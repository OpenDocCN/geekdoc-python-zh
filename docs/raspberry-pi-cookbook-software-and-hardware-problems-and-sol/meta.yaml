    Inkscape is another program best run with the extra power of a Raspberry Pi 4
    or 400.


    # See Also


    For documentation on Inkscape, visit [Inkscape.org](http://Inkscape.org).


    For editing bitmap images such as photographs, see [Recipe 4.6](Recipe 4.6).


    # 4.8 Using Bookshelf


    # Problem


    You want to read Raspberry Pi books and magazines for free.'
  - '[PAGE 151]


    # Solution


    Use the pre-installed Bookshelf application. You will find this application in
    the Help section of the Raspberry Menu. Open it and you will see (Figure 4-12)
    past issues of *The MagPi*, *Wireframe*, and *HackSpace* magazines, as well as
    books from the Raspberry Pi Press.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_151_0.png)


    *Figure 4-12. The Bookshelf application*


    # Discussion


    This is a really great resource. You will find lots of articles in *The MagPi*
    magazine to get started with various aspects of the Raspberry Pi. It is also a
    great source of inspiration for projects.


    # See Also


    Lots of interesting Raspberry Pi resources are available at the [Raspberry Pi
    Foundation](https://www.raspberrypi.org/).


    You can also download back issues of *The MagPi magazine in PDF* or subscribe
    to the paper edition.'
  - '[PAGE 152]


    # 4.9 Playing Internet Radio


    # Problem


    You want to be able to play internet radio on your Raspberry Pi.


    # Solution


    The VLC media player should be pre-installed with Raspberry Pi OS. You will find
    it under Sound & Video in the Raspberry Menu. If it''s not there, you can install
    it using the Preferred Software tool (Recipe 4.2).


    If you prefer to install the VLC media player from the command line, you can do
    so by running the following command:


    ```

    sudo apt install vlc

    ```


    Run the program and then, on the Media menu, select the Open Network Stream option.
    This opens a dialog box (see Figure 4-13) in which you can enter the URL of the
    internet radio station that you want to play. You will need to plug headphones
    or amplified speakers into the audio socket on the Raspberry Pi.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_152_0.png)'
  - '[PAGE 153]


    # Discussion


    You also can run VLC from the command line as follows:


    ```

    $ vlc http://www.a-1radio.com/listen.pls -I dummy

    ```


    VLC will probably produce a series of error messages but then play the audio just
    fine. The -I dummy option prevents a VLC window opening.


    # See Also


    This recipe borrows heavily from this [tutorial](https://example.com), in which
    Jan Holst Jensen takes things a step further and adds radio-style controls to
    the project.


    For UK readers, you can find a list of the [BBC radio stream URLs](https://example.com)
    online.


    # 4.10 Using Visual Studio Code


    # Problem


    You want to use a light-weight programming editor.


    # Solution


    Install Microsoft''s Visual Studio Code, or VS Code, as we shall refer to it from
    now on.


    You will find VS Code in the Programming section of the Recommended Software tool
    ([Recipe 4.2](https://example.com)).


    If you prefer to install it from the command line, you can use the following command:


    ```

    $ sudo apt install code

    ```


    # Discussion


    VS Code is much loved by programmers. It sits in a happy place, halfway between
    a simple text editor and a fully featured integrated development environment (IDE).
    It''s very easy to use and offers helpful suggestions as you write your code,
    without you having to learn the ins and outs of a more complex IDE. It offers
    support for many programming languages and does nice things like color-code your
    programs to make them easier to read.


    If you are a seasoned programmer, you may prefer to edit your Raspberry Pi Python
    code using Visual Studio Code rather than a beginner''s Python IDE like Thonny
    or Mu (Recipes [5.3](https://example.com) and [5.4](https://example.com)). This
    is particularly true if your project consists of multiple files. [Figure 4-14](https://example.com)
    shows the file explorer area on the left, where you can see all the files'
  - '[PAGE 154]


    in your project. Clicking on one makes it available in the editor area, and open
    files each have their own tab.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_154_0.png)


    Figure 4-14. VS Code on a Raspberry Pi


    As you can see, the editor highlights the language syntax, color-coding it to
    make it easier to read and spot mistakes.


    Visual Studio Code is a useful tool to have around, whether programming in Python
    (see Chapter 5) or some other language.


    # See Also


    The simple text editor nano is an easy way to edit code (see Recipe 3.7).


    Thonny is a Python editor aimed at beginners (see Recipe 5.3).


    # 4.11 Controlling a Laser Cutter


    # Problem


    You want to control your low-cost K40 laser cutter from your Raspberry Pi.'
  - '[PAGE 155]


    # Solution


    If you have one of the popular and low-cost Chinese laser cutters of the K40 variety
    (Figure 4-15), you can use the K40 Whisperer software to control it. Thus, instead
    of having to use a relatively expensive Windows computer to control your laser
    cutter, you can use a much lower cost Raspberry Pi.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_155_0.png)


    Figure 4-15. A K40 laser cutter


    This software is written in Python, but also relies on the Inkscape vector drawing
    package. So if you have not already done so, install Inkscape by following Recipe
    4.7.


    Next, download the source code for the K40 Whisperer software. Select the latest
    download from the K40 Whisperer Source column. Double-click the downloaded ZIP
    file and extract it into your home directory (/home/pi). Inside the unzipped directory,
    you will find a file called README_Linux.txt. The instructions here are based
    on that file. The README is for Linux in general rather than being Raspberry Pi-specific.


    First, run the following two commands to create a user group for the software.
    The first adds a new user group specifically for the laser cutter, and the second
    adds the user pi to that group. If you created a different username when setting
    up your Raspberry Pi, use that in place of pi:


    ```

    $ sudo groupadd lasercutter

    $ sudo usermod -a -G lasercutter pi

    ```'
  - "[PAGE 156]\n\nMake sure that your laser cutter is connected to your Raspberry\
    \ Pi with its USB lead and the laser cutter is switched on. You now need to run\
    \ the following commands to find out the USB vendor and product ID for the laser\
    \ cutter. These will probably be 1a86 and 5512, respectively, but it's worth checking\
    \ in case the laser cutter's manufacturer changed them. To do this, run the lsusb\
    \ command:\n\n```\n$ lsusb\nBus 001 Device 004: ID 1a86:5512 QinHeng Electronics\
    \ CH341 in EPP/MEM/I2C mode,\n    EPP/I2C adapter\nBus 001 Device 005: ID 0424:7800\
    \ Microchip Technology, Inc. (formerly SMSC)\nBus 001 Device 003: ID 0424:2514\
    \ Microchip Technology, Inc. (formerly SMSC)\n    USB 2.0 Hub\nBus 001 Device\
    \ 002: ID 0424:2514 Microchip Technology, Inc. (formerly SMSC)\n    USB 2.0 Hub\n\
    Bus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub\n```\n\nThis will\
    \ list all the USB devices connected to your Raspberry Pi; look for the entry\
    \ that corresponds to your laser cutter. In this case, it's the only Chinese name\
    \ there (QinHeng). But you can confirm this if you need to by unplugging the laser\
    \ cutter and running the lsusb command again and seeing which entry disappears.\n\
    \nOn the line for this entry you can see the text 1a86:5512. The part before the\
    \ : is the vendor ID and 5512 is the product ID. You need to know these because\
    \ you are going to use them in a configuration file.\n\nCreate and edit a new\
    \ file in nano using the command:\n\n```\n$ sudo nano /etc/udev/rules.d/97-ctc-lasercutter.rules\n\
    ```\n\nYou can find information on editing files in Recipe 3.7. Paste the following\
    \ text into the file. If your vendor and product IDs are different from mine,\
    \ change the appropriate parts of the text to match your IDs:\n\n```\nSUBSYSTEM==\"\
    usb\", ATTRS{idVendor}==\"[1a86]\", ATTRS{idProduct}==\"[5512]\",\n    ENV{DEVTYPE}==\"\
    usb_device\", MODE=\"0664\", GROUP=\"lasercutter\"\n```\n\nReboot your Raspberry\
    \ Pi and then continue the installation by running the following command to install\
    \ some more modules that K40 Whisperer needs:\n\n```\n$ sudo apt install libxml2-dev\
    \ libxslt-dev\n$ sudo apt install libusb-1.0-0\n$ sudo apt install libusb-1.0-0-dev\n\
    ```\n\nMake sure that you are in the directory where you downloaded the K40 Whisperer\
    \ and run the following command:\n\n```\n$ pip3 install -r requirements.txt\n\
    ```"
- md: "You are now ready to run the program using the following command. This will\
    \ open a window. Click the File menu and then Options to configure the software\
    \ (Figure 4-16):\n\n```\n$ python3 k40_whisperer.py\n```\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_157_0.png)\n\
    \nFigure 4-16. Configuring K40 Whisperer\n\nConsult the manual that came with\
    \ your laser cutter to find the version of the control board used in it. If you\
    \ can't find this, you might need to try a few different options for the Board\
    \ Name setting. You do not need to change any of the other settings.\n\nWith the\
    \ Settings window closed, you can load an SVG file to cut (Figure 4-17).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_158_0.png)\n\
    \nFigure 4-17. Ready to cut\n\n## Discussion\n\nLaser cutters often come with\
    \ their own proprietary software to control the cutter that is generally run on\
    \ a Microsoft Windows computer. It may even have a hardware USB dongle designed\
    \ to tie that piece of software to your computer.\n\nThe K40 Whisperer software\
    \ cuts and engraves directly from SVG drawings. You just draw outlines in different\
    \ colors with a line width of 0.1mm. Red lines mean cut, blue lines mean vector\
    \ engrave (lightly burn an outline), and black lines mean raster engrave (scan\
    \ back and forth to burn out an area of the surface).\n\n## See Also\n\nFor full\
    \ information on K40 Whisperer, see [https://oreil.ly/5RJth](https://oreil.ly/5RJth).\n\
    \nTo create the SVG drawings for your laser cutting and etching, you can use InkScape\
    \ ([Recipe 4.7](Recipe 4.7)).\n\nA Raspberry Pi also makes a great controller\
    \ for a 3D printer using [OctoPrint](OctoPrint).\n\n# CHAPTER 5\nPython Basics\n\
    \n## 5.0 Introduction\n\nAlthough many languages can be used to program the Raspberry\
    \ Pi, Python is the most popular. In fact, the “Pi” in Raspberry Pi is inspired\
    \ by the word “python.”\n\nIn this chapter, you’ll find a host of recipes to help\
    \ you start programming with Raspberry Pi.\n\n## 5.1 Deciding Between Python 2\
    \ and Python 3\n\n### Problem\n\nYou need to use Python but are unsure which version\
    \ to use.\n\n### Solution\n\nUse Python 3 until you face a problem that is best\
    \ solved by reverting to version 2.\n\nTo install Python 2 on Raspberry Pi OS,\
    \ run the following commands:\n\n```\n$ sudo apt update\n$ sudo apt install python2\n\
    ```\n\nYou can then run Python 2 using the command python2.\n\n### Discussion\n\
    \nAlthough Python’s most recent version, Python 3, has been around for years,\
    \ you’ll find that a lot of people still use Python 2. Python 3 (the default for\
    \ Raspberry Pi OS) is run by using either of the commands python or python3. The\
    \ examples in this book are written for Python 3 unless otherwise stated. Most\
    \ will run on both Python 2 and Python 3 without modification.\n\nThis reluctance\
    \ on the part of the Python community to ditch the older version is largely because\
    \ Python 3 introduced some changes that broke compatibility with version 2. As\
    \ a result, some of the huge body of third-party libraries developed for Python\
    \ 2 won't work under Python 3.\n\nMy strategy is to write in Python 3 whenever\
    \ possible, reverting Python 2 only when I need to because of compatibility problems.\n\
    \n### See Also\n\nFor a good summary of the Python 2 versus Python 3 debate, see\
    \ the [Python wiki](https://wiki.python.org/moin/Python2orPython3).\n\n## 5.2\
    \ Choosing a Python Editor\n\n### Problem\n\nMany options are available when it\
    \ comes to Python editors, and you want to know which one you should start with.\n\
    \n### Solution\n\nMost people will start with either Thonny (Recipe 5.3) or Mu\
    \ (Recipe 5.4). Both are good editors and both are easy to use.\n\nThonny is pre-installed\
    \ with Raspberry Pi OS, whereas Mu has to be installed. You will find lots of\
    \ resources for both editors, and Thonny is recommended over Mu in most material\
    \ from the Raspberry Pi Foundation.\n\n### Discussion\n\nIt doesn't matter too\
    \ much which editor you start with. You might like to try out both Thonny and\
    \ Mu and see which you like best.\n\nAs you get more advanced in your programming\
    \ experience, you should try VS Code (Recipe 4.10) as a more professional tool.\n\
    \n### See Also\n\nVS Code is described in Recipe 4.10 and Thonny in Recipe 5.3.\n\
    \n## 5.3 Editing Python Programs with Thonny\n\n### Problem\n\nYou want to edit\
    \ your Python programs using Thonny.\n\n### Solution\n\nThonny should be pre-installed\
    \ with Raspberry Pi OS. But if it's not in the Programming section of your Raspberry\
    \ Menu, you can install it using the Recommended Software tool (Recipe 4.2).\n\
    \nStart by opening Thonny from the Programming section of your Raspberry Menu\
    \ and enter the following lines of text, as also shown in Figure 5-1:\n\n```\n\
    python\nfor i in range(1, 10):\n    print(i)\n```\n\nWhen you start the second\
    \ line of the program, the print statement should indent automatically.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_162_0.png)\n\
    \nFigure 5-1. The Thonny editor\n\nYou can run the program to see what it does\
    \ by clicking the Run button. Before it runs the program, Thonny will prompt you\
    \ to save the file. Give it a name such as *count.py*. The program will then run\
    \ and you'll see the output at the bottom of the Thonny window (Figure 5-2).\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_163_0.png)\n\nFigure 5-2. Running a\
    \ program in Thonny\n\nAlthough you can call your Python programs anything you\
    \ like, the convention is that you give them the file extension .py.\n\n### Discussion\n\
    \nWe haven't started on Python programming yet, but from this example, you can\
    \ see how a program is a matter of giving instructions to the computer in the\
    \ Python programming language. In this case, the instructions are to print out\
    \ a series of numbers.\n\n### See Also\n\nA popular alternative to Thonny is Mu\
    \ (Recipe 5.4).\nVisit the official Thonny web page for more information.\nAs\
    \ well as using Mu to edit and run Python files, you can also edit Python files\
    \ in nano (Recipe 3.7) and then run them from a Terminal session (Recipe 5.6).\n\
    \n## 5.4 Editing Python Programs with Mu\n\n### Problem\n\nYou want to edit your\
    \ Python programs using Mu.\n\n### Solution\n\nMu is not pre-installed in the\
    \ latest versions of Raspberry Pi OS. To install it, use the Recommended Software\
    \ tool (Recipe 4.2). Once it's installed, you will find it in the Programming\
    \ section of the Raspberry Menu (Figure 5-3).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_164_0.png)\n\
    \nFigure 5-3. Opening Mu from the Raspberry Menu\n\nWhen you first start Mu, you\
    \ are prompted to select a mode (Figure 5-4).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_164_1.png)\n\
    \nFigure 5-4. Selecting a mode for Mu\n\nSelect the Python 3 mode and click OK.\
    \ This opens the Mu editor, so it's ready for you to start writing some Python.\n\
    \nLet's try it out. Carefully type the following test into the editor area under\
