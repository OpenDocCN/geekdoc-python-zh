    # 14.6 Measuring Soil Moisture


    # Problem


    You want to measure the moisture of the soil around your plants.


    # Solution


    Use a MonkMakes Plant Monitor board. Unlike most other soil moisture boards, this
    board has a serial interface, and so you must first follow [Recipe 2.6](https://example.com)
    to enable the serial interface. Connect up the board as shown in [Figure 14-11](https://example.com).


