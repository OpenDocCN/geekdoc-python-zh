- md: '## 3.28 Using the Task Manager


    The Task Manager allows you to see at a glance how much CPU and memory are being
    used. You can also right-click a process and select the option to kill it from
    the pop-up menu that appears.


    The bar graphs toward the top of the window display the total CPU usage and memory
    usage. The processes are listed below that, and you can see the CPU share each
    is taking.


    ### Discussion


    If you prefer to do this type of thing from the command line, use the Linux top
    command to display very similar data about processor and memory usage and which
    processes are using the most resources (Figure 3-16). You can then use the kill
    command to kill a process. You will need to do this as superuser.


    In this case, you can see that the top process is a Python program that uses 97%
    of CPU. The first column shows its process ID (2447). To kill this process, enter
    this command:


    ```

    $ kill 2447

    ```


    It is quite possible to kill some vital operating system process this way, but
    if you do, powering off your Pi and turning it back on again will restore things
    to normal.


    Sometimes you might have a process running that is not immediately visible when
    you use top. If this is the case, you can search all the processes running by
    using the ps command and piping (Recipe 3.33) the results to the grep command
    (Recipe 3.27), which will search the results and highlight items of interest.


    For example, to find the process ID for our CPU-hogging Python process, we could
    run the following command:


    ```

    $ ps -ef | grep "python"

    pi       2447  2397 99 07:01 pts/0    00:00:02 python speed.py

    pi       2456  2397  0 07:01 pts/0    00:00:00 grep --color=auto python

    ```


    In this case, the process ID for the Python program speed.py is 2447. The second
    entry in the list is the process for the ps command itself.


    ### The killall Command


    A variation on the kill command is the killall command. Use this with caution
    because it kills all processes that match its argument. So, for example, the following
    command will kill all Python programs running on the Raspberry Pi:


    ```

    $ sudo killall python

    ```


    If you want even more information, try the htop command as an alternative to top.


    ### See Also


    See also the manpages for top, ps, grep, kill, and killall. You can view these
    by typing the man command followed by the name of the command for which you want
    information, as shown here:


    ```

    $ man top

    ```


    ## 3.29 Working with File Archives


    ### Problem


    You have downloaded a compressed file and want to uncompress it.


    ### Solution


    Depending on the file type, you will need to use the tar command or the gunzip
    command.


    ### Discussion


    If the file that you want to uncompress just has the extension .gz, you can unzip
    it using the command:


    ```

    $ gunzip myfile.gz

    ```


    You also often find files (called tarballs) that contain a directory that has
    been archived with the Linux tar utility and then compressed with gzip into a
    file with a name like myfile.tar.gz.


    You can extract the original files and folders out of a tarball by using the tar
    command:


    ```

    $ tar -xzf myfile.tar.gz

    ```


    If the file is a ZIP archive, you can use the File Manager and Xarchiver tools,
    as shown in Recipe 3.22.


    ### See Also


    You can find out more about tar from its manpage, which you can access with the
    command man tar.


    ## 3.30 Listing Connected USB Devices


    ### Problem


    You''ve plugged in a USB device and want to make sure Linux recognizes it.


    ### Solution


    Use the `lsusb` (like `ls` but for USB devices) command. This lists all of the
    devices attached to the USB ports on your Raspberry Pi:


    ```

    $ lsusb

    Bus 001 Device 002: ID 0424:9512 Standard Microsystems Corp.

    Bus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub

    Bus 001 Device 003: ID 0424:ec00 Standard Microsystems Corp.

    Bus 001 Device 004: ID 15d9:0a41 Trust International B.V. MI-2540D

    [Optical mouse]

    ```


    ### Discussion


    This command informs you as to whether a device is connected, but it will not
    guarantee that the device is working correctly. There might be drivers to install
    or configuration changes to make for the hardware.


    ## 3.31 Redirecting Output from the Command Line to a File


    ### Problem


    You want to quickly create a file with some text or record a directory listing
    into a file.


    ### Solution


    Use the `>` command to redirect output that would otherwise appear in your Terminal
    after you run the command.


    For example, to copy a directory listing into a file called *myfiles.txt*, do
    the following:


    ```

    $ ls > myfiles.txt

    $ more myfiles.txt

    Desktop

    indiecity

    master.zip

    mcpi

    ```


    ### Discussion


    You can use the > command on any Linux command that produces output, even if you
    are running, say, a Python program.


    You can also use the opposite (<) command to redirect user input, although this
    is not nearly as useful as >.


    ### See Also


    To use the cat command to join together a number of files, see [Recipe 3.32](Recipe
    3.32).


    ## 3.32 Concatenating Files


    ### Problem


    You have a number of text files, and you want to join them into one big file.


    ### Solution


    Use the cat command to *concatenate* a number of files into one output file.


    For example:


    ```

    $ cat file1.txt file2.txt file3.txt > full_file.txt

    ```


    ### Discussion


    Joining files is the real purpose of the cat command. You can supply as many filenames
    as you like, and they will all be written to the file that you specify. If you
    do not redirect the output, it will just appear in your Terminal window. If they
    are big files, this process might take some time!


    ### See Also


    See also [Recipe 3.8](Recipe 3.8), in which cat is used to display the contents
    of a file.


    ## 3.33 Using Pipes


    ### Problem


    You want to use the output of one Linux command as the input to another command.


    ### Solution


    Use the pipe command, which is the *bar* symbol (|) on your keyboard, to pipe
    the output of one command to another.


    For example:


    ```

    $ ls -l *.py | grep Jun

    -rw-r--r-- 1 pi pi 226 Jun  7 06:49 speed.py

    ```


    This example will find all the files with the extension py that also have Jun
    in their directory listing, indicating that they were last modified in June.


    ### Discussion


    At first sight, this looks rather like output redirection using > (Recipe 3.31).
    The difference is that > will not work if the target is another program. It will
    work only for redirecting to a file.


    You can chain together as many programs as you like, as shown here, although this
    isn''t something you will do often:


    ```

    $ command1 | command2 | command3

    ```


    ### See Also


    See Recipe 3.27 to search your command history using pipe and grep, and Recipe
    3.28 for an example of using grep to find a process.


    ## 3.34 Hiding Output to the Terminal


    ### Problem


    You want to run a command, but you don''t want the output filling up your screen.


    ### Solution


    Redirect the output to /dev/null using >.


    For example:


    ```

    $ ls > /dev/null

    ```


    The dev directory contains operating system devices, including things like serial
    ports. Within this directory, a special device (the null device) is defined that
    simply discards everything sent to it.


    ### Discussion


    This example illustrates the syntax but is otherwise pretty useless. A more common
    use is when you’re running a program and the developer has left a lot of trace
    messages in its code, which you don’t really want to see. The following example
    hides superfluous output from the find command (see Recipe 3.36):


    ```

    $ find / -name gemgem.py 2>/dev/null

    /home/pi/python_games/gemgem.py

    ```


    ### See Also


    For more information about redirecting standard output, see Recipe 3.31.


    ## 3.35 Running Programs in the Background


    ### Problem


    You want to run a program while also working on some other task.


    ### Solution


    Run the program or command in the background using the & command.


    For example:


    ```

    $ python speed.py &

    [1] 2528

    $ ls

    ```


    Rather than wait until the program has finished running, the command line displays
    the process ID (the second number) and immediately allows you to continue with
    whatever other commands you want to run. You can then use this process ID to kill
    the background process (Recipe 3.28).


    To bring the background process back to the foreground, use the fg command:


    ```

    $ fg

    python speed.py

    ```


    This reports the command or program that is running and then waits for it to finish.


    ### Discussion


    Output from the background process will still appear in the Terminal.


    An alternative to putting processes in the background is to just open more than
    one Terminal window.'
  mdcn: '## 3.28 使用任务管理器


    任务管理器让你可以一目了然地查看 CPU 和内存的使用情况。你也可以右键单击一个进程，然后从弹出的菜单中选择选项来终止它。


    窗口顶部的条形图显示了总的 CPU 使用率和内存使用率。进程列表位于其下方，你可以看到每个进程占用的 CPU 份额。


    ### 讨论


    如果你更喜欢从命令行执行此类操作，可以使用 Linux 的 `top` 命令来显示关于处理器和内存使用情况以及哪些进程占用最多资源的非常相似的数据（图 3-16）。然后你可以使用
    `kill` 命令来终止一个进程。你需要以超级用户身份执行此操作。


    在这种情况下，你可以看到占用资源最多的进程是一个使用了 97% CPU 的 Python 程序。第一列显示了它的进程 ID（2447）。要终止此进程，请输入以下命令：


    ```

    $ kill 2447

    ```


    很有可能以这种方式终止某个重要的操作系统进程，但如果你这样做了，只需关闭你的树莓派电源并重新打开，一切就会恢复正常。


    有时你可能有一个正在运行的进程，在使用 `top` 时无法立即看到。如果是这种情况，你可以使用 `ps` 命令搜索所有正在运行的进程，并将结果通过管道（Recipe
    3.33）传递给 `grep` 命令（Recipe 3.27），后者将搜索结果并突出显示感兴趣的项目。


    例如，要查找我们那个占用大量 CPU 的 Python 进程的进程 ID，我们可以运行以下命令：


    ```

    $ ps -ef | grep "python"

    pi       2447  2397 99 07:01 pts/0    00:00:02 python speed.py

    pi       2456  2397  0 07:01 pts/0    00:00:00 grep --color=auto python

    ```


    在这种情况下，Python 程序 `speed.py` 的进程 ID 是 2447。列表中的第二个条目是 `ps` 命令本身的进程。


    ### killall 命令


    `kill` 命令的一个变体是 `killall` 命令。请谨慎使用，因为它会终止所有与其参数匹配的进程。因此，例如，以下命令将终止树莓派上运行的所有 Python
    程序：


    ```

    $ sudo killall python

    ```


    如果你想要更多信息，可以尝试 `htop` 命令作为 `top` 的替代品。


    ### 另请参阅


    另请参阅 `top`、`ps`、`grep`、`kill` 和 `killall` 的手册页。你可以通过输入 `man` 命令后跟你想了解信息的命令名称来查看这些手册页，如下所示：


    ```

    $ man top

    ```


    ## 3.29 处理文件归档


    ### 问题


    你下载了一个压缩文件，想要解压缩它。


    ### 解决方案


    根据文件类型，你需要使用 `tar` 命令或 `gunzip` 命令。


    ### 讨论


    如果你想解压缩的文件扩展名只是 `.gz`，你可以使用以下命令解压：


    ```

    $ gunzip myfile.gz

    ```


    你也经常会遇到包含目录的文件（称为 tar 包），这些目录是使用 Linux 的 `tar` 工具归档，然后使用 `gzip` 压缩成一个文件名类似于 `myfile.tar.gz`
    的文件。


    你可以使用 `tar` 命令从 tar 包中提取原始文件和文件夹：


    ```

    $ tar -xzf myfile.tar.gz

    ```


    如果文件是 ZIP 归档文件，你可以使用文件管理器和 Xarchiver 工具，如 Recipe 3.22 所示。


    ### 另请参阅


    你也可以从 `tar` 的手册页中找到更多信息，可以通过命令 `man tar` 访问。


    ## 3.30 列出已连接的 USB 设备


    ### 问题


    你插入了一个 USB 设备，想要确认 Linux 已识别它。


    ### 解决方案


    使用 `lsusb`（类似于 `ls`，但用于 USB 设备）命令。这会列出连接到树莓派 USB 端口的所有设备：


    ```

    $ lsusb

    Bus 001 Device 002: ID 0424:9512 Standard Microsystems Corp.

    Bus 001 Device 001: ID 1d6b:0002 Linux Foundation 2.0 root hub

    Bus 001 Device 003: ID 0424:ec00 Standard Microsystems Corp.

    Bus 001 Device 004: ID 15d9:0a41 Trust International B.V. MI-2540D

    [Optical mouse]

    ```


    ### 讨论


    此命令会通知你设备是否已连接，但不能保证设备正常工作。可能需要安装驱动程序或对硬件进行配置更改。


    ## 3.31 将命令行输出重定向到文件


    ### 问题


    你想快速创建一个包含一些文本的文件，或者将目录列表记录到文件中。


    ### 解决方案


    使用 `>` 命令将原本会出现在运行命令后终端中的输出重定向。


    例如，要将目录列表复制到名为 *myfiles.txt* 的文件中，请执行以下操作：


    ```

    $ ls > myfiles.txt

    $ more myfiles.txt

    Desktop

    indiecity

    master.zip

    mcpi

    ```


    ### 讨论


    你可以在任何产生输出的 Linux 命令上使用 `>` 命令，即使你正在运行，比如说，一个 Python 程序。


    你也可以使用相反的（`<`）命令来重定向用户输入，尽管这远不如 `>` 有用。


    ### 另请参阅


    要使用 `cat` 命令将多个文件连接在一起，请参阅 [Recipe 3.32](Recipe 3.32)。


    ## 3.32 连接文件


    ### 问题


    你有多个文本文件，想要将它们连接成一个大文件。


    ### 解决方案


    使用 `cat` 命令将多个文件*连接*成一个输出文件。


    例如：


    ```

    $ cat file1.txt file2.txt file3.txt > full_file.txt

    ```


    ### 讨论


    连接文件是 `cat` 命令的真正目的。你可以提供任意数量的文件名，它们都将被写入你指定的文件中。如果你不重定向输出，它将只出现在你的终端窗口中。如果它们是大文件，这个过程可能需要一些时间！


    ### 另请参阅


    另请参阅 [Recipe 3.8](Recipe 3.8)，其中使用 `cat` 显示文件内容。


    ## 3.33 使用管道


    ### 问题


    你想将一个 Linux 命令的输出用作另一个命令的输入。


    ### 解决方案


    使用管道命令，即键盘上的*竖线*符号（|），将一个命令的输出管道传输到另一个命令。


    例如：


    ```

    $ ls -l *.py | grep Jun

    -rw-r--r-- 1 pi pi 226 Jun  7 06:49 speed.py

    ```


    此示例将查找所有扩展名为 `.py` 且目录列表中包含 `Jun` 的文件，表明它们最后修改于六月。


    ### 讨论


    乍一看，这很像使用 `>` 进行输出重定向（Recipe 3.31）。区别在于，如果目标是另一个程序，`>` 将不起作用。它只适用于重定向到文件。


    你可以将任意数量的程序链接在一起，如这里所示，尽管这不是你经常做的事情：


    ```

    $ command1 | command2 | command3

    ```


    ### 另请参阅


    参阅 Recipe 3.27 了解如何使用管道和 `grep` 搜索命令历史记录，以及 Recipe 3.28 了解使用 `grep` 查找进程的示例。


    ## 3.34 隐藏终端输出


    ### 问题


    你想运行一个命令，但不希望输出填满你的屏幕。


    ### 解决方案


    使用 `>` 将输出重定向到 `/dev/null`。


    例如：


    ```

    $ ls > /dev/null

    ```


    `dev` 目录包含操作系统设备，包括串行端口等。在此目录中，定义了一个特殊设备（空设备），它只是丢弃发送给它的所有内容。


    ### 讨论


    此示例说明了语法，但除此之外没什么用。更常见的用途是当你运行一个程序，而开发者在其代码中留下了很多跟踪消息，而你并不真正想看到这些消息时。以下示例隐藏了 `find`
    命令的多余输出（参见 Recipe 3.36）：


    ```

    $ find / -name gemgem.py 2>/dev/null

    /home/pi/python_games/gemgem.py

    ```


    ### 另请参阅


    有关重定向标准输出的更多信息，请参阅 Recipe 3.31。


    ## 3.35 在后台运行程序


    ### 问题


    你想在运行程序的同时处理其他任务。


    ### 解决方案


    使用 `&` 命令在后台运行程序或命令。


    例如：


    ```

    $ python speed.py &

    [1] 2528

    $ ls

    ```


    命令行不会等待程序运行完成，而是显示进程 ID（第二个数字），并立即允许你继续运行任何其他想要运行的命令。然后你可以使用此进程 ID 来终止后台进程（Recipe
    3.28）。


    要将后台进程带回前台，请使用 `fg` 命令：


    ```

    $ fg

    python speed.py

    ```


    这会报告正在运行的命令或程序，然后等待它完成。


    ### 讨论


    后台进程的输出仍会出现在终端中。


    将进程置于后台的替代方法是直接打开多个终端窗口。'
