  - '[PAGE 313]


    Figure 11-1 shows how you can wire this LED using a solderless breadboard and
    male-to-female jumper leads. The LED has positive and negative leads. The positive
    lead is the longer and will be the one on the same row as the resistor in Figure
    11-1.

    The resistor shown is a 470Ω resistor, which will make the LED shine brightly
    without drawing so much current that the Raspberry Pi could be damaged.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_313_0.png)


    Figure 11-1. Connecting an LED to a Raspberry Pi


    Having connected the LED, we need to be able to turn it on and off using commands
    from Python.

    Start a Python console from the Terminal and enter these commands:


    ```

    bash

    $ sudo python3

    >>> from gpiozero import LED

    >>> led = LED(18)

    >>> led.on()

    >>> led.off()

    >>>

    ```


    This will turn your LED on after the `led.on()` command, and off again after the
    `led.off()` command.


    # Discussion


    LEDs are a very useful, cheap, and efficient way of producing light, but you do
    have to be careful how you use them. If they are connected directly to a voltage
    source (such as a GPIO output) that is greater than about 1.7 volts, they will
    draw a very large current. This can often be enough to destroy the LED or whatever
    is providing the current—which is not good if your Raspberry Pi is providing the
    current.

    You should always use a current-limiting resistor with an LED. The series resistor
    is placed *between* the LED and the voltage source, which limits the amount of
    current flowing through the LED to a level that is safe for both the LED and the
    GPIO pin driving it.'
  - "[PAGE 314]\n\nRaspberry Pi GPIO pins are guaranteed to provide only about 3mA\
    \ or 16mA of current (depending on the board and number of pins in use)—see Recipe\
    \ 10.3. LEDs will generally illuminate with any current greater than 1mA, but\
    \ they will be brighter with more current. Use Table 11-1 as a guide to selecting\
    \ a series resistor based on the type of LED; the table also indicates the approximate\
    \ current that will be drawn from the GPIO pin.\n\nTable 11-1. Selecting series\
    \ resistors for LEDs and a 3.3V GPIO pin\n\n| LED type | Resistor | Current (mA)\
    \ |\n| :--- | :--- | :--- |\n| Red | 470Ω | 3.5 |\n| Red | 1kΩ | 1.5 |\n| Orange,\
    \ yellow, green | 470Ω | 2 |\n| Orange, yellow, green | 1kΩ | 1 |\n| Blue, white\
    \ | 100Ω | 3 |\n| Blue, white | 270Ω | 1 |\n\nAs you can see, in all cases it\
    \ is safe to use a 470Ω resistor. If you are using a blue or white LED, you can\
    \ reduce the value of the series resistor considerably without risk of damaging\
    \ your Raspberry Pi.\n\nIf you want to extend the experiments that you made in\
    \ the Python console into a program that makes the LED blink on and off repeatedly,\
    \ you could paste the code that you’ll find in ch_11_led_blink.py into an editor\
    \ (as with all the program examples in this book, you can download this program\
    \ [see Recipe 3.22]):\n\n```\nfrom gpiozero import LED\nfrom time import sleep\n\
    \nled = LED(18)\n\nwhile True:\n    led.on()\n    sleep(0.5)\n    led.off()\n\
    \    sleep(0.5)\n```\n\nTo run the command, enter the following:\n\n```\n$ python3\
    \ ch_11_led_blink.py\n```\n\nThe sleep period of 0.5 seconds between turning the\
    \ LED on and turning it off again makes the LED blink once a second.\n\nThe LED\
    \ class also has a built-in method for blinking, as illustrated by this example:\n\
    \n```\nfrom gpiozero import LED\n```"
  - '[PAGE 315]


    ```

    led = LED(18)

    led.blink(0.5, 0.5, background=False)

    ```


    The first two parameters to blink are the on time and off time, respectively.
    The optional background parameter is interesting because if you set this to True,
    your program will be able to continue running other commands in the background
    while the LED is blinking.


    When you are ready to stop the LED blinking in the background, you can just use
    led.off(). This technique can greatly simplify your programs. The example in ch_11_led_blink_2.py
    shows this in action:


    ```

    from gpiozero import LED


    led = LED(18)

    led.blink(0.5, 0.5, background=True)

    print("Notice that control has moved away - hit Enter to continue")

    input()

    print("Control is now back")

    led.off()

    input()

    ```


    When the program starts, the LED will be set blinking in the background and the
    program is free to move onto the next command and print “Notice that control has
    moved away - hit Enter to continue.” The input() command will cause the program
    to halt and wait for input (you can just press the Enter key). But notice that
    before you press Enter, the LED is still blinking even though the program has
    moved on to wait for input.


    When you do press Enter again, the led.off() command stops the LED’s background
    blinking.


    # See Also


    Check out this series resistor calculator.


    For more information on using a breadboard and jumper wires with the Raspberry
    Pi, see Recipe 10.9.


    See the gpiozero documentation on LEDs.


    # 11.2 Leaving the GPIO Pins in a Safe State


    # Problem


    You want all the GPIO pins to be set to inputs whenever your program exits to
    reduce the chance of an accidental short on the GPIO header, which could damage
    your Raspberry Pi.'
  - "[PAGE 316]\n\n# Solution\n\nWhenever you exit a program that uses gpiozero, it\
    \ will automatically set all the GPIO pins into a safe *input* state.\n\n# Discussion\n\
    \nEarlier methods of accessing the GPIO pins, such as the RPi.GPIO library, did\
    \ not automatically set the GPIO pins to be in a safe input state. Instead, they\
    \ required you to call a cleanup function before exiting the program.\n\nIf cleanup\
    \ was not called or the Pi was not rebooted, pins set to be outputs would remain\
    \ as outputs after the program has finished. If you were to start wiring up a\
    \ new project, unaware of this problem, your new circuit might accidentally short\
    \ a GPIO output to one of the supply voltages or another GPIO pin in the opposite\
    \ state. A typical scenario in which this might happen would be if you were to\
    \ connect a push switch, connecting a GPIO pin that you had configured as an output\
    \ and HIGH to GND.\n\nFortunately for us, the gpiozero library now takes care\
    \ of this.\n\n# See Also\n\nFor more information on exception handling in Python,\
    \ see [Recipe 7.10](Recipe 7.10).\n\n# 11.3 Controlling the Brightness of an LED\n\
    \n# Problem\n\nYou want to vary the brightness of an LED from a Python program.\n\
    \n# Solution\n\nThe gpiozero library has a pulse-width modulation (PWM) feature\
    \ that enables you to control the power to an LED and its brightness. To try it\
    \ out, connect an LED as described in [Recipe 11.1](Recipe 11.1) and run this\
    \ test program (*ch_11_led_brightness.py*):\n\n```\nfrom gpiozero import PWMLED\n\
    \nled = PWMLED(18)\n\nwhile True:\n    brightness_s = input(\"Enter Brightness\
    \ (0.0 to 1.0):\")\n    brightness = float(brightness_s)\n    led.value = brightness\n\
    ```\n\nThe program is included in the code download (see [Recipe 3.22](Recipe\
    \ 3.22))."
  - '[PAGE 317]


    Run the Python program, and you will be able to change the brightness by entering
    a number between 0.0 (off) and 1.0 (full brightness):


    ```

    $ python ch_11_led_brightness.py

    Enter Brightness (0.0 to 1.0):0.5

    Enter Brightness (0.0 to 1.0):1

    Enter Brightness (0.0 to 1.0):0

    ```


    Exit the program by pressing Ctrl-C. Ctrl-C is command line for *stop what you
    are doing*; in many situations, it will stop a program entirely.


    Note that when controlling an LED''s brightness like this, you must define the
    LED as being PWMLED and not just LED.


    # Discussion


    PWM is a clever technique by which you vary the length of pulses while keeping
    the overall number of pulses per second (the frequency in Hz) constant. Figure
    11-2 illustrates the basic principle of PWM.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_317_0.png)'
  - '[PAGE 318]


    If the pulses are only high for a short amount of time, the LED will appear dim,
    whereas if the pulse is high a much higher proportion of the time, the LED will
    appear brighter.


    By default, the PWM frequency is 100Hz; that is, the LED flashes 100 times per
    second. You can change this where you define PWMLED by supplying the optional
    frequency parameter:


    ```

    led = PWMLED(18, frequency=1000)

    ```


    The value is in Hz, so in this case, the frequency is set to 1,000 Hz (1 kHz).


    Table 11-2 compares frequencies specified in the parameter to the actual frequencies
    on the pin measured with an oscilloscope.


    Table 11-2. Requested frequency against measured frequency


    | Requested frequency | Measured frequency |

    |---|---|

    | 50 Hz | 50 Hz |

    | 100 Hz | 98.7 Hz |

    | 200 Hz | 195 Hz |

    | 500 Hz | 470 Hz |

    | 1 kHz | 880 Hz |

    | 10 kHz | 4.2 kHz |


    You can see that the frequency becomes less accurate as it increases. This means
    that this PWM feature is no good for audio (20 Hz to 20 kHz), but plenty fast
    enough for controlling the brightness of LEDs or the speed of motors. If you want
    to experiment with this yourself, the program is in the code download and called
    ch_11_pwm_f_test.py.


    # See Also


    For more information on PWM, see Wikipedia.


    Recipe 11.11 uses PWM to change the color of an RGB LED, and Recipe 12.4 uses
    PWM to control the speed of a DC motor.


    For more information on using a breadboard and jumper wires with the Raspberry
    Pi, see Recipe 10.9. You can also control the brightness of the LED with a slider
    control—see Recipe 11.10.'
- md: '## 11.4 Switching a High-Power DC Device Using a Transistor


    ### Problem


    You want to control the current to a high-power, low-voltage DC device such as
    a 12V LED module.


    ### Solution


    These high-power LEDs use far too much current to power directly from a GPIO pin.
    They also require 12V rather than 3.3V. To control such a high-power load, you
    need to use a transistor.


    In this case, you’ll use a high-power type of transistor called a metal–oxide–semiconductor
    field-effect transistor (MOSFET), which costs less than a dollar but can handle
    loads up to 30 amps—many times more than is required for the high-power LEDs.
    The MOSFET used is a FQP30N06L (see “Transistors and Diodes” on page 565).


    Figure 11-3 shows how you can connect a MOSFET on a breadboard. Make sure that
    you correctly identify the positive and negative supply leads for the LED module.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_319_0.png)


    To make this recipe, you will need the following:


    - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page 564)

    - 1kΩ resistor (see “Resistors and Capacitors” on page 565)

    - FQP30N06L N-Channel MOSFET or TIP120 Darlington transistor (see “Transistors
    and Diodes” on page 565)

    - 12V power adapter

    - 12V DC LED module


    The Python code to turn the LED panel on and off is exactly the same as if we
    were controlling a single low-power LED without the MOSFET (see Recipe 11.1).


    You can also use PWM with the MOSFET to control the brightness of the LED module
    (see Recipe 11.3).


    ### Discussion


    Whenever you need to power anything significant using the GPIO connector, use
    batteries or an external power adapter. The GPIO connector can supply only relatively
    low currents (Recipe 10.3). In this case, you’ll use a 12V DC power adapter to
    provide the power to the LED panel. Pick a power adapter that has sufficient power
    handling. Thus, if the LED module is 5W, you need at least a 12V 5W power supply
    (6W would be better). If the power supply specifies a maximum current rather than
    power, you can calculate its power by multiplying the voltage by the maximum current.
    For instance, a 500mA 12V power supply can provide 6W of power.


    The resistor is necessary to ensure that the peak currents that occur as the MOSFET
    switches from off to on, and vice versa, do not overload the GPIO pin. The MOSFET
    switches the negative side of the LED panel, so the positive supply is connected
    directly to the positive side of the LED panel, and the negative side of the LED
    panel is connected to the drain of the MOSFET. The source connection of the MOSFET
    is connected to GND, and the MOSFET’s gate pin controls the flow of current from
    the drain to the source. If gate voltage is above 2V or so, the MOSFET will turn
    on, and current flows through both it and the LED module.


    > **Not Suitable for AC**

    >

    > *Do not* try to use this circuit for switching 110 or 220V AC. It won’t work
    and is extremely dangerous to try. Instead, use Recipe 11.7.


    The MOSFET used here is an FQP30N06L. The L at the end means that it is a logic-level
    MOSFET whose gate threshold voltage is suitable for use with 3.3V digital outputs.
    The non-L version of this MOSFET is also likely to work just fine, but you can’t
    guarantee that it will, as the specified range of gate threshold voltages is 2V
    to 4V. Therefore, if you were unlucky and got a MOSFET at the 4V end, it would
    not switch well.


    An alternative to using a MOSFET is to use a power Darlington transistor like
    the TIP120. This has a pinout compatible with the FQP30N06L, so you can keep the
    same breadboard layout.


    This circuit is suitable for controlling the power to other low-voltage DC devices.
    The only real exceptions are motors and relays, which require some extra treatment
    (see Recipe 11.5).


    ### See Also


    Check out the [datasheet for the MOSFET](datasheet).


    If you would like to create a graphical user interface with which to control your
    LED module, see Recipe 11.9 for a simple on/off control, and Recipe 11.10 for
    variable control of the brightness with a slider.


    ## 11.5 Switching a High-Power Device Using a Relay


    ### Problem


    You want to turn devices on and off that might not be suitable for switching with
    a MOSFET.


    ### Solution


    Use a relay and small transistor.


    Using a transistor by itself (Recipe 11.4) works well for medium loads of a few
    hundred mA or a bit more. But for higher currents or for situations when the controlling
    electronics need to be electrically isolated from the device being switched, it
    is more convenient to use a relay.


    Figure 11-4 shows how you can connect a transistor and relay on a breadboard.
    Make sure that both the transistor and diode are placed the right way. The diode
    has a stripe at one end, and the transistor used here has one flat side and one
    curved side.


    To make this recipe, you will need the following:


    - Breadboard and jumper wires (see “Prototyping Equipment and Kits” on page 564)

    - 1kΩ resistor (see “Resistors and Capacitors” on page 565)

    - Transistor 2N3904 (see “Transistors and Diodes” on page 565)

    - 1N4001 diode (see “Transistors and Diodes” on page 565)

    - 5V relay (see “Miscellaneous” on page 567)

    - Multimeter


    You can use the same LED blink program that you used in Recipe 11.1. If all is
    well, you’ll hear a click from the relay and a beep from the multimeter each time
    the contacts are closed. However, relays are slow mechanical devices, so don’t
    try to use them with pulse-width modulation (PWM): it can damage the relay.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_322_0.png)


    Figure 11-4. Using a relay with a Raspberry Pi


    ### Discussion


    Relays have been around since the early days of electronics and have the great
    advantage of being easy to use, plus they’ll work in any situation in which a
    switch would normally work—for example, when you’re switching AC (alternating
    current), or in situations for which the exact wiring of the device being switched
    is unknown.


    If the relay contacts are asked to exceed their specifications, the relay’s life
    will be shortened. There will be arcing, and the contacts can eventually fuse
    together.


    There is also the possibility of the relay becoming dangerously hot. When in doubt,
    overspecify the relay contacts.


    Figure 11-5 shows the schematic symbol, pin layout, and package of a typical relay.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_323_0.png)


    A relay is essentially a switch whose contacts are closed when an electromagnet
    pulls them together. Because the electromagnet and switch are not connected electrically
    in any way, this protects the circuit driving the relay coil from any high voltages
    on the switch side.


    The downside of relays is that they are slow to operate and will eventually wear
    out after many hundreds of thousands of operations. This means they are suitable
    only for slow on/off control, and not for fast switching like PWM.


    The coil of a relay requires about 50mA to close the connection. Because a Raspberry
    Pi GPIO pin is capable of supplying only about 3mA, you need to use a small transistor
    as a switch. You don''t need to use a high-power MOSFET like you did in Recipe
    11.4; you can just use a small transistor instead. This has three connections.
    The base (middle lead) is connected to the GPIO pin via a 1kΩ resistor to limit
    the current. The *emitter* is connected to GND, and the *collector* is connected
    to one side of the relay. The other side of the relay is connected to 5V on the
    GPIO connector. The diode is used to suppress any high-voltage pulses that occur
    when the transistor rapidly switches the power to the relay''s coil.


    > Although relays can be used to switch 110V or 220V AC, this voltage is very
    dangerous and should not be used on a breadboard. If you want to switch high voltages,
    use Recipe 11.7 instead.


    ### See Also


    For switching direct current (DC) using a power MOSFET, see Recipe 11.4.


    ## 11.6 Switching Using a Solid-State Relay


    ### Problem


    You want to use a solid-state (no moving parts) relay with your Raspberry Pi.


    ### Solution


    > **Not Suitable for High Voltage**

    >

    > The solution detailed here is only suitable for switching low-voltage (less
    than 16V) AC or DC. *You must not* use this with the domestic 110V or 220V AC
    supply.


    Connect a GPIO pin directly to the input of a solid-state relay (SSR) such as
    the MonkMakes SSR shown in Figure 11-6.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_324_0.png)


    The input to the SSR can be directly switched from a Raspberry Pi GPIO pin acting
    as a digital output. Then the Raspberry Pi GPIO pin connected to the SSR''s input
    goes to 3.3V, and the output switches on, just like an electromechanical relay.'
  mdcn: '## 11.4 使用晶体管切换大功率直流设备


    ### 问题


    你想要控制一个大功率、低电压直流设备（例如12V LED模块）的电流。


    ### 解决方案


    这些大功率LED的电流消耗太大，无法直接由GPIO引脚供电。它们还需要12V电压，而不是3.3V。要控制这样的大功率负载，你需要使用晶体管。


    在这种情况下，你将使用一种称为金属-氧化物-半导体场效应晶体管（MOSFET）的大功率晶体管，其成本不到一美元，但可以处理高达30安培的负载——这比大功率LED所需的电流高出许多倍。所使用的MOSFET型号是FQP30N06L（参见第565页的“晶体管和二极管”）。


    图11-3展示了如何在面包板上连接MOSFET。确保你正确识别了LED模块的正负电源引线。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_319_0.png)


    要制作这个方案，你需要以下物品：


    - 面包板和跳线（参见第564页的“原型设备和套件”）

    - 1kΩ电阻（参见第565页的“电阻和电容”）

    - FQP30N06L N沟道MOSFET或TIP120达林顿晶体管（参见第565页的“晶体管和二极管”）

    - 12V电源适配器

    - 12V直流LED模块


    用于开关LED面板的Python代码与我们控制单个低功率LED（不使用MOSFET）时完全相同（参见方案11.1）。


    你也可以将MOSFET与PWM结合使用来控制LED模块的亮度（参见方案11.3）。


    ### 讨论


    每当需要使用GPIO连接器为任何重要设备供电时，请使用电池或外部电源适配器。GPIO连接器只能提供相对较低的电流（方案10.3）。在这种情况下，你将使用12V直流电源适配器为LED面板供电。选择一个功率处理能力足够的电源适配器。因此，如果LED模块是5W，你至少需要一个12V
    5W的电源（6W会更好）。如果电源指定的是最大电流而不是功率，你可以通过电压乘以最大电流来计算其功率。例如，一个500mA 12V电源可以提供6W的功率。


    电阻是必要的，以确保MOSFET从关断切换到导通（反之亦然）时出现的峰值电流不会使GPIO引脚过载。MOSFET切换LED面板的负极侧，因此正电源直接连接到LED面板的正极侧，LED面板的负极侧连接到MOSFET的漏极。MOSFET的源极连接到GND，MOSFET的栅极引脚控制从漏极到源极的电流流动。如果栅极电压高于2V左右，MOSFET将导通，电流将通过它和LED模块。


    > **不适用于交流电**

    >

    > *不要*尝试使用此电路来切换110V或220V交流电。它不会工作，并且尝试这样做极其危险。请改用方案11.7。


    这里使用的MOSFET是FQP30N06L。末尾的L表示它是一个逻辑电平MOSFET，其栅极阈值电压适用于3.3V数字输出。该MOSFET的非L版本也可能工作正常，但你不能保证它一定可以，因为其规定的栅极阈值电压范围是2V到4V。因此，如果你运气不好，拿到了一个阈值电压在4V端的MOSFET，它将无法良好地切换。


    使用MOSFET的替代方案是使用功率达林顿晶体管，如TIP120。它的引脚排列与FQP30N06L兼容，因此你可以保持相同的面包板布局。


    此电路适用于控制其他低压直流设备的电源。唯一的真正例外是电机和继电器，它们需要一些额外的处理（参见方案11.5）。


    ### 另请参阅


    查看[MOSFET的数据手册](datasheet)。


    如果你想创建一个图形用户界面来控制你的LED模块，请参见方案11.9了解简单的开/关控制，以及方案11.10了解使用滑块进行亮度的可变控制。


    ## 11.5 使用继电器切换大功率设备


    ### 问题


    你想要开关可能不适合用MOSFET切换的设备。


    ### 解决方案


    使用继电器和小型晶体管。


    单独使用晶体管（方案11.4）对于几百毫安或稍多一点的中等负载效果很好。但对于更高的电流，或者当控制电子设备需要与被切换的设备在电气上隔离时，使用继电器更方便。


    图11-4展示了如何在面包板上连接晶体管和继电器。确保晶体管和二极管都放置正确。二极管一端有条纹，这里使用的晶体管有一面是平的，一面是弯曲的。


    要制作这个方案，你需要以下物品：


    - 面包板和跳线（参见第564页的“原型设备和套件”）

    - 1kΩ电阻（参见第565页的“电阻和电容”）

    - 晶体管2N3904（参见第565页的“晶体管和二极管”）

    - 1N4001二极管（参见第565页的“晶体管和二极管”）

    - 5V继电器（参见第567页的“杂项”）

    - 万用表


    你可以使用与方案11.1中相同的LED闪烁程序。如果一切正常，每次触点闭合时，你会听到继电器发出咔嗒声，万用表发出哔哔声。然而，继电器是缓慢的机械装置，因此不要尝试将它们与脉宽调制（PWM）一起使用：这可能会损坏继电器。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_322_0.png)


    图11-4. 将继电器与树莓派一起使用


    ### 讨论


    继电器自电子学早期就已存在，其最大优点是易于使用，并且在任何开关通常可以工作的场合都能工作——例如，当你切换交流电（AC）时，或者在被切换设备的确切接线未知的情况下。


    如果继电器触点被要求超过其规格，继电器的寿命将会缩短。会出现电弧，触点最终可能会熔合在一起。


    继电器也有可能变得危险地发热。如有疑问，请选择规格更高的继电器触点。


    图11-5展示了一个典型继电器的原理图符号、引脚布局和封装。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_323_0.png)


    继电器本质上是一个开关，当电磁铁将它们拉在一起时，其触点闭合。因为电磁铁和开关在电气上没有任何连接，这保护了驱动继电器线圈的电路免受开关侧任何高压的影响。


    继电器的缺点是它们操作缓慢，并且在经过数十万次操作后最终会磨损。这意味着它们只适用于缓慢的开/关控制，而不适用于像PWM这样的快速切换。


    继电器的线圈需要大约50mA才能闭合连接。因为树莓派GPIO引脚只能提供大约3mA的电流，你需要使用一个小晶体管作为开关。你不需要像方案11.4中那样使用高功率MOSFET；你可以只使用一个小晶体管。它有三个连接。基极（中间引脚）通过一个1kΩ电阻连接到GPIO引脚以限制电流。*发射极*连接到GND，*集电极*连接到继电器的一侧。继电器的另一侧连接到GPIO连接器上的5V。二极管用于抑制当晶体管快速切换继电器线圈电源时出现的任何高压脉冲。


    > 虽然继电器可以用来切换110V或220V交流电，但这种电压非常危险，不应在面包板上使用。如果你想切换高压，请改用方案11.7。


    ### 另请参阅


    关于使用功率MOSFET切换直流电（DC），请参见方案11.4。


    ## 11.6 使用固态继电器进行切换


    ### 问题


    你想在你的树莓派上使用固态（无活动部件）继电器。


    ### 解决方案


    > **不适用于高压**

    >

    > 此处详述的解决方案仅适用于切换低压（低于16V）交流或直流电。*你绝不能*将其用于家用110V或220V交流电源。


    将GPIO引脚直接连接到固态继电器（SSR）的输入端，例如图11-6所示的MonkMakes SSR。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_324_0.png)


    SSR的输入可以直接由作为数字输出的树莓派GPIO引脚切换。然后，连接到SSR输入的树莓派GPIO引脚变为3.3V，输出就会导通，就像机电继电器一样。'
