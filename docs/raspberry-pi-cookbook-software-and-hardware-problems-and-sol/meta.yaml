- md: "## Discussion\n\nThe keys variable contains a map of the key name for each\
    \ row and column position. You can customize this for your keypad.\n\nAll the\
    \ real action takes place in the get_key function. This enables each column in\
    \ turn by setting it to low. An inner loop then tests each of the rows in turn.\
    \ If one of the rows is low, the key name corresponding to that row and column\
    \ is looked up in the keys array. If no keypress is detected, the default value\
    \ of key (0) is returned.\n\nThe main while loop just gets the key value and prints\
    \ it. The sleep command slows down the output.\n\n## See Also\n\nAn alternative\
    \ to adding a keypad is simply to use a USB keyboard; that way you can just catch\
    \ keystrokes, as described in Recipe 13.11.\n\n## 13.9 Detecting Movement\n\n\
    ### Problem\n\nYou want to trigger some action in Python when movement is detected.\n\
    \n### Solution\n\nUse a passive infrared (PIR) motion detector module.\n\nTo make\
    \ this recipe, you will need the following:\n\n- Female-to-female jumper wires\
    \ (see “Prototyping Equipment and Kits” on page 564)\n- PIR motion detector module\
    \ (see “Modules” on page 566)\n\nFigure 13-14 shows how the sensor module is wired.\
    \ This module expects a power supply of 5V and has an output of 3.3V, making it\
    \ ideal for use with a Raspberry Pi.\n\n> Make sure that the PIR module you use\
    \ has a 3.3V output. If it has a 5V output, you will need to use a pair of resistors\
    \ to reduce it to 3.3V (see Recipe 14.8).\n\nOpen an editor and paste in the following\
    \ code (ch_13_pir.py):\n\n```\nfrom gpiozero import MotionSensor\n\npir = MotionSensor(18)\n\
    \nwhile True:\n    pir.wait_for_motion()\n    print(\"Motion detected!\")\n```\n\
    \nAs with all the program examples in this book, you can also download this program\
    \ (see Recipe 3.22).\n\nThe program simply prints out the state of the GPIO input\
    \ 18:\n\n```\n$ python3 ch_13_pir.py\nMotion Detected\nMotion Detected\n```\n\n\
    ### Discussion\n\ngpiozero provides a class for the PIR sensor, MotionSensor,\
    \ so we might as well use it. However, this class doesn't really do anything except\
    \ monitor the pin in question as a digital input.\n\nWhen triggered, the output\
    \ of the PIR sensor will stay high for a little while. You can adjust this using\
    \ one of the trimpots (variable resistors) on its circuit board. The second trimpot\
    \ (if present) will set the threshold of light level that will disable the sensor.\
    \ This is useful when the sensor is being used to control a light—turning the\
    \ light on when detecting movement, but only when it's dark.\n\n### See Also\n\
    \nMore information is available in the full documentation for MotionSensor.\n\n\
    You could combine this recipe with Recipe 7.16 to send an email when an intruder\
    \ is detected, or you could integrate it with If This Then That (IFTTT) to provide\
    \ a bevy of possible ways of being notified (see Recipe 17.4).\n\nTo detect movement\
    \ using computer vision and a webcam, see Recipe 8.6.\n\n## 13.10 Adding GPS to\
    \ the Raspberry Pi\n\n### Problem\n\nYou want to connect a serial GPS module to\
    \ a mobile Raspberry Pi and access the data using Python.\n\n### Solution\n\n\
    A serial GPS module, with 3.3V output, can be connected directly to Raspberry\
    \ Pi's RXD connection. This means that for it to work, you must follow Recipe\
    \ 2.6. Note that, although you need to enable the serial port hardware, you should\
    \ not enable the serial console option.\n\nFigure 13-15 shows how the module is\
    \ wired. The RXD of the Raspberry Pi connects to TX of the GPS module. The only\
    \ other connections are for GND and power, so we can use three female-to-female\
    \ headers.\n\n### Check Your Voltage\n\nSome GPS modules need a supply voltage\
    \ of 3.3V rather than the 5V shown as follows. So check before connecting.\n\n\
    You can see the raw GPS data using Minicom (see Recipe 10.8). Use the following\
    \ minicom command to see the messages appear once per second on the /dev/serial0\
    \ device:\n\n```\n$ minicom -b 9600 -o -D /dev/serial0\nWelcome to minicom 2.8\n\
    OPTIONS: I18n\nPort /dev/serial0, 12:55:56\nPress CTRL-A Z for help on special\
    \ keys\n$GPGGA,120346.694,5342.6175,N,00239.7791,W,1,04,5.6,84.4,M,51.3,M,,0000*7A\n\
    $GPGSA,A,3,01,03,31,04,,,,,,,,,,6.9,5.6,4.0*3E\n$GPGSV,3,1,12,04,63,150,23,03,56,078,41,19,46,263,23,17,39,226,18*79\n\
    $GPGSV,3,2,12,09,37,197,20,06,36,302,20,01,26,134,13,31,20,048,31*74\n$GPGSV,3,3,12,12,08,327,14,21,06,136,,11,04,304,,25,04,001,*72\n\
    $GPRMC,120346.694,A,5432.6175,N,00139.7791,W,002.8,084.6,060922,,*A*7F\n```\n\n\
    If you don't see any data, check your connections and make sure that the serial\
    \ port hardware is enabled. Note that it's fine to test that the GPS module is\
    \ basically working indoors without a GPS signal. But if you want to get an actual\
    \ GPS fix, you might need to take your Raspberry Pi outdoors, or at least have\
    \ the GPS module right next to a window.\n\nAs you can see from the preceding\
    \ sample, GPS messages require some decoding. The good news is that it's fairly\
    \ easy to spot the actual latitude and longitude figures in the various messages\
    \ that come from the GPS module. In the preceding example, you can see that the\
    \ message starting with $GPRMC has comma-separated fields, the third of which\
    \ is a number (5432.6175) followed by a letter (N or S). This is the latitude\
    \ in hundredths of a degree. The next two fields show the longitude in a similar\
    \ way.\n\nYou can find an example of accessing GPS data from a Python program\
    \ in *ch_13_gps_serial.py*:\n\n```\nimport serial\n\nser = serial.Serial('/dev/serial0')\n\
    \nwhile True:\n    line = ser.readline().decode(\"utf-8\")\n    message = line.split(',')\n\
    \    if message[0] == '$GPRMC':\n        if message[2] == 'A':\n            lat\
    \ = message[3] + message[4]\n            lon = message[5] + message[6]\n     \
    \       print(F\"lat={lat} \\tlon={lon}\")\n        else:\n            print(\"\
    No fix\")\n```\n\nAs with all the program examples in this book, you can also\
    \ download this program (see Recipe 3.22).\n\nRun the program and you should see\
    \ some trace like this. Remember it can take a while for the GPS module to get\
    \ a fix:\n\n```\n$ python3 -i ch_13_gps_serial.py\nNo fix\nNo fix\nlat=5432.6028N\
    \    lon=00139.0515W\nlat=5432.6028N    lon=00139.0514W\n```\n\n### Discussion\n\
    \nThe program reads every incoming message, looking for $GPRMC messages and then\
    \ splits the message into its component parts. The second element of the resulting\
    \ list will be A if the position is known.\n\nIf the position is known, the latitude\
    \ and longitude are.\n\n### See Also\n\nFind out more about the meaning of the\
    \ various fields in the [GPS messages](https://www.oreilly.com/library/view/raspberry-pi-cookbook/9781492048817/ch13.html#_gps_messages).\n\
    \nFor an interesting tutorial on GPS tracking using Python, see [https://oreil.ly/tSVi6](https://oreil.ly/tSVi6).\n\
    \n## 13.11 Intercepting Keypresses\n\n### Problem\n\nYou want to intercept individual\
    \ keypresses on a USB keyboard or numeric keypad.\n\n### Solution\n\nThere are\
    \ at least two ways to solve this problem. The more straightforward approach is\
    \ to use the `sys.stdin.read` function. This has the advantage over the other\
    \ method of not requiring a GUI to be running, so a program using it can be run\
    \ from an SSH session.\n\nOpen an editor, paste in the following code (`ch_13_keys_sys.py`),\
    \ run the program, and start pressing some keys:\n\n```\npython\nimport sys, tty,\
    \ termios\n\ndef read_ch():\n    fd = sys.stdin.fileno()\n    old_settings = termios.tcgetattr(fd)\n\
    \    try:\n        tty.setraw(sys.stdin.fileno())\n        ch = sys.stdin.read(1)\n\
    \    finally:\n        termios.tcsetattr(fd, termios.TCSADRAIN, old_settings)\n\
    \    return ch\n\nwhile True:\n    ch = read_ch()\n    if ch == 'x':\n       \
    \ break\n    print(\"key is: \" + ch)\n```\n\nAs with all the program examples\
    \ in this book, you can also download this program (see Recipe 3.22). To stop\
    \ the program, press the `x` key.\n\nThe alternative to this is to use `pygame`,\
    \ a Python library intended for writing games, which can also be used to detect\
    \ keypresses. You could then use this to perform some action.\n\nThe following\
    \ example program (`ch_13_keys_pygame.py`) illustrates the use of `pygame` to\
    \ print out a message each time a key is pressed. However, it works only if the\
    \ program has access to the windowing system, so you will need to run it using\
    \ VNC (Recipe 2.8) or run it directly on the Raspberry Pi:"
