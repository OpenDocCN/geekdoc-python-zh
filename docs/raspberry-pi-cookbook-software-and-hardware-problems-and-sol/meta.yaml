  md: "![](img/e36e77524aeaae366529d1cf02f9a39c_581_0.png)\n\nFigure 19-22. The Pimoroni\
    \ Badger RP2040 board\n\nIf you prefer your temperatures in degrees Fahrenheit,\
    \ use the program *ch_19_badger_f.py*. The temperature is likely to always be\
    \ shown a few degrees higher than the room temperature, as this is the temperature\
    \ of the chip, not the environment:\n\n```\npython\nimport badger2040\nfrom machine\
    \ import ADC\nfrom utime import sleep\n\nbadger = badger2040.Badger2040()\ntemp_sensor\
    \ = ADC(4)\npoints_per_volt = 3.3 / 65535\n\ndef read_temp_c():\n    reading =\
    \ temp_sensor.read_u16() * points_per_volt\n    temp_c = 27 - (reading - 0.706)/0.001721\n\
    \    return temp_c\n\nbadger.font(\"bitmap8\")\n\nold_t = 0\n\nwhile True:\n \
    \   t = round(read_temp_c())\n    if t != old_t:\n        old_t = t\n        badger.pen(255)\n\
    \        badger.clear()\n        badger.pen(0)\n```"
