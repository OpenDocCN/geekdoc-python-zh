    push switch (Figure 18-11) and reconnect the GND lead to power up the Sonoff from
    your Raspberry Pi. Once the Sonoff is powered up, release the push switch after
    a few seconds.


    The Sonoff''s LED should no longer be blinking. It''s now in flash mode, ready
    to receive a new program.


    2. Erase the Sonoff.


    Make sure that you are still in the *esptools* directory and run the command to
    erase the Sonoff. You should see messages in the Terminal like those shown here:


    ```

    $ cd ~/esptools

