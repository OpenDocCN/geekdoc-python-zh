    # 16.2 Controlling Where Sound Is Output


    # Problem


    You want to control which of several output options the Raspberry Pi will use
    when making sounds.


    # Solution


    The simplest way to set the audio output is to use the selector available when
    you right-click the Speaker icon in the upper-right corner of your desktop (Figure
    16-3).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_473_0.png)


    Note that the entry Comiso M20 in Figure 16-3 is for a Bluetooth speaker that
    has already been paired with the Raspberry Pi (see Recipe 1.17).


    # Discussion


    If you are running your Raspberry Pi headless (without a monitor), you can still
    control where the sound is output using the raspi-config command-line utility.


    Open a Terminal session and enter the following command:


    ```

    $ sudo raspi-config

    ```


    Then select the option System, followed by Audio. You can then select the option
    you want, as shown in Figure 16-4.'
