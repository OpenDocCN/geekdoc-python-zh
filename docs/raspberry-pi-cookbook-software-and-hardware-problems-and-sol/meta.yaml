  md: '# CHAPTER 15

    Displays


    # 15.0 Introduction


    Although the Raspberry Pi can use a monitor or TV as a display, it is often nice
    to use a smaller, more specialized display with it. In this chapter, we explore
    a range of different displays that can be attached to a Raspberry Pi.


    An alternative to attaching special-purpose displays as described in this chapter
    is to attach a monitor (this can be a small one) to your Raspberry Pi or even
    use a phone or tablet connected over VNC.


    # 15.1 Using a Four-Digit LED Display


    # Problem


    You want to display a four-digit number in an old-fashioned, seven-segment LED
    display.


    # Solution


    Attach an Inter-Integrated Circuit (I2C) LED module, such as the model shown in
    Figure 15-1, to a Raspberry Pi using female-to-female jumper wires.'
  merge: -1
  pgno: 452
- img_proc: true
  md: '![](img/e36e77524aeaae366529d1cf02f9a39c_453_0.png)


    Figure 15-1. Seven-segment LED display with a Raspberry Pi


    To make this recipe, you’ll need the following:


    +   - Four female-to-female jumper wires (see “Prototyping Equipment and Kits”
    on page 564)

    - Adafruit 4×7-segment LED with I2C backpack (see “Modules” on page 566)


    The connections between the Raspberry Pi and the module are as follows:


    +   - VCC (+) on the display to 5V on the Raspberry Pi general-purpose input/output
    (GPIO) connector

    - GND (-) on the display to GND on the Raspberry Pi GPIO connector

    - SDA (D) on the display to GPIO 2 (SDA) on the Raspberry Pi GPIO connector

    - SCL (C) on the display to GPIO 3 (SCL) on the Raspberry Pi GPIO connector


    Note that Adafruit also supplies a jumbo-size LED display. You can connect this
    to the Raspberry Pi using the connections in the preceding list, but the larger
    display has two positive power pins: one for the logic (V_IO) and one for the
    display (5V). This is because, being a large display, it requires more current.
    Fortunately, the Raspberry Pi can supply enough power for it. You can use an extra
    female-to-female jumper wire to connect this extra pin to the second 5V pin on
    the GPIO connector.


    For this recipe to work, you’ll also need to set up your Raspberry Pi for I2C,
    so follow Recipe 10.4 first.'
