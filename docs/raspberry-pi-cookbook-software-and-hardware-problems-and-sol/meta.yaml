  md: 'Attach your I2C device to the Pi and run the command:


    ```

    $ sudo i2cdetect -y 1

    ```


    Note that if you are using a very old Raspberry Pi revision 1 board, you need
    to change 1 to 0 in the preceding line of code.


    If I2C is available, you will see some output like that shown in Figure 10-9,
    which indicates that two I2C addresses are in use—0x68 and 0x70.


    > ## Hexadecimal


    Hexadecimal (or just *hex*) is a way of representing numbers using the number
    base 16 rather than the number base 10 that we use in everyday life.


    In hexadecimal, each digit can have one of sixteen possible values. In addition
    to the familiar digit values of 0 to 9, hex uses the letters A to F; the letter
    A represents decimal 10, and F decimal 15.


    There is no particular reason to use hex over decimal, except that in the unlikely
    event that you want to convert a number into binary, it''s much easier to do from
    hex than decimal.


    To avoid confusion as to whether a number is being represented in decimal or hex,
    it is common to prefix hex numbers with 0x. In the preceding example, the hex
    number 0x68 is (in decimal) 6 x 16 + 8 = 104, and 0x70 is 7 x 16 = 112.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_289_0.png)


    *Figure 10-9. i2c-tools*


    # Discussion


    i2cdetect is a useful diagnostic tool and worth running the first time you use
    a new I2C device.'
