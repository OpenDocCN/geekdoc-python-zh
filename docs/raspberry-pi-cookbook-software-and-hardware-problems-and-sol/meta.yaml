    \n## 17.4 使用IFTTT发送电子邮件和其他通知\n\n### 问题\n\n你希望有一种灵活的方式，让你的树莓派通过电子邮件、Facebook、Twitter或Slack发送通知。\n\
    \n### 解决方案\n\n让你的树莓派向If This Then That (IFTTT) *Maker*频道发送请求，以触发可配置的通知。\n\n本食谱通过一个示例进行说明：当你的树莓派CPU温度超过阈值时，会给你发送一封电子邮件。\n\
    \n在开始使用IFTTT之前，你需要创建一个账户，因此请访问[www.ifttt.com](https://www.ifttt.com)，注册一个免费账户并登录。\n\
    \n下一步是在IFTTT网站上创建一个新的IFTTT *applet*。Applet就像一条规则，例如*当我从树莓派收到一个网络请求时，发送一封电子邮件*。点击网页上的CREATE按钮。这将提示你首先输入食谱的IF\
