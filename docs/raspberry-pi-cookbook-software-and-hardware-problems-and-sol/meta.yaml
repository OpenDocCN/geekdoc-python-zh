    \n像这里使用的预训练模型依赖于成千上万个经过仔细分类的声音样本。然后，模型在这些样本以及其他背景噪音上进行仔细训练，以制作出能够有效识别不同声音的东西。\n\
    \n### 另请参阅\n\n参见食谱 9.4，了解如何添加你自己的代码以在检测到吹口哨时执行某些操作。\n\n参见食谱 9.6，了解如何训练你自己的网络来识别语音命令。\n\
    \n## 9.4 使用 TensorFlow Lite 对口哨声做出反应\n\n### 问题\n\n你希望你的树莓派在听到口哨声时运行一些你自己的 Python\
    \ 代码作为响应。\n\n### 解决方案\n\n首先，安装食谱 9.3 中的 TensorFlow 示例，然后修改示例 Python 程序。\n\n将文件\
    \ ch_09_detect_whistle.py 复制到声音分类示例的工作文件夹中。然后切换到该目录并使用以下命令运行程序：\n\n```\n$ cd ~/examples/lite/examples/sound_classification/raspberry_pi/\n\
    $ cp ~/raspberrypi_cookbook_ed4/python/ch_09_detect_whistle.py .\n$ python3 ch_09_detect_whistle.py\n\
    ```\n\n与本书中所有程序示例一样，你也可以下载此代码（参见食谱 3.22）。\n\n当你运行程序时，你会看到类似下面的内容。每次你在麦克风附近吹口哨时，你都会看到消息“检测到口哨声”：\n\
    \n```\n$ python3 ch_09_detect_whistle.py\nListening for Whistles...\nWhistling\
    \ Detected\n```\n\n### 讨论\n\n让我们看看这段代码：\n\n```\nimport time\nfrom tflite_support.task\
    \ import audio\nfrom tflite_support.task import core\nfrom tflite_support.task\
    \ import processor\n\nmodel = 'yamnet.tflite'\nnum_threads = 4\nscore_threshold\
    \ = 0.6\noverlapping_factor = 0.5\n\n# 初始化音频分类模型。\nbase_options = core.BaseOptions(\n\
    \    file_name=model, use_coral=False, num_threads=num_threads)\nclassification_options\
    \ = processor.ClassificationOptions(\n    max_results=1, score_threshold=score_threshold)\n\
    options = audio.AudioClassifierOptions(\n    base_options=base_options, classification_options=classification_options)\n\
    classifier = audio.AudioClassifier.create_from_options(options)\n\n# 初始化音频录音器和一个用于存储音频输入的张量。\n\
    audio_record = classifier.create_audio_record()\ntensor_audio = classifier.create_input_tensor_audio()\n\
    \n# 我们将尝试每隔 interval_between_inference 秒运行一次推理。\n# 这通常是模型输入长度的一半，以便在传入的音频片段之间创建重叠，\n\
    # 从而提高分类准确性。\ninput_length_in_second = float(len(\n    tensor_audio.buffer)) /\
    \ tensor_audio.format.sample_rate\ninterval_between_inference = input_length_in_second\
    \ * (1 - overlapping_factor)\npause_time = interval_between_inference * 0.1\n\
    last_inference_time = time.time()\n\n# 在后台开始音频录制。\naudio_record.start_recording()\n\
    \nprint('Listening for Whistles...')\n\nwhile True:\n    tensor_audio.load_from_audio_record(audio_record)\n\
    \    results = classifier.classify(tensor_audio)\n    if len(results.classifications)\
    \ > 0:\n        classification = results.classifications[0]\n        if len(classification.categories)\
    \ > 0:\n            top_category = classification.categories[0]\n            if\
    \ top_category.category_name == 'Whistling':\n                print('Whistling\
    \ Detected')\n    time.sleep(pause_time)\n```\n\n这段代码是 TensorFlow 示例的简化版本，与该示例一样，许多工作都隐藏在\
    \ AudioClassifier 类中，我们可以在我们的程序中利用它。\n\n音频分类器通过参数进行配置。大多数选项，如 `max_results` 和\
    \ `score_threshold`，都是显而易见的。`num_threads` 选项指定了专门用于运行示例代码的执行线程数（参见食谱 7.19），而 `enable_edge_tpu`\
    \ 仅在你将机器学习加速器硬件连接到你的树莓派时使用。\n\n该程序将定期获取音频样本，然后尝试推断其中是否存在口哨声。它使用重叠的时间窗口来完成此操作，以便更有可能不会错过任何口哨声。\n\
    \n主 while 循环检查是否到了再次寻找口哨声的时候。如果是，它会对音频进行分类，如果有结果，则检查它是否是口哨声。\n\n最后的 `time.sleep`\
    \ 允许你的树莓派处理器在再次需要进行分类之前处理其他事情一段时间。\n\n### 另请参阅\n\n要将你自己的代码接入视频分类，请参见食谱 9.2。\n\n\
    ## 9.5 安装 Edge Impulse\n\n### 问题\n\n你想使用 Edge Impulse 平台来训练你自己的机器学习模型，以便在你的树莓派上使用。\n\
    \n### 解决方案\n\nEdge Impulse 的大部分工作都在公司的服务器上进行，并通过其网站访问。要使用这些服务器，Edge Impulse 要求你创建一个账户，这并不过分。对于非商业“开发者”用途，这是免费的。\n\
    \n除了 EdgeImpulse 网站，我们还需要在我们的树莓派上安装软件的本地部分。在开始之前，最好确保你的树莓派操作系统是最新的（食谱 3.40）。\n\
    \n首先在终端窗口中运行以下命令：\n\n```\n$ curl -sL https://deb.nodesource.com/setup_12.x | sudo\
