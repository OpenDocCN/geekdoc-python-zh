    # CHAPTER 18


    # Home Automation


    # 18.0 Introduction


    As a low-cost and low-power device, a Raspberry Pi makes a great home automation
    hub that you can leave running without fear of huge electricity bills. For the
    recipes described in this chapter, you don''t need the power of a Raspberry Pi
    4 or 400. In fact, a Raspberry Pi 2 or 3 will be plenty fast enough and will run
    cooler and use less electricity than a Raspberry Pi 4.


    We start with Message Queuing Telemetry Transport (MQTT), the basic communication
    mechanism for most home automation systems, and then move on to look at using
    Node-RED (which you first met in Chapter 17) as a basis for home automation.


    Strictly speaking, home automation is all about making your home smarter and more
    able to do things for itself—for example, to turn on a light for a set amount
    of time when movement is detected, or to automatically turn everything off at
    bedtime. But most people who are interested in home automation are also interested
    in remote control of the parts of their home that have been automated. We also
    look at remote control by smartphone in this chapter.


    # 18.1 Making a Raspberry Pi into a Message Broker with Mosquitto


    # Problem


    You want to make your Raspberry Pi a hub for your home automation system capable
    of using the Mosquitto MQTT software.'
  - '[PAGE 511]


    # Solution


    Install the Mosquitto software so that your Raspberry Pi can act as an MQTT broker.

    Run the following commands to install Mosquitto and start it as a service so that
    it automatically starts when your Raspberry Pi reboots:


    ```

    $ sudo apt update

    $ sudo apt install -y mosquitto mosquitto-clients

    $ sudo systemctl enable mosquitto.service

    ```


    You can check to see whether everything is working by running the following command:


    ```

    $ mosquitto -v

    1656413574: mosquitto version 2.0.11 starting

    1656413574: Using default config.

    1656413574: Starting in local only mode. Connections will only be possible from
    clients running on this machine.

    1656413574: Create a configuration file which defines a listener to allow remote
    access.

    1656413574: For more details see https://mosquitto.org/documentation/authentication-methods/

    1656413574: Opening ipv4 listen socket on port 1883.

    1656413574: Error: Address already in use

    1656413574: Opening ipv6 listen socket on port 1883.

    1656413574: Error: Address already in use

    $

    ```


    The error message is not really an error; it just means that Mosquitto is already
    running because we started it as a service.


    # Discussion


    MQTT is a way of passing messages between one program and another. It has two
    parts:


    *Server*

    The central place where the passing of messages is controlled and messages are
    routed to the right recipient.


    *Client*

    A program that sends and receives messages to and from the server. Normally more
    than one client will be in a system.


    Messages are passed using what is called a *publish and subscribe* model. That
    is, a client that has something interesting to say (e.g., a sensor reading) tells
    the server by publishing the reading. Every few seconds, the client might take
    another reading and publish that, too.'
  - '[PAGE 512]


    Messages have a *topic* and a *payload*. In a system for automating lights, the
    topic might be *bedroom_light* and the payload *on* or *off*.


    You can try this out by opening two Terminals at the same time. One Terminal will
    act as the publisher and the other as a subscriber. You can see this in action
    in Figure 18-1.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_512_0.png)


    Figure 18-1. Two clients communicating using MQTT


    Let’s break this down. The Terminal on the left is the subscriber, and here we
    issue the command:


    ```


    $ mosquitto_sub -d -t pi_mqtt

    Client mosqsub/2007-raspberryp sending CONNECT

    Client mosqsub/2007-raspberryp received CONNACK

    Client mosqsub/2007-raspberryp sending SUBSCRIBE (Mid: 1, Topic: pi_mqtt, QoS:
    0)

    Client mosqsub/2007-raspberryp received SUBACK

    Subscribed (mid: 1): 0

    ```


    The `mosquitto_sub` command subscribes the client. The `-d` option specifies debug
    mode, which just means you will see a lot more output about what the client and
    server are doing; this is useful while you are making sure everything is working.
    The `-t pi_mqtt` option specifies the topic that the client is interested in as
    `pi_mqtt`.


    The debug trace shows that the client is connecting to the server without problems
    and that the client has requested to subscribe and the server has acknowledged
    the subscription.'
  - '[PAGE 513]


    Leave this Terminal session running and open a second Terminal session to act
    as a client that''s going to publish something on the topic pi_mqtt. Enter the
    following command in this new Terminal window:


    ```

    $ mosquitto_pub -d -t pi_mqtt -m "publishing hello"

    Client mosqpub/2199-raspberryp sending CONNECT

    Client mosqpub/2199-raspberryp received CONNACK

    Client mosqpub/2199-raspberryp sending PUBLISH (d0, q0, r0, m1, ''pi_mqtt'',

    ... (16 bytes))

    Client mosqpub/2199-raspberryp sending DISCONNECT

    ```


    Again, the -d and -t options specify debug mode and the topic, but this time there
    is an extra option of -m, which specifies a message to include in the publication.
    If the publisher were a sensor, the message might be the sensor reading.


    As soon as the mosquitto_pub command is sent, text like the following will appear
    in the first Terminal window (the subscriber):


    ```

    Client mosqsub/5170-raspberryp received PUBLISH (d0, q0, r0, m0, ''pi_mqtt'',

    ... (16 bytes))

    publishing hello

    ```


    # See Also


    For information on Mosquitto, see https://mosquitto.org.


    For other MQTT recipes in this chapter, see Recipes 18.2 and 18.5.


    # 18.2 Using Node-RED with an MQTT Server


    # Problem


    You want to combine Node-RED with an MQTT server to be able, for instance, to
    control a general-purpose input/output (GPIO) pin in response to MQTT message
    publications.


    # Solution


    Use a Node-RED “mqtt” node and an “rpi gpio” node in a Node-RED flow like the
    one shown in Figure 18-2.


    If you have not installed Node-RED, you can find instructions in Recipe 17.3.


    After you deploy this, you will be able to turn GPIO 18 on and off by sending
    mosquitto_pub commands. For testing purposes, attach an LED or Raspberry Squid
    LED to pin 18 (Recipe 11.1).


    The flow refers to kitchen lights, as this example pretends that GPIO 18 is being
    used with something like a PowerSwitch Tail (Recipe 11.7) to switch lighting on
    and off.'
- md: "Let's build the example up one node at a time.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_514_0.png)\n\
    \nStart by adding an “mqtt” node from the “input” category of Node-RED. Double-click\
    \ the node to edit it (Figure 18-3).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_514_1.png)\n\
    \nNotice that the Server field just has the option to “Add new mqtt-broker.” We\
    \ will return to this in a moment. For now, specify a topic (kitchen_lights) and\
    \ give the node a meaningful name. The QoS field allows you to set the quality\
    \ of service and determines how persistent the MQTT server is at getting messages\
    \ to their intended destination. Level 2 means guaranteed delivery.\n\nWe now\
    \ need to define an MQTT server for Node-RED, so click the edit (pencil) button\
    \ next to the Server field. This opens the window shown in Figure 18-4.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_515_0.png)\n\
    \nFigure 18-4. Adding an MQTT server to Node-RED\n\nGive the server a name and\
    \ enter localhost in the Server field. We can do this because Node-RED and the\
    \ MQTT server are running on the same Raspberry Pi.\n\nNow we can add the “rpi-gpio\
    \ out” node. You will find this in the Raspberry Pi section. After you have added\
    \ it to the flow, open it (Figure 18-5).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_516_0.png)\n\
    \nFigure 18-5. Editing the GPIO output node\n\nSelect “12 - GPIO 18” and give\
    \ the node a name before clicking Done. Drag the connector from the “mqtt in”\
    \ node to the Raspberry Pi GPIO node so that the flow looks like Figure 18-2.\n\
    \nClick the Deploy button and then open a Terminal session on the Raspberry Pi\
    \ to test the flow.\n\nType the following command in the Terminal window to publish\
    \ a request to turn on the light:\n\n```\n$ mosquitto_pub -d -t kitchen_lights\
    \ -m 1\n```\n\nThe LED on pin 18 should light. Then, to turn off the LED, send:\n\
    \n```\n$ mosquitto_pub -d -t kitchen_lights -m 0\n```\n\n## Discussion\n\nThis\
    \ recipe works only if the Raspberry Pi happens to be right next to the thing\
    \ you want to control. In reality, you are more likely to want to use a wireless\
    \ switch.\n\nIt is, however, useful to know how to control GPIO pins through MQTT\
    \ and Node-RED.\n\nNode-RED has the ability to import and export flows as JSON\
    \ text. All the flows used in this chapter are available on the book's [GitHub\
    \ pages](https://github.com/simonmonk/raspberrypi_cookbook_ed4).\n\nTo import\
    \ one of these flows into Node-RED, visit the GitHub page and then click the recipe\
    \ number corresponding to the flow that you want to import. For example, in Figure\
    \ 18-6 I have clicked *recipe_18_10.json*.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_517_0.png)\n\
    \nSelect the entire line in the code area and copy it to your clipboard. (Clicking\
    \ the Raw button just above the code can make it easier to select all of the code\
    \ for copying.) Then switch back to your Node-RED web page and select Import,\
    \ and then Clipboard from the Node-RED menu, as shown in Figure 18-7.\n\nThen\
    \ paste the code you copied from GitHub into the window shown in Figure 18-8 and\
    \ select “new flow.”\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_518_0.png)\n\n\
    Figure 18-7. Selecting the “Import from Clipboard” option\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_518_1.png)\n\
    \nFigure 18-8. Pasting the flow code into the “Import nodes” dialog box\n\nWhen\
    \ you click Import, the flow appears in a new tab (Figure 18-9).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_519_0.png)\n\
    \n*Figure 18-9. A newly imported flow*\n\n## See Also\n\nTo see how you can control\
    \ a WiFi switch using MQTT, see [Recipe 18.5](Recipe 18.5). To see a similar recipe\
    \ that uses Node-RED instead, see [Recipe 18.6](Recipe 18.6).\n\nRead more about\
    \ [MQTT QoS levels](MQTT QoS levels).\n\nFor more information, see the [full documentation\
    \ on Node-RED](full documentation on Node-RED).\n\n## 18.3 Flashing a Sonoff WiFi\
    \ Smart Switch for MQTT Use\n\n### Problem\n\nYou want to use a WiFi smart switch\
    \ with MQTT so that you can control domestic accessories directly from your Raspberry\
    \ Pi.\n\n### Solution\n\nFlash (install) new firmware (Tasmota) onto a low-cost\
    \ Sonoff WiFi switch, configure the switch through a web interface, and then control\
    \ it using MQTT.\n\nThe Sonoff web switches (shown in [Figure 18-10](Figure 18-10))\
    \ offer an extremely low-cost way of turning lighting and other appliances on\
    \ and off wirelessly.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_520_0.png)\n\
    \nFigure 18-10. The Sonoff WiFi switch\n\nHowever, the firmware pre-installed\
    \ on the Sonoff switches is proprietary and relies on servers in China for communication\
    \ to the internet. If you would prefer to have local control of your device and\
    \ actually improve over the original firmware, you should follow this recipe to\
    \ flash new open source firmware onto your Sonoff.\n\nYou can do all of this from\
    \ your Raspberry Pi, but you’ll need a few things:\n\n- A Sonoff Basic web switch\
    \ (see “Modules” on page 566)\n- A row of four header pins (see “Miscellaneous”\
    \ on page 567)\n- Four female-to-female jumper wires (see “Prototyping Equipment\
    \ and Kits” on page 564)\n- Soldering equipment and solder (see “Prototyping Equipment\
    \ and Kits” on page 564)\n\nYou will also need a Raspberry Pi 2 or later because\
    \ earlier Raspberry Pis are not able to provide enough current at 3.3V to power\
    \ the Sonoff.\n\n> **Danger: High Voltage**\n\nSwitching alternating current (AC)\
    \ using a Sonoff requires the connection of live wires to the Sonoff’s screw terminals.\
    \ This is electrician’s work and should be done only by someone qualified to do\
    \ so.\n\nFlash the Sonoff fresh out of its box, *before* it is wired into your\
    \ household electricity. You can configure it without connecting it to an AC supply.\
    \ The Raspberry Pi will power it.\n\nBefore you connect your Sonoff to AC, take\
    \ it apart, because you are going to need to solder a strip of four header pins\
    \ into the holes supplied on the Sonoff’s circuit board.\n\nFigure 18-11 shows\
    \ the position of the holes and also marks off the roles of the four header pins\
    \ we are interested in. In fact, they are a serial port of the Sonoff.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_521_0.png)\n\
    \nFigure 18-11. Inside a Sonoff WiFi switch\n\nNote that different versions of\
    \ the Sonoff have the serial interface in slightly different places. You may have\
    \ to look on the underside of the board for pads marked 3V, RX, TX, and GND to\
    \ find the serial interface.\n\nOnce the header pins are soldered in place, your\
    \ Sonoff will look something like Figure 18-12.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_521_1.png)\n\
    \nFigure 18-12. A Sonoff with header pins attached to its serial port\n\nYou now\
    \ need to connect the header pins on the Sonoff to the GPIO pins on your Raspberry\
    \ Pi as follows (use Figure 18-13 as a reference).\n\n- Sonoff 3.3V to Raspberry\
    \ Pi 3.3V\n- Sonoff RX to Raspberry Pi TXD\n- Sonoff TX to Raspberry Pi RXD\n\
    - Sonoff GND to Raspberry Pi GND\n\nFigure 18-13 shows a Raspberry Pi 400 connected\
    \ to the Sonoff using a GPIO adapter.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_522_0.png)\n\
    \nChanging the firmware (*flashing*) the Sonoff requires a piece of Python software\
    \ called esptool. To download it onto your Raspberry Pi, run the following command:\n\
    \n```\n$ git clone https://github.com/espressif/esptool.git\n$ cd esptool\n```\n\
    \nHaving downloaded the software, we also need to get the replacement Tasmota\
    \ firmware to flash onto the Sonoff. To do this, run the following command from\
    \ within the *esptool* directory.\n\n```\n$ wget https://github.com/arendst/Sonoff-Tasmota/releases/download/v6.6.0/sonoff-basic.bin\n\
    ```\n\nThis will fetch a file called *sonoff-basic.bin* into the *esptools* directory.\n\
    The remainder of the process is as follows:\n\n1. Put the Sonoff into *flash*\
    \ mode.\n   At the moment, the LED on your Sonoff will probably be happily flashing\
    \ away. To put the Sonoff into flash mode, disconnect the GND lead, press the\
    \ Sonoff’s push switch (Figure 18-11) and reconnect the GND lead to power up the\
    \ Sonoff from your Raspberry Pi. Once the Sonoff is powered up, release the push\
    \ switch after a few seconds.\n\nThe Sonoff's LED should no longer be blinking.\
    \ It's now in flash mode, ready to receive a new program.\n\n2. Erase the Sonoff.\n\
    \nMake sure that you are still in the *esptools* directory and run the command\
    \ to erase the Sonoff. You should see messages in the Terminal like those shown\
    \ here:\n\n```\n$ cd ~/esptools\n$ python3 esptool.py --port /dev/serial0 erase_flash\n\
    esptool.py v4.3-dev\nSerial port /dev/serial0\nConnecting...\nFailed to get PID\
    \ of a device on /dev/ttyS0, using standard reset sequence.\n......\nDetecting\
    \ chip type... Unsupported detection protocol, switching and trying again...\n\
    Connecting...\nFailed to get PID of a device on /dev/ttyS0, using standard reset\
    \ sequence.\n\nDetecting chip type... ESP8266\nChip is ESP8285N08\nFeatures: WiFi,\
    \ Embedded Flash\nCrystal is 26MHz\nMAC: c4:4f:33:eb:0f:73\nUploading stub...\n\
    Running stub...\nStub running...\nErasing flash (this may take a while)...\nChip\
    \ erase completed successfully in 1.4s\nHard resetting via RTS pin...\n```\n\n\
    3. Flash the Tasmota software onto the Sonoff.\n\nRun the command to flash the\
    \ *sonoff-basic.bin* file that you fetched earlier onto the Sonoff:\n\n```\n$\
    \ python3 esptool.py --port /dev/serial0 write_flash -fs 1MB -fm dout 0x0 sonoff-basic.bin\n\
    esptool.py v4.3-dev\nSerial port /dev/serial0\nConnecting...\nFailed to get PID\
    \ of a device on /dev/ttyS0, using standard reset sequence.\n......\nDetecting\
    \ chip type... Unsupported detection protocol, switching and trying again...\n\
    ```"
  mdcn: "让我们逐个节点来构建这个示例。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_514_0.png)\n\n\
    首先，从Node-RED的“input”类别中添加一个“mqtt”节点。双击该节点进行编辑（图18-3）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_514_1.png)\n\
    \n注意，Server字段目前只有一个选项：“Add new mqtt-broker”。我们稍后会回到这里。现在，先指定一个主题（kitchen_lights）并给节点起一个有意义的名字。QoS字段允许你设置服务质量，它决定了MQTT服务器将消息送达目标目的地的持久性。级别2意味着保证送达。\n\
    \n现在我们需要为Node-RED定义一个MQTT服务器，因此点击Server字段旁边的编辑（铅笔）按钮。这将打开如图18-4所示的窗口。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_515_0.png)\n\
    \n图18-4. 向Node-RED添加MQTT服务器\n\n给服务器起个名字，并在Server字段中输入localhost。我们可以这样做，因为Node-RED和MQTT服务器运行在同一台树莓派上。\n\
    \n现在我们可以添加“rpi-gpio out”节点。你可以在Raspberry Pi部分找到它。将其添加到流程后，打开它（图18-5）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_516_0.png)\n\
    \n图18-5. 编辑GPIO输出节点\n\n选择“12 - GPIO 18”，并在点击Done之前给节点起个名字。将连接线从“mqtt in”节点拖到树莓派GPIO节点，使流程看起来像图18-2。\n\
    \n点击Deploy按钮，然后在树莓派上打开一个终端会话来测试流程。\n\n在终端窗口中输入以下命令，发布一个开灯请求：\n\n```\n$ mosquitto_pub\
    \ -d -t kitchen_lights -m 1\n```\n\n引脚18上的LED应该会亮起。然后，要关闭LED，发送：\n\n```\n$ mosquitto_pub\
    \ -d -t kitchen_lights -m 0\n```\n\n## 讨论\n\n这个方法只有在树莓派恰好位于你要控制的设备旁边时才有效。实际上，你更可能想使用无线开关。\n\
    \n然而，了解如何通过MQTT和Node-RED控制GPIO引脚是很有用的。\n\nNode-RED能够将流程导入和导出为JSON文本。本章中使用的所有流程都可以在本书的[GitHub页面](https://github.com/simonmonk/raspberrypi_cookbook_ed4)上找到。\n\
    \n要将其中一个流程导入Node-RED，请访问GitHub页面，然后点击与你要导入的流程对应的食谱编号。例如，在图18-6中，我点击了*recipe_18_10.json*。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_517_0.png)\n\n在代码区域中选择整行并将其复制到剪贴板。（点击代码上方的Raw按钮可以使选择所有代码进行复制更容易。）然后切换回你的Node-RED网页，从Node-RED菜单中选择Import，然后选择Clipboard，如图18-7所示。\n\
    \n然后将你从GitHub复制的代码粘贴到图18-8所示的窗口中，并选择“new flow”。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_518_0.png)\n\
    \n图18-7. 选择“Import from Clipboard”选项\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_518_1.png)\n\
    \n图18-8. 将流程代码粘贴到“Import nodes”对话框中\n\n当你点击Import时，流程将出现在一个新标签页中（图18-9）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_519_0.png)\n\
    \n*图18-9. 新导入的流程*\n\n## 另请参阅\n\n要了解如何使用MQTT控制WiFi开关，请参阅[食谱18.5](Recipe 18.5)。要查看使用Node-RED的类似食谱，请参阅[食谱18.6](Recipe\
    \ 18.6)。\n\n阅读更多关于[MQTT QoS级别](MQTT QoS levels)的信息。\n\n更多信息，请参阅[Node-RED完整文档](full\
    \ documentation on Node-RED)。\n\n## 18.3 为MQTT使用刷写Sonoff WiFi智能开关\n\n### 问题\n\n\
    你想将WiFi智能开关与MQTT一起使用，以便可以直接从树莓派控制家用配件。\n\n### 解决方案\n\n将新固件（Tasmota）刷写（安装）到低成本的Sonoff\
    \ WiFi开关上，通过Web界面配置开关，然后使用MQTT控制它。\n\nSonoff Web开关（如[图18-10](Figure 18-10)所示）提供了一种极其低成本的方式来无线开关照明和其他电器。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_520_0.png)\n\n图18-10. Sonoff WiFi开关\n\
    \n然而，Sonoff开关上预装的固件是专有的，并依赖于中国的服务器进行互联网通信。如果你更希望对设备进行本地控制，并且实际上改进原始固件，你应该按照这个食谱将新的开源固件刷写到你的Sonoff上。\n\
    \n你可以从树莓派上完成所有这些操作，但你需要一些东西：\n\n- 一个Sonoff Basic Web开关（参见第566页的“模块”）\n- 一排四个排针（参见第567页的“杂项”）\n\
    - 四根母对母跳线（参见第564页的“原型设备和套件”）\n- 焊接设备和焊料（参见第564页的“原型设备和套件”）\n\n你还需要一个树莓派2或更高版本，因为早期的树莓派无法在3.3V下提供足够的电流来为Sonoff供电。\n\
    \n> **危险：高压**\n\n使用Sonoff切换交流电（AC）需要将火线连接到Sonoff的螺丝端子。这是电工的工作，应仅由有资格的人完成。\n\n\
    在Sonoff开箱后，*在*将其接入家庭电路之前对其进行刷写。你可以在不连接交流电源的情况下对其进行配置。树莓派将为其供电。\n\n在将Sonoff连接到交流电之前，请将其拆开，因为你需要将一排四个排针焊接到Sonoff电路板上提供的孔中。\n\
    \n图18-11显示了孔的位置，并标记了我们感兴趣的四个排针的作用。实际上，它们是Sonoff的一个串行端口。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_521_0.png)\n\
    \n图18-11. Sonoff WiFi开关内部\n\n请注意，不同版本的Sonoff的串行接口位置略有不同。你可能需要查看电路板的背面，找到标有3V、RX、TX和GND的焊盘来找到串行接口。\n\
    \n一旦排针焊接到位，你的Sonoff看起来会像图18-12。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_521_1.png)\n\
    \n图18-12. 串行端口上连接了排针的Sonoff\n\n现在你需要将Sonoff上的排针连接到树莓派的GPIO引脚，如下所示（以图18-13为参考）。\n\
    \n- Sonoff 3.3V 连接到 树莓派 3.3V\n- Sonoff RX 连接到 树莓派 TXD\n- Sonoff TX 连接到 树莓派 RXD\n\
    - Sonoff GND 连接到 树莓派 GND\n\n图18-13显示了使用GPIO适配器连接到Sonoff的树莓派400。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_522_0.png)\n\
    \n更改Sonoff的固件（*刷写*）需要一个名为esptool的Python软件。要将其下载到你的树莓派上，请运行以下命令：\n\n```\n$ git\
    \ clone https://github.com/espressif/esptool.git\n$ cd esptool\n```\n\n下载软件后，我们还需要获取要刷写到Sonoff上的替代Tasmota固件。为此，请在*esptool*目录中运行以下命令。\n\
    \n```\n$ wget https://github.com/arendst/Sonoff-Tasmota/releases/download/v6.6.0/sonoff-basic.bin\n\
    ```\n\n这将获取一个名为*sonoff-basic.bin*的文件到*esptools*目录中。\n剩余过程如下：\n\n1. 将Sonoff置于*刷写*模式。\n\
    \   目前，你的Sonoff上的LED可能正在愉快地闪烁。要将Sonoff置于刷写模式，请断开GND导线，按下Sonoff的按钮开关（图18-11），然后重新连接GND导线，从树莓派为Sonoff上电。Sonoff上电后，几秒钟后松开按钮开关。\n\
    \nSonoff的LED应该不再闪烁。它现在处于刷写模式，准备接收新程序。\n\n2. 擦除Sonoff。\n\n确保你仍在*esptools*目录中，并运行命令擦除Sonoff。你应该在终端中看到如下所示的消息：\n\
    \n```\n$ cd ~/esptools\n$ python3 esptool.py --port /dev/serial0 erase_flash\n\
