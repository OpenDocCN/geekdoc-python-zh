    \n### 另请参阅\n\n要使用热敏电阻测量温度，请参见配方14.3。\n\n要使用TMP36测量温度，请参见配方14.10。\n\n要使用Sense HAT测量温度，请参见配方14.12。\n\
    \n要使用数字温度传感器（DS18B20）测量温度，请参见配方14.13。\n\n## 14.12 使用Sense HAT测量温度、湿度和气压\n\n###\
