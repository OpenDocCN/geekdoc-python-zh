    # 8.4 Counting Coins


    # Problem


    You want to use computer vision to count the number of coins in your webcam''s
    view.


    # Solution


    Use OpenCV''s *Hough Circles* detector to provide a real-time count of the number
    of coins placed within view of the webcam. Hough Circles will detect any type
    of circles, and works well detecting most coins.


    This is one use of CV for which you really need good lighting and a camera fixed
    in position. I used the setup shown in Figure 8-1.


    The critical part of many computer vision projects is getting the parameters right
    and this recipe is no exception. For this reason, before using the final program
    that just gives a count of coins, we will use a test program that draws outlines
    around the coins, so that we can see what''s going on.


    You can find the code for this example, as well as the other examples in this
    recipe, with the downloads for the book (see Recipe 3.22). The program is called
    ch_08_coin_count_test.py.


    Put some coins under your camera and run the program. A window like that in Figure
    8-2 should appear.'
