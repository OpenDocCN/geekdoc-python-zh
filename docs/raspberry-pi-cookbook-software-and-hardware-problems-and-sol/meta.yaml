    so follow Recipe 10.4 first.'
- md: "Enter these commands to install the Adafruit code to support this display:\n\
    \n```\n$ cd ~\n$ pip3 install adafruit-blinka\n$ pip3 install adafruit-circuitpython-ht16k33\n\
    $ sudo apt install python3-pil\n```\n\nAs a simple example, the program *ch_15_7_seg.py*\
    \ counts up from 0 to 9999 once a second and then restarts at 0:\n\n```\nimport\
    \ board\nfrom adafruit_ht16k33.segments import Seg7x4\nfrom time import sleep\n\
    \ni2c = board.I2C()\ndisplay = Seg7x4(i2c)\ndisplay.brightness = 0.5\n\nx = 0\n\
    \nwhile True:\n    display.print(\"    \")\n    display.print(x)\n    x += 1\n\
    \    if x > 9999:\n        x = 0\n    sleep(1)\n```\n\nAs with all the program\
    \ examples in this book, you can also download this code (see [Recipe 3.22](Recipe\
    \ 3.22)).\n\n## Discussion\n\nThe Adafruit software for this display uses the\
    \ Blinka module that allows you to run Adafruit's CircuitPython libraries in regular\
    \ Python.\n\nTo set up the display, an I2C instance is created, and then a Seg7x4\
    \ instance is created with the I2C interface as a parameter.\n\nThe display can\
    \ show numbers or rudimentary text. It displays text and numbers sequentially,\
    \ without clearing the previous display, so if you asked it to display 1 and then\
    \ 2, it would actually display 12, scrolling the old digits to the left before\
    \ displaying the new digit. So, to clear the display before showing the next digit,\
    \ you can print four spaces using `display.print(\"    \")`.\n\n## See Also\n\n\
    Find out more about the [Adafruit CircuitPython library](Adafruit CircuitPython\
    \ library).\n\n## 15.2 Displaying Graphics on an I2C LED Matrix\n\n### Problem\n\
    \nYou want to control the pixels of a multicolor LED matrix display.\n\n### Solution\n\
    \nUse an I2C LED module, such as the model shown in Figure 15-2, attached to a\
    \ Raspberry Pi using female-to-female jumper wires.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_455_0.png)\n\
    \nFigure 15-2. LED matrix display with a Raspberry Pi 400 and GPIO adapter\n\n\
    To make this recipe, you’ll need the following:\n\n- Four female-to-female jumper\
    \ wires (see “Prototyping Equipment and Kits” on page 564)\n- Adafruit bicolor\
    \ LED square-pixel matrix with I2C backpack (see “Modules” on page 566)\n- If\
    \ you are using a Pi 400 as shown in Figure 15-2, you will also need a GPIO adapter\
    \ to be able to access the pins easily.\n\nThe connections between the Raspberry\
    \ Pi and the module are as follows:\n\n- VCC (+) on the display to 5V on the Raspberry\
    \ Pi GPIO connector\n- GND (-) on the display to GND on the Raspberry Pi GPIO\
    \ connector\n- SDA (D) on the display to GPIO 2 (SDA) on the Raspberry Pi GPIO\
    \ connector\n- SCL (C) on the display to GPIO 3 (SCL) on the Raspberry Pi GPIO\
    \ connector\n\nFor this recipe to work, you will also need to set up your Raspberry\
    \ Pi for I2C, so follow Recipe 10.4 first.\n\nThe display uses the same module\
    \ code as Recipe 15.1. If you have not already installed it, run the following\
    \ commands:\n\n```\n$ cd ~\n$ pip3 install adafruit-blinka\n$ pip3 install adafruit-circuitpython-ht16k33\n\
    $ sudo apt install python3-pil\n```\n\nThe example program ch_15_matrix.py sets\
    \ a randomly selected pixel to a randomly selected color from off: red, green,\
    \ or orange. It does this 10 times a second:\n\n```\nimport board\nfrom adafruit_ht16k33.matrix\
    \ import Matrix8x8x2\nfrom time import sleep\nfrom random import randint\n\ni2c\
    \ = board.I2C()\ndisplay = Matrix8x8x2(i2c)\ndisplay.brightness = 0.5\n\nwhile\
    \ True:\n    x = randint(0, 8)\n    y = randint(0, 8)\n    color = randint(0,\
    \ 4)\n    display[x, y] = color\n    sleep(0.1)\n```\n\nAs with all the program\
    \ examples in this book, you can also download this code (see Recipe 3.22).\n\n\
    ### Discussion\n\nThe program imports the Matrix8x8x2 class, which is then initialized\
    \ with the I2C port. x and y coordinates are selected at random, each from a value\
    \ of 0 to 7. The color is a randomly selected number between 0 and 3: 0 is off,\
    \ 1 is red, 2 is green, and 3 is orange (both red and green). These are the only\
    \ colors available on this display, but it still looks pretty!\n\n### See Also\n\
    \nYou can find out more about the I2C LED module at https://oreil.ly/yA49j.\n\n\
    ## 15.3 Using the Sense HAT LED Matrix Display\n\n### Problem\n\nYou want to display\
    \ messages and graphics using the display of a Sense HAT.\n\n### Solution\n\n\
    Follow Recipe 10.15 to install the software that the Sense HAT needs and then\
    \ use the library commands to display text.\n\nThe program ch_15_sense_hat_clock.py\
    \ illustrates this by repeatedly displaying the date and time in a scrolling message:\n\
    \n```\nfrom sense_hat import SenseHat\nfrom datetime import datetime\nimport time\n\
    \nhat = SenseHat()\ntime_color = (0, 255, 0) # green\ndate_color = (255, 0, 0)\
    \ # red\n\nwhile True:\n    now = datetime.now()\n    date_message = '{:%d %B\
    \ %Y}'.format(now)\n    time_message = '{:%H:%M:%S}'.format(now)\n\n    hat.show_message(date_message,\
    \ text_colour=date_color)\n    hat.show_message(time_message, text_colour=time_color)\n\
    ```\n\nAs with all the program examples in this book, you can also download this\
    \ program (see Recipe 3.22).\n\n### Discussion\n\nTwo colors are defined so that\
    \ the date and time parts of the message can be displayed in different colors.\
    \ These colors are then used as an optional parameter to show_message. Other optional\
    \ parameters to show_message are:\n\n**scroll_speed**\nThis is actually the delay\
    \ between each scrolling step rather than the speed. A higher value makes the\
    \ scrolling slower.\n\n**back_colour**\nThis sets the background color. Note the\
    \ British spelling of “colour,” with a “u.”\n\nYou can use the display for a lot\
    \ more than just displaying scrolling text. Starting at its most basic, you can\
    \ set individual pixels using `set_pixel`, set the orientation of the display\
    \ using `set_rotation`, and display an image (albeit a small one) with `load_image`.\
    \ The example that follows, which you can find in `ch_15_sense_hat_taster.py`,\
    \ illustrates these function calls. As with all the program examples in this book,\
    \ you can download them (see Recipe 3.22).\n\nThe image must be just 8×8 pixels,\
    \ but you can use most common graphics formats, such as `.jpg` and `.png`, and\
    \ the bit depth will be handled automatically:\n\n```\nfrom sense_hat import SenseHat\n\
    import time\n\nhat = SenseHat()\n\nred = (255, 0, 0)\n\nhat.load_image('small_image.png')\n\
    time.sleep(1)\nhat.set_rotation(90)\ntime.sleep(1)\nhat.set_rotation(180)\ntime.sleep(1)\n\
    hat.set_rotation(270)\ntime.sleep(1)\n\nhat.clear()\nhat.set_rotation(0)\nfor\
    \ xy in range(0, 8):\n    hat.set_pixel(xy, xy, red)\n    hat.set_pixel(xy, 7-xy,\
    \ red)\n```\n\nFigure 15-3 shows the Sense HAT displaying a crude image.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_459_0.png)\n\
    \nFigure 15-3. A Sense HAT displaying an “image”\n\n### See Also\n\nMore information\
    \ is available in the [full documentation on the Sense HAT](https://pythonhosted.org/sense-hat/).\n\
    \nFor information on formatting dates and times, see [Recipe 7.2](https://example.com/recipe-7.2).\n\
    \nOther recipes that use the Sense HAT are Recipes [10.15](https://example.com/recipe-10.15),\
    \ [14.12](https://example.com/recipe-14.12), [14.15](https://example.com/recipe-14.15),\
    \ [14.16](https://example.com/recipe-14.16), and [14.18](https://example.com/recipe-14.18).\n\
    \n## 15.4 Using an OLED Graphical Display\n\n### Problem\n\nYou want to attach\
    \ a graphical OLED (organic LED) display to your Raspberry Pi.\n\n### Solution\n\
    \nUse an OLED display based on the SSD1306 driver chip, using an I2C interface\
    \ ([Figure 15-4](https://example.com/figure-15-4)).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_460_0.png)\n\
    \nFigure 15-4. An I2C OLED display on a Raspberry Pi 400\n\nTo make this recipe,\
    \ you will need the following:\n\n- Four female-to-female jumper wires (see “Prototyping\
    \ Equipment and Kits” on page 564)\n- I2C OLED display 128×64 pixels (see “Modules”\
    \ on page 566)\n\nThe connections between the Raspberry Pi and the module are\
    \ as follows:\n\n- VCC on the display to 5V on the Raspberry Pi GPIO connector\n\
    - GND on the display to GND on the Raspberry Pi GPIO connector\n- SDA on the display\
    \ to GPIO 2 (SDA) on the Raspberry Pi GPIO connector\n- SCL on the display to\
    \ GPIO 3 (SCL) on the Raspberry Pi GPIO connector\n\nFor this recipe to work,\
    \ you will also need to set up your Raspberry Pi for I2C, so follow Recipe 10.4\
    \ first.\n\nAdafruit has a library for these displays, which you can install using\
    \ these commands:\n\n```\n$ cd ~\n$ pip3 install adafruit-blinka\n$ pip3 install\
    \ adafruit-circuitpython-ssd1306\n```"
  mdcn: "输入以下命令来安装支持此显示屏的Adafruit代码：\n\n```\n$ cd ~\n$ pip3 install adafruit-blinka\n\
    $ pip3 install adafruit-circuitpython-ht16k33\n$ sudo apt install python3-pil\n\
    ```\n\n作为一个简单的示例，程序 *ch_15_7_seg.py* 每秒从0计数到9999，然后重新从0开始：\n\n```\nimport board\n\
    from adafruit_ht16k33.segments import Seg7x4\nfrom time import sleep\n\ni2c =\
    \ board.I2C()\ndisplay = Seg7x4(i2c)\ndisplay.brightness = 0.5\n\nx = 0\n\nwhile\
    \ True:\n    display.print(\"    \")\n    display.print(x)\n    x += 1\n    if\
    \ x > 9999:\n        x = 0\n    sleep(1)\n```\n\n与本书中所有的程序示例一样，你也可以下载此代码（参见[配方\
    \ 3.22](Recipe 3.22)）。\n\n## 讨论\n\n用于此显示屏的Adafruit软件使用了Blinka模块，该模块允许你在常规Python中运行Adafruit的CircuitPython库。\n\
    \n要设置显示屏，首先创建一个I2C实例，然后使用I2C接口作为参数创建一个Seg7x4实例。\n\n显示屏可以显示数字或基本文本。它按顺序显示文本和数字，不会清除之前的显示内容，因此如果你让它先显示1再显示2，它实际上会显示12，将旧数字向左滚动后再显示新数字。所以，要在显示下一个数字前清除显示屏，你可以使用\
    \ `display.print(\"    \")` 打印四个空格。\n\n## 另请参阅\n\n了解更多关于 [Adafruit CircuitPython\
    \ 库](Adafruit CircuitPython library) 的信息。\n\n## 15.2 在I2C LED矩阵上显示图形\n\n### 问题\n\
    \n你想控制一个多色LED矩阵显示屏的像素。\n\n### 解决方案\n\n使用一个I2C LED模块，例如图15-2所示的型号，通过母对母跳线连接到树莓派。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_455_0.png)\n\n图15-2. 连接到树莓派400和GPIO适配器的LED矩阵显示屏\n\
    \n要制作此配方，你需要以下物品：\n\n- 四根母对母跳线（参见第564页的“原型设备和套件”）\n- Adafruit双色LED方形像素矩阵，带I2C背包（参见第566页的“模块”）\n\
    - 如果你使用的是如图15-2所示的Pi 400，你还需要一个GPIO适配器以便轻松访问引脚。\n\n树莓派与模块之间的连接如下：\n\n- 显示屏上的VCC\
    \ (+) 连接到树莓派GPIO连接器的5V\n- 显示屏上的GND (-) 连接到树莓派GPIO连接器的GND\n- 显示屏上的SDA (D) 连接到树莓派GPIO连接器的GPIO\
    \ 2 (SDA)\n- 显示屏上的SCL (C) 连接到树莓派GPIO连接器的GPIO 3 (SCL)\n\n要使此配方正常工作，你还需要为树莓派设置I2C，因此请先按照配方10.4进行操作。\n\
    \n此显示屏使用与配方15.1相同的模块代码。如果你尚未安装，请运行以下命令：\n\n```\n$ cd ~\n$ pip3 install adafruit-blinka\n\
    $ pip3 install adafruit-circuitpython-ht16k33\n$ sudo apt install python3-pil\n\
    ```\n\n示例程序 ch_15_matrix.py 将一个随机选择的像素设置为随机选择的颜色，颜色可以是关闭、红色、绿色或橙色。它每秒执行此操作10次：\n\
    \n```\nimport board\nfrom adafruit_ht16k33.matrix import Matrix8x8x2\nfrom time\
    \ import sleep\nfrom random import randint\n\ni2c = board.I2C()\ndisplay = Matrix8x8x2(i2c)\n\
    display.brightness = 0.5\n\nwhile True:\n    x = randint(0, 8)\n    y = randint(0,\
    \ 8)\n    color = randint(0, 4)\n    display[x, y] = color\n    sleep(0.1)\n```\n\
    \n与本书中所有的程序示例一样，你也可以下载此代码（参见配方3.22）。\n\n### 讨论\n\n该程序导入了Matrix8x8x2类，然后使用I2C端口对其进行初始化。x和y坐标是随机选择的，每个值的范围是0到7。颜色是一个0到3之间的随机数：0表示关闭，1表示红色，2表示绿色，3表示橙色（红色和绿色）。这些是此显示屏上唯一可用的颜色，但它看起来仍然很漂亮！\n\
    \n### 另请参阅\n\n你可以在 https://oreil.ly/yA49j 找到更多关于I2C LED模块的信息。\n\n## 15.3 使用Sense\
    \ HAT LED矩阵显示屏\n\n### 问题\n\n你想使用Sense HAT的显示屏来显示消息和图形。\n\n### 解决方案\n\n按照配方10.15安装Sense\
    \ HAT所需的软件，然后使用库命令来显示文本。\n\n程序 ch_15_sense_hat_clock.py 通过重复显示滚动消息中的日期和时间来说明这一点：\n\
    \n```\nfrom sense_hat import SenseHat\nfrom datetime import datetime\nimport time\n\
    \nhat = SenseHat()\ntime_color = (0, 255, 0) # 绿色\ndate_color = (255, 0, 0) #\
    \ 红色\n\nwhile True:\n    now = datetime.now()\n    date_message = '{:%d %B %Y}'.format(now)\n\
    \    time_message = '{:%H:%M:%S}'.format(now)\n\n    hat.show_message(date_message,\
    \ text_colour=date_color)\n    hat.show_message(time_message, text_colour=time_color)\n\
    ```\n\n与本书中所有的程序示例一样，你也可以下载此程序（参见配方3.22）。\n\n### 讨论\n\n定义了两种颜色，以便消息的日期和时间部分可以显示为不同的颜色。然后这些颜色被用作show_message的可选参数。show_message的其他可选参数有：\n\
    \n**scroll_speed**\n这实际上是每个滚动步骤之间的延迟，而不是速度。较高的值会使滚动变慢。\n\n**back_colour**\n这设置背景颜色。注意“colour”的英式拼写，带有一个“u”。\n\
    \n你可以将显示屏用于远不止显示滚动文本的功能。从最基本的功能开始，你可以使用 `set_pixel` 设置单个像素，使用 `set_rotation` 设置显示屏的方向，以及使用\
    \ `load_image` 显示图像（尽管很小）。下面的示例（你可以在 `ch_15_sense_hat_taster.py` 中找到）说明了这些函数调用。与本书中所有的程序示例一样，你可以下载它们（参见配方3.22）。\n\
    \n图像必须是8×8像素，但你可以使用大多数常见的图形格式，如 `.jpg` 和 `.png`，位深度将自动处理：\n\n```\nfrom sense_hat\
    \ import SenseHat\nimport time\n\nhat = SenseHat()\n\nred = (255, 0, 0)\n\nhat.load_image('small_image.png')\n\
    time.sleep(1)\nhat.set_rotation(90)\ntime.sleep(1)\nhat.set_rotation(180)\ntime.sleep(1)\n\
    hat.set_rotation(270)\ntime.sleep(1)\n\nhat.clear()\nhat.set_rotation(0)\nfor\
    \ xy in range(0, 8):\n    hat.set_pixel(xy, xy, red)\n    hat.set_pixel(xy, 7-xy,\
    \ red)\n```\n\n图15-3显示了Sense HAT显示一个粗糙的图像。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_459_0.png)\n\
    \n图15-3. 一个Sense HAT显示“图像”\n\n### 另请参阅\n\n更多信息可在 [Sense HAT 完整文档](https://pythonhosted.org/sense-hat/)\
    \ 中找到。\n\n有关格式化日期和时间的信息，请参见 [配方 7.2](https://example.com/recipe-7.2)。\n\n其他使用Sense\
    \ HAT的配方有 [10.15](https://example.com/recipe-10.15)、[14.12](https://example.com/recipe-14.12)、[14.15](https://example.com/recipe-14.15)、[14.16](https://example.com/recipe-14.16)\
    \ 和 [14.18](https://example.com/recipe-14.18)。\n\n## 15.4 使用OLED图形显示屏\n\n### 问题\n\
    \n你想将一个图形OLED（有机LED）显示屏连接到你的树莓派。\n\n### 解决方案\n\n使用基于SSD1306驱动芯片的OLED显示屏，采用I2C接口（[图15-4](https://example.com/figure-15-4)）。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_460_0.png)\n\n图15-4. 连接到树莓派400的I2C\
    \ OLED显示屏\n\n要制作此配方，你需要以下物品：\n\n- 四根母对母跳线（参见第564页的“原型设备和套件”）\n- I2C OLED显示屏，128×64像素（参见第566页的“模块”）\n\
    \n树莓派与模块之间的连接如下：\n\n- 显示屏上的VCC 连接到树莓派GPIO连接器的5V\n- 显示屏上的GND 连接到树莓派GPIO连接器的GND\n\
    - 显示屏上的SDA 连接到树莓派GPIO连接器的GPIO 2 (SDA)\n- 显示屏上的SCL 连接到树莓派GPIO连接器的GPIO 3 (SCL)\n\
    \n要使此配方正常工作，你还需要为树莓派设置I2C，因此请先按照配方10.4进行操作。\n\nAdafruit为这些显示屏提供了一个库，你可以使用以下命令安装：\n\
    \n```\n$ cd ~\n$ pip3 install adafruit-blinka\n$ pip3 install adafruit-circuitpython-ssd1306\n\
    ```"
