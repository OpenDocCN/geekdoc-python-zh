  md: '# 4.9 Playing Internet Radio


    # Problem


    You want to be able to play internet radio on your Raspberry Pi.


    # Solution


    The VLC media player should be pre-installed with Raspberry Pi OS. You will find
    it under Sound & Video in the Raspberry Menu. If it''s not there, you can install
    it using the Preferred Software tool (Recipe 4.2).


    If you prefer to install the VLC media player from the command line, you can do
    so by running the following command:


    ```

    sudo apt install vlc

    ```


    Run the program and then, on the Media menu, select the Open Network Stream option.
    This opens a dialog box (see Figure 4-13) in which you can enter the URL of the
    internet radio station that you want to play. You will need to plug headphones
    or amplified speakers into the audio socket on the Raspberry Pi.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_152_0.png)'
  merge: -1
  pgno: 152
- img_proc: true
  md: '# Discussion


    You also can run VLC from the command line as follows:


    ```

    $ vlc http://www.a-1radio.com/listen.pls -I dummy

    ```


    VLC will probably produce a series of error messages but then play the audio just
    fine. The -I dummy option prevents a VLC window opening.


    # See Also


    This recipe borrows heavily from this [tutorial](https://example.com), in which
    Jan Holst Jensen takes things a step further and adds radio-style controls to
    the project.


    For UK readers, you can find a list of the [BBC radio stream URLs](https://example.com)
    online.


    # 4.10 Using Visual Studio Code


    # Problem


    You want to use a light-weight programming editor.


    # Solution


    Install Microsoft''s Visual Studio Code, or VS Code, as we shall refer to it from
    now on.


    You will find VS Code in the Programming section of the Recommended Software tool
    ([Recipe 4.2](https://example.com)).


    If you prefer to install it from the command line, you can use the following command:


    ```

    $ sudo apt install code

    ```


    # Discussion


    VS Code is much loved by programmers. It sits in a happy place, halfway between
    a simple text editor and a fully featured integrated development environment (IDE).
    It''s very easy to use and offers helpful suggestions as you write your code,
    without you having to learn the ins and outs of a more complex IDE. It offers
    support for many programming languages and does nice things like color-code your
    programs to make them easier to read.


    If you are a seasoned programmer, you may prefer to edit your Raspberry Pi Python
    code using Visual Studio Code rather than a beginner''s Python IDE like Thonny
    or Mu (Recipes [5.3](https://example.com) and [5.4](https://example.com)). This
    is particularly true if your project consists of multiple files. [Figure 4-14](https://example.com)
    shows the file explorer area on the left, where you can see all the files'
