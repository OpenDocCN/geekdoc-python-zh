    If the Raspberry Pi doesn''t have a monitor attached, you need to specify the
    resolution of the virtual monitor that you''ll see when you connect to the Raspberry
    Pi from another computer using VNC. You can do this from the Display section of
    the Raspberry Pi Configuration tool (Figure 2-16). To avoid scrolling, select
    a resolution that''s a bit lower than that of the monitor from which you will
    be viewing the virtual screen.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_80_1.png)


    Figure 2-16. Setting the virtual screen resolution using the Raspberry Pi Configuration
    tool


    To connect to the Pi from a remote computer, you need to install VNC client software.
    RealVNC VNC Viewer is a popular choice and is available for Windows, Linux, and
    macOS.'
  - '[PAGE 81]


    When you run the client program on macOS or a PC, you''ll be asked to enter the
    IP address of the VNC server to which you want to connect (the IP address of your
    Pi).

    You are then prompted for your password (Figure 2-17).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_81_0.png)


    The catchphrase and signature are security devices designed to alert you if someone
    is hacking your Raspberry Pi. If either changes when you authenticate another
    time, your Raspberry Pi might be compromised.


    # Discussion


    VNC will only work if the Raspberry Pi and the remote computer are on the same
    network. Some VNC clients allow you to transfer files between your computer and
    the Raspberry Pi and to copy and paste text between them.

    Although you can do most things with SSH using the command line, sometimes it
    is useful to have access to the graphical environment of your Raspberry Pi.

    The Raspberry Pi''s VNC server automatically starts when you reboot, as long as
    the VNC option is enabled.


    # See Also


    Check out this [Adafruit tutorial](https://www.adafruit.com/).

    You can also enable VNC while setting up a new Raspberry Pi (see [Recipe 1.6](#recipe-1-6)).'
  - '[PAGE 82]


    # 2.9 Using a Raspberry Pi for Network-Attached Storage


    # Problem


    You want to use your Raspberry Pi as network-attached storage (NAS) by accessing
    a large USB drive attached to your Raspberry Pi from computers on your network.


    # Solution


    The solution to this problem is to install and configure Samba. To do this, issue
    the following commands:


    ```

    $ sudo apt update

    $ sudo apt install samba

    $ sudo apt install samba-common-bin

    ```


    Now, attach the USB hard drive to the Raspberry Pi. It will automatically mount
    in your /media/pi folder. To check that it’s there, run this command:


    ```

    $ cd /media/pi

    $ ls

    ```


    The drive should be listed with whatever name you gave it when you formatted it.
    It will automatically mount itself whenever the Raspberry Pi reboots. Make a note
    of this name, as you will need it in a moment.


    Next, you need to configure Samba so that the drive can be shared on the network.
    To do this, you first need to add a Samba user (pi). Enter the following command
    and type in a password:


    ```

    $ sudo smbpasswd -a pi

    New SMB password:

    Retype new SMB password:

    Added user pi.

    ```


    You now need to make some changes to the file /etc/samba/smb.conf, so enter this
    command:


    ```

    $ sudo nano /etc/samba/smb.conf

    ```


    The first line you’re looking for is near the top of the file:


    ```

    workgroup = WORKGROUP

    ```


    You only need to change this if you plan to connect from a Windows machine. This
    should be the name of your Windows workgroup. For recent versions of Windows,
    this will be WORKGROUP. Note that generally connecting to NAS in a mixed network
    of Macs and Windows PCs (and, for that matter, Linux machines) works just fine.'
  - '[PAGE 83]


    Finally, scroll to the end of the file and add the following lines, changing NAS
    to the name of your USB drive that you noted earlier:


    ```

    [USB]

    path = /media/pi/NAS

    comment = NAS Drive

    valid users = pi

    writeable = yes

    browseable = yes

    create mask = 0777

    public = yes

    ```


    Save the file and then restart Samba by entering the following:


    ```

    $ sudo systemctl restart smbd

    ```


    If all is well, your USB drive should now be shared on your network.


    # Discussion


    To connect to the drive on macOS, select Go, and then, from the Finder menu, click
    Connect to Server. Next, in the Server Address field, enter **smb://raspberrypi/USB**.
    A login dialog box opens, in which you need to change the username to **pi** (Figure
    2-18).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_83_0.png)


    If you are connecting to NAS from a Windows machine, the exact procedure will
    vary depending on your version of Windows. However, the basic principle is that
    at some point you will need to enter the network address, which should be **\raspberrypi\USB**
    (Figure 2-19).'
  - '[PAGE 84]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_84_0.png)


    Figure 2-19. Connecting to NAS from Windows


    You are then prompted for the username and password before you can use the NAS
    disk (Figure 2-20). You should only have to do this the first time. After the
    network place is added, you should be able to navigate directly to it in File
    Explorer.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_84_1.png)


    Figure 2-20. Browsing NAS on Windows


    If you are a Linux user, the following command should mount the NAS drive for
    you:


    ```

    $ sudo mkdir /pishare

    $ sudo smbmount -o username=pi,password=raspberry //192.168.1.16/USB /pishare

    ```'
  - '[PAGE 85]


    You should be able to connect to the Raspberry Pi using the hostname (raspberrypi),
    but if this does not work, try using the IP address of your Raspberry Pi, something
    like `smb://192.168.1.16/USB`.


    # See Also


    You might want to change your Raspberry Pi''s network name to something inappropriate
    like "piNAS" (see Recipe 2.4).


    # 2.10 Setting Up a Network Printer


    # Problem


    You want to print to a network printer from your Raspberry Pi.


    # Solution


    Use Common Unix Printing System (CUPS) software.


    Start by entering the following commands into a Terminal to install CUPS (this
    can take some time):


    ```

    $ sudo apt update

    $ sudo apt install cups

    ```


    Give yourself admin privileges for CUPS by entering the following command:


    ```

    $ sudo usermod -a -G lpadmin pi

    ```


    This last command adds the `lpadmin` group used by CUPS to the user pi so that
    you have permission to print.


    CUPS is configured via a web interface, so start your Chromium web browser from
    the Raspberry Pi Menu and then enter the address `http://localhost:631` into the
    address bar.


    On the Administration tab, choose the Add Printer option. This displays a list
    of printers that are on the network or are connected directly to the Raspberry
    Pi''s USB port (Figure 2-21).'
  - '[PAGE 86]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_86_0.png)


    Figure 2-21. Discovering printers with CUPS


    Follow the series of dialog boxes to set up the printer.


    # Discussion


    When you’re finished, you can test out the printer by firing up LibreOffice (Recipe
    4.2). Type some text, and when you go to print it, you should see your newly added
    printer available for printing (Figure 2-22).'
- md: '## CHAPTER 3

    Operating System


    ## 3.0 Introduction


    This chapter explores many aspects of the Linux operating system used by the Raspberry
    Pi. A lot of this involves the use of the command line. If you are used to Windows
    or macOS, this can come as a bit of a shock. However, when you get used to it,
    doing things with the command line can be surprisingly effective.


    You can accomplish many simple file operations like moving files around, renaming,
    copying, and deleting files graphically using a more Windows or macOS approach,
    and this is the subject of our first recipe.


    ## 3.1 Browsing Files Graphically


    ### Problem


    You want to move files around using a graphical interface like you can on a macOS-based
    machine or Windows PC.


    ### Solution


    Use the File Manager.


    You can find this program on the Raspberry Menu, in the Accessories group (Figure
    3-1).


    Using the File Manager, you can drag a file or directory from one directory to
    another or use the Edit menu to copy a file from one location and paste it to
    a second. This operates in much the same way as the Windows File Explorer or macOS
    Finder.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_89_0.png)


    *Figure 3-1. The File Manager*


    ### Discussion


    The lefthand side of the File Manager shows the folder structure.


    The central area displays the files in the current folder, which you can navigate
    using the buttons in the toolbar or by typing a location in the filepath area
    at the top.


    You can right-click a file to open a menu with options you can use on that file
    (Figure 3-2).


    You can also select more than one file at a time for copying or dragging by holding
    down the Ctrl key while you select files, or you can select a range of files by
    selecting one file and then holding down the Shift key while you select the last
    file in the range.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_90_0.png)


    Figure 3-2. Right-clicking a file opens a menu with more options


    ### See Also


    To rename a file or folder, see [Recipe 3.6](Recipe 3.6).


    ## 3.2 Copying Files onto a USB Flash Drive


    ### Problem


    You want to copy a file from your Raspberry Pi onto a USB flash drive.


    ### Solution


    Insert the USB flash drive into a USB port, and the dialog shown in [Figure 3-3](Figure
    3-3) should appear. Select OK to open it in the File Manager.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_91_0.png)


    Figure 3-3. The removable-media dialog box


    The drive will be mounted in /media/pi followed by the name of the flash drive
    (in my case, UNTITLED). To copy a file from your home folder, drag it onto the
    folder representing your flash drive, as shown in Figure 3-4.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_91_1.png)


    Figure 3-4. Copying a file by dragging it onto a USB flash drive


    Windows, macOS, and Linux all have their own disk formats. The USB flash drive
    should be formatted as FAT32 or exFAT for maximum compatibility with macOS and
    Windows computers. exFAT supports larger disk sizes than FAT32.


    ### Discussion


    After your USB flash drive is mounted on the Raspberry Pi''s filesystem, you can
    also copy files using the command line. The following example copies the file
    *test.txt* to the flash drive:


    ```

    $ cd /home/pi

    $ cp test.txt /media/pi/UNTITLED/

    ```


    In this example, cd is the command to change your current directory, and cp is
    the copy command. These commands are explained more fully in Recipes 3.4 and 3.5.


    ### See Also


    For general information on using the File Manager, see Recipe 3.1.

    To copy files from the command line, see Recipe 3.4.


    ## 3.3 Starting a Terminal Session


    ### Problem


    When using a Raspberry Pi, you need to issue text commands in a Terminal.


    ### Solution


    At the top of the Raspberry Pi desktop, select the Terminal icon (it looks like
    a black computer monitor), or, on the Raspberry Menu, in the Accessories group,
    select the Terminal option (Figure 3-5).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_93_0.png)


    Figure 3-5. Opening the Terminal


    ### Discussion


    When the Terminal starts, it is set to your home directory (/home/pi).


    You can open as many Terminal sessions as you want. It is often useful to have
    a couple of sessions open in different directories so that you don''t need to
    constantly switch directories using cd (Recipe 3.4).


    When using the Terminal, everything is case sensitive. That is, if you are using
    a command, you must use the correct case when you''re typing. For example, the
    ls command that you will meet in the next recipe must be typed as ls and not LS
    or Ls or lS. Similarly, all filenames are case sensitive, so files named picture.jpg
    and Picture.jpg are two different files.


    ### See Also


    In the next section (Recipe 3.4), you will look at navigating the directory structure
    using the Terminal.


    ## 3.4 Navigating the Filesystem Using a Terminal


    ### Problem


    You need to know how to change directories and move about the filesystem using
    the Terminal.


    ### Solution


    The main command used for navigating the filesystem is cd (change directory).
    After cd, you need to specify the directory that you want to change to. This can
    be either a *relative* path to a directory within your current directory or an
    *absolute* path to somewhere else on the filesystem.


    To see what the current directory is, use the command pwd (print working directory).


    ### Discussion


    Try out a few examples. Open a Terminal session, and you should see a prompt like
    this:


    ```

    pi@raspberrypi: ~ $

    ```


    The prompt that you see after each command (pi@raspberrypi: ~ $) is a reminder
    of your username (pi) and your computer name (raspberrypi). The ~ character is
    shorthand for your home directory (/home/pi or whatever username you chose when
    setting up your Raspberry Pi). So at any point you can change your current directory
    to your home directory as follows:


    ```

    $ cd ~

    ```


    ![](img/e36e77524aeaae366529d1cf02f9a39c_94_0.png)


    Throughout the book, I use a $ at the beginning of each line where you are expected
    to type a command. This is called the *prompt*. The response from the command
    line is not prefixed by anything; it appears just as it does on the Raspberry
    Pi’s screen.


    You can confirm that the command did indeed set the directory to *home* by using
    the pwd command:


    ```

    $ pwd

    /home/pi

    ```


    If you want to move up one level in the directory structure, you can use the special
    value .. (two dots) after the cd command, as shown here:


    ```

    $ cd ..

    $ pwd

    /home

    ```


    As you might have deduced by now, the path to a particular file or directory is
    made up of words separated by a /. So the very root of the entire filesystem is
    /, and to access the home directory within /, you would refer to /home/. Then,
    to find the *pi* directory within that, you would use /home/pi/. You can omit
    the final / from a path.


    Paths can be absolute (starting with a / and specifying the full path from the
    root), or they can be *relative* to the current working directory, in which case
    they must not start with a / and they assume that the current directory is the
    starting point. For instance, starting at the root directory (/) you could use
    relative paths to navigate to your home directory (assuming your username is “pi”)
    like this:


    ```

    $ cd /

    $ pwd

    /

    $ cd home/pi

    $ pwd

    /home/pi

    ```


    You will have full read and write access to the files in your home directory,
    but when you move into the places where system files and applications are kept,
    your access to some files will be restricted to read-only. You can override this
    (Recipe 3.12), but some care is required.


    Check out the *root* of the directory structure by entering the commands cd /
    and ls, as shown in Figure 3-6.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_95_0.png)


    Figure 3-6. Listing the contents of a directory


    The ls command (list) shows us all of the files and directories below (/) the
    root directory. You will see a *home* directory listed, which is the directory
    you have just come from.


    Now change into one of those directories using the commands shown in Figure 3-7.'
  mdcn: '## 第三章

    操作系统


    ## 3.0 引言


    本章将探讨树莓派所使用的 Linux 操作系统的诸多方面。其中很多内容涉及命令行的使用。如果你习惯了 Windows 或 macOS，这可能会让你有些不适应。然而，一旦你习惯了，使用命令行做事会出奇地高效。


    你可以像在 Windows 或 macOS 上那样，通过图形界面完成许多简单的文件操作，比如移动文件、重命名、复制和删除文件，这正是我们第一个食谱的主题。


    ## 3.1 图形化浏览文件


    ### 问题


    你想像在基于 macOS 的机器或 Windows PC 上那样，使用图形界面来移动文件。


    ### 解决方案


    使用文件管理器。


    你可以在树莓派菜单的“附件”组中找到这个程序（图 3-1）。


    使用文件管理器，你可以将文件或目录从一个目录拖拽到另一个目录，或者使用“编辑”菜单从一个位置复制文件并粘贴到另一个位置。其操作方式与 Windows 文件资源管理器或
    macOS Finder 非常相似。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_89_0.png)


    *图 3-1. 文件管理器*


    ### 讨论


    文件管理器的左侧显示文件夹结构。


    中央区域显示当前文件夹中的文件，你可以使用工具栏中的按钮或在顶部的文件路径区域输入位置来导航。


    你可以右键单击文件，打开一个包含可用于该文件的选项的菜单（图 3-2）。


    你也可以通过按住 Ctrl 键的同时选择文件来一次选择多个文件进行复制或拖拽，或者通过选择一个文件，然后按住 Shift 键的同时选择范围内的最后一个文件来选择一系列文件。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_90_0.png)


    图 3-2. 右键单击文件会打开一个包含更多选项的菜单


    ### 另请参阅


    要重命名文件或文件夹，请参阅[食谱 3.6](Recipe 3.6)。


    ## 3.2 将文件复制到 USB 闪存盘


    ### 问题


    你想将文件从树莓派复制到 USB 闪存盘。


    ### 解决方案


    将 USB 闪存盘插入 USB 端口，应该会出现如[图 3-3](Figure 3-3)所示的对话框。选择“确定”以在文件管理器中打开它。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_91_0.png)


    图 3-3. 可移动介质对话框


    驱动器将被挂载到 /media/pi 目录下，后跟闪存盘的名称（在我的例子中是 UNTITLED）。要从你的主文件夹复制文件，请将其拖拽到代表你闪存盘的文件夹上，如图
    3-4 所示。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_91_1.png)


    图 3-4. 通过拖拽文件到 USB 闪存盘来复制文件


    Windows、macOS 和 Linux 都有自己的磁盘格式。为了与 macOS 和 Windows 电脑获得最大的兼容性，USB 闪存盘应格式化为 FAT32
    或 exFAT。exFAT 支持比 FAT32 更大的磁盘容量。


    ### 讨论


    在你的 USB 闪存盘挂载到树莓派的文件系统后，你也可以使用命令行复制文件。以下示例将文件 *test.txt* 复制到闪存盘：


    ```

    $ cd /home/pi

    $ cp test.txt /media/pi/UNTITLED/

    ```


    在这个例子中，cd 是更改当前目录的命令，cp 是复制命令。这些命令在食谱 3.4 和 3.5 中有更详细的解释。


    ### 另请参阅


    有关使用文件管理器的常规信息，请参阅食谱 3.1。

    要从命令行复制文件，请参阅食谱 3.4。


    ## 3.3 启动终端会话


    ### 问题


    使用树莓派时，你需要在终端中输入文本命令。


    ### 解决方案


    在树莓派桌面顶部，选择终端图标（它看起来像一个黑色的电脑显示器），或者在树莓派菜单的“附件”组中，选择“终端”选项（图 3-5）。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_93_0.png)


    图 3-5. 打开终端


    ### 讨论


    当终端启动时，它会设置为你的主目录（/home/pi）。


    你可以根据需要打开任意数量的终端会话。在不同的目录中打开几个会话通常很有用，这样你就不需要经常使用 cd（食谱 3.4）来切换目录。


    使用终端时，所有内容都区分大小写。也就是说，如果你使用一个命令，输入时必须使用正确的大小写。例如，你将在下一个食谱中遇到的 ls 命令必须输入为 ls，而不是
    LS 或 Ls 或 lS。同样，所有文件名都区分大小写，因此名为 picture.jpg 和 Picture.jpg 的文件是两个不同的文件。


    ### 另请参阅


    在下一节（食谱 3.4）中，你将学习如何使用终端导航目录结构。


    ## 3.4 使用终端导航文件系统


    ### 问题


    你需要知道如何使用终端更改目录并在文件系统中移动。


    ### 解决方案


    用于导航文件系统的主要命令是 cd（更改目录）。在 cd 之后，你需要指定要更改到的目录。这可以是当前目录内目录的*相对*路径，也可以是文件系统上其他位置的*绝对*路径。


    要查看当前目录是什么，请使用命令 pwd（打印工作目录）。


    ### 讨论


    尝试几个例子。打开一个终端会话，你应该会看到如下提示符：


    ```

    pi@raspberrypi: ~ $

    ```


    你在每个命令后看到的提示符（pi@raspberrypi: ~ $）是你的用户名（pi）和计算机名称（raspberrypi）的提醒。~ 字符是你的主目录（/home/pi
    或你在设置树莓派时选择的任何用户名）的简写。因此，在任何时候你都可以按如下方式将当前目录更改为你的主目录：


    ```

    $ cd ~

    ```


    ![](img/e36e77524aeaae366529d1cf02f9a39c_94_0.png)


    在整本书中，我在每行开头使用 $ 表示你需要输入命令。这被称为*提示符*。命令行的响应没有任何前缀；它就像在树莓派屏幕上显示的那样出现。


    你可以通过使用 pwd 命令来确认命令确实将目录设置为 *home*：


    ```

    $ pwd

    /home/pi

    ```


    如果你想在目录结构中向上移动一级，可以在 cd 命令后使用特殊值 ..（两个点），如下所示：


    ```

    $ cd ..

    $ pwd

    /home

    ```


    正如你现在可能推断的那样，特定文件或目录的路径由用 / 分隔的单词组成。因此，整个文件系统的根是 /，要访问 / 内的主目录，你会引用 /home/。然后，要找到其中的
    *pi* 目录，你会使用 /home/pi/。你可以省略路径末尾的 /。


    路径可以是绝对的（以 / 开头并指定从根目录开始的完整路径），也可以是相对于当前工作目录的*相对*路径，在这种情况下，它们不能以 / 开头，并且假设当前目录是起点。例如，从根目录（/）开始，你可以使用相对路径导航到你的主目录（假设你的用户名是“pi”），如下所示：


    ```

    $ cd /

    $ pwd

    /

    $ cd home/pi

    $ pwd

    /home/pi

    ```


    你将对主目录中的文件拥有完全的读写访问权限，但当你进入存放系统文件和应用程序的位置时，你对某些文件的访问将被限制为只读。你可以覆盖此限制（食谱 3.12），但需要小心。


    通过输入命令 cd / 和 ls 来查看目录结构的*根*，如图 3-6 所示。


    ![](img/e36e77524aeaae366529d1cf02f9a39c_95_0.png)


    图 3-6. 列出目录的内容


    ls 命令（列出）向我们显示根目录（/）下的所有文件和目录。你会看到一个 *home* 目录被列出，这就是你刚刚离开的目录。


    现在使用图 3-7 所示的命令进入其中一个目录。'
