    Figure 10-8. I2C modules


    Other I2C modules include FM radio transmitters, ultrasonic range finders, OLED
    (organic light-emitting diode) displays, and various types of sensors.


    # See Also


    See some of the I2C recipes in this book, including Recipes 12.3, 15.1, and 15.2.


