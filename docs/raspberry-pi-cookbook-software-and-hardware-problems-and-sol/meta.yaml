    When you run the program, you will get the same window containing a slider as
    shown in Figure 12-4. Use this to move the servo arm about. Adafruit''s software
    is not compatible with Python 2, so you need to run any programs that use the
    Adafruit software via the python3 command.


    Note that this program uses a graphical user interface (GUI), so you can''t run
    it from SSH or the Terminal; you must run it from the windowing environment on
    the Pi itself or via remote control using VNC (Recipe 2.8):


    ```

    $ python3 ch_12_servo_adafruit.py

    ```


    The Adafruit software uses the servomotor angle range of 0 to 180, rather than
    gpiozero''s -90 to 90 degrees, so to keep the user interface the same, 90 is added
    to the angle supplied by the slider.


    To address a specific servo channel among the 16 available channels, the channel
    number (between 0 and 15) is specified inside the square brackets in the command
    servo_kit.servo[0].angle.


    # Discussion


    When selecting a power supply for this module, remember that a standard remote
    control servo can easily draw 400mA while it''s moving, and more if it''s under
    load. So if you plan to have a lot of large servos moving at the same time, you
    will need a big power adapter.


    # See Also


    Visit Adafruit for information on this Adafruit product.


    A Servo HAT is great if your Raspberry Pi is close to the servomotors, but if
    your servos are distant from where you want the Raspberry Pi to be, Adafruit also
    sells a servo module (product ID 815) that has the same servo controller hardware
    as the servo HAT but just four pins to connect the I2C interface of the board
    to the Raspberry Pi''s I2C interface.


    # 12.4 Controlling the Speed of a DC Motor


    # Problem


    You want to control the speed of a DC motor using your Raspberry Pi.'
