    \ the Raspberry Pi with RUN header pins should look like Figure 13-18.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_393_0.png)\n\
    \nFigure 13-18. Pins attached to a Raspberry Pi\n\nNow that the pins are attached,\
