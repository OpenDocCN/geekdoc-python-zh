    \ 3.31 中了解更多关于重定向的信息。\n\n你也可以在 find 中使用通配符，如下所示：\n\n```\n$ find /home/pi -name\
    \ match*\n/home/pi/python_games/match4.wav\n/home/pi/python_games/match2.wav\n\
    /home/pi/python_games/match1.wav\n/home/pi/python_games/match3.wav\n/home/pi/python_games/match0.wav\n\
    /home/pi/python_games/match5.wav\n```\n\n### 另请参阅\n\nfind 命令还有许多其他高级搜索功能。要查看 find\
    \ 的完整 manpage 文档，请使用此命令：\n\n```\n$ man find\n```\n\n## 3.27 使用命令行历史记录\n\n### 问题\n\
    \n你希望能够重复命令行上的命令，而无需再次键入它们。\n\n### 解决方案\n\n使用向上箭头和向下箭头键从命令历史记录中选择以前的命令，并使用 history\
    \ 命令与 grep 查找较旧的命令。\n\n### 讨论\n\n你可以通过按向上箭头键访问你运行的上一个命令。再次按它将带你到之前的命令，依此类推。如果你错过了想要的命令，向下箭头键将带你回到另一个方向。\n\
