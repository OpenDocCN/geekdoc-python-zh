  md: 'This is fixed at 3C (hex) for many of the low-cost I2C modules, but may vary,
    so you should check any documentation that comes with the device or use I2C tools
    (Recipe 10.5) to list all the I2C devices attached to the bus so that you can
    see the address of your display.


    The preceding code example uses a technique called *double buffering*. This involves
    preparing what is to be displayed and then switching it onto the image in one
    go. This prevents the display from flickering.


    You can see the code for this in the `display_message` function. First it draws
    onto the image a blank rectangle the entire size of the display. It then draws
    the text onto the image, and then sets the display content to be image using `disp.image(image)`.
    The display isn''t actually updated until the function `disp.show()` is called.


    Small OLED displays are cheap, don''t use much current, and have high resolution
    despite their diminutive size. They are replacing LCD displays in many consumer
    products.


    # See Also


    The instructions here are for four-pin I2C interfaces. If you really want to use
    the SPI interface, take a look at [Adafruit''s tutorial](https://learn.adafruit.com/adafruit-oled-displays-for-raspberry-pi).


    # 15.5 Using Addressable RGB LED Strips


    # Problem


    You want to connect an RGB LED strip (NeoPixels) to your Raspberry Pi.


    # Solution


    Use an LED strip based on the WS2812 RGB LED chips on your Raspberry Pi.


    Using these LED strips (Figure 15-5) can be really easy, with a direct connection
    to the Raspberry Pi and power for the LEDs supplied by the Raspberry Pi''s 5V
    supply. This is the “Happy Day” scenario that should work just fine, but do see
    the Discussion for providing external power so that your LED strip use is trouble-free.


    > **Don''t Power the LEDs from the Pi''s 3.3V Supply**


    Although it might be tempting to power the LEDs from the 3.3V supply pin on the
    GPIO connector, do not do this—it can supply only low currents (see Recipe 10.3).
    Using this pin could easily damage your Raspberry Pi.'
