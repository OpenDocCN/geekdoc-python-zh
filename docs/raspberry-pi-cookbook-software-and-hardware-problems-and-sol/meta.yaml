    Figure 12-10 shows the breadboard layout.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_351_0.png)


    Make sure the chip is facing the proper direction: it has a notch at the top,
    which is the end that should be at the top of the breadboard.


    The test program for this recipe (*ch_12_motor_control.py*) allows you to enter
    the letter *f* or *r* and then a single digit between 0 and 9. The motor will
    then go either forward or backward at a speed specified by the digit—0 for stopped,
    9 for full speed:


    ```

    $ python3 ch_12_motor_control.py

    Command, f/r 0..9, E.g. f5 :f5

    Command, f/r 0..9, E.g. f5 :f1

