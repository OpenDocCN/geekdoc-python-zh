    \ (space or tab). So you can read this section as matching either the start of\
    \ the string or some whitespace, before trying to match *for*. That is, *for*\
    \ must either come at the start of the string or be preceded by a space or some\
    \ other whitespace character. This ensures that the regular expression does not\
    \ match words that end in *for*.\n\nThere is a similar expression after *for*\
    \ that must also match:\n\n```\n($|\\s)\n```\n\nHere, the new special symbol is\
    \ $, which indicates the end of the string. In other words, after the letters\
    \ *for*, a match will occur only if we are at the end of the string or there is\
