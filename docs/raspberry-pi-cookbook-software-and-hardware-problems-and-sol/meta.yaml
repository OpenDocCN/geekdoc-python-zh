    \n你需要以下物品：\n\n- 3V 至 12V 直流电机\n- 面包板和跳线（参见第 564 页的“原型设备和套件”）\n- 1kΩ 电阻（参见第 565\
    \ 页的“电阻和电容”）\n- MOSFET 晶体管 FQP30N06L（参见第 565 页的“晶体管和二极管”）\n- 二极管 1N4001（参见第 565\
    \ 页的“晶体管和二极管”）\n- 电压与电机匹配的电源\n\n与本书中所有程序示例一样，你可以下载此程序（参见配方 3.22）。文件名为 `ch_12_gui_slider.py`。\n\
    \n请注意，此程序使用 GUI，因此你无法从 SSH 运行它。你必须从树莓派本身的窗口环境或通过 VNC 远程控制（配方 2.8）来运行它。\n\n###\
    \ 讨论\n\n如果你只使用低功率直流电机（小于 200mA），你可以使用更小（且更便宜）的晶体管，例如 2N3904（参见第 565 页的“晶体管和二极管”）。图\
    \ 12-9 显示了使用 2N3904 的面包板布局。\n\n你或许可以使用 GPIO 连接器上的 5V 电源线为小型电机供电。如果你发现树莓派崩溃，请使用外部电源，如图\
    \ 12-8 所示。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_350_0.png)\n\n### 另请参阅\n\
    \n有关在树莓派上使用面包板和跳线的更多信息，请参见配方 10.9。\n\n此设计仅控制电机的速度。它不能控制其方向。为此，你需要参见配方 12.5。\n\n\
    ## 12.5 控制直流电机的方向\n\n### 问题\n\n你想同时控制小型直流电机的速度和方向。\n\n### 解决方案\n\n使用 H 桥芯片或模块，最常见的芯片是\
    \ L293D。这些芯片成本低且易于使用。其他 H 桥芯片或模块通常使用相同的控制引脚对来控制每个电机的方向（参见讨论）。\n\nL293D 芯片实际上能够在没有任何额外硬件的情况下驱动两个电机。讨论部分还提到了其他几种控制直流电机的选项。要尝试使用\
    \ L293D 控制电机，你需要以下物品：\n\n- 3V 至 12V 直流电机\n- 面包板和跳线（公对母；参见第 564 页的“原型设备和套件”）\n\
    - L293D 芯片（参见第 565 页的“集成电路”）\n- 电压与电机匹配的电源\n\n图 12-10 显示了面包板布局。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_351_0.png)\n\
    \n确保芯片朝向正确的方向：其顶部有一个凹口，该端应位于面包板的顶部。\n\n此配方的测试程序（*ch_12_motor_control.py*）允许你输入字母\
    \ *f* 或 *r*，然后输入一个 0 到 9 之间的数字。电机随后将向前或向后移动，速度由数字指定——0 表示停止，9 表示全速：\n\n```\n$\
    \ python3 ch_12_motor_control.py\nCommand, f/r 0..9, E.g. f5 :f5\nCommand, f/r\
    \ 0..9, E.g. f5 :f1\nCommand, f/r 0..9, E.g. f5 :f2\nCommand, f/r 0..9, E.g. f5\
    \ :r2\n```\n\n打开编辑器并粘贴以下代码。与本书中所有程序示例一样，你也可以下载它（参见配方 3.22）。\n\n此程序使用命令行，因此你可以从\
    \ SSH 或终端运行它：\n\n```\nfrom gpiozero import Motor\n\nmotor = Motor(forward=23,\
    \ backward=24)\n\nwhile True:\n    cmd = input(\"Command, f/r 0..9, E.g. f5 :\"\
    )\n    direction = cmd[0]\n    speed = float(cmd[1]) / 10.0\n    if direction\
    \ == \"f\":\n        motor.forward(speed=speed)\n    else:\n        motor.backward(speed=speed)\n\
    ```\n\ngpiozero 方便地提供了一个名为 `Motor` 的类，我们可以用它来控制单个直流电机的速度和方向。创建该类的实例时，你需要指定前进和后退控制引脚。\n\
    \n`Motor` 的 `forward` 和 `backward` 方法接受一个可选的 `speed` 参数，范围在 0 到 1 之间，其中 1 表示全速。\n\
    \n### 讨论\n\ngpiozero 的 `Motor` 类隐藏了 H 桥硬件的复杂性。\n\n图 12-11 展示了 H 桥的工作原理，使用开关而非晶体管或芯片。通过反转电机两端的极性，H\
    \ 桥也会反转电机的转动方向。\n\n在图 12-11 中，S1 和 S4 闭合，S2 和 S3 断开。这允许电流流过电机，端子 A 为正，端子 B 为负。如果我们反转开关，使\
    \ S2 和 S3 闭合，S1 和 S4 断开，那么 B 为正，A 为负，电机将向相反方向转动。\n\n然而，你可能已经发现了这个电路的一个危险。如果由于某种原因\
    \ S1 和 S2 同时闭合，正电源将直接连接到负电源，你将造成短路。如果 S3 和 S4 同时闭合，情况也是如此。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_353_0.png)\n\
    \n图 12-11. H 桥\n\n虽然你可以使用单个晶体管来制作 H 桥，但使用 H 桥集成电路（IC）如 L293D 会更简单。该芯片实际上内部有两个\
    \ H 桥，因此你可以用它来控制两个电机。它还具有逻辑功能，确保不会发生等同于同时闭合 S1 和 S2 的情况。\n\nL293D 为两个电机控制通道各使用两个控制引脚：一个\
    \ *forward* 引脚和一个 *backward* 引脚。如果 forward 引脚（23）为高电平，backward 引脚（24）为低电平，电机将向一个方向转动。如果这两个引脚反转，电机将向相反方向转动。\n\
    \n作为在面包板上使用 L293D 的替代方案，eBay 上有非常低成本的模块，这些模块在印刷电路板（PCB）上包含一个 L293D，带有用于连接电机的螺丝端子和用于直接连接树莓派\
    \ GPIO 连接器的排针。你可以找到基于相同原理但电流大得多（甚至高达 20A 或更高）的大功率电机控制器模块。[Pololu](https://www.pololu.com/)\
    \ 拥有令人印象深刻的此类电机控制器板系列。"
