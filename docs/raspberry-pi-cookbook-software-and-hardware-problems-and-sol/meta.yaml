    You pressed the blue dot!

    You pressed the blue dot!

    You pressed the blue dot!

    ```


    # Discussion


    The big blue dot isn''t just a button; you can also use it as a joystick. You
    can slide, swipe, and rotate the dot. The Blue Dot library allows you to link
    handler functions to events such as swiping and rotating. For more information
    on this, take a look at [the documentation](https://bluedot.readthedocs.io/).


    # See Also


    For full information on Blue Dot, see [the Blue Dot website](https://bluedot.readthedocs.io/).


    There is also a [Blue Dot Python module](https://github.com/martinohanlon/BlueDot)
    that lets you use a second Raspberry Pi as the Blue Dot remote.


    See [Recipe 1.17](https://www.raspberrypi.org/magpi-issues/MagPi17.pdf) for more
    information on using Bluetooth with a Raspberry Pi.'
  - "[PAGE 330]\n\n# 11.9 Making a User Interface to Turn Things On and Off\n\n# Problem\n\
    \nYou want to make an application to run on the Raspberry Pi that has a button\
    \ for turning things on and off.\n\n# Solution\n\nUse guizero to provide the user\
    \ interface for gpiozero to turn the pin on and off (Figure 11-13).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_330_0.png)\n\
    \nFigure 11-13. An on/off switch in guizero\n\nIf you haven't already done so,\
    \ install guizero using the following command:\n\n```\n$ sudo pip3 install guizero\n\
    ```\n\nYou'll need to connect an LED or some other kind of output device to GPIO\
    \ pin 18. Using an LED (Recipe 11.1) is the easiest option for getting started.\n\
    \nAs with all the program examples in this book, you can download the code for\
    \ this recipe (see Recipe 3.22). The file is called ch_11_gui_switch.py and creates\
    \ the switch shown in Figure 11-13:\n\n```\nfrom gpiozero import DigitalOutputDevice\n\
    from guizero import App, PushButton\n\npin = DigitalOutputDevice(18)\n\ndef start():\n\
    \    start_button.disable()\n    stop_button.enable()\n    pin.on()\n\ndef stop():\n\
    \    start_button.enable()\n    stop_button.disable()\n    pin.off()\n```"
