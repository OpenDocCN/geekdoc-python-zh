- md: "## Solution\n\nThe Raspberry Pi GPIO connector has only digital inputs. If\
    \ you want to measure a voltage, you need to use a separate analog-to-digital\
    \ converter (ADC).\n\nUse the MCP3008 eight-channel ADC chip. This chip has eight\
    \ analog inputs, so you can connect up to eight sensors to one of these and interface\
    \ to the chip using the Raspberry Pi SPI.\n\nTo make this recipe, you will need\
    \ the following:\n\n- Breadboard and jumper wires (see \"Prototyping Equipment\
    \ and Kits\" on page 564)\n- MCP3008 eight-channel ADC integrated circuit (IC)\
    \ (see \"Integrated Circuits\" on page 565)\n- 10kΩ trimpot (see \"Resistors and\
    \ Capacitors\" on page 565)\n\nFigure 14-13 shows the breadboard layout for using\
    \ this chip. Make sure that you get the chip facing the proper direction. The\
    \ little notch in the package should be toward the top of the breadboard.\n\n\
    ![](img/e36e77524aeaae366529d1cf02f9a39c_413_0.png)\n\nThe variable resistor has\
    \ one end connected to 3.3V and the other to GND, which allows the middle connection\
    \ to be set to any voltage between 0 and 3.3V.\n\nBefore trying the program, make\
    \ sure you have SPI enabled (Recipe 10.6). This recipe also explains a bit more\
    \ about SPI.\n\nOpen an editor and paste in the following code (ch_14_adc_test.py):\n\
    \n```\nfrom gpiozero import MCP3008\nimport time\n\nanalog_input = MCP3008(channel=0)\n\
    \nwhile True:\n    reading = analog_input.value\n    voltage = reading * 3.3\n\
    \    print(\"Reading={:.2f}\\tVoltage={:.2f}\".format(reading, voltage))\n   \
    \ time.sleep(1)\n```\n\nAs with all the program examples in this book, you can\
    \ also download this program (see Recipe 3.22).\n\nWhen you run the program, you\
    \ should see output like this as you turn the variable resistor to alter the voltage:\n\
    \n```\n$ python3 ch_14_adc_test.py\nReading=0.60 Voltage=2.00\nReading=0.54 Voltage=1.80\n\
    Reading=0.00 Voltage=0.00\nReading=0.00 Voltage=0.00\nReading=0.46 Voltage=1.53\n\
    Reading=0.99 Voltage=3.28\n```\n\nThe readings from the MCP3008 channel are between\
    \ 0 and 1. You can convert these into a voltage by multiplying by 3.3 (the supply\
    \ voltage).\n\n## Discussion\n\nThe MCP3008 has 10-bit ADCs, so when you take\
    \ a reading, it gives you a number between 0 and 1023. The MCP3008 class converts\
    \ this into a voltage value by multiplying the reading by the voltage range (3.3V)\
    \ and then dividing it by 1,024.\n\nIf you don't need all the features of a *proper*\
    \ Raspberry Pi, you can use a Raspberry Pi Pico, which has analog inputs available\
    \ so that you don't need an ADC chip. You can find out about this in Recipe 19.7.\n\
    \nYou can combine any of the following recipes that use the MCP3008 to allow readings\
    \ to be taken from up to eight sensors.\n\nYou can also use resistive sensors\
    \ with the MCP3008 by combining them with a fixed-value resistor and arranging\
    \ them as a voltage divider (see Recipes 14.8 and 14.9).\n\n## See Also\n\nIf\
    \ you're just interested in detecting the turning of a knob, you can use a rotary\
    \ encoder instead of a pot (Recipe 13.7).\n\nYou can also detect the position\
    \ of a pot without the use of an ADC chip by using the step response method (Recipe\
    \ 14.1).\n\nCheck out the datasheet for the MCP3008.\n\nThe Explorer HAT Pro from\
    \ Pimoroni also has an ADC (Recipe 10.16).\n\n## 14.8 Reducing Voltages for Measurement\n\
    \n### Problem\n\nYou want to measure a voltage, but it is higher than the 3.3V\
    \ possible using an MCP3008 (Recipe 14.7).\n\n### Solution\n\nUse a pair of resistors\
    \ to act as a voltage divider to reduce the voltage to a suitable range.\n\nTo\
    \ try this recipe, you'll need the following:\n\n- Breadboard and jumper wires\
    \ (see \"Prototyping Equipment and Kits\" on page 564)\n- MCP3008 eight-channel\
    \ ADC IC (see \"Integrated Circuits\" on page 565)\n- 10kΩ resistor (see \"Resistors\
    \ and Capacitors\" on page 565)\n- 3.3kΩ resistor (see \"Resistors and Capacitors\"\
    \ on page 565)\n- 9V battery and clip lead\n\nFigure 14-14 shows the arrangement\
    \ for this, using a breadboard. The setup will measure the voltage of the battery.\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_416_0.png)\n\nFigure 14-14. Reducing\
    \ the voltage of analog inputs\n\n> Never use this recipe to measure high-voltage\
    \ AC, or any type of AC for that matter. It is for low-voltage DC only.\n\nOpen\
    \ an editor and paste in the following code (ch_14_adc_scaled.py):\n\n```\nfrom\
    \ gpiozero import MCP3008\nimport time\n\nR1 = 10000.0\nR2 = 3300.0\nanalog_input\
    \ = MCP3008(channel=0)\n\nwhile True:\n    reading = analog_input.value\n    voltage_adc\
    \ = reading * 3.3\n    voltage_actual = voltage_adc / (R2 / (R1 + R2))\n    print(\"\
    Battery Voltage=\" + str(voltage_actual))\n    time.sleep(1)\n```\n\nAs with all\
    \ the program examples in this book, you can also download this program (see Recipe\
    \ 3.22).\n\nThe program is very similar to that of Recipe 14.7. The main difference\
    \ is the scaling, using the values of the two resistors, which are held in the\
    \ variables R1 and R2.\n\nWhen you run the program, the battery voltage is displayed:\n\
    \n```\n$ python3 ch_14_adc_scaled.py\nBattery Voltage=8.62421875\n```\n\n> Read\
    \ the discussion carefully before attaching anything higher than 9V, or you might\
    \ destroy the MCP3008.\n\n### Discussion\n\nThis arrangement of resistors is called\
    \ a *voltage divider* or sometimes a *potential divider* (Figure 14-15). The formula\
    \ for calculating the output voltage, given the input voltage and the values of\
    \ the two resistors, is as follows:\n\n```\nVout = Vin * R2 / (R1 + R2)\n```\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_417_0.png)\n\nThis means that if R1\
    \ and R2 were both the same value (say, 1kΩ), Vout would be half of Vin.\n\nWhen\
    \ choosing R1 and R2, you also need to consider the current flowing through them.\
    \ This will be Vin/(R1 + R2). In the preceding example, R1 is 10kΩ and R2 is 3.3kΩ,\
    \ so the current flowing will be 9V/13.3kΩ = 0.68mA. This is low, but still enough\
    \ to eventually drain the battery, so do not leave it connected all the time.\n\
    \n### See Also\n\nTo avoid the math, you can use an [online resistor calculator](https://www.google.com/search?q=online+resistor+calculator).\n\
    \nThe voltage divider is also used to convert resistance to voltage when using\
    \ a resistive sensor with an ADC ([Recipe 14.9](#recipe-14-9)).\n\n## 14.9 Using\
    \ Resistive Sensors with an ADC\n\n### Problem\n\nYou have a resistive sensor\
    \ that you wish to use with an MCP3008 ADC chip.\n\n### Solution\n\nUse a potential\
    \ divider with one fixed resistor and the resistive sensor to convert the resistance\
    \ of the sensor into a voltage that can be measured with the ADC. As an example,\
    \ you can remake the light sensor project of [Recipe 14.2](#recipe-14-2) to use\
    \ the MCP3008 instead of the step response technique.\n\nTo try this recipe, you'll\
    \ need the following:\n\n- Breadboard and jumper wires (see \"Prototyping Equipment\
    \ and Kits\" on page 564)\n- MCP3008 eight-channel ADC IC (see \"Integrated Circuits\"\
    \ on page 565)\n- 10kΩ resistor (see \"Resistors and Capacitors\" on page 565)\n\
    - Photoresistor (see \"Resistors and Capacitors\" on page 565)\n\nFigure 14-16\
    \ shows the arrangement for this, using a breadboard.\n\nYou can use the exact\
    \ same program as [Recipe 14.7](#recipe-14-7) (`ch_14_adc_test.py`). Covering\
    \ up the light sensor with your hand changes the readings. You also need to set\
    \ up SPI on your Raspberry Pi so, if you haven't already done so, follow [Recipe\
    \ 10.6](#recipe-10-6) first.\n\n```\n$ python3 ch_14_adc_test.py\nReading=0.60\
    \ Voltage=2.00\nReading=0.54 Voltage=1.80\n```\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_419_0.png)\n\
    \nFigure 14-16. Using a photoresistor with an ADC\n\nThese readings can be quite\
    \ a bit different, depending on your photoresistor, but the important thing is\
    \ that the figure changes as the light level changes.\n\n### Discussion\n\nThe\
    \ choice of fixed-value resistor is not very critical. If the value is too high\
    \ or too low, you will find that the range of readings is rather narrow. Select\
    \ a resistor value somewhere between the minimum and maximum resistance of the\
    \ sensor. You might need to experiment with a few resistors before deciding on\
    \ one that suits your sensor over the range of readings you’re interested in.\
    \ If in doubt, start with 10kΩ and see how that works.\n\nYou can swap out the\
    \ photoresistor for pretty much any resistive sensor. So, for instance, you could\
    \ use the gas sensor from [Recipe 14.4](Recipe 14.4).\n\n### See Also\n\nTo measure\
    \ light intensity without the complication of an ADC, see [Recipe 14.2](Recipe\
    \ 14.2).\n\nFor an example of using more than one channel of the ADC at a time,\
    \ see [Recipe 14.14](Recipe 14.14)."
  mdcn: "## 解决方案\n\n树莓派GPIO连接器仅提供数字输入。若要测量电压，需使用独立的模数转换器（ADC）。\n\n采用MCP3008八通道ADC芯片。该芯片具备八个模拟输入通道，因此可将最多八个传感器连接至其中一个通道，并通过树莓派SPI接口与芯片通信。\n\
    \n制作本方案需要以下材料：\n\n- 面包板与跳线（参见第564页“原型设备与套件”）\n- MCP3008八通道ADC集成电路（IC）（参见第565页“集成电路”）\n\
    - 10kΩ可调电阻（参见第565页“电阻与电容”）\n\n图14-13展示了使用该芯片的面包板布局。请确保芯片方向正确，封装上的小凹口应朝向面包板顶部。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_413_0.png)\n\n可变电阻一端连接3.3V，另一端接地（GND），使中间连接点可设置为0至3.3V之间的任意电压。\n\
    \n运行程序前，请确保已启用SPI（方案10.6）。本方案还将进一步介绍SPI相关知识。\n\n打开编辑器并粘贴以下代码（ch_14_adc_test.py）：\n\
    \n```\nfrom gpiozero import MCP3008\nimport time\n\nanalog_input = MCP3008(channel=0)\n\
    \nwhile True:\n    reading = analog_input.value\n    voltage = reading * 3.3\n\
    \    print(\"Reading={:.2f}\\tVoltage={:.2f}\".format(reading, voltage))\n   \
    \ time.sleep(1)\n```\n\n与本书所有程序示例一样，您也可以下载此程序（参见方案3.22）。\n\n运行程序后，转动可变电阻改变电压时，应看到如下输出：\n\
    \n```\n$ python3 ch_14_adc_test.py\nReading=0.60 Voltage=2.00\nReading=0.54 Voltage=1.80\n\
    Reading=0.00 Voltage=0.00\nReading=0.00 Voltage=0.00\nReading=0.46 Voltage=1.53\n\
    Reading=0.99 Voltage=3.28\n```\n\nMCP3008通道的读数范围在0到1之间。可通过乘以3.3（供电电压）将其转换为电压值。\n\
    \n## 讨论\n\nMCP3008采用10位ADC，因此读数范围为0到1023。MCP3008类通过将读数乘以电压范围（3.3V）再除以1024，将其转换为电压值。\n\
    \n若不需要*完整*树莓派的所有功能，可使用树莓派Pico，其自带模拟输入，无需额外ADC芯片。详情请参见方案19.7。\n\n可组合使用以下任意涉及MCP3008的方案，实现最多八个传感器的读数采集。\n\
    \n也可将电阻式传感器与固定电阻组合，构成分压电路，配合MCP3008使用（参见方案14.8和14.9）。\n\n## 另请参阅\n\n若仅需检测旋钮转动，可使用旋转编码器替代电位器（方案13.7）。\n\
    \n也可通过阶跃响应法（方案14.1）检测电位器位置，无需使用ADC芯片。\n\n查阅MCP3008数据手册。\n\nPimoroni的Explorer HAT\
    \ Pro也内置ADC（方案10.16）。\n\n## 14.8 降低测量电压\n\n### 问题\n\n需要测量的电压高于MCP3008（方案14.7）可处理的3.3V上限。\n\
    \n### 解决方案\n\n使用电阻对构成分压器，将电压降至合适范围。\n\n尝试本方案需要以下材料：\n\n- 面包板与跳线（参见第564页“原型设备与套件”）\n\
    - MCP3008八通道ADC IC（参见第565页“集成电路”）\n- 10kΩ电阻（参见第565页“电阻与电容”）\n- 3.3kΩ电阻（参见第565页“电阻与电容”）\n\
    - 9V电池与鳄鱼夹导线\n\n图14-14展示了使用面包板的连接方式，该设置将测量电池电压。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_416_0.png)\n\
    \n图14-14. 降低模拟输入电压\n\n> 切勿使用本方案测量高压交流电或任何类型的交流电。本方案仅适用于低压直流电。\n\n打开编辑器并粘贴以下代码（ch_14_adc_scaled.py）：\n\
    \n```\nfrom gpiozero import MCP3008\nimport time\n\nR1 = 10000.0\nR2 = 3300.0\n\
    analog_input = MCP3008(channel=0)\n\nwhile True:\n    reading = analog_input.value\n\
    \    voltage_adc = reading * 3.3\n    voltage_actual = voltage_adc / (R2 / (R1\
    \ + R2))\n    print(\"Battery Voltage=\" + str(voltage_actual))\n    time.sleep(1)\n\
    ```\n\n与本书所有程序示例一样，您也可以下载此程序（参见方案3.22）。\n\n该程序与方案14.7的程序非常相似，主要区别在于使用两个电阻值（存储在变量R1和R2中）进行缩放计算。\n\
    \n运行程序后，将显示电池电压：\n\n```\n$ python3 ch_14_adc_scaled.py\nBattery Voltage=8.62421875\n\
    ```\n\n> 连接高于9V的电压前，请仔细阅读讨论部分，否则可能损坏MCP3008。\n\n### 讨论\n\n这种电阻排列方式称为*分压器*，有时也称*电位分压器*（图14-15）。根据输入电压和两个电阻值计算输出电压的公式如下：\n\
    \n```\nVout = Vin * R2 / (R1 + R2)\n```\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_417_0.png)\n\
    \n这意味着若R1和R2阻值相同（例如均为1kΩ），则Vout为Vin的一半。\n\n选择R1和R2时，还需考虑流经它们的电流，即Vin/(R1 + R2)。在前述示例中，R1为10kΩ，R2为3.3kΩ，因此电流为9V/13.3kΩ\
    \ = 0.68mA。该电流虽小，但长期连接仍会耗尽电池，故请勿持续连接。\n\n### 另请参阅\n\n为避免复杂计算，可使用[在线电阻计算器](https://www.google.com/search?q=online+resistor+calculator)。\n\
    \n分压器也用于将电阻式传感器与ADC配合使用时，将电阻转换为电压（[方案14.9](#recipe-14-9)）。\n\n## 14.9 将电阻式传感器与ADC配合使用\n\
    \n### 问题\n\n希望将电阻式传感器与MCP3008 ADC芯片配合使用。\n\n### 解决方案\n\n使用由固定电阻和电阻式传感器构成的分压器，将传感器电阻转换为可被ADC测量的电压。例如，可重新制作[方案14.2](#recipe-14-2)的光传感器项目，改用MCP3008替代阶跃响应技术。\n\
    \n尝试本方案需要以下材料：\n\n- 面包板与跳线（参见第564页“原型设备与套件”）\n- MCP3008八通道ADC IC（参见第565页“集成电路”）\n\
    - 10kΩ电阻（参见第565页“电阻与电容”）\n- 光敏电阻（参见第565页“电阻与电容”）\n\n图14-16展示了使用面包板的连接方式。\n\n可使用与[方案14.7](#recipe-14-7)完全相同的程序（`ch_14_adc_test.py`）。用手遮盖光传感器会改变读数。还需在树莓派上设置SPI，若尚未完成，请先遵循[方案10.6](#recipe-10-6)。\n\
    \n```\n$ python3 ch_14_adc_test.py\nReading=0.60 Voltage=2.00\nReading=0.54 Voltage=1.80\n\
    ```\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_419_0.png)\n\n图14-16. 将光敏电阻与ADC配合使用\n\
    \n读数可能因光敏电阻不同而有较大差异，但关键在于数值随光照强度变化而改变。\n\n### 讨论\n\n固定电阻值的选择并非十分关键。若阻值过高或过低，读数范围会相当狭窄。应选择介于传感器最小与最大电阻之间的阻值。可能需要尝试几种电阻，才能确定适合您传感器在目标读数范围内工作的阻值。如有疑问，可从10kΩ开始测试效果。\n\
    \n可将光敏电阻替换为几乎任何电阻式传感器。例如，可使用[方案14.4](Recipe 14.4)中的气体传感器。\n\n### 另请参阅\n\n若希望避免ADC的复杂性来测量光照强度，请参见[方案14.2](Recipe\
    \ 14.2)。\n\n有关同时使用ADC多个通道的示例，请参见[方案14.14](Recipe 14.14)。"
