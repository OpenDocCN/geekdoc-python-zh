  - '[PAGE 108]


    # Solution


    You can use the command chmod to modify file permissions.


    # Discussion


    Common reasons why you might want to change file permissions include needing to
    edit a file that is marked as read-only and giving a file execute permissions
    so that it can run as a program or script.


    The chmod command allows you to add or remove permissions for a file. There are
    two syntaxes for doing this: one requires the use of octal (base 8), and the other
    is text based. We''ll use the easier-to-understand text method.


    The first parameter to chmod is the change to make, and the second is the file
    or folder to which it should apply. The change parameter takes the form of the
    permission scope (+, -, = for add, remove, and set, respectively) and then the
    permission type.


    For example, the following command will add execute (x) rights for the owner (user)
    of the file file2.txt:


    ```

    $ chmod u+x file2.txt

    ```


    If we now list the directory, we can see that the x permission has been added:


    ```

    $ ls -l

    total 16

    -rw-r--r-- 1 pi pi    5 Apr 23 15:23 file1.txt

    -rwxr-xr-x 1 pi pi    5 Apr 24 08:08 file2.txt

    -rw-r--r-- 1 pi pi    5 Apr 23 15:23 file3.txt

    drwxr-xr-x 2 pi pi 4096 Apr 23 15:23 mydir

    ```


    If we wanted to add execute permissions for the group or for other users, we would
    use g and o, respectively. The letter a adds the permission for everyone.


    You will often find examples of setting the file permissions using a number. For
    example:


    ```

    $ chmod 777 file1.txt

    ```


    Each of the three digits represents 3 bits for the owner, group, and other parts
    of the file permission. The digits are octal, that is number base 8, so their
    binary values are as shown in the following table.'
  - '[PAGE 109]


    | Octal | Binary |

    |---|---|

    | 0 | 000 |

    | 1 | 001 |

    | 2 | 010 |

    | 3 | 011 |

    | 4 | 100 |

    | 5 | 101 |

    | 6 | 110 |

    | 7 | 111 |


    For example, a file permission of rwxr--r-- would be represented by the number
    744.


    # See Also


    For background on file permissions, see [Recipe 3.13](Recipe 3.13).


    For a chmod octal calculator, see [https://chmod-calculator.com](https://chmod-calculator.com).


    See [Recipe 3.15](Recipe 3.15) for changing file ownership.


    # 3.15 Changing File Ownership


    # Problem


    You need to change the ownership of a file.


    # Solution


    You can use the command chown (change owner) to modify the ownership of a file
    or directory.


    # Discussion


    As we discovered in [Recipe 3.13](Recipe 3.13), any file or directory has both
    an owner and a group associated with it. Because most users of the Raspberry Pi
    will just have the single user pi, we don''t really need to worry about groups.


    Occasionally, you will find files on your system that have been installed with
    a different user than pi. If this is the case, you can change the ownership of
    the file using the chown command.


    To change the owner of a file, use chown followed by the new owner and group,
    separated by a colon, and then the name of the file.'
  - '[PAGE 110]


    You will probably find that you need superuser privileges to change ownership,
    in which case you should prefix the command with sudo (Recipe 3.12). In this example,
    we change the owner of *file2.txt* from pi to root:


    ```

    $ sudo chown root:root file2.txt

    $ ls -l

    total 16

    -rw-r--r-- 1 pi   pi      5 Apr 23 15:23 file1.txt

    -rwxr--r-- 1 root root    5 Apr 24 08:08 file2.txt

    -rw-r--r-- 1 pi   pi      5 Apr 23 15:23 file3.txt

    drwxr-xr-x 2 pi   pi   4096 Apr 23 15:23 mydir

    ```


    # See Also


    For background on file permissions, see Recipe 3.13.


    Also see Recipe 3.14 for changing file permissions.


    # 3.16 Making a Screen Capture


    # Problem


    You want to capture an image of the Raspberry Pi''s screen and save it to a file.


    # Solution


    Use the delightfully named scrot (SCReenshOT) screen capture software.


    # Discussion


    The simplest way to trigger a screen capture is just to enter the command scrot.
    This will immediately take an image of the primary display and save it in a file
    named something like *2023-04-25-080116_1024x768_scrot.png* within the current
    directory.


    Sometimes you want a screenshot to show a menu being opened or something that
    generally disappears when the window loses focus. For such situations, you can
    specify a delay before the capture takes place by using the -d option:


    ```

    $ scrot -d 5

    ```


    The delay is specified in seconds.


    If you capture the entire screen, you can crop it later with image editing software,
    such as GIMP (Recipe 4.6). However, it is more convenient to just capture a specific
    area of the screen in the first place, which you can do by using the -s option.'
  - '[PAGE 111]


    To use this option, type the following command and then, with the mouse, drag
    to define the area of screen that you want to capture:


    ```

    $ scrot -s

    ```


    The filename will include the dimensions in pixels of the image captured.


    # See Also


    The `scrot` command has a number of other options to control things like using
    multiple screens and changing the format of the saved file. You can find out more
    about scrot from its manpage by entering the following command:


    ```

    $ man scrot

    ```


    > ## Manpages

    Manpages (manual pages) are available for almost all Raspberry Pi OS commands,
    and you can see them by entering the command name followed by the command itself.
    However, a command''s manpage is not always very accessible, being a thorough
    reference for the command rather than a simple guide for how to use it. So it''s
    often better just to do an internet search for the command.


    # 3.17 Installing Software with apt


    # Problem


    You want to install software using the command line.


    # Solution


    The most frequently used tool for installing software from a Terminal session
    is `apt` (the Advanced Packaging Tool).


    The basic format of the command, which you must run as superuser, is as follows:


    ```

    $ sudo apt install <name of software>

    ```


    For example, to install the AbiWord word processing software, you would enter
    this command:


    ```

    $ sudo apt install abiword

    ```


    # Discussion


    The `apt` package manager uses a list of available software. This list is included
    with the Raspberry Pi operating system distribution but is likely to be out of
    date. So it is'
  - '[PAGE 112]


    a good idea to always run the following command to update the list before installing
    new software using apt:


    ```

    $ sudo apt update

    ```


    The list and the software packages for installation are all on the internet, so
    none of this will work unless your Raspberry Pi has an internet connection.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_112_0.png)


    If you find that when you update you get an error like E: Problem with MergeList
    /var/lib/dpkg/status, try running these commands, which will remove the offending
    file and replace it with a new, empty one:


    ```

    $ sudo rm /var/lib/dpkg/status

    $ sudo touch /var/lib/dpkg/status

    ```


    The installation process can often take a while because the files must be downloaded
    and installed. Some installations will also add shortcuts to your desktop or the
    program groups on your Raspberry Menu.


    You can search for software to install using the command apt search followed by
    a search string such as abiword. This then displays a list of matching packages
    that you could install.


    # See Also


    See Recipe 3.18 for removing programs that you no longer need so that you can
    free up space.


    See also Recipe 3.21 for downloading source code from GitHub.


    For installing Python programs with pip, see Recipe 3.19.


    To install software using a graphical user interface, see Recipe 4.2.


    # 3.18 Removing Software Installed with apt


    # Problem


    Having installed a whole load of programs using apt, you now find that you want
    to remove some of them.


    # Solution


    The apt utility has an option (remove) that will remove a package, but it will
    remove only those packages that have been installed with apt install.'
  - '[PAGE 113]


    For example, if you wanted to remove AbiWord, you would use the following command:


    ```

    $ sudo apt remove abiword

    ```


    # Discussion


    Removing a package like this doesn''t always delete everything because packages
    often have prerequisite packages that are installed as well. To remove these,
    you can use the autoremove option, as shown here:


    ```

    $ sudo apt autoremove abiword

    $ sudo apt clean

    ```


    The apt clean option will do some further tidying up of unused package installation
    files.


    # See Also


    See Recipe 3.17 for installing packages using apt.


    # 3.19 Installing Python Packages with pip3


    # Problem


    You want to use the pip3 or pip (Pip Installs Packages) package manager to install
    Python libraries.


    # Solution


    If you have the latest version of Raspberry Pi OS, pip3 will already be installed,
    and you can run it from the command line. pip3 installs Python 3 packages, and
    on the rare occasion that you might need to install packages for Python 2, just
    use pip.


    Here is an example of using pip3 to install:


    ```

    $ pip3 install pyserial

    ```


    If pip3 is not installed on your system, you can install it using this command:


    ```

    $ sudo apt install python3-pip

    ```


    Sometimes you will want the software package to be installed for both Python 2
    and Python 3, and so you might find yourself running the same commands using both
    pip and pip3.'
- md: "## Discussion\n\nAlthough many Python libraries can be installed using apt\
    \ (see Recipe 3.17), some can't, and you must use pip instead.\n\n## See Also\n\
    \nTo install software using apt, see Recipe 3.17.\n\n## 3.20 Fetching Files from\
    \ the Command Line\n\n### Problem\n\nYou want to download a file from the internet\
    \ without using a web browser.\n\n### Solution\n\nYou can use the wget command\
    \ to fetch a file from the internet.\n\nFor example, the following command fetches\
    \ the file Pifm.tar.gz from https://www.icrobotics.co.uk:\n\n```\n$ wget http://www.icrobotics.co.uk/wiki/images/c/c3/Pifm.tar.gz\n\
    --2013-06-07 07:35:01--  http://www.icrobotics.co.uk/wiki/images/c/c3/Pifm.tar.gz\n\
    Resolving www.icrobotics.co.uk (www.icrobotics.co.uk)... 155.198.3.147\nConnecting\
    \ to www.icrobotics.co.uk (www.icrobotics.co.uk)|155.198.3.147|:80... connected.\n\
    HTTP request sent, awaiting response... 200 OK\nLength: 5521400 (5.3M) [application/x-gzip]\n\
    Saving to: ‘Pifm.tar.gz’\n\n100%[==================================================>]\
    \ 5,521,400    601K/s   in 8.9s    \n\n2018-06-07 07:35:11 (601 KB/s) - ‘Pifm.tar.gz’\
    \ saved [5521400/5521400]\n```\n\nIf your URL contains any special characters,\
    \ it's a good idea to enclose them in double quotes.\n\n### Discussion\n\nYou'll\
    \ find that some instructions for installing software rely on using wget to fetch\
    \ files. It's often more convenient to do this from the command line rather than\
    \ use a browser, find the file, download it, and then copy it to the place you\
    \ need it.\n\nThe wget command takes the URL to download as its argument and downloads\
    \ it into the current directory. It's typically used to download an archive file\
    \ of some type but will also download any web page. So, you could, for example,\
    \ fetch the Google homepage into a file called *index.html* using the command:\n\
    \n```\n$ wget google.com\n```\n\n### See Also\n\nFor information on installing\
    \ with apt, see [Recipe 3.17](Recipe 3.17).\n\n## 3.21 Fetching Source Code with\
    \ Git\n\n### Problem\n\nSometimes Python libraries and another software are hosted\
    \ on the GitHub website or other online Git repository. You need to be able to\
    \ fetch them onto your Raspberry Pi.\n\n### Solution\n\nTo use code in Git repositories,\
    \ you need to use the `git clone` command to make your own copy of the files.\n\
    \nFor example, the following command will download all of the source code examples\
    \ from this book into a new folder:\n\n```\n$ git clone https://github.com/simonmonk/raspberrypi_cookbook_ed4.git\n\
    ```\n\nAlong with the URL for the code to clone, there is a web page that you\
    \ can visit with a browser. If you go to the [GitHub web page for this book](GitHub\
    \ web page for this book), you will find a web page similar to the one shown in\
    \ *Figure 3-12*.\n\nClicking the Code button allows you to copy the repository's\
    \ URL and then paste it after the command `git` in your Terminal session.\n\n\
    ### Discussion\n\nThere is a difference between Git and GitHub. *Git* is software\
    \ used to manage code, and *GitHub* is one of many websites hosting code, which\
    \ was pushed there using Git. In fact, you can actually host your own Git repository\
    \ on a Raspberry Pi if you want to. However, there are benefits to using a Git-based\
    \ website such as GitHub or GitLab:\n\n- Your code is stored in the cloud, so\
    \ if your disk (or SD card) breaks, you won't lose the code.\n- The code is publicly\
    \ visible, so other people can look at it and use it, and if they find things\
    \ wrong with it they might even offer up fixes for you.\n- You can include documentation\
    \ about your project for all to see in the README file.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_116_0.png)\n\
    \nFigure 3-12. The GitHub repository page for this book\n\nIf you are working\
    \ on a Raspberry Pi project that you think others might be interested in, I would\
    \ recommend using GitHub or GitLab to host your code. There is a little bit to\
    \ learn, but it's worth the effort.\n\nAnother advantage to using Git (whether\
    \ locally or with a service like GitHub) is that every time you do a chunk of\
    \ work on a project, you will push that work up to the master copy of your code.\
    \ This doesn't replace the code that was already there, but is instead stored\
    \ as a new edition. You can at any time recover earlier versions of the code should\
    \ you make a mistake.\n\n> > The terms “master” and “slave” used in the 1-wire\
    \ and SPI interfaces were written into standards and code many years ago. The\
    \ origins of these words are clearly problematic. There are moves to replace this\
    \ terminology with something more modern (and more technically accurate). But\
    \ for now, unfortunately, we will continue seeing these names until code libraries\
    \ and the standards they reflect are brought up-to-date.\n\nI host all of the\
    \ code from my books and other projects on GitHub. These are the steps I take\
    \ when I make a new repository:\n\n1. Go to your home page on GitHub (you'll need\
    \ to create an account) and click the + button and select the New Repository option.\n\
    2. Give the repository a name and short description.\n3. Check the option “Initialize\
    \ this repository with a README.”\n4. Select a license—I select MIT for no better\
    \ reason than my great respect for that august center of learning, reasoning that\
    \ if it has a license for sharing my work, it's probably a good one.\n5. Click\
    \ “Create repository.”\n6. Back on your computer (Raspberry Pi or other), open\
    \ a Terminal (Recipe 3.3).\n7. Run the command git followed by the URL of the\
    \ repository. This will create a folder for the project. Any files that you write\
    \ in this folder will eventually be saved to GitHub when you type the following\
    \ commands:\n\n```\n$ git add .\n$ git commit -m \"message about what you changed\
    \ or added\"\n$ git push\n```\n\nThe first of these commands adds all of the changed\
    \ or new files to the list of files to be committed. The commit command gives\
    \ you an option to explain what's new in the changes being committed. Finally,\
    \ the push command pushes the changes up to GitHub. At this point, you are prompted\
    \ for your GitHub username and password. The password will actually be a token\
    \ that you generate from your GitHub account.\n\nYou will find GitHub to be a\
    \ rich source of Python and other code for use with the Raspberry Pi. This is\
    \ especially true when it comes to software interfaces to different types of hardware,\
    \ such as displays and sensors.\n\n### See Also\n\nLearn more about Git and the\
    \ Git hosting services GitHub and GitLab.\n\nFor information on downloading this\
    \ book's program code and other files relating to this book, see Recipe 3.22.\n\
    \n## 3.22 Fetching This Book’s Accompanying Code\n\n### Problem\n\nYou want to\
    \ download all the source code and other files relating to this book.\n\n### Solution\n\
    \nYou can either *clone* the files from GitHub as described in Recipe 3.21 or,\
    \ as we will describe here, get the downloads as a single ZIP archive file from\
    \ GitHub.\n\nA good starting point for getting the book's downloads is to go to\
    \ the book's web page using the browser on your Raspberry Pi. Here, in addition\
    \ to a link to the book's code hosted on GitHub, you will find errata and other\
    \ information about the book.\n\nSo whether you begin at the website or directly\
    \ at the GitHub page, when you click the Code button, you will see the Download\
    \ ZIP option (Figure 3-13).\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_118_0.png)\n\
    \nClick the Download ZIP option. Chromium saves this to your Downloads folder.\
    \ Click the down arrow next to the downloaded ZIP file and then select the option\
    \ “Show in folder.”\n\nThis opens a File Manager window in the Downloads folder.\
    \ Find the ZIP file that has just been downloaded.\n\nDouble-click the ZIP file\
    \ to open the Xarchiver tool and then click the “Extract files” icon.\n\nIn the\
    \ dialog that appears, change the path to which the extracted folder is to be\
    \ saved to /home/pi and then click Extract.\n\nAfter the files have been extracted,\
    \ there will be a new folder in your home directory containing all the downloads\
    \ for the book.\n\n### Discussion\n\nIf you now use the File Manager to see what's\
    \ in your home directory, you will find a folder called `raspberry_pi_cookbook_ed4-master`.\n\
    \n### See Also\n\nFor more information on using Git and GitHub, see [Recipe 3.21](Recipe\
    \ 3.21).\n\n## 3.23 Running a Program Automatically on Startup\n\n### Problem\n\
    \nYou want a program or script to start automatically as your Raspberry Pi boots.\n\
    \n### Solution\n\nModify your `rc.local` file to run the program you want.\n\n\
    Edit the file `/etc/rc.local` using the following command:\n\n```\n$ sudo nano\
    \ /etc/rc.local\n```\n\nAdd the following line after the first block of comment\
    \ lines that begin with `#`:\n\n```\n$ /usr/bin/python /home/pi/my_program.py\
    \ &\n```\n\nIt is important to include the `&` on the end of the command line\
    \ so that it is run in the background; otherwise your Raspberry Pi will not finish\
    \ booting.\n\n### Discussion\n\nThis way of autorunning a program needs a very\
    \ careful edit of `rc.local`, or you can stop your Raspberry Pi from booting.\n\
    \n### See Also\n\nA safer way of autorunning a program is detailed in [Recipe\
    \ 3.24](Recipe 3.24)."
  mdcn: "## 讨论\n\n虽然许多 Python 库可以使用 apt 安装（参见配方 3.17），但有些库无法通过 apt 安装，此时你必须改用 pip。\n\
    \n## 另请参阅\n\n要使用 apt 安装软件，请参见配方 3.17。\n\n## 3.20 从命令行获取文件\n\n### 问题\n\n你想在不使用网页浏览器的情况下从互联网下载文件。\n\
    \n### 解决方案\n\n你可以使用 `wget` 命令从互联网获取文件。\n\n例如，以下命令从 https://www.icrobotics.co.uk\
    \ 获取文件 Pifm.tar.gz：\n\n```\n$ wget http://www.icrobotics.co.uk/wiki/images/c/c3/Pifm.tar.gz\n\
    --2013-06-07 07:35:01--  http://www.icrobotics.co.uk/wiki/images/c/c3/Pifm.tar.gz\n\
    Resolving www.icrobotics.co.uk (www.icrobotics.co.uk)... 155.198.3.147\nConnecting\
    \ to www.icrobotics.co.uk (www.icrobotics.co.uk)|155.198.3.147|:80... connected.\n\
    HTTP request sent, awaiting response... 200 OK\nLength: 5521400 (5.3M) [application/x-gzip]\n\
    Saving to: ‘Pifm.tar.gz’\n\n100%[==================================================>]\
    \ 5,521,400    601K/s   in 8.9s    \n\n2018-06-07 07:35:11 (601 KB/s) - ‘Pifm.tar.gz’\
    \ saved [5521400/5521400]\n```\n\n如果你的 URL 包含任何特殊字符，最好将它们用双引号括起来。\n\n### 讨论\n\n\
    你会发现一些安装软件的说明依赖于使用 `wget` 来获取文件。通常，从命令行执行此操作比使用浏览器、找到文件、下载它，然后将其复制到所需位置要方便得多。\n\
    \n`wget` 命令将要下载的 URL 作为其参数，并将其下载到当前目录。它通常用于下载某种类型的归档文件，但也会下载任何网页。因此，例如，你可以使用以下命令将\
    \ Google 主页获取到名为 *index.html* 的文件中：\n\n```\n$ wget google.com\n```\n\n### 另请参阅\n\
    \n有关使用 apt 安装的信息，请参见 [配方 3.17](Recipe 3.17)。\n\n## 3.21 使用 Git 获取源代码\n\n### 问题\n\
    \n有时 Python 库和其他软件托管在 GitHub 网站或其他在线 Git 仓库中。你需要能够将它们获取到你的树莓派上。\n\n### 解决方案\n\n\
    要使用 Git 仓库中的代码，你需要使用 `git clone` 命令来创建你自己的文件副本。\n\n例如，以下命令将把本书的所有源代码示例下载到一个新文件夹中：\n\
    \n```\n$ git clone https://github.com/simonmonk/raspberrypi_cookbook_ed4.git\n\
    ```\n\n除了要克隆的代码的 URL 外，还有一个你可以用浏览器访问的网页。如果你访问 [本书的 GitHub 网页](GitHub web page\
    \ for this book)，你会看到一个类似于 *图 3-12* 所示的网页。\n\n点击 Code 按钮允许你复制仓库的 URL，然后将其粘贴到终端会话中的\
    \ `git` 命令之后。\n\n### 讨论\n\nGit 和 GitHub 之间存在区别。*Git* 是用于管理代码的软件，而 *GitHub* 是众多托管代码的网站之一，这些代码是使用\
    \ Git 推送到那里的。事实上，如果你愿意，你实际上可以在树莓派上托管你自己的 Git 仓库。然而，使用基于 Git 的网站（如 GitHub 或 GitLab）有以下好处：\n\
    \n- 你的代码存储在云端，因此如果你的磁盘（或 SD 卡）损坏，你不会丢失代码。\n- 代码是公开可见的，因此其他人可以查看和使用它，如果他们发现错误，甚至可能为你提供修复。\n\
    - 你可以在 README 文件中包含关于你项目的文档，供所有人查看。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_116_0.png)\n\
    \n图 3-12. 本书的 GitHub 仓库页面\n\n如果你正在开发一个你认为其他人可能感兴趣的树莓派项目，我建议使用 GitHub 或 GitLab\
    \ 来托管你的代码。需要学习一点东西，但值得付出努力。\n\n使用 Git（无论是本地还是通过 GitHub 等服务）的另一个优点是，每次你对项目进行一部分工作时，你都会将该工作推送到代码的主副本。这不会替换已有的代码，而是作为新版本存储。如果你犯了错误，你可以随时恢复代码的早期版本。\n\
    \n> > 1 线和 SPI 接口中使用的术语“master”和“slave”多年前就被写入了标准和代码中。这些词的起源显然有问题。人们正在努力用更现代（且技术上更准确）的术语来取代这些术语。但不幸的是，在代码库及其反映的标准更新之前，我们仍将继续看到这些名称。\n\
    \n我在 GitHub 上托管了我所有书籍和其他项目的代码。以下是我创建新仓库时采取的步骤：\n\n1. 转到你在 GitHub 上的主页（你需要创建一个账户），点击\
    \ + 按钮并选择 New Repository 选项。\n2. 为仓库命名并添加简短描述。\n3. 勾选选项“Initialize this repository\
    \ with a README.”\n4. 选择一个许可证——我选择 MIT，没有更好的理由，只是因为我非常尊重那个庄严的学术中心，认为如果它有一个分享我工作的许可证，那可能是个好许可证。\n\
    5. 点击“Create repository.”\n6. 回到你的计算机（树莓派或其他），打开终端（配方 3.3）。\n7. 运行命令 `git` 后跟仓库的\
    \ URL。这将为项目创建一个文件夹。你在此文件夹中编写的任何文件最终都会在你输入以下命令时保存到 GitHub：\n\n```\n$ git add .\n\
    $ git commit -m \"message about what you changed or added\"\n$ git push\n```\n\
    \n这些命令中的第一个将所有更改或新文件添加到要提交的文件列表中。`commit` 命令允许你解释正在提交的更改中的新内容。最后，`push` 命令将更改推送到\
    \ GitHub。此时，系统会提示你输入 GitHub 用户名和密码。密码实际上是你从 GitHub 帐户生成的令牌。\n\n你会发现 GitHub 是树莓派使用的\
    \ Python 和其他代码的丰富来源。当涉及到与不同类型硬件（如显示器和传感器）的软件接口时，尤其如此。\n\n### 另请参阅\n\n了解更多关于 Git\
    \ 和 Git 托管服务 GitHub 和 GitLab 的信息。\n\n有关下载本书程序代码和与本书相关的其他文件的信息，请参见配方 3.22。\n\n\
    ## 3.22 获取本书附带的代码\n\n### 问题\n\n你想下载所有与本书相关的源代码和其他文件。\n\n### 解决方案\n\n你可以按照配方 3.21\
    \ 中的描述从 GitHub *克隆*文件，或者，正如我们将在此处描述的，从 GitHub 获取单个 ZIP 归档文件的下载。\n\n获取本书下载内容的一个好的起点是使用树莓派上的浏览器访问本书的网页。在这里，除了指向托管在\
    \ GitHub 上的本书代码的链接外，你还会找到勘误表和关于本书的其他信息。\n\n因此，无论你是从网站开始还是直接从 GitHub 页面开始，当你点击\
    \ Code 按钮时，你会看到 Download ZIP 选项（图 3-13）。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_118_0.png)\n\
    \n点击 Download ZIP 选项。Chromium 将其保存到你的 Downloads 文件夹。点击下载的 ZIP 文件旁边的向下箭头，然后选择选项“Show\
    \ in folder.”\n\n这将在 Downloads 文件夹中打开一个文件管理器窗口。找到刚刚下载的 ZIP 文件。\n\n双击 ZIP 文件以打开\
    \ Xarchiver 工具，然后点击“Extract files”图标。\n\n在出现的对话框中，将提取文件夹的保存路径更改为 /home/pi，然后点击\
    \ Extract。\n\n文件提取后，你的主目录中将出现一个新文件夹，其中包含本书的所有下载内容。\n\n### 讨论\n\n如果你现在使用文件管理器查看主目录中的内容，你会发现一个名为\
    \ `raspberry_pi_cookbook_ed4-master` 的文件夹。\n\n### 另请参阅\n\n有关使用 Git 和 GitHub 的更多信息，请参见\
    \ [配方 3.21](Recipe 3.21)。\n\n## 3.23 在启动时自动运行程序\n\n### 问题\n\n你希望一个程序或脚本在树莓派启动时自动启动。\n\
    \n### 解决方案\n\n修改你的 `rc.local` 文件以运行你想要的程序。\n\n使用以下命令编辑文件 `/etc/rc.local`：\n\n\
    ```\n$ sudo nano /etc/rc.local\n```\n\n在以 `#` 开头的第一个注释块之后添加以下行：\n\n```\n$ /usr/bin/python\
    \ /home/pi/my_program.py &\n```\n\n在命令行末尾包含 `&` 非常重要，以便它在后台运行；否则你的树莓派将无法完成启动。\n\
    \n### 讨论\n\n这种自动运行程序的方式需要非常小心地编辑 `rc.local`，否则你可能会阻止你的树莓派启动。\n\n### 另请参阅\n\n自动运行程序的一种更安全的方法在\
    \ [配方 3.24](Recipe 3.24) 中有详细说明。"
