    \ Pi (Recipe 2.2). Figure 17-5 shows the sort of thing you can expect to see in\
    \ your browser when you connect to the Node-RED server.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_491_0.png)\n\
    \nThe idea behind Node-RED is that you draw your program (called a flow) rather\
    \ than write code. To do this, you drag nodes onto the editor area and then connect\
    \ them together. For example, Figure 17-5 shows a minimal flow with two Raspberry\
    \ Pi pins linked together. One pin acts as an input and might be connected to\
    \ a switch (let’s"
