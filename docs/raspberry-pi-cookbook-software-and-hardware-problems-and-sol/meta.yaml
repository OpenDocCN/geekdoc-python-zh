  md: "![](img/e36e77524aeaae366529d1cf02f9a39c_500_0.png)\n\nFigure 17-12. The ThingTweet\
    \ action\n\nThe Python program to send the web request that triggers the tweet\
    \ is called ch_17_send_tweet.py:\n\n```\npython\nimport time\nfrom gpiozero import\
    \ CPUTemperature\nimport requests\n\nMAX_TEMP = 35.0\nMIN_T_BETWEEN_WARNINGS =\
    \ 60 # Minutes\n\nBASE_URL = 'https://api.thingspeak.com/apps/thingtweet/1/statuses/update/'\n\
    KEY = 'your_key_here'\n\ndef send_notification(temp):\n    status = 'Thingtweet:\
    \ Raspberry Pi getting hot. CPU temp=' + str(temp)\n    data = {'api_key' : KEY,\
    \ 'status' : status}\n    response = requests.post(BASE_URL, json=data)\n    print(response.status_code)\n\
    \ndef cpu_temp():\n    cpu_temp = CPUTemperature().temperature\n    return cpu_temp\n\
    \nwhile True:\n    temp = cpu_temp()\n    print(\"CPU Temp (C): \" + str(temp))\n\
