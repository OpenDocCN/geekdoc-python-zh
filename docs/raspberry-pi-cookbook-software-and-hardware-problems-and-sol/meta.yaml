- img_proc: true
  md: "As you saw in Recipe 19.2, the Pin class contains the methods that you need\
    \ both to set a pin to be a digital output and to switch it on and off. So the\
    \ following code that you will find as ch_19_blink.py in the pico folder should\
    \ be familiar:\n\n```\nfrom machine import Pin\nfrom utime import sleep\nled =\
    \ Pin(16, Pin.OUT)\nwhile True:\n    led.on()\n    sleep(0.5) # pause\n    led.off()\n\
    \    sleep(0.5)\n```\n\nAs with all the program examples in this book, you can\
    \ also download this code (see Recipe 3.22).\n\nIn MicroPython, the sleep function\
    \ is in the utime module rather than the time module used in regular Python. However,\
    \ it does the same job here of pausing for half a second.\n\n# Discussion\n\n\
    The total current budget for all GPIO pins is 50mA. That is, when you add up all\
    \ the currents used by things connected to the GPIO pins, it should not exceed\
    \ 50mA. LEDs should not be connected to a GPIO pin without a series resistor that\
    \ sets the current that the LEDs will draw. Without such a resistor, an LED might\
    \ draw too much current and destroy the Pico, or at least that GPIO pin. Most\
    \ indicator LEDs are designed to shine at close to their maximum brightness at\
    \ around 15mA. So you could connect three LEDs drawing 15mA (for a total of 45mA)\
    \ and still have a little current budget to spare. However, modern high-brightness\
    \ LEDs work just fine at 5mA and even passably well at 1mA.\n\nThe current I,\
    \ drawn by an LED connected with a series resistor as shown in Figure 19-10, is\
    \ determined by the formula:\n\n$$I = \\frac{3.3 - V_f}{R}$$\n\nWhere $V_f$ is\
    \ the forward voltage of the LED. This depends mostly on the color of the LED,\
    \ with a red LED typically having a $V_f$ of about 2V. $R$ is the value of the\
    \ resistor in $\\Omega$ (ohms).\n\nFor example, if you use a red LED with a $V_f$\
    \ of 2V and a resistor of 470$\\Omega$, the current will be:\n\n(3.3 - 2) / 470\
    \ = 0.00276 A = 2.76mA\n\nResistors come in standard values, with common ones\
    \ being 100$\\Omega$, 270$\\Omega$, 470$\\Omega$, and 1k$\\Omega$ (1,000$\\Omega$).\
    \ To complicate things further, $V_f$ is usually the $V_f$ at 20mA and this"
  merge: -1
  pgno: 561
- img_proc: true
  md: 'actually decreases a little at lower currents. Table 19-2 will provide you
    with a useful reference for choosing series resistors without having to do the
    math.


    Table 19-2. LED series resistor selector


    | LED color | Series resistor value | Approximate current |

    | :--- | :--- | :--- |

    | Red (V<sub>f</sub> = 1.8) | 100Ω | 15mA |

    | Red (V<sub>f</sub> = 1.8) | 270Ω | 6mA |

    | | 470Ω | 3mA |

    | Red, Orange (V<sub>f</sub> = 2.0) | 100Ω | 13mA |

    | | 270Ω | 5mA |

    | | 470Ω | 3mA |

    | Yellow, Green (V<sub>f</sub> = 2.2) | 100Ω | 11mA |

    | | 270Ω | 4mA |

    | Blue, White (V<sub>f</sub> = 3.5)<sup>a</sup> | 100Ω | 4mA<sup>a</sup> |


    <sup>a</sup> Although theoretically a lower supply voltage than forward voltage
    means that you could use the LED without a resistor, this could still draw too
    much current, so say a 100Ω resistor is a good idea even with blue and white LEDs.


    # See Also


    For more information on connecting an LED to GPIO pins, see Recipe 11.1.

    Many online calculators are available for working our values of series resistor.
    This is a good one.

    Resistors like the ones used here with the breadboard have colored stripes that
    indicate their resistance value.


    # 19.5 Using Digital Inputs on a Pico


    # Problem


    You want to be able to connect a switch, or other digital input, to a Raspberry
    Pi Pico or Pico W.


    # Solution


    Connect your switch (or other source as a digital input) to your Pico and use
    the Pin class to set the pin to act as an input and to read its value.

    Let''s start by connecting a switch between one of the Pico''s GND pins and pin
    16. We can do this on a breadboard, as shown in Figure 19-11.'
