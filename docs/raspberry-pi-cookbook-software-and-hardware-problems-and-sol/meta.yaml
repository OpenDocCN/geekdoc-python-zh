    ### Discussion


    When all of this is complete, you can disconnect the jumper wires and get a qualified
    person to install your Sonoff so that it is supplied from AC and ready to switch
    whatever you have in mind for it to switch.


    However, it might be wise to do a bit more testing of the newly flashed Sonoff
    before connecting it to the AC or putting it somewhere inaccessible. So you can,
    if you prefer, continue to power the Sonoff from your Raspberry Pi by leaving
    the 3.3V and GND jumpers in place. The LED will light when the Sonoff is switched
    on.


    In addition to the Sonoff model that I used here, many other models are available,
    including some that look like regular light switches but contain a WiFi module.


    ### See Also


    For more information on Tasmota, see [https://oreil.ly/aevZD](https://oreil.ly/aevZD).


    Having flashed your Sonoff, follow the next recipe (Recipe 18.4) to configure
    it.


    ## 18.4 Configuring a Sonoff WiFi Smart Switch


    ### Problem


    You need to join your Sonoff WiFi switch to your home WiFi network.


    ### Solution


    First, flash the Tasmota firmware onto your Sonoff using Recipe 18.4. If you have
    the Tasmota firmware on your Sonoff and it''s powered up, either using the 3.3V
    supply of your Raspberry Pi (Pi 2 or later) or in situ with an AC supply, you
    can now configure the Sonoff by connecting to the wireless access point that it
    will be running. At the time of writing, you won''t be able to do this with your
    Raspberry Pi because, after you join it, the wireless access point does not trigger
    the welcome page for the access point to be opened in the same way as it does
    if you connect using a Mac or Windows PC. Instead, you''ll need to connect to
    the WiFi access point called something like Sonoff-2500 on your PC or Mac, or
    even on your smartphone (Figure 18-14).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_525_0.png)


    Figure 18-14. Joining a Sonoff to a WiFi network


    You have the option to enter credentials for two wireless access points. But assuming
    you have just one, either use the “Scan for wifi networks” link at the top of
    the page or else just enter your access point name in the AP1 SSID field and your
    password in the AP1 Password field and then click Save.


    The Sonoff will reboot and, if you entered the access point credentials correctly,
    it will reboot connecting to your network.


    Now you have the problem of finding the Sonoff’s IP address. A tool like Fing
    for Android phones or Discovery for iOS will do this. As you can see from Figure
    18-15, in my case the Sonoff has been assigned the IP address 192.168.1.84.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_526_0.png)


    Figure 18-15. Finding the Sonoff''s IP address


    ### Discussion


    Now that the Sonoff is connected to your network, it will change mode, and rather
    than run an entire access point, it will instead run a web server on your network
    from which you can manage the device. To connect to this web page, enter the IP
    address of the Sonoff into a browser on any machine connected to the network.
    You should see something like Figure 18-16.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_527_0.png)


    Figure 18-16. The Sonoff''s web page


    Click the Toggle button to turn the Sonoff''s LED on and off. If the Sonoff is
    actually wired into your house, rather than being powered from your Raspberry
    Pi, it will turn whatever it was connected to on and off.


    ### See Also


    To see how you can configure these switches to work with MQTT and Node-RED, see
    [Recipe 18.5](#).


    ## 18.5 Using Sonoff Web Switches with MQTT


    ### Problem


    You want to be able to control your newly flashed Sonoff web switch using MQTT.


    ### Solution


    First make sure that you have followed Recipes 18.3 and 18.4 to flash new firmware
    onto your Sonoff device and configure it to connect to your WiFi network.


    To control the Sonoff switch using MQTT, you need to configure the Sonoff using
    its web interface. Enter the IP address of your Sonoff (see Recipe 18.4) into
    your browser and click the Configuration button. This opens the menu shown in
    Figure 18-17.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_528_0.png)


    Figure 18-17. The Sonoff Tasmota configuration menu


    Click the Configure MQTT option to open the MQTT configuration page, shown in
    Figure 18-18.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_529_0.png)


    Figure 18-18. The Sonoff Tasmota MQTT configuration menu


    This is where we configure the Sonoff as a client to an MQTT server (see Recipe
    18.1) and specify how it will subscribe, so that when we publish a command (say,
    to turn on), it understands the command.


    To do this, you need to change some of the fields in the configuration form:


    - Change the Host field to the IP address of your Raspberry Pi running the MQTT
    server.

    - Change the Client field to “sonoff_1”. We’ve added a “_1” in case we end up
    with multiple Sonoff devices that we need to distinguish. You can also use a more
    meaningful name here if you like—perhaps “bedroom_1_sonoff” if that’s where the
    Sonoff is going to be installed.

    - The User and Password fields are not used because our MQTT server doesn''t have
    any security configured. This is not as reckless as it sounds, as no one can do
    anything unless they are already inside your network. So it doesn''t matter what
    you put in these fields.

    - Change the Topic to “sonoff_1” again because you might end up with multiple
    Sonoff switches.

    - Leave the Full Topic field unchanged.


    Click Save, and the Sonoff will reboot itself for the changes to take effect.


    ### Discussion


    You can test this MQTT interface from a Terminal. Enter the following command,
    and the Sonoff’s LED should light:


    ```

    $ mosquitto_pub -t cmnd/sonoff_1/power -m 1

    ```


    Enter this command to turn the switch off again:


    ```

    $ mosquitto_pub -t cmnd/sonoff_1/power -m 0

    ```


    If this doesn’t work, add the -d option to the commands to check that the Mosquitto
    client commands are connecting to the MQTT server.


    ### See Also


    We build on the work of this recipe in Recipe 18.6 to control the switch using
    Node-RED.


    ## 18.6 Using Flashed Sonoff Switches with Node-RED


    ### Problem


    You want to use a flashed Sonoff web switch with Node-RED.


    ### Solution


    Follow Recipe 18.5 to get your Sonoff working with MQTT, and then use a Node-RED
    MQTT node in a flow like that shown in Figure 18-19.


    If you want, you can import the flow rather than build it up from scratch. Follow
    the instructions in the Discussion section of Recipe 18.2 to import the flow.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_531_0.png)


    Figure 18-19. A Node-RED flow for a delay timer


    This flow assumes that a push button is attached to the Raspberry Pi’s GPIO 25,
    and that, when it’s pressed, the Sonoff will be switched on for 10 seconds before
    being switched off again.


    The push button is set up the same way as the button we used in Recipe 17.3 and
    needs a hardware switch connected to GPIO 25 (see Recipe 13.1).


    You will find the Trigger nodes in the Function section of Node-RED. We need two
    of these, so drag them out to the flow. Figure 18-20 shows the settings for the
    “On trigger” node.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_532_0.png)


    Figure 18-20. Configuring the “On trigger” node


    This Trigger node is configured to send a 1 when triggered, wait for a quarter
    of a second (for debouncing), and then do nothing further. It’s given the name
    “On trigger.”


    The “Off trigger” is different from the “On trigger” because we need it to delay
    for 10 seconds before sending a 0 to the Sonoff. Figure 18-21 shows the settings
    for this.'
