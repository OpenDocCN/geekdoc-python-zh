    \ 页“集成电路”）\n- 面包板和跳线（参见第 564 页“原型设备和套件”）\n\n图 12-12 显示了使用 ULN2803 的接线图。请注意，你可以使用该芯片驱动两个这样的电机。要驱动第二个步进电机，你需要将\
    \ GPIO 连接器上的另外四个控制引脚连接到 ULN2803 的引脚 5 到 8，然后将第二个电机的四个引脚连接到 ULN2803 的引脚 11 到 14。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_355_0.png)\n\n图 12-12. 使用 ULN2803 控制单极步进电机\n\
    \n来自 GPIO 连接器的 5V 电源可以与小型步进电机配合使用。如果你遇到 Raspberry Pi 崩溃的问题，或者需要使用更大的步进电机，请为电机电源（ULN2803\
    \ 的引脚 10）使用单独的电源。\n\n打开编辑器并粘贴以下代码（*ch_12_stepper.py*）。此程序使用命令行，因此你可以从 SSH 运行它：\n\
    \n```python\nfrom gpiozero import Motor\nimport time\n\ncoil1 = Motor(forward=18,\
    \ backward=23, pwm=False)\ncoil2 = Motor(forward=24, backward=17, pwm=False)\n\
    \nforward_seq = ['FF', 'BF', 'BB', 'FB']\nreverse_seq = list(forward_seq) # to\
    \ copy the list\nreverse_seq.reverse()\n\ndef forward(delay, steps):\n    for\
    \ i in range(steps):\n        for step in forward_seq:\n            set_step(step)\n\
    \            time.sleep(delay)\n\ndef backwards(delay, steps):\n    for i in range(steps):\n\
    \        for step in reverse_seq:\n            set_step(step)\n            time.sleep(delay)\n\
    \ndef set_step(step):\n    if step == 'S':\n        coil1.stop()\n        coil2.stop()\n\
    \    else:\n        if step[0] == 'F':\n            coil1.forward()\n        else:\n\
    \            coil1.backward()\n        if step[1] == 'F':\n            coil2.forward()\n\
    \        else:\n            coil2.backward()\n\nwhile True:\n    set_step('S')\n\
    \    delay = input(\"Delay between steps (milliseconds)?\")\n    steps = input(\"\
    How many steps forward? \")\n    forward(int(delay) / 1000.0, int(steps))\n  \
    \  set_step('S')\n    steps = input(\"How many steps backwards? \")\n    backwards(int(delay)\
    \ / 1000.0, int(steps))\n```\n\n与本书中的所有程序示例一样，你也可以下载此代码（参见配方 3.22）。\n\n运行程序时，系统会提示你输入步进之间的延迟。这应该是\
    \ 2 或更大。然后系统会提示你输入每个方向的步数：\n\n```\n$ python3 ch_12_stepper.py\nDelay between steps\
    \ (milliseconds)?2\nHow many steps forward? 100\nHow many steps backwards? 100\n\
    Delay between steps (milliseconds)?10\nHow many steps forward? 50\nHow many steps\
    \ backwards? 50\nDelay between steps (milliseconds)?\n```\n\n此代码在随后的讨论部分中进行了解释，因为了解一些关于步进电机工作原理的知识有助于理解代码。\n\
    \n### 讨论\n\n步进电机使用带有交替南北极的齿状转子和电磁铁来一次*一步*地推动轮子转动（图 12-13）。请注意，引线的颜色会有所不同。\n\n\
    以特定顺序为线圈通电会驱动电机旋转。步进电机在 360 度旋转中的步数实际上是转子上的齿数。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_357_0.png)\n\
    \n图 12-13. 步进电机\n\n两个线圈分别由 gpiozero 类 Motor 的一个实例控制，分别称为 coil1 和 coil2。\n\n程序使用一个字符串列表来表示构成单个步进的四个通电阶段：\n\
    \n```python\nforward_seq = ['FF', 'BF', 'BB', 'FB']\n```\n\n每对字母表示 coil1 和 coil2\
    \ 的电流方向：向前或向后。因此，看一下图 12-13，假设公共红色连接到 GND，那么粉红-橙色线圈的字母 F 可能使粉红为高电平，橙色为低电平，而 B\
    \ 则会反转此状态。\n\n电机反向旋转的序列只是正向序列的反向。\n\n你可以在程序中使用 forward 和 backward 函数来使电机来回步进。这两个函数的第一个参数是步进序列中每个部分之间的延迟（以毫秒为单位）。此值的最小值取决于你使用的电机。如果太小，电机将不会转动。通常，两毫秒或更多就可以了。第二个参数是要执行的步数：\n\
    \n```python\ndef forward(delay, steps):\n    for i in range(steps):\n        for\
    \ step in forward_seq:\n            set_step(step)\n            time.sleep(delay)\n\
    ```\n\nforward 函数有两个嵌套的 for 循环。外层循环重复步数次，内层循环遍历电机激活序列，依次调用 set_step：\n\n```python\n\
    def set_step(step):\n    if step == 'S':\n        coil1.stop()\n        coil2.stop()\n\
    \    else:\n        if step[0] == 'F':\n            coil1.forward()\n        else:\n\
    \            coil1.backward()\n        if step[1] == 'F':\n            coil2.forward()\n\
    \        else:\n            coil2.backward()\n```\n\nset_step 函数根据作为其 step 参数提供的消息设置每个线圈的极性。命令\
    \ S 停止向两个线圈供电，这样我们可以在电机不移动时避免使用电流。如果第一个字母是 F，则 coil1 设置为向前；否则设置为向后。coil2 的设置方式相同，但使用\
    \ step 的第二个字母。\n\n主循环在向前和向后移动之间将步进设置为 S，以便在电机实际不转动时停用两个线圈。否则，其中一个线圈可能会保持开启状态，导致电机不必要地消耗电流。\n\
    \n## 另请参阅\n\n如果你有一个四线双极步进电机，请参阅配方 12.7。\n\n更多信息，请参阅维基百科上关于步进电机的文章，你还可以看到不同类型及其工作原理，以及找到一个很好的动画解释，说明驱动电机的激活模式。\n\
    \n有关使用伺服电机的信息，请参阅配方 12.1；有关控制直流电机的信息，请参阅配方 12.4 和 12.5。\n\n有关在 Raspberry Pi 上使用面包板和跳线的更多信息，请参阅配方\
    \ 10.9。\n\n## 12.7 使用双极步进电机\n\n### 问题\n\n你想使用 Raspberry Pi 驱动一个四线双极步进电机。\n\n###\
    \ 解决方案\n\n使用 L293D H 桥驱动芯片。驱动双极步进电机需要 H 桥，因为正如*双极*一词所暗示的，绕组中的电流方向需要反转，这有点像双向驱动直流电机（参见配方\
    \ 12.5）。\n\n要制作此配方，你需要以下物品：\n\n- 12V，四针双极步进电机（参见第 567 页“杂项”）\n- L293D H 桥 IC（参见第\
    \ 565 页“集成电路”）\n- 面包板和跳线（参见第 564 页“原型设备和套件”）\n\n这里使用的电机是一个 12V 的，比配方 12.6 中的单极步进电机示例要大一些。因此，电机本身的电源由外部电源提供，而不是来自\
    \ Raspberry Pi。请参阅图 12-14 中的接线图。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_359_0.png)"
