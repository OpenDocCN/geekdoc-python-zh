  md: '# CHAPTER 10

    Hardware Basics


    # 10.0 Introduction


    This chapter contains some basic recipes for setting up and using the Raspberry
    Pi’s general-purpose input/output (GPIO) connector. This connector enables you
    to connect all sorts of interesting electronics to your Raspberry Pi.


    # 10.1 Finding Your Way Around the GPIO Connector


    # Problem


    You need to connect electronics to the GPIO connector, but first you need to know
    more about what all the pins do.


    # Solution


    There have been three versions of the Raspberry Pi GPIO connector: two 26-pin
    layouts for the original Raspberry Pi, and one 40-pin layout that was introduced
    with the Raspberry Pi “+” models and has been in use ever since.


    A 26-pin Raspberry Pi is more of a vintage collectible than a practical computer,
    and you’ll likely find it slow and incompatible with a whole slew of software.
    So, for practical terms, you’ll probably need to get a Raspberry Pi 4 or 400,
    or at least a Pi 3.


    Figure 10-1 shows the current 40-pin layout, which is the same for all 40-pin
    GPIO Raspberry Pi models right up to the Raspberry Pi 4 and 400.


    The top 26 pins are the same as the 26 pins of the original Raspberry Pi model
    B revision 2. This allows the 40-pin Raspberry Pi models to use hardware and software
    designed for the earlier 26-pin Raspberry Pi designs. The extra pins of the 40-pin'
  merge: -1
  pgno: 280
- img_proc: true
  md: 'connector are made up of three useful extra GND connections and nine GPIO pins.
    The ID_SD and ID_SC pins are intended for use in communicating with a special
    serial memory chip, which can be included on interface boards that conform to
    the hardware attached on top (HAT) standard and allows the Raspberry Pi to identify
    the board (see the Discussion section).


    ![](img/e36e77524aeaae366529d1cf02f9a39c_281_0.png)


    Figure 10-1. The GPIO pinout (40-pin models)


    At the top of the connector, there are 3.3V and 5V power supplies. The GPIO uses
    3.3V for all inputs and outputs. Any pin with a number next to it can act as a
    GPIO pin. Those that have another name after the number also have some other special
    purpose: 14 TXD and 15 RXD are the transmit and receive pins of the serial interface;
    2 SDA and 3 SCL form the I2C interface; and 10 MOSI, 9 MISO, and 11 SCKL form
    the SPI interface.


    > **3V Only**

    The GPIO connector has both 3V (actually 3.3V) and 5V power pins. This gives the
    false impression that the Raspberry Pi is OK with you connecting 5V electronics
    to it. Although it can supply 5V power to a device, all connections to GPIO pins
    on the Pi must be 3V, or they will damage your Raspberry Pi. Typically, connecting
    a 5V connection to a GPIO pin will burn out that pin and possibly the whole of
    the Raspberry Pi''s processor.'
  merge: -1
  pgno: 281
- img_proc: true
  md: '# Discussion


    Working out which pin is which on a Raspberry Pi is quite error prone if you rely
    on counting down the pin connector to find the pin you need. A better way of finding
    the correct pin is to use a GPIO template like the Raspberry Leaf shown in Figure
    10-2.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_282_0.png)


    Figure 10-2. The Raspberry Leaf GPIO template


    This template fits over the GPIO pins, indicating which pin is which. Other GPIO
    templates include the Pi GPIO reference board.


    The HAT standard is an interface standard that you can use with the Raspberry
    Pi 4, 3, 2, B+, A+, and Zero. This standard does not in any way stop you from
    just using GPIO pins directly; however, interface boards that conform to the HAT
    standard can call themselves HATs. HATs differ from regular Raspberry Pi interface
    boards in that they must contain a little electrically erasable programmable read-only
    memory (EEPROM) chip that is used to identify the HAT so that ultimately the Raspberry
    Pi can autoinstall necessary software. As of this writing, HATs have not quite
    met that level of sophistication, but the idea is a good one. The pins ID_SD and
    ID_SC are used to communicate with a HAT EEPROM.


    # See Also


    The Raspberry Pi GPIO connector has only digital inputs and outputs; it doesn''t
    have the analog inputs found on some similar boards. You can get around this shortcoming
    by using a separate analog-to-digital converter (ADC) chip (Recipe 14.7) or by
    using resistive sensors (Recipe 14.1).


    For an example of a HAT, see the Sense HAT described in Recipe 10.15.'
  merge: -1
  pgno: 282
- img_proc: true
  md: '# 10.2 Using the GPIO Connector on a Raspberry Pi 400


    # Problem


    The GPIO connector on the Raspberry Pi 400 is a little hard to reach because it’s
    on the back and recessed. How do I access it easily?


    # Solution


    The pinout of the GPIO connector on a Raspberry Pi 400 is the same as all the
    40-pin GPIO Raspberry Pis. To make it easier to attach jumper wires to the connector,
    use a GPIO adapter like the [MonkMakes GPIO Adapter](https://monkmakes.com) for
    Pi 400 shown in Figure 10-3.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_283_0.png)


    Other types of GPIO adapters are available from SparkFun, Pi Hut, and others.


    # Discussion


    You are unlikely to want to embed a bulky and relatively expensive Pi 400 into
    your electronics project. However, if your goal is to learn about electronics
    with your Pi 400, then an adapter is a lot easier than trying to attach jumper
    wires to the back of the Pi 400.'
  merge: -1
  pgno: 283
- img_proc: true
  md: 'HATs don''t fit onto the Pi 400 without an adapter either, so a GPIO adapter
    also allows add-on HATs to be used with the Pi 400, such as the Sense HAT shown
    in Figure 10-4.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_284_0.png)


    Figure 10-4. A Raspberry Pi 400 with Sense HAT


    There are a few add-on boards (Adafruit calls them *bonnets*) designed to work
    well with the Pi 400, such as the Air Quality board shown in Figure 10-5, the
    Pimoroni Breakout Garden for Pi 400, and the Adafruit Cyberdeck Bonnet.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_284_1.png)


    Figure 10-5. The Air Quality board for Raspberry Pi 400


    # See Also


    For more information on the Sense HAT pictured in Figure 10-4, see Recipe 10.15.'
  merge: -1
