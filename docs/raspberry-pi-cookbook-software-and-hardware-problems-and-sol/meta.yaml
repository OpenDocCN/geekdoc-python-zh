    # 3.21 Fetching Source Code with Git


    # Problem


    Sometimes Python libraries and another software are hosted on the GitHub website
    or other online Git repository. You need to be able to fetch them onto your Raspberry
    Pi.


    # Solution


    To use code in Git repositories, you need to use the `git clone` command to make
    your own copy of the files.


    For example, the following command will download all of the source code examples
    from this book into a new folder:


    ```

    $ git clone https://github.com/simonmonk/raspberrypi_cookbook_ed4.git

    ```


    Along with the URL for the code to clone, there is a web page that you can visit
    with a browser. If you go to the [GitHub web page for this book](GitHub web page
    for this book), you will find a web page similar to the one shown in *Figure 3-12*.


    Clicking the Code button allows you to copy the repository''s URL and then paste
    it after the command `git` in your Terminal session.


    # Discussion


    There is a difference between Git and GitHub. *Git* is software used to manage
    code, and *GitHub* is one of many websites hosting code, which was pushed there
    using Git. In fact, you can actually host your own Git repository on a Raspberry
    Pi if you want to. However, there are benefits to using a Git-based website such
    as GitHub or GitLab:


    +   - Your code is stored in the cloud, so if your disk (or SD card) breaks, you
    won''t lose the code.'
  merge: -1
