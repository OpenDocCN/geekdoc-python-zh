    # 1.4 Selecting a Power Supply


    # Problem


    You need to select a power supply for your Raspberry Pi.


    # Solution


    The basic electrical specification for a power supply suitable for a Raspberry
    Pi is that it provides a regulated 5V DC (direct current).


    The amount of current that the power supply must be capable of providing depends
    both on the model of Raspberry Pi and on the peripherals attached to it. It is
    worth getting a power supply that can easily cope with the Raspberry Pi, and you
    should consider 1A to be a minimum for any model of Raspberry Pi.


    If you buy your power supply from the same place that you buy the Raspberry Pi,
    the seller should be able to tell you whether it will work with the Raspberry
    Pi.


    The Raspberry Pi 4 should be used with a 3A power supply. This is in part because
    its greater processing power than earlier models requires more electrical power,
    but also because its two USB3 ports are able to supply up to 1.2A to high-power
    USB peripherals such as external USB drives.


    If you are going to be using WiFi or USB peripherals that require significant
    amounts of power with pre-Raspberry Pi 4 models, you should get a power supply
    capable of 1.5A or even 2A. Also beware of very low-cost power supplies that might
    not provide an accurate or reliable 5V.


    # Discussion


    The Raspberry Pi 4 is the first Raspberry Pi to use the more modern USB-C connector.
    Unlike the micro-USB connector used on earlier boards, this connector is reversible
    (Figure 1-9).'
  - '[PAGE 33]


    ![](img/e36e77524aeaae366529d1cf02f9a39c_33_0.png)


    Figure 1-9. Power and video connections for the Raspberry Pi 3 (top) and 4 (bottom)


    In Figure 1-9, you can see the USB-C power connector of a Raspberry Pi 4 below
    the micro-USB connector of a Raspberry Pi 3. As an aside, you can also see the
    pair of micro-HDMI video ports that replace the single full-size HDMI connector.


    Whether your Raspberry Pi uses a USB-C connector or a micro-USB connector, the
    power supply and connectors are actually the same as those found in many smart-phone
    chargers. If they terminate in a micro-USB plug, they are almost certainly 5V
    (but check). The only question, then, is whether they can supply enough current.


    If they can’t, a few bad things can happen:


    +   - They might become hot and be a potential fire risk.

    - They might simply fail.

    - At times of high load (say, when the Pi is using WiFi or playing video), the
    voltage might dip and the Raspberry Pi might reset itself.


    If you are using a Raspberry Pi 3 or earlier, look for a power supply that says
    it can supply 1A or more. If it specifies a number of watts (W) rather than amps
    (A), divide the number of watts by 5 to get the number of amps. So a 5V 10W power
    supply can supply 2A (2,000mA).


    Using a power supply with, say, a maximum current of 2A will not use any more
    electricity than a 700mA power supply. The Raspberry Pi takes only as much current
    as it needs.'
  - '[PAGE 34]


    In Figure 1-10, I measure the current taken by a Raspberry Pi model B and compare
    it with a Raspberry Pi 2 model B and a Raspberry Pi 4.


    ![](img/e36e77524aeaae366529d1cf02f9a39c_34_0.png)


    The newer Raspberry Pis (starting with the A+ and all the way through to the Pi
    4) are far more power-efficient than the original Raspberry Pi 1 models, but when
    the processor is fully occupied and has a lot of peripherals attached, they can
    still reach similar current requirements, and, in the case of the Raspberry Pi
    4, quite a lot more.


    As you can see in Figure 1-10, if your Raspberry Pi is going to be on all the
    time, a Raspberry Pi 2 will run cooler and use a lot less power than the newest
    Raspberry Pi 4.


    In Figure 1-10, you can see that the current rarely exceeds 700mA. However, the
    processor isn''t really doing very much here. Were you to start playing HD video,
    the current would increase considerably. When it comes to power supplies, it''s
    always better to have something in reserve.


    # See Also


    You can buy an uninterruptible power supply (UPS) for the Raspberry Pi. This ensures
    that the Pi can keep running for 10–30 minutes in the event of a power failure.


    The Raspberry Pi has no on/off switch, but you can buy a module that will turn
    off the power when the Raspberry Pi shuts down.'
