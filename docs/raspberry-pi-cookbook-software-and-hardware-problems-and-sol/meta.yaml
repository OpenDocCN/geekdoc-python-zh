    \nListening for a response normally involves a loop that reads and prints, as\
    \ illustrated in this example:\n\n```\nwhile True:\n    print(ser.read())\n```\n\
    \n# See Also\n\nYou will need to use this technique in recipes that connect hardware\
    \ to the serial port, such as Recipe 13.10.\n\n# 10.8 Installing Minicom to Test\
    \ the Serial Port\n\n# Problem\n\nYou want to send and receive serial commands\
    \ from a Terminal session.\n\n# Solution\n\nInstall Minicom:\n\n```\n$ sudo apt\
    \ install minicom\n```\n\nAfter Minicom is installed, you can start a serial communication\
    \ session with a serial device connected to the RXD and TXD pins of the GPIO connector\
    \ using this command:\n\n```\n$ minicom -b 9600 -o -D /dev/serial0\n```\n\nThe\
    \ parameter after -b is the baud rate, and the parameter after -D is the serial\
    \ port. Be sure to use the same baud rate as the one on the device you are communicating\
    \ with."
