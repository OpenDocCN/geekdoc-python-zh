    \ USB-C 线（不是 Pico 的 micro USB）将其连接到你的树莓派，然后你就可以像使用 Pico 一样与之交互。\n为了方便访问电子墨水显示屏，Pimoroni\
    \ 包含了一个用于在电子墨水显示屏上绘制图形和文本的 Python 模块。\nch_19_badger.py 中的示例程序（如图 19-22 所示）使用 RP2040\
    \ 的温度传感器显示一个基本的温度计。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_581_0.png)\n\n\
    图 19-22. Pimoroni Badger RP2040 板\n\n如果你更喜欢以华氏度显示温度，请使用程序 *ch_19_badger_f.py*。温度可能总是显示比室温高几度，因为这是芯片的温度，而不是环境温度：\n\
    \n```python\nimport badger2040\nfrom machine import ADC\nfrom utime import sleep\n\
