- md: "This library uses the Python Image Library (PIL) and NumPy modules, which you\
    \ can install using the following command:\n\n```\n$ sudo apt install python3-pil\n\
    $ sudo apt install python3-numpy\n```\n\nThe code example *ch_15_oled_clock.py*\
    \ displays the time and date on the OLED display:\n\n```\nimport board\nfrom PIL\
    \ import Image, ImageDraw, ImageFont\nimport adafruit_ssd1306\nfrom time import\
    \ sleep\nfrom datetime import datetime\n\n# Set up display\ni2c = board.I2C()\n\
    disp = adafruit_ssd1306.SSD1306_I2C(128, 64, i2c, addr=0x3C)\nsmall_font = ImageFont.truetype('FreeSans.ttf',\
    \ 12)\nlarge_font = ImageFont.truetype('FreeSans.ttf', 33)\ndisp.fill(0)\ndisp.show()\n\
    \n# Make an image to draw on in 1-bit color.\nwidth = disp.width\nheight = disp.height\n\
    image = Image.new('1', (width, height))\ndraw = ImageDraw.Draw(image)\n\n# Display\
    \ a message on 3 lines, first line big font\ndef display_message(top_line, line_2):\n\
    \    draw.rectangle((0,0,width,height), outline=0, fill=0)\n    draw.text((0,\
    \ 0),  top_line, font=large_font, fill=255)\n    draw.text((0, 50),  line_2, font=small_font,\
    \ fill=255)\n    disp.image(image)\n    disp.show()\n\nwhile True:\n    now =\
    \ datetime.now()\n    date_message = '{:%d %B %Y}'.format(now)\n    time_message\
    \ = '{:%H:%M:%S}'.format(now)\n    display_message(time_message, date_message)\n\
    \    sleep(0.1)\n```\n\nAs with all the program examples in this book, you can\
    \ also download this program (see Recipe 3.22).\n\n## Discussion\n\nEvery I2C\
    \ slave device has an address, which is set in the line:\n\n```\ndisp = adafruit_ssd1306.SSD1306_I2C(128,\
    \ 64, i2c, addr=0x3C)\n```\n\nThis is fixed at 3C (hex) for many of the low-cost\
    \ I2C modules, but may vary, so you should check any documentation that comes\
    \ with the device or use I2C tools (Recipe 10.5) to list all the I2C devices attached\
    \ to the bus so that you can see the address of your display.\n\nThe preceding\
    \ code example uses a technique called *double buffering*. This involves preparing\
    \ what is to be displayed and then switching it onto the image in one go. This\
    \ prevents the display from flickering.\n\nYou can see the code for this in the\
    \ `display_message` function. First it draws onto the image a blank rectangle\
    \ the entire size of the display. It then draws the text onto the image, and then\
    \ sets the display content to be image using `disp.image(image)`. The display\
    \ isn't actually updated until the function `disp.show()` is called.\n\nSmall\
    \ OLED displays are cheap, don't use much current, and have high resolution despite\
    \ their diminutive size. They are replacing LCD displays in many consumer products.\n\
    \n## See Also\n\nThe instructions here are for four-pin I2C interfaces. If you\
    \ really want to use the SPI interface, take a look at [Adafruit's tutorial](https://learn.adafruit.com/adafruit-oled-displays-for-raspberry-pi).\n\
    \n## 15.5 Using Addressable RGB LED Strips\n\n### Problem\n\nYou want to connect\
    \ an RGB LED strip (NeoPixels) to your Raspberry Pi.\n\n### Solution\n\nUse an\
    \ LED strip based on the WS2812 RGB LED chips on your Raspberry Pi.\n\nUsing these\
    \ LED strips (Figure 15-5) can be really easy, with a direct connection to the\
    \ Raspberry Pi and power for the LEDs supplied by the Raspberry Pi's 5V supply.\
    \ This is the “Happy Day” scenario that should work just fine, but do see the\
    \ Discussion for providing external power so that your LED strip use is trouble-free.\n\
    \n> **Don't Power the LEDs from the Pi's 3.3V Supply**\n\nAlthough it might be\
    \ tempting to power the LEDs from the 3.3V supply pin on the GPIO connector, do\
    \ not do this—it can supply only low currents (see Recipe 10.3). Using this pin\
    \ could easily damage your Raspberry Pi.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_463_0.png)\n\
    \nFigure 15-5. An LED strip of 10 LEDs\n\nThe LED strip used in Figure 15-5 is\
    \ cut from a reel. In this case, there are 10 LEDs. Because each LED can use up\
    \ to 60mA, 10 is probably a sensible limit for the number of LEDs that can be\
    \ used without arranging for a separate power supply for the LED strip (see the\
    \ Discussion section).\n\nTo connect the strip to the Raspberry Pi, jumper wires\
    \ with female connectors on one end were cut and the wire ends soldered to the\
    \ three connections on the LED strip (see Recipe 10.3): GND, DI (data in), and\
    \ 5V. These can then be attached to GPIO pins GND, GPIO 18, and 5V, respectively.\n\
    \nNotice that the LED strip has right-facing arrows printed on it (Figure 15-6).\
    \ Make sure that when you solder leads to the LED strip, you start from the cut\
    \ end to the *left* of the arrows.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_463_1.png)\n\
    \nFigure 15-6. An LED strip close-up\n\nWe are going to use the Adafruit software\
    \ to control our addressable LEDs. To install it, run the following commands:\n\
    \n```\n$ pip3 install adafruit-blinka\n$ sudo pip3 install rpi_ws281x adafruit-circuitpython-neopixel\n\
    ```\n\nThe following example program (ch_15_neopixel.py) will set the LED red\
    \ in successive positions along the strip:\n\n```\nimport time\nimport board\n\
    from neopixel import NeoPixel\n\nled_count = 5\nred = (100, 0, 0)\nno_color =\
    \ (0, 0, 0)\n\nstrip = NeoPixel(board.D18, led_count, auto_write=False)\n\ndef\
    \ clear():\n    for i in range(0, led_count):\n        strip[i] = no_color\n \
    \   strip.show()\n\ni = 0\nwhile True:\n    clear()\n    strip[i] = red\n    strip.show()\n\
    \    time.sleep(1)\n    i += 1\n    if i >= led_count:\n        i = 0\n```\n\n\
    As with all the program examples in this book, you can also download this program\
    \ (see Recipe 3.22).\n\nRun the program with Python 3 and use the sudo command\
    \ like this:\n\n```\n$ sudo python3 ch_15_neopixel.py\n```\n\nIf you have a different\
    \ number of LEDs in your strip, modify led_count. The rest of the constants do\
    \ not need to be changed.\n\nYou can use only GPIOs 10, 12, 18, and 21 with NeoPixels.\
    \ If you want to use a different GPIO pin, change board.D18 to whichever pin you\
    \ are using.\n\nYou can set the color of each of the LEDs independently. The colors\
    \ are set as a tuple of red, green, and blue intensities. To change the color\
    \ of an LED at a particular position, use the strip variable as if it were an\
    \ array and set that element to the color you want. For example (strip[i] = red).\n\
    \nThe changes to the LED colors are not actually updated until the method show\
    \ is called.\n\n## Discussion\n\nEach LED in the strip can use a maximum of about\
    \ 60mA. They will do this only if all three color channels (red, green, and blue)\
    \ are at maximum brightness (255). If you plan to use a lot of LEDs, you’ll need\
    \ to use a separate 5V power supply sufficient to supply all the LEDs in your\
    \ strip. Figure 15-7 shows how you would wire up a separate power supply. A female\
    \ direct current (DC) jack-to-screw terminal adapter (see “Prototyping Equipment\
    \ and Kits” on page 564) makes it easy to connect an external power supply to\
    \ a breadboard.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_465_0.png)\n\n## See\
    \ Also\n\nNeoPixels are also available in [ring format](https://www.adafruit.com/category/35).\n\
    \nYou can read more about the Adafruit approach to NeoPixels at [https://oreil.ly/-oA90](https://oreil.ly/-oA90).\n\
    \n## 15.6 Using the Pimoroni Unicorn HAT\n\n### Problem\n\nYou want an RGB LED\
    \ matrix display for your Raspberry Pi.\n\n### Solution\n\nUse a Pimoroni Unicorn\
    \ HAT to provide an 8x8 LED matrix (Figure 15-8).\n\nStart by installing the Unicorn\
    \ HAT software from Pimoroni:\n\n```\n$ curl https://get.pimoroni.com/unicornhat\
    \ | bash\n```\n\nYou will be asked several times to confirm various bits of software\
    \ to install and finally to reboot your Raspberry Pi.\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_466_0.png)\n\
    \nFigure 15-8. The Pimoroni Unicorn HAT on a Raspberry Pi 3\n\nWhen you've completed\
    \ the installation, here's a colorful program (*ch_15_unicorn.py*) to run on it.\
    \ It will repeatedly set the color of a random pixel to a random color. Run the\
    \ program using the sudo command:\n\n```\nimport time\nimport unicornhat as unicorn\n\
    from random import randint\n\nunicorn.set_layout(unicorn.AUTO)\nunicorn.rotation(0)\n\
    unicorn.brightness(1)\nwidth, height = unicorn.get_shape()\n\nwhile True:\n  \
    \  x = randint(0, width)\n    y = randint(0, height)\n    r, g, b = (randint(0,\
    \ 255), randint(0, 255), randint(0, 255))\n    unicorn.set_pixel(x, y, r, g, b)\n\
    \    unicorn.show()\n    time.sleep(0.01)\n\ntime.sleep(1)\n```\n\nAs with all\
    \ the program examples in this book, you can also download this program (see Recipe\
    \ 3.22)."
  mdcn: "本库使用了Python图像库（PIL）和NumPy模块，你可以通过以下命令安装：\n\n```\n$ sudo apt install python3-pil\n\
    $ sudo apt install python3-numpy\n```\n\n代码示例 *ch_15_oled_clock.py* 会在OLED显示屏上显示时间和日期：\n\
    \n```\nimport board\nfrom PIL import Image, ImageDraw, ImageFont\nimport adafruit_ssd1306\n\
    from time import sleep\nfrom datetime import datetime\n\n# Set up display\ni2c\
    \ = board.I2C()\ndisp = adafruit_ssd1306.SSD1306_I2C(128, 64, i2c, addr=0x3C)\n\
    small_font = ImageFont.truetype('FreeSans.ttf', 12)\nlarge_font = ImageFont.truetype('FreeSans.ttf',\
    \ 33)\ndisp.fill(0)\ndisp.show()\n\n# Make an image to draw on in 1-bit color.\n\
    width = disp.width\nheight = disp.height\nimage = Image.new('1', (width, height))\n\
    draw = ImageDraw.Draw(image)\n\n# Display a message on 3 lines, first line big\
    \ font\ndef display_message(top_line, line_2):\n    draw.rectangle((0,0,width,height),\
    \ outline=0, fill=0)\n    draw.text((0, 0),  top_line, font=large_font, fill=255)\n\
    \    draw.text((0, 50),  line_2, font=small_font, fill=255)\n    disp.image(image)\n\
    \    disp.show()\n\nwhile True:\n    now = datetime.now()\n    date_message =\
    \ '{:%d %B %Y}'.format(now)\n    time_message = '{:%H:%M:%S}'.format(now)\n  \
    \  display_message(time_message, date_message)\n    sleep(0.1)\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。\n\
    \n## 讨论\n\n每个I2C从设备都有一个地址，该地址在以下行中设置：\n\n```\ndisp = adafruit_ssd1306.SSD1306_I2C(128,\
    \ 64, i2c, addr=0x3C)\n```\n\n对于许多低成本I2C模块，此地址固定为3C（十六进制），但也可能有所不同，因此你应该检查设备附带的任何文档，或使用I2C工具（配方10.5）列出连接到总线的所有I2C设备，以便查看你的显示屏地址。\n\
    \n前面的代码示例使用了一种称为*双缓冲*的技术。这涉及准备好要显示的内容，然后一次性切换到图像上。这可以防止显示屏闪烁。\n\n你可以在`display_message`函数中看到相关代码。首先，它在图像上绘制一个与显示屏整个尺寸相同的空白矩形。然后，它将文本绘制到图像上，接着使用`disp.image(image)`将显示内容设置为该图像。实际上，直到调用`disp.show()`函数时，显示屏才会更新。\n\
    \n小型OLED显示屏价格低廉，功耗低，尽管尺寸小巧却具有高分辨率。它们正在许多消费产品中取代LCD显示屏。\n\n## 另请参阅\n\n此处的说明适用于四针I2C接口。如果你确实想使用SPI接口，请查看[Adafruit的教程](https://learn.adafruit.com/adafruit-oled-displays-for-raspberry-pi)。\n\
    \n## 15.5 使用可寻址RGB LED灯带\n\n### 问题\n\n你想将RGB LED灯带（NeoPixels）连接到你的树莓派。\n\n###\
    \ 解决方案\n\n在你的树莓派上使用基于WS2812 RGB LED芯片的LED灯带。\n\n使用这些LED灯带（图15-5）可以非常简单，直接连接到树莓派，并由树莓派的5V电源为LED供电。这是“快乐日”场景，应该可以正常工作，但请务必参阅讨论部分，了解如何提供外部电源，以确保你的LED灯带使用无忧。\n\
    \n> **不要使用树莓派的3.3V电源为LED供电**\n\n虽然从GPIO连接器的3.3V电源引脚为LED供电可能很诱人，但请不要这样做——它只能提供低电流（参见配方10.3）。使用此引脚很容易损坏你的树莓派。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_463_0.png)\n\n图15-5. 一个包含10个LED的灯带\n\
    \n图15-5中使用的LED灯带是从一卷上剪下来的。在这种情况下，有10个LED。因为每个LED最多可使用60mA，所以在不为LED灯带安排单独电源的情况下，10个可能是可以使用的LED数量的合理上限（参见讨论部分）。\n\
    \n要将灯带连接到树莓派，需要剪断一端带有母连接器的跳线，并将线端焊接到LED灯带上的三个连接点（参见配方10.3）：GND、DI（数据输入）和5V。然后，它们可以分别连接到GPIO引脚GND、GPIO\
    \ 18和5V。\n\n请注意，LED灯带上印有向右的箭头（图15-6）。确保在将引线焊接到LED灯带时，从箭头*左侧*的剪断端开始。\n\n![](img/e36e77524aeaae366529d1cf02f9a39c_463_1.png)\n\
    \n图15-6. LED灯带特写\n\n我们将使用Adafruit软件来控制我们的可寻址LED。要安装它，请运行以下命令：\n\n```\n$ pip3 install\
    \ adafruit-blinka\n$ sudo pip3 install rpi_ws281x adafruit-circuitpython-neopixel\n\
    ```\n\n以下示例程序（ch_15_neopixel.py）将沿灯带在连续位置将LED设置为红色：\n\n```\nimport time\nimport\
    \ board\nfrom neopixel import NeoPixel\n\nled_count = 5\nred = (100, 0, 0)\nno_color\
    \ = (0, 0, 0)\n\nstrip = NeoPixel(board.D18, led_count, auto_write=False)\n\n\
    def clear():\n    for i in range(0, led_count):\n        strip[i] = no_color\n\
    \    strip.show()\n\ni = 0\nwhile True:\n    clear()\n    strip[i] = red\n   \
    \ strip.show()\n    time.sleep(1)\n    i += 1\n    if i >= led_count:\n      \
    \  i = 0\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。\n\n使用Python 3运行程序，并使用sudo命令，如下所示：\n\
    \n```\n$ sudo python3 ch_15_neopixel.py\n```\n\n如果你的灯带中LED数量不同，请修改led_count。其余常量无需更改。\n\
    \n你只能将GPIO 10、12、18和21与NeoPixels一起使用。如果你想使用不同的GPIO引脚，请将board.D18更改为你正在使用的任何引脚。\n\
    \n你可以独立设置每个LED的颜色。颜色设置为红色、绿色和蓝色强度的元组。要更改特定位置LED的颜色，请将strip变量当作数组使用，并将该元素设置为你想要的颜色。例如（strip[i]\
    \ = red）。\n\nLED颜色的更改实际上直到调用show方法时才会更新。\n\n## 讨论\n\n灯带中的每个LED最多可使用约60mA。只有当所有三个颜色通道（红色、绿色和蓝色）都处于最大亮度（255）时，它们才会这样做。如果你计划使用大量LED，你将需要使用一个单独的5V电源，该电源应足以供应灯带中的所有LED。图15-7展示了如何连接单独的电源。一个母头直流（DC）插孔到螺丝端子适配器（参见第564页的“原型设备和套件”）使得将外部电源连接到面包板变得容易。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_465_0.png)\n\n## 另请参阅\n\nNeoPixels也有[环形格式](https://www.adafruit.com/category/35)。\n\
    \n你可以在[https://oreil.ly/-oA90](https://oreil.ly/-oA90)阅读更多关于Adafruit NeoPixels方法的信息。\n\
    \n## 15.6 使用Pimoroni Unicorn HAT\n\n### 问题\n\n你想为你的树莓派配备一个RGB LED矩阵显示屏。\n\n###\
    \ 解决方案\n\n使用Pimoroni Unicorn HAT提供一个8x8 LED矩阵（图15-8）。\n\n首先从Pimoroni安装Unicorn\
    \ HAT软件：\n\n```\n$ curl https://get.pimoroni.com/unicornhat | bash\n```\n\n你将被多次要求确认要安装的各种软件，最后要求重启你的树莓派。\n\
    \n![](img/e36e77524aeaae366529d1cf02f9a39c_466_0.png)\n\n图15-8. 树莓派3上的Pimoroni\
    \ Unicorn HAT\n\n完成安装后，这里有一个彩色程序（*ch_15_unicorn.py*）可以在其上运行。它将重复地将随机像素的颜色设置为随机颜色。使用sudo命令运行程序：\n\
    \n```\nimport time\nimport unicornhat as unicorn\nfrom random import randint\n\
    \nunicorn.set_layout(unicorn.AUTO)\nunicorn.rotation(0)\nunicorn.brightness(1)\n\
    width, height = unicorn.get_shape()\n\nwhile True:\n    x = randint(0, width)\n\
    \    y = randint(0, height)\n    r, g, b = (randint(0, 255), randint(0, 255),\
    \ randint(0, 255))\n    unicorn.set_pixel(x, y, r, g, b)\n    unicorn.show()\n\
    \    time.sleep(0.01)\n\ntime.sleep(1)\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。"
