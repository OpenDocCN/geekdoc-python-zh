- md: "## 14.22 Writing to an RFID Card\n\nHaving written some text onto the card,\
    \ you can check whether it's there by using *01_read.py*. The code for *02_write.py*\
    \ is:\n\n```python\nimport RPi.GPIO as GPIO\nimport SimpleMFRC522\n\nreader =\
    \ SimpleMFRC522.SimpleMFRC522()\n\ntry:\n    while True:\n        text = input('New\
    \ Text: ')\n        print(\"Now scan a tag to write\")\n        id, text = reader.write(text)\n\
    \        print(\"written\")\n\n        print(id)\n        print(text)\nfinally:\n\
    \    print(\"cleaning up\")\n    GPIO.cleanup()\n```\n\nUsing the full features\
    \ of an RFID card reader is pretty complex. The SimpleMFRC522 class greatly simplifies\
    \ this process into basic reading and writing of text to the card. After instantiating\
    \ the SimpleMFRC522 class, you can just call read to read from a card that is\
    \ being scanned. This returns both the ID and any text written on the card. The\
    \ write method returns the same values, but also allows you to specify the text\
    \ to be written to the card.\n\n## Discussion\n\nRFID tags are available in all\
    \ sorts of shapes and sizes. But a number of different standards are used that\
    \ operate at different frequencies and use different communication protocols,\
    \ so when looking for cards to work with the RC-522, look for cards described\
    \ as 13.56 MHz. The SimpleMFRC522 code is also a bit fussy about the cards it\
    \ will work with, so if you plan to use it, also look for tags described as being\
    \ Mifare 1k compatible.\n\nBecause of the differences between what cards can store\
    \ in their memory and how they store it, it's often better not to rely on storing\
    \ data on the tag but rather to use the card's unique ID. You can then store data\
    \ against that unique key. The programs 05_launcher_setup.py and 05_launcher.py\
    \ in the clever_card_kit directory show how you can use this approach using table\
    \ data stored in a pickle file (see Recipe 7.9).\n\n## See Also\n\nMore information\
    \ is available in the full documentation of SimpleMFRC522 code.\n\n## 14.23 Displaying\
    \ Sensor Values\n\n### Problem\n\nYou have a sensor wired to your Raspberry Pi,\
    \ and you want a big digital display of the reading on the screen.\n\n### Solution\n\
    \nUse the guizero library to open a window, and display the reading on it in a\
    \ large font (Figure 14-32).\n\n![Figure 14-32. Displaying a sensor reading using\
    \ guizero](img/e36e77524aeaae366529d1cf02f9a39c_448_0.png)\n\nThis example uses\
    \ data from the ToF range finder of Recipe 14.20. So complete that recipe first\
    \ if you want to try out this example. Alternatively, most of the other sensor\
    \ recipes in this chapter could be adapted to work with this recipe. Test out\
    \ the recipe by opening an editor and pasting in the following code (ch_14_gui_sensor_reading.py):\n\
    \n```python\nimport VL53L1X, time\nfrom guizero import App, Text\n\ntof = VL53L1X.VL53L1X(i2c_bus=1,\
    \ i2c_address=0x29)\ntof.open()\ntof.start_ranging(1)\n\ndef update_reading():\n\
    \    mm = tof.get_distance()\n    reading_text.value = str(mm)\n\napp = App(width=300,\
    \ height=150)\nreading_text = Text(app, size=100)\nreading_text.repeat(1000, update_reading)\n\
    app.display()\n```\n\nAs with all the program examples in this book, you can also\
    \ download this program (see Recipe 3.22).\n\nThe function update_reading gets\
    \ a new reading from the range finder (or whatever sensor you have chosen to use)\
    \ and sets the value of reading_text to be that value (as a string).\n\nTo ensure\
    \ that the readings are updated automatically, the repeat method is called on\
    \ reading_text with a first parameter of the number of milliseconds between updates\
    \ (in this case, 1000) and a second parameter of the function to call (update_reading).\n\
    \n### Discussion\n\nAlthough this recipe uses a distance sensor, it works equally\
    \ well with the other sensor recipes in this chapter. You just need to change\
    \ the method of obtaining a reading from the sensor.\n\n### See Also\n\nFor information\
    \ on formatting numbers to a certain number of decimal places, see Recipe 7.1.\n\
    \nFor an example of displaying sensor data in a web browser rather than an application\
    \ window, see Recipe 17.2.\n\n## 14.24 Logging to a USB Flash Drive\n\n### Problem\n\
    \nYou want to log data measured with a sensor onto a USB flash drive.\n\n### Solution\n\
    \nWrite a Python program that writes the data to a file on a USB flash drive.\
    \ By writing the file in comma-separated value (CSV) format, you can import it\
    \ directly into a spreadsheet, including LibreOffice on the Raspberry Pi (Recipe\
    \ 4.3).\n\nThe example program (ch_14_temp_log.py) will log temperature readings\
    \ recorded from your Raspberry Pi's CPU (see Recipe 14.11):\n\n```python\nimport\
    \ glob, time, datetime\nfrom gpiozero import CPUTemperature\n\nlog_period = 600\
    \ # seconds\n\nlogging_folder = glob.glob('/media/pi/*')[0]\ndt = datetime.datetime.now()\n\
    file_name = \"temp_log_{:%Y_%m_%d}.csv\".format(dt)\nlogging_file = logging_folder\
    \ + '/' + file_name\n\ndef read_temp():\n    cpu_temp = CPUTemperature().temperature\n\
    \    return cpu_temp\n\ndef log_temp():\n    temp_c = read_temp()\n    dt = datetime.datetime.now()\n\
    \    f = open(logging_file, 'a')\n    line = '\\n\"{:H:%M:%S}\",\"{}\"'.format(dt,\
    \ temp_c)\n    f.write(line)\n    print(line)\n    f.close()\n\nprint(\"Logging\
    \ to: \" + logging_file)\nwhile True:\n    log_temp()\n    time.sleep(log_period)\n\
    ```\n\nAs with all the program examples in this book, you can download this program\
    \ (see Recipe 3.22).\n\nThe program is set to log the temperature every 10 minutes\
    \ (600 seconds). You can alter this by changing the value of `log_period`.\n\n\
    You need to run this program using sudo to allow access to the flash drive:\n\n\
    ```\n$ sudo python3 ch_14_temp_log.py\nLogging to: /media/pi/temp_log_2022_06_22.csv\n\
    \"13:09:02\",\"38.459\"\n\"13:09:12\",\"38.946\"\n\"13:09:22\",\"37.972\"\n\"\
    13:09:32\",\"37.485\"\n```\n\nWhen logging starts, the path to the logging file\
    \ on the flash drive is displayed.\n\nNote that to speed things up, the logging\
    \ period was set to 10 seconds.\n\n### Discussion\n\nWhen you plug a USB flash\
    \ drive into a Raspberry Pi, it automatically installs it under `/media/pi`. If\
    \ more than one removable drive is attached to your Raspberry Pi, the program\
    \ uses the first folder it finds inside `/media`. The name of the logging file\
    \ is constructed from the current date.\n\nIf you open the file in a spreadsheet,\
    \ you will be able to edit it directly. Your spreadsheet might ask you to specify\
    \ the separator for the data, which will be a comma.\n\nFigure 14-33 shows a set\
    \ of data captured using this recipe, and the resulting file has been opened with\
    \ the LibreOffice spreadsheet (Recipe 4.3) running on the Raspberry Pi.\n\n![Figure\
    \ 14-33. Charting data with a spreadsheet](img/e36e77524aeaae366529d1cf02f9a39c_451_0.png)\n\
    \n### See Also\n\nThis program could easily be adapted for use with any of the\
    \ other sensors used in this chapter.\n\nFor an example of logging sensor data\
    \ to a web service, see Recipe 17.7.\n\n# CHAPTER 15 Displays\n\n## 15.0 Introduction\n\
    \nAlthough the Raspberry Pi can use a monitor or TV as a display, it is often\
    \ nice to use a smaller, more specialized display with it. In this chapter, we\
    \ explore a range of different displays that can be attached to a Raspberry Pi.\n\
    \nAn alternative to attaching special-purpose displays as described in this chapter\
    \ is to attach a monitor (this can be a small one) to your Raspberry Pi or even\
    \ use a phone or tablet connected over VNC.\n\n## 15.1 Using a Four-Digit LED\
    \ Display\n\n### Problem\n\nYou want to display a four-digit number in an old-fashioned,\
    \ seven-segment LED display.\n\n### Solution\n\nAttach an Inter-Integrated Circuit\
    \ (I2C) LED module, such as the model shown in Figure 15-1, to a Raspberry Pi\
    \ using female-to-female jumper wires.\n\n![Figure 15-1. Seven-segment LED display\
    \ with a Raspberry Pi](img/e36e77524aeaae366529d1cf02f9a39c_453_0.png)\n\nTo make\
    \ this recipe, you’ll need the following:\n\n- Four female-to-female jumper wires\
    \ (see “Prototyping Equipment and Kits” on page 564)\n- Adafruit 4×7-segment LED\
    \ with I2C backpack (see “Modules” on page 566)\n\nThe connections between the\
    \ Raspberry Pi and the module are as follows:\n\n- VCC (+) on the display to 5V\
    \ on the Raspberry Pi general-purpose input/output (GPIO) connector\n- GND (-)\
    \ on the display to GND on the Raspberry Pi GPIO connector\n- SDA (D) on the display\
    \ to GPIO 2 (SDA) on the Raspberry Pi GPIO connector\n- SCL (C) on the display\
    \ to GPIO 3 (SCL) on the Raspberry Pi GPIO connector\n\nNote that Adafruit also\
    \ supplies a jumbo-size LED display. You can connect this to the Raspberry Pi\
    \ using the connections in the preceding list, but the larger display has two\
    \ positive power pins: one for the logic (V_IO) and one for the display (5V).\
    \ This is because, being a large display, it requires more current. Fortunately,\
    \ the Raspberry Pi can supply enough power for it. You can use an extra female-to-female\
    \ jumper wire to connect this extra pin to the second 5V pin on the GPIO connector.\n\
    \nFor this recipe to work, you’ll also need to set up your Raspberry Pi for I2C,\
    \ so follow Recipe 10.4 first."
  mdcn: "## 14.22 写入RFID卡\n\n将一些文本写入卡中后，你可以使用 *01_read.py* 来检查内容是否存在。*02_write.py*\
    \ 的代码如下：\n\n```python\nimport RPi.GPIO as GPIO\nimport SimpleMFRC522\n\nreader\
    \ = SimpleMFRC522.SimpleMFRC522()\n\ntry:\n    while True:\n        text = input('New\
    \ Text: ')\n        print(\"Now scan a tag to write\")\n        id, text = reader.write(text)\n\
    \        print(\"written\")\n\n        print(id)\n        print(text)\nfinally:\n\
    \    print(\"cleaning up\")\n    GPIO.cleanup()\n```\n\n使用RFID读卡器的全部功能相当复杂。SimpleMFRC522类极大地简化了这一过程，将其转化为对卡进行基本文本读写操作。实例化SimpleMFRC522类后，你只需调用read方法即可读取正在扫描的卡。该方法返回卡的ID和卡上写入的任何文本。write方法返回相同的值，但还允许你指定要写入卡中的文本。\n\
    \n## 讨论\n\nRFID标签有各种形状和尺寸。但存在多种不同的标准，它们在不同频率下运行并使用不同的通信协议，因此在寻找与RC-522配合使用的卡时，请寻找描述为13.56\
    \ MHz的卡。SimpleMFRC522代码对其可配合使用的卡也有些挑剔，因此如果你计划使用它，也请寻找描述为兼容Mifare 1k的标签。\n\n由于不同卡在内存中能存储的数据量和存储方式存在差异，通常最好不要依赖在标签上存储数据，而是使用卡的唯一ID。然后你可以将数据存储在该唯一键下。clever_card_kit目录中的程序05_launcher_setup.py和05_launcher.py展示了如何使用存储在pickle文件中的表数据来实现这种方法（参见配方7.9）。\n\
    \n## 另请参阅\n\n更多信息可在SimpleMFRC522代码的完整文档中找到。\n\n## 14.23 显示传感器数值\n\n### 问题\n\n\
    你有一个传感器连接到树莓派上，并希望在屏幕上以大数字显示读数。\n\n### 解决方案\n\n使用guizero库打开一个窗口，并以大字体显示读数（图14-32）。\n\
    \n![图14-32. 使用guizero显示传感器读数](img/e36e77524aeaae366529d1cf02f9a39c_448_0.png)\n\
    \n此示例使用来自配方14.20的ToF测距仪的数据。因此，如果你想尝试此示例，请先完成该配方。或者，本章中的大多数其他传感器配方也可以调整为此配方工作。通过打开编辑器并粘贴以下代码（ch_14_gui_sensor_reading.py）来测试此配方：\n\
    \n```python\nimport VL53L1X, time\nfrom guizero import App, Text\n\ntof = VL53L1X.VL53L1X(i2c_bus=1,\
    \ i2c_address=0x29)\ntof.open()\ntof.start_ranging(1)\n\ndef update_reading():\n\
    \    mm = tof.get_distance()\n    reading_text.value = str(mm)\n\napp = App(width=300,\
    \ height=150)\nreading_text = Text(app, size=100)\nreading_text.repeat(1000, update_reading)\n\
    app.display()\n```\n\n与本书中所有程序示例一样，你也可以下载此程序（参见配方3.22）。\n\n函数update_reading从测距仪（或你选择使用的任何传感器）获取新的读数，并将reading_text的值设置为该值（作为字符串）。\n\
    \n为确保读数自动更新，对reading_text调用了repeat方法，第一个参数是更新之间的毫秒数（本例中为1000），第二个参数是要调用的函数（update_reading）。\n\
    \n### 讨论\n\n虽然此配方使用距离传感器，但它同样适用于本章中的其他传感器配方。你只需更改从传感器获取读数的方法。\n\n### 另请参阅\n\n\
    有关将数字格式化为特定小数位数的信息，请参见配方7.1。\n\n有关在Web浏览器而非应用程序窗口中显示传感器数据的示例，请参见配方17.2。\n\n##\
    \ 14.24 记录到USB闪存驱动器\n\n### 问题\n\n你想将传感器测量的数据记录到USB闪存驱动器上。\n\n### 解决方案\n\n编写一个Python程序，将数据写入USB闪存驱动器上的文件。通过以逗号分隔值（CSV）格式写入文件，你可以将其直接导入电子表格，包括树莓派上的LibreOffice（配方4.3）。\n\
    \n示例程序（ch_14_temp_log.py）将记录从树莓派CPU记录的温度读数（参见配方14.11）：\n\n```python\nimport glob,\
    \ time, datetime\nfrom gpiozero import CPUTemperature\n\nlog_period = 600 # seconds\n\
    \nlogging_folder = glob.glob('/media/pi/*')[0]\ndt = datetime.datetime.now()\n\
    file_name = \"temp_log_{:%Y_%m_%d}.csv\".format(dt)\nlogging_file = logging_folder\
    \ + '/' + file_name\n\ndef read_temp():\n    cpu_temp = CPUTemperature().temperature\n\
    \    return cpu_temp\n\ndef log_temp():\n    temp_c = read_temp()\n    dt = datetime.datetime.now()\n\
    \    f = open(logging_file, 'a')\n    line = '\\n\"{:H:%M:%S}\",\"{}\"'.format(dt,\
    \ temp_c)\n    f.write(line)\n    print(line)\n    f.close()\n\nprint(\"Logging\
    \ to: \" + logging_file)\nwhile True:\n    log_temp()\n    time.sleep(log_period)\n\
    ```\n\n与本书中所有程序示例一样，你可以下载此程序（参见配方3.22）。\n\n程序设置为每10分钟（600秒）记录一次温度。你可以通过更改`log_period`的值来调整此设置。\n\
    \n你需要使用sudo运行此程序以允许访问闪存驱动器：\n\n```\n$ sudo python3 ch_14_temp_log.py\nLogging\
    \ to: /media/pi/temp_log_2022_06_22.csv\n\"13:09:02\",\"38.459\"\n\"13:09:12\"\
    ,\"38.946\"\n\"13:09:22\",\"37.972\"\n\"13:09:32\",\"37.485\"\n```\n\n当记录开始时，会显示闪存驱动器上记录文件的路径。\n\
    \n请注意，为加快速度，记录周期设置为10秒。\n\n### 讨论\n\n当将USB闪存驱动器插入树莓派时，它会自动安装在`/media/pi`下。如果树莓派连接了多个可移动驱动器，程序将使用`/media`内找到的第一个文件夹。记录文件的名称由当前日期构成。\n\
    \n如果你在电子表格中打开该文件，你将能够直接编辑它。你的电子表格可能会要求你指定数据的分隔符，即逗号。\n\n图14-33显示了使用此配方捕获的一组数据，生成的文件已在树莓派上运行的LibreOffice电子表格（配方4.3）中打开。\n\
    \n![图14-33. 使用电子表格绘制数据图表](img/e36e77524aeaae366529d1cf02f9a39c_451_0.png)\n\n\
    ### 参见\n\n此程序可以轻松调整以用于本章中使用的任何其他传感器。\n\n有关将传感器数据记录到Web服务的示例，请参见配方17.7。\n\n# 第15章\
    \ 显示器\n\n## 15.0 简介\n\n虽然树莓派可以使用显示器或电视作为显示屏，但通常使用更小、更专业的显示器会更好。在本章中，我们探讨了一系列可以连接到树莓派的不同显示器。\n\
    \n除了本章所述的连接专用显示器外，另一种选择是将显示器（可以是小型显示器）连接到树莓派，甚至使用通过VNC连接的手机或平板电脑。\n\n## 15.1 使用四位LED显示器\n\
    \n### 问题\n\n你想在老式的七段LED显示器上显示一个四位数。\n\n### 解决方案\n\n使用母对母跳线将一个I2C LED模块（如图15-1所示的型号）连接到树莓派。\n\
    \n![图15-1. 与树莓派连接的七段LED显示器](img/e36e77524aeaae366529d1cf02f9a39c_453_0.png)\n\n\
    要制作此配方，你需要以下物品：\n\n- 四根母对母跳线（参见第564页的“原型设备和套件”）\n- Adafruit 4×7段LED，带I2C背包（参见第566页的“模块”）\n\
    \n树莓派与模块之间的连接如下：\n\n- 显示器上的VCC (+) 连接到树莓派通用输入/输出（GPIO）连接器上的5V\n- 显示器上的GND (-)\
    \ 连接到树莓派GPIO连接器上的GND\n- 显示器上的SDA (D) 连接到树莓派GPIO连接器上的GPIO 2 (SDA)\n- 显示器上的SCL (C)\
    \ 连接到树莓派GPIO连接器上的GPIO 3 (SCL)\n\n请注意，Adafruit还提供超大尺寸的LED显示器。你可以使用上述列表中的连接将其连接到树莓派，但较大的显示器有两个正电源引脚：一个用于逻辑（V_IO），一个用于显示器（5V）。这是因为作为大型显示器，它需要更大的电流。幸运的是，树莓派可以为其提供足够的电源。你可以使用额外的母对母跳线将此额外引脚连接到GPIO连接器上的第二个5V引脚。\n\
    \n要使此配方正常工作，你还需要将树莓派设置为I2C，因此请先按照配方10.4进行操作。"
