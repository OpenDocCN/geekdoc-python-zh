    # 3.12 Performing Tasks with Superuser Privileges


    # Problem


    Some commands don''t work because you have *insufficient privileges*.


    # Solution


    You need to issue commands with superuser privileges. The sudo (substitute user
    do) command allows you to perform actions with superuser privileges. Just prefix
    the command with sudo.


    > **Be Careful of sudo**

    As was once said in a famous movie franchise, “with great power comes great responsibility.”
    The sudo command allows you to do really dangerous things, like deleting important
    system files that could render your Raspberry Pi useless without a complete reinstallation
    of Raspberry Pi OS.


    # Discussion


    Most tasks that you want to perform on the command line can usually be performed
    without superuser privileges. The most common exceptions to this are when you''re
    installing new software and editing configuration files. The apt command is the
    principal way of installing new software into Raspberry Pi OS. You will meet it
    formally in Recipe 3.17.


    Another example requiring superuser privileges is the reboot command. If you try
    to run it as a normal user, you will receive a number of error messages:


    ```

    $ reboot

    Failed to set wall message, ignoring: Interactive authentication required.

    Failed to reboot system via logind: Interactive authentication required.

    Failed to open /dev/initctl: Permission denied

    Failed to talk to init daemon.

    ```


    If you issue the same command prefixed with sudo, the command will work just fine:


    ```

    $ sudo reboot

    ```


    If you have a whole load of commands to run as superuser and don''t want to have
    to prefix each command with sudo, you can use the following command:


    ```

    $ sudo sh

    #

    ```'
