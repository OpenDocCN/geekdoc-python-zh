    \ (deallocated) so that they can be reallocated. This process is often referred\
    \ to as *Garbage Collection*.\n\n## 19.13 Intrinsic Attributes\n\nEvery class\
    \ (and every object) in Python has a set of *intrinsic* attributes set up by the\
    \ Python runtime system. Some of these intrinsic attributes are given below for\
    \ classes and objects.\n\nClasses have the following intrinsic attributes:\n\n\
    - `__name__` the name of the class\n- `__module__` the module (or library) from\
