    # Chapter 14

    Implementing a Calculator Using Functions


    # 14.1 Introduction


    In this chapter we will step through the development of another Python program;
    this time the program will be to provide a simple calculator which can be used
    to add, subtract, multiple and divide numbers. The implementation of the calculator
    is based on the Function Decomposition performed earlier in the book in the Introduction
    to Structured Analysis chapter.

    The calculator will be implemented using Python functions to help modularize the
    code.


    # 14.2 What the Calculator Will Do


    This will be a purely command-driven application that will allow the user to specify


    +   - the operation to perform,

    - the two numbers to use with that operation.


    When the program starts up it can use a loop to keep processing operations until
    the user indicates that they wish to terminate the application.

    We can also use an if statement to select the operation to perform, etc.

    As such it will also build on several other features in Python that we have already
    been working with.'
- md: "## 14.3 Getting Started\n\nThe first step will be to create a new Python file.\
    \ If you are using the PyCharm IDE you can do it using the New > Python File menu\
    \ option (look back at the Number Guess Game chapter if you can’t remember how\
    \ to do this). The file can be called anything you like, but calculator seems\
    \ like a reasonable name.\n\nIn the newly created (and empty) calculator.py file\
    \ type in a welcome print message such as:\n\n```\nprint('Simple Calculator App')\n\
    ```\n\nNow run the calculator.py program (again if you don’t remember how to do\
    \ that look back at the Number Guess Game chapter).\n\nYou should see the message\
    \ printed out in the Python console. This verifies that the file has been created\
    \ properly and that you can run the Python code you will define in it.\n\n## 14.4\
    \ The Calculator Operations\n\nWe are going to start by defining a set of functions\
    \ that will implement the add, subtract, multiply and divide operations.\n\nAll\
    \ of these functions take two numbers and return another number. We have also\
    \ given each function a docstring to illustrate their use, although in practice\
    \ the functions are so simple and self-describing that the docstring is probably\
    \ redundant.\n\nThe functions are listed below; you can now add them to the calculator.py\
    \ file:\n\n```\ndef add(x, y):\n    \"\"\" Adds two numbers \"\"\"\n    return\
    \ x + y\n\ndef subtract(x, y):\n    \"\"\" Subtracts two numbers \"\"\"\n    return\
    \ x - y\n\ndef multiply(x, y):\n    \"\"\" Multiples two numbers \"\"\"\n    return\
    \ x * y\n\ndef divide(x, y):\n    \"\"\"Divides two numbers\"\"\"\n    return\
    \ x / y\n```\n\nWe now have the basic functions needed by the calculator.\n\n\
    ## 14.5 Behaviour of the Calculator\n\nWe can now explore what the operation of\
    \ the calculator program should be. Essentially, we want to allow the user to\
    \ be able to select the operation they want to perform and provide the two numbers\
    \ to use with the operation and then for the program to call the appropriate function.\
    \ The result of the operation should then be presented to the user. We then want\
    \ to ask the user whether they want to continue to use the calculator or to exit\
    \ the program. This is illustrated below in flowchart form:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_182_0.png)\n\
    \nBased on this flowchart we can put in place the skeleton of the logic for the\
    \ calculator's processing cycle. We will need a while loop to determine whether\
    \ the user has finished or not and a variable to hold the result and print it\
    \ out.\n\nThe following code provides this skeleton:\n\n```\nfinished = False\n\
    while not finished:\n    result = 0\n    # Get the operation from the user\n \
    \   # Get the numbers from the user\n    # Select the operation\n    print('Result:',\
    \ result)\n    print('==================')\n    # Determine if the user has finished\n\
    \nprint('Bye')\n```\n\nIf you try to run this right now then you will find that\
    \ this code will loop forever as the user is not yet prompted to say if they wish\
    \ to continue or not. However, it does provide the basic framework; we have\n\n\
    - a variable, `finished`, with a Boolean flag in it to indicate if the user has\
    \ finished or not. This is referred to as a flag because it is a Boolean value\
    \ and because it is being used to determine whether to terminate the main processing\
    \ loop or not,\n- a variable to hold the result of the operation and the two numbers,\n\
    - the `while` loop representing the main processing loop of the calculator.\n\n\
    ## 14.6 Identifying Whether the User has Finished\n\nWe could address several\
    \ of the remaining areas next; however, we will select the last step—that of determining\
    \ if the user has finished or not. This will allow us to start to run the application\
    \ so that we can test out the behaviour. To do this we need to prompt the user\
    \ to ask them if they want to continue using the calculator. At one level this\
    \ is very straight forward; we could ask the user to input ‘y’ or ‘n’ to indicates\
    \ *yes* I have finished or *no* I want to keep going. We could therefore use the\
    \ input function as follows:\n\n```\nuser_input = input('Do you want to finish\
    \ (y/n): ')\n```\n\nWe could then check to see if they have entered a ‘y’ character\
    \ and terminate the loop. However, anytime if we take any input from something\
    \ outside of our program (such as the user) we should verify the input. For example,\
    \ what should the program do if the user enters ‘x’ or the number ‘1’? One option\
    \ is to treat anything that is not a ‘y’ as being—I want to keep going. However,\
    \ this is opening up our simple program to bad practices and (in a much larger\
    \ system) to potential security issues and certainly to potential hacker attacks.\
    \ It is a much better idea to verify that the input is what is expected and to\
    \ reject any input until it is either a ‘y’ or an ‘n’.\n\nThis means that the\
    \ code is more complex than a single input statement; there is, for example, an\
    \ implied loop here and as well as some idea of input validation.\n\nThis means\
    \ that this is an ideal candidate for a function that will *encapsulate* this\
    \ behaviour into a separate operation. We can then test this function which is\
    \ always a good idea. It also means that where we use the function, we have a\
    \ level of *abstraction*. That is we can name the function appropriately which\
    \ will make it easier to see what we intended, instead of having a mass of code\
    \ in one place.\n\nWe will call the function `check_if_user_has_finished`; this\
    \ name makes it very clear what the purpose of the function is. It also means\
    \ that when we use it in our main processing loop its role in that loop will be\
    \ obvious.\n\nThe function is given below:\n\n```\ndef check_if_user_has_finished():\n\
    \    \"\"\"\n    Checks that the user wants to finish or not.\n    Performs some\
    \ verification of the input.\"\"\"\n    ok_to_finish = True\n    user_input_accepted\
    \ = False\n    while not user_input_accepted:\n        user_input = input('Do\
    \ you want to finish (y/n): ')\n        if user_input == 'y':\n            user_input_accepted\
    \ = True\n        elif user_input == 'n':\n            ok_to_finish = False\n\
    \            user_input_accepted = True\n        else:\n            print('Response\
    \ must be (y/n), please try again')\n    return ok_to_finish\n```\n\nNotice the\
    \ use of two variables that are local to the function:\n\n- The first variable\
    \ (`ok_to_finish`) holds the result of the function; whether it is OK to finish\
    \ or not. It is given a default value of `True`; this follows the fail closed\
    \ approach—which suggests that it is always better to fail by closing down an\
    \ application or connection. In this case it means that if something goes wrong\
    \ with the code (if it contains a software bug or logic error) the user will not\
    \ keep looping forever.\n- The second variable (`user_input_accepted`) is used\
    \ to indicate whether the user has provided an acceptable input or not (i.e.,\
    \ have they entered 'y' or 'n') until they do the loop inside the function will\
    \ repeat.\n\nThe loop itself is interesting as we are looping while the user input\
    \ has not been accepted; note that we can (almost) read the while loop as plain\
    \ English text. This is both a feature of Python (it is intended to be easily\
    \ readable) and also of the use of a meaningful name for the variable itself.\n\
    \nWithin the loop we obtain the input from the user; check to see if it is 'y'\
    \ or 'n'. If it is either of these options, we set the `user_input_accepted` flag\
    \ to `True`. Otherwise the code will print out a message indicating that the only\
    \ acceptable input is a 'y' or 'n'.\n\nNotice that we only set the `ok_to_finish`\
    \ variable to `False` if the user inputs a 'n'; this is because the `ok_to_finish`\
    \ variable by default has a value of `True` and thus there is no need to reassign\
    \ `True` to it if the user select 'n'.\n\nWe can now add this function into our\
    \ main processing loop in place of the last comment:\n\n```\nfinished = False\n\
    while not finished:\n    result = 0\n    # Get the operation from the user\n \
    \   # Get the numbers from the user\n    # Select the operation\n    print('Result:',\
    \ result)\n    print('====================')\n    finished = check_if_user_has_finished()\n\
    \nprint('Bye')\n```\n\nWe can now run the application. You may wonder why we would\
    \ do this at this point as it does not yet do any calculations for us; the answer\
    \ is that we can verify that the overall behaviour of the main loop works and\
    \ that the `check_if_user_has_finished()` function operates correctly.\n\n## 14.7\
    \ Selecting the Operation\n\nNext let us implement the function used to obtain\
    \ the operation to perform. Again, we want to name this function in such a way\
    \ as to help with the comprehensibility of our program. In this case we are asking\
    \ the user to select which operation they want to perform, so let's call the function\
    \ `get_operation_choice`. This time we need to present a list of options to the\
    \ user and then ask them to make a selection. Again, we want to write our function\
    \ defensively, so that it makes sure the user only inputs a valid option; if they\
    \ do not then the function prompts them for another input. This means our function\
    \ will have a loop and some validation code. There are four options available\
    \ to the user: add, subtract, multiply and divide. We will therefore number them\
    \ 1–4 and ask the user to select an option between 1 and 4. There are several\
    \ ways in which we can verify that they have entered a number in this range, including\n\
    \n- converting the string entered into a number and using numerical comparison\
    \ (but then we need to check that they entered an integer),\n- having multiple\
    \ `if` and `elif` statements (but that seems a bit long winded),\n- by checking\
    \ that the entered character is one of a set of values (which is the approach\
    \ we will use)."
  mdcn: "## 14.3 开始\n\n第一步是创建一个新的 Python 文件。如果你使用的是 PyCharm IDE，可以通过 New > Python\
    \ File 菜单选项来完成（如果记不清如何操作，可以回顾“猜数字游戏”章节）。文件可以随意命名，但 `calculator` 似乎是个合理的名字。\n\n\
    在新创建的（空的）`calculator.py` 文件中，输入一条欢迎打印信息，例如：\n\n```\nprint('Simple Calculator App')\n\
    ```\n\n现在运行 `calculator.py` 程序（如果再次忘记如何运行，请回顾“猜数字游戏”章节）。\n\n你应该会在 Python 控制台中看到打印出的消息。这验证了文件已正确创建，并且你可以运行其中定义的\
    \ Python 代码。\n\n## 14.4 计算器操作\n\n我们将从定义一组函数开始，这些函数将实现加、减、乘和除操作。\n\n所有这些函数都接受两个数字并返回另一个数字。我们还为每个函数添加了一个文档字符串来说明其用途，尽管在实践中这些函数非常简单且自描述，文档字符串可能是多余的。\n\
    \n函数如下所示；你现在可以将它们添加到 `calculator.py` 文件中：\n\n```\ndef add(x, y):\n    \"\"\" Adds\
    \ two numbers \"\"\"\n    return x + y\n\ndef subtract(x, y):\n    \"\"\" Subtracts\
    \ two numbers \"\"\"\n    return x - y\n\ndef multiply(x, y):\n    \"\"\" Multiples\
    \ two numbers \"\"\"\n    return x * y\n\ndef divide(x, y):\n    \"\"\"Divides\
    \ two numbers\"\"\"\n    return x / y\n```\n\n现在我们有了计算器所需的基本函数。\n\n## 14.5 计算器的行为\n\
    \n我们现在可以探讨计算器程序的操作流程。本质上，我们希望允许用户选择他们想要执行的操作，提供与该操作一起使用的两个数字，然后让程序调用相应的函数。操作的结果应呈现给用户。然后，我们想询问用户是否要继续使用计算器或退出程序。下面以流程图形式说明：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_182_0.png)\n\n基于此流程图，我们可以搭建计算器处理周期的逻辑骨架。我们需要一个\
    \ `while` 循环来判断用户是否已完成，以及一个变量来保存结果并打印出来。\n\n以下代码提供了这个骨架：\n\n```\nfinished = False\n\
    while not finished:\n    result = 0\n    # 从用户获取操作\n    # 从用户获取数字\n    # 选择操作\n\
    \    print('Result:', result)\n    print('==================')\n    # 判断用户是否已完成\n\
    \nprint('Bye')\n```\n\n如果你现在尝试运行它，你会发现这段代码会无限循环，因为用户还没有被提示是否希望继续。然而，它确实提供了基本框架；我们有\n\
    \n- 一个变量 `finished`，其中包含一个布尔标志，用于指示用户是否已完成。这被称为标志，因为它是一个布尔值，并且用于确定是否终止主处理循环，\n\
    - 一个变量用于保存操作结果和两个数字，\n- `while` 循环代表计算器的主处理循环。\n\n## 14.6 识别用户是否已完成\n\n接下来我们可以处理几个剩余的区域；然而，我们将选择最后一步——确定用户是否已完成。这将使我们能够开始运行应用程序，以便测试其行为。为此，我们需要提示用户询问他们是否希望继续使用计算器。在某个层面上，这非常直接；我们可以要求用户输入‘y’或‘n’来表示*是*我已完成或*不*我想继续。因此，我们可以使用\
    \ `input` 函数如下：\n\n```\nuser_input = input('Do you want to finish (y/n): ')\n\
    ```\n\n然后我们可以检查他们是否输入了‘y’字符并终止循环。然而，任何时候如果我们从程序外部（例如用户）获取任何输入，我们都应该验证输入。例如，如果用户输入‘x’或数字‘1’，程序应该怎么做？一个选项是将任何不是‘y’的内容视为——我想继续。然而，这会让我们的简单程序陷入不良实践，并且（在更大的系统中）可能导致潜在的安全问题，当然也可能导致潜在的黑客攻击。更好的做法是验证输入是否符合预期，并拒绝任何输入，直到它是‘y’或‘n’。\n\
    \n这意味着代码比单个 `input` 语句更复杂；例如，这里隐含了一个循环以及一些输入验证的概念。\n\n这意味着这是一个理想的函数候选者，可以将此行为*封装*到一个单独的操作中。然后我们可以测试这个函数，这总是一个好主意。这也意味着在我们使用该函数的地方，我们有一层*抽象*。也就是说，我们可以适当地命名该函数，这将使我们更容易理解其意图，而不是将大量代码堆砌在一个地方。\n\
    \n我们将该函数命名为 `check_if_user_has_finished`；这个名称非常清楚地表明了函数的目的。这也意味着当我们在主处理循环中使用它时，它在该循环中的作用将是显而易见的。\n\
    \n函数如下所示：\n\n```\ndef check_if_user_has_finished():\n    \"\"\"\n    检查用户是否希望完成。\n\
    \    对输入执行一些验证。\"\"\"\n    ok_to_finish = True\n    user_input_accepted = False\n\
    \    while not user_input_accepted:\n        user_input = input('Do you want to\
    \ finish (y/n): ')\n        if user_input == 'y':\n            user_input_accepted\
    \ = True\n        elif user_input == 'n':\n            ok_to_finish = False\n\
    \            user_input_accepted = True\n        else:\n            print('Response\
    \ must be (y/n), please try again')\n    return ok_to_finish\n```\n\n注意函数中使用的两个局部变量：\n\
    \n- 第一个变量 (`ok_to_finish`) 保存函数的结果；是否可以完成。它被赋予默认值 `True`；这遵循了“失败即关闭”的方法——即认为通过关闭应用程序或连接来失败总是更好的。在这种情况下，这意味着如果代码出现问题（如果它包含软件缺陷或逻辑错误），用户将不会永远循环下去。\n\
    - 第二个变量 (`user_input_accepted`) 用于指示用户是否提供了可接受的输入（即，他们是否输入了‘y’或‘n’），直到他们这样做，函数内部的循环才会重复。\n\
    \n循环本身很有趣，因为我们在用户输入未被接受时进行循环；注意我们（几乎）可以将 `while` 循环读作纯英文文本。这既是 Python 的一个特性（它旨在易于阅读），也是为变量本身使用有意义名称的结果。\n\
    \n在循环内部，我们从用户获取输入；检查它是否是‘y’或‘n’。如果是这两个选项之一，我们将 `user_input_accepted` 标志设置为 `True`。否则，代码将打印一条消息，表明唯一可接受的输入是‘y’或‘n’。\n\
    \n注意，我们仅在用户输入‘n’时才将 `ok_to_finish` 变量设置为 `False`；这是因为 `ok_to_finish` 变量默认值为 `True`，因此如果用户选择‘n’，没有必要重新赋值\
    \ `True`。\n\n我们现在可以将此函数添加到主处理循环中，替换最后一个注释：\n\n```\nfinished = False\nwhile not\
    \ finished:\n    result = 0\n    # 从用户获取操作\n    # 从用户获取数字\n    # 选择操作\n    print('Result:',\
    \ result)\n    print('====================')\n    finished = check_if_user_has_finished()\n\
    \nprint('Bye')\n```\n\n我们现在可以运行应用程序了。你可能想知道为什么在这个时候运行它，因为它还没有为我们进行任何计算；答案是，我们可以验证主循环的整体行为是否正常，以及\
    \ `check_if_user_has_finished()` 函数是否正常运行。\n\n## 14.7 选择操作\n\n接下来，让我们实现用于获取要执行的操作的函数。同样，我们希望以有助于提高程序可理解性的方式命名此函数。在这种情况下，我们要求用户选择他们想要执行的操作，因此我们将函数命名为\
    \ `get_operation_choice`。这次我们需要向用户展示一个选项列表，然后要求他们做出选择。同样，我们希望以防御性的方式编写函数，以确保用户只输入有效的选项；如果他们没有，函数会提示他们再次输入。这意味着我们的函数将包含一个循环和一些验证代码。用户有四个选项可用：加、减、乘和除。因此，我们将它们编号为\
    \ 1–4，并要求用户选择 1 到 4 之间的选项。有几种方法可以验证他们是否输入了此范围内的数字，包括\n\n- 将输入的字符串转换为数字并使用数值比较（但随后我们需要检查他们是否输入了整数），\n\
    - 使用多个 `if` 和 `elif` 语句（但这似乎有点冗长），\n- 通过检查输入的字符是否是一组值中的一个（这是我们将在本例中使用的方法）。"
