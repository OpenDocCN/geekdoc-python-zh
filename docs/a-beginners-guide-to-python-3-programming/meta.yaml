  md: "Effectively, this means that you can ask many different things to perform the\
    \ same action. For example, you might ask a range of objects to provide a printable\
    \ string describing themselves. In fact in Python this is exactly what happens.\
    \ For example, if you ask an instance of a `Manager` class, a compiler object\
    \ or a database object to return such a string, you use the same method name call\
    \ (`__str__()`), in Python).\n\nThe name polymorphism is unfortunate and often\
    \ leads to confusion. It makes the whole process sound rather grander than it\
    \ actually is.\n\nNote this is one of the most significant and flexible features\
    \ of Python; it does not tie a variable to a specific type; instead via Duck Typing\
    \ as long as the object provided meets the implied contract, then we are good.\n\
    \nThe following classes all meet the contract implied by the `night_out()` function:\n\
    \n```\nclass Person:\n    def eat(self): print('Person - Eat')\n    def drink(self):\
    \ print('Person - Drink')\n    def sleep(self): print('Person - Sleep')\n\nclass\
