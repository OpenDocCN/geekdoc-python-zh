    \n### 32.4.2 Tuple() 构造函数\n\n`tuple()` 函数也可用于从可迭代对象创建新的元组。可迭代对象是实现了可迭代协议的东西（参见上一章）。\n\
    这意味着可以从 `set`、`list`、`dict`（因为它们都是*可迭代*类型）或任何实现了可迭代协议的类型创建新的元组。\n\n`tuple()` 函数的语法是：\n\
    \n```\ntuple(iterable)\n```\n\n例如：\n\n```\nlist1 = [1, 2, 3]\nt1 = tuple(list1)\n\
