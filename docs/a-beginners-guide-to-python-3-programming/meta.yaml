  - "[PAGE 184]\n\nThis means that the code is more complex than a single input statement;\
    \ there is, for example, an implied loop here and as well as some idea of input\
    \ validation.\n\nThis means that this is an ideal candidate for a function that\
    \ will *encapsulate* this behaviour into a separate operation. We can then test\
    \ this function which is always a good idea. It also means that where we use the\
    \ function, we have a level of *abstraction*. That is we can name the function\
    \ appropriately which will make it easier to see what we intended, instead of\
