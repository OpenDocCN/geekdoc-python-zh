    is shown in an output console at the bottom of the display.'
- md: "## 1.8 Jupyter Notebooks\n\nAn approach favored by many data analysts is to\
    \ use the Jupyter Notebooks infrastructure to run Python commands and programs.\
    \ To do this they use a web browser which will automatically display graphs and\
    \ tabular format within the web page which is very useful in some domains.\n\n\
    Jupyter notebooks have to be installed into your Python environment, for example\
    \ using the command\n\n```\npip install jupyter\n```\n\nOnce installed it is possible\
    \ to launch a new notebook using the command\n\n```\njupyter notebook\n```\n\n\
    This starts up a background Python compilation server and runtime as well as opening\
    \ a Jupyter notebooks browser window such as that shown below:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_38_0.png)\n\
    \nYou can now type Python statements and expressions into the browser, and the\
    \ results generated will be displayed within the browser.\n\n## 1.9 Useful Resources\n\
    \nThere are a wide range of resources on the web for Python; we will highlight\
    \ a few here that you should bookmark. We will not keep referring to these to\
    \ avoid repetition but you can refer back to this section whenever you need to:\n\
    \n- [https://en.wikipedia.org/wiki/Python_Software_Foundation](https://en.wikipedia.org/wiki/Python_Software_Foundation)\
    \ Python Software Foundation.\n- [https://docs.python.org/3/](https://docs.python.org/3/)\
    \ The main Python 3 documentation site. It contains tutorials, library references,\
    \ set up and installation guides as well as Python how-tos.\n- [https://docs.python.org/3/library/index.html](https://docs.python.org/3/library/index.html)\
    \ A list of all the built-in features for the Python language—this is where you\
    \ can find online documentation for the various class and functions that we will\
    \ be using throughout this book.\n- [https://pymotw.com/3/](https://pymotw.com/3/)\
    \ The Python 3 Module of the week site. This site contains many, many Python modules\
    \ with short examples and explanations of what the modules do. A python module\
    \ is a library of features that build on and expand the core Python language.\
    \ For example, if you are interested in building games using Python then pyjama\
    \ is a module specifically designed to make this easier.\n- [http://www.pythonweekly.com/](http://www.pythonweekly.com/)\
    \ is a free weekly summary of the latest Python articles, projects, videos and\
    \ upcoming events.\n\n# Chapter 2\nWhere is Python Used\n\n## 2.1 Introduction\n\
    \nPython is one of the biggest and most popular programming languages in today’s\
    \ technology world; whatever index or survey you look at Python is usually in\
    \ the top 3 (along with Java and JavaScript). However, you might be forgiven for\
    \ thinking that Python is a language exclusively used for Data Analytics or Data\
    \ Science given the number of times these terms turn up alongside Python. However,\
    \ Python has a wide and diverse range of uses. In this chapter we will look at\
    \ eight uses of Python, some of which might surprise you.\n\n### 2.1.1 Data Analytics\n\
    \nThis is one of the two largest application areas for Python and may well be\
    \ why you are reading this book in the first place. There are several widely used\
    \ Data Analytics libraries available for Python including Pandas. Data Analytics\
    \ (or analysis) is the practice of taking raw data and analyzing it to either\
    \ understand that data and/or look for patterns in the data or to create new systems\
    \ that can use knowledge gained from previous data to predict new trends or patterns\
    \ in the future data. In both cases the aim is to provide value in some way to\
    \ an organization or business as illustrated below.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_41_0.png)\n\
    \nThe approaches to Data Analytics are not completely independent but illustrate\
    \ the different purposes. For example, the “Discovery of Data Insight” side typically\
    \ involves understanding and trends, patterns or relationships in the data to\
    \ help an organization or business to improve their performance. For example,\
    \ an online sales shop might use such insights to understand how and where to\
    \ target specific promotions, a governmental health organization might use their\
    \ data insights to determine where and when to target vaccinations, etc.\n\nIn\
    \ contrast the ‘Development of Data Product(s)’ typically involves using information\
    \ with the data to help develop new systems that will be applied to future, as\
    \ yet unseen data. For example, analysis of the data might help to identify patterns\
    \ of fraudulent behaviour which might be used to develop new monitoring systems\
    \ to catch similar fraud earlier and faster.\n\nThe techniques used for such analysis\
    \ are typically oriented around statistical analysis and data exploration. These\
    \ are the facilities provided by libraries such as Pandas (see https://pandas.pydata.org/)\
    \ which is by far the most widely used Python data analysis library. However,\
    \ Pandas does not provide a complete solution on its own. For example, Pandas\
    \ builds on other Python libraries such as NumPy (which provides sophisticated\
    \ facilities for handling numbers see https://numpy.org/ ). Pandas is also often\
    \ used in combination with other libraries such as SciPy (which stands for Scientific\
    \ Python see https://scipy.org/) and Matplotlib (see https://matplotlib.org/)\
    \ which is a graphing library. The relationship between Pandas, Python and other\
    \ commonly used data analysis-oriented libraries is shown below.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_42_0.png)\n\
    \nIn addition several Data Analytics reporting systems and toolkits used outside\
    \ the Python world also provide Python APIs allowing the results of any Python\
    \ analysis to be incorporated into these systems. For example, the Tableau (https://www.tableau.com/)\
    \ suite of tools provides a Python API allowing results created by Python to be\
    \ incorporated into a Tableau dashboard for easy access and availability.\n\n\
    ### 2.1.2 Machine Learning and AI\n\nFollowing on from the previous section on\
    \ data analysts it is not uncommon to apply some machine learning techniques when\
    \ analyzing data, for example, to perform some classification of new data using\
    \ previously seen data. That is, machine learning is a method of data analysis\
    \ that automates analytical model building. Using algorithms that iteratively\
    \ learn from data, machine learning allows computers to find hidden insights without\
    \ being explicitly programmed. The general model is shown below.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_42_1.png)\n\
    \nThis illustrates that training data (which may be what is called supervised\
    \ or unsupervised) is fed into a machine learning algorithm and the output from\
    \ this is a system that might be used to classify new data, predict behaviour\
    \ based on new data or make some decision based on new data.\n\nSupervised learning\
    \ tasks involve teaching a learning systems using data that is tagged or marked\
    \ with known results. For example, loan data with applications marked as being\
    \ either fraudulent or not, etc.\n\nIn contrast unsupervised data involves presenting\
    \ a learning system with data— with no indications of expected results, and then\
    \ identifying patterns or clusters within that data. This allows users to understand\
    \ or learn more about the data. The term unsupervised is intended to indicate\
    \ that there is no known (or at least provided) correct answers (and hence there\
    \ is no teacher). In some situations there is a large amount of data, and only\
    \ some of that data can be labeled with appropriate results or conclusions. Such\
    \ problems are sometimes referred to as semi-structured machine learning. In many\
    \ cases a combination of supervised and unsupervised techniques is required to\
    \ analyze such data.\n\nEach of the machine learning algorithms commonly used\
    \ with Python has pros and cons and situations in which they are best applied.\
    \ It is therefore useful to have a toolbox of such algorithms that can be applied\
    \ as and when appropriate.\n\nThere are several commonly used libraries available\
    \ in Python for this including SciKitLearn (aka SKLearn), TensorFlow and PyTorch.\
    \ In general SciKitLearn and TensorFlow have about the same share of the Python\
    \ market place with PyTorch being just behind, although all three are close to\
    \ 30% in terms of Python developers’ usage.\n\nFor further information on machine\
    \ learning see:\n\n- Harvard Business Review—“What every manager should know about\
    \ Machine learning”\n  - http://hbr.org/2015/07/what-every-manager-should-know-about-machine-learning\n\
    - Quick Reference cheat sheet on ML Algorithms/uses\n  - http://www.lauradhamilton.com/machine-learning-algorithm-cheat-sheet\n\
    - 10 Machine Learning Methods that Every Data Scientist Should Know\n  - https://towardsdatascience.com/10-machine-learning-methods-that-every-data-scientist-should-know-3cc96e0eeee9\n\
    \n### 2.1.3 Database Work\n\nMost data is held within some form of database, and\
    \ Python provides interfaces that allow a programmer to access that data. These\
    \ interfaces make it easy to query a database for information and pull that information\
    \ back into the Python program for further progressing. For example, a database\
    \ of client information may be queried"
