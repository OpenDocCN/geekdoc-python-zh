    \ for loop to work with a generator function; the generator object actually returned\
    \ by the generator function supports the next() function. This function takes\
    \ a generator object (returned from the generator function) and returns the next\
    \ value in sequence.\n\nFor example:\n\n```\nevens = evens_up_to(4)\nprint(next(evens),\
    \ end=', ')\nprint(next(evens), end=', ')\nprint(next(evens))\n```\n\nThis produces\n\
