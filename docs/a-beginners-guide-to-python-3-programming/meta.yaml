    \ = age\n        self.id = id\n\n    def birthday(self):\n        print('Its your\
    \ birthday')\n```\n\n如果我们现在检查 `Employee` 是否是 `Person` 的子类，我们将得到返回值 `False`。当然，如果我们检查\
    \ `Employee` 的实例是否实际上是 `Person` 类的实例，我们也会得到 `False`：\n\n```python\nprint(issubclass(Employee,\
