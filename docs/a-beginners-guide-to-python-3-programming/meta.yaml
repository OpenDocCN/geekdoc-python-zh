  md: "# Using an IDE\n\nThe IDE I prefer for Python is PyCharm, it is not the only\
    \ IDE for Python by any means, but it is a very widely used one.\nOther IDEs available\
    \ for Python include:\n\n+   - Spyder which is an IDE often used by scientists\
    \ and engineers see https://www.spyder-ide.org/.\n- Jupiter Notebook which is\
    \ a web-based IDE and is particularly good for data scientists https://jupyter.org/.\n\
    - Visual Studio Code. This is a very good free editor from Microsoft that has\
    \ really useful features https://code.visualstudio.com.\n- Sublime Text is more\
    \ of a text editor that color codes Python; however for a simple project it may\
    \ be all you need https://www.sublimetext.com.\n\nMostly this book is editor or\
    \ IDE agnostic only Chap. 3 ‘Setting up the Python Environment’ and Chap. 42 ‘Python\
    \ Virtual Environments’ really focus on PyCharm. You can therefore use whatever\
    \ editor you wish to use.\n\n# Conventions\n\nThroughout this book you will find\
    \ a number of conventions used for text styles. These text styles distinguish\
    \ different kinds of information.\nCode words, variables and Python values, used\
    \ within the main body of the text, are shown using a `Courier` font. For example:\n\
    This program creates a top level window (the `wx.Frame`) and gives it a title.\
    \ It also creates a label (a `wx.StaticText` object) to be displayed within the\
    \ frame.\nIn the above paragraph `wx.Frame` and `wx.StaticText` are classes available\
    \ in a Python graphical user interface library.\nA block of Python code is set\
    \ out as shown here:\n\n```\nnum = int(input('Enter another number: '))\nif num\
    \ > 0:\n    print(num, 'is positive')\n    print(num, 'squared is ', num * num)\n\
    print('Bye')\n```\n\nNote that keywords and points of interest are shown in bold\
    \ font.\nAny command line or user input is shown in italics and is also bold:"
