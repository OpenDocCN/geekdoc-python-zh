    - 就本练习而言，索引是文本中出现的单词的字母顺序列表，并附有该单词出现次数的计数。\n- 你的索引程序应包括以下步骤：\n  - 要求用户输入一个句子。\n\
    \  - 将句子拆分成单个单词（你可以使用字符串类的 split() 方法来完成此操作）。\n  - 使用 Counter 类生成句子中所有单词及其出现次数的列表。\n\
    \  - 生成按字母顺序排列的单词及其计数列表。你可以使用 sorted() 函数获取键的排序列表。然后，你可以使用 collection.OrderedDict\
    \ 生成一个保持键添加顺序的字典。"
