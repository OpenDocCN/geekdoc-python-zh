  md: '# 5.6 Hints on Strings


    # 5.6.1 Python Strings are Case Sensitive


    In Python the string ‘l’ is not the same as the string ‘L’; one contains the lowercase
    letter ‘l’ and one the uppercase letter ‘L’. If case sensitive does not matter
    to you then you should convert any strings you want to compare into a common case
    before doing any testing; for example, using `lower()` as in


    ```

    some_string.lower().startswith(''h'')

    ```


    # 5.6.2 Function/Method Names


    Be very careful with capitalization of function/method names; in Python `isupper()`
    is a completely different operation to `isUpper()`. If you use the wrong case
    Python will not be able to find the required function or method and will generate
    an error message.


    # 5.6.3 Function/Method Invocations


    Also be careful of always including the round brackets when you call a function
    or method; even if it takes no parameters/arguments. There is a significant difference
    between `isupper` and `isupper()`. The first one is the *name* of an operation
    on a string, while the second is a call to that operation so that the operation
    executes. Both formats are legal in Python, but the result is very different,
    for example:


    ```

    print(some_string.isupper)

    print(some_string.isupper())

    ```


    produces the output:


    ```

    <built-in method isupper of str object at 0x105eb19b0>

    False

    ```


    Notice that the first print out tells you that you are referring to the built-in
    method called `isupper` defined on the type string, while the second actually
    runs `isupper()` for you and returns either `True` or `False`.'
