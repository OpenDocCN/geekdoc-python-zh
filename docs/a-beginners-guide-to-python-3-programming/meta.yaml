  - "[PAGE 306]\n\nprint('oops')\n\nThe Exception class is a grandparent of the ZeroDivisionError,\
    \ thus any ZeroDivisionError object is also a type of Exception, and thus the\
    \ except block matches the exception passed. This means that you can write one\
    \ except clause and that clause can handle a whole range of exceptions.\n\nHowever,\
    \ if you don't want to have a common block of code handling your exceptions, you\
    \ can define different behaviours for different types of exception. This is done\
    \ by having a series of except clauses; each monitoring a different type of exception:\n\
    \n```\ntry:\n    runcalc(6)\nexcept ZeroDivisionError:\n    print('oops')\nexcept\
    \ IndexError:\n    print('arrgh')\nexcept FileNotFoundError:\n    print('huh!')\n\
    except Exception:\n    print('Duh!')\n```\n\nIn this case the first except monitors\
    \ for a ZeroDivisionError but the other excepts monitor for other types of exception.\
    \ Note that the except Exception is the last except clause in the list as ZeroDivisionError,\
    \ IndexError and FileNotFoundError are all eventual subclasses of Exception, and\
    \ thus this clause would catch any of these types of exception. As only one except\
    \ clause is allowed to run; if this except handler came fist the other except\
    \ handers would never ever be run.\n\n# 26.5.1 Accessing the Exception Object\n\
    \nIt is possible to gain access to the exception object being caught by the except\
    \ clause using the as keyword. This follows the exception type being monitored\
    \ and can be used to bind the exception object to a variable, for example:\n\n\
    ```\ntry:\n    runcalc(6)\nexcept ZeroDivisionError as exp:\n    print(exp)\n\
    \    print('oops')\n```\n\nWhich produces\n\n```\ndivision by zero\noops\n```"
  - "[PAGE 307]\n\nIf there are multiple `except` clauses each `except` clause can\
    \ decide whether to bind the exception object to a variable or not (and each variable\
    \ can have a different name):\n\n```\ntry:\n    runcalc(6)\nexcept ZeroDivisionError\
    \ as exp:\n    print(exp)\n    print('oops')\nexcept IndexError as e:\n    print(e)\n\
    \    print('arrgh')\nexcept FileNotFoundError:\n    print ('huh')\nexcept Exception\
    \ as exception:\n    print(exception)\n    print('Duh!')\n```\n\nIn the above\
    \ example three of the four `except` clauses bind the exception to a variable\
    \ (each with a different name—although they could all have the same name) but\
    \ one, the `IndexError` except clause does not bind the exception to a variable.\n\
    \n# 26.5.2 Jumping to Exception Handlers\n\nOne of the interesting features of\
    \ exception handling in Python is that when an error or an exception is raised\
    \ it is immediately *thrown* to the exception handlers (the `except` clauses).\
    \ Any statements that follow the point at which the exception is raised are not\
    \ run. This means that a function may be terminated early, and further statements\
    \ in the calling code may not be run.\n\nAs an example, consider the following\
    \ code. This code defines a function `my_function()` that prints out a string\
    \ and performs a division operation which will cause a `ZeroDivisionError` to\
    \ be raised if the `y` value is zero, and then it has a further `print` statement.\
    \ This function is called from within a `try` statement. Notice that there is\
    \ a `print` statement each side of the call to `my_function()`. There is also\
    \ a handler for the `ZeroDivisionError`.\n\n```\ndef my_function(x, y):\n    print('my_function\
    \ in')\n    result = x / y\n    print('my_function out')\n    return result\n\n\
    print('Starting')\n```"
  - "[PAGE 308]\n\n# 26.5 Handling an Exception\n\n```\ntry:\n    print('Before my_function')\n\
    \    my_function(6, 2)\n    print('After my_function')\nexcept ZeroDivisionError\
    \ as exp:\n    print('oops')\n\nprint('Done')\n```\n\nWhen we run this the output\
    \ is\n\n```\nStarting\nBefore my_function\nmy_function in\nmy_function out\nAfter\
    \ my_function\nDone\n```\n\nWhich is what would probably be expected; we have\
    \ run every statement with the exception of the except clause as the ZeroDivisionError\
    \ was not raised.\nIf we now change the call to my_function() to pass in 6 and\
    \ 0 we will raise the ZeroDivisionError.\n\n```\nprint('Starting')\n\ntry:\n \
    \   print('Before my_function')\n    my_function(6, 0)\n    print('After my_function')\n\
    except ZeroDivisionError as exp:\n    print('oops')\n\nprint('Done')\n```\n\n\
    Now the output is\n\n```\nStarting\nBefore my_function\nmy_function in\noops\n\
    Done\n```\n\nThe difference is that the second print statement in my_function()\
    \ has not been run; instead after print 'my_function in' and then raising the\
    \ error we have jumped strait to the except clause and run the print statement\
    \ in the associated block of code.\nThis is partly why the term throwing is used\
    \ with respect to error and exception handling; because the error or exception\
    \ is raised in one place and thrown to the point where it is handled, or it is\
    \ thrown out of the application if no except clause is found to handle the error/exception."
  - "[PAGE 309]\n\n# 26.5.3 Catch Any Exception\n\nIt is also possible to specify\
    \ an except clause that can be used to catch any type of error or exception, for\
    \ example:\n\n```\ntry:\n    my_function(6, 0)\nexcept IndexError as e:\n    print(e)\n\
    except:\n    print('Something went wrong')\n```\n\nThis must be the last except\
    \ clause as it omits the exception type and thus acts as a wildcard. It can be\
    \ used to ensure that you get notified that an error did occur—although you do\
    \ not know what type of error it actually was; therefore, use this feature with\
    \ caution.\n\n# 26.5.4 The Else Clause\n\nThe try statement also has an optional\
    \ else clause. If this is present, then it must come after all except clauses.\
    \ The else clause is executed if and only if no exceptions were raised. If any\
    \ exception was raised the else clause will not be run. An example of the else\
    \ clause is shown below:\n\n```\ntry:\n    my_function(6, 2)\nexcept ZeroDivisionError\
    \ as e:\n    print(e)\nelse:\n    print('Everything worked OK')\n```\n\nIn this\
    \ case the output is\n\n```\nmy_function in\nmy_function out\nEverything worked\
    \ OK\n```\n\nAs you can see the print statement in the else clause has been executed,\
    \ however, if we change the my_function() call to pass in a zero as the second\
    \ parameter (which will cause the function to raise a ZeroDivisionError), then\
    \ the output is\n\n```\nmy_function in\ndivision by zero\n```\n\nAs you can see\
    \ the else clause was not run but the except handler was executed."
  - "[PAGE 310]\n\n# 26.5.5 The Finally Clause\n\nAn optional `finally` clause can\
    \ also be provided with the `try` statement. This clause is the last clause in\
    \ the statement and must come after any `except` classes as well as the `else`\
    \ clause.\n\nIt is used for code that you want to run whether an exception occurred\
    \ or not. For example, in the following code snippet:\n\n```\ntry:\n    my_function(6,\
    \ 2)\nexcept ZeroDivisionError as e:\n    print(e)\nelse:\n    print('Everything\
    \ worked OK')\nfinally:\n    print('Always runs')\n```\n\nThe `try` block will\
    \ run, if no error is raised then the `else` clause will be executed and last\
    \ of all the `finally` code will run, we will therefore have as output:\n\n```\n\
    my_function in\nmy_function out\nEverything worked OK\nAlways runs\n```\n\nIf,\
    \ however, we pass in 6 and 0 to `my_function()`:\n\n```\ntry:\n    my_function(6,\
    \ 0)\nexcept ZeroDivisionError as e:\n    print(e)\nelse:\n    print('Everything\
    \ worked OK')\nfinally:\n    print('Always runs')\n```\n\nWe will now raise an\
    \ exception in `my_function()` which means that the `try` block will execute,\
    \ then the `ZeroDivisionError` will be raised, it will be handled by the `except`\
    \ clause, and then the `finally` clause will run. The output is now:\n\n```\n\
    my_function in\ndivision by zero\nAlways runs\n```\n\nAs you can see in both cases\
    \ the `finally` clause is executed. The `finally` clause can be very useful for\
    \ general housekeeping type activities such as shutting down or closing any resources\
    \ that your code might be using, even if an error has occurred."
  - "[PAGE 311]\n\n# 26.6 Raising an Exception\n\nAn error or exception is raised\
    \ using the keyword `raise`. The syntax of this is\n\n```\nraise <Exception/Error\
    \ type to raise>()\n```\n\nFor example:\n\n```\ndef function_bang():\n    print('function_bang\
    \ in')\n    raise ValueError('Bang!')\n    print('function_bang')\n```\n\nIn the\
    \ above function the second statement in the function body will create a new instance\
    \ of the `ValueError` class and then raise it so that it is thrown allowing it\
    \ to be caught by any exception handlers that have been defined.\n\nWe can handle\
    \ this exception by writing a `try` block with an `except` clause for the `ValueError`\
    \ class. For example:\n\n```\ntry:\n    function_bang()\nexcept ValueError as\
    \ ve:\n    print(ve)\n```\n\nThis generates the output.\n\n```\nfunction_bang\
    \ in\nBang!\n```\n\nNote that if you just want to raise an exception without providing\
    \ any constructor arguments, then you can just provide the name of the exception\
    \ class to the `raise` keyword:\n\n```\nraise ValueError # short hand for raise\
    \ ValueError()\n```\n\nYou can also *reraise* an error or an exception; this can\
    \ be useful if you merely want to note that an error has occurred and then rethrow\
    \ it so that it can be handled further up in your application:\n\n```\ntry:\n\
    \    function_bang()\nexcept ValueError:\n    print('oops')\n    raise\n```\n\n\
    This will reraise the `ValueError` caught by the `except` clause. Note here we\
    \ did not even bind it to a variable; however, we could have done this if required.\n\
    \n```\ntry:\n    function_bang()\nexcept ValueError as ve:\n    print(ve)\n  \
    \  raise\n```"
- md: "## 26.7 Defining a Custom Exception\n\nYou can define your own errors and exceptions,\
    \ which can give you more control over what happens in particular circumstances.\
    \ To define an exception, you create a subclass of the exception class or one\
    \ of its subclasses.\n\nFor example, to define an `InvalidAgeException`, we can\
    \ extend the `Exception` class and generate an appropriate message:\n\n```python\n\
    class InvalidAgeException(Exception):\n    \"\"\" Valid Ages must be between 0\
    \ and 120 \"\"\"\n```\n\nThis class can be used to explicitly represent an issue\
    \ when an age is set on a `Person` which is not within the acceptable age range.\n\
    \nWe can use this with the class `Person` that we defined earlier in the book;\
    \ this version of the `Person` class defined age as a property and attempted to\
    \ validate that an appropriate age was being set:\n\n```python\nclass Person:\n\
    \    def __init__(self, name, age):\n        self._name = name\n        self._age\
    \ = age\n\n    @property\n    def age(self):\n        \"\"\" The docstring for\
    \ the age property \"\"\"\n        print('In age method')\n        return self._age\n\
    \n    @age.setter\n    def age(self, value):\n        print('In set_age method(',\
    \ value, ')')\n        if isinstance(value, int) & (value > 0 & value < 120):\n\
    \            self._age = value\n        else:\n            raise InvalidAgeException(value)\n\
    \n    @property\n    def name(self):\n        print('In name')\n        return\
    \ self._name\n\n    @name.deleter\n    def name(self):\n        del self._name\n\
    \n    def __str__(self):\n        return 'Person[' + str(self._name) + '] is '\
    \ + self._age\n```\n\nNote that the age setter method now throws an `InvalidAgeException`,\
    \ so if we write\n\n```python\ntry:\n    p = Person('Adam', 21)\n    p.age = -1\n\
    except InvalidAgeException:\n    print('In here')\n```\n\nWe can capture the fact\
    \ that an invalid age has been specified. However, in the exception handler we\
    \ don't know what the invalid age was. We can of course provide this information\
    \ by including it in the data held by the `InvalidAgeException`. If we now modify\
    \ the class definition such that we provide an initializer to allow parameters\
    \ to be passed into the new instance of the `InvalidAgeException`:\n\n```python\n\
    class InvalidAgeException(Exception):\n    \"\"\" Valid Ages must be between 0\
    \ and 120 \"\"\"\n\n    def __init__(self, value):\n        self.value = value\n\
    \n    def __str__(self):\n        return 'InvalidAgeException(' + str(self.value)\
    \ + ')'\n```\n\nWe have also defined a suitable `__str__()` method to convert\
    \ the exception into a string for printing purposes. We do of course need to update\
    \ the setter to provide the value that has caused the problem:\n\n```python\n\
    @age.setter\ndef age(self, value):\n    print('In set_age method(', value, ')')\n\
    \    if isinstance(value, int) & (value > 0 & value < 120):\n        self._age\
    \ = value\n    else:\n        raise InvalidAgeException(value)\n```\n\nWe can\
    \ now write\n\n```python\ntry:\n    p = Person('Adam', 21)\n    p.age = -1\nexcept\
    \ InvalidAgeException as e:\n    print(e)\n```\n\nNow if the exception is raised\
    \ a message will be printed out giving the actual value that caused the problem:\n\
    \n```\nIn set_age method( -1 )\nInvalidAgeException(-1)\n```\n\n## 26.8 Chaining\
    \ Exceptions\n\nOne final feature that can be useful when creating your own exceptions\
    \ is to chain them to a generic underlying exception. This can be useful when\
    \ a generic exception is raised, for example, by some library or by the Python\
    \ system itself, and you want to convert it into a more meaningful application\
    \ exception.\n\nFor example, let us say that we want to create an exception to\
    \ represent a specific issue with the parameters passed to a function `divide`,\
    \ but we don't want to use the generic `ZeroDivisionException`, instead we want\
    \ to use our own `DivideByYWhenZeroException`. This new exception could be defined\
    \ as\n\n```python\nclass DivideByYWhenZeroException(Exception):\n    \"\"\" Sample\
    \ Exception class\"\"\"\n```\n\nAnd we can use it in a function `divide`:\n\n\
    ```python\ndef divide(x, y):\n    try:\n        result = x / y\n    except Exception\
    \ as e:\n        raise DivideByYWhenZeroException from e\n```\n\nWe have used\
    \ the `raise` and `from` keywords when we are instantiating the `DivideByYWhenZeroException`.\
    \ This chains our exception to the original exception that indicates the underlying\
    \ problem.\n\nWe can now call the `divide` method as below:\n\n```python\ndef\
    \ main():\n    divide(6, 0)\n```\n\nThis produces a Traceback as given below:\n\
    \n```\nTraceback (most recent call last):\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 43, in divide\n    result = x / y\nZeroDivisionError: division by zero\n\
    The above exception was the direct cause of the following exception:\nTraceback\
    \ (most recent call last):\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 136, in <module>\n    main()\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 79, in main\n    divide(6, 0)\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 45, in divide\n    raise DivideByYWhenZeroException from e\n__main__.DivideByYWhenZeroException\n\
    ```\n\nAs can be seen you get information about both the (application specific)\
    \ `DivideByYWhenZeroException` and the original `ZeroDivisionError` – the two\
    \ are linked together. This can be very useful when defining such application\
    \ specific exceptions (but where the actual underlying exception must still be\
    \ understood).\n\n## 26.9 Exception Groups\n\nException groups are exactly that\
    \ a group of different exceptions. They thus allow developers to group together\
    \ multiple exceptions and raise the whole group as one. Of course this raises\
    \ the question ‘why?’ In general the reason for using an exception group is one\
    \ of the following:\n\n- In some cases, when an exception is raised, any attempt\
    \ to handle that exception may also result in an exception. For example, let us\
    \ assume that we have opened a file for reading purposes. While reading the file\
    \ we suddenly get an exception, we then attempt to handle the exception and tidying\
    \ things up by closing the file, which might then throw another exception. We\
    \ thus have two exceptions associated with reading from this file. We might then\
    \ want to handle both exceptions elsewhere, then exception groups can be used\
    \ to raise both exceptions.\n- If some type of API is being used, then on a failure,\
    \ the system may retry some operation several times until some threshold is met.\
    \ In this case each retry might generate a different exception and the user of\
    \ the API should be notified of all of the different exceptions. Exception groups\
    \ allow us to group the exceptions from each of the retries so that they can be\
    \ handled individually.\n- Finally, if we are running multiple threads or processes\
    \ at the same time, then each of these multiple tasks might throw a different\
    \ exception and we want to capture all the exceptions and notify invoking code\
    \ of the group of errors, etc.\n\nIt is possible to create an exception group\
    \ using the `ExceptionGroup` class. The parameters to the class are a message\
    \ explaining the exception group and a tuple of exceptions to be held by the group.\
    \ The syntax is\n\n```python\nExceptionGroup(msg, excs)\n```\n\nFor example:\n\
    \n```python\ndef do_something():\n    eg = ExceptionGroup(\"multiple exceptions\
    \ occurred\",\n                       (ValueError(\"incorrect value\"),\n    \
    \                    ValueError(\"not a positive value\"),\n                 \
    \       FileNotFoundError(\"Unknown file data.txt\"),\n                      \
    \  AttributeError(\"date\")))\n    raise eg\n\ndo_something()\n```\n\nIn this\
    \ example, the `do_something()` function creates an `ExceptionGroup` with the\
    \ message 'multiple exceptions occurred' and a tuple of four exceptions made up\
    \ of two `ValueError`s, a `FileNotFoundError` and an `AttributeError`.\n\nNote\
    \ that an `ExceptionGroup` is part of the `Exception` class hierarchy. It can\
    \ thus be used within the exception handling mechanism of Python and this it is\
    \ possible to raise the exception group using the `raise` keyword.\n\nWhen the\
    \ `do_something()` function is called it will raise the `ExceptionGroup` and as\
    \ at the moment this is not handled the program will terminate with a traceback,\
    \ for example:\n\n```\n+ Exception Group Traceback (most recent call last):\n\
    \  | File \"exception_groups_example.py\", line 8, in <module>\n  |   do_something()\n\
    \  | File \"exception_groups_example.py\", line 6, in do_something\n  |   raise\
    \ eg\n  | ExceptionGroup: multiple exceptions occurred (4 sub-exceptions)\n  +-+----------------\
    \ 1 ----------------\n    | ValueError: incorrect value\n    +----------------\
    \ 2 ----------------\n    | ValueError: not a positive value\n    +----------------\
    \ 3 ----------------\n    | FileNotFoundError: Unknown file data.txt\n    +----------------\
    \ 4 ----------------\n    | AttributeError: date\n    +------------------------------------\n\
    ```\n\nNote that this is an `ExceptionGroup` Traceback and thus it knows about\
    \ the exception group and displays the message associated with the group and each\
    \ of the exceptions listed in the tuple used to create the group in the order\
    \ they were defined in.\n\n## 26.10 Exception Group Handling\n\nExceptions groups\
    \ can be handled using the standard `try` `except` mechanism used with traditional\
    \ exceptions and errors. Thus we can write"
  mdcn: "## 26.7 定义自定义异常\n\n你可以定义自己的错误和异常，这能让你在特定情况下对发生的事情有更多控制。要定义一个异常，你需要创建异常类或其子类的子类。\n\
    \n例如，要定义一个 `InvalidAgeException`，我们可以扩展 `Exception` 类并生成相应的消息：\n\n```python\n\
    class InvalidAgeException(Exception):\n    \"\"\" Valid Ages must be between 0\
    \ and 120 \"\"\"\n```\n\n这个类可以用来显式表示当在 `Person` 上设置的年龄不在可接受范围内时出现的问题。\n\n我们可以将其与本书前面定义的\
    \ `Person` 类一起使用；这个版本的 `Person` 类将年龄定义为一个属性，并尝试验证设置的年龄是否合适：\n\n```python\nclass\
    \ Person:\n    def __init__(self, name, age):\n        self._name = name\n   \
    \     self._age = age\n\n    @property\n    def age(self):\n        \"\"\" The\
    \ docstring for the age property \"\"\"\n        print('In age method')\n    \
    \    return self._age\n\n    @age.setter\n    def age(self, value):\n        print('In\
    \ set_age method(', value, ')')\n        if isinstance(value, int) & (value >\
    \ 0 & value < 120):\n            self._age = value\n        else:\n          \
    \  raise InvalidAgeException(value)\n\n    @property\n    def name(self):\n  \
    \      print('In name')\n        return self._name\n\n    @name.deleter\n    def\
    \ name(self):\n        del self._name\n\n    def __str__(self):\n        return\
    \ 'Person[' + str(self._name) + '] is ' + self._age\n```\n\n请注意，age 的 setter 方法现在会抛出\
    \ `InvalidAgeException`，所以如果我们写\n\n```python\ntry:\n    p = Person('Adam', 21)\n\
    \    p.age = -1\nexcept InvalidAgeException:\n    print('In here')\n```\n\n我们就能捕获到指定了无效年龄这一事实。然而，在异常处理程序中，我们不知道无效的年龄是什么。当然，我们可以通过将其包含在\
    \ `InvalidAgeException` 持有的数据中来提供此信息。如果我们现在修改类定义，提供一个初始化器，允许将参数传递给 `InvalidAgeException`\
    \ 的新实例：\n\n```python\nclass InvalidAgeException(Exception):\n    \"\"\" Valid\
    \ Ages must be between 0 and 120 \"\"\"\n\n    def __init__(self, value):\n  \
    \      self.value = value\n\n    def __str__(self):\n        return 'InvalidAgeException('\
    \ + str(self.value) + ')'\n```\n\n我们还定义了一个合适的 `__str__()` 方法，以便将异常转换为字符串用于打印。当然，我们需要更新\
    \ setter 以提供导致问题的值：\n\n```python\n@age.setter\ndef age(self, value):\n    print('In\
    \ set_age method(', value, ')')\n    if isinstance(value, int) & (value > 0 &\
    \ value < 120):\n        self._age = value\n    else:\n        raise InvalidAgeException(value)\n\
    ```\n\n我们现在可以写\n\n```python\ntry:\n    p = Person('Adam', 21)\n    p.age = -1\n\
    except InvalidAgeException as e:\n    print(e)\n```\n\n现在，如果引发异常，将打印一条消息，给出导致问题的实际值：\n\
    \n```\nIn set_age method( -1 )\nInvalidAgeException(-1)\n```\n\n## 26.8 异常链\n\n\
    创建自定义异常时，最后一个可能有用的功能是将它们链接到一个通用的底层异常。当引发一个通用异常时（例如，由某个库或 Python 系统本身引发），并且你想将其转换为更有意义的应用程序异常，这会很有用。\n\
    \n例如，假设我们想创建一个异常来表示传递给函数 `divide` 的参数的特定问题，但我们不想使用通用的 `ZeroDivisionException`，而是想使用我们自己的\
    \ `DivideByYWhenZeroException`。这个新异常可以定义为\n\n```python\nclass DivideByYWhenZeroException(Exception):\n\
    \    \"\"\" Sample Exception class\"\"\"\n```\n\n我们可以在函数 `divide` 中使用它：\n\n```python\n\
    def divide(x, y):\n    try:\n        result = x / y\n    except Exception as e:\n\
    \        raise DivideByYWhenZeroException from e\n```\n\n我们在实例化 `DivideByYWhenZeroException`\
    \ 时使用了 `raise` 和 `from` 关键字。这将我们的异常链接到指示底层问题的原始异常。\n\n我们现在可以如下调用 `divide` 方法：\n\
    \n```python\ndef main():\n    divide(6, 0)\n```\n\n这会产生如下所示的追溯信息：\n\n```\nTraceback\
    \ (most recent call last):\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 43, in divide\n    result = x / y\nZeroDivisionError: division by zero\n\
    The above exception was the direct cause of the following exception:\nTraceback\
    \ (most recent call last):\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 136, in <module>\n    main()\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 79, in main\n    divide(6, 0)\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 45, in divide\n    raise DivideByYWhenZeroException from e\n__main__.DivideByYWhenZeroException\n\
    ```\n\n如你所见，你获得了关于（应用程序特定的）`DivideByYWhenZeroException` 和原始 `ZeroDivisionError`\
    \ 的信息——两者是关联在一起的。在定义此类应用程序特定异常时（但实际底层异常仍需理解），这非常有用。\n\n## 26.9 异常组\n\n异常组就是一组不同的异常。因此，它们允许开发者将多个异常组合在一起，并将整个组作为一个整体引发。当然，这引出了一个问题“为什么？”。通常，使用异常组的原因是以下之一：\n\
    \n- 在某些情况下，当引发异常时，任何处理该异常的尝试也可能导致异常。例如，假设我们打开了一个文件用于读取。在读取文件时，我们突然遇到一个异常，然后我们尝试处理该异常并通过关闭文件来整理，这可能会引发另一个异常。因此，我们有两个与读取此文件相关的异常。我们可能希望在其他地方处理这两个异常，那么异常组就可以用来引发这两个异常。\n\
    - 如果正在使用某种类型的 API，那么在失败时，系统可能会重试某个操作几次，直到达到某个阈值。在这种情况下，每次重试都可能产生不同的异常，并且应该通知 API\
    \ 用户所有不同的异常。异常组允许我们将每次重试的异常分组，以便可以单独处理它们。\n- 最后，如果我们同时运行多个线程或进程，那么这些多个任务中的每一个都可能抛出不同的异常，我们希望捕获所有异常并通知调用代码错误组等。\n\
    \n可以使用 `ExceptionGroup` 类创建异常组。该类的参数是一个解释异常组的消息和一个包含要由该组持有的异常的元组。语法是\n\n```python\n\
    ExceptionGroup(msg, excs)\n```\n\n例如：\n\n```python\ndef do_something():\n    eg\
    \ = ExceptionGroup(\"multiple exceptions occurred\",\n                       (ValueError(\"\
    incorrect value\"),\n                        ValueError(\"not a positive value\"\
    ),\n                        FileNotFoundError(\"Unknown file data.txt\"),\n  \
    \                      AttributeError(\"date\")))\n    raise eg\n\ndo_something()\n\
    ```\n\n在这个例子中，`do_something()` 函数创建了一个 `ExceptionGroup`，消息为 'multiple exceptions\
    \ occurred'，以及一个包含四个异常的元组，由两个 `ValueError`、一个 `FileNotFoundError` 和一个 `AttributeError`\
    \ 组成。\n\n请注意，`ExceptionGroup` 是 `Exception` 类层次结构的一部分。因此，它可以在 Python 的异常处理机制中使用，并且可以使用\
    \ `raise` 关键字引发异常组。\n\n当调用 `do_something()` 函数时，它将引发 `ExceptionGroup`，由于目前未处理该异常，程序将终止并显示追溯信息，例如：\n\
    \n```\n+ Exception Group Traceback (most recent call last):\n  | File \"exception_groups_example.py\"\
    , line 8, in <module>\n  |   do_something()\n  | File \"exception_groups_example.py\"\
    , line 6, in do_something\n  |   raise eg\n  | ExceptionGroup: multiple exceptions\
    \ occurred (4 sub-exceptions)\n  +-+---------------- 1 ----------------\n    |\
    \ ValueError: incorrect value\n    +---------------- 2 ----------------\n    |\
    \ ValueError: not a positive value\n    +---------------- 3 ----------------\n\
    \    | FileNotFoundError: Unknown file data.txt\n    +---------------- 4 ----------------\n\
    \    | AttributeError: date\n    +------------------------------------\n```\n\n\
    请注意，这是一个 `ExceptionGroup` 追溯，因此它知道异常组，并显示与组关联的消息以及用于创建组的元组中列出的每个异常，顺序与它们定义的顺序一致。\n\
    \n## 26.10 异常组处理\n\n异常组可以使用与传统异常和错误相同的 `try` `except` 机制来处理。因此我们可以写"
