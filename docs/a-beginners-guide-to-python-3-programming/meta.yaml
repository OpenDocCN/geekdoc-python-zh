- md: '## Chapter 5

    Python Strings


    ## 5.1 Introduction


    In the previous chapter we used strings several times, both as prompts to the
    user and as output from the `print()` function. We even had the user type in their
    name and store it in a variable that could be used to access this name at a later
    point in time. In this chapter we will explore what a string is and how you can
    work with and manipulate them.


    ## 5.2 What Are Strings?


    During the description of the *Hello World* program we referred to Python strings
    several times, but what is a string?

    In Python a string is a series, or sequence, of characters in order. In this definition
    a *character* is anything you can type on the keyboard in one keystroke, such
    as a letter ‘a’, ‘b’, ‘c’ or a number ‘1’, ‘2’, ‘3’ or a special character such
    as ‘\’, ‘[’, ‘$’, and a space is also a character ‘ ’, although it does not have
    a visible representation.

    It should also be noted that strings are *immutable*. Immutable means that once
    a string has been created it cannot be changed. If you try to change a string
    you will in fact create a new string, containing whatever modifications you made,
    you will not affect the original string in anyway. For the most part you can ignore
    this fact, but it means that if you try to get a sub string or split a string
    you must remember to store the result—we will see this later on in this chapter.

    To define the start and end of a string we have used the single quote character
    ‘; thus all of the following are valid strings:


    - ‘Hello’

    - ‘Hello World’

    - ‘Hello Andrea2000’

    - ‘To be or not to be that is the question!’


    We can also define an empty string which has no characters in it (it is defined
    as a single quote followed immediately by a second single quote with not gap between
    them). This is often used to initialize or reset a variable holding a reference
    to a string, for example


    - `some_string = ""`


    ## 5.3 Representing Strings


    As stated above, we have used single quotes to define the start and end of a string,
    however in Python single or double quotes can be used to define a string, and
    thus both of the following are valid:


    - ‘Hello World’

    - "Hello World"


    In Python these forms are exactly the same, although by convention we default
    to use single quotes. This approach is often referred to as being more Pythonic
    (which implies it is more the convention used by experienced Python programmers),
    but the language does not enforce it.


    You should note, however, that you cannot mix the two styles of start and end
    strings; that is, you cannot start a string with a single quote and end a string
    with a double quote, and thus the following are both illegal in Python:


    - ‘Hello World" # This is illegal

    - "Hello World'' # So is this


    The ability to use both " and '', however, comes in useful if your string needs
    to contain one of the other type of string delimiters. This is because a single
    quote can be embedded in a string defined using double quotes and vice versa;
    thus we can write the following:


    ```

    print("It''s the day")

    print(''She said "hello" to everyone'')

    ```


    The output of these two lines is:


    ```

    It''s the day

    She said "hello" to everyone

    ```


    A third alternative is the use of triple quotes, which might at first hand seem
    a bit unwieldy, but they allow a string to support multiline strings, for example:


    ```

    z = """

    Hello

    World

    """

    print(z)

    ```


    which will print out


    ```

    Hello

    World

    ```


    ## 5.4 What Type is String?


    It is often said that Python is untyped, but this is not strictly true—as was
    stated in the first chapter it is a dynamically typed language with all data having
    an associated type.


    The type of an item of data (such as a string) determines what it is legal to
    do with the data and what the effect of various actions will be. For example,
    what the effect of using a ‘+’ operator is will depend on the *types* involved;
    if they are numbers then the plus operator will add them together; if however
    strings are involved then the strings will be concatenated (combined) together,
    etc.


    It is possible to find out what type a variable currently holds using the built-in
    `type()` function. This function takes a variable name and will return the type
    of the data held by that variable, for example:


    ```

    my_variable = ''Bob''

    print(type(my_variable))

    ```


    The result of executing these two lines of code is the output:


    ```

    <class ''str''>

    ```


    This is a shorthand for saying that what is held in `my_variable` is currently
    a class (type) of string (actually string is a class, Python supports ideas from
    object-oriented programming such as classes, and we will encounter them later
    in the book).


    ## 5.5 What Can You Do with Strings?


    In Python terms this means what operations or functions are their available or
    built in that you can use to work with strings. The answer is that there are very
    many. Some of these are described in this section.


    ### 5.5.1 String Concatenation


    You can concatenate two strings together using the ''+'' operator (an operator
    is an operation or behaviour that can be applied to the types involved). That
    is you can take one string and add it to another string to create a new third
    string:


    ```

    string_1 = ''Good''

    string_2 = " day"

    string_3 = string_1 + string_2

    print(string_3)

    print(''Hello '' + ''World'')

    ```


    The output from this is


    ```

    Good day

    Hello World

    ```


    Notice that the way in which the string is defined does not matter here, `string_1`
    used single quote, but `string_2` used double quotes; but they are both just strings.


    ### 5.5.2 Length of a String


    It can sometimes be useful to know how long a string is; for example if you are
    putting a string into a user interface you might need to know how much of the
    string will be displayed within a field. To find out the length of a string in
    Python you use the `len()` function, for example:


    ```

    print(len(string_3))

    ```


    This will print out the length of the string currently being held by the variable
    `string_3` (in terms of the number of characters contained in the string).


    ### 5.5.3 Accessing a Character


    As a string is a fixed sequence of letters, it is possible to use square brackets
    and an index (or position) to retrieve a specific character from within a string.
    For example:


    ```

    my_string = ''Hello World''

    print(my_string[4])

    ```


    However, you should note that strings are indexed from zero! This means that the
    first character is in position 0, the second in position 1, etc. Thus stating
    [4] indicates that we want to obtain the fifth character in the string, which
    in this case is the letter ''o''. This form of indexing elements is actually quite
    common in programming languages and is referred to a zero-based indexing.


    ### 5.5.4 Accessing a Subset of Characters


    It is also possible to obtain a subset of the original string, often referred
    to as a substring (of the original string). This can again be done using the square
    brackets notation but using a '':'' to indicate the start and end points of the
    sub string. If one of the positions is omitted then the start or end of the string
    is assumed (depending upon the omission), for example:


    ```

    my_string = ''Hello World''

    print(my_string[4]) # characters at position 4

    print(my_string[1:5]) # from position 1 to 5

    print(my_string[:5]) # from start to position 5

    print(my_string[2:]) # from position 2 to the end

    ```


    will generate


    ```

    o

    ello

    Hello

    llo World

    ```


    As such `my_string[1:5]` returns the substring containing the 2nd to 6th letters
    (that is ''ello''). In turn `my_string[:5]` returned the substring containing
    the 1st to 6th letters and `my_string[2:]` the sub string containing the 3rd to
    the last letters.


    ### 5.5.5 Repeating Strings


    We can also use the ''*'' operator with strings. In the case of strings this means
    repeat the given string a certain number of times. This generates a new string
    containing the original string repeated n number of times. For example:


    ```

    print(''*'' * 10)

    print(''Hi'' * 10)

    ```


    will generate


    ```

    **********

    HiHiHiHiHiHiHiHiHiHi

    ```


    ### 5.5.6 Splitting Strings


    A very common requirement is the need to split a string up into multiple separate
    strings based on a specific character such as a space or a comma.'
  mdcn: '## 第5章

    Python 字符串


    ## 5.1 简介


    在上一章中，我们多次使用了字符串，既作为给用户的提示，也作为 `print()` 函数的输出。我们甚至让用户输入他们的名字，并将其存储在一个变量中，以便在后续时间点访问这个名字。在本章中，我们将探讨字符串是什么，以及如何使用和操作它们。


    ## 5.2 什么是字符串？


    在描述 *Hello World* 程序时，我们多次提到了 Python 字符串，但字符串到底是什么？

    在 Python 中，字符串是一系列或一串按顺序排列的字符。在这个定义中，*字符* 是指你可以在键盘上一次按键输入的任何内容，例如字母 ‘a’、‘b’、‘c’
    或数字 ‘1’、‘2’、‘3’，或特殊字符如 ‘\’、‘[’、‘$’，空格也是一个字符 ‘ ’，尽管它没有可见的表示。

    还应注意，字符串是 *不可变的*。不可变意味着一旦创建了字符串，就无法更改它。如果你试图更改字符串，实际上会创建一个包含你所做的任何修改的新字符串，而不会以任何方式影响原始字符串。在大多数情况下，你可以忽略这个事实，但这意味着如果你试图获取子字符串或分割字符串，你必须记住存储结果——我们将在本章后面看到这一点。

    为了定义字符串的开始和结束，我们使用了单引号字符 ‘；因此，以下所有内容都是有效的字符串：


    - ‘Hello’

    - ‘Hello World’

    - ‘Hello Andrea2000’

    - ‘To be or not to be that is the question!’


    我们还可以定义一个不包含任何字符的空字符串（它被定义为一个单引号后紧跟第二个单引号，中间没有空格）。这通常用于初始化或重置保存字符串引用的变量，例如


    - `some_string = ""`


    ## 5.3 表示字符串


    如上所述，我们使用单引号来定义字符串的开始和结束，然而在 Python 中，单引号或双引号都可以用来定义字符串，因此以下两种形式都是有效的：


    - ‘Hello World’

    - "Hello World"


    在 Python 中，这些形式完全相同，尽管按照惯例我们默认使用单引号。这种方法通常被称为更 Pythonic（这意味着它更符合经验丰富的 Python 程序员使用的惯例），但语言本身并不强制执行。


    然而，你应该注意，你不能混合使用两种风格的字符串开始和结束；也就是说，你不能用单引号开始字符串而用双引号结束字符串，因此以下两种形式在 Python 中都是非法的：


    - ‘Hello World" # 这是非法的

    - "Hello World'' # 这也是非法的


    然而，能够同时使用 " 和 '' 在你的字符串需要包含另一种类型的字符串分隔符时非常有用。这是因为单引号可以嵌入在使用双引号定义的字符串中，反之亦然；因此我们可以编写以下内容：


    ```

    print("It''s the day")

    print(''She said "hello" to everyone'')

    ```


    这两行的输出是：


    ```

    It''s the day

    She said "hello" to everyone

    ```


    第三种选择是使用三引号，这乍一看可能有点笨拙，但它们允许字符串支持多行字符串，例如：


    ```

    z = """

    Hello

    World

    """

    print(z)

    ```


    这将打印出


    ```

    Hello

    World

    ```


    ## 5.4 字符串是什么类型？


    人们常说 Python 是无类型的，但这并不完全正确——正如第一章所述，它是一种动态类型语言，所有数据都有一个关联的类型。


    数据项（如字符串）的类型决定了可以对数据执行哪些合法操作以及各种操作的效果。例如，使用 ‘+’ 运算符的效果将取决于涉及的 *类型*；如果它们是数字，则加法运算符会将它们相加；但如果涉及字符串，则字符串将被连接（组合）在一起，等等。


    可以使用内置的 `type()` 函数来找出变量当前持有的类型。此函数接受一个变量名，并返回该变量持有的数据的类型，例如：


    ```

    my_variable = ''Bob''

    print(type(my_variable))

    ```


    执行这两行代码的结果是输出：


    ```

    <class ''str''>

    ```


    这是说 `my_variable` 中当前持有的内容是一个字符串类（类型）的简写（实际上字符串是一个类，Python 支持面向对象编程的思想，如类，我们将在本书后面遇到它们）。


    ## 5.5 你能用字符串做什么？


    用 Python 的术语来说，这意味着有哪些可用的或内置的操作或函数可以用来处理字符串。答案是有很多。其中一些将在本节中描述。


    ### 5.5.1 字符串连接


    你可以使用 ‘+’ 运算符（运算符是可以应用于所涉及类型的操作或行为）将两个字符串连接在一起。也就是说，你可以将一个字符串添加到另一个字符串以创建一个新的第三个字符串：


    ```

    string_1 = ''Good''

    string_2 = " day"

    string_3 = string_1 + string_2

    print(string_3)

    print(''Hello '' + ''World'')

    ```


    这将输出


    ```

    Good day

    Hello World

    ```


    注意，这里字符串的定义方式并不重要，`string_1` 使用了单引号，但 `string_2` 使用了双引号；但它们都只是字符串。


    ### 5.5.2 字符串长度


    有时知道字符串有多长会很有用；例如，如果你将字符串放入用户界面，你可能需要知道字符串中有多少部分会显示在字段中。要找出 Python 中字符串的长度，你可以使用
    `len()` 函数，例如：


    ```

    print(len(string_3))

    ```


    这将打印出变量 `string_3` 当前持有的字符串的长度（以字符串中包含的字符数表示）。


    ### 5.5.3 访问字符


    由于字符串是固定的字母序列，因此可以使用方括号和索引（或位置）从字符串中检索特定字符。例如：


    ```

    my_string = ''Hello World''

    print(my_string[4])

    ```


    然而，你应该注意字符串是从零开始索引的！这意味着第一个字符在位置 0，第二个在位置 1，依此类推。因此，[4] 表示我们想要获取字符串中的第五个字符，在本例中是字母
    ‘o’。这种索引元素的形式在编程语言中实际上相当常见，被称为基于零的索引。


    ### 5.5.4 访问字符子集


    也可以获取原始字符串的子集，通常称为（原始字符串的）子字符串。这同样可以使用方括号表示法完成，但使用 ‘:’ 来指示子字符串的开始和结束点。如果省略其中一个位置，则假定为字符串的开始或结束（取决于省略的内容），例如：


    ```

    my_string = ''Hello World''

    print(my_string[4]) # 位置 4 的字符

    print(my_string[1:5]) # 从位置 1 到 5

    print(my_string[:5]) # 从开始到位置 5

    print(my_string[2:]) # 从位置 2 到结束

    ```


    将生成


    ```

    o

    ello

    Hello

    llo World

    ```


    因此，`my_string[1:5]` 返回包含第 2 到第 6 个字母的子字符串（即 ‘ello’）。反过来，`my_string[:5]` 返回包含第
    1 到第 6 个字母的子字符串，而 `my_string[2:]` 返回包含第 3 到最后一个字母的子字符串。


    ### 5.5.5 重复字符串


    我们也可以将 ‘*’ 运算符与字符串一起使用。对于字符串，这意味着将给定的字符串重复一定次数。这会生成一个包含原始字符串重复 n 次的新字符串。例如：


    ```

    print(''*'' * 10)

    print(''Hi'' * 10)

    ```


    将生成


    ```

    **********

    HiHiHiHiHiHiHiHiHiHi

    ```


    ### 5.5.6 分割字符串


    一个非常常见的需求是需要根据特定字符（如空格或逗号）将字符串分割成多个单独的字符串。'
