  md: "The syntax for defining multiple inheritance in Python allows multiple super-classes\
    \ to be listed in the parent class list (defined by the brackets following the\
    \ class name). Each parent class is separated by a comma. The syntax is thus:\n\
    \n```\nclass SubClassName(BaseClassName1, BaseClassName2, ... BaseClassNameN):\n\
    \    class-body\n```\n\nFor example:\n\n```\nclass Car:\n    \"\"\" Car \"\"\"\
    \n\nclass Toy:\n    \"\"\" Toy \"\"\"\n\nclass ToyCar(Car, Toy):\n    \"\"\" A\
    \ Toy Car \"\"\"\n```\n\nWe can say that the class `ToyCar` inherits all the attributes\
    \ (data) and methods (behaviour) defined in classes `Car`, `Toy` and `object`.\n\
    One of the fundamental questions that this raises is how is inheritance of behaviour\
    \ managed within a multiple inheritance hierarchy. The challenge that multiple\
    \ inheritance possesses is illustrated by adding a couple of methods to the class\
    \ hierarchy we are looking at. In this example we have added the method `move()`\
    \ to both the class `Car` and the class `Toy`:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_260_0.png)\n\
    \nThe question here is which version of the method `move()` will be run when an\
    \ instance of the `ToyCar` class is instantiated and we call `toy_car.move()`?\n\
    This illustrates (a simple version of) the so-called “diamond inheritance” problem."
