    \ environment that has been activated as it is shown before the prompt in round\
    \ brackets.\n\nOn a Windows machine this file will be a `bat` file and therefore\
    \ you can activate it by directly running the `activate.bat` file, for example:\n\
    \n```\n> genesis_venv\\bin\\activate.bat\n```\n\nIf this is starting to all sound\
    \ a bit much, don't worry the PyCharm editor will handle most of this for you\
    \ and we will look at this at the end of the chapter; for now it is useful to\
    \ see what happens *under the hood*.\n\nWe can also deactivate the virtual environment\
    \ using the `deactivate` command which on Windows is `deactivate.bat`, for example,\
    \ on Linux/Macs:\n\n```\n% deactivate\njeh@Johns-iMac projects %\n```\n\nOr on\
    \ Windows\n\n```\n> deactivate.bat\n```\n\nIf we reactivate the virtual environment\
    \ again we can now install modules into this environment. To do this we use the\
    \ `pip install` command which has the following syntax:\n\n```\npip install module-name\n\
    ```\n\nLet us first review the default installation using `pip list`:\n\n```\n\
