  md: "# 40.9 Enumerations Unique Values\n\nThe previous section illustrates that\
    \ two values within an enumeration can have, by default, the same value. However,\
    \ what if this is not what you want then this could happen by accident! To avoid\
    \ this you can mark the enumeration class with an @enum.unique decorator. This\
    \ ensures that each enum member will have a unique value. If not then a ValueError\
    \ will be generated, for example:\n\nThe following code is legal in Python:\n\n\
    ```\nclass Lights(Enum):\n    RED = 1\n    AMBER = 2\n    GREEN = 3\n    RED_AMBER\
    \ = 1\n\nprint(Lights.RED)\n```\n\nHowever, if we now mark it with @unique from\
    \ the enum module as shown below:\n\n```\n@unique\nclass Lights(Enum):\n    RED\
    \ = 1\n    AMBER = 2\n    GREEN = 3\n    RED_AMBER = 1\n\nprint(Lights.RED)\n\
    ```\n\nThen when we now try and run this program we will get a ValueError being\
    \ generated:\n\n```\nTraceback (most recent call last):\n  File \"enum_examples.py\"\
    , line 97, in <module>\n    @unique\n    ^^^^^^^\n  File \"enum.py\", line 1564,\
    \ in unique\n    raise ValueError('duplicate values found in %r: %s' %\nValueError:\
    \ duplicate values found in <enum 'Lights'>: RED_AMBER -> RED\n```\n\nThus illustrating\
    \ that this enum must have unique values for each of its members."
  merge: -1
