  md: 'As far as the structure is concerned the information it now holds is fine (that
    is day = 01, month = 13, year = 9999). This is because the structure only knows
    it is supposed to hold integers; it knows nothing about dates per se. This is
    not surprising, it is only data.


    # 22.2.1 Procedures for the Data Structure


    This data is associated with procedures that perform operations on it. These operations
    might be to


    +   - test whether the date represents a date at a weekend or part of the working
    week.

    - change the date (in which case the procedure may also check to see that the
    date is a valid one).


    For example:


    ```

    is_day_of_week(date)

    in_month(date, 2)

    next_day(date)

    set_day(date, 9, 3, 1946)

    ```


    How do we know that these procedures are related to the date structure we have
    just looked at? By the naming conventions of the procedures and by the fact that
    one of the parameters is a data (record).


    The problem is that these procedures are not limited in what they can do to the
    data (for example the setDay procedure might have been implemented by a Brit who
    assumes that the data order is day, month and year. However, it may be used by
    an American who assumes that date order is month, day, year. Thus the mean of
    set_day(date, 9, 3, 1946) will be interpreted very differently. The American views
    this as the 3rd of September 1946, while the Brit views this as the 9th of March,
    1946. In either case, there is nothing to stop the date record being updated with
    both versions. Obviously the set_day() procedure might check the new date to see
    it was legal, but then again it might not. The problem is that the data is naked
    and has no defense against what these procedures do to it. Indeed, it has no defense
    against what any procedures that can access it, may do to it.


