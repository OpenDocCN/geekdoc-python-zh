    \ Y\"\"\"\n        return self._counter\n\n    @counter.setter\n    def counter(self,\
    \ value):\n        self._counter = value\n\n    @abstractmethod\n    def get_move(self):\
    \ pass\n\n    def __str__(self):\n        return self.__class__.__name__ + '['\
    \ + str(self.counter) +\n        ']'\n```\n\nNote that counter is defined as a\
