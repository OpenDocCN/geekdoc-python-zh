    \    yield 3\n```\n\n这是一个*生成器*函数，因为它至少包含一个 `yield` 语句（实际上有三个）。每次在 `for` 语句中调用\
    \ `gen_numbers()` 函数时，它都会返回与某个 `yield` 语句关联的值之一；在本例中，依次返回值 1、值 2，最后返回值 3，然后返回（终止）。\n\
