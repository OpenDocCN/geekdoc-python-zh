  md: "An operation is said to be *Referentially Transparent* if it can be replaced\
    \ with its corresponding value, without changing the program's behaviour, for\
    \ a given set of parameters.\n\nFor example, let us assume that we have defined\
    \ the function increment as shown below.\n\n```\ndef increment(num):\n    return\
    \ num + 1\n```\n\nIf we use this simple example in an application to increment\
    \ the value 5:\n\n```\nprint(increment(5))\nprint(increment(5))\n```\n\nWe can\
    \ say that the function is Referentially Transparent (or RT) if it always returns\
    \ the same result for the same value (i.e., that `increment(5)` always returns\
    \ 6):\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_195_0.png)\n\nAny function that\
    \ references a value which has been captured from its surrounding context and\
    \ which can be modified cannot be guaranteed to be RT. This can have significant\
    \ consequences for the maintainability of the resulting code. This can happen\
    \ if for example the increment function did not add 1 to the parameter but added\
    \ a global value. If this global value is changed then the function would suddenly\
    \ start to return different values for the previously entered parameters. For\
    \ example, the following code is no longer Referentially Transparent:\n\n```\n\
    amount = 1\ndef increment(num):\n    return num + amount\n\nprint(increment(5))\n\
    amount = 2\nprint(increment(5))\n```\n\nThe output from this code is not 6 and\
    \ 7—as the value of amount has changed between calls to the `increment()` function."
  merge: -1
  pgno: 195
