    \ q1 != q2 | `__ne__(q1, q2)` |\n| 大于 | q1 > q2 | `__gt__(q1, q2)` |\n| 大于等于 |\
    \ q1 >= q2 | `__ge__(q1, q2)` |\n\n我们可以将这些定义添加到我们的 Quantity 类中，以提供一个更完整的类型，使其可用于比较风格的测试（例如\
    \ if 语句）。\n\n更新后的 Quantity 类如下所示（为简洁起见，省略了一些数值运算符）：\n\n```python\nclass Quantity:\n\
    \    def __init__(self, value=0):\n        self.value = value\n    def __add__(self,\
    \ other):\n        new_value = self.value + other.value\n        return Quantity(new_value)\n\
    \n    # 为简洁起见，省略了其余的数值运算符 ...\n\n    def __eq__(self, other):\n        return\
    \ self.value == other.value\n\n    def __ne__(self, other):\n        return self.value\
    \ != other.value\n\n    def __ge__(self, other):\n        return self.value >=\
    \ other.value\n\n    def __gt__(self, other):\n        return self.value > other.value\n\
    \n    def __lt__(self, other):\n        return self.value < other.value\n\n  \
    \  def __le__(self, other):\n        return self.value <= other.value\n\n    def\
    \ __str__(self):\n        return 'Quantity[' + str(self.value) + ']'\n```\n\n\
    现在，这意味着我们可以更新我们的示例应用程序以利用这些比较运算符：\n\n```python\nq1 = Quantity(5)\nq2 = Quantity(10)\n\
    print('q1 =', q1, ',q2 =', q2)\nq3 = q1 + q2\nprint('q3 =', q3)\nprint('q1 < q2:\
    \ ', q1 < q2)\nprint('q3 > q2: ', q3 > q2)\nprint('q3 == q1: ', q3 == q1)\n```\n\
    \n现在的输出是：\n\n```\nq1 = Quantity[5] ,q2 = Quantity[10]\nq3 = Quantity[15]\nq1 <\
    \ q2: True\nq3 > q2: True\nq3 == q1: False\n```\n\n## 23.5 逻辑运算符\n\n可以在类上定义的最后一类运算符是逻辑运算符。这些是可用于\
    \ and/or 类型测试的运算符；它们通常返回 True 或 False 值。\n\n与数值运算符和比较运算符一样；逻辑运算符也是通过一组特殊方法实现的。\n\
    \n下表总结了逻辑运算符及其用于实现的方法：\n\n| 运算符 | 表达式 | 方法 |\n| --- | --- | --- |\n| 与 | q1 &\
    \ q2 | `__and__(q1, q2)` |\n| 或 | q1 \\| q2 | `__or__(q1, q2)` |\n| 异或 | q1 ^\
    \ q2 | `__xor__(q1, q2)` |\n| 非 | ~ q1 | `__invert__()` |\n\n由于这些运算符对于 Quantity\
    \ 类型来说并不真正有意义，我们将不定义它们。例如，说：\n\n```python\nq1 | q2\n```\n\n这意味着什么？q1 在什么意义上是 q2\
    \ 的替代品？\n\n## 23.6 总结\n\n仅在运算符有意义时使用它们，并且只实现那些适用于你正在定义的类型的运算符。通常，这意味着：\n\n- 算术运算符应仅用于具有数值属性的值类型。\n\
    - 比较运算符通常仅对可排序的类有意义。\n- 逻辑运算符通常适用于本质上类似于布尔值的类型。\n\n## 23.7 在线资源\n\n一些关于运算符重载的在线资源包括：\n\
    \n- https://docs.python.org/3/reference/datamodel.html 关于 Python 中运算符重载的信息。\n\
    - https://pythonprogramming.net/operator-overloading-intermediate-python-tutorial/\
    \ 关于运算符重载的教程。\n- http://cafe.elharo.com/programming/operator-overloading-considered-harmful/\
    \ 一篇关于为什么运算符重载可能对良好编程风格有害的文章。\n\n## 23.8 练习\n\n本练习的目的是创建一个新的数值风格类。\n你应该创建一个名为\
    \ `Distance` 的新用户定义类。它将与 `Quantity` 非常相似。\n你应该能够将两个距离相加，从一个距离中减去另一个距离，将一个距离除以一个整数，将一个距离乘以一个整数等等。\n\
    因此，你应该能够支持以下程序：\n\n```python\nd1 = Distance(6)\nd2 = Distance(3)\n\nprint( d1\
    \ + d2)\nprint (d1 - d2)\nprint (d1 / 2)\nprint(d2 // 2)\nprint(d2 * 2)\n```\n\
    \n请注意，除法和乘法运算符适用于距离和整数；因此，你需要思考如何实现这些运算符的特殊方法。\n此程序的输出可能是：\n\n```\nDistance[9]\n\
    Distance[3]\nDistance[3.0]\nDistance[1]\nDistance[6]\n```\n\n# 第 24 章\nPython\
    \ 属性\n\n## 24.1 简介\n\n许多面向对象的语言都有封装的明确概念；即将数据隐藏在对象内部，并仅提供特定的网关来访问这些数据。这些网关是定义为*获取*或*设置*属性值的方法（通常称为\
    \ getter 和 setter）。这允许对数据访问进行更多控制；例如，可以检查一个人的年龄是否仅使用大于零但小于 120 的正整数等。\n在许多语言（如\
    \ Java 和 C#）中，可以使用特定关键字（如 private）将属性隐藏起来，使其无法从外部访问，这表明数据应该是对象私有的。\nPython 没有明确的封装概念；相反，它依赖于两件事：一个用于表示属性应被视为私有的标准约定，以及一个称为属性的概念，该概念允许为属性定义\
    \ setter 和 getter。\n\n## 24.2 Python 属性\n\n在 Python 中，所有对象属性都是公开可用的；也就是说，它们对使用该对象的任何代码都是可见的。\n\
    例如，给定以下 `Person` 类的定义，`name` 和 `age` 都是 `Person` 类公共接口的一部分：\n\n```python\nclass\
    \ Person:\n    def __init__(self, name, age):\n        self.name = name\n    \
    \    self.age = age\n\n    def __str__(self):\n        return 'Person[' + str(self.name)\
    \ + '] is ' + str(self.age)\n```\n\n因为 name 和 age 是类公共接口的一部分，这意味着我们可以编写：\n\n```python\n\
    person = Person('John', 54)\nperson.name = 42\nperson.age = -1\nprint(person)\n\
    ```\n\n这当然有点奇怪，因为这个人现在有了名字 '42' 和年龄 -1，因此此代码的输出是：\n\n```\nPerson[42] is -1\n```\n\
    \n我们可以通过在属性名称前加上下划线（'_'）来表示我们希望将 age 和 name 视为对象的私有属性，如下所示：\n\n```python\nclass\
    \ Person:\n    def __init__(self, name, age):\n        self._name = name\n   \
    \     self._age = age\n\n    def __str__(self):\n        return 'Person[' + str(self._name)\
    \ + '] is ' + str(self._age)\n```\n\n这告诉 Python 程序员我们希望将 _name 和 _age 视为私有属性。然而，应该注意的是，这只是一个约定；尽管是一个被强烈遵守的约定。这里仍然没有任何东西可以阻止某人编写：\n\
    \n```python\nperson = Person('John', 54)\nperson._age = -1\nprint(person)\n```\n\
    \n然而，Person 类的开发者可以自由地更改类的内部结构（例如 _age）而无需通知，并且大多数人会认为，任何忽略该约定并现在遇到问题的人只能怪自己。\n\
    \n## 24.3 Setter 和 Getter 风格的方法\n\n这当然引出了一个问题；我们现在应该如何以可接受的方式获取一个人的名字和年龄？\n答案是，开发者应该提供\
    \ getter 方法和 setter 方法，这些方法可用于访问值。"
