  md: '# 15.4 Disadvantages of Functional Programming


    If Functional Programming has all the advantages previously described, why isn''t
    it the mainstream force that imperative programming languages are? The reality
    is that Functional Programming is not without its disadvantages, including:


    +   - **Input–Output is harder in a purely functional language.** Input–Output
    flows naturally align with stream style processing, which does not neatly fit
    into the data in, results out, nature of functional systems.

    - **Interactive applications are harder to develop.** Interactive applications
    are constructed via request response cycles initiated by a user action. Again,
    these do not naturally sit within the purely functional paradigm.

    - **Continuously running programs** such as services or controllers may be more
    difficult to develop, as they are naturally based upon the idea of a continuous
    loop.

    - **Functional Programming languages have tended to be less efficient on current
    hardware platforms.** This is partly because current hardware platforms are not
    designed with Functional Programming in mind and also because many of the systems
    previously available were focused on the academic community where out and out
    performance was not the primary focus. However, this has changed to a large extent
    with modern functional languages such as Scala and Haskell.

    - **Not data oriented.** A pure functional language does not really align with
    the needs of the primarily data-oriented nature of many of today''s systems. Many
    (most) commercial systems are oriented around the need to retrieve data from a
    database, manipulate it in some way and store that data back into a database.
    Such data can be naturally represented via objects in an object-oriented language.

    - **Programmers are less familiar** with Functional Programming concepts and thus
    find it harder to pick up function-oriented languages.

    - **Functional Programming idioms are often less intuitive** to (traditional)
    procedural programmers than imperative idioms which can make debugging and maintenance
    harder. Although with the use of a functional approach in many other languages
    now becoming more popular (including in Python) this trend is changing.

    - Many Functional Programming languages have been viewed as **Ivory tower languages**
    that are only used by academics. This has been true of some older functional languages
    but is increasingly changing with the advent of languages such as Scala and with
    the facilities provided in more mainstream programming languages such as Python.


    # 15.5 Referential Transparency


    An important concept within the world of Functional Programming is that of Referential
    Transparency.'
