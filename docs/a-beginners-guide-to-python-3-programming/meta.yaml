    - Python 3 was launched in December 2008 and is a major revision to the language
    that is not backward compatible. It is current the most widely used version of
    the language and represents the version we will use throughout this book.


    The issue between the two versions can be highlighted by the simple print facility:


    +   - In Python 2 this is written as print ‘Hello World’

    - In Python 3 this is written as print(‘Hello World’)


    It may not look like much of a difference but the inclusion of the ‘()’ marks
    a major change and means that any code written for one version of Python will
    probably not run on the other version. There are tools available, such as the
    2–3 utility, that will (partially) automate translation from Python 2 to Python
    3 but in general you are still left with significant work to do.


    A survey of Python Developers carried out by JetBrains (the organization behind
    the PyCharm editor) in 2022 found that only 2% of developers now claimed to be
    using a Python 2.x version, with 2% unsure which version they used. The rest (96%)
    were using a version of the 3.x line mostly 3.8, 3.9 or 3.10. This survey was
    completed before 3.11 was made available, and this over 70% of developers were
    using one of the three most recent versions of Python. For more information see
    https://www.jetbrains.com/lp/devecosystem-2022/python/.


    Python 3 is the future of the Python language, and it is this version that has
    introduced many of the new and improved language and library features (that have
    admittedly been back ported to Python 2 in many cases). This book is solely focused
    on Python 3.


    In the remainder of this book when we refer to Python we will always be referring
    to Python 3. Since then there have been numerous point and sub point releases,
    for example, as well as Python 3.1, 3.2, etc. there have also been intermediate
    releases such as 3.1.1, 3.1.2, etc.'
  - '[PAGE 29]


    # 1.3 Python History


    As has been said, Python has been around along time, although for some people
    it can seem like Python was an overnight success. In fact Python originates from
    the very late 1980s when Guido Van Possum started implementing the first version
    of Python. The first release of Python was on 20th February 1991. Guido actually
    remained the lead developer on Python until 12 July 2018 when he stepped down
    as the “benevolent dictator” of Python. Since January 2019 there has been a five-member
    Steering Council that leads the Python project.


    Python 2.0 was initially released on October 16th 2000 with its end of life being
    the 1st of January 2020. Python 3.0 was initially released 3rd December 2008.


    It is worth noting that in the Python World, the major version number represents
    an epoch (such that there has been a Python 1, a Python 2 and a Python 3 epoch).
    Within this each Python 3 release has a prefix of 3.1, thus 3.1 was the second
    Python 3 release, etc. This differs from many other programming language such
    as Java with Java 18 or Java 19 being the equivalent of 3.11 and 3.12 in Python,
    etc. The Python organization does not always release a new version of Python each
    year, although recent releases have tended to be yearly. However, although the
    language is evolving many of these releases do not represent major changes to
    the language, and thus there is relatively little difference between Python 3.10
    and Python 3.11 for example. A quick history of the main Python 3 releases is
    give below:


    +   - Python 3.0 released 3rd December 2008

    - Python 3.1 released 27th June 2009

    - Python 3.2 released 20th February 2011

    - Python 3.3 released 29th September 2012

    - Python 3.4 16th March 2014

    - Python 3.5 13th September 2015

    - Python 3.6 23rd December 2016

    - Python 3.7 27th June 2018

    - Python 3.8 14th October 2019

    - Python 3.9 5th October 2020

    - Python 3.10 4th October 2021

    - Python 3.11 24th October 2022.


    In general almost all of the features in the book are supported by Python 3.8
    onwards. One or two of the features require a later version such as 3.10. Such
    requirements will be noted when each topic is introduced. Personally when teaching
    Python I try and use the latest stable version such as 3.11 or 3.12.'
  - '[PAGE 30]


    # 1.4 Python Programming


    There are several different programming paradigms that a programming language
    may allow developers to code in, these are:


    +   - **Procedural Programming** in which a program is represented as a sequence
    of instructions that tell the computer what it should do explicitly. Procedures
    and / or functions are used to provide structure to the program with control structures
    such as if statements and loop constructs to manage which steps are executed and
    how many times. Languages typifying this approach include C and Pascal.

    - **Declarative Programming** languages, such as prolog, that allow developers
    to describe how a problem should be solved with the language / environment determining
    how the solution should be implemented. SQL (a database query language) is one
    of the most common declarative languages that you are likely to encounter and
    is introduced at the end of this book.

    - **Object-Oriented Programming** approaches that represent a system in terms
    of the objects that form that system. Each object can hold its own data (also
    known as state) as well as define behaviour what the object can do. A computer
    program is formed from a set of these objects co-operating together. Languages
    such as Java and C# typify the object-oriented approach.

    - **Functional Programming** languages decompose a problem into a set of functions.
    Each function is independent of any external state operating only on the inputs
    they received to generate their outputs. The programming language Haskell is an
    example of a functional programming language.


    Some programming languages are considered to be *hybrid* languages; that is they
    allow developers to utilize a combination of difference approaches within the
    same program. Python is an example of a hybrid programming language as it allows
    you to write very procedural code, to use objects in an object-oriented manner
    and to write functional programs. Each of these approaches is covered in this
    book.


    # 1.5 Python Libraries


    As well as the core language there are very many libraries available for Python.
    These libraries extend the functionality of the language and make it much easier
    to develop applications. These libraries cover:


    +   - web frameworks such as Django / Flask,

    - email clients such as smtplib (a SMTP email client) and imaplib (an IMAP4 email
    client),

    - content management operations such as the Zope library,

    - lightweight concurrency (running multiple operations at the same time) using
    the Stackless library,

    - the Generation of Microsoft Excel files using the openpyxl library,'
  - '[PAGE 31]


    +   - graphics libraries such as Matplotlib and PyOpenGL,

    - Graphical User Interface (GUI) libraries such as Tkinter or PyQt5,

    - Data Analytics using libraries such as Pandas and SciPy and NumPy,

    - Machine learning using libraries such as SKLearn and TensorFlow.


    A very useful resource to look at, which introduces many of these libraries (also
    known as modules), is the ‘Python 3 module of the Week’ web site which can be
    found at https://pymotw.com/3. This lists many of the libraries / modules available
    and provides a short introduction to what they do and how to use them. The chapter
    entitled ‘Python Virtual Environments’ explains how to install such libraries
    into your Python runtime environment.


    # 1.6 Python Execution Model


    Python is not a precompiled language in the way that some other languages you
    may have come across are (such as C++ ). Instead it is what is known as an interpreted
    language (although even this is not quite accurate). An interpreted language is
    one that does not require a separate compilation phase to convert the human readable
    format into something that can be executed by a computer. Instead the plain text
    version is fed into another program (generally referred to as the interpreter)
    which then executes the program for you.


    Python actually uses an intermediate model in that it actually converts the plain
    text English style Python program into an intermediate ‘pseudo’ machine code format
    and it is this intermediate format that is executed. This is illustrated below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_31_0.png)


    The way in which the Python interpreter processes a Python program is broken down
    into several steps. The steps shown here are illustrative (and simplified) but
    the general idea is correct.


    +   1. First the program is checked to make sure that it is valid Python, that
    is a check is made that the program follows all of the rules of the language and
    that each of the commands and operations, etc. is understood by the Python environment.'
- md: '## 1.7 Running Python Programs


    There are several ways in which you can run a Python program, including:


    - Interactively using the Python interpreter.

    - Stored in a file and run using the Python command.

    - Run as a script file specifying the Python interpreter to use within the script
    file.

    - From within a Python IDE (Integrated Development Environment) such as PyCharm.

    - Using Jupyter Notebooks in a web browser.


    ### 1.7.1 Interactively Using the Python Interpreter


    It is quite common to find that people will use Python in interactive mode. This
    uses the Python REPL (named after **Read Evaluate Print Loop** style of operation).


    Using the REPL, Python statements and expressions can be typed into the Python
    prompt and will then be executed directly. The values of variables will be remembered
    and may be used later in the session.


    To run the Python REPL, Python must have been installed onto the computer system
    you are using. Once installed you can open a Command Prompt window (Windows) or
    a Terminal window (Mac) and type `Python` into the prompt. This is shown for a
    Windows machine below:


    ```

    jeh@Johns-iMac ~ % python

    Python 3.11.2 (main, Feb 16 2023, 03:07:35) [Clang 14.0.0 (clang-1400.0.29.202)]
    on darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>> print(''Hello World'')

    Hello World

    >>> 5 + 4

    9

    >>> name = ''John''

    >>> print(name)

    John

    >>>

    ```


    In the above example, we interactively typed in several Python commands and the
    Python interpreter ‘Read’ what we have typed in, ‘Evaluated’ it (worked out what
    it should do), ‘Printed’ the result and then ‘Looped’ back ready for further input.
    In this case we:


    - Printed out the string ‘Hello World’.

    - Added 5 and 4 together and got the result 9.

    - Stored the string ‘John’ in a variable called `name`.

    - Printed out the contents of the variable `name`.


    To leave the interactive shell (the REPL) and go back to the console (the system
    shell), press Ctrl-Z and then Enter on Windows, or Ctrl-D on OS X or Linux. Alternatively,
    you could also issue the command `quit()`.


    You should note that once you have left the session anything you created within
    the session will be lost.


    ### 1.7.2 Running a Python File


    We can of course store the Python commands into a file. This creates a program
    file that can then be run as an argument to the `python` command. It also allows
    the program held within the file to be run many times.


    For example, given a file containing the following file (called `hello.py`) with
    the 4 commands in it:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_0.png)


    To run the `hello.py` program on a PC using Windows we can use the `Python` command
    followed by the name of the file:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_1.png)


    We can also run the same program on a Apple Mac using MacOS via the `Python` interpreter.
    For example on a Mac we can do the following:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_2.png)


    This makes it very easy to create Python programs that can be stored in files
    and run when needed on whatever platform is required (Windows, Linux or Mac).
    This illustrates the cross platform nature of Python and is just one of the reasons
    why Python is so popular.


    ### 1.7.3 Executing a Python Script


    It is also possible to transform a file containing a stored Python program into
    a Script. A script is a stand-alone file that can be run directly without the
    need to (explicitly) use the `python` command.


    This is done by adding a special line to the start of the Python file that indicates
    the Python command (or interpreter) to use with the rest of the file. This line
    must start with `#!` and must come at the start of the file.


    To convert the previous sections file into a Script we would need to add the path
    to the python interpreter. Here path refers to the route that the computer must
    take to find the specified Python interpreter (or executable).


    The exact location of the Python interpreter on your computer depends on what
    options upon selected when you (or whoever installed Python) set it up. Typically
    on a Windows PC Python will be found in the ‘Program Files’ directory or it might
    be installed in its own ‘Python’ directory.


    Whatever the location of the Python interpreter to create a script we will need
    to add a first line to our `hello.py` file. This line must start with a `#!`.
    This combination of characters is known as a *shebang* and indicates to Linux
    and other Unix like operating systems (such as MacOS) how the remainder of the
    file should be executed.


    For example, on a Apple Mac we might add:


    ```

    #!/Library/Frameworks/Python.framework/Versions/3.11/bin/python3

    ```


    When added to the `hello.py` file we now have:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_35_0.png)


    However, we cannot just run the file as it stands. If we tried to run the file
    without any changes then we will get an error indicating that the permission to
    execute the file has been denied:


    ```

    $ ./hello.py

    -bash: ./hello.py: Permission denied

    $

    ```


    This is because by default you can’t just run a file. We need to mark it as executable.
    There are several ways to do this, however one of the easiest on a Mac or Linux
    box is to use the `chmod` command (which can be used to modify the permissions
    associated with the file). To make the file executable we can change the file
    permissions to include making it executable by using the following command from
    a terminal window when we are in the same directory as the `hello.py` file:


    ```

    $ chmod +x hello.py

    ```


    Where `+x` indicates that we want to add the executable permission to the file.


    Now if we try to run the file directly it executes and the results of the commands
    within the file are printed out:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_36_0.png)


    Note the use of the `./` preceding the file name in the above; this is used on
    Linux to tell the operating system to look in the current directory for the file
    to execute.


    Different systems will store Python in different locations and thus might need
    different first lines, for example on a Linux we might write:


    ```

    #!/usr/local/bin/python3

    print(''Hello, world'')

    print(5 + 4)

    name = ''John''

    print(name)

    ```


    By default Windows does not have the same concept. However, to prompt cross platform
    portability the Python Launcher for Windows can also support this style of operation.
    It allows scripts to indicate a preference for a specific Python version using
    the same `#!` (Shebang) format as Unix style operating systems. We can now indicate
    that the rest of the file should be interpreted as a Python script; if multiple
    versions of Python are installed this may require Python 3 to be explicitly specified.
    The launcher also understands how to translate the Unix version into Windows versions
    so that `/usr/local/bin/python3` will be interpreted as indicating that python3
    is required.


    An example of the `hello.py` script for a Windows or Linux machine is given below
    using Notepad++ on a Windows box.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_37_0.png)


    When the launcher was installed it should have been associated with Python files
    (i.e., files that have a .py extension). This means that if you double-click on
    one of these files from the Windows Explorer, then the Python launcher will be
    used to run the file.


    ### 1.7.4 Using Python in an IDE


    We can also use an IDE such as PyCharm to writing and execute our Python program.
    The same program is shown using PyCharm below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_37_1.png)


    In the above figure the simple set of commands are again listed in a file called
    hello.py. However, the program has been run from within the IDE and the output
    is shown in an output console at the bottom of the display.'
  mdcn: '## 1.7 运行 Python 程序


    有几种方式可以运行 Python 程序，包括：


    -   使用 Python 解释器进行交互式运行。

    -   将程序存储在文件中，并使用 `python` 命令运行。

    -   作为脚本文件运行，在文件内指定要使用的 Python 解释器。

    -   在 Python IDE（集成开发环境）中运行，例如 PyCharm。

    -   在网页浏览器中使用 Jupyter Notebooks。


    ### 1.7.1 使用 Python 解释器进行交互式运行


    人们通常会以交互模式使用 Python，这很常见。这种方式使用的是 Python REPL（其名称源于 **读取-求值-打印-循环** 的操作风格）。


    使用 REPL，可以在 Python 提示符下输入 Python 语句和表达式，它们会被直接执行。变量的值会被记住，并可在当前会话的后续部分使用。


    要运行 Python REPL，必须在你使用的计算机系统上安装 Python。安装完成后，你可以打开命令提示符窗口（Windows）或终端窗口（Mac），并在提示符下输入
    `python`。以下是在 Windows 机器上的示例：


    ```

    jeh@Johns-iMac ~ % python

    Python 3.11.2 (main, Feb 16 2023, 03:07:35) [Clang 14.0.0 (clang-1400.0.29.202)]
    on darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>> print(''Hello World'')

    Hello World

    >>> 5 + 4

    9

    >>> name = ''John''

    >>> print(name)

    John

    >>>

    ```


    在上面的例子中，我们交互式地输入了几个 Python 命令。Python 解释器‘读取’了我们输入的内容，‘求值’（计算出它应该做什么），‘打印’结果，然后‘循环’回来，准备接受进一步的输入。在这个例子中，我们：


    -   打印出了字符串 ''Hello World''。

    -   将 5 和 4 相加，得到结果 9。

    -   将字符串 ''John'' 存储在一个名为 `name` 的变量中。

    -   打印出了变量 `name` 的内容。


    要退出交互式 shell（即 REPL）并返回到控制台（系统 shell），在 Windows 上按 Ctrl-Z 然后按 Enter，在 OS X 或 Linux
    上按 Ctrl-D。或者，你也可以执行 `quit()` 命令。


    你应该注意，一旦退出会话，在会话中创建的任何内容都将丢失。


    ### 1.7.2 运行 Python 文件


    当然，我们可以将 Python 命令存储到一个文件中。这会创建一个程序文件，然后可以作为 `python` 命令的参数来运行。它还允许文件中的程序被多次运行。


    例如，给定一个包含以下内容的文件（名为 `hello.py`），其中有 4 条命令：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_0.png)


    要在使用 Windows 的 PC 上运行 `hello.py` 程序，我们可以使用 `python` 命令，后跟文件名：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_1.png)


    我们也可以在 Apple Mac 上通过 `python` 解释器运行相同的程序。例如，在 Mac 上我们可以这样做：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_2.png)


    这使得创建可以存储在文件中并在需要时在任何所需平台（Windows、Linux 或 Mac）上运行的 Python 程序变得非常容易。这体现了 Python
    的跨平台特性，也是 Python 如此受欢迎的原因之一。


    ### 1.7.3 执行 Python 脚本


    也可以将包含已存储 Python 程序的文件转换为脚本。脚本是一个独立的文件，可以直接运行，无需（显式地）使用 `python` 命令。


    这是通过在 Python 文件的开头添加一行特殊指令来实现的，该指令指明了用于文件其余部分的 Python 命令（或解释器）。这一行必须以 `#!` 开头，并且必须位于文件的开头。


    要将上一节的文件转换为脚本，我们需要添加 Python 解释器的路径。这里的路径指的是计算机必须遵循的路线，以找到指定的 Python 解释器（或可执行文件）。


    Python 解释器在你计算机上的确切位置取决于你（或安装 Python 的人）在设置时选择的选项。通常，在 Windows PC 上，Python 会位于
    ''Program Files'' 目录中，或者可能安装在它自己的 ''Python'' 目录中。


    无论 Python 解释器位于何处，要创建脚本，我们都需要在 `hello.py` 文件中添加第一行。这一行必须以 `#!` 开头。这个字符组合被称为 *shebang*（释伴），它向
    Linux 和其他类 Unix 操作系统（如 MacOS）指示文件的其余部分应如何执行。


    例如，在 Apple Mac 上，我们可能会添加：


    ```

    #!/Library/Frameworks/Python.framework/Versions/3.11/bin/python3

    ```


    将其添加到 `hello.py` 文件后，我们现在得到：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_35_0.png)


    然而，我们不能直接运行这个文件。如果我们尝试不做任何更改就运行该文件，将会得到一个错误，提示执行该文件的权限被拒绝：


    ```

    $ ./hello.py

    -bash: ./hello.py: Permission denied

    $

    ```


    这是因为默认情况下，你不能直接运行一个文件。我们需要将其标记为可执行文件。有几种方法可以做到这一点，然而在 Mac 或 Linux 机器上最简单的方法之一是使用
    `chmod` 命令（该命令可用于修改与文件关联的权限）。要使文件可执行，我们可以在终端窗口中，当位于与 `hello.py` 文件相同的目录时，使用以下命令更改文件权限以包含可执行权限：


    ```

    $ chmod +x hello.py

    ```


    其中 `+x` 表示我们想为文件添加可执行权限。


    现在，如果我们尝试直接运行该文件，它会执行，并且文件内命令的结果会被打印出来：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_36_0.png)


    请注意上面文件名前使用的 `./`；这在 Linux 上用于告诉操作系统在当前目录中查找要执行的文件。


    不同的系统会将 Python 存储在不同的位置，因此可能需要不同的第一行。例如，在 Linux 上，我们可能会写：


    ```

    #!/usr/local/bin/python3

    print(''Hello, world'')

    print(5 + 4)

    name = ''John''

    print(name)

    ```


    默认情况下，Windows 没有相同的概念。然而，为了促进跨平台可移植性，Windows 的 Python 启动器也支持这种操作风格。它允许脚本使用与 Unix
    风格操作系统相同的 `#!`（Shebang）格式来指定对特定 Python 版本的偏好。我们现在可以指明文件的其余部分应被解释为 Python 脚本；如果安装了多个版本的
    Python，这可能需要明确指定 Python 3。启动器还知道如何将 Unix 版本转换为 Windows 版本，因此 `/usr/local/bin/python3`
    将被解释为需要 python3。


    下面是在 Windows 机器上使用 Notepad++ 给出的适用于 Windows 或 Linux 机器的 `hello.py` 脚本示例。


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_37_0.png)


    当启动器安装时，它应该已经与 Python 文件（即具有 .py 扩展名的文件）相关联。这意味着如果你在 Windows 资源管理器中双击其中一个文件，Python
    启动器将被用来运行该文件。


    ### 1.7.4 在 IDE 中使用 Python


    我们也可以使用 IDE（如 PyCharm）来编写和执行我们的 Python 程序。下面展示了使用 PyCharm 运行的同一个程序：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_37_1.png)


    在上图中，简单的命令集再次列在一个名为 hello.py 的文件中。然而，程序是从 IDE 内部运行的，输出显示在底部的输出控制台中。'
