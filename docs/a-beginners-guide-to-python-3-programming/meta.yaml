    # 11.7 Data Dictionary


    Another element commonly associated with structured analysis/design is the data
    dictionary. The data dictionary is a structured repository of data elements in
    the system. It stores the descriptions of all data flow diagram data elements.
    That is it records details and definitions of data flows, data stores, data stored
    in data stores and the processes. The format used for a data dictionary varies
    from method to method and project to project. It can be as simple as an Excel
    spreadsheet to an enterprise-wide software system such as Semanta (https://www.semantacorp.com/data-dictionary).'
