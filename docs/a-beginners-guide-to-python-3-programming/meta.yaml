    \ is:\n\n```\nPoint - 1,1\nCalling <function Point.move_to at 0x110288b70> with\
    \ 5 5\nCalled <function Point.move_to at 0x110288b70> with 5 5\nPoint - 5,5\n\
    ```\n\n## 29.9 Class Decorators\n\nAs well as being able to decorate functions\
    \ and methods; it is possible to decorate classes.\n\nA class can be decorated\
    \ to add required functionality that may be external to that class.\n\nAs an example,\
    \ a common class level operation is to want to indicate that a class should implement\
    \ the singleton design pattern. The Singleton Design Pattern (again from the Gang\
    \ of Four Design Patterns book) describes a type that can only have one object\
    \ constructed for it. That is, unlike other objects it should not be possible\
    \ to obtain more than one instance within the same program. Thus, the Singleton\
    \ design pattern ensures that only one instance of a class is created. All objects\
    \ that use an instance of that type use the same instance.\n\nWe can define a\
    \ decorator that implements the singleton design pattern, for example:\n\n```\n\
    def singleton(cls):\n    print('In singleton for: ', cls)\n    instance = None\n\
    \n    def get_instance():\n        nonlocal instance\n        if instance is None:\n\
    \            instance = cls()\n        return instance\n\n    return get_instance\n\
    ```\n\nThis decorator returns the get_instance function. This function checks\
    \ to see if the variable instance is set to None or not; if it is set to None\
    \ it instantiates the class passed into the decorator and stores this in the instance\
    \ variable. It then returns the instance. If the instance is already set it merely\
    \ returns the instance.\n\nWe can apply this decorator to whole classes such as\
    \ `Service` and `Foo` below:\n\n```\n@singleton\nclass Service(object):\n    def\
    \ print_it(self):\n        print(self)\n\n@singleton\nclass Foo(object):\n   \
    \ pass\n```\n\nWe can now use the classes `Service` and `Foo` as normal; however\
    \ only one instance of `Service` and one instance of `Foo` will ever be created\
    \ in the same program:\n\n```\nprint('Starting')\ns1 = Service()\nprint(s1)\n\
    s2 = Service()\nprint(s2)\nf1 = Foo()\nprint(f1)\nf2 = Foo()\nprint(f2)\nprint('Done')\n\
    ```\n\nIn the above main function, it looks as if we have created two new `Service`\
    \ objects and two `Foo` objects; however, the `@singleton` decorator will restrict\
    \ the number of instances created to one and will reuse that instance whenever\
    \ a request is made to instantiate the given class. Thus when we run this example,\
    \ we can see that the hexadecimal number representing the location of the object\
    \ in memory is the same for the two `Service` objects and the same for the two\
    \ `Foo` objects:\n\n```\nIn singleton for: <class '__main__.Service'>\nIn singleton\
    \ for: <class '__main__.Foo'>\nStarting\n<__main__.Service object at 0x10ac3f780>\n\
    <__main__.Service object at 0x10ac3f780>\n<__main__.Foo object at 0x10ac3f7b8>\n\
    <__main__.Foo object at 0x10ac3f7b8>\nDone\n```\n\n## 29.10 When is a Decorator\
    \ Executed?\n\nAn important feature of decorators is that they are executed right\
    \ after the decorator function is defined. This is usually at *import time* (i.e.,\
    \ when a module is loaded by Python).\n\n```\ndef logger(func):\n    print('In\
    \ Logger')\n    def inner():\n        print('In inner calling ', func.__name__)\n\
    \        func()\n        print('In inner called ', func.__name__)\n    print('Finishing\
    \ Logger')\n    return inner\n\n@logger\ndef print_it():\n    print('Print It')\n\
    \nprint('Start')\nprint_it()\nprint('Done')\n```\n\nFor example, the decorator\
    \ logger shown above prints out 'In Logger' and 'Finished Logger' when it is executed.\
    \ If the output is examined, it can be seen that this output occurs before the\
    \ main function prints 'Start'.\n\n```\nIn Logger\nFinishing Logger\nStart\nIn\
    \ inner calling print_it\nPrint It\nIn inner called print_it\nDone\n```\n\nNote\
    \ that the decorated function and the wrapped function only execute when they\
    \ are explicitly invoked.\nThis highlights the difference between what Pythonistas\
    \ call *import time* and *runtime*.\n\n## 29.11 Built-In Decorators\n\nThere are\
    \ numerous built-in decorators in Python 3; some of which we have already seen\
    \ such as `@classmethod`, `@staticmethod` and `@property`. We also saw some decorators\
    \ when talking about abstract methods and properties. There are also decorators\
    \ associated with unit testing and asynchronous operations."
  mdcn: "`makeitalic_wrapped`随后被传入`make_bold()`函数，该函数将其包装在`makebold_wrapped`函数内，而`makebold_wrapped`正是由`make_bold`装饰器返回的函数。\n\
    这意味着当调用`hello()`时，实际执行的是`makebold_wrapped`函数，该函数会进一步调用两个函数，如下所示：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_355_0.png)\n\
    \n最终结果是，传入函数返回的字符串首先被`<i>`和`</i>`（表示斜体）包裹，然后在HTML中被`<b>`和`</b>`（表示粗体）包裹。\n因此，`print(hello())`的输出为：\n\
    \n```\n<b><i>hello world</i></b>\n```\n\n## 29.7 参数化装饰器\n\n装饰器也可以接受参数；然而，这类装饰器的语法略有不同；本质上多了一层间接性。装饰器函数接受一个或多个参数，并返回一个可以使用该参数且接受被包装的可调用对象的函数。例如：\n\
    \n```\ndef register(active=True):\n    def wrap(func):\n        def wrapper():\n\
    \            print('Calling ', func.__name__, ' decorator param ', active)\n \
    \           if active:\n                func()\n                print('Called\
    \ ', func.__name__)\n            else:\n                print('Skipped ', func.__name__)\n\
    \        return wrapper\n    return wrap\n\n@register()\ndef func1():\n    print('func1')\n\
    \n@register(active=False)\ndef func2():\n    print('func2')\n\nfunc1()\nprint('-'\
    \ * 10)\nfunc2()\n```\n\n在此示例中，只有当`active`参数为`True`时，被装饰的函数才会被调用。这是默认值，因此对于`func1()`，无需指定该参数（但请注意，现在必须提供圆括号）。\n\
    \n对于`func2()`，`@register`装饰器的`active`参数被设置为`False`。这意味着包装函数将不会调用提供的函数。\n\n请注意，装饰器的用法仅在需要包含圆括号这一点上有所不同，即使没有指定参数也是如此；尽管现在`register`装饰器内部定义了两个内部函数。\n\
    \n## 29.8 方法装饰器\n\n### 29.8.1 无参数的方法\n\n方法也可以像函数一样被装饰（因为它们也是可调用对象）。然而，重要的是要记住，方法将特殊参数`self`作为第一个参数，用于引用应用该方法的对象。因此，装饰器必须考虑这个参数，即`inner`包装函数必须至少接受一个代表`self`的参数：\n\
    \n```\ndef pretty_print(method):\n    def method_wrapper(self):\n        return\
    \ \"<p>{0}</p>\".format(method(self))\n    return method_wrapper\n```\n\n`pretty_print`装饰器定义了一个内部函数，该函数的第一个（在此例中也是唯一的）参数是对象的引用（按照惯例使用参数`self`）。然后在调用实际方法时将其传入。\n\
    \n`pretty_print`装饰器现在可以与任何只接受`self`参数的方法一起使用，例如：\n\n```\nclass Person:\n    def\
    \ __init__(self, name, surname, age):\n        self.name = name\n        self.surname\
    \ = surname\n        self.age = age\n\n    def print_self(self):\n        print('Person\
    \ - ', self.name, ', ', self.age)\n\n    @pretty_print\n    def get_fullname(self):\n\
    \        return self.name + \" \" + self.surname\n```\n\n在上面的类中，`get_fullname()`方法被`pretty_print`装饰。如果我们现在在一个对象上调用`get_fullname()`，结果字符串将被`<p>`和`</p>`包裹（这是HTML中表示段落的标记）：\n\
    \n```\nprint('Starting')\np = Person('John', 'Smith', 21)\np.print_self()\nprint(p.get_fullname())\n\
    print('Done')\n```\n\n这将生成输出：\n\n```\nStarting\nPerson - John , 21\n<p>John Smith</p>\n\
    Done\n```\n\n### 29.8.2 带参数的方法\n\n与函数一样，除了`self`之外还接受参数的方法也可以被装饰。在这种情况下，装饰器不仅必须接受`self`参数，还必须接受传递给方法的任何参数。例如：\n\
    \n```\ndef trace(method):\n    def method_wrapper(self, x, y):\n        print('Calling',\
    \ method, 'with', x, y)\n        method(self, x, y)\n        print('Called', method,\
    \ 'with', x, y)\n    return method_wrapper\n```\n\n现在这个`trace`装饰器定义了一个内部函数，该函数接受参数`self`和两个额外的参数。它可以与任何也接受两个参数的方法一起使用，例如下面的`move_to()`方法：\n\
    \n```\nclass Point:\n    def __init__(self, x, y):\n        self.x = x\n     \
    \   self.y = y\n\n    @trace\n    def move_to(self, x, y):\n        self.x = x\n\
    \        self.y = y\n\n    def __str__(self):\n        return 'Point - ' + str(self.x)\
    \ + ',' + str(self.y)\n```\n\n当在下面创建一个Point对象时，我们可以调用move_to方法并查看结果：\n\n```\n\
    p = Point(1, 1)\nprint(p)\np.move_to(5, 5)\nprint(p)\n```\n\n其输出为：\n\n```\nPoint\
    \ - 1,1\nCalling <function Point.move_to at 0x110288b70> with 5 5\nCalled <function\
    \ Point.move_to at 0x110288b70> with 5 5\nPoint - 5,5\n```\n\n## 29.9 类装饰器\n\n\
    除了能够装饰函数和方法；还可以装饰类。\n\n一个类可以被装饰以添加可能在该类外部所需的功能。\n\n例如，一个常见的类级操作是希望表明一个类应该实现单例设计模式。单例设计模式（同样来自《设计模式：可复用面向对象软件的基础》一书）描述了一种类型，该类型只能构造一个对象。也就是说，与其他对象不同，在同一程序中不应该能够获得多个实例。因此，单例设计模式确保只创建一个类的实例。所有使用该类型实例的对象都使用同一个实例。\n\
    \n我们可以定义一个实现单例设计模式的装饰器，例如：\n\n```\ndef singleton(cls):\n    print('In singleton\
    \ for: ', cls)\n    instance = None\n\n    def get_instance():\n        nonlocal\
    \ instance\n        if instance is None:\n            instance = cls()\n     \
    \   return instance\n\n    return get_instance\n```\n\n这个装饰器返回get_instance函数。该函数检查变量instance是否设置为None；如果设置为None，则实例化传入装饰器的类并将其存储在instance变量中。然后返回该实例。如果实例已经设置，则仅返回该实例。\n\
    \n我们可以将此装饰器应用于整个类，例如下面的`Service`和`Foo`：\n\n```\n@singleton\nclass Service(object):\n\
    \    def print_it(self):\n        print(self)\n\n@singleton\nclass Foo(object):\n\
    \    pass\n```\n\n我们现在可以像往常一样使用`Service`和`Foo`类；然而，在同一程序中只会创建一个`Service`实例和一个`Foo`实例：\n\
    \n```\nprint('Starting')\ns1 = Service()\nprint(s1)\ns2 = Service()\nprint(s2)\n\
    f1 = Foo()\nprint(f1)\nf2 = Foo()\nprint(f2)\nprint('Done')\n```\n\n在上面的主函数中，看起来我们创建了两个新的`Service`对象和两个`Foo`对象；然而，`@singleton`装饰器会将创建的实例数量限制为一个，并且每当请求实例化给定类时都会重用该实例。因此，当我们运行此示例时，我们可以看到表示对象在内存中位置的十六进制数对于两个`Service`对象是相同的，对于两个`Foo`对象也是相同的：\n\
    \n```\nIn singleton for: <class '__main__.Service'>\nIn singleton for: <class\
    \ '__main__.Foo'>\nStarting\n<__main__.Service object at 0x10ac3f780>\n<__main__.Service\
    \ object at 0x10ac3f780>\n<__main__.Foo object at 0x10ac3f7b8>\n<__main__.Foo\
    \ object at 0x10ac3f7b8>\nDone\n```\n\n## 29.10 装饰器何时执行？\n\n装饰器的一个重要特性是它们在装饰器函数定义后立即执行。这通常发生在*导入时*（即当模块被Python加载时）。\n\
    \n```\ndef logger(func):\n    print('In Logger')\n    def inner():\n        print('In\
    \ inner calling ', func.__name__)\n        func()\n        print('In inner called\
    \ ', func.__name__)\n    print('Finishing Logger')\n    return inner\n\n@logger\n\
    def print_it():\n    print('Print It')\n\nprint('Start')\nprint_it()\nprint('Done')\n\
    ```\n\n例如，上面显示的装饰器logger在执行时会打印出'In Logger'和'Finished Logger'。如果检查输出，可以看到此输出发生在主函数打印'Start'之前。\n\
    \n```\nIn Logger\nFinishing Logger\nStart\nIn inner calling print_it\nPrint It\n\
    In inner called print_it\nDone\n```\n\n请注意，被装饰的函数和包装函数仅在显式调用时才执行。\n这突出了Python开发者所说的*导入时*和*运行时*之间的区别。\n\
    \n## 29.11 内置装饰器\n\nPython 3中有许多内置装饰器；其中一些我们已经见过，例如`@classmethod`、`@staticmethod`和`@property`。我们在讨论抽象方法和属性时也见过一些装饰器。还有与单元测试和异步操作相关的装饰器。"
