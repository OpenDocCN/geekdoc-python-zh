    Which prints out


    ```

    Quantity[15]

    ```


    This implied contract says that the `Calculator.calc()` method will work with
    anything that supports the numeric `add` operator (or to put it another); anything
    that is numeric like.


    This is also known as *Duck Typing*; this is described in the next section.


    # 28.3 Duck Typing


    This rather strange term comes from an old saying:


    > if it walks like a duck, swims like a duck and quacks like a duck then it''s
    a Duck!


    In Python *Duck Typing* (also known as shape typing or structural typing) implies
    that if a object can perform the required set of operations that it''s a suitable
    thing to use for what you want. For example, if your type can be used with the
    add, multiply, divide and subtract operators than it can be treated as a Numeric
    type (even if it isn''t).'
  - "[PAGE 340]\n\nThis is a very powerful feature of Python and allows code originally\
    \ written to work with a specific set of types, to also be used with a completely\
    \ new set of types; as long as they meet the *implicit* contract defined within\
    \ the code.\n\nIt is also interesting to note, that a particular set of methods\
    \ may have a *super set* of requirements on a particular type, but you only need\
    \ to implement as much as is required for the functionality you will actually\
    \ use.\n\nFor example, let us modify the `Calculator` class a bit and add some\
    \ more methods to it:\n\n```\nclass Calculator:\n    \"\"\" Simple Calculator\
    \ class\"\"\"\n    def add(self, x, y):\n        return x + y\n\n    def subtract(self,\
    \ x, y):\n        return x - y\n\n    def multiply(self, x, y):\n        return\
    \ x * y\n\n    def divide(self, x, y):\n        return x/y\n```\n\nAt first sight\
    \ this may indicate that anything being used with the `Calculator` must implement\
    \ all four operators `+`, `-`, `/` and `*`. However, this is only true if you\
    \ need to execute all four of the methods defined in the class.\n\nFor example,\
    \ consider the type `Distance`:\n\n```\nclass Distance:\n    def __init__(self,\
    \ d):\n        self.value = d\n    def __add__(self, other):\n        return Distance(self.value\
    \ + other.value)\n    def __sub__(self, other):\n        return Distance(self.value\
    \ - other.value)\n    def __str__(self):\n        return 'Distance[' + str(self.value)\
    \ + ']'\n```\n\nThis defines a class that implements only the `__add__()` and\
    \ `__sub__()` methods and will thus only support the `+` and `-` operators.\n\n\
    Can instances of `Distance` be used with the `Calculator` class? The answer is\
    \ that they can but only with the add and subtract methods (as they only meet\
    \ part of the implied contract between the `Calculator` class and any types used\
    \ with that class).\n\nWe can thus write\n\n```\nd1 = Distance(6)\nd2 = Distance(3)\n\
    print(calc.add(d1, d2))\nprint(calc.subtract(d1, d2))\n```"
  - "[PAGE 341]\n\nAnd obtain the output:\n\n```\nDistance[9]\nDistance[3]\n```\n\n\
    However, if we try to use the `multiply()` or `divide()` methods, we will get\
    \ an error, for example:\n\n```\nprint(calc.divide(d1, d2))\n```\n\nThen we will\
    \ get an error stack trace:\n\n```\nTraceback (most recent call last):\n  File\
    \ \"Calculator.py\", line 46, in <module>\n    print(calc.divide(d1, d2))\n  File\
    \ \"Calculator.py\", line 15, in divide\n    return x / y\nTypeError: unsupported\
    \ operand type(s) for /: 'Distance' and 'Distance'\n```\n\nYou may well have already\
    \ encountered these while exploring Python. Basically, it is telling you that\
    \ the operator '/' is not supported when used with the `Distance` type.\n\n# 28.4\
    \ Polymorphism\n\nPolymorphism is the ability to send the same message (request\
    \ to run a method) to different objects, each of which appear to perform the same\
    \ function. However, the way in which the message is handled depends on the object's\
    \ class.\n\nPolymorphism is a strange sounding word, derived from Greek, for a\
    \ relatively simple concept. It is essentially the ability to request that the\
    \ same operation be performed by a wide range of different types of things. How\
    \ the request is processed which depends on the thing that receives the request.\
    \ The programmer need not worry about how the request is handled, only that it\
    \ is. This is illustrated below.\n\n```\ndef night_out(p):\n    p.eat()\n    p.drink()\n\
    \    p.sleep()\n```\n\nIn this example, the parameter passed into the `night_out()`\
    \ function expects to be given something that will respond to the methods `eat()`,\
    \ `drink()` and `sleep()`. Any object that meets this requirement can be used\
    \ with the function.\n\nWe can define multiple classes that meet this informal\
    \ contract, for example we can define a class hierarchy that provides these methods,\
    \ or completely separate classes that implement the methods. In the case of the\
    \ class hierarchy the methods may or may not override those from the parent class."
  - "[PAGE 342]\n\nEffectively, this means that you can ask many different things\
    \ to perform the same action. For example, you might ask a range of objects to\
    \ provide a printable string describing themselves. In fact in Python this is\
    \ exactly what happens. For example, if you ask an instance of a `Manager` class,\
    \ a compiler object or a database object to return such a string, you use the\
    \ same method name call (`__str__()`), in Python).\n\nThe name polymorphism is\
    \ unfortunate and often leads to confusion. It makes the whole process sound rather\
    \ grander than it actually is.\n\nNote this is one of the most significant and\
    \ flexible features of Python; it does not tie a variable to a specific type;\
    \ instead via Duck Typing as long as the object provided meets the implied contract,\
    \ then we are good.\n\nThe following classes all meet the contract implied by\
    \ the `night_out()` function:\n\n```\nclass Person:\n    def eat(self): print('Person\
    \ - Eat')\n    def drink(self): print('Person - Drink')\n    def sleep(self):\
    \ print('Person - Sleep')\n\nclass Employee(Person):\n    def eat(self): print('Employee\
    \ - Eat')\n    def drink(self): print('Employee - Drink')\n    def sleep(self):\
    \ print('Employee - Sleep')\n\nclass SalesPerson(Employee):\n    def eat(self):\
    \ print('SalesPerson - Eat')\n    def drink(self): print('SalesPerson - Drink')\n\
    \nclass Dog:\n    def eat(self): print('Dog - Eat')\n    def drink(self): print('Dog\
    \ - Drink')\n    def sleep(self): print('Dog - Sleep')\n```\n\nThis means that\
    \ instances of all of these classes can be used with the `night_out()` function.\n\
    \nNote that the `SalesPerson` class meets the implied contract partly via inheritance\
    \ (the `sleep()` method is inherited from `Employee`).\n\n# 28.5 Protocols\n\n\
    As mentioned above, Python does not have any formal mechanism for stating what\
    \ is required between the supplier of some functionality and the user or consumer\
    \ of that functionality. Instead a far less formal approach termed *Duck Typing*\
    \ is adopted instead.\n\nThis, however, raises the question; how do you know what\
    \ is required? How do you know that you must provide the numeric operators for\
    \ an object to be used with the `Calculator` class?"
  - "[PAGE 343]\n\nThe answer is that a concept known as a *protocol* is used.\nA\
    \ protocol is an informal description of the programmer interface provided by\
    \ something in Python (for example a class but it could also be a module or a\
    \ set of stand-alone functions).\nIt is defined solely via documentation (and\
    \ thus the `Calculator` class should have a class documentation string defining\
    \ its protocol).\nBased on the information provided by the protocol if a function\
    \ or method requires an object to provide a specific operation (or method) then\
    \ if it all works great; if not an error will be thrown, and the type is not compatible.\n\
    It is one of the key elements in Python which allows the Object-Oriented concept\
    \ of *Polymorphism* to operate.\n\n# 28.6 The Length Protocol\n\nThere are many\
    \ types that can be used with the `len()` function to determine their length,\
    \ for example strings, tuples, lists, dictionaries can all be used with the `len()`\
    \ function. How is it that this works? This is where a protocol comes in; there\
    \ is the length (or `__len__`) protocol. This protocol is used by the `len()`\
    \ function. It assumes that whatever has been given to it will support the `__len__()`\
    \ protocol, in other words, that whatever it is given has a method on it called\
    \ `__len__()` . This means we can write\n\n```\nname = 'John' # string\ndata =\
    \ [1, 2, 3, 4] # list\ninfo = ('a', 'b', 'c') # tuple\ncities = cities = {'Wales':\
    \ 'Cardiff', 'England': 'London'} # Dictionary\n\nprint(f'len(name): {len(name)}')\n\
    print(f'len(data): {len(data)}')\nprint(f'len(info): {len(info)}')\nprint(f'len(cities):\
    \ {len(cities)}')\n```\n\nThe output from this code block is\n\n```\nlen(name):\
    \ 4\nlen(data): 4\nlen(info): 3\nlen(cities): 2\n```\n\nHowever, if we create\
    \ a simple class `Bag` and try and find out its length:\n\n```\nclass Bag:\n \
    \   def __init__(self, owner, items):\n        self.owner = owner\n        self.items\
    \ = items\n\nbag1 = Bag('John', [])\n```"
- md: "## 28.7 The Sequence Protocol\n\nThere are numerous commonly occurring protocols\
    \ that can be found in Python. For example, there is a protocol for defining sequences,\
    \ such as a container that can be accessed an item at a time.\n\nThis protocol\
    \ requires that any type that will be held in the container must provide the `__len__()`\
    \ and `__getitem__()` methods.\n\nThus any class that implements these two methods\
    \ meets the requirements of the protocol.\n\nHowever, because protocols are informal\
    \ and unenforced in Python it is not actually necessary to implement all the methods\
    \ in a protocol. For example, if it is known that a class will only be used with\
    \ iteration then it may only be necessary to implement the `__getitem__()` method.\n\
    \n## 28.8 The Context Manager Protocol\n\nAnother concrete example of a protocol\
    \ is that of the *Context Manager Protocol*. This protocol was introduced in Python\
    \ 2.5 so is very well established by now.\n\nIt is associated with the `with as`\
    \ statement. This statement is typically used with classes which will need to\
    \ allocate and release so called *resources*.\n\nThese resources could be files,\
    \ or database connections, etc. In each of these cases a connection needs to be\
    \ made (for example to a file or a database) before the associated object can\
    \ be used.\n\nHowever, the connection should then be closed and released before\
    \ we finish using the object. This is because dangling connection to things such\
    \ as files and databases can hang around and cause problems later on (typically\
    \ only a limited number of concurrent connections are allowed to a file or a database\
    \ at one time and if they are not closed properly a program can run out of available\
    \ connections).\n\nThe `with as` statement ensures that any setup steps are performed\
    \ before an object is available for use and that any shut down behaviour is invoked\
    \ when it is finished with.\n\nThe syntax for the use of the `with as` statement\
    \ is\n\n```\nwith <managed object> as <localname>:\n    Code to use managed object\
    \ via <localname>\n```\n\nFor example:\n\n```\nwith ContextManagedClass() as cmc:\n\
    \    print('In with block', cmc)\n    print('Existing')\n```\n\nNote that in this\
    \ case the object referenced by `cmc` is only in scope within the lines indented\
    \ after the `with as` statement; after this the `cmc` variable is no longer accessible.\n\
    \nHow does this work? In fact what the `with as` statement does is to call a special\
    \ method when the `with as` statement is entered (just after the ':' above); this\
    \ method is the `__enter__()` method. It then also calls another special method\
    \ just as the `with as` statement is exited (just after the last indented statement).\
    \ This second method is the `__exit__()` method.\n\n- The `__enter__()` method\
    \ is expected to do any setup/resource allocation/making connections, etc. It\
    \ is expected to return an object that will be used within the block of statements\
    \ that form that `with as` statement. It is common to return `self` although it\
    \ is not a requirement to do so (this flexibility allows the `<managed object>`\
    \ to act as a factory for other objects if required).\n- The `__exit__()` method\
    \ is called on the `<managed object>` and is passed information about any exceptions\
    \ that might have been generated during the body of the `with as` statement. Note\
    \ that the `__exit__()` method is called whether an exception has been thrown\
    \ or not. The `__exit__()` method returns a bool, if it returns `True` then the\
    \ exception is swallowed (that is it is suppressed and not passed onto the calling\
    \ code). If it returns `False` then the exception is also passed back to whatever\
    \ code called the `with as` statement.\n\nA class that can be used with the `with\
    \ as` statement (that meets the *Context Manager Protocol* requirements) is given\
    \ below:\n\n```\nclass ContextManagedClass(object):\n    def __init__(self):\n\
    \        print('__init__')\n\n    def __enter__(self):\n        print('__enter__')\n\
    \        return self\n\n    # Args exception type, exception value and traceback\n\
    \    def __exit__(self, *args):\n        print('__exit__:', args)\n        return\
    \ True\n\n    def __str__(self):\n        return 'ContextManagedClass object'\n\
    ```\n\nThe above class implements the Context Manager Protocol in that it defines\
    \ both the `__enter__()` method and the `__exit__()` method.\n\nWe can now use\
    \ this class with the with as statement:\n\n```\nprint('Starting')\n\nwith ContextManagedClass()\
    \ as cmc:\n    print('In with block', cmc)\n    print('Exiting')\n\nprint('Done')\n\
    ```\n\nThe output from this is\n\n```\nStarting\n__init__\n__enter__\nIn with\
    \ block ContextManagedClass object\nExiting\n__exit__: (None, None, None)\nDone\n\
    ```\n\nFrom this you can see that the `__enter__()` method is called before the\
    \ code in the block and `__exit__()` is called after the code in the block.\n\n\
    ## 28.9 The Descriptor Protocol\n\nAnother protocol that you may come across is\
    \ the *descriptor* protocol that was introduced back in Python 2.2.\n\nDescriptors\
    \ can be used to create what are known as *managed attributes*. A managed attribute\
    \ is an object attribute that is managed (or protected) from direct access by\
    \ external code via the *descriptor*. The *descriptor* can then take whatever\
    \ action is appropriate such as validating the data, checking the format, logging\
    \ the action, updating a related attribute, etc.\n\nThe descriptor protocol defines\
    \ four methods (as usual they are considered special methods and thus start with\
    \ a double underbar '__'):\n\n- `__get__(self, instance, owner)` This method is\
    \ called when the value of an attribute is accessed. The `instance` is the instance\
    \ being modified, and the `owner` is the class defining the object. This method\
    \ should return the (computed) attribute value or raise an `AttributeError` exception.\n\
    - `__set__(self, instance, value)` This is called when the value of an attribute\
    \ is being set. The parameter `value` is the new value being set.\n- `__delete__(self,\
    \ instance)` Called to delete the attribute.\n- `__set_name__(self, owner, name)`\
    \ Called at the time the owning class `owner` is created. The descriptor has been\
    \ assigned to `name`. This method was added to the protocol in Python 3.6.\n\n\
    The following class `Logger` implements the *Descriptor* protocol. It can therefore\
    \ be used with other classes to log the creation, access and update of whatever\
    \ attribute it is defined for.\n\n```\nclass Logger(object):\n    \"\"\"Logger\
    \ class implementing the descriptor protocol\"\"\"\n    def __init__(self, name):\n\
    \        self.name = name\n\n    def __get__(self, inst, owner):\n        print('__get__:',\
    \ inst, 'owner', owner,\n              ', value', self.name, '=',\n          \
    \    str(inst.__dict__[self.name]))\n        return inst.__dict__[self.name]\n\
    \n    def __set__(self, inst, value):\n        print('__set__:', inst, '-', self.name,\
    \ '=',\n              value)\n        inst.__dict__[self.name] = value\n\n   \
    \ def __delete__(self, instance):\n        print('__delete__', instance)\n\n \
    \   def __set_name__(self, owner, name):\n        print('__set_name__', 'owner',\
    \ owner, 'setting',\n              name)\n```\n\nEach of the methods defined for\
    \ the protocol prints out a message so that access can be monitored.\n\nThe `Logger`\
    \ class is used with the following `Cursor` class.\n\n```\nclass Cursor(object):\n\
    \    # Set up the descriptors at the class level\n    x = Logger('x')\n    y =\
    \ Logger('y')\n\n    def __init__(self, x0, y0):\n        # Initialize the attributes\n\
    \        # Note use of __dict__ to avoid using self.x\n        # which would invoke\
    \ the descriptor behaviour\n        self.__dict__['x'] = x0\n        self.__dict__['y']\
    \ = y0\n\n    def move_by(self, dx, dy):\n        print('move_by', dx, ',', dy)\n\
    \        self.x = self.x + dx\n        self.y = self.y + dy\n\n    def __str__(self):\n\
    \        return 'Point[' + str(self.__dict__['x']) + ', ' + str(self.__dict__['y'])\
    \ + ']'\n```\n\nThere are several points to note about this class definition including:\n\
    \nThe *Descriptors* must be defined at the class level not at the object/instance\
    \ level. The *x* and *y* attributes of `Cursor` object are defined as having `Logger`\
    \ descriptors within the class (not within the `__init__()` method). If you try\
    \ to define them using `self.x` and `self.y` the descriptors will not be registered.\n\
    \nThe `Cursor` `__init__()` method uses the `__dict__` dictionary to initialize\
    \ the instance/object attributes *x* and *y*. This is an alternative approach\
    \ to accessing an objects' attributes; it is used internally by an object to hold\
    \ the actual attribute values. It by passes the normal attribute look up mechanism\
    \ invoked when you use the *dot notation* (such as `curser.x = 10`). This means\
    \ that it will not be intercepted by the Descriptor. This has been done because\
    \ the logger uses the `__str__()` method to print out the instance holding the\
    \ attribute which uses the current values of *x* and *y*. When the value of *x*\
    \ is initially set there will be no value for *y* and thus an error would be generated\
    \ by the `__str__()`.\n\nThe `__str__()` method also uses the `__dict__` dictionary\
    \ to access the attributes as it is not necessary to log this access. It would\
    \ also become recursive if the `Logger` also used the method to print out the\
    \ instance.\n\nWe can now use instances of the `Cursor` object without knowing\
    \ that the descriptor will intercept access to the attributes *x* and *y*:"
  mdcn: "## 28.7 序列协议\n\n在 Python 中可以找到许多常见的协议。例如，有一个用于定义序列的协议，比如一个可以逐项访问的容器。\n\n\
    该协议要求，任何将被存储在容器中的类型都必须提供 `__len__()` 和 `__getitem__()` 方法。\n\n因此，任何实现了这两个方法的类都满足该协议的要求。\n\
    \n然而，由于协议在 Python 中是非正式且不强制执行的，实际上并不需要实现协议中的所有方法。例如，如果已知一个类只会用于迭代，那么可能只需要实现 `__getitem__()`\
    \ 方法。\n\n## 28.8 上下文管理器协议\n\n协议的另一个具体例子是*上下文管理器协议*。该协议在 Python 2.5 中引入，因此现在已经非常成熟。\n\
    \n它与 `with as` 语句相关联。该语句通常与需要分配和释放所谓*资源*的类一起使用。\n\n这些资源可以是文件、数据库连接等。在每种情况下，在使用关联对象之前都需要建立连接（例如连接到文件或数据库）。\n\
    \n然而，在我们使用完对象之前，应该关闭并释放连接。这是因为对文件和数据库等事物的悬挂连接可能会一直存在，并在以后引起问题（通常，文件或数据库一次只允许有限数量的并发连接，如果它们没有被正确关闭，程序可能会耗尽可用的连接）。\n\
    \n`with as` 语句确保在对象可用之前执行任何设置步骤，并在对象使用完毕后调用任何关闭行为。\n\n使用 `with as` 语句的语法是\n\n\
    ```\nwith <managed object> as <localname>:\n    Code to use managed object via\
    \ <localname>\n```\n\n例如：\n\n```\nwith ContextManagedClass() as cmc:\n    print('In\
    \ with block', cmc)\n    print('Existing')\n```\n\n请注意，在这种情况下，`cmc` 引用的对象仅在 `with\
    \ as` 语句之后缩进的行内有效；在此之后，`cmc` 变量将不再可访问。\n\n这是如何工作的？事实上，`with as` 语句所做的就是在进入 `with\
    \ as` 语句时（就在上面的 ':' 之后）调用一个特殊方法；这个方法是 `__enter__()` 方法。然后在退出 `with as` 语句时（就在最后一个缩进语句之后）调用另一个特殊方法。这第二个方法是\
    \ `__exit__()` 方法。\n\n- `__enter__()` 方法被期望执行任何设置/资源分配/建立连接等操作。它被期望返回一个将在构成该 `with\
    \ as` 语句的语句块中使用的对象。通常返回 `self`，尽管这不是必须的（这种灵活性允许 `<managed object>` 在需要时充当其他对象的工厂）。\n\
    - `__exit__()` 方法在 `<managed object>` 上被调用，并传递有关在 `with as` 语句主体期间可能产生的任何异常的信息。请注意，无论是否抛出异常，`__exit__()`\
    \ 方法都会被调用。`__exit__()` 方法返回一个布尔值，如果它返回 `True`，则异常被吞没（即被抑制，不会传递给调用代码）。如果它返回 `False`，则异常也会被传递回调用\
    \ `with as` 语句的任何代码。\n\n一个可以与 `with as` 语句一起使用的类（满足*上下文管理器协议*要求）如下所示：\n\n```\n\
    class ContextManagedClass(object):\n    def __init__(self):\n        print('__init__')\n\
    \n    def __enter__(self):\n        print('__enter__')\n        return self\n\n\
    \    # Args exception type, exception value and traceback\n    def __exit__(self,\
    \ *args):\n        print('__exit__:', args)\n        return True\n\n    def __str__(self):\n\
    \        return 'ContextManagedClass object'\n```\n\n上面的类实现了上下文管理器协议，因为它定义了 `__enter__()`\
    \ 方法和 `__exit__()` 方法。\n\n我们现在可以将这个类与 with as 语句一起使用：\n\n```\nprint('Starting')\n\
    \nwith ContextManagedClass() as cmc:\n    print('In with block', cmc)\n    print('Exiting')\n\
    \nprint('Done')\n```\n\n输出结果是\n\n```\nStarting\n__init__\n__enter__\nIn with block\
    \ ContextManagedClass object\nExiting\n__exit__: (None, None, None)\nDone\n```\n\
    \n由此你可以看到，`__enter__()` 方法在块中的代码之前被调用，而 `__exit__()` 在块中的代码之后被调用。\n\n## 28.9 描述符协议\n\
    \n你可能遇到的另一个协议是早在 Python 2.2 中引入的*描述符*协议。\n\n描述符可用于创建所谓的*托管属性*。托管属性是一个对象属性，它通过*描述符*被管理（或保护）免受外部代码的直接访问。然后*描述符*可以采取任何适当的行动，例如验证数据、检查格式、记录操作、更新相关属性等。\n\
    \n描述符协议定义了四个方法（通常它们被认为是特殊方法，因此以双下划线 '__' 开头）：\n\n- `__get__(self, instance, owner)`\
    \ 当访问属性的值时调用此方法。`instance` 是正在被修改的实例，`owner` 是定义对象的类。此方法应返回（计算后的）属性值或引发 `AttributeError`\
    \ 异常。\n- `__set__(self, instance, value)` 当设置属性的值时调用此方法。参数 `value` 是正在设置的新值。\n\
    - `__delete__(self, instance)` 调用以删除属性。\n- `__set_name__(self, owner, name)` 在拥有类\
    \ `owner` 创建时调用。描述符已被分配给 `name`。此方法在 Python 3.6 中添加到协议中。\n\n以下类 `Logger` 实现了*描述符*协议。因此，它可以与其他类一起使用，以记录为其定义的任何属性的创建、访问和更新。\n\
    \n```\nclass Logger(object):\n    \"\"\"Logger class implementing the descriptor\
    \ protocol\"\"\"\n    def __init__(self, name):\n        self.name = name\n\n\
    \    def __get__(self, inst, owner):\n        print('__get__:', inst, 'owner',\
    \ owner,\n              ', value', self.name, '=',\n              str(inst.__dict__[self.name]))\n\
    \        return inst.__dict__[self.name]\n\n    def __set__(self, inst, value):\n\
    \        print('__set__:', inst, '-', self.name, '=',\n              value)\n\
    \        inst.__dict__[self.name] = value\n\n    def __delete__(self, instance):\n\
    \        print('__delete__', instance)\n\n    def __set_name__(self, owner, name):\n\
    \        print('__set_name__', 'owner', owner, 'setting',\n              name)\n\
    ```\n\n为协议定义的每个方法都打印一条消息，以便可以监控访问。\n\n`Logger` 类与以下 `Cursor` 类一起使用。\n\n```\nclass\
    \ Cursor(object):\n    # Set up the descriptors at the class level\n    x = Logger('x')\n\
    \    y = Logger('y')\n\n    def __init__(self, x0, y0):\n        # Initialize\
    \ the attributes\n        # Note use of __dict__ to avoid using self.x\n     \
    \   # which would invoke the descriptor behaviour\n        self.__dict__['x']\
    \ = x0\n        self.__dict__['y'] = y0\n\n    def move_by(self, dx, dy):\n  \
    \      print('move_by', dx, ',', dy)\n        self.x = self.x + dx\n        self.y\
    \ = self.y + dy\n\n    def __str__(self):\n        return 'Point[' + str(self.__dict__['x'])\
    \ + ', ' + str(self.__dict__['y']) + ']'\n```\n\n关于这个类定义有几点需要注意，包括：\n\n*描述符*必须在类级别定义，而不是在对象/实例级别定义。`Cursor`\
    \ 对象的 *x* 和 *y* 属性在类内（而不是在 `__init__()` 方法内）被定义为具有 `Logger` 描述符。如果你尝试使用 `self.x`\
    \ 和 `self.y` 来定义它们，描述符将不会被注册。\n\n`Cursor` 的 `__init__()` 方法使用 `__dict__` 字典来初始化实例/对象属性\
    \ *x* 和 *y*。这是访问对象属性的另一种方法；它在对象内部用于保存实际的属性值。它绕过了当你使用*点表示法*（例如 `curser.x = 10`）时调用的正常属性查找机制。这意味着它不会被描述符拦截。这样做是因为日志记录器使用\
    \ `__str__()` 方法来打印持有属性的实例，该方法使用 *x* 和 *y* 的当前值。当 *x* 的值最初被设置时，*y* 将没有值，因此 `__str__()`\
    \ 会产生错误。\n\n`__str__()` 方法也使用 `__dict__` 字典来访问属性，因为没有必要记录此访问。如果 `Logger` 也使用该方法来打印实例，它也会变成递归的。\n\
    \n我们现在可以使用 `Cursor` 对象的实例，而无需知道描述符将拦截对属性 *x* 和 *y* 的访问："
