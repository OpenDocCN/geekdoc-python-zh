  - "[PAGE 283]\n\n# Chapter 24\nPython Properties\n\n# 24.1 Introduction\n\nMany\
    \ object-oriented languages have the explicit concept of encapsulation; that is\
    \ the ability to hide data within an object and only to provide specific gateways\
    \ into that data. These gateways are methods defined to *get* or *set* the value\
    \ of an attribute (often referred to as getters and setters). This allows more\
    \ control over access to the data; for example, it is possible to check that only\
    \ a positive integer above zero, but below 120, is used for a person’s age, etc.\n\
    In many languages such as Java and C# attributes can be hidden from external access\
    \ using specific keywords (such as private) that indicate the data should be made\
    \ private to the object.\nPython does not explicitly have the concept of encapsulation;\
    \ instead it relies on two things; a standard convention used to indicate that\
    \ an attribute should be considered private and a concept called a property which\
    \ allows setters and getters to be defined for an attribute.\n\n# 24.2 Python\
    \ Attributes\n\nAll object attributes are publicly available in Python; that is,\
    \ they are all visible to any code using the object.\nFor example, given the following\
    \ definition of the class `Person` both `name` and `age` are part of the public\
    \ interface of the class `Person`;\n\n```\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n```"
