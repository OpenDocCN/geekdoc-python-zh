    - and some form of graphing tool such as Matplotlib.


    Similarly if a developer is using Python to create a set of RESTful services (that
    is a remote service accessed over https and supplying some form of data on request),
    they are likely to be using Python plus a library such as fastAPI (https://fastapi.tiangolo.com/),
    Flask (https://palletsprojects.com/p/flask/) or Django (https://www.djangoproject.com/).


    As such these third-party modules are key to some of the most successful application
    areas within which Python is used.


    It is perhaps worth noting that anyone can create a third-party module and make
    it available to others to use, however not all modules are created equal. Almost
    all libraries are made available as open source, free of charge, software. As
    such it can be difficult to determine which libraries are appropriate to use and
    which are not.


    In general the longer the module has been around, the larger the number of people
    using it, the more plentiful the documentation (both from the module provider
    but also in general on the web) and the greater the number of contributors and
    maintainers the better the module is likely to be.'
  - '[PAGE 475]


    For example, a module called something like `johnsAPI-0.0.1alpha`, supported just
    by one person and downloaded only by a handful of people is probably not your
    best bet, whereas `numpy 1.24.3` which has extensive documentation on the numpy.org
    website as well as numerous tutorials and examples around the web, that has an
    extensive release history, is used by numerous other well-respected libraries,
    has 905 contributors (as of April 2023), has been maintained and updated over
    the last 17 years, with numerous regular releases over that time, and is a much
    better bet.


    # 42.3 The Pip Tool


    The Python environment comes with a tool that is designed to help you install
    third-party libraries into your runtime. This tool is called `pip` (which stands
    for ''Pip Installs Python''). It had been a default part of the Python installation
    since Python 3.4 (prior to this it was itself considered a third-party tool).
    This tool is sometimes referred to as Python''s package manager, module installer
    or even the pip installer.


    Pip can install any third-party library. To do this pip downloads modules by default
    from a central repository called pypi.org (which stands for the Python Package
    Index—hence pypi—but pronounced pie pie.org). This is useful as it means that
    any module provided in this central repository is available to all Python developers
    wherever they are in the world.


    In fact pip can install modules from


    +   - pypi.org central repository,

    - version control system URLs (such as GitHub),

    - local project directories,

    - local or remote source archives.


    In addition, pip can install from a "requirements file" which is a useful way
    to specify a whole environment to be installed.


    The pip tool is also aware of dependencies between modules. That is if one module
    itself relies on another module being installed then it can install both modules.
    For example the `Pandas` module depends on (among others) the `NumPy` module,
    and thus when you install Pandas, then NumPy is installed for you (automatically).


    The `pip` command comes with several options that can be used to install and uninstall
    modules, reinstall modules, list currently installed modules, generate a report
    on the modules installed and any dependencies for the modules you require.'
- md: "## 42.3.1 Finding the Pip Version\n\nYou can easily check to see if pip is\
    \ installed in your environment using the `pip --version` command, for example,\
    \ at a Command Prompt or within a terminal window you can type:\n\n```\npip --version\n\
    ```\n\ndepending on your configuration and operating system you should see something\
    \ similar to:\n\n```\n% pip --version\npip 23.0.1 from /usr/local/lib/python3.11/site-packages/pip\
    \ (python 3.11)\n%\n```\n\nThis indicates that in the installation on this Apple\
    \ Mac, that the current version of pip is version 23.0.1.\n\n## 42.3.2 Installing\
    \ Pip\n\nIf you do not have pip installed then you can download it and install\
    \ it yourself from the pip download page on the pypi.org site (see https://pypi.org/project/pip/).\n\
    \nInterestingly, the pip tool is treated as if it was a separate module by the\
    \ Python environment, this means that you can also update the pip tool without\
    \ updating the whole Python runtime. This may be useful if a bug fix is released\
    \ for pip but it is not included in the current release of Python yet.\n\n## 42.3.3\
    \ Updating Pip\n\nTo update pip you can use pip itself! That is pip can be used\
    \ to install an update to pip (this may sound confusing but is actually perfectly\
    \ fine as the pip tool will update the installation of pip and the next time you\
    \ run pip the new version will automatically be picked up).\n\nTo update pip itself\
    \ use:\n\n```\npip install --upgrade pip\n```\n\nNote that this is the pip command\
    \ being passed the request to install something, in this case the upgrade for\
    \ pip. On Windows you might want to use a variation on this command as shown below:\n\
    \n```\npython -m pip install --upgrade pip\n```\n\nThis does exactly the same\
    \ as the first version but tells Python to run the module (`-m`) pip for you.\
    \ Indeed many people use this style on all operating systems as it is the recommended\
    \ approach to running pip. However, in most cases just using the `pip` command\
    \ on its own is sufficient on Linux and Macs.\n\nAn example of updating pip is\
    \ shown below on an Apple Mac:\n\n```\n% pip install --upgrade pip\nRequirement\
    \ already satisfied: pip in /usr/local/lib/python3.11/site-packages (23.0.1)\n\
    Collecting pip\n  Downloading pip-23.1.2-py3-none-any.whl (2.1 MB)\n     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\
    \ 2.1/2.1 MB 8.3 MB/s eta 0:00:00\nInstalling collected packages: pip\n  Attempting\
    \ uninstall: pip\n    Found existing installation: pip 23.0.1\n    Uninstalling\
    \ pip-23.0.1:\n      Successfully uninstalled pip-23.0.1\nSuccessfully installed\
    \ pip-23.1.2\n%\n```\n\nFrom this you might see that the result of running this\
    \ command in this environment is to update pip from 23.0.1 to 23.1.2. You can\
    \ see the command downloading the 23.1.2 version and then uninstalling the old\
    \ pip and installing the new version of pip. If we now check the version of pip\
    \ installed we now see that it is version 23.1.2:\n\n```\n% pip --version\npip\
    \ 23.1.2 from /usr/local/lib/python3.11/site-packages/pip (python 3.11)\n%\n```\n\
    \n## 42.4 Default Installation\n\nThere is a warning that should be noted with\
    \ pip; that is that by default it installs a module into the central Python installation\
    \ on a machine. This is fine if you are only ever going to run one program requiring\
    \ a specific set of modules. However, if you are going to work with different\
    \ Python programs, which might require different modules, and in particular different\
    \ version of a module, then this can be a problem.\n\nTo illustrate the issue\
    \ it is important to understand that every module has a version number, such as\
    \ NumPy 1.24.1; that is this is version 1.24.1 of NumPy, and it will differ in\
    \ some way (however small) from version 1.24.0. The version number for Python\
    \ packages typically uses something called semantic versioning. In semantic versioning\
    \ a version number consists of three integers such that it is made up of major.minor.patch,\
    \ that is:\n\n-   **Major** the main release number, 1.0.0, is usually the first\
    \ release; all subsequent releases that are part of the release 1 will start 1.x.x.\
    \ Typically release will be 2.x.x, and this indicates a major change in the module,\
    \ etc. Note that there is no guarantee of backwards compatibility between one\
    \ major release and the next. Backwards compatibility is the idea that code that\
    \ previously worked should still work from one release to the next—this guarantee\
    \ does not exist between one major version and the next.\n-   **Minor** such as\
    \ 1.1.0 to 1.2.0 where the minor release typically includes larger new features\
    \ or bug fixes but ensures backwards compatibility with other older major release\
    \ versions (that is version 1.2.0 should be backwards compatible with version\
    \ 1.1.0).\n-   **Patch** release this is typically used for bug fixes or other\
    \ technical issues which should have no effect on the backwards compatibility\
    \ of the code and do not change or extend the functionality of the library.\n\n\
    In some cases packages use a year-based number system such as 2020.1 which is\
    \ the first release of 2020, although this is actually far less common in Python.\n\
    \nNow let us consider that on your computer you have two Python programs: one\
    \ uses Pandas 1.5.0, and the other uses Pandas 2.0.0. Given what has been described\
    \ above there is no guarantee that the code which was written to use Pandas 1.5.0\
    \ will work with Pandas 2.0.0. Therefore we want to run one program using one\
    \ Pandas library and the other using the newer Pandas library. We could of course\
    \ update the old code to work with the new version of Pandas but that could be\
    \ time-consuming and non-trivial; and we may just want to run the code.\n\nHowever,\
    \ as `pip` installs these libraries centrally for all Python programs by default,\
    \ we cannot have the two libraries installed at the same time!\n\nOf course, this\
    \ is not a new problem, and the solution comes in the form of *pip virtual environments*.\n\
    \n## 42.5 Pip Virtual Environments\n\nA virtual environment is a configuration\
    \ of Python modules that can be set up on a *per project* basis. That is each\
    \ individual Python project (or program) can have its own virtual environment\
    \ and that virtual environment can be activated as and when required. The virtual\
    \ environment is then used to configure all the modules used, isolating one virtual\
    \ environment's configuration from another.\n\nAlthough it should be noted that\
    \ there is no reason why several Python programs cannot share the same virtual\
    \ environment, it is very common practice to have a virtual environment per program.\n\
    \nTo use a virtual environment it is necessary to first create this virtual environment.\
    \ This is done using the `python` command itself (rather than the `pip` command).\
    \ For example:\n\n```\npython -m venv <name of virtual environment>\n```\n\nIn\
    \ the above the `python` command is being passed the `-m` option followed by `venv`.\
    \ This indicates that you want Python to run the `venv` module. The name `venv`\
    \ stands for *virtual environment*. This is followed by the name of the virtual\
    \ environment you wish to create. A common pattern is to call this `venv`—this\
    \ is then created in the current directory. This is fine, but it can be useful\
    \ to give the virtual environment a more meaningful name such as `genesis_venv`—indicating\
    \ that this is the virtual environment for the genesis project (whatever that\
    \ might be).\n\nWhatever name you choose to use, the tool will create a directory\
    \ within the current directory called that name.\n\nLet us first check to see\
    \ what has been installed into the central Python runtime on a sample Mac computer:\n\
    \n```\n% pip list\nPackage        Version\n-------------- -------\npip       \
    \     23.1.2\nsetuptools     67.6.1\nwheel          0.40.0\n```\n\nThis illustrates\
    \ the typical basic Python installation. All that is contained within the Python\
    \ system is the default built-in modules plus the `pip` module, the `setuptools`\
    \ module and the `wheel` module. The `setuptools` module helps with package handling,\
    \ and the `wheels` module supports wheel file which are essentially zip files\
    \ with a special file name convention that tells installs what Python versions\
    \ and platforms they support.\n\nFor example, let us create a virtual environment\
    \ called `genesis_venv` under a projects directory:\n\n```\n% mkdir projects\n\
    % cd projects\nprojects % ls\n\nprojects % python -m venv genesis_venv\n```\n\n\
    In the above terminal/command window session we have created the `projects` directory\
    \ and then moved into that directory. Currently when we list the contents of the\
    \ directory, it is empty. We then issue the command:\n\n```\n% python -m venv\
    \ genesis_venv\n```\n\nIf we now look at the contents of the directory we will\
    \ see a subdirectory has been created called `genesis_venv`:\n\n```\nprojects\
    \ % ls\ngenesis_venv\n```\n\nAt the moment this is not that interesting, but we\
    \ can now *activate* that environment. This is done using the rather awkward incantation\
    \ which accesses the `activate` script within the virtual environment directory's\
    \ `bin` directory. On a Mac or Linux this would be done using the `source` command\
    \ followed by the `<venv_name>/bin/activate` path, for example:\n\n```\n% source\
    \ genesis_venv/bin/activate\n```"
  mdcn: "## 42.3.1 查找 Pip 版本\n\n你可以使用 `pip --version` 命令轻松检查你的环境中是否安装了 pip。例如，在命令提示符或终端窗口中，你可以输入：\n\
    \n```\npip --version\n```\n\n根据你的配置和操作系统，你应该会看到类似以下的内容：\n\n```\n% pip --version\n\
    pip 23.0.1 from /usr/local/lib/python3.11/site-packages/pip (python 3.11)\n%\n\
    ```\n\n这表明在这台 Apple Mac 的安装中，当前的 pip 版本是 23.0.1。\n\n## 42.3.2 安装 Pip\n\n如果你没有安装\
    \ pip，你可以从 pypi.org 网站的 pip 下载页面（参见 https://pypi.org/project/pip/）自行下载并安装。\n\n\
    有趣的是，pip 工具被 Python 环境视为一个独立的模块，这意味着你可以在不更新整个 Python 运行时的情况下更新 pip 工具。如果 pip 发布了错误修复但尚未包含在当前的\
    \ Python 版本中，这可能会很有用。\n\n## 42.3.3 更新 Pip\n\n要更新 pip，你可以使用 pip 本身！也就是说，pip 可以用来安装\
    \ pip 的更新（这听起来可能令人困惑，但实际上完全没问题，因为 pip 工具会更新 pip 的安装，下次你运行 pip 时，新版本将自动生效）。\n\n\
    要更新 pip 本身，请使用：\n\n```\npip install --upgrade pip\n```\n\n请注意，这是将安装请求传递给 pip 命令，在本例中是\
    \ pip 的升级。在 Windows 上，你可能需要使用此命令的变体，如下所示：\n\n```\npython -m pip install --upgrade\
    \ pip\n```\n\n这与第一个版本完全相同，但告诉 Python 为你运行模块（`-m`）pip。实际上，许多人在所有操作系统上都使用这种风格，因为这是运行\
    \ pip 的推荐方法。然而，在大多数情况下，在 Linux 和 Mac 上仅使用 `pip` 命令就足够了。\n\n下面是在 Apple Mac 上更新\
    \ pip 的示例：\n\n```\n% pip install --upgrade pip\nRequirement already satisfied:\
    \ pip in /usr/local/lib/python3.11/site-packages (23.0.1)\nCollecting pip\n  Downloading\
    \ pip-23.1.2-py3-none-any.whl (2.1 MB)\n     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\
    \ 2.1/2.1 MB 8.3 MB/s eta 0:00:00\nInstalling collected packages: pip\n  Attempting\
    \ uninstall: pip\n    Found existing installation: pip 23.0.1\n    Uninstalling\
    \ pip-23.0.1:\n      Successfully uninstalled pip-23.0.1\nSuccessfully installed\
    \ pip-23.1.2\n%\n```\n\n从这里你可能会看到，在此环境中运行此命令的结果是将 pip 从 23.0.1 更新到 23.1.2。你可以看到命令下载了\
    \ 23.1.2 版本，然后卸载了旧的 pip 并安装了新版本的 pip。如果我们现在检查已安装的 pip 版本，我们会看到它是 23.1.2：\n\n```\n\
    % pip --version\npip 23.1.2 from /usr/local/lib/python3.11/site-packages/pip (python\
    \ 3.11)\n%\n```\n\n## 42.4 默认安装\n\n关于 pip 有一个警告需要注意；那就是默认情况下，它会将模块安装到机器上的中央 Python\
    \ 安装中。如果你只运行一个需要特定模块集的程序，这没问题。但是，如果你要处理不同的 Python 程序，这些程序可能需要不同的模块，特别是不同版本的模块，那么这可能会成为一个问题。\n\
    \n为了说明这个问题，理解每个模块都有一个版本号很重要，例如 NumPy 1.24.1；这是 NumPy 的 1.24.1 版本，它在某些方面（无论多么微小）与\
    \ 1.24.0 版本不同。Python 包的版本号通常使用称为语义版本控制的东西。在语义版本控制中，版本号由三个整数组成，即 major.minor.patch，也就是：\n\
    \n-   **主版本号**：主要发布号，1.0.0，通常是第一个发布版本；所有属于 1.x.x 系列的后续发布都将以此开头。通常发布版本将是 2.x.x，这表示模块等发生了重大更改。请注意，一个主版本和下一个主版本之间不保证向后兼容性。向后兼容性是指以前工作的代码在从一个版本到下一个版本时应该仍然可以工作——这种保证在主版本之间不存在。\n\
    -   **次版本号**：例如从 1.1.0 到 1.2.0，次版本通常包含较大的新功能或错误修复，但确保与较旧的主版本向后兼容（即 1.2.0 版本应与\
    \ 1.1.0 版本向后兼容）。\n-   **修订版本号**：这通常用于错误修复或其他技术问题，这些问题不应影响代码的向后兼容性，也不会改变或扩展库的功能。\n\
    \n在某些情况下，包使用基于年份的编号系统，例如 2020.1，这是 2020 年的第一个发布版本，尽管这在 Python 中实际上要少见得多。\n\n现在让我们考虑一下，你的计算机上有两个\
    \ Python 程序：一个使用 Pandas 1.5.0，另一个使用 Pandas 2.0.0。根据上面的描述，不能保证为使用 Pandas 1.5.0\
    \ 编写的代码能在 Pandas 2.0.0 上运行。因此，我们希望一个程序使用一个 Pandas 库，另一个使用更新的 Pandas 库。当然，我们可以更新旧代码以适应新版本的\
    \ Pandas，但这可能既耗时又复杂；而我们可能只是想运行代码。\n\n然而，由于 `pip` 默认为所有 Python 程序集中安装这些库，我们无法同时安装这两个库！\n\
    \n当然，这不是一个新问题，解决方案就是 *pip 虚拟环境*。\n\n## 42.5 Pip 虚拟环境\n\n虚拟环境是一种可以按 *项目* 基础配置的\
    \ Python 模块配置。也就是说，每个单独的 Python 项目（或程序）都可以有自己的虚拟环境，并且可以根据需要激活该虚拟环境。然后，虚拟环境用于配置所有使用的模块，将一个虚拟环境的配置与另一个隔离。\n\
    \n尽管应该注意，没有理由不能让多个 Python 程序共享同一个虚拟环境，但为每个程序设置一个虚拟环境是非常常见的做法。\n\n要使用虚拟环境，首先需要创建这个虚拟环境。这是使用\
    \ `python` 命令本身（而不是 `pip` 命令）完成的。例如：\n\n```\npython -m venv <虚拟环境名称>\n```\n\n\
    在上面的命令中，`python` 命令被传递了 `-m` 选项，后跟 `venv`。这表示你希望 Python 运行 `venv` 模块。`venv` 这个名字代表\
    \ *虚拟环境*。后面是你希望创建的虚拟环境的名称。一个常见的模式是将其命名为 `venv`——然后在当前目录中创建它。这没问题，但给虚拟环境一个更有意义的名称可能很有用，例如\
    \ `genesis_venv`——表示这是 genesis 项目（无论它是什么）的虚拟环境。\n\n无论你选择使用什么名称，该工具都将在当前目录中创建一个以该名称命名的目录。\n\
    \n让我们首先检查一下在一台示例 Mac 计算机的中央 Python 运行时中安装了什么：\n\n```\n% pip list\nPackage    \
    \    Version\n-------------- -------\npip            23.1.2\nsetuptools     67.6.1\n\
    wheel          0.40.0\n```\n\n这说明了典型的 Python 基本安装。Python 系统中包含的只是默认的内置模块，加上 `pip`\
    \ 模块、`setuptools` 模块和 `wheel` 模块。`setuptools` 模块有助于包处理，`wheel` 模块支持 wheel 文件，这些文件本质上是具有特殊文件名约定的\
    \ zip 文件，用于告诉安装程序它们支持哪些 Python 版本和平台。\n\n例如，让我们在 projects 目录下创建一个名为 `genesis_venv`\
    \ 的虚拟环境：\n\n```\n% mkdir projects\n% cd projects\nprojects % ls\n\nprojects %\
    \ python -m venv genesis_venv\n```\n\n在上面的终端/命令窗口会话中，我们创建了 `projects` 目录，然后进入该目录。目前，当我们列出目录内容时，它是空的。然后我们发出命令：\n\
    \n```\n% python -m venv genesis_venv\n```\n\n如果我们现在查看目录的内容，我们会看到一个名为 `genesis_venv`\
    \ 的子目录已被创建：\n\n```\nprojects % ls\ngenesis_venv\n```\n\n目前这还不太有趣，但我们现在可以 *激活*\
    \ 该环境。这是通过访问虚拟环境目录的 `bin` 目录中的 `activate` 脚本来完成的。在 Mac 或 Linux 上，这可以使用 `source`\
    \ 命令后跟 `<venv_name>/bin/activate` 路径来完成，例如：\n\n```\n% source genesis_venv/bin/activate\n\
    ```"
