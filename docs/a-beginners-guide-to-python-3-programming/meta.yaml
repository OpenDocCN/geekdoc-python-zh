- img_proc: true
  md: "records the context within which the function was originally defined and if\
    \ necessary, a reference to each of the non-local variables used by that function.\
    \ These non-local or free variables allow the function body to reference variables\
    \ that are external to the function, but which are utilized by that function.\
    \ This referencing environment is one of the distinguishing features between a\
    \ functional language and a language that supports function pointers (such as\
    \ C).\n\nThe general concept of a lexical closure was first developed during the\
    \ 1960s but was first fully implemented in the language Scheme in the 1970s. It\
    \ has since been used within many functional programming languages including LISP\
    \ and Scala.\n\nAt the conceptual level, a closure allows a function to reference\
    \ a variable available in the scope where the function was originally defined,\
    \ but not available by default in the scope where it is executed.\n\nFor example,\
    \ in the following simple programme, the variable `more` is defined outside the\
    \ body of the function named `increase`. This is permissible as the variable is\
    \ a *global* variable. Thus, the variable `more` is *within scope* at the point\
    \ of definition.\n\n```\npython\nmore = 100\n\ndef increase(num):\n    return\
    \ num + more\n\nprint(increase(10))\nmore = 50\nprint(increase(10))\n```\n\nWithin\
    \ our program we then invoke the `increase` function by passing in the value 10.\
    \ This is done twice with the variable `more` being reset to 50 between the two.\
    \ The output from this program is shown below:\n\n```\n\n110\n60\n```\n\nNote\
    \ that it is the *current* value of `more` that is being used when the function\
    \ executes and not the value of `more` present at the point that the function\
    \ was defined. Hence the output is 110 and 60 that is 100 + 10 and then 50 + 10.\n\
    \nThis might seem obvious as the variable `more` is still in scope within the\
    \ same function as the invocations of the function referenced by `increase`.\n\
    \nHowever, consider the following example:\n\n```\npython\ndef increment(num):\n\
    \    return num + 1\n\ndef reset_function():\n    global increment\n    addition\
    \ = 50\n    increment = lambda num: num + addition\n\nprint(increment(5))\nreset_function()\n\
    print(increment(5))\n```"
