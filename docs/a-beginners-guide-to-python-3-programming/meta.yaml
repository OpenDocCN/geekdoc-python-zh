  md: "# 8.8 A Note on Loop Variable Naming\n\nEarlier in the book we said that variable\
    \ names should be meaningful and that names such as ‘a’ and ‘b’ were not in general\
    \ a good idea. The one exception to this rule relates to loop variable names used\
    \ with for loops over ranges. It is very common to find that these loop variables\
    \ are called ‘i’, ‘j’, etc.\n\nIt is such a common convention that if a variable\
    \ is called ‘i’ or ‘j’ people expect it to be a loop variable. As such.\n\n+ \
    \  - you should consider using these variable names in looping constructs,\n-\
    \ avoid using them elsewhere.\n\nBut this does raise the question why ‘i’ and\
    \ ‘j’; the answer is that it all goes back to a programming language called Fortran\
    \ which was first developed in the 1950s. In this programming language loop variables\
    \ had to be called ‘i’, ‘j’, etc. Fortran was so ubiquitous for mathematical and\
    \ scientific programming, where loops are almost *di rigour*, that this has become\
    \ the convention in other languages which do not have this restriction.\n\n# 8.9\
    \ Dice Roll Game\n\nThe following short program illustrates how a while loop can\
    \ be used to control the execution of the main body of code. In this game we will\
    \ continue to roll a pair of dice until the user indicates that they do not want\
    \ to roll again. When this occurs the while loop will terminate:\n\n```\nimport\
    \ random\n\nMIN = 1\nMAX = 6\n\nroll_again = 'y'\n\nwhile roll_again == 'y':\n\
    \    print('Rolling the dices...')\n    print('The values are....')\n    dice1\
    \ = random.randint(MIN, MAX)\n    print(dice1)\n    dice2 = random.randint(MIN,\
    \ MAX)\n    print(dice2)\n    roll_again = input('Roll the dices again? (y / n):\
    \ ')\n```\n\nWhen we run this program the results of rolling two dice are shown.\
    \ The program will keep looping and printing out the two dice values until the\
    \ user indicates that they no longer want to roll the dice:\n\n```\nRolling the\
    \ dices...\nThe values are....\n```"
