    \nIntroduced in Python 3.4 the `enum` module provides support for enumerated values\
    \ or enums. This facility is a very useful one for creating sets of ordered values.\
    \ In this chapter we discuss what an enumeration is, the two ways of creating\
    \ an enumeration in Python, how enumerations are used and conclude by introducing\
    \ IntEnums for integer-based enumeration.\n\n## 40.2 What is an Enumeration?\n\
    \nAn enumeration is a collection of entities that represent a complete, ordered\
    \ set of all of the values in a set. For example, the days of the week could be\
    \ represented by an enumeration as there is a finite set of days in the (working)\
    \ week, and there is an ordering to the days of the week.\nFor example, Monday\
    \ comes before Tuesday, and Wednesday comes after Tuesday, etc. In most languages\
    \ it is then possible to create a variable that can hold a value from an enumeration\
    \ and perform certain tests on it such as checking for *equality* or *inequality*\
    \ as well as ordering style tests.\nMore formally, an enumeration is:\n*A set\
    \ of symbolic names (members) bound to a given type (class) where each value has\
    \ a unique value, where the values are ordered.*\nThe values in an enumeration\
    \ can be iterated over to return its members in definition order.\nIn Python enumerations\
    \ can be created in two different ways, either using the class syntax or using\
    \ the function call syntax. We will look at both approaches in this chapter.\n\
    \n## 40.3 Creating an Enumeration Using Class Syntax\n\nA new enumerated type\
    \ (class) can be created by subclassing the `enum.Enum` class. That is, the `enum`\
    \ module provides a class specifically to be used with inheritance, allowing the\
    \ programmer to create a concrete enumeration type.\n\nFor example, the following\
    \ code creates a new enumerated type `DaysOfWeek` by subclassing the `Enum` type:\n\
    \n```python\nclass DaysOfWeek(Enum):\n    MONDAY = 1\n    TUESDAY = 2\n    WEDNESDAY\
    \ = 3\n    THURSDAY = 4\n    FRIDAY = 5\n```\n\nThis creates a new type (or class)\
    \ of things called `DaysOfWeek`. Within this type there are five values defined\
    \ representing each of the days of the week. These elements have an ordering (as\
    \ indicated by the default values given to them). They are also constants and\
    \ thus cannot be changed which is why they are defined using all uppercase (although\
    \ the use of all uppercase letters is only a convention). The result is that you\
    \ can refer to `DaysOfWeek` as an enumeration or more typically as an `Enum`.\n\
    \nUsing the enumeration terminology we would say that `DaysOfWeek.MONDAY` and\
    \ `DaysOfWeek.TUESDAY` are enumeration (or enum) members. Each member has a *name*\
    \ and a *value*, and the enum itself contains these enum *members*.\n\nYou can\
    \ reference the individual members using the dot notation as shown below:\n\n\
    ```python\nprint(DaysOfWeek.MONDAY)\nprint(DaysOfWeek.TUESDAY)\nprint(DaysOfWeek.WEDNESDAY)\n\
    \ntoday = DaysOfWeek.THURSDAY\nprint(today)\n```\n\nIn the above code we are printing\
    \ out the values for `Monday`, `Tuesday` and `Wednesday`. We then create a variable\
    \ `today` and store the value of `Thursday` into that variable and print it out.\
    \ The output generated may not be what you expect:\n\n```\nDaysOfWeek.MONDAY\n\
    DaysOfWeek.TUESDAY\nDaysOfWeek.WEDNESDAY\nDaysOfWeek.THURSDAY\n```\n\nNotice that\
    \ what is printed out is not the values 1, 2, 3 and 4 as you might have expected;\
    \ instead the name (or label) associated with the enum member is printed out.\n\
    \nAlso notice that an enum member can be assigned to a variable and used within\
    \ your program just like any other value such as 43, True or 4.123.\nNote if you\
    \ did try and change the value associated with an *enum member* you would generate\
    \ an `AttributeError`, for example:\n\n```python\nDaysOfWeek.MONDAY = 6\n```\n\
    \nGenerates\n\n```\nTraceback (most recent call last):\n  File \"enum_examples.py\"\
    , line 18, in <module>\n    DaysOfWeek.MONDAY = 6\n    ^^^^^^^^^^^^^^^^^^^^^\n\
    \  File \"enum.py\", line 841, in __setattr__\n    raise AttributeError('cannot\
    \ reassign member %r' % (name, ))\nAttributeError: cannot reassign member 'MONDAY'\n\
    ```\n\n## 40.4 Enum Values\n\nIt is also possible to create enums where the values\
    \ used by the enum members are not 1, 2, 3 but any integer sequence you like.\
    \ For example:\n\n```python\nclass Compass(Enum):\n    NORTH = 0\n    EAST = 90\n\
    \    SOUTH = 180\n    WEST = 270\n\nprint(Compass.SOUTH)\n```\n\nIn this example\
    \ we have created a `Compass` enum with four members, and the values of these\
    \ members are 0, 90, 180 and 270 (that is the points on a compass). When we run\
    \ this code the output of course is just:\n\n```\nCompass.SOUTH\n```\n\nIt is\
    \ also possible to use string values for your Python enums. Here is another enum\
    \ using strings:\n\n```python\nclass Sizes(Enum):\n    S = \"small\"\n    M =\
    \ \"medium\"\n    L = \"large\"\n    XL = \"extra large\"\n\nprint(Sizes.XL)\n\
    ```"
