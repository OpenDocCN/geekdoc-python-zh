- img_proc: true
  md: "Which now generates the output:\n\n```\nTrue\nTrue\n```\n\nThis provides a\
    \ very useful level of flexibility that can be exploited when using existing libraries\
    \ and frameworks.\n\n# 25.6 Mixins\n\nA *mixin* is a class that represents some\
    \ (typically concrete) functionality that has the potentially to be useful in\
    \ multiple situations but on its own is not something that would be instantiated.\n\
    \nHowever, a *mixin* can be mixed into other classes and can extend the data and\
    \ behavior of that type and can access data and methods provided by those classes.\n\
    \nMixins are a common category of Abstract Base Classes; although they are implicit\
    \ in their use (and naming) rather than being a concrete construct within the\
    \ Python language itself.\n\nFor example, let us define a `PrinterMixin` class\
    \ that provides a utility method to be used with other classes. It is not something\
    \ that we want developers to instantiate itself so we will make it an ABC, but\
    \ it does not define any abstract methods or properties (so there is nothing for\
    \ a subclass to have to implement).\n\n```\nfrom abc import ABC\n\nclass PrinterMixin(ABC):\n\
    \    def print_me(self):\n        print(self)\n```\n\nWe can now use this with\
    \ a class `Employee` that extends the class `Person` and mixes in the `PrinterMixin`\
    \ class:\n\n```\nclass Person(object):\n    def __init__(self, name):\n      \
    \  self.name = name\n\nclass Employee(Person, PrinterMixin):\n    def __init__(self,\
    \ name, age, id):\n        super().__init__(name)\n        self.age = age\n  \
    \      self.id = id\n\n    def __str__(self):\n        return 'Employee(' + self.id\
    \ + ')' + self.name + '[' + str(self.age) + ']'\n```"
