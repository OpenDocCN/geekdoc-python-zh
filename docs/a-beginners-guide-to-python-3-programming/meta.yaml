    # Chapter 26

    Error and Exception Handling


    # 26.1 Introduction


    This chapter considers exception and error handling and how it is implemented
    in Python. You are introduced to the object model of exception handling, to the
    throwing and catching of exceptions, and how to define new exceptions and exception-specific
    constructs. It also considers exception groups and exception notes.


    # 26.2 Errors and Exceptions


    When something goes wrong in a computer program someone needs to know about it.
    One way of informing other parts of a program (and potentially those running a
    program) is by generating an error object and propagating that through the code
    until either something *handles* the error and sorts thing out or the point at
    which the program is entered is found.

    If the error propagates out of the program, then the user who ran the program
    needs to know that something has gone wrong. They are notified of a problem via
    a short report on the error that occurred and a stack trace of where that error
    can be found.'
