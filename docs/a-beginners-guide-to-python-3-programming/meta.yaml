    print('Hello I am the utils module')\n\ndef printer(some_object):\n    print('printer')\n\
    \    print(some_object)\n    print('done')\n\nclass Shape:\n    def __init__(self,\
    \ id):\n        self._id = id\n\n    def __str__(self):\n        return 'Shape\
    \ - ' + self._id\n\n    @property\n    def id(self):\n        \"\"\" The docstring\
    \ for the id property \"\"\"\n        print('In id method')\n        return self._id\n\
    \n    @id.setter\n    def id(self, value):\n        print('In set_age method')\n\
    \        self._id = id\n\ndefault_shape = Shape('square')\n```\n\n该模块在文件开头有一个注释——这对任何使用该模块的人来说都是有用的文档。在某些情况下，模块开头的注释可以提供关于模块的广泛文档，例如它提供了什么、如何使用模块中的功能以及可以作为参考的示例。\n\
    \n该模块还有一些可执行代码（注释之后的 `print` 语句），当模块被 Python 加载/初始化时，这些代码将被运行。这发生在模块首次在应用程序中被引用时。\n\
    \n当模块加载时，还会初始化一个变量 `default_shape`，它也可以在模块外部以类似于模块函数和类的方式被引用。这些变量对于设置默认值或预定义数据非常有用，这些数据可以被使用该模块的开发者使用。\n\
    \n## 27.4 导入 Python 模块\n\n### 27.4.1 导入模块\n\n用户定义的模块*不会*自动对另一个文件或脚本可访问；必须导入该模块。导入模块会使模块中定义的函数、类和变量对导入它们的文件可见。\n\
    \n例如，要将 `utils` 模块的所有内容导入到名为 `my_app.py` 的文件中，我们可以使用：\n\n```python\nimport utils\n\
    ```\n\n请注意，我们没有给出文件名（即 `utils.py`），而是给出了要导入的模块名（不包含 `.py`）。\n\n结果如下所示：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_325_0.png)\n\
    \n一旦 `utils` 模块中的定义在 `my_app.py` 中可见，我们就可以像在当前文件中定义的一样使用它们。请注意，由于作用域的原因，在 `utils`\
    \ 模块中定义的函数、类和变量将带有模块名的前缀；即 `utils.printer` 和 `utils.Shape` 等：\n\n```python\nimport\
    \ utils\n\nutils.printer(utils.default_shape)\nshape = utils.Shape('circle')\n\
    utils.printer(shape)\n```\n\n当我们运行 `my_app.py` 文件时，将产生以下输出：\n\n```\nHello I am\
    \ the utils module\nprinter\nShape - square\ndone\nprinter\nShape - circle\n```\n\
    \n请注意，输出的第一行是 `utils` 模块中 `print` 语句的输出（即 `print('Hello I am the utils module')`\
    \ 这一行），这说明了 Python 的一个能力：可以定义在模块加载时运行的行为；通常这可能会执行一些内务处理代码或设置模块所需的行为。需要注意的是，模块只在第一次加载时初始化，因此可执行语句只运行一次。\n\
    \n如果我们忘记在文件开头包含 `import` 语句，那么 Python 将不知道使用 `utils` 模块。因此我们会生成一个错误，指出 `utils`\
