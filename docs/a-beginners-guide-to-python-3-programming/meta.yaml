  md: "# 40.6 Creating an Enumeration Using the Function Call Syntax\n\nIt is not\
    \ required to subclass the `Enum` class to create an enumerated type in Python;\
    \ you can also use the functional interface. To do this you can use the `Enum`\
    \ functional API from the `enum` module. This function takes the following parameters:\n\
    \n```\nEnum(\n    value,\n    names,\n    module=None,\n    qualname=None,\n \
    \   type=None,\n    start=1\n)\n```\n\nThis returns a new enumerated type based\
    \ on the parameters passed to it. The parameters have the following meaning:\n\
    \n+   - `value` (required field) represents the string name of the new enumeration\
    \ type (class).\n- `names` (required field) is a list of the member values that\
    \ will be used for the enumeration.\n- `module` (optional) takes the name of the\
    \ module that defines the enumeration type.\n- `qualname` (optional) holds the\
    \ location of the module that defines the enumeration type.\n- `type` (optional)\
    \ holds the class to use as the parent for the enumerated type.\n- `start` (optional)\
    \ takes the starting value for the enumeration (by default it is 1).\n\nThe `names`\
    \ argument can take any of the following:\n\n+   - a string containing member\
    \ names separated either with spaces or commas,\n- an iterable (such as a list)\
    \ of member names,\n- an iterable (such as a list) of name-value pairs.\n\nMost\
    \ of the time, you'll just use the first two arguments (and possibly the last)\
    \ to the `Enum` function when creating your enumerations. For example:\n\n```\n\
    Weekend = Enum('Weekend', ['SATURDAY', 'SUNDAY'])\n```\n\nAlternatively if you\
    \ wanted to start the enumeration from 10 rather than 1 you could write:\n\n```\n\
    Weekend = Enum('Weekend',\n               ['SATURDAY', 'SUNDAY'],\n          \
    \     start=10)\n```"
  merge: -1
