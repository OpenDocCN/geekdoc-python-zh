  md: "# 46.8 The Board Class\n\nThe Board class holds a 3 by 3 grid of cells in the\
    \ form of a list of lists. It also defines the methods used to verify or make\
    \ a move on the board. The `check_for_winner()` method determines if there is\
    \ a winner given the current board positions.\n\n```\nclass Board:\n    \"\"\"\
    \ The ticTacToe board \"\"\"\n\n    def __init__(self):\n        # Set up the\
    \ 3 by 3 grid of cells\n        self.cells = [[' ', ' ', ' '], [' ', ' ', ' '],\
    \ [' ', ' ', ' ']]\n        self.separator = '\\n' + ('-' * 11) + '\\n'\n\n  \
    \  def __str__(self):\n        row1 = ' ' + str(self.cells[0][0]) + ' | ' + str(self.cells[0][1])\
    \ + ' | ' + str(self.cells[0][2])\n        row2 = ' ' + str(self.cells[1][0])\
    \ + ' | ' + str(self.cells[1][1]) + ' | ' + str(self.cells[1][2])\n        row3\
    \ = ' ' + str(self.cells[2][0]) + ' | ' + str(self.cells[2][1]) + ' | ' + str(self.cells[2][2])\n\
    \        return row1 + self.separator + row2 + self.separator + row3\n\n    def\
    \ add_move(self, move):\n        \"\"\" A move to the board \"\"\"\n        row\
    \ = self.cells[move.x]\n        row[move.y] = move.counter\n\n    def is_empty_cell(self,\
    \ row, column):\n        \"\"\" Check to see if a cell is empty or not\"\"\"\n\
    \        return self.cells[row][column] == ' '\n\n    def cell_contains(self,\
    \ counter, row, column):\n        \"\"\" Check to see if a cell contains the provided\
    \ counter \"\"\"\n        return self.cells[row][column] == counter\n\n    def\
    \ is_full(self):\n        \"\"\" Check to see if the board is full or not \"\"\
    \"\n        for row in range(0, 3):\n            for column in range(0, 3):\n\
    \                if self.is_empty_cell(row, column):\n                    return\
    \ False\n        return True\n\n    def check_for_winner(self, player):\n    \
    \    \"\"\" Check to see if a player has won or not \"\"\"\n        c = player.counter\n\
    \        return (# across the top\n            (self.cell_contains(c, 0, 0) and\
    \ self.cell_contains(c, 0, 1) and self.cell_contains(c, 0, 2)) or\n          \
    \  # across the middle\n            (self.cell_contains(c, 1, 0) and self.cell_contains(c,\
    \ 1, 1) and self.cell_contains(c, 1, 2)) or\n```"
