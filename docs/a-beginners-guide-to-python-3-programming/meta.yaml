    - https://www.python.org/dev/peps/pep-3129/ PEP 3129 引入类装饰器。\n- https://docs.python.org/3/library/functools.html\
    \ Python 标准库中 `functools` 的文档。\n- https://pymotw.com/3/functools/index.html Python\
