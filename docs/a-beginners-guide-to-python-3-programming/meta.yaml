  md: "# 12.4 Types of Functions\n\nTechnically speaking there are two types of functions\
    \ in Python: *built-in* functions and *user-defined* functions.\n\n*Built-in*\
    \ functions are those provided by the language, and we have seen several of these\
    \ already. For example, both `print()` and `input()` are built-in functions. We\
    \ did not need to define them ourselves as they are provided by Python.\n\nIn\
    \ contrast *user-defined* functions are those written by developers. We will be\
    \ defining user-defined functions in the rest of this chapter, and it is likely\
    \ that in many cases, most of the programs that you will write will include user-defined\
    \ functions of one sort or another.\n\n# 12.5 Defining Functions\n\nThe basic\
    \ syntax of a function is illustrated below:\n\n```\ndef function_name(parameter\
    \ list):\n    \"\"\"docstring\"\"\"\n    statement\n    statement(s)\n```\n\n\
    This illustrates several things:\n\n+   1. All (named) functions are defined using\
    \ the *keyword* `def`; this indicates the start of a function definition. A keyword\
    \ is a part of the syntax of the Python language and cannot be redefined and is\
    \ not a function.\n2. A function can have a name which uniquely identifies it;\
    \ you can also have anonymous functions, but we will leave those until later in\
    \ this chapter.\n3. The naming conventions that we have been adopting for variables\
    \ are also applied to functions, and they are all lowercase with the different\
    \ elements of the function name separated by `_`.\n4. A function can (optionally)\
    \ have a list of parameters which allow data to be passed into the function. These\
    \ are optional as not all functions need to be supplied with parameters.\n5. A\
    \ colon is used to mark the end of the *function header* and the start of the\
    \ *function body*. The function header defines the signature of the function (what\
    \ is called and the parameters it takes). The function body defines what the function\
    \ does.\n6. An optional documentation string (the `docstring`) can be provided\
    \ that describes what the function does. We typically use the triple double quote\
    \ string format as this allows the documentation string to go over multiple lines\
    \ if required.\n7. One or more Python statements make up the function body. These\
    \ are indented relative to the function definition. All lines that are indented\
    \ are part of the function until a line which is intended at the same level as\
    \ the `def` line.\n8. It is common to use 4 spaces (not a tab) to determine how\
    \ much to indent the body of a function by."
  merge: -1
