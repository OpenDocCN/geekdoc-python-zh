    \ explicitly have the concept of encapsulation; instead it relies on two things;\
    \ a standard convention used to indicate that an attribute should be considered\
    \ private and a concept called a property which allows setters and getters to\
    \ be defined for an attribute.\n\n## 24.2 Python Attributes\n\nAll object attributes\
    \ are publicly available in Python; that is, they are all visible to any code\
