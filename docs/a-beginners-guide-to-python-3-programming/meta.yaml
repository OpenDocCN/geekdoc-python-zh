    \ `for` 循环还是 `while` 循环）关联的代码块中的任何位置。这意味着它的前面和后面都可以有语句。\n\n## 8.6 Continue 循环语句\n\
    \n`continue` 语句也会影响 `for` 和 `while` 循环结构内的控制流。但是，它不会终止整个循环；它只终止当前的循环迭代。这允许你跳过循环迭代中某个特定值的部分，然后继续处理序列中的其余值。\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_123_0.png)\n\n可以使用守卫（if 语句）来确定何时应执行\
