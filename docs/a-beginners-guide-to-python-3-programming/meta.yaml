  md: '# Chapter 15

    Introduction to Functional Programming


    # 15.1 Introduction


    There has been much hype around Functional Programming in recent years. However,
    Functional Programming is not a new idea and indeed goes right back to the 1950s
    and the programming language LISP. However, many people are not clear as to what
    Functional Programming is and instead jump into code examples and never really
    understand some of the key ideas associated with Functional Programming such as
    Referential Transparency.

    This chapter introduces Functional Programming (also known as FP) and the key
    concept of Referential Transparency (or RT).

    One idea to be aware of is that Functional Programming is a software coding style
    or approach and is separate from the concept of a function in Python.

    Python functions can be used to write functional programs but can also be used
    to write procedural style programs; so do not get too hung up on the syntax that
    might be used or the fact that Python has functions just yet. Instead explore
    the idea of defining a functional approach to your software design.


    # 15.2 What is Functional Programming?


    Wikipedia describes Functional Programming as:


    > ... a programming paradigm, a style of building the structure and elements of
    computer programs, that treats computation as the evaluation of mathematical functions
    and avoids state and mutable data.


    There are a number of points to note about this definition. The first is that
    it is focused on the *computational side* of computer programming. This might
    seem obvious but most of what we have looked at so far in Python would be considered
    procedural in nature.'
  merge: -1
  pgno: 190
- img_proc: true
  md: "Another thing to note is that the way in which the computations are represented\
    \ emphasizes functions that generate results based purely on the data provided\
    \ to them. That is these functions only rely on their inputs to generate a new\
    \ output. They do not rely on any *side effects* and do not depend on the *current\
    \ state* of the program. As an example of a side effect, if a function stored\
    \ a running total in a global variable and another function used that total to\
    \ perform some calculation, then the first function has a side effect of modifying\
    \ a global variable and the second relies on some global state for its result.\n\
    \nTaking each of these in turn:\n\n+   1. **Functional Programming aims to avoid\
    \ side effects.** A function should be replaceable by taking the data it receives\
    \ and in lining the result generated (this is referred to as Referential Transparency).\
    \ This means that there should be no hidden side effects of the function. Hidden\
    \ side effects make it harder to understand what a program is doing and thus make\
    \ comprehension, development and maintenance harder. Pure functions have the following\
    \ attributes:\n   2. The only observable output is the return value.\n   3. The\
    \ only output dependency is the arguments.\n   4. Arguments are fully determined\
    \ before any output is generated.\n5. **Functional Programming avoids concepts\
    \ such as state.** Let us take these as separate issues. If some operation is\
    \ dependent upon the (potentially hidden) state of the program or some element\
    \ of a program, then its behaviour may differ depending upon that state. This\
    \ may make it harder to comprehend, implement, test and debug. As all of these\
    \ impact on the stability and probably reliability of a system, state-based operations\
    \ may result in less reliable software being developed. As functions do not (should\
    \ not) rely on any given state (only upon the data they are given) they should\
    \ as a result be easier to understand, implement, test and debug.\n6. **Functional\
    \ Programming promotes immutable data.** Functional Programming also tends to\
    \ avoid concepts such as mutable data. Mutable data is data that can change its\
    \ state. By contrast *immutability* indicates that once created, data cannot be\
    \ changed. In Python strings are immutable. Once you create a new string you cannot\
    \ modify it. Any functions that apply to a string that might conceptually alter\
    \ the contents of the string and result in a new string being generated. Many\
    \ developers take this further by having a presumption of immutability in their\
    \ code; that means that by default all data holding types are implemented as immutable.\
    \ This ensures that functions cannot have hidden side effects and thus simplifies\
    \ programming in general.\n7. **Functional Programming promotes declarative programming**\
    \ which means that programming is oriented around expressions that describe the\
    \ solution rather than focus on the imperative approach of most procedural programming\
    \ languages. Imperative languages emphasize aspects of how the solution is"
