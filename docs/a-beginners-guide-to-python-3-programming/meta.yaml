- md: "## 35.4 Frozenset Operations\n\nThe operations available on a frozenset are\
    \ similar to the set with the obvious exception that you cannot modify the frozenset.\
    \ However, you can copy a frozenset, apply set like operations such as union and\
    \ compare frozensets, etc. Some of these are illustrated below:\n\n```python\n\
    # frozenset operations\nbrands = frozenset(['ford', 'jaguar', 'bmw'])\nmanufacturers\
    \ = brands.copy()\nprint(f'brands: {brands}')\nprint(f'manufacturers: {manufacturers}')\n\
    \n# Equality\nprint(f'brands == manufacturers: {brands == manufacturers}')\nprint(f'brands\
    \ == fs3: {brands == fs3}')\n\nprint('-' * 10)\n\nfruit = frozenset(['apple',\
    \ 'pear', 'banana'])\nveg = frozenset(['carrot', 'cabbage', 'peas'])\nprint(f'fruit.union(veg):\
    \ {fruit.union(veg)}')\n\nbreakfast = frozenset(['apple', 'strawberry', 'banana'])\n\
    print(f'fruit.intersection(breakfast): {fruit.intersection(breakfast)}')\n\nprint(f'fruit.difference(breakfast):\
    \ {fruit.difference(breakfast)}')\n\nowner = frozenset(['jaguar', 'bmw'])\nprint(f'breakfast.issubset(fruit):\
    \ {owner.issubset(brands)}')\n```\n\nThe output from this code is\n\n```\nbrands:\
    \ frozenset({'bmw', 'ford', 'jaguar'})\nmanufacturers: frozenset({'bmw', 'ford',\
    \ 'jaguar'})\nbrands == manufacturers: True\nbrands == fs3: False\n----------\n\
    fruit.union(veg): frozenset({'peas', 'cabbage', 'apple', 'pear', 'carrot', 'banana'})\n\
    fruit.intersection(breakfast): frozenset({'apple', 'banana'})\nfruit.difference(breakfast):\
    \ frozenset({'pear'})\nbreakfast.issubset(fruit): True\n```\n\nIn the above example\
    \ we have used:\n\n- `copy` returns a new instance of the frozenset containing\
    \ the same members as the original.\n- `union` returns the union of frozensets\
    \ as a new frozenset.\n- `intersection` returns those members in both frozensets\
    \ as a frozenset.\n- `difference` returns members that are not in either of the\
    \ frozensets as a frozenset.\n- `issubset` returns `True` or `False` depending\
    \ upon whether the receiving frozensets' members are fully contained within the\
    \ second frozenset.\n\nIn addition there is\n\n- `issuperset` which indicates\
    \ whether the receiving frozenset contains all the members of the second frozenset.\n\
    - `isdisjoint` returns `True` if the two frozensets have no members in common.\
    \ Otherwise returns `False`.\n- `symmetric_difference` Return the symmetric difference\
    \ of two frozensets as a new frozenset.\n\n## 35.5 Using Frozensets with Sets\n\
    \nThe most common usage of a frozenset is when wanting to place a set within a\
    \ set (that is to nest sets).\nIt is possible to hold any *immutable* object within\
    \ a set. This means that a set can contain a reference to a tuple (as that is\
    \ immutable). We can thus write:\n\n```python\ns1 = { (1, 2, 3)}\nprint(s1)\n\
    ```\n\nThis prints out\n\n```\n{(1, 2, 3)}\n```\n\nHowever, we cannot nest lists\
    \ or other sets within a set as these are not immutable types. The following would\
    \ both generate a runtime error in Python:\n\n```python\n# Can't have the following\n\
    s2 = { {1, 2, 3} }\nprint(s2)\n\ns3 = { [1, 2, 3] }\nprint(s3)\n```\n\nHowever\
    \ we can use frozensets and nest these within sets. For example:\n\n```python\n\
    # Need to convert sets and lists into frozensets\ns2 = { frozenset({1, 2, 3})}\n\
