    \ method such that it provides an appropriate implementation of the `Bag`.\n\n\
    # 25.3.2 Defining an Abstract Base Class\n\nAn Abstract Base Class can be defined\
    \ by specifying that the class has a metaclass; typically, `ABCMeta`. The `ABCMeta`\
    \ metaclass is provided by the `abc` module.\nThe metaclass is specified using\
    \ the `metaclass` attribute of the parent class list. This will create a class\
    \ that can be used as an ABC.\nThis is exactly how the ABCs in the `_collections_abc.py`\
    \ file are implemented.\nThe following code snippet illustrates this idea. The\
    \ `ABCMeta` class is imported from the `abc` module. It is then used with the\
    \ class `Shape` via the `metaclass` attribute of the class inheritance list:\n\
    \n```\nfrom abc import ABCMeta\n\nclass Shape(metaclass=ABCMeta):\n    def __init__(self,\
    \ id):\n        self.id = id\n```\n\nNote that at this point although `Shape`\
    \ is an ABC, it does not define any abstract elements and so can actually be instantiated\
    \ just like any other concrete class. However, we will next define some abstract\
    \ methods for the `Shape` ABC.\nTo define an abstract method, we need to also\
    \ import the `abstractmethod` decorator from the `abc` module (if we want to define\
    \ an abstract property then we need to add `@property` to an appropriate abstract\
    \ method). Import the `abstractmethod` decorator is illustrated below:\n\n```\n\
    from abc import ABCMeta, abstractmethod\n```"
