    \nwhich produces the output:\n\n```\nlist1: [1, 2, 3, 4, 5, 6]\nlist2: [2, 3,\
    \ 4, 5, 6, 7]\n```\n\nHere the new list is generated by adding 1 to each element\
    \ in the initial list `list1`. Essentially, we iterate (loop) over all the elements\
    \ in the initial list and bind each element in the list to the `item` variable\
    \ in turn. The result of the expression `item + 1` is then captured, in order,\
    \ in the new list.\n\nThis feature is not limited to processing values in a list;\
    \ any iterable collection can be used such as tuples or sets as the source of\
    \ the values to process.\n\nAnother feature of the list comprehension is the ability\
    \ to filter the values passed to the expression using the optional `if` condition.\n\
    \nFor example, if we wish to only consider even numbers for the expression then\
    \ we can use the optional `if` statement to filter out all odd numbers:\n\n```python\n\
    list3 = [item + 1 for item in list1 if item % 2 == 0]\nprint('list3:', list3)\n\
    ```\n\nThe output from these two lines of code is\n\n```\nlist3: [3, 5, 7]\n```\n\
    \nThus only the even numbers were passed to the expression `item + 1` resulting\
    \ in only the values 3, 5 and 7 being generated for the new list.\n\nA new feature\
    \ introduced in Python 3.12 allows a variable that will be used in the list comprehension\
    \ but will not be modified during the loop to be initialized using the assignment\
    \ expressions (`:=`). For example:\n\n```python\n[(b := 1) for a, b.prop in some_iter]\n\
    ```\n\nthe assignment to `b` is now allowed. Note that assigning to variables\
    \ stored to in the target part of comprehensions (like `a`) is still disallowed.\n\
    \n### 36.3 The Collections Module\n\nThe collections module extends that basic\
    \ features of the collection-oriented data types within Python with high performance\
    \ container data types. It provides many useful containers such as\n\n| Name |\
    \ Purpose |\n| :--- | :--- |\n| **namedtuple()** | Factory function for creating\
    \ tuple subclasses with named fields |\n| **deque** | List-like container with\
    \ fast appends and pops on either end |\n| **ChainMap** | Dict-like class for\
    \ creating a single view of multiple mappings |\n| **Counter** | Dict subclass\
    \ for counting hashable objects |\n| **OrderedDict** | Dict subclass that remembers\
    \ the order entries were added |\n| **Defaultdict** | Dict subclass that calls\
    \ a factory function to supply missing values |\n| **UserDict** | Wrapper around\
    \ dictionary objects for easier dict subclassing |\n| **UserList** | Wrapper around\
