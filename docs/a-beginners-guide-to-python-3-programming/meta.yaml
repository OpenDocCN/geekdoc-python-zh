    # ## 30.1 Introduction


    There are two protocols that you are very likely to use or will possibly need
    to implement at some point or other; these are the *iterable* protocol and the
    *iterator* protocols.


    These two closely related protocols are very widely used and supported by a large
    number of types.


    One of the reasons that iterators and iterables are important is that they can
    be used with `for` statements in Python; this makes it very easy to integrate
    an iterable into code which needs to process a sequence of values in turn.


    # ## 30.2 Iteration


    # ### 30.2.1 Iterables


    The *iterable* protocol is used by types where it is possible to process their
    contents one at a time in turn. An iterable is something that will supply an iterator
    that can be used to perform this processing. As such it is not the iterator itself;
    but the provider of the iterator.


    There are many iterable types in Python including lists, sets, dictionaries, tuples,
    etc. These are all iterable *containers* that will supply an iterator.


    To be an *iterable* type; it is necessary to implement the `__iter__()` method
    (which is the only method in the iterable protocol). This method must supply a
    reference to the iterator object. This reference could be to the data type itself
    or it could be to another type that implements the iterator protocol.'
  - "[PAGE 365]\n\n# 30.2.2 Iterators\n\nAn *iterator* is an object that will return\
    \ a sequence of values. Iterators may be finite in length or infinite (although\
    \ many container-oriented iterators provide a fixed set of values).\n\nThe iterator\
    \ protocol specifies the `__next__()` method. This method is expected to return\
    \ the next item in the sequence to return or to raise the `StopIteration` exception.\
    \ This is used to indicate that the iterator has finished supplying values.\n\n\
    # 30.2.3 The Iteration Related Methods\n\nTo summarize then we have\n\n+   - `__iter__()`\
    \ from the iterable protocol which is used to return the iterator object,\n- `__next__()`\
    \ from the iterator protocol which is used to obtain the next value in a sequence\
    \ of values.\n\nAny data type can be both an iterable and an iterator; but that\
    \ is not required. An iterable could return a different object that will be used\
    \ to implement the iterator or it can return itself as the iterator—it’s the designers\
    \ choice.\n\n# 30.2.4 The Iterable Evens Class\n\nTo illustrate the ideas behind\
    \ iterables and iterators we will implement a simple class; this class will be\
    \ an Evens class that is used to supply a set of even values from 0 to some limit.\
    \ This illustrates that it is not only data containers that can be iterable/iterators.\n\
    \nIt also illustrates a type that is both an iterable and an iterator.\n\n```\n\
    class Evens(object):\n    def __init__(self, limit):\n        self.limit = limit\n\
    \        self.val = 0\n\n    # Makes this class iterable\n    def __iter__(self):\n\
    \        return self\n\n    # Makes this class an iterator\n    def __next__(self):\n\
    \        if self.val > self.limit:\n            raise StopIteration\n```"
