  md: 'You may have seen these yourself already when writing your own programs. For
    example, the following screen dump illustrates a programming *error* where someone
    has tried to concatenate a string and a number together using the ''+'' operator.
    This *error* has propagated out of the program and a stack trace of the code that
    was called is presented (in this case the function print used the `__str__()`
    method of the class `Person`). Note the line numbers are included which helps
    with *debugging* the problem.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_301_0.png)


    In Python the terms error and exception are used inter-changeably; although from
    a style point of view exceptions might be used to represent issues with operations
    such as arithmetic exceptions and errors might be associated with functional issues
    such as a file not being found.


    # 26.3 What is an Exception?


    In Python, everything is a type of object, including integers, strings, Booleans
    and indeed exceptions and errors. In Python the Exception/Error types are defined
    in a class hierarchy with the root of this hierarchy being the `BaseException`
    type. All built-in errors and exceptions eventually extend from the `BaseException`
    type. It has a subclass `Exception` which is the root of all user defined exceptions
    (as well as many built-in exceptions). In turn `ArithmeticException` is the base
    class for all built-in exceptions associated with arithmetic errors.'
