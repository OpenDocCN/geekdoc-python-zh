    \ 527\n\n# Chapter 1\nIntroduction\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_27_0.png)\n\
    \n## 1.1 What is Python?\n\nPython is a general-purpose programming language in\
    \ a similar vein to other programming languages that you might have heard of such\
    \ as C++ , JavaScript or Microsoft’s C# and Java.\n\nIt has been around for some\
    \ considerable time having been originally conceived back in the late 1980s by\
    \ Guido van Rossum at Centrum Wiskunde and Informatica (CWI) in the Netherlands.\
    \ The language is named after one of Guido’s favorite programs “Monty Pythons\
    \ Flying Circus”, a classic and somewhat anarchic British comedy sketch show originally\
    \ running from 1969 to 1974 (but which has been rerun on various stations ever\
    \ since) and with several film spin offs. You will even find various references\
    \ to this show in the documentation available with Python.\n\nAs a language it\
    \ has gained in interest over recent years, particularly within the commercial\
    \ world, with many people wanting to learn the language. This increased interest\
    \ in Python is driven by several different factors:\n\n1. Its flexibility and\
    \ simplicity which makes it easy to learn.\n2. Its use by the Data Science community\
    \ where it provides a more standard programming language than some rivals such\
    \ as R.\n3. Its suitability as a scripting language for those working in the DevOps\
    \ field where it provides a higher level of abstraction than alternative traditionally\
    \ used languages.\n4. Its ability to run on (almost) any operating system, but\
    \ particularly the big three operating systems Windows, MacOS and Linux.\n5. The\
    \ availability of a wide range of libraries (modules) that can be used to extend\
    \ the basic features of the language.\n6. It is free!\n\nPython itself is now\
    \ managed by the *not-for-profit* Python Software Foundation (see [https://en.wikipedia.org/wiki/Python_Software_Foundation](https://en.wikipedia.org/wiki/Python_Software_Foundation))\
    \ which was launched in March 2001. The mission of the foundation is to foster\
    \ development of"
