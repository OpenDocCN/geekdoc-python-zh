    # Chapter 32

    Collections, Tuples and Lists


    # 32.1 Introduction


    Earlier in this book we looked at some Python built-in types such as `string`,
    `int` and `float` as well as `bools`. These are not the only built-in types in
    Python; another group of built-in types are collectively known as collection types.
    This is because they represent a collection of other types (such as a collection
    of strings or integers).


    A collection is a single object representing a group of objects (such as a list
    or dictionary). That is, they are a collection of other objects. Collections may
    also be referred to as *containers* (as they contain other objects). These collection
    classes are often used as the basis for more complex or application specific data
    structures and data types.


    These collection types support various types of data structures (such as lists
    and maps) and ways to process elements within those structures. This chapter introduces
    the Python collection types.


    # 32.2 Python Collection Types


    There are four classes in Python that provide container like behaviour; that is,
    data types for holding collections of other objects, these are


    +   - **Tuples** A Tuple represents a collection of objects that are ordered and
    immutable (cannot be modified). Tuples allow duplicate members and are indexed.

    - **Lists** Lists hold a collection of objects that are ordered and mutable (changeable),
    and they are indexed and allow duplicate members.

    - **Sets** Sets are a collection that is unordered and unindexed. They are mutable
    (changeable) but do not allow duplicate values to be held.'
  - '[PAGE 376]


    +   - **Dictionary** A dictionary is an unordered collection that is indexed by
    a *key* which references a *value*. The value is returned when the *key* is provided.
    No duplicate keys are allowed. Duplicate values are allowed. Dictionaries are
    mutable containers.


    Remember that everything in Python is actually a type of object, integers are
    instances/objects of the type int, strings are instances of the type string, etc.
    Thus, container types such as `Set` can hold collections of any type of thing
    in Python.


    # 32.3 Characterising Collections


    Collections, or containers as they are sometimes known, allow multiple values
    to be held together, but as indicated in the previous section they have various
    characteristics which can be used to help identify the most appropriate collection
    to use at any one time. These characteristics are


    +   - *Ordered* or *unordered* that is there a maintained order to how the members
    of the collection are held.

    - *Mutable* or *immutable* which means whether the collection can be modified
    once out has been created or not.

    - Does the collection allow duplicate values to be held or not.

    - Are the values held in the collection associated with a numerical index or by
    a key.

    - Can the size of the collection grow once created or not.


    By using these characteristics you can choose an appropriate container type/collection
    to use.

    Looking at the four collection types introduced in the previous section we can
    consider them against these characteristics.


    | Tuples | | Sets | |

    |---|---|---|---|

    | | Ordered | | Unordered |

    | | Immutable | | Mutable |

    | | Allow duplicates | | Do not allow duplicates |

    | | Indexed | | Not indexed |

    | | Fixed size | | Growable |

    | Lists | | Dictionaries | |

    | | Ordered | | Ordered (from 3.7) |

    | | Mutable | | Mutable |

    | | Allow duplicates | | Allow duplicate values |

    | | Indexed | | Keyed |

    | | Growable | | Growable |'
