    \ the online list tutorial.\n\n## 32.7 Exercises\n\nThe aim of this exercise is\
    \ to work with a collection/container such as a list.\nTo do this we will return\
    \ to your account related classes.\nYou should modify your `Account` class such\
    \ that it is able to keep a history of transactions.\nA *transaction* is a record\
    \ of a deposit or withdrawal along with an amount.\nNote that the initial amount\
    \ in an account can be treated as an initial deposit.\nThe history could be implemented\
    \ as a *list* containing an ordered sequence to transactions. A transaction itself\
    \ could be defined by a class with an action (deposit or withdrawal) and an amount.\n\
    Each time a withdrawal or a deposit is made a new transaction record which should\
    \ be added to a transaction history list.\n\nNow provide support for iterating\
    \ through the transaction history of the account such that each deposit or withdrawal\
    \ can be reviewed. You can do this by implementing the iterable protocol—refer\
    \ to the last chapter if you need to check how to do this. Note that it is the\
    \ transaction history that we want to be able to iterate through—so you can use\
    \ the history list as the basis of your iterable.\n\nYou should be able to run\
    \ this following code at the end of your accounts application:\n\n```\nfor transaction\
    \ in acc1:\n    print(transaction)\n```\n\nDepending upon the exact set of transactions\
    \ you have performed (deposits and withdrawals) you should get a list of those\
    \ transactions being printed out:\n\n```\nTransaction[deposit: 10.05]\nTransaction[deposit:\
    \ 23.45]\nTransaction[withdraw: 12.33]\n```\n\n# Chapter 33\nSets\n\n## 33.1 Introduction\n\
    \nPython provides many different container or collection types. This chapter focuses\
    \ on the set collection. This collection is used to hold unique *immutable* collections\
    \ of objects. It is a mutable collection and so the values it holds can change\
    \ over time but does not allow duplicate values. It also supports basic set like\
    \ operations such as intersection, union and difference.\n\n## 33.2 Creating a\
    \ Set\n\nA `set` is defined using curly brackets (e.g., `{}`).\nFor example,\n\
    \n```\nbasket = {'apple', 'orange', 'apple', 'pear',\n          'orange', 'banana'}\n\
    print(basket)\n```\n\nWhen run this code will show that *apple* is only added\
    \ once to the set:\n\n```\n{'banana', 'orange', 'pear', 'apple'}\n```\n\nNote\
    \ that because a `set` is unordered it is not possible to refer to elements of\
    \ the set using an index.\n\n## 33.3 The Set() Constructor Function\n\nAs with\
    \ tuples and lists Python provides a predefined function that can convert any\
    \ iterable type into a set. The function signature is\n\n```\nset(iterable)\n\
    ```\n\nGiven an iterable object, this function returns a new set based on the\
    \ values obtained from the iterable. This means that a set can be easily created\
    \ from a list, tuple or dictionary as well as any other data type that implements\
    \ the iterable protocol. For example:\n\n```\nset1 = set((1, 2, 3))\nprint(set1)\n\
    ```\n\nwhich prints out\n\n```\n{1, 2, 3}\n```\n\n## 33.4 Accessing Elements in\
    \ a Set\n\nUnlike lists it is not possible to access elements from a set via an\
    \ index; this is because they are unordered containers, and thus there are no\
    \ indexes available. However, they are iterable containers.\nElements of a set\
    \ can be iterated over using the for statement:\n\n```\nfor item in basket:\n\
    \    print(item)\n```\n\nThis applies the print statement to each item in the\
    \ list in turn.\n\n## 33.5 Working with Sets\n\n### 33.5.1 Checking for Presence\
    \ of an Element\n\nYou can check for the presence of an element in a set using\
    \ the in keyword, for example:\n\n```\nprint('apple' in basket)\n```\n\nThis will\
    \ print true if 'apple' is a member of the set basket.\n\n### 33.5.2 Adding Items\
    \ to a Set\n\nIt is possible to add items to a set using the add() method:\n\n\
    ```\nbasket = {'apple', 'orange', 'banana'}\nbasket.add('apricot')\nprint(basket)\n\
    ```\n\nThis generates\n\n```\n{'orange', 'apple', 'banana', 'apricot', 'pear'}\n\
    ```\n\nIf you want to add more than one item to a set you can use the update()\
    \ method:\n\n```\nbasket = {'apple', 'orange', 'banana'}\nbasket.update(['apricot',\
    \ 'mango', 'grapefruit'])\nprint(basket)\n```\n\ngenerating\n\n```\n{'orange',\
    \ 'apple', 'mango', 'banana', 'apricot', 'grapefruit'}\n```\n\nThe argument to\
    \ update can be a set, a list, a tuple or a dictionary. The method automatically\
    \ converts the parameter into a set if it is not a set already and then adds the\
    \ value to the original set.\n\n### 33.5.3 Changing Items in a Set\n\nIt is not\
    \ possible to change the items already in a set.\n\n### 33.5.4 Obtaining the Length\
    \ of a Set\n\nAs with other collection/container classes; you can find out the\
    \ length of a set using the len() function.\n\n```\nbasket = {'apple', 'orange',\
    \ 'apple', 'pear', 'orange', 'banana'}\nprint(len(basket)) # generates 4\n```"
  mdcn: "## 32.5.7 从列表中移除元素\n\n我们可以使用 `remove()` 方法从列表中移除一个元素。该方法的语法如下：\n\n```\n<list>.remove(<object>)\n\
