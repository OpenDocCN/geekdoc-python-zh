    \ elements of the function name separated by `_`.\n4. A function can (optionally)\
    \ have a list of parameters which allow data to be passed into the function. These\
    \ are optional as not all functions need to be supplied with parameters.\n5. A\
    \ colon is used to mark the end of the *function header* and the start of the\
    \ *function body*. The function header defines the signature of the function (what\
    \ is called and the parameters it takes). The function body defines what the function\
    \ does.\n6. An optional documentation string (the `docstring`) can be provided\
    \ that describes what the function does. We typically use the triple double quote\
    \ string format as this allows the documentation string to go over multiple lines\
    \ if required.\n7. One or more Python statements make up the function body. These\
    \ are indented relative to the function definition. All lines that are indented\
    \ are part of the function until a line which is intended at the same level as\
    \ the `def` line.\n8. It is common to use 4 spaces (not a tab) to determine how\
    \ much to indent the body of a function by."
- md: "## 12.5.1 An Example Function\n\nThe following is one of the simplest functions\
    \ you can write; it takes no parameters and has only a single statement that prints\
    \ out the message 'Hello World':\n\n```python\ndef print_msg():\n    print('Hello\
    \ World!')\n```\n\nThis function is called `print_msg`, and when called (also\
    \ known as invoked) it will run the body of the function which will print out\
    \ the string, for example,\n\n```python\nprint_msg()\n```\n\nwill generate the\
    \ output\n\n```\nHello World!\n```\n\nBe careful to include the round brackets\
    \ () when you call the function. This is because if you just use the function's\
    \ name then you are merely referring to the location in memory where the function\
    \ is stored, and you are not invoking it.\n\nWe could modify the function to make\
    \ it a little more general and reusable by providing a parameter. This parameter\
    \ could be used to supply the message to be printed out, for example:\n\n```python\n\
    def print_my_msg(msg):\n    print(msg)\n```\n\nNow the `print_my_msg` function\
    \ takes a single parameter, and this parameter becomes a variable which is available\
    \ within the body of the function. However, this parameter only exists within\
    \ the body of the function; it is not available outside of the function.\n\nThis\
    \ now means that we can call the `print_my_msg` function with a variety of different\
    \ messages:\n\n```python\nprint_my_msg('Hello World')\nprint_my_msg('Good day')\n\
    print_my_msg('Welcome')\nprint_my_msg('Ola')\n```\n\nThe output from calling this\
    \ function with each of these strings being supplied as the parameter is:\n\n\
    ```\nHello World\nGood day\nWelcome\nOla\n```\n\n## 12.6 Returning Values from\
    \ Functions\n\nIt is very common to want to return a value from a function. In\
    \ Python this can be done using the `return` statement. Whenever a `return` statement\
    \ is encountered within a function then that function will terminate and return\
    \ any values following the return keyword.\n\nThis means that if a value is provided,\
    \ then it will be made available to any calling code.\n\nFor example, the following\
    \ defines a simple function that squares whatever value has been passed to it:\n\
    \n```python\ndef square(n):\n    return n * n\n```\n\nWhen we call this function,\
    \ it will multiply whatever it is given by itself and then return that value.\
    \ The returned value can then be used at the point that the function was invoked,\
    \ for example:\n\n```python\n# Store result from square in a variable\nresult\
    \ = square(4)\nprint(result)\n# Send the result from square immediately to another\
    \ function\nprint(square(5))\n# Use the result returned from square in a conditional\
    \ expression\nif square(3) < 15:\n    print('Still less than 15')\n```\n\nWhen\
    \ this code is run, we get:\n\n```\n16\n25\nStill less than 15\n```\n\nIt is also\
    \ possible to return multiple values from a function; for example, in this `swap`\
    \ function the order in which the parameters are supplied is swapped when they\
    \ are returned:\n\n```python\ndef swap(a, b):\n    return b, a\n```\n\nWe can\
    \ then assign the values returned to variables at the point when the function\
    \ is called:\n\n```python\na = 2\nb = 3\nx, y = swap(a, b)\nprint(x, ',', y)\n\
    ```\n\nwhich produces\n\n```\n3 , 2\n```\n\nIn actual fact the result returned\
    \ from the swap function is what is called a *tuple* which is a simple way to\
    \ grouping data together. This means that we could also have written:\n\n```python\n\
    z = swap(a, b)\nprint(z)\n```\n\nwhich would have printed the tuple out:\n\n```\n\
    (3, 2)\n```\n\nWe will look at tuples more when we consider collections of data.\n\
    \n## 12.7 Docstring\n\nSo far our example functions have not included any documentation\
    \ strings (the *docstring*). This is because the docstring is *optional*, and\
    \ the functions we have written have been very simple.\n\nHowever, as functions\
    \ become more complex and may have multiple parameters the documentation provided\
    \ can become more important.\n\nThe *docstring* allows the function to provide\
    \ some guidance on what is expected in terms of the data passed into the parameters,\
    \ potentially what will happen if the data is incorrect, as well as what the purpose\
    \ of the function is in the first place.\n\nIn the following example, the *docstring*\
    \ is being used to explain the behaviour of the function and how the parameter\
    \ is used.\n\n```python\ndef get_integer_input(message):\n    \"\"\"\n    This\
    \ function will display the message to the user\n    and request that they input\
    \ an integer.\n\n    If the user enters something that is not a number\n    then\
    \ the input will be rejected\n    and an error message will be displayed.\n\n\
    \    The user will then be asked to try again.\"\"\"\n    value_as_string = input(message)\n\
    \    while not value_as_string.isnumeric():\n        print('The input must be\
    \ an integer')\n        value_as_string = input(message)\n    return int(value_as_string)\n\
    ```\n\nWhen used, this method will guarantee that a valid integer will be returned\
    \ to the calling code:\n\n```python\nage = get_integer_input('Please input your\
    \ age: ')\nprint('age is', age)\n```\n\nAn example of what happens when this is\
    \ run is given below:\n\n```\nPlease input your age: John\nThe input must be an\
    \ integer\nPlease input your age: 21\nage is 21\n```\n\nThe *docstring* can be\
    \ read directly from the code but is also available to IDEs such as PyCharm so\
    \ that they can provide information about the function. It is even available to\
    \ the programmer via a very special property of the function called `__doc__`\
    \ that is accessible via the name of the function using the dot notation:\n\n\
    ```python\nprint(get_integer_input.__doc__)\n```\n\nwhich generates\n\n```\nThis\
    \ function will display the message to the user\nand request that they input an\
    \ integer.\n\nIf the user enters something that is not a number\nthen the input\
    \ will be rejected\nand an error message will be displayed.\n\nThe user will then\
    \ be asked to try again.\n```\n\n## 12.8 ReStructured Text\n\nIt is also possible\
    \ to place *formatting* commands within a docstring that can be picked up by a\
    \ tool such as PyCharm to improve the layout and information presented. There\
    \ are several options available for this such as Google style docstrings and NumPy\
    \ style docstrings (see [https://betterprogramming.pub/3-different-docstring-formats-for-python-d27be81e0d68](https://betterprogramming.pub/3-different-docstring-formats-for-python-d27be81e0d68)).\
    \ However we are going to look at reStructured Text style docstrings as this is\
    \ the style recommended by the Python organization itself.\n\nReStructured Text\
    \ (aka ReST) is intended to be an easy-to-read markup syntax used to add additional\
    \ meaning to the text within a docstring. Like many other simple markup languages\
    \ it uses inline markup such as `*` or a `#` to indicate emphasis or lists, etc.\
    \ and as such is intended to be much simpler and easier to use than more complex\
    \ markup languages such as HTML.\n\nAs a simple example, consider the following\
    \ code:\n\n```python\ndef get_integer_input(message):\n    \"\"\"\n    This function\
    \ will display the message to the user\n    and request that they input an integer.\n\
    \n    :param message: The message to print\n    :returns: the integer entered\
    \ by the user\n\n    \"\"\"\n    value_as_string = input(message)\n    while not\
    \ value_as_string.isnumeric():\n        print('The input must be an integer')\n\
    \        value_as_string = input(message)\n    return int(value_as_string)\n```\n\
    \nThis function has a docstring containing some reStructured Text formatting,\
    \ namely the :param and :returns directives.\n\nA directive is an item of meta\
    \ information that will be used by the ReST parser to generate the formatted output.\n\
    \n- In this case the :param directive indicates that message is a parameter to\
    \ the function and the information after the final : provides a description of\
    \ that parameter.\n- In turn the :returns : directive indicates that this function\
    \ returns a value and the text after this described the meaning of the returned\
    \ value.\n\nPyCharm uses this information and generates reference documentation\
    \ that can be viewed in the pop-up displayed when the programmer hovers over a\
    \ call to the get_integer_input function. This is displayed below:\n\n```python\n\
    response = get_integer_input(\"Please input total: \")\nprint(f'The response is\
    \ {response}')\n```\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_162_0.png)"
  mdcn: "## 12.5.1 一个示例函数\n\n以下是你能编写的最简单的函数之一；它不接受任何参数，并且只有一条打印消息 'Hello World' 的语句：\n\
    \n```python\ndef print_msg():\n    print('Hello World!')\n```\n\n这个函数名为 `print_msg`，当被调用（也称为执行）时，它将运行函数体，打印出该字符串，例如：\n\
    \n```python\nprint_msg()\n```\n\n将产生输出：\n\n```\nHello World!\n```\n\n调用函数时请务必包含圆括号\
    \ ()。这是因为如果你只使用函数名，那么你只是在引用函数在内存中的存储位置，而并没有调用它。\n\n我们可以通过提供一个参数来修改该函数，使其更具通用性和可重用性。这个参数可用于提供要打印的消息，例如：\n\
    \n```python\ndef print_my_msg(msg):\n    print(msg)\n```\n\n现在 `print_my_msg`\
    \ 函数接受一个参数，这个参数成为一个在函数体内可用的变量。然而，这个参数仅存在于函数体内；在函数外部不可用。\n\n这意味着我们可以用各种不同的消息来调用\
    \ `print_my_msg` 函数：\n\n```python\nprint_my_msg('Hello World')\nprint_my_msg('Good\
    \ day')\nprint_my_msg('Welcome')\nprint_my_msg('Ola')\n```\n\n使用每个字符串作为参数调用此函数的输出为：\n\
    \n```\nHello World\nGood day\nWelcome\nOla\n```\n\n## 12.6 从函数返回值\n\n从函数返回一个值是非常常见的需求。在\
    \ Python 中，这可以使用 `return` 语句来完成。每当在函数中遇到 `return` 语句时，该函数将终止并返回 `return` 关键字后的任何值。\n\
    \n这意味着如果提供了值，那么该值将对任何调用代码可用。\n\n例如，以下代码定义了一个简单的函数，它对传入的任何值进行平方运算：\n\n```python\n\
    def square(n):\n    return n * n\n```\n\n当我们调用这个函数时，它会将给定的值乘以自身，然后返回该值。返回的值可以在函数被调用的地方使用，例如：\n\
    \n```python\n# 将 square 的结果存储在变量中\nresult = square(4)\nprint(result)\n# 将 square\
    \ 的结果立即发送给另一个函数\nprint(square(5))\n# 在条件表达式中使用 square 返回的结果\nif square(3) < 15:\n\
    \    print('Still less than 15')\n```\n\n运行此代码时，我们得到：\n\n```\n16\n25\nStill less\
    \ than 15\n```\n\n也可以从函数返回多个值；例如，在这个 `swap` 函数中，参数的顺序在返回时被交换了：\n\n```python\n\
    def swap(a, b):\n    return b, a\n```\n\n然后我们可以在调用函数时将返回的值赋给变量：\n\n```python\n\
    a = 2\nb = 3\nx, y = swap(a, b)\nprint(x, ',', y)\n```\n\n产生：\n\n```\n3 , 2\n\
    ```\n\n实际上，从 swap 函数返回的结果被称为 *元组*，这是一种将数据组合在一起的简单方式。这意味着我们也可以这样写：\n\n```python\n\
    z = swap(a, b)\nprint(z)\n```\n\n这将打印出元组：\n\n```\n(3, 2)\n```\n\n我们将在讨论数据集合时更详细地了解元组。\n\
    \n## 12.7 文档字符串\n\n到目前为止，我们的示例函数都没有包含任何文档字符串（*docstring*）。这是因为文档字符串是 *可选的*，而且我们编写的函数都非常简单。\n\
    \n然而，随着函数变得越来越复杂，并且可能有多个参数，提供的文档可能会变得更加重要。\n\n*文档字符串* 允许函数提供一些指导，说明对传入参数的数据有什么期望，如果数据不正确可能会发生什么，以及函数本身的目的是什么。\n\
    \n在下面的示例中，*文档字符串* 用于解释函数的行为以及参数的使用方式。\n\n```python\ndef get_integer_input(message):\n\
    \    \"\"\"\n    此函数将向用户显示消息\n    并请求他们输入一个整数。\n\n    如果用户输入的不是数字，\n    则输入将被拒绝，\n\
    \    并显示错误消息。\n\n    然后将要求用户重试。\"\"\"\n    value_as_string = input(message)\n\
    \    while not value_as_string.isnumeric():\n        print('The input must be\
    \ an integer')\n        value_as_string = input(message)\n    return int(value_as_string)\n\
    ```\n\n使用时，此方法将保证返回一个有效的整数给调用代码：\n\n```python\nage = get_integer_input('Please\
    \ input your age: ')\nprint('age is', age)\n```\n\n运行此代码时发生的情况示例如下：\n\n```\nPlease\
    \ input your age: John\nThe input must be an integer\nPlease input your age: 21\n\
    age is 21\n```\n\n*文档字符串* 可以直接从代码中读取，但也可以被 PyCharm 等 IDE 使用，以便它们可以提供有关函数的信息。它甚至可以通过函数的一个非常特殊的属性\
    \ `__doc__` 提供给程序员，该属性可以通过点表示法使用函数名访问：\n\n```python\nprint(get_integer_input.__doc__)\n\
    ```\n\n生成：\n\n```\n此函数将向用户显示消息\n并请求他们输入一个整数。\n\n如果用户输入的不是数字，\n则输入将被拒绝，\n并显示错误消息。\n\
    \n然后将要求用户重试。\n```\n\n## 12.8 ReStructured Text\n\n也可以在文档字符串中放置 *格式化* 命令，这些命令可以被\
    \ PyCharm 等工具识别，以改善布局和呈现的信息。有几种可用的选项，例如 Google 风格的文档字符串和 NumPy 风格的文档字符串（参见 [https://betterprogramming.pub/3-different-docstring-formats-for-python-d27be81e0d68](https://betterprogramming.pub/3-different-docstring-formats-for-python-d27be81e0d68)）。然而，我们将研究\
    \ reStructured Text 风格的文档字符串，因为这是 Python 组织本身推荐的风格。\n\nReStructured Text（又名 ReST）旨在成为一种易于阅读的标记语法，用于向文档字符串中的文本添加额外含义。与许多其他简单的标记语言一样，它使用内联标记，如\
    \ `*` 或 `#` 来表示强调或列表等，因此旨在比 HTML 等更复杂的标记语言更简单、更易于使用。\n\n作为一个简单的例子，考虑以下代码：\n\n\
    ```python\ndef get_integer_input(message):\n    \"\"\"\n    此函数将向用户显示消息\n    并请求他们输入一个整数。\n\
    \n    :param message: 要打印的消息\n    :returns: 用户输入的整数\n\n    \"\"\"\n    value_as_string\
    \ = input(message)\n    while not value_as_string.isnumeric():\n        print('The\
    \ input must be an integer')\n        value_as_string = input(message)\n    return\
    \ int(value_as_string)\n```\n\n这个函数有一个包含一些 reStructured Text 格式的文档字符串，即 :param\
    \ 和 :returns 指令。\n\n指令是将被 ReST 解析器用于生成格式化输出的元信息项。\n\n- 在这种情况下，:param 指令表示 message\
    \ 是函数的一个参数，最后一个 : 之后的信息提供了该参数的描述。\n- 相应地，:returns : 指令表示此函数返回一个值，其后的文本描述了返回值的含义。\n\
    \nPyCharm 使用此信息生成参考文档，当程序员将鼠标悬停在对 get_integer_input 函数的调用上时，可以在弹出窗口中查看。如下所示：\n\
    \n```python\nresponse = get_integer_input(\"Please input total: \")\nprint(f'The\
    \ response is {response}')\n```\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_162_0.png)"
