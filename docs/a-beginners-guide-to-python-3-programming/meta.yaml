    ```\n\nNow when we try to update the variable `max` inside the function `print_max()`,\
    \ Python knows we mean the `global` version of the variable and uses that one.\
    \ The result is that we now print out the value 101, and `max` is updated to 101\
    \ for everyone everywhere!\n\n## 13.4 Nonlocal Variables\n\nIt is possible to\
