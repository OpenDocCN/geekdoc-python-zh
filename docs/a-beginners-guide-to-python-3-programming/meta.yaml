    # 32.4.9 Nested Tuples


    Tuples can be nested within tuples; that is a tuple can contain, as one of its
    elements, another tuple. For example, the following diagram illustrates the nesting
    of a tree of tuples:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_381_0.png)


    In code we could define this structure as


    ```

    python

    tuple1 = (1, 3, 5, 7)

    tuple2 = (''John'', ''Denise'', ''Phoebe'', ''Adam'')

    tuple3 = (42, tuple1, tuple2, 5.5)

    print(tuple3)

    ```


    The output from this is


    ```


    (42, (1, 3, 5, 7), (''John'', ''Denise'', ''Phoebe'', ''Adam''), 5.5)

    ```


    Note the *nesting* of round brackets in the printout illustrating where one tuple
    is contained within another.


    This feature of tuples (and other containers) allows for arbitrarily complex data
    structures to be constructed as required by an application.


    In fact, a `tuple` can have nested within it not just other tuples but any type
    of container, and thus it can contain lists, sets, dictionaries, etc. This provides
    for a huge level of flexibility when constructing data structures for use in Python
    programs.


    # 32.4.10 Things You Can''t Do with Tuples


    It is not possible to add or remove elements from a `tuple`; they are *immutable*.
    It should be particularly noted that none of the functions or methods presented
    above actual change the original tuple they are applied to; even those that return
    a subset of the original tuple actually return a new instance of the class `tuple`
    and have no effect on the original tuple.'
