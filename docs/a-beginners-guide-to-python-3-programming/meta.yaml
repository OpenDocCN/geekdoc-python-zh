  - '[PAGE 32]


    2. It then translates the plain text, English like commands, into a more concise
    intermediate format that is easier to execute on a computer. Python can store
    this intermediate version in a file which is named after the original file but
    with a `.pyc` extension instead of a `.py` extension (the ''c'' in the extension
    indicates it contains the compiled version of the code).

    3. The compiled intermediate version is then executed by the interpreter.


    When this program is rerun the Python interpreter checks to see if a `.pyc` file
    is present. If no changes have been made to the source file since the `.pyc` was
    created, then the interpreter can skip steps 1 and 2 and immediately run the `.pyc`
    version of the program.


    One interesting aspect of Python''s usage is that it can be (and often is) used
    in an interactive fashion, with individual commands being entered and executed
    one at a time, with context information being built up. This can be useful in
    debugging situations.


    # 1.7 Running Python Programs


    There are several ways in which you can run a Python program, including


    +   - Interactively using the Python interpreter.

    - Stored in a file and run using the Python command.

    - Run as a script file specifying the Python interpreter to use within the script
    file.

    - From within a Python IDE (Integrated Development Environment) such as PyCharm.

    - Using Jupyter Notebooks in a web browser.


    # 1.7.1 Interactively Using the Python Interpreter


    It is quite common to find that people will use Python in interactive mode. This
    uses the Python REPL (named after **Read Evaluate Print Loop** style of operation).


    Using the REPL, Python statements and expressions can be typed into the Python
    prompt and will then be executed directly. The values of variables will be remembered
    and may be used later in the session.


    To run the Python REPL, Python must have been installed onto the computer system
    you are using. Once installed you can open a Command Prompt window (Windows) or
    a Terminal window (Mac) and type `Python` into the prompt. This is shown for a
    Windows machine below:'
  - '[PAGE 33]


    ```

    jeh@Johns-iMac ~ % python

    Python 3.11.2 (main, Feb 16 2023, 03:07:35) [Clang 14.0.0 (clang-1400.0.29.202)]
    on darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>> print(''Hello World'')

    Hello World

    >>> 5 + 4

    9

    >>> name = ''John''

    >>> print(name)

    John

    >>>

    ```


    In the above example, we interactively typed in several Python commands and the
    Python interpreter ‘Read’ what we have typed in, ‘Evaluated’ it (worked out what
    it should do), ‘Printed’ the result and then ‘Looped’ back ready for further input.
    In this case we


    +   - Printed out the string ‘Hello World’.

    - Added 5 and 4 together and got the result 9.

    - Stored the string ‘John’ in a variable called `name`.

    - Printed out the contents of the variable `name`.


    To leave the interactive shell (the REPL) and go back to the console (the system
    shell), press Ctrl-Z and then Enter on Windows, or Ctrl-D on OS X or Linux. Alternatively,
    you could also issue the command `quit()`.


    You should note that once you have left the session anything you created within
    the session will be lost.


    # 1.7.2 Running a Python File


    We can of course store the Python commands into a file. This creates a program
    file that can then be run as an argument to the `python` command. It also allows
    the program held within the file to be run many times.


    For example, given a file containing the following file (called `hello.py`) with
    the 4 commands in it:'
  - '[PAGE 34]


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_0.png)


    To run the `hello.py` program on a PC using Windows we can use the `Python` command
    followed by the name of the file:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_1.png)


    We can also run the same program on a Apple Mac using MacOS via the `Python` interpreter.
    For example on a Mac we can do the following:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_34_2.png)


    This makes it very easy to create Python programs that can be stored in files
    and run when needed on whatever platform is required (Windows, Linux or Mac).
    This illustrates the cross platform nature of Python and is just one of the reasons
    why Python is so popular.'
  - '[PAGE 35]


    # 1.7.3 Executing a Python Script


    It is also possible to transform a file containing a stored Python program into
    a Script. A script is a stand-alone file that can be run directly without the
    need to (explicitly) use the `python` command.


    This is done by adding a special line to the start of the Python file that indicates
    the Python command (or interpreter) to use with the rest of the file. This line
    must start with `#!` and must come at the start of the file.


    To convert the previous sections file into a Script we would need to add the path
    to the python interpreter. Here path refers to the route that the computer must
    take to find the specified Python interpreter (or executable).


    The exact location of the Python interpreter on your computer depends on what
    options upon selected when you (or whoever installed Python) set it up. Typically
    on a Windows PC Python will be found in the ‘Program Files’ directory or it might
    be installed in its own ‘Python’ directory.


    Whatever the location of the Python interpreter to create a script we will need
    to add a first line to our `hello.py` file. This line must start with a `#!`.
    This combination of characters is known as a *shebang* and indicates to Linux
    and other Unix like operating systems (such as MacOS) how the remainder of the
    file should be executed.


    For example, on a Apple Mac we might add:


    ```

    /Library/Frameworks/Python.framework/Versions/3.11/bin/python3

    ```


    When added to the `hello.py` file we now have:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_35_0.png)


    However, we cannot just run the file as it stands. If we tried to run the file
    without any changes then we will get an error indicating that the permission to
    execute the file has been denied:


    ```

    $ ./hello.py

    -bash: ./hello.py: Permission denied

    $

    ```


    This is because by default you can’t just run a file. We need to mark it as executable.
    There are several ways to do this, however one of the easiest on a Mac or Linux
    box is'
  - '[PAGE 36]


    to use the `chmod` command (which can be used to modify the permissions associated
    with the file). To make the file executable we can change the file permissions
    to include making it executable by using the following command from a terminal
    window when we are in the same directory as the `hello.py` file:


    ```

    $ chmod +x hello.py

    ```


    Where `+x` indicates that we want to add the executable permission to the file.

    Now if we try to run the file directly it executes and the results of the commands
    within the file are printed out:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_36_0.png)


    Note the use of the `./` preceding the file name in the above; this is used on
    Linux to tell the operating system to look in the current directory for the file
    to execute.

    Different systems will store Python in different locations and thus might need
    different first lines, for example on a Linux we might write:


    ```

    #!/usr/local/bin/python3

    print(''Hello, world'')

    print(5 + 4)

    name = ''John''

    print(name)

    ```


    By default Windows does not have the same concept. However, to prompt cross platform
    portability the Python Launcher for Windows can also support this style of operation.
    It allows scripts to indicate a preference for a specific Python version using
    the same `#!` (Shebang) format as Unix style operating systems. We can now indicate
    that the rest of the file should be interpreted as a Python script; if multiple
    versions of Python are installed this may require Python 3 to be explicitly specified.
    The launcher also understands how to translate the Unix version into Windows versions
    so that `/usr/local/bin/python3` will be interpreted as indicating that python3
    is required.

    An example of the `hello.py` script for a Windows or Linux machine is given below
    using Notepad++ on a Windows box.'
  - '[PAGE 37]


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_37_0.png)


    When the launcher was installed it should have been associated with Python files
    (i.e., files that have a .py extension). This means that if you double-click on
    one of these files from the Windows Explorer, then the Python launcher will be
    used to run the file.


    # ### 1.7.4 Using Python in an IDE


    We can also use an IDE such as PyCharm to writing and execute our Python program.
