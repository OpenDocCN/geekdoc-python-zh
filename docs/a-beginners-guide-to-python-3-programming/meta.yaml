    # 18.4 How is an OO System Constructed?


    At this point you may be wondering how a system can be built from classes and
    objects instantiated from those classes? What would such an application look like?
    It is clear it is different to writing functions and free-standing application
    code that calls those functions?

    Let''s use a real-world (physical) system to explore what an OOP application might
    look like.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_216_0.png)


    This system aims to provide a diagnosis tutor for the equipment illustrated above.
    Rather than use the wash–wipe system from a real car, students on a car mechanics
    diagnosis course use this software simulation. The software system mimics the
    actual system, so the behaviour of the pump depends on information provided by
    the relay and the water bottle.

    The operation of the wash–wipe system is controlled by a switch which can be in
    one of five positions: off, intermittent, slow, fast and wash. Each of these settings
    places the system into a different state:


    | Switch setting | System state |

    |---|---|

    | Off | The system is inactive |

    | Intermittent | The blades wipe the windscreen every few seconds |

    | Slow | The wiper blades wipe the windscreen continuously |

    | Fast | The wiper blades wipe the windscreen continuously and quickly |

    | Wash | The pump draws water from the water bottle and sprays it onto the windscreen
    |


    For the pump and the wiper motor to work correctly, the relay must function correctly.
    In turn, the relay must be supplied with an electrical circuit. This electrical'
  - '[PAGE 217]


    circuit is negatively fused, and thus, the fuse must be intact for the circuit
    to be made. Cars are negatively switched as this reduces the chances of short
    circuits leading to unintentional switching of circuits.


    # 18.4.1 Where Do We Start?


    This is often a very difficult point for those new to object-oriented systems.
    That is, they have read the basics and understand simple diagrams, but do not
    know where to start. It is the old chestnut, “I understand the example but don’t
    know how to apply the concepts myself”. This is not unusual and, in the case of
    object orientation, is probably normal.


    The answer to the question “where do I start?” may at first seem somewhat obscure;
    you should start with the data. Remember that objects are things that exchange
    messages with each other. The things possess the data that is held by the system
    and the messages request actions that relate to the data. Thus, an object-oriented
    system is fundamentally concerned with data items.


    Before we go on to consider the object-oriented view of the system, let us stop
    and think for a while. Ask yourself where could I start; it might be that you
    think about starting “with some form of functional decomposition” (breaking the
    problem down in terms of the functions it provides) as this might well be the
    view the user has of the system. As a natural part of this exercise, you would
    identify the data required to support the desired functionality. Notice that the
    emphasis would be on the system functionality.


    Let us take this further and consider the functions we might identify for the
    example presented above:


    | Function | Description |

    | :--- | :--- |

    | Wash | Pump water from the water bottle to the windscreen |

    | Wipe | Move the windscreen wipers across the windscreen |


    We would then identify important system variables and sub-functions to support
    the above functions.


    Now let us go back to the object-oriented view of the world. In this view, we
    place a great deal more emphasis on the data items involved and consider the operations
    associated with them (effectively, the reverse of the functional decomposition
    view). This means that we start by attempting to identify the primary data items
    in the system; next, we look to see what operations are applied to, or performed
    on, the data items; finally, we group the data items and operations together to
    form objects. In identifying the operations, we may well have to consider additional
    data items, which may be separate objects or attributes of the current object.
    Identifying them is mostly a matter of skill and experience.'
  - '[PAGE 218]


    The object-oriented design approach considers the operations far less important
    than the data and their relationships. In the next section we examine the objects
    that might exist in our simulation system.


    # 18.4.2 Identifying the Objects


    We look at the system as a whole and ask what indicates the state of the system.
    We might say that the position of the switch or the status of the pump is significant.
    This results in the data items shown below


    | Data item | States |

    | :--- | :--- |

    | `switch setting` | Is the switch set to off, intermittent, wipe, fast wipe or
    wash? |

    | `wiper motor` | Is the motor working or not? |

    | `pump state` | Is the pump working or not? |

    | `fuse condition` | Has the fuse blown or not? |

    | `water bottle level` | The current water level |

    | `relay status` | Is current flowing or not? |


    The identification of the data items is considered in greater detail later. At
    this point, merely notice that we have not yet mentioned the functionality of
    the system or how it might fit together, we have only mentioned the significant
    items. As this is such a simple system, we can assume that each of these elements
    is an object and illustrate it in a simple object diagram:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_218_0.png)


    Notice that we have named each object after the element associated with the data
    item (e.g., the element associated with the fuse condition is the fuse itself)
    and that the actual data (e.g., the condition of the fuse) is an instance variable
    of the object. This is a very common way of naming objects and their instance
    variables. We now have the basic objects required for our application.'
  - "[PAGE 219]\n\n# 18.4.3 Identifying the Services or Methods\n\nAt the moment,\
    \ we have a set of objects each of which can hold some data. For example, the\
    \ water bottle can hold an integer indicating the current water level. Although\
    \ object-oriented systems are structured around the data, we still need some procedural\
    \ content to change the state of an object or to make the system achieve some\
    \ goal. Therefore, we also need to consider the operations a user of each object\
    \ might require. Notice that the emphasis here is on the user of the object and\
    \ what they require of the object, rather than what operations are performed on\
    \ the data.\n\nLet us start with the switch object. The switch state can take\
    \ a number of values. As we do not want other objects to have direct access to\
    \ this variable, we must identify the services that the switch should offer. As\
    \ a user of a switch we want to be able to move it between its various settings.\
    \ As these settings are essentially an enumerated type, we can have the concept\
    \ of incrementing or decrementing the switch position. A switch must therefore\
    \ provide a `move_up` and a `move_down` interface. Exactly how this is done depends\
    \ on the programming language; for now, we concentrate on specifying the required\
    \ facilities.\n\nIf we examine each object in our system and identify the required\
    \ services, we may end up with the following table:\n\n| Object | Service | Description\
    \ |\n|---|---|---|\n| switch | move_up | Increment switch value |\n| | move_down\
    \ | Decrement switch value |\n| | State? | Return a value indicating the current\
    \ switch state |\n| fuse | working? | Indicate if the fuse has blown or not |\n\
    | wiper motor | working? | Indicate whether the wipers are working or not |\n\
    | relay | working? | Indicate whether the relay is active or not |\n| pump | working?\
    \ | Indicate whether the pump is active or not |\n| water bottle | fill | Fill\
    \ the water bottle with water |\n| | extract | Remove some water from the water\
    \ bottle |\n| | empty | Empty the water bottle |\n\nWe generated this table by\
    \ examining each of the objects in isolation to identify the services that might\
    \ reasonably be required. We may well identify further services when we attempt\
    \ to put it all together.\n\nEach of these services should relate to a method\
    \ within the object. For example, the moveUp and moveDown services should relate\
    \ to methods that change the state instance variable within the object. Using\
    \ a generic pseudo-code, the `move_up` method, within the switch object, might\
    \ contain the following code:\n\n```\ndef move_up(self):\n    if self.state ==\
    \ \"off\" then\n        self.tate = \"wash\"\n    else if self.state == \"wash\"\
    \ then\n```"
- md: "## 18.4.4 Refining the Objects\n\nIf we look back to the table, we can see\
    \ that fuse, wiper motor, relay and pump all possess a service called `working?`.\
    \ This is a hint that these objects may have something in common. Each of them\
    \ presents the same interface to the outside world. If we then consider their\
    \ attributes, they all possess a common instance variable. At this point, it is\
    \ too early to say whether fuse, wiper motor, relay and pump are all instances\
    \ of the same class of object (e.g., a Component class) or whether they are all\
    \ instances of classes which inherit from some common superclass (see below).\
    \ However, this is something we must bear in mind later.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_220_0.png)\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_220_1.png)\n\n## 18.4.5 Bringing It\
    \ All Together\n\nSo far, we have identified the primary objects in our system\
    \ and the basic set of services they should present. These services were based\
    \ solely on the data the objects hold. We must now consider how to make our system\
    \ function. To do this, we need to consider how it might be used. The system is\
    \ part of a very simple diagnosis tutor; a student uses the system to learn about\
    \ the effects of various faults on the operation of a real wiper system, without\
    \ the need for expensive electronics. We therefore wish to allow a user of the\
    \ system to carry out the following operations:\n\n- change the state of a component\
    \ device\n- ask the motor what its new state is\n\nThe `move_up` and `move_down`\
    \ operations on the switch change the switch's state. Similar operations can be\
    \ provided for the fuse, the water bottle and the relay. For the fuse and the\
    \ relay, we might provide a `change_state` interface using the following algorithm:\n\
    \n```\ndefine change_state(self)\n    if self.state == \"working\" then\n    \
    \    self.state = \"notWorking\"\n    else\n        self.state = \"working\"\n\
    ```\n\nDiscovering the state of the motor is more complicated. We have encountered\
    \ a situation where one object's state (the value of its instance variable) is\
    \ dependent on information provided by other objects. If we write down procedurally\
    \ how the value of other objects affect the status of the pump, we might get the\
    \ following pseudo-code:\n\n```\nif fuse is working then\n    if switch is not\
    \ off then\n        if relay is working then\n            pump status = \"working\"\
    \n```\n\nThis algorithm says that the pump status depends on the relay status,\
    \ the switch setting and the fuse status. This is the sort of algorithm you might\
    \ expect to find in your application. It links the sub-functions together and\
    \ processes the data.\n\nIn an object-oriented system, well-mannered objects pass\
    \ messages to one another. How then do we achieve the same effect as the above\
    \ algorithm? The answer is that we must get the objects to pass messages requesting\
    \ the appropriate information. One way to do that is to define a method in the\
    \ pump object that gets the required information from the other objects and determines\
    \ the motor's state. However, this requires the pump to have links to all the\
    \ other objects so that it can send them messages. This is a little contrived\
    \ and loses the structure of the underlying system. It also loses any modularity\
    \ in the system. That is, if we want to add new components then we have to change\
    \ the pump object, even if the new components only affect the switch. This approach\
    \ also indicates that the developer is thinking too procedurally and not really\
    \ in terms of objects.\n\nIn an object-oriented view of the system, the pump object\
    \ only needs to know the state of the relay. It should therefore request this\
    \ information from the relay. In turn, the relay must request information from\
    \ the switches and the fuse.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_222_0.png)\n\
    \nThe above illustrates the chain of messages initiated by the pump object:\n\n\
    1. pump sends a `working?` message to the relay,\n2. relay sends a `state?` message\
    \ to the switch, the switch replies to the relay,\n3. relay sends a second `working?`\
    \ message to the fuse:\n4. The fuse replies to the relay\n5. the relay replies\
    \ to the motor\n6. If the pump is working, then the pump object sends the final\
    \ message to the water bottle\n7. pump sends a message `extract` to the water\
    \ bottle\n\nIn step four, a parameter is passed with the message because, unlike\
    \ the previous messages that merely requested state information, this message\
    \ requests a change in state. The parameter indicates the rate at which the pump\
    \ draws water from the water bottle.\n\nThe water bottle should not record the\
    \ value of the pump's status as it does not own this value. If it needs the motor's\
    \ status in the future, it should request it from the pump rather than using the\
    \ (potentially obsolete) value passed to it previously.\n\nIn the above figure\
    \ we assumed that the pump provided the service `working?` which allows the process\
    \ to start. For completeness, the pseudo-code of the `working?` method for the\
    \ pump object is:\n\n```\ndef working?(self)\n    self.status = relay.working()\n\
    \    if self.status == \"working\" then\n        water_bottle.extract(self.status)\n\
    ```\n\nThis method is a lot simpler than the procedural program presented earlier.\
    \ At no point do we change the value of any variables that are not part of the\
    \ pump, although they may have been changed as a result of the messages being\
    \ sent. Also, it only shows us the part of the story that is directly relevant\
    \ to the pump. This means that it can be much more difficult to deduce the operation\
    \ of an object-oriented system merely by reading the source code. Some Python\
    \ environments (such as the PyCharm IDE) alleviate this problem, to some extent,\
    \ through the use of sophisticated browsers.\n\n## 18.5 Where Is the Structure\
    \ in an OO Program?\n\nPeople new to object orientation may be confused because\
    \ they have lost one of the key elements that they use to help them understand\
    \ and structure a software system: the main program body. This is because the\
    \ objects and the interactions between them are the cornerstone of the system.\
    \ In many ways, the following figure shows the object-oriented equivalent of a\
    \ main program. This also highlights an important feature of most object-oriented\
    \ approaches: graphical illustrations. Many aspects of object technology, for\
    \ example object structure, class inheritance and message chains, are most easily\
    \ explained graphically.\n\nLet us now consider the structure of our object-oriented\
    \ system. It is dictated by the messages that are sent between objects. That is,\
    \ an object must possess a reference to another object in order to send it a message.\
    \ The resulting system structure is illustrated below.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_223_0.png)\n\
    \nIn Python, this structure is achieved by making instance variables reference\
    \ the appropriate objects. This is the structure which exists between the instances\
    \ in the system and does not relate to the classes, which act as templates for\
    \ the instances.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_224_0.png)\n\nWe\
    \ now consider the classes that create the instances. We could assume that each\
    \ object is an instance of an equivalent class (see above (a)). However, as has\
    \ already been noted, some of the classes bear a very strong resemblance. In particular,\
    \ the fuse, the relay, the motor and the pump share a number of common features.\
    \ The following table compares the features (instance variables and services)\
    \ of these objects.\n\n| | fuse | relay | motor | pump |\n|---|---|---|---|---|\n\
    | instance variable | state | state | state | state |\n| services | working? |\
    \ working? | working? | working? |\n\nFrom this table, the objects differ only\
    \ in name. This suggests that they are all instances of a common class such as\
    \ Component. This class would possess an additional instance variable, to simplify\
    \ object identification.\n\nIf they are all instances of a common class, they\
    \ must all behave in exactly the same way. However, we want the pump to start\
    \ the analysis process when it receives the message `working?` so it must possess\
    \ a different definition of `working?` from fuse and relay. In other ways it is\
    \ very similar to fuse and relay, so they can be instances of a class (say Component)\
    \ and pump and motor can be instances of classes that inherit from Component (but\
    \ redefine `working?`). This is illustrated in the previous figure (c). The full\
    \ class diagram is presented in the Figure below."
  mdcn: "## 18.4.4 细化对象\n\n回顾之前的表格，我们可以看到保险丝、雨刮电机、继电器和水泵都拥有一个名为`working?`的服务。这暗示这些对象可能具有共同之处。它们都向外界呈现相同的接口。如果我们再考虑它们的属性，它们都拥有一个共同的实例变量。此时，断言保险丝、雨刮电机、继电器和水泵都是同一类对象（例如，Component类）的实例，或者都是继承自某个公共超类（见下文）的类的实例，还为时过早。然而，这一点我们必须在后续牢记。\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_220_0.png)\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_220_1.png)\n\
    \n## 18.4.5 整合\n\n到目前为止，我们已经确定了系统中的主要对象以及它们应提供的基本服务集。这些服务仅基于对象所持有的数据。我们现在必须考虑如何使系统运作起来。为此，我们需要考虑它可能如何被使用。该系统是一个非常简单的诊断教学程序的一部分；学生使用该系统来学习各种故障对真实雨刮系统运行的影响，而无需昂贵的电子设备。因此，我们希望允许系统用户执行以下操作：\n\
    \n-   更改组件设备的状态\n-   询问电机其新状态是什么\n\n开关上的`move_up`和`move_down`操作会改变开关的状态。可以为保险丝、水瓶和继电器提供类似的操作。对于保险丝和继电器，我们可以使用以下算法提供一个`change_state`接口：\n\
    \n```\ndefine change_state(self)\n    if self.state == \"working\" then\n    \
    \    self.state = \"notWorking\"\n    else\n        self.state = \"working\"\n\
    ```\n\n获取电机的状态则更为复杂。我们遇到了一种情况，其中一个对象的状态（其实例变量的值）依赖于其他对象提供的信息。如果我们以过程化的方式写下其他对象的值如何影响水泵的状态，可能会得到以下伪代码：\n\
    \n```\nif fuse is working then\n    if switch is not off then\n        if relay\
    \ is working then\n            pump status = \"working\"\n```\n\n这个算法表明，水泵的状态取决于继电器的状态、开关的设置以及保险丝的状态。这正是你可能期望在应用程序中找到的算法类型。它将子功能链接在一起并处理数据。\n\
    \n在一个面向对象的系统中，行为良好的对象彼此传递消息。那么，我们如何实现与上述算法相同的效果呢？答案是我们必须让对象传递请求适当信息的消息。一种方法是在水泵对象中定义一个方法，该方法从其他对象获取所需信息并确定电机的状态。然而，这要求水泵与所有其他对象建立链接，以便能够向它们发送消息。这有点牵强，并且失去了底层系统的结构。它也失去了系统中的任何模块化。也就是说，如果我们想添加新的组件，即使新组件只影响开关，我们也必须更改水泵对象。这种方法还表明开发者思考方式过于过程化，而没有真正从对象的角度思考。\n\
    \n在系统的面向对象视图中，水泵对象只需要知道继电器的状态。因此，它应该向继电器请求此信息。反过来，继电器必须向开关和保险丝请求信息。\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_222_0.png)\n\
    \n上图说明了由水泵对象发起的消息链：\n\n1.  水泵向继电器发送`working?`消息，\n2.  继电器向开关发送`state?`消息，开关回复继电器，\n\
    3.  继电器向保险丝发送第二个`working?`消息：\n4.  保险丝回复继电器\n5.  继电器回复电机\n6.  如果水泵正在工作，则水泵对象向水瓶发送最终消息\n\
    7.  水泵向水瓶发送`extract`消息\n\n在第四步中，消息附带了一个参数，因为与之前仅请求状态信息的消息不同，此消息请求状态的更改。该参数表示水泵从水瓶抽水的速率。\n\
    \n水瓶不应记录水泵状态的值，因为它不拥有此值。如果它将来需要电机的状态，它应该向水泵请求，而不是使用之前传递给它的（可能已过时的）值。\n\n在上图中，我们假设水泵提供了`working?`服务，该服务允许流程启动。为完整起见，水泵对象的`working?`方法的伪代码如下：\n\
    \n```\ndef working?(self)\n    self.status = relay.working()\n    if self.status\
    \ == \"working\" then\n        water_bottle.extract(self.status)\n```\n\n这个方法比之前展示的过程化程序简单得多。我们从未更改任何不属于水泵的变量的值，尽管它们可能由于发送的消息而被更改。此外，它只向我们展示了与水泵直接相关的部分。这意味着仅通过阅读源代码来推断面向对象系统的操作可能要困难得多。一些Python环境（如PyCharm\
    \ IDE）通过使用复杂的浏览器在一定程度上缓解了这个问题。\n\n## 18.5 面向对象程序的结构在哪里？\n\n面向对象的新手可能会感到困惑，因为他们失去了帮助他们理解和构建软件系统的一个关键要素：主程序体。这是因为对象及其之间的交互是系统的基石。在许多方面，下图展示了面向对象等价于主程序的部分。这也突出了大多数面向对象方法的一个重要特征：图形化说明。对象技术的许多方面，例如对象结构、类继承和消息链，最容易通过图形来解释。\n\
    \n现在让我们考虑面向对象系统的结构。它由对象之间发送的消息决定。也就是说，一个对象必须持有对另一个对象的引用才能向其发送消息。由此产生的系统结构如下图所示。\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_223_0.png)\n\n在Python中，这种结构是通过使实例变量引用适当的对象来实现的。这是存在于系统实例之间的结构，与作为实例模板的类无关。\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_224_0.png)\n\n我们现在考虑创建实例的类。我们可以假设每个对象都是一个等价类的实例（见上图(a)）。然而，正如已经指出的，其中一些类具有非常强的相似性。特别是，保险丝、继电器、电机和水泵共享许多共同特征。下表比较了这些对象的特征（实例变量和服务）。\n\
    \n| | 保险丝 | 继电器 | 电机 | 水泵 |\n|---|---|---|---|---|\n| 实例变量 | state | state | state\
    \ | state |\n| 服务 | working? | working? | working? | working? |\n\n从这个表格看，这些对象仅在名称上有所不同。这表明它们都是一个公共类（如Component）的实例。该类将拥有一个额外的实例变量，以简化对象标识。\n\
