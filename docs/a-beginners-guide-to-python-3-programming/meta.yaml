    cursor = (0, 10)\nlocator(cursor)\ncursor = (10, 0)\nlocator(cursor)\ncursor =\
    \ (10, 5)\nlocator(cursor)\n```\n\nThe output from this code snippet is:\n\n```\n\
    Corner\nLeft edge at x=0, y=10\nTop edge at x=10, y=0\nPoint in grid at x=10,\
    \ y=5\n```"
