  md: "In general, in software design and development it is considered best practice\
    \ to define something once and to reuse that something when required.\nIn an object-oriented\
    \ system we can achieve the reuse of data or behaviour via inheritance. That is\
    \ one class (in this case the `Employee` class) can *inherit* features from another\
    \ class (in this case `Person`). This is shown pictorially below:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_249_0.png)\n\
    \nIn this diagram the `Employee` class us shown as inheriting from the `Person`\
    \ class. This means that the `Employee` class obtains all the data and behaviour\
    \ of the `Person` class. It is therefore as though the `Employee` class has defined\
    \ three attributes `name`, `age` and `id` and two methods `birthday()` and `calculate_pay()`.\n\
    A class that is defined as extending a parent class has the following syntax:\n\
    \n```\npython\nclass SubClassName(BaseClassName):\n    class-body\n```\n\nNote\
    \ that the parent class is specified by providing the name of the class in round\
    \ brackets after the name of the new (child) class.\n\n# 21.3 Defining Inheritance\
    \ Between Classes\n\nWe can define the class `Person` in Python as before:\n\n\
    ```\npython\nclass Person:\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n\n    def birthday(self):\n        print('Happy\
    \ birthday you were', self.age)\n        self.age += 1\n        print('You are\
    \ now', self.age)\n```"
