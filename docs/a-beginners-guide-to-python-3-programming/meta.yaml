  md: "# 28.9 The Descriptor Protocol\n\nAnother protocol that you may come across\
    \ is the *descriptor* protocol that was introduced back in Python 2.2.\n\nDescriptors\
    \ can be used to create what are known as *managed attributes*. A managed attribute\
    \ is an object attribute that is managed (or protected) from direct access by\
    \ external code via the *descriptor*. The *descriptor* can then take whatever\
    \ action is appropriate such as validating the data, checking the format, logging\
    \ the action, updating a related attribute, etc.\n\nThe descriptor protocol defines\
    \ four methods (as usual they are considered special methods and thus start with\
    \ a double underbar '__'):\n\n+   - `__get__(self, instance, owner)` This method\
    \ is called when the value of an attribute is accessed. The `instance` is the\
    \ instance being modified, and the `owner` is the class defining the object. This\
    \ method should return the (computed) attribute value or raise an `AttributeError`\
    \ exception.\n- `__set__(self, instance, value)` This is called when the value\
    \ of an attribute is being set. The parameter `value` is the new value being set.\n\
    - `__delete__(self, instance)` Called to delete the attribute.\n- `__set_name__(self,\
    \ owner, name)` Called at the time the owning class `owner` is created. The descriptor\
    \ has been assigned to `name`. This method was added to the protocol in Python\
    \ 3.6.\n\nThe following class `Logger` implements the *Descriptor* protocol. It\
    \ can therefore be used with other classes to log the creation, access and update\
    \ of whatever attribute it is defined for.\n\n```\nclass Logger(object):\n   \
    \ \"\"\"Logger class implementing the descriptor protocol\"\"\"\n    def __init__(self,\
    \ name):\n        self.name = name\n\n    def __get__(self, inst, owner):\n  \
    \      print('__get__:', inst, 'owner', owner,\n              ', value', self.name,\
    \ '=',\n              str(inst.__dict__[self.name]))\n        return inst.__dict__[self.name]\n\
    \n    def __set__(self, inst, value):\n        print('__set__:', inst, '-', self.name,\
    \ '=',\n              value)\n        inst.__dict__[self.name] = value\n\n   \
    \ def __delete__(self, instance):\n        print('__delete__', instance)\n\n \
    \   def __set_name__(self, owner, name):\n        print('__set_name__', 'owner',\
    \ owner, 'setting',\n              name)\n```"
  merge: -1
