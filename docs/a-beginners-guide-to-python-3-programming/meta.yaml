  md: '# Chapter 42

    Python Virtual Environments


    # 42.1 Introduction


    The Python runtime environment was originally designed a long time ago, and as
    such one of the aspects that is still a little old fashioned is how it deals with
    additional *third-party* libraries and how they are installed. In this chapter
    we will look at what we mean by third-party libraries, what happens when such
    a library is installed into your Python runtime environment, the purpose and use
    of virtual environments and the tool `pip` and conclude by looking at how an IDE
    such as PyCharm actually makes working with these environments straight forward.


    # 42.2 Third-Party Libraries


    The Python runtime environment comes with many built-in libraries (aka modules)
    such as the `sys`, `os`, `random` and `math`. Information on these can be found
    online at the Python Module Index (see [https://docs.python.org/3/py-modindex.html](https://docs.python.org/3/py-modindex.html)).
    Note that colloquially we often use the term library to mean a Python module.
    Why is this? In the main it''s because a library could be made up of one or more
    modules (or indeed packages). The term library is thus a looser (non-technical)
    term to indicate we are talking about something that isn''t directly available
    by default. That is we must use some form of `import` statement to access the
    code. Thus if I want to access the `os` module (library) then I need to import
    it into my program, for example:


    ```

    import os

    print(os.uname())

    ```


    which will return information on the current operating system, for example:


    ```

    posix.uname_result(sysname=''Darwin'', nodename=''Johns-

    ```'
