  md: '# 43.2.4 Adding New Data to a Class


    Monkey Patching is not just limited to functionality; it is also possible to add
    new data attributes to a class. For example, if we wanted each `Bag` to have a
    `name` then we could add a new attribute to the class to hold its name:


    ```

    Bag.name = ''My Bag''

    print(b.name)

    ```


    Which prints out the string ''My Bag'' which now acts as a default value of the
    name of any `Bag`. Once the attribute is added we can then change the name of
    this particular instance of a `Bag`:


    For example, if we extend the above example:


    ```

    Bag.name = ''My Bag''

    print(b.name)


    b.name = ''Johns Bag''

    print(b.name)


    b2 = Bag()

    print(b2.name)

    ```


    We can now generate


    ```

    My Bag

    Johns Bag

    My Bag

    ```


