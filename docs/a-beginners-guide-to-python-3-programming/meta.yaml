  - '[PAGE 69]


    ```

    Hello John

    What is the name of your best friend: Denise

    Hello Best Friend Denise

    ```


    As you can see from this when the string ‘Hello Best Friend’ is printed, it is
    the name ‘Denise’ that is printed alongside it.

    This is because the area of memory that previously held the string ‘John’ now
    holds the string ‘Denise’.

    In fact, in Python the variable name is not restricted to hold a string such as
    ‘John’ and ‘Denise’; it can also hold other types of data such as numbers or the
    values True and False. For example:


    ```

    my_variable = ''John''

    print(my_variable)

    my_variable = 42

    print(my_variable)

    my_variable = True

    print(my_variable)

    ```


    The result of running the above example is


    ```

    John

    42

    True

    ```


    As you can see my_variable first holds (or references the area of memory containing)
    the string ‘John’, it then holds the number 42 , and finally it holds the Boolean
    value True (Boolean values can only be True of False).

    This is referred to in Python as Dynamic Typing. That is the type of the data
    held by a variable can dynamically change as the program executes. Although this
    may seem like the obvious way to do things, it is not the approach used by many
    programming languages such as Java and C# where variables are instead statically
    typed. The word static is used here to indicate that the type of data that a variable
    can hold will be determined when the program is first processed (or compiled).
    Later on it will not be possible to change the type of data it can hold; thus
    if a variable is to hold a number it cannot later on hold a string.

    Both approaches have their pros and cons; but for many people the flexibility
    of Pythons variables is one of its major advantages.


    # 4.5 Naming Conventions


    You may have noticed something about some of the variable names we have introduced
    above such as user_name and my_variable. Both these variable names are formed
    of a set of characters with an underbar between the ‘words’ in the variable name.'
  - '[PAGE 70]


    Both these variable names highlight a very widely used naming convention in Python,
    which is that variable names should:


    +   - be all lowercase,

    - be in general more descriptive than variable names such as *a* or *b* (although
    there are some exceptions such as the use of variables *i* and *j* in looping
    constructs),

    - with individual words separated by underscores as necessary to improve readability.


    This last point is very important as in Python (and most computer programming
    languages) spaces are treated as separators which can be used to indicate where
    one thing ends and another starts. Thus it is not possible to define a variable
    name such as:


    +   - user name


    As the space is treated by Python as a separator and thus Python thinks you are
    defining two things ‘user’ and ‘name’.

    When you create your own variables, you should try to name then following the
    Python accepted style thus name such as:


    +   - my_name, your_name, user_name, account_name

    - count, total_number_of_users, percentage_passed, pass_rate

    - where_we_live, house_number,

    - is_okay, is_correct, status_flag


    are all acceptable but


    +   - A, Aaaaa, aaAAAaa

    - Myname, myName, MyName or MYName

    - WHEREWELIVE


    do not meet the accepted conventions.

    However, it is worth mentioning that there are merely commonly adhered to *conventions*
    and even Python itself does not always comply with these conventions. Thus if
    you define a variable name that does not conform to the convention Python will
    not complain.


    # 4.6 Assignment Operator


    One final aspect of the statement shown below has yet to be considered


    ```

    user_name = input(''Enter your name: '')

    ```


    What does exactly is this ‘= ‘ between `user_name` variable and the `input()`
    function?'
  - "[PAGE 71]\n\nIt is called the *assignment* operator. It is used to assign the\
    \ value returned by the function `input()` to the variable `user_name`. It is\
