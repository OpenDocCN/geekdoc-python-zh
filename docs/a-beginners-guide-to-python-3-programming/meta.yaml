  - "[PAGE 372]\n\n# 31.3 Coroutines\n\nCoroutines were introduced in Python 2.5 but\
    \ are still widely misunderstood. Much documentation introduces coroutines by\
    \ saying that they are similar to generators, however, there is a fundamental\
    \ difference between generators and coroutines:\n\n+   1. Generators are data\
    \ producers,\n2. Coroutines are data *consumers*.\n\nThat is coroutines *consume*\
    \ data produced by something else; whereas a generator produces a sequence of\
    \ values that something else can process.\n\nThe `send()` function is used to\
    \ send values to a coroutine. These data items are made available within the coroutine;\
    \ which will wait for values to be supplied to it. When a value is supplied then\
    \ some behaviour can be triggered. Thus, when a coroutine consumes a value it\
    \ triggers some behaviour to be processed.\n\nPart of the confusion between generators\
    \ and coroutines is that the `yield` keyword is reused within a coroutine; it\
    \ is used within a coroutine to cause the coroutine to wait until a value has\
    \ been sent. It will then supply this value to the coroutine.\n\nIt is also necessary\
    \ to *prime* a coroutine using with `next()` or `send(None)` functions. This advances\
    \ the coroutine to the call to `yield` where it will then wait until a value is\
    \ sent to it.\n\nA coroutine may continue forever unless `close()` is sent to\
    \ it. It is possible to pick up on the coroutine being closed by catching the\
    \ `GeneratorExit` exception; you can then trigger some shut down behaviour if\
    \ required.\n\nAn example of a coroutine is given by the `grep()` function below:\n\
    \n```\ndef grep(pattern):\n    print('Looking for', pattern)\n    try:\n     \
    \   while True:\n            line = (yield)\n            if pattern in line:\n\
    \                print(line)\n    except GeneratorExit:\n        print('Exiting\
    \ the Co-routine')\n```\n\nThis coroutine will wait for input data; when data\
    \ is sent to the coroutine, then that data will be assigned to the `line` variable.\
    \ It will then check to see if the pattern used to initialize the coroutine function\
    \ is present in the `line`; if it is it will print the `line`; it will then loop\
    \ and wait for the next data item to be sent to the coroutine. If while it is\
    \ waiting the coroutine is closed, then it will catch the `GeneratorExit` exception\
    \ and print out a suitable message."
