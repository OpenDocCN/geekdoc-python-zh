    is passed to code to handle this is known as *throwing* an exception. These are
    terms that will hopefully become more obvious as this chapter progresses.


    # ## 26.4 What is Exception Handling?


    An exception moves the flow of control from one place to another. In most situations,
    this is because a problem occurs which cannot be handled locally but that can
    be handled in another part of the system.


    The problem is usually some sort of error (such as dividing by zero), although
    it can be any problem (for example, identifying that the postcode specified with
    an address does not match). The purpose of an exception, therefore, is to handle
    an error condition when it happens at runtime.


    It is worth considering why you should wish to handle an exception; after all
    the system does not allow an error to go unnoticed. For example, if we try to
    divide by'
