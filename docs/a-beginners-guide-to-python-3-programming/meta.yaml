  md: '# 42.3.1 Finding the Pip Version


    You can easily check to see if pip is installed in your environment using the
    pip --version command, for example, at a Command Prompt or within a terminal window
    you can type:


    ```

    pip --version

    ```


    depending on your configuration and operating system you should see something
    similar to:


    ```

    % pip --version

    pip 23.0.1 from /usr/local/lib/python3.11/site-packages/pip (python 3.11)

    %

    ```


    This indicates that in the installation on this Apple Mac, that the current version
    of pip is version 23.0.1.


    # 42.3.2 Installing Pip


    If you do not have pip installed then you can download it and install it yourself
    from the pip download page on the pypi.org site (see https://pypi.org/project/pip/).


    Interestingly, the pip tool is treated as if it was a separate module by the Python
    environment, this means that you can also update the pip tool without updating
    the whole Python runtime. This may be useful if a bug fix is released for pip
    but it is not included in the current release of Python yet.


    # 42.3.3 Updating Pip


    To update pip you can use pip itself! That is pip can be used to install an update
    to pip (this may sound confusing but is actually perfectly fine as the pip tool
    will update the installation of pip and the next time you run pip the new version
    will automatically be picked up).


    To update pip itself use:


    ```

    pip install --upgrade pip

    ```


    Note that this is the pip command being passed the request to install something,
    in this case the upgrade for pip. On Windows you might want to use a variation
    on this command as shown below:


    ```

    python -m pip install --upgrade pip

    ```'
