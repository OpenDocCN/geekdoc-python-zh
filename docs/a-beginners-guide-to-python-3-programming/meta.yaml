  md: "Indeed, in Python, it is not necessary to be an actual subclass of a parent\
    \ class to be considered a subclass—instead *Virtual* subclasses allow one class\
    \ to be treated as a subclass of another even though there is no direct inheritance\
    \ relationship between them. The key here is that the *virtual* subclass must\
    \ match the required *interface* presented by the virtual parent class.\n\nThis\
    \ is done by registering one class as a Virtual Subclass of an Abstract Base Class.\
    \ That is, the virtual parent class must be an ABC and then the subclass can be\
    \ registered (at runtime) as a *virtual* subclass of the ABC. This is done using\
    \ a method called `register()`.\n\nOnce a class is registered as a subclass of\
    \ an ABC the `issubclass()` and `isinstance()` methods will return `True` for\
    \ that class with respect to the virtual parent class.\n\nFor example, given the\
    \ following two currently independent classes:\n\n```\nfrom abc import ABC\n\n\
    class Person(ABC):\n    def __init__(self, name, age):\n        self.name = name\n\
    \        self.age = age\n\n    def birthday(self):\n        print('Happy Birthday')\n\
    \nclass Employee(object):\n    def __init__(self, name, age, id):\n        self.name\
    \ = name\n        self.age = age\n        self.id = id\n\n    def birthday(self):\n\
    \        print('Its your birthday')\n```\n\nIf we now check to see if `Employee`\
    \ is a subclass of `Person` we will get the value `False` returned. We will of\
    \ course also get `False` if we check to see an instance of `Employee` is actually\
    \ an instance of the class `Person`:\n\n```\nprint(issubclass(Employee, Person))\n\
    e = Employee('Megan', 21, 'MS123')\nprint(isinstance(e, Person))\n```\n\nThis\
    \ will generate the output:\n\n```\nFalse\nFalse\n```\n\nHowever, if we now register\
    \ the class `Employee` as a virtual subclass of the class `Person`, the two test\
    \ methods will return `True`:\n\n```\nPerson.register(Employee)\nprint(issubclass(Employee,\
    \ Person))\ne = Employee('Megan', 21, 'MS123')\nprint(isinstance(e, Person))\n\
    ```"
  merge: -1
