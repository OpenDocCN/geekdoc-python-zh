  md: '# 21.4 Terminology Around Inheritance


    The following terminology is commonly used with inheritance in most object-oriented
    languages including Python:


    *Class* A class defines a combination of data and procedures that operate on that
    data.


    *Subclass* A subclass is a class that inherits from another class. For example,
    an `Employee` might inherit from a class `Person`. Subclasses are, of course,
    classes in their own right. Any class can have any number of subclasses.


    *Superclass* A superclass is the parent of a class. It is the class from which
    the current class inherits. For example, `Person` might be the superclass of `Employee`.
    In Python, a class can have any number of superclasses.


    *Single or multiple inheritance* Single and multiple inheritance refer to the
    number of super classes from which a class can inherit. For example, Java is a
    single inheritance system, in which a class can only inherit from one class. Python
    by contrast is a multiple inheritance system in which a class can inherit from
    one or more classes.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_252_0.png)


    Note that a set of classes, involved in an inheritance hierarchy, such as those
    shown above is often named after the class at the root (top) of the hierarchy;
    in this case it would make these classes part of the `Person` class hierarchy.


    # 21.4.1 Types of Hierarchy


    In most object-oriented systems there are two types of hierarchy; one refers to
    *inheritance* (whether single or multiple) and the other refers to *instantiation*.
    The inheritance hierarchy has already been described. It is the way in which one
    class inherits features from a superclass.'
  merge: -1
