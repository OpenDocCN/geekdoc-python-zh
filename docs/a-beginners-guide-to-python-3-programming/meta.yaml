- md: '## 6.5 Complex Numbers


    Complex numbers are Python''s third type of built-in numeric type. A complex number
    is defined by a real part and an imaginary part and has the form a + bi (where
    i is the imaginary part and a and b are real numbers):


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_96_0.png)


    The real part of the number (a) is the real number that is being added to the
    pure imaginary number.

    The imaginary part of the number, or b, is the real number coefficient of the
    pure imaginary number.

    The letter ''j'' is used in Python to represent the imaginary part of the number,
    for example:


    ```

    c1 = 1j

    c2 = 2j

    print(''c1:'', c1, '', c2:'', c2)

    print(type(c1))

    print(c1.real)

    print(c1.imag)

    ```


    We can run this code and the output will be:


    ```

    c1: 1j , c2: 2j

    <class ''complex''>

    0.0

    1.0

    ```


    As you can see the type of the number is ''complex'' and when the number is printed
    directly it is done so by printing both the real and imaginary parts together.

    Don''t worry if this is confusing; it is unlikely that you will need to use complex
    numbers unless you are doing some very specific coding, for example within a scientific
    field.


    ## 6.6 Boolean Values


    Python supports another type called Boolean; a Boolean type can only be one of
    True or False (and nothing else). Note that these values are True (with a capital
    T) and False (with a capital F); true and false in Python are not the same thing
    and have no meaning on their own.

    The equivalent of the int or float class for Booleans is bool.


    The following example illustrates storing the two Boolean values into a variable
    all_ok:


    ```

    all_ok = True

    print(all_ok)

    all_ok = False

    print(all_ok)

    print(type(all_ok))

    ```


    The output of this is


    ```

    True

    False

    <class ''bool''>

    ```


    The Boolean type is actually a sub type of integer (but with only the values True
    and False) so it is easy to translate between the two, using the functions int()
    and bool() to convert from Booleans to Integers and vice versa. For example:


    ```

    print(int(True))

    print(int(False))

    print(bool(1))

    print(bool(0))

    ```


    Which produces


    ```

    1

    0

    True

    False

    ```


    You can also convert strings into Booleans as long as the strings contain either
    True or False (and nothing else). For example:


    ```

    status = bool(input(''OK to proceed: ''))

    print(status)

    print(type(status))

    ```


    When we run this


    ```

    OK to proceed: True

    True

    <class ''bool''>

    ```


    ## 6.7 Arithmetic Operators


    Arithmetic operators are used to perform some form of mathematical operation such
    as addition, subtraction, multiplication and division, etc. In Python they are
    represented by one or two characters. The following table summarizes the Python
    arithmetic operators:


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | + | Add the left and right values together | 1 + 2 |

    | - | Subtract the right value from the left value | 3 - 2 |

    | * | Multiply the left and right values | 3 * 4 |

    | / | Divide the left value by the right value | 12 / 3 |

    | // | Integer division (ignore any remainder) | 12 // 3 |

    | % | Modulus (aka the remainder operator)—only return any remainder | 13 % 3
    |

    | ** | Exponent (or power of) operator—with the left value raised to the power
    of the right | 3 ** 4 |


    ### 6.7.1 Integer Operations


    Two integers can be added together using +, for example 10 + 5. In turn two integers
    can be subtracted (10 – 5) and multiplied (10 * 4). Operations such as +, – and
    * between integers always produce integer results.

    This is illustrated below:


    ```

    home = 10

    away = 15

    print(home + away)

    print(type(home + away))


    print(10 * 4)

    print(type(10*4))


    goals_for = 10

    goals_against = 7

    print(goals_for - goals_against)

    print(type(goals_for - goals_against))

    ```


    The output from this is


    ```

    25

    <class ''int''>

    40

    <class ''int''>

    3

    <class ''int''>

    ```


    However, you may notice that we have missed out division with respect to integers,
    why is this? It is because it depends on which division operator you use as to
    what the returned type actually is.


    For example, if we divide the integer 100 by 20 then the result you might reasonably
    expect to produce might be 5; but it is not, it is actually 5.0:


    ```

    print(100 / 20)

    print(type(100 / 20))

    ```


    The output is


    ```

    5.0

    <class ''float''>

    ```


    And as you can see from this the type of the result is `float` (that is a floating
    point number). So why is this the case?


    The answer is that division does not know whether the two integers involved divide
    into one another exactly or not (i.e., is there a remainder). It therefore defaults
    to producing a floating point (or real) number which can have a fractional part.
    This is of course necessary in some situations, for example if we divide 3 by
    2:


    ```

    res1 = 3/2

    print(res1)

    print(type(res1))

    ```


    In this case 3 cannot be exactly divided by 2, we might say that 2 goes into 3
    once with a remainder. This is what is shown by Python:


    ```

    1.5

    <class ''float''>

    ```


    The result is that 2 goes into 3, 1.5 times with the type of the result being
    a `float`. If you are only interested in the number of times 2 does go into 3
    and are happy to ignore the fractional part then there is an alternative version
    of the divide operator `//`. This operator is referred to as the integer division
    operator:


    ```

    res1 = 3//2

    print(res1)

    print(type(res1))

    ```


    which produces


    ```

    1

    <class ''int''>

    ```


    But what if you are only interested in the remainder part of a division, the integer
    division operator has lost that? Well in that case you can use the modulus operation
    (`%`). This operator returns the remainder of a division operation: for example:


    ```

    print(''Modulus division 4 % 2:'', 4 % 2)

    print(''Modulus division 3 % 2:'', 3 % 2)

    ```


    Which produces:


    ```

    Modulus division 4 % 2: 0

    Modulus division 3 % 2: 1

    ```


    A final integer operator we will look at is the power operator that can be used
    to raise an integer by a given power, for example 5 to the power of 3. The power
    operator is ''**'', this is illustrated below:


    ```

    a = 5

    b = 3

    print(a ** b)

    ```


    Which generates the number 125.


    ### 6.7.2 Negative Number Integer Division


    It is also worth just exploring what happens in integer and true division when
    negative numbers are involved. For example,


    ```

    print(''True division 3/2:'', 3 / 2)

    print(''True division -3/2:'', -3 / 2)

    print(''Integer division 3//2:'', 3 // 2)

    print(''Integer division -3//2:'', -3 // 2)

    ```


    The output from this is:


    ```

    True division 3/2: 1.5

    True division -3/2: -1.5

    Integer division 3//2: 1

    Integer division -3//2: -2

    ```


    The first three of these might be exactly what you expect given our earlier discussion;
    however, the output of the last example may seem a bit surprising, why does 3//2
    generate 1 but -3//2 generates -2?


    The answer is that Python always rounds the result of *integer* division towards
    minus infinity (which is the smallest negative number possible). This means it
    pulls the result of the integer division to the smallest possible number, 1 is
    smaller than 1.5 but -2 is smaller than -1.5.


    ### 6.7.3 Floating Point Number Operators


    We also have the multiply, subtract, add and divide operations available for floating
    point numbers. All of these operators produce new floating point numbers:


    ```

    print(2.3 + 1.5)

    print(1.5 / 2.3)

    print(1.5 * 2.3)

    print(2.3 - 1.5)

    print(1.5 - 2.3)

    ```


    These statements produce the output given below:


    ```

    3.8

    0.6521739130434783

    3.4499999999999997

    0.7999999999999998

    -0.7999999999999998

    ```


    ### 6.7.4 Integers and Floating Point Operations


    Any operation that involves both integers and floating point numbers will always
    produce a floating point number. That is, if one of the sides of an operation
    such as add, subtract, divide or multiply is a floating point number then the
    result will be a floating point number. For example, given the integer 3 and the
    floating point number 0.1 if we multiply them together then we get a floating
    point number:


    ```

    i = 3 * 0.1

    print(i)

    ```


    Executing this we get


    ```

    0.30000000000000004

    ```


    Which may or may not have been what you expected (you might have expected 0.3);
    however this highlights the comment at the start of this chapter relating to floating
    point (or real) numbers being represented as an approximation within a computer
    system. If this was part of a larger calculation (such as the calculation of the
    amount of interest to be paid on a very large loan over a 10 year period) then
    the end result might well be out by a significant amount.


    It is possible to overcome this issue using one of Python''s modules (or libraries).
    For example, the `decimal` module provides the Decimal class that will appropriately
    handle multiplying 3 and 0.1.


    ### 6.7.5 Complex Number Operators


