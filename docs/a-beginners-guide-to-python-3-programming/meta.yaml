  - "[PAGE 492]\n\n# 43.2.1 How Does Monkey Patching Work?\n\nPython is a dynamic\
    \ language which allows the definition of a type to change at runtime. As methods\
    \ on objects are in essence just another attribute of a class, albeit one that\
    \ can be executed, it is possible to add new functionality to a class by defining\
    \ new attributes that will hold references to the new behaviour.\n\n# 43.2.2 Monkey\
    \ Patching Example\n\nThe following class, Bag, implements a initialization method\
    \ `__init__()`, `__str__()` and the `__getitem__()` method used to support indexed\
    \ access to a container (or collection) type.\n\n```\nclass Bag():\n    def __init__(self):\n\
    \        self.data = ['a', 'b', 'c']\n\n    def __getitem__(self, pos):\n    \
    \    return self.data[pos]\n\n    def __str__(self):\n        return 'Bag(' +\
    \ str(self.data) + ')'\n\nb = Bag()\nprint(b)\n```\n\nThis creates a Bag object\
    \ and prints out the contents of the Bag:\n\n```\nBag(['a', 'b', 'c'])\n```\n\n\
    However, if we try to run\n\n```\nprint(len(b))\n```\n\nWe will get a runtime\
    \ error:\n\n```\nTraceback (most recent call last):\n  File \"Bag.py\", line 12,\
    \ in <module>\n    print(len(b))\nTypeError: object of type 'Bag' has no len()\n\
    ```\n\nThis is because the `len()` function expects the object passed to it will\
    \ implement the `__len__()` method that is be used to obtain its length. In this\
    \ case the class Bag does not implement this method.\n\nHowever, we can define\
    \ a stand-alone function that behaves in the way we would need the Bag to calculate\
    \ its length, for example:\n\n```\ndef get_length(self):\n```"
