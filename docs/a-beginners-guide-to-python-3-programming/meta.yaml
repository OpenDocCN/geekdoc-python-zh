  md: "# Chapter 28\nProtocols, Polymorphism and Descriptors\n\n# 28.1 Introduction\n\
    \nIn this chapter we will explore the idea of an implicit contract between an\
    \ object and the code that uses that object. As part of this discussion we will\
    \ explore what is meant by Duck Typing. Following this we will introduce the Python\
    \ concept called a *protocol*. We will explore its role within Python programming\
    \ and look at two commonly occurring protocols; the Context Manager Protocol and\
    \ the Descriptor Protocol.\n\n# 28.2 Implicit Contracts\n\nSome programming languages\
    \ (most notable Java and C#) have the idea of an explicit contract between a class\
    \ and the user of that class; this contract provides a guarantee of the methods\
    \ that will be provided and the types that will be used for parameters and return\
    \ values from these methods. In these languages it helps to guarantee that a method\
    \ is only called with the appropriate type of values and only in appropriate situations.\
    \ Slightly confusingly these contracts are referred to as *interfaces* in Java\
    \ and C# but are intended to describe the application programming *interface*\
    \ presented by the class.\n\nPython is a much more flexible and free flowing language\
    \ than either Java or C# and so has no explicit concept of an *interface*. This\
    \ can however make things more complex at times; for example, consider the very\
    \ simple `Calculator` class given below:\n\n```\nclass Calculator:\n    def add(self,\
    \ x, y):\n        return x + y\n```\n\nWhat are the valid values that can be passed\
    \ into the add method and used for the parameters `x` and `y`?"
