  md: '# 19.4 Creating Examples of the Class Person


    New instances/objects (examples) of the class `Person` can be created by using
    the name of the class and passing in the values to be used for the parameters
    of the initialization method (with the exception of the first parameter `self`
    which is provided automatically by Python).


    For example, the following creates two instances of the class Person:


    ```

    p1 = Person(''John'', 36)

    p2 = Person(''Phoebe'', 21)

    ```


    The variable `p1` holds a reference to the *instance or object* of the class `Person`
    whose attributes hold the values ''John'' (for the name attribute) and 36 (for
    the age attribute). In turn the variable `p2` references an instance of the class
    `Person` whose `name` and `age` attributes hold the values ''Phoebe'' and 21.
    Thus in memory we have:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_229_0.png)


    The two variables reference separate *instances* or examples of the class `Person`.
    They therefore respond to the same set of methods/operations and have the same
    set of attributes (such as `name` and `age`); however, they have their own values
    for those attributes (such as ''John'' and ''Phoebe'').


    Each instance also has its own unique identifier—that shows that even if the attribute
    values happen to be the same between two objects (for example, there happen to
    be two people called John who are both 36); they are still separate instances
    of the given class. This identifier can be accessed using the `id()` function,
    for example:


    ```

    print(''id(p1):'', id(p1))

    print(''id(p2):'', id(p2))

    ```


    When this code is run `p1` and `p2` will generate different identifiers, for example:


    ```

    id(p1): 4547191808

    id(p2): 4547191864

    ```


    Note that actual number generated may vary from that above but should still be
    unique (within your program).'
