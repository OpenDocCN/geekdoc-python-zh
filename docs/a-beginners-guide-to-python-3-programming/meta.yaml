    \ now add this statement to the main calculator loop:\n\n```\nfinished = False\n\
    while not finished:\n    result = 0\n    menu_choice = get_operation_choice()\n\
    \    n1, n2 = get_numbers_from_user()\n    # Select the operation\n    print('Result:',\
    \ result)\n    print('====================')\n    finished = check_if_user_has_finished()\n\
    \nprint('Bye')\n```\n\n## 14.9 Determining the Operation to Execute\n\nWe are\
    \ now almost there and can update our main calculation loop with some logic to\
    \ determine the actual operation to invoke. To do this we will use an if statement\
    \ with the optional elif parts. The if statement will be conditional on the operation\
    \ selected and will then call the appropriate function (such as add and subtract)\
    \ as shown here:\n\n```\nif menu_choice == '1':\n    result = add(n1, n2)\nelif\
    \ menu_choice == '2':\n    result = subtract(n1, n2)\nelif menu_choice == '3':\n\
    \    result = multiply(n1, n2)\nelif menu_choice == '4':\n    result = divide(n1,\
    \ n2)\n```\n\nEach part of the if statement calls a different function, but they\
    \ all store the value returned into the result variable.\nWe can now add this\
    \ to the calculation loop to create our fully functional calculator loop:\n\n\
    ```\nfinished = False\nwhile not finished:\n    result = 0\n    menu_choice =\
    \ get_operation_choice()\n    n1, n2 = get_numbers_from_user()\n    if menu_choice\
    \ == '1':\n        result = add(n1, n2)\n    elif menu_choice == '2':\n      \
    \  result = subtract(n1, n2)\n    elif menu_choice == '3':\n        result = multiply(n1,\
    \ n2)\n    elif menu_choice == '4':\n        result = divide(n1, n2)\n    print('Result:',\
    \ result)\n    print('==================')\n    finished = check_if_user_has_finished()\n\
    \nprint('Bye')\n```\n\n## 14.10 Running the Calculator\n\nIf you now run the calculator\
    \ you will be prompted as appropriate for input. You can try and break the calculator\
    \ by entering characters when numbers are requested or values out of range for\
    \ the operations, etc., and it should be resilient enough to handle these erroneous\
    \ inputs, for example:\n\n```\nSimple Calculator App\nMenu Options are:\n    1.\
    \ Add\n    2. Subtract\n    3. Multiply\n    4. Divide\n---------------------\n\
    Please make a selection: 5\nInvalid Input (must be 1 - 4)\nMenu Options are:\n\
    \    1. Add\n    2. Subtract\n    3. Multiply\n    4. Divide\n---------------------\n\
    Please make a selection: 1\n---------------------\nInput the first number: 5\n\
    Input the second number: 4\nResult: 9\n=====================\nDo you want to finish\
    \ (y/n): y\nBye\n```\n\n## 14.11 Exercises\n\nFor this chapter the exercises relate\
    \ to extensions to the calculator:\n\n- 1. Add an option to apply the modulus\
    \ (%) operator to the two numbers input by the user. This will involve defining\
    \ an appropriate function and adding this as an option to the menu. You will also\
    \ need to extend the main calculator control loop to handle this option.\n- 2.\
    \ Add a power of (**) option to the calculator.\n- 3. Modify the program to take\
    \ floating point numbers instead of simple integers.\n- 4. Allow the choice of\
    \ division operator or integer division operator (this have both '/' and '//')\
    \ available.\n\n# Chapter 15\nIntroduction to Functional Programming\n\n## 15.1\
    \ Introduction\n\nThere has been much hype around Functional Programming in recent\
    \ years. However, Functional Programming is not a new idea and indeed goes right\
    \ back to the 1950s and the programming language LISP. However, many people are\
    \ not clear as to what Functional Programming is and instead jump into code examples\
    \ and never really understand some of the key ideas associated with Functional\
    \ Programming such as Referential Transparency.\nThis chapter introduces Functional\
    \ Programming (also known as FP) and the key concept of Referential Transparency\
    \ (or RT).\nOne idea to be aware of is that Functional Programming is a software\
    \ coding style or approach and is separate from the concept of a function in Python.\n\
    Python functions can be used to write functional programs but can also be used\
    \ to write procedural style programs; so do not get too hung up on the syntax\
    \ that might be used or the fact that Python has functions just yet. Instead explore\
    \ the idea of defining a functional approach to your software design.\n\n## 15.2\
    \ What is Functional Programming?\n\nWikipedia describes Functional Programming\
    \ as:\n\n> ... a programming paradigm, a style of building the structure and elements\
    \ of computer programs, that treats computation as the evaluation of mathematical\
    \ functions and avoids state and mutable data.\n\nThere are a number of points\
    \ to note about this definition. The first is that it is focused on the *computational\
    \ side* of computer programming. This might seem obvious but most of what we have\
    \ looked at so far in Python would be considered procedural in nature.\n\nAnother\
    \ thing to note is that the way in which the computations are represented emphasizes\
    \ functions that generate results based purely on the data provided to them. That\
    \ is these functions only rely on their inputs to generate a new output. They\
    \ do not rely on any *side effects* and do not depend on the *current state* of\
    \ the program. As an example of a side effect, if a function stored a running\
    \ total in a global variable and another function used that total to perform some\
    \ calculation, then the first function has a side effect of modifying a global\
    \ variable and the second relies on some global state for its result.\n\nTaking\
    \ each of these in turn:\n\n- 1. **Functional Programming aims to avoid side effects.**\
    \ A function should be replaceable by taking the data it receives and in lining\
    \ the result generated (this is referred to as Referential Transparency). This\
    \ means that there should be no hidden side effects of the function. Hidden side\
    \ effects make it harder to understand what a program is doing and thus make comprehension,\
    \ development and maintenance harder. Pure functions have the following attributes:\n\
    - 2. The only observable output is the return value.\n- 3. The only output dependency\
    \ is the arguments.\n- 4. Arguments are fully determined before any output is\
    \ generated.\n- 5. **Functional Programming avoids concepts such as state.** Let\
    \ us take these as separate issues. If some operation is dependent upon the (potentially\
    \ hidden) state of the program or some element of a program, then its behaviour\
    \ may differ depending upon that state. This may make it harder to comprehend,\
    \ implement, test and debug. As all of these impact on the stability and probably\
    \ reliability of a system, state-based operations may result in less reliable\
    \ software being developed. As functions do not (should not) rely on any given\
    \ state (only upon the data they are given) they should as a result be easier\
    \ to understand, implement, test and debug.\n- 6. **Functional Programming promotes\
    \ immutable data.** Functional Programming also tends to avoid concepts such as\
    \ mutable data. Mutable data is data that can change its state. By contrast *immutability*\
    \ indicates that once created, data cannot be changed. In Python strings are immutable.\
    \ Once you create a new string you cannot modify it. Any functions that apply\
    \ to a string that might conceptually alter the contents of the string and result\
    \ in a new string being generated. Many developers take this further by having\
    \ a presumption of immutability in their code; that means that by default all\
    \ data holding types are implemented as immutable. This ensures that functions\
    \ cannot have hidden side effects and thus simplifies programming in general.\n\
    - 7. **Functional Programming promotes declarative programming** which means that\
    \ programming is oriented around expressions that describe the solution rather\
    \ than focus on the imperative approach of most procedural programming languages.\
    \ Imperative languages emphasize aspects of how the solution is"
