  md: "The output from this example is:\n\n```\nNot found\nSomething is wrong\n```\n\
    \nIn this case the first time `get_status_message()` is called the string ‘Not\
    \ found’ is returned, whereas when it is called with the value 401, there are\
    \ no explicit case conditions matching that value and thus the wildcard case condition\
    \ (the last one) runs. This means that the string ‘Something is wrong’ is returned\
    \ (and subsequently printed out).\n\n# 41.4 Capture Default Case\n\nIn some situations\
    \ it would be really useful to capture the unknown value in a match statement\
    \ and log that (possibly for further investigation at a later date). To do this\
    \ instead of using the wildcard from the previous section, you can use a *variable*.\
    \ The variable will be populated with the value that would have been compared\
    \ in the `case` condition and that is then available within the case condition\
    \ block of code. For example:\n\n```\ndef greeter4(language):\n    match language:\n\
    \        case 'English':\n            print('Hello')\n        case 'Spanish':\n\
    \            print('Hola')\n        case 'French':\n            print('Bonjour')\n\
    \        case 'German':\n            print('Hallo')\n        case unknown:\n \
    \           print(f'Language {unknown} is not yet known to us')\n\ngreeter4('Welsh')\n\
    ```\n\nIn this case if the language specified is not ‘English’, ‘Spanish’, ‘French’\
    \ or ‘German’, then the value used will be bound to the variable `unknown`, and\
    \ then this can be logged in the print statement.\n\nThus the output from this\
    \ code example is:\n\n```\nLanguage Welsh is not yet known to us\n```\n\nNote\
    \ that the name of the variable used in the case condition can be any legal Python\
    \ variable; here we have used ‘unknown’ just as an example."
