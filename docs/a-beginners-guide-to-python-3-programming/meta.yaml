    In general, these facilities are most likely to be used by those creating libraries
    as they allow for great flexibility in how the library can be used.


    # 12.10 Anonymous Functions


    All the functions we have defined in this chapter have had a *name* that they
    can be referenced by, such as `greeter` or `get_integer_input`. This means that
    we can reference and reuse these functions as many times as we like.


    However, in some cases we want to create a function and use it only once; giving
    it a name for this one time can *pollute* the namespace of the program (i.e.,
    there are lots of names around) and also means that someone might call it when
    we don''t expect them to.


    Python therefore has another option when defining a function; it is possible to
    define an *anonymous* function. In Python an anonymous function is one that does
    not have a name and can only be used at the point that it is defined.


    Anonymous functions are defined using the keyword `lambda`, and for this reason
    they are also known as lambda functions.


    The syntax used to define an anonymous function is:


    ```

    lambda arguments: expression

    ```


    Anonymous functions can have any number of arguments but only one expression (that
    is a statement that returns a value) as their body. The expression is executed,
    and the value generated from it is returned as the result of the function.


    As an example, let us define an anonymous function that will square a number:


    ```

    double = lambda i : i * i

    ```


    In this example the lambda definition indicates that there is one parameter to
    the anonymous function (''i'') and that the body of the function is defined after
    the colon '':'' which multiples `i * i`; the value of which is returned as the
    result of the function. The whole anonymous function is then stored into a variable
    called double.


    We can store the anonymous function into the variable as all functions are instances
    of the class function and can be referenced in this way (we just haven''t done
    this so far).'
