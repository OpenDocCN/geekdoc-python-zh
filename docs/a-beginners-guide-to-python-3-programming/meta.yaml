    \ the greeter function taken defines two parameters: name and message. These parameters\
    \ (which are local to the function and cannot be seen outside of the function)\
    \ are then used within the body of the function.\n\nThe output is\n\n```\nWelcome\
    \ Eloise - Hope you like Rugby\n```\n\nYou can have any number of parameters defined\
    \ in a function (prior to Python 3.7 there was a limit of 256 parameters—although\
    \ if you have this many then probably you have a major problem with the design\
    \ of your function—however this limit has now gone).\n\n# 12.9.2 Default Parameter\
    \ Values\n\nOnce you have one or more parameters you may want to provide *default*\
    \ values for some or all of those parameters, particularly for ones which might\
    \ not be used in most cases.\n\nThis can be done very easily in Python; all that\
    \ is required is that the default value must be declared in the function header\
    \ along with the parameter name.\n\nIf a value is supplied for the parameter,\
    \ then it will override the default. If no value is supplied when the function\
    \ is called, then the default will be used.\n\nFor example, we can modify the\
    \ `greeter()` function from the previous section to provide a default message\
    \ such as ‘Live Long and Prosper’.\n\n```\ndef greeter(name, message = 'Live Long\
    \ and Prosper'):\n    print('Welcome', name, '-', message)\n\ngreeter('Eloise')\n\
    greeter('Eloise', 'Hope you like Rugby')\n```\n\nNow we can call the `greeter()`\
    \ function with one or two arguments. When we run this example, we will get:\n\
    \n```\nWelcome Eloise - Live Long and Prosper\nWelcome Eloise - Hope you like\
    \ Rugby\n```"
