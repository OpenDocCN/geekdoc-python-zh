    \ the functions *name* and this is used in the `inner()` function above to printout\
    \ the actual function about to be invoked.\n\nNote that the function `inner()`\
    \ is defined inside the `logger()` function (this is completely legal). A reference\
    \ to the `inner()` function is then returned as the result of the `logger()` function.\
    \ The `inner()` function is not executed above!"
