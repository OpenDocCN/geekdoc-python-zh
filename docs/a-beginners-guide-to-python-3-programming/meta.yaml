    NumPy style docstrings (see [https://betterprogramming.pub/3-different-docstring-formats-for-python-d27be81e0d68](https://betterprogramming.pub/3-different-docstring-formats-for-python-d27be81e0d68)).
    However we are going to look at reStructured Text style docstrings as this is
    the style recommended by the Python organization itself.


    ReStructured Text (aka ReST) is intended to be an easy-to-read markup syntax used
    to add additional meaning to the text within a docstring. Like many other simple
    markup languages it uses inline markup such as `*` or a `#` to indicate emphasis
    or lists, etc. and as such is intended to be much simpler and easier to use than
    more complex markup languages such as HTML.'
  - "[PAGE 162]\n\nAs a simple example, consider the following code:\n\n```\ndef get_integer_input(message):\n\
    \    \"\"\"\n    This function will display the message to the user\n    and request\
    \ that they input an integer.\n\n    :param message: The message to print\n  \
    \  :returns: the integer entered by the user\n\n    \"\"\"\n    value_as_string\
    \ = input(message)\n    while not value_as_string.isnumeric():\n        print('The\
    \ input must be an integer')\n        value_as_string = input(message)\n    return\
    \ int(value_as_string)\n```\n\nThis function has a docstring containing some reStructured\
    \ Text formatting, namely the :param and :returns directives.\n\nA directive is\
    \ an item of meta information that will be used by the ReST parser to generate\
    \ the formatted output.\n\n+   - In this case the :param directive indicates that\
    \ message is a parameter to the function and the information after the final :\
    \ provides a description of that parameter.\n- In turn the :returns : directive\
    \ indicates that this function returns a value and the text after this described\
    \ the meaning of the returned value.\n\nPyCharm uses this information and generates\
    \ reference documentation that can be viewed in the pop-up displayed when the\
    \ programmer hovers over a call to the get_integer_input function. This is displayed\
    \ below:\n\n```\nresponse = get_integer_input(\"Please input total: \")\nprint(f'The\
    \ response is {response}')\n```\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_162_0.png)"
- md: "As you can see the `params` and `returns` directives are displayed in such\
    \ a way as to make it easy to read and understand the information provided.\n\
    It is also possible to use ReST markup to emphasize text or to make the text bold\
    \ or to indicate that a value is a literal:\n\n- Emphasis is indicated using an\
    \ asterisk `*`, for example: *emphasis*.\n- Bold is indicated using a double asterisk\
    \ `**`, for example: **strong**.\n- Literal values, variables and small code samples\
    \ can be indicated using two back quotes, for example: ``literal``.\n\nFor example:\n\
    \n```\ndef get_input(prompt):\n    \"\"\"This function is primarily used to illustrate\
    \ ReST, for example:\n    This is used for *emphasis* while this is used for **bold**.\n\
    \    Finally this is used for a literal \"result\".\n    \"\"\"\n    result =\
    \ input(prompt)\n    return result\n```\n\nThis is rendered by PyCharm as shown\
    \ below:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_163_0.png)\n\nNote that if\
    \ asterisks or back quotes appear within the text and could be confused with inline\
    \ markup delimiters, they should be escaped with a backslash, for example: `\\\
    *`.\nThere are a few additional restrictions on this markup that you should be\
    \ aware of, including:\n\n- The markup cannot be nested; that is, you cannot nest\
    \ a bold element within an emphasis element.\n- The content may not start or end\
    \ with whitespace: `* text*` is wrong, as is `*text *`.\n- It must be separated\
    \ from surrounding text by non-word characters. It is thus necessary to use a\
    \ backslash escaped space to work around that for example: `thisis\\*one*\\ word`.\n\
    \nIt is also possible to create lists within ReST, bulleted lists are represented\
    \ by placing an asterisk at the start of a line, and numbered lists are represented\
    \ by a '#.'; it is also possible to explicitly number a list. Examples of these\
    \ are shown below:\n\n* This is a bulleted list.\n* It has two items, the second\
    \ item uses two lines.\n\n1. This is a numbered list.\n2. It has two items too.\n\
    \n#. This is a numbered list.\n#. It has two items too.\n\nFor example, when used\
    \ in a function docstring:\n\n```\ndef get_more_input(prompt):\n    \"\"\"This\
    \ function is used to illustrate lists, for example:\n\n    * This is a bulleted\
    \ list.\n    * It has two items, the second item uses two lines.\n\n    1. This\
    \ is a numbered list.\n    2. It has two items too.\n\n    #. This is a numbered\
    \ list.\n    #. It has two items as well.\n\n    \"\"\"\n    result = input(prompt)\n\
    \    return result\n```\n\nNested lists are possible, but be aware that they must\
    \ be separated from the parent list items by blank lines, for example:\n\n* this\
    \ is\n* a list\n\n    * with a nested list\n    * and some subitems\n\n* and here\
    \ the parent list continues\n\nAs an example, lists and sub lists are used below\
    \ within a function docstring that also uses a couple of directives for the parameter\
    \ and the return value.\n\n```\ndef get_something(prompt):\n    \"\"\"\n    We\
    \ can use lists:\n\n    * this is\n    * a list\n        * with a nested list\n\
    \        * and some subitems\n    * and here the parent list continues\n\n   \
    \ :param prompt: the input prompt\n    :return: the value entered by the user\n\
    \    \"\"\"\n    result = input(prompt)\n    return result\n```\n\nThis is illustrated\
    \ below:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_165_0.png)\n\nSection headers\
    \ are created by underlining the section title with a punctuation character, at\
    \ least as long as the text:\n\n```\nThis is a heading\n=================\n```\n\
    \nFinally, if you want to embed some source code as an example within a docstring\
    \ you can use the special marker `::`. This creates a literal block that will\
    \ not be processed as formatted text but must be indented and with a gap following\
    \ the `::`. For example:\n\n```\ndef get_another_thing(prompt):\n    \"\"\"\n\
    \    To use this function see the code block::\n\n        result = get_another_thing(\"\
    please input data: \")\n        print(result)\n\n    This is back to normal text\n\
    \    \"\"\"\n    result = input(prompt)\n    return result\n```\n\nPyCharm renders\
    \ this as:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_166_0.png)\n\n## 12.9 Function\
    \ Parameters\n\nBefore we go any further it is worth clarifying some terminology\
    \ associated with passing data into functions. This terminology relates to the\
    \ parameters defined as part of the function header and the data passed into the\
    \ function via these parameters:\n\n- A *parameter* is a variable defined as part\
    \ of the function header and is used to make data available within the function\
    \ itself.\n- An *argument* is the actual value or data passed into the function\
    \ when it is called. The data will be held within the parameters.\n\nUnfortunately\
    \ many developers use these terms interchangeably, but it is worth being clear\
    \ on the distinction.\n\n### 12.9.1 Multiple Parameter Functions\n\nSo far the\
    \ functions we have defined have only had zero or one parameter; however that\
    \ was just a choice. We could easily have defined a function which defined two\
    \ or more parameters. In these situations, the parameter list contains a list\
    \ of parameter names separated by a comma.\n\nFor example,\n\n```\ndef greeter(name,\
    \ message):\n    print('Welcome', name, '-', message)\n\ngreeter('Eloise', 'Hope\
    \ you like Rugby')\n```\n\nHere the greeter function taken defines two parameters:\
    \ name and message. These parameters (which are local to the function and cannot\
    \ be seen outside of the function) are then used within the body of the function.\n\
    \nThe output is\n\n```\nWelcome Eloise - Hope you like Rugby\n```\n\nYou can have\
    \ any number of parameters defined in a function (prior to Python 3.7 there was\
    \ a limit of 256 parameters—although if you have this many then probably you have\
    \ a major problem with the design of your function—however this limit has now\
    \ gone).\n\n### 12.9.2 Default Parameter Values\n\nOnce you have one or more parameters\
    \ you may want to provide *default* values for some or all of those parameters,\
    \ particularly for ones which might not be used in most cases.\n\nThis can be\
    \ done very easily in Python; all that is required is that the default value must\
    \ be declared in the function header along with the parameter name.\n\nIf a value\
    \ is supplied for the parameter, then it will override the default. If no value\
    \ is supplied when the function is called, then the default will be used.\n\n\
    For example, we can modify the `greeter()` function from the previous section\
    \ to provide a default message such as ‘Live Long and Prosper’.\n\n```\ndef greeter(name,\
    \ message = 'Live Long and Prosper'):\n    print('Welcome', name, '-', message)\n\
    \ngreeter('Eloise')\ngreeter('Eloise', 'Hope you like Rugby')\n```\n\nNow we can\
    \ call the `greeter()` function with one or two arguments. When we run this example,\
    \ we will get:\n\n```\nWelcome Eloise - Live Long and Prosper\nWelcome Eloise\
    \ - Hope you like Rugby\n```\n\nAs you can see from this in the first example\
    \ (where only one argument was provided) the default message was used. However,\
    \ in the second example where a message was provided, along with the name, then\
    \ that message was used instead of the default.\n\nNote we can use the terms *mandatory*\
    \ and *optional* for the parameters in `greeter()`. In this case\n\n- name is\
    \ a mandatory field/parameter.\n- message is an optional field/parameter (as it\
    \ has a default value).\n\nOne subtle point to note is that any number of parameters\
    \ in a function's parameter list can have a default value; however once one parameter\
    \ has a default value all remaining parameters to the right of that parameter\
    \ must also have default values. For example, we could *not* define the greeter\
    \ function as\n\n```\ndef greeter(message = 'Live Long and Prosper', name):\n\
    \    print('Welcome', name, '-', message)\n```\n\nAs this would generate an *error*\
    \ indicating that name must have a default value as it comes after (to the right\
    \ of) a parameter with a default value.\n\n### 12.9.3 Named Arguments\n\nSo far\
    \ we have relied on the position of a value to be used to determine which parameter\
    \ that value is assigned to. In many cases this is the simplest and cleanest option.\n\
    \nHowever, if a function has several parameters, some of which have default values,\
    \ it may become impossible to rely on using the position of a value to ensure\
    \ it is given to the correct parameter (because we may want to use some of the\
    \ default values instead).\n\nFor example, let us assume we have a function with\
    \ four parameters\n\n```\ndef greeter(name,\n           title = 'Dr',\n      \
    \     prompt = 'Welcome',\n           message = 'Live Long and Prosper'):\n  \
    \  print(prompt, title, name, '-', message)\n```\n\nThis now raises the question\
    \ how do we provide the `name` and the `message` arguments when we would like\
    \ to have the default `title` and `prompt`?\n\nThe answer is to use *named* arguments\
    \ (or *keyword* arguments). In this approach we provide the name of the parameter\
    \ we want an argument/value to be assigned to; position is no longer relevant.\
    \ For example:\n\n```\ngreeter(message = 'We like Python', name = 'Lloyd')\n```"
  mdcn: "如你所见，`params` 和 `returns` 指令的显示方式使得阅读和理解所提供的信息变得轻松便捷。\n你也可以使用 ReST 标记来强调文本、加粗文本或指示某个值是字面量：\n\
    \n- 强调使用星号 `*` 表示，例如：*强调*。\n- 加粗使用双星号 `**` 表示，例如：**加粗**。\n- 字面量值、变量和小型代码片段可以使用两个反引号表示，例如：``字面量``。\n\
    \n例如：\n\n```\ndef get_input(prompt):\n    \"\"\"This function is primarily used\
    \ to illustrate ReST, for example:\n    This is used for *emphasis* while this\
    \ is used for **bold**.\n    Finally this is used for a literal \"result\".\n\
    \    \"\"\"\n    result = input(prompt)\n    return result\n```\n\nPyCharm 将其渲染如下：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_163_0.png)\n\n请注意，如果星号或反引号出现在文本中，并且可能与内联标记分隔符混淆，则应使用反斜杠进行转义，例如：`\\\
    *`。\n关于此标记，还有一些额外的限制你需要了解，包括：\n\n- 标记不能嵌套；也就是说，你不能在强调元素内嵌套加粗元素。\n- 内容不能以空格开头或结尾：`*\
    \ text*` 是错误的，`*text *` 也是错误的。\n- 它必须通过非单词字符与周围的文本分隔开。因此，有必要使用反斜杠转义空格来解决这个问题，例如：`thisis\\\
    *one*\\ word`。\n\n在 ReST 中也可以创建列表，项目符号列表通过在行首放置星号来表示，编号列表则通过 `'#.'` 表示；也可以显式地为列表编号。下面展示了这些示例：\n\
    \n* 这是一个项目符号列表。\n* 它有两个项目，第二个项目使用了两行。\n\n1. 这是一个编号列表。\n2. 它也有两个项目。\n\n#. 这是一个编号列表。\n\
    #. 它也有两个项目。\n\n例如，在函数文档字符串中使用时：\n\n```\ndef get_more_input(prompt):\n    \"\"\"\
    This function is used to illustrate lists, for example:\n\n    * This is a bulleted\
    \ list.\n    * It has two items, the second item uses two lines.\n\n    1. This\
    \ is a numbered list.\n    2. It has two items too.\n\n    #. This is a numbered\
    \ list.\n    #. This is a numbered list.\n\n    \"\"\"\n    result = input(prompt)\n\
    \    return result\n```\n\n可以创建嵌套列表，但请注意它们必须通过空行与父列表项分隔开，例如：\n\n* 这是\n* 一个列表\n\
    \n    * 带有一个嵌套列表\n    * 和一些子项\n\n* 这里父列表继续\n\n下面是一个示例，列表和子列表在一个函数文档字符串中使用，该文档字符串还使用了几个用于参数和返回值的指令。\n\
    \n```\ndef get_something(prompt):\n    \"\"\"\n    We can use lists:\n\n    *\
    \ this is\n    * a list\n        * with a nested list\n        * and some subitems\n\
    \    * and here the parent list continues\n\n    :param prompt: the input prompt\n\
    \    :return: the value entered by the user\n    \"\"\"\n    result = input(prompt)\n\
    \    return result\n```\n\n下面对此进行了说明：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_165_0.png)\n\
    \n节标题通过在标题下方使用标点字符（长度至少与文本相同）进行下划线来创建：\n\n```\nThis is a heading\n=================\n\
    ```\n\n最后，如果你想在文档字符串中嵌入一些源代码作为示例，可以使用特殊标记 `::`。这将创建一个字面量块，该块不会作为格式化文本进行处理，但必须缩进，并且在\
    \ `::` 之后留有空行。例如：\n\n```\ndef get_another_thing(prompt):\n    \"\"\"\n    To use\
    \ this function see the code block::\n\n        result = get_another_thing(\"\
    please input data: \")\n        print(result)\n\n    This is back to normal text\n\
    \    \"\"\"\n    result = input(prompt)\n    return result\n```\n\nPyCharm 将其渲染为：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_166_0.png)\n\n## 12.9 函数参数\n\n在我们继续之前，有必要澄清一些与向函数传递数据相关的术语。这些术语与函数头中定义的参数以及通过这些参数传递给函数的数据有关：\n\
    \n- *参数* 是在函数头中定义的变量，用于在函数内部提供数据。\n- *实参* 是在调用函数时传递给函数的实际值或数据。数据将保存在参数中。\n\n不幸的是，许多开发者可以互换使用这些术语，但明确区分它们是值得的。\n\
    \n### 12.9.1 多参数函数\n\n到目前为止，我们定义的函数只有一个或零个参数；然而，这只是我们的选择。我们完全可以定义一个具有两个或多个参数的函数。在这些情况下，参数列表包含一个由逗号分隔的参数名列表。\n\
    \n例如，\n\n```\ndef greeter(name, message):\n    print('Welcome', name, '-', message)\n\
    \ngreeter('Eloise', 'Hope you like Rugby')\n```\n\n这里定义的 `greeter` 函数有两个参数：`name`\
    \ 和 `message`。这些参数（它们是函数的局部变量，在函数外部不可见）然后在函数体内使用。\n\n输出是\n\n```\nWelcome Eloise\
    \ - Hope you like Rugby\n```\n\n你可以在函数中定义任意数量的参数（在 Python 3.7 之前，限制是 256 个参数——尽管如果你有这么多参数，那么你的函数设计可能有重大问题——但这个限制现在已经取消了）。\n\
    \n### 12.9.2 默认参数值\n\n一旦你有一个或多个参数，你可能想为其中一些或所有参数提供*默认*值，特别是对于那些在大多数情况下可能不会使用的参数。\n\
    \n在 Python 中可以非常容易地做到这一点；只需要在函数头中与参数名一起声明默认值即可。\n\n如果为参数提供了值，那么它将覆盖默认值。如果在调用函数时没有提供值，则将使用默认值。\n\
    \n例如，我们可以修改上一节中的 `greeter()` 函数，提供一个默认消息，例如 'Live Long and Prosper'。\n\n```\n\
    def greeter(name, message = 'Live Long and Prosper'):\n    print('Welcome', name,\
    \ '-', message)\n\ngreeter('Eloise')\ngreeter('Eloise', 'Hope you like Rugby')\n\
    ```\n\n现在我们可以用一个或两个参数调用 `greeter()` 函数。当我们运行这个例子时，我们将得到：\n\n```\nWelcome Eloise\
    \ - Live Long and Prosper\nWelcome Eloise - Hope you like Rugby\n```\n\n从这个例子中你可以看到，在第一个例子中（只提供了一个参数），使用了默认消息。然而，在第二个例子中，提供了消息和名称，因此使用了该消息而不是默认消息。\n\
    \n请注意，我们可以使用*必选*和*可选*这两个术语来描述 `greeter()` 中的参数。在这种情况下\n\n- `name` 是一个必选字段/参数。\n\
    - `message` 是一个可选字段/参数（因为它有一个默认值）。\n\n一个微妙的点需要注意：函数参数列表中的任意数量的参数都可以有默认值；然而，一旦一个参数有了默认值，其右侧的所有剩余参数也必须有默认值。例如，我们*不能*将\
    \ `greeter` 函数定义为\n\n```\ndef greeter(message = 'Live Long and Prosper', name):\n\
    \    print('Welcome', name, '-', message)\n```\n\n因为这将产生一个*错误*，指出 `name` 必须有一个默认值，因为它位于（在右侧）一个具有默认值的参数之后。\n\
    \n### 12.9.3 命名参数\n\n到目前为止，我们一直依赖于值的位置来确定该值被分配给哪个参数。在许多情况下，这是最简单、最干净的选项。\n\n然而，如果一个函数有多个参数，其中一些有默认值，那么可能无法依赖于使用值的位置来确保它被赋予正确的参数（因为我们可能想使用一些默认值）。\n\
    \n例如，让我们假设我们有一个具有四个参数的函数\n\n```\ndef greeter(name,\n           title = 'Dr',\n\
    \           prompt = 'Welcome',\n           message = 'Live Long and Prosper'):\n\
    \    print(prompt, title, name, '-', message)\n```\n\n这就提出了一个问题：当我们想要使用默认的 `title`\
    \ 和 `prompt` 时，我们如何提供 `name` 和 `message` 参数？\n\n答案是使用*命名*参数（或*关键字*参数）。在这种方法中，我们提供我们希望参数/值被分配到的参数名；位置不再相关。例如：\n\
    \n```\ngreeter(message = 'We like Python', name = 'Lloyd')\n```"
