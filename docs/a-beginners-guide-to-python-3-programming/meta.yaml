- md: "## 27.8 Modules as Scripts\n\n```python\nx = 1 + 2\nprint('x is', x)\nf1()\n\
    f2()\n```\n\nWhen this file is run directly, or loaded into the Python REPL, then\
    \ the free-standing code will be executed and the output generated will be:\n\n\
    ```\nHello I am module 1\nx is 3\nf1[1]\nf2[1]\n```\n\nThis looks fine until you\
    \ try to use `module1` with your own code; the free-standing code will still execute\
    \ this if we now write:\n\n```python\nimport module1\n\nmodule1.f1()\n```\n\n\
    where you might expect only to see the result of running the `f1()` function from\
    \ `module1` you actually get:\n\n```\nHello I am module 1\nx is 3\nf1[1]\nf2[1]\n\
    f1[1]\n```\n\nThe first 4 lines are run when `module1` is loaded as they are free\
    \ standing executable statements within the module.\n\nWe can of course remove\
    \ the free-standing code; but what if we sometimes want to run `module1` as a\
    \ script and sometimes use it as a module imported into other modules?\n\nIn Python\
    \ we can distinguish between when a file is loaded as a module and when it is\
    \ being run as a standalone script. This is because Python sets the module property\
    \ `__name__` to the name of the module when it is being loaded as a module; but\
    \ if a file is being run as a standalone script (or the entry point of an application)\
    \ then the `__name__` is set to the string `__main__`. This is partly because\
    \ historically `main()` has been the entry point for applications in numerous\
    \ other languages such as C, C++, Java and C#.\n\nWe can now determine whether\
    \ a module is being loaded or run as a script / main application by checking the\
    \ `__name__` property of the module (which is directly accessible from within\
    \ a module). If the module is the `__main__` entry point run some code; if it\
    \ is not then do something else.\n\nFor example,\n\n```python\n\"\"\"This is a\
    \ test module\"\"\"\nprint('Hello I am module 1')\n\ndef f1():\n    print('f1[1]')\n\
    \ndef f2():\n    print('f2[1]')\n\nif __name__ == '__main__':\n    x = 1 + 2\n\
    \    print('x is', x)\n    f1()\n    f2()\n```\n\nNow the code within the if statement\
    \ will only be executed when this module is loaded as the starting point for an\
    \ application / script. Note that the print statement at the top of the module\
    \ will still be executed in both scenarios; this can be useful as it allows set\
    \ up or initialization behaviour to still be executed where appropriate.\n\nA\
    \ common pattern, or idiom is to place the code to be run when a file is being\
    \ loaded directly (rather than as a module) in a function called main() and to\
    \ call that function from within the if statement. This helps to clarify which\
    \ behaviour is intended to run when, thus our module's final version is:\n\n```python\n\
    \"\"\"This is a test module\"\"\"\nprint('Hello I am module 1')\n\ndef f1():\n\
    \    print('f1[1]')\n\ndef f2():\n    print('f2[1]')\n\ndef main():\n    x = 1\
    \ + 2\n    print('x is', x)\n    f1()\n    f2()\n\nif __name__ == '__main__':\n\
    \    main()\n```\n\nThis version is what would now be called *idiomatic* Python\
    \ or *Pythonic* in style.\n\n## 27.9 Python Packages\n\n### 27.9.1 Package Organization\n\
    \nPython allows developers to organize modules together into packages, in a hierarchical\
    \ structure based on directories.\n\nA package is defined as:\n\n- A directory\
