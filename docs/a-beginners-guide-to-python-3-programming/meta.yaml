    ## 40.13 Exercises\n\nWrite a short program to create an enumerated type for medals\
    \ at the Olympics, that is, Gold, Silver and Bronze. Gold should come before Silver\
    \ and Silver before Bronze. You should then extend your code so that an athlete\
    \ can be awarded one of these medals. The program should ask the user for each\
    \ athlete's name in turn and then award the first three athletes with a gold,\
    \ silver or bronze medal. The program can terminate when no athlete name is entered\
    \ (i.e., the user just presses enter).\n\nThe output form of this program might\
    \ look like:\n\n```\nStarting\nPlease enter the athlete's name: Natalia\nNatalia\
    \ obtained Medals.GOLD\nPlease enter the athlete's name: Adam\nAdam obtained Medals.SILVER\n\
    Please enter the athlete's name: Denise\nDenise obtained Medals.BRONZE\nPlease\
    \ enter the athlete's name: John\nJohn obtained no medal\nPlease enter the athlete's\
    \ name:\nDone\n```\n\n# Chapter 41\nStructural Pattern Matching\n\n## 41.1 Introduction\n\
    \nA new feature introduced in Python 3.10 was *structural pattern matching*. In\
    \ this chapter we will look at the use of the `match` keyword and how it can be\
    \ used with literal values, variables and containers such as lists and tuples.\n\
    \n## 41.2 Basic Pattern Matching\n\nIn its most basic form the `match` statement\
    \ acts very much like `match` and `case` statements from other languages such\
    \ as Java or JavaScript. That is, it is used to compare a value (typically held\
    \ in a variable) with a set of literal (or fixed) values. As such it is intended\
    \ as a more concise form of a conditional statement. For example, let us say that\
    \ we want to display an appropriate welcome message depending on the user's language.\
    \ To do this we could write a traditional `if` statement such as:\n\n```\ndef\
    \ greeter(language):\n    if language == 'English':\n        print('Hello')\n\
    \    elif language == 'Spanish':\n        print('Hola')\n    elif language ==\
    \ 'French':\n        print('Bonjour')\n    elif language == 'German':\n      \
    \  print('Hallo')\n\ngreeter('Spanish')\n```\n\nIn this initial function `greeter()`\
    \ an `if` statement is used to test what the value of the parameter `language`\
    \ is; the appropriate welcome is then printed out. In this case the `greeter`\
    \ function is called with the value 'Spanish' and thus the output is:\n\nHola\n\
    \nHowever, the `if` statement is quite long-winded, and it's not immediately obvious\
    \ that all of the conditional elements of the `if` statement relate to the value\
    \ of the parameter `language`. To see this it is necessary to read all the code.\
    \ In this case that is not too difficult as each of the behaviours associated\
    \ with each condition is just one line, but in some other situations it may be\
    \ far less clear.\n\nThe basic use of the `match` statement tries to make this\
    \ more explicit. The equivalent of the above function rewritten using a `match`\
    \ statement is given below:\n\n```\ndef greeter2(language):\n    match language:\n\
    \        case 'English':\n            print('Hello')\n        case 'Spanish':\n\
    \            print('Hola')\n        case 'French':\n            print('Bonjour')\n\
    \        case 'German':\n            print('Hallo')\n\ngreeter2('Spanish')\n```\n\
    \nThe behaviour of this `greeter2()` function is exactly the same as the original\
    \ `greeter()` function, but the implementation now uses the `match` syntax. The\
    \ syntax for the `match` statement is:\n\n```\nmatch <value>:\n    case <test>:\n\
    \        actions\n    ...\n```\n\nThus it is easy to see that the whole `match`\
    \ statement relates to the current value of the `language` parameter (as this\
    \ is what follows the `match` keyword).\n\nAs always with Python, note the indentation!\
    \ In Python the layout of the `match` statement is critical, with all `case` conditions\
    \ indented relative to the `match` keyword and the actions to be performed when\
    \ a `case` condition is met, indented another level again.\n\nIn this situation\
    \ we can see that if the value of `language` is 'English' we print 'Hello', whereas\
    \ if it is 'Spanish' we print 'Hola' and so on. Note that at most only one `case`\
    \ condition will be triggered, thus once one `case` condition has run the whole\
    \ `match` statement terminates, additional `case` conditions are not evaluated.\n\
    \nAlso note that there can be any number of statements within the body of the\
    \ case condition, for example:\n\n```\ndef greeter2a(language):\n    match language:\n\
    \        case 'English':\n            print('Hello')\n        case 'Spanish':\n\
    \            print('Hola')\n            print('Buenas')\n        case 'French':\n\
    \            print('Bonjour')\n        case 'German':\n            print('Hallo')\n\
    \ngreeter2a('Spanish')\n```\n\nThe output from this is:\n\n```\nHola\nBuenas\n\
    ```\n\n## 41.3 Default Case\n\nOne issue with the above use of the `match` statement\
    \ is that if a value is passed into the match which is not one of those listed,\
    \ then nothing happens, there is no failure but there is also no action. This\
    \ may of course be what you want, but if you need to pick up on this (possibly\
    \ as it is unexpected behaviour) then you can use a wildcard. A wildcard must\
    \ be the last case condition in the match statement and is represented by an underscore\
    \ `_`, for example:\n\n```\ndef get_status_message(status):\n    match status:\n\
    \        case 400:\n            return 'Bad request'\n        case 404:\n    \
    \        return 'Not found'\n        case 418:\n            return \"I'm a teapot\"\
    \n        case _:\n            return 'Something is wrong'\n\nprint(get_status_message(404))\n\
    print(get_status_message(401))\n```\n\nThe output from this example is:\n\n```\n\
    Not found\nSomething is wrong\n```\n\nIn this case the first time `get_status_message()`\
    \ is called the string 'Not found' is returned, whereas when it is called with\
    \ the value 401, there are no explicit case conditions matching that value and\
    \ thus the wildcard case condition (the last one) runs. This means that the string\
    \ 'Something is wrong' is returned (and subsequently printed out).\n\n## 41.4\
    \ Capture Default Case\n\nIn some situations it would be really useful to capture\
    \ the unknown value in a match statement and log that (possibly for further investigation\
    \ at a later date). To do this instead of using the wildcard from the previous\
    \ section, you can use a *variable*. The variable will be populated with the value\
    \ that would have been compared in the `case` condition and that is then available\
    \ within the case condition block of code. For example:\n\n```\ndef greeter4(language):\n\
    \    match language:\n        case 'English':\n            print('Hello')\n  \
    \      case 'Spanish':\n            print('Hola')\n        case 'French':\n  \
    \          print('Bonjour')\n        case 'German':\n            print('Hallo')\n\
    \        case unknown:\n            print(f'Language {unknown} is not yet known\
    \ to us')\n\ngreeter4('Welsh')\n```\n\nIn this case if the language specified\
    \ is not 'English', 'Spanish', 'French' or 'German', then the value used will\
    \ be bound to the variable `unknown`, and then this can be logged in the print\
    \ statement.\n\nThus the output from this code example is:\n\n```\nLanguage Welsh\
    \ is not yet known to us\n```\n\nNote that the name of the variable used in the\
    \ case condition can be any legal Python variable; here we have used 'unknown'\
    \ just as an example."
  mdcn: "这之所以有效，是因为每个枚举成员都有其自身的标识，这与枚举中其他成员的标识不同。然而，此规则不适用于成员别名，因为它们只是对现有成员的引用，并共享相同的标识。因此：\n\
    \n```\nos1 = OperatingSystem.UBUNTU\nos4 = OperatingSystem.DEBIAN\nprint(os1 is\
    \ os4)\n```\n\n同样会生成：\n\n```\nTrue\n```\n\n我们在本节开头提到，枚举也支持 `==` 和 `!=`；这是因为它们将操作委托给了\
    \ `is` 和 `is not`。因此，你可以使用 `is` 或 `==`，也可以使用 `is not` 或 `!=` 来比较枚举。\n\n## 40.12\
    \ 使用 IntEnum 的整数枚举\n\n基于整数的枚举非常常见，因此 `enum` 模块提供了一个名为 `IntEnum` 的特殊类型。如果你需要枚举成员的行为像整数并支持比较运算符，那么这个类非常有用。使用\
    \ `IntEnum` 允许你的枚举成员使用 `<`、`>` 等进行比较，这可能非常有用。\n\n例如：\n\n```\nfrom enum import\
    \ IntEnum\n\nclass Size(IntEnum):\n    XS = 1\n    S = 2\n    M = 3\n    L = 4\n\
    \    XL = 5\n    XXL = 6\n\nprint(Size.XS < Size.L)\nprint(Size.XL > Size.S)\n\
    print(Size.XL >= Size.S)\n```\n\n此代码的输出为：\n\n```\nTrue\nTrue\nTrue\n```\n\n##\
    \ 40.13 练习\n\n编写一个简短的程序，为奥运会奖牌（即金牌、银牌和铜牌）创建一个枚举类型。金牌应排在银牌之前，银牌应排在铜牌之前。然后你应该扩展你的代码，以便可以为运动员颁发这些奖牌之一。程序应依次询问每个运动员的名字，然后为前三位运动员颁发金牌、银牌或铜牌。当没有输入运动员姓名时（即用户直接按回车键），程序可以终止。\n\
    \n此程序的输出形式可能如下所示：\n\n```\nStarting\nPlease enter the athlete's name: Natalia\n\
    Natalia obtained Medals.GOLD\nPlease enter the athlete's name: Adam\nAdam obtained\
    \ Medals.SILVER\nPlease enter the athlete's name: Denise\nDenise obtained Medals.BRONZE\n\
    Please enter the athlete's name: John\nJohn obtained no medal\nPlease enter the\
    \ athlete's name:\nDone\n```\n\n# 第 41 章\n结构化模式匹配\n\n## 41.1 简介\n\nPython 3.10\
    \ 引入的一个新特性是*结构化模式匹配*。在本章中，我们将探讨 `match` 关键字的用法，以及如何将其与字面值、变量和容器（如列表和元组）一起使用。\n\
    \n## 41.2 基本模式匹配\n\n在其最基本的形式中，`match` 语句的行为非常类似于其他语言（如 Java 或 JavaScript）中的 `match`\
    \ 和 `case` 语句。也就是说，它用于将一个值（通常保存在变量中）与一组字面（或固定）值进行比较。因此，它被设计为条件语句的一种更简洁的形式。例如，假设我们想根据用户的语言显示适当的欢迎消息。为此，我们可以编写一个传统的\
    \ `if` 语句，例如：\n\n```\ndef greeter(language):\n    if language == 'English':\n\
    \        print('Hello')\n    elif language == 'Spanish':\n        print('Hola')\n\
    \    elif language == 'French':\n        print('Bonjour')\n    elif language ==\
    \ 'German':\n        print('Hallo')\n\ngreeter('Spanish')\n```\n\n在这个初始函数 `greeter()`\
    \ 中，使用 `if` 语句来测试参数 `language` 的值；然后打印出相应的欢迎语。在这个例子中，`greeter` 函数被调用时传入了值 'Spanish'，因此输出是：\n\
    \nHola\n\n然而，`if` 语句相当冗长，并且不能立即看出 `if` 语句的所有条件元素都与参数 `language` 的值相关。要看出这一点，需要阅读所有代码。在这个例子中这并不太困难，因为与每个条件相关的行为只有一行，但在其他一些情况下，可能就不那么清晰了。\n\
    \n`match` 语句的基本用法试图使这一点更加明确。使用 `match` 语句重写的上述函数的等效版本如下：\n\n```\ndef greeter2(language):\n\
    \    match language:\n        case 'English':\n            print('Hello')\n  \
    \      case 'Spanish':\n            print('Hola')\n        case 'French':\n  \
    \          print('Bonjour')\n        case 'German':\n            print('Hallo')\n\
    \ngreeter2('Spanish')\n```\n\n这个 `greeter2()` 函数的行为与原始的 `greeter()` 函数完全相同，但实现现在使用了\
    \ `match` 语法。`match` 语句的语法是：\n\n```\nmatch <value>:\n    case <test>:\n      \
    \  actions\n    ...\n```\n\n因此很容易看出，整个 `match` 语句都与 `language` 参数的当前值相关（因为这是跟在\
    \ `match` 关键字后面的内容）。\n\n与 Python 中的其他情况一样，注意缩进！在 Python 中，`match` 语句的布局至关重要，所有\
    \ `case` 条件相对于 `match` 关键字缩进，而当 `case` 条件满足时要执行的操作，则再缩进一级。\n\n在这种情况下，我们可以看到，如果\
    \ `language` 的值是 'English'，我们打印 'Hello'，而如果是 'Spanish'，我们打印 'Hola'，依此类推。请注意，最多只会触发一个\
    \ `case` 条件，因此一旦一个 `case` 条件运行完毕，整个 `match` 语句就会终止，不会评估额外的 `case` 条件。\n\n还要注意，`case`\
    \ 条件的主体中可以包含任意数量的语句，例如：\n\n```\ndef greeter2a(language):\n    match language:\n\
    \        case 'English':\n            print('Hello')\n        case 'Spanish':\n\
    \            print('Hola')\n            print('Buenas')\n        case 'French':\n\
    \            print('Bonjour')\n        case 'German':\n            print('Hallo')\n\
    \ngreeter2a('Spanish')\n```\n\n此代码的输出为：\n\n```\nHola\nBuenas\n```\n\n## 41.3 默认情况\n\
    \n上述 `match` 语句用法的一个问题是，如果传入 `match` 的值不是列出的值之一，那么什么也不会发生，没有失败，但也没有操作。这当然可能是你想要的，但如果你需要捕获这种情况（可能是因为它是意外行为），那么你可以使用通配符。通配符必须是\
    \ `match` 语句中的最后一个 `case` 条件，用下划线 `_` 表示，例如：\n\n```\ndef get_status_message(status):\n\
    \    match status:\n        case 400:\n            return 'Bad request'\n    \
    \    case 404:\n            return 'Not found'\n        case 418:\n          \
    \  return \"I'm a teapot\"\n        case _:\n            return 'Something is\
    \ wrong'\n\nprint(get_status_message(404))\nprint(get_status_message(401))\n```\n\
    \n此示例的输出为：\n\n```\nNot found\nSomething is wrong\n```\n\n在这个例子中，第一次调用 `get_status_message()`\
    \ 时返回字符串 'Not found'，而当使用值 401 调用它时，没有显式的 `case` 条件匹配该值，因此通配符 `case` 条件（最后一个）运行。这意味着返回字符串\
    \ 'Something is wrong'（随后被打印出来）。\n\n## 41.4 捕获默认情况\n\n在某些情况下，捕获 `match` 语句中的未知值并记录它（可能用于以后的调查）会非常有用。为此，你可以使用一个*变量*，而不是使用上一节中的通配符。该变量将被填充本应在\
    \ `case` 条件中进行比较的值，然后该值在 `case` 条件的代码块中可用。例如：\n\n```\ndef greeter4(language):\n\
    \    match language:\n        case 'English':\n            print('Hello')\n  \
    \      case 'Spanish':\n            print('Hola')\n        case 'French':\n  \
    \          print('Bonjour')\n        case 'German':\n            print('Hallo')\n\
    \        case unknown:\n            print(f'Language {unknown} is not yet known\
    \ to us')\n\ngreeter4('Welsh')\n```\n\n在这种情况下，如果指定的语言不是 'English'、'Spanish'、'French'\
    \ 或 'German'，那么使用的值将绑定到变量 `unknown`，然后可以在 `print` 语句中记录它。\n\n因此，此代码示例的输出为：\n\n\
    ```\nLanguage Welsh is not yet known to us\n```\n\n请注意，`case` 条件中使用的变量名可以是任何合法的\
    \ Python 变量；这里我们使用 'unknown' 只是作为一个例子。"
