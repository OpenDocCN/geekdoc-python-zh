  mdcn: "## 23.4 比较运算符\n\n数值类型（如整数和实数）也支持比较运算符，例如等于、不等于、大于、小于以及大于等于和小于等于。\n\nPython\
    \ 也允许为用户定义的类型/类定义这些比较运算符。\n\n正如 `+` 和 `-` 等数值运算符是通过特殊方法实现的，比较运算符也是如此。例如，`<` 运算符是通过一个名为\
    \ `__lt__(self, other)` 的方法实现的。\n\n比较运算符及其关联的特殊方法的完整列表如下表所示：\n\n| 运算符 | 表达式 |\
