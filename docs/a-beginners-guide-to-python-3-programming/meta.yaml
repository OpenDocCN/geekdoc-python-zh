    \n```\nfor i in range(0, 10):\n    print(i, ' ', end='')\n    if i % 2 == 1:\n\
    \        continue\n    print('hey its an even number')\n    print('we love even\
    \ numbers')\nprint('Done')\n```\n\nWhen we run this code we get\n\n```\n0 hey\
