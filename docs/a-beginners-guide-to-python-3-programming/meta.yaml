    \n```\nmy_variable = 'Jason'\n```\n\n# 4.7 Python Statements\n\nThroughout this\
    \ chapter we have used the phrase *statement* to describe a portion of a Python\
    \ program; for example the following line of code is a statement that prints out\
    \ a string 'Hello' and the value held in `user_name`.\n\n```\nprint('Hello', user_name)\n\
    ```\n\nSo what do we mean by a statement? In Python a statement is an instruction\
    \ that the Python interpreter can execute. This statement may be formed of a number\
    \ of elements such as the ones above which includes a call to a function and an\
    \ assignment of a value to a variable. In many cases a statement is a single line\
    \ in your program, but it is also possible for a statement to extend over several\
    \ lines particularly if this helps the readability or layout of the code. For\
