    # Chapter 1

    Introduction


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_27_0.png)


    # 1.1 What is Python?


    Python is a general-purpose programming language in a similar vein to other programming
    languages that you might have heard of such as C++ , JavaScript or Microsoft’s
    C# and Java.


    It has been around for some considerable time having been originally conceived
    back in the late 1980s by Guido van Rossum at Centrum Wiskunde and Informatica
    (CWI) in the Netherlands. The language is named after one of Guido’s favorite
    programs “Monty Pythons Flying Circus”, a classic and somewhat anarchic British
    comedy sketch show originally running from 1969 to 1974 (but which has been rerun
    on various stations ever since) and with several film spin offs. You will even
    find various references to this show in the documentation available with Python.


    As a language it has gained in interest over recent years, particularly within
    the commercial world, with many people wanting to learn the language. This increased
    interest in Python is driven by several different factors:


    +   1. Its flexibility and simplicity which makes it easy to learn.

    2. Its use by the Data Science community where it provides a more standard programming
    language than some rivals such as R.

    3. Its suitability as a scripting language for those working in the DevOps field
    where it provides a higher level of abstraction than alternative traditionally
    used languages.

    4. Its ability to run on (almost) any operating system, but particularly the big
    three operating systems Windows, MacOS and Linux.

    5. The availability of a wide range of libraries (modules) that can be used to
    extend the basic features of the language.

    6. It is free!


    Python itself is now managed by the *not-for-profit* Python Software Foundation
    (see [https://en.wikipedia.org/wiki/Python_Software_Foundation](https://en.wikipedia.org/wiki/Python_Software_Foundation))
    which was launched in March 2001. The mission of the foundation is to foster development
    of'
- md: '## 1.2 Python Versions


    There is now one main version of Python, that is Python 3. However, until the
    start of 2020 there were two main supported versions in circulation one called
    Python 2 as well as Python 3.


    - Python 2 was launched in October 2000 and was very widely used. Support for
    this version of Python ended on the 1st of January 2020. However, you will still
    find examples of code, libraries and tutorials that focus on this version of the
    language. This is particularly true of the web so be careful when browsing for
    examples or help—make sure they relate to Python 3. The more current the article
    or suggestion you are looking the more likely that it is Python 3.

    - Python 3 was launched in December 2008 and is a major revision to the language
    that is not backward compatible. It is currently the most widely used version
    of the language and represents the version we will use throughout this book.


    The issue between the two versions can be highlighted by the simple print facility:


    - In Python 2 this is written as `print ‘Hello World’`

    - In Python 3 this is written as `print(‘Hello World’)`


    It may not look like much of a difference but the inclusion of the ‘()’ marks
    a major change and means that any code written for one version of Python will
    probably not run on the other version. There are tools available, such as the
    2–3 utility, that will (partially) automate translation from Python 2 to Python
    3 but in general you are still left with significant work to do.


    A survey of Python Developers carried out by JetBrains (the organization behind
    the PyCharm editor) in 2022 found that only 2% of developers now claimed to be
    using a Python 2.x version, with 2% unsure which version they used. The rest (96%)
    were using a version of the 3.x line mostly 3.8, 3.9 or 3.10. This survey was
    completed before 3.11 was made available, and this over 70% of developers were
    using one of the three most recent versions of Python. For more information see
    https://www.jetbrains.com/lp/devecosystem-2022/python/.


    Python 3 is the future of the Python language, and it is this version that has
    introduced many of the new and improved language and library features (that have
    admittedly been back ported to Python 2 in many cases). This book is solely focused
    on Python 3.


    In the remainder of this book when we refer to Python we will always be referring
    to Python 3. Since then there have been numerous point and sub point releases,
    for example, as well as Python 3.1, 3.2, etc. there have also been intermediate
    releases such as 3.1.1, 3.1.2, etc.


    ## 1.3 Python History


    As has been said, Python has been around a long time, although for some people
    it can seem like Python was an overnight success. In fact Python originates from
    the very late 1980s when Guido Van Rossum started implementing the first version
    of Python. The first release of Python was on 20th February 1991. Guido actually
    remained the lead developer on Python until 12 July 2018 when he stepped down
    as the “benevolent dictator” of Python. Since January 2019 there has been a five-member
    Steering Council that leads the Python project.


    Python 2.0 was initially released on October 16th 2000 with its end of life being
    the 1st of January 2020. Python 3.0 was initially released 3rd December 2008.


    It is worth noting that in the Python World, the major version number represents
    an epoch (such that there has been a Python 1, a Python 2 and a Python 3 epoch).
    Within this each Python 3 release has a prefix of 3.1, thus 3.1 was the second
    Python 3 release, etc. This differs from many other programming language such
    as Java with Java 18 or Java 19 being the equivalent of 3.11 and 3.12 in Python,
    etc. The Python organization does not always release a new version of Python each
    year, although recent releases have tended to be yearly. However, although the
    language is evolving many of these releases do not represent major changes to
    the language, and thus there is relatively little difference between Python 3.10
    and Python 3.11 for example. A quick history of the main Python 3 releases is
    given below:


    - Python 3.0 released 3rd December 2008

    - Python 3.1 released 27th June 2009

    - Python 3.2 released 20th February 2011

    - Python 3.3 released 29th September 2012

    - Python 3.4 16th March 2014

    - Python 3.5 13th September 2015

    - Python 3.6 23rd December 2016

    - Python 3.7 27th June 2018

    - Python 3.8 14th October 2019

    - Python 3.9 5th October 2020

    - Python 3.10 4th October 2021

    - Python 3.11 24th October 2022.


    In general almost all of the features in the book are supported by Python 3.8
    onwards. One or two of the features require a later version such as 3.10. Such
    requirements will be noted when each topic is introduced. Personally when teaching
    Python I try and use the latest stable version such as 3.11 or 3.12.


    ## 1.4 Python Programming


    There are several different programming paradigms that a programming language
    may allow developers to code in, these are:


    - **Procedural Programming** in which a program is represented as a sequence of
    instructions that tell the computer what it should do explicitly. Procedures and
    / or functions are used to provide structure to the program with control structures
    such as if statements and loop constructs to manage which steps are executed and
    how many times. Languages typifying this approach include C and Pascal.

    - **Declarative Programming** languages, such as prolog, that allow developers
    to describe how a problem should be solved with the language / environment determining
    how the solution should be implemented. SQL (a database query language) is one
    of the most common declarative languages that you are likely to encounter and
    is introduced at the end of this book.

    - **Object-Oriented Programming** approaches that represent a system in terms
    of the objects that form that system. Each object can hold its own data (also
    known as state) as well as define behaviour what the object can do. A computer
    program is formed from a set of these objects co-operating together. Languages
    such as Java and C# typify the object-oriented approach.

    - **Functional Programming** languages decompose a problem into a set of functions.
    Each function is independent of any external state operating only on the inputs
    they received to generate their outputs. The programming language Haskell is an
    example of a functional programming language.


    Some programming languages are considered to be *hybrid* languages; that is they
    allow developers to utilize a combination of different approaches within the same
    program. Python is an example of a hybrid programming language as it allows you
    to write very procedural code, to use objects in an object-oriented manner and
    to write functional programs. Each of these approaches is covered in this book.


    ## 1.5 Python Libraries


    As well as the core language there are very many libraries available for Python.
    These libraries extend the functionality of the language and make it much easier
    to develop applications. These libraries cover:


    - web frameworks such as Django / Flask,

    - email clients such as smtplib (a SMTP email client) and imaplib (an IMAP4 email
    client),

    - content management operations such as the Zope library,

    - lightweight concurrency (running multiple operations at the same time) using
    the Stackless library,

    - the Generation of Microsoft Excel files using the openpyxl library,

    - graphics libraries such as Matplotlib and PyOpenGL,

    - Graphical User Interface (GUI) libraries such as Tkinter or PyQt5,

    - Data Analytics using libraries such as Pandas and SciPy and NumPy,

    - Machine learning using libraries such as SKLearn and TensorFlow.


    A very useful resource to look at, which introduces many of these libraries (also
    known as modules), is the ‘Python 3 module of the Week’ web site which can be
    found at https://pymotw.com/3. This lists many of the libraries / modules available
    and provides a short introduction to what they do and how to use them. The chapter
    entitled ‘Python Virtual Environments’ explains how to install such libraries
    into your Python runtime environment.


    ## 1.6 Python Execution Model


    Python is not a precompiled language in the way that some other languages you
    may have come across are (such as C++ ). Instead it is what is known as an interpreted
    language (although even this is not quite accurate). An interpreted language is
    one that does not require a separate compilation phase to convert the human readable
    format into something that can be executed by a computer. Instead the plain text
    version is fed into another program (generally referred to as the interpreter)
    which then executes the program for you.


    Python actually uses an intermediate model in that it actually converts the plain
    text English style Python program into an intermediate ‘pseudo’ machine code format
    and it is this intermediate format that is executed. This is illustrated below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_31_0.png)


    The way in which the Python interpreter processes a Python program is broken down
    into several steps. The steps shown here are illustrative (and simplified) but
    the general idea is correct.


    1. First the program is checked to make sure that it is valid Python, that is
    a check is made that the program follows all of the rules of the language and
    that each of the commands and operations, etc. is understood by the Python environment.'
  mdcn: '## 1.2 Python 版本


    目前 Python 有一个主要版本，即 Python 3。然而，在 2020 年初之前，流通中曾有两个主要支持版本，分别称为 Python 2 和 Python
    3。


    - Python 2 于 2000 年 10 月发布，曾被广泛使用。对这个版本 Python 的支持已于 2020 年 1 月 1 日结束。但是，你仍然会找到专注于这个语言版本的代码示例、库和教程。这在互联网上尤其常见，因此在浏览示例或寻求帮助时请务必小心——确保它们与
    Python 3 相关。你查找的文章或建议越新，它使用 Python 3 的可能性就越大。

    - Python 3 于 2008 年 12 月发布，是对该语言的一次重大修订，不向后兼容。它目前是使用最广泛的版本，也是本书将全程使用的版本。


    这两个版本之间的差异可以通过简单的 `print` 功能来凸显：


    - 在 Python 2 中，它写作 `print ‘Hello World’`

    - 在 Python 3 中，它写作 `print(‘Hello World’)`


    这看起来可能没什么大区别，但包含 `‘()’` 标志着一个重大变化，意味着为一个 Python 版本编写的任何代码很可能无法在另一个版本上运行。有一些工具，例如
    `2to3` 实用程序，可以（部分地）自动将 Python 2 代码转换为 Python 3，但通常你仍然需要做大量的工作。


    JetBrains（PyCharm 编辑器背后的组织）在 2022 年进行的一项 Python 开发者调查发现，只有 2% 的开发者声称使用 Python
    2.x 版本，另有 2% 不确定自己使用的版本。其余（96%）使用的是 3.x 系列的某个版本，主要是 3.8、3.9 或 3.10。这项调查是在 3.11
    发布之前完成的，超过 70% 的开发者使用的是 Python 最近三个版本中的一个。更多信息请参见 https://www.jetbrains.com/lp/devecosystem-2022/python/。


    Python 3 是 Python 语言的未来，正是这个版本引入了许多新的和改进的语言及库特性（尽管其中许多已被移植回 Python 2）。本书完全专注于
    Python 3。


    在本书的剩余部分，当我们提到 Python 时，我们总是指 Python 3。自那时起，已经发布了众多的点版本和子点版本，例如，除了 Python 3.1、3.2
    等之外，还有像 3.1.1、3.1.2 这样的中间版本。


    ## 1.3 Python 历史


    如前所述，Python 已经存在很长时间了，尽管对某些人来说，Python 似乎是一夜之间成功的。事实上，Python 起源于 1980 年代末，当时 Guido
    Van Rossum 开始实现 Python 的第一个版本。Python 的首次发布是在 1991 年 2 月 20 日。Guido 实际上一直是 Python
    的首席开发者，直到 2018 年 7 月 12 日，他卸任了 Python 的“仁慈独裁者”一职。自 2019 年 1 月起，一个五人指导委员会领导着 Python
    项目。


    Python 2.0 最初于 2000 年 10 月 16 日发布，其生命周期结束于 2020 年 1 月 1 日。Python 3.0 最初于 2008
    年 12 月 3 日发布。


    值得注意的是，在 Python 世界中，主版本号代表一个时代（因此有 Python 1、Python 2 和 Python 3 时代）。在这个时代内，每个
    Python 3 发布版都有一个 3.x 的前缀，因此 3.1 是第二个 Python 3 发布版，依此类推。这与许多其他编程语言不同，例如 Java 的
    Java 18 或 Java 19 相当于 Python 的 3.11 和 3.12 等。Python 组织并不总是每年发布一个新版本的 Python，尽管最近的发布倾向于每年一次。然而，尽管语言在不断演进，但许多发布并不代表语言的重大变化，因此例如
    Python 3.10 和 Python 3.11 之间的差异相对较小。以下是主要 Python 3 发布版的简要历史：


    - Python 3.0 发布于 2008 年 12 月 3 日

    - Python 3.1 发布于 2009 年 6 月 27 日

    - Python 3.2 发布于 2011 年 2 月 20 日

    - Python 3.3 发布于 2012 年 9 月 29 日

    - Python 3.4 发布于 2014 年 3 月 16 日

    - Python 3.5 发布于 2015 年 9 月 13 日

    - Python 3.6 发布于 2016 年 12 月 23 日

    - Python 3.7 发布于 2018 年 6 月 27 日

    - Python 3.8 发布于 2019 年 10 月 14 日

    - Python 3.9 发布于 2020 年 10 月 5 日

    - Python 3.10 发布于 2021 年 10 月 4 日

    - Python 3.11 发布于 2022 年 10 月 24 日。


    一般来说，本书中的几乎所有特性都从 Python 3.8 开始支持。有一两个特性需要更新的版本，例如 3.10。这些要求将在介绍每个主题时注明。就个人而言，在教授
    Python 时，我尝试使用最新的稳定版本，例如 3.11 或 3.12。


    ## 1.4 Python 编程


    编程语言可能允许开发者使用几种不同的编程范式，这些范式包括：


    - **过程式编程**，其中程序被表示为一系列指令，明确告诉计算机应该做什么。过程和/或函数用于为程序提供结构，并使用控制结构（如 `if` 语句和循环构造）来管理执行哪些步骤以及执行多少次。体现这种方法的语言包括
    C 和 Pascal。

    - **声明式编程**语言，如 Prolog，允许开发者描述问题应该如何解决，由语言/环境决定如何实现解决方案。SQL（一种数据库查询语言）是你可能遇到的最常见的声明式语言之一，将在本书末尾介绍。

    - **面向对象编程**方法，用构成系统的对象来表示系统。每个对象可以保存自己的数据（也称为状态），并定义行为（对象能做什么）。计算机程序由一组相互协作的对象组成。Java
    和 C# 等语言体现了面向对象的方法。

    - **函数式编程**语言将问题分解为一组函数。每个函数独立于任何外部状态，仅根据接收到的输入来生成输出。编程语言 Haskell 是函数式编程语言的一个例子。


    一些编程语言被认为是*混合*语言；也就是说，它们允许开发者在同一个程序中结合使用不同的方法。Python 就是混合编程语言的一个例子，因为它允许你编写非常过程式的代码，以面向对象的方式使用对象，以及编写函数式程序。本书涵盖了所有这些方法。


    ## 1.5 Python 库


    除了核心语言之外，Python 还有非常多的可用库。这些库扩展了语言的功能，使开发应用程序变得更加容易。这些库涵盖：


    - Web 框架，如 Django / Flask，

    - 电子邮件客户端，如 `smtplib`（一个 SMTP 电子邮件客户端）和 `imaplib`（一个 IMAP4 电子邮件客户端），

    - 内容管理操作，如 Zope 库，

    - 使用 Stackless 库实现轻量级并发（同时运行多个操作），

    - 使用 `openpyxl` 库生成 Microsoft Excel 文件，

    - 图形库，如 Matplotlib 和 PyOpenGL，

    - 图形用户界面（GUI）库，如 Tkinter 或 PyQt5，

    - 使用 Pandas、SciPy 和 NumPy 等库进行数据分析，

    - 使用 SKLearn 和 TensorFlow 等库进行机器学习。


    一个非常有用的资源是“Python 3 每周模块”网站，可以在 https://pymotw.com/3 找到。它介绍了许多这样的库（也称为模块），列出了许多可用的库/模块，并简要介绍了它们的功能和使用方法。题为“Python
    虚拟环境”的章节解释了如何将这些库安装到你的 Python 运行时环境中。


    ## 1.6 Python 执行模型


    Python 不像你可能遇到的其他一些语言（如 C++）那样是预编译语言。相反，它是一种所谓的解释型语言（尽管这也不完全准确）。解释型语言不需要单独的编译阶段将人类可读的格式转换为计算机可以执行的内容。相反，纯文本版本被输入到另一个程序（通常称为解释器）中，然后由该程序为你执行程序。


    Python 实际上使用了一种中间模型，它将纯文本的、类似英语的 Python 程序转换为一种中间的“伪”机器代码格式，而执行的就是这种中间格式。下图说明了这一点：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_31_0.png)


    Python 解释器处理 Python 程序的方式分为几个步骤。这里展示的步骤是说明性的（并且简化了），但总体思路是正确的。


    1. 首先检查程序以确保它是有效的 Python，即检查程序是否遵循语言的所有规则，以及 Python 环境是否理解每个命令和操作等。'
