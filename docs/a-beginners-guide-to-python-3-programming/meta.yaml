    \n```\nprint('Hello', user_name)\n```\n\n那么，我们所说的语句是什么意思呢？在Python中，语句是Python解释器可以执行的一条指令。这条语句可能由多个元素组成，例如上面的语句包括一个函数调用和一个值到变量的赋值。在许多情况下，语句是你程序中的一行，但语句也可以跨越多行，特别是当这有助于代码的可读性或布局时。例如，下面是一个语句，但它被布局在6行代码中以便于阅读：\n\
