    \n# 20.3 Class-Side Methods\n\nIt is also possible to define behaviour that is\
    \ linked to the *class* rather than an individual object; this behaviour is defined\
    \ in a class method.\n\nClass methods are written in a similar manner to any other\
    \ method but are *decorated* with `@classmethod` and take a first parameter which\
    \ represents the class rather than an individual instance. This decoration is\
