  md: "# 10.7 Disadvantages of Recursion\n\nAlthough recursion can be a very expressive\
    \ way to define how a problem can be solved, it is not as efficient as iteration.\
    \ This is because a function call is more expensive for Python to process that\
    \ a `for` loop. In part this is because of the infrastructure that goes along\
    \ with a function call; that is the need to set up the stack for each separate\
    \ function invocation so that all local variables are independent of any other\
    \ call to that function. It is also related to associated unwinding the stack\
    \ when a function returns. However, it is also affected by the increasing amount\
    \ of memory each recursive call must use to store all the data on the stack.\n\
    \nIn some languages optimizations are possible to improve the performance of a\
    \ recursive solution. One typical example relates to a type of recursion known\
    \ as *tail recursion*. A tail recursive solution is one in which the calculation\
    \ is performed before the recursive call. The result is then passed to the recursive\
    \ step, which results in the last statement in the function just calling the recursive\
    \ function.\n\nIn such situations the recursive solution can be expressed (internally\
    \ to the computer system) as an iterative problem. That is the programmer writes\
    \ the solution as a recursive algorithm but the interpreter or compiler converts\
    \ it into an iterative solution. This allows programmers to benefit from the expressive\
    \ nature of recursion while also benefiting from the performance of an iterative\
    \ solution.\n\nYou might think that the `factorial` function presented earlier\
    \ is tail recursive; however it is not because the last statement in the function\
    \ performs a calculation that multiples `n` by the result of recursive call.\n\
    \nHowever, we can refactor the `factorial` function to be tail recursive. This\
    \ version of the `factorial` function passes the evolving result along via the\
    \ accumulator parameter. It is given for reference here:\n\n```\ndef tail_factorial(n,\
    \ accumulator=1):\n    if n == 0:\n        return accumulator\n    else:\n   \
    \     return tail_factorial(n - 1, accumulator * n)\n\nprint(tail_factorial(5))\n\
    ```\n\nHowever, it should be noted that Python currently *does not* perform tail\
    \ recursion optimization; so this is a purely a theoretical exercise.\n\n# 10.8\
    \ Online Resources\n\nThe following provides some references on recursion available\
    \ online:\n\n+   - https://en.wikipedia.org/wiki/Recursion_(computer_science)\
    \ Provides Wikipedias introduction to recursion.\n- https://www.sparknotes.com/cs/recursion/whatisrecursion/section1/\
    \ Provides an introduction to the concept of recursion."
