  md: '2.x.x, and this indicates a major change in the module, etc. Note that there
    is no guarantee of backwards compatibility between one major release and the next.
    Backwards compatibility is the idea that code that previously worked should still
    work from one release to the next—this guarantee does not exist between one major
    version and the next.


    +   - **Minor** such as 1.1.0 to 1.2.0 where the minor release typically includes
    larger new features or bug fixes but ensures backwards compatibility with other
    older major release versions (that is version 1.2.0 should be backwards compatible
    with version 1.1.0).

    - **Patch** release this is typically used for bug fixes or other technical issues
    which should have no effect on the backwards compatibility of the code and do
    not change or extend the functionality of the library.


    In some cases packages use a year-based number system such as 2020.1 which is
    the first release of 2020, although this is actually far less common in Python.

    Now let us consider that on your computer you have two Python programs: one uses
    Pandas 1.5.0, and the other uses Pandas 2.0.0. Given what has been described above
    there is no guarantee that the code which was written to use Pandas 1.5.0 will
    work with Pandas 2.0.0. Therefore we want to run one program using one Pandas
    library and the other using the newer Pandas library. We could of course update
    the old code to work with the new version of Pandas but that could be time-consuming
    and non-trivial; and we may just want to run the code.

    However, as `pip` installs these libraries centrally for all Python programs by
    default, we cannot have the two libraries installed at the same time!

    Of course, this is not a new problem, and the solution comes in the form of *pip
    virtual environments*.


    # 42.5 Pip Virtual Environments


    A virtual environment is a configuration of Python modules that can be set up
    on a *per project* basis. That is each individual Python project (or program)
    can have its own virtual environment and that virtual environment can be activated
    as and when required. The virtual environment is then used to configure all the
    modules used, isolating one virtual environment''s configuration from another.

    Although it should be noted that there is no reason why several Python programs
    cannot share the same virtual environment, it is very common practice to have
    a virtual environment per program.

    To use a virtual environment it is necessary to first create this virtual environment.
    This is done using the `python` command itself (rather than the `pip` command).
    For example:


    ```

    python -m venv <name of virtual environment>

    ```'
