    \ a function to generate a factorial number might call itself passing in a smaller\
    \ number to process etc.\n\nThe key here is that an overall problem can be solved\
    \ by breaking it down into smaller examples of the same problem.\n\nFunctions\
    \ that solve problems by calling themselves are referred to as *recursive* functions.\n\
    \nHowever, if such a function does not have a termination point then the function\
    \ will go on calling itself to infinity (at least in theory). In most languages\
    \ such a situation will (eventually) result in an error being generated.\n\nFor\
    \ a recursive function to be useful it must therefore have a *termination* condition.\
    \ That is a condition under which they do not call themselves and instead just\
    \ return (often with some result). The termination condition may be because:\n\
    \n- A solution has been found (some data of interest in a tree structure).\n-\
    \ The problem has become so small that it can be solved without further recursion.\
    \ This is often referred to as a base case. That is, a base case is a problem\
    \ that can be solved without further recursion.\n- Some maximum level of recursion\
    \ has been reached, possibly without a result being found/generated.\n\nWe can\
    \ therefore say that a recursive function is a function defined in terms of itself\
    \ via self-referential expressions. The function will continue to call itself\
    \ with smaller variations of the overall problem until some termination condition\
    \ is met to stop the recursion. All recursive functions thus share a common format;\
    \ they have a recursive part and a termination point which represents the base\
    \ case part.\n\n## 10.3 Benefits of Recursion\n\nThe key benefit of recursion\
    \ is that some algorithms (solutions to computer problems) are expressed far more\
    \ elegantly and with a great deal less code when implemented recursively than\
    \ when using an iterative approach.\n\nThis means that the resulting code can\
    \ be easier to write and easier to read.\n\nThese twin ideas are important both\
    \ for the developers who initially create the software but also for those developers\
    \ who must maintain that software (potentially a significant amount of time later).\n\
    \nCode that is easier to write tends to be less error prone. Similarly code that\
    \ is easier to read tends to be easier to maintain, debug, modify and extend.\n\
    \nRecursion is also well suited to producing functional solutions to a problem\
    \ as by its very nature a recursive function relies on its inputs and outputs\
    \ and does not hold any hidden state. We will return to this in a later chapter\
    \ on functional programming.\n\n## 10.4 Recursively Searching a Tree\n\nAs an\
    \ example of a problem that is well suited to a recursive solution, we will examine\
    \ how we might implement a program to traverse a binary tree data structure.\n\
    \nA binary tree is a tree data structure made up of nodes in which each node has\
    \ a value, a left pointer and a right pointer.\n\nThe root node is the top most\
    \ node in the tree. This root node then references a left and right subtree. This\
    \ structure is repeated until a leaf node. A leaf node is a node in which both\
    \ the right and left pointers are empty (that is they have the value None).\n\n\
    This is shown below for a simple binary tree:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_140_0.png)\n\
    \nThus a binary tree is either empty (represented by a null pointer), or is made\
    \ of a single node, where the left and right pointers each point to a binary tree.\n\
    \nIf we now want to find out if a particular value is in the tree then we can\
    \ start at the root node.\n\nIf the root node holds the value we print it; otherwise\
    \ we can call the `search` function on the child nodes of the current node. If\
    \ the current node has no children we just return without a result.\n\nThe pseudo\
    \ code for this might look like:\n\n```\nsearch(value_to_find, current_node):\n\
    \    If current_node.value == value_to_find:\n        print('value found:', current_node.value)\n\
    \    Else If current_node.has_children:\n        search(value, current_node.left)\n\
    \        search(value, current_node.right)\n```\n\nThis illustrates how easy it\
    \ is to write a recursive function that can solve what might at first appear to\
    \ be a complex problem.\n\n## 10.5 Recursion in Python\n\nMost computer programs\
    \ support the idea of recursion and Python is no exception. In Python it is perfectly\
    \ legal to have a function that calls itself (that is within the body of the function\
    \ a call is made to the same function). When the function is executed it will\
    \ therefore call itself.\n\nIn Python we can write a recursive function such as:\n\
    \n```\ndef recursive_function():\n    print('calling recursive_function')\n  \
    \  recursive_function()\n```\n\nHere the function `recursive_function()` is defined\
    \ such that it prints out a message and then calls itself. Note that no special\
    \ syntax is required for this as a function does not need to have been completely\
    \ defined before it is used.\n\nOf course in the case of `recursive_function()`\
    \ this will result in infinite recursion as there is no termination condition.\
    \ However, this will only become apparent at runtime when Python will eventually\
    \ generate an error:\n\n```\nTraceback (most recent call last):\n  File \"recursion_example.py\"\
    , line 5, in <module>\nRecursionError: maximum recursion depth exceeded while\
    \ calling a Python object\n```\n\nHowever, as already mentioned a recursive function\
    \ should have a *recursive* part and a *termination* or base case part. The termination\
    \ condition is used to identify when the base case applies. We should therefore\
    \ add a condition to identify the termination scenario and what the base case\
    \ behaviour is. We will do this in the following section as we look at how a factorial\
    \ for a number can be generated recursively.\n\n## 10.6 Calculating Factorial\
    \ Recursively\n\nWe have already seen how to create a program that can calculate\
    \ the factorial of a number using iteration as one of the exercises in the last\
    \ chapter; now we will create an alternative implementation that uses recursion\
    \ instead.\n\nRecall that the factorial of a number is the result of multiplying\
    \ that number by each of the integer values up to that number, for example, to\
    \ find the factorial of the number 5 (written as 5!) we can multiply 1 * 2 * 3\
    \ * 4 * 5 which will generate the number 120.\n\nWe can create a recursive solution\
    \ to the Factorial problem by defining a function that takes an integer to generate\
    \ the factorial number for. This function will return the value 1 if the number\
    \ passed in is 1—this is the base case. Otherwise it will multiply the value passed\
    \ in to it with the result of calling itself (the `factorial()` function) with\
    \ n – 1 which is the recursive part.\n\nThe function is given below:\n\n```\n\
    def factorial(n):\n    if n == 1: # The termination condition\n        return\
    \ 1 # The base case\n    else:\n        res = n * factorial(n-1) # The recursive\
    \ call\n        return res\nprint(factorial(5))\n```\n\nThe key to understanding\
    \ this function is that it has:\n\n1. A termination condition that is guaranteed\
    \ to execute when the value of n is 1. This is the base case; we cannot reduce\
    \ the problem down any further as the factorial of 1 is 1!\n2. The function recursively\
    \ calls itself but with n − 1 as the argument; this means each time it calls itself\
    \ the value of n is smaller. Thus the value returned from this call is the result\
    \ of a smaller computation.\n\nTo clarify how this works we can add some print\
    \ statements (and a depth indicator) to the function to indicate its behaviour:\n\
    \n```\ndef factorial(n, depth = 1):\n    if n == 1:\n        print('\\t' * depth,\
    \ 'Returning 1')\n        return 1\n    else:\n        print('\\t'*depth,'Recursively\
    \ calling factorial(',n-1,')')\n        result = n * factorial(n-1, depth + 1)\n\
    \        print('\\t' * depth, 'Returning:', result)\n        return result\n\n\
    print('Calling factorial( 5 )')\nprint(factorial(5))\n```\n\nWhen we run this\
    \ version of the program then the output is:\n\n```\nCalling factorial( 5 )\n\
    \    Recursively calling factorial( 4 )\n        Recursively calling factorial(\
    \ 3 )\n            Recursively calling factorial( 2 )\n                Recursively\
    \ calling factorial( 1 )\n                Returning 1\n            Returning:\
    \ 2\n        Returning: 6\n    Returning: 24\nReturning: 120\n120\n```\n\nNote\
    \ that the depth parameter is used merely to provide some indentation to the print\
    \ statements.\n\nFrom the output we can see that each call to the factorial program\
    \ results in a simpler calculation until the point where we are asking for the\
    \ value of 1! which is 1. This is returned as the result of calling factorial(1).\
    \ This result is multiplied with the value of n prior to that; which was 2. This\
    \ causes factorial(2) to return the value 2 and so on."
  mdcn: "## 第10章\n递归\n\n## 10.1 简介\n\n递归是实现某一类问题解决方案的一种非常强大的方法。这类问题的特点是，可以通过将整体问题分解为同一问题的更小实例来生成整体解决方案。然后，通过组合这些更小问题的结果来生成最终结果。\n\
    \n## 10.2 递归行为\n\n在像 Python 这样的编程语言中，递归解决方案是指一个函数为了求解特定问题而调用自身一次或多次。在许多情况下，调用自身的结果会与函数的当前状态相结合以返回结果。\n\
    \n在大多数情况下，递归调用涉及调用函数，但传入一个更小的问题来解决。例如，一个遍历树数据结构的函数可能会调用自身，并传入一个子树进行处理。或者，一个生成阶乘数的函数可能会调用自身，并传入一个更小的数字进行处理，等等。\n\
    \n这里的关键在于，一个整体问题可以通过将其分解为同一问题的更小实例来解决。\n\n通过调用自身来解决问题的函数被称为*递归*函数。\n\n然而，如果这样的函数没有终止点，那么它将无限地调用自身（至少在理论上）。在大多数语言中，这种情况最终会导致错误。\n\
    \n因此，一个递归函数要有用，它必须有一个*终止*条件。即一个条件下，它们不再调用自身，而是直接返回（通常带有某些结果）。终止条件可能是因为：\n\n- 已找到解决方案（在树结构中找到了感兴趣的数据）。\n\
    - 问题已经变得足够小，无需进一步递归即可解决。这通常被称为基本情况。也就是说，基本情况是一个无需进一步递归即可解决的问题。\n- 已达到某个最大递归级别，可能尚未找到/生成结果。\n\
    \n因此，我们可以说，递归函数是通过自引用表达式来定义自身的函数。该函数将继续使用整体问题的更小变体调用自身，直到满足某个终止条件以停止递归。因此，所有递归函数都共享一个共同的格式：它们有一个递归部分和一个终止点，后者代表基本情况部分。\n\
    \n## 10.3 递归的好处\n\n递归的主要好处在于，某些算法（计算机问题的解决方案）在递归实现时，比使用迭代方法实现时表达得更优雅，且代码量大大减少。\n\
    \n这意味着生成的代码可能更容易编写和阅读。\n\n这两个优点对于最初创建软件的开发者以及必须维护该软件（可能是在相当长一段时间之后）的开发者都很重要。\n\
    \n更容易编写的代码往往更不容易出错。同样，更容易阅读的代码往往更容易维护、调试、修改和扩展。\n\n递归也非常适合生成问题的函数式解决方案，因为从本质上讲，递归函数依赖于其输入和输出，不持有任何隐藏状态。我们将在后面关于函数式编程的章节中回到这一点。\n\
    \n## 10.4 递归搜索树\n\n作为适合递归解决方案的问题示例，我们将研究如何实现一个程序来遍历二叉树数据结构。\n\n二叉树是由节点组成的树数据结构，其中每个节点都有一个值、一个左指针和一个右指针。\n\
    \n根节点是树中最顶层的节点。这个根节点然后引用一个左子树和一个右子树。这种结构重复，直到叶子节点。叶子节点是指右指针和左指针都为空（即值为 `None`）的节点。\n\
    \n下面是一个简单二叉树的示意图：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_140_0.png)\n\n因此，二叉树要么是空的（由空指针表示），要么由单个节点组成，其中左指针和右指针各自指向一个二叉树。\n\
    \n如果我们现在想知道某个特定值是否在树中，我们可以从根节点开始。\n\n如果根节点包含该值，我们就打印它；否则，我们可以对当前节点的子节点调用 `search`\
    \ 函数。如果当前节点没有子节点，我们只需返回，不返回结果。\n\n伪代码可能如下所示：\n\n```\nsearch(value_to_find, current_node):\n\
    \    If current_node.value == value_to_find:\n        print('value found:', current_node.value)\n\
    \    Else If current_node.has_children:\n        search(value, current_node.left)\n\
    \        search(value, current_node.right)\n```\n\n这说明了编写一个递归函数来解决一个初看起来可能很复杂的问题是多么容易。\n\
    \n## 10.5 Python 中的递归\n\n大多数计算机程序都支持递归的概念，Python 也不例外。在 Python 中，一个函数调用自身（即在函数体内调用同一个函数）是完全合法的。因此，当函数执行时，它将调用自身。\n\
    \n在 Python 中，我们可以编写一个递归函数，例如：\n\n```\ndef recursive_function():\n    print('calling\
    \ recursive_function')\n    recursive_function()\n```\n\n这里，函数 `recursive_function()`\
    \ 被定义为打印一条消息，然后调用自身。注意，这不需要特殊的语法，因为函数在使用之前不需要完全定义。\n\n当然，在 `recursive_function()`\
    \ 的情况下，这将导致无限递归，因为没有终止条件。然而，这只有在运行时才会显现出来，届时 Python 最终会生成一个错误：\n\n```\nTraceback\
    \ (most recent call last):\n  File \"recursion_example.py\", line 5, in <module>\n\
    RecursionError: maximum recursion depth exceeded while calling a Python object\n\
    ```\n\n然而，如前所述，递归函数应该有一个*递归*部分和一个*终止*或基本情况部分。终止条件用于识别何时适用基本情况。因此，我们应该添加一个条件来识别终止场景以及基本情况的行为是什么。我们将在下一节中执行此操作，同时研究如何递归生成一个数的阶乘。\n\
    \n## 10.6 递归计算阶乘\n\n我们已经在上一章的练习中看到了如何使用迭代创建一个可以计算数字阶乘的程序；现在我们将创建一个使用递归的替代实现。\n\
    \n回想一下，一个数的阶乘是将该数乘以直到该数的每个整数的结果，例如，要找到数字 5 的阶乘（写作 5!），我们可以计算 1 * 2 * 3 * 4 * 5，结果为\
    \ 120。\n\n我们可以通过定义一个函数来创建阶乘问题的递归解决方案，该函数接受一个整数来生成阶乘数。如果传入的数字是 1，该函数将返回值 1——这是基本情况。否则，它将把传入的值与使用\
    \ n – 1 调用自身（`factorial()` 函数）的结果相乘，这是递归部分。\n\n该函数如下所示：\n\n```\ndef factorial(n):\n\
    \    if n == 1: # 终止条件\n        return 1 # 基本情况\n    else:\n        res = n *\
    \ factorial(n-1) # 递归调用\n        return res\nprint(factorial(5))\n```\n\n理解这个函数的关键在于它具有：\n\
    \n1. 一个保证在 n 的值为 1 时执行的终止条件。这是基本情况；我们无法进一步简化问题，因为 1 的阶乘就是 1！\n2. 该函数递归调用自身，但参数为\
    \ n − 1；这意味着每次调用自身时，n 的值都会变小。因此，从这次调用返回的值是一个更小计算的结果。\n\n为了阐明其工作原理，我们可以在函数中添加一些打印语句（和一个深度指示器）来指示其行为：\n\
    \n```\ndef factorial(n, depth = 1):\n    if n == 1:\n        print('\\t' * depth,\
    \ 'Returning 1')\n        return 1\n    else:\n        print('\\t'*depth,'Recursively\
    \ calling factorial(',n-1,')')\n        result = n * factorial(n-1, depth + 1)\n\
    \        print('\\t' * depth, 'Returning:', result)\n        return result\n\n\
    print('Calling factorial( 5 )')\nprint(factorial(5))\n```\n\n当我们运行这个版本的程序时，输出是：\n\
    \n```\nCalling factorial( 5 )\n    Recursively calling factorial( 4 )\n      \
    \  Recursively calling factorial( 3 )\n            Recursively calling factorial(\
    \ 2 )\n                Recursively calling factorial( 1 )\n                Returning\
    \ 1\n            Returning: 2\n        Returning: 6\n    Returning: 24\nReturning:\
    \ 120\n120\n```\n\n注意，depth 参数仅用于为打印语句提供一些缩进。\n\n从输出中我们可以看到，每次调用阶乘程序都会导致一个更简单的计算，直到我们要求\
    \ 1! 的值，即 1。这作为调用 factorial(1) 的结果返回。这个结果与之前的 n 值（即 2）相乘。这导致 factorial(2) 返回值\
    \ 2，依此类推。"
