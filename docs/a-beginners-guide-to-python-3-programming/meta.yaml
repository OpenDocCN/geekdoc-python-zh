    \ object referenced by the name `multi_by_two` that we can invoke (execute) using\
    \ the round brackets `()`.\n\nIt is also a one parameter function that takes a\
    \ number and returns a value which is twice that number.\n\nThus, a parameter\
    \ that expects to be given a reference to a function that takes a number and returns\
    \ a number can be given a reference to any function that meets this (implied)\
    \ contract. This includes our `mult_by_two` function but also any of the following:\n\
    \n```\ndef mult_by_five(num):\n    return num * 5\n\ndef square(num):\n    return\
    \ num * num\n\ndef add_one(num):\n    return num + 1\n```\n\nAll of the above\
    \ could be used with the following higher-order function:\n\n```\ndef apply(num,\
    \ func):\n    return func(num)\n```\n\nFor example:\n\n```\nresult = apply(10,\
    \ mult_by_two)\nprint(result)\n```\n\nThe output from this code is:\n\n```\n20\n\
    ```\n\nThe following listing provides a complete set of the earlier sample functions\
    \ and how they may be used with the apply function:\n\n```\nprint(apply(10, mult_by_five))\n\
    print(apply(10, square))\nprint(apply(10, add_one))\nprint(apply(10, mult_by_two))\n\
    ```\n\nThe output from this is:\n\n```\n50\n100\n11\n20\n```"
