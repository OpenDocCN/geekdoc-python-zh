    \ = 'Cardiff'\n\nprint(cities['England'])\nprint(cities['Wales'])\nprint(cities['Ireland'])\n\
    ```\n\n在这两种情况下，都有一个检索缺失键值的请求——第一个例子中是 'Wednesday'，第二个例子中是 'Ireland'。然而，两者都不会引发\
    \ `KeyError`，因为它们都有一个用于生成缺失值的函数。在第一个例子中，`lambda` 函数将返回 -1，在第二个例子中，`default_value()`\
