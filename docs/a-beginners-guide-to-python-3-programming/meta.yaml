- md: "## Chapter 45\nThe Python Bites Back\n\n## 45.1 Fourteen Beginner Mistakes\
    \ to Avoid in Python\n\nJust like other programming languages it has its fair\
    \ share of gotchas that can trip up a Python newbie. In this chapter we will look\
    \ at 14 of the most common mistakes and how to solve them.\n\n## 45.2 Mistake\
    \ #1: Indentation\n\nThe very first thing most people notice about Python is that\
    \ indentation is key to structuring your program. Unlike free form languages such\
    \ as Java and C# the way in which you indent you program is meaningful and part\
    \ of the program itself. For example, you indicate the statement or statements\
    \ that are part of an if statement via indentation. One of the important things\
    \ to note about indentation is that statements should be indented to the same\
    \ level for the same language construct.\n\nFor example, the following code intends\
    \ to indicate that the four print statements are all part of the for loop.\n\n\
    ```\nfor i in range(0, 4):\n    print(i, end='')\n\n    print(i * i)\n    print(i\
    \ ** i)\n    print(i * i * i)\n```\n\nHowever, the first print statement is indented\
    \ to a different level than the following print statements (3 spaces vs. 4). This\
    \ will be an error in Python and if we attempt to run this program it will result\
    \ in a runtime error being generated:\n\n```\n% python main.py\n  File \"main.py\"\
    , line 4\n    print(i * i)\n    ^\nIndentationError: unexpected indent\n```\n\n\
    This indicates that there is an `IndentationError` at line 4—in other words the\
    \ indentations do not match.\n\nOne issue that can catch out the unwary is that\
    \ even if the layout looks correct in an editor you may still get a runtime error.\
    \ For example, the following code looks as if it has been laid out correctly in\
    \ Emacs:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_504_0.png)\n\nHowever, when\
    \ we run this program, we get\n\n```\npython main.py\n  File \"main.py\", line\
    \ 3\n    print(i * i)\n    ^\nTabError: inconsistent use of tabs and spaces in\
    \ indentation\n```\n\nThis `TabError` error has been generated because a tab has\
    \ been used for line 3 while spaces have been used for the other lines. This means\
    \ that as far as Python is concerned the indentations are not the same.\n\nBy\
    \ convention Python programmers should always use spaces and not tabs (although\
    \ in practice within a single block of code all that is required is that you are\
    \ consistent in your use of spaces or tabs). However, programmers should not mix\
    \ the two.\n\nTo resolve this sort of issue you can replace the tab with the equivalent\
    \ spaces. Many IDEs such as PyCharm do this for you either when you hit the tab\
    \ key or when you ask the IDE to reformat the code. The above code is being written\
    \ in EMACS which does not do any conversion but also does not display any visual\
    \ difference, and thus this can be a difficult problem to resolve if it is the\
    \ first time you encounter it.\n\n## 45.3 Mistake #2: Case Sensitivity\n\nPython\
    \ is a very case sensitive programming language. In Python a variable with the\
    \ name My_Var is a completely different variable to one called my_var. As Python\
    \ dynamically declares variables this can cause confusion and lead to unexpected\
    \ bugs in programs.\n\nFor example, in the following program two similarly named\
    \ but completely different variables are declared:\n\n```\nmy_var = None\nprint(my_var)\n\
    My_Var = input('Please input your name:')\nprint(my_var)\n```\n\nWhen the program\
    \ is run and the user enters the number 5, the output generated is\n\n```\nNone\n\
    Please input your name: John\nNone\n```\n\nThis is probably not what the programmer\
    \ expected. The problem is that the program declares two variables. One is declared\
    \ on line 1 and initialized with the value None. The second is declared on line\
    \ 3 and is initialized with the string entered by the user. Whereas the programmer\
    \ probably planned to reuse the first variable from line 1 in line 3!\n\nTo solve\
    \ this problem developers should take great care with how they name variables.\
    \ In this case if the developer had followed the standard Python conventions as\
    \ described by PEP 8—Style Guide for Python Code (note PEP actually stands for\
    \ Python Enhancement Proposal), then they would have used lower case for all variable\
    \ names and thus would have always referred to the variable as my_var.\n\n## 45.4\
    \ Mistake #3: Default Initialization of Function/Method Parameters with Mutable\
    \ Types\n\nPython allows a parameter to a function or a method to have a default\
    \ value. This makes the parameter optional and provides a great deal of flexibility\
    \ in how a function may be invoked.\n\nFor example, the following function takes\
    \ up to four parameters; the first is a required parameter, but the remaining\
    \ parameters are all optional:\n\n```\ndef greeter(name,\n            title =\
    \ 'Dr',\n            prompt = 'Welcome',\n            message = 'Live Long and\
    \ Prosper'):\n    print(prompt, title, name, '-', message)\n```\n\nWhen the greeter()\
    \ function is invoked we can provide one or more arguments as shown below:\n\n\
    ```\ngreeter('Eloise')\ngreeter('Lloyd', 'Mr')\ngreeter('Phoebe', 'Miss', 'Hi')\n\
    greeter('Adam', 'Mr', 'Hi', 'May the Force be with you')\n```\n\nAs such default\
    \ parameters are a valuable part of the language.\n\nHowever, many programmers\
    \ new to Python misunderstand when the initial value for a parameter is evaluated.\
    \ In the above we used strings to illustrate the use of default parameters which\
    \ is ideal as they are immutable types (that is once created they cannot be changed).\n\
    \nHowever, many other types in Python are mutable such as Lists. It is perfectly\
    \ possible to modify a List after you have created it.\n\nSuch types, if used\
    \ as default values for parameters, can lead to unexpected results. For example,\
    \ consider the following function and class with a method:\n\n```\ndef do_something(msg,\
    \ data=[]):\n    data.append(msg)\n    print(data)\n\nclass Bag:\n    def do_something(self,\
    \ msg, data=[]):\n        data.append(msg)\n        print(data)\n```\n\nWhat happens\
    \ if we run the following program that uses the above function and class:\n\n\
    ```\ndo_something('John')\ndo_something('Paul')\ndo_something('Denise')\n\nbag\
    \ = Bag()\nbag.do_something('Adam')\nbag.do_something('Natalia')\nbag.do_something('Phoebe')\n\
    ```\n\nThe output from this program is\n\n```\n['John']\n['John', 'Paul']\n['John',\
    \ 'Paul', 'Denise']\n['Adam']\n['Adam', 'Natalia']\n['Adam', 'Natalia', 'Phoebe']\n\
    ```\n\nThis may not be what you expected! The issue is that the default value\
    \ is evaluated *only once*, at the point at which the function or method is defined.\
    \ As the value specified for the default value of the data parameter is a list,\
    \ then the *same* list object is reused each time the function is invoked with\
    \ only the msg parameter being supplied.\n\nA common work around for this problem\
    \ is to use an *immutable* value for the default. Then within the function or\
    \ method, the mutable object is assigned to the parameter if the default immutable\
    \ value is being used. For example:\n\n```\ndef do_something(msg, data=None):\n\
    \    if data is None:\n        data = []\n    data.append(msg)\n    print(data)\n\
    \nclass Bag:\n    def do_something(self, msg, data=None):\n        if data is\
    \ None:\n            data = []\n        data.append(msg)\n        print(data)\n\
    ```\n\nIf we now rerun the program that uses the above function and class we now\
    \ get\n\n```\n['John']\n['Paul']\n['Bill']\n['Denise']\n['Adam']\n['Jasmine']\n\
    ['Theeban']\n```\n\n## 45.5 Mistake #4: Default Initialization of Function/Method\
    \ Parameters Using a Function\n\nThis mistake is similar to the last one in that\
    \ it relates to when the default value is evaluated. It occurs because, if a function\
    \ is used to initialize a default parameter, it is also executed/evaluated at\
    \ the point that the function is declared.\n\nFor example, the following code\
    \ allows a programmer to log a message with a time stamp indicating when the message\
    \ was printed. However, the programmer has made the `time_point` parameter optional\
    \ by providing a default value for it, as supplied by the call to the `datetime.now()`\
    \ function.\n\n```\nfrom datetime import datetime\n\ndef log_it(msg, time_point\
    \ = datetime.now()):\n    print(msg, time_point)\n\nlog_it('In here')\nlog_it('Went\
    \ In here', datetime.now())\nlog_it('Now In here')\n```\n\nThe output generated\
    \ by this code is\n\n```\nIn here 2021-06-29 14:28:25.100567\nWent In here 2021-06-29\
    \ 14:28:25.100793\nNow In here 2021-06-29 14:28:25.100567\n```\n\nWhat you can\
    \ see from this is that the first and third logged messages have the same time\
    \ stamp, and the 2nd message has a different time stamp. This is because the `time_point`\
    \ parameter's default value is evaluated when the function is defined, that is,\
    \ when it is loaded by the Python runtime, and thus the time stamp generated for\
    \ the `time_point` variable is the point in time when the function came into existence\
    \ and is thus not related to when the function is called.\n\nThe fix for this\
    \ is like the last mistake in that an *immutable* value should be used as the\
    \ default value. If the default value is present then a new timestamp should be\
    \ generated, for example:\n\n```\ndef log_it(msg, time_point = None):\n    if\
    \ time_point is None:\n        time_point = datetime.now()\n    print(msg, time_point)\n\
    ```\n\n## 45.6 Mistake #5: Out by 1 Ranges\n\nIn Python ranges are used whenever\
    \ a sequence of values is required. One typical use of a range is with a for loop.\
    \ For example, to loop through a set of integers starting at zero we might write\n\
    \n```\nfor i in range(0, 5):\n    print(i, end=', ')\nprint()\n```"
  mdcn: "## 第45章\nPython的反击\n\n## 45.1 初学者应避免的14个Python错误\n\n与其他编程语言一样，Python也有其特有的陷阱，可能会让新手措手不及。在本章中，我们将探讨14个最常见的错误及其解决方法。\n\
    \n## 45.2 错误 #1：缩进\n\n大多数人首先注意到的是，缩进是构建Python程序结构的关键。与Java和C#等自由格式语言不同，Python中缩进的方式具有意义，是程序本身的一部分。例如，你通过缩进来表示属于`if`语句的语句。关于缩进，需要注意的一个重要事项是，对于相同的语言结构，语句应缩进到相同的级别。\n\
    \n例如，以下代码意图表明四个`print`语句都属于`for`循环。\n\n```\nfor i in range(0, 4):\n    print(i,\
    \ end='')\n\n    print(i * i)\n    print(i ** i)\n    print(i * i * i)\n```\n\n\
    然而，第一个`print`语句的缩进级别与后续的`print`语句不同（3个空格 vs. 4个空格）。这在Python中将是一个错误，如果我们尝试运行此程序，将导致运行时错误：\n\
    \n```\n% python main.py\n  File \"main.py\", line 4\n    print(i * i)\n    ^\n\
    IndentationError: unexpected indent\n```\n\n这表明第4行存在一个`IndentationError`——换句话说，缩进不匹配。\n\
    \n一个可能让粗心者措手不及的问题是，即使布局在编辑器中看起来正确，你仍可能遇到运行时错误。例如，以下代码在Emacs中看起来布局正确：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_504_0.png)\n\
    \n然而，当我们运行此程序时，得到：\n\n```\npython main.py\n  File \"main.py\", line 3\n    print(i\
    \ * i)\n    ^\nTabError: inconsistent use of tabs and spaces in indentation\n\
    ```\n\n这个`TabError`错误是因为第3行使用了制表符，而其他行使用了空格。这意味着在Python看来，缩进并不相同。\n\n按照惯例，Python程序员应始终使用空格而不是制表符（尽管在实践中，在单个代码块内，只要一致地使用空格或制表符即可）。但是，程序员不应混合使用两者。\n\
    \n要解决此类问题，你可以用等效的空格替换制表符。许多IDE（如PyCharm）会在你按下制表符键或要求IDE重新格式化代码时自动完成此操作。上述代码是在EMACS中编写的，它不进行任何转换，也不显示任何视觉差异，因此如果你是第一次遇到这个问题，解决起来可能会很困难。\n\
    \n## 45.3 错误 #2：大小写敏感\n\nPython是一种大小写非常敏感的编程语言。在Python中，名为`My_Var`的变量与名为`my_var`的变量是完全不同的变量。由于Python动态声明变量，这可能会引起混淆并导致程序中出现意外的错误。\n\
    \n例如，在以下程序中，声明了两个名称相似但完全不同的变量：\n\n```\nmy_var = None\nprint(my_var)\nMy_Var =\
    \ input('Please input your name:')\nprint(my_var)\n```\n\n当程序运行并输入数字5时，生成的输出是：\n\
    \n```\nNone\nPlease input your name: John\nNone\n```\n\n这可能不是程序员预期的结果。问题在于程序声明了两个变量。一个在第1行声明并初始化为`None`。第二个在第3行声明并初始化为用户输入的字符串。而程序员可能计划在第3行重用第1行的第一个变量！\n\
    \n为了解决这个问题，开发者应非常小心地命名变量。在这种情况下，如果开发者遵循了PEP 8——Python代码风格指南（注意PEP实际上是Python Enhancement\
    \ Proposal的缩写）中描述的标准Python约定，那么他们将对所有变量名使用小写字母，从而始终将变量称为`my_var`。\n\n## 45.4 错误\
    \ #3：使用可变类型作为函数/方法参数的默认初始化\n\nPython允许函数或方法的参数具有默认值。这使得参数成为可选的，并为函数的调用方式提供了极大的灵活性。\n\
    \n例如，以下函数最多接受四个参数；第一个是必需参数，但其余参数都是可选的：\n\n```\ndef greeter(name,\n           \
    \ title = 'Dr',\n            prompt = 'Welcome',\n            message = 'Live\
    \ Long and Prosper'):\n    print(prompt, title, name, '-', message)\n```\n\n当调用`greeter()`函数时，我们可以提供一个或多个参数，如下所示：\n\
    \n```\ngreeter('Eloise')\ngreeter('Lloyd', 'Mr')\ngreeter('Phoebe', 'Miss', 'Hi')\n\
    greeter('Adam', 'Mr', 'Hi', 'May the Force be with you')\n```\n\n因此，默认参数是该语言的重要组成部分。\n\
    \n然而，许多Python新手误解了参数初始值的求值时机。在上面的例子中，我们使用字符串来说明默认参数的用法，这是理想的，因为它们是不可变类型（即一旦创建就不能更改）。\n\
    \n然而，Python中的许多其他类型是可变的，例如列表。在创建列表后修改它是完全可能的。\n\n此类类型如果用作参数的默认值，可能会导致意外结果。例如，考虑以下函数和带有方法的类：\n\
    \n```\ndef do_something(msg, data=[]):\n    data.append(msg)\n    print(data)\n\
    \nclass Bag:\n    def do_something(self, msg, data=[]):\n        data.append(msg)\n\
    \        print(data)\n```\n\n如果我们运行使用上述函数和类的以下程序，会发生什么？\n\n```\ndo_something('John')\n\
    do_something('Paul')\ndo_something('Denise')\n\nbag = Bag()\nbag.do_something('Adam')\n\
    bag.do_something('Natalia')\nbag.do_something('Phoebe')\n```\n\n此程序的输出是：\n\n```\n\
    ['John']\n['John', 'Paul']\n['John', 'Paul', 'Denise']\n['Adam']\n['Adam', 'Natalia']\n\
    ['Adam', 'Natalia', 'Phoebe']\n```\n\n这可能不是你预期的！问题在于默认值*仅在函数或方法定义时求值一次*。由于为`data`参数指定的默认值是一个列表，因此每次仅提供`msg`参数调用函数时，都会重用*同一个*列表对象。\n\
    \n解决此问题的常见方法是使用*不可变*值作为默认值。然后在函数或方法内部，如果使用了默认的不可变值，则将可变对象赋值给参数。例如：\n\n```\ndef\
    \ do_something(msg, data=None):\n    if data is None:\n        data = []\n   \
    \ data.append(msg)\n    print(data)\n\nclass Bag:\n    def do_something(self,\
    \ msg, data=None):\n        if data is None:\n            data = []\n        data.append(msg)\n\
    \        print(data)\n```\n\n如果我们现在重新运行使用上述函数和类的程序，得到：\n\n```\n['John']\n['Paul']\n\
    ['Bill']\n['Denise']\n['Adam']\n['Jasmine']\n['Theeban']\n```\n\n## 45.5 错误 #4：使用函数作为函数/方法参数的默认初始化\n\
    \n此错误与上一个类似，因为它涉及默认值的求值时机。它发生的原因是，如果使用函数来初始化默认参数，该函数也会在函数声明时被执行/求值。\n\n例如，以下代码允许程序员记录带有时间戳的消息，以指示消息打印的时间。然而，程序员通过提供默认值（由调用`datetime.now()`函数提供）使`time_point`参数成为可选的。\n\
    \n```\nfrom datetime import datetime\n\ndef log_it(msg, time_point = datetime.now()):\n\
    \    print(msg, time_point)\n\nlog_it('In here')\nlog_it('Went In here', datetime.now())\n\
    log_it('Now In here')\n```\n\n此代码生成的输出是：\n\n```\nIn here 2021-06-29 14:28:25.100567\n\
    Went In here 2021-06-29 14:28:25.100793\nNow In here 2021-06-29 14:28:25.100567\n\
    ```\n\n从这里你可以看到，第一条和第三条记录的消息具有相同的时间戳，而第二条消息具有不同的时间戳。这是因为`time_point`参数的默认值在函数定义时求值，即在Python运行时加载函数时求值，因此为`time_point`变量生成的时间戳是函数存在的时间点，与函数被调用的时间无关。\n\
    \n解决此问题的方法与上一个错误类似，即应使用*不可变*值作为默认值。如果存在默认值，则应生成新的时间戳，例如：\n\n```\ndef log_it(msg,\
    \ time_point = None):\n    if time_point is None:\n        time_point = datetime.now()\n\
    \    print(msg, time_point)\n```\n\n## 45.6 错误 #5：范围差1错误\n\n在Python中，当需要一系列值时，会使用范围。范围的一个典型用法是与`for`循环一起使用。例如，要循环从零开始的一组整数，我们可以写：\n\
    \n```\nfor i in range(0, 5):\n    print(i, end=', ')\nprint()\n```"
