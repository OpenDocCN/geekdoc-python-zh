    # 9.4.1 Generate the Random Number


    We will start off by looking at how we can generate a random number. Up to this
    point we have only used the built-in functions that are provided by Python automatically.
    In actual fact Python comes with very many modules provided by the Python organization
    itself, by third-party vendors and by the open source (typically free) software
    community.


    The Python `random` module or library is one that is provided with Python as part
    of the default environment; but the functions within it are not automatically
    loaded or made available to the programmer. This is partly because there are so
    many facilities available with Python that it could become overwhelming; so for
    the most part Python only makes available by default the most commonly used facilities.
    Programmers can then explicitly specify when they want to use some facilities
    from one of the other libraries or modules.


    The `random` module provides implementations of pseudo-random number generators
    for use in application programs. These random number generators are referred to
    as *pseudo* because it is very hard for a computer to truly generate a series
    of random numbers; instead it does its best to mimic this using an algorithm;
    which by its very nature will be based on some logic which will mean that it is
    not impossible to predict the next number—hence it is not truly random. For our
    purposes this is fine but there are applications, such as security and encryption,
    where this can be a real problem.


    To access the `random` module in Python you need to *import* it; this makes the
    module visible in the rest of the Python file (in our case to our program). This
    is done using


    ```

    import random

    number_to_guess = random.randint(1, 10)

    ```


    Once we have imported it, we can use the functions within this module, such as
    `randint`. This function returns a random integer between the first and second
    value parameters. In the above example it means that the random number generated
    will be between 1 and 10 inclusive.


    The variable `number_to_guess` will now hold an integer which the player of the
    game must guess.


