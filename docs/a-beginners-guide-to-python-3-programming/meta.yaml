  md: "# 34.3 Creating a Dictionary\n\nA `dict` is created using curly brackets (`{}`)\
    \ where each entry in the dictionary is a key:value pair:\n\n```\ncities = {'Wales':\
    \ 'Cardiff',\n          'England': 'London',\n          'Scotland': 'Edinburgh',\n\
    \          'Northern Ireland': 'Belfast',\n          'Ireland': 'Dublin'}\nprint(cities)\n\
    ```\n\nThis creates a dictionary referenced by the variable `cities` which holds\
    \ a set of key: value pairs for the capital cities of the UK and Ireland. When\
