    \ 维基百科流程图页面。\n\n# 第12章\nPython中的函数\n\n## 12.1 引言\n\n如上一章所述，当你构建任何规模的应用程序时，你都会希望将其分解为更易于管理的单元，这些单元可以单独处理、测试和维护。定义这些单元的一种方式是作为Python函数。\n\
