    This statement does several things. It first executes another function called
    input(). This function has passed a string—which is known as an argument—to use
    when it prompts the user for input.


    This function input() is again a built-in function that is part of the Python
    language. In this case it will display the string you provide as a prompt to the
    user and wait until the user types something in followed by the return key.


    Whatever the user types in is then returned as the result of executing the input()
    function. In this case that result is then stored in the variable user_name.


    A variable is a named area of the computers’ memory that can be used to hold things
    (often referred to as data) such as strings, numbers, Boolean values such as True/False.
    In this case the variable user_name is acting as a label for an area of memory
    which will hold the string entered by the user. The basic idea is illustrated
    in the following diagram:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_67_0.png)


    This simplified picture illustrates how a variable, such as user_name, can reference
    an area of memory containing actual data. In this diagram the memory is shown
    as a two-dimensional grid of memory locations. Each location has an address associated
    with it. This address is unique within the memory and can be used to return'
