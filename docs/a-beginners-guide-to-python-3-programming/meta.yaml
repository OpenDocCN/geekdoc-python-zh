  md: "# Chapter 44\nAttribute Lookup\n\n# 44.1 Introduction\n\nCompared to static\
    \ compile languages such as Java and C# Python is a dynamic and flexible language.\
    \ This is also true of how attributes within a class definition are handled. In\
    \ this chapter we will look in more detail about how Python manages attributes\
    \ and method lookups, how unknown attribute and method lookup are handled and\
    \ how you can intercept such lookups yourself.\n\n# 44.2 Attributes in Python\n\
    \nAs shown in the last chapter, Python is very dynamic and it is easy to add attributes\
    \ and methods to a class, but how does this work. It is worth briefly digressing\
    \ and considering how Python manages attribute and method lookup for an object.\n\
    \nPython classes can have both *class* and *instance* oriented attributes, for\
    \ example the following class `Student` has a *class* attribute `count` (that\
    \ is associated with the class itself) and an *instance* or *object* attribute\
    \ `name`. Thus each instance of the class `Student` will have its own `name` attribute.\n\
    \n```\nclass Student:\n    count = 0\n\n    def __init__(self, name):\n      \
    \  self.name = name\n        Student.count += 1\n```\n\nWhenever an instance of\
    \ the class `Student` is created the `Student.count` attribute will be incremented\
    \ by 1."
  merge: -1
  pgno: 495
- img_proc: true
  md: 'To manage these attributes Python maintains internal dictionaries; one for
    *class* attributes and one for *object* attributes. These dictionaries are called
    `__dict__` and can be accessed either from the class `<class>.__dict__` (for class
    attributes) or from an instance of the class `<instance>.__dict__` (for object
    attributes). For example:


    ```

    student = Student(''John'')


    # Class attribute dictionary

    print(''Student.__dict__:'', Student.__dict__)

    # Instance / Object dictionary

    print(''student.__dict__:'', student.__dict__)

    ```


    Which produces the output shown below (note that the class dictionary holds more
    information than just the class attribute count):


    ```

    Student.__dict__: {''__module__'': ''__main__'', ''count'': 1, ''__init__'': <function
    Student.__init__ at 0x10d515158>, ''__dict__'': <attribute ''__dict__'' of ''Student''
    objects>, ''__weakref__'': <attribute ''__weakref__'' of ''Student'' objects>,
    ''__doc__'': None}

    student.__dict__: {''name'': ''John''}

    ```


    To look up an attribute Python does the following for class attributes:


    +   1. Search the class dictionary for an attribute

    2. If the attribute is *not* found in step 1 then search the parent class(es)
    dictionaries.


    For object attributes, Python first searches the instance dictionary and repeats
    the above steps, it thus performs these steps:


    +   1. Search the object/instance dictionary

    2. If the attribute was *not* found in step 1, then search the class dictionary
    for an attribute

    3. If the attribute is *not* found in step 2, then search the parent class(es)
    dictionaries.


    Thus given the following statements, different steps are taken each time:


    ```

    student = Student(''John'')


    print(''Student.count:'', Student.count) # class lookup

    print(''student.name:'', student.name) # instance lookup

    print(''student.count:'', student.count) # lookup finds class attribute

    ```


    The output as expected is that either attempt to access the class attribute `count`
    will result in the value 1 whereas the object attribute name returns ''John''.'
