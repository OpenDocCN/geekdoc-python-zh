    (also known as stepwise design) highlights the idea that we are breaking down
    a system into the sub-systems that make it up.

    It is common to represent the functions identified in the form of a tree illustrating
    the relationships between the higher-level functions and lower-level functions.
    This is illustrated below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_147_0.png)


    This diagram illustrates how a credit card approval process can be broken down
    into sub functions.


    ## 11.3.1 Functional Decomposition Terminology


    The key terms used within functional decomposition are:


    - **Function.** This is a task that is performed by a device, system or process.

    - **Decomposition.** This is the process by which higher-level functions are broken
    down into lower-level functions where each function represents part of the functionality
    of the higher-level function.

    - **Higher-Level Function.** This is a function that has one or more sub functions.
    This higher-level function depends on the functionality of the lower-level functions
    for its behaviour.

    - **Sub Function.** This is a function that provides some element of the behaviour
    of a higher-level function. A sub function can also be broken down into its own
    sub functions in a hierarchical manner. In the above diagram the *Review for Compliance*
    function is both a sub function and has its own sub functions.

    - **Basic Function.** A basic function is a function that has no smaller sub functions.
    The *Perform Credit Check* and *Review Against internal Rules* functions are both
    basic functions.


    ## 11.3.2 Functional Decomposition Process


    At a very high level, functional decomposition consists of a series of steps such
    as those outlined below:


    1. Find/identify the inputs and outputs of the system.

    2. Define how the inputs are converted to the outputs. This will help identify
    the top most, high-level function(s).

    3. Look at the current function(s) and try to break them down into a list of sub
    functions. Identify what each sub function should do, and what its inputs and
    outputs are.

    4. Repeat Step 2 for each function identified until the functions identified can’t
    or should not be decomposed further.

    5. Draw a diagram of the function hierarchy you have created. Viewing the functions
    and their relationships is a very useful thing to do as it allows developers to
    visualize the system functionally. There are many computer-aided software engineering
    (CASE) tools that help with this but any drawing tool (such as Visio) can be used.

    6. Examine the diagram for any repeating functions. That is, functions that do
    the same thing but appear in different places in the design. These are probably
    more generic functions that can be reused. Also examine the diagram to see if
    you can identify any missing functions.

    7. Refine/design the interfaces between one function and another. That is, what
    data/information is passed to and from a function to a sub function as well as
    between functions.


    ## 11.3.3 Calculator Functional Decomposition Example


    As an example of functional decomposition let us consider a simple calculator
    program.

    We want this program to be able to perform a set of mathematical operations on
    two numbers, such as add, subtract, multiply and divide. We might therefore draw
    a functional decomposition diagram (or FDD) such as:


    # 11.3 Functional Decomposition


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_149_0.png)


    This illustrates that the calculator function can be decomposed into add, subtract,
    multiply and divide functions.

    We might then identify the need to enter the two numbers to be operated on. This
    would result in one or more new functions being added:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_149_1.png)


    We might also identify the need to determine which numerical operation should
    be performed based on user input. This function might sit above the numerical
    functions or alongside them. This is in fact an example of a design decision that
    the designer/developer must make based on their understanding of the problem and
    how the software will be developed/tested/used, etc.

    In the following version of the functional decomposition diagram the *operation
    selection* function is placed at the same level as the numerical operations as
    it provides information back to the top-level function.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_149_2.png)


    # 11.4 Functional Flow


    Although the decomposition hierarchy presented in the functional decomposition
    diagram illustrates the functions and their hierarchical relationships, it does
    not capture how the data flows between the functions or the order in which the
    functions are invoked.


    There are several approaches to describing the interactions between the functions
    identified by functional decomposition including the use of pseudo-code, data
    flow diagrams and sequence diagrams:


    - **Pseudo-code.** This is a form of structured English that is not tied to any
    particular programming language but which can be used to express simple ideas
    including conditional choices (similar to if statements) and iteration (as typified
    by looping constructs). However, as it is a pseudo-language, developers are not
    tied to a specific syntax and can include functions without the need to define
    those functions in detail.

    - **Data Flow Diagrams.** These diagrams are used to chart the inputs, processes
    and outputs of the functions in a structured graphical form. A data flow diagram
    typically has no control flow; there are no decision rules and no loops. For each
    data flow, there must be at least one input and one end point. Each process (function)
    can be refined by another lower-level data flow diagram, which subdivides this
    process into sub-processes.

    - **Sequence Diagrams.** These are used to represent interactions between different
    entities (or objects) in sequence. The functions invoked are represented as being
    called from one entity to another. Sequence diagrams are more typically used with
    object-oriented systems.


    # 11.5 Data Flow Diagrams


    A data flow diagram consists of a set of inputs and outputs, processes (functions),
    flows, data stores (also known as warehouses) and terminators.


    - **Process.** This is the process (or function or transformation) that converts
    inputs into outputs. The name of the process should be descriptive indicating
    what it does.

    - **Data Flow.** The flow indicates the transfer of data/information from one
    element to another (that is a flow has a direction). The flow should have a name
    that suggests what information/data is being exchanged. Flows link processes,
    data stores and terminators.

    - **Data Store/Warehouse.** A data store (which may be something such as a file,
    folder, database or other repository of data) is used to store data for later
    use. The name of the data store is a plural noun (e.g., employees). The flow from
    the data store usually represents the reading of the data stored in the data store,
    and the flow to the data store usually expresses data entry or updating (sometimes
    also deleting data).

    - **Terminator.** The terminator represents an external entity (to the system)
    that communicates with the system. Examples of entities might be human users or
    other systems, etc.


    An example of a data flow diagram is given below using the functions identified
    for the calculator:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_151_0.png)


    In this diagram the hierarchy of DFDs is indicated by the levels which expand
    on how the function in the previous level is implemented by the functions at the
    next level. This DFD also only presents the data flow for the situation where
    the user selects the `add` function as the numerical operation to apply.


    # 11.6 Flowcharts


    A flowchart is a graphical representation of an algorithm, workflow or process
    for a given problem.


    Flowcharts are used in the analysis, design and documentation of software systems.
    As with other forms of notation (such as DFDs) flowcharts help designers and developers
    to visualize the steps involved in a solution and thus aid in understanding the
    processes and algorithms involved.


    The steps in the algorithm are represented as various types of boxes. The ordering
    of the steps is indicated by arrows between the boxes. The flow of control is
    represented by decision boxes.


