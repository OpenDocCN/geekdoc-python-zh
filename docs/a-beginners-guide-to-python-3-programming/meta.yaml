  md: "# 32.4.6 Iterating Over Tuples\n\nYou can iterate over the contents of a `tuple`\
    \ (that is, process each element in the `tuple` in turn). This is done using the\
    \ `for` loop that we have already seen; however, it is the `tuple` that is used\
    \ for the value to which the loop variable will be applied:\n\n```\ntup3 = ('apple',\
    \ 'pear', 'orange', 'plum', 'apple')\nfor x in tup3:\n    print(x)\n```\n\nThis\
    \ prints out each of the elements in the tuple `tup3` in turn:\n\n```\napple\n\
    pear\norange\nplum\napple\n```\n\nNote that again the order of the elements in\
    \ the `tuple` is persevered.\n\n# 32.4.7 Tuple Related Functions\n\nYou can also\
    \ find out the length of a tuple\n\n```\nprint('len(tup3):\\t', len(tup3))\n```\n\
    \nYou can count how many times a specified value appears in a `tuple` (remember\
    \ tuples allow duplicates):\n\n```\nprint(tup3.count('apple')) # returns 2\n```\n\
    \nYou can also find out the (first) index of a value in a tuple:\n\n```\nprint(tup3.index('pear'))\
    \ # returns 1\n```\n\nNote that both `index()` and `count()` are methods defined\
    \ on the class `tuple`, whereas `len()` is a function that the tuple is passed\
    \ into. This is because `len()` is a generic function and can be used with other\
    \ types as well such as strings.\n\n# 32.4.8 Checking if an Element Exists\n\n\
    You can check to see if a specific element exists in a tuple using the `in` operator,\
    \ for example:\n\n```\nif 'orange' in tup3:\n    print('orange is in the tuple')\n\
    ```"
