  md: 'It is possible to import all the modules from a package by simply importing
    the package name. If you wish to provide some control over what is imported from
    a package when this happens you can define a variable `all` in the `__init__.py`
    file that will indicate what will be imported in this situation.


    # 27.9.2 Sub Packages


    Packages can contain sub packages to any depth you require. For example, the following
    diagram illustrates this idea:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_335_0.png)


    In the above diagram `utils` is the root package, this contains two sub packages
    `file_utils` and `network_utils`. The `file_utils` package has an initialization
    file and a `file_support` module. The `network_utils` package also has a package
    initialization file and two modules `network_monitoring` and `network_support`.
    Of course, the root package also has its own initialization file and its own modules
    `classes` and `functions`.


    To import the sub package, we do the same as before but each package in the `path`
    to the module is separate by a dot, for example:


    ```

    python

    import utils.file_utils.file_support

    ```


    or


    ```

    python

    from utils.file_utils.file_support import file_logger

    ```'
