    # Chapter 7

    Flow of Control Using if Statements


    # 7.1 Introduction


    In this chapter we are going to look at the if statement in Python. This statement
    is used to control the flow of execution within a program based on some condition.
    These conditions represent some choice point that will be evaluated too True or
    False. To perform this evaluation it is common to use a comparison operator (for
    example to check to see if the temperature is greater than some threshold). In
    many cases these comparisons need to take into account several values and in these
    situations logical operators can be used to combine two or more comparison expressions
    together. This chapter first introduces comparison and logical operators before
    discussing the if statement itself.


    # 7.2 Comparison Operators


    Before exploring if statements and various types of looping mechanism we need
    to discuss *comparison operators*. These are operators that return Boolean values.
    They are key to the conditional elements of flow of control statements such as
    if.

    A comparison operator is an operator that performs some form of test and returns
    True of False.

    These are operators that we use in everyday life all the time. For example, do
    I have enough money to buy lunch, or is this shoe in my size, etc.'
  - '[PAGE 107]


    In Python there are a range of comparison operators represented by typically one
    or two characters. These are:


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | == | Tests if two values are equal | 3 == 3 |

    | ! = | Tests that two values are *not* equal to each other | 2 ! = 3 |

    | < | Tests to see if the left-hand value is less than the right-hand value |
    2 < 3 |

    | > | Tests if the left-hand value is greater than the right-hand value | 3 >
    2 |

    | < = | Tests if the left-hand value is less than *or* equal to the right-hand
    value | 3 < = 4 |

    | > = | Tests if the left-hand value is greater than or equal to the right-hand
    value | 5 > = 4 |


    # 7.3 Logical Operators


    In addition to comparison operators, Python also has logical operators.

    Logical operators can be used to combined Boolean expressions together. Typically,
    they are used with comparison operators to create more complex conditions. Again,
    we use these every day for example we might consider whether we can afford an
    ice cream *and* whether we will be having our dinner soon, etc.

    There are three logical operators in Python these are listed below:


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | and | Returns True if both left and right are true | (3 < 4) and (5 > 4) |

    | or | Returns two if either the left or the right is truce | (3 < 4) or (3 >
    5) |

    | not | Returns true if the value being tested is False | not 3 < 2 |


    # 7.4 The If Statement


    An if statement is used as a form of conditional programming; something you probably
    do every day in the real world. That is, you need to decide whether you are going
    to have tea or coffee or to decide if you will have toast or a muffin for breakfast,
    etc. In each of these cases you are making a choice, usually based on some information
    such as I had coffee yesterday, so I will have tea today.

    In Python such choices are represented programmatically by the `if` condition
    statement.

    In this construct if some condition is true some action is performed, optionally
    if it is not true some other action may be performed instead.'
- md: "## 7.4.1 Working with an If Statement\n\nIn its most basic form, the if statement\
    \ is\n\n```\nif <condition-evaluating-to-boolean>:\n    statement\n```\n\nNote\
    \ that the condition must evaluate to True or False. If the condition is True\
    \ then we will execute the indented statement.\n\nNote that indentation, this\
    \ is very important in Python; indeed, layout of the code is very, very important\
    \ in Python. Indentation is used to determine how one piece of code should be\
    \ associated with another piece of the code.\n\nLet us look at a simple example,\n\
    \n```\nnum = int(input('Enter a number: '))\nif num < 0:\n    print(num, 'is negative')\n\
    ```\n\nIn this example, the user has input a number; if it is less than zero a\
    \ message noting this will be printed to the user. If the number is positive;\
    \ then nothing will be output.\n\nFor example,\n\n```\nEnter a number: -1\n-1\
    \ is negative\n```\n\nIf we wish to execute multiple statements when our condition\
    \ is true we can indent several lines; in fact all lines indented to the same\
    \ level after the if statement will automatically be part of it. For example,\n\
    \n```\nnum = int(input('Enter another number: '))\nif num > 0:\n    print(num,\
    \ 'is positive')\n    print(num, 'squared is ', num * num)\nprint('Bye')\n```\n\
    \nIf we now run this program and input 2 then we will see.\n\n```\nEnter another\
    \ number: 2\n2 is positive\n2 squared is 4\nBye\n```\n\nHowever, if we enter the\
    \ value -1 then we get.\n\n```\nEnter another number: -1\nBye\n```\n\nNote that\
    \ neither of the indented lines was executed.\n\nThis is because the two indented\
    \ lines are associated with the if statement and will only be executed if the\
    \ Boolean condition evaluates (returns) True. However, the statement print('Bye')\
    \ is not part of the if statement; it is merely the next statement to executed\
    \ after the if statement (and its associated print() statements) have finished.\n\
    \n## 7.4.2 Else in an If Statement\n\nWe can also define an *else* part of an\
    \ *if* statement; this is an optional element that can be run if the conditional\
    \ part of the *if* statement returns `False`. For example:\n\n```\nnum = int(input('Enter\
    \ yet another number: '))\nif num < 0:\n    print('Its negative')\nelse:\n   \
    \ print('Its not negative')\n```\n\nNow when this code is executed, if the number\
    \ entered is less than zero then the first `print()` statement will be run otherwise\
    \ (else) the second `print()` statement will be run. However, we are *guaranteed*\
    \ that at least one (and at most one) of the `print()` statements will execute.\n\
    \nFor example, in run 1 if we enter the value 1:\n\n```\nEnter yet another number:\
    \ 1\nIts not negative\n```\n\nAnd in run 2 if we enter the value -1:\n\n```\n\
    Enter yet another number: -1\nIts negative\n```\n\n## 7.4.3 The Use of elif\n\n\
    In some cases there may be several conditions you want to test, with each condition\
    \ being tested if the previous one failed. This *else-if* scenario is supported\
    \ in Python by the `elif` element of an *if* statement.\n\nThe `elif` element\
    \ of an *if* statement follows the *if* part and comes before any (optional) *else*\
    \ part. It has the format:\n\n```\nelif <condition-evaluating-to-boolean>:\n \
    \   statement\n```\n\nFor example\n\n```\nsavings = float(input(\"Enter how much\
    \ you have in savings: \"))\nif savings == 0:\n    print(\"Sorry no savings\"\
    )\nelif savings < 500:\n    print('Well done')\nelif savings < 1000:\n    print('Thats\
    \ a tidy sum')\nelif savings < 10000:\n    print('Welcome Sir!')\nelse:\n    print('Thank\
    \ you')\n```\n\nIf we run this:\n\n```\nEnter how much you have in savings: 500\n\
    Thats a tidy sum\n```\n\nHere we can see that the first if condition failed (as\
    \ savings is not equal to 0). However, the next elif also must have returned False\
    \ as savings were greater than 500. In fact it was the second elif statement that\
    \ returned True and thus the associated print('Thats a tidy sum') statement was\
    \ executed. Having executed this statement the if statement then terminated (the\
    \ remaining elif and else parts were ignored).\n\n## 7.5 Nesting if Statements\n\
    \nIt is possible to nest one if statement inside another. This term nesting indicates\
    \ that one if statement is located within part of the another if statement and\
    \ can be used to refine the conditional behaviour of the program.\nAn example\
    \ is given below. Note that it allows some behaviour to be performed before and\
    \ after the nested if statement is executed / run. Also note that indentation\
    \ is key here as it is how Python works out whether the if statements are nested\
    \ or not.\n\n```\nsnowing = True\ntemp = -1\nif temp < 0:\n    print('It is freezing')\n\
    \    if snowing:\n        print('Put on boots')\n    print('Time for Hot Chocolate')\n\
    print('Bye')\n```\n\nIn this example, if the temperature if less than Zero then\
    \ we will enter the if block of code. If it is not less than zero we will skip\
    \ the whole If statement and jump to the print('Bye') statement which is after\
    \ both If statements.\nIn this case the temperature is set to -1 and so we will\
    \ enter the if statement. We will then print out the 'It is freezing' string.\
    \ At this point another if statement is nested within the first if statement.\
    \ A check will now be made to see if it is snowing. Notice that snowing is already\
    \ a Boolean value and so will be either True or False and illustrates that a Boolean\
    \ value on its own can be used here.\nAs it is snowing, we will print out 'Put\
    \ on boots'.\nHowever, statement printing out 'Time for Hot Chocolate' is not\
    \ part of the nested if. It is part of the outer if (this is where indentation\
    \ is important). If you wanted it to only be printed out if it was snowing then\
    \ it must be indented to the same level as the first statement in the nested if\
    \ block, for example:\n\n```\nsnowing = True\ntemp = -1\nif temp < 0:\n    print('It\
    \ is freezing')\n    if snowing:\n        print('Put on boots')\n        print('Time\
    \ for Hot Chocolate')\nprint('Bye')\n```\n\nThis now changes the inner (or nested)\
    \ if to have two print statements associated with it.\nThis may seem subtle, but\
    \ it is *key* to how Python uses layout to link together individual statements.\n\
    \n## 7.6 If Expressions\n\nAn if expression is a short-hand form of an *if* statement\
    \ that returns a value. In fact, the difference between an expression and a statement\
    \ in a programming language is just that; expressions return a value; statements\
    \ do not.\nIt is quite common to want to assign a specific value to a variable\
    \ dependent on some condition. For example, if we wish to decide if someone is\
    \ a teenager or not then we might check to see if they are over 12 and under 20.\
    \ We could write this as:\n\n```\nage = 15\nstatus = None\nif (age > 12) and age\
    \ < 20:\n    status = 'teenager'\nelse:\n    status = 'not teenager'\nprint(status)\n\
    ```\n\nIf we run this, we get the string 'teenager' printed out.\nHowever, this\
    \ is quite long and it may not be obvious that the real intent of this code was\
    \ to assign an appropriate value to *status*.\nAn alternative is an *if expression*.\
    \ The format of an if expression is\n\n```\n<result1> if <condition-is-met> else\
    \ <result2>\n```\n\nThat is the result returned from the if expression is the\
    \ first value unless the condition fails in which case the result returned will\
    \ be the value after the else. It may seem confusing at first, but it becomes\
    \ easier when you see an example.\n\nFor example, using the if expression we can\
    \ perform a test to determine the value to assign to `status` and return it as\
    \ the result of the if expression. For example:\n\n```\nstatus = 'teenager' if\
    \ age > 12 and age < 20 else 'not teenager'\nprint(status)\n```\n\nAgain, the\
    \ result printed out is 'teenager' however now the code is much more concise,\
    \ and it is clear that the purpose of the test is to determine the result to assign\
    \ to `status`.\n\n## 7.7 A Note on True and False\n\nPython is actually quite\
    \ flexible when it comes to what actually is used to represent `True` and `False`,\
    \ in fact the following rules apply.\n\n- 0, '' (empty strings), None equate to\
    \ False.\n- Non-zero, non-empty strings, any object equate to True.\n\nHowever,\
    \ we would recommend sticking to just `True` and `False` as it is often a cleaner\
    \ and safer approach.\n\n## 7.8 Hints\n\nOne thing to be very careful of in Python\
    \ is layout.\nUnlike language such as Java and C# the layout of your program is\
    \ *part of your program*. It determines how statements are associated together\
    \ and how flow of control elements such as if statements effect which statements\
    \ are executed.\nAlso, be careful with the `if` statement and its use of the ':'\
    \ character. This character is key in separating out the conditional part of the\
    \ `if` statement from the statements that will be executed depending upon whether\
    \ the condition is `True` or `False`.\n\n## 7.9 Online Resources\n\nSee the Python\
    \ Standard Library documentation for:\n\n- https://docs.python.org/3/library/stdtypes.html#boolean-operations-and-or-not\
    \ Boolean Operations.\n- https://docs.python.org/3/library/stdtypes.html#comparisons\
    \ Comparison operators.\n- https://docs.python.org/3/tutorial/controlflow.html\
    \ the online Python flow of control tutorial."
  mdcn: "## 7.4.1 使用 If 语句\n\nIf 语句最基本的形式是：\n\n```\nif <求值为布尔值的条件>:\n    语句\n```\n\
    \n请注意，条件必须求值为 True 或 False。如果条件为 True，那么我们将执行缩进的语句。\n\n请注意缩进，这在 Python 中非常重要；实际上，代码的布局在\
    \ Python 中非常、非常重要。缩进用于确定一段代码应如何与另一段代码相关联。\n\n让我们看一个简单的例子：\n\n```\nnum = int(input('Enter\
    \ a number: '))\nif num < 0:\n    print(num, 'is negative')\n```\n\n在这个例子中，用户输入了一个数字；如果它小于零，一条说明此情况的消息将被打印给用户。如果数字是正数；那么将不会有任何输出。\n\
    \n例如：\n\n```\nEnter a number: -1\n-1 is negative\n```\n\n如果我们希望在条件为真时执行多条语句，我们可以缩进多行；实际上，if\
    \ 语句后所有缩进到同一级别的行都将自动成为其一部分。例如：\n\n```\nnum = int(input('Enter another number:\
    \ '))\nif num > 0:\n    print(num, 'is positive')\n    print(num, 'squared is\
    \ ', num * num)\nprint('Bye')\n```\n\n如果我们现在运行这个程序并输入 2，那么我们将看到：\n\n```\nEnter\
    \ another number: 2\n2 is positive\n2 squared is 4\nBye\n```\n\n然而，如果我们输入值 -1，那么我们得到：\n\
    \n```\nEnter another number: -1\nBye\n```\n\n请注意，缩进的行都没有被执行。\n\n这是因为这两行缩进的行与 if\
    \ 语句相关联，并且只有在布尔条件求值（返回）为 True 时才会被执行。然而，语句 `print('Bye')` 不是 if 语句的一部分；它只是在 if\
    \ 语句（及其相关的 `print()` 语句）执行完毕后要执行的下一条语句。\n\n## 7.4.2 If 语句中的 Else\n\n我们还可以定义 *if*\
    \ 语句的 *else* 部分；这是一个可选元素，可以在 *if* 语句的条件部分返回 `False` 时运行。例如：\n\n```\nnum = int(input('Enter\
    \ yet another number: '))\nif num < 0:\n    print('Its negative')\nelse:\n   \
    \ print('Its not negative')\n```\n\n现在，当这段代码执行时，如果输入的数字小于零，那么第一个 `print()` 语句将被运行，否则（else）第二个\
    \ `print()` 语句将被运行。然而，我们*保证*至少有一个（且最多一个）`print()` 语句会执行。\n\n例如，在第一次运行中，如果我们输入值\
    \ 1：\n\n```\nEnter yet another number: 1\nIts not negative\n```\n\n在第二次运行中，如果我们输入值\
    \ -1：\n\n```\nEnter yet another number: -1\nIts negative\n```\n\n## 7.4.3 elif\
    \ 的使用\n\n在某些情况下，你可能想要测试多个条件，每个条件都在前一个条件失败时进行测试。Python 中的 *if* 语句的 `elif` 元素支持这种\
    \ *else-if* 场景。\n\n*if* 语句的 `elif` 元素跟在 *if* 部分之后，并在任何（可选的）*else* 部分之前。它的格式是：\n\
    \n```\nelif <求值为布尔值的条件>:\n    语句\n```\n\n例如：\n\n```\nsavings = float(input(\"\
    Enter how much you have in savings: \"))\nif savings == 0:\n    print(\"Sorry\
    \ no savings\")\nelif savings < 500:\n    print('Well done')\nelif savings < 1000:\n\
    \    print('Thats a tidy sum')\nelif savings < 10000:\n    print('Welcome Sir!')\n\
    else:\n    print('Thank you')\n```\n\n如果我们运行这个：\n\n```\nEnter how much you have\
    \ in savings: 500\nThats a tidy sum\n```\n\n在这里我们可以看到第一个 if 条件失败了（因为 savings 不等于\
    \ 0）。然而，下一个 elif 也必须返回了 False，因为 savings 大于 500。事实上，是第二个 elif 语句返回了 True，因此相关的\
    \ `print('Thats a tidy sum')` 语句被执行了。执行完这条语句后，if 语句就终止了（剩余的 elif 和 else 部分被忽略）。\n\
    \n## 7.5 嵌套 if 语句\n\n可以将一个 if 语句嵌套在另一个 if 语句内部。术语“嵌套”表示一个 if 语句位于另一个 if 语句的某部分内部，可用于细化程序的条件行为。\n\
    下面给出一个例子。请注意，它允许在嵌套的 if 语句执行/运行之前和之后执行某些行为。还要注意，缩进在这里是关键，因为这是 Python 判断 if 语句是否嵌套的方式。\n\
    \n```\nsnowing = True\ntemp = -1\nif temp < 0:\n    print('It is freezing')\n\
    \    if snowing:\n        print('Put on boots')\n    print('Time for Hot Chocolate')\n\
    print('Bye')\n```\n\n在这个例子中，如果温度低于零，那么我们将进入 if 代码块。如果不低于零，我们将跳过整个 If 语句，并跳转到两个\
    \ If 语句之后的 `print('Bye')` 语句。\n在这种情况下，温度设置为 -1，因此我们将进入 if 语句。然后我们将打印出 'It is freezing'\
    \ 字符串。此时，另一个 if 语句嵌套在第一个 if 语句内部。现在将检查是否在下雪。注意 snowing 本身已经是一个布尔值，因此它将是 True 或\
    \ False，这说明一个布尔值本身可以在这里使用。\n由于正在下雪，我们将打印出 'Put on boots'。\n然而，打印 'Time for Hot\
    \ Chocolate' 的语句不是嵌套 if 的一部分。它是外部 if 的一部分（这就是缩进重要的地方）。如果你希望它只在正在下雪时才打印出来，那么它必须缩进到与嵌套\
    \ if 块中第一条语句相同的级别，例如：\n\n```\nsnowing = True\ntemp = -1\nif temp < 0:\n    print('It\
    \ is freezing')\n    if snowing:\n        print('Put on boots')\n        print('Time\
    \ for Hot Chocolate')\nprint('Bye')\n```\n\n这现在将内部（或嵌套）if 更改为有两条 print 语句与之关联。\n\
    这可能看起来很微妙，但它是 Python 如何使用布局将各个语句链接在一起的*关键*。\n\n## 7.6 If 表达式\n\nIf 表达式是 *if* 语句的一种简写形式，它返回一个值。实际上，编程语言中表达式和语句的区别就在于此；表达式返回一个值；语句不返回。\n\
    根据某些条件将特定值赋给变量是很常见的。例如，如果我们想判断某人是否是青少年，那么我们可能会检查他们是否大于 12 岁且小于 20 岁。我们可以这样写：\n\
    \n```\nage = 15\nstatus = None\nif (age > 12) and age < 20:\n    status = 'teenager'\n\
    else:\n    status = 'not teenager'\nprint(status)\n```\n\n如果我们运行这个，我们会打印出字符串 'teenager'。\n\
    然而，这相当长，而且可能并不明显这段代码的真正意图是为 *status* 赋予一个适当的值。\n另一种选择是 *if 表达式*。if 表达式的格式是：\n\n\
    ```\n<结果1> if <条件满足> else <结果2>\n```\n\n也就是说，if 表达式返回的结果是第一个值，除非条件失败，在这种情况下，返回的结果将是\
    \ else 之后的值。起初可能看起来令人困惑，但当你看到一个例子时，它会变得更容易。\n\n例如，使用 if 表达式，我们可以执行一个测试来确定要赋给 `status`\
    \ 的值，并将其作为 if 表达式的结果返回。例如：\n\n```\nstatus = 'teenager' if age > 12 and age < 20\
    \ else 'not teenager'\nprint(status)\n```\n\n同样，打印出的结果是 'teenager'，但现在代码更加简洁，并且清楚地表明测试的目的是确定要赋给\
    \ `status` 的结果。\n\n## 7.7 关于 True 和 False 的说明\n\nPython 在表示 `True` 和 `False` 的实际内容方面实际上相当灵活，事实上，适用以下规则。\n\
    \n- 0、''（空字符串）、None 等同于 False。\n- 非零、非空字符串、任何对象等同于 True。\n\n然而，我们建议只使用 `True`\
    \ 和 `False`，因为这通常是一种更清晰、更安全的方法。\n\n## 7.8 提示\n\n在 Python 中需要非常小心的一件事是布局。\n与 Java\
    \ 和 C# 等语言不同，你程序的布局是*你程序的一部分*。它决定了语句如何相互关联，以及像 if 语句这样的控制流元素如何影响哪些语句被执行。\n另外，要小心\
    \ `if` 语句及其对 ':' 字符的使用。这个字符对于将 `if` 语句的条件部分与将根据条件是 `True` 还是 `False` 而执行的语句分开至关重要。\n\
    \n## 7.9 在线资源\n\n请参阅 Python 标准库文档：\n\n- https://docs.python.org/3/library/stdtypes.html#boolean-operations-and-or-not\
    \ 布尔运算。\n- https://docs.python.org/3/library/stdtypes.html#comparisons 比较运算符。\n\
    - https://docs.python.org/3/tutorial/controlflow.html 在线 Python 控制流教程。"
