    \ In row 0 (the topmost row), there is a unique nonzero entry 1. Each entry of\
    \ each subsequent row is constructed by adding the number above and to the left\
    \ with the number above and to the right, treating blank entries as 0. For example,\
    \ the initial number in the first (or any other) row is 1 (the sum of 0 and 1),\
    \ whereas the numbers 1 and 3 in the third row are added together to generate\
    \ the number 4 in the fourth row. An example of Pascals triangle for 4 rows is\
    \ given below:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_144_0.png)\n\nFor example,\
    \ your function might be called `pascals_traingle()` in which case the following\
    \ application illustrates how you might use it:\n\n```\ntriangle = pascals_triangle(5)\n\
    for row in triangle:\n    print(row)\n```\n\nThe output from this might be:\n\n\
    ```\n[1]\n[1, 1]\n[1, 2, 1]\n[1, 3, 3, 1]\n[1, 4, 6, 4, 1]\n```"
