- md: "## 29.12 FuncTools Wrap\n\nOne issue with decorated functions may become apparent\
    \ when debugging or trying to trace what is happening. The problem is that by\
    \ default the attributes associated with the function being called are actually\
    \ those of the inner function returned by the decorator function. That is the\
    \ `name`, `doc` and `module` of the function are those of the function returned\
    \ by the decorator. The name and documentation of the original, decorated function,\
    \ have been lost.\n\nFor example, returning to the original logger decorator we\
    \ have:\n\n```python\ndef logger(func):\n    def inner():\n        print('calling\
    \ ', func.__name__)\n        func()\n        print('called ', func.__name__)\n\
    \    return inner\n\n@logger\ndef get_text(name):\n    \"\"\"returns some text\"\
    \"\"\n    return \"Hello \"+name\n\nprint('name:', get_text.__name__)\nprint('doc:\
    \ ', get_text.__doc__)\nprint('module; ', get_text.__module__)\n```\n\nWhen we\
    \ run this code we get:\n\n```\nname: inner\ndoc: None\nmodule; __main__\n```\n\
    \nIt appears that the `get_text` function is called inner and has no `docstring`\
    \ associated with it. However, if we look at the function it should be called\
    \ `get_text()` and have a `docstring` of 'returns some text'!\n\nPython (since\
    \ version 2.5) has included the `functools` module which contains the `functools.wraps`\
    \ decorator which can be used to overcome this problem.\n\nWraps is a decorator\
    \ for updating the attributes of the wrapping function(inner) to those of the\
    \ original function (in this case `get_text()`). This is as simple as decorating\
    \ the 'inner' function with `@wraps(func)`.\n\n```python\nfrom functools import\
    \ wraps\n\ndef logger(func):\n    @wraps(func)\n    def inner():\n        print('calling\
    \ ', func.__name__)\n        func()\n        print('called ', func.__name__)\n\
    \    return inner\n```\n\nThe end result is that in the above example the name\
    \ and doc are now updated to the name of the wrapped function and the documentation\
    \ associated with that function.\n\nIf we now rerun the earlier example, we get:\n\
    \n```\nname: get_text\ndoc: returns some text\nmodule; __main__\n```\n\n## 29.13\
    \ Online Resources\n\nFor further information on decorators see:\n\n- https://www.python-course.eu/python3_decorators.php\
    \ a short introduction to Python decorators\n- https://www.python.org/dev/peps/pep-0318/\
    \ PEP 318 considering decorators for functions and methods.\n- https://www.python.org/dev/peps/pep-3129/\
    \ PEP 3129 introducing class decorators.\n- https://docs.python.org/3/library/functools.html\
    \ Python Standard Library documentation for `functools`.\n- https://pymotw.com/3/functools/index.html\
    \ Python module of the Week for functoolss.\n- https://github.com/lord63/awesome-python-decorator\
    \ A useful page that lists many Python decorators as well as third-party contributions.\n\
    - https://wiki.python.org/moin/PythonDecoratorLibrary which provides a central\
    \ repository for decorator examples.\n\n## 29.14 Book Reference\n\nFor more information\
    \ on the Decorator and Singleton design patterns see the “Patterns” book by the\
    \ Gang of Four (E. Gamma, R. Helm, R. Johnson and J. Vlissades, *Design Patterns:\
    \ Elements of Reusable Object-Oriented Software*, Addison-Wesley, 1995).\n\n##\
    \ 29.15 Exercises\n\nThe aim of this exercise is to develop your own decorator.\n\
    \nYou will write a `timer` decorator to be used with methods in a class that take\
    \ the first parameter `self`, followed by one other parameter.\n\nThe decorator\
    \ should log how long a method takes to execute.\nTo do this you can use the `time`\
    \ module and import the `default_timer`.\n\n```python\nfrom timeit import default_timer\n\
    ```\n\nYou can then obtain a `default_timer` object for the start and end of a\
    \ function call and use these values to generate the time taken, for example:\n\
    \n```python\nstart = default_timer()\nfunc(self, value)\nend = default_timer()\n\
    print('returned from', func, 'it took', end - start, 'seconds')\n```\n\nYou can\
    \ then apply the decorator to the `deposit()` and `withdraw()` methods defined\
    \ in the `Account` class. For example,\n\n```python\n@timer\ndef deposit(self,\
    \ amount):\n    self._balance += amount\n\n@timer\ndef withdraw(self, amount):\n\
    \    self._balance -= amount\n```\n\nThese methods will be inherited by the `DepositAccount`\
    \ and `InvestmentAccount` classes. In the `CurrentAccount` class the `withdraw`\
    \ method is over written so you will also need to decorate that method with `@timer`\
    \ as well.\n\nNow when you run your sample application you should get timing information\
    \ printed out for the deposit and withdraw methods:\n\n```\ncalling deposit on\
    \ Account[123] - John, current\naccount = 10.05overdraft limit: -100.0 with 23.45\n\
    returned from deposit it took 8.009999999999268e-07\nseconds\ncalling withdraw\
    \ on Account[123] - John, current\naccount = 33.5overdraft limit: -100.0 with\
    \ 12.33\nreturned from withdraw it took 1.1419999999999116e-06\nseconds\n```\n\
    \n# Chapter 30\nIterables and Iterators\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_364_0.png)\n\
    \n## 30.1 Introduction\n\nThere are two protocols that you are very likely to\
    \ use or will possibly need to implement at some point or other; these are the\
    \ *iterable* protocol and the *iterator* protocols.\n\nThese two closely related\
    \ protocols are very widely used and supported by a large number of types.\n\n\
    One of the reasons that iterators and iterables are important is that they can\
    \ be used with `for` statements in Python; this makes it very easy to integrate\
    \ an iterable into code which needs to process a sequence of values in turn.\n\
    \n## 30.2 Iteration\n\n### 30.2.1 Iterables\n\nThe *iterable* protocol is used\
    \ by types where it is possible to process their contents one at a time in turn.\
    \ An iterable is something that will supply an iterator that can be used to perform\
    \ this processing. As such it is not the iterator itself; but the provider of\
    \ the iterator.\n\nThere are many iterable types in Python including lists, sets,\
    \ dictionaries, tuples, etc. These are all iterable *containers* that will supply\
    \ an iterator.\n\nTo be an *iterable* type; it is necessary to implement the `__iter__()`\
    \ method (which is the only method in the iterable protocol). This method must\
    \ supply a reference to the iterator object. This reference could be to the data\
    \ type itself or it could be to another type that implements the iterator protocol.\n\
    \n### 30.2.2 Iterators\n\nAn *iterator* is an object that will return a sequence\
    \ of values. Iterators may be finite in length or infinite (although many container-oriented\
    \ iterators provide a fixed set of values).\n\nThe iterator protocol specifies\
    \ the `__next__()` method. This method is expected to return the next item in\
    \ the sequence to return or to raise the `StopIteration` exception. This is used\
    \ to indicate that the iterator has finished supplying values.\n\n### 30.2.3 The\
    \ Iteration Related Methods\n\nTo summarize then we have\n\n- `__iter__()` from\
    \ the iterable protocol which is used to return the iterator object,\n- `__next__()`\
    \ from the iterator protocol which is used to obtain the next value in a sequence\
    \ of values.\n\nAny data type can be both an iterable and an iterator; but that\
    \ is not required. An iterable could return a different object that will be used\
    \ to implement the iterator or it can return itself as the iterator—it’s the designers\
    \ choice.\n\n### 30.2.4 The Iterable Evens Class\n\nTo illustrate the ideas behind\
    \ iterables and iterators we will implement a simple class; this class will be\
    \ an Evens class that is used to supply a set of even values from 0 to some limit.\
    \ This illustrates that it is not only data containers that can be iterable/iterators.\n\
    \nIt also illustrates a type that is both an iterable and an iterator.\n\n```python\n\
    class Evens(object):\n    def __init__(self, limit):\n        self.limit = limit\n\
    \        self.val = 0\n\n    # Makes this class iterable\n    def __iter__(self):\n\
    \        return self\n\n    # Makes this class an iterator\n    def __next__(self):\n\
    \        if self.val > self.limit:\n            raise StopIteration\n        else:\n\
    \            return_val = self.val\n            self.val += 2\n            return\
    \ return_val\n```\n\nThere are a few things to note about this class.\n\n- The\
    \ `__iter__()` method returns `self`; this is a very common pattern and assumes\
    \ that the class also implements the iterator protocol\n- The `__next__()` method\
    \ either returns the next value in the sequence or it raises the `StopIteration`\
    \ exception to indicate that there are no more values available.\n\n### 30.2.5\
    \ Using the Evens Class with a For Loop\n\nNow that we have implemented both the\
    \ *iterable* and *iterator* protocols for the class Evens we can use it with a\
    \ `for` statement:\n\n```python\nprint('Start')\nfor i in Evens(6):\n    print(i,\
    \ end=', ')\nprint('Done')\n```\n\nWhich generates the output:\n\n```\nStart\n\
    0, 2, 4, 6, Done\n```\n\nThis makes it look as if the Evens type is a built-in\
    \ type as it can be used with an existing Python structure; however, the `for`\
    \ loop merely expects to be given an *iterable*; as such Evens is compatible with\
    \ the `for` loop.\n\n## 30.3 The Itertools Module\n\nThe `itertools` module provides\
    \ a number of useful functions that return iterators constructed in various ways.\
    \ It can be used to provide an iterator over a selection of values from a data\
    \ type that is iterable; it can be used to combine iterables together, etc."
