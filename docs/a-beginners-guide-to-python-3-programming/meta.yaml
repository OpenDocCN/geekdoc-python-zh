  md: "To implement the `+` and `-` operators we need to provide two special methods\
    \ one will provide the implementation of the `+` operator and one will provide\
    \ the implementation of the `-` operator:\n\n+   - `+` operator is implemented\
    \ by a method with the signature `def __add__(self, other):`\n- `-` operator is\
    \ implemented by a method with the signature `def __sub__(self, other):`\n\nWhere\
    \ `other` represents another `Quantity` or other suitable type which will be either\
    \ added to, or subtracted from, the current `Quantity` object.\nThe methods will\
    \ be mapped by Python to the operators `+` and `-`; such that if someone attempts\
    \ to add to quantities together then the `__add__()` method will be called, etc.\n\
    The definition of the class `Quantity` is given below; note that the class actually\
    \ just wraps a number held in the attribute `value`.\n\n```\nclass Quantity:\n\
    \    def __init__(self, value=0):\n        self.value = value\n    def __add__(self,\
    \ other):\n        new_value = self.value + other.value\n        return Quantity(new_value)\n\
    \    def __sub__(self, other):\n        new_value = self.value - other.value\n\
    \        return Quantity(new_value)\n    def __str__(self):\n        return 'Quantity['\
    \ + str(self.value) + ']'\n```\n\nUsing this class definition, we can create two\
    \ instances of the type `Quantity` and add them together:\n\n```\nq1 = Quantity(5)\n\
    q2 = Quantity(10)\nprint('q1 =', q1, ', q2 =', q2)\n\nq3 = q1 + q2\nprint('q3\
    \ =', q3)\n```\n\nIf we run this code snippet we get:\n\n```\nq1 = Quantity[5]\
    \ , q2 = Quantity[10]\nq3 = Quantity[15]\n```\n\nNote that we have made the class\
    \ `Quantity` immutable; that is once a `Quantity` instance has been created its\
    \ value cannot be changed (it is fixed).\nThis means that when two quantities\
    \ are added tougher a new instance of the class `Quantity` is created. This is\
    \ analogous to how integers work, if you add together 2+3 then you get 5; neither\
    \ 2 or 3 are modified however; instead a new integer 5 is generated—this is an\
    \ example of the general design principle; developers should follow the semantics\
    \ of built in types; `Quantity` objects act like number objects."
