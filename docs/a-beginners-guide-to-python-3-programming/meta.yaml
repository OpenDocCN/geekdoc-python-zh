    \ the first number: ')\n    num2 = get_integer_input('Input the second number:\
    \ ')\n    return num1, num2\n\ndef get_integer_input(message):\n    value_as_string\
    \ = input(message)\n    while not value_as_string.isnumeric():\n        print('The\
    \ input must be an integer')\n        value_as_string = input(message)\n    return\
    \ int(value_as_string)\n```\n\nHaving one function call another function is very\
    \ common, and indeed we have already been doing this; the `input()` function has\
    \ been used several times; the only difference here is that we have written the\
    \ `get_integer_input()` function ourselves.\nWhen we call the `get_numbers_from_user()`\
    \ function we can store the results returned into two variables: one for each\
