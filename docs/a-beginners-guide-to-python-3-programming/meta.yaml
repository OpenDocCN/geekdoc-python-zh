    +   - *Double underbar convention.* Method or instance variables/attributes (those
    accessed via self) whose names start with a double under bar should be considered
    *private* to that class and should not be called from outside of the class. This
    includes any subclasses; private means private to the class and only to that class.


    Any identifier of the form `__somename` (at least two leading underscores and
    at most one trailing underscore) is textually replaced with `_classname__somename`,
    where classname is the current class name with leading underscore(s) stripped.


    Python does what is called name mangling to provide some support for methods that
    start with a double under bar. This mangling is done without regard to the syntactic
    position of the identifier, so it can be used to define class-private instance
    and class variables, methods, variables stored in globals, and even variables
    stored in instances.


