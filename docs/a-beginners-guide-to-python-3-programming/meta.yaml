  md: "We could now define a new method that takes a function and a number and returns\
    \ a new (anonymous) function that takes one *new* parameter and calls the function\
    \ passed in with the number passed in and the new parameter:\n\n```\ndef multby(func,\
    \ num):\n    return lambda y: func(num, y)\n```\n\nLook carefully at this function;\
    \ it has used or *bound* the number passed into the `multby` function to the invocation\
    \ of the function passed in, but it has also defined a new variable 'y' that will\
    \ have to be provided when this new anonymous function is invoked. It then returns\
    \ a reference to the anonymous function as the result of `multby`.\n\nThe `multby`\
    \ function can now be used to bind the first parameter of the multiply function\
    \ to anything we want. For example, we could bind it to 2 so that it will always\
    \ double the second parameter and store the resulting function reference into\
    \ a property double:\n\n```\ndouble = multby(multiply, 2)\n```\n\nWe could also\
    \ bind the value 3 to the first parameter of multiple to make a function that\
    \ will triple any value:\n\n```\ntriple = multby(multiply, 3)\n```\n\nWhich means\
    \ we can now write:\n\n```\nprint(double(5))\nprint(triple(5))\n```\n\nwhich produces\
    \ the output\n\n```\n10\n15\n```\n\nYou are not limited to just binding one parameter;\
    \ you can bind any number of parameters in this way.\n\nCurried functions are\
    \ therefore very useful for creating new functions from existing functions.\n\n\
    # 17.4 Closures\n\nOne question that might well be on your mind now is what happens\
    \ when a function references some data that is in scope where it is defined but\
    \ is no longer available when it is evaluated? This question is answered by the\
    \ implementation of a concept known as *closure*.\n\nWithin Computer Science (and\
    \ programming languages in particular) a closure (or a lexical closure or function\
    \ closure) is a function (or more strictly a reference to a function) together\
    \ with a referencing environment. This referencing environment"
