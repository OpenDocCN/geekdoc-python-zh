    # 13.5 Hints


    Points to note about the scope and lifetime of variables


    +   1. The scope of a variable is the part of a program where the variable is
    known. Parameters and variables defined inside a function are not visible from
    outside. Hence, they have a local scope.

    2. The lifetime of a variable is the period throughout which the variable exits
    in the memory of your Python program. The lifetime of variables inside a function
    is as long as the function executes. These local variables are destroyed as soon
    as the function returns or terminates. This means that the function does not store
    the values in a variable from one invocation to another.


    # 13.6 Online Resources


    See the Python Standard Library documentation for:


    +   - https://docs.python.org/3/faq/programming.html#what-are-the-rules-for-local-and-global-variables-in-python
    which provides further information on the Python rules for local and global variables.


    # 13.7 Exercise


    Return to the number guess game—did you have to make any compromises with the
    variables to overcome the global variable issue? If so can you resolve them now
    with the use of the `global`?'
