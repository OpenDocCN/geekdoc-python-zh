    # 32.5.7 Removing from a List


    We can remove an element from a list using the `remove()` method. The syntax for
    this method is


    ```

    <list>.remove(<object>)

    ```


    This will remove the object from the list; if the object is not in the list then
    an error will be generated by Python.


    ```

    another_list = [''Gary'', ''Mark'', ''Robbie'', ''Jason'', ''Howard'']

