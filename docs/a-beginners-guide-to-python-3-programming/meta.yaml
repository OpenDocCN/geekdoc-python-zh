  md: "# Chapter 22\nWhy Bother with Object Orientation?\n\n# 22.1 Introduction\n\n\
    The previous four chapters have introduced the basic concepts behind object orientation,\
    \ the terminology and explored some of the motivation. This chapter looks at how\
    \ object orientation addresses some of the issues that have been raised with procedural\
    \ languages. To do this it looks at how a small extract of a program might be\
    \ written in a language such as C, considers the problems faced by the C developer\
    \ and then looks at how the same functionality might be achieved in an object-oriented\
    \ language such as Python. Do not worry too much about the syntax you will be\
    \ presented with; it is mostly a form of pseudo-code, and it should not detract\
    \ from the legibility of the examples.\n\n# 22.2 The Procedural Approach\n\nConsider\
    \ the following example:\n\n```\nrecord Date {\n    int day\n    int month\n \
    \   int year\n}\n```\n\nThis defines a data structure for recording dates. There\
    \ are similar structures in many procedural languages such as C, Ada and Pascal.\n\
    So, what is wrong with a structure such as this? Nothing, apart from the issue\
    \ of visibility? That is, what can see this structure and what can update the\
    \ contents of the structure? Any code can directly access and modify its contents.\
    \ Is this problem? It could be, for example, some code could set the day to –\
    \ 1, the month to 13 and the year to 9999."
