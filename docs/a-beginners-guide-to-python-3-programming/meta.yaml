    \ both functions:\n\n```\ndef outer():\n    title = 'original title'\n    def\
    \ inner():\n        nonlocal title\n        title = 'another title'\n        print('inner:',\
    \ title)\n    inner()\n    print('outer:', title)\n\nouter()\n```\n\nThe result\
    \ of running this is\n\n```\ninner: another title\nouter: another title\n```"
