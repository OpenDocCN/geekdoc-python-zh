    \ and then uninstalling the old pip and installing the new version of pip. If\
    \ we now check the version of pip installed we now see that it is version 23.1.2:\n\
    \n```\n% pip --version\npip 23.1.2 from /usr/local/lib/python3.11/site-packages/pip\
    \ (python 3.11)\n%\n```\n\n# 42.4 Default Installation\n\nThere is a warning that\
    \ should be noted with pip; that is that by default it installs a module into\
    \ the central Python installation on a machine. This is fine if you are only ever\
    \ going to run one program requiring a specific set of modules. However, if you\
    \ are going to work with different Python programs, which might require different\
    \ modules, and in particular different version of a module, then this can be a\
    \ problem.\nTo illustrate the issue it is important to understand that every module\
    \ has a version number, such as NumPy 1.24.1; that is this is version 1.24.1 of\
    \ NumPy, and it will differ in some way (however small) from version 1.24.0. The\
    \ version number for Python packages typically uses something called semantic\
    \ versioning. In semantic versioning a version number consists of three integers\
    \ such that it is made up of major.minor.patch, that is:\n\n+   - **Major** the\
    \ main release number, 1.0.0, is usually the first release; all subsequent releases\
    \ that are part of the release 1 will start 1.x.x. Typically release will be"
  - '[PAGE 478]


    2.x.x, and this indicates a major change in the module, etc. Note that there is
    no guarantee of backwards compatibility between one major release and the next.
    Backwards compatibility is the idea that code that previously worked should still
    work from one release to the next—this guarantee does not exist between one major
    version and the next.


    +   - **Minor** such as 1.1.0 to 1.2.0 where the minor release typically includes
    larger new features or bug fixes but ensures backwards compatibility with other
    older major release versions (that is version 1.2.0 should be backwards compatible
    with version 1.1.0).

    - **Patch** release this is typically used for bug fixes or other technical issues
    which should have no effect on the backwards compatibility of the code and do
    not change or extend the functionality of the library.


    In some cases packages use a year-based number system such as 2020.1 which is
    the first release of 2020, although this is actually far less common in Python.

    Now let us consider that on your computer you have two Python programs: one uses
    Pandas 1.5.0, and the other uses Pandas 2.0.0. Given what has been described above
    there is no guarantee that the code which was written to use Pandas 1.5.0 will
    work with Pandas 2.0.0. Therefore we want to run one program using one Pandas
    library and the other using the newer Pandas library. We could of course update
    the old code to work with the new version of Pandas but that could be time-consuming
    and non-trivial; and we may just want to run the code.

    However, as `pip` installs these libraries centrally for all Python programs by
    default, we cannot have the two libraries installed at the same time!

    Of course, this is not a new problem, and the solution comes in the form of *pip
    virtual environments*.


    # 42.5 Pip Virtual Environments


    A virtual environment is a configuration of Python modules that can be set up
    on a *per project* basis. That is each individual Python project (or program)
    can have its own virtual environment and that virtual environment can be activated
    as and when required. The virtual environment is then used to configure all the
    modules used, isolating one virtual environment''s configuration from another.

    Although it should be noted that there is no reason why several Python programs
    cannot share the same virtual environment, it is very common practice to have
    a virtual environment per program.

    To use a virtual environment it is necessary to first create this virtual environment.
    This is done using the `python` command itself (rather than the `pip` command).
    For example:


    ```

    python -m venv <name of virtual environment>

    ```'
  - '[PAGE 479]


    In the above the `python` command is being passed the `-m` option followed by
    `venv`. This indicates that you want Python to run the `venv` module. The name
    `venv` stands for *virtual environment*. This is followed by the name of the virtual
    environment you wish to create. A common pattern is to call this `venv`—this is
    then created in the current directory. This is fine, but it can be useful to give
    the virtual environment a more meaningful name such as `genesis_venv`—indicating
    that this is the virtual environment for the genesis project (whatever that might
    be).


    Whatever name you choose to use, the tool will create a directory within the current
    directory called that name.


    Let us first check to see what has been installed into the central Python runtime
    on a sample Mac computer:


    ```

    % pip list

    Package        Version

    -------------- -------

    pip            23.1.2

    setuptools     67.6.1

    wheel          0.40.0

    ```


    This illustrates the typical basic Python installation. All that is contained
    within the Python system is the default built-in modules plus the `pip` module,
    the `setuptools` module and the `wheel` module. The `setuptools` module helps
    with package handling, and the `wheels` module supports wheel file which are essentially
    zip files with a special file name convention that tells installs what Python
    versions and platforms they support.


    For example, let us create a virtual environment called `genesis_venv` under a
    projects directory:


    ```

    % mkdir projects

    % cd projects

    projects % ls


    projects % python -m venv genesis_venv

    ```


    In the above terminal/command window session we have created the `projects` directory
    and then moved into that directory. Currently when we list the contents of the
    directory, it is empty. We then issue the command:


    ```

    % python -m venv genesis_venv

    ```


    If we now look at the contents of the directory we will see a subdirectory has
    been created called `genesis_venv`:


    ```

    projects % ls

    genesis_venv

    ```


    At the moment this is not that interesting, but we can now *activate* that environment.
    This is done using the rather awkward incantation which accesses the `activate`
    script within the virtual environment directory''s `bin` directory. On a Mac or
    Linux this would be done using the `source` command followed by the `<venv_name>/bin/activate`
    path, for example:


    ```

    % source genesis_venv/bin/activate

    ```'
