    John Hunt


    ## A Beginners Guide to Python3 Programming


    Second Edition


    ## Undergraduate Topics in Computer Science


    **Series Editor**

    Ian Mackie, University of Sussex, Brighton, UK


    **Advisory Editors**


    - Samson Abramsky, Department of Computer Science, University of Oxford, Oxford,
    UK

    - Chris Hankin, Department of Computing, Imperial College London, London, UK

    - Mike Hinchey, Lero – The Irish Software Research Centre, University of Limerick,
    Limerick, Ireland

    - Dexter C. Kozen, Department of Computer Science, Cornell University, Ithaca,
    NY, USA

    - Andrew Pitts, Department of Computer Science and Technology, University of Cambridge,
    Cambridge, UK

    - Hanne Riis Nielson, Department of Applied Mathematics and Computer Science,
    Technical University of Denmark, Kongens Lyngby, Denmark

    - Steven S. Skiena, Department of Computer Science, Stony Brook University, Stony
    Brook, NY, USA

    - Iain Stewart, Department of Computer Science, Durham University, Durham, UK

    - Joseph Migga Kizza, College of Engineering and Computer Science, The University
    of Tennessee-Chattanooga, Chattanooga, TN, USA


    ‘Undergraduate Topics in Computer Science’ (UTiCS) delivers high-quality instructional
    content for undergraduates studying in all areas of computing and information
    science. From core foundational and theoretical material to final-year topics
    and applications, UTiCS books take a fresh, concise, and modern approach and are
    ideal for self-study or for a one- or two-semester course. The texts are all authored
    by established experts in their fields, reviewed by an international advisory
    board, and contain numerous examples and problems, many of which include fully
    worked solutions.


    The UTiCS concept relies on high-quality, concise books in softback format, and
    generally a maximum of 275–300 pages. For undergraduate textbooks that are likely
    to be longer, more expository, Springer continues to offer the highly regarded
    Texts in Computer Science series, to which we refer potential authors.


    John Hunt


    ## A Beginners Guide to Python 3 Programming


    Second Edition


    John Hunt

    Midmarsh Technology Ltd.

    Chippenham, Wiltshire, UK


