  md: "If we needed to double a number, we could thus reuse the `operation()` function\
    \ many times, for example:\n\n```\noperation(2, 5)\noperation(2, 10)\noperation(2,\
    \ 6)\noperation(2, 151)\n```\n\nAll of the above would double the second number.\
    \ However, we have had to remember to provide the 2 so that the number can be\
    \ doubled. However, the number 2 has not changed between any of the invocations\
    \ of `operation()` function. What if we fixed the first parameter to always be\
    \ 2, thus would mean that we could create a new function that apparently only\
    \ takes one parameter (the number to double). For example, let us say we could\
    \ write something like:\n\n```\ndouble = operation(2, *)\n```\n\nSuch that we\
    \ could now write:\n\n```\ndouble(5)\ndouble(151)\n```\n\nIn essence `double()`\
    \ is an alias for `operation()`, but an alias that provides the value 2 for the\
    \ first parameter and leaves the second parameter to be filled in by the future\
    \ invocation of the `double` function.\n\n# 17.3 Python and Curried Functions\n\
    \nA curried function in Python is a function where one or more of its parameters\
    \ have been *applied or bound* to a value, resulting in the creation of a new\
    \ function with one fewer parameters than the original. For example, let us create\
    \ a function that multiplies two numbers together:\n\n```\ndef multiply(a, b):\n\
    \    return a * b\n```\n\nThis is a general function that does exactly what it\
    \ says; it multiplies any two numbers together. These numbers could be any two\
    \ integers or floating-point numbers, etc.\nWe can thus invoke it in the normal\
    \ manner:\n\n```\nprint(multiply(2, 5))\n```\n\nThe result of executing this statement\
    \ is:\n\n```\n10\n```"
