    \n```\nmax = 100\ndef print_max():\n    max = 95\n    print(max)\n\nprint_max()\n\
    print(max)\n```\n\n此代码的输出是\n\n```\n95\n100\n```\n\n但是，如果你希望在函数内部修改全局变量，例如像下面这样：\n\
