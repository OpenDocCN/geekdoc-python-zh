    \ the same method name call (`__str__()`), in Python).\n\nThe name polymorphism\
    \ is unfortunate and often leads to confusion. It makes the whole process sound\
    \ rather grander than it actually is.\n\nNote this is one of the most significant\
    \ and flexible features of Python; it does not tie a variable to a specific type;\
    \ instead via Duck Typing as long as the object provided meets the implied contract,\
    \ then we are good.\n\nThe following classes all meet the contract implied by\
    \ the `night_out()` function:\n\n```python\nclass Person:\n    def eat(self):\
    \ print('Person - Eat')\n    def drink(self): print('Person - Drink')\n    def\
    \ sleep(self): print('Person - Sleep')\n\nclass Employee(Person):\n    def eat(self):\
    \ print('Employee - Eat')\n    def drink(self): print('Employee - Drink')\n  \
    \  def sleep(self): print('Employee - Sleep')\n\nclass SalesPerson(Employee):\n\
    \    def eat(self): print('SalesPerson - Eat')\n    def drink(self): print('SalesPerson\
    \ - Drink')\n\nclass Dog:\n    def eat(self): print('Dog - Eat')\n    def drink(self):\
    \ print('Dog - Drink')\n    def sleep(self): print('Dog - Sleep')\n```\n\nThis\
    \ means that instances of all of these classes can be used with the `night_out()`\
    \ function.\n\nNote that the `SalesPerson` class meets the implied contract partly\
    \ via inheritance (the `sleep()` method is inherited from `Employee`).\n\n## 28.5\
    \ Protocols\n\nAs mentioned above, Python does not have any formal mechanism for\
    \ stating what is required between the supplier of some functionality and the\
    \ user or consumer of that functionality. Instead a far less formal approach termed\
    \ *Duck Typing* is adopted instead.\n\nThis, however, raises the question; how\
    \ do you know what is required? How do you know that you must provide the numeric\
