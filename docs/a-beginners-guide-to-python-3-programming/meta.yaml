  md: "In Python we can write a recursive function such as:\n\n```\ndef recursive_function():\n\
    \    print('calling recursive_function')\n    recursive_function()\n```\n\nHere\
    \ the function `recursive_function()` is defined such that it prints out a message\
    \ and then calls itself. Note that no special syntax is required for this as a\
    \ function does not need to have been completely defined before it is used.\n\
    Of course in the case of `recursive_function()` this will result in infinite recursion\
    \ as there is no termination condition. However, this will only become apparent\
    \ at runtime when Python will eventually generate an error:\n\n```\nTraceback\
    \ (most recent call last):\n  File \"recursion_example.py\", line 5, in <module>\n\
    RecursionError: maximum recursion depth exceeded while calling a Python object\n\
    ```\n\nHowever, as already mentioned a recursive function should have a *recursive*\
    \ part and a *termination* or base case part. The termination condition is used\
    \ to identify when the base case applies. We should therefore add a condition\
    \ to identify the termination scenario and what the base case behaviour is. We\
    \ will do this in the following section as we look at how a factorial for a number\
    \ can be generated recursively.\n\n# 10.6 Calculating Factorial Recursively\n\n\
    We have already seen how to create a program that can calculate the factorial\
    \ of a number using iteration as one of the exercises in the last chapter; now\
    \ we will create an alternative implementation that uses recursion instead.\n\
    Recall that the factorial of a number is the result of multiplying that number\
    \ by each of the integer values up to that number, for example, to find the factorial\
    \ of the number 5 (written as 5!) we can multiple 1 * 2 * 3 * 4 *5 which will\
    \ generate the number 120.\nWe can create a recursive solution to the Factorial\
    \ problem by defining a function that takes an integer to generate the factorial\
    \ number for. This function will return the value 1 if the number passed in is\
    \ 1—this is the base case. Otherwise it will multiple the value passed in to it\
    \ with the result of calling itself (the `factorial()` function) with n – 1 which\
    \ is the recursive part.\nThe function is given below:\n\n```\ndef factorial(n):\n\
    \    if n == 1: # The termination condition\n        return 1 # The base case\n\
    \    else:\n        res = n * factorial(n-1) # The recursive call\n```"
