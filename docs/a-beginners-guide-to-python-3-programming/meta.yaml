    # Chapter 15

    Introduction to Functional Programming


    # 15.1 Introduction


    There has been much hype around Functional Programming in recent years. However,
    Functional Programming is not a new idea and indeed goes right back to the 1950s
    and the programming language LISP. However, many people are not clear as to what
    Functional Programming is and instead jump into code examples and never really
    understand some of the key ideas associated with Functional Programming such as
    Referential Transparency.

    This chapter introduces Functional Programming (also known as FP) and the key
    concept of Referential Transparency (or RT).

    One idea to be aware of is that Functional Programming is a software coding style
    or approach and is separate from the concept of a function in Python.

    Python functions can be used to write functional programs but can also be used
    to write procedural style programs; so do not get too hung up on the syntax that
    might be used or the fact that Python has functions just yet. Instead explore
    the idea of defining a functional approach to your software design.


    # 15.2 What is Functional Programming?


    Wikipedia describes Functional Programming as:


    > ... a programming paradigm, a style of building the structure and elements of
    computer programs, that treats computation as the evaluation of mathematical functions
    and avoids state and mutable data.


    There are a number of points to note about this definition. The first is that
    it is focused on the *computational side* of computer programming. This might
    seem obvious but most of what we have looked at so far in Python would be considered
    procedural in nature.'
