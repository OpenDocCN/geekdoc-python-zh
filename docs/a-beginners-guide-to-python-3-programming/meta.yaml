    # 32.4.4 Creating New Tuples from Existing Tuples


    It is also possible to return what is known as a slice from a `tuple`. This is
    a new `tuple` which is comprised of a subset of the original `tuple`. This is
    done by providing the start and end indexes for the slice, separated by a colon,
    within the index square brackets. For example:


    ```

    print(''tup1[1:3]:\t'', tup1[1:3])

    ```'
