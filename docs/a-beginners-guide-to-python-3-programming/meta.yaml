  md: '# 1.4 Python Programming


    There are several different programming paradigms that a programming language
    may allow developers to code in, these are:


    +   - **Procedural Programming** in which a program is represented as a sequence
    of instructions that tell the computer what it should do explicitly. Procedures
    and / or functions are used to provide structure to the program with control structures
    such as if statements and loop constructs to manage which steps are executed and
    how many times. Languages typifying this approach include C and Pascal.

    - **Declarative Programming** languages, such as prolog, that allow developers
    to describe how a problem should be solved with the language / environment determining
    how the solution should be implemented. SQL (a database query language) is one
    of the most common declarative languages that you are likely to encounter and
    is introduced at the end of this book.

    - **Object-Oriented Programming** approaches that represent a system in terms
    of the objects that form that system. Each object can hold its own data (also
    known as state) as well as define behaviour what the object can do. A computer
    program is formed from a set of these objects co-operating together. Languages
    such as Java and C# typify the object-oriented approach.

    - **Functional Programming** languages decompose a problem into a set of functions.
    Each function is independent of any external state operating only on the inputs
    they received to generate their outputs. The programming language Haskell is an
    example of a functional programming language.


    Some programming languages are considered to be *hybrid* languages; that is they
    allow developers to utilize a combination of difference approaches within the
    same program. Python is an example of a hybrid programming language as it allows
    you to write very procedural code, to use objects in an object-oriented manner
    and to write functional programs. Each of these approaches is covered in this
    book.


    # 1.5 Python Libraries


    As well as the core language there are very many libraries available for Python.
    These libraries extend the functionality of the language and make it much easier
    to develop applications. These libraries cover:


    +   - web frameworks such as Django / Flask,

    - email clients such as smtplib (a SMTP email client) and imaplib (an IMAP4 email
    client),

    - content management operations such as the Zope library,

    - lightweight concurrency (running multiple operations at the same time) using
    the Stackless library,

    - the Generation of Microsoft Excel files using the openpyxl library,'
  merge: -1
  pgno: 30
- img_proc: true
  md: '+   - graphics libraries such as Matplotlib and PyOpenGL,

    - Graphical User Interface (GUI) libraries such as Tkinter or PyQt5,

    - Data Analytics using libraries such as Pandas and SciPy and NumPy,

    - Machine learning using libraries such as SKLearn and TensorFlow.


    A very useful resource to look at, which introduces many of these libraries (also
    known as modules), is the ‘Python 3 module of the Week’ web site which can be
    found at https://pymotw.com/3. This lists many of the libraries / modules available
    and provides a short introduction to what they do and how to use them. The chapter
    entitled ‘Python Virtual Environments’ explains how to install such libraries
    into your Python runtime environment.


    # 1.6 Python Execution Model


    Python is not a precompiled language in the way that some other languages you
    may have come across are (such as C++ ). Instead it is what is known as an interpreted
    language (although even this is not quite accurate). An interpreted language is
    one that does not require a separate compilation phase to convert the human readable
    format into something that can be executed by a computer. Instead the plain text
    version is fed into another program (generally referred to as the interpreter)
    which then executes the program for you.


    Python actually uses an intermediate model in that it actually converts the plain
    text English style Python program into an intermediate ‘pseudo’ machine code format
    and it is this intermediate format that is executed. This is illustrated below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_31_0.png)


    The way in which the Python interpreter processes a Python program is broken down
    into several steps. The steps shown here are illustrative (and simplified) but
    the general idea is correct.


    +   1. First the program is checked to make sure that it is valid Python, that
    is a check is made that the program follows all of the rules of the language and
    that each of the commands and operations, etc. is understood by the Python environment.'
  merge: -1
  pgno: 31
- img_proc: true
  md: '2. It then translates the plain text, English like commands, into a more concise
    intermediate format that is easier to execute on a computer. Python can store
    this intermediate version in a file which is named after the original file but
    with a `.pyc` extension instead of a `.py` extension (the ''c'' in the extension
    indicates it contains the compiled version of the code).

    3. The compiled intermediate version is then executed by the interpreter.


    When this program is rerun the Python interpreter checks to see if a `.pyc` file
    is present. If no changes have been made to the source file since the `.pyc` was
    created, then the interpreter can skip steps 1 and 2 and immediately run the `.pyc`
    version of the program.


    One interesting aspect of Python''s usage is that it can be (and often is) used
    in an interactive fashion, with individual commands being entered and executed
    one at a time, with context information being built up. This can be useful in
    debugging situations.


    # 1.7 Running Python Programs


    There are several ways in which you can run a Python program, including


    +   - Interactively using the Python interpreter.

    - Stored in a file and run using the Python command.

    - Run as a script file specifying the Python interpreter to use within the script
    file.

    - From within a Python IDE (Integrated Development Environment) such as PyCharm.

    - Using Jupyter Notebooks in a web browser.


    # 1.7.1 Interactively Using the Python Interpreter


    It is quite common to find that people will use Python in interactive mode. This
    uses the Python REPL (named after **Read Evaluate Print Loop** style of operation).


    Using the REPL, Python statements and expressions can be typed into the Python
    prompt and will then be executed directly. The values of variables will be remembered
    and may be used later in the session.


    To run the Python REPL, Python must have been installed onto the computer system
    you are using. Once installed you can open a Command Prompt window (Windows) or
    a Terminal window (Mac) and type `Python` into the prompt. This is shown for a
    Windows machine below:'
