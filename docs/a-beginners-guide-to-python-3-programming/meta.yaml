    \   Person.increment_instance_count()\n        self.name = name\n        self.age\
    \ = age\n```\n\nIn this case the class method increments the `instance_count`\
    \ variable; note that the `instane_count` variable is accessed via the `cls` parameter\
    \ passed into the `increment_instance_count` method by Python. As this is a class\
    \ method you do not need to prefix the class attribute with the name of class;\
    \ instead the first parameter to the class method, `cls`, represents the class\
