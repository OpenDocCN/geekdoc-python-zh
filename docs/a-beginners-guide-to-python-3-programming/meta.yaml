    \ metaclass = ABCMeta, for example:\n\n```python\nfrom abc import ABC\n\nclass\
    \ Shape(ABC):\n    def __init__(self, id):\n        self._id = id\n\n    @abstractmethod\n\
    \    def display(self): pass\n\n    @property\n    @abstractmethod\n    def id(self):\
    \ pass\n```\n\nThis is a more concise form and is typically used in modern Python.\n\
    \n## 25.4 Defining an Interface\n\nMany languages such as Java and C# have the\
    \ concept of an *interface* definition; this is a contract between the implementors\
    \ of an interface and the user of the implementation guaranteeing that certain\
    \ facilities will be provided.\nPython does *not* explicitly have the concept\
    \ of an interface contract (note here interface refers to the interface between\
    \ a class and the code that utilizes that class).\nHowever, it does have Abstract\
    \ Base Classes.\nAny Abstract Base Class that only has abstract methods or properties\
    \ in it can be treated as a contract that must be implemented (it can of course\
    \ also have concrete methods, properties and attributes; it is up to the developer).\
    \ However, as we know that Python will guarantee that any instances can only be\
    \ created from concrete classes, we can treat an ABC has behaving like a contract\
    \ between a class and those using that class.\nThis is an approach that is adopted\
    \ by numerous frameworks and libraries within Python.\n\n## 25.5 Virtual Subclasses\n\
    \nIn most object-oriented programming languages, for one class to be *treated*\
    \ as a subclass of another class it is necessary for the subclass to *extend*\
    \ the parent class. However, Python has a more relaxed approach to typing, as\
    \ is illustrated by the idea of *Duck Typing*.\nIn some situations however, it\
    \ is useful to be able to confirm that one type is a subclass of another or that\
    \ an instance is an instance of a specific type (which may come from the object's\
    \ class hierarchy) at runtime.\nIndeed, in Python, it is not necessary to be an\
    \ actual subclass of a parent class to be considered a subclass—instead *Virtual*\
    \ subclasses allow one class to be treated as a subclass of another even though\
    \ there is no direct inheritance relationship between them. The key here is that\
    \ the *virtual* subclass must match the required *interface* presented by the\
    \ virtual parent class.\n\nThis is done by registering one class as a Virtual\
    \ Subclass of an Abstract Base Class. That is, the virtual parent class must be\
    \ an ABC and then the subclass can be registered (at runtime) as a *virtual* subclass\
    \ of the ABC. This is done using a method called `register()`.\n\nOnce a class\
    \ is registered as a subclass of an ABC the `issubclass()` and `isinstance()`\
    \ methods will return `True` for that class with respect to the virtual parent\
    \ class.\n\nFor example, given the following two currently independent classes:\n\
    \n```python\nfrom abc import ABC\n\nclass Person(ABC):\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n\n    def birthday(self):\n\
    \        print('Happy Birthday')\n\nclass Employee(object):\n    def __init__(self,\
    \ name, age, id):\n        self.name = name\n        self.age = age\n        self.id\
    \ = id\n\n    def birthday(self):\n        print('Its your birthday')\n```\n\n\
    If we now check to see if `Employee` is a subclass of `Person` we will get the\
    \ value `False` returned. We will of course also get `False` if we check to see\
    \ an instance of `Employee` is actually an instance of the class `Person`:\n\n\
    ```python\nprint(issubclass(Employee, Person))\ne = Employee('Megan', 21, 'MS123')\n\
    print(isinstance(e, Person))\n```\n\nThis will generate the output:\n\n```\nFalse\n\
    False\n```\n\nHowever, if we now register the class `Employee` as a virtual subclass\
    \ of the class `Person`, the two test methods will return `True`:\n\n```python\n\
    Person.register(Employee)\nprint(issubclass(Employee, Person))\ne = Employee('Megan',\
    \ 21, 'MS123')\nprint(isinstance(e, Person))\n```\n\nWhich now generates the output:\n\
    \n```\nTrue\nTrue\n```\n\nThis provides a very useful level of flexibility that\
    \ can be exploited when using existing libraries and frameworks.\n\n## 25.6 Mixins\n\
    \nA *mixin* is a class that represents some (typically concrete) functionality\
    \ that has the potentially to be useful in multiple situations but on its own\
    \ is not something that would be instantiated.\n\nHowever, a *mixin* can be mixed\
    \ into other classes and can extend the data and behavior of that type and can\
    \ access data and methods provided by those classes.\n\nMixins are a common category\
    \ of Abstract Base Classes; although they are implicit in their use (and naming)\
    \ rather than being a concrete construct within the Python language itself.\n\n\
    For example, let us define a `PrinterMixin` class that provides a utility method\
    \ to be used with other classes. It is not something that we want developers to\
    \ instantiate itself so we will make it an ABC, but it does not define any abstract\
    \ methods or properties (so there is nothing for a subclass to have to implement).\n\
    \n```python\nfrom abc import ABC\n\nclass PrinterMixin(ABC):\n    def print_me(self):\n\
    \        print(self)\n```\n\nWe can now use this with a class `Employee` that\
    \ extends the class `Person` and mixes in the `PrinterMixin` class:\n\n```python\n\
    class Person(object):\n    def __init__(self, name):\n        self.name = name\n\
    \nclass Employee(Person, PrinterMixin):\n    def __init__(self, name, age, id):\n\
    \        super().__init__(name)\n        self.age = age\n        self.id = id\n\
    \n    def __str__(self):\n        return 'Employee(' + self.id + ')' + self.name\
    \ + '[' + str(self.age) + ']'\n```\n\nThis now means that when we instantiate\
    \ the class Employee we can call the print_me() method on the Employee object:\n\
    \n```python\ne = Employee('Megan', 21, 'MS123')\ne.print_me()\n```\n\nwhich will\
    \ print out.\n\n```\nEmployee(MS123)Megan[21]\n```\n\nOne point to note about\
    \ the PrinterMixin is that it is completely independent of the class it is mixed\
    \ into. However, mixins can also impose some constraints on the classes they will\
    \ be mixed into. For example, the IDPrinterMixin shown below assumes that the\
    \ class it will be mixed into has an attribute or property called id.\n\n```python\n\
    class IDPrinterMixin(ABC):\n    def print_id(self):\n        print(self.id)\n\
    ```\n\nThis means that it cannot be mixed successfully into the class Person—if\
    \ it was then when the print_id() method was called an error would be generated.\
    \ However, the class Employee does have an id attribute and thus the IDPrinterMixin\
    \ can be mixed into the Employee class:\n\n```python\nclass Employee(Person, PrinterMixin,\
    \ IDPrinterMixin):\n    def __init__(self, name, age, id):\n        super().__init__(name)\n\
    \        self.age = age\n        self.id = id\n\n    def __str__(self):\n    \
    \    return 'Employee(' + self.id + ')' + self.name + '[' + str(self.age) + ']'\n\
    ```\n\nWhich means that we can now call write:\n\n```python\ne = Employee('Megan',\
    \ 21, 'MS123')\ne.print_me()\ne.print_id()\n```\n\nWhich will generate:\n\n```\n\
    Employee(MS123)Megan[21]\nMS123\n```\n\n## 25.7 Online Resources\n\nSome online\
    \ references for Abstract Base Classes include:\n\n- https://docs.python.org/3/library/abc.html\
    \ The standard Library documentation on Abstract Base Classes.\n- https://pymotw.com/3/abc/index.html\
    \ The Python Module of the Week page for Abstract Base Classes.\n- https://www.python.org/dev/peps/pep-3119/\
    \ Python PEP 3119 that introduced Abstract Base Classes.\n\n# Chapter 26\nError\
    \ and Exception Handling\n\n## 26.1 Introduction\n\nThis chapter considers exception\
    \ and error handling and how it is implemented in Python. You are introduced to\
    \ the object model of exception handling, to the throwing and catching of exceptions,\
    \ and how to define new exceptions and exception-specific constructs. It also\
    \ considers exception groups and exception notes.\n\n## 26.2 Errors and Exceptions\n\
    \nWhen something goes wrong in a computer program someone needs to know about\
    \ it. One way of informing other parts of a program (and potentially those running\
    \ a program) is by generating an error object and propagating that through the\
    \ code until either something *handles* the error and sorts thing out or the point\
    \ at which the program is entered is found.\nIf the error propagates out of the\
    \ program, then the user who ran the program needs to know that something has\
    \ gone wrong. They are notified of a problem via a short report on the error that\
    \ occurred and a stack trace of where that error can be found."
