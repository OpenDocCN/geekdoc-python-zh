- md: "## 42.8 Uninstalling Modules\n\nIn some cases it is very useful to be able\
    \ to uninstall an unwanted package. For example, if we have installed Pandas by\
    \ mistake into our virtual environment then we can remove it using the `pip uninstall`\
    \ command:\n\n```\npip uninstall <module name>\n```\n\nAs an example, if we first\
    \ list the packages installed in our virtual environment using `pip list` we will\
    \ see that we have 8 modules installed:\n\n```\n(genesis_venv) % pip list\nPackage\
    \         Version\n-------         -------\nnumpy           1.24.3\npandas   \
    \       2.0.1\npip             23.1.2\npython-dateutil 2.8.2\npytz           \
    \ 2023.3\nsetuptools      67.6.1\nsix             1.16.0\ntzdata          2023.3\n\
    (genesis_venv) jeh@Johns-iMac projects %\n```\n\nIf we now uninstall pandas:\n\
    \n```\n(genesis_venv) jeh@Johns-iMac projects % pip uninstall pandas\nFound existing\
    \ installation: pandas 2.0.1\nUninstalling pandas-2.0.1:\n  Would remove:\n  \
    \  /Users/jeh/projects/genesis_venv/lib/python3.11/site-packages/pandas-2.0.1.dist-info/*\n\
    \    /Users/jeh/projects/genesis_venv/lib/python3.11/site-packages/pandas/*\n\
    Proceed (Y/n)? y\nSuccessfully uninstalled pandas-2.0.1\n(genesis_venv) projects\
    \ %\n```\n\nWe can check to see which modules are still installed:\n\n```\n(genesis_venv)\
    \ projects % pip list\nPackage            Version\n--------------     -------\n\
    numpy              1.24.3\npip                23.1.2\npython-dateutil    2.8.2\n\
    pytz               2023.3\nsetuptools         67.6.1\nsix                1.16.0\n\
    tzdata             2023.3\n(genesis_venv) projects %\n```\n\nAs you will see there\
    \ are now 7 modules listed! The pandas module is no longer installed as part of\
    \ this virtual environment.\n\nHowever, the other modules that were installed\
    \ along with pandas when we ran `pip install pandas` have not been removed! What\
    \ is going on here? This was a decision taken by the pip developers, although\
    \ when you install Pandas all of its dependencies are installed, when you uninstall\
    \ Pandas you must manually remove its dependencies.\n\nWhy is this? The main reason\
    \ is that dependency management across modules is very hard to do. For example,\
    \ let us say we installed `johns` module and that `johns` module also used `numpy`\
    \ version 1.24.3, should `pip uninstall` remove numpy in this case? Probably not\
    \ if we also have pandas installed! This scenario gets more complicated as we\
    \ may have module1 using module2 which uses module3 which then uses numpy, etc.\n\
    \nTherefore the decision was taken to require developers to manually handle uninstallation\
    \ of modules. In this case that means uninstalling numpy, python-dateutil, pytz,\
    \ six and tzdata.\n\n## 42.9 Module Path Search Order\n\nAn important point to\
    \ note is that Python will search for module using the following order:\n\n- local\
    \ directory,\n- installed third-party modules,\n- built-in modules.\n\nIt is therefore\
    \ important never to name your own files using the name of a *built-in* module\
    \ nor using the name of a third-party module. As such if you are writing some\
    \ code that uses the `pandas` module do not call your own file `pandas.py` as\
    \ that will hide the pandas you have installed into your virtual environment!\n\
    \n## 42.10 Using PyCharm with Virtual Environments\n\nThe above in this chapter\
    \ might all feel a bit daunting as many people are not familiar with, or indeed\
    \ comfortable using, a command line set of tools such as `pip`. Indeed we have\
    \ suggested that you use the PyCharm editor to not only write your programs, but\
    \ also to run them, yet here we have been describing how to use the `pip` command\
    \ line tool.\n\nThe reason for this was to show what happens at the tooling level.\
    \ However you will probably interact with all of these tools using an IDE such\
    \ as PyCharm. In fact when you create any project in PyCharm you will have had\
    \ the option to use a virtual environment!\n\nTo see this we will start a new\
    \ PyCharm project. This is done by starting PyCharm up and selecting New Project\
    \ from the ‘Welcome to PyCharm’ dialog, for example:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_487_0.png)\n\
    \nIf you do this you will be presented with the ‘New Project’ dialog. This dialog\
    \ has several fields on it, the main one being the location into which the project\
    \ will be stored. However, below this is a drop down option for the ‘Python Interpreter:\
    \ New Virtualenv environment’. If you open this drop down you will see that it\
    \ provides a location for the virtual environment (by default using the name `venv`\
    \ in the current directory) and the option to select which version of Python you\
    \ wish to use, for example:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_487_1.png)\n\
    \nNote under the drop down next to ‘New environment using’ there are several other\
    \ options but we are using `Virtualenv` which is the Python default.\n\nIf you\
    \ now click on ‘Create’ you will create the new project workspace. This workspace\
    \ will be created with a directory within it called `venv`, and this virtual environment\
    \ will automatically be activated for you. For example:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_488_0.png)\n\
    \nYou can explore the `venv` directory structure, but do not under any circumstance\
    \ edit the contents of this directory or add files to it. Your own code should\
    \ be at the top level; be very careful not to accidentally add you own files to\
    \ the `venv` directory!\n\nNow if you want to see the modules installed into your\
    \ virtual environment you can go to the ‘Settings’ menu option, this is under\
    \ File on a Windows machine and under PyCharm menu on a Mac.\n\nWhen you open\
    \ the Settings dialog, select the ‘Project: < name of project >’ node in the left\
    \ hand tree, and open the node for example:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_488_1.png)\n\
    \nIn here select the ‘Python Interpreter’ node. You should now see that on the\
    \ right hand side of the editor the list of installed packages is presented along\
    \ with the Python runtime you are using, for example:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_489_0.png)\n\
    \nThis shows that we have three modules loaded including `pip`, `setuptools` and\
    \ `wheel`. It also lists the version of the module and what the latest version\
    \ is.\n\nWe can add additional modules to this virtual environment using the '+'\
    \ button. If you click on the '+' button you will see the available packages dialog.\
    \ On the top search bar, if you type in the name of the module you are interested\
    \ in, then the modules with that name will be listed. For example, if you type\
    \ in pandas, you will see:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_489_1.png)\n\
    \nYou can select whichever module you are interested in. In this case we want\
    \ to install the pandas module and that is the one selected, and you can therefore\
    \ just click on the 'Install Package' button at the bottom of the dialog. Once\
    \ the module/package is installed you will see a message indicating that the installation\
    \ was successful:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_490_0.png)\n\nIf\
    \ you close the dialog and return to the main Settings dialog you should now see\
    \ the Pandas module has been installed along with all the modules it depends on,\
    \ for example:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_490_1.png)\n\nYou can\
    \ now close this dialog and can use the Pandas module in your own code, etc.\n\
    \n## 42.11 Online Resources\n\n- https://docs.python.org/3/py-modindex.html the\
    \ Python Module Index\n- https://fastapi.tiangolo.com/ FastAPI website\n- https://palletsprojects.com/p/flask/\
    \ Flask website\n- https://www.djangoproject.com/ Django website.\n\n# Chapter\
    \ 43 Monkey Patching\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_491_0.png)\n\n\
    ## 43.1 Introduction\n\nMonkey Patching is a term you might well come across when\
    \ looking into Python further or when searching the web for Python related concepts.\
    \ It relates to the ability in Python to extend the functionality associated with\
    \ a class/type at runtime.\n\nAlthough not directly related to Monkey Patching;\
    \ how Python looks up attributes and how this process can be managed is a useful\
    \ aspect to understand. In particular, how to handle unknown attributes can be\
    \ very useful in managing situations in which Monkey Patching might be used to\
    \ solve an initial attribute incompatibility.\n\nThis chapter explores both Monkey\
    \ Patching and Python attribute lookup.\n\n## 43.2 What is Monkey Patching?\n\n\
    Monkey Patching is the idea that it is possible to add behaviour to an existing\
    \ object, at runtime, to meet some requirement that originally the type did not\
    \ meet. This can happen for example as there is no fixed requirement for a class\
    \ to implement all of protocol; in many cases a class may only implement as much\
    \ of a protocol as is required to meet the current needs; if at a later stage,\
    \ other elements of a protocol are required then they can be added.\n\nOf course,\
    \ if this is likely to be a common occurrence then the features can be added to\
    \ the class for use by everyone; but if not, then those features can be added\
    \ dynamically at runtime to an object itself. This avoids the public interface\
    \ of the type becoming cluttered with rarely used features/functionality."
  mdcn: "## 42.8 卸载模块\n\n在某些情况下，能够卸载不需要的包非常有用。例如，如果我们不小心在虚拟环境中安装了 Pandas，那么我们可以使用\
    \ `pip uninstall` 命令将其移除：\n\n```\npip uninstall <module name>\n```\n\n举个例子，如果我们首先使用\
    \ `pip list` 列出虚拟环境中已安装的包，我们会看到已安装了 8 个模块：\n\n```\n(genesis_venv) % pip list\n\
    Package         Version\n-------         -------\nnumpy           1.24.3\npandas\
    \          2.0.1\npip             23.1.2\npython-dateutil 2.8.2\npytz        \
    \    2023.3\nsetuptools      67.6.1\nsix             1.16.0\ntzdata          2023.3\n\
    (genesis_venv) jeh@Johns-iMac projects %\n```\n\n如果我们现在卸载 pandas：\n\n```\n(genesis_venv)\
    \ jeh@Johns-iMac projects % pip uninstall pandas\nFound existing installation:\
    \ pandas 2.0.1\nUninstalling pandas-2.0.1:\n  Would remove:\n    /Users/jeh/projects/genesis_venv/lib/python3.11/site-packages/pandas-2.0.1.dist-info/*\n\
    \    /Users/jeh/projects/genesis_venv/lib/python3.11/site-packages/pandas/*\n\
    Proceed (Y/n)? y\nSuccessfully uninstalled pandas-2.0.1\n(genesis_venv) projects\
    \ %\n```\n\n我们可以检查一下哪些模块仍然安装着：\n\n```\n(genesis_venv) projects % pip list\nPackage\
    \            Version\n--------------     -------\nnumpy              1.24.3\n\
    pip                23.1.2\npython-dateutil    2.8.2\npytz               2023.3\n\
    setuptools         67.6.1\nsix                1.16.0\ntzdata             2023.3\n\
    (genesis_venv) projects %\n```\n\n如你所见，现在列出了 7 个模块！pandas 模块已不再作为此虚拟环境的一部分安装。\n\
    \n然而，当我们运行 `pip install pandas` 时随 pandas 一起安装的其他模块并未被移除！这是怎么回事？这是 pip 开发者做出的一个决定，尽管安装\
    \ Pandas 时会安装其所有依赖项，但卸载 Pandas 时，你必须手动移除其依赖项。\n\n为什么会这样？主要原因是跨模块的依赖管理非常困难。例如，假设我们安装了\
    \ `johns` 模块，而 `johns` 模块也使用了 `numpy` 版本 1.24.3，在这种情况下，`pip uninstall` 应该移除 numpy\
    \ 吗？如果我们同时也安装了 pandas，那可能就不应该移除！这种情况会变得更复杂，因为我们可能有模块1使用模块2，模块2使用模块3，而模块3又使用 numpy，等等。\n\
    \n因此，决定要求开发者手动处理模块的卸载。在这种情况下，这意味着需要卸载 numpy、python-dateutil、pytz、six 和 tzdata。\n\
    \n## 42.9 模块路径搜索顺序\n\n一个需要注意的重要点是，Python 将按以下顺序搜索模块：\n\n-   本地目录，\n-   已安装的第三方模块，\n\
    -   内置模块。\n\n因此，切勿使用*内置*模块的名称或第三方模块的名称来命名你自己的文件。例如，如果你正在编写一些使用 `pandas` 模块的代码，请不要将你自己的文件命名为\
    \ `pandas.py`，因为这会隐藏你已安装到虚拟环境中的 pandas！\n\n## 42.10 在 PyCharm 中使用虚拟环境\n\n本章以上内容可能让人感觉有些令人生畏，因为许多人不熟悉或不习惯使用像\
    \ `pip` 这样的命令行工具集。事实上，我们曾建议你使用 PyCharm 编辑器来编写和运行程序，但这里我们一直在描述如何使用 `pip` 命令行工具。\n\
    \n这样做的原因是为了展示工具层面发生了什么。然而，你很可能会通过像 PyCharm 这样的 IDE 与所有这些工具进行交互。事实上，当你在 PyCharm\
    \ 中创建任何项目时，你都有使用虚拟环境的选项！\n\n为了说明这一点，我们将启动一个新的 PyCharm 项目。这是通过启动 PyCharm 并从“Welcome\
    \ to PyCharm”对话框中选择 New Project 来完成的，例如：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_487_0.png)\n\
    \n如果你这样做，将会看到“New Project”对话框。此对话框有几个字段，主要的是项目存储的位置。然而，在其下方有一个“Python Interpreter:\
    \ New Virtualenv environment”的下拉选项。如果你打开这个下拉菜单，你会看到它提供了虚拟环境的位置（默认使用当前目录中的 `venv`\
    \ 名称）以及选择要使用的 Python 版本的选项，例如：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_487_1.png)\n\
    \n注意在“New environment using”旁边的下拉菜单下还有其他几个选项，但我们使用的是 Python 默认的 `Virtualenv`。\n\
    \n如果你现在点击“Create”，你将创建新的项目工作区。此工作区将创建一个名为 `venv` 的目录，并且此虚拟环境将自动为你激活。例如：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_488_0.png)\n\
    \n你可以探索 `venv` 目录结构，但在任何情况下都不要编辑此目录的内容或向其中添加文件。你自己的代码应位于顶层；务必小心，不要意外地将你自己的文件添加到\
    \ `venv` 目录中！\n\n现在，如果你想查看安装到虚拟环境中的模块，可以转到“Settings”菜单选项，在 Windows 机器上位于 File\
    \ 下，在 Mac 上位于 PyCharm 菜单下。\n\n打开 Settings 对话框后，在左侧树中选择“Project: < name of project\
    \ >”节点，并展开该节点，例如：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_488_1.png)\n\n在此处选择“Python\
    \ Interpreter”节点。现在你应该在编辑器右侧看到已安装包的列表以及你正在使用的 Python 运行时，例如：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_489_0.png)\n\
    \n这显示我们已加载了三个模块，包括 `pip`、`setuptools` 和 `wheel`。它还列出了模块的版本以及最新版本。\n\n我们可以使用“+”按钮向此虚拟环境添加额外的模块。如果你点击“+”按钮，你将看到可用包对话框。在顶部的搜索栏中，如果你输入感兴趣的模块名称，那么具有该名称的模块将被列出。例如，如果你输入\
    \ pandas，你会看到：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_489_1.png)\n\n你可以选择任何你感兴趣的模块。在这种情况下，我们想要安装\
    \ pandas 模块，并且该模块已被选中，因此你只需点击对话框底部的“Install Package”按钮即可。一旦模块/包安装完成，你将看到一条消息表明安装成功：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_490_0.png)\n\n如果你关闭对话框并返回到主 Settings\
    \ 对话框，你现在应该看到 Pandas 模块及其所有依赖模块都已安装，例如：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_490_1.png)\n\
    \n你现在可以关闭此对话框，并在自己的代码中使用 Pandas 模块等。\n\n## 42.11 在线资源\n\n- https://docs.python.org/3/py-modindex.html\
    \ Python 模块索引\n- https://fastapi.tiangolo.com/ FastAPI 网站\n- https://palletsprojects.com/p/flask/\
    \ Flask 网站\n- https://www.djangoproject.com/ Django 网站。\n\n# 第 43 章 猴子补丁\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_491_0.png)\n\
    \n## 43.1 简介\n\n当你深入研究 Python 或在网上搜索与 Python 相关的概念时，很可能会遇到“猴子补丁”这个术语。它与 Python\
    \ 在运行时扩展与类/类型相关功能的能力有关。\n\n虽然与猴子补丁没有直接关系；但理解 Python 如何查找属性以及如何管理此过程是一个有用的方面。特别是，如何处理未知属性在管理可能使用猴子补丁来解决初始属性不兼容性的情况时非常有用。\n\
    \n本章探讨了猴子补丁和 Python 属性查找。\n\n## 43.2 什么是猴子补丁？\n\n猴子补丁是指在运行时向现有对象添加行为以满足该类型最初未满足的某些要求的想法。这可能发生，例如，因为类没有固定要求实现所有协议；在许多情况下，类可能只实现协议中满足当前需求的部分；如果在后期阶段需要协议的其他元素，则可以添加它们。\n\
    \n当然，如果这很可能成为常见情况，那么可以将这些功能添加到类中供所有人使用；但如果不是，那么这些功能可以在运行时动态添加到对象本身。这避免了类型的公共接口被很少使用的特性/功能所充斥。"
