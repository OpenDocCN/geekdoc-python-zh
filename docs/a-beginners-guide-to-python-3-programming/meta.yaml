    - `module`（可选）接受定义枚举类型的模块名称。\n- `qualname`（可选）保存定义枚举类型的模块的位置。\n- `type`（可选）保存用作枚举类型父类的类。\n\
    - `start`（可选）接受枚举的起始值（默认为 1）。\n\n`names` 参数可以接受以下任何一种形式：\n\n- 一个包含成员名称的字符串，成员名称之间用空格或逗号分隔，\n\
    - 一个成员名称的可迭代对象（如列表），\n- 一个名称-值对的可迭代对象（如列表）。\n\n大多数时候，在创建枚举时，你只会使用 `Enum` 函数的前两个参数（可能还有最后一个）。例如：\n\
    \n```python\nWeekend = Enum('Weekend', ['SATURDAY', 'SUNDAY'])\n```\n\n或者，如果你想让枚举从\
    \ 10 而不是 1 开始，你可以这样写：\n\n```python\nWeekend = Enum('Weekend',\n              \
    \ ['SATURDAY', 'SUNDAY'],\n               start=10)\n```\n\n在这两种情况下，你都可以通过变量 `Weekend`\
    \ 引用新的枚举，并像往常一样访问枚举成员（SATURDAY 和 SUNDAY），例如：\n\n```python\nday = Weekend.SATURDAY\n\
    print(day)\n```\n\n此代码的输出为：\n\n```\nWeekend.SATURDAY\n```\n\n也可以为枚举类型中的每个成员指定自定义值。这通过使用名称-值对的可迭代对象来完成（下面我们使用列表和元组）。例如：\n\
    \n```python\nHTTPStatusCode = Enum(\n    value=\"HTTPStatusCode\",\n    names=[\n\
    \        (\"OK\", 200),\n        (\"CREATED\", 201),\n        (\"BAD_REQUEST\"\
    , 400),\n        (\"NOT_FOUND\", 404),\n        (\"SERVER_ERROR\", 500),\n   \
    \ ],\n)\n\nprint(HTTPStatusCode.OK)\n```\n\n此代码的输出为：\n\n```\nHTTPStatusCode.OK\n\
    ```\n\n## 40.7 从自动值创建枚举\n\nenum 模块还提供了一个 `auto()` 函数，可用于自动为枚举成员分配值。它通过递增先前使用的值来实现。此函数可以与用户指定的值结合使用以填补空白，例如：\n\
    \n```python\nclass Day(Enum):\n    MONDAY = 5\n    TUESDAY = auto()\n    WEDNESDAY\
    \ = 9\n    THURSDAY = auto()\n    FRIDAY = auto()\n    SATURDAY = auto()\n   \
    \ SUNDAY = 15\n\nprint(list(Day))\n```\n\n在此示例中，MONDAY、WEDNESDAY 和 SUNDAY 已为其值指定了显式的整数字面量。然而，TUESDAY、THURSDAY、FRIDAY\
    \ 和 SATURDAY 都将基于前一个值的递增自动生成。因此，枚举成员的值将是 5、6、9、10、11、12 和 15。\n为了说明这一点，枚举中的所有值都被收集并存储到一个列表中，然后打印出来。结果是：\n\
    \n```\n[<Day.MONDAY: 5>, <Day.TUESDAY: 6>, <Day.WEDNESDAY: 9>,\n <Day.THURSDAY:\
    \ 10>, <Day.FRIDAY: 11>, <Day.SATURDAY: 12>,\n <Day.SUNDAY: 15>]\n```\n\n## 40.8\
    \ 使用枚举别名\n\n也可以创建两个或多个成员具有相同常量值的枚举；多余的枚举成员被称为 *别名*。这在不同名称具有语义含义的情况下很有用，例如：\n\n\
    ```python\nclass OperatingSystem(Enum):\n    UBUNTU = \"linux\"\n    MACOS = \"\
    darwin\"\n    WINDOWS = \"win\"\n    DEBIAN = \"linux\"\n\nprint(OperatingSystem.UBUNTU)\n\
    print(OperatingSystem.DEBIAN)\nprint(OperatingSystem.MACOS)\nprint(OperatingSystem.WINDOWS)\n\
    ```\n\n在此示例中，DEBIAN 和 UBUNTU 都具有值 \"linux\"；因此 DEBIAN 是 UBUNTU 的别名。\n运行此代码的结果是：\n\
    \n```\nOperatingSystem.UBUNTU\nOperatingSystem.UBUNTU\nOperatingSystem.MACOS\n\
    OperatingSystem.WINDOWS\n```\n\n## 40.9 枚举唯一值\n\n上一节说明了枚举中的两个值默认情况下可以具有相同的值。然而，如果这不是你想要的，那么这可能会意外发生！为了避免这种情况，你可以使用\
    \ @enum.unique 装饰器标记枚举类。这确保每个枚举成员都将具有唯一的值。如果不是，则会生成 ValueError，例如：\n\n以下代码在 Python\
    \ 中是合法的：\n\n```python\nclass Lights(Enum):\n    RED = 1\n    AMBER = 2\n    GREEN\
    \ = 3\n    RED_AMBER = 1\n\nprint(Lights.RED)\n```\n\n但是，如果我们现在使用 enum 模块中的 @unique\
    \ 标记它，如下所示：\n\n```python\n@unique\nclass Lights(Enum):\n    RED = 1\n    AMBER\
    \ = 2\n    GREEN = 3\n    RED_AMBER = 1\n\nprint(Lights.RED)\n```\n\n那么当我们现在尝试运行此程序时，我们将得到一个\
    \ ValueError：\n\n```\nTraceback (most recent call last):\n  File \"enum_examples.py\"\
    , line 97, in <module>\n    @unique\n    ^^^^^^^\n  File \"enum.py\", line 1564,\
    \ in unique\n    raise ValueError('duplicate values found in %r: %s' %\nValueError:\
    \ duplicate values found in <enum 'Lights'>: RED_AMBER -> RED\n```\n\n这说明此枚举的每个成员都必须具有唯一的值。\n\
    \n## 40.10 遍历枚举值\n\nPython 枚举是 *可迭代* 的；这意味着你可以非常轻松地遍历所有枚举成员。\n\n例如，要遍历 `DaysOfWeek`\
    \ 枚举中的所有成员，我们可以编写一个 for 循环，如下所示：\n\n```python\nfor day in DaysOfWeek:\n    print(day)\n\
    ```\n\n此代码的输出是每个枚举成员将依次打印出来，例如：\n\n```\nDaysOfWeek.MONDAY\nDaysOfWeek.TUESDAY\n\
    DaysOfWeek.WEDNESDAY\nDaysOfWeek.THURSDAY\nDaysOfWeek.FRIDAY\n```\n\n## 40.11\
    \ 比较枚举\n\n默认情况下，枚举类型支持两种比较运算符：\n\n- 恒等比较，使用 `is` 和 `is not` 运算符。\n- 相等比较，使用 `==`\
    \ 和 `!=` 运算符。\n\n恒等比较依赖于每个枚举成员都是其枚举类的唯一实例这一事实（在面向对象设计术语中，它是一个单例）。这意味着可以使用 `is`\
    \ 和 `is not` 运算符执行非常快速的恒等比较。\n\n例如：\n\n```python\nclass OperatingSystem(Enum):\n\
    \    UBUNTU = \"linux\"\n    MACOS = \"darwin\"\n    WINDOWS = \"win\"\n    DEBIAN\
    \ = \"linux\"\n\nos1 = OperatingSystem.UBUNTU\nos2 = OperatingSystem.MACOS\nos3\
    \ = OperatingSystem.UBUNTU\nprint(os1 is os3)\nprint(os1 is os2)\nprint(os1 is\
    \ not os2)\n```\n\n上述代码检查变量 os1、os2 和 os3 中的每个 OperatingSystem 枚举值是否是 OperatingSystem\
    \ 类型的完全相同的实例，或者是不同的实例。这非常快速且高效。"
