    \ for example:\n\n```\n(genesis_venv) % deactivate\nprojects % pip list\nPackage\
    \    Version\n---------- -------\npip        23.1.2\nsetuptools 67.6.1\nwheel\
    \      0.40.0\nprojects %\n```\n\nThis is exactly what we should expect, we are\
    \ no longer using the virtual environment, and thus the configuration of modules\
    \ defined within that virtual environment is no longer available. We can of course\
    \ reactivate the virtual environment, and we will get Pandas and its modules back\
    \ again, etc.\n\nThis allows a developer to switch between different virtual environments\
    \ for different programs/projects.\n\n## 42.7 Listing and Freezing on Modules\n\
    \nThere are three similar pip tools that can provide information on the modules\
    \ installed in a virtual environment. The commands are:\n\n- pip list—this generates\
    \ a list of installed packages, and the list is ordered in ascending order based\
    \ on the case sensitive module names.\n- pip inspect—which generates a very detailed\
    \ output file of all the modules installed.\n- pip freeze—which generates output\
    \ in requirements format that can be used to regenerate the configuration of the\
    \ current virtual environment in another installation.\n\nEach of these will be\
    \ discussed below.\n\n### 42.7.1 The pip list Command\n\nAs an example of using\
    \ this command we will list the modules installed into the virtual environment\
    \ we created above:\n\n```\n(genesis_venv) % pip list\nPackage           Version\n\
    ----------------- -------\nnumpy             1.24.3\npandas            2.0.1\n\
    pip               23.1.2\npython-dateutil   2.8.2\npytz              2023.3\n\
    setuptools        67.6.1\nsix               1.16.0\ntzdata            2023.3\n\
    (genesis_venv) projects %\n```\n\nThis lists all the modules that have been installed\
    \ and the version that was installed.\n\n### 42.7.2 The pip inspect Command\n\n\
    If required, the module information can be generated as a JSON report file (JSON\
    \ stands for JavaScript Object Notation) which is a widely used data format for\
    \ information exchange and storage. This can be done using the `pip inspect` command,\
    \ for example:\n\n```\n(genesis_venv) % pip inspect\n{\n  \"version\": \"1\",\n\
    \  \"pip_version\": \"23.1.2\",\n  \"installed\": [\n    {\n      \"metadata\"\
    : {\n        \"metadata_version\": \"2.1\",\n        \"name\": \"pip\",\n    \
    \    \"version\": \"23.1.2\",\n        \"summary\": \"The PyPA recommended tool\
    \ for installing Python packages.\",\n        \"description\": \"pip - The Python\
    \ Package Installer\n...\n}\n```\n\nThe above illustrates the part of the output\
    \ of the JSON data as it is quite extensive, and the above illustrates the point.\n\
    \n### 42.7.3 The pip freeze Command\n\nThe `pip freeze` command can be used to\
    \ create a *requirements* format file. This file contains information on the installed\
    \ modules that can be used by the `pip` command to configure another virtual environment\
    \ to include the same modules (and version of those modules). This allows two\
    \ users to share their virtual environment configurations.\n\nFor example:\n\n\
    ```\n(genesis_venv)% pip freeze\nnumpy==1.24.3\npandas==2.0.1\npython-dateutil==2.8.2\n\
    pytz==2023.3\nsix==1.16.0\ntzdata==2023.3\n(genesis_venv) %\n```\n\nThis prints\
    \ to the output each of the modules installed. If we wish this information to\
    \ be stored into a file we can use the redirection arrow, for example:\n\n```\n\
    % pip freeze > johnsenv.txt\n```\n\nIf we list the contents of this generated\
    \ johnsenv.txt file we can see that it contains the same information as the output\
    \ above:\n\n```\n% more johnsenv.txt\nnumpy==1.24.3\npandas==2.0.1\npython-dateutil==2.8.2\n\
    pytz==2023.3\nsix==1.16.0\ntzdata==2023.3\n```\n\nIn the above example, the command\
    \ more will list the contents of the file to the output.\n\nWe can now use this\
    \ in another virtual environment to set that environment up to use the same set\
    \ of modules, for example:\n\n```\n% python -m venv projvenv\n% source projvenv/bin/activate\n\
    (projvenv) % pip list\nPackage    Version\n---------- -------\npip        23.1.2\n\
    setuptools 67.6.1\n(projvenv) jeh@Johns-iMac projects % pip install -r johnsenv.txt\n\
    Collecting numpy==1.24.3 (from -r johnsenv.txt (line 1))\n  Using cached numpy-1.24.3-cp311-cp311-macosx_10_9_x86_64.whl\
    \ (19.8 MB)\nCollecting pandas==2.0.1 (from -r johnsenv.txt (line 2))\n  Using\
    \ cached pandas-2.0.1-cp311-cp311-macosx_10_9_x86_64.whl (11.6 MB)\nCollecting\
    \ python-dateutil==2.8.2 (from -r johnsenv.txt (line 3))\n  Using cached python_dateutil-2.8.2-py2.py3-none-any.whl\
    \ (247 kB)\nCollecting pytz==2023.3 (from -r johnsenv.txt (line 4))\n  Using cached\
    \ pytz-2023.3-py2.py3-none-any.whl (502 kB)\nCollecting six==1.16.0 (from -r johnsenv.txt\
    \ (line 5))\n  Using cached six-1.16.0-py2.py3-none-any.whl (11 kB)\nCollecting\
    \ tzdata==2023.3 (from -r johnsenv.txt (line 6))\n  Using cached tzdata-2023.3-py2.py3-none-any.whl\
    \ (341 kB)\nInstalling collected packages: pytz, tzdata, six, numpy, python-dateutil,\
    \ pandas\nSuccessfully installed numpy-1.24.3 pandas-2.0.1 python-dateutil-2.8.2\
    \ pytz-2023.3 six-1.16.0 tzdata-2023.3\n(projvenv) % pip list\n```"
