  md: "# Chapter 41\nStructural Pattern Matching\n\n# 41.1 Introduction\n\nA new feature\
    \ introduced in Python 3.10 was *structural pattern matching*. In this chapter\
    \ we will look at the use of the match keyword and how it can be used with literal\
    \ values, variables and containers such as lists and tuples.\n\n# 41.2 Basic Pattern\
    \ Matching\n\nIn its most basic form the `match` statement acts very much like\
    \ match and case statements from other languages such as Java or JavaScript. That\
    \ is, it is used to compare a value (typically held in a variable) with a set\
    \ of literal (or fixed) values. As such it is intended as a more concise form\
    \ of a conditional statement. For example, let us say that we want to display\
    \ an appropriate welcome message depending on the users’ language. To do this\
    \ we could write a traditional `if` statement such as:\n\n```\ndef greeter(language):\n\
    \    if language == 'English':\n        print('Hello')\n    elif language == 'Spanish':\n\
    \        print('Hola')\n    elif language == 'French':\n        print('Bonjour')\n\
    \    elif language == 'German':\n        print('Hallo')\n\ngreeter('Spanish')\n\
    ```"
  merge: -1
  pgno: 462
- img_proc: true
  md: "In this initial function `greeter()` an `if` statement is used to test what\
    \ the value of the parameter `language` is; the appropriate welcome is then printed\
    \ out. In this case the `greeter` function is called with the value 'Spanish'\
    \ and thus the output is:\n\nHola\n\nHowever, the `if` statement is quite long\
    \ winded, and it's not immediately obvious that all of the conditional elements\
    \ of the `if` statement relate to the value of the parameter `language`. To see\
    \ this it is necessary to read all the code. In this case that is not too difficult\
    \ as each of the behaviours associated with each condition is just one line, but\
    \ in some other situations it may be far less clear.\n\nThe basic use of the `match`\
    \ statement tries to make this more explicit. The equivalent of the above function\
    \ rewritten using a `match` statement is given below:\n\n```\ndef greeter2(language):\n\
    \    match language:\n        case 'English':\n            print('Hello')\n  \
    \      case 'Spanish':\n            print('Hola')\n        case 'French':\n  \
    \          print('Bonjour')\n        case 'German':\n            print('Hallo')\n\
    \ngreeter2('Spanish')\n```\n\nThe behaviour of this `greeter2()` function is exactly\
    \ the same as the original `greeter()` function, but the implementation now uses\
    \ the `match` syntax. The syntax for the `match` statement is:\n\n```\nmatch <value>:\n\
    \    case <test>:\n        actions\n    ...\n```\n\nThus it is easy to see that\
    \ the whole `match` statement relates to the current value of the `language` parameter\
    \ (as this is what follows the `match` keyword).\n\nAs always with Python, note\
    \ the indentation! In Python the layout of the `match` statement is critical,\
    \ with all `case` conditions indented relative to the `match` keyword and the\
    \ actions to be performed when a `case` condition is met, indented another level\
    \ again.\n\nIn this situation we can see that if the value of `language` is 'English'\
    \ we print 'Hello', whereas if it is 'Spanish' we print 'Hola' and so on. Note\
    \ that at most only once `case` condition with be triggered, thus once one `case`\
    \ condition has run the whole `match` statement terminates, additional `case`\
    \ conditions are not evaluated."
  merge: -1
  pgno: 463
- img_proc: true
  md: "Also note that there can be any number of statements within the body of the\
    \ case condition, for example:\n\n```\ndef greeter2a(language):\n    match language:\n\
    \        case 'English':\n            print('Hello')\n        case 'Spanish':\n\
    \            print('Hola')\n            print('Buenas')\n        case 'French':\n\
    \            print('Bonjour')\n        case 'German':\n            print('Hallo')\n\
    \ngreeter2a('Spanish')\n```\n\nThe output from this is:\n\n```\nHola\nBuenas\n\
    ```\n\n# 41.3 Default Case\n\nOne issue with the above use of the `match` statement\
    \ is that if a value is passed into the match which is not one of those listed,\
    \ then nothing happens, there is no failure but there is also no action. This\
    \ may of course be what you want, but if you need to pick up on this (possibly\
    \ as it is unexpected behaviour) then you can use a wildcard. A wildcard must\
    \ be the last case condition in the match statement and is represented by an underbar\
    \ `_`, for example:\n\n```\ndef get_status_message(status):\n    match status:\n\
    \        case 400:\n            return 'Bad request'\n        case 404:\n    \
    \        return 'Not found'\n        case 418:\n            return \"I'm a teapot\"\
    \n        case _:\n            return 'Something is wrong'\n\nprint(get_status_message(404))\n\
    print(get_status_message(401))\n```"
  merge: -1
