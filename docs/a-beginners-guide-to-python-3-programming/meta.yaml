    Collections, Tuples and Lists\n\n## 32.1 Introduction\n\nEarlier in this book\
    \ we looked at some Python built-in types such as `string`, `int` and `float`\
    \ as well as `bools`. These are not the only built-in types in Python; another\
    \ group of built-in types are collectively known as collection types. This is\
    \ because they represent a collection of other types (such as a collection of\
