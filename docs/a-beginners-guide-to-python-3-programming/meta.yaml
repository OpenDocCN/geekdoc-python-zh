    # 23.2.2 Why not Have Operator Overloading?


    If operator overloading is such a good idea, why don''t all programming languages
    support it? Interestingly Java, a very widely used programming language, does
    not support operator overloading!


    One answer is because it can be abused! For example, what is the meaning of the
    following code:


    ```

    p1 = Person(''John'')

    p2 = Person(''Denise'')

    p3 = p1 + p2

    ```


    It is not clear what `+` means in this context; in what way is Denise being added
    to John; does it imply they are getting married? If so, what is the result that
    is held in p3?


    The problem here is that from a design perspective (which in this case may be
    purely intuitive but in other cases may relate to the intention of an application)
    the plus operator does not make sense for the type Person. However, there is nothing
    in the Python language to indicate this and thus anyone can code any operator
    into any class!


    As a general design principle, developers should follow the semantics of built
    in types and thus should only implement those operators which are appropriate
    for the type being developed. For example, for arithmetic value types such as
    Quantity it makes perfect sense to provide a plus operator but for domain specific
    data-oriented types such as Person it does not.


    # 23.2.3 Implementing Operator Overloading


    To implement operators such as `+` in a user-defined class it is necessary to
    implement specific methods that are then mapped to the arithmetic or logical operators
    used by users of the class.


    These methods are considered *special* in that they start with and end with a
    double underscore (`__`). Such methods are considered private and usually restricted
    for Python-oriented implementations (we have seen these already with methods such
    as `__init__()` and `__str__()`).


    As an example, let us assume that we want to implement the `+` and `-` operators
    for our Quantity type. We also want our Quantity type to hold an actual value
    and be able to be converted into a string for printing purposes.'
