  md: "This language construct may at first seem confusing, however, once you have\
    \ worked with it for a while you will find it less daunting.\n\nAs an example,\
    \ consider the following function which divides a number by zero; this will raise\
    \ the `ZeroDivisionError` when it is run for any number:\n\n```\ndef runcalc(x):\n\
    \    x/0\n```\n\nIf we now call this function, we will get the error trackback\
    \ in the standard output:\n\n```\nruncalc(6)\n```\n\nThis is shown below:\n\n\
    ```\n/Library/Frameworks/Python.framework/Versions/3.7/bin/python3.7 /Users/Shared/workspaces/pycharm/python\n\
    Traceback (most recent call last):\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 67, in <module>\n    main()\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 39, in main\n    runcalc(0)\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 2, in runcalc\n    x / 0\nZeroDivisionError: division by zero\n```\n\n\
    However, we can handle this by wrapping the call to `runcalc` within a `try` statement\
    \ and providing an `except` clause. The syntax for a `try` statement with an `except`\
    \ clause is\n\n```\ntry:\n    <code to monitor>\nexcept <type of exception to\
    \ monitor for>:\n    <code to call if exception is found>\n```\n\nA concrete example\
    \ of this is given below for a `try` statement that will be used to monitor a\
    \ call to `runcalc`:\n\n```\ntry:\n    runcalc(6)\nexcept ZeroDivisionError:\n\
    \    print('oops')\n```\n\nwhich now results in the string 'oops' being printed\
    \ out. This is because when `runcalc` is called the '/' operator throws a the\
    \ `ZeroDivisionError` which is passed back to the calling code which has an `except`\
    \ clause specifying this type of exception. This *catches* the exception and runs\
    \ the associated code block which in this case prints out the string 'oops'.\n\
    \nIn fact, we don't have to be as precise as this; the except clause can be given\
    \ a class of exception to look for and it will match any exception that is of\
    \ that type or is an instance of a subclass of the exception. We therefore can\
    \ also write\n\n```\ntry:\n    runcalc(6)\nexcept Exception:\n```"
