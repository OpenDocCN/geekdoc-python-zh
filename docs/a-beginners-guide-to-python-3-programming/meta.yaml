    \ Python 2 核心语言的一部分，但未包含在 Python 3 的核心中。这部分是因为 Guido van Rossum 认为（可能正确地）`reduce`\
    \ 的适用性相当有限，但在它有用的地方，它非常有用。尽管必须指出，一些开发者试图将 `reduce()` 强行塞入一些场景，这只会使实现变得非常难以理解——请记住，始终力求保持简单。要在\
