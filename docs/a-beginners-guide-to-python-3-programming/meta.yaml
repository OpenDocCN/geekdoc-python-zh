    \ = 7.50\n        if self.age >= 21:\n            rate_of_pay += 2.50\n      \
    \  return hours_worked * rate_of_pay\n```\n\nHere we do several things:\n\n1.\
    \  The class is called Employee but it extends Person. This is indicated by including\
    \ the name of the class being inherited in parentheses after the name of the class\
