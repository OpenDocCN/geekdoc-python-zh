    # ## 8.1 Introduction


    In this section we will look at the `while` loop and the `for` loop available
    in Python. These loops are used to control the repeated execution of selected
    statements. A while loop is often referred to as a conditional loop as it will
    continue to loop while some condition is true. A for loop is often referred to
    as a counted loop as it will loop a specific number of times.


    # ## 8.2 While Loop


    The `while` loop exists in almost all programming languages and is used to iterative
    (or repeat) one or more code statements as long as the test condition (expression)
    is True. This iteration construct is usually used when the number of times when
    we need to repeat the block of code to execute it not know. For example, it may
    need to repeat until some solution is found or the user enters a particular value.

    The behaviour of the while loop is illustrated in below.'
