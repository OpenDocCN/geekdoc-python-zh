    \nclass Size(IntEnum):\n    XS = 1\n    S = 2\n    M = 3\n    L = 4\n    XL =\
    \ 5\n    XXL = 6\n\nprint(Size.XS < Size.L)\nprint(Size.XL > Size.S)\nprint(Size.XL\
