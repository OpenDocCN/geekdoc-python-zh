  md: '# 5.5.1 String Concatenation


    You can concatenate two strings together using the ''+'' operator (an operator
    is an operation or behaviour that can be applied to r = types involved). That
    is you can take one string and add it to another string to create a new third
    string:


    ```

    string_1 = ''Good''

    string_2 = " day"

    string_3 = string_1 + string_2

    print(string_3)

    print(''Hello '' + ''World'')

    ```


    The output from this is


    ```

    Good day

    Hello World

    ```


    Notice that the way in which the string is defined does not matter here, `string_1`
    used single quote, but `string_2` used double quotes; but they are both just strings.


    # 5.5.2 Length of a String


    It can sometimes be useful to know how long a string is; for example if you are
    putting a string into a user interface you might need to know how much of the
    string will be displayed within a field. To find out the length of a string in
    Python you use the `len()` function, for example:


    ```

    print(len(string_3))

    ```


    This will print out the length of the string currently being held by the variable
    `string_3` (in terms of the number of characters contained in the string).


    # 5.5.3 Accessing a Character


    As a string is a fixed sequence of letters, it is possible to use square brackets
    and an index (or position) to retrieve a specific character from within a string.
    For example:


    ```

    my_string = ''Hello World''

    print(my_string[4])

    ```


    However, you should note that strings are indexed from zero! This means that the
    first character is in position 0, the second in position 1, etc. Thus stating
    [4] indicates that we want to obtain the fifth character in the string, which
    in this case is the letter ''o''. This form of indexing elements is actually quite
    common in programming languages and is referred to a zero-based indexing.'
