    ## 32.4.9 嵌套元组\n\n元组可以嵌套在元组中；也就是说，一个元组可以包含另一个元组作为其元素之一。例如，下图说明了元组树的嵌套结构：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_381_0.png)\n\
    \n在代码中，我们可以将此结构定义为\n\n```python\ntuple1 = (1, 3, 5, 7)\ntuple2 = ('John', 'Denise',\
    \ 'Phoebe', 'Adam')\ntuple3 = (42, tuple1, tuple2, 5.5)\nprint(tuple3)\n```\n\n\
    输出结果为\n\n```\n(42, (1, 3, 5, 7), ('John', 'Denise', 'Phoebe', 'Adam'), 5.5)\n\
    ```\n\n请注意打印输出中圆括号的 *嵌套*，这说明了其中一个元组包含在另一个元组中。\n\n元组（以及其他容器）的这一特性允许根据应用程序的需要构建任意复杂的数据结构。\n\
    \n事实上，一个 `tuple` 内部不仅可以嵌套其他元组，还可以嵌套任何类型的容器，因此它可以包含列表、集合、字典等。这为构建用于 Python 程序的数据结构提供了巨大的灵活性。\n\
    \n## 32.4.10 不能对元组执行的操作\n\n无法向 `tuple` 添加或删除元素；它们是 *不可变的*。需要特别注意的是，上面介绍的所有函数或方法实际上都不会改变它们所应用的原始元组；即使是那些返回原始元组子集的方法，实际上也是返回\
    \ `tuple` 类的一个新实例，对原始元组没有影响。\n\n## 32.5 列表\n\n列表是其他对象的可变有序容器。它们支持 `tuple` 的所有特性，但由于它们是可变的，因此也可以向\
    \ `list` 添加元素、删除元素和修改元素。列表中的元素保持其顺序（直到被修改）。\n\n### 32.5.1 创建列表\n\n列表使用方括号括起构成列表的元素来创建。例如：\n\
    \n```python\nlist1 = ['John', 'Paul', 'George', 'Ringo']\n```\n\n在这种情况下，我们创建了一个包含四个元素的列表，第一个元素的索引从零开始，因此我们有\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_382_0.png)\n\n与元组一样，我们可以有嵌套列表和包含不同类型元素的列表。我们可以创建以下嵌套列表结构：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_382_1.png)\n\n在代码中，这可以定义为\n\n```python\n\
    l1 = [1, 43.5, Person('Phoebe', 21), True]\nl2 = ['apple', 'orange', 31]\nroot_list\
    \ = ['John', l1, l2, 'Denise']\nprint(root_list)\n```\n\n当打印 `root_list` 时，我们得到\n\
    \n```\n['John', [1, 43.5, <tuples.Person object at 0x1042ba4a8>, True],\n['apple',\
    \ 'orange', 31], 'Denise']\n```\n\n请注意外层方括号内的方括号，这表示嵌套列表。当然，我们也可以在列表中嵌套元组，在元组中嵌套列表。例如，以下结构显示元组（椭圆形）持有对列表（矩形）的引用，反之亦然：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_383_0.png)\n\n在代码中，这看起来像：\n\n```python\n\
    t1 = (1, 'John', 34.5)\nl1 = ['Smith', 'Jones']\nl2 = [t1, l1]\nt2 = (l2, 'apple')\n\
    print(t2)\n```\n\n产生\n\n```\n([(1, 'John', 34.5), ['Smith', 'Jones']], 'apple')\n\
    ```\n\n### 32.5.2 列表构造函数\n\n`list()` 函数可用于从可迭代对象构造列表；这意味着它可以从元组、字典或集合构造列表。它也可以从任何实现了可迭代协议的对象构造列表。\n\
    `list()` 函数的签名是\n\n```python\nlist(iterable)\n```\n\n例如：\n\n```python\nvowelTuple\
    \ = ('a', 'e', 'i', 'o', 'u')\nprint(list(vowelTuple))\n```\n\n产生\n\n```\n['a',\
    \ 'e', 'i', 'o', 'u']\n```\n\n### 32.5.3 从列表访问元素\n\n你可以使用索引（在方括号内）从列表访问元素。索引返回该位置的对象，例如：\n\
    \n```python\nlist1 = ['John', 'Paul', 'George', 'Ringo']\nprint(list1[1])\n```\n\
    \n这将打印出索引为 1 的元素，即 Paul（列表的索引从零开始，因此第一个元素是第零个元素）。\n如果你使用负索引，例如 -1，则索引是反向的，因此索引\
    \ -1 从列表末尾开始（-1 返回最后一个元素，-2 返回倒数第二个，依此类推）。\n也可以从列表中提取切片（或子列表）。这是通过在方括号内提供起始和结束索引，并用冒号分隔来完成的。例如\
    \ [1:4] 表示一个从第一个元素开始并延伸到（但不包括）第四个元素的切片。如果切片中省略了任一索引，则分别表示列表的开始或结束。\n以下说明了其中一些想法：\n\
    \n```python\nlist1 = ['John', 'Paul', 'George', 'Ringo']\nprint('list1[1]:', list1[1])\n\
    print('list1[-1]:', list1[-1])\nprint('list1[1:3]:', list1[1:3])\nprint('list[:3]:',\
    \ list1[:3])\nprint('list[1:]:', list1[1:])\n```\n\n产生\n\n```\nlist1[1]: Paul\n\
    list1[-1]: Ringo\nlist1[1:3]: ['Paul', 'George']\nlist[:3]: ['John', 'Paul', 'George']\n\
    list[1:]: ['Paul', 'George', 'Ringo']\n```\n\n### 32.5.4 向列表添加元素\n\n你可以使用 `list`\
    \ 类的 `append()` 方法向列表添加项目（这会改变实际的列表；它不会创建列表的副本）。此方法的语法是\n\n```python\n<alist>.append(<object>)\n\
    ```\n\n例如，考虑以下字符串列表，我们向其中添加第五个字符串：\n\n```python\nlist1 = ['John', 'Paul', 'George',\
    \ 'Ringo']\nlist1.append('Pete')\nprint(list1)\n```\n\n这将生成输出：\n\n```\n['John',\
    \ 'Paul', 'George', 'Ringo', 'Pete']\n```\n\n你也可以将一个列表中的所有项目添加到另一个列表。这里有几种选择，我们可以使用\
    \ `extend()` 方法，它会将传递给它的项目添加到列表末尾，或者我们可以使用 `+=` 运算符，它做同样的事情：\n\n```python\nlist1\
    \ = ['John', 'Paul', 'George', 'Ringo', 'Pete']\nprint(list1)\nlist1.extend(['Albert',\
    \ 'Bob'])\nprint(list1)\nlist1 += ['Ginger', 'Sporty']\nprint(list1)\n```\n\n\
    此代码片段的输出是\n\n```\n['John', 'Paul', 'George', 'Ringo', 'Pete']\n['John', 'Paul',\
    \ 'George', 'Ringo', 'Pete', 'Albert', 'Bob']\n['John', 'Paul', 'George', 'Ringo',\
    \ 'Pete', 'Albert', 'Bob', 'Ginger', 'Sporty']\n```\n\n你更喜欢使用哪种方法取决于你自己。\n请注意，严格来说，`extend()`\
    \ 和 `+=` 都接受所谓的可迭代对象。\n\n### 32.5.5 向列表插入元素\n\n你也可以向现有列表插入元素。这是使用 `list` 类的 `insert()`\
    \ 方法完成的。此方法的语法是\n\n```python\n<list>.insert(<index>, <object>)\n```\n\n`insert()`\
    \ 方法接受一个索引，指示在何处插入元素，以及要插入的对象。\n例如，我们可以在以下名称列表的 *第零个* 和 *第一个* 项目之间插入字符串 'Paloma'：\n\
    \n```python\na_list = ['Adele', 'Madonna', 'Cher']\nprint(a_list)\na_list.insert(1,\
    \ 'Paloma')\nprint(a_list)\n```\n\n结果是\n\n```\n['Adele', 'Madonna', 'Cher']\n\
    ['Adele', 'Paloma', 'Madonna', 'Cher']\n```\n\n换句话说，我们将字符串 'Paloma' 插入到索引位置 1，将\
    \ 'Madonna' 和 'Cher' 在列表中的索引向上推了一位。\n\n### 32.5.6 列表连接\n\n可以使用连接运算符 '+' 将两个列表连接在一起：\n\
    \n```python\nlist1 = [3, 2, 1]\nlist2 = [6, 5, 4]\nlist3 = list1 + list2\nprint(list3)\n\
    ```\n\n生成\n\n```\n[3, 2, 1, 6, 5, 4]\n```"
