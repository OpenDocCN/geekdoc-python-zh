    print('module; ', get_text.__module__)\n```\n\n运行这段代码，我们得到：\n\n```\nname: inner\n\
    doc: None\nmodule; __main__\n```\n\n看起来 `get_text` 函数被命名为 inner，并且没有关联的 `docstring`。然而，如果我们查看该函数，它应该被命名为\
