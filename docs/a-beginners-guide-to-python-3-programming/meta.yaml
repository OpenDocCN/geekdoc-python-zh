    \ (y/n): ')\n```\n\nWe could then check to see if they have entered a ‘y’ character\
    \ and terminate the loop.\nHowever, anytime if we take any input from something\
    \ outside of our program (such as the user) we should verify the input. For example,\
    \ what should the program do if the user enters ‘x’ or the number ‘1’? One option\
