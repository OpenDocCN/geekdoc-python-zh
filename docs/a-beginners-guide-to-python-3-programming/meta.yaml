  mdcn: "## 使用集成开发环境\n\n我偏好的 Python 集成开发环境是 PyCharm，它当然不是唯一的 Python IDE，但确实是一个应用非常广泛的\
    \ IDE。\n其他可用的 Python IDE 包括：\n\n- Spyder，这是一个科学家和工程师经常使用的 IDE，参见 https://www.spyder-ide.org/。\n\
    - Jupyter Notebook，这是一个基于 Web 的 IDE，特别适合数据科学家使用，参见 https://jupyter.org/。\n- Visual\
    \ Studio Code。这是微软推出的一款非常优秀的免费编辑器，具有非常实用的功能，参见 https://code.visualstudio.com。\n\
    - Sublime Text 更多是一个为 Python 代码着色的文本编辑器；不过对于简单的项目，它可能就足够了，参见 https://www.sublimetext.com。\n\
    \n本书大部分内容对编辑器或 IDE 是持中立态度的，只有第 3 章“设置 Python 环境”和第 42 章“Python 虚拟环境”真正专注于 PyCharm。因此，你可以使用任何你希望使用的编辑器。\n\
    \n## 约定\n\n在本书中，你会发现使用了多种文本样式约定。这些文本样式用于区分不同类型的信息。\n在正文中使用的代码词、变量和 Python 值，使用\
    \ `Courier` 字体显示。例如：\n这个程序创建了一个顶层窗口（`wx.Frame`）并为其设置了一个标题。它还创建了一个标签（一个 `wx.StaticText`\
    \ 对象）显示在框架内。\n在上面的段落中，`wx.Frame` 和 `wx.StaticText` 是 Python 图形用户界面库中可用的类。\n一段\
    \ Python 代码块如下所示：\n\n```\nnum = int(input('Enter another number: '))\nif num >\
    \ 0:\n    print(num, 'is positive')\n    print(num, 'squared is ', num * num)\n\
    print('Bye')\n```\n\n请注意，关键字和重点内容以粗体显示。\n任何命令行或用户输入以斜体显示，并且也是粗体：\n\n```\n> python\
    \ hello.py\n\nOr\n\nHello, world\nEnter your name: **John**\nHello John\n```\n\
    \n## 示例代码和示例解决方案\n\n本书中使用的示例（以及大多数章节末尾练习的示例解决方案）可在 GitHub 仓库中找到。GitHub 提供了一个 Web\
    \ 界面和一个托管 Git 的服务器环境。\n\nGit 是一个版本控制系统，通常用于管理源代码文件（例如用于创建 Python、Java、C#、C++、Scala\
    \ 等编程语言系统的文件）。像 Git 这样的系统对于协作开发非常有用，因为它们允许多人处理一个实现并将他们的工作合并在一起。它们还提供了代码的有用历史视图（这也允许开发者在修改被证明不合适时回滚更改）。\n\
    \n如果你的计算机上已经安装了 Git，那么你可以使用以下命令克隆（获取副本）仓库到本地：\n\n```\ngit clone https://github.com/johnhunt/beginnerspython3_2nd\n\
    ```\n\n如果你没有安装 git，那么你可以使用 https://github.com/johnhunt/beginnerspython3_2nd/archive/master.zip\
    \ 获取示例的 zip 文件。\n\n当然，如果你愿意，可以自己安装 Git。具体操作请参见 https://git-scm.com/downloads。这里提供了适用于\
    \ Mac OS、Windows 和 Linux/Unix 的 Git 客户端版本。\n\n然而，许多 IDE（如 PyCharm）都内置了 Git 支持，因此提供了另一种获取\
    \ Git 仓库的方法。\n\n有关 Git 的更多信息，请参见 http://git-scm.com/doc。这本 Git 指南提供了非常好的入门知识，强烈推荐。\n\
