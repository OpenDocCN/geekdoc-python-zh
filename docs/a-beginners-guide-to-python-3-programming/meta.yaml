    data types within Python with high performance container data types. It provides
    many useful containers such as


    | Name | Purpose |

    | :--- | :--- |

    | **namedtuple()** | Factory function for creating tuple subclasses with named
    fields |

    | **deque** | List-like container with fast appends and pops on either end |

    | **ChainMap** | Dict-like class for creating a single view of multiple mappings
    |

    | **Counter** | Dict subclass for counting hashable objects |

    | **OrderedDict** | Dict subclass that remembers the order entries were added
    |

    | **Defaultdict** | Dict subclass that calls a factory function to supply missing
    values |'
