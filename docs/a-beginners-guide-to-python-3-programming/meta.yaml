    \ title\nouter: original title\n```\n\nHowever, if what we want is for the `inner()`\
    \ function to modify the `outer()` function's `title` variable then we have a\
    \ problem.\n\nThis problem can be solved using the `nonlocal` keyword. This indicates\
    \ that a variable is not global but is also not local to the current function,\
    \ and Python should look within the scope in which the function is defined to\
    \ fund a local variable with the same name:\n\nIf we now declare `title` as `nonlocal`\
    \ in the `inner()` function, then it will use the `outer()` functions version\
    \ of `title` (it will be shared between them), and thus when the `inner()` function\
    \ changes the `title` it will change the it for both functions:\n\n```\ndef outer():\n\
    \    title = 'original title'\n    def inner():\n        nonlocal title\n    \
    \    title = 'another title'\n        print('inner:', title)\n    inner()\n  \
    \  print('outer:', title)\n\nouter()\n```\n\nThe result of running this is\n\n\
    ```\ninner: another title\nouter: another title\n```"
