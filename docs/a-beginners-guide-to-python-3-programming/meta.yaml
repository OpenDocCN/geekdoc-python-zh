  md: "```\n\"\"\"This is a test module\"\"\"\nprint('Hello I am module 1')\n\ndef\
    \ f1():\n    print('f1[1]')\n\ndef f2():\n    print('f2[1]')\n\nif __name__ ==\
    \ '__main__':\n    x = 1 + 2\n    print('x is', x)\n    f1()\n    f2()\n```\n\n\
    Now the code within the if statement will only be executed when this module is\
    \ loaded as the starting point for an application / script. Note that the print\
    \ statement at the top of the module will still be executed in both scenarios;\
    \ this can be useful as it allows set up or initialization behaviour to still\
    \ be executed where appropriate.\n\nA common pattern, or idiom is to place the\
    \ code to be run when a file is being loaded directly (rather than as a module)\
    \ in a function called main() and to call that function from within the if statement.\
    \ This helps to clarify which behaviour is intended to run when, thus our module's\
    \ final version is:\n\n```\n\"\"\"This is a test module\"\"\"\nprint(Hello I am\
    \ module 1')\n\ndef f1():\n    print('f1[1]')\n\ndef f2():\n    print('f2[1]')\n\
    \ndef main():\n    x = 1 + 2\n    print('x is', x)\n    f1()\n    f2()\n\nif__name__\
    \ == 'main__':\n    main()\n```\n\nThis version is what would now be called *idiomatic*\
    \ Python or *Pythonic* in style."
