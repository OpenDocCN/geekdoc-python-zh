    \ with a wide range of methods. The data and the methods are related primarily\
    \ via the related set of concepts represented by the package. In contrast a class\
    \ tends to closely relate data and methods in a single concept. Indeed, one of\
    \ the guidelines relating to good class design is that if a class represents more\
