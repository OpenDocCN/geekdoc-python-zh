  md: 'The fact that all class eventually inherit from the class `object` means that
    behaviour defined in object is available for all classes everywhere.


    # 21.6 The Built-in Object Class


    The class object is the base (root) class for all classes in Python. It has methods
    that are therefore available in all Python objects. It defines a common set of
    *special* methods and *intrinsic* attributes. The methods include the special
    methods `__str__()`, `__init__()`, `__eq__()` (equals) and `__hash__()` (hash
    method). It also defines attributes such as `__class__`, `__dict__`, `__doc__`
    and `__module__`.


    # 21.7 Purpose of Subclasses


    Subclasses are used to refine the behaviour and data structures of a superclass.

    A parent class may define some generic/shared attributes and methods; these can
    then be inherited and reused by several other (sub) classes which add subclass
    specific attributes and behaviour.

    In fact, there are only a small number of things that a subclass should do relative
    to its parent or super class. If a proposed subclass does not do any of these
    then your selected parent class is not the most appropriate super class to use.

    A subclass should modify the behaviour of its parent class or extend the data
    held by its parent class. This modification should refine the class in one or
    more of these ways:


    +   - Changes to the external protocol or interface of the class, that is it should
    extend the set of methods or attributes provided by the class.

    - Changes in the implementation of the methods; i.e., the way in which the behaviour
    provided by the class are implemented.

    - Additional behaviour that references inherited behaviour.


    If a subclass does not provide one or more of the above, then it is incorrectly
    placed. For example, if a subclass implements a set of new methods, but does not
    refer to the attributes or methods of the parent class, then the class is not
    really a subclass of the parent (it does not extend it).'
