    installed as part of this virtual environment.


    However, the other modules that were installed along with pandas when we ran `pip
    install pandas` have not been removed! What is going on here? This was a decision
    taken by the pip developers, although when you install Pandas all of its dependencies
    are installed, when you uninstall Pandas you must manually remove its dependencies.


    Why is this? The main reason is that dependency management across modules is very
    hard to do. For example, let us say we installed `johns` module and that `johns`
    module also used `numpy` version 1.24.3, should `pip uninstall` remove numpy in
    this case? Probably not if we also have pandas installed! This scenario gets more
    complicated as we may have module1 using module2 which uses module3 which then
    uses numpy, etc.


    Therefore the decision was taken to require developers to manually handle uninstallation
    of modules. In this case that means uninstalling numpy, python-dateutil, putz,
    six and tzdata.


    # 42.9 Module Path Search Order


    An important point to note is that Python will search for module using the following
    order:


    +   - local directory,

    - installed third-party modules,

    - built-in modules.


    It is therefore important never to name your own files using the name of a *built-in*
    module nor using the name of a third-party module. As such if you are writing
    some code that uses the `pandas` module do not call your own file `pandas.py`
    as that will hide the pandas you have installed into your virtual environment!'
