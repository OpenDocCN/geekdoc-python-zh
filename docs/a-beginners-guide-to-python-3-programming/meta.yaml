- md: "## 41.5 Alternative Values in Case Condition\n\nAnother option is to use an\
    \ *or* condition (represented by a |) to indicate that if a value equals one or\
    \ more values then the associated action should be performed. For example:\n\n\
    ```python\ndef greeter5(language):\n    match language:\n        case 'English'\
    \ | 'American':\n            print('Hello')\n        case 'Spanish':\n       \
    \     print('Hola')\n        case 'French':\n            print('Bonjour')\n  \
    \      case 'German':\n            print('Hallo')\n        case unknown:\n   \
    \         print(f'Language {unknown} is not yet known to us')\n\ngreeter5('English')\n\
    greeter5('American')\n```\n\nIn the above example, if the language is either 'English'\
    \ or 'American' then the string 'Hello' will be printed out. The output from running\
    \ this code is:\n\n```\nHello\nHello\n```\n\nNote that there can be any number\
    \ of values so if we wanted to use 'English', 'American' and 'Australian' we could\
    \ write:\n\n```python\ncase 'English' | 'American' | 'Australian':\n```\n\n##\
    \ 41.6 Matching Sequences/Containers\n\nA sequence is something that contains\
    \ a set of values such as a container/collection. A `tuple` is an example of a\
    \ sequence or container. The structural aspect of the `match` statement allows\
    \ you to match against the contents of a `tuple`, but also to structurally extract\
    \ values from a tuple.\nThe following example illustrates several options:\n\n\
    - The first `case` matches the exact values in a tuple.\n- The second matches\
    \ on the first element of a two value tuple and extracts the *second* value and\
    \ stores it into a local variable *y*.\n- The third case condition does the opposite,\
    \ it extracts the *first* value in the tuple and matches against the 0 in the\
    \ second position.\n- The fourth case condition can extract both the x and y value.\n\
    - The final case condition is the wildcard.\n\nNote, however, that only one of\
    \ these case conditions will actually execute. The one that does execute will\
    \ be the first case condition to return True. Thus if a tuple of two zeros is\
    \ entered then it will be the first case condition that fires. However, if the\
    \ tuple passed in contains a 5 and a zero then it will be the third case condition\
    \ that is met and the associated action that is performed.\n\n```python\ndef locator(point):\n\
    \    match point:\n        case (0, 0):\n            print('Corner')\n       \
    \ case (0, y):\n            print(f'Left edge at x=0, y={y}')\n        case (x,\
    \ 0):\n            print(f'Top edge at x={x}, y=0')\n        case (x, y):\n  \
    \          print(f'Point in grid at x={x}, y={y}')\n        case _:\n        \
    \    raise ValueError('Not a point tuple')\n```\n\nThis function can be used by\
    \ passing in a tuple as a parameter, for example:\n\n```python\ncursor = (0, 0)\n\
    locator(cursor)\ncursor = (0, 10)\nlocator(cursor)\ncursor = (10, 0)\nlocator(cursor)\n\
    cursor = (10, 5)\nlocator(cursor)\n```\n\nThe output from this code snippet is:\n\
    \n```\nCorner\nLeft edge at x=0, y=10\nTop edge at x=10, y=0\nPoint in grid at\
    \ x=10, y=5\n```\n\n## 41.7 Structural Matching and Lists\n\nIt is also possible\
    \ to use lists with the match statement (they are also sequences/ containers).\
    \ Again it is possible to extract one or more values from the list:\n\n```python\n\
    def banking_operation1(action):\n    match action:\n        case ['balance']:\n\
    \            print('Getting the balance')\n        case ['deposit', amount]:\n\
    \            print(f'Depositing {amount}')\n        case ['withdraw', amount]:\n\
    \            print(f'Withdrawing {amount}')\n```\n\nIn the above example their\
    \ action passed into the function is expected to be a list. Each of the case conditions\
    \ checks for a particular pattern and in two cases extracts a value:\n\n- The\
    \ first case condition checks for a list containing a single string 'balance'.\n\
    - The second case condition checks for a list containing two values where the\
    \ first value is the string 'deposit' and the second value will be extracted and\
    \ stored in the variable amount. This can then be used in the body of the case\
    \ condition.\n- The third case condition looks for a list containing the string\
    \ 'withdraw' and a second value which will be extracted into the variable amount\
    \ which will then be available in the body of the case condition.\n\nThis function\
    \ can be used by passing in a list of values when the function is invoked, for\
    \ example:\n\n```python\nbanking_operation1(['balance'])\nbanking_operation1(['deposit',\
    \ 12.55])\nbanking_operation1(['withdraw', 9.99])\n```\n\nThe output from this\
    \ code snippet is:\n\n```\nGetting the balance\nDepositing 12.55\nWithdrawing\
    \ 9.99\n```\n\nWe can be a little bit more flexible than this by indicating that\
    \ a case condition can match on a list containing one or many values. This is\
    \ done by preceding the variable name to be used for the extraction with an asterisk.\
    \ This indicates that this variable will be a container that will contain zero\
