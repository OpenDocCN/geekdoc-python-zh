  md: 'In the above example we have used:


    +   - `copy` returns a new instance of the frozenset containing the same members
    as the original.

    - `union` returns the union of frozensets as a new frozenset.

    - `intersection` returns those members in both frozensets as a frozenset.

    - `difference` returns members that are not in either of the frozensets as a frozenset.

    - `issubset` returns `True` of `False` depending upon whether the receiving frozensets''
    members are fully contained within the second frozenset.


    In addition there is


    +   - `issuperset` which indicates whether the receiving frozenset contains all
    the members of the second frozenset.

    - `isdisjoint` returns `True` if the two frozensets have no members in common.
    Otherwise returns `False`.

    - `symmetric_difference` Return the symmetric difference of two frozensets as
    a new frozenset.


    # 35.5 Using Frozensets with Sets


    The most common usage of a frozenset is when wanting to place a set within a set
    (that is to nest sets).

    It is possible to hold any *immutable* object within a set. This means that a
    set can contain a reference to a tuple (as that is immutable). We can thus write:


    ```

    s1 = { (1, 2, 3)}

    print(s1)

    ```


    This prints out


    ```

    {(1, 2, 3)}

    ```


    However, we cannot nest lists or other sets within a set as these are not immutable
    types. The following would both generate a runtime error in Python:


    ```

    # Can''t have the following

    s2 = { {1, 2, 3} }

    print(s2)


    s3 = { [1, 2, 3] }

    print(s3)

    ```'
