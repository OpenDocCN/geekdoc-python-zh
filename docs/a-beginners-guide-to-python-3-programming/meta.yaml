  md: '# Chapter 11

    Introduction to Structured Analysis


    # 11.1 Introduction


    In the preceding chapters what we have seen is typical of the procedural approach
    to programming. In the next chapter we will begin to explore the definition of
    functions which allow a more modular style of programming.

    In this chapter we will introduce an approach to the analysis and design of software
    systems called structured analysis/design. Within this area there are many specific
    and well-documented methods including Structured Systems Analysis and Design Method
    (SSADM) and the Yourden structured method. However, we will not focus on any one
    specific approach; instead we will outline the key ideas and the two basic elements
    of most structured analysis methods: functional decomposition and data flow analysis.
    We will then present flowcharts for designing algorithms.


    # 11.2 Structured Analysis and Function Identification


    The structured analysis methods typically employ a process-driven approach (with
    a set of prescribed steps or stages) which in one way or another consider what
    the inputs and outputs of the system are and how those inputs are transformed
    into the outputs. This transformation involves the application of one or more
    functions. The steps involved in structured analysis identify these functions
    and will typically iteratively break them down into smaller and smaller functions
    until an appropriate level of detail has been reached. This process is known as
    functional decomposition.

    Although simple Python programs may only contain a sequence of statements and
    expressions, any program of a significant size will need to be structured such
    that it can be:


    +   - understood easily by other developers,

    - tested to ensure that it does what is intended,

    - maintained as new and existing requirements evolve,'
  merge: -1
  pgno: 145
- img_proc: true
  md: '+   - debugged to resolve unexpected or undesirable behaviour.


    Given these requirements it is common to want to organize your Python program
    in terms of functions and sub functions. Functional decomposition supports the
    analysis and identification of these functions.


    # 11.3 Functional Decomposition


    Functional decomposition is one way in which a system can be broken down into
    its constituent parts. For example, for a computer payroll system to calculate
    how much an hourly paid employee should receive it might be necessary to:


    +   1. load the employee’s details from some form of permanent storage (such as
    a file or a database),

    2. load how many hours the employee has worked for that week (possibly from another
    system that records the number of hours worked),

    3. multiple the hours worked by the employee’s hourly rate,

    4. record how much the employee is to be paid in a payroll database or file,

    5. print out the employee’s pay slip,

    6. transfer the appropriate funds from the company’s bank account to the employees
    bank account,

    7. record in the payroll database the everything has been completed.


    Each of the above steps could represent a function performed by the system. These
    top-level functions could themselves be broken down into lower-level functions.
    For example, printing out the employees payroll slip may involve printing their
    name and address in a particular format, printing the employee number, social
    security number, etc., as well as printing historical information such as how
    much they have been paid in the current financial year, how much tax they have
    paid, all in addition to printing the actual amount they are being paid. This
    process of breaking down higher-level functions into lower-level functions helps
    with:


    +   - testing the system (functions can be tested in isolation),

    - understanding the system as the organization of the functions can give meaning
    to the code, as well as allowing each function to be understood in isolation from
    the rest of the system,

    - maintaining the system as only those functions that need to be changed may be
    affected by new or modified requirements,

    - debugging the system as issues can be isolated to specific functions which can
    be examined independently of the rest of the application.'
  merge: -1
  pgno: 146
