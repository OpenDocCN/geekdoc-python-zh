    This function takes a single parameter which we have called `self`. It then uses
    this parameter to reference an attribute called `data` which itself uses `len()`
    to return the length of the associated data items.


    At present this function has no relationship to the `Bag` class other than the
    fact that it assumes that whatever is passed into it will have an attribute called
    `data`—which the `Bag` class does.


    In fact, the `get_length()` function is compatible with any class that has an
