  md: 'The class method can be accessed by *prefixing* it with the name of the class
    and using the *dot notation* to indicate which method to call. This is illustrated
    in the body of the `__init__()` method.


    # 20.3.1 *Why Class-Side Methods?*


    It may at first seem unclear what should normally go in an instance method as
    opposed to what should go in a class method. After all, they are both defined
    in the class. However, it is important to remember that


    +   - Instance methods define the behaviour of the instance or object

    - Class methods define the behaviour of the class.


    Class-side methods should only perform one of the following roles:


    +   - *Instance creation* This role is very important as it is how you can use
    a class as a factory for objects and can help hide a whole load of set up and
    instantiation work.

    - *Answering enquiries about the class* This role can provide generally useful
    objects, frequently derived from class variables. For example, they may return
    the number of instances of this class that have been created.

    - *Instance management* In this role, class-side methods control the number of
    instances created. For example, a class may only allow a single instance of the
    class to be created; this is termed a singleton class. Instance management methods
    may also be used to access an instance (e.g., randomly or in a given state).

    - *Examples* Occasionally, class methods are used to provide helpful examples
    which explain the operation of a class. This can be very good practice.

    - *Testing* Class-side methods can be used to support the testing of an instance
    of a class. You can use them to create an instance, perform an operation and compare
    the result with a known value. If the values are different, the method can report
    an error. This is a very useful way of providing regression tests.

    - *Support* for one of the above roles


    Any other tasks should be performed by an instance method.


    # 20.4 Static Methods


    There is one more type of method that can be defined on a class; these are *static
    methods*.

    Static methods are defined within a class but are not tied to either the class
    nor any instance of the class; they do not receive the special first parameter
    representing either the class (`cls` for class methods) or the instances (`self`
    for instance methods).'
  merge: -1
