    - 函数使用其名称后跟圆括号 '()' 来调用或执行，根据函数的定义，可以带参数也可以不带参数。\n\n这意味着我们可以编写如下所示的 `get_msg`\
    \ 函数：\n\n```python\ndef get_msg():\n    return 'Hello Python World!'\n```\n\n\
