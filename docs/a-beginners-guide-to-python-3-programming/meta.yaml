    \    print('Sorry - you loose')\n    print('The number you needed to guess was',\n\
    \          number_to_guess)\nprint('Game Over')\n```\n\n## 9.5 The Complete Listing\n\
    \nFor ease of reference the complete listing is provided below:\n\n```\nimport\
