  md: '# Chapter 1

    Introduction


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_27_0.png)


    # 1.1 What is Python?


    Python is a general-purpose programming language in a similar vein to other programming
    languages that you might have heard of such as C++ , JavaScript or Microsoft’s
    C# and Java.


    It has been around for some considerable time having been originally conceived
    back in the late 1980s by Guido van Rossum at Centrum Wiskunde and Informatica
    (CWI) in the Netherlands. The language is named after one of Guido’s favorite
    programs “Monty Pythons Flying Circus”, a classic and somewhat anarchic British
    comedy sketch show originally running from 1969 to 1974 (but which has been rerun
    on various stations ever since) and with several film spin offs. You will even
    find various references to this show in the documentation available with Python.


    As a language it has gained in interest over recent years, particularly within
    the commercial world, with many people wanting to learn the language. This increased
    interest in Python is driven by several different factors:


    +   1. Its flexibility and simplicity which makes it easy to learn.

    2. Its use by the Data Science community where it provides a more standard programming
    language than some rivals such as R.

    3. Its suitability as a scripting language for those working in the DevOps field
    where it provides a higher level of abstraction than alternative traditionally
    used languages.

    4. Its ability to run on (almost) any operating system, but particularly the big
    three operating systems Windows, MacOS and Linux.

    5. The availability of a wide range of libraries (modules) that can be used to
    extend the basic features of the language.

    6. It is free!


    Python itself is now managed by the *not-for-profit* Python Software Foundation
    (see [https://en.wikipedia.org/wiki/Python_Software_Foundation](https://en.wikipedia.org/wiki/Python_Software_Foundation))
    which was launched in March 2001. The mission of the foundation is to foster development
    of'
  merge: -1
  pgno: 27
- img_proc: true
  md: 'the Python community; it is also responsible for various processes within the
    Python community, including developing the core Python distribution, managing
    intellectual rights and supporting developer conferences including PyCon.


    # 1.2 Python Versions


    There is now one main version of Python, that is Python 3. However, until the
    start of 2020 there were two main supported versions in circulation one called
    Python 2 as well as Python 3.


    +   - Python 2 was launched in October 2000 and was very widely used. Support
    for this version of Python ended on the 1st of January 2020. However, you will
    still find examples of code, libraries and tutorials that focus on this version
    of the language. This is particularly true of the web so be careful when browser
    for examples or help—make sure they relate to Python 3. The more current the article
    or suggestion you are looking the more likely that it is Python 3.

    - Python 3 was launched in December 2008 and is a major revision to the language
    that is not backward compatible. It is current the most widely used version of
    the language and represents the version we will use throughout this book.


    The issue between the two versions can be highlighted by the simple print facility:


    +   - In Python 2 this is written as print ‘Hello World’

    - In Python 3 this is written as print(‘Hello World’)


    It may not look like much of a difference but the inclusion of the ‘()’ marks
    a major change and means that any code written for one version of Python will
    probably not run on the other version. There are tools available, such as the
    2–3 utility, that will (partially) automate translation from Python 2 to Python
    3 but in general you are still left with significant work to do.


    A survey of Python Developers carried out by JetBrains (the organization behind
    the PyCharm editor) in 2022 found that only 2% of developers now claimed to be
    using a Python 2.x version, with 2% unsure which version they used. The rest (96%)
    were using a version of the 3.x line mostly 3.8, 3.9 or 3.10. This survey was
    completed before 3.11 was made available, and this over 70% of developers were
    using one of the three most recent versions of Python. For more information see
    https://www.jetbrains.com/lp/devecosystem-2022/python/.


    Python 3 is the future of the Python language, and it is this version that has
    introduced many of the new and improved language and library features (that have
    admittedly been back ported to Python 2 in many cases). This book is solely focused
    on Python 3.


    In the remainder of this book when we refer to Python we will always be referring
    to Python 3. Since then there have been numerous point and sub point releases,
    for example, as well as Python 3.1, 3.2, etc. there have also been intermediate
    releases such as 3.1.1, 3.1.2, etc.'
  merge: -1
