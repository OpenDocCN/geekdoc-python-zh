    ## 6.8 Assignment Operators


    In Chapter 3 we briefly introduced the assignment operator (`=`) which was used
    to assign a value to a variable. There are in fact several different assignment
    operators that could be used with numeric values.


    These assignment operators are actually referred to as *compound operators* as
    they combine together a numeric operation (such as add) with the assignment operator.
    For example, the `+=` compound operator is a combination of the add operator and
    the `=` operator such that


    ```

    x = 0

    x += 1 # has the same behaviour as x = x + 1

    ```


    Some developers like to use these compound operators as they are more concise
    to write and can be interpreted more efficiently by the Python interpreter.


    The following table provides a list of the available compound operators.


    | Operator | Description | Example | Equivalent |

    | :--- | :--- | :--- | :--- |

    | += | Add the value to the left-hand variable | x += 2 | x = x + 2 |

    | -= | Subtract the value from the left-hand variable | x -= 2 | x = x - 2 |

    | *= | Multiply the left-hand variable by the value | x *= 2 | x = x * 2 |

    | /= | Divide the variable value by the right-hand value | x /= 2 | x = x / 2
    |

    | //= | Use integer division to divide the variable''s value by the right-hand
    value | x //= 2 | x = x // 2 |

    | %= | Use the modulus (remainder) operator to apply the right-hand value to the
    variable | x %= 2 | x = x % 2 |

    | **= | Apply the power of operator to raise the variable''s value by the value
    supplied | x **= 3 | x = x ** 3 |


    ## 6.9 None Value


    Python has a special type, the `NoneType`, with a single value, `None`.

    This is used to represent null values or *nothingness*.

    It is not the same as `False`, or an empty string or `0`; it is a *non-value*.
    It can be used when you need to create a variable but don''t have an initial value
    for it. For example:


    ```

    winner = None

    ```


    You can then test for the presence of `None` using `is` and `is not`, for example:


    ```

    print(winner is None)

    ```


    This will print out `True` if and only if the variable `winner` is currently set
    to `None`.

    Alternatively you can also write:


    ```

    print(winner is not None)

    ```


    Which will print out `True` only if the value of `winner` is *not* `None`.

    Several example software using the value `None` and the `is` and `is not` operators
    are given below:


    ```

    winner = None

    print(''winner:'', winner)

    print(''winner is None:'', winner is None)

    print(''winner is not None:'', winner is not None)

    print(type(winner))

    print(''Set winner to True'')

    winner = True

    print(''winner:'', winner)

    print(''winner is None:'', winner is None)

    print(''winner is not None:'', winner is not None)

    print(type(winner))

    ```


    The output of this code snippet is:


    ```

    winner: None

    winner is None: True

    winner is not None: False

    <class ''NoneType''>

    Set winner to True

    winner: True

    winner is None: False

    winner is not None: True

    <class ''bool''>

    ```


