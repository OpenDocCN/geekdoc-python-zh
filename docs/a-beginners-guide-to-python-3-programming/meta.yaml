  md: 'This makes the programmer more productive, removes problems due to poor memory
    management and, when implemented efficiently, can still provide acceptable performance.


    Python therefore provides automatic memory management. Essentially, it allocates
    a portion of memory as and when required. When memory is short, it looks for areas
    which are no longer referenced. These areas of memory are then freed up (deallocated)
    so that they can be reallocated. This process is often referred to as *Garbage
    Collection*.


    # 19.13 Intrinsic Attributes


    Every class (and every object) in Python has a set of *intrinsic* attributes set
    up by the Python runtime system. Some of these intrinsic attributes are given
    below for classes and objects.


    Classes have the following intrinsic attributes:


    +   - `__name__` the name of the class

    - `__module__` the module (or library) from which it was loaded

    - `__bases__` a collection of its base classes (see inheritance later in this
    book)

    - `__dict__` a dictionary (a set of key-value pairs) containing all the attributes
    (including methods)

    - `__doc__` the documentation string


    For objects:


    +   - `__class__` the name of the class of the object

    - `__dict__` a dictionary containing all the object''s attributes


    Notice that these intrinsic attributes all start and end with a double underbar—this
    indicates their special status within Python.


    An example of printing these attributes out for the class `Person` and a instance
    of the class are shown below:


    ```

    print(''Class attributes'')

    print(Person.__name__)

    print(Person.__module__)

    print(Person.__doc__)

    print(Person.__dict__)

    print(''Object attributes'')

    print(p1.__class__)

    print(p1.__dict__)

    ```


    The output from this is:


    ```

    Class attributes

    Person

    __main__

    An example class to hold a persons name and age

    ```'
