    \ = items\n\n    def __len__(self):\n        return len(self.items)\n```\n\nNow\
    \ when we rerun the code the output of the print statement is\n\n```\nlen(bag1):\
    \ 0\n```\n\nAnd no error is raised.\n\n# 28.7 The Sequence Protocol\n\nThere are\
    \ numerous commonly occurring protocols that can be found in Python. For example,\
    \ there is a protocol for defining sequences, such as a container that can be\
    \ accessed an item at a time.\n\nThis protocol requires that any type that will\
    \ be held in the container must provide the __len__() and __getitem__() methods.\n\
    \nThus any class that implements these two methods meets the requirements of the\
    \ protocol.\n\nHowever, because protocols are informal and unenforced in Python\
    \ it is not actually necessary to implement all the methods in a protocol. For\
    \ example, if it is known that a class will only be used with iteration then it\
    \ may only be necessary to implement the __getitem__() method."
