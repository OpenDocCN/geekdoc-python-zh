  md: "over. We can use this as the base class for our own type of collection which\
    \ we will call a Bag, for example:\n\n```\nfrom collections import MutableSequence\n\
    \nclass Bag(MutableSequence) :\n    pass\n```\n\nIn this example we are importing\
    \ the MutableSequence from the collections module. We then define the class Bag\
    \ as extending the MutableSequence Abstract Base Class. For the moment we are\
    \ using the special Python keyword pass as a place holder for the body of the\
    \ class.\n\nHowever, this means that the Bag class is actually also an abstract\
    \ class as it does not implement any of the abstract methods in the MutableSequence\
    \ ABC.\n\nPython, however, does not validate this at import time; instead it validates\
    \ it at runtime when an instance of the type is to be created.\n\nIn this case,\
    \ the Bag class does not implement the abstract methods in MutableSequence and\
    \ thus if a program attempts to create an instance of Bag, then the following\
    \ error would be raised:\n\n```\nTraceback (most recent call last):\n  File \"\
    /pythonintro/abstract/Bag.py\", line 10, in <module>\n    main()\n  File \"/pythonintro/abstract/Bag.py\"\
    , line 7, in main\n    bag = Bag()\nTypeError: Can't instantiate abstract class\
    \ Bag with abstract methods __delitem__, __getitem__, __len__, __setitem__, insert\n\
    ```\n\nAs can be seen this is a rather more formal requirement than we saw with\
    \ protocols; if you don't implement all the methods defined as abstract in the\
    \ parent class then you can't create an instance of the class you are defining\
    \ (because it is also abstract).\n\nWe can define a method for each of the abstract\
    \ classes in the Bag class and then we will be able to create an instance of the\
    \ class, for example:\n\n```\nfrom collections import MutableSequence\n\nclass\
    \ Bag(MutableSequence) :\n\n    def __getitem__(self, index) :\n        pass\n\
    \n    def __delitem__(self, index) :\n        pass\n\n    def __len__(self) :\n\
