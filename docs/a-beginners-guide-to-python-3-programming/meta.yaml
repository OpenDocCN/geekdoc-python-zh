    \ is\n\n```\nmultiple exceptions occurred\n    (ValueError('incorrect value'),\
    \ ValueError('not a positive value'), FileNotFoundError('Unknown file data.txt'),\
    \ AttributeError('date'))\n```\n\nAnd the program does not crash, note that the\
    \ exceptions property contains a tuple of the exceptions.\n\nHowever, if we now\
    \ wish to do something specific depending upon whether there was a ValueError\
    \ in the list of exceptions of not we would need to handle the list of exceptions\
    \ ourselves and see if one of them was a ValueError, etc.\n\nIn Python 3.11 a\
    \ new except* keyword was added. This keyword can match exceptions that are within\
    \ an ExceptionGroup. We could therefore look to see what exceptions are within\
    \ the ExceptionGroup and perform different actions depending upon the members\
    \ of the group. For example:\n\n```\ntry:\n    do_something()\nexcept* ValueError\
    \ as exp_group:\n    print('ValueErrors:')\n    print(exp_group.exceptions)\n\
    except* FileNotFoundError as exp_group:\n    print('FileNotFoundErrors:')\n  \
    \  for e in exp_group.exceptions:\n        print(e)\nexcept* AttributeError as\
    \ exp_group:\n    print('AttributeError')\n    print(exp_group.exceptions)\n```\n\
    \nIn this example we are handling the ValueErrors, FileNotFoundError and the AttributeError\
    \ separately. Note that the result of matching on a particular exception/error\
    \ type is another ExceptionGroup containing one or more exceptions in it. Thus\
    \ the first except* ValueError will generate an ExceptionGroup with two exceptions\
    \ in it. In turn the except* FileNotFoundError will generate an ExceptionGroup\
    \ with one exception in it and so on.\n\nThe output from this program is therefore\n\
    \n```\nValueErrors:\n    (ValueError('incorrect value'), ValueError('not a positive\
    \ value'))\nFileNotFoundErrors:\n    Unknown file data.txt\nAttributeError\n```"
