- img_proc: true
  md: 'In many cases, the two situations go together. Typically, the aspects of the
    class to be defined as abstract are specific to each class, while what has been
    implemented is common to all classes.


    # 25.3 Abstract Base Classes in Python


    Abstract Base Classes (or ABCs as they are sometimes referred to) cannot be instantiated
    themselves but can be extended by subclasses. These subclasses can be concrete
    classes or can themselves be Abstract Base Classes (that extend the concept defined
    in the root Abstract Base Class).


    Abstract Base Classes can be used to define generic (potentially abstract) behaviour
    that can be mixed into other Python classes and act as an abstract root of a class
    hierarchy. They can also be used to provide a more formal way of specifying behaviour
    that must be provided by a concrete class.


    Abstract Base Classes can have:


    +   - Zero or more abstract methods or properties (but are not required to)

    - Zero or more concrete methods and properties.

    - Both *private* and *protected* attributes (following the single underscore and
    double underscore conventions).


    ABCs can also be used to specify a specific interface or formal protocol. If an
    ABC defines any abstract methods or abstract properties, then the subclasses must
    provide implementations for all such abstract elements.


    There are many built-in ABCs including (but not limited to):


    +   - Data structures (`collection` module),

    - Numbers module,

    - Streams (IO module).


    In fact, ABCs are widely used internally within Python itself, and many developers
    use ABCs without ever knowing they exist or understanding how to define them.


    Indeed, ABCS are not widely used by developers building systems with Python although
    this is in part because they are most appropriate to those building libraries,
    particularly those that are expected to be extended by developers themselves.


    # 25.3.1 Subclassing an ABC


    Typically, an Abstract Base Class will need to be imported from the module in
    which it is defined; of course, if the ABC is defined in the current module then
    this will not be necessary.


    As an example, the `collections.MutableSequence` class is an ABC; this is an ABC
    for a sequence of elements that can be modified (mutable) and iterated'
