- md: "## 45.13 Mistake #11: Sets Can Only Contain Immutable Objects\n\nIt is possible\
    \ to hold any *immutable* object within a set. This means that a Set can contain\
    \ a reference to a Tuple (as that is *immutable*). We can declare a Set literal\
    \ using the {} brackets. We can thus write\n\n```\ns1 = { (1, 2, 3) }\nprint(s1)\n\
    ```\n\nThis prints out\n\n```\n{(1, 2, 3)}\n```\n\nHowever, we cannot nest lists\
    \ or other sets within a set as these are not *immutable* types. The following\
    \ would both generate a runtime error in Python:\n\n```\n# Can't have the following\n\
    s2 = { {1, 2, 3} }\nprint(s2)\n\ns3 = { [1, 2, 3] }\nprint(s3)\n```\n\nTo solve\
    \ this problem, we can use Frozensets and Tuples. That is we can use Frozensets\
    \ to nest one Set inside another. A Frozenset is exactly like a Set except that\
    \ it is *immutable* and thus it can be nested within a Set. A Set can be converted\
    \ into a Frozenset using the `frozenset()` constructor function. For example:\n\
    \n```\n# Need to convert sets into frozensets\ns2 = { frozenset({1, 2, 3}) }\n\
    print(s2)\n```\n\nFor lists we can convert a list into a tuple to add them to\
    \ a set, for example:\n\n```\ns3 = { tuple([1, 2, 3]) }\nprint(s3)\n```\n\n##\
    \ 45.14 Mistake #12: Local Versus Global Variables\n\nGlobal variables can be\
    \ referenced from within a function. For example:\n\n```\nmax = 100\n\ndef print_max():\n\
    \    print(max)\nprint_max()\n```\n\nThis prints out the value 100. However, if\
    \ Python thinks you are declaring a *new local variable* that just happens to\
    \ have the same name as a *global* variable it will create a local version which\
    \ will **shadow** the global one. For example:\n\n```\nmax = 100\ndef print_max():\n\
    \    max = 95\n    print(max)\n\nprint_max()\nprint(max)\n```\n\nThe output from\
    \ this is\n\n```\n95\n100\n```\n\nHowever, if you wish to modify the global variable\
    \ inside the function, for example as is done below:\n\n```\nmax = 100\ndef print_max():\n\
    \    max = max + 1\n    print(max)\n\nprint_max()\n```\n\nThen when we try to\
    \ run this code, we will get a runtime error:\n\n```\nTraceback (most recent call\
    \ last):\n  File \"main.py\", line 101, in <module>\n    print_max()\n  File \"\
    main.py\", line 98, in print_max\n    max = max + 1\nUnboundLocalError: local\
    \ variable 'max' referenced before assignment\n```\n\nThis is because the variable\
    \ max is local to the function, and there does not have a value assigned to when\
    \ we try to access it to add 1 to the current max.\nWhy does it do this? To protect\
    \ us from ourselves—Python is really saying ‘Do you really want to modify a global\
    \ variable here?’ Instead, it is treating max as a local variable and as such\
    \ it is being referenced before a value has been assigned to it.\nTo tell Python\
    \ that we know what we are doing and that we want to reference the global variable\
    \ at this point we need to use the keyword global with the name of the variable.\
    \ For example:\n\n```\nmax = 100\n\ndef print_max():\n    global max\n    max\
    \ = max + 1\n    print(max)\n\nprint_max()\nprint(max)\n```\n\nNow when we try\
    \ to update the variable max inside the function print_max(), Python knows we\
    \ mean the global version of the variable and uses that one. The result is that\
    \ we now print out the value 101 and max is updated to 101 for everyone everywhere!\n\
    \n## 45.15 Mistake #13: Referencing Nonlocal Variable\n\nIt is possible to define\
    \ functions inside other functions, and this can be very useful when we are working\
    \ with collections of data and operations such as `map()` (which maps a function\
    \ to all the elements of a collection in turn).\n\nHowever, local variables are\
    \ local to a specific function; even functions defined within another function\
    \ cannot modify the outer functions local variable (as the inner function is a\
    \ separate function). They can reference it, just as we could reference the global\
    \ variable earlier; the issue is again modification.\n\nThe `global` keyword is\
    \ no help here as the outer function's variables are not global, they are local\
    \ to a function.\n\nFor example, if we define a nested function (inner) inside\
    \ the parent outer function (outer) and want the inner function to modify the\
    \ local field we have a problem:\n\n```\ndef outer():\n    title = 'original title'\n\
    \n    def inner():\n        title = 'another title'\n        print('inner:', title)\n\
    \n    inner()\n    print('outer:', title)\n\nouter()\n```\n\nIn this example both\
    \ `outer()` and `inner()` functions modify the `title` variable. However, they\
    \ are not the same `title` variable and as long as this is what we need then that\
    \ is fine; both functions have their own version of a `title` local variable.\n\
    \nThis can be seen in the output where the `outer` function maintains its own\
    \ value for title:\n\n```\ninner: another title\nouter: original title\n```\n\n\
    However, if what we want is for the `inner()` function to modify the `outer()`\
    \ function's `title` variable then we have a problem.\n\nThis problem can be solved\
    \ using the `nonlocal` keyword. This indicates that a variable is not global but\
    \ is also not local to the current function and Python should look within the\
    \ scope in which the function is defined to find a local variable with the same\
    \ name:\n\nIf we now declare `title` as nonlocal in the `inner()` function, then\
    \ it will use the `outer()` functions version of `title` (it will be shared between\
    \ them) and thus when the `inner()` function changes the `title` it will change\
    \ the it for both functions:\n\n```\ndef outer():\n    title = 'original title'\n\
    \n    def inner():\n        nonlocal title\n        title = 'another title'\n\
    \        print('inner:', title)\n    inner()\n    print('outer:', title)\nouter()\n\
    ```\n\nThe result of running this is\n\n```\ninner: another title\nouter: another\
    \ title\n```\n\n## 45.16 Mistake #14: Copying a Mutable Type\n\nCare needs to\
    \ be taken when assigning a mutable type from one variable to another. For example,\
    \ a `List` is a mutable type. When you assign a `List` from one variable to another\
    \ you actually assign a reference to the `List` from one variable to another.\
    \ This means that both variables will reference (point to) the same list. Thus,\
    \ if the contents of the list are modified via one variable, then it will also\
    \ be modified for the other variable. For example:\n\n```\ndata1 = [1, 2, 3, 4]\n\
    data2 = data1\ndata2.append(5)\nprint(data1)\n```\n\nThis produces the following\
    \ output:\n\n```\n[1, 2, 3, 4, 5]\n```\n\nTo avoid this, you can create a *copy*\
    \ of the original list. This will create a new list and copy the values the original\
    \ list contains over to the new list. For example:\n\n```\ndata1 = [1, 2, 3, 4]\n\
    data2 = data1.copy()\ndata2.append(5)\nprint(data1)\n```\n\nNow the output from\
    \ this is\n\n```\n[1, 2, 3, 4]\n```\n\nIf the list contains elements that can\
    \ themselves hold values you may want to use a `deepcopy()` for example `data1.deepcopy()`.\n\
    \n# Chapter 46\nTicTacToe Game\n\n## 46.1 Introduction\n\nIn this chapter we will\
    \ explore the creation of a simple TicTacToe (or Noughts and Crosses) game using\
    \ an Object-Oriented approach. This example utilizes\n\n- Python classes, methods\
    \ and instance variables/attributes.\n- Abstract Base Classes and an abstract\
    \ method.\n- Python properties.\n- Python lists.\n- A simple piece of game playing\
    \ logic.\n- While loops, for loops and if statements for flow of control behaviour.\n\
    \nThe aim of the game is to make a line of 3 counters (either X or O) across a\
    \ 3 by 3 grid. Each player takes a turn to place a counter. The first player to\
    \ achieve a line of three (horizontal, vertically or diagonally) wins.\n\n## 46.2\
    \ Classes in the Game\n\nWe will begin by identifying the key classes in the game.\
    \ Note that there is not necessarily a right or wrong answer here; although one\
    \ set of classes may be more obvious or easier to understand than another.\nIn\
    \ our case we will start with what data we will need to represent for our TicTacToe\
    \ game as recommended back in the ‘Introduction to Object Orientation’ chapter.\n\
    Our key data elements include\n\n- the TicTacToe board itself,\n- the players\
    \ involved in the game (both computer and human),\n- the state of the game, i.e.,\
    \ whose go it is and whether someone has won,"
  mdcn: "## 45.13 错误 #11：集合只能包含不可变对象\n\n集合中可以容纳任何*不可变*对象。这意味着一个集合可以包含对元组的引用（因为元组是*不可变*的）。我们可以使用\
