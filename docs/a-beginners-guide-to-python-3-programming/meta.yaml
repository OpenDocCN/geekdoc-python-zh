  md: 'The instantiation hierarchy relates to instances or objects rather than classes
    and is important during the execution of the object.


    There are two types of instance relationships: one indicates a *part-of* relationship,
    while the other relates to a *using* relationship (it is referred to as an *is-a*
    relationship). This is illustrated below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_253_0.png)


    The difference between an *is-a* relationship and a *part-of* relationship is
    often confusing for new programmers (and sometimes for those who are experienced
    in non object-oriented languages). The above figure illustrates that a Student
    *is-a* type of Person whereas an Engine is *part-of* a Car. It does not make sense
    to say that a student is part-of a person or that an engine is-a type of car!


    In Python, *inheritance* relationships are implemented by the sub-classing mechanism.
    In contrast, part-of relationships are implemented using instance attributes in
    Python.


    The problem with classes, inheritance and is-a relationships is that on the surface
    they appear to capture a similar concept. In the following figure the hierarchies
    all capture some aspect of the use of the phrase *is-a*. However, they are all
    intended to capture a different relationship.


    The confusion is due to the fact that in modern English we tend to overuse the
    term *is-a*. For example, in English we can say that an Employee is a type of
    Person or that Andrew is a Person; both are semantically correct. However, in
    Python classes such as Employee and Person and an object such as Andrew are different
    things. We can distinguish between the different types of relationship by being
    more precise about our definitions in terms of a programming language, such as
    Python.'
