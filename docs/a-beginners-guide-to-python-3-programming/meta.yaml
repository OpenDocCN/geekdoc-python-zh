  md: 'situations (as they do not have unexpected side effects). It should also be
    easier to develop, test and maintain such functions.


    +   3. **Recursion is a natural control structure.** Functional languages tend
    to emphasize recursion as a way of processing structures that would use some form
    of looping constructs in an imperative language. Although you can typically implement
    recursion in imperative languages, it is often easier to do in functional languages.
    It is also worth noting that although recursion is very expressive and a great
    way for a programmer to write a solution to a problem, it is not as efficient
    at runtime as iteration. However, any expression that can be written as a recursive
    routine can also be written using looping constructs. Functional Programming languages
    often incorporate *tail end recursive optimizations* to convert recursive routines
    into iterative ones at runtime. A util end recursive function is one in which
    the last thing a function does before it returns to call itself. This means that
    rather than actually invoking the function and having to set up the context for
    that function, it should be possible to reuse the current context and to treat
    it in an iterative manner as a loop around that routine. Thus the programmer benefits
    from the expressive recursive construct and the runtime benefits of an iterative
    solution using the same source code. This option is typically not available in
    imperative languages.


    +   4. **Good for prototyping solutions.** Solutions can be created very quickly
    for algorithmic or behaviour problems in a functional language, thus allowing
    ideas and concepts to be explored in a rapid application development style.


    +   5. **Modular functionality.** Functional Programming is modular in terms of
    functionality (where object-oriented languages are modular in the dimension of
    components). They are thus well suited to situations where it is natural to want
    to reuse or componentize the *behaviour* of a system.


    +   6. **The avoidance of state-based behaviour.** As functions only rely on their
    inputs and outputs (and avoid accessing any other stored state) they exhibit a
    cleaner and simpler style of programming. This avoidance of state-based behaviour
    makes many difficult or challenging areas of programming simpler (such as those
    in concurrent applications).


    +   7. **Additional control structures.** A strong emphasis is on additional control
    structures such as pattern matching, managing variable scope, tail recursion optimizations,
    etc.


    +   8. **Concurrency and immutable data.** As Functional Programming systems advocate
    immutable data structures it is simpler to construct concurrent systems. This
    is because the data being exchanged and accessed is immutable. Therefore, multiple
    executing thread or processes cannot affect each other adversely. The Akka Actor
    model builds on this approach to provide a very clean model for multiple interacting
    concurrent systems.


    +   9. **Partial evaluation.** Since functions do not have side effects, it also
    becomes practical to bind one or more parameters to a function at compile time
    and to reuse these functions with bound values as new functions that take fewer
    parameters.'
