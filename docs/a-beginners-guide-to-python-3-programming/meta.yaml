  md: '![](img/bf6e2b02eb6625321d9af5664cea2d5d_152_0.png)


    The meaning of these symbols is given below:


    +   - **Terminal.** This symbol is used to indicate the start or end of a program
    or subprocess. They usually contain the words ‘Start’, ‘End’ or ‘Stop’ or a phrase
    indicating the start or end of some process such as ‘Starting Print Run’.

    - **Process.** This symbol represents one or more operations (or programming statements/expressions)
    that in some way apply behaviour or change the state of the system. For example
    they may add two numbers together, run some form of calculation or change a Boolean
    flag, etc.

    - **Decision.** This represents a decision point in the algorithm; that is it
    represents a decision point which will alter the flow of the program (typically
    between two different paths). The decision point is often represented as a question
    with a ‘yes’/‘no’ response, and this is indicated on the flowchart by the use
    of ‘yes’ (or ‘y’) and ‘no’ (or ‘n’) labels on the flowchart. In Python this decision
    point may be implemented using an if statement.

    - **Input/Output.** This box indicates the input or output of data from the algorithm.
    This might represent obtaining input data from the user or printing out results
    to the user.

    - **Flow.** These arrows are used to represent the algorithms order of execution
    of the boxes.

    - **Predefined Process.** This represents a process that has been defined elsewhere.

    - **Stored Data.** Indicates that data is stored in some form of persistent storage
    system.

    - **Off page connector.** A labeled connector for use when the target is on another
    page (another flowchart).


