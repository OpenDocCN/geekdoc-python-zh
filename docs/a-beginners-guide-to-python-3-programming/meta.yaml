  md: "We will now update our Person class to use the decorators:\n\n```\nclass Person:\n\
    \    def __init__(self, name, age):\n        self._name = name\n        self._age\
    \ = age\n\n    @property\n    def age(self):\n        \"\"\" The docstring for\
    \ the age property \"\"\"\n        print('In age method')\n        return self._age\n\
    \n    @age.setter\n    def age(self, value):\n        print('In set_age method')\n\
    \        if isinstance(value, int) & value > 0 & value < 120:\n            self._age\
    \ = value\n\n    @property\n    def name(self):\n        print('In name')\n  \
    \      return self._name\n\n    @name.deleter\n    def name(self):\n        del\
    \ self._name\n\n    def __str__(self):\n        return 'Person[' + str(self._name)\
    \ + '] is ' + str(self._age)\n```\n\nNotice three important things about this\
    \ example:\n\n+   - The name of the methods is no longer a set_age and get_age;\
    \ instead both methods are now just age and the decorator distinguishes their\
    \ role. Also notice that we no longer have a separate statement that declares\
    \ the property—it is now implicit in the use of the @property decorator and the\
    \ name of the associated method.\n- The @property decorator is used to define\
    \ the name of the property (in this case age) and to define further decorators\
    \ which will be named after the property with a .setter or .deleter element e.g.\
    \ @age.setter.\n- The documentation string is now defined in the method associated\
    \ with the @property decorator (providing this documentation string is usually\
    \ considered good practice).\n\nHowever, we do not need to change the program\
    \ that used the class Person, as the interface to the class remained the same."
