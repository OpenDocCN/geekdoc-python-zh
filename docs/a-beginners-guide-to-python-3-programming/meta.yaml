  md: "We can now write:\n\n```\nperson = Person('John', 54)\nprint(person)\nprint(person.age)\n\
    print(person.name)\nperson.age = 21\nprint(person)\n```\n\nNotice how we can now\
    \ write `person.age` and `person.age = 21`; in both these cases we are accessing\
    \ the *property* age that results in the method `get_age()` and `set_age()` being\
    \ executed respectively. Thus, the setter is still protecting the update to the\
    \ underlying `_age` attribute that is actually used to hold the actual value.\n\
    \nAlso note that if a method is not provided for one of the `fget`, `fset`, `fdel`\
    \ methods then this is not an error; it merely indicates that the property does\
    \ not support that type of accessor. Thus, the *name* property is a *read_only*\
    \ property as it does not define a setter method.\n\nA delete method can be used\
    \ to release the memory associated with an attribute; in the case of an `int`\
    \ it is not required but it may be required for a more complex, user-defined type.\n\
    We could therefore write:\n\n```\ndef del_name(self):\n    del self._name\nname\
    \ = property(get_name, fdel=del_name, doc=\"A name property\")\n```\n\nNote that\
    \ we are using a keyword reference for the delete method as we have skipped the\
    \ setter and cannot therefore rely on positional arguments.\n\n# 24.5 More Concise\
    \ Property Definitions\n\nThe example shown in the previous section works but\
    \ it is still quite verbose itself; while this is on the class writers' side it\
    \ still seems somewhat heavyweight.\n\nTo overcome this a more concise option\
    \ has been available since Python 2.4. This approach uses what are known as decorators.\
    \ Decorators represent meta data (that is information about your code that the\
    \ Python interpreter can use to work out what you want it to do with certain things).\n\
    \nPython 2.6 introduced three new decorators `@property`, `@<propertyname>.setter`\
    \ and `@<propertyname>.deleter`. These decorators are added to the start of a\
    \ method definition to indicate that the method should be used to provide access\
    \ to a property (and define that property), define a setter for the property or\
    \ a deleter for the property."
