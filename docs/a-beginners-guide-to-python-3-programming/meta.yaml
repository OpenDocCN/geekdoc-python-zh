  md: "This means that one function can take another function as a parameter. Such\
    \ functions are known as higher-order functions and are one of the key constructs\
    \ in Functional Programming.\n\nThat is, a function that takes another function\
    \ as a parameter is known as a *higher-order function*.\n\nIn fact, in Python,\
    \ higher-order functions are functions that do at least one of the following (and\
    \ may do both):\n\n+   - Take one or more functions as a parameter.\n- Return\
    \ as a result a function.\n\nAll other functions in Python are *first-order* functions.\n\
    Many of the functions found in the Python libraries are higher-order functions.\
    \ It is a common enough pattern that once you are aware of it you will recognize\
    \ it in many different libraries.\n\n# 16.4.1 Higher-Order Function Example\n\n\
    As an abstract example, consider the following higher-order function `apply`.\
    \ This function (written in pseudo-code—not a real programming language) takes\
    \ an integer and a function. Within the body of the function being defined, the\
    \ function passed in as a parameter is applied to the integer parameter. The result\
    \ of the function being defined is then returned:\n\n```\ndef apply(x, function):\n\
    \    result = function(x)\n    return result\n```\n\nThe function `apply` is a\
    \ *higher-order* function because its behaviour (and its result) will depend on\
    \ the behaviour defined by another function—the one passed into it.\n\nWe could\
    \ also define a function that multiplies a number by 10.0, for example:\n\n```\n\
    def mult(y):\n    return y * 10.0\n```\n\nNow we can use the function `mult` with\
    \ the function `apply`, for example:\n\n```\napply(5, mult)\n```\n\nThis would\
    \ return the value 50.0."
