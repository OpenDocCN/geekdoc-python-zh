    \ = OperatingSystem.DEBIAN\nprint(os1 is os4)\n```\n\nAlso generates:\n\n```\n\
    True\n```\n\nWe mentioned at the start of this section that enums also support\
    \ == and != this is because they delegate their operation to is and is not. Thus\
    \ you can use either is or == and you can use is not or != to compare enums.\n\
    \n# 40.12 Integer Enumerations with IntEnum\n\nInteger-based enumerations are\
    \ so common that there is a special type called IntEnum that is provided by the\
    \ enum module. This class is useful if you need the members of your enumerations\
    \ to behave like integer numbers with comparison operators. Using IntEnum allows\
    \ your enum members to be compared using <, >, etc. which can be very useful.\n\
    \nFor example:\n\n```\nfrom enum import IntEnum\n\nclass Size(IntEnum):\n    XS\
    \ = 1\n    S = 2\n    M = 3\n    L = 4\n    XL = 5\n    XXL = 6\n\nprint(Size.XS\
    \ < Size.L)\nprint(Size.XL > Size.S)\nprint(Size.XL >= Size.S)\n```\n\nThe output\
    \ from this is:\n\n```\nTrue\nTrue\nTrue\n```"
