    \n## 36.3.2 Defaultdict 容器\n\nPython 中的标准 `dict` 容器在使用 `[]` 访问运算符尝试访问当前字典条目中不存在的键时，会抛出异常。反之，如果使用\
    \ `get()` 方法访问当前不存在的键，它将返回 `None`。\n\n第一种情况可能很危险，而第二种情况返回的可能不是一个合适的默认值（尽管第二个问题可以在\
    \ `dict` 中更改）。\n\n这就是 `collections.Defaultdict` 的用武之地。这个容器是默认字典类型的子类，提供了类似的键值对字典行为。然而，如果提供了生成默认值的函数，`Defaultdict`\
    \ 将*永远不会*引发 `KeyError`。在创建 `Defaultdict` 时，你应该指定一个用于生成默认值的函数，以便你可以自定义其行为。\n\n\
    下面展示了两个例子，一个使用 `lambda` 函数（一种非常常见的方法），另一个使用命名函数：\n\n```python\ndays = defaultdict(lambda:\
