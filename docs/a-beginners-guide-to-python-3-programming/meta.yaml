  md: '# 32.5.2 List Constructor Function


    The `list()` function can be used to construct a list from an iterable; this means
    that it can construct a list from a tuple, a dictionary or a set. It can also
    construct a list from anything that implements the iterable protocol.

    The signature of the `list()` function is


    ```

    list(iterable)

    ```


    For example:


    ```

    vowelTuple = (''a'', ''e'', ''i'', ''o'', ''u'')

    print(list(vowelTuple))

    ```


    produces


    ```

    [''a'', ''e'', ''i'', ''o'', ''u'']

    ```


    # 32.5.3 Accessing Elements from a List


    You can access elements from a list using an index (within square brackets). The
    index returns the object at that position, for example:


    ```

    list1 = [''John'', ''Paul'', ''George'', ''Ringo'']

    print(list1[1])

    ```


    This will print out the element at index 1 which is Paul (lists are indexed from
    zero so the first element is the zeroth element).

    If you use a negative index such as -1 then the index is reversed so an index
    of -1 starts from the end of the list (-1 returns the last element, -2 the second
    to last etc.).

    It is also possible to extract a slice (or sublist) from a list. This is done
    by providing a starting and end index to within the square brackets separated
    by a colon. For example [1:4] indicates a slice starting at the oneth element
    and extending up to (but not including) the fourth element. If either of the indexes
    is missed for a slice then that indicates the start or end of the list respective.

    The following illustrates some of these ideas:


    ```

    list1 = [''John'', ''Paul'', ''George'', ''Ringo'']

    print(''list1[1]:'', list1[1])

    print(''list1[-1]:'', list1[-1])

    print(''list1[1:3]:'', list1[1:3])

    print(''list[:3]:'', list1[:3])

    print(''list[1:]:'', list1[1:])

    ```'
