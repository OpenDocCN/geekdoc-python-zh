    \ completed')\nnum = int(input('Enter a number to check for: '))\nfor i in range(0,\
    \ 6):\n    if i == num:\n        break\n    print(i, ' ', end='')\nelse:\n   \
    \ print()\n    print('All iterations successful')\n```\n\n如果我们运行此代码并输入整数值 7 作为要检查的数字，则\
    \ else 块会执行，因为 for 语句中的 if 测试永远不为 True，因此循环永远不会中断，所有值都被处理：\n\n```\nOnly print\
    \ code if all iterations completed\nEnter a number to check for: 7\n0 1 2 3 4\
    \ 5\nAll iterations successful\n```\n\n但是，如果我们输入值 3 作为要检查的数字；那么当循环变量 'i' 的值为 3\
    \ 时，if 语句将为 True；因此循环只会处理值 0、1 和 2。在这种情况下，else 部分不会执行，因为并非序列中的所有值都被处理：\n\n```\n\
    Only print code if all iterations completed\nEnter a number to check for: 3\n\
    0 1 2\n```\n\n## 8.8 关于循环变量命名的说明\n\n在本书前面我们说过，变量名应该是有意义的，像 'a' 和 'b' 这样的名称通常不是一个好主意。这个规则的一个例外与\
    \ for 循环中使用的循环变量名有关。通常会发现这些循环变量被称为 'i'、'j' 等。\n\n这是一个非常常见的惯例，如果一个变量被称为 'i' 或 'j'，人们会期望它是一个循环变量。因此，\n\
    \n- 你应该考虑在循环结构中使用这些变量名，\n- 避免在其他地方使用它们。\n\n但这确实提出了一个问题，为什么是 'i' 和 'j'；答案是这一切都源于一种名为\
