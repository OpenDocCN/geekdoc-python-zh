  md: "# 26.7 Defining an Custom Exception\n\nYou can define your own errors and exceptions,\
    \ which can give you more control over what happens in particular circumstances.\
    \ To define an exception, you create a subclass of the exception class or one\
    \ of its subclasses.\n\nFor example, to define a `InvalidAgeException`, we can\
    \ extend the `Exception` class and generate an appropriate message:\n\n```\nclass\
    \ InvalidAgeException(Exception):\n    \"\"\" Valid Ages must be between 0 and\
    \ 120 \"\"\"\n```\n\nThis class can be used to explicitly represent an issue when\
    \ an age is set on a `Person` which is not within the acceptable age range.\n\n\
    We can use this with the class `Person` that we defined earlier in the book; this\
    \ version of the `Person` class defined age as a property and attempted to validate\
    \ that an appropriate age was being set:\n\n```\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self._name = name\n        self._age = age\n\n    @property\n\
    \    def age(self):\n        \"\"\" The docstring for the age property \"\"\"\n\
    \        print('In age method')\n        return self._age\n\n    @age.setter\n\
    \    def age(self, value):\n        print('In set_age method(', value, ')')\n\
    \        if isinstance(value, int) & (value > 0 & value < 120):\n            self._age\
    \ = value\n        else:\n            raise InvalidAgeException(value)\n\n   \
    \ @property\n    def name(self):\n        print('In name')\n        return self._name\n\
    \n    @name.deleter\n    def name(self):\n        del self._name\n\n    def __str__(self):\n\
    \        return 'Person[' + str(self._name) + '] is ' + self._age\n```"
