    \n请注意，`SalesPerson`类部分通过继承满足了隐含的契约（`sleep()`方法是从`Employee`继承的）。\n\n## 28.5 协议\n\
    \n如上所述，Python没有任何正式的机制来声明功能提供者和用户或消费者之间需要什么。相反，采用了一种不那么正式的方法，称为*鸭子类型*。\n\n然而，这就引出了一个问题；你怎么知道需要什么？你怎么知道必须为对象提供数值运算符才能与`Calculator`类一起使用？\n\
