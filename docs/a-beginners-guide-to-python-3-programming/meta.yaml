  md: '# Chapter 13

    Scope and Lifetime of Variables


    # 13.1 Introduction


    We have already defined several variables in the examples we have been working
    within this book. In practice, most of these variables have been what are known
    as global variables. That is they are (potentially) accessible anywhere (or globally)
    in our programs.

    In this chapter we will look again at local variable as defined within a function,
    at global variable and how they can be referenced within a function, and finally
    we will consider nonlocal variables.


    # 13.2 Local Variables


    In practice developers usually try to limit the number of global variables in
    their programs as global variables can be accessed anywhere and can be modified
    anywhere, and this can result in unexpected behaviours (and has been the cause
    of many, many bugs in all sorts of programs over the years).

    However, not all variables are global. When we define a function, we can create
    variables which are scoped only to that function and are not accessible or visible
    outside of the function. These variables are referred to as local variables (as
    they are local to the function).

    This is a great help in developing more modular code which has been proven to
    be easier to maintain and in fact develop and test.'
  merge: -1
  pgno: 174
