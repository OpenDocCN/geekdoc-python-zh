  md: '(instance) with the name Fiona, the age 48 and the address also of London and
    so on.


    An instance or object is therefore an example of a class. All instances/objects
    of a class possess the same data variables but contain their own data. Each instance
    of a class responds to the same set of requests.


    Classes allow programmers to specify the *structure* of an object (i.e., its attributes
    or fields, etc.) and the its behaviour separately from the objects themselves.


    This is important, as it would be extremely time-consuming (as well as inefficient)
    for programmers to define each object individually. Instead, they define classes
    and create *instances* or *objects* of those classes.


    They can then store related data together in a named concept which makes it much
    easier to structure and maintain code.


    # 18.3 What Are Classes for?


    We have already seen several types of data in Python such as integer, string,
    Boolean, etc. Each of these allowed us to hold a single item of data (such as
    the integer 42 or the string ‘John’ and the value `True`). However, how might
    we represent a Person, a Student or an Employee of a firm? One way we can do this
    is to use a class to represent them.


    As indicated above, we might represent any type of (more complex) data item use
    a combination of attributes (or fields) and behaviours. These attributes will
    use existing data types, these might be integers, strings, Booleans, floating-point
    numbers or other classes.


    For example, when defining the class `Person` we might give it:


    +   - a field or attribute for the person’s name,

    - a field or attribute for their age,

    - a field or attribute for their email,

    - some behaviour to give them a birthday (which will increment their age),

    - some behaviour to allow us to send them a message via their email,

    - etc.


    In Python classes are thus used:


    +   - as a template to create instances (or objects) of that class,

    - define instance methods or common behaviour for a class of objects,

    - define attributes or fields to hold data within the objects,

    - be sent messages.


    Objects (or instances), on the other hand, can:


    +   - be created from a class,

    - hold their own values for instance variables,

    - be sent messages,'
