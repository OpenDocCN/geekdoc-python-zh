    # Chapter 19

    Python Classes


    # 19.1 Introduction


    > In Python everything is an object and as such is an example of a type or class
    of things. For example, integers are an example of the int class, real numbers
    are examples of the float class, etc. In this chapter we will look at what a class
    is in Python, how it is defined, how instances of a class can be created, how
    attributes (data) and methods (behaviour) can be defined for a class and outline
    how memory is managed within Python with respect to instance creation and deletion.


    # 19.2 Python and Classes


    As mentioned above everything in Python is an object! This is illustrated below
    for a number of different types within Python:


    ```

    print(type(4))

    print(type(5.6))

    print(type(True))

    print(type(''Natalia''))

    print(type([1, 2, 3, 4]))

    ```


    This prints out a list of classes that define what it is to be an `int`, or a
    `float` or a `bool` etc. in Python:'
