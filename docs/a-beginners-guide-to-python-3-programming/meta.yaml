    \        print('inner:', title)\n    inner()\n    print('outer:', title)\n\nouter()\n\
    ```\n\nThe result of running this is\n\n```\ninner: another title\nouter: another\
    \ title\n```\n\n## 13.5 Hints\n\nPoints to note about the scope and lifetime of\
    \ variables\n\n1.  The scope of a variable is the part of a program where the\
