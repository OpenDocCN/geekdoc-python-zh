    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_48_0.png)


    You may be prompted to look in the Microsoft store, you can ignore that and close
    the window.


    Note in the above where we have tried both `python` and `python3` in case the
    latest version has been installed using that name. This is not an uncommon thing
    to do as on some machines you may have both Python 2 and Python 3 available.


    On a system such as a Mac you can use the Terminal and do the same thing. You
    will probably find that at least Python (2) is pre-installed for you. For example,
    if you type in `python` on a Mac you will get something like this:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_48_1.png)


    This indicates that the above user has version 2.7.15 installed (note you may
    have another 2.x version installed).


    However, be careful if you find that you have Python 2 installed on your machine;
    this book is focused solely on Python 3.


    If you have started a Python interpreter then


    +   - Use `quit()` or `exit()` to exit the Python interpreter; `exit()` is an
    alias for `quit()` and is provided to make Python easier to use.


    If Python 3 was not available, then the following steps will help you to install
    it.'
- md: 'If the correct version of Python is already available on your computer then
    you can skip to the next chapter. An example of what might happen if you type
    in Python and Python 3 is installed on a Mac is given below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_49_0.png)


    Here you can see that this machine has Python 3.11.3 installed.


    ## 3.3 Installing Python on a Windows PC


    ### 3.3.1 Step 1: Downloading Python


    Python is available for a wide range of platforms from Windows, to Mac OS and
    Linux; you will need to ensure that you download the version for your operating
    system.


    Python can be downloaded from the main Python web site which can be found at http://www.python.org/.


    As you will see the ‘Downloads’ link is the second from the left on the large
    menu bar below the search field. Click on this and you will be taken to the download
    page; the current Python 3 version at the time of writing is Python 3.11 which
    is the version we will download (if you find that the version is 3.12 or later
    then that is fine as well). Click on the ‘Download Python 3.x.x’ link. For example,
    for a Windows 11 machine, using 3.11.3, you will see:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_50_0.png)


    Click on the ‘Download’ button—this may take you to a page with several different
    options on it—look for the ‘Recommended’ option and download that installer.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_50_1.png)


    Even if a newer version of Python is available (which is likely as the version
    is updated frequently) the steps should be fundamentally the same.


    ### 3.3.2 Step 2: Running the Installer


    Once you have downloaded the installer *open* it. You will now be prompted for
    the location to install Python, for example:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_51_0.png)


    Note that it is easiest if you click on the ‘Add python.exe to PATH’ option as
    this will make it available from the command line. If you don’t do this then don’t
    worry, we can add Python to the PATH later on (the PATH environment variable is
    used by Windows to find the location of programs such as the Python interpreter).


    Next select the ‘Install Now’ option and follow the installation steps.


    If everything went as expected you should now see a confirmatory dialog such as:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_51_1.png)


    If you are on Windows now close any Command Prompt windows that you have open
    (the PATH variable is not updated for existing Commands). This can be done by
    typing in ‘exit’ or closing the window.


    ### 3.3.3 Step 3: Set up the PATH (Optional)


    If you did not select ‘Add python.exe to PATH’ at the start of the installation
    you will now need to set up the PATH environment variable. If you did then skip
    onto the next step.


    You can set the PATH environment variable using the system environment variables
    editor.


    The easiest way to find this is to type ‘envir’ into the Windows search box, it
    will then list all applications which match this pattern including the ‘Edit the
    system environment variables’ editor. If you are logged into your machine as a
    user with ‘admin’ rights use the first one listed, if you are logged in as a user
    without admin rights select the ‘Edit environment variables for your account’
    option.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_52_0.png)


    On the resulting dialog select the ‘Environment Variables …’ button at the bottom
    of the page:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_52_1.png)


    On the next dialog select the `PATH` environment variable and select Edit:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_53_0.png)


    Now add the location in which you installed Python, by default this will be something
    like:


    ```

    C:\Users\<username>\AppData\Local\Programs\Python\Python311

    C:\Users\<username>\AppData\Local\Programs\Python\Python311\Scripts

    ```


    Note Python311 should be replaced by the version of Python you are installing
    if it is different.


    The end result should look something like:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_53_1.png)


    Now click on OK until all the windows are closed.


    ### 3.3.4 Step 4: Verify the Installation


    Next open a new Command Prompt window and type in `python` as shown below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_53_2.png)


    Congratulations you have installed Python and run the `python` interpreter!


    ### 3.3.5 Step 5: Run Some Python


    Now at the ‘>>>’ prompt type in:


    ```

    print(''Hello World'')

    ```


    Be careful to make sure you use all lowercase letters for the ‘print’ function;
    Python is very case sensitive which means that as far as Python is concerned `print(''Hello
    World'')` and `Print(''Hello World'')` are completely different things.


    Also make sure that you have single quotes around the Hello World text this makes
    it a string. If you get this right then on Windows you should see:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_54_0.png)


    You have now run your first Python program. In this case your program printed
    out the message ‘Hello World’ (a traditional first program in most programming
    languages).


    ### 3.3.6 Step 6: Exit the Python Interpreter


    To exit the Python interpreter use `exit()` or Ctrl-Z plus Return.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_54_1.png)


    ## 3.4 Setting up on a Mac


    Installing Python on a Mac is similar to installing it on a Windows machine in
    that you can download the Python installer for the Apple Mac from the Python Software
    Foundation web site (https://www.python.org). Of course this time you need to
    make sure you select the macOS version of the download as shown below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_55_0.png)


    From here you can select the macOS 64-bit installer (make sure you select the
    appropriate one for your version of the operating system). This will download
    an Apple package that can be installed (it will have a name similar to python-3.11.3-macos11.pkg
    although the version number of Python and the macOS operating system may be different).
    You will need to run this installer. When you run this installer the Python Installer
    wizard dialog will open as shown below:


    ## 3 Setting up the Python Environment


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_56_0.png)


    Step through the dialogs presented to you by the installer wizard accepting each
    option until the installation starts. Once the installation has completed you
    will be presented with a summary screen confirming the installation was successful.
    You can now close the installer.


    This will have created a new folder in your Applications folder for Python 3.11.
    Note that on a Mac which already has Python 2 installed (which is installed by
    default), Python 3 can be installed alongside it and can be accessible via the
    `python3` command (as shown below). You should confirm that Python has been installed
    successfully by opening a Terminal window and entering the Python 3 REPL:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_56_1.png)


    Now at the ''>>>'' prompt type in:


    ```

    print(''Hello World'')

    ```


    Be careful to make sure you use all lowercase letters for the ''print'' function;
    as on a Windows machine Python is very case sensitive which means that as far
    as Python is concerned `print(''Hello World'')` and `Print(''Hello World'')` are
    completely different things.


    The result should be as shown below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_57_0.png)


    You can now exit the REPL using the `exit()` or `quit()`.


    ## 3.5 Setting up an IDE


    You can use whatever editor you want along with this book, and most chapters are
    IDE independent. However, if you wish to use the PyCharm editor to make life easier
    then this section outlines downloading, installing and getting started with this
    editor. Almost all other chapters are IDE independent apart from one section in
    the ‘Python Virtual Environments’ chapter.


    ### 3.5.1 Downloading the PyCharm IDE


    PyCharm is provided by JetBrains who make tools for a variety of different languages.
    The PyCharm IDE can be downloaded from their site—see [https://www.jetbrains.com/](https://www.jetbrains.com/).
    Look for the menu heading ‘Developer Tools’ and select that. You will see a long
    list of tools, which should include PyCharm.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_57_1.png)


    Select the PyCharm option.'
