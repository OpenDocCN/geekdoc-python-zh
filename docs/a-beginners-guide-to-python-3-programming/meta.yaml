  md: '# 27.9 Python Packages


    # 27.9.1 Package Organization


    Python allows developers to organize modules together into packages, in a hierarchical
    structure based on directories.


    A package is defined as.


    +   - A directory containing one or more Python source files and

    - An optional source file named __init__.py. This file may also contain code that
    is executed when a module is imported from the package.


    For example, the following picture illustrates a package `utils` containing two
    modules `classes` and `functions`.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_334_0.png)


    In this case the `__init__.py` file contains package level initialization code:


    ```

    print(''utils package'')

    ```


    The contents of the `__init__.py` file will be run once, the first time either
    module within the package is referenced.


    The `functions` module then contains several function definitions; while the `classes`
    module contains several class definitions.


    We refer to elements of the package relative to the package name—as shown below:


    ```

    from utils.functions import *

    f1()

    from utils.classes import *

    p = Processor()

    ```


    Here we are importing both the `functions` module and the `classes` module from
    the `utils` package. The function `f1()` is defined in the `functions` module
    while the `Processor` class is defined within the `classes` module.


    You can use all the `from` and `import` styles we have already seen, for example,
    you can import a function from a module in a package and give it an alias:


    ```

    from util.functions import f1 as myfunc

    myfunc()

    ```'
  merge: -1
