    \ and explores how currying can be implemented in Python. The chapter also introduces\
    \ the concept of closures and how they affect curried functions.\n\n### 17.2 Currying\
    \ Concepts\n\nAt an abstract level, consider having a function that takes two\
    \ parameters. These two parameters `x` and `y` are used within the function body\
    \ with the multiply operator in the form `x * y`. For example, we might have:\n\
    \n```python\noperation(x, y): return x * y\n```\n\nThis function `operation()`\
    \ might then be used as follows\n\n```python\ntotal = operation(2, 5)\n```\n\n\
    Which would result in 5 being multiplied by 2 to give 10. Or it could be used:\n\
    \n```python\ntotal = operation(10, 5)\n```\n\nWhich would result in 5 being multiplied\
    \ by 10 to give 50.\n\nIf we needed to double a number, we could thus reuse the\
    \ `operation()` function many times, for example:\n\n```python\noperation(2, 5)\n\
    operation(2, 10)\noperation(2, 6)\noperation(2, 151)\n```\n\nAll of the above\
    \ would double the second number. However, we have had to remember to provide\
    \ the 2 so that the number can be doubled. However, the number 2 has not changed\
    \ between any of the invocations of `operation()` function. What if we fixed the\
    \ first parameter to always be 2, thus would mean that we could create a new function\
    \ that apparently only takes one parameter (the number to double). For example,\
    \ let us say we could write something like:\n\n```python\ndouble = operation(2,\
    \ *)\n```\n\nSuch that we could now write:\n\n```python\ndouble(5)\ndouble(151)\n\
    ```\n\nIn essence `double()` is an alias for `operation()`, but an alias that\
    \ provides the value 2 for the first parameter and leaves the second parameter\
    \ to be filled in by the future invocation of the `double` function.\n\n### 17.3\
    \ Python and Curried Functions\n\nA curried function in Python is a function where\
    \ one or more of its parameters have been *applied or bound* to a value, resulting\
    \ in the creation of a new function with one fewer parameters than the original.\
    \ For example, let us create a function that multiplies two numbers together:\n\
    \n```python\ndef multiply(a, b):\n    return a * b\n```\n\nThis is a general function\
    \ that does exactly what it says; it multiplies any two numbers together. These\
    \ numbers could be any two integers or floating-point numbers, etc.\nWe can thus\
    \ invoke it in the normal manner:\n\n```python\nprint(multiply(2, 5))\n```\n\n\
    The result of executing this statement is:\n\n```\n10\n```\n\nWe could now define\
    \ a new method that takes a function and a number and returns a new (anonymous)\
    \ function that takes one *new* parameter and calls the function passed in with\
    \ the number passed in and the new parameter:\n\n```python\ndef multby(func, num):\n\
    \    return lambda y: func(num, y)\n```\n\nLook carefully at this function; it\
    \ has used or *bound* the number passed into the `multby` function to the invocation\
    \ of the function passed in, but it has also defined a new variable 'y' that will\
    \ have to be provided when this new anonymous function is invoked. It then returns\
    \ a reference to the anonymous function as the result of `multby`.\n\nThe `multby`\
    \ function can now be used to bind the first parameter of the multiply function\
    \ to anything we want. For example, we could bind it to 2 so that it will always\
    \ double the second parameter and store the resulting function reference into\
    \ a property `double`:\n\n```python\ndouble = multby(multiply, 2)\n```\n\nWe could\
    \ also bind the value 3 to the first parameter of multiple to make a function\
    \ that will triple any value:\n\n```python\ntriple = multby(multiply, 3)\n```\n\
    \nWhich means we can now write:\n\n```python\nprint(double(5))\nprint(triple(5))\n\
    ```\n\nwhich produces the output\n\n```\n10\n15\n```\n\nYou are not limited to\
    \ just binding one parameter; you can bind any number of parameters in this way.\n\
    \nCurried functions are therefore very useful for creating new functions from\
    \ existing functions.\n\n### 17.4 Closures\n\nOne question that might well be\
    \ on your mind now is what happens when a function references some data that is\
    \ in scope where it is defined but is no longer available when it is evaluated?\
    \ This question is answered by the implementation of a concept known as *closure*.\n\
    \nWithin Computer Science (and programming languages in particular) a closure\
    \ (or a lexical closure or function closure) is a function (or more strictly a\
    \ reference to a function) together with a referencing environment. This referencing\
    \ environment records the context within which the function was originally defined\
    \ and if necessary, a reference to each of the non-local variables used by that\
    \ function. These non-local or free variables allow the function body to reference\
    \ variables that are external to the function, but which are utilized by that\
    \ function. This referencing environment is one of the distinguishing features\
    \ between a functional language and a language that supports function pointers\
    \ (such as C).\n\nThe general concept of a lexical closure was first developed\
    \ during the 1960s but was first fully implemented in the language Scheme in the\
    \ 1970s. It has since been used within many functional programming languages including\
    \ LISP and Scala.\n\nAt the conceptual level, a closure allows a function to reference\
    \ a variable available in the scope where the function was originally defined,\
    \ but not available by default in the scope where it is executed.\n\nFor example,\
    \ in the following simple programme, the variable `more` is defined outside the\
    \ body of the function named `increase`. This is permissible as the variable is\
    \ a *global* variable. Thus, the variable `more` is *within scope* at the point\
    \ of definition.\n\n```python\nmore = 100\n\ndef increase(num):\n    return num\
    \ + more\n\nprint(increase(10))\nmore = 50\nprint(increase(10))\n```\n\nWithin\
    \ our program we then invoke the `increase` function by passing in the value 10.\
    \ This is done twice with the variable `more` being reset to 50 between the two.\
    \ The output from this program is shown below:\n\n```\n110\n60\n```\n\nNote that\
    \ it is the *current* value of `more` that is being used when the function executes\
    \ and not the value of `more` present at the point that the function was defined.\
    \ Hence the output is 110 and 60 that is 100 + 10 and then 50 + 10.\n\nThis might\
    \ seem obvious as the variable `more` is still in scope within the same function\
    \ as the invocations of the function referenced by `increase`.\n\nHowever, consider\
    \ the following example:\n\n```python\ndef increment(num):\n    return num + 1\n\
    \ndef reset_function():\n    global increment\n    addition = 50\n    increment\
    \ = lambda num: num + addition\n\nprint(increment(5))\nreset_function()\nprint(increment(5))\n\
    ```"
