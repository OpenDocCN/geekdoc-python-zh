    # 2.1.4 Python for Animation


    Python is one of the two programming languages that can be used in the Autodesk
    Maya toolkit. Maya is a 3D animation, modeling, simulation and rendering software
    systems used by games, film and TV companies. Within Maya, Python can be used
    for anything from creating scripts handling common tasks, through to develop complete
    plug-ins providing extensions to the core functionality of the tool. Maya currently
    supports Python 2 but will be moving toward Python 3 in the near future.


    # 2.1.5 Python for Film Making


    Industrial Light and Magic was formed in 1975 by George Lucas to help create special
    effects for the original Star Wars film. Since then it has gone on to provide
    special effects for a huge range of films and film makers. Back in 1996 it used
    Unix shell scripts to help it automate and control its production pipeline. However,
    they needed to develop their increasingly complex and computationally expensive
    production process and felt that their existing approach was not flexible enough.
    Although they looked at several alternatives (including TCL and Perl) they decided
    to adopt Python. This allowed for faster development times and greater flexibility.
    Over the years they have re-evaluated their decision and considered different
    alternatives, but Python remains key to their development processes.


    # 2.1.6 Cross Platform UIs


    Python is particularly well served in terms of Graphical User Interface frameworks
    (or GUI frameworks). Most of these are cross platform, although a few allow developers
    to exploit particular features of an underlying windowing system and are thus
    tied to a specific platform. Widely used GUI libraries include the cross platform
    TKinter, wxPython and pyQT and the platform specific PythonWin (for Windows) and
    PyObjc (for MacOS). As an example, the following ‘Hello World’ GUI application
    uses wxPython and is shown running on a Mac OS and Windows system:'
