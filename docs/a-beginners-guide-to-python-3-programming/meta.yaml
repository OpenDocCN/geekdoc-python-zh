    # 19.12 Automatic Memory Management


    The creation and deletion of objects (and their associated memory) is managed
    by the Python Memory Manager. Indeed, the provision of a memory manager (also
    known as automatic memory management) is one of Python''s advantages when compared
    to languages such as C and C++. It is not uncommon to hear C++ programmers complaining
    about spending many hours attempting to track down a particularly awkward bug
    only to find it was a problem associated with memory allocation or pointer manipulation.
    Similarly, a regular problem for C++ developers is that of memory creep, which
    occurs when memory is allocated but is not freed up. The application either uses
    all available memory or runs out of space and produces a run time error.


    Most of the problems associated with memory allocation in languages such as C++
    occur because programmers must not only concentrate on the (often complex) application
    logic but also on memory management. They must ensure that they allocate only
    the memory which is required and deallocate it when it is no longer required.
    This may sound simple, but it is no mean feat in a large complex application.


    An interesting question to ask is "why do programmers have to manage memory allocation?".
    There are few programmers today who would expect to have to manage the registers
    being used by their programs, although 30 or 40 years ago the situation was very
    different. One answer to the memory management question, often cited by those
    who like to manage their own memory, is that "it is more efficient, you have more
    control, it is faster and leads to more compact code". Of course, if you wish
    to take these comments to their extreme, then we should all be programming in
    assembler. This would enable us all to produce faster, more efficient and more
    compact code than that produced by Python or languages such as Java.


    The point about high level languages, however, is that they are more productive,
    introduce fewer errors, are more expressive and are efficient enough (given modern
    computers and compiler technology). The memory management issue is somewhat similar.
    If the system automatically handles the allocation and deallocation of memory,
    then the programmer can concentrate on the application logic.'
