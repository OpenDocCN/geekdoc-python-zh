    \ `import` 所需的集合。\n在本节中，我们将以 `Counter`、`Defaultdict` 和 `namedtuple` 容器为例进行介绍。\n\
    \n#### 36.3.1 Counter容器\n\n我们将首先介绍 `Counter` 类型。它旨在高效地保存同一元素的多个副本。它之所以高效，是因为它只保存每个元素的一个副本，但会记录该元素被添加到集合中的次数：\n\
    \n```python\nimport collections\n\nfruit = collections.Counter(['apple', 'orange',\
