    流程图是针对给定问题的算法、工作流或过程的图形表示。


    流程图用于软件系统的分析、设计和文档编写。与其他形式的符号（如DFD）一样，流程图帮助设计者和开发人员可视化解决方案中涉及的步骤，从而有助于理解所涉及的过程和算法。


    算法中的步骤表示为各种类型的框。步骤的顺序由框之间的箭头指示。控制流由决策框表示。


