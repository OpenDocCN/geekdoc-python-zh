    \ statement or statements\n```\n\nAs shown both in the diagram and can be inferred\
    \ from the code; *while* the test condition/expression is `True` then the statement\
    \ or block of statements in the while loop will be executed.\n\nNote that the\
    \ test is performed *before* each iteration, including the first iteration; therefore,\
    \ if the condition fails the first time around the loop the statement or block\
