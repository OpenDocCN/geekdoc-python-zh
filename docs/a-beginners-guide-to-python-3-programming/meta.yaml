  md: "# 26.5.5 The Finally Clause\n\nAn optional `finally` clause can also be provided\
    \ with the `try` statement. This clause is the last clause in the statement and\
    \ must come after any `except` classes as well as the `else` clause.\n\nIt is\
    \ used for code that you want to run whether an exception occurred or not. For\
    \ example, in the following code snippet:\n\n```\ntry:\n    my_function(6, 2)\n\
    except ZeroDivisionError as e:\n    print(e)\nelse:\n    print('Everything worked\
    \ OK')\nfinally:\n    print('Always runs')\n```\n\nThe `try` block will run, if\
    \ no error is raised then the `else` clause will be executed and last of all the\
    \ `finally` code will run, we will therefore have as output:\n\n```\nmy_function\
    \ in\nmy_function out\nEverything worked OK\nAlways runs\n```\n\nIf, however,\
    \ we pass in 6 and 0 to `my_function()`:\n\n```\ntry:\n    my_function(6, 0)\n\
    except ZeroDivisionError as e:\n    print(e)\nelse:\n    print('Everything worked\
    \ OK')\nfinally:\n    print('Always runs')\n```\n\nWe will now raise an exception\
    \ in `my_function()` which means that the `try` block will execute, then the `ZeroDivisionError`\
    \ will be raised, it will be handled by the `except` clause, and then the `finally`\
    \ clause will run. The output is now:\n\n```\nmy_function in\ndivision by zero\n\
    Always runs\n```\n\nAs you can see in both cases the `finally` clause is executed.\
    \ The `finally` clause can be very useful for general housekeeping type activities\
    \ such as shutting down or closing any resources that your code might be using,\
    \ even if an error has occurred."
