    # 18.5 Where Is the Structure in an OO Program?


    People new to object orientation may be confused because they have lost one of
    the key elements that they use to help them understand and structure a software
    system: the main program body. This is because the objects and the interactions
    between them are the cornerstone of the system. In many ways, the following figure
    shows the object-oriented equivalent of a main program. This also highlights an
    important feature of most object-oriented approaches: graphical illustrations.
    Many aspects of object technology, for example object structure, class inheritance
    and message chains, are most easily explained graphically.


    Let us now consider the structure of our object-oriented system. It is dictated
    by the messages that are sent between objects. That is, an object must possess
    a reference to another object in order to send it a message. The resulting system
    structure is illustrated below.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_223_0.png)


    In Python, this structure is achieved by making instance variables reference the
    appropriate objects. This is the structure which exists between the instances
    in the system and does not relate to the classes, which act as templates for the
    instances.'
