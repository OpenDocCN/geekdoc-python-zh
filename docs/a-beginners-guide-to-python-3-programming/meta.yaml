    默认情况下，值是根据提供给 `format()` 方法的顺序绑定到占位符的；但是，可以通过为占位符提供一个*索引*来覆盖此行为，以指定应绑定哪个值，例如：


    ```python

    # 可以为替换指定索引

    format_string = "Hello {1} {0}, you got {2}%"

