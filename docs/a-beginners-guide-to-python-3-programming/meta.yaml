    \ `Quantity` 类支持这些运算符，因此我们只实现核心的数值运算符：乘法、除法和幂运算。\n\n还要注意，除法方法的名称不是 `div`，而是 `__truediv__()`\
    \ 和 `__floordiv__()`，这表明了 `/` 和 `//` 在行为上的差异。\n\n更新后的 `Quantity` 类如下所示：\n\n```\n\
    class Quantity:\n    def __init__(self, value=0):\n        self.value = value\n\
