    \ `print` 使用了 `Person` 类的 `__str__()` 方法）。请注意，行号也包含在内，这有助于*调试*问题。\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_301_0.png)\n\
    \n在 Python 中，术语“错误”和“异常”可以互换使用；尽管从风格角度来看，“异常”可能用于表示操作相关的问题（如算术异常），而“错误”可能与功能问题相关（如文件未找到）。\n\
    \n## 26.3 什么是异常？\n\n在 Python 中，一切都是对象的一种类型，包括整数、字符串、布尔值，当然也包括异常和错误。在 Python 中，异常/错误类型是在一个类层次结构中定义的，该层次结构的根是\
    \ `BaseException` 类型。所有内置的错误和异常最终都扩展自 `BaseException` 类型。它有一个子类 `Exception`，它是所有用户定义异常（以及许多内置异常）的根。反过来，`ArithmeticException`\
    \ 是所有与算术错误相关的内置异常的基类。\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_302_0.png)\n\
    \n上图说明了一些常见错误和异常类型的类层次结构。\n\n当异常发生时，这被称为*引发*异常；当它被传递给代码进行处理时，这被称为*抛出*异常。随着本章的深入，这些术语应该会变得更加清晰。\n\
    \n## 26.4 什么是异常处理？\n\n异常将控制流从一个地方转移到另一个地方。在大多数情况下，这是因为发生了无法在本地处理但可以在系统另一部分处理的问题。\n\
    \n问题通常是某种错误（例如除以零），尽管它也可以是任何问题（例如，识别出地址中指定的邮政编码不匹配）。因此，异常的目的是在运行时发生错误条件时进行处理。\n\
    \n值得考虑的是为什么你希望处理异常；毕竟系统不会让错误被忽视。例如，如果我们尝试除以零，那么系统会为你生成一个错误。这可能意味着用户输入了不正确的值，我们不希望用户看到一个对话框，建议他们进入系统调试器。因此，我们可以使用异常来强制用户纠正错误并重新运行计算。\n\
    \n下表说明了 Python 中异常/错误处理通常使用的术语。\n\n| 异常 | 在运行时生成的错误 |\n| 引发异常 | 生成一个新的异常 |\n|\
    \ 抛出异常 | 触发一个已生成的异常 |\n| 处理异常 | 处理错误的代码 |\n| 处理程序 | 处理错误的代码（称为 catch 块） |\n| 信号\
    \ | 一种特定类型的异常（例如*越界*或*除以零*） |\n\n不同类型的错误产生不同类型的异常。例如，如果错误是由整数除以零引起的，那么异常就是*算术*异常。异常的类型由对象标识，并且可以被异常处理程序捕获和处理。每个处理程序可以处理与其错误或异常类（及其子类）相关的异常。\n\
    \n异常在引发时被实例化。系统会回溯执行栈（以相反顺序调用的函数或方法的集合），直到找到可以处理该异常的处理程序。然后，相关的处理程序处理该异常。这可能涉及执行一些补救措施或以受控方式终止当前执行。在某些情况下，可能可以重新开始执行代码。\n\
    \n由于处理程序只能处理指定类（或子类）的异常，因此异常在找到可以处理它的处理程序之前，可能会经过多个处理程序块。\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_304_0.png)\n\
    \n上图说明了引发名为 `ZeroDivisionError` 的除以零异常的情况。该异常被传递到执行栈，在那里它遇到了为文件结束异常定义的异常处理程序。此处理程序无法处理\
    \ `ZeroDivisionError`，因此它被进一步传递到执行栈。然后它遇到了一个内存不足异常的处理程序。同样，它无法处理 `ZeroDivisionError`，异常被进一步传递到执行栈，直到找到为\
    \ `ZeroDivisionError` 定义的处理程序。然后该处理程序处理该异常。\n\n## 26.5 处理异常\n\n你可以通过实现 `try-except`\
    \ 结构来捕获异常。该结构分为四个部分：\n\n- `try` 块。`try` 块指示要监控是否存在 except 表达式中列出的异常的代码。\n- `except`\
    \ 子句。你可以使用可选的 `except` 子句来指示当发生特定类别的异常/错误时该做什么（例如，解决问题或生成警告消息）。可以有任意数量的 `except`\
    \ 子句按顺序检查不同类型的错误/异常。\n- `else` 子句。这是一个可选子句，仅当在 `try` 块中没有抛出异常时才会运行。它对于必须在 `try`\
    \ 子句未引发异常时执行的代码很有用。\n- `finally` 子句。可选的 `finally` 子句在 `try` 块退出后运行（无论是否由于引发异常）。你可以使用它来清理任何资源、关闭文件等。\n\
    \n这种语言结构起初可能看起来令人困惑，然而，一旦你使用了一段时间，你就会发现它不那么令人生畏。\n\n例如，考虑以下将数字除以零的函数；当对任何数字运行时，它将引发\
    \ `ZeroDivisionError`：\n\n```\ndef runcalc(x):\n    x/0\n```\n\n如果我们现在调用这个函数，我们将在标准输出中得到错误回溯：\n\
    \n```\nruncalc(6)\n```\n\n如下所示：\n\n```\n/Library/Frameworks/Python.framework/Versions/3.7/bin/python3.7\
    \ /Users/Shared/workspaces/pycharm/python\nTraceback (most recent call last):\n\
    \  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 67, in <module>\n    main()\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 39, in main\n    runcalc(0)\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 2, in runcalc\n    x / 0\nZeroDivisionError: division by zero\n```\n\n\
    然而，我们可以通过将对 `runcalc` 的调用包装在 `try` 语句中并提供一个 `except` 子句来处理它。带有 `except` 子句的 `try`\
    \ 语句的语法是\n\n```\ntry:\n    <要监控的代码>\nexcept <要监控的异常类型>:\n    <如果发现异常则调用的代码>\n\
    ```\n\n下面给出了一个具体的例子，该 `try` 语句将用于监控对 `runcalc` 的调用：\n\n```\ntry:\n    runcalc(6)\n\
    except ZeroDivisionError:\n    print('oops')\n```\n\n现在结果是打印出字符串 'oops'。这是因为当调用\
    \ `runcalc` 时，'/' 运算符抛出 `ZeroDivisionError`，该异常被传递回具有指定此类型异常的 `except` 子句的调用代码。这*捕获*了异常并运行相关的代码块，在本例中打印出字符串\
    \ 'oops'。\n\n事实上，我们不必如此精确；`except` 子句可以指定要查找的异常类，它将匹配任何属于该类型或该异常子类实例的异常。因此我们也可以写\n\
    \n```\ntry:\n    runcalc(6)\nexcept Exception:\n```"
