- md: '## 3.5.2 Setting up the IDE


    On the next page displayed there should be a large button labelled ‘DOWNLOAD’
    select this option:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_58_0.png)


    On the next page there are then two download options available: *Professional*
    and *Community*.


    -   The Professional version is the charged for option but included several additional
    elements over the free community version,

    -   The Community version is free.


    For most of the work I do in Python the Community version is more than adequate,
    and it is therefore the version we will download and install (note with the Professional
    version you do get a free trial but will need to either pay for the full version
    at the end of the trial or reinstall the Community version at that point).


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_58_1.png)


    Assuming you selected the Community edition the installer will now download, and
    you will be prompted to run it. Note you can ignore the request to subscribe if
    you want). Note that the web browser should select the correct operating system
    for you however, if it does not then you can manually select it above the ‘Professional’
    and ‘Community’ headings.


    You can now run the installer and follow the instructions provided.


    You need to first start the PyCharm IDE. Once started the first dialog shown to
    you asks if you want to import any settings you may have had for another version
    of PyCharm. At this point select ‘Do not import settings’.

    Step through the next set of dialogs selecting the look and feel (I like the light
    version of the IDE), whether you want to share data with JetBrains, etc. Once
    you have completed this click the ‘Start PyCharm’ option.

    You should now be presented with the landing screen for PyCharm:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_59_0.png)


    We will now create a project for you to work in. A Project in PyCharm is where
    you write your programs and how you configure what version of Python you are using
    and any libraries that you might need (such as graphics libraries etc.).

    Click on the ‘New Project’ option in the landing dialog.

    You will now be asked where you want to create this new project. Again you can
    use the default location but you will need to give it a name, we will call ours
    *python-intro*. This is done by changing the last element of the ‘Location’ field
    to read ‘python-intro’.

    It is also worth at this stage making sure that the Python interpreter you installed
    has been picked up by the IDE. You can do this by opening the ‘Project Interpreter:
    New Virtualenv environment’ option and making sure that the Base interpreter field
    is populated with the installation of Python on your machine (this should be picked
    up automatically for you). If all is OK then select ‘Create’; if the Base Interpreter
    is not specified or is incorrect then click on the ‘…’ button to the right of
    the field and browse to the appropriate location.

    The ‘New project’ dialog is shown below on the left for Windows 11 and on the
    right for an Apple Mac:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_60_0.png)


    Next make sure that the ‘Create a main.py welcome script’ is **NOT** selected
    as this will create a sample program for you which contains far more than a simple
    ‘Hello World’ message.


    On opening the PyCharm project you might see a Welcome message; click ‘Close’
    and the project will be set up for you.


    When you open the project, you will be shown a blank work space. On the left-hand
    side you should see at the top of the thin bar three icons:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_60_1.png)


    Select the top one which looks a bit like a folder—this is the project view. This
    will look something like:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_60_2.png)


    This illustrates the structure of your project. You should ignore ‘External Libraries’
    and ‘Scratches and Consoles’ and open the top node. If you called your project
    something other than python-intro you will find that this node has the name you
    entered rather than python-intro but that is fine.


    When you open the top node you will see that it currently contains a directory
    called venv—ignore this one as well and close this node so that you should now
    see:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_61_0.png)


    We are now ready to get started.


    ## 3.6 Writing Python Programs


    In this section we will use PyCharm to write our first Python program. If you
    are using a different IDE then the basic ideas will be the same—create file with
    a.py extension and run it—however the menu options and buttons may be (will be)
    different.

    The first step will be to create a new file within PyCharm to store our ‘Hello
    World’ program.

    First make sure that the selected node in the project tree is the top level node
    with the name of your project.

    Next select the PyCharm File->New menu option. This will display a ‘New’ menu
    with the option to create a new ‘Python File’. Make sure that this is the option
    you select, do not select the plain File option. If you don’t select the Python
    File option PyCharm will not realize that you want to run the associated file
    as a Python program.

    For example:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_61_1.png)


    When you select the ‘Python File’ option PyCharm will display a new dialog allowing
    you to enter the name of the file you want to create. All Python files must end
    with a.py extension thus you could enter the name ‘main.py’ into this dialog,
    however the ‘.py’ is optional here as PyCharm will add that extension for you,
    thus you can merely enter ‘main’ if you wish:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_62_0.png)


    Again make sure you have selected the ‘Python file’ option and neither of the
    other options as they will not work with the simple Hello World program we are
    creating. Now press enter.


    Once you have entered a filename for your program, the enter will create the file
    for you, for example called `main.py`, and display it on the right-hand side of
    your editor as an empty file. Note that the editor is divided into two areas,
    one is the project tree on the left and one is the editor window on the right,
    for example:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_62_1.png)


    Within the editor window enter the code to print out ‘Hello World’, for example:


    ```python

    print(''Hello World'')

    ```


    Now save the file. For example,


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_62_2.png)


    You can now run the file. To do this look above the name of the file in the editor
    and check that the field next to the little green arrow head say ‘Current File’.
    This indicates that the IDE will run the current file when you click on the green
    arrow, for example:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_62_3.png)


    Now click on the green arrow head and your program should now run. Below the left
    hand screen shot is from running PyCharm on a Windows 11 machine and the right-hand
    one is from an Apple Mac. As you can see they are very similar:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_63_0.png)


    The output from the program is displayed in a ‘Run’ window at the bottom of the
    IDE. This output shows you what was run (Python and the `main.py` file), the output
    from the program ‘Hello World’ and that the process (that ran the program) exited
    successfully with an exit code of ‘0’.

    You have now run your first Python program!


    ## 3.7 A Note on Filenames


    One point to note is that file names in Python need a little care.

    Firstly, you should always name your files using all lowercase letters. For example
    the filename `utils.py` is fine but the file `Utils.py` should be avoided (by
    convention).

    Secondly, you should try to avoid splitting file names up into constituent words,
    such as `my_utils.py`, this is a style thing mostly, and one that not everyone
    (including myself) adheres to. However, if you do need to split a filename up
    to make it more readable always use an underbar `_`, never use a hyphen `-`. If
    you do use a hyphen this will not cause a problem right now, but at some point
    in the future it may come back to bite you. This is because if you ever need to
    reference one Python file from another the hyphen `-` will break such an operation
    as the `import` command parses the `-` as a minus sign and thus will try to subtract
    part of the file name from another part resulting in an error instead of just
    being the file name.


    ## 3.8 Online Resources


    See the Python Standard Library documentation for:


    -   https://docs.python.org/3/using/index.html with documentation for Python setup
    and usage.

    -   https://docs.python.org/3/faq/windows.html Python on Windows FAQ.

    -   https://www.jetbrains.com/pycharm/ The PyCharm IDE home page.'
  mdcn: '## 3.5.2 设置集成开发环境


    在显示的下一页上，应该有一个标有“DOWNLOAD”的大按钮，选择此选项：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_58_0.png)


    在下一页上，有两个可用的下载选项：*Professional* 和 *Community*。


    -   Professional 版本是付费选项，但相比免费的 Community 版本包含了一些额外功能。

    -   Community 版本是免费的。


