    \n    L = \"large\"\n    XL = \"extra large\"\n\nprint(Sizes.XL)\n```"
- md: "The output from this is:\n\n```\nSizes.XL\n```\n\nFinally, it is also possible\
    \ to create an enum of Boolean values, for example:\n\n```python\nclass SwitchPosition(Enum):\n\
    \    ON = True\n    OFF = False\n\nswitch = SwitchPosition.OFF\nprint(switch)\n\
    ```\n\nThis produces:\n\n```\nSwitchPosition.OFF\n```\n\nAlthough it should be\
    \ noted that this implies an ordering between ON and OFF! It should also be noted\
    \ that integer-based values can be in any order, and they do not need to progress\
    \ 1, 2, 3 and can be whatever order is required; for example, the Compass enum\
    \ could have been defined as:\n\n```python\nclass Compass(Enum):\n    NORTH =\
    \ 0\n    SOUTH = 180\n    EAST = 90\n    WEST = 270\n```\n\n## 40.5 Using the\
    \ Name and Value Attributes\n\nEach enum member has an associated name and value\
    \ property. These can be accessed and used for example to display options to a\
    \ user or to use the value for some operation.\n\nFor example, we could access\
    \ the name and value attributes for the Compass enum as shown below:\n\n```python\n\
    print(Compass.SOUTH.name)\nprint(Compass.SOUTH.value)\n```\n\nThe output from\
    \ this code is:\n\n```\nSOUTH\n180\n```\n\n## 40.6 Creating an Enumeration Using\
    \ the Function Call Syntax\n\nIt is not required to subclass the `Enum` class\
    \ to create an enumerated type in Python; you can also use the functional interface.\
    \ To do this you can use the `Enum` functional API from the `enum` module. This\
    \ function takes the following parameters:\n\n```python\nEnum(\n    value,\n \
    \   names,\n    module=None,\n    qualname=None,\n    type=None,\n    start=1\n\
    )\n```\n\nThis returns a new enumerated type based on the parameters passed to\
    \ it. The parameters have the following meaning:\n\n- `value` (required field)\
    \ represents the string name of the new enumeration type (class).\n- `names` (required\
    \ field) is a list of the member values that will be used for the enumeration.\n\
    - `module` (optional) takes the name of the module that defines the enumeration\
    \ type.\n- `qualname` (optional) holds the location of the module that defines\
    \ the enumeration type.\n- `type` (optional) holds the class to use as the parent\
    \ for the enumerated type.\n- `start` (optional) takes the starting value for\
    \ the enumeration (by default it is 1).\n\nThe `names` argument can take any of\
    \ the following:\n\n- a string containing member names separated either with spaces\
    \ or commas,\n- an iterable (such as a list) of member names,\n- an iterable (such\
    \ as a list) of name-value pairs.\n\nMost of the time, you'll just use the first\
    \ two arguments (and possibly the last) to the `Enum` function when creating your\
    \ enumerations. For example:\n\n```python\nWeekend = Enum('Weekend', ['SATURDAY',\
    \ 'SUNDAY'])\n```\n\nAlternatively if you wanted to start the enumeration from\
    \ 10 rather than 1 you could write:\n\n```python\nWeekend = Enum('Weekend',\n\
    \               ['SATURDAY', 'SUNDAY'],\n               start=10)\n```\n\nIn both\
    \ cases you can reference the new enum via the variable `Weekend` and access the\
    \ enum members (SATURDAY and SUNDAY) as you will do normally, for example:\n\n\
    ```python\nday = Weekend.SATURDAY\nprint(day)\n```\n\nThe output from this is:\n\
    \n```\nWeekend.SATURDAY\n```\n\nIt is also possible to specify custom values for\
    \ each of the members in the enumerated type. This is done using an iterable of\
    \ name-value pairs (below we are using a list and a tuple for this). For example:\n\
    \n```python\nHTTPStatusCode = Enum(\n    value=\"HTTPStatusCode\",\n    names=[\n\
    \        (\"OK\", 200),\n        (\"CREATED\", 201),\n        (\"BAD_REQUEST\"\
    , 400),\n        (\"NOT_FOUND\", 404),\n        (\"SERVER_ERROR\", 500),\n   \
    \ ],\n)\n\nprint(HTTPStatusCode.OK)\n```\n\nThe output from this is:\n\n```\n\
    HTTPStatusCode.OK\n```\n\n## 40.7 Creating Enumerations from Automatic Values\n\
    \nThe enum module also provides an `auto()` function that can be used to automatically\
    \ assign values to enumeration members. It does so by incrementing the previous\
    \ value used. This function can be used in combination with user specified values\
    \ to fill in the gaps, for example:\n\n```python\nclass Day(Enum):\n    MONDAY\
    \ = 5\n    TUESDAY = auto()\n    WEDNESDAY = 9\n    THURSDAY = auto()\n    FRIDAY\
    \ = auto()\n    SATURDAY = auto()\n    SUNDAY = 15\n\nprint(list(Day))\n```\n\n\
    In this example MONDAY, WEDNESDAY and SUNDAY have had explicit integer literals\
    \ specified for their values. However, TUESDAY, THURSDAY, FRIDAY and SATURDAY\
    \ will all be autogenerated based on an increment of the preceding value. Thus\
    \ the values of the enumerated members will be 5, 6, 9, 10, 11, 12 and 15.\nTo\
    \ illustrate this all the values in the enumeration are gathered up and stored\
    \ into a list which is then printed out. The result is:\n\n```\n[<Day.MONDAY:\
    \ 5>, <Day.TUESDAY: 6>, <Day.WEDNESDAY: 9>,\n <Day.THURSDAY: 10>, <Day.FRIDAY:\
    \ 11>, <Day.SATURDAY: 12>,\n <Day.SUNDAY: 15>]\n```\n\n## 40.8 Working with Enum\
    \ Aliases\n\nIt is also possible to create enumerations in which two or more members\
    \ have the same constant value; the redundant enum member is known as an *alias*.\
    \ This can be useful in situation such as where the different names have the semantic\
    \ meaning, for example:\n\n```python\nclass OperatingSystem(Enum):\n    UBUNTU\
    \ = \"linux\"\n    MACOS = \"darwin\"\n    WINDOWS = \"win\"\n    DEBIAN = \"\
    linux\"\n\nprint(OperatingSystem.UBUNTU)\nprint(OperatingSystem.DEBIAN)\nprint(OperatingSystem.MACOS)\n\
    print(OperatingSystem.WINDOWS)\n```\n\nIn this example both DEBIAN and UBUNTU\
    \ have the value \"linux\"; this DEBIAN is an alias for UBUNTU.\nThe result of\
    \ running this code is:\n\n```\nOperatingSystem.UBUNTU\nOperatingSystem.UBUNTU\n\
    OperatingSystem.MACOS\nOperatingSystem.WINDOWS\n```\n\n## 40.9 Enumerations Unique\
    \ Values\n\nThe previous section illustrates that two values within an enumeration\
    \ can have, by default, the same value. However, what if this is not what you\
    \ want then this could happen by accident! To avoid this you can mark the enumeration\
    \ class with an @enum.unique decorator. This ensures that each enum member will\
    \ have a unique value. If not then a ValueError will be generated, for example:\n\
    \nThe following code is legal in Python:\n\n```python\nclass Lights(Enum):\n \
    \   RED = 1\n    AMBER = 2\n    GREEN = 3\n    RED_AMBER = 1\n\nprint(Lights.RED)\n\
    ```\n\nHowever, if we now mark it with @unique from the enum module as shown below:\n\
    \n```python\n@unique\nclass Lights(Enum):\n    RED = 1\n    AMBER = 2\n    GREEN\
    \ = 3\n    RED_AMBER = 1\n\nprint(Lights.RED)\n```\n\nThen when we now try and\
    \ run this program we will get a ValueError being generated:\n\n```\nTraceback\
    \ (most recent call last):\n  File \"enum_examples.py\", line 97, in <module>\n\
    \    @unique\n    ^^^^^^^\n  File \"enum.py\", line 1564, in unique\n    raise\
    \ ValueError('duplicate values found in %r: %s' %\nValueError: duplicate values\
    \ found in <enum 'Lights'>: RED_AMBER -> RED\n```\n\nThus illustrating that this\
    \ enum must have unique values for each of its members.\n\n## 40.10 Iterating\
    \ Through Enumeration Values\n\nPython enums are *iterable* things; this means\
    \ that you can iterate through all the enum members very easily.\n\nFor example,\
    \ to iterate through all the members within the `DaysOfWeek` enum we can write\
    \ a for loop as shown below:\n\n```python\nfor day in DaysOfWeek:\n    print(day)\n\
    ```\n\nThe output from this is that each enum member will be printed out in turn,\
    \ for example:\n\n```\nDaysOfWeek.MONDAY\nDaysOfWeek.TUESDAY\nDaysOfWeek.WEDNESDAY\n\
    DaysOfWeek.THURSDAY\nDaysOfWeek.FRIDAY\n```\n\n## 40.11 Comparing Enumerations\n\
    \nBy default enumerated types support two types of comparison operators:\n\n-\
    \ Identity, using the `is` and `is not` operators.\n- Equality, using the `==`\
    \ and `!=` operators.\n\nThe identity comparison relies on the fact that each\
    \ enum member is a unique instance of its enumeration class (in object-oriented\
    \ design terminology it is a singleton). This means that very fast identity comparisons\
    \ can be performed using the `is` and `is not` operators.\n\nFor example:\n\n\
    ```python\nclass OperatingSystem(Enum):\n    UBUNTU = \"linux\"\n    MACOS = \"\
    darwin\"\n    WINDOWS = \"win\"\n    DEBIAN = \"linux\"\n\nos1 = OperatingSystem.UBUNTU\n\
    os2 = OperatingSystem.MACOS\nos3 = OperatingSystem.UBUNTU\nprint(os1 is os3)\n\
    print(os1 is os2)\nprint(os1 is not os2)\n```\n\nThe above checks that each of\
    \ the OperatingSystems enumerated values in the variables os1, os2 and os3 is\
    \ with the exact same instance of the OperatingSystem type or different. This\
    \ is very fast and efficient."
