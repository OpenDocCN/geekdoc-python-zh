- md: "## Chapter 27\nPython Modules and Packages\n\n## 27.1 Introduction\n\nModules\
    \ and packages are two constructs used in Python to organize larger programs.\
    \ This chapter introduces modules in Python, how they are accessed, how they are\
    \ defined, how Python finds modules, etc. It also explores Python packages and\
    \ sub-packages.\n\n## 27.2 Modules\n\nA module allows you to group together related\
    \ functions, classes and code in general. You can think of a module as being like\
    \ a library of code (although in fact many libraries are themselves composed of\
    \ several modules as for example a library may have optional or extensions to\
    \ the core functionality).\n\nIt is useful to organize your code into modules\
    \ when the code either becomes large or when you want to reuse some elements of\
    \ the code base in multiple projects.\n\nBreaking up a large body of code from\
    \ a single file helps with simplifying code, maintenance and comprehensibility\
    \ of code, testing, reuse and scoping code. These are explored below:\n\n- *Simplicity*—Focusing\
    \ on a subset of an overall problem helps us to develop solutions that work for\
    \ the subset and can be combined together to solve the overall problem. This means\
    \ that individual modules can be simpler than the overall solution.\n- *Maintenance*—Modules\
    \ typically make it easier to define logical boundaries between one body of code\
    \ and another. This means it is easier to see what comprises a module and to verify\
    \ that the module works appropriately even when modified. It also helps to distinguish\
    \ one body of code from another so makes it easier to work out where changes should\
    \ go.\n- *Testing*—As one module can be made independent of another module there\
    \ are less dependencies and cross overs. This means that a module can be tested\
    \ in isolation and even before other modules, and the overall application, have\
    \ been written.\n- *Reusability*—Defining a function or class on one module means\
    \ that it is easier to reuse that function or class in another module, as the\
    \ boundaries between the one module and another are clear.\n- *Scoping*—Modules\
    \ typically also define a namespace, that is a scope within which each function\
    \ or class is unique. Think of a namespace a bit like a surname; within a classroom\
    \ there may be several people with the first name ‘John’, but we can distinguish\
    \ each person by using their full name, for example ‘John Hunt’, ‘John Jones’,\
    \ ‘John Smith’ and ‘John Brown’; each surname in this example provides a namespace\
    \ which ensures each John is unique (and can be referenced uniquely).\n\n## 27.3\
    \ Python Modules\n\nIn Python a module equates to a file containing Python code.\
    \ A module can contain:\n\n- Functions\n- Classes\n- Variables\n- Executable code\n\
    - Attributes associated with the module such as its name\n\nThe name of a module\
    \ is the name of the file that it is defined in (minus the suffix ‘.py’). For\
    \ example, the following diagram illustrates a function and a class defined within\
    \ a file called `utils.py`:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_323_0.png)\n\
    \nThus, the `printer()` function and the class `Shape` are defined in the `utils`\
    \ module. They can be referenced via the name of the `utils` module.\n\nAs an\
    \ example, let us look at a definition for our `utils` module defined in the file\
    \ `util.py`:\n\n```python\n\"\"\"This is a test module\"\"\"\nprint('Hello I am\
    \ the utils module')\n\ndef printer(some_object):\n    print('printer')\n    print(some_object)\n\
    \    print('done')\n\nclass Shape:\n    def __init__(self, id):\n        self._id\
    \ = id\n\n    def __str__(self):\n        return 'Shape - ' + self._id\n\n   \
    \ @property\n    def id(self):\n        \"\"\" The docstring for the id property\
    \ \"\"\"\n        print('In id method')\n        return self._id\n\n    @id.setter\n\
    \    def id(self, value):\n        print('In set_age method')\n        self._id\
    \ = id\n\ndefault_shape = Shape('square')\n```\n\nThe module has a comment which\
    \ is at the start of the file—this is useful documentation for anyone working\
    \ with the module. In some cases, the comment at the start of the module can provide\
    \ extensive documentation on the module such as what it provides, how to use the\
    \ features in the module and examples that can be used as a reference.\n\nThe\
    \ module also has some executable code (the print statement just after the comment)\
    \ that will be run when the module is loaded / initialized by Python. This will\
    \ happen when the module is first referenced in an application.\n\nA variable\
    \ `default_shape` is also initialized when the module is loaded and can also be\
    \ referenced outside the module in a similar manner to the module's function and\
    \ class. These variables can be useful in setting up defaults or predefined data\
    \ that can be used by developers working with the module.\n\n## 27.4 Importing\
    \ Python Modules\n\n### 27.4.1 Importing a Module\n\nA user-defined module is\
    \ *not* automatically accessible to another file or script; it is necessary to\
    \ import the module. Importing a module makes the functions, classes and variables\
    \ defined in the module visible to the file they are imported into.\n\nFor example,\
    \ to import all the contents of the `utils` module into a file called `my_app.py`\
    \ we can use:\n\n```python\nimport utils\n```\n\nNote that we do not give the\
    \ file name (i.e. `utils.py`) instead we give the module name to import (which\
    \ does not include the `.py`).\n\nThe result is as shown below:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_325_0.png)\n\
    \nOnce the definitions within the `utils` module are visible inside `my_app.py`\
    \ we can use them as if they had been defined in the current file. Note that due\
    \ to scoping the function, class and variable defined within the `utils` module\
    \ will be prefixed by the name of the module; i.e. `utils.printer` and `utils.Shape`\
    \ etc.:\n\n```python\nimport utils\n\nutils.printer(utils.default_shape)\nshape\
    \ = utils.Shape('circle')\nutils.printer(shape)\n```\n\nWhen we run the `my_app.py`\
    \ file we will produce the following output:\n\n```\nHello I am the utils module\n\
    printer\nShape - square\ndone\nprinter\nShape - circle\n```\n\nNotice that the\
    \ first line of the output is the output from the `print` statement in the `utils`\
    \ module (i.e., the line `print('Hello I am the utils module')`) this illustrates\
    \ the ability in Python to define behaviour that will be run when a module is\
    \ loaded; typically this might execute some housekeeping code or set up behaviour\
    \ required by the module. It should be noted that the module is only initialized\
    \ the first time that it is loaded and thus the executable statements are only\
    \ run once.\n\nIf we forgot to include the import statement at the start of the\
    \ file, then Python would not know to use the `utils` module. We would thus generate\
    \ an error indicating that the `utils` element is not known: `NameError: name\
    \ 'utils' is not defined`.\n\nThere can be any number of modules imported into\
    \ a file; these can be both user defined modules and system provided modules.\
    \ The modules can be imported via separate import statements or by supplying a\
    \ comma separated list of modules:\n\n```python\nimport utils\nimport support\n\
    import module1, module2, module3\n```\n\nA common convention is to place all import\
    \ statements at the start of a file; however, this is only a convention and `import`\
    \ statements can be placed anywhere in a file prior to where the modules features\
    \ are required. It is a common enough convention, however, that tools such as\
    \ PyCharm will indicate a style issue if you do not put the imports at the start\
    \ of the file.\n\n### 27.4.2 Importing from a Module\n\nOne issue with the previous\
    \ example is that we have had to keep referring to the facilities provided by\
    \ the `utils` module as `utils.< thing of interest >`; which while making it very\
    \ clear that these features come from the `utils` module, is a little tedious.\
    \ It is the equivalent of referring to a person via their full name every time\
    \ we speak to them. However, if they are the only other person in the room then\
    \ we don't usually need to be so formal; we could just use their first name.\n\
    \nA variant of the `import` statement allows us to import *everything* from a\
    \ particular module and remove the need to prefix the modules functions or classes\
    \ with the module name, for example:\n\n```python\nfrom <module name> import *\n\
    ```\n\nWhich can be read as from `<module name>` import everything in that module\
    \ and make it directly available.\n\n```python\nfrom utils import *\n\nprinter(default_shape)\n\
    shape = Shape('circle')\nprinter(shape)\n```"
  mdcn: "## 第27章\nPython 模块与包\n\n## 27.1 简介\n\n模块和包是 Python 中用于组织大型程序的两种结构。本章将介绍 Python\
    \ 中的模块，包括如何访问模块、如何定义模块、Python 如何查找模块等。同时，本章也会探讨 Python 的包和子包。\n\n## 27.2 模块\n\n\
    模块允许你将相关的函数、类以及通常的代码组织在一起。你可以将模块想象成一个代码库（尽管实际上许多库本身也是由多个模块组成的，例如一个库可能包含核心功能的可选或扩展部分）。\n\
    \n当代码量变大，或者你希望在多个项目中复用代码库中的某些元素时，将代码组织成模块会非常有用。\n\n将一个大文件中的大量代码拆分，有助于简化代码、维护和理解代码、测试、复用以及限定代码作用域。下面将详细探讨这些方面：\n\
    \n- *简洁性*——专注于整体问题的一个子集，有助于我们开发出适用于该子集的解决方案，并且这些解决方案可以组合起来解决整体问题。这意味着单个模块可以比整体解决方案更简单。\n\
    - *维护性*——模块通常更容易在一段代码和另一段代码之间定义逻辑边界。这意味着更容易看清模块的构成，并且即使模块被修改，也能验证其是否正常工作。它还有助于区分不同的代码段，从而更容易确定修改应该放在哪里。\n\
    - *可测试性*——由于一个模块可以独立于另一个模块，因此依赖和交叉更少。这意味着一个模块可以被隔离测试，甚至可以在其他模块和整个应用程序编写完成之前进行测试。\n\
    - *可复用性*——在一个模块中定义函数或类，意味着在另一个模块中复用该函数或类会更容易，因为模块之间的边界是清晰的。\n- *作用域*——模块通常还定义了一个命名空间，即一个作用域，其中每个函数或类都是唯一的。可以将命名空间想象成姓氏；在一个班级里可能有多个名叫“John”的人，但我们可以通过使用他们的全名来区分每个人，例如“John\
    \ Hunt”、“John Jones”、“John Smith”和“John Brown”；在这个例子中，每个姓氏都提供了一个命名空间，确保每个 John\
    \ 都是唯一的（并且可以被唯一引用）。\n\n## 27.3 Python 模块\n\n在 Python 中，模块等同于一个包含 Python 代码的文件。一个模块可以包含：\n\
    \n- 函数\n- 类\n- 变量\n- 可执行代码\n- 与模块关联的属性，例如其名称\n\n模块的名称是其定义所在文件的名称（去掉后缀 `.py`）。例如，下图展示了一个在名为\
