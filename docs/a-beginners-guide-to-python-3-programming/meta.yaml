    # # Chapter 34

    ## Dictionaries


    # ## 34.1 Introduction


    A dictionary (technically called a `dict` in Python) is a set of associations
    between a key and a value that is unordered, changeable (mutable) and indexed.
    This collection type allows for keyed access to values. That is, a value is stored
    in a dictionary using a key. This key is then used to retrieve that value at a
    later date. Dictionaries are very widely used in Python programs.


    # ## 34.2 What is a Dictionary


    Pictorially we might view a dictionary as shown below for a set of countries and
    their capital cities. Note that in a dictionary the keys must be unique but the
    values do not need to be unique.


