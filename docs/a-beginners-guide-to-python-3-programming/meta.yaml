  md: "# 41.7 Structural Matching and Lists\n\nIt is also possible to use lists with\
    \ the match statement (they are also sequences/ containers). Again it is possible\
    \ to extract one or more values from the list:\n\n```\ndef banking_operation1(action):\n\
    \    match action:\n        case ['balance']:\n            print('Getting the\
    \ balance')\n        case ['deposit', amount]:\n            print(f'Depositing\
    \ {amount}')\n        case ['withdraw', amount]:\n            print(f'Withdrawing\
    \ {amount}')\n```\n\nIn the above example their action passed into the function\
    \ is expected to be a list. Each of the case conditions checks for a particular\
    \ pattern and in two cases extracts a value:\n\n+   - The first case condition\
    \ checks for a list containing a single string 'balance'.\n- The second case condition\
