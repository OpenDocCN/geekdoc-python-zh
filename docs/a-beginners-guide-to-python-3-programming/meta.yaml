    # Chapter 23

    Operator Overloading


    # 23.1 Introduction


    It can be convenient when defining a user-defined class (type) to define operators
    that can make working with instance of those classes easier. Such operators might
    include the ‘+’ plus operator or the ‘–’ operator. This allows two instance of
    a class to be added together or subtracted. In this chapter we will explore operator
    overloading; what it is, how it works and why we want it.


    # 23.2 Operator Overloading


    # 23.2.1 Why Have Operator Overloading?


    Operator overloading allows user defined *classes* to appear to have a natural
    way of using operators such as +, -, <, > or == as well as logical operators such
    as & (and) and | (or).

    This leads to more succinct and readable code as it is possible to write code
    such as:


    ```

    q1 = Quantity(5)

    q2 = Quantity(10)

    q3 = q1 + q2

    ```


    It feels more natural for both developers and those reading the code. The alternative
    would be to create methods such as add and write code such as


    ```

    q1 = Quantity(5)

    q2 = Quantity(10)

    q3 = q1.add(q2)

    ```'
- md: "## 23.2.2 Why not Have Operator Overloading?\n\nIf operator overloading is\
    \ such a good idea, why don't all programming languages support it? Interestingly\
    \ Java, a very widely used programming language, does not support operator overloading!\n\
    \nOne answer is because it can be abused! For example, what is the meaning of\
    \ the following code:\n\n```\np1 = Person('John')\np2 = Person('Denise')\np3 =\
    \ p1 + p2\n```\n\nIt is not clear what `+` means in this context; in what way\
    \ is Denise being added to John; does it imply they are getting married? If so,\
    \ what is the result that is held in p3?\n\nThe problem here is that from a design\
    \ perspective (which in this case may be purely intuitive but in other cases may\
    \ relate to the intention of an application) the plus operator does not make sense\
    \ for the type Person. However, there is nothing in the Python language to indicate\
    \ this and thus anyone can code any operator into any class!\n\nAs a general design\
    \ principle, developers should follow the semantics of built in types and thus\
    \ should only implement those operators which are appropriate for the type being\
    \ developed. For example, for arithmetic value types such as Quantity it makes\
    \ perfect sense to provide a plus operator but for domain specific data-oriented\
    \ types such as Person it does not.\n\n## 23.2.3 Implementing Operator Overloading\n\
    \nTo implement operators such as `+` in a user-defined class it is necessary to\
    \ implement specific methods that are then mapped to the arithmetic or logical\
    \ operators used by users of the class.\n\nThese methods are considered *special*\
    \ in that they start with and end with a double underscore (`__`). Such methods\
    \ are considered private and usually restricted for Python-oriented implementations\
    \ (we have seen these already with methods such as `__init__()` and `__str__()`).\n\
    \nAs an example, let us assume that we want to implement the `+` and `-` operators\
    \ for our Quantity type. We also want our Quantity type to hold an actual value\
    \ and be able to be converted into a string for printing purposes.\n\nTo implement\
    \ the `+` and `-` operators we need to provide two special methods one will provide\
    \ the implementation of the `+` operator and one will provide the implementation\
    \ of the `-` operator:\n\n- `+` operator is implemented by a method with the signature\
    \ `def __add__(self, other):`\n- `-` operator is implemented by a method with\
    \ the signature `def __sub__(self, other):`\n\nWhere `other` represents another\
    \ `Quantity` or other suitable type which will be either added to, or subtracted\
    \ from, the current `Quantity` object.\nThe methods will be mapped by Python to\
    \ the operators `+` and `-`; such that if someone attempts to add two quantities\
    \ together then the `__add__()` method will be called, etc.\nThe definition of\
    \ the class `Quantity` is given below; note that the class actually just wraps\
    \ a number held in the attribute `value`.\n\n```\nclass Quantity:\n    def __init__(self,\
    \ value=0):\n        self.value = value\n    def __add__(self, other):\n     \
    \   new_value = self.value + other.value\n        return Quantity(new_value)\n\
    \    def __sub__(self, other):\n        new_value = self.value - other.value\n\
    \        return Quantity(new_value)\n    def __str__(self):\n        return 'Quantity['\
    \ + str(self.value) + ']'\n```\n\nUsing this class definition, we can create two\
    \ instances of the type `Quantity` and add them together:\n\n```\nq1 = Quantity(5)\n\
    q2 = Quantity(10)\nprint('q1 =', q1, ', q2 =', q2)\n\nq3 = q1 + q2\nprint('q3\
    \ =', q3)\n```\n\nIf we run this code snippet we get:\n\n```\nq1 = Quantity[5]\
    \ , q2 = Quantity[10]\nq3 = Quantity[15]\n```\n\nNote that we have made the class\
    \ `Quantity` immutable; that is once a `Quantity` instance has been created its\
    \ value cannot be changed (it is fixed).\nThis means that when two quantities\
    \ are added together a new instance of the class `Quantity` is created. This is\
    \ analogous to how integers work, if you add together 2+3 then you get 5; neither\
    \ 2 or 3 are modified however; instead a new integer 5 is generated—this is an\
    \ example of the general design principle; developers should follow the semantics\
    \ of built in types; `Quantity` objects act like number objects.\n\n## 23.3 Numerical\
    \ Operators\n\nThere are nine different numerical operators that can be implemented\
    \ by special methods; these operators are listed in the following table:\n\n|\
    \ Operator | Expression | Method |\n| --- | --- | --- |\n| Addition | q1 + q2\
    \ | `__add__(self, q2)` |\n| Subtraction | q1 - q2 | `__sub__(self, q2)` |\n|\
    \ Multiplication | q1 * q2 | `__mul__(self, q2)` |\n| Power | q1 ** q2 | `__pow__(self,\
    \ q2)` |\n| Division | q1 / q2 | `__truediv__(self, q2)` |\n| Floor Division |\
    \ q1 // q2 | `__floordiv__(self, q2)` |\n| Modulo (Remainder) | q1 % q2 | `__mod__(self,\
    \ q2)` |\n| Bitwise Left Shift | q1 << q2 | `__lshift__(self, q2)` |\n| Bitwise\
    \ Right Shift | q1 >> q2 | `__rshift__(self, q2)` |\n\nWe have already seen examples\
    \ of add and subtract; this table indicates how we can also provide operators\
    \ for multiplication and division etc.\n\nThe above table also presents Bitwise\
    \ shift operators (both left and right). These operate at the bit level used to\
    \ represent numbers under the hood and can be a very efficient way of manipulating\
    \ numeric values; however, we do not want to support these operators for our Quantity\
    \ class therefore we will only implement the core numeric operators of multiplication,\
    \ division and power.\n\nAlso note that the names of the division methods are\
    \ not div but `__truediv__()` and `__floordiv__()` indicating the difference in\
    \ behaviour between `/` and `//`.\n\nThe updated Quantity class is given below:\n\
    \n```\nclass Quantity:\n    def __init__(self, value=0):\n        self.value =\
    \ value\n\n    def __add__(self, other):\n        new_value = self.value + other.value\n\
    \        return Quantity(new_value)\n\n    def __sub__(self, other):\n       \
    \ new_value = self.value - other.value\n        return Quantity(new_value)\n\n\
    \    def __mul__(self, other):\n        new_value = self.value * other.value\n\
    \        return Quantity(new_value)\n\n    def __pow__(self, other):\n       \
    \ new_value = self.value ** other.value\n        return Quantity(new_value)\n\n\
    \    def __truediv__(self, other):\n        new_value = self.value / other.value\n\
    \        return Quantity(new_value)\n\n    def __floordiv__(self, other):\n  \
    \      new_value = self.value // other.value\n        return Quantity(new_value)\n\
    \n    def __mod__(self, other):\n        new_value = self.value % other.value\n\
    \        return Quantity(new_value)\n\n    def __str__(self):\n        return\
    \ 'Quantity[' + str(self.value) + ']'\n```\n\nThis means that we can now extend\
    \ our simple application that uses the Quantity class to include some of these\
    \ additional numerical operators:\n\n```\nq1 = Quantity(5)\nq2 = Quantity(10)\n\
    print('q1 =', q1, ', q2 =', q2)\n\nq3 = q1 + q2\nprint('q3 =', q3)\nprint('q2\
    \ - q1 =', q2 - q1)\n\nprint('q1 * q2 =', q1 * q2)\nprint('q1 / q2 =', q1 / q2)\n\
    ```\n\nThe output from this is now:\n\n```\nq1 = Quantity[5] ,q2 = Quantity[10]\n\
    q3 = Quantity[15]\nq2 - q1 = Quantity[5]\nq1 * q2 = Quantity[50]\nq1 / q2 = Quantity[0.5]\n\
    ```\n\nOne interesting point to note is that given the multiply and divide style\
    \ methods, we might want to multiply a Quantity by an integer or divide a Quantity\
    \ by an integer. There is nothing to stop us doing this and indeed this might\
    \ be a very useful behaviour. This would allow a Quantity to be multiplied by\
    \ 2 or divided by 2, for example:\n\n```\nprint('q1 * 2', q1 * 2)\nprint('q2 /\
    \ 2', q2 / 2)\n```\n\nAt the moment if we tried to run the above code we would\
    \ generate an error telling us that an int does not have a value attribute. However,\
    \ we can test to see if the argument passed into the `__mul__()` and `__truediv__()`\
    \ methods is an int or not using the `isinstance` function. This function takes\
    \ a variable and the name of a class and returns a new Quantity. To do this it\
    \ either adds the values of two Quantities together (if the other value is a Quantity)\
    \ or an integer to the self.value integer (if the other value is an int), for\
    \ example:"
