- md: "## Chapter 21\nClass Inheritance\n\n## 21.1 Introduction\n\nInheritance is\
    \ a core feature of Object-Oriented Programming. It allows one class to *inherit*\
    \ data or behaviour from another class and is one of the key ways in which reuse\
    \ is enabled within classes.\nThis chapter introduces inheritance between classes\
    \ in Python. It explains what inheritance is, how it is defined in Python, considers\
    \ the purpose of inheritance and addresses the issues around single and multiple\
    \ inheritance (both of which are supported by Python).\n\n## 21.2 What is Inheritance?\n\
    \nInheritance allows features defined in one class to be *inherited* and reused\
    \ in the definition of another class. For example, a `Person` class might have\
    \ the attributes `name` and `age`. It might also have behaviour associated with\
    \ a `Person` such as `birthday()`.\nWe might then decide that we want to have\
    \ another class `Employee` and that employees also have a `name` and an `age`\
    \ and will have birthdays. However, in addition an `Employee` may have an `employee_Id`\
    \ attribute and a `calculate_pay()` behaviour.\nAt this point we could duplicate\
    \ the definition of the `name` and `age` attributes and the `birthday()` behaviour\
    \ in the class `Employee` (for example by cutting and pasting the code between\
    \ the two classes).\nHowever, this is not only inefficient; it may also cause\
    \ problems in the future. For example we may realize that there is a problem or\
    \ bug in the implementation of `birthday()` and may correct it in the class `Person`;\
    \ however, we may forget to apply the same fix to the class `Employee`.\nIn general,\
    \ in software design and development it is considered best practice to define\
    \ something once and to reuse that something when required.\nIn an object-oriented\
    \ system we can achieve the reuse of data or behaviour via inheritance. That is\
