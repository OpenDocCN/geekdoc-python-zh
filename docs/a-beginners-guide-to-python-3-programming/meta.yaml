    # 19.11 The Del Keyword


    Having at one point created an object of some type (whether that is a `bool`,
    an `int` or a user defined type such as `Person`) it may later be necessary to
    delete that object. This can be done using the keyword `del`. This keyword is
    used to delete objects which allows the memory they are using to be reclaimed
    and used by other parts of your program.

    For example, we can write'
