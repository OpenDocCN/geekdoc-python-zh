  - "[PAGE 272]\n\n# 22.3.2 Inheritance\n\nInheritance is a key element in an object-oriented\
    \ language allowing one class to inherit data and methods from another.\n\nOne\
    \ of the most important features of inheritance (ironically) is that it allows\
    \ the developer to get inside the encapsulation bubble in limited and controlled\
    \ ways.\n\nThis allows the sub-class to take advantage of internal data structures\
    \ and methods, without compromising the encapsulation afforded to objects. For\
    \ example, let us define a subclass of the class Date:\n\n```\nclass Birthday(Date):\n\
    \    name = \"\"\n    age = 0\n    def is_birthday():\n        # ... Check to\
    \ see if it is their birthday\n```\n\nThe method `is_birthday()` could check to\
    \ see if the current date, matched the birthday represented by an instance of\
    \ Birthday and return true if it does and false if it does not.\n\nNote however,\
    \ that the interesting thing here is that not only have we not had to define integers\
    \ to represent the date, nor have we had to define methods to access such dates.\
    \ These have both been inherited from the parent class Date.\n\nIn addition, we\
    \ can now treat an instance of Birthday as either a Date or as a Birthday depending\
    \ on what we want to do!\n\nWhat would you do in languages such as C, Pascal or\
    \ Ada? One possibility is that you could define a new package Birthday, but that\
    \ package would not extend Dates, it would have to import Dates and add interfaces\
    \ to it, etc.? However, you certainly couldn't treat a Birthday package as a Dates\
    \ package.\n\nIn languages such as Python, because of polymorphism, you can do\
    \ exactly that. You can reuse existing code that only knew about Date, for example:\n\
    \n```\nbirthday = Birthday(12, 3, 1974)\n\ndef test(date):\n    # Do something\
    \ that works with a date\n\nt.test(birthday)\n```\n\nThis is because `birthday`\
    \ is indeed a type of Date as well as being a type of Birthday.\n\nYou can also\
    \ use all of the features defined for Date on Birthdays:\n\n```\nbirthday.is_day_of_week()\n\
    ```\n\nIndeed, you don't actually know where the method is defined. This method\
    \ could be defined in the class Birthday (where it would override that defined\
    \ in the class Date). However, it could be defined in the class Date (if no such\
    \ method is defined in Birthday); without looking at the source code there is\
    \ no way of knowing!"
