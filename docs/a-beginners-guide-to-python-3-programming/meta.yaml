    ### 5.6.2 函数/方法名称


    要非常注意函数/方法名称的大小写；在 Python 中，`isupper()` 与 `isUpper()` 是完全不同的操作。如果你使用了错误的大小写，Python
    将无法找到所需的函数或方法，并会生成错误消息。


    ### 5.6.3 函数/方法调用


    同样要注意，在调用函数或方法时，即使它不接受任何参数，也要始终包含圆括号。`isupper` 和 `isupper()` 之间有显著区别。前者是字符串上某个操作的*名称*，而后者是对该操作的调用，以便执行该操作。两种格式在
