    ```


    你会得到一条错误消息，表明只能将字符串与字符串连接，而不能将整数与字符串连接。要将数字（如 21）与字符串连接，必须先将其转换为字符串。这可以使用 `str()`
    函数完成。该函数将任何类型转换为该类型的字符串表示形式。例如：


    ```python

