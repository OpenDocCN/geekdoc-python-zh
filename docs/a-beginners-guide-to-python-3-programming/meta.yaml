- md: "In this example we are using the default values for `title` and `prompt` and\
    \ have changed the order of `message` and `name`. This is completely legal and\
    \ results in the following output:\n\n```\nWelcome Dr Lloyd - We like Python\n\
    ```\n\nWe can actually mix *positional* and *named* arguments in Python, for example:\n\
    \n```\ngreeter('Lloyd', message = 'We like Python')\n```\n\nHere 'John' is bound\
    \ to the `name` parameter as it is the first parameter, but 'We like Python' is\
    \ bound to `message` parameter as it is a named argument.\nHowever, you cannot\
    \ place positional arguments after a named argument, so we cannot write:\n\n```\n\
    greeter(name='John', 'We like Python')\n```\n\nAs this will result in Python generating\
    \ an error.\n\n## 12.9.4 Arbitrary Arguments\n\nIn some cases, you do not know\
    \ how many arguments will be supplied when a function is called. Python allows\
    \ you to pass an arbitrary number of arguments into a function and then process\
    \ those arguments inside the function.\nTo define a parameter list as being of\
    \ arbitrary length, a parameter is marked with an asterisk (*). For example:\n\
    \n```\ndef greeter(*args):\n    for name in args:\n        print('Welcome', name)\n\
    \ngreeter('John', 'Denise', 'Phoebe', 'Adam', 'Gryff', 'Jasmine')\n```\n\nThis\
    \ generates\n\n```\nWelcome John\nWelcome Denise\nWelcome Phoebe\nWelcome Adam\n\
    Welcome Gryff\nWelcome Jasmine\n```\n\nNote that this is another use of the `for`\
    \ loop; but this time it is a sequence of strings rather than a sequence of integers\
    \ that is being used.\n\n## 12.9.5 Positional and Keyword Arguments\n\nSome functions\
    \ in Python are defined such that the arguments to the methods can either be provided\
    \ using a variable number of positional or keyword arguments. Such functions have\
    \ two arguments `*args` and `**kwargs` (for positional arguments and keyword arguments).\n\
    \nThey are useful if you do not know exactly how many of either position or keyword\
    \ arguments are going to be provided.\n\nFor example, the function `my_function`\
    \ takes both a variable number of positional and keyword arguments:\n\n```\ndef\
    \ my_function(*args, **kwargs):\n    for arg in args:\n        print('arg:', arg)\n\
    \    for key in kwargs.keys():\n        print('key:', key, 'has value: ', kwargs[key])\n\
    ```\n\nThis can be called with any number of arguments of either type:\n\n```\n\
    my_function('John', 'Denise', daughter='Phoebe', son='Adam')\nprint('-' * 50)\n\
    my_function('Paul', 'Fiona', son_number_one='Andrew', son_number_two='James',\
    \ daughter='Joselyn')\n```\n\nwhich produces the output:\n\n```\narg: John\narg:\
    \ Denise\nkey: son has value: Adam\nkey: daughter has value: Phoebe\n--------------------------------------------------\n\
    arg: Paul\narg: Fiona\nkey: son_number_one has value: Andrew\nkey: son_number_two\
    \ has value: James\nkey: daughter has value: Joselyn\n```\n\nAlso note that the\
    \ keywords used for the arguments are not fixed.\n\nYou can also define methods\
    \ that only use one of the `*args` and `**kwargs` depending on your requirements\
    \ (as we saw with the `greeter()` function above), for example:\n\n```\ndef named(**kwargs):\n\
    \    for key in kwargs.keys():\n        print('arg:', key, 'has value:', kwargs[key])\n\
    ```\n\n```\nnamed(a=1, b=2, c=3)\n```\n\nIn this case, the `named` function only\
    \ supports the provision of keyword arguments. Its output in the above case is:\n\
    \n```\narg: a has value: 1\narg: c has value: 3\narg: b has value: 2\n```\n\n\
    In general, these facilities are most likely to be used by those creating libraries\
    \ as they allow for great flexibility in how the library can be used.\n\n## 12.10\
    \ Anonymous Functions\n\nAll the functions we have defined in this chapter have\
    \ had a *name* that they can be referenced by, such as `greeter` or `get_integer_input`.\
    \ This means that we can reference and reuse these functions as many times as\
    \ we like.\n\nHowever, in some cases we want to create a function and use it only\
    \ once; giving it a name for this one time can *pollute* the namespace of the\
    \ program (i.e., there are lots of names around) and also means that someone might\
    \ call it when we don't expect them to.\n\nPython therefore has another option\
    \ when defining a function; it is possible to define an *anonymous* function.\
    \ In Python an anonymous function is one that does not have a name and can only\
    \ be used at the point that it is defined.\n\nAnonymous functions are defined\
    \ using the keyword `lambda`, and for this reason they are also known as lambda\
    \ functions.\n\nThe syntax used to define an anonymous function is:\n\n```\nlambda\
    \ arguments: expression\n```\n\nAnonymous functions can have any number of arguments\
    \ but only one expression (that is a statement that returns a value) as their\
    \ body. The expression is executed, and the value generated from it is returned\
    \ as the result of the function.\n\nAs an example, let us define an anonymous\
    \ function that will square a number:\n\n```\ndouble = lambda i : i * i\n```\n\
    \nIn this example the lambda definition indicates that there is one parameter\
    \ to the anonymous function ('i') and that the body of the function is defined\
    \ after the colon ':' which multiples `i * i`; the value of which is returned\
    \ as the result of the function. The whole anonymous function is then stored into\
    \ a variable called double.\n\nWe can store the anonymous function into the variable\
    \ as all functions are instances of the class function and can be referenced in\
    \ this way (we just haven't done this so far).\n\nTo invoke the function, we can\
    \ access the reference to the function held in the variable `double` and then\
    \ use the round brackets to cause the function to be executed, passing in any\
    \ values to be used for the parameters:\n\n```\nprint(double(10))\n```\n\nWhen\
    \ this is executed the value 100 is printed out.\nOther examples of lambda/anonymous\
    \ functions are given below (illustrating that an anonymous function can take\
    \ any number of arguments):\n\n```\nfunc0 = lambda: print('no args')\nfunc1 =\
    \ lambda x: x * x\nfunc2 = lambda x, y: x * y\nfunc3 = lambda x, y, z: x + y +\
    \ z\n```\n\nThese can be used as shown below:\n\n```\nfunc0()\nprint(func1(4))\n\
    print(func2(3, 4))\nprint(func3(2, 3, 4))\n```\n\nThe output from this code snippet\
    \ is:\n\n```\nno args\n16\n12\n9\n```\n\n## 12.11 Online Resources\n\nSee the\
    \ Python Standard Library documentation for:\n\n- https://docs.python.org/3/library/functions.html\
    \ for a list of built-in functions in Python.\n- https://www.w3schools.com/python/python_functions.asp\
    \ the W3 Schools brief introduction to Python functions.\n- https://www.w3schools.com/python/python_lambda.asp\
    \ a short summary of lambda functions.\n- https://devguide.python.org/documentation/markup\
    \ for information on reStructured Text style docstrings.\n\n## 12.12 Exercises\n\
    \nFor this chapter the exercises involve the `number_guess_game` you created in\
    \ the last chapter:\n\nTake the number guess game and break it up into a number\
    \ of functions. There is not necessarily a right or wrong way to do this; look\
    \ for functions that are meaningful to you within the code, for example:\n\n-\
    \ 1. You could create a function to obtain input from the user.\n- 2. You could\
    \ create another function that will implement the main game playing loop.\n- 3.\
    \ You could also provide a function that will print out a message indicating if\
    \ the player won or not.\n- 4. You could create a function to print a welcome\
    \ message when the game starts up.\n\n# Chapter 13\nScope and Lifetime of Variables\n\
    \n## 13.1 Introduction\n\nWe have already defined several variables in the examples\
    \ we have been working within this book. In practice, most of these variables\
    \ have been what are known as global variables. That is they are (potentially)\
    \ accessible anywhere (or globally) in our programs.\nIn this chapter we will\
    \ look again at local variable as defined within a function, at global variable\
    \ and how they can be referenced within a function, and finally we will consider\
    \ nonlocal variables.\n\n## 13.2 Local Variables\n\nIn practice developers usually\
    \ try to limit the number of global variables in their programs as global variables\
    \ can be accessed anywhere and can be modified anywhere, and this can result in\
    \ unexpected behaviours (and has been the cause of many, many bugs in all sorts\
    \ of programs over the years).\nHowever, not all variables are global. When we\
    \ define a function, we can create variables which are scoped only to that function\
    \ and are not accessible or visible outside of the function. These variables are\
    \ referred to as local variables (as they are local to the function).\nThis is\
    \ a great help in developing more modular code which has been proven to be easier\
    \ to maintain and in fact develop and test."
  mdcn: "在这个示例中，我们使用了`title`和`prompt`的默认值，并改变了`message`和`name`的顺序。这完全合法，并产生以下输出：\n\
    \n```\nWelcome Dr Lloyd - We like Python\n```\n\n实际上，我们可以在Python中混合使用*位置*参数和*命名*参数，例如：\n\
    \n```\ngreeter('Lloyd', message = 'We like Python')\n```\n\n这里，'John'被绑定到`name`参数，因为它是第一个参数，但'We\
    \ like Python'被绑定到`message`参数，因为它是一个命名参数。\n然而，你不能在命名参数之后放置位置参数，所以我们不能这样写：\n\n\
    ```\ngreeter(name='John', 'We like Python')\n```\n\n因为这会导致Python生成一个错误。\n\n##\
    \ 12.9.4 任意参数\n\n在某些情况下，你不知道调用函数时会提供多少个参数。Python允许你向函数传递任意数量的参数，然后在函数内部处理这些参数。\n\
    要将参数列表定义为任意长度，需要使用星号（*）标记一个参数。例如：\n\n```\ndef greeter(*args):\n    for name in\
    \ args:\n        print('Welcome', name)\n\ngreeter('John', 'Denise', 'Phoebe',\
    \ 'Adam', 'Gryff', 'Jasmine')\n```\n\n这将生成\n\n```\nWelcome John\nWelcome Denise\n\
    Welcome Phoebe\nWelcome Adam\nWelcome Gryff\nWelcome Jasmine\n```\n\n请注意，这是`for`循环的另一种用法；但这次使用的是一系列字符串，而不是一系列整数。\n\
    \n## 12.9.5 位置参数和关键字参数\n\nPython中的一些函数被定义为方法的参数可以使用可变数量的位置参数或关键字参数来提供。这类函数有两个参数`*args`和`**kwargs`（分别用于位置参数和关键字参数）。\n\
    \n如果你不确定将提供多少个位置参数或关键字参数，它们会很有用。\n\n例如，函数`my_function`同时接受可变数量的位置参数和关键字参数：\n\n\
    ```\ndef my_function(*args, **kwargs):\n    for arg in args:\n        print('arg:',\
    \ arg)\n    for key in kwargs.keys():\n        print('key:', key, 'has value:\
    \ ', kwargs[key])\n```\n\n可以用任意数量的任一类型参数来调用它：\n\n```\nmy_function('John', 'Denise',\
    \ daughter='Phoebe', son='Adam')\nprint('-' * 50)\nmy_function('Paul', 'Fiona',\
    \ son_number_one='Andrew', son_number_two='James', daughter='Joselyn')\n```\n\n\
    这将产生输出：\n\n```\narg: John\narg: Denise\nkey: son has value: Adam\nkey: daughter\
    \ has value: Phoebe\n--------------------------------------------------\narg:\
    \ Paul\narg: Fiona\nkey: son_number_one has value: Andrew\nkey: son_number_two\
    \ has value: James\nkey: daughter has value: Joselyn\n```\n\n还要注意，用于参数的关键字不是固定的。\n\
    \n你也可以根据需要定义只使用`*args`和`**kwargs`中一种的方法（正如我们上面看到的`greeter()`函数），例如：\n\n```\ndef\
    \ named(**kwargs):\n    for key in kwargs.keys():\n        print('arg:', key,\
    \ 'has value:', kwargs[key])\n```\n\n```\nnamed(a=1, b=2, c=3)\n```\n\n在这种情况下，`named`函数只支持提供关键字参数。在上述情况下的输出是：\n\
    \n```\narg: a has value: 1\narg: c has value: 3\narg: b has value: 2\n```\n\n\
    总的来说，这些功能最有可能被创建库的人使用，因为它们允许库的使用方式具有极大的灵活性。\n\n## 12.10 匿名函数\n\n我们在本章中定义的所有函数都有一个可以被引用的*名称*，例如`greeter`或`get_integer_input`。这意味着我们可以根据需要多次引用和重用这些函数。\n\
    \n然而，在某些情况下，我们只想创建一个函数并只使用一次；为这一次使用给它命名可能会*污染*程序的命名空间（即，周围有很多名称），并且还意味着有人可能会在我们不期望的时候调用它。\n\
    \n因此，Python在定义函数时提供了另一种选择；可以定义一个*匿名*函数。在Python中，匿名函数是没有名称的函数，只能在定义它的位置使用。\n\n\
    匿名函数使用关键字`lambda`定义，因此也被称为lambda函数。\n\n定义匿名函数的语法是：\n\n```\nlambda arguments: expression\n\
    ```\n\n匿名函数可以有任意数量的参数，但只能有一个表达式（即返回值的语句）作为其主体。表达式被执行，从中生成的值作为函数的结果返回。\n\n例如，让我们定义一个匿名函数来计算一个数的平方：\n\
    \n```\ndouble = lambda i : i * i\n```\n\n在这个例子中，lambda定义表明匿名函数有一个参数（'i'），函数的主体定义在冒号':'之后，它计算`i\
    \ * i`；其值作为函数的结果返回。整个匿名函数然后被存储到一个名为double的变量中。\n\n我们可以将匿名函数存储到变量中，因为所有函数都是function类的实例，可以通过这种方式被引用（我们只是到现在为止还没有这样做）。\n\
    \n要调用函数，我们可以访问变量`double`中保存的函数引用，然后使用圆括号来执行函数，传入用于参数的任何值：\n\n```\nprint(double(10))\n\
    ```\n\n当执行时，将打印出值100。\n下面给出了lambda/匿名函数的其他示例（说明匿名函数可以接受任意数量的参数）：\n\n```\nfunc0\
    \ = lambda: print('no args')\nfunc1 = lambda x: x * x\nfunc2 = lambda x, y: x\
    \ * y\nfunc3 = lambda x, y, z: x + y + z\n```\n\n可以如下使用它们：\n\n```\nfunc0()\nprint(func1(4))\n\
    print(func2(3, 4))\nprint(func3(2, 3, 4))\n```\n\n此代码片段的输出是：\n\n```\nno args\n\
    16\n12\n9\n```\n\n## 12.11 在线资源\n\n有关以下内容，请参阅Python标准库文档：\n\n- https://docs.python.org/3/library/functions.html\
    \ 获取Python内置函数列表。\n- https://www.w3schools.com/python/python_functions.asp W3\
    \ Schools对Python函数的简要介绍。\n- https://www.w3schools.com/python/python_lambda.asp\
    \ 关于lambda函数的简短总结。\n- https://devguide.python.org/documentation/markup 有关reStructured\
    \ Text风格文档字符串的信息。\n\n## 12.12 练习\n\n本章的练习涉及你在上一章创建的`number_guess_game`：\n\n将数字猜测游戏分解成多个函数。这样做不一定有正确或错误的方法；在代码中寻找对你有意义的函数，例如：\n\
    \n- 1. 你可以创建一个函数来从用户那里获取输入。\n- 2. 你可以创建另一个函数来实现主要的游戏循环。\n- 3. 你还可以提供一个函数来打印一条消息，指示玩家是否获胜。\n\
    - 4. 你可以创建一个函数，在游戏启动时打印欢迎消息。\n\n# 第13章\n变量的作用域和生命周期\n\n## 13.1 引言\n\n我们已经在本书中一直在处理的示例中定义了几个变量。实际上，这些变量大多数都是所谓的全局变量。也就是说，它们（可能）在我们程序中的任何地方（或全局）都可以访问。\n\
    在本章中，我们将再次查看在函数内定义的局部变量、全局变量以及如何在函数内引用它们，最后我们将考虑非局部变量。\n\n## 13.2 局部变量\n\n实际上，开发人员通常会尝试限制程序中全局变量的数量，因为全局变量可以在任何地方被访问和修改，这可能导致意外行为（并且多年来一直是各种程序中许多许多错误的原因）。\n\
    然而，并非所有变量都是全局的。当我们定义一个函数时，我们可以创建仅在该函数范围内有效且在函数外部不可访问或不可见的变量。这些变量被称为局部变量（因为它们对函数是局部的）。\n\
    这在开发更模块化的代码方面非常有帮助，事实证明这种代码更易于维护，实际上也更易于开发和测试。"
