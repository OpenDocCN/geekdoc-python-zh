    \ (341 kB)\nCollecting numpy>=1.21.0\n  Downloading numpy-1.24.3-cp311-cp311-macosx_10_9_x86_64.whl\
    \ (19.8 MB)\n     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 19.8/19.8 MB 8.5 MB/s\
    \ eta 0:00:00\nCollecting six>=1.5\n  Using cached six-1.16.0-py2.py3-none-any.whl\
