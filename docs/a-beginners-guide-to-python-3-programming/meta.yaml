    ```


    The first three of these might be exactly what you expect given our earlier discussion;
    however, the output of the last example may seem a bit surprising, why does 3//2
    generate 1 but -3//2 generates -2?


    The answer is that Python always rounds the result of *integer* division towards
    minus infinity (which is the smallest negative number possible). This means it
    pulls the result of the integer division to the smallest possible number, 1 is
    smaller than 1.5 but -2 is smaller than -1.5.


