    # 12.8 ReStructured Text


    It is also possible to place *formatting* commands within a docstring that can
    be picked up by a tool such as PyCharm to improve the layout and information presented.
    There are several options available for this such as Google style docstrings and
    NumPy style docstrings (see [https://betterprogramming.pub/3-different-docstring-formats-for-python-d27be81e0d68](https://betterprogramming.pub/3-different-docstring-formats-for-python-d27be81e0d68)).
    However we are going to look at reStructured Text style docstrings as this is
    the style recommended by the Python organization itself.


    ReStructured Text (aka ReST) is intended to be an easy-to-read markup syntax used
    to add additional meaning to the text within a docstring. Like many other simple
    markup languages it uses inline markup such as `*` or a `#` to indicate emphasis
    or lists, etc. and as such is intended to be much simpler and easier to use than
    more complex markup languages such as HTML.'
