- md: "An operation is said to be *Referentially Transparent* if it can be replaced\
    \ with its corresponding value, without changing the program's behaviour, for\
    \ a given set of parameters.\n\nFor example, let us assume that we have defined\
    \ the function increment as shown below.\n\n```python\ndef increment(num):\n \
    \   return num + 1\n```\n\nIf we use this simple example in an application to\
    \ increment the value 5:\n\n```python\nprint(increment(5))\nprint(increment(5))\n\
    ```\n\nWe can say that the function is Referentially Transparent (or RT) if it\
    \ always returns the same result for the same value (i.e., that `increment(5)`\
    \ always returns 6):\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_195_0.png)\n\n\
    Any function that references a value which has been captured from its surrounding\
    \ context and which can be modified cannot be guaranteed to be RT. This can have\
    \ significant consequences for the maintainability of the resulting code. This\
    \ can happen if for example the increment function did not add 1 to the parameter\
    \ but added a global value. If this global value is changed then the function\
    \ would suddenly start to return different values for the previously entered parameters.\
    \ For example, the following code is no longer Referentially Transparent:\n\n\
    ```python\namount = 1\ndef increment(num):\n    return num + amount\n\nprint(increment(5))\n\
    amount = 2\nprint(increment(5))\n```\n\nThe output from this code is not 6 and\
    \ 7—as the value of amount has changed between calls to the `increment()` function.\n\
    \nA closely related idea is that of *No Side Effects*. That is, a function should\
    \ not have any side effects, it should base its operation purely on the values\
    \ it receives, and its only impact should be the result returned. Any hidden side\
    \ effects again makes software harder to maintain.\n\nOf course, within most applications\
    \ there is a significant need for side effects; for example, any logging of the\
    \ actions performed by a program has a side effect of updating some logged information\
    \ somewhere (typically in a file), and any database updates will have some side\
    \ effect (i.e., that of updating the database). In addition some behaviour is\
