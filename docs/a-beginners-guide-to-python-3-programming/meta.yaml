    \n这是一个生成器函数，它返回一个生成器对象，该对象封装了所需值的*生成*过程，但对开发者是隐藏的。\n\n#### 31.2.3 yield 语句何时执行？\n\
    \n考虑生成器函数内部发生的情况是很有趣的；实际上，每次 `yield` 语句提供一个值时，函数就会暂停，只有在收到下一个值请求时才会恢复。通过向 `gen_numbers()`\
    \ 函数添加一些额外的 `print` 语句可以看出这一点：\n\n```python\ndef gen_numbers2():\n    print('Start')\n\
    \    yield 1\n    print('Continue')\n    yield 2\n    print('Final')\n    yield\
