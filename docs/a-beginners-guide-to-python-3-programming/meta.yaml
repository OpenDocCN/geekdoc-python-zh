  - '[PAGE 182]


    # 14.5 Behaviour of the Calculator


    We can now explore what the operation of the calculator program should be.

    Essentially, we want to allow the user to be able to select the operation they
    want to perform and provide the two numbers to use with the operation and then
    for the program to call the appropriate function. The result of the operation
    should then be presented to the user.

    We then want to ask the user whether they want to continue to use the calculator
    or to exit the program. This is illustrated below in flowchart form:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_182_0.png)


    Based on this flowchart we can put in place the skeleton of the logic for the
    calculator''s processing cycle.

    We will need a while loop to determine whether the user has finished or not and
    a variable to hold the result and print it out.'
