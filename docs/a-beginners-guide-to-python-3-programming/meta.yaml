    ```\n\n# Chapter 39\n## Sorting and Higher-Order Functions\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_440_0.png)\n\
    \n## 39.1 Introduction\n\nThere are two built-in ways of sorting within Python:\
