    ## Chapter 7 Flow of Control Using if Statements


    ## 7.1 Introduction


    In this chapter we are going to look at the if statement in Python. This statement
    is used to control the flow of execution within a program based on some condition.
    These conditions represent some choice point that will be evaluated to True or
    False. To perform this evaluation it is common to use a comparison operator (for
    example to check to see if the temperature is greater than some threshold). In
    many cases these comparisons need to take into account several values and in these
    situations logical operators can be used to combine two or more comparison expressions
    together. This chapter first introduces comparison and logical operators before
    discussing the if statement itself.


    ## 7.2 Comparison Operators


    Before exploring if statements and various types of looping mechanism we need
    to discuss *comparison operators*. These are operators that return Boolean values.
    They are key to the conditional elements of flow of control statements such as
    if.

    A comparison operator is an operator that performs some form of test and returns
    True or False.

    These are operators that we use in everyday life all the time. For example, do
    I have enough money to buy lunch, or is this shoe in my size, etc.


    In Python there are a range of comparison operators represented by typically one
    or two characters. These are:


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | == | Tests if two values are equal | 3 == 3 |

    | != | Tests that two values are *not* equal to each other | 2 != 3 |

    | < | Tests to see if the left-hand value is less than the right-hand value |
    2 < 3 |

    | > | Tests if the left-hand value is greater than the right-hand value | 3 >
    2 |

    | <= | Tests if the left-hand value is less than *or* equal to the right-hand
    value | 3 <= 4 |

    | >= | Tests if the left-hand value is greater than or equal to the right-hand
    value | 5 >= 4 |


    ## 7.3 Logical Operators


    In addition to comparison operators, Python also has logical operators.

    Logical operators can be used to combine Boolean expressions together. Typically,
    they are used with comparison operators to create more complex conditions. Again,
    we use these every day for example we might consider whether we can afford an
    ice cream *and* whether we will be having our dinner soon, etc.

    There are three logical operators in Python these are listed below:


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | and | Returns True if both left and right are true | (3 < 4) and (5 > 4) |

    | or | Returns True if either the left or the right is true | (3 < 4) or (3 >
    5) |

    | not | Returns True if the value being tested is False | not 3 < 2 |


    ## 7.4 The If Statement


    An if statement is used as a form of conditional programming; something you probably
    do every day in the real world. That is, you need to decide whether you are going
    to have tea or coffee or to decide if you will have toast or a muffin for breakfast,
    etc. In each of these cases you are making a choice, usually based on some information
    such as I had coffee yesterday, so I will have tea today.

    In Python such choices are represented programmatically by the `if` condition
    statement.

    In this construct if some condition is true some action is performed, optionally
    if it is not true some other action may be performed instead.'
