    # 39.6 Changing the Sort Key


    So far all our examples have used the natural ordering of the values held in the
    iterable to be sorted. What if you want to order based on some other criteria,
    for example, based on the length of the string rather than the alphabetical order
    of strings? You can do this by specifying a function (either a named function
    or a lambda function) to be used to determine the value to be used when comparing
    elements in the list.


    For example, the following code illustrates how a list of strings is sorted by
    default as well as how it can be sorted based on string length:


    ```

    string_list = [''John'', ''Denise'', ''Phoebe'', ''Adam'']

    print(f''string list: {string_list}'')

    sorted_string_list1 = sorted(string_list)

    print(f''default ordering: {sorted_string_list1}'')

    ```'
