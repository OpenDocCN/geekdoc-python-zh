  md: '# 6.9 None Value


    Python has a special type, the `NoneType`, with a single value, `None`.

    This is used to represent null values or *nothingness*.

    It is not the same as `False`, or an empty string or `0`; it is a *non-value*.
    It can be used when you need to create a variable but don''t have an initial value
    for it. For example:


    ```

    winner = None

    ```


    You can then test for the presence of `None` using `is` and `is not`, for example:


    ```

    print(winner is None)

    ```


    This will print out `True` if and only if the variable `winner` is currently set
    to `None`.

    Alternatively you can also write:


    ```

    print(winner is not None)

    ```


    Which will print out `True` only if the value of `winner` is *not* `None`.

    Several example software using the value `None` and the `is` and `is not` operators
    are given below:


    ```

    winner = None

    print(''winner:'', winner)

    print(''winner is None:'', winner is None)

    print(''winner is not None:'', winner is not None)

    print(type(winner))

    print(''Set winner to True'')

    winner = True

    print(''winner:'', winner)

    print(''winner is None:'', winner is None)

    print(''winner is not None:'', winner is not None)

    print(type(winner))

    ```


    The output of this code snippet is:


    ```

    winner: None

    winner is None: True

    winner is not None: False

    <class ''NoneType''>

    Set winner to True

    winner: True

    winner is None: False

    winner is not None: True

    <class ''bool''>

    ```'
  merge: -1
