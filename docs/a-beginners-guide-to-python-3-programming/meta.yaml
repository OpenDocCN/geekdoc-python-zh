    # Chapter 18

    Introduction to Object Orientation


    ## 18.1 Introduction


    This chapter introduces the core concepts in Object Orientation. It defines the
    terminology used and attempts to clarify issues associated with hierarchies. It
    also discusses some of the perceived strengths and weaknesses of the object-oriented
    approach. It then offers some guidance on the approach to take in learning about
    objects.


    ## 18.2 Classes


    A class is one of the basic building blocks of Python. It is also a core concept
    in a style of programming known as Object-Oriented Programming (or OOP). OOP provides
    an approach to structuring programs/applications so that the data held, and the
    operations performed on that data are bundled together into classes and accessed
    via objects.


    As an example, in an OOP style program, employees might be represented by a class
    Employee where each employee has an id, a name, a department and a desk_number,
    etc. They might also have operations associated with them such as `take_a_holiday()`
    or `get_paid()`.


    In many cases classes are used to represent real-world entities (such as employees),
    but they do not need to, they can also represent more abstract concepts such as
    a transaction between one person and another (for example, an agreement to buy
    a meal).


    Classes act as *templates* which are used to construct instances or examples of
    a class of things. Each example of the class `Person` has a name, an age, an address,
    etc., but they have their own values for their name, age and address. For example,
    to represent the people in a family we might create a class Person with the name
    Paul, the age 52 and the address set to London. We may also create another Person
    object (instance) with the name Fiona, the age 48 and the address also of London
    and so on.


    An instance or object is therefore an example of a class. All instances/objects
    of a class possess the same data variables but contain their own data. Each instance
    of a class responds to the same set of requests.


    Classes allow programmers to specify the *structure* of an object (i.e., its attributes
    or fields, etc.) and its behaviour separately from the objects themselves.


    This is important, as it would be extremely time-consuming (as well as inefficient)
    for programmers to define each object individually. Instead, they define classes
    and create *instances* or *objects* of those classes.


    They can then store related data together in a named concept which makes it much
    easier to structure and maintain code.


    ## 18.3 What Are Classes for?


    We have already seen several types of data in Python such as integer, string,
    Boolean, etc. Each of these allowed us to hold a single item of data (such as
    the integer 42 or the string ‘John’ and the value `True`). However, how might
    we represent a Person, a Student or an Employee of a firm? One way we can do this
    is to use a class to represent them.


    As indicated above, we might represent any type of (more complex) data item use
    a combination of attributes (or fields) and behaviours. These attributes will
    use existing data types, these might be integers, strings, Booleans, floating-point
    numbers or other classes.


    For example, when defining the class `Person` we might give it:


    - a field or attribute for the person’s name,

    - a field or attribute for their age,

    - a field or attribute for their email,

    - some behaviour to give them a birthday (which will increment their age),

    - some behaviour to allow us to send them a message via their email,

    - etc.


    In Python classes are thus used:


    - as a template to create instances (or objects) of that class,

    - define instance methods or common behaviour for a class of objects,

    - define attributes or fields to hold data within the objects,

    - be sent messages.


    Objects (or instances), on the other hand, can:


    - be created from a class,

    - hold their own values for instance variables,

    - be sent messages,

    - execute instance methods,

    - may have many copies in the system (all with their own data).


    ### 18.3.1 What Should a Class Do?


    A class should accomplish one specific purpose; it should capture only one idea.
    If more than one idea is encapsulated in a class, you may reduce the chances for
    reuse, as well as contravene the laws of encapsulation in object-oriented systems.
    For example, you may have merged two concepts together so that one can directly
    access the data of another. This is rarely desirable.


    The following guidelines may help you to decide whether to split the class with
    which you are working. Look at the comment describing the class (if there is no
    class comment, this is a bad sign in itself). Consider the following points:


    - Is the description of the class short and clear? If not, is this a reflection
    on the class? Consider how the comment can be broken down into a series of short
    clear comments. Base the new classes around those comments.

    - If the comment is short and clear, do the class and instance variables make
    sense within the context of the comment? If they do not, then the class needs
    to be re-evaluated. It may be that the comment is inappropriate, or the class
    and instance variables inappropriate.

    - Look at how and where the attributes of the class are used. Is their use in
    line with the class comment? If not, then you should take appropriate action.


    ### 18.3.2 Class Terminology


    The following terms are used in Python (and other languages that support object
    orientation):


    - *Class* A class defines a combination of data and behaviour that operates on
    that data. A class acts as a template when creating new instances.

    - *Instance or object* An instance also known as an object is an example of a
    class. All instances of a class possess the same data fields/attributes but contain
    their own data values. Each instance of a class responds to the same set of requests.

    - *Attribute/field/instance variable* The data held by an object is represented
    by its attributes (also sometimes known as a field or an instance variable). The
    “state” of an object at any particular moment relates to the current values held
    by its attributes.

    - *Method* A method is a procedure defined within an object.

    - *Message* A message is sent to an object requesting some operation to be performed
    or some attribute to be accessed. It is a request to the object to do something
    or return something. However, it is up to the object to determine how to execute
    that request. A message may be considered akin to a procedure call in other languages.'
