    \ in the class used to create the instance. If the method is not defined there,\
    \ look in the class's parent. Keep doing this until you find a method which implements\
    \ the operation requested. This is the version which is used.\n\nAs a concrete\
    \ example, see the classes Person and Employee below; in which the `__str__()`\
    \ method in Person is overridden in Employee.\n\n```\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n    def __str__(self):\n\
    \        return self.name + ' is ' + str(self.age)\n\nclass Employee(Person):\n\
    \    def __init__(self, name, age, id):\n        super().__init__(name, age)\n\
    \        self.id = id\n    def __str__(self):\n        return self.name + ' is\
    \ ' + str(self.age) + ' - id(' + str(self.id) + ')'\n```\n\nInstances of these\
    \ classes will both be convertible to a string using `__str__()` but the version\
    \ used by instances of Employee will differ from that used with instances of Person,\
    \ for example:\n\n```\np = Person('John', 54)\nprint(p)\ne = Employee('Denise',\
    \ 51, 1234)\nprint(e)\n```\n\nGenerates as output:\n\n```\nJohn is 54\nDenise\
    \ is 51 - id(1234)\n```\n\nAs can be seen from this the Employee class prints\
    \ the name, age and id of the Employee while the Person class only prints the\
    \ name and age."
- md: "## 21.9 Extending Superclass Methods\n\nHowever, in the previous section we\
    \ had to duplicate the code in Person down in Employee so that we could convert\
    \ the name and age attributes into strings. However we can avoid this duplication\
    \ by invoking the parent class's method from within the child class version (as\
    \ we in fact did for the `__init__()` initializer). For example:\n\n```python\n\
    class Person:\n    def __init__(self, name, age):\n        self.name = name\n\
    \        self.age = age\n\n    def __str__(self):\n        return self.name +\
    \ ' is ' + str(self.age)\n\nclass Employee(Person):\n    def __init__(self, name,\
    \ age, id):\n        super().__init__(name, age)\n        self.id = id\n\n   \
    \ def __str__(self):\n        return super().__str__() + ' - id(' + str(self.id)\
    \ + ')'\n```\n\nIn this version of the code the Employee class's version of the\
    \ `__str__()` method first calls the parent class's version of this method and\
    \ then adds the location information to the string returned from that. This means\
    \ that we only have one location that converts name and age into a string. The\
    \ output from the code\n\n```python\np = Person('John', 54)\nprint(p)\ne = Employee('Denise',\
    \ 51, 1234)\nprint(e)\n```\n\nremains exactly the same:\n\n```\nJohn is 54\nDenise\
    \ is 51 - id(1234)\n```\n\n## 21.10 Inheritance-Oriented Naming Conventions\n\n\
    There are two naming conventions to be aware of with respect to Python classes\
    \ and inheritance. These are that\n\n- **Single underbar convention.** Methods\
    \ or instance variables/attributes (those accessed via `self`) whose names start\
    \ with a single underbar are considered to be protected, that is they are private\
    \ to the class but can be accessed from any subclass. Their scope is thus the\
    \ class and any subclasses (either direct subclasses or any level of sub subclass).\n\
    \n- **Double underbar convention.** Methods or instance variables/attributes (those\
    \ accessed via `self`) whose names start with a double underbar should be considered\
    \ *private* to that class and should not be called from outside of the class.\
    \ This includes any subclasses; private means private to the class and only to\
    \ that class.\n\nAny identifier of the form `__somename` (at least two leading\
    \ underscores and at most one trailing underscore) is textually replaced with\
    \ `_classname__somename`, where classname is the current class name with leading\
    \ underscore(s) stripped.\n\nPython does what is called name mangling to provide\
    \ some support for methods that start with a double underbar. This mangling is\
    \ done without regard to the syntactic position of the identifier, so it can be\
    \ used to define class-private instance and class variables, methods, variables\
    \ stored in globals, and even variables stored in instances.\n\n## 21.11 Python\
    \ and Multiple Inheritance\n\nPython supports the idea of multiple inheritance;\
    \ that is a class can inherit from one or more other classes (many object-oriented\
    \ languages limit inheritance to a single class such as Java and C#).\n\nThis\
    \ idea is illustrated by the following diagram:\n\n![Multiple Inheritance Diagram](img/bf6e2b02eb6625321d9af5664cea2d5d_259_0.png)\n\
    \nIn this case the class `ToyCar` inherits from the class `Car` and the class\
    \ `Toy`. In turn the `Car` and `Toy` classes inherit from the (default) base class\
    \ `object`.\n\nThe syntax for defining multiple inheritance in Python allows multiple\
    \ super-classes to be listed in the parent class list (defined by the brackets\
    \ following the class name). Each parent class is separated by a comma. The syntax\
    \ is thus:\n\n```python\nclass SubClassName(BaseClassName1, BaseClassName2, ...\
    \ BaseClassNameN):\n    class-body\n```\n\nFor example:\n\n```python\nclass Car:\n\
    \    \"\"\" Car \"\"\"\n\nclass Toy:\n    \"\"\" Toy \"\"\"\n\nclass ToyCar(Car,\
    \ Toy):\n    \"\"\" A Toy Car \"\"\"\n```\n\nWe can say that the class `ToyCar`\
    \ inherits all the attributes (data) and methods (behaviour) defined in classes\
    \ `Car`, `Toy` and `object`.\nOne of the fundamental questions that this raises\
    \ is how is inheritance of behaviour managed within a multiple inheritance hierarchy.\
    \ The challenge that multiple inheritance possesses is illustrated by adding a\
    \ couple of methods to the class hierarchy we are looking at. In this example\
    \ we have added the method `move()` to both the class `Car` and the class `Toy`:\n\
    \n![Multiple Inheritance with move()](img/bf6e2b02eb6625321d9af5664cea2d5d_260_0.png)\n\
    \nThe question here is which version of the method `move()` will be run when an\
    \ instance of the `ToyCar` class is instantiated and we call `toy_car.move()`?\n\
    This illustrates (a simple version of) the so-called \"diamond inheritance\" problem.\n\
    \nThe issue is that with multiple base classes from which attributes or methods\
    \ may be inherited, there is often ambiguity that must be resolved. Here, when\
    \ we create an instance of the class `ToyCar`, and call the `move()` method, does\
    \ this invoke the one inherited from the `Car` base class or from the `Toy` base\
    \ class?\n\nThe answer is that in Python 3, a *breadth first* search is used to\
    \ find methods defined in parent classes; this means that when the method `move()`\
    \ is called on `ToyCar`, it would first look in `Car`; it would then only look\
    \ in `Toy` if it could not find a method `move()` in `Car`. If it cannot find\
    \ the method in either `Car` or `Toy` it would then look in the class `object`.\n\
    \nAs a result, it will find the version in `Car` first and use that version. This\
    \ is shown below:\n\n```python\nclass Car:\n    def move(self):\n        print('Car\
    \ - move()')\n\nclass Toy:\n    def move(self):\n        print('Toy - move()')\n\
    \nclass ToyCar(Car, Toy):\n    \"\"\" A Toy Car \"\"\"\n\ntc = ToyCar()\ntc.move()\n\
    ```\n\nThe output of this is\n\n```\nCar - move()\n```\n\nHowever, if we alter\
    \ the order in which the `ToyCar` inherits from the parent classes such that we\
    \ swap `Toy` and `Car` around:\n\n```python\nclass ToyCar(Toy, Car):\n    \"\"\
    \" A Toy Car \"\"\"\n```\n\nThen the `Toy` class is searched first and the output\
    \ is changed to `Toy - move()`. This shows that the order in which a class inherits\
    \ from multiple classes is *significant* in Python.\n\n## 21.12 Multiple Inheritance\
    \ Considered Harmful\n\nAt first sight multiple inheritance in Python might appear\
    \ to be particularly useful; after all it allows you to mix together multiple\
    \ concepts into a single class very easily and quickly. This is certainly true,\
    \ and it can be a very flexible feature if used with care. However, the word *care*\
    \ is used here and should be noted.\n\nMultiple inheritance can also be very dangerous\
    \ and is quite a contentious topic for programmers and for those designing programming\
    \ languages. Few things in programming are inherently bad but multiple inheritance\
    \ can result in a level of complexity (and unexpected behaviour) that can tie\
    \ developers in knots.\n\nPart of the problem highlighted by those protesting\
    \ against multiple inheritance is down to the increased complexity and ambiguity\
    \ that can occur with multiple inheritance trees that may interconnect between\
    \ the different classes. One way to think of this is that if a class inherits\
    \ from multiple classes, then that class may have the same classes in the class\
    \ hierarchy multiple times, this can make it hard to determine which version of\
    \ a method may execute and this may allow bugs to go untouched or indeed introduce\
    \ unexpected issues due to different interactions between methods. This is exacerbated\
    \ when inherited methods call `super()` using the same method name such as:\n\n\
    ```python\ndef get_data(self):\n    return super().get_data() + 'FData'\n```\n\
    \nThe following diagram presents a somewhat convoluted multiple inheritance example\
    \ where the class names A-X have been used so that there is no semantic meaning\
    \ attributable to the inherited classes. Different classes define several common\
    \ methods (`print_info()` and `get_data()`).\n\nAll the classes in the hierarchy\
    \ define a `__str__()` method that returns the class name; if the class extends\
    \ a class other than object, then the super version of `__str__()` is also invoked:\n\
    \n![Complex Multiple Inheritance Diagram](img/bf6e2b02eb6625321d9af5664cea2d5d_262_0.png)\n\
    \nThe code for this class hierarchy is given at the end of the section to avoid\
    \ breaking up the flow.\n\nWe can now use the X class in a simple Python program:\n\
    \n```python\nx = X()\nprint('print(x):', x)\nprint('-' * 25)\nx.print_info()\n\
    ```\n\nThe question now is what is the output from this program?\nWhat is the\
    \ string printed to represent x? What is printed out as a result of calling the\
    \ method `print_info()`?\n\nThe output from this simple code is:\n\n```\nprint(x):\
    \ CGFHJX\n-------------------------\nHCDataGDataFData\n```\n\nHowever, if we change\
    \ the order of inheritance for the class 'H' from (F, G) to (G, F) then the output\
    \ changes:\n\n```\nprint(x): CFGHJX\n-------------------------\nHCDataFDataGData\n\
    ```\n\nThis is of course because the search order, back up through the class hierarchy,\
    \ is now different.\n\nNote that this change came about not because of a modification\
    \ we made to the class we instantiated (that is the class X), but from the order\
    \ of the classes that one of its parents inherited from. This can be one of the\
    \ unintended consequences of multiple inheritance; changing something in the multiple\
    \ class hierarchy at one level can break some behaviour further down the hierarchy\
    \ in a class that is unknown to the developer.\n\nAlso note that the class inheritance\
    \ diagram we presented earlier did not state what order the parent classes were\
    \ listed in for any specific class (this was left to the discretion of the programmer).\n\
    \nOf course Python is not ambiguous nor does it get confused; it is the human\
    \ developer that can get confused and be surprised with the behaviour that is\
    \ then presented. Indeed, if you try and define a class hierarchy which Python\
    \ cannot resolve into a consistent structure it will tell you so, for example:\n\
    \n```\nTraceback (most recent call last):\n  File \"multiple_inheritance_example.py\"\
    , line 65, in <module>\n    class Z(H, J):\nTypeError: Cannot create a consistent\
    \ method resolution\norder (MRO) for bases F, G\n```\n\nWhat can be confusing\
    \ is that Python's ability to produce a consistent structure can also be dependent\
    \ on the order of inheritance. For example, if we modify the classes that 'X'\
    \ inherits from such that the order is I and J:\n\n```python\nclass X(I, J):\n\
    ```"
  mdcn: "## 21.9 扩展超类方法\n\n然而，在上一节中，我们不得不在 `Employee` 类中重复 `Person` 类的代码，以便将 `name`\
    \ 和 `age` 属性转换为字符串。不过，我们可以通过在子类版本中调用父类的方法来避免这种重复（实际上我们在 `__init__()` 初始化器中就是这样做的）。例如：\n\
    \n```python\nclass Person:\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n\n    def __str__(self):\n        return self.name\
    \ + ' is ' + str(self.age)\n\nclass Employee(Person):\n    def __init__(self,\
    \ name, age, id):\n        super().__init__(name, age)\n        self.id = id\n\
    \n    def __str__(self):\n        return super().__str__() + ' - id(' + str(self.id)\
    \ + ')'\n```\n\n在这个版本的代码中，`Employee` 类的 `__str__()` 方法首先调用父类的该方法，然后将位置信息添加到该方法返回的字符串中。这意味着我们只有一个地方将\
    \ `name` 和 `age` 转换为字符串。代码的输出\n\n```python\np = Person('John', 54)\nprint(p)\n\
    e = Employee('Denise', 51, 1234)\nprint(e)\n```\n\n保持完全相同：\n\n```\nJohn is 54\n\
    Denise is 51 - id(1234)\n```\n\n## 21.10 面向继承的命名约定\n\n关于 Python 类和继承，有两个命名约定需要注意。它们是：\n\
    \n- **单下划线约定。** 名称以单下划线开头的方法或实例变量/属性（通过 `self` 访问的那些）被认为是受保护的，即它们对类是私有的，但可以从任何子类访问。因此，它们的作用域是该类及其任何子类（无论是直接子类还是任何级别的子子类）。\n\
    \n- **双下划线约定。** 名称以双下划线开头的方法或实例变量/属性（通过 `self` 访问的那些）应被视为该类的*私有*成员，不应从类外部调用。这包括任何子类；私有意味着仅对该类私有。\n\
    \n任何形如 `__somename`（至少两个前导下划线，最多一个尾随下划线）的标识符在文本上会被替换为 `_classname__somename`，其中\
    \ `classname` 是当前类名（去掉前导下划线）。\n\nPython 执行所谓的名称修饰，为以双下划线开头的方法提供一些支持。这种修饰不考虑标识符的语法位置，因此可用于定义类私有的实例和类变量、方法、存储在全局变量中的变量，甚至存储在实例中的变量。\n\
    \n## 21.11 Python 与多重继承\n\nPython 支持多重继承的概念；即一个类可以从一个或多个其他类继承（许多面向对象语言将继承限制为单个类，如\
    \ Java 和 C#）。\n\n这个概念由下图说明：\n\n![多重继承图示](img/bf6e2b02eb6625321d9af5664cea2d5d_259_0.png)\n\
    \n在这种情况下，`ToyCar` 类继承自 `Car` 类和 `Toy` 类。而 `Car` 和 `Toy` 类又继承自（默认的）基类 `object`。\n\
    \n在 Python 中定义多重继承的语法允许在父类列表（由类名后的括号定义）中列出多个超类。每个父类用逗号分隔。因此语法如下：\n\n```python\n\
    class SubClassName(BaseClassName1, BaseClassName2, ... BaseClassNameN):\n    class-body\n\
    ```\n\n例如：\n\n```python\nclass Car:\n    \"\"\" Car \"\"\"\n\nclass Toy:\n   \
    \ \"\"\" Toy \"\"\"\n\nclass ToyCar(Car, Toy):\n    \"\"\" A Toy Car \"\"\"\n\
    ```\n\n我们可以说 `ToyCar` 类继承了 `Car`、`Toy` 和 `object` 类中定义的所有属性（数据）和方法（行为）。\n这引发的一个基本问题是，在多重继承层次结构中，行为的继承是如何管理的。多重继承带来的挑战可以通过在我们正在研究的类层次结构中添加几个方法来说明。在这个例子中，我们向\
    \ `Car` 类和 `Toy` 类都添加了 `move()` 方法：\n\n![带有 move() 的多重继承](img/bf6e2b02eb6625321d9af5664cea2d5d_260_0.png)\n\
    \n这里的问题是，当 `ToyCar` 类的一个实例被实例化并调用 `toy_car.move()` 时，将运行哪个版本的 `move()` 方法？\n这说明了（一个简单版本的）所谓的“菱形继承”问题。\n\
    \n问题在于，当有多个基类可以继承属性或方法时，通常存在必须解决的歧义。这里，当我们创建 `ToyCar` 类的一个实例并调用 `move()` 方法时，是调用从\
    \ `Car` 基类继承的那个，还是从 `Toy` 基类继承的那个？\n\n答案是，在 Python 3 中，使用*广度优先*搜索来查找在父类中定义的方法；这意味着当在\
    \ `ToyCar` 上调用 `move()` 方法时，它会首先在 `Car` 中查找；只有在 `Car` 中找不到 `move()` 方法时，才会在 `Toy`\
    \ 中查找。如果在 `Car` 或 `Toy` 中都找不到该方法，它将在 `object` 类中查找。\n\n因此，它会首先找到 `Car` 中的版本并使用该版本。如下所示：\n\
    \n```python\nclass Car:\n    def move(self):\n        print('Car - move()')\n\n\
    class Toy:\n    def move(self):\n        print('Toy - move()')\n\nclass ToyCar(Car,\
    \ Toy):\n    \"\"\" A Toy Car \"\"\"\n\ntc = ToyCar()\ntc.move()\n```\n\n输出为：\n\
    \n```\nCar - move()\n```\n\n然而，如果我们改变 `ToyCar` 继承父类的顺序，交换 `Toy` 和 `Car`：\n\n```python\n\
    class ToyCar(Toy, Car):\n    \"\"\" A Toy Car \"\"\"\n```\n\n那么首先搜索 `Toy` 类，输出变为\
    \ `Toy - move()`。这表明在 Python 中，一个类继承多个类的顺序是*重要的*。\n\n## 21.12 多重继承被认为有害\n\n乍一看，Python\
    \ 中的多重继承可能显得特别有用；毕竟它允许你非常容易和快速地将多个概念混合到一个类中。这当然是正确的，如果谨慎使用，它可能是一个非常灵活的特性。然而，这里使用了“谨慎”一词，应该注意。\n\
    \n多重继承也可能非常危险，并且对于程序员和编程语言设计者来说是一个相当有争议的话题。编程中很少有东西本质上是坏的，但多重继承可能导致一定程度的复杂性（和意外行为），这会让开发者陷入困境。\n\
    \n那些反对多重继承的人所强调的部分问题，源于多重继承树可能在不同类之间相互连接，从而增加的复杂性和歧义。思考这个问题的一种方式是，如果一个类从多个类继承，那么该类可能在类层次结构中多次拥有相同的类，这可能使得难以确定哪个版本的方法可能执行，并且可能允许\
    \ bug 未被发现，或者由于方法之间的不同交互而引入意想不到的问题。当继承的方法使用相同的方法名调用 `super()` 时，这种情况会加剧，例如：\n\n\
    ```python\ndef get_data(self):\n    return super().get_data() + 'FData'\n```\n\
    \n下图展示了一个有些复杂的多重继承示例，其中类名使用了 A-X，因此没有语义意义归属于被继承的类。不同的类定义了几个公共方法（`print_info()`\
    \ 和 `get_data()`）。\n\n层次结构中的所有类都定义了一个返回类名的 `__str__()` 方法；如果该类扩展了 `object` 以外的类，那么也会调用\
    \ `__str__()` 的超类版本：\n\n![复杂的多重继承图示](img/bf6e2b02eb6625321d9af5664cea2d5d_262_0.png)\n\
    \n为了避免打断流程，该类层次结构的代码在本节末尾给出。\n\n我们现在可以在一个简单的 Python 程序中使用 X 类：\n\n```python\n\
    x = X()\nprint('print(x):', x)\nprint('-' * 25)\nx.print_info()\n```\n\n现在的问题是，这个程序的输出是什么？\n\
    打印出来表示 x 的字符串是什么？调用 `print_info()` 方法的结果是什么？\n\n这段简单代码的输出是：\n\n```\nprint(x):\
    \ CGFHJX\n-------------------------\nHCDataGDataFData\n```\n\n然而，如果我们改变类 'H' 的继承顺序，从\
    \ (F, G) 变为 (G, F)，那么输出会改变：\n\n```\nprint(x): CFGHJX\n-------------------------\n\
    HCDataFDataGData\n```\n\n这当然是因为回溯类层次结构的搜索顺序现在不同了。\n\n请注意，这种改变不是因为我们对实例化的类（即类 X）进行了修改，而是由于其某个父类继承的类的顺序发生了变化。这可能是多重继承的意外后果之一；在多重类层次结构的某一层改变某些东西，可能会破坏层次结构中更下方某个类的某些行为，而开发者对此并不知情。\n\
    \n还要注意，我们之前展示的类继承图并没有说明任何特定类的父类列出的顺序（这留给了程序员自行决定）。\n\n当然，Python 既不模糊也不会混淆；是人类开发者可能会感到困惑，并对随后呈现的行为感到惊讶。事实上，如果你尝试定义一个\
    \ Python 无法解析为一致结构的类层次结构，它会告诉你，例如：\n\n```\nTraceback (most recent call last):\n\
    \  File \"multiple_inheritance_example.py\", line 65, in <module>\n    class Z(H,\
    \ J):\nTypeError: Cannot create a consistent method resolution\norder (MRO) for\
    \ bases F, G\n```\n\n令人困惑的是，Python 产生一致结构的能力也可能取决于继承的顺序。例如，如果我们修改 'X' 继承的类，使其顺序为\
    \ I 和 J：\n\n```python\nclass X(I, J):\n```"
