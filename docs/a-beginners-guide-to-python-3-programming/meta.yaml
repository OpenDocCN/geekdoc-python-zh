    \   print('we love even numbers')\nprint('Done')\n```\n\n当我们运行此代码时，得到\n\n```\n\
    0 hey its an even number\nwe love even numbers\n1 2 hey its an even number\nwe\
    \ love even numbers\n3 4 hey its an even number\nwe love even numbers\n5 6 hey\
    \ its an even number\nwe love even numbers\n7 8 hey its an even number\nwe love\
    \ even numbers\n9 Done\n```\n\n如你所见，我们仅在值为 0、2、4、6 和 8 时打印关于数字为偶数的消息。\n\n## 8.7\
    \ 带 Else 的 For 循环\n\nfor 循环可以在循环末尾有一个可选的 else 块。当且仅当序列中的所有项目都被处理时，else 部分才会执行。如果由于某种原因程序中发生错误（例如，语法错误）或者你中断了循环，for\
    \ 循环可能无法处理循环中的所有元素。\n这是一个带 else 部分的 for 循环示例：\n\n```python\n# Only print code\
