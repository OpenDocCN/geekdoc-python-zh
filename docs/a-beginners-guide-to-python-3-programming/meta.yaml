    \    def __init__(self, id):\n        self._id = id\n\n    @abstractmethod\n \
    \   def display(self): pass\n\n    @property\n    @abstractmethod\n    def id(self):\
    \ pass\n```\n\nThis is a more concise form and is typically used in modern Python.\n\
    \n# 25.4 Defining an Interface\n\nMany languages such as Java and C# have the\
    \ concept of an *interface* definition; this is a contract between the implementors\
    \ of an interface and the user of the implementation guaranteeing that certain\
    \ facilities will be provided.\nPython does *not* explicitly have the concept\
    \ of an interface contract (note here interface refers to the interface between\
    \ a class and the code that utilizes that class).\nHowever, it does have Abstract\
    \ Base Classes.\nAny Abstract Base Class that only has abstract methods or properties\
    \ in it can be treated as a contract that must be implemented (it can of course\
    \ also have concrete methods, properties and attributes; it is up to the developer).\
    \ However, as we know that Python will guarantee that any instances can only be\
    \ created from concrete classes, we can treat an ABC has behaving like a contract\
    \ between a class and those using that class.\nThis is an approach that is adopted\
    \ by numerous frameworks and libraries within Python.\n\n# 25.5 Virtual Subclasses\n\
    \nIn most object-oriented programming languages, for one class to be *treated*\
    \ as a subclass of another class it is necessary for the subclass to *extend*\
    \ the parent class. However, Python has a more relaxed approach to typing, as\
    \ is illustrated by the idea of *Duck Typing*.\nIn some situations however, it\
    \ is useful to be able to confirm that one type is a subclass of another or that\
    \ an instance is an instance of a specific type (which may come from the object's\
    \ class hierarchy) at runtime."
