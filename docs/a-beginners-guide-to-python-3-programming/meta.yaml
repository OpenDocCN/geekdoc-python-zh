    \ = self.value - other.value\n        return Quantity(new_value)\n    def __str__(self):\n\
    \        return 'Quantity[' + str(self.value) + ']'\n```\n\n使用这个类定义，我们可以创建两个 `Quantity`\
    \ 类型的实例并将它们相加：\n\n```\nq1 = Quantity(5)\nq2 = Quantity(10)\nprint('q1 =', q1,\
    \ ', q2 =', q2)\n\nq3 = q1 + q2\nprint('q3 =', q3)\n```\n\n如果我们运行这段代码片段，会得到：\n\
    \n```\nq1 = Quantity[5] , q2 = Quantity[10]\nq3 = Quantity[15]\n```\n\n注意，我们使\
    \ `Quantity` 类成为不可变的；也就是说，一旦创建了 `Quantity` 实例，其值就不能被更改（它是固定的）。\n这意味着当两个数量相加时，会创建一个新的\
