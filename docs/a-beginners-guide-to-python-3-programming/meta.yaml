  md: "# 40.10 Iterating Through Enumeration Values\n\nPython enums are *iterable*\
    \ things; this means that you can iterate through all the enum members very easily.\n\
    \nFor example, to iterate through all the members within the `DaysOfWeek` enum\
    \ we can write a for loop as shown below:\n\n```\nfor day in DaysOfWeek:\n   \
    \ print(day)\n```\n\nThe output from this is that each enum member will be printed\
    \ out in turn, for example:\n\n```\nDaysOfWeek.MONDAY\nDaysOfWeek.TUESDAY\nDaysOfWeek.WEDNESDAY\n\
    DaysOfWeek.THURSDAY\nDaysOfWeek.FRIDAY\n```\n\n# 40.11 Comparing Enumerations\n\
    \nBy default enumerated types support two types of comparison operators:\n\n+\
    \   - Identity, using the `is` and `is not` operators.\n- Equality, using the\
    \ `==` and `!=` operators.\n\nThe identity comparison relies on the fact that\
    \ each enum member is a unique instance of its enumeration class (in object-oriented\
    \ design terminology it is a singleton). This means that very fast identity comparisons\
    \ can be performed using the `is` and `is not` operators.\n\nFor example:\n\n\
    ```\nclass OperatingSystem(Enum):\n    UBUNTU = \"linux\"\n    MACOS = \"darwin\"\
    \n    WINDOWS = \"win\"\n    DEBIAN = \"linux\"\n\nos1 = OperatingSystem.UBUNTU\n\
    os2 = OperatingSystem.MACOS\nos3 = OperatingSystem.UBUNTU\nprint(os1 is os3)\n\
    print(os1 is os2)\nprint(os1 is not os2)\n```\n\nThe above checks that each of\
    \ the OperatingSystems enumerated values in the variables os1, os2 and os3 is\
    \ with the exact same instance of the OperatingSystem type or different. This\
    \ is very fast and efficient."
  merge: -1
