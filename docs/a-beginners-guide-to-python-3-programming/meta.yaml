    These collection types support various types of data structures (such as lists\
    \ and maps) and ways to process elements within those structures. This chapter\
    \ introduces the Python collection types.\n\n## 32.2 Python Collection Types\n\
    \nThere are four classes in Python that provide container like behaviour; that\
    \ is, data types for holding collections of other objects, these are\n\n- **Tuples**\
    \ A Tuple represents a collection of objects that are ordered and immutable (cannot\
    \ be modified). Tuples allow duplicate members and are indexed.\n- **Lists** Lists\
    \ hold a collection of objects that are ordered and mutable (changeable), and\
    \ they are indexed and allow duplicate members.\n- **Sets** Sets are a collection\
    \ that is unordered and unindexed. They are mutable (changeable) but do not allow\
    \ duplicate values to be held.\n- **Dictionary** A dictionary is an unordered\
    \ collection that is indexed by a *key* which references a *value*. The value\
    \ is returned when the *key* is provided. No duplicate keys are allowed. Duplicate\
    \ values are allowed. Dictionaries are mutable containers.\n\nRemember that everything\
    \ in Python is actually a type of object, integers are instances/objects of the\
    \ type int, strings are instances of the type string, etc. Thus, container types\
    \ such as `Set` can hold collections of any type of thing in Python.\n\n## 32.3\
    \ Characterising Collections\n\nCollections, or containers as they are sometimes\
    \ known, allow multiple values to be held together, but as indicated in the previous\
    \ section they have various characteristics which can be used to help identify\
    \ the most appropriate collection to use at any one time. These characteristics\
    \ are\n\n- *Ordered* or *unordered* that is there a maintained order to how the\
    \ members of the collection are held.\n- *Mutable* or *immutable* which means\
    \ whether the collection can be modified once out has been created or not.\n-\
    \ Does the collection allow duplicate values to be held or not.\n- Are the values\
    \ held in the collection associated with a numerical index or by a key.\n- Can\
    \ the size of the collection grow once created or not.\n\nBy using these characteristics\
    \ you can choose an appropriate container type/collection to use.\nLooking at\
    \ the four collection types introduced in the previous section we can consider\
    \ them against these characteristics.\n\n| Tuples | | Sets | |\n|---|---|---|---|\n\
    | | Ordered | | Unordered |\n| | Immutable | | Mutable |\n| | Allow duplicates\
    \ | | Do not allow duplicates |\n| | Indexed | | Not indexed |\n| | Fixed size\
    \ | | Growable |\n| Lists | | Dictionaries | |\n| | Ordered | | Ordered (from\
    \ 3.7) |\n| | Mutable | | Mutable |\n| | Allow duplicates | | Allow duplicate\
    \ values |\n| | Indexed | | Keyed |\n| | Growable | | Growable |\n\n## 32.4 Tuples\n\
    \nTuples, along with Lists, are probably one of Pythons' most used container types.\
    \ They will be present in almost any non-trivial Python program.\nTuples are an\
    \ immutable ordered collection of objects; that is, each element in a tuple has\
    \ a specific position (its index) and that position does not change over time.\
    \ Indeed, it is not possible to add or remove elements from the tuple once it\
    \ has been created.\nThe Python type that represents a tuple is `tuple`.\n\n###\
    \ 32.4.1 Creating Tuples\n\nTuples are defined using parentheses (i.e., round\
    \ brackets '( )') around the elements that make up the tuple, for example:\n\n\
    ```\ntup1 = (1, 3, 5, 7)\n```\n\nThis defines a new `tuple` which is referenced\
    \ by the variable `tup1`. The `tuple` contains exactly 4 elements (in this case\
    \ integers) with the first element in the tuple (the integer 1) having the index\
    \ 0 and the last element in the tuple (the integer 7) having the index 3. This\
    \ is illustrated below:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_377_0.png)\n\
    \n### 32.4.2 The Tuple() Constructor Function\n\nThe `tuple()` function can also\
    \ be used to create a new tuple from an iterable. An iterable is something that\
    \ implements the iterable protocol (see the last chapter).\nThis means that a\
    \ new tuple can be created from a `set`, a `list`, a `dict` (as these are all\
    \ *iterable* types) or any type that implements the iterable protocol.\n\nThe\
    \ syntax of the `tuple()` function is\n\n```\ntuple(iterable)\n```\n\nFor example:\n\
    \n```\nlist1 = [1, 2, 3]\nt1 = tuple(list1)\nprint(t1)\n```\n\nwhich generates\
    \ the output:\n\n```\n(1, 2, 3)\n```\n\nNote that in the above the square brackets\
    \ are used to represent a *list* of things (the list container type is described\
    \ in more detail later in this chapter).\n\n### 32.4.3 Accessing Elements of a\
    \ Tuple\n\nThe elements of a `tuple` can be accessed using an *index* in square\
    \ brackets. The index returns the object at that position, for example:\n\n```\n\
    print('tup1[0]:\\t', tup1[0])\nprint('tup1[1]:\\t', tup1[1])\nprint('tup1[2]:\\\
    t', tup1[2])\nprint('tup1[3]:\\t', tup1[3])\n```\n\nwhich generates the output\n\
    \n```\ntup1[0]:  1\ntup1[1]:  3\ntup1[2]:  5\ntup1[3]:  7\n```\n\n### 32.4.4 Creating\
    \ New Tuples from Existing Tuples\n\nIt is also possible to return what is known\
    \ as a slice from a `tuple`. This is a new `tuple` which is comprised of a subset\
    \ of the original `tuple`. This is done by providing the start and end indexes\
    \ for the slice, separated by a colon, within the index square brackets. For example:\n\
    \n```\nprint('tup1[1:3]:\\t', tup1[1:3])\n```\n\nWhich returns a new tuple of\
    \ two elements containing the elements from index 1 up to (but not including)\
    \ element 3. Note that the original tuple is not affected in any way (remember\
    \ its immutable so cannot be modified). The output of the above is thus:\n\n```\n\
    tup1[1:3]:    (3, 5)\n```\n\nThere are in fact numerous variations on the use\
    \ of the slicing indices. For example, if the first index is omitted it indicates\
    \ that the slice should start from the beginning of the tuple, while omitting\
    \ the last index indicates it should go to the end of the tuple.\n\n```\nprint('tup1[:3]:\\\
    t', tup1[:3])\nprint('tup1[1:]:\\t', tup1[1:])\n```\n\nwhich generates:\n\n```\n\
    tup1[:3]:    (1, 3, 5)\ntup1[1:]:    (3, 5, 7)\n```\n\nYou can reverse a tuple\
    \ using the ::-1 notation (again this returns a new tuple and has no effect on\
