  md: 'The output from the above example is:


    ```

    Hello Carol Smith, you got 75%

    ```


    Of course when ordering the values it is easy to get something wrong either because
    a developer might think the strings are indexed from 1 or just because they get
    the order wrong.


    An alternative approach is to use *named* values for the placeholders. In this
    approach the curly brackets surround the name of the value to be substituted,
    for example, {artist}. Then in the `format()` method a `key = value` pair is provided
    where the key is the name in the `format` string; this is shown below:


    ```

    # Can use named substitutions, order is not significant

    format_string = "{artist} sang {song} in {year}"

    print(format_string.format(artist=''Paloma Faith'',

    song=''Guilty'', year=2017))

    ```


    In this example the order no longer matters as the name associated with the parameter
    passed into the `format()` method is used to obtain the value to be substituted.
    In this case the output is:


    ```

    Paloma Faith sang Guilty in 2017

    ```


    It is also possible to indicate alignment and width within the format string.
    For example, if you wish to indicate a width to be left for a placeholder whatever
    the actual value supplied, you can do this using a colon (`:`) followed by the
    width to use. For example to specify a gap of 25 characters which can be filled
    with a substitute value you can use `{:25}` as shown below:


    ```

    print(''|{:25}|''.format(''25 characters width''))

    ```


    In the above the vertical bars are merely being used to indicate where the string
    starts and ends for reference, and they have no meaning within the format method.
    This produces the output:


    ```

    |25 characters width |

    ```


    Within this gap you can also indicate an alignment where:


    +   - < indicates left alignment (the default).

    - > indicates right alignment.

    - ^ indicates centered.


    These follow the colon (`:`) and come before the size of the gap to use, for example:


    ```

    print(''|{:<25}|''.format(''left aligned'')) # The default

    print(''|{:>25}|''.format(''right aligned''))

    print(''|{:^25}|''.format(''centered''))

    ```


    which produces:'
