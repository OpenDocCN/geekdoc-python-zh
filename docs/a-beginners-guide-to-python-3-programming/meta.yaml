  md: "# 10.6 Calculating Factorial Recursively\n\n```\nreturn res\nprint(factorial(5))\n\
    ```\n\nThe key to understanding this function is that it has:\n\n+   1. A termination\
    \ condition that is guaranteed to execute when the value of n is 1. This is the\
    \ base case; we cannot reduce the problem down any further as the factorial of\
    \ 1 is 1!\n2. The function recursively calls itself but with n − 1 as the argument;\
    \ this means each time it calls itself the value of n is smaller. Thus the value\
    \ returned from this call is the result of a smaller computation.\n\nTo clarify\
    \ how this works we can add some print statements (and a depth indicator) to the\
    \ function to indicate its behaviour:\n\n```\ndef factorial(n, depth = 1):\n \
    \   if n == 1:\n        print('\\t' * depth, 'Returning 1')\n        return 1\n\
    \    else:\n        print('\\t'*depth,'Recursively calling factorial(',n-1,')')\n\
    \        result = n * factorial(n-1, depth + 1)\n        print('\\t' * depth,\
    \ 'Returning:', result)\n        return result\n\nprint('Calling factorial( 5\
    \ )')\nprint(factorial(5))\n```\n\nWhen we run this version of the program then\
    \ the output is:\n\n```\nCalling factorial( 5 )\n    Recursively calling factorial(\
    \ 4 )\n        Recursively calling factorial( 3 )\n            Recursively calling\
