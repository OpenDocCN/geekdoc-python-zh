  md: '# Chapter 12

    Functions in Python


    # 12.1 Introduction


    As discussed in the last chapter, when you build an application of any size you
    will want to break it down into more manageable units, these units can then be
    worked on separately, tested and maintained separately. One way in which these
    units can be defined is as Python functions.

    This chapter will introduce Python functions, how they are defined, how they can
    be referenced and executed. It also considers how parameters work in Python functions
    and how values can be returned from functions. It also introduces lambda or anonymous
    functions.


    # 12.2 What are Functions?


    In Python functions are groups of related statements that can be called together,
    that typically perform a specific task and which may or may not take a set of
    parameters or return a value.

    Functions can be defined in one place and called or invoked in another. This helps
    to make code more modular and easier to understand.

    It also means that the same function can be called multiple times or in multiple
    locations. This helps to ensure that although a piece of functionality is used
    in multiple places, it is only defined once and only needs to be maintained and
    tested in one location.'
  merge: -1
  pgno: 155
- img_proc: true
  md: '# 12.3 How Functions Work


    We have said what they are and a little bit about why they might be good but not
    really how they work.


    When a function is called (or invoked) the flow of control a program jumps from
    where the function was called to the point where the function was defined. The
    body of the function is then executed before control returns back to where it
    was called from.


    As part of this process, all the values that were in place when the function was
    called are stored away (on something called the stack) so that if the function
    defines its own versions, they do not overwrite each other.


    The invocation of a function is illustrated below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_156_0.png)


    Each time when the call is made to `function_name()` the program flow jumps to
    the body of the function and executes the statements there. Once the function
    finishes it returns to the point at which the function was called.


    In the above this happens twice as the function is called at two separate points
    in the program.'
  merge: -1
  pgno: 156
