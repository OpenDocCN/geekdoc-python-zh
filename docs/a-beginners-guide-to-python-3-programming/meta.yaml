    # Chapter 43

    Monkey Patching


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_491_0.png)


    # 43.1 Introduction


    Monkey Patching is a term you might well come across when looking into Python
    further or when searching the web for Python related concepts. It relates to the
    ability in Python to extend the functionality associated with a class/type at
    runtime.

    Although not directly related to Monkey Patching; how Python looks up attributes
    and how this process can be managed is a useful aspect to understand. In particular,
    how to handle unknown attributes can be very useful in managing situations in
    which Monkey Patching might be used to solve an initial attribute incompatibility.

    This chapter explores both Monkey Patching and Python attribute lookup.


    # 43.2 What is Monkey Patching?


    Monkey Patching is the idea that it is possible to add behaviour to an existing
    object, at runtime, to meet some requirement that originally the type did not
    meet. This can happen for example as there is no fixed requirement for a class
    to implement all of protocol; in many cases a class may only implement as much
    of a protocol as is required to meet the current needs; if at a later stage, other
    elements of a protocol are required then they can be added.

    Of course, if this is likely to be a common occurrence then the features can be
    added to the class for use by everyone; but if not, then those features can be
    added dynamically at runtime to an object itself. This avoids the public interface
    of the type becoming cluttered with rarely used features/functionality.'
- md: "## 43.2.1 How Does Monkey Patching Work?\n\nPython is a dynamic language which\
    \ allows the definition of a type to change at runtime. As methods on objects\
    \ are in essence just another attribute of a class, albeit one that can be executed,\
    \ it is possible to add new functionality to a class by defining new attributes\
    \ that will hold references to the new behaviour.\n\n## 43.2.2 Monkey Patching\
    \ Example\n\nThe following class, Bag, implements a initialization method `__init__()`,\
    \ `__str__()` and the `__getitem__()` method used to support indexed access to\
    \ a container (or collection) type.\n\n```python\nclass Bag():\n    def __init__(self):\n\
    \        self.data = ['a', 'b', 'c']\n\n    def __getitem__(self, pos):\n    \
    \    return self.data[pos]\n\n    def __str__(self):\n        return 'Bag(' +\
    \ str(self.data) + ')'\n\nb = Bag()\nprint(b)\n```\n\nThis creates a Bag object\
    \ and prints out the contents of the Bag:\n\n```\nBag(['a', 'b', 'c'])\n```\n\n\
    However, if we try to run\n\n```python\nprint(len(b))\n```\n\nWe will get a runtime\
    \ error:\n\n```\nTraceback (most recent call last):\n  File \"Bag.py\", line 12,\
    \ in <module>\n    print(len(b))\nTypeError: object of type 'Bag' has no len()\n\
    ```\n\nThis is because the `len()` function expects the object passed to it will\
    \ implement the `__len__()` method that is used to obtain its length. In this\
    \ case the class Bag does not implement this method.\n\nHowever, we can define\
    \ a stand-alone function that behaves in the way we would need the Bag to calculate\
    \ its length, for example:\n\n```python\ndef get_length(self):\n    return len(self.data)\n\
    ```\n\nThis function takes a single parameter which we have called `self`. It\
    \ then uses this parameter to reference an attribute called `data` which itself\
    \ uses `len()` to return the length of the associated data items.\n\nAt present\
    \ this function has no relationship to the `Bag` class other than the fact that\
    \ it assumes that whatever is passed into it will have an attribute called `data`—which\
    \ the `Bag` class does.\n\nIn fact, the `get_length()` function is compatible\
    \ with any class that has an attribute `data` that can be used to determine its\
    \ length.\n\nWe can now associate it with the `Bag` class; this can be done by\
    \ assigning the function reference (in practice the function name) to an appropriate\
    \ attribute on the `Bag` class. Since the `len` function expects a class to implement\
    \ the `__len__()` method we can assign the `get_length()` function to the `__len__()`\
    \ attribute. This effectively adds a *new* method to the `Bag` class with the\
    \ signature `__len__(self)`:\n\n```python\n# Monkey patching\nBag.__len__ = get_length\n\
    ```\n\nNow when we invoke\n\n```python\nprint(len(b))\n```\n\nWe get the value\
    \ 3 being printed out.\nWe have now Monkey Patched the class `Bag` so that the\
    \ missing method becomes available.\n\n## 43.2.3 The Self Parameter\n\nOne of\
    \ the reasons that Monkey Patching works is because all methods receive the special\
    \ first parameter (called `self` by convention) representing the object itself.\
    \ This means that any function that treats the first parameter as being a reference\
    \ to an object can potentially be used to define a method on a class.\n\nIf a\
    \ function does not assume that the first parameter is a reference to an object\
    \ (the one holding the method) then it cannot be used to add new functionality\
    \ to a class.\n\n## 43.2.4 Adding New Data to a Class\n\nMonkey Patching is not\
    \ just limited to functionality; it is also possible to add new data attributes\
    \ to a class. For example, if we wanted each `Bag` to have a `name` then we could\
    \ add a new attribute to the class to hold its name:\n\n```python\nBag.name =\
    \ 'My Bag'\nprint(b.name)\n```\n\nWhich prints out the string 'My Bag' which now\
    \ acts as a default value of the name of any `Bag`. Once the attribute is added\
    \ we can then change the name of this particular instance of a `Bag`:\n\nFor example,\
    \ if we extend the above example:\n\n```python\nBag.name = 'My Bag'\nprint(b.name)\n\
    \nb.name = 'Johns Bag'\nprint(b.name)\n\nb2 = Bag()\nprint(b2.name)\n```\n\nWe\
    \ can now generate\n\n```\nMy Bag\nJohns Bag\nMy Bag\n```\n\n## 43.3 Online Resources\n\
    \nFor further information on Monkey Patching the following resources may be of\
    \ interest:\n\n- https://en.wikipedia.org/wiki/Monkey_patch Wikipedia page on\
    \ Monkey Patching.\n- http://net-informations.com/python/iq/patching.htm A discussion\
    \ on whether Monkey Patching should be considered good or bad practice.\n\n# Chapter\
    \ 44\nAttribute Lookup\n\n## 44.1 Introduction\n\nCompared to static compile languages\
    \ such as Java and C# Python is a dynamic and flexible language. This is also\
    \ true of how attributes within a class definition are handled. In this chapter\
    \ we will look in more detail about how Python manages attributes and method lookups,\
    \ how unknown attribute and method lookup are handled and how you can intercept\
    \ such lookups yourself.\n\n## 44.2 Attributes in Python\n\nAs shown in the last\
    \ chapter, Python is very dynamic and it is easy to add attributes and methods\
    \ to a class, but how does this work. It is worth briefly digressing and considering\
    \ how Python manages attribute and method lookup for an object.\n\nPython classes\
    \ can have both *class* and *instance* oriented attributes, for example the following\
    \ class `Student` has a *class* attribute `count` (that is associated with the\
    \ class itself) and an *instance* or *object* attribute `name`. Thus each instance\
    \ of the class `Student` will have its own `name` attribute.\n\n```python\nclass\
    \ Student:\n    count = 0\n\n    def __init__(self, name):\n        self.name\
    \ = name\n        Student.count += 1\n```\n\nWhenever an instance of the class\
    \ `Student` is created the `Student.count` attribute will be incremented by 1.\n\
    \nTo manage these attributes Python maintains internal dictionaries; one for *class*\
    \ attributes and one for *object* attributes. These dictionaries are called `__dict__`\
    \ and can be accessed either from the class `<class>.__dict__` (for class attributes)\
    \ or from an instance of the class `<instance>.__dict__` (for object attributes).\
    \ For example:\n\n```python\nstudent = Student('John')\n\n# Class attribute dictionary\n\
    print('Student.__dict__:', Student.__dict__)\n# Instance / Object dictionary\n\
    print('student.__dict__:', student.__dict__)\n```\n\nWhich produces the output\
    \ shown below (note that the class dictionary holds more information than just\
    \ the class attribute count):\n\n```\nStudent.__dict__: {'__module__': '__main__',\
    \ 'count': 1, '__init__': <function Student.__init__ at 0x10d515158>, '__dict__':\
    \ <attribute '__dict__' of 'Student' objects>, '__weakref__': <attribute '__weakref__'\
    \ of 'Student' objects>, '__doc__': None}\nstudent.__dict__: {'name': 'John'}\n\
    ```\n\nTo look up an attribute Python does the following for class attributes:\n\
    \n1. Search the class dictionary for an attribute\n2. If the attribute is *not*\
    \ found in step 1 then search the parent class(es) dictionaries.\n\nFor object\
    \ attributes, Python first searches the instance dictionary and repeats the above\
    \ steps, it thus performs these steps:\n\n1. Search the object/instance dictionary\n\
    2. If the attribute was *not* found in step 1, then search the class dictionary\
    \ for an attribute\n3. If the attribute is *not* found in step 2, then search\
    \ the parent class(es) dictionaries.\n\nThus given the following statements, different\
    \ steps are taken each time:\n\n```python\nstudent = Student('John')\n\nprint('Student.count:',\
    \ Student.count) # class lookup\nprint('student.name:', student.name) # instance\
    \ lookup\nprint('student.count:', student.count) # lookup finds class attribute\n\
    ```\n\nThe output as expected is that either attempt to access the class attribute\
    \ `count` will result in the value 1 whereas the object attribute name returns\
    \ 'John'.\n\n```\nStudent.count: 1\nstudent.name: John\nstudent.count: 1\n```\n\
    \nAs the dictionaries used to hold the class and object attributes are just that\
    \ dictionaries, they provide another way to access the attributes of a class such\
    \ as Student. That is you can write code that will access an attribute value using\
    \ the appropriate `__dict__` rather than the more usual *dot* notation, for example\
    \ the following are equivalent:\n\n```python\n# class lookup\nprint('Student.count:',\
    \ Student.count)\nprint(\"Student.__dict__['count']:\", Student.__dict__['count'])\n\
    \n# Instance/Object Lookup\nprint('student.name:', student.name)\nprint(\"student.__dict__['name']:\"\
    , student.__dict__['name'])\n```\n\nIn both cases the end result is that same,\
    \ either the class attribute count is accessed or the object/instance attribute\
    \ name is accessed:\n\n```\nStudent.count: 1\nStudent.__dict__['count']: 1\nstudent.name:\
    \ John\nstudent.__dict__['name']: John\n```\n\nHowever, accessing attributes via\
    \ the `__dict__` does not trigger a search process; it is instead a direct lookup\
    \ in the associated dictionary container. Thus if you try to access a class variable\
    \ via the objects `__dict__` then you will get an error. This is illustrated below\
    \ where we attempt to access the count class variable via the *student* object:\n\
    \n```python\n# Attempt to look up class variable via object\nprint('student.name:',\
    \ student.name)\nprint(\"student.__dict__['count']:\", student.__dict__['count'])\n\
    ```\n\nThis will generate a `KeyError` indicating that the object `__dict__` does\
    \ not hold a key called 'count':\n\n```\nTraceback (most recent call last):\n\
    \  File \"Student.py\", line 60, in <module>\n    print(\"student.__dict__['count']:\"\
    , student.__dict__['count'])\nKeyError: 'count'\n```"
  mdcn: "## 43.2.1 猴子补丁是如何工作的？\n\nPython 是一种动态语言，允许在运行时改变类型的定义。由于对象上的方法本质上只是类的另一个属性（尽管是可执行的），因此可以通过定义新的属性来为类添加新功能，这些属性将持有对新行为的引用。\n\
    \n## 43.2.2 猴子补丁示例\n\n以下 `Bag` 类实现了一个初始化方法 `__init__()`、`__str__()` 以及用于支持对容器（或集合）类型进行索引访问的\
    \ `__getitem__()` 方法。\n\n```python\nclass Bag():\n    def __init__(self):\n  \
    \      self.data = ['a', 'b', 'c']\n\n    def __getitem__(self, pos):\n      \
    \  return self.data[pos]\n\n    def __str__(self):\n        return 'Bag(' + str(self.data)\
    \ + ')'\n\nb = Bag()\nprint(b)\n```\n\n这将创建一个 Bag 对象并打印出 Bag 的内容：\n\n```\nBag(['a',\
    \ 'b', 'c'])\n```\n\n然而，如果我们尝试运行\n\n```python\nprint(len(b))\n```\n\n我们将得到一个运行时错误：\n\
    \n```\nTraceback (most recent call last):\n  File \"Bag.py\", line 12, in <module>\n\
    \    print(len(b))\nTypeError: object of type 'Bag' has no len()\n```\n\n这是因为\
    \ `len()` 函数期望传递给它的对象实现了 `__len__()` 方法，该方法用于获取其长度。在这种情况下，Bag 类没有实现此方法。\n\n但是，我们可以定义一个独立的函数，其行为方式符合我们希望\
    \ Bag 计算其长度的需求，例如：\n\n```python\ndef get_length(self):\n    return len(self.data)\n\
    ```\n\n此函数接受一个参数，我们称之为 `self`。然后它使用此参数来引用一个名为 `data` 的属性，该属性本身使用 `len()` 来返回关联数据项的长度。\n\
    \n目前，此函数与 `Bag` 类没有关系，除了它假设传入的任何对象都将具有一个名为 `data` 的属性——而 `Bag` 类确实有。\n\n事实上，`get_length()`\
    \ 函数与任何具有 `data` 属性的类兼容，该属性可用于确定其长度。\n\n我们现在可以将其与 `Bag` 类关联；这可以通过将函数引用（实际上是函数名）赋值给\
    \ `Bag` 类上的适当属性来完成。由于 `len` 函数期望类实现 `__len__()` 方法，我们可以将 `get_length()` 函数赋值给\
    \ `__len__()` 属性。这实际上为 `Bag` 类添加了一个具有签名 `__len__(self)` 的*新*方法：\n\n```python\n\
    # Monkey patching\nBag.__len__ = get_length\n```\n\n现在当我们调用\n\n```python\nprint(len(b))\n\
    ```\n\n我们将得到打印出的值 3。\n我们现在已经对 `Bag` 类进行了猴子补丁，使得缺失的方法变得可用。\n\n## 43.2.3 Self 参数\n\
    \n猴子补丁之所以有效，原因之一是所有方法都接收一个特殊的第一个参数（按惯例称为 `self`），该参数代表对象本身。这意味着任何将第一个参数视为对象引用的函数都有可能用于在类上定义方法。\n\
    \n如果一个函数不假设第一个参数是对象的引用（即持有该方法的对象），那么它就不能用于向类添加新功能。\n\n## 43.2.4 向类添加新数据\n\n猴子补丁不仅限于功能；也可以向类添加新的数据属性。例如，如果我们希望每个\
    \ `Bag` 都有一个 `name`，那么我们可以向类添加一个新属性来保存其名称：\n\n```python\nBag.name = 'My Bag'\n\
    print(b.name)\n```\n\n这将打印出字符串 'My Bag'，它现在充当任何 `Bag` 名称的默认值。一旦添加了属性，我们就可以更改此特定\
    \ `Bag` 实例的名称：\n\n例如，如果我们扩展上面的示例：\n\n```python\nBag.name = 'My Bag'\nprint(b.name)\n\
    \nb.name = 'Johns Bag'\nprint(b.name)\n\nb2 = Bag()\nprint(b2.name)\n```\n\n我们现在可以生成\n\
    \n```\nMy Bag\nJohns Bag\nMy Bag\n```\n\n## 43.3 在线资源\n\n有关猴子补丁的更多信息，以下资源可能有用：\n\
    \n- https://en.wikipedia.org/wiki/Monkey_patch 维基百科关于猴子补丁的页面。\n- http://net-informations.com/python/iq/patching.htm\
    \ 关于猴子补丁是否应被视为良好或不良实践的讨论。\n\n# 第 44 章\n属性查找\n\n## 44.1 简介\n\n与 Java 和 C# 等静态编译语言相比，Python\
    \ 是一种动态且灵活的语言。在类定义中处理属性的方式也是如此。在本章中，我们将更详细地了解 Python 如何管理属性和方法查找、如何处理未知属性和方法查找，以及如何自己拦截此类查找。\n\
    \n## 44.2 Python 中的属性\n\n如上一章所示，Python 非常动态，很容易向类添加属性和方法，但这是如何工作的呢？值得稍微离题一下，思考一下\
    \ Python 如何管理对象的属性和方法查找。\n\nPython 类可以同时具有*类*和*实例*导向的属性，例如以下 `Student` 类有一个*类*属性\
    \ `count`（与类本身关联）和一个*实例*或*对象*属性 `name`。因此，`Student` 类的每个实例都将有自己的 `name` 属性。\n\n\
    ```python\nclass Student:\n    count = 0\n\n    def __init__(self, name):\n  \
    \      self.name = name\n        Student.count += 1\n```\n\n每当创建 `Student` 类的实例时，`Student.count`\
    \ 属性将增加 1。\n\n为了管理这些属性，Python 维护内部字典；一个用于*类*属性，一个用于*对象*属性。这些字典称为 `__dict__`，可以从类\
    \ `<class>.__dict__`（用于类属性）或从类的实例 `<instance>.__dict__`（用于对象属性）访问。例如：\n\n```python\n\
    student = Student('John')\n\n# Class attribute dictionary\nprint('Student.__dict__:',\
    \ Student.__dict__)\n# Instance / Object dictionary\nprint('student.__dict__:',\
    \ student.__dict__)\n```\n\n产生如下所示的输出（请注意，类字典保存的信息不仅仅是类属性 count）：\n\n```\nStudent.__dict__:\
    \ {'__module__': '__main__', 'count': 1, '__init__': <function Student.__init__\
    \ at 0x10d515158>, '__dict__': <attribute '__dict__' of 'Student' objects>, '__weakref__':\
    \ <attribute '__weakref__' of 'Student' objects>, '__doc__': None}\nstudent.__dict__:\
    \ {'name': 'John'}\n```\n\n为了查找属性，Python 对类属性执行以下操作：\n\n1. 在类字典中搜索属性\n2. 如果在步骤\
    \ 1 中*未*找到该属性，则搜索父类的字典。\n\n对于对象属性，Python 首先搜索实例字典并重复上述步骤，因此它执行以下步骤：\n\n1. 搜索对象/实例字典\n\
    2. 如果在步骤 1 中*未*找到该属性，则在类字典中搜索属性\n3. 如果在步骤 2 中*未*找到该属性，则搜索父类的字典。\n\n因此，给定以下语句，每次采取不同的步骤：\n\
    \n```python\nstudent = Student('John')\n\nprint('Student.count:', Student.count)\
    \ # class lookup\nprint('student.name:', student.name) # instance lookup\nprint('student.count:',\
    \ student.count) # lookup finds class attribute\n```\n\n输出如预期，任何尝试访问类属性 `count`\
    \ 的操作都将导致值 1，而对象属性 name 返回 'John'。\n\n```\nStudent.count: 1\nstudent.name: John\n\
    student.count: 1\n```\n\n由于用于保存类和对象属性的字典就是字典，它们提供了另一种访问类（如 Student）属性的方式。也就是说，你可以编写代码，使用适当的\
    \ `__dict__` 而不是更常见的*点*表示法来访问属性值，例如以下代码是等效的：\n\n```python\n# class lookup\nprint('Student.count:',\
    \ Student.count)\nprint(\"Student.__dict__['count']:\", Student.__dict__['count'])\n\
    \n# Instance/Object Lookup\nprint('student.name:', student.name)\nprint(\"student.__dict__['name']:\"\
    , student.__dict__['name'])\n```\n\n在两种情况下，最终结果都是相同的，要么访问类属性 count，要么访问对象/实例属性\
    \ name：\n\n```\nStudent.count: 1\nStudent.__dict__['count']: 1\nstudent.name:\
    \ John\nstudent.__dict__['name']: John\n```\n\n然而，通过 `__dict__` 访问属性不会触发搜索过程；它是在关联的字典容器中直接查找。因此，如果你尝试通过对象的\
    \ `__dict__` 访问类变量，你将得到一个错误。下面说明了这一点，我们尝试通过 *student* 对象访问 count 类变量：\n\n```python\n\
    # Attempt to look up class variable via object\nprint('student.name:', student.name)\n\
    print(\"student.__dict__['count']:\", student.__dict__['count'])\n```\n\n这将生成一个\
    \ `KeyError`，表明对象 `__dict__` 不包含名为 'count' 的键：\n\n```\nTraceback (most recent\
    \ call last):\n  File \"Student.py\", line 60, in <module>\n    print(\"student.__dict__['count']:\"\
    , student.__dict__['count'])\nKeyError: 'count'\n```"
