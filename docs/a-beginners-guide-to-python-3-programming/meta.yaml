- img_proc: true
  md: "The issue is that with multiple base classes from which attributes or methods\
    \ may be inherited, there is often ambiguity that must be resolved. Here, when\
    \ we create an instance of the class `ToyCar`, and call the `move()` method, does\
    \ this invoke the one inherited from the `Car` base class or from the `Toy` base\
    \ class?\n\nThe answer is that in Python 3, a *breadth first* search is used to\
    \ find methods defined in parent classes; this means that when the method `move()`\
    \ is called on `ToyCar`, it would first look in `Car`; it would then only look\
    \ in `Toy` if it could not find a method `move()` in `Car`. If it cannot find\
    \ the method in either `Car` or `Toy` it would then look in the class `object`.\n\
    \nAs a result, it will find the version in `Car` first and use that version. This\
    \ is shown below:\n\n```\nclass Car:\n    def move(self):\n        print('Car\
    \ - move()')\n\nclass Toy:\n    def move(self):\n        print('Toy - move()')\n\
    \nclass ToyCar(Car, Toy):\n    \"\"\" A Toy Car \"\"\"\n\ntc = ToyCar()\ntc.move()\n\
    ```\n\nThe output of this is\n\n```\nCar - move()\n```\n\nHowever, if we alter\
    \ the order in which the `ToyCar` inherits from the parent classes such that we\
    \ swap `Toy` and `Car` around:\n\n```\nclass ToyCar(Toy, Car):\n    \"\"\" A Toy\
    \ Car \"\"\"\n```\n\nThen the `Toy` class is searched first and the output is\
    \ changed to `Toy—move()`. This shows that the order in which a class inherits\
    \ from multiple classes is *significant* In Python.\n\n# 21.12 Multiple Inheritance\
    \ Considered Harmful\n\nAt first sight multiple inheritance in Python might appear\
    \ to be particularly useful; after all it allows you to mix together multiple\
    \ concepts into a single class very easily and quickly. This is certainly true,\
    \ and it can be a very flexible feature if used with care. However, the word *care*\
    \ is used here and should be noted."
