    # 42.3 The Pip Tool


    The Python environment comes with a tool that is designed to help you install
    third-party libraries into your runtime. This tool is called `pip` (which stands
    for ''Pip Installs Python''). It had been a default part of the Python installation
    since Python 3.4 (prior to this it was itself considered a third-party tool).
    This tool is sometimes referred to as Python''s package manager, module installer
    or even the pip installer.


    Pip can install any third-party library. To do this pip downloads modules by default
    from a central repository called pypi.org (which stands for the Python Package
    Index—hence pypi—but pronounced pie pie.org). This is useful as it means that
    any module provided in this central repository is available to all Python developers
    wherever they are in the world.


    In fact pip can install modules from


    +   - pypi.org central repository,

    - version control system URLs (such as GitHub),

    - local project directories,

    - local or remote source archives.


    In addition, pip can install from a "requirements file" which is a useful way
    to specify a whole environment to be installed.


    The pip tool is also aware of dependencies between modules. That is if one module
    itself relies on another module being installed then it can install both modules.
    For example the `Pandas` module depends on (among others) the `NumPy` module,
    and thus when you install Pandas, then NumPy is installed for you (automatically).


    The `pip` command comes with several options that can be used to install and uninstall
    modules, reinstall modules, list currently installed modules, generate a report
    on the modules installed and any dependencies for the modules you require.'
