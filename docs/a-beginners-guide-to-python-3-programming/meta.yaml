  md: '# 27.4 Importing Python Modules


    # 27.4.1 Importing a Module


    A user-defined module is *not* automatically accessible to another file or script;
    it is necessary to import the module. Importing a module makes the functions,
    classes and variables defined in the module visible to the file they are imported
    into.


    For example, to import all the contents of the `utils` module into a file called
    `my_app.py` we can use:


    ```

    import utils

    ```


    Note that we do not give the file name (i.e. `utils.py`) instead we give the module
    name to import (which does not include the `.py`).


    The result is as shown below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_325_0.png)


    Once the definitions within the `utils` module are visible inside `my_app.py`
    we can use them as if they had been defined in the current file. Note that due
    to scoping the function, class and variable defined within the `utils` module
    will be prefixed by the name of the module; i.e. `utils.printer` and `utils.Shape`
    etc.:


    ```

    import import utils


    utils.printer(utils.default_shape)

    shape = utils.Shape(''circle'')

    utils.printer(shape)

    ```


    When we run the `my_app.py` file we will produce the following output:


    ```

    Hello I am the utils module

    printer

    Shape - square

    done

    printer

    Shape - circle

    ```


    Notice that the first line of the output is the output from the `print` statement
    in the `utils` module (i.e., the line `print(''Hello I am the utils module'')`)
    this illustrates the ability in Python to define behaviour that will be run'
