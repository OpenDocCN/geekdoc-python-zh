    wheel      0.40.0\nprojects %\n```\n\n这正是我们所预期的，我们不再使用虚拟环境，因此在该虚拟环境中定义的模块配置不再可用。当然，我们可以重新激活虚拟环境，我们将再次获得\
    \ Pandas 及其模块，等等。\n\n这允许开发人员为不同的程序/项目在不同的虚拟环境之间切换。\n\n## 42.7 列出和冻结模块\n\n有三个类似的\
    \ pip 工具可以提供有关虚拟环境中安装的模块的信息。这些命令是：\n\n- pip list — 这会生成已安装包的列表，列表按模块名称（区分大小写）的升序排列。\n\
    - pip inspect — 这会生成一个非常详细的输出文件，包含所有已安装模块的信息。\n- pip freeze — 这会生成 requirements\
    \ 格式的输出，可用于在另一个安装中重新生成当前虚拟环境的配置。\n\n下面将分别讨论每一个。\n\n### 42.7.1 pip list 命令\n\n\
    作为使用此命令的示例，我们将列出安装到上面创建的虚拟环境中的模块：\n\n```\n(genesis_venv) % pip list\nPackage \
    \          Version\n----------------- -------\nnumpy             1.24.3\npandas\
    \            2.0.1\npip               23.1.2\npython-dateutil   2.8.2\npytz  \
    \            2023.3\nsetuptools        67.6.1\nsix               1.16.0\ntzdata\
    \            2023.3\n(genesis_venv) projects %\n```\n\n这列出了所有已安装的模块及其安装的版本。\n\n\
    ### 42.7.2 pip inspect 命令\n\n如果需要，模块信息可以生成为 JSON 报告文件（JSON 代表 JavaScript 对象表示法），这是一种广泛用于信息交换和存储的数据格式。这可以使用\
    \ `pip inspect` 命令完成，例如：\n\n```\n(genesis_venv) % pip inspect\n{\n  \"version\"\
    : \"1\",\n  \"pip_version\": \"23.1.2\",\n  \"installed\": [\n    {\n      \"\
    metadata\": {\n        \"metadata_version\": \"2.1\",\n        \"name\": \"pip\"\
    ,\n        \"version\": \"23.1.2\",\n        \"summary\": \"The PyPA recommended\
    \ tool for installing Python packages.\",\n        \"description\": \"pip - The\
    \ Python Package Installer\n...\n}\n```\n\n上面展示了 JSON 数据输出的一部分，因为它相当广泛，以上内容说明了要点。\n\
    \n### 42.7.3 pip freeze 命令\n\n`pip freeze` 命令可用于创建 *requirements* 格式的文件。此文件包含有关已安装模块的信息，`pip`\
    \ 命令可以使用这些信息来配置另一个虚拟环境以包含相同的模块（以及这些模块的版本）。这允许两个用户共享他们的虚拟环境配置。\n\n例如：\n\n```\n\
    (genesis_venv)% pip freeze\nnumpy==1.24.3\npandas==2.0.1\npython-dateutil==2.8.2\n\
    pytz==2023.3\nsix==1.16.0\ntzdata==2023.3\n(genesis_venv) %\n```\n\n这会将每个已安装的模块打印到输出。如果我们希望将此信息存储到文件中，可以使用重定向箭头，例如：\n\
    \n```\n% pip freeze > johnsenv.txt\n```\n\n如果我们列出这个生成的 johnsenv.txt 文件的内容，我们可以看到它包含与上面输出相同的信息：\n\
    \n```\n% more johnsenv.txt\nnumpy==1.24.3\npandas==2.0.1\npython-dateutil==2.8.2\n\
    pytz==2023.3\nsix==1.16.0\ntzdata==2023.3\n```\n\n在上面的例子中，`more` 命令会将文件内容列到输出。\n\
    \n我们现在可以在另一个虚拟环境中使用此文件来设置该环境以使用相同的模块集，例如：\n\n```\n% python -m venv projvenv\n\
    % source projvenv/bin/activate\n(projvenv) % pip list\nPackage    Version\n----------\
    \ -------\npip        23.1.2\nsetuptools 67.6.1\n(projvenv) jeh@Johns-iMac projects\
    \ % pip install -r johnsenv.txt\nCollecting numpy==1.24.3 (from -r johnsenv.txt\
    \ (line 1))\n  Using cached numpy-1.24.3-cp311-cp311-macosx_10_9_x86_64.whl (19.8\
    \ MB)\nCollecting pandas==2.0.1 (from -r johnsenv.txt (line 2))\n  Using cached\
    \ pandas-2.0.1-cp311-cp311-macosx_10_9_x86_64.whl (11.6 MB)\nCollecting python-dateutil==2.8.2\
    \ (from -r johnsenv.txt (line 3))\n  Using cached python_dateutil-2.8.2-py2.py3-none-any.whl\
    \ (247 kB)\nCollecting pytz==2023.3 (from -r johnsenv.txt (line 4))\n  Using cached\
    \ pytz-2023.3-py2.py3-none-any.whl (502 kB)\nCollecting six==1.16.0 (from -r johnsenv.txt\
    \ (line 5))\n  Using cached six-1.16.0-py2.py3-none-any.whl (11 kB)\nCollecting\
