- md: '## Chapter 4

    A First Python Program


    ## 4.1 Introduction


    In this chapter we will return to the Hello World program from the last chapter
    and look at what it is doing. We will also modify it to become more interactive
    and will explore the concept of Python variables. We will cover concepts such
    as naming conventions, comments in code, and what as far as this book is concerned
    is the difference between a script and a program.


    ## 4.2 Hello World


    As mentioned in the previous chapter, it is traditional to get started in a new
    programming language with writing a *Hello World* style program. This is very
    useful as it ensures that your environment, that is, the interpreter, any environmental
    settings, your editor (or IDE), etc. is all set up appropriately and can process
    (or compile) and execute (or run) your program. As the ‘Hello World’ program is
    about the simplest program in any language, you are doing this without the complexities
    of the actual language being used.


    Our ‘Hello World’ program has already been presented in the previous chapter of
    this book, however we will return to it here and take a closer look at what is
    going on.


    In Python the simplest version of the *Hello World* program merely prints out
    a string with the welcome message:


    ```

    print(''Hello World'')

    ```


    You can use any text editor or Integrated Development Editor (IDE) to create a
    Python file. Examples of editors commonly used with Python include Emacs, Vim,
    Notepad++, Sublime Text or Visual Studio Code; examples of IDEs for Python include
    PyCharm and Eclipse. Using any of these tools we can create a file with a `.py`
    extension. Such a file can contain one or more Python statements that represent
    a Python program or script.


    For example, we can create a file called `hello.py` containing the above `print()`
    function in it.


    One question this raises is where does the `print()` function come from?


    In fact, `print()` is a predefined function that can be used to *print things
    out*, for example to the user. The output is actually printed to what is known
    as the output stream. This handles a stream (sequence) of data such as letters
    and numbers. This output stream of data can be sent to an output window such as
    the terminal on a Mac or command window on a Windows PC. In this case we are printing
    the string ‘Hello World’.


    By predefined here we mean that it is *built into* the Python environment and
    is understood by the Python interpreter. This means that the interpreter knows
    where to find the definition of the `print()` function which tells it what to
    do when it encounters the `print()` function.


    You can of course write your own functions, and we will be looking at how to do
    that later in this book.


    The `print()` function actually tries to print whatever you give it:


    - When it is given a string it will print a string.

    - If it is given an integer such as 42 it will print 42.

    - If it is given a real number such as 23.56 then it will print 23.56.


    Thus, when we run this program, the string ‘Hello World’ is printed out to the
    console window.


    Also note that the text forming the Hello World string is wrapped within two single
    quote characters; these characters delimit the start and end of the string; if
    you miss one of them out then there will be an error.


    To run the program, if you are using an IDE such as PyCharm, then you can click
    on the green arrow on the top right of the editor window (as long as the ‘Current
    File’ option is selected next to the arrow).


    If you are running it from the command line type in `python` followed by the name
    of the file, for example:


    ```

    > python hello.py

    ```


    This should be done in the directory where you created the file.


    ## 4.3 Interactive Hello World


    Let us make our program a little more interesting; let’s get it to ask us our
    name and say hello to us personally.


    The updated program is now listed below:


    ```

    print(''Hello World'')

    user_name = input(''Enter your name: '')

    print(''Hello '', user_name)

    ```


    Now after printing the original ‘Hello World’ string, the program then has two
    additional statements.


    The result of running this program is:


    ```

    Hello World

    Enter your name: John

    Hello John

    ```


    We will look at each of the new statements separately.

    The first statement is:


    ```

    user_name = input(''Enter your name: '')

    ```


    This statement does several things. It first executes another function called
    `input()`. This function has passed a string—which is known as an argument—to
    use when it prompts the user for input.


    This function `input()` is again a built-in function that is part of the Python
    language. In this case it will display the string you provide as a prompt to the
    user and wait until the user types something in followed by the return key.


    Whatever the user types in is then returned as the result of executing the `input()`
    function. In this case that result is then stored in the variable `user_name`.


    A variable is a named area of the computer’s memory that can be used to hold things
    (often referred to as data) such as strings, numbers, Boolean values such as `True`/`False`.
    In this case the variable `user_name` is acting as a label for an area of memory
    which will hold the string entered by the user. The basic idea is illustrated
    in the following diagram:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_67_0.png)


    This simplified picture illustrates how a variable, such as `user_name`, can reference
    an area of memory containing actual data. In this diagram the memory is shown
    as a two-dimensional grid of memory locations. Each location has an address associated
    with it. This address is unique within the memory and can be used to return to
    the data held at that location. This address is often referred to as the memory
    address of the data. It is this memory address that is actually held in the variable
    `user_name`; this is why the `user_name` variable is shown as pointing to the
    area in memory containing the string ‘John’.


    Thus the variable `user_name` allows us to access this area of memory easily and
    conveniently.


    For example, if we want to get hold of the name entered by the user in another
    statement, we can do so merely by referencing the variable name. Indeed, this
    is exactly what we do in the second statement we added to our program. This is
    shown below:


    ```

    print(''Hello'', user_name)

    ```


    The last statement again uses the built-in `print()` function, but this time it
    takes two arguments. This is because the `print()` function can actually take
    a variable number of arguments (data items that we pass into it). Each argument
    is separated by a comma. In this case we have passed in the string ‘Hello’ and
    whatever value is referenced by (present at the memory address indicated by) the
    variable `user_name`.


    Something to note is that Python is very case sensitive; thus the variable `My_Name`
    is not the same as `my_name`! As far as Python is concerned these are two completely
    separate variables, and you should therefore be very careful with the case you
    use. In general all keywords are lowercase, all variables should be lowercase,
    while most built-in types use lowercase names, and there are some built-in types
    that may use an initial capital letter.


    ## 4.4 Variables


    You may wonder why the element holding the user’s name above is referred to as
    a *variable*. It is called a *variable* because the value it references in memory
    can vary during the lifetime of the program.


    For example we can modify our *Hello World* program to ask the user for the name
    of their best friend and print out a welcome message to that best friend. If we
    want to, we can *reuse* the variable to hold the name of that best friend. For
    example:


    ```

    print(''Hello, world'')

    name = input(''Enter your name: '')

    print(''Hello'', name)

    name = input(''What is the name of your best friend: '')

    print(''Hello Best Friend'', name)

    ```


    When we run this version of the program and the user enters ‘John’ for their name
    and ‘Denise’ for their best friend’s name we will see:


    ```

    Hello, world

    Enter your name: John

    Hello John

    What is the name of your best friend: Denise

    Hello Best Friend Denise

    ```'
  mdcn: '## 第四章

    第一个 Python 程序


    ## 4.1 简介


    在本章中，我们将回到上一章的 Hello World 程序，并研究它的工作原理。我们还将修改它，使其更具交互性，并探讨 Python 变量的概念。我们将涵盖诸如命名约定、代码中的注释，以及就本书而言脚本与程序之间的区别等概念。


    ## 4.2 Hello World


    正如前一章所提到的，开始学习一门新的编程语言时，传统做法是编写一个 *Hello World* 风格的程序。这非常有用，因为它确保你的环境——即解释器、任何环境设置、你的编辑器（或
    IDE）等——都已正确设置，并且能够处理（或编译）和执行（或运行）你的程序。由于 ‘Hello World’ 程序是任何语言中最简单的程序之一，你可以在不涉及所用语言实际复杂性的情况下完成此操作。


    我们的 ‘Hello World’ 程序已在本书的前一章中介绍过，但我们将在此处重新审视它，并更仔细地研究其工作原理。


    在 Python 中，最简单的 *Hello World* 程序版本仅仅是打印出一个包含欢迎消息的字符串：


    ```

    print(''Hello World'')

    ```


    你可以使用任何文本编辑器或集成开发环境（IDE）来创建 Python 文件。常用于 Python 的编辑器示例包括 Emacs、Vim、Notepad++、Sublime
    Text 或 Visual Studio Code；Python 的 IDE 示例包括 PyCharm 和 Eclipse。使用这些工具中的任何一个，我们都可以创建一个扩展名为
    `.py` 的文件。这样的文件可以包含一个或多个代表 Python 程序或脚本的 Python 语句。


    例如，我们可以创建一个名为 `hello.py` 的文件，其中包含上述的 `print()` 函数。


    这引发了一个问题：`print()` 函数从何而来？


    事实上，`print()` 是一个预定义函数，可用于 *打印内容*，例如打印给用户。输出实际上是打印到所谓的输出流。这处理的是数据流（序列），例如字母和数字。这个数据输出流可以发送到输出窗口，例如
    Mac 上的终端或 Windows PC 上的命令窗口。在本例中，我们打印的是字符串 ‘Hello World’。


    这里的预定义意味着它 *内置于* Python 环境中，并且被 Python 解释器所理解。这意味着解释器知道在哪里可以找到 `print()` 函数的定义，该定义告诉它在遇到
    `print()` 函数时该做什么。


    当然，你可以编写自己的函数，我们将在本书后面介绍如何做到这一点。


    `print()` 函数实际上会尝试打印你传递给它的任何内容：


    - 当传递一个字符串时，它会打印一个字符串。

    - 如果传递一个整数，例如 42，它会打印 42。

    - 如果传递一个实数，例如 23.56，那么它会打印 23.56。


    因此，当我们运行这个程序时，字符串 ‘Hello World’ 会被打印到控制台窗口。


    还要注意，构成 Hello World 字符串的文本被包裹在两个单引号字符内；这些字符界定了字符串的开始和结束；如果你漏掉其中一个，将会出现错误。


    要运行该程序，如果你使用的是像 PyCharm 这样的 IDE，那么你可以点击编辑器窗口右上角的绿色箭头（只要箭头旁边选择了 ‘Current File’
    选项）。


    如果你从命令行运行它，请输入 `python` 后跟文件名，例如：


    ```

    > python hello.py

    ```


    这应该在你创建文件的目录中执行。


    ## 4.3 交互式 Hello World


    让我们使程序更有趣一点；让它询问我们的名字并向我们个人问好。


    更新后的程序现在列出如下：


    ```

    print(''Hello World'')

    user_name = input(''Enter your name: '')

    print(''Hello '', user_name)

    ```


    现在，在打印出原始的 ‘Hello World’ 字符串之后，程序还有两个额外的语句。


    运行此程序的结果是：


    ```

    Hello World

    Enter your name: John

    Hello John

    ```


    我们将分别查看每个新语句。

    第一个语句是：


    ```

    user_name = input(''Enter your name: '')

    ```


    这个语句做了几件事。它首先执行另一个名为 `input()` 的函数。这个函数被传递了一个字符串——称为参数——用于在提示用户输入时使用。


    这个 `input()` 函数同样是 Python 语言内置函数的一部分。在这种情况下，它将显示你提供的字符串作为提示给用户，并等待用户输入内容后按回车键。


    用户输入的任何内容都会作为执行 `input()` 函数的结果返回。在这种情况下，该结果随后被存储在变量 `user_name` 中。


    变量是计算机内存中的一个命名区域，可用于保存内容（通常称为数据），例如字符串、数字、布尔值如 `True`/`False`。在本例中，变量 `user_name`
    充当内存区域的标签，该区域将保存用户输入的字符串。基本概念如下图所示：


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_67_0.png)


    这个简化的图示说明了像 `user_name` 这样的变量如何可以引用包含实际数据的内存区域。在该图中，内存被显示为一个二维的内存位置网格。每个位置都有一个与之关联的地址。这个地址在内存中是唯一的，可用于返回到该位置保存的数据。这个地址通常被称为数据的内存地址。实际上存储在变量
    `user_name` 中的就是这个内存地址；这就是为什么 `user_name` 变量被显示为指向包含字符串 ‘John’ 的内存区域。


    因此，变量 `user_name` 使我们能够轻松方便地访问这个内存区域。


    例如，如果我们想在另一个语句中获取用户输入的名字，我们只需引用变量名即可。事实上，这正是我们在添加到程序的第二个语句中所做的。如下所示：


    ```

    print(''Hello'', user_name)

    ```


    最后一个语句再次使用了内置的 `print()` 函数，但这次它接受两个参数。这是因为 `print()` 函数实际上可以接受可变数量的参数（我们传递给它的数据项）。每个参数由逗号分隔。在本例中，我们传递了字符串
    ‘Hello’ 以及变量 `user_name` 引用的（由其指示的内存地址处存在的）任何值。


    需要注意的是，Python 对大小写非常敏感；因此变量 `My_Name` 与 `my_name` 不同！就 Python 而言，这是两个完全独立的变量，因此你应该非常小心使用大小写。通常，所有关键字都是小写的，所有变量都应该是小写的，而大多数内置类型使用小写名称，但也有一些内置类型可能使用首字母大写。


    ## 4.4 变量


    你可能想知道为什么保存用户姓名的元素被称为 *变量*。它被称为 *变量*，是因为它在内存中引用的值在程序的生命周期内可以变化。


    例如，我们可以修改我们的 *Hello World* 程序，询问用户他们最好朋友的名字，并向那位最好的朋友打印欢迎消息。如果我们愿意，我们可以 *重用* 这个变量来保存那位最好朋友的名字。例如：


    ```

    print(''Hello, world'')

    name = input(''Enter your name: '')

    print(''Hello'', name)

    name = input(''What is the name of your best friend: '')

    print(''Hello Best Friend'', name)

    ```


    当我们运行这个版本的程序，用户输入 ‘John’ 作为他们的名字，输入 ‘Denise’ 作为他们最好朋友的名字时，我们将看到：


    ```

    Hello, world

    Enter your name: John

    Hello John

    What is the name of your best friend: Denise

    Hello Best Friend Denise

    ```'
