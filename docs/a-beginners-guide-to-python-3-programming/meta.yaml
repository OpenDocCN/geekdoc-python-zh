    # 5.9 Formatting Using f-strings


    The simplest approach to string formatting was introduced in Python 3.6. For this
    version onward, a formatted string could be indicated by prefixing the string
    with the letter ‘f’. This so called f-string is then parsed by the Python runtime
    and allows data to be inserted into the string template. The values to be inserted
    are indicated using curly brackets {}. Within the curly brackets you can enter
    any valid Python expression; thus you can enter the name of a variable, an expression
    such as 3 + 5 or indeed call a Python function such as len(some_string). For example:


    ```

    name = "Natalia"

    age = 23


    message = f"Hello {name}, you are {age}"

    print(message)

    ```


    This code, when run, generates the following output:


    ```

    Natalia is 23 years old

    ```


    Another example illustrates the use of expressions within the curly brackets:


    ```

    welcome = ''Hello''

    message = f''The value of 2 + 3 is: {2 + 3}, the len of {welcome} is {len(welcome)}''

    print(message)

    ```


    The output of this is:


    ```

    The value of 2 + 3 is: 5, the len of Hello is 5

    ```


    A variation on this theme can be used to format floating point numbers. This approach
    uses format specifiers to indicate the width to use for the number and the number
    of decimal places (or precision) to include and a type specifier to indicate that
    you are using floating point numbers. This format is:


    ```

    f''{value:{width}.{precision}f}''

    ```


    where:


    +   - value is any expression that evaluates to a number.

    - width specifies the number of characters used in total to display, but if value
    needs more space than the width specifies then the additional space is used. This
    is an optional field as leaving it blank indicates that you want whatever space
    is required to be used.'
