    \ fruit from the above Counter collection we can use:\n\n```\nprint('fruit.most_common(1):',\
    \ fruit.most_common(1))\n```\n\nWhich generates:\n\n```\nfruit.most_common(1):\
    \ [('apple', 3)]\n```"
- md: "You can also perform some mathematical operations with multiple Counter objects.\
    \ For example, you can add and subtract Counter objects. You can also obtain a\
    \ combination of Counters that combines the maximum values from two Counter objects.\
    \ You can also generate an intersection of two Counters. These are all illustrated\
    \ below:\n\n```python\nfruit1 = collections.Counter(['apple', 'orange', 'pear',\
    \ 'orange'])\nfruit2 = collections.Counter(['banana', 'apple', 'apple'])\n\nprint('fruit1:',\
    \ fruit1)\nprint('fruit2:', fruit2)\n\nprint('fruit1 + fruit2:', fruit1 + fruit2)\n\
    print('fruit1 - fruit2:', fruit1 - fruit2)\n# Union (max(fruit1[n], fruit2[n]))\n\
    print('fruit1 | fruit2:', fruit1 | fruit2)\n# Intersection (min(fruit1[n], fruit2[n]))\n\
    print('fruit1 & fruit2:', fruit1 & fruit2)\n```\n\nWhich produces\n\n```\nfruit1:\
    \ Counter({'orange': 2, 'apple': 1, 'pear': 1})\nfruit2: Counter({'apple': 2,\
    \ 'banana': 1})\nfruit1 + fruit2: Counter({'apple': 3, 'orange': 2, 'pear': 1,\
    \ 'banana': 1})\nfruit1 - fruit2: Counter({'orange': 2, 'pear': 1})\nfruit1 |\
    \ fruit2: Counter({'apple': 2, 'orange': 2, 'pear': 1, 'banana': 1})\nfruit1 &\
    \ fruit2: Counter({'apple': 1})\n```\n\nOnce a Counter object has been created\
    \ you can test it to see if an item is present using the `in` keyword, for example:\n\
    \n```python\nprint('apple' in fruit)\n```\n\nYou can also add items to a Counter\
    \ object by accessing the value using the item as the key, for example:\n\n```python\n\
    fruit['apple'] = 1 # initializes the number of apples\nfruit['apple'] = + 1 #\
    \ Adds one to the number of apples\nfruit['apple'] = - 1 # Subtracts 1 from the\
    \ number of apples\n```\n\n## 36.3.2 The Defaultdict Container\n\nThe standard\
    \ `dict` container in Python will throw an exception if you try to access a key\
    \ that is not currently in the set of dictionary entries if you use the `[]` access\
    \ operator. In turn it will return `None` if you use the `get()` method for a\
    \ key that is currently not present.\n\nThe first of these could be dangerous\
    \ and the second may not be a suitable default value (although this second issue\
    \ can be changed in `dict`).\n\nThis is where the `collections.Defaultdict` comes\
    \ in. This container is a subclass of the default dictionary type and provides\
    \ a similar key-value dictionary behaviour. However, `Defaultdict` will *never*\
    \ raise a `KeyError` if a function is provided to generate the default value.\
    \ When creating a `Defaultdict` you should specify a function that will be used\
    \ to generate the default value so that you can customize its behaviour.\n\nTwo\
    \ examples are shown below, one using a `lambda` function (a very common approach)\
    \ and one using a named function:\n\n```python\ndays = defaultdict(lambda: -1)\n\
    days['Monday'] = 1\ndays['Tuesday'] = 2\n\nprint(days['Monday'])\nprint(days['Tuesday'])\n\
    print(days['Wednesday'])\n\ndef default_value():\n    return 'Not Known'\n\n#\
    \ Defining the dict\ncities = defaultdict(default_value)\ncities['England'] =\
    \ 'London'\ncities['Wales'] = 'Cardiff'\n\nprint(cities['England'])\nprint(cities['Wales'])\n\
    print(cities['Ireland'])\n```\n\nIn both cases there is a request to retrieve\
    \ a value for a missing key—'Wednesday' in the first example and 'Ireland' in\
    \ the second example. However, neither will raise a `KeyError` as both have a\
    \ function that will be used to generate the missing value. In the first example\
    \ the `lambda` function will return -1 and in the second example the `default_value()`\
    \ named function will return the string 'Not Known'.\n\nThe output from this code\
    \ snippet is\n\n```\n1\n2\n-1\nLondon\nCardiff\nNot Known\n```\n\n## 36.3.3 The\
    \ Namedtuple Container\n\nA namedtuple is a type of tuple (and thus immutable)\
    \ that has a set of names for each member in the tuple (although the use of positional\
    \ integer indexes is still available). As such it has some aspects of a dictionary\
    \ in that each member is a key: value pair.\n\nTo create a namedtuple you provide\
    \ the name of the tuple type being created and then an iterable of a list of names\
    \ for that tuple, for example:\n\n```python\nfrom collections import namedtuple\n\
    \n# Declaring namedtuple()\nStudent = namedtuple('Student', ['name', 'age', 'degree'])\n\
    \n# Adding values\nundergrad_student = Student('John', '21', 'Computer Science')\n\
    postgrad = Student(name='Denise', age=25, degree='PhD')\n\nprint(undergrad_student)\n\
    print(postgrad)\n\n# Access using index\nprint(f'Name via index (student[0]):\
    \ {undergrad_student[0]}')\n\n# Access using name\nprint(f'Name via named member\
    \ (student.name): {undergrad_student.name}')\n\n# Can field out the field names\
    \ using_fields\nprint(undergrad_student._fields)\n```\n\nThis code example creates\
    \ a new namedtuple called 'Student' and stores it into a variable called Student.\
    \ Note the capitalization, Student here represents a new namedtuple type and thus\
    \ follows the capitalization convention for user defined types.\n\nThe Student\
    \ namedtuple had the members name, age and degree.\n\nWhen we create a named student\
    \ instance we use the Student variable (which contains the newly created named\
    \ tuple) and provide a value for the name, age and degree members. The first instance\
    \ created for the undergraduate uses positional parameter passing to initialize\
    \ the member values. The second example uses named parameter passing to do the\
    \ same thing.\n\nWhen the namedtuple is printed out the default representation\
    \ will illustrate the name of the type and each of the key-value pairs.\n\nFollowing\
    \ this we illustrate how the values in the namedtuple can be accessed using both\
    \ positional indexing and named member access. This [0] and .name both access\
    \ the name element of the namedtuple Student.\n\nTo finish the example, the code\
    \ illustrates that it is possible to access a tuple of names in the namedtuple—this\
    \ can be useful for iteration or display to a user.\n\nThe output from this program\
    \ is\n\n```\nStudent(name='John', age='21', degree='Computer Science')\nStudent(name='Denise',\
    \ age=25, degree='PhD')\nName via index (student[0]): John\nName via named member\
    \ (student.name): John\n('name', 'age', 'degree')\n```\n\nIt is also possible\
    \ to iterate over the values in the named tuple using a standard for loop, for\
    \ example:\n\n```python\nfor value in undergrad_student:\n    print(value)\n```\n\
    \nThis produces the expected output of:\n\n```\nJohn\n21\nComputer Science\n```\n\
    \nNote if you try to change a value in a named tuple after you have created it,\
    \ for example as shown below:\n\n```python\npostgrad.name = \"Pete\"\nprint(postgrad)\n\
    ```\n\nYou will generate an `AttributeError` as named tuples are immutable:\n\n\
    ```\nTraceback (most recent call last):\n  File \"namedtuple_example.py\", line\
    \ 25, in <module>\n    postgrad.name = \"Pete\"\nAttributeError: can't set attribute\n\
    ```\n\n## 36.4 The Itertools Module\n\nThe `itertools` module is another module\
    \ that it is worth being familiar with. This module provides a number of useful\
    \ functions that return iterators constructed in various ways. As there are many\
    \ different options available it is worth looking at the documentation for a complete\
    \ list of available functions.\n\nTo give you a flavor of some of the facilities\
    \ available look at the following listing:\n\n```python\nimport itertools\n\n\
    # Connect two iterators together\nr1 = list(itertools.chain([1, 2, 3], [2, 3,\
    \ 4]))\nprint(r1)\n\n# Create iterator with element repeated specified number\
    \ of\n# times (possibly infinite)\nr2 = list(itertools.repeat('hello', 5))\nprint(r2)\n\
    \n# Create iterator with elements from first iterator starting\n# where predicate\
    \ function fails\nvalues = [1, 3, 5, 7, 9, 3, 1]\nr3 = list(itertools.dropwhile(lambda\
    \ x: x < 5, values))\nprint(r3)\n\n# Create iterator with elements from supplied\
    \ iterator between\n# the two indexes (use 'None' for second index to go to end)\n\
    r4 = list(itertools.islice(values, 3, 6))\nprint(r4)\n```\n\nThe output from this\
    \ code is\n\n```\n[1, 2, 3, 2, 3, 4]\n['hello', 'hello', 'hello', 'hello', 'hello']\n\
    [5, 7, 9, 3, 1]\n[7, 9, 3]\n```\n\n## 36.5 Online Resources\n\nOnline resources\
    \ on the itertools library are listed below:\n\n- https://docs.python.org/3/library/itertools.html\
    \ The standard library documentation on the itertools module.\n- https://pymotw.com/3/itertools/index.html\
    \ The Python module of the week page for itertools.\n\n## 36.6 Exercises\n\n-\
    \ The aim of this exercise is to create a concordance program in Python using\
    \ the collections.Counter class.\n- For the purposes of this exercise a concordance\
    \ is an alphabetical list of the words present in a text or texts with a count\
    \ of the number of times that the word occurs.\n- Your concordance program should\
    \ include the following steps:\n  - Ask the user to input a sentence.\n  - Split\
    \ the sentence into individual words (you can use the split() method of the string\
    \ class for this).\n  - Use the Counter class to generate a list of all the words\
    \ in the sentence and the number of times they occur.\n  - Produce an alphabetic\
    \ list of the words with their counts. You can obtain a sorted list of the keys\
    \ using the sorted() function. You can then use a collection.OrderedDict to generate\
    \ a dictionary that maintains the order in which keys were added."
