    # Chapter 27

    Python Modules and Packages


    # 27.1 Introduction


    Modules and packages are two constructs used in Python to organize larger programs.
    This chapter introduces modules in Python, how they are accessed, how they are
    defined, how Python finds modules, etc. It also explores Python packages and sub-packages.


    # 27.2 Modules


    A module allows you to group together related functions, classes and code in general.
    You can think of a module as being like a library of code (although in fact many
    libraries are themselves composed of several modules as for example a library
    may have optional or extensions to the core functionality).

    It is useful to organize your code into modules when the code either becomes large
    or when you want to reuse some elements of the code base in multiple projects.

    Breaking up a large body of code from a single file helps with simplifying code,
    maintenance and comprehensibility of code, testing, reuse and scoping code. These
    are explored below:


    +   - *Simplicity*—Focusing on a subset of an overall problem helps us to develop
    solutions that work for the subset and can be combined together to solve the overall
    problem. This means that individual modules can be simpler than the overall solution.

    - *Maintenance*—Modules typically make it easier to define logical boundaries
    between one body of code and another. This means it is easier to see what comprises
    a module and to verify that the module works appropriately even when modified.
    It also helps to distinguish one body of code from another so makes it easier
    to work out where changes should go.'
  - '[PAGE 323]


    +   - *Testing*—As one module can be made independent of another module there
    are less dependencies and cross overs. This means that a module can be tested
    in isolation and even before other modules, and the overall application, have
    been written.

    - *Reusability*—Defining a function or class on one module means that it is easier
    to reuse that function or class in another module, as the boundaries between the
    one module and another are clear.

    - *Scoping*—Modules typically also define a namespace, that is a scope within
    which each function or class is unique. Think of a namespace a bit like a surname;
    within a classroom there may be several people with the first name ‘John’, but
    we can distinguish each person by using their full name, for example ‘John Hunt’,
    ‘John Jones’, ‘John Smith’ and ‘John Brown’; each surname in this example provides
    a namespace which ensures each John is unique (and can be referenced uniquely).


