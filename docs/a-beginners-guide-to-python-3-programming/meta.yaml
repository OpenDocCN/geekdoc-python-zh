  md: '# Chapter 38

    Map, Filter and Reduce


    # 38.1 Introduction


    Python provides three functions that are widely used to implement Functional Programming
    style solutions in combinations with collection container types.

    These functions are what are known as higher-order functions that take both a
    collection and a function that will be applied in various ways to that collection.

    This chapter introduces three functions `filter()`, `map()` and `reduce()`.


    # 38.2 Filter


    The `filter()` function is a higher-order function that takes a function to be
    used to filter out elements from a collection. The result of the `filter()` function
    is a new iterable containing only those elements selected by the test function.

    That is, the function passed into `filter()` is used to test all the elements
    in the collection that is also passed into filter. Those where the test filter
    returns `True` are included in the list of values returned. The result returned
    is a new iterable consisting of all elements of this list that satisfy the given
    test function. Note that the order of the elements is preserved.

    The syntax of the `filter()` function is


    ```

    filter(function, iterable)

    ```


    Note that the second argument to the filter function is anything that implements
    the iterable protocol which includes all lists, tuples, sets and dictionaries
    or and many other types, etc.'
  merge: -1
  pgno: 433
- img_proc: true
  md: "The function passed in as the first argument is the test function; it can be\
    \ a lambda (a function defined in line) or the name of an existing function. The\
    \ result returned will be an iterable that can be used to create an appropriate\
    \ collection.\n\nHere are some examples of using `filter` with a simple list of\
    \ integers:\n\n```\ndata = [1, 3, 5, 2, 7, 4, 10]\nprint('data:', data)\n\n# Filter\
    \ for even numbers using a lambda function\nd1 = list(filter(lambda i: i % 2 ==\
    \ 0, data))\nprint('d1:', d1)\n\ndef is_even(i):\n    return i % 2 == 0\n\n# Filter\
    \ for even numbers using a named function\nd2 = list(filter(is_even, data))\n\
    print('d2:', d2)\n```\n\nThe output from this is\n\n```\nData: [1, 3, 5, 2, 7,\
    \ 4, 10]\nd1: [2, 4, 10]\nd2: [2, 4, 10]\n```\n\nOne difference between the two\
    \ examples is that it is more obvious what the role is of the test function in\
    \ the second example as it is explicitly named (i.e., `is_even()`), that is, the\
    \ function is testing the integer to see whether it is even or not. The in-line\
    \ lambda function does exactly the same, but it is necessary to understand the\
    \ test function itself to work out what it is doing.\n\nIt is also worth pointing\
    \ out that defining a named function such as `is_even()` may actually pollute\
    \ the namespace of the module as there is now a function that others might decide\
    \ to use even though the original designer of this code never expected anyone\
    \ else to use the `is_even()` function. This is why lambda functions are often\
    \ used with `filter()` (and indeed `map()` and `reduce()`).\n\nOf course, you\
    \ are not just limited to fundamental built-in types such as integers, or real\
    \ numbers or indeed strings; any type can be used. For example, if we have a class\
    \ `Person` such as\n\n```\nclass Person:\n    def __init__(self, name, age):\n\
