    \  File \"len_protocol_example.py\", line 18, in <module>\n    print(f'len(bag1):\
    \ {len(bag1)}')\nTypeError: object of type 'Bag' has no len()\n```\n\nTo overcome\
    \ this and make the custom Bag type (class) work with the len() function it is\
    \ necessary to implement the __len__() function. The revised class Bag is given\
    \ below with a __len__() function that uses the length of the items list as the\
    \ length of the Bag:\n\n```\nclass Bag:\n    def __init__(self, owner, items):\n\
    \        self.owner = owner\n        self.items = items\n\n    def __len__(self):\n\
    \        return len(self.items)\n```\n\nNow when we rerun the code the output\
    \ of the print statement is\n\n```\nlen(bag1): 0\n```\n\nAnd no error is raised.\n\
    \n# 28.7 The Sequence Protocol\n\nThere are numerous commonly occurring protocols\
    \ that can be found in Python. For example, there is a protocol for defining sequences,\
    \ such as a container that can be accessed an item at a time.\n\nThis protocol\
    \ requires that any type that will be held in the container must provide the __len__()\
    \ and __getitem__() methods.\n\nThus any class that implements these two methods\
    \ meets the requirements of the protocol.\n\nHowever, because protocols are informal\
    \ and unenforced in Python it is not actually necessary to implement all the methods\
    \ in a protocol. For example, if it is known that a class will only be used with\
    \ iteration then it may only be necessary to implement the __getitem__() method."
  - "[PAGE 345]\n\n# 28.8 The Context Manager Protocol\n\nAnother concrete example\
    \ of a protocol is that of the *Context Manager Protocol*. This protocol was introduced\
    \ in Python 2.5 so is very well established by now.\n\nIt is associated with the\
    \ `with as` statement. This statement is typically used with classes which will\
    \ need to allocate and release so called *resources*.\n\nThese resources could\
    \ be files, or database connections, etc. In each of these cases a connection\
    \ needs to be made (for example to a file or a database) before the associated\
    \ object can be used.\n\nHowever, the connection should then be closed and released\
    \ before we finish using the object. This is because dangling connection to things\
    \ such as files and databases can hang around and cause problems later on (typically\
    \ only a limited number of concurrent connections are allowed to a file or a database\
    \ at one time and if they are not closed properly a program con run out of available\
    \ connections).\n\nThe `with as` statement ensures that any setup steps are performed\
    \ before an object is available for use and that any shot down behaviour is invoked\
    \ when it is finished with.\n\nThe syntax for the use of the `with as` statement\
    \ is\n\n```\nwith <managed object> as <localname>:\n    Code to use managed object\
    \ via <localname>\n```\n\nFor example:\n\n```\nwith ContextManagedClass() as cmc:\n\
    \    print('In with block', cmc)\n    print('Existing')\n```\n\nNote that in this\
    \ case the object referenced by `cmc` is only in scope within the lines indented\
    \ after the `with as` statement; after this the `cmc` variable is no longer accessible.\n\
    \nHow does this work? In fact what the `with as` statement does is to call a special\
    \ method when the `with as` statement is entered (just after the ':' above); this\
    \ method is the `__enter__()` method. It then also calls another special method\
    \ just as the `with as` statement is exited (just after the last indented statement).\
    \ This second method is the `__exit__()` method.\n\n+   - The `__enter__()` method\
    \ is expected to do any setup/resource allocation/making connections, etc. It\
    \ is expected to return an object that will be used within the block of statements\
    \ that form that `with as` statement. It is common to return `self` although it\
    \ is not a requirement to do so (this flexibility allows the `<managed object>`\
    \ to act as a factory for other objects if required).\n- The `__exit__()` method\
    \ is called on the `<managed object>` and is passed information about any exceptions\
    \ that might have been generated during the body of the `with as` statement. Note\
    \ that the `__exit__()` method is called whether an exception has been thrown\
    \ or not. The `__exit__()` method returns a bool, if it returns `True` then the\
    \ exception is swallowed (that is it is suppressed and"
  - "[PAGE 346]\n\nnot passed onto the calling code). If it returns `False` then the\
    \ exception is also passed back to whatever code called the `with as` statement.\n\
    \nA class that can be used with the `with as` statement (that meets the *Context\
    \ Manager Protocol* requirements) is given below:\n\n```\nclass ContextManagedClass(object):\n\
    \    def __init__(self):\n        print('__init__')\n\n    def __enter__(self):\n\
    \        print('__enter__')\n        return self\n\n    # Args exception type,\
    \ exception value and traceback\n    def __exit__(self, *args):\n        print('__exit__:',\
    \ args)\n        return True\n\n    def __str__(self):\n        return 'ContextManagedClass\
    \ object'\n```\n\nThe above class implements the Context Manager Protocol in that\
    \ it defines both the `__enter__()` method and the `__exit__()` method.\n\nWe\
    \ can now use this class with the with as statement:\n\n```\nprint('Starting')\n\
    \nwith ContextManagedClass() as cmc:\n    print('In with block', cmc)\n    print('Exiting')\n\
    \nprint('Done')\n```\n\nThe output from this is\n\n```\nStarting\n__init__\n__enter__\n\
    In with block ContextManagedClass object\nExiting\n__exit__: (None, None, None)\n\
    Done\n```\n\nFrom this you can see that the `__enter__()` method is called before\
    \ the code in the block and `__exit__()` is called after the code in the block."
  - "[PAGE 347]\n\n# 28.9 The Descriptor Protocol\n\nAnother protocol that you may\
    \ come across is the *descriptor* protocol that was introduced back in Python\
    \ 2.2.\n\nDescriptors can be used to create what are known as *managed attributes*.\
    \ A managed attribute is an object attribute that is managed (or protected) from\
    \ direct access by external code via the *descriptor*. The *descriptor* can then\
    \ take whatever action is appropriate such as validating the data, checking the\
    \ format, logging the action, updating a related attribute, etc.\n\nThe descriptor\
    \ protocol defines four methods (as usual they are considered special methods\
    \ and thus start with a double underbar '__'):\n\n+   - `__get__(self, instance,\
    \ owner)` This method is called when the value of an attribute is accessed. The\
    \ `instance` is the instance being modified, and the `owner` is the class defining\
    \ the object. This method should return the (computed) attribute value or raise\
    \ an `AttributeError` exception.\n- `__set__(self, instance, value)` This is called\
    \ when the value of an attribute is being set. The parameter `value` is the new\
    \ value being set.\n- `__delete__(self, instance)` Called to delete the attribute.\n\
    - `__set_name__(self, owner, name)` Called at the time the owning class `owner`\
    \ is created. The descriptor has been assigned to `name`. This method was added\
    \ to the protocol in Python 3.6.\n\nThe following class `Logger` implements the\
    \ *Descriptor* protocol. It can therefore be used with other classes to log the\
    \ creation, access and update of whatever attribute it is defined for.\n\n```\n\
    class Logger(object):\n    \"\"\"Logger class implementing the descriptor protocol\"\
    \"\"\n    def __init__(self, name):\n        self.name = name\n\n    def __get__(self,\
    \ inst, owner):\n        print('__get__:', inst, 'owner', owner,\n           \
    \   ', value', self.name, '=',\n              str(inst.__dict__[self.name]))\n\
    \        return inst.__dict__[self.name]\n\n    def __set__(self, inst, value):\n\
    \        print('__set__:', inst, '-', self.name, '=',\n              value)\n\
    \        inst.__dict__[self.name] = value\n\n    def __delete__(self, instance):\n\
    \        print('__delete__', instance)\n\n    def __set_name__(self, owner, name):\n\
    \        print('__set_name__', 'owner', owner, 'setting',\n              name)\n\
    ```"
  - "[PAGE 348]\n\nEach of the methods defined for the protocol prints out a message\
    \ so that access can be monitored.\n\nThe `Logger` class is used with the following\
    \ `Cursor` class.\n\n```\nclass Cursor(object):\n    # Set up the descriptors\
    \ at the class level\n    x = Logger('x')\n    y = Logger('y')\n\n    def __init__(self,\
    \ x0, y0):\n        # Initialize the attributes\n        # Note use of __dict__\
    \ to avoid using self.x\n        # which would invoke the descriptor behaviour\n\
    \        self.__dict__['x'] = x0\n        self.__dict__['y'] = y0\n\n    def move_by(self,\
    \ dx, dy):\n        print('move_by', dx, ',', dy)\n        self.x = self.x + dx\n\
    \        self.y = self.y + dy\n\n    def __str__(self):\n        return 'Point['\
    \ + str(self.__dict__['x']) + ', ' + str(self.__dict__['y']) + ']'\n```\n\nThere\
    \ are several points to note about this class definition including:\n\nThe *Descriptors*\
    \ must be defined at the class level not at the object/instance level. The *x*\
    \ and *y* attributes of `Cursor` object are defined as having `Logger` descriptors\
    \ within the class (not within the `__init__()` method). If you try to define\
    \ them using `self.x` and `self.y` the descriptors will not be registered.\n\n\
    The `Cursor` `__init__()` method uses the `__dict__` dictionary to initialize\
    \ the instance/object attributes *x* and *y*. This is an alternative approach\
    \ to accessing an objects' attributes; it is used internally by an object to hold\
    \ the actual attribute values. It by passes the normal attribute look up mechanism\
    \ invoked when you use the *dot notation* (such as `curser.x = 10`). This means\
    \ that it will not be intercepted by the Descriptor. This has been done because\
    \ the logger uses the `__str__()` method to print out the instance holding the\
    \ attribute which uses the current values of *x* and *y*. When the value of *x*\
    \ is initially set there will be no value for *y* and thus an error would be generated\
    \ by the `__str__()`.\n\nThe `__str__()` method also uses the `__dict__` dictionary\
    \ to access the attributes as it is not necessary to log this access. It would\
    \ also become recursive if the `Logger` also used the method to print out the\
    \ instance.\n\nWe can now use instances of the `Cursor` object without knowing\
    \ that the descriptor will intercept access to the attributes *x* and *y*:"
- md: "## 28.10 Online Resources\n\nThe following online resources focusing on Python\
    \ protocols are available:\n\n- https://ref.readthedocs.io/en/latest/understanding_python/interfaces/existing_protocols.html\
    \ Documentation on Pythons default (native) protocols including the comparison,\
    \ hash, attribute access and sequence protocols.\n- https://docs.python.org/3/library/stdtypes.html#context-manager-types\
    \ for context manager types.\n- https://pymotw.com/3/contextlib/index.html The\
    \ Python module of the week for context manager utilities.\n- https://en.wikipedia.org/wiki/Polymorphism_(computer_science)\
    \ Wikipedia page on Polymorphism.\n\n## 28.11 Exercises\n\nThis exercise involves\
    \ implementing the Context Manager Protocol.\nReturn to your Account related classes.\n\
    Modify the Account class such that it implements the *Context Manager* Protocol.\
    \ This means that you will need to implement the `__enter__()` and `__exit__()`\
    \ methods.\nPlace `print` messages within the methods so that you can see when\
    \ they are run.\nThe new methods you have defined will be inherited by each of\
    \ the subclasses you have created; namely `CurrentAccount`, `DepositAccount` and\
    \ `InvestmentAccount`.\nNow test out your modified calculator using:\n\n```python\n\
    with accounts.CurrentAccount('891', 'Adam', 5.0, 50.0) as acc:\n    acc.deposit(23.0)\n\
    \    acc.withdraw(12.33)\n    print(acc.balance)\n```\n\nWhich should produce\
    \ output similar to:\n\n```\nCreating new Account\n__enter__\n15.5\n__exit__:\
    \ (None, None, None)\n```\n\n# Chapter 29 Decorators\n\n## 29.1 Introduction\n\
    \nThe idea behind Decorators comes from the *Gang of Four* Design Patterns book\
    \ (so-called as there were four people involved in defining these design patterns).\
    \ In this book numerous commonly occurring object oriented design patterns are\
    \ presented. One of these design patterns is the Decorator design pattern.\n\n\
    The Decorator pattern addressed the situation where it is necessary to add additional\
    \ behaviour to specific objects. One way to add such additional behaviour is to\
    \ decorate the objects created with types that provide the extra functionality.\
    \ These decorators wrap the original element but present exactly the same interface\
    \ to the user of that element. Thus the Decorator Design pattern extends the behaviour\
    \ of an object without using sub classing. This decoration of an object is transparent\
    \ to the decorators’ clients.\n\nIn Python Decorators are functions that take\
    \ another function (or callable object) and return a third function representing\
    \ the decorated behaviour.\n\nThis chapter introduces decorators, how they are\
    \ defined, how they are used and presents built-in decorators.\n\n## 29.2 What\
    \ Are Decorators?\n\nA Decorator is a piece of code, that is used to mark a callable\
    \ object (such as a function, method, class or object) typically to enhance or\
    \ modify its behaviour (potentially replacing it). It thus *decorates* the original\
    \ behaviour.\n\nDecorators are in fact callable objects themselves and as such\
    \ behave more like macros that can be applied to callable objects that then return\
    \ a new callable object (typically a new function).\n\nThe basic idea is illustrated\
    \ in the following diagram:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_352_0.png)\n\
    \nThis diagram illustrates a decorator wrapping a callable object (in this case\
    \ a function). Note that the decorator presents exactly the same interface to\
    \ the user of the decorator as the original function would present; that is, it\
    \ takes the same parameters and either returns nothing (None) or something.\n\n\
    It should also be noted that the decorator is also at liberty to completely replace\
    \ a callable object rather than to wrap it; it’s a design decision made by the\
    \ implementor of the decorator.\n\n## 29.3 Defining a Decorator\n\nTo define a\
    \ decorator you need to define a callable object such as a function that takes\
    \ another function as a parameter and returns a new function.\n\nAn example of\
    \ the definition of a very simple logger decorator function is given below.\n\n\
    ```python\ndef logger(func):\n    def inner():\n        print('calling ', func.__name__)\n\
    \        func()\n        print('called ', func.__name__)\n\n    return inner\n\
    ```\n\nIn this case the logger decorator wraps the original function within a\
    \ new function, here called `inner`. When this function is executed, a statement\
    \ is logged before and after the original function is executed.\n\nEvery function\
    \ has an attribute `__name__` that provides the functions *name* and this is used\
    \ in the `inner()` function above to printout the actual function about to be\
    \ invoked.\n\nNote that the function `inner()` is defined inside the `logger()`\
    \ function (this is completely legal). A reference to the `inner()` function is\
    \ then returned as the result of the `logger()` function. The `inner()` function\
    \ is not executed above!\n\n## 29.4 Using Decorators\n\nTo see what the effect\
    \ of applying a decorator is; it is useful to explore the basic (explicit) approach\
    \ to it use. This can be done by defining a function (we will call target) that\
    \ prints out a simple message:\n\n```python\ndef target():\n    print('In target\
    \ function')\n```\n\nWe can explicitly apply the `logger` decorator to this function\
    \ by passing the reference to the target function (without invoking it), for example:\n\
    \n```python\nt1 = logger(target)\nt1()\n```\n\nWhen we run this code, we actually\
    \ execute the `inner()` function which was returned by the decorator. This function\
    \ in turn prints out a message and then calls the function passed into the logger.\
    \ Once this passed in function has executed, it prints another message. The effect\
    \ of executing the `t1()` function is this to call the `inner()` function which\
    \ calls the `target` function, thus printing out:\n\n```\ncalling target\nIn target\
    \ function\ncalled target\n```\n\nThis illustrates what happens when a decorator\
    \ style function is *executed*.\nPython provides some syntactic sugar that allows\
    \ the definition of the function and the association with the decorator to be\
    \ declared together using the '@' syntax, for example:\n\n```python\n@logger\n\
    def target():\n    print('In target function')\n\ntarget()\n```\n\nThis has the\
    \ same effect as passing target into the `logger` function; but illustrates the\
    \ role of the `logger` in a rather more Pythonic way. It is thus the more common\
    \ use of Decorators.\nThe output of this function is the same as the previous\
    \ version:\n\n## 29.5 Functions with Parameters\n\nDecorators can be applied to\
    \ functions that take parameters; however the decorator functions must also take\
    \ these parameters as well.\nFor example, if you have a function such as.\n\n\
    ```python\n@logger\ndef my_func(x, y):\n    print(x, y)\n\nmy_func(4, 5)\n```\n\
    \nThen the decorator used with this function must also take two parameters, for\
    \ example:\n\n```python\ndef logger(func):\n    def inner(x, y):\n        print('calling\
    \ ', func.__name__, 'with', x, 'and', y)\n        func(x, y)\n        print('returned\
    \ from ', func.__name__)\n    return inner\n```\n\n## 29.6 Stacked Decorators\n\
    \nDecorators can be stacked; that is more than one decorator can be applied to\
    \ the same callable object. When this occurs, each function is wrapped inside\
    \ another function; this idea is illustrated by the following code:\n\n```python\n\
    # Define the decorator functions\ndef make_bold(fn):\n    def makebold_wrapped():\n\
    \        return \"<b>\" + fn() + \"</b>\"\n    return makebold_wrapped\n\ndef\
    \ make_italic(fn):\n    def makeitalic_wrapped():\n        return \"<i>\" + fn()\
    \ + \"</i>\"\n    return makeitalic_wrapped\n\n# Apply decorators to function\
    \ hello\n@make_bold\n@make_italic\ndef hello():\n    return 'hello world'\n\n\
    # Call function hello\nprint(hello())\n```\n\nIn this example, the function hello()\
    \ is marked with two decorators, @make_bold and @make_italic.\n\nThis means that\
    \ the function hello() is first passed into the make_italic() function and wrapped\
    \ by the makeitalic_wrapped function. This function is then returned from the\
    \ make_italic decorator."
  mdcn: "## 28.10 在线资源\n\n以下在线资源专注于 Python 协议：\n\n- https://ref.readthedocs.io/en/latest/understanding_python/interfaces/existing_protocols.html\
    \ 关于 Python 默认（原生）协议的文档，包括比较、哈希、属性访问和序列协议。\n- https://docs.python.org/3/library/stdtypes.html#context-manager-types\
    \ 关于上下文管理器类型的文档。\n- https://pymotw.com/3/contextlib/index.html 关于上下文管理器实用工具的 Python\
    \ 模块每周一讲。\n- https://en.wikipedia.org/wiki/Polymorphism_(computer_science) 关于多态的维基百科页面。\n\
    \n## 28.11 练习\n\n本练习涉及实现上下文管理器协议。\n回到你的账户相关类。\n修改 `Account` 类，使其实现 *上下文管理器* 协议。这意味着你需要实现\
    \ `__enter__()` 和 `__exit__()` 方法。\n在方法中放置 `print` 语句，以便你能看到它们何时运行。\n你定义的新方法将被你创建的每个子类继承；即\
    \ `CurrentAccount`、`DepositAccount` 和 `InvestmentAccount`。\n现在使用以下代码测试你修改后的计算器：\n\
    \n```python\nwith accounts.CurrentAccount('891', 'Adam', 5.0, 50.0) as acc:\n\
    \    acc.deposit(23.0)\n    acc.withdraw(12.33)\n    print(acc.balance)\n```\n\
    \n其输出应类似于：\n\n```\nCreating new Account\n__enter__\n15.5\n__exit__: (None, None,\
    \ None)\n```\n\n# 第 29 章 装饰器\n\n## 29.1 简介\n\n装饰器的概念源于 *四人帮* 的设计模式一书（之所以这样称呼，是因为有四个人参与定义了这些设计模式）。在这本书中，介绍了众多常见的面向对象设计模式。其中一种设计模式就是装饰器模式。\n\
    \n装饰器模式解决的是需要为特定对象添加额外行为的情况。一种添加此类额外行为的方法是，用提供额外功能的类型来装饰创建的对象。这些装饰器包装了原始元素，但向该元素的使用者呈现完全相同的接口。因此，装饰器设计模式在不使用子类化的情况下扩展了对象的行为。这种对象的装饰对装饰器的客户端是透明的。\n\
    \n在 Python 中，装饰器是接受另一个函数（或可调用对象）并返回第三个函数的函数，该函数代表被装饰的行为。\n\n本章介绍装饰器，它们如何定义、如何使用，并介绍内置装饰器。\n\
    \n## 29.2 什么是装饰器？\n\n装饰器是一段代码，用于标记一个可调用对象（如函数、方法、类或对象），通常用于增强或修改其行为（可能替换它）。因此，它\
    \ *装饰* 了原始行为。\n\n装饰器本身实际上是可调用对象，因此它们的行为更像宏，可以应用于可调用对象，然后返回一个新的可调用对象（通常是一个新函数）。\n\
    \n基本思想如下图所示：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_352_0.png)\n\n此图说明了一个装饰器包装一个可调用对象（在本例中是一个函数）。请注意，装饰器向装饰器的使用者呈现的接口与原始函数呈现的完全相同；即，它接受相同的参数，并且要么不返回任何内容（None），要么返回某些内容。\n\
    \n还应注意，装饰器也可以自由地完全替换可调用对象，而不是包装它；这是由装饰器的实现者做出的设计决策。\n\n## 29.3 定义装饰器\n\n要定义装饰器，你需要定义一个可调用对象，例如一个函数，该函数接受另一个函数作为参数并返回一个新函数。\n\
    \n下面给出了一个非常简单的日志记录器装饰器函数的定义示例。\n\n```python\ndef logger(func):\n    def inner():\n\
    \        print('calling ', func.__name__)\n        func()\n        print('called\
    \ ', func.__name__)\n\n    return inner\n```\n\n在这种情况下，`logger` 装饰器将原始函数包装在一个新函数中，这里称为\
    \ `inner`。当执行此函数时，会在原始函数执行前后记录一条语句。\n\n每个函数都有一个属性 `__name__`，它提供函数的 *名称*，并在上面的\
    \ `inner()` 函数中用于打印即将被调用的实际函数。\n\n请注意，函数 `inner()` 是在 `logger()` 函数内部定义的（这是完全合法的）。然后，对\
    \ `inner()` 函数的引用作为 `logger()` 函数的结果返回。上面的 `inner()` 函数并未执行！\n\n## 29.4 使用装饰器\n\
    \n要了解应用装饰器的效果；探索其使用的基本（显式）方法很有用。这可以通过定义一个函数（我们将称为 target）来完成，该函数打印一条简单的消息：\n\n\
    ```python\ndef target():\n    print('In target function')\n```\n\n我们可以通过传递 target\
    \ 函数的引用（不调用它）来显式地将 `logger` 装饰器应用于此函数，例如：\n\n```python\nt1 = logger(target)\n\
    t1()\n```\n\n当我们运行此代码时，我们实际上执行的是装饰器返回的 `inner()` 函数。此函数继而打印一条消息，然后调用传入 logger\
    \ 的函数。一旦此传入函数执行完毕，它会打印另一条消息。执行 `t1()` 函数的效果是调用 `inner()` 函数，该函数又调用 `target` 函数，从而打印出：\n\
    \n```\ncalling target\nIn target function\ncalled target\n```\n\n这说明了当装饰器风格的函数被\
    \ *执行* 时会发生什么。\nPython 提供了一些语法糖，允许使用 '@' 语法将函数的定义和与装饰器的关联一起声明，例如：\n\n```python\n\
    @logger\ndef target():\n    print('In target function')\n\ntarget()\n```\n\n这与将\
    \ target 传递给 `logger` 函数具有相同的效果；但以更 Pythonic 的方式说明了 `logger` 的作用。因此，这是装饰器更常见的用法。\n\
    此函数的输出与之前的版本相同：\n\n## 29.5 带参数的函数\n\n装饰器可以应用于带参数的函数；但是装饰器函数也必须接受这些参数。\n例如，如果你有一个这样的函数。\n\
    \n```python\n@logger\ndef my_func(x, y):\n    print(x, y)\n\nmy_func(4, 5)\n```\n\
    \n那么与此函数一起使用的装饰器也必须接受两个参数，例如：\n\n```python\ndef logger(func):\n    def inner(x,\
    \ y):\n        print('calling ', func.__name__, 'with', x, 'and', y)\n       \
    \ func(x, y)\n        print('returned from ', func.__name__)\n    return inner\n\
    ```\n\n## 29.6 堆叠装饰器\n\n装饰器可以堆叠；即可以将多个装饰器应用于同一个可调用对象。当发生这种情况时，每个函数都被包装在另一个函数中；这个想法由以下代码说明：\n\
    \n```python\n# 定义装饰器函数\ndef make_bold(fn):\n    def makebold_wrapped():\n    \
    \    return \"<b>\" + fn() + \"</b>\"\n    return makebold_wrapped\n\ndef make_italic(fn):\n\
    \    def makeitalic_wrapped():\n        return \"<i>\" + fn() + \"</i>\"\n   \
    \ return makeitalic_wrapped\n\n# 将装饰器应用于函数 hello\n@make_bold\n@make_italic\ndef\
    \ hello():\n    return 'hello world'\n\n# 调用函数 hello\nprint(hello())\n```\n\n\
    在此示例中，函数 hello() 被两个装饰器 @make_bold 和 @make_italic 标记。\n\n这意味着函数 hello() 首先被传递给\
    \ make_italic() 函数，并被 makeitalic_wrapped 函数包装。然后此函数从 make_italic 装饰器返回。"
