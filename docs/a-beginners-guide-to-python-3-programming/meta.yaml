    \ name is accessed:\n\nStudent.count: 1\nStudent.__dict__['count']: 1\nstudent.name:\
    \ John\nstudent.__dict__['name']: John\n\nHowever, accessing attributes via the\
    \ `__dict__` does not trigger a search process; it is instead a direct lookup\
    \ in the associated dictionary container. Thus if you try to access a class variable\
    \ via the objects `__dict__` then you will get an error. This is illustrated below\
    \ where we attempt to access the count class variable via the *student* object:\n\
    \n```\n# Attempt to look up class variable via object\nprint('student.name:',\
    \ student.name)\nprint(\"student.__dict__['count']:\", student.__dict__['count'])\n\
    ```\n\nThis will generate a `KeyError` indicating that the object `__dict__` does\
    \ not hold a key called 'count':\n\n```\nTraceback (most recent call last):\n\
    \  File \"Student.py\", line 60, in <module>\n    print(\"student.__dict__['count']:\"\
    , student.__dict__['count'])\nKeyError: 'count'\n```"
- md: "## 44.3 Handling Unknown Attribute Access\n\nMonkey Patching is of course very\
    \ flexible and very useful when you know what you need to provide; however what\
    \ happens when an attribute reference (or method invocation) occurs when it is\
    \ not expected? By default an error is generated such as the `AttributeError`\
    \ below:\n\n```python\nstudent = Student('John')\n\nres1 = student.dummy_attribute\n\
    print('p.dummy_attribute:', res1)\n```\n\nThis generates an `AttributeError` for\
    \ the `dummy_attribute`\n\n```\nTraceback (most recent call last):\n  File \"\
    Student.py\", line 51, in <module>\n    res1 = student.dummy_attribute\nAttributeError:\
    \ 'Student' object has no attribute 'dummy_attribute'\n```\n\nYou can of course\
    \ catch the `AttributeError` if you want; but the means wrapping your code in\
    \ a `try` block. An alternative approach is to define a method called `__getattr__()`;\
    \ this method will be called when an attribute is not found in the objects (and\
    \ classes) `__dict__` dictionary. This method can then perform whatever action\
    \ is appropriate such as logging a message or providing a default value, etc.\n\
    \nFor example, if we modify the definition of the `Student` class to include a\
    \ `__getattr__()` method such that a default value is returned:\n\n```python\n\
    class Student:\n    count = 0\n\n    def __init__(self, name):\n        self.name\
    \ = name\n        Student.count += 1\n\n    # Method called if attribute is unknown\n\
    \    def __getattr__(self, attribute):\n        print('__getattr__: ', attribute)\n\
    \        return 'default'\n```\n\nNow when we try and access the `dummy_attribute`\
    \ on a student object we will get the string 'default' returned:\n\n```python\n\
    student = Student('John')\n\nres1 = student.dummy_attribute\nprint('p.dummy_attribute:',\
    \ res1)\n```\n\nNow generates\n\n```\n__getattr__: dummy_attribute\np.dummy_attribute:\
    \ default\n```\n\nNote that the `__getattr__()` method is only called for unknown\
    \ attributes as Python first looks in `__dict__` and thus if the attribute is\
    \ found, no call is made to the `__getattr__()` method.\n\nAlso note that if an\
    \ attribute is accessed directly from the `__dict__` (for example `student.__dict__['name']`)\
    \ then the `__getattr__()` method is never invoked.\n\n## 44.4 Handling Unknown\
    \ Method Invocations\n\nThe `__getattr__()` method is also invoked if an unknown\
    \ method is called. For example, if we call the method `dummy_method()` on a `Student`\
    \ object then an error is raised (in fact this is again an `AttributeError`).\
    \ However, if we define a `__getattr__()` method we can return a reference to\
    \ a method to use as a default. For example, if we modify the `__getattr__()`\
    \ method to return a method reference (i.e., the name of a method in the `Student`\
    \ class):\n\n```python\nclass Student:\n    count = 0\n\n    def __init__(self,\
    \ name):\n        self.name = name\n        Student.count += 1\n\n    # Method\
    \ called if attribute is unknown\n    def __getattr__(self, attribute):\n    \
    \    print('__getattr__: ', attribute)\n        return self.my_default\n\n   \
    \ def my_default(self):\n        return 'default'\n```\n\nNow when a undefined\
    \ method is invoked (such as `dummy_method()`) `__getattr__()` will be called.\
    \ This method will return a reference to the method `my_default`. This will be\
    \ run and the value returned as a side effect of the method invocation as indicated\
    \ by the round brackets (the `()` after the call to the original method:\n\n```python\n\
    student = Student('John')\n\nres2 = student.dummy_method()\nprint('student.dummy_method():',\
    \ res2)\n```\n\nWhich produces the following output: rather than an error message\n\
    \n```\n__getattr__: dummy_method\nstudent.dummy_method(): default\n```\n\n## 44.5\
    \ Intercepting Attribute Lookup\n\nIt is also possible to always intercept attribute\
    \ lookups using the *dot* notation (e.g., `student.name`) by implementing the\
    \ `__getattribute__()` method. This method will always be called instead of looking\
    \ the attribute up in the objects dictionary. The `__getattr__()` method will\
    \ only be called if an `AttributeError` is raised or the `__getattribute__()`\
    \ method explicitly calls the `__getattr__()` method.\n\nThe `__getattribute__()`\
    \ method should therefore return an attribute value (which may be a default value)\
    \ or raise an `AttributeError` if appropriate.\n\nIt is important to avoid implementing\
    \ code that will recursively call itself (for example calling `self.name` within\
    \ `__getattribute__()` will result in a recursive call back to `__getattribute__()`!).\
    \ To avoid this the implementation of the method should either access the `__dict__`\
    \ directory or call the base classes `__getattribute__()` method.\n\nAn example\
    \ is given below of a simple `__getattribute__()` method that logs the call to\
    \ a method and then passes the invocation onto the base class implementation:\n\
    \n```python\nclass Student:\n    count = 0\n\n    def __init__(self, name):\n\
    \        self.name = name\n        Student.count += 1\n\n    # Method called if\
    \ attribute is unknown\n    def __getattr__(self, attribute):\n        print('__getattr__:\
    \ ', attribute)\n        return 'default'\n\n    # Method will always be called\
    \ when an attribute\n    # is accessed, will only called __getattr__ if it\n \
    \   # does so explicitly or if an AttributeError is raised\n    def __getattribute__(self,\
    \ name):\n        print('__getattribute__()', name)\n        return object.__getattribute__(self,\
    \ name)\n\n    def my_default(self):\n        return 'default'\n```\n\nWe can\
    \ use this version of the class with the following code snippet\n\n```python\n\
    student = Student('Katie')\n\nprint('student.name:', student.name) # instance\
    \ lookup\n\nres1 = student.dummy_attribute # invoke missing attribute\nprint('student.dummy_attribute:',\
    \ res1)\n```\n\nThe output from this is now:\n\n```\n__getattribute__() name\n\
    student.name: Katie\n__getattribute__() dummy_attribute\n__getattr__: dummy_attribute\n\
    student.dummy_attribute: default\n```\n\nAs you can see from this the `__getattribute__()`\
    \ method is called for both `student.name` and `student.dummy_attribute`. However\
    \ the `__getattr__()` method is only called when the `dummy_attribute` is accessed.\
    \ Note that `__getattribute__()` is only invoked for attribute access and not\
    \ for method invocation (unlike `__getattr__()`).\n\n## 44.6 Intercepting Setting\
    \ an Attribute\n\nIt is also possible to intercept object/instance attribute assignment\
    \ when the *dot notation* (e.g., `student.name = 'Bob'`) is being used. This can\
    \ be done by implementing the `__setattr__()` method. This method is invoked instead\
    \ of the assignment.\n\nThe `__setattr__()` method can perform any action required\
    \ including storing the value supplied. However, to do this it should either insert\
    \ the value directly into the objects dictionary (e.g., `student.__dict__['name']\
    \ = 'Bob'`) or preferably call the base class `__setattr__()` method, for example\
    \ `object.__setattr__(self, name, value)` as shown below for the `Student` class:\n\
    \n```python\nclass Student:\n    count = 0\n\n    def __init__(self, name):\n\
    \        self.name = name\n        Student.count += 1\n\n    # Method will always\
    \ be called when an attribute is set\n    def __setattr__(self, name, value):\n\
    \        print('__setattr__:', name, value)\n        object.__setattr__(self,\
    \ name, value)\n```\n\nIf we now define the follow program that uses the Student\
    \ class:\n\n```python\nstudent = Student('John')\nstudent.name = 'Bob'\nprint('student.name:',\
    \ student.name) # instance lookup\n```\n\nRunning this could we generate the following\
    \ output:\n\n```\n__setattr__: name John\n__setattr__: name Bob\nstudent.name:\
    \ Bob\n```\n\nThere are a few things to note about this output:\n\n- Firstly the\
    \ assignment of the Student's name within the `__init__()` method also invokes\
    \ the `__setattr__()` method.\n- Secondly, the assignment to the class variable\
    \ `count` does not invoke the `__setattr__()` method.\n- Thirdly the `student.name`\
    \ assignment does of course invoke the `__setattr__()` method.\n\n## 44.7 Exercises\n\
    \nThis exercises focusses on attribute look up.\n\nYou should add a method to\
    \ the Account class that can be used to handle how accounts should behave when\
    \ an attempt is made to access an undefined attribute.\n\nIn this case you should\
    \ log the attempt to access the attribute (which means print out a warning message)\
    \ then return a default value of -1.\n\nFor example, if you had the following\
    \ line to your application:\n\n```python\nprint('acc1.branch:', acc1.branch)\n\
    ```\n\nThen this should invoke the `__getattr__()` method for the undefined attribute\
    \ `branch`. Print a warning message and then return the value -1 which will be\
    \ printed by the above statement.\n\nThe output of this statement should be something\
    \ like:\n\n```\n__getattr__: unknown attribute accessed - branch\nacc1.branch:\
    \ -1\n```"
  mdcn: "## 44.3 处理未知属性访问\n\n猴子补丁在你明确需要提供什么时当然非常灵活且实用；然而，当属性引用（或方法调用）在非预期情况下发生时会怎样？默认情况下会生成错误，例如下面的\
    \ `AttributeError`：\n\n```python\nstudent = Student('John')\n\nres1 = student.dummy_attribute\n\
    print('p.dummy_attribute:', res1)\n```\n\n这会为 `dummy_attribute` 生成一个 `AttributeError`\n\
    \n```\nTraceback (most recent call last):\n  File \"Student.py\", line 51, in\
    \ <module>\n    res1 = student.dummy_attribute\nAttributeError: 'Student' object\
    \ has no attribute 'dummy_attribute'\n```\n\n当然，你可以选择捕获 `AttributeError`；但这需要将代码包裹在\
    \ `try` 块中。另一种方法是定义一个名为 `__getattr__()` 的方法；当在对象（和类）的 `__dict__` 字典中找不到属性时，将调用此方法。然后，该方法可以执行任何适当的操作，例如记录消息或提供默认值等。\n\
    \n例如，如果我们修改 `Student` 类的定义，添加一个 `__getattr__()` 方法，使其返回默认值：\n\n```python\nclass\
    \ Student:\n    count = 0\n\n    def __init__(self, name):\n        self.name\
    \ = name\n        Student.count += 1\n\n    # 当属性未知时调用的方法\n    def __getattr__(self,\
    \ attribute):\n        print('__getattr__: ', attribute)\n        return 'default'\n\
    ```\n\n现在，当我们尝试访问学生对象上的 `dummy_attribute` 时，将返回字符串 'default'：\n\n```python\nstudent\
    \ = Student('John')\n\nres1 = student.dummy_attribute\nprint('p.dummy_attribute:',\
    \ res1)\n```\n\n现在生成\n\n```\n__getattr__: dummy_attribute\np.dummy_attribute:\
    \ default\n```\n\n请注意，`__getattr__()` 方法仅在属性未知时被调用，因为 Python 首先在 `__dict__` 中查找，因此如果找到属性，则不会调用\
    \ `__getattr__()` 方法。\n\n另请注意，如果直接从 `__dict__` 访问属性（例如 `student.__dict__['name']`），则永远不会调用\
    \ `__getattr__()` 方法。\n\n## 44.4 处理未知方法调用\n\n如果调用未知方法，也会调用 `__getattr__()` 方法。例如，如果我们在\
    \ `Student` 对象上调用 `dummy_method()` 方法，则会引发错误（实际上这又是一个 `AttributeError`）。但是，如果我们定义一个\
    \ `__getattr__()` 方法，我们可以返回一个方法引用作为默认值。例如，如果我们修改 `__getattr__()` 方法以返回一个方法引用（即\
    \ `Student` 类中某个方法的名称）：\n\n```python\nclass Student:\n    count = 0\n\n    def\
    \ __init__(self, name):\n        self.name = name\n        Student.count += 1\n\
    \n    # 当属性未知时调用的方法\n    def __getattr__(self, attribute):\n        print('__getattr__:\
    \ ', attribute)\n        return self.my_default\n\n    def my_default(self):\n\
    \        return 'default'\n```\n\n现在，当调用未定义的方法（例如 `dummy_method()`）时，将调用 `__getattr__()`。此方法将返回对\
    \ `my_default` 方法的引用。该方法将被运行，并且作为方法调用的副作用返回其值，如圆括号所示（在调用原始方法后的 `()`：\n\n```python\n\
    student = Student('John')\n\nres2 = student.dummy_method()\nprint('student.dummy_method():',\
    \ res2)\n```\n\n这会产生以下输出：而不是错误消息\n\n```\n__getattr__: dummy_method\nstudent.dummy_method():\
    \ default\n```\n\n## 44.5 拦截属性查找\n\n也可以通过实现 `__getattribute__()` 方法来始终拦截使用*点*表示法（例如\
    \ `student.name`）的属性查找。此方法将始终被调用，而不是在对象字典中查找属性。只有当引发 `AttributeError` 或 `__getattribute__()`\
    \ 方法显式调用 `__getattr__()` 方法时，才会调用 `__getattr__()` 方法。\n\n因此，`__getattribute__()`\
    \ 方法应返回一个属性值（可能是默认值），或在适当时引发 `AttributeError`。\n\n重要的是避免实现会递归调用自身的代码（例如在 `__getattribute__()`\
    \ 中调用 `self.name` 将导致递归回调到 `__getattribute__()`！）。为避免这种情况，该方法的实现应直接访问 `__dict__`\
    \ 目录或调用基类的 `__getattribute__()` 方法。\n\n下面是一个简单的 `__getattribute__()` 方法示例，它记录对方法的调用，然后将调用传递给基类实现：\n\
    \n```python\nclass Student:\n    count = 0\n\n    def __init__(self, name):\n\
    \        self.name = name\n        Student.count += 1\n\n    # 当属性未知时调用的方法\n \
    \   def __getattr__(self, attribute):\n        print('__getattr__: ', attribute)\n\
    \        return 'default'\n\n    # 当访问属性时将始终调用此方法，\n    # 仅在显式调用 __getattr__ 或引发\
    \ AttributeError 时调用 __getattr__\n    def __getattribute__(self, name):\n    \
    \    print('__getattribute__()', name)\n        return object.__getattribute__(self,\
    \ name)\n\n    def my_default(self):\n        return 'default'\n```\n\n我们可以使用此类的以下代码片段\n\
    \n```python\nstudent = Student('Katie')\n\nprint('student.name:', student.name)\
    \ # 实例查找\n\nres1 = student.dummy_attribute # 调用缺失的属性\nprint('student.dummy_attribute:',\
    \ res1)\n```\n\n现在的输出是：\n\n```\n__getattribute__() name\nstudent.name: Katie\n\
    __getattribute__() dummy_attribute\n__getattr__: dummy_attribute\nstudent.dummy_attribute:\
    \ default\n```\n\n如你所见，`__getattribute__()` 方法在 `student.name` 和 `student.dummy_attribute`\
    \ 时都被调用。但是，`__getattr__()` 方法仅在访问 `dummy_attribute` 时被调用。请注意，`__getattribute__()`\
    \ 仅在属性访问时被调用，而不在方法调用时被调用（与 `__getattr__()` 不同）。\n\n## 44.6 拦截设置属性\n\n也可以在使用*点表示法*（例如\
    \ `student.name = 'Bob'`）时拦截对象/实例属性赋值。这可以通过实现 `__setattr__()` 方法来完成。此方法将被调用而不是执行赋值。\n\
    \n`__setattr__()` 方法可以执行任何所需的操作，包括存储提供的值。但是，为此，它应该直接将值插入对象字典（例如 `student.__dict__['name']\
    \ = 'Bob'`），或者最好调用基类 `__setattr__()` 方法，例如 `object.__setattr__(self, name, value)`，如下所示的\
    \ `Student` 类：\n\n```python\nclass Student:\n    count = 0\n\n    def __init__(self,\
    \ name):\n        self.name = name\n        Student.count += 1\n\n    # 当设置属性时将始终调用此方法\n\
    \    def __setattr__(self, name, value):\n        print('__setattr__:', name,\
    \ value)\n        object.__setattr__(self, name, value)\n```\n\n如果我们现在定义使用 Student\
    \ 类的以下程序：\n\n```python\nstudent = Student('John')\nstudent.name = 'Bob'\nprint('student.name:',\
    \ student.name) # 实例查找\n```\n\n运行此程序将生成以下输出：\n\n```\n__setattr__: name John\n\
    __setattr__: name Bob\nstudent.name: Bob\n```\n\n关于此输出，有几点需要注意：\n\n- 首先，在 `__init__()`\
    \ 方法中对 Student 名称的赋值也会调用 `__setattr__()` 方法。\n- 其次，对类变量 `count` 的赋值不会调用 `__setattr__()`\
    \ 方法。\n- 第三，`student.name` 赋值当然会调用 `__setattr__()` 方法。\n\n## 44.7 练习\n\n本练习侧重于属性查找。\n\
    \n你应该向 Account 类添加一个方法，该方法可用于处理当尝试访问未定义属性时账户应如何表现。\n\n在这种情况下，你应该记录访问属性的尝试（这意味着打印警告消息），然后返回默认值\
    \ -1。\n\n例如，如果你的应用程序中有以下行：\n\n```python\nprint('acc1.branch:', acc1.branch)\n\
    ```\n\n那么这应该为未定义的属性 `branch` 调用 `__getattr__()` 方法。打印警告消息，然后返回值 -1，该值将由上述语句打印。\n\
    \n此语句的输出应类似于：\n\n```\n__getattr__: unknown attribute accessed - branch\nacc1.branch:\
    \ -1\n```"
