    This book is simply for Denise, the love of my life.


    ## Preface the Second Edition


    I am writing this preface to the second edition of this book in the middle of
    2023, and I am reflecting on what has happened to Python over the last 4 to 5
    years. Python itself has gone from strength to strength, its popularity has not
    diminished and if anything has increased. I increasingly come across organizations
    in all walks of life that are actively using the language. This is true whether
    they are schools, colleges or universities, charities, governmental organization,
    research institutions or commercial enterprises. The uses being made of Python
    keeps on growing and the ecosystem of supporting libraries available keeps on
    growing.


    This edition represents a significant update from Python 3.7 (which was the current
    version when the first edition of the book was written) to Python 3.11 (and a
    look ahead to Python 3.12). It also represents a significant extension to the
    original book with an additional eight chapters. These chapters represent topics
    and questions that those learning Python have expressed an interest in such as
    frozensets, enumerated types and sorting functions to Python virtual environments.
    It also reflects new features in the language such as pattern matching introduced
    in Python 3.10 and Exception Groups handling and Exception Notes introduced in
    Python 3.11.


    The book also now includes a chapter entitled ‘Python Bites Back’ which highlights
    for someone learning Python, 14 of the most common mistakes made by a Python beginner.
    This chapter can be dropped into at any time but covers the whole of the language
    discussed in this book so some sections may be more relevant once the whole book
    has been read.


    Chippenham, UK


    John Hunt


    ## Preface to the First Edition


    There is currently huge interest in the Python programming language. This is driven
    by several factors; its use in schools with the Raspberry Pi platform, its ability
    to be used for DevOps scripts, its use in Data Science and Machine Learning and
    of course the language itself. Plus of course it is free! So anyone anywhere can
    download and install Python and get started.


    There are many books on Python; however, most assume previous programming experience
    or are focused on particular aspects of Python use such as Data Science or Machine
    Learning or have a scientific flavor.


    The aim of this book is to introduce Python to those with little or very little
    programming knowledge, but to take them through to become an experienced Python
    developer.


    As such the earlier parts of the book introduce fundamental concepts such as what
    a *variable* is and how a *for loop* works. In contrast the later chapters introduce
    advanced concepts such as Functional Programming, object orientation and exception
    handling.


    In between a wide range of topics are introduced and discussed from a Python point
    of view including functions, recursion, operators, Python properties, modules
    and packages, protocols and monkey patching, etc.


    After the core elements of Python are established each new subject area is introduced
    by way of an introductory chapter presenting the topic in general, providing background
    on that subject, why it is of importance, etc. These introductions cover structure
    analysis, functional programming and object orientation.


    Some of the key aspects of this book are:


    1. It assumes very little knowledge or experience of Python or programming.

    2. It provides a basic introduction to Python as well as advanced topics such
    as generators and coroutines.

    3. This book provides extensive coverage of object orientation and the features
    in Python 3 supporting classes, inheritance and protocols.

    4. Python''s support for functional programming is also presented.

    5. Following on from introducing the basic ideas behind functional programming,
    the book presents how advanced functional concepts such as closures, currying
    and higher-order functions work in Python.

    6. The book includes exercises at the end of most chapters with online solutions.

    7. There are several case studies spread through the book that broaden understanding
    of preceding topics.

    8. All code examples (and exercise solutions) are provided online in a GitHub
    repository.


    ## Chapter Organization


    Each chapter has a brief introduction, the main body of the chapter, followed
    by a list of (typically) online references that can be used for further reading.

    Following this there is typically an *Exercises* section that lists one or more
    exercises that build on the skills you will have learnt in that chapter.

    Sample solutions to the exercises are available in a GitHub online repository
    that supports this book.


    ## What You Need


    You can of course just read this book; however following the examples in this
    book will ensure that you get as much as possible out of the content.

    For this you will need a computer.

    Python is a cross platform programming language and as such you can use Python
    on a Windows PC, a Linux box or a Apple Mac, etc. So you are not tied to a particular
    type of operating system; you can use whatever you have available.

    However you will need to install some software on that computer. At a minimum
    you will need Python.

    This book focuses on Python 3 so you will need that. Some guidance on this is
    provided in Chap. 2 on setting up your environment.

    You will also need some form of editor in which to write your programs. There
    are numerous generic programming editors available for different operating systems
    with VIM on Linux, Notepad++ on Windows and Sublime Text on Windows and Macs being
    popular choices.

    However, using an Integrated Development Environment (IDE) editor such as PyCharm
    or potentially Visual Studio Code will make writing and running your programs
    much easier.'
