    string list: [''John'', ''Denise'', ''Phoebe'', ''Adam'']

    default ordering: [''Adam'', ''Denise'', ''John'', ''Phoebe'']

    sorting based on string length: [''John'', ''Adam'', ''Denise'', ''Phoebe'']

