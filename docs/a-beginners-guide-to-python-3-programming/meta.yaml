    it* refers to obtaining the value held by a variable. For example


    ```

    count = count + 1

    ```


    what this says is obtain the value held by `count`, add 1 to it and then store
    the new value back into `count`.

    If count does not have a value before you try to do this then you are trying to
    get hold of nothing and add 1 to it; which you can''t do and thus an error will
    be generated in your program, such as:


    ```

    NameError: name ''count_number_of_tries'' is not defined

    ```


    This is also true for


    ```

    count += 1

    ```


    Remember this is just a shorthand form of `count = count + 1` and thus still relies
    on `count` having a value before this statement.

    This is why we needed to initialize the `count_number_of_tries` variable before
    we used it.


    # 9.6.2 Blank Lines Within a Block of Code


    You may have noticed that we have used blank lines to group together certain lines
    of code in this example. This is intended to make it easier to read the code and
    are perfectly allowable in Python. Indeed, the Python layout guidelines encourage
    it.

    It is also possible to have a blank line within an indented block of code; the
    block of statements is not terminated until another line with valid Python on
    it is encountered which is not indented to the same level.


    # 9.7 Exercises


    For this chapter the exercises all relate to adding additional features to the
    game:


    +   1. Provide a cheat mode, for example if the user enters -1 print out the number
    they need to guess and then loop again. This does not count as one of their goes.

    2. If their guess is within 1 of the actual number tell the player this.

    3. At the end of the game, before printing ''Game Over'', modify your program
    so that it asks the user if they want to play again; if they say yes then restart
    the whole thing.'
