    \ 语句的值作为当前*循环*值返回。如果与 `for` 循环一起使用，则循环会为该值运行一次。在循环完成一次迭代后，生成器函数的执行将恢复，并获取下一个循环值。\n\
    \n*生成器*函数将持续提供值，直到返回（这意味着可以生成无限序列的值）。\n\n#### 31.2.1 定义生成器函数\n\n下面是一个非常简单的生成器函数示例。该函数名为\
