  md: '# Chapter 2

    Where is Python Used


    # 2.1 Introduction


    Python is one of the biggest and most popular programming languages in today’s
    technology world; whatever index or survey you look at Python is usually in the
    top 3 (along with Java and JavaScript). However, you might be forgiven for thinking
    that Python is a language exclusively used for Data Analytics or Data Science
    given the number of times these terms turn up alongside Python. However, Python
    has a wide and diverse range of uses. In this chapter we will look at eight uses
    of Python, some of which might surprise you.


    # 2.1.1 Data Analytics


    This is one of the two largest application areas for Python and may well be why
    you are reading this book in the first place. There are several widely used Data
    Analytics libraries available for Python including Pandas. Data Analytics (or
    analysis) is the practice of taking raw data and analyzing it to either understand
    that data and/or look for patterns in the data or to create new systems that can
    use knowledge gained from previous data to predict new trends or patterns in the
    future data. In both cases the aim is to provide value in some way to an organization
    or business as illustrated below.'
  merge: -1
  pgno: 40
- img_proc: true
  md: '![](img/bf6e2b02eb6625321d9af5664cea2d5d_41_0.png)


    The approaches to Data Analytics are not completely independent but illustrate
    the different purposes. For example, the “Discovery of Data Insight” side typically
    involves understanding and trends, patterns or relationships in the data to help
    an organization or business to improve their performance. For example, an online
    sales shop might use such insights to understand how and where to target specific
    promotions, a governmental health organization might use their data insights to
    determine where and when to target vaccinations, etc.


    In contrast the ‘Development of Data Product(s)’ typically involves using information
    with the data to help develop new systems that will be applied to future, as yet
    unseen data. For example, analysis of the data might help to identify patterns
    of fraudulent behaviour which might be used to develop new monitoring systems
    to catch similar fraud earlier and faster.


    The techniques used for such analysis are typically oriented around statistical
    analysis and data exploration. These are the facilities provided by libraries
    such as Pandas (see https://pandas.pydata.org/) which is by far the most widely
    used Python data analysis library. However, Pandas does not provide a complete
    solution on its own. For example, Pandas builds on other Python libraries such
    as NumPy (which provides sophisticated facilities for handling numbers see https://numpy.org/
    ). Pandas is also often used in combination with other libraries such as SciPy
    (which stands for Scientific Python see https://scipy.org/) and Matplotlib (see
    https://matplotlib.org/) which is a graphing library. The relationship between
    Pandas, Python and other commonly used data analysis-oriented libraries is shown
    below.'
  merge: -1
  pgno: 41
- img_proc: true
  md: '![](img/bf6e2b02eb6625321d9af5664cea2d5d_42_0.png)


    In addition several Data Analytics reporting systems and toolkits used outside
    the Python world also provide Python APIs allowing the results of any Python analysis
    to be incorporated into these systems. For example, the Tableau (https://www.tableau.com/)
    suite of tools provides a Python API allowing results created by Python to be
    incorporated into a Tableau dashboard for easy access and availability.


    # 2.1.2 Machine Learning and AI


    Following on from the previous section on data analysts it is not uncommon to
    apply some machine learning techniques when analyzing data, for example, to perform
    some classification of new data using previously seen data. That is, machine learning
    is a method of data analysis that automates analytical model building. Using algorithms
    that iteratively learn from data, machine learning allows computers to find hidden
    insights without being explicitly programmed. The general model is shown below.


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_42_1.png)


    This illustrates that training data (which may be what is called supervised or
    unsupervised) is fed into a machine learning algorithm and the output from this
    is a'
