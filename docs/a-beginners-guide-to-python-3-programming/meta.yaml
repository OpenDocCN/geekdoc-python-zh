  md: '# 8.5 Break Loop Statement


    Python allows programmers to decide whether they want to break out of a loop early
    or not (whether we are using a `for` loop or a `while` loop). This is done using
    the `break` statement.


    The `break` statement allows a developer to alter the normal cycle of the loop
    based on some criteria which may not be predictable in advance (e.g., it may be
    based on some user input).


    The `break` statement, when executed, will terminate the current loop and jump
    the program to the first line after the loop. The following diagram shows how
    this works for a for loop:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_121_0.png)'
  merge: -1
  pgno: 121
- img_proc: true
  md: "Typically, a guard statement (`if` statement) is placed on the `break` so that\
    \ the `break` statement is conditionally applied when appropriate.\n\nThis is\
    \ shown below for a simple application where the user is asked to enter a number\
    \ which may or may not be in the range defined by the `for` loop. If the number\
    \ is in the range, then we will loop until this value is reached and then break\
    \ the loop (that is terminate early without processing the rest of the values\
    \ in the loop):\n\n```\nprint('Only print code if all iterations completed')\n\
    num = int(input('Enter a number to check for: '))\nfor i in range(0, 6):\n   \
    \ if i == num:\n        break\n    print(i, ' ', end='')\nprint('Done')\n```\n\
    \nIf we run this and enter the value 7 (which is outside of the range) then all\
    \ the values in the loop should be printed out:\n\n```\nEnter a number to check\
    \ for: 7\n0 1 2 3 4 5 Done\n```\n\nHowever, if we enter the value 3 then only\
    \ the values 0, 1 and 2 will be printed out before the loop breaks (terminates)\
    \ early:\n\n```\nEnter a number to check for: 3\n0 1 2 Done\n```\n\nNote that\
    \ the string 'Done' is printed out in both cases as it is the first line after\
    \ the `for` loop that is not indented and is thus not part of the `for` loop.\n\
    \nNote that the `break` statement can come anywhere within the block of code associated\
    \ with the loop construct (whether that is a `for` loop or a `while` loop). This\
    \ means that there can be statements before it and after it.\n\n# 8.6 Continue\
    \ Loop Statement\n\nThe `continue` statement also affects the flow of control\
    \ within the looping constructs `for` and `while`. However, it does not terminate\
    \ the whole loop; rather it only terminates the current iteration round the loop.\
    \ This allows you to skip over part of a loop's iteration for a particular value,\
    \ but then to continue with the remaining values in the sequence."
