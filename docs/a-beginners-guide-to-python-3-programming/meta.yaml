  md: '![](img/bf6e2b02eb6625321d9af5664cea2d5d_430_0.png)


    This diagram illustrates the behaviour of a stack. Each time a new element is
    pushed onto the stack, it forces any existing elements further down the stack.
    Thus the most recent element is at the *top* of the stack, and the oldest element
    is at the *bottom* of the stack. To get to older elements you must first pop newer
    elements off the top, etc.


    Many stacks also allow features such as


    +   - *Top* which is often an operation that allows you to peek at the element
    at the top of the stack (that is see what the element is but do not remove it
    from the queue).


    # 37.5.1 Python List as a Stack


    A `List` may initially appear particularly well suited to being used as a `Stack`
    as the basic `append()` and `pop()` methods can be used to emulate the stack behaviour.
    Whatever was most recently appended to the list is the element that will be next
    returned from the `pop()` method, for example:


    ```

    stack = [] # create an empty stack

    stack.append(''task1'')

    stack.append(''task2'')

    stack.append(''task3'')

    print(''stack:'', stack)

    top_element = stack.pop()

    print(''top_element:'', top_element)

    print(''stack:'', stack)

    ```


    Which produces the output:


    ```

    stack: [''task1'', ''task2'', ''task3'']

    top_element: task3

    stack: [''task1'', ''task2'']

    ```


    This certainly works although when we print out the stack it does not make it
    clear that ''task3'' is at the front of the stack.'
