    \ pytz-2023.3 six-1.16.0 tzdata-2023.3\n\n(genesis_venv) projects %\n```\n\nThe\
    \ command used here is `pip install` followed by the name of the module to install.\
    \ In this case we have installed pandas. This will result in the latest version\
    \ of pandas being installed. However we could have specified a specific version\
    \ of pandas using the `==<version number>` option after the name of the module\
    \ (no spaces), for example:\n\n```\npip install pandas==1.5.2\n```\n\nThis would\
    \ install pandas version 1.5.2 rather than the latest version.\n\nIt is also worth\
    \ noting that in addition to installing Pandas (version 2.0.1) several other modules\
