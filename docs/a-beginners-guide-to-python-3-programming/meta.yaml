    \    print_max()\n  File \"main.py\", line 98, in print_max\n    max = max + 1\n\
    UnboundLocalError: local variable 'max' referenced before assignment\n```\n\n\
    This is because the variable max is local to the function, and there does not\
    \ have a value assigned to when we try to access it to add 1 to the current max.\n\
    Why does it do this? To protect us from ourselves—Python is really saying ‘Do\
    \ you really want to modify a global variable here?’ Instead, it is treating max\
    \ as a local variable and as such it is being referenced before a value has been\
    \ assigned to it.\nTo tell Python that we know what we are doing and that we want\
    \ to reference the global variable at this point we need to use the keyword global\
    \ with the name of the variable. For example:\n\n```\nmax = 100\n\ndef print_max():\n\
    \    global max\n    max = max + 1\n    print(max)\n\nprint_max()\nprint(max)\n\
    ```\n\nNow when we try to update the variable max inside the function print_max(),\
    \ Python knows we mean the global version of the variable and uses that one. The\
    \ result is that we now print out the value 101 and max is updated to 101 for\
    \ everyone everywhere!"
