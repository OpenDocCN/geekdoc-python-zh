    # 42.7 Listing and Freezing on Modules


    There are three similar pip tools that can provide information on the modules
    installed in a virtual environment. The commands are:


    +   - pip list—this generates a list of installed packages, and the list is ordered
    in ascending order based on the case sensitive module names.

    - pip inspect—which generates a very detailed output file of all the modules installed.

    - pip freeze—which generates output in requirements format that can be used to
    regenerate the configuration of the current virtual environment in another installation.


    Each of these will be discussed below.


    # 42.7.1 The pip list Command


    As an example of using this command we will list the modules installed into the
    virtual environment we created above:


    ```

    (genesis_venv) % pip list

    Package           Version

    ----------------- -------

    numpy             1.24.3

    pandas            2.0.1

    pip               23.1.2

    python-dateutil   2.8.2

    pytz              2023.3

    setuptools        67.6.1

    six               1.16.0

    tzdata            2023.3

    (genesis_venv) projects %

    ```'
