  md: "print('oops')\n\nThe Exception class is a grandparent of the ZeroDivisionError,\
    \ thus any ZeroDivisionError object is also a type of Exception, and thus the\
    \ except block matches the exception passed. This means that you can write one\
    \ except clause and that clause can handle a whole range of exceptions.\n\nHowever,\
    \ if you don't want to have a common block of code handling your exceptions, you\
    \ can define different behaviours for different types of exception. This is done\
    \ by having a series of except clauses; each monitoring a different type of exception:\n\
    \n```\ntry:\n    runcalc(6)\nexcept ZeroDivisionError:\n    print('oops')\nexcept\
    \ IndexError:\n    print('arrgh')\nexcept FileNotFoundError:\n    print('huh!')\n\
    except Exception:\n    print('Duh!')\n```\n\nIn this case the first except monitors\
    \ for a ZeroDivisionError but the other excepts monitor for other types of exception.\
    \ Note that the except Exception is the last except clause in the list as ZeroDivisionError,\
    \ IndexError and FileNotFoundError are all eventual subclasses of Exception, and\
    \ thus this clause would catch any of these types of exception. As only one except\
    \ clause is allowed to run; if this except handler came fist the other except\
    \ handers would never ever be run.\n\n# 26.5.1 Accessing the Exception Object\n\
    \nIt is possible to gain access to the exception object being caught by the except\
    \ clause using the as keyword. This follows the exception type being monitored\
    \ and can be used to bind the exception object to a variable, for example:\n\n\
    ```\ntry:\n    runcalc(6)\nexcept ZeroDivisionError as exp:\n    print(exp)\n\
    \    print('oops')\n```\n\nWhich produces\n\n```\ndivision by zero\noops\n```"
