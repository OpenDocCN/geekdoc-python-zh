    \ `tzdata` (2022.1), `numpy` (1.21.0) and `six` (1.5).\n\nIf we now ask pip to\
    \ list what has been installed we can now see these modules listed:\n\n```\n(genesis_venv)\
    \ % pip list\nPackage            Version\n------------------ -------\nnumpy  \
    \            1.24.3\npandas             2.0.1\npip                23.1.2\npython-dateutil\
    \    2.8.2\npytz               2023.3\nsetuptools         67.6.1\nsix        \
