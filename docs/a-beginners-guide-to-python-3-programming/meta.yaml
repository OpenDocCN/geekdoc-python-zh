    \n# 使用名称访问\nprint(f'通过命名成员访问姓名 (student.name): {undergrad_student.name}')\n\n\
    # 可以使用 _fields 获取字段名称\nprint(undergrad_student._fields)\n```\n\n此代码示例创建了一个名为 'Student'\
    \ 的新命名元组，并将其存储到名为 Student 的变量中。注意大写，这里的 Student 代表一个新的命名元组类型，因此遵循用户定义类型的大写约定。\n\
    \nStudent 命名元组具有 name、age 和 degree 成员。\n\n当我们创建一个命名的学生实例时，我们使用 Student 变量（其中包含新创建的命名元组），并为\
    \ name、age 和 degree 成员提供值。为本科生创建的第一个实例使用位置参数传递来初始化成员值。第二个示例使用命名参数传递来完成同样的事情。\n\
    \n当打印命名元组时，默认表示将显示类型名称和每个键值对。\n\n接下来，我们演示了如何使用位置索引和命名成员访问来访问命名元组中的值。这个 [0] 和 .name\
    \ 都访问了命名元组 Student 的 name 元素。\n\n最后，代码示例说明了可以访问命名元组中的名称元组——这对于迭代或向用户显示很有用。\n\n\
    此程序的输出为：\n\n```\nStudent(name='John', age='21', degree='Computer Science')\nStudent(name='Denise',\
    \ age=25, degree='PhD')\n通过索引访问姓名 (student[0]): John\n通过命名成员访问姓名 (student.name):\
    \ John\n('name', 'age', 'degree')\n```\n\n也可以使用标准的 for 循环遍历命名元组中的值，例如：\n\n```python\n\
    for value in undergrad_student:\n    print(value)\n```\n\n这将产生预期的输出：\n\n```\n\
    John\n21\nComputer Science\n```\n\n请注意，如果你尝试在创建命名元组后更改其值，例如如下所示：\n\n```python\n\
    postgrad.name = \"Pete\"\nprint(postgrad)\n```\n\n你将生成一个 `AttributeError`，因为命名元组是不可变的：\n\
    \n```\nTraceback (most recent call last):\n  File \"namedtuple_example.py\", line\
    \ 25, in <module>\n    postgrad.name = \"Pete\"\nAttributeError: can't set attribute\n\
    ```\n\n## 36.4 Itertools 模块\n\n`itertools` 模块是另一个值得熟悉的模块。该模块提供了许多有用的函数，这些函数返回以各种方式构造的迭代器。由于有许多不同的选项可用，因此值得查看文档以获取可用函数的完整列表。\n\
    \n为了让你了解一些可用的功能，请看以下代码清单：\n\n```python\nimport itertools\n\n# 将两个迭代器连接在一起\nr1\
    \ = list(itertools.chain([1, 2, 3], [2, 3, 4]))\nprint(r1)\n\n# 创建一个元素重复指定次数的迭代器（可能是无限的）\n\
    r2 = list(itertools.repeat('hello', 5))\nprint(r2)\n\n# 创建一个迭代器，其元素来自第一个迭代器，从谓词函数失败的地方开始\n\
    values = [1, 3, 5, 7, 9, 3, 1]\nr3 = list(itertools.dropwhile(lambda x: x < 5,\
    \ values))\nprint(r3)\n\n# 创建一个迭代器，其元素来自提供的迭代器，位于两个索引之间（第二个索引使用 'None' 表示到末尾）\n\
    r4 = list(itertools.islice(values, 3, 6))\nprint(r4)\n```\n\n此代码的输出为：\n\n```\n\
    [1, 2, 3, 2, 3, 4]\n['hello', 'hello', 'hello', 'hello', 'hello']\n[5, 7, 9, 3,\
    \ 1]\n[7, 9, 3]\n```\n\n## 36.5 在线资源\n\n关于 itertools 库的在线资源如下：\n\n- https://docs.python.org/3/library/itertools.html\
