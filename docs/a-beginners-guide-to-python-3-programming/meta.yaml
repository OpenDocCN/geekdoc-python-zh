    \ example both `outer()` and `inner()` functions modify the `title` variable.\
    \ However, they are not the same `title` variable and as long as this is what\
    \ we need then that is fine; both functions have their own version of a `title`\
    \ local variable.\n\nThis can be seen in the output where the outer function maintains\
