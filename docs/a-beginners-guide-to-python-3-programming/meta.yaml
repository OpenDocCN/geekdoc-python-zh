    print()\n```\n\nIn this case we are not interested in the values generated by\
    \ the range per se only in looping 10 times; thus there is no benefit in recording\
    \ the loop variable. The loop variable is represented by the underbar character\
    \ (`_`).\nNote that in actual fact this is a valid variable and can be referenced\
