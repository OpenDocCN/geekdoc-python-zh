  md: '# 6.5 Complex Numbers


    Complex numbers are Pythons third type of built-in numeric type. A complex number
    is defined by a real part and an imaginary part and has the form a + bi (where
    i is the imaginary part and a and b are real numbers):


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_96_0.png)


    The real part of the number (a) is the real number that is being added to the
    pure imaginary number.

