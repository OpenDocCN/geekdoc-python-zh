  md: '![](img/bf6e2b02eb6625321d9af5664cea2d5d_256_0.png)


    As an example, consider the class hierarchy illustrated above. A generic root
    class has been defined. This class defines a `Conveyance` which has doors, fuel
    (both with default values) and a method, `start_up()`, that starts the engine
    of the conveyance. Three subclasses of `Conveyance` have also been defined: `Dinghy`,
    `Car` and `Tank`. Two of these subclasses are appropriate, but one should probably
    not inherit from `Conveyance`. We shall consider each in turn to determine their
    suitability.


    +   - The class `Tank` overrides the number of doors inherited, uses the `start_up`
    method within the method `move`, and provides a new attribute. It therefore matches
    all three of our criteria.

    - Similarly, the class `Car` overrides the number of doors and uses the method
    `start_up()`. It also uses the instance variable `fuel` within a new method `accelerate()`.
    It also, therefore, matches our criteria.

    - The class `Dinghy` defines a new attribute `sails` and a new method `set_sail()`.
    As such, it does not use any of the features inherited from `Conveyance`. However,
    we might say that it has extended `Conveyance` by providing this attribute and
    method. We must then consider the features provided by `Conveyance`. We can ask
    ourselves whether they make sense within the context of `Dinghy`. If we assume
    that a dinghy is a small sail-powered boat, with no cabin and no engine, then
    nothing inherited from `Conveyance` is useful. In this case, it is likely that
    `Conveyance` is misnamed, as it defines some sort of a motor vehicle, and the
    `Dinghy` class should not have extended it.


    # 21.8 Overriding Methods


    Overriding occurs when a method is defined in a class (for example, `Person`)
    and also in one of its subclasses (for example, `Employee`). It means that instances
    of `Person` and `Employee` both respond to requests for this method to be run
    but each has their own implementation of the method.'
