    \ {tuple1}')\nprint(f'fs1: {fs1}')\n\nprint('-' * 10)\n\nfs2 = frozenset(list1)\n\
    print(f'list1: {list1}')\nprint(f'fs2: {fs2}')\n\nprint('-' * 10)\n\nfs3 = frozenset(dict1)\n\
    print(f'dict1: {dict1}')\nprint(f'fs3: {fs3}')\n\nprint('-' * 10)\n\nfs4 = frozenset(set1)\n\
    print(f'set1: {set1}')\nprint(f'fs4: {fs4}')\n```\n\nWhen this code is run the\
    \ output generated is\n\n```\ntuple1: (1, 2, 3, 4, 3, 2)\nfs1: frozenset({1, 2,\
    \ 3, 4})\n----------\nlist1: ['A', 'B', 'C', 'B', 'A']\nfs2: frozenset({'A', 'B',\
    \ 'C'})\n----------\ndict1: {'Wales': 'Cardiff', 'England': 'London', 'Scotland':\
    \ 'Edinburgh'}\nfs3: frozenset({'Wales', 'Scotland', 'England'})\n----------\n\
    set1: {'banana', 'apple', 'orange'}\nfs4: frozenset({'banana', 'apple', 'orange'})\n\
    ```\n\nThere are a few things to note about this:\n\n- The first is that the `frozenset`\
