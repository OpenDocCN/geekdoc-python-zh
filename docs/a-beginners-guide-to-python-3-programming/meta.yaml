    \ 命令和程序。为此，他们使用网络浏览器，该浏览器会自动在网页中显示图形和表格格式，这在某些领域非常有用。\n\nJupyter notebooks 必须安装到你的\
    \ Python 环境中，例如使用以下命令\n\n```\npip install jupyter\n```\n\n安装完成后，可以使用以下命令启动一个新的\
    \ notebook\n\n```\njupyter notebook\n```\n\n这将启动一个后台 Python 编译服务器和运行时，并打开一个 Jupyter\
    \ notebooks 浏览器窗口，如下图所示：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_38_0.png)\n\
    \n现在你可以在浏览器中输入 Python 语句和表达式，生成的结果将显示在浏览器中。\n\n## 1.9 有用资源\n\n网络上有大量关于 Python\
    \ 的资源；我们在此列出一些你应该收藏的。我们不会反复提及这些资源以避免重复，但你可以在需要时随时参考本节：\n\n- [https://en.wikipedia.org/wiki/Python_Software_Foundation](https://en.wikipedia.org/wiki/Python_Software_Foundation)\
    \ Python 软件基金会。\n- [https://docs.python.org/3/](https://docs.python.org/3/) 主要的\
    \ Python 3 文档站点。它包含教程、库参考、设置和安装指南以及 Python 操作指南。\n- [https://docs.python.org/3/library/index.html](https://docs.python.org/3/library/index.html)\
    \ Python 语言所有内置功能的列表——你可以在这里找到本书中将要使用的各种类和函数的在线文档。\n- [https://pymotw.com/3/](https://pymotw.com/3/)\
    \ Python 3 模块每周精选网站。该网站包含大量 Python 模块，附有简短示例和模块功能说明。Python 模块是一个功能库，它建立在核心 Python\
    \ 语言之上并对其进行扩展。例如，如果你有兴趣使用 Python 构建游戏，那么 pyjama 就是一个专门为此设计的模块，旨在让开发更轻松。\n- [http://www.pythonweekly.com/](http://www.pythonweekly.com/)\
    \ 是一份免费的每周摘要，涵盖最新的 Python 文章、项目、视频和即将举行的活动。\n\n# 第 2 章\nPython 的应用领域\n\n## 2.1\
    \ 简介\n\nPython 是当今技术世界中最大、最受欢迎的编程语言之一；无论你看哪个指数或调查，Python 通常都位列前三（与 Java 和 JavaScript\
    \ 并列）。然而，考虑到“数据分析”或“数据科学”这些术语与 Python 同时出现的次数之多，你可能会误以为 Python 是一种专门用于数据分析或数据科学的语言。但实际上，Python\
    \ 的应用范围广泛而多样。在本章中，我们将探讨 Python 的八种用途，其中一些可能会让你感到惊讶。\n\n### 2.1.1 数据分析\n\n这是 Python\
    \ 两大最大的应用领域之一，也可能是你阅读本书的初衷。Python 有几个广泛使用的数据分析库，包括 Pandas。数据分析（或分析）是指获取原始数据并对其进行分析，以理解该数据和/或寻找数据中的模式，或者创建能够利用从先前数据中获得的知识来预测未来数据中的新趋势或模式的新系统。无论哪种情况，目标都是以某种方式为组织或企业提供价值，如下图所示。\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_41_0.png)\n\n数据分析的方法并非完全独立，而是说明了不同的目的。例如，“数据洞察发现”方面通常涉及理解数据中的趋势、模式或关系，以帮助组织或企业提高其绩效。例如，在线销售商店可能会利用此类洞察来了解如何以及在何处针对特定促销活动，政府卫生组织可能会利用其数据洞察来确定在何处以及何时开展疫苗接种等。\n\
    \n相比之下，“数据产品开发”通常涉及利用数据中的信息来帮助开发新的系统，这些系统将应用于未来的、尚未见过的数据。例如，对数据的分析可能有助于识别欺诈行为模式，这些模式可用于开发新的监控系统，以便更早、更快地发现类似的欺诈行为。\n\
    \n用于此类分析的技术通常围绕统计分析和数据探索展开。这些是 Pandas（参见 https://pandas.pydata.org/）等库提供的功能，Pandas\
    \ 是迄今为止使用最广泛的 Python 数据分析库。然而，Pandas 本身并不能提供完整的解决方案。例如，Pandas 建立在其他 Python 库之上，例如\
    \ NumPy（提供处理数字的复杂功能，参见 https://numpy.org/）。Pandas 也经常与其他库结合使用，例如 SciPy（代表 Scientific\
    \ Python，参见 https://scipy.org/）和 Matplotlib（参见 https://matplotlib.org/），后者是一个绘图库。Pandas、Python\
    \ 和其他常用数据分析相关库之间的关系如下图所示。\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_42_0.png)\n\
    \n此外，一些在 Python 世界之外使用的数据分析报告系统和工具包也提供了 Python API，允许将任何 Python 分析的结果整合到这些系统中。例如，Tableau（https://www.tableau.com/）工具套件提供了\
    \ Python API，允许将 Python 创建的结果整合到 Tableau 仪表板中，以便轻松访问和使用。\n\n### 2.1.2 机器学习与人工智能\n\
    \n继上一节关于数据分析的内容之后，在分析数据时应用一些机器学习技术是很常见的，例如，使用先前看到的数据对新数据进行一些分类。也就是说，机器学习是一种自动化分析模型构建的数据分析方法。机器学习使用从数据中迭代学习的算法，使计算机能够在没有明确编程的情况下发现隐藏的洞察。通用模型如下图所示。\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_42_1.png)\n\n这说明了训练数据（可能是所谓的监督或无监督数据）被输入到机器学习算法中，其输出是一个系统，该系统可用于根据新数据对新数据进行分类、预测行为或做出某些决策。\n\
    \n监督学习任务涉及使用带有已知结果标签或标记的数据来教授学习系统。例如，贷款数据中申请被标记为欺诈或非欺诈等。\n\n相比之下，无监督数据涉及向学习系统提供数据——没有预期结果的指示，然后识别该数据中的模式或聚类。这使用户能够理解或了解更多关于数据的信息。术语“无监督”旨在表明没有已知（或至少未提供）的正确答案（因此没有老师）。在某些情况下，存在大量数据，但只有其中一部分数据可以标记适当的结果或结论。此类问题有时被称为半结构化机器学习。在许多情况下，需要结合监督和无监督技术来分析此类数据。\n\
    \n与 Python 一起使用的每种常用机器学习算法都有其优缺点以及最适合应用的情况。因此，拥有一个可以在适当时应用的此类算法工具箱是非常有用的。\n\n\
    Python 中有几个常用的库可用于此目的，包括 SciKitLearn（又名 SKLearn）、TensorFlow 和 PyTorch。总的来说，SciKitLearn\
    \ 和 TensorFlow 在 Python 市场上的份额大致相同，PyTorch 紧随其后，尽管就 Python 开发者的使用率而言，三者都接近 30%。\n\
    \n有关机器学习的更多信息，请参阅：\n\n- 哈佛商业评论——“每位经理都应该了解的机器学习知识”\n  - http://hbr.org/2015/07/what-every-manager-should-know-about-machine-learning\n\
