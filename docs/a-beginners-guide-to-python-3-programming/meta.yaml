    \ and either returns nothing (None) or something.\n\nIt should also be noted that\
    \ the decorator is also at liberty to completely replace a callable object rather\
    \ than to wrap it; it’s a design decision made by the implementor of the decorator.\n\
    \n# 29.3 Defining a Decorator\n\nTo define a decorator you need to define a callable\
    \ object such as a function that takes another function as a parameter and returns\
    \ a new function.\n\nAn example of the definition of a very simple logger decorator\
    \ function is given below.\n\n```\npython\ndef logger(func):\n    def inner():\n\
    \        print('calling ', func.__name__)\n        func()\n        print('called\
    \ ', func.__name__)\n\n    return inner\n```\n\nIn this case the logger decorator\
    \ wraps the original function within a new function, here called `inner`. When\
    \ this function is executed, a statement is logged before and after the original\
