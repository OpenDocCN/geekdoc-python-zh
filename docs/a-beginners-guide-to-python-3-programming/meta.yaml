    \ syntax, for example:\n\n```\n@logger\ndef target():\n    print('In target function')\n\
    \ntarget()\n```\n\nThis has the same effect as passing target into the `logger`\
    \ function; but illustrates the role of the `logger` in a rather more Pythonic\
