    TypeError: 'list' object is not callable\n```\n\n此错误表明 `list()` 不是可调用的，即它不是可以被调用（或执行）的东西。如果我们查阅Python文档中关于\
    \ `list()` 构造函数的内容（参见 [https://docs.python.org/3/library/stdtypes.html#typesseq-list](https://docs.python.org/3/library/stdtypes.html#typesseq-list)），我们可以看到\
    \ `list()` 可用于从可迭代对象创建列表，而集合当然是可迭代的容器。那么问题出在哪里呢？\n\n问题在于变量 list 的*名称*隐藏（或遮蔽）了内置函数\
    \ `list` 的*名称*。因此，当我们尝试调用 `list()` 时，Python找到了包含 `List` 数据结构的变量 list，然后尝试执行它，此时就产生了错误。\n\
    \n大多数IDE会警告你正在遮蔽/隐藏内置名称；你可以使用此功能来重命名你的变量、函数或类。例如：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_512_0.png)\n\
    \n上图使用了PyCharm，IDE指示我们正在遮蔽内置*名称* list，并且我们可以“重命名该元素”。\n\n## 45.10 错误 #8：隐藏内置模块\n\
    \nPython查找要加载的模块的方式是搜索一系列预定义的位置。默认情况下，这组位置首先在当前目录中查找，然后在Python安装目录中搜索内置模块。\n\n\
    由于Python模块是文件，例如模块 `sys` 定义在名为 `sys.py` 的文件中，因此可以在*当前*目录中创建一个与系统提供的模块同名的文件。例如，`sys`\
    \ 是一个内置模块，但是如果我们当前目录中确实有一个名为 `sys.py` 的文件，如果我们的代码引用了 `sys` 模块：\n\n```\npython\n\
    import sys\n```\n\nPython将加载本地文件而不是系统模块。当程序员随后尝试访问 `sys` 中定义的函数和类时，会发现它们不可用。\n\
    \n第一次发生这种情况时可能会非常令人困惑。但是，如果程序员将鼠标悬停在import语句上，IDE通常会指示导入的来源：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_513_0.png)\n\
    \n正如我们所预期的，sys应该是一个内置模块，但它从本地目录加载的事实表明这不是正确的模块。如果我们重命名sys.py文件为其他名称并重新检查导入，我们可以看到现在呈现的是关于该模块的信息：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_513_1.png)\n\n## 45.11 错误 #9：函数引用与函数调用\n\
    \nPython支持许多函数式编程概念。该语言能够做到这一点的关键在于函数是可调用对象。也就是说，它们是内存中的对象，可以被引用或执行（调用）。\n\n然而，这可能会让新开发者感到困惑。例如，以下代码是合法的Python代码：\n\
    \n```\npython\nimport random\n\nmessages = ['Hi', 'Hello', 'Welcome']\n\ndef get_mod():\n\
    \    return messages[random.randint(0, len(messages) - 1)]\n\nx = get_mod()\n\
    print(x)\ny = get_mod\nprint(y)\n```\n\n运行此代码时的输出为\n\n```\nWelcome\n<function\
    \ get_mod at 0x1079c60d0>\n```\n\n输出的第一行可能是你预期的那种；即打印出一条消息，在本例中是第三条‘Welcome’。然而，输出的第二行看起来可能非常奇怪。\n\
    \n发生的情况是，对于变量x的声明，我们赋值了调用（或执行）函数 `get_mod()` 返回的结果。然而，我们将函数 `get_mod` 的引用赋给了变量y。实际上，变量y现在是函数\
    \ `get_mod` 的别名。因此，当我们打印y的值时，我们得到的是指示内存中特定位置的名为 `get_mod` 的函数的引用。\n\n从语言的角度来看，这不是一个错误，也就是说，获取函数的引用是有效的操作。然而，它可能会让新程序员感到困惑，并导致如上所见的错误。\n\
    \n为了纠正这一点，重要的是要记住在调用/调用函数时包含 `()`，例如：\n\n```\ny = get_mod()\nprint(y)\n```\n\n\
    ## 45.12 错误 #10：在迭代列表时修改它\n\nPython允许程序员以多种方式依次处理列表中的每个元素。其中一种是在for循环中使用列表索引访问，例如\n\
    \n```\nnumbers = [1, 2, 3, 4]\nfor index in range(len(numbers)):\n    print(index)\n\
    \    if numbers[index] % 2 == 1:\n        del numbers[index]\nprint(numbers)\n\
    ```\n\n此循环用于从numbers变量持有的列表中移除所有奇数。\n\n然而，当我们运行此程序时，会产生一个错误："
