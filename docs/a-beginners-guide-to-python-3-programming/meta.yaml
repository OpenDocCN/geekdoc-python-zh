    # 12.9 Function Parameters


    Before we go any further it is worth clarifying some terminology associated with
    passing data into functions. This terminology relates to the parameters defined
    as part of the function header and the data passed into the function via these
    parameters:


    +   - A *parameter* is a variable defined as part of the function header and is
    used to make data available within the function itself.

    - An *argument* is the actual value or data passed into the function when it is
    called. The data will be held within the parameters.


    Unfortunately many developers use these terms interchangeably, but it is worth
    being clear on the distinction.


    # 12.9.1 Multiple Parameter Functions


    So far the functions we have defined have only had zero or one parameter; however
    that was just a choice. We could easily have defined a function which defined
    two or more parameters. In these situations, the parameter list contains a list
    of parameter names separated by a comma.'
  - "[PAGE 167]\n\nFor example,\n\n```\ndef greeter(name, message):\n    print('Welcome',\
