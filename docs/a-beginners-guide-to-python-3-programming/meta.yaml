    \ is to write a recursive function that can solve what might at first appear to\
    \ be a complex problem.\n\n# 10.5 Recursion in Python\n\nMost computer programs\
    \ support the idea of recursion and Python is no exception. In Python it is perfectly\
    \ legal to have a function that calls itself (that is within the body of the function\
    \ a call is made to the same function). When the function is executed it will\
    \ therefore call itself."
