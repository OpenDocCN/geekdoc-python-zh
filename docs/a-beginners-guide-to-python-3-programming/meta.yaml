    \n## 8.9 骰子游戏\n\n以下简短程序说明了如何使用 while 循环来控制主代码体的执行。在这个游戏中，我们将继续掷一对骰子，直到用户表示他们不想再掷为止。当这种情况发生时，while\
    \ 循环将终止：\n\n```python\nimport random\n\nMIN = 1\nMAX = 6\n\nroll_again = 'y'\n\
    \nwhile roll_again == 'y':\n    print('Rolling the dices...')\n    print('The\
