  md: "derived. For example, an imperative approach to looping through some container\
    \ and printing out each result in turn would look like this:\n\n```\nint sizeOfContainer\
    \ = container.length\nfor (int i = 1 to sizeOfContainer) do\n    element = container.get(i)\n\
    \    print(element)\nenddo\n```\n\nWhereas a Functional Programming approach would\
    \ look like:\n\n```\ncontainer.foreach(print)\n```\n\nFunctional Programming has\
    \ its roots in the lambda calculus, originally developed in the 1930s to explore\
    \ computability. Many Functional Programming languages can thus be considered\
    \ as elaborations on this lambda calculus. There have been numerous pure Functional\
    \ Programming languages including Common Lisp, Clojure and Haskell. Python provides\
    \ some support for writing in the functional style, particularly where the benefits\
    \ of it are particularly strong (such as in processing various different types\
    \ of data).\n\nIndeed, when used judiciously, Functional Programming can be a\
    \ huge benefit for, and an enhancement to, the toolkit available to developers.\n\
    \nTo summarize then:\n\n+   - **Imperative Programming** is what is currently\
    \ perceived as traditional programming. That is, it is the style of programming\
    \ used in languages such as C, C++, Java and C#. In these languages a programmer\
    \ tells the computer what to do. It is thus oriented around control statements,\
    \ looping constructs and assignments.\n- **Functional Programming** aims to describe\
    \ the solution, that is, *what* the program needs to do (rather than *how* it\
    \ should be done).\n\n# 15.3 Advantages to Functional Programming\n\nThere are\
    \ a number of significant advantages to Functional Programming compared to imperative\
    \ programming. These include:\n\n+   1. **Less code.** Typically, a Functional\
    \ Programming solution will require less code to write than an equivalent imperative\
    \ solution. As there is less code to write, there is also less code to understand\
    \ and to maintain. It is therefore possible that functional programs are not only\
    \ more elegant to read but easier to update and maintain. This can also lead to\
    \ enhanced programmer productivity as they spend less time writing reams of code\
    \ as well as less time reading those reams of code.\n2. **Lack of (hidden) side\
    \ effects (Referential Transparency).** Programming without side effects is good\
    \ as it makes it easier to reason about functions (that is a function is completely\
    \ described by the data that goes in and the results that come back). This also\
    \ means that it is safe to reuse these functions in different"
