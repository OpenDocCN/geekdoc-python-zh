  md: "This is a very powerful feature of Python and allows code originally written\
    \ to work with a specific set of types, to also be used with a completely new\
    \ set of types; as long as they meet the *implicit* contract defined within the\
    \ code.\n\nIt is also interesting to note, that a particular set of methods may\
    \ have a *super set* of requirements on a particular type, but you only need to\
    \ implement as much as is required for the functionality you will actually use.\n\
    \nFor example, let us modify the `Calculator` class a bit and add some more methods\
    \ to it:\n\n```\nclass Calculator:\n    \"\"\" Simple Calculator class\"\"\"\n\
    \    def add(self, x, y):\n        return x + y\n\n    def subtract(self, x, y):\n\
    \        return x - y\n\n    def multiply(self, x, y):\n        return x * y\n\
    \n    def divide(self, x, y):\n        return x/y\n```\n\nAt first sight this\
    \ may indicate that anything being used with the `Calculator` must implement all\
    \ four operators `+`, `-`, `/` and `*`. However, this is only true if you need\
    \ to execute all four of the methods defined in the class.\n\nFor example, consider\
    \ the type `Distance`:\n\n```\nclass Distance:\n    def __init__(self, d):\n \
    \       self.value = d\n    def __add__(self, other):\n        return Distance(self.value\
    \ + other.value)\n    def __sub__(self, other):\n        return Distance(self.value\
    \ - other.value)\n    def __str__(self):\n        return 'Distance[' + str(self.value)\
    \ + ']'\n```\n\nThis defines a class that implements only the `__add__()` and\
    \ `__sub__()` methods and will thus only support the `+` and `-` operators.\n\n\
    Can instances of `Distance` be used with the `Calculator` class? The answer is\
    \ that they can but only with the add and subtract methods (as they only meet\
    \ part of the implied contract between the `Calculator` class and any types used\
    \ with that class).\n\nWe can thus write\n\n```\nd1 = Distance(6)\nd2 = Distance(3)\n\
    print(calc.add(d1, d2))\nprint(calc.subtract(d1, d2))\n```"
