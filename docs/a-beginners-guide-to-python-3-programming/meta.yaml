    \ This variable is now available within the body of the case condition and can\
    \ be used to log the direction the user is going in.\n\nFor example, by calling\
    \ the function as shown below:\n\n```\ndirection2(['go', 'north'])\n```\n\nWe\
    \ will obtain the output:\n\n```\nGoing north\n```\n\n## 41.10 Guards on a Case\
    \ Condition\n\nIn some situations it is useful to be able to put an additional\
    \ *guard* onto a case condition. For example, if we want to check to see that\
    \ an extracted value is a member of a group of values that are not hardcoded into\
    \ the `match` statement then we can use a guard.\n\nThe following example uses\
    \ a case condition guard to check that the extracted `direction` variable contains\
    \ a value in a list of `VALID_DIRECTIONS`:\n\n```\nVALID_DIRECTIONS = [\"north\"\
    , \"south\", \"east\", \"west\"]\n```\n\n```\ndef handle_command(command):\n \
    \   match command:\n        case ['go', direction] if direction in VALID_DIRECTIONS:\n\
    \            print(f'Going {direction}')\n        case _:\n            print('Wrong\
    \ direction')\n```\n\nWhen the `handle_command()` function is invoked using a\
    \ list of two values, if the first value is ‘go’ then the case condition will\
    \ be triggered, the second value will be extracted into the `direction` variable,\
    \ and the value it holds will be checked against the values in the `VALID_DIRECTIONS`\
    \ list.\n\nIf the value is a member of this list then the case condition will\
    \ be activated and the case condition body will be executed. However, if the value\
    \ extracted is not a member of the `VALID_DIRECTIONS` list then the case condition\
    \ will not be activated and the program will fall through to the wildcard.\n\n\
    This is illustrated by the following two lines of code:\n\n```\nhandle_command(['go',\
    \ 'east'])\nhandle_command(['go', 'north-east'])\n```\n\nThe output from this\
