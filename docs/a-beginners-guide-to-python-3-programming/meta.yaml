    \ than the code implementing the length method; thus, if the internal representation\
    \ changes we will not affect the `is_empty()` method.\n\nThe following short program\
    \ illustrates how the Queue class can be used:\n\n```\nqueue = Queue()\nprint('queue.is_empty():',\
    \ queue.is_empty())\nqueue.enqueue('task1')\nprint('len(queue):', len(queue))\n\
    queue.enqueue('task2')\nqueue.enqueue('task3')\nprint('queue:', queue)\nprint('queue.peek():',\
