    | Floor Division | q1 // q2 | `__floordiv__(self, q2)` |\n| Modulo (Remainder)\
    \ | q1% q2 | `__mod__(self, q2)` |\n| Bitwise Left Shift | q1 << q2 | `__lshift__(self,\
    \ q2)` |\n| Bitwise Right Shift | q1 >> q2 | `__rshift__(self, q2)` |\n\nWe have\
    \ already seen examples of add and subtract; this table indicates how we can also\
    \ provide operators for multiplication and division etc.\n\nThe above table also\
