    # 32.4 Tuples


    Tuples, along with Lists, are probably one of Pythons'' most used container types.
    They will be present in almost any non-trivial Python program.

    Tuples are an immutable ordered collection of objects; that is, each element in
    a tuple has a specific position (its index) and that position does not change
    over time. Indeed, it is not possible to add or remove elements from the tuple
    once it has been created.

    The Python type that represents a tuple is `tuple`.


    # 32.4.1 Creating Tuples


    Tuples are defined using parentheses (i.e., round brackets ''( )'') around the
    elements that make up the tuple, for example:


    ```

    tup1 = (1, 3, 5, 7)

    ```


    This defines a new `tuple` which is referenced by the variable `tup1`. The `tuple`
    contains exactly 4 elements (in this case integers) with the first element in
    the tuple (the integer 1) having the index 0 and the last element in the tuple
    (the integer 7) having the index 3. This is illustrated below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_377_0.png)


    # 32.4.2 The Tuple() Constructor Function


    The `tuple()` function can also be used to create a new tuple from an iterable.
    An iterable is something that implements the iterable protocol (see the last chapter).

    This means that a new tuple can be created from a `set`, a `list`, a `dict` (as
    these are all *iterable* types) or any type that implements the iterable protocol.'
  - '[PAGE 378]


    The syntax of the `tuple()` function is


    ```

    tuple(iterable)

    ```


    For example:


    ```

    list1 = [1, 2, 3]

    t1 = tuple(list1)

    print(t1)

    ```


    which generates the output:


    ```

    (1, 2, 3)

    ```


    Note that in the above the square brackets are used to represent a *list* of things
    (the list container type is described in more detail later in this chapter).


    # 32.4.3 Accessing Elements of a Tuple


    The elements of a `tuple` can be accessed using an *index* in square brackets.
    The index returns the object at that position, for example:


    ```

    print(''tup1[0]:\t'', tup1[0])

    print(''tup1[1]:\t'', tup1[1])

    print(''tup1[2]:\t'', tup1[2])

    print(''tup1[3]:\t'', tup1[3])

    ```


    which generates the output


    ```

    tup1[0]:  1

    tup1[1]:  3

    tup1[2]:  5

    tup1[3]:  7

    ```


    # 32.4.4 Creating New Tuples from Existing Tuples


    It is also possible to return what is known as a slice from a `tuple`. This is
    a new `tuple` which is comprised of a subset of the original `tuple`. This is
    done by providing the start and end indexes for the slice, separated by a colon,
    within the index square brackets. For example:


    ```

    print(''tup1[1:3]:\t'', tup1[1:3])

    ```'
  - '[PAGE 379]


    Which returns a new tuple of two elements containing the elements from index 1
    up to (but not including) element 3. Note that the original tuple is not affected
    in any way (remember its immutable so cannot be modified). The output of the above
    is thus:


    ```

    tup1[1:3]:    (3, 5)

    ```


    There are in fact numerous variations on the use of the slicing indices. For example,
    if the first index is omitted it indicates that the slice should start from the
    beginning of the tuple, while omitting the last index indicates it should go to
    the end of the tuple.


    ```

    print(''tup1[:3]:\t'', tup1[:3])

    print(''tup1[1:]:\t'', tup1[1:])

    ```


    which generates:


    ```

    tup1[:3]:    (1, 3, 5)

    tup1[1:]:    (3, 5, 7)

    ```


    You can reverse a tuple using the ::-1 notation (again this returns a new tuple
    and has no effect on the original tuple):


    ```

    print(''tup1[::-1]:\t'', tup1[::-1])

    ```


    This thus produces


    ```

    tup1[::-1]:    (7, 5, 3, 1)

    ```


    # 32.4.5 Tuples Can Hold Different Types


    Tuples can also contain a mixture of different types; that is, they are not restricted
    to holding elements all of the same type. You can therefore write a tuple such
    as


    ```

    tup2 = (1, ''John'', Person(''Phoebe'', 21), True, -23.45)

    print(tup2)

    ```


    Which produces the output:


    ```

    (1, ''John'', <__main__.Person object at 0x105785080>, True, -23.45)

    ```'
- md: "## 32.4.6 Iterating Over Tuples\n\nYou can iterate over the contents of a `tuple`\
    \ (that is, process each element in the `tuple` in turn). This is done using the\
    \ `for` loop that we have already seen; however, it is the `tuple` that is used\
    \ for the value to which the loop variable will be applied:\n\n```python\ntup3\
    \ = ('apple', 'pear', 'orange', 'plum', 'apple')\nfor x in tup3:\n    print(x)\n\
    ```\n\nThis prints out each of the elements in the tuple `tup3` in turn:\n\n```\n\
    apple\npear\norange\nplum\napple\n```\n\nNote that again the order of the elements\
    \ in the `tuple` is persevered.\n\n## 32.4.7 Tuple Related Functions\n\nYou can\
    \ also find out the length of a tuple\n\n```python\nprint('len(tup3):\\t', len(tup3))\n\
    ```\n\nYou can count how many times a specified value appears in a `tuple` (remember\
    \ tuples allow duplicates):\n\n```python\nprint(tup3.count('apple')) # returns\
    \ 2\n```\n\nYou can also find out the (first) index of a value in a tuple:\n\n\
    ```python\nprint(tup3.index('pear')) # returns 1\n```\n\nNote that both `index()`\
    \ and `count()` are methods defined on the class `tuple`, whereas `len()` is a\
    \ function that the tuple is passed into. This is because `len()` is a generic\
    \ function and can be used with other types as well such as strings.\n\n## 32.4.8\
    \ Checking if an Element Exists\n\nYou can check to see if a specific element\
    \ exists in a tuple using the `in` operator, for example:\n\n```python\nif 'orange'\
    \ in tup3:\n    print('orange is in the tuple')\n```\n\n## 32.4.9 Nested Tuples\n\
    \nTuples can be nested within tuples; that is a tuple can contain, as one of its\
    \ elements, another tuple. For example, the following diagram illustrates the\
    \ nesting of a tree of tuples:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_381_0.png)\n\
    \nIn code we could define this structure as\n\n```python\ntuple1 = (1, 3, 5, 7)\n\
    tuple2 = ('John', 'Denise', 'Phoebe', 'Adam')\ntuple3 = (42, tuple1, tuple2, 5.5)\n\
    print(tuple3)\n```\n\nThe output from this is\n\n```\n(42, (1, 3, 5, 7), ('John',\
    \ 'Denise', 'Phoebe', 'Adam'), 5.5)\n```\n\nNote the *nesting* of round brackets\
    \ in the printout illustrating where one tuple is contained within another.\n\n\
    This feature of tuples (and other containers) allows for arbitrarily complex data\
    \ structures to be constructed as required by an application.\n\nIn fact, a `tuple`\
    \ can have nested within it not just other tuples but any type of container, and\
    \ thus it can contain lists, sets, dictionaries, etc. This provides for a huge\
    \ level of flexibility when constructing data structures for use in Python programs.\n\
    \n## 32.4.10 Things You Can't Do with Tuples\n\nIt is not possible to add or remove\
    \ elements from a `tuple`; they are *immutable*. It should be particularly noted\
    \ that none of the functions or methods presented above actual change the original\
    \ tuple they are applied to; even those that return a subset of the original tuple\
    \ actually return a new instance of the class `tuple` and have no effect on the\
    \ original tuple.\n\n## 32.5 Lists\n\nLists are mutable ordered containers of\
    \ other objects. They support all the features of the `tuple` but as they are\
    \ mutable it is also possible to add elements to a `list`, remove elements and\
    \ modify elements. The elements in the list maintain their order (until modified).\n\
    \n### 32.5.1 Creating Lists\n\nLists are created using square brackets positioned\
    \ around the elements that make up the list. For example:\n\n```python\nlist1\
    \ = ['John', 'Paul', 'George', 'Ringo']\n```\n\nIn this case we have created a\
    \ list of four elements with the first element being indexed from zero, we thus\
    \ have\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_382_0.png)\n\nAs with tuples\
    \ we can have nested lists and lists containing different types of elements. We\
    \ can this create the following structure of nested Lists:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_382_1.png)\n\
    \nIn code this can be defined as\n\n```python\nl1 = [1, 43.5, Person('Phoebe',\
    \ 21), True]\nl2 = ['apple', 'orange', 31]\nroot_list = ['John', l1, l2, 'Denise']\n\
    print(root_list)\n```\n\nWhen the `root_list` is printed we get\n\n```\n['John',\
    \ [1, 43.5, <tuples.Person object at 0x1042ba4a8>, True],\n['apple', 'orange',\
    \ 31], 'Denise']\n```\n\nNote the square brackets inside the outer square brackets\
    \ indicating nested lists. We can of course also nest tuples in lists and lists\
    \ in tuples. For example, the following structure shows tuples (the ovals) hold\
    \ references to lists (the rectangles) and vice versa:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_383_0.png)\n\
    \nIn code this would look like:\n\n```python\nt1 = (1, 'John', 34.5)\nl1 = ['Smith',\
    \ 'Jones']\nl2 = [t1, l1]\nt2 = (l2, 'apple')\nprint(t2)\n```\n\nwhich produces\n\
    \n```\n([(1, 'John', 34.5), ['Smith', 'Jones']], 'apple')\n```\n\n### 32.5.2 List\
    \ Constructor Function\n\nThe `list()` function can be used to construct a list\
    \ from an iterable; this means that it can construct a list from a tuple, a dictionary\
    \ or a set. It can also construct a list from anything that implements the iterable\
    \ protocol.\nThe signature of the `list()` function is\n\n```python\nlist(iterable)\n\
    ```\n\nFor example:\n\n```python\nvowelTuple = ('a', 'e', 'i', 'o', 'u')\nprint(list(vowelTuple))\n\
    ```\n\nproduces\n\n```\n['a', 'e', 'i', 'o', 'u']\n```\n\n### 32.5.3 Accessing\
    \ Elements from a List\n\nYou can access elements from a list using an index (within\
    \ square brackets). The index returns the object at that position, for example:\n\
    \n```python\nlist1 = ['John', 'Paul', 'George', 'Ringo']\nprint(list1[1])\n```\n\
    \nThis will print out the element at index 1 which is Paul (lists are indexed\
    \ from zero so the first element is the zeroth element).\nIf you use a negative\
    \ index such as -1 then the index is reversed so an index of -1 starts from the\
    \ end of the list (-1 returns the last element, -2 the second to last etc.).\n\
    It is also possible to extract a slice (or sublist) from a list. This is done\
    \ by providing a starting and end index to within the square brackets separated\
    \ by a colon. For example [1:4] indicates a slice starting at the oneth element\
    \ and extending up to (but not including) the fourth element. If either of the\
    \ indexes is missed for a slice then that indicates the start or end of the list\
    \ respective.\nThe following illustrates some of these ideas:\n\n```python\nlist1\
    \ = ['John', 'Paul', 'George', 'Ringo']\nprint('list1[1]:', list1[1])\nprint('list1[-1]:',\
    \ list1[-1])\nprint('list1[1:3]:', list1[1:3])\nprint('list[:3]:', list1[:3])\n\
    print('list[1:]:', list1[1:])\n```\n\nWhich produces\n\n```\nlist1[1]: Paul\n\
    list1[-1]: Ringo\nlist1[1:3]: ['Paul', 'George']\nlist[:3]: ['John', 'Paul', 'George']\n\
    list[1:]: ['Paul', 'George', 'Ringo']\n```\n\n### 32.5.4 Adding to a List\n\n\
    You can add an item to a list using the `append()` method of the `list` class\
    \ (this changes the actual list; it does not create a copy of the list). The syntax\
    \ of this method is\n\n```python\n<alist>.append(<object>)\n```\n\nAs an example,\
    \ consider the following list of strings, to which we append a fifth string:\n\
    \n```python\nlist1 = ['John', 'Paul', 'George', 'Ringo']\nlist1.append('Pete')\n\
    print(list1)\n```\n\nthis will generate the output:\n\n```\n['John', 'Paul', 'George',\
    \ 'Ringo', 'Pete']\n```\n\nYou can also add all the items in a list to another\
    \ list. There are several options here, we can use the `extend()` method which\
    \ will add the items passed to it to the end of the list or we can use the `+=`\
    \ operator which does the same thing:\n\n```python\nlist1 = ['John', 'Paul', 'George',\
    \ 'Ringo', 'Pete']\nprint(list1)\nlist1.extend(['Albert', 'Bob'])\nprint(list1)\n\
    list1 += ['Ginger', 'Sporty']\nprint(list1)\n```\n\nThe output from this code\
    \ snippet is\n\n```\n['John', 'Paul', 'George', 'Ringo', 'Pete']\n['John', 'Paul',\
    \ 'George', 'Ringo', 'Pete', 'Albert', 'Bob']\n['John', 'Paul', 'George', 'Ringo',\
    \ 'Pete', 'Albert', 'Bob', 'Ginger', 'Sporty']\n```\n\nWhich approach you prefer\
    \ to use is up to you.\nNote that strictly speaking both `extend()` and `+=` take\
    \ what is known as an iterable.\n\n### 32.5.5 Inserting into a List\n\nYou can\
    \ also insert elements into an existing list. This is done using the `insert()`\
    \ method of the `list` class. The syntax of this method is\n\n```python\n<list>.insert(<index>,\
    \ <object>)\n```\n\nThe `insert()` method takes an index indicating where to insert\
    \ the element and an object to be inserted.\nFor example, we can insert the string\
    \ 'Paloma' in between the *Zeroth* and *oneth* item in the following list of names:\n\
    \n```python\na_list = ['Adele', 'Madonna', 'Cher']\nprint(a_list)\na_list.insert(1,\
    \ 'Paloma')\nprint(a_list)\n```\n\nThe result is\n\n```\n['Adele', 'Madonna',\
    \ 'Cher']\n['Adele', 'Paloma', 'Madonna', 'Cher']\n```\n\nIn other words, we have\
    \ inserted the string 'Paloma' into the index position 1 pushing 'Madonna' and\
    \ 'Cher' up one in the index within the list.\n\n### 32.5.6 List Concatenation\n\
    \nIt is possible to concatenate two lists together using the concatenation operator\
    \ '+':\n\n```python\nlist1 = [3, 2, 1]\nlist2 = [6, 5, 4]\nlist3 = list1 + list2\n\
    print(list3)\n```\n\ngenerates\n\n```\n[3, 2, 1, 6, 5, 4]\n```"
