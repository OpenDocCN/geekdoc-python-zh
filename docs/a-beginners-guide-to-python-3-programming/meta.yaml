    used to assign a value to a variable. There are in fact several different assignment
    operators that could be used with numeric values.


    These assignment operators are actually referred to as *compound operators* as
    they combine together a numeric operation (such as add) with the assignment operator.
    For example, the += compound operator is a combination of the add operator and
    the = operator such that


    ```

    x = 0

    x += 1 # has the same behaviour as x = x + 1

    ```


    Some developers like to use these compound operators as they are more concise
    to write and can be interpreted more efficiently by the Python interpreter.


    The following table provides a list of the available compound operators.


    | Operator | Description | Example | Equivalent |

    | :--- | :--- | :--- | :--- |

    | += | Add the value to the left-hand variable | x += 2 | x = x + 2 |

    | -= | Subtract the value from the left-hand variable | x -= 2 | x = x - 2 |

    | *= | Multiple the left-hand variable by the value | x *= 2 | x = x * 2 |

    | /= | Divide the variable value by the right-hand value | x /= 2 | x = x / 2
    |

    | //= | Use integer division to divide the variable''s value by the right-hand
    value | x //= 2 | x = x // 2 |

    | %= | Use the modulus (remainder) operator to apply the right-hand value to the
    variable | x %= 2 | x = x % 2 |

    | **= | Apply the power of operator to raise the variable''s value by the value
    supplied | x **= 3 | x = x ** 3 |'
