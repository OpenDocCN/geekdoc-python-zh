    \        print('calling ', func.__name__)\n        func()\n        print('called\
    \ ', func.__name__)\n    return inner\n```\n\n最终结果是，在上面的例子中，名称和文档现在已更新为被包装函数的名称和与该函数关联的文档。\n\
    \n如果我们现在重新运行前面的例子，得到：\n\n```\nname: get_text\ndoc: returns some text\nmodule;\
