  mdcn: "## 8.3.3 匿名循环变量\n\nfor 循环的一个有趣变体是使用通配符（`_`）代替循环变量；如果你只关心循环特定次数，而不关心循环计数器本身的值，这会很有用，例如：\n\
    \n```python\n# Now use an 'anonymous' loop variable\nfor _ in range(0,10):\n \
