  md: "# 29.10 When is a Decorator Executed?\n\nAn important feature of decorators\
    \ is that they are executed right after the decorator function is defined. This\
    \ is usually at *import time* (i.e., when a module is loaded by Python).\n\n```\n\
    def logger(func):\n    print('In Logger')\n    def inner():\n        print('In\
    \ inner calling ', func.__name__)\n        func()\n        print('In inner called\
    \ ', func.__name__)\n    print('Finishing Logger')\n    return inner\n\n@logger\n\
    def print_it():\n    print('Print It')\n\nprint('Start')\nprint_it()\nprint('Done')\n\
    ```\n\nFor example, the decorator logger shown above prints out 'In Logger' and\
    \ 'Finished Logger' when it is executed. If the output is examined, it can be\
    \ seen that this output occurs before the main function prints 'Start'.\n\n```\n\
    In Logger\nFinishing Logger\nStart\nIn inner calling print_it\nPrint It\nIn inner\
    \ called print_it\nDone\n```\n\nNote that the decorated function and the wrapped\
    \ function only execute when they are explicitly invoked.\nThis highlights the\
    \ difference between what Pythonistas call *import time* and *runtime*.\n\n# 29.11\
    \ Built-In Decorators\n\nThere are numerous built-in decorators in Python 3; some\
    \ of which we have already seen such as `@classmethod`, `@staticmethod` and `@property`.\
    \ We also saw some decorators when talking about abstract methods and properties.\
    \ There are also decorators associated with unit testing and asynchronous operations."
