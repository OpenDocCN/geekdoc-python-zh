    # Chapter 18

    Introduction to Object Orientation


    # 18.1 Introduction


    This chapter introduces the core concepts in Object Orientation. It defines the
    terminology used and attempts to clarify issues associated with hierarchies. It
    also discusses some of the perceived strengths and weaknesses of the object-oriented
    approach. It then offers some guidance on the approach to take in learning about
    objects.


    # 18.2 Classes


    A class is one of the basic building blocks of Python. It is also a core concept
    in a style of programming known as Object-Oriented Programming (or OOP). OOP provides
    an approach to structuring programs/applications so that the data held, and the
    operations performed on that data are bundled together into classes and accessed
    via objects.


    As an example, in an OOP style program, employees might be represented by a class
    Employee where each employee has an id, a name, a department and a desk_number,
    etc. They might also have operations associated with them such as `take_a_holiday()`
    or `get_paid()`.


    In many cases classes are used to represent real-world entities (such as employees),
    but they do not need to, they can also represent more abstract concepts such as
    a transaction between one person and another (for example, an agreement to buy
    a meal).


    Classes act as *templates* which are used to construct instances or examples of
    a class of things. Each example of the class `Person` has a name, an age, an address,
    etc., but they have their own values for their name, age and address. For example,
    to represent the people in a family we might create a class Person with the name
    Paul, the age 52 and the address set to London. We may also create another Person
    object'
  - '[PAGE 214]


    (instance) with the name Fiona, the age 48 and the address also of London and
    so on.


    An instance or object is therefore an example of a class. All instances/objects
    of a class possess the same data variables but contain their own data. Each instance
    of a class responds to the same set of requests.


    Classes allow programmers to specify the *structure* of an object (i.e., its attributes
    or fields, etc.) and the its behaviour separately from the objects themselves.


    This is important, as it would be extremely time-consuming (as well as inefficient)
    for programmers to define each object individually. Instead, they define classes
    and create *instances* or *objects* of those classes.


    They can then store related data together in a named concept which makes it much
    easier to structure and maintain code.


    # 18.3 What Are Classes for?


    We have already seen several types of data in Python such as integer, string,
    Boolean, etc. Each of these allowed us to hold a single item of data (such as
    the integer 42 or the string ‘John’ and the value `True`). However, how might
    we represent a Person, a Student or an Employee of a firm? One way we can do this
    is to use a class to represent them.


    As indicated above, we might represent any type of (more complex) data item use
    a combination of attributes (or fields) and behaviours. These attributes will
    use existing data types, these might be integers, strings, Booleans, floating-point
    numbers or other classes.


    For example, when defining the class `Person` we might give it:


    +   - a field or attribute for the person’s name,

    - a field or attribute for their age,

    - a field or attribute for their email,

    - some behaviour to give them a birthday (which will increment their age),

    - some behaviour to allow us to send them a message via their email,

    - etc.


    In Python classes are thus used:


    +   - as a template to create instances (or objects) of that class,

    - define instance methods or common behaviour for a class of objects,

    - define attributes or fields to hold data within the objects,

    - be sent messages.


    Objects (or instances), on the other hand, can:


    +   - be created from a class,

    - hold their own values for instance variables,

    - be sent messages,'
  - '[PAGE 215]


    +   - execute instance methods,

    - may have many copies in the system (all with their own data).


    # 18.3.1 What Should a Class Do?


    A class should accomplish one specific purpose; it should capture only one idea.
    If more than one idea is encapsulated in a class, you may reduce the chances for
    reuse, as well as contravene the laws of encapsulation in object-oriented systems.
    For example, you may have merged two concepts together so that one can directly
    access the data of another. This is rarely desirable.


    The following guidelines may help you to decide whether to split the class with
    which you are working. Look at the comment describing the class (if there is no
    class comment, this is a bad sign in itself). Consider the following points:


    +   - Is the description of the class short and clear? If not, is this a reflection
    on the class? Consider how the comment can be broken down into a series of short
    clear comments. Base the new classes around those comments.

    - If the comment is short and clear, do the class and instance variables make
    sense within the context of the comment? If they do not, then the class needs
    to be re-evaluated. It may be that the comment is inappropriate, or the class
    and instance variables inappropriate.

    - Look at how and where the attributes of the class are used. Is their use in
    line with the class comment? If not, then you should take appropriate action.


    # 18.3.2 Class Terminology


    The following terms are used in Python (and other languages that support object
    orientation):


    +   - *Class* A class defines a combination of data and behaviour that operates
    on that data. A class acts as a template when creating new instances.

    - *Instance or object* An instance also known as an object is an example of a
    class. All instances of a class possess the same data fields/attributes but contain
    their own data values. Each instance of a class responds to the same set of requests.

    - *Attribute/field/instance variable* The data held by an object is represented
    by its attributes (also sometimes known as a field or an instance variable). The
    “state” of an object at any particular moment relates to the current values held
    by its attributes.

    - *Method* A method is a procedure defined within an object.

    - *Message* A message is sent to an object requesting some operation to be performed
    or some attribute to be accessed. It is a request to the object to do something
    or return something. However, it is up to the object to determine how to execute
    that request. A message may be considered akin to a procedure call in other languages.'
- md: "## 18.4 How is an OO System Constructed?\n\nAt this point you may be wondering\
    \ how a system can be built from classes and objects instantiated from those classes?\
    \ What would such an application look like? It is clear it is different to writing\
    \ functions and free-standing application code that calls those functions?\nLet's\
    \ use a real-world (physical) system to explore what an OOP application might\
    \ look like.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_216_0.png)\n\nThis system\
    \ aims to provide a diagnosis tutor for the equipment illustrated above. Rather\
    \ than use the wash–wipe system from a real car, students on a car mechanics diagnosis\
    \ course use this software simulation. The software system mimics the actual system,\
    \ so the behaviour of the pump depends on information provided by the relay and\
    \ the water bottle.\nThe operation of the wash–wipe system is controlled by a\
    \ switch which can be in one of five positions: off, intermittent, slow, fast\
    \ and wash. Each of these settings places the system into a different state:\n\
    \n| Switch setting | System state |\n|---|---|\n| Off | The system is inactive\
    \ |\n| Intermittent | The blades wipe the windscreen every few seconds |\n| Slow\
    \ | The wiper blades wipe the windscreen continuously |\n| Fast | The wiper blades\
    \ wipe the windscreen continuously and quickly |\n| Wash | The pump draws water\
    \ from the water bottle and sprays it onto the windscreen |\n\nFor the pump and\
    \ the wiper motor to work correctly, the relay must function correctly. In turn,\
    \ the relay must be supplied with an electrical circuit. This electrical circuit\
    \ is negatively fused, and thus, the fuse must be intact for the circuit to be\
    \ made. Cars are negatively switched as this reduces the chances of short circuits\
    \ leading to unintentional switching of circuits.\n\n## 18.4.1 Where Do We Start?\n\
    \nThis is often a very difficult point for those new to object-oriented systems.\
    \ That is, they have read the basics and understand simple diagrams, but do not\
    \ know where to start. It is the old chestnut, “I understand the example but don’t\
    \ know how to apply the concepts myself”. This is not unusual and, in the case\
    \ of object orientation, is probably normal.\n\nThe answer to the question “where\
    \ do I start?” may at first seem somewhat obscure; you should start with the data.\
    \ Remember that objects are things that exchange messages with each other. The\
    \ things possess the data that is held by the system and the messages request\
    \ actions that relate to the data. Thus, an object-oriented system is fundamentally\
    \ concerned with data items.\n\nBefore we go on to consider the object-oriented\
    \ view of the system, let us stop and think for a while. Ask yourself where could\
    \ I start; it might be that you think about starting “with some form of functional\
    \ decomposition” (breaking the problem down in terms of the functions it provides)\
    \ as this might well be the view the user has of the system. As a natural part\
    \ of this exercise, you would identify the data required to support the desired\
    \ functionality. Notice that the emphasis would be on the system functionality.\n\
    \nLet us take this further and consider the functions we might identify for the\
    \ example presented above:\n\n| Function | Description |\n| :--- | :--- |\n| Wash\
    \ | Pump water from the water bottle to the windscreen |\n| Wipe | Move the windscreen\
    \ wipers across the windscreen |\n\nWe would then identify important system variables\
    \ and sub-functions to support the above functions.\n\nNow let us go back to the\
    \ object-oriented view of the world. In this view, we place a great deal more\
    \ emphasis on the data items involved and consider the operations associated with\
    \ them (effectively, the reverse of the functional decomposition view). This means\
    \ that we start by attempting to identify the primary data items in the system;\
    \ next, we look to see what operations are applied to, or performed on, the data\
    \ items; finally, we group the data items and operations together to form objects.\
    \ In identifying the operations, we may well have to consider additional data\
    \ items, which may be separate objects or attributes of the current object. Identifying\
    \ them is mostly a matter of skill and experience.\n\nThe object-oriented design\
    \ approach considers the operations far less important than the data and their\
    \ relationships. In the next section we examine the objects that might exist in\
    \ our simulation system.\n\n## 18.4.2 Identifying the Objects\n\nWe look at the\
    \ system as a whole and ask what indicates the state of the system. We might say\
    \ that the position of the switch or the status of the pump is significant. This\
    \ results in the data items shown below\n\n| Data item | States |\n| :--- | :---\
    \ |\n| `switch setting` | Is the switch set to off, intermittent, wipe, fast wipe\
    \ or wash? |\n| `wiper motor` | Is the motor working or not? |\n| `pump state`\
    \ | Is the pump working or not? |\n| `fuse condition` | Has the fuse blown or\
    \ not? |\n| `water bottle level` | The current water level |\n| `relay status`\
    \ | Is current flowing or not? |\n\nThe identification of the data items is considered\
    \ in greater detail later. At this point, merely notice that we have not yet mentioned\
    \ the functionality of the system or how it might fit together, we have only mentioned\
    \ the significant items. As this is such a simple system, we can assume that each\
    \ of these elements is an object and illustrate it in a simple object diagram:\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_218_0.png)\n\nNotice that we have named\
    \ each object after the element associated with the data item (e.g., the element\
    \ associated with the fuse condition is the fuse itself) and that the actual data\
    \ (e.g., the condition of the fuse) is an instance variable of the object. This\
    \ is a very common way of naming objects and their instance variables. We now\
    \ have the basic objects required for our application.\n\n## 18.4.3 Identifying\
    \ the Services or Methods\n\nAt the moment, we have a set of objects each of which\
    \ can hold some data. For example, the water bottle can hold an integer indicating\
    \ the current water level. Although object-oriented systems are structured around\
    \ the data, we still need some procedural content to change the state of an object\
    \ or to make the system achieve some goal. Therefore, we also need to consider\
    \ the operations a user of each object might require. Notice that the emphasis\
    \ here is on the user of the object and what they require of the object, rather\
    \ than what operations are performed on the data.\n\nLet us start with the switch\
    \ object. The switch state can take a number of values. As we do not want other\
    \ objects to have direct access to this variable, we must identify the services\
    \ that the switch should offer. As a user of a switch we want to be able to move\
    \ it between its various settings. As these settings are essentially an enumerated\
    \ type, we can have the concept of incrementing or decrementing the switch position.\
    \ A switch must therefore provide a `move_up` and a `move_down` interface. Exactly\
    \ how this is done depends on the programming language; for now, we concentrate\
    \ on specifying the required facilities.\n\nIf we examine each object in our system\
    \ and identify the required services, we may end up with the following table:\n\
    \n| Object | Service | Description |\n|---|---|---|\n| switch | move_up | Increment\
    \ switch value |\n| | move_down | Decrement switch value |\n| | State? | Return\
    \ a value indicating the current switch state |\n| fuse | working? | Indicate\
    \ if the fuse has blown or not |\n| wiper motor | working? | Indicate whether\
    \ the wipers are working or not |\n| relay | working? | Indicate whether the relay\
    \ is active or not |\n| pump | working? | Indicate whether the pump is active\
    \ or not |\n| water bottle | fill | Fill the water bottle with water |\n| | extract\
    \ | Remove some water from the water bottle |\n| | empty | Empty the water bottle\
    \ |\n\nWe generated this table by examining each of the objects in isolation to\
    \ identify the services that might reasonably be required. We may well identify\
    \ further services when we attempt to put it all together.\n\nEach of these services\
    \ should relate to a method within the object. For example, the moveUp and moveDown\
    \ services should relate to methods that change the state instance variable within\
    \ the object. Using a generic pseudo-code, the `move_up` method, within the switch\
    \ object, might contain the following code:\n\n```\ndef move_up(self):\n    if\
    \ self.state == \"off\" then\n        self.state = \"wash\"\n    else if self.state\
    \ == \"wash\" then\n```"
  mdcn: "## 18.4 面向对象系统是如何构建的？\n\n此时你可能会想，如何从类以及由这些类实例化的对象来构建一个系统？这样的应用程序会是什么样子？显然，这与编写函数和调用这些函数的独立应用程序代码不同。\n\
    让我们用一个现实世界（物理）的系统来探索面向对象应用程序可能的样子。\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_216_0.png)\n\
    \n该系统旨在为上图所示的设备提供诊断辅导。汽车机械诊断课程的学生使用这个软件模拟，而不是使用真实汽车上的洗涤-刮水系统。该软件系统模拟实际系统，因此泵的行为取决于继电器和水瓶提供的信息。\n\
    洗涤-刮水系统的操作由一个开关控制，该开关可以处于五个位置之一：关闭、间歇、慢速、快速和洗涤。每个设置都将系统置于不同的状态：\n\n| 开关设置 | 系统状态\
    \ |\n|---|---|\n| 关闭 | 系统未激活 |\n| 间歇 | 刮水器每隔几秒刮一次挡风玻璃 |\n| 慢速 | 刮水器连续刮挡风玻璃 |\n\
    | 快速 | 刮水器连续且快速地刮挡风玻璃 |\n| 洗涤 | 泵从水瓶中抽水并喷洒到挡风玻璃上 |\n\n为了使泵和刮水器电机正常工作，继电器必须正常工作。继而，继电器必须由电路供电。该电路是负极熔断的，因此，保险丝必须完好才能形成电路。汽车采用负极开关，因为这降低了短路导致电路意外接通的可能性。\n\
    \n## 18.4.1 我们从哪里开始？\n\n对于面向对象系统的新手来说，这通常是一个非常困难的点。也就是说，他们已经阅读了基础知识并理解了简单的图表，但不知道从哪里开始。这是老生常谈的问题：“我理解这个例子，但不知道如何自己应用这些概念”。这并不罕见，在面向对象的情况下，这可能是正常的。\n\
    \n“我从哪里开始？”这个问题的答案起初可能有些模糊；你应该从数据开始。记住，对象是彼此交换消息的事物。这些事物拥有系统持有的数据，而消息请求与数据相关的操作。因此，面向对象系统从根本上关注的是数据项。\n\
    \n在我们继续考虑系统的面向对象视图之前，让我们停下来思考一会儿。问问自己我可以从哪里开始；你可能会想到“从某种形式的功能分解开始”（根据系统提供的功能来分解问题），因为这很可能是用户对系统的看法。作为这个练习的自然部分，你将识别支持所需功能所需的数据。请注意，重点将放在系统功能上。\n\
    \n让我们进一步考虑上面示例中可能识别出的功能：\n\n| 功能 | 描述 |\n| :--- | :--- |\n| 洗涤 | 将水从水瓶泵送到挡风玻璃\
    \ |\n| 刮水 | 将刮水器在挡风玻璃上移动 |\n\n然后，我们将识别重要的系统变量和子功能来支持上述功能。\n\n现在让我们回到面向对象的世界观。在这种观点中，我们更加重视涉及的数据项，并考虑与它们相关的操作（实际上是功能分解视图的逆向）。这意味着我们首先尝试识别系统中的主要数据项；接下来，我们查看对数据项应用或执行了哪些操作；最后，我们将数据项和操作组合在一起形成对象。在识别操作时，我们很可能需要考虑额外的数据项，这些数据项可能是单独的对象或当前对象的属性。识别它们主要是一个技巧和经验的问题。\n\
    \n面向对象设计方法认为操作远不如数据及其关系重要。在下一节中，我们将研究模拟系统中可能存在的对象。\n\n## 18.4.2 识别对象\n\n我们将系统视为一个整体，并询问什么指示了系统的状态。我们可能会说开关的位置或泵的状态很重要。这导致了下面显示的数据项\n\
    \n| 数据项 | 状态 |\n| :--- | :--- |\n| `开关设置` | 开关是设置为关闭、间歇、刮水、快速刮水还是洗涤？ |\n| `刮水器电机`\
    \ | 电机是否工作？ |\n| `泵状态` | 泵是否工作？ |\n| `保险丝状况` | 保险丝是否熔断？ |\n| `水瓶水位` | 当前水位 |\n\
    | `继电器状态` | 电流是否流动？ |\n\n数据项的识别将在后面更详细地讨论。此时，只需注意我们尚未提及系统的功能或它如何组合在一起，我们只提到了重要的项目。由于这是一个如此简单的系统，我们可以假设每个元素都是一个对象，并在简单的对象图中说明它：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_218_0.png)\n\n请注意，我们根据与数据项关联的元素为每个对象命名（例如，与保险丝状况关联的元素是保险丝本身），并且实际数据（例如，保险丝的状况）是对象的实例变量。这是命名对象及其实例变量的一种非常常见的方法。我们现在拥有了应用程序所需的基本对象。\n\
    \n## 18.4.3 识别服务或方法\n\n目前，我们有一组对象，每个对象都可以保存一些数据。例如，水瓶可以保存一个表示当前水位的整数。虽然面向对象系统围绕数据构建，但我们仍然需要一些过程内容来改变对象的状态或使系统实现某个目标。因此，我们还需要考虑每个对象的用户可能需要的操作。请注意，这里的重点是对象的用户以及他们对对象的需求，而不是对数据执行的操作。\n\
    \n让我们从开关对象开始。开关状态可以取多个值。由于我们不希望其他对象直接访问此变量，我们必须识别开关应提供的服务。作为开关的用户，我们希望能够将其在各种设置之间移动。由于这些设置本质上是枚举类型，我们可以有递增或递减开关位置的概念。因此，开关必须提供\
    \ `move_up` 和 `move_down` 接口。具体如何实现取决于编程语言；现在，我们专注于指定所需的功能。\n\n如果我们检查系统中的每个对象并识别所需的服务，我们最终可能会得到以下表格：\n\
    \n| 对象 | 服务 | 描述 |\n|---|---|---|\n| 开关 | move_up | 递增开关值 |\n| | move_down | 递减开关值\
    \ |\n| | State? | 返回一个表示当前开关状态的值 |\n| 保险丝 | working? | 指示保险丝是否熔断 |\n| 刮水器电机 |\
    \ working? | 指示刮水器是否工作 |\n| 继电器 | working? | 指示继电器是否激活 |\n| 泵 | working? | 指示泵是否激活\
    \ |\n| 水瓶 | fill | 用水填充水瓶 |\n| | extract | 从水瓶中取出一些水 |\n| | empty | 清空水瓶 |\n\n\
