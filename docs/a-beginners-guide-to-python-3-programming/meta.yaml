    \ data, behaviour and static behaviour. Note that in Python the concept of class-side\
    \ data and behaviour is separate for the concept of static behaviour and so care\
    \ should be taken when looking at these two aspects of a class.\n\n## 20.2 Class-Side\
    \ Data\n\nIn Python classes can also have attributes; these are referred to as\
    \ *class* variables or attributes (as opposed to instance variables or attributes).\
    \ In Python variables defined within the scope of the class, but outside of any\
    \ methods, are tied to the class rather than to any instance and are thus class\
    \ variables. For example, we can update the class `Person` to keep a count of\
    \ how many instances of the class are created:\n\n```python\nclass Person:\n \
    \   \"\"\" An example class to hold a persons name and age\"\"\"\n\n    instance_count\
    \ = 0\n\n    def __init__(self, name, age):\n        Person.instance_count +=\
    \ 1\n        self.name = name\n        self.age = age\n```\n\nThe variable `instance_count`\
    \ is not part of an individual object, rather it is part of the class and all\
    \ instances of the class can access that shared variable by prefixing it with\
    \ the class name.\n\nNow each time a new instance of the class is created, the\
    \ `instance_count` is incremented, thus if we write:\n\n```python\np1 = Person('Jason',\
    \ 36)\np2 = Person('Carol', 21)\np3 = Person('James', 19)\np4 = Person('Tom',\
    \ 31)\nprint(Person.instance_count)\n```\n\nThe output will be:\n\n4\n\nThis is\
    \ because 4 instances have been created and thus `__init__()` has been run 4 times\
    \ and `instance_count` has been incremented four times.\n\n## 20.3 Class-Side\
    \ Methods\n\nIt is also possible to define behaviour that is linked to the *class*\
    \ rather than an individual object; this behaviour is defined in a class method.\n\
    \nClass methods are written in a similar manner to any other method but are *decorated*\
    \ with `@classmethod` and take a first parameter which represents the class rather\
    \ than an individual instance. This decoration is written before the method declaration.\n\
    \nAn example of a class method is shown below:\n\n```python\nclass Person:\n \
    \   \"\"\" An example class to hold a persons name and age\"\"\"\n    instance_count\
    \ = 0\n\n    @classmethod\n    def increment_instance_count(cls):\n        cls.instance_count\
    \ += 1\n\n    def __init__(self, name, age):\n        Person.increment_instance_count()\n\
    \        self.name = name\n        self.age = age\n```\n\nIn this case the class\
    \ method increments the `instance_count` variable; note that the `instance_count`\
    \ variable is accessed via the `cls` parameter passed into the `increment_instance_count`\
    \ method by Python. As this is a class method you do not need to prefix the class\
    \ attribute with the name of class; instead the first parameter to the class method,\
    \ `cls`, represents the class itself.\n\nThe class method can be accessed by *prefixing*\
    \ it with the name of the class and using the *dot notation* to indicate which\
    \ method to call. This is illustrated in the body of the `__init__()` method.\n\
    \n### 20.3.1 *Why Class-Side Methods?*\n\nIt may at first seem unclear what should\
    \ normally go in an instance method as opposed to what should go in a class method.\
    \ After all, they are both defined in the class. However, it is important to remember\
    \ that\n\n- Instance methods define the behaviour of the instance or object\n\
    - Class methods define the behaviour of the class.\n\nClass-side methods should\
    \ only perform one of the following roles:\n\n- *Instance creation* This role\
    \ is very important as it is how you can use a class as a factory for objects\
    \ and can help hide a whole load of set up and instantiation work.\n- *Answering\
    \ enquiries about the class* This role can provide generally useful objects, frequently\
    \ derived from class variables. For example, they may return the number of instances\
    \ of this class that have been created.\n- *Instance management* In this role,\
    \ class-side methods control the number of instances created. For example, a class\
    \ may only allow a single instance of the class to be created; this is termed\
    \ a singleton class. Instance management methods may also be used to access an\
    \ instance (e.g., randomly or in a given state).\n- *Examples* Occasionally, class\
    \ methods are used to provide helpful examples which explain the operation of\
    \ a class. This can be very good practice.\n- *Testing* Class-side methods can\
    \ be used to support the testing of an instance of a class. You can use them to\
    \ create an instance, perform an operation and compare the result with a known\
    \ value. If the values are different, the method can report an error. This is\
    \ a very useful way of providing regression tests.\n- *Support* for one of the\
    \ above roles\n\nAny other tasks should be performed by an instance method.\n\n\
    ## 20.4 Static Methods\n\nThere is one more type of method that can be defined\
    \ on a class; these are *static methods*. Static methods are defined within a\
    \ class but are not tied to either the class nor any instance of the class; they\
    \ do not receive the special first parameter representing either the class (`cls`\
    \ for class methods) or the instances (`self` for instance methods).\n\nThey are\
    \ in effect, the same as *free standing functions* but are defined within a class\
    \ often for convenience or to provide a way to group such functions together.\
    \ A *static* method is a method that is decorated with the `@staticmethod` decorator.\n\
    \nAn example of a static method is given below:\n\n```python\nclass Person:\n\
    \    @staticmethod\n    def static_function():\n        print('Static method')\n\
    ```\n\nStatic methods are invoked via the name of the class they are defined in,\
    \ for example:\n\n```python\nPerson.static_function()\n```\n\nA note for Java\
    \ and C# programmers; in both Java and C# the term class side and static are used\
    \ interchangeably (not helped by the use of the keyword static for these methods).\
    \ However, in both cases those methods are the equivalent of class-side methods\
    \ in Python. In Python *class* methods and *static* methods are two very, very\
    \ different things—do not use these terms interchangeably.\n\n## 20.5 Hints\n\n\
    There are a range of special methods available in Python on a class. All of these\
    \ special methods start and end with a double underbars (`__`). In general, in\
    \ Python anything that starts and ends with these double underbars is considered\
    \ special and so care should be taken when using them. You should never name one\
    \ of your own methods or functions `__<something>__` unless you intend to (re)define\
    \ some default behaviour.\n\n## 20.6 Online Resources\n\nThere is surprisingly\
    \ little information available on Python's static and class methods (which in\
    \ part explains why many developers are confused by them); however the following\
    \ are available:\n\n- https://python-reference.readthedocs.io/en/latest/docs/functions/staticmethod.html\
    \ documentation on static methods.\n- https://python-reference.readthedocs.io/en/latest/docs/functions/classmethod.html?highlight=classmethod\
    \ documentation on class methods.\n- https://www.tutorialspoint.com/class-method-vs-static-method-in-python\
    \ tutorial on class methods versus static methods.\n\n## 20.7 Exercises\n\nThe\
    \ aim of this exercise is to add housekeeping style methods to the `Account` class.\
    \ You should follow these steps:\n\n1. We want to allow the `Account` class from\
    \ the last chapter to keep track of the number of instances of the class that\
    \ have been created.\n2. Print out a message each time a new instance of the `Account`\
    \ class is created.\n3. Print out the number of accounts created at the end of\
    \ the previous test program. For example add the following two statements to the\
    \ end of the program:\n\n```python\nprint('Number of Account instances created:',\n\
    \      Account.instance_count)\n```"
  mdcn: "## 第20章\n类侧与静态行为\n\n## 20.1 引言\n\nPython类可以包含不属于实例或对象的数据和行为；相反，它们属于类本身。本章介绍类侧数据、行为和静态行为。请注意，在Python中，类侧数据和行为的概念与静态行为的概念是分开的，因此在研究类的这两个方面时应格外小心。\n\
    \n## 20.2 类侧数据\n\n在Python中，类也可以拥有属性；这些被称为*类*变量或属性（相对于实例变量或属性）。在Python中，在类作用域内但在任何方法之外定义的变量与类绑定，而不是与任何实例绑定，因此它们是类变量。例如，我们可以更新`Person`类来记录创建了多少个该类的实例：\n\
    \n```python\nclass Person:\n    \"\"\" An example class to hold a persons name\
    \ and age\"\"\"\n\n    instance_count = 0\n\n    def __init__(self, name, age):\n\
    \        Person.instance_count += 1\n        self.name = name\n        self.age\
    \ = age\n```\n\n变量`instance_count`不属于单个对象，而是类的一部分，该类的所有实例都可以通过在变量前加上类名来访问这个共享变量。\n\
    \n现在，每次创建该类的新实例时，`instance_count`都会递增，因此如果我们编写：\n\n```python\np1 = Person('Jason',\
    \ 36)\np2 = Person('Carol', 21)\np3 = Person('James', 19)\np4 = Person('Tom',\
    \ 31)\nprint(Person.instance_count)\n```\n\n输出将是：\n\n4\n\n这是因为已经创建了4个实例，因此`__init__()`运行了4次，`instance_count`递增了四次。\n\
    \n## 20.3 类侧方法\n\n也可以定义与*类*而非单个对象相关联的行为；这种行为在类方法中定义。\n\n类方法的编写方式与其他方法类似，但使用`@classmethod`进行*装饰*，并接受一个代表类而非单个实例的第一个参数。此装饰器写在方法声明之前。\n\
    \n下面是一个类方法的示例：\n\n```python\nclass Person:\n    \"\"\" An example class to hold\
    \ a persons name and age\"\"\"\n    instance_count = 0\n\n    @classmethod\n \
    \   def increment_instance_count(cls):\n        cls.instance_count += 1\n\n  \
    \  def __init__(self, name, age):\n        Person.increment_instance_count()\n\
    \        self.name = name\n        self.age = age\n```\n\n在这种情况下，类方法递增了`instance_count`变量；请注意，`instance_count`变量是通过Python传递给`increment_instance_count`方法的`cls`参数访问的。由于这是一个类方法，你不需要在类属性前加上类名；相反，类方法的第一个参数`cls`代表类本身。\n\
    \n可以通过*前缀*类名并使用*点表示法*来指示要调用哪个方法来访问类方法。这在`__init__()`方法的主体中得到了说明。\n\n### 20.3.1\
    \ *为什么需要类侧方法？*\n\n起初可能不清楚什么应该放在实例方法中，什么应该放在类方法中。毕竟，它们都是在类中定义的。然而，重要的是要记住\n\n-\
    \ 实例方法定义实例或对象的行为\n- 类方法定义类的行为。\n\n类侧方法应仅执行以下角色之一：\n\n- *实例创建* 这个角色非常重要，因为它是你可以将类用作对象工厂的方式，并且可以帮助隐藏大量的设置和实例化工作。\n\
    - *回答关于类的查询* 这个角色可以提供通常有用的对象，通常派生自类变量。例如，它们可能返回已创建的此类实例的数量。\n- *实例管理* 在这个角色中，类侧方法控制创建的实例数量。例如，一个类可能只允许创建该类的单个实例；这被称为单例类。实例管理方法也可用于访问实例（例如，随机或处于给定状态）。\n\
    - *示例* 有时，类方法用于提供有用的示例，解释类的操作。这可以是一个非常好的实践。\n- *测试* 类侧方法可用于支持类实例的测试。你可以使用它们来创建实例、执行操作并将结果与已知值进行比较。如果值不同，该方法可以报告错误。这是提供回归测试的一种非常有用的方式。\n\
    - *支持* 上述角色之一\n\n任何其他任务都应由实例方法执行。\n\n## 20.4 静态方法\n\n还有一种可以在类上定义的方法；这些是*静态方法*。静态方法在类中定义，但不与类或类的任何实例绑定；它们不接收代表类（类方法的`cls`）或实例（实例方法的`self`）的特殊第一个参数。\n\
    \n它们实际上与*独立函数*相同，但通常在类中定义是为了方便或将此类函数分组在一起。*静态*方法是使用`@staticmethod`装饰器装饰的方法。\n\n\
    下面是一个静态方法的示例：\n\n```python\nclass Person:\n    @staticmethod\n    def static_function():\n\
    \        print('Static method')\n```\n\n静态方法通过它们定义的类名来调用，例如：\n\n```python\nPerson.static_function()\n\
    ```\n\n给Java和C#程序员的说明；在Java和C#中，术语类侧和静态可以互换使用（使用关键字`static`来定义这些方法对此没有帮助）。然而，在这两种情况下，这些方法都等同于Python中的类侧方法。在Python中，*类*方法和*静态*方法是两个非常、非常不同的东西——不要互换使用这些术语。\n\
    \n## 20.5 提示\n\nPython中有一系列特殊方法可用于类。所有这些特殊方法都以双下划线（`__`）开始和结束。通常，在Python中，任何以这些双下划线开始和结束的东西都被认为是特殊的，因此在使用它们时应格外小心。除非你打算（重新）定义某些默认行为，否则永远不要将你自己的方法或函数命名为`__<something>__`。\n\
    \n## 20.6 在线资源\n\n关于Python的静态和类方法的信息出奇地少（这在一定程度上解释了为什么许多开发者对此感到困惑）；然而，以下资源可用：\n\
    \n- https://python-reference.readthedocs.io/en/latest/docs/functions/staticmethod.html\
    \ 关于静态方法的文档。\n- https://python-reference.readthedocs.io/en/latest/docs/functions/classmethod.html?highlight=classmethod\
    \ 关于类方法的文档。\n- https://www.tutorialspoint.com/class-method-vs-static-method-in-python\
    \ 关于类方法与静态方法的教程。\n\n## 20.7 练习\n\n本练习的目的是向`Account`类添加管理风格的方法。你应该遵循以下步骤：\n\n1.\
    \ 我们希望允许上一章的`Account`类跟踪已创建的该类实例的数量。\n2. 每次创建`Account`类的新实例时，打印一条消息。\n3. 在上一个测试程序结束时打印创建的账户数量。例如，将以下两条语句添加到程序末尾：\n\
    \n```python\nprint('Number of Account instances created:',\n      Account.instance_count)\n\
    ```"
