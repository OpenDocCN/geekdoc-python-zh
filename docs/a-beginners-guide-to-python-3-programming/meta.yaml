  md: "# 21.9 Extending Superclass Methods\n\nHowever, in the previous section we\
    \ had to duplicated the code in Person down in Employee so that we could convert\
    \ the name and age attributes into strings. However we can avoid this duplication\
    \ by invoking the parent class's method from within the child class version (as\
