    \ 24\nReturning: 120\n120\n```\n\nNote that the depth parameter is used merely\
    \ to provide some indentation to the print statements.\n\nFrom the output we can\
    \ see that each call to the factorial program results in a simpler calculation\
    \ until the point where we are asking for the value of 1! which is 1. This is\
    \ returned as the result of calling factorial(1). This result is multiplied with\
    \ the value of n prior to that; which was 2. The causes factorial(2) to return\
    \ the value 2 and so on."
