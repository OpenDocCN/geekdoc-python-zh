    \n### 22.3.1 包与类\n\n有人（至少对我）认为，Ada 的包（package）就像一个类。它提供了一个模板，你可以从中创建可执行代码；它为你的数据提供了一堵墙，并定义了明确的接口等。然而，包和类之间存在一些非常显著的差异。\n\
    \n首先，包往往是比类更大的（至少在概念上）单元。例如，Ada 中的 TextIO 包本质上是一个文本 I/O 功能库，而不是像 Python 中 `string`\
    \ 类那样的单一概念。因此，包不用于封装像 `string` 或 `Date` 这样的单个小概念，而是用于封装一整套相关的概念（正如它们在 Python 中的用法）。因此，类是比包更细粒度的单元。\n\
    \n其次，包仍然在数据和过程之间提供了一种相对松散的关联。一个 Ada 包实际上可能处理非常多的数据结构和各种各样的方法。数据和方法主要通过包所代表的相关概念集联系在一起。相比之下，类倾向于将数据和方法紧密地关联在一个单一的概念中。事实上，关于良好类设计的一个准则是：如果一个类代表了多个概念，那么你应该将其拆分为两个类。\n\
    \n因此，数据和代码之间的这种紧密关联意味着，最终得到的概念不仅仅是一个数据结构（它更接近于一个概念的具体实现）。例如：\n\n```python\nclass\
    \ Date:\n\n    def __init__(self, day, month, year):\n        self.day = day\n\
    \        self.month = month\n        self.year = year\n\n    def is_day_of_week(self):\n\
    \        \"\"\"Check if date is a week day\"\"\"\n        # ... To be defined\n\
    \n    def in_month(self, month_index):\n        \"\"\"Check if month is in month_index\"\
    \"\"\n        return self.month == month_index\n```\n\n现在，任何使用 Date 实例的人都会得到一个对象，它可以告诉你它是否是一周中的某一天，并能保存相应的数据。请注意，`is_day_of_week()`\
    \ 方法除了 `self` 之外不接受任何参数，它不需要，因为它和日期信息是同一事物的一部分。这意味着 Date 对象的用户永远不需要直接接触保存日期的实际数据（即整数\
    \ day、month 和 year）。相反，他们应该通过方法来操作。这可能看起来只是一个小步骤，但却是重要的一步，对象外部不应需要访问对象内部的数据。相比之下，过程式版本中的数据结构不仅与过程分开保存，其\
    \ day、month 或 year 的值也必须直接修改。\n\n例如，比较一下操作日期的程序片段（使用过程式编程语言）的差异：\n\n```\nd: Date;\n\
    setDay(d, 28);\nsetMonth(d, 2);\nsetYear(d, 1998);\nisDayOfWeek(d);\ninMonth(d,\
    \ 2);\n```\n\n请注意，这里必须先创建数据，然后设置数据结构中的字段。这里我们做得很好，使用了接口过程来完成这些操作。一旦数据设置好，我们就可以在该数据上调用如\
    \ `IsDayOfWeek` 和 `InMonth` 等方法。\n\n相比之下，Python 代码使用构造函数来传递适当的初始化信息。其内部如何初始化对类\
    \ Date 的用户是隐藏的。然后我们直接在对象 `date` 上调用如 `is_day_of_week()` 和 `is_month(12)` 等方法。\n\
    \n```python\ndate = Date(12, 2, 1998)\ndate.is_day_of_week()\ndate.in_month(12)\n\
    ```\n\n这里需要思考的是，代码会被定义在哪里？\n\n### 22.3.2 继承\n\n继承是面向对象语言中的一个关键元素，它允许一个类从另一个类继承数据和方法。\n\
    \n继承最重要的特征之一（具有讽刺意味的是）是，它允许开发者以有限且受控的方式进入封装的“气泡”。\n\n这使得子类可以利用内部的数据结构和方法，而不会损害对象所获得的封装性。例如，让我们定义一个\
    \ Date 类的子类：\n\n```python\nclass Birthday(Date):\n    name = \"\"\n    age = 0\n\
    \    def is_birthday():\n        # ... Check to see if it is their birthday\n\
    ```\n\n方法 `is_birthday()` 可以检查当前日期是否与 Birthday 实例所代表的生日匹配，如果匹配则返回 true，否则返回 false。\n\
    \n然而，请注意，这里有趣的是，我们不仅不必定义表示日期的整数，也不必定义访问这些日期的方法。这两者都从父类 Date 继承而来。\n\n此外，我们现在可以根据需要，将\
    \ Birthday 的实例既当作 Date 也当作 Birthday 来对待！\n\n在 C、Pascal 或 Ada 等语言中你会怎么做？一种可能性是定义一个新的包\
    \ Birthday，但这个包不会扩展 Dates，它必须导入 Dates 并为其添加接口等。然而，你肯定不能将 Birthday 包当作 Dates 包来使用。\n\
    \n在像 Python 这样的语言中，由于多态性，你可以做到这一点。你可以重用那些只知道 Date 的现有代码，例如：\n\n```python\nbirthday\
    \ = Birthday(12, 3, 1974)\n\ndef test(date):\n    # Do something that works with\
    \ a date\n\nt.test(birthday)\n```\n\n这是因为 `birthday` 确实既是 Date 类型也是 Birthday 类型。\n\
    \n你也可以在 Birthday 上使用为 Date 定义的所有特性：\n\n```python\nbirthday.is_day_of_week()\n\
    ```\n\n实际上，你并不知道这个方法是在哪里定义的。这个方法可能在类 Birthday 中定义（它会覆盖在类 Date 中定义的方法）。然而，它也可能在类\
    \ Date 中定义（如果 Birthday 中没有定义这样的方法）；不查看源代码是无法知道的！\n\n当然，你也可以在该类的实例（对象）上使用在类 `Birthday`\
    \ 中定义的新方法。例如：\n\n```python\nbirthday.is_birthday()\n```\n\n## 22.4 总结\n\n面向对象语言中的类提供了一些过程式语言中不具备的特性。总结一下，本章关于面向对象需要记住的要点是：\n\
    \n1.  类提供了继承。\n2.  继承提供了代码重用。\n3.  继承提供了数据类型的扩展。\n4.  继承允许多态性。\n5.  继承是面向对象的一个独特特性。\n\
    \n## 第23章 运算符重载\n\n### 23.1 引言\n\n在定义用户自定义类（类型）时，定义运算符可以使使用这些类的实例更加方便。这样的运算符可能包括‘+’加号运算符或‘-’减号运算符。这允许将两个类的实例相加或相减。在本章中，我们将探讨运算符重载；它是什么，如何工作，以及我们为什么需要它。\n\
    \n### 23.2 运算符重载\n\n#### 23.2.1 为什么要有运算符重载？\n\n运算符重载允许用户定义的*类*看起来能够以自然的方式使用诸如\
    \ +、-、<、> 或 == 以及逻辑运算符如 &（与）和 |（或）等运算符。\n这导致了更简洁和可读的代码，因为可以编写如下代码：\n\n```python\n\
    q1 = Quantity(5)\nq2 = Quantity(10)\nq3 = q1 + q2\n```\n\n这对开发者和阅读代码的人来说都感觉更自然。另一种选择是创建诸如\
    \ `add` 之类的方法，并编写如下代码：\n\n```python\nq1 = Quantity(5)\nq2 = Quantity(10)\nq3 =\
    \ q1.add(q2)\n```"
