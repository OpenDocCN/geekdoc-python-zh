    \ 'Upon', 'Time']\n```\n\n该方法的一个重载形式是：\n\n```\n<list>.pop()\n```\n\n它会移除列表中的最后一个项目。例如：\n\
    \n```\nlist6 = ['Once', 'Upon', 'a', 'Time']\nprint(list6)\nprint(list6.pop())\n\
    print(list6)\n```\n\n输出为：\n\n```\n['Once', 'Upon', 'a', 'Time']\nTime\n['Once',\
    \ 'Upon', 'a']\n```\n\n## 32.5.9 从列表中删除元素\n\n也可以使用 `del` 关键字从列表中删除元素。\n`del` 关键字可用于删除列表中的单个元素或一个切片。\n\
    要从列表中删除单个元素，请使用 `del` 并通过其索引访问该元素：\n\n```\nmy_list = ['A', 'B', 'C', 'D', 'E']\n\
    print(my_list)\ndel my_list[2]\nprint(my_list)\n```\n\n输出为：\n\n```\n['A', 'B',\
    \ 'C', 'D', 'E']\n['A', 'B', 'D', 'E']\n```\n\n要从列表中删除一个切片，请使用 `del` 关键字和从列表返回的切片。\n\
    \n```\nmy_list = ['A', 'B', 'C', 'D', 'E']\nprint(my_list)\ndel my_list[1:3]\n\
    print(my_list)\n```\n\n这将删除从索引 1 开始到（但不包括）索引 3 的切片：\n\n```\n['A', 'B', 'C', 'D',\
    \ 'E']\n['A', 'D', 'E']\n```\n\n## 32.5.10 列表方法\n\nPython 提供了一组内置方法，可用于列表。\n\n\
    | 方法 | 描述 |\n| --- | --- |\n| append() | 在列表末尾添加一个元素 |\n| clear() | 移除列表中的所有元素\
    \ |\n| copy() | 返回列表的一个副本 |\n| count() | 返回具有指定值的元素数量 |\n| extend() | 将一个列表（或任何可迭代对象）的元素添加到当前列表的末尾\
    \ |\n| index() | 返回具有指定值的第一个元素的索引 |\n| insert() | 在指定位置添加一个元素 |\n| pop() | 移除指定位置的元素\
    \ |\n| remove() | 移除具有指定值的项目 |\n| reverse() | 反转列表的顺序 |\n| sort() | 对列表进行排序 |\n\
    \n## 32.6 在线资源\n\n请参阅 Python 标准库文档：\n\n- https://docs.python.org/3/tutorial/datastructures.html\
    \ Python 数据结构教程。\n- https://docs.python.org/3/library/stdtypes.html#sequence-types-list-tuple-range\
    \ 关于列表和元组。\n- https://docs.python.org/3/tutorial/datastructures.html#tuples-and-sequences\
    \ 在线元组教程。\n- https://docs.python.org/3/tutorial/datastructures.html#lists 在线列表教程。\n\
    \n## 32.7 练习\n\n本练习的目标是使用集合/容器，例如列表。\n为此，我们将回到与你的账户相关的类。\n你应该修改你的 `Account` 类，使其能够保存交易历史记录。\n\
    *交易* 是存款或取款的记录以及金额。\n请注意，账户中的初始金额可以视为初始存款。\n历史记录可以实现为一个 *列表*，其中包含按顺序排列的交易序列。交易本身可以由一个类定义，该类包含一个操作（存款或取款）和一个金额。\n\
    每次进行取款或存款时，都应创建一个新的交易记录并将其添加到交易历史列表中。\n\n现在，为遍历账户的交易历史提供支持，以便可以查看每笔存款或取款。你可以通过实现可迭代协议来做到这一点——如果需要查看如何操作，请参考上一章。请注意，我们想要遍历的是交易历史——因此你可以使用历史列表作为可迭代对象的基础。\n\
    \n你应该能够在你的账户应用程序末尾运行以下代码：\n\n```\nfor transaction in acc1:\n    print(transaction)\n\
    ```\n\n根据你执行的具体交易（存款和取款），你应该会得到一个打印出来的交易列表：\n\n```\nTransaction[deposit: 10.05]\n\
    Transaction[deposit: 23.45]\nTransaction[withdraw: 12.33]\n```\n\n# 第 33 章\n集合\n\
    \n## 33.1 简介\n\nPython 提供了许多不同的容器或集合类型。本章重点介绍集合（set）这种集合类型。这种集合用于保存唯一的 *不可变* 对象集合。它是一个可变集合，因此它持有的值可以随时间变化，但不允许重复的值。它还支持基本的集合操作，如交集、并集和差集。\n\
    \n## 33.2 创建集合\n\n`set` 使用花括号（例如 `{}`）定义。\n例如，\n\n```\nbasket = {'apple', 'orange',\
    \ 'apple', 'pear',\n          'orange', 'banana'}\nprint(basket)\n```\n\n运行此代码将显示\
    \ *apple* 只被添加到集合中一次：\n\n```\n{'banana', 'orange', 'pear', 'apple'}\n```\n\n请注意，由于\
    \ `set` 是无序的，因此无法通过索引引用集合中的元素。\n\n## 33.3 Set() 构造函数\n\n与元组和列表一样，Python 提供了一个预定义函数，可以将任何可迭代类型转换为集合。函数签名如下：\n\
    \n```\nset(iterable)\n```\n\n给定一个可迭代对象，此函数返回一个基于从可迭代对象获取的值的新集合。这意味着可以从列表、元组或字典以及任何其他实现了可迭代协议的数据类型轻松创建集合。例如：\n\
    \n```\nset1 = set((1, 2, 3))\nprint(set1)\n```\n\n输出为：\n\n```\n{1, 2, 3}\n```\n\
    \n## 33.4 访问集合中的元素\n\n与列表不同，无法通过索引访问集合中的元素；这是因为它们是无序容器，因此没有可用的索引。但是，它们是可迭代容器。\n\
    可以使用 `for` 语句遍历集合的元素：\n\n```\nfor item in basket:\n    print(item)\n```\n\n这会依次将\
    \ `print` 语句应用于列表中的每个项目。\n\n## 33.5 使用集合\n\n### 33.5.1 检查元素是否存在\n\n你可以使用 `in`\
    \ 关键字检查元素是否在集合中，例如：\n\n```\nprint('apple' in basket)\n```\n\n如果 'apple' 是集合 basket\
    \ 的成员，这将打印 true。\n\n### 33.5.2 向集合中添加项目\n\n可以使用 `add()` 方法向集合中添加项目：\n\n```\nbasket\
    \ = {'apple', 'orange', 'banana'}\nbasket.add('apricot')\nprint(basket)\n```\n\
    \n生成输出：\n\n```\n{'orange', 'apple', 'banana', 'apricot', 'pear'}\n```\n\n如果你想向集合中添加多个项目，可以使用\
    \ `update()` 方法：\n\n```\nbasket = {'apple', 'orange', 'banana'}\nbasket.update(['apricot',\
    \ 'mango', 'grapefruit'])\nprint(basket)\n```\n\n生成输出：\n\n```\n{'orange', 'apple',\
    \ 'mango', 'banana', 'apricot', 'grapefruit'}\n```\n\n`update` 的参数可以是集合、列表、元组或字典。如果参数还不是集合，该方法会自动将其转换为集合，然后将值添加到原始集合中。\n\
    \n### 33.5.3 更改集合中的项目\n\n无法更改集合中已有的项目。\n\n### 33.5.4 获取集合的长度\n\n与其他集合/容器类一样；你可以使用\
    \ `len()` 函数来获取集合的长度。\n\n```\nbasket = {'apple', 'orange', 'apple', 'pear', 'orange',\
    \ 'banana'}\nprint(len(basket)) # 生成 4\n```"
