  md: '# Chapter 31

    Generators and Coroutines


    # 31.1 Introduction


    This chapter introduces generators and coroutines. A generator is a data generator,
    and a coroutine is a data consumer. However, many developers get these two constructors
    confused as they both employ the yield keyword; although the purpose of yield
    in a generator is very different to the purpose of yield within a coroutine. This
    chapter will discuss both Python language constructs.


    # 31.2 Generators


    In many cases it is not appropriate (or possible) to obtain all the data to be
    processed up front (for performance reasons, for memory reasons, etc.). Instead
    lazily creating the data to be iterated over based on some underlying dataset
    may be more appropriate.

    Generators are a *special* function that can be used to *generate* a sequence
    of values to be iterated over on demand (that is when the values are needed) rather
    than produced up front.

    The only thing that makes a generator a *generator function* is the use of the
    `yield` keyword (which was introduced in Python 2.3).

    The `yield` keyword can only be used inside a function or a method. Upon its execution
    the function is suspended, and the value of the `yield` statement is returned
    as the current *cycle* value. If this is used with a `for` loop, then the loop
    runs once for this value. Execution of the generator function is then resumed
    after the loop has cycled once, and the next cycle value is obtained.

    The *generator* function will keep supplying values until it returns (which means
    that an infinite sequence of values can be generated).'
  merge: -1
  pgno: 368
- img_proc: true
  md: "# 31.2.1 Defining a Generator Function\n\nA very simple example of a generator\
    \ function is given below. This function is called the `gen_numbers()` function:\n\
    \n```\ndef gen_numbers():\n    yield 1\n    yield 2\n    yield 3\n```\n\nThis\
    \ is a *generator* function as it has at least one `yield` statement (in fact\
    \ it has three). Each time the `gen_numbers()` function is called within a `for`\
    \ statement it will return one of the values associated with a `yield` statement;\
    \ in this case the value 1, then the value 2 and finally the value 3 before it\
    \ returns (terminates).\n\n# 31.2.2 Using a Generator Function in a for Loop\n\
    \nWe can use the `gen_numbers()` function with a `for` statement as shown below:\n\
    \n```\nfor i in gen_numbers():\n    print(i)\n```\n\nWhich produces 1, 2 and 3\
    \ as output.\nIt is common for the body of a generator to have some form of loop\
    \ itself. This loop is typically used to generate the values that will be *yielded*.\
    \ However, as is shown above that is not necessary, and here a `yield` statement\
    \ is repeated three times.\nNote that `gen_numbers()` is a function but it is\
    \ a special function as it returns a *generator object*.\nThis is a generator\
    \ function returns a generator object which wraps up the *generation* of the values\
    \ required but this is hidden from the developer.\n\n# 31.2.3 When Do the Yield\
    \ Statements Execute?\n\nIt is interesting to consider what happens within the\
    \ generator function; it is actually suspended each time a `yield` statement supplies\
    \ a value and is only resumed when the next request for a value is received. This\
    \ can be seen by adding some additional `print` statements to the `gen_numbers()`\
    \ function:\n\n```\ndef gen_numbers2():\n    print('Start')\n    yield 1\n   \
    \ print('Continue')\n    yield 2\n    print('Final')\n```"
