    # 38.4 Reduce


    The `reduce()` function is the last higher-order function that can be used with
    collections of data that we will look at.

    The `reduce()` function applies a function to an iterable and combines the result
    returned for each element together into a single result.

    This function was part of the core Python 2 language but was not included into
    the core of Python 3. This is partly because Guido van Rossum believed (probably
    correctly) that the applicability of `reduce` is quite limited, but where it is
    useful it is very useful. Although it has to be said that some developers try
    and shoe horn `reduce()` into situations that just make the implementation very
    hard to understand—remember always aim to keep it simple.

    To use `reduce` in Python 3 you need to import it from the `functools` module.
    One point that is sometimes misunderstood with `reduce()` is that the function
    passed into reduce takes two parameters, which are the previous result and the
    next value in the sequence; it then returns the result of applying some operation
    to these parameters.

    The signature of the `functools.reduce` function is


    ```

    functools.reduce(function, iterable[, initializer])

    ```


    Note that optionally you can provide an initializer that is used to provide an
    initial value for the result.

    One obvious use of reduce is to sum all the values in a list:


    ```

    from functools import reduce


    data = [1, 3, 5, 2, 7, 4, 10]

    result = reduce(lambda total, value: total + value, data)

    print(result)

    ```'
