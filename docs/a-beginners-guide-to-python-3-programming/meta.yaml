    pandas             2.0.1\npip                23.1.2\npython-dateutil    2.8.2\n\
    pytz               2023.3\nsetuptools         67.6.1\nsix                1.16.0\n\
    tzdata             2023.3\n(genesis_venv) projects %\n```\n\n有趣的是，如果我们停用虚拟环境，这意味着我们将返回使用默认安装设置，并列出模块，我们将看到\
    \ pandas 及其相关依赖项不再列出，例如：\n\n```\n(genesis_venv) % deactivate\nprojects % pip list\n\
