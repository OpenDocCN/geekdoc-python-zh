    \ often confusing for new programmers (and sometimes for those who are experienced\
    \ in non object-oriented languages). The above figure illustrates that a Student\
    \ *is-a* type of Person whereas an Engine is *part-of* a Car. It does not make\
    \ sense to say that a student is part-of a person or that an engine is-a type\
    \ of car!\n\nIn Python, *inheritance* relationships are implemented by the sub-classing\
    \ mechanism. In contrast, part-of relationships are implemented using instance\
    \ attributes in Python.\n\nThe problem with classes, inheritance and is-a relationships\
    \ is that on the surface they appear to capture a similar concept. In the following\
    \ figure the hierarchies all capture some aspect of the use of the phrase *is-a*.\
    \ However, they are all intended to capture a different relationship.\n\nThe confusion\
    \ is due to the fact that in modern English we tend to overuse the term *is-a*.\
    \ For example, in English we can say that an Employee is a type of Person or that\
    \ Andrew is a Person; both are semantically correct. However, in Python classes\
    \ such as Employee and Person and an object such as Andrew are different things.\
    \ We can distinguish between the different types of relationship by being more\
    \ precise about our definitions in terms of a programming language, such as Python.\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_254_0.png)\n\n## 21.5 The Class Object\
    \ and Inheritance\n\nEvery class in Python extends one or more superclasses. This\
    \ is true even of the class Person shown below:\n\n```python\nclass Person:\n\
    \    def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n```\n\nThis is because if you do not specify a superclass explicitly\
    \ Python automatically adds in the class object as a parent class. Thus the above\
    \ is exactly the same as the following listing which explicitly lists the class\
    \ object as the superclass of Person:\n\n```python\nclass Person(object):\n  \
    \  def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n```\n\nBoth listings above defines a class called Person that extends\
    \ the class object. In fact, between Python 2.2 and Python 3 it was required to\
    \ use the long hand form to ensure that the new style classes were being used\
    \ (as opposed to an older way in which classes were defined pre Python 2.2). As\
    \ such it is common to find that Python developers still use the long hand (explicit)\
    \ form when defining classes that directly extend object.\n\nThe fact that all\
    \ class eventually inherit from the class `object` means that behaviour defined\
    \ in object is available for all classes everywhere.\n\n## 21.6 The Built-in Object\
    \ Class\n\nThe class object is the base (root) class for all classes in Python.\
    \ It has methods that are therefore available in all Python objects. It defines\
    \ a common set of *special* methods and *intrinsic* attributes. The methods include\
    \ the special methods `__str__()`, `__init__()`, `__eq__()` (equals) and `__hash__()`\
    \ (hash method). It also defines attributes such as `__class__`, `__dict__`, `__doc__`\
    \ and `__module__`.\n\n## 21.7 Purpose of Subclasses\n\nSubclasses are used to\
    \ refine the behaviour and data structures of a superclass.\nA parent class may\
    \ define some generic/shared attributes and methods; these can then be inherited\
    \ and reused by several other (sub) classes which add subclass specific attributes\
    \ and behaviour.\nIn fact, there are only a small number of things that a subclass\
    \ should do relative to its parent or super class. If a proposed subclass does\
    \ not do any of these then your selected parent class is not the most appropriate\
    \ super class to use.\nA subclass should modify the behaviour of its parent class\
    \ or extend the data held by its parent class. This modification should refine\
    \ the class in one or more of these ways:\n\n- Changes to the external protocol\
    \ or interface of the class, that is it should extend the set of methods or attributes\
    \ provided by the class.\n- Changes in the implementation of the methods; i.e.,\
    \ the way in which the behaviour provided by the class are implemented.\n- Additional\
    \ behaviour that references inherited behaviour.\n\nIf a subclass does not provide\
    \ one or more of the above, then it is incorrectly placed. For example, if a subclass\
    \ implements a set of new methods, but does not refer to the attributes or methods\
    \ of the parent class, then the class is not really a subclass of the parent (it\
    \ does not extend it).\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_256_0.png)\n\
    \nAs an example, consider the class hierarchy illustrated above. A generic root\
    \ class has been defined. This class defines a `Conveyance` which has doors, fuel\
    \ (both with default values) and a method, `start_up()`, that starts the engine\
    \ of the conveyance. Three subclasses of `Conveyance` have also been defined:\
    \ `Dinghy`, `Car` and `Tank`. Two of these subclasses are appropriate, but one\
    \ should probably not inherit from `Conveyance`. We shall consider each in turn\
    \ to determine their suitability.\n\n- The class `Tank` overrides the number of\
    \ doors inherited, uses the `start_up` method within the method `move`, and provides\
    \ a new attribute. It therefore matches all three of our criteria.\n- Similarly,\
    \ the class `Car` overrides the number of doors and uses the method `start_up()`.\
    \ It also uses the instance variable `fuel` within a new method `accelerate()`.\
    \ It also, therefore, matches our criteria.\n- The class `Dinghy` defines a new\
    \ attribute `sails` and a new method `set_sail()`. As such, it does not use any\
    \ of the features inherited from `Conveyance`. However, we might say that it has\
    \ extended `Conveyance` by providing this attribute and method. We must then consider\
    \ the features provided by `Conveyance`. We can ask ourselves whether they make\
    \ sense within the context of `Dinghy`. If we assume that a dinghy is a small\
    \ sail-powered boat, with no cabin and no engine, then nothing inherited from\
    \ `Conveyance` is useful. In this case, it is likely that `Conveyance` is misnamed,\
    \ as it defines some sort of a motor vehicle, and the `Dinghy` class should not\
    \ have extended it.\n\n## 21.8 Overriding Methods\n\nOverriding occurs when a\
    \ method is defined in a class (for example, `Person`) and also in one of its\
    \ subclasses (for example, `Employee`). It means that instances of `Person` and\
    \ `Employee` both respond to requests for this method to be run but each has their\
    \ own implementation of the method.\n\nFor example, let us assume that we define\
    \ the method `__str__()` in these classes (so that we have a string representation\
    \ of these objects to use with the print function). The pseudo code definition\
    \ of this in Person might be:\n\n```python\ndef __str__(self):\n    return 'Person\
    \ ' + self.name + ' is ' + str(self.age)\n```\n\nIn Employee, it might be defined\
    \ as:\n\n```python\ndef __str__(self):\n    return 'Employee(' + str(self.id)\
    \ + ')'\n```\n\nThe method in Employee replaces the version in Person for all\
    \ instances of Employee. If we ask an instance of Employee for the result of `__str__()`,\
    \ we get the string 'Employee(<some_id>)'. If you are confused, think of it this\
    \ way:\n\n> If you ask an object to perform some operation, then, to determine\
    \ which version of the method is run, look in the class used to create the instance.\
    \ If the method is not defined there, look in the class's parent. Keep doing this\
    \ until you find a method which implements the operation requested. This is the\
    \ version which is used.\n\nAs a concrete example, see the classes Person and\
    \ Employee below; in which the `__str__()` method in Person is overridden in Employee.\n\
    \n```python\nclass Person:\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n    def __str__(self):\n        return self.name\
    \ + ' is ' + str(self.age)\n\nclass Employee(Person):\n    def __init__(self,\
    \ name, age, id):\n        super().__init__(name, age)\n        self.id = id\n\
    \    def __str__(self):\n        return self.name + ' is ' + str(self.age) + '\
    \ - id(' + str(self.id) + ')'\n```\n\nInstances of these classes will both be\
    \ convertible to a string using `__str__()` but the version used by instances\
    \ of Employee will differ from that used with instances of Person, for example:\n\
    \n```python\np = Person('John', 54)\nprint(p)\ne = Employee('Denise', 51, 1234)\n\
    print(e)\n```\n\nGenerates as output:\n\n```\nJohn is 54\nDenise is 51 - id(1234)\n\
    ```\n\nAs can be seen from this the Employee class prints the name, age and id\
    \ of the Employee while the Person class only prints the name and age."
  mdcn: "实例层次结构涉及的是实例或对象，而非类，并且在对象执行期间非常重要。\n\n实例关系有两种类型：一种表示*部分-整体*关系，另一种涉及*使用*关系（它被称为*是一种*关系）。下图对此进行了说明：\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_253_0.png)\n\n*是一种*关系与*部分-整体*关系之间的区别常常让新程序员感到困惑（有时对那些在非面向对象语言方面有经验的人也是如此）。上图说明了学生*是一种*人，而引擎是汽车的*一部分*。说学生是人的一部分或引擎是一种汽车是没有意义的！\n\
    \n在Python中，*继承*关系通过子类机制实现。相反，*部分-整体*关系在Python中使用实例属性来实现。\n\n类、继承和*是一种*关系的问题在于，表面上它们似乎捕捉了相似的概念。在下图中，层次结构都捕捉了短语*是一种*使用的某些方面。然而，它们都旨在捕捉不同的关系。\n\
    \n这种混淆是由于在现代英语中，我们倾向于过度使用*是一种*这个术语。例如，在英语中我们可以说员工是一种人，或者说安德鲁是一个人；两者在语义上都是正确的。然而，在Python中，像员工和人这样的类以及像安德鲁这样的对象是不同的事物。我们可以通过在编程语言（如Python）中更精确地定义来区分不同类型的关系。\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_254_0.png)\n\n## 21.5 类对象与继承\n\nPython中的每个类都扩展了一个或多个超类。即使下面显示的Person类也是如此：\n\
    \n```python\nclass Person:\n    def __init__(self, name, age):\n        self.name\
    \ = name\n        self.age = age\n```\n\n这是因为如果你没有明确指定超类，Python会自动将类对象添加为父类。因此，上面的代码与下面明确将类对象列为Person超类的代码完全相同：\n\
    \n```python\nclass Person(object):\n    def __init__(self, name, age):\n     \
    \   self.name = name\n        self.age = age\n```\n\n上面两个代码片段都定义了一个名为Person的类，它扩展了类对象。事实上，在Python\
    \ 2.2到Python 3之间，需要使用这种长格式来确保使用的是新式类（而不是Python 2.2之前定义类的旧方式）。因此，通常会发现Python开发人员在定义直接扩展object的类时仍然使用长格式（显式格式）。\n\
    \n所有类最终都继承自`object`类这一事实意味着在object中定义的行为在所有地方的所有类中都可用。\n\n## 21.6 内置的object类\n\
    \nobject类是Python中所有类的基类（根类）。它因此拥有在所有Python对象中都可用的方法。它定义了一组通用的*特殊*方法和*内置*属性。这些方法包括特殊方法`__str__()`、`__init__()`、`__eq__()`（等于）和`__hash__()`（哈希方法）。它还定义了诸如`__class__`、`__dict__`、`__doc__`和`__module__`等属性。\n\
    \n## 21.7 子类的目的\n\n子类用于细化超类的行为和数据结构。\n父类可能定义一些通用/共享的属性和方法；这些可以被几个其他（子）类继承和重用，这些子类添加了特定于子类的属性和行为。\n\
    事实上，相对于其父类或超类，子类应该做的事情只有少数几件。如果一个提议的子类没有做这些事情中的任何一件，那么你选择的父类就不是最合适的超类。\n子类应该修改其父类的行为或扩展其父类持有的数据。这种修改应该通过以下一种或多种方式来细化类：\n\
    \n-   更改类的外部协议或接口，即它应该扩展类提供的方法或属性集。\n-   更改方法的实现；即，类提供的行为的实现方式。\n-   引用继承行为的附加行为。\n\
    \n如果一个子类没有提供上述一项或多项，那么它就被错误地放置了。例如，如果一个子类实现了一组新方法，但没有引用父类的属性或方法，那么这个类就不是父类的真正子类（它没有扩展它）。\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_256_0.png)\n\n例如，考虑上面说明的类层次结构。定义了一个通用的根类。这个类定义了一个`Conveyance`（交通工具），它有门、燃料（两者都有默认值）和一个启动交通工具引擎的方法`start_up()`。还定义了`Conveyance`的三个子类：`Dinghy`（小艇）、`Car`（汽车）和`Tank`（坦克）。其中两个子类是合适的，但有一个可能不应该继承自`Conveyance`。我们将依次考虑每一个以确定其适用性。\n\
    \n-   `Tank`类覆盖了继承的门的数量，在`move`方法中使用了`start_up`方法，并提供了一个新属性。因此它符合我们所有的三个标准。\n\
    -   类似地，`Car`类覆盖了门的数量并使用了`start_up()`方法。它还在一个新方法`accelerate()`中使用了实例变量`fuel`。因此，它也符合我们的标准。\n\
    -   `Dinghy`类定义了一个新属性`sails`和一个新方法`set_sail()`。因此，它没有使用从`Conveyance`继承的任何特性。然而，我们可以说它通过提供这个属性和方法扩展了`Conveyance`。然后我们必须考虑`Conveyance`提供的特性。我们可以问自己，它们在`Dinghy`的上下文中是否有意义。如果我们假设小艇是一种小型帆船，没有船舱也没有引擎，那么从`Conveyance`继承的任何东西都没有用。在这种情况下，`Conveyance`可能被错误命名，因为它定义了某种机动车辆，而`Dinghy`类不应该扩展它。\n\
    \n## 21.8 方法重写\n\n当一个方法在一个类（例如`Person`）中定义，并且也在其子类之一（例如`Employee`）中定义时，就会发生重写。这意味着`Person`和`Employee`的实例都响应运行此方法的请求，但每个实例都有自己对该方法的实现。\n\
    \n例如，让我们假设我们在这些类中定义了`__str__()`方法（以便我们有这些对象的字符串表示，可以与print函数一起使用）。在Person中，这个方法的伪代码定义可能是：\n\
    \n```python\ndef __str__(self):\n    return 'Person ' + self.name + ' is ' + str(self.age)\n\
    ```\n\n在Employee中，它可能被定义为：\n\n```python\ndef __str__(self):\n    return 'Employee('\
    \ + str(self.id) + ')'\n```\n\nEmployee中的方法替换了Person中的版本，适用于所有Employee的实例。如果我们要求一个Employee实例提供`__str__()`的结果，我们会得到字符串'Employee(<some_id>)'。如果你感到困惑，可以这样想：\n\
    \n> 如果你要求一个对象执行某个操作，那么，要确定运行哪个版本的方法，请查看用于创建实例的类。如果该方法在那里没有定义，请查看该类的父类。继续这样做，直到找到实现所请求操作的方法。这就是使用的版本。\n\
    \n作为一个具体的例子，请看下面的Person和Employee类；其中Person中的`__str__()`方法在Employee中被重写。\n\n```python\n\
    class Person:\n    def __init__(self, name, age):\n        self.name = name\n\
    \        self.age = age\n    def __str__(self):\n        return self.name + '\
    \ is ' + str(self.age)\n\nclass Employee(Person):\n    def __init__(self, name,\
    \ age, id):\n        super().__init__(name, age)\n        self.id = id\n    def\
    \ __str__(self):\n        return self.name + ' is ' + str(self.age) + ' - id('\
    \ + str(self.id) + ')'\n```\n\n这些类的实例都可以使用`__str__()`转换为字符串，但Employee实例使用的版本与Person实例使用的版本不同，例如：\n\
    \n```python\np = Person('John', 54)\nprint(p)\ne = Employee('Denise', 51, 1234)\n\
    print(e)\n```\n\n生成的输出为：\n\n```\nJohn is 54\nDenise is 51 - id(1234)\n```\n\n\
    由此可见，Employee类打印了员工的姓名、年龄和ID，而Person类只打印了姓名和年龄。"
