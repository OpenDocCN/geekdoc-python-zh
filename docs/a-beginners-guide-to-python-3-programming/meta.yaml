    \ class is an *abstract* class in which the get_move() method is marked as being\
    \ *abstract*. The class maintains a reference to the board and to a counter.\n\
    \n```\nclass Player(metaclass=ABCMeta):\n    \"\"\" Abstract class representing\
    \ a Player\n         and their counter \"\"\"\n\n    def __init__(self, board):\n\
    \        self.board = board\n        self._counter = None\n\n    @property\n \
