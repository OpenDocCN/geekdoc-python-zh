    # Chapter 3

    Setting up the Python Environment


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_47_0.png)


    # 3.1 Introduction


    In this chapter we will check to see if you have Python installed on your computer.
    If you do not have Python installed then we will step through the process of installing
    Python. This is necessary because when you run a Python program it looks for the
    `python` interpreter that is used to execute your program or script. Without the
    `python` interpreter installed on your machine Python programs are just text files!


    # 3.2 Check to See if Python is Installed


    The first thing you should do is to see if Python 3 is already installed on your
    computer. First check to see that you don’t have Python installed. If it is you
    don’t need to do anything unless it is a very old version of Python 3 such as
    3.1 or 3.2.


    On a Windows 11 machine you can check the version installed by opening a Command
    Prompt window (this can be done by searching for Cmd in the ‘Search’ box in Windows).


    Once the Command window is open try typing in `python`. This is illustrated below:'
