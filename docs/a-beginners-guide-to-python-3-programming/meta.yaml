    # 39.4 The sort() Method


    As mentioned at the start of this chapter, there is an alternative way to sort
    (some) containers, that is, the `sort()` method. This method is invoked using
    the *dot nation* and is applied directly to the mutable container being used such
    as a `list`. It is not available on immutable containers such as `tuples` as it
    is not possible to modify them. However, on a mutable container such as a `list`
    it allows the original list to be sorted in situ. For example:


    ```

    data_list = [5, 2, 8, 1, 9, 3]

    print(data_list)

    data_list.sort()

    print(data_list)

    ```


    Note that it is not necessary to store the result of invoking the `sort()` method
    into a new variable; this avoids additional variables being created. However,
    the original list in the variable `data_list` has now been sorted into ascending
    order using the natural ordering of the types held within the list. As these are
    *integers* they will be sorted into ascending numerical order, for example:


    ```

    [5, 2, 8, 1, 9, 3]

    [1, 2, 3, 5, 8, 9]

    ```'
