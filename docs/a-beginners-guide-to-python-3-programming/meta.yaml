    , line 15, in divide\n    return x / y\nTypeError: unsupported operand type(s)\
    \ for /: 'Distance' and 'Distance'\n```\n\nYou may well have already encountered\
    \ these while exploring Python. Basically, it is telling you that the operator\
    \ '/' is not supported when used with the `Distance` type.\n\n# 28.4 Polymorphism\n\
    \nPolymorphism is the ability to send the same message (request to run a method)\
    \ to different objects, each of which appear to perform the same function. However,\
    \ the way in which the message is handled depends on the object's class.\n\nPolymorphism\
    \ is a strange sounding word, derived from Greek, for a relatively simple concept.\
    \ It is essentially the ability to request that the same operation be performed\
    \ by a wide range of different types of things. How the request is processed which\
    \ depends on the thing that receives the request. The programmer need not worry\
    \ about how the request is handled, only that it is. This is illustrated below.\n\
    \n```\ndef night_out(p):\n    p.eat()\n    p.drink()\n    p.sleep()\n```\n\nIn\
    \ this example, the parameter passed into the `night_out()` function expects to\
    \ be given something that will respond to the methods `eat()`, `drink()` and `sleep()`.\
    \ Any object that meets this requirement can be used with the function.\n\nWe\
    \ can define multiple classes that meet this informal contract, for example we\
    \ can define a class hierarchy that provides these methods, or completely separate\
    \ classes that implement the methods. In the case of the class hierarchy the methods\
    \ may or may not override those from the parent class."
