    `try` 块将运行，如果没有错误引发，那么 `else` 子句将被执行，最后 `finally` 代码将运行，因此我们将得到输出：\n\n```\nmy_function\
    \ in\nmy_function out\nEverything worked OK\nAlways runs\n```\n\n然而，如果我们传入 6 和\
