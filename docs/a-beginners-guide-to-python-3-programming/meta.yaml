    The idea of a *cache* is that it can be used to save the previous calculations
    and reuse those if appropriate rather than have to perform the same calculation
    multiple times. The use of a cache can greatly improve the performance of systems
    in which these repeat calculations occur.


    There are many commercial caching libraries available for a wide variety of languages
    including Python. However, at their core they are all somewhat dictionary like;
    that is, there is a *key* which is usually some combination of the operation invoked
    and the parameter values used. In turn the *value* element is the result of the
    calculation.


    These caches usually also have eviction policies so that they do not become overly
    large; these eviction policies can usually be specified so that they match the
    way in which the cache is used. One common eviction policy is the Least Recently
    Used (or LRU) policy. When using this policy once the size of the cache reaches
    a predetermined limit the Least Recently Used value is evicted, etc.


    For this exercise you should implement a simple caching mechanism using a dictionary
    (but without an eviction policy).


    The cache should use the parameter passed into the `factorial()` function as the
    key and return the stored value if one is present.'
