  md: '# Chapter 10

    Recursion


    # 10.1 Introduction


    Recursion is a very powerful way to implement solutions to a certain class of
    problems. This class of problems is one where the overall solution to a problem
    can be generated by breaking that overall problem down into smaller instances
    of the same problem. The overall result is then generated by combining together
    the results obtained for the smaller problems.


    # 10.2 Recursive Behaviour


    A recursive solution in a programming language such as Python is one in which
    a function calls itself one or more times in order to solve a particular problem.
    In many cases the result of calling itself is combined with the functions current
    state to return a result.

    In most cases the recursive call involves calling the function but with a smaller
    problem to solve. For example, a function to traverse a tree data structure might
    call itself passing in a sub-tree to process. Alternatively a function to generate
    a factorial number might call itself passing in a smaller number to process etc.

    The key here is that an overall problem can be solved by breaking it down into
    smaller examples of the same problem.

    Functions that solve problems by calling themselves are referred to as *recursive*
    functions.

    However, if such a function does not have a termination point then the function
    will go on calling itself to infinity (at least in theory). In most languages
    such a situation will (eventually) result in an error being generated.'
  merge: -1
  pgno: 138
- img_proc: true
  md: 'For a recursive function to the useful it must therefore have a *termination*
    condition. That is a condition under which they do not call themselves and instead
    just return (often with some result). The termination condition may be because:


    +   - A solution has been found (some data of interest in a tree structure).

    - The problem has become so small that it can be solved without further recursion.
    This is often referred to as a base case. That is, a base case is a problem that
    can be solved without further recursion.

    - Some maximum level of recursion has been reached, possibly without a result
    being found/generated.


    We can therefore say that a recursive function is a function defined in terms
    of itself via self-referential expressions. The function will continue to call
    itself with smaller variations of the overall problem until some termination condition
    is met to stop the recursion. All recursive functions thus share a common format;
    they have a recursive part and a termination point which represents the base case
    part.


    # 10.3 Benefits of Recursion


    The key benefit of recursion is that some algorithms (solutions to computer problems)
    are expressed far more elegantly and with a great deal less code when implemented
    recursively than when using an iterative approach.

    This means that the resulting code can be easier to write and easier to read.

    These twin ideas are important both for the developers who initially create the
    software but also for those developers who must maintain that software (potentially
    a significant amount of time later).

    Code that is easier to write tends to be less error prone. Similarly code that
    is easier to read tends to be easier to maintain, debug, modify and extend.

    Recursion is also well suited to producing functional solutions to a problem as
    by its very nature a recursive function relies on its inputs and outputs and does
    not hold any hidden state. We will return to this in a later chapter on functional
    programming.


    # 10.4 Recursively Searching a Tree


    As an example of a problem that is well suited to a recursive solution, we will
    example how we might implement a program to traverse a binary tree data structure.

    A binary tree is a tree data structure made up of nodes in which each node has
    a value, a left pointer and a right pointer.

    The root node is the top most node in the tree. This root node then references
    a left and right subtree. This structure is repeated until a leaf node. A leaf
    node is a node in which both the right and left pointers are empty (that is they
    have the value None).'
