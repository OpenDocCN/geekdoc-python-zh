    \ is key here as the statements included in the while statement are determined\
    \ by indentation. Each statement that is indented to the same level after the\
    \ while condition is part of the `while` loop.\n\nHowever, as soon as a statement\
    \ is no longer following the `while` block, then it is no longer part of the `while`\
    \ loop, and its execution is no longer under the control of the test condition.\n\
    \nThe following illustrates an example `while` loop in Python:\n\n```\ncount =\
    \ 0\nprint('Starting')\nwhile count < 10:\n    print(count, ' ', end=\"\") # part\
    \ of the while loop\n    count += 1                 # also part of the while loop\n\
    print() # not part of the while loop\nprint('Done')\n```"
