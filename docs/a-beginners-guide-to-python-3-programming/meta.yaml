- md: "## 30.4 Online Resources\n\nSee the following for further information.\n\n\
    - https://docs.python.org/3/library/stdtypes.html#iterator-types for iterator\
    \ types.\n\n## Chapter 31: Generators and Coroutines\n\n### 31.1 Introduction\n\
    \nThis chapter introduces generators and coroutines. A generator is a data generator,\
    \ and a coroutine is a data consumer. However, many developers get these two constructors\
    \ confused as they both employ the yield keyword; although the purpose of yield\
    \ in a generator is very different to the purpose of yield within a coroutine.\
    \ This chapter will discuss both Python language constructs.\n\n### 31.2 Generators\n\
    \nIn many cases it is not appropriate (or possible) to obtain all the data to\
    \ be processed up front (for performance reasons, for memory reasons, etc.). Instead\
    \ lazily creating the data to be iterated over based on some underlying dataset\
    \ may be more appropriate.\n\nGenerators are a *special* function that can be\
    \ used to *generate* a sequence of values to be iterated over on demand (that\
    \ is when the values are needed) rather than produced up front.\n\nThe only thing\
    \ that makes a generator a *generator function* is the use of the `yield` keyword\
    \ (which was introduced in Python 2.3).\n\nThe `yield` keyword can only be used\
    \ inside a function or a method. Upon its execution the function is suspended,\
    \ and the value of the `yield` statement is returned as the current *cycle* value.\
    \ If this is used with a `for` loop, then the loop runs once for this value. Execution\
    \ of the generator function is then resumed after the loop has cycled once, and\
    \ the next cycle value is obtained.\n\nThe *generator* function will keep supplying\
    \ values until it returns (which means that an infinite sequence of values can\
    \ be generated).\n\n#### 31.2.1 Defining a Generator Function\n\nA very simple\
    \ example of a generator function is given below. This function is called the\
    \ `gen_numbers()` function:\n\n```python\ndef gen_numbers():\n    yield 1\n  \
    \  yield 2\n    yield 3\n```\n\nThis is a *generator* function as it has at least\
    \ one `yield` statement (in fact it has three). Each time the `gen_numbers()`\
    \ function is called within a `for` statement it will return one of the values\
    \ associated with a `yield` statement; in this case the value 1, then the value\
    \ 2 and finally the value 3 before it returns (terminates).\n\n#### 31.2.2 Using\
    \ a Generator Function in a for Loop\n\nWe can use the `gen_numbers()` function\
    \ with a `for` statement as shown below:\n\n```python\nfor i in gen_numbers():\n\
    \    print(i)\n```\n\nWhich produces 1, 2 and 3 as output.\n\nIt is common for\
    \ the body of a generator to have some form of loop itself. This loop is typically\
    \ used to generate the values that will be *yielded*. However, as is shown above\
    \ that is not necessary, and here a `yield` statement is repeated three times.\n\
    \nNote that `gen_numbers()` is a function but it is a special function as it returns\
    \ a *generator object*.\n\nThis is a generator function returns a generator object\
    \ which wraps up the *generation* of the values required but this is hidden from\
    \ the developer.\n\n#### 31.2.3 When Do the Yield Statements Execute?\n\nIt is\
    \ interesting to consider what happens within the generator function; it is actually\
    \ suspended each time a `yield` statement supplies a value and is only resumed\
    \ when the next request for a value is received. This can be seen by adding some\
    \ additional `print` statements to the `gen_numbers()` function:\n\n```python\n\
    def gen_numbers2():\n    print('Start')\n    yield 1\n    print('Continue')\n\
    \    yield 2\n    print('Final')\n    yield 3\n    print('End')\n\nfor i in gen_numbers2():\n\
    \    print(i)\n```\n\nWhen we run this code snippet, we get\n\n```\nStart\n1\n\
    Continue\n2\nFinal\n3\nEnd\n```\n\nThus the generator executes the yield statements\
    \ on an as needed basis and not all at once.\n\n#### 31.2.4 An Even Number Generator\n\
    \nWe could have used a generator to produce a set of even numbers up to a specific\
    \ limit, as we did earlier with the Evens class, but without the need to create\
    \ a class (and implement the two special methods `__iter__()` and `__next__()`).\
    \ For example:\n\n```python\ndef evens_up_to(limit):\n    value = 0\n    while\
    \ value <= limit:\n        yield value\n        value += 2\n\nfor i in evens_up_to(6):\n\
    \    print(i, end=', ')\n```\n\nThis produces\n\n```\n0, 2, 4, 6,\n```\n\nThis\
    \ illustrates the potential benefit of a generator over an iterator; the `evens_up_to()`\
    \ function is a lot simpler and concise then the Evens class.\n\n#### 31.2.5 Nesting\
    \ Generator Functions\n\nYou can even nest generator functions as each call to\
    \ the generator function is encapsulated in its own generator object which captures\
    \ all the state information needed by that generator invocation. For example:\n\
    \n```python\nfor i in evens_up_to(4):\n    print('i:', i)\n\n    for j in evens_up_to(6):\n\
    \        print('j:', j, end=', ')\n\n    print('')\n```\n\nWhich generates\n\n\
    ```\ni: 0\nj: 0, j: 2, j: 4, j: 6,\ni: 2\nj: 0, j: 2, j: 4, j: 6,\ni: 4\nj: 0,\
    \ j: 2, j: 4, j: 6,\n```\n\nAs you can see from this the loop variable `i` is\
    \ bound to the values produced by the first call to `evens_up_to()` (which produces\
    \ a sequence up to 4) while the `j` loop variable is bound to the values produced\
    \ by the second call to `evens_up_to()` (which produces a sequence of values up\
    \ to 6).\n\n#### 31.2.6 Using Generators Outside a for Loop\n\nYou do not need\
    \ a for loop to work with a generator function; the generator object actually\
    \ returned by the generator function supports the `next()` function. This function\
    \ takes a generator object (returned from the generator function) and returns\
    \ the next value in sequence.\n\nFor example:\n\n```python\nevens = evens_up_to(4)\n\
    print(next(evens), end=', ')\nprint(next(evens), end=', ')\nprint(next(evens))\n\
    ```\n\nThis produces\n\n```\n0, 2, 4\n```\n\nSubsequent calls to `next(evens)`\
    \ return no value; if required the generator can throw an error/exception.\n\n\
    ### 31.3 Coroutines\n\nCoroutines were introduced in Python 2.5 but are still\
    \ widely misunderstood. Much documentation introduces coroutines by saying that\
    \ they are similar to generators, however, there is a fundamental difference between\
    \ generators and coroutines:\n\n1. Generators are data producers,\n2. Coroutines\
    \ are data *consumers*.\n\nThat is coroutines *consume* data produced by something\
    \ else; whereas a generator produces a sequence of values that something else\
    \ can process.\n\nThe `send()` function is used to send values to a coroutine.\
    \ These data items are made available within the coroutine; which will wait for\
    \ values to be supplied to it. When a value is supplied then some behaviour can\
    \ be triggered. Thus, when a coroutine consumes a value it triggers some behaviour\
    \ to be processed.\n\nPart of the confusion between generators and coroutines\
    \ is that the `yield` keyword is reused within a coroutine; it is used within\
    \ a coroutine to cause the coroutine to wait until a value has been sent. It will\
    \ then supply this value to the coroutine.\n\nIt is also necessary to *prime*\
    \ a coroutine using with `next()` or `send(None)` functions. This advances the\
    \ coroutine to the call to `yield` where it will then wait until a value is sent\
    \ to it.\n\nA coroutine may continue forever unless `close()` is sent to it. It\
    \ is possible to pick up on the coroutine being closed by catching the `GeneratorExit`\
    \ exception; you can then trigger some shut down behaviour if required.\n\nAn\
    \ example of a coroutine is given by the `grep()` function below:\n\n```python\n\
    def grep(pattern):\n    print('Looking for', pattern)\n    try:\n        while\
    \ True:\n            line = (yield)\n            if pattern in line:\n       \
    \         print(line)\n    except GeneratorExit:\n        print('Exiting the Co-routine')\n\
    ```\n\nThis coroutine will wait for input data; when data is sent to the coroutine,\
    \ then that data will be assigned to the `line` variable. It will then check to\
    \ see if the pattern used to initialize the coroutine function is present in the\
    \ `line`; if it is it will print the `line`; it will then loop and wait for the\
    \ next data item to be sent to the coroutine. If while it is waiting the coroutine\
    \ is closed, then it will catch the `GeneratorExit` exception and print out a\
    \ suitable message."
