  md: "# 12.5.1 An Example Function\n\nThe following is one of the simplest functions\
    \ you can write; it takes no parameters and has only a single statement that prints\
    \ out the message 'Hello World':\n\n```\ndef print_msg():\n    print('Hello World!')\n\
    ```\n\nThis function is called `print_msg`, and when called (also known as invoked)\
    \ it will run the body of the function which will print out the string, for example,\n\
    \n```\nprint_msg()\n```\n\nwill generate the output\n\n```\nHello World!\n```\n\
    \nBe careful to include the round brackets () when you call the function. This\
    \ is because if you just use the function's name then you are merely referring\
    \ to the location in memory where the function is stored, and you are not invoking\
    \ it.\n\nWe could modify the function to make it a little more general and reusable\
    \ by providing a parameter. This parameter could be used to supply the message\
    \ to be printed out, for example:\n\n```\ndef print_my_msg(msg):\n    print(msg)\n\
    ```\n\nNow the `print_my_msg` function takes a single parameter, and this parameter\
    \ becomes a variable which is available within the body of the function. However,\
    \ this parameter only exists within the body of the function; it is not available\
    \ outside of the function.\n\nThis now means that we can call the `print_my_msg`\
    \ function with a variety of different messages:\n\n```\nprint_my_msg('Hello World')\n\
    print_my_msg('Good day')\nprint_my_msg('Welcome')\nprint_my_msg('Ola')\n```\n\n\
    The output from calling this function with each of these strings being supplied\
    \ as the parameter is:\n\n```\nHello World\nGood day\nWelcome\nOla\n```"
