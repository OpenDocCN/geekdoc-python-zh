  md: "The answer is that a concept known as a *protocol* is used.\nA protocol is\
    \ an informal description of the programmer interface provided by something in\
    \ Python (for example a class but it could also be a module or a set of stand-alone\
    \ functions).\nIt is defined solely via documentation (and thus the `Calculator`\
    \ class should have a class documentation string defining its protocol).\nBased\
    \ on the information provided by the protocol if a function or method requires\
    \ an object to provide a specific operation (or method) then if it all works great;\
    \ if not an error will be thrown, and the type is not compatible.\nIt is one of\
    \ the key elements in Python which allows the Object-Oriented concept of *Polymorphism*\
    \ to operate.\n\n# 28.6 The Length Protocol\n\nThere are many types that can be\
    \ used with the `len()` function to determine their length, for example strings,\
    \ tuples, lists, dictionaries can all be used with the `len()` function. How is\
    \ it that this works? This is where a protocol comes in; there is the length (or\
    \ `__len__`) protocol. This protocol is used by the `len()` function. It assumes\
    \ that whatever has been given to it will support the `__len__()` protocol, in\
    \ other words, that whatever it is given has a method on it called `__len__()`\
    \ . This means we can write\n\n```\nname = 'John' # string\ndata = [1, 2, 3, 4]\
    \ # list\ninfo = ('a', 'b', 'c') # tuple\ncities = cities = {'Wales': 'Cardiff',\
    \ 'England': 'London'} # Dictionary\n\nprint(f'len(name): {len(name)}')\nprint(f'len(data):\
    \ {len(data)}')\nprint(f'len(info): {len(info)}')\nprint(f'len(cities): {len(cities)}')\n\
    ```\n\nThe output from this code block is\n\n```\nlen(name): 4\nlen(data): 4\n\
    len(info): 3\nlen(cities): 2\n```\n\nHowever, if we create a simple class `Bag`\
    \ and try and find out its length:\n\n```\nclass Bag:\n    def __init__(self,\
    \ owner, items):\n        self.owner = owner\n        self.items = items\n\nbag1\
    \ = Bag('John', [])\n```"
