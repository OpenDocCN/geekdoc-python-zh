  md: "+   - The fourth case condition can extract both the x and y value.\n- The\
    \ final case condition is the wildcard.\n\nNote, however, that only one of these\
    \ case conditions will actually execute. The one that does execute will be the\
    \ first case condition to return True. Thus if a tuple of two zeros is entered\
    \ then it will be the first case condition that fires. However, if the tuple passed\
    \ in contains a 5 and a zero then it will be the third case condition that is\
    \ met and the associated action that is performed.\n\n```\ndef locator(point):\n\
    \    match point:\n        case (0, 0):\n            print('Corner')\n       \
    \ case (0, y):\n            print(f'Left edge at x=0, y={y}')\n        case (x,\
    \ 0):\n            print(f'Top edge at x={x}, y=0')\n        case (x, y):\n  \
    \          print(f'Point in grid at x={x}, y={y}')\n        case _:\n        \
    \    raise ValueError('Not a point tuple')\n```\n\nThis function can be used by\
