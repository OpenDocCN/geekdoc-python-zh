    \ class\"\"\"\n```\n\nAnd we can use it in a function divide:\n\n```\ndef divide(x,\
    \ y):\n    try:\n        result = x /y\n    except Exception as e:\n        raise\
    \ DivideByYWhenZeroException from e\n```\n\nWe have used the raise and from keywords\
    \ when we are instantiating the DivideByYWhenZeroException. This chains our exception\
    \ to the original exception that indicates the underling problem.\n\nWe can now\
    \ call the divide method as below:\n\n```\ndef main():\n    divide(6, 0)\n```\n\
