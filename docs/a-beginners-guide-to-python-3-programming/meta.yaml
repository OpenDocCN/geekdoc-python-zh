  md: "# 21.12 Multiple Inheritance Considered Harmful\n\nMultiple inheritance can\
    \ also be very dangerous and is quite a contentious topic for programmers and\
    \ for those designing programming languages. Few things in programmer are inherently\
    \ bad but multiple inheritance can result in a level of complexity (and unexpected\
    \ behaviour) that can tie developers in knots.\n\nPart of the problem highlighted\
    \ by those protesting against multiple inheritance is down to the increased complexity\
    \ and ambiguity that can occur with multiple inheritance trees that may interconnect\
    \ between the different classes. One way to think of this is that if a class inherits\
    \ from multiple classes, then that class may have the same classes in the class\
    \ hierarchy multiple times, this can make it hard to determine which version of\
    \ a method may execute and this may allow bugs to go untouched or indeed introduce\
    \ expected issues due to different interactions between methods. This is exacerbated\
    \ when inherited methods call `super()` using the same method name such as:\n\n\
    ```\ndef get_data(self):\n    return super().get_data() + 'FData'\n```\n\nThe\
    \ following diagram presents a somewhat convoluted multiple inheritance examples\
    \ where the class names A-X have been used so that there is no semantic meaning\
    \ attributable to the inherited classes. Different classes define several common\
    \ methods (`print_info()` and `get_data()`).\n\nAll the classes in the hierarchy\
    \ define a `__str__()` method that returns the class name; if the class extends\
    \ a class other than object, then the super version of `__str__()` is also invoked:\n\
    \n![](img/bf6e2b02eb6625321d9af5664cea2d5d_262_0.png)"
