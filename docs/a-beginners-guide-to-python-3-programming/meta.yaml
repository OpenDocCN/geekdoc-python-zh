    \ A Tutorials Point course on Object-Oriented Programming and Python.\n\n## Chapter\
    \ 19\nPython Classes\n\n## 19.1 Introduction\n\n> In Python everything is an object\
    \ and as such is an example of a type or class of things. For example, integers\
    \ are an example of the int class, real numbers are examples of the float class,\
    \ etc. In this chapter we will look at what a class is in Python, how it is defined,\
    \ how instances of a class can be created, how attributes (data) and methods (behaviour)\
    \ can be defined for a class and outline how memory is managed within Python with\
    \ respect to instance creation and deletion.\n\n## 19.2 Python and Classes\n\n\
    As mentioned above everything in Python is an object! This is illustrated below\
    \ for a number of different types within Python:\n\n```python\nprint(type(4))\n\
    print(type(5.6))\nprint(type(True))\nprint(type('Natalia'))\nprint(type([1, 2,\
    \ 3, 4]))\n```\n\nThis prints out a list of classes that define what it is to\
    \ be an `int`, or a `float` or a `bool` etc. in Python:\n\n```\n<class 'int'>\n\
    <class 'float'>\n<class 'bool'>\n<class 'str'>\n<class 'list'>\n```\n\nThat is\
    \ the number 4 is an example or instance of the class int representing how integers\
    \ work in Python. In turn the number 5.6 is an instance of the class float (representing\
    \ floating-point numbers). The value True is an instance of the class bool and\
    \ the string 'Natalia' is an instance of the class str (representing for strings\
    \ in Python). Finally [1, 2, 3, 4] is an instance of a type of collection called\
    \ a list (which is discussed later in this book).\n\nHowever, you are not just\
    \ restricted to the built-in types (aka classes); it is also possible to define\
    \ user defined types (classes). These can be used to create your own data structures,\
    \ your own data types, your own applications, etc.\n\nThe remainder of this chapter\
    \ considers the constructs in Python used to create user defined classes.\n\n\
    ## 19.3 Class Definitions\n\nIn Python, a class definition has the following format\n\
    \n```python\nclass nameOfClass(SuperClass):\n    __init__\n    attributes\n  \
    \  methods\n```\n\nAlthough you should note that you can mix the order of the\
    \ definition of attributes, and methods as required within a single class.\n\n\
    The following code is an example of a class definition:\n\n```python\nclass Person:\n\
    \    def __init__(self, name, age):\n        self.name = name\n        self.age\
    \ = age\n```\n\nAlthough this is not a hard and fast rule, it is common to define\
    \ a class in a file named after that class. For example, the above code would\
    \ be stored in a file called Person.py; this makes it easier to find the code\
    \ associated with a class. This is shown below using the PyCharm IDE:\n\nThe Person\
    \ class possesses two *attributes* (or instance variables) called *name* and *age*.\n\
    \nThere is also a special method defined called `__init__`. This is an initializer\
    \ (also known as a constructor) for the class. It indicates what data must be\
    \ supplied when an instance of the `Person` class is created and how that data\
    \ is stored internally.\n\nIn this case a *name* and an *age* must be supplied\
    \ when an instance of the `Person` class is created.\n\nThe values supplied will\
    \ then be stored within an instance of the class (represented by the *special*\
    \ variable `self`) in instance variables/attributes `self.name` and `self.age`.\
    \ Note that the parameters to the `__init__` method are *local* variables and\
    \ will disappear when the method terminates, but `self.name` and `self.age` are\
    \ instance variables and will exist for as long as the object is available.\n\n\
    Let us look for a moment at the special variable `self`. This is the first parameter\
    \ passed into any method. However, when a method is called we do not pass a value\
    \ for this parameter ourselves; Python does. It is used to represent the object\
    \ within which the method is executing. This provides the context within which\
    \ the method runs and allows the method to access the data held by the object.\
    \ Thus `self` is the object itself.\n\nYou may also be wondering about that term\
    \ *method*. A method is the name given to behaviour that is linked directly to\
    \ the `Person` class; it is not a free-standing function rather it is part of\
    \ the definition of the class `Person`.\n\nHistorically, it comes from the language\
    \ Smalltalk; this language was first used to simulate a production plant and a\
    \ method represented some behaviour that could be used to simulate a change in\
    \ the production line; it therefore represented a *method* for making a change.\n\
    \n## 19.4 Creating Examples of the Class Person\n\nNew instances/objects (examples)\
    \ of the class `Person` can be created by using the name of the class and passing\
    \ in the values to be used for the parameters of the initialization method (with\
    \ the exception of the first parameter `self` which is provided automatically\
    \ by Python).\n\nFor example, the following creates two instances of the class\
    \ Person:\n\n```python\np1 = Person('John', 36)\np2 = Person('Phoebe', 21)\n```\n\
    \nThe variable `p1` holds a reference to the *instance or object* of the class\
    \ `Person` whose attributes hold the values 'John' (for the name attribute) and\
    \ 36 (for the age attribute). In turn the variable `p2` references an instance\
    \ of the class `Person` whose `name` and `age` attributes hold the values 'Phoebe'\
    \ and 21. Thus in memory we have:\n\nThe two variables reference separate *instances*\
    \ or examples of the class `Person`. They therefore respond to the same set of\
    \ methods/operations and have the same set of attributes (such as `name` and `age`);\
    \ however, they have their own values for those attributes (such as 'John' and\
    \ 'Phoebe').\n\nEach instance also has its own unique identifier—that shows that\
    \ even if the attribute values happen to be the same between two objects (for\
    \ example, there happen to be two people called John who are both 36); they are\
    \ still separate instances of the given class. This identifier can be accessed\
    \ using the `id()` function, for example:\n\n```python\nprint('id(p1):', id(p1))\n\
    print('id(p2):', id(p2))\n```\n\nWhen this code is run `p1` and `p2` will generate\
    \ different identifiers, for example:\n\n```\nid(p1): 4547191808\nid(p2): 4547191864\n\
    ```\n\nNote that actual number generated may vary from that above but should still\
    \ be unique (within your program).\n\n## 19.5 Be Careful with Assignment\n\nGiven\
    \ that in the above example, p1 and p2 reference different instances of the class\
    \ Person; what happens when p1 or p2 are assigned to another variable? That is,\
    \ what happens in this case:\n\n```python\np1 = Person('John', 36)\npx = p1\n\
    ```\n\nWhat does px reference? Actually, it makes a complete copy of the value\
    \ held by p1; however, p1 does not hold the instance of the class Person; it holds\
    \ the address of the object. It thus copies the address held in p1 into the variable\
    \ px. This means that both p1 and px now reference (point at) the same instance\
    \ in memory; we there have this:\n\nThis may not be obvious when you print p1\
    \ and px:\n\n```python\nprint(p1)\nprint(px)\n```\n\nAs this could just imply\
    \ that the object has been copied:\n\n```\nJohn is 36\nJohn is 36\n```\n\nHowever,\
    \ if we print the unique identifier for what is referenced by p1 and px then it\
    \ becomes clear that it is the same instance of class Person:\n\n```python\nprint('id(p1):',\
    \ id(p1))\nprint('id(px):', id(px))\n```\n\nwhich prints out\n\n```\nid(p1): 4326491864\n\
    id(px): 4326491864\n```\n\nAs can be seen the unique identifier is the same."
  mdcn: "## 18.6 延伸阅读\n\n如果你想更详细地探索本章介绍的一些概念，以下是一些在线参考资料：\n\n- [https://en.wikipedia.org/wiki/Object-oriented_programming](https://en.wikipedia.org/wiki/Object-oriented_programming)\
    \ 这是关于面向对象编程的维基百科条目，因此提供了该主题许多术语和历史的快速参考，并可作为其他参考资料的起点。\n- [https://dev.to/charanrajgolla/beginners-guide---object-oriented-programming](https://dev.to/charanrajgolla/beginners-guide---object-oriented-programming)\
    \ 该链接以轻松的方式介绍了面向对象中的四个概念，即抽象、继承、多态和封装。\n- [https://www.tutorialspoint.com/python/python_classes_objects.htm](https://www.tutorialspoint.com/python/python_classes_objects.htm)\
    \ Tutorials Point 上关于面向对象编程和 Python 的课程。\n\n## 第19章\nPython 类\n\n## 19.1 简介\n\n\
    > 在 Python 中，一切都是对象，因此都是某种类型或类事物的示例。例如，整数是 `int` 类的一个示例，实数是 `float` 类的示例，等等。在本章中，我们将探讨\
    \ Python 中的类是什么，它是如何定义的，如何创建类的实例，如何为类定义属性（数据）和方法（行为），并概述 Python 在实例创建和删除方面如何管理内存。\n\
    \n## 19.2 Python 与类\n\n如上所述，Python 中的一切都是对象！下图展示了 Python 中几种不同类型的情况：\n\n```python\n\
    print(type(4))\nprint(type(5.6))\nprint(type(True))\nprint(type('Natalia'))\n\
    print(type([1, 2, 3, 4]))\n```\n\n这会打印出一系列类，这些类定义了 Python 中什么是 `int`、`float` 或\
    \ `bool` 等：\n\n```\n<class 'int'>\n<class 'float'>\n<class 'bool'>\n<class 'str'>\n\
    <class 'list'>\n```\n\n也就是说，数字 4 是 `int` 类的一个示例或实例，代表了 Python 中整数的工作方式。同样，数字 5.6\
    \ 是 `float` 类（代表浮点数）的一个实例。值 `True` 是 `bool` 类的一个实例，字符串 'Natalia' 是 `str` 类（代表\
    \ Python 中的字符串）的一个实例。最后，`[1, 2, 3, 4]` 是一种称为列表的集合类型的一个实例（本书稍后会讨论）。\n\n然而，你不仅限于内置类型（也称为类）；也可以定义用户自定义类型（类）。这些可以用来创建你自己的数据结构、数据类型、应用程序等。\n\
    \n本章的剩余部分将考虑 Python 中用于创建用户自定义类的构造。\n\n## 19.3 类定义\n\n在 Python 中，类定义具有以下格式：\n\n\
    ```python\nclass nameOfClass(SuperClass):\n    __init__\n    attributes\n    methods\n\
    ```\n\n不过你应该注意，你可以在单个类中根据需要混合定义属性和方法的顺序。\n\n以下代码是一个类定义的示例：\n\n```python\nclass\
    \ Person:\n    def __init__(self, name, age):\n        self.name = name\n    \
    \    self.age = age\n```\n\n虽然这不是一个硬性规定，但通常会将类定义在以该类命名的文件中。例如，上面的代码将存储在名为 `Person.py`\
    \ 的文件中；这使得查找与类相关的代码更容易。下图使用 PyCharm IDE 展示了这一点：\n\n`Person` 类拥有两个*属性*（或实例变量），分别名为\
    \ *name* 和 *age*。\n\n还有一个名为 `__init__` 的特殊方法。这是该类的初始化器（也称为构造函数）。它指明了创建 `Person`\
    \ 类的实例时必须提供哪些数据，以及这些数据在内部如何存储。\n\n在这种情况下，创建 `Person` 类的实例时必须提供 *name* 和 *age*。\n\
    \n提供的值将存储在类的实例中（由*特殊*变量 `self` 表示），存储在实例变量/属性 `self.name` 和 `self.age` 中。注意，`__init__`\
    \ 方法的参数是*局部*变量，当方法终止时它们会消失，但 `self.name` 和 `self.age` 是实例变量，只要对象存在，它们就会存在。\n\n\
    让我们稍作思考一下特殊变量 `self`。这是传递给任何方法的第一个参数。然而，当调用一个方法时，我们不会自己为这个参数传递值；Python 会做这件事。它用于表示执行该方法的对象。这提供了方法运行的上下文，并允许方法访问对象持有的数据。因此，`self`\
    \ 就是对象本身。\n\n你可能也对 *method*（方法）这个术语感到好奇。方法是直接链接到 `Person` 类的行为的名称；它不是一个独立的函数，而是\
    \ `Person` 类定义的一部分。\n\n从历史上看，它源自 Smalltalk 语言；这种语言最初用于模拟一个生产工厂，方法代表了可用于模拟生产线变化的某种行为；因此它代表了一种进行更改的*方法*。\n\
    \n## 19.4 创建 Person 类的示例\n\n可以通过使用类的名称并传递用于初始化方法参数的值（第一个参数 `self` 除外，它由 Python\
    \ 自动提供）来创建 `Person` 类的新实例/对象（示例）。\n\n例如，以下代码创建了 `Person` 类的两个实例：\n\n```python\n\
    p1 = Person('John', 36)\np2 = Person('Phoebe', 21)\n```\n\n变量 `p1` 持有对 `Person`\
    \ 类的*实例或对象*的引用，其属性持有值 'John'（用于 name 属性）和 36（用于 age 属性）。同样，变量 `p2` 引用 `Person`\
    \ 类的一个实例，其 `name` 和 `age` 属性分别持有值 'Phoebe' 和 21。因此在内存中我们有：\n\n这两个变量引用了 `Person`\
    \ 类的两个独立*实例*或示例。因此，它们响应相同的方法/操作集，并具有相同的属性集（如 `name` 和 `age`）；然而，它们各自拥有这些属性的值（例如\
    \ 'John' 和 'Phoebe'）。\n\n每个实例还有一个唯一的标识符——这表明即使两个对象的属性值恰好相同（例如，恰好有两个都叫 John 且都是\
    \ 36 岁的人）；它们仍然是给定类的独立实例。可以使用 `id()` 函数访问此标识符，例如：\n\n```python\nprint('id(p1):',\
    \ id(p1))\nprint('id(p2):', id(p2))\n```\n\n运行此代码时，`p1` 和 `p2` 将生成不同的标识符，例如：\n\
