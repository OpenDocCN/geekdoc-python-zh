    This makes the programmer more productive, removes problems due to poor memory\
    \ management and, when implemented efficiently, can still provide acceptable performance.\n\
    \nPython therefore provides automatic memory management. Essentially, it allocates\
    \ a portion of memory as and when required. When memory is short, it looks for\
