  - '[PAGE 211]


    In the above listing the function `increment` initially adds 1 to whatever value
    has been passed to it. Then in the program this function is called with the value
    5 and the result returned by the function is printed. This will be the value 6.


    However, after this a second function, `reset_function()` is invoked. This function
    has a variable that is *local* to the function. That is, *normally* it would only
    be available within the function `reset_function`. This variable is called `addition`
    and has the value 50.


    The variable `addition` is, however, used within the function body of a new anonymous
    function definition. This function takes a number and adds the value of `addition`
    to that number and returns this as the result of the function. This new function
    is then assigned to the name `increment`. Note that to ensure we reference the
    *global* name `increment` we must use the keyword `global` (otherwise we will
    create a local variable that just happens to have the same name as the function).


    Now, when the second invocation of `increment` occurs, the `reset_function()`
    method has terminated and *normally* the variable `addition` would no longer even
    be in existence. However, when this program runs the value 55 is printed out from
    the second invocation of `increment`. That is the function being referenced by
    the name `increment`, when it is called the second time, is the one defined within
    `reset_function()` and which uses the variable `addition`.


    The actual output is shown below:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_211_0.png)


    So, what has happened here? It should be noted that the value 50 was not copied
    into the second function body. Rather it is a concrete example of the use of a
    reference environment with the closure concept. Python ensures that the variable
    `addition` is available to the function, even if the invocation of the function
    is somewhere different to where it was defined by binding any free variables (those
    defined outside the scope of the function) and storing them so that they can be
    accessed by the function''s context (in effect moving the variable from being
    a *local* variable to one which is available to the function anywhere; but only
    to the function).'
