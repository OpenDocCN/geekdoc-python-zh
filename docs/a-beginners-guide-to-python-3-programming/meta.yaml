  md: 'A closely related idea is that of *No Side Effects*. That is, a function should
    not have any side effects, it should base its operation purely on the values it
    receives, and its only impact should be the result returned. Any hidden side effects
    again makes software harder to maintain.


    Of course, within most applications there is a significant need for side effects;
    for example, any logging of the actions performed by a program has a side effect
    of updating some logged information somewhere (typically in a file), and any database
    updates will have some side effect (i.e., that of updating the database). In addition
    some behaviour is inherently non-RT; for example, a function which returns the
    *current* time can never be Referentially Transparent.


    However, for pure functions it is a useful consideration to follow.


