  md: "# 12.6 Returning Values from Functions\n\nIt is very common to want to return\
    \ a value from a function. In Python this can be done using the `return` statement.\
    \ Whenever a `return` statement is encountered within a function then that function\
    \ will terminate and return any values following the return keyword.\n\nThis means\
    \ that if a value is provided, then it will be made available to any calling code.\n\
    \nFor example, the following defines a simple function that squares whatever value\
    \ has been passed to it:\n\n```\ndef square(n):\n    return n * n\n```\n\nWhen\
    \ we call this function, it will multiply whatever it is given by itself and then\
    \ return that value. The returned value can then be used at the point that the\
    \ function was invoked, for example:\n\n```\n# Store result from square in a variable\n\
    result = square(4)\nprint(result)\n# Send the result from square immediately to\
    \ another function\nprint(square(5))\n# Use the result returned from square in\
    \ a conditional expression\nif square(3) < 15:\n    print('Still less than 15')\n\
    ```\n\nWhen this code is run, we get:\n\n```\n16\n25\nStill less than 15\n```\n\
    \nIt is also possible to return multiple values from a function; for example,\
    \ in this `swap` function the order in which the parameters are supplied is swapped\
    \ when they are returned:\n\n```\ndef swap(a, b):\n    return b, a\n```\n\nWe\
    \ can then assign the values returned to variables at the point when the function\
    \ is called:\n\n```\na = 2\nb = 3\nx, y = swap(a, b)\nprint(x, ',', y)\n```\n\n\
    which produces\n\n```\n3 , 2\n```"
