  md: '# Chapter 4

    A First Python Program


    # 4.1 Introduction


    In this chapter we will return to the Hello World program from the last chapter
    and look at what it is doing. We will also modify it to become more interactive
    and will explore the concept of Python variables. We will cover concepts such
    as naming conventions comments in code, and what as far as this book is concerned
    is the difference between a script and a program.


    # 4.2 Hello World


    As mentioned in the previous chapter, it is traditional to get started in a new
    programming language with writing a *Hello World* style program. This is very
    useful as it ensures that your environment, that is, the interpreter, any environmental
    settings, your editor (or IDE), etc. is all set up appropriately and can process
    (or compile) and execute (or run) your program. As the ‘Hello World’ program is
    about the simplest program in any language, you are doing this without the complexities
    of the actual language being used.


    Our ‘Hello World’ program has already been presented in the previous chapter of
    this book, however we will return to it here and take a closer look at what is
    going on.


    In Python the simplest version of the *Hello World* program merely prints out
    a string with the welcome message:


    ```

    print(''Hello World'')

    ```


    You can use any text editor or Integrated Development Editor (IDE) to create a
    Python file. Examples of editors commonly used with Python include Emacs, Vim,
    Notepad++, Sublime Text or Visual Studio Code; examples of IDEs for Python include
    PyCharm and Eclipse. Using any of these tools we can create file with a py'
  merge: -1
  pgno: 65
- img_proc: true
  md: 'extension. Such a file can contain one or more Python statements that represent
    a Python program or script.


    For example, we can create a file called `hello.py` containing the above `print()`
    function in it.


    One question this raises is where does the `print()` function come from?


    In fact, `print()` is a predefined function that can be used to *print things
    out*, for example to the user. The output is actually printed to what is known
    as the output stream. This handles a stream (sequence) of data such as letters
    and numbers. This output stream of data can be sent to an output window such as
    the terminal on a Mac or command window on a Windows PC. In this case we are printing
    the string ‘Hello World’.


    By predefined here we mean that it is *built into* the Python environment and
    is understood by the Python interpreter. This means that the interpreter knows
    where to find the definition of the `print()` function which tells it what to
    do when it encounters the `print()` function.


    You can of course write your own functions, and we will be looking at how to do
    that later in this book.


    The `print()` function actually tries to print whatever you give it,


    +   - When it is given a string it will print a string.

    - If it is given an integer such as 42 it will print 42.

    - If it is a given a real number such as 23.56 then it will print 23.56.


    Thus, when we run this program, the string ‘Hello World’ is printed out to the
    console window.


    Also note that the text forming the Hello World string is wrapped within two single
    quote characters; these characters delimit the start and end of the string; if
    you miss one of them out then there will be an error.


    To run the program, if you are using an IDE such as PyCharm, then you can click
    on the green arrow on the top right of the editor window (as long as the ‘Current
    File’ option is selected next to the arrow).


    If you are running it from the command line type in `python` followed by the name
    of the file, for example:


    ```

    > python hello.py

    ```


    This should be done in the directory where you created the file.


    # 4.3 Interactive Hello World


    Let us make our program a little more interesting; let’s get it to ask us our
    name and say hello to us personally.


    The updated program is now listed below:


    ```

    print(''Hello World'')

    ```'
