    \ with *debugging* the problem.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_301_0.png)\n\
    \nIn Python the terms error and exception are used inter-changeably; although\
    \ from a style point of view exceptions might be used to represent issues with\
    \ operations such as arithmetic exceptions and errors might be associated with\
    \ functional issues such as a file not being found.\n\n## 26.3 What is an Exception?\n\
    \nIn Python, everything is a type of object, including integers, strings, Booleans\
    \ and indeed exceptions and errors. In Python the Exception/Error types are defined\
    \ in a class hierarchy with the root of this hierarchy being the `BaseException`\
    \ type. All built-in errors and exceptions eventually extend from the `BaseException`\
    \ type. It has a subclass `Exception` which is the root of all user defined exceptions\
    \ (as well as many built-in exceptions). In turn `ArithmeticException` is the\
    \ base class for all built-in exceptions associated with arithmetic errors.\n\n\
    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_302_0.png)\n\nThe above diagram illustrates\
    \ the class hierarchy for some of the common types of errors and exceptions.\n\
    \nWhen an exception occurs, this is known as *raising* an exception and when it\
    \ is passed to code to handle this is known as *throwing* an exception. These\
    \ are terms that will hopefully become more obvious as this chapter progresses.\n\
    \n## 26.4 What is Exception Handling?\n\nAn exception moves the flow of control\
    \ from one place to another. In most situations, this is because a problem occurs\
    \ which cannot be handled locally but that can be handled in another part of the\
    \ system.\n\nThe problem is usually some sort of error (such as dividing by zero),\
    \ although it can be any problem (for example, identifying that the postcode specified\
    \ with an address does not match). The purpose of an exception, therefore, is\
    \ to handle an error condition when it happens at runtime.\n\nIt is worth considering\
    \ why you should wish to handle an exception; after all the system does not allow\
    \ an error to go unnoticed. For example, if we try to divide by zero, then the\
    \ system generates an error for you. This may mean that the user has entered an\
    \ incorrect value, and we do not want users to be presented with a dialog suggesting\
    \ that they enter the system debugger. We can therefore use exceptions to force\
    \ the user to correct the mistake and rerun the calculation.\n\nThe following\
    \ table illustrates terminology typically used with exception/error handling in\
    \ Python.\n\n| Exception | An error which is generated at runtime |\n| Raising\
    \ an exception | Generating a new exception |\n| Throwing an exception | Triggering\
    \ a generated exception |\n| Handling an exception | Processing code that deals\
    \ with the error |\n| Handler | The code that deals with the error (referred to\
    \ as the catch block) |\n| Signal | A particular type of exception (such as *out\
    \ of bounds* or *divide by zero*) |\n\nDifferent types of error produce different\
    \ types of exception. For example, if the error is caused by dividing an integer\
    \ by zero, then the exception is an *arithmetic* exception. The type of exception\
    \ is identified by objects and can be caught and processed by exception handlers.\
    \ Each handler can deal with exceptions associated with its class of error or\
    \ exception (and its subclasses).\n\nAn exception is instantiated when it is raised.\
    \ The system searches back up the execution stack (the set of functions or methods\
    \ that have been invoked in reverse order) until it finds a handler which can\
    \ deal with the exception. The associated handler then processes the exception.\
    \ This may involve performing some remedial action or terminating the current\
    \ execution in a controlled manner. In some cases, it may be possible to restart\
    \ executing the code.\n\nAs a handler can only deal with an exception of a specified\
    \ class (or subclass), an exception may pass through a number of handler blocks\
    \ before it finds one that can process it.\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_304_0.png)\n\
    \nThe above figure illustrates a situation in which a divide by zero exception\
    \ called `ZeroDivisionError` is raised. This exception is passed up the execution\
    \ stack where it encounters an exception handler defined for an end of file exception.\
    \ This handler cannot handle the `ZeroDivisionError` and so it is passed further\
    \ up the execution stack. It then encounters a handler for an out of memory exception.\
    \ Again, it cannot deal with a `ZeroDivisionError`, and the exception is passed\
    \ further up the execution stack until it finds a handler defined for the `ZeroDivisionError`.\
    \ This handler then processes the exception.\n\n## 26.5 Handling an Exception\n\
    \nYou can catch an exception by implementing the `try-except` construct. This\
    \ construct is broken into four parts:\n\n- `try` block. The `try` block indicates\
    \ the code which is to be monitored for the exceptions listed in the except expressions.\n\
    - `except` clause. You can use an optional `except` clause to indicate what to\
    \ do when certain classes of exception/error occur (e.g., resolve the problem\
    \ or generate a warning message). There can be any number of except clauses in\
    \ sequence checking for different types of error/exceptions.\n- `else` clause.\
    \ This is an optional clause which will be run if and only if no exception was\
    \ thrown in the try block. It is useful for code that must be executed if the\
    \ try clause does not raise an exception.\n- `finally` clause. The optional `finally`\
    \ clause runs after the `try` block exits (whether or not this is due to an exception\
    \ being raised). You can use it to clean up any resources, close files, etc.\n\
    \nThis language construct may at first seem confusing, however, once you have\
    \ worked with it for a while you will find it less daunting.\n\nAs an example,\
    \ consider the following function which divides a number by zero; this will raise\
    \ the `ZeroDivisionError` when it is run for any number:\n\n```\ndef runcalc(x):\n\
    \    x/0\n```\n\nIf we now call this function, we will get the error trackback\
    \ in the standard output:\n\n```\nruncalc(6)\n```\n\nThis is shown below:\n\n\
    ```\n/Library/Frameworks/Python.framework/Versions/3.7/bin/python3.7 /Users/Shared/workspaces/pycharm/python\n\
    Traceback (most recent call last):\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 67, in <module>\n    main()\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 39, in main\n    runcalc(0)\n  File \"/Users/Shared/workspaces/pycharm/pythonintro/exceptions/exceptions.py\"\
    , line 2, in runcalc\n    x / 0\nZeroDivisionError: division by zero\n```\n\n\
    However, we can handle this by wrapping the call to `runcalc` within a `try` statement\
    \ and providing an `except` clause. The syntax for a `try` statement with an `except`\
    \ clause is\n\n```\ntry:\n    <code to monitor>\nexcept <type of exception to\
    \ monitor for>:\n    <code to call if exception is found>\n```\n\nA concrete example\
    \ of this is given below for a `try` statement that will be used to monitor a\
    \ call to `runcalc`:\n\n```\ntry:\n    runcalc(6)\nexcept ZeroDivisionError:\n\
    \    print('oops')\n```\n\nwhich now results in the string 'oops' being printed\
    \ out. This is because when `runcalc` is called the '/' operator throws the `ZeroDivisionError`\
    \ which is passed back to the calling code which has an `except` clause specifying\
    \ this type of exception. This *catches* the exception and runs the associated\
    \ code block which in this case prints out the string 'oops'.\n\nIn fact, we don't\
    \ have to be as precise as this; the except clause can be given a class of exception\
    \ to look for and it will match any exception that is of that type or is an instance\
    \ of a subclass of the exception. We therefore can also write\n\n```\ntry:\n \
    \   runcalc(6)\nexcept Exception:\n```"
