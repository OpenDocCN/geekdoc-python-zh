  md: '# 45.3 Mistake #2: Case Sensitivity


    Python is a very case sensitive programming language. In Python a variable with
    the name My_Var is a completely different variable to one called my_var. As Python
    dynamically declares variables this can cause confusion and lead to unexpected
    bugs in programs.


    For example, in the following program two similarly named but completely different
    variables are declared:


    ```

    my_var = None

    print(my_var)

    My_Var = input(''Please input your name:'')

    print(my_var)

    ```


    When the program is run and the user enters the number 5, the output generated
    is


    ```

    None

    Please input your name: John

    None

    ```


    This is probably not what the programmer expected. The problem is that the program
    declares two variables. One is declared on line 1 and initialized with the value
    None. The second is declared on line 3 and is initialized with the string entered
    by the user. Whereas the programmer probably planned to reuse the first variable
    from line 1 in line 3!


    To solve this problem developers should take great care with how they name variables.
    In this case if the developer had followed the standard Python conventions as
    described by PEP 8—Style Guide for Python Code (note PEP actually stands for Python
    Enhancement Proposal), then they would have used lower case for all variable names
    and thus would have always referred to the variable as my_var.


