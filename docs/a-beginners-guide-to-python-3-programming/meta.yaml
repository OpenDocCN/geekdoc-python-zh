    We can now associate it with the `Bag` class; this can be done by assigning the
    function reference (in practice the function name) to an appropriate attribute
    on the `Bag` class. Since the `len` function expects a class to implement the
    `__len__()` method we can assign the `get_length()` function to the `__len__()`
    attribute. This effectively adds a *new* method to the `Bag` class with the signature
    `__len__(self)`:


    ```

    # Monkey patching

    Bag.__len__ = get_length

    ```


    Now when we invoke


    ```

    print(len(b))

    ```


    We get the value 3 being printed out.

    We have now Monkey Patched the class `Bag` so that the missing method becomes
    available.


    # 43.2.3 The Self Parameter


    One of the reasons that Monkey Patching works is because all methods receive the
    special first parameter (called `self` by convention) representing the object
    itself. This means that any function that treats the first parameter as being
    a reference to an object can potentially be used to define a method on a class.


    If a function does not assume that the first parameter is a reference to an object
    (the one holding the method) then it cannot be used to add new functionality to
    a class.'
