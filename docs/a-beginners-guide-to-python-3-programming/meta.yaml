  md: '# 19.3 Class Definitions


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_228_0.png)


    The Person class possesses two *attributes* (or instance variables) called *name*
    and *age*.


    There is also a special method defined called `__init__`. This is an initializer
    (also known as a constructor) for the class. It indicates what data must be supplied
    when an instance of the `Person` class is created and how that data is stored
    internally.


    In this case a *name* and an *age* must be supplied when an instance of the `Person`
    class is created.


    The values supplied will then be stored within an instance of the class (represented
    by the *special* variable `self`) in instance variables/attributes `self.name`
    and `self.age`. Note that the parameters to the `__init__` method are *local*
    variables and will disappear when the method terminates, but `self.name` and `self.age`
    are instance variables and will exist for as long as the object is available.


    Let us look for a moment at the special variable `self`. This is the first parameter
    passed into any method. However, when a method is called we do not pass a value
    for this parameter ourselves; Python does. It is used to represent the object
    within which the method is executing. This provides the context within which the
    method runs and allows the method to access the data held by the object. Thus
    `self` is the object itself.


    You may also be wondering about that term *method*. A method is the name given
    to behaviour that is linked directly to the `Person` class; it is not a free-standing
    function rather it is part of the definition of the class `Person`.


    Historically, it comes from the language Smalltalk; this language was first used
    to simulate a production plant and a method represented some behaviour that could
    be used to simulate a change in the production line; it therefore represented
    a *method* for making a change.'
