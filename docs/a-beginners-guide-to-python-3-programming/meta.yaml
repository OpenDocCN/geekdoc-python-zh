    \ can call the `search` function on the child nodes of the current node. If the\
    \ current node has no children we just return without a result.\nThe pseudo code\
    \ for this might look like:\n\n```\nsearch(value_to_find, current_node):\n   \
    \ If current_node.value == value_to_find:\n        print('value found:', current_node.value)\n\
    \    Else If current.node.has_children:\n        search(value, current_node.left)\n\
    \        search(value, current_node.right)\n```\n\nThis illustrates how easy it\
    \ is to write a recursive function that can solve what might at first appear to\
    \ be a complex problem.\n\n# 10.5 Recursion in Python\n\nMost computer programs\
    \ support the idea of recursion and Python is no exception. In Python it is perfectly\
    \ legal to have a function that calls itself (that is within the body of the function\
    \ a call is made to the same function). When the function is executed it will\
    \ therefore call itself."
  - "[PAGE 141]\n\nIn Python we can write a recursive function such as:\n\n```\ndef\
    \ recursive_function():\n    print('calling recursive_function')\n    recursive_function()\n\
    ```\n\nHere the function `recursive_function()` is defined such that it prints\
    \ out a message and then calls itself. Note that no special syntax is required\
    \ for this as a function does not need to have been completely defined before\
    \ it is used.\nOf course in the case of `recursive_function()` this will result\
    \ in infinite recursion as there is no termination condition. However, this will\
    \ only become apparent at runtime when Python will eventually generate an error:\n\
    \n```\nTraceback (most recent call last):\n  File \"recursion_example.py\", line\
    \ 5, in <module>\nRecursionError: maximum recursion depth exceeded while calling\
    \ a Python object\n```\n\nHowever, as already mentioned a recursive function should\
    \ have a *recursive* part and a *termination* or base case part. The termination\
    \ condition is used to identify when the base case applies. We should therefore\
    \ add a condition to identify the termination scenario and what the base case\
    \ behaviour is. We will do this in the following section as we look at how a factorial\
    \ for a number can be generated recursively.\n\n# 10.6 Calculating Factorial Recursively\n\
    \nWe have already seen how to create a program that can calculate the factorial\
    \ of a number using iteration as one of the exercises in the last chapter; now\
    \ we will create an alternative implementation that uses recursion instead.\n\
    Recall that the factorial of a number is the result of multiplying that number\
    \ by each of the integer values up to that number, for example, to find the factorial\
    \ of the number 5 (written as 5!) we can multiple 1 * 2 * 3 * 4 *5 which will\
    \ generate the number 120.\nWe can create a recursive solution to the Factorial\
    \ problem by defining a function that takes an integer to generate the factorial\
    \ number for. This function will return the value 1 if the number passed in is\
    \ 1—this is the base case. Otherwise it will multiple the value passed in to it\
    \ with the result of calling itself (the `factorial()` function) with n – 1 which\
    \ is the recursive part.\nThe function is given below:\n\n```\ndef factorial(n):\n\
    \    if n == 1: # The termination condition\n        return 1 # The base case\n\
    \    else:\n        res = n * factorial(n-1) # The recursive call\n```"
  - "[PAGE 142]\n\n# 10.6 Calculating Factorial Recursively\n\n```\nreturn res\nprint(factorial(5))\n\
    ```\n\nThe key to understanding this function is that it has:\n\n+   1. A termination\
    \ condition that is guaranteed to execute when the value of n is 1. This is the\
    \ base case; we cannot reduce the problem down any further as the factorial of\
    \ 1 is 1!\n2. The function recursively calls itself but with n − 1 as the argument;\
    \ this means each time it calls itself the value of n is smaller. Thus the value\
    \ returned from this call is the result of a smaller computation.\n\nTo clarify\
    \ how this works we can add some print statements (and a depth indicator) to the\
    \ function to indicate its behaviour:\n\n```\ndef factorial(n, depth = 1):\n \
    \   if n == 1:\n        print('\\t' * depth, 'Returning 1')\n        return 1\n\
    \    else:\n        print('\\t'*depth,'Recursively calling factorial(',n-1,')')\n\
    \        result = n * factorial(n-1, depth + 1)\n        print('\\t' * depth,\
    \ 'Returning:', result)\n        return result\n\nprint('Calling factorial( 5\
    \ )')\nprint(factorial(5))\n```\n\nWhen we run this version of the program then\
    \ the output is:\n\n```\nCalling factorial( 5 )\n    Recursively calling factorial(\
    \ 4 )\n        Recursively calling factorial( 3 )\n            Recursively calling\
    \ factorial( 2 )\n                Recursively calling factorial( 1 )\n       \
    \         Returning 1\n            Returning: 2\n        Returning: 6\n    Returning:\
    \ 24\nReturning: 120\n120\n```\n\nNote that the depth parameter is used merely\
    \ to provide some indentation to the print statements.\n\nFrom the output we can\
    \ see that each call to the factorial program results in a simpler calculation\
    \ until the point where we are asking for the value of 1! which is 1. This is\
    \ returned as the result of calling factorial(1). This result is multiplied with\
    \ the value of n prior to that; which was 2. The causes factorial(2) to return\
    \ the value 2 and so on."
- md: "## 10.7 Disadvantages of Recursion\n\nAlthough recursion can be a very expressive\
    \ way to define how a problem can be solved, it is not as efficient as iteration.\
    \ This is because a function call is more expensive for Python to process than\
    \ a `for` loop. In part this is because of the infrastructure that goes along\
    \ with a function call; that is the need to set up the stack for each separate\
    \ function invocation so that all local variables are independent of any other\
    \ call to that function. It is also related to the associated unwinding of the\
    \ stack when a function returns. However, it is also affected by the increasing\
    \ amount of memory each recursive call must use to store all the data on the stack.\n\
    \nIn some languages optimizations are possible to improve the performance of a\
    \ recursive solution. One typical example relates to a type of recursion known\
    \ as *tail recursion*. A tail recursive solution is one in which the calculation\
    \ is performed before the recursive call. The result is then passed to the recursive\
    \ step, which results in the last statement in the function just calling the recursive\
    \ function.\n\nIn such situations the recursive solution can be expressed (internally\
    \ to the computer system) as an iterative problem. That is the programmer writes\
    \ the solution as a recursive algorithm but the interpreter or compiler converts\
    \ it into an iterative solution. This allows programmers to benefit from the expressive\
    \ nature of recursion while also benefiting from the performance of an iterative\
    \ solution.\n\nYou might think that the `factorial` function presented earlier\
    \ is tail recursive; however it is not because the last statement in the function\
    \ performs a calculation that multiplies `n` by the result of the recursive call.\n\
    \nHowever, we can refactor the `factorial` function to be tail recursive. This\
    \ version of the `factorial` function passes the evolving result along via the\
    \ accumulator parameter. It is given for reference here:\n\n```\ndef tail_factorial(n,\
    \ accumulator=1):\n    if n == 0:\n        return accumulator\n    else:\n   \
    \     return tail_factorial(n - 1, accumulator * n)\n\nprint(tail_factorial(5))\n\
    ```\n\nHowever, it should be noted that Python currently *does not* perform tail\
    \ recursion optimization; so this is purely a theoretical exercise.\n\n## 10.8\
    \ Online Resources\n\nThe following provides some references on recursion available\
    \ online:\n\n- https://en.wikipedia.org/wiki/Recursion_(computer_science) Provides\
    \ Wikipedia's introduction to recursion.\n- https://www.sparknotes.com/cs/recursion/whatisrecursion/section1/\
    \ Provides an introduction to the concept of recursion.\n\n## 10.9 Exercises\n\
    \nIn this set of exercises you will get the chance to explore how to solve problems\
    \ using recursion in Python.\n\n1. Write a program to determine if a given number\
    \ is a *Prime Number* or not. Use recursion to implement the solution. The following\
    \ code snippet illustrates how this might work:\n\n```\nprint('is_prime(3):',\
    \ is_prime(3)) # True\nprint('is_prime(7):', is_prime(7)) # True\nprint('is_prime(9):',\
    \ is_prime(9)) # False\nprint('is_prime(31):', is_prime(31)) # True\n```\n\n2.\
    \ Write a function which implements Pascal's triangle for a specified number of\
    \ rows. Pascal's triangle is a triangle of the binomial coefficients. The values\
    \ held in the triangle are generated as follows: In row 0 (the topmost row), there\
    \ is a unique nonzero entry 1. Each entry of each subsequent row is constructed\
    \ by adding the number above and to the left with the number above and to the\
    \ right, treating blank entries as 0. For example, the initial number in the first\
    \ (or any other) row is 1 (the sum of 0 and 1), whereas the numbers 1 and 3 in\
    \ the third row are added together to generate the number 4 in the fourth row.\
    \ An example of Pascal's triangle for 4 rows is given below:\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_144_0.png)\n\
    \nFor example, your function might be called `pascals_triangle()` in which case\
    \ the following application illustrates how you might use it:\n\n```\ntriangle\
    \ = pascals_triangle(5)\nfor row in triangle:\n    print(row)\n```\n\nThe output\
    \ from this might be:\n\n```\n[1]\n[1, 1]\n[1, 2, 1]\n[1, 3, 3, 1]\n[1, 4, 6,\
    \ 4, 1]\n```\n\n# Chapter 11\nIntroduction to Structured Analysis\n\n## 11.1 Introduction\n\
    \nIn the preceding chapters what we have seen is typical of the procedural approach\
    \ to programming. In the next chapter we will begin to explore the definition\
    \ of functions which allow a more modular style of programming. In this chapter\
    \ we will introduce an approach to the analysis and design of software systems\
    \ called structured analysis/design. Within this area there are many specific\
    \ and well-documented methods including Structured Systems Analysis and Design\
    \ Method (SSADM) and the Yourden structured method. However, we will not focus\
    \ on any one specific approach; instead we will outline the key ideas and the\
    \ two basic elements of most structured analysis methods: functional decomposition\
    \ and data flow analysis. We will then present flowcharts for designing algorithms.\n\
    \n## 11.2 Structured Analysis and Function Identification\n\nThe structured analysis\
    \ methods typically employ a process-driven approach (with a set of prescribed\
    \ steps or stages) which in one way or another consider what the inputs and outputs\
    \ of the system are and how those inputs are transformed into the outputs. This\
    \ transformation involves the application of one or more functions. The steps\
    \ involved in structured analysis identify these functions and will typically\
    \ iteratively break them down into smaller and smaller functions until an appropriate\
    \ level of detail has been reached. This process is known as functional decomposition.\
    \ Although simple Python programs may only contain a sequence of statements and\
    \ expressions, any program of a significant size will need to be structured such\
    \ that it can be:\n\n- understood easily by other developers,\n- tested to ensure\
    \ that it does what is intended,\n- maintained as new and existing requirements\
    \ evolve,\n- debugged to resolve unexpected or undesirable behaviour.\n\nGiven\
    \ these requirements it is common to want to organize your Python program in terms\
    \ of functions and sub functions. Functional decomposition supports the analysis\
    \ and identification of these functions.\n\n## 11.3 Functional Decomposition\n\
    \nFunctional decomposition is one way in which a system can be broken down into\
    \ its constituent parts. For example, for a computer payroll system to calculate\
    \ how much an hourly paid employee should receive it might be necessary to:\n\n\
    1. load the employee's details from some form of permanent storage (such as a\
    \ file or a database),\n2. load how many hours the employee has worked for that\
    \ week (possibly from another system that records the number of hours worked),\n\
    3. multiply the hours worked by the employee's hourly rate,\n4. record how much\
    \ the employee is to be paid in a payroll database or file,\n5. print out the\
    \ employee's pay slip,\n6. transfer the appropriate funds from the company's bank\
    \ account to the employee's bank account,\n7. record in the payroll database that\
    \ everything has been completed.\n\nEach of the above steps could represent a\
    \ function performed by the system. These top-level functions could themselves\
    \ be broken down into lower-level functions. For example, printing out the employee's\
    \ payroll slip may involve printing their name and address in a particular format,\
    \ printing the employee number, social security number, etc., as well as printing\
    \ historical information such as how much they have been paid in the current financial\
    \ year, how much tax they have paid, all in addition to printing the actual amount\
    \ they are being paid. This process of breaking down higher-level functions into\
    \ lower-level functions helps with:\n\n- testing the system (functions can be\
    \ tested in isolation),\n- understanding the system as the organization of the\
    \ functions can give meaning to the code, as well as allowing each function to\
    \ be understood in isolation from the rest of the system,\n- maintaining the system\
    \ as only those functions that need to be changed may be affected by new or modified\
    \ requirements,\n- debugging the system as issues can be isolated to specific\
    \ functions which can be examined independently of the rest of the application."
  mdcn: "## 10.7 递归的缺点\n\n虽然递归可以是一种非常富有表现力的方式来定义如何解决问题，但它的效率不如迭代。这是因为对于 Python 来说，处理函数调用比处理\
    \ `for` 循环的开销更大。部分原因在于函数调用所伴随的基础设施；即需要为每次独立的函数调用设置栈，以确保所有局部变量都独立于对该函数的任何其他调用。这也与函数返回时相关的栈展开有关。然而，它还受到每次递归调用必须使用越来越多的内存来存储栈上所有数据的影响。\n\
    \n在某些语言中，可以通过优化来提高递归解决方案的性能。一个典型的例子涉及一种称为*尾递归*的递归类型。尾递归解决方案是指在递归调用之前执行计算。然后将结果传递给递归步骤，这导致函数中的最后一条语句只是调用递归函数。\n\
    \n在这种情况下，递归解决方案可以在计算机系统内部表示为迭代问题。也就是说，程序员将解决方案编写为递归算法，但解释器或编译器将其转换为迭代解决方案。这使得程序员既能受益于递归的表达能力，又能受益于迭代解决方案的性能。\n\
    \n你可能认为前面介绍的 `factorial` 函数是尾递归的；然而它不是，因为函数中的最后一条语句执行了一个将 `n` 乘以递归调用结果的计算。\n\n\
    然而，我们可以重构 `factorial` 函数使其成为尾递归的。这个版本的 `factorial` 函数通过累加器参数传递不断变化的结果。此处仅供参考：\n\
    \n```\ndef tail_factorial(n, accumulator=1):\n    if n == 0:\n        return accumulator\n\
    \    else:\n        return tail_factorial(n - 1, accumulator * n)\n\nprint(tail_factorial(5))\n\
    ```\n\n但是，应该注意的是，Python 目前*不*执行尾递归优化；所以这纯粹是一个理论练习。\n\n## 10.8 在线资源\n\n以下提供了一些关于递归的在线参考资源：\n\
    \n- https://en.wikipedia.org/wiki/Recursion_(computer_science) 提供了维基百科对递归的介绍。\n\
    - https://www.sparknotes.com/cs/recursion/whatisrecursion/section1/ 提供了递归概念的介绍。\n\
    \n## 10.9 练习\n\n在这组练习中，你将有机会探索如何在 Python 中使用递归来解决问题。\n\n1.  编写一个程序来判断给定的数字是否是*质数*。使用递归来实现解决方案。以下代码片段展示了这可能如何工作：\n\
    \n```\nprint('is_prime(3):', is_prime(3)) # True\nprint('is_prime(7):', is_prime(7))\
    \ # True\nprint('is_prime(9):', is_prime(9)) # False\nprint('is_prime(31):', is_prime(31))\
    \ # True\n```\n\n2.  编写一个函数，为指定的行数实现帕斯卡三角形。帕斯卡三角形是一个二项式系数的三角形。三角形中保存的值按如下方式生成：在第\
    \ 0 行（最顶行），有一个唯一的非零条目 1。每一行的每个条目都是通过将左上方和右上方的数字相加来构建的，将空白条目视为 0。例如，第一行（或任何其他行）的初始数字是\
    \ 1（0 和 1 的和），而第三行中的数字 1 和 3 相加生成第四行中的数字 4。下面是一个 4 行帕斯卡三角形的示例：\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_144_0.png)\n\
    \n例如，你的函数可能被命名为 `pascals_triangle()`，在这种情况下，以下应用展示了你可能如何使用它：\n\n```\ntriangle\
    \ = pascals_triangle(5)\nfor row in triangle:\n    print(row)\n```\n\n这可能的输出是：\n\
    \n```\n[1]\n[1, 1]\n[1, 2, 1]\n[1, 3, 3, 1]\n[1, 4, 6, 4, 1]\n```\n\n# 第 11 章\n\
    结构化分析简介\n\n## 11.1 引言\n\n在前面的章节中，我们看到的是过程式编程方法的典型特征。在下一章，我们将开始探索函数的定义，这允许更模块化的编程风格。在本章中，我们将介绍一种称为结构化分析/设计的软件系统分析和设计方法。在这个领域有许多具体且文档完善的方法，包括结构化系统分析和设计方法（SSADM）和\
    \ Yourden 结构化方法。然而，我们将不专注于任何一种特定的方法；相反，我们将概述大多数结构化分析方法的关键思想和两个基本要素：功能分解和数据流分析。然后我们将介绍用于设计算法的流程图。\n\
    \n## 11.2 结构化分析与功能识别\n\n结构化分析方法通常采用过程驱动的方法（具有一组规定的步骤或阶段），这些步骤或阶段以某种方式考虑系统的输入和输出，以及这些输入如何被转换为输出。这种转换涉及一个或多个函数的应用。结构化分析中涉及的步骤会识别这些函数，并通常会迭代地将它们分解为越来越小的函数，直到达到适当的详细程度。这个过程被称为功能分解。虽然简单的\
    \ Python 程序可能只包含一系列语句和表达式，但任何具有一定规模的程序都需要被结构化，以便能够：\n\n-   被其他开发人员轻松理解，\n-   被测试以确保其按预期工作，\n\
    -   随着新的和现有需求的发展而被维护，\n-   被调试以解决意外或不良行为。\n\n鉴于这些需求，通常希望以函数和子函数的形式组织你的 Python\
    \ 程序。功能分解支持对这些函数的分析和识别。\n\n## 11.3 功能分解\n\n功能分解是将系统分解为其组成部分的一种方式。例如，对于一个计算机工资系统，要计算小时工应得的报酬，可能需要：\n\
    \n1.  从某种形式的永久存储（如文件或数据库）加载员工的详细信息，\n2.  加载该员工当周工作的小时数（可能来自另一个记录工作小时数的系统），\n3.\
    \  将工作小时数乘以员工的小时费率，\n4.  在工资数据库或文件中记录员工应得的金额，\n5.  打印员工的工资单，\n6.  将相应的资金从公司银行账户转移到员工的银行账户，\n\
    7.  在工资数据库中记录所有操作已完成。\n\n上述每个步骤都可能代表系统执行的一个功能。这些顶层功能本身可以分解为更底层的功能。例如，打印员工的工资单可能涉及以特定格式打印他们的姓名和地址，打印员工编号、社会保障号码等，以及打印历史信息，例如他们在当前财政年度的工资总额、他们缴纳了多少税款，所有这些都加上打印他们实际获得的金额。这种将高层功能分解为低层功能的过程有助于：\n\
    \n-   测试系统（函数可以单独测试），\n-   理解系统，因为函数的组织可以赋予代码意义，并允许每个函数独立于系统的其余部分被理解，\n-   维护系统，因为只有那些需要更改的函数可能会受到新的或修改后的需求的影响，\n\
    -   调试系统，因为问题可以被隔离到特定的函数，这些函数可以独立于应用程序的其余部分进行检查。"
