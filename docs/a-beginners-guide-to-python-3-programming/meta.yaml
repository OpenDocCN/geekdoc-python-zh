  - "[PAGE 177]\n\nIndicating that we have referenced max before it was assigned a\
    \ value—even though it was assigned a value globally before the function was called!\n\
    \nWhy does it do this? To protect us from ourselves—Python is really saying ‘Do\
    \ you really want to modify a global variable here?’. Instead it is treating max\
    \ as a local variable, and as such it is being referenced before a value has been\
    \ assigned to it.\n\nTo tell Python that we know what we are doing and that we\
    \ want to reference the global variable at this point we need to use the keyword\
    \ `global` with the name of the variable. For example:\n\n```\nmax = 100\ndef\
    \ print_max():\n    global max\n    max = max + 1\n    print(max)\n\nprint_max()\n\
    print(max)\n```\n\nNow when we try to update the variable `max` inside the function\
    \ `print_max()`, Python knows we mean the `global` version of the variable and\
    \ uses that one. The result is that we now print out the value 101, and `max`\
    \ is updated to 101 for everyone everywhere!\n\n# 13.4 Nonlocal Variables\n\n\
    It is possible to define functions inside other functions, and this can be very\
    \ useful when we are working with collections of data and operations such as `map()`\
    \ (which map a function to all the elements of a collection of data).\n\nHowever,\
    \ local variables are local to a specific function; even functions defined within\
    \ another function cannot modify the outer function’s local variable (as the inner\
    \ function is a separate function). They can reference it, just as we could reference\
    \ the global variable earlier; the issue is again modification.\n\nThe `global`\
    \ keyword is no help here as the outer function’s variables are not global, they\
    \ are local to a function.\n\nFor example, if we define a nested function (`inner`)\
    \ inside the parent outer function (`outer`) and want the inner function to modify\
    \ the local field we have a problem:\n\n```\ndef outer():\n    title = 'original\
    \ title'\n\n    def inner():\n        title = 'another title'\n```"
