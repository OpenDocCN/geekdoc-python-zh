  md: "# 13.4 Nonlocal Variables\n\n```\nprint('inner:', title)\n\ninner()\n\nprint('outer:',\
    \ title)\n\nouter()\n```\n\nIn this example both `outer()` and `inner()` functions\
    \ modify the `title` variable. However, they are not the same `title` variable\
