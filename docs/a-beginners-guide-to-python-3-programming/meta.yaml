    ```\n\n这是一个将4和5相加并产生值9的表达式。\n\n## 4.8 代码中的注释\n\n在代码中添加注释是一种常见的做法（尽管并非普遍如此），以帮助任何阅读代码的人理解代码的作用、其意图、程序员所做的任何设计决策等。\n\
