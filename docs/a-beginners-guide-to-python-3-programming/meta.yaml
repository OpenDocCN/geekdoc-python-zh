    # 5.8 String Templates


    An alternative to using string formatting is to use string *templates*. These
    were introduced into Python 2.4 as a simpler, less error prone, solution to most
    string formatting requirements.


    A string template is a class (type of thing) that is created via the `string.Template()`
    function. The template contains one or more *named* variables preceded with a
    $ symbol. The template can then be used with a set of values that replace the
    template variables with actual values.


    For example:


