- md: "We can update the `Person` class with some getter methods and a single setter\
    \ method:\n\n```python\nclass Person:\n    def __init__(self, name, age):\n  \
    \      self._name = name\n        self._age = age\n\n    def get_age(self):\n\
    \        return self._age\n\n    def set_age(self, new_age):\n        if isinstance(new_age,\
    \ int) & new_age > 0 & new_age < 120:\n            self._age = new_age\n\n   \
    \ def get_name(self):\n        return self._name\n\n    def __str__(self):\n \
    \       return 'Person[' + str(self._name) + '] is ' + str(self._age)\n```\n\n\
    The two getter methods have the format of `get_` followed by the name of the attribute\
    \ they are getting. Thus, we have `get_age` and `get_name`. Typically, all that\
    \ getters do is to return the attribute being used (as is the case here).\n\n\
    The single setter method is a little different; it validates the data that has\
    \ been provided to check that it is appropriate (i.e., that it is an Integer using\
    \ `isinstance(new_age, int)` and that it is a value over zero but under 120).\
    \ Only if the data passes these checks is it used as the new value of the person's\
    \ age, for example if we try to set a person's age to -1:\n\n```python\nperson\
    \ = Person('John', 54)\nperson.set_age(-1)\nprint(person)\n```\n\nThen this is\
    \ ignored, and the person's age remains as it was, thus the output of this is:\n\
    \n```\nPerson[John] is 54\n```\n\nIt should be noted that this might be considered\
    \ *silent failure*; that is we tried to set the `age` and it failed but no one\
    \ knows this. In many cases rather than fail silently we would prefer to notify\
    \ someone of the error by throwing some form of Error object; this will be discussed\
    \ in the next chapter on Error and Exception handling.\n\nYou might well ask at\
    \ this point where is the setter for the `_name` attribute? The answer is that\
    \ we want to make the `_name` attribute a *read only* attribute and therefore\
    \ we have not provided a setter style method. This is a common idiom followed\
    \ in Python—you can have read–write attributes and read-only attributes depending\
    \ on whether they have getter and setter methods or not. It is also possible to\
    \ have a *write-only* attribute, but this is very rare and only has a few use\
    \ cases.\n\n## 24.4 Public Interface to Properties\n\nAlthough we now have a more\
    \ formal interface to the attributes held by an instance of the class Person;\
    \ it is rather ungainly:\n\n```python\nperson = Person('John', 54)\nprint(person)\n\
    print(person.get_age())\nprint(person.get_name())\n```\n\nWe end up having to\
    \ write more code and although there is an argument that it makes the code more\
    \ obvious (i.e., person.get_age() can be read as get the age of the person object);\
    \ it is somewhat verbose and you have to remember to include the parentheses ('()').\n\
    \nTo get around this a concept known as Properties was introduced in Python 2.2.\
    \ In the original syntax for this it was possible to add an additional line of\
    \ code to the class that told Python that you wanted to provide a new property\
    \ and that specific methods were to be used to set and get the values of this\
    \ property.\n\nThe syntax for defining a property in this way is:\n\n```\n<property_name>\
    \ = property(fget=None, fset=None, fdel=None, doc=None)\n```\n\nWhere fget indicates\
    \ the getter function, fset the setter function, fdel the function to be used\
    \ to delete a value and doc provides documentation on the property.\n\nWe can\
    \ modify our Person class so that age is now a property (note a common convention\
    \ is that if the attribute is named _age, the methods are named get_age and set_age\
    \ and the property will be called age):\n\n```python\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self._name = name\n        self._age = age\n\n    def get_age(self):\n\
    \        return self._age\n\n    def set_age(self, new_age):\n        if isinstance(new_age,\
    \ int) & new_age > 0 & new_age < 120:\n            self._age = new_age\n\n   \
    \ age = property(get_age, set_age, doc=\"An age property\")\n\n    def get_name(self):\n\
    \        return self._name\n\n    name = property(get_name, doc=\"A name property\"\
    )\n\n    def __str__(self):\n        return 'Person[' + str(self._name) + '] is\
    \ ' + str(self._age)\n```\n\nWe can now write:\n\n```python\nperson = Person('John',\
    \ 54)\nprint(person)\nprint(person.age)\nprint(person.name)\nperson.age = 21\n\
    print(person)\n```\n\nNotice how we can now write `person.age` and `person.age\
    \ = 21`; in both these cases we are accessing the *property* age that results\
    \ in the method `get_age()` and `set_age()` being executed respectively. Thus,\
    \ the setter is still protecting the update to the underlying `_age` attribute\
    \ that is actually used to hold the actual value.\n\nAlso note that if a method\
    \ is not provided for one of the `fget`, `fset`, `fdel` methods then this is not\
    \ an error; it merely indicates that the property does not support that type of\
    \ accessor. Thus, the *name* property is a *read_only* property as it does not\
    \ define a setter method.\n\nA delete method can be used to release the memory\
    \ associated with an attribute; in the case of an `int` it is not required but\
    \ it may be required for a more complex, user-defined type.\n\nWe could therefore\
    \ write:\n\n```python\ndef del_name(self):\n    del self._name\nname = property(get_name,\
    \ fdel=del_name, doc=\"A name property\")\n```\n\nNote that we are using a keyword\
    \ reference for the delete method as we have skipped the setter and cannot therefore\
    \ rely on positional arguments.\n\n## 24.5 More Concise Property Definitions\n\
    \nThe example shown in the previous section works but it is still quite verbose\
    \ itself; while this is on the class writers' side it still seems somewhat heavyweight.\n\
    \nTo overcome this a more concise option has been available since Python 2.4.\
    \ This approach uses what are known as decorators. Decorators represent meta data\
    \ (that is information about your code that the Python interpreter can use to\
    \ work out what you want it to do with certain things).\n\nPython 2.6 introduced\
    \ three new decorators `@property`, `@<propertyname>.setter` and `@<propertyname>.deleter`.\
    \ These decorators are added to the start of a method definition to indicate that\
    \ the method should be used to provide access to a property (and define that property),\
    \ define a setter for the property or a deleter for the property.\n\nWe will now\
    \ update our Person class to use the decorators:\n\n```python\nclass Person:\n\
    \    def __init__(self, name, age):\n        self._name = name\n        self._age\
    \ = age\n\n    @property\n    def age(self):\n        \"\"\" The docstring for\
    \ the age property \"\"\"\n        print('In age method')\n        return self._age\n\
    \n    @age.setter\n    def age(self, value):\n        print('In set_age method')\n\
    \        if isinstance(value, int) & value > 0 & value < 120:\n            self._age\
    \ = value\n\n    @property\n    def name(self):\n        print('In name')\n  \
    \      return self._name\n\n    @name.deleter\n    def name(self):\n        del\
    \ self._name\n\n    def __str__(self):\n        return 'Person[' + str(self._name)\
    \ + '] is ' + str(self._age)\n```\n\nNotice three important things about this\
    \ example:\n\n- The name of the methods is no longer a set_age and get_age; instead\
    \ both methods are now just age and the decorator distinguishes their role. Also\
    \ notice that we no longer have a separate statement that declares the property—it\
    \ is now implicit in the use of the @property decorator and the name of the associated\
    \ method.\n- The @property decorator is used to define the name of the property\
    \ (in this case age) and to define further decorators which will be named after\
    \ the property with a .setter or .deleter element e.g. @age.setter.\n- The documentation\
    \ string is now defined in the method associated with the @property decorator\
    \ (providing this documentation string is usually considered good practice).\n\
    \nHowever, we do not need to change the program that used the class Person, as\
    \ the interface to the class remained the same.\n\n## 24.6 Online Resources\n\n\
    Some online resources on properties are:\n\n- https://www.python-course.eu/python3_properties.php\
