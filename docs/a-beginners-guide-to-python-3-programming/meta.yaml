  md: '# 11.4 Functional Flow


    Although the decomposition hierarchy presented in the functional decomposition
    diagram illustrates the functions and their hierarchical relationships, it does
    not capture how the data flows between the functions or the order in which the
    functions are invoked.


    There are several approaches to describing the interactions between the functions
    identified by functional decomposition including the use of pseudo-code, data
    flow diagrams and sequence diagrams:


    +   - **Pseudo-code.** This is a form of structured English that is not tied to
    any particular programming language but which can be used to express simple ideas
    including conditional choices (similar to if statements) and iteration (as typified
    by looping constructs). However, as it is a pseudo-language, developers are not
    tied to a specific syntax and can include functions without the need to define
    those functions in detail.

    - **Data Flow Diagrams.** These diagrams are used to chart the inputs, processes
    and outputs of the functions in a structured graphical form. A data flow diagram
    typically has no control flow; there are no decision rules and no loops. For each
    data flow, there must be at least one input and one end point. Each process (function)
    can be refined by another lower-level data flow diagram, which subdivides this
    process into sub-processes.

    - **Sequence Diagrams.** These are used to represent interactions between different
    entities (or objects) in sequence. The functions invoked are represented as being
    called from one entity to another. Sequence diagrams are more typically used with
    object-oriented systems.


    # 11.5 Data Flow Diagrams


    A data flow diagram consists of a set of inputs and outputs, processes (functions),
    flows, data stores (also known as warehouses) and terminators.


    +   - **Process.** This is the process (or function or transformation) that converts
    inputs into outputs. The name of the process should be descriptive indicating
    what it does.

    - **Data Flow.** The flow indicates the transfer of data/information from one
    element to another (that is a flow has a direction). The flow should have a name
    that suggests what information/data is being exchanged. Flows link processes,
    data stores and terminators.

    - **Data Store/Warehouse.** A data store (which may be something such as a file,
    folder, database or other repository of data) is used to store data for later
    use. The name of the data store is a plural noun (e.g., employees). The flow from
    the data store usually represents the reading of the data stored in the data store,
    and the flow'
  merge: -1
  pgno: 150
- img_proc: true
  md: 'to the waredata storehouse usually expresses data entry or updating (sometimes
    also deleting data).


    +   - **Terminator.** The terminator represents an external entity (to the system)
    that communicates with the system. Examples of entities might be human users or
    other systems, etc.


    An example of a data flow diagram is given below using the functions identified
    for the calculator:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_151_0.png)


    In this diagram the hierarchy of DFDs is indicated by the levels which expand
    on how the function in the previous level is implemented by the functions at the
    next level. This DFD also only presents the data flow for the situation where
    the user selects the `add` function as the numerical operation to apply.


    # 11.6 Flowcharts


    A flowchart is a graphical representation of an algorithm, workflow or process
    for a given problem.


    Flowcharts are used in the analysis, design and documentation of software systems.
    As with other forms of notation (such as DFDs) flowcharts help designers and developers
    to visualize the steps involved in a solution and thus aid in understanding the
    processes and algorithms involved.


    The steps in the algorithm are represented as various types of boxes. The ordering
    of the steps is indicated by arrows between the boxes. The flow of control is
    represented by decision boxes.


    There are a number of common notations used with flowcharts, and most of those
    notations use the following symbols:'
