    - 2. 为计算器添加一个幂运算（**）选项。\n- 3. 修改程序以接受浮点数而不是简单的整数。\n- 4. 允许选择除法运算符或整数除法运算符（即同时提供\
    \ '/' 和 '//'）。\n\n# 第15章\n函数式编程简介\n\n## 15.1 引言\n\n近年来，函数式编程备受关注。然而，函数式编程并非新概念，实际上可以追溯到20世纪50年代和编程语言\
    \ LISP。但是，许多人并不清楚函数式编程是什么，而是直接跳到代码示例，从未真正理解与函数式编程相关的一些关键思想，例如引用透明性。\n本章介绍函数式编程（也称为\
    \ FP）以及引用透明性（或 RT）的关键概念。\n需要注意的一个观点是，函数式编程是一种软件编码风格或方法，它与 Python 中函数的概念是分开的。\n\
    Python 函数可用于编写函数式程序，也可用于编写过程式程序；因此，不要过于纠结于可能使用的语法或 Python 拥有函数这一事实。相反，应该探索为你的软件设计定义函数式方法的思想。\n\
    \n## 15.2 什么是函数式编程？\n\n维基百科将函数式编程描述为：\n\n> ...一种编程范式，一种构建计算机程序结构和元素的风格，它将计算视为数学函数的求值，并避免状态和可变数据。\n\
    \n关于这个定义，有几点需要注意。首先，它关注的是计算机编程的*计算方面*。这似乎显而易见，但到目前为止我们在 Python 中研究的大部分内容本质上都是过程式的。\n\
    \n另一件需要注意的事情是，计算的表示方式强调基于提供给它们的数据生成结果的函数。也就是说，这些函数仅依赖于它们的输入来生成新的输出。它们不依赖于任何*副作用*，也不依赖于程序的*当前状态*。作为副作用的一个例子，如果一个函数将累计总和存储在一个全局变量中，而另一个函数使用该总和执行某些计算，那么第一个函数具有修改全局变量的副作用，而第二个函数则依赖于某些全局状态来获得结果。\n\
    \n依次来看这些要点：\n\n- 1. **函数式编程旨在避免副作用。** 函数应该可以通过获取它接收的数据并内联生成的结果来替换（这被称为引用透明性）。这意味着函数不应有隐藏的副作用。隐藏的副作用使得理解程序的功能变得更加困难，从而增加了理解、开发和维护的难度。纯函数具有以下属性：\n\
    - 2. 唯一可观察的输出是返回值。\n- 3. 唯一的输出依赖是参数。\n- 4. 参数在生成任何输出之前已完全确定。\n- 5. **函数式编程避免诸如状态之类的概念。**\
    \ 让我们将这些作为单独的问题来讨论。如果某个操作依赖于程序的（可能是隐藏的）状态或程序的某个元素，那么其行为可能会因该状态而异。这可能使其更难以理解、实现、测试和调试。由于所有这些都会影响系统的稳定性和可靠性，基于状态的操作可能导致开发出可靠性较低的软件。由于函数不（不应该）依赖于任何给定的状态（只依赖于它们被赋予的数据），因此它们应该更容易理解、实现、测试和调试。\n\
    - 6. **函数式编程提倡不可变数据。** 函数式编程也倾向于避免诸如可变数据之类的概念。可变数据是可以改变其状态的数据。相比之下，*不可变性*表示一旦创建，数据就不能被更改。在\
    \ Python 中，字符串是不可变的。一旦你创建了一个新字符串，你就无法修改它。任何应用于字符串的函数，如果在概念上可能改变字符串的内容，都会导致生成一个新字符串。许多开发者更进一步，在他们的代码中默认采用不可变性；这意味着默认情况下，所有数据持有类型都实现为不可变的。这确保了函数不能有隐藏的副作用，从而简化了编程。\n\
    - 7. **函数式编程提倡声明式编程**，这意味着编程围绕描述解决方案的表达式展开，而不是专注于大多数过程式编程语言的命令式方法。命令式语言强调解决方案的*如何*实现方面。"
