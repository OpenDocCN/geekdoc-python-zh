  md: "# 46.7 The ComputerPlayer Class\n\nThis class provides an algorithmic implementation\
    \ of the get_move() method. This algorithm tries to find the best empty grid location\
    \ in which to place the counter. If it cannot find one of these locations free\
    \ then it randomly finds an empty cell to fill. The get_move() method could be\
    \ replaced with whatever game playing logic you want.\n\n```\nclass ComputerPlayer(Player):\n\
    \    \"\"\" Implements algorithms for playing game \"\"\"\n\n    def __init__(self,\
    \ board):\n        super().__init__(board)\n\n    def randomly_select_cell(self):\n\
    \        \"\"\" Use a simplistic random selection approach\n        to find a\
    \ cell to fill. \"\"\"\n        while True:\n            # Randomly select the\
    \ cell\n            row = random.randint(0, 2)\n            column = random.randint(0,\
    \ 2)\n            # Check to see if the cell is empty\n            if self.board.is_empty_cell(row,\
    \ column):\n                return Move(self.counter, row, column)\n\n    def\
    \ get_move(self):\n        \"\"\" Provide a very simple algorithm for selecting\
    \ a move\"\"\"\n        if self.board.is_empty_cell(1, 1):\n            # Choose\
    \ the center\n            return Move(self.counter, 1, 1)\n        elif self.board.is_empty_cell(0,\
    \ 0):\n            # Choose the top left\n            return Move(self.counter,\
    \ 0, 0)\n        elif self.board.is_empty_cell(2, 2):\n            # Choose the\
    \ bottom right\n            return Move(self.counter, 2, 2)\n        elif self.board.is_empty_cell(0,\
    \ 2):\n            # Choose the top right\n            return Move(self.counter,\
    \ 0, 2)\n        elif self.board.is_empty_cell(0, 2):\n            # Choose the\
    \ top right\n            return Move(self.counter, 2, 0)\n        else:\n    \
    \        return self.randomly_select_cell()\n```"
