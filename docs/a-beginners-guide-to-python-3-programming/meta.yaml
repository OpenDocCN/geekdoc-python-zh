    value | x //= 2 | x = x // 2 |

    | %= | Use the modulus (remainder) operator to apply the right-hand value to the
    variable | x %= 2 | x = x % 2 |

    | **= | Apply the power of operator to raise the variable''s value by the value
    supplied | x **= 3 | x = x ** 3 |'
