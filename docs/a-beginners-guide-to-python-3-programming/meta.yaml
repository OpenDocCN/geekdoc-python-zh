    For example, if we divide the integer 100 by 20 then the result you might reasonably
    expect to produce might be 5; but it is not, it is actually 5.0:


    ```

    print(100 / 20)

    print(type(100 / 20))

    ```


    The output is


    ```

    5.0

    <class ''float''>

    ```


    And as you can see from this the type of the result is `float` (that is a floating
    point number). So why is this the case?


    The answer is that division does not know whether two the integers involved divide
    into one another exactly or not (i.e., is there a remainder). It therefore defaults
    to producing a floating point (or real) number which can have a fractional part.
    This is of course necessary in some situations, for example if we divide 3 by
    2:


    ```

    res1 = 3/2

    print(res1)

    print(type(res1))

    ```


    In this case 3 cannot be exactly divided by 2, we might say that 2 goes into 3
    once with a remainder. This is what is shown by Python:


    ```

