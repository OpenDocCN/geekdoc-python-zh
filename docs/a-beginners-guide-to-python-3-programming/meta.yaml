    \ to take this parameter into account, i.e., the `inner` wrapped function must\
    \ take at least one parameter representing `self`:\n\n```\ndef pretty_print(method):\n\
    \    def method_wrapper(self):\n        return \"<p>{0}</p>\".format(method(self))\n\
    \    return method_wrapper\n```\n\nThe `pretty_print` decorator defines an inner\
    \ function that takes as its first (and in this case only) parameter the reference\
    \ to the object (which by convention uses the parameter `self`). This is then\
    \ passed into the actual method when it is called.\n\nThe `pretty_print` decorator\
    \ can now be used with any method that only takes the `self` parameter, for example:\n\
    \n```\nclass Person:\n    def __init__(self, name, surname, age):\n        self.name\
    \ = name\n        self.surname = surname\n        self.age = age\n\n    def print_self(self):\n\
    \        print('Person - ', self.name, ', ', self.age)\n\n    @pretty_print\n\
