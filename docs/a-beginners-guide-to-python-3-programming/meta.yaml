    \ Python 装饰器以及第三方贡献。\n- https://wiki.python.org/moin/PythonDecoratorLibrary 提供装饰器示例的中央仓库。\n\
    \n## 29.14 书籍参考\n\n有关装饰器和单例设计模式的更多信息，请参阅四人帮（E. Gamma, R. Helm, R. Johnson and\
    \ J. Vlissades）的《设计模式：可复用面向对象软件的基础》（Addison-Wesley, 1995）。\n\n## 29.15 练习\n\n\
    本练习的目的是开发你自己的装饰器。\n\n你将编写一个 `timer` 装饰器，用于类中接受第一个参数 `self`，然后是另一个参数的方法。\n\n该装饰器应记录方法执行所需的时间。\n\
    为此，你可以使用 `time` 模块并导入 `default_timer`。\n\n```python\nfrom timeit import default_timer\n\
    ```\n\n然后，你可以获取函数调用开始和结束时的 `default_timer` 对象，并使用这些值来生成所用时间，例如：\n\n```python\n\
    start = default_timer()\nfunc(self, value)\nend = default_timer()\nprint('returned\
    \ from', func, 'it took', end - start, 'seconds')\n```\n\n然后，你可以将该装饰器应用于 `Account`\
    \ 类中定义的 `deposit()` 和 `withdraw()` 方法。例如，\n\n```python\n@timer\ndef deposit(self,\
    \ amount):\n    self._balance += amount\n\n@timer\ndef withdraw(self, amount):\n\
    \    self._balance -= amount\n```\n\n这些方法将被 `DepositAccount` 和 `InvestmentAccount`\
    \ 类继承。在 `CurrentAccount` 类中，`withdraw` 方法被重写，因此你也需要用 `@timer` 装饰该方法。\n\n现在，当你运行示例应用程序时，你应该会看到\
    \ deposit 和 withdraw 方法的计时信息被打印出来：\n\n```\ncalling deposit on Account[123] - John,\
    \ current\naccount = 10.05overdraft limit: -100.0 with 23.45\nreturned from deposit\
    \ it took 8.009999999999268e-07\nseconds\ncalling withdraw on Account[123] - John,\
    \ current\naccount = 33.5overdraft limit: -100.0 with 12.33\nreturned from withdraw\
    \ it took 1.1419999999999116e-06\nseconds\n```\n\n# 第 30 章\n可迭代对象与迭代器\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_364_0.png)\n\
    \n## 30.1 简介\n\n有两种协议你很可能会用到，或者在某个时候可能需要实现；它们是 *可迭代* 协议和 *迭代器* 协议。\n\n这两种密切相关的协议被广泛使用，并得到大量类型的支持。\n\
    \n迭代器和可迭代对象之所以重要，原因之一是它们可以与 Python 中的 `for` 语句一起使用；这使得将可迭代对象集成到需要依次处理一系列值的代码中变得非常容易。\n\
    \n## 30.2 迭代\n\n### 30.2.1 可迭代对象\n\n*可迭代* 协议用于那些可以依次处理其内容的类型。可迭代对象是提供迭代器以执行此处理的东西。因此，它本身不是迭代器；而是迭代器的提供者。\n\
    \nPython 中有许多可迭代类型，包括列表、集合、字典、元组等。这些都是可迭代的 *容器*，它们将提供一个迭代器。\n\n要成为一个 *可迭代* 类型；必须实现\
    \ `__iter__()` 方法（这是可迭代协议中唯一的方法）。该方法必须提供对迭代器对象的引用。这个引用可以指向数据类型本身，也可以指向另一个实现了迭代器协议的类型。\n\
    \n### 30.2.2 迭代器\n\n*迭代器* 是一个返回一系列值的对象。迭代器的长度可以是有限的，也可以是无限的（尽管许多面向容器的迭代器提供一组固定的值）。\n\
    \n迭代器协议指定了 `__next__()` 方法。该方法应返回序列中的下一个项，或者引发 `StopIteration` 异常。这用于指示迭代器已停止提供值。\n\
    \n### 30.2.3 与迭代相关的方法\n\n总结一下，我们有：\n\n- 来自可迭代协议的 `__iter__()`，用于返回迭代器对象，\n- 来自迭代器协议的\
    \ `__next__()`，用于获取一系列值中的下一个值。\n\n任何数据类型都可以既是可迭代对象又是迭代器；但这不是必需的。可迭代对象可以返回一个不同的对象来实现迭代器，也可以返回自身作为迭代器——这是设计者的选择。\n\
    \n### 30.2.4 可迭代的 Evens 类\n\n为了说明可迭代对象和迭代器背后的思想，我们将实现一个简单的类；这个类将是一个 Evens 类，用于提供从\
    \ 0 到某个限制的一组偶数值。这说明了不仅仅是数据容器可以是可迭代对象/迭代器。\n\n它还说明了一个既是可迭代对象又是迭代器的类型。\n\n```python\n\
    class Evens(object):\n    def __init__(self, limit):\n        self.limit = limit\n\
    \        self.val = 0\n\n    # Makes this class iterable\n    def __iter__(self):\n\
    \        return self\n\n    # Makes this class an iterator\n    def __next__(self):\n\
    \        if self.val > self.limit:\n            raise StopIteration\n        else:\n\
    \            return_val = self.val\n            self.val += 2\n            return\
    \ return_val\n```\n\n关于这个类，有几点需要注意。\n\n- `__iter__()` 方法返回 `self`；这是一个非常常见的模式，并假设该类也实现了迭代器协议。\n\
    - `__next__()` 方法要么返回序列中的下一个值，要么引发 `StopIteration` 异常以表示没有更多可用值。\n\n### 30.2.5\
    \ 在 For 循环中使用 Evens 类\n\n现在我们已经为 Evens 类实现了 *可迭代* 和 *迭代器* 协议，我们可以在 `for` 语句中使用它：\n\
    \n```python\nprint('Start')\nfor i in Evens(6):\n    print(i, end=', ')\nprint('Done')\n\
    ```\n\n生成的输出为：\n\n```\nStart\n0, 2, 4, 6, Done\n```\n\n这使得 Evens 类型看起来像一个内置类型，因为它可以与现有的\
    \ Python 结构一起使用；然而，`for` 循环只是期望得到一个 *可迭代对象*；因此 Evens 与 `for` 循环兼容。\n\n## 30.3\
    \ Itertools 模块\n\n`itertools` 模块提供了许多有用的函数，这些函数以各种方式构造迭代器。它可以用于提供对可迭代数据类型中选定值的迭代；它可以用于将可迭代对象组合在一起，等等。"
