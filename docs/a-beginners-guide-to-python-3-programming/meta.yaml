    # 5.5.4 Accessing a Subset of Characters


    It is also possible to obtain a subset of the original string, often referred
    to as a substring (of the original string). This can again be done using the square
    brackets notation but using a '':'' to indicate the start and end points of the
    sub string. If one of the positions is omitted then the start or end of the string
    is assumed (depending upon the omission), for example:


    ```

    my_string = ''Hello World''

    print(my_string[4]) # characters at position 4

    print(my_string[1:5]) # from position 1 to 5

    print(my_string[:5]) # from start to position 5

    print(my_string[2:]) # from position 2 to the end

    ```


    will generate


    ```

    o

    ello

    Hello

    llo World

    ```


    As such `my_string[1:5]` returns the substring containing the 2nd to 6th letters
    (that is ''ello''). In turn `my_string[:5]` returned the substring containing
    the 1st to 6th letters and `my_string[2:]` the sub string containing the 3rd to
    the last letters.


    # 5.5.5 Repeating Strings


    We can also use the ''*'' operator with strings. In the case of strings this means
    repeat the given string a certain number of times. This generates a new string
    containing the original string repeated n number of times. For example:


    ```

    print(''*'' * 10)

    print(''Hi'' * 10)

    ```


    will generate


    ```

    **********

    HiHiHiHiHiHiHiHiHiHi

    ```


    # 5.5.6 Splitting Strings


    A very common requirement is the need to split a string up into multiple separate
    strings based on a specific character such as a space or a comma.'
- md: 'This can be done with the `split()` function that takes a string to be used
    in identifying how to split up the receiving string. For example:


    ```python

    title = ''The Good, The Bad, and the Ugly''

    print(''Source string:'', title)

    print(''Split using a space'')

    print(title.split('' ''))

    print(''Split using a comma'')

    print(title.split('',''))

    ```


    This produces as output


    ```

    Source string: The Good, The Bad, and the Ugly

    Split using a space

    [''The'', ''Good,'', ''The'', ''Bad,'', ''and'', ''the'', ''Ugly'']

    Split using a comma

    [''The Good'', '' The Bad'', '' and the Ugly'']

    ```


    As can be seen from this the result generated is either a list of each word in
    the string or three strings as defined by the comma.


    You may have noticed something odd about the way in which we wrote the call to
    the split operation. We did not pass the string into `split()` rather we used
    the format of the variable containing the string followed by ''.'' and then `split()`.


    This is because `split()` is actually what is referred to as a *method*. We will
    return to this concept more when we explore classes and objects. For the moment
    merely remember that methods are *applied* to things like string using the *dot
    notation*.


    For example, given the following code


    ```python

    title = ''The Good, The Bad, and the Ugly''

    print(title.split('' ''))

    ```


    This means take the string held by the variable title and split it based on the
    character space.


    ## 5.5.7 Counting Strings


    It is possible to find out how many times a string is repeated in another string.
    This is done using the `count()` operation for example


    ```python

    my_string = ''Count, the number of spaces''

    print("my_string.count('' ''):", my_string.count('' ''))

    ```


    which has the output


    ```

    my_string.count('' ''): 8

    ```


    indicating that there are 8 spaces in the original string.


    ## 5.5.8 Replacing Strings


    One string can replace a substring in another string. This is done using the replace()
    method on a string. For example:


    ```python

    welcome_message = ''Hello World!''

    print(welcome_message.replace("Hello", "Goodbye"))

    ```


    The output produced by this is thus


    ```

    Goodbye World!

    ```


    ## 5.5.9 Finding Sub Strings


    You can find if one string is a substring of another string using the find() method.
    This method takes a second string as a parameter and checks to see if that string
    is in the string receiving the find() method, for example:


    ```python

    string.find(string_to_find)

    ```


    The method returns -1 if the string is not present. Otherwise it returns an index
    indicating the start of the substring. For example


    ```python

    print(''Edward Alun Rawlings''.find(''Alun''))

    ```


    This prints out the value 7 (the index of the first letter of the substring ''Alun'')
    note strings are indexed from zero; thus the first letter is at position zero,
    the second at position one, etc.


    In contrast the following call to the find method prints out -1 as ''Alun'' is
    no longer part of the target string:


    ```python

    print(''Edward John Rawlings''.find(''Alun''))

    ```


    ## 5.5.10 Converting Other Types into Strings


    If you try to use the ''+'' concatenation operator with a string and some other
    type such as a number then you will get an error. For example if you try the following:


    ```python

    msg = ''Hello Lloyd you are '' + 21

    print(msg)

    ```


    You will get an error message indicating that you can only concatenate string
    with strings not ints with strings. To concatenate a number such as 21 with a
    string you must convert it to a string. This can be done using the str() function.
    This converts any type into a string representation of that type. For example:


    ```python

    msg = ''Hello Lloyd you are '' + str(21)

    print(msg)

    ```


    This code snippet will print out the message:


    ```

    Hello Lloyd you are 21

    ```


    ## 5.5.11 Remove Prefix and Suffix


    Two new string-related methods were added in Python 3.9. These methods are called
    removePrefix() and removeSuffix() and are used to remove a sub string from the
    front or the back of a string. For example:


    ```python

    info = ''-John Hunt*''

    print(info)

    print(info.removeprefix(''-''))

    print(info.removesuffix(''*''))

    ```


    The output from this code snippet is:


    ```

    -John Hunt*

    John Hunt*

    -John Hunt

    ```


    ## 5.5.12 Comparing Strings


    To compare one string with another you can use the ''=='' equality and ''!=''
    not equals operators. These will compare two strings and return either True or
    False indicating whether the strings are equal or not.


    For example:


    ```python

    print(''James'' == ''James'') # prints True

    print(''James'' == ''John'') # prints False

    print(''James'' != ''John'') # prints True

    ```


    You should note that strings in Python are case sensitive; thus the string ''James''
    does not equal the string ''james''. Thus:


    ```python

    print(''James'' == ''james'') # prints False

    ```


    ## 5.5.13 Other String Operations


    There are in fact very many different operations available for strings, including
    checking that a string starts or ends with another string, that is, upper or lowercase
    etc. It is also possible to replace part of a string with another string, convert
    strings to upper, lower or title case, etc.


    Example of these are given below (note all of these operations use the dot notation):


    ```python

    some_string = ''Hello World''

    print(''Testing a String'')

    print(''-'' * 20)

    print(''some_string'', some_string)

    print("some_string.startswith(''H'')", some_string.startswith(''H''))

    print("some_string.startswith(''h'')", some_string.startswith(''h''))

    print("some_string.endswith(''d'')", some_string.endswith(''d''))

    print(''some_string.istitle()'', some_string.istitle())

    print(''some_string.isupper()'', some_string.isupper())

    print(''some_string.islower()'', some_string.islower())

    print(''some_string.isalpha()'', some_string.isalpha())


    print(''String conversions'')

    print(''-'' * 20)

    print(''some_string.upper()'', some_string.upper())

    print(''some_string.lower()'', some_string.lower())

    print(''some_string.title()'', some_string.title())

    print(''some_string.swapcase()'', some_string.swapcase())

    print(''String leading, trailing spaces'', " xyz ".strip())

    ```


    The output from this is


    ```

    Testing a String

    --------------------

    some_string Hello World

    some_string.startswith(''H'') True

    some_string.startswith(''h'') False

    some_string.endswith(''d'') True

    some_string.istitle() True

    some_string.isupper() False

    some_string.islower() False

    some_string.isalpha() False

    String conversions

    --------------------

    some_string.upper() HELLO WORLD

    some_string.lower() hello world

    some_string.title() Hello World

    some_string.swapcase() hELLO wORLD

    String leading, trailing spaces xyz

    ```


    ## 5.6 Hints on Strings


    ### 5.6.1 Python Strings are Case Sensitive


    In Python the string ''l'' is not the same as the string ''L''; one contains the
    lowercase letter ''l'' and one the uppercase letter ''L''. If case sensitive does
    not matter to you then you should convert any strings you want to compare into
    a common case before doing any testing; for example, using `lower()` as in


    ```python

    some_string.lower().startswith(''h'')

    ```


    ### 5.6.2 Function/Method Names


    Be very careful with capitalization of function/method names; in Python `isupper()`
    is a completely different operation to `isUpper()`. If you use the wrong case
    Python will not be able to find the required function or method and will generate
    an error message.


    ### 5.6.3 Function/Method Invocations


    Also be careful of always including the round brackets when you call a function
    or method; even if it takes no parameters/arguments. There is a significant difference
    between `isupper` and `isupper()`. The first one is the *name* of an operation
    on a string, while the second is a call to that operation so that the operation
    executes. Both formats are legal in Python, but the result is very different,
    for example:


    ```python

    print(some_string.isupper)

    print(some_string.isupper())

    ```


    produces the output:


    ```

    <built-in method isupper of str object at 0x105eb19b0>

    False

    ```


    Notice that the first print out tells you that you are referring to the built-in
    method called `isupper` defined on the type string, while the second actually
    runs `isupper()` for you and returns either `True` or `False`.


    ## 5.7 String Formatting


    Python provides a sophisticated formatting system for strings that can be useful
    for printing information out or logging information from a program.


    The string formatting system uses a special string known as the *format* string
    that acts as a pattern defining how the final string will be laid out. This format
    string can contain placeholders that will be replaced with actual values when
    the final string is created. A set of values can be applied to the format string
    to fill the placeholders using the `format()` method.


    The simplest example of a *format* string is one that provides a single placeholder
    indicated by two curly braces (e.g., `{}`). For example, the following is a *format*
    string with the pattern ''Hello'' followed by a placeholder:


    ```python

    format_string = ''Hello {}!''

    ```


    This can be used with the `format()` string method to provide a value (or populate)
    the placeholder, for example:


    ```python

    print(format_string.format(''Phoebe''))

    ```


    The output from this is:


    ```

    Hello Phoebe!

    ```


    A *format* string can have any number of placeholders that must be populated;
    for example, the next example has two placeholders that are populated by providing
    two values to the `format()` method:


    ```python

    # Allows multiple values to populate the string

    name = "Adam"

    age = 20

    print("{} is {} years old".format(name, age))

    ```


    In this case the output is:


    ```

    Adam is 20 years old

    ```


    It also illustrates that variables can be used to provide the values for the format
    method as well as literal values. A literal value is a fixed value such as 42
    or the string ''John''.


    By default the values are bound to the placeholders based on the order that they
    are provided to the `format()` method; however this can be overridden by providing
    an *index* to the placeholder to tell it which value should be bound, for example:


    ```python

    # Can specify an index for the substitution

    format_string = "Hello {1} {0}, you got {2}%"

    print(format_string.format(''Smith'', ''Carol'', 75))

    ```


    In this case the second string ''Carol'' will be bound the first placeholder;
    note that the parameters are numbered from *zero* not one.'
