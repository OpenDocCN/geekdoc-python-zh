  md: '# # Chapter 17

    Curried Functions


    # ## 17.1 Introduction


    Currying is a technique which allows new functions to be created from existing
    functions by *binding* one or more parameters to a specific value. It is a major
    source of reuse of functions in Python which means that functionality can be written
    once, in one place and then reused in multiple other situations.


    The name currying may seem obscure, but the technique is named after Haskell Curry
    (for whom the Haskell programming language is also named).


    This chapter introduces the core ideas behind currying and explores how currying
    can be implemented in Python. The chapter also introduces the concept of closures
    and how they affect curried functions.


    # ## 17.2 Currying Concepts


    At an abstract level, consider having a function that takes two parameters. These
    two parameters x and y are used within the function body with the multiply operator
    in the form x * y. For example, we might have:


    ```

    operation(x, y): return x * y

    ```


    This function `operation()` might then be used as follows


    ```

    total = operation(2, 5)

    ```


    Which would result in 5 being multiplied by 2 to give 10. Or it could be used:


    ```

    total = operation(10, 5)

    ```


    Which would result in 5 being multiplied by 10 to give 50.'
