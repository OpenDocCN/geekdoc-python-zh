  md: "# 8.6 Continue Loop Statement\n\n![](img/bf6e2b02eb6625321d9af5664cea2d5d_123_0.png)\n\
    \nA guard (if statement) can be used to determine when the `continue` statement\
    \ should be executed.\n\nAs with the `break` statement, the `continue` can come\
    \ anywhere within the body of the looping construct. This means that you can have\
    \ some statements that will be executed for every value in the sequence and some\
    \ that are only executed when the continue statement is not run.\n\nThis is shown\
    \ below. In this program the `continue` statement is executed only for odd numbers,\
