  md: '# Chapter 6

    Numbers, Booleans and None


    # 6.1 Introduction


    In this chapter we will explore the different ways that numbers can be represented
    by the built-in types in Python. We will also introduce the Boolean type used
    to represent True and False. As part of this discussion we will also look at both
    numeric and assignment operators in Python. We will conclude by introducing the
    special value known as None.


    # 6.2 Types of Numbers


    There are three types used to represent numbers in Python; these are integers
    (or integral) types, floating point numbers and complex numbers.

    This begs the question why? Why have different ways of representing numbers; after
    all humans can easily work with the number 4 and the number 4.0 and don’t need
    completely different approaches to writing them (apart from the ‘.’ of course).

    This actually comes down to efficiency in terms of both the amount of memory needed
    to represent a number and the amount of processing power needed to work with that
    number. In essence integers are simpler to work with and can take up less memory
    than real numbers. Integers are whole numbers that do not need to have a fractional
    element. When two integers are added, multiplied or subtracted they will always
    generate another integer number.

    In Python real numbers are represented as floating point numbers (or floats).
    These can contain a fractional part (the bit after the decimal point). Computers
    can best work with integers (actually of course only really 1 s and 0 s). They
    therefore need a way to represent a floating point or real number. Typically this
    involves representing the digits before and after the decimal point.

    The term floating point is derived from the fact that there is no fixed number
    of digits before or after the decimal point; that is, the decimal point can float.'
  merge: -1
