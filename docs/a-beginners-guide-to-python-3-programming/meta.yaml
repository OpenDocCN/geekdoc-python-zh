    This can be useful when used with the `input()` function.

    The `input()` function always returns a string. If we want to ask the user to
    input an integer number, then we will need to convert the string returned from
    the `input()` function into an int. We can do this by wrapping the call to the
    input function in a call to the `int()` function, for example:


    ```

    age = int(input(''Please enter your age:''))

    print(type(age))

    print(age)

    ```


    Running this gives:


    ```

    Please enter your age: 21

    <class ''int''>

    21

    ```


    The `int()` function can also be used to convert a floating point number into
    an int, for example:


    ```

    i = int(1.0)

    ```


    # 6.4 Floating Point Numbers


    Real numbers, or floating point numbers, are represented in Python using the IEEE
    754 double-precision binary floating point number format; for the most part you
    do not need to know this but it is something you can look up and read about if
    you wish.

    The type used to represent a floating point number is called float.

    Python represents floating point numbers using a decimal point to separate the
    whole part from the fractional part of the number, for example:


    ```

    exchange_rate = 1.83

    print(exchange_rate)

    print(type(exchange_rate))

    ```


    The produces output indicating that we are storing the number 1.83 as a floating
    point number:'
