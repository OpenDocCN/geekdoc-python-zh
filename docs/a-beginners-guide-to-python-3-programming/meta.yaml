- md: "derived. For example, an imperative approach to looping through some container\
    \ and printing out each result in turn would look like this:\n\n```\nint sizeOfContainer\
    \ = container.length\nfor (int i = 1 to sizeOfContainer) do\n    element = container.get(i)\n\
    \    print(element)\nenddo\n```\n\nWhereas a Functional Programming approach would\
    \ look like:\n\n```\ncontainer.foreach(print)\n```\n\nFunctional Programming has\
    \ its roots in the lambda calculus, originally developed in the 1930s to explore\
    \ computability. Many Functional Programming languages can thus be considered\
    \ as elaborations on this lambda calculus. There have been numerous pure Functional\
    \ Programming languages including Common Lisp, Clojure and Haskell. Python provides\
    \ some support for writing in the functional style, particularly where the benefits\
    \ of it are particularly strong (such as in processing various different types\
    \ of data).\n\nIndeed, when used judiciously, Functional Programming can be a\
    \ huge benefit for, and an enhancement to, the toolkit available to developers.\n\
    \nTo summarize then:\n\n- **Imperative Programming** is what is currently perceived\
    \ as traditional programming. That is, it is the style of programming used in\
    \ languages such as C, C++, Java and C#. In these languages a programmer tells\
    \ the computer what to do. It is thus oriented around control statements, looping\
    \ constructs and assignments.\n- **Functional Programming** aims to describe the\
    \ solution, that is, *what* the program needs to do (rather than *how* it should\
    \ be done).\n\n## 15.3 Advantages to Functional Programming\n\nThere are a number\
    \ of significant advantages to Functional Programming compared to imperative programming.\
    \ These include:\n\n1. **Less code.** Typically, a Functional Programming solution\
    \ will require less code to write than an equivalent imperative solution. As there\
    \ is less code to write, there is also less code to understand and to maintain.\
    \ It is therefore possible that functional programs are not only more elegant\
    \ to read but easier to update and maintain. This can also lead to enhanced programmer\
    \ productivity as they spend less time writing reams of code as well as less time\
    \ reading those reams of code.\n2. **Lack of (hidden) side effects (Referential\
    \ Transparency).** Programming without side effects is good as it makes it easier\
    \ to reason about functions (that is a function is completely described by the\
    \ data that goes in and the results that come back). This also means that it is\
    \ safe to reuse these functions in different situations (as they do not have unexpected\
    \ side effects). It should also be easier to develop, test and maintain such functions.\n\
    3. **Recursion is a natural control structure.** Functional languages tend to\
    \ emphasize recursion as a way of processing structures that would use some form\
    \ of looping constructs in an imperative language. Although you can typically\
    \ implement recursion in imperative languages, it is often easier to do in functional\
    \ languages. It is also worth noting that although recursion is very expressive\
    \ and a great way for a programmer to write a solution to a problem, it is not\
    \ as efficient at runtime as iteration. However, any expression that can be written\
    \ as a recursive routine can also be written using looping constructs. Functional\
    \ Programming languages often incorporate *tail end recursive optimizations* to\
    \ convert recursive routines into iterative ones at runtime. A tail end recursive\
    \ function is one in which the last thing a function does before it returns is\
    \ to call itself. This means that rather than actually invoking the function and\
    \ having to set up the context for that function, it should be possible to reuse\
    \ the current context and to treat it in an iterative manner as a loop around\
    \ that routine. Thus the programmer benefits from the expressive recursive construct\
    \ and the runtime benefits of an iterative solution using the same source code.\
    \ This option is typically not available in imperative languages.\n4. **Good for\
    \ prototyping solutions.** Solutions can be created very quickly for algorithmic\
    \ or behaviour problems in a functional language, thus allowing ideas and concepts\
    \ to be explored in a rapid application development style.\n5. **Modular functionality.**\
    \ Functional Programming is modular in terms of functionality (where object-oriented\
    \ languages are modular in the dimension of components). They are thus well suited\
    \ to situations where it is natural to want to reuse or componentize the *behaviour*\
    \ of a system.\n6. **The avoidance of state-based behaviour.** As functions only\
    \ rely on their inputs and outputs (and avoid accessing any other stored state)\
    \ they exhibit a cleaner and simpler style of programming. This avoidance of state-based\
    \ behaviour makes many difficult or challenging areas of programming simpler (such\
    \ as those in concurrent applications).\n7. **Additional control structures.**\
    \ A strong emphasis is on additional control structures such as pattern matching,\
    \ managing variable scope, tail recursion optimizations, etc.\n8. **Concurrency\
    \ and immutable data.** As Functional Programming systems advocate immutable data\
    \ structures it is simpler to construct concurrent systems. This is because the\
    \ data being exchanged and accessed is immutable. Therefore, multiple executing\
    \ thread or processes cannot affect each other adversely. The Akka Actor model\
    \ builds on this approach to provide a very clean model for multiple interacting\
    \ concurrent systems.\n9. **Partial evaluation.** Since functions do not have\
    \ side effects, it also becomes practical to bind one or more parameters to a\
    \ function at compile time and to reuse these functions with bound values as new\
    \ functions that take fewer parameters.\n\n## 15.4 Disadvantages of Functional\
    \ Programming\n\nIf Functional Programming has all the advantages previously described,\
    \ why isn't it the mainstream force that imperative programming languages are?\
    \ The reality is that Functional Programming is not without its disadvantages,\
    \ including:\n\n- **Input–Output is harder in a purely functional language.**\
    \ Input–Output flows naturally align with stream style processing, which does\
    \ not neatly fit into the data in, results out, nature of functional systems.\n\
    - **Interactive applications are harder to develop.** Interactive applications\
    \ are constructed via request response cycles initiated by a user action. Again,\
    \ these do not naturally sit within the purely functional paradigm.\n- **Continuously\
    \ running programs** such as services or controllers may be more difficult to\
    \ develop, as they are naturally based upon the idea of a continuous loop.\n-\
    \ **Functional Programming languages have tended to be less efficient on current\
    \ hardware platforms.** This is partly because current hardware platforms are\
    \ not designed with Functional Programming in mind and also because many of the\
    \ systems previously available were focused on the academic community where out\
    \ and out performance was not the primary focus. However, this has changed to\
    \ a large extent with modern functional languages such as Scala and Haskell.\n\
    - **Not data oriented.** A pure functional language does not really align with\
    \ the needs of the primarily data-oriented nature of many of today's systems.\
    \ Many (most) commercial systems are oriented around the need to retrieve data\
    \ from a database, manipulate it in some way and store that data back into a database.\
    \ Such data can be naturally represented via objects in an object-oriented language.\n\
    - **Programmers are less familiar** with Functional Programming concepts and thus\
    \ find it harder to pick up function-oriented languages.\n- **Functional Programming\
    \ idioms are often less intuitive** to (traditional) procedural programmers than\
    \ imperative idioms which can make debugging and maintenance harder. Although\
    \ with the use of a functional approach in many other languages now becoming more\
    \ popular (including in Python) this trend is changing.\n- Many Functional Programming\
    \ languages have been viewed as **Ivory tower languages** that are only used by\
    \ academics. This has been true of some older functional languages but is increasingly\
    \ changing with the advent of languages such as Scala and with the facilities\
    \ provided in more mainstream programming languages such as Python.\n\n## 15.5\
    \ Referential Transparency\n\nAn important concept within the world of Functional\
    \ Programming is that of Referential Transparency."
  mdcn: "派生而来。例如，命令式方法遍历某个容器并依次打印每个结果，其代码可能如下所示：\n\n```\nint sizeOfContainer = container.length\n\
    for (int i = 1 to sizeOfContainer) do\n    element = container.get(i)\n    print(element)\n\
    enddo\n```\n\n而函数式编程方法则可能如下：\n\n```\ncontainer.foreach(print)\n```\n\n函数式编程源于\
    \ lambda 演算，该演算最初于 1930 年代开发，旨在探索可计算性。因此，许多函数式编程语言可被视为对 lambda 演算的扩展。已存在众多纯函数式编程语言，包括\
    \ Common Lisp、Clojure 和 Haskell。Python 对函数式编程风格提供了一定支持，尤其是在其优势特别显著的领域（例如处理各种不同类型的数据）。\n\
    \n事实上，若运用得当，函数式编程可以极大地有益并增强开发者的工具箱。\n\n总结如下：\n\n- **命令式编程**是目前被视为传统的编程风格。即，在 C、C++、Java\
    \ 和 C# 等语言中使用的编程风格。在这些语言中，程序员告诉计算机该做什么。因此，它围绕控制语句、循环结构和赋值操作展开。\n- **函数式编程**旨在描述解决方案，即程序需要*做什么*（而非*如何*去做）。\n\
    \n## 15.3 函数式编程的优势\n\n与命令式编程相比，函数式编程具有许多显著优势，包括：\n\n1. **代码更少。** 通常，函数式编程解决方案所需的代码量少于等效的命令式解决方案。由于需要编写的代码更少，需要理解和维护的代码也更少。因此，函数式程序不仅可能读起来更优雅，而且更易于更新和维护。这也能提高程序员的生产力，因为他们花在编写和阅读大量代码上的时间都减少了。\n\
    2. **无（隐藏的）副作用（引用透明性）。** 无副作用的编程是好的，因为它使函数更容易被推理（即一个函数完全由输入的数据和返回的结果来描述）。这也意味着在不同情况下重用这些函数是安全的（因为它们没有意外的副作用）。开发、测试和维护此类函数也应该更容易。\n\
    3. **递归是自然的控制结构。** 函数式语言倾向于强调递归，将其作为处理结构的一种方式，而在命令式语言中则会使用某种形式的循环结构。虽然通常可以在命令式语言中实现递归，但在函数式语言中通常更容易。同样值得注意的是，尽管递归表达力强，是程序员编写问题解决方案的好方法，但其运行时效率不如迭代。然而，任何可以写成递归例程的表达式，也可以使用循环结构来编写。函数式编程语言通常包含*尾递归优化*，以便在运行时将递归例程转换为迭代例程。尾递归函数是指函数在返回前执行的最后操作是调用自身。这意味着，无需实际调用函数并为其设置上下文，而是可以重用当前上下文，并将其视为围绕该例程的循环进行迭代处理。因此，程序员受益于富有表现力的递归结构，而运行时则受益于使用相同源代码的迭代解决方案。这种选项在命令式语言中通常不可用。\n\
    4. **适合原型开发。** 在函数式语言中，可以非常快速地创建算法或行为问题的解决方案，从而允许以快速应用开发的方式探索想法和概念。\n5. **模块化功能。**\
    \ 函数式编程在功能方面是模块化的（而面向对象语言在组件维度上是模块化的）。因此，它们非常适合需要重用或组件化系统*行为*的场景。\n6. **避免基于状态的行为。**\
    \ 由于函数仅依赖于其输入和输出（并避免访问任何其他存储状态），它们展现出更清晰、更简单的编程风格。这种对基于状态的行为的回避，使得编程中许多困难或具有挑战性的领域（例如并发应用中的那些）变得简单。\n\
    7. **额外的控制结构。** 重点强调额外的控制结构，如模式匹配、变量作用域管理、尾递归优化等。\n8. **并发与不可变数据。** 由于函数式编程系统倡导不可变数据结构，构建并发系统更为简单。这是因为交换和访问的数据是不可变的。因此，多个执行线程或进程不会相互产生不利影响。Akka\
    \ Actor 模型基于此方法构建，为多个交互的并发系统提供了一个非常清晰的模型。\n9. **部分求值。** 由于函数没有副作用，在编译时将一个或多个参数绑定到函数，并将这些带有绑定值的函数作为接受更少参数的新函数来重用，也变得切实可行。\n\
    \n## 15.4 函数式编程的缺点\n\n如果函数式编程具有上述所有优势，为什么它没有成为命令式编程语言那样的主流力量呢？现实是，函数式编程并非没有缺点，包括：\n\
    \n- **在纯函数式语言中，输入-输出更难处理。** 输入-输出流自然地与流式处理对齐，而这并不完全符合函数式系统“数据输入，结果输出”的本质。\n- **交互式应用程序更难开发。**\
    \ 交互式应用程序是通过用户操作发起的请求-响应周期构建的。同样，这些并不自然地契合纯函数式范式。\n- **持续运行的程序**（如服务或控制器）可能更难开发，因为它们本质上基于连续循环的思想。\n\
    - **函数式编程语言在当前硬件平台上的效率往往较低。** 部分原因是当前硬件平台并非为函数式编程而设计，也因为许多先前可用的系统专注于学术界，而极致性能并非主要关注点。然而，随着\
    \ Scala 和 Haskell 等现代函数式语言的出现，这种情况在很大程度上已经改变。\n- **非数据导向。** 纯函数式语言并不真正符合当今许多系统主要以数据为导向的需求。许多（大多数）商业系统围绕从数据库检索数据、以某种方式操作数据并将数据存回数据库的需求而构建。此类数据在面向对象语言中可以通过对象自然地表示。\n\
    - **程序员对函数式编程概念不太熟悉**，因此发现掌握面向函数的语言更难。\n- **函数式编程惯用法对（传统的）过程式程序员来说通常不如命令式惯用法直观**，这可能使调试和维护更难。尽管现在许多其他语言中函数式方法的使用正变得越来越流行（包括\
    \ Python 中），但这一趋势正在改变。\n- 许多函数式编程语言一直被视为**象牙塔语言**，仅供学术界使用。对于一些较老的函数式语言来说确实如此，但随着\
    \ Scala 等语言的出现以及 Python 等更主流编程语言提供的功能，这种情况正在日益改变。\n\n## 15.5 引用透明性\n\n函数式编程世界中的一个重要概念是引用透明性。"
