- md: "## 26.11 Exception Notes\n\nException notes are another new feature in Python\
    \ 3.11. Exception notes are described in PEP678 (see https://peps.python.org/pep-0678/).\n\
    \nThis new feature allows a programmer to add a note to an exception when it is\
    \ being handled before rethrowing it. This avoids the need to create application\
    \ specific exceptions to allow additional information to be provided.\n\nThe note\
    \ can then be viewed in any error trace back or examined in client code further\
    \ up the stack. This can be very useful to anyone trying to debug a problem.\n\
    \nTo add a note to an exception the add_note() method is used for example:\n\n\
    ```python\ndef do_something():\n    try:\n        # code raising a ValueError\n\
    \        raise ValueError('Value Incorrect')\n    except ValueError as err:\n\
    \        err.add_note('Invalid age')\n        raise err\n\ndo_something()\n```\n\
    \nIn this example the initial ValueError is handled within the function do_something()\
    \ and a note is added to the error 'Invalid Age'.\nWhen we run this code the output\
    \ generated is\n\n```\nTraceback (most recent call last):\n  File \"exception_notes_example.py\"\
    , line 11, in <module>\n    do_something()\n  File \"exception_notes_example.py\"\
    , line 8, in do_something\n    raise err\n  File \"exception_notes_example.py\"\
    , line 5, in do_something\n    raise ValueError('Value Incorrect')\nValueError:\
    \ Value Incorrect\nInvalid age\n```\n\nAs you can see at the end of this traceback\
    \ the note added 'invalid age' is printed after the initial 'Value Incorrect'\
    \ message.\nWe can of course handle this error in the same way as any other error\
    \ or exception, for example:\n\n```python\ntry:\n    do_something()\nexcept ValueError\
    \ as err:\n    print(err)\n    print(err.__notes__)\n```\n\nRunning this code\
    \ generates\n\n```\nValue Incorrect\n['Invalid age']\n```\n\nNote that when you\
    \ print the ValueError instance using print(err) you only see the original message\
    \ ('Value Incorrect'). To access the notes you must used the err.__notes__ special\
    \ attribute. This returns a list of any notes that have been added to the exception.\n\
    \n## 26.12 Generate a Traceback Programmatically\n\nYou may have noted that when\
    \ you handle an exception in your own code, and for example, print out the exception\
    \ all you get is the message associated with the exception, for example:\n\n```python\n\
    try:\n    print(6 / 0)\nexcept Exception as exp:\n    print('oops')\n    print(exp)\n\
    ```\n\nThe following code when run generates this output:\n\n```\noops\ndivision\
    \ by zero\n```\n\nWhereas when you allow an exception to escape from your program\
    \ (i.e., you don't handle it) you get a so called *traceback* which provides information\
    \ on where the exception happened, etc. This can be very useful when trying to\
    \ debug a problem in your code.\n\nThe `traceback` module provides the `print_exc()`\
    \ function that can be used to print a traceback associated with the current exception.\
    \ To use this module all you need to do is to import it (as it comes as part of\
    \ the Python environment).\n\nFor example we can modify our earlier program by\
    \ importing the `traceback` module and calling the `print_exc()` function within\
    \ the exception handling code block:\n\n```python\nimport traceback\n\ntry:\n\
    \    print(6 / 0)\nexcept Exception as exp:\n    print('oops')\n    print(exp)\n\
    \    traceback.print_exc()\n```\n\nNow when we run this program, we will get a\
    \ traceback printed out when the exception is handled:\n\n```\noops\ndivision\
    \ by zero\nTraceback (most recent call last):\n  File \"traceback-example.py\"\
    , line 6, in <module>\n    print(6 / 0)\n          ^^^^\nZeroDivisionError: division\
    \ by zero\n```\n\n## 26.13 Online Resources\n\nFor more information on Pythons\
    \ errors and exceptions sets:\n\n- https://docs.python.org/3/library/exceptions.html\
    \ The Standard Library documentation for built-in exceptions\n- https://docs.python.org/3/tutorial/errors.html\
    \ The Standard Python documentation tutorial on errors and exceptions.\n- https://www.tutorialspoint.com/python/python_exceptions.htm\
    \ An alternative tutorial on Python exception handling.\n\n## 26.14 Exercises\n\
    \nThis exercise involves adding error handling support to the `CurrentAccount`\
    \ class.\n\nIn the `CurrentAccount` class it should not be possible to withdraw\
    \ or deposit a negative amount.\n\nDefine an exception/error class called `AmountError`.\
    \ The `AmountError` should take the account involved and an error message as parameters.\n\
    \nNext update the `deposit()` and `withdraw()` methods on the `Account` and `CurrentAccount`\
    \ class to raise an `AmountError` if the amount supplied is negative.\n\nYou should\
    \ be able to test this using:\n\n```python\ntry:\n    acc1.deposit(-1)\nexcept\
    \ AmountError as e:\n    print(e)\n```\n\nThis should result in the exception\
    \ `e` being printed out, for example:\n\n```\nAmountError (Cannot deposit negative\
    \ amounts) on Account[123] - John, current account = 21.17overdraft limit: -100.0\n\
    ```\n\nNext modify the class such that if an attempt is made to withdraw money\
    \ which will take the balance below the overdraft limit threshold an error is\
    \ raised.\n\nThe error should be a `BalanceError` that you define yourself. The\
    \ `BalanceError` exception should hold information on the account that generated\
    \ the error.\n\nTest your code by creating instances of `CurrentAccount` and taking\
    \ the balance below the overdraft limit.\n\nWrite code that will use `try` and\
    \ `except` blocks to catch the exception you have defined.\n\nYou should be able\
    \ to add the following to your test application:\n\n```python\ntry:\n    print('balance:',\
    \ acc1.balance)\n    acc1.withdraw(300.00)\n    print('balance:', acc1.balance)\n\
    except BalanceError as e:\n    print('Handling Exception')\n    print(e)\n```"
  mdcn: "## 26.11 异常备注\n\n异常备注是 Python 3.11 中的另一项新功能。异常备注在 PEP678 中有描述（参见 https://peps.python.org/pep-0678/）。\n\
    \n这项新功能允许程序员在异常被处理时、重新抛出之前，为其添加备注。这避免了创建特定于应用程序的异常来提供额外信息的需要。\n\n该备注随后可以在任何错误回溯中查看，或在调用栈更上层的客户端代码中检查。这对于任何试图调试问题的人都非常有用。\n\
    \n要向异常添加备注，可以使用 `add_note()` 方法，例如：\n\n```python\ndef do_something():\n    try:\n\
    \        # code raising a ValueError\n        raise ValueError('Value Incorrect')\n\
    \    except ValueError as err:\n        err.add_note('Invalid age')\n        raise\
    \ err\n\ndo_something()\n```\n\n在此示例中，初始的 `ValueError` 在函数 `do_something()` 内部被处理，并向错误添加了备注\
    \ 'Invalid Age'。\n当我们运行此代码时，生成的输出是：\n\n```\nTraceback (most recent call last):\n\
    \  File \"exception_notes_example.py\", line 11, in <module>\n    do_something()\n\
    \  File \"exception_notes_example.py\", line 8, in do_something\n    raise err\n\
    \  File \"exception_notes_example.py\", line 5, in do_something\n    raise ValueError('Value\
    \ Incorrect')\nValueError: Value Incorrect\nInvalid age\n```\n\n如您所见，在此回溯的末尾，添加的备注\
    \ 'invalid age' 在初始的 'Value Incorrect' 消息之后被打印出来。\n我们当然可以像处理任何其他错误或异常一样处理此错误，例如：\n\
    \n```python\ntry:\n    do_something()\nexcept ValueError as err:\n    print(err)\n\
    \    print(err.__notes__)\n```\n\n运行此代码会生成：\n\n```\nValue Incorrect\n['Invalid\
    \ age']\n```\n\n请注意，当您使用 `print(err)` 打印 `ValueError` 实例时，您只能看到原始消息（'Value Incorrect'）。要访问备注，您必须使用\
    \ `err.__notes__` 特殊属性。它返回一个列表，包含已添加到该异常的所有备注。\n\n## 26.12 以编程方式生成回溯\n\n您可能已经注意到，当您在自己的代码中处理异常时，例如，打印出异常，您只能得到与该异常相关联的消息，例如：\n\
    \n```python\ntry:\n    print(6 / 0)\nexcept Exception as exp:\n    print('oops')\n\
    \    print(exp)\n```\n\n运行以下代码会生成此输出：\n\n```\noops\ndivision by zero\n```\n\n\
    而当您允许异常从程序中逃逸（即，您不处理它）时，您会得到所谓的 *traceback*，它提供了异常发生位置等信息。这在尝试调试代码中的问题时非常有用。\n\
    \n`traceback` 模块提供了 `print_exc()` 函数，可用于打印与当前异常相关联的回溯。要使用此模块，您只需导入它（因为它作为 Python\
    \ 环境的一部分提供）。\n\n例如，我们可以通过导入 `traceback` 模块并在异常处理代码块中调用 `print_exc()` 函数来修改我们之前的程序：\n\
    \n```python\nimport traceback\n\ntry:\n    print(6 / 0)\nexcept Exception as exp:\n\
    \    print('oops')\n    print(exp)\n    traceback.print_exc()\n```\n\n现在，当我们运行此程序时，在处理异常时会打印出回溯信息：\n\
    \n```\noops\ndivision by zero\nTraceback (most recent call last):\n  File \"traceback-example.py\"\
    , line 6, in <module>\n    print(6 / 0)\n          ^^^^\nZeroDivisionError: division\
    \ by zero\n```\n\n## 26.13 在线资源\n\n有关 Python 错误和异常集的更多信息：\n\n- https://docs.python.org/3/library/exceptions.html\
    \ 内置异常的标准库文档\n- https://docs.python.org/3/tutorial/errors.html 关于错误和异常的标准 Python\
    \ 文档教程。\n- https://www.tutorialspoint.com/python/python_exceptions.htm 关于 Python\
    \ 异常处理的替代教程。\n\n## 26.14 练习\n\n此练习涉及为 `CurrentAccount` 类添加错误处理支持。\n\n在 `CurrentAccount`\
    \ 类中，不应该允许提取或存入负数金额。\n\n定义一个名为 `AmountError` 的异常/错误类。`AmountError` 应该接受涉及的账户和错误消息作为参数。\n\
    \n接下来，更新 `Account` 和 `CurrentAccount` 类上的 `deposit()` 和 `withdraw()` 方法，如果提供的金额为负数，则引发\
    \ `AmountError`。\n\n您应该能够使用以下代码进行测试：\n\n```python\ntry:\n    acc1.deposit(-1)\n\
    except AmountError as e:\n    print(e)\n```\n\n这应该会导致异常 `e` 被打印出来，例如：\n\n```\n\
    AmountError (Cannot deposit negative amounts) on Account[123] - John, current\
    \ account = 21.17overdraft limit: -100.0\n```\n\n接下来修改该类，使得如果尝试提取将使余额低于透支限额阈值的金额时，引发一个错误。\n\
    \n该错误应该是您自己定义的 `BalanceError`。`BalanceError` 异常应包含有关产生错误的账户的信息。\n\n通过创建 `CurrentAccount`\
    \ 实例并将余额降至透支限额以下来测试您的代码。\n\n编写代码，使用 `try` 和 `except` 块来捕获您定义的异常。\n\n您应该能够将以下内容添加到您的测试应用程序中：\n\
    \n```python\ntry:\n    print('balance:', acc1.balance)\n    acc1.withdraw(300.00)\n\
    \    print('balance:', acc1.balance)\nexcept BalanceError as e:\n    print('Handling\
    \ Exception')\n    print(e)\n```"
