    Because name and age are part of the class’s public interface it means that we\
    \ can write:\n\n```python\nperson = Person('John', 54)\nperson.name = 42\nperson.age\
    \ = -1\nprint(person)\n```\n\nWhich is of course a bit bizarre as the person now\
    \ has the name ‘42’ and an age of –1, thus the output from this is:\n\n```\nPerson[42]\
    \ is -1\n```\n\nWe can indicate that we want to treat age and name as being private\
    \ to the object by prefixing the attribute names with an underbar (‘_’) as shown\
    \ below:\n\n```python\nclass Person:\n    def __init__(self, name, age):\n   \
    \     self._name = name\n        self._age = age\n\n    def __str__(self):\n \
    \       return 'Person[' + str(self._name) + '] is ' + str(self._age)\n```\n\n\
    This tells Python programmers that we want to consider _name and _age as being\
    \ private. However, it should be noted that this is only a convention; albeit\
