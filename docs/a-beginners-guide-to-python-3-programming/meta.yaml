  md: 'Comments are sections of a program that are ignored by the Python interpreter—they
    are not executable code.


    A comment is indicated by the ‘#’ character in Python. Anything following that
    character to the end of the line will be ignored by the interpreter as it will
    be assumed to be a comment, for example:


    ```

    # This is a comment

    name = input(''Enter your name: '')

    # This is another comment

    print(name) # this is a comment to the end of the line

    ```


    In the above, the two lines starting with a # are comments—they are for our human
    eyes only. Interestingly the line containing the `print()` function also has a
    comment—that is fine the command starts with the # and runs to the end of the
    line, anything *before* the # character is not part of the comment.


    # 4.9 Scripts Versus Programs


    Python can be run in several ways:


    +   - via the Python interpreter by entering the REPL; the interactive Python
    session,

    - by having the Python interpreter run a file containing stored Python commands,

    - by setting up an association at the operating system level so that any files
    ending with .py are always run by the Python interpreter,

    - by indicating the Python interpreter to use at the start of the Python file.
    This is done by including the first line in a file with something similar to ‘#!/usr/bin/env
    python’. This indicates that the rest of the file should be passed to the Python
    interpreter.


    All of these can be defined as a way to run a Python program or indeed a Python
    script.


    However, for the purposes of this book we will treat a file containing the first
    line specifying the Python interpreter to use as a *script*. All other Python
    code that represents some code to execute for a specific purpose will be called
    a Python program. However, this is really only a distinction being made here to
    simplify terminology.


    # 4.10 Online Resources


    See the Python Standard Library documentation for:


    +   - https://docs.python.org/3/reference/simple_stmts.html For information on
    statements in Python.'
