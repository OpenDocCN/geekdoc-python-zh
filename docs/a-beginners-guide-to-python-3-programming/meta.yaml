  md: '![](img/bf6e2b02eb6625321d9af5664cea2d5d_304_0.png)


    The above figure illustrates a situation in which a divide by zero exception called
    `ZeroDivisionError` is raised. This exception is passed up the execution stack
    where it encounters an exception handler defined for an end of file exception.
    This handler cannot handle the `ZeroDivisionError` and so it is passed further
    up the execution stack. It then encounters a handler for an out of memory exception.
    Again, it cannot deal with a `ZeroDivisionError`, and the exception is passed
    further up the execution stack until it finds a handler defined for the `ZeroDivisionError`.
    This handler then processes the exception.


    # 26.5 Handling an Exception


    You can catch an exception by implementing the `try-except` construct. This construct
    is broken into four parts:


    +   - `try` block. The `try` block indicates the code which is to be monitored
    for the exceptions listed in the except expressions.

    - `except` clause. You can use an optional `except` clause to indicate what to
    do when certain classes of exception/error occur (e.g., resolve the problem or
    generate a warning message). There can be any number of except clauses in sequence
    checking for different types of error/exceptions.

    - `else` clause. This is an optional clause which will be run if and only if no
    exception was thrown in the try block. It is useful for code that must be executed
    if the try clause does not raise an exception.

    - `finally` clause. The optional `finally` clause runs after the `try` block exits
    (whether or not this is due to an exception being raised). You can use it to clean
    up any resources, close files, etc.'
