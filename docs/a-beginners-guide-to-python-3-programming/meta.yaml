    \ method:\n\n```\nclass Person:\n    def __init__(self, name, age):\n        self._name\
    \ = name\n        self._age = age\n\n    def get_age(self):\n        return self._age\n\
    \n    def set_age(self, new_age):\n        if isinstance(new_age, int) & new_age\
    \ > 0 & new_age < 120:\n            self._age = new_age\n\n    def get_name(self):\n\
    \        return self._name\n\n    def __str__(self):\n        return 'Person['\
    \ + str(self._name) + '] is ' + str(self._age)\n```\n\nThe two getter methods\
    \ have the format of `get_` followed by the name of the attribute they are getting.\
    \ Thus, we have `get_age` and `get_name`. Typically, all that getters do is to\
    \ return the attribute being used (as is the case here).\nThe single setter method\
    \ is a little different; it validates the data that has been provided to check\
    \ that it is appropriate (i.e., that it is an Integer using `isinstance(new_age,\
    \ int)` and that it is a value over zero but under 120). Only if the data passes\
    \ these checks is it used as the new value of the person's age, for example if\
    \ we try to set a persons age to -1:\n\n```\nperson = Person('John', 54)\nperson.set_age(-1)\n\
