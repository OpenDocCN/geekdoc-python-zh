    \n这些方法被认为是*特殊的*，因为它们以双下划线（`__`）开头和结尾。这类方法被认为是私有的，通常仅限于 Python 内部实现（我们已经见过像 `__init__()`\
    \ 和 `__str__()` 这样的方法）。\n\n举个例子，假设我们想为我们的 `Quantity` 类型实现 `+` 和 `-` 运算符。我们还希望我们的\
    \ `Quantity` 类型能够保存一个实际的值，并且能够转换为字符串以便打印。\n\n要实现 `+` 和 `-` 运算符，我们需要提供两个特殊方法，一个提供\
    \ `+` 运算符的实现，另一个提供 `-` 运算符的实现：\n\n- `+` 运算符由签名 `def __add__(self, other):` 的方法实现。\n\
    - `-` 运算符由签名 `def __sub__(self, other):` 的方法实现。\n\n其中 `other` 代表另一个 `Quantity`\
    \ 或其他合适的类型，它将被加到或从当前的 `Quantity` 对象中减去。\nPython 会将这些方法映射到 `+` 和 `-` 运算符；这样，如果有人试图将两个数量相加，那么\
    \ `__add__()` 方法将被调用，依此类推。\n下面给出了 `Quantity` 类的定义；注意该类实际上只是包装了存储在 `value` 属性中的一个数字。\n\
