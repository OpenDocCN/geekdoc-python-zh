    As you can see in both cases the `finally` clause is executed. The `finally` clause\
    \ can be very useful for general housekeeping type activities such as shutting\
    \ down or closing any resources that your code might be using, even if an error\
    \ has occurred.\n\n## 26.6 Raising an Exception\n\nAn error or exception is raised\
