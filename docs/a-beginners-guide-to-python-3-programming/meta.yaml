  md: '# 33.5.5 Obtaining the Max and Min Values in a Set


    You can also obtain the maximum or minimum values in a set using the `max()` and
    `min()` functions:


    ```

    print(max(a_set))

    print(min(a_set))

    ```


    # 33.5.6 Removing an Item


    To remove an item from a set, use the `remove()` or `discard()` functions. The
    remove function removes a single item from a set but generates an error if that
    item was not in the set. The remove function also removes a single item from a
    set but does not throw an error if it was not initially present in the set.


    ```

    basket = {''apple'', ''orange'', ''apple'', ''pear'', ''orange'', ''banana''}

    print(basket)

    basket.remove(''apple'')

    basket.discard(''apricot'')

    print(basket)

    ```


    This generates


    ```

    {''pear'', ''banana'', ''orange'', ''apple''}

    {''pear'', ''banana'', ''orange''}

    ```


    There is also a method `pop()` that can be used to remove an item (and return
    that item as a result of running the method); however it removes the last item
    in the set (although as a set is unordered you will not know which item will be).


    The method `clear()` is used to remove all elements from a set:


    ```

    basket = {''apple'', ''orange'', ''banana''}

    basket.clear()

    print(basket)

    ```


    which prints out


    ```

    set()

    ```


    Which is used to represent an empty set.


    # 33.6 Nesting Lists Within Sets


