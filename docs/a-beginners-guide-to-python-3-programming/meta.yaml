    \nA frozenset is an immutable version of a set. That is, a `frozenset` is a set\
    \ that cannot be modified once created.\n\nFrozensets are useful as a set can\
    \ only hold an immutable object, thus it is not possible to `nest` a set within\
    \ a set (as sets are mutable things). To get around this it is possible to convert\
    \ any set (and in fact any iterable) into a `frozenset`.\n\n## 35.2 Frozenset\
    \ Characteristics\n\nA `frozenset` has all the characteristics of a `set` with\
    \ the exception of being modifiable. Thus the characteristics of a `frozenset`\
    \ are:\n\n- Immutable.\n- Do not allow duplicates.\n- They are not indexed.\n\
    - They are of fixed size.\n\nA `frozenset` can be useful in any situation where\
    \ you require an immutable type with a set like set of operations.\n\n## 35.3\
    \ Creating a Frozenset\n\nFrozensets are created using the `frozenset()` function.\
    \ This function takes an (optional) iterable element and creates the new `frozenset`\
    \ based on that iterable. The iterable could be a `list`, a `set`, a `dict` or\
    \ a `tuple`, etc.\n\nSome examples of these conversions are shown below:\n\n```python\n\
