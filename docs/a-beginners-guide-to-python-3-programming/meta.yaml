  md: "# 41.5 Alternative Values in Case Condition\n\nAnother option is to use an\
    \ *or* condition (represented by a |) to indicate that if a value equals one or\
    \ more values then the associated action should be performed. For example:\n\n\
    ```\ndef greeter5(language):\n    match language:\n        case 'English' | 'American':\n\
    \            print('Hello')\n        case 'Spanish':\n            print('Hola')\n\
    \        case 'French':\n            print('Bonjour')\n        case 'German':\n\
    \            print('Hallo')\n        case unknown:\n            print(f'Language\
    \ {unknown} is not yet known to us')\n\ngreeter5('English')\ngreeter5('American')\n\
    ```\n\nIn the above example, if the language is either 'English' or 'American'\
    \ then the string 'Hello' will be printed out. The output from running this code\
    \ is:\n\n```\nHello\nHello\n```\n\nNote that there can be any number of values\
    \ so if we wanted to use 'English', 'American' and 'Australian' we could write:\n\
    \n```\ncase 'English' | 'American' | 'Australian':\n```\n\n# 41.6 Matching Sequences/Containers\n\
    \nA sequence is something that contains a set of values such as a container/collection.\
    \ A `tuple` is an example of a sequence or container. The structural aspect of\
    \ the `match` statement allows you to match against the contents of a `tuple`,\
    \ but also to structurally extract values from a tuple.\nThe following example\
    \ illustrates several options,\n\n+   - The first `case` matches the exact values\
    \ in a tuple.\n- The second matches on the first element of a two value tuple\
    \ and extracts the *second* value and stores it into a local variable *y*.\n-\
    \ The third case condition does the opposite, it extracts the *first* value in\
    \ the tuple and matches against the 0 in the second position."
