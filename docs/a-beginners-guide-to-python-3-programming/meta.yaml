    ```\n{frozenset({1, 2, 3})}\n{frozenset({1, 2, 3})}\n```\n\n## Chapter 36 Collection\
    \ Related Modules\n\n### 36.1 Introduction\n\nThe chapter introduces a feature\
    \ known as a list comprehension in Python. It then introduces the `collections`\
    \ and `itertools` modules.\n\n### 36.2 List Comprehension\n\nThis is a very powerful\
    \ mechanism that can be used to generate new lists. The syntax of the list comprehension\
    \ is\n\n```\n[ <expression> for item in iterable <if optional_condition> ]\n```\n\
    \nThe new list is formed of the results from the expression. Note that the whole\
    \ `for` statement and expression is surrounded by the square brackets normally\
    \ used to create a List.\n\nWhen a list comprehension is executed it generates\
    \ a new list by applying the expression to the items in another collection.\n\n\
    For example, given one list of integers, another (new) list can be created using\
    \ the list comprehension format:\n\n```python\nlist1 = [1, 2, 3, 4, 5, 6]\nprint('list1:',\
