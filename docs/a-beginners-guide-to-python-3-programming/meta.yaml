    These modules only require the programmer to import them into their code as they
    are provided as part of the Python runtime environment (that is they are available
    by default within your Python system). You do not need to do anything else to
    make them available to your program other than install Python itself and import
    them.


    However, there are many, many, many other modules/libraries available to the Python
    programmer. These are referred to as third-party libraries as they are provided
    by people and organizations other than python.org (that is the Python Foundation).


    Some of these libraries are extremely well established and provide the foundation
    for many of the types of Python application the make it such a popular language.
    In fact right back in chapter two we talked about several of these such as those
    used in the Data Analytics world including libraries such as Pandas (see https://pandas.pydata.org),
    NumPy (which represents Numeric Python see https://numpy.org/), SciPy (which stands
    for Scientific Python see https://scipy.org/) and Matplotlib (see https://matplotlib.org/)
    which is a graphing library.


    This means that if you are working within the Data Analytics arena and someone
    tells you that they are using Python to do their analysis what they really mean
    is that they are probably using something like:


    +   - Python,

    - Plus Pandas and NumPy,

    - and typically with SciPy,

    - and some form of graphing tool such as Matplotlib.


    Similarly if a developer is using Python to create a set of RESTful services (that
    is a remote service accessed over https and supplying some form of data on request),
    they are likely to be using Python plus a library such as fastAPI (https://fastapi.tiangolo.com/),
    Flask (https://palletsprojects.com/p/flask/) or Django (https://www.djangoproject.com/).


    As such these third-party modules are key to some of the most successful application
    areas within which Python is used.


    It is perhaps worth noting that anyone can create a third-party module and make
    it available to others to use, however not all modules are created equal. Almost
    all libraries are made available as open source, free of charge, software. As
    such it can be difficult to determine which libraries are appropriate to use and
    which are not.


    In general the longer the module has been around, the larger the number of people
    using it, the more plentiful the documentation (both from the module provider
    but also in general on the web) and the greater the number of contributors and
    maintainers the better the module is likely to be.'
