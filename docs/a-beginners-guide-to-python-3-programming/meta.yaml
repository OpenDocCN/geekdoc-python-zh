- md: "## Chapter 25\nAbstract Base Classes\n\n## 25.1 Introduction\n\nThis chapter\
    \ presents Abstract Base Classes (also known as ABCs) which were originally introduced\
    \ in Python 2.6.\nAn Abstract Base Class is a class that you cannot instantiate\
    \ and that is expected to be extended by one or more subclasses. These subclasses\
    \ will then fill in any the gaps left the base class.\nAbstract Base Classes are\
    \ very useful for creating class hierarchies with a high level of reuse from the\
    \ root class in the hierarchy.\n\n## 25.2 Abstract Classes as a Concept\n\nAn\
    \ abstract class is a class from which you cannot create an object. It is typically\
    \ missing one or more elements required to create a fully functioning object.\n\
    In contrast a non-abstract (or concrete) class leaves nothing undefined and can\
    \ be used to create a working object.\nYou may therefore wonder what use an abstract\
    \ class is?\nThe answer is that you can group together elements which are to be\
    \ shared among a number of classes, without providing a complete implementation.\
    \ In addition, you can force subclasses to provide specific methods ensuring that\
    \ implementers of a subclass at least supply appropriately named methods. You\
    \ should therefore use abstract classes when:\n\n- you wish to specify data or\
    \ behaviour common to a set of classes, but insufficient for a single instance,\n\
    - you wish to force subclasses to provide specific behaviour.\n\nIn many cases,\
    \ the two situations go together. Typically, the aspects of the class to be defined\
    \ as abstract are specific to each class, while what has been implemented is common\
    \ to all classes.\n\n## 25.3 Abstract Base Classes in Python\n\nAbstract Base\
    \ Classes (or ABCs as they are sometimes referred to) cannot be instantiated themselves\
    \ but can be extended by subclasses. These subclasses can be concrete classes\
    \ or can themselves be Abstract Base Classes (that extend the concept defined\
    \ in the root Abstract Base Class).\n\nAbstract Base Classes can be used to define\
    \ generic (potentially abstract) behaviour that can be mixed into other Python\
    \ classes and act as an abstract root of a class hierarchy. They can also be used\
    \ to provide a more formal way of specifying behaviour that must be provided by\
    \ a concrete class.\n\nAbstract Base Classes can have:\n\n- Zero or more abstract\
    \ methods or properties (but are not required to)\n- Zero or more concrete methods\
    \ and properties.\n- Both *private* and *protected* attributes (following the\
    \ single underscore and double underscore conventions).\n\nABCs can also be used\
    \ to specify a specific interface or formal protocol. If an ABC defines any abstract\
    \ methods or abstract properties, then the subclasses must provide implementations\
    \ for all such abstract elements.\n\nThere are many built-in ABCs including (but\
    \ not limited to):\n\n- Data structures (`collection` module),\n- Numbers module,\n\
    - Streams (IO module).\n\nIn fact, ABCs are widely used internally within Python\
    \ itself, and many developers use ABCs without ever knowing they exist or understanding\
    \ how to define them.\n\nIndeed, ABCs are not widely used by developers building\
    \ systems with Python although this is in part because they are most appropriate\
    \ to those building libraries, particularly those that are expected to be extended\
    \ by developers themselves.\n\n### 25.3.1 Subclassing an ABC\n\nTypically, an\
    \ Abstract Base Class will need to be imported from the module in which it is\
    \ defined; of course, if the ABC is defined in the current module then this will\
    \ not be necessary.\n\nAs an example, the `collections.MutableSequence` class\
    \ is an ABC; this is an ABC for a sequence of elements that can be modified (mutable)\
    \ and iterated over. We can use this as the base class for our own type of collection\
    \ which we will call a Bag, for example:\n\n```python\nfrom collections import\
    \ MutableSequence\n\nclass Bag(MutableSequence) :\n    pass\n```\n\nIn this example\
    \ we are importing the MutableSequence from the collections module. We then define\
    \ the class Bag as extending the MutableSequence Abstract Base Class. For the\
    \ moment we are using the special Python keyword pass as a place holder for the\
    \ body of the class.\n\nHowever, this means that the Bag class is actually also\
    \ an abstract class as it does not implement any of the abstract methods in the\
    \ MutableSequence ABC.\n\nPython, however, does not validate this at import time;\
    \ instead it validates it at runtime when an instance of the type is to be created.\n\
    \nIn this case, the Bag class does not implement the abstract methods in MutableSequence\
    \ and thus if a program attempts to create an instance of Bag, then the following\
    \ error would be raised:\n\n```\nTraceback (most recent call last):\n  File \"\
    /pythonintro/abstract/Bag.py\", line 10, in <module>\n    main()\n  File \"/pythonintro/abstract/Bag.py\"\
    , line 7, in main\n    bag = Bag()\nTypeError: Can't instantiate abstract class\
    \ Bag with abstract methods __delitem__, __getitem__, __len__, __setitem__, insert\n\
    ```\n\nAs can be seen this is a rather more formal requirement than we saw with\
    \ protocols; if you don't implement all the methods defined as abstract in the\
    \ parent class then you can't create an instance of the class you are defining\
    \ (because it is also abstract).\n\nWe can define a method for each of the abstract\
    \ classes in the Bag class and then we will be able to create an instance of the\
    \ class, for example:\n\n```python\nfrom collections import MutableSequence\n\n\
    class Bag(MutableSequence) :\n\n    def __getitem__(self, index) :\n        pass\n\
    \n    def __delitem__(self, index) :\n        pass\n\n    def __len__(self) :\n\
    \        pass\n\n    def __setitem__(self, index, value) :\n        pass\n\n \
    \   def insert(self, index, value) :\n        pass\n```\n\nThis version of `Bag`\
    \ meets all the requirements imposed on it by the ABC `MutableSequence`; that\
    \ is, it implements each of the special methods listed and the `insert` method.\
    \ The class `Bag` can now be considered to be a concrete class.\nHowever, in this\
    \ case the methods themselves don't do anything (they again use the Python keyword\
    \ `pass` which acts as a placeholder for the code to implement each method). However,\
    \ we can now write:\n\n```python\nbag = Bag()\n```\n\nAnd the application will\
    \ not generate an error message.\nAt this point we could now progress to implementing\
    \ each method such that it provides an appropriate implementation of the `Bag`.\n\
    \n### 25.3.2 Defining an Abstract Base Class\n\nAn Abstract Base Class can be\
    \ defined by specifying that the class has a metaclass; typically, `ABCMeta`.\
    \ The `ABCMeta` metaclass is provided by the `abc` module.\nThe metaclass is specified\
    \ using the `metaclass` attribute of the parent class list. This will create a\
    \ class that can be used as an ABC.\nThis is exactly how the ABCs in the `_collections_abc.py`\
    \ file are implemented.\nThe following code snippet illustrates this idea. The\
    \ `ABCMeta` class is imported from the `abc` module. It is then used with the\
    \ class `Shape` via the `metaclass` attribute of the class inheritance list:\n\
    \n```python\nfrom abc import ABCMeta\n\nclass Shape(metaclass=ABCMeta):\n    def\
    \ __init__(self, id):\n        self.id = id\n```\n\nNote that at this point although\
    \ `Shape` is an ABC, it does not define any abstract elements and so can actually\
    \ be instantiated just like any other concrete class. However, we will next define\
    \ some abstract methods for the `Shape` ABC.\nTo define an abstract method, we\
    \ need to also import the `abstractmethod` decorator from the `abc` module (if\
    \ we want to define an abstract property then we need to add `@property` to an\
    \ appropriate abstract method). Import the `abstractmethod` decorator is illustrated\
    \ below:\n\n```python\nfrom abc import ABCMeta, abstractmethod\n```\n\nWe can\
    \ now expand the definition of our `Shape` class:\n\n```python\nfrom abc import\
    \ ABCMeta, abstractmethod\n\nclass Shape(metaclass=ABCMeta):\n    def __init__(self,\
    \ id):\n        self._id = id\n\n    @abstractmethod\n    def display(self): pass\n\
    \n    @property\n    @abstractmethod\n    def id(self): pass\n```\n\nThe class\
    \ `Shape` is now an Abstract Base Class and requires that any subclass must provide\
    \ an implementation of the method `display()` and the property `id` (otherwise\
    \ the subclass will automatically become abstract).\n\nThe class `Circle` is a\
    \ concrete subclass of the `Shape` ABC; it thus provides a `__init__()` initialization\
    \ method, a display method and an id property (the `__init__()` method is used\
    \ to allow the `_id` attribute in the base class to be initialized).\n\n```python\n\
    class Circle(Shape):\n    def __init__(self, id):\n        super().__init__(id)\n\
    \n    def display(self):\n        print('Circle: ', self._id)\n\n    @property\n\
    \    def id(self):\n        \"\"\" the id property \"\"\"\n        return self._id\n\
    ```\n\nWe can now use the class `Circle` in an application:\n\n```python\nc =\
    \ Circle(\"circle1\")\nprint(c.id)\nc.display()\n```\n\nWe can instantiate the\
    \ `Circle` class as it is concrete and we know we can call the method `display()`\
    \ and access the property `id` on instances of `Circle`. The output from the above\
    \ code is thus:\n\n```\ncircle1\nCircle: circle1\n```"
  mdcn: "## 第25章\n抽象基类\n\n## 25.1 引言\n\n本章介绍抽象基类（也称为ABCs），该概念最初在Python 2.6中引入。\n抽象基类是一个不能被实例化的类，它预期被一个或多个子类扩展。这些子类随后将填补基类留下的任何空白。\n\
    抽象基类对于创建具有高度重用性的类层次结构非常有用，可以从层次结构的根类开始重用。\n\n## 25.2 抽象类的概念\n\n抽象类是一个你无法从中创建对象的类。它通常缺少创建一个功能完整的对象所需的一个或多个元素。\n\
    相比之下，非抽象（或具体）类没有未定义的内容，可以用来创建一个可工作的对象。\n因此你可能会想，抽象类有什么用？\n答案是，你可以将要在多个类之间共享的元素组合在一起，而无需提供完整的实现。此外，你可以强制子类提供特定的方法，确保子类的实现者至少提供适当命名的方法。因此，你应该在以下情况下使用抽象类：\n\
    \n- 你希望指定一组类共有的数据或行为，但对于单个实例来说又不够充分，\n- 你希望强制子类提供特定的行为。\n\n在许多情况下，这两种情况是并存的。通常，需要定义为抽象的类的方面是每个类特有的，而已经实现的内容是所有类共有的。\n\
    \n## 25.3 Python中的抽象基类\n\n抽象基类（或有时称为ABCs）本身不能被实例化，但可以被子类扩展。这些子类可以是具体类，也可以是抽象基类（扩展根抽象基类中定义的概念）。\n\
    \n抽象基类可用于定义通用的（可能是抽象的）行为，这些行为可以混入其他Python类，并充当类层次结构的抽象根。它们也可用于提供一种更正式的方式来指定具体类必须提供的行为。\n\
    \n抽象基类可以包含：\n\n- 零个或多个抽象方法或属性（但不是必需的）\n- 零个或多个具体方法和属性。\n- *私有*和*受保护*属性（遵循单下划线和双下划线约定）。\n\
    \nABCs也可用于指定特定的接口或正式协议。如果一个ABC定义了任何抽象方法或抽象属性，那么子类必须为所有这些抽象元素提供实现。\n\n有许多内置的ABCs，包括（但不限于）：\n\
    \n- 数据结构（`collection`模块），\n- 数字模块，\n- 流（IO模块）。\n\n事实上，ABCs在Python内部被广泛使用，许多开发者在使用ABCs时甚至不知道它们的存在或如何定义它们。\n\
    \n确实，ABCs并没有被使用Python构建系统的开发者广泛使用，尽管这部分是因为它们最适合那些构建库的人，特别是那些预期会被开发者自己扩展的库。\n\n\
    ### 25.3.1 继承ABC\n\n通常，抽象基类需要从定义它的模块导入；当然，如果ABC在当前模块中定义，则不需要这样做。\n\n例如，`collections.MutableSequence`类是一个ABC；这是一个用于可修改（可变）和可迭代的元素序列的ABC。我们可以将其用作我们自己类型的集合的基类，例如我们称之为Bag：\n\
    \n```python\nfrom collections import MutableSequence\n\nclass Bag(MutableSequence)\
    \ :\n    pass\n```\n\n在这个例子中，我们从collections模块导入MutableSequence。然后我们定义Bag类扩展MutableSequence抽象基类。目前我们使用特殊的Python关键字pass作为类体的占位符。\n\
    \n然而，这意味着Bag类实际上也是一个抽象类，因为它没有实现MutableSequence ABC中的任何抽象方法。\n\n然而，Python在导入时并不验证这一点；而是在运行时验证，当要创建该类型的实例时。\n\
    \n在这种情况下，Bag类没有实现MutableSequence中的抽象方法，因此如果程序尝试创建Bag的实例，则会引发以下错误：\n\n```\nTraceback\
    \ (most recent call last):\n  File \"/pythonintro/abstract/Bag.py\", line 10,\
    \ in <module>\n    main()\n  File \"/pythonintro/abstract/Bag.py\", line 7, in\
    \ main\n    bag = Bag()\nTypeError: Can't instantiate abstract class Bag with\
    \ abstract methods __delitem__, __getitem__, __len__, __setitem__, insert\n```\n\
    \n如上所示，这比我们在协议中看到的要求更为正式；如果你没有实现父类中定义为抽象的所有方法，那么你无法创建你正在定义的类的实例（因为它也是抽象的）。\n\n\
    我们可以在Bag类中为每个抽象类定义一个方法，然后我们将能够创建该类的实例，例如：\n\n```python\nfrom collections import\
    \ MutableSequence\n\nclass Bag(MutableSequence) :\n\n    def __getitem__(self,\
    \ index) :\n        pass\n\n    def __delitem__(self, index) :\n        pass\n\
    \n    def __len__(self) :\n        pass\n\n    def __setitem__(self, index, value)\
    \ :\n        pass\n\n    def insert(self, index, value) :\n        pass\n```\n\
    \n这个版本的`Bag`满足了ABC `MutableSequence`对其施加的所有要求；也就是说，它实现了列出的每个特殊方法和`insert`方法。类`Bag`现在可以被视为一个具体类。\n\
    然而，在这种情况下，方法本身什么也不做（它们再次使用Python关键字`pass`，它充当实现每个方法的代码的占位符）。但是，我们现在可以写：\n\n```python\n\
    bag = Bag()\n```\n\n应用程序将不会生成错误消息。\n此时，我们现在可以继续实现每个方法，使其为`Bag`提供适当的实现。\n\n###\
    \ 25.3.2 定义抽象基类\n\n抽象基类可以通过指定该类具有元类来定义；通常是`ABCMeta`。`ABCMeta`元类由`abc`模块提供。\n元类使用父类列表的`metaclass`属性指定。这将创建一个可用作ABC的类。\n\
    这正是`_collections_abc.py`文件中ABCs的实现方式。\n以下代码片段说明了这个想法。`ABCMeta`类从`abc`模块导入。然后通过类继承列表的`metaclass`属性与类`Shape`一起使用：\n\
    \n```python\nfrom abc import ABCMeta\n\nclass Shape(metaclass=ABCMeta):\n    def\
    \ __init__(self, id):\n        self.id = id\n```\n\n请注意，此时虽然`Shape`是一个ABC，但它没有定义任何抽象元素，因此实际上可以像任何其他具体类一样被实例化。然而，接下来我们将为`Shape`\
    \ ABC定义一些抽象方法。\n要定义抽象方法，我们还需要从`abc`模块导入`abstractmethod`装饰器（如果我们想定义抽象属性，则需要在适当的方法上添加`@property`）。导入`abstractmethod`装饰器如下所示：\n\
    \n```python\nfrom abc import ABCMeta, abstractmethod\n```\n\n我们现在可以扩展`Shape`类的定义：\n\
    \n```python\nfrom abc import ABCMeta, abstractmethod\n\nclass Shape(metaclass=ABCMeta):\n\
    \    def __init__(self, id):\n        self._id = id\n\n    @abstractmethod\n \
    \   def display(self): pass\n\n    @property\n    @abstractmethod\n    def id(self):\
    \ pass\n```\n\n类`Shape`现在是一个抽象基类，要求任何子类必须提供`display()`方法和`id`属性的实现（否则子类将自动成为抽象类）。\n\
    \n类`Circle`是`Shape` ABC的具体子类；因此它提供了一个`__init__()`初始化方法、一个display方法和一个id属性（`__init__()`方法用于允许初始化基类中的`_id`属性）。\n\
    \n```python\nclass Circle(Shape):\n    def __init__(self, id):\n        super().__init__(id)\n\
    \n    def display(self):\n        print('Circle: ', self._id)\n\n    @property\n\
    \    def id(self):\n        \"\"\" the id property \"\"\"\n        return self._id\n\
    ```\n\n我们现在可以在应用程序中使用类`Circle`：\n\n```python\nc = Circle(\"circle1\")\nprint(c.id)\n\
    c.display()\n```\n\n我们可以实例化`Circle`类，因为它是具体的，并且我们知道可以在`Circle`的实例上调用`display()`方法并访问`id`属性。因此，上述代码的输出是：\n\
    \n```\ncircle1\nCircle: circle1\n```"
