    # 19.3 Class Definitions


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_228_0.png)


    The Person class possesses two *attributes* (or instance variables) called *name*
    and *age*.


    There is also a special method defined called `__init__`. This is an initializer
    (also known as a constructor) for the class. It indicates what data must be supplied
    when an instance of the `Person` class is created and how that data is stored
    internally.


    In this case a *name* and an *age* must be supplied when an instance of the `Person`
    class is created.


    The values supplied will then be stored within an instance of the class (represented
    by the *special* variable `self`) in instance variables/attributes `self.name`
    and `self.age`. Note that the parameters to the `__init__` method are *local*
    variables and will disappear when the method terminates, but `self.name` and `self.age`
    are instance variables and will exist for as long as the object is available.


    Let us look for a moment at the special variable `self`. This is the first parameter
    passed into any method. However, when a method is called we do not pass a value
    for this parameter ourselves; Python does. It is used to represent the object
    within which the method is executing. This provides the context within which the
    method runs and allows the method to access the data held by the object. Thus
    `self` is the object itself.


    You may also be wondering about that term *method*. A method is the name given
    to behaviour that is linked directly to the `Person` class; it is not a free-standing
    function rather it is part of the definition of the class `Person`.


    Historically, it comes from the language Smalltalk; this language was first used
    to simulate a production plant and a method represented some behaviour that could
    be used to simulate a change in the production line; it therefore represented
    a *method* for making a change.'
  - '[PAGE 229]


    # 19.4 Creating Examples of the Class Person


    New instances/objects (examples) of the class `Person` can be created by using
    the name of the class and passing in the values to be used for the parameters
    of the initialization method (with the exception of the first parameter `self`
    which is provided automatically by Python).


    For example, the following creates two instances of the class Person:


    ```

    p1 = Person(''John'', 36)

    p2 = Person(''Phoebe'', 21)

    ```


    The variable `p1` holds a reference to the *instance or object* of the class `Person`
    whose attributes hold the values ''John'' (for the name attribute) and 36 (for
    the age attribute). In turn the variable `p2` references an instance of the class
    `Person` whose `name` and `age` attributes hold the values ''Phoebe'' and 21.
    Thus in memory we have:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_229_0.png)


    The two variables reference separate *instances* or examples of the class `Person`.
    They therefore respond to the same set of methods/operations and have the same
    set of attributes (such as `name` and `age`); however, they have their own values
    for those attributes (such as ''John'' and ''Phoebe'').


    Each instance also has its own unique identifier—that shows that even if the attribute
    values happen to be the same between two objects (for example, there happen to
    be two people called John who are both 36); they are still separate instances
    of the given class. This identifier can be accessed using the `id()` function,
    for example:


    ```

    print(''id(p1):'', id(p1))

    print(''id(p2):'', id(p2))

    ```


    When this code is run `p1` and `p2` will generate different identifiers, for example:


    ```

    id(p1): 4547191808

    id(p2): 4547191864

    ```


    Note that actual number generated may vary from that above but should still be
    unique (within your program).'
  - '[PAGE 230]


    # 19.5 Be Careful with Assignment


    Given that in the above example, p1 and p2 reference different instances of the
    class Person; what happens when p1 or p2 are assigned to another variable? That
    is, what happens in this case:


    ```

    p1 = Person(''John'', 36)

    px = p1

    ```


    What does px reference? Actually, it makes a complete copy of the value held by
    p1; however, p1 does not hold the instance of the class Person; it holds the address
    of the object. It thus copies the address held in p1 into the variable px. This
    means that both p1 and px now reference (point at) the same instance in memory;
    we there have this:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_230_0.png)


    This may not be obvious when you print p1 and px:


    ```

    print(p1)

    print(px)

    ```


    As this could just imply that the object has been copied:


    ```

    John is 36

    John is 36

    ```


    However, if we print the unique identifier for what is referenced by p1 and px
    then it becomes clear that it is the same instance of class Person:


    ```

    print(''id(p1):'', id(p1))

    print(''id(px):'', id(px))

    ```


    which prints out


    ```

    id(p1): 4326491864

    id(px): 4326491864

    ```


    As can be seen the unique identifier is the same.'
