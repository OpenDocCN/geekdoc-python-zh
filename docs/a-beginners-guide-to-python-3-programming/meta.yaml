  md: '# 36.3.3 The Namedtuple Container


    A namedtuple is a type of tuple (and thus immutable) that has a set of names for
    each member in the tuple (although the use of positional integer indexes is still
    available). As such it has some aspects of a dictionary in that each member is
    a key: value pair.


    To create a namedtuple you provide the name of the tuple type being created and
    then an iterable of a list of names for that tuple, for example:


    ```

    from collections import namedtuple


    # Declaring namedtuple()

    Student = namedtuple(''Student'', [''name'', ''age'', ''degree''])


    # Adding values

    undergrad_student = Student(''John'', ''21'', ''Computer Science'')

    postgrad = Student(name=''Denise'', age=25, degree=''PhD'')


    print(undergrad_student)

    print(postgrad)


    # Access using index

    print(f''Name via index (student[0]): {undergrad_student[0]}'')


    # Access using name

    print(f''Name via named member (student.name): {undergrad_student.name}'')


    # Can field out the field names using_fields

    print(undergrad_student._fields)

    ```


    This code example creates a new namedtuple called ''Student'' and stores it into
    a variable called Student. Note the capitalization, Student here represents a
    new namedtuple type and thus follows the capitalization convention for user defined
    types.


    The Student namedtuple had the members name, age and degree.


    When we create a named student instance we use the Student variable (which contains
    the newly created named tuple) and provide a value for the name, age and degree
    members. The first instance created for the undergraduate uses positional parameter
    passing to initialize the member values. The second example uses named parameter
    passing to do the same thing.


    When the namedtuple is printed out the default representation will illustrate
    the name of the type and each of the key-value pairs.


    Following this we illustrate how the values in the namedtuple can be accessed
    using both positional indexing and named member access. This [0] and .name both
    access the name element of the namedtuple Student.


    To finish the example, the code illustrates that it is possible to access a tuple
    of names in the namedtuple—this can be useful for iteration or display to a user.'
