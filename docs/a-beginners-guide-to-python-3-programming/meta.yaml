    \ `name`、`doc` 和 `module` 是装饰器返回的函数的属性。原始被装饰函数的名称和文档已经丢失。\n\n例如，回到最初的 logger 装饰器：\n\
    \n```python\ndef logger(func):\n    def inner():\n        print('calling ', func.__name__)\n\
    \        func()\n        print('called ', func.__name__)\n    return inner\n\n\
