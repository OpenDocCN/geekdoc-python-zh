    \n请注意，求一个数的平方根的一个简单方法是使用指数（或幂）运算符并乘以 0.5。\n\n# 第 17 章\n## 柯里化函数\n\n### 17.1 简介\n\
    \n柯里化是一种技术，它允许通过将一个或多个参数*绑定*到特定值，从现有函数创建新函数。这是 Python 中函数复用的主要来源，这意味着功能可以编写一次，放在一个地方，然后在多个其他情况下重复使用。\n\
    \n柯里化这个名字可能看起来很晦涩，但该技术是以 Haskell Curry（Haskell 编程语言也以他命名）的名字命名的。\n\n本章介绍了柯里化背后的核心思想，并探讨了如何在\
    \ Python 中实现柯里化。本章还介绍了闭包的概念以及它们如何影响柯里化函数。\n\n### 17.2 柯里化概念\n\n在抽象层面上，考虑一个接受两个参数的函数。这两个参数\
    \ `x` 和 `y` 在函数体内以 `x * y` 的形式与乘法运算符一起使用。例如，我们可能有：\n\n```python\noperation(x,\
    \ y): return x * y\n```\n\n这个 `operation()` 函数可能随后被这样使用：\n\n```python\ntotal =\
    \ operation(2, 5)\n```\n\n这将导致 5 乘以 2 得到 10。或者它可以被这样使用：\n\n```python\ntotal =\
    \ operation(10, 5)\n```\n\n这将导致 5 乘以 10 得到 50。\n\n如果我们需要将一个数字加倍，我们可以多次重用 `operation()`\
    \ 函数，例如：\n\n```python\noperation(2, 5)\noperation(2, 10)\noperation(2, 6)\noperation(2,\
    \ 151)\n```\n\n以上所有调用都会将第二个数字加倍。然而，我们必须记住提供 2，以便数字可以被加倍。但是，在 `operation()` 函数的任何调用之间，数字\
    \ 2 都没有改变。如果我们固定第一个参数始终为 2，这意味着我们可以创建一个新函数，该函数显然只接受一个参数（要加倍的数字）。例如，假设我们可以这样写：\n\
    \n```python\ndouble = operation(2, *)\n```\n\n这样我们现在可以写：\n\n```python\ndouble(5)\n\
    double(151)\n```\n\n本质上，`double()` 是 `operation()` 的别名，但这个别名为第一个参数提供了值 2，并将第二个参数留给未来调用\
    \ `double` 函数时填充。\n\n### 17.3 Python 与柯里化函数\n\nPython 中的柯里化函数是指其一个或多个参数已被*应用或绑定*到一个值的函数，从而创建一个比原始函数少一个参数的新函数。例如，让我们创建一个将两个数字相乘的函数：\n\
    \n```python\ndef multiply(a, b):\n    return a * b\n```\n\n这是一个通用函数，完全按照其描述执行；它将任意两个数字相乘。这些数字可以是任何两个整数或浮点数等。\n\
    因此，我们可以以正常方式调用它：\n\n```python\nprint(multiply(2, 5))\n```\n\n执行此语句的结果是：\n\n```\n\
    10\n```\n\n我们现在可以定义一个新方法，该方法接受一个函数和一个数字，并返回一个新的（匿名）函数，该函数接受一个*新*参数，并使用传入的数字和新参数调用传入的函数：\n\
    \n```python\ndef multby(func, num):\n    return lambda y: func(num, y)\n```\n\n\
    仔细观察这个函数；它使用或*绑定*了传入 `multby` 函数的数字到传入函数的调用，但它也定义了一个新变量 'y'，该变量必须在调用这个新的匿名函数时提供。然后它返回对匿名函数的引用作为\
    \ `multby` 的结果。\n\n`multby` 函数现在可以用于将 `multiply` 函数的第一个参数绑定到我们想要的任何值。例如，我们可以将其绑定到\
    \ 2，这样它将始终将第二个参数加倍，并将结果函数引用存储到属性 `double` 中：\n\n```python\ndouble = multby(multiply,\
    \ 2)\n```\n\n我们也可以将值 3 绑定到 `multiply` 的第一个参数，以创建一个将任何值三倍的函数：\n\n```python\ntriple\
    \ = multby(multiply, 3)\n```\n\n这意味着我们现在可以写：\n\n```python\nprint(double(5))\n\
    print(triple(5))\n```\n\n这将产生输出：\n\n```\n10\n15\n```\n\n你不仅限于只绑定一个参数；你可以用这种方式绑定任意数量的参数。\n\
    \n因此，柯里化函数对于从现有函数创建新函数非常有用。\n\n### 17.4 闭包\n\n现在你脑海中可能有一个问题：当一个函数引用在其定义作用域内但在其求值时不再可用的数据时会发生什么？这个问题通过一个称为*闭包*的概念的实现来回答。\n\
    \n在计算机科学（特别是编程语言）中，闭包（或词法闭包或函数闭包）是一个函数（或更严格地说，是对函数的引用）加上一个引用环境。这个引用环境记录了函数最初定义的上下文，如果需要，还记录了对该函数使用的每个非局部变量的引用。这些非局部或自由变量允许函数体引用函数外部的变量，但这些变量被该函数使用。这个引用环境是函数式语言与支持函数指针的语言（如\
    \ C）之间的区别特征之一。\n\n词法闭包的一般概念最早在 1960 年代发展起来，但直到 1970 年代才在 Scheme 语言中首次完全实现。此后，它被用于许多函数式编程语言，包括\
    \ LISP 和 Scala。\n\n在概念层面上，闭包允许函数引用在其最初定义的作用域中可用的变量，但在其执行的作用域中默认不可用。\n\n例如，在以下简单程序中，变量\
    \ `more` 定义在名为 `increase` 的函数体外部。这是允许的，因为该变量是一个*全局*变量。因此，变量 `more` 在定义点是*在作用域内*的。\n\
    \n```python\nmore = 100\n\ndef increase(num):\n    return num + more\n\nprint(increase(10))\n\
    more = 50\nprint(increase(10))\n```\n\n在我们的程序中，我们通过传入值 10 来调用 `increase` 函数。这执行了两次，在两次调用之间变量\
    \ `more` 被重置为 50。此程序的输出如下所示：\n\n```\n110\n60\n```\n\n请注意，函数执行时使用的是 `more` 的*当前*值，而不是函数定义时\
    \ `more` 的值。因此输出是 110 和 60，即 100 + 10 然后 50 + 10。\n\n这似乎很明显，因为变量 `more` 在与 `increase`\
    \ 引用的函数调用相同的函数中仍然在作用域内。\n\n然而，考虑以下示例：\n\n```python\ndef increment(num):\n    return\
    \ num + 1\n\ndef reset_function():\n    global increment\n    addition = 50\n\
    \    increment = lambda num: num + addition\n\nprint(increment(5))\nreset_function()\n\
    print(increment(5))\n```"
