  md: '# 27.8 Modules as Scripts


    ```

    x = 1 + 2

    print(''x is'', x)

    f1()

    f2()

    ```


    When this file is run directly, or loaded into the Python REPL, then the free-standing
    code will be executed and the output generated will be:


    ```

    Hello I am module 1

    x is 3

    f1[1]

    f2[1]

    ```


    This looks fine until you try to use `module1` with your own code; the free-standing
    code will still execute this if we now write:


    ```

    import module1


    module1.f1()

    ```


    where you might expect only to see the result of running the `f1()` function from
    `module1` you actually get:


    ```

    Hello I am module 1

    x is 3

    f1[1]

    f2[1]

    f1[1]

    ```


    The first 4 lines are run when `module1` is loaded as they are free standing executable
    statements within the module.


    We can of course remove the free-standing code; but what if we sometimes want
    to run `module1` as a script and sometimes use it as a module imported into other
    modules?


    In Python we can distinguish between when a file is loaded as a module and when
    it is being run as a standalone script. This is because Python sets the module
    property `__name__` to the name of the module when it is being loaded as a module;
    but if a file is being run as a standalone script (or the entry point of an application)
    then the `__name__` is set to the string `__main__`. This is partly because historically
    `main()` has been the entry point for applications in numerous other languages
    such as C, C++, Java and C#.


    We can now determine whether a module is being loaded or run as a script / main
    application by checking the `__name__` property of the module (which is directly
    accessible from within a module). If the module is the `__main__` entry point
    run some code; if it is not then do something else.


    For example,'
