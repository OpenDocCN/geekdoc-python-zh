  md: "# 24.4 Public Interface to Properties\n\nAlthough we now have a more formal\
    \ interface to the attributes held by an instance of the class Person; it is rather\
    \ ungainly:\n\n```\nperson = Person('John', 54)\nprint(person)\nprint(person.get_age())\n\
    print(person.get_name())\n```\n\nWe end up having to write more code and although\
    \ there is an argument that it makes the code more obvious (i.e., person.get_age()\
    \ can be read as get the age of the person object); it is somewhat verbose and\
    \ you have to remember to include the parentheses ('()').\n\nTo get around this\
    \ a concept known as Properties was introduced in Python 2.2. In the original\
    \ syntax for this it was possible to add an addition line of code to the class\
    \ that told Python that you wanted to provide a new property and that specific\
    \ methods were to be used to set and get the values of this property.\n\nThe syntax\
    \ for defining a property in this way is:\n\n```\n<property_name> = property(fget=None,\
    \ fset=None, fdel=None, doc=None)\n```\n\nWhere fget indicates the getter function,\
    \ fset the setter function fdel the function to be used to delete a value and\
    \ doc provides documentation on the property.\n\nWe can modify our Person class\
    \ so that age is now a property (note a common convention is that if the attribute\
    \ is named _age, the methods are named get_age and set_age and the property will\
