    Distance[3.0]\nDistance[1]\nDistance[6]\n```\n\n# Chapter 24\nPython Properties\n\
    \n## 24.1 Introduction\n\nMany object-oriented languages have the explicit concept\
    \ of encapsulation; that is the ability to hide data within an object and only\
