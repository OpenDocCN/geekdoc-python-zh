    # 37.3 Data Structures


    We will look at how the Python collection types can be used as both a queue and
    a stack but first we need to define both these ADTs:


    +   - **Queue** is an ADT that defines how a collection of entities are managed
    and maintained. Queues have what is known as a First-In-First-Out (or FIFO) behaviour
    that is the first entity added to a queue is the first thing removed from the
    queue. Within the queue the order in which the entities were added is maintained.

    - **Stack** is another ADT but this time it has a Last-In-First-Out (or LIFO)
    behaviour. That is the most recently added entity to the stack will be the next
    entity to be removed. Within the stack the order that the entities were added
    in is maintained.


    # 37.4 Queues


    Queues are very widely used within Computer Science and in Software Engineering.
    They allow data to be held for processing purposes where the guarantee is that
    the earlier elements added will be processed before later ones.

    There are numerous variations on the basic queue operations but in essence all
    queues provide


    +   - Queue creation.

    - Add an element to the back of the queue (known as enqueuing).

    - Remove an element from the front of the queue (known as dequeuing).

    - Find out the length of the queue.

    - Check to see if the queue is empty.

    - Queues can be of fixed size or variable (growable) in size.


    The basic behaviour of a queue is illustrated by


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_426_0.png)


    Here there are five elements in the queue, one element has already been removed
    from the front and another is being added at the back. Note that when one element
    is removed from the front of the queue all other element moved forward one position.
    Thus, the element that was the second to the front of the queue becomes the front
    of the queue when the first element is dequeued.'
  - '[PAGE 427]


    Many queues also allow features such as


    +   - *Peek* at the element at the front of the queue (that is see what the element
    is but do not remove it from the queue).

    - Provide *priorities* so that elements with a higher priority are not added to
    the back of the queue but to a point in the middle of the queue related to their
    priority.


    # 37.4.1 Python List as a Queue


    The Python list container can be used as a queue using the existing operations
    such as `append()` and `pop()`, for example:


    ```

    queue = [] # Create an empty queue

    queue.append(''task1'')

    print(''initial queue:'', queue)

    queue.append(''task2'')

    queue.append(''task3'')

    print(''queue after additions:'', queue)

    element1 = queue.pop(0)

    print(''element retrieved from queue:'', element1)

    print(''queue after removal'', queue)

    ```


    The output of which is


    ```

    initial queue: [''task1'']

    queue after additions: [''task1'', ''task2'', ''task3'']

    element retrieved from queue: task1

    queue after removal [''task2'', ''task3'']

    ```


    Note that each *task* was added to the end of the queue, but the first task obtained
    from the queue was task 1.


    # 37.4.2 Defining a Queue Class


    In the last section we used the `List` class as a way of providing a queue; this
    approach does work but it is not obvious that we are using the list as a queue
    (with the exception of the name of the variable that we are holding the List in).
    For example we have used `pop(0)` to dequeue an element from the queue and we
    have used `append()` to enqueue an element. In addition there is nothing to stop
    a programmer forgetting to use `pop(0)` and instead using `pop()` which is an
    easy mistake to make and which will remove the most recently added item from the
    queue.


    It would be better to create a new data type and ensure that this data provides
    the queue like behaviour and hide the list inside this data type.'
  - "[PAGE 428]\n\nWe can do this by defining our own Queue class in Python.\n\n```\n\
    class Queue:\n\n    def __init__(self):\n        self._list = [] # initial internal\
    \ data\n\n    def enqueue(self, element):\n        self._list.append(element)\n\
    \n    def dequeue(self):\n        return self._list.pop(0)\n\n    def __len__(self):\n\
    \        \"\"\" Supports the len protocol \"\"\"\n        return len(self._list)\n\
    \n    def is_empty(self):\n        return self.__len__() == 0\n\n    def peek(self):\n\
    \        return self._list[0]\n\n    def __str__(self):\n        return 'Queue:\
    \ ' + str(self._list)\n```\n\nThis Queue class internally holds a list. Note we\
    \ are using the convention that the internal list instance variable name is preceded\
    \ by an underbar ('_'), thereby indicating that no one should access it directly.\n\
    \nWe have also defined methods for dequeuing and enqueuing elements to the queue.\
    \ To complete the definition, we have also defined methods for checking the current\
    \ length of the queue, whether the queue is empty or not, allowing the element\
    \ at the front of the queue to be peeked at and of course proving a string version\
    \ of the queue for printing.\n\nNote that the `is_empty()` method uses the `__len__()`\
    \ method when determining if the queue is empty; this is an example of an important\
    \ idea; only define something once. As we want to use the length of the queue\
