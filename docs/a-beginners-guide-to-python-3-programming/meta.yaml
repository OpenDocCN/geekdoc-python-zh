  - '[PAGE 512]


    The problem is that the *name* of the variable list has hidden (or shadows) the
    *name* of the built-in function `list`. Thus when we attempt to call `list()`
    Python find the variable list containing the `List` data structure which it then
    tries to execute at which point the error is generated.


    Most IDEs will warn you that you are shadowing/hiding a built-in name; you can
    use this to change the name of your variable, function or class. For example:


    ![](img/bf6e2b02eb6625321d9af5664cea2d5d_512_0.png)


    The above uses PyCharm, and the IDE is indicating that we are shadowing the built-in
    *name* list and that we can ''rename the element''.


    # 45.10 Mistake #8: Hiding Built-In Modules


    The way in which Python finds modules to load is by searching a predefined series
    of locations. By default, this set of locations looks in the current directory
    before searching within the Python installation for built-in modules.


    As Python modules are files, for example the module `sys` is defined in a file
    called `sys.py`, it is possible to create a file in the *current* directory with
    the same name as a system provided module. For example, `sys` is a built-in module
    however if we do have a file called `sys.py` in the current directory, if our
    code references the `sys` module:


    ```

    python

    import sys

    ```


    Python will load the local file instead of the system module. When the programmer
    then tries to access the functions and classes defined within `sys` they would
    find that they were not available.


    This can be very confusing the first time this happens. However, if the programmer
    hangs over the import IDEs will often indicate where the import is coming from:'
