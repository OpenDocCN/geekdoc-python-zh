    # Chapter 38

    Map, Filter and Reduce


    # 38.1 Introduction


    Python provides three functions that are widely used to implement Functional Programming
    style solutions in combinations with collection container types.

    These functions are what are known as higher-order functions that take both a
    collection and a function that will be applied in various ways to that collection.

    This chapter introduces three functions `filter()`, `map()` and `reduce()`.


    # 38.2 Filter


    The `filter()` function is a higher-order function that takes a function to be
    used to filter out elements from a collection. The result of the `filter()` function
    is a new iterable containing only those elements selected by the test function.

    That is, the function passed into `filter()` is used to test all the elements
    in the collection that is also passed into filter. Those where the test filter
    returns `True` are included in the list of values returned. The result returned
    is a new iterable consisting of all elements of this list that satisfy the given
    test function. Note that the order of the elements is preserved.

    The syntax of the `filter()` function is


    ```

    filter(function, iterable)

    ```


    Note that the second argument to the filter function is anything that implements
    the iterable protocol which includes all lists, tuples, sets and dictionaries
    or and many other types, etc.'
