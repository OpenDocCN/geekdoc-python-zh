    ## Curried Functions\n\n### 17.1 Introduction\n\nCurrying is a technique which\
    \ allows new functions to be created from existing functions by *binding* one\
    \ or more parameters to a specific value. It is a major source of reuse of functions\
    \ in Python which means that functionality can be written once, in one place and\
    \ then reused in multiple other situations.\n\nThe name currying may seem obscure,\
