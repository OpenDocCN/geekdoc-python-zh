    ```\n\nThis loop will count down from 10 to zero. However, because the Python\
    \ for loop is *open-closed*, this means that the number 10 will be included, but\
    \ the number zero will not be included. The expression `range(10, 0)` actually\
    \ creates a range of the numbers 10 through to 1—it does not include the zero.\
