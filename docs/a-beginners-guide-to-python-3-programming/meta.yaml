    print(data1)

    ```


    This produces the following output:


    ```

    [1, 2, 3, 4, 5]

    ```


    To avoid this, you can create a *copy* of the original list. This will create
    a new list and copy the values the original list contains over to the new list.
    For example:


    ```

    data1 = [1, 2, 3, 4]

    data2 = data1.copy()

    data2.append(5)

    print(data1)

    ```


    Now the output from this is


    ```

    [1, 2, 3, 4]

    ```


    If the list contains elements that can themselves hold values you may want to
    use a `deepcopy()` for example `data1.deepcopy()`.'
