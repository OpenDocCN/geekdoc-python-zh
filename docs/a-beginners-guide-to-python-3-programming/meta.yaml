    \  result = subtract(n1, n2)\nelif menu_choice == '3':\n    result = multiply(n1,\
    \ n2)\nelif menu_choice == '4':\n    result = divide(n1, n2)\n```\n\n`if` 语句的每个部分都调用不同的函数，但它们都将返回的值存储到\
    \ `result` 变量中。\n现在，我们可以将其添加到计算循环中，创建一个功能完整的计算器循环：\n\n```\nfinished = False\n\
    while not finished:\n    result = 0\n    menu_choice = get_operation_choice()\n\
    \    n1, n2 = get_numbers_from_user()\n    if menu_choice == '1':\n        result\
