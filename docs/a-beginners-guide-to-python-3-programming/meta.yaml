    # 32.5.8 The Pop() Method


    The syntax of the pop method is


    ```

    a.pop(index=-1)

    ```


    It removes an element from the list; however, it differs from the `remove()` method
    in two ways:


    +   - It takes an index which is the index of the item to remove from the list
    rather than the object itself.

    - The method returns the item that was removed as its result.


    An example of using the `pop()` method is given below:


    ```

    list6 = [''Once'', ''Upon'', ''a'', ''Time'']

    print(list6)

    print(list6.pop(2))

    print(list6)

    ```


    Which generates


    ```

    [''Once'', ''Upon'', ''a'', ''Time'']

    a

    [''Once'', ''Upon'', ''Time'']

    ```


    An overload of this method is just.


    ```

    <list>.pop()

    ```'
