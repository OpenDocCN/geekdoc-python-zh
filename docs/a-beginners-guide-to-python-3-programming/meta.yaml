  md: '# # Chapter 29

    Decorators


    # ## 29.1 Introduction


    The idea behind Decorators comes from the *Gang of Four* Design Patterns book
    (so-called as there were four people involved in defining these design patterns).
    In this book numerous commonly occurring object oriented design patterns are presented.
    One of these design patterns is the Decorator design pattern.


    The Decorator pattern addressed the situation where it is necessary to add additional
    behaviour to specific objects. One way to add such additional behaviour is to
    decorate the objects created with types that provide the extra functionality.
    These decorators wrap the original element but present exactly the same interface
    to the user of that element. Thus the Decorator Design pattern extends the behaviour
    of an object without using sub classing. This decoration of an object is transparent
    to the decorators’ clients.


    In Python Decorators are functions that take another function (or callable object)
    and return a third function representing the decorated behaviour.


    This chapter introduces decorators, how they are defined, how they are used and
    presents built-in decorators.


    # ## 29.2 What Are Decorators?


    A Decorator is a piece of code, that is used to mark a callable object (such as
    a function, method, class or object) typically to enhance or modify its behaviour
    (potentially replacing it). It thus *decorates* the original behaviour.


    Decorators are in fact callable objects themselves and as such behave more like
    macros that can be applied to callable objects that then return a new callable
    object (typically a new function).


    The basic idea is illustrated in the following diagram:'
