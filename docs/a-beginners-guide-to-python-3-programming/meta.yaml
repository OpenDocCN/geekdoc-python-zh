  md: "Python will search though each of these locations in turn to find the named\
    \ module; it will use the first module it finds. The actual search algorithm is:\n\
    \n+   - The current directory.\n- If the module isn't found, Python then searches\
    \ each directory in the shell variable `PYTHONPATH`.\n- If all else fails, Python\
    \ checks the default path. On Unix / Linux this default path is normally `/usr/local/lib/python/`.\n\
    \nOne point to note about this search order is that it is possible to hide a system\
    \ provided module by creating a user defined on and giving it the same name as\
    \ the system module; this is because your own module will be found first and will\
    \ hide the system provided one.\n\nIn this case the `PYTHONPATH` will be used\
    \ to find built in Python modules under the Python installation, while our own\
    \ user defined modules will be found within the PyCharm project workspace directories.\n\
    \nIt is also possible to override the default `PYTHONPATH` variable. It is what\
    \ is known as an environment variable and so it can be set as a Unix / Linux or\
    \ Windows operating system environment variable which can then be picked up by\
    \ your Python environment. The syntax used to set the `PYTHONPATH` depends on\
    \ whether you are using Windows or Unix/Linux as it is set at the operating system\
    \ level:\n\nHere is a typical `PYTHONPATH` from a Windows system:\n\n```\nset\
    \ PYTHONPATH = c:\\python20\\lib;\n```\n\nAnd here is a typical `PYTHONPATH` from\
    \ a Unix /Linux system:\n\n```\nset PYTHONPATH = /usr/local/lib/python\n```\n\n\
    # 27.8 Modules as Scripts\n\nAny Python file is not only a module but also a Python\
    \ *script*. This means that it can be executed directly if required. For example,\
    \ the following is the contents of a file called `module1.py`:\n\n```\n\"\"\"\
    This is a test module\"\"\"\nprint('Hello I am module 1')\n\ndef f1():\n    print('f1[1]')\n\
    \ndef f2():\n    print('f2[1]')\n```"
