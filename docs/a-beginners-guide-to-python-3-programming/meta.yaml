    \ 生成器\n\n在许多情况下，预先获取所有待处理的数据是不合适的（或不可能的）（出于性能原因、内存原因等）。相反，基于某些底层数据集，按需惰性创建要迭代的数据可能更为合适。\n\
    \n生成器是一种*特殊*函数，可用于*生成*一系列值，这些值按需迭代（即在需要时才产生），而非预先生成。\n\n使一个函数成为*生成器函数*的唯一特征是使用了\
