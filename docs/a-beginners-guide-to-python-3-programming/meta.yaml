    \    elif menu_choice == '3':\n        result = multiply(n1, n2)\n    elif menu_choice\
    \ == '4':\n        result = divide(n1, n2)\n    print('Result:', result)\n   \
    \ print('==================')\n    finished = check_if_user_has_finished()\n\n\
    print('Bye')\n```\n\n## 14.10 运行计算器\n\n如果你现在运行计算器，系统会根据情况提示你输入。你可以尝试通过在需要数字时输入字符，或输入超出操作范围的值等方式来“破坏”计算器，它应该足够健壮以处理这些错误输入，例如：\n\
    \n```\nSimple Calculator App\nMenu Options are:\n    1. Add\n    2. Subtract\n\
    \    3. Multiply\n    4. Divide\n---------------------\nPlease make a selection:\
