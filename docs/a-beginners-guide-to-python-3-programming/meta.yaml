    when a module is loaded; typically this might execute some housekeeping code or
    set up behaviour required by the module. It should be noted that the module is
    only initialized the first time that it is loaded and thus the executable statements
    are only run once.


    If we forgot to include the import statement at the start of the file, then Python
    would not know to use the `utils` module. We would thus generate an error indicating
    that the `utils` element is not known: `NameError: name ''utils'' is not defined`.


    There can be any number of modules imported into a file; these can be both user
    defined modules and system provided modules. The modules can be imported via separate
    import statements or by supplying a comma separated list of modules:


    ```

    import utils

    import support

    import module1, module2, module3

    ```


    A common convention is to place all import statements at the start of a file;
    however, this is only a convention and `import` statements can be placed anywhere
    in a file prior to where the modules features are required. It is a common enough
    convention, however, that tools such as PyCharm will indicate a style issue if
    you do not put the imports at the start of the file.


    # 27.4.2 Importing from a Module


    One issue with the previous example is that we have had to keep referring to the
    facilities provided by the `utils` module as `utils.< thing of interest >`; which
    while making it very clear that these features come from the `utils` module, is
    a little tedious. It is the equivalent of referring to a person via their full
    name every time we speak to them. However, if they are the only other person in
    the room then we don''t usually need to be so formal; we could just use their
    first name.


    A variant of the `import` statement allows us to import *everything* from a particular
    module and remove the need to prefix the modules functions or classes with the
    module name, for example:


    ```

    from <module name> import *

    ```


    Which can be read as from `<module name>` import everything in that module and
    make it directly available.


    ```

    from utils import *


    printer(default_shape)

    shape = Shape(''circle'')

    printer(shape)

    ```'
