  md: "# 26.5.3 Catch Any Exception\n\nIt is also possible to specify an except clause\
    \ that can be used to catch any type of error or exception, for example:\n\n```\n\
    try:\n    my_function(6, 0)\nexcept IndexError as e:\n    print(e)\nexcept:\n\
    \    print('Something went wrong')\n```\n\nThis must be the last except clause\
    \ as it omits the exception type and thus acts as a wildcard. It can be used to\
    \ ensure that you get notified that an error did occur—although you do not know\
    \ what type of error it actually was; therefore, use this feature with caution.\n\
    \n# 26.5.4 The Else Clause\n\nThe try statement also has an optional else clause.\
    \ If this is present, then it must come after all except clauses. The else clause\
    \ is executed if and only if no exceptions were raised. If any exception was raised\
    \ the else clause will not be run. An example of the else clause is shown below:\n\
    \n```\ntry:\n    my_function(6, 2)\nexcept ZeroDivisionError as e:\n    print(e)\n\
    else:\n    print('Everything worked OK')\n```\n\nIn this case the output is\n\n\
    ```\nmy_function in\nmy_function out\nEverything worked OK\n```\n\nAs you can\
    \ see the print statement in the else clause has been executed, however, if we\
    \ change the my_function() call to pass in a zero as the second parameter (which\
    \ will cause the function to raise a ZeroDivisionError), then the output is\n\n\
    ```\nmy_function in\ndivision by zero\n```\n\nAs you can see the else clause was\
    \ not run but the except handler was executed."
