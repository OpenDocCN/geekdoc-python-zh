    \ that overall problem down into smaller instances of the same problem. The overall\
    \ result is then generated by combining together the results obtained for the\
    \ smaller problems.\n\n## 10.2 Recursive Behaviour\n\nA recursive solution in\
    \ a programming language such as Python is one in which a function calls itself\
    \ one or more times in order to solve a particular problem. In many cases the\
    \ result of calling itself is combined with the function's current state to return\
    \ a result.\n\nIn most cases the recursive call involves calling the function\
    \ but with a smaller problem to solve. For example, a function to traverse a tree\
