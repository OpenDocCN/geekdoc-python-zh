    \ variable then we have a problem.\n\nThis problem can be solved using the `nonlocal`\
    \ keyword. This indicates that a variable is not global but is also not local\
    \ to the current function, and Python should look within the scope in which the\
    \ function is defined to fund a local variable with the same name:\n\nIf we now\
    \ declare `title` as `nonlocal` in the `inner()` function, then it will use the\
