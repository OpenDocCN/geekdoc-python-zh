  md: '# 5.7 String Formatting


    Python provides a sophisticated formatting system for strings that can be useful
    for printing information out or logging information from a program.


    The string formatting system uses a special string known as the *format* string
    that acts as a pattern defining how the final string will be laid out. This format
    string can contain placeholders that will be replaced with actual values when
    the final string is created. A set of values can be applied to the format string
    to fill the placeholders using the `format()` method.


    The simplest example of a *format* string is one that provides a single placeholder
    indicated by two curly braces (e.g., `{}`). For example, the following is a *format*
    string with the pattern ''Hello'' followed by a placeholder:


    ```

    format_string = ''Hello {}!''

    ```


    This can be used with the `format()` string method to provide a value (or populate)
    the placeholder, for example:


    ```

    print(format_string.format(''Phoebe''))

    ```


    The output from this is:


    ```

    Hello Phoebe!

    ```


    A *format* string can have any number of placeholders that must be populated;
    for example, the next example has two placeholders that are populated by providing
    two values to the `format()` method:


    ```

    # Allows multiple values to populate the string

    name = "Adam"

    age = 20

    print("{} is {} years old".format(name, age))

    ```


    In this case the output is:


    ```

    Adam is 20 years old

    ```


    It also illustrates that variables can be used to provide the values for the format
    method as well as literal values. A literal value is a fixed value such as 42
    or the string ''John''.


    By default the values are bound to the placeholders based on the order that they
    are provided to the `format()` method; however this can be overridden by providing
    an *index* to the placeholder to tell it which value should be bound, for example:


    ```

    # Can specify an index for the substitution

    format_string = "Hello {1} {0}, you got {2}%"

    print(format_string.format(''Smith'', ''Carol'', 75))

    ```


    In this case the second string ''Carol'' will be bound the first placeholder;
    note that the parameters are numbered from *zero* not one.'
