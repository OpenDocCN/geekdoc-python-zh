  md: '![](img/bf6e2b02eb6625321d9af5664cea2d5d_45_0.png)


    # 2.1.7 Games Programming


    Python has also been used for games development with several well-known games
    titles depending on it in one way or another. For example, Battlefield 2 by Digital
    Illusions CE is a military simulator first-person shooter game. Within this game,
    Python is used to handle portions of the game logic for Battlefield Heroes involving
    game modes and scoring. Other games that use Python include Civilisation IV, Pirates
    of the Caribbean Online and Overwatch. The pygame library is probably the most
    widely used library for creating games within the Python world. There are also
    many extensions available for pygame that help to create a wide range of different
    types of games. Pygame is built on top of the SDL library (or Simple Directmedia
    Layer). SDL is a cross platform development library designed to provide access
    to audio, keyboards, mouse, joystick and graphics hardware via OpenGL and Direct3D.
    To promote portability, pygame also supports a variety of additional backends
    including WinDIB, X11, Linux Frame Buffer, etc.


    # 2.1.8 Integration Testing Framework


    Morgan Stanley have developed a Python integration testing framework called Testplan
    which they have open sourced and made available through GitHub. Testplan is designed
    to simplify the process of configuring and driving integration tests for a range
    of programming languages and technologies. It supports driving integration tests
    that require messaging services, RESTful services, databases, files for code written
    in Python, C/C++, Java, etc.


    # 2.1.9 Academic Research


    Python is widely used within the academic community to support research work,
    not only within Computer Science departments but also across a range of different
    disciplines including Mechanical Engineering, Aerospace Engineering, Architecture,
    Pharmacology, Medicine, etc. In these settings it has been used to help develop
    distributed analysis systems, identify patterns in experiments of laboratory data,'
  merge: -1
  pgno: 45
- img_proc: true
  md: 'evolve designs toward optimal solutions, provide natural language frontends
    to research applications (e.g., using the Python NLTK library), etc.


    # 2.1.10 Web Services


    Python is also widely used as a server-side language for the creation of web services,
    whether these are RESTful services or the newer GraphQL-based services. There
    are a range of frameworks available to help develop such services including Flask,
    Django and CherryPy. Flask and CherryPy are lightweight frameworks that can be
    used to create RESTful services, whereas Django is a full-stack web framework
    aimed at developing not just web services but full blown websites. A wide range
    of organizations used Python in this way for example Reddit, Spotify and Instagram.


    # 2.1.10.1 DevOps


    DevOps is another hot trend at the moment; it represents the combination of software
    developers and operations working together usually to automate operations processes
    that were previously either handled manually or were executed as individual steps.
    Python is one of the key programming languages used within the DevOps world. It
    can be used as a scripting language to help automate operations activities as
    well as a tool to analyze production data and for data visualizations.


