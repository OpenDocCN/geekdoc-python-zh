    \ skyfield import api\nimport numpy as np\nfrom skyfield.api import N, S, E, W,\
    \ load, wgs84\nfrom skyfield.api import Topos, load, Angle, GREGORIAN_START\n\
    import math\nfrom scipy.ndimage import rotate\nimport calendar\nfrom tabulate\
