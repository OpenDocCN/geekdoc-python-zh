    \ > 100:\n    print(\"Score needs review\")\nelse:\n    print(\"Score is acceptable\"\
    )\n```\n\n### 输出\n\n```\nScore needs review\n```\n\n这些基本控制结构使你的 Python 程序能够做出决策并对不同的输入做出反应。这展示了\
