    \ for humans but not suitable for numerical calculations. To perform further computations,\
    \ like determining moon visibility, we need the altitude in decimal degrees. To\
    \ do this, simply access the .degrees attribute of the moon_alt variable:\n\n\
    ```\nprint(moon_alt.degrees)\n```\n\n[12.4545324]\n\nThe next important parameter\
    \ for new moon sighting is arc of vision. The arc of vision is the altitude difference\
    \ between the sun's altitude and moon's altitude. First, determine the sun's altitude\
    \ during sunset.\n\n```\nsun_astro = location.at(ts.utc(year, month, day, h_sunset,\
    \ m_sunset)).observe(moon)\nsun_app = sun_astro.apparent()\nsun_alt, sun_az, distance\
    \ = sun_app.altaz()\nprint(sun_alt.degrees)\n```\n\n[-0.92325118]\n\nNext, the\
    \ difference between sun-moon altitude or Arc of Vision,\n\n```\narc_of_vision\
    \ = abs(moon_alt.degrees - sun_alt.degrees)\nprint(arc_of_vision)\n```\n\n[13.37778358]\n\
    \nThe arc of vision is 13.3778358. Next is the arc of light. The arc of light\
    \ is the angle of separation between sun and moon, or the elongation angle. The\
