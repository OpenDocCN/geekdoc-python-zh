    from astrometric to apparent position. Then, to determine the altitude of the
    sun, sun_alt, sun_az, distance = sun_app.altaz(), where sun_alt is the sun altitude,
    sun_az is the sun azimuth. distance is the apparent distance between the sun and
    earth.'
