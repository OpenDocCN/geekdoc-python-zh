    \ as plt\nfrom matplotlib.colors import LinearSegmentedColormap\nimport matplotlib.image\
    \ as mpimg\nfrom matplotlib.offsetbox import OffsetImage, AnnotationBbox\n```\n\
    \n### Load ephemeris and function\n\n```\nplanets = load('de440s.bsp')\nearth\
    \ = planets['earth']\nsun = planets['sun']\nmoon = planets['moon']\nh_maghrib\
    \ = 0\nm_maghrib = 0\nts = load.timescale()\neph = api.load('de440s.bsp')\n```\n\
    \nThe moon is loaded since we calculate the position of the moon. h_maghrib =\
    \ 0, m_maghrib = 0 is declared to mitigate some issue later. Then, input the related\
    \ variables.\n\n```\nlat_location = -1.9577\nlong_location = 30.1127\ntimezone\
    \ = 8\nyear = 2025\nmonth = 3\nday = 30\nele = 100\n```\n\nInput the location\
    \ info and refraction and elevation parameter.\n\n```\nlocation = earth + wgs84.latlon(lat_location,\
    \ long_location, elevation_m=0)\nfrom skyfield.units import Angle\nfrom numpy\
    \ import arccos\nfrom skyfield.earthlib import refraction\naltitude_m = ele\n\
    earth_radius_m = 6378136.6\nside_over_hypotenuse = earth_radius_m / (earth_radius_m\
    \ + altitude_m)\nh = Angle(radians=-arccos(side_over_hypotenuse))\nsolar_radius_degrees\
    \ = 16 / 60\nr = refraction(0.0, temperature_C=15.0, pressure_mbar=1030.0)\n```\n\
    \nDetermine the time of sunset.\n\n```\nt, y = almanac.find_settings(location,\
