- img_proc: true
  md: 'The formula for Qibla Calculation above can only be used for locations in Southeast
    Asia. This is because the calculation formula for calculating ($\Delta\lambda$)
    only considers conditions when a location is in the east longitude which has a
    value greater than the longitude of the Kaaba. To make the formula for calculating
    the direction of the Qibla can be used in all locations in the east and west longitudes,
    the distance from the longitude of the Kaaba to the longitude of the place ($\Delta\lambda$)
    is calculated using the following formula:


    $dev = abs(\lambda_{Location} - \lambda_{Kaabah})$  Equation 5.7


    Distance between Longitude, $\Delta\lambda = \begin{cases} 360 - dev, if \ dev
    > 180 \ dev, if \ dev \le 180 \end{cases}$  Equation 5.8


    The value of location longitude in the formula is positive if the location is
    in east longitude, and it is negative if the location is in west longitude.


    In the Universal Qibla Direction Calculation, the reference value of the Qibla
    direction ($\theta$) is not always from North to West. However, it can vary depending
    on the Qibla direction value ($\theta$) and the Longitude of the Place ($\lambda_{location}$).
    To find out the reference of Qibla direction, use the following provisions:


    Arah Mata Angin Kiblat = $\begin{cases} UB & if \ \theta > 0 \ and \ \lambda_{location}
    > \lambda_{Kaabah} \ UT & if \ \theta > 0 \ and \ \lambda_{location} \le \lambda_{Kaabah}
    \ UB & if \ \theta > 0 \ and \ \lambda_{location} < 0 \ and \ c \ge 180 \ UT &
    if \ \theta > 0 \ and \ \lambda_{location} < 0 \ and \ c < 180 \ SB & if \ \theta
    < 0 \ and \ \lambda_{location} > \lambda_{Kaabah} \ ST & if \ \theta < 0 \ and
    \ \lambda_{location} \le \lambda_{Kaabah} \ SB & if \ \theta < 0 \ and \ \lambda_{location}
    < 0 \ and \ c \ge 180 \ ST & if \ \theta < 0 \ and \ \lambda_{location} < 0 \
    and \ c < 180 \end{cases}$


    "UB" is a statement that the Qibla direction uses a reference from the north to
    the west.


    "SB" is a statement that the Qibla direction uses a reference from the south to
    the west.


    "UT" is a statement that the Qibla direction uses a reference from the north to
    the east.


    "ST" is a statement that the Qibla direction uses a reference from the south to
    the east.'
