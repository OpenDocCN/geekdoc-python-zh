  md: '# Istiwa’ A’zam and Rashdul Qibla 6


    Istiwa’ A’zam refers to the astronomical event when the sun is directly above
    the Kaaba in Makkah. During this moment, the shadow of any vertical object anywhere
    on Earth points directly away from the Kaaba, making it one of the most accurate
    methods for determining the Qibla (prayer direction). This phenomenon is not affected
    by Earth’s magnetic field, unlike compass-based Qibla methods, making it especially
    reliable.


    Istiwa’ A’zam happens twice a year, when the apparent path of the sun crosses
    the exact latitude of the Kaaba, which occurs on 28th May and 15th July approximately.
    On these dates, the sun passes directly overhead the Kaaba, around 12:16 p.m.
    (Saudi time).


    At the time of Istiwa’ A’zam: The sun is directly over the Kaaba. A vertical stick
    or object will cast a shadow that points exactly in the opposite direction of
    the Qibla. This method is free from magnetic disturbances, unlike a compass. Thus,
    shadows on these dates provide a natural, accurate Qibla direction, especially
    for mosques or homes without modern tools.


    However, since Istiwa’ A’zam only occurs twice a year, it is not always practical
    for everyday or long-term Qibla alignment. For this reason, Muslims use Rashdul
    Qibla, which refers to the general calculation of the Qibla direction using sun
    shadow. Rashdul Qibla refers to the determination of the Qibla direction using
    the sun’s position and the direction of its shadow. When the sun’s azimuth matches
    the azimuth of the Qibla, the shadow of any upright object will point directly
    opposite the Kaaba, effectively giving an accurate Qibla direction. This moment
    can be calculated for any location in the world, not just during the special events
    of Istiwa’ A’zam (when the sun is directly above the Kaaba). Thus, Rashdul Qibla
    can be used on many dates throughout the year.


    Modern tools like mobile compasses often suffer from magnetic interference, leading
    to significant inaccuracies, up to 20° in some cases. This could result in the
    prayer direction being off by over 1000 km from the Kaaba. In contrast, the sun’s
    position can be precisely calculated using astronomical algorithms and ephemeris
    data. This makes Rashdul Qibla:'
