    ```\n292.35° = 292° 21' 0\"\n```\n\n这种方法对于以标准化、人类友好的格式显示位置和角度非常有用。\n\n## 使用 PIP\
    \ 安装 Python 包\n\n当你开始编写 Python 程序时，你经常需要使用 Python 默认未包含的额外工具、库或框架。这些工具称为包。Python\
    \ 提供了一个强大的命令行工具 `pip`，帮助你轻松安装和管理这些包。\n\n### 什么是 pip？\n\npip 代表 \"Pip Installs\
    \ Packages\"。它是 Python 的官方包安装器。\n\n使用 pip，你可以：\n\n- 安装新的 Python 库（如 numpy、matplotlib、flask）\n\
    - 升级包\n- 卸载包\n- 检查已安装的包\n\n### 使用 pip 安装包\n\n你可以使用这个简单的命令从互联网安装一个 Python 包：\n\n\
