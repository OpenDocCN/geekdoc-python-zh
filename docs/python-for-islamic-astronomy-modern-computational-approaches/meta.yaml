    \ You can even include calculations:\n\n```\nlength = 5\nwidth = 3\nprint(f\"\
    The area is {length * width} square units.\")\n```\n\n### Output\n\n```\nThe area\
    \ is 15 square units.\n```\n\nFormatted strings make your code shorter, cleaner,\
    \ and easier to understand, especially when combining text and values. Sometimes\
    \ you want to control the number of decimal places shown. You can use format specifiers\
    \ like :.2f to round to 2 decimal places.\n\n```\nazimuth_kiblat = 292.347182\n\
    print(f\"Azimuth Kiblat: {azimuth_kiblat:.2f}\")\n```\n\n### Output\n\n```\nAzimuth\
    \ Kiblat: 292.35\n```\n\nIn {azimuth_kiblat:.2f}:\n\n- : starts the format\n-\
    \ .2f means **2 decimal places in floating-point format**\n\nThis is very useful\
    \ in math, geography, and science applications.\n\n## CONVERTING DECIMAL DEGREES\
    \ TO DEGREES, MINUTES, AND SECONDS\n\nIn many fields such as geography, surveying,\
    \ and navigation, angles are often represented not just in decimal degrees (e.g.,\
    \ 292.35°) but in a more traditional format: Degrees, Minutes, and Seconds (DMS).\
    \ While decimal degrees are easier for calculations, DMS format is more readable\
    \ and commonly used in GPS coordinates, navigation systems, and official land\
    \ records.\n\nGiven a decimal degree value:\n\n1. **Degrees:** The whole number\
    \ part of the decimal degree\n2. **Minutes:** Multiply the decimal part by 60,\
    \ then take the whole number\n3. **Seconds:** Multiply the remaining decimal by\
    \ 60 again\n\n### Example: Convert 292.35° to DMS\n\n1. **Degrees** = 292\n2.\
    \ **Decimal part** = 0.35\n3. **Minutes** = 0.35 × 60 = 21.0 → **21 minutes**\n\
    4. **Seconds** = 0.0 × 60 = 0 → **0 seconds**\n\n### Final Answer\n\n292.35° =\
    \ 292° 21' 0\"\n\nHere is a Python script that performs this conversion:\n\n```\n\
    decimal_degree = 292.35\n\n# Step 1: Get whole degrees\ndegrees = int(decimal_degree)\n\
    # Step 2: Get the decimal part and convert to minutes\ndecimal_part = decimal_degree\
    \ - degrees\nminutes_total = decimal_part * 60\nminutes = int(minutes_total)\n\
    \n# Step 3: Convert the decimal part of minutes to seconds\nseconds = round((minutes_total\
    \ - minutes) * 60)\n\nprint(f\"{decimal_degree}° = {degrees}° {minutes}' {seconds}\\\
    \"\")\n```\n\n### Output\n\n```\n292.35° = 292° 21' 0\"\n```\n\nThis method is\
    \ useful for displaying locations and angles in a standardized, human-friendly\
    \ format.\n\n## INSTALLING PYTHON PACKAGES WITH PIP\n\nAs you begin writing Python\
    \ programs, you will often need to use additional tools, libraries, or frameworks\
    \ that are not included in Python by default. These tools are called packages.\
    \ Python provides a powerful command-line tool called pip to help you install\
    \ and manage these packages easily.\n\n### What Is pip?\n\npip stands for \"Pip\
    \ Installs Packages\". It is the official package installer for Python.\n\nWith\
    \ pip, you can:\n\n- Install new Python libraries (like numpy, matplotlib, flask)\n\
    - Upgrade packages\n- Uninstall packages\n- Check what packages are installed\n\
    \n### Installing a Package Using pip\n\nYou can install a Python package from\
    \ the internet using this simple command:\n\n```\npip install package_name\n```\n\
    \n### Example\n\nTo install requests, a popular package for HTTP:\n\n```\npip\
    \ install requests\n```\n\n### Listing Installed Packages\n\nTo view all packages\
    \ currently installed:\n\n```\npip list\n```\n\nThis will show the name and version\
    \ of each package. pip is a tool for installing and managing Python packages.\
    \ You can install, upgrade, and remove packages easily using simple commands.\
    \ pip connects to the Python Package Index (PyPI) to download packages from the\
    \ internet. Learning to use pip is essential for working with real-world Python\
    \ projects.\n\n## WORKING WITH DATES AND TIMES IN PYTHON, THE DATETIME MODULE\n\
    \nIn many real-world programs, especially those involving calendars, logs, astronomical\
    \ events, or scheduling, you need to work with dates and times. Python makes this\
    \ easy through a built-in module called datetime.\n\nThe datetime module allows\
    \ you to:\n\n- Create and manipulate dates and times\n- Extract day, month, year,\
    \ hour, minute, etc.\n- Perform date arithmetic (e.g., add days, subtract dates)\n\
    - Format dates into readable strings\n\n### Importing the Datetime Module\n\n\
    To use the datetime features, you first need **to import it**:\n\n```\nfrom datetime\
    \ import datetime\n```\n\nThis line imports the datetime class from the datetime\
    \ module.\n\n### Creating a Specific Date\n\nYou can define a date and time using\
    \ the datetime() constructor:\n\n```\ndate = datetime(2024, 1, 14)\n```\n\nThis\
    \ creates a datetime object representing:\n\n- **Year**: 2024\n- **Month**: January\
    \ (1)\n- **Day**: 14\n\nBy default, the time is set to midnight (00:00:00) if\
    \ not specified. You can also include the time:\n\n```\ndate = datetime(2024,\
    \ 1, 14, 15, 30)\n```\n\nThis means 14 January 2024, at 3:30 PM.\n\n### Accessing\
    \ Date Components\n\nOnce a datetime object is created, you can access parts of\
    \ it:\n\n```\nprint(date.year) # 2024\nprint(date.month) # 1\nprint(date.day)\
    \ # 14\n```\n\nYou can also get the **day of the week** or **day of the year**:\n\
    \n```\nprint(date.weekday()) # 6 (Sunday; Monday is 0)\nprint(date.timetuple().tm_yday)\
    \ # 14 (14th day of the year)\n```\n\n### Why Is This Useful?\n\nHandling dates\
    \ and times accurately is essential in:\n\n- Astronomical calculations (like Qibla\
    \ direction)\n- Logging timestamps in applications\n- Scheduling tasks or sending\
    \ reminders\n- Managing calendar events\n\n## Loop\n\nA **loop** in programming\
    \ is used to repeat a set of instructions **if a certain condition is true**.\
    \ Loops are useful when we want to:\n\n- Repeat a task many times\n- Search for\
    \ a value\n- Simulate continuous or time-based processes\n\nPython provides two\
    \ main types of loops:\n\n- for loop – used when you know how many times you want\
    \ to repeat\n- while loop – used when you want to repeat **until** a condition\
    \ is met\n\nA while loop continues **executing** the code inside it **as long\
    \ as** the condition is true.\n\n```\nwhile condition:\n    # do something\n```\n\
    \nIf the condition becomes false, the loop **stops**."
  mdcn: "这在三角计算、天文学以及根据已知边比确定角度的物理学中尤其有用。\n\n## PYTHON 中的基本条件语句\n\n条件语句允许你的程序根据特定条件做出决策。这在几乎所有实际应用中都非常有用。\n\
    \n### if 语句\n\nif 语句仅在指定条件为真时执行一段代码块。\n\n```\ntemperature = 30\nif temperature\
