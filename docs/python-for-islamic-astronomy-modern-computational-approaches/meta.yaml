    \n在 `{azimuth_kiblat:.2f}` 中：\n\n- `:` 开始格式化\n- `.2f` 表示**浮点格式保留 2 位小数**\n\n这在数学、地理和科学应用中非常有用。\n\
    \n## 将十进制度转换为度、分、秒\n\n在许多领域，如地理、测量和导航中，角度通常不仅以十进制度（例如 292.35°）表示，还以更传统的格式表示：度、分、秒（DMS）。虽然十进制度更易于计算，但\
    \ DMS 格式更具可读性，并且在 GPS 坐标、导航系统和官方土地记录中常用。\n\n给定一个十进制度值：\n\n1. **度：** 十进制度的整数部分\n\
    2. **分：** 将小数部分乘以 60，然后取整数部分\n3. **秒：** 将剩余的小数部分再次乘以 60\n\n### 示例：将 292.35° 转换为\
    \ DMS\n\n1. **度** = 292\n2. **小数部分** = 0.35\n3. **分** = 0.35 × 60 = 21.0 → **21\
    \ 分**\n4. **秒** = 0.0 × 60 = 0 → **0 秒**\n\n### 最终答案\n\n292.35° = 292° 21' 0\"\
    \n\n这是一个执行此转换的 Python 脚本：\n\n```\ndecimal_degree = 292.35\n\n# Step 1: Get whole\
