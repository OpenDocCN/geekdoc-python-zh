    # 2 Python for Islamic Astronomy


    ![](img/98432e4a76bed2475a9ecae9f4e09ebe_12_0.png)


    year, calculated using astronomical algorithms and verified through observation.
    Tools like the Almanak Falak JAKIM allow users to refer prayer times specific
    to the zone (Huda et al., 2014). The Umm al-Qura calendar in Makkah uses a combination
    of astronomical data and historical tradition to set prayer times and official
    schedules, especially critical for the millions of pilgrims during Hajj and Umrah
    (Rubin, 2017). The Muslim Council of Britain provides detailed prayer timetables
    for different cities, incorporating high-latitude adjustments for places like
    Edinburgh, where sunlight patterns complicate standard calculations (Ali, 2015).


    The Hijri calendar is a lunar calendar in which each month begins with the sighting
    of the new crescent moon (*hilal*). This determination is critical for establishing
    the dates of key Islamic events such as Ramadan, Eid al-Fitr, and Hajj (Ilyas,
    1984). Moon sighting activities are regularly held across Muslim-majority countries.
    For example, in Indonesia, the Ministry of Religious Affairs coordinates nationwide
    *rukyah* observations, such as those conducted at the Pelabuhan Ratu Observatory,
    to verify the start of Ramadan and other significant months (Wahidi et al., 2019).
    The State Mufti Department manages official crescent moon sightings from sites
    like Bukit Agok Observatory, with live national broadcasts of Ramadan and Shawwal
    announcements (Mohd Nawawi et al., 2024). Morocco is known for using *hisab* (astronomical
    calculations) alongside *rukyah* to determine the Islamic months, often leading
    to different Ramadan start dates compared to neighboring countries (Lairgi, 2025).


    Muslims must face the Kaaba in Makkah when performing prayers. Islamic Astronomy
    provides methods for determining the Qibla direction accurately from any point
    on Earth. Historically, this was done using instruments like the astrolabe, and
    today, with the help of digital compasses and satellite technology (Faid, Nahwandi,
    et al., 2022). In recent years, researchers undertook a measurement project for
    mosque prayer spaces to ensure they were'
  - '[PAGE 13]


    accurately aligned with the Qibla based on updated astronomical and geospatial
    data (Yildirim et al., 2024). Al-Azhar Mosque, one of the oldest universities
    in the Islamic world, underwent a Qibla realignment in 1992 after new astronomical
    surveys corrected earlier orientation errors dating back centuries (Rabbat, 1996).
    Muslim communities often use smartphone apps (e.g., Muslim Pro) and Google Earth
    Qibla services, which apply astronomical algorithms to pinpoint the Kaaba''s direction
    from anywhere in the country (Schumm, 2020).


    Islamic teachings emphasize observing and responding to celestial events such
    as solar and lunar eclipses, which are occasions for special prayers. Islamic
    astronomers calculate and predict these events with precision, enabling communities
    to observe them properly (King, 1993). During the total lunar eclipse on July
    27, 2018, Muslim communities worldwide, including in Saudi Arabia and Indonesia,
    performed *Salat al-Khusuf* (eclipse prayer) and organized observation sessions.
    Observatories like Bosscha Observatory in Indonesia broadcasted the event live,
    blending scientific outreach with religious observance (Izzuddin et al., 2022).
    During the 2019 annular solar eclipse, mosques across the kingdom held *Salat
    al-Kusuf*, and observatories provided live coverage with explanations linking
    religious practice to astronomical phenomena (Elmhamdi et al., 2024).


    Before the advent of modern navigation tools, Islamic astronomers developed sophisticated
    navigation techniques based on celestial bodies. This was especially crucial for
    travelers, pilgrims, and maritime traders navigating long distances across deserts
    and seas. Muslim sailors and traders navigating the Indian Ocean between Africa,
    the Arabian Peninsula, and Southeast Asia used instruments like the *Kamal*, a
    simple device to measure the altitude of stars, to determine their position and
    direction. This knowledge was crucial in facilitating trade routes and pilgrimage
    journeys for centuries (Niri et al., 2023). North African caravans traveling across
    the Sahara to Makkah relied on astronomical observations, notably the Pole Star
    (Polaris), to maintain their route across the desert. During the Ottoman Empire,
    maritime explorers and military fleets used Islamic Astronomy-based charts and
    instruments like the astrolabe and quadrant to navigate the Mediterranean and
    Red Sea efficiently (Faid, Nawawi, et al., 2022).'
- md: '## Why Python Matters in Islamic Astronomy


    Python is a widely used, interpreted, object-oriented, high-level programming
    language with dynamic semantics, designed for general-purpose programming. It
    is ubiquitous, and many people use Python-powered devices every day, whether they
    realize it or not. Python was created by Guido van Rossum and was first released
    on February 20, 1991. While you might know the python as a large snake, the name
    of the Python programming language actually comes from an old BBC television comedy
    sketch series called “Monty Python’s Flying Circus” (Mehare et al., 2023). One
    of the great features of Python is that it is truly the work of one person. Typically,
    new programming languages are developed and published by large companies employing
    many professionals, and due to copyright regulations, it is very difficult to
    name any individuals involved in such projects. Python is an exception (Faid,
    Mohd Nawawi, et al., 2024).


    Of course, Guido van Rossum did not develop and expand all the components of Python
    by himself. The rapid spread of Python across the globe is the result of the continuous
    work of thousands of (very often anonymous) programmers, testers, users (most
    of them not IT experts), and enthusiasts, but it must be said that the initial
    idea (the seed from which Python sprouted) came from one person – Guido (Ozgur
    et al., 2021). Python is maintained by the Python Software Foundation, an organization
    and community dedicated to developing, improving, expanding, and popularizing
    the Python language and its environment. There are billions of lines of code written
    in Python, which means nearly unlimited opportunities for code reuse and learning
    from well-designed examples. Moreover, there is a large and highly active Python
    community, always happy to help (Faid, Nawawi, Saadon, et al., 2023).


    Several factors make Python great for learning:


    - It’s easy to learn – The time required to learn Python is shorter than many
    other languages, meaning you can start real programming more quickly.

    - It’s easy to use for writing new software – Often, it’s possible to write code
    faster when using Python.

    - It’s easy to obtain, install, and use – Python is free, open-source, and cross-platform;
    not all languages can boast that.


    Programming skills prepare you for a career in almost any industry and are essential
    if you want to pursue more advanced and higher-paying software development and
    engineering roles. Python is a programming language that opens more doors than
    others. With solid Python knowledge, you can work in various jobs and industries.
    And the more you understand Python, the more you can do in the 21st century. Even
    if you don’t need it for work, you’ll find it useful to know (Blank & Deb, 2020).


    Python is a great language for science, particularly in astronomy. Various packages
    like NumPy, SciPy, Scikit-Image, and Astropy (to name just a few) are all excellent
    examples of Python’s suitability for astronomy, and there are many use cases.
    [NumPy, Astropy, and SciPy are fiscally sponsored projects by NumFOCUS; Scikit-Image
    is an affiliated project.] These tools make it easier to use Python in various
    astronomical projects.


    For example, the European Southern Observatory (ESO), which operates the Very
    Large Telescope (VLT), offers data for download on their site. You can visit www.eso.org/UserPortal
    and create a username for their portal. If you’re looking for data from the SPHERE
    instrument, you can download full datasets for any nearby stars with exoplanet
    or protoplanetary disks. It’s a fantastic and engaging project for any Pythonista
    to reduce that data and make the hidden planets or disks visible amid the noise
    (Rhodes, 2011).


    By using the tools offered by NumPy, SciPy, Astropy, Scikit-Image, and many more
    in combination, with a little patience and persistence, it’s possible to analyze
    vast amounts of available astronomical data to produce some stunning results.
    Python plays a significant role in Islamic Astronomy, particularly in determining
    prayer times, the Qibla direction, and the beginning of the Hijri months. These
    aspects are central discussions in Islamic Astronomy.


    ## PRAYER TIMES CALCULATION


    The determination of prayer times involves using the position of the sun as a
    reference to measure the start and end times of each prayer. The position of the
    sun after its zenith is used to determine Zuhr, the sun''s shadow for Asr, sunrise
    and sunset for Maghrib and Syuruk, while the sun''s light below the horizon is
    used for Fajr and Isha (Faid et al., 2019). Python, with its libraries such as
    NumPy, SciPy, and Astropy, can be used to perform precise calculations of the
    sun''s position, which is crucial for determining accurate prayer times (Faid
    et al., 2021).


    ## QIBLA DIRECTION DETERMINATION


    The determination of the Qibla direction requires accurate readings of latitude
    and longitude. Historically, Islamic scholars used the position of the sun and
    solar eclipses to determine these coordinates (Faid, Husien, et al., 2016). Today,
    GPS provides latitude and longitude, but surveyors and astronomers still require
    sun position data to obtain the azimuth direction. Python can be used to calculate
    the azimuth angle accurately, incorporating latitude, longitude, and the sun''s
    position, which is vital for ensuring that the Qibla direction is correct (Amin,
    2018).


    ## DETERMINING THE BEGINNING OF THE HIJRI MONTHS


    The beginning of an Islamic month is determined by the visibility of the crescent
    moon (Shariff et al., 2016). The moon''s visibility depends on its position relative
    to the sun, and the calculations involved are more complex than those for the
    sun because of the moon''s faster and more dynamic movement influenced by the
    gravitational forces of the sun and the Earth. Python, through the use of libraries
    like Astropy, allows for precise calculations of the moon''s position, which is
    essential for determining the new moon and thus the start of the Hijri month (Muztaba
    et al., 2023).


    ## Importance of Accuracy of Calculation


    The precision in calculating the positions of the sun and moon directly impacts
    the determination of prayer times, the Qibla direction, and the visibility of
    the crescent moon. If these calculations are inaccurate, it could lead to incorrect
    prayer times, Qibla direction, or the start of the Islamic month. Therefore, it
    is crucial for those in authoritative positions to use accurate calculations.
    Public institutions like JAKIM, JUPEM, and the State Mufti Departments in Malaysia
    are responsible for producing accurate data, which the public relies on (Shariff
    et al., 2017). For example, the Qibla direction of mosques and suraus must be
    certified by official surveyors and the Mufti Department to ensure that the direction
    used by the local Muslim community is accurate. Similarly, the release of Prayer
    Time Tables and the annual Hijri Calendar involves precise calculations and is
    usually vetted by the State Falak Council before being published (Faid, Shariff,
    et al., 2016).


    As the public, they are not burdened with performing these precise calculations
    ourselves. Instead, we are encouraged to rely on authoritative sources for accurate
    information. However, increasing public awareness and understanding of Islamic
    astronomical calculations can enhance appreciation for this knowledge and reduce
    confusion and the spread of misinformation (Faid et al., 2018). By using Python
    in Islamic Astronomy, we can harness its power to perform accurate and efficient
    calculations, ensuring that the Islamic practices related to time and direction
    are observed correctly and consistently (Faid et al., 2025). Accuracy in Islamic
    Astronomy is a highly critical aspect, particularly in determining the new Hijri
    month (Syazwan Faid et al., 2025). This is due to several factors that have a
    direct impact on the religious practices of Muslims, as well as broader social
    and economic implications (Wahyuni et al., 2022).'
  mdcn: '## 为何Python在伊斯兰天文学中至关重要


    Python是一种广泛使用的、解释型的、面向对象的、具有动态语义的高级编程语言，专为通用编程而设计。它无处不在，许多人每天都在使用由Python驱动的设备，无论他们是否意识到。Python由吉多·范罗苏姆创建，并于1991年2月20日首次发布。虽然你可能知道python是一种大型蛇类，但Python编程语言的名称实际上源自一个名为“蒙提·派森的飞行马戏团”的古老BBC电视喜剧小品系列（Mehare等人，2023）。Python的一大特点是它真正是一个人的作品。通常，新的编程语言是由雇佣了许多专业人士的大型公司开发和发布的，并且由于版权法规，很难点名参与此类项目的任何个人。Python是个例外（Faid,
    Mohd Nawawi等人，2024）。


    当然，吉多·范罗苏姆并没有独自开发和扩展Python的所有组件。Python在全球范围内的迅速传播是成千上万（通常是匿名的）程序员、测试员、用户（其中大多数不是IT专家）和爱好者持续工作的结果，但必须指出的是，最初的构想（Python萌芽的种子）来自一个人——吉多（Ozgur等人，2021）。Python由Python软件基金会维护，这是一个致力于开发、改进、扩展和普及Python语言及其环境的组织和社区。有数十亿行用Python编写的代码，这意味着几乎无限的代码重用和从精心设计的示例中学习的机会。此外，还有一个庞大且高度活跃的Python社区，总是乐于助人（Faid,
    Nawawi, Saadon等人，2023）。


    有几个因素使Python非常适合学习：


    -   它易于学习——学习Python所需的时间比许多其他语言短，这意味着你可以更快地开始真正的编程。

    -   它易于用于编写新软件——通常，使用Python可以更快地编写代码。

    -   它易于获取、安装和使用——Python是免费的、开源的、跨平台的；并非所有语言都能做到这一点。


    编程技能为你在几乎任何行业的职业生涯做好准备，如果你想追求更高级、更高薪的软件开发和工程职位，这些技能是必不可少的。Python是一种比其他语言打开更多大门的编程语言。拥有扎实的Python知识，你可以在各种工作和行业中工作。而且，你对Python理解得越深，在21世纪你能做的事情就越多。即使你的工作不需要它，你也会发现了解它很有用（Blank
    & Deb，2020）。


    Python是一门非常适合科学的语言，尤其是在天文学领域。各种包，如NumPy、SciPy、Scikit-Image和Astropy（仅举几例），都是Python适合天文学的绝佳例子，并且有许多用例。[NumPy、Astropy和SciPy是NumFOCUS财政赞助的项目；Scikit-Image是一个附属项目。]这些工具使得在各种天文项目中使用Python变得更加容易。


    例如，运营甚大望远镜的欧洲南方天文台在其网站上提供数据下载。你可以访问www.eso.org/UserPortal并为其门户创建一个用户名。如果你正在寻找SPHERE仪器的数据，你可以下载任何具有系外行星或原行星盘的邻近恒星的完整数据集。对于任何Python爱好者来说，处理这些数据并在噪声中让隐藏的行星或盘显现出来，都是一个极好且引人入胜的项目（Rhodes，2011）。


    通过结合使用NumPy、SciPy、Astropy、Scikit-Image等提供的工具，加上一点耐心和毅力，就有可能分析大量可用的天文数据，从而产生一些令人惊叹的结果。Python在伊斯兰天文学中扮演着重要角色，特别是在确定祈祷时间、朝向方向和希吉拉历月份的开始方面。这些方面是伊斯兰天文学的核心讨论内容。


    ## 祈祷时间计算


    祈祷时间的确定涉及使用太阳的位置作为参考来测量每次祈祷的开始和结束时间。太阳过中天后的位置用于确定祖赫尔，太阳的影子用于确定阿斯尔，日出和日落用于确定马格里布和舒鲁克，而地平线以下的太阳光用于确定法吉尔和伊沙（Faid等人，2019）。Python及其库（如NumPy、SciPy和Astropy）可用于执行太阳位置的精确计算，这对于确定准确的祈祷时间至关重要（Faid等人，2021）。


    ## 朝向方向确定


    朝向方向的确定需要精确的纬度和经度读数。历史上，伊斯兰学者使用太阳的位置和日食来确定这些坐标（Faid, Husien等人，2016）。如今，GPS提供纬度和经度，但测量员和天文学家仍然需要太阳位置数据来获得方位方向。Python可用于精确计算方位角，结合纬度、经度和太阳位置，这对于确保朝向方向正确至关重要（Amin，2018）。


    ## 确定希吉拉历月份的开始


    伊斯兰月份的开始是通过新月的可见性来确定的（Shariff等人，2016）。月亮的可见性取决于其相对于太阳的位置，由于月亮运动更快且更动态，受到太阳和地球引力的影响，所涉及的计算比太阳的计算更复杂。Python通过使用Astropy等库，可以精确计算月亮的位置，这对于确定新月从而确定希吉拉历月份的开始至关重要（Muztaba等人，2023）。


    ## 计算准确性的重要性


    计算太阳和月亮位置的精确度直接影响祈祷时间、朝向方向和新月的可见性。如果这些计算不准确，可能会导致错误的祈祷时间、朝向方向或伊斯兰月份的开始。因此，对于权威人士来说，使用精确的计算至关重要。像马来西亚的JAKIM、JUPEM和州穆夫提部门这样的公共机构负责生成公众所依赖的准确数据（Shariff等人，2017）。例如，清真寺和祈祷室的朝向方向必须经过官方测量员和穆夫提部门的认证，以确保当地穆斯林社区使用的方向是准确的。同样，祈祷时间表和年度希吉拉历的发布涉及精确的计算，通常在发布前由州天文学委员会审核（Faid,
    Shariff等人，2016）。


    作为公众，我们自己并不承担进行这些精确计算的负担。相反，我们被鼓励依赖权威来源获取准确信息。然而，提高公众对伊斯兰天文学计算的认识和理解，可以增强对这一知识的欣赏，并减少困惑和错误信息的传播（Faid等人，2018）。通过在伊斯兰天文学中使用Python，我们可以利用其力量进行精确高效的计算，确保与时间和方向相关的伊斯兰实践得到正确和一致的遵守（Faid等人，2025）。伊斯兰天文学中的准确性是一个非常关键的方面，特别是在确定新的希吉拉历月份时（Syazwan
    Faid等人，2025）。这是由于几个因素对穆斯林的宗教实践以及更广泛的社会和经济影响有直接影响（Wahyuni等人，2022）。'
