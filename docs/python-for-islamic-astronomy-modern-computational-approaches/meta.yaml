    \ and cleaner with formatted strings, also called f-strings.\n\n```\nname = \"\
    Aminah\"\nage = 18\nprint(f\"My name is {name} and I am {age} years old.\")\n\
    ```\n\n### Output\n\nMy name is Aminah and I am 18 years old.\n\nIn this example,\
    \ the f before the quotation mark tells Python to treat the string as a **formatted\
