    \ 内，Python 将插入变量的值。你甚至可以包含计算：\n\n```\nlength = 5\nwidth = 3\nprint(f\"The area\
    \ is {length * width} square units.\")\n```\n\n### 输出\n\n```\nThe area is 15 square\
