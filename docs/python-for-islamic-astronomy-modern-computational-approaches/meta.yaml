  md: '# Prayer Times Calculation


    # 7


    Prayer time calculation is based on the position of the sun. Each country has
    different methods of prayer time calculation. In Malaysia, the prayer time is
    calculated based on tabular extrapolation on the position of the solar, its hour
    angle, and Equation of Time.


    The tabular extrapolation means that the calculation requires manual computation
    and cannot be automated for yearly determinations. Therefore, the calculation
    of prayer times in this does not use tabular extrapolation; instead, it is extracted
    directly from the sun''s position, using the Skyfield library.


    # ZUHUR


    The earliest time for Zuhr begins after solar noon, when the sun passes the local
    meridian and reaches its highest point in the sky. It is based on Prophet saying:


    > The time for Zuhr is when the sun has passed its zenith until a person''s shadow
    is equal in length to his height.

    Sahih Muslim (612)


    The earliest time for Zuhr (Dhuhr) prayer begins just after the sun passes its
    zenith, known as the solar transit. To ensure the sun has fully crossed the meridian
    and begun its descent, an offset equal to half of the sun''s apparent diameter
    is applied. This corresponds to approximately 1 minute and 4 seconds.


    Using the Skyfield library in Python, the solar daily transit time can be accurately
    calculated based on the actual position of the sun. This method does not require
    the Equation of Time, as Skyfield already accounts for the sun''s apparent motion
    and Earth''s orbital variations. To calculate the Zuhr prayer'
