    \ position of the moon. The geometrical position of the moon is calculated using\
    \ a topocentric reference. This means that the position of the moon is calculated\
    \ in reflect to the user position on the surface of the Earth. The calculation\
    \ is conducted based on the position of the moon during sunset. To perform the\
    \ calculation, first we calculate the altitude of the moon during sunset.\n\n\
    ```\nmoon_astro = location.at(ts.utc(year, month, day, h_sunset, m_sunset)).observe(moon)\n\
    moon_app = moon_astro.apparent()\nmoon_alt, moon_az, distance = moon_app.altaz()\n\
    print(moon_alt)\n```\n\n12deg 27' 16.3\"\n\nThe code structure used to calculate\
    \ moonset is like the code for calculating prayer times, such as sunset. The only\
    \ difference lies in the celestial object being observed, the sun for prayer times,\
    \ and the moon for moonsighting. In this case, the same variables as h_sunset\
