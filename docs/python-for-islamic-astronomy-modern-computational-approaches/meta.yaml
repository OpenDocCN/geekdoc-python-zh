    Istiwa’ A’zam happens twice a year, when the apparent path of the sun crosses
    the exact latitude of the Kaaba, which occurs on 28th May and 15th July approximately.
    On these dates, the sun passes directly overhead the Kaaba, around 12:16 p.m.
