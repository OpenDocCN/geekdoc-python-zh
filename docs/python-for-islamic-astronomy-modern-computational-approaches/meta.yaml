    ```\n\n0° 57' 2\"\n\n月落和日落之间的滞后时间为 57 分 2 秒。接下来是确定月球的几何位置。月球的几何位置使用地心参考系计算。这意味着月球的位置是相对于用户在地球表面的位置来计算的。计算基于日落时的月球位置进行。要执行计算，我们首先计算日落时的月球高度。\n\
