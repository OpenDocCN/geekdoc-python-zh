    ## Application of Islamic Astronomy for Muslim 1


    This book is supplemented by an interactive coding website hosted on a Google
    Colab repository. Readers can explore the code used in the computation and calculation
    of Islamic Astronomy, observe how it is implemented within the Colab environment,
    and adjust the demonstrated code according to their own variables and real-life
    situations. Users do not need to rewrite the code manually from this book; instead,
    they can simply copy it directly from the Google Colab repository. Rewriting code
    often leads to mistakes, and the more mistakes made, the less enjoyable the exercise
    becomes; trust me, I speak from experience. The website contains 6 hyperlinks,
    which direct the user to the corresponding chapter. The website can be accessed
    on bit.ly/pythonforislamicastronomy, or using the QR Code given in Figure 1.1.


    From this link, user can edit the code. The edited code will be saved on the user''s
    own copy of Google Colab and won''t affect the original coding.


    Islamic Astronomy, also known as ''ilm al-hay''ah, refers to the branch of science
    developed and practiced within the Islamic world that deals with the study of
    celestial bodies and their movements, primarily for religious, calendrical, and
    navigational purposes (Ilyas, 1997). This area of study combines observational
    astronomy with Islamic principles, making it a vital area of study for Muslims.
    Islamic Astronomy has historically contributed to various fields, from timekeeping
    and calendar formation to navigation and the understanding of celestial events
    (Yusuf, 2010). Its importance is seen in the precise ways it influences Muslims''
    religious obligations and broader scientific knowledge.


    One of the most practical applications of Islamic Astronomy is determining the
    exact times for the five daily prayers (Salah), which rely on the sun''s position
    in the sky. This ensures that Muslims perform their prayers at the correct times
    each day (Abas et al., 2022). In Malaysia, the Department of Islamic Development
    Malaysia (JAKIM) publishes detailed prayer timetables every year, calculated using
    astronomical algorithms and verified through observation. Tools like the Almanak
    Falak JAKIM allow users to refer prayer times specific to the zone (Huda et al.,
    2014). The Umm al-Qura calendar in Makkah uses a combination of astronomical data
    and historical tradition to set prayer times and official schedules, especially
    critical for the millions of pilgrims during Hajj and Umrah (Rubin, 2017). The
    Muslim Council of Britain provides detailed prayer timetables for different cities,
    incorporating high-latitude adjustments for places like Edinburgh, where sunlight
    patterns complicate standard calculations (Ali, 2015).


    The Hijri calendar is a lunar calendar in which each month begins with the sighting
    of the new crescent moon (*hilal*). This determination is critical for establishing
    the dates of key Islamic events such as Ramadan, Eid al-Fitr, and Hajj (Ilyas,
    1984). Moon sighting activities are regularly held across Muslim-majority countries.
    For example, in Indonesia, the Ministry of Religious Affairs coordinates nationwide
    *rukyah* observations, such as those conducted at the Pelabuhan Ratu Observatory,
    to verify the start of Ramadan and other significant months (Wahidi et al., 2019).
    The State Mufti Department manages official crescent moon sightings from sites
    like Bukit Agok Observatory, with live national broadcasts of Ramadan and Shawwal
    announcements (Mohd Nawawi et al., 2024). Morocco is known for using *hisab* (astronomical
    calculations) alongside *rukyah* to determine the Islamic months, often leading
    to different Ramadan start dates compared to neighboring countries (Lairgi, 2025).


    Muslims must face the Kaaba in Makkah when performing prayers. Islamic Astronomy
    provides methods for determining the Qibla direction accurately from any point
    on Earth. Historically, this was done using instruments like the astrolabe, and
    today, with the help of digital compasses and satellite technology (Faid, Nahwandi,
    et al., 2022). In recent years, researchers undertook a measurement project for
    mosque prayer spaces to ensure they were accurately aligned with the Qibla based
    on updated astronomical and geospatial data (Yildirim et al., 2024). Al-Azhar
    Mosque, one of the oldest universities in the Islamic world, underwent a Qibla
    realignment in 1992 after new astronomical surveys corrected earlier orientation
    errors dating back centuries (Rabbat, 1996). Muslim communities often use smartphone
    apps (e.g., Muslim Pro) and Google Earth Qibla services, which apply astronomical
    algorithms to pinpoint the Kaaba''s direction from anywhere in the country (Schumm,
    2020).


    Islamic teachings emphasize observing and responding to celestial events such
    as solar and lunar eclipses, which are occasions for special prayers. Islamic
    astronomers calculate and predict these events with precision, enabling communities
    to observe them properly (King, 1993). During the total lunar eclipse on July
    27, 2018, Muslim communities worldwide, including in Saudi Arabia and Indonesia,
    performed *Salat al-Khusuf* (eclipse prayer) and organized observation sessions.
    Observatories like Bosscha Observatory in Indonesia broadcasted the event live,
    blending scientific outreach with religious observance (Izzuddin et al., 2022).
    During the 2019 annular solar eclipse, mosques across the kingdom held *Salat
    al-Kusuf*, and observatories provided live coverage with explanations linking
    religious practice to astronomical phenomena (Elmhamdi et al., 2024).


    Before the advent of modern navigation tools, Islamic astronomers developed sophisticated
    navigation techniques based on celestial bodies. This was especially crucial for
    travelers, pilgrims, and maritime traders navigating long distances across deserts
    and seas. Muslim sailors and traders navigating the Indian Ocean between Africa,
    the Arabian Peninsula, and Southeast Asia used instruments like the *Kamal*, a
    simple device to measure the altitude of stars, to determine their position and
    direction. This knowledge was crucial in facilitating trade routes and pilgrimage
    journeys for centuries (Niri et al., 2023). North African caravans traveling across
    the Sahara to Makkah relied on astronomical observations, notably the Pole Star
    (Polaris), to maintain their route across the desert. During the Ottoman Empire,
    maritime explorers and military fleets used Islamic Astronomy-based charts and
    instruments like the astrolabe and quadrant to navigate the Mediterranean and
    Red Sea efficiently (Faid, Nawawi, et al., 2022).'
