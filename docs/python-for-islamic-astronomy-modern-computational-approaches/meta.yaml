    # CONVERTING DECIMAL DEGREES TO DEGREES, MINUTES, AND SECONDS


    In many fields such as geography, surveying, and navigation, angles are often
    represented not just in decimal degrees (e.g., 292.35°) but in a more traditional
    format: Degrees, Minutes, and Seconds (DMS). While decimal degrees are easier
    for calculations, DMS format is more readable and commonly used in GPS coordinates,
    navigation systems, and official land records.

    Given a decimal degree value:


    +   1. **Degrees:** The whole number part of the decimal degree

    2. **Minutes:** Multiply the decimal part by 60, then take the whole number

    3. **Seconds:** Multiply the remaining decimal by 60 again'
