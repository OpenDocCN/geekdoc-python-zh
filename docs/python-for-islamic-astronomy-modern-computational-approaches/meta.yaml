  md: '# USING SKYFIELD


    Skyfield is a Python library designed to calculate the positions of stars, planets,
    and satellites orbiting the Earth. Its results are expected to align with the
    positions generated by the United States Naval Observatory and their Astronomical
    Almanac within 0.0005 arcseconds (half a milli-arcsecond, or mas). Skyfield is
    written entirely in pure Python and can be installed without any compilation,
    making it accessible for various Python environments. It supports Python versions
    2.6, 2.7, and 3, with NumPy as its only binary dependency. NumPy is a fundamental
    package for scientific computing with Python, and its vector operations make Skyfield
    efficient. Before Skyfield was developed, an older version known as PyEphem was
    used. Skyfield builds on the capabilities of PyEphem, offering more accurate and
    modern astronomical calculations (Faid, Mohd Nawawi, et al., 2023; Faid, Nawawi,
    & Saadon, 2023; Faid, Nawawi, Wahab, et al., 2023).


    PyEphem uses popular astronomical calculation techniques derived from Jean Meeus''s
    *Astronomical Algorithms*, such as the IAU 1980 model of Earth''s nutation and
    the VSOP87 planetary theory. These techniques are still employed by various authoritative
    bodies around the world (Holwerda et al., 2016). PyEphem offers accuracy up to
    1 arcsecond, which is sufficient for calculating lunar and solar data. However,
    for new projects, the Skyfield library should be prioritized over PyEphem. Its
    modern design encourages better Python coding practices and utilizes NumPy to
    accelerate calculations. PyEphem''s reliance on C libraries often results in frustrating
    installation issues. If the Python Package Index (PyPI) doesn''t have a wheel
    for your system, you would need a C compiler and a Python development environment
    to install PyEphem.


    Another drawback of PyEphem is its handling of angular units, which can be confusing.
    The library tries to be clever by interpreting string inputs like ''1.23'' as
    degrees of declination (or hours, when setting the right ascension), but floating-point
    inputs like 1.23 are assumed to be in radians. The angles returned by PyEphem
    add to the confusion: when printed, they display in degrees, but performing arithmetic
    on them reveals that they are in radians. This leads to significant confusion
    and makes the code harder to read, but fixing it would break existing programs
    that rely on PyEphem. Moreover, PyEphem''s compute () method modifies its objects
    in place rather than returning a result. While this reflects how the underlying
    C library operates, it makes using compute () in list comprehensions difficult,
    you end up with a list of None objects. Therefore, in this context, Skyfield will
    be used for calculating lunar and solar data. Skyfield''s advantages, such as
    modern design, better'
