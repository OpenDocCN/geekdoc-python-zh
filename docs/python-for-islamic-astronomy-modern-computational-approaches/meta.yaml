- md: "This is especially useful in triangle calculations, astronomy, and physics\
    \ when determining angles based on known side ratios.\n\n## BASIC CONDITIONAL\
    \ STATEMENTS IN PYTHON\n\nConditional statements allow your program to make decisions\
    \ based on certain conditions. This is useful in nearly all practical applications.\n\
    \n### The if Statement\n\nThe if statement executes a block of code only if a\
    \ specified condition is true.\n\n```\ntemperature = 30\nif temperature > 25:\n\
    \    print(\"It's a hot day.\")\n```\n\n### The else Statement\n\nThe else block\
    \ runs when the if condition is false.\n\n```\ntemperature = 20\nif temperature\
    \ > 25:\n    print(\"It's a hot day.\")\nelse:\n    print(\"It's a nice day.\"\
    )\n```\n\n### Using or in Conditions\n\nThe or keyword checks if **at least one**\
    \ of multiple conditions is true.\n\n```\nday = \"Sunday\"\nis_holiday = True\n\
    \nif day == \"Sunday\" or is_holiday:\n    print(\"You can rest today.\")\nelse:\n\
    \    print(\"It's a working day.\")\n```\n\n### Combined Example\n\nHere is a\
    \ real-world style example:\n\n```\nscore = 80\nif score >= 90:\n    print(\"\
    Excellent\")\nelif score >= 70:\n    print(\"Good job\")\nelse:\n    print(\"\
    Keep trying\")\n```\n\n### Explanation\n\n- If the score is 90 or more → print\
    \ \"Excellent\"\n- If the score is 70 or more (but less than 90) → print \"Good\
