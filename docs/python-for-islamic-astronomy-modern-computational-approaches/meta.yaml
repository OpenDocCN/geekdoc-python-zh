    ```


    This will install the core Skyfield library, which is needed to perform astronomical
    computations.


    # Step 2: Understand What an Ephemeris Is


    An **ephemeris** is a table or dataset that provides the positions of celestial
    objects at regular intervals. Skyfield uses ephemerides published by NASA JPL
    to calculate accurate positions of planets and the moon. For this example, we
    will use **DE440s**, a compact but high-accuracy ephemeris suitable for many applications.


    # Step 3: Load the Ephemeris DE440s


    Next, we will load the DE440s ephemeris using Skyfield. Type the following code
    into a new cell:


    ```

    from skyfield.api import load

