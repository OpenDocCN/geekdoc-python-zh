    \ **moonset_time** and **sunset_time**. Then make sure the result is always positive;\
    \ use the function abs() inside the subtraction operation. The result is in decimal\
    \ format; to convert into time format,\n\n```\ndegrees = int(lag_time)\ndecimal_part\
