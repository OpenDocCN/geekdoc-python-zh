    \ 10.1201/9781003649120\n\nTypeset in Times\nby Deanta Global Publishing Services,\
    \ Chennai, India\n\n# Contents\n\nAcknowledgments\n\n1. Application of Islamic\
    \ Astronomy for Muslim\n\n2. Why Python Matters in Islamic Astronomy\n   - Prayer\
    \ Times Calculation\n   - Qibla Direction Determination\n   - Determining the\
    \ Beginning of the Hijri Months\n\n3. Importance of Accuracy of Calculation\n\
