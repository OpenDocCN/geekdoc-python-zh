    # Application of Islamic Astronomy for Muslim 1


    This book is supplemented by an interactive coding website hosted on a Google
    Colab repository. Readers can explore the code used in the computation and calculation
    of Islamic Astronomy, observe how it is implemented within the Colab environment,
    and adjust the demonstrated code according to their own variables and real-life
    situations. Users do not need to rewrite the code manually from this book; instead,
    they can simply copy it directly from the Google Colab repository. Rewriting code
    often leads to mistakes, and the more mistakes made, the less enjoyable the exercise
    becomes; trust me, I speak from experience. The website contains 6 hyperlinks,
    which direct the user to the corresponding chapter. The website can be accessed
    on bit.ly/pythonforislamicastronomy, or using the QR Code given in Figure 1.1.


    From this link, user can edit the code. The edited code will be saved on the user''s
    own copy of Google Colab and won''t affect the original coding.


    Islamic Astronomy, also known as ''ilm al-hay''ah, refers to the branch of science
    developed and practiced within the Islamic world that deals with the study of
    celestial bodies and their movements, primarily for religious, calendrical, and
    navigational purposes (Ilyas, 1997). This area of study combines observational
    astronomy with Islamic principles, making it a vital area of study for Muslims.
    Islamic Astronomy has historically contributed to various fields, from timekeeping
    and calendar formation to navigation and the understanding of celestial events
    (Yusuf, 2010). Its importance is seen in the precise ways it influences Muslims''
    religious obligations and broader scientific knowledge.


    One of the most practical applications of Islamic Astronomy is determining the
    exact times for the five daily prayers (Salah), which rely on the sun''s position
    in the sky. This ensures that Muslims perform their prayers at the correct times
    each day (Abas et al., 2022). In Malaysia, the Department of Islamic Development
    Malaysia (JAKIM) publishes detailed prayer timetables every'
