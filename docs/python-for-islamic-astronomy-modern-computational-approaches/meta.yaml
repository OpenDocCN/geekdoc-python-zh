  md: '# Qiblah Compass Visualization 9


    The determination of Rashdul Kiblat is universally suitable for all days in a
    year. There are times when the Rashdul Kiblat is not applicable for a particular
    day or time. This is due to the solar position. Therefore, another alternative
    is to determine the Qibla is based on the degree of solar azimuth. So, to create
    the visualization of the Qibla compass, it must be based on the solar azimuth
    degree. The solar azimuth degree can be calculated using Skyfield, while the Qibla
    direction can be calculated using the previous formula; therefore, the angle between
    the solar azimuth degree and Qibla direction can be determined using the subtraction
    between the solar azimuth degree and Qibla direction degree. This angle of subtraction
    can be visualized.


    Visualization of the angle between the sun azimuth and the direction of the Qibla
    can be determined using matplotlib function of polar plot. Matplotlib is a visualization
    function that is embedded with Python. Matplotlib can be used to create bar graphs,
    line graph, and many more graphs. Matplotlib can visualize the angle of difference
    between solar azimuth and Qibla direction using polar plot. Polar plot is plot
    of magnitude |G(jω)H(jω)| versus phase angle ∠(G(jω)H(jω)) in polar coordinates,
    and the value of frequency i.e. ω is varied from 0 to ∞. In polar plot magnitude
    of transfer function is plotted to distance from origin and phase angle is plotted
    from positive real x-axis. Polar plot is used in Nyquist plot to determine the
    stability of closed loop control system from its open loop frequency response.
    The polar plot has the angle scale from 0 degree to 360 degree. This would be
    perfect for the determination of Qibla direction from the position of the solar
    azimuth.'
