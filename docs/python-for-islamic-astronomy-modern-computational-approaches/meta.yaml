    ## 穆斯林应用伊斯兰天文学 1


    本书附有一个托管在 Google Colab 仓库中的交互式编码网站。读者可以探索用于伊斯兰天文学计算和计算的代码，观察其在 Colab 环境中的实现方式，并根据自己的变量和实际情况调整演示的代码。用户无需手动从本书重写代码；相反，他们可以直接从
    Google Colab 仓库复制。重写代码通常会导致错误，错误越多，练习就越不愉快；相信我，我有经验。该网站包含 6 个超链接，将用户引导至相应的章节。该网站可通过
    bit.ly/pythonforislamicastronomy 访问，或使用图 1.1 中给出的二维码。


    通过此链接，用户可以编辑代码。编辑后的代码将保存在用户自己的 Google Colab 副本中，不会影响原始代码。


    伊斯兰天文学，也称为 *''ilm al-hay''ah*，指的是在伊斯兰世界内发展和实践的科学分支，主要研究天体及其运动，主要用于宗教、历法和导航目的（Ilyas,
    1997）。这一研究领域将观测天文学与伊斯兰原则相结合，使其成为穆斯林的重要研究领域。伊斯兰天文学在历史上对多个领域做出了贡献，从计时和历法制定到导航和理解天象（Yusuf,
    2010）。其重要性体现在它精确地影响着穆斯林的宗教义务和更广泛的科学知识。


    伊斯兰天文学最实际的应用之一是确定每日五次礼拜（Salah）的确切时间，这依赖于太阳在天空中的位置。这确保了穆斯林每天在正确的时间进行礼拜（Abas et
    al., 2022）。在马来西亚，马来西亚伊斯兰发展部（JAKIM）每年发布详细的礼拜时间表，使用天文算法计算并通过观测验证。像 JAKIM 的《天文年鉴》这样的工具允许用户参考特定区域的礼拜时间（Huda
    et al., 2014）。麦加的《回历》使用天文数据和历史传统的结合来设定礼拜时间和官方时间表，这对于数百万朝觐和副朝的朝圣者尤为重要（Rubin, 2017）。英国穆斯林委员会为不同城市提供详细的礼拜时间表，包含针对爱丁堡等高纬度地区的调整，那里的日照模式使标准计算变得复杂（Ali,
    2015）。


    回历是一种阴历，每个月都始于新月（*hilal*）的观测。这一确定对于确定斋月、开斋节和朝觐等关键伊斯兰事件的日期至关重要（Ilyas, 1984）。新月观测活动在穆斯林占多数的国家定期举行。例如，在印度尼西亚，宗教事务部协调全国范围的
    *rukyah* 观测，例如在佩拉布汉拉图天文台进行的观测，以验证斋月和其他重要月份的开始（Wahidi et al., 2019）。国家穆夫提办公室管理来自布吉特阿戈克天文台等地点的官方新月观测，并对斋月和开斋节的公告进行全国直播（Mohd
    Nawawi et al., 2024）。摩洛哥以使用 *hisab*（天文计算）和 *rukyah* 来确定伊斯兰月份而闻名，这通常导致其斋月开始日期与邻国不同（Lairgi,
    2025）。


    穆斯林在礼拜时必须面向麦加的克尔白。伊斯兰天文学提供了从地球上任何地点准确确定朝向方向的方法。历史上，这是通过使用星盘等仪器完成的，如今则借助数字罗盘和卫星技术（Faid,
    Nahwandi, et al., 2022）。近年来，研究人员开展了一个清真寺礼拜空间的测量项目，以确保它们根据更新的天文和地理空间数据准确地朝向朝向方向（Yildirim
    et al., 2024）。艾资哈尔清真寺，伊斯兰世界最古老的大学之一，在 1992 年进行了朝向方向的重新校准，此前新的天文勘测纠正了可追溯到几个世纪前的早期朝向错误（Rabbat,
    1996）。穆斯林社区经常使用智能手机应用程序（例如 Muslim Pro）和 Google Earth 朝向服务，这些应用使用天文算法来精确定位克尔白的方向（Schumm,
    2020）。


    伊斯兰教义强调观测和回应天象，如日食和月食，这些是进行特殊礼拜的场合。伊斯兰天文学家精确地计算和预测这些事件，使社区能够正确地进行观测（King, 1993）。在
    2018 年 7 月 27 日的月全食期间，包括沙特阿拉伯和印度尼西亚在内的世界各地的穆斯林社区举行了 *Salat al-Khusuf*（月食祈祷）并组织了观测活动。像印度尼西亚的博萨天文台这样的天文台对事件进行了直播，将科学推广与宗教活动相结合（Izzuddin
    et al., 2022）。在 2019 年的日环食期间，王国各地的清真寺举行了 *Salat al-Kusuf*，天文台提供了直播报道，并解释了宗教实践与天文现象之间的联系（Elmhamdi
    et al., 2024）。


    在现代导航工具出现之前，伊斯兰天文学家开发了基于天体的复杂导航技术。这对于穿越沙漠和海洋长途跋涉的旅行者、朝圣者和海上商人尤为重要。在非洲、阿拉伯半岛和东南亚之间航行印度洋的穆斯林水手和商人使用像
    *Kamal* 这样的仪器，这是一种测量恒星高度的简单装置，以确定他们的位置和方向。几个世纪以来，这些知识对于促进贸易路线和朝圣之旅至关重要（Niri et
    al., 2023）。穿越撒哈拉前往麦加的北非商队依赖天文观测，特别是北极星（Polaris），以在沙漠中保持路线。在奥斯曼帝国时期，海上探险家和舰队使用基于伊斯兰天文学的图表和仪器，如星盘和象限仪，有效地在地中海和红海航行（Faid,
    Nawawi, et al., 2022）。'
