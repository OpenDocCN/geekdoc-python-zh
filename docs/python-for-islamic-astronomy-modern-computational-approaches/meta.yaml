  md: '# Qiblah Calculation Using Python 5


    The calculation of the Qibla direction is based on three points of location. The
    first is the location of the Kaaba, which is located at 21.4225 North, 39.8262
    East. The second location is the calculated position of the observer. The third
    point is the north pole, where it acts as the axis for the angle between Kaaba
    and the calculated position. Therefore, the formula for the Qibla direction toward
    the Kaaba from the calculated position is,


    $$\Delta\lambda = (\lambda_{Location} - \lambda_{Kaabah})$$ Equation 5.1


    $\Delta\lambda$ is the formula for calculating the distance from the longitude
    of the Kaaba to the longitude of the place for a location located in the east
    longitude, which can be obtained by calculating the difference in the values of
    the two longitudes. Then,


    $$A = \sin \Delta\lambda$$ Equation 5.2


    $$B = \cos(\varphi_{Location}) \times \tan(\varphi_{Kaabah})$$ Equation 5.3


    $$C = \sin \varphi_{Location} \times \cos \Delta\lambda$$ Equation 5.4


    $$D = \frac{A}{(B - C)}$$ Equation 5.5


    Then the Qibla Direction ($\theta$) is calculated using the formula,


    $$\theta = Tan^{-1}(D)$$ Equation 5.6'
  merge: -1
