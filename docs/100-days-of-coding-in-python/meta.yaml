- md: "# Preface\n\nWelcome to an intense session during which you will learn Python.\
    \ This book will be your friend for the next 100 days to help you along the journey\
    \ of learning the fundamentals of Computer Science and how to program them in\
    \ Python.\n\nThis book will provide you step by step focused daily theory and\
    \ practice to help you master:\n\n1. programming foundation in Python;\n2. main\
    \ algorithms concepts;\n3. popular data structures that you will encounter often\
    \ in your life as a programmer;\n4. design patterns that will help you in writing\
    \ marvelous code.\n\n# Why this Book?\n\nSure enough plenty of books have been\
    \ written on Python and the official documentation [PSF] is - and always will\
    \ be - the source of knowledge. A go to for doubts.\n\nHowever, this book has\
    \ been specifically designed to walk you through - step by step - not only Python\
    \ syntax but also fundamentals of computer science that will make you a well-rounded\
    \ programmer.\n\n# Who This Book is Meant For\n\nIf you are new to programming\
    \ - in general - this book is right for you. Indeed it walks through the core\
    \ concept of programming as well as detailing relative Python implementations.\n\
    \n# Part 1 - The Basics\n\n# Introduction\n\nThis book is broken down into 5 Parts:\n\
    \n1. **Introduction**: covering basic concepts of Object Oriented Programming\
    \ and their Python implementation.\n2. **Algorithms**: including greedy approaches,\
    \ dynamic programming and an introduction to np-hard problems.\n3. **Data Structures**:\
    \ explaining the main data structures that you will encounter in your journey\
    \ as a programmer.\n4. **Design Pattern**: providing the foundation of software\
    \ architectures.\n5. **Solutions**: for all the coding exercises presented.\n\n\
    # The Study Plan\n\n# Where it All Begins\n\n# Introduction\n\n# Fundamentals\n\
    \nLet’s start with a general introduction to the Python language.\n\nThe goal\
    \ of this Chapter is to give you the essential elements of the language and start\
    \ getting used to Python code. In the first Chapters, indeed, what I am going\
    \ to do is to give you enough knowledge and hands-on practice - by means of exercises\
    \ - to start writing basic code that you’ll find in real life.\n\nThis is in line\
    \ with the general idea of this book: it is not meant to deal with all the details\
    \ and shades of the language, yet gently walk you through - in the shortest amount\
    \ of time possible - your first programs in Python.\n\nThe remaining of the Chapter\
    \ assumes you have your environment set up (i.e. python installed) and you know\
    \ basic terminal interaction.\n\nIf you are not completely new to either Python\
    \ or programming in general, you might want to quickly glance at this Chapter\
    \ or completely skip it altogether depending on your knowledge.\n\n# The beloved\
    \ hello world\n\nYes, it is kind-of a tradition to start every programming language\
    \ with a hello world. Yet, from a simple exercise you can start getting comfortable\
    \ with the syntax. Before learning to drive a car, you need to sit into one. And\
    \ this is what we’ll be doing in this Section. We’ll - indeed - walk through different\
    \ ways to run Python code.\n\nIn Python, the code to print ‘Hello, World’ is:\n\
    \n```python\nprint('Hello, World')\n```\n\n# The command line\n\nTo execute our\
    \ code let’s open our terminal and run first the command\n\n```python\n>>> python\n\
    ```\n\nThis command allows you to run - line by line - your code. Type in the\
    \ above hello-world code and look the magic happen!\n\nJust kidding, let’s warm\
    \ up!\n\n# .py code\n\nCommand line works for quick few lines testing. In any\
    \ real scenarios you’d want to write code that you can run, re-run and reuse.\
    \ So let’s save our code in a file.\n\n1. Create a file with .py extension (hello.py)\n\
    2. Open the file with the preferred editor (or IDE - e.g., Pycharm)\n3. Type in\
    \ the example and save\n4. Open the terminal, navigate - if needed - to the folder\
    \ that contains your hello.py\n5. Run the code by\n\n```python\n>>> python hello.py\n\
    ```\n\nDifferent process, same output.\n\n# The main\n\nmain() is a function provided\
    \ by most programming languages with the purpose of defining where the program\
    \ starts. Generally, this special function has a specific signature that defines\
    \ its inputs (arguments) and output (return).\n\nPython automatically runs programs\
    \ line-by-line scripts from the top to the bottom. However, the language still\
    \ provides a way to alter the flow of execution. One the most basic is, as you\
    \ figured, main.\n\nBack to our example.\n\nCreate another file named hello_main.py\
    \ and type in the following code.\n\n```python\nif __name__ == \"__main__\":\n\
    \    print(\"Hello, World\")\n```\n\nIf no typos or syntax issues exist you will\
    \ get the same result as from the previous examples.\n\n# Coding Practice of the\
    \ day\n\n# Warm up\n\nPlay around with the code provided in this Section. Change\
    \ indentation, remove parts of the code and get familiar with the error messages\
    \ you get out of the changes.\n\n# Medium\n\nTry to fix the following code:\n\n\
    ```python\n1  if __name__ == \"__main__\":\n2      print(\"Hello, \"World\"\"\
    )\n```\n\nThe expected result is the print of the line: Hello, “World”.\n\n> See\
    \ you tomorrow!\n\n# Basic Input/Output\n\nWe started, with a simple exercise,\
    \ to learn how to print a simple sentence (string) with the print command. However,\
    \ in most common situations you might want to concatenate several sentences, maybe\
    \ numbers, etc. Hence in the following we’ll learn some basic manipulation and\
    \ how to implement it.\n\n# Output manipulation\n\n# String concatenation\n\n\
    Consider the example where you want to print two separate words: “Hello, “ and\
    \ “World”.\n\nThe easiest way to achieve it by using the “+” operator as follows:\n\
    \n```python\nprint('Hello, ' + 'World')\n```\n\n# String literals\n\n# Sequence\
    \ escaping\n\n# Coding Practice of the day\n\n![](img/7998d25e6fd08f95d2e996d65431039f_22_0.png)\n\
    \nWarm up\nTBD\n\nMedium\nTBD\n\nPower-up\nTBD\n\nSee you tomorrow!\n\n# Give\
    \ it to me!\n\nWe learned how to print, let’s get our feet wet with getting some\
    \ custom-input as well. The most basic tool that Python gives us is the input()\
    \ function.\n\n## Coding Practice of the day\n\n- **Warm up**\n  TBD\n- **Medium**\n\
    \  TBD\n- **Power-up**\n  TBD\n\n> See you tomorrow!\n\n# Basic Types\n\n## Numeric\
    \ Types\n\nBasic numeric types in Python are:\n\n- integers\n- float\n- complex\n\
    \nIntegers are finite numbers, either positive or negative, without decimals.\n\
    \n```python\n1  num_int_pos = 42\n2  num_int_neg = -42\n```\n\nFloat numbers are\
    \ numbers, either positive or negative, with decimals. Python also supports the\
    \ scientific notation, as shown in the following snippet (line 3).\n\n```python\n\
    1  num_float_pos = 42.0\n2  num_float_neg = -42.0\n3  num_float_scientific = 42e2\n\
    ```\n\nJust as a reminder, the scientific notation - which is indicated with an\
    \ *e* or an *E* - defines the power of 10 of the given number. In the example\
    \ above, we declared a scientific number which is the power 10 of 42.\n\nPutting\
    \ all together, run the following code to match numbers to their relative *type*\
    \ counterpart.\n\n```python\n1  numbers = (42, -42, 42.0, -42.0, 42e2)\n2\n3 \
    \ for n in numbers:\n4      print(type(n))\n```\n\nThe output will look like:\n\
    \n```python\n1  >>> <class 'int'>\n2  >>> <class 'int'>\n3  >>> <class 'float'>\n\
    4  >>> <class 'float'>\n5  >>> <class 'float'>\n```\n\nEven if you will encounter\
    \ them way less often in your day to day programming, it is worth to mention that\
    \ Python also supports **complex** numbers. In mathematical terms, a complex number\
    \ is one that has a *real* part and an *imaginary* one. This type of number can\
    \ be expressed as:\n\n```python\n1 num_complex = 42+1j\n```\n\nIn this example,\
    \ 42 is the real portion, while the *j* indicates the imaginary counterpart.\n\
    \n# Strings\n\nA string is a sequence of characters. In Python, strings are declared\
