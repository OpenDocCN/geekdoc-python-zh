  md: '# State


    How are you doing?


    ![](img/7998d25e6fd08f95d2e996d65431039f_223_0.png)


    Fig 5.14 - State


    # What


    This pattern enables context-aware objects.


    # How


    It’s design is fairly simple: a Context, that represents the external interface,
    a State abstract class, different State implementations that define the actual
    states.

    In the following a simple implementation of this design pattern.'
  merge: -1
  pgno: 223
- img_proc: true
  md: "```\n# Context definition\nclass Context:\n\n    def __init__(self, state):\n\
    \        self._state = state\n\n    def manage(self):\n        self._state.behave()\n\
    \n# Abstract State class\nclass State():\n\n    def behave(self):\n        pass\n\
    \n# Concrete State Implementation\nclass ConcreteState():\n\n    def behave(self):\n\
    \        print 'State specific behaviour!'\n\n# Testing out\nif __name__ == \"\
    __main__\":\n    state = ConcreteState()\n    context = Context(state)\n    context.manage()\n\
    ```\n\n# When\n\nThe State pattern is helpful each time the behaviour of an object\
    \ is dependent of its state. In other words, it is applicable when the objects\
    \ requires changes in behaviour depending on state’s changes."
