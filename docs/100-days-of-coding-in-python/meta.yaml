  md: '```

    1 name = ''Giuliana''

    2

    3 def hello():

    4     print(''Hi {}, my dear! ''.format(name))

    5

    6 if __name__ == "__main__":

    7     hello()

    ```


    One of the key benefits of using modules - other than simply structuring our code
    - is to write them once and reuse them every time it is needed to.


    Consider another module, *multiple.py* that wants to greet an arbitrary number
    of times instead of just one. This cheerful module can resuse *hello.py* as follows.


    ```

    1 import basics.modules.hello as greet

    2

    3 def multiple_hello(number:int):

    4     i = 0

    5     while i < number:

    6         greet.hello()

    7         i+=1

    8

    9 if __name__ == "__main__":

    10     number = input("How many times? ")

    11

    12     #converting number from string to int

    13     number = int(number)

    14     multiple_hello(number)

    ```'
