    \ so keep reading and learning.\n\n## Naming Conventions\n\nNaming convention\
    \ might deserve - as a topic - an entire chapter - and I did in *Code Reviews\
    \ 101*. However, I'll try to keep your brain nice and quiet on the topic.\nFirst\
    \ and foremost, don't skip this section, a bit wordy for sure (we want code! I\
    \ hear you!). But they do exist for a good reason: readability.\n\n## What To\
    \ Avoid\n\nRule number 1: Don't use keywords as a variable name. Rule number 2:\
    \ don't use keywords as a variable name. You got it.\n\n## Conversions\n\nHere\
    \ are the basics conversions for Python:\n\n- **Package and Module**: all lower\
    \ case, crisp and short. If more than a single word, use an underscore ( _ ) as\
    \ a separator.\n- **Classes**: CamelCase. If you hate Java you can refer to it\
