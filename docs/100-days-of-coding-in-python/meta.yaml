  md: '# # Statements and Expressions


    A **statement** is an instruction that the interpreter (in case of Python) can
    execute.


    **Assignment**, as we have seen so far, is a specific type of statement called:
    **expression**. Generally speaking, other example of expressions are:


    +   - any arithmetic operation (e.g., sum, subtraction, division)

    - operating with strings (e.g., concatenation)

    - calling a function


    For example:


    ```

    python

    # summing first four numbers is an expression

    sum = 1 + 2 + 3 + 4


    # string concatenation is an expression

    signature = "name" + "surname"

    ```


    A statement could be mistakenly defined as: a single line of code. But it not
    100% true. I can be a single line of code as in the case of *assignment* (and
    often it is) but it can also be a more complex/long instructions. Statements can,
    indeed, be **multi-line**, even the simple ones. For example:


    ```

    python

    # single line statement

    signature = "name" + "surname"

    ```


    has the same outcome of:'
  merge: -1
  pgno: 33
- img_proc: true
  md: "```\n# multi-line statement\nsignature = \"name\" + \\n\"surname\"\n```\n\n\
    As well as:\n\n```\n# yet another multi-line statement\nsignature = \"name\" +\n\
    / \"surname\"\n```\n\nThe istruction is the same, but it is scattered on several\
    \ sequential lines. The first multi-line variations is reffered to as **explicit\
    \ line continuation**, while the second one is the **implicit** variation.\n\n\
    # Functions\n\nA set of statements that are functional to executing a logically\
    \ coherent piece of code can be grouped together to form a **function**. The general\
    \ shape of a *function* in Python (pseudo-code) is:\n\n```\n# general function\n\
    def foo_bar(params):\n    statement1\n    statement2\n    ...\n    return \"done\"\
    \n```\n\nFunctions are composed of:\n\n+   - the **signature**:"
  merge: -1
  pgno: 34
- img_proc: true
  md: "+   - the **def** keywork\n- the name of function (e.g., foo_bar)\n- a variable\
    \ number of parameters (in our example *params*). Parameters are used to provide\
    \ **input** to the function.\n\n+   - the **body** of the function, i.e., the\
    \ set of statements that all together express the logic\n\n+   - **return** statement:\n\
    \  - in the form *return value*\n  - used to define an output to the function\n\
    \  - can be optional\n\n# Modules\n\nModules are the basic way of organizing code\
    \ in Python. They are an arbitrary composition of:\n\n+   - variables\n- functions\n\
    - classes\n\nThe following snippet showcases the simplies module on earth: *hello.py*."
