- md: "## Factory Method\n\n![](img/7998d25e6fd08f95d2e996d65431039f_175_0.png)\n\n\
    This pattern is similar to the abstract factory, hence often times confused. Guess\
    \ what? Instead of building a *factory* object, this pattern can be synthesized\
    \ as a *factory* (actual) method.\n\nThe factory method, differently from the\
    \ abstract factory, instead of dealing with the composition of different sub-objects,\
    \ it is meant to create an object hiding internal details, whilst being a single\
    \ concrete product.\n\n## The Code\n\nThe following snippet shows a simple implementation\
    \ of the pattern.\n\n```python\n# First Product\nclass ProductA(object):\n   \
    \ def __init__(self):\n        print ('Building Product A')\n\n# Second Product\n\
    class ProductB(object):\n    def __init__(self):\n        print ('Building Product\
    \ B')\n```\n\n```python\n# Factory Method\ndef factory_method(product_type):\n\
    \    if product_type == 'PA':\n        return ProductA()\n    elif product_type\
    \ == 'PB':\n        return ProductB()\n    else:\n        raise ValueError('Cannot\
    \ find: {}'.format(product_type))\n\n# Client: testing out\nif __name__ == '__main__':\n\
    \    for product_type in ('PA', 'PB'):\n        product = factory_method(product_type)\n\
    \        print(str(product))\n```\n\n## Don'ts\n\nThe recommendation follows the\
    \ same guideline: do not opt for factories when object abstraction is not needed.\n\
    \n## Coding Practice of the day\n\n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n\
    - **Power-up**\n  TBD\n\nSee you tomorrow!\n\n# Structural\n\nThis Section walks\
    \ through the principal *Structural* patterns. I like to think about this category\
    \ as a big puzzle. You have interfaces and code which are already in place. But\
    \ you still have to make all the components interact and work in the best possible\
    \ way. The following patterns helps in achieving it.\n\n| Class | Patterns |\n\
    |---|---|\n| Structural | Adapter |\n| | Decorator |\n| | Facade |\n| | Composite\
    \ |\n\n## Adapter\n\nA piece of the puzzle.\n\n![](img/7998d25e6fd08f95d2e996d65431039f_180_0.png)\n\
    \n### What\n\nThe adapter is also known as *wrapper*. It wraps another object,\
    \ redefining its interface.\n\n### How\n\nA new class simply encapsulated the\
    \ incompatible object, thus providing the desired interface.\n\nIn the following,\
    \ a general implementation of this pattern.\n\n```python\n# Adapter: our wrapping\
    \ class\nclass Adapter:\n\n    def __init__(self):\n        self._adaptee = Adaptee()\n\
    \n    def request(self):\n        self._adaptee.legacy_request()\n\n# Adaptee:\
    \ existing interface\nclass Adaptee:\n\n    def legacy_request(self):\n      \
    \  print 'Matchy-matchy now! yay!'\n\n# Client: testing out\nif __name__ == \"\
    __main__\":\n    adapter = Adapter()\n    adapter.request()\n```\n\n### When\n\
    \nIt provides a simple way for solving compatibility issues between different\
    \ interfaces. Suppose a *caller* is expecting a different interface from a certain\
    \ object (*callee*) it can be made compatible by means of the *adapter*. They\
    \ can be handy for legacy software. It enables reusability for a low price.\n\n\
    ### Don'ts\n\nFairly trivial, up to the reader.\n\n## Coding Practice of the day\n\
    \n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n  TBD\n\nSee you\
    \ tomorrow!\n\n## Decorator\n\nSome software craft.\n\n![](img/7998d25e6fd08f95d2e996d65431039f_184_0.png)\n\
    \n### What\n\nThe Decorator also enable reusability by means of enhancing an object\
    \ behaviour.\n\n### How\n\nSimilarly to the previous pattern it wraps the object\
    \ adding the wanted functionalities.\n\nA simplified example of decorator is shown\
    \ in the following snippet of code.\n\n```python\n# Decorator interface\nclass\
    \ Decorator:\n    def __init__(self, component):\n        self._component = component\n\
    \n    def operation(self):\n        pass\n\n# Decorator\nclass ConcreteDecorator(Decorator):\n\
    \    \"\"\"\n    Add responsibilities to the component.\n    \"\"\"\n\n    def\
    \ operation(self):\n        self._component.operation()\n        print 'And some\
    \ more makeup!'\n\n# Component that needs to be decorated\nclass Component:\n\n\
    \    def operation(self):\n        print 'I have some makeup on!'\n\n# Client:\
    \ testing out\nif __name__ == \"__main__\":\n    component = Component()\n   \
    \ decorator = ConcreteDecorator(component)\n    decorator.operation()\n```\n\n\
    ### When\n\nIt helps in fighting the First Lady Component smell. Thus, it adds\
    \ functionalities to an object, whilst maintaining Single Responsibility Principle.\
    \ Indeed, the decorator allows for additional behaviour without impacting the\
    \ decorated component.\n\n### Don'ts\n\nSimple yet powerful, don’t have to add\
    \ much. But, don’t make the decorator become the new First Lady.\n\n## Coding\
    \ Practice of the day\n\n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n\
    \  TBD\n\nSee you tomorrow!\n\n## Facade\n\nPutting it all together.\n\n![](img/7998d25e6fd08f95d2e996d65431039f_189_0.png)\n\
    \nFig 5.8 - Facade\n\n### What\n\nA Facade, can be somehow ideally associated\
    \ with the Abstract Factory. However, instead of creating an object, it provides\
    \ a simpler interface for different other more complex interfaces.\n\n### How\n\
    \nThis pattern provides a brand new higher-level interface in order to make the\
    \ Subsystems (often independent classes with complex logic) easier to use and\
    \ interact with.\n\n```python\n# Facade\nclass Facade:\n\n    def __init__(self):\n\
    \        self._subsystem_1 = Subsystem1()\n        self._subsystem_2 = Subsystem2()\n\
    \n    def operation(self):\n        self._subsystem_1.operation1()\n        self._subsystem_2.operation2()\n\
    \n# Subsystem\nclass Subsystem1:\n\n    def operation1(self):\n        print 'Subsystem\
    \ 1: complex operations'\n\n# Subsystem\nclass Subsystem2:\n\n    def operation2(self):\n\
    \        print 'Subsystem 2: complex operations'\n\n# Client\nif __name__ == \"\
    __main__\":\n    facade = Facade()\n    facade.operation()\n```\n\n### When\n\n\
    If you are looking at your architecture and it is highly coupled, a facade might\
    \ help in reducing it.\n\n### Don'ts\n\nIt is very easy to make a facade that\
    \ acts as a Single Lady, please avoid it at all costs.\n\n## Coding Practice of\
    \ the day\n\n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n  TBD\n\
    \nSee you tomorrow!\n\n## Composite\n\nUniform is good.\n\n![](img/7998d25e6fd08f95d2e996d65431039f_194_0.png)\n\
    \n### What\n\nThe Composite pattern provides an interface - again. It aims at\
    \ managing a group of complex objects and single objects exposing similar functionalities\
    \ in a uniform manner.\n\n### How\n\nIt composes objects into a tree structure,\
    \ in such a way that nodes in the tree - unregarding whether they are a leaf (single\
    \ object) or complex object (i.e. - non leaves) - can be accessed in a similar\
    \ way, abstracting complexity to the *caller*. In particular, when a method is\
    \ called on a node, if it is a leaf, the node manages it autonomously. Otherwise,\
    \ the node calls the method upon its childrens.\n\n```python\n# Abstract Class\n\
