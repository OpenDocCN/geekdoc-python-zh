    \ the objects. A *ConcreteVisitor* that implements the actual traversal. A *Visitable*\
    \ interface that defines an *accept()* method. A *ConcreteVisitable* that given\
    \ the visitor object implements the accept operation.\n\n```python\n# Visitable\
    \ supported operations\nclass VisitableElement():\n    def accept(self, visitor):\n\
    \        pass\n\n# Concrete element to be visited\nclass ConcreteElement(VisitableElement):\n\
    \    def __init__(self):\n        self._el = 'Concrete element'\n\n    def accept(self,\
    \ visitor):\n        visitor.visit(self)\n\n# Visitor allowed operations\nclass\
    \ Visitor():\n\n    def visit(self, concrete_element_a):\n        pass\n\n# Implementing\
    \ actual visit\nclass ConcreteVisitor(Visitor):\n\n    def visit(self, concrete_element):\n\
    \        print('Visiting {}'.format(concrete_element._el))\n\n# Testing out\n\
    if __name__ == \"__main__\":\n    concrete_visitor = ConcreteVisitor()\n    concrete_element\
    \ = ConcreteElement()\n    concrete_element.accept(concrete_visitor)\n```\n\n\
    # When\n\nAn example of application of the visitor pattern is within data structures\
    \ for tree traversal (e.g., pre-order, in-order, post-order). It suites fairly\
    \ well tree-like structures (e.g., syntax parsing), but is not strictly tight\
    \ to these cases. Visitor pattern is not used only for tree-like structures.\n\
    \n# Don'ts\n\nAvoid building visitors around unstable components.\n\n# Coding\
    \ Practice of the day\n\n- ☕ **Warm up**\n  TBD\n- \U0001F17C **Medium**\n  TBD\n\
    - \U0001F4A3 **Power-up**\n  TBD\n\nSee you tomorrow!\n\n# State\n\nHow are you\
    \ doing?\n\n![](img/7998d25e6fd08f95d2e996d65431039f_223_0.png)\n\nFig 5.14 -\
    \ State\n\n# What\n\nThis pattern enables context-aware objects.\n\n# How\n\n\
    It’s design is fairly simple: a Context, that represents the external interface,\
    \ a State abstract class, different State implementations that define the actual\
    \ states.\nIn the following a simple implementation of this design pattern.\n\n\
    ```python\n# Context definition\nclass Context:\n\n    def __init__(self, state):\n\
    \        self._state = state\n\n    def manage(self):\n        self._state.behave()\n\
    \n# Abstract State class\nclass State():\n\n    def behave(self):\n        pass\n\
    \n# Concrete State Implementation\nclass ConcreteState():\n\n    def behave(self):\n\
    \        print('State specific behaviour!')\n\n# Testing out\nif __name__ == \"\
    __main__\":\n    state = ConcreteState()\n    context = Context(state)\n    context.manage()\n\
    ```\n\n# When\n\nThe State pattern is helpful each time the behaviour of an object\
    \ is dependent of its state. In other words, it is applicable when the objects\
    \ requires changes in behaviour depending on state’s changes.\n\n# Don'ts\n\n\
    Pay close attention of when you actually use it. The number of states might exponentially\
    \ grow.\n\n# Coding Practice of the day\n\n- ☕ **Warm up**\n  TBD\n- \U0001F17C\
    \ **Medium**\n  TBD\n- \U0001F4A3 **Power-up**\n  TBD\n\n> See you tomorrow!\n\
    \n# Chain of Responsibility\n\nMicromanaging is never the case.\n\n![](img/7998d25e6fd08f95d2e996d65431039f_228_0.png)\n\
    \n# What\n\nThe *Chain of Responsibility* pattern fosters decoupling the sender\
    \ of request from the receiver.\n\n# How\n\nMore objects within a pipeline are\
    \ given a chance to handle an incoming request. In particular, the request is\
    \ passed sequentially through the pipeline until an object is actually able to\
    \ handle it.\n\n```python\n# Handler Interface\nclass Handler():\n\n    def __init__(self,\
    \ request=None, successor=None):\n        self._successor = successor\n\n    def\
    \ handle_request(self):\n        pass\n\n# Concrete Handler\nclass IntegerHandler(Handler):\n\
    \n    def handle_request(self):\n        if request.get_type() is int:\n     \
    \       print(self.__class__.__name__)\n        elif self._successor is not None:\n\
    \            self._successor.handle_request()\n\n# Another Concrete Handler\n\
    class StringHandler(Handler):\n\n    def handle_request(self):\n        if request.get_type()\
    \ is str:\n            print(self.__class__.__name__)\n        elif self._successor\
    \ is not None:\n            self._successor.handle_request()\n\n# Simple Request\
    \ object\nclass Request():\n\n    def __init__(self):\n        self._el = 'I am\
    \ a string'\n\n    def get_type(self):\n        return type(self._el)\n\n# Testing\
    \ out\nif __name__ == \"__main__\":\n    request = Request()\n    string_handler\
    \ = StringHandler(request=request)\n    int_handler = IntegerHandler(request=request,\
    \ successor=string_handler)\n    int_handler.handle_request()\n```\n\n# When\n\
    \nIn cases when you want to simplify the request object and different objects\
    \ might be added at runtime to actually handle it. It is pretty handy because\
    \ you can decide which and in which order handlers are added to the chain.\n\n\
    # Don'ts\n\nBack to non-functional requirements. Keep an eye on the required performances.\
    \ Too many handlers (executed sequentially, in worst case skipping up to the very\
    \ last handler in the chain) might impact code performances. Also bear in mind\
    \ that debugging these pattern could fairly difficult.\n\n# Coding Practice of\
    \ the day\n\n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n  TBD\n\
    \n> See you tomorrow!\n\n# Part 5 - Solutions\n\n# The Basics\n\n---\n\n# Basic\
