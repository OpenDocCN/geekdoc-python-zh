  md: '# When


    In cases when you want to simplify the request object and different objects might
    be added at runtime to actually handle it. It is pretty handy because you can
    decide which and in which order handlers are added to the chain.


    # Don''ts


    Back to non-functional requirements. Keep an eye on the required performances.
    Too many handlers (executed sequentially, in worst case skipping up to the very
    last handler in the chain) might impact code performances. Also bear in mind that
    debugging these pattern could fairly difficult.'
