    \ **Power-up**\nTBD\n\n> See you tomorrow!\n\n## Iterator\n\nLooking forward.\n\
    \n![](img/7998d25e6fd08f95d2e996d65431039f_213_0.png)\n\nFig 5.12 - Iterator\n\
    \n## What\n\nThe iterator allows to navigate elements within an object, abstracting\
    \ internal management.\n\n## How\n\nCommonly, this pattern exposes two method\
    \ *next()* and *has-Next()* to perform the traversal.\n\nPython implementations\
    \ normally require an iterable object to implement:\n\n1. **iter**, that returns\
    \ the instance object.\n2. **next**, that will return the next value of the iterable.\n\
    \nA simple implementation of these two method is presented in the following snippet.\n\
    \n```python\n# Our collection of elements\nclass MyCollection():\n    def __init__(self):\n\
    \        self._data = list()\n\n    def populate(self):\n        for el in range(0,\
    \ 10):\n            self._data.append(el)\n\n    def __iter__(self):\n       \
    \ return Iterator(self._data)\n\n# Our iterator\nclass Iterator():\n    def __init__(self,\
    \ data):\n        self._data = data\n        self._counter = 0\n\n    def next(self):\n\
    \        if self._counter == len(self._data):\n            raise StopIteration\n\
    \        to_ret = self._data[self._counter]\n        self._counter = self._counter\
    \ + 1\n        return to_ret\n\n# Testing out\nif __name__ == \"__main__\":\n\
    \    collection = MyCollection()\n    collection.populate()\n    for el in collection:\n\
    \        print(el)\n```\n\nIn the above example, *StopIteration* signals no more\
    \ elements in the collection.\n\n## When\n\nProbably one of the most common applications\
    \ is for data structures where elements within them can be (often times sequentially)\
    \ accessed without knowing inner functioning. However, it can be used any time\
    \ a traversal is needed without introducing changes to current interfaces.\n\n\
    ## Don'ts\n\nIf the collection is small and simple, it might be not really required."
