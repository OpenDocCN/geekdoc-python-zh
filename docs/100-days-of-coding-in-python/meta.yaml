    \ |\n| | Iterator |\n| | Visitor |\n| | State |\n| | Chain of Responsibility |\n\
    \n## Observer\n\nAt a glance.\n\n![](img/7998d25e6fd08f95d2e996d65431039f_201_0.png)\n\
    \n## What\n\nIn Operating Systems, a common way of notifying changes happening\
    \ in the system are *polling* and *interrupts* mechanisms. In the context of higher-level\
    \ programming, a smarter way for notifying changes has been ideated: The *Observer*\
    \ pattern.\n\n## How\n\nA component - whose state needs to be notified - stores\
    \ a list of dependencies. Each and every time a change occurs, it notifies it\
    \ to its stored list.\n\n```python\n# The observable subject\nclass Subject:\n\
    \    def __init__(self):\n        self._observers = set()\n        self._state\
    \ = None\n\n    def subscribe(self, observer):\n        observer._subject = self\n\
    \        self._observers.add(observer)\n\n    def unsubscribe(self, observer):\n\
    \        observer._subject = None\n        self._observers.discard(observer)\n\
    \n    def _notify(self):\n        for observer in self._observers:\n         \
    \   observer.update(self._state)\n\n    def set_state(self, arg):\n        self._state\
    \ = arg\n        self._notify()\n\n# Interface for the Observer\nclass Observer():\n\
    \    def __init__(self):\n        self._subject = None\n        self._observer_state\
    \ = None\n\n    def update(self, arg):\n        pass\n\n# Concrete observer\n\
    class ConcreteObserver(Observer):\n    def update(self, subject_state):\n    \
    \    self._observer_state = subject_state\n        print('Uh oh! The subject changed\
    \ state to:\\n{}'.format(subject_state))\n        # ...\n\n# Testing out\nif __name__\
    \ == \"__main__\":\n    subject = Subject()\n    concrete_observer = ConcreteObserver()\n\
    \    subject.subscribe(concrete_observer)\n\n    # External changes: testing purposes\n\
    \    subject.set_state('Ping')\n    subject.set_state('Pong')\n```\n\n## When\n\
    \nWhen you need different objects to perform - automatically - some functions\
    \ based on the state of another one (one-to-many).\n\n## Don'ts\n\nOnce again,\
    \ keep it simple, evaluate if the conditions above and do not add unnecessary\
    \ complexity.\n\n## Coding Practice of the day\n\n- **Warm up**\n  TBD\n- **Medium**\n\
    \  TBD\n- **Power-up**\n  TBD\n\nSee you tomorrow!\n\n## Publisher-Subscriber\n\
    \nPlease, let me know.\n\n![](img/7998d25e6fd08f95d2e996d65431039f_207_0.png)\n\
    \nFig 5.11 - Publisher Subscriber\n\n### What\n\nSimilarly to the previous one,\
    \ it enables to monitor state changes.\n\n### How\n\nAs confusing as it might\
    \ initially sound, this pattern is very similar to the previous one, but they\
    \ are not actually the same.\n\nThere are two basic components: **publisher**\
    \ - the entity who’s state is monitored, and **subscriber** - the one that is\
    \ interested in receiving state changes. The main difference is that the dependency\
    \ between them is abstracted by a third component - often referred to as **broker**,\
    \ that manages the states update.\n\n```python\n# Publisher\nclass Publisher:\n\
    \    def __init__(self, broker):\n        self.state = None\n        self._broker\
    \ = broker\n\n    def set_state(self, arg):\n        self._state = arg\n     \
    \   self._broker.publish(arg)\n\n# Subscriber\nclass Subscriber():\n    def __init__(self):\n\
