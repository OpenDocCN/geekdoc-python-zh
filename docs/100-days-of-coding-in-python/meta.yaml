- md: "## Internals\n\n## Coding Practice of the day\n\n- **Warm up**\n  TBD\n- **Medium**\n\
    \  TBD\n- **Power-up**\n  TBD\n\n> See you tomorrow!\n\n## Stack\n\nA Stack is\
    \ a collection of elements that is managed with *Last In First Out* (LIFO) policy.\
    \ Internal implementation varies and can be achieved using either Arrays or Linked-Lists.\n\
    \nThe Stack data structures exposed three main methods:\n\n1. top(), that returns\
    \ the element on top of the stack,\n2. pop(), that removes and returns the element\
    \ on the top of the stack,\n3. put(), that adds a new element at the top of the\
    \ stack.\n\nSome of the problems that mostly benefits from the utilization of\
    \ this data structure includes pattern validation (e.g., well-parenthesized expressions)\
    \ as well as general parsing problems due to the LIFO policy.\n\n## Internals\n\
    \n## Coding Practice of the day\n\n### Warm up\n\nGiven an array A of integers\
    \ in input, print its elements in revers by using a stack.\n\nExample\n\nA = [1,2,3,4,5]\n\
    \nPrinted Result\n\n5 4 3 2 1\n\n### Medium\n\nTBD\n\n### Power-up\n\nImplement\
    \ a Stack class and provide the logic of main methods: top(), pop() and put().\n\
    \n> > See you tomorrow!\n\n## Queue\n\nA Queue is defined as a collection of elements\
    \ that is managed with *First In First Out* (FIFO) policy. Similarly to Stacks,\
    \ it can be implemented either with Arrays or Linked-Lists.\n\nQueues provide\
    \ three main methods, in a similar fashion to what is performed by Stacks:\n\n\
    1. peak(), that returns the first (figurative left to right) element in the queue,\n\
    2. remove(), that removes the first element and returns it,\n3. add(), that adds\
    \ a new element at the end of the queue.\n\nQueues are often used in concurrent\
    \ programming, where several tasks need to be executed as well as patterns for\
    \ messages exchange. In broader terms, queues suit well cases where order preservation\
    \ is necessary, hence benefiting from a FIFO approach.\n\n## Internals\n\n## Coding\
    \ Practice of the day\n\n- **Warm up**\n  TBD\n- **Medium**\n  Implement main\
    \ Queue methods using a Stack.\n- **Power-up**\n  TBD\n\nSee you tomorrow!\n\n\
    ## Hash Map\n\nHash Maps have a very different storage strategy for the data:\
    \ each element is broken down into a (key, values) pair.\n\nIn spite of a more\
    \ complex internal logic, using Hash Maps has the main benefit of providing insert,\
    \ delete and lookup operation in $O(1)$ time in the average case.\n\nAs the name\
    \ of this data structures expresses, keys are stored in locations (also referred\
    \ to as *slots*) based on their **hash code**. Upon inserting a new element, a\
    \ hash function is applied to the key, resulting into an *hash code* which is\
    \ used then to place and associate the relative inputted value.\n\nDifferent implementation\
    \ can use different Hash functions. Yet they have a common characteristic: the\
    \ same key must corrrespond always to the one and one only hash code. A good hash\
    \ function also must minimize cases where two different keys correspond to the\
    \ same hash code, in which case it would produce a **collision**.\n\nWorth also\
    \ to notice that the benefits in terms of run time, strictly depend on the strength\
    \ of the hash function. Indeed, one other characteristic of a solid hash faction\
    \ is its capability to uniformly spread the entire set of available slots, namely\
    \ the **bucket** (e.g., an array of keys).\nHash maps have good performances in\
    \ many real-world scenarios.\n\n## Internals\n\n## Coding Practice of the day\n\
    \n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n  TBD\n\n## See you\
    \ tomorrow!\n\n## Binary Search Trees\n\nTrees is another fairly used data structure\
    \ when modeling real-world scenarios.\n\nFormally, a tree is a collection of elements,\
    \ where each of them has a *value* and a variable number of *pointers* to other\
    \ nodes (namely, *childs*). Nodes in a tree are organized in a *top-down* fashion,\
    \ meaning that pointers usually link nodes from the *top* to thr *bottom* and\
    \ each node has a single pointer referencing to it.\n\nThe note at the top is\
    \ called the *root* of the tree. Nodes at the very bottom do not have *childs*\
    \ and are called the leaves of the tree.\n\nA lot of problems require a particular\
    \ type of tree: *binary tree*. What distinguish a tree from a binary one is that\
    \ each node in the binary tree has at most two *child*, namely *left* and *right*.\n\
    \nWhen ordering is required, an extension of the Binary Tree is used: the *Binary\
    \ Search Tree* is used. BS Trees are built by embedding ordering among its elements\
    \ in such a way that, for every node:\n\n- the left child's value is always less\
    \ that or equal to the node's value;\n- the right child's value is always greater\
    \ than or equal to the node's value.\n\nAs also the name of this type of data\
    \ structure suggests, the benefits occurring from its utilization emerge when\
    \ a fast search of elements is needed.\n\nThis is enabled by the ordering enforced\
    \ upon node creation, that allows for excluding half of the tree at every step\
    \ of the search (in the *average* case).\n\nIn general terms, recursive problems\
    \ are well modelled by trees.\n\n## Internals\n\n## Coding Practice of the day\n\
    \n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n  TBD\n\nSee you\
    \ tomorrow!\n\n## Takeaway\n\nThis Chapter on data structures is not meant to\
    \ be a data structure book. It aims at providing you a quick yet useful introduction\
    \ on using data structures in common scenarios.\n\nI’d love to close this Chapter\
    \ on data structures also providing you some indicators that can guide you when\
    \ opting for one data structure in favore of another one:\n\n- the size of data,\n\
    - how frequently data changes and its type,\n- which operation are more frequent\
    \ in your context.\n\nSome rules of thumb:\n\n1. do not force the API of a given\
    \ data structure. If you are thinking about extending if with operations that\
    \ are not natively supported, probably you’d be better off switching to a different\
    \ data structure;\n2. do not think only at the scenario you are facing at the\
    \ moment. Think long term. This is way common when thinking about the size of\
    \ the data and how it might evolve in the future.\n3. use the 80/20 pareto principle\
    \ to help you choose the best data structure. This is useful for optimization\
    \ purposes. Which operation do you perform the most? Than generally needs to be\
    \ optimized.\n4. don’t overcomplicate. More complex data structure still requires\
    \ some more memory management and processing.\n\n## Further Reading\n\nI love\
    \ data structures. And amazing books are out there that dig deeper into various\
    \ data structures and algorithms in general. Top of the list [Cormen et al.] is\
    \ a must read if you haven’t yet.\n\n## Part 4 - Design Patterns\n\n## Introduction\n\
    \nThis Part of the book we will go through some general concepts around software\
    \ architectures, specifically:\n\n- common and widely used design patterns;\n\
    - does and don'ts;\n- main issues you might encounter at design time.\n\n## Design\
    \ Patterns\n\nLet’s shower a smelly architecture. One of the common ways to improve\
    \ the design is by using appropriate design patterns. Patterns are simply a way\
    \ to organize conceptual problems and relative code to solve common issues.\n\n\
    They are broken down into 4 main categories:\n\n- **creational**, design patterns\
    \ that aim at focusing on object creation;\n- **structural**, that simplify and\
    \ optimize the relations between different objects;\n- **behavioural**, that establishes\
    \ common pattern for communications between components;\n- **concurrency**, that\
    \ are specifically designed to address multi-threading scenarios.\n\nIn this Section,\
    \ we will learn common patterns from the first three categories and shown in the\
    \ following Table.\n\nConcurrency patterns are a bit of a stretch and not part\
    \ of the general goal for this book. However, foundations about concurrent programming\
    \ will be discussed in the *Concurrency, Parallelism and Performances* Chapter."
  mdcn: "## 内部原理\n\n## 今日编程练习\n\n- **热身**\n  待定\n- **中等难度**\n  待定\n- **进阶**\n  待定\n\
    \n> 明天见！\n\n## 栈\n\n栈是一种按照*后进先出*（LIFO）策略管理的元素集合。其内部实现方式多样，可以使用数组或链表来实现。\n\n栈这种数据结构主要暴露三个方法：\n\
    \n1.  `top()`，返回栈顶元素，\n2.  `pop()`，移除并返回栈顶元素，\n3.  `put()`，在栈顶添加一个新元素。\n\n得益于其LIFO策略，许多问题尤其适合利用栈来解决，例如模式验证（如括号匹配表达式）以及一般的解析问题。\n\
    \n## 内部原理\n\n## 今日编程练习\n\n### 热身\n\n给定一个整数数组A，使用栈将其元素逆序打印。\n\n示例\n\nA = [1,2,3,4,5]\n\
    \n打印结果\n\n5 4 3 2 1\n\n### 中等难度\n\n待定\n\n### 进阶\n\n实现一个栈类，并提供主要方法的逻辑：`top()`、`pop()`\
    \ 和 `put()`。\n\n> > 明天见！\n\n## 队列\n\n队列被定义为一种按照*先进先出*（FIFO）策略管理的元素集合。与栈类似，它也可以使用数组或链表来实现。\n\
    \n队列提供了三个主要方法，其作用与栈的方法类似：\n\n1.  `peak()`，返回队列中的第一个（从左到右）元素，\n2.  `remove()`，移除并返回第一个元素，\n\
    3.  `add()`，在队列末尾添加一个新元素。\n\n队列常用于并发编程，其中多个任务需要执行，也用于消息交换模式。更广泛地说，队列非常适合需要保持顺序的场景，因此受益于FIFO方法。\n\
    \n## 内部原理\n\n## 今日编程练习\n\n- **热身**\n  待定\n- **中等难度**\n  使用栈实现队列的主要方法。\n- **进阶**\n\
    \  待定\n\n明天见！\n\n## 哈希表\n\n哈希表对数据的存储策略截然不同：每个元素被分解为一个（键，值）对。\n\n尽管内部逻辑更为复杂，但使用哈希表的主要好处在于，它能在平均情况下以\
    \ $O(1)$ 的时间复杂度完成插入、删除和查找操作。\n\n正如这种数据结构的名称所示，键根据其**哈希码**存储在特定位置（也称为*槽*）。插入新元素时，会对键应用一个哈希函数，生成一个*哈希码*，然后用它来放置并关联相应的输入值。\n\
    \n不同的实现可以使用不同的哈希函数。但它们有一个共同特点：相同的键必须始终对应唯一的一个哈希码。一个好的哈希函数还必须尽量减少两个不同键对应相同哈希码的情况，这种情况会产生**冲突**。\n\
    \n同样值得注意的是，运行时性能的提升严格依赖于哈希函数的强度。实际上，一个健壮的哈希函数的另一个特点是它能够均匀地分布所有可用的槽，即**桶**（例如，一个键数组）。\n\
    哈希表在许多现实场景中表现出色。\n\n## 内部原理\n\n## 今日编程练习\n\n- **热身**\n  待定\n- **中等难度**\n  待定\n\
    - **进阶**\n  待定\n\n## 明天见！\n\n## 二叉搜索树\n\n树是另一种在建模现实场景时相当常用的数据结构。\n\n形式上，树是一个元素的集合，其中每个元素都有一个*值*和指向其他节点（即*子节点*）的可变数量的*指针*。树中的节点以*自上而下*的方式组织，这意味着指针通常将节点从*顶部*链接到*底部*，并且每个节点只有一个指向它的指针。\n\
    \n顶部的节点称为树的*根*。最底部的节点没有*子节点*，称为树的叶子。\n\n许多问题需要一种特定类型的树：*二叉树*。二叉树与普通树的区别在于，二叉树中的每个节点最多有两个*子节点*，即*左*子节点和*右*子节点。\n\
    \n当需要排序时，会使用二叉树的一种扩展：*二叉搜索树*。二叉搜索树通过在其元素间嵌入排序规则来构建，使得对于每个节点：\n\n- 左子节点的值始终小于或等于该节点的值；\n\
    - 右子节点的值始终大于或等于该节点的值。\n\n正如这种数据结构的名称所示，其使用带来的好处在需要快速搜索元素时显现出来。\n\n这得益于节点创建时强制执行的排序，它允许在搜索的每一步（在*平均*情况下）排除掉一半的树。\n\
    \n总的来说，递归问题非常适合用树来建模。\n\n## 内部原理\n\n## 今日编程练习\n\n- **热身**\n  待定\n- **中等难度**\n\
    \  待定\n- **进阶**\n  待定\n\n明天见！\n\n## 要点总结\n\n本章关于数据结构的内容并非旨在成为一本数据结构教科书。它旨在为你提供一个快速而实用的介绍，讲解如何在常见场景中使用数据结构。\n\
    \n我很想在结束本章时，也为你提供一些指标，以便在选择一种数据结构而非另一种时作为参考：\n\n- 数据的规模，\n- 数据变化的频率及其类型，\n- 在你的上下文中哪些操作更频繁。\n\
    \n一些经验法则：\n\n1.  不要强行使用某个给定数据结构的API。如果你正在考虑用它不原生支持的操作来扩展它，那么你可能最好切换到另一种数据结构；\n\
    2.  不要只考虑你当前面临的场景。要从长远考虑。在思考数据规模及其未来可能如何演变时，这一点很常见。\n3.  使用80/20帕累托原则来帮助你选择最佳的数据结构。这对于优化目的很有用。你最常执行哪个操作？那么它通常就需要被优化。\n\
    4.  不要过度复杂化。更复杂的数据结构仍然需要更多的内存管理和处理。\n\n## 延伸阅读\n\n我热爱数据结构。市面上有许多精彩的书籍，它们更深入地探讨了各种数据结构以及通用的算法。如果还没读过，[Cormen等人]的著作是必读的。\n\
    \n## 第四部分 - 设计模式\n\n## 引言\n\n在本书的这一部分，我们将探讨一些关于软件架构的通用概念，具体包括：\n\n- 常见且广泛使用的设计模式；\n\
    - 注意事项与禁忌；\n- 在设计阶段可能遇到的主要问题。\n\n## 设计模式\n\n让我们来改善一个糟糕的架构。改进设计的常用方法之一是使用合适的设计模式。模式仅仅是组织概念性问题及其相关代码以解决常见问题的一种方式。\n\
    \n它们被分为4个主要类别：\n\n- **创建型**，旨在专注于对象创建的设计模式；\n- **结构型**，简化并优化不同对象之间的关系；\n- **行为型**，为组件间的通信建立通用模式；\n\
    - **并发型**，专门设计用于解决多线程场景。\n\n在本节中，我们将学习前三个类别中的常见模式，如下表所示。\n\n并发模式有点超出范围，不是本书的一般目标。然而，关于并发编程的基础知识将在*并发、并行与性能*章节中讨论。"
