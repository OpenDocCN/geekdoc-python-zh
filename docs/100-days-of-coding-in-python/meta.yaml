    at providing you a quick yet useful introduction on using data structures in common
    scenarios.


    I’d love to close this Chapter on data structures also providing you some indicators
    that can guide you when opting for one data structure in favore of another one:


    +   - the size of data,

    - how frequently data changes and its type,

    - which operation are more frequent in your context.


    Some rules of thumb:


    +   1. do not force the API of a given data structure. If you are thinking about
    extending if with operations that are not natively supported, probably you’d be
    better off switching to a different data structure;'
