    # # Binary Search Trees


    Trees is another fairly used data structure when modeling real-world scenarios.


    Formally, a tree is a collection of elements, where each of them has a *value*
    and a variable number of *pointers* to other nodes (namely, *childs*). Nodes in
    a tree are organized in a *top-down* fashion, meaning that pointers usually link
    nodes from the *top* to thr *bottom* and each node has a single pointer referencing
    to it.


    The note at the top is called the *root* of the tree. Nodes at the very bottom
    do not have *childs* and are called the leaves of the tree.'
  - '[PAGE 145]


    ![](img/7998d25e6fd08f95d2e996d65431039f_145_0.png)


    **Fig 3.8 - Tree**


    A lot of problems require a particular type of tree: *binary tree*. What distinguish
    a tree from a binary one is that each node in the binary tree has at most two
    *child*, namely *left* and *right*.


    When ordering is required, an extension of the Binary Tree is used: the *Binary
    Search Tree* is used. BS Trees are built by embedding ordering among its elements
    in such a way that, for every node:


    +   - the left child''s value is always less that or equal to the node''s value;

    - the right child''s value is always greater than or equal to the node''s value.


    As also the name of this type of data structure suggests, the benefits occurring
    from its utilization emerge when a fast search of elements is needed.'
  - '[PAGE 146]


    This is enabled by the ordering enforced upon node creation, that allows for excluding
    half of the tree at every step of the search (in the *average* case).


    In general terms, recursive problems are well modelled by trees.


