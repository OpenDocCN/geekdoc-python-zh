  md: '# Builder


    ![](img/7998d25e6fd08f95d2e996d65431039f_165_0.png)


    The **Builder** breaks down the creation of a complex object into smaller separated
    creational tasks, alongside the *KISS* (Keep It Simple Stupid) principle. It


    Specifically, the *Builder* pattern provides an external interface that allows
    for the creation of the complex object as a single task. However, it internally
    handles the breakdown on the big object into smaller objects using what are called
    *ConcreteBuilders*, each of which performing one step of the entire processing
    pipeline.


    As a result, this pattern is helpful when the object to be built can be constructed
    via an arbitrary number of tasks.


    # The Code


    The example code below shows the creation of a laptop. Virtually, a laptop can
    be broken down into several creational tasks that need to be performed in order
    to have the final product such as CPU, RAM, disk, etc.'
