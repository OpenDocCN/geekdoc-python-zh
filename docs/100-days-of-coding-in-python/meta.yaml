    ![](img/7998d25e6fd08f95d2e996d65431039f_218_0.png)


    # What


    The Visitor allows to decouple operational logic (i.e., algorithms) that would
    be - otherwise - scattered throughout different similar objects.


    # How


    A *Visitor* that provides a *visit()* interface that allows to traverse the objects.
    A *ConcreteVisitor* that implements the actual traversal. A *Visitable* interface
    that defines an *accept()* method. A *ConcreteVisitable* that given the visitor
    object implements the accept operation.'
