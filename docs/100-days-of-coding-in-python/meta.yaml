    \ 'float'>\n```\n\n它们有若干优点和缺点。\n使用这种数据结构的好处来自于它们的简单性和对元素的线性访问，如*表 4.1*所示——其中 *n*\
    \ 是列表中的元素数量。\n主要缺点是，由于需要移位操作，从列表中插入和删除项目代价高昂。最坏的情况如下：考虑删除列表中索引为0的第一个元素。此操作会创建一个空位。为了维护索引和顺序，索引为1及之后的所有项目都需要向后移动一个位置。这给我们带来了\
    \ *O(n)* 的复杂度。插入操作也有类似的考虑。\n\n### 内部实现\n\n## 今日编码练习\n\n### 热身\n\n给定一个整数数组A作为输入，将其逆序打印。\n\
    \n示例\n\nA = [1,2,3,4,5]\n\n打印结果：\n\n5 4 3 2 1\n\n### 中等\n\n给定一个整数数组A作为输入，在不使用内置函数的情况下将其逆序并打印。\n\
    \n示例\n\nA = [1,2,3,4,5]\n\n逆序后：\n\nA = [5,4,3,2,1]\n\n![](img/7998d25e6fd08f95d2e996d65431039f_122_0.png)\n\
    \n### 进阶\n\n给定两个数组 $A$ 和 $B$，计算 $B$ 作为 $A$ 元素子集的出现次数。\n\n示例 1\n\nA = [1,1,1,1,1]\n\
    \nB = [1,1]\n\n出现次数 = 4\n\n示例 2\n\nA = [0,1,1,0,1,0]\n\nB = [0,1]\n\n出现次数 = 2\n\
    \n明天见！\n\n### 链表\n\n链表是一个节点的集合，其中每个节点由一个*值*和一个指向列表中下一个节点的*指针*组成。\n\n![](img/7998d25e6fd08f95d2e996d65431039f_125_0.png)\n\
    \n图 3.3 - 链表\n\n与数组相比，*添加*和*删除*操作实现了稍微复杂的逻辑——但由于不需要移位。具体来说，从列表中删除一个项目可以通过更改需要删除元素之前的元素的指针来实现。前一个元素需要指向需要从列表中删除的元素之后的元素。时间复杂度在最坏情况下仍然是\
    \ *O(n)*。确实，由于我们失去了数组提供的索引直接访问，为了找到需要删除的项目，我们需要遍历整个列表直到找到它的前驱。删除列表的最后一个元素代表了最坏的情况。\n\
    \n### 内部实现\n\n## 今日编码练习\n\n- **热身**\n  待定\n- **中等**\n  待定\n- **进阶**\n  待定\n\n\
    明天见！\n\n### 双向链表\n\n双向链表与前一种类似。然而，每个元素（也称为节点或项）还存储一个指向列表中前一个元素的指针。"
