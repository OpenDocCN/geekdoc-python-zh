    # # Documentation


    Spoiler alert: documentation and comments - done for good - matter. Mumble, mumble.


    This Chapter will go streight to the point: how to write good comments to support
    your colleagues and... the future version of you! We will walk through some of
    the bad practices and provide guidance on how to write documentation...for good.'
- md: "## The Syntax\n\nPython, analogously to other programming languages, supports\
    \ two types of comments: * **in-line**, achieved by placing a # character before\
    \ the actual comment (one liner) * **extended documentation**, achieved by wrapping\
    \ multiple lines of text within \"\"\".\n\nWe already saw *in-line* comments so\
    \ far, but for the sake of completeness, here it is an example of this style of\
    \ comment.\n\n```\nwhile condition:\n    # I am an in-line comment\n    ...\n\
    ```\n\nAn example of extended documentation is in the following snippet.\n\n```\n\
    \"\"\"\nI am an extended documentation.\nIn this case I document the following\
    \ function.\nMumble mumble.\n\"\"\"\n\ndef mumble_mumble():\n    pass\n```\n\n\
    Extended documentation is also referred to as *docstrings*.\n\n## If the Code\
    \ is Good I don’t need Comments Philosophy\n\nSomeone approaches the philosophy\
    \ of ‘*if the code is good, I don’t need comments*’. Which is partially true,\
    \ having a good piece of code surely is the way to go (at the end of the day,\
    \ well-written code is all this book is about). However, this philosophy might\
    \ be applicable for a very small codebase.\n\nAs soon as the code grows in size,\
    \ you might end up in reading the code line by line for each and every piece you\
    \ need to build upon. What if the code is well written but still implements complex\
    \ algorithms? And if also naming is not in track, you are setting your-future-self\
    \ and your colleagues for failure.\n\nFar away from recommending pages-long comments,\
    \ but they should be in place and well written (as described in the following\
    \ Sections), even for good code. As a plus: people will complain about not well\
    \ documented code, they will not do it for more verbose descriptions.\n\n## Conditions\
    \ and Flows\n\nComments serve the purpose of specifying how the method-/procedure\
    \ performs its task. They are not meant to punish so-so code writers. Comments\
    \ are a way to succinctly abstract the inner work of your code in common language.\
    \ And supplementing comments with pre- and post- conditions is beneficial.\n\n\
    A **pre-condition** is defined as a set of conditions that need to hold true when\
    \ the method or function is called.\n\nA **post-condition** is a statement describing\
    \ the condition after the method or function has performed its duties.\n\nEmbedding\
    \ them into your comments is not only beneficial from a readability perspective,\
    \ but it will also help during test design. Consider, for example, the scenario\
    \ in which you have a subset of the team strictly focusing on designing and developing\
    \ tests. In this case, it will be surely cost saving for them to have specified\
    \ exactly the conditions that need to hold true before and after a call. It will\
    \ be definitely faster and easier for them to check for edge cases, possible errors\
    \ and design overall better and more complete test cases.\n\nClear pre- and post-conditions\
    \ also helps in defining the **flow** (i.e., the logic) of the block of code.\
    \ What to expect? Documenting the flow should also include any raised Exception.\
    \ Yes, please, I definitely want to know if the code I am using might go ‘boom’\
    \ at a certain point.\n\n## IO Definition\n\nComments should clearly document\
    \ the type of input(s) and output(s). This is especially true for dynamically\
    \ typed languages like Python. Let’s look at the following code snippet. It is\
    \ an example of both so-so naming and confusion created by missing defined types\
    \ into the documentation.\n\n```\ndef add(first, second):\n    #method body\n\
    \    ...\n```\n\nIt is pretty clear that the method is performing an add operation.\
    \ However, it is not clear the type of the inputs. Are these operands? Are they\
    \ integers? Float numbers? Strings? Is the method performing more complex operations\
    \ on data structures? The parameter first might be a dictionary, a list, or anything\
    \ else, and it might be performing more complex operations to add the parameter\
    \ second to it. Or they might be both data structures and the method is adding\
    \ the elements from the second data structures to the first one.\n\nYes, you might\
    \ read the code to understand the inputs’ types. Is it the most effective solutions?\
    \ In this case, the snip is simple, so yes it takes short time to check it out.\
    \ Otherwise, we are back to the consequences of the ‘If the code is good, I don’t\
    \ need comments’ philosophy.\n\nYou might also think: ‘well… if I improve the\
    \ names of the parameters (first and second), I can avoid writing comments?’.\
    \ The answer is still: probably no. What happens to the abstraction power of the\
    \ method? What about its reusability? It might be context-dependent, of course.\
    \ But the rule of thumb is, clearly state the IO’s types.\n\n## Inline Comments\n\
    \nToo many inline comments instead of - as an example - a clear comment on top\
    \ of the method, drive me crazy. This does not mean to avoid inline comments at\
    \ all costs. They should be present where actually needed. Anyway, when a method\
    \ can be effectively described with docstrings, I would definitely go for this\
    \ option.\n\nFrom time to time, too many inline comments might also hint other\
    \ issues within the code. Indeed, it might be the case of too complex, too long,\
    \ more than a single feature implemented by the code. When it is not easy to shortly\
    \ and effectively describe the code you wrote, check again the code. Is it implementing\
    \ just one feature? Is it too long? Might it be split? If so, you have more than\
    \ a single defect to fix.\n\n## TODOs\n\nInline comments are also used to signal\
    \ a block of code that needs to be debugged, tested, or generally improved. In\
    \ other words, they are the handy TODO and FIX-ME comments we all introduce in\
    \ our code to avoid breaking the process of writing our most creative, productive\
    \ piece of coding art.\nA nice piece of craft could be:\n\n```\ndef my_magnificent_method():\n\
    \    # TODO: comment me, Giuliana said so\n    ...\n```\n\nEven if I would love\
    \ to read such code, please don’t wait a decade before fixing any TODO and FIX-ME.\
    \ They are meant to be temporary, and they should remain so. Even more, no TODOs\
    \ and FIX ME in the code you are somehow releasing.\n\n## That’s Obvious\n\nWriting\
    \ comments is good. Writing good comments is tremendous! However, commenting also\
    \ obvious things is not appropriate. If the code is really simple, there is not\
    \ need for commenting each and every line of it. Consider the following example:\n\
    \n```\n...\n# gets the glossary of the book\nglossary = book.get_glossary()\n\
    # check the keywords we are looking for\nif keyword in glossary:\n    # return\
    \ the associated definition\n    return glossary[keyword]\nelse:\n    # return\
    \ None since the keyword is not in glossary\n    return None\n...\n```\n\nIt is\
    \ obvious what the code is doing, and good variable naming helps. A lot. A better\
    \ commenting style would be:\n\n```\n...\n# Returns the definition for a keyword\
    \ if it exists.\n# None otherwise.\nglossary = book.get_glossary()\nif keyword\
    \ in glossary:\n    return glossary[keyword]\nelse:\n    return None\n...\n```\n\
    \nIt is much more readable, isn’t it?\n\n## Did you just lie to that programmer?\n\
    \nComments are intrinsically virtuous and worthy of reward. They really are. Writing\
    \ good comments such that it is easy for a programmer to understand the functionality\
    \ and just glance over it, whilst lying is a big no no.\n\nIf you write top notch\
    \ comments, but you lie in them I appreciate your sense of humor. I really do.\
    \ But please, don’t.\n\n## Comments Driven Development (CDD)\n\nComments Driven\
    \ Development (CDD) is centered on writing plain text description of the code\
    \ first, then the actual implementation. They help in brainstorming the solution,\
    \ setting clear inputs and outputs and describing the kind of functionality is\
    \ going to be implemented.\n\nAs an analogy, think about teaching something to\
    \ someone. In order to properly express in natural language a certain concept,\
    \ you have to have a good understanding of it. The same happens with CDD: you\
    \ are able to write the comment only if you properly thought about what that piece\
    \ of code is going to implement.\n\nFurthermore, often times we are so inspired\
    \ that we start compulsively typing lines and lines of code, to discover, only\
    \ in the end, that we have to travel back in time to remember what they were supposed\
    \ to do."
  mdcn: "## 语法\n\n与其他编程语言类似，Python 支持两种类型的注释：* **行内注释**，通过在实际注释前放置 # 字符实现（单行）；* **扩展文档**，通过将多行文本包裹在\
    \ \"\"\" 中实现。\n\n到目前为止，我们已经见过 *行内* 注释，但为了完整性，这里提供一个这种注释风格的示例。\n\n```\nwhile condition:\n\
    \    # 我是一个行内注释\n    ...\n```\n\n扩展文档的示例如下所示。\n\n```\n\"\"\"\n我是一个扩展文档。\n在此例中，我为以下函数编写文档。\n\
    嘟囔嘟囔。\n\"\"\"\n\ndef mumble_mumble():\n    pass\n```\n\n扩展文档也被称为 *文档字符串*。\n\n\
    ## 如果代码写得好，我不需要注释的哲学\n\n有人推崇“*如果代码写得好，我不需要注释*”的哲学。这在一定程度上是正确的，拥有一段优秀的代码当然是正道（毕竟，这本书讲的就是编写良好的代码）。然而，这种哲学可能只适用于非常小的代码库。\n\
    \n一旦代码规模增长，你可能最终需要逐行阅读代码，以理解你需要构建的每一部分。如果代码写得很好，但实现的是复杂算法呢？如果命名也不规范，你就是在为你未来的自己和你的同事埋下失败的种子。\n\
    \n我绝不推荐写长达数页的注释，但注释应该存在并且写得好（如下文所述），即使是对于好的代码。另外一点：人们会抱怨文档不全的代码，但他们不会抱怨描述过于详细的注释。\n\
    \n## 条件与流程\n\n注释的目的是说明方法/过程如何执行其任务。它们不是用来惩罚写得一般的代码的。注释是一种用通用语言简洁地抽象代码内部工作的方式。并且，用前置条件和后置条件来补充注释是有益的。\n\
    \n**前置条件**定义为在调用方法或函数时需要成立的一组条件。\n\n**后置条件**是描述方法或函数执行完其职责后状态的陈述。\n\n将它们嵌入注释中，不仅从可读性角度有益，而且在测试设计时也会有所帮助。例如，考虑这样一种场景：团队中有一部分人专注于设计和开发测试。在这种情况下，如果能明确指定调用前后需要成立的条件，对他们来说肯定能节省成本。他们检查边界情况、可能的错误以及设计整体更好、更完整的测试用例，肯定会更快、更容易。\n\
    \n清晰的前置和后置条件也有助于定义代码块的**流程**（即逻辑）。应该期待什么？记录流程还应包括任何引发的异常。是的，请务必告诉我，我使用的代码是否可能在某个点“爆炸”。\n\
    \n## 输入/输出定义\n\n注释应清楚地记录输入和输出的类型。对于像 Python 这样的动态类型语言尤其如此。让我们看下面的代码片段。这是一个命名一般以及因文档中缺少类型定义而造成混淆的例子。\n\
    \n```\ndef add(first, second):\n    # 方法体\n    ...\n```\n\n很明显，这个方法执行的是加法操作。然而，输入的类型不清楚。这些是操作数吗？是整数吗？浮点数？字符串？这个方法是否对数据结构执行更复杂的操作？参数\
    \ first 可能是一个字典、一个列表或其他任何东西，它可能执行更复杂的操作将参数 second 添加到其中。或者它们可能都是数据结构，而这个方法是将第二个数据结构的元素添加到第一个中。\n\
    \n是的，你可以阅读代码来理解输入的类型。这是最有效的解决方案吗？在这个例子中，代码片段很简单，所以是的，花点时间检查一下就行。否则，我们就又回到了“如果代码写得好，我不需要注释”哲学的后果。\n\
    \n你可能还会想：“嗯……如果我改进参数的名称（first 和 second），我就可以避免写注释了吗？”答案仍然是：可能不行。方法的抽象能力怎么办？它的可复用性呢？当然，这可能取决于上下文。但经验法则是，清楚地说明输入/输出的类型。\n\
    \n## 行内注释\n\n太多的行内注释，而不是——举个例子——在方法顶部写一个清晰的注释，会让我抓狂。这并不意味着要不惜一切代价避免行内注释。它们应该在真正需要的地方出现。无论如何，当一个方法可以用文档字符串有效描述时，我肯定会选择这个选项。\n\
    \n时不时地，太多的行内注释也可能暗示代码中存在其他问题。确实，这可能是代码过于复杂、过长、实现了不止一个功能的情况。当你不容易简短而有效地描述你写的代码时，请再次检查代码。它是否只实现了一个功能？它是否太长？是否可以拆分？如果是这样，你就有不止一个缺陷需要修复。\n\
    \n## 待办事项\n\n行内注释也用于标记需要调试、测试或通常需要改进的代码块。换句话说，它们就是我们方便使用的 TODO 和 FIX-ME 注释，我们在代码中引入它们，以避免打断我们编写最具创造性、最高效的编码艺术作品的过程。\n\
    一个不错的例子可以是：\n\n```\ndef my_magnificent_method():\n    # TODO: 给我加注释，Giuliana 是这么说的\n\
    \    ...\n```\n\n即使我很乐意阅读这样的代码，也请不要等上十年才修复任何 TODO 和 FIX-ME。它们本应是临时的，也应该保持如此。更重要的是，在你发布的代码中，不要有\
    \ TODO 和 FIX ME。\n\n## 这很明显\n\n写注释是好的。写好注释是极好的！然而，对显而易见的事情进行注释是不合适的。如果代码真的很简单，就没有必要逐行注释。考虑以下示例：\n\
    \n```\n...\n# 获取本书的术语表\nglossary = book.get_glossary()\n# 检查我们正在查找的关键字\nif keyword\
    \ in glossary:\n    # 返回关联的定义\n    return glossary[keyword]\nelse:\n    # 返回 None，因为关键字不在术语表中\n\
    \    return None\n...\n```\n\n代码在做什么是显而易见的，良好的变量命名很有帮助。非常有帮助。更好的注释风格应该是：\n\n```\n\
    ...\n# 如果关键字存在，则返回其定义。\n# 否则返回 None。\nglossary = book.get_glossary()\nif keyword\
    \ in glossary:\n    return glossary[keyword]\nelse:\n    return None\n...\n```\n\
    \n这样可读性更强，不是吗？\n\n## 你刚刚对那个程序员撒谎了吗？\n\n注释本质上是值得赞扬和奖励的。它们确实如此。写出好的注释，让程序员能够轻松理解功能并一目了然，这是好事，但撒谎是绝对不行的。\n\
    \n如果你写了顶级的注释，但你在其中撒谎，我欣赏你的幽默感。我真的欣赏。但请不要这样做。\n\n## 注释驱动开发\n\n注释驱动开发以首先编写代码的纯文本描述，然后才是实际实现为中心。它们有助于集思广益解决方案，设定清晰的输入和输出，并描述将要实现的功能类型。\n\
    \n打个比方，想想教某人某事。为了用自然语言恰当地表达某个概念，你必须对它有很好的理解。CDD 也是如此：只有当你认真思考过那段代码将要实现什么时，你才能写出注释。\n\
    \n此外，很多时候我们灵感迸发，开始不由自主地输入一行又一行代码，结果到最后才发现，我们必须回到过去，才能记起它们原本应该做什么。"
