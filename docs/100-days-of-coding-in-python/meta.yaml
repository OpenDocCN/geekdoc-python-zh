  md: '# # Variables


    If you are completely new to variables, let’s kick start this discussion with
    a definition:


    > A **variable** is a mechanism used to store or reference data that can be:


    1. Initialized

    2. modified over time

    3. reference memory locations

    4. dismissed


    In other words we can define a variable as:


    > a simbolic (i.e., human readable) representation to a location in memory


    Creating a variable in Python is super simple:


    ```

    1 my_first_var = 42

    ```


    If you already have experience with other programming languages, let’s use your
    knowledge as a reference to better understand what Python is doing here. In Java,
    for example a variable can be declared as:'
  merge: -1
  pgno: 43
- img_proc: true
  md: '```

    1 int my_first_var = 42

    ```


    The first big difference between Python and other languages (Java, C, C++ included)
    is that there is no need for declaring the type of the variable. When creating
    a variable in Java, the following steps are executed:


    +   1. hey! that is a int: let me allocate just enough memory to store an integer

    2. let me reference that location

    3. cool, now I have to save 42 at that localtion


    The main consequence (and difference) is that types are way more strict in other
    programming languages. Hence a variable in Python can change over time:


    +   - in terms of data (likewise all the other programming languages)

    - in terms of type (peculiarity of Python)


    Indeed in Python something like:


    ```

    1 my_first_var = 42

    2 my_first_var = "I am now a string!"

    ```


    is totally fine.


