  - '[PAGE 87]


    # If the Code is Good I don’t need Comments Philosophy


    Someone approaches the philosophy of ‘*if the code is good, I don’t need comments*’.
    Which is partially true, having a good piece of code surely is the way to go (at
    the end of the day, well-written code is all this book is about). However, this
    philosophy might be applicable for a very small codebase.


    As soon as the code grows in size, you might end up in reading the code line by
    line for each and every piece you need to build upon. What if the code is well
    written but still implements complex algorithms? And if also naming is not in
    track, you are setting your-future-self and your colleagues for failure.


    Far away from recommending pages-long comments, but they should be in place and
    well written (as described in the following Sections), even for good code. As
    a plus: people will complain about not well documented code, they will not do
    it for more verbose descriptions.


    # Conditions and Flows


    Comments serve the purpose of specifying how the method-/procedure performs its
    task. They are not meant to punish so-so code writers. Comments are a way to succinctly
    abstract the inner work of your code in common language. And supplementing comments
    with pre- and post- conditions is beneficial.


    A **pre-condition** is defined as a set of conditions that need to hold true when
    the method or function is called.'
  - '[PAGE 88]


    A **post-condition** is a statement describing the condition after the method
    or function has performed its duties.


    Embedding them into your comments is not only beneficial from a readability perspective,
    but it will also help during test design. Consider, for example, the scenario
    in which you have a subset of the team strictly focusing on designing and developing
    tests. In this case, it will be surely cost saving for them to have specified
    exactly the conditions that need to hold true before and after a call. It will
    be definitely faster and easier for them to check for edge cases, possible errors
    and design overall better and more complete test cases.


    Clear pre- and post-conditions also helps in defining the **flow** (i.e., the
    logic) of the block of code. What to expect? Documenting the flow should also
    include any raised Exception. Yes, please, I definitely want to know if the code
    I am using might go ‘boom’ at a certain point.


    # IO Definition


    Comments should clearly document the type of input(s) and output(s). This is especially
    true for dynamically typed languages like Python. Let’s look at the following
    code snippet. It is an example of both so-so naming and confusion created by missing
    defined types into the documentation.


    ```

    1 def add(first, second):

    2     #method body

    3         ...

    ```


    It is pretty clear that the method is performing an add operation. However, it
    is not clear the type of the inputs. Are'
  - '[PAGE 89]


    these operands? Are they integers? Float numbers? Strings? Is the method performing
    more complex operations on data structures? The parameter first might be a dictionary,
    a list, or anything else, and it might be performing more complex operations to
    add the parameter second to it. Or they might be both data structures and the
    method is adding the elements from the second data structures to the first one.


    Yes, you might read the code to understand the inputs’ types. Is it the most effective
    solutions? In this case, the snip is simple, so yes it takes short time to check
    it out. Otherwise, we are back to the consequences of the ‘If the code is good,
    I don’t need comments’ philosophy.


    You might also think: ‘well… if I improve the names of the parameters (first and
    second), I can avoid writing comments?’. The answer is still: probably no. What
    happens to the abstraction power of the method? What about its reusability? It
    might be context-dependent, of course. But the rule of thumb is, clearly state
    the IO’s types.


    # Inline Comments


    Too many inline comments instead of - as an example - a clear comment on top of
    the method, drive me crazy. This does not mean to avoid inline comments at all
    costs. They should be present where actually needed. Anyway, when a method can
    be effectively described with docstrings, I would definitely go for this option.


    From time to time, too many inline comments might also hint other issues within
    the code. Indeed, it might be the case of too complex, too long, more than a single
    feature implemented by the code. When it is not easy to shortly and'
