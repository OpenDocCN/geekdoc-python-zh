  md: '# # Hash Map


    Hash Maps have a very different storage strategy for the data: each element is
    broken down into a (key, values) pair.


    In spite of a more complex internal logic, using Hash Maps has the main benefit
    of providing insert, delete and lookup operation in $O(1)$ time in the average
    case.'
  merge: -1
  pgno: 140
- img_proc: true
  md: '![](img/7998d25e6fd08f95d2e996d65431039f_141_0.png)


    **Fig 3.7 - Hash Map**


    As the name of this data structures expresses, keys are stored in locations (also
    referred to as *slots*) based on their **hash code**. Upon inserting a new element,
    a hash function is applied to the key, resulting into an *hash code* which is
    used then to place and associate the relative inputted value.


    Different implementation can use different Hash functions. Yet they have a common
    characteristic: the same key must corrrespond always to the one and one only hash
    code. A good hash function also must minimize cases where two different keys correspond
    to the same hash code, in which case it would produce a **collision**.


    Worth also to notice that the benefits in terms of run time, strictly depend on
    the strength of the hash function. Indeed, one other characteristic of a solid
    hash faction is its capability to uniformly spread the entire set of available
    slots, namely'
  merge: -1
