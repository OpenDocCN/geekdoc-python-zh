  - '[PAGE 125]


    ![](img/7998d25e6fd08f95d2e996d65431039f_125_0.png)


    Fig 3.3 - Linked-List


    Compared to arrays, *add* and *remove* operation implement a slightly more complex
    logic - yet since no shifting is required. Specifically, removal an item from
    a list can be performed by changing the pointer of the element prior to the one
    that needs to be removed. The prior element will need to point to the element
    following the item that needs to be removed from the list Time complexity remains
    *O(n)* in the worst case. Indeed, since we lost direct access by means of indexes
    provided by arrays, in order to find the item that needs to be removed, we need
    to navigate the entire list until we reach its predecessor. Removing the last
    element of the list represents the worst case.


