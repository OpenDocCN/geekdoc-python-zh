    \        if Singleton.__instance:\n            raise Exception(\"I am a singleton!\"\
    )\n        else:\n            Singleton.__instance = self\n\n    @staticmethod\n\
    \    def get_instance():\n        if not Singleton.__instance:\n            Singleton()\n\
    \        return Singleton.__instance\n```\n\n# Don'ts\n\nThe Singleton has not\
    \ the best branding and has been pointed out in few cases as a ‘bad smell’. One\
