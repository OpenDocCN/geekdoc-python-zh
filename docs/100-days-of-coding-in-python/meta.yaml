    # # Design Patterns


    Let’s shower a smelly architecture. One of the common ways to improve the design
    is by using appropriate design patterns. Patterns are simply a way to organize
    conceptual problems and relative code to solve common issues.


    They are broken down into 4 main categories:


    +   - **creational**, design patterns that aim at focusing on object creation;

    - **structural**, that simplify and optimize the relations between different objects;

    - **behavioural**, that establishes common pattern for communications between
    components;

    - **concurrency**, that are specifically designed to address multi-threading scenarios.


    In this Section, we will learn common patterns from the first three categories
    and shown in the following Table.


    Concurrency patterns are a bit of a stretch and not part of the general goal for
    this book. However, foundations about concurrent programming will be discussed
    in the *Concurrency, Parallelism and Performances* Chapter.'
- md: "## Creational\n\nIn this Section, we will explore some of the main *Creational*\
    \ design patterns.\n\n| Class | Patterns |\n| :--- | :--- |\n| Creational | Singleton<br>Lazy\
    \ Initialization<br>Builder<br>Abstract Factory<br>Factory Method |\n| Structural\
    \ | Adapter<br>Decorator<br>Facade<br>Composite |\n| Behavioural | Observer<br>Publisher-Subscriber<br>Iterator<br>Visitor<br>State<br>Chain\
    \ of Responsibility |\n\n## Singleton\n\n![](img/7998d25e6fd08f95d2e996d65431039f_157_0.png)\n\
    \nA **Singleton** is the easiest pattern you can learn. Its goal is to restrict\
    \ the number of instances of a class.\n\nThe objective is achieved by hiding the\
    \ constructor of the class by means of declaring it *private*. A *get_instance()*\
    \ method is used, instead, to create the singleton object. This method indeed\
    \ will only instantiate the object upon the very first call. Following calls will\
    \ result in the method simply returning the instance previously created.\n\nA\
    \ Singleton might be useful when there is a need for shared yet controlled access\
    \ to resources (e.g., concurrency). Generally speaking singletons are implemented\
    \ when one - and only one - object needs to be created. A simple scenario includes\
    \ logging.\n\n## The Code\n\nThe following snippet of code provides a simple implementation\
    \ of the Singleton pattern in Python.\n\n```python\nclass Singleton:\n\n    def\
    \ __init__(self):\n        if Singleton.__instance:\n            raise Exception(\"\
    I am a singleton!\")\n        else:\n            Singleton.__instance = self\n\
    \n    @staticmethod\n    def get_instance():\n        if not Singleton.__instance:\n\
    \            Singleton()\n        return Singleton.__instance\n```\n\n## Don'ts\n\
    \nThe Singleton has not the best branding and has been pointed out in few cases\
    \ as a ‘bad smell’. One of the reasons for it is that if not properly implemented\
    \ programmers can fall into the trap of the ‘First lady’ smell. In other words,\
    \ a Singleton - if misused - can result into a massive component that tries to\
    \ do everything by itself. As almost everything on earth, I do not see a problem\
    \ in the Singleton per se. Internet can be used for good or for bad. Singletons\
    \ can be used good, or bad.\n\nHowever, if you find yourself in growing the logic\
    \ of your singleton more and more over time, you are probably using the wrong\
    \ pattern for the problem that you are trying to solve.\n\n## Coding Practice\
    \ of the day\n\n- ☕ **Warm up**\n  TBD\n- \U0001F17C **Medium**\n  TBD\n- \U0001F4A3\
    \ **Power-up**\n  TBD\n\n> > See you tomorrow!\n\n## Lazy Initialization\n\n![](img/7998d25e6fd08f95d2e996d65431039f_161_0.png)\n\
    \nThe goal of the Lazy Initialization pattern is to instantiate an object only\
    \ when required - for real.\n\nInstead of creating the object into the constructor,\
    \ this pattern invokes the construction only when the object receives the first\
    \ call by means of one of its methods.\n\nThe main reasoning behind this pattern\
    \ is that some logic that goes into object creation can be computationally heavy.\
    \ Hence, performances can be optimized by postponing it until the moment it is\
    \ really needed to be performed.\n\n*Lazy Load* is a common variation and implementation\
    \ of this pattern applied to databases (DBs). Would you load the entire DB in\
    \ advance and have it handy just in case it is needed? Nope, not really. Hence,\
    \ the Lazy Load only retrieves the portion of data needed and stores it in memory\
    \ when an actual computation is needed.\n\n## The Code\n\nThe following snippet\
    \ of code provides an example of Lazy initialization in Python.\n\n```python\n\
    class MyHeavyObject:\n    def __init__(self):\n        self._heavy = []\n\n  \
    \  @property\n    def heavy(self):\n        if not self._heavy:\n            print('I\
    \ am doing heavy computation.')\n            # expensive computation\n       \
    \     ...\n```\n\n## Don'ts\n\nAs for most of this patterns: do not overcomplicate\
    \ your solution. Specifically, if you have a performance bottleneck (e.g., small\
    \ and simple objects that are often accessed) do not use Lazy Initialization.\n\
    \n## Coding Practice of the day\n\n- ☕ **Warm up**\n  TBD\n- \U0001F17C **Medium**\n\
    \  TBD\n- \U0001F4A3 **Power-up**\n  TBD\n\n> > See you tomorrow!\n\n## Builder\n\
    \n![](img/7998d25e6fd08f95d2e996d65431039f_165_0.png)\n\nThe **Builder** breaks\
    \ down the creation of a complex object into smaller separated creational tasks,\
    \ alongside the *KISS* (Keep It Simple Stupid) principle.\n\nSpecifically, the\
    \ *Builder* pattern provides an external interface that allows for the creation\
    \ of the complex object as a single task. However, it internally handles the breakdown\
    \ on the big object into smaller objects using what are called *ConcreteBuilders*,\
    \ each of which performing one step of the entire processing pipeline.\n\nAs a\
    \ result, this pattern is helpful when the object to be built can be constructed\
    \ via an arbitrary number of tasks.\n\n## The Code\n\nThe example code below shows\
    \ the creation of a laptop. Virtually, a laptop can be broken down into several\
    \ creational tasks that need to be performed in order to have the final product\
    \ such as CPU, RAM, disk, etc.\n\n```python\n# Abstract Builder\nclass Builder(object):\n\
    \    def __init__(self):\n        self.laptop = None\n\n    def new_laptop(self):\n\
    \        self.laptop = Laptop()\n\n\n# Concrete Builder\nclass BuilderVirtualLaptop(Builder):\n\
    \    def build_cpu(self):\n        self.laptop.cpu ='whatever cpu'\n\n    def\
    \ build_ram(self):\n        self.laptop.ram = 'whatever ram'\n\n    ...\n\n\n\
    # Product\nclass Laptop(object):\n    def __init__(self):\n        self.cpu =\
    \ None\n        self.ram = None\n        ...\n\n    # print of laptop info\n \
    \   def __repr__(self):\n        return 'Laptop with cpu = {} and ram = {}'.format(self.cpu,\
    \ self.ram)\n\n# Director\nclass Director(object):\n    def __init__(self):\n\
    \        self.builder = BuilderVirtualLaptop()\n\n    def construct_laptop(self):\n\
    \        self.builder.new_laptop()\n        self.builder.build_cpu()\n       \
    \ self.builder.build_ram()\n        ...\n\n    def get_building(self):\n     \
    \   return self.builder.laptop\n\n#Simple Client\nif __name__==\"__main__\":\n\
    \    director = Director()\n    director.construct_laptop()\n    building = director.get_building()\n\
    \    print building\n```\n\n## Don'ts\n\nThe definition is fairly simple, thus\
    \ stick with it, taking into account that embracing this design pattern has minor\
    \ disadvantages including writing more Lines of Code (LOCs). A signal that a builder\
    \ is not appropriate is when the *Builder* constructor has a long list of parameters\
    \ required to deal with each *Concrete Builder*.\n\n## Coding Practice of the\
    \ day\n\n- ☕ **Warm up**\n  TBD\n- \U0001F17C **Medium**\n  TBD\n- \U0001F4A3\
    \ **Power-up**\n  TBD\n\n> > See you tomorrow!\n\n## Abstract Factory\n\n![](img/7998d25e6fd08f95d2e996d65431039f_170_0.png)\n\
    \nThe **Abstract Factory** pattern hides the complexity of object creation when\
    \ slightly different versions of the same object needs to be built.\n\nIn other\
    \ words, the *Abstract Factory* Component internally manages different components\
    \ that represent different flavors of the final object.\n\nA (very) figurative\
    \ example is the case of Operating System (OS). The OS can be modeled as an *Abstract\
    \ Factory*, and it returns an instance of one of the different flavors (different\
    \ components) it supports (e.g., Linux, Mac, Windows).\n\nIn general, this pattern\
    \ can be used every time we want to support extensions of a conceptually single\
    \ object.\n\n## The Code\n\nAn example of python implementation is in the following.\n\
    \n```python\n# Interface for operations supported by the factory\nclass AbstractFactory():\n\
    \n    def create_linux(self):\n        pass\n\n    def create_win(self):\n   \
    \     pass\n\n# Concrete factory. Managing object creation.\nclass ConcreteFactoryOS(AbstractFactory):\n\
    \n    def create_linux(self):\n        return ConcreteProductLinux()\n\n    def\
    \ create_win(self):\n        return ConcreteProductWin()\n\n# Abstract Linux product\n\
    class AbstractProductLinux():\n\n    def interface_linux(self):\n        pass\n\
    \n# Concrete linux product\nclass ConcreteProductLinux(AbstractProductLinux):\n\
    \n    def interface_linux(self):\n        print 'running linux'\n\n# Abstract\
    \ win product\nclass AbstractProductWin():\n```"
  mdcn: "## 创建型\n\n在本节中，我们将探讨一些主要的*创建型*设计模式。\n\n| 类别 | 模式 |\n| :--- | :--- |\n| 创建型\
    \ | 单例<br>懒初始化<br>建造者<br>抽象工厂<br>工厂方法 |\n| 结构型 | 适配器<br>装饰器<br>外观<br>组合 |\n| 行为型\
    \ | 观察者<br>发布-订阅<br>迭代器<br>访问者<br>状态<br>责任链 |\n\n## 单例\n\n![](img/7998d25e6fd08f95d2e996d65431039f_157_0.png)\n\
    \n**单例**是你能学到的最简单的模式。它的目标是限制一个类的实例数量。\n\n这个目标是通过将类的构造函数声明为*私有*来实现的。取而代之的是，使用一个*get_instance()*方法来创建单例对象。这个方法确实只会在第一次调用时实例化对象。后续的调用将导致该方法简单地返回之前创建的实例。\n\
    \n当需要对资源（例如，并发）进行共享但受控的访问时，单例可能很有用。一般来说，当需要创建一个且仅一个对象时，就会实现单例。一个简单的场景包括日志记录。\n\
    \n## 代码\n\n以下代码片段提供了Python中单例模式的一个简单实现。\n\n```python\nclass Singleton:\n\n   \
    \ def __init__(self):\n        if Singleton.__instance:\n            raise Exception(\"\
    I am a singleton!\")\n        else:\n            Singleton.__instance = self\n\
    \n    @staticmethod\n    def get_instance():\n        if not Singleton.__instance:\n\
    \            Singleton()\n        return Singleton.__instance\n```\n\n## 注意事项\n\
    \n单例的声誉并非最佳，在少数情况下被指出是一种“代码异味”。原因之一是，如果实现不当，程序员可能会陷入“第一夫人”异味的陷阱。换句话说，一个单例——如果被滥用——可能导致一个庞大的组件试图自己完成所有事情。就像地球上几乎所有事物一样，我并不认为单例本身有问题。互联网可以用于好的方面，也可以用于坏的方面。单例可以被善用，也可以被滥用。\n\
    \n然而，如果你发现自己随着时间的推移不断增长单例的逻辑，那么你可能正在为试图解决的问题使用错误的模式。\n\n## 今日编码练习\n\n- ☕ **热身**\n\
    \  待定\n- \U0001F17C **中等**\n  待定\n- \U0001F4A3 **进阶**\n  待定\n\n> > 明天见！\n\n##\
    \ 懒初始化\n\n![](img/7998d25e6fd08f95d2e996d65431039f_161_0.png)\n\n懒初始化模式的目标是仅在真正需要时才实例化对象。\n\
    \n这种模式不是在构造函数中创建对象，而是在对象首次通过其某个方法被调用时才调用构造函数。\n\n这种模式背后的主要原理是，对象创建中涉及的一些逻辑可能计算量很大。因此，通过将其推迟到真正需要执行的时刻，可以优化性能。\n\
    \n*懒加载*是这种模式应用于数据库（DB）的一个常见变体和实现。你会提前加载整个数据库并将其放在手边以防需要吗？不，不会。因此，懒加载只在需要实际计算时检索所需的数据部分并将其存储在内存中。\n\
    \n## 代码\n\n以下代码片段提供了Python中懒初始化的一个示例。\n\n```python\nclass MyHeavyObject:\n   \
    \ def __init__(self):\n        self._heavy = []\n\n    @property\n    def heavy(self):\n\
    \        if not self._heavy:\n            print('I am doing heavy computation.')\n\
    \            # expensive computation\n            ...\n```\n\n## 注意事项\n\n对于大多数模式：不要过度复杂化你的解决方案。具体来说，如果你有性能瓶颈（例如，经常访问的小而简单的对象），不要使用懒初始化。\n\
    \n## 今日编码练习\n\n- ☕ **热身**\n  待定\n- \U0001F17C **中等**\n  待定\n- \U0001F4A3 **进阶**\n\
    \  待定\n\n> > 明天见！\n\n## 建造者\n\n![](img/7998d25e6fd08f95d2e996d65431039f_165_0.png)\n\
    \n**建造者**模式遵循*KISS*（保持简单，愚蠢）原则，将复杂对象的创建分解为更小的、分离的创建任务。\n\n具体来说，*建造者*模式提供了一个外部接口，允许将复杂对象的创建作为单个任务。然而，它内部使用所谓的*具体建造者*来处理将大对象分解为更小对象的过程，每个具体建造者执行整个处理管道中的一个步骤。\n\
    \n因此，当要构建的对象可以通过任意数量的任务来构造时，这种模式很有帮助。\n\n## 代码\n\n下面的示例代码展示了笔记本电脑的创建。实际上，笔记本电脑可以分解为几个需要按顺序执行的创建任务，以获得最终产品，例如CPU、内存、硬盘等。\n\
    \n```python\n# Abstract Builder\nclass Builder(object):\n    def __init__(self):\n\
    \        self.laptop = None\n\n    def new_laptop(self):\n        self.laptop\
    \ = Laptop()\n\n\n# Concrete Builder\nclass BuilderVirtualLaptop(Builder):\n \
    \   def build_cpu(self):\n        self.laptop.cpu ='whatever cpu'\n\n    def build_ram(self):\n\
    \        self.laptop.ram = 'whatever ram'\n\n    ...\n\n\n# Product\nclass Laptop(object):\n\
    \    def __init__(self):\n        self.cpu = None\n        self.ram = None\n \
    \       ...\n\n    # print of laptop info\n    def __repr__(self):\n        return\
    \ 'Laptop with cpu = {} and ram = {}'.format(self.cpu, self.ram)\n\n# Director\n\
    class Director(object):\n    def __init__(self):\n        self.builder = BuilderVirtualLaptop()\n\
    \n    def construct_laptop(self):\n        self.builder.new_laptop()\n       \
    \ self.builder.build_cpu()\n        self.builder.build_ram()\n        ...\n\n\
    \    def get_building(self):\n        return self.builder.laptop\n\n#Simple Client\n\
    if __name__==\"__main__\":\n    director = Director()\n    director.construct_laptop()\n\
    \    building = director.get_building()\n    print building\n```\n\n## 注意事项\n\n\
    定义相当简单，因此请坚持使用它，同时要考虑到采用这种设计模式有一些小缺点，包括编写更多的代码行（LOCs）。一个建造者不合适的信号是，当*建造者*构造函数有一个很长的参数列表，需要处理每个*具体建造者*时。\n\
    \n## 今日编码练习\n\n- ☕ **热身**\n  待定\n- \U0001F17C **中等**\n  待定\n- \U0001F4A3 **进阶**\n\
    \  待定\n\n> > 明天见！\n\n## 抽象工厂\n\n![](img/7998d25e6fd08f95d2e996d65431039f_170_0.png)\n\
    \n**抽象工厂**模式在需要构建同一对象的略有不同的版本时，隐藏了对象创建的复杂性。\n\n换句话说，*抽象工厂*组件内部管理着代表最终对象不同变体的不同组件。\n\
    \n一个（非常）形象的例子是操作系统（OS）的情况。操作系统可以被建模为一个*抽象工厂*，它返回其支持的不同变体（不同组件）之一的实例（例如，Linux、Mac、Windows）。\n\
    \n一般来说，每当我们想要支持概念上单一对象的扩展时，都可以使用这种模式。\n\n## 代码\n\nPython实现的示例如下。\n\n```python\n\
    # Interface for operations supported by the factory\nclass AbstractFactory():\n\
    \n    def create_linux(self):\n        pass\n\n    def create_win(self):\n   \
    \     pass\n\n# Concrete factory. Managing object creation.\nclass ConcreteFactoryOS(AbstractFactory):\n\
    \n    def create_linux(self):\n        return ConcreteProductLinux()\n\n    def\
    \ create_win(self):\n        return ConcreteProductWin()\n\n# Abstract Linux product\n\
    class AbstractProductLinux():\n\n    def interface_linux(self):\n        pass\n\
    \n# Concrete linux product\nclass ConcreteProductLinux(AbstractProductLinux):\n\
    \n    def interface_linux(self):\n        print 'running linux'\n\n# Abstract\
    \ win product\nclass AbstractProductWin():\n```"
