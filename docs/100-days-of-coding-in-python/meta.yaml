  merge: -1
  pgno: 207
- img_proc: true
  md: "There are two basic components: **publisher** - the entity who’s state is monitored,\
    \ and **subscriber** - the one that is interested in receiving state changes.\
    \ The main difference is that the dependency between them is abstracted by a third\
    \ component - often referred to as **broker**, that manages the states update.\n\
    \n```\n# Publisher\nclass Publisher:\n    def __init__(self, broker):\n      \
    \  self.state = None\n        self._broker = broker\n\n    def set_state(self,\
    \ arg):\n        self._state = arg\n        self._broker.publish(arg)\n\n# Subscriber\n\
    class Subscriber():\n    def __init__(self):\n        self._publisher_state =\
    \ None\n\n    def update(self, state):\n        self._publisher_state = state\n\
    \        print 'Uh oh! The subject changed state to:\\n{}'.format(state)\n   \
    \     # ...\n\n# Broker\nclass Broker():\n    def __init__(self):\n        self._subscribers\
    \ = set()\n        self._publishers = set()\n```"
  merge: -1
  pgno: 208
- img_proc: true
  md: "```\n# Setting up a publisher for testing purposes\npub = Publisher(self)\n\
    self._publishers.add(pub)\n\n# Triggering changes: only for testing purposes\n\
    def trigger(self):\n    for pub in self._publishers:\n        pub.set_state('Ping')\n\
    \ndef subscribe(self, subscriber):\n    self._subscribers.add(subscriber)\n\n\
    def unsubscribe(self, subscriber):\n    self._subscribers.discard(subscriber)\n\
    \ndef publish(self, state):\n    for sub in self._subscribers:\n        sub.update(state)\n\
    \n# Testing out\nif __name__ == \"__main__\":\n    # Setting an example\n    broker\
    \ = Broker()\n    subscriber = Subscriber()\n    broker.subscribe(subscriber)\n\
    \n    # External changes: testing purposes\n    broker.trigger()\n```\n\nBe aware\
