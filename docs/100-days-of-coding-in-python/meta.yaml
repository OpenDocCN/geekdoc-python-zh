  md: '# Adapter


    A piece of the puzzle.


    ![](img/7998d25e6fd08f95d2e996d65431039f_180_0.png)


    # What


    The adapter is also known as *wrapper*. It wraps another object, redefining its
    interface.


    # How


    A new class simply encapsulated the incompatible object, thus providing the desired
    interface.


    In the following, a general implementation of this pattern.'
  merge: -1
  pgno: 180
- img_proc: true
  md: "```\n# Adapter: our wrapping class\nclass Adapter:\n\n    def __init__(self):\n\
    \        self._adaptee = Adaptee()\n\n    def request(self):\n        self._adaptee.legacy_request()\n\
    \n# Adaptee: existing interface\nclass Adaptee:\n\n    def legacy_request(self):\n\
    \        print 'Matchy-matchy now! yay!'\n\n# Client: testing out\nif __name__\
    \ == \"__main__\":\n    adapter = Adapter()\n    adapter.request()\n```\n\n# When\n\
    \nIt provides a simple way for solving compatibility issues between different\
    \ interfaces. Suppose a *caller* is expecting a different interface from a certain\
    \ object (*callee*) it can be made compatible by means of the *adapter*. They\
    \ can be handy for legacy software. It enables reusability for a low price.\n\n\
    # Don'ts\n\nFairly trivial, up to the reader."
