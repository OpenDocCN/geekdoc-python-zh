    \ self._gear)\n\n\nif __name__ == \"__main__\":\n    car = Car()\n    print(car)\n\
    ```\n\n## 经验法则\n\n在权衡继承与组合时，一个常用的原则是：\n\n> 为实现多态，应优先选择组合而非继承。\n\n组合通常提供更灵活的设计，因此从长远来看更易于维护。不仅基于组合的设计可能更容易编写，它还能适应未来的需求和变化，而无需完全重构层次结构。\n\
    \n## 今日编程练习\n\n- **热身**\n  待定\n- **中等难度**\n  待定\n- **进阶挑战**\n  待定\n\n明天见！\n\n\
    ## 条件流程\n\n条件语句用于在逻辑上改变代码的“*正常*”执行路径。\n\n最常用的条件语句是：\n\n- *if语句*\n- *循环*（我们将在下一章讨论）\n\
    \n条件语句使用数学运算，例如：\n\n- 等于：$a == b$\n- 不等于：$a != b$\n- 小于：$a < b$\n- 小于或等于：$a <=\
    \ b$\n- 大于：$a > b$\n- 大于或等于：$a >= b$\n\n以在特定运行时条件发生时强制改变流程。\n\n一个简单的例子：\n\n```python\n\
    a = 10\nb = 1\nprint(a==b)\n\nb = 10\nprint(a==b)\n\n>>> False\n>>> True\n```\n\
    \n上述代码的行为与其显式版本完全相同：\n\n```python\nif a==b:\n    print(True)\nelse:\n    print(False)\n\
    ```\n\n## If语句\n\n这也是我们第一个*if语句*示例。其一般形式为：\n\n![](img/7998d25e6fd08f95d2e996d65431039f_69_0.png)\n\
    \n图 n.n - 基本if流程\n\n相关伪代码：\n\n```python\nif condition_is_true:\n    print(True)\n\
    \    # 条件为真时的代码流程\nelse:\n    print(False)\n    # 否则的代码流程\n```\n\n## 多重检查\n\n\
    流程也可以通过使用*elif*进一步改变：\n\n![](img/7998d25e6fd08f95d2e996d65431039f_70_0.png)\n\n\
    相关伪代码：\n\n```python\nif condition_is_true:\n    print(True)\n    # 条件为真时的代码流程\n\
    elif condition_2_is_true:\n    print(True)\n    # 条件2为真时的流程\nelse:\n    print(False)\n\
    \    # 条件和条件2都不为真时的代码流程\n```\n\n总之，*if/elif*结构允许进行级联检查。Python还支持*AND*和*OR*运算符来同时执行多个检查。当需要在例如上述示例中*condition*或*condition2*任一为真时应用相同行为时，这非常方便。\n\
    \n在这种情况下，前面的代码片段可以重写为：\n\n```python\nif condition or condition_2:\n    print(True)\n\
    \    # 条件为真时的代码流程\nelse:\n    print(False)\n    # 条件和条件2都不为真时的代码流程\n```\n\n##\
    \ 成员关系\n\nPython还支持对结构化数据进行更复杂的检查，包括：\n\n- 成员关系：*in*\n- 非成员关系：*not in*\n\n使用形式如下：\n\
    \n```python\nif condition in data:\n    # 执行某些操作\nelse:\n    # 执行其他操作\n```\n\n\
    使用成员关系的一个简单例子是：\n\n```python\ni = 3\nif i in range(5):\n    print('I am included\
    \ in the range!')\n```\n\n## 今日编程练习\n\n热身\n编写一个Python程序，输入一个字母*l*，打印出*l*是元音还是辅音。\n\
    \n中等难度\n编写一个Python程序，输入一个对象*o*，检查其类型（字符串、整数或都不是）。\n\n提示：研究一下*isinstance()*的工作原理。\n\
    \n进阶挑战\n待定\n\n明天见！\n\n## 循环\n\n循环是一种在满足条件之前多次应用通用逻辑（代码块）的方式。\n循环的流程图如下所示：\n\n\
    ![](img/7998d25e6fd08f95d2e996d65431039f_76_0.png)\n\n图 n.n - 基本if流程\n\nPython支持两种类型的循环：\n\
    \n- while\n- for\n\n## While\n\n*while*结构的语法如下：\n\n```python\nwhile condition:\n\
    \    # 重复执行的代码块\n    ...\n```\n\n## For\n\n*for*结构的语法如下：\n\n```python\nfor condition:\n\
    \    # 重复执行的代码块\n    ...\n```\n\n## 进一步修改流程\n\n### Break\n\n**Break**和**continue**是另外两个用于改变循环流程的语句。\n\
    \n```python\nfor i in range(10):\n    if i == 4:\n        print('Got bored: interrupting\
    \ the loop')\n        break\n    print('Iter {} - Looping again!'.format(i))\n\
    ```\n\n上述代码的输出为：\n\n```\n>>> Iter 0 - Looping again!\n>>> Iter 1 - Looping again!\n\
    >>> Iter 2 - Looping again!\n>>> Iter 3 - Looping again!\n>>> Got bored: interrupting\
    \ the loop\n```\n\nBreak会中断循环，即使条件（在我们的例子中是*i in range(10)*）仍然为真。\n\n### Continue\n\
    \n**Continue**允许在特定条件为真时跳过当前迭代。回到我们之前的例子，使用continue代替break。\n\n```python\nfor\
    \ i in range(10):\n    if i == 4:\n        print('Got bored: interrupting this\
    \ iteration')\n        continue\n    print('Iter {} - Looping again!'.format(i))\n\
    ```\n\n上述代码的输出为：\n\n```\n>>> Iter 0 - Looping again!\n>>> Iter 1 - Looping again!\n\
    >>> Iter 2 - Looping again!\n>>> Iter 3 - Looping again!\n>>> Got bored: interrupting\
    \ this iteration\n>>> Iter 5 - Looping again!\n>>> Iter 6 - Looping again!\n>>>\
    \ Iter 7 - Looping again!\n>>> Iter 8 - Looping again!\n>>> Iter 9 - Looping again!\n\
    ```\n\n因此，它只跳过了第五次迭代。\n\n### pass\n\n_pass语句_允许代码变得“懒惰”，什么都不做。什么都不做！例如：\n\n```python\n\
    import time\n\nstart = time.time()\nfor i in range(5):\n    # 忙等待\n    time.sleep(1)\n\
    \    pass\n\nprint('I have been doing nothing for {} seconds.'.format(time.time()-start))\n\
    ```\n\n输出将是：\n\n```\nI have been doing nothing for 5.01263427734375 seconds.\n\
    ```\n\n与break和continue不同，pass也可以在方法或函数内部使用，使其（再次）什么都不做。\n\n```python\ndef feeling_lazy():\n\
    \    pass\n```\n\n## 今日编程练习\n\n- **热身**\n  待定\n- **中等难度**\n  待定\n- **进阶挑战**\n\
