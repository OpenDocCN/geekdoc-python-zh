    - **进阶挑战**\n  待定\n\n明天见！\n\n## 文档\n\n剧透警告：文档和注释——如果做得好——很重要。咕哝，咕哝。\n\n本章将直奔主题：如何编写好的注释来支持你的同事和……未来的你！我们将介绍一些不良实践，并提供如何编写文档的指导……以确保其真正有用。"
