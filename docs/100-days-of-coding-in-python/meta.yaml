  - '[PAGE 161]


    # Lazy Initialization


    ![](img/7998d25e6fd08f95d2e996d65431039f_161_0.png)


    The goal of the Lazy Initialization pattern is to instantiate an object only when
    required - for real.


    Instead of creating the object into the constructor, this pattern invokes the
    construction only when the object received the first call by means of one of its
    methods.


    The main reasoning behind this pattern is that some logic that goes into logic
    creation can be computationally heavy. Hence, performances can be optimized by
    postponing it until the moment it is really needed to be performed.


    *Lazy Load* is a common variation and implementation of this pattern applied to
    databases (DBs). Would you load the entire DB in advance and have it handy just
    in case it is needed? Nope, not really. Hence, the Lazy Load only retrieves the
    portion of data needed and stores it in memory when an actual computation is needed.'
  - "[PAGE 162]\n\n# The Code\n\nThe following snippet of code provides an example\
    \ of Lazy initialization in Python.\n\n```\nclass MyHeavyObject:\n    def __init__(self):\n\
    \        self._heavy = []\n\n    @property\n    def heavy(self):\n        if not\
    \ self._heavy:\n            print('I am doing heavy computation.')\n         \
    \   # expensive computation\n            ...\n```\n\n# Don'ts\n\nAs for most of\
    \ this patterns: do not overcomplicate your solution. Specifically, if you have\
    \ a performance bottleneck (e.g., small and simple objects that are often accessed)\
    \ do not use Lazy Initialization."
