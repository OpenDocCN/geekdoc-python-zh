  md: '# Abstract Factory


    ![](img/7998d25e6fd08f95d2e996d65431039f_170_0.png)


    The **Abstract Factory** pattern hides the complexity of object creation when
    slightly different versions of the same object needs to be built.


    In other words, the *Abstract Factory* Component internally manages different
    components that represent different flavors of the final object.


    A (very) figurative example is the case of Operating System (OS). The OS can be
    modeled as an *Abstract Factory*, and it returns an instance of one of the different
    flavors (different components) it supports (e.g., Linux, Mac, Windows).


    In general, this pattern can be used every time we want to support extensions
    of a conceptually single object.


    # The Code


    An example of python implementation is in the following.'
