  md: '# # Fundamentals


    Let’s start with a general introduction to the Python language.

    The goal of this Chapter is to give you the essential elements of the language
    and start getting used to Python code. In the first Chapters, indeed, what I am
    going to is to give you enough knowledge and hands-on practice - by means of exercises
    - to start writing basic code that you’ll find in real life.


    This is in line with the general idea of this book: it is not meant to deal with
    all the details and shades of the language, yet gently walk you through - in the
    shortest amount of time possible - your first programs in Python.


    The remaining of the Chapter assumes you have your environment set up (i.e. python
    installed) and you know basic terminal interaction.


    If you are not completely new to either Python or programming in general, you
    might want to quickly glance at this Chapter or completely skip it altogether
    depending on your knowledge.'
