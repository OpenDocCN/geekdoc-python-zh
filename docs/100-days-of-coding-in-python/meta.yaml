    \ main methods: top(), pop() and put().\n\n# Solution\n\n```\nclass Stack:\n \
    \   def __init__(self, elements=[]):\n        self._stack = []\n\n        # eventually\
    \ populating the stack\n        if elements:\n            for el in elements:\n\
    \                self.put(el)\n\n    def top(self):\n        if self._stack:\n\
    \            return self._stack[len(self._stack) - 1]\n\n        raise Exception('Empty\
    \ stack')\n\n    def pop(self):\n        to_ret = self.top()\n        self._stack.remove(self._stack[len(self._stack)\
    \ - 1])\n        return to_ret\n\n    def put(self, el):\n        self._stack.append(el)\n\
