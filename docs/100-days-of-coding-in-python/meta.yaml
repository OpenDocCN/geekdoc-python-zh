- md: "## Coding Practice of the day\n\n## Warm up\n\nWrite the Python code that counts\
    \ the number of character in a string. Print the result.\n\n## Medium\n\nTBD\n\
    \n## Power up\n\nTBD\n\nSee you tomorrow!\n\n## Structure of a Python Program\n\
    \nI know, I hear you. We learned already about Python, but we want to get our\
    \ teeth in our first program. Let’s do it. Just few more concepts to go.\n\n##\
    \ Statements and Expressions\n\nA **statement** is an instruction that the interpreter\
    \ (in case of Python) can execute.\n\n**Assignment**, as we have seen so far,\
    \ is a specific type of statement called: **expression**. Generally speaking,\
    \ other example of expressions are:\n\n- any arithmetic operation (e.g., sum,\
    \ subtraction, division)\n- operating with strings (e.g., concatenation)\n- calling\
    \ a function\n\nFor example:\n\n```python\n# summing first four numbers is an\
    \ expression\nsum = 1 + 2 + 3 + 4\n\n# string concatenation is an expression\n\
    signature = \"name\" + \"surname\"\n```\n\nA statement could be mistakenly defined\
    \ as: a single line of code. But it not 100% true. I can be a single line of code\
    \ as in the case of *assignment* (and often it is) but it can also be a more complex/long\
    \ instructions. Statements can, indeed, be **multi-line**, even the simple ones.\
    \ For example:\n\n```python\n# single line statement\nsignature = \"name\" + \"\
    surname\"\n```\n\nhas the same outcome of:\n\n```python\n# multi-line statement\n\
    signature = \"name\" + \\\n\"surname\"\n```\n\nAs well as:\n\n```python\n# yet\
    \ another multi-line statement\nsignature = \"name\" +\n/ \"surname\"\n```\n\n\
    The instruction is the same, but it is scattered on several sequential lines.\
    \ The first multi-line variations is referred to as **explicit line continuation**,\
    \ while the second one is the **implicit** variation.\n\n## Functions\n\nA set\
    \ of statements that are functional to executing a logically coherent piece of\
    \ code can be grouped together to form a **function**. The general shape of a\
    \ *function* in Python (pseudo-code) is:\n\n```python\n# general function\ndef\
    \ foo_bar(params):\n    statement1\n    statement2\n    ...\n    return \"done\"\
    \n```\n\nFunctions are composed of:\n\n- the **signature**:\n  - the **def** keyword\n\
    \  - the name of function (e.g., foo_bar)\n  - a variable number of parameters\
    \ (in our example *params*). Parameters are used to provide **input** to the function.\n\
    - the **body** of the function, i.e., the set of statements that all together\
    \ express the logic\n- **return** statement:\n  - in the form *return value*\n\
    \  - used to define an output to the function\n  - can be optional\n\n## Modules\n\
    \nModules are the basic way of organizing code in Python. They are an arbitrary\
    \ composition of:\n\n- variables\n- functions\n- classes\n\nThe following snippet\
    \ showcases the simplest module on earth: *hello.py*.\n\n```python\nname = 'Giuliana'\n\
    \ndef hello():\n    print('Hi {}, my dear! '.format(name))\n\nif __name__ == \"\
    __main__\":\n    hello()\n```\n\nOne of the key benefits of using modules - other\
    \ than simply structuring our code - is to write them once and reuse them every\
    \ time it is needed to.\n\nConsider another module, *multiple.py* that wants to\
    \ greet an arbitrary number of times instead of just one. This cheerful module\
    \ can reuse *hello.py* as follows.\n\n```python\nimport basics.modules.hello as\
    \ greet\n\ndef multiple_hello(number:int):\n    i = 0\n    while i < number:\n\
    \        greet.hello()\n        i+=1\n\nif __name__ == \"__main__\":\n    number\
    \ = input(\"How many times? \")\n\n    #converting number from string to int\n\
    \    number = int(number)\n    multiple_hello(number)\n```\n\n## input() function\n\
    \nThis function allows to read from keyboard. Specifically, it displays the message\
    \ and then waits for user's input. *input()* returns the *string* representation\
    \ of anything typed before hitting *enter* when the message is prompted.\n\nThe\
    \ *import* function might still be fairly obscure to you at this point in time\
    \ but...no worries! We will go deeper on it in this Chapter.\n\n## Packages\n\n\
    Simply speaking, a package is a way to group several modules together. Why do\
    \ they exist?! Well imagine having all your files in your laptop in a single massive\
    \ folder... confusing isn't it?\n\nPackages are a way for structuring your code\
    \ (modules) in a logically cohesive way and, hence, creating a hierarchical organization\
    \ of your code.\n\n![Package Structure](img/7998d25e6fd08f95d2e996d65431039f_38_0.png)\n\
    \nFig x.x - Package Structure\n\nPretty simple, right?\n\n## Modular Programming\n\
    \nOther than simplifying our lives from chaotic code, functions, modules and packages\
