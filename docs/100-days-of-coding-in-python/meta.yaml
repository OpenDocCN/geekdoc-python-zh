- md: "## Keywords\n\nKeywords are words reserved to Python. Yes: Python can. And\
    \ you can only used them as Python meant them to be. The following is a list of\
    \ keywords.\n\nand as assert break\nclass continue def del\nelif else except False\n\
    for from finally global\nif import is in\nlambda None nonlocal not\nor pass raise\
    \ return\nTrue try while with\nyield\n\nFor now, you just have to know that you\
