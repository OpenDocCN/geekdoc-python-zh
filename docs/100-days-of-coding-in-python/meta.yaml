    \ 3.1 - 时间复杂度（平均）\n\n### 数组\n\n数组是最简单和最常用的数据结构之一。它由一组元素组成，可以通过它们的位置（即*索引*）来访问。数组可以是*线性*（即单维）或*多维*（例如，矩阵）。\n\
    \n![](img/7998d25e6fd08f95d2e996d65431039f_119_0.png)\n\n**图 3.2 - 数组**\n\n数组通常是固定大小的（即，它们包含多少元素），这在初始化时定义。它们是同构的数据结构。换句话说，它们只支持单一类型（例如，所有整数）。\n\
