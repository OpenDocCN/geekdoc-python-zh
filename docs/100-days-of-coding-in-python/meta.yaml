  md: '# Observer


    At a glance.


    ![](img/7998d25e6fd08f95d2e996d65431039f_201_0.png)


    # What


    In Operating Systems, a common way of notifying changes happening in the system
    are *polling* and *interrupts* mechanisms. In the context of higher-level programming,
    a smarter'
  merge: -1
  pgno: 201
- img_proc: true
  md: "way for notifying changes has been ideated: The *Observer* pattern.\n\n# How\n\
    \nA component - whose state needs to be notified - stores a list of dependencies.\
    \ Each and every time a change occurs, it notifies it to its stored list.\n\n\
    ```\n# The observable subject\nclass Subject:\n    def __init__(self):\n     \
    \   self._observers = set()\n        self._state = None\n\n    def subscribe(self,\
    \ observer):\n        observer._subject = self\n        self._observers.add(observer)\n\
    \n    def unsubscribe(self, observer):\n        observer._subject = None\n   \
    \     self._observers.discard(observer)\n\n    def _notify(self):\n        for\
    \ observer in self._observers:\n            observer.update(self._state)\n\n \
    \   def set_state(self, arg):\n        self._state = arg\n        self._notify()\n\
    \n# Interface for the Observer\n```"
  merge: -1
