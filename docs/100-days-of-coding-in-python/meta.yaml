    \ 0\n    end = len(A)-1\n\n    while start<end:\n        A[start], A[end] = A[end],\
    \ A[start]\n        start+=1\n        end-=1\n\n    print(A)\n```\n\n### Power-up\n\
    \nGiven two arrays $A$ and $B$, count the occurrences of $B$ being a subset of\
