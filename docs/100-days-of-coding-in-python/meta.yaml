  - '[PAGE 116]


    # # Intro to Data Structures


    Data structures are used into any single piece of code out there, even the simpliest
    - yet useful - one. And they do play an important role into building up your coding
    skills. When picking a choosing them a lot of trade-offs and scenarios need to
    be considered. And when properly implemented into the context of your code they
    allow for the following benefits:


    +   - Readability: using appropriate data structures can allow you to not overcomplicate
    code hence improving how easy to read and understand code is.

    - Better overall design. Starting from project requirements thinking about data
    structures is fundamental and it allows for well organized data, improved performances
    both in terms of time and memory. Worth to stress further that, performances should
    not be an after though into the coding process. As a consequence, the more suitable
    the data structure is, the more optimized, effective and efficient your code will
    be as a result.


    Main data structures are summarized in the following table, together with their
    relative average time complexity for basic operations, including: access, insert,
    delete, search).'
  - '[PAGE 117]


    | Data Structure | Access | Insert | Delete | Search |

    |---|---|---|---|---|

    | Array | O(1) | O(n) | O(n) | O(n) |

    | Linked-List | O(n) | O(1) | O(1) | O(n) |

    | Doubly Linked-List | O(n) | O(1) | O(1) | O(n) |

    | Queue | O(n) | O(1) | O(1) | O(n) |

    | Stack | O(n) | O(1) | O(1) | O(n) |

    | Hash Map | Constant (avg) | O(1) | O(1) | O(1) |

    | Binary Search Tree | O(log n) | O(log n) | O(log n) | O(log n) |


    Table 3.1 - Time Complexity (average)'
  - '[PAGE 118]


    # # Array


    Arrays are one of the easiest and most used data structures. It consists of a
    collection of elements that can be accessed by means of their position, namely
    *indexes*. Arrays can be *linear* (i.e. single dimension) or *multidimensional*
    (e.g., matrixes).'
  - '[PAGE 119]


    ![](img/7998d25e6fd08f95d2e996d65431039f_119_0.png)


    **Fig 3.2 - Array**


    Arrays are generally fixed in size (i.e., how many elements they contain), which
    is defined during initialization. They are homogeneous data structures. In other
    words thet do support only a single type (e.g., all integers).


    Some languages support dynamic sizin as well as different data types. In Python,
    these variation of the classic array is called a *list*. The underlying implementation
    of a list differs from arrays and in the remaining of the section we will use
    the more flexible list for our examples. In Python, lists are defined as:


    ```

    python

    array = [1, "string", 0.2]

    ```


    and all the types are properly managed'
  - '[PAGE 120]


    ```

    1 type(array[0])

    2 >>> <type ''int''>

    3

    4 type(array[1])

    5 >>> <type ''str''>

    6

    7 type(array[2])

    8 >>> <type ''float''>

    ```


    They come with several pros and cons.

    Th benefits of using this data structure comes from their easiness and the linear
    access to the elements as shown in *Table 4.1* – where *n* is the number of elements
    into the list.

    Main cons is that inserting and deleting items from the list is expensive due
    to shifting operation required. The worst-case scenario, indeed is the following:
    consider deleting the first element of the list which is at index = 0. This operation
    creates an empty spot. To maintain index and ordering, all the items from index
    = 1 and following needs to be shifted one position backward. This gives us a complexity
    of *O(n)*. Analogous considerations are for insertion.


