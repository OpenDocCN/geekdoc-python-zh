    effectively describe the code you wrote, check again the code. Is it implementing
    just one feature? Is it too long? Might it be split? If so, you have more than
    a single defect to fix.


    # TODOs


    Inline comments are also used to signal a block of code that needs to be debugged,
    tested, or generally improved. In other words, they are the handy TODO and FIX-ME
    comments we all introduce in our code to avoid breaking the process of writing
    our most creative, productive piece of coding art.

    A nice piece of craft could be:


    ```

    1  def my_magnificent_method():

    2      # TODO: comment me, Giuliana said so

    3      ...

    ```


    Even if I would love to read such code, please don’t wait a decade before fixing
    any TODO and FIX-ME. They are meant to be temporary, and they should remain so.
    Even more, no TODOs and FIX ME in the code you are somehow releasing.


    # That’s Obvious


    Writing comments is good. Writing good comments is tremendous! However, commenting
    also obvious things is not appropriate. If the code is really simple, there is
    not need for commenting each and every line of it. Consider the following example:'
  - "[PAGE 91]\n\n```\n...\n# gets the glossary of the book\nglossary = book.get_glossary()\n\
    # check the keywords we are looking for\nif keyword in glossary:\n    # return\
    \ the associated definition\n    return glossary[keyword]\nelse:\n    # return\
    \ None since the keyword is not in glossary\n    return None\n...\n```\n\nIt is\
    \ obvious what the code is doing, and good variable naming helps. A lot. A better\
    \ commenting style would be:\n\n```\n...\n# Returns the definition for a keyword\
    \ if it exists.\n# None otherwise.\nglossary = book.get_glossary()\nif keyword\
    \ in glossary:\n    return glossary[keyword]\nelse:\n    return None\n...\n```\n\
    \nIt is much more readable, isn’t it?"
  - '[PAGE 92]


    # Did you just lie to that programmer?


    Comments are intrinsically virtuous and worthy of reward. They really are. Writing
    good comments such that it is easy for a programmer to understand the functionality
    and just glance over it, whilst lying is a big no no.


    If you write top notch comments, but you lie in them I appreciate your sense of
    humor. I really do. But please, don’t.


    # Comments Driven Development (CDD)


    Comments Driven Development (CDD) is centered on writing plain text description
    of the code first, then the actual implementation. They help in brainstorming
    the solution, setting clear inputs and outputs and describing the kind of functionality
    is going to be implemented.


    As an analogy, think about teaching something to someone. In order to properly
    express in natural language a certain concept, you have to have a good understanding
    of it. The same happens with CDD: you are able to write the comment only if you
    properly thought about what that piece of code is going to implement.


    Furthermore, often times we are so inspired that we start compulsively typing
    lines and lines of code, to discover, only in the end, that we have to travel
    back in time to remember what they were supposed to do.'
