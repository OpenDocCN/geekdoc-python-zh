    \n![](img/7998d25e6fd08f95d2e996d65431039f_228_0.png)\n\n# What\n\nThe *Chain\
    \ of Responsibility* pattern fosters decoupling the sender of request from the\
    \ receiver.\n\n# How\n\nMore objects within a pipeline are given a chance to handle\
    \ an incoming request. In particular, the request is passed sequentially through\
    \ the pipeline until an object is actually able to handle it.\n\n```\n1  # Handler\
    \ Interface\n2  class Handler():\n3  \n4      def __init__(self,request=None,\
    \ successor=None):\n5          self._successor = successor\n6  \n7      def handle_request(self):\n\
    8          pass\n9  \n10 # Concrete Handler\n```"
  - "[PAGE 229]\n\n```\npython\nclass IntegerHandler(Handler):\n\n    def handle_request(self):\n\
    \        if request.get_type() is int:\n            print self.__class__.__name__\n\
    \        elif self._successor is not None:\n            self._successor.handle_request()\n\
    \n# Another Concrete Handler\nclass StringHandler(Handler):\n\n    def handle_request(self):\n\
    \        if request.get_type() is str:\n            print self.__class__.__name__\n\
    \        elif self._successor is not None:\n            self._successor.handle_request()\n\
    \n# Simple Request object\nclass Request():\n\n    def __init__(self):\n     \
    \   self._el = 'I am a string'\n\n    def get_type(self):\n        return type(self._el)\n\
    \n# Testing out\nif __name__ == \"__main__\":\n    request = Request()\n    string_handler\
    \ = StringHandler(request=request)\n    int_handler = IntegerHandler(request=request,su\\\
    nccessor=string_handler)\n    int_handler.handle_request()\n```"
  - '[PAGE 230]


    # When


    In cases when you want to simplify the request object and different objects might
    be added at runtime to actually handle it. It is pretty handy because you can
    decide which and in which order handlers are added to the chain.


    # Don''ts


    Back to non-functional requirements. Keep an eye on the required performances.
    Too many handlers (executed sequentially, in worst case skipping up to the very
    last handler in the chain) might impact code performances. Also bear in mind that
    debugging these pattern could fairly difficult.'
