  md: "# Stack\n\n# Warm up\n\nGiven an array A of integers in input, print its elements\
    \ in revers by using a stack.\n\nExample\n\nA = [1,2,3,4,5]\n\nPrinted Result\n\
    \n5 4 3 2 1\n\n# Solution\n\n```\ndef reverse_array(A):\n    # using list as stack\n\
    \    stack = []\n    for el in A:\n        stack.append(el)\n    for i in range(len(stack)):\n\
    \        print(stack.pop())\n```"
  merge: -1
