    \ a method of the superclass by adding *optional* arguments to the relative signature."
- md: "## Override\n\nFor the sake of going through another concept (i.e., **override**),\
    \ let’s create a Limousine out of a Berlina.\n\n```python\nclass Limo(Berlina):\n\
    \n    # an example of override\n    def shape(self):\n        print('Just a little\
    \ of a stretch')\n\n\nif __name__ == \"__main__\":\n    car_berlina = Limo()\n\
    \    car_berlina.shape()\n```\n\nBy overriding a method, we substitute the code\
    \ in the parent class with what is specified in the subclass.\n\nAs shown in the\
    \ example, the signature remains the same (and needs to be as such), whilst the\
    \ method’s code changed.\n\nCongratulations! With a little of a stretch we transformed\
    \ a Berlina into a Limo!\n\n## Types of Inheritance\n\n## Coding Practice of the\
    \ day\n\n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n  TBD\n\n\
    ## Composition\n\nComposition, differently from inheritance, is applied for 'have'\
    \ relationships between objects. A simple example of composition is shown in the\
    \ following snippet.\n\n```python\nclass Windscreen():\n    def __str__(self):\n\
    \        return 'windscreen'\n\nclass Gear():\n    def __str__(self):\n      \
    \  return 'gear'\n\nclass Car():\n    def __init__(self):\n        self._windscreen\
    \ = Windscreen()\n        self._gear = Gear()\n\n    def __str__(self):\n    \
    \    return 'I have : {} and {}.'.format(self._windscreen, self._gear)\n\n\nif\
    \ __name__ == \"__main__\":\n    car = Car()\n    print(car)\n```\n\n## Rule of\
    \ Thumb\n\nA commonly applied principle when finding the right trade-off between\
    \ inheritance and composition states that:\n\n> to achieve polymorphism, composition\
    \ should be preferred instead of inheritance.\n\nComposition usually present a\
    \ more flexible design, thus resulting maintainable in the long run. Not only\
    \ design based on composition might be easier to write in first place. It will\
    \ also accommodate future requirements and changes without requiring a complete\
    \ restructuring of the hierarchy.\n\n## Coding Practice of the day\n\n- **Warm\
    \ up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n  TBD\n\nSee you tomorrow!\n\
    \n## Conditional Flows\n\nConditionals are used to logically alter the “*normal*”\
    \ path of the code.\n\nThe most commonly used conditionals are:\n\n- *if statement*\n\
    - *loop* (that we will consider in next Chapter)\n\nConditionals use mathematical\
    \ operations like:\n\n- Equality: $a == b$\n- Not Equals: $a != b$\n- Less than:\
    \ $a < b$\n- Less than or equal to: $a <= b$\n- Greater than: $a > b$\n- Greater\
    \ than or equal to: $a >= b$\n\nto enforce the flow to change if a certain runtime\
    \ condition happens.\n\nAs a simple example:\n\n```python\na = 10\nb = 1\nprint(a==b)\n\
    \nb = 10\nprint(a==b)\n\n>>> False\n>>> True\n```\n\nThe above code acts exactly\
    \ as its explicit version:\n\n```python\nif a==b:\n    print(True)\nelse:\n  \
    \  print(False)\n```\n\n## If statement\n\nThis is also our very first example\
    \ of *if statement*. Its general form is:\n\n![](img/7998d25e6fd08f95d2e996d65431039f_69_0.png)\n\
    \nFig n.n - Basic if flow\n\nRelative pseudo-code:\n\n```python\nif condition_is_true:\n\
    \    print(True)\n    # flow of the code if condition holds true\nelse:\n    print(False)\n\
    \    # flow of the code otherwise\n```\n\n## Multiple Checks\n\nThe flow can also\
    \ be further altered by using *elif*:\n\n![](img/7998d25e6fd08f95d2e996d65431039f_70_0.png)\n\
    \nRelative pseudo-code:\n\n```python\nif condition_is_true:\n    print(True)\n\
    \    # flow of the code if condition holds true\nelif condition_2_is_true:\n \
    \   print(True)\n    # flow if condition_2 holds true\nelse:\n    print(False)\n\
    \    # flow of the code if both condition and condition_2 are not true\n```\n\n\
    In summary, *if/elif* structure allows for a cascade of checks. Python also supports\
    \ *AND* and *OR* operators to perform multiple checks at the same time. This is\
    \ very handy when, for example, the same behaviour needs to be applied when -\
    \ from the example above - either *condition* or *condition2* hold true.\n\nIn\
    \ this case the previous snippet can be rewritten as:\n\n```python\nif condition\
    \ or condition_2:\n    print(True)\n    # flow of the code if condition holds\
    \ true\nelse:\n    print(False)\n    # flow of the code if both condition and\
    \ condition_2 are not true\n```\n\n## Membership\n\nPython also supports more\
    \ complex checks for structured data, including:\n\n- Membership: *in*\n- Non\
    \ Membership: *not in*\n\nThe form of usage is as follows:\n\n```python\nif condition\
    \ in data:\n    # do something\nelse:\n    # do something else\n```\n\nA simple\
    \ example of using membership is:\n\n```python\ni = 3\nif i in range(5):\n   \
    \ print('I am included in the range!')\n```\n\n## Coding Practice of the day\n\
    \nWarm up\nImplement a Python program that, given in input a letter *l*, prints\
    \ if *l* is a vowel or a consonant.\n\nMedium\nImplement a Python program that,\
    \ given in input an object *o*, checks its type (string, integer or none of these).\n\
    \nHint: study how *isinstance()* work.\n\nPower-up\nTBD\n\nSee you tomorrow!\n\
    \n## Loops\n\nLoops are a way to apply common logic (blocks of code) multiple\
    \ times until a condition is met.\nThe flow diagram for loops is shown in the\
    \ following:\n\n![](img/7998d25e6fd08f95d2e996d65431039f_76_0.png)\n\nFig n.n\
    \ - Basic if flow\n\nPython supports two types of loops:\n\n- while\n- for\n\n\
    ## While\n\nThe syntax for the *while* construct is as follows:\n\n```python\n\
    while condition:\n    # block of repetitive code\n    ...\n```\n\n## For\n\nThe\
    \ syntax for the *for* construct is as follows:\n\n```python\nfor condition:\n\
    \    # block of repetitive code\n    ...\n```\n\n## Further Modifying the Flow\n\
    \n### Break\n\n**Break** and **continue** are two other statements to alterate\
    \ the flow of a loop.\n\n```python\nfor i in range(10):\n    if i == 4:\n    \
    \    print('Got bored: interrupting the loop')\n        break\n    print('Iter\
    \ {} - Looping again!'.format(i))\n```\n\nThe above code has as output:\n\n```\n\
    >>> Iter 0 - Looping again!\n>>> Iter 1 - Looping again!\n>>> Iter 2 - Looping\
    \ again!\n>>> Iter 3 - Looping again!\n>>> Got bored: interrupting the loop\n\
    ```\n\nBreak interrupts the loop even if the condition, in our example *i in range(10)*,\
    \ still holds true.\n\n### Continue\n\n**Continue** allows to skip the current\
    \ iteration if a certain condition holds true. Back to our previous example, using\
    \ continue instead of break.\n\n```python\nfor i in range(10):\n    if i == 4:\n\
    \        print('Got bored: interrupting this iteration')\n        continue\n \
    \   print('Iter {} - Looping again!'.format(i))\n```\n\nThe above code has as\
    \ output:\n\n```\n>>> Iter 0 - Looping again!\n>>> Iter 1 - Looping again!\n>>>\
    \ Iter 2 - Looping again!\n>>> Iter 3 - Looping again!\n>>> Got bored: interrupting\
    \ this iteration\n>>> Iter 5 - Looping again!\n>>> Iter 6 - Looping again!\n>>>\
    \ Iter 7 - Looping again!\n>>> Iter 8 - Looping again!\n>>> Iter 9 - Looping again!\n\
    ```\n\nHence it only skips the fifth iteration.\n\n### pass\n\nThe _pass statement\
    \ allows the code to get lazy and do absolutely nothing. Nothing! For example:\n\
    \n```python\nimport time\n\nstart = time.time()\nfor i in range(5):\n    # busy\
    \ wait\n    time.sleep(1)\n    pass\n\nprint('I have been doing nothing for {}\
    \ seconds.'.format(time.time()-start))\n```\n\nThe output would look like:\n\n\
    ```\nI have been doing nothing for 5.01263427734375 seconds.\n```\n\nDifferently\
    \ from break and continue, pass can be used also within a method or function to\
    \ enable it to do (again) nothing.\n\n```python\ndef feeling_lazy():\n    pass\n\
    ```\n\n## Coding Practice of the day\n\n- **Warm up**\n  TBD\n- **Medium**\n \
    \ TBD\n- **Power-up**\n  TBD\n\n> See you tomorrow!\n\n## Error Handling\n\n##\
    \ Coding Practice of the day\n\n- **Warm up**\n  TBD\n- **Medium**\n  TBD\n- **Power-up**\n\
    \  TBD\n\nSee you tomorrow!\n\n## Documentation\n\nSpoiler alert: documentation\
    \ and comments - done for good - matter. Mumble, mumble.\n\nThis Chapter will\
    \ go straight to the point: how to write good comments to support your colleagues\
    \ and... the future version of you! We will walk through some of the bad practices\
    \ and provide guidance on how to write documentation...for good."
  mdcn: "## 方法重写\n\n为了讲解另一个概念（即**重写**），我们来基于Berlina创建一个Limousine。\n\n```python\nclass\
    \ Limo(Berlina):\n\n    # 重写示例\n    def shape(self):\n        print('Just a little\
    \ of a stretch')\n\n\nif __name__ == \"__main__\":\n    car_berlina = Limo()\n\
    \    car_berlina.shape()\n```\n\n通过重写方法，我们用子类中指定的代码替换了父类中的代码。\n\n如示例所示，方法签名保持不变（且必须如此），但方法的代码发生了变化。\n\
    \n恭喜！经过一点“拉伸”，我们成功将Berlina变成了Limo！\n\n## 继承类型\n\n## 今日编程练习\n\n- **热身**\n  待定\n\
    - **中等难度**\n  待定\n- **进阶挑战**\n  待定\n\n## 组合\n\n与继承不同，组合用于对象之间的“拥有”关系。以下代码片段展示了一个简单的组合示例。\n\
    \n```python\nclass Windscreen():\n    def __str__(self):\n        return 'windscreen'\n\
    \nclass Gear():\n    def __str__(self):\n        return 'gear'\n\nclass Car():\n\
    \    def __init__(self):\n        self._windscreen = Windscreen()\n        self._gear\
