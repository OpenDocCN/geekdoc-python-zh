    is by using appropriate design patterns. Patterns are simply a way to organize
    conceptual problems and relative code to solve common issues.


    They are broken down into 4 main categories:


    +   - **creational**, design patterns that aim at focusing on object creation;

    - **structural**, that simplify and optimize the relations between different objects;

    - **behavioural**, that establishes common pattern for communications between
    components;

    - **concurrency**, that are specifically designed to address multi-threading scenarios.


    In this Section, we will learn common patterns from the first three categories
    and shown in the following Table.


    Concurrency patterns are a bit of a stretch and not part of the general goal for
    this book. However, foundations about concurrent programming will be discussed
