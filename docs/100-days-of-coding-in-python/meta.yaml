    \n请让我知道。\n\n![](img/7998d25e6fd08f95d2e996d65431039f_207_0.png)\n\n图 5.11 - 发布-订阅模式\n\
    \n### 是什么\n\n与观察者模式类似，它也用于监控状态变化。\n\n### 如何实现\n\n尽管初听起来可能令人困惑，但此模式与观察者模式非常相似，但它们实际上并不相同。\n\
    \n它包含两个基本组件：**发布者**（其状态被监控的实体）和**订阅者**（对接收状态变化感兴趣的实体）。主要区别在于，它们之间的依赖关系被一个第三方组件（通常称为**代理**）抽象化，由该代理管理状态更新。\n\
    \n```python\n# 发布者\nclass Publisher:\n    def __init__(self, broker):\n      \
    \  self.state = None\n        self._broker = broker\n\n    def set_state(self,\
    \ arg):\n        self._state = arg\n        self._broker.publish(arg)\n\n# 订阅者\n\
    class Subscriber():\n    def __init__(self):\n        self._publisher_state =\
    \ None\n\n    def update(self, state):\n        self._publisher_state = state\n\
    \        print('Uh oh! The subject changed state to:\\n{}'.format(state))\n  \
    \      # ...\n\n# 代理\nclass Broker():\n    def __init__(self):\n        self._subscribers\
    \ = set()\n        self._publishers = set()\n\n    # 设置一个发布者用于测试\n    def setup_publisher(self):\n\
    \        pub = Publisher(self)\n        self._publishers.add(pub)\n\n    # 触发变化：仅用于测试\n\
    \    def trigger(self):\n        for pub in self._publishers:\n            pub.set_state('Ping')\n\
    \n    def subscribe(self, subscriber):\n        self._subscribers.add(subscriber)\n\
    \n    def unsubscribe(self, subscriber):\n        self._subscribers.discard(subscriber)\n\
    \n    def publish(self, state):\n        for sub in self._subscribers:\n     \
    \       sub.update(state)\n\n# 测试\nif __name__ == \"__main__\":\n    # 设置一个示例\n\
    \    broker = Broker()\n    subscriber = Subscriber()\n    broker.subscribe(subscriber)\n\
    \n    # 外部变化：用于测试\n    broker.trigger()\n```\n\n请注意，上面提供的代码仅用于展示两个主要组件之间的交互。某些方法（例如\
    \ *trigger()*）的添加只是为了允许一个简单的执行流程。\n\n## 适用场景\n\n这种第三方交换在任何需要消息交换，但组件（发布者及其订阅者）彼此无需知道对方存在的场景中都很有用。\n\
    \n## 注意事项\n\n不要忽视你解决方案的可扩展性要求。代理可能会成为整个消息交换的瓶颈。\n\n## 今日编码练习\n\n☕ **热身**\n待定\n\
    \nⓂ️ **中等**\n待定\n\n\U0001F4A3 **进阶**\n待定\n\n> 明天见！\n\n## 迭代器模式\n\n展望未来。\n\n![](img/7998d25e6fd08f95d2e996d65431039f_213_0.png)\n\
    \n图 5.12 - 迭代器模式\n\n## 是什么\n\n迭代器允许遍历对象中的元素，同时抽象了内部管理细节。\n\n## 如何实现\n\n通常，此模式会暴露两个方法\
    \ *next()* 和 *has-Next()* 来执行遍历。\n\nPython 的实现通常要求一个可迭代对象实现：\n\n1. **iter**，返回实例对象本身。\n\
    2. **next**，返回可迭代对象的下一个值。\n\n以下代码片段展示了这两个方法的简单实现。\n\n```python\n# 我们的元素集合\nclass\
    \ MyCollection():\n    def __init__(self):\n        self._data = list()\n\n  \
    \  def populate(self):\n        for el in range(0, 10):\n            self._data.append(el)\n\
    \n    def __iter__(self):\n        return Iterator(self._data)\n\n# 我们的迭代器\nclass\
    \ Iterator():\n    def __init__(self, data):\n        self._data = data\n    \
    \    self._counter = 0\n\n    def next(self):\n        if self._counter == len(self._data):\n\
    \            raise StopIteration\n        to_ret = self._data[self._counter]\n\
    \        self._counter = self._counter + 1\n        return to_ret\n\n# 测试\nif\
    \ __name__ == \"__main__\":\n    collection = MyCollection()\n    collection.populate()\n\
    \    for el in collection:\n        print(el)\n```\n\n在上面的例子中，*StopIteration*\
    \ 表示集合中没有更多元素了。\n\n## 适用场景\n\n最常见的应用之一是在数据结构中，可以在不知道其内部工作原理的情况下（通常是顺序地）访问其中的元素。然而，任何需要遍历而无需修改当前接口的场景都可以使用它。\n\
    \n## 注意事项\n\n如果集合很小且简单，可能并不真正需要此模式。"
