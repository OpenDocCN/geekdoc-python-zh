    \ Adaptee:\n\n    def legacy_request(self):\n        print 'Matchy-matchy now!\
    \ yay!'\n\n# Client: testing out\nif __name__ == \"__main__\":\n    adapter =\
    \ Adapter()\n    adapter.request()\n```\n\n### 何时使用\n\n它提供了一种解决不同接口之间兼容性问题的简单方法。假设一个*调用者*期望从某个对象（*被调用者*）获得不同的接口，可以通过*适配器*使其兼容。它们对于遗留软件非常有用。它以较低的成本实现了可重用性。\n\
