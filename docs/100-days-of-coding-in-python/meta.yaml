- img_proc: true
  md: "Python implementations normally require an iterable object to implement:\n\n\
    +   1. **iter**, that returns the instance object.\n2. **next**, that will return\
    \ the next value of the iterable.\n\nA simple implementation of these two method\
    \ is presented in the following snippet.\n\n```\n# Our collection of elements\n\
    class MyCollection():\n\n    def __init__(self):\n        self._data = list()\n\
    \n    def populate(self):\n        for el in range(0, 10):\n            self._data.append(el)\n\
    \n    def __iter__(self):\n        return Iterator(self._data)\n\n# Our iterator\n\
    class Iterator():\n\n    def __init__(self, data):\n        self._data = data\n\
    \        self._counter = 0\n\n    def next(self):\n        if self._counter ==\
    \ len(self._data):\n            raise StopIteration\n```"
