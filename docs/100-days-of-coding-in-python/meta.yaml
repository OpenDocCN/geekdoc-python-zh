  md: '# The beloved hello world


    Yes, it is kind-of a tradition to start every programming language with an hello
    world. Yet, from a simple excercise you can start getting confortable with the
    syntax. Before learning to drive a car, you need to sit into one. And this is
    what we’ll be doing in this Section. We’ll - indeed - walk through different ways
    to run Python code.


    In Python, the code to print ‘Hello, World’ is:


    ```

    print(''Hello, World'')

    ```


    # The command line


    To execute our code let’s open our terminal and run first the command


    ```

    >>> python

    ```


    This command allows you to run - line by line - your code. Type in the above hello-world
    code and look the magic happen!


    Just kidding, let’s warm up!


    # .py code


    Command line works for quick few lines testing. In any real scenarios you’d want
    to write code that you can run, re-run and reuse. So let’s save our code in a
    file.'
