    # # Loops


    Loops are a way to apply common logic (blocks of code) multiple times until a
    condition is met.

    The flow diagram for loops is shown in the following:'
  - '[PAGE 76]


    ![](img/7998d25e6fd08f95d2e996d65431039f_76_0.png)


    Fig n.n - Basic if flow


    Python supports two types of loops:


    +   - while

    - for


    # While


    The syntax for the *while* construct is as follows:


    ```

    1  while condition:

    2      # block of repetitive code

    3      ...

    ```'
  - '[PAGE 77]


    # # For


    The syntax for the *for* construct is as follows:


    ```

    1 for condition:

    2     # block of repetitive code

    3     ...

    ```


    # # Further Modifying the Flow


    # ## Break


    **Break** and **continue** are two other statements to alterate the flow of a
    loop.


    ```

    1 for i in range(10):

    2     if i == 4:

    3         print(''Got bored: interrupting the loop'')

    4         break

    5     print(''Iter {} - Looping again!''.format(i))

    ```


    The above code has as output:


    ```

    1 >>> Iter 0 - Looping again!

    2 >>> Iter 1 - Looping again!

    3 >>> Iter 2 - Looping again!

    4 >>> Iter 3 - Looping again!

    5 >>> Got bored: interrupting the loop

    ```


    Break interrupts the loop even if the condition, in our example *i in range(10)*,
    still holds true.'
  - '[PAGE 78]


    # Continue


    **Continue** allows to skip the current iteration if a certain condition holds
    true. Back to our previous example, using continue instead of break.


    ```

    1 for i in range(10):

    2     if i == 4:

    3         print(''Got bored: interrupting this iterati\n4 on'')

    5         continue

    6     print(''Iter {} - Looping again!''.format(i))

    ```


    The above code has as output:


    ```

    1 >>> Iter 0 - Looping again!

    2 >>> Iter 1 - Looping again!

    3 >>> Iter 2 - Looping again!

    4 >>> Iter 3 - Looping again!

    5 >>> Got bored: interrupting this iteration

    6 >>> Iter 5 - Looping again!

    7 >>> Iter 6 - Looping again!

    8 >>> Iter 7 - Looping again!

    9 >>> Iter 8 - Looping again!

    10 >>> Iter 9 - Looping again!

    ```


    Hence it only skips the fifth iteration.


    # pass


    The _pass statement allows the code to get lazy and do absolutely nothing. Nothing!
    For example:'
  - "[PAGE 79]\n\n```\nimport time\n\nstart = time.time()\nfor i in range(5):\n  \
    \  # busy wait\n    time.sleep(1)\n    pass\n\nprint('I have been doing nothing\
    \ for {} seconds.'.format(time.time()-start))\n```\n\nThe output would look like:\n\
    \n```\nI have been doing nothing for 5.01263427734375 seconds.\n```\n\nDifferently\
    \ from break and continue, pass can be used also within a method or function to\
    \ enable it to do (again) nothing.\n\n```\ndef feeling_lazy():\n    pass\n```"
