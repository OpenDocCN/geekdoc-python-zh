  md: '# # Basic Types


    # ## Numeric Types


    Basic numeric types in Python are:


    +   - integers

    - float

    - complex


    Integers are finite numbers, either positive or negative, without decimals.


    ```

    1  num_int_pos = 42

    2  num_int_neg = -42

    ```


    Float numbers are numbers, either positive or negative, with decimals. Python
    also supports the scientific notation, as show in the following snippet (line
    3).'
  merge: -1
  pgno: 27
- img_proc: true
  md: '```

    1  num_float_pos = 42.0

    2  num_float_neg = -42.0

    3  num_float_scientific = 42e2

    ```


    Just as a reminder, the scientific notation - which is indicated with an *e* or
    an *E* - defines the power of 10 of the given number. In the example above, we
    declared a scientific number which is the power 10 of 42.


    Putting all together, run the following code to match numbers to their relative
    *type* counterpart.


    ```

    1  numbers = (42, -42, 42.0, -42.0, 42e2)

    2

    3  for n in numbers:

    4      print(type(n))

    ```


    The output will look like:


    ```

    1  >>> <class ''int''>

    2  >>> <class ''int''>

    3  >>> <class ''float''>

    4  >>> <class ''float''>

    5  >>> <class ''float''>

    ```


    Even if you will encounter them way less often in your day to day programming,
    it is worth to mention that Python also supports **complex** numbers. In mathematical
    terms, a complex number is one that has a *real* part and an *imaginary* one.
    This type of number can be expressed as:'
  merge: -1
  pgno: 28
- img_proc: true
  md: '```

    1 num_complex = 42+1j

    ```


    In this example, 42 is the real portion, while the *j* indicates the imaginary
    counterpart.


    # Strings


    A strings is a sequence of characters. In Python, strings are declared by wrapping
    characters either with a single or double quotation mark.


    Hence:


    ```

    1 var_string = ''hello Python! ''

    ```


    is the same as:


    ```

    1 var_string = "hello Python!"

    ```


    even if I recommend maintaining consistency of the notation you want to use in
    your code for the sake of uniformity and readability.


