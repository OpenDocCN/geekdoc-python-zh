    # About the author


    Giuliana Carullo, CCSK certified, has computer science in her DNA and has been
    programming for more than a decade. She holds a Master Degree in Computer Science
    and she’s been doing research for the last six years, whilst wearing another hat:
    the project manager.


    Giuliana is in love with the intersection point between science and human behavior.
    She believes that there is more than one way to good, much more to do bad, but
    she ends up being really opinionated on what good is.


    In her spare time, she loves to write and to help others in doing their best at
    their jobs and with their careers.'
