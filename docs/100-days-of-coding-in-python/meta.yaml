    适配器也称为*包装器*。它包装另一个对象，重新定义其接口。\n\n### 如何实现\n\n一个新类简单地封装了不兼容的对象，从而提供了所需的接口。\n\n\
    以下是该模式的一个通用实现。\n\n```python\n# Adapter: our wrapping class\nclass Adapter:\n\n\
