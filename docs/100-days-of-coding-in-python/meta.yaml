  - "[PAGE 60]\n\n# Overload\n\n*Super()* also becomes very handy when we want to\
    \ provide an enhanced version in a subclass for a specific function.\n\nFor example:\n\
    \n```\npython\nclass CustomBerlina(Berlina):\n\n    def __init__(self):\n    \
    \    self._color = None\n\n    # an example of overloading\n    def shape(self,\
    \ color=None):\n        super().shape()\n        self._color = color\n       \
