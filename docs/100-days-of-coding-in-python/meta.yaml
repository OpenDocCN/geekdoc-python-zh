    # # Conditional Flows


    Conditionals are used to logically alter the “*normal*” path of the code.


    The most commonly used conditionals are:


    +   - *if statement*

    - *loop* (that we will consider in next Chapter)


    Conditionals use mathematical operations like:


    +   - Equality: $a == b$

    - Not Equals: $a != b$

    - Less than: $a < b$

    - Less than or equal to: $a <= b$

    - Greater than: $a > b$

    - Greater than or equal to: $a >= b$


    to enforce the flow to change if a certain runtime condition happens.


    As a simple example:'
  - '[PAGE 68]


    ```

    1  a = 10

    2  b = 1

    3  print(a==b)

    4

    5  b =10

    6  print(a==b)

    7

    8

    9  >>> False

    10 >>> True

    ```


    The above code acts exactly as its explicit version:


    ```

    1  if a==b:

    2      print(True)

    3  else:

    4      print(False)

    ```


    # If statement


    This is also our very first example of *if statement*. Its general form is:'
  - '[PAGE 69]


    ![](img/7998d25e6fd08f95d2e996d65431039f_69_0.png)


    Fig n.n - Basic if flow


    Relative pseudo-code:


    ```

    1  if condition_is_true:

    2      print(True)

    3      # flow of the code if condition holds true

    4  else:

    5      print(False)

    6      # flow of the code otherwise

    ```


    # Multiple Checks


    The flow can also be further altered by using *elif*:'
  - '[PAGE 70]


    ![](img/7998d25e6fd08f95d2e996d65431039f_70_0.png)


    Relative pseudo-code:


    ```

    1  if condition_is_true:

    2      print(True)

    3      # flow of the code if condition holds true

    4  elif condition_2_is_true:

    5      print(True)

    6      # flow if condition_2 holds true

    7  else:

    8      print(False)

    9      # flow of the code if both condition and condit\n10 ion_2 are not true

    ```


    In summary, *if/elif* structure allows for a cascade of checks. Python also supports
    *AND* and *OR* operators to perform multiple checks at the same time. This is
    very handy when,'
  - '[PAGE 71]


    for example, the same behaviour needs to be applied when - from the example above
    - either *condition* or *condition2* hold true.


    In this case the previous snippet can be rewritten as:


    ```

    1  if condition or condition_2:

    2      print(True)

    3      # flow of the code if condition holds true

    4  else:

    5      print(False)

    6      # flow of the code if both condition and condit\n7  ion_2 are not true

    ```


    # Membership


    Python also supports more complex checks for structured data, including:


    +   - Membership: *in*

    - Non Membership: *not in*


    The form of usage is as follows:


    ```

    1  if condition in data:

    2      # do something

    3  else:

    4      # do something else

    ```


    A simple example of using membership is:'
  - '[PAGE 72]


    ```

    1  i = 3

    2  if i in range(5):

    3      print(''I am included in the range!'')

    ```'
