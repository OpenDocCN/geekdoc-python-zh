  md: '# Singleton


    ![](img/7998d25e6fd08f95d2e996d65431039f_157_0.png)


    A **Singleton** is the easiest pattern you can learn. It goal it to restrict the
    number of instances of a class.


    The objective is achieved by hiding the constructor of the scllass by means of
    declaring it *private*. A *get_instance()* method is used, instead, to create
    the singleton object. This method indeed will only instantiate the object upon
    the first very first call. Following calls will result in the method simply returning
    the instance previously created.


    A Singleton might be useful when there is a need for shared yet controlled access
    to resources (e.g., concurrency). Generally speaking singletons are implemented
    when one - and only one - object needs to be created. A simple scenario includes
    logging.'
  merge: -1
  pgno: 157
- img_proc: true
  md: "# The code\n\nThe following snippet of code provides a simple implementation\
    \ of the Singleton pattern in Python.\n\n```\nclass Singleton:\n\n    def __init__(self):\n\
    \        if Singleton.__instance:\n            raise Exception(\"I am a singleton!\"\
    )\n        else:\n            Singleton.__instance = self\n\n    @staticmethod\n\
    \    def get_instance():\n        if not Singleton.__instance:\n            Singleton()\n\
    \        return Singleton.__instance\n```\n\n# Don'ts\n\nThe Singleton has not\
    \ the best branding and has been pointed out in few cases as a ‘bad smell’. One\
    \ of the reason for it that if not properly implemented programmers can fall into\
    \ the trap of the ‘First lady’ smell. In other words, a Singleton - if misused\
    \ - can result into a massive components that tries to do everything by itself.\
    \ As almost everything on earth, I do not see a problem in the Singleton per se.\
    \ Internet can be used for good or for bad. Singletons can be used good, or bad.\n\
