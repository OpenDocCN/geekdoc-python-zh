    \n    # 外部变化：用于测试\n    subject.set_state('Ping')\n    subject.set_state('Pong')\n\
    ```\n\n## 适用场景\n\n当你需要不同的对象根据另一个对象的状态自动执行某些功能时（一对多关系）。\n\n## 注意事项\n\n再次强调，保持简单。评估上述条件是否满足，不要增加不必要的复杂性。\n\
