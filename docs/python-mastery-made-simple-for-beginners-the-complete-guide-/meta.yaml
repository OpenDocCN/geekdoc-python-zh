    value 10, performing an addition using the plus sign (+), and then saving the
    total in a variable called result. After that, the code displays the total value
    of a and b, which is 20.


    ## Subtraction:


    It takes away from the initial operand the value represented by the second operand.
    When the first operand has a value that is lower than the following operand, the
    value that is calculated is negative. For instance, if (a) equals 20 and (b) equals
    5, then (a-b) equals 15.


    ## Code:


    ```

    # Subtraction

    a = 20

    b = 5

    result = a - b

