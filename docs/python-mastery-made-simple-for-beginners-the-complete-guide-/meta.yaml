    # Advantages of Lists:


    +   1. Lists are examples of ordered collections of items. This indicates that
    the components in a list are arranged in a certain order, and you can access them
    in the list by referring to their position or index number. This ordering makes
    it possible for you to organize sequences of data systematically, such as a list
    of numbers, names, or dates.

    2. The versatility of Python''s lists lies in the fact that they are not constrained
    to only hold components of a single data type. Within a single list, you can combine
    different data types such as integers, floats, texts, and even additional data
    structures such as lists and dictionaries. Because of their adaptability, lists
    are a'
  - '[PAGE 153]


    useful option for a wide variety of data storage requirements.


    +   3. Lists are changeable, which implies that their contents may be altered
    after they have been first created. You are free to add to, change, or delete
    items from a list as the situation demands. This mutability is particularly helpful
    in situations in which you need to dynamically update or alter data while the
    program is being executed.


    +   4. Lists in Python can dynamically increase or decrease in size when items
    are added or removed. This feature is referred to as dynamic sizing. There is
    no need you declare their size in advance, which makes it simple to deal with
    collections that have different lengths.


    +   5. Lists provide effective methods to access items by their index and are
    used to organize the elements. This enables you to access items quickly by utilizing
    their location inside the list. The zero-based in-'
