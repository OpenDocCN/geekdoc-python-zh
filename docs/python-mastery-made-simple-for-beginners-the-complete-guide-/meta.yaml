    # Advantages of Dictionaries:


    +   1. Dictionary entries are stored in a hash table, which makes it possible
    for data to be retrieved very quickly depending on the keys that are associated
    with them. This indicates that seeking up an item by its associated key is normally
    an activity that takes a consistent amount of time, regardless of how large the
    dictionary may be.

    2. Dictionary entries may hold data in the form of key-value pairs thanks to the
    dictionary''s Key-Value Association feature. When attempting to depict connections
    between different bits of data, this key-value association is of tremendous assistance.
    Because it is so simple to seek up values based on the keys that relate to them,
    dictionaries are excellent tools for data retrieval and mapping.'
  - '[PAGE 168]


    3. Dictionaries are not ordered by nature; nevertheless, beginning with Python
    version 3.7, dictionaries keep insertion order. This implies that entries are
    saved in the order in which they were added to the dictionary. This makes dictionaries
    more efficient. Python versions 3.6 and previous do not ensure order; however,
    Python versions 3.7 and beyond do. Dictionary lookups continue to be quite effective
    regardless of the sequence in which the entries are presented.


    4. Keys in a dictionary are not restricted to being strings; rather, they may
    be of a wide variety of data types, such as strings, integers, floats, and even
    more complicated structures, such as tuples. Because of this versatility, you
    are able to construct dictionaries that are specifically catered to your requirements.


    5. Each key in a dictionary has to be unique. When you add a new key-value pair
    to an'
  - '[PAGE 169]


    existing database using the same key, the fact that each pair is unique assures
    that you won''t inadvertently replace an existing value. It ensures the correctness
    and completeness of the data.


    +   6. In the same way that lists may expand or contract dynamically, dictionaries
    can do the same. Because it is optional to declare their size in advance, they
    are appropriate for circumstances in which the amount of your data is either unknown
    or changeable.


    +   7. Dictionary use is great for circumstances in which you need to associate
    facts quickly and effectively. Dictionaries are suitable for these kinds of situations.
    Dictionary entries may, for instance, be used to represent data caches, configuration
    settings, or data that has been derived from files or databases.


    +   8. Python dictionaries come prepackaged with a broad variety of built-in meth-'
  - '[PAGE 170]


    ods that facilitate the performance of frequently used tasks. When you want to
    handle dictionary data without having to write a lot of code, you may utilize
    methods such as get(), keys(), values(), items(), pop(), and update(), among many
    others.


    +   9. Python provides dictionary comprehensions, which are a condensed method
    for creating dictionaries from iterables or other dictionaries. Utilizing this
    feature, you will be able to construct new dictionaries by applying transformations,
