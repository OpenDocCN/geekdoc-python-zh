  mdcn: "当一个方法生成异常时，运行时环境会在异常抛出后寻找处理它的方法。在错误发生之前被调用的方法的顺序列表，构成了可用于管理异常的潜在“某些东西”集合。这些方法是为了到达问题发生的方法而被调用的。这组方法被称为调用栈（更多信息请参考以下表示）。\n\
