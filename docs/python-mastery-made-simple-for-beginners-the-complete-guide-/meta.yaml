    \ outcome is different:\n\n```\nBalance: 80\n\nBalance start: 10\nENTER WITH:\
    \ Making backup of transactions for rollback\nAdding -50 to account\nNew balance\
    \ would be: -40\nEXIT WITH: Rolling back to previous transactions\nTransaction\
    \ resulted in ValueError (sorry cannot go in debt!)\nsorry cannot go in debt!\n\
    \nBalance end: 10\n```\n\n## Python Inheritance:\n\nInheritance is one of the\
