  pgno: 390
- img_proc: true
  md: 'bility than block coding and is the method that is preferred by expert programmers.


    # Training


    Training is the act of providing a large quantity of data to an algorithm in order
    for the algorithm to change and improve itself, giving the appearance that it
    is learning.


    # Ubuntu


    The Linux distribution known as Ubuntu is among the most widely used versions
    of the operating system.


    # The variable


    A variable is a container that stores a single number, phrase, or other piece
    of information that may be used elsewhere in a program. Variables can be either
    named or unnamed. A variable is analogous to a container that may be stocked with
    a variety of values. You give the chests names in order to locate them at a later
    time. Variables are comprised'
  merge: -1
  pgno: 391
- img_proc: true
  md: 'of three components: the type, the name, and the value.


    # The Visual Studio IDE


    When programming in C++, Visual Studio is the IDE of choice. It is a platform
    that is used across the whole business and provides you with a variety of helpful
    tools and features!


    # While Loops


    The construction of if statements and while loops are identical. They look for
    a condition and then continue to execute the code contained within them until
    the condition is no longer met. A while loop will continue to execute indefinitely
    (until the condition is satisfied).'
