    ```

    PS C:\Users\TOWER TECH\Desktop\Codes> & "C:\Program Files\Python311\python.exe"
    "C:\Users\TOWER TECH\Desktop\Codes\Chapter1_codes.py"

    Equal To: 10 == 5 -> False

    Not Equal To: 10 != 5 -> True

    Less Than: 10 < 5 -> False

    Less Than or Equal To: 10 <= 5 -> False

    Greater Than: 10 > 5 -> True

    Greater Than or Equal To: 10 >= 5 -> True

    ```


    # Explanation:


    The above piece of code illustrates the application of six distinct comparison
    operators. It gives the variables a and b an initial value of 10 and a value of
    5 correspondingly. First, the (==) operator determines if a and b are equivalent
    to one another, and the outcome is saved in the result_equal variable. Similarly,
    it uses the operator not equal to (!=) to check whether a is not equal to b and
    then saves the result in a variable called result_not_equal. After that, the less
    than (<) operator is used to determine whether or not a is smaller than b, and
    the outcome is saved in the variable result_less_than. In addition to this, it
    uses an operator called "less than or equal to" (<=) to determine if a is less
    than or equal to b, and then it saves the outcome in a variable called "result_less_than_equal".
    Alongside this, it uses the greater than (>) operator to determine whether or
    not a is greater than b and then saves the result in the variable result_greater_than.
    At last, it uses the operator for greater than or equal to (>=) to determine if
    a is greater than or equal to b, and then it saves the result in a variable called
    result_greater_than_equal. The findings of each comparison are then output by
    the code, together with an indication of whether each precondition has been met.


    ## Assignment Operators in Python


    Assignment operators are utilized in programming for assigning values to variables.
    The assignment is sometimes done directly; sometimes, the operator performs a
    mathematical operation and assigns the value to the operand.


    ### Assignment Operator


    In this use, =


    It is used while assigning the value located to its right to the parameter located
    to its left. For instance, the expression a = 10 tells the computer to give the
    variable a 10.


    ### Addition Assignment Operator


    In this use, +=


    It adds the value to its right with the variable''s value to its left, then allocates
    the outcome to the variable to its left. For instance, the expression a += 5 is
    the same as saying that a = a + 5.


    ### Subtraction Assignment Operator


    In this use, -=


    It subtracts by taking the value to its right and subtracting it from the variable
    to its left, then transferring the outcome to the variable to its left. For instance,
    the expression a -= 3 is the same as the expression a = a - 3.


    ### Multiplication Assignment Operator


    In this use, *=


    The value on its right is multiplied by the variable on its left, and the product
    is then assigned to the variable on its left. For instance, the expression a *=
    2 is the same as saying that a = a * 2.


