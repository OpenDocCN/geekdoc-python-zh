    \n## Glossary\n\n### The algorithm\n\nAn algorithm is a method for solving a problem\
    \ that consists of a collection of instructions that must be carried out in a\
    \ certain order. It's like trying to understand how a machine thinks.\n\n### Dispute\
    \ or debate\n\nA function can be given additional information through the use\
    \ of something called an argument. After that, the function will be able to make\
    \ use of the information as it operates, just like a variable. (Please read on\
    \ for further information on the variables.)\n\n### Arrays\n\nAn array is a container\
    \ that may house variables; it can also be used to group together variables that\
    \ are similar to one another. You may compare arrays to the shelves that you might\
    \ find at a pet store. The shelf would represent the array, and the animals confined\
    \ in cages would represent the variables contained therein.\n\n### Operators used\
    \ in arithmetic\n\nOperators for arithmetic are necessary in practically every\
    \ application, but they are especially important in games. If a player's character\
    \ gains experience while playing a game, that amount of experience must be added\
    \ to the overall amount gained. If an opponent is hit by an arrow, the amount\
    \ of damage that was dealt to the adversary must be determined.\n\n### The operators\
    \ of assignment\n\nAssignment operators are operators that integrate variable\
    \ assignments (=) with arithmetic operators. Some examples of assignment operators\
    \ include (+=, -=, *=, and /=). When programmers need to carry out an action that\
    \ modifies the value of a variable, they can use them as a fast cut to get the\
    \ job done. If a player gets hit in the head with a rock during a game, their\
    \ health will be deducted from their overall score, and so on.\n\n### Augmented\
    \ reality\n\nAn interactive experience known as augmented reality (AR) is one\
    \ in which digital artifacts are superimposed in real time on a photograph or\
    \ video of a physical location. Augmented reality makes use of the world as it\
    \ is but superimposes additional data on top of it, in contrast to virtual reality,\
    \ which generates an entirely fabricated setting. A well-known example of this\
    \ is the game Pokémon Go, which uses the camera on your smartphone to record images\
    \ of the real environment and superimposes digital figures on top of them.\n\n\
    ### Free-standing and independent\n\nThe words autonomous robot, self-driving\
    \ automobile, and delivery bot are all names that are used to describe robots\
    \ that are able to navigate their environments utilizing sensors with very little\
    \ or no input from humans.\n\n### The binary number system\n\nThe representation\
    \ of information on a computer is done using something called a binary number.\
    \ Computers are able to process millions of ones and zeros each minute using multiple\
    \ rules to interpret them as numbers, characters, operators, and everything else\
    \ that is entered into a computer.\n\n### Bit\n\nThe individual digits of 1 and\
    \ 0 that make up binary are referred to as bits.\n\n### Coding done in blocks\n\
    \nThe \"blocks\" of code in block-based programming may be pieced together similar\
    \ to a jigsaw puzzle. When writing code using blocks, you start by taking the\
    \ first block you want the program to run and attaching it to another block, and\
    \ then you continue doing this until the program is complete.\n\n### C++\n\nC++\
    \ is a low-level programming language that has a wide range of applications. Those\
    \ who are just starting out will be able to tackle difficult issues and comprehend\
    \ how programs operate once they have mastered this language.\n\n### Case of camels\n\
    \nCamel case refers to the practice of naming variables so that the first word\
    \ of the name is written in lowercase and every new word after that is written\
    \ in capital letters. The reason why it is referred to as camel case is that when\
    \ it was written in its original form, CamelCase, the capital Cs seem like the\
    \ humps of a camel. Real-world applications of camel casing include the iPhone,\
    \ eBay, YouTube, and, of course, the iD in \"iD Tech\"!\n\n### Inputting Code\n\
    \nCoding is the process through which individuals formulate directions for computers\
    \ to carry out. Various computer programs, much like various individuals, speak\
    \ a variety of languages. Roblox, on the other hand, is constructed with the programming\
    \ language Lua, whereas Minecraft was developed with Java.\n\n### Languages used\
    \ for coding\n\nCoding languages are what allow computers to comprehend the tasks\
    \ that people ask them to perform. Humans speak with their computers using programming\
    \ languages such as C++ and Java, much the same way as humans communicate with\
    \ one another using languages such as English or Japanese. JavaScript, Scratch,\
    \ and Python are three of the most popular programming languages that children\
    \ may learn.\n\n### Software for a computer\n\nA collection of instructions that\
    \ are to be carried out by a computer and are referred to as a program. In most\
    \ cases, these instructions are employed to solve a problem or to make difficult\
    \ tasks for humans more manageable and shorter.\n\n### Statements based on conditions\n\
    \nThe results of evaluating a conditional statement are either true or false.\
    \ Make use of them in a variety of contexts to print information or advance programmatic\
    \ processes.\n\n### Statements\n\nIf the condition included in the if statement\
    \ is not fulfilled, the code will execute the else statement and carry out the\
    \ previously specified action.\n\nWhen the condition of the if statement is not\
    \ fulfilled, but before the otherwise statement is executed, you can perform some\
    \ action by utilizing an else if statement. In addition to that, if-else expressions\
    \ examine a predetermined condition.\n\n### For loops\n\nFor loops, in contrast\
    \ to while loops, enable you to run a single section of code several times. On\
    \ the other hand, for loops will execute a section of code a certain number of\
    \ times. (It's important to keep in mind that while loops execute an undetermined\
    \ or indeterminate number of times; more on this later.)\n\n### Functions\n\n\
    A function is a section of code that may be called by its name in order to execute\
    \ the code that is contained within it.\n\n### Files with headers\n\nIt is possible\
    \ to create code in a header file that can then be used in other files, which\
    \ makes it easier to exchange code between files and to organize your code as\
    \ projects expand.\n\n### If statements\n\nIn computer programming, a \"if\" statement\
    \ is a conditional statement that determines whether or not another portion of\
    \ code should be executed.\n\n### Operators for incrementing and decrementing\
    \ values"
  mdcn: "## 书籍\n\n-   《Python编程从入门到实践》 作者：埃里克·马瑟斯\n    引用：马瑟斯，埃里克。《Python编程从入门到实践》。\n\
    -   《笨办法学Python》 作者：泽德·肖\n    引用：肖，泽德。《笨办法学Python》。\n-   《流畅的Python》 作者：卢西亚诺·拉马略\n\
    \    引用：拉马略，卢西亚诺。《流畅的Python》。\n-   《利用Python进行数据分析》 作者：韦斯·麦金尼\n    引用：麦金尼，韦斯。《利用Python进行数据分析》。\n\
    -   《Effective Python》 作者：布雷特·斯拉特金\n    引用：斯拉特金，布雷特。《Effective Python》。\n\n##\
    \ 在线课程\n\n-   Python Subreddit：加入Python subreddit (https://www.reddit.com/r/python/)，与Python社区互动，提问，并了解最新动态。\n\
    -   Python Discord服务器：Python Discord服务器 (https://discord.gg/python) 是另一个社区中心，你可以在这里与Python爱好者和专家交流。\n\
    -   《Python编程从入门到实践》 作者：埃里克·马瑟斯：这本书提供了对Python编程的入门级友好介绍。\n-   《笨办法学Python》 作者：泽德·肖：对于更全面、更具挑战性的Python学习方法，强烈推荐此资源。\n\
    -   《流畅的Python》 作者：卢西亚诺·拉马略：深入探讨Python高级主题，精通Pythonic编码风格。\n-   《利用Python进行数据分析》\
    \ 作者：韦斯·麦金尼：学习如何利用Python进行数据分析和操作。\n-   《Effective Python》 作者：布雷特·斯拉特金：这本书提供了关于编写高效、有效Python代码的见解。\n\
    \n通过使用推荐的资源继续你的Python学习之旅，将使你能够成为一名熟练的Python开发者，有能力应对各种项目和挑战。\n\n## 术语表\n\n###\
    \ 算法\n\n算法是一种解决问题的方法，它由一系列必须按特定顺序执行的指令组成。这就像试图理解一台机器是如何思考的。\n\n### 参数或争论\n\n可以通过使用一种叫做参数的东西向函数提供额外信息。之后，函数在运行时就能像变量一样利用这些信息。（请继续阅读以获取有关变量的更多信息。）\n\
    \n### 数组\n\n数组是一种可以容纳变量的容器；它也可以用来将相似的变量分组在一起。你可以将数组比作宠物店里的货架。货架代表数组，而关在笼子里的动物代表其中包含的变量。\n\
    \n### 算术运算符\n\n算术运算符在几乎所有应用中都是必需的，但在游戏中尤为重要。如果玩家角色在游戏中获得经验值，该经验值必须加到总经验值中。如果对手被箭射中，必须计算对对手造成的伤害量。\n\
    \n### 赋值运算符\n\n赋值运算符是将变量赋值（=）与算术运算符结合在一起的运算符。赋值运算符的一些例子包括（+=、-=、*= 和 /=）。当程序员需要执行修改变量值的操作时，他们可以使用这些运算符作为快捷方式来完成任务。如果玩家在游戏中被石头击中头部，他们的生命值将从总分中扣除，依此类推。\n\
    \n### 增强现实\n\n增强现实（AR）是一种交互式体验，其中数字对象被实时叠加在物理位置的照片或视频上。与虚拟现实生成完全虚构的环境不同，增强现实利用现实世界，但在此基础上叠加额外数据。一个著名的例子是游戏《精灵宝可梦Go》，它使用智能手机的摄像头记录真实环境的图像，并在其上叠加数字形象。\n\
    \n### 自主和独立\n\n自主机器人、自动驾驶汽车和配送机器人这些术语都用来描述能够利用传感器在极少或无人类输入的情况下导航其环境的机器人。\n\n###\
    \ 二进制数制\n\n计算机使用一种叫做二进制数的东西来表示信息。计算机每分钟可以处理数百万个1和0，使用多种规则将它们解释为数字、字符、运算符以及输入到计算机中的所有其他内容。\n\
    \n### 位\n\n构成二进制的单个数字1和0被称为位。\n\n### 积木式编程\n\n基于积木的编程中的代码“积木”可以像拼图一样拼接在一起。使用积木编写代码时，你首先选择你希望程序运行的第一个积木，将其连接到另一个积木，然后继续这样做，直到程序完成。\n\
    \n### C++\n\nC++是一种应用广泛的低级编程语言。初学者一旦掌握了这门语言，就能够处理复杂问题并理解程序是如何运行的。\n\n### 驼峰命名法\n\
    \n驼峰命名法是指命名变量时，名称的第一个单词用小写字母书写，之后每个新单词的首字母都用大写字母书写。之所以被称为驼峰命名法，是因为当它以原始形式CamelCase书写时，大写的C看起来像骆驼的驼峰。驼峰命名法的实际应用包括iPhone、eBay、YouTube，当然还有“iD\
    \ Tech”中的iD！\n\n### 输入代码\n\n编码是人们为计算机制定指令的过程。不同的计算机程序，就像不同的人一样，说着不同的语言。然而，Roblox是用编程语言Lua构建的，而Minecraft是用Java开发的。\n\
    \n### 编程语言\n\n编程语言使计算机能够理解人们要求它们执行的任务。人类使用C++和Java等编程语言与计算机交流，就像人类使用英语或日语等语言相互交流一样。JavaScript、Scratch和Python是儿童可以学习的三种最受欢迎的编程语言。\n\
    \n### 计算机软件\n\n由计算机执行的一组指令被称为程序。在大多数情况下，这些指令用于解决问题或使人类的复杂任务更易于管理和缩短时间。\n\n###\
    \ 条件语句\n\n条件语句的求值结果要么为真，要么为假。在各种情况下使用它们来打印信息或推进程序流程。\n\n### 语句\n\n如果if语句中包含的条件未满足，代码将执行else语句并执行之前指定的操作。\n\
    \n当if语句的条件未满足，但在执行otherwise语句之前，你可以使用else if语句执行某些操作。此外，if-else表达式会检查预设条件。\n\n\
    ### For循环\n\n与while循环不同，for循环允许你多次运行单个代码段。另一方面，for循环将执行一段代码特定的次数。（重要的是要记住，while循环执行不确定或不定的次数；稍后会详细介绍。）\n\
    \n### 函数\n\n函数是一段代码，可以通过其名称调用以执行其中包含的代码。\n\n### 头文件\n\n可以在头文件中创建代码，然后在其他文件中使用，这使得在文件之间共享代码以及随着项目扩展组织代码变得更加容易。\n\
    \n### If语句\n\n在计算机编程中，“if”语句是一种条件语句，用于确定是否应执行另一部分代码。\n\n### 递增和递减运算符"
