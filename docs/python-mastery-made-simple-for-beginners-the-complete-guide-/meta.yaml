    \n据称，被选中的异常处理器“捕获”了异常。假设运行时系统详细检查了调用栈上的每个方法，但未能找到可接受的异常处理器，如下图所示。在这种情况下，系统的运行时（以及随之而来的程序）将会终止。\n\
