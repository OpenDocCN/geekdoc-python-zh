    \n突然终止对开发者或最终用户都不利。\n\n为了妥善处理这种情况，你可以选择使用 try-except 子句来代替紧急停止。如果未能正确处理异常，你将会遇到紧急停止。\n\
    \n### 什么是 Python 异常？\n\nPython 中的内置异常可能会产生错误。异常是程序运行时出现的缺陷。\n\n如果出现异常，会显示这种类型的异常。如果异常未被处理，应用程序可能会崩溃。异常通过\
