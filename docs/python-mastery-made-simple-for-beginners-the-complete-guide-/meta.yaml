- md: "## Creating a Dictionary:\n\nBy putting key: value pairs within curly brackets\
    \ {} and separating them with commas, we can form dictionaries. For instance,\n\
    \n```python\n# creating a dictionary\ncountry_capitals = {\n    \"United States\"\
    : \"Washington D.C.\",\n    \"England\": \"London\",\n    \"Italy\": \"Rome\"\n\
    }\n```\n\n```python\n# printing dictionary\nprint(country_capitals)\n```\n\nOutput:\n\
    \n```\n{'United States': 'Washington D.C.', 'Italy': 'Rome', 'England': 'London'}\n\
    ```\n\nKey-value pairs make up the three components of the country_capitals dictionary.\n\
    \nTuples, strings, integers, and other immutable data types cannot be used as\
    \ dictionary keys. Mutable (changeable) objects, like lists, cannot be used as\
    \ keys.\n\n```python\n# Valid dictionary example\nmy_dict = {\n    1: \"Hello\"\
    ,\n    (1, 2): \"Hello Hi\",\n    3: [1, 2, 3]\n}\nprint(my_dict)\n\n# Invalid\
    \ dictionary example\n# Error: using a list as a key is not allowed\nmy_dict =\
    \ {\n    1: \"Hello\",\n    [1, 2]: \"Hello Hi\",\n}\nprint(my_dict)\n```\n\n\
    Output:\n\n![](img/4aff151ad0078dc81dab357c7a046356_160_0.png)\n\n## Length of\
    \ Python Dictionary:\n\nWith the help of the len() method, we can determine a\
    \ dictionary's size.\n\n```python\ncountry_capitals = {\n    \"United States\"\
    : \"Washington D.C.\",\n    \"England\": \"London\",\n    \"Italy\": \"Rome\"\n\
    }\n\n# get the dictionary's length\nprint(len(country_capitals)) # 3\n```\n\n\
    Output:\n\n```\n3\n```\n\n## Accessing Dictionary Items:\n\nIf we enclose the\
    \ key in square brackets, we can get the value of the dictionary entry.\n\n```python\n\
    country_capitals = {\n    \"United States\": \"Washington D.C.\",\n    \"Italy\"\
    : \"Rome\",\n    \"England\": \"London\"\n}\n\nprint(country_capitals[\"United\
    \ States\"])\nprint(country_capitals[\"England\"]) # London\n```\n\nOutput:\n\n\
    ![](img/4aff151ad0078dc81dab357c7a046356_162_0.png)\n\nThe get() function may\
    \ also be used to get dictionary entries.\n\n## Modify Dictionary Items:\n\nMutable\
    \ dictionaries are available for Python. A dictionary element's value may be altered\
    \ by consulting its key. For instance,\n\n```python\ncountry_capitals = {\n  \
    \  \"United States\": \"Washington D.C.\",\n    \"England\": \"London\",\n   \
    \ \"Italy\": \"Naples\"\n}\n\n# changing value of \"Italy\" key to \"Rome\"\n\
    country_capitals[\"Italy\"] = \"Rome\"\n\nprint(country_capitals)\n```\n\nOutput:\n\
    \n```\n{'United States': 'Washington D.C.', 'Italy': 'Rome', 'England': 'London'}\n\
    ```\n\n## Add Items within a Dictionary:\n\nBy giving a new key—one that doesn't\
    \ already exist in the dictionary—a value, we can add a new entry to the dictionary.\
    \ For instance,\n\n```python\ncountry_capitals = {\n    \"United States\": \"\
    Washington D.C.\",\n    \"Italy\": \"Naples\"\n}\n\n# with \"Berlin\" as the value\
    \ and \"Germany\" as the key\ncountry_capitals[\"Germany\"] = \"Berlin\"\n\nprint(country_capitals)\n\
    ```\n\nOutput:\n\n```\n{'United States': 'Washington D.C.', 'Italy': 'Naples',\
    \ 'Germany': 'Berlin'}\n```\n\nThe update method() may also be used to add or\
    \ modify dictionary entries.\n\n## Removing the Dictionary Items:\n\nTo remove\
    \ an item from the dictionary, we use the del statement. For instance,\n\n```python\n\
    country_capitals = {\n    \"United States\": \"Washington D.C.\",\n    \"Italy\"\
    : \"Naples\"\n}\n\n# taking out the item with the \"United States\" key\ndel country_capitals[\"\
    United States\"]\n\nprint(country_capitals)\n```\n\nOutput:\n\n```\n{'Italy':\
    \ 'Naples'}\n```\n\nTo take anything out of the dictionary, we can also employ\
    \ the pop method().\n\nThe clear() function may be used to delete every entry\
    \ from a dictionary at once.\n\n```python\ncountry_capitals = {\n    \"United\
    \ States\": \"Washington D.C.\",\n    \"Italy\": \"Naples\"\n}\n\ncountry_capitals.clear()\n\
    \nprint(country_capitals) # {}\n```\n\nOutput:\n\n```\n{}\n```\n\n## Test of Dictionary\
    \ Membership\n\nUsing the in operator, we can determine whether a key is present\
    \ in a dictionary.\n\n```python\nmy_list = {1: \"Hello\", \"Howdy\": 100, \"Hi\"\
    : 25}\n\nprint(1 in my_list) # True\n\n# the not in operator checks whether the\
    \ key doesn't exist\nprint(\"Howdy\" not in my_list)\n\nprint(\"Hello\" in my_list)\
    \ # False\n```\n\nOutput:\n\n```\nTrue\nFalse\nFalse\n```\n\nThe in-operator does\
    \ not determine if a value exists; rather, it determines whether a key exists.\n\
    \n## Going Over a Dictionary Iteratively:\n\nAs of Python 3.7, a dictionary constitutes\
    \ an ordered set of things. In other words, a dictionary keeps its elements in\
    \ the same sequence.\n\nUsing a for loop, we can cycle over dictionary keys sequentially.\n\
    \n```python\ncountry_capitals = {\n    \"United States\": \"Washington D.C.\"\
    ,\n    \"Italy\": \"Naples\"\n}\n\n# print each dictionary entry individually\n\
    for country in country_capitals:\n    print(country)\n\nprint(\"----------\")\n\
    \n# print each dictionary entry individually\nfor country in country_capitals:\n\
    \    capital = country_capitals[country]\n    print(capital)\n```\n\nOutput:\n\
    \n![](img/4aff151ad0078dc81dab357c7a046356_167_0.png)\n\n## Advantages of Dictionaries:\n\
    \n1. Dictionary entries are stored in a hash table, which makes it possible for\
    \ data to be retrieved very quickly depending on the keys that are associated\
    \ with them. This indicates that seeking up an item by its associated key is normally\
    \ an activity that takes a consistent amount of time, regardless of how large\
    \ the dictionary may be.\n\n2. Dictionary entries may hold data in the form of\
    \ key-value pairs thanks to the dictionary's Key-Value Association feature. When\
    \ attempting to depict connections between different bits of data, this key-value\
    \ association is of tremendous assistance. Because it is so simple to seek up\
    \ values based on the keys that relate to them, dictionaries are excellent tools\
    \ for data retrieval and mapping.\n\n3. Dictionaries are not ordered by nature;\
    \ nevertheless, beginning with Python version 3.7, dictionaries keep insertion\
    \ order. This implies that entries are saved in the order in which they were added\
    \ to the dictionary. This makes dictionaries more efficient. Python versions 3.6\
    \ and previous do not ensure order; however, Python versions 3.7 and beyond do.\
    \ Dictionary lookups continue to be quite effective regardless of the sequence\
    \ in which the entries are presented.\n\n4. Keys in a dictionary are not restricted\
    \ to being strings; rather, they may be of a wide variety of data types, such\
    \ as strings, integers, floats, and even more complicated structures, such as\
    \ tuples. Because of this versatility, you are able to construct dictionaries\
    \ that are specifically catered to your requirements.\n\n5. Each key in a dictionary\
    \ has to be unique. When you add a new key-value pair to an existing database\
    \ using the same key, the fact that each pair is unique assures that you won't\
    \ inadvertently replace an existing value. It ensures the correctness and completeness\
    \ of the data.\n\n6. In the same way that lists may expand or contract dynamically,\
    \ dictionaries can do the same. Because it is optional to declare their size in\
    \ advance, they are appropriate for circumstances in which the amount of your\
    \ data is either unknown or changeable.\n\n7. Dictionary use is great for circumstances\
    \ in which you need to associate facts quickly and effectively. Dictionaries are\
    \ suitable for these kinds of situations. Dictionary entries may, for instance,\
    \ be used to represent data caches, configuration settings, or data that has been\
    \ derived from files or databases.\n\n8. Python dictionaries come prepackaged\
    \ with a broad variety of built-in methods that facilitate the performance of\
    \ frequently used tasks. When you want to handle dictionary data without having\
    \ to write a lot of code, you may utilize methods such as get(), keys(), values(),\
    \ items(), pop(), and update(), among many others.\n\n9. Python provides dictionary\
    \ comprehensions, which are a condensed method for creating dictionaries from\
    \ iterables or other dictionaries. Utilizing this feature, you will be able to\
    \ construct new dictionaries by applying transformations, filters, or computations\
    \ to the data that is already there.\n\n10. Dictionary usage is common in contexts\
    \ where doing data lookups is a regular activity because dictionaries facilitate\
    \ efficient lookups. For instance, dictionaries are used in online applications\
    \ for the purpose of swiftly looking up user sessions or routing information."
