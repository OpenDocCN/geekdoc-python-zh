    +   6. Lists are iterable objects, which means you can cycle over their members
    using loops or other iteration techniques. This is because lists are iterable.
    Because of this, it is simple to carry out actions on each member in the list
    without the need to manually maintain the indices.


    +   7. Lists support a broad variety of operations and procedures, making them
    useful for a variety of everyday activities. If you want to edit a list, you may
    use methods such as append, insert, delete, pop, and extend. If you want to access
    information about the list, you can use functions such as len, min, max, and sum.


    +   8. Python has list comprehensions, which are a method that is both concise
