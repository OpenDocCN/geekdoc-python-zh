    20\n-10\n50\n-20\n30\nBalance: 80\n```\n\n请记住，这只是一个玩具示例。如果你对一个“真实”账户类的实例使用函数调用语法，控制台不太可能输出任何内容。在你创建的对象上使用\
    \ `__call__` 方法的缺点是，它可能需要帮助来理解为什么对象被调用。\n\n因此，通常最好添加一个对该类明确的方法。在这种情况下，拥有一个不同的\
    \ `Account.print_statement()` 函数会更清晰。\n\n## `with` 语句和上下文管理器支持：`__enter__`、`__exit__`\n\
    \nPython 现已发展到包含上下文管理器，并增加了对使用 `with` 语句的支持。\n\n你的对象必须遵守一个称为上下文管理器的简单“协议”（或接口），才能与“with”语句一起使用。只需将\
