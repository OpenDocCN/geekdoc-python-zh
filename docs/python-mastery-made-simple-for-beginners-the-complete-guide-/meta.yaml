    # Differences between Python 2 and Python 3


    +   1. Unicode Support: Python 3.x offers native support for Unicode characters,
    making it easier to work with international text and characters.

    2. Print Function: Python 2.x uses a `print` statement, while Python 3.x uses
    the `print()` function, providing more flexibility and consistency.

    3. Division Operator: In Python 3.x, the division operator `/` returns a float
    by default, while in Python 2.x, it returns an integer unless explicitly cast
    to a float.

    4. String Formatting: Python 3.x introduced f-strings, a more readable and efficient
    way to format strings compared to the `%` operator in Python 2.x.'
