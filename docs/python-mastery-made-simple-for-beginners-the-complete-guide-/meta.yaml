    acc4 = Account('sue', 10)\n\nprint('\\nBalance start: {}'.format(acc4.balance))\n\
    \ntry:\n    acc4.validate_transaction(-50)\nexcept ValueError as exc:\n    print(exc)\n\
    \nprint('\\nBalance end: {}'.format(acc4.balance))\n```\n\n在这个例子中，结果有所不同：\n\n\
    ```\nBalance: 80\n\nBalance start: 10\nENTER WITH: Making backup of transactions\
    \ for rollback\nAdding -50 to account\nNew balance would be: -40\nEXIT WITH: Rolling\
    \ back to previous transactions\nTransaction resulted in ValueError (sorry cannot\
    \ go in debt!)\nsorry cannot go in debt!\n\nBalance end: 10\n```\n\n## Python\
    \ 继承：\n\n继承是面向对象编程（OOP）语言的基本概念之一。通过继承来自另一个类的类，你可以使用此过程构建共享一组属性和方法的类结构。一个类从另一个类获取或继承属性的能力称为继承。\n\
    \n继承的优点是：\n\n- 从一个类（或基类）继承属性到另一个类（或派生类）的能力称为继承。以下是 Python 中继承的一些优点：\n- 能够很好地表示现实世界中的关系。\n\
    - 它提供了代码的重用能力。我们不需要重写代码。此外，它使我们能够在不更改类的情况下扩展其功能。\n- 由于其传递性，如果类 B 派生自另一个类 A，那么类\
    \ B 的所有子类都将不可避免地从类 A 继承。\n- 通过继承提供的模型结构易于理解。\n- 继承通常意味着更低的开发和维护成本。\n\n## 通过继承的\
    \ Python 语法："
