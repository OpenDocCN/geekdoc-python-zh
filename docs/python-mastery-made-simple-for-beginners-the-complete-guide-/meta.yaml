    也可以使用 `update()` 方法来添加或修改字典条目。\n\n## 删除字典项：\n\n要从字典中删除一个项，我们使用 `del` 语句。例如，\n\n\
    ```python\ncountry_capitals = {\n    \"United States\": \"Washington D.C.\",\n\
