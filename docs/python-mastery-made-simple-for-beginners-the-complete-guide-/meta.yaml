    ## 2.3: Operators in Python


    One description describes the operator as a symbol that causes a certain action
    to be carried out when placed between two operands. The logic of a program written
    in a certain programming language is built atop the operators, which are the language''s
    fundamental building blocks. Some operators in each programming language are responsible
    for more than one function.


    ## Arithmetic Operators:


    Arithmetic operators are placed between the two operands during a given arithmetic
    operation. A wide variety of arithmetic operators are available. It contains the
    + (addition), - (subtraction), * (multiplication), / (division), % (remainder),
    and // (floor division) operators in addition to the exponent operator (**).


    ## Addition:


    It is used in the process of adding two operands. For instance, if a is equal
    to 10 and b is equal to 10, then a + b equals 20.


    ## Code:


    ```

    # Addition

    a = 10

    b = 10

    result = a + b

    print("Addition:", result)

    ```


