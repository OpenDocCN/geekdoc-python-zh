    \ to have a different `Account.print_statement()` function.\n\n## The With Statement\
    \ and Context Manager Support: __enter__, __exit__\n\nPython has now evolved to\
    \ include context managers and the addition of support for using the `with` statement.\n\
    \nYour object must adhere to a straightforward \"protocol\" (or interface) called\
    \ a context manager in order to be utilized with a \"with\" statement. Adding\
