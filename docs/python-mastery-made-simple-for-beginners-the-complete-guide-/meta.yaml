    \n也可以使用 `get()` 函数来获取字典条目。\n\n## 修改字典项：\n\nPython 提供了可变的字典。可以通过查询其键来更改字典元素的值。例如，\n\
    \n```python\ncountry_capitals = {\n    \"United States\": \"Washington D.C.\"\
