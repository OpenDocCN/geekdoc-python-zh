    methods, which are a set of predefined methods. It is straightforward to recognize
    them thanks to the fact that they begin and finish with a pair of double underscores,
    such as in the case of __init__ and __str__.


    The term "under-under-method-under-under" quickly grew tedious; therefore, Pythonistas
    came up with the word "dunder methods," which is an abbreviation of the phrase
    "double under."


