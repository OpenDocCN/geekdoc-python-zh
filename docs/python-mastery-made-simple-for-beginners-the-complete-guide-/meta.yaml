- md: '## 1.4: Installing Python


    Step 1: Download the Python Installer:


    - Go to the Python download page on the official website for Windows.

    - Find a Python release that is reliable. Python version 3.10.10 was used for
    testing purposes in this lesson.

    - For downloading the executable file, choose the relevant link for your operating
    system: either the Windows installer for 64-bit Windows or the Windows installation
    for 32-bit Windows.


    Step 2: Putting the executable installer through its paces:


    - Double-clicking the .exe file, such as python-3.10.10-amd64.exe, will start
    the Python installation after downloading it.

    - By selecting the Download launcher option for all users, you will provide all
    machine users access to the Python launcher program.

    - Users can run Python from the terminal by choosing the "Add python.exe to PATH."
    checkbox.

    - Click the Install Now button and go on to Step 4 to verify that Python was successfully
    installed if this is your first time using Python and you wish to install it with
    the default features, as indicated in the dialogue box. To install additional
    features, both basic and complicated, select the "Customize installation" button
    and then proceed.

    - Even if you do not intend to use any of the tools or resources included in the
    Python Optional Features, you may still download all of them on your computer.

    - It is suggested that you test and learn using the Python test suite.

    - Python launcher and the following applies to all users: advised to provide users
    with the ability to start Python via the command prompt.

    - Make your selections from the available choices that correspond to your preferences:

    - Installation for each user: strongly suggested if you are not the only occupant
    of this machine.

    - Associating files with Python is highly recommended because selecting this option
    will link all the Python script types with the editor or launcher.

    - Make desktop shortcuts for apps that have been installed; it is advised that
    you activate shortcuts for Python programs.

    - Adding Python to the environment variables is recommended to allow it to be
    launched.

    - Precompiling the standard library is unnecessary, and doing so might slow down
    the installation.

    - Get the symbols used for debugging and the debug binaries: advised just if you
    want to develop C or C++ add-ons.

    - Make a note of the directory in which Python was installed, just in case you
    need to return to it later.

    - To begin the installation, click the Install button.

    - After the installation, a notification stating that the setup was successful
    will show.


    Step 3: Adding Python to the Environment Variables (optional):


    - If you chose to go to Step 2, skip this step. During the installation process,
    add Python to the environment variables.

    - You can access Python via the command line even if you did not add Python to
    the system variables during installation. You can do this manually if you want
    to use Python via the command line.

    - Find the directory that Python was installed in on your computer before you
    get started.

    - Python can be found in the folder located at C:\Users\Sarah\AppData\Local\Programs\Python\Python310:
    a directory that will be in the Windows user path if you didn''t pick Install
    for all users while you were installing it.


    It should be noted that the folder''s title will vary based on the Python version
    installed. However, it will consistently commence with the term "Python."


    - Click the Start button, then type advanced system settings into the search window.

    - To see the advanced system options, click the see button.

    - To change the environment variables for your computer, open the System Properties
    dialogue and go to the Advanced tab.


    Depending on the configuration you have:


    - During the installation process, if you choose the option to Install for all
    users, pick Path from the available list of System Variables and then click the
    Edit button.

    - Once you have chosen "New" and entered the path to the Python list, hit "OK"
    several times until all the dialogue boxes are gone.


    Step 4: Check that the Python installation was successful:


    - You may use the command line or the Integrated Development Environment (IDLE)
    program if you decide to install it to check whether the Python installation was
    successful. Either way, you can verify that the installation was completed successfully.

    - To initiate the process, locate the Start button and proceed to input the command
    "cmd" into the designated search field. Select the Command Prompt button.

    - At the prompt for entering commands, enter the following command: Python --
    the latest version.


    ## 1.5: How to install Python on MAC, Linux


    Install Python on MAC:


    Python 2.7 is pre-installed on macOS, but if you want to update to the most recent
    version of the programming language, then you''ll have to follow the following
    instructions:


    - First, check to see what version of Python is currently installed on your machine.
    To do this, you must launch the terminal, type "python –version," and click the
    ENTER key. This will provide you with the Python Version installed on your Mac
    device.

    - To install Python in its most recent form on your computer, visit the following
    website: [https://www.python.org/downloads/](https://www.python.org/downloads/).
    Choose macOS as your operating system, then go to the page where you may download
    the .pkg file.

    - Now, open the download to install Python on your Mac system. .pkg file, and
    then follow the on-screen instructions to complete the installation.

    - You will need to click Continue a few times at this point, and then, as seen
    in the picture that follows, you will see a button to install the program.

    - As illustrated in the picture that follows, after you have pressed the install
    button, you will be prompted to enter the system password before the installation
    can begin.

    - Click the "Install Software" button after entering the password, and it will
    immediately begin installing the most recent version of Python. You could confirm
    if the installation succeeded by using the same command that was used at the beginning
    to get the Python version.

    - Use the command "python3.11 --version" in the terminal to determine the most
    recent version of Python installed on your computer.


    Install Python on LINUX:


    Python is pre-installed on Linux operating systems, as we have just gone over,
    but if you wish to set up Python on your machine, then you need to follow the
    instructions:


    Download and set up the development packages needed as prerequisites to install
    Python on Debian and Fedora. These packages may be found in the python-devel package.
    To install the essential development dependencies on your machine, you must perform
