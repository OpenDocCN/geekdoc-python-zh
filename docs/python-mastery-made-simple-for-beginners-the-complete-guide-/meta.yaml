    的变量中。之后，代码显示 `a` 和 `b` 的总和，即 20。


    ## 减法：


    它从第一个操作数中减去第二个操作数所代表的值。当第一个操作数的值小于第二个操作数时，计算出的值为负数。例如，如果 `a` 等于 20，`b` 等于 5，那么
    `a - b` 等于 15。


