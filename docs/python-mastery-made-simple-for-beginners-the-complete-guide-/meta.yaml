- md: "## Chapter 6: Advanced File and Data Management\n\nPython offers a rich array\
    \ of built-in functions for creating, composing, and perusing files. Within the\
    \ Python realm, two primary file types are encountered: regular text files and\
    \ binary files, the latter being encoded in binary language, comprised solely\
    \ of 0s and 1s.\n\nIn the realm of text files, each line culminates with a distinct\
    \ character, termed EOL (End of Line). In Python, the default EOL character is\
    \ the newline character ('\\n'). On the other hand, binary files lack such line\
    \ terminators, storing data in a machine-readable binary format.\n\nThis discourse\
    \ focuses exclusively on the art of handling text files, from their inception\
    \ to closure, encompassing the realms of reading and writing data.\n\n## 6.1:\
    \ File Access Modes\n\nAccess modes play a pivotal role in shaping the nature\
    \ of operations permissible within an opened file. These modes dictate how a file\
    \ is intended to be utilized once it is accessed and define the positioning of\
    \ the File Handle within the file—a cursor-like entity that indicates the location\
    \ for reading or writing operations. Python offers six distinct access modes.\n\
    \n1.  Read Only ('r'): This mode opens a text file purely for reading. The file\
    \ handle is poised at the outset of the file. If the file doesn't exist, an I/O\
    \ error is raised. This represents the default mode for file opening.\n2.  Read\
    \ and Write ('r+'): In this mode, the file is opened for both reading and writing,\
    \ with the handle positioned at the beginning of the file. An I/O error is raised\
    \ if the file is missing.\n3.  Write Only ('w'): When a file is opened in this\
    \ mode, it is specifically for writing purposes. If an existing file is opened,\
    \ its contents are truncated, and the new data overwrites the old. The file handle\
    \ is set to the file's beginning, and the file is created if it doesn't already\
    \ exist.\n4.  Write and Read ('w+'): Similar to 'w,' this mode permits both reading\
    \ and writing. It truncates and overwrites existing data if the file exists, with\
    \ the handle at the file's inception.\n5.  Append Only ('a'): In 'a' mode, the\
    \ file is designated for writing, even creating it if absent. The file handle\
    \ is located at the end of the file, and newly written data is appended after\
    \ the existing content.\n6.  Append and Read ('a+'): This mode combines reading\
    \ and writing. It opens the file for both operations, creating the file if necessary.\
    \ The file handle resides at the file's end, and new data is appended after the\
    \ existing data.\n\n## How Files are Loaded into Primary Memory:\n\nIn the realm\
    \ of computers, two distinct forms of memory exist: Primary and Secondary memory.\
    \ Any file saved, whether by you or another user, is stored in secondary memory.\
    \ Primary memory, in contrast, loses its contents when the computer is powered\
    \ off. To manipulate a text file in Python or effect any changes, the file must\
    \ be loaded into primary memory. Python interacts with files residing in primary\
    \ memory through \"file handlers,\" which serve as conduits permitting Python\
    \ to interact with the file. Essentially, the operating system searches for the\
    \ file in its memory and, if found, returns a file handler, enabling you to work\
    \ with the file.\n\n## Opening a File:\n\nThe process of opening a file is executed\
    \ via the open() function without the need to import any external modules. The\
    \ syntax for opening a file is:\n\n```\nFile_object = open(r\"File_Name\", \"\
    Access_Mode\")\n```\n\nIf the file is not located in the same directory as the\
    \ Python programme file, its complete address should be given in lieu of the filename.\
    \ The file should exist in the same folder as the Python programme file. Note\
    \ that the letter r is inserted before the filename so that every character in\
    \ the filename string won't be interpreted as special characters. This prevents\
    \ the filename string from being altered in any way. For instance, if the file\
    \ address contains the notation temp, the notation t will be interpreted as the\
    \ tab character, and an error will be thrown since the address is illegal. The\
    \ r character converts the string into a raw format; more specifically, it indicates\
    \ that the string does not include any characters having particular meaning. If\
    \ the file is located in the same location and its address is not being inserted,\
    \ the r may be disregarded as unnecessary.\n\n```\n# Open function to open the\
    \ file \"MyFile1.txt\"\n# (same directory) in append mode and\nfile1 = open(\"\
    MyFile1.txt\",\"a\")\n# store its reference in the variable file1\n# and \"MyFile2.txt\"\
    \ in D:\\Text in file2\nfile2 = open(r\"D:\\Text\\MyFile2.txt\",\"w+\")\n```\n\
    \nHere, file1 is created as an object for MyFile1 and file2 as object for MyFile2.\n\
    \n## Closing a file\n\nclose() function closes the file and frees the recall space\
    \ acquired by that file. It is used at the period when the file is no longer crucial\
    \ or if it is to be set off in a different file mode.\n\n```\nFile_object.close()\n\
    \n# Opening and Closing a file \"MyFile.txt\"\n# for object name file1.\nfile1\
    \ = open(\"MyFile.txt\",\"a\")\nfile1.close()\n```\n\n## Writing to a file\n\n\
    There are two ways to write in a file.\n\n1.  write() : Inserts the string str1\
    \ in a individual line in the text file.\n    `File_object.write(str1)`\n2.  writelines()\
    \ : For a list of string basics, each string is appended in the text file. Used\
    \ to insert several strings at a single time.\n    `File_object.writelines(L)\
    \ for L = [str1, str2, str3]`\n\n## Reading from a file\n\nTo read data from a\
    \ text file:\n\n1.  read() : The bytes that have been read are returned in string\
    \ format. Reads n bytes; if n is not supplied, the file's whole is read instead.\n\
    \    `File_object.read([n])`\n2.  readline() : Reads a line of the file and returns\
    \ in the form of a string. For specified n, reads at most n bytes. But can not\
    \ read more than a line.\n    `File_object.readline([n])`\n3.  readlines() : Look\
    \ through all the lines and yields them as each line is a string portion in a\
    \ list.\n    `File_object.readlines()`\n\nNote: '\\n' is treated as a special\
    \ character of two bytes.\n\n## Exercise 1:\n\nCreate a program to show various\
    \ ways to read and write data in a file.\n\n## Code:\n\n```\nfile1 = open(\"myfile.txt\"\
    ,\"w\")\nL = [\"This is Delhi \\n\",\"This is Paris \\n\",\"This is London \\\
    n\"]\n\n# \\n is placed to indicate EOL (End of Line)\nfile1.write(\"Hello \\\
    n\")\nfile1.writelines(L)\nfile1.close() #to change file access modes\n\nfile1\
    \ = open(\"myfile.txt\",\"r+\")\n\nprint(\"Output of Read function is \")\nprint(file1.read())\n\
    print()\n\n# seek(n) takes the file handle to the nth\n# byte from the beginning.\n\
    file1.seek(0)\n\nprint(\"Output of Readline function is \")\nprint(file1.readline())\n\
    print()\n\nfile1.seek(0)\n\n# To show difference between read and readline\nprint(\"\
    Output of Read(9) function is \")\nprint(file1.read(9))\nprint()\n\nfile1.seek(0)\n\
    \nprint(\"Output of Readline(9) function is \")\nprint(file1.readline(9))\n\n\
    file1.seek(0)\n# readlines function\nprint(\"Output of Readlines function is \"\
    )\nprint(file1.readlines())\nprint()\nfile1.close()\n```\n\n## Output:\n\nMyfile.txt:\n\
    \n![](img/4aff151ad0078dc81dab357c7a046356_192_0.png)\n\n## Explanation:\n\n-\
    \   The code starts by opening a file named \"myfile.txt\" in write mode ('w')\
    \ using `file1 = open(\"myfile.txt\",\"w\")`.\n-   It defines a list L containing\
    \ three strings, each representing a line of text with the \"This is...\" format,\
    \ and each line ends with a newline character ('\\n').\n-   The code writes \"\
    Hello\" followed by a newline character to the file using `file1.write(\"Hello\
    \ \\n\")`.\n-   Then, it uses the writelines() method to write the list L to the\
    \ file. This appends the three lines to the existing content.\n-   Finally, the\
    \ file is closed using `file1.close()`.\n-   Next, the code opens the same file\
    \ for reading and writing in 'r+' mode with `file1 = open(\"myfile.txt\",\"r+\"\
    )`.\n-   It uses `file1.read()` to read the entire content of the file and print\
    \ it out. This displays the entire content of the file.\n-   Then, it uses `file1.seek(0)`\
    \ to set the file position back to the beginning (offset 0).\n-   Following the\
    \ seek(0) operation, it reads a single line from the file using `file1.readline()`.\
    \ This reads and returns the first line of the file, which is \"Hello \" (including\
    \ the newline character).\n-   The code seeks the beginning of the file again\
    \ with `file1.seek(0)`.\n-   It uses `file1.read(9)` to read the next 9 characters\
    \ from the file, including spaces."
  mdcn: "## 第六章：高级文件与数据管理\n\nPython 提供了丰富的内置函数，用于创建、编写和读取文件。在 Python 领域中，主要会遇到两种文件类型：常规文本文件和二进制文件，后者以二进制语言编码，仅由\
    \ 0 和 1 组成。\n\n在文本文件领域，每一行都以一个特定字符结尾，称为 EOL（行结束符）。在 Python 中，默认的 EOL 字符是换行符（'\\\
    n'）。另一方面，二进制文件没有这样的行终止符，而是以机器可读的二进制格式存储数据。\n\n本文档将专注于处理文本文件的艺术，从创建到关闭，涵盖读写数据的各个方面。\n\
    \n## 6.1：文件访问模式\n\n访问模式在塑造已打开文件内允许的操作性质方面起着关键作用。这些模式决定了文件在被访问后预期如何使用，并定义了文件句柄在文件中的位置——一个类似光标的实体，指示读写操作的位置。Python\
    \ 提供了六种不同的访问模式。\n\n1.  只读（'r'）：此模式仅以读取方式打开文本文件。文件句柄位于文件开头。如果文件不存在，则会引发 I/O 错误。这是文件打开的默认模式。\n\
    2.  读写（'r+'）：在此模式下，文件以读写方式打开，句柄位于文件开头。如果文件缺失，则会引发 I/O 错误。\n3.  只写（'w'）：当以这种模式打开文件时，专门用于写入。如果打开一个现有文件，其内容将被截断，新数据会覆盖旧数据。文件句柄设置在文件开头，如果文件不存在则创建该文件。\n\
    4.  写读（'w+'）：类似于 'w'，此模式允许读写。如果文件存在，它会截断并覆盖现有数据，句柄位于文件开头。\n5.  追加（'a'）：在 'a' 模式下，文件指定用于写入，即使文件不存在也会创建。文件句柄位于文件末尾，新写入的数据将追加到现有内容之后。\n\
    6.  追加读取（'a+'）：此模式结合了读写。它打开文件以进行两种操作，必要时创建文件。文件句柄位于文件末尾，新数据追加到现有数据之后。\n\n## 文件如何加载到主内存中：\n\
    \n在计算机领域，存在两种不同的内存形式：主内存和辅内存。任何保存的文件，无论是由您还是其他用户保存的，都存储在辅内存中。相比之下，主内存在计算机关机时会丢失其内容。要在\
    \ Python 中操作文本文件或进行任何更改，必须将文件加载到主内存中。Python 通过“文件句柄”与驻留在主内存中的文件进行交互，这些句柄充当允许 Python\
    \ 与文件交互的管道。本质上，操作系统在其内存中搜索文件，如果找到，则返回一个文件句柄，使您能够处理该文件。\n\n## 打开文件：\n\n打开文件的过程通过\
    \ `open()` 函数执行，无需导入任何外部模块。打开文件的语法如下：\n\n```\nFile_object = open(r\"File_Name\"\
    , \"Access_Mode\")\n```\n\n如果文件不在与 Python 程序文件相同的目录中，则应提供其完整地址而不是文件名。文件应与 Python\
    \ 程序文件位于同一文件夹中。请注意，字母 `r` 插入在文件名之前，以便文件名字符串中的每个字符都不会被解释为特殊字符。这可以防止文件名字符串以任何方式被更改。例如，如果文件地址包含\
    \ `temp` 符号，`t` 符号将被解释为制表符，并且由于地址非法而引发错误。`r` 字符将字符串转换为原始格式；更具体地说，它表示该字符串不包含任何具有特殊含义的字符。如果文件位于同一位置且未插入其地址，则可以忽略\
    \ `r`，因为它不是必需的。\n\n```\n# 使用 Open 函数以追加模式打开文件 \"MyFile1.txt\"\n# （同一目录），并将\nfile1\
    \ = open(\"MyFile1.txt\",\"a\")\n# 其引用存储在变量 file1 中\n# 以及 D:\\Text 中的 \"MyFile2.txt\"\
    \ 存储在 file2 中\nfile2 = open(r\"D:\\Text\\MyFile2.txt\",\"w+\")\n```\n\n这里，file1\
    \ 被创建为 MyFile1 的对象，file2 被创建为 MyFile2 的对象。\n\n## 关闭文件\n\n`close()` 函数关闭文件并释放该文件占用的内存空间。它在文件不再重要或需要以不同文件模式启动时使用。\n\
    \n```\nFile_object.close()\n\n# 打开并关闭文件 \"MyFile.txt\"\n# 对象名为 file1。\nfile1 =\
    \ open(\"MyFile.txt\",\"a\")\nfile1.close()\n```\n\n## 写入文件\n\n有两种方式可以写入文件。\n\n\
    1.  `write()`：将字符串 `str1` 插入文本文件的单独一行中。\n    `File_object.write(str1)`\n2.  `writelines()`：对于字符串列表，每个字符串都追加到文本文件中。用于一次插入多个字符串。\n\
    \    `File_object.writelines(L) for L = [str1, str2, str3]`\n\n## 从文件读取\n\n要从文本文件读取数据：\n\
    \n1.  `read()`：以字符串格式返回已读取的字节。读取 `n` 个字节；如果未提供 `n`，则读取整个文件。\n    `File_object.read([n])`\n\
    2.  `readline()`：读取文件的一行并以字符串形式返回。对于指定的 `n`，最多读取 `n` 个字节。但不能读取超过一行。\n    `File_object.readline([n])`\n\
    3.  `readlines()`：遍历所有行，并将它们作为列表中的每个字符串部分返回。\n    `File_object.readlines()`\n\n\
    注意：'\\n' 被视为两个字节的特殊字符。\n\n## 练习 1：\n\n创建一个程序，展示在文件中读写数据的各种方式。\n\n## 代码：\n\n```\n\
    file1 = open(\"myfile.txt\",\"w\")\nL = [\"This is Delhi \\n\",\"This is Paris\
    \ \\n\",\"This is London \\n\"]\n\n# \\n 用于表示 EOL（行结束符）\nfile1.write(\"Hello \\\
    n\")\nfile1.writelines(L)\nfile1.close() # 用于更改文件访问模式\n\nfile1 = open(\"myfile.txt\"\
    ,\"r+\")\n\nprint(\"Read 函数的输出是 \")\nprint(file1.read())\nprint()\n\n# seek(n)\
    \ 将文件句柄移动到从开头算起的第 n 个字节。\nfile1.seek(0)\n\nprint(\"Readline 函数的输出是 \")\nprint(file1.readline())\n\
