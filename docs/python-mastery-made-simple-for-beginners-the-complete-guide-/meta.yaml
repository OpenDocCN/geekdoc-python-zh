- md: "## Install Python on UBUNTU:\n\nPython is pre-installed on all Linux distributions;\
    \ however, you may only sometimes find it pre-installed on Ubuntu operating systems.\
    \ Installing Python may be done in several ways, depending on the circumstances.\
    \ Python will be installed on your Ubuntu computer with the help of APT, which\
    \ stands for Advanced Package Tool and is the standard package manager on Ubuntu.\
    \ To set up Python on Ubuntu, refer to the instructions that are listed below:\n\
    \n- On Ubuntu, you may launch the terminal by simultaneously pressing the following\
    \ keys: Control, Option, and Tab.\n- Now, to access the system's repository, run\
    \ the following command into the terminal:\n- Update apt using `sudo`.\n- To set\
    \ up Python on Ubuntu, use the command `sudo apt install python3`.\n- Then, APT\
    \ will search for the Python installation package and install it on your computer\
    \ without further intervention.\n\n## 1.6: Exercise, Solutions and Explanations\n\
    \nIn this instance, we have used the built-in `print()` method to display the\
    \ string \"Hello, world!\" on our screen. A series of characters is referred to\
    \ as a string. Strings may be encapsulated in a single, double, or triple quote\
    \ while working in Python.\n\n**Exercise 1:**\n\nPrint \"Hello World\" in Python.\n\
    \n**Code:**\n\n```python\n# Print Hello World\nprint(\"Hello World\")\n```\n\n\
    **Output:**\n\n```\nPS C:\\Users\\TOWER TECH\\Desktop\\Codes> & \"C:/Program Files/Python311/python.exe\"\
    \ \"c:/Users/TOWER TECH/Desktop/Codes/Chapter1_codes.py\"\nHello World\nPS C:\\\
    Users\\TOWER TECH\\Desktop\\Codes>\n```\n\n**Explanation:**\n\nWe could see the\
    \ string \"Hello World\" on our screen because our application used the built-in\
    \ technique known as `print()`. A string is the name given to the characters that\
    \ make up a string. In Python, strings between single, double, or even triple\
    \ quotes may be enclosed.\n\n**Exercise 2:**\n\nWrite a Python program that prints\
    \ your name.\n\n**Code:**\n\n```python\n# Get the user's name\nname = input(\"\
    Enter your name: \")\n# Print the name\nprint(\"Hello, \" + name + \"!\")\n```\n\
    \n**Output:**\n\n```\nPS C:\\Users\\TOWER TECH\\Desktop\\Codes> & \"C:\\Program\
    \ Files\\Python311\\python.exe\" \"c:/Users/TOWER TECH/Desktop/Codes/Chapter1_codes.py\"\
    \nEnter your name: Jhon\nHello, Jhon!\nPS C:\\Users\\TOWER TECH\\Desktop\\Codes>\
    \ |\n```\n\n**Explanation:**\n\nTo communicate with this program's user, we use\
    \ the `input()` method. The `input()` method prompts the user to provide their\
    \ name by displaying the text \"Enter your name:\" and then waiting for them to\
    \ do so. The variable `name` will keep a string representation of anything the\
    \ user puts in there.\n\nThe next step involves displaying a message using the\
    \ `print()` method. The message is created by using the `+` operator to concatenate\
    \ (join) three strings: \"Hello, \" the user's name (which is saved in the `name`\
    \ variable), and \"!\".\n\nThe last step of the process is for the program to\
    \ print the welcoming message. This message will contain the user's name.\n\n\
    **Exercise 3:**\n\nDevelop a computer software that computes the summation of\
    \ two numerical values inputted by the user.\n\n**Code:**\n\n```python\n# Get\
    \ two numbers from the user\nnum1 = float(input(\"Enter the first number: \"))\n\
    num2 = float(input(\"Enter the second number: \"))\n# Calculate the sum\nsum =\
    \ num1 + num2\n# Print the result\nprint(\"The sum of {} and {} is: {}\".format(num1,\
    \ num2, sum))\n```\n\n**Output:**\n\n```\nPS C:\\Users\\TOMER TECH\\Desktop\\\
    Codes> & \"C:/Program Files/Python311/python.exe\" \"c:/Users/TOMER TECH/Desktop/Codes/Chapter1_codes.py\"\
    \nEnter the first number: 1\nEnter the second number: 17\nThe sum of 1.0 and 17.0\
    \ is: 18.0\nPS C:\\Users\\TOMER TECH\\Desktop\\Codes>\n```\n\n**Explanation:**\n\
    \nIn the first stage of our application, we use the `input()` function so that\
    \ the end user may provide us with two numerical values. We ask the user to input\
    \ their initial quantity, and when they do so, we preserve it in a variable with\
    \ the name `num1` that we have created for that purpose. In addition, we will\
    \ ask for another number and save this information in the variable designated\
    \ as `num2`. We use the `float(input())` method to convert the user's input into\
    \ a floating-point number so that we may treat it as such. A floating-point number\
    \ can include decimal places. This is done to ensure that the input is processed\
    \ correctly.\n\nOnce we have both values, we employ the plus symbol (`+`) to add\
    \ them together, and once the computation is complete, we store the result in\
    \ a variable that we name `sum`.\n\nTo display the result, we use the `print()`\
    \ function in combination with an expression previously created. In the prepared\
    \ string, these characters have been used as substitutes for denoting the contents\
    \ of `num1`, `num2`, and `sum`, respectively. The `.format()` method will replace\
    \ these dummy values with the actual values instead of using them. The result\
    \ is a device that is educational and simple to use.\n\n## Chapter 2: Fundamentals\
    \ of Python\n\n## 2.1: Basic Syntax\n\nPython is a computer language designed\
    \ from the ground up to be easily readable. Python is quickly becoming among the\
    \ programming languages that are used by both inexperienced and seasoned developers\
    \ alike. This is mostly because the language was developed with the user in mind.\
    \ Because the grammar of Python is so like that of the language of English, it\
    \ is much easier to write, read, and understand a Python script than a program\
    \ created with a different programming language, like C or Java.\n\nThe \"syntax\"\
    \ of a language refers to its structure, or more precisely, to the components\
    \ that go into producing a well-formed program. Further, the Python syntax consists\
    \ of a set of rules and building blocks that, when taken together, make up the\
    \ syntax of Python.\n\n### The Line Structure of Python:\n\nThe actual lines of\
    \ text and the statements and lines that explain what each line does are included\
    \ in the structure of the Python source code. A physical line in a program written\
    \ in Python is made up of a succession of characters, and the line sequence is\
    \ finished when the very last characters of the line are entered. This contrasts\
    \ with other programming languages, such as C and C++, where it is necessary to\
    \ use a semicolon to indicate that the statement has been completed. In Python,\
    \ the line sequence may be considered complete as soon as the last character of\
    \ the line has been typed. On the other hand, an orderly path is created by using\
    \ one or more real boundaries as its foundational building pieces throughout the\
    \ construction process. While Python programmers are not obliged to use the semicolon\
    \ in their code, the language does not prevent them from doing so. The appearance\
    \ of the NEWLINE token denotes that the chain of reasoning has arrived at its\
    \ logical endpoint.\n\n### Python Multiline Statements:\n\nAs you have seen, the\
    \ start of an additional statement in Python is indicated by the start of a new\
    \ line in the programming language. Despite this, Python can merge many statements\
    \ into a single logical line and change a single statement to one that spans multiple\
    \ lines. The clarity with which the sentence may be read has room for improvement.\n\
    \n### Explicit Line Joining:\n\nIn computer programming, a method known as explicit\
    \ line joining may be used to split a single statement over many lines of code.\
    \ The use of a backslash to signify the extension of the statement into the next\
