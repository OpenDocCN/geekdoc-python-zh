    ```\n\n我们也可以使用 `pop()` 方法从字典中移除任何内容。\n\n可以使用 `clear()` 函数一次性删除字典中的所有条目。\n\n```python\n\
    country_capitals = {\n    \"United States\": \"Washington D.C.\",\n    \"Italy\"\
