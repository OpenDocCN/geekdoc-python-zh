    \ = open(\"myfile.txt\", \"w\")\nL = [\"This is Delhi \\n\", \"This is Paris \\\
    n\", \"This is London \\n\"]\nfile1.writelines(L)\nfile1.close()\n```\n\n```python\n\
    # Append-adds at last\nfile1 = open(\"myfile.txt\", \"a\") # append mode\nfile1.write(\"\
    Today \\n\")\nfile1.close()\n```\n\n```python\nfile1 = open(\"myfile.txt\", \"\
    r\")\nprint(\"Output of Readlines after appending\")\nprint(file1.readlines())\n\
    print()\nfile1.close()\n```\n\n```python\n# Write-Overwrites\nfile1 = open(\"\
    myfile.txt\", \"w\") # write mode\nfile1.write(\"Tomorrow \\n\")\nfile1.close()\n\
    ```\n\n```python\nfile1 = open(\"myfile.txt\", \"r\")\nprint(\"Output of Readlines\
    \ after writing\")\nprint(file1.readlines())\nprint()\nfile1.close()\n```\n\n\
    In summary, Python offers robust file-handling capabilities, facilitating a range\
    \ of operations on text files. Understanding file access modes, loading files\
    \ into primary memory, and mastering the methods for opening, closing, writing\
    \ to, and reading files are essential skills for any Python programmer. This proficiency\
    \ empowers programmers to effectively manage and manipulate data stored in text\
    \ files, a fundamental aspect of many real-world applications.\n\n## 6.2: Understanding\
    \ XML and JSON in Python\n\nXML and JSON are two commonly used data formats in\
    \ the world of programming, particularly for storing and exchanging data. They\
    \ provide a structured way to represent information that can be easily understood\
    \ by both humans and machines. In Python, you can work with XML and JSON data\
    \ efficiently using libraries designed for this purpose.\n\n### XML (eXtensible\
    \ Markup Language)\n\nXML is a markup language, which means it uses tags to define\
    \ the structure of data. These tags help organize and describe the information\
    \ contained within the document. Here's a basic example of XML:\n\nCode:\n\n```xml\n\
    <book>\n    <title>Python Programming</title>\n    <author>John Doe</author>\n\
    \    <price>29.99</price>\n</book>\n```\n\nExplanation:\n\nIn this XML, `<book>`\
    \ is the root element, and it contains child elements like `<title>`, `<author>`,\
    \ and `<price>`, each storing specific information.\n\n### Reading and Writing\
    \ XML in Python\n\nPython provides the `xml.etree.ElementTree` library for working\
    \ with XML data. You can use it to parse (read) and generate (write) XML files.\n\
    \n#### Reading XML:\n\n```python\nimport xml.etree.ElementTree as ET\n\n# Parse\
    \ an XML file\ntree = ET.parse(\"my_file.xml\")\nroot = tree.getroot()\n\n# Accessing\
    \ elements in XML\ntitle = root.find(\"title\").text\nauthor = root.find(\"author\"\
    ).text\nprice = root.find(\"price\").text\n\nprint(\"Title:\", title)\nprint(\"\
    Author:\", author)\nprint(\"Price:\", price)\n```\n\n#### Writing XML:\n\n```python\n\
    import xml.etree.ElementTree as ET\n\n# Creating an XML structure\nbook = ET.Element(\"\
    book\")\ntitle = ET.SubElement(book, \"title\")\ntitle.text = \"Python Programming\"\
    \nauthor = ET.SubElement(book, \"author\")\nauthor.text = \"John Doe\"\nprice\
    \ = ET.SubElement(book, \"price\")\nprice.text = \"29.99\"\n\n# Creating a tree\
    \ and writing to a file\ntree = ET.ElementTree(book)\ntree.write(\"my_file.xml\"\
    )\n```\n\n### JSON (JavaScript Object Notation)\n\nJSON is a format for the transfer\
    \ of data that is very lightweight. Both people and robots will have an easy time\
    \ reading and writing this language. Because it stores data in the form of key-value\
    \ pairs, JSON is a format that is often used for online APIs and configuration\
    \ files. The following is a simple example of JSON:\n\n```json\n{\n    \"title\"\
    : \"Python Programming\",\n    \"author\": \"John Doe\",\n    \"price\": 29.99\n\
    }\n```\n\nIn this JSON object, you have keys like \"title\", \"author\", and \"\
    price\" associated with their respective values.\n\n### Reading and Writing JSON\
    \ in Python\n\nPython includes a built-in library called `json` for handling JSON\
    \ data.\n\n#### Reading JSON:\n\n```python\nimport json\n\n# Read JSON data from\
    \ a file\nwith open(\"my_file.json\", \"r\") as f:\n    data = json.load(f)\n\n\
    # Accessing JSON data\nprint(\"Name:\", data[\"name\"])\nprint(\"Age:\", data[\"\
    age\"])\n```\n\n#### Writing JSON:\n\n```python\nimport json\n\n# Creating a Python\
    \ dictionary\ndata = {\n    \"name\": \"John Doe\",\n    \"age\": 30\n}\n\n# Writing\
    \ JSON data to a file\nwith open(\"my_file.json\", \"w\") as f:\n    json.dump(data,\
    \ f)\n```\n\nIn summary, XML and JSON are valuable data formats used in Python\
    \ and many other programming languages to structure and exchange information.\
    \ Python provides libraries like `xml.etree.ElementTree` and `json` to work with\
    \ these formats seamlessly. Understanding how to read and write XML and JSON data\
    \ is essential for tasks like data exchange, configuration management, and web\
    \ development.\n\n## 6.3: Hands-on Exercises\n\n### Exercise 1:\n\nYou have an\
    \ XML file named \"books.xml\" that contains a list of books. Each book has a\
    \ title, author, and price. Write a Python program to parse this XML file and\
    \ print the details of each book.\n\n#### Code: books.xml\n\n```xml\n<library>\n\
    \  <book>\n    <title>Python Programming</title>\n    <author>John Doe</author>\n\
    \    <price>29.99</price>\n  </book>\n  <book>\n    <title>Data Science Handbook</title>\n\
    \    <author>Jane Smith</author>\n    <price>39.95</price>\n  </book>\n</library>\n\
    ```\n\n#### Solution:\n\n```python\nimport xml.etree.ElementTree as ET\n\n# Parse\
    \ the XML file\ntree = ET.parse(\"books.xml\")\nroot = tree.getroot()\n\n# Iterate\
    \ through each book and print details\nfor book in root.findall(\"book\"):\n \
    \   title = book.find(\"title\").text\n    author = book.find(\"author\").text\n\
    \    price = book.find(\"price\").text\n    print(\"Title:\", title)\n    print(\"\
    Author:\", author)\n    print(\"Price:\", price)\n    print()\n```\n\n#### Output:\n\
    \n```\nTitle: Python Programming\nAuthor: John Doe\nPrice: 29.99\n\nTitle: Data\
    \ Science Handbook\nAuthor: Jane Smith\nPrice: 39.95\n```\n\n#### Explanation:\n\
    \n- We start by importing the `xml.etree.ElementTree` module as `ET`, which allows\
    \ us to work with XML data in Python.\n- Next, we parse the XML file \"books.xml\"\
    \ using `ET.parse(\"books.xml\")` and get the root element of the XML tree using\
    \ `tree.getroot()`. The root element, in this case, is `<library>`.\n- We then\
    \ use a for loop to iterate through each `<book>` element inside the `<library>`.\n\
    - For each `<book>`, we extract the text within the `<title>`, `<author>`, and\
    \ `<price>` elements using the `find()` method. This method allows us to locate\
