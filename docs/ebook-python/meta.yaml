  - '[PAGE 26]


    # Python and MySQL for Beginner


    # Requirement mysql.connector installation into database.


    MySQL is a Relational Database Management System (RDBMS) whereas the structured
    Query Language (SQL) is the language used for handling the RDBMS using commands
    i.e Creating, Inserting, Updating and Deleting the data from the databases. SQL
    commands are case insensitive i.e CREATE and create signify the same command.


    MySQL Connector/Python enables Python programs to access MySQL databases, using
    an API that is compliant with the Python Database API Specification v2.0 (PEP
    249). It is written in pure Python and does not have any dependencies except for
    the Python Standard Library.


    # Basic Python keywords do you need to know.


    connect: to make a connection to the database, all credentials such as username,
    server name, server password and database name need to be specified.


    ![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_26_0.png)


    error: This is exception handling, if there are any issues, it will be included
    in this Error


    cursor: to help our program execute SQL command/ operation (can be renamed using
    “as” method)'
