  md: '# # Laragon


    The first version of Laragon was released in 2016 and was primarily focused on
    providing a simple and lightweight package for setting up a local web development
    environment


    Provides a fast and easy way to spin up an isolated Windows development (like
    a Virtual Machine, it doesn''t touch your OS). Users can install it as a software,
    start it up, do their programming, and just exit when finished. The platform comes
    pre-installed with many popular applications like Node.


    ![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_14_0.png)


    Portable, isolated, fast & powerful universal development environment for PHP,
    Node. js, Python, Java, Go, Ruby. It is fast, lightweight, easy-to-use and easy-to-extend.
    Great for building and managing modern web applications.


    Built from the ground up for ease of use and perfect compatibility with Laravel.


    +   Before installing Laragon, here are a few things you should be aware of:

    1. **System Requirements:** Laragon requires Windows 7 or later, and at least
    1 GB of RAM.

    2. **Disk Space:** Make sure you have enough disk space to install Laragon and
    any projects you plan to work on.

    3. **Firewall:** If you have a firewall enabled, you may need to configure it
    to allow Laragon to access the internet and connect to other services.

    4. **Anti-virus:** Some anti-virus software may interfere with the installation
    or operation of Laragon. Make sure to temporarily disable your anti-virus software
    before installing Laragon, and add an exception for it if needed.

    5. **Existing Installation:** If you have an existing web server, PHP, or MySQL
    installation, you may need to remove it or reconfigure it before installing Laragon.

    6. **Backup:** It''s always a good idea to make a backup of any important files
    or data before making any changes to your system, in case something goes wrong
    during the installation.

    7. **Familiarize yourself with the tools:** To get the most out of Laragon, it''s
    a good idea to be familiar with the tools it includes, such as Apache, PHP, and
    MySQL, so that you can configure and troubleshoot them as needed.


    By following these steps, it should make the installation process of Laragon smoother
    and avoid any potential issues.'
