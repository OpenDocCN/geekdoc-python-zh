    \ TABLE\n4. DROP TABLE\n5. INSERT\n6. UPDATE\n7. DELETE\n8. DISPLAY\n9. SHOW DATABASE\n\
    10. EXIT\n\nEnter your choice :\n```\n\n图 21：程序菜单\n\n![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_27_0.png)\n\
    \n### 让我们尝试一下活动\n\n**创建模块**\n\n在您的目录中创建您自己的模块，命名为 `moduleDB`，并包含四个（4）个子模块（图 22）：\n\
    \n-   `deleteData.py`\n-   `displayData.py`\n-   `insertData.py`\n-   `updateData.py`\n\
    \n您的主程序是 `main.py`。\n\n![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_28_0.png)\n\n\
    图 22：`PythonAndMysql` 目录中的文件列表\n\n现在，转到 `ModuleDb` 目录以完成我们的子模块\n\n1.  创建 `insertData.py`\n\
