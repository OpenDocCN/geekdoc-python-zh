  md: '# CHAPTER 1: INTRODUCTION


    # What is Python Programming?


    Interpreted

    Python is processed at runtime by the interpreter. You do not need to compile
    your program before executing it. This is similar to PERL and PHP. Execution is
    implemented directly and freely from source without need to be compiled into machine
    code or binary format.


    Interactive

    You can actually sit at a Python prompt and interact with the interpreter directly
    to write your programs.


    Object-Oriented

    Python supports Object-Oriented style or technique of programming that encapsulates
    code within objects.


    Beginner’s Language

    Python is a great language for the beginner- level programmers and supports the
    development of a wide range of applications from simple text processing to WWW
    browsers to games.


    Dynamically typed language

    It doesn’t know about the type of the variable until the code is run. So declaration
    is of no use. What it does is, It stores that value at some memory location and
    then binds that variable name to that memory container.


    > Python is a **high-level programming language** that was first released in 1991
    by **Guido van Rossum**. The language was designed to be easy to read and write,
    with a **focus on code readability**. Python’s design philosophy emphasizes code
    readability, and its syntax allows programmers to express concepts in fewer lines
    of code than languages like C++ or Java.'
  merge: -1
