    ![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_16_1.png)


    After installing, you can run Python Interpreter by typing IDLE in the search
    Windows and pressing enter (Figure 2). An IDLE Shell will appear. You can type
    your coding here (Figure 3).


    ![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_16_2.png)


