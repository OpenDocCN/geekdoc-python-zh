    \ `as` 方法重命名）\n\nPython 和 MySQL 初学者指南\n\n### 在此活动中：\n\n-   您将使用创建、读取、更新、删除（**CRUD**）方法构建一个程序。\n\
    -   您的程序将显示 **10 个菜单**（图 21）。\n-   每个菜单都有其特定的任务。即使没有创建数据库，用户也可以选择任何菜单。\n-   您将创建自己的特定模块和子模块。\n\
    -   您将从头开始构建自己的函数来填充所选菜单。\n-   使用条件结构显示菜单。\n-   编写代码并观察每个菜单的输出。\n\n```\n**********POLYTECHNIC\
