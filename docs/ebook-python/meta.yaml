    \nFigure 20: Interface Command Prompt for mysql-connector-python module installation\n\
    \nPython and MySQL for Beginner\n\n### Requirement mysql.connector installation\
    \ into database.\n\nMySQL is a Relational Database Management System (RDBMS) whereas\
    \ the structured Query Language (SQL) is the language used for handling the RDBMS\
    \ using commands i.e Creating, Inserting, Updating and Deleting the data from\
    \ the databases. SQL commands are case insensitive i.e CREATE and create signify\
    \ the same command.\n\nMySQL Connector/Python enables Python programs to access\
    \ MySQL databases, using an API that is compliant with the Python Database API\
    \ Specification v2.0 (PEP 249). It is written in pure Python and does not have\
    \ any dependencies except for the Python Standard Library.\n\n### Basic Python\
    \ keywords do you need to know.\n\n- connect: to make a connection to the database,\
    \ all credentials such as username, server name, server password and database\
    \ name need to be specified.\n\n![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_26_0.png)\n\
    \n- error: This is exception handling, if there are any issues, it will be included\
    \ in this Error\n- cursor: to help our program execute SQL command/ operation\
