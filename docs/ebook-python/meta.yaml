    \ :\n```\n\nFigure 21: Program Menu\n\n![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_27_0.png)\n\
    \n### Let's try the activity\n\n**Create module**\n\nCreate your own module, name\
    \ it as moduleDB in your directory with four(4) submodules (Figure 22):\n\n- deleteData.py\n\
    - displayData.py\n- insertData.py\n- updateData.py\n\nYour main program is main.py.\n\
    \n![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_28_0.png)\n\nFigure 22: List file in\
    \ PythonAndMysql directory\n\nNow, move to ModuleDb directory to complete our\
    \ submodules\n\n1. Create insertData.py\n\n```python\nimport mysql.connector\n\
    \n# insert data into table\ndef insert(host, username, password, database, table_name):\n\
