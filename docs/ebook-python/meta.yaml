    \ permission requests, write to the publisher, addressed “Attention: Permission\
    \ Coordinator,” at the address below.\n\nPoliteknik Mersing\nJalan Nitar,\n86800\
    \ Mersing\nJohor Darul Ta’zim\nTelephone : 07-7980001\nFax : 07-7980002\nWebsite\
    \ : https://pmj.mypolycc.edu.my/\n\nPrinted in Malaysia\nFirst Printing, 2023\n\
    eISBN : 978-967-2904-57-1\n\nAuthors :\nFatimah Rahmat\nMohamad Iqbal Hakim Che\
    \ Omar\nNurul Shakirah Mohd Zawawi\n\n# PREFACE\n\nThe need to share knowledge\
    \ and experience on how the Python programming language could have a positive\
    \ impact on the learning process led to the creation of this book focuses on the\
    \ installation process, use of MySQL for database connections, and fundamental\
    \ Python language concepts.\n\nThis book offers helpful resources, advice, and\
    \ examples, especially for students and anybody else interested in learning the\
    \ Python programming language.\n\nThe Create, Read, Update, and Delete (CRUD)\
    \ component of an application employing Python scripts using MySQL is also demonstrated\
    \ in this book's sample examples.\n\nThis book is intended to assist readers in\
    \ achieving their goals.\n\n# TABLE OF CONTENTS\n\n## I. INTRODUCTION\n\n- What\
    \ is Python Programming? ........................ 2\n- Basic Principles of Python\
    \ ........................... 3\n\n## II. REQUIREMENTS\n\n- What is needed? ....................................\
    \ 5\n- Visual Studio Code versus PyCharm versus IDLE ........ 6\n- Minimum requirements\
    \ for:\n  - Visual Studio Code (VS Code) installation ........ 8\n  - PyCharm\
    \ installation ............................. 8\n  - IDLE installation ................................\
    \ 9\n- Laragon ............................................ 10\n\n## III. INSTALLING\n\
    \n- Installing Python and IDE Environment Setup .. 12\n\n## IV. FIRST PROJECT\
    \ ACTIVITY\n\n- Set up local web server Laragon ................... 17\n- Choose\
    \ your favourite IDE either PyCharm or VSCode ... 19\n- Activity\n  - Create insertData.py\
    \ ............................ 25\n  - Create deleteData.py ............................\
    \ 26\n  - Create displayData.py ........................... 27\n  - Create updateData.py\
    \ ............................ 28\n  - Import module in main.py .........................\
    \ 29\n  - Create database function in main.py .............. 29\n  - Drop database\
    \ function in main.py ................ 30\n  - Create table function in main.py\
    \ ................ 30\n  - Drop table function in main.py .................. 31\n\
    \  - Display all databases function ................... 31\n  - Finish the whole\
    \ program ......................... 32\n\n- References .........................................\
    \ 33\n\n> \"PYTHON IS AN EASY-TO-USE LANGUAGE FOR BEGINNERS, YET IT IS POWERFUL\
    \ ENOUGH FOR EXPERTS.\" -KENNETH REITZ-\n\n# CHAPTER 1: INTRODUCTION\n\n## What\
    \ is Python Programming?\n\n**Interpreted**\nPython is processed at runtime by\
    \ the interpreter. You do not need to compile your program before executing it.\
    \ This is similar to PERL and PHP. Execution is implemented directly and freely\
    \ from source without need to be compiled into machine code or binary format.\n\
    \n**Interactive**\nYou can actually sit at a Python prompt and interact with the\
    \ interpreter directly to write your programs.\n\n**Object-Oriented**\nPython\
    \ supports Object-Oriented style or technique of programming that encapsulates\
    \ code within objects.\n\n**Beginner’s Language**\nPython is a great language\
    \ for the beginner-level programmers and supports the development of a wide range\
    \ of applications from simple text processing to WWW browsers to games.\n\n**Dynamically\
    \ typed language**\nIt doesn’t know about the type of the variable until the code\
    \ is run. So declaration is of no use. What it does is, It stores that value at\
    \ some memory location and then binds that variable name to that memory container.\n\
    \n> Python is a **high-level programming language** that was first released in\
    \ 1991 by **Guido van Rossum**. The language was designed to be easy to read and\
    \ write, with a **focus on code readability**. Python’s design philosophy emphasizes\
    \ code readability, and its syntax allows programmers to express concepts in fewer\
    \ lines of code than languages like C++ or Java.\n\n## Basic Principles of Python\n\
    \n### Basic Core language\n\nPython is designed so that there really isn't that\
    \ much to learn in the basic language. For example, there is only one basic structure\
    \ for conditional programming (if/else/elif), two looping commands (while and\
    \ for), and a consistent method of handling errors (try/except) which apply to\
    \ all python programs.\n\n### Modules\n\nSelf-contained programs which define\
    \ a variety of functions and data types that you can call in order to do tasks\
    \ beyond the scope of the basic core language by using the import command.\n\n\
    ### Object oriented programming\n\nA basic concept of object oriented programming\
    \ is encapsulation, the ability to define an object that contains your data and\
    \ all the information a program needs to operate on that data. In this way, when\
    \ you call a function (known as a method in object-oriented lingo), you don't\
    \ need to specify a lot of details about your data, because your data object ``knows''\
    \ all about itself. In addition, objects can inherit from other objects, so if\
    \ you or someone else has designed an object that's very close to one you're interested\
    \ in, you only have to construct those methods which differ from the existing\
    \ object, allowing you to save a lot of work.\n\n### Namespace and variable scoping\n\
    \nThe same variable name can be used in different parts of a program without fear\
    \ of destroying the value of a variable you're not concerned with.\n\n### Exception\
    \ handling\n\nWhen you're performing an operation that might result in an error,\
    \ you can surround it with a try loop, and provide an exception clause to tell\
    \ python what to do when a particular error arises.\n\nSome of the most popular\
    \ Python **libraries and frameworks** include:\n\n- NumPy, a library for numerical\
    \ computing\n- pandas, a library for data manipulation and analysis\n- scikit-learn,\
    \ a machine learning library\n- TensorFlow, a library for deep learning\n- Django,\
    \ a web framework\n- Flask, a micro web framework\n\n# CHAPTER 2: REQUIREMENTS\n\
    \n## What is needed?\nChoose ONE of every category\n\n### IDE\n(Integrated Development\
    \ Environment)\n- Visual Studio Code (VS Code)\n- PyCharm\n- IDLE\n\n### Web Server\n\
    - Laragon\n- XAMPP\n\n## Table 1: Visual Studio Code versus PyCharm versus IDLE\n\
    \n| CRITERIA | VS Code | PyCharm | IDLE |\n|----------|---------|---------|------|\n\
    | Environment | An IDE (Integrated Development Environment). | Code editor that\
    \ provides a similar experience to an IDE through extensions. | An IDLE Integrated\
    \ Development and Learning Environment |\n| Performances | Lightweight because\
    \ it does not need much space. | Consumes a lot of resources because it requires\
    \ a lot of memory and large storage space. | Coded in 100% pure Python, using\
    \ the tkinter GUI toolkit |\n| Platform | Free and compatible with all platforms:\
    \ Windows, Linux and Mac | Cross platform IDE. More powerful and has a commercial\
    \ version. | Cross-platform: works mostly the same on Windows, Unix, and macOS\
    \ |\n| Features | Potential errors are automatically highlighted in red, making\
    \ it easy to find and fix errors. It goes a step further by adding the Issues\
    \ tab, listing all potential bugs in one place and making it easy to review. To\
    \ use Python with VS Code, you need to install the Python formatter and linter.\
    \ | Main features is the \"Search Anywhere\" that allows you to search outside\
    \ your project. Can find files, classes, symbols, and user interface elements\
    \ even if they don't exist in your current project. Code completion is better\
    \ with PyCharm. It displays function signatures as part of the autocomplete selection\
    \ list. Has some additional features such as Sort by Name, Quick Documentation\
    \ and Quick Definition. Quick documentation shows the function's signature and\
    \ return type, as well as the function's comments while quick definition shows\
    \ the feature code and is convenient. | Python shell window (interactive interpreter)\
    \ with colorizing of code input, output, and error messages. Multi-window text\
    \ editor with multiple undo, colorizing, smart indent, call tips, auto completion,\
    \ and other features. Search within any window, replace within editor windows,\
    \ and search through multiple files (grep). Debugger with persistent breakpoints,\
    \ stepping, and viewing of global and local namespaces. Configuration, browsers,\
    \ and other dialogs |"
