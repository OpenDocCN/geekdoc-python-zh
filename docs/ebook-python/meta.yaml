    \ **RDBMS** 的语言。**SQL** 命令不区分大小写，例如 `CREATE` 和 `create` 表示相同的命令。\n\n**MySQL Connector/Python**\
    \ 使 Python 程序能够访问 **MySQL** 数据库，使用符合 Python 数据库 API 规范 v2.0（**PEP 249**）的 **API**。它用纯\
    \ **Python** 编写，除了 **Python** 标准库外没有任何依赖项。\n\n### 您需要了解的基本 Python 关键字。\n\n-  \
    \ `connect`：连接到数据库，需要指定所有凭据，例如用户名、服务器名称、服务器密码和数据库名称。\n\n![](img/dd418cd7620a895ae5a5f4ec7cbe0c09_26_0.png)\n\
