- md: "## Supporting the Author\n\nA lot of work has gone into this book and it is\
    \ the fruit of long hours of preparation, brainstorming, and finally writing.\
    \ As a result, I would ask that you do not distribute any illegal copies of this\
    \ book.\n\nThis means that if a friend wants a copy of this book, s/he will have\
    \ to buy it through the official channels (i.e., through your favourite e-store,\
    \ or the book’s official website).\n\nIf some of your friends are interested in\
    \ the book, you can refer them to the book’s official website where they can either\
    \ buy the book, enter a monthly draw to be in for a chance of receiving a free\
    \ copy of the book, or to be notified of future promotional offers.\n\n## Chapter\
    \ 1: Starting with Our Shooter Game\n\nIn this section we will discover how to\
    \ create the first part of our shooter game by implementing an animated 2D character\
    \ that can move around and shoot projectiles.\n\nAfter completing this chapter,\
    \ you will be able to:\n\n- Detect the keys pressed by the player and move the\
    \ player character accordingly.\n- Create and propel projectiles whenever the\
    \ player presses the space bar.\n- Create a target that can be used by the player\
    \ to test its weapon.\n- Create a class to be used for each NPC that accounts\
    \ for the NPC’s health.\n- Apply damage to the NPC every time it is being hit\
    \ by a bullet.\n\n## Moving the NPC using the arrow keys\n\nIn this section we\
    \ will start to learn to create a player character that can move in all directions\
    \ based on the keys pressed by the player. Initially this player character will\
    \ be represented by a red square; however in the subsequent sections this red\
    \ square will be replaced by an animated character. The player character will\
    \ be able to move in all four directions (i.e., left right up and down). The way\
    \ we will achieve this will consist of the following steps:\n\nFirst, we will\
    \ load the different pictures that are necessary to create the animation.\nThen\
    \ we'll create animations based on these pictures.\nAs the screen is refreshed,\
    \ we will change the image of the animation to give the illusion of an animation.\n\
    Once this is done, we will start to apply this information to different directions\
    \ so we will first detect what key has been pressed by the player (left right\
    \ up or down) and then move the main character in the corresponding direction.\n\
    \nThe animation that will be used for the character will be the same all the time\
    \ and it will be rotated depending on the direction in which the player is going;\
    \ so for example we will use the animation of the character moving to the right\
    \ whenever it's moving right; however if you use the left arrow key we can use\
    \ the same animation clip but flipped around the vertical axis so that this animation\
    \ is now to the left. To go up and down, it will be the exact same except that\
    \ the initial animation that was going to the right will be rotated so that the\
    \ character is now facing up, and again if we go down, we will be rotating this\
    \ image so that it is facing down.\n\nAt the end of the chapter, you will have\
    \ created a window with an NPC that you can move in four directions using the\
    \ arrow keys, as illustrated in the next figure.\n\n![](img/57971d42f58afa7cf82796475efe9a1c_31_0.png)\n\
    \nSo let’s get started:\n\nPlease open a text editor of your choice.\nCreate a\
    \ new file.\nSave it as.\nCopy and paste the folder called assets from the resource\
    \ folder to the same folder where you have saved your script; the asset folder\
    \ includes images that will be used for the animation.\nPlease add the following\
    \ code at the beginning of the script.\n\n```python\nimport pygame\nimport time\n\
    ```\n\n```python\nWIDTH, HEIGHT = 900, 600\nWIN = pygame.display.set_mode((WIDTH,\
    \ HEIGHT))\npygame.display.set_caption(\"2D Shooter\")\nFPS = 60\n```\n\nIn the\
    \ previous code:\n\nWe import the libraries pygame and time; the former is used\
    \ for game elements, and the latter will be used to set the game’s frame rate.\n\
    We declare two variables WIDTH and HEIGHT and their values are set to 900 and\
    \ 600; these variables will be used to set the size of the game screen.\nUsing\
    \ the command `pygame.display.set_mode`, we set the size of the game window based\
    \ on the variables that were defined previously.\nWe set the label (or caption)\
    \ of the game window.\nFinally, we define a variable called FPS that will be used\
    \ to set the frame rate for our game.\n\nNow that we have defined the features\
    \ of the window where the game will be displayed, we can start to define the images\
    \ and other parameters linked to the animation that will be used for the NPC.\n\
    \nPlease add the following code to the script:\n\n```python\nVEL = 4\nplayer_angle\
    \ = 0\nBG = pygame.image.load(\"assets/Background.jpg\")\nBG = pygame.transform.scale(BG,\
