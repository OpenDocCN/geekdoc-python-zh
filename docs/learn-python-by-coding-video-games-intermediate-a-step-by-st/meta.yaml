  pgno: 138
- img_proc: true
  md: "The pills are organised in four lines and four columns.\n\nEach pill is represented\
    \ by an orange disc.\nThe pills are aligned with the different rows and columns\
    \ that make up the maze.\nThe score is displayed in white at the top of the window.\n\
    \nFirst let’s display the pills to collect.\n\nPlease add the following code outside\
    \ of any method or class:\n\n```\ndots = []\ndef init_dots():\n    global dots\n\
    \    dots = []\n    for i in range(0,4):\n        for j in range (0,6):\n    \
    \        dots.append (pygame.Rect(65+j*(WALL_INDENT),\n            60+i*WALL_INDENT,\
    \ ennemy_size, ennemy_size))\ninit_dots()\n```\n\nIn the previous code:\n\nWe\
    \ define a list called dots that will hold all the dots displayed onscreen; using\
    \ a list here will make it much easier to manage, to display, and to remove the\
    \ dots as the game unfolds.\nWe then create a method called\nWithin this method,\
    \ we refer to a global variable called dots that we have defined earlier on."
  merge: -1
  pgno: 139
- img_proc: true
  md: "We then use two nested loops; the first loop that uses the variable i is employed\
    \ for each row of dots, while the second loop, that uses the variable is employed\
    \ for each dot (i.e., column) within a row.\nAfter defining these two loops, we\
    \ use the variables i and which loop respectively up to 3 and 5 to add a new item\
    \ to the list. Each of these items is a rectangle that will be used, amongst other\
    \ things, to detect collision with the player. The position of each rectangle\
    \ is defined by an initial position for the first item the variable WALL_INDENT\
    \ (the space between each row) and the size of the NPCs (we could have used a\
    \ different size, and we use this size for consistency across all the items displayed\
    \ onscreen).\nFinally, we call the method that we have just created. Having the\
    \ code within a method will make it possible to, if need be, re-initialize the\
    \ position of each pill, later (especially if the level has to be re-initialized).\n\
    \nNext, we need to display these dots and this will be done by looping through\
    \ the list dots and by drawing a circle at the position defined for each dot.\n\
    \nPlease add the following code to the method called window before the code\n\n\
    ```\nfor dot in dots:\n    pygame.draw.circle(WIN, \"Orange\", (dot.x+ennemy_size/2,\n\
