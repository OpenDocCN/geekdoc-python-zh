  md: '# Moving the npc using the arrow keys


    In this section we will start to learn to create a player character that can move
    in all directions based on the keys pressed by the player. Initially this player
    character will be represented by a red square; however in the subsequent sections
    this red square will be replaced by an animated character. The player character
    will be able to move in all four directions (i.e., left right up and down). The
    way we will achieve this will consist of the following steps:


    First, we will load the different pictures that are necessary to create the animation.

    Then we''ll create animations based on these pictures.

    As the screen is refreshed, we will change the image of the animation to give
    the illusion of an animation.

    Once this is done, we will start to apply this information to different directions
    so we will first detect what key has been pressed by the player (left right up
    or down) and then move the main character in the corresponding direction.


    The animation that will be used for the character will be the same all the time
    and it will be rotated depending on the direction in which the player is going;
    so for example we will use the animation of the character moving to the right
    whenever it''s moving right; however if you use the left arrow key we can use
    the same animation clip but flipped around the vertical axis so that this animation
    is now to the left. To go up and down, it will be the exact same except that the
    initial animation that was going to the right will be rotated so that the character
    is now facing up, and again if we if we go down, we will be by rotating this image
    so that it is facing down.'
