    \ called `init_dots`.\nWithin this method, we refer to a global variable called\
    \ `dots` that we have defined earlier on.\n\nWe then use two nested loops; the\
    \ first loop that uses the variable `i` is employed for each row of dots, while\
    \ the second loop, that uses the variable `j` is employed for each dot (i.e.,\
