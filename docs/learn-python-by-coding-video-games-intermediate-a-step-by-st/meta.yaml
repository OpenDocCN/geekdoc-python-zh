    ## Preface


    This book will show you how you can very quickly code in Python and create games.


    Python is a powerful programming language used in a wide range of industries and
    that you can use even if you have (or you are teaching with) computers with very
    low technical specifications.


    This book series entitled Learn Python By Coding Games allows you to play around
    with Python’s core features, and essentially those that will make it possible
    to create interesting 2D games rapidly. After reading this book series, you should
    find it easier to code in Python and to create simple yet entertaining video games.


    This book series assumes no prior knowledge on the part of the reader, and it
    will get you started on Python so that you quickly master all the wonderful features
    that this programming language provides by going through an easy learning curve.


    By completing each chapter, and by following step-by-step instructions, you will
    progressively improve your skills, become more proficient in Python, and create
    several games.


    In addition to becoming proficient with Python, you will also create games that
    include many of the common techniques found in video games such as: level design,
    object creation, textures, collision detection, lights, weapon creation, character
    animations, particles, artificial intelligence, and menus.


    You will learn how to create customized menus and simple user interfaces using
    both Python and Pygame and animate and give artificial intelligence to Non-Player
    Characters (NPCs) that will be able to follow the player character using pathfinding.


    Finally, you will also get to export your game at the different stages of the
    books, so that you can share it with friends and obtain some feedback as well.'
