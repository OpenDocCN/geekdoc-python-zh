    \ so, in this section we will detect collision between the player and the NPCs,\
    \ and, in case of a collision, we will restart the level, add all the initial\
    \ dots, remove all the NPCs, and also reset the score.\n\nPlease add the following\
    \ function, outside of any method or class:\n\n```\ndef restart_level():\n   \
    \ global score, inventory, npcs\n    init_dots()\n    score = 0\n    npcs = []\n\
    \    inventory.set_ammo(inventory.WEAPON_TYPE_GUN,10)\n    inventory.set_ammo(inventory.WEAPON_TYPE_AUTO_GUN,10)\n\
    \    inventory.set_ammo(inventory.WEAPON_TYPE_GRENADE,10)\n```\n\nIn the previous\
    \ code:\n\nWe define a new method called restart_level that will be called every\
    \ time the player character has collided with an NPC.\nWithin the method, we refer\
    \ to the global variables inventory and\nWe call the method init_dots that will\
    \ add all the dots to the level.\n\nWe initialise the variables score and So,\
