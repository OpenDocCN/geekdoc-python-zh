    As its, our player character can collect ammunitions and shoot at the NPCs; while
    this is a great feature, it would be good for the player character to be able
    to collect other items (e.g., pills, like in pacman) and to increase the score
    accordingly.


    So, in this section, we will:


    +   - Define the location of each pill.

    - Display these pills using loops accordingly.

    - Detect collision between the player character and the pills.

    - Remove the pills when they have been collected.

    - Display the score and play a sound effect when a pill has been collected.


    So first, let’s define and display the pills; the layout that we want to obtain
    with the pills is illustrated in the next figure.


    ![](img/57971d42f58afa7cf82796475efe9a1c_138_0.png)


    As you can see in the previous figure:'
