- md: '## Content Covered by this Book


    [Chapter 1: Starting with Our Shooter](https://example.com) explains how you can
    create and move a 2D character; it also shows you how you can add a weapon (a
    gun) so that the player character can shoot. Finally, this chapter will also show
    you can create a class for the bullet, to keep their management smooth and


    [Chapter 2: Creating an](https://example.com) explains how you can create an inventory
    for the weapons that the player character owns. It shows you how you can combine
    classes and lists so that the player can switch between weapons and collect and
    manage ammunitions.


    [Chapter 3: Adding Collisions and Artificial](https://example.com) shows you how
    you can add challenge to your game by introducing NPCs that can patrol, but also
    detect the player character through sight and hearing.


    [Chapter 4: Creating a Finite State](https://example.com) gets you to create a
    finite-state machine for the NPC so that it is easier to manage NPC behaviours.
    You will also learn how to manage transitions between each state and how to instantiate
    and spawn NPCs at regular intervals.


    [Chapter 5: Polishing our](https://example.com) provides explanations about how
    to Improve our game; it shows you how to change the appearance of the NPCs, to
    display the score, to detect collision between the player and the NPC and how
    to add sound effects.


    [Chapter 6: Frequently Asked Questions](https://example.com) provides to Frequently
    Asked Questions (FAQs) related to the topics covered in this book (e.g., scripting,
    audio, interaction, AI, or user interface). It also provides links to additional
    exclusive video tutorials that can help you with some of your questions.


    ## What you Need to Use this Book


    To complete the project presented in this book, you only need to install Python
    and Pygame.


    In terms of computer skills, all the knowledge introduced in this book will assume
    no prior programming experience from the reader. So for now, you only need to
    be able to perform common computer tasks such as downloading files, opening and
    saving files, be comfortable with dragging and dropping items, and typing.


    ## Who this book is for


    If you can answer yes to all these questions, then this book is for you:


    - Would you like to learn Python?

    - Would you like to become proficient in the core functionalities offered by Python
    and Pygame?

    - Would you like to teach yourself, your students or your child how to create
    games, using programming?

    - Would you like to start creating entertaining 2D games?

    - Although you may have had some prior exposure to Python or Pygame, would you
    like to delve more into these topics and understand the core functionalities in
    more detail?


    ## Who this book is not for


    If you can answer yes to all these questions, then this book is <u>not</u> for
    you:


    - Can you already code with Python to implement advanced features or behaviors?

    - Can you already easily code a shooter game with Pygame and Python?

    - Are you looking for a reference book on Python?

    - Are you an experienced (or at least advanced) Python user?


    If you can answer yes to all four questions, you may instead look for the next
    books in the series. To see the content and topics covered by these books, you
    can check the official website


    ## How you will learn from this book


    Because all students learn differently and have different expectations of a course,
    this book is designed to ensure that all readers find a learning structure that
    suits them. Therefore, it includes the following:


    A list of the learning objectives at the start of each chapter so that readers
    have a snapshot of the skills that will be covered.

    Each section includes an overview of the activities covered.

    Many of the activities are step-by-step, and learners are also allowed to engage
    in deeper learning and problem-solving skills through the challenges offered at
    the end of each chapter.

    Each chapter ends up with a quiz and challenges through which you can put your
    skills (and knowledge acquired) into practice and see how much you know. Challenges
    consist in coding, debugging, or creating new features based on the knowledge
    that you have acquired in the chapter.

    The book focuses on the core skills that you need. Some sections also go into
    more detail. However, once concepts have been explained, links are provided to
    additional resources, where necessary.

    The code is introduced progressively and is explained in detail.


    ## Format of Each Chapter and Writing Conventions


    Throughout this book, and to make reading and learning easier, text formatting
    and icons will be used to highlight parts of the information provided and to make
    it more readable.


    ## Special Notes


    Each chapter includes resource sections so that you can further your understanding
    and mastery of Python. These include:


    A quiz for each chapter: these quizzes usually include 10 questions that test
    your knowledge of the topics covered throughout the chapter. The solutions are
    provided on the companion website.

    A checklist: it consists of between 5 and 10 key concepts and skills that you
    need to be comfortable with before progressing to the next chapter.

    Challenges: each chapter includes a challenge section where you are asked to combine
    your skills to solve a particular problem.


