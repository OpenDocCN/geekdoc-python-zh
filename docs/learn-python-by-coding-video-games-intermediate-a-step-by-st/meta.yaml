  md: '# Creating a weapon for the player character


    While the previous section focused on creating and moving a 2D player character,
    this section will focus on adding a weapon to the player character and using it.

    This will consist in:


    +   - Detecting when the user presses the SPACE bar

    - Creating a bullet that moves towards where the player character is looking.

    - Move the bullet across the screen.


    So the first phase will be dedicated to creating a gun that will be firing bullets
    at regular intervals.


    We will detect whether the player has pressed the SPACE bar.

    When this is the case, we will create a bullet.

    This bullet will be created from a class called Bullet and added to an array of
    bullets.

    This bullet will be propelled (i.e., moving) in the direction where the player
    is looking.

