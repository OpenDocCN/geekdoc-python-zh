    of and display the score on screen.


    Please open the script.

    Add the following code in the method called window before the code "pygame.display.update()":


    ```

    score_to_display = " Score " + str (score)

    info = info_user_font.render(score_to_display,1,"WHITE")

    WIN.blit(info,(400,10))

    ```


    In the previous code:


    We declare the variable it includes a message that is made of the string “Score
    ” followed by the value of the actual score.

    We then render this message in white.

    We finally display the rendered text at the top of the screen.


