    the score is displayed at the top of the window and that its value is updated
    as you collect more dots, as illustrated in the next figure.'
- md: "## Detecting collision with the npcs\n\nWhile our player character can move\
    \ around the maze and collect items, it would be good to detect when s/he has\
    \ collided with the NPCs so that the level can be restarted accordingly; so, in\
    \ this section we will detect collision between the player and the NPCs, and,\
    \ in case of a collision, we will restart the level, add all the initial dots,\
    \ remove all the NPCs, and also reset the score.\n\nPlease add the following function,\
    \ outside of any method or class:\n\n```python\ndef restart_level():\n    global\
    \ score, inventory, npcs\n    init_dots()\n    score = 0\n    npcs = []\n    inventory.set_ammo(inventory.WEAPON_TYPE_GUN,10)\n\
    \    inventory.set_ammo(inventory.WEAPON_TYPE_AUTO_GUN,10)\n    inventory.set_ammo(inventory.WEAPON_TYPE_GRENADE,10)\n\
    ```\n\nIn the previous code:\n\nWe define a new method called restart_level that\
    \ will be called every time the player character has collided with an NPC.\nWithin\
    \ the method, we refer to the global variables inventory and\nWe call the method\
    \ init_dots that will add all the dots to the level.\n\nWe initialise the variables\
    \ score and So, at this stage, the list npcs is empty.\nWe then add ammunitions\
    \ for each of the weapons owned by the player.\n\nSince the method set_ammo has\
    \ not been defined yet, we need to do so; please add the following method to the\
    \ class\n\n```python\ndef set_ammo(self, type_of_ammo, value):\n    self.weapons[type_of_ammo].ammunitions\
    \ = value\n```\n\nLast but not least, we need to detect collision between the\
    \ player and the NPCs, so please add the following code to the method check_collision_with_player\
    \ (at the end of the method).\n\n```python\nfor npc in npcs:\n    if (player_collision_rect.colliderect(npc.collision_rect)):\n\
    \        restart_level()\n```\n\nIn the previous code, we go through all the NPCs\
    \ present in the level, and we check whether they collide with the player; in\
    \ that case, we call the method restart_level that we have just defined.\n\nFinally,\
    \ we will also change the default state for each NPC to please amend the following\
    \ code (new code in bold):\n\n```python\nclass NPC:\n    def __init__(self, x,\
    \ y, color):\n        self.x = x\n        self.y = y\n        self.color = color\n\
    \        self.health = 100\n        self.collision_rect = pygame.Rect(self.x,self.y,\
    \ 25, 25)\n\n        self.state = constants.STATE_FOLLOW_PLAYER\n        self.can_hear_player\
    \ = False\n        self.can_see_player = False\n```\n\nYou can now save and compile\
