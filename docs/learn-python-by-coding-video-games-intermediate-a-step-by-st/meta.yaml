    - TRUE\n- TRUE\n- FALSE (since at least one of the conditions is true, it will\
    \ display True)\n- FALSE (since at least one of the conditions is false, it will\
    \ display False)\n\n## Challenge 1\n\nNow that you have managed to complete this\
    \ chapter and that you have improved your skills, let’s put these to the test.\n\
    \n- Change the color of the newly instantiated NPCs.\n- Set the default/initial\
    \ state to patrol for all NPCs.\n- Change the speed of the NPCs.\n\n## Chapter\
    \ 5: Polishing our game\n\nIn this section, we will start to polish-up our game\
    \ by adding more features.\nAfter completing this chapter, you will be able to:\n\
    \n- Use pictures for the NPC.\n- Use loops to draw several items on screen.\n\
    - Add and play sound effects.\n- Include additional behaviours for the NPCs.\n\
    \n## Changing the appearance of the enemies\n\nIn this section, we will change\
    \ the appearance of the NPCs by replacing the square used so far to represent\
    \ them with an actual image of a ghost.\n\nPlease open your script.\nAdd the following\
    \ code outside of any method or class after the code `=`:\n\n```python\nnpc_img\
    \ = pygame.image.load(\"assets/npc_blue.jpg\")\nnpc_img = pygame.transform.scale(npc_img,\n\
    (ennemy_size,ennemy_size))\n```\n\nIn the previous code, we define the variable\
    \ `npc_img` which is linked to the image `npc_blue` that is saved in the folder.\
    \ We then transform this image so that it fits the rectangle used for NPC collision,\
    \ based on the variable `ennemy_size` that we have defined earlier.\n\nPlease\
    \ modify the method `draw` from the class `NPC` as follows (new code in bold):\n\
    \n```python\ndef draw (self):\n    #pygame.draw.rect(WIN,self.color,(self.x,self.y,\
    \ 30, 30))\n    WIN.blit(npc_img,(self.x, self.y))\n    pygame.draw.rect(WIN,\
    \ \"GREEN\", (self.x, self.y-10,\n    self.health*30/100, 10))\n```\n\nIn the\
    \ previous code:\nWe modify the method called `draw` so that it displays an image\
    \ instead of a square.\n\nWe comment the previous code which consisted in displaying\
    \ a square. We then display the image of a blue ghost, based on the variable `npc_img`\
    \ that we have defined earlier.\n\nYou can now compile your code. As the game\
    \ starts, you should see that all the NPCs are now displayed as blue ghosts, as\
    \ per the next figure.\n\n![](img/57971d42f58afa7cf82796475efe9a1c_137_0.png)\n\
    \n## Displaying dots\n\nAs is, our player character can collect ammunitions and\
    \ shoot at the NPCs; while this is a great feature, it would be good for the player\
    \ character to be able to collect other items (e.g., pills, like in pacman) and\
    \ to increase the score accordingly.\n\nSo, in this section, we will:\n\n- Define\
    \ the location of each pill.\n- Display these pills using loops accordingly.\n\
    - Detect collision between the player character and the pills.\n- Remove the pills\
    \ when they have been collected.\n- Display the score and play a sound effect\
    \ when a pill has been collected.\n\nSo first, let’s define and display the pills;\
