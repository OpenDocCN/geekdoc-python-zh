- img_proc: true
  md: "Since the method set_ammo has not been defined yet, we need to do so; please\
    \ add the following method to the class\n\n```\ndef set_ammo (self, type_of_ammo,\
    \ value):\n    self.weapons[type_of_ammo].ammunitions = value\n```\n\nLast but\
    \ not least, we need to detect collision between the player and the NPCs, so please\
    \ add the following code to the method check_collision_with_player (at the end\
    \ of the method).\n\n```\nfor npc in npcs:\n    if (player_collision_rect.colliderect(npc.collision_rect)):\n\
    \        restart_level()\n```\n\nIn the previous code, we go through all the NPCs\
    \ present in the level, and we check whether they collide with the player; in\
    \ that case, we call the method restart_level that we have just defined.\n\nFinally,\
    \ we will also change the default state for each NPC to please amend the following\
    \ code (new code in bold):\n\n```\nclass NPC:\n    def __init__(self, x, y, color):\n\
    \        self.x = x\n        self.y = y\n        self.color = color\n        self.health\
    \ = 100\n        self.collision_rect = pygame.Rect(self.x,self.y, 25, 25)\n\n\
    \        self.state = constants.STATE_FOLLOW_PLAYER\n        self.can_hear_player\
    \ = False\n        self.can_see_player = False\n```\n\nYou can now save and compile\
    \ your code; as the game plays, you should see that after colliding with an NPC,\
