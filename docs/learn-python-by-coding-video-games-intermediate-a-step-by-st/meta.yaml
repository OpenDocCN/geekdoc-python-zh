    # Pictures and Audio


    How do I play a sound?


    Initialize the audio mixer.

    Load the sound to be played.

    Play the sound.


    ```

    Example:

    pygame.mixer.init()

    ...

    beeping_snd = pygame.mixer.Sound(''assets/beep.wav'')

    pygame.mixer.Channel(1).play(beeping_snd)

    ```


    How do I load and display an image?


    Load the image by creating a variable that points to the location of that image.

    Display the image using the method called


    ```

    npc_img = pygame.image.load("assets/npc_blue.jpg")

    npc_img = pygame.transform.scale(npc_img,

    (ennemy_size,ennemy_size))

    ...

    WIN.blit(npc_img,(self.x, self.y))

    ```'
