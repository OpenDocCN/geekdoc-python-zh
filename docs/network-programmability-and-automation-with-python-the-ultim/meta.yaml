    \ sending ICMP echo requests (pings) to a range of IP addresses and analyzing\
    \ responses to determine active devices.\n- **SNMP Polling**: SNMP (Simple Network\
    \ Management Protocol) polling involves querying network devices using SNMP to\
    \ retrieve information such as system information, interfaces, and configurations.\n\
    - **LLDP/CDP Discovery**: LLDP (Link Layer Discovery Protocol) and CDP (Cisco\
    \ Discovery Protocol) are network discovery protocols used to discover neighboring\
    \ devices and gather information about device connectivity and capabilities.\n\
    \n## 3. Building and Maintaining Network Device Inventories with Python:\n\nPython\
    \ provides libraries and frameworks for automating device discovery and inventory\
    \ management tasks, such as Scapy, Nmap, Netmiko, and NAPALM. Let's see an example\
    \ of how to use Python to discover network devices and build an inventory:\n\n\
    ```python\nimport nmap\n\ndef discover_devices(subnet):\n    nm = nmap.PortScanner()\n\
    \    nm.scan(hosts=subnet, arguments='-sn')\n    devices = []\n\n    for host\
    \ in nm.all_hosts():\n        device = {\n            'ip_address': host,\n  \
    \          'hostname': nm[host].hostname(),\n            'mac_address': nm[host]['addresses']['mac'],\n\
    \            'vendor': nm[host]['vendor'],\n            'status': nm[host].state(),\n\
    \            'os': nm[host]['osclass'][0]['osfamily'] if 'osclass' in nm[host]\
    \ else None\n        }\n        devices.append(device)\n\n    return devices\n\
    \n# Discover devices in a subnet\nsubnet = '192.168.1.0/24'\ndevices = discover_devices(subnet)\n\
    \n# Print discovered devices\nfor device in devices:\n    print(device)\n```\n\
    \nIn this example, we use the `nmap` library to perform a ping scan (`-sn` option)\
    \ on a specified subnet. We iterate over the scan results, extract relevant information\
    \ about discovered devices (e.g., IP address, hostname, MAC address, vendor, status,\
    \ OS), and build a list of device dictionaries. Finally, we print the information\
    \ for each discovered device.\n\n## 4. Best Practices for Inventory Management:\n\
    \nWhen building and maintaining network device inventories with Python, consider\
    \ the following best practices:\n\n- **Regular Scans:** Perform regular device\
    \ discovery scans to ensure that the inventory is up-to-date and reflects changes\
