    ```\n\nThis code snippet creates two objects (`router1` and `switch1`) of the\
    \ `Device` class and calls the `connect` method on each object.\n\n##### 3. Inheritance:\n\
    \nInheritance is a fundamental concept in object-oriented programming, enabling\
    \ classes to acquire attributes and methods from other classes. In Python, a class\
    \ can inherit from another class by specifying the parent class(es) in parentheses\
    \ after the class name. Here's a demonstration of inheritance in Python:\n\n```python\n\
    class Router(Device):\n    def __init__(self, name, ip_address, model):\n    \
    \    super().__init__(name, ip_address)\n        self.model = model\n\n    def\
    \ display_info(self):\n        print(f\"Router: {self.name}, Model: {self.model}\"\
    )\n\n# Create an object of the Router class\nrouter2 = Router(\"Router2\", \"\
