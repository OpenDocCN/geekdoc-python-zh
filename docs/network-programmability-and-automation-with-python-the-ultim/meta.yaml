    \n```\npip install package_name\n```\n\n将\"package_name\"替换为您要安装的包的名称。\n\n**3.\
    \ 编写您的第一个Python脚本：**\n\n现在您的开发环境已设置好，让我们编写一个简单的Python脚本来开始。在您首选的文本编辑器或IDE中打开一个新文件，并输入以下Python代码：\n\
    \n```python\n# hello_world.py\n\ndef main():\n    print(\"Hello, world!\")\n\n\
