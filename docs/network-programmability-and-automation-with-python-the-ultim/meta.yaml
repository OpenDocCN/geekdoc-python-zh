    \          - ip address 192.168.1.1 255.255.255.0\n          - no shutdown\n```\n\
    \n在这个示例中，我们使用一个用 YAML 编写的 Ansible playbook 来定义网络设备的配置任务。我们使用 Ansible 提供的 `ios_config`\
