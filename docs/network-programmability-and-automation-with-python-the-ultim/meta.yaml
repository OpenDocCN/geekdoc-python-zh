    \n#### 1. 列表：\n\n列表是项目的有序集合，可以包含不同的数据类型，如整数、浮点数、字符串，甚至是其他列表。列表是可变的，这意味着你可以在创建后修改其元素。以下是如何在\
    \ Python 中定义和使用列表：\n\n```python\n# 定义一个整数列表\nnumbers = [1, 2, 3, 4, 5]\n\n# 定义一个字符串列表\n\
    fruits = ['apple', 'banana', 'orange']\n\n# 向列表添加一个项目\nfruits.append('grape')\n\
    \n# 通过索引访问项目\nprint(numbers[0]) # 输出：1\n\n# 修改列表中的项目\nfruits[0] = 'cherry'\n\n\
    # 从列表中移除一个项目\nfruits.remove('banana')\n\n# 遍历列表\nfor fruit in fruits:\n    print(fruit)\n\
    ```\n\n列表在网络可编程性和自动化中常用于存储设备名称、IP 地址或配置参数等数据。\n\n#### 2. 元组：\n\n元组与列表类似，但不可变，这意味着其元素在创建后无法修改。元组使用圆括号而不是方括号定义。以下是如何在\
    \ Python 中使用元组：\n\n```python\n# 定义一个整数元组\ncoordinates = (1, 2)\n\n# 定义一个混合数据类型的元组\n\
    person = ('John', 30, 'Male')\n\n# 通过索引访问项目\nprint(coordinates[0]) # 输出：1\n\n\
    # 解包元组\nname, age, gender = person\nprint(name) # 输出：John\nprint(age) # 输出：30\n\
    print(gender) # 输出：Male\n```\n\n元组通常用于表示固定的相关数据集合，如坐标或用户信息。\n\n#### 3. 字典：\n\n\
    字典是由键及其对应值组成的无序对集合。字典是可变的，可以包含不同数据类型的键。以下是如何在 Python 中定义和使用字典：\n\n```python\n\
    # 定义一个设备信息字典\ndevice = {\n    'name': 'router1',\n    'ip_address': '192.168.1.1',\n\
