    \n```python\nfrom netmiko import ConnectHandler\nimport paramiko\n\ndef connect_to_device(device_params):\n\
    \    try:\n        ssh_session = ConnectHandler(**device_params)\n        return\
    \ ssh_session\n    except (paramiko.ssh_exception.AuthenticationException, paramiko.ssh_exception.SSHException)\
