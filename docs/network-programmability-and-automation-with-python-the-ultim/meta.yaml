    )\nelif x < 0:\n    print(\"Negative\")\nelse:\n    print(\"Zero\")\n```\n\n-\
    \ **循环：** 循环用于遍历一系列元素并重复执行一段代码。Python支持两种类型的循环：`for`循环和`while`循环。\n\n```python\n\
    # Iterate over a list using a for loop\nnumbers = [1, 2, 3, 4, 5]\n\nfor num in\
