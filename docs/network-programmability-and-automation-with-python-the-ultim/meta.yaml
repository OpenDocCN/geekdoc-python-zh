    \    'InstanceType': 't2.micro',\n    'KeyName': 'YOUR_KEY_PAIR',\n    'SecurityGroupIds':\
    \ ['sg-12345678'],\n    'SubnetId': 'subnet-12345678'\n}\n\n# Provision EC2 instance\n\
    response = ec2.run_instances(**instance_params)\n\n# Extract instance ID\ninstance_id\
    \ = response['Instances'][0]['InstanceId']\n\nprint(\"Instance provisioned with\
    \ ID:\", instance_id)\n```\n\nIn this example, Python uses the `boto3` library\
    \ to interact with the AWS API and provision an EC2 (Elastic Compute Cloud) instance.\
