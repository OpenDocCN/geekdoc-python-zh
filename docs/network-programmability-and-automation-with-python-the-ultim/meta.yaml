    \ 2960\")\n\n# Call methods on the Switch object\nswitch2.connect()\nswitch2.configure(\"\
    interface GigabitEthernet0/1\\nswitchport mode access\\n\")\n```\n\nIn this example,\
    \ we define a subclass `Switch` that encapsulates a private attribute `_model`\
    \ and a private method `_validate_config`. The `configure` method is a public\
    \ interface for applying configuration to the switch, which internally validates\
    \ the configuration using the private method `_validate_config`.\n\n##### 5. Polymorphism:\n\
    \nPolymorphism is the ability of a single interface (method) to operate on objects\
