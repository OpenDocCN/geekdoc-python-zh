    exceptions (`Exception`) whenever possible, as it may mask unexpected errors.


    +   - **Provide Informative Error Messages**: Include informative error messages
    that describe the nature of the error, its cause, and any relevant context or
    details that can help diagnose and resolve the issue.


    +   - **Use Different Logging Levels**: Use different logging levels (e.g., `DEBUG`,
    `INFO`, `WARNING`, `ERROR`, `CRITICAL`) to differentiate between different types
    of log messages and prioritize critical information.


    +   - **Include Timestamps**: Include timestamps in log messages to provide chronological
    context and facilitate analysis of script execution and event sequences.


