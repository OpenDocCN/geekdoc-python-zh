    \n这些运算符常用于网络自动化脚本中，以执行计算、比较值并根据条件做出决策。\n\n### 2. 控制流：\n\nPython中的控制流语句允许开发者控制程序中指令的执行顺序。常见的控制流语句包括if/else语句和循环。\n\
    \n- **If/Else语句：** If/else语句用于根据特定条件有条件地执行代码块。例如：\n\n```python\n# Check if a number\
