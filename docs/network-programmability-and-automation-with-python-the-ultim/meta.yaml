    # Float variable\npi = 3.14\n\n# String variable\nname = 'John'\n\n# List variable\n\
    numbers = [1, 2, 3, 4, 5]\n\n# Dictionary variable\nperson = {'name': 'John',\
    \ 'age': 30}\n\n# Accessing variables\nprint(age)    # Output: 30\nprint(pi) \
