    In this example, the administrator must enter each VLAN configuration command
    manually, increasing the risk of typographical errors or misconfigurations.


    # **Scalability Issues:**


    Manual network management also presents challenges in terms of scalability. As
    networks grow larger and more complex, the manual provisioning and configuration
    of network devices become increasingly time-consuming and resource-intensive.
    Scaling a network to accommodate growth or changes in business requirements requires
    significant effort and coordination, often resulting in delays and operational
    inefficiencies.


    Let''s consider an example of adding a new subnet to a network manually:


    ```

    python

    # Manually configuring a new subnet on a router

    router(config)# interface GigabitEthernet0/1

    router(config-if)# ip address 192.168.2.1 255.255.255.0

    router(config-if)# no shutdown

    ```


    In this example, the administrator must manually configure the interface and IP
    address for the new subnet on the router, a process that becomes increasingly
    cumbersome as the network grows.


    # **Operational Inefficiencies:**'
