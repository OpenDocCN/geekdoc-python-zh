    \ `devices` 的字典用于存储网络设备的信息。每个设备由一个键（例如 'router1'、'switch1'）表示，对应的值是另一个包含设备属性（如\
    \ IP 地址、供应商、型号和接口）的字典。\n\n该脚本使用 `items()` 方法遍历 `devices` 字典中的每个设备，该方法返回每个设备的键值对。对于每个设备，它打印出其属性，包括\
