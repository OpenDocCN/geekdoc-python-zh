    \ as 3.14, 2.718, etc.\n- **Strings**: Sequences of characters enclosed in single\
    \ or double quotes, such as \"hello\", 'world', etc.\n- **Lists**: Ordered collections\
    \ of items, which can be of different data types, enclosed in square brackets,\
    \ such as [1, 2, 3], ['a', 'b', 'c'], etc.\n- **Tuples**: Similar to lists but\
    \ immutable (cannot be modified), enclosed in parentheses, such as (1, 2, 3),\
    \ ('a', 'b', 'c'), etc.\n- **Dictionaries**: Unordered collections of key-value\
    \ pairs, enclosed in curly braces, such as {'key1': 'value1', 'key2': 'value2'},\
    \ etc.\n- **Sets**: Unordered collections of unique elements, enclosed in curly\
    \ braces, such as {1, 2, 3}, {'a', 'b', 'c'}, etc.\n\n**3. Variables:**\n\nIn\
    \ Python, variables are employed for storing data values. Unlike some other programming\
    \ languages, Python variables are dynamically typed, meaning that you don't need\
