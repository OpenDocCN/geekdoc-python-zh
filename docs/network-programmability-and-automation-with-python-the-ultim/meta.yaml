    \ 'cisco_ios',\n    'host': '192.168.1.1',\n    'username': 'admin',\n    'password':\
    \ 'password',\n}\n\nssh_session = ConnectHandler(**device)\noutput = ssh_session.send_command('show\
    \ ip interface brief')\nprint(output)\n```\n\nUnderstanding these key terms and\
