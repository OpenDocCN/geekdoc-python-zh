    router2.display_info()\n```\n\nIn this example, we define a subclass `Router`\
    \ that inherits from the `Device` class. The `Router` class has an additional\
    \ attribute `model` and a method `display_info` to display router information.\
    \ We use the `super()` function to call the constructor of the parent class (`Device`)\
    \ within the constructor of the `Router` class.\n\n##### 4. Encapsulation:\n\n\
    Encapsulation refers to the packaging of data (attributes) and functions (behaviors)\
    \ that manipulate that data within a unified entity, which is called a class.\
    \ Encapsulation helps to hide the internal implementation details of a class from\
    \ the outside world and allows access to data only through well-defined interfaces\
    \ (methods). In Python, encapsulation can be achieved by using private attributes\
    \ and methods, indicated by a leading underscore (`_`). Here's an example:\n\n\
    ```python\nclass Switch(Device):\n    def __init__(self, name, ip_address, model):\n\
    \        super().__init__(name, ip_address)\n        self._model = model\n\n \
    \   def _validate_config(self, config):\n        # Method to validate configuration\n\
    \        pass\n\n    def configure(self, config):\n        self._validate_config(config)\n\
    \        # Method to apply configuration\n        pass\n\n# Create an object of\
