  md: '# Operators, Control Flow (if/else, loops)


    **Operators and Control Flow in Python:**


    Operators and control flow are essential concepts in Python programming, allowing
    developers to perform computations and control the flow of execution in their
    programs. In this guide, we''ll cover common operators, if/else statements, and
    loops, with a focus on their relevance to network programmability and automation
    tasks.


    **1. Operators:**


    In Python, operators are symbols that execute actions on variables and values.
    Python supports various types of operators, including arithmetic operators, comparison
    operators, logical operators, and bitwise operators. Here''s a concise summary
    of each category:


    +   - **Arithmetic Operators:** Used to perform arithmetic operations such as
    addition, subtraction, multiplication, division, and modulus. Example: `+`, `-`,
    `*`, `/`, `%`.

    - **Comparison Operators:** Used to compare values and return boolean results
    (True or False). Example: `==` (equal), `!=` (not equal), `>`, `<`, `>=`, `<=`.

    - **Logical Operators:** Used to combine multiple conditions and return boolean
    results. Example: `and`, `or`, `not`.

    - **Bitwise Operators:** Used to perform bitwise operations on integers. Example:
    `&` (bitwise AND), `|` (bitwise OR), `^` (bitwise XOR), `~` (bitwise NOT), `<<`
    (left shift), `>>` (right shift).'
