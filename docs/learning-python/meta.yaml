    ## 8.2.3 Counting Occurrences with count()


    In the previous sections we have seen a variety of functions for searching substrings
    within strings. While the `startswith()` and `endswith()` functions return a Boolean
    value, the `find()`, `rfind()`, `index()` and `rindex()` functions return integers
    identifying indices.


    In this section, we will examine the `count()` function that counts the number
    of occurrences of a substring within a string and returns the count.


    Complete syntax:


    ```

    str.count(substring[,start[,end]])

    ```


    Forms:


    ```

    1. str.count(substring)

    2. str.count(substring, start)

    3. str.count(substring, start, end)

    ```


    **Form #1:** `str.count(substring)`

    This function returns the total number of times the substring `substring` is present
    in the string `str`:


    ```

    >>> "abcdabadac".count("ab")

    2

    ```


    **Form #2:** `str.count(substring, start)`

    This function returns the total number of times the substring `substring` is present
    in the string `str` starting from index `start`:


    ```

    >>> "abcdabadac".count("ab", 1)

    1

    ```


    **Form #3:** `str.count(substring, start, end)`

    This function returns the total number of times the substring `substring` is present
    in the string `str` starting from index `start` and ending at index `end` (excluding
    `end`):


    ```

    >>> "abcdabadac".count("ab", 0, 3)

    1

    ```


    ## 8.3 Splitting Strings


    Since strings can contain a large amount of data, data is generally stored as
    strings with separators. This makes it a common requirement to split the string
    at the separator to extract the pieces of data. There are also applications where
    we need to extract the part before and after a separator in a string. One more
    common application in this context is storage of multi-line data and extraction
    of lines - since lines are separated by the newline character, multiple lines
    of data can be stored in a single string, separated by the newline character.
    If need be, we should be able to extract the individual lines from such a string.
    This section concentrates on these kinds of requirements.


    We will specifically see the following:


    - 1. How to extract the part before and after a separator using `partition()`
    and `rpartition()`

    - 2. How to split a string at a separator and extract all split parts of data
    using `split()` and `rsplit()`

    - 3. How to extract the individual lines from a multi-line string using `splitlines()`


    ### 8.3.1 Splitting Strings Using partition() and rpartition()


    The `partition()` and `rpartition()` functions allow extraction of the part before
    a separator, the separator itself and the part after a separator in a string.
    The difference is that `partition()` searches for the first (leftmost) occurrence
    of the separator while `rpartition()` searches for the last (rightmost) occurrence
    of the separator in the string.


    #### 8.3.1.1 The partition() Function


    Syntax:


    ```

    str.partition(separator)

    ```


    The `partition()` function searches for the first (leftmost) occurrence of a separator
    within a string and returns a tuple containing 3 parts: the part before the separator,
    the separator itself and the part after the separator. In case the separator was
    not found in the string, it will still return a tuple containing 3 parts: the
    entire string followed by 2 null strings.


    ```

    >>> "India:New Delhi".partition(":")

    (''India'', '':'', ''New Delhi'')

    ```


    In the above example, the string is partitioned at ":", giving rise to "India"
    as the part before the ":", the ":" separator itself and "New Delhi" as the part
    after the ":".


    ```

    >>> "India:New Delhi China:Beijing".partition(":")

    (''India'', '':'', ''New Delhi China:Beijing'')

    ```


    In the above example, the string is partitioned at the first ":" with "New Delhi
    China:Beijing" being the part after the first ":".


    ```

    >>> "India:New Delhi".partition("-")

    (''India:New Delhi'', '''', '''')

    ```


    In this example, since the separator "-" was not found in the string, the entire
    string is the first element of the tuple and the remainder elements are null strings.


    #### 8.3.1.2 The rpartition() Function


    Syntax:


    ```

    str.rpartition(separator)

    ```


    The `rpartition()` function searches for the last (rightmost) occurrence of a
    separator within a string and returns a tuple containing 3 parts: the part before
    the separator, the separator itself and the part after the separator. In case
    the separator was not found in the string, it will still return a tuple containing
    3 parts: 2 null strings followed by the entire string.


    Here are the same examples we had used for `partition()`:


    ```

    >>> "India:New Delhi".rpartition(":")

    (''India'', '':'', ''New Delhi'')

    >>> "India:New Delhi China:Beijing".rpartition(":")

    (''India:New Delhi China'', '':'', ''Beijing'')

    >>> "India:New Delhi".rpartition("-")

    ('''', '''', ''India:New Delhi'')

    ```


    ### 8.3.2 Splitting Strings Using split() and rsplit()


    The `partition()` and `rpartition()` functions make sense when we expect a single
    delimiter, or want to process the delimiters one at a time. The `split()` and
    `rsplit()` functions can work with multiple occurrences of delimiters and can
    give all the split parts between the delimiters.


    #### 8.3.2.1 The split() Function


    Complete syntax:


    ```

    str.split([,separator[,maxsplits]])

    ```'
