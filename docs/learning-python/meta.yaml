    # SUMMARY


    +   - Text files are human readable whereas binary files require custom applications
    to read the render their contents.

    - The open() function opens the specified file in the specified mode (read mode
    by default) and returns a file object on success. This file object can then be
    used to interact with the file contents.

    - When done with interacting with a file contents, the file object can be used
    to invoke the close() method to close the connection with the file. Doing so is
    optional and all open files are eventually closed when the script ends or when
    the file object is no longer in use by the program, but explicitly closing files
    when they are no longer needed can prove efficient in certain situations.

    - The read() method can be used to read any number of bytes from a file.

    - The readlines() method can be used to read the entire file as a list of lines.

    - The readline() method can be used to read a single line at a time. The same
    effect can be achieved using a for loop to iterate over the file object.

    - The write() method can be used to write a string to a file.

    - The seek() method can be used to seek to any position within a file, specified
    as an offset relative to a chosen reference point.

    - The tell() method can be used to determine the current position within the file.'
