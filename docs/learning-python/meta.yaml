    # SUMMARY


    +   > A module makes its contents reusable for other programs.

    > No special step is needed to convert a Python script into a module!

    > Each module has a symbol table of its own to maintain its identifiers. The import
    statement helps transfer symbols into the current namespace.

    > Modules get executed when imported for the first time! The special symbol __name__
    will contain the module name when executed due to an import, and will have the
    value "__main__" instead when being executed as a script.

    > The dir() function can be used to list out any namespace content.

    > A package is a logical collection of modules and is physically a directory.
    A sub-package is similarly a package within a package, stored as a sub-directory.

    > A directory is considered to be a package only if it contains the file __init__.py,
    which is executed when the package is loaded for the first time.

    > The environment variable PYTHONPATH and the Python variable sys.path can be
    used to specify where to locate packages and modules.


