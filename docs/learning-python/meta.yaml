    The `&` operator plays the same role as `set.intersection(s)`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1 & S2

    {2}

    >>> S1

    {1, 2}

    ```


    We can directly find the intersection of set literals as follows:


    ```

    >>> {1,2}.intersection({2,3})

    {2}

    >>> {1,2} & {2,3}

    {2}

    ```


    It is also possible to find the intersection of multiple sets by passing multiple
    arguments to `intersection()` or using the `&` operator multiple times as follows:


    ```

    >>> {1,2,3}.intersection({2,3,4},{1,3,5})

    {3}

    >>> {1,2,3} & {2,3,4} & {1,3,5}

    {3}

    ```


    The `set.intersection_update(s)` function also finds the intersection, but stores
    it back into the original set `set`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1.intersection_update(S2)

    >>> S1

    {2}

    ```'
