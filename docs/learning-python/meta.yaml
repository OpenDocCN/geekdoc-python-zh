- md: "## 3.3.9 More Programs on Loops\n\nLet's write a Python program that accepts\
    \ a number and prints the sum of its digits. Thus, given a number 789, the output\
    \ should be 24 (7+8+9). While there are many different ways of achieving this\
    \ in Python, let's do it this way: in a loop we keep extracting the unit's place\
    \ of the number `n` (by using the value of the expression `n%10`) while reducing\
    \ the number to eliminate the unit's place (by using the expression `n//10`).\
    \ The loop will run as many times as the number of digits in it (till `n==0`).\
    \ Add each digit to a variable `sum` and finally print `sum` outside the loop.\n\
    \n```\nsum_digits.py\n\n1.  #!/usr/bin/python\n2.  \n3.  # Program to print the\
    \ sum of digits of a given number\n4.  \n5.  n=int(input(\"Enter an integer: \"\
    ))\n6.  sum=0\n7.  \n8.  while n>0:\n9.      digit=n%10\n10.     sum+=digit\n\
    11.     n//=10\n12. \n13. print(\"The sum is\",sum)\n```\n\n# Output:\n\n```\n\
    Enter an integer: 789\nThe sum is 24\n```\n\n## 3. Python Control Structures\n\
    \nObservation:\n\n- 1. In line 11, we use the // operator to perform integer division.\
    \ Furthermore, //= will integer divide the LHS by the RHS and store the result\
    \ in the LHS.\n- 2. The program works even for the special case where 0 is the\
    \ input. The loop body will not get executed and sum will be printed directly\
    \ (and sum is initialized to 0).\n\nWe can use the digit splitting logic to reverse\
    \ a number!\n\nnum_reverse.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # Program\
    \ to print the reverse of a given number\n4.  \n5.  n=int(input(\"Enter an integer:\
    \ \"))\n6.  reverse=0\n7.  \n8.  while n>0:\n9.      digit = n%10\n10.     reverse\
    \ = reverse*10 + digit\n11.     n//=10\n12. \n13. print(\"The reverse is\",reverse)\n\
    ```\n\nOutput:\n\n```\nEnter an integer: 789\nThe reverse is 987\n```\n\nObservation:\n\
    \n- 1. This program is based on sum_digits.py, with sum replaced by reverse and\
    \ a change in line 10.\n- 2. As an example, the reverse of the number 789 can\
    \ be mathematically obtained as ((9*10)+8) *10+7. That is the logic used in line\
    \ 10.\n\nHow about using the previous program to determine whether a number is\
    \ a palindrome or not? A palindrome number will be equal to its reverse!\n\n#\
    \ palindrome.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # Program to determine\
    \ if a given number\n4.  # is a palindrome or not.\n5.  \n6.  n=int(input(\"Enter\
    \ an integer: \"))\n7.  num=n\n8.  reverse=0\n9.  \n10. while n>0:\n11.     digit\
    \ = n%10\n12.     reverse = reverse*10 + digit\n13.     n//=10\n14. \n15. if num==reverse:\
    \ print(\"The number is a palindrome\")\n16. else: print(\"The number is not a\
    \ palindrome\")\n```\n\n# Output:\n\n```\nEnter an integer: 789\nThe number is\
    \ not a palindrome\n```\n\n```\nEnter an integer: 1221\nThe number is a palindrome\n\
    ```\n\nAs a final example, let's write a program that will print all 3-digit Armstrong\
    \ numbers вАУ numbers which are equal to the sum of the cubes of its digits. For\
    \ example, 153=1+125+27.\n\n## 3. Python Control Structures\n\n85\n\narmstrong.py\n\
    \n```\n1.  #!/usr/bin/python\n2.  \n3.  # Program to print all 3-digit Armstrong\
    \ numbers\n4.  \n5.  for num in range(100,1000):\n6.      sum=0\n7.      n=num\n\
    8.      while n>0:\n9.          sum += (n%10)**3\n10.         n //= 10\n11. \n\
    12.     if num==sum: print(num)\n```\n\nOutput:\n\n```\n153\n370\n371\n407\n```\n\
    \nObservation:\n\n- 1. We use the `range()` function to generate all 3-digit integers\
    \ вАУ from 100 (inclusive) to 1000 (exclusive) in line 5.\n- 2. We use the same\
    \ logic that we had used in `sum_digits.py` to extract the digits from the number\
    \ and find the sum вАУ except that the sum here is the sum of the cubes of the digits\
    \ rather than the sum of the digits (line 9).\n- 3. We could have directly used\
    \ a formula like `(n//100)**3 + (n//10%10)**3 + (n%10)**3` to find the sum of\
    \ the cubes of the digits of a given number `n`. A loop not only increases the\
    \ readability, but is also general enough to work with any number of digits, if\
    \ required.\n\n## 3.4 Terminating Control\n\nWhile all the previous sections concentrated\
    \ on controlling the flow of control *down* in the program, this section emphasises\
    \ on removing control *away* from a control structure!\n\nWe can remove control\
    \ out of:\n\n- 1. A loop\n- 2. A function\n- 3. A block\n- 4. A script\n\n###\
    \ 3.4.1 Terminating a Loop\n\nSection 3.3.2 already introduced the `break` statement\
    \ for terminating a loop.\n\n### 3.4.2 Terminating a Function\n\nThe `return`\
    \ statement is used to terminate a function and is covered in section 10.8.\n\n\
    ### 3.4.3 Terminating a Block\n\nThe `raise` statement is used to raise an exception\
    \ that has the potential of terminating the following:\n\n- 1. a block\n- 2. a\
    \ function\n- 3. a sequence of function calls\n- 4. a script\n\nThe `raise` statement\
    \ is covered in detail under exception handling (section 13). A form of `raise`\
    \ will nevertheless be covered in the next section, though.\n\n### 3.4.4 Terminating\
    \ a Script\n\nTo terminate an *interactive Python session*, the following functions\
    \ can be called:\n\n- 1. quit()\n- 2. exit()\n\nTo terminate a *script* however,\
    \ it is recommended to use `sys.exit()` as shown below:\n\n```\n>>> import sys\n\
    >>> sys.exit()\n```\n\n## 3. Python Control Structures\n\nObservation:\n\n- 1.\
    \ We need to import the `sys` module that contains the `exit()` function!\n- 2.\
    \ Ideally, we should pass an `exit code` as an argument to `sys.exit()` that can\
    \ tell others the reason for our script's termination! An exit code of `0` is\
    \ assumed to mean a normal, successful termination whereas a non-zero exit code\
    \ is assumed to mean an error or unsuccessful termination! When an argument is\
    \ not passed to `sys.exit()`, it is assumed to mean a normal, successful termination,\
    \ equivalent to `sys.exit(0)`!\n\nAll the approaches above end up terminating\
    \ the script by raising the `SystemExit` exception, technically. This means that\
    \ as a programmer, you could as well terminate your script anytime by executing\
    \ the following statement:\n\n```\n>>> raise SystemExit\n```\n\nNote:\n\n- 1.\
    \ The statement `raise SystemExit` does not require any modules to be imported\
    \ and is technically the way a Python script or interpreter terminates normally\
    \ anyway!\n- 2. The most professional way of terminating a Python script is by\
    \ invoking `sys.exit()`, passing an exit code if non-zero.\n\n## 3.5 Questions\n\
