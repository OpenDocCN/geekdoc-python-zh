    \ 1 | 0 | 0 |\n|---|---|---|---|---|\n| y | 0 | 1 | 1 | 0 |\n| **x ^ y** | 1 |\
    \ 0 | 1 | 0 |\n\n### 20.2.4 жМЙдљНеПЦеПН\n\nжЬАеРОпЉМжМЙдљНеПЦеПНињРзЃЧзђ¶пЉИ~пЉЙеЬ®жАІиі®дЄКз±їдЉЉдЇОйАїиЊСйЭЮињРзЃЧзђ¶пЉИnotпЉЙпЉЪ0 еПШдЄЇ 1пЉМеПНдєЛдЇ¶зДґпЉМе¶ВдЄЛдЊЛжЙАз§ЇпЉЪ\n\
    \n```\n>>> ~x\n-13\n```\n\nдї•дЄЛжШѓдљНзЪДи°®ж†Љи°®з§ЇпЉЪ\n\n| x | 1 | 1 | 0 | 0 |\n|---|---|---|---|---|\n\
    | **~x** | 0 | 0 | 1 | 1 |\n\n> **ж≥®жДПпЉЪ**\nи¶БзРЖиІ£зїУжЮЬзЪДдЇМињЫеИґж®°еЉПдї•еПКзїУжЮЬдЄЇдљХжШѓ -13пЉМйЬАи¶БдЇЖиІ£дЇМињЫеИґи°•з†Бз≥їзїЯпЉМињЩиґЕеЗЇдЇЖжЬђдє¶зЪДиМГеЫіпЉБ"
