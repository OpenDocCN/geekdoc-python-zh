- md: "## 6.10 Exercises\n\n1. Add a considerable huge no. of unique numbers (e.g.\
    \ 10000) in a set and use the 'in' operator to search for an element and note\
    \ the time it takes to fetch. Repeat the above task and use a for loop to iterate\
    \ through the set in search of the element and then compare the time taken in\
    \ both scenarios.\n2. Write a program to convert a list of integers into a list\
    \ of unique integers using sets.\n3. Assume that we have 2 lists, each having\
    \ only IP addresses as its contents. Write a program to determine if the 2 lists\
    \ have the same IP addresses (albeit in different positions) in the most optimal\
    \ manner.\n\n## SUMMARY\n\n- A set is an unordered collection of unique elements\
    \ - elements cannot be added to or deleted from a tuple.\n- A tuple can be simply\
    \ created using {}. Elements of a set cannot be directly accessed as they are\
    \ unordered collections.\n- The len() function gives the number of elements in\
    \ a set.\n- The for loop can be naturally used to iterate through the elements\
    \ of a set.\n- The in and not in operators check for the existence of an element\
    \ in a set.\n- The add() method allows an element to be added to a set and the\
    \ update() method allows a set of elements to be added to a set.\n- The pop()\
    \ method deletes an element from a set and the remove() and discard() methods\
    \ remove a specified element from a set. The clear() method removes all elements\
    \ from a set.\n- The union(), intersection(), difference() and symmetric_difference()\
    \ perform basic set operations.\n- The isdisjoint(), issubset() and issuperset()\
    \ methods are useful Boolean methods.\n\n## 7 DICTIONARIES\n\nIn this chapter\
    \ you will be able to:\n\n- [x] Create a dictionary and access its elements.\n\
    - [x] Iterate through dictionary pairs, keys and values.\n- [x] Check for the\
    \ existence of a particular key in a dictionary and fetch the corresponding value.\n\
    - [x] Add and Delete elements in a dictionary.\n\n## DICTIONARIES\n\nA *dictionary*\
    \ is a collection of key-value pairs subject to the constraint that all the keys\
    \ should be unique.\n\nThe *keys* of a dictionary can be considered to be members\
    \ of a set (and are thus unique), with each key keeping track of a value.\n\n\
    ## 7.1 Creating Dictionaries\n\nJust as how a list object can be created and assigned\
    \ to a variable using the `list()` function, a dictionary object can be created\
    \ and assigned to a variable using the `dict()` function:\n\n```\n>>> D=dict([('apple','red'),('grapes','green')])\n\
    >>> D\n{'grapes': 'green', 'apple': 'red'}\n```\n\n### Observation:\n\n1. A dictionary\
    \ can be created in a variety of ways вАУ the above technique is one way by which\
    \ an *iterable* (where each element of the iterable has 2 elements вАУ a key and\
    \ a value) can be converted into a dictionary.\n2. In the above example, the iterable\
    \ is a *list* and each element of the list is a *tuple* with 2 elements вАУ a key\
    \ and a value.\n3. Since the keys of a dictionary can be considered to be stored\
    \ in a set and sets are unordered collections, even the keys of a dictionary are\
    \ unordered. As can be observed from the output above, the order of the keys is\
    \ not directly under our control.\n\nJust as how `[]` is used to indicate list\
    \ literals, `{}` are used to denote dictionary literals. Recall from section 6.1\
    \ that `{}` are also used to enclose members of a set. How does Python differentiate\
    \ between sets and dictionaries then? Using the fact that a set comprises of multiple\
    \ elements within `{}` separated by commas whereas a dictionary comprises of multiple\
    \ elements within `{}` separated by colons (to separate the key from the value)\
    \ and commas (to separate the pairs).\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> D\n{'grapes': 'green', 'apple': 'red'}\n```\n\nFrom now on, we will stick\
    \ to the `{}` syntax for convenience and brevity.\n\n> **NOTE:**\n\nSince braces\
    \ ({ }) with commas (,) denote sets and braces with colons (:) denote dictionaries,\
    \ the question might arise what does empty braces mean? The answer is that empty\
    \ braces always indicate empty dictionaries and therefore the empty sets have\
    \ to be created only by using `set()`.\n\n## 7.2 Accessing Dictionary Elements\n\
    \nA dictionary can be viewed as a special kind of array whose subscripts are strings\
    \ instead of integers. Such arrays are called *associative arrays*. The same `[]`\
    \ operator that is used to access an element of a list given it's index can be\
    \ used to access a value in a dictionary given it's key:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> D['apple']\n'red'\n>>> D['grapes']\n'green'\n```\n\nAn attempt to access a\
    \ value using a key that does not exist in the dictionary results in a `KeyError`:\n\
    \n```\n>>> D={'apple':'red','grapes':'green'}\n>>> D['mango']\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nKeyError: 'mango'\n\
    ```\n\nNew values can be assigned to existing keys using an assignment as shown\
    \ below. Also, if at the time of assignment the referenced key does not exist,\
    \ it will be created:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n>>> D['grapes']='purple'\n\
    >>> D\n{'grapes': 'purple', 'apple': 'red'}\n>>> D['mango']='yellow'\n>>> D\n\
    {'mango': 'yellow', 'grapes': 'purple', 'apple': 'red'}\n```\n\n## 7.3 Counting\
    \ Dictionary Elements\n\nThe `len()` function can be used to count the number\
    \ of key-value pairs in a dictionary:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> len(D)\n2\n>>> D={'apple':'red'}\n>>> len(D)\n1\n>>> D={}\n>>> len(D)\n0\n\
    ```\n\n## 7.4 Iterating through Dictionary Elements\n\nSince each element in a\
    \ dictionary is a key-value pair, iterating through a dictionary can be of multiple\
    \ forms: iterating through the keys in a dictionary or iterating through the values\
    \ or iterating through the elements (key-value pairs). We will see examples of\
    \ each.\n\n### 7.4.1 Iterating Through the Keys of a Dictionary\n\nThe normal\
    \ `for` loop can be used to iterate through the keys of a dictionary:\n\n```\n\
    >>> D={'apple':'red','grapes':'green'}\n>>> for K in D: print(K)\n...\ngrapes\n\
    apple\n```\n\nThe keys of a dictionary can be explicitly retrieved using the `dict.keys()`\
    \ function, which returns a new view of the keys within the dictionary `dict`\
    \ вАУ which means that if and when the keys of the dictionary `dict` changes, the\
    \ view will also change automatically:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> K=D.keys()\n>>> for i in K: print(i)\n...\ngrapes\napple\n```\n\n### 7.4.2\
    \ Iterating Through the Values of a Dictionary\n\nJust as how `dict.keys()` returns\
    \ a view of all the keys in the dictionary `dict`, `dict.values()` returns a view\
    \ of all the values in the dictionary `dict`:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> V=D.values()\n>>> for i in V: print(i)\n...\ngreen\nred\n```\n\n> **NOTE:**\n\
    The order in which the values are returned is the same as the order in which their\
    \ keys are returned.\n\nOf course, it is also possible to iterate through the\
    \ keys and print out the corresponding values:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> for K in D: print(D[K])\n...\ngreen\nred\n```\n\n### Observation:\n\n1. In\
    \ the above example, we are iterating through the keys of the dictionary `D`.\n\
    2. We are printing `D[K]`, which is the value associated with the key `K` in the\
    \ dictionary `D`.\n\n### 7.4.3 Iterating Through the Key-Value Pairs of a Dictionary\n\
    \nOne way to iterate through the dictionary is to iterate through the keys of\
    \ the dictionary and fetch the corresponding values using the keys. Another method,\
    \ which is more direct, is to iterate through each key-value pair of the dictionary\
    \ using the `dict.items()` function that returns the key-value pairs (each pair\
    \ as a tuple), as shown in the example below:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> for K,V in D.items():\n...     print(K,V)\n...\napple red\ngrapes green\n\
    ```\n\n## 7.5 Searching Elements within Dictionaries\n\n### 7.5.1 Checking for\
    \ the Existence of a Key in a Dictionary\n\nOne of the most efficient operations\
    \ on dictionaries is checking whether a key exists, and extracting the corresponding\
    \ value if the key exists.\n\nThe `in` and `not in` operators can be used to check\
    \ if a key exists in a dictionary:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> 'apple' in D\nTrue\n>>> 'mango' in D\nFalse\n>>> 'mango' not in D\nTrue\n\
    ```\n\n### 7.5.2 Extracting the Value of a Key Using []\n\nGiven a key that exists\
    \ in a dictionary, extracting the corresponding value is a trivial operation,\
    \ and has already been discussed in section 7.2, but is nevertheless presented\
    \ below:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n>>> K='apple'\n>>> V=D[K]\n\
    >>> print(V)\nred\n```\n\n### 7.5.3 Extracting the Value of a Key Using dict.get()\n\
    \nAnother method of extracting the value associated with a key is by using the\
    \ `dict.get(key)` function, which returns the value corresponding to the key `key`\
    \ in the dictionary `dict`, if the key exists, and returns `None` if the key was\
    \ not found. Unlike in the previous method of using `[]`, this function does not\
    \ generate a `KeyError` if the key was not found.\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> D.get('apple')\n'red'\n>>> D.get('mango')\n>>>\n```"
  mdcn: "## 6.10 зїГдє†\n\n1.  еЬ®дЄАдЄ™йЫЖеРИдЄ≠жЈїеК†е§ІйЗПпЉИдЊЛе¶В10000дЄ™пЉЙеФѓдЄАзЪДжХ∞е≠ЧпЉМеєґдљњзФ® `in` ињРзЃЧзђ¶жРЬзіҐдЄАдЄ™еЕГзі†пЉМиЃ∞ељХеЕґиОЈеПЦжЙАйЬАзЪДжЧґйЧігАВйЗНе§НдЄКињ∞дїїеК°пЉМдљЖдљњзФ®\
    \ `for` еЊ™зОѓйБНеОЖйЫЖеРИжЭ•жРЬзіҐиѓ•еЕГзі†пЉМзДґеРОжѓФиЊГдЄ§зІНеЬЇжЩѓдЄЛжЙАиК±иієзЪДжЧґйЧігАВ\n2.  зЉЦеЖЩдЄАдЄ™з®ЛеЇПпЉМдљњзФ®йЫЖеРИе∞ЖжХіжХ∞еИЧи°®иљђжНҐдЄЇеФѓдЄАжХіжХ∞еИЧи°®гАВ\n3.  еБЗиЃЊжИСдїђжЬЙдЄ§дЄ™еИЧи°®пЉМжѓПдЄ™еИЧи°®дїЕеМЕеРЂIPеЬ∞еЭАдљЬдЄЇеЕґеЖЕеЃєгАВзЉЦеЖЩдЄАдЄ™з®ЛеЇПпЉМдї•жЬАдЉШеМЦзЪДжЦєеЉПз°ЃеЃЪињЩдЄ§дЄ™еИЧи°®жШѓеР¶еМЕеРЂзЫЄеРМзЪДIPеЬ∞еЭАпЉИе∞љзЃ°дљНзљЃдЄНеРМпЉЙгАВ\n\
    \n## жАїзїУ\n\n-   йЫЖеРИжШѓеФѓдЄАеЕГзі†зЪДжЧ†еЇПйЫЖеРИ - еЕГзі†дЄНиГљиҐЂжЈїеК†еИ∞еЕГзїДдЄ≠жИЦдїОеЕГзїДдЄ≠еИ†йЩ§гАВ\n-   еЕГзїДеПѓдї•зЃАеНХеЬ∞дљњзФ® `{}` еИЫеїЇгАВйЫЖеРИзЪДеЕГзі†дЄНиГљзЫіжО•иЃњйЧЃпЉМеЫ†дЄЇеЃГдїђжШѓжЧ†еЇПйЫЖеРИгАВ\n\
    -   `len()` еЗљжХ∞зїЩеЗЇйЫЖеРИдЄ≠еЕГзі†зЪДжХ∞йЗПгАВ\n-   `for` еЊ™зОѓеПѓдї•иЗ™зДґеЬ∞зФ®дЇОйБНеОЖйЫЖеРИзЪДеЕГзі†гАВ\n-   `in` еТМ `not in` ињРзЃЧзђ¶зФ®дЇОж£АжЯ•еЕГзі†жШѓеР¶е≠ШеЬ®дЇОйЫЖеРИдЄ≠гАВ\n\
    -   `add()` жЦєж≥ХеЕБиЃЄеРСйЫЖеРИдЄ≠жЈїеК†дЄАдЄ™еЕГзі†пЉМиАМ `update()` жЦєж≥ХеЕБиЃЄеРСйЫЖеРИдЄ≠жЈїеК†дЄАзїДеЕГзі†гАВ\n-   `pop()` жЦєж≥ХдїОйЫЖеРИдЄ≠еИ†йЩ§дЄАдЄ™еЕГзі†пЉМ`remove()`\
    \ еТМ `discard()` жЦєж≥ХдїОйЫЖеРИдЄ≠зІїйЩ§дЄАдЄ™жМЗеЃЪзЪДеЕГзі†гАВ`clear()` жЦєж≥ХзІїйЩ§йЫЖеРИдЄ≠зЪДжЙАжЬЙеЕГзі†гАВ\n-   `union()`гАБ`intersection()`гАБ`difference()`\
    \ еТМ `symmetric_difference()` жЙІи°МеЯЇжЬђзЪДйЫЖеРИжУНдљЬгАВ\n-   `isdisjoint()`гАБ`issubset()` еТМ `issuperset()`\
    \ жЦєж≥ХжШѓжЬЙзФ®зЪДеЄГе∞ФжЦєж≥ХгАВ\n\n## 7 е≠ЧеЕЄ\n\nеЬ®жЬђзЂ†дЄ≠пЉМдљ†е∞ЖиГље§ЯпЉЪ\n\n-   [x] еИЫеїЇдЄАдЄ™е≠ЧеЕЄеєґиЃњйЧЃеЕґеЕГзі†гАВ\n-   [x] йБНеОЖе≠ЧеЕЄзЪДйФЃеАЉеѓєгАБйФЃеТМеАЉгАВ\n\
    -   [x] ж£АжЯ•е≠ЧеЕЄдЄ≠жШѓеР¶е≠ШеЬ®зЙєеЃЪзЪДйФЃеєґиОЈеПЦзЫЄеЇФзЪДеАЉгАВ\n-   [x] еЬ®е≠ЧеЕЄдЄ≠жЈїеК†еТМеИ†йЩ§еЕГзі†гАВ\n\n## е≠ЧеЕЄ\n\n*е≠ЧеЕЄ* жШѓдЄАдЄ™йФЃеАЉеѓєзЪДйЫЖеРИпЉМеЕґзЇ¶жЭЯжЭ°дїґжШѓжЙАжЬЙйФЃењЕй°їжШѓеФѓдЄАзЪДгАВ\n\
    \nе≠ЧеЕЄзЪД *йФЃ* еПѓдї•иҐЂиІЖдЄЇйЫЖеРИзЪДжИРеСШпЉИеЫ†ж≠§жШѓеФѓдЄАзЪДпЉЙпЉМжѓПдЄ™йФЃиЈЯиЄ™дЄАдЄ™еАЉгАВ\n\n## 7.1 еИЫеїЇе≠ЧеЕЄ\n\nж≠£е¶ВеПѓдї•дљњзФ® `list()` еЗљжХ∞еИЫеїЇеИЧи°®еѓєи±°еєґе∞ЖеЕґиµЛеАЉзїЩеПШйЗПдЄАж†ЈпЉМеПѓдї•дљњзФ®\
