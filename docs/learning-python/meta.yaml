    # 12.8.2.2 Stringification


    Since many a times objects are instances of custom user-defined classes that the
    Python interpreter had no idea about before your program could start execution,
    we find it convenient to have a string representation for such objects, especially
    when we want to display objects to the user or log them to a file. We use the
    term "stringification" to describe the conversion of an object to a string, and
    we use the following syntax to perform stringification:


    ```

    str(object)

    ```


    **Note:**


    +   1. This is the constructor of the string class (`str`) that we had discussed
    in section 2.3.4.1.

    2. The above statement does not work directly for user-defined classes, but can
    be made possible using the concept explained below.


    Any attempt to stringify an object will automatically call the magic method `__str__`
    of that object. If the object does not contain this method, it will use the version
    provided by the (nearest) super class, calling this function of the `object` class
    in the worst case. This is demonstrated in the example below:'
