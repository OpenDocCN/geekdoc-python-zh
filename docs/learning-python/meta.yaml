    # 5.4 Iterating Through Tuple Elements


    One of the most practical operations we end up performing on tuples is iterating
    through them and processing each element in sequence. Since tuples are sequences,
    the `for` loop is directly compatible for iterating as shown in the example below:


    ```

    >>> T=(5,2,3)

    >>> for i in T: print(i)

    ...

    5

    2

    3

    ```


    # 5.5 Searching Elements Within Tuples


    We can search for elements within tuples the same way we search in lists.


    # 5.5.1 Checking for Existence


    The `in` and `not in` operators help us to verify whether a particular element
    is present in a tuple or not.


    ```

    >>> T=(5,2,3)

    >>> 3 in T

    True

    >>> 4 in T

    False

    >>> 4 not in T

    True

    ```


    # 5.5.2 Counting Occurrences


    The `count()` member function of tuple tells us how many instances of the specified
    object is present in the tuple.


    ```

    >>> T=(5,2,3,2)

    >>> T.count(3)

    1

    >>> T.count(2)

    ```'
