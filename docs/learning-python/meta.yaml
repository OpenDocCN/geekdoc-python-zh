    дљЬдЄЇзЙєжЃКжГЕеЖµпЉМе¶ВжЮЬе≠Чзђ¶дЄ≤ `str` дЄЇз©ЇжИЦдїЕзФ±з©Їж†Ље≠Чзђ¶зїДжИРпЉМеИЩињФеЫЮдЄАдЄ™з©ЇеИЧи°®гАВ


    **з§ЇдЊЛпЉЪ**


    ```

    >>> "India:New Delhi China:Beijing".split()

    [''India:New'', ''Delhi'', ''China:Beijing'']

    >>> " \t\nIndia:New \n\r Delhi\t\tChina:Beijing\n\n".split()

    [''India:New'', ''Delhi'', ''China:Beijing'']

    >>> "\t\t\n\r\n".split()

    []

    >>> "".split()

    []

    ```


    **ељҐеЉП #2пЉЪ** `str.split(separator)`


    зїЩеЃЪдЄАдЄ™еИЖйЪФзђ¶е≠Чзђ¶дЄ≤пЉМж≠§еЗљжХ∞еЬ®жЙЊеИ∞еИЖйЪФзђ¶зЪДеЬ∞жЦєе∞Же≠Чзђ¶дЄ≤ `str` еИЖеЙ≤жИРзЙЗжЃµпЉМеєґињФеЫЮеИЖеЙ≤йГ®еИЖзЪДеИЧи°®гАВ


    **з§ЇдЊЛпЉЪ**


    ```

    >>> "125,342,264".split(",")

    [''125'', ''342'', ''264'']

    >>> "125,,342,264".split(",")

    [''125'', '''', ''342'', ''264'']

    >>> "53269985".split("99")

    [''5326'', ''85'']

    ```


    **ж≥®жДПпЉЪ**


    1.  еИЖйЪФзђ¶жШѓдЄАдЄ™е≠Чзђ¶дЄ≤пЉМеПѓдї•зФ±е§ЪдЄ™е≠Чзђ¶зїДжИРгАВ

    2.  е¶ВжЮЬеИЖйЪФзђ¶ињЮзї≠еЗЇзО∞пЉМеИЩеБЗеЃЪеЃГдїђдєЛйЧіе≠ШеЬ®дЄАдЄ™з©Їе≠Чзђ¶дЄ≤пЉМеєґе∞ЖеЕґиЃ°дЄЇеИЖеЙ≤зЙЗжЃµдєЛдЄАгАВ


    **ељҐеЉП #3пЉЪ** `str.split(separator, maxsplits)`


    ж≠§еЗљжХ∞еЬ®жЙЊеИ∞зїЩеЃЪеИЖйЪФзђ¶жЧґе∞Же≠Чзђ¶дЄ≤ `str` еИЖеЙ≤жИРзЙЗжЃµгАВдљЖжШѓпЉМеЃГз°ЃдњЭеИЖеЙ≤жђ°жХ∞дЄНиґЕињЗ `maxsplits`гАВзФ±дЇОжѓПжђ°еИЖеЙ≤дЉЪдЇІзФЯдЄАдЄ™йҐЭе§ЦзЪДзЙЗжЃµпЉМеЫ†ж≠§ж≠§еЗљжХ∞ињФеЫЮзЪДжАїзЙЗжЃµжХ∞зРЖжГ≥жГЕеЖµдЄЛдЄЇ
    `maxsplits+1`гАВ


    **ж≥®жДПпЉЪ**


    1.  е¶ВжЮЬжЧ†ж≥ХињЫи°М `maxsplits` жђ°еИЖеЙ≤пЉИеЫ†дЄЇ `separator` еЗЇзО∞зЪДжђ°жХ∞дЄНе§ЯпЉЙпЉМж≠§еЗљжХ∞жЧ†иЃЇе¶ВдљХйГљдЉЪињФеЫЮеИЖеЙ≤йГ®еИЖзЪДеИЧи°®пЉМиАМењљзХ• `maxsplits`гАВ

    2.  е¶ВжЮЬ `maxsplits` е∞ПдЇОеПѓиГљзЪДеИЖеЙ≤жђ°жХ∞пЉМеИЩеИЧи°®дЄ≠ињФеЫЮзЪДжЬАеРОдЄАдЄ™е≠Чзђ¶дЄ≤жШѓ `str` жЬ™еИЖеЙ≤зЪДеЙ©дљЩйГ®еИЖгАВ

    3.  е¶ВжЮЬ `separator` дЄЇ `None`пЉМеИЩжМЙзЕІељҐеЉП #1 ињЫи°МеИЖеЙ≤гАВ

    4.  е¶ВжЮЬ `maxsplits` дЄЇ -1 дЄФ `separator` дЄНдЄЇ `None`пЉМеИЩжМЙзЕІељҐеЉП #2 ињЫи°МеИЖеЙ≤гАВ


    **з§ЇдЊЛпЉЪ**


    ```

    >>> "125,342,264".split(",", 1)  # 1 жђ°еИЖеЙ≤пЉМ2 дЄ™зЙЗжЃµ

    [''125'', ''342,264'']

    >>> "125,342,264".split(",", 2)  # 2 жђ°еИЖеЙ≤пЉМ3 дЄ™зЙЗжЃµ

    [''125'', ''342'', ''264'']

    >>> "125,342,264".split(",", 3)  # 3 жђ°еИЖеЙ≤пЉМдљЖеП™жЬЙ 2 жђ°еПѓиГљ

    [''125'', ''342'', ''264'']

    ```


    **зЙєжЃКжГЕеЖµпЉЪ**


    ```

    >>> "a b c d e f".split(None, 3)

    [''a'', ''b'', ''c'', ''d e f'']

    ```


    зФ±дЇО `separator` дЄЇ `None`пЉМеИЖеЙ≤жЦєеЉПз±їдЉЉдЇОељҐеЉП #1пЉМдљЖжЬАе§ЪеП™ињЫи°М 3 жђ°еИЖеЙ≤гАВ


    ```

    >>> "125,342,264".split(",", -1)

    [''125'', ''342'', ''264'']

    ```


    зФ±дЇО `maxsplits` дЄЇ -1 дЄФ `separator` дЄНдЄЇ `None`пЉМеИЖеЙ≤жЦєеЉПз±їдЉЉдЇОељҐеЉП #2гАВ


    ## 8.3.3 дљњзФ® splitlines() еИЖеЙ≤и°М


    зїЩеЃЪдЄАдЄ™е§Ъи°Ме≠Чзђ¶дЄ≤пЉИеМЕеРЂжНҐи°Мзђ¶зЪДе≠Чзђ¶дЄ≤пЉЙпЉМ`splitlines()` еЗљжХ∞еПѓдї•е∞ЖеЕґеИЖиІ£дЄЇеНХзЛђзЪДи°МпЉМеєґдї•еИЧи°®ељҐеЉПињФеЫЮгАВ


    **еЃМжХіиѓ≠ж≥ХпЉЪ**


    ```

    str.splitlines([keepends])

    ```


    **ељҐеЉПпЉЪ**


    1.  `str.splitlines()`

    2.  `str.splitlines(keepends)`


    **ељҐеЉП #1пЉЪ** `str.splitlines()`


    ж≠§еЗљжХ∞е∞Же§Ъи°Ме≠Чзђ¶дЄ≤еИЖиІ£дЄЇеѓєеЇФдЇОжѓПдЄАи°МзЪДе≠Чзђ¶дЄ≤еИЧи°®гАВељУжЙЊеИ∞еРИйАВзЪДжНҐи°Мзђ¶жЧґпЉИдЄЇзЃАеНХиµЈиІБпЉМеПѓдї•иЃ§дЄЇжШѓ \nпЉМе∞љзЃ°ињШжЬЙеЕґдїЦе≠Чзђ¶пЉМеМЕжЛђ \r еТМ Unicode жНҐи°Мзђ¶пЉЙпЉМеИЖеЙ≤е∞±дЉЪињЫи°МгАВжЙЊеИ∞зЪДжНҐи°Мзђ¶дЄНдЉЪеЗЇзО∞еЬ®еЃГињФеЫЮзЪДе≠Чзђ¶дЄ≤еИЧи°®дЄ≠гАВ


    **з§ЇдЊЛпЉЪ**


    ```

    >>> "Hello\nWorld\nHow are you?".splitlines()

    [''Hello'', ''World'', ''How are you?'']

    ```


    **ељҐеЉП #2пЉЪ** `str.splitlines(keepends)`


    ж≠§еЗљжХ∞зЪДеЈ•дљЬжЦєеЉПдЄОељҐеЉП #1 зЫЄеРМпЉМдљЖе¶ВжЮЬ `keepends` дЄЇ `True`пЉМеИЩдЉЪеЬ®еИЧи°®дЄ≠дњЭзХЩжѓПи°МжЬЂе∞ЊзЪДжНҐи°Мзђ¶гАВе¶ВжЮЬ `keepends` дЄЇ `False`пЉМеИЩеЕґеЈ•дљЬжЦєеЉПдЄОељҐеЉП
    #1 зЫЄеРМгАВ


    **з§ЇдЊЛпЉЪ**


    ```

    >>> "Hello\nWorld\nHow are you?".splitlines(True)

    [''Hello\n'', ''World\n'', ''How are you?'']

    >>> "Hello\nWorld\nHow are you?".splitlines(False)

    [''Hello'', ''World'', ''How are you?'']

    ```


    ## 8.4 ињЮжО•е≠Чзђ¶дЄ≤


    еИЖеЙ≤зЪДеПНйЭҐжШѓињЮжО•гАВжИСдїђеЈ≤зїПе≠¶дє†дЇЖе¶ВдљХдљњзФ®еРДзІНеЗљжХ∞е∞Же≠Чзђ¶дЄ≤еИЖеЙ≤жИРзЙЗжЃµгАВеЬ®жЬђиКВдЄ≠пЉМжИСдїђе∞Же≠¶дє†е¶ВдљХе∞ЖеРДдЄ™зЙЗжЃµињЮжО•еЬ®дЄАиµЈдї•ељҐжИРдЄАдЄ™жЦ∞зЪДе≠Чзђ¶дЄ≤гАВ


    ### 8.4.1 дљњзФ® join() ињЮжО•е≠Чзђ¶дЄ≤


    **иѓ≠ж≥ХпЉЪ**


    ```

    str.join(iterable)

    ```


    `join()` еЗљжХ∞дљњзФ®е≠Чзђ¶дЄ≤ `str` дљЬдЄЇеЃГдїђдєЛйЧізЪДеИЖйЪФзђ¶пЉМињЮжО• `iterable` еЇПеИЧпЉИеИЧи°®гАБеЕГзїДз≠ЙпЉЙдЄ≠зЪДжЙАжЬЙе≠Чзђ¶дЄ≤пЉМеєґињФеЫЮжЦ∞е≠Чзђ¶дЄ≤гАВдљЬдЄЇзЙєжЃКжГЕеЖµпЉМе¶ВжЮЬ
    `str` жШѓз©Їе≠Чзђ¶дЄ≤пЉМеИЩе≠Чзђ¶дЄ≤дєЛйЧідЄНдЉЪжЬЙеИЖйЪФзђ¶гАВ


    **з§ЇдЊЛпЉЪ**


    ```

    >>> ",".join(("12", "24", "36"))

    ''12,24,36''

    >>> " and ".join(("12", "24", "36"))

    ''12 and 24 and 36''

    >>> "".join(("12", "24", "36"))

    ''122436''

    ```


    ## 8.5 дњЃжФєе≠Чзђ¶дЄ≤


    еЙНйЭҐзЂ†иКВдїЛзїНзЪД `split` еТМ `join` жУНдљЬжЬЙеК©дЇОе∞Же≠Чзђ¶дЄ≤еИЖиІ£жИРзЙЗжЃµеєґе∞ЖеЕґйЗНжЦ∞зїДи£ЕжИРе≠Чзђ¶дЄ≤гАВе≠Чзђ¶дЄ≤жШѓдЄНеПѓеПШзЪДпЉМеЫ†ж≠§жЧ†ж≥ХдњЃжФєгАВдљЖжШѓпЉМеЬ®жЬђиКВдЄ≠пЉМжИСдїђе∞Жз†Фз©ґдЄАдЇЫеЗљжХ∞пЉМињЩдЇЫеЗљжХ∞йАЪињЗеѓєзО∞жЬЙе≠Чзђ¶дЄ≤жЙІи°МжЯРдЇЫжУНдљЬжЭ•жіЊзФЯеЗЇдЄАдЄ™жЦ∞е≠Чзђ¶дЄ≤гАВ


    ### 8.5.1 дљњзФ® lstrip()гАБrstrip() еТМ strip() еОїйЩ§е≠Чзђ¶дЄ≤


    еОїйЩ§жШѓжМЗдїОе≠Чзђ¶дЄ≤зЪДдЄ§зЂѓзІїйЩ§жЯРдЇЫе≠Чзђ¶гАВ


    #### 8.5.1.1 дљњзФ® lstrip() еЈ¶дЊІеОїйЩ§


    `lstrip()` еЗљжХ∞дїОе≠Чзђ¶дЄ≤дЄ≠еОїйЩ§еЙНеѓЉе≠Чзђ¶пЉИжЬАеЈ¶иЊєзЪДе≠Чзђ¶пЉЙеєґињФеЫЮжЦ∞е≠Чзђ¶дЄ≤гАВ


    **еЃМжХіиѓ≠ж≥ХпЉЪ**


    ```

    str.lstrip([chars])

    ```


    **ељҐеЉПпЉЪ**


    1.  `str.lstrip()`

    2.  `str.lstrip(chars)`


    **ељҐеЉП #1пЉЪ** `str.lstrip()`


    ж≠§еЗљжХ∞еѓєе≠Чзђ¶дЄ≤ `str` ињЫи°МеЈ¶дЊІеОїйЩ§гАВеЃГжЬАзїИдЉЪзІїйЩ§е≠Чзђ¶дЄ≤ `str` зЪДеЙНеѓЉз©Їж†ЉеєґињФеЫЮжЦ∞е≠Чзђ¶дЄ≤пЉЪ


    ```

    >>> " \t\r\nHello \t\r\n".lstrip()

    ''Hello \t\r\n''

    ```


    **ж≥®жДПпЉЪ**


    1.  е¶ВжЮЬе≠Чзђ¶дЄ≤ `str` дЄНдї•з©Їж†ЉеЉАе§іпЉМеИЩж≠§еЗљжХ∞дїЕињФеЫЮеОЯеІЛе≠Чзђ¶дЄ≤пЉМдЄНеБЪдїїдљХжЫіжФєгАВ


    **ељҐеЉП #2пЉЪ** `str.lstrip(chars)`


    е¶ВжЮЬжИСдїђеЄМжЬЫеОїйЩ§з©Їж†Љдї•е§ЦзЪДеЕґдїЦе≠Чзђ¶пЉМеПѓдї•дљњзФ®ж≠§ељҐеЉПзЪДеЗљжХ∞гАВжИСдїђеПѓдї•жМЗеЃЪжЙАжЬЙеЄМжЬЫеОїйЩ§зЪДе≠Чзђ¶пЉИдљЬдЄЇеНХдЄ™е≠Чзђ¶дЄ≤пЉЙпЉМеЙНжПРжШѓеЃГдїђеЗЇзО∞еЬ®е≠Чзђ¶дЄ≤ `str` зЪДеЉАе§ігАВ


    дї•дЄЛз§ЇдЊЛзІїйЩ§е≠Чзђ¶дЄ≤еЉАе§ізЪДжЙАжЬЙжХ∞е≠ЧпЉЪ


    ```

    >>> "233Hello466World599".lstrip("0123456789")

    ''Hello466World599''

    ```


    #### 8.5.1.2 дљњзФ® rstrip() еП≥дЊІеОїйЩ§


    `rstrip()` еЗљжХ∞дїОе≠Чзђ¶дЄ≤дЄ≠еОїйЩ§е∞ЊйЪПе≠Чзђ¶пЉИжЬАеП≥иЊєзЪДе≠Чзђ¶пЉЙеєґињФеЫЮжЦ∞е≠Чзђ¶дЄ≤гАВ


    **еЃМжХіиѓ≠ж≥ХпЉЪ**


    ```

    str.rstrip([chars])

    ```


    **ељҐеЉПпЉЪ**


    1.  `str.rstrip()`

    2.  `str.rstrip(chars)`


    **ељҐеЉП #1пЉЪ** `str.rstrip()`


    ж≠§еЗљжХ∞еѓєе≠Чзђ¶дЄ≤ `str` ињЫи°МеП≥дЊІеОїйЩ§гАВеЃГжЬАзїИдЉЪзІїйЩ§е≠Чзђ¶дЄ≤ `str` зЪДе∞ЊйЪПз©Їж†ЉеєґињФеЫЮжЦ∞е≠Чзђ¶дЄ≤пЉЪ


    ```

    >>> " \t\r\nHello \t\r\n".rstrip()

    '' \t\r\nHello''

    ```


    **ж≥®жДПпЉЪ**


    1.  е¶ВжЮЬе≠Чзђ¶дЄ≤ `str` дЄНдї•з©Їж†ЉзїУе∞ЊпЉМеИЩж≠§еЗљжХ∞дїЕињФеЫЮеОЯеІЛе≠Чзђ¶дЄ≤пЉМдЄНеБЪдїїдљХжЫіжФєгАВ


    **ељҐеЉП #2пЉЪ** `str.rstrip(chars)`


    е¶ВжЮЬжИСдїђеЄМжЬЫеОїйЩ§з©Їж†Љдї•е§ЦзЪДеЕґдїЦе≠Чзђ¶пЉМеПѓдї•дљњзФ®ж≠§ељҐеЉПзЪДеЗљжХ∞гАВжИСдїђеПѓдї•жМЗеЃЪжЙАжЬЙеЄМжЬЫеОїйЩ§зЪДе≠Чзђ¶пЉИдљЬдЄЇеНХдЄ™е≠Чзђ¶дЄ≤пЉЙпЉМеЙНжПРжШѓеЃГдїђеЗЇзО∞еЬ®е≠Чзђ¶дЄ≤ `str` зЪДжЬЂе∞ЊгАВ


    дї•дЄЛз§ЇдЊЛзІїйЩ§е≠Чзђ¶дЄ≤жЬЂе∞ЊзЪДжЙАжЬЙжХ∞е≠ЧпЉЪ


    ```

    >>> "233Hello466World599".rstrip("0123456789")

    ''233Hello466World''

    ```


    #### 8.5.1.3 дљњзФ® strip() еОїйЩ§


    `strip()` еЗљжХ∞дїОе≠Чзђ¶дЄ≤дЄ≠еОїйЩ§еЙНеѓЉеТМе∞ЊйЪПе≠Чзђ¶пЉИжЬАеЈ¶иЊєеТМжЬАеП≥иЊєзЪДе≠Чзђ¶пЉЙеєґињФеЫЮжЦ∞е≠Чзђ¶дЄ≤гАВ


    **еЃМжХіиѓ≠ж≥ХпЉЪ**


    ```

    str.strip([chars])

    ```


    **ељҐеЉПпЉЪ**


    1.  `str.strip()`

    2.  `str.strip(chars)`


    **ељҐеЉП #1пЉЪ** `str.strip()`


    ж≠§еЗљжХ∞еѓєе≠Чзђ¶дЄ≤ `str` ињЫи°МеЈ¶дЊІеТМеП≥дЊІеОїйЩ§гАВеЃГжЬАзїИдЉЪзІїйЩ§е≠Чзђ¶дЄ≤ `str` зЪДеЙНеѓЉеТМе∞ЊйЪПз©Їж†ЉеєґињФеЫЮжЦ∞е≠Чзђ¶дЄ≤пЉЪ


    ```

    >>> " \t\r\nHello \t\r\n".strip()

    ''Hello''

    ```


    **ж≥®жДПпЉЪ**


    1.  е¶ВжЮЬе≠Чзђ¶дЄ≤ `str` жЧҐдЄНдї•з©Їж†ЉеЉАе§ідєЯдЄНдї•з©Їж†ЉзїУе∞ЊпЉМеИЩж≠§еЗљжХ∞дїЕињФеЫЮеОЯеІЛе≠Чзђ¶дЄ≤пЉМдЄНеБЪдїїдљХжЫіжФєгАВ


