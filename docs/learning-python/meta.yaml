    # # FILE HANDLING


    # ## 14.1 Introduction to File Handling


    # ### 14.1.1 Need for File Handling


    A **file** is a logical collection of data stored as a single unit inside a filesystem
    on a storage device. While the contents of a file are sequentially accessed, they
    can be randomly accessed as well. Perhaps one of the most important aspects of
    files are that they are persistent вАУ available to programs and users even after
    long periods of time.


    Files can be either:-


    +   1. accessed directly by users,

    2. or can be opened, viewed and edited using specific applications that understand
    that file format,

    3. or can be used internally by an application (perhaps to store configuration
    data).


    # ### 14.1.2 Logical Steps in File Handling


    If a program has to access (read from or write to ) a file, these are the logical
    steps that it should follow:


    +   1. **Open the file.** Opening the file creates suitable data structures in
    memory that allow you to communicate with the file. During this process, it is
    necessary to identify which file you wish to open and for what reason (in which
    mode do you wish to open the file). On success (after due validation like file
    existence and permissions), a buffer is made available in memory through which
    you may communicate with the file contents. The reason for the buffer to be used
    us to improve speed by acting as an intermediary between the file and the program.

    2. **Access the file.** Once the file has been successfully opened, you may then
    access the contents of the file. If the file has been opened in a mode that supports
    reading, you may read from the file. If the file has been opened in a mode that
    supports writing, you may write to the file.

    3. **Close the file.** When you are done dealing with the file, you can close
    the connection with the file. This will flush out the buffers (thereby writing
    any data in the buffer that has not yet been written to the file if the file was
    opened for writing), close the file handle and release the memory occupied by
    the data structure used to handle the file. When the process terminates, all opened'
  - '[PAGE 473]


    files are automatically closed. It is a good programming practice to close a file
    the moment it is no longer needed to be accessed by the program. Once a file is
    closed, no other file operations can be performed on it. Of course, you can open
    the file again to access it''s contents.


    # 14.1.3 Text Files vs. Binary Files


    At this point, even before we enter Python''s support for files, it is better
    that you are aware of the 2 types of files вАУ text and binary вАУ and the differences
    between them.


    A **text file** is a human readable file, comprising of strings using a known,
    fixed character set. No specific applications are needed to access the file contents
    (except perhaps a text editor).


    A **binary file** on the other hand is a file that uses an encoding that is not
    human readable. A simple text editor will not be able to help you decipher it''s
    contents. Therefore, specific applications that understand the file format are
    required to present the file contents to you for viewing or editing.


    Examples of file formats that are textual in nature are:


    | Extension | Format |

    | :--- | :--- |

    | .txt | Text file |

    | .html, .htm | HTML file |

    | .py | Python script |

    | .xml | XML file |

    | .sql | SQL file |


    Examples of file formats that are binary in nature are:


    | Extension | Format |

    | :--- | :--- |

    | .doc, .docx, .odt | Document |

    | .xls, .xlsx, .ods | Spreadsheet |

    | .mp3 | MP3 Audio |

    | .mpg, .mpeg | MPEG Video |

    | .jpg, .jpeg | JPEG Image |'
- md: "Do not get confused by the names вАШtextвАЩ and вАШbinaryвАЩ - both of them are ultimately\
    \ stored in binary format on a storage device. The distinction is not based on\
    \ how they are stored, but on whether or not their contents are human readable\
    \ when the individual characters of the file are displayed.\n\nApart from this\
    \ basic difference between text files and binary files, there are technical differences\
    \ that emerge on how these files are to be accessed and processed by programs.\
    \ These are listed below:\n\n1.  A text file is typically made up of lines (as\
    \ we humans are comfortable with dealing with a line as a unit). These lines need\
    \ specific characters within the file to denote their end, and these differ between\
    \ operating systems. Windows, for example, terminates lines using 2 characters\
    \ вАУ the carriage return (\\r) and the linefeed (\\n). Linux on the other hand,\
    \ uses just the linefeed character to achieve the same purpose. Python being capable\
    \ of working on any of these platforms has to support both. Therefore, Python\
    \ ensures that end-of-lines are handled by it in a platform-specific manner, but\
    \ for the programmer, Python gives the impression that only the newline character\
    \ (\\n) marks the end of a line. Binary files are not organised in the form of\
    \ lines and any carriage return and linefeed characters found are probably not\
    \ meant to convey end of line information at all and are thus not to be interpreted\
    \ in any special manner.\n2.  Numbers in a text file need to stored in a human\
    \ readable format. They are therefore converted into digits and each digit is\
    \ stored as a separate character. Thus, the number 12345 is stored in the file\
    \ as 5 ASCII characters (assuming ASCII encoding) - вАШ1вАЩ, вАШ2вАЩ, вАШ3вАЩ, вАШ4вАЩ and вАШ5вАЩ\
    \ - and will therefore occupy 5 bytes. The amount of memory required to store\
    \ a number within a text file therefore depends on the number of digits it has.\
    \ A binary files stores numbers in itвАЩs direct binary form that is of fixed size\
    \ independent of the number of digits in the number (provided the number is not\
    \ unreasonable long).\n3.  Seeking within text files (covered in detail in section\
    \ 14.5.4) is restricted due to point 1 above that requires Python to deal with\
    \ the end of line characters in a platform dependent manner while being platform-independent\
    \ to the programmer. Seeking within binary files do not have any such restriction.\n\
    \n## 14.2 Opening and Closing Files\n\nAs was pointed out in the previous section,\
    \ the first operation to be performed in order to access the contents of a file\
    \ is to open the file. Since there are various ways of reading from files, this\
    \ section concentrates on how to open and how to close files, with later sections\
    \ talking about how to read from and how to write to files.\n\n### 14.2.1 Opening\
    \ Files\n\nIn order to open a file to access it's contents, 2 pieces of information\
    \ are required:\n\n1.  The *pathname* of the file, identifying which file you\
    \ wish to open\n2.  The *access mode*, identifying what you wish to do with the\
    \ file contents\n\nOn successfully opening a file, a **file object** is returned\
    \ that is to be used as a reference to the opened file later on in the program.\
    \ All other file operations on the file can be performed using this file object.\n\
    \nThe `open` function is used to open a file and return a file object, and has\
    \ the following syntax:\n\n```\nopen(pathName [,mode])\n```\n\n**Note:**\n\n1.\
    \  The file is identified in the filesystem by it's pathname, which could be relative\
    \ or absolute.\n2.  If the file could not be opened for any reason, `FileNotFoundError`\
    \ is raised.\n\nThe permissible modes are listed in the table below:\n\n| Mode\
    \ | Meaning |\n| :--- | :--- |\n| 'r' | Open the file for reading. |\n| 'rb' |\
    \ If the file exists and has read permissions, you will be permitted to read it's\
    \ contents using the file object returned. If the file does not exist or does\
    \ not have read permissions, this operation will fail. |\n| 'w' | Open the file\
    \ for writing. |\n| 'wb' | If the file exists and has write permissions, you will\
    \ be permitted to write to the file, but any data already present in the file\
    \ is lost as the file is truncated. If the file does not exist, it will be created\
    \ and you will be permitted to write new contents to the file. |\n| 'a' | Open\
    \ the file for appending. |\n| 'ab' | If the file exists and has write permissions,\
    \ you will be permitted to write to the file, and whatever is written is automatically\
    \ appended to the file without disturbing it's existing contents. If the file\
    \ does not exist, it will be created and you will be permitted to append to the\
    \ empty file so created. |\n| 'r+' | Open the file for reading and writing. This\
    \ is the only mode that permits reading as well as writing using the same file\
    \ object. |\n| 'r+b' | If the file exists and has write permissions, you will\
    \ be permitted to read from and write to the file, but any writes will overwrite\
    \ the data already present at that position within the file. If the file does\
    \ not exist, it will be created and you will be permitted to write new contents\
    \ to the file and read the same by seeking (covered in section 14.5). |\n\nTable\
    \ 33: File Open Modes\n\nNote:\n\n1.  In the modes listed in the above table,\
    \ a suffix of 'b' indicates that the file should be treated as a binary file,\
    \ and the absence of the suffix indicates that the file should be treated as a\
    \ text file. Thus, the mode 'r' opens a text file for reading whereas the mode\
    \ 'rb' opens a binary file for reading.\n2.  The default mode is 'r'. Thus, if\
    \ a file is opened using open without specifying the mode, it will be opened to\
    \ reading as a text file.\n\nHere is an interactive session showing a successful\
    \ file open:\n\n```\n>>> f=open(\"fib.py\", 'r')\n>>> f\n<_io.TextIOWrapper name='fib.py'\
    \ mode='r' encoding='UTF-8'>\n```\n\nObservation:\n\n1.  We are opening the Python\
    \ script fib.py that was previously saved in the current directory. We are opening\
    \ this file in read mode. Note that Python scripts are text files.\n2.  On successful\
    \ opening of the file, a file object is returned and is stored in the variable\
    \ f in our example.\n\nHere is an interactive session to show what happens if\
    \ the file could not be opened:\n\n```\n>>> f=open(\"blah\",'r')\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nFileNotFoundError:\
    \ [Errno 2] No such file or directory: 'blah'\n```\n\n### 14.2.2 Closing Files\n\
    \nAs discussed in section 14.1.2, when you are done accessing the contents of\
    \ a file, it is recommended that you close the connection to the file. The `close`\
    \ function can be used for this purpose with the following syntax:\n\n```\nfileObject.close()\n\
    ```\n\nNote:\n\n1.  The `fileObject` used must be one returned by the `open()`\
    \ function only.\n2.  Once a file object is closed, it cannot be used to perform\
    \ any more operations on the file it was connected with using this file object.\
    \ You may of course call `open()` again to open any file or continue using other\
    \ file objects that refer to opened files.\n3.  When the Python script terminates,\
    \ all opened files are automatically closed.\n\nHere is a sample interactive session\
    \ to open a file and close it:\n\n```\n>>> f=open(\"fib.py\",'r')\n>>> f\n<_io.TextIOWrapper\
    \ name='fib.py' mode='r' encoding='UTF-8'>\n>>> f.closed\nFalse\n>>> f.close()\n\
    >>> f\n<_io.TextIOWrapper name='fib.py' mode='r' encoding='UTF-8'>\n>>> f.closed\n\
    True\n```\n\nObservation:\n\n1.  Even after a file is closed, it's file object\
    \ keeps track of the file and access mode, but does not permit operations on the\
    \ file.\n2.  The `closed` attribute can be used at any time to find out whether\
    \ the file linked with a file object is currently closed or still open.\n3.  Closing\
    \ a closed file is not an offence, though it is obviously not required.\n\n##\
    \ 14.3 Reading From Text Files\n\nOnce a text file has been opened in a mode that\
    \ supports reading, we can then proceed to read the file contents using the file\
    \ object. This section introduces various ways by which we can read from the file:\n\
    \n1.  Reading the entire file contents at one go\n2.  Reading the file contents\
    \ a line at a time\n3.  Reading the file contents a chunk at a time\n4.  Reading\
    \ the file contents a character at a time\n\n### 14.3.1 Reading Entire File at\
    \ Once\n\nOne of the simplest ways of reading a text file is to read the entire\
    \ file at once in a single step. This section introduces 2 techniques by which\
    \ we could achieve this:\n\n1.  Loading the entire file contents as a string\n\
    2.  Loading the entire file contents as a list of lines\n\n#### 14.3.1.1 Reading\
    \ entire file as a single string\n\nTo load the entire file contents as a single\
    \ string, the `read()` method can be used that has the following syntax:\n\n```\n\
    fileObject.read()\n```\n\nThis method will read the entire file contents and will\
    \ return it as a single string.\n\nLet us write a Python script to display the\
    \ contents of a file whose filename is entered by the user (the UNIX `cat` command\
    \ does something similar):\n\n```\ncat1.py\n1.  #!/usr/bin/python\n2.  \n3.  #\
    \ Implementation of cat command to display the contents of a file\n4.  \n5.  filename\
    \ = input(\"Enter filename:\")\n6.  \n7.  try:\n8.      file = open(filename)\n\
    9.      contents = file.read()\n10.     print(contents)\n```"
