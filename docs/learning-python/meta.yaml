    For my **parents**, who always allowed me to follow my own path...


    For the person I consider my programming guru: **Peter Norton!**

    His books and software were incredibly rich and useful...


    For my **teachers**, who put in their best to make an impact in my life,

    especially my first Computer Science teacher, Late Ms. P. S. Maithily,

    whose encouragement and support allowed me

    to excel in programming...


    For my **students**, who gave me the joy of knowing

    that I had made an impact in their lives...


    ## About the Author


    **B. Nagesh Rao** has more than 20 years of professional experience as a software
    developer, trainer, mentor and entrepreneur. He is a Principal Engineer and part
    of the Architecture Team in **Nokia**, where his job responsibilities include
    architecting and developing software solutions, training, coaching and mentoring.
    Not only does he design and develop software there, but also reviews the code
    written by others and leads the Clean Code campaign.


    He is the founder of **CyberPlus Infotech Pvt. Ltd.**, a company specialising
    in open source technologies since the year 2000. He has developed more than 150
    software applications, utilities, libraries and games. He has guided more than
    1000 IT professionals and students in the development of various software projects.
    He has conducted more than 200 batches of corporate training and trained over
    6500 candidates in more than 25 courses! He has authored several course materials
    and now plans to write several books.


    He says he admires the simplicity and omnipotence of C, the support for OOP in
    C++, the ease of coding in and maintainability of Java, and the brevity of Perl!
    He adds that what makes Python a very appropriate language for him is that Python
    can be extended using C/C++, can run within the JVM and communicate with Java,
    and provides the brevity of Perl without its obscurity! As a big fan of Object
    Oriented Programming paradigm, he loves the fact that Python is completely object-oriented!


    The author can be reached at **nagesh.rao@cyberplusit.com**.


    ## About the Publisher


    **CyberPlus Infotech Pvt. Ltd.** is an open-source company founded in the year
    2000, headquartered in Bengaluru, the silicon valley of India! The main activities
    of the company are software development, corporate training, and professional
    mentoring.


    The team in CyberPlus has developed close to 200 software applications, utilities
    and libraries. They excel at developing object-oriented wrappers for various open-source
    libraries, like Textuality (a wrapper on ncurses for Textual User Interface development),
    GUICPP (a wrapper on GTK+ for GUI development) and GLOO (a wrapper on OpenGL for
    3D graphics programming and rendering).


    The trainers in CyberPlus have conducted more than 200 batches of corporate training
    for various clients in India like Nokia (formerly Nokia Siemens Networks, and
    prior to that, Siemens Communications Systems), IBAB (Institute for Bioinformatics
    and Applied Biotechnology), Delphi Technical Center, OpenStream Technologies,
    Alcatel Lucent (now acquired by Nokia), Altiostar (formerly Radio Mobile Access),
    Wipro Technologies, Comptel (now acquired by Nokia), Samsung India, Indecomm,
    Unisys and Stryker India.


    They have conducted training programs on C, C++, STL, Java, UNIX/Linux, Advanced
    Linux, Advanced C, Advanced C++, Design Patterns, Perl, CGI, HTML, CSS, Javascript,
    XML, Python, Data Structures, Analysis and Design of Algorithms, Finite Automata
    and Formal Languages, Lex and Yacc, Microprocessors (8085 and 8086), Advanced
    Microprocessors (80286 to Pentium), Computer Graphics, OpenGL, Network Programming
    on Linux, SQL and MySQL, J2EE, etc.


    They have mentored professionals and students to develop software at various client
    locations including Wipro Technologies, ISRO, Nokia Siemens Networks and Siemens
    Information Systems Limited.


    CyberPlus Infotech Pvt. Ltd.

    32/5, 8th Main, 11th Cross,

    Malleswaram, Bengaluru вАУ 560 003.

    INDIA.


    **Email:** info@cyberplusit.com

    **www.cyberplusindia.com**


    ## PREFACE TO THE FIRST EDITION


    It was love at first sight and I was only 14!


    I fell in love with computers the moment I saw them work! I remember, it all started
    when our seniors were demonstrating how to boot MS-DOS using a 5¬Љ-inch bootable
    floppy disk and the first thing DOS would do upon booting was ask for the current
    date and time. I was stunned by the validation it would perform. I had a lot of
    questions:


    How does it know when I type in a particular number?

    How does it know that 1 and 2, when typed in succession makes 12?

    How does it know what is the meaning of day, month and year?

    How does it know what is a valid date and what isn''t?

    How does it know what is a leap year? And that a leap year has 29 days in February?

    How can something that runs on electricity have intelligence?


    One question led to another, and the answer to that led to yet another. And that''s
    how my journey in programming began!


    I first learnt BASIC, and when I felt there was something it could not do, I used
    to load binary instructions in my BASIC program using pre-assembled assembly code!
    There was no expert around to tell me that assembly language programming was not
    for kids!


    Over time, I reluctantly learnt many more programming languages вАУ some out of
    curiosity and some out of compulsion. I loved most of them, liked the rest of
    them and hated COBOL! I realised that learning programming languages was secondary;
    learning *programming* was primary! My strong programming base only made it a
    child''s task to learn more programming languages.


    I enjoyed programming so much that I could code, code and code for days together
    at a stretch, stopping only for eating, sleeping and other really important activities!
    I remember asking myself many a times, "Why do I enjoy programming so much?" I
    did find the answer, if I''m not mistaken!


    Programming allowed me to play God!


    Through programming, I could bring to life a machine that would faithfully, obediently,
    reliably, selflessly, correctly, accurately, quickly, tirelessly do as I commanded
    like a servant who never questions!


    I was not even 16 years old when I designed my first programming language! After
    that I have invented and implemented so many custom languages that frankly I can''t
    even recollect all of them! This book''s existence is actually related to the
    fact that I used to invent languages!


    My fascination with gaming in particular led me to guide students to develop games
    in Java using a game development library we had invented in CyberPlus. I found
    the Java code too verbose and decided to invent a language specifically for writing
    and expressing game logic. I developed a C++ game engine and a game interpreter
    using C++ with Lex and Yacc, but what I realised later was that my game scripts
    looked shockingly close to Python scripts!


    Later when we were developing a game development framework in Java, I realised
    that Python could be directly used for writing game scripts that could run within
    the JVM!


    Right from my teenage I had always wanted to share my knowledge. While I did a
    lot of stuff вАУ from teaching friends and classmates, writing articles, course
    materials and lab manuals вАУ I still had one dream to be realised: writing books!
    This is my first book to be published, though I had made attempts in the past
    to write a book on C and data structures!


    Let me be honest here: I have spent far more time on other programming languages
    like C, C++, Java and Perl than on Python. It is probably preordained that my
    first book to be published will be on Python rather than on those other languages.
    But as I pointed out earlier, programming is different from programming languages
    and I was able to learn and understand the nuances of Python quickly because I
    knew and understood programming in these other languages very well!


    The proof of my deep understanding of programming concepts and languages was the
    feedback the participants would give after my training programs вАУ even those who
    knew the language(s) beforehand felt they learnt many new things in my training!
    Many novices also appreciated the way concepts were taught to them. They felt
    I could explain even highly technical concepts in a simple way! It is that belief
    that I can contribute that led me to write this book, though there are many books
    and materials out there teaching Python in a dozen different ways!


    **I sincerely hope this book delivers what I expect it to:** novices get to learn
    Python *well* and experienced programmers get to learn Python *fast*!


    While there are many people I am thankful to in my life, and many such contributions
    from others have indirectly made this book possible, I will only name those who
    have been directly responsible in making this book what it is!


    I thank Sumesh Kumar for being the first reviewer. I appreciate the fact that
    he has always been eager and more than willing to help, in any and every way he
    could.


    I thank Santosh Manoharan for all his inputs and critical analysis. I admire his
    attention to details in the review.'
