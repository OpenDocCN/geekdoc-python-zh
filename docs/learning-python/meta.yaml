    \ |\n\nTable 34: Examples of Seeking\n\n## 14.5.2 Seeking to a Particular Position\
    \ Within a File\n\nIn order to seek to a specific position within a file (using\
    \ the concepts of the previous section), the `seek()` method can be used, which\
    \ has the following syntax:\n\n```\nfileObject.seek(offset [,whence])\n```\n\n\
    Note:\n\n1.  The `offset` parameter specifies an offset relative to a standard\
    \ position that is selected in the second parameter, `whence`.\n2.  The `whence`\
    \ parameter is the standard position selection relative to which the offset is\
    \ applied. The values for this parameter has to be one of `os.SEEK_SET` (0), `os.SEEK_CUR`(1)\
    \ or `os.SEEK_END`(2). If this parameter is not provided, the default standard\
    \ position assumed in `os.SEEK_SET`.\n3.  For text files, the offset must be 0\
    \ or a value that was previous returned by the `tell()` method (covered in section\
    \ 14.5.3). For binary files, the offset can be any arbitrary number.\n\n## 14.5.3\
    \ Finding the Current Location Within a File\n\nJust as how the `seek()` method\
    \ allows us to change the position within an opened file, the `tell()` method\
    \ tells us the current location in an opened file and has the following syntax:\n\
    \n```\nfileObject.tell()\n```\n\nNote:\n\n1.  This method returns the current\
    \ position within the file represented by the file object (fileObject), measured\
    \ as the number of bytes from the beginning of the file.\n2.  The value returned\
    \ by the `tell()` method can be used directly as an offset in the `seek()` method\
    \ with the standard position as `SEEK_SET` to return to this position whenever\
    \ required irrespective of where the current position is later on during the execution\
    \ of the script.\n3.  For text files, the value returned by the `tell()` method\
    \ and the special offset of 0 are the only valid values that can be used as offset\
    \ in the `seek()` method.\n\n## 14.5.4 Special Notes for Seeking Within Text Files\n\
    \nSection 14.1.3 introduced the difference between text and binary files. One\
    \ of the differences between them that affects seeking within files is the fact\
    \ that end of line detection is done internally by Python depending on the platform.\
    \ The implementation can vary and hence seeking will also be affected. To keep\
    \ things simple, Python asks programmers to stick to the following rules as far\
    \ as seeking in text files are concerned:\n\n1.  It is safe to use an offset of\
    \ 0 relative to any standard position. Such a seek is guaranteed to work.\n2.\
    \  Any other offset used must be relative to the start of the file (`SEEK_SET`).\n\
    3.  If a non-zero offset is used for seeking, the offset should be one that was\
    \ previously returned from `tell()`. No other arbitrary offsets are to be used.\n\
    \nBinary files do not undergo any end-of-line processing by Python and hence do\
    \ not have the above restrictions.\n\n## 14.6 Writing to Binary Files\n\nWhile\
    \ text files are designed to be human-readable, it is sometimes preferable to\
    \ store data in an efficient way that our application can read and understand\
    \ but not humans. Such files would be called binary files just to differentiate\
    \ from text files that contain human-readable text. In order to write to binary\
    \ files and read from binary files, the `pickle` module can be used.\n\nThe `pickle`\
    \ module is capable of converting an object to a stream of bytes and then writing\
    \ them to a binary file and is also capable of reading a sequence of bytes from\
    \ a binary file and converting them into an object.\n\nIn order to write an object\
    \ to a binary file, the `dump()` function can be used, which has the following\
    \ syntax:\n\n```\npickle.dump(object, file)\n```\n\n**Note:**\n\n1.  In the above\
    \ syntax, `pickle` is the name of the module and `dump` is the name of a function\
    \ in that module. There are other ways of pickling an object, but we will stick\
    \ to this syntax.\n2.  The parameter `object` is any object you wish to store\
    \ in the file and the parameter `file` is the file object identifying the file\
    \ to which the object needs to be written.\n3.  The file is expected to be opened\
    \ in a mode that supports writing in binary.\n\nHere is a program that uses a\
    \ class called `Employee` to represent an employee, and allows the user to add\
    \ one such employee record to a binary file called `employees.dat`:\n\n**add_employee.py**\n\
    \n```python\n#!/usr/bin/python\n\n# Program to write employee records to a file\n\
    \nimport pickle\n\nclass Employee:\n    def __init__(self, name, id, designation):\n\
    \        self.name = name\n        self.id = id\n        self.designation = designation\n\
    \ntry:\n    file = open(\"employees.dat\", \"ab\")\n    name = input(\"Enter employee\
    \ name:\")\n    id = int(input(\"Enter employee ID:\"))\n    designation = input(\"\
    Enter employee designation:\")\n\n    pickle.dump(Employee(name, id, designation),\
    \ file)\nexcept Exception as e:\n    print(\"Unable to open file!\")\n    print(\"\
    Reason: {}\".format(str(e)))\nelse:\n    print(\"Employee record successfully\
    \ added to file!\")\n```\n\nOutput:\n\n```\nEnter employee name:Ram\nEnter employee\
    \ ID:1\nEnter employee designation:Manager\nEmployee record successfully added\
    \ to file!\n```\n\nObservation:\n\n1.  We import the `pickle` module in line 5.\
    \ We define our `Employee` class in line 7.\n2.  The `Employee` class contains\
    \ a constructor (line 8) that accepts the name, ID and designation of the employee\
    \ and stores these details within the object.\n3.  We open the file `employees.dat`\
    \ in append binary (`ab`) mode in line 14. Since we are planning to add records\
    \ to the file without overwriting any existing records, the append mode is necessary.\
    \ Since we plan to write objects, the file should be binary in nature. Note that\
    \ this mode creates the file if it is not already present.\n4.  We accept the\
    \ employee details from the user in lines 15-17.\n5.  We construct an `Employee`\
    \ object in line 19 using the details the user had given and write them to the\
    \ file `file` using `pickle.dump` function.\n6.  Any errors are handled in lines\
    \ 21-22. On success, a message is printed by line 24.\n\n## 14.7 Reading from\
    \ Binary Files\n\nOnce objects have been stored in files using `pickle.dump()`,\
    \ the `pickle.load()` function can be used to load them back from file.\n\n```\n\
    pickle.load(file)\n```\n\nNote:\n\n1.  The parameter `file` identifies the file\
    \ from which an object has to be loaded from the current position in the file.\
    \ The file is expected to be binary and should have been opened in a mode that\
    \ supports reading.\n2.  The object that is successfully loaded from the file\
    \ is returned by this function.\n\nWe will now write a program that lists all\
    \ employee records in the file `employees.dat` to which records were written by\
    \ the previous program, `add_employee.py`.\n\n## list_employees.py\n\n```python\n\
    #!/usr/bin/python\n\n# Program to list employee records from a file\n\nimport\
    \ pickle\n\nclass Employee:\n    def __init__(self,name,id,designation):\n   \
    \     self.name = name\n        self.id = id\n        self.designation = designation\n\
    \ntry:\n    file = open(\"employees.dat\",\"rb\")\n\n    while 1:\n        employee\
    \ = pickle.load(file)\n        print(\"Name: {} ID: {} Designation: {}\".format(employee.name,employee.id,employee.designation))\n\
    \nexcept EOFError: pass\nexcept Exception as e:\n    print(\"Unable to open file!\"\
    )\n    print(\"Reason: {}\".format(str(e)))\n```\n\nOutput:\n\n```\nName: Ram\
    \ ID: 1 Designation: Manager\n```\n\nObservation:\n\n1.  We define the same `Employee`\
    \ class as was defined in `add_employee.py` in line 7. Of course, practically\
    \ a better option would be to save the `Employee` class in a module and load it\
    \ in both programs using concepts taken from section 15!\n2.  We open the file\
    \ `employees.dat` for reading in binary mode in line 14.\n3.  We have a loop set\
    \ up in line 16 to iterate as many times as required in the file, reading records\
    \ one at a time. Each employee record is loaded as an `Employee` object in line\
    \ 17 using `pickle.load()`.\n4.  On end of file, an `EOFError` is generated by\
    \ `pickle.load()`, which is silently handled in line 20. This results in the termination\
    \ of the loop."
