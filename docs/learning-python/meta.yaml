    # 8.7.4 Format Fill


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    While the alignment uses spaces by default to fill the unused columns, any other
    character can be used to fill in the unused columns. We will revisit the same
    examples given in the previous section, using вАЬ*вАЭ instead of the default spaces:


    ```

    >>> ''{:*<10}''.format(12) # Left-align "12" in 10 columns

    ''12********''

    >>> ''{:*>10}''.format(12) # Right-align "12" in 10 columns

    ''********12''

    >>> ''{:*^10}''.format(12) # Center-align "12" in 10 columns

    ''****12****''

    >>> ''{:*=10}''.format(12) # Right-align "12" in 10 columns, sign first

    ''*********12''

    >>> ''{:*=10}''.format(-12) # Right-align "-12" in 10 columns, sign first

    ''-********12''

    ```


    # 8.7.5 Format Precision


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The exact effect of precision depends on what we are displaying and which format
    type we are using. We will therefore see individual cases:


    # 8.7.5.1 Format Precision for Fixed-Point Format


    When a real number is being displayed using fixed-point format (f or F), the precision
    specifies the number of decimal places required, as shown in the examples below:


    ```

    >>> ''{:.2f}''.format(12.3456789)

    ''12.35''

    >>> ''{:.12f}''.format(12.3456789)

    ''12.345678900000''

    ```


    Note:


    +   1. If the precision is less than the number of fractional digits, the fractional
    digits are rounded.

    2. If the precision is greater than the number of fractional digits, ''0'' is
    added.'
  - '[PAGE 220]


    # 8.7.5.2 Format Precision for Floating-Point General Format


    When a real number is being displayed using general format (g or G), the precision
    specifies the maximum number of digits displayed, as shown in the examples below:


    ```

    >>> ''{:.5g}''.format(12.3456789)

    ''12.346''

    >>> ''{:.10g}''.format(12.3456789)

    ''12.3456789''

    >>> ''{:.15g}''.format(12.3456789)

    ''12.3456789''

    ```


    # 8.7.5.3 Format Precision for Strings


    When a string is being displayed, the precision specifies the maximum number of
    characters to be displayed from the string, as shown in the examples below:


    ```

    >>> ''{:5.2s}''.format(''abcdefghijkl'')

    ''ab   ''

    >>> ''{:5.4s}''.format(''abcdefghijkl'')

    ''abcd ''

    ```


    > NOTE:

    In the above examples, the width is 5 implying that 5 columns are reserved for
    the field. The alignment is left by default and spaces are used by default for
    filling the field. The precision controls how many characters from the string
    are available.


    # 8.7.6 Numeric Formatting


    In this section, we will explore the left overs of the format specification.


    # 8.7.6.1 Zero Padding


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The presence of a 0 before the width indicates 0-padding instead of space padding:


    ```

    >>> ''{:5d}''.format(12)

    ''   12''

    >>> ''{:05d}''.format(12)

    ''00012''

    >>> ''{:05d}''.format(-12)

    ''-0012''

    ```'
  - '[PAGE 221]


    # 8.7.6.2 Sign Preservation


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The sign controls how positive and negative numbers are differentiated and handled.
    The possibilities are listed in the table below:


    | Sign | Meaning |

    | :--- | :--- |

    | - | Negative numbers are prefixed with ''-'' and positive numbers have no prefix
    |

    | + | Negative numbers are prefixed with ''-'' and positive numbers are prefixed
    with ''+'' |

    | space ('' '') | Negative numbers are prefixed with ''-'' and positive numbers
    are prefixed with a space ('' '') |


    Table 19: Sign Preservation in Format


    The default behaviour (when no `sign` is used) is that of the ''-'' `sign` in
    the table.


    # Examples:


    ```

    >>> ''{:d}''.format(12)

    ''12''

    >>> ''{:d}''.format(-12)

    ''-12''

    >>> ''{:-d}''.format(12)

    ''12''

    >>> ''{:-d}''.format(-12)

    ''-12''

    >>> ''{:+d}''.format(12)

    ''+12''

    >>> ''{:+d}''.format(-12)

    ''-12''

    >>> ''{: d}''.format(12)

    '' 12''

    >>> ''{: d}''.format(-12)

    ''-12''

    ```'
  - '[PAGE 222]


    # 8.7.6.3 Digit Grouping


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The `grouping` decides what separator will be used between groups of digits. If
    no `grouping` is specified, by default no separator is used. If a comma (`,`)
    is used as `grouping`, then groups of digits will be separated by commas as shown
    below:


    ```

    >>> ''{:,d}''.format(123456789)

    ''123,456,789''

    ```


    # 8.7.6.4 Alternate Representation


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The presence of the ''#'' in the format specification indicates a request for
    an alternate representation вАУ a representation different from the default one.
    This alternate representation exists only for numbers and differs from type to
    type.


    For instance:


    +   1. The alternate representation for binary, octal and hexadecimal types is
    the presence of ''0b'', ''0o'' and ''0x'' respectively.

    2. The alternate representation for the ''e'' and ''E'' types is to display the
    decimal point even when there is no fractional part.

    3. The alternate representation for the ''g'' and ''G'' types is to retain trailing
    zeros.


    # Examples:


    ```

    >>> ''{:b}''.format(12)

    ''1100''

    >>> ''{:#b}''.format(12)

    ''0b1100''

    >>> ''{:o}''.format(12)

    ''14''

    >>> ''{:#o}''.format(12)

    ''0o14''

    >>> ''{:x}''.format(12)

    ''c''

    >>> ''{:#x}''.format(12)

    ''0xc''

    >>> ''{:X}''.format(12)

    ''C''

    >>> ''{:#X}''.format(12)

    ''0XC''

    ```'
  - '[PAGE 223]


