    # 5.8.3 Sorting a Tuple


    Since in-place sorting of a tuple is not possible, owing to the fact that they
    are immutable, the `sorted()` function can be used to obtain a copy of the sorted
    elements of a tuple as shown in the example below:


    ```

    >>> T=(5,2,3)

    >>> sorted(T)

    [2, 3, 5]

    ```


    The tuple elements can be sorted in descending order as follows:


    ```

    >>> T=(5,2,3)

    >>> sorted(T,reverse=True)

    [5, 3, 2]

    ```


    # 5.9 Comparison of Lists and Tuples


    Since lists and tuples do have a lot of similarities, as a programmer it becomes
    necessary to know how they are similar, how they differ, what are their unique
    capabilities and which one of them to use when. This section addresses these questions.


    Both lists and tuples are *ordered sequences* вАУ elements within them are organised
    based on indices and can be identified by their indices.


    Lists and tuples are freely *inter-convertible*:


    ```

    >>> L=[5,2,3]

    >>> T=tuple(L)

    >>> T

    (5, 2, 3)

    >>> L=list(T)

    >>> L

    [5, 2, 3]

    ```


    Both of them support a very similar set of operations as far as *searching* for
    an element within them are concerned.


    The biggest difference between them is the fact that tuples are *immutable* and
    lists are *dynamically alterable*! This single difference perhaps makes the strongest
    distinction between lists and tuples and can help you decide what to use when!


    If you want a list whose contents are вАЬfrozenвАЭ (known at the time of creation
    and do not change after that), switch over to a tuple. If you want a tuple whose
    contents are manipulated later in the code, switch over to a list.'
