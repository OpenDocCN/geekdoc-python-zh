    # SUMMARY


    +   > Python 2 is the past whereas Python 3 is the present and future!

    > Python 3 is not backward compatible with Python 2, and this is the main reason
    why Python 2 still lives!

    > Even basic statements like printing and reading in input have undergone changes
    from Python 2 to Python 3.

    > Python 2 code can be converted to Python 3 code - either manually or by using
    the 2to3 tool.

    > To some extent, Python code common to Python 2 and Python 3 can be written using
    the six compatibility library.


