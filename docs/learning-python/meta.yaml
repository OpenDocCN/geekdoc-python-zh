    \ digits each) and store it as a list of strings вАУ with the list containing a\
    \ string for each row and each string containing the 9 digits of that row.\n2.\
    \ We split the logic into 3 parts вАУ row check (checking that each row contains\
    \ digits 1-9), column check (checking that each column contains digits 1-9) and\
    \ grid check (checking that each 3x3 grid contains digits 1-9).\n3. We use a Boolean\
    \ variable to indicate whether the solution is correct so far. The moment we realise\
    \ that any check fails, we set the Boolean variable to `False`. We therefore start\
    \ with the value of the Boolean variable being `True`.\n4. For row check, we take\
    \ the string pertaining to each row, split it into it's individual characters,\
    \ sort them in ascending ASCII order, and join them back again. If the row's contents\
