    \ The `readlines()` method reads the entire file and returns a list of strings\
    \ with each item being a line of the file.\n2. Each string item of the list will\
    \ have a terminating newline character, except perhaps the last line which would\
    \ depend on whether or not there was a terminating newline character at the end\
