    # INTRODUCTION


    ## 1.1 About This Book


    Whether you are a novice to programming or a seasoned professional who is new
    to Python, this book has been designed for you!


    Here are the top 10 salient features of this book that makes this book stand apart
    and makes it special for you:


    1. **This book starts slowly!** The fundamental concepts are taught gently to
    ensure that you have a good foundation of basic concepts!

    2. **This book is well organised!** The chapters, headings, subheadings and content
    within the chapters have been planned very carefully so that you conquer Python
    вАУ chapter by chapter!

    3. **This book teaches interactively!** The moment a new concept is taught, there
    is code that immediately follows so that you understand how it looks to the Python
    interpreter!

    4. **This book teaches even when you canвАЩt practice!** Not only do we show you
    code immediately after teaching a concept, we also provide output from a real
    Python session so that you can imagine how Python reacts when you type in a piece
    of code!

    5. **This book teaches good programming practices!** It is not only important
    to learn Python, but to also code like a professional. While it will definitely
    take a little bit of time to metamorphose from novice to professional, we show
    you best practices and pitfalls that will accelerate your journey!

    6. **This book presents programs that solve real problems!** When it is time to
    apply Python, we show you constructive programs that demonstrate how to apply
    Python concepts!

    7. **We analyse every bit of code!** Everything there is to analyse is analysed.
    Code snippets and programs are followed by output, which is then followed by analysis!

    8. **We compare Python with other programming languages!** For the benefit of
    those readers who already know other programming languages like C/C++, Java or
    Perl, we provide tips that help them migrate to Python faster. These tips are
    in separate boxes to ensure that they donвАЩt disturb those readers who are not
    savvy with these languages!

    9. **We have filtered out content!** While this might appear disadvantageous or
    counter-intuitive, we believe in presenting the most important concepts in detail
    and probably even skipping some concepts that you can live without! Call it the
    80/20 rule if you will вАУ we have decided to present in great detail those 20%
    of the features that you will use 80% of the time!

    10. **Each heading and subheading is need based!** Our style of explaining a new
    concept is by first establishing a need. We believe this makes it easier for learners
    to understand not only what they are learning but also why!


    *Happy learning!*


    ## 1.2 About Python


    Python is a widely used high-level, general-purpose, interpreted, dynamic, object-oriented
    programming language. Its programming style emphasizes code readability and its
    syntax allows programmers to code their logic in much fewer lines than in languages
    like C++ and Java!


    It is a fairly old language created by Guido Van Rossum in the late 1980s, when
    he was working on the Amoeba distributed operating system group and wanted to
    use an interpreted language like ABC that could access the Amoeba system calls.
    He decided to create a language that was extensible and that led to the design
    of a new programming language which was later named Python.


    While most people at first might assume that the name ''Python'' was derived from
    the reptile, it was actually adopted from a comedy series of the late seventies
    called вАЬMonty PythonвАЩs Flying CircusвАЭ.


    The design began in the late 1980s and was first released in February 1991. Python
    2.0 was released on 16 October 2000 and had many major new features like a cycle-detecting
    garbage collector and support for Unicode. With this release the development mode
    got changed and it became more transparent and community-backed.


    Python 3.0 (which early in its development was commonly referred to as Python
    3000 or py3k), a major, backwards-incompatible release, was released on 3 December
    2008 after a long period of testing. Many of its major features have been back-ported
    to the backwards-compatible Python 2.6.x and 2.7.x version series


    ## 1.3 Installing Python


    When downloading from Python''s website, currently both the latest 3.x series
    of Python as well as 2.x series will be available, as older versions of Python
    are still in use. Unless you have strong reasons to act on the contrary, always
    download the latest version of Python listed there. **This book concentrates on
    Python 3.x, which in many ways will be different from Python 2.x.**


    ### 1.3.1 Installing Python on Windows


    Download the latest version of Python from the official website: https://www.python.org/downloads/windows/.


    The Windows version is provided as an MSI package. To install it manually, just
    double-click the file.


    By design, Python installs to a directory with the version number embedded, e.g.
    Python version 2.7 will install at `C:\Python27\`, so that you can have multiple
    versions of Python on the same system without conflicts. Of course, only one interpreter
    can be the default application for Python file types. It also does not automatically
    modify the `PATH` environment variable, so that you always have control over which
    copy of Python is run.


    Typing the full path name for a Python interpreter each time quickly gets tedious,
    so add the directories for your default Python version to the `PATH`. Assuming
    that your Python installation is in `C:\Python36\`, add this to your `PATH`:


    ```

    C:\Python36\;C:\Python36\Scripts

    ```


    You do not need to install or configure anything else to use Python.


    ### 1.3.2 Installing Python on Linux


    Python comes pre-installed on most Linux distributions, and is available as a
    package on all others. However there are certain features you might want to use
    that are not available in the version bundled in your distribution. To do that,
    you can compile the latest version of Python from source. Follow the steps below:


    Download the required python source from www.python.org/downloads/release as a
    "Gzipped source tarball". You can either do that using a web browser or by using
    the in-built `wget` utility. If you plan to use the `wget` utility, you could
    use the browser to visit the above-mentioned website to determine the latest version
    available. We assume version 3.5.2 below:


    ```

