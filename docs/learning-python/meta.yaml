    \ private members are accessible only within the class in which they are defined\
    \ and are not accessible anywhere else.\n\nAny member that starts with minimum\
    \ 2 underscores and ends with maximum 1 underscore indicates that it should be\
    \ treated as a private member. This is achieved in Python typically by *name mangling*:\n\
    \nPrivate members of the form `__member` get replaced by `_classname__member`.\
    \ In other words, a member that starts with at least 2 underscores and ends with\
    \ at most 1 underscore gets replaced to an underscore, followed by the name of\
    \ the class to which the member belongs, followed by 2 underscores, followed by\
    \ the member name. This prevents direct access to the member by its name, but\
    \ still does not prevent access via its mangled name! Furthermore, this name mangling\
    \ procedure may change in the future and hence programmers are advised not to\
    \ use the mangled name at any time to access a private member *illegally*!\n\n\
