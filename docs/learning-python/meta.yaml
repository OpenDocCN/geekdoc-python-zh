    # 2.3.4 The str type


    The string type (`str`) allows us to store non-numeric values in addition to numeric
    values.


    # 2.3.4.1 Literals of Type str


    We have seen in section 2.1.2 that string literals can be enclosed in single,
    double or triple `quotes`. Here are a few examples to refresh your memory.


    Examples:


    ```

    >>> ''Hello "World" from \''India\''''

    ''Hello "World" from \''India\''''

    >>> "Hello "World" from ''India''"

    ''Hello "World" from \''India\''''

    >>> """Hello "World" from ''India''"""

    ''Hello "World" from \''India\''''

    >>> ''''''Hello "World" from ''India\''''''''

    ''Hello "World" from \''India\''''

    ```'
- md: "> **TIP**\n\nIf a string has many single-quotes, enclose it in double-quotes\
    \ so that the quotes need not be escaped. Similarly, if a string has many double-quotes,\
    \ enclose it in single-quotes. If a string has both quotes, enclose it in triple-quotes!\n\
    \nObjects of type `str` can also be created using the explicit constructor of\
    \ class `str`. This of course also resembles a function call for type conversion.\
    \ Thus, the following two statements are identical in function:\n\n**Example:**\n\
    \n```\nx = \"abc\"\nx = str(\"abc\")\n```\n\nThis built-in function is also helpful\
    \ for converting other types like `int` and `float` to the type `str`. Also, the\
    \ default constructor of `str` class will create a null string ('').\n\n```\n\
    >>> str(\"10\")\n'10'\n>>> str()\n''\n```\n\n> **NOTE:**\n\nPython strings support\
    \ Unicode. If strings made up of only ASCII characters are desired, Python provides\
    \ a separate `bytes` class (section 20.3) for that, though Python strings can\
    \ also store ASCII characters.\n\nThe following table shows the escape characters\
    \ that can be used within strings:\n\n## 2. Python Basics\n\n| Escape Sequence\
    \ | Meaning |\n|---|---|\n| \\ | Backslash (\\) |\n| \\' | Single quote (') |\n\
    | \" | Double quote (\") |\n| \\a | Alert (beep) |\n| \\b | Backspace |\n| \\\
    f | Formfeed |\n| \\n | Newline |\n| \\r | Carriage return |\n| \\t | Tab |\n\
    | \\v | Vertical tab |\n| \\ooo | Character with ASCII code ooo in octal |\n|\
    \ \\xhh | Character with ASCII code hh in hexadecimal |\n| \\uhhhh | Unicode character\
    \ with code hhhh |\n| \\Uhhhhhhhh | Unicode character with code hhhhhhhh |\n|\
    \ \\N{name} | Unicode character with name name |\n\nTable 10: Escape Sequences\n\
    \nIf a string contains backslashes, but the intention is not to denote escape\
    \ sequences, the backslashes need to be escaped as shown in the table above. If\
    \ however, the string contains many such backslashes, the entire string can be\
    \ passed to Python as a raw string using the prefix r or R. In such cases, all\
    \ characters are retained within the string without any special meaning and therefore\
    \ no escape sequences are processed. Examples of escape sequences and raw strings\
    \ follow.\n\n## Examples:\n\n```\n>>> \"\\tHello\\nWorld\\b\\n\\101\\x41\"\n'\\\
    tHello\\nWorld\\x08\\nAA'\n>>> r\"\\tHello\\nWorld\\b\\n\\101\\x41\"\n'\\tHello\\\
    nWorld\\b\\n\\101\\x41'\n>>> R\"\\tHello\\nWorld\\b\\n\\101\\x41\"\n'\\tHello\\\
    nWorld\\b\\n\\101\\x41'\n```\n\n## Observation:\n\n1. The character A has an ASCII\
    \ code of 65, which is 101 in octal and 41 in hexadecimal. These codes have been\
    \ used in the examples above.\n2. Python processes certain escape sequences and\
    \ represents them in a different form (\\b became \\x08 and \\x41 became A).\n\
    3. The r or R prefix will escape any backslashes so that they represent the literal\
    \ backslash character rather than indicating an escape sequence.\n\n## 2.3.4.2\
    \ Operations on Type string\n\nMany useful functions are present in the string\
    \ class to process strings and while some of them are documented in the tables\
    \ below, formatting will be covered in section 8.7 and more formatting related\
    \ functions will be examined in section 8.6:\n\n| Expression | Result | Meaning\
    \ |\n| :--- | :--- | :--- |\n| 'aBc'.lower() | 'abc' | Converts all characters\
    \ to lowercase |\n| 'aBc'.upper() | 'ABC' | Converts all characters to uppercase\
    \ |\n| 'hello woRLD'.capitalize() | 'Hello world' | Converts all characters to\
    \ lowercase and the first character to uppercase |\n| 'hello woRLD'.title() |\
    \ 'Hello World' | Converts all characters to lowercase and the first character\
    \ of every word to uppercase |\n| 'hello woRLD'.swapcase() | 'HELLO WOrld' | Converts\
    \ all lowercase characters to uppercase and vice-versa |\n\nTable 11: Case conversion\
    \ functions of string\n\n## 2. Python Basics\n\n| Expression | Result | Meaning\
    \ |\n| :--- | :--- | :--- |\n| 'abc'.isalpha() | True | Returns true if all characters\
    \ of the given string are alphabetic and the string is non-null; returns false\
    \ otherwise |\n| 'abc'.isupper() | False | Returns true if all alphabetic characters\
    \ in the string are in uppercase and there is at least one alphabet; returns false\
    \ otherwise |\n| 'abc'.islower() | True | Returns true if all alphabetic characters\
    \ in the string are in lowercase and there is at least one alphabet; returns false\
    \ otherwise |\n| 'abc'.isnumeric() | False | Returns true if all characters in\
    \ the string are numeric and the string is non-null; returns false otherwise |\n\
    | 'abc'.isalnum() | True | Returns true if all characters in the string are alphanumeric\
    \ (alphabetic or numeric) and the string is non-null; returns false otherwise\
    \ |\n| 'abc'.isidentifier() | True | Returns true if the string contents can be\
    \ a valid identifier; returns false otherwise |\n| 'abc'.istitle() | False | Returns\
    \ true if the string contents are in title case; returns false otherwise |\n|\
    \ 'abc'.isprintable() | True | Returns true if all characters of the string are\
    \ printable; returns false otherwise |\n| 'abc'.isspace() | False | Returns true\
    \ if all characters of the string are whitespace characters and the string is\
    \ non-null; returns false otherwise |\n\nTable 12: Content testing functions of\
    \ string\n\n> **NOTE:**\nThe type `string` also supports comparisons, covered\
    \ in section 2.3.1.2 and Boolean operations, covered in section 2.3.5.2.\n\nString\
    \ concatenation can be achieved by using the вАЬ+вАЭ operator. Furthermore, string\
    \ literals separated by only whitespaces are implicitly concatenated.\n\n**Examples:**\n\
    \n```\n>>> \"Hello\" + 'world'\n'Helloworld'\n>>> \"Hello\"   'world'\n'Helloworld'\n\
    ```\n\n> **NOTE:**\n\nDo not conclude from the above examples that the вАЬ+вАЭ operator\
    \ is not required in Python вАУ remember that вАЬ+вАЭ can concatenate the contents of\
    \ two strings referred to by variables at runtime! Check out the code snippet\
    \ below:\n\n```\n>>> x=\"abc\"\n>>> y=\"xyz\"\n>>> x+y\n'abcxyz'\n>>> x y\n  File\
    \ \"<stdin>\", line 1\n    x y\n      ^\nSyntaxError: invalid syntax\n```\n\n\
    ## 2.3.5 The `bool` type\n\nThe `bool` type allows us to represent Boolean values.\n\
    \n### 2.3.5.1 Literals of Type `bool`\n\nThe two possible Boolean values are `True`\
    \ and `False`, which are keywords in Python, and objects of class `bool` at the\
    \ same time.\n\nObjects of type `bool` can also be created using the explicit\
    \ constructor of class `bool`. This of course also resembles a function call for\
    \ type conversion. Thus, the following two statements are identical in function:\n\
    \n**Example:**\n\n```\nx = True\nx = bool(True)\n```\n\nThis built-in function\
    \ is also helpful for converting other types like `int` and `string` to the type\
    \ `bool`. Also, the default constructor of `bool` class will create a `bool` with\
    \ value `False`.\n\n```\n>>> bool(0)\nFalse\n>>> bool(10)\nTrue\n>>> bool(0.0)\n\
    False\n>>> bool(-12.5)\nTrue\n>>> bool(\"hello\")\nTrue\n>>> bool(\"\")\nFalse\n\
    >>> bool()\nFalse\n```\n\n> **NOTE:**\nSection 20.1.1.4 discusses conversion to\
    \ `bool` in detail and can throw more light on why we are getting the above output.\n\
    \n### 2.3.5.2 Operations on Type bool\n\nThe most common and practical operations\
    \ on Boolean types are Boolean operations of `and`, `or` and `not`.\n\nThe `and`\
    \ operator performs a logical AND operation. It is a short-circuiting operator,\
    \ implying that if the result can be obtained after evaluation of the first operand\
    \ itself, it does not bother evaluating the second operand.\n\n**Examples:**\n\
    \n```\n>>> True and False\nFalse\n>>> False and True\nFalse\n>>> True and True\n\
    True\n```\n\nThe `and` operator can work on other types too! To generalise it's\
    \ working, consider the example `x and y`.\n\n- If `x` evaluates to `False`, the\
    \ result is `x`\n- If `x` evaluates to `True`, the result is `y`\n\n```\n>>> 2\
    \ and 5\n5\n>>> 5 and 2\n2\n>>> 0 and 5\n0\n```\n\nThe `or` operator performs\
    \ a logical OR operation. It is a short-circuiting operator, implying that if\
    \ the result can be obtained after evaluation of the first operand itself, it\
    \ does not bother evaluating the second operand.\n\n**Examples:**\n\n```\n>>>\
    \ True or False\nTrue\n>>> False or True\nTrue\n>>> False or False\nFalse\n```\n\
    \nThe `or` operator can work on other types too! To generalise it's working, consider\
    \ the example `x or y`.\n\n- If `x` evaluates to `False`, the result is `y`\n\
    - If `x` evaluates to `True`, the result is `x`\n\n```\n>>> 2 or 5\n2\n>>> 5 or\
    \ 2\n5\n>>> 0 or 5\n5\n```\n\nThe `not` operator performs a logical NOT operation."
