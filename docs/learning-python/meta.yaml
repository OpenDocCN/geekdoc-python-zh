    To add elements at any desired location within the list, the `list.insert(i,x)`
    function can be used, which inserts the element `x` at index `i` within the list
    `list`:


    ```

    >>> L=[5,2,3]

    >>> L.insert(2,9)

    >>> L

    [5, 2, 9, 3]

    ```


    > **NOTE:**


    `list.insert(i,x)` is similar to `list[i:i]=[x]`


    `list.append(x)` is similar to `list.insert(len(list),x)`


    Note that inserting at an index beyond the end of the list will end up in an insertion
    at the end of the list (an append operation):


    ```

    >>> L=[5,2,3,2]

    >>> L.insert(50,9)

    >>> L

    [5, 2, 3, 2, 9]

    ```


    # 4.7.3 Deleting Elements


    There are many different ways of deleting elements from a list. Before we explore
    these, keep in mind that deleting elements from a list is different from replacing
    elements in a list, something that we have already covered in section 4.2.


    # 4.7.3.1 Using del to Delete an Element


    The first way to delete an element at a specific position in the list is by using
    the `del` statement, similar to the way we had used it for deleting variables
    in section 2.6:


    ```

    >>> L=[5,2,3]

    >>> del L[1]

    >>> L

    [5, 3]

    ```'
