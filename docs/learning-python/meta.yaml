    \ range() еЗљжХ∞дЄ≠дљњзФ®дЇЖ lim+1пЉМеЫ†дЄЇ range() еЗљжХ∞жОТйЩ§жЬАеРОдЄАдЄ™еАЉгАВеЊ™зОѓдљУжИЦе§ЪжИЦе∞СжШѓжЭ•иЗ™ prime3.py зЪДдї£з†БгАВ\n2.  жИСдїђеПСзО∞дЄНйЬАи¶БдљњзФ®еЬ®\
