    # Observation:


    +   1. Do note that each of the examples given here are in different interactive
    sessions, as in a single session all previous imports are remembered!

    2. The statement `import pkg1.mod1` imports the entire symbol `pkg1.mod1`. It
    is understood from this syntax that `pkg1` is the name of a package whereas `mod1`
    is the name of a module.

    3. The statement `pkg1.mod1.f()` invokes the function `f` of the imported symbol
    `pkg1.mod1`, which is nothing but the module `mod1` within the package `pkg1`.


    ```

    >>> from pkg1 import mod1

    >>> mod1.f()

    This is mod1''s f

    ```


    # Observation:


    +   1. The statement `from pkg1 import mod1` imports the symbol `mod1` from within
    `pkg1`, making `mod1` directly accessible.

    2. The statement `mod1.f()` then invokes the function `f` using the module name
    that was imported.


    ```

    >>> from pkg1.mod1 import f

    >>> f()

    This is mod1''s f

    ```


    # Observation:


    +   1. The statement `from pkg1.mod1 import f` imports the symbol `f` from the
    module `mod1` within the package `pkg1`.

    2. The function `f` can now be directly invoked.


    We therefore conclude that the following syntaxes are possible:


    ```

    packageName.moduleName

    packageName.moduleName.functionName

    packageName.moduleName.variableName

    ```'
- md: "## 15. Modules\n\nWe will now demonstrate the execution of packages (`__init__.py`)\
    \ and modules by making changes in the above setup, creating a new package `pkg2`\
    \ to demonstrate this:\n\n```\npkg2/__init__.py\n\n#!/usr/bin/python\n\n# Demonstration\
    \ of packages\n# Package execution\n\nprint(\"Package loaded successfully!\")\n\
    ```\n\n```\npkg2/mod1.py\n\n#!/usr/bin/python\n\n# Demonstration of modules within\
    \ packages\n# Module mod1 containing function f\n\ndef f():\n    print(\"This\
    \ is mod1's f\")\n\nprint(\"Module mod1 loaded successfully!\")\n```\n\n```\n\
    pkg2/mod2.py\n\n#!/usr/bin/python\n\n# Demonstration of modules within packages\n\
    # Module mod2 containing function f\n\ndef f():\n    print(\"This is mod2's f\"\
    )\n\nprint(\"Module mod2 loaded successfully!\")\n```\n\n### Observation:\n\n\
    - 1. The filenames `mod1.py` and `mod2.py` do not clash with what we had done\
    \ previously as they are in a different directory `pkg2`. For the same reason,\
    \ the modules `mod1` and `mod2` of package `pkg2` will not clash with the modules\
    \ of the same name in the package `pkg1`.\n- 2. We have added `print` statements\
    \ in these 3 files to find out when they execute.\n\nThe same interactive sessions\
    \ given for the previous package demo is presented here for this new package:\n\
    \n```\n>>> import pkg2.mod1\nPackage loaded successfully!\nModule mod1 loaded\
    \ successfully!\n>>> pkg2.mod1.f()\nThis is mod1's f\n```\n\n```\n>>> from pkg2\
    \ import mod1\nPackage loaded successfully!\nModule mod1 loaded successfully!\n\
    >>> mod1.f()\nThis is mod1's f\n```\n\n```\n>>> from pkg2.mod1 import f\nPackage\
    \ loaded successfully!\nModule mod1 loaded successfully!\n>>> f()\nThis is mod1's\
    \ f\n```\n\n```\n>>> from pkg2 import mod1, mod2\nPackage loaded successfully!\n\
    Module mod1 loaded successfully!\nModule mod2 loaded successfully!\n```\n\n###\
    \ Observation:\n\n- 1. When a package (or any of its modules) is imported for\
    \ the first time, the package gets executed first (and by that we mean that the\
    \ file `__init__.py` within that package gets executed).\n- 2. A package always\
    \ gets executed before any of its modules.\n\n## 15.5 Subpackages\n\nA package\
    \ can not only contain modules, but can also contain subpackages (which recursively\
    \ can contain subpackages and modules). This concept is identical to the physical\
    \ concept in a filesystem that a directory can not only contain files, but can\
    \ also contain subdirectories (which recursively can contain subdirectories and\
    \ files).\n\nThus, some more valid syntaxes that now become possible are:\n\n\
    ```\npackageName.subpackageName\npackageName.subpackageName.moduleName\npackageName.subPackageName.moduleName.functionName\n\
    packageName.subPackageName.moduleName.variableName\npackageName.subpackageName.subpackageName.moduleName\n\
    ```\n\nHere is a demonstration of a package `pkg3` contain a subpackage `subpkg`,\
    \ containing a module `mod`, containing a function `f`:\n\n```\npkg3/__init__.py\n\
    \n#!/usr/bin/python\n\n# Demonstration of packages\n# Subpackage demo\n\nprint(\"\
    Package pkg3 loaded successfully!\")\n```\n\n```\npkg3/subpkg/__init__.py\n\n\
    #!/usr/bin/python\n\n# Demonstration of packages\n# Subpackage demo\n\nprint(\"\
    Subpackage subpkg loaded successfully!\")\n```\n\n```\npkg3/subpkg/mod.py\n\n\
    #!/usr/bin/python\n\n# Demonstration of modules within subpackages\n# Module mod\
    \ containing function f\n\ndef f():\n    print(\"This is mod's f\")\n\nprint(\"\
    Module mod loaded successfully!\")\n```\n\nInteractive session:\n\n```\n>>> from\
    \ pkg3.subpkg.mod import f\nPackage pkg3 loaded successfully!\nSubpackage subpkg\
    \ loaded successfully!\nModule mod loaded successfully!\n>>> f()\nThis is mod's\
    \ f\n```\n\n### Observation:\n\n- 1. Subpackages are also packages and must contain\
    \ the file `__init__.py`.\n- 2. Packages are always executed before their subpackages.\n\
    \n## 15.6 Locating Modules and Packages\n\nWe have seen how Python locates and\
    \ imports packages and modules when using the `import` statement. What we haven't\
    \ formally discussed is how exactly Python searches for these files and where\
    \ all does it search. We do know the following:\n\n- 1. Section 15.2 introduced\
    \ the fact that module names match filenames and helps Python locate them.\n-\
    \ 2. Section 15.4 introduced the fact that package names match directory names\
    \ and helps Python locate them.\n\nThe question we are addressing in this section\
    \ is: which all directories does Python search for packages and modules, and if\
    \ we wish to add certain additional directories to the search path, how do we\
    \ do so? Let's address this piece by piece.\n\nWhenever a package or module is\
    \ imported, Python first checks if it refers to a built-in package/module, and\
    \ if so imports it directly. Otherwise, Python assumes it to be a library package/module\
    \ or user-defined package/module and relies on a variable `sys.path`.\n\nPython\
    \ searches for packages and modules in the list of directories stored in the variable\
    \ `sys.path`. The contents of `sys.path` on my system is shown below:\n\n```\n\
    >>> import sys\n>>> sys.path\n['', '/usr/lib64/python35.zip', '/usr/lib64/python3.5',\n\
    '/usr/lib64/python3.5/plat-linux', '/usr/lib64/python3.5/lib-dynload',\n'/usr/lib64/python3.5/site-packages',\
    \ '/usr/lib/python3.5/site-packages']\n```\n\n**Observation:**\n\n- 1. Any package/module\
    \ imported will be searched through the above directories in sequential order\
