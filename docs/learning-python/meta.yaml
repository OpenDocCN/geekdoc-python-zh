    # 17.3.4.5 Extracting the Recursive String Content Within a Tag


    A very powerful capability of BeautifulSoup is the functionality to extract all
    text within a tag and it''s child tags! This is demonstrated below:


    ```

    (continuation of previous session)

    >>> tag=soup.div

    >>> tag

    <div class="main content" id="main">

    <p>This is <b>Bold</b></p>

    <p>This is <i>Italics</i></p>

    <p>This is <u>Underlined</u></p>

    </div>

    >>> print(tag.get_text())


    This is Bold

    This is Italics

    This is Underlined


    >>>

    ```


    **Observation:**


    +   1. We have extracted the `div` tag.

    2. We see that the `div` tag contains 3 `p` tags inside it, which in turn contain
    text. In addition, there are newlines.

    3. The `get_text()` method has concatenated and returned the strings within each
    `p` tag inside the `div` tag.


    # 17.3.5 Navigating Through the Parse Tree


    The previous section showed how we can extract certain `Tag` objects from within
    the parse tree and then proceed to extract details from within the `Tag` object.
    This section shows how we can navigate from one `Tag` object to another in the
    parse tree.


    Given that the parse tree is a tree, there are 3 types of navigation possible:


    +   1. Navigation from a `Tag` to it''s children

    2. Navigation from a `Tag` to it''s parent

    3. Navigation from a `Tag` to it''s siblings'
  - '[PAGE 586]


    The following sections will cover all these possibilities using the following
    attributes of the `Tag` class:


    ```

    Tag.contents

    Tag.children

    Tag.descendants

    Tag.parent

    Tag.parents

    Tag.next_sibling

    Tag.previous_sibling

    Tag.next_siblings

    Tag.previous_siblings

    Tag.next_element

    Tag.previous_element

    Tag.next_elements

    Tag.previous_elements

    ```


    # 17.3.5.1 Navigating to Children


    Each tag can have any number of child nodes and they can be accessed as a list
    using the `contents` attribute as shown below:


    ```

    (continuation of previous session)

    >>> tag=soup.div

    >>> tag.contents

    [''\n'', <p>This is <b>Bold</b></p>, ''\n'', <p>This is <i>Italics</i></p>, ''\n'',
    <p>This is <u>Underlined</u></p>, ''\n'']

    ```


    **Observation:**


    +   1. The child nodes of the `div` Tag includes string nodes and other `Tag`
    nodes.

    2. The string nodes merely contain the text that was present within the `Tag`
    whereas the `Tag` nodes can contain additional content within them.

    3. Though the output looks like a list of string objects, in reality it is a list
    of `NavigableString` and `Tag` objects

    4. The order of the elements in the list is the same as the order in which they
    appear in the HTML content parsed.'
  - '[PAGE 587]


    If the goal is to iterate over the children, the `children` attribute can be used
    instead, which will prove more efficient:


    ```

    (continuation of previous session)

    >>> tag=soup.div

    >>> for child in tag.children:

    ...     print("["+str(child)+"]")

    ...

    [

    ]

    [<p>This is <b>Bold</b></p>]

    [

    ]

    [<p>This is <i>Italics</i></p>]

    [

    ]

    [<p>This is <u>Underlined</u></p>]

    [

    ]

    ```


    **Observation:**


    +   1. We iterate over the children of the given `Tag` object.

    2. This code that uses `children` is slightly more efficient than a similar code
    written using `contents`, but the output is the same. We are avoiding the creation
    of a list of child elements here.


    While the previous example showed how to visit the immediate children using the
    `children` attribute, it is also possible to similarly visit all the descendants
    (children recursively) using the `descendants` attribute as shown below:


    ```

    (continuation of previous session)

    >>> tag=soup.div

    >>> for child in tag.descendants:

    ...     print("["+str(child)+"]")

    ...

    [

    ]

    [<p>This is <b>Bold</b></p>]

    [This is ]

    [<b>Bold</b>]

    [Bold]

    [

    ]

    [<p>This is <i>Italics</i></p>]

    ```'
  - '[PAGE 588]


    ```

    [This is ]

    [<i>Italics</i>]

    [Italics]

    [

    ]

    [<p>This is <u>Underlined</u></p>]

    [This is ]

    [<u>Underlined</u>]

    [Underlined]

    [

    ]

    ```


    **Observation:**


    +   1. This not only shows the immediate children, but their children too!

    2. Nested tags are shown as single entries.


    # **17.3.5.2 Navigating to Parent**


    Being a tree structure, each `Tag` object in the parse tree will have exactly
    one parent, and tracing and ancestry will take us finally to the вАЬdocumentвАЭ node
    that has no parent. The immediate parent of a `Tag` can be accessed using the
    `parent` attribute as shown below:


    ```

    (continuation of previous session)

    >>> tag=soup.div

    >>> tag.parent.name

    ''body''

    >>> tag.parent.parent.name

    ''html''

    >>> tag.parent.parent.parent.name

    ''[document]''

    ```


    **Observation:**


    +   1. The parent of the `div` Tag is the `body` Tag.

    2. The parent of the `body` Tag is the `html` Tag.

    3. The parent of the `html` Tag is the `document` element.

    4. The parent of the `document` element is `None` (not demonstrated here).


    It is possible to iterate over the ancestors of a `Tag` object using the `parents`
    attribute:'
  - '[PAGE 589]


    ```

    >>> for parent in tag.parents:

    ...     print(parent.name)

    ...

    body

    html

    [document]

    ```


    **Observation:**


    +   1. We see the ancestors of the `div` Tag in order: `body`, `html` and `document`.


    # 17.3.5.3 Navigating to Siblings


    Having seen how to traverse up and down the tree, we will now see how to traverse
    sideways in the tree to the peer nodes. Nodes sharing a common parent are technically
    siblings and can be accessed using the `next_sibling` and `previous_sibling` attributes
    as demonstrated below:


    ```

    (continuation of previous session)

    >>> tag=soup.p

    >>> tag

    <p>This is <b>Bold</b></p>

    >>> tag.next_sibling

    ''\n''

    >>> tag.next_sibling.next_sibling

    <p>This is <i>Italics</i></p>

    >>> tag.previous_sibling

    ''\n''

    >>> tag.previous_sibling.previous_sibling

    >>>

    ```


    **Observation:**


    +   1. We are starting with the first `p` tag within the `div` tag.

    2. It''s next sibling is a text node with content "\n".

    3. The sibling after that is the next `p` tag.

    4. The previous sibling to the first `p` tag is a text node with content "\n"
    - this is the newline after the `<div>` tag!


    Once again, we can choose to iterate over the siblings using `next_siblings` and
    `previous_siblings`:'
- md: '(continuation of previous session)

    >>> tag=soup.p

    >>> for sibling in tag.next_siblings:

    ...     print(sibling)

    ...


    <p>This is <i>Italics</i></p>


    <p>This is <u>Underlined</u></p>


    >>>


    **Observation:**


    1. We start with the first p tag and iterate over the siblings ahead.

    2. This gives us all the text nodes and other p tags as well.

    3. The blank lines we see are because of the text nodes that contain вАЬ\nвАЭ as their
    content.


    Finally, just as how we accessed the next and previous siblings, we can also access
    the previous and next elements (nodes) of the parse tree using `next_element`
    and `previous_element`:


    ```

    (continuation of previous session)

    >>> tag=soup.p

    >>> tag

    <p>This is <b>Bold</b></p>

    >>> tag.next_element

    ''This is ''

    >>> tag.previous_element

    ''\n''

    ```


    **Observation:**


    1. The next element in the parse tree need not be the next sibling, as can be
    seen in the output above.

    2. The previous element in the parse tree need not be the previous sibling (but
    is indeed the previous sibling in the output above).


    We can traverse all the elements following a particular one using `next_elements`
    till the end of the parse tree (the last leaf node), and can iterate over all
    previous elements till the document element using `previous_elements`. Here is
    a demonstration of `next_elements`:


    ```

    (continuation of previous session)

    >>> tag=soup.p

    >>> for element in tag.next_elements:

    ...     print(element)

    ...

    This is

    <b>Bold</b>

    Bold


    <p>This is <i>Italics</i></p>

    This is

    <i>Italics</i>

    Italics


    <p>This is <u>Underlined</u></p>

    This is

    <u>Underlined</u>

    Underlined


    >>>

    ```


    **Observation:**


    1. We see that we get all the HTML content that appeared after the p tag.

    2. The blank lines we see are the text content (newlines) that exist after every
    tag in the HTML content.


    Here is a demonstration of `previous_elements`:


    ```

    (continuation of previous session)

    >>> tag=soup.p

    >>> for element in tag.previous_elements:

    ...     print(element)

    ...


    <div class="main content" id="main">

    <p>This is <b>Bold</b></p>

    <p>This is <i>Italics</i></p>

    <p>This is <u>Underlined</u></p>

    </div>


    <body>

