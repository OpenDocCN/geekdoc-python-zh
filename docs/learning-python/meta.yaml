    \ |  Data and other attributes defined here:\n |  \n |  __new__ = <built-in method\
    \ __new__ of type object>\n |      T.__new__(S, ...) -> a new object with type\
    \ S, a subtype of T\n```\n\n## 10.16 Programs Based on Functions\n\nQ. Write a\
    \ program to find the combination of 2 integers using functions.\n\n## 10. Functions\n\
    \n### combination.py\n\n```python\n#!/usr/bin/python\n\n# Program to find the\
    \ combination of 2 integers using functions.\n\nfrom math import factorial\n\n\
    def ncr(n,r):\n    return int(factorial(n)/(factorial(r)*factorial(n-r)))\n\n\
    x,y = input(\"Enter 2 integers:\").split(' ')\nx,y = int(x),int(y)\nprint(\"The\
    \ combination of {} and {} is {}\".format(x,y,ncr(x,y)))\n```\n\n### Observation:\n\
    \n1.  Line 10 receives 2 values from the user in a single line, using the `split()`\
    \ function to split the line into 2 values at the space.\n2.  Line 11 converts\
    \ the strings in `x` and `y` into integers and stores them back into the same\
    \ variables.\n3.  The combination is found using the `ncr` function defined in\
    \ line 7. This function uses the built-in `factorial` function from the `math`\
    \ module.\n4.  The `math.factorial` function becomes directly available in the\
    \ program due to the `import` in line 5.\n\n## 10.17 Questions\n\n1.  List the\
    \ advantages of functions.\n2.  Write short notes on positional arguments and\
    \ default arguments.\n3.  Write short notes on function definition and function\
    \ call in Python.\n4.  Write a short note on keyword arguments.\n5.  Explain how\
    \ variable arguments can be processed by a function in Python.\n6.  What will\
    \ be the return value of a function in Python if no return statement is present\
    \ in the function?\n7.  Explain 2 different ways in which a function can return\
    \ multiple values back to the caller.\n8.  Can a nested function be called from\
    \ the global scope in Python? Elaborate.\n9.  What are lambda expressions in python?\
    \ Explain with syntax and examples.\n\n## 10.18 Exercises\n\n1.  Write a program\
    \ using functions to check if a given number is an ugly number. Ugly numbers are\
    \ positive numbers whose only prime factors are 2, 3 or 5.\n2.  Write a function\
    \ in Python to calculate and return the average of a given list of integers.\n\
    3.  Write a function in Python called `isIn()` to check for the existence of a\
    \ substring within a string returning a Boolean value.\n4.  Write a function in\
    \ Python to demonstrate keyword arguments.\n5.  Write a script in Python to demonstrate\
    \ nested functions.\n6.  Write a lambda expression to convert a given angle from\
    \ degrees to radians.\n7.  Write a function to find the distance between 2 points,\
    \ where each point is passed as a tuple to the function.\n\n## SUMMARY\n\n-  \
    \ Functions need to be defined before they can be called.\n-   Functions are objects\
    \ and references to them can be stored in variables!\n-   Positional Arguments\
    \ are always assigned on a one-to-one basis, from the function call arguments\
    \ to the function definition parameters.\n-   Default Arguments cannot be followed\
    \ by Positional Arguments. Any default argument omitted at the place of call will\
    \ take on its default value in the definition.\n-   Keyword Arguments can be used\
    \ to change the order of Positional Arguments at the place of function call.\n\
    -   Keyword Arguments can be used to specify certain Default Arguments while leaving\
    \ out others.\n-   Keyword Arguments permit the creation of dynamic, user-defined\
    \ parameters that can be received and processed by the function without documenting\
    \ the parameter names in advance!\n-   Keyword Arguments cannot be followed by\
    \ non-keyword arguments.\n-   Variable Arguments permit the function call to pass\
    \ as many arguments as required and yet be processed using a single collection\
    \ variable in the function definition.\n-   Variable Arguments should not be followed\
    \ by Positional Arguments in the function definition parameter list."
