    >>> data='<html><body><p class=\"para text\" id=\"1\">This is a <b>test</b><p><br/></body></html>'\n\
    >>> soup=BeautifulSoup(data)\n>>> print(soup.prettify())\n<html>\n <body>\n  <p\
    \ class=\"para text\" id=\"1\">\n   This is a\n   <b>\n    test\n   </b>\n  </p>\n\
    \  <p>\n   <br/>\n  </p>\n </body>\n</html>\n```\n\n`prettify`жЦєж≥Хж†ЉеЉПеМЦHTMLеЖЕеЃєеєґе∞ЖеЕґдљЬдЄЇе≠Чзђ¶дЄ≤ињФеЫЮгАВеЃМжХіиѓ≠ж≥Хе¶ВдЄЛпЉЪ\n\
