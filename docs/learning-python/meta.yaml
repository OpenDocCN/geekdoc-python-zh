  md: "> **NOTE:**\n\nSince braces ({ }) with commas (,) denote sets and braces with\
    \ colons (:) denote dictionaries, the question might arise what does empty braces\
    \ mean? The answer is that empty braces always indicate empty dictionaries and\
    \ therefore the empty sets have to be created only by using `set()`.\n\n# 7.2\
    \ Accessing Dictionary Elements\n\nA dictionary can be viewed as a special kind\
    \ of array whose subscripts are strings instead of integers. Such arrays are called\
    \ *associative arrays*. The same `[]` operator that is used to access an element\
    \ of a list given it's index can be used to access a value in a dictionary given\
    \ it's key:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n>>> D['apple']\n'red'\n\
    >>> D['grapes']\n'green'\n```\n\nAn attempt to access a value using a key that\
