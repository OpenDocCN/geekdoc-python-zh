- md: "## 13.2.5 The finally Clause\n\nSometimes, there is a need to perform some\
    \ task irrespective of whether an exception occurred or not. Many a times, this\
    \ is generally some clean-up that needs to be performed whether or not exceptions\
    \ were raised, like closing files or disconnecting from a server. The `finally`\
    \ clause helps in guaranteeing the execution of its contents in all cases вАУ if\
    \ an exception had occurred and even if it hadn't. The syntax now becomes as follows:\n\
    \n```\ntry:\n    ... # try block\nexcept:\n    ... # except block\nelse:\n   \
    \ ... # else block\nfinally:\n    ... # finally block\n```\n\nThe flow of control\
    \ through this construct is shown in the flowchart below. Let us revisit this\
    \ once again in detail:\n\n1.  The exception monitoring block is the `try` block.\
    \ The exception response is the `except` block. The `else` block is a continuation\
    \ of the `try` block but without exception monitoring. The `finally` block is\
    \ a continuation of both the `else` block (or the `try` block if the `else` block\
    \ is not present) and the `except` block.\n2.  When this construct is executed,\
    \ control passes on sequentially through all statements in the `try` block. If\
    \ any of these statements raise an exception, control comes out of the `try` block\
    \ and examines the `except` block(s).\n3.  If it finds a suitable `except` block,\
    \ then that `except` block gets executed, ignoring all other `except` blocks and\
    \ control then resumes in the `finally` block, after which control comes out of\
    \ this construct.\n4.  If it doesn't find a suitable `except` block capable of\
    \ handling the exception raised, then the exception has to be propagated to the\
    \ outer level (covered in section 13.4 in detail). But before propagation, the\
    \ `finally` block is executed.\n5.  If no exception is raised in the `try` block,\
    \ control jumps to the `else` block and continues execution.\n6.  If any exception\
    \ is raised in the `else` block, the exception propagates to the outer level (covered\
    \ in section 13.4 in detail), but only after executing the `finally` block.\n\
    7.  If no exceptions were raised in the `else` block also, then control resumes\
    \ in the `finally` block before coming out the construct.\n8.  If any exceptions\
    \ are raised in the `finally` block, they are propagated to the outer level (covered\
    \ in section 13.4 in detail).\n\nThe only case when the `finally` block does not\
    \ get executed is when the script is terminated (section 3.4.4).\n\nLet us apply\
    \ our understanding of this to `ExceptionHandlingDemo6.py`:\n\n### ExceptionHandlingDemo7.py\n\
    \n```\n#!/usr/bin/python\n\n# Exception Handling Demo\n# The finally clause\n\n\
    try:\n    n = int(input(\"Enter an integer:\"))\n    quotient = int(100/n)\nexcept:\n\
    \    print(\"Oops! Unable to calculate!\")\nelse:\n    print(\"100/{} = {}\".format(n,quotient))\n\
    finally:\n    print(\"Thanks for using this program!\")\n```\n\n### Output:\n\n\
    ```\nEnter an integer:5\n100/5 = 20\nThanks for using this program!\n```\n\n```\n\
    Enter an integer:0\nOops! Unable to calculate!\nThanks for using this program!\n\
    ```\n\n```\nEnter an integer:hi\nOops! Unable to calculate!\nThanks for using\
    \ this program!\n```\n\n### Observation:\n\n1.  This program is based on `ExceptionHandlingDemo6.py`\
    \ and also produces the same output.\n2.  Line 14, which is inside the `finally`\
    \ block, will be executed regardless of whether an exception was raised in the\
    \ `try` block or not.\n\n## 13.3 Raising Exceptions\n\nSo far we have seen how\
    \ to handle exceptions when they are raised. We have also seen exactly when some\
    \ exceptions are raised вАУ for example, we know that `ZeroDivisionError` is raised\
    \ when we attempt to perform a division by 0. In this section, we will learn how\
    \ we can raise exceptions ourselves whenever we want to.\n\nTo raise an exception,\
    \ 2 steps need to be followed:\n\n1.  We need to create an exception object that\
    \ has to be raised. This object will belong to a class that should derive directly\
    \ or indirectly from the built-in `Exception` class. All built-in exception classes\
    \ derive from the `Exception` class.\n2.  We need to use the `raise` statement\
    \ to raise this exception object, as shown in the syntax below.\n\n```\nraise\
    \ exceptionInstance\n```\n\nExample:\n\n```\n>>> e=ZeroDivisionError()\n>>> raise\
    \ e\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    ZeroDivisionError\n```\n\nWhile it is necessary to follow the above mentioned\
    \ 2 steps in order to raise an exception, it is more practical to combine the\
    \ 2 steps into one by explicitly instantiating the exception class in the `raise`\
    \ statement itself as shown below:\n\n```\n>>> raise ZeroDivisionError()\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nZeroDivisionError\n\
    ```\n\nThe reasons why we prefer this approach are:\n\n1.  We generally need the\
    \ exception object only to pass it to `raise`. We therefore do not access the\
    \ variable that references the exception object and using a variable name for\
    \ this is therefore a waste.\n2.  We do not prefer to create an exception object\
    \ in advance and then `raise` it if necessary. Remember that exceptions are supposed\
    \ to be rare and creating such exception objects in advance is inefficient. Indeed,\
    \ in many situations, it may be impossible to create an exception object in advance\
    \ as more information regarding the exception might be needed in order to instantiate\
    \ it, and this information would not be available if the exception has not even\
    \ occurred.\n3.  We find it more convenient to use this syntax that combines the\
    \ 2 steps into one.\n\nLet us revisit `ExceptionHandlingDemo2.py` and raise `ValueError`\
    \ if the given input is greater than 100:\n\n### ExceptionHandlingDemo8.py\n\n\
    ```\n#!/usr/bin/python\n\n# Exception Handling Demo\n# The raise statement\n\n\
    try:\n    n = int(input(\"Enter an integer:\"))\n    if n>100: raise ValueError()\n\
    \    quotient = int(100/n)\n    print(\"100/{} = {}\".format(n,quotient))\nexcept\
    \ ValueError:\n    print(\"Please enter an integer less than 100!\")\nexcept ZeroDivisionError:\n\
