    \   x=3\n...     print(x)\n...\n>>> print(x)\n2\n>>> f()\n3\n>>> print(x)\n2\n\
    ```\n\n**иІВеѓЯпЉЪ**\n\n1.  `x=2` ињЩдЄАи°МеЉХеЕ•дЇЖдЄАдЄ™еРНдЄЇ `x`гАБеАЉдЄЇ 2 зЪДеЕ®е±АеПШйЗПгАВ\n2.  еЗљжХ∞ `f` еЉХзФ®дЇЖеПШйЗП `x`пЉМдљЖињЩиҐЂеБЗеЃЪдЄЇдЄАдЄ™е±АйГ®еПШйЗП\
    \ `x`пЉМеЃГеѓєдЇОеЗљжХ∞ `f` жШѓе±АйГ®зЪДгАВиѓ•еПШйЗПеЬ®еЗљжХ∞иҐЂи∞ГзФ®жЧґеИЫеїЇпЉМеЬ®еЗљжХ∞ињФеЫЮжЧґйФАжѓБгАВзДґиАМпЉМеЬ®еЗљжХ∞зЪДзФЯеСљеС®жЬЯеЖЕпЉМеЃГзЪДеАЉдЄЇ 3гАВ\n3.  еЗљжХ∞еЖЕйГ®еѓєеПШйЗПзЪДдїїдљХеЉХзФ®йїШиЃ§йГљиҐЂеБЗеЃЪдЄЇе±АйГ®еЉХзФ®гАВеЗљжХ∞е§ЦйГ®еѓєеПШйЗПзЪДдїїдљХеЉХзФ®йГљиҐЂеБЗеЃЪдЄЇеЕ®е±АеЉХзФ®гАВ\n\
    4.  жЙАжЬЙеЗљжХ∞е§ЦйГ®еѓє `x` зЪДдїїдљХеЉХзФ®йГљжШѓеѓєеЕ®е±АеПШйЗП `x` зЪДеЉХзФ®пЉМеЕґеАЉдЄЇ 2гАВеЗљжХ∞ `f` еЖЕйГ®еѓє `x` зЪДдїїдљХеЉХзФ®йГљжШѓеѓєе±АйГ®еПШйЗП `x` зЪДеЉХзФ®пЉМеЕґеАЉдЄЇ\
    \ 3гАВ\n\nе¶ВжЮЬеЬ®еЙНйЭҐзЪДдЊЛе≠РдЄ≠пЉМжИСдїђеЄМжЬЫеЗљжХ∞дљњзФ®еЕ®е±АеПШйЗП `x` иАМдЄНжШѓеИЫеїЇдЄАдЄ™жЦ∞зЪДе±АйГ®еПШйЗПеСҐпЉЯжИСдїђдљњзФ®еЕ≥йФЃе≠Ч `global` еРС Python и°®жШОињЩдЄАжДПеЫЊпЉМдї•иѓЈж±ВиЃњйЧЃдЄАдЄ™жИЦе§ЪдЄ™еЕ®е±АеПШйЗПпЉМиѓ≠ж≥Хе¶ВдЄЛжЙАз§ЇпЉЪ\n\
    \n```\nglobal name1[,name2[,...]]\n```\n\nињЩеЬ®дЄЛйЭҐзЪДз§ЇдЊЛдЄ≠еЊЧеИ∞дЇЖжЉФз§ЇпЉЪ\n\n```\n>>> x=2\n>>>\
    \ def f():\n...     global x\n...     x=3\n...     print(x)\n...\n>>> print(x)\n\
    2\n>>> f()\n3\n>>> print(x)\n3\n```\n\n**иІВеѓЯпЉЪ**\n\n1.  `global x` иѓ≠еП•дљњеЊЧеЗљжХ∞ `f` иГље§ЯиЃњйЧЃеЕ®е±АеПШйЗП\
    \ `x`пЉМеР¶еИЩеЃГе∞ЖиҐЂиІ£йЗКдЄЇе±АйГ®еПШйЗП `x`гАВ\n2.  йЬАи¶БиЃњйЧЃеЕ®е±АеПШйЗПзЪДеЗљжХ∞ењЕй°їеЉЇеИґдљњзФ® `global` иѓ≠еП•жЭ•иѓЈж±ВиЃњйЧЃгАВ\n3.  дЄАжЧ¶дљњзФ® `global`\
    \ иѓ≠еП•иѓЈж±ВиЃњйЧЃеЕ®е±АеПШйЗПпЉМе∞±дЄНеПѓиГљеЖНжЬЙдЄАдЄ™еРМеРНзЪДе±АйГ®еПШйЗПгАВ\n4.  дЄАдЄ™еЗљжХ∞еПѓдї•дљњзФ®еНХдЄ™ `global` иѓ≠еП•еТМжЙАжЬЙеЕ®е±АеПШйЗПзЪДеИЧи°®пЉМжИЦиАЕдљњзФ®е§ЪдЄ™ `global`\
    \ иѓ≠еП•пЉМеРМжЧґиѓЈж±ВиЃњйЧЃе§ЪдЄ™еЕ®е±АеПШйЗПгАВ\n\n## 10.12 еµМе•ЧеЗљжХ∞\n\nж≠£е¶ВдЄКдЄАиКВдїЛзїНдЇЖеЬ®жЙАжЬЙеЗљжХ∞е§ЦйГ®еЃЪдєЙзЪДгАБеПѓдї•дљњзФ® `global` иѓ≠еП•иҐЂжЙАжЬЙеЗљжХ∞иЃњйЧЃзЪДеЕ®е±АеПШйЗПзЪДж¶ВењµдЄАж†ЈпЉМеРМж†ЈеПѓдї•еРИзРЖеЬ∞еБЗиЃЊжЙАжЬЙеЗљжХ∞йАЪеЄЄдєЯжШѓеЬ®еЕ®е±АдљЬзФ®еЯЯдЄ≠еЃЪдєЙзЪДгАВељУзДґпЉМеЗљжХ∞дЄНйЬАи¶Б\
    \ `global` иѓ≠еП•е∞±иГљиҐЂеЕґдїЦеЗљжХ∞иЃњйЧЃгАВз±їдЉЉеЬ∞пЉМж≠£е¶ВжИСдїђеПѓдї•еЬ®еЗљжХ∞еЖЕйГ®еЃЪдєЙеП™иГљеЬ®иѓ•еЗљжХ∞еЖЕйГ®иЃњйЧЃзЪДе±АйГ®еПШйЗПдЄАж†ЈпЉМжИСдїђдєЯеПѓдї•еЬ®дЄАдЄ™еЗљжХ∞еЖЕйГ®еЃЪдєЙеП¶дЄАдЄ™еЗљжХ∞пЉМдљњеЕґжИРдЄЇеЃЪдєЙеЃГзЪДеЗљжХ∞зЪДе±АйГ®еЗљжХ∞пЉМдїОиАМеП™иГљиҐЂеЃЪдєЙеЃГзЪДеЗљжХ∞иЃњйЧЃгАВ\n\
    \nеЬ®еП¶дЄАдЄ™еЗљжХ∞еЖЕйГ®еЃЪдєЙзЪДеЗљжХ∞зІ∞дЄЇ*еµМе•ЧеЗљжХ∞*гАВеЬ®ињЩзІНжГЕеЖµдЄЛпЉМжИСдїђдљњзФ®*е§Це±ВеЗљжХ∞*еТМ*еЖЕе±ВеЗљжХ∞*зЪДжЬѓиѓ≠жЭ•еМЇеИЖињЩдЇЫеЗљжХ∞гАВеЫ†ж≠§пЉМеЖЕе±ВеЗљжХ∞жШѓеЬ®е§Це±ВеЗљжХ∞еЖЕйГ®еЃЪдєЙзЪДпЉМеѓєдЇОе§Це±ВеЗљжХ∞жШѓе±АйГ®зЪДпЉМеєґдЄФеП™иГљиҐЂе§Це±ВеЗљжХ∞иЃњйЧЃгАВињЩеЬ®дЄЛйЭҐеЊЧеИ∞дЇЖжЉФз§ЇпЉЪ\n\
    \n```\n>>> def f():\n...     print(\"This is f\")\n...     def g():\n...     \
    \        print(\"This is g\")\n...     g()\n...\n>>> f()\nThis is f\nThis is g\n\
    >>> g()\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'g' is not defined\n```\n\n**иІВеѓЯпЉЪ**\n\n1.  еЗљжХ∞ `f` жШѓе§Це±ВеЗљжХ∞пЉМеЗљжХ∞ `g`\
    \ жШѓеЖЕе±ВеЗљжХ∞гАВ\n2.  дЄО Python дЄ≠еЕґдїЦеЬ∞жЦєдЄАж†ЈпЉМйБЗеИ∞еЗљжХ∞еЃЪдєЙеєґдЄНдЉЪиЗ™еК®еѓЉиЗіеЗљжХ∞и∞ГзФ®гАВеЖЕе±ВеЗљжХ∞йЩ§йЭЮдї•жЯРзІНжЦєеЉПдљњзФ®пЉМеР¶еИЩжШѓжЧ†зФ®зЪДгАВеЕЄеЮЛзЪДдљњзФ®жЦєеЉПжШѓињЫи°Ми∞ГзФ®пЉИе¶ВжЬђдЊЛжЙАз§ЇпЉЙжИЦе∞ЖеЕґињФеЫЮпЉИе¶ВеРОйЭҐйГ®еИЖе∞Жи¶БеБЪзЪДпЉЙгАВ\n\
    3.  еЗљжХ∞ `g` е±ЮдЇОеЗљжХ∞ `f` зЪДдљЬзФ®еЯЯпЉИ`g` еѓєдЇО `f` жШѓе±АйГ®зЪДпЉЙпЉМеЫ†ж≠§еП™иГљиҐЂ `f` иЃњйЧЃгАВе¶Вз§ЇдЊЛжЙАз§ЇпЉМдїїдљХдїО `f` е§ЦйГ®иЃњйЧЃеЃГзЪДе∞ЭиѓХйГљдЉЪеѓЉиЗійФЩиѓѓгАВ\n\
    \nдї•дЄЛжШѓжИСдїђеПѓиГљжГ≥и¶Бе§ДзРЖеЖЕе±ВеЗљжХ∞зЪДеОЯеЫ†пЉМжѓПз±їеЇФзФ®е∞ЖеЬ®еРОзї≠зЂ†иКВдЄ≠иѓ¶зїЖиЃ®иЃЇпЉЪ\n\n1.  еЖЕе±ВеЗљжХ∞дЄНдЉЪж±°жЯУеЕ®е±АеСљеРНз©ЇйЧігАВеЫ†ж≠§пЉМе¶ВжЮЬеЖЕе±ВеЗљжХ∞жПРдЊЫзЪДеКЯиГљеЈ≤зЯ•еП™еѓєжЬЙзЫКдЇОе§Це±ВеЗљжХ∞пЉМйВ£дєИе∞ЖеЕґвАЬйЪРиЧПвАЭеЬ®е§Це±ВеЗљжХ∞дЄ≠иАМдЄНж±°жЯУеЕ®е±АеСљеРНз©ЇйЧіжШѓжЬЙжДПдєЙзЪДгАВињЩдєЯдљњеЊЧжЛ•жЬЙе§ЪдЄ™еРМеРНзЪД[еЖЕ]еЗљжХ∞жИРдЄЇеПѓиГљпЉМеЫ†дЄЇеЃГдїђйГљеЬ®дЄНеРМзЪДдљЬзФ®еЯЯдЄ≠пЉБ\n\
    2.  жЬЙжЧґпЉМе§Це±ВеЗљжХ∞еП™жШѓеЖЕе±ВеЗљжХ∞зЪДдЄАдЄ™еМЕи£ЕеЩ®пЉМдЄїи¶БеЈ•дљЬзФ±еЖЕе±ВеЗљжХ∞еЃМжИРгАВе§Це±ВеЗљжХ∞зЪДе≠ШеЬ®еПѓиГљжШѓдЄЇдЇЖжЙІи°Мй™МиѓБпЉИй™МиѓБеЗљжХ∞зЪДиЊУеЕ•жШѓеР¶еПѓжО•еПЧпЉЙгАБжЧ•ењЧиЃ∞ељХпЉИе∞Жи∞ГзФ®иЃ∞ељХеЬ®жЯРдЄ™жЦЗдїґжИЦжХ∞жНЃзїУжЮДдЄ≠пЉЙгАБйАЙжЛ©пЉИдїОеЗ†дЄ™еЖЕе±ВеЗљжХ∞дЄ≠йАЙжЛ©дЄАдЄ™пЉЙз≠ЙгАВ\n\
    3.  е§Це±ВеЗљжХ∞дєЯеПѓдї•еЕЕељУзФЯжИРеЩ®вАФвАФдЄАдЄ™еЄЃеК©еИґйА†еРИйАВзЪДпЉИеЖЕе±ВпЉЙеЗљжХ∞еєґињФеЫЮиѓ•еЗљжХ∞дЊЫе§ЦйГ®дљњзФ®зЪДеЗљжХ∞пЉБ\n\n### 10.12.1 зФ®дЇОзІБжЬЙзФ®йАФзЪДеЖЕе±ВеЗљжХ∞\n\n\
    иЃ©жИСдїђйЗНжЦ∞еЃ°иІЖ `gcd2.py`пЉЪжИСдїђиІВеѓЯеИ∞еЗљжХ∞ `getPrimeFactors()` иҐЂеЗљжХ∞ `gcd()` еЖЕйГ®дљњзФ®гАВе¶ВжЮЬжИСдїђеЄМжЬЫвАЬдњЭжК§вАЭеЃГпЉМдљњеЕґдїЕеѓє\
    \ `gcd` еЗљжХ∞еПѓзФ®пЉМеПѓдї•е∞ЖеЕґйЗНеЖЩе¶ВдЄЛпЉЪ\n\n```python\n# gcd3.py\n\n# дљњзФ®еЗљжХ∞жЯ•жЙЊиі®еЫ†жХ∞жЭ•ж±ВжЬАе§ІеЕђзЇ¶жХ∞зЪДз®ЛеЇП\n# еИ©зФ®дЇЖеЖЕе±ВеЗљжХ∞гАВ\n\
    \ndef gcd(x,y):\n    def getPrimeFactors(n):\n        factors = []\n        factor=2\n\
    \        while n>1:\n            while n%factor == 0:\n                factors.append(factor)\n\
    \                n /= factor\n            factor = factor+1\n        return factors\n\
    \n    factors1 = getPrimeFactors(x)\n    factors2 = getPrimeFactors(y)\n    gcd=1\n\
    \    for i in factors1:\n        if i in factors2:\n            factors2.remove(i)\n\
    \            gcd *= i\n    return gcd\n\nx,y = input(\"Enter 2 integers:\").split('\
    \ ')\nx,y = int(x),int(y)\nprint(\"The GCD of {} and {} is {}\".format(x,y,gcd(x,y)))\n\
    ```\n\n**иЊУеЗЇпЉЪ**\n\n```\nEnter 2 integers:248 356\nThe GCD of 248 and 356 is 4\n\
    ```\n\n**иІВеѓЯпЉЪ**\n\n1.  ж≠§з®ЛеЇПдЄО `gcd2.py` зЫЄеРМпЉМеФѓдЄАзЪДеМЇеИЂжШѓ `getPrimeFactors()` еЗљжХ∞зО∞еЬ®еЃЪдєЙеЬ®еЗљжХ∞ `gcd`\
    \ еЖЕйГ®пЉМеН≥зђђ 7 и°МгАВ\n2.  еЬ® `gcd2.py` дЄ≠пЉМ`getPrimeFactors()` жШѓдЄАдЄ™еЕ®е±АеЗљжХ∞пЉМеПѓиҐЂеЕґеРОеЃЪдєЙзЪДдїїдљХеЕґдїЦеЗљжХ∞иЃњйЧЃпЉМдљЖеЬ®ж≠§з®ЛеЇПдЄ≠еЃГжШѓдЄАдЄ™е±АйГ®еЗљжХ∞пЉМеП™иГљиҐЂеЗљжХ∞\
    \ `gcd()` иЃњйЧЃгАВ\n\n### 10.12.2 зФ®дЇОжКљи±°зЪДе§Це±ВеЗљжХ∞\n\nжИСдїђйЗНжЦ∞еЃ°иІЖ `prime7.py` еєґдЄЇеЕґжЈїеК†йФЩиѓѓж£АжЯ•еКЯиГљпЉМиАМдЄНеє≤жЙ∞еЗљжХ∞зЪДеЖЕеЃєпЉМе¶ВдЄЛжЙАз§ЇпЉЪ"
