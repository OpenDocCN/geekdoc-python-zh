    # 12.4.1 Instance Variables


    Instance Variables are variables that belong to an object.


    > **For C/C++/Java programmers:**

    Unlike languages like C++ and Java where the class definition specifies the instance
    variables, in Python the class can only specify the Class Variables (which are
    like `static` data members in C++ and `static` fields in Java).


    Python uses the Perl style, wherein the object can create whatever instance variables
    it desires. In fact, it is possible for different objects of the same class to
    have different instance variables, though doing so might not be a good idea! This
    creation of instance variables is typically done using methods, as will be demonstrated
    in an example soon.


    Instance variables can also be deleted using the `del` statement!


    In our `Date` example, we want the `Date` objects to have `day`, `month` and `year`
    as instance variables вАУ we want each `Date` object to have it''s own value for
    these. These instance variables can be created in the `setDate()` method as shown
    below:


    ```

    >>> class Date:

    ...     def setDate(self,d,m,y):

    ...         self.day,self.month,self.year = d,m,y

    ...

    >>> d=Date()

    >>> d.setDate(1,2,2000)

    >>> d

    <__main__.Date object at 0x7f592df6cb50>

    >>> d.day

    1

    >>> d.month

    2

    >>> d.year

    2000

    ```'
