  - "[PAGE 94]\n\n+   4. For all those numbers that end with the digit 3, we continue\
    \ immediately with the next iteration. We do not bother to even find out whether\
    \ the number was prime or not.\n5. Of course, we can also write the program in\
    \ such a way that we first find out if the number is prime, and if so then check\
    \ in line 13 using an `elif` instead of the `else` whether the number ends with\
    \ the digit 3 or not, and then decide whether to print it.\n\n# 3.3.9 More Programs\
    \ on Loops\n\nLet's write a Python program that accepts a number and prints the\
    \ sum of it's digits. Thus, given a number 789, the output should be 24 (7+8+9).\
    \ While there are many different ways of achieving this in Python, let's do it\
    \ this way: in a loop we keep extracting the unit's place of the number `n` (by\
    \ using the value of the expression `n%10`) while reducing the number to eliminate\
    \ the unit's place (by using the expression `n//10`). The loop will run as many\
    \ times as the number of digits in it (till `n==0`). Add each digit to a variable\
    \ `sum` and finally print `sum` outside the loop.\n\n```\nsum_digits.py\n\n1.\
    \  #!/usr/bin/python\n2.  \n3.  # Program to print the sum of digits of a given\
    \ number\n4.  \n5.  n=int(input(\"Enter an integer: \"))\n6.  sum=0\n7.  \n8.\
    \  while n>0:\n9.      digit=n%10\n10.     sum+=digit\n11.     n//=10\n12. \n\
    13. print(\"The sum is\",sum)\n```\n\n# Output:\n\n```\nEnter an integer: 789\n\
    The sum is 24\n```"
  - "[PAGE 95]\n\n# 3. Python Control Structures\n\nObservation:\n\n+   1. In line\
    \ 11, we use the // operator to perform integer division. Furthermore, //= will\
    \ integer divide the LHS by the RHS and store the result in the LHS.\n2. The program\
    \ works even for the special case where 0 is the input. The loop body will not\
    \ get executed and sum will be printed directly (and sum is initialized to 0).\n\
    \nWe can use the digit splitting logic to reverse a number!\n\nnum_reverse.py\n\
    \n```\n1.  #!/usr/bin/python\n2.  \n3.  # Program to print the reverse of a given\
    \ number\n4.  \n5.  n=int(input(\"Enter an integer: \"))\n6.  reverse=0\n7.  \n\
    8.  while n>0:\n9.      digit = n%10\n10.     reverse = reverse*10 + digit\n11.\
    \     n//=10\n12. \n13. print(\"The reverse is\",reverse)\n```\n\nOutput:\n\n\
    ```\nEnter an integer: 789\nThe reverse is 987\n```\n\nObservation:\n\n+   1.\
    \ This program is based on sum_digits.py, with sum replaced by reverse and a change\
    \ in line 10.\n2. As an example, the reverse of the number 789 can be mathematically\
    \ obtained as ((9*10)+8) *10+7. That is the logic used in line 10.\n\nHow about\
    \ using the previous program to determine whether a number is a palindrome or\
    \ not? A palindrome number will be equal to it's reverse!"
