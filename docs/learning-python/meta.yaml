    invoked. We have an instance of this class whose reference is stored in `a`.

    2. `a.f()` is a call to the method `f` of class `A` using `a` as the invoking
    object.

    3. `A.f(a)` is a call to the class function `f` of the class `A`, passing `a`
    as an argument that is received as `self` in `f`.


    Thus, methods are special class functions!'
