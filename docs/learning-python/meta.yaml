- md: "## 12.9.4 Empty Classes as Data Types\n\nSince instance variables are not defined\
    \ within classes, it is possible to start with an empty class but add instance\
    \ variables directly in the instances themselves as shown in the example below:\n\
    \n```python\n>>> class A:\n...     pass\n...\n>>> a=A()\n>>> a.x=10\n>>> a.y=20\n\
    >>> a.x\n10\n```\n\nIn such cases, having an empty class does not mean that the\
    \ instances are empty!\n\n> **Note for C/C++ Programmers:**\n> The equivalent\
    \ of the `struct` data type of C is an empty class whose instances can have any\
    \ field required.\n\n## 12.10 Programs based on OOP\n\nThis section shows some\
    \ sample implementation of classes and concepts covered in this section.\n\n###\
    \ 12.10.1 Implementation of Counter Class\n\nA counter is a mechanism for keeping\
    \ track of an integer count that be incremented, decremented, increased, decreased\
    \ and displayed. Here is an implementation of such a counter.\n\n```python\n#!/usr/bin/python\n\
    \n# Implementation of Counter Class\n\nclass Counter:\n    def __init__(self,\
    \ count=0): self.set(count)\n\n    def set(self, count): self._count = count\n\
    \    def get(self): return self._count\n    def reset(self): self.set(0)\n\n \
    \   def increment(self, count=1): self.set(self.get()+count)\n    def decrement(self,\
    \ count=1): self.set(self.get()-count)\n\n    def __add__(self, x): return Counter(self.get()+x)\n\
    \    def __radd__(self, x): return self.__add__(x)\n    def __sub__(self, x):\
    \ return Counter(self.get()-x)\n    def __rsub__(self, x): return self.__sub__(x)\n\
    \    def __iadd__(self, x):\n        self.increment(x)\n        return self\n\
    \    def __isub__(self, x):\n        self.decrement(x)\n        return self\n\n\
    \    def __str__(self): return str(self.get())\n    def __int__(self): return\
    \ self.get()\n    def __index__(self): return self.__int__()\n\n# Basic counter\
    \ setting/getting/resetting\nc = Counter()\nprint(c.get())\nc.set(9)\nprint(c.get())\n\
    c.reset()\nprint(c.get())\n\n# Basic counter increment and decrement\nc = Counter(100)\n\
    print(c.get())\nc.increment()\nc.increment(5)\nprint(c.get())\nc.decrement()\n\
    c.decrement(3)\nprint(c.get())\n\n# Basic counter operators\nc = Counter()\nc\
    \ = c + 2\nc = 3 + c\nc += 5\nprint(c.get())\nc = Counter()\nc = c - 2\nc = 3\
    \ - c\nc -= 5\nprint(c.get())\n\n# Counter type conversions\nc = Counter(12)\n\
    print(int(c))\nprint(str(c))\nprint(c)\n```\n\nOutput:\n\n```\n0\n9\n0\n100\n\
    106\n102\n10\n-10\n12\n12\n12\n```\n\nObservation:\n\n1. The `Counter` class is\
    \ defined in line 5. The constructor in line 6 can optionally receive a count\
    \ and store it within an instance variable `_count`. If this value is not given,\
    \ it will be assumed to be 0. The instance variable is *protected*, making it\
    \ clear that the external world is not supposed to meddle with it directly but\
    \ instead use *public* methods to gain access to it. These methods are basically\
    \ `get()`, `set()` and `reset()`.\n2. The `set()` method in line 8 accepts a count\
    \ and sets it within the instance variable `_count`.\n3. The `get()` method in\
    \ line 9 returns the count associated with the invoking object, stored in the\
    \ instance variable `_count`.\n4. The `reset()` method in line 10 resets the counter\
    \ value back to 0.\n5. We see that the constructor is calling the `set()` method\
    \ in line 6. Similarly, the `reset()` method is calling the `set()` method in\
    \ line 10. We prefer reuse of method this way, even though the efficiency drops,\
    \ since it makes the code more reliable and maintainable. For example, if we decide\
    \ to change the name of the instance variable `_count` to `count` or `__count`\
    \ or any other name, the change will be localised to `set()` (and `get()` too),\
    \ but will have no impact on the constructor and `reset()` methods! We will also\
    \ see to it that we don't reference the instance variable `_count` in any of our\
    \ methods, preferring to use the `set()` and `get()` methods instead to indirectly\
    \ access it.\n6. The `increment()` method in line 12 increments the count of the\
    \ invoking object by the specified value (default 1). Again, this is done by calling\
    \ the `set()` method. The `decrement()` method in line 13 similarly decrements\
    \ the count of the invoking object by the specified value (default 1).\n7. Basic\
    \ operator overloading is implemented in lines 15-24. Again, the focus is on reusability\
    \ of methods rather than re-implementing within each method.\n8. The `__add__()`\
    \ method in line 15 is supposed to handle cases of the form `c+x`, where `c` is\
    \ a `Counter` object and `x` is an integer. It is supposed to return the result\
    \ of the expression, which we know should be a `Counter` instance.\n9. The `__radd__()`\
    \ method in line 16 is supposed to handle cases of the form `x+c`, where `c` is\
    \ a `Counter` object and `x` is an integer. It is supposed to be identical to\
    \ `c+x` in behaviour.\n10. The `__sub__()` method in line 17 and `__rsub__()`\
    \ method in line 18 similarly handle the cases `c-x` and `x-c` respectively where\
    \ `c` is a `Counter` object and `x` is an integer.\n11. The `__iadd__` method\
    \ in line 19 handles the case `c+=x`, where `c` is a `Counter` object and `x`\
    \ is an integer. Unlike the `__add__()` method which returns the result, here\
    \ the result has to be stored within the invoking object itself, and we prefer\
    \ to return a reference to the invoking object to support cascading of operations\
    \ (not demonstrated here).\n12. The `__isub__()` method in line 20 similarly handles\
    \ the case `c-=x`, where `c` is a `Counter` object and `x` is an integer.\n13.\
    \ The methods in lines 26-28 handle conversion to other types. The `__str__()`\
    \ method in line 26 helps convert `Counter` objects to strings. The `__int__()`\
    \ method in line 27 helps convert `Counter` objects to integers. The `__index__()`\
    \ method in line 28 helps convert `Counter` objects to other bases if required\
    \ (not demonstrated here).\n14. The implementation of `__index__()` is supposed\
    \ to be the same as that of `__int__()`.\n15. The implementation of `__str__()`\
    \ makes it possible for us to directly print `Counter` objects in a `print()`\
    \ call by saying `print(c)`, where `c` is a `Counter` object.\n\n### 12.10.2 Implementation\
    \ of Distance Class\n\nHere is an implementation of Distance class that can help\
    \ represent any distance in a variety of units, and also supports the addition\
    \ and subtraction of distances. The supported units currently are meters (m),\
    \ kilometers (km), miles (mi), yards (yd) and feet (ft), though any other unit\
    \ can be very easily added with minimal modification!\n\n```python\n#!/usr/bin/python\n\
    \n# Implementation of Distance Class\n\nclass Distance:\n    _factors = {\"m\"\
    :1, \"km\":1000, \"mi\":1609.34,\n        \"yd\":0.9144, \"ft\":0.3048}\n    def\
    \ __init__(self, distance=0, unit=\"m\"):\n        self.set(distance, unit)\n\n\
    \    def set(self, distance, unit=\"m\"):\n        self._distance = Distance._normalize(distance,\n\
    \            unit)\n\n    def get(self, unit=\"m\"):\n        return Distance._externalize(self._distance,\
    \ unit)\n\n    def _normalize(distance, unit):\n        if unit == \"m\": return\
    \ distance\n        return distance * Distance._factors[unit]\n\n    def _externalize(distance,\
    \ unit):\n        if unit == \"m\": return distance\n        return distance/Distance._factors[unit]\n\
    \n    def add(self, distance, unit=\"m\"):\n        self.set(self.get() +\n  \
    \          Distance._normalize(distance, unit))\n\n    def sub(self, distance,\
    \ unit=\"m\"):\n        self.set(self.get() -\n            Distance._normalize(distance,\
    \ unit))\n\n    def __int__(self): return int(self._distance)\n    def __float__(self):\
    \ return self._distance\n    def __str__(self): return str(self._distance)\n\n\
    # Distance getting/setting in various units\nd = Distance(1000) #1000m = 1km\n\
    print(d.get()) #1000m\nprint(d.get(\"km\")) #1km\nd.set(2,\"km\") #2km = 2000m\n\
    print(d.get()) #2000m\nprint(d.get(\"km\")) #2m\nprint(Distance(12,\"ft\").get(\"\
    ft\")) #12ft = 12ft\n\n# Distance addition and subtraction\nd = Distance(500)\
    \ #500m\nd.add(0.6,\"km\") #0.6km = 600m, 500+600=1100m\nprint(d.get()) #1100m\n\
    d.sub(1000) #1100-1000 = 100m\nprint(d.get(\"km\")) #100m = 0.1km\n\n# Conversion\
    \ to int and str\nd = Distance(500)\nprint(int(d)) #500m -> 500\nprint(str(d))\
    \ #500m -> \"500\"\nprint(d) #d -> str(d)\n```\n\nOutput:\n\n```\n1000\n1.0\n\
    2000\n2.0\n12.0\n1100.0\n0.1\n500\n500\n500\n```\n\nObservation:\n\n1. The Distance\
    \ class is implemented in lines 5-31. The constructor defined in"
