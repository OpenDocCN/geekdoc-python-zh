    # Form #5: re.sub(pattern, function, string, count)


    This form of the function replaces upto `count` number of occurrences of the RE
    `pattern` within the string `string`, calling the function `function` each time
    a match is found, passing a `match` object to the function and using the function''s
    return value as the replacement string:


    ```

    >>> import re

    >>> def f(m):

    ...     if int(m.string[m.start():m.end()])<10: return "few"

    ...     else: return "many"

    ...

    >>> re.sub(r"\d+",f,"There are 15 apples and 3 mangoes", 1)

    ''There are many apples and 3 mangoes''

    ```


    # Observation:


    +   1. We have asked for maximum 1 replacement and hence the number "3" remains
    in the original string.

    2. This form is similar to form #2, but uses a replacement function instead of
    a replacement string.

    3. As discussed in form #2, if the `count` is 0, this will work the same way as
    form #4 and replaces all occurrences of the pattern `pattern` in the string `string`.


    # Form #6: re.sub(pattern, function, string, count, flags)


    This form is identical to form #5, but allows us to specify `flags` that control
    how the RE pattern should be treated, as discussed in section 10.4.4.


    The `re.subn()` is a very similar function that works the same way as `re.sub()`
    does, but returns a tuple containing the replaced string as well as the total
    number of substitutions performed:


    ```

    re.subn(pattern, replacement/function, string, count=0, flags=0)

    ```


    # Example:


    ```

    >>> import re

    >>> re.subn(r"\d+","''n''","There are 5 apples and 3 mangoes")

    ("There are ''n'' apples and ''n'' mangoes", 2)

    ```'
