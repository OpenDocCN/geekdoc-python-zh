    # 12.8.2 Magic Functions


    We use the term вАЬMagic FunctionsвАЭ to denote those functions/methods that are automatically
    invoked without us explicitly naming them! All of these magic functions have the
    speciality that they have the following syntax for their name:


    ```

    __name__

    ```


    # 12.8.2.1 Constructors and Destructors


    Here are some examples of magic functions that we have already used:


    +   1. Whenever we create an object, itвАЩs constructor (`__init__`) is automatically
    invoked!

    2. Whenever we delete an object reference using `del`, itвАЩs destructor (`__del__`)
    is automatically invoked!'
