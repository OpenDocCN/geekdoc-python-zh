  md: '# # STRINGS


    A string is an immutable sequence of characters. They are one of most heavily
    used data types in programming. In Python, strings are instances of the class
    `str`.


    Being a sequence, it is possible to iterate through the characters of a string
    using a simple for loop as shown below:


    ```

    >>> for c in "Hello":

    ...     print(c)

    ...

    H

    e

    l

    l

    o

    ```


    # ## 8.1 Conversion From and To Strings


    Objects of other types can be converted to strings in a couple of ways. Primitives
    (like integers and real numbers) can be easily converted to strings using the
    `str()` function, discussed in section 2.3.4. General conversions between primitives
    is discussed in section 20.1.1.3. Conversion of objects of other classes to strings
    is also discussed in section 20.1.1.3.


    Bear in mind that values like `123` are integers whereas values like `''123''`
    and `"123"` are strings. More types of quoting for strings are discussed in section
    2.1.2. Integers and strings are not implicitly convertible. Here are some examples
    of conversion:


    ```

    >>> type(123)

    <class ''int''>

    >>> type(''123'')

    <class ''str''>

    >>> str(123)

    ''123''

    >>> type(str(123))

    <class ''str''>

    >>> int(''123'')

    123

    >>> type(int(''123''))

    <class ''int''>

    ```


