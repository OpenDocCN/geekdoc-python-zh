    # 10.8 Returning From Functions


    When a function is called, it returns automatically after it''s entire body executes
    by default. It is possible to ensure that the function returns immediately, whenever
    required, using the `return` statement. On execution, the `return` statement immediately
    transfers control back to the caller.'
