  md: '# 2.6 Variables


    Let us now discuss a few points about variables, their data types, their values
    and operations on them before proceeding to input and output. We have already
    seen the data types available in Python. These data types come into use when we
    have certain values of that type and the entity that holds this value is a variable.
    Here are a few important points about variables in Python:


    #1 Variables can be created when required and where required


    Unlike some of the more restrictive languages, we can start using a variable whenever
    required without having to declare it at the beginning of a block. This gives
    us flexibility and allows us to maintain focus on solving the problem at hand.
    A variable springs into existence the moment a value to assigned to it. There
    is no concept of specifying it''s data type.


    ```

    x = 10 #x is created here

    x = 25 * x

    y = x #y is created here

    ```


    #2 The value of a variable can change at any time


    Like other programming languages, the values of variables can be changed whenever
    required. However, what makes Python different here is the fact that there is
    no direct way in Python to implement constants. A good programmer recognises a
    constant from it''s name and treats it like a constant though the interpreter
    may not!


    ```

    x = 10 #x is created here

    x = 25 * x #The value of x changes here

    MAX = 100 #MAX is created here

    MAX = 200 #The value of MAX changes here

    ```


    > **For C/C++/Java programmers:**

    Python does not have the equivalent of keywords like `const` (C/C++) and `final`
    (Java).'
