    # Form #4: BeautifulSoup.find_all(name, attrs, recursive)


    The `recursive` flag is used to specify whether we want to descend recursively
    into the child tags or not. The default is `True`.


    ```

    >>> for tag in soup.div.find_all("b"):

    ...     print(tag.name)

    ...

    b

    >>> for tag in soup.div.find_all("b",recursive=False):

    ...     print(tag.name)

    ...

    >>>

    ```


    # Observation:


    +   1. We are trying to find all the "b" tags within the "div" tag. In the first
    case, the `div` tag contains a `p` tag that in turn contains a `b` tag, and therefore
    we see it being listed.

    2. In the second case where we pass `recursive=False`, we are confining the search
    to the immediate children of the `div` tag and hence do not get to see the `b`
    tag.


    # Form #5: BeautifulSoup.find_all(name, attrs, recursive, string)


    The `string` argument can be used to search for nodes that contain specific strings
    instead of searching for tags, as illustrated below:


    ```

    (continuation of previous session)

    >>> for node in soup.find_all(string="Bold"):

    ...     print(node)

    ...

    Bold

    ```


    # Observation:


    +   1. We are searching for any node that contains the text "Bold".

    2. Note that in previous versions of BeautifulSoup, the `string` argument was
    called `text`.'
