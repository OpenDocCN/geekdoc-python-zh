    \ зЪДи°МдЄЇдњЭжМБдЄНеПШгАВ\n\n### 21.2.9.3 input() еЗљжХ∞\n\n`raw_input()` еЗљжХ∞еЈ≤йЗНеСљеРНдЄЇ `input()`гАВдєЯе∞±жШѓиѓіпЉМжЦ∞зЪД\
    \ `input()` еЗљжХ∞дїО `sys.stdin` иѓїеПЦдЄАи°МпЉМеєґињФеЫЮеОїйЩ§жЬЂе∞ЊжНҐи°Мзђ¶зЪДе≠Чзђ¶дЄ≤гАВе¶ВжЮЬиЊУеЕ•жПРеЙНзїИж≠ҐпЉМеЃГдЉЪеЉХеПС `EOFError`гАВи¶БиОЈеЊЧжЧІзЙИ\
    \ `input()` зЪДи°МдЄЇпЉМиѓЈдљњзФ® `eval(input())`гАВ\n\n### 21.2.9.4 round() еЗљжХ∞\n\n`round()` еЗљжХ∞зЪДиИНеЕ•з≠ЦзХ•еТМињФеЫЮз±їеЮЛеЈ≤жЫіжФєгАВз≤Њз°ЃзЪДдЄ≠йЧіеАЉзО∞еЬ®дЉЪиИНеЕ•еИ∞жЬАжО•ињСзЪДеБґжХ∞зїУжЮЬпЉМиАМдЄНжШѓињЬз¶їйЫґгАВпЉИдЊЛе¶ВпЉМ`round(2.5)`\
    \ зО∞еЬ®ињФеЫЮ 2 иАМдЄНжШѓ 3пЉЙгАВи∞ГзФ® `round(x[, n])` зО∞еЬ®дЉЪеІФжЙШзїЩ `x.__round__([n])`пЉМиАМдЄНжШѓжАїжШѓињФеЫЮдЄАдЄ™жµЃзВєжХ∞гАВељУдљњзФ®еНХдЄ™еПВжХ∞и∞ГзФ®жЧґпЉМеЃГйАЪеЄЄињФеЫЮдЄАдЄ™\
    \ `int`пЉЫељУдљњзФ®дЄ§дЄ™еПВжХ∞и∞ГзФ®жЧґпЉМеЃГињФеЫЮдЄО `x` з±їеЮЛзЫЄеРМзЪДеАЉгАВ\n\n### 21.2.9.5 reduce() еЗљжХ∞\n\n`reduce()`\
    \ еЗљжХ∞еЈ≤дїОеЕ®е±АдљЬзФ®еЯЯдЄ≠зІїйЩ§пЉМеєґжФЊзљЃеЬ® `functools` ж®°еЭЧдЄ≠гАВ\n\n### 21.2.9.6 reload() еЗљжХ∞\n\n`reload()`\
    \ еЗљжХ∞еЈ≤дїОеЕ®е±АдљЬзФ®еЯЯдЄ≠зІїйЩ§пЉМеєґжФЊзљЃеЬ® `imp` ж®°еЭЧдЄ≠гАВ\n\n### 21.2.9.7 dict.has_key() жЦєж≥Х\n\n`dict.has_key()`\
    \ жЦєж≥ХеЈ≤иҐЂзІїйЩ§гАВиѓЈжФєзФ® `in` жУНдљЬзђ¶гАВ\n\n## 21.3 е∞Ждї£з†БдїО Python 2 зІїж§НеИ∞ Python 3\n\nеЬ®дљ†еЄМжЬЫдљњзФ® Python\
    \ 3пЉМдљЖдї£з†БеЇУдЄ≠е≠ШеЬ®дїЕеЕЉеЃє Python 2 зЪДеЇУзЪДжГЕеЖµдЄЛпЉМеїЇиЃЃй¶ЦеЕИе∞Жиѓ•зЙєеЃЪеЇУзІїж§НеИ∞ Python 3гАВињЩйЗМйЗЗзФ®зЪДиІ£еЖ≥жЦєж°ИжШѓдљњзФ® Python 2 дЄ≠зЪД\
    \ `-3` еСљдї§и°МеЉАеЕ≥пЉМйТИеѓєжЙАжЬЙеНХеЕГжµЛиѓХињРи°Миѓ•еЇУгАВе¶ВжЮЬжµЛиѓХе§±иі•жИЦеПСеЗЇи≠¶еСКпЉМиѓЈдњЃжФєдї£з†БеєґйЗНиѓХгАВ\n\nдЄАжЧ¶дї£з†БеЬ®ж≤°жЬЙи≠¶еСКзЪДжГЕеЖµдЄЛињРи°МпЉМзДґеРОе∞ЭиѓХзФ® Python\
    \ 3 ињРи°МеЃГгАВе¶ВжЮЬжµЛиѓХеЬ® Python 3 дЄ≠дїНзДґе§±иі•пЉМйВ£дєИж†ЗеЗЖзЪД `2to3` еЈ•еЕЈеЬ®ињЩйЗМеПѓдї•жіЊдЄКзФ®еЬЇпЉМе∞ЖзЙИжЬђиљђжНҐдЄЇ Python 3гАВйЩ§дЇЖеЕБиЃЄдїО Python\
    \ 2 зФЯжИРдї£з†БзЪД `2to3` еЈ•еЕЈе§ЦпЉМињШжЬЙдЄАдЄ™ `3to2` еЈ•еЕЈпЉМеПѓдї•е∞Ж Python 3 дї£з†БиљђжНҐеЫЮ Python 2 дї£з†БпЉБ\n\n> **ж≥®жДПпЉЪ**\n\
    > еЕ≥дЇО `2to3` еЈ•еЕЈзЪДжЫіе§Ъдњ°жБѓпЉМиѓЈеПВйШЕ https://docs.python.org/2/library/2to3.htmlгАВ\n> еЕ≥дЇО `3to2`\
    \ еЈ•еЕЈзЪДжЫіе§Ъдњ°жБѓпЉМиѓЈеПВйШЕ https://pypi.python.org/pypi/3to2гАВ\n\n## 21.4 дЄЇ Python 2 еТМ Python\
    \ 3 зЉЦеЖЩйАЪзФ®дї£з†Б\n\nе¶ВжЮЬйЬАи¶БеРМжЧґзїіжК§ Python 2 еТМ Python 3 зЪДдї£з†БеЇУпЉМдљ†еПѓиГљдЉЪйБЗеИ∞дЄАдЇЫеЬ®дЄНеРМзЙИжЬђдЄ≠еРНзІ∞дЄНеРМзЪДй°єзЫЃгАВдЄОеЕґжЫіжФєдї£з†БпЉМдЄНе¶ВдљњзФ®\
    \ `six` еЕЉеЃєжАІеЇУгАВеЃГжШѓдЄАдЄ™еНХзЛђзЪД Python жЦЗдїґпЉМеПѓдї•дїО http://pypi.python.org/pypi/six/ дЄЛиљљгАВ\n\nжЬђиКВе±Хз§Їе¶ВдљХдљњзФ®\
    \ `six` еЕЉеЃєжАІж®°еЭЧзЉЦеЖЩйАВзФ®дЇО Python 2 еТМ Python 3 зЪДдї£з†БгАВ\n\n## 21. йЩДељХ вАУ Python 2 дЄО Python 3\
    \ еѓєжѓФ\n\nдЄЛйЭҐзЪДдї£з†БзЙЗжЃµиѓіжШОдЇЖеЬ® Python 3 дЄ≠зЫіжО•дљњзФ® `intern(\"mysting\")` зЪДжМСжИШпЉМеЫ†дЄЇеЃГеєґйЭЮеЉАзЃ±еН≥зФ®пЉИдљ†йЬАи¶БдїО `sys`\
    \ еѓЉеЕ•еЃГпЉЙгАВзЫЄеПНпЉМе¶ВжЮЬжИСдїђе∞ЭиѓХеЬ® Python 2 дЄ≠еѓЉеЕ•зЫЄеРМзЪДеЖЕеЃєпЉМдЉЪеЊЧеИ∞дЄАдЄ™ `ImportError` еЉВеЄЄпЉЪ\n\n| Python 2 | Python\
    \ 3 |\n| --- | --- |\n| `>>> intern('mystring')`<br>`'mystring'`<br>`>>> from\
    \ sys import intern`<br>`Traceback (most recent call last):`<br>`  File \"<stdin>\"\
    , line 1, in <module>`<br>`ImportError: cannot import name intern` | `>>> intern('mystring')`<br>`Traceback\
    \ (most recent call last):`<br>`  File \"<stdin>\", line 1, in <module>`<br>`NameError:\
    \ name 'intern' is not defined`<br>`>>> from sys import intern`<br>`>>> intern('mystring')`<br>`'mystring'`\
    \ |\n\nдЄЇдЇЖдљњдЄКињ∞дї£з†БеЬ® Python 2 еТМ Python 3 дЄ≠йГљиГљеЈ•дљЬпЉМжИСдїђеПѓдї•дљњзФ® `six` ж®°еЭЧпЉМе¶ВдЄЛжЙАз§ЇпЉЪ\n\n```\n>>> from\
    \ six.moves import intern\n>>> intern('mystring')\nmystring\n```\n\n`six` ж®°еЭЧзЪДеП¶дЄАдЄ™жЉФз§ЇжШѓеЕ≥дЇОдЄАдЇЫеЄЄйЗПпЉМеЃГдїђеПѓдї•жЦєдЊњеЬ∞зФ®дљЬжЯРдЇЫеѓєи±°пЉИеЬ®\
    \ Python 3 дЄ≠еЈ≤еЉГзФ®пЉЙзЪДжЫњдї£еУБпЉЪ\n\n- `six.class_types`\n- `six.integer_types`\n- `six.string_types`\n\
    - `six.text_type`\n- `six.binary_type`\n\nдї•дЄЛжШѓеЬ® Python 2 дЄ≠зЪДжЉФз§ЇпЉЪ\n\n```\n>>> a=u'Hello\
    \ World'\n>>> isinstance(a, basestring)\nTrue\n>>> isinstance(a, str)\nFalse\n\
    >>> import six\n>>> isinstance(a, six.string_types)\nTrue\n```\n\n**иІВеѓЯпЉЪ**\n\n\
    1. еЬ® Python 2 дЄ≠пЉМUnicode е≠Чзђ¶дЄ≤иВѓеЃЪжіЊзФЯиЗ™ `basestring`пЉМдљЖдЄНзђ¶еРИ `str` еѓєи±°зЪДжЭ°дїґгАВ\n2. Python 2 дЄ≠зЪД\
    \ Unicode е≠Чзђ¶дЄ≤дїНзДґзђ¶еРИ `six.string_types` зЪДжЭ°дїґгАВ\n\nдї•дЄЛжШѓеЬ® Python 3 дЄ≠зЪДз±їдЉЉдї£з†БпЉЪ\n\n```\n>>>\
    \ a=u'Hello World'\n>>> isinstance(a, basestring)\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name 'basestring'\
    \ is not defined\n>>> isinstance(a, str)\nTrue\n>>> import six\n>>> isinstance(a,\
    \ six.string_types)\nTrue\n```\n\n**иІВеѓЯпЉЪ**\n\n1. еЬ® Python 3 дЄ≠пЉМжЙАжЬЙе≠Чзђ¶дЄ≤йГљжШѓ Unicode е≠Чзђ¶дЄ≤пЉМеЫ†ж≠§жШѓ\
    \ `str` з±їзЪДеЃЮдЊЛгАВ\n2. Python 3 дЄ≠ж≤°жЬЙеРНдЄЇ `basestring` зЪДеЯЇз±їгАВ\n3. зДґиАМпЉМPython 3 дЄ≠зЪД Unicode\
    \ е≠Чзђ¶дЄ≤дїНзДґзђ¶еРИ `six.string_types` зЪДеЃЮдЊЛжЭ°дїґгАВ\n\n> **ж≥®жДПпЉЪ**\n> еЕ≥дЇО `six` ж®°еЭЧзЪДжЫіе§Ъдњ°жБѓпЉМиѓЈеПВйШЕ https://pypi.python.org/pypi/sixгАВ\n\
    \n## жАїзїУ\n\n- Python 2 жШѓињЗеОїпЉМиАМ Python 3 жШѓзО∞еЬ®еТМжЬ™жЭ•пЉБ\n- Python 3 дЄНеРСеРОеЕЉеЃє Python 2пЉМињЩжШѓ Python\
    \ 2 дїНзДґе≠ШеЬ®зЪДдЄїи¶БеОЯеЫ†пЉБ\n- еН≥дљњжШѓеГПжЙУеН∞еТМиѓїеПЦиЊУеЕ•ињЩж†ЈзЪДеЯЇжЬђиѓ≠еП•пЉМдїО Python 2 еИ∞ Python 3 дєЯеПСзФЯдЇЖеПШеМЦгАВ\n- Python 2\
    \ дї£з†БеПѓдї•иљђжНҐдЄЇ Python 3 дї£з†БвАФвАФеПѓдї•жЙЛеК®иљђжНҐпЉМдєЯеПѓдї•дљњзФ® 2to3 еЈ•еЕЈгАВ\n- еЬ®жЯРзІНз®ЛеЇ¶дЄКпЉМеПѓдї•дљњзФ® six еЕЉеЃєжАІеЇУзЉЦеЖЩйАВзФ®дЇО Python\
    \ 2 еТМ Python 3 зЪДйАЪзФ® Python дї£з†БгАВ"
