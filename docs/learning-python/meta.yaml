  md: '# 16.1.3.3 The DELETE Statement


    In order to delete 1 or more rows from a table, the `DELETE` statement can be
    used as follows:


    ```

    DELETE FROM Employee WHERE name="Ram"

    ```


    As a special case, in order to delete all records of the table, the following
    `DELETE` statement can be used:


    ```

    DELETE FROM Employee

    ```


    > **NOTE:**

    This is not the same as `DROP TABLE Employee`, which not only deletes the rows
    but also removes the table!


    # 16.1.4 An Overview of Data Query Language (DQL)


    Perhaps the most powerful statement вАУ and also the most frequently used one вАУ
    in SQL is the `SELECT` statement, capable of retrieving data from tables:


    ```

    SELECT * FROM Employee

    ```


    The above statement fetches all records from the table `Employee`. If we wish
    to filter the results, we could do so as shown in the following example:


    ```

    SELECT * FROM Employee WHERE id<10

    ```


