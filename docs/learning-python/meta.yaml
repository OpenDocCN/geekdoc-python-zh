  - "[PAGE 484]\n\n# 14.3.2.2 Reading a Line at a Time From a File Using readline()\n\
    \nJust as how the `readlines()` method reads all lines from a file and returns\
    \ it in the form of a list, the `readline()` method reads a single line from a\
    \ file and returns it as a string.\n\nSyntax:\n\n```\nfileObject.readline([size])\n\
    ```\n\nNote:\n\n+   1. This method reads and returns a single line from the file\
    \ identified by the file object `fileObject`.\n2. The optional `size` parameter\
    \ can be used to specify the maximum number of characters to read from the file.\
    \ When omitted, it means read till the end of line (till the newline character\
    \ is read) or till the end of file.\n3. If the read line terminated with a newline\
    \ character (which would be the case for all lines except possibly the last line\
    \ in the file), the terminating newline character is retained as the last character\
    \ of the string that is returned.\n4. If already at the end of file, a null string\
    \ is returned.\n\nHere is an implementation of `cat` using `readline()`:\n\ncat4.py\n\
    \n```\n1.  #!/usr/bin/python\n2.  \n3.  # Implementation of cat command to display\
    \ the contents of a file\n4.  \n5.  filename = input(\"Enter filename:\")\n6.\
    \  \n7.  try:\n8.      file = open(filename)\n9.      while 1:\n10.         line\
    \ = file.readline()\n11.         if not line: break\n12.         print(line,end='')\n\
    13. except Exception as e:\n14.     print(\"Unable to open file: {}\".format(filename))\n\
    15.     print(\"Reason: {}\".format(str(e)))\n```"
- md: "## 14. File Handling\n\n### 14.3.3 Reading Arbitrary Amounts of Data From Files\n\
    \nWhile the previous section showed how to read a line at a time, which is probably\
    \ the most common way to read a text file, this section focuses on how to read\
    \ any specific number of characters (bytes) from a file, giving you more control\
    \ on how much data you wish to read from the file.\n\nWe revisit the `read` method\
    \ covered in section 14.3.1.1 for this purpose, with its complete syntax:\n\n\
    ```\nfileObject.read(bytes)\n```\n\n**Note:**\n\n- 1. This method reads up to\
    \ `bytes` number of bytes from the file identified by `fileObject` and returns\
    \ the result as a string.\n- 2. On encountering end of file, this method returns\
    \ the read data immediately and could possibly return lesser than `bytes` number\
    \ of bytes.\n- 3. If already at the end of file at the time of making the call,\
    \ this method returns a null string.\n- 4. This method does not stop reading on\
    \ encountering the newline character. Any newline character found in the file\
    \ is merely considered to be a character.\n- 5. If `bytes` is not provided or\
    \ is given as -1, this will end up reading all the characters of the file, as\
    \ covered in section 14.3.1.1.\n\nHere is a re-implementation of the previous\
    \ program using `read()` to read 100 bytes at a time:\n\n```\ncat5.py\n\n#!/usr/bin/python\n\
    \n# Implementation of cat command to display the contents of a file\n\nfilename\
    \ = input(\"Enter filename:\")\n\ntry:\n    file = open(filename)\n    while 1:\n\
    \        data = file.read(100)\n        if not data: break\n        print(data,end='')\n\
    except Exception as e:\n    print(\"Unable to open file: {}\".format(filename))\n\
    \    print(\"Reason: {}\".format(str(e)))\n```\n\n**Output:**\n\n```\nEnter filename:cat5.py\n\
    #!/usr/bin/python\n\n# Implementation of cat command to display the contents of\
    \ a file\n\nfilename = input(\"Enter filename:\")\n\ntry:\n    file = open(filename)\n\
    \    while 1:\n        data = file.read(100)\n        if not data: break\n   \
    \     print(data,end='')\nexcept Exception as e:\n    print(\"Unable to open file:\
    \ {}\".format(filename))\n    print(\"Reason: {}\".format(str(e)))\n```\n\n**Observation:**\n\
    \n- 1. This program is very similar to `cat4.py` with changes in lines 10-12.\n\
    - 2. This program reads 100 bytes at a time and prints it.\n- 3. As an example,\
    \ if the file contains 250 bytes, then line 10 of this program ends up reading\
    \ 100, 100, 50 and 0 bytes over 4 iterations and the loop is terminated by line\
    \ 11.\n\n### 14.3.4 Reading Files a Character at a Time\n\nAs a specialization\
    \ of the concept presented in the previous section, we can read the contents of\
    \ a file a single byte (character) at a time using `read(1)`. While this is not\
    \ exactly efficient, it can provide a very high level of granularity as far as\
    \ reading from text files is concerned. While this can be more appropriate for\
    \ use with binary files, nothing prevents us from using it on text files too.\n\
    \n```\ncat6.py\n\n#!/usr/bin/python\n\n# Implementation of cat command to display\
    \ the contents of a file\n\nfilename = input(\"Enter filename:\")\n\ntry:\n  \
    \  file = open(filename)\n    while 1:\n        data = file.read(1)\n        if\
    \ not data: break\n        print(data,end='')\nexcept Exception as e:\n    print(\"\
    Unable to open file: {}\".format(filename))\n    print(\"Reason: {}\".format(str(e)))\n\
    ```\n\n**Output:**\n\n```\nEnter filename:cat6.py\n#!/usr/bin/python\n\n# Implementation\
    \ of cat command to display the contents of a file\n\nfilename = input(\"Enter\
    \ filename:\")\n\ntry:\n    file = open(filename)\n    while 1:\n        data\
    \ = file.read(1)\n        if not data: break\n        print(data,end='')\nexcept\
    \ Exception as e:\n    print(\"Unable to open file: {}\".format(filename))\n \
    \   print(\"Reason: {}\".format(str(e)))\n```\n\n**Observation:**\n\n- 1. This\
    \ program is very similar to `cat5.py` with the only change being that this program\
    \ reads 1 byte at a time in line 10 instead of 100 bytes.\n- 2. This program will\
    \ run slower than `cat5.py` simply due to the number of iterations of the loop\
    \ and the statements within it. The speed difference cannot be easily (visibly)\
    \ detected on small files.\n\n### 14.4 Writing to Text Files\n\nUnlike the many\
    \ different ways of reading from files, writing to files is pretty straightforward\
    \ with the use of a single function вАУ `write()` - whose syntax is shown below:\n\
    \n```\nfileObject.write(string)\n```\n\n**Note:**\n\n- 1. This method writes the\
    \ contents of the given string (`string`) to the file specified by the invoking\
    \ file object (`fileObject`).\n- 2. This method does not add a terminating newline\
    \ character of its own. If the string terminates with a newline character, it\
    \ is also written, else no newline is automatically added to the file.\n- 3. The\
    \ file identified by the file object (`fileObject`) must have been opened in a\
    \ mode that supports writing, else the operation fails.\n\nHere is a program that\
    \ generates the factorial of all integers from 1 to 10 and stores them in a file\
    \ called `factorials.txt`:\n\n```\nfactorials.py\n\n#!/usr/bin/python\n\n# Storing\
    \ factorials in a text file\n\nfrom math import factorial\n\ntry:\n    file =\
    \ open(\"factorials.txt\",\"w\")\n    for i in range(1,11):\n        file.write(\"\
    The factorial of {} is {}\\n\".format(i,factorial(i)))\nexcept Exception as e:\n\
    \    print(\"Unable to open file: {}\".format(filename))\n    print(\"Reason:\
    \ {}\".format(str(e)))\nelse:\n    print(\"Factorials successfully written to\
    \ file factorials.txt\")\n```\n\n**Output:**\n\n```\nFactorials successfully written\
    \ to file factorials.txt\n```\n\nContents of file `factorials.txt`:\n\n```\nThe\
    \ factorial of 1 is 1\nThe factorial of 2 is 2\nThe factorial of 3 is 6\nThe factorial\
    \ of 4 is 24\nThe factorial of 5 is 120\nThe factorial of 6 is 720\nThe factorial\
    \ of 7 is 5040\nThe factorial of 8 is 40320\nThe factorial of 9 is 362880\nThe\
    \ factorial of 10 is 3628800\n```\n\n**Observation:**\n\n- 1. Line 8 opens the\
    \ file `factorials.txt` in write mode (\"w\"). Instead of hard-coding the filename,\
    \ we could also accept the filename from the user.\n- 2. Line 10 uses the `write()`\
    \ method to write a formatted string into the file. Note that we have taken care\
    \ to terminate the string with a newline so that the file contents will be well\
    \ formatted and readable.\n- 3. Line 15 is executed only if there were no exceptions\
    \ and the strings were written to the file successfully.\n\n### 14.5 Seeking Within\
    \ Files\n\nWhile we normally prefer to read from or write to files sequentially\
    \ (as we have been doing in this chapter so far), it is sometimes required to\
    \ be able to вАЬjumpвАЭ to specific locations within the file, thereby providing random\
    \ access on the file contents. This section shows how such jumping is possible\
    \ in Python.\n\n#### 14.5.1 Introduction to File Offsets\n\nIf we view the file\
    \ contents as a linear sequence of bytes/characters, we can visualise the contents\
    \ as shown in the diagram below:\n\n![](img/7831d9fe9e47e5b1109ec75197998a41_491_0.png)\n\
    \nWhen a file is opened for reading or writing, the *current position* in that\
    \ file will be byte 0 (the beginning of the file). This means that next read or\
    \ write will start from position 0 and will increment the position by the number\
    \ of bytes successfully read or written. (An exception to this is writes to files\
    \ that have been opened in append modes, in which case data will always be written\
    \ at the end of the file instead of at the current position). As we continue reading\
    \ or writing, the position keeps incrementing, ensuring sequential access of the\
    \ file contents.\n\nWhile writing to the file, it is possible to go past the end\
    \ of the file, in which case the file grows with the writes. While reading from\
    \ a file, it is not possible to go past the end of the file.\n\nAny particular\
    \ position in the file can be selected by means of an offset applied from one\
    \ of the standard positions:\n\n- 1. From the beginning of the file (identified\
    \ by the standard position `SEEK_SET`)\n- 2. From the current position within\
    \ the file (identified by the standard position `SEEK_CUR`)\n- 3. From the end\
    \ of the file (identified by the standard position `SEEK_END`)\n\nA positive offset\
    \ implies those many bytes after the selected standard position whereas a negative\
    \ offset implies those many bytes before the selected standard position. An offset\
    \ value of 0 implies exactly at the selected standard position.\n\nThe table below\
    \ shows some examples of how these offsets combined with standard positions can\
    \ help locate a position in a file:\n\n| Offset | Standard Position | Meaning\
    \ |\n| :--- | :--- | :--- |\n| 0 | `SEEK_SET` | Beginning of the file |\n| 10\
    \ | `SEEK_SET` | 10 bytes after the beginning of the file (positioned at the beginning\
    \ of the 11th byte of the file) |\n| 0 | `SEEK_CUR` | Current position within\
    \ the file (no change in position) |\n| 10 | `SEEK_CUR` | 10 bytes after the current\
    \ position in the file (useful for skipping over the next 10 bytes in the file)\
    \ |"
