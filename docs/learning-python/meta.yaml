  md: '# 6.7.5 Summary of Fundamental Set Operations


    The below table summarises the basic set operations that were covered in the preceding
    sections:


    | Operation | Operator | Function |

    | :--- | :--- | :--- |

    | Union | \| | union() |

    | Union (with assignment) | \|= | update() |

    | Intersection | & | intersection() |

    | Intersection (with assignment) | &= | intersection_update() |

    | Difference | - | difference() |

