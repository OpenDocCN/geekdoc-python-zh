    \ Module Symbol Tables\n\nSection 15.1 mentioned that one of the advantages of\
    \ using modules is that each module has it's own symbol table where it's identifiers\
    \ are stored, thus eliminating clashes with any identifiers with the same name\
    \ in other modules and scripts. This section will throw more light on this concept.\n\
    \nAn *identifier* is a name given by the programmer to a program element, and\
    \ includes names of functions and variables. These identifiers are stored in a\
    \ data structure called a *symbol table*. Several symbol tables can co-exist and\
    \ contain their own identifiers as the symbol tables themselves are identified\
    \ by a name вАУ the name of the *module* that defined them! Section 15.2 introduced\
    \ the fact that the module name is derived from the filename. Section 15.1 introduced\
    \ the fact that executed scripts are assumed to be a part of the module named\
    \ `__main__`. Thus, every identifier is present within a symbol table identified\
    \ by a module name or the default module name `__main__`.\n\nImporting a module\
    \ only adds the module name as an identifier to the symbol table of the importer.\
    \ The contents of a module are hidden within the symbol table of the module. In\
    \ our example, the statement `import fact` ensures that the identifier `fact`\
    \ is present in the symbol table of `__main__`, making it possible for us to access\
    \ `fact`. The `factorial` function is an identifier within the module `fact` and\
    \ is thus not directly accessible to us in `__main__`, but can be accessed via\
    \ `fact`, which is now available to us.\n\nWe will now write a program to find\
