    # 3.2.4 Empty Blocks and the pass Keyword


    There are situations when we need a block to be empty вАУ something that is not
    permitted in Python. This could be because out of the many conditions that we
    would like to handle in particular ways, there might be certain exceptions that
    we don''t want to process at all. Or less genuinely, there might be cases wherein
    we want to fill in the block contents at a later time when we are ready and right
    now want to proceed with an empty block nevertheless. Whatever be the reason,
    the fact remains that a single statement is a single statement and a block of
    statements is a block of 1 or more statements вАУ Python does not support zero statements
    when a statement is expected!


    In such situations where a statement is required, but we don''t have anything
    to provide, we can use the `pass` keyword to indicate a null statement вАУ a statement
    that does nothing on execution!


    To demonstrate the usage of pass, consider the objective of printing the value
    of the variable x if it is not divisible by 3. Here are 2 ways of doing it:


    **Method #1:**


    ```

    >>> x=5

    >>> if x%3 != 0: print(x)

    ...

    5

    ```'
- md: "## 3. Python Control Structures\n\nMethod #2:\n\n```\n>>> x=5\n>>> if x%3==0:\
    \ pass\n... else: print(x)\n...\n5\n```\n\nObservation:\n\n1.  Both the methods\
    \ are identical in functionality вАУ different programmers prefer different styles!\n\
    2.  The first method is preferred by programmers who want their code to be compact.\n\
    3.  The second method is preferred by programmers who like вАЬpositive logicвАЭ more\
    \ than вАЬnegative logicвАЭ - programmers who find it easier to deal with equality\
    \ and true rather than inequality and false!\n\n## 3.2.5 Nested if Statements\n\
    \nAn `if` statement within an `if` statement is called a nested `if` statement.\
    \ Of course, the inner `if` statement can be within either the `if` block or an\
    \ `elif` block or the `else` block of the outer `if` statement. The indentation\
    \ level helps Python realise to which block a statement belongs to. Statements\
    \ belonging to the inner `if` will be indented one level deeper than statements\
    \ belonging to the outer `if`.\n\nLet us write a program that accepts a word from\
    \ the user and tells us which of the following attributes hold good on the complete\
    \ word:\n\n- Alphanumeric characters\n- Alphabetic characters\n- Uppercase characters\n\
    - Lowercase characters\n- Titlecase characters\n- Numeric characters\n- Whitespace\
    \ characters\n\n## classify_word.py\n\n```\n#!/usr/bin/python\n\n# Program that\
    \ accepts a word and classifies it\n\nword = input(\"Enter a word: \")\n\nif word.isalnum():\n\
    \    print(\"Alphanumeric\")\n    if word.isalpha():\n        print(\"Alphabetic\"\
    )\n        if word.isupper(): print(\"Uppercase\")\n        elif word.islower():\
    \ print(\"Lowercase\")\n        elif word.istitle(): print(\"Titlecase\")\n  \
    \  elif word.isnumeric(): print(\"Numeric\")\nelif word.isspace(): print (\"Whitespace\"\
    )\n```\n\n## Output:\n\n```\nEnter a word: Hello\nAlphanumeric\nAlphabetic\nTitlecase\n\
    ```\n\n```\nEnter a word: world\nAlphanumeric\nAlphabetic\nLowercase\n```\n\n\
    ```\nEnter a word: hello123\nAlphanumeric\n```\n\n```\nEnter a word: 123\nAlphanumeric\n\
    Numeric\n```\n\n## 3. Python Control Structures\n\nObservation:\n\n1.  Refer to\
    \ section 2.3.4.2 for a description of the functions used in this program.\n2.\
    \  Observe that we have an `if` statement within the body of an `if` statement.\
    \ The `if` statement testing whether the characters are uppercase is within the\
    \ body of the `if` statement testing whether the characters are alphabetic, which\
    \ in turn is within the body of the `if` statement testing whether the characters\
    \ are alphanumeric.\n3.  In those cases where the body of an `if` statement comprised\
    \ of just a single `print()` call, we have used the simple statement syntax of\
    \ the `if` statement. In all other cases, we have used the compound statement\
    \ form.\n4.  Just in case you're wondering, there are words that are alphabetic\
    \ but neither uppercase nor lowercase nor titlecase. Therefore we cannot use an\
    \ `else` clause instead of the `elif` in line 13. An example of a word that is\
    \ neither of these three is \"heLLo\"\n5.  Do observe the mutual exclusion of\
    \ the conditions involved and why we have decided to build our conditions in this\
    \ manner.\n\n## 3.3 Loops\n\nIt is now time to explore the final basic control\
    \ structure вАУ loops. A loop is defined as a set of statements executed over and\
    \ over again.\n\n- A *finite loop* is one that runs a finite number of times and\
    \ then passes control to the statement following it\n- An *infinite loop* is one\
    \ that never terminates (and therefore might require user intervention to terminate\
    \ it along with termination of the script, like pressing control+C).\n- A *definite\
    \ loop* is one that runs a fixed number of times (and the number of times it runs\
    \ is evident in the script)\n- An *indefinite loop* is one that runs as long as\
    \ a condition is satisfied and without knowing the actual data, is impossible\
    \ to predict exactly how many times.\n\nWe will eventually see examples of all\
    \ these types.\n\n## 3.3.1 The while Loop\n\nThe simplest looping control structure\
    \ in Python is the `while` loop. It's syntax is very similar to that of the `if`\
    \ statement. While in the case of the `if` statement the condition is tested only\
    \ once, in the case of the `while` statement the condition is tested till it evaluates\
    \ to `False`, executing the body of the loop each time the condition evaluated\
    \ `True`. The body of the loop can either be a simple statement or a compound\
    \ statement, just like the `if` statement. Each time the loops runs, it is counted\
    \ as an iteration. Thus, a loop typically is used when we want multiple iterations,\
    \ controlled using a condition.\n\nThe syntax of the `while` loop is shown below:\n\
    \n```\nwhile condition: statement\n\nwhile condition:\n    statements\n    ...\n\
    ```\n\nLet us write a program to print all integers from 1 to n, where n is given\
    \ by the user.\n\n```\n#!/usr/bin/python\n\n# Demonstration of while loop\n\n\
    n = int(input(\"Enter a positive integer: \"))\n\ni=1\nwhile i<=n:\n    print(i)\n\
    \    i=i+1\n```\n\nOutput:\n\n```\nEnter a positive integer: 7\n1\n2\n3\n4\n5\n\
    6\n7\n```\n\nObservation:\n\n1.  The loop runs as long as the condition `i<=n`\
    \ is `True` and executes the body each time the condition evaluated to `True`.\n\
    2.  The loop terminates the moment the condition evaluates to `False`. In this\
    \ example, that happens when `i>n`.\n3.  In each iteration, we increment the variable\
    \ `i`, as shown in line 10.\n\n> **Note for C/C++/Java/Perl Programmers:**\n>\
    \ There is no increment operator (++) - we need to use the ordinary addition operator\
    \ (+) in order to increment, as shown in line 10.\n\nLet us write a program that\
    \ tells whether a given number is prime or composite.\n\n## prime.py\n\n```\n\
    #!/usr/bin/python\n\n# Program to classify a given number\n# as prime or composite\n\
    \nn = int(input(\"Enter a positive integer: \"))\n\nisPrime=True\ni=2\nwhile i<=n/2:\n\
    \    if n%i==0: isPrime=False\n    i=i+1\n\nif isPrime: print(\"Prime\")\nelse:\
    \ print(\"Composite\")\n```\n\n## Output:\n\n```\nEnter a positive integer: 7\n\
    Prime\n```\n\n```\nEnter a positive integer: 8\nComposite\n```\n\n## Observation:\n\
    \n1.  A number is prime if it has no other factors apart from 1 and itself. Thus,\
    \ the first factor we need to check is 2 and the last factor we need to check\
    \ is n/2, since the only factor after that will be n.\n2.  The number 1 is neither\
    \ prime nor composite and as such is not expected as an input for our program.\n\
    3.  Mathematically, we need not search for factors till n/2, we can search only\
    \ till вИЪn, which could significantly bring down the number of iterations required\
    \ when a number is prime, but the savings might not be justifiable as finding\
    \ the square root is a relatively time consuming operation for the system.\n4.\
    \  We will nevertheless improvise this program as we learn more concepts.\n5.\
    \  We use a Boolean variable `isPrime` to keep track of the kind of number we\
    \ have concluded. We initially assume the number is prime and conclude otherwise\
    \ if and when we encounter a factor of the given number (indicated by `n%i==0`).\n\
    \n## 3.3.2 Using break in while\n\nThe `break` statement results in an immediate\
    \ exit from a loop. This could be useful when another condition has been found\
    \ in the body of a loop that should result in the immediate termination of the\
    \ loop. On execution of the `break` statement, control flows to the first statement\
    \ outside the loop.\n\nA loop can have any number of `break` statements, but the\
    \ execution of any one of them will prevent the execution of any other statement\
    \ within the loop.\n\nWhile the above program works correctly, it can be improvised.\
    \ The first improvement suggested is based on the fact that we currently do not\
    \ terminate the loop the moment the conclusion is ready. Line 11 can determine\
    \ if the given number is not prime, but the loop continues nevertheless. We can\
    \ terminate the loop when we have concluded that the number is not prime using\
    \ the `break` statement as shown in the improvised program below:\n\n```\nprime2.py\n\
    \n#!/usr/bin/python\n\n# Program to classify a given number\n# as prime or composite\n\
    \nn = int(input(\"Enter a positive integer: \"))\n\nisPrime=True\ni=2\nwhile i<=n/2:\n\
    \    if n%i==0:\n        isPrime=False\n        break\n    i=i+1\n\nif isPrime:\
    \ print(\"Prime\")\nelse: print(\"Composite\")\n```\n\nThis improved program works\
    \ just as the previous one and hence it's output is not shown here."
