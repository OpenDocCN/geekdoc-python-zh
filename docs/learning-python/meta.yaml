    4. The `reset()` method in line 10 resets the counter value back to 0.

    5. We see that the constructor is calling the `set()` method in line 6. Similarly,
    the `reset()` method is calling the `set()` method in line 10. We prefer reuse
    of method this way, even though the efficiency drops, since it makes the code
    more reliable and maintainable. For example, if we decide to change the name of
    the instance variable `_count` to `count` or `__count` or any other name, the
    change will be localised to `set()` (and `get()` too), but will have no impact
    on the constructor and `reset()` methods! We will also see to it that we don''t
    reference the instance variable `_count` in any of our methods, preferring to
    use the `set()` and `get()` methods instead to indirectly access it.

    6. The `increment()` method in line 12 increments the count of the invoking object
    by the specified value (default 1). Again, this is done by calling the `set()`
    method. The `decrement()` method in line 13 similarly decrements the count of
