  md: '# 21. Appendix вАУ Python 2 Vs. Python 3


    The below code snippet illustrates the challenge in using `intern("mysting")`
    in Python 3 directly as it is not readily available (you''ll need to import it
    from `sys`). Conversely, if we try to import the same in Python 2, we get an `ImportError`
    exception:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> intern(''mystring'')`<br>`''mystring''`<br>`>>> from sys import intern`<br>`Traceback
    (most recent call last):`<br>`  File "<stdin>", line 1, in <module>`<br>`ImportError:
    cannot import name intern` | `>>> intern(''mystring'')`<br>`Traceback (most recent
    call last):`<br>`  File "<stdin>", line 1, in <module>`<br>`NameError: name ''intern''
    is not defined`<br>`>>> from sys import intern`<br>`>>> intern(''mystring'')`<br>`''mystring''`
    |


    To make the above code work with both Python 2 and Python 3, we could use the
    `six` module as follows:


    ```

    >>> from six.moves import intern

    >>> intern(''mystring'')

    mystring

    ```


    Another demonstration of the `six` module is with respect to a few constants that
    come handy as replacements for certain objects (that got deprecated in Python
    3):


    +   - `six.class_types`

    - `six.integer_types`

    - `six.string_types`

    - `six.text_type`

    - `six.binary_type`


    Here is a demonstration in Python 2:


    ```

    >>> a=u''Hello World''

    >>> isinstance(a, basestring)

    True

    >>> isinstance(a, str)

    False

    >>> import six

    ```'
