    # Forms:


    +   1. return

    2. return value


    Form #1 will be covered in this section whereas form #2 will be covered in the
    next section.


    ```

    >>> def hi():

    ...     print("Hello World")

    ...     return

    ...     print("Heya!")

    ...

    >>> hi()

    Hello World

    ```


    # Observation:


    +   1. The function `hi` did not end up printing the string "Heya!" since the
    `return` statement preceding it resulted in a transfer of control back to the
    caller.

    2. Unconditional `return` statements such as the one shown in this example are
    practically useless as the rest of the statements never get executed. It is common
    for a function to have multiple `return` statements, but in such cases the `return`
    statement would be conditional вАУ probably present within an `if` statement''s
    body.


