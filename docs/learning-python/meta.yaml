    \ execute a piece of code. Python provides the `if` Statement to implement decisions.\
    \ Like most other programming languages, this has many forms вАУ each of which will\
    \ be discussed in the following sections.\n\n### 3.2.1 The if Statement\n\nThe\
    \ simple `if` Statement conditionally executes a statement or a block of statements.\
    \ It's syntax is shown below:\n\n```\nif condition: statement\n\nif condition:\n\
    \    statements\n    ...\n```\n\nIn the first form shown above, if the condition\
    \ evaluates to `True`, the following statement is executed. If the condition evaluates\
    \ to `False`, that statement is skipped and control moves on to the next line.\n\
    \nIn the second form shown above, if the condition evaluates to `True`, all the\
    \ statements within the block are executed in sequence. If the condition evaluates\
    \ to `False`, all the statements within the block are skipped and control moves\
    \ to the first statement outside the block.\n\nThe statements inside the `if`\
    \ block are identified by their **indentation**! To keep things simple, for now\
    \ we'll use a single tab character per level of indentation.\n\nLet us write a\
    \ program that illustrates this. Here is a program that accepts the user's name\
    \ and age and prints a message saying whether the user is eligible to vote or\
    \ not, using the premise that a person needs to be at least 18 years of age in\
    \ order to be able to vote.\n\nvote1.py\n\n```python\n#!/usr/bin/python3\n\n#\
    \ Program that asks for the user's name and age\n# and prints whether the user\
    \ is eligible to vote or not!\n\nname = input(\"Enter your name: \")\nage = int(input(\"\
    Enter your age: \"))\n\nif age >= 18: print(\"Hi {}! You can vote!\".format(name))\n\
    if age < 18: print(\"Sorry {}! You can't vote!\".format(name))\n```\n\nOutput:\n\
    \n```\nEnter your name: Ram\nEnter your age: 25\nHi Ram! You can vote!\n```\n\n\
    ```\nEnter your name: Sham\nEnter your age: 15\nSorry Sham! You can't vote!\n\
    ```\n\nObservation:\n\n- 1. The condition for a person to be able to vote is `age\
    \ >= 18`. Similarly, the condition for a person to not be able to vote is `age\
    \ < 18`.\n- 2. Only one of the two conditions above can be true for any given\
    \ value of age\n\nWe have used the first syntax of the `if` statement for implementing\
    \ this since we have only a single statement to be executed if the condition is\
    \ true. However, nothing prevents us from using the second syntax and have just\
    \ a single statement within the statement block. This is shown below:\n\nvote2.py\n\
    \n```python\n#!/usr/bin/python3\n\n# Program that asks for the user's name and\
    \ age\n# and prints whether the user is eligible to vote or not!\n\nname = input(\"\
    Enter your name: \")\nage = int(input(\"Enter your age: \"))\n\nif age >= 18:\n\
    \    print(\"Hi {}! You can vote!\".format(name))\n\nif age < 18:\n    print(\"\
    Sorry {}! You can't vote!\".format(name))\n```\n\nOutput:\n\n```\nEnter your name:\
    \ Ram\nEnter your age: 25\nHi Ram! You can vote!\n```\n\n```\nEnter your name:\
    \ Sham\nEnter your age: 15\nSorry Sham! You can't vote!\n```\n\n### 3.2.2 The\
    \ if-else Statement\n\nIn the previous example, we had 2 conditions:\n\n- 1. age\
    \ >= 18\n- 2. age < 18\n\nWe see that the 2 conditions are mutually exclusive\
    \ вАУ if one is true, it implies that the other is false. In such situations, we\
    \ prefer using the `if-else` statement instead of 2 different `if` statements.\
    \ Using `if-else` is more advantageous because only 1 condition drives the flow\
    \ of control, thereby being more simple, more manageable and more efficient. The\
    \ syntax of the `if-else` statement is given below:"
