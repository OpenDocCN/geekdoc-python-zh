  md: "# 15.4 Packages\n\nIf a module is a collection of reusable code, what is a\
    \ collection of modules called? Package!\n\nA *package* is a logical collection\
    \ of modules (and as will be covered in the next section, a package can also contain\
    \ subpackages). A package makes it possible to logically group related modules\
    \ so that managing and distributing them becomes easier. Physically in the file\
    \ system, a package is a *directory* and the modules are *files* within that directory.\n\
    \nGiven that a directory is to be considered to be a package, all the Python scripts\
    \ within that will be considered to be modules. We should therefore have a mechanism\
    \ to tell Python which directories are to be considered as packages and which\
    \ are to be treated as merely directories without any other inference. This is\
    \ done by the presence of a special file called `__init__.py`. The presence of\
    \ this file in a directory is an indication to Python that the directory is to\
    \ be considered to be a package. The file could well be empty, but being a Python\
    \ script, it could also contain executable Python code that is executed when the\
    \ package is loaded for the first time (just as how modules are executed when\
    \ imported for the first time). Similarly, the absence of this file in a directory\
    \ will prevent Python from considering that directory to be a package.\n\nLet\
    \ us create some sample files to demonstrate packages and accessing it's modules\
    \ and their content. We will create a package called `pkg1` that contains 2 modules\
    \ named `mod1` and `mod2` respectively, each containing a function called `f`.\
    \ We will then see various ways of invoking these functions.\n\n```\npkg1/__init__.py\n\
    \n1.\n```\n\n```\npkg1/mod1.py\n\n1.  #!/usr/bin/python\n2.  \n3.  # Demonstration\
    \ of modules within packages\n4.  # Module mod1 containing function f\n5.  \n\
    6.  def f():\n7.      print(\"This is mod1's f\")\n```"
