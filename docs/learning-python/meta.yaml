    **Form #1:** `str.split()`


    This function splits the string `str` into pieces using the following rules:


    1.  Leading whitespaces are truncated.

    2.  Trailing whitespaces are truncated.

    3.  Any other sequence of whitespace within the string is considered as a delimiter.


    Thus, this function returns a list containing the parts of the string that are
    separated by one or more whitespaces.


    As a special case, if the string `str` is empty or comprising of only whitespace
    characters, an empty list is returned.


    **Examples:**


    ```

    >>> "India:New Delhi China:Beijing".split()

    [''India:New'', ''Delhi'', ''China:Beijing'']

    >>> " \t\nIndia:New \n\r Delhi\t\tChina:Beijing\n\n".split()

    [''India:New'', ''Delhi'', ''China:Beijing'']

    >>> "\t\t\n\r\n".split()

    []

    >>> "".split()

    []

    ```


    **Form #2:** `str.split(separator)`


    Given a separator string, this function splits the string `str` into pieces wherever
    it finds the separator and returns a list of the split parts.


    **Examples:**


    ```

    >>> "125,342,264".split(",")

    [''125'', ''342'', ''264'']

    >>> "125,,342,264".split(",")

    [''125'', '''', ''342'', ''264'']

    >>> "53269985".split("99")

    [''5326'', ''85'']

    ```


    **Note:**


    1.  The separator is a string and can be made up of multiple characters.

    2.  If the separator occurs in consecutive succession, a null string is assumed
    to be present between them and is counted as one of the split pieces.


    **Form #3:** `str.split(separator, maxsplits)`


    This function splits the string `str` into pieces whenever it finds the given
    separator. However, it ensures no more than `maxsplits` splits. Since each split
    gives one more piece, the total number of pieces this function returns is ideally
    `maxsplits+1`.


    **Note:**


    1.  If `maxsplits` splits are not possible (because the `separator` is not present
    those many times), this function anyway returns the list of split parts disregarding
    `maxsplits`.

    2.  If `maxsplits` is less than the number of splits possible, the last string
    returned in the list is the remainder un-splitted part of `str`.

    3.  If `separator` is `None`, the splitting is done as per form #1.

    4.  If `maxsplits` is -1 and `separator` is not `None`, the splitting is done
    as per form #2.


    **Examples:**


    ```

    >>> "125,342,264".split(",", 1)  # 1 split, 2 pieces

    [''125'', ''342,264'']

    >>> "125,342,264".split(",", 2)  # 2 splits, 3 pieces

    [''125'', ''342'', ''264'']

    >>> "125,342,264".split(",", 3)  # 3 splits, only 2 possible

    [''125'', ''342'', ''264'']

    ```


    **Special cases:**


    ```

    >>> "a b c d e f".split(None, 3)

    [''a'', ''b'', ''c'', ''d e f'']

    ```


    Since the `separator` is `None`, splitting is similar to form #1, but with a maximum
    of 3 splits only.


    ```

    >>> "125,342,264".split(",", -1)

    [''125'', ''342'', ''264'']

    ```


    Since `maxsplits` is -1 and `separator` is not `None`, splitting is similar to
    form #2.


    ## 8.3.3 Splitting Lines Using splitlines()


    Given a multi-line string (a string containing newline characters), the `splitlines()`
    function can break them down into separate lines and return them as a list.


    **Complete syntax:**


    ```

    str.splitlines([keepends])

    ```


    **Forms:**


    1.  `str.splitlines()`

    2.  `str.splitlines(keepends)`


    **Form #1:** `str.splitlines()`


    This function breaks down a multi-line string into a list of strings corresponding
    to each line. The splitting is done when it finds a suitable newline character
    (for simplicity, can be considered to be \n, though there are other characters
    including \r and Unicode newline characters). The newline character that was found
    is not present in the list of strings it returns.


    **Example:**


    ```

    >>> "Hello\nWorld\nHow are you?".splitlines()

    [''Hello'', ''World'', ''How are you?'']

    ```


    **Form #2:** `str.splitlines(keepends)`


    This function works just like form #1, but if `keepends` is `True` then this retains
    the newline character at the end of each line in the list. If `keepends` is `False`,
    this works just like form #1.


    **Examples:**


    ```

    >>> "Hello\nWorld\nHow are you?".splitlines(True)

    [''Hello\n'', ''World\n'', ''How are you?'']

    >>> "Hello\nWorld\nHow are you?".splitlines(False)

    [''Hello'', ''World'', ''How are you?'']

    ```


    ## 8.4 Joining Strings


    The opposite of splitting is joining. We have learnt how to split a string into
    pieces using various functions. In this section, we will learn how to join various
    pieces together to form a new string.


    ### 8.4.1 Joining Strings Using join()


    **Syntax:**


    ```

    str.join(iterable)

    ```


    The `join()` function concatenates all the strings in the `iterable` sequence
    (list, tuple, etc.) using the string `str` as the separator between them and returns
    the new string. As a special case, if `str` is a null string, there won''t be
    any separator between the strings.


    **Examples:**


    ```

    >>> ",".join(("12", "24", "36"))

    ''12,24,36''

    >>> " and ".join(("12", "24", "36"))

    ''12 and 24 and 36''

    >>> "".join(("12", "24", "36"))

    ''122436''

    ```


    ## 8.5 Modifying Strings


    The `split` and `join` operations covered in previous sections help break down
    a string into pieces and assemble them back into a string again. Strings being
    immutable cannot be modified. However, in this section, we will examine a few
    functions that derive a new string out of an existing one by performing some operation
    on it.


    ### 8.5.1 Stripping Strings Using lstrip(), rstrip() and strip()


    Stripping refers to removal of certain characters from the ends of a string.


    #### 8.5.1.1 Left Stripping Using lstrip()


    The `lstrip()` function strips leading characters (leftmost characters) from a
    string and returns the new string.


    **Complete syntax:**


    ```

    str.lstrip([chars])

    ```


    **Forms:**


    1.  `str.lstrip()`

    2.  `str.lstrip(chars)`


    **Form #1:** `str.lstrip()`


    This function left-strips the string `str`. It ends up removing the leading whitespaces
    from the string `str` and returns the new string:


    ```

    >>> " \t\r\nHello \t\r\n".lstrip()

    ''Hello \t\r\n''

    ```


    **Note:**


    1.  If the string `str` does not start with a whitespace, this function simply
    returns the original string without any changes.


    **Form #2:** `str.lstrip(chars)`


    If we wish to strip other characters apart from whitespaces, this form of the
    function can be used. We can specify all the characters (as a single string) that
    we wish to strip, if found at the beginning of the string `str`.


    The following example removes all digits from the beginning of a string:


    ```

    >>> "233Hello466World599".lstrip("0123456789")

    ''Hello466World599''

    ```


    #### 8.5.1.2 Right Stripping Using rstrip()


    The `rstrip()` function strips trailing characters (rightmost characters) from
    a string and returns the new string.


    **Complete syntax:**


    ```

    str.rstrip([chars])

    ```


    **Forms:**


    1.  `str.rstrip()`

    2.  `str.rstrip(chars)`


    **Form #1:** `str.rstrip()`


    This function right-strips the string `str`. It ends up removing the trailing
    whitespaces from the string `str` and returns the new string:


    ```

    >>> " \t\r\nHello \t\r\n".rstrip()

    '' \t\r\nHello''

    ```


    **Note:**


    1.  If the string `str` does not end with a whitespace, this function simply returns
    the original string without any changes.


    **Form #2:** `str.rstrip(chars)`


    If we wish to strip other characters apart from whitespaces, this form of the
    function can be used. We can specify all the characters (as a single string) that
    we wish to strip, if found at the end of the string `str`.


    The following example removes all digits from the end of a string:


    ```

    >>> "233Hello466World599".rstrip("0123456789")

    ''233Hello466World''

    ```


    #### 8.5.1.3 Stripping Using strip()


    The `strip()` function strips leading and trailing characters (leftmost and rightmost
    characters) from a string and returns the new string.


    **Complete syntax:**


    ```

    str.strip([chars])

    ```


    **Forms:**


    1.  `str.strip()`

    2.  `str.strip(chars)`


    **Form #1:** `str.strip()`


    This function left-strips and right-strips the string `str`. It ends up removing
    the leading and trailing whitespaces from the string `str` and returns the new
    string:


    ```

    >>> " \t\r\nHello \t\r\n".strip()

    ''Hello''

    ```


    **Note:**


    1.  If the string `str` neither starts nor ends with a whitespace, this function
    simply returns the original string without any changes.


    **Form #2:** `str.strip(chars)`


    If we wish to strip other characters apart from whitespaces, this form of the
    function can be used. We can specify all the characters (as a single string) that
    we wish to strip, if found at the beginning or end of the string `str`.


    The following example removes all digits from the beginning and end of a string:


    ```

    >>> "233Hello466World599".strip("0123456789")

    ''Hello466World''

    ```


    ### 8.5.2 Replacing Substrings Using replace()


    Replacing a substring by another within a string is a common requirement вАУ but
    strings being immutable in Python means that any such modification would require
    the creation of a new string. The `replace()` function helps replace one or more
    occurrences of a substring by another, returning a new string with the replacements
    performed.


    **Complete syntax:**


    ```

    str.replace(old, new[, count])

    ```


    **Forms:**


    1.  `str.replace(old, new)`

    2.  `str.replace(old, new, count)`'
