  md: '# SUMMARY


    +   - SQLite is an embedded RDBMS that stores databases as files. It is also capable
    of storing databases directly in memory!

    - The built-in module sqlite3 provides the functionality to work with SQLite.

    - Connections are objects of the Connection class and can be obtained using the
    connect() function, and can be closed using the close() method.

    - Queries can be executed using execute() or executemany() methods of the Cursor
    object, which can be obtained from a Connection using it''s cursor() method.

    - Results from query execution can be obtained using the fetchone(), fetchmany()
    and fetchall() methods of Cursor object. It is also possible to iterate over a
    Cursor object directly to process the query results row-wise.

    - We can also deal with query results using Row objects instead of the default
    tuples. Row objects can behave both as tuples and as dictionaries.


