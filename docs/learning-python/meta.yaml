    # 3.3 Loops


    It is now time to explore the final basic control structure вАУ loops. A loop is
    defined as a set of statements executed over and over again.


    +   - A *finite loop* is one that runs a finite number of times and then passes
    control to the statement following it

    - An *infinite loop* is one that never terminates (and therefore might require
    user intervention to terminate it along with termination of the script, like pressing
    control+C).

    - A *definite loop* is one that runs a fixed number of times (and the number of
    times it runs is evident in the script)

    - An *indefinite loop* is one that runs as long as a condition is satisfied and
    without knowing the actual data, is impossible to predict exactly how many times.


    We will eventually see examples of all these types.


