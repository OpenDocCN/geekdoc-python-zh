    \n## 15.4 еМЕ\n\nе¶ВжЮЬж®°еЭЧжШѓеПѓйЗНзФ®дї£з†БзЪДйЫЖеРИпЉМйВ£дєИж®°еЭЧзЪДйЫЖеРИзІ∞дЄЇдїАдєИпЉЯеМЕпЉБ\n\n*еМЕ*жШѓж®°еЭЧзЪДйАїиЊСйЫЖеРИпЉИе¶ВдЄЛдЄАиКВе∞ЖдїЛзїНзЪДпЉМеМЕдєЯеПѓдї•еМЕеРЂе≠РеМЕпЉЙгАВеМЕдљњеЊЧйАїиЊСдЄКеИЖзїДзЫЄеЕ≥ж®°еЭЧжИРдЄЇеПѓиГљпЉМдїОиАМжЫіжШУдЇОзЃ°зРЖеТМеИЖеПСеЃГдїђгАВеЬ®жЦЗдїґз≥їзїЯдЄ≠пЉМзЙ©зРЖдЄКпЉМеМЕжШѓдЄАдЄ™*зЫЃељХ*пЉМж®°еЭЧжШѓиѓ•зЫЃељХдЄ≠зЪД*жЦЗдїґ*гАВ\n\
    \nйЙідЇОдЄАдЄ™зЫЃељХи¶БиҐЂиІЖдЄЇеМЕпЉМеЕґдЄ≠зЪДжЙАжЬЙ Python иДЪжЬђйГље∞ЖиҐЂиІЖдЄЇж®°еЭЧгАВеЫ†ж≠§пЉМжИСдїђеЇФиѓ•жЬЙдЄАзІНжЬЇеИґжЭ•еСКиѓЙ Python еУ™дЇЫзЫЃељХеЇФиҐЂиІЖдЄЇеМЕпЉМеУ™дЇЫеЇФдїЕиҐЂиІЖдЄЇзЫЃељХиАМдЄНеБЪеЕґдїЦжО®жЦ≠гАВињЩжШѓйАЪињЗдЄАдЄ™еРНдЄЇ\
    \ `__init__.py` зЪДзЙєжЃКжЦЗдїґзЪДе≠ШеЬ®жЭ•еЃЮзО∞зЪДгАВзЫЃељХдЄ≠е≠ШеЬ®ж≠§жЦЗдїґеРС Python и°®жШОиѓ•зЫЃељХеЇФиҐЂиІЖдЄЇдЄАдЄ™еМЕгАВиѓ•жЦЗдїґеПѓдї•жШѓз©ЇзЪДпЉМдљЖдљЬдЄЇдЄАдЄ™ Python\
    \ иДЪжЬђпЉМеЃГдєЯеПѓдї•еМЕеРЂеПѓжЙІи°МзЪД Python дї£з†БпЉМињЩдЇЫдї£з†БеЬ®еМЕй¶Цжђ°еК†иљљжЧґжЙІи°МпЉИе∞±еГПж®°еЭЧеЬ®й¶Цжђ°еѓЉеЕ•жЧґжЙІи°МдЄАж†ЈпЉЙгАВеРМж†ЈпЉМзЫЃељХдЄ≠зЉЇе∞Сж≠§жЦЗдїґе∞ЖйШїж≠Ґ Python\
    \ е∞Жиѓ•зЫЃељХиІЖдЄЇеМЕгАВ\n\nиЃ©жИСдїђеИЫеїЇдЄАдЇЫз§ЇдЊЛжЦЗдїґжЭ•жЉФз§ЇеМЕеПКеЕґж®°еЭЧеТМеЖЕеЃєзЪДиЃњйЧЃгАВжИСдїђе∞ЖеИЫеїЇдЄАдЄ™еРНдЄЇ `pkg1` зЪДеМЕпЉМеЕґдЄ≠еМЕеРЂдЄ§дЄ™еИЖеИЂеРНдЄЇ `mod1`\
    \ еТМ `mod2` зЪДж®°еЭЧпЉМжѓПдЄ™ж®°еЭЧеМЕеРЂдЄАдЄ™еРНдЄЇ `f` зЪДеЗљжХ∞гАВзДґеРОжИСдїђе∞ЖзЬЛеИ∞и∞ГзФ®ињЩдЇЫеЗљжХ∞зЪДеРДзІНжЦєеЉПгАВ\n\n```\npkg1/__init__.py\n\
    ```\n\n```\npkg1/mod1.py\n#!/usr/bin/python\n\n# еМЕеЖЕж®°еЭЧзЪДжЉФз§Ї\n# еМЕеРЂеЗљжХ∞ f зЪДж®°еЭЧ mod1\n\n\
    def f():\n    print(\"This is mod1's f\")\n```\n\n```\npkg1/mod2.py\n#!/usr/bin/python\n\
    \n# еМЕеЖЕж®°еЭЧзЪДжЉФз§Ї\n# еМЕеРЂеЗљжХ∞ f зЪДж®°еЭЧ mod2\n\ndef f():\n    print(\"This is mod2's f\")\n\
    ```\n\n**дЇ§дЇТеЉПдЉЪиѓЭпЉЪ**\n\n```\n>>> import pkg1\n>>> from pkg1 import mod1, mod2\n>>>\
    \ mod1.f()\nThis is mod1's f\n>>> mod2.f()\nThis is mod2's f\n```\n\n**иІВеѓЯпЉЪ**\n\
    \n1. жЦЗдїґ `pkg1/__init__.py` жШѓз©ЇзЪДгАВжИСдїђз®НеРОе∞ЖзЬЛеИ∞еПѓдї•жЈїеК†дїАдєИдї£з†БгАВ\n2. иѓ≠еП• `import pkg1` дљњзђ¶еПЈ `pkg1`\
    \ еЬ®з®ЛеЇПдЄ≠еПѓзФ®гАВж≠§иѓ≠еП•ињШе∞ЖиіЯиі£жЙІи°МжЦЗдїґ `pkg1/__init__.py`гАВ\n3. иѓ≠еП• `from pkg1 import mod1, mod2`\
