    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="""INSERT INTO Employee VALUES(?,?,?)"""

    >>> employees=[("Sita",10,"sita@company.com"),

    ("Gita",11,"gita@company.com")]

    >>> cursor.executemany(query,employees)

