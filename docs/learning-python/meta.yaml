    **Observation:**


    +   1. We created an empty class A and created an instance of it, the reference
    to which was stored in the variable a.

    2. We see that though the class A did not provide an implementation for the `__str__`
    method, there was no error and we continue to get a string version due to the
    implementation in the `object` class.


    Let us add a method by name `__str__` in class A to return a string and observe
    the behaviour:


    ```

    >>> class A:

    ...     def __str__(self):

    ...             return "Hi"

    ...

    >>> a=A()

    >>> str(a)

    ''Hi''

    ```


    **Observation:**


    +   1. This time, our class A contains an implementation for the `__str__` method,
    which is designed to return the string "Hi" when invoked.

    2. We create an instance of class A and store it''s reference in the variable
    a.

    3. We observe that `str(a)` ends up returning the string "Hi", proving that `str(a)`
    ended up making the call `a.__str__()`.


    Some of the sample programs in section 12.10 will make use of this to provide
    appropriate string representations of objects of user-defined classes.


    # 12.8.3 Operator Overloading


    Most of the basic operators can work even with objects of user-defined classes
    if the operation methodology is taught to the Python interpreter using the concept
    of *operator overloading*.'
