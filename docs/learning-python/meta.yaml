    # SUMMARY


    +   - A dictionary is a collection of key-value pairs subject to the constraint
    that all the keys should be unique.

    - A dictionary can be simply created using {} with colons separating the key from
    the value. Empty braces denote an empty dictionary.

    - Elements of a dictionary can be accessed using [] or the get() method with the
    key being used as the index.

    - The len() function gives the number of pairs in a dictionary.

    - The for loop can be naturally used to iterate through the key-value pairs of
    a dictionary. It is also possible to iterate through the keys using the keys()
    method and iterate through the values using the values() method.

    - The in and not in operators check for the existence of a key in a dictionary.

    - New elements can be added to a dictionary using the setdefault() method or by
    assigning using the [] operator.

    - The pop() method deletes a key-value pair from a dictionary while the popitem()
    method and del function remove a specified key-value pair identified by the key
    from a dictionary. The clear() method removes all key-value pairs from a dictionary.


