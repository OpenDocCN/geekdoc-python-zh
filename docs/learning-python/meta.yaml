    # SUMMARY


    +   - Python relies on indentation rules to figure out the body of any construct.
    Generally, programmers use a single tab or 4 spaces to identify a single level
    of indentation.

    - The if-elif-else construct permits testing of various conditions and execution
    of a single block of code based on the truth value of the condition(s).

    - Python does not permit empty blocks - such blocks should have at least the pass
    statement.

    - The while-else construct permits the execution of a block of code as long as
    a given condition evaluates to True.

    - The for-else construct permits the execution of a block of code for each element
    of a sequence.

    - The break statement can be used to prematurely terminate a loop and the continue
    statement can be used to prematurely terminate the current iteration of a loop.

    - The range() function can be used in conjunction with the for construct to loop
    through a range of values.

    - A script can be terminated anytime using sys.exit().


