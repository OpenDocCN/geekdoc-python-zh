    >>> len(L)

    0

    ```


    # 4.4 Iterating Through List Elements


    One of the most practical operations we end up performing on lists is iterating
    through them and processing each element in sequence. Since lists are sequences,
    the `for` loop is directly compatible for iterating as shown in the example below:


