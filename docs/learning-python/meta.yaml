    \ that packages and modules in the current working directory is given more preference\
    \ than the library modules! What this means is that we can provide replacements\
    \ for library packages and modules!\n\nThe next question is how is `sys.path`\
    \ built? The contents of `sys.path` are loaded as follows:\n\n- 1. The first entry\
    \ is always the current working directory.\n- 2. The second set of entries are\
    \ picked up from the environment variable `PYTHONPATH`, if present. This variable\
    \ has the same usage as `PATH` вАУ it is a list of directories separated by a delimiter.\
