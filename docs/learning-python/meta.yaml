    ```\n\nThe above syntax shows at least 2 compulsory base classes as without that\
    \ this would be called multiple inheritance in the first place! There is no limit\
    \ to how many classes a class can extend from. The order of inheritance is an\
    \ important property here and goes from left to right in the base class list.\
    \ Thus, the first base class is `baseClass1`, the second base class is `baseClass2`\
    \ and so on. The order of inheritance matters when we use built-ins like `super()`,\
    \ and professionals always aim to ensure that constructor calls are always in\
    \ the order of inheritance whereas destructor calls are always in the strict reverse\
    \ order. These are demonstrated in the following sections.\n\nThe program given\
    \ below demonstrates multiple inheritance:\n\n# Inheritance7.py\n\n```\n1.  #!/usr/bin/python\n\
    2.  \n3.  # Inheritance Demo:\n4.  # Multiple Inheritance\n5.  \n6.  class A:\n\
    7.      def fa(self):\n8.          print(\"A called\")\n9.  \n10. class B:\n11.\
    \     def fb(self):\n12.         print(\"B called\")\n13. \n14. class C(A,B):\n\
    15.     def fc(self):\n16.         self.fa()\n17.         self.fb()\n18.     \
    \    print(\"C called\")\n19. \n20. c=C()\n21. c.fc()\n```\n\n# Output:\n\n```\n\
    A called\nB called\nC called\n```\n\n# Observation:\n\n- 1. Class A is defined\
    \ in line 6 and contains a method fa defined in line 7.\n- 2. Class B is defined\
    \ in line 10 and contains a method fb defined in line 11.\n- 3. Class C is defined\
    \ in line 14 and derives from class A and class B. The order of inheritance is\
    \ A followed by B, though in this example we do not observe any result because\
    \ of this order.\n- 4. A method fc is defined in line 14 inside class C, which\
    \ invokes methods fa and fb upon itself, available to it because of inheritance.\n\
    \n### 12.6.6 Function Overriding in Multiple Inheritance\n\nFunction Overriding\
