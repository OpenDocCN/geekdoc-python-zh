    2.  еЬ®дЄ≠зЉАи°®иЊЊеЉПдЄ≠пЉМжЛђеПЈзїПеЄЄиҐЂзФ®жЭ•жФєеПШињРзЃЧзђ¶зЪДдЉШеЕИзЇІгАВеЬ®еРОзЉАи°®иЊЊеЉПдЄ≠пЉМжИСдїђж†єжЬђдЄНдљњзФ®жЛђеПЈпЉМеЫ†дЄЇдЄАжЧ¶и°®иЊЊеЉПиҐЂдїФзїЖжЮДеїЇпЉМе∞±дЄНе≠ШеЬ®йЬАи¶Бе§ДзРЖзЪДдЉШеЕИзЇІйЧЃйҐШгАВ\n\
    3.  еЯЇдЇОдЄКињ∞еОЯеЫ†пЉМжИСдїђеПСзО∞зЉЦеЖЩз®ЛеЇПжЭ•ж±ВеАЉеРОзЉАи°®иЊЊеЉПжѓФж±ВеАЉдЄ≠зЉАи°®иЊЊеЉПжЫіеЃєжШУгАВ\n4.  дЄКињ∞еОЯеЫ†дєЯиѓБжШОдЇЖдљњзФ®еЙНзЉАи°®з§Їж≥ХдЉШдЇОдЄ≠зЉАи°®з§Їж≥ХпЉМдљЖеРОзЉАи°®з§Їж≥ХжѓФеЙНзЉАи°®з§Їж≥Хз®Не•љзЪДеЬ∞жЦєеЬ®дЇОпЉМжИСдїђеПѓдї•зЫіжО•дљњзФ®ж†ИжЭ•ж±ВеАЉеРОзЉАи°®иЊЊеЉПпЉИж≠£е¶ВжЬђиКВеРОйЭҐе∞ЖзЬЛеИ∞зЪДпЉЙгАВ\n\
    \nиЩљзДґеРОзЉАи°®иЊЊеЉПзЪДж±ВеАЉйЭЮеЄЄзЃАеНХпЉМдљЖе∞ЖдЄ≠зЉАи°®иЊЊеЉПиљђжНҐдЄЇеРОзЉАи°®иЊЊеЉПеИЩз®НеЊЃе§НжЭВдЄАдЇЫпЉМеЫ†дЄЇжИСдїђе∞ЖдЄНеЊЧдЄНе§ДзРЖдЄ≠зЉАи°®иЊЊеЉПдЄ≠ињРзЃЧзђ¶зЪДдЉШеЕИзЇІгАВ\n\nдЄЛдЄАдЄ™з®ЛеЇПе∞ЖдЄАдЄ™жЬЙжХИзЪДдЄ≠зЉАзЃЧжЬѓи°®иЊЊеЉПиљђжНҐдЄЇеЕґз≠ЙжХИзЪДеРОзЉАи°®иЊЊеЉПгАВељУзДґпЉМиѓ•з®ЛеЇПдЄОеЙНдЄАдЄ™з®ЛеЇПеБЪеЗЇзЫЄеРМзЪДеБЗиЃЊвАФвАФжУНдљЬжХ∞жШѓеНХе≠Чзђ¶еПШйЗПпЉМињРзЃЧзђ¶жШѓдЇМеЕГињРзЃЧзђ¶вАЬ+вАЭгАБвАЬ-вАЭгАБвАЬ*вАЭеТМвАЬ/вАЭгАВ\n\
    \nз®ЛеЇПдЄ≠дљњзФ®зЪДеЯЇжЬђйАїиЊСе¶ВдЄЛпЉИдљњзФ®дЄАдЄ™ж†ИжЭ•дЄіжЧґе≠ШеВ®ињРзЃЧзђ¶пЉЙпЉЪ\n\n1.  дїОзФ®жИЈе§ДжО•еПЧдЄАдЄ™дЄ≠зЉАи°®иЊЊеЉПпЉМеєґдїОеЈ¶еИ∞еП≥йАРдЄ™е≠Чзђ¶жЙЂжППеЃГгАВ\n2.  е¶ВжЮЬе≠Чзђ¶жШѓжУНдљЬжХ∞пЉМеИЩе∞ЖеЕґеОЯж†ЈиљђзІїеИ∞иЊУеЗЇе≠Чзђ¶дЄ≤пЉИеЫ†дЄЇжУНдљЬжХ∞зЪДдљНзљЃжАїжШѓеЫЇеЃЪзЪДпЉМеП™жЬЙињРзЃЧзђ¶зЪДдљНзљЃйЬАи¶БжФєеПШпЉЙгАВ\n\
    3.  йБЗеИ∞еЈ¶жЛђеПЈжЧґпЉМе∞ЖеЕґеОЛеЕ•ињРзЃЧзђ¶ж†ИпЉИеЫ†дЄЇжИСдїђеЄМжЬЫйБЗеИ∞зЫЄеЇФзЪДеП≥жЛђеПЈдї•еЃМеЕ®е§ДзРЖеЃГпЉЙгАВ\n4.  йБЗеИ∞еП≥жЛђеПЈжЧґпЉМдїОињРзЃЧзђ¶ж†ИдЄ≠еЉєеЗЇжЙАжЬЙињРзЃЧзђ¶еИ∞иЊУеЗЇе≠Чзђ¶дЄ≤пЉМзЫіеИ∞еЬ®ж†ИдЄ≠йБЗеИ∞еЈ¶жЛђеПЈпЉМзДґеРОдЄҐеЉГиѓ•еЈ¶жЛђеПЈгАВињЩе∞Жз°ЃдњЭжЛђеПЈеЖЕзЪДжХідЄ™и°®иЊЊеЉПиҐЂе§ДзРЖгАВ\n\
    5.  йБЗеИ∞ињРзЃЧзђ¶жЧґпЉМжИСдїђдїОж†ИдЄ≠еЉєеЗЇжЙАжЬЙдЉШеЕИзЇІйЂШдЇОељУеЙНж≠£еЬ®е§ДзРЖзЪДињРзЃЧзђ¶зЪДињРзЃЧзђ¶пЉМеєґе∞ЖеЃГдїђиљђзІїеИ∞иЊУеЗЇе≠Чзђ¶дЄ≤гАВзДґеРОжИСдїђе∞ЖељУеЙНињРзЃЧзђ¶еОЛеЕ•ињРзЃЧзђ¶ж†ИгАВињЩе∞Жз°ЃдњЭињРзЃЧзђ¶дї•ж≠£з°ЃзЪДй°ЇеЇПеСИзО∞гАВ\n\
    6.  е§ДзРЖеЃМжХідЄ™дЄ≠зЉАи°®иЊЊеЉПеРОпЉМжИСдїђе∞ЖињРзЃЧзђ¶ж†ИдЄ≠еЙ©дљЩзЪДињРзЃЧзђ¶еЉєеЗЇеєґиљђзІїеИ∞иЊУеЗЇе≠Чзђ¶дЄ≤гАВ\n\n## infix2postfix.py\n\n```python\n\
    #!/usr/bin/python\n\n# дЄ≠зЉАиљђеРОзЉАиљђжНҐеЩ®\n\ninfix = input(\"Enter an infix expression:\"\
    )\npostfix = ''\n\nprecedence = {'(':0,'+':1,'-':1,'*':2,'/':2}\noperators = []\n\
    \nfor i in infix:\n    if i.isalpha(): postfix += i\n    elif i == '(': operators.append(i)\n\
    \    elif i == ')':\n        while not operators[-1] == '(':\n            postfix\
    \ += operators.pop()\n        operators.pop()\n    else:\n        while len(operators)>0\
    \ and precedence[operators[-1]]>=precedence[i]:\n            postfix += operators.pop()\n\
    \        operators.append(i)\n\noperators.reverse()\npostfix += ''.join(operators)\n\
    \nprint(postfix)\n```\n\n## иІВеѓЯпЉЪ\n\n1.  жИСдїђеЬ®зђђ5и°МдїОзФ®жИЈе§ДжО•еПЧдЄ≠зЉАи°®иЊЊеЉПпЉИ`infix`пЉЙпЉМеєґеЬ®зђђ6и°МеИЭеІЛеМЦиЊУеЗЇе≠Чзђ¶дЄ≤пЉИ`postfix`пЉЙгАВ\n\
    2.  жИСдїђеЬ®зђђ9и°МзїіжК§дЄАдЄ™ињРзЃЧзђ¶ж†ИпЉИ`operators`пЉЙгАВ\n3.  ињРзЃЧзђ¶зЪДдЉШеЕИзЇІдї•е≠ЧеЕЄпЉИ`precedence`пЉЙзЪДељҐеЉПиЃ∞ељХеЬ®зђђ8и°МгАВйФЃжШѓињРзЃЧзђ¶зђ¶еПЈпЉМеАЉжШѓжХ∞еАЉдЉШеЕИзЇІпЉМеАЉиґКйЂШи°®з§ЇдЉШеЕИзЇІиґКйЂШгАВеЫ†ж≠§пЉМвАЬ*вАЭеТМвАЬ/вАЭеЕЈжЬЙзЫЄеРМзЪДдЉШеЕИзЇІпЉМйЂШдЇОвАЬ+вАЭеТМвАЬ-вАЭзЪДдЉШеЕИзЇІгАВеЈ¶жЛђеПЈеЬ®ињЩйЗМиҐЂиµЛдЇИжЬАдљОдЉШеЕИзЇІпЉМеЫ†дЄЇеЃГдєЯеПѓдї•е≠ШеЬ®дЇОж†ИдЄ≠пЉМеєґдЄФйЩ§дЇЖеП≥жЛђеПЈе§ЦпЉМдЄНеЇФеЫ†дїїдљХеЕґдїЦињРзЃЧзђ¶иАМиҐЂеЉєеЗЇгАВ\n\
    4.  жИСдїђеЬ®зђђ11и°МйБНеОЖдЄ≠зЉАе≠Чзђ¶дЄ≤дЄ≠зЪДе≠Чзђ¶гАВ\n5.  жУНдљЬжХ∞еЬ®зђђ12и°МиҐЂиљђзІїеИ∞иЊУеЗЇе≠Чзђ¶дЄ≤гАВ\n6.  еЈ¶жЛђеПЈеЬ®зђђ13и°МиҐЂжЧ†жЭ°дїґеЬ∞еОЛеЕ•ињРзЃЧзђ¶ж†ИгАВ\n7.\
    \  йБЗеИ∞еП≥жЛђеПЈжЧґпЉМжЙАжЬЙињРзЃЧзђ¶еЬ®зђђ15-16и°МдїОж†ИдЄ≠еЉєеЗЇеИ∞иЊУеЗЇе≠Чзђ¶дЄ≤пЉМзЫіеИ∞еЬ®ж†ИдЄ≠жЙЊеИ∞еЈ¶жЛђеПЈињРзЃЧзђ¶пЉМзДґеРОеЬ®зђђ17и°Ме∞ЖеЕґдЄҐеЉГгАВ\n8.  йБЗеИ∞ињРзЃЧзђ¶жЧґпЉМжЙАжЬЙдЉШеЕИзЇІжЫійЂШзЪДињРзЃЧзђ¶еЬ®зђђ19-20и°МдїОињРзЃЧзђ¶ж†ИдЄ≠еЉєеЗЇеИ∞иЊУеЗЇе≠Чзђ¶дЄ≤гАВзДґеРОељУеЙНињРзЃЧзђ¶еЬ®зђђ21и°МиҐЂеОЛеЕ•ињРзЃЧзђ¶ж†ИгАВ\n\
    9.  е§ДзРЖеЃМдЄ≠зЉАи°®иЊЊеЉПеРОпЉМињРзЃЧзђ¶ж†ИдЄ≠еЙ©дљЩзЪДињРзЃЧзђ¶йЬАи¶БиҐЂеЉєеЗЇеИ∞иЊУеЗЇе≠Чзђ¶дЄ≤гАВеЃЮзО∞зЫЄеРМжХИжЮЬзЪДдЄАдЄ™жЫізЃАеНХзЪДжУНдљЬжШѓеПНиљђж†ИзЪДеЖЕеЃєпЉМе∞ЖеЃГдїђеЕ®йГ®ињЮжО•иµЈжЭ•ељҐжИРдЄАдЄ™е≠Чзђ¶дЄ≤пЉМеєґе∞Жиѓ•е≠Чзђ¶дЄ≤йЩДеК†еИ∞иЊУеЗЇе≠Чзђ¶дЄ≤пЉМе¶Взђђ23-24и°МжЙАз§ЇгАВ\n\
    10. иЊУеЗЇе≠Чзђ¶дЄ≤жЬАзїИеЬ®зђђ26и°МжЙУеН∞гАВ\n\n## 11.10.3 ж±ВеАЉеРОзЉАзЃЧжЬѓи°®иЊЊеЉП\n\nжЧҐзДґжИСдїђзЯ•йБУдЇЖе¶ВдљХе∞ЖдЄ≠зЉАзЃЧжЬѓи°®иЊЊеЉПиљђжНҐдЄЇеЕґз≠ЙжХИзЪДеРОзЉАи°®иЊЊеЉПпЉМиЃ©жИСдїђдЄУж≥®дЇОе¶ВдљХж±ВеАЉињЩдЇЫеРОзЉАзЃЧжЬѓи°®иЊЊеЉПгАВжИСдїђеЖНжђ°еБЗиЃЊжПРдЊЫзїЩжИСдїђзЪДеРОзЉАзЃЧжЬѓи°®иЊЊеЉПжШѓжЬЙжХИзЪДпЉМеєґдЄФзФ±еНХе≠Чзђ¶гАБеМЇеИЖе§Іе∞ПеЖЩзЪДеПШйЗПеТМдЇМеЕГињРзЃЧзђ¶вАЬ+вАЭгАБвАЬ-вАЭгАБвАЬ*вАЭеТМвАЬ/вАЭзїДжИРгАВ\n\
    \n**ж±ВеАЉеРОзЉАзЃЧжЬѓи°®иЊЊеЉПзЪДж≠•й™§пЉЪ**\n\n1.  дїОеЈ¶еИ∞еП≥жЙЂжППзїЩеЃЪзЪДеРОзЉАи°®иЊЊеЉПгАВ\n2.  ељУйБЗеИ∞жУНдљЬжХ∞жЧґпЉМж£АжЯ•жИСдїђжШѓеР¶еЈ≤зїПзЯ•йБУеЃГзЪДеАЉгАВе¶ВжЮЬдЄНзЯ•йБУпЉМиѓЈеРСзФ®жИЈиѓҐйЧЃеЕґеАЉеєґиЃ∞ељХдЄЛжЭ•гАВжУНдљЬжХ∞зЪДеАЉиҐЂеОЛеЕ•ж†ИдЄ≠гАВ\n\
    3.  ељУйБЗеИ∞ињРзЃЧзђ¶жЧґпЉМеЃГдљЬзФ®дЇОж†Ий°ґзЪДдЄ§дЄ™еАЉпЉМеЕґдЄ≠ж†Ий°ґзЪДеАЉжШѓзђђдЇМдЄ™жУНдљЬжХ∞гАВжУНдљЬзЪДзїУжЮЬиҐЂеОЛеЕ•ж†ИдЄ≠гАВ\n4.  е§ДзРЖеЃМжХідЄ™и°®иЊЊеЉПеРОпЉМи°®иЊЊеЉПзЪДеАЉе∞ЖжШѓж†ИдЄ≠еФѓдЄАзЪДеЕГзі†гАВжИСдїђеП™йЬАе∞ЖеЕґеЉєеЗЇеєґжШЊз§ЇеН≥еПѓгАВ\n\
    \nиѓЈж≥®жДПпЉМдЄОдєЛеЙНжИСдїђжЬЙдЄАдЄ™ињРзЃЧзђ¶ж†ИзЪДз®ЛеЇПдЄНеРМпЉМеЬ®ињЩдЄ™з®ЛеЇПдЄ≠жИСдїђжЬЙдЄАдЄ™жУНдљЬжХ∞еАЉзЪДж†ИпЉБ\n\n## postfixEval.py\n\n```python\n\
    #!/usr/bin/python\n\n# еРОзЉАи°®иЊЊеЉПж±ВеАЉеЩ®\n\npostfix = input(\"Enter a postfix expression:\"\
    )\nstack = []\noperands = {}\n\nfor i in postfix:\n    if i.isalpha(): # жУНдљЬжХ∞\n\
    \        if i not in operands:\n            operands[i] = int(input(\"Enter the\
    \ value of {}: \".format(i)))\n        stack.append(operands[i])\n    elif i=='+':\
    \ stack.append(stack.pop() + stack.pop())\n    elif i=='*': stack.append(stack.pop()\
    \ * stack.pop())\n    elif i=='-': stack.append(-(stack.pop() - stack.pop()))\n\
    \    elif i=='/': stack.append(1/(stack.pop() / stack.pop()))\n\nprint(\"Value:\"\
    ,stack.pop())\n```\n\n## иІВеѓЯпЉЪ\n\n1.  жИСдїђеЬ®зђђ5и°МжО•еПЧеРОзЉАи°®иЊЊеЉПпЉИ`postfix`пЉЙгАВ\n2.  жИСдїђеЬ®зђђ6и°МеИЫеїЇдЄАдЄ™ж†ИпЉИ`stack`пЉЙжЭ•е≠ШеВ®дЄ≠йЧіи°®иЊЊеЉПеАЉгАВ\n\
    3.  жИСдїђеЬ®зђђ7и°Ме∞ЖжЙАжЬЙеПШйЗПпЉИ`operands`пЉЙеПКеЕґеѓєеЇФзЪДеАЉе≠ШеВ®еЬ®е≠ЧеЕЄ `operands` дЄ≠гАВ\n4.  жИСдїђеЬ®зђђ9и°МдїОеЈ¶еИ∞еП≥йАРдЄ™е≠Чзђ¶йБНеОЖеРОзЉАи°®иЊЊеЉПгАВ\n\
    5.  зђђ10-13и°Ме§ДзРЖжУНдљЬжХ∞гАВе¶ВжЮЬжУНдљЬжХ∞еЬ®е≠ЧеЕЄ `operands` дЄ≠дЄНе≠ШеЬ®дљЬдЄЇйФЃпЉМжИСдїђи¶Бж±ВзФ®жИЈиЊУеЕ•еЕґеАЉпЉМеєґе∞ЖжУНдљЬжХ∞еПКеЕґеЕ≥иБФеАЉе≠ШеВ®еЬ® `operands`\
    \ дЄ≠пЉМжЬАеРОе∞ЖжУНдљЬжХ∞зЪДеАЉеОЛеЕ•ж†И `stack`гАВ\n6.  еѓєдЇОжѓПдЄ™ињРзЃЧзђ¶пЉМжИСдїђдїОж†И `stack` дЄ≠еЉєеЗЇдЄ§дЄ™еАЉпЉМеѓєеЃГдїђињЫи°МжУНдљЬпЉМзДґеРОе∞ЖзїУжЮЬеОЛеЫЮгАВињЩеЬ®зђђ14-17и°МеЃМжИРгАВ\n\
    7.  жЬАеРОпЉМеЬ®зђђ19и°МпЉМжИСдїђдїОж†И `stack` дЄ≠еЉєеЗЇзїУжЮЬеєґжШЊз§ЇеЃГгАВ"
