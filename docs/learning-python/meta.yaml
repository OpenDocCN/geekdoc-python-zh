    ```

    пЉИжО•зї≠дЄКдЄАдЄ™дЉЪиѓЭпЉЙ

    >>> root[1][0].get("id")

    ''main''

    ```


    **иІВеѓЯпЉЪ**


    1.  и°®иЊЊеЉП`root[1][0]`зїЩдЇЖжИСдїђдЄАдЄ™и°®з§Ї`div`ж†Зз≠ЊзЪД`Element`еѓєи±°гАВ

    2.  `div`ж†Зз≠ЊжЬЙдЄАдЄ™еРНдЄЇ`id`зЪДе±ЮжАІпЉМеЕґеАЉдЄЇ`main`гАВ


    #### 18.2.3.4 жПРеПЦж†Зз≠ЊзЪДе≠Чзђ¶дЄ≤еЖЕеЃє


    и¶БжПРеПЦж†Зз≠ЊеЖЕзЪДжЦЗжЬђеЖЕеЃєпЉМеПѓдї•дљњзФ®`text`е±ЮжАІпЉМе¶ВдЄЛжЙАз§ЇпЉЪ


    ```

    пЉИжО•зї≠дЄКдЄАдЄ™дЉЪиѓЭпЉЙ

    >>> root[0]

    <Element ''head'' at 0x7f518edc9f98>

