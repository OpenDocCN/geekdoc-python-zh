    # 11.10.2 Infix to Postfix Conversion


    While we humans find it convenient to deal with the infix notation for representation
    of an expression, computers will find it more convenient to deal with prefix and
    postfix notations.


    In the `prefix` notation, a binary operator always precedes it''s 2 operands,
    which immediately follow the operator as shown in the syntax below:


    ```

    operator operand1 operand2

    ```


    In the `postfix` notation, a binary operator always succeeds it''s 2 operands,
    which immediately precede the operator as shown in the syntax below:'
