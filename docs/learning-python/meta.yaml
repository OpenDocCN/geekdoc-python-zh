  md: '# SUMMARY


    +   - A set is an unordered collection of unique elements - elements cannot be
    added to or deleted from a tuple.

    - A tuple can be simply created using {}. Elements of a set cannot be directly
    accessed as they are unordered collections.

    - The len() function gives the number of elements in a set.

    - The for loop can be naturally used to iterate through the elements of a set.

    - The in and not in operators check for the existence of an element in a set.

    - The add() method allows an element to be added to a set and the update() method
    allows a set of elements to be added to a set.

    - The pop() method deletes an element from a set and the remove() and discard()
    methods remove a specified element from a set. The clear() method removes all
    elements from a set.

    - The union(), intersection(), difference() and symmetric_difference() perform
    basic set operations.

    - The isdisjoint(), issubset() and issuperset() methods are useful Boolean methods.


