    # 1. Introduction


    **Observation:**


    +   1. `2+3` is a valid expression in Python. If it was an invalid expression,
    we would have got an error message.

    2. The Python interpreter responds by printing the value of the expression, 5
    in this case.

    3. After finishing with the expression, the Python interpreter shows the Python
    prompt again, waiting for the next command from us.


    Let us also type in a valid Python statement and see what happens:


    ```

    >>> import math

    >>>

    ```


    **Observation:**


    +   1. The statement "`import math`" is a valid statement in Python and means
    that we wish to import the `math` module. Had the statement been invalid, we would
    have received an error message.

    2. Valid Python statements are executed by the Python interpreter immediately,
    though it''s effect might not always be visible. The Python interpreter prints
    the result of the statement only if either the statement was actually an expression
    (in which case, the value of the expression is printed), or we had explicitly
    issued a Python statement to print something (using the `print()` function, for
    instance, which we will see later on).


    Now that we know how to work on the Python interpreter, let us also learn how
    to quit the interpreter when we are done. Typing an end-of-file character (Control-D
    on Unix/Linux, Control-Z on Windows) at the Python primary prompt causes the interpreter
    to exit. You can also exit the interpreter by typing the `quit()` command:


    ```

    >>> quit()

    ```


    The interpreter''s line-editing features include the following (provided the system
    supports them):


    +   1. **Interactive editing** вАУ the ability to edit the current line contents
    before submission by using cursor keys, backspace and delete keys.

    2. **History substitution** вАУ the ability to reproduce previously entered lines
    by using the up and down cursor keys.

    3. **Code completion** вАУ the ability to complete the current word when the user'
  - '[PAGE 20]


    presses tab (or produces a list of options when there are multiple possibilities).


    The interpreter operates somewhat like the Unix shell: when called with standard
    input connected to a tty device, it reads and executes commands interactively;
    when called with a file name argument or with a file as standard input, it reads
    and executes a script from that file.


    A second way of starting the interpreter is:


    ```

    python -c command [arg] ...

    ```


    This launches the Python interpreter which executes the statement(s) in command,
    analogous to the Unix shell''s -c option. Since Python statements often contain
    spaces or other characters that are special to the shell, it is usually advised
    to quote command with quotes (preferably single quotes).


    Here''s an example:


    ```

    $ python3 -c ''a=2+3; print(a)''

    5

    ```


    **Observation:**


    +   1. We have given 2 statements: `a=2+3` and `print(a)`. Python understands
    they are separate statements because of the semi-colon (`;`) between them. The
    space given between them is only for readability.

    2. Since the shell might have a problem with some special characters within the
    Python statements (like semi-colon and space), we prefer to enclose the set of
    statements within single quotes, the contents of which the shell will not process.

    3. After executing the set of statements, the Python interpreter automatically
    terminates.


