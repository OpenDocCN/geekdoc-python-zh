    # 12.9.4 Empty Classes as Data Types


    Since instance variables are not defined within classes, it is possible to start
    with an empty class but add instance variables directly in the instances themselves
    as shown in the example below:


    ```

    >>> class A:

    ...     pass

    ...

    >>> a=A()

    >>> a.x=10

    >>> a.y=20

    >>> a.x

    10

    ```


    In such cases, having an empty class does not mean that the instances are empty!


    > **Note for C/C++ Programmers:**

    The equivalent of the `struct` data type of C is an empty class whose instances
    can have any field required.


