    \ Python зЪД `complex` з±їеЮЛгАВ\n16. Python иІ£йЗКеЩ®зЪД `help()` еЗљжХ∞дЄО `--help` йАЙй°єжЬЙдљХдЄНеРМпЉЯ\n17. зЃАи¶БиѓіжШО\
    \ Python дЄ≠зЪДж†ЉеЉПеМЦе≠Чзђ¶дЄ≤гАВ\n\n## 2.10 зїГдє†\n\n1.  зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•еИ§жЦ≠зїЩеЃЪзЪДжХ∞е≠ЧжШѓеР¶жШѓеЃМеЕ®еє≥жЦєжХ∞гАВ\n2.  зЉЦеЖЩ Python\
    \ иѓ≠еП•пЉМдљњзФ®еПШйЗП `p`гАБ`t` еТМ `r` еИЖеИЂи°®з§ЇжЬђйЗСгАБеИ©зОЗеТМжЧґйЧіпЉМиЃ°зЃЧеєґжЙУеН∞еНХеИ©гАВ\n3.  зЉЦеЖЩ Python иѓ≠еП•жЭ•еИЫеїЇ 2 дЄ™ `complex`\
    \ еѓєи±°пЉМеєґжЙУеН∞еЃГдїђзЪДеТМгАБеЈЃеТМзІѓгАВ\n4.  зЉЦеЖЩ Python иѓ≠еП•е∞Ж `complex` еѓєи±°дїОжЮБеЭРж†ЗиљђжНҐдЄЇзЫіиІТеЭРж†ЗпЉМеПНдєЛдЇ¶зДґгАВ\n5.  зЉЦеЖЩ Python\
    \ иѓ≠еП•дїОзФ®жИЈе§ДжО•еПЧдЄАдЄ™е≠Чзђ¶дЄ≤пЉМеєґдї•ж†ЗйҐШе§Іе∞ПеЖЩељҐеЉПжЙУеН∞еЃГгАВ\n\n## жАїзїУ\n\n-   йАЪеЄЄпЉМPython иЃ§дЄЇ 1 жЭ°иѓ≠еП•иЈ®иґК 1 и°МгАВеНХжЭ°иѓ≠еП•еПѓдї•дљњзФ®еПНжЦЬжЭ†еЬ®жѓПи°МжЬЂе∞ЊиЈ®иґКе§Ъи°МгАВе¶ВжЮЬзФ®еИЖеПЈеИЖйЪФпЉМеРМдЄАи°МдЄ≠еПѓдї•е≠ШеЬ®е§ЪжЭ°иѓ≠еП•гАВ\n\
    -   Python дЄНеМЇеИЖеНХеЉХеПЈгАБеПМеЉХеПЈгАБдЄЙеНХеЉХеПЈеТМдЄЙеПМеЉХеПЈпЉБ\n-   Python зЪДеЯЇжЬђжХ∞жНЃз±їеЮЛжШѓ intгАБfloatгАБcomplexгАБstr еТМ\
    \ boolгАВ\n-   еПШйЗПжМБжЬЙеѓєеѓєи±°зЪДеЉХзФ®гАВе§ЪдЄ™еПШйЗПдєЯеПѓдї•жМБжЬЙеѓєеРМдЄАеѓєи±°зЪДеЉХзФ®пЉБ\n-   `print()` еЗљжХ∞жЙУеН∞дЄАз≥їеИЧй°єзЫЃпЉМиАМ `input()`\
    \ еЗљжХ∞жЙУеН∞дЄАдЄ™еПѓйАЙзЪДжПРз§ЇжґИжБѓеєґиѓїеПЦдЄАи°МиЊУеЕ•гАВ\n-   иЊУеЗЇж†ЉеЉПеМЦеПѓдї•дљњзФ®е≠Чзђ¶дЄ≤пЉИstrпЉЙз±їзЪД `format()` жЦєж≥ХеЃМжИРгАВж≠§жЦєж≥ХињФеЫЮж†ЉеЉПеМЦзЪДе≠Чзђ¶дЄ≤пЉМеПѓдї•дљњзФ®\
    \ `print()` еЗљжХ∞жЙУеН∞гАВ\n\n## 3 Python жОІеИґзїУжЮД\n\nеЬ®жЬђзЂ†дЄ≠пЉМдљ†е∞ЖиГље§ЯпЉЪ\n\n-   [x] зЉЦеЖЩ Python иДЪжЬђжЭ•иІ£еЖ≥йЧЃйҐШеєґзЃ°зРЖеЕґжОІеИґжµБгАВ\n\
