    # 13.2.5 The finally Clause


    Sometimes, there is a need to perform some task irrespective of whether an exception
    occurred or not. Many a times, this is generally some clean-up that needs to be
    performed whether or not exceptions were raised, like closing files or disconnecting
    from a server. The `finally` clause helps in guaranteeing the execution of it''s
    contents in all cases вАУ if an exception had occurred and even if it hadn''t. The
    syntax now becomes as follows:'
  - "[PAGE 451]\n\n# 13. Exception Handling\n\n```\ntry:\n    ... # try block\nexcept:\n\
    \    ... # except block\nelse:\n    ... # else block\nfinally:\n    ... # finally\
    \ block\n```\n\nThe flow of control through this construct is shown in the flowchart\
    \ below. Let us revisit this once again in detail:\n\n+   1. The exception monitoring\
    \ block is the `try` block. The exception response is the `except` block. The\
    \ `else` block is a continuation of the `try` block but without exception monitoring.\
    \ The `finally` block is a continuation of both the `else` block (or the `try`\
    \ block if the `else` block is not present) and the `except` block.\n2. When this\
    \ construct is executed, control passes on sequentially through all statements\
    \ in the `try` block. If any of these statements raise an exception, control comes\
    \ out of the `try` block and examines the `except` block(s).\n3. If it finds a\
    \ suitable `except` block, then that `except` block gets executed, ignoring all\
    \ other `except` blocks and control then resumes in the `finally` block, after\
    \ which control comes out of this construct.\n4. If it doesn't find a suitable\
    \ `except` block capable of handling the exception raised, then the exception\
    \ has to be propagated to the outer level (covered in section 13.4 in detail).\
    \ But before propagation, the `finally` block is executed.\n5. If no exception\
    \ is raised in the `try` block, control jumps to the `else` block and continues\
    \ execution.\n6. If any exception is raised in the `else` block, the exception\
    \ propagates to the outer level (covered in section 13.4 in detail), but only\
    \ after executing the `finally` block.\n7. If no exceptions were raised in the\
    \ `else` block also, then control resumes in the `finally` block before coming\
    \ out the construct.\n8. If any exceptions are raised in the `finally` block,\
    \ they are propagated to the outer level (covered in section 13.4 in detail).\n\
    \nThe only case when the `finally` block does not get executed is when the script\
    \ is terminated (section 3.4.4)."
