    | JSON Representation | Python Object |

    |---|---|

    | Number (integral) | int |

    | Number (non-integral) | float |

    | true, false | True, False |

    | null | None |


    In order to convert a JSON string into it''s equivalent Python object representation,
    we use the `json.loads()` method (which stands for вАЬload stringвАЭ) that has the
    following syntax:


    ```

    json.loads(jsonString)

    ```


    Here are some examples to convert various JSON strings into Python objects:


    ```

    >>> import json

    >>> json.loads(''{"a":"1","b":"2"}'')

    {''a'': ''1'', ''b'': ''2''}

    >>> json.loads(''[1,2,3,4]'')

    [1, 2, 3, 4]

    >>> json.loads(''"Hello"'')

    ''Hello''

    >>> json.loads(''25'')

    25

    >>> json.loads(''true'')

    True

    >>> json.loads(''false'')

    False

    >>> json.loads(''null'')

    >>>

    ```


    **Observation:**


    +   1. We have imported the `json` module.

    2. We see that the Python output matches the JSON representation pretty well.
    Objects become dictionaries, arrays become lists, integers and strings become
    `int` and `str` objects, `true` and `false` become `True` and `False` respectively
    and `null` becomes `None` (which of course, is not visible in the output).'
