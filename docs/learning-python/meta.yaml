    # 9.3 Framing Regular Expressions in Python


    We have learnt some basic operators that help express regular expressions. In
    this section, we will see some practical examples of regular expressions, but
    before that, we will see two important points specific to Python:


    +   1. The problems associated with RE strings containing backslashes and how
    to address them

    2. Why raw string literals are better for representing a RE in Python


    # 9.3.1 Escaping Within Regular Expressions


    Some characters within a RE have special meanings. The вАЬ+вАЭ character, for instance,
    is an operator that denotes 1 or more occurrences of the preceding symbol. What
    if was wanted to search for the вАЬ+вАЭ character instead? In order to ensure that
    вАЬspecialвАЭ characters are treated as вАЬnormalвАЭ characters, we need to escape the
    вАЬspecialвАЭ characters by prefixing them with a backslash (\). Thus, while the RE
    a+b means вАЬ1 or more occurrences of a followed by bвАЭ, the RE a\+b means вАЬa followed
    by +, followed by bвАЭ.


    # 9.3.2 Dealing with Backslashes (\)


    We have seen that certain escape sequences have been provided for creating regular
    expressions (like \d to represent a digit character). We have also learnt that
    the Python language itself understands certain escape sequences of it''s own (like
    \n to represent the newline character). Thus, the Python interpreter is always
    ready to'
  - '[PAGE 238]


    process escape sequences within strings. The regular expression escape sequences
    are not known to the interpreter as such and could result in a problem if processed
    before the regular expression engine sees the RE string. The solution is to escape
    every backslash by prefixing each with a backslash. The table below shows some
    regular expressions and how they can be represented as strings in Python:


    | RE | String Representation |

    |---|---|

    | \d | "\d" |

    | \d\d-\d\d-\d\d | "\d\d-\d\d-\d\d" |

    | \d | "\d" |


    **Observation:**


    +   1. Basically, each ''\'' in the RE has to be represented as ''\'' in a string
    to ensure that it remains as a backslash within the string.

    2. The last example shows a RE that matches a backslash (\) followed by a d. As
    usual, each backslash has to be prefixed by a backslash and hence we have 4 backslashes
    within the string.


    # 9.3.3 Using Raw Literals for RE


    In the previous section, we have seen that backslashes within regular expressions
    need to be escaped by prefixing with another backslash. Python provides another
    alternative to this вАУ raw strings.


    A *raw string* is a string that is not further processed by Python вАУ every character
    in it remains unchanged and without any special interpretation. In other words,
    escape sequences are not recognised. They are indicated by a prefix of ''r'' or
    ''R'' in front of the string literal as shown in the examples below:


    ```

    >>> "Hello\n"

    ''Hello\n''

    >>> r"Hello\n"

    ''Hello\n''

    >>> R"Hello\n"

    ''Hello\n''

    ```'
