  - '[PAGE 474]


    Do not get confused by the names вАШtextвАЩ and вАШbinaryвАЩ - both of them are ultimately
    stored in binary format on a storage device. The distinction is not based on how
    they are stored, but on whether or not their contents are human readable when
    the individual characters of the file are displayed.


    Apart from this basic difference between text files and binary files, there are
    technical differences that emerge on how these files are to be accessed and processed
    by programs. These are listed below:


    +   1. A text file is typically made up of lines (as we humans are comfortable
    with dealing with a line as a unit). These lines need specific characters within
    the file to denote their end, and these differ between operating systems. Windows,
    for example, terminates lines using 2 characters вАУ the carriage return (\r) and
    the linefeed (\n). Linux on the other hand, uses just the linefeed character to
    achieve the same purpose. Python being capable of working on any of these platforms
    has to support both. Therefore, Python ensures that end-of-lines are handled by
    it in a platform-specific manner, but for the programmer, Python gives the impression
    that only the newline character (\n) marks the end of a line. Binary files are
    not organised in the form of lines and any carriage return and linefeed characters
    found are probably not meant to convey end of line information at all and are
    thus not to be interpreted in any special manner.

    2. Numbers in a text file need to stored in a human readable format. They are
    therefore converted into digits and each digit is stored as a separate character.
    Thus, the number 12345 is stored in the file as 5 ASCII characters (assuming ASCII
    encoding) - вАШ1вАЩ, вАШ2вАЩ, вАШ3вАЩ, вАШ4вАЩ and вАШ5вАЩ - and will therefore occupy 5 bytes. The
    amount of memory required to store a number within a text file therefore depends
    on the number of digits it has. A binary files stores numbers in itвАЩs direct binary
    form that is of fixed size independent of the number of digits in the number (provided
    the number is not unreasonable long).

    3. Seeking within text files (covered in detail in section 14.5.4) is restricted
    due to point 1 above that requires Python to deal with the end of line characters
    in a platform dependent manner while being platform-independent to the programmer.
    Seeking within binary files do not have any such restriction.


    # 14.2 Opening and Closing Files


    As was pointed out in the previous section, the first operation to be performed
    in order to access the contents of a file is to open the file. Since there are
    various ways of reading from files, this section concentrates on how to open and
    how to close files, with later sections talking about how to read from and how
    to write to files.'
  - '[PAGE 475]


    # 14.2.1 Opening Files


    In order to open a file to access it''s contents, 2 pieces of information are
    required:


    +   1. The *pathname* of the file, identifying which file you wish to open

    2. The *access mode*, identifying what you wish to do with the file contents


    On successfully opening a file, a **file object** is returned that is to be used
    as a reference to the opened file later on in the program. All other file operations
    on the file can be performed using this file object.


    The `open` function is used to open a file and return a file object, and has the
    following syntax:


    ```

    open(pathName [,mode])

    ```


    **Note:**


    +   1. The file is identified in the filesystem by it''s pathname, which could
    be relative or absolute.

    2. If the file could not be opened for any reason, `FileNotFoundError` is raised.


    The permissible modes are listed in the table below:


    | Mode | Meaning |

    | :--- | :--- |

    | ''r'' | Open the file for reading. |

    | ''rb'' | If the file exists and has read permissions, you will be permitted
    to read it''s contents using the file object returned. If the file does not exist
    or does not have read permissions, this operation will fail. |

    | ''w'' | Open the file for writing. |

    | ''wb'' | If the file exists and has write permissions, you will be permitted
    to write to the file, but any data already present in the file is lost as the
    file is truncated. If the file does not exist, it will be created and you will
    be permitted to write new contents to the file. |

    | ''a'' | Open the file for appending. |

    | ''ab'' | If the file exists and has write permissions, you will be permitted
    to write to the file, and whatever is written is automatically appended to the
    file without disturbing it''s existing contents. If the file does not exist, it
    will be created and you will be permitted to append to the empty file so created.
    |'
