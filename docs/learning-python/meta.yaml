    \ as the argument.\n\n# 12.6.4 Constructors and Destructors in Simple Inheritance\n\
    \nOne of the important results of inheritance is that the derived class is dependent\
    \ on the base class. While the base class can exist on it's own, the derived class\
    \ is dependent on the base class for it's existence. Derived class instances are\
    \ dependent on corresponding base class instances. Indeed we can say that every\
    \ derived class instance contains a base instance within itself, without which\
    \ it cannot exist.\n\nBuilding on this, we can also say then that when a derived\
    \ class is instantiated, the base class should get instantiated first and when\
    \ a derived class instance is destroyed, it should be followed by the destruction\
    \ of the base class instance too. In other words, the order of construction/creation\
    \ should be from base class to derived class whereas the order of destruction\
    \ should be from derived class to base class. This order honours our agreement\
    \ that the base class/instance can survive without the derived class/instance\
    \ but not vice-versa.\n\nUnlike other programming languages like C++ where this\
    \ is automatically enforced by the compiler, Python does not enforce it! It therefore\
    \ becomes the responsibility of the programmer to ensure that this indeed takes\
    \ place by explicitly calling suitable base class functions.\n\nLet's begin with\
    \ a simple code snippet to observe Python's default behaviour when it comes to\
    \ constructors and destructors under inheritance:\n\n# Inheritance5.py\n\n```\n\
