    \ shown below:\n\n```\nHTMLParser.handle_comment(self, commentText)\nHTMLParser.handle_entityref(self,\
    \ entityName)\nHTMLParser.handle_charref(self, entityCode)\nHTMLParser.handle_decl(self,\
    \ declarationText)\nHTMLParser.unknown_decl(self, declarationText)\nHTMLParser.handle_pi(self,\
    \ processingInstruction)\n```\n\n### 17.2.2 Feeding HTML Data\n\nWe have already\
    \ seen how to respond to various parts in an HTML document. We have also seen\
    \ the `feed()` method that is used to provide the HTML data and has the following\
    \ syntax:\n\n```\nHTMLParser.feed(self, data)\n```\n\nThis method feeds in the\
    \ given `data` to the parser and that results in an immediate execution of suitable\
    \ methods. Data can be вАЬaddedвАЭ to the parser by calling this method several times.\
    \ Technically, data is buffered internally since this method can be called any\
    \ time with more content. This means that text content can remain in the buffer,\
    \ unreported via any of the methods discussed. The buffer is guaranteed to be\
    \ flushed out when we invoke the `close()` method on the parser object:\n\n```\n\
    HTMLParser.close(self)\n```\n\n### 17.3 Working with Beautiful Soup\n\n**BeautifulSoup**\
    \ is another HTML/XHTML & XML parser that uses another parser as its backend and\
    \ provides many useful easy-to-use functionalities. BeautifulSoup is not in-built\
    \ in Python and hence has to be manually installed. The next section shows you\
    \ how to do it. Documentation is available at https://www.crummy.com/software/BeautifulSoup/bs4/doc/.\n\
    \nHere is a list of important capabilities of BeautifulSoup:\n\n1.  Can parse\
    \ HTML, XHTML and XML documents\n2.  Permits extraction of details in a very simple\
    \ manner\n3.  Permits navigation between nodes in the parse tree\n4.  Permits\
    \ a powerful search mechanism to directly locate nodes the programmer is interested\
    \ in\n5.  Permits writing back into the parse tree (modification and creation\
    \ of documents)\n6.  Can convert the tree into a string and can even prettify\
    \ it!\n\n### 17.3.1 Installing BeautifulSoup\n\nThe simplest way of installing\
    \ BeautifulSoup is by using PIP (section 15.7) as follows:\n\n```\npip3 install\
    \ beautifulsoup4\n```\n\nWhile BeautifulSoup uses `lxml` parser or `HTMLParser`\
    \ as its default backend engine, it can be configured to work with other parsers\
    \ as well, in which case those parsers also need to be installed if not already\
    \ present.\n\n### 17.3.2 Reading HTML Content\n\nIf the HTML content is small\
    \ (as was demonstrated in earlier sections), we can store that HTML content to\
    \ be parsed in a string and pass it as an argument to the constructor of BeautifulSoup\
    \ as illustrated in the syntax below:\n\n```\nBeautifulSoup(htmlString [,parser])\n\
    ```\n\nThe `parser` argument can be either \"lxml\" to select the lxml HTML parser\
    \ or \"html.parser\" to select the `HTMLParser` covered in section 17.2 before.\
    \ If omitted, it will automatically pick a parser from amongst the available parsers\
    \ in the system.\n\nHere is a demonstration:\n\n```python\n>>> from bs4 import\
    \ BeautifulSoup\n>>> data='<html><body><p class=\"para text\" id=\"1\">This is\
    \ a <b>test</b><p><br/></body></html>'\n>>> soup=BeautifulSoup(data)\n/usr/lib/python3.6/site-packages/bs4/__init__.py:181:\n\
    UserWarning: No parser was explicitly specified, so I'm using\nthe best available\
