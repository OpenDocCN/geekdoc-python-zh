  - '[PAGE 103]


    # # LISTS


    A `list` in Python is defined as an ordered sequence of elements that can be dynamically
    altered.


    +   - *Ordered* means that each item in a list has an *index* based on it''s position
    in the list.

    - *Sequence* means that the elements are arranged in order, based on their indices,
    and a sequential traversal through the list will give us the elements in the order
    of their indices.

    - The phrase вАЬ*dynamically altered*вАЭ means that each item in the list can be changed
    and the list itself can be changed вАУ more items can be added, and existing items
    can be replaced or removed.


    > **For C/C++/Java programmers:**

    A list is perhaps the closest alternative to what C/C++/Java programmers call
    arrays.


    Lists are dynamically growable and shrinkable вАУ elements can be added and removed
    on the fly.


    # ## 4.1 Creating Lists


    Just as how an integer object can be created and assigned to a variable using
    the `int()` function, a list object can be created and assigned to a variable
    using the `list()` function:


    ```

    >>> x=int(5)

    >>> x

    5

    >>> L=list([5,2,3])

    >>> L

    [5, 2, 3]

    ```


    Since a `list` is a collection of values, the square brackets (`[]`) are used
    to enclose the collection, and are always used in Python to denote a list. In
    fact, just as how we have integer literals whose data type is understood to be
    `int`, we have list literals that use `[]`, whose data type is understood to be
    `list`:'
  - '[PAGE 104]


    ```

    >>> x=5

    >>> x

    5

    >>> L=[5,2,3]

    >>> L

    [5, 2, 3]

    ```


    From now on, we will stick to the [ ] syntax for convenience and brevity, unless
    forced to use the `list()` function.


    > **NOTE:**


    While `list` is a data type, the contents of a list are objects. Thus, there is
    no distinction like `list of int` vs. `list of float`.


    # 4.2 Accessing List Elements


    Each element in a list has an index which can be used to identify the element.
    This index increases from left to right, starting from 0. Negative indices are
    relative to the end of the list, and increase in absolute magnitude from right
    to left, starting with -1 from the end of the list. Thus, each element in a list
    has 2 indices associated with it вАУ a non-negative one that is counted from the
    beginning of the list and a negative one that is counted from the end of the list.
    Together with the [ ] operator, we can identify any element in the list as shown
    in the examples below:


    ```

    >>> L=[5,2,3]

    >>> L[0]

    5

    >>> L[1]

    2

    >>> L[2]

    3

    >>> L[-1]

    3

    >>> L[-2]

    2

    >>> L[-3]

    5

    ```


    Elements of a list can be freely modified:


    ```

    >>> L=[5,2,3]

    >>> L

    [5, 2, 3]

    >>> L[0]=0

    >>> L

    ```'
  - '[PAGE 105]


    ```

    [0, 2, 3]

    >>> L[0]=L[1]+L[2]

    >>> L

    [5, 2, 3]

    ```


    # 4.3 Counting List Elements


    The `len()` function is available to count the number of elements in a list. The
    minimum size of any list is 0, corresponding to an empty list (denoted by `[]`).


    ```

    >>> L=[5,2,3]

    >>> L

    [5, 2, 3]

    >>> len(L)

    3

    >>> L=[5]

    >>> L

    [5]

    >>> len(L)

    1

    >>> L=[]

    >>> L

    []

    >>> len(L)

    0

    ```


    # 4.4 Iterating Through List Elements


    One of the most practical operations we end up performing on lists is iterating
    through them and processing each element in sequence. Since lists are sequences,
    the `for` loop is directly compatible for iterating as shown in the example below:


    ```

    >>> L=[5,2,3]

    >>> for i in L: print(i)

    ...

    5

    2

    3

    ```


    # 4.5 Searching Elements within Lists


    Given that a list can contain multiple items, we may need to know if a particular
    element is present in a list or not, and if present, how many times and where
    all in the list. There are functions for all of these in Python.'
  - "[PAGE 106]\n\n# 4.5.1 Checking for Existence\n\nThe `in` and `not in` operators\
    \ help us to verify whether a particular element is present in a list or not.\n\
    \n```\n>>> L=[5,2,3]\n>>> 3 in L\nTrue\n>>> 4 in L\nFalse\n>>> 4 not in L\nTrue\n\
    ```\n\n# 4.5.2 Counting Occurrences\n\nThe `count()` member function of list tells\
    \ us how many instances of the specified object is present in the list.\n\n```\n\
    >>> L=[5,2,3,2]\n>>> L.count(3)\n1\n>>> L.count(2)\n2\n>>> L.count(4)\n0\n```\n\
    \n# 4.5.3 Locating Elements\n\nThe `index()` member function of list searches\
    \ for the first occurrence of an element within a list and returns the index where\
    \ it was found, and throws a `ValueError` if not found. It's complete syntax is:\n\
    \n```\nlist.index(x[,i[,j]])\n```\n\n**Form #1:** `list.index(x)`\nThis searches\
    \ for the first occurrence of the element `x` in the list `list` and returns the\
    \ index where it was found or raises a `ValueError` if the element was not found,\
    \ as shown in the example below:\n\n```\n>>> L=[5,2,3,2]\n>>> L.index(2)\n1\n\
    >>> L.index(4)\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nValueError: 4 is not in list\n```"
  - "[PAGE 107]\n\n# 4. Lists\n\n**Form #2:** `list.index(x,i)`\n\nIf the second argument\
    \ (i) is given, the search starts from index i instead of 0. This allows us to\
    \ search for other occurrences of an element or to skip some initial elements\
    \ in the search. In all other respects, this form is similar to form #1.\n\n```\n\
    >>> L=[5,2,3,2]\n>>> L.index(2,2)\n3\n```\n\nIn the above example, the first occurrence\
    \ of 2 is in index 1. If we want to search for the next occurrence of 2, we need\
    \ to start searching from index 2 onwards, which is what the example does.\n\n\
    **Form #3:** `list.index(x,i,j)`\n\nIf the third argument (j) is given, the search\
    \ will start at index i but will stop at index j (excluding index j). Remember\
    \ that if an element is not found when it stops, it will throw ValueError.\n\n\
    ```\n>>> L=[5,2,3,2]\n>>> L.index(3,0,2)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nValueError: 3 is not in list\n```\n\n\
    In the above example, we are searching for the element 3 in the list L starting\
    \ from index 0 and restricting our search to index 2 (2 excluded). Thus, our search\
    \ is restricted to the indices 0 and 1, and the element 3 is not found in these\
    \ indices.\n\n# 4.6 List Slices\n\nA list slice is a sub-list extracted from a\
    \ list вАУ it is a list comprising of a part of an existing list. A list slice uses\
    \ syntax `list[start:end]`, where `list` is the parent list from which to extract\
    \ elements, `start` is the starting index from where to start extracting elements\
    \ and `end` is the ending index (excluding `end`) till where to extract the elements.\
    \ The parent list does not undergo any change unless an assignment is made to\
    \ the list slice. Both `start` and `end` are optional, with `start` defaulting\
    \ to 0 (index of the first element) and `end` defaulting to `len(list)`, i.e.\
    \ the end of the list. Some examples follow:"
  - '[PAGE 108]


    ```

    >>> L=[5,2,3,2]

    >>> L[1:3] # Slice of L from 1 to 3 (exclusive)

    [2, 3]

    >>> L[1:] # Slice of L from 1 till the end of the list

    [2, 3, 2]

    >>> L[:3] # Slice of L from the beginning of the list till 3

    [5, 2, 3]

    >>> L[:] # Slice spanning the entire list

    [5, 2, 3, 2]

    ```


    In case you are of the opinion that L[:] is the same as L, know that they are
    not and will be dealt with in detail in section 4.8.3.


    Let us now see examples of using list slices to modify the contents of a list
    (with the changes underlined for better recognition):


    The first example shows how to replace a few elements of a list with a different
    set of elements without changing the list size:


    ```

    >>> L=[5,2,3,2]

    >>> L[1:3]=[3,2]

    >>> L

    [5, 3, 2, 2]

    ```


    The number of elements assigned to a list slice need not be of the same size!
    Here is an example of putting in more number of elements than the number of elements
    deleted:


    ```

    >>> L=[5,2,3,2]

    >>> L[1:3]=[3,0,0,2]

    >>> L

    [5, 3, 0, 0, 2, 2]

    ```


    Similarly, here is an example of putting in fewer number of elements than the
    number of elements deleted:


    ```

    >>> L=[5,2,3,2]

    >>> L[1:3]=[9]

    >>> L

    [5, 9, 2]

    ```


    Let''s discuss some special cases now!


    ```

    >>> L=[5,2,3,2]

    >>> L[1:2]=[9]

    >>> L

    ```'
- md: "## 4. Lists\n\n```\n[5, 9, 3, 2]\n```\n\nThe above example, though valid, is\
    \ an overly complicated way of doing a simple operation of L[1]=9!\n\n```\n>>>\
    \ L=[5,2,3,2]\n>>> L[1:1]=[9,8,7]\n>>> L\n[5, 9, 8, 7, 2, 3, 2]\n```\n\nThe above\
    \ example shows that it is not necessary to really replace elements вАУ elements\
    \ can be merely inserted.\n\n```\n>>> L=[5,2,3,2]\n>>> L[1:2]=[]\n>>> L\n[5, 3,\
    \ 2]\n```\n\nSimilarly, the above example shows that it is not necessary to insert\
    \ anything вАУ elements can be simply deleted.\n\n```\n>>> L=[5,2,3,2]\n>>> L[2:]=[]\n\
    >>> L\n[5, 2]\n```\n\nThe above example shows how to truncate a list.\n\n```\n\
    >>> L=[5,2,3,2]\n>>> L[:2]=[]\n>>> L\n[3, 2]\n```\n\nThe above example similarly\
    \ removes the initial indices that are less than 2.\n\nAnd our last example in\
    \ this section:\n\n```\n>>> L=[5,2,3,2]\n>>> L[:]=[]\n>>> L\n[]\n```\n\nThe above\
    \ example clears the list (deletes all elements from the list). We will cover\
    \ more techniques for doing this later on.\n\n## 4.7 Adding and Deleting Elements\n\
    \nWe have already seen how we can add and delete elements from a list using assignment\
    \ to list slices. There are better, more readable alternatives to do that, which\
    \ will be explored now.\n\n### 4.7.1 Appending Elements\n\nTo add one or more\
    \ elements to the end of a list, the following functions can be used:\n\n```\n\
    list.append(x)\n```\n\nThe `list.append(x)` function appends the element `x` to\
    \ the list `list`:\n\n```\n>>> L=[5,2,3]\n>>> L.append(9)\n>>> L\n[5, 2, 3, 9]\n\
    ```\n\n> NOTE:\n`list.append(x)` is similar to `list[len(list):]=[x]`\n\n```\n\
    list.extend(L)\n```\n\nThe `list.extend(L)` function appends all the elements\
    \ of the list `L` to the list `list`:\n\n```\n>>> L1=[5,2,3]\n>>> L2=[7,8,9]\n\
    >>> L1.extend(L2)\n>>> L1\n[5, 2, 3, 7, 8, 9]\n```\n\n> NOTE:\n`list.extend(L)`\
    \ is similar to `list[len(list):]=L`\n\n### 4.7.2 Inserting Elements\n\n```\n\
    list.insert(i,x)\n```\n\nTo add elements at any desired location within the list,\
    \ the `list.insert(i,x)` function can be used, which inserts the element `x` at\
    \ index `i` within the list `list`:\n\n```\n>>> L=[5,2,3]\n>>> L.insert(2,9)\n\
    >>> L\n[5, 2, 9, 3]\n```\n\n> **NOTE:**\n\n`list.insert(i,x)` is similar to `list[i:i]=[x]`\n\
    \n`list.append(x)` is similar to `list.insert(len(list),x)`\n\nNote that inserting\
    \ at an index beyond the end of the list will end up in an insertion at the end\
    \ of the list (an append operation):\n\n```\n>>> L=[5,2,3,2]\n>>> L.insert(50,9)\n\
    >>> L\n[5, 2, 3, 2, 9]\n```\n\n### 4.7.3 Deleting Elements\n\nThere are many different\
    \ ways of deleting elements from a list. Before we explore these, keep in mind\
    \ that deleting elements from a list is different from replacing elements in a\
    \ list, something that we have already covered in section 4.2.\n\n#### 4.7.3.1\
    \ Using del to Delete an Element\n\nThe first way to delete an element at a specific\
    \ position in the list is by using the `del` statement, similar to the way we\
    \ had used it for deleting variables in section 2.6:\n\n```\n>>> L=[5,2,3]\n>>>\
    \ del L[1]\n>>> L\n[5, 3]\n```\n\nThe `del` statement can also be used to delete\
    \ a range of elements from a list:\n\n```\n>>> L=[5,2,3,7,8,9]\n>>> del L[1:4]\n\
    >>> L\n[5, 8, 9]\n>>> L=[5,2,3,7,8,9]\n>>> del L[1:5:2]\n>>> L\n[5, 3, 8, 9]\n\
    ```\n\nIn the last example where we have used `del L[1:5:2]`, it will delete elements\
    \ from index 1 onwards till index 5 (excluding 5) in steps of 2.\n\nAs a special\
    \ case of the above, `del` can be used to remove all elements of a list, retaining\
    \ the list variable and making the list empty:\n\n```\n>>> L=[5,2,3,2]\n>>> del\
    \ L[:]\n>>> L\n[]\n```\n\nFinally, the `del` statement can be used to delete the\
    \ list variable itself:\n\n```\n>>> L=[5,2,3]\n>>> del L\n>>> L\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name\
    \ 'L' is not defined\n```\n\n#### 4.7.3.2 Using remove() to Delete an Element\n\
    \n```\nlist.remove(x)\n```\n\nIf we wish to delete a specific element regardless\
    \ of its position, we can use the `list.remove(x)` which searches and removes\
    \ the first occurrence of `x` in the list `list`. If the element `x` is not present\
    \ in the list, it will throw a `ValueError`:\n\n```\n>>> L=[5,2,3,2]\n>>> L.remove(2)\n\
    >>> L\n[5, 3, 2]\n>>> L.remove(2)\n>>> L\n[5, 3]\n>>> L.remove(2)\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nValueError: list.remove(x):\
    \ x not in list\n```\n\n#### 4.7.3.3 Using pop() to Delete Elements\n\nAnother\
    \ method to delete an element at a specific position or at the end of a list and\
    \ return the element that was deleted is by using the `list.pop()` function, whose\
    \ syntax is shown below:\n\n```\nlist.pop([i])\n```\n\nIf an index (`i`) is provided,\
    \ it will delete the element at index `i` in list `list` and returns the element\
    \ that was deleted. If no index is provided, it will delete the last element in\
    \ the list `list` and returns the element that was deleted:\n\n```\n>>> L=[5,2,3,2]\n\
    >>> L.pop(1)\n2\n>>> L\n[5, 3, 2]\n>>> L.pop()\n2\n>>> L\n[5, 3]\n>>> L.pop(10)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    IndexError: pop index out of range\n```\n\nAs can be seen from the last example\
    \ above, giving an invalid index to `pop()` results in an `IndexError`!\n\n####\
    \ 4.7.3.4 Using clear() To Delete All Elements of a List\n\n```\nlist.clear()\n\
    ```\n\nWhile most of the functions discussed earlier delete one or more elements\
    \ from a list, the `list.clear()` function deletes all elements from the list\
    \ `list` and makes it empty:\n\n```\n>>> L=[5,2,3,2]\n>>> L.clear()\n>>> L\n[]\n\
    ```\n\n> **NOTE:**\n\nL.clear() is similar to del L[:]\n\n## 4.8 Adding, Multiplying\
    \ and Copying Lists\n\nThe + (addition), += (addition and assignment), * (multiplication),\
    \ *= (multiplication and assignment) and = (assignment) operators are available\
    \ to operate on lists.\n\n### 4.8.1 Adding Lists\n\nTwo lists can be concatenated\
    \ to form a third list using the + operator:\n\n```\n>>> L1=[1,3]\n>>> L2=[7,8]\n\
    >>> L3=L1+L2\n>>> L3\n[1, 3, 7, 8]\n```\n\nThe += operator will concatenate the\
    \ list on the RHS to the list on the LHS:\n\n```\n>>> L=[1,3]\n>>> L+=[7,8]\n\
    >>> L\n[1, 3, 7, 8]\n```\n\n> **NOTE:**\n\nL1 += L2 is similar to L1.extend(L2)\n\
    \n### 4.8.2 Multiplying Lists\n\nA list L can be multiplied by an integer n to\
    \ denote the list L repeated n times:\n\n```\n>>> L=[5,2,3]*3\n>>> L\n[5, 2, 3,\
    \ 5, 2, 3, 5, 2, 3]\n```\n\n> **NOTE:**\nlist * n is the same as n * list!\n\n\
    Similarly, the *= operator repeats the list on LHS, RHS number of times, and assigns\
    \ the resultant list to the LHS variable:\n\n```\n>>> L=[5,2,3]\n>>> L*=3\n>>>\
    \ L\n[5, 2, 3, 5, 2, 3, 5, 2, 3]\n```\n\n### 4.8.3 Assigning and Copying Lists\n\
    \nThe = operator allows us to assign a list to a list variable. However, this\
    \ is not the same as copying elements of a list to another and is demonstrated\
    \ in the example below. Recall from section 2.6 that variables merely hold references\
    \ to objects вАУ lists are objects and list variables are references to such objects,\
    \ and the = operator only copies the reference, not the objects!\n\n```\n>>> L1=[5,2,3]\n\
    >>> L2=L1\n>>> L2\n[5, 2, 3]\n>>> L1[0]=9\n>>> L1\n[9, 2, 3]\n>>> L2\n[9, 2, 3]\n\
    ```\n\nIn order to copy all the elements of a list to another (copying the list\
    \ object instead of the list reference), the `list.copy()` function can be used\
    \ as follows:\n\n```\n>>> L1=[5,2,3]\n>>> L2=L1.copy()\n>>> L2\n[5, 2, 3]\n>>>\
    \ L1[0]=9\n>>> L1\n[9, 2, 3]\n>>> L2\n[5, 2, 3]\n```\n\n> **NOTE:**\nL2=L1.copy()\
    \ is similar to L2=L1[:]\n\nAnother form of copying is copy list elements to list\
    \ elements. Here is an example:\n\n```\n>>> [x,y]=[7,8]\n>>> x\n7\n>>> y\n8\n\
    ```\n\nEach element of the RHS list is copied to the corresponding variable in\
    \ the LHS list. A simpler way to achieve this will be covered in section 5.7.3.\
    \ But do note that the sizes of the two lists have to be the same for such an\
    \ assignment to work.\n\n## 4.9 Miscellaneous Operations on Lists\n\nWe have examined\
    \ some core functionality of lists. This part will introduce some more additional\
    \ functionality, and more advanced operations will be introduced in section 11.\n\
    \n### 4.9.1 Finding the Smallest Element in a List\n\nThe `min()` function returns\
    \ the smallest element in the list:\n\n```\n>>> L=[5,2,3]\n>>> min(L)\n2\n```\n\
    \n### 4.9.2 Finding the Largest Element in a List\n\nThe `max()` function returns\
    \ the largest element in the list:\n\n```\n>>> L=[5,2,3]\n>>> max(L)\n5\n```"
