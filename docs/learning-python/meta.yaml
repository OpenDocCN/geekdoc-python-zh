  - '[PAGE 275]


    everywhere in Python, the indentation level decides which statements belong to
    this function.


    Here is the definition of a function called `hi` that prints "Hello World" when
    called:


    ```

    >>> def hi():

    ...     print("Hello World")

    ...

    ```


    # 10.3 Function Call


    Once a function has been defined, it can be called as many times as required,
    from almost any place thereafter in the script and with any arguments as required.


    A *function call* is identified by the parentheses `()` that immediately follow
    the function name (which as we know is an identifier).


    Thus, the function `hi` defined earlier can be called in the following manner:


    ```

    >>> hi()

    Hello World

    ```


    > **NOTE:**

    In an interactive Python session, once a function has been defined, it can be
    called any number of times without requiring a redefinition.


    Functions once defined can be redefined later to perform a different task. The
    latest definition seen will be used when a function call is executed:


    ```

    >>> def hi():

    ...     print("Hello World")

    ...

    >>> hi()

    Hello World

    >>> def hi():

    ...     print("Heya!")

    ...

    >>> hi()

    Heya!

    ```


    A function name without the parentheses is a *reference* to the function and as
    such can be stored in variables and used later as a replacement for the original
    function name:'
