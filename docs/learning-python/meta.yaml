  md: '# 2.1.2 Quotation Marks


    Strings in Python are enclosed in quotations, but unlike most other programming
    languages, Python does not differentiate between single quotes and double quotes.


    # 2.1.2.1 Single Quotes


    A string can well be enclosed in single quotes. Such a string can easily contain
    double quotes without any issue, but any single quote character inside the string
    needs to be escaped by prefixing it with backslash.


    Here is another version of HelloWorld.py:


    ```

    HelloWorld5.py


    1. print(''Hello World'')

    2. print(''"Hi" from \''India\''!'')

    ```


    Output:


    ```

    Hello World

    "Hi" from ''India''!

    ```


    # 2.1.2.2 Double Quotes


    Just like single quotes, a string can well be enclosed in double quotes too. Such
    a string can easily contain single quotes inside, but any double quote character
    inside the string needs to be escaped by prefixing it with backslash.


    Here is another version of HelloWorld5.py:


    ```

    HelloWorld6.py


    1. print("Hello World")

    2. print("''Hi'' from "India"!")

    ```


    Output:


    ```

    Hello World

    ''Hi'' from "India"!

    ```


    # 2.1.2.3 Triple Quotes


    Python also supports a special kind of quotation mark made up 3 single-quotes
    ('''''') or 3 double-quotes ("""). Triple quotes allow a string to span multiple
    lines.'
