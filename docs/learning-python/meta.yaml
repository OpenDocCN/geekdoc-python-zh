  md: '# 9.2.1.1 Matching any Character Using the . Operator


    The . operator matches any one character (except the newline character вАУ a behaviour
    that can be changed as shown in section 10.4.4).


    Thus, the RE n.t matches those strings that contain an n, followed by any one
    non-newline character, followed by t, as shown in the table below:


    | Regular Expression: n.t |

    |---|

    | Matches | Rejects |

    | not | nt |

    | nut | night |

    | native | spent |

    | internet | nest |

    | against | sat |

    | knotted | nun |


    # 9.2.1.2 Matching a Character Within a Set Using the [] Operator


    The [] operator is similar to the . operator вАУ it is also a placeholder for a
    single character, except that the character is restricted to be one amongst the
    characters listed within the [].


    Thus, the RE n[aeiou]t will match any string containing n that is followed by
    a lowercase vowel followed by t, as shown below:


    | Regular Expression: n[aeiou]t |

    |---|

    | Matches | Rejects |

    | not | nt |

    | nut | against |

    | net | nest |

    | knit | constant |

    | native | Net |'
