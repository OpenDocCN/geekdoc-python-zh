  md: '# 12.4.6 Public, Private and Protected Members


    OOP generally talks about private, public and protected members of a class with
    this interpretation:


    +   1. **Public** members are accessible everywhere where the class/object is
    accessible.

    2. **Protected** members are accessible within the class that defines it as well
    as in all subclasses (classes that inherit it).

    3. **Private** members are accessible only within the class and nowhere else.


    Python does not directly support these concepts and all members of a class are
    inherently public. Python does support a convention however, that might help support
    this but does not enforce it. Since all class members are anyway public, we will
    only concentrate on protected and private members in this section.


    # 12.4.6.1 Protected Members


    As mentioned earlier, protected members are accessible within the class in which
    they are defined as well as in all it''s subclasses.


    Any member that starts with a single underscore indicates that it should be treated
    as a protected member. As already emphasized, this is only a *convention* and
    is not enforced by Python, but professionals treat this convention as a rule.


    **Syntax:**


    ```

    _member

    ```


    Since we have not dealt with inheritance yet, protected members will be demonstrated
    in section 12.6.2.


    # 12.4.6.2 Private Members


    As mentioned earlier, private members are accessible only within the class in
    which they are defined and are not accessible anywhere else.


    Any member that starts with minimum 2 underscores and ends with maximum 1 underscore
    indicates that it should be treated as a private member. This is achieved in Python
    typically by *name mangling*:


    Private members of the form `__member` get replaced by `_classname__member`. In
    other words, a member that starts with at least 2 underscores and ends with at
    most 1 underscore gets replaced to an underscore, followed by the name of the
    class to which the member belongs, followed by 2 underscores, followed by the
    member name. This prevents direct access to the member by it''s name, but still
    does not prevent access via it''s mangled name! Furthermore, this name mangling
    procedure may change in the future and hence programmers are advised not to use
    the mangled'
