  md: '# 19. Parsing JSON


    | Python Object | JSON Representation |

    |---|---|

    | None | null |


    In order to convert an existing Python object into it''s equivalent JSON representation,
    we use the `json.dumps()` method (which stands for "dump string") that has the
    following syntax:


    ```

    json.dumps(obj)

    ```


    Here is an example to convert various Python objects to JSON :


    ```

    >>> import json

    >>> json.dumps({"a":"1","b":"2"})

    ''{"a": "1", "b": "2"}''

    >>> json.dumps([1,2,3,4])

    ''[1, 2, 3, 4]''

    >>> json.dumps("Hello")

    ''"Hello"''

    >>> json.dumps(25)

    ''25''

    >>> json.dumps(True)

    ''true''

    >>> json.dumps(None)

    ''null''

    ```


    **Observation:**


    +   1. We have imported the `json` module.

    2. We see that the JSON output matches the Python representation pretty well.
    Dictionaries become objects, lists and tuples become arrays, `int` and `str` objects
    remain strings and numbers, `True` and `False` become `true` and `false` respectively
    and `None` becomes `null`.


    Here is a more complex example:


    ```

    (continuation of previous session)

    >>> json.dumps({"Ram":{"age":25,"hobbies":["reading","singing"]}, "Sham":{"age":32,"hobbies":["swimming","singing","dancing"]}})

    ''{"Ram": {"age": 25, "hobbies": ["reading", "singing"]}, "Sham": {"age": 32,
    "hobbies": ["swimming", "singing", "dancing"]}}''

    ```'
