    \ еПВжХ∞жМЗеЃЪжЙАйЬАзЪДжЬАе§Іж†Зз≠ЊжХ∞жЭ•йЩРеИґж≠§еИЧи°®зЪДйХњеЇ¶гАВиѓЈж≥®жДПпЉМе¶ВжЮЬж†Зз≠ЊжХ∞йЗПе∞СдЇОйЩРеИґпЉМеЃГдїђдїНзДґдЉЪиҐЂињФеЫЮгАВ\n\n```\nпЉИжО•зї≠дЄКдЄАдЄ™дЉЪиѓЭпЉЙ\n>>> for tag\
    \ in soup.div.find_all(\"p\"):\n...     print(tag)\n...\n<p>This is <b>Bold</b></p>\n\
