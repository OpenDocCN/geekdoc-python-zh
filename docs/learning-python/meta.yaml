    We can remove control out of:


    +   1. A loop

    2. A function

    3. A block

    4. A script


    # 3.4.1 Terminating a Loop


    Section 3.3.2 already introduced the `break` statement for terminating a loop.


    # 3.4.2 Terminating a Function


    The `return` statement is used to terminate a function and is covered in section
    10.8.


    # 3.4.3 Terminating a Block


    The `raise` statement is used to raise an exception that has the potential of
    terminating the following:


    +   1. a block

    2. a function

    3. a sequence of function calls

    4. a script


    The `raise` statement is covered in detail under exception handling (section 13).
    A form of `raise` will nevertheless be covered in the next section, though.


    # 3.4.4 Terminating a Script


    To terminate an *interactive Python session*, the following functions can be called:


    +   1. quit()

    2. exit()


    To terminate a *script* however, it is recommended to use `sys.exit()` as shown
    below:


    ```

    >>> import sys

    >>> sys.exit()

    ```'
  - "[PAGE 99]\n\n# 3. Python Control Structures\n\nObservation:\n\n+   1. We need\
    \ to import the `sys` module that contains the `exit()` function!\n2. Ideally,\
    \ we should pass an `exit code` as an argument to `sys.exit()` that can tell others\
    \ the reason for our script's termination! An exit code of `0` is assumed to mean\
    \ a normal, successful termination whereas a non-zero exit code is assumed to\
    \ mean an error or unsuccessful termination! When an argument is not passed to\
    \ `sys.exit()`, it is assumed to mean a normal, successful termination, equivalent\
    \ to `sys.exit(0)`!\n\nAll the approaches above end up terminating the script\
    \ by raising the `SystemExit` exception, technically. This means that as a programmer,\
    \ you could as well terminate your script anytime by executing the following statement:\n\
    \n```\n>>> raise SystemExit\n```\n\nNote:\n\n+   1. The statement `raise SystemExit`\
    \ does not require any modules to be imported and is technically the way a Python\
    \ script or interpreter terminates normally anyway!\n2. The most professional\
    \ way of terminating a Python script is by invoking `sys.exit()`, passing an exit\
