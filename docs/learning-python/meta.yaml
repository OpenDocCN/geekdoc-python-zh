    # 20.1.1.4 Conversion to bool


    Conversion to type `bool` is involved when we explicitly attempt to convert an
    object to type `bool` (like in the call `bool(x)`), or implicitly in a Boolean
    context (like in the condition of an `if` statement). If the object is already
    an instance of class `bool`, it''s value will definitely be either `True` or `False`.
    This section concentrates on objects of other types and their conversion to `bool`
    using the example `bool(x)`:


    +   1. If x is a null reference (`None`), it is evaluated as `False`.

    2. If x is a number, then values `0` (integer), `0.0` (float) and `0j` (complex)
    are considered `False`, all other values are considered `True`.

    3. If x is a string, null string (`''''`) is considered `False` and any other
    string is considered `True`.

    4. If x is a sequence or mapping, empty sequence/mapping is considered `False`
    while non-empty sequence/mapping is considered `True`. Thus, null lists (`[]`),
    null tuples (`()`) and null dictionaries (`{}`) are evaluated `False`.

    5. If x is an object of any other class, if that class implements the magic function
    `__bool__()`, that method''s return value is used to determine the Boolean value
    (the function must return a Boolean value).'
