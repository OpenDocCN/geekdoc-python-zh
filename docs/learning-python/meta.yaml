    # Form #3: `str.split(separator,maxsplits)`


    This function splits the string `str` into pieces whenever it finds the given
    separator. However, it ensures no more than `maxsplits` splits. Since each split
    gives one more piece, the total number of pieces this function returns is ideally
    `maxsplits+1`.


    Note:


    +   1. If `maxsplits` splits are not possible (because the `separator` is not
    present those many times), this function anyway returns the list of split parts
    disregarding `maxsplits`.

    2. If `maxsplits` is less than the number of splits possible, the last string
    returned in the list is the remainder un-splitted part of `str`

    3. If `separator` is `None`, the splitting is done as per form #1

    4. If `maxsplits` is -1 and `separator` is not `None`, the splitting is done as
    per form #2


    Examples:


    ```

    >>> "125,342,264".split(",",1) # 1 split, 2 pieces

    [''125'', ''342,264'']

    >>> "125,342,264".split(",",2) # 2 splits, 3 pieces

