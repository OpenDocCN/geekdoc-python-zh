    > **TIP**


    If a string has many single-quotes, enclose it in double-quotes so that the quotes
    need not be escaped. Similarly, if a string has many double-quotes, enclose it
    in single-quotes. If a string has both quotes, enclose it in triple-quotes!


    Objects of type `str` can also be created using the explicit constructor of class
    `str`. This of course also resembles a function call for type conversion. Thus,
    the following two statements are identical in function:


    **Example:**


    ```

    x = "abc"

    x = str("abc")

    ```


    This built-in function is also helpful for converting other types like `int` and
    `float` to the type `str`. Also, the default constructor of `str` class will create
    a null string ('''').


    ```

    >>> str("10")

    ''10''

    >>> str()

    ''''

    ```


    > **NOTE:**


    Python strings support Unicode. If strings made up of only ASCII characters are
    desired, Python provides a separate `bytes` class (section 20.3) for that, though
    Python strings can also store ASCII characters.


    The following table shows the escape characters that can be used within strings:'
  - '[PAGE 43]


    # 2. Python Basics


    | Escape Sequence | Meaning |

