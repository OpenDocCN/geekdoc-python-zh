    # 7.5 Searching Elements within Dictionaries


    # 7.5.1 Checking for the Existence of a Key in a Dictionary


    One of the most efficient operations on dictionaries is checking whether a key
    exists, and extracting the corresponding value if the key exists.


    The `in` and `not in` operators can be used to check if a key exists in a dictionary:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> ''apple'' in D

    True

    >>> ''mango'' in D

    False

    >>> ''mango'' not in D

    True

    ```


    # 7.5.2 Extracting the Value of a Key Using []


    Given a key that exists in a dictionary, extracting the corresponding value is
    a trivial operation, and has already been discussed in section 7.2, but is nevertheless
    presented below:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> K=''apple''

    >>> V=D[K]

    >>> print(V)

    red

    ```


    # 7.5.3 Extracting the Value of a Key Using dict.get()


    Another method of extracting the value associated with a key is by using the `dict.get(key)`
    function, which returns the value corresponding to the key `key` in the dictionary
    `dict`, if the key exists, and returns `None` if the key was not found. Unlike
    in the previous method of using `[]`, this function does not generate a `KeyError`
    if the key was not found.


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> D.get(''apple'')

    ''red''

    >>> D.get(''mango'')

    >>>

    ```'
