    # 9.2.2.5 Grouping Using the () Operator


    You will notice during the discussion of the *, + and ? operators that we used
    the term вАЬpreceding symbolвАЭ and not вАЬpreceding characterвАЭ. There is a reason for
    that. These operators need not work on individual characters, but can work on
    a group of characters вАУ and for that matter, can work on a regular expression
    as well!


    The () operator is used to create a group. Operators like *, + and ? can then
    be applied on the group. Consider the RE (a*b)+. The * applies to a, implying
    0 or more occurrences of a. The + applies on the group (a*b), implying one or
    more occurrences of the entire group. This RE therefore means one or more occurrences
    of the pattern вАЬzero of more occurrences of a followed by bвАЭ. An example of a
    string that will be matched by this is: abaaaabaabb. Here is the split up of the
    match: ab aaaab aab b.


