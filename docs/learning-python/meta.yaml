    - еЗљжХ∞еПѓдї•еРСи∞ГзФ®иАЕињФеЫЮеНХдЄ™еАЉгАВињЩдЄ™еНХдЄ™еАЉдєЯеПѓдї•жШѓдЄАдЄ™йЫЖеРИпЉБељУеЗљжХ∞жЬ™жМЗеЃЪињФеЫЮеЖЕеЃєжЧґпЉМињФеЫЮеАЉиҐЂиІЖдЄЇ `None`гАВеЗљжХ∞еПѓдї•йЪПжЧґдљњзФ® `return` иѓ≠еП•ињФеЫЮпЉМеПѓйАЙжЛ©жАІеЬ∞еРСи∞ГзФ®иАЕињФеЫЮдЄАдЄ™еАЉгАВ

    - еЗљжХ∞еПѓдї•йАЪињЗдљњзФ® `global` еЕ≥йФЃе≠ЧеєґжМЗеЃЪеЗљжХ∞еЄМжЬЫиЃњйЧЃзЪДеЕ®е±АеПШйЗПжЭ•иЃњйЧЃеЕ®е±АеПШйЗПгАВ

    - еЗљжХ∞еЃЪдєЙеЖЕйГ®еПѓдї•еМЕеРЂеЕґдїЦеЗљжХ∞еЃЪдєЙпЉБ

    - Lambda и°®иЊЊеЉПжШѓеИЫеїЇеМњеРНеЗљжХ∞зЪДдЄАзІНдЊњжНЈиАМеЉЇе§ІзЪДжЦєеЉПпЉБ

    - еПВжХ∞еИЧи°®еПѓдї•йАЪињЗдљњзФ® `*args` иѓ≠ж≥ХиІ£еМЕпЉМеєґдљЬдЄЇеНХзЛђзЪДеПВжХ∞еПСйАБзїЩеЗљжХ∞гАВ

    - еЕ≥йФЃе≠ЧеПВжХ∞е≠ЧеЕЄеПѓдї•йАЪињЗдљњзФ® `**args` иѓ≠ж≥ХиІ£еМЕпЉМеєґдљЬдЄЇеНХзЛђзЪДеЕ≥йФЃе≠ЧеПВжХ∞еПСйАБзїЩеЗљжХ∞гАВ

    - жЦЗж°£е≠Чзђ¶дЄ≤еПѓдї•еЄЃеК©иЃ∞ељХеЗљжХ∞пЉМеєґдЄЇеЕґдїЦз®ЛеЇПеСШжПРдЊЫеЗљжХ∞дљњзФ®жЦєйЭҐзЪДеЄЃеК©гАВ


    ## II еЃЮзФ® Python


    еЬ®жЬђзЂ†дЄ≠пЉМдљ†е∞ЖиГље§ЯпЉЪ


    - еЃЮзО∞ж†ИеТМйШЯеИЧз≠ЙжХ∞жНЃзїУжЮДгАВ

    - дљњзФ® `map()`гАБ`filter()` еТМ `reduce()` еЗљжХ∞зЉЦеЖЩеЉЇе§ІзЪДдї£з†БгАВ

    - дљњзФ®еИЧи°®жО®еѓЉеЉПеТМеµМе•ЧеИЧи°®жО®еѓЉеЉПењЂйАЯиљїжЭЊеЬ∞жЮДеїЇеТМе°ЂеЕЕеИЧи°®гАВ

    - иљїжЭЊиІ£еЖ≥жЯРдЇЫзО∞еЃЮзФЯжіїдЄ≠зЪДйЧЃйҐШгАВ


    ## 11.1 еЃЮзО∞ж†И


    *ж†И*жШѓдЄАзІНйБµеЊ™ LIFOпЉИеРОињЫеЕИеЗЇпЉЙеОЯеИЩзЪДзЇњжАІжХ∞жНЃзїУжЮДгАВеЫ†ж≠§пЉМжЬАеРОжЈїеК†еИ∞ж†ИдЄ≠зЪДеЕГзі†жШѓзђђдЄАдЄ™иҐЂеИ†йЩ§зЪДеЕГзі†гАВжПТеЕ•жУНдљЬзІ∞дЄЇ *push* жУНдљЬпЉМиАМеИ†йЩ§жУНдљЬзІ∞дЄЇ
    *pop* жУНдљЬгАВ


    Python дЄ≠ж≤°жЬЙзЫіжО•жФѓжМБж†ИпЉИжДПеС≥зЭАж≤°жЬЙеРНдЄЇ `stack` зЪДз±їжИЦжХ∞жНЃз±їеЮЛпЉЙпЉМдљЖж†ИеПѓдї•еЃєзЇ≥еЬ®еРИйАВзЪДеЃєеЩ®дЄ≠еєґињЫи°МжУНдљЬгАВеЕГзїДеТМеИЧи°®жШѓдЄ§зІНзЇњжАІеЃєеЩ®пЉМдљЖеЕГзїДжШѓдЄНеПѓеПШзЪДпЉМдЄНиГљзФ®дЇОе≠ШеВ®ж†ИпЉМеЫ†дЄЇж†ИзЪДеЖЕеЃєеЇФиѓ•иГље§ЯйЪПжЧґйЧіеПШеМЦгАВеЫ†ж≠§пЉМеИЧи°®жШѓеЃєзЇ≥ж†ИзЪДжЬАдљ≥йАЙжЛ©гАВ


    ж†ИжЬЙдЄ§дЄ™зЂѓзВєпЉЪдЄАдЄ™еЫЇеЃЪзЪД *bottom* зЂѓпЉМж†ИдїОињЩйЗМеҐЮйХњпЉЫдЄАдЄ™еК®жАБзЪД *top* зЂѓпЉМpush еТМ pop жУНдљЬеЬ®ж≠§еПСзФЯгАВ


    ж≠§еКЯиГљеПѓдї•дљњзФ®еИЧи°®дї•ињЩзІНжЦєеЉПеЃЮзО∞пЉЪ


    1. push жУНдљЬеПѓдї•дљњзФ® `list.append()` жЙІи°МпЉМиѓ•жЦєж≥ХеЬ®еИЧи°®жЬЂе∞ЊпЉИж†ИзЪДй°ґйГ®пЉЙињљеК†дЄАдЄ™еЕГзі†гАВ

    2. pop жУНдљЬеПѓдї•дљњзФ® `list.pop()` еЗљжХ∞жЙІи°МпЉМиѓ•еЗљжХ∞еИ†йЩ§еИЧи°®дЄ≠зЪДжЬАеРОдЄАдЄ™еЕГзі†пЉИдїОж†Ий°ґпЉЙгАВ

    3. peek жУНдљЬжПРдЊЫж†ИзЪДжЬАеРОдЄАдЄ™еЕГзі†пЉИжЬАй°ґйГ®зЪДеЕГзі†пЉЙиАМдЄНе∞ЖеЕґдїОж†ИдЄ≠еИ†йЩ§пЉМеПѓдї•еЃЮзО∞дЄЇ `list[-1]`гАВ

    4. ж†ИдЄ≠зЪДеЕГзі†жХ∞йЗПеПѓдї•дљњзФ® `len(list)` жЙЊеЗЇгАВињЩдєЯеПѓдї•зФ®жЭ•еИ§жЦ≠ж†ИжШѓеР¶дЄЇз©ЇгАВ

    5. ж†ИеПѓдї•дљњзФ® `list.clear()` еЗљжХ∞жЄЕз©ЇгАВ

    6. еПѓдї•еЃЮзО∞жЫіе§ЪеЕЄеЮЛж†ИеПѓиГљдЄНжПРдЊЫзЪДеКЯиГљпЉМдЊЛе¶ВеЬ®ж†ИдЄ≠жРЬзіҐеЕГзі†гАБеРИеєґж†Из≠ЙгАВ


    ињЩжШѓдЄАдЄ™жЉФз§ЇеЯЇжЬђж†ИжУНдљЬзЪДзЃАеНХз®ЛеЇПпЉЪ


    ```python

    # stackdemo.py

    #!/usr/bin/python


    # дљњзФ®еИЧи°®жЉФз§Їж†И


    S = []        # еИЫеїЇдЄАдЄ™ж†И S

    S.append(10)  # Push 10

    S.append(20)  # Push 20

    S.append(30)  # Push 30

    print(S)      # жШЊз§Їж†И


    print(S.pop())     # Pop 30

    print(S)      # жШЊз§Їж†И

    print(S[-1])  # Peek


    print(len(S))# ж†Ие§Іе∞П

    print(len(S)==0)# ж†ИжШѓеР¶дЄЇз©ЇпЉЯ

    ```


    иЊУеЗЇпЉЪ


    ```

    [10, 20, 30]

    30

    [10, 20]

    20

    2

    False

    ```


    ## 11.2 еЃЮзО∞йШЯеИЧ


    йШЯеИЧжШѓдЄАзІНйБµеЊ™ FIFOпЉИеЕИињЫеЕИеЗЇпЉЙеОЯеИЩзЪДзЇњжАІжХ∞жНЃзїУжЮДгАВеЫ†ж≠§пЉМзђђдЄАдЄ™жЈїеК†еИ∞йШЯеИЧдЄ≠зЪДеЕГзі†жШѓзђђдЄАдЄ™иҐЂеИ†йЩ§зЪДеЕГзі†гАВ


    Python дЄ≠ж≤°жЬЙзЫіжО•жФѓжМБйШЯеИЧпЉИжДПеС≥зЭАж≤°жЬЙеРНдЄЇ queue зЪДз±їжИЦжХ∞жНЃз±їеЮЛпЉЙпЉМдљЖйШЯеИЧеПѓдї•еЃєзЇ≥еЬ®еРИйАВзЪДеЃєеЩ®дЄ≠еєґињЫи°МжУНдљЬгАВ`collections` ж®°еЭЧдЄ≠жЬЙдЄАдЄ™еРНдЄЇ
    `deque` зЪДз±їпЉМеЃГжПРдЊЫдЇЖеѓєеПМзЂѓйШЯеИЧзЪДжФѓжМБпЉМеЕґдЄ≠жПТеЕ•еТМеИ†йЩ§жУНдљЬйЩРеИґеЬ®дЄ§зЂѓгАВеѓє `deque` ињЫи°МжЫідЄ•ж†ЉзЪДдљњзФ®е∞ЖдЄЇжИСдїђжПРдЊЫжЙАйЬАзЪДеКЯиГљпЉМе¶ВдЄЛжЙАз§ЇпЉЪ


    1. и¶БеРСйШЯеИЧдЄ≠жПТеЕ•дЄАдЄ™еЕГзі†пЉМеПѓдї•дљњзФ® `deque.append()` еЗљжХ∞гАВ

    2. и¶БдїОйШЯеИЧдЄ≠еИ†йЩ§дЄАдЄ™еЕГзі†пЉМеПѓдї•дљњзФ® `deque.popleft()` еЗљжХ∞гАВ

    3. и¶БжЙЊеЗЇйШЯеИЧдЄ≠зЪДеЕГзі†жХ∞йЗПпЉМеПѓдї•дљњзФ® `len(deque)` еЗљжХ∞гАВж≠§еЗљжХ∞дєЯеПѓзФ®дЇОеИ§жЦ≠йШЯеИЧжШѓеР¶дЄЇз©ЇгАВ

    4. и¶БдїОйШЯеИЧдЄ≠зІїйЩ§жЙАжЬЙеЕГзі†пЉМеПѓдї•дљњзФ® `deque.clear()` еЗљжХ∞гАВ

    5. ж≠§е§ЦпЉМ`deque.insert()` еЗљжХ∞еЕБиЃЄеЬ®йШЯеИЧеЖЕзЪДдїїдљХдљНзљЃжПТеЕ•еЕГзі†пЉИдїОиАМеЕБиЃЄеЃЮзО∞дЉШеЕИйШЯеИЧпЉЙпЉМиАМ `remove()` еЗљжХ∞дїОйШЯеИЧдЄ≠еИ†йЩ§зїЩеЃЪеАЉзЪДзђђдЄАжђ°еЗЇзО∞гАВ`index()`
    еЗљжХ∞еЬ®йШЯеИЧдЄ≠пЉИжИЦеЬ®йШЯеИЧзЪДжЯРдЄ™еМЇеЯЯеЖЕпЉЙжРЬзіҐзїЩеЃЪеЕГзі†зЪДзђђдЄАжђ°еЗЇзО∞гАВ


    ињЩжШѓдЄАдЄ™жЉФз§ЇеЯЇжЬђйШЯеИЧжУНдљЬзЪДзЃАеНХз®ЛеЇПпЉЪ


    ```python

    # queuedemo.py

    #!/usr/bin/python


    # дљњзФ® collections.deque жЉФз§ЇйШЯеИЧ


    from collections import deque


    q = deque()        # еИЫеїЇдЄАдЄ™йШЯеИЧ

    q.append(10)       # жПТеЕ• 10

    q.append(20)       # жПТеЕ• 20

    q.append(30)       # жПТеЕ• 30

    print(q)           # жШЊз§ЇйШЯеИЧ


    print(q.popleft()) # еИ†йЩ§ 10

    print(q)           # жШЊз§ЇйШЯеИЧ

    print(q[0])        # Peek


    print(len(q))      # йШЯеИЧе§Іе∞П

    print(len(q)==0)   # йШЯеИЧжШѓеР¶дЄЇз©ЇпЉЯ

    ```


    **иЊУеЗЇпЉЪ**


    ```

    deque([10, 20, 30])

    10

    deque([20, 30])

    30

    2

    False

    ```


    ## 11.3 map() еЗљжХ∞


    `map` еЗљжХ∞жШ†е∞ДжИЦиљђжНҐеПѓињ≠дї£еѓєи±°зЪДжѓПдЄ™еЕГзі†пЉМзФЯжИРдЄАдЄ™еМЕеРЂиљђжНҐеРОеЕГзі†зЪДжЦ∞еПѓињ≠дї£еѓєи±°гАВиЊУеЗЇеЇПеИЧдЄ≠зЪДеЕГзі†жХ∞йЗПе∞Жз≠ЙдЇОиЊУеЕ•еЇПеИЧдЄ≠зЪДеЕГзі†жХ∞йЗПгАВ


    **иѓ≠ж≥ХпЉЪ**


    ```python

    map(func, sequence)

    ```


    `sequence` дЄ≠зЪДжѓПдЄ™еЕГзі†дљЬдЄЇеПВжХ∞еПСйАБзїЩеЗљжХ∞ `func`пЉМеЗљжХ∞зЪДињФеЫЮеАЉиҐЂеПСйАБеИ∞дЄАдЄ™иЊУеЗЇеЇПеИЧпЉМиѓ•еЇПеИЧжЬАзїИзФ± `map()` ињФеЫЮгАВ


    ињЩжШѓдЄАдЄ™дљњзФ® `map` е∞ЖеИЧи°®дЄ≠зЪДжѓПдЄ™еЕГзі†дєШдї• 2 еєґиОЈеЊЧеМЕеРЂзЫЄеЇФзїУжЮЬзЪДжЦ∞еИЧи°®зЪДз§ЇдЊЛпЉЪ


    ```python

    >>> def f(x): return 2*x

    ...

    >>> L=[1,6,4,9,7]

    >>> M=list(map(f,L))

    >>> M

    [2, 12, 8, 18, 14]

    ```


    **иІВеѓЯпЉЪ**


    1. жИСдїђзЪДиЊУеЕ•еИЧи°®жШѓ `L`пЉМеМЕеРЂеЕГзі† 1гАБ6гАБ4гАБ9 еТМ 7гАВ

    2. жИСдїђеЃЪдєЙдЇЖдЄАдЄ™еРНдЄЇ `f` зЪДжШ†е∞ДеЗљжХ∞пЉМеЃГињФеЫЮеОЯеІЛеПВжХ∞еАЉзЪД 2 еАНгАВ

    3. жИСдїђдљњзФ® `map()` еЗљжХ∞пЉМе∞ЖжШ†е∞ДеЗљжХ∞зЪДеЉХзФ®пЉИ`f`пЉЙдљЬдЄЇзђђдЄАдЄ™еПВжХ∞пЉМиЊУеЕ•еИЧи°®пЉИ`L`пЉЙдљЬдЄЇзђђдЇМдЄ™еПВжХ∞дЉ†йАТгАВ

    4. `map()` еЗљжХ∞е∞ЖдљњзФ® `f` жШ†е∞Д `L` зЪДжѓПдЄ™еЕГзі†ињЫи°МеНХзЛђзЪДеЕГзі†иљђжНҐпЉМеєґе∞ЖжЬАзїИзїУжЮЬдљЬдЄЇеПѓињ≠дї£еѓєи±°ињФеЫЮпЉМдЄЇдЇЖжЦєдЊњпЉМжИСдїђе∞ЖеЕґиљђжНҐдЄЇеИЧи°®гАВ

    5. жИСдїђжЬАзїИиІВеѓЯеИ∞еИЧи°® `M` еМЕеРЂзЪДеЕГзі†еАЉжШѓеИЧи°® `L` дЄ≠еѓєеЇФеЕГзі†еАЉзЪДдЄ§еАНпЉМеєґдЄФй°ЇеЇПдЄО `L` дЄ≠зЪДй°ЇеЇПзЫЄеРМгАВ


    з±їдЉЉеЬ∞пЉМињЩжШѓдЄАдЄ™е∞Же≠Чзђ¶дЄ≤еИЧи°®иљђжНҐдЄЇжЙАжЬЙе≠Чзђ¶йГљиљђжНҐдЄЇе§ІеЖЩзЪДзЫЄеЇФе≠Чзђ¶дЄ≤еИЧи°®зЪДз§ЇдЊЛпЉЪ


    ```python

    >>> def f(x): return x.upper()

    ...

    >>> L=["Hello","World"]

    >>> M=list(map(f,L))

    >>> M

    [''HELLO'', ''WORLD'']

    ```


    ### 11.3.1 е∞Ж map() дЄОе§ЪдЄ™еПѓињ≠дї£еѓєи±°дЄАиµЈдљњзФ®


    `map()` еЗљжХ∞жЫійАЪзФ®зЪДиѓ≠ж≥ХжО•еПЧе§ЪдЄ™еПѓињ≠дї£еѓєи±°иАМдЄНжШѓдЄАдЄ™гАВеЬ®ињЩзІНжШ†е∞ДдЄ≠пЉМжѓПжђ°дїОжѓПдЄ™еПѓињ≠дї£еѓєи±°дЄ≠еПЦеЗЇеѓєеЇФеЕГзі†еєґеПСйАБзїЩжШ†е∞ДеЗљжХ∞пЉМињФеЫЮеАЉиҐЂжФґйЫЖеИ∞дЄАдЄ™иЊУеЗЇеЇПеИЧдЄ≠пЉМиѓ•еЇПеИЧжЬАзїИиҐЂињФеЫЮгАВељУзДґпЉМзО∞еЬ®жШ†е∞ДеЗљжХ∞ењЕй°їжО•жФґдЄОдЉ†йАТзїЩ
    `map` еЗљжХ∞зЪДеПѓињ≠дї£еѓєи±°жХ∞йЗПдЄАж†Је§ЪзЪДеПВжХ∞пЉБ


    ињЩжШѓдЄАдЄ™дљњзФ® `map` е∞Ж 3 дЄ™еИЧи°®зЪДеѓєеЇФеЕГзі†зЫЄеК†зЪДз§ЇдЊЛпЉЪ


    ```python

    >>> L1=[1,2,3]

    >>> L2=[4,5,6]

    >>> L3=[7,8,9]

    >>> def f(a,b,c): return a+b+c

    ...

    >>> M=list(map(f,L1,L2,L3))

    >>> M

    [12, 15, 18]

    ```


    **иІВеѓЯпЉЪ**


