    \ `new` and returns the new string:\n\n```\n>>> \"Delhi-Bombay-Bangalore-Bombay\"\
    .replace(\"Bombay\",\"Mumbai\")\n'Delhi-Mumbai-Bangalore-Mumbai'\n```\n\n**Form\
    \ #2:** `str.replace(old, new, count)`\n\nIn this form, the function performs\
    \ at most `count` replacements from the beginning of the string `str`:\n\n```\n\
    >>> \"Delhi-Bombay-Bangalore-Bombay\".replace(\"Bombay\",\"Mumbai\",1)\n'Delhi-Mumbai-Bangalore-Bombay'\n\
    ```\n\n## 8.5.3 Substituting Substrings Using Template Strings\n\nAn advanced\
    \ form of string substitution is by making use of the `Template` class in the\
    \ `string` module.\n\nA template is a string that contains placeholders for values\
    \ to be substituted. A single template can be used multiple times to generate\
    \ multiple strings, given values to be substituted. Thus, a template generates\
    \ a string whenever values are substituted.\n\n### 8.5.3.1 Creating a Template\n\
    \nTemplates are objects of the class `Template` and use a string to represent\
    \ the template itself internally. This template string can contain placeholders\
    \ for values and these are indicated by the '$' symbol. Whenever a '$' is found\
    \ in the template string, its interpretation is performed as follows:\n\n1. If\
    \ the '$' is followed by a valid identifier, the identifier is considered to be\
    \ the name of the placeholder.\n2. If the '$' is followed by '{', then the identifier\
    \ found till '}' is considered to be the name of the placeholder.\n3. If the '$'\
    \ is followed by another '$', it is considered as a single '$' character.\n\n\
    We will examine substitution later вАУ first we'll concentrate on the template string.\n\
    \n### Form #1: $identifier\n\nThis is the simplest form wherein the identifier\
    \ starts immediately after the '$' and goes on till the first character that cannot\
    \ be used in an identifier. Here are some examples with identifiers (placeholders)\
    \ highlighted:\n\n```\n$capital is the capital of $country\nThe sum of $x and\
    \ $y is $z\n$abc123xyz789!@#\n```\n\n### Form #2: ${identifier}\n\nA problem with\
    \ form #1 is what if we want an identifier to be immediately followed by alphanumeric\
    \ characters? How will it understand where the identifier ends and text begins?\
    \ In such cases, we can use this form where the identifier is enclosed in braces.\
    \ Here are some examples with the identifiers highlighted:\n\n```\n${thousand}000\n\
    ${a}_${b}\n```\n\n### Form #3: $$\n\nSince the '$' symbol has a special meaning\
    \ as an indication of a placeholder, what if we want a simple '$' character within\
    \ the template string? The solution is to use two '$' characters instead as shown\
    \ in the examples below:\n\n```\n$$1000\n$$x=10\n```\n\nNow that we know how to\
    \ frame template strings, let us see the code behind that in Python. Here is an\
    \ example:\n\n```\n>>> from string import Template\n>>> t=Template(\"The sum of\
    \ $x and $y is $z\")\n```\n\n### Observation:\n\n1. We need the Template class\
    \ which is present in the string module. The first line takes care of that.\n\
    2. We create a Template object using a template string and store a reference to\
    \ that object in the variable t.\n3. Using this template, we'll be able to create\
    \ multiple strings by substituting values, which we will see soon.\n\n### 8.5.3.2\
    \ Substituting Values in a Template Using substitute()\n\nThe `substitute()` function\
    \ of `Template` allows substitution of values within a template and returns a\
    \ string after substitution.\n\nThere are multiple forms of `substitute()`:\n\n\
    1. `template.substitute(dict)`\n2. `template.substitute(keyargs)`\n3. `template.substitute(dict,\
    \ keyargs)`\n\n**Form #1:** `template.substitute(dict)`\n\nThis function substitutes\
    \ values from the dictionary `dict` into the placeholders in the template `template`\
    \ and returns the resultant string after substitution. The dictionary is supposed\
    \ to contain all the placeholder identifiers as keys with corresponding suitable\
    \ values for substitution.\n\nIn case a placeholder identifier exists in the template\
    \ `template` but not as a key in the dictionary `dict`, this will generate a `KeyError`.\n\
    \nIn case a key exists in the dictionary `dict` but not in the template `template`,\
    \ the key is ignored.\n\nIn case a '$' in the template `template` is not followed\
    \ by an identifier, this will generate a `ValueError`.\n\n**Example:**\n\n```\n\
    >>> from string import Template\n>>> t=Template(\"The sum of $x and $y is $z\"\
    )\n>>> d=dict(x=10,y=20,z=30)\n>>> t.substitute(d)\n'The sum of 10 and 20 is 30'\n\
    >>> t.substitute(dict(x=2,y=12,z=14))\n'The sum of 2 and 12 is 14'\n>>> t.substitute(dict(x=2,y=12))\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    \  File \"/usr/lib64/python3.3/string.py\", line 121, in substitute\n    return\
    \ self.pattern.sub(convert, self.template)\n  File \"/usr/lib64/python3.3/string.py\"\
    , line 111, in convert\n    val = mapping[named]\nKeyError: 'z'\n>>> t.substitute(dict(x=2,y=12,z=14,a=100))\n\
    'The sum of 2 and 12 is 14'\n```\n\n> **NOTE:**\nThe statement `from string import\
    \ Template` needs to be done only once per Python session. Repetitions of this\
    \ statement are tolerated, however.\n\n**Form #2:** `template.substitute(keyargs)`\n\
    \nIt is possible to directly pass keyword arguments (covered in section 10.6 in\
    \ detail) instead of passing a dictionary. This can be convenient when there are\
    \ few placeholders in the template.\n\nThis function substitutes values from the\
    \ keyword arguments `keyargs` into the placeholders in the template `template`\
    \ and returns the resultant string after substitution. The keyword arguments are\
    \ supposed to contain all the placeholder identifiers with corresponding suitable\
    \ values for substitution.\n\nIn case a placeholder identifier exists in the template\
    \ `template` but not in the keyword arguments `keyargs`, this will generate a\
    \ `KeyError`.\n\nIn case a keyword argument exists in `keyargs` but not in the\
    \ template `template`, the keyword argument is ignored.\n\nIn case a '$' in the\
    \ template `template` is not followed by an identifier, this will generate a `ValueError`.\n\
    \n**Example:**\n\n```\n>>> from string import Template\n>>> t=Template(\"The sum\
    \ of $x and $y is $z\")\n>>> t.substitute(x=2,y=12,z=14)\n'The sum of 2 and 12\
    \ is 14'\n>>> t.substitute(x=2,y=12)\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\n  File \"/usr/lib64/python3.3/string.py\"\
    , line 121, in substitute\n    return self.pattern.sub(convert, self.template)\n\
    \  File \"/usr/lib64/python3.3/string.py\", line 111, in convert\n    val = mapping[named]\n\
    KeyError: 'z'\n>>> t.substitute(x=2,y=12,z=14,a=100)\n'The sum of 2 and 12 is\
    \ 14'\n```\n\n> **NOTE:**\nThe order of the keys in the dictionary in form #1\
    \ and the order of the keyword arguments in form #2 does not matter!\n\n**Form\
    \ #3:** `template.substitute(dict, keyargs)`\n\nThis form is a combination of\
    \ the previous two forms: it uses both the dictionary `dict` and the keyword arguments\
    \ `keyargs` to perform substitution in the template `template` and returns the\
    \ string after substitution.\n\nIf a placeholder is found both as a key in the\
    \ dictionary `dict` as well as a keyword argument in `keyargs`, preference is\
    \ given to the keyword argument in `keyargs`.\n\n**Examples:**\n\n```\n>>> from\
    \ string import Template\n>>> t=Template(\"The sum of $x and $y is $z\")\n>>>\
    \ t.substitute(dict(x=2,y=12,z=14),z=100)\n'The sum of 2 and 12 is 100'\n```\n\
    \n**Observation:**\n\n1. The value of the template identifier `z` is taken from\
    \ the keyword argument (100), even though the dictionary contained a different\
    \ value (14) since preference is given to keyword arguments.\n2. The values of\
    \ the template identifiers `x` and `y` are taken from the dictionary since no\
    \ keyword arguments were provided for them.\n\n### 8.5.3.3 Substituting Values\
    \ in a Template Using safe_substitute()\n\nThe `safe_substitute()` function is\
    \ very similar to the `substitute()` function covered in the previous section.\
    \ Here are the differences:\n\n1. If a placeholder in the template is not found\
    \ in the dictionary and keyword arguments, the placeholder is retained as it is\
    \ without generating any `KeyError`.\n2. Any '$' that is not followed by an identifier\
    \ is retained as it is without generating any `ValueError`.\n\n**Example:**\n\n\
    ```\n>>> from string import Template\n>>> t=Template(\"The sum of $x and $y is\
