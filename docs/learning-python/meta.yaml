    \ 7.2 иЃњйЧЃе≠ЧеЕЄеЕГзі†\n\nе≠ЧеЕЄеПѓдї•иҐЂиІЖдЄЇдЄАзІНзЙєжЃКзЪДжХ∞зїДпЉМеЕґдЄЛж†ЗжШѓе≠Чзђ¶дЄ≤иАМдЄНжШѓжХіжХ∞гАВињЩж†ЈзЪДжХ∞зїДзІ∞дЄЇ *еЕ≥иБФжХ∞зїД*гАВзФ®дЇОиЃњйЧЃеИЧи°®еЕГзі†зЪДзЫЄеРМ `[]` ињРзЃЧзђ¶пЉИзїЩеЃЪеЕґзіҐеЉХпЉЙеПѓдї•зФ®дЇОиЃњйЧЃе≠ЧеЕЄдЄ≠зЪДеАЉпЉИзїЩеЃЪеЕґйФЃпЉЙпЉЪ\n\
    \n```\n>>> D={'apple':'red','grapes':'green'}\n>>> D['apple']\n'red'\n>>> D['grapes']\n\
