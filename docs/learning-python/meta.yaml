  md: "# 14.3 Reading From Text Files\n\nOnce a text file has been opened in a mode\
    \ that supports reading, we can then proceed to read the file contents using the\
    \ file object. This section introduces various ways by which we can read from\
    \ the file:\n\n+   1. Reading the entire file contents at one go\n2. Reading the\
    \ file contents a line at a time\n3. Reading the file contents a chunk at a time\n\
    4. Reading the file contents a character at a time\n\n# 14.3.1 Reading Entire\
    \ File at Once\n\nOne of the simplest ways of reading a text file is to read the\
    \ entire file at once in a single step. This section introduces 2 techniques by\
    \ which we could achieve this:\n\n+   1. Loading the entire file contents as a\
    \ string\n2. Loading the entire file contents as a list of lines\n\n# 14.3.1.1\
    \ Reading entire file as a single string\n\nTo load the entire file contents as\
    \ a single string, the `read()` method can be used that has the following syntax:\n\
    \n```\nfileObject.read()\n```\n\nThis method will read the entire file contents\
    \ and will return it as a single string.\nLet us write a Python script to display\
    \ the contents of a file whose filename is entered by the user (the UNIX `cat`\
    \ command does something similar):\n\n```\ncat1.py\n1.  #!/usr/bin/python\n2.\
    \  \n3.  # Implementation of cat command to display the contents of a file\n4.\
    \  \n5.  filename = input(\"Enter filename:\")\n6.  \n7.  try:\n8.      file =\
    \ open(filename)\n9.      contents = file.read()\n10.     print(contents)\n```"
