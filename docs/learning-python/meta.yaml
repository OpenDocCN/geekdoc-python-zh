    ## 2.3.3 The `complex` type


    The `complex` type allows us to represent complex numbers. Python stores complex
    numbers in rectangular coordinates, but conversion to polar coordinates is possible.
    Similarly, it is possible to create a complex number from polar coordinates. Given
    a complex object, the `real` field tells us the real part and the `imag` field
    tells us the imaginary part.


    ### 2.3.3.1 Literals of Type `complex`


    The notation Python uses to represent a complex number made up of real part `x`
    and imaginary part `y` is `x+yj` or `x+yJ`.


    **Examples:**


    ```

    >>> (2+3j)

    (2+3j)

    >>> 2+3J

    (2+3j)

    >>> (2+3j).real

    2.0

    >>> (2+3j).imag

    3.0

    ```


    Objects of type `complex` can also be created using the explicit constructor of
    class `complex`. This of course also resembles a function call for type conversion.
    Thus, the following two statements are identical in function:


    **Example:**


    ```

    x = 2+3j

    x = complex(2,3)

    ```


    This built-in function is also helpful for converting other types like `int` and
    `string` to the type `complex`. Also, the default constructor of `complex` class
    will create a `complex` with value `0j`, a 1-argument constructor that receives
    an `int` `x` will create a complex with value `x+0j` and a 1-argument constructor
    that receives a `string` in the format `x` or `x+yj` or `x+yJ` will create a complex
    object suitably.


    **Examples:**


    ```

    >>> complex()

    0j

    >>> complex(2)

    (2+0j)

    >>> complex("2+3j")

    (2+3j)

    >>> complex("2+3J")

    (2+3j)

    >>> complex("2")

    (2+0j)

    ```


    ### 2.3.3.2 Operations on Type complex


    The following table lists out the arithmetic operators that can be used with data
    items of type complex:


    | Expression | Result | Meaning |

    | :--- | :--- | :--- |

    | 1j ** 2 | (-1+0j) | i¬≤ |

    | (2+3j) * (5+6j) | (-8+27j) | Multiplication |

    | (2+3j) / (2+3j) | (1+0j) | Division |

    | (2+3j) + (5+6j) | (7+9j) | Addition |

    | (2+3j) - (5+6j) | (-3-3j) | Subtraction |


    Table 8: Arithmetic operations on type complex


    Just as how the math module provides mathematical functions for dealing with real
    numbers, the cmath module provides mathematical functions for dealing with complex
    numbers. The module needs to be imported prior to use using the statement: import
    cmath. We can convert any complex object into polar coordinates using the polar()
    function, and convert polar coordinates into a complex object using the rect()
    function as shown in the examples in the table below. We can also extract the
    magnitude using abs() and argument using phase() as shown in the examples in the
    table below:


    **Examples:**


    | Expression | Result | Meaning |

    | :--- | :--- | :--- |

    | `cmath.polar(2+3j)` | `(3.605551275463989, 0.982793723247329)` | Conversion
    from rectangular coordinates (x+yJ) to polar coordinates (r,ќЄ) |

    | `cmath.rect(3.605551275463989, 0.982793723247329)` | `(2+3j)` | Conversion from
    polar coordinates (r,ќЄ) to rectangular coordinates (x+yJ) |

    | `abs(3+4j)` | `5.0` | Magnitude (r) |

    | `cmath.phase(3+4j)` | `0.9272952180016122` | Angle (ќЄ) |


    Table 9: Mathematical functions that operate on complex


    > **NOTE:**

    > The type `complex` also supports `==` and `!=` comparisons, covered in section
    2.3.1.2 and Boolean operations, covered in section 2.3.5.2.


    ## 2.3.4 The str type


    The string type (`str`) allows us to store non-numeric values in addition to numeric
    values.


    ### 2.3.4.1 Literals of Type str


    We have seen in section 2.1.2 that string literals can be enclosed in single,
    double or triple `quotes`. Here are a few examples to refresh your memory.


    **Examples:**


    ```

    >>> ''Hello "World" from \''India\''''

    ''Hello "World" from \''India\''''

    >>> "Hello \"World\" from ''India''"

    ''Hello "World" from \''India\''''

    >>> """Hello "World" from ''India''"""

    ''Hello "World" from \''India\''''

    >>> ''''''Hello "World" from ''India\''''''''

    ''Hello "World" from \''India\''''

    ```'
