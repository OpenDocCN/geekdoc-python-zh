    \n## 12.4.3 з±їеПШйЗП\n\nе¶ВеЙНжЙАињ∞пЉМз±їеПШйЗПжШѓе±ЮдЇОз±їеєґеЬ®иѓ•з±їзЪДжЙАжЬЙеЃЮдЊЛдєЛйЧіеЕ±дЇЂзЪДеПШйЗПгАВеЃГдїђеПѓдї•дљњзФ®з±їеРНпЉИз±їеѓєи±°пЉЙжИЦиѓ•з±їзЪДдїїдљХеЃЮдЊЛжЭ•иЃњйЧЃгАВдї•дЄЛдї£з†БзЙЗжЃµжЉФз§ЇдЇЖињЩдЇЫзЙєжАІпЉЪ\n\
    \n```python\n>>> class A:\n...     x=10\n...\n>>> A.x\n10\n```\n\nжИСдїђеИЫеїЇдЇЖдЄАдЄ™з±ї`A`пЉМеЕґдЄ≠жЬЙдЄАдЄ™з±їеПШйЗП`x`еИЭеІЛеМЦдЄЇ`10`гАВжИСдїђеПѓдї•дљњзФ®`A.x`жЭ•иЃњйЧЃеЃГпЉМеЕґдЄ≠`A`жШѓз±їеѓєи±°пЉИеѓєжИСдїђжЭ•иѓіжШѓз±їеРНпЉЙпЉМ`x`жШѓз±їеПШйЗПгАВзО∞еЬ®иЃ©жИСдїђеИЫеїЇеѓєи±°пЉЪ\n\
    \n```python\n>>> a=A()\n>>> b=A()\n>>> a.x\n10\n>>> b.x\n10\n```\n\nжИСдїђеИЫеїЇдЇЖдЄ§дЄ™еѓєи±°`a`еТМ`b`пЉМеПѓдї•зЬЛеИ∞еЃГдїђйГљеПѓдї•иЃњйЧЃз±їеПШйЗП`x`пЉМеєґдЄЇжИСдїђжПРдЊЫзЫЄеРМзЪДеАЉ`10`гАВиЃ©жИСдїђе∞ЭиѓХдљњзФ®еЃЮдЊЛеѓєз±їеПШйЗПињЫи°МиµЛеАЉпЉЪ\n\
