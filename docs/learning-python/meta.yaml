    # 16.3 Connecting and Closing


    All functionality of SQLite is provided by the `sqlite3` module, which has to
    be imported first.


    Before we can access the contents of a database, we need to establish a connection
    with. This is done by the `connect` function whose syntax is shown below:


    ```

    sqlite3.connect(databaseName)

    ```


    Recall from section 16.1.5 that SQLite stores databases as files. The `databaseName`
    parameter shown in the syntax above is the filename (or pathname if the file is
    not in the current directory) of the database file to be used. If the file does
    not exist, it will be created.


    > **NOTE:**

    As a special case, if the `databaseName` parameter is ":memory:", the database
    is created in memory!


    The `connect()` function returns a `Connection` object that will be used further
    in section 16.4, but for now let us also see how to close a database connection
    using the `close()` method, whose syntax is shown below:


    ```

    connection.close()

    ```


    From the time a database connection is opened till the time it is closed, there
    could be any number of read/write operations on the database. None of the write
    operations would be committed to the database without an explicit call to the
    `commit()` method! It might be a good idea to follow the practice of committing
    before closing the database connection!'
