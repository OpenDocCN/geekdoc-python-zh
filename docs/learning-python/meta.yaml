    \ factorial\n6.  \n7.  def ncr(n,r):\n8.      return int(factorial(n)/(factorial(r)*factorial(n-r)))\n\
    9.  \n10. x,y = input(\"Enter 2 integers:\").split(' ')\n11. x,y = int(x),int(y)\n\
    12. print(\"The combination of {} and {} is {}\".format(x,y,ncr(x,y)))\n```\n\n\
    # Output:\n\n```\nEnter 2 integers:5 3\nThe combination of 5 and 3 is 10\n```\n\
    \n# Observation:\n\n+   1. This program is based on `combination2.py`.\n2. We\
    \ have changed line 5 to import only the identifier `factorial` and make it directly\
    \ available to us.\n3. Line 8 uses the `factorial` function directly without using\
    \ the module name `fact` to identify it.\n\nBefore we conclude this section, let\
    \ us introduce other related forms of importing as well:"
  - '[PAGE 531]


    It is possible to import multiple identifiers into the current symbol table by
    giving a tuple of identifiers as shown in the following syntax:


    ```

    from moduleName import identifier1 [,identifier2...]

    ```


    > **NOTE:**

    We can import as many identifiers from a module as required. This syntax reduces
    the number of `import` statements required to achieve this goal.


    As a special case, we can import all permissible identifiers from a module into
    the current symbol table using the following syntax:


    ```

    from moduleName import *

    ```


    > **NOTE:**

    While this statement should ideally import all identifiers from the module `moduleName`
    into the current symbol table, the fact is that the module controls which identifiers
    are imported when `*` is used! If the module does not explicitly specify what
    all is permissible to be imported when this syntax is used, the default rule is
    to import all identifiers that do not have a leading single underscore! Also note
    that this syntax of importing is frowned upon by professionals as it pollutes
    the importer''s namespace!


    # 15.3.3 Executing Modules


    From the previous sections, we have learnt the following:


    +   1. Modules are merely normal Python scripts meant to be reusable

    2. Before we can use the contents of a module, we need to import


    This section delves deeper into what happens when we import a module.

    Importing a module gives a chance for the module to initialize itself. This is
    done by executing the contents of the module, just as how someone would execute
    a Python script!'
  - "[PAGE 532]\n\nLet us modify our module `fact.py` to demonstrate this property:\n\
    \n# fact2.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # Module to find the factorial\
    \ of an integer\n4.  # Demonstration of module execution\n5.  \n6.  def factorial(n):\n\
    7.      if n==0: return 1\n8.      return n*factorial(n-1)\n9.  \n10. print(\"\
    Module loaded successfully!\")\n```\n\n# Output:\n\n```\nModule loaded successfully!\n\
    ```\n\n# Observation:\n\n+   1. This program is based on `fact.py` with only 1\
    \ addition of line 10.\n2. Line 10 prints a message when executed, which we can\
    \ use as a proof as execution of statements.\n\nWe get the above output when we\
    \ directly run the Python script as a program. But the point is that we will continue\
    \ to get the same output even if this module is imported, as shown in the below\
    \ interactive session:\n\n```\n>>> import fact2\nModule loaded successfully!\n\
    ```\n\nWe therefore conclude that *a module is executed when imported*. However,\
    \ this execution is performed only when the module is imported for the first time.\
    \ Thereafter, subsequent imports of the same module do not result in execution\
    \ of the module.\n\nInterestingly, a module can differentiate between the two\
    \ forms of execution as follows:\n\n+   1. If the module is being executed because\
    \ the user is trying to run it as a script (which we shall call *direct execution*),\
    \ the value of the variable `__name__` would be `__main__` (as discussed in section\
    \ 15.1).\n2. If the module is being executed because some other script imported\
    \ it (which we shall call *indirect execution*), the value of the variable `__name__`\
    \ would be the module name (in this example, `fact2`)."
  - "[PAGE 533]\n\nLet us now finally rewrite the previous module so that the output\
    \ is different for direct and indirect execution.\n\n# fact3.py\n\n```\n1.  #!/usr/bin/python\n\
    2.  \n3.  # Module to find the factorial of an integer\n4.  # Demonstration of\
    \ module execution\n5.  \n6.  def factorial(n):\n7.      if n==0: return 1\n8.\
    \      return n*factorial(n-1)\n9.  \n10. if __name__ == \"__main__\":\n11.  \
    \   # Direct execution\n12.     print(\"Script executed successfully!\")\n13.\
    \ else:\n14.     # Indirect execution\n15.     print(\"Module loaded successfully!\"\
    )\n```\n\n# Output:\n\n```\nScript executed successfully!\n```\n\n# Interactive\
    \ session:\n\n```\n>>> import fact3\nModule loaded successfully!\n```\n\n# Observation:\n\
    \n+   1. Line 10 checks if the execution is direct (__name__ == __main__) or indirect\
    \ (__name__ would contain the module name).\n2. If the script is directly executed,\
    \ lines 11-12 will be executed, as can be seen from the output above.\n3. If the\
    \ script is indirectly executed by importing it, lines 14-15 will be executed,\
    \ as can be seen from the interactive session above."
- md: "## 15.3.4 Accessing Symbols From Namespaces\n\nConsidering that a module defines\
    \ a namespace, we will now explore techniques to find out the complete contents\
    \ of any namespace using the `dir()` function which has the following syntax:\n\
    \n```\ndir([moduleName])\n```\n\nForms:\n\n1. `dir()`\n2. `dir(moduleName)`\n\n\
    **Form #1: `dir()`**\n\nThis function returns a list of all the identifiers present\
    \ in the current local scope of the current namespace, excluding the built-in\
    \ identifiers, as shown below:\n\n```\n>>> x=10\n>>> def f(x): return x\n...\n\
    >>> import fact\n>>> dir()\n['__builtins__', '__doc__', '__loader__', '__name__',\n\
    '__package__', '__spec__', 'f', 'fact', 'x']\n```\n\n**Observation:**\n\n1. We\
    \ have created a variable `x`, defined a function `f` and imported a module `fact`.\n\
    2. We see that the `dir()` function returns a list of strings with each string\
    \ naming an identifier in our current namespace. This list includes names of variables\
    \ (like `x`), names of functions (like `f`) and names of modules (like `fact`).\n\
    3. Certain standard identifiers are always included вАУ like `__builtins__` for\
    \ example!\n\n> **NOTE:**\n> If you want to see the list of all built-in identifiers,\
    \ import the module `builtins` (`import builtins`) and pass `builtins` as an argument\
    \ to `dir()` using the 2nd form (`dir(builtins)`).\n\n## 15. Modules\n\n**Form\
    \ #2: dir(moduleName)**\n\nThis function lists out all the identifiers present\
    \ in the namespace of the specified module. Here is an example showing all the\
    \ built-in identifiers by explicitly checking the contents of the module builtins:\n\
    \n```\n>>> import builtins\n>>> dir(builtins)\n['ArithmeticError', 'AssertionError',\
    \ 'AttributeError',\n'BaseException', 'BlockingIOError', 'BrokenPipeError', 'BufferError',\n\
    'BytesWarning', 'ChildProcessError', 'ConnectionAbortedError',\n'ConnectionError',\
    \ 'ConnectionRefusedError', 'ConnectionResetError',\n'DeprecationWarning', 'EOFError',\
    \ 'Ellipsis', 'EnvironmentError',\n'Exception', 'False', 'FileExistsError', 'FileNotFoundError',\n\
    'FloatingPointError', 'FutureWarning', 'GeneratorExit', 'IOError',\n'ImportError',\
    \ 'ImportWarning', 'IndentationError', 'IndexError',\n'InterruptedError', 'IsADirectoryError',\
    \ 'KeyError',\n'KeyboardInterrupt', 'LookupError', 'MemoryError', 'NameError',\n\
    'None', 'NotADirectoryError', 'NotImplemented', 'NotImplementedError',\n'OSError',\
    \ 'OverflowError', 'PendingDeprecationWarning',\n'PermissionError', 'ProcessLookupError',\
    \ 'RecursionError',\n'ReferenceError', 'ResourceWarning', 'RuntimeError', 'RuntimeWarning',\n\
    'StopAsyncIteration', 'StopIteration', 'SyntaxError', 'SyntaxWarning',\n'SystemError',\
    \ 'SystemExit', 'TabError', 'TimeoutError', 'True',\n'TypeError', 'UnboundLocalError',\
    \ 'UnicodeDecodeError',\n'UnicodeEncodeError', 'UnicodeError', 'UnicodeTranslateError',\n\
    'UnicodeWarning', 'UserWarning', 'ValueError', 'Warning',\n'ZeroDivisionError',\
    \ '__build_class__', '__debug__', '__doc__',\n'__import__', '__loader__', '__name__',\
    \ '__package__', '__spec__',\n'abs', 'all', 'any', 'ascii', 'bin', 'bool', 'bytearray',\
    \ 'bytes',\n'callable', 'chr', 'classmethod', 'compile', 'complex', 'copyright',\n\
    'credits', 'delattr', 'dict', 'dir', 'divmod', 'enumerate', 'eval',\n'exec', 'exit',\
    \ 'filter', 'float', 'format', 'frozenset', 'getattr',\n'globals', 'hasattr',\
    \ 'hash', 'help', 'hex', 'id', 'input', 'int',\n'isinstance', 'issubclass', 'iter',\
    \ 'len', 'license', 'list',\n'locals', 'map', 'max', 'memoryview', 'min', 'next',\
    \ 'object', 'oct',\n'open', 'ord', 'pow', 'print', 'property', 'quit', 'range',\
    \ 'repr',\n'reversed', 'round', 'set', 'setattr', 'slice', 'sorted',\n'staticmethod',\
    \ 'str', 'sum', 'super', 'tuple', 'type', 'vars', 'zip']\n```\n\n> **NOTE:**\n\
    > The second form actually accepts any namespace, not necessarily a module name!\
    \ Given a reference to an object, for instance, this will return a list of all\
    \ symbols present within that object!\n\n## 15.4 Packages\n\nIf a module is a\
    \ collection of reusable code, what is a collection of modules called? Package!\n\
    \nA *package* is a logical collection of modules (and as will be covered in the\
    \ next section, a package can also contain subpackages). A package makes it possible\
    \ to logically group related modules so that managing and distributing them becomes\
    \ easier. Physically in the file system, a package is a *directory* and the modules\
    \ are *files* within that directory.\n\nGiven that a directory is to be considered\
    \ to be a package, all the Python scripts within that will be considered to be\
    \ modules. We should therefore have a mechanism to tell Python which directories\
    \ are to be considered as packages and which are to be treated as merely directories\
    \ without any other inference. This is done by the presence of a special file\
    \ called `__init__.py`. The presence of this file in a directory is an indication\
    \ to Python that the directory is to be considered to be a package. The file could\
    \ well be empty, but being a Python script, it could also contain executable Python\
    \ code that is executed when the package is loaded for the first time (just as\
    \ how modules are executed when imported for the first time). Similarly, the absence\
    \ of this file in a directory will prevent Python from considering that directory\
    \ to be a package.\n\nLet us create some sample files to demonstrate packages\
    \ and accessing its modules and their content. We will create a package called\
    \ `pkg1` that contains 2 modules named `mod1` and `mod2` respectively, each containing\
    \ a function called `f`. We will then see various ways of invoking these functions.\n\
    \n```\npkg1/__init__.py\n```\n\n```\npkg1/mod1.py\n#!/usr/bin/python\n\n# Demonstration\
    \ of modules within packages\n# Module mod1 containing function f\n\ndef f():\n\
    \    print(\"This is mod1's f\")\n```\n\n```\npkg1/mod2.py\n#!/usr/bin/python\n\
    \n# Demonstration of modules within packages\n# Module mod2 containing function\
    \ f\n\ndef f():\n    print(\"This is mod2's f\")\n```\n\n**Interactive session:**\n\
    \n```\n>>> import pkg1\n>>> from pkg1 import mod1, mod2\n>>> mod1.f()\nThis is\
    \ mod1's f\n>>> mod2.f()\nThis is mod2's f\n```\n\n**Observation:**\n\n1. The\
    \ file `pkg1/__init__.py` is empty. We will see what code could be added later\
    \ on.\n2. The statement `import pkg1` makes the symbol `pkg1` available in the\
    \ program. This statement will also be responsible for executing the file `pkg1/__init__.py`.\n\
    3. The statement `from pkg1 import mod1, mod2` makes the symbols `mod1` and `mod2`\
    \ from within `pkg1` available to us directly. This statement is also responsible\
    \ for executing the modules `mod1` and `mod2` within the package `pkg1`.\n4. The\
    \ statement `mod1.f()` invokes the function `f` of module `mod1` of package `pkg1`.\
    \ Similarly, the statement `mod2.f()` invokes the function `f` of module `mod2`\
    \ of package `pkg1`.\n\nIn the above setup, if our goal is to invoke the function\
    \ `f` of module `mod1` of package `pkg1`, these are a couple of ways of doing\
    \ it:\n\n```\n>>> import pkg1.mod1\n>>> pkg1.mod1.f()\nThis is mod1's f\n```\n\
    \n**Observation:**\n\n1. Do note that each of the examples given here are in different\
    \ interactive sessions, as in a single session all previous imports are remembered!\n\
    2. The statement `import pkg1.mod1` imports the entire symbol `pkg1.mod1`. It\
    \ is understood from this syntax that `pkg1` is the name of a package whereas\
    \ `mod1` is the name of a module.\n3. The statement `pkg1.mod1.f()` invokes the\
    \ function `f` of the imported symbol `pkg1.mod1`, which is nothing but the module\
    \ `mod1` within the package `pkg1`.\n\n```\n>>> from pkg1 import mod1\n>>> mod1.f()\n\
    This is mod1's f\n```\n\n**Observation:**\n\n1. The statement `from pkg1 import\
    \ mod1` imports the symbol `mod1` from within `pkg1`, making `mod1` directly accessible.\n\
    2. The statement `mod1.f()` then invokes the function `f` using the module name\
    \ that was imported.\n\n```\n>>> from pkg1.mod1 import f\n>>> f()\nThis is mod1's\
    \ f\n```\n\n**Observation:**\n\n1. The statement `from pkg1.mod1 import f` imports\
    \ the symbol `f` from the module `mod1` within the package `pkg1`.\n2. The function\
    \ `f` can now be directly invoked.\n\nWe therefore conclude that the following\
    \ syntaxes are possible:\n\n```\npackageName.moduleName\npackageName.moduleName.functionName\n\
    packageName.moduleName.variableName\n```"
