    # 2.3.2 The float type


    The `float` data type of Python allows us to store numbers that have a decimal
    part too.


    > **For C/C++/Java programmers:**


    The `float` data type of Python can be considered to be equivalent to the `double`
    data types of languages like C, C++ and Java, rather than their `float` data type.


    # 2.3.2.1 Literals of Type float


    Any literal constant made up of only digits (with an optional leading sign) with
    either a decimal point (.) or an exponentiation (e/E) is considered as a `float`
    constant.


    **Examples:**


    ```

    >>> 123.5

    123.5

    >>> 123.0

    123.0

    >>> 12e2

    1200.0

    >>> 123.5e2

    12350.0

    >>> 123.45678e2

    12345.678

    ```


    Objects of type `float` can also be created using the explicit constructor of
    class float. This of course also resembles a function call for type conversion.
    Thus, the following two statements are identical in function:


    **Example:**


    ```

    x = 2.5

    x = float(2.5)

    ```


    This built-in function is also helpful for converting other types like `int` and
    `string` to the type `float`. Also, the default constructor of `float` class will
    create a float with value 0.0.


    ```

    >>> float(23)

    23.0

    >>> float("23")

    23.0

    >>> float()

    0.0

    ```'
