    | 4 | a*b+c | ab*c+ |

    | 5 | a* (b+c) | abc+* |

    | 6 | (a+b) * (c+d) | ab+cd+* |


    # Observation:


    +   1. As long as no operators are involved, both infix and postfix expressions
