    # 4.9.4 Sorting a List


    The list can be sorted using the `list.sort()` function as shown in the example
    below. Note that all elements will be reordered to lie in ascending order in the
    list.


    ```

    >>> L=[5,2,3]

    >>> L.sort()

    >>> L

    [2, 3, 5]

    ```


    The list elements can be sorted in descending order as follows:


    ```

    >>> L=[5,2,3]

    >>> L.sort(reverse=True)

    >>> L

    [5, 3, 2]

    ```


    **Observation:**


    +   1. `L.sort()` is the same as `L.sort(reverse=False)`

    2. The `list.sort()` function changes the order of elements in the original list.
    In order to retrieve a sorted list without affecting the original list, the `sorted(list)`
    function can be used, which sorts the elements of the list `list` in ascending
    order and returns the new list without affecting the list `list`. In case we wish
    to sort the elements in descending order, we can use `sorted(list,reverse=True)`.

    3. Sorting a list in reverse order is functionally identical to sorting it and
    then reversing it. This, `list.sort(reverse=True)` is functionally identical to
    the sequence of statements `list.sort()` followed by `list.reverse()`.


