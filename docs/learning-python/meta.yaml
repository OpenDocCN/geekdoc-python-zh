    # 8.2.2.3 Searching Using index()


    The `index()` function is just like the `find()` function, but generates a `ValueError`
    if the substring is not found, instead of simply returning -1. The `index()` function
    is preferred over the `find()` function in these cases:


    +   1. We expect to find the substring, the only question being where is it found.
    It would be an unexpected case to not find the substring in the string at all.

