    ## 9. ж≠£еИЩи°®иЊЊеЉП


    жИСдїђе∞Жи¶Бз†Фз©ґзЪДеЙН 3 дЄ™еЗљжХ∞жШѓ `match()`гАБ`fullmatch()` еТМ `search()`пЉМеЃГдїђйГљеПѓдї•еЬ®е≠Чзђ¶дЄ≤дЄ≠жРЬзіҐж≠£еИЩи°®иЊЊеЉПеМєйЕНй°єпЉМдљЖеЬ®еКЯиГљдЄКзХ•жЬЙдЄНеРМпЉМе¶ВдЄЛи°®жАїзїУпЉЪ


