- md: "if condition: statement1\nelse: statement2\n\nif condition:\n    statement_block1\n\
    \    ...\nelse: statement2\n\nif condition: statement1\nelse:\n    statement_block2\n\
    \    ...\n\nif condition:\n    statement_block1\n    ...\nelse:\n    statement_block2\n\
    \    ...\n\nThese are 4 permutations of simple statements (single statements)\
    \ and compound statements (statement blocks), but the working is similar:\n\n\
    - If the condition evaluates to True, `statement1` or `statement_block1` is executed\
    \ sequentially and `statement2` or `statement_block2` is omitted, with control\
    \ resuming finally after the `if-else` statement.\n- If the condition evaluates\
    \ to False, `statement1` or `statement_block1` is omitted and `statement2` or\
    \ `statement_block2` is executed sequentially, with control resuming finally after\
    \ the `if-else` statement.\n\nLet us rewrite the previous program using `if-else`\
    \ statement:\n\n## vote3.py\n\n```python\n#!/usr/bin/python3\n\n# Program that\
    \ asks for the user's name and age\n# and prints whether the user is eligible\
    \ to vote or not!\n\nname = input(\"Enter your name: \")\nage = int(input(\"Enter\
    \ your age: \"))\n\nif age >= 18:\n    print(\"Hi {}! You can vote!\".format(name))\n\
    else:\n    print(\"Sorry {}! You can't vote!\".format(name))\n```\n\nThe output\
    \ is the same as the previous program and hence not duplicated here. Isn't this\
    \ program more readable and more simpler than the previous one? It also turns\
    \ out to be more efficient as well!\n\n## 3.2.3 The if-elif-else Statement\n\n\
    Let us take the mutual exclusion concept a little further. We have so far concluded\
    \ that if 2 conditions are mutually exclusive, we can use a single `if-else` statement\
    \ instead of 2 independent `if` statements. Similarly, if we have more than 2\
    \ mutually exclusive conditions, we can use the `if-elif-else` statement. Its\
    \ syntax is given below:\n\n```python\nif condition1:\n    statement_block1\n\
    \    ...\nelif condition2:\n    statement_block2\n    ...\nelif condition3:\n\
    \    statement_block3\n    ...\n...\nelse:\n    statement_blockN\n```\n\n### Observation:\n\
    \n1. We have used the statement block syntax above, but each condition (and the\
    \ `else` clause as well) could well be followed by single statements instead.\n\
    2. The complete syntax of the `if` statement is therefore an `if` block followed\
    \ by 0 or more `elif` blocks followed by an optional `else` block.\n3. The conditions\
    \ are tested sequentially and the moment one of them evaluates to `True`, the\
    \ corresponding block is executed sequentially and all the other blocks are skipped\
    \ with control resuming after the `if-else` block.\n4. If none of the conditions\
    \ evaluate to `True`, the `else` block is executed if the `else` clause is present.\
    \ Otherwise, the entire `if-else` block is skipped.\n\nLet's write a program to\
    \ use this. Given an integer, let us classify it as being a positive integer,\
    \ negative integer or zero.\n\n## int_sign.py\n\n```python\n#!/usr/bin/python3\n\
    \n# Program that classifies an integer as being\n# 1. A positive integer\n# 2.\
    \ A negative integer\n# 3. Zero\n\nx = int(input(\"Enter an integer: \"))\n\n\
    if x > 0:\n    print(\"{} is positive\".format(x))\nelif x < 0:\n    print(\"\
    {} is negative\".format(x))\nelse:\n    print(\"{} is zero\".format(x))\n```\n\
    \nThere is probably nothing more to explain about the program вАУ it should be pretty\
    \ self-explanatory! Do note however, that due to mutual exclusion of the conditions,\
    \ we don't have to explicitly check if the number is zero when it is neither positive\
    \ nor negative. In this program, the order in which we give the conditions does\
    \ not matter, nor does it matter which 2 of the 3 cases we frame conditions for.\
    \ This is not always the case, however, as will be demonstrated in the next program.\n\
    \nLet us write a program that classifies a given pair of coordinates. It has to\
    \ tell us one of the following:\n\n1. The point is on the origin\n2. The point\
    \ is on the x-axis\n3. The point is on the y-axis\n4. The quadrant the point belongs\
    \ to, otherwise\n\n## quadrant.py\n\n```python\n#!/usr/bin/python\n\n# A script\
    \ to tell whether a given point is on the origin,\n# on the x- or y-axis, or in\
    \ a particular quadrant.\n\nx = int(input(\"Enter the x-coordinate of the point:\
    \ \"))\ny = int(input(\"Enter the y-coordinate of the point: \"))\n\nif x == 0\
    \ and y == 0:\n    print(\"The point lies on the origin\")\nelif y == 0:\n   \
    \ print(\"The point lies on the x-axis\")\nelif x == 0:\n    print(\"The point\
    \ lies on the y-axis\")\nelif x > 0 and y > 0:\n    print(\"The point lies in\
    \ the first quadrant\")\nelif x < 0 and y > 0:\n    print(\"The point lies in\
    \ the second quadrant\")\nelif x < 0 and y < 0:\n    print(\"The point lies in\
    \ the third quadrant\")\nelse:\n    print(\"The point lies in the fourth quadrant\"\
    )\n```\n\n### Output:\n\n```\nEnter the x-coordinate of the point: -3\nEnter the\
    \ y-coordinate of the point: 0\nThe point lies on the x-axis\n```\n\n```\nEnter\
    \ the x-coordinate of the point: -3\nEnter the y-coordinate of the point: 2\n\
    The point lies in the second quadrant\n```\n\n### Observation:\n\n1. We classify\
    \ the quadrant to which the given points belongs to only when the point does not\
    \ lie on either axes.\n2. The given point lies on the y-axis if its x-coordinate\
    \ is 0, and on the x-axis if its y-coordinate is 0. However, if the point lies\
    \ on the origin (with both coordinates being 0), we neither say it lies on the\
    \ x-axis nor on the y-axis.\n3. The order of the conditions therefore is important\
    \ here. If for instance we decided to first frame a condition for the point lying\
    \ on the y-axis, this would be the condition: x==0 and y!=0.\n4. The order in\
    \ which we check for the quadrants still does not matter.\n\nLet us write a program\
    \ that finds the roots of a quadratic equation ax¬≤+bx+c=0 using the formula:\n\
    \n$$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$\n\nWe will also classify the roots\
    \ of the equation based on the discriminant (b¬≤-4ac) as follows:\n\n1. Real and\
    \ equal, if discriminant is 0\n2. Real and distinct, if discriminant > 0\n3. Imaginary,\
    \ if discriminant < 0\n\n```python\n#!/usr/bin/python\n\n# Script to classify\
    \ and determine\n# the roots of a quadratic equation\n\nimport math\n\na = int(input(\"\
    Enter the value of a: \"))\nb = int(input(\"Enter the value of b: \"))\nc = int(input(\"\
    Enter the value of c: \"))\n\ndiscriminant = b**2 - 4*a*c\n\nif discriminant ==\
    \ 0:\n    print(\"The roots are real and equal\")\n    x = -b/(2*a)\n    print(\"\
    The root is\",x)\nelif discriminant > 0:\n    print(\"The roots are real and distinct\"\
    )\n    part1 = -b/(2*a)\n    part2 = math.sqrt(discriminant)/(2*a)\n    x1 = part1\
    \ + part2\n    x2 = part1 - part2\n    print(\"The roots are\",  x1, \"and\",\
    \ x2)\nelse:\n    print(\"The roots are imaginary\")\n    part1 = -b/(2*a)\n \
    \   part2 = math.sqrt(-discriminant)/(2*a)\n    x1 = complex(part1, part2)\n \
    \   x2 = complex(part1, -part2)\n    print(\"The roots are\",  x1, \"and\", x2)\n\
    ```\n\n### Output:\n\n```\nEnter the value of a: 1\nEnter the value of b: 4\n\
    Enter the value of c: 4\nThe roots are real and equal\nThe root is -2.0\n```\n\
    \n```\nEnter the value of a: 1\nEnter the value of b: 5\nEnter the value of c:\
    \ 6\nThe roots are real and distinct\nThe roots are -2.0 and -3.0\n```\n\n```\n\
    Enter the value of a: 2\nEnter the value of b: 4\nEnter the value of c: 4\nThe\
    \ roots are imaginary\nThe roots are (-1+1j) and (-1-1j)\n```\n\n### Observation:\n\
    \n1. We take the discriminant as:\n\n$$discriminant = b^2 - 4ac$$\n\nThis changes\
    \ the formula to the following:\n\n$$x = \\frac{-b \\pm \\sqrt{discriminant}}{2a}$$\n\
    \n2. If the discriminant is 0, the formula will reduce to:\n\n$$x = \\frac{-b}{2a}$$\n\
    \n3. If the discriminant is positive, the formula can be split into 2 terms as:\n\
