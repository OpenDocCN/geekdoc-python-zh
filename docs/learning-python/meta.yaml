    \n### 14.8.4 wc зЪДеЃЮзО∞пЉЪе≠ЧжХ∞зїЯиЃ°\n\nUNIX зЪД `wc` еЈ•еЕЈзїЯиЃ°зїЩеЃЪжЦЗдїґдЄ≠зЪДе≠Чзђ¶жХ∞гАБеНХиѓНжХ∞еТМи°МжХ∞гАВињЩжШѓдЄАдЄ™еЃЮзО∞зЫЄеРМеКЯиГљзЪД Python\
    \ иДЪжЬђгАВ\n\n**wc.py**\n\n```python\n#!/usr/bin/python\n\n# wc еСљдї§зЪДеЃЮзО∞пЉМзФ®дЇОжШЊз§Ї\n# жЦЗдїґдЄ≠зЪДе≠Чзђ¶жХ∞гАБеНХиѓНжХ∞еТМи°МжХ∞гАВ\n\
    \nfilename = input(\"Enter filename:\")\nchars,words,lines = 0,0,0\n\ntry:\n \
