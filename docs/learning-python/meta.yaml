  - '[PAGE 145]


    # 6.2 Accessing Set Elements


    Being unordered collections, it is not possible to identify an element within
    a set using an index or any other mechanism. Therefore, the operations normally
    performed on a set is checking for the existence of an element within a set rather
    than accessing a particular element in the set. Of course, iterating through a
    set is still possible and meaningful.


    # 6.3 Counting Set Elements


    The `len()` function is available to count the number of elements in a set. The
    minimum size of any set is 0, corresponding to an empty set (denoted by `set()`
    and not `{}`).


    ```

    >>> S=set(range(1,6))

    >>> S

    {1, 2, 3, 4, 5}

    >>> len(S)

    5

    >>> S=set()

    >>> S

    set()

    >>> len(S)

    0

    ```


    # 6.4 Iterating Through Set Elements


    Since accessing particular set elements is not possible, iterating through a set
    is the only option to determine the contents of a set. The normal `for` loop can
    be used for this purpose:


    ```

    >>> S=set(range(1,6))

    >>> for i in S: print(i)

    ...

    1

    2

    3

    4

    5

    ```


    # 6.5 Searching Elements within Sets


    Checking for the existence of an element within a set is a very efficient operation
    (compared to a similar search within a list or a tuple). The `in` and `not in`
    operators can be used for this purpose:'
  - '[PAGE 146]


    ```

    >>> S=set(range(1,6))

    >>> 2 in S

    True

    >>> 9 in S

    False

    >>> 9 not in S

    True

    ```


    # 6.6 Adding and Deleting Elements


    It is possible to add elements to a set and delete elements from a set. While
    adding, keep in mind that addition of duplicates are ignored. While deleting,
    we need to consider the situation what happens if we attempt to delete something
    that doesn''t exist. We will explore various methods to add and delete elements.


    # 6.6.1 Adding Elements


    # 6.6.1.1 Adding Individual Elements to a Set


    To add an element to a set, the `set.add(x)` function can be used which adds the
    element `x` to the set `set`:


    ```

    >>> S=set(range(1,6))

    >>> S

    {1, 2, 3, 4, 5}

    >>> S.add(9)

    >>> S

    {1, 2, 3, 4, 5, 9}

    ```


    # 6.6.1.2 Adding a Set of Elements to a Set


    To add a set of elements to another, the `set.update(s)` function can be used,
    which updates the set `set` to contain the union of the set `set` and the set
    `s` вАУ in simple terms, it adds all the elements of the set `s` to the set `set`:


    ```

    >>> S1={2,4,6,8}

    >>> S1

    {8, 2, 4, 6}

    >>> S2={1,3,5,7}

    >>> S2

    {1, 3, 5, 7}

    >>> S1.update(S2)

    >>> S1

    {1, 2, 3, 4, 5, 6, 7, 8}

    ```


    It is also possible to find the union of a set with another and then assign that
    set to the original variable. We will examine how to find the union soon.'
  - "[PAGE 147]\n\n# 6.6.2 Deleting Elements\n\nThere are many ways of deleting elements\
    \ from a set. These not only differ in how they allow the user to choose the element\
    \ to be deleted, but also differ in what happens if they are unable to delete.\n\
    \n# 6.6.2.1 Using pop() to Delete an Element\n\nThe `set.pop()` function deletes\
    \ an element from the set `set` and returns the element deleted. Since sets are\
    \ unordered, we cannot predict which element will actually get deleted in the\
    \ set. As a special case, if the set is empty, this function generates a `KeyError`.\n\
    \n```\n>>> S=set(range(1,6))\n>>> S\n{1, 2, 3, 4, 5}\n>>> S.pop()\n1\n>>> S\n\
    {2, 3, 4, 5}\n>>> S.pop()\n2\n>>> S\n{3, 4, 5}\n```\n\n# 6.6.2.2 Using remove()\
    \ to Delete an Element\n\nThe `set.remove(x)` function removes the element `x`\
    \ from the set `set`. If `x` was not found, it will produce a `KeyError`.\n\n\
    ```\n>>> S=set(range(1,6))\n>>> S\n{1, 2, 3, 4, 5}\n>>> S.remove(3)\n>>> S\n{1,\
    \ 2, 4, 5}\n>>> S.remove(3)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nKeyError: 3\n```\n\n# 6.6.2.3 Using discard() to Delete\
    \ an Element\n\nThe `set.discard(x)` function deletes the element `x` from the\
    \ set `set`. Where it differs from the `remove()` function is that if the element\
    \ `x` was not found, it does nothing instead of generating an error."
  - '[PAGE 148]


    ```

    >>> S=set(range(1,6))

    >>> S

    {1, 2, 3, 4, 5}

    >>> S.discard(3)

    >>> S

    {1, 2, 4, 5}

    >>> S.discard(3)

    >>> S

