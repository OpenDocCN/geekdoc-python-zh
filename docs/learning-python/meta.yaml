  md: '# SUMMARY


    +   > To develop your custom HTML parser, create a class that extends the html.parser.HTMLParser
    class and override the needed methods as required. The most common methods are
    handle_starttag(), handle_endtag() and handle_data(). The HTML data is fed in
    to the parser using the feed() method.

    > The bs4.BeautifulSoup class provides a much easier to use parser that internally
    uses another available HTML parser.

    > The prettify() method returns pretty-printed HTML content.

    > The Tag object has various attributes of use like name, attrs, string, etc.

    > The get_text() method of Tag returns the recursively collected string content
    of the Tag while the contents attribute contains the list of all child nodes of
    that Tag.

    > The most commonly used searching method of BeautifulSoup is find_all(), which
