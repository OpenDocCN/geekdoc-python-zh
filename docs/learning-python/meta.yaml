- md: "## 13.2.2.2 Common Handling of Multiple Exceptions\n\nNow that we know how\
    \ to handle different exceptions differently, let us consider the case that we\
    \ may want to handle 2 or more exceptions in a common manner. While we have the\
    \ liberty of handling different exceptions differently, it is also possible to\
    \ handle multiple exceptions using a common block of code.\n\n**Syntax:**\n\n\
    ```\ntry:\n    ... # try block\nexcept (ExceptionName1, ExceptionName2 [,ExceptionName3...]):\n\
    \    ... # except block\n```\n\nWe observe in the syntax above that we can give\
    \ a tuple of exception types in the `except` clause instead of a single exception\
    \ type!\n\nLet us rewrite `ExceptionHandlingDemo2.py` using a common response\
    \ to both `ValueError` as well as `ZeroDivisionError`:\n\n### ExceptionHandlingDemo3.py\n\
    \n```\n1.  #!/usr/bin/python\n2.  \n3.  # Exception Handling Demo\n4.  # Common\
    \ handling of multiple exceptions\n5.  \n6.  try:\n7.      n = int(input(\"Enter\
    \ an integer:\"))\n8.      quotient = int(100/n)\n9.      print(\"100/{} = {}\"\
    .format(n,quotient))\n10. except (ValueError, ZeroDivisionError):\n11.     print(\"\
    Oops! Unable to calculate!\")\n12. \n13. print(\"Thanks for using this program!\"\
    )\n```\n\n**Output:**\n\n```\nEnter an integer:5\n100/5 = 20\nThanks for using\
    \ this program!\n```\n\n**Output:**\n\n```\nEnter an integer:0\nOops! Unable to\
    \ calculate!\nThanks for using this program!\n```\n\n**Output:**\n\n```\nEnter\
    \ an integer:hi\nOops! Unable to calculate!\nThanks for using this program!\n\
    ```\n\n**Observation:**\n\n- 1. Line 10 now handles a tuple of exceptions! If\
    \ the exception raised in the `try` block is `ValueError` or `ZeroDivisionError`\
    \ (or any of their derived classes), then control will enter line 10. The response\
    \ to both is identical.\n\nBefore we proceed further, do note that we can mix\
    \ handling different exceptions differently with handling multiple exceptions\
    \ in a common manner as shown in the sample syntax below:\n\n```\ntry:\n    ...\
    \ # try block\nexcept ExceptionName1:\n    ... # except block\nexcept (ExceptionName2,\
    \ ExceptionName3, ExceptionName4):\n    ... # except block\nexcept (ExceptionName5,\
    \ exceptionName6):\n    ... # except block\nexcept ExceptionName7:\n    ... #\
    \ except block\n```\n\n## 13.2.2.3 Handling All Exceptions\n\nWhile section 13.2.2.1\
    \ showed how to handle specific exceptions, section 13.2.2.2 showed how to handle\
    \ multiple specific exceptions. But both of these approaches require the programmer\
    \ to explicitly specify the exception(s) to be handled. What if we do not want\
    \ to name them and simply tell Python that this is how we wish to handle *all*\
    \ exceptions, even if we don't know the names of the exceptions? The following\
    \ syntax demonstrates this possibility:\n\n```\ntry:\n    ... # try block\nexcept\
    \ ExceptionName1:\n    ... # Single exception handler\nexcept (ExceptionName2,\
    \ ExceptionName3):\n    ... # Multiple exception handler\nexcept:\n    ... # Handles\
    \ all exceptions not handled above\n```\n\n**Observation:**\n\n- 1. As can be\
    \ seen from the syntax above, the last `except` block does not specify any particular\
    \ exception and is thus considered to mean any and all exceptions.\n- 2. Such\
    \ a catch-all handler should be the last `except` clause, if at all present. The\
    \ reason is that no `except` handlers below this can ever get executed since the\
    \ `except` blocks are tried sequentially and the catch-all handler can handle\
    \ any exception.\n- 3. In the above syntax, any exception raised in the `try`\
    \ block that is not `ExceptionName1`, `ExceptionName2` and `ExceptionName3` (or\
    \ its derived classes) will be handled in the catch-all handler.\n\nDo note that\
    \ the catch-all handler does not require any previous `except` blocks. The following\
    \ syntax is therefore valid, possible and useful:\n\n```\ntry:\n    ... # try\
    \ block\nexcept:\n    ... # Handle all exceptions here\n```\n\nLet us revisit\
    \ `ExceptionHandlingDemo3.py` and use this feature there.\n\n### ExceptionHandlingDemo4.py\n\
    \n```\n1.  #!/usr/bin/python\n2.  \n3.  # Exception Handling Demo\n4.  # Handling\
    \ all exceptions\n5.  \n6.  try:\n7.      n = int(input(\"Enter an integer:\"\
    ))\n8.      quotient = int(100/n)\n9.      print(\"100/{} = {}\".format(n,quotient))\n\
    10. except:\n11.     print(\"Oops! Unable to calculate!\")\n12. \n13. print(\"\
    Thanks for using this program!\")\n```\n\n**Output:**\n\n```\nEnter an integer:5\n\
    100/5 = 20\nThanks for using this program!\n```\n\n```\nEnter an integer:0\nOops!\
    \ Unable to calculate!\nThanks for using this program!\n```\n\n```\nEnter an integer:hi\n\
    Oops! Unable to calculate!\nThanks for using this program!\n```\n\n**Observation:**\n\
    \n- 1. Any exception generated in the `try` block will now be handled in the `except`\
    \ block in line 10.\n- 2. We expect `ValueError` and `ZeroDivisionError`, both\
    \ of which will be handled in line 10.\n\n## 13.2.3 Dealing with Exception Instances\n\
    \nSo far, we have responded to different exceptions in a variety of ways, but\
    \ haven't considered the specific exception instance. When an exception is raised,\
    \ there is an exception object behind it. Such an exception object can contain\
    \ a lot of useful information about the exception that took place! In this section,\
    \ we will see how we can gain access to the exception object and obtain some more\
    \ information on the exception.\n\nThe following sample syntax shows how we can\
    \ gain access to the exception instance:\n\n```\ntry:\n    ... # try block\nexcept\
    \ ExceptionName1 as e:\n    ... # Handler ExceptionName1 with instance as e\n\
    except (ExceptionName2, ExceptionName3) as e:\n    ... # Handle both these exceptions\
    \ with instance as e\n```\n\nLet us modify `ExceptionHandlingDemo4.py` to demonstrate\
    \ these features.\n\n### ExceptionHandlingDemo5.py\n\n```\n1.  #!/usr/bin/python\n\
    2.  \n3.  # Exception Handling Demo\n4.  # Exception instances\n5.  \n6.  import\
    \ sys\n7.  \n8.  try:\n9.      n = int(input(\"Enter an integer:\"))\n10.    \
    \ quotient = int(100/n)\n11.     print(\"100/{} = {}\".format(n,quotient))\n12.\
    \ except Exception as e:\n13.     print(\"Oops! Unable to calculate!\")\n14. \
    \    print(\"Details:\",e)\n15. \n16. print(\"Thanks for using this program!\"\
    )\n```\n\n**Output:**\n\n```\nEnter an integer:0\nOops! Unable to calculate!\n\
    Details: division by zero\nThanks for using this program!\n```\n\n```\nEnter an\
    \ integer:hi\nOops! Unable to calculate!\nDetails: invalid literal for int() with\
    \ base 10: 'hi'\nThanks for using this program!\n```\n\n**Observation:**\n\n-\
    \ 1. This program is based on `ExceptionHandlingDemo4.py`, but there are 2 changes\
    \ in line 12 that are important.\n- 2. The first change is that we are responding\
    \ to exceptions of type `Exception`. Since we want to respond to both `ValueError`\
    \ as well as `ZeroDivisionError` in the same manner, we would have preferred to\
    \ use the catch-all handler (section 13.2.2.3). However, the catch-all handler\
    \ syntax cannot be used to process instances and hence we have to think of an\
    \ alternative. We utilize the fact that both `ValueError` and `ZeroDivisionError`\
    \ derive from `Exception`, hence handling `Exception` will allow us to handle\
    \ them both.\n- 3. The second change in line 12 is that we have used the additional\
    \ clause \"as e\". This allows us to access the exception instance using `e`.\
    \ Of course, `e` is just a variable name and we could use any name for accessing\
    \ the instance.\n- 4. Line 14 prints `e` вАУ it actually ends up stringifying `e`\
    \ (section 12.8.2.2) and prints that string. We expect the string version of all\
    \ built-in exceptions to be a human readable message that makes us understand\
    \ the cause of the exception.\n- 5. We can do more with exception instances, but\
    \ what we can do depends on the exception. We will cover this aspect in greater\
    \ detail once we learn to make our own exception classes in section 13.6.\n\n\
    ## 13.2.4 The else Clause\n\nRecollect from section 13.2 that one of the goals\
    \ of exception handling is to separate normal logic from exception handling logic.\
    \ This goal has been met by having normal logic code in the `try` section and\
    \ the exception handling code in one of the `except` blocks.\n\nPython provides\
    \ an alternative that allows us to split the normal logic block into 2 parts"
