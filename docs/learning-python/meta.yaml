  - "[PAGE 97]\n\n# 3. Python Control Structures\n\n85\n\narmstrong.py\n\n```\n1.\
    \  #!/usr/bin/python\n2.  \n3.  # Program to print all 3-digit Armstrong numbers\n\
    4.  \n5.  for num in range(100,1000):\n6.      sum=0\n7.      n=num\n8.      while\
    \ n>0:\n9.          sum += (n%10)**3\n10.         n //= 10\n11. \n12.     if num==sum:\
    \ print(num)\n```\n\nOutput:\n\n```\n153\n370\n371\n407\n```\n\nObservation:\n\
    \n+   1. We use the `range()` function to generate all 3-digit integers вАУ from\
    \ 100 (inclusive) to 1000 (exclusive) in line 5.\n2. We use the same logic that\
    \ we had used in `sum_digits.py` to extract the digits from the number and find\
    \ the sum вАУ except that the sum here is the sum of the cubes of the digits rather\
    \ than the sum of the digits (line 9).\n3. We could have directly used a formula\
    \ like `(n//100)**3 + (n//10%10)**3 + (n%10)**3` to find the sum of the cubes\
    \ of the digits of a given number `n`. A loop not only increases the readability,\
    \ but is also general enough to work with any number of digits, if required.\n\
    \n# 3.4 Terminating Control\n\nWhile all the previous sections concentrated on\
