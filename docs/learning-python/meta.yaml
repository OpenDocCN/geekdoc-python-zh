    # 2. Python Basics


    Furthermore, single quotes and double quotes can be freely used inside triple
    quotes вАУ of course you can''t directly use the 3 quotes used to start the string
    in succession or else it would be considered to be triple quotes and will terminate
    the string. Escaping of single quotes and double quotes is possible, if at all
    needed.


    Here is the improved program:


    ```

    HelloWorld7.py


    1. print("""Hello World

    2. ''Hi'' from "India"!""")

    ```


    Output:


    ```

    Hello World

    ''Hi'' from "India"!

    ```


    Triple quotes differs from single quotes and double quotes in the following ways:


    +   1. They allow strings to span multiple lines

    2. They do not require a terminating backslash at the end of every line to indicate
    continuation

    3. They allow the embedding of both single quotes and double quotes without the
    need for escaping (except when there are 3 quotes in succession in which case
    an escaping might be required)

    4. They preserve the newline character (that exists at the end of every line)
    within the string

    5. They can have a special purpose вАУ that of providing documentation (covered
    in section 10.15)


    # 2.2 Comments


    Comments are pieces of text added within programs to improve the readability.
    Comments are non-executable and the interpreter will ignore it''s contents.


    A comment in Python is indicated by the hash (#) symbol вАУ everything from the
    hash till the end of that line is considered to be a comment.


    Here is another version of Helloworld.py using comments:'
  - '[PAGE 30]


    # HelloWorld8.py


    ```

    1.  #Script to print "Hello World"

    2.  #This two lines are comments

    3.  print("Hello World") #One more comment

    4.  print("Hi from India!")

    ```


    # Output:


    ```

    Hello World

    Hi from India!

    ```


    A good programmer always uses comments to document why the code is doing what
    it is doing, or document facts that are either difficult to make out from the
    code or is not present in the code. Of course, the code should always be written
    in a manner that it clearly specifies what it is doing. Sometimes comments are
    also added to summarise what a block is doing вАУ with the definition of a block
    also extending to functions, classes and modules!


    Sometimes, the comments require multiple lines, and we end up using many hashes.
    There is a simpler way to implement such a comment using the concept of triple
    quotes. Triple quotes are not comments as such; they are technically strings вАУ
    but strings do not do anything on their own, and can end up behaving like comments!


    Section 10.15 will introduce an interesting application of comments used for documenting
    program elements, implemented using triple-quoted strings!


    Here is a version that demonstrates both approaches:


    # HelloWorld9.py


    ```

    1.  # Hi!

    2.  # This program prints Hello World

    3.  # I hope you like it!

    4.  # ==========================

    5.  #

    6.  print("Hello World")

    7.  """

    8.  ==========================

    9.  Hi!

    10. This program printed Hello World

    11. Did you run it?

    12. """

    ```'
