    # Observation:


    +   1. Our input list is L, comprising of the elements 1, 6, 4, 9 and 7.

    2. We define a filtering function called f, which returns True only if it''s argument
    is even.

    3. We use the filter() function passing a reference to our filtering function(f),
    as the first argument and our input list(L) as the second.

    4. The filter() function will filter through the elements of L using f for each
    element of L and returns the final result as an iterable object, which we convert
    to a list for convenience.

    5. We finally observe that the list M contains only the even elements that were
    present in the list L, and in the same order as found in L.


    # 11.4.1 Special Cases of filter()


    We have seen the typical use of filter() in the previous section. There are 2
    special cases to be considered, however.


    The first special case arises when the filtering function reference (first argument
    to filter()) is None. This will result in the filtering of all elements of the
    sequence based on their truth value -- only those elements in the sequence that
    evaluate to Boolean True are allowed to pass through, as shown in the example
    below:


    ```

    >>> L=[1,0,6,4,0,9,7]

    >>> M=list(filter(None,L))

    >>> M

    [1, 6, 4, 9, 7]

    ```


    For integers, 0 is considered False whereas any other integer value is considered
    True. Therefore, in the above example, we observe that the occurrences of 0 are
    filtered out.'
  - '[PAGE 318]


    The second special case arises when we want the reverse вАУ we want to filter out
    those elements of the sequence that evaluate to Boolean `False`. This can be done
    using `itertools.filterfalse()` function, which is the negated form of `filter()`
    as demonstrated below:


    ```

    >>> from itertools import filterfalse

    >>> L=[1,0,6,4,0,9,7]

    >>> M=list(filterfalse(None,L))

    >>> M

    [0, 0]

    ```


    **Observation:**


    +   1. Unlike the `filter()` function which is a built-in, the `filterfalse` function
    is present in the module `itertools` and hence needs to be imported.

    2. When the filtering function reference (the first argument to `filterfalse`)
    is not `None`, this function filters out all those elements for which the filtering
    function returns `True` and only allows those elements to pass for which the filtering
    function return `False`, behaving in a manner opposite of `filter`.


    # 11.5 The reduce() Function


    As the name suggests, the `reduce()` function reduces a sequence to a single value
    вАУ it''s elements are cumulatively passed through a reducing function that reduces
    two arguments to a single value each time. The first argument to the reducing
    function is the accumulated value so far while the second argument is an element
    picked up from the sequence.


    **Syntax:**


    ```

    reduce(func,sequence[,initial])

    ```


    The initial accumulated value is taken to be `initial` if specified, or `0` if
    not specified. To begin with, this initial accumulated value and the first element
    of sequence is passed to the function `func`. The return value from the function
    becomes the new accumulated value, which along with the next element from `sequence`
    is then passed to the function `func`. This process continues as many times as
    the number of elements in `sequence`. The final accumulated value is returned
    by `reduce()`.


