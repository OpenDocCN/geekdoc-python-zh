- md: "## Form #4: BeautifulSoup.find_all(name, attrs, recursive)\n\nThe `recursive`\
    \ flag is used to specify whether we want to descend recursively into the child\
    \ tags or not. The default is `True`.\n\n```\n>>> for tag in soup.div.find_all(\"\
    b\"):\n...     print(tag.name)\n...\nb\n>>> for tag in soup.div.find_all(\"b\"\
    ,recursive=False):\n...     print(tag.name)\n...\n>>>\n```\n\n## Observation:\n\
    \n1. We are trying to find all the \"b\" tags within the \"div\" tag. In the first\
    \ case, the `div` tag contains a `p` tag that in turn contains a `b` tag, and\
    \ therefore we see it being listed.\n2. In the second case where we pass `recursive=False`,\
    \ we are confining the search to the immediate children of the `div` tag and hence\
    \ do not get to see the `b` tag.\n\n## Form #5: BeautifulSoup.find_all(name, attrs,\
    \ recursive, string)\n\nThe `string` argument can be used to search for nodes\
    \ that contain specific strings instead of searching for tags, as illustrated\
    \ below:\n\n```\n(continuation of previous session)\n>>> for node in soup.find_all(string=\"\
    Bold\"):\n...     print(node)\n...\nBold\n```\n\n## Observation:\n\n1. We are\
    \ searching for any node that contains the text \"Bold\".\n2. Note that in previous\
    \ versions of BeautifulSoup, the `string` argument was called `text`.\n\n## 17.\
    \ Parsing HTML\n\n### Form #6: `BeautifulSoup.find_all(name, attrs, recursive,\
    \ string, limit)`\n\nBy default, the `find_all()` method returns a list of all\
    \ tags that match the requirement. We can restrict the length of this list by\
    \ specifying the maximum number of tags required using the `limit` argument. Note\
    \ that if there are lesser tags than the limit, they are returned nevertheless.\n\
    \n```\n(continuation of previous session)\n>>> for tag in soup.div.find_all(\"\
    p\"):\n...     print(tag)\n...\n<p>This is <b>Bold</b></p>\n<p>This is <i>Italics</i></p>\n\
    <p>This is <u>Underlined</u></p>\n>>> for tag in soup.div.find_all(\"p\",limit=2):\n\
    ...     print(tag)\n...\n<p>This is <b>Bold</b></p>\n<p>This is <i>Italics</i></p>\n\
    ```\n\n### Observation:\n\n1. The first example attempts to list out all the `p`\
    \ tags within the `div` tag вАУ there are 3 of them.\n2. In the second example,\
    \ we use `limit=2` to limit the tag list to maximum 2 entries and observe that\
    \ only the first 2 `p` tags within the `div` tag are reported.\n\n### Form #7:\
    \ `BeautifulSoup.find_all(name, attrs, recursive, string, limit, **kwargs)`\n\n\
    Finally, if we use any keyword argument that is not one of `name`, `attrs`, `recursive`,\
    \ `string` and `limit`, it will be assumed to refer to an attribute with a particular\
    \ value as demonstrated below:\n\n```\n(continuation of previous session)\n>>>\
    \ for tag in soup.find_all(id=\"main\"):\n...     print(tag.name)\n...\ndiv\n\
    ```\n\n### Observation:\n\n1. We are recursively searching for all those tags\
    \ that contain an attribute `id` with value `main`.\n2. The `div` tag is the only\
    \ one that contains such an attribute and is hence listed.\n\nThe `find_all()`\
    \ method is perhaps the single method we need to perform any search in the parse\
    \ tree. Despite this, there are other possibilities when it comes to searching.\
    \ Let us have a quick look at these before we conclude this section.\n\nAs a short-cut\
    \ for the `find_all()` method, we can directly use parentheses on the `BeautifulSoup`\
    \ document or `Tag` object, as shown below:\n\n```\n(continuation of previous\
    \ session)\n>>> soup.find_all(\"p\")\n[<p>This is <b>Bold</b></p>, <p>This is\
    \ <i>Italics</i></p>,\n<p>This is <u>Underlined</u></p>]\n>>> soup(\"p\")\n[<p>This\
    \ is <b>Bold</b></p>, <p>This is <i>Italics</i></p>,\n<p>This is <u>Underlined</u></p>]\n\
    ```\n\n### Observation:\n\n1. We see that the output is the same in both the above\
    \ examples.\n2. Some people find the parentheses syntax simpler as it is briefer;\
    \ others prefer the `find_all()` method for readability. The choice, of course,\
    \ is left to you since there is no difference in their behaviour or efficiency.\n\
    \nIf we are only interested in searching one tag that matches a particular requirement,\
    \ we can either use `limit=1` as shown in form #6, or can use the `find()` method\
    \ instead, which is identical to the `find_all()` method except for these differences:\n\
    \n1. The `find()` method returns a single tag that matched (and the tag would\
    \ be the first match found).\n2. Even when there is a single match, the `find_all()`\
    \ method returns a list containing that single tag whereas the `find()` method\
    \ never returns a list.\n\nThe syntax of the `find()` method is the same as the\
    \ `find_all()` method:\n\n```\nBeautifulSoup.find_all(name, attrs, recursive,\
    \ string, limit, **kwargs)\n```\n\nAs earlier, all the arguments are optional\
    \ and the method can also be directly invoked on a `Tag` object.\n\nThere are\
    \ variants of `find()` and `find_all()` that have exactly the same syntax but\
    \ work on different tags, summarised in the table below:\n\n| Search Range | Single\
    \ Item | All Items |\n|---|---|---|\n| All descendants | `find()` | `find_all()`\
    \ |\n| All ancestors | `find_parent()` | `find_parents()` |\n| All subsequent\
    \ siblings | `find_next_sibling()` | `find_next_siblings()` |\n| All previous\
    \ siblings | `find_previous_sibling()` | `find_previous_siblings()` |\n| All subsequent\
    \ nodes | `find_next()` | `find_all_next()` |\n| All previous nodes | `find_previous()`\
    \ | `find_all_previous()` |\n\n## 17.4 Accessing Web Content Over HTTP\n\nThe\
    \ previous sections all concentrated on HTML content that was either hard coded\
    \ in a Python script or was loaded from a local HTML file. This section will focus\
    \ on how to access and download HTML content over a HTTP connection to a remote\
    \ system.\n\n### 17.4.1 Downloading a HTML File Over a HTTP Connection\n\nThe\
    \ built-in `urllib` package helps in establishing HTTP connections to remote systems\
    \ and transferring content. The most basic method we need to employ is `urllib.request.urlopen()`,\
    \ which opens a connection to the given URL and returns a `HTTPResponse` object\
    \ using which we can later query the response as illustrated below:\n\n```\n>>>\
    \ import urllib.request\n>>> \n>>> response=urllib.request.urlopen(\"https://en.wikipedia.org/wiki/Python_(programming_language)\"\
    )\n>>> type(response)\n<class 'http.client.HTTPResponse'>\n```\n\n### Observation:\n\
    \n1. The `urllib` package comprises of multiple modules like `request`, `error`,\
    \ `parse` and `robotparser`. We are interested in the `request` module here.\n\
    2. We use the `urlopen()` function to establish a connection with the Wikipedia\
    \ page for Python!\n3. We obtain a `HTTPResponse` object in return that is stored\
    \ in the variable `response` in the example.\n\nThis was pretty simple but we\
    \ still haven't managed to extract any content from the web page. We can read\
    \ from the response object the same way as how we read from files (covered in\
    \ section 14.3).\n\n#### 17.4.1.1 Reading a Line at a Time\n\nA very simple way\
    \ of extracting the HTML content line by line is by iterating through the response\
    \ object as demonstrated below:\n\n```\n(continuation of previous session)\n>>>\
    \ for line in response:\n...     print(line.decode().strip())\n```\n\n### Observation:\n\
    \n1. The output of these statements is not shown here as it is large, does not\
    \ add value and can change with changes to the Wikipedia page! Nevertheless, when\
    \ you run these statements you will definitely see the HTML page content.\n2.\
    \ We are iterating through each line of the HTML page.\n3. Each line is obtained\
    \ as a `bytes` object. It is better to convert the same into a `str` object using\
    \ the `decode()` method. The default character set used for this conversion is\
    \ UTF-8.\n4. The `strip()` method removes any excess whitespaces at the beginning\
    \ and end of each line, giving rise to a cleaner output.\n5. If we attempt to\
    \ repeat this loop once again, we will not get the same output again as all data\
    \ from the `response` object would have already been read out by this loop.\n\n\
    #### 17.4.1.2 Reading Entire Content at Once\n\nThe entire HTML content can be\
    \ extracted at one go using the `read` method as shown below:\n\n```\n>>> import\
    \ urllib.request\n>>>\n>>> response=urllib.request.urlopen(\"https://en.wikipedia.org/wiki/Python_(programming_language)\"\
    )\n>>> data=response.read()\n>>> len(data)\n355637\n```\n\n### Observation:\n\n\
    1. The `read()` method returns the entire HTML data. The output of these statements\
    \ is not shown here as it is large, does not add value and can change with changes\
    \ to the Wikipedia page! Nevertheless, when you print the value of data, you will\
    \ definitely see the HTML page content.\n2. We observe that the length of the\
    \ data loaded is `355637` bytes."
