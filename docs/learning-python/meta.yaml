    The statement `x = y = 5` is an example of multiple assignment that does not involve
    tuples вАУ the value `5` gets stored in both `x` and `y`. But what if we wish to
    assign different values to `x` and `y`? Can this be done in a single statement?
    Yes! That''s what the statement `x, y = 2, 3` achieves! In case the syntax is
    not clear to you, maybe parentheses can help: `(x, y) = (2, 3)`. This is a tuple
    to tuple assignment wherein each value of the RHS tuple is assigned to the corresponding
    variable in the LHS tuple. Of course, the size of both the tuples must be the
    same!


    Have a look at the classic way of swapping the values of 2 variables in Python:


    ```

    >>> x, y = 2, 3

    >>> x

    2

    >>> y

    3

    >>> x, y = y, x

    >>> x

    3

    >>> y

    2

    ```


    # 5.8 Miscellaneous Operations on Tuples


    Just like lists, there are additional miscellaneous operations possible on tuples
    вАУ but only those operations that honour the fact that tuples are immutable! Thus,
    operations like sorting in place or reversing in place are not supported.


    # 5.8.1 Finding the Smallest Element in a Tuple


    The `min()` function returns the smallest element in the tuple:


    ```

    >>> T = (5, 2, 3)

    >>> min(T)

    2

    ```


    # 5.8.2 Finding the Largest Element in a Tuple


    The `max()` function returns the largest element in the tuple:


    ```

    >>> T = (5, 2, 3)

    >>> max(T)

    5

    ```'
