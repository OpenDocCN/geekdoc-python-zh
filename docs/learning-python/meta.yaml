    >>> D['mango']\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nKeyError: 'mango'\n```\n\nеПѓдї•дљњзФ®иµЛеАЉе∞ЖжЦ∞еАЉеИЖйЕНзїЩзО∞жЬЙйФЃпЉМе¶ВдЄЛжЙАз§ЇгАВж≠§е§ЦпЉМе¶ВжЮЬеЬ®иµЛеАЉжЧґеЉХзФ®зЪДйФЃдЄНе≠ШеЬ®пЉМеЃГе∞ЖиҐЂеИЫеїЇпЉЪ\n\
    \n```\n>>> D={'apple':'red','grapes':'green'}\n>>> D['grapes']='purple'\n>>> D\n\
    {'grapes': 'purple', 'apple': 'red'}\n>>> D['mango']='yellow'\n>>> D\n{'mango':\
    \ 'yellow', 'grapes': 'purple', 'apple': 'red'}\n```\n\n## 7.3 иЃ°жХ∞е≠ЧеЕЄеЕГзі†\n\n`len()`\
    \ еЗљжХ∞еПѓзФ®дЇОиЃ°зЃЧе≠ЧеЕЄдЄ≠йФЃеАЉеѓєзЪДжХ∞йЗПпЉЪ\n\n```\n>>> D={'apple':'red','grapes':'green'}\n>>> len(D)\n\
    2\n>>> D={'apple':'red'}\n>>> len(D)\n1\n>>> D={}\n>>> len(D)\n0\n```\n\n## 7.4\
    \ йБНеОЖе≠ЧеЕЄеЕГзі†\n\nзФ±дЇОе≠ЧеЕЄдЄ≠зЪДжѓПдЄ™еЕГзі†йГљжШѓдЄАдЄ™йФЃеАЉеѓєпЉМйБНеОЖе≠ЧеЕЄеПѓдї•жЬЙе§ЪзІНељҐеЉПпЉЪйБНеОЖе≠ЧеЕЄдЄ≠зЪДйФЃпЉМжИЦйБНеОЖеАЉпЉМжИЦйБНеОЖеЕГзі†пЉИйФЃеАЉеѓєпЉЙгАВжИСдїђе∞ЖзЬЛеИ∞жѓПзІНељҐеЉПзЪДз§ЇдЊЛгАВ\n\
    \n### 7.4.1 йБНеОЖе≠ЧеЕЄзЪДйФЃ\n\nжЩЃйАЪзЪД `for` еЊ™зОѓеПѓзФ®дЇОйБНеОЖе≠ЧеЕЄзЪДйФЃпЉЪ\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> for K in D: print(K)\n...\ngrapes\napple\n```\n\nеПѓдї•дљњзФ® `dict.keys()` еЗљжХ∞жШЊеЉПж£АзіҐе≠ЧеЕЄзЪДйФЃпЉМиѓ•еЗљжХ∞ињФеЫЮе≠ЧеЕЄ\
    \ `dict` дЄ≠йФЃзЪДжЦ∞иІЖеЫЊвАФвАФињЩжДПеС≥зЭАе¶ВжЮЬе≠ЧеЕЄ `dict` зЪДйФЃеПСзФЯеПШеМЦпЉМиІЖеЫЊдєЯе∞ЖиЗ™еК®жЫіжФєпЉЪ\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
