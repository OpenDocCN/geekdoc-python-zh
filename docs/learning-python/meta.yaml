    ```\n\nдЄЛи°®жАїзїУдЇЖжУНдљЬжШѓе¶ВдљХињЫи°МзЪДгАВиѓЈж≥®жДПпЉМжУНдљЬжШѓйАРеИЧињЫи°МзЪДпЉЪ\n\n| x | 1 | 1 | 0 | 0 |\n|---|---|---|---|---|\n\
