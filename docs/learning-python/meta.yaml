    ## 11.4.1 filter() зЪДзЙєжЃКжГЕеЖµ


    жИСдїђеЬ®дЄКдЄАиКВдЄ≠еЈ≤зїПзЬЛеИ∞дЇЖ filter() зЪДеЕЄеЮЛзФ®ж≥ХгАВзДґиАМпЉМжЬЙдЄ§зІНзЙєжЃКжГЕеЖµйЬАи¶БиАГиЩСгАВ


