  md: '# # SETS


    A set is an unordered collection of unique elements.


    +   - *Unordered* means that elements in a set do not have an index by which they
    can be addressed.

    - *Unique* means that duplicates are not tolerated (attempt to add an element
    into a set when the element already exists will be ignored).


    > **NOTE:**

    A set can contain only *hashable* elements вАУ those elements that have a hash code.
    Though hashing is outside the scope of this book, do note that all immutable collections
    (like tuples) are hashable in Python whereas mutable collections (like lists)
    are not. Thus, for example, a set can contain a tuple, but can''t contain a list!


    # ## 6.1 Creating Sets


    Just as how the `list()` function is used to create a list, the `set()` function
    is used to create a set:


    ```

    >>> S=set([1,2,3,4,5])

    >>> S

    {1, 2, 3, 4, 5}

    >>> S=set(range(1,6))

    >>> S

    {1, 2, 3, 4, 5}

    ```


    > **NOTE:**

    The `set` constructor receives a sequence (like `list` and `tuple`) and extracts
    their elements to create a set. Do not mistake the above example to mean construction
    of a set that contains a list! Remember from the previous note that sets cannot
    contain lists as they are mutable!


    Just as how `[]` is used to implicitly define lists, `{}` is used to implicitly
    define sets:


    ```

    >>> S={2,4,6,8}

    >>> S

    {8, 2, 4, 6}

    ```


    As can be seen from the example above, the order of the elements within a set
    is not under our control as sets are unordered collections. Sets support the mathematical
    set operations of finding the union, intersection and difference. We will explore
    these operations soon.'
