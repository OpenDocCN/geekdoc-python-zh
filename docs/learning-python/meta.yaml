    \ int() argument must be a string, a bytes-like object or a number, not 'NoneType'\n\
    >>> int(bool(None)) #bool() supports null references, and False=0!\n0\n```\n\n\
    `complex` з±їеЮЛзЪДеѓєи±°дЄНиГљзЫіжО•иљђжНҐдЄЇ `int`вАФвАФдљЖеЕґ `real` еТМ `imag` йГ®еИЖеПѓдї•пЉБ\n\nе¶ВжЮЬ `x` жШѓзФ®жИЈеЃЪдєЙз±їзЪДеЃЮдЊЛпЉМеИЩдЉЪи∞ГзФ®еЕґ\
    \ `__int__()` жЦєж≥ХжЭ•з°ЃеЃЪжХіжХ∞з≠ЙдїЈељҐеЉПпЉМе¶Взђђ 12.8.3.3 иКВжЙАињ∞гАВе¶ВжЮЬжЬ™еЃЮзО∞ж≠§жЦєж≥ХпЉМеИЩдЉЪеПСзФЯ `TypeError`пЉБ\n\n### 20.1.1.2\
    \ иљђжНҐдЄЇ float\n\nи¶Бе∞Жеѓєи±° x иљђжНҐдЄЇеЕґжµЃзВєжХ∞з≠ЙдїЈељҐеЉПпЉМиѓЈдљњзФ® `float(x)`гАВдї•дЄЛжШѓеЕґеЬ®еЯЇжЬђз±їеЮЛдЄКзЪДеЈ•дљЬжЦєеЉПпЉЪ\n\n```\n>>>\
    \ float(5) #Conversion of int to float\n5.0\n>>> float(\"56.5\") #Parsing a string\
    \ to extract a float\n56.5\n>>> float(False) #False = int(0) = float(0.0)\n0.0\n\
    >>> float(None) #Null references not supported!\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: float() argument must be\
    \ a string or a number, not 'NoneType'\n>>> float(bool(None)) #bool() permits\
    \ null references!\n0.0\n```\n\nе¶ВжЮЬ x жШѓзФ®жИЈеЃЪдєЙз±їзЪДеЃЮдЊЛпЉМеИЩдЉЪи∞ГзФ®еЕґ `__float__()` жЦєж≥ХжЭ•з°ЃеЃЪ `float`\
    \ з≠ЙдїЈељҐеЉПпЉМе¶Взђђ 12.8.3.3 иКВжЙАињ∞гАВе¶ВжЮЬжЬ™еЃЮзО∞ж≠§жЦєж≥ХпЉМеИЩдЉЪеПСзФЯ `TypeError`пЉБ\n\n### 20.1.1.3 иљђжНҐдЄЇ str\n\n\
    иљђжНҐдЄЇе≠Чзђ¶дЄ≤жШѓйЭЮеЄЄеЄЄиІБзЪДжУНдљЬпЉМеєґдЄФеЬ®дЄАдЇЫеЬ∞жЦєпЉИе¶В `print(x)`пЉЙдЉЪйЪРеЉПжЙІи°МгАВељУжИСдїђдљњзФ®иѓ≠еП• `str(x)` жШЊеЉПеЬ∞е∞Жеѓєи±° x иљђжНҐдЄЇе≠Чзђ¶дЄ≤жЧґпЉМдї•дЄЛз§ЇдЊЛе±Хз§ЇдЇЖиљђжНҐеЬ®еЯЇжЬђз±їеЮЛдЄКзЪДжГЕеЖµпЉЪ\n\
    \n```\n>>> str(True)\n'True'\n>>> str(12)\n'12'\n>>> str(12.5)\n'12.5'\n>>> str(2+3j)\n\
    '(2+3j)'\n>>> str(None)\n'None'\n```\n\nиѓЈж≥®жДПпЉМдЄКйЭҐдєЯжЉФз§ЇдЇЖ x дЄЇз©ЇеЉХзФ®зЪДжГЕеЖµгАВ\n\nе¶ВжЮЬ x жШѓеЇПеИЧгАБйЫЖеРИжИЦжШ†е∞ДпЉМдї•дЄЛз§ЇдЊЛе±Хз§ЇдЇЖиљђжНҐпЉЪ\n\
    \n```\n>>> str([2,3,4])\n'[2, 3, 4]'\n>>> str((2,3,4))\n'(2, 3, 4)'\n>>> str({1:2,3:4})\n\
    '{1: 2, 3: 4}'\n>>> str({1,2,3,4})\n'{1, 2, 3, 4}'\n```\n\nе¶ВжЮЬ x жШѓзФ®жИЈеЃЪдєЙз±їзЪДеЃЮдЊЛпЉМеИЩдЉЪи∞ГзФ®еЕґй≠ФжЬѓеЗљжХ∞\
    \ `__str__()` жЭ•жПРеПЦеѓєи±°зЪДе≠Чзђ¶дЄ≤и°®з§ЇељҐеЉПпЉМе¶Взђђ 12.8.2.2 иКВиѓ¶ињ∞гАВ\nе¶ВжЮЬиѓ•з±їжЬ™еЃЮзО∞ `__str__()` жЦєж≥ХпЉМеИЩдЉЪжµЛиѓХиґЕз±їзЪД `__str__()`\
    \ жЦєж≥ХжШѓеР¶е≠ШеЬ®пЉМзЫіеИ∞жЬАзїИеИ∞иЊЊ `object` з±їпЉИе¶ВжЮЬйЬАи¶БпЉЙгАВ`object` з±їжПРдЊЫдЇЖ `__str__()` зЪДйїШиЃ§еЃЮзО∞пЉМе¶ВдЄЛжЙАз§ЇпЉЪ\n\n```\n\
    >>> class A: pass\n...\n>>> str(A())\n'<__main__.A object at 0x7f8e6bcaf240>'\n\
    ```\n\n### 20.1.1.4 иљђжНҐдЄЇ bool\n\nељУжИСдїђжШЊеЉПе∞ЭиѓХе∞Жеѓєи±°иљђжНҐдЄЇ `bool` з±їеЮЛпЉИе¶ВеЬ®и∞ГзФ® `bool(x)` дЄ≠пЉЙжИЦеЬ®еЄГе∞ФдЄКдЄЛжЦЗдЄ≠йЪРеЉПиљђжНҐпЉИе¶ВеЬ®\
    \ `if` иѓ≠еП•зЪДжЭ°дїґдЄ≠пЉЙжЧґпЉМдЉЪжґЙеПКиљђжНҐдЄЇ `bool` з±їеЮЛгАВе¶ВжЮЬеѓєи±°еЈ≤зїПжШѓ `bool` з±їзЪДеЃЮдЊЛпЉМеЕґеАЉиВѓеЃЪжШѓ `True` жИЦ `False`гАВжЬђиКВдЄУж≥®дЇОеЕґдїЦз±їеЮЛзЪДеѓєи±°еПКеЕґдљњзФ®з§ЇдЊЛ\
    \ `bool(x)` иљђжНҐдЄЇ `bool`пЉЪ\n\n1. е¶ВжЮЬ x жШѓз©ЇеЉХзФ®пЉИ`None`пЉЙпЉМеИЩж±ВеАЉдЄЇ `False`гАВ\n2. е¶ВжЮЬ x жШѓжХ∞е≠ЧпЉМеИЩеАЉ\
    \ `0`пЉИжХіжХ∞пЉЙгАБ`0.0`пЉИжµЃзВєжХ∞пЉЙеТМ `0j`пЉИе§НжХ∞пЉЙиҐЂиІЖдЄЇ `False`пЉМжЙАжЬЙеЕґдїЦеАЉиҐЂиІЖдЄЇ `True`гАВ\n3. е¶ВжЮЬ x жШѓе≠Чзђ¶дЄ≤пЉМз©Їе≠Чзђ¶дЄ≤пЉИ`''`пЉЙиҐЂиІЖдЄЇ\
    \ `False`пЉМдїїдљХеЕґдїЦе≠Чзђ¶дЄ≤иҐЂиІЖдЄЇ `True`гАВ\n4. е¶ВжЮЬ x жШѓеЇПеИЧжИЦжШ†е∞ДпЉМз©ЇеЇПеИЧ/жШ†е∞ДиҐЂиІЖдЄЇ `False`пЉМиАМйЭЮз©ЇеЇПеИЧ/жШ†е∞ДиҐЂиІЖдЄЇ `True`гАВеЫ†ж≠§пЉМз©ЇеИЧи°®пЉИ`[]`пЉЙгАБз©ЇеЕГзїДпЉИ`()`пЉЙеТМз©Їе≠ЧеЕЄпЉИ`{}`пЉЙж±ВеАЉдЄЇ\
    \ `False`гАВ\n5. е¶ВжЮЬ x жШѓдїїдљХеЕґдїЦз±їзЪДеѓєи±°пЉМе¶ВжЮЬиѓ•з±їеЃЮзО∞дЇЖй≠ФжЬѓеЗљжХ∞ `__bool__()`пЉМеИЩиѓ•жЦєж≥ХзЪДињФеЫЮеАЉзФ®дЇОз°ЃеЃЪеЄГе∞ФеАЉпЉИиѓ•еЗљжХ∞ењЕй°їињФеЫЮеЄГе∞ФеАЉпЉЙгАВ\n\
    6. е¶ВжЮЬдЄКињ∞з±їжЬ™еЃЮзО∞ `__bool__()` дљЖеЃЮзО∞дЇЖй≠ФжЬѓеЗљжХ∞ `__len__()`пЉМеИЩиѓ•жЦєж≥ХзЪДињФеЫЮеАЉзФ®дЇОз°ЃеЃЪеЄГе∞ФеАЉпЉИиѓ•еЗљжХ∞ењЕй°їињФеЫЮжХіжХ∞пЉМе¶ВжЮЬдЄЇ 0\
    \ еИЩж±ВеАЉдЄЇ `False`пЉМеР¶еИЩдЄЇ `True`пЉЙгАВ\n7. е¶ВжЮЬдї•дЄКжЙАжЬЙж£АжЯ•йГље§±иі•пЉМеИЩж±ВеАЉдЄЇ `True`пЉБ\n\n## 20.2 е§ДзРЖдљН\n\nиЩљзДґзђђ\
