    The &= operator plays the same role as `set.intersection_update(s)`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1 &= S2

    >>> S1

    {2}

    ```


    It is also possible to find the intersection of multiple sets and store them in
    a set by passing multiple arguments to `intersection_update()` or using the `&`
    operator multiple times after using the `&=` operator as follows:


    ```

    >>> S={1,2,3}

    >>> S.intersection_update({2,3,4},{1,3,5})

    >>> S

    {3}

    >>> S={1,2,3}

    >>> S &= {2,3,4} & {1,3,5}

    >>> S

    {3}

    ```


    # 6.7.3 Set Difference


    The `set.difference(s)` function returns a new set that represents the difference
    of the set `set` and the set `s`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1.difference(S2)

    {1}

    >>> S1

    {1, 2}

    ```


    The `-` operator plays the same role as `set.difference(s)`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1 - S2

    {1}

    >>> S1

    {1, 2}

    ```'
  - '[PAGE 153]


    # 6. Sets


    We can directly find the difference of set literals as follows:


    ```

    >>> {1,2}.difference({2,3})

    {1}

    >>> {1,2} - {2,3}

    {1}

    ```


    It is also possible to find the difference of multiple sets by passing multiple
    arguments to `difference()` or using the `-` operator multiple times as follows:


    ```

    >>> {1,2,3}.difference({2,4,6},{3,6,9})

    {1}

    >>> {1,2,3} - {2,4,6} - {3,6,9}

    {1}

    ```


    The `set.difference_update(s)` function also finds the difference, but stores
    it back into the original set `set`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1.difference_update(S2)

    >>> S1

    {1}

    ```


    The `-=` operator plays the same role as `set.difference_update(s)`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1 -= S2

    >>> S1

    {1}

    ```


    It is also possible to find the difference of a set and the union of multiple
    sets and store them in a set by passing multiple arguments to `difference_update()`
    or using the `|` operator multiple times after using the `-=` operator as follows:


    ```

    >>> S={1,2,3}

    >>> S.difference_update({2,4,6},{3,6,9})

    >>> S

    {1}

    >>> S={1,2,3}

    >>> S -= {2,4,6} | {3,6,9}

    >>> S

    {1}

    ```'
  - '[PAGE 154]


    # 6.7.4 Set Symmetric Difference


    The `set.symmetric_difference(s)` function returns a new set that represents the
    symmetric difference of the set `set` and the set `s`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1.symmetric_difference(S2)

    {1, 3}

    >>> S1

    {1, 2}

    ```


    The `^` operator plays the same role as `set.symmetric_difference(s)`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1 ^ S2

    {1, 3}

    >>> S1

    {1, 2}

    ```


    We can directly find the symmetric difference of set literals as follows:


    ```

    >>> {1,2}.symmetric_difference({2,3})

    {1, 3}

    >>> {1,2} ^ {2,3}

    {1, 3}

    ```


    The `set.symmetric_difference_update(s)` function also finds the symmetric difference,
    but stores it back into the original set `set`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1.symmetric_difference_update(S2)

    >>> S1

    {1, 3}

    ```


    The `^=` operator plays the same role as `set.symmetric_difference_update(s)`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1 ^= S2

    >>> S1

    {1, 3}

    ```'
