    \n# 13.2.2.3 Handling All Exceptions\n\nWhile section 13.2.2.1 showed how to handle\
    \ specific exceptions, section 13.2.2.2 showed how to handle multiple specific\
    \ exceptions. But both of these approaches require the programmer to explicitly\
    \ specify the exception(s) to be handled. What if we do not want to name them\
    \ and simply tell Python that this is how we wish to handle *all* exceptions,\
    \ even if we don't know the names of the exceptions? The following syntax demonstrates\
    \ this possibility:\n\n```\ntry:\n    ... # try block\nexcept ExceptionName1:\n\
    \    ... # Single exception handler\nexcept (ExceptionName2, ExceptionName3):\n\
    \    ... # Multiple exception handler\nexcept:\n    ... # Handles all exceptions\
    \ not handled above\n```\n\n**Observation:**\n\n+   1. As can be seen from the\
    \ syntax above, the last `except` block does not specify any particular exception\
    \ and is thus considered to mean any and all exceptions.\n2. Such a catch-all\
    \ handler should be the last `except` clause, if at all present. The reason is\
    \ that no `except` handlers below this can ever get executed since the `except`\
    \ blocks are tried sequentially and the catch-all handler can handle any exception.\n\
    3. In the above syntax, any exception raised in the `try` block that is not `ExceptionName1`,\
    \ `ExceptionName2` and `ExceptionName3` (or it's derived classes) will be handled\
    \ in the catch-all handler."
