    \ an instance method that is automatically invoked when an object is going to\
    \ be destroyed and eliminated and permits the programmer to perform any desired\
    \ clean-up.\n\nA destructor is identified in Python by its special name: `__del__`.\n\
    \nThe following code snippet demonstrates the working of destructors in Python:\n\
    \n```python\n>>> class A:\n...     def __del__(self):\n...             print(\"\
    Destructor called!\")\n...\n>>> a=A()\n>>> del a\nDestructor called!\n>>> b=A()\n\
    >>> del b\nDestructor called!\n```\n\n# Observation:\n\n- 1. The destructor is\
    \ an instance method does not receive any parameters apart from `self`.\n- 2.\
    \ Like constructors, one class can have only one destructor, and the absence of\
    \ a user-defined destructor results in a dummy destructor supplied by Python that\
    \ is empty.\n- 3. While in this example the destructor merely prints a message,\
    \ destructors can do many meaningful operations when an object is going to be\
    \ eliminated. If no such requirement exists, then a destructor need not be defined\
    \ in that class.\n- 4. The `del` built-in function is used to delete a variable,\
    \ and can also end up deleting objects in memory.\n\nDo recollect from section\
    \ 2.6 however that there is a difference between objects/instances and references\
    \ and that variables in Python only hold references! Deleting a variable using\
    \ `del` not only deletes that variable, but also decrements the reference count\
    \ of the referenced object by 1, and only when this reference count reaches 0\
    \ (implying that the object has no active references in the program), the object\
    \ is deleted. This is demonstrated below:\n\n```python\n>>> class A:\n...    \
    \ def __del__(self):\n...         print(\"Destructor called!\")\n...\n>>> a=A()\n\
    >>> b=a\n>>> del a\n>>> del b\nDestructor called!\n```\n\n**Observation:**\n\n\
    - 1. We create an object of class `A` and store its reference in the variable\
    \ `a`. The reference count of this object is 1 (only 1 variable вАУ `a` вАУ is referring\
    \ to the object)\n- 2. This reference is copied from `a` to `b`, ending up with\
    \ 2 references to the object. Therefore, the reference count of the object becomes\
    \ 2.\n- 3. When we delete the variable `a`, we also decrement the reference count\
    \ of the object referred to by `a` by 1. Therefore, the reference count of the\
    \ object decrements to 1. Since it has not reached 0, the object continues to\
    \ exist unaffected by the deletion of the variable `a`.\n- 4. When we delete the\
    \ variable `b`, we also decrement the reference count of the object referred to\
    \ by `b` by 1. The reference count now reaches 0. This is when the object will\
    \ be destroyed, and just prior to that the destructor gets automatically called.\n\
    \nSince our `Date` class does not really require a destructor, we will not attempt\
    \ to demonstrate the addition of the same.\n\n## 12.6 Inheritance\n\nInheritance\
    \ is one of the most important concepts in OOP and has these advantages:\n\n-\
    \ 1. It helps **compartmentalise** the code, thereby helping the programmer organise\
    \ the code better.\n- 2. It allows **reusability** of code by allowing a new class\
    \ to completely obtain the functionality of other existing classes and add more\
    \ functionality of its own.\n- 3. It permits **extensibility** of code, wherein\
    \ new code is added without having to modify existing code and classes.\n\nWhile\
    \ the different structural forms of inheritance have been covered in section 12.1.7,\
    \ we will basically examine 2 forms that make all other forms possible:\n\n- 1.\
    \ **Simple inheritance**, wherein one class inherits from another\n- 2. **Multiple\
    \ inheritance**, wherein one class inherits from multiple classes\n\nOne point\
    \ to be kept in mind as far as inheritance is concerned is that the derived class\
    \ contains *all* features of the base class. We can imagine that each instance\
    \ of the derived class also contains an instance of the base class. The *private*\
    \ features of the base class are also present in the derived class, but are not\
    \ directly accessible.\n\n### 12.6.1 Simple Inheritance\n\nIn simple inheritance,\
    \ one class inherits from another existing class. The class that inherits is called\
    \ the *derived* class or *subclass* while the class that is inherited from is\
    \ called the *base* class or *super* class. Inheritance is therefore also termed\
    \ *subclassing*.\nThe syntax of subclassing is shown below:\n\n```python\nclass\
    \ derived_class(base_class):\n    class_definition\n```\n\nHere is a small code\
    \ snippet to demonstrate simple inheritance with class B deriving from class A:\n\
    \n```python\n>>> class A:\n...     pass\n...\n>>> class B(A):\n...     pass\n\
    ...\n>>> a=A()\n>>> b=B()\n>>> type(a)\n<class '__main__.A'>\n>>> type(b)\n<class\
    \ '__main__.B'>\n```\n\n# Observation:\n\n- 1. The class definitions are empty,\
    \ but as Python requires at least 1 line in the definition, we have used the `pass`\
    \ statement.\n- 2. The class B derives from class A: `class B(A)`"
