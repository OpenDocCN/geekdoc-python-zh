    if the substring is not found, instead of simply returning -1. The `rindex()`
    function is preferred over the `rfind()` function in these cases:


    +   1. We expect to find the substring, the only question being where is it found.
    It would be an unexpected case to not find the substring in the string at all.

    2. We wish to use exception handling (covered in section 13) to process cases
    where the substring was not found in the string.


    Conversely, we would prefer the `rfind()` function over the `rindex()` function
    in these cases:


    +   1. We are unsure of the existence of the substring in the string.

    2. We want a simple mechanism to deal with cases where the substring does not
    exist in the string.


    Complete syntax:


    ```

    str.rindex(substring[,start[,end]])

    ```


    Forms:


    ```

    1. str.rindex(substring)

    2. str.rindex(substring,start)

    3. str.rindex(substring,start,end)

    ```


