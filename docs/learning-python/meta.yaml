  md: 'We can make out the following from the diagram:


    +   1. This is a **class hierarchy** where each class **derives** features from
    another.

    2. The root of this hierarchy is a class called **object**.

    3. The classes in bold are **concrete classes** that we can use whereas the rest
    are merely **abstract base classes** that contain functionality that can be derived
    by other classes, but can''t be directly used.

    4. **numbers** and **fractions** are names of **packages**. **__builtin__** is
    a pseudo-package whose contents are known to the interpreter without having to
    import any package.


    Here are some more observations on the class hierarchy:


    +   1. All objects in Python ultimately are instances of `__builtin__.object`.

    2. All numbers in Python are instances of `numbers.Number`.

    3. The `numbers.Complex` class is an abstract class representing complex numbers
    and derives from `numbers.Number`.

    4. If the programmer wants to specifically deal with complex numbers, the `complex`
    class is a concrete representation of `numbers.Complex`.

    5. If the programmer does not want to deal specifically with complex numbers,
    then the programmer wishes to deal with real numbers, represented using `numbers.Real`,
    which is a subclass of `numbers.Complex` since all real numbers are complex numbers
    with the imaginary part being 0.

    6. Real numbers can be rational or irrational. Rational numbers are those that
    are representable as $x/y$, where $x$ and $y$ are integers and $y$ is non-zero.
    Irrational numbers cannot be represented that way, but can be approximated that
    way. If the programmer does not want to bother about whether the real number is
    rational or irrational, the `float` class is provided as a subclass of `numbers.Real`
    to deal with any real number.

    7. If the programmer is interested specifically in rational numbers or integers,
    then the `numbers.Rational` subclass of `numbers.Real` is useful. If the programmer
    is not particularly interested in integers, then the `fractions.Fraction` subclass
    of `numbers.Rational` class permits access to the numerator and denominator.

    8. As a special case of rational numbers, if the denominator is 1, then mathematically
    we are dealing with integers! The `numbers.Integral` subclass of `numbers.Rational`
    describes those numbers that are rational with denominator 1 вАУ integers!

    9. While the most common implementation of `numbers.Integral` is the `int` class,
    `bool` is also considered to be an integral type whose values can only be 0 or
    1, but called `False` and `True` respectively!'
