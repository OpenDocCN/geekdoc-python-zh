- md: '## 9. Regular Expressions


    Since we assume that a string is a single line string, the "." character does
    not match the newline character. When a multi-line string is provided, the "."
    operator can match any character in that string except the newline character.
    To make the "." operator match even the newline character, this flag can be used.


    ```python

    >>> import re

    >>> re.search("e.T","One\nTwo")

    >>> re.search("e.T","One\nTwo", re.S)

    <_sre.SRE_Match object; span=(2, 5), match=''e\nT''>

    ```


    **Observation:**


    1. In the first example, the "." does not match the newline character between
    "e" and "T".

    2. In the second example, the same RE is able to match the same string as the
    "." can now match even the newline character.


    There are a few more flags that can be used, but the flags discussed here are
    the most commonly used ones. The table below summarises all the flags:


    | Flag | Meaning |

    | :--- | :--- |

    | re.A<br>re.ASCII | Ensure that the shorthand operators \w, \W, \d, \D, \s, \S,
    \b and \B apply only to ASCII characters in a Unicode string |

    | re.DEBUG | Display debug information |

    | re.I<br>re.IGNORECASE | Case-insensitive comparison |

    | re.L<br>re.LOCALE | Ensure that \w, \W, \s, \S, \b and \B work based on the
    current locale |

    | re.M<br>re.MULTILINE | Ensure that "^" and "$" operators work at line boundaries
    in a multi-line string |

    | re.S<br>re.DOTALL | Ensure that "." matches even newline characters |

    | re.X<br>re.VERBOSE | Support for extended or verbose regular expressions that
    permit 1-line comments within them using "#" as a comment indicator. |


    **Table 23: Regular Expression Flags**


    To conclude this section, let us see how to combine flags together:


    ```python

    >>> import re

    >>> re.search("E.T","One\nTwo")

    >>> re.search("E.T","One\nTwo",re.S+re.I)

    <_sre.SRE_Match object; span=(2, 5), match=''e\nT''>

    >>> re.search("E.T","One\nTwo",re.IGNORECASE|re.DOTALL)

    <_sre.SRE_Match object; span=(2, 5), match=''e\nT''>

    ```


    **Observation:**


    1. In the first example, there was no match as the "." does not match the newline
    character and the comparison is case-sensitive.

    2. In the second example, there is a match since the flags `re.S` and `re.I` take
    care of the 2 reasons why there wasn''t a match earlier. The 2 flags were combined
    using the + operator.

    3. The third example is identical to the second example, with us using the full
    name of the flag and combining them using the | operator.


    ## 9.5 Working With Groups


    A group within a RE can be created using parentheses (). These are the reasons
    why we would use groups within an RE:


    1. For **readability**. Grouping parts of a complex RE can make it easier for
    us to decipher which part of the RE is for matching what.

    2. For **group operations**. Section 10.2.2.5 introduced this in detail, that
    quantifier operators can operate on entire groups rather than single symbols.

    3. For **content extraction**. While matching regular expressions, as a secondary
    goal, we can also extract parts of the match. This is done using grouping. The
    contents of the string that matched each group can be extracted, in addition to
    extracting the entire match within a string. This section will show examples of
    what content can get matched, and section 10.6 will focus on the details on how
    to extract the match.

    4. For **back-referencing**. It is possible to use the content found within the
    groups to be used within the same RE operation вАУ for example, a substitution that
    uses values found within the same string. Again, this section will show examples
    of values of back-references, and section 10.6 will concentrate on the details.


    ### 9.5.1 Simple Group Content Extraction


    Consider the following RE for matching a UK-format date:


    ```

    \d\d-\d\d-\d{4}

    ```


    For now, this RE can be used to search within strings for substrings that match
    this pattern. But using the concept of groups, it is also possible for us to extract
    the date, the month and the year in addition to playing the above role. The RE
    needs to be rewritten as follows to support group content extraction:


    ```

    (\d\d)-(\d\d)-(\d{4})

    ```


    The parentheses used here define 3 groups. When a match is obtained,


    1. the content of the first group will give us the date found,

    2. the content of the second group will give us the month found, and

    3. the content of the third group will give us the year found.


    Consider a sample string вАЬ25-12-2016вАЭ. The content of the first group will be
    25, the content of the second group will be 12 and the content of the third group
    will be 2016.


    Section 10.6 introduces the actual functions to extract the group content.


    ### 9.5.2 Back-Reference Contents


    Building on the same example and same sample string of the previous section, each
    group content can also be identified using back-references, whose syntax within
    a string is as follows:


    ```

    \n

    ```


    in the above syntax, n is the group number. Thus, \1 refers to the content matched
    in the first group, \2 refers to the content matched in the second group, and
    so on.


    Given our sample string, \1 will represent 25, \2 will represent 12 and \3 will
    represent 2016.


    ### 9.5.3 Nested Groups


    Groups can also be nested, and while that might look complicated and messy, there
    are rules that help restore sanity! Consider the following RE:


    ```

    (((\d) (\d)) - ((\d) (\d)) - (\d{4}))

    ```


    The above RE will allow us to extract all the following:


    1. The entire date that matched

    2. The date, the month and the year

    3. The individual digits of the date

    4. The individual digits of the month


    The only thing we need here is a rule for numbering, and that rule is as follows:
    the number of the group is assigned based on the number of its open parentheses
    within the RE. Thus, the numbering is as follows:


    ```

    (((\d) (\d)) - ((\d) (\d)) - (\d{4}))

    ^^^ ^ ^^ ^ ^

    123 4 56 7 8

    ```


    For the sample string вАЬ25-12-2016вАЭ, the content of each back-reference (and hence,
    group) will be as follows:


    | Back-reference | Content |

    |---|---|

    | \1 | 25-12-2016 |

    | \2 | 25 |

    | \3 | 2 |

    | \4 | 5 |

    | \5 | 12 |

    | \6 | 1 |

    | \7 | 2 |

    | \8 | 2016 |


    ## 9.6 Working with Matches


    Functions like `search()`, `match()` and `fullmatch()` (covered in section 10.4)
    all check whether a given string matches a given RE and returns a `match` object
    if a match was found. This `match` object is implicitly convertible to Boolean
    `True`, making it convenient for using these functions in conditions, but this
    section focuses on other powerful capabilities of the `match` object.


    The `match` object keeps track of the following:


    1. The given string which was searched

    2. The RE that was used to search within the string

    3. The content of all the individual groups that got matched

    4. Locations within the string of all the individual groups that got matched


    ### 9.6.1 Extracting the Original String and RE


    Once a `match` object has been obtained, we can use it to extract the original
    string that was searched (`match.string`) and the RE that was used to search (`match.re`).


    **Syntax:**


    ```

    match.string

    match.re

    ```


    **Example:**


    ```python

    >>> import re

    >>> m=re.fullmatch(r"(\d\d?)/(\d\d?)/(\d\d){1,2}", "25/12/2016")

    >>> m.string

    ''25/12/2016''

    >>> m.re

    re.compile(''(\d\d?)/(\d\d?)/(\d\d){1,2}'')

    ```


    **Observation:**


    1. This example uses a RE to match a UK-format date. This time, we are storing
    the return value from `fullmatch` (which will be a `match` object) in a variable
    m.

    2. `m.string` gives us the original string: ''25/12/2016''

    3. `m.re` gives us the original RE: `re.compile(''(\d\d?)/(\d\d?)/(\d\d){1,2}'')`


    Of course, there is no significant advantage of extracting the string and RE from
    a match object, but this is just a start. We would be more interested in extracting
    the contents of the groups that were found, and this is discussed in the next
    section.


    ### 9.6.2 Extracting the Group Contents


    All the groups can be extracted as a tuple using the `match.groups()` method,
    which has this syntax:


    ```

    match.groups(default=None)

    ```


    The `match.groups()` method returns the contents of all the groups in the form
    of a tuple. If any group did not participate, its content will be the `default`
    value provided (None by default).


    **Example:**


    ```python

    >>> import re

    >>> m=re.fullmatch(r"(\d\d?)/(\d\d?)/(\d\d){1,2}", "25/12/2016")

    >>> m.groups()

    (''25'', ''12'', ''16'')

    ```


    **Observation:**


    1. Each parenthesized group content is an item within the tuple.

    2. The order of the items within the tuple matches the order of the groups in
    the RE.


    The below example demonstrates possibilities when we have an empty group:


    ```python

    >>> import re

    >>> m=re.fullmatch(r"(\d\d)/(\d\d)?/(\d\d\d\d)", "25//2016")

    >>> m.groups()

    (''25'', None, ''2016'')

    >>> m.groups("-")

    (''25'', ''-'', ''2016'')

    ```


    **Observation:**


    1. In this RE, the second group is made optional and the string does not provide
    any value for the same.

    2. When `m.groups()` is used, the content for the second group is considered to
    be None.

    3. When `m.groups("-")` is used, the content "-" is understood to be the default
    value.'
