    2. List Employees\")\n6.     print(\"3. Search Employee\")\n7.     print(\"4.\
    \ Delete Employee\")\n8.     print(\"5. Quit\")\n9.     return int(input(\"Enter\
    \ choice:\"))\n```\n\n1. The `menu()` function prints a menu and waits the user\
    \ for making a choice in lines 2-8.\n\n2. The choice is converted to an integer\
    \ and returned in line 9.\n\n```\n1. def do_add_employee(file):\n2.     name =\
    \ input(\"Enter employee name:\")\n3.     id = int(input(\"Enter employee ID:\"\
