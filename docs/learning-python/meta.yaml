    # 12.5.2 Destructors


    A destructor in Python is an instance method that is automatically invoked when
    an object is going to be destroyed and eliminated and permits the programmer to
    perform any desired clean-up.


    A destructor is identified in Python by it''s special name: `__del__`.


    The following code snippet demonstrates the working of destructors in Python:


    ```

    >>> class A:

    ...     def __del__(self):

    ...             print("Destructor called!")

    ...

    >>> a=A()

    >>> del a

    Destructor called!

    >>> b=A()

    >>> del b

    Destructor called!

    ```


    # Observation:


    +   1. The destructor is an instance method does not receive any parameters apart
    from `self`.

    2. Like constructors, one class can have only one destructor, and the absence
    of a user-defined destructor results in a dummy destructor supplied by Python
    that is empty.

    3. While in this example the destructor merely prints a message, destructors can
    do many meaningful operations when an object is going to be eliminated. If no
    such requirement exists, then a destructor need not be defined in that class.

    4. The `del` built-in function is used to delete a variable, and can also end
    up deleting objects in memory.


    Do recollect from section 2.6 however that there is a difference between objects/instances
    and references and that variables in Python only hold references! Deleting a variable
    using `del` not only deletes that variable, but also decrements the reference
    count of the referenced object by 1, and only when this reference count reaches
    0 (implying that the object has no active references in the program), the object
    is deleted. This is demonstrated below:'
  - '[PAGE 384]


    ```

    >>> class A:

    ...     def __del__(self):

    ...         print("Destructor called!")

    ...

    >>> a=A()

    >>> b=a

    >>> del a

    >>> del b

    Destructor called!

    ```


    **Observation:**


    +   1. We create an object of class `A` and store it''s reference in the variable
    `a`. The reference count of this object is 1 (only 1 variable вАУ `a` вАУ is referring
    to the object)

    2. This reference is copied from `a` to `b`, ending up with 2 references to the
    object. Therefore, the reference count of the object becomes 2.

    3. When we delete the variable `a`, we also decrement the reference count of the
    object referred to by `a` by 1. Therefore, the reference count of the object decrements
    to 1. Since it has not reached 0, the object continues to exist unaffected by
    the deletion of the variable `a`.

    4. When we delete the variable `b`, we also decrement the reference count of the
    object referred to by `b` by 1. The reference count now reaches 0. This is when
    the object will be destroyed, and just prior to that the destructor gets automatically
    called.


    Since our `Date` class does not really require a destructor, we will not attempt
    to demonstrate the addition of the same.


    # 12.6 Inheritance


    Inheritance is one of the most important concepts in OOP and has these advantages:


    +   1. It helps **compartmentalise** the code, thereby helping the programmer
    organise the code better.

    2. It allows **reusability** of code by allowing a new class to completely obtain
    the functionality of other existing classes and add more functionality of it''s
    own.

    3. It permits **extensibility** of code, wherein new code is added without having
    to modify existing code and classes.'
  - "[PAGE 385]\n\nWhile the different structural forms of inheritance have been covered\
    \ in section 12.1.7, we will basically examine 2 forms that make all other forms\
    \ possible:\n\n+   1. **Simple inheritance**, wherein one class inherits from\
    \ another\n2. **Multiple inheritance**, wherein one class inherits from multiple\
    \ classes\n\nOne point to be kept in mind as far as inheritance is concerned is\
    \ that the derived class contains *all* features of the base class. We can imagine\
    \ that each instance of the derived class also contains an instance of the base\
    \ class. The *private* features of the base class are also present in the derived\
    \ class, but are not directly accessible.\n\n# 12.6.1 Simple Inheritance\n\nIn\
    \ simple inheritance, one class inherits from another existing class. The class\
    \ that inherits is called the *derived* class or *subclass* while the class that\
    \ is inherited from is called the *base* class or *super* class. Inheritance is\
    \ therefore also termed *subclassing*.\nThe syntax of subclassing is shown below:\n\
    \n```\nclass derived_class(base_class):\n    class_definition\n```\n\nHere is\
    \ a small code snippet to demonstrate simple inheritance with class B deriving\
    \ from class A:\n\n```\n>>> class A:\n...     pass\n...\n>>> class B(A):\n...\
    \     pass\n...\n>>> a=A()\n>>> b=B()\n>>> type(a)\n<class '__main__.A'>\n>>>\
    \ type(b)\n<class '__main__.B'>\n```\n\n# Observation:\n\n+   1. The class definitions\
    \ are empty, but as Python requires at least 1 line in the definition, we have\
    \ used the `pass` statement.\n2. The class B derives from class A: `class B(A)`"
- md: "## 12.6.2 Private, Public and Protected Revisited\n\nSection 12.4.6 had introduced\
    \ the convention for *public*, *private* and *protected* access in a class. We\
    \ had not seen protected access in action as inheritance was not covered then.\
    \ Now that we have an idea of inheritance, let us revisit these and see them in\
    \ action in an example:\n\n```python\n# inheritance1.py\n\n#!/usr/bin/python\n\
    \n# Inheritance Demo:\n# Public, Private and Protected Method access\n\nclass\
    \ A:\n    def __f1(self): print(\"A.f1\")\n    def f2(self): print(\"A.f2\")\n\
    \    def _f3(self): print(\"A.f3\")\n\nclass B(A):\n    def __g1(self): print(\"\
    B.g1\")\n    def g2(self): print(\"B.g2\")\n    def _g3(self): print(\"B.g3\"\
    )\n\nb = B()\n```\n\n### Observation:\n\n1.  The above program does not produce\
    \ any output. It has been given only for us to analyse the program and draw conclusions.\
    \ Therefore, there is no point in running this program.\n2.  Class A is the *base*\
    \ class and class B is the *derived* class. Class A contains 3 methods - `__f1`,\
    \ `f2` and `_f3` вАУ which are *private*, *public* and *protected* respectively.\
    \ Class B also contains 3 methods - `__g1`, `g2` and `_g3` вАУ which are *private*,\
    \ *public* and *protected* respectively.\n3.  Recollect that *public* members\
    \ are accessible both inside as well as outside the class, *private* members are\
    \ accessible only inside the class and *protected* members are accessible only\
    \ inside the class and inside its subclasses. Also recollect that the interpreter\
    \ may not prohibit direct access of protected members from outside the class.\n\
    4.  Line 16 creates an instance of the derived class B called b. We will now analyse\
    \ which methods can be invoked using this instance b.\n5.  `b.g2()` is the most\
    \ obvious valid candidate вАУ any public method of a class is accessible from even\
    \ outside the class.\n6.  `b.f2()` is the next obvious valid candidate вАУ public\
    \ methods of the base class are inherited as public methods of the derived class\
    \ and public methods of the derived class are accessible even outside the class.\n\
    7.  `b.__g1()` is an invalid candidate вАУ private methods of a class are not accessible\
    \ outside the class. We of course can invoke `b.f2()` which in turn can call `self.__f1()`.\n\
    8.  `b._g3()` is supposed to be an invalid candidate вАУ protected members of a\
    \ class are not accessible outside the class, but the interpreter may not specifically\
    \ prohibit its access. We will only attempt to call `_g3()` through some other\
    \ route (like through `g2()` for instance).\n9.  `b.__f1()` is an invalid candidate\
    \ вАУ private members of a class are accessible only within that class and are inaccessible\
    \ even in its subclasses. We can follow other routes though, like calling `__f1()`\
    \ from `f2()` or from `g2()`.\n10. `b._f3()` is supposed to be an invalid candidate\
    \ вАУ protected members of a class are accessible within subclasses, but not outside\
    \ of these subclasses. B being a subclass of A does have access to `_f3()`, but\
    \ we are not supposed to access them from outside B.\n\n## 12.6.3 Function Overriding\n\
    \nThe previous section illustrated which functions are accessible within derived\
    \ classes and which are accessible even outside derived classes in inheritance.\
    \ A special case arises however when we have functions with the same name in both\
    \ the base as well as derived classes вАУ this is called **function overriding**,\
    \ wherein a derived class function is offered as a replacement for a base class\
    \ function. This section concentrates on this concept.\n\nWhen there are methods\
    \ with the same name in a base class as well as its derived class and we have\
    \ a reference to an instance of the derived class, using which we invoke the function,\
    \ the derived class function gets called. This is illustrated below:\n\n```python\n\
    # Inheritance2.py\n\n#!/usr/bin/python\n\n# Inheritance Demo:\n# Function Overriding\n\
    \nclass A:\n    def f(self):\n        print(\"A.f\")\n\nclass B(A):\n    def f(self):\n\
    \        print(\"B.f\")\n\nb = B()\nb.f()\n```\n\n### Output:\n\n```\nB.f\n```\n\
    \nWhat if we want B's f to also invoke A's f as part of its functionality? We\
    \ can use the class function syntax to invoke the method (as illustrated in section\
    \ 12.4.5), passing self as the reference to the instance. Alternatively, we can\
    \ use the super() built-in to access the super class object of the current object\
    \ (identified by self):\n\n```python\n# Inheritance3.py\n\n#!/usr/bin/python\n\
    \n# Inheritance Demo:\n# Function Overriding\n\nclass A:\n    def f(self):\n \
    \       print(\"A.f\")\n\nclass B(A):\n    def f(self):\n        print(\"B.f\"\
    )\n        super().f()\n\nb = B()\nb.f()\n```\n\n### Output:\n\n```\nB.f\nA.f\n\
    ```\n\n### Observation:\n\n1.  The statement `A.f(self)` is very similar to the\
    \ statement `self.f()`, with `self` referring to an instance of `A`. But in our\
    \ case, `self` is referring to an instance of `B` and `self.f()` will result in\
    \ a call to `B.f(self)` instead!\n2.  The statement `super().f()` is equivalent\
    \ to the statement `self.f()` with `self` referring to an instance of `A` that\
    \ is housed within an instance of `B` that is currently referred to by `self`!\n\
    \nWhat if we want to directly invoke A's f without involving B's f using an instance\
    \ of B? Again, we can use the class function syntax as shown below:\n\n```python\n\
    # Inheritance4.py\n\n#!/usr/bin/python\n\n# Inheritance Demo:\n# Function Overriding\n\
    \nclass A:\n    def f(self):\n        print(\"A.f\")\n\nclass B(A):\n    def f(self):\n\
    \        print(\"B.f\")\n        super.f()\n\nb = B()\nA.f(b)\n```\n\n### Output:\n\
    \n```\nA.f\n```\n\n### Observation:\n\n1.  This time, we do not use `b.f()`, which\
    \ will always give preference to B's `f`. We directly invoke `A.f` passing `b`\
    \ as the argument.\n\n## 12.6.4 Constructors and Destructors in Simple Inheritance\n\
    \nOne of the important results of inheritance is that the derived class is dependent\
    \ on the base class. While the base class can exist on its own, the derived class\
    \ is dependent on the base class for its existence. Derived class instances are\
    \ dependent on corresponding base class instances. Indeed we can say that every\
    \ derived class instance contains a base instance within itself, without which\
    \ it cannot exist.\n\nBuilding on this, we can also say then that when a derived\
    \ class is instantiated, the base class should get instantiated first and when\
    \ a derived class instance is destroyed, it should be followed by the destruction\
    \ of the base class instance too. In other words, the order of construction/creation\
    \ should be from base class to derived class whereas the order of destruction\
    \ should be from derived class to base class. This order honours our agreement\
    \ that the base class/instance can survive without the derived class/instance\
    \ but not vice-versa.\n\nUnlike other programming languages like C++ where this\
    \ is automatically enforced by the compiler, Python does not enforce it! It therefore\
    \ becomes the responsibility of the programmer to ensure that this indeed takes\
    \ place by explicitly calling suitable base class functions.\n\nLet's begin with\
    \ a simple code snippet to observe Python's default behaviour when it comes to\
    \ constructors and destructors under inheritance:\n\n```python\n# Inheritance5.py\n\
    \n#!/usr/bin/python\n\n# Inheritance Demo:\n# Constructors and Destructors\n\n\
    class A:\n    def __init__(self):\n        print(\"A constructed\")\n    def __del__(self):\n\
    \        print(\"A destroyed\")\n\nclass B(A):\n    def __init__(self):\n    \
    \    print(\"B constructed\")\n    def __del__(self):\n        print(\"B destroyed\"\
    )\n\nb = B()\ndel(b)\n```\n\n### Output:\n\n```\nB constructed\nB destroyed\n\
    ```\n\n### Observation:\n\n1.  We observe that when we instantiate class B, class\
    \ B's constructor is invoked, but class A's constructor is not automatically invoked.\n\
    2.  Similarly, when we destroy the instance of class B, the destructor of class\
    \ B is invoked, but the destructor of class A is not automatically invoked.\n\n\
    Ideally, we would want the constructors of both classes to be invoked during construction\
    \ and the destructors to be similarly automatically invoked upon destruction.\
    \ Since this is not automatically performed by Python, we need to change the snippet\
    \ as follows to obtain the desired result:\n\n```python\n# Inheritance6.py\n\n\
    #!/usr/bin/python\n\n# Inheritance Demo:\n# Constructors and Destructors\n\nclass\
    \ A:\n    def __init__(self):\n        print(\"A constructed\")\n    def __del__(self):\n\
    \        print(\"A destroyed\")\n\nclass B(A):\n    def __init__(self):\n    \
    \    super().__init__()\n        print(\"B constructed\")\n    def __del__(self):\n\
    \        print(\"B destroyed\")\n        super().__del__()\n\nb = B()\ndel(b)\n\
    ```"
