- md: "## 13. Exception Handling\n\nexcept clauses can handle the specified exceptions\
    \ as well as their derived classes. We will therefore handle OverflowException,\
    \ NegativeInputException and ValueError all in the same manner in an except clause\
    \ that handles ValueError. Furthermore, since we are no longer interested in the\
    \ value that caused the exception to occur, we will modify ExceptionHandlingDemo13.py\
    \ instead of ExceptionHandlingDemo14.py:\n\n### ExceptionHandlingDemo15.py\n\n\
    ```python\n#!/usr/bin/python\n\n# Exception Handling Demo\n# User-defined exceptions\
    \ - deriving indirectly from Exception\n\nclass OverflowException(ValueError):\n\
    \    pass\n\nclass NegativeInputException(ValueError):\n    pass\n\ndef check(n):\n\
    \    if n>100: raise OverflowException()\n    if n<0: raise NegativeInputException()\n\
    \ntry:\n    n = int(input(\"Enter an integer:\"))\n    check(n)\n    quotient\
    \ = int(100/n)\n    print(\"100/{} = {}\".format(n,quotient))\nexcept ValueError:\n\
    \    print(\"Please enter an integer between 0 and 100!\")\nexcept ZeroDivisionError:\n\
    \    print(\"Sorry! Division by zero is not permitted!\")\n```\n\n### Output:\n\
    \n```\nEnter an integer:5\n100/5 = 20\n```\n\n```\nEnter an integer:0\nSorry!\
    \ Division by zero is not permitted!\n```\n\n```\nEnter an integer:hi\nPlease\
    \ enter an integer between 0 and 100!\n```\n\n```\nEnter an integer:200\nPlease\
    \ enter an integer between 0 and 100!\n```\n\n```\nEnter an integer:-5\nPlease\
    \ enter an integer between 0 and 100!\n```\n\n**Observation:**\n\n1. Our classes\
    \ `OverflowException` (line 6) and `NegativeInputException` (line 9) now derive\
    \ from `ValueError` instead of `Exception`.\n2. This allows us to handle them\
    \ both as well as `ValueError` in line 21.\n3. If we want to handle these exceptions\
    \ separately, we can do so using the same approach as the one we used in `ExceptionHandlingDemo13.py`.\
    \ Care should be taken that the order in which we handle exceptions are from derived\
    \ class to base class. Thus, `ValueError` should not be handled before `OverflowException`,\
    \ for instance.\n\n## 13.7 Questions\n\n1. List the advantages of exception handling.\n\
    2. Write the complete syntax for exception handling block in Python and explain\
    \ the same.\n3. Write a short note on raising and re-raising exceptions in Python.\n\
    4. Write a short note on exception propagation.\n5. Write a short note on user\
    \ defined exceptions in Python?\n\n## 13.8 Exercises\n\n1. Write a Python script\
    \ to demonstrate `ValueError` exception.\n2. Write a Python script to demonstrate\
    \ user defined exceptions.\n3. Write a Python script to demonstrate exception\
    \ propagation.\n\n## SUMMARY\n\n- Exceptions can be monitored using the try block.\n\
    - Exceptions can be caught and processed using the catch block.\n- The catch block\
    \ can also catch multiple exception types identified by a tuple of exception class\
    \ names.\n- An except block capable of handling a particular exception type is\
    \ also capable of handling all the sub-classes of that exception type.\n- It is\
    \ also possible to gain a reference to the actual exception instance in the except\
    \ block.\n- An except block that does not specify the exception type it can handle\
    \ will end up handling all exceptions. Such an except block cannot be followed\
    \ by any other except blocks.\n- The else clause allows unmonitored code to exist\
    \ along with monitored code!\n- The finally clause provides an opportunity to\
    \ clean-up irrespective of whether an exception occurs or not.\n- Exceptions can\
    \ be raised on demand using the raise statement.\n- Exceptions that are not handled\
    \ at the level where they are raised propagate to outer levels, returning from\
    \ functions if required, till they are handled somewhere or are reported as unhandled\
    \ exceptions.\n- Unhandled exceptions result in program termination!\n- An exception\
    \ that is caught by an except statement can be re-raised for additional processing\
    \ using the raise statement.\n- User-defined exceptions can be created by creating\
    \ custom classes that extend directly or indirectly from the Exception class.\
    \ Instances of such classes can then be raised as required.\n\n# 14 File Handling\n\
    \nIn this chapter you will be able to:\n\n- [x] Differentiate between text and\
    \ binary files.\n- [x] Open files in the desired mode of operation and close them\
    \ when done processing.\n- [x] Read from and Write to text files.\n- [x] Read\
    \ from and Write to binary files.\n- [x] Seek within files and determine the current\
    \ position within the file.\n\n## FILE HANDLING\n\n### 14.1 Introduction to File\
    \ Handling\n\n#### 14.1.1 Need for File Handling\n\nA **file** is a logical collection\
    \ of data stored as a single unit inside a filesystem on a storage device. While\
    \ the contents of a file are sequentially accessed, they can be randomly accessed\
    \ as well. Perhaps one of the most important aspects of files are that they are\
    \ persistent вАУ available to programs and users even after long periods of time.\n\
    \nFiles can be either:\n\n1. accessed directly by users,\n2. or can be opened,\
    \ viewed and edited using specific applications that understand that file format,\n\
    3. or can be used internally by an application (perhaps to store configuration\
    \ data).\n\n#### 14.1.2 Logical Steps in File Handling\n\nIf a program has to\
    \ access (read from or write to) a file, these are the logical steps that it should\
    \ follow:\n\n1. **Open the file.** Opening the file creates suitable data structures\
    \ in memory that allow you to communicate with the file. During this process,\
    \ it is necessary to identify which file you wish to open and for what reason\
    \ (in which mode do you wish to open the file). On success (after due validation\
    \ like file existence and permissions), a buffer is made available in memory through\
    \ which you may communicate with the file contents. The reason for the buffer\
    \ to be used is to improve speed by acting as an intermediary between the file\
    \ and the program.\n2. **Access the file.** Once the file has been successfully\
    \ opened, you may then access the contents of the file. If the file has been opened\
    \ in a mode that supports reading, you may read from the file. If the file has\
    \ been opened in a mode that supports writing, you may write to the file.\n3.\
    \ **Close the file.** When you are done dealing with the file, you can close the\
    \ connection with the file. This will flush out the buffers (thereby writing any\
    \ data in the buffer that has not yet been written to the file if the file was\
    \ opened for writing), close the file handle and release the memory occupied by\
    \ the data structure used to handle the file. When the process terminates, all\
    \ opened files are automatically closed. It is a good programming practice to\
    \ close a file the moment it is no longer needed to be accessed by the program.\
    \ Once a file is closed, no other file operations can be performed on it. Of course,\
    \ you can open the file again to access its contents.\n\n#### 14.1.3 Text Files\
    \ vs. Binary Files\n\nAt this point, even before we enter Python's support for\
    \ files, it is better that you are aware of the 2 types of files вАУ text and binary\
    \ вАУ and the differences between them.\n\nA **text file** is a human readable file,\
    \ comprising of strings using a known, fixed character set. No specific applications\
    \ are needed to access the file contents (except perhaps a text editor).\n\nA\
    \ **binary file** on the other hand is a file that uses an encoding that is not\
    \ human readable. A simple text editor will not be able to help you decipher its\
    \ contents. Therefore, specific applications that understand the file format are\
    \ required to present the file contents to you for viewing or editing.\n\nExamples\
    \ of file formats that are textual in nature are:\n\n| Extension | Format |\n\
    | :--- | :--- |\n| .txt | Text file |\n| .html, .htm | HTML file |\n| .py | Python\
    \ script |\n| .xml | XML file |\n| .sql | SQL file |\n\nExamples of file formats\
    \ that are binary in nature are:\n\n| Extension | Format |\n| :--- | :--- |\n\
    | .doc, .docx, .odt | Document |\n| .xls, .xlsx, .ods | Spreadsheet |\n| .mp3\
    \ | MP3 Audio |\n| .mpg, .mpeg | MPEG Video |\n| .jpg, .jpeg | JPEG Image |"
