    3. How to extract the individual lines from a multi-line string using `splitlines()`


    # 8.3.1 Splitting Strings Using partition() and rpartition()


    The `partition()` and `rpartition()` functions allow extraction of the part before
    a separator, the separator itself and the part after a separator in a string.
    The difference is that `partition()` searches for the first (leftmost) occurrence
    of the separator while `rpartition()` searches for the last (rightmost) occurrence
    of the separator in the string.


    # 8.3.1.1 The partition() Function


    Syntax:


    ```

    str.partition(separator)

    ```


    The `partition()` function searches for the first (leftmost) occurrence of a separator
    within a string and returns a tuple containing 3 parts: the part before the separator,
    the separator itself and the part after the separator. In case the separator was
    not found in the string, it will still return a tuple containing 3 parts: the
    entire string followed by 2 null strings.


    ```

    >>> "India:New Delhi".partition(":")

    (''India'', '':'', ''New Delhi'')

    ```


    In the above example, the string is partitioned at ":", giving rise to "India"
    as the part before the ":", the ":" separator itself and "New Delhi" as the part
    after the ":".


    ```

    >>> "India:New Delhi China:Beijing".partition(":")

    (''India'', '':'', ''New Delhi China:Beijing'')

    ```


    In the above example, the string is partitioned at the first ":" with "New Delhi
    China:Beijing" being the part after the first ":".'
