    # 8.2.1 Checking For the Existence of a Substring in a String Using startswith()
    and endswith()


    # 8.2.1.1 The startswith() Function


    To check if a string starts with a particular substring or not, we can use the
    `startswith()` function:


    ```

    str.startswith(substring[,start=0[,end=len(str)]])

    ```


    Forms:


    ```

    1. str.startswith(substring)

    2. str.startswith(substring,start)

    3. str.startswith(substring,start,end)

    ```


    Form #1: `str.startswith(substring)`


    The function returns `True` if the string `str` starts with the string `substring`
    and returns `False` otherwise:


    ```

    >>> "This is a demo".startswith("This")

    True

    >>> "This is a demo".startswith("this")

    False

    ```


    We can also provide a tuple of strings instead of a single string for `substring`:


    ```

    >>> "This is a demo".startswith(("This","this"))

    True

    >>> "This is a demo".startswith(("That","that"))

    False

    ```


    Thus, we can check if a string starts with one of a set of substrings or not.'
  merge: -1
  pgno: 181
- img_proc: true
  md: '# Form #2: str.startswith(substring, start)


    The function returns `True` if the string `str` starts with the string `substring`,
    with the check starting from the index `start` within the string `str`. In other
    words, we are checking for the existence of the substring `substring` at the index
    `start` in the string `str`:


    ```

    >>> "This is a demo".startswith("is")

    False

    >>> "This is a demo".startswith("is",2)

    True

    >>> "This is a demo".startswith("is",5)

    True

    >>> "This is a demo".startswith("is",6)

    False

    ```


    Again, we can give a tuple of substrings instead of a single substring:


    ```

    >>> "This is a demo".startswith(("this","is","that"),5)

    True

    ```


    # Form #3: str.startswith(substring, start, end)


    The function returns `True` if the substring `substring` is found starting from
    index `start` in the string `str`, but restricting the search till index `end`
    only. If the characters in `str` from index `start` till index `end` (excluding
    `end`) did not match the characters in `substring`, this function returns `False`.
    If the range of indices from `start` to `end` are not enough to compare against
    the entire length of `substring`, the function returns `False`:


    ```

    >>> "This is a demo".startswith("is",5,10)

    True

    >>> "This is a demo".startswith("is",5,7)

    True

    >>> "This is a demo".startswith("is",5,6)

    False

    ```


    This form is the least useful form and is almost useless when a single substring
    is provided. It can be of use when a tuple of substrings are provided.'
