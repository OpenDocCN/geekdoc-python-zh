    \ addition of line 10.\n2. Line 10 prints a message when executed, which we can\
    \ use as a proof as execution of statements.\n\nWe get the above output when we\
    \ directly run the Python script as a program. But the point is that we will continue\
    \ to get the same output even if this module is imported, as shown in the below\
    \ interactive session:\n\n```\n>>> import fact2\nModule loaded successfully!\n\
    ```\n\nWe therefore conclude that *a module is executed when imported*. However,\
    \ this execution is performed only when the module is imported for the first time.\
    \ Thereafter, subsequent imports of the same module do not result in execution\
    \ of the module.\n\nInterestingly, a module can differentiate between the two\
    \ forms of execution as follows:\n\n+   1. If the module is being executed because\
