    # 12. OOP in Python


    353


    **Observation:**


    +   1. We had earlier defined the method `setDate()`. Such methods that are used
    to set the state of an object are called *setters* or *setter methods*.

    2. We have now added the methods `getDay()`, `getMonth()` and `getYear()` to obtain
    or extract the state of an object. Such methods are called *getters* or *getter
    methods*. Since these methods have a single simple statement within their bodies,
    they have been defined in a single line for brevity.

    3. Observe that all methods (inclusive of and not limited to getters and setters)
    use the first parameter (`self`) to reference the invoking object.

    4. After the class definition is completed, we create an object `d`, set it''s
    date using our setter `setDate()` and extract the values back using our getters
    (`getDay`, `getMonth` and `getYear`) and print them to verify the whole process.


    It would be a good idea to delegate the printing of the `Date` object to the object
    itself via a method `print()`:


    ```

    >>> class Date:

    ...     def setDate(self,d,m,y):

    ...             self.day,self.month,self.year = d,m,y

    ...     def getDay(self): return self.day

    ...     def getMonth(self): return self.month

    ...     def getYear(self): return self.year

    ...     def print(self):

    ...             print("{}-{}-{}".format(self.getDay(),self.getMonth(),self.getYear()))

    ...

    >>> d = Date()

    >>> d.setDate(1,2,2000)

    >>> d.print()

    1-2-2000

    ```


    **Observation:**


    +   1. We have added a method `print()` to the `Date` class to print out the date.
    This `print()` method has no connection to the global built-in `print()` function.
    We can of course think of a different name than `print()` if required.

    2. By delegating the responsibility of printing to the object, the usage of the
    object becomes simpler!

    3. We will see a better technique of achieving this objective of printing a string
    representation of an object in section 12.8.2.2.'
  - '[PAGE 366]


    The reason Data Hiding is considered important is that it eliminates accidental
    changes to data, thereby maintaining the integrity of the object. This is made
    possible by preventing direct access to data and providing accessible methods
    that permit assignment to non-accessible data after due validation. How data can
    be made inaccessible will be dealt with in section 12.4.6, but right now we will
    focus on providing a method that performs validation before assigning values to
    data. Here is the new code with the setter method `setDate()` modified to include
    validation:


