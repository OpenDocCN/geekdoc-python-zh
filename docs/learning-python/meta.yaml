    Here are a few examples of infix arithmetic expressions and their postfix equivalent:


    | No. | Infix Notation | Postfix Notation |

    |---|---|---|

    | 1 | a | a |

    | 2 | a+b | ab+ |

    | 3 | a+b*c | abc*+ |

    | 4 | a*b+c | ab*c+ |

    | 5 | a* (b+c) | abc+* |

    | 6 | (a+b) * (c+d) | ab+cd+* |


    # Observation:


    +   1. As long as no operators are involved, both infix and postfix expressions
    looks the same, as illustrated in example 1. For lengthier expressions, do note
    that the only difference is in the placement of operators, but the operands remain
    in the same order within the expression!

    2. Example 2 shows a basic arithmetic expression

    3. In the postfix expression of example 3, the * operator works on b and c, while
    the + operator works on a and the result of b*c.

    4. In the postfix expression of example 4, the * operator works on a and b, while
    the + operator works on the result of a*b and c.

    5. In the postfix expression of example 5, the + operator works on b and c, while
    the * operator works on a and the result of b+c.

    6. In the postfix expression of example 6, the first + operator works on a and
    b, the second + operator works on c and d, while the * operator works on the results
    of the previous 2 operations (a+b and c+d).

    7. We observe that unlike infix expressions where we need to evaluate operators
    based on their precedence (and associativity), in postfix expressions, once framed
    we can evaluate easily without considering anything else.

    8. We also observe, for the same reason mentioned above, that we don''t need or
    use parentheses in postfix expressions.


    # Advantages of the postfix notation:'
