    | Offset | Standard Position | Meaning |

    | :--- | :--- | :--- |

    | -10 | SEEK_CUR | 10 bytes before the current position in the file (useful for
    re-reading or overwriting the previous section of the file) |

    | 0 | SEEK_END | End of the file |

    | -10 | SEEK_END | 10 bytes before the end of the file |

    | 10 | SEEK_END | 10 bytes after the end of the file (valid only if the file has
    been opened for writing, in which case the file will grow along with the change
    in position) |


    Table 34: Examples of Seeking


    # 14.5.2 Seeking to a Particular Position Within a File


    In order to seek to a specific position within a file (using the concepts of the
    previous section), the `seek()` method can be used, which has the following syntax:


    ```

    fileObject.seek(offset [,whence])

    ```


    Note:


    +   1. The `offset` parameter specifies an offset relative to a standard position
    that is selected in the second parameter, `whence`.

    2. The `whence` parameter is the standard position selection relative to which
    the offset is applied. The values for this parameter has to be one of `os.SEEK_SET`
    (0), `os.SEEK_CUR`(1) or `os.SEEK_END`(2). If this parameter is not provided,
    the default standard position assumed in `os.SEEK_SET`.

    3. For text files, the offset must be 0 or a value that was previous returned
    by the `tell()` method (covered in section 14.5.3). For binary files, the offset
    can be any arbitrary number.


    # 14.5.3 Finding the Current Location Within a File


    Just as how the `seek()` method allows us to change the position within an opened
    file, the `tell()` method tells us the current location in an opened file and
    has the following syntax:'
  - '[PAGE 493]


    ```

    fileObject.tell()

    ```


    Note:


    +   1. This method returns the current position within the file represented by
    the file object (fileObject), measured as the number of bytes from the beginning
    of the file.

    2. The value returned by the tell() method can be used directly as an offset in
    the seek() method with the standard position as SEEK_SET to return to this position
    whenever required irrespective of where the current position is later on during
    the execution of the script.

    3. For text files, the value returned by the tell() method and the special offset
    of 0 are the only valid values that can be used as offset in the seek() method.


    # 14.5.4 Special Notes for Seeking Within Text Files


    Section 14.1.3 introduced the difference between text and binary files. One of
    the differences between them that affects seeking within files is the fact that
    end of line detection is done internally by Python depending on the platform.
    The implementation can vary and hence seeking will also be affected. To keep things
    simple, Python asks programmers to stick to the following rules as far as seeking
    in text files are concerned:


    +   1. It is safe to use an offset of 0 relative to any standard position. Such
    a seek is guaranteed to work.

    2. Any other offset used must be relative to the start of the file (SEEK_SET).

    3. If a non-zero offset is used for seeking, the offset should be one that was
    previously returned from tell(). No other arbitrary offsets are to be used.


    Binary files do not undergo any end-of-line processing by Python and hence do
    not have the above restrictions.


    # 14.6 Writing to Binary Files


    While text files are designed to be human-readable, it is sometimes preferable
    to store data in an efficient way that our application can read and understand
    but not humans. Such files would be called binary files just to differentiate
    from text files that contain human-readable text. In order to write to binary
    files and read from binary files, the pickle module can be used.


    The pickle module is capable of converting an object to a stream of bytes and
    then writing them to a binary file and is also capable of reading a sequence of
    bytes from a binary file and converting them into an object.'
  - "[PAGE 494]\n\nIn order to write an object to a binary file, the `dump()` function\
    \ can be used, which has the following syntax:\n\n```\npickle.dump(object, file)\n\
    ```\n\n**Note:**\n\n+   1. In the above syntax, `pickle` is the name of the module\
    \ and `dump` is the name of a function in that module. There are other ways of\
    \ pickling an object, but we will stick to this syntax.\n2. The parameter `object`\
    \ is any object you wish to store in the file and the parameter `file` is the\
    \ file object identifying the file to which the object needs to be written.\n\
    3. The file is expected to be opened in a mode that supports writing in binary.\n\
    \nHere is a program that uses a class called `Employee` to represent an employee,\
    \ and allows the user to add one such employee record to a binary file called\
    \ `employees.dat`:\n\n**add_employee.py**\n\n```\n1.  #!/usr/bin/python\n2.  \n\
    3.  # Program to write employee records to a file\n4.  \n5.  import pickle\n6.\
    \  \n7.  class Employee:\n8.      def __init__(self, name, id, designation):\n\
    9.          self.name = name\n10.         self.id = id\n11.         self.designation\
    \ = designation\n12. \n13. try:\n14.     file = open(\"employees.dat\", \"ab\"\
    )\n15.     name = input(\"Enter employee name:\")\n16.     id = int(input(\"Enter\
    \ employee ID:\"))\n17.     designation = input(\"Enter employee designation:\"\
    )\n18. \n19.     pickle.dump(Employee(name, id, designation), file)\n20. except\
    \ Exception as e:\n21.     print(\"Unable to open file!\")\n22.     print(\"Reason:\
    \ {}\".format(str(e)))\n23. else:\n24.     print(\"Employee record successfully\
    \ added to file!\")\n```"
