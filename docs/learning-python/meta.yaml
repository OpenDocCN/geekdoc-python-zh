  - '[PAGE 270]


    Once we have access to a regex object, these are the methods we can invoke on
    it:


    ```

    regexObject.search(string, pos=0, endpos=-1)

    regexObject.match(string, pos=0, endpos=-1)

    regexObject.fullmatch(string, pos=0, endpos=-1)

    regexObject.split(string, parts=0)

    regexObject.findall(string, pos=0, endpos=-1)

    regexObject.finditer(string, pos=0, endpos=-1)

    regexObject.sub(replacement, string, count=0)

    regexObject.subn(replacement, string, count=0)

    ```


    **Observation:**


    +   1. These methods behave identical to the corresponding functions in the `re`
    module.

    2. Most of these methods receive optional `pos` and `endpos` parameters вАУ the
    `pos` parameter specifies where to start matching within the string, and the `endpos`
    parameter specifies where to stop matching in the string. When `pos` is omitted,
    the matching starts at the beginning of the string and when `endpos` is omitted,
    the matching ends at the end of the string. Note that this has no effect on the
    вАЬ^вАЭ and вАЬ$вАЭ operators which will still consider the start of the string to the
    be index 0 regardless of `pos` and the end of the string to be the last index
    of the string regardless of `endpos`.

    3. The RE is not present in these methods since it is already placed within the
    regex object. The string against which the RE has to be matched can change and
    is hence passed as a parameter.

    4. The flags are not present as parameters in these methods since they are already
    placed within the regex object. If a different set of flags are required, another
    regex object instance has to be created for that using `re.compile()`.


