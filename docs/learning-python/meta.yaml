    \ whenever required. We will see examples of this in section 11.6.\n\n### 10.14\
    \ Unpacking Argument Lists\n\nWhen a collection is passed as an argument to a\
    \ function, it is received as a collection object only and not as individual elements\
    \ of the collection. To illustrate, consider the following example:\n\n```\n>>>\
