  - "[PAGE 372]\n\n# 12.4.4 Class Functions\n\nJust as how variables defined in a\
    \ class automatically become class variables, functions defined within a class\
    \ also become class functions. They are methods only when an object is used to\
    \ invoke the function, in which case a reference to the invoking object is passed\
    \ automatically as the first argument and is typically received as the `self`\
    \ parameter. Class functions can be invoked only through the class object and\
    \ obviously do not receive any invoking object reference as `self`.\n\nThe following\
    \ code snippets will help demonstrate these features:\n\n```\n>>> class A:\n...\
    \     x=10\n...     def increment():\n...             A.x=A.x+1\n...\n>>> A.x\n\
    10\n>>> A.increment()\n>>> A.x\n11\n```\n\nWe define a class `A` with a class\
    \ variable `x` that is initialized to `10`. We define a function `increment()`\
    \ that increments the value of this class variable. The function is invoked using\
    \ the class object (`A`) and not by using any object of the class `A`.\n\n```\n\
    (continuation)\n>>> a=A()\n>>> b=A()\n>>> a.x\n11\n>>> b.x\n11\n```\n\nWe then\
    \ create 2 objects of the class `A` (`a` and `b`) and observe that they too give\
    \ us the incremented value of the class variable `x`.\n\nWe cannot however invoke\
    \ the class function `increment()` using any of the objects `a` and `b` as class\
    \ functions are not methods:\n\n```\n(continuation)\n>>> a.increment()\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ increment() takes 0 positional arguments but 1 was given\n```"
  - "[PAGE 373]\n\nClass functions are preferred over methods when it is obvious that\
    \ the function does not depend on any particular instance of that class. In our\
    \ `Date` example, we observe that the functions `isValid()` and `isLeap()` are\
    \ in no way connected to any specific instance of the `Date` class, and are thus\
    \ candidates for conversion into class functions.\n\nFor beginners, a simple technique\
    \ to determine when to convert instance methods to class functions is when there\
    \ is no usage of `self` within the function definition, except for accessing other\
    \ methods which are also candidates for conversion to class functions. In our\
    \ `Date` example, the method `isValid()` does use `self` to invoke the method\
    \ `isLeap()`. The `isLeap()` method does not use `self` in it's definition and\
    \ hence can be converted to a class function. After this change, the call to `isLeap()`\
    \ within `isValid()` changes from `self.isLeap()` to `Date.isLeap()` and there\
    \ is no usage of `self` within `isValid()`, making it possible to convert `isValid()`\
    \ also from an instance method to a class function.\n\nIn case you are wondering\
    \ why we should convert these instance methods into class functions when the code\
    \ is working perfectly fine, it is because it is artificial and could also be\
    \ misleading or meaningless. In the statement `self.isValid(d,m,y)`, `self` has\
    \ absolutely no role to play! Similarly, in the statement `d1.isLeap(2000)`, `d1`\
    \ has no role to play and could be misleading at worst and meaningless at best.\
    \ It is far better to replace them with `Date.isValid(d,m,y)` and `Date.isLeap(2000)`\
    \ respectively. Also note that class functions can be invoked even when the class\
    \ has not been instantiated while instance methods cannot be invoked without an\
    \ instance.\n\n> **NOTE:**\nPython 2.2 and above supports the decorators `@classmethod`\
    \ and `@staticmethod`, both of which are outside the purview of this book!\n\n\
    Here is our new `Date` class after making these changes:\n\n# Date3.py\n\n```\n\
