    \ `__abs__` |\n\nTable 27: Magic Methods for Unary Arithmetic Operators\n\n> NOTE:\n\
    > Unlike the operators shown in section 12.8.3.1, reverse unary arithmetic operators\
    \ don't exist since these operators, being unary, work on a single operand and\
    \ that operand is the instance of the class itself!\n\n### 12.8.3.3 Overloading\
    \ Type Conversion Operators\n\nWhen objects of our class are being converted to\
    \ other primitive types, certain standard magic methods are invoked to facilitate\
    \ the conversion, if defined. These magic methods are summarised in the table\
    \ below:\n\n| Conversion | Magic Method |\n|---|---|\n| int() | `__int__` |\n\
    | float() | `__float__` |\n| bool() | `__bool__` |\n| complex() | `__complex__`\
    \ |\n| str() | `__str__` |\n| bytes() | `__bytes__` |\n| index(), bin(), oct(),\
    \ hex() | `__index__` |\n\nTable 28: Magic Methods for Type and Base Conversion\n\
    \n**Note:**\n\n1.  The `__str__` magic method was already covered formally in\
    \ section 12.8.2.2.\n2.  The `__index__` magic method is supposed to return the\
    \ same value as `__int__`, and the presence of `__index__` should ideally also\
    \ be accompanied by `__int__`, though the presence of `__int__` does not mandate\
    \ implementing `__index__`!\n3.  The `__index__` magic method is used when converting\
    \ the integer equivalent of an instance to other bases, as performed by the `bin()`,\
    \ `oct()` and `hex()` functions. All these functions use the return value of `__index__`\
    \ and perform base conversions themselves.\n\n### 12.8.3.4 Overloading Comparison\
    \ Operators\n\nIn order to compare two objects, the relational operators can be\
    \ used provided suitable magic methods are implemented as summarised in the table\
    \ below:\n\n| Comparison Operator | Magic Method |\n| :---: | :---: |\n| < | `__lt__`\
    \ |\n| > | `__gt__` |\n| <= | `__le__` |\n| >= | `__ge__` |\n| == | `__eq__` |\n\
    | != | `__ne__` |\n\nTable 29: Magic Methods for Comparison Operators\n\n### 12.8.3.5\
    \ Overloading Bitwise Operators\n\nWhen bitwise operators are used on objects,\
    \ corresponding magic methods get invoked. The table below summarises the magic\
    \ methods invoked when the first operand is an instance of our class:\n\n| Bitwise\
    \ Operator | Magic Method |\n| :--- | :--- |\n| & | `__and__` |\n| \\| | `__or__`\
    \ |\n| ^ | `__xor__` |\n| << | `__lshift__` |\n| >> | `__rshift__` |\n| ~ | `__invert__`\
    \ |\n\nTable 30: Magic Methods for Bitwise Operators\n\nIf the first operand does\
    \ not support the required bitwise operation, then the second operand's reverse\
    \ magic method gets invoked as summarised in the table below:\n\n| Reverse Bitwise\
    \ Operator | Magic Method |\n| :--- | :--- |\n| & | `__rand__` |\n| \\| | `__ror__`\
    \ |\n| ^ | `__rxor__` |\n| << | `__rlshift__` |\n| >> | `__rrshift__` |\n\nTable\
    \ 31: Magic Methods for Reverse Bitwise Operators\n\n**Note:**\n\n1.  If the second\
    \ operand also does not support the reverse bitwise operation, an error is reported.\n\
    2.  The `~` operator, being unary, does not have a corresponding reverse operator.\n\
    \n### 12.8.3.6 Overloading Assignment Operators\n\nNote that in statements of\
    \ the form `o1=o2`, where `o1` and `o2` are objects of any class, the assignment\
    \ operator (`=`) cannot be overloaded as Python takes up the responsibility of\
    \ assigning the reference from RHS to LHS. However, for the shorthand assignment\
    \ operators, we do have corresponding magic methods that get invoked, as summarised\
    \ in the table below:\n\n| Shorthand Assignment Operator | Magic Method |\n| ---\
    \ | --- |\n| += | `__iadd__` |\n| -= | `__isub__` |\n| *= | `__imul__` |\n| //=\
    \ | `__ifloordiv__` |\n| /= | `__itruediv__` |\n| %= | `__imod__` |\n| **= | `__ipow__`\
    \ |\n| &= | `__iand__` |\n| \\|= | `__ior__` |\n| ^= | `__ixor__` |\n| <<= | `__ilshift__`\
    \ |\n| >>= | `__irshift__` |\n\nTable 32: Magic Methods for Shorthand Assignment\
    \ Operators\n\n> **NOTE:**\n> These magic methods ideally should return a reference\
    \ to a new instance of the class that represents the result of the operation.\n\
    \n## 12.9 Empty Classes\n\nAn empty class in Python can be useful that way for\
    \ a variety of reasons. An empty class is defined as a class containing only 1\
    \ statement: `pass` as shown in the syntax below:\n\n```python\nclass className:\n\
    \    pass\n```\n\nThis section covers some of the valid reasons why we might encounter\
    \ empty classes:\n\n### 12.9.1 Empty Classes as Placeholders\n\nMany a times while\
    \ coding, the programmer wants to focus on one aspect of the code but does not\
    \ want syntax errors due to absence of code in other parts of the program. A programmer\
    \ who needs a particular class, but does not want to commit on its attributes\
    \ and behaviour at the moment can easily start with an empty class and fill in\
    \ the class details at a later point of time. Even when the class details are\
    \ not implemented, the class as such is usable and instances of that class can\
    \ be created and used as well.\n\n### 12.9.2 Empty Classes for Identification\n\
    \nSometimes, the only reason we want a particular class is to differentiate the\
    \ objects. This happens, for example, in exception handling where we want to process\
    \ different exceptions in different manners. Such a class need not have any implementation\
    \ at all and we can make do with an empty definition.\n\n> NOTE:\n> The example\
    \ in this section involves exception handling which will be covered in section\
    \ 13. Readers are advised to read this section only after completing section 13.\n\
    \nHere is an example illustrating operations on a stack implemented using a user-defined\
    \ class `MyStack`, in which the `push()` method can raise `StackOverflowException`\
    \ and the `pop()` method can raise `StackUnderflowException`:\n\n# MyStack.py\n\
    \n```python\n#!/usr/bin/python\n\n# Implementation of a fixed-length Stack\n\n\
    class MyStack:\n\n    def __init__(self,MAX_SIZE):\n        self.MAX_SIZE = MAX_SIZE\n\
    \        self.values=[]\n\n    def push(self,x):\n        if len(self.values)\
    \ == self.MAX_SIZE: raise StackOverflowException()\n        self.values.append(x)\n\
    \n    def pop(self):\n        if len(self.values) == 0: raise StackUnderflowException()\n\
    ```"
