    # 12.4 Instance Variables, Class Variables, Functions and Methods


    The attributes present in a class are called *Class Variables* and the functionality
    provided by the class using functions are called *Class Functions*.


    Class variables belong to the class and are accessible using any object of the
    class too. In other words, class variables could be said to be shared by objects
    of that class.


    Objects can have their own independent variables called *Instance Variables*.


    The functions defined in a class are *Class Functions* and as such belong to the
    class and are also accessible and invokable by any object of that class, with
    the object playing no other role apart from identifying the class to which the
    Class Function belongs. When these functions work on a per-object basis (by keeping
    track of the invoking object and implicitly working on it), they are called *Methods*.


    This section focuses on these 4 concepts:


    +   1. Instance Variables

    2. Instance Methods

    3. Class Variables

    4. Class Functions'
