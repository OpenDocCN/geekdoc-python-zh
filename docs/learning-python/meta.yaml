    # 17.3.4.4 Extracting the Child Tags Within a Tag


    To extract a specific child tag within a tag, we can simply use the name of the
    tag as an attribute of the `Tag` object, as shown below:


    ```

    (continuation of previous session)

    >>> tag=soup.html.body

    >>> tag.name

    ''body''

    ```


    **Observation:**


    +   1. We are trying to extract the `body` tag from within the `html` tag.

    2. We have used `tag.name` to demonstrate the correctness here.


    We need not, strictly speaking, use the proper hierarchy to locate the `body`
    tag. Thus, the following code will also work:


    ```

    (continuation of previous session)

    >>> tag=soup.body

    >>> tag.name

    ''body''

    ```


    Here is another example of extracting a `p` tag:


    ```

    (continuation of previous session)

    >>> tag=soup.p

    >>> tag

    <p>This is <b>Bold</b></p>

    ```


    **Observation:**


    +   1. These techniques for extracting a child tag work only when there is a single
    child tag with the given name. If there are multiple tags with the given name,
    only the first one is returned.

    2. Section 17.3.6 will cover how to extract all tags with a given name.'
