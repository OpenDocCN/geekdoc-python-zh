    \n![](img/7831d9fe9e47e5b1109ec75197998a41_360_0.png)\n\nзїІжЙњжШѓдЄАдЄ™йЗНи¶БзЪДж¶ВењµпЉМеЫ†дЄЇеК®жАБе§ЪжАБеЃМеЕ®дЊЭиµЦдЇОеЃГгАВеЬ®жИСдїђзЪД`Date`з§ЇдЊЛдЄ≠пЉМжИСдїђеПѓдї•дїО`Date`з±їзїІжЙњиЗ™еЃЪдєЙжЧ•жЬЯж†ЉеЉПз±їпЉМе¶В`USDate`еТМ`UKDate`пЉМдїЕжЈїеК†жФѓжМБиѓ•жЧ•жЬЯж†ЉеЉПжЙАйЬАзЪДеКЯиГљгАВ\n\
    \n## 12.1.8 жґИжБѓдЉ†йАТ\n\nеЬ®йЭҐеРСеѓєи±°зЉЦз®ЛдЄ≠пЉМз®ЛеЇПйЬАи¶БиЃ∞ељХз±їзїУжЮДпЉМеЬ®ињРи°МжЧґеИЫеїЇеѓєи±°пЉМеєґеЕБиЃЄињЩдЇЫеѓєи±°еЬ®ињРи°МжЧґзЫЄдЇТйАЪдњ°гАВињЩзІНињРи°МжЧґеѓєи±°дєЛйЧізЪДйАЪдњ°зІ∞дЄЇ*жґИжБѓдЉ†йАТ*пЉМйАЪеЄЄйАЪињЗеЗљжХ∞и∞ГзФ®жЭ•еЃЮзО∞пЉМдЉ†йАТзЪДеПВжХ∞еЬ®жКАжЬѓдЄКзІ∞дЄЇ*жґИжБѓ*гАВ\n\
    \n## 12.2 еЃЪдєЙз±ї\n\nиЃЊиЃ°з±їжШѓйЭҐеРСеѓєи±°зЉЦз®ЛзЪДзђђдЄАж≠•гАВеЬ®PythonдЄ≠еЃЪдєЙз±їзЪДжЬАзЃАеНХиѓ≠ж≥Хе¶ВдЄЛжЙАз§ЇпЉЪ\n\n```python\nclass className:\n\
    \    statements\n```\n\nз±їдЄ≠зЪДиѓ≠еП•еПѓдї•жШѓдї•дЄЛдїїдљХдЄАзІНпЉЪ\n\n1. з©Їи°М\n2. ж≥®йЗК\n3. з±їеПШйЗП\n4. з±їеЗљжХ∞\n\nжИСдїђе∞ЖеЬ®зђђ12.4.3иКВдїЛзїНз±їеПШйЗПпЉМеЬ®зђђ12.4.4иКВдїЛзїНз±їеЗљжХ∞гАВзО∞еЬ®пЉМиЃ©жИСдїђдїОдЄАдЄ™з©Їз±їеЉАеІЛгАВзФ±дЇОз±їеЃЪдєЙдЄ≠иЗ≥е∞СйЬАи¶Б1жЭ°иѓ≠еП•пЉИз±їдЉЉдЇОжЭ°дїґгАБеЊ™зОѓеТМеЗљжХ∞дљУдЄ≠иЗ≥е∞СйЬАи¶Б1жЭ°иѓ≠еП•пЉЙпЉМжИСдїђеПѓдї•дљњзФ®`pass`иѓ≠еП•жЭ•йБњеЕНдЇІзФЯдїїдљХжХИжЮЬпЉЪ\n\
    \n```python\nclass Date:\n    pass\n```\n\nе∞±еГПеЗљжХ∞еЃЪдєЙеПѓдї•йАЙжЛ©жАІеЬ∞дї•жЦЗж°£е≠Чзђ¶дЄ≤еЉАе§ідЄАж†ЈпЉМз±їеЃЪдєЙдєЯеПѓдї•еМЕеРЂжЦЗж°£е≠Чзђ¶дЄ≤пЉМзДґеРОеПѓдї•йАЪињЗзЙєжЃКзЪДз±їеПШйЗП`__doc__`иЃњйЧЃпЉЪ\n\
    \n```python\n>>> class Date:\n...     \"\"\"This is our first implementation of\
    \ the Date class\"\"\"\n...     pass\n...\n>>> Date.__doc__\n'This is our first\
    \ implementation of the Date class'\n```\n\nйЪПзЭАжИСдїђе≠¶дє†PythonзЪДжЫіе§ЪзЙєжАІпЉМжИСдїђе∞ЖеРСз±їеЃЪдєЙдЄ≠жЈїеК†жЫіе§Ъдї£з†БгАВ\n\
    \n## 12.3 еЃЮдЊЛеМЦз±ї\n\nдЄАжЧ¶жИСдїђзЪДз±їеЃЪдєЙеЗЖе§Зе∞±зї™пЉМжИСдїђе∞±еПѓдї•еЃЮдЊЛеМЦеЃГеєґеИЫеїЇеѓєи±°гАВжѓПдЄ™еѓєи±°йГље∞ЖеМЕеРЂз±їеЃЪдєЙдЄ≠иЃ∞ељХзЪДжЙАжЬЙеЖЕеЃєгАВеЬ®жИСдїђзЪД`Date`з§ЇдЊЛдЄ≠пЉМзФ±дЇОз±їжШѓз©ЇзЪДпЉМеѓєи±°дєЯеЗ†дєОжШѓз©ЇзЪДгАВиѓЈж≥®жДПпЉМдљЬдЄЇз±їдЄАйГ®еИЖзЪДжЦЗж°£е≠Чзђ¶дЄ≤зО∞еЬ®дєЯеПѓдї•йАЪињЗеѓєи±°иЃњйЧЃгАВеЃЮдЊЛеМЦз±їгАБеИЫеїЇеѓєи±°еєґе∞ЖеЕґеЉХзФ®е≠ШеВ®еЬ®еПШйЗПдЄ≠зЪДжЬАзЃАеНХиѓ≠ж≥Хе¶ВдЄЛжЙАз§ЇпЉЪ\n\
    \n```python\nvar = ClassName()\n```\n\nињЩе∞±жШѓжИСдїђеЃЮдЊЛеМЦ`Date`з±їзЪДжЦєеЉПпЉЪ\n\n```python\n>>> d\
    \ = Date()\n>>> d\n<__main__.Date object at 0x7f592e29fb50>\n>>> type(d)\n<class\
    \ '__main__.Date'>\n>>> d.__doc__\n'This is our first implementation of the Date\
    \ class'\n```\n\nе¶ВдЄКжЙАз§ЇпЉМз±їзЪД`__doc__`жИРеСШдєЯеПѓдї•йАЪињЗеѓєи±°`d`иЃњйЧЃгАВ\n\n## 12.4 еЃЮдЊЛеПШйЗПгАБз±їеПШйЗПгАБеЗљжХ∞еТМжЦєж≥Х\n\n\
    з±їдЄ≠е≠ШеЬ®зЪДе±ЮжАІзІ∞дЄЇ*з±їеПШйЗП*пЉМз±їйАЪињЗеЗљжХ∞жПРдЊЫзЪДеКЯиГљзІ∞дЄЇ*з±їеЗљжХ∞*гАВ\n\nз±їеПШйЗПе±ЮдЇОз±їпЉМдєЯеПѓдї•дљњзФ®иѓ•з±їзЪДдїїдљХеѓєи±°иЃњйЧЃгАВжНҐеП•иѓЭиѓіпЉМз±їеПШйЗПеПѓдї•иҐЂиѓ•з±їзЪДеѓєи±°еЕ±дЇЂгАВ\n\
    \nеѓєи±°еПѓдї•жЛ•жЬЙиЗ™еЈ±зЪДзЛђзЂЛеПШйЗПпЉМзІ∞дЄЇ*еЃЮдЊЛеПШйЗП*гАВ\n\nеЬ®з±їдЄ≠еЃЪдєЙзЪДеЗљжХ∞жШѓ*з±їеЗљжХ∞*пЉМеЫ†ж≠§е±ЮдЇОз±їпЉМдєЯеПѓдї•иҐЂиѓ•з±їзЪДдїїдљХеѓєи±°иЃњйЧЃеТМи∞ГзФ®пЉМеѓєи±°йЩ§дЇЖж†ЗиѓЖз±їеЗљжХ∞жЙАе±ЮзЪДз±їдєЛе§Цж≤°жЬЙеЕґдїЦдљЬзФ®гАВељУињЩдЇЫеЗљжХ∞еЬ®жѓПдЄ™еѓєи±°зЪДеЯЇз°АдЄКеЈ•дљЬжЧґпЉИйАЪињЗиЈЯиЄ™и∞ГзФ®еѓєи±°еєґйЪРеЉПеЬ∞еѓєеЕґжУНдљЬпЉЙпЉМеЃГдїђиҐЂзІ∞дЄЇ*жЦєж≥Х*гАВ\n\
    \nжЬђиКВйЗНзВєдїЛзїНињЩ4дЄ™ж¶ВењµпЉЪ\n\n1. еЃЮдЊЛеПШйЗП\n2. еЃЮдЊЛжЦєж≥Х\n3. з±їеПШйЗП\n4. з±їеЗљжХ∞\n\n### 12.4.1 еЃЮдЊЛеПШйЗП\n\nеЃЮдЊЛеПШйЗПжШѓе±ЮдЇОеѓєи±°зЪДеПШйЗПгАВ\n\
    \n> **зїЩC/C++/Javaз®ЛеЇПеСШпЉЪ**\n> дЄОC++еТМJavaз≠Йиѓ≠и®АдЄ≠з±їеЃЪдєЙжМЗеЃЪеЃЮдЊЛеПШйЗПдЄНеРМпЉМеЬ®PythonдЄ≠пЉМз±їеП™иГљжМЗеЃЪз±їеПШйЗПпЉИз±їдЉЉдЇОC++дЄ≠зЪД`static`жХ∞жНЃжИРеСШеТМJavaдЄ≠зЪД`static`е≠ЧжЃµпЉЙгАВ\n\
    \nPythonдљњзФ®Perlй£Ож†ЉпЉМеѓєи±°еПѓдї•еИЫеїЇеЃГжГ≥и¶БзЪДдїїдљХеЃЮдЊЛеПШйЗПгАВдЇЛеЃЮдЄКпЉМеРМдЄАз±їзЪДдЄНеРМеѓєи±°еПѓдї•жЛ•жЬЙдЄНеРМзЪДеЃЮдЊЛеПШйЗПпЉМе∞љзЃ°ињЩж†ЈеБЪеПѓиГљдЄНжШѓдЄАдЄ™е•љдЄїжДПпЉБињЩзІНеЃЮдЊЛеПШйЗПзЪДеИЫеїЇйАЪеЄЄдљњзФ®жЦєж≥ХжЭ•еЃМжИРпЉМж≠£е¶ВеН≥е∞ЖеЬ®дЄАдЄ™з§ЇдЊЛдЄ≠жЉФз§ЇзЪДйВ£ж†ЈгАВ\n\
    \nеЃЮдЊЛеПШйЗПдєЯеПѓдї•дљњзФ®`del`иѓ≠еП•еИ†йЩ§пЉБ\n\nеЬ®жИСдїђзЪД`Date`з§ЇдЊЛдЄ≠пЉМжИСдїђеЄМжЬЫ`Date`еѓєи±°жЛ•жЬЙ`day`гАБ`month`еТМ`year`дљЬдЄЇеЃЮдЊЛеПШйЗПвАФвАФжИСдїђеЄМжЬЫжѓПдЄ™`Date`еѓєи±°йГљжЬЙиЗ™еЈ±зЪДињЩдЇЫеАЉгАВињЩдЇЫеЃЮдЊЛеПШйЗПеПѓдї•еЬ®`setDate()`жЦєж≥ХдЄ≠еИЫеїЇпЉМе¶ВдЄЛжЙАз§ЇпЉЪ\n\
    \n```python\n>>> class Date:\n...     def setDate(self, d, m, y):\n...       \
    \  self.day, self.month, self.year = d, m, y\n...\n>>> d = Date()\n>>> d.setDate(1,\
