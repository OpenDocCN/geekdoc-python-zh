    # 21. Appendix вАУ Python 2 Vs. Python 3


    643


    | Python 2 Method | Python 3 Method |

    | :--- | :--- |

    | func_closure | __closure__ |

    | func_code | __code__ |

    | func_defaults | __defaults__ |

    | func_dict | __dict__ |

    | func_doc | __doc__ |

    | func_globals | __globals__ |

    | func_name | __name__ |


    The __nonzero__() magic method has now been replaced by __bool__().


    # 21.2.9.2 The super() Call


    You can now invoke super() without arguments and (assuming this is in a regular
    instance method defined inside a class statement) the right class and instance
    will automatically be chosen. With arguments, the behaviour of super() is unchanged.


    # 21.2.9.3 The input() Function


    The raw_input() function was renamed as input(). That is, the new input() function
    reads a line from sys.stdin and returns it with the trailing newline stripped.
    It raises EOFError if the input is terminated prematurely. To get the old behaviour
    of input(), use eval(input()).


    # 21.2.9.4 The round() Function


    The round() function rounding strategy and return type have changed. Exact halfway
    cases are now rounded to the nearest even result instead of away from zero. (For
    example, round(2.5) now returns 2 rather than 3). The call round(x[, n]) now delegates
    to x.__round__([n]) instead of always returning a float. It generally returns
    an int when called with a single argument and a value of the same type as x when
    called with two arguments.


    # 21.2.9.5 The reduce() Function


    The reduce() function has been removed from the global scope and placed in the
    functools module.'
  - '[PAGE 656]


    # 21.2.9.6 The reload() Function


    The `reload()` function has been removed from the global scope and placed in the
    `imp` module.


    # 21.2.9.7 The dict.has_key() Method


    The `dict.has_key()` method has been removed. Use the `in` operator instead.


    # 21.3 Porting Code From Python 2 to Python 3


    In situations where you want to use Python 3 and there is a library in your codebase
    that is Python 2 compliant only, it is advisable to port that particular library
    to Python 3 first. The solution adopted here is to run the library against all
    the unit tests by using the `-3` command line switch in Python 2. If tests fail
    or emit warnings, modify the code and try again.


    Once the code runs without warnings, then try it with Python 3. If the tests still
    fail in Python 3, then the standard `2to3` utility can come handy here to convert
    the version to Python 3. In addition to the `2to3` tool that allows code to be
    generated from Python 2, there''s also the `3to2` tool which converts Python 3
    code back to Python 2 code!


    > **NOTE:**

    More information on the `2to3` tool can be found at https://docs.python.org/2/library/2to3.html.

    More information on the `3to2` tool can be found at https://pypi.python.org/pypi/3to2.


    # 21.4 Writing Common Code for Python 2 and Python 3


    If there is a need to maintain your code base in Python 2 as well as Python 3,
    you may come across a few items which have different names in different versions.
    Instead of changing your code, you may use the `six` compatibility library. It
    is a single Python file and can be downloaded from http://pypi.python.org/pypi/six/.

    This section shows how we can write code that works across Python 2 and Python
    3 using the `six` compatibility module.'
