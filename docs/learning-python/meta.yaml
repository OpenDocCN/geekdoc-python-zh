    \ ending index (excluding `end`) till where to extract the elements. The parent\
    \ tuple does not undergo any change. Both `start` and `end` are optional, with\
    \ `start` defaulting to 0 (index of the first element) and `end` defaulting to\
    \ `len(tuple)`, i.e. the end of the tuple. Some examples follow:\n\n```\n>>> T=(5,2,3,2)\n\
    >>> T[1:3] # Slice of T from 1 to 3 (exclusive)\n(2, 3)\n>>> T[1:] # Slice of\
    \ T from 1 till the end of the tuple\n(2, 3, 2)\n>>> T[:3] # Slice of T from the\
    \ beginning of the tuple till 3\n(5, 2, 3)\n>>> T[:] # Slice spanning the entire\
    \ tuple\n(5, 2, 3, 2)\n```\n\n> NOTE:\nSince tuples are immutable, unlike lists,\
    \ T[:] is the same as T!\n\n# 5.7 Adding, Multiplying and Copying Tuples\n\nThe\
    \ + (addition), += (addition and assignment), * (multiplication), *= (multiplication\
    \ and assignment) and = (assignment) operators are available to operate on tuples,\
    \ the same way they are available to operate on lists.\n\n# 5.7.1 Adding Tuples\n\
    \nTwo tuples can be concatenated to form a third tuple using the + operator:"
