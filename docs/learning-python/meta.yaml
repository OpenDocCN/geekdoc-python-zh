    \ strings instead of a single string for `substring`:\n\n```python\n>>> \"This\
    \ is a demo\".startswith((\"This\",\"this\"))\nTrue\n>>> \"This is a demo\".startswith((\"\
    That\",\"that\"))\nFalse\n```\n\nThus, we can check if a string starts with one\
    \ of a set of substrings or not."
