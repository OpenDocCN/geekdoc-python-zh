    # 9.10 Compiling Regular Expressions


    If a particular RE is used frequently in the program, it is possible to optimize
    it''s use by вАЬcompilingвАЭ the regular expression and using the compiled regular
    expression object вАУ technically called a regex object - to perform operations
    instead. Here are some points to remember about regex objects:


    +   1. We can perform almost identical operations using the regex object instead
    of using the `re` library''s functions.

    2. Performing operations on regex objects are faster than working with `re` functions
    using RE strings.

    3. Python does compile regular expressions automatically and maintains a cache
    of recently used regular expressions. Thus, if we are using just a few regular
    expressions in our program, we need not worry about compiling them ourselves.

    4. In cases where we deal with many regular expressions in our program, we can
    compile the regular expressions ourselves and use the regex objects for better
    efficiency. At least the most frequently used regular expressions can be compiled.


    We use the `compile()` function of `re` to compile a RE and obtain a reference
    to the regex object:


    ```

    re.compile(pattern, flags=0)

    ```


    Forms:


    +   1. `re.compile(pattern)`

    2. `re.compile(pattern, flags)`


    **Form #1:** `re.compile(pattern)`

    In this form, the given RE pattern is compiled and a reference to the regex object
    is returned:


    ```

    >>> import re

    >>> c=re.compile(r"\d\d")

    ```


    **Form #2:** `re.compile(pattern, flags)`

    This form is identical to form #1, but also allows us to specify flags (discussed
    in section 10.4.4).'
