    - 4. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•ж£АжЯ•зїЩеЃЪзЪДе≠Чзђ¶жШѓе≠ЧжѓНгАБжХ∞е≠ЧињШжШѓж†ЗзВєзђ¶еПЈгАВ\n- 5. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•ж£АжЯ•зїЩеЃЪзЪДе≠ЧжѓНжШѓиЊЕйЯ≥ињШжШѓеЕГйЯ≥гАВ\n- 6. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•иЃ°зЃЧзїЩеЃЪиЊУеЕ•е≠Чзђ¶дЄ≤дЄ≠зЪДеЕГйЯ≥еТМиЊЕйЯ≥жХ∞йЗПгАВ\n\
    - 7. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•ж£АжЯ•зїЩеЃЪзЪДжХ∞е≠ЧжШѓеР¶дЄЇиі®жХ∞гАВ\n- 8. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•жЙУеН∞зїЩеЃЪжХ∞е≠ЧдєЛеЙНзЪДжЙАжЬЙиі®жХ∞гАВ\n- 9. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•ж£АжЯ•зїЩеЃЪзЪДеєідїљжШѓеР¶дЄЇйЧ∞еєігАВ\n\
    - 10. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•ж£АжЯ•зїЩеЃЪзЪДе≠Чзђ¶дЄ≤жШѓеР¶дЄЇеЫЮжЦЗгАВ\n- 11. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•жЙУеН∞зїЩеЃЪжХ∞е≠ЧзЪДйШґдєШгАВ\n- 12. зЉЦеЖЩдЄАдЄ™з®ЛеЇПжЭ•зФЯжИРжЦРж≥ҐйВ£е•СжХ∞еИЧзЪДеЙН\
