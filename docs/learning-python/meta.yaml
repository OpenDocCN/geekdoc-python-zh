    # 19.2.3 Encoding to Files


    Just as how the `dumps()` function dumps a JSON representation as a string, the
    `dump()` function dumps the JSON string representation to a file, identified by
    a file object. It has the following syntax:


    ```

    json.dump(obj, file)

    ```


    Here is a simple example that writes a list into a file in JSON format:


    ```

    >>> import json

    >>> f=open("test.json","w")

    >>> json.dump([1,3,5,7],f)

    >>> f.close()

    ```


    **Observation:**


    +   1. We import the `json` module. We open the file "test.json" in (textual)
    write mode and obtain a file handle that is stored in the variable `f`.

    2. We dump a list contents to the file represented by the file handle `f`.

    3. We close the file to be sure that the data is indeed flushed and written to
    the file.


    The file "test.json" will contain the following text:


    ```

    [1, 3, 5, 7]

    ```


    We will see how to read back the JSON content in section 19.3.2.


    # 19.3 Converting From JSON to Python


    # 19.3.1 Converting JSON Strings into Python Objects


    Converting from JSON to Python also uses a data type matching that is summarised
    in the table below:


    | JSON Representation | Python Object |

    |---|---|

    | Object | dict |

    | Array | list |

    | String | str |'
