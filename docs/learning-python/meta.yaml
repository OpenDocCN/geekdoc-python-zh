    # EXCEPTION HANDLING


    # 13.1 Errors vs. Exceptions


    Every programmer would have definitely written programs that didn''t work as expected.
    Sometimes, we programmers violate the syntactic rules of the language resulting
    in syntax errors and at other times our programs don''t work correctly due to
    various runtime anomalies. While syntax errors are definitely the programmer''s
    fault, various runtime anomalies can be caused due to reasons beyond the instructions
    in the program. For example, the program may run out of memory, or is unable to
    open a file, or unable to connect to a server, or the user has given invalid input.
    In these situations, it would be wrong to blame the programmer for the issue,
    though a good programmer always anticipates these issues and handles them gracefully
    in the program. Object Oriented programming languages like Python provide a very
    well-defined mechanism for dealing with these issues.


    Do note however that some of Python''s exception classes have names that indicate
    Error, but are technically exceptions! For instance, `ZeroDivisionError` is the
    name of an exception that is generated when we perform integer division by 0.
    On the other hand, `SyntaxError`, which is an error, is derived from `Exception`
    class and is treated as an exception. Some things are certainly strange in Python!


    # 13.2 Handling Exceptions


    As mentioned in the previous section, a good programmer anticipates situations
    where the program will not be able to perform as expected. Such blocks of code
    need to be *monitored* for exceptions. A good programmer handles these exceptions
    gracefully and thus has to *respond* to exceptions as they arise. This is done
    in a response block. Thus, the code will have the following structure:


    ![](img/7831d9fe9e47e5b1109ec75197998a41_437_0.png)'
- md: "The advantages of this mechanism are:\n\n1. We are able to separate the exception\
    \ testing code (checks in the monitoring block) and the exception handling code\
    \ (the response block). This makes the code in the monitoring block easier to\
    \ understand and maintain.\n2. We are able to respond to multiple exceptions without\
    \ multiple checks. All statements in the monitoring block are monitored. This\
    \ simplifies our code and makes it easy to maintain.\n3. We are able to respond\
    \ to different exceptions differently, or deal with multiple types of exceptions\
    \ in an identical manner, based on our requirement (section 13.2.2).\n4. We are\
    \ able to deal with exceptions in different levels or in multiple levels (section\
    \ 13.4).\n\n## 13.2.1 The Basic Exception Handling Block\n\nThe previous section\
    \ introduced the exception monitoring block and the exception handling block.\
    \ These blocks are called the `try` block and `except` block respectively in Python,\
    \ as shown in the syntax below:\n\n```\ntry:\n    ...\nexcept exceptionName:\n\
    \    ...\n```\n\nLet us understand the flow of control in the above syntax. Since\
    \ the flow of control depends on whether or not an exception is raised in the\
    \ `try` block, we will consider both situations separately:\n\n1. If no exception\
    \ is raised in the `try` block, the statements in the `try` block are executed\
    \ sequentially and the entire `except` block is ignored. This is what we normally\
    \ expect most of the times, as exceptions are supposed to be raised rarely.\n\
    2. If an exception is raised anywhere within the `try` block during the normal\
    \ sequential execution, control immediately exits the `try` block and starts examining\
    \ the `except` block(s). If it finds an `except` block capable of handling the\
    \ exception that was raised, then that `except` block is executed and control\
    \ resumes outside of the `try-except` blocks. We will cover more of this in the\
    \ next section where we see how to handle exceptions of multiple types. In the\
    \ syntax above, the `except` block is capable of handling an exception of type\
    \ `exceptionName` (and also its derived classes as we learnt in section 12.7).\n\
    3. If an exception is raised anywhere within the `try` block during the normal\
    \ sequential execution, and that exception is not handled by the `except` block(s),\
    \ then control exits the entire `try-except` construct and the exception propagates.\
    \ This behaviour will be examined in detail in section 13.4.\n\nLet us take a\
    \ simple example to understand the simplest syntax of `try-except` shown above.\n\
    \n## ExceptionHandlingDemo1.py\n\n```python\n#!/usr/bin/python\n\n# Exception\
    \ Handling Demo\n# Simple try-except block\n\ntry:\n    n = int(input(\"Enter\
    \ an integer:\"))\n    quotient = int(100/n)\n    print(\"100/{} = {}\".format(n,\
    \ quotient))\nexcept ZeroDivisionError:\n    print(\"Sorry! Division by zero is\
    \ not permitted!\")\n\nprint(\"Thanks for using this program!\")\n```\n\n## Output:\n\
    \n```\nEnter an integer:5\n100/5 = 20.0\nThanks for using this program!\n```\n\
    \n## Observation:\n\n1. This program basically accepts an integer from the user,\
    \ divides 100 by the given integer and displays the quotient.\n2. We however need\
    \ to be aware that if the user provides 0 as the input, then the division will\
    \ result in a `ZeroDivisionError` being raised. We need to handle that case gracefully.\n\
    3. The `try` block extends from line 7 to line 9. The statements within these\
    \ are monitored for any exception that may be raised. We are currently expecting\
    \ `ZeroDivisionError` to be raised when the user input is 0. Technically, lines\
    \ 7 and 9 need not be inside the try block as they are not candidates for `ZeroDivisionError`\
    \ to be raised. We have still kept them inside the try block for convenience and\
    \ because the subsequent demo programs build upon the same program and we will\
    \ require these statements also to be monitored for exceptions.\n4. The `except`\
    \ block contains line 11. This is our response to `ZeroDivisionError`.\n5. Line\
    \ 7 accepts input from the user, line 8 divides 100 by the input and line 9 prints\
    \ the result. As can be seen from the output, if the input is 5, the output is\
    \ 20. Since no exception is raised, after execution of the try block, control\
    \ resumes outside the try-except block, in line 12.\n\nWe will now consider how\
    \ the program behaves when the input given is 0.\n\n**Output:**\n\n```\nEnter\
    \ an integer:0\nSorry! Division by zero is not permitted!\nThanks for using this\
    \ program!\n```\n\n**Observation:**\n\n1. When the input received in line 7 is\
    \ 0, it results in a ZeroDivisionError in line 8. This interrupts the flow of\
    \ control in the try block. Note that line 9 did not get executed.\n2. Line 10\
    \ is the beginning of an except block that is capable of handling ZeroDivisionError,\
    \ which has occurred. Control therefore resumes from line 11, within the except\
    \ block.\n3. After execution of the except block, control comes out of the try-except\
    \ block and resumes execution from line 12. Thus, line 13 is also executed.\n\n\
    ## 13.2.2 Handling Multiple Exceptions\n\nThe previous section showed how an exception\
    \ that was raised can be handled. This section shows how many such exceptions\
    \ can be handled using a single try block. We will specifically see how to:\n\n\
    1. Handle the same exception from multiple lines using a single handler.\n2. Handle\
    \ multiple exceptions using a single handler.\n3. Handle all exceptions using\
    \ a single handler.\n4. How to combine the above to realise our requirements.\n\
    \n### 13.2.2.1 Separate Handling of Each Exception\n\nAn extended syntax of the\
    \ `try-except` block is shown below:\n\n```\ntry:\n    ... # try block\nexcept\
    \ ExceptionName1:\n    ... # Exception handler for ExceptionName1\nexcept ExceptionName2:\n\
    \    ... # Exception handler for ExceptionName2\nexcept ExceptionName3:\n    ...\
    \ # Exception handler for ExceptionName3\n...\n```\n\nFrom this syntax, it is\
    \ evident that a single `try` block can be followed by any number of `except`\
    \ blocks, and each `except` block can handle a specific type of exception.\n\n\
    - If no exception occurs, only the `try` block is executed and the control comes\
    \ out of the entire construct.\n- If an exception is raised by any statement in\
    \ the `try` block, the control immediately comes out of the `try` block and starts\
    \ checking the `except` blocks sequentially. The first `except` block that can\
    \ handle the exception that was raised will then be executed, after which control\
    \ comes out of the entire construct, ignoring all other `except` blocks.\n- If\
    \ none of the `except` blocks can handle the exception that was raised, then the\
    \ exception propagates to the next higher level, which we will examine in detail\
    \ in section 13.4.\n\nLet us revisit `ExceptionHandlingDemo1.py`: if the user\
    \ does not give us a valid integer as input, then an attempt to convert such a\
    \ string to an integer using the `int()` function results in `ValueError` being\
    \ raised. Let us now handle both `ValueError` and `ZeroDivisionError`.\n\n## ExceptionHandlingDemo2.py\n\
    \n```python\n#!/usr/bin/python\n\n# Exception Handling Demo\n# Separate handling\
    \ of each exception\n\ntry:\n    n = int(input(\"Enter an integer:\"))\n    quotient\
    \ = int(100/n)\n    print(\"100/{} = {}\".format(n, quotient))\nexcept ValueError:\n\
    \    print(\"Invalid input! Please enter an integer.\")\nexcept ZeroDivisionError:\n\
    \    print(\"Sorry! Division by zero is not permitted!\")\n\nprint(\"Thanks for\
    \ using this program!\")\n```\n\n## Output:\n\n```\nEnter an integer:5\n100/5\
