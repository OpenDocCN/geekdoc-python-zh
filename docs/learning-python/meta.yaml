    # 9.2.4 Anchoring Operators


    So far, we have emphasized that when using regular expressions, it does not matter
    where the match occurs. However, there are operators available to restrict the
    search at the beginning of a string, at the end of a string, or both.


    # 9.2.4.1 Anchoring at the Beginning of a String


    If a RE starts with a `^`, it implies that the match should occur at the beginning
    of the string only.


    Thus, the RE `^not` will match any string that starts with `not` and will reject
    strings that do not start with `not`, as shown below:


    | Regular Expression: `^not` |

    | :--- | :--- |

    | **Matches** | **Rejects** |

    | `not` | `cannot` |

    | `nothing` | `net` |


    > **NOTE:**

    The escape sequence `\A` at the beginning of a RE plays the same role as the `^`
    operator. Thus, the RE `^not` is identical to `\Anot`.


    # 9.2.4.2 Anchoring at the End of a String Using the $ Operator


    If a RE ends with a `$`, it implies that the match should occur at the end of
    the string only.


    Thus, the RE `not$` will match any string that ends with `not` and will reject
    strings that do not end with `not`, as shown below:'
  - '[PAGE 235]


    | Regular Expression: not$ |

    |---|---|

    | **Matches** | **Rejects** |

    | **not** | nothing |

    | can**not** | net |


    > **NOTE:**

    The escape sequence \Z at the end of a RE plays the same role as the $ operator.
    Thus, the RE not$ is identical to not\Z.


    # 9.2.4.3 Anchoring at Word Boundaries


    A word boundary is defined as the transition from a sequence of word-forming characters
    (the ones that match \w) to a sequence of non word-forming characters (the ones
    that match \W) or vice-versa. It also includes the special cases of the boundary
    between the start of a string and a word-forming character and the boundary between
    a word-forming character and the end of a string.


    The word boundaries are highlighted in the example below:


    ```

    "Take this 500 bucks, said he"

    ^   ^^ ^^^^^^^ ^ ^ ^ ^^

    ```


    The \b escape sequence matches a null string at a word boundary. It''s purpose
    is to ensure a match at the right place. Thus, the RE \bnot will match those strings
    that contain not that starts at a word boundary, as shown below:


    | Regular Expression: \bnot |

    |---|---|

    | **Matches** | **Rejects** |

    | **not** | nothing |

    | this is **not** bad | cannot |

    | Whose **note** is this? | This cannot happen |'
  - '[PAGE 236]


    The RE `not\b` will match those strings that contain `not` that ends at a word
    boundary, as shown below:


    | Regular Expression: `not\b` |

    |---|---|

    | **Matches** | **Rejects** |

    | `not` | `nothing` |

    | This is **not** bad | `cannot` |

    | This can**not** happen | Whose note is this? |


    The RE `\bnot\b` will match those strings that contain `not` that starts at and
    ends at a word boundary вАУ or in other words, strings that contain the *word* `not`,
    as shown below:


    | Regular Expression: `\bnot\b` |

    |---|---|

    | **Matches** | **Rejects** |

    | `not` | `note this point` |

    | This is **not** bad | Tie this knot |


    # 9.2.4.4 Negated Anchoring at Word Boundaries


    The `\B` escape sequence is the opposite of `\b` вАУ it matches a null string anywhere
    except at word boundaries.


    Thus, the RE `\Bnot` will match those strings that contain `not` that does not
    start at a word boundary, as shown below:


    | Regular Expression: `\Bnot` |

    |---|---|

    | **Matches** | **Rejects** |

    | This can**not** happen | `not` |

    | Tie this **knot** | Whose note is this? |


    The RE `not\B` will match those strings that contain `not` that does not end at
    a word boundary, as shown below:'
