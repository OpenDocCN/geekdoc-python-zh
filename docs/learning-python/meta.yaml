    # 10.6.2 Keyword Arguments for Default Arguments


    One of the problems in using default arguments is that the order has to be retained.
    Thus, given 2 default consecutive arguments, it is not possible to skip the first
    one while providing an explicit value for the second one. But this becomes possible
    now using keyword arguments as shown below:


    ```

    >>> def f(a,b,c=2,d=3):

    ...     print(a,b,c,d)

    ...

    >>> f(10,20,30)

    10 20 30 3

    >>> f(10,20,d=30)

    10 20 2 30

    ```


    # Observation:


    +   1. In the first example, `f(10,20,30)`, 30 is assumed to be the value of c
    and d is assumed to have been omitted and thus assumed to be the default value
    3.

    2. In the second example, `f(10,20,d=30)`, the keyword argument d=30 explicitly
    states that the value of d should be 30. The value of c is assumed to have been
    omitted and thus assumed to be the default value 2.


    > **NOTE:**

    A keyword argument cannot be followed by a non-keyword argument.


