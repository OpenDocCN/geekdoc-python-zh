    The next step is to configure the installation. Depending on your requirement,
    there are a couple of options. If you want this version of Python to be installed
    for all users of the system (and you have root privileges via `su` or `sudo`),
    run configure:


    ```

    $ ./configure

    ```


    The above command will configure Python to be installed in `/usr/local`. If you
    do not have root privileges or wish to make this a local installation for the
    current user, run configure in this manner:


    ```

    $ ./configure -prefix=/some/other/directory

    ```


    Typically in such cases, the specified directory would be a subdirectory within
    the current user''s home directory. Here is an example of how the above command
    would actually be used:


    ```

    $ ./configure -prefix=$HOME/py-352

    ```


    The above program will configure Python to be installed in the directory `py-352`
    under the current user''s home directory.

    After the configuration is performed, run the make command:


    ```

    $ make

    ```


    The last step is to copy the final files to the destination location. If you had
    opted for a global installation, run `make install` as root:


    ```

    $ sudo make install

    ```


    The Python interpreter will now be available to all users.

    If you had opted to install in a local directory under the current user''s home
    directory, run `make install` without root privileges:


    ```

    $ make install

    ```


    The Python interpreter would now be available inside the bin subdirectory within
    the installation directory. Considering our example of local directory "$HOME/py-352",
    the interpreter will now be available at ''$HOME/py-352/bin/python3''. You could
    add the directory to the PATH variable so that you could just type in python3
    henceforth. To do so, add this line to your ~/.bashrc file:


    ```

    PATH="$PATH:~/py-352/bin"

    ```


    ## 1.4 The Python Interpreter


    Assuming you have taken care of changing the PATH environment variable as suggested
    in section 1.3, you can launch the Python 3.x interpreter by typing:


    ```

    python3

    ```


    You will be greeted by the following interpreter screen:


    ```

    Python 3.5.2 (default, Sep 14 2016, 11:28:32)

    [GCC 6.2.1 20160901 (Red Hat 6.2.1-1)] on linux

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    The ">>>" is the **Python prompt** (technically the Python primary prompt) вАУ an
    indication that the Python interpreter is ready to accept commands from you. You
    can type in any valid Python statement or expression here and the result is immediately
    displayed. We will use this feature to quickly test stuff when introducing a new
    concept. Of course, for bigger pieces of code, we will prefer a full-fledged Python
    script.


    Let us first try out giving expressions at the Python prompt:


    ```

    >>> 2+3

    5

    >>>

    ```


    **Observation:**


    1. `2+3` is a valid expression in Python. If it was an invalid expression, we
    would have got an error message.

    2. The Python interpreter responds by printing the value of the expression, 5
    in this case.

    3. After finishing with the expression, the Python interpreter shows the Python
    prompt again, waiting for the next command from us.


    Let us also type in a valid Python statement and see what happens:


    ```

    >>> import math

    >>>

    ```


    **Observation:**


    1. The statement "`import math`" is a valid statement in Python and means that
    we wish to import the `math` module. Had the statement been invalid, we would
    have received an error message.

    2. Valid Python statements are executed by the Python interpreter immediately,
    though its effect might not always be visible. The Python interpreter prints the
    result of the statement only if either the statement was actually an expression
    (in which case, the value of the expression is printed), or we had explicitly
    issued a Python statement to print something (using the `print()` function, for
    instance, which we will see later on).


    Now that we know how to work on the Python interpreter, let us also learn how
    to quit the interpreter when we are done. Typing an end-of-file character (Control-D
    on Unix/Linux, Control-Z on Windows) at the Python primary prompt causes the interpreter
    to exit. You can also exit the interpreter by typing the `quit()` command:


    ```

    >>> quit()

    ```


    The interpreter''s line-editing features include the following (provided the system
    supports them):


    1. **Interactive editing** вАУ the ability to edit the current line contents before
    submission by using cursor keys, backspace and delete keys.

    2. **History substitution** вАУ the ability to reproduce previously entered lines
    by using the up and down cursor keys.

    3. **Code completion** вАУ the ability to complete the current word when the user
    presses tab (or produces a list of options when there are multiple possibilities).


    The interpreter operates somewhat like the Unix shell: when called with standard
    input connected to a tty device, it reads and executes commands interactively;
    when called with a file name argument or with a file as standard input, it reads
    and executes a script from that file.


    A second way of starting the interpreter is:


    ```

    python -c command [arg] ...

    ```


    This launches the Python interpreter which executes the statement(s) in command,
    analogous to the Unix shell''s -c option. Since Python statements often contain
    spaces or other characters that are special to the shell, it is usually advised
    to quote command with quotes (preferably single quotes).


    Here''s an example:


    ```

    $ python3 -c ''a=2+3; print(a)''

    5

    ```


    **Observation:**


    1. We have given 2 statements: `a=2+3` and `print(a)`. Python understands they
    are separate statements because of the semi-colon (`;`) between them. The space
    given between them is only for readability.

    2. Since the shell might have a problem with some special characters within the
    Python statements (like semi-colon and space), we prefer to enclose the set of
    statements within single quotes, the contents of which the shell will not process.

    3. After executing the set of statements, the Python interpreter automatically
    terminates.


    ## 1.5 Python Editors and IDEs


    ### 1.5.1 Editors


    There are many editors available for users to code in Python. The most popular
    ones which have been designed especially to suit the needs of Python programmers
    are:


    1. **Sublime Text** вАУ Supported on Linux, Windows, Mac OS X. (Website: https://www.sublimetext.com/3)

    2. **SPE (Stani''s Python Editor)** вАУ Supported on Linux, Windows, Mac OS X (Website:
    https://sourceforge.net/projects/spe/)

    3. **SciTE** - Supported on Windows & Linux (Website: http://www.scintilla.org/SciTEDownload.html)

    4. **Geany** вАУ Supported on Windows, Linux, MAC OS X (Website: https://www.geany.org/Download/Releases)


    Besides the above, vim and emacs are extensively used for Python programming on
    Linux.


    ### 1.5.2 IDEs


    The IDEs most suitable for Python are:


    1. **PyCharm** вАУ Supported on Windows, Linux, MAC OS X (Website: https://www.jetbrains.com/pycharm/download/)

    2. **Wing IDE** - Supported on Windows, Linux, MAC OS X (Website: http://www.wingware.com/downloads)

    3. **Pyzo** вАУ Supported on Windows, Linux, MAC OS X (Website: http://test.pyzo.org/downloads.html)

    4. **PyScripter** вАУ Supported only on windows (Website: https://sourceforge.net/projects/pyscripter/)


    Eclipse users who do not wish to switch to other IDEs, can make use of PyDEV plugin
    for Python support.


    ## 1.6 Running Python Scripts


    Section 1.4 introduced the fact that you can type in Python code and get it executed
    a line at a time directly from the interpreter. For bigger pieces of code, however,
    it is preferable to save the instructions in the form of a Python script (a file
    with a `.py` extension) and get it executed as a unit by the interpreter. Yet,
    there are 2 ways of doing so:


    1. **Feeding the script to the Python interpreter.** In this method, you invoke
    the python interpreter and pass the filename (pathname if the script is not in
    the current working directory) of the script as an argument. For example, to run
    the script `test.py`, the command will probably be `python test.py`.

    2. **Executing the script directly.** This technique is especially true in the
    UNIX/Linux world and is considered to be a better technique! In this method, we
    grant execute permission to the Python script, ensure that the first line of the
    Python script selects the Python interpreter (more on this soon), and execute
    the script directly by providing its pathname. The first line of the'
