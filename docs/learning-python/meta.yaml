    -   [x] Create in-memory temporary databases\n\n## 16.1 Introduction\n\nThis chapter\
    \ is not intended as a complete material on databases and SQL programming. That\
    \ would perhaps require a complete book of its own! We will nevertheless explore\
    \ some basic concepts rapidly that will allow us to focus on how we can deal with\
    \ SQLite databases in Python in the main part of this chapter.\n\n### 16.1.1 Introduction\
    \ to Databases\n\nWhenever we find the need to deal with huge amounts of data,\
    \ we find a need for organising them in a logical fashion that makes it manageable\
    \ to store and access that data. A **database** is precisely that: an organised\
    \ collection of data. In more complicated systems, a **Database Management System\
    \ (DBMS)** takes care of interfacing with and managing the database.\n\nA **Relational\
    \ DBMS (RDBMS)** is a type of database system that is based on the concept of\
    \ relations that help link data stored across different tables. These are by far\
    \ the most popular form of databases, though of late NewSQL is gaining prominence.\n\
    \nSince Object Oriented Programming became very popular, databases also evolved\
    \ to natively support objects вАУ such a database system is called an **Object Database**\
    \ (if objects can be stored and retrieved directly) or an **Object Relational\
    \ Database** (if the underlying storage is relational but the view provided is\
    \ object-oriented).\n\nAs mentioned earlier, what is gaining prominence is NewSQL\
    \ and NoSQL. **NoSQL** deals with key-value pairs as opposed to the standard table\
    \ structure used in RDBMS. **NewSQL** emphasises on the use of SQL to deal with\
    \ NoSQL databases, keeping scalability and compatibility in mind.\n\nThe most\
    \ common language used for programming and interacting with databases is **SQL\
    \ вАУ Structured Query Language**. SQL comprises of a set of standard statements\
    \ having a pre-defined format. The language is English-like and case insensitive.\
    \ SQL statements are broadly classified into:\n\n1.  **Data Definition Language\
    \ (DDL)** that comprises of statements that deal with tables вАУ their structures,\
    \ creation, destruction, etc. Example: the `CREATE TABLE` statement.\n2.  **Data\
    \ Control Language (DCL)** that comprises of statements that deal with access\
    \ rights and permissions. Example: the `GRANT` statement.\n3.  **Data Manipulation\
    \ Language (DML)** that comprises of statements that deal with changes to data.\
    \ Example: the `INSERT` statement.\n4.  **Data Query Language (DQL)** that comprises\
    \ of the `SELECT` statement in all its forms and basically deals with the extraction\
    \ of data.\n\nThe next few sections will deal with DDL, DML and DQL in brief.\
    \ We will not be considering DCL as access rights is not a critical issue when\
    \ simple databases are created using SQLite.\n\n### 16.1.2 An Overview of Data\
    \ Definition Language (DDL)\n\nThe most commonly used DDL SQL statements are `CREATE\
    \ TABLE` to create a table and `DROP TABLE` to delete and remove a table.\n\n\
    #### 16.1.2.1 The CREATE TABLE Statement\n\nHere is an example of a DDL statement\
    \ to create an `Employee` table:\n\n```\nCREATE TABLE Employee\n(\n    name  TEXT,\n\
    \    id    INTEGER,\n    email TEXT\n)\n```\n\n**Observation:**\n\n1.  SQL is\
    \ not case sensitive and therefore we can use any case we wish, but we will stick\
    \ to upper-case for keywords and lower-case for identifier names as a convention.\
    \ This convention is followed by many.\n2.  This `Employee` table will have 3\
    \ columns or fields: `name`, `id` and `email`.\n3.  `TEXT` and `INTEGER` are standard\
    \ data types. `TEXT` can help represent any textual content of varying length\
    \ whereas `INTEGER` can help represent any normal integer.\n\nIt is possible to\
    \ create a table conditionally only if it does not already exist. This uses a\
    \ slightly different syntax:\n\n```\nCREATE TABLE IF NOT EXISTS Employee\n(\n\
    \    name  TEXT,\n    id    INTEGER,\n    email TEXT\n)\n```"
