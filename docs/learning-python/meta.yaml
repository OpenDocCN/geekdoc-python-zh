    # 7.3 Counting Dictionary Elements


    The `len()` function can be used to count the number of key-value pairs in a dictionary:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> len(D)

    2

    >>> D={''apple'':''red''}

    >>> len(D)

    1

    >>> D={}

    >>> len(D)

    0

    ```


    # 7.4 Iterating through Dictionary Elements


    Since each element in a dictionary is a key-value pair, iterating through a dictionary
    can be of multiple forms: iterating through the keys in a dictionary or iterating
    through the values or iterating through the elements (key-value pairs). We will
    see examples of each.


    # 7.4.1 Iterating Through the Keys of a Dictionary


    The normal `for` loop can be used to iterate through the keys of a dictionary:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> for K in D: print(K)

    ...

    grapes

    apple

    ```


    The keys of a dictionary can be explicitly retrieved using the `dict.keys()` function,
    which returns a new view of the keys within the dictionary `dict` вАУ which means
    that if and when the keys of the dictionary `dict` changes, the view will also
    change automatically:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> K=D.keys()

    >>> for i in K: print(i)

    ...

    grapes

    apple

    ```'
  - '[PAGE 166]


    # 7.4.2 Iterating Through the Values of a Dictionary


    Just as how `dict.keys()` returns a view of all the keys in the dictionary `dict`,
    `dict.values()` returns a view of all the values in the dictionary `dict`:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> V=D.values()

    >>> for i in V: print(i)

    ...

    green

    red

    ```


    > **NOTE:**

    The order in which the values are returned is the same as the order in which their
    keys are returned.


    Of course, it is also possible to iterate through the keys and print out the corresponding
    values:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> for K in D: print(D[K])

    ...

    green

    red

    ```


    **Observation:**


    +   1. In the above example, we are iterating through the keys of the dictionary
    `D`.

    2. We are printing `D[K]`, which is the value associated with the key `K` in the
    dictionary `D`.


    # 7.4.3 Iterating Through the Key-Value Pairs of a Dictionary


    One way to iterate through the dictionary is to iterate through the keys of the
    dictionary and fetch the corresponding values using the keys. Another method,
    which is more direct, is to iterate through each key-value pair of the dictionary
    using the `dict.items()` function that returns the key-value pairs (each pair
    as a tuple), as shown in the example below:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> for K,V in D.items():

    ...     print(K,V)

    ...

    apple red

    grapes green

    ```'
