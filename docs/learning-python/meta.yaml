    1.  е≠ЧеЕЄзЪДйФЃжШѓе≠Чзђ¶ ''0'' еИ∞ ''9''пЉИеЄ¶еЉХеПЈпЉЙпЉМиАМдЄНжШѓжХіжХ∞пЉБиѓЈж≥®жДПпЉМйФЃеПѓдї•жШѓеЇПжХ∞пЉИжХіжХ∞пЉЙжИЦе≠Чзђ¶гАВињЩйЗМжИСдїђйЬАи¶БзЪДжШѓеЇПжХ∞дЄЇ 48-57 зЪДе≠Чзђ¶ ''0''
