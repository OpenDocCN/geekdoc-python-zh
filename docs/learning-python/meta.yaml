    \nж≠£е¶В `[]` зФ®дЇОи°®з§ЇеИЧи°®е≠ЧйЭҐйЗПпЉМ`{}` зФ®дЇОи°®з§Їе≠ЧеЕЄе≠ЧйЭҐйЗПгАВеЫЮй°Њзђђ6.1иКВпЉМ`{}` дєЯзФ®дЇОжЛђиµЈйЫЖеРИзЪДжИРеСШгАВйВ£дєИPythonе¶ВдљХеМЇеИЖйЫЖеРИеТМе≠ЧеЕЄеСҐпЉЯеИ©зФ®йЫЖеРИзФ±\
    \ `{}` еЖЕзФ®йАЧеПЈеИЖйЪФзЪДе§ЪдЄ™еЕГзі†зїДжИРпЉМиАМе≠ЧеЕЄзФ± `{}` еЖЕзФ®еЖТеПЈпЉИзФ®дЇОеИЖйЪФйФЃеТМеАЉпЉЙеТМйАЧеПЈпЉИзФ®дЇОеИЖйЪФеѓєпЉЙеИЖйЪФзЪДе§ЪдЄ™еЕГзі†зїДжИРињЩдЄАдЇЛеЃЮгАВ\n\n```\n\
    >>> D={'apple':'red','grapes':'green'}\n>>> D\n{'grapes': 'green', 'apple': 'red'}\n\
