  md: '# # PARSING JSON


    # ## 19.1 Introduction


    The **JavaScript Object Notation (JSON)** has become a popular textual representation
    of data. Like XML, JSON too is textual and structured, but differs from XML by
    requiring significantly lesser metadata within the document! Originally developed
    as a textual representation of JavaScript objects that can be transmitted through
    streams, it is now an effective replacement for XML in many cases!


    A JSON document basically comprises of collections and individual values. The
    supported collections are objects and arrays that map on to Python''s `dict` and
    `list` types respectively. The scalar values could be numbers or strings, mapping
    to Python''s `int/float` and `str` types. In addition, JSON also supports Boolean
    literals (`true` and `false`) and a special `null` literal, which map on to Python''s
    `bool` and `None` respectively.


    JSON objects and Python objects can be inter-converted using the built-in `json`
    module. The interface of this module is very similar to the pickle module covered
    in section 14.6 & 14.7 where we had used the methods `dump()` and `load()`, but
    a significant difference is that multiple JSON objects written one after another
    to a single file will not make it a JSON file! A single JSON file is only supposed
    to have a single JSON object within it (which in turn can have anything!). Multiple
    JSON objects written sequentially into a file can have it''s applications, but
    is technically not a single JSON file.


    # ## 19.2 Converting From Python to JSON


    # ### 19.2.1 Converting Python Objects into JSON Strings


    Before we examine the methods that help convert Python objects into their JSON
    equivalents, we will first see the JSON equivalents of each type of Python object:


    | Python Object | JSON Representation |

    |---|---|

    | `dict` | Object |

    | `list`, `tuple` | Array |

    | `str` | String |

    | `int`, `float` | Number |

    | `True`, `False` | `true`, `false` |'
