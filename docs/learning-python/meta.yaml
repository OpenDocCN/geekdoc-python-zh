  - '[PAGE 525]


    # # MODULES


    # ## 15.1 Need for Modules


    So far, we have seen 2 ways of executing Python code:


    +   1. By typing Python instructions directly into the interpreter and getting
    it executed immediately

    2. By storing Python instructions in a file and running it as a scripting


    While the former approach has the advantage of quickly getting the output for
    any instruction, when it comes to writing larger pieces of code, the latter approach
    is definitely preferred. In the former approach, all code and data (functions
    and variables) introduced are forgotten the moment the user quits the interpreter.
    In the latter approach, the program runs the same way each time the user runs
    it.


    When we write bigger pieces of code, we observe the following:


    +   1. Our program might become too long and we want a way to organise it into
    manageable chunks (files)

    2. We might have multiple Python scripts with various functions already defined
    that we wish to use in another piece of work


    The solution for both the problems above is *modules*! A **module** is a reusable
    piece of Python code that can be used by other Python programs (and modules).
    In fact, when we run a Python script, it is assumed to be running as a default
    module called `__main__`. The name of the current module is available in the variable
    `__name__`.


    ```

    >>> print(__name__)

    __main__

    ```


    By storing a Python script as a module, we gain the following abilities:


    +   1. The contents of the module can be reused by other Python scripts

    2. The module so defined is considered to be a separate logical unit, having it''s
    own symbol table where identifiers are stored, preventing clashes with other modules
    that might have the same name(s) for their identifiers.


    By the way, there is nothing much to be done to вАЬconvertвАЭ a Python script into
    a Python module! Any Python script can be considered to be a module! However,
    you might still be interested in differentiating between a module and an executable
    script, and that is covered in detail in section 15.3.3.'
  - "[PAGE 526]\n\n# 15.2 Creating Modules\n\nArmed with this information of the advantages\
    \ of using modules and the fact that any Python script can be considered to be\
    \ a module, let us write our first module! Let us create a module that defines\
    \ a function `factorial` to find the factorial of an integer. We can then use\
    \ this module and call the function `factorial` from other Python scripts.\n\n\
    fact.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # Module to find the factorial\
    \ of an integer\n4.  \n5.  def factorial(n):\n6.      if n==0: return 1\n7.  \
    \    return n*factorial(n-1)\n```\n\nObservation:\n\n+   1. This is a simple Python\
    \ script, despite we calling it a module. No special changes were made to convert\
    \ this script into a module.\n2. This module is named `fact` because the filename\
    \ is `fact.py`. Thus, module names are derived from filenames.\n3. This module\
    \ defines a function called `factorial` that returns the factorial of the given\
    \ integer.\n4. When this script is executed, there is no output as there is no\
    \ code in the main script. This can be changed however, as covered in section\
    \ 15.3.3, but for the moment we are happy with the way this module is coded.\n\
    \n# 15.3 Importing Modules\n\nThe previous sections have shown us that modules\
    \ are meant to be reusable and module names are derived from filenames. Let us\
    \ now write a Python script that reuses the module `fact` defined earlier. In\
    \ order to use a module, the module has to be *imported*. Importing a module makes\
    \ the module name available to us in our script, and using the module name we\
    \ will be able to access the module contents, as we will soon discover. The syntax\
    \ for importing a module is:\n\n```\nimport moduleName\n```"
  - "[PAGE 527]\n\nIn our example, since `fact` is the name of the module, this is\
    \ how we'd import it before using the factorial function:\n\n```\n>>> import fact\n\
    ```\n\n# 15.3.1 Module Symbol Tables\n\nSection 15.1 mentioned that one of the\
    \ advantages of using modules is that each module has it's own symbol table where\
    \ it's identifiers are stored, thus eliminating clashes with any identifiers with\
    \ the same name in other modules and scripts. This section will throw more light\
    \ on this concept.\n\nAn *identifier* is a name given by the programmer to a program\
    \ element, and includes names of functions and variables. These identifiers are\
    \ stored in a data structure called a *symbol table*. Several symbol tables can\
    \ co-exist and contain their own identifiers as the symbol tables themselves are\
    \ identified by a name вАУ the name of the *module* that defined them! Section 15.2\
    \ introduced the fact that the module name is derived from the filename. Section\
    \ 15.1 introduced the fact that executed scripts are assumed to be a part of the\
    \ module named `__main__`. Thus, every identifier is present within a symbol table\
    \ identified by a module name or the default module name `__main__`.\n\nImporting\
    \ a module only adds the module name as an identifier to the symbol table of the\
    \ importer. The contents of a module are hidden within the symbol table of the\
    \ module. In our example, the statement `import fact` ensures that the identifier\
    \ `fact` is present in the symbol table of `__main__`, making it possible for\
    \ us to access `fact`. The `factorial` function is an identifier within the module\
    \ `fact` and is thus not directly accessible to us in `__main__`, but can be accessed\
    \ via `fact`, which is now available to us.\n\nWe will now write a program to\
    \ find the combination using the `factorial` function of the `fact` module:\n\n\
    # combination2.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # Program to find the\
    \ combination of 2 integers using modules.\n4.  \n5.  import fact\n6.  \n7.  def\
    \ ncr(n,r):\n8.      return int(fact.factorial(n)/\n9.      (fact.factorial(r)*fact.factorial(n-r)))\n\
    ```"
- md: "## 15. Modules\n\n### 15.3.2 Importing Names From Module Symbol Tables\n\n\
    The previous section showed how to import modules and the fact that the module's\
    \ identifiers are not directly available to us. There is a solution, however.\
    \ If we wish to import a particular identifier (or a set of identifiers) from\
    \ a module directly to our current symbol table, there is a variant of `import`\
    \ available with the following syntax:\n\n```\nfrom moduleName import identifier\n\
    ```\n\nThis will copy the identifier `identifier` from the symbol table of module\
    \ `moduleName` into our current symbol table, making it possible for us to directly\
    \ access `identifier`, as shown below for the `factorial` function of the `math`\
    \ module:\n\n```\n>>> from math import factorial\n>>> factorial(5)\n120\n```\n\
    \nWhile this has the advantage that it simplifies the way we use the identifier\
    \ (`factorial`) without using the module name each time to access it, it also\
    \ has the disadvantage that it can pollute the current symbol table and increase\
    \ the number of identifiers, thereby making it possible for clashes to occur as\
    \ more identifiers from more modules join in similarly. Though convenient, this\
    \ practice of importing identifiers is frowned upon by professionals.\n\nThe question\
    \ arises: what will happen if we import identifiers with the same name from different\
    \ modules? The answer is that each `import` can potentially overwrite existing\
    \ identifiers in the symbol table, thus giving most preference to the last import.\
    \ This is illustrated below:\n\n```\n>>> from math import factorial\n>>> factorial(5)\n\
    120\n>>> from fact import factorial\n>>> factorial(5)\n120\n>>> factorial.__doc__\n\
    >>> from math import factorial\n>>> factorial.__doc__\n'factorial(x) -> Integral\\\
    n\\nFind x!. Raise a ValueError if x is\\nnegative or non-integral.'\n```\n\n\
    **Observation:**\n\n- 1. We first imported the `factorial` function from the `math`\
    \ module and verified that it worked correctly.\n- 2. We then imported the `factorial`\
    \ function from the `fact` module and verified that we still get the correct output.\
    \ The fact that there is a clash in the identifier name `factorial` did not result\
    \ in any error. The fact that both `math.factorial` and `fact.factorial` give\
    \ us the same output might make it a little difficult for us to figure out which\
    \ of the two was invoked.\n- 3. Recollect from section 10.15 that functions can\
    \ have documentation strings. We would expect `math.factorial` to also have it,\
    \ but our `fact.factorial` did not have one. We can use this knowledge to figure\
    \ out which module's `factorial` function was called.\n- 4. From the output above,\
    \ we can see that each `import` overwrites the previous `factorial` with a new\
    \ copy taken from the specified module.\n\nHere is `combination2.py` rewritten\
    \ with this neater (but probably unprofessional) syntax:\n\n### combination3.py\n\
    \n```\n1.  #!/usr/bin/python\n2.  \n3.  # Program to find the combination of 2\
    \ integers using modules.\n4.  \n5.  from fact import factorial\n6.  \n7.  def\
    \ ncr(n,r):\n8.      return int(factorial(n)/(factorial(r)*factorial(n-r)))\n\
    9.  \n10. x,y = input(\"Enter 2 integers:\").split(' ')\n11. x,y = int(x),int(y)\n\
    12. print(\"The combination of {} and {} is {}\".format(x,y,ncr(x,y)))\n```\n\n\
    ### Output:\n\n```\nEnter 2 integers:5 3\nThe combination of 5 and 3 is 10\n```\n\
    \n### Observation:\n\n- 1. This program is based on `combination2.py`.\n- 2. We\
    \ have changed line 5 to import only the identifier `factorial` and make it directly\
    \ available to us.\n- 3. Line 8 uses the `factorial` function directly without\
    \ using the module name `fact` to identify it.\n\nBefore we conclude this section,\
    \ let us introduce other related forms of importing as well:\n\nIt is possible\
    \ to import multiple identifiers into the current symbol table by giving a tuple\
    \ of identifiers as shown in the following syntax:\n\n```\nfrom moduleName import\
    \ identifier1 [,identifier2...]\n```\n\n> **NOTE:**\nWe can import as many identifiers\
    \ from a module as required. This syntax reduces the number of `import` statements\
    \ required to achieve this goal.\n\nAs a special case, we can import all permissible\
    \ identifiers from a module into the current symbol table using the following\
    \ syntax:\n\n```\nfrom moduleName import *\n```\n\n> **NOTE:**\nWhile this statement\
    \ should ideally import all identifiers from the module `moduleName` into the\
    \ current symbol table, the fact is that the module controls which identifiers\
    \ are imported when `*` is used! If the module does not explicitly specify what\
    \ all is permissible to be imported when this syntax is used, the default rule\
    \ is to import all identifiers that do not have a leading single underscore! Also\
    \ note that this syntax of importing is frowned upon by professionals as it pollutes\
    \ the importer's namespace!\n\n### 15.3.3 Executing Modules\n\nFrom the previous\
    \ sections, we have learnt the following:\n\n- 1. Modules are merely normal Python\
    \ scripts meant to be reusable.\n- 2. Before we can use the contents of a module,\
    \ we need to import.\n\nThis section delves deeper into what happens when we import\
    \ a module.\nImporting a module gives a chance for the module to initialize itself.\
    \ This is done by executing the contents of the module, just as how someone would\
    \ execute a Python script!\n\nLet us modify our module `fact.py` to demonstrate\
    \ this property:\n\n### fact2.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # Module\
    \ to find the factorial of an integer\n4.  # Demonstration of module execution\n\
    5.  \n6.  def factorial(n):\n7.      if n==0: return 1\n8.      return n*factorial(n-1)\n\
    9.  \n10. print(\"Module loaded successfully!\")\n```\n\n### Output:\n\n```\n\
    Module loaded successfully!\n```\n\n### Observation:\n\n- 1. This program is based\
    \ on `fact.py` with only 1 addition of line 10.\n- 2. Line 10 prints a message\
    \ when executed, which we can use as a proof as execution of statements.\n\nWe\
    \ get the above output when we directly run the Python script as a program. But\
    \ the point is that we will continue to get the same output even if this module\
    \ is imported, as shown in the below interactive session:\n\n```\n>>> import fact2\n\
    Module loaded successfully!\n```\n\nWe therefore conclude that *a module is executed\
    \ when imported*. However, this execution is performed only when the module is\
    \ imported for the first time. Thereafter, subsequent imports of the same module\
    \ do not result in execution of the module.\n\nInterestingly, a module can differentiate\
    \ between the two forms of execution as follows:\n\n- 1. If the module is being\
    \ executed because the user is trying to run it as a script (which we shall call\
    \ *direct execution*), the value of the variable `__name__` would be `__main__`\
    \ (as discussed in section 15.1).\n- 2. If the module is being executed because\
    \ some other script imported it (which we shall call *indirect execution*), the\
    \ value of the variable `__name__` would be the module name (in this example,\
    \ `fact2`).\n\nLet us now finally rewrite the previous module so that the output\
    \ is different for direct and indirect execution.\n\n### fact3.py\n\n```\n1. \
    \ #!/usr/bin/python\n2.  \n3.  # Module to find the factorial of an integer\n\
    4.  # Demonstration of module execution\n5.  \n6.  def factorial(n):\n7.     \
    \ if n==0: return 1\n8.      return n*factorial(n-1)\n9.  \n10. if __name__ ==\
    \ \"__main__\":\n11.     # Direct execution\n12.     print(\"Script executed successfully!\"\
    )\n13. else:\n14.     # Indirect execution\n15.     print(\"Module loaded successfully!\"\
    )\n```\n\n### Output:\n\n```\nScript executed successfully!\n```\n\n### Interactive\
    \ session:\n\n```\n>>> import fact3\nModule loaded successfully!\n```\n\n### Observation:\n\
    \n- 1. Line 10 checks if the execution is direct (`__name__ == \"__main__\"`)\
    \ or indirect (`__name__` would contain the module name).\n- 2. If the script\
    \ is directly executed, lines 11-12 will be executed, as can be seen from the\
    \ output above.\n- 3. If the script is indirectly executed by importing it, lines\
    \ 14-15 will be executed, as can be seen from the interactive session above."
  mdcn: "## 15. ж®°еЭЧ\n\n### 15.3.2 дїОж®°еЭЧзђ¶еПЈи°®дЄ≠еѓЉеЕ•еРНзІ∞\n\nдЄКдЄАиКВе±Хз§ЇдЇЖе¶ВдљХеѓЉеЕ•ж®°еЭЧпЉМдї•еПКж®°еЭЧзЪДж†ЗиѓЖзђ¶еєґйЭЮзЫіжО•еПѓзФ®зЪДдЇЛеЃЮгАВзДґиАМпЉМе≠ШеЬ®дЄАзІНиІ£еЖ≥жЦєж°ИгАВе¶ВжЮЬжИСдїђеЄМжЬЫе∞ЖзЙєеЃЪзЪДж†ЗиѓЖзђ¶пЉИжИЦдЄАзїДж†ЗиѓЖзђ¶пЉЙдїОж®°еЭЧзЫіжО•еѓЉеЕ•еИ∞ељУеЙНзђ¶еПЈи°®дЄ≠пЉМеПѓдї•дљњзФ®\
