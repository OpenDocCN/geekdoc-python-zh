    # 10. Functions


    ```

    >>> def hi():

    ...     print("Hello World")

    ...

    >>> x=hi()

    Hello World

    >>> print(x)

    None

    >>> print(hi())

    Hello World

    None

    ```


    # Observation:


    +   1. In the above examples, each call to the function `hi` will anyway print
    "Hello World" apart from anything else that we have given.

    2. There is a lot of difference between `hi` and `hi()`: `hi` is a reference to
    the function whereas `hi()` is a function call that results the function getting
    executed and it''s return value getting substituted at the place of call!


    But what is practically more useful however is that we can return values from
    functions. The `return` statement also permits the optional return of a single
    value that will be substituted at the place of call.


    We have dealt with the `sum` function many times before, but each time it was
    printing the result on the standard output. This time, we will modify it to return
    the sum instead of printing it:


    ```

    >>> def sum(x,y):

    ...     return x+y

    ...

    >>> sum(2,3)

    5

    >>> s=sum(2,3)

    >>> print(s)

    5

    ```


    As was discussed in the previous section, there can be multiple such `return`
    statements within a function, but the moment one of them is executed, control
    is returned to the caller and the return value is substituted at the place of
    call.


    Let us apply this by writing a program to find the GCD of 2 integers using a function
    called `gcd` which returns the result to the main script.'
