    ## 9.6 дљњзФ®еМєйЕНй°є


    еГП `search()`гАБ`match()` еТМ `fullmatch()`пЉИеЬ®зђђ 10.4 иКВдЄ≠дїЛзїНпЉЙињЩж†ЈзЪДеЗљжХ∞йГљж£АжЯ•зїЩеЃЪе≠Чзђ¶дЄ≤жШѓеР¶еМєйЕНзїЩеЃЪзЪДж≠£еИЩи°®иЊЊеЉПпЉМеєґеЬ®жЙЊеИ∞еМєйЕНжЧґињФеЫЮдЄАдЄ™
