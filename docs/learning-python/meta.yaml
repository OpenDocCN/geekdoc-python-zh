    \ 14.8.5 cp зЪДеЃЮзО∞пЉЪе§НеИґжЦЗдїґ\n\nUNIX зЪД `cp` еСљдї§е∞ЖдЄАдЄ™жЦЗдїґе§НеИґеИ∞еП¶дЄАдЄ™жЦЗдїґгАВињЩжШѓдЄАдЄ™еЃЮзО∞з±їдЉЉеКЯиГљзЪД Python иДЪжЬђгАВ\n\n\
    **cp.py**\n\n```python\n#!/usr/bin/python\n\n# cp еСљдї§зЪДеЃЮзО∞пЉМзФ®дЇОе§НеИґжЦЗдїґ\n\nsource_filename\
    \ = input(\"Enter source filename:\")\ndest_filename = input(\"Enter destination\
    \ filename:\")\n\ntry:\n    source_file = open(source_filename,\"rb\")\n    dest_file\
    \ = open(dest_filename,\"wb\")\n    while 1:\n        byte = source_file.read(1)\n\
    \        if not byte: break\n        dest_file.write(byte)\nexcept Exception as\
    \ e:\n    print(\"Unable to open file!\")\n    print(\"Reason: {}\".format(str(e)))\n\
    else:\n    print(\"File successfully copied!\")\n```\n\n**иЊУеЗЇпЉЪ**\n\n```\nEnter\
