    2.  еЕЂињЫеИґз≥їзїЯдїЕжФѓжМБжХ∞е≠Ч 0 еИ∞ 7гАВеЫ†ж≠§пЉМжИСдїђеЖ≥еЃЪдљњзФ®еАЉ `None` жЭ•жґИйЩ§ 8 еТМ 9гАВ

    3.  жИСдїђеЖ≥еЃЪдњЭзХЩе≠Чзђ¶ ''0'' дЄНеПШпЉМеЫ†ж≠§еЃГдЄНеЬ®е≠ЧеЕЄдЄ≠гАВ

