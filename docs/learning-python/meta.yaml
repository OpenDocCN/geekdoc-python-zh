    # APPENDIX вАУ PYTHON 2 VS. PYTHON 3


    # 21.1 Introduction


    Though we have stable releases of Python 3.x (3.6) and Python 2.x(2.7) available,
    the first question that comes to the mind of an individual is вАЬWhich version of
    Python do I use for my day to day activities?вАЭ. The short answer is вАЬPython 2
    is legacy and therefore Python 3 is the way to go!вАЭ. The long answer is вАЬit depends
    on what your needs are!вАЭ. However, if a beginner intends to start learning Python,
    he or she should consider learning and building on Python 3 and only if required,
    get gradually acquainted with Python 2 and its differences from Python 3.


    Python 3 evolved when the inventor of Python вАУ Guido Van Rossum вАУ decided to clean
    up Python 2 and in this journey gave very less importance to backward compatibility!
    It is therefore necessary to choose the right version and stick to it right from
    the beginning!


    It is interesting to note that few of the improvements in Python 3.0 & 3.1 were
    back-ported to Python 2.6 & 2.7 respectively! Hence, if there is a need to use
    Python 2, it is recommended to use Python 2.7.x.


    This module will first show you some fundamental and obvious differences between
    Python 2 and Python 3, then will proceed to show you how to convert legacy Python
    2 code into Python 3 with least effort, and finally, will show how to write code
    that runs equally well on both versions, if need be.


    # 21.2 The Fundamental Differences


    This section covers the fundamental and obvious changes that got introduced in
    Python 3.0 from Python 2.5


    # 21.2.1 The print() Function


    The `print` statement of Python 2 has been replaced by a `print()` function in
    Python 3.


    | Python 2 | Python 3 |

    | --- | --- |

    | >>> print "2+3=", 2+3<br>2+3=5 | >>> print("2+3=", 2+3)<br>2+3=5 |'
  - '[PAGE 647]


    # 21. Appendix вАУ Python 2 Vs. Python 3


    In Python 2, a trailing comma at the end of a print statement suppresses the newline
    character at the end. This has been replaced by the `end` keyword argument of
    the `print()` function in Python 3:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> print 25,`<br>`25`<br>`>>>` | `>>> print(25,end="")`<br>`25>>>` |


    > **NOTE:**

    In Python 2, the interpreter will display the prompt in the next line even when
    the print statement did not print a newline. This newline character will not be
    printed when executed as a script, however!


    To print an empty line, Python 3 uses `print()` whereas Python 2 uses `print`:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> print`<br>`>>>` | `>>> print()`<br>`>>>` |


    Keyword arguments like `end` were introduced in Python 3. We similarly can now
    provide a separator between items using the `sep` keyword argument (section 2.7.1.3)
    as follows:


    ```

    >>> print("I have", 5, "items", sep=":")

    I have:5:items

    ```


    # 21.2.2 Views and Iterators Instead of Lists


    Some methods that earlier returned lists/tuples in Python 2 have been replaced
    by methods that return views and iterators instead. What this means is that instead
    of getting an entire collection at one go, we instead get an object through which
    we can iterate and extract a single element at a time. This results in better
    efficiency. Of course, if required, we can construct a list or tuple out of it
    and access all the elements at once. This section shows some of the most noticeable
    changes introduced in Python 3 in this regard.'
- md: "## 21.2.3 Comparisons\n\nThe ordering comparison operators (<, <=, >=, >) raise\
    \ a TypeError exception when the operands don't have a meaningful natural ordering.\n\
    \n| Python 2 | Python 3 |\n| --- | --- |\n| >>> 1<\"\"<br>True<br>>>> 0>None<br>True<br>>>>\
    \ None<None<br>False | >>> 1<\"\"<br>Traceback (most recent call last):<br>  File\
    \ \"<stdin>\", line 1, in <module><br>TypeError: '<' not supported between instances\
    \ of 'int' and 'str'<br>>>> 0>None<br>Traceback (most recent call last):<br> \
    \ File \"<stdin>\", line 1, in <module><br>TypeError: '>' not supported between\
    \ instances of 'int' and 'NoneType'<br>>>> None<None<br>Traceback (most recent\
    \ call last):<br>  File \"<stdin>\", line 1, in <module><br>TypeError: '<' not\
    \ supported between instances of 'NoneType' and 'NoneType' |\n\nFurthermore, the\
    \ cmp() function (and the underlying __cmp__() magic method) has been removed\
    \ in Python 3:\n\n| Python 2 | Python 3 |\n| --- | --- |\n| >>> cmp(2,3)<br>-1\
    \ | >>> cmp(2,3)<br>Traceback (most recent call last):<br>  File \"<stdin>\",\
    \ line 1, in <module><br>NameError: name 'cmp' is not defined |\n\nIf there is\
    \ a need to use cmp() in Python 3, the expression to use is (a > b) - (a < b)\
    \ instead of cmp(a, b).\n\n## 21.2.4 Integers\n\nThe `long` data type has been\
    \ renamed to `int` in Python 3. Regardless of the \"size\" of the integer, the\
    \ data type in Python 3 is `int`, which can handle arbitrarily large integers\
    \ (section 2.3.1):\n\n| Python 2 | Python 3 |\n| --- | --- |\n| `>>> type(29482364)`<br>`<type\
    \ 'int'>`<br>`>>>`<br>`type(2948236423472903749234)`<br>`<type 'long'>` | `>>>\
    \ type(29482364)`<br>`<class 'int'>`<br>`>>>`<br>`type(2948236423472903749234)`<br>`<class\
    \ 'int'>` |\n\nThe `sys.maxint` constant was removed, since there is no longer\
    \ a limit to the value of integers.\n\nThe `repr()` of a long integer doesn't\
    \ include the trailing `L` anymore, so code that unconditionally strips that character\
    \ will chop off the last digit instead. Use `str()` instead to obtain the string\
    \ representation of an integer in Python 3.\n\nIn Python 3, the division operator\
    \ (`/`) can return a `float`. To guarantee integer division, the `//` operator\
    \ can be used:\n\n| Python 2 | Python 3 |\n| --- | --- |\n| `>>> 1/2`<br>`0` |\
    \ `>>> 1/2`<br>`0.5`<br>`>>> 1//2`<br>`0` |\n\nOctal literals in Python 3 no longer\
    \ use the prefix \"0\" - \"0o\" needs to be used instead:\n\n| Python 2 | Python\
    \ 3 |\n| --- | --- |\n| `>>> 077`<br>`63` | `>>> 077`<br>`File \"<stdin>\", line\
    \ 1`<br>`    077`<br>`    ^`<br>`SyntaxError: invalid token`<br>`>>> 0o77`<br>`63`\
    \ |\n\n## 21.2.5 Unicode and ASCII\n\nPython 3 uses the concepts of text and binary\
    \ data instead of Unicode strings and 8-bit strings. All text is Unicode; however\
    \ *encoded* Unicode is represented as binary data. The type used to hold text\
    \ is `str`; while the type used to hold data is `bytes`. The biggest difference\
    \ with Python 2 is that any attempt to mix text and data in Python 3 raises `TypeError`,\
    \ whereas if you were to mix Unicode and 8-bit strings in Python 2, it would work\
    \ fine if the 8-bit string happened to contain only 7-bit ASCII bytes, but you\
    \ would get `UnicodeDecodeError` if it contained non-ASCII values.\n\n| Python\
    \ 2 | Python 3 |\n| --- | --- |\n| `>>> \"abc\"+b\"def\"`<br>`'abcdef'` | `>>>\
    \ \"abc\"+b\"def\"`<br>`Traceback (most recent call last):`<br>`  File \"<stdin>\"\
    , line 1, in <module>`<br>`TypeError: must be str, not bytes` |\n\n## 21.2.6 Syntax\
    \ Changes\n\nSome of the significant syntactic changes are highlighted in this\
    \ section.\n\nList comprehensions no longer support the syntactic form `[... for\
    \ var in item1, item2, ...]`. Use `[... for var in (item1, item2, ...)]` instead\
    \ in Python 3:\n\n| Python 2 | Python 3 |\n| --- | --- |\n| `>>> [x for x in 1,2,3]`<br>`[1,\
    \ 2, 3]` | `>>> [x for x in 1,2,3]`<br>`  File \"<stdin>\", line 1`<br>`    [x\
    \ for x in 1,2,3]`<br>`          ^`<br>`SyntaxError: invalid syntax`<br>`>>> [x\
    \ for x in (1,2,3)]`<br>`[1, 2, 3]` |\n\nIn Python 3, `nonlocal` is a reserved\
    \ word. Using `nonlocal x` you can now assign directly to a variable in an outer\
    \ (but non-global) scope.\n\n## 21. Appendix вАУ Python 2 Vs. Python 3\n\nTuple\
    \ parameter unpacking has been removed in Python 3. You can no longer write `def\
    \ f(a, (b, c)): ...`. Use `def f(a, b_c): b, c = b_c` instead:\n\n| Python 2 |\
    \ Python 3 |\n| --- | --- |\n| `>>> def f(a, (b,c)):`<br>`...     print \"a=\"\
    ,a`<br>`...     print \"b=\",b`<br>`...     print \"c=\",c`<br>`...`<br>`>>> f(1,\
    \ (2,3))`<br>`a= 1`<br>`b= 2`<br>`c= 3` | `>>> def f(a,b_c):`<br>`...     b,c=b_c`<br>`...\
    \     print(\"a=\",a)`<br>`...     print(\"b=\",b)`<br>`...     print(\"c=\",c)`<br>`...`<br>`>>>\
    \ f(1, (2,3))`<br>`a= 1`<br>`b= 2`<br>`c= 3` |\n\nPython 3 uses `!=` for comparison\
    \ instead of `<>` in Python 2:\n\n| Python 2 | Python 3 |\n| --- | --- |\n| `>>>\
    \ 1<>2`<br>`True` | `>>> 1!=2`<br>`True` |\n\nInteger literals no longer support\
    \ a trailing `l` or `L` (section 2.3.1). String literals no longer support a leading\
    \ `u` or `U` (section 2.3.4).\n\n## 21.2.7 Exception Handling\n\nPython 3 no longer\
    \ supports the syntax `raise exceptionClass message`. We need to stick to the\
    \ constructor syntax of `raise exceptionClass(message)`:\n\n| Python 2 | Python\
    \ 3 |\n| --- | --- |\n| `>>> raise ValueError, \"Invalid Value\"`<br>`Traceback\
    \ (most recent call last):`<br>`  File \"<stdin>\", line 1, in <module>`<br>`ValueError:\
    \ Invalid Value` | `>>> raise ValueError, \"Invalid Value\"`<br>`  File \"<stdin>\"\
    , line 1`<br>`    raise ValueError, \"Invalid Value\"`<br>`            ^`<br>`SyntaxError:\
    \ invalid syntax` |\n| `>>> raise ValueError(\"Invalid Value\")`<br>`Traceback\
    \ (most recent call` | `>>> raise ValueError(\"Invalid Value\")`<br>`Traceback\
    \ (most recent call` |\n\n```\nlast):\n    File \"<stdin>\", line 1, in <module>\n\
    ValueError: Invalid Value\n```\n\n```\nlast):\n    File \"<stdin>\", line 1, in\
    \ <module>\nValueError: Invalid Value\n```\n\nAlso, Python 3 requires the usage\
    \ of the `as` keyword in the `except` block:\n\n| Python 2 | Python 3 |\n| ---\
    \ | --- |\n| `>>> try: 2/0`<br>`... except ZeroDivisionError, e:`<br>`...    \
    \ print e`<br>`...`<br>`integer division or modulo by zero` | `>>> try: 2/0`<br>`...\
    \ except ZeroDivisionError as e:`<br>`...     print(e)`<br>`...`<br>`division\
    \ by zero` |\n\n## 21.2.8 Library Changes\n\nIn Python 3, many old modules were\
    \ removed like `gopherlib` and `md5` (replaced by `hashlib`). The `bsddb3` package\
    \ was removed because its presence in the core standard library has proved over\
    \ time to be a particular burden for the core developers.\n\nSome modules were\
    \ renamed:\n\n| Python 2 Module | Python 3 Module |\n| --- | --- |\n| `_winreg`\
    \ | `winreg` |\n| `ConfigParser` | `configparser` |\n| `copy_reg` | `copyreg`\
    \ |\n| `Queue` | `queue` |\n| `SocketServer` | `socketserver` |\n| `markupbase`\
    \ | `_markupbase` |\n| `repr` | `reprlib` |\n| `test.test_support` | `test.support`\
    \ |\n\nSome related modules have been grouped into packages and the submodule\
    \ names have been simplified. The resulting new packages are:\n\n- dbm (anydbm,\
    \ dbhash, dbm, dumbdbm, gdbm, whichdb).\n- html (HTMLParser, htmlentitydefs).\n\
    - http (httplib, BaseHTTPServer, CGIHTTPServer, SimpleHTTPServer, Cookie, cookielib).\n\
    - tkinter (all Tkinter related modules except turtle).\n- urllib (urllib, urllib2,\
    \ urlparse, robotparse).\n- xmlrpc (xmlrpclib, DocXMLRPCServer, SimpleXMLRPCServer).\n\
    \n## 21.2.9 Miscellaneous Changes\n\nThis section shows some miscellaneous changes\
    \ brought in by Python 3.\n\n### 21.2.9.1 Operators and Magic Methods\n\nThe `!=`\
    \ operator now returns the opposite of `==`, unless `==` returns `NotImplemented`.\n\
    \nThe concept of вАЬunbound methodsвАЭ has been removed from the language. When referencing\
    \ a method as a class attribute, you now get a plain function object.\n\nThe `__getslice__()`,\
    \ `__setslice__()` and `__delslice__()` magic methods have been removed. The syntax\
    \ `a[i:j]` now translates to `a.__getitem__(slice(i, j))` (or `__setitem__()`\
    \ or `__delitem__()`, when used as an assignment or deletion target, respectively).\n\
    \nThe standard `next()` method has been renamed to `__next__()`.\n\nThe `__oct__()`\
    \ and `__hex__()` special methods are removed вАУ `oct()` and `hex()` use `__index__()`\
    \ now to convert the argument to an integer.\n\nSupport for `__members__` and\
    \ `__methods__` have been removed.\n\nThe function attributes of the form `func_X`\
    \ have been renamed to the form `__X__`, freeing up these names in the function\
    \ attribute namespace for user-defined attributes. This is illustrated in the\
    \ table below:\n\nThe `dict` methods `dict.keys()`, `dict.values()` and `dict.items()`\
    \ (section 7.4) return views instead of lists:\n\n| Python 2 | Python 3 |\n| ---\
    \ | --- |\n| >>> d={}<br>>>> type(d.keys())<br><type 'list'> | >>> d={}<br>>>>\
    \ type(d.keys())<br><class 'dict_keys'> |\n\nPython 2 had provided `dict.iterkeys()`,\
    \ `dict.itervalues()` and `dict.iteritems()` methods for the same reason and are\
    \ no longer supported in Python 3.\n\nThe `map()` and `filter()` functions (section\
    \ 11.3 & 11.4) return iterators in Python 3:\n\n| Python 2 | Python 3 |\n| ---\
    \ | --- |\n| >>> L=map(lambda x:x, [])<br>>>> type(L)<br><type 'list'> | >>> L=map(lambda\
    \ x:x, [])<br>>>> type(L)<br><class 'map'> |\n\nThe `range()` function (section\
    \ 3.3.5) returns an iterator instead of a list in Python 3:\n\n| Python 2 | Python\
    \ 3 |\n| --- | --- |\n| >>> type(range(5))<br><type 'list'> | >>> type(range(5))<br><class\
    \ 'range'> |\n\nPython 2 provided the `xrange()` for the same reason, which no\
    \ longer exists in Python 3."
