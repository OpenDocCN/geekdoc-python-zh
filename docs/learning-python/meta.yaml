  - '[PAGE 576]


    For larger HTML content, we can store the contents in a file and pass on the file
    handle to the constructor as shown in the syntax below:


    ```

    BeautifulSoup(fileHandle [,parser])

    ```


    As an example, if we have an HTML file called `test.html` in the current directory,
    we can load it as follows:


    ```

    >>> from bs4 import BeautifulSoup

    >>> f=open("test.html")

    >>> soup=BeautifulSoup(f)

    ```


    **Observation:**


    +   1. We open the file "test.html" and pass the file handle to BeautifulSoup.

    2. If the file "test.html" is in a different directory, we can always specify
    the pathname of the file.

    3. We will see in later sections how to extract various parts of this HTML document.


    # 17.3.3 Writing HTML Content


    Once a BeautifulSoup object represents an HTML document, it can be converted to
    HTML text simply by converting the BeautifulSoup object into a string. This is
    demonstrated below:


    ```

    >>> from bs4 import BeautifulSoup

    >>> data=''<html><body><p class="para text" id="1">This is a <b>test</b><p><br/></body></html>''

    >>> soup=BeautifulSoup(data)

    >>> str(soup)

    ''<html><body><p class="para text" id="1">This is a <b>test</b></p><p><br/></p></body></html>''

    ```'
  - "[PAGE 577]\n\nIt is also possible to prettify this output using the `prettify`\
    \ method as follows:\n\n```\n>>> from bs4 import BeautifulSoup\n>>> data='<html><body><p\
    \ class=\"para text\" id=\"1\">This is a <b>test</b><p><br/></body></html>'\n\
    >>> soup=BeautifulSoup(data)\n>>> print(soup.prettify())\n<html>\n <body>\n  <p\
    \ class=\"para text\" id=\"1\">\n   This is a\n   <b>\n    test\n   </b>\n  </p>\n\
    \  <p>\n   <br/>\n  </p>\n </body>\n</html>\n```\n\nThe `prettify` method formats\
    \ the HTML content and returns it as a string. The complete syntax is given below:\n\
    \n```\nBeautifulSoup.prettify([formatter=formatter])\n```\n\nThe formatter controls\
    \ how the HTML is prettified. The default value for `formatter` is \"minimal\"\
    .\n\n# 17.3.4 Extracting Details from the Parse Tree\n\nSection 17.3.2 introduced\
    \ how we can read an HTML string or file into a BeautifulSoup object, but a lot\
    \ of stuff was hidden in the background! It was not visible to us that BeautifulSoup\
    \ has, in the background, used another HTML parser to parse through the content\
    \ and has built a parse tree representing the entire HTML document! This section\
    \ will show how to explore that parse tree and extract values from it."
  - '[PAGE 578]


    In order to demonstrate all these capabilities, we will use a sample HTML content
    like this:


    ```

    >>> from bs4 import BeautifulSoup

    >>> html="""

    ... <!DOCTYPE html>

    ... <!-- Test file -->

    ... <html>

    ...   <head>

    ...     <title>HTML Demonstration</title>

    ...   </head>

    ...   <body>

    ...     <div id="main" class="main content">

    ...       <p>This is <b>Bold</b></p>

    ...       <p>This is <i>Italics</i></p>

    ...       <p>This is <u>Underlined</u></p>

    ...     </div>

    ...   </body>

    ... </html>

    ... """

    >>> soup=BeautifulSoup(html)

    ```


    The parse tree constructed by BeautifulSoup will look like this:


    ![](img/7831d9fe9e47e5b1109ec75197998a41_578_0.png)'
  - '[PAGE 579]


    # 17. Parsing HTML


    567


    **Observation:**


    +   1. This tree is a collection of nodes. Not all nodes are shown here for readability.
    We have chosen to merely show all the tag objects in the tree.

    2. What is specifically missing in this tree is all the text nodes. Text nodes
    are not tag objects, but are nodes in the tree nevertheless. Though not shown
    in the tree, we emphasize that they exist and will show in the following sections
    how to extract them as well.

    3. The root of this hierarchy is the вАЬdocumentвАЭ object, maintained internally
    by BeautifulSoup.

