    \ `f`гАВ\n\n```\n>>> from pkg1.mod1 import f\n>>> f()\nThis is mod1's f\n```\n\n\
    **иІВеѓЯпЉЪ**\n\n1. иѓ≠еП• `from pkg1.mod1 import f` дїОеМЕ `pkg1` еЖЕзЪДж®°еЭЧ `mod1` еѓЉеЕ•зђ¶еПЈ `f`гАВ\n2.\
    \ еЗљжХ∞ `f` зО∞еЬ®еПѓдї•зЫіжО•и∞ГзФ®гАВ\n\nеЫ†ж≠§жИСдїђеЊЧеЗЇзїУиЃЇпЉМдї•дЄЛиѓ≠ж≥ХжШѓеПѓиГљзЪДпЉЪ\n\n```\npackageName.moduleName\npackageName.moduleName.functionName\n\
    packageName.moduleName.variableName\n```"
