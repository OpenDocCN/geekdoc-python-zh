  md: '| Mode | Meaning |

    | :--- | :--- |

    | ''r+'' | Open the file for reading and writing. This is the only mode that permits
    reading as well as writing using the same file object. |

    | ''r+b'' | If the file exists and has write permissions, you will be permitted
    to read from and write to the file, but any writes will overwrite the data already
    present at that position within the file. |

    | | If the file does not exist, it will be created and you will be permitted to
    write new contents to the file and read the same by seeking (covered in section
    14.5). |


    Table 33: File Open Modes


    Note:


    +   1. In the modes listed in the above table, a suffix of ''b'' indicates that
    the file should be treated as a binary file, and the absence of the suffix indicates
    that the file should be treated as a text file. Thus, the mode ''r'' opens a text
    file for reading whereas the mode ''rb'' opens a binary file for reading.

    2. The default mode is ''r''. Thus, if a file is opened using open without specifying
    the mode, it will be opened to reading as a text file.


    Here is an interactive session showing a successful file open:


