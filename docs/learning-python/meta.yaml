    1. Observe that the escape sequence ''\n'' is not recognised when the r or R prefix
    is used. Thus, ''\n'' becomes 2 characters: ''\'' and ''n''. The ''\'' character
    is represented in Python as ''\''


    > NOTE:

    We will use raw strings for all regular expressions henceforth as a professional
    practice.


    # 9.3.4 Practical Examples of RE


    Regular expressions might not be very friendly for first timers and very hard
    to debug! This section gives a few standard examples that can help you with common
    tasks and also probably help you understand how to frame them!


    In all the examples that follow, we assume we are framing a RE to completely match
    the string and hence all the regular expressions start with ^ (to match from the
    beginning of the string) and end with $ (to match till the end of the string).
    These can be removed if not required.


    # 9.3.4.1 RE for Name


    To start with, we can consider a name to be comprised of alphabets and can perhaps
    be tolerant to the case. The RE therefore would be as follows:


    ```

    ^[A-Za-z]+( [A-Za-z]+)*$

    ```


    Observation:

    1. The first part [A-Za-z]+ is to ensure that the name starts with alphabets (and
    not a space)

    2. The second part ( [A-Za-z ]+)* allows for 0 or more occurrences of words (sequences
    of alphabets preceded by a space)


    This RE can be made more robust to support the following:


    +   1. Support for periods in the name (e.g. M. K. Gandhi)

    2. Support for apostrophes in the name (e.g. Francis D''Souza)

    3. Support for hyphens in the name (e.g. Inzamam-ul-huq)'
- md: '## 9. Regular Expressions


    ### 9.3.4.2 RE for Username


    Normally, a username follows rules for identifiers. Let''s say we have to adhere
    to the following rules:


    - 1. The length should be 3-16 characters.

    - 2. It can contain alphabets, digits and underscores but should not start with
    a digit.


    Here is the RE for our requirement:


    ```

    ^[A-Za-z_]\w{2,15}$

    ```


    **Observation:**


    - 1. The first part `[A-Za-z_]` ensures that the username does not start with
    a digit.

    - 2. The second part `\w{2,15}` permits any word forming character (alphabets,
    digits and underscores) with the constraint of a length between 2 and 15 characters.
    Together with the first character matched earlier, it ensures a length of 3-16
    characters.


    ### 9.3.4.3 RE for Password


    Let us say the requirements for a password are:


    - 1. It should have a minimum length of 8 characters.

    - 2. It should support alphabets, digits and the following special characters:
    ! @ # $ % ^ & * ( ) - + _ =


    ```

    ^[A-Za-z0-9!@#$%^&*()\-+_=]{8,}$

    ```


    **Observation:**


    - 1. The hyphen (-) within [] has to be escaped to prevent it from being treated
    as an operator.


    ### 9.3.4.4 RE for Date of Birth


    Let us say we want to support the following date formats:


    - 1. dd/mm/yy and mm/dd/yy

    - 2. dd/mm/yyyy and mm/dd/yyyy

    - 3. dd-mm-yy and mm-dd-yy

    - 4. dd-mm-yyyy and mm-dd-yyyy


    For simplicity, let''s not validate the date any further than the patterns above.


    ```

    ^(\d{2}-\d{2}-\d{2}(\d{2})?)|(\d{2}/\d{2}/\d{2}(\d{2})?)$

    ```


    **Observation:**


    - 1. We have 2 patterns вАУ one that supports hyphens (-) as the separator and one
    that supports slashes (/) as the separator.

    - 2. We provide a choice between the 2 patterns using the | operator. We do not
    prefer using [\-/] instead as the separator as this allows mixing the 2 separators
    within a single date!

    - 3. Each digit is represented by \d and {2} ensures exactly 2 occurrences (we
    could have also written it as \d\d instead of \d{2}).

    - 4. A 4-digit year is supported using an optional 2 digits after compulsory 2
    digits: \d{2}(\d{2})?


    ### 9.3.4.5 RE for Phone


    Let us say we wish to identify phone numbers with the following support:


    - 1. An optional leading + sign to specify the country code.

    - 2. Digits can be grouped and separated by spaces and hyphens.

    - 3. 8-10 digits for the phone number and 1-4 digits for the country code, if
    specified.


    ```

    ^(\+\d{1,4})?(\d[\- ]?){8,10}$

    ```


    **Observation:**


    - 1. The first part `(\+\d{1,4})?`, is for the country code. The `?` at the end
    makes it optional. The `+` is escaped to prevent it from treating it as the `+`
    operator of regular expressions. `\d{1,4}` allows 1-4 digits following the `+`.

    - 2. The second part `(\d[\- ]?){8,10}` allows for 8-10 of additional digits,
    also permitting an optional hyphen (`-`) or space after each digit. The hyphen
    is escaped since it has a special meaning within the character class.


    ### 9.3.4.6 RE for Email


    An email address is of the form:


    ```

    username @ domainname . TLD

    ```


    Here is the RE for matching an email address:


    ```

    [a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}

    ```


    **Observation:**


    - 1. The first part, `[a-z0-9._%+-]+`, permits 1 or more occurrences of the specified
    characters. This part matches the `username`. Of course, the characters can be
    tweaked as necessary.

    - 2. The second part, `[a-z0-9.-]+`, permits 1 or more occurrences of the specified
    characters. We do not expect `%` and `+` to be part of `domainname`, unlike the
    `username`. This part matches the `domainname`. This part also takes care of subdomains
    like "mail.abc" or non-TLD''s like the ".co" in ".co.in".

    - 3. The third part, `[a-z]{2,}`, permits 2 or more characters to be part of the
    TLD (like .in and .com).

    - 4. As can be seen in the RE, these 3 parts are separated in the form of `username@domainname.TLD`.
    The . is escaped to prevent it from being considered to be a RE operator.


    ### 9.3.4.7 RE for IP Address


    An IP (IPv4) address is made up of 4 integers, separated by dots, with each integer
    in the range of 0 to 255.


    ```

    ^(\d{1,2}|[01]\d{2}|2[0-4]\d|25[0-5]\.){3}(\d{1,2}|[01]\d{2}|2[0-4]\d|25[0-5])$

    ```


    **Observation:**


    - 1. Each integer should be in the range of 0 to 255. This includes all single-digit
    numbers and all double-digit numbers. This justifies the RE `\d{1,2}`.

    - 2. A 3-digit number that starts with 0 or 1 can be followed by any 2 digits.
    This justifies the RE `[01]\d{2}`.

    - 3. A 3-digit number that starts with 2 should be confined to 255. If the second
    digit is in the range of 0 to 4, the third digit can be anything. This justifies
    the RE `2[0-4]\d`.

    - 4. Finally, a 3-digit number that starts with 25 can only have the third digit
    in the range of 0 to 5. This justifies the RE `25[0-5]`.

    - 5. Since each integer can be any of the above, we use the RE `\d{1,2}|[01]\d{2}|2[0-4]\d|25[0-5]`.

    - 6. The first 3 integers of the IP address will be followed by a dot (.), which
    needs to be escaped to prevent it from being treated as an operator. This justifies
    `(\d{1,2}|[01]\d{2}|2[0-4]\d|25[0-5]){3}`.

    - 7. The last integer has the same pattern as the previous 3, except for the dot.
    This justifies the final part `(\d{1,2}|[01]\d{2}|2[0-4]\d|25[0-5])`.


    ### 9.3.4.8 RE for Integers


    An integer is basically made up of digits, and thus the most fundamental RE for
    integers would be:


    ```

    ^\d+$

    ```


    The above RE will match 1 or more occurrences of digits.

    If we wish to also support an optional sign before the integer, the RE will become:


    ```

    ^[+-]?\d+$

    ```


    **Observation:**


    - 1. The sign can be + or -. The вАЬ-вАЭ is not escaped since it is the last character
    in the character set. When вАЬ-вАЭ is the first or last character in the character
    set, escaping is not required. In all other cases, escaping would be required.
    It might be a good idea for beginners to always escape вАЬ-вАЭ within character classes
    to be on the safer side. With experience, you could perhaps elect to drop escaping
    when not required in order to increase readability.

    - 2. The sign is made optional using the ? Operator.


    If we wish to match a certain number of digits, like letвАЩs say a 3-digit integer,
    the RE could be:


    ```

    ^\d{3}$

    ```


    **Observation:**


    - 1. This RE will match an integer in the range of 000-999. It will still not
    match integers like 25.


    If we wish to accept any integer *upto* 3 digits wide, for example, the RE can
    be:


    ```

    ^(\d?){2}\d$

    ```


    **Observation:**


    - 1. The \d? means an optional digit. The {2} means 2 such optional digits. The
    \d after that means a compulsory digit.

    - 2. The RE therefore means: 2 optional digits followed by a compulsory digit.
    That compulsory digit matches the units place while the optional digits can match
    the hundreds place and tens place.


    If we wish to accept an integer within arbitrary intervals, the RE becomes more
    complex. For example, here is a RE for accepting a 3-digit integer between 000
    and 255:


    ```

    ^([01]\d\d|2[0-4]\d|25[0-5])$

    ```


    **Observation:**


    - 1. The RE is made up of 3 choices, covered below.

    - 2. The first choice is [01]\d\d which matches all 3-digit integers that start
    with 0 or 1, matching 000 to 199.

    - 3. The second choice is 2[0-4]\d which matches integers from 200 to 249.

    - 4. The third choice is 25[0-5] which matches integers from 250 to 255.


    If we wish to match integers from 0 to 255, this is the RE:


    ```

    ^([01]?\d?\d|2[0-4]\d|25[0-5])$

    ```


    **Observation:**


    - 1. The RE is made up of 3 choices, covered below.

    - 2. The first choice is [01]?\d?\d, which covers upto 2 optional digits followed
    by a compulsory digit, with additional constraints on the first optional digit
    that it should be 0 or 1. This takes care of all single digit integers, all 2-digit
    integers and all 3-digit integers starting with 0 or 1, hence matching 0-199 as
    well as 000-199.

    - 3. The second choice is 2[0-4]\d, which matches all 3-digit integers starting
    with 2, and hence matches the range 200-249.

    - 4. The third choice is 25[0-5], which matches all 3-digit integers in the range
    of 250-255.'
