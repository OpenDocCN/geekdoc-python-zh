    |---|---|

    | Matches | Rejects |

    | native | nt |

    | net | nut |

    | punctual | against |


    # 9.2.1.4 Matching a Character Within a Negated Set Using the [^] Operator


    Finally, the negated character set indicated by [^] implies a placeholder for
    a single character with the constraint that the character can be any one apart
    from the ones listed within [ ].

    Thus, while [0-9] represents a digit, [^0-9] represents a non-digit.

    This can be combined with our understanding of sections 9.2.1.2 and 9.2.1.3 to
    create a regular expression like [^a-emx-z] which will match any single character
    that is either not a lowercase alphabet, or if it is, is only one of f, g, h,
    i, j, k, l, n, o, p, q, r, s, t, u, v, w.

    Thus, the RE n[^aeiou]t matches any string that contains n followed by a character
    that is not a lowercase vowel, followed by t, as shown below:


    | Regular Expression: n[^aeiou]t |

    |---|---|

    | Matches | Rejects |

    | against | not |

    | punctual | nt |'
