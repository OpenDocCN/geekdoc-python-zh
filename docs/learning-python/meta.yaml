- md: "## SUMMARY\n\n- Text files are human readable whereas binary files require\
    \ custom applications to read the render their contents.\n- The open() function\
    \ opens the specified file in the specified mode (read mode by default) and returns\
    \ a file object on success. This file object can then be used to interact with\
    \ the file contents.\n- When done with interacting with a file contents, the file\
    \ object can be used to invoke the close() method to close the connection with\
    \ the file. Doing so is optional and all open files are eventually closed when\
    \ the script ends or when the file object is no longer in use by the program,\
    \ but explicitly closing files when they are no longer needed can prove efficient\
    \ in certain situations.\n- The read() method can be used to read any number of\
    \ bytes from a file.\n- The readlines() method can be used to read the entire\
    \ file as a list of lines.\n- The readline() method can be used to read a single\
    \ line at a time. The same effect can be achieved using a for loop to iterate\
    \ over the file object.\n- The write() method can be used to write a string to\
    \ a file.\n- The seek() method can be used to seek to any position within a file,\
    \ specified as an offset relative to a chosen reference point.\n- The tell() method\
    \ can be used to determine the current position within the file.\n- For text files,\
    \ seeking is allowed only to one of the standard reference points, or to an offset\
    \ previously returned by the tell() method on the same file object.\n- The pickle\
    \ module provides a simple and convenient method to read from and write to binary\
    \ files!\n- The pickle.dump() method can be used to write an object to a binary\
    \ file.\n- The pickle.load() method can be used to read an object from a binary\
    \ file.\n\n## 15 MODULES\n\nIn this chapter you will be able to:\n\n- [x] Appreciate\
    \ the need for Modules.\n- [x] Understand how to create and import modules.\n\
    - [x] Learn how symbol tables help implement namespaces.\n- [x] Understand module\
    \ execution and initialisation.\n- [x] Create packages and subpackages to organise\
    \ modules.\n- [x] Figure out how Python locates modules, packages and subpackages.\n\
    \n## 15.1 Need for Modules\n\nSo far, we have seen 2 ways of executing Python\
    \ code:\n\n1. By typing Python instructions directly into the interpreter and\
    \ getting it executed immediately\n2. By storing Python instructions in a file\
    \ and running it as a scripting\n\nWhile the former approach has the advantage\
    \ of quickly getting the output for any instruction, when it comes to writing\
    \ larger pieces of code, the latter approach is definitely preferred. In the former\
    \ approach, all code and data (functions and variables) introduced are forgotten\
    \ the moment the user quits the interpreter. In the latter approach, the program\
    \ runs the same way each time the user runs it.\n\nWhen we write bigger pieces\
    \ of code, we observe the following:\n\n1. Our program might become too long and\
    \ we want a way to organise it into manageable chunks (files)\n2. We might have\
    \ multiple Python scripts with various functions already defined that we wish\
    \ to use in another piece of work\n\nThe solution for both the problems above\
    \ is *modules*! A **module** is a reusable piece of Python code that can be used\
    \ by other Python programs (and modules). In fact, when we run a Python script,\
    \ it is assumed to be running as a default module called `__main__`. The name\
    \ of the current module is available in the variable `__name__`.\n\n```\n>>> print(__name__)\n\
    __main__\n```\n\nBy storing a Python script as a module, we gain the following\
    \ abilities:\n\n1. The contents of the module can be reused by other Python scripts\n\
    2. The module so defined is considered to be a separate logical unit, having it's\
    \ own symbol table where identifiers are stored, preventing clashes with other\
    \ modules that might have the same name(s) for their identifiers.\n\nBy the way,\
    \ there is nothing much to be done to вАЬconvertвАЭ a Python script into a Python\
    \ module! Any Python script can be considered to be a module! However, you might\
    \ still be interested in differentiating between a module and an executable script,\
    \ and that is covered in detail in section 15.3.3.\n\n## 15.2 Creating Modules\n\
    \nArmed with this information of the advantages of using modules and the fact\
    \ that any Python script can be considered to be a module, let us write our first\
    \ module! Let us create a module that defines a function `factorial` to find the\
    \ factorial of an integer. We can then use this module and call the function `factorial`\
    \ from other Python scripts.\n\nfact.py\n\n```\n1.  #!/usr/bin/python\n2.  \n\
    3.  # Module to find the factorial of an integer\n4.  \n5.  def factorial(n):\n\
    6.      if n==0: return 1\n7.      return n*factorial(n-1)\n```\n\nObservation:\n\
    \n1. This is a simple Python script, despite we calling it a module. No special\
    \ changes were made to convert this script into a module.\n2. This module is named\
    \ `fact` because the filename is `fact.py`. Thus, module names are derived from\
    \ filenames.\n3. This module defines a function called `factorial` that returns\
    \ the factorial of the given integer.\n4. When this script is executed, there\
    \ is no output as there is no code in the main script. This can be changed however,\
    \ as covered in section 15.3.3, but for the moment we are happy with the way this\
    \ module is coded.\n\n## 15.3 Importing Modules\n\nThe previous sections have\
    \ shown us that modules are meant to be reusable and module names are derived\
    \ from filenames. Let us now write a Python script that reuses the module `fact`\
    \ defined earlier. In order to use a module, the module has to be *imported*.\
    \ Importing a module makes the module name available to us in our script, and\
    \ using the module name we will be able to access the module contents, as we will\
    \ soon discover. The syntax for importing a module is:\n\n```\nimport moduleName\n\
    ```\n\nIn our example, since `fact` is the name of the module, this is how we'd\
    \ import it before using the factorial function:\n\n```\n>>> import fact\n```\n\
    \n### 15.3.1 Module Symbol Tables\n\nSection 15.1 mentioned that one of the advantages\
    \ of using modules is that each module has it's own symbol table where it's identifiers\
    \ are stored, thus eliminating clashes with any identifiers with the same name\
    \ in other modules and scripts. This section will throw more light on this concept.\n\
    \nAn *identifier* is a name given by the programmer to a program element, and\
    \ includes names of functions and variables. These identifiers are stored in a\
    \ data structure called a *symbol table*. Several symbol tables can co-exist and\
    \ contain their own identifiers as the symbol tables themselves are identified\
    \ by a name вАУ the name of the *module* that defined them! Section 15.2 introduced\
    \ the fact that the module name is derived from the filename. Section 15.1 introduced\
    \ the fact that executed scripts are assumed to be a part of the module named\
    \ `__main__`. Thus, every identifier is present within a symbol table identified\
    \ by a module name or the default module name `__main__`.\n\nImporting a module\
    \ only adds the module name as an identifier to the symbol table of the importer.\
    \ The contents of a module are hidden within the symbol table of the module. In\
    \ our example, the statement `import fact` ensures that the identifier `fact`\
