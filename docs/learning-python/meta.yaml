    # 12.6.3 Function Overriding


    The previous section illustrated which functions are accessible within derived
    classes and which are accessible even outside derived classes in inheritance.
    A special case arises however when we have functions with the same name in both
    the base as well as derived classes вАУ this is called **function overriding**,
    wherein a derived class function is offered as a replacement for a base class
    function. This section concentrates on this concept.


    When there are methods with the same name in a base class as well as it''s derived
    class and we have a reference to an instance of the derived class, using which
    we invoke the function, the derived class function gets called. This is illustrated
    below:'
