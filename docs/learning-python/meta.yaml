  md: "# 14.3.2.2 Reading a Line at a Time From a File Using readline()\n\nJust as\
    \ how the `readlines()` method reads all lines from a file and returns it in the\
    \ form of a list, the `readline()` method reads a single line from a file and\
    \ returns it as a string.\n\nSyntax:\n\n```\nfileObject.readline([size])\n```\n\
    \nNote:\n\n+   1. This method reads and returns a single line from the file identified\
    \ by the file object `fileObject`.\n2. The optional `size` parameter can be used\
    \ to specify the maximum number of characters to read from the file. When omitted,\
    \ it means read till the end of line (till the newline character is read) or till\
    \ the end of file.\n3. If the read line terminated with a newline character (which\
    \ would be the case for all lines except possibly the last line in the file),\
    \ the terminating newline character is retained as the last character of the string\
    \ that is returned.\n4. If already at the end of file, a null string is returned.\n\
    \nHere is an implementation of `cat` using `readline()`:\n\ncat4.py\n\n```\n1.\
    \  #!/usr/bin/python\n2.  \n3.  # Implementation of cat command to display the\
    \ contents of a file\n4.  \n5.  filename = input(\"Enter filename:\")\n6.  \n\
    7.  try:\n8.      file = open(filename)\n9.      while 1:\n10.         line =\
    \ file.readline()\n11.         if not line: break\n12.         print(line,end='')\n\
    13. except Exception as e:\n14.     print(\"Unable to open file: {}\".format(filename))\n\
    15.     print(\"Reason: {}\".format(str(e)))\n```"
