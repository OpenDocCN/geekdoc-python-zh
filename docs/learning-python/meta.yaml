    \ and how it can be handled at an outer level, we will classify the outer levels\
    \ as shown below and see them in detail in separate sections:\n\n1. Nested try-except\
    \ blocks\n2. Functions\n\n### 13.4.1 Exception Propagation Through Nested Blocks\n\
    \nThe try-except blocks can be nested вАУ one try-except block can be placed inside\
    \ another try block, except block, else block or finally block.\nJust for illustration,\
    \ let us change ExceptionHandlingDemo2.py and add nested try-except blocks:\n\n\
