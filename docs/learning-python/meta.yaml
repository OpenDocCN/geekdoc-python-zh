    - 2. ињЩж†ЈзЪДйАЪзФ®е§ДзРЖз®ЛеЇПеЇФиѓ•жШѓжЬАеРОдЄАдЄ™ `except` е≠РеП•пЉИе¶ВжЮЬе≠ШеЬ®зЪДиѓЭпЉЙгАВеОЯеЫ†жШѓж≠§дЄЛйЭҐзЪДдїїдљХ `except` е§ДзРЖз®ЛеЇПйГљжЧ†ж≥ХжЙІи°МпЉМеЫ†дЄЇ `except`\
    \ еЭЧжШѓжМЙй°ЇеЇПе∞ЭиѓХзЪДпЉМиАМйАЪзФ®е§ДзРЖз®ЛеЇПеПѓдї•е§ДзРЖдїїдљХеЉВеЄЄгАВ\n- 3. еЬ®дЄКйЭҐзЪДиѓ≠ж≥ХдЄ≠пЉМ`try` еЭЧдЄ≠еЉХеПСзЪДдїїдљХдЄНжШѓ `ExceptionName1`гАБ`ExceptionName2`\
    \ еТМ `ExceptionName3`пЉИжИЦеЕґжіЊзФЯз±їпЉЙзЪДеЉВеЄЄпЉМйГље∞ЖеЬ®йАЪзФ®е§ДзРЖз®ЛеЇПдЄ≠е§ДзРЖгАВ\n\nиѓЈж≥®жДПпЉМйАЪзФ®е§ДзРЖз®ЛеЇПдЄНйЬАи¶БдїїдљХеЕИеЙНзЪД `except` еЭЧгАВеЫ†ж≠§пЉМдї•дЄЛиѓ≠ж≥ХжШѓжЬЙжХИгАБеПѓиГљдЄФжЬЙзФ®зЪДпЉЪ\n\
    \n```\ntry:\n    ... # try еЭЧ\nexcept:\n    ... # еЬ®ж≠§е§Де§ДзРЖжЙАжЬЙеЉВеЄЄ\n```\n\nиЃ©жИСдїђйЗНжЦ∞иЃњйЧЃ `ExceptionHandlingDemo3.py`\
    \ еєґеЬ®йВ£йЗМдљњзФ®ж≠§еКЯиГљгАВ\n\n### ExceptionHandlingDemo4.py\n\n```\n1.  #!/usr/bin/python\n\
