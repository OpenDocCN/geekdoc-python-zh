    # 9.2.2.5 Grouping Using the () Operator


    You will notice during the discussion of the *, + and ? operators that we used
    the term вАЬpreceding symbolвАЭ and not вАЬpreceding characterвАЭ. There is a reason for
    that. These operators need not work on individual characters, but can work on
    a group of characters вАУ and for that matter, can work on a regular expression
    as well!


    The () operator is used to create a group. Operators like *, + and ? can then
    be applied on the group. Consider the RE (a*b)+. The * applies to a, implying
    0 or more occurrences of a. The + applies on the group (a*b), implying one or
    more occurrences of the entire group. This RE therefore means one or more occurrences
    of the pattern вАЬzero of more occurrences of a followed by bвАЭ. An example of a
    string that will be matched by this is: abaaaabaabb. Here is the split up of the
    match: ab aaaab aab b.


    # 9.2.3 Matching Multiple Patterns Using the | Operator


    The | operator represents an вАЬORвАЭ - a choice between patterns.


    Thus, the RE go|ld can match any string that contains g followed by o, or l followed
    by d, as shown below:


    | Regular Expression: go|ld | |

    |---|---|

    | Matches | Rejects |

    | go | greed |

    | ld | odd |

    | going | swallowed |

    | builder | gd |

    | pango | ol |'
- md: 'When combined with the `()` operator, the choice is restricted within the parentheses.
    Thus, the RE `g(ol|ran)d` can match any string that contains `g` followed by either
    `ol` or `ran` followed by `d`, restricting the choice within the parentheses,
    as shown below:


    | Regular Expression: `g(ol|ran)d` |

    | :--- | :--- |

    | **Matches** | **Rejects** |

    | `gold` | `greed` |

    | `grand` | `golrand` |


    ## 9.2.4 Anchoring Operators


    So far, we have emphasized that when using regular expressions, it does not matter
    where the match occurs. However, there are operators available to restrict the
    search at the beginning of a string, at the end of a string, or both.


    ### 9.2.4.1 Anchoring at the Beginning of a String


    If a RE starts with a `^`, it implies that the match should occur at the beginning
    of the string only.


    Thus, the RE `^not` will match any string that starts with `not` and will reject
    strings that do not start with `not`, as shown below:


    | Regular Expression: `^not` |

    | :--- | :--- |

    | **Matches** | **Rejects** |

    | `not` | `cannot` |

    | `nothing` | `net` |


    > **NOTE:**

    The escape sequence `\A` at the beginning of a RE plays the same role as the `^`
    operator. Thus, the RE `^not` is identical to `\Anot`.


    ### 9.2.4.2 Anchoring at the End of a String Using the $ Operator


    If a RE ends with a `$`, it implies that the match should occur at the end of
    the string only.


    Thus, the RE `not$` will match any string that ends with `not` and will reject
    strings that do not end with `not`, as shown below:


    | Regular Expression: `not$` |

    |---|---|

    | **Matches** | **Rejects** |

    | **not** | nothing |

    | can**not** | net |


    > **NOTE:**

    The escape sequence `\Z` at the end of a RE plays the same role as the `$` operator.
    Thus, the RE `not$` is identical to `not\Z`.


    ### 9.2.4.3 Anchoring at Word Boundaries


    A word boundary is defined as the transition from a sequence of word-forming characters
    (the ones that match `\w`) to a sequence of non word-forming characters (the ones
    that match `\W`) or vice-versa. It also includes the special cases of the boundary
    between the start of a string and a word-forming character and the boundary between
    a word-forming character and the end of a string.


    The word boundaries are highlighted in the example below:


    ```

    "Take this 500 bucks, said he"

    ^   ^^ ^^^^^^^ ^ ^ ^ ^^

    ```


    The `\b` escape sequence matches a null string at a word boundary. Its purpose
    is to ensure a match at the right place. Thus, the RE `\bnot` will match those
    strings that contain `not` that starts at a word boundary, as shown below:


    | Regular Expression: `\bnot` |

    |---|---|

    | **Matches** | **Rejects** |

    | **not** | nothing |

    | this is **not** bad | cannot |

    | Whose **note** is this? | This cannot happen |


    The RE `not\b` will match those strings that contain `not` that ends at a word
    boundary, as shown below:


    | Regular Expression: `not\b` |

    |---|---|

    | **Matches** | **Rejects** |

    | `not` | `nothing` |

    | This is **not** bad | `cannot` |

    | This can**not** happen | Whose note is this? |


    The RE `\bnot\b` will match those strings that contain `not` that starts at and
    ends at a word boundary вАУ or in other words, strings that contain the *word* `not`,
    as shown below:


    | Regular Expression: `\bnot\b` |

    |---|---|

    | **Matches** | **Rejects** |

    | `not` | `note this point` |

    | This is **not** bad | Tie this knot |


    ### 9.2.4.4 Negated Anchoring at Word Boundaries


    The `\B` escape sequence is the opposite of `\b` вАУ it matches a null string anywhere
    except at word boundaries.


    Thus, the RE `\Bnot` will match those strings that contain `not` that does not
    start at a word boundary, as shown below:


    | Regular Expression: `\Bnot` |

    |---|---|

    | **Matches** | **Rejects** |

    | This can**not** happen | `not` |

    | Tie this **knot** | Whose note is this? |


    The RE `not\B` will match those strings that contain `not` that does not end at
    a word boundary, as shown below:


    | Regular Expression: `not\B` |

    |---|---|

    | **Matches** | **Rejects** |

    | note this point | This cannot happen |

    | Did not notice? | Tie this knot |


    The RE `\Bnot\B` will match those strings that contain `not` that neither starts
    nor ends at a word boundary, as shown below:


    | Regular Expression: `\Bnot\B` |

    |---|---|

    | **Matches** | **Rejects** |

    | Get me a knotted rope | note this point |

    | annotate | Tie this knot |


    ## 9.3 Framing Regular Expressions in Python


    We have learnt some basic operators that help express regular expressions. In
    this section, we will see some practical examples of regular expressions, but
    before that, we will see two important points specific to Python:


    1. The problems associated with RE strings containing backslashes and how to address
    them

    2. Why raw string literals are better for representing a RE in Python


    ### 9.3.1 Escaping Within Regular Expressions


    Some characters within a RE have special meanings. The вАЬ+вАЭ character, for instance,
    is an operator that denotes 1 or more occurrences of the preceding symbol. What
    if we wanted to search for the вАЬ+вАЭ character instead? In order to ensure that
    вАЬspecialвАЭ characters are treated as вАЬnormalвАЭ characters, we need to escape the
    вАЬspecialвАЭ characters by prefixing them with a backslash (\). Thus, while the RE
    `a+b` means вАЬ1 or more occurrences of a followed by bвАЭ, the RE `a\+b` means вАЬa
    followed by +, followed by bвАЭ.


    ### 9.3.2 Dealing with Backslashes (\)


    We have seen that certain escape sequences have been provided for creating regular
    expressions (like `\d` to represent a digit character). We have also learnt that
    the Python language itself understands certain escape sequences of its own (like
    `\n` to represent the newline character). Thus, the Python interpreter is always
    ready to process escape sequences within strings. The regular expression escape
    sequences are not known to the interpreter as such and could result in a problem
    if processed before the regular expression engine sees the RE string. The solution
    is to escape every backslash by prefixing each with a backslash. The table below
    shows some regular expressions and how they can be represented as strings in Python:


    | RE | String Representation |

    |---|---|

    | `\d` | `"\\d"` |

    | `\d\d-\d\d-\d\d` | `"\\d\\d-\\d\\d-\\d\\d"` |

    | `\\d` | `"\\\\d"` |


    **Observation:**


    1. Basically, each ''\'' in the RE has to be represented as ''\\'' in a string
    to ensure that it remains as a backslash within the string.

    2. The last example shows a RE that matches a backslash (\) followed by a d. As
    usual, each backslash has to be prefixed by a backslash and hence we have 4 backslashes
    within the string.


    ### 9.3.3 Using Raw Literals for RE


    In the previous section, we have seen that backslashes within regular expressions
    need to be escaped by prefixing with another backslash. Python provides another
    alternative to this вАУ raw strings.


    A *raw string* is a string that is not further processed by Python вАУ every character
    in it remains unchanged and without any special interpretation. In other words,
    escape sequences are not recognised. They are indicated by a prefix of ''r'' or
    ''R'' in front of the string literal as shown in the examples below:


    ```

    >>> "Hello\n"

    ''Hello\n''

    >>> r"Hello\n"

    ''Hello\\n''

    >>> R"Hello\n"

    ''Hello\\n''

    ```


    **Observation:**

    1. Observe that the escape sequence ''\n'' is not recognised when the r or R prefix
    is used. Thus, ''\n'' becomes 2 characters: ''\'' and ''n''. The ''\'' character
    is represented in Python as ''\\''.


    > **NOTE:**

    We will use raw strings for all regular expressions henceforth as a professional
    practice.


    ### 9.3.4 Practical Examples of RE


    Regular expressions might not be very friendly for first timers and very hard
    to debug! This section gives a few standard examples that can help you with common
    tasks and also probably help you understand how to frame them!


    In all the examples that follow, we assume we are framing a RE to completely match
    the string and hence all the regular expressions start with `^` (to match from
    the beginning of the string) and end with `$` (to match till the end of the string).
    These can be removed if not required.


    #### 9.3.4.1 RE for Name


    To start with, we can consider a name to be comprised of alphabets and can perhaps
    be tolerant to the case. The RE therefore would be as follows:


    ```

    ^[A-Za-z]+( [A-Za-z]+)*$

    ```


    **Observation:**

    1. The first part `[A-Za-z]+` is to ensure that the name starts with alphabets
    (and not a space)

    2. The second part `( [A-Za-z]+)*` allows for 0 or more occurrences of words (sequences
    of alphabets preceded by a space)


    This RE can be made more robust to support the following:


    1. Support for periods in the name (e.g. M. K. Gandhi)

    2. Support for apostrophes in the name (e.g. Francis D''Souza)

    3. Support for hyphens in the name (e.g. Inzamam-ul-huq)'
