    3. In case you are wondering that `String.format()` could also have been used
    instead, here''s the difference: using placeholders is far safer as it protects
    you from SQL injection! Without going into the details of that, here''s the short
    conclusion: it is not safe to use `String.format()` as a replacement for the placeholders
    concept!


    When using placeholders, we use a slightly different syntax of `execute()` as
    shown below:


    ```

    cursor.execute(query_with_placeholders, tuple_of_values)

    ```


    # 16.4.4 Executing Multiple Queries


    The previous section showed how we can frame a single query template but provide
    a different tuple of values each time we call the execute() method. In this section
    we will examine how we can pass an entire sequence of such tuples to run the same
    query template multiple times on different tuples of values!


    We use the `executemany()` method which has the following syntax:


    ```

    cursor.executemany(query_with_placeholders, seq_of_tuples)

    ```


    Here''s a demonstration of adding 2 more records into our `Employee` database
    using this concept:


