    # 11.10.3 Evaluating Postfix Arithmetic Expressions


    Now that we know how to convert an infix arithmetic expression into it''s postfix
    equivalent, let us focus on how to evaluate these postfix arithmetic expressions.
    Once again, we assume that the postfix arithmetic expression given to us is valid
    and is composed of single-character case-sensitive variables and the binary operators
    "+", "-", "*" and "/".


    **Steps for evaluating Postfix Arithmetic Expressions:**


    +   1. Scan the given postfix expression from left to right.

    2. When an operand is encountered, check if we already know it''s value. If not,
    ask the user for it''s value and note it. The value of the operand is pushed on
    to a stack.

    3. When an operator is encountered, it works on the topmost 2 values of the stack,
    with the topmost value of the stack being the second operand. The result of the
    operation is pushed on to the stack.

    4. After the entire expression has been processed, the value of the expression
    will be the only element in the stack. We simply need to pop it out and display
    it.


    Note that unlike the previous program where we had a stack of operators, in this
    program we have a stack of operand values!'
