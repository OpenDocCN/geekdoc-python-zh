    \ in line 80 using the `postfixEval` function defined in line 59.\n5. We finally\
    \ print the value of the expression in line 81.\n\n## 11.10.5 Checking Sudoku\
    \ Solutions\n\nSudoku is a logical puzzle that involves putting in digits from\
    \ 1-9 in a 9x9 grid of cells in such a way that each row, each column and each\
    \ of the 9 3x3 grids as shown in the diagram below comprise of all digits from\
    \ 1 to 9. This of course necessitates that no digit can appear twice in any row,\
    \ column or grid.\n\nWe can definitely write a Python script to solve a given\
    \ Sudoku problem, but that would be a little too complicated to be explained in\
    \ a book like this. We can however write a Python script to check whether a purported\
    \ solution is correct or not, and that would be a little too simple to do in Python!\n\
    \nHere is the Pythonic logic for the solution that can get the job done in very\
    \ few lines of code:\n\n1. We accept the input from the user (9 rows of 9 digits\
    \ each) and store it as a list of strings вАУ with the list containing a string\
    \ for each row and each string containing the 9 digits of that row.\n2. We split\
    \ the logic into 3 parts вАУ row check (checking that each row contains digits 1-9),\
    \ column check (checking that each column contains digits 1-9) and grid check\
    \ (checking that each 3x3 grid contains digits 1-9).\n3. We use a Boolean variable\
    \ to indicate whether the solution is correct so far. The moment we realise that\
    \ any check fails, we set the Boolean variable to `False`. We therefore start\
    \ with the value of the Boolean variable being `True`.\n4. For row check, we take\
    \ the string pertaining to each row, split it into its individual characters,\
    \ sort them in ascending ASCII order, and join them back again. If the row's contents\
    \ had all digits from 1 to 9, the string would now be \"123456789\"!\n5. For column\
    \ check, we employ a similar strategy, but have to extract the corresponding column\
    \ element from each row to obtain the column contents.\n6. For grid check, we\
    \ similarly have to extract the contents across multiple rows and multiple columns\
    \ to obtain the contents of a single grid and employ the same logic as above.\n\
    \n### sudokuChecker.py\n\n```python\n#!/usr/bin/python\n\n# Sudoku Solution Checker\n\
    row = []\n\nfor i in range(9): row.append(input())\n\nok=True\n\n# Row Check\n\
    for i in range(9):\n    if not ''.join(sorted(row[i])) == '123456789':\n     \
    \   ok=False\n\n# Column Check\nfor j in range(9):\n    if not ''.join(sorted([x\
    \ for i in range(9) for x in row[i][j]])) == '123456789': ok=False\n\n# Grid Check\n\
    for g in range(9):\n    if not ''.join(sorted([x for i in range(3) for j in range(3)\
    \ for x in row[g//3*3+i][g%3*3+j]])) == '123456789':\n        ok=False\n\nif ok:\
    \ print(\"Correct!\")\nelse: print(\"Wrong!\")\n```\n\n**Output:**\n\n```\n142576389\n\
