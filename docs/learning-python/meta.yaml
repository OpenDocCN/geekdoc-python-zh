    # 11.10.5 Checking Sudoku Solutions


    Sudoku is a logical puzzle that involves putting in digits from 1-9 in a 9x9 grid
    of cells in such a way that each row, each column and each of the 9 3x3 grids
    as shown in the diagram below comprise of all digits from 1 to 9. This of course
    necessitates that no digit can appear twice in any row, column or grid.


    We can definitely write a Python script to solve a given Sudoku problem, but that
    would be a little too complicated to be explained in a book like this. We


    ![](img/7831d9fe9e47e5b1109ec75197998a41_348_0.png)'
