    # 9.3.4.8 RE for Integers


    An integer is basically made up of digits, and thus the most fundamental RE for
    integers would be:


    ```

    ^\d+$

    ```


    The above RE will match 1 or more occurrences of digits.

    If we wish to also support an optional sign before the integer, the RE will become:


    ```

    ^[+-]?\d+$

    ```


    **Observation:**


    +   1. The sign can be + or -. The вАЬ-вАЭ is not escaped since it is the last character
    in the character set. When вАЬ-вАЭ is the first or last character in the character
    set, escaping is not required. In all other cases, escaping would be required.
    It might be a good idea for beginners to always escape вАЬ-вАЭ within character classes
    to be on the safer side. With experience, you could perhaps elect to drop escaping
    when not required in order to increase readability.

    2. The sign is made optional using the ? Operator.


    If we wish to match a certain number of digits, like letвАЩs say a 3-digit integer,
    the RE could be:


    ```

    ^\d{3}$

    ```


    **Observation:**


    +   1. This RE will match an integer in the range of 000-999. It will still not
    match integers like 25.


    If we wish to accept any integer *upto* 3 digits wide, for example, the RE can
    be:


    ```

    ^(\d?){2}\d$

    ```'
