    6. Any errors are handled in lines 21-22. On success, a message is printed by
    line 24.


    # 14.7 Reading from Binary Files


    Once objects have been stored in files using `pickle.dump()`, the `pickle.load()`
    function can be used to load them back from file.


    ```

    pickle.load(file)

    ```


    Note:


    +   1. The parameter `file` identifies the file from which an object has to be
    loaded from the current position in the file. The file is expected to be binary
    and should have been opened in a mode that supports reading.

    2. The object that is successfully loaded from the file is returned by this function.'
