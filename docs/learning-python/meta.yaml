    \ BeautifulSoup\n>>> f=open(\"test.html\")\n>>> soup=BeautifulSoup(f)\n```\n\n\
    **Observation:**\n\n1.  We open the file \"test.html\" and pass the file handle\
    \ to BeautifulSoup.\n2.  If the file \"test.html\" is in a different directory,\
    \ we can always specify the pathname of the file.\n3.  We will see in later sections\
    \ how to extract various parts of this HTML document.\n\n## 17.3.3 Writing HTML\
    \ Content\n\nOnce a BeautifulSoup object represents an HTML document, it can be\
    \ converted to HTML text simply by converting the BeautifulSoup object into a\
    \ string. This is demonstrated below:\n\n```\n>>> from bs4 import BeautifulSoup\n\
    >>> data='<html><body><p class=\"para text\" id=\"1\">This is a <b>test</b><p><br/></body></html>'\n\
    >>> soup=BeautifulSoup(data)\n>>> str(soup)\n'<html><body><p class=\"para text\"\
    \ id=\"1\">This is a <b>test</b></p><p><br/></p></body></html>'\n```\n\nIt is\
    \ also possible to prettify this output using the `prettify` method as follows:\n\
    \n```\n>>> from bs4 import BeautifulSoup\n>>> data='<html><body><p class=\"para\
    \ text\" id=\"1\">This is a <b>test</b><p><br/></body></html>'\n>>> soup=BeautifulSoup(data)\n\
    >>> print(soup.prettify())\n<html>\n <body>\n  <p class=\"para text\" id=\"1\"\
    >\n   This is a\n   <b>\n    test\n   </b>\n  </p>\n  <p>\n   <br/>\n  </p>\n\
    \ </body>\n</html>\n```\n\nThe `prettify` method formats the HTML content and\
    \ returns it as a string. The complete syntax is given below:\n\n```\nBeautifulSoup.prettify([formatter=formatter])\n\
    ```\n\nThe formatter controls how the HTML is prettified. The default value for\
    \ `formatter` is \"minimal\".\n\n## 17.3.4 Extracting Details from the Parse Tree\n\
    \nSection 17.3.2 introduced how we can read an HTML string or file into a BeautifulSoup\
    \ object, but a lot of stuff was hidden in the background! It was not visible\
    \ to us that BeautifulSoup has, in the background, used another HTML parser to\
    \ parse through the content and has built a parse tree representing the entire\
    \ HTML document! This section will show how to explore that parse tree and extract\
    \ values from it.\n\nIn order to demonstrate all these capabilities, we will use\
    \ a sample HTML content like this:\n\n```\n>>> from bs4 import BeautifulSoup\n\
    >>> html=\"\"\"\n... <!DOCTYPE html>\n... <!-- Test file -->\n... <html>\n...\
    \   <head>\n...     <title>HTML Demonstration</title>\n...   </head>\n...   <body>\n\
    ...     <div id=\"main\" class=\"main content\">\n...       <p>This is <b>Bold</b></p>\n\
    ...       <p>This is <i>Italics</i></p>\n...       <p>This is <u>Underlined</u></p>\n\
    ...     </div>\n...   </body>\n... </html>\n... \"\"\"\n>>> soup=BeautifulSoup(html)\n\
    ```\n\nThe parse tree constructed by BeautifulSoup will look like this:\n\n![](img/7831d9fe9e47e5b1109ec75197998a41_578_0.png)\n\
    \n# 17. Parsing HTML\n\n**Observation:**\n\n1.  This tree is a collection of nodes.\
    \ Not all nodes are shown here for readability. We have chosen to merely show\
    \ all the tag objects in the tree.\n2.  What is specifically missing in this tree\
    \ is all the text nodes. Text nodes are not tag objects, but are nodes in the\
    \ tree nevertheless. Though not shown in the tree, we emphasize that they exist\
    \ and will show in the following sections how to extract them as well.\n3.  The\
    \ root of this hierarchy is the вАЬdocumentвАЭ object, maintained internally by BeautifulSoup.\n\
    4.  The single child of the вАЬdocumentвАЭ object is the html tag, which is the root\
    \ of the HTML content.\n5.  The html tag contains a head tag and body tag as children.\n\
    6.  The body tag contains a div tag as its child, which in turn contains 3 p tags.\n\
    \nAll further demonstration code will be continuation of the same session. We\
    \ know that an HTML page generally contains a title tag. Let us extract that tag:\n\
    \n```\n(continuation of previous session)\n>>> tag=soup.title\n>>> tag\n<title>HTML\
    \ Demonstration</title>\n>>> type(tag)\n<class 'bs4.element.Tag'>\n```\n\n**Observation:**\n\
    \n1.  The expression soup.title, where soup refers to the BeautifulSoup object\
    \ that has parsed through some HTML content, returns a reference to a Tag object\
    \ that represents the title tag in the HTML content.\n2.  We see that the string\
    \ representation of a Tag object is the tag along with its content вАУ in this example,\
    \ вАЬ<title>HTML Demonstration</title>вАЭ\n3.  We can verify that the type of the\
    \ Tag object is indeed bs4.element.Tag.\n\nGiven a `Tag` object, as we had extracted\
    \ above, we can obtain the following information:\n\n1.  The name of the tag\n\
    2.  The attributes of the tag\n3.  The string content of the tag\n4.  The child\
    \ tags within the tag\n5.  The complete recursive string content within the tag\n\
    \n### 17.3.4.1 Extracting the Tag Name\n\nThe name of the tag can be extracted\
    \ simply by using the `name` attribute as shown in the example below:\n\n```\n\
    (continuation of previous session)\n>>> tag.name\n'title'\n```\n\n### 17.3.4.2\
    \ Extracting the Tag Attributes\n\nAll the attributes of a `Tag` are available\
    \ as a dictionary in the attribute `attrs`. The key in the dictionary is the attribute\
    \ name and the value is the corresponding value of that attribute. Since the `title`\
    \ tag did not have any attributes, we will demonstrate using the `div` tag:\n\n\
    ```\n(continuation of previous session)\n>>> tag=soup.div\n>>> tag.attrs\n{'id':\
    \ 'main', 'class': ['main', 'content']}\n```\n\n**Observation:**\n\n1.  The `div`\
    \ tag had 2 attributes: `id` and `class`.\n2.  While the `id` attribute had a\
    \ single value, the `class` attribute had 2 values. In HTML, multiple values for\
    \ an attribute are space-separated. BeautifulSoup gives us a list of values instead!\n\
    3.  Do note however that BeautifulSoup will give us a list of values only if and\
    \ when it feels that multiple values are supported for that attribute and at least\
    \ one space is found in the value. If multiple values are not expected for that\
    \ attribute, BeautifulSoup will retain the space in the value instead and does\
    \ not return a list!\n\nAn easier and more direct way of interacting with known\
    \ attributes of a tag is by simply using the attribute name as a subscript on\
    \ the `Tag` object as demonstrated below:\n\n```\n(continuation of previous session)\n\
    >>> tag['id']\n'main'\n>>> tag['class']\n['main', 'content']\n>>> tag['class'][0]\n\
    'main'\n```\n\n**Observation:**\n\n1.  The above approach of course only works\
    \ when we know the name of the attribute we are expecting.\n2.  While `tag['class']`\
    \ gives us the value of the attribute class in the form of a list, `tag['class'][0]`\
    \ gives us the first value for that attribute class.\n\n### 17.3.4.3 Extracting\
    \ the String Content of a Tag\n\nTo extract the text content within a tag, the\
    \ `string` attribute can be used as shown below:\n\n```\n(continuation of previous\
    \ session)\n>>> tag=soup.title\n>>> tag\n<title>HTML Demonstration</title>\n>>>\
    \ tag.string\n'HTML Demonstration'\n>>> type(tag.string)\n<class 'bs4.element.NavigableString'>\n\
    ```\n\n**Observation:**\n\n1.  The `string` attribute provides the text content\
    \ within a `Tag`. The type of the text content is `NavigableString`.\n2.  This\
    \ text content is available only if the `Tag` contains nothing else apart from\
    \ text! Section 17.3.4.5 shows how to extract text from within the child nodes\
    \ recursively.\n3.  The string equivalent of a `NavigableString` object is the\
    \ text content.\n\nIf the given `Tag` contains multiple child text nodes, then\
    \ we can iterate over all the `NavigableString` nodes of the given `Tag` using\
    \ the `strings` attribute as follows:\n\n```\n(continuation of previous session)\n\
    >>> tag=soup.div\n>>> for string in tag.strings:\n...     print(\"[\"+str(string)+\"\
    ]\")\n...\n[\n]\n[This is ]\n[Bold]\n[\n]\n[This is ]\n[Italics]\n[\n]\n[This\
    \ is ]\n[Underlined]\n[\n]\n```\n\n**Observation:**\n\n1.  We are iterating over\
    \ the text content of the `div` Tag.\n2.  We see that this iterates not only within\
    \ the `div` Tag, but also its children!\n3.  We display the string equivalent\
    \ of each child, enclosed in square brackets for readability.\n4.  We need to\
    \ explicitly convert each object to a string using the `str()` function since\
    \ strings cannot be concatenated against other objects. We never found the need\
    \ to convert these objects to strings earlier as in all those examples, the conversion\
    \ to string was implicit!\n\nEach newline character after the HTML tag is being\
    \ considered text content and this makes the output less readable. We can instead\
    \ choose `stripped_strings` over `strings` to iterate over strings that have these\
    \ whitespaces stripped:"
