    involving inheritance and remove it if and only when you have a strong reason
    to do so.

    4. When the base class constructor requires arguments, the arguments could be
    received by the derived class constructor and passed on to the base class constructor
    in the call. In such cases, the derived class constructor is free to accept more
    arguments than are required by the base class constructor, but the additional
    arguments would be meant to be used by the derived class constructor and should
    not be passed to the base class constructor.


    Let us reimplement the `Date` example of section 12.5.1 using inheritance. Recollect
    that we were printing the `Date` using the `print()` method in UK format. What
    if we wanted US format? Would it be a good idea to modify the code to print in
    US format? No! That will cease the current functionality which might be required
    in other places and forces us to retest the entire code again with the changes
    in place. Would it be a good idea to write another `Date` class with a different
    name like `USDate`, copying the code from the `Date` class and then making the
    changes? No! Tomorrow if we end up changing the code of the `Date` class, we might
    have to make the same changes in the `USDate` class, making maintenance difficult,
    changes complicated and introducing a possibility of adding bugs. The best technique
    would be to derive `USDate` from the `Date` class, thereby automatically having
    all functionality of the `Date` class, and overriding the `print()` method providing
    a different implementation of the same. This is illustrated in the program below.'
