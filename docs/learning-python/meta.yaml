- md: '## 16.4.4 Executing Multiple Queries


    The previous section showed how we can frame a single query template but provide
    a different tuple of values each time we call the execute() method. In this section
    we will examine how we can pass an entire sequence of such tuples to run the same
    query template multiple times on different tuples of values!


    We use the `executemany()` method which has the following syntax:


    ```

    cursor.executemany(query_with_placeholders, seq_of_tuples)

    ```


    Here''s a demonstration of adding 2 more records into our `Employee` database
    using this concept:


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="""INSERT INTO Employee VALUES(?,?,?)"""

    >>> employees=[("Sita",10,"sita@company.com"),

    ("Gita",11,"gita@company.com")]

    >>> cursor.executemany(query,employees)

    <sqlite3.Cursor object at 0x7f35d86e7490>

    >>> conn.commit()

    >>> conn.close()

    ```


    **Observation:**


    1. We have used the same query template as before.

    2. We have framed a list of tuples, with each tuple representing 1 Employee record.
    This need not be a list вАУ it can be any sequence, for example another tuple.

    3. We have passed this sequence as an argument to `executemany()` the same way
    we pass a single tuple as an argument to `execute()`.

    4. We now should be having totally 5 records in our database if we have executed
    all the above code snippets. The employee names in our database would be Ram,
    Sham, Balram, Sita and Gita.

    5. So far, we haven''t been able to verify whether our data is indeed present
    in the database. The next section will demonstrate how we can extract data from
    the database and verify the working of all the code we executed so far.


    ## 16.5 Fetching Responses


    Each `Cursor` object, after executing a query, is capable of providing the result
    of the query execution. That is why in section 16.4.1 we had mentioned the need
    for multiple `Cursor` objects in some cases.


    We can either:


    1. Fetch the result a row at a time using `Cursor.fetchone()`

    2. Fetch many rows at a time using `Cursor.fetchmany()`

    3. Fetch all result rows at a time using `Cursor.fetchall()`


    The following sections demonstrate how to use these methods.


    ### 16.5.1 Fetching Results Using fetchone()


    The `Cursor.fetchone()` method fetches a single row of result and returns it.
    As a special case, where there are no more result rows to fetch, it returns `None`.
    This is demonstrated below:


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="SELECT * FROM Employee"

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7fb7281ed490>

    >>> while True:

    ...     row=cursor.fetchone()

    ...     if row is None: break

    ...     print(row)

    ...

    (''Ram'', 1, ''ram@company.com'')

    (''Sham'', 2, ''sham@company.com'')

    (''Balram'', 3, ''ballu@company.com'')

    (''Sita'', 10, ''sita@company.com'')

    (''Gita'', 11, ''gita@company.com'')

    ```


    **Observation:**


    1. We have connected to the same database вАУ `employee.db` вАУ and are trying to
    list out all records in the database.

    2. Each row, when printed, is printed as a tuple of column values.

    3. We iterate row by row till the `fetchone()` method returns `None`.

    4. Since we have not written anything into the database, there is no need to invoke
    `commit()`.


    ### 16.5.2 Fetching Results By Iterating


    Another alternative to fetch result rows sequentially is to iterate through the
    `Cursor` object as demonstrated below:


    ```

    (continuation of previous session)

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7fb7281ed490>

    >>> for row in cursor:

    ...     print(row)

    ...

    (''Ram'', 1, ''ram@company.com'')

    (''Sham'', 2, ''sham@company.com'')

    (''Balram'', 3, ''ballu@company.com'')

    (''Sita'', 10, ''sita@company.com'')

    (''Gita'', 11, ''gita@company.com'')

    >>>

    ```


    **Observation:**


    1. This is a continuation of the previous session and hence we don''t have to
    re-establish connection with the database or create a new `Cursor` object.

    2. We need to execute the query again so as to obtain the results. We can either
    reuse the same `Cursor` object as has been done, or can create a new `Cursor`
    object for this (which is unnecessary).

    3. We are merely iterating over the `Cursor` object and end up iterating over
    the result rows. This is perhaps more readable and simple than using `fetchone()`.


    ### 16.5.3 Fetching Results Using fetchmany()


    The previous sections showed how to fetch a single result record at a time. While
    doing so might be simple, it is also inefficient. It is more efficient to fetch
    a block of rows at a time using `fetchmany()` which has the following syntax:


    ```

    Cursor.fetchmany([size])

    ```


    **Observation:**


    1. The optional `size` argument specifies the number of result rows we wish to
    fetch. In case those many rows are unavailable, it will anyway return how many
    ever rows are available.

    2. It is best to omit the `size` parameter and allow the `Cursor` object to decide
    the best size. This is guaranteed to be optimal.


    Let us continue the Python session and fetch all result rows using `fetchmany()`
    this time:


    ```

    (continuation of previous session)

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7fb7281ed490>

    >>> while True:

    ...     rows=cursor.fetchmany(3)

    ...     if len(rows) == 0: break

    ...     print(rows)

    ...

    [(''Ram'', 1, ''ram@company.com''), (''Sham'', 2, ''sham@company.com''),

    (''Balram'', 3, ''ballu@company.com'')]

    [(''Sita'', 10, ''sita@company.com''), (''Gita'', 11,

    ''gita@company.com'')]

    ```


    **Observation:**


    1. Again, this is a continuation of the previous session and we have executed
    the query again using the same `Cursor` object.

    2. We are attempting to read 3 rows at a time. We break out of the loop when the
    number of rows returned is 0.

    3. Since there were 5 rows in the database, we see that the first iteration produced
    the first 3 rows, the second iteration produced the remainder 2 rows and the third
    iteration produced 0 rows (and that''s when we break out of the loop).


    ### 16.5.4 Fetching Results Using fetchall()


    Another version of the `fetchmany()` method is the `fetchall()` method that returns
    all the result rows at one go. Note that this is not advisable when we are expecting
    a lot of rows as the entire list of rows will be stored in memory!


    We revisit the previous session to demonstrate the use of `fetchall()` to fetch
    all the result rows:


    ```

    (continuation of previous session)

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7fb7281ed490>

    >>> rows=cursor.fetchall()

    >>> print(rows)

    [(''Ram'', 1, ''ram@company.com''), (''Sham'', 2, ''sham@company.com''),

    (''Balram'', 3, ''ballu@company.com''), (''Sita'', 10,

    ''sita@company.com''), (''Gita'', 11, ''gita@company.com'')]

    ```


    **Observation:**


    1. As we can see, all the result rows have been returned at one go. In the special
    case that there were no result rows at all, we would have obtained an empty list.


    ## 16.6 Working With Row Objects


    Section 16.5 showed a variety of ways by which we can extract query result rows
    using the `Cursor` object. For better ease of use, it is possible to deal with
    each result row as a `Row` object instead of a tuple. This section focuses on
    how we can extract columns of a `Row` object.


    In order to deal with rows as `Row` objects instead of tuples, the following statement
    must be executed before we attempt to create the `Cursor` object from the `Connection`
    object:


    ```

    >>> conn.row_factory=sqlite3.Row

    ```


    Here is a small session that demonstrates the use of `Row` objects:


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> conn.row_factory=sqlite3.Row

    >>> cursor=conn.cursor()

    >>> query="SELECT * FROM Employee"

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7fb46b1d9490>

    >>> row=cursor.fetchone()

    >>> row

    <sqlite3.Row object at 0x7fb469682a90>

    ```


    ### 16.6.1 Row Objects as Tuples


    `Row` objects behave like tuples. We can use the `len()` function to find the
    number of columns within the row and can iterate over the row contents, which
    will give us the column values in sequence, as demonstrated below:


    ```

    (continuation of previous session)

    >>> tuple(row)

    (''Ram'', 1, ''ram@company.com'')

    >>> len(row)

    3

    >>> for value in row:

    ...     print(value)

    ...

    Ram

    1

    ram@company.com

    ```'
