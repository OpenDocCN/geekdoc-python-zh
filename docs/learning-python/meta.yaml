    \ A:\n...     def __init__(self):\n...             self.x=0\n...\n>>> a=A()\n\
    >>> getattr(a,'x',2)\n0\n>>> getattr(a,'y',2)\n2\n>>> getattr(a,'y')\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nAttributeError:\
    \ 'A' object has no attribute 'y'\n```\n\nObservation:\n\n+   1. `getattr(a,'x',2)`\
    \ returns the value of the attribute `x` in the instance `a`, which is 0.\n2.\
    \ `getattr(a,'y',2)` returns the value 2 (the `default`) as there is no attribute\
    \ `y` in the instance `a`.\n3. `getattr(a,'y')` generates an `AttributeError`\
    \ as there is no attribute `y` in the instance `a` and no `default` was provided\
    \ either."
- md: "## 12.8.1.3 The setattr() Function\n\nThe `setattr()` function sets the value\
    \ of an attribute in an instance. If the attribute already existed in the instance,\
    \ its value is overwritten and if it did not exist, it is created.\n\nSyntax:\n\
    \n```\nsetattr(object, attribute, value)\n```\n\nExample:\n\n```\n>>> class A:\n\
    ...     def __init__(self):\n...             self.x = 0\n...\n>>> a = A()\n>>>\
    \ setattr(a, 'x', 2)\n>>> setattr(a, 'y', 3)\n>>> a.x\n2\n>>> a.y\n3\n```\n\n\
    Observation:\n\n1. An instance `a` is created with an attribute `x` having the\
    \ value `0`.\n2. `setattr(a, 'x', 2)` overwrites the value of the attribute `x`\
    \ in the instance `a` to `2`.\n3. `setattr(a, 'y', 3)` creates an attribute `y`\
    \ in the instance `a` and assigns a value `3` to it.\n\n## 12.8.1.4 The delattr()\
    \ Function\n\nFinally, to remove an existing attribute from an instance, the `delattr()`\
    \ function can be used.\n\nSyntax:\n\n```\ndelattr(object, attribute)\n```\n\n\
    Note:\n\n1. If the attribute `attribute` exists in the instance `object`, it is\
    \ removed from the instance.\n2. If the attribute `attribute` does not exist in\
    \ the instance `object`, an `AttributeError` is generated.\n\nExample:\n\n```\n\
    >>> class A:\n...     def __init__(self):\n...             self.x = 0\n...\n>>>\
    \ a = A()\n>>> a.x\n0\n>>> delattr(a, 'x')\n>>> a.x\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nAttributeError: 'A' object\
    \ has no attribute 'x'\n>>> delattr(a, 'y')\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nAttributeError: y\n```\n\n## 12.8.1.5\
    \ Standard Attributes\n\nWhile the programmer can create and delete attributes\
    \ within an instance, there are certain standard attributes that are always present\
    \ within each class (and therefore within each instance of that class), which\
    \ are listed in the table below:\n\n| Attribute | Details |\n| :--- | :--- |\n\
    | `__name__` | The name of the class |\n| `__doc__` | The documentation string\
    \ of the class (see section 12.2) |\n| `__bases__` | A tuple containing the base\
    \ classes of this class, in the order of inheritance (see section 12.6.5) |\n\
    | `__module__` | The name of the module to which this class belongs (see section\
    \ 15) |\n| `__dict__` | A dictionary containing the namespace of this class |\n\
    \nTable 24: Standard Attributes\n\nThese attributes are illustrated in the program\
    \ below:\n\n## StandardAttributesDemo.py\n\n```\n1.  #!/usr/bin/python\n2.  \n\
    3.  # Standard Attributes Demo:\n4.  \n5.  class A:\n6.      pass\n7.  \n8.  class\
    \ B:\n9.      pass\n10. \n11. class C(A, B):\n12.     \"A class to demonstrate\
    \ standard attributes\"\n13. \n14.     x = 10\n15. \n16.     def __init__(self):\n\
    17.         pass\n18. \n19.     def f(self):\n20.         pass\n21. \n22. print(\"\
    __name__:\", C.__name__)\n23. print(\"__doc__:\", C.__doc__)\n24. print(\"__bases__:\"\
    , C.__bases__)\n25. print(\"__module__:\", C.__module__)\n26. print(\"__dict__:\"\
    , C.__dict__)\n```\n\n## Output:\n\n```\n__name__: C\n__doc__: A class to demonstrate\
    \ standard attributes\n__bases__: (<class '__main__.A'>, <class '__main__.B'>)\n\
    __module__: __main__\n__dict__: {'f': <function C.f at 0x7f92c18564d0>, '__module__':\
    \ '__main__', '__doc__': 'A class to demonstrate standard attributes', '__init__':\
    \ <function C.__init__ at 0x7f92c1856440>, 'x': 10}\n```\n\n**Observation:**\n\
    \n1. We have defined class A in line 5 and class B in line 8. Class C (defined\
    \ in line 11) derives from class A and class B. Class C contains a constructor\
    \ and a method f. It also contains a class variable x.\n2. We observe that the\
    \ `__name__` attribute correctly gives us the class name as C.\n3. We observe\
    \ that the `__doc__` attribute picks up the documentation string from the class\
    \ C.\n4. We observe that the `__bases__` attribute has identified class A and\
    \ class B, both in the module `__main__`, to be the base classes.\n5. We observe\
    \ that the module within which class C is present is `__main__`.\n6. Finally,\
    \ the attribute `__dict__` is a dictionary containing standard attributes as well\
    \ as user-defined ones. Specifically, we observe that the dictionary contains\
    \ the method f, the constructor and the class variable x.\n\n## 12.8.2 Magic Functions\n\
    \nWe use the term вАЬMagic FunctionsвАЭ to denote those functions/methods that are\
    \ automatically invoked without us explicitly naming them! All of these magic\
    \ functions have the speciality that they have the following syntax for their\
    \ name:\n\n```\n__name__\n```\n\n## 12.8.2.1 Constructors and Destructors\n\n\
    Here are some examples of magic functions that we have already used:\n\n1. Whenever\
    \ we create an object, its constructor (`__init__`) is automatically invoked!\n\
    2. Whenever we delete an object reference using `del`, its destructor (`__del__`)\
    \ is automatically invoked!\n\nObserve in the examples above that the functions\
    \ being called have names that both start and end with double underscores and\
    \ that we never explicitly called them! Here is a proof:\n\n```\n>>> class A:\n\
    ...     def __init__(self): print(\"Created\")\n...     def __del__(self): print(\"\
    Destroyed\")\n...\n>>> a = A()\nCreated\n>>> del(a)\nDestroyed\n```\n\n**Observation:**\n\
    \n1. When we created an instance of class `A` using the statement `a = A()`, we\
    \ observe that the `__init__()` method was automatically invoked!\n2. When we\
    \ deleted the variable a using the statement `del(a)`, we observe that the `__del__`\
    \ method was automatically invoked!\n\n## 12.8.2.2 Stringification\n\nSince many\
    \ a times objects are instances of custom user-defined classes that the Python\
    \ interpreter had no idea about before your program could start execution, we\
    \ find it convenient to have a string representation for such objects, especially\
    \ when we want to display objects to the user or log them to a file. We use the\
    \ term \"stringification\" to describe the conversion of an object to a string,\
    \ and we use the following syntax to perform stringification:\n\n```\nstr(object)\n\
    ```\n\n**Note:**\n\n1. This is the constructor of the string class (`str`) that\
    \ we had discussed in section 2.3.4.1.\n2. The above statement does not work directly\
    \ for user-defined classes, but can be made possible using the concept explained\
    \ below.\n\nAny attempt to stringify an object will automatically call the magic\
    \ method `__str__` of that object. If the object does not contain this method,\
    \ it will use the version provided by the (nearest) super class, calling this\
    \ function of the `object` class in the worst case. This is demonstrated in the\
    \ example below:\n\n```\n>>> class A: pass\n...\n>>> a = A()\n>>> str(a)\n'<__main__.A\
    \ object at 0x7f390c039d30>'\n```\n\n**Observation:**\n\n1. We created an empty\
    \ class A and created an instance of it, the reference to which was stored in\
    \ the variable a.\n2. We see that though the class A did not provide an implementation\
    \ for the `__str__` method, there was no error and we continue to get a string\
    \ version due to the implementation in the `object` class.\n\nLet us add a method\
    \ by name `__str__` in class A to return a string and observe the behaviour:\n\
    \n```\n>>> class A:\n...     def __str__(self):\n...             return \"Hi\"\
    \n...\n>>> a = A()\n>>> str(a)\n'Hi'\n```\n\n**Observation:**\n\n1. This time,\
    \ our class A contains an implementation for the `__str__` method, which is designed\
    \ to return the string \"Hi\" when invoked.\n2. We create an instance of class\
    \ A and store its reference in the variable a.\n3. We observe that `str(a)` ends\
    \ up returning the string \"Hi\", proving that `str(a)` ended up making the call\
    \ `a.__str__()`.\n\nSome of the sample programs in section 12.10 will make use\
    \ of this to provide appropriate string representations of objects of user-defined\
    \ classes.\n\n## 12.8.3 Operator Overloading\n\nMost of the basic operators can\
    \ work even with objects of user-defined classes if the operation methodology\
    \ is taught to the Python interpreter using the concept of *operator overloading*.\n\
    \n## 12.8.3.1 Overloading Basic Arithmetic Operators\n\nTo illustrate the concept,\
    \ if we have an object o and an integer i, it is possible to do operations like\
    \ o + i if we overload the operator + in the class to which the object o belongs.\n\
    \nHere is an example without operator overloading:\n\n```\n>>> class A: pass\n\
    ...\n>>> o = A()\n>>> i = 5\n>>> o + i\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\nTypeError: unsupported operand type(s)\
    \ for +: 'A' and 'int'\n```\n\n**Observation:**\n\n1. We have defined an empty\
    \ class A.\n2. The variable o refers to an instance of class A and the variable\
    \ i refers to an instance of int class with value 5.\n3. Due to the fact that\
    \ we have not overloaded the + operator in class A, we see that the operation\
    \ o + i does not work.\n\nTo support overloading of the + operator, we need to\
    \ add the method `__add__` in class A as follows:\n\n```\n>>> class A:\n...  \
    \   def __add__(self, x): pass\n...\n>>> o = A()\n>>> i = 5\n>>> o + i\n>>>\n\
    ```"
  mdcn: "## 12.8.1.3 `setattr()` еЗљжХ∞\n\n`setattr()` еЗљжХ∞зФ®дЇОиЃЊзљЃеЃЮдЊЛдЄ≠жЯРдЄ™е±ЮжАІзЪДеАЉгАВе¶ВжЮЬиѓ•е±ЮжАІеЬ®еЃЮдЊЛдЄ≠еЈ≤е≠ШеЬ®пЉМеИЩеЕґеАЉдЉЪиҐЂи¶ЖзЫЦпЉЫе¶ВжЮЬдЄНе≠ШеЬ®пЉМеИЩдЉЪиҐЂеИЫеїЇгАВ\n\
    \nиѓ≠ж≥ХпЉЪ\n\n```\nsetattr(object, attribute, value)\n```\n\nз§ЇдЊЛпЉЪ\n\n```\n>>> class\
    \ A:\n...     def __init__(self):\n...             self.x = 0\n...\n>>> a = A()\n\
    >>> setattr(a, 'x', 2)\n>>> setattr(a, 'y', 3)\n>>> a.x\n2\n>>> a.y\n3\n```\n\n\
