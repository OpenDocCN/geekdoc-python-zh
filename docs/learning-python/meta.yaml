    \ `x` зЪДеАЉи¶ЖзЫЦдЄЇ `2`гАВ\n3.  `setattr(a, 'y', 3)` еЬ®еЃЮдЊЛ `a` дЄ≠еИЫеїЇдЇЖдЄАдЄ™е±ЮжАІ `y`пЉМеєґдЄЇеЕґиµЛеАЉ `3`гАВ\n\n\
    ## 12.8.1.4 `delattr()` еЗљжХ∞\n\nжЬАеРОпЉМи¶БдїОеЃЮдЊЛдЄ≠еИ†йЩ§дЄАдЄ™еЈ≤е≠ШеЬ®зЪДе±ЮжАІпЉМеПѓдї•дљњзФ® `delattr()` еЗљжХ∞гАВ\n\nиѓ≠ж≥ХпЉЪ\n\
    \n```\ndelattr(object, attribute)\n```\n\nж≥®жДПпЉЪ\n\n1.  е¶ВжЮЬе±ЮжАІ `attribute` е≠ШеЬ®дЇОеЃЮдЊЛ `object`\
    \ дЄ≠пЉМеЃГе∞ЖиҐЂдїОеЃЮдЊЛдЄ≠зІїйЩ§гАВ\n2.  е¶ВжЮЬе±ЮжАІ `attribute` дЄНе≠ШеЬ®дЇОеЃЮдЊЛ `object` дЄ≠пЉМе∞ЖеЉХеПС `AttributeError`гАВ\n\
    \nз§ЇдЊЛпЉЪ\n\n```\n>>> class A:\n...     def __init__(self):\n...             self.x\
    \ = 0\n...\n>>> a = A()\n>>> a.x\n0\n>>> delattr(a, 'x')\n>>> a.x\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nAttributeError:\
    \ 'A' object has no attribute 'x'\n>>> delattr(a, 'y')\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nAttributeError: y\n```\n\
    \n## 12.8.1.5 ж†ЗеЗЖе±ЮжАІ\n\nиЩљзДґз®ЛеЇПеСШеПѓдї•еЬ®еЃЮдЊЛеЖЕйГ®еИЫеїЇеТМеИ†йЩ§е±ЮжАІпЉМдљЖжѓПдЄ™з±їпЉИдї•еПКиѓ•з±їзЪДжѓПдЄ™еЃЮдЊЛпЉЙдЄ≠еІЛзїИе≠ШеЬ®жЯРдЇЫж†ЗеЗЖе±ЮжАІпЉМе¶ВдЄЛи°®жЙАз§ЇпЉЪ\n\n\
    | е±ЮжАІ | иѓ¶жГЕ |\n| :--- | :--- |\n| `__name__` | з±їзЪДеРНзІ∞ |\n| `__doc__` | з±їзЪДжЦЗж°£е≠Чзђ¶дЄ≤пЉИеПВиІБзђђ\
    \ 12.2 иКВпЉЙ |\n| `__bases__` | дЄАдЄ™еМЕеРЂиѓ•з±їеЯЇз±їзЪДеЕГзїДпЉМжМЙзїІжЙњй°ЇеЇПжОТеИЧпЉИеПВиІБзђђ 12.6.5 иКВпЉЙ |\n| `__module__`\
