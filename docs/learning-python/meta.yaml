    # 21. Appendix вАУ Python 2 Vs. Python 3


    The below code snippet illustrates the challenge in using `intern("mysting")`
    in Python 3 directly as it is not readily available (you''ll need to import it
    from `sys`). Conversely, if we try to import the same in Python 2, we get an `ImportError`
    exception:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> intern(''mystring'')`<br>`''mystring''`<br>`>>> from sys import intern`<br>`Traceback
    (most recent call last):`<br>`  File "<stdin>", line 1, in <module>`<br>`ImportError:
    cannot import name intern` | `>>> intern(''mystring'')`<br>`Traceback (most recent
    call last):`<br>`  File "<stdin>", line 1, in <module>`<br>`NameError: name ''intern''
    is not defined`<br>`>>> from sys import intern`<br>`>>> intern(''mystring'')`<br>`''mystring''`
    |


    To make the above code work with both Python 2 and Python 3, we could use the
    `six` module as follows:


    ```

    >>> from six.moves import intern

    >>> intern(''mystring'')

    mystring

    ```


    Another demonstration of the `six` module is with respect to a few constants that
    come handy as replacements for certain objects (that got deprecated in Python
    3):


    +   - `six.class_types`

    - `six.integer_types`

    - `six.string_types`

    - `six.text_type`

    - `six.binary_type`


    Here is a demonstration in Python 2:


    ```

    >>> a=u''Hello World''

    >>> isinstance(a, basestring)

    True

    >>> isinstance(a, str)

    False

    >>> import six

    ```'
  - "[PAGE 658]\n\n```\n>>> isinstance(a, six.string_types)\nTrue\n```\n\n**Observation:**\n\
    \n+   1. In Python 2, a Unicode string is definitely derived from `basestring`,\
    \ but does not qualify as being a `str` object.\n2. A Unicode string in Python\
    \ 2 qualifies as being `six.string_types` nevertheless.\n\nHere is a similar piece\
    \ of code in Python 3:\n\n```\n>>> a=u'Hello World'\n>>> isinstance(a, basestring)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'basestring' is not defined\n>>> isinstance(a, str)\nTrue\n>>>\
    \ import six\n>>> isinstance(a, six.string_types)\nTrue\n```\n\n**Observation:**\n\
    \n+   1. In Python 3, all strings are Unicode strings and are thus instances of\
    \ the `str` class.\n2. There is no base class called `basestring` in Python 3.\n\
    3. However, Unicode strings in Python 3 still qualify as being instances of `six.string_types`.\n\
    \n> **NOTE:**\nMore information on the `six` module can be found at https://pypi.python.org/pypi/six."
