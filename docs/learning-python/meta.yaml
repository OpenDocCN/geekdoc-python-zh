    \n## 10.7 Variable Arguments\n\nA function in Python can be designed to receive\
    \ any number of arguments. In other words, the number of arguments can vary from\
    \ call to call. For example, consider a function `sum` that is supposed to add\
    \ multiple values. We do not know how many values will be provided вАУ in some calls\
    \ there may be only 2 values, but some other calls may provide 5 values for example.\
    \ Here is an example of how we could write the function `sum` using the concept\
    \ of variable arguments:\n\n```\n>>> def sum(*x):\n...     s=0\n...     for i\
    \ in x: s+=i\n...     print(s)\n...\n>>> sum(2,3)\n5\n>>> sum(2,3,5,5,5,5)\n25\n\
    >>> sum()\n0\n```\n\n**Observation:**\n\n- 1. The special `*` prefix is used to\
    \ denote that we are dealing with a variable arguments.\n- 2. These variable arguments\
    \ are packed together into a tuple that is accessible as a single parameters in\
    \ the function вАУ in our example, `x`.\n- 3. A simple `for` loop can help iterate\
    \ through all the arguments passed, in order.\n\n### 10.7.1 Variable Arguments\
    \ With Positional Parameters\n\nIt is possible to combine positional parameters\
    \ with variable arguments. These are helpful in cases where we expect a known\
    \ number of values followed by an optional sequence of additional values. Let\
    \ us redesign the `sum` function to add at least 2 values when called:\n\n```\n\
    >>> def sum(a,b,*x):\n...     s=a+b\n...     for i in x: s+=i\n...     print(s)\n\
    ...\n>>> sum(2,3)\n5\n>>> sum(2,3,5,5,5,5)\n25\n>>> sum()\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: sum() missing\
    \ 2 required positional arguments: 'a' and 'b'\n```\n\n**Observation:**\n\n- 1.\
    \ In this function, `a` and `b` are positional parameters. It is mandatory to\
    \ provide arguments for these or else we will get an error as demonstrated in\
    \ the example `sum()`.\n- 2. The variable `s` is initialized to the sum of `a`\
    \ and `b` instead of `0` as was the case in the previous example.\n\nThe `*` parameter\
    \ (`x` in our previous example) is greedy and will take up all remaining arguments.\
    \ Therefore, we will never provide positional parameters after variable arguments,\
    \ as demonstrated by this example:\n\n```\n>>> def sum(*x,a,b):\n...     s=a+b\n\
    ...     for i in x: s+=i\n...     print(s)\n...\n>>> sum(2,3,4)\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: sum()\
    \ missing 2 required keyword-only arguments: 'a' and 'b'\n```\n\nThe problem can\
    \ be solved however, using keyword arguments for the positional parameters as\
    \ shown below:\n\n```\n>>> sum(2,a=3,b=4)\n9\n```\n\n> **NOTE:**\nA keyword argument\
    \ cannot be followed by a non-keyword argument.\n\n### 10.7.2 Variable Arguments\
    \ With Default Arguments\n\nDefault arguments are optional and variable arguments\
    \ are greedy! Here is an example to show how the combination behaves:\n\n```\n\
    >>> def sum(a,b=100,*x):\n...     s=a+b\n...     for i in x: s+=i\n...     print(s)\n\
    ...\n>>> sum(5)\n105\n>>> sum(5,8)\n13\n>>> sum(5,8,12)\n25\n```\n\n**Observation:**\n\
    \n- 1. In the above example, `a` is a positional parameter and is mandatory, `b`\
    \ is a default argument and is optional, `x` is the collection of variable arguments\
    \ and is optional. Thus, at least 1 argument in the function call is compulsory.\n\
    - 2. When only 1 argument is provided, the argument is considered to be the value\
    \ of the positional parameter `a` and parameter `b` takes on the value `100`.\n\
    - 3. When 2 arguments are provided, they are assumed to be the values of `a` and\
    \ `b` respectively and `x` is empty.\n- 4. When more than 2 arguments are provided,\
    \ the first 2 arguments are considered to be the values of `a` and `b` respectively\
    \ and the rest will be present in `x` in the same sequence as in the call.\n\n\
    Of course, the positional parameter and default argument can be provided as keyword\
    \ arguments if required as shown in the examples below:\n\n```\n>>> sum(b=2,a=5)\n\
    7\n>>> sum(7,b=2)\n9\n```\n\nHere are some more cases to consider:\n\n```\n>>>\
    \ sum(3,a=4)\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nTypeError: sum() got multiple values for argument 'a'\n```\n\n\
    **Observation:**\n\n- 1. If the first argument is provided, it is assigned to\
    \ the positional parameter a. Reassignment using keyword arguments is not permitted.\n\
    \n```\n>>> sum(3,5,b=4)\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: sum() got multiple values for argument 'b'\n\
    ```\n\n**Observation:**\n\n- 1. If a second argument is provided, it is assigned\
    \ to the parameter b. Reassignment using keyword arguments is not permitted.\n\
    \n### 10.7.3 Variable Arguments Followed by Default Arguments\n\nAs a special\
    \ case, if variable arguments are followed by default arguments, the result is\
    \ that the value for the default argument can only be explicitly provided using\
    \ keyword arguments. Recollect the built-in print() function: it obviously supports\
    \ variable arguments since it can print any number of values. It also uses a separator\
    \ with a default value of space and a terminator with a default value of newline.\
    \ The only way to specify a custom separator or terminator is by using keyword\
    \ arguments:\n\n```\n>>> print(1,2,3,sep=':',end='\\n*****\\n')\n1:2:3\n*****\n\
    ```\n\nHere is a function sum that receives variable arguments along with a default\
    \ argument following it:\n\n```\n>>> def sum(*x,negate=False):\n...     s=0\n\
    ...     for i in x: s+=i\n...     if negate: s = -s\n...     print(s)\n...\n>>>\
    \ sum(2,3,4)\n9\n>>> sum(2,3,4,negate=True)\n-9\n>>> sum(2,3,4,True)\n10\n```\n\
    \n**Observation:**\n\n- 1. In the example `sum(2,3,4)`, all the arguments go into\
    \ `x`, leaving `negate` with the default value, `False`.\n- 2. In the example\
    \ `sum(2,3,4,negate=True)`, the keyword argument `negate=True` ensures that the\
    \ parameter `negate` takes on the value `True`. All other arguments are stored\
    \ in `x`.\n- 3. In the example `sum(2,3,4,True)`, all arguments are stored in\
    \ `x`. Thus, the final argument `True` is also a part of `x` and counted as `1`\
    \ during addition. Specifically, the value `True` is not taken to be the value\
    \ for `negate`.\n\n### 10.7.4 Variable Arguments Followed by Keyword Arguments\n\
    \n- 1. Section 10.5 introduced the capability to accept default values for missing\
    \ arguments.\n- 2. Section 10.7 introduced the capability to accept variable number\
    \ of arguments.\n- 3. Section 10.6 introduced the capability of accepting arbitrary\
    \ keyword arguments.\n\nAll of these can be combined as shown below:\n\n```\n\
    >>> def sum(a,b=2,*c,**d):\n...     print(\"a:\",a,\"b:\",b)\n...     print(\"\
    c:\",end='')\n...     for i in c: print(i,end=' ')\n...     print(\"\\nd:\",end='')\n\
    ...     for k,v in d.items(): print(\"({}={})\".format(k,v),end='')\n...     print()\n\
    ...\n>>> sum(1,2,3,4,5,6,7,x=2,y=4,z=9)\na: 1 b: 2\nc:3 4 5 6 7\nd:(x=2) (y=4)\
    \ (z=9)\n```\n\n## 10.8 Returning From Functions\n\nWhen a function is called,\
    \ it returns automatically after its entire body executes by default. It is possible\
    \ to ensure that the function returns immediately, whenever required, using the\
    \ `return` statement. On execution, the `return` statement immediately transfers\
    \ control back to the caller.\n\nThe complete syntax of `return` statement is:\n\
    \n```\nreturn [value]\n```\n\n**Forms:**\n\n- 1. return\n- 2. return value\n\n\
    Form #1 will be covered in this section whereas form #2 will be covered in the\
    \ next section.\n\n```\n>>> def hi():\n...     print(\"Hello World\")\n...   \
    \  return\n...     print(\"Heya!\")\n...\n>>> hi()\nHello World\n```\n\n**Observation:**\n\
    \n- 1. The function `hi` did not end up printing the string \"Heya!\" since the\
    \ `return` statement preceding it resulted in a transfer of control back to the\
    \ caller.\n- 2. Unconditional `return` statements such as the one shown in this\
    \ example are practically useless as the rest of the statements never get executed.\
    \ It is common for a function to have multiple `return` statements, but in such\
    \ cases the `return` statement would be conditional вАУ probably present within\
    \ an `if` statement's body.\n\n## 10.9 Returning Single Values From Functions\n\
    \nThe previous function did not return any value back to the caller. As per the\
    \ definition of functions in classical computer science, a function must return\
    \ a value. Python acknowledges this rule by ensuring that functions that return\
    \ nothing end up returning `None` by default! This can be verified by assigning\
    \ the function call to a variable and examining its value or directly printing\
    \ the value returned by the function call, both of which are shown below:"
  mdcn: "> **ж≥®жДПпЉЪ**\nеЕ≥йФЃе≠ЧеПВжХ∞еРОйЭҐдЄНиГљиЈЯйЭЮеЕ≥йФЃе≠ЧеПВжХ∞гАВ\n\n## 10.7 еПѓеПШеПВжХ∞\n\nPython дЄ≠зЪДеЗљжХ∞еПѓдї•иЃЊиЃ°дЄЇжО•жФґдїїжДПжХ∞йЗПзЪДеПВжХ∞гАВжНҐеП•иѓЭиѓіпЉМеПВжХ∞зЪДжХ∞йЗПеПѓдї•еЬ®жѓПжђ°и∞ГзФ®жЧґеПШеМЦгАВдЊЛе¶ВпЉМиАГиЩСдЄАдЄ™зФ®дЇОзіѓеК†е§ЪдЄ™еАЉзЪДеЗљжХ∞\
    \ `sum`гАВжИСдїђдЄНзЯ•йБУдЉЪжПРдЊЫе§Ъе∞СдЄ™еАЉвАФвАФеЬ®жЯРдЇЫи∞ГзФ®дЄ≠еПѓиГљеП™жЬЙ 2 дЄ™еАЉпЉМиАМеЬ®еЕґдїЦи∞ГзФ®дЄ≠еПѓиГљжПРдЊЫ 5 дЄ™еАЉгАВдї•дЄЛжШѓе¶ВдљХдљњзФ®еПѓеПШеПВжХ∞ж¶ВењµзЉЦеЖЩ `sum` еЗљжХ∞зЪДз§ЇдЊЛпЉЪ\n\
    \n```\n>>> def sum(*x):\n...     s=0\n...     for i in x: s+=i\n...     print(s)\n\
    ...\n>>> sum(2,3)\n5\n>>> sum(2,3,5,5,5,5)\n25\n>>> sum()\n0\n```\n\n**иІВеѓЯпЉЪ**\n\
    \n- 1. зЙєжЃКзЪД `*` еЙНзЉАзФ®дЇОи°®з§ЇжИСдїђж≠£еЬ®е§ДзРЖеПѓеПШеПВжХ∞гАВ\n- 2. ињЩдЇЫеПѓеПШеПВжХ∞иҐЂжЙУеМЕжИРдЄАдЄ™еЕГзїДпЉМеЬ®еЗљжХ∞дЄ≠дљЬдЄЇеНХдЄ™еПВжХ∞иЃњйЧЃвАФвАФеЬ®жИСдїђзЪДдЊЛе≠РдЄ≠жШѓ `x`гАВ\n\
    - 3. дЄАдЄ™зЃАеНХзЪД `for` еЊ™зОѓеПѓдї•еЄЃеК©жМЙй°ЇеЇПйБНеОЖжЙАжЬЙдЉ†йАТзЪДеПВжХ∞гАВ\n\n### 10.7.1 еЄ¶дљНзљЃеПВжХ∞зЪДеПѓеПШеПВжХ∞\n\nеПѓдї•е∞ЖдљНзљЃеПВжХ∞дЄОеПѓеПШеПВжХ∞зїУеРИдљњзФ®гАВињЩеЬ®жЬЯжЬЫеЈ≤зЯ•жХ∞йЗПзЪДеАЉеРОиЈЯеПѓйАЙзЪДйҐЭе§ЦеАЉеЇПеИЧжЧґеЊИжЬЙзФ®гАВиЃ©жИСдїђйЗНжЦ∞иЃЊиЃ°\
    \ `sum` еЗљжХ∞пЉМдљњеЕґеЬ®и∞ГзФ®жЧґиЗ≥е∞СзіѓеК† 2 дЄ™еАЉпЉЪ\n\n```\n>>> def sum(a,b,*x):\n...     s=a+b\n... \
    \    for i in x: s+=i\n...     print(s)\n...\n>>> sum(2,3)\n5\n>>> sum(2,3,5,5,5,5)\n\
    25\n>>> sum()\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nTypeError: sum() missing 2 required positional arguments: 'a' and\
    \ 'b'\n```\n\n**иІВеѓЯпЉЪ**\n\n- 1. еЬ®ж≠§еЗљжХ∞дЄ≠пЉМ`a` еТМ `b` жШѓдљНзљЃеПВжХ∞гАВењЕй°їдЄЇињЩдЇЫеПВжХ∞жПРдЊЫеПВжХ∞пЉМеР¶еИЩжИСдїђе∞ЖеЊЧеИ∞йФЩиѓѓпЉМе¶Вз§ЇдЊЛ\
    \ `sum()` жЙАз§ЇгАВ\n- 2. еПШйЗП `s` еИЭеІЛеМЦдЄЇ `a` еТМ `b` зЪДеТМпЉМиАМдЄНжШѓеГПеЙНдЄАдЄ™з§ЇдЊЛдЄ≠йВ£ж†ЈеИЭеІЛеМЦдЄЇ `0`гАВ\n\n`*` еПВжХ∞пЉИжИСдїђдєЛеЙНзЪДдЊЛе≠РдЄ≠зЪД\
    \ `x`пЉЙжШѓиі™е©™зЪДпЉМдЉЪеН†зФ®жЙАжЬЙеЙ©дљЩзЪДеПВжХ∞гАВеЫ†ж≠§пЉМжИСдїђж∞ЄињЬдЄНдЉЪеЬ®еПѓеПШеПВжХ∞дєЛеРОжПРдЊЫдљНзљЃеПВжХ∞пЉМе¶ВжЬђдЊЛжЙАз§ЇпЉЪ\n\n```\n>>> def sum(*x,a,b):\n\
    ...     s=a+b\n...     for i in x: s+=i\n...     print(s)\n...\n>>> sum(2,3,4)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: sum() missing 2 required keyword-only arguments: 'a' and 'b'\n```\n\
    \nзДґиАМпЉМеПѓдї•дљњзФ®еЕ≥йФЃе≠ЧеПВжХ∞дЄЇдљНзљЃеПВжХ∞жПРдЊЫеАЉжЭ•иІ£еЖ≥ж≠§йЧЃйҐШпЉМе¶ВдЄЛжЙАз§ЇпЉЪ\n\n```\n>>> sum(2,a=3,b=4)\n9\n```\n\n> **ж≥®жДПпЉЪ**\n\
    еЕ≥йФЃе≠ЧеПВжХ∞еРОйЭҐдЄНиГљиЈЯйЭЮеЕ≥йФЃе≠ЧеПВжХ∞гАВ\n\n### 10.7.2 еЄ¶йїШиЃ§еПВжХ∞зЪДеПѓеПШеПВжХ∞\n\nйїШиЃ§еПВжХ∞жШѓеПѓйАЙзЪДпЉМиАМеПѓеПШеПВжХ∞жШѓиі™е©™зЪДпЉБдї•дЄЛз§ЇдЊЛе±Хз§ЇдЇЖињЩзІНзїДеРИзЪДи°МдЄЇпЉЪ\n\
    \n```\n>>> def sum(a,b=100,*x):\n...     s=a+b\n...     for i in x: s+=i\n...\
    \     print(s)\n...\n>>> sum(5)\n105\n>>> sum(5,8)\n13\n>>> sum(5,8,12)\n25\n\
    ```\n\n**иІВеѓЯпЉЪ**\n\n- 1. еЬ®дЄКйЭҐзЪДдЊЛе≠РдЄ≠пЉМ`a` жШѓдљНзљЃеПВжХ∞дЄФжШѓењЕйЬАзЪДпЉМ`b` жШѓйїШиЃ§еПВжХ∞дЄФжШѓеПѓйАЙзЪДпЉМ`x` жШѓеПѓеПШеПВжХ∞зЪДйЫЖеРИдЄФжШѓеПѓйАЙзЪДгАВеЫ†ж≠§пЉМеЗљжХ∞и∞ГзФ®дЄ≠иЗ≥е∞СйЬАи¶Б\
    \ 1 дЄ™еПВжХ∞гАВ\n- 2. ељУеП™жПРдЊЫ 1 дЄ™еПВжХ∞жЧґпЉМиѓ•еПВжХ∞иҐЂиІЖдЄЇдљНзљЃеПВжХ∞ `a` зЪДеАЉпЉМеПВжХ∞ `b` еПЦеАЉ `100`гАВ\n- 3. ељУжПРдЊЫ 2 дЄ™еПВжХ∞жЧґпЉМеЃГдїђеИЖеИЂиҐЂиІЖдЄЇ\
    \ `a` еТМ `b` зЪДеАЉпЉМ`x` дЄЇз©ЇгАВ\n- 4. ељУжПРдЊЫиґЕињЗ 2 дЄ™еПВжХ∞жЧґпЉМеЙН 2 дЄ™еПВжХ∞еИЖеИЂиҐЂиІЖдЄЇ `a` еТМ `b` зЪДеАЉпЉМеЕґдљЩеПВжХ∞е∞ЖжМЙи∞ГзФ®дЄ≠зЪДзЫЄеРМй°ЇеЇПеЗЇзО∞еЬ®\
    \ `x` дЄ≠гАВ\n\nељУзДґпЉМе¶ВжЮЬйЬАи¶БпЉМдљНзљЃеПВжХ∞еТМйїШиЃ§еПВжХ∞еПѓдї•дљЬдЄЇеЕ≥йФЃе≠ЧеПВжХ∞жПРдЊЫпЉМе¶ВдЄЛдЊЛжЙАз§ЇпЉЪ\n\n```\n>>> sum(b=2,a=5)\n7\n\
    >>> sum(7,b=2)\n9\n```\n\nдї•дЄЛжШѓдЄАдЇЫйЬАи¶БиАГиЩСзЪДеЕґдїЦжГЕеЖµпЉЪ\n\n```\n>>> sum(3,a=4)\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: sum()\
    \ got multiple values for argument 'a'\n```\n\n**иІВеѓЯпЉЪ**\n\n- 1. е¶ВжЮЬжПРдЊЫдЇЖзђђдЄАдЄ™еПВжХ∞пЉМеЃГе∞ЖиҐЂеИЖйЕНзїЩдљНзљЃеПВжХ∞\
    \ `a`гАВдЄНеЕБиЃЄдљњзФ®еЕ≥йФЃе≠ЧеПВжХ∞йЗНжЦ∞иµЛеАЉгАВ\n\n```\n>>> sum(3,5,b=4)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: sum() got multiple values\
    \ for argument 'b'\n```\n\n**иІВеѓЯпЉЪ**\n\n- 1. е¶ВжЮЬжПРдЊЫдЇЖзђђдЇМдЄ™еПВжХ∞пЉМеЃГе∞ЖиҐЂеИЖйЕНзїЩеПВжХ∞ `b`гАВдЄНеЕБиЃЄдљњзФ®еЕ≥йФЃе≠ЧеПВжХ∞йЗНжЦ∞иµЛеАЉгАВ\n\
    \n### 10.7.3 еПѓеПШеПВжХ∞еРОиЈЯйїШиЃ§еПВжХ∞\n\nдљЬдЄЇдЄАзІНзЙєжЃКжГЕеЖµпЉМе¶ВжЮЬеПѓеПШеПВжХ∞еРОиЈЯйїШиЃ§еПВжХ∞пЉМзїУжЮЬжШѓйїШиЃ§еПВжХ∞зЪДеАЉеП™иГљйАЪињЗеЕ≥йФЃе≠ЧеПВжХ∞жШЊеЉПжПРдЊЫгАВеЫЮжГ≥дЄАдЄЛеЖЕзљЃзЪД\
    \ `print()` еЗљжХ∞пЉЪеЃГжШЊзДґжФѓжМБеПѓеПШеПВжХ∞пЉМеЫ†дЄЇеЃГеПѓдї•жЙУеН∞дїїжДПжХ∞йЗПзЪДеАЉгАВеЃГињШдљњзФ®дЄАдЄ™йїШиЃ§еАЉдЄЇз©Їж†ЉзЪДеИЖйЪФзђ¶еТМдЄАдЄ™йїШиЃ§еАЉдЄЇжНҐи°Мзђ¶зЪДзїИж≠Ґзђ¶гАВжМЗеЃЪиЗ™еЃЪдєЙеИЖйЪФзђ¶жИЦзїИж≠Ґзђ¶зЪДеФѓдЄАжЦєж≥ХжШѓдљњзФ®еЕ≥йФЃе≠ЧеПВжХ∞пЉЪ\n\
    \n```\n>>> print(1,2,3,sep=':',end='\\n*****\\n')\n1:2:3\n*****\n```\n\nдї•дЄЛжШѓдЄАдЄ™жО•жФґеПѓеПШеПВжХ∞еПКеЕґеРОиЈЯйїШиЃ§еПВжХ∞зЪДеЗљжХ∞\
    \ `sum`пЉЪ\n\n```\n>>> def sum(*x,negate=False):\n...     s=0\n...     for i in\
    \ x: s+=i\n...     if negate: s = -s\n...     print(s)\n...\n>>> sum(2,3,4)\n\
    9\n>>> sum(2,3,4,negate=True)\n-9\n>>> sum(2,3,4,True)\n10\n```\n\n**иІВеѓЯпЉЪ**\n\n\
    - 1. еЬ®з§ЇдЊЛ `sum(2,3,4)` дЄ≠пЉМжЙАжЬЙеПВжХ∞йГљињЫеЕ• `x`пЉМ`negate` дњЭзХЩеЕґйїШиЃ§еАЉ `False`гАВ\n- 2. еЬ®з§ЇдЊЛ `sum(2,3,4,negate=True)`\
    \ дЄ≠пЉМеЕ≥йФЃе≠ЧеПВжХ∞ `negate=True` з°ЃдњЭеПВжХ∞ `negate` еПЦеАЉ `True`гАВжЙАжЬЙеЕґдїЦеПВжХ∞йГље≠ШеВ®еЬ® `x` дЄ≠гАВ\n- 3. еЬ®з§ЇдЊЛ `sum(2,3,4,True)`\
    \ дЄ≠пЉМжЙАжЬЙеПВжХ∞йГље≠ШеВ®еЬ® `x` дЄ≠гАВеЫ†ж≠§пЉМжЬАеРОдЄАдЄ™еПВжХ∞ `True` дєЯжШѓ `x` зЪДдЄАйГ®еИЖпЉМеєґеЬ®еК†ж≥ХдЄ≠иЃ°дЄЇ `1`гАВеЕЈдљУжЭ•иѓіпЉМеАЉ `True` дЄНиҐЂиІЖдЄЇ\
    \ `negate` зЪДеАЉгАВ\n\n### 10.7.4 еПѓеПШеПВжХ∞еРОиЈЯеЕ≥йФЃе≠ЧеПВжХ∞\n\n- 1. зђђ 10.5 иКВдїЛзїНдЇЖдЄЇзЉЇе§±еПВжХ∞жО•еПЧйїШиЃ§еАЉзЪДиГљеКЫгАВ\n-\
    \ 2. зђђ 10.7 иКВдїЛзїНдЇЖжО•еПЧеПѓеПШжХ∞йЗПеПВжХ∞зЪДиГљеКЫгАВ\n- 3. зђђ 10.6 иКВдїЛзїНдЇЖжО•еПЧдїїжДПеЕ≥йФЃе≠ЧеПВжХ∞зЪДиГљеКЫгАВ\n\nжЙАжЬЙињЩдЇЫйГљеПѓдї•е¶ВдЄЛзїДеРИпЉЪ\n\n\
    ```\n>>> def sum(a,b=2,*c,**d):\n...     print(\"a:\",a,\"b:\",b)\n...     print(\"\
    c:\",end='')\n...     for i in c: print(i,end=' ')\n...     print(\"\\nd:\",end='')\n\
    ...     for k,v in d.items(): print(\"({}={})\".format(k,v),end='')\n...     print()\n\
    ...\n>>> sum(1,2,3,4,5,6,7,x=2,y=4,z=9)\na: 1 b: 2\nc:3 4 5 6 7\nd:(x=2) (y=4)\
    \ (z=9)\n```\n\n## 10.8 дїОеЗљжХ∞ињФеЫЮ\n\nељУи∞ГзФ®еЗљжХ∞жЧґпЉМйїШиЃ§жГЕеЖµдЄЛпЉМеЃГдЉЪеЬ®жХідЄ™еЗљжХ∞дљУжЙІи°МеЃМжѓХеРОиЗ™еК®ињФеЫЮгАВеПѓдї•дљњзФ® `return`\
    \ иѓ≠еП•з°ЃдњЭеЗљжХ∞еЬ®йЬАи¶БжЧґзЂЛеН≥ињФеЫЮгАВжЙІи°МжЧґпЉМ`return` иѓ≠еП•дЉЪзЂЛеН≥е∞ЖжОІеИґжЭГиљђзІїеЫЮи∞ГзФ®иАЕгАВ\n\n`return` иѓ≠еП•зЪДеЃМжХіиѓ≠ж≥ХжШѓпЉЪ\n\n```\n\
    return [value]\n```\n\n**ељҐеЉПпЉЪ**\n\n- 1. return\n- 2. return value\n\nељҐеЉП #1 е∞ЖеЬ®жЬђиКВдЄ≠дїЛзїНпЉМиАМељҐеЉП\
    \ #2 е∞ЖеЬ®дЄЛдЄАиКВдЄ≠дїЛзїНгАВ\n\n```\n>>> def hi():\n...     print(\"Hello World\")\n...    \
    \ return\n...     print(\"Heya!\")\n...\n>>> hi()\nHello World\n```\n\n**иІВеѓЯпЉЪ**\n\
