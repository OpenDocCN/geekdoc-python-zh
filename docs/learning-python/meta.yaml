    \ spanning the entire tuple\n(5, 2, 3, 2)\n```\n\n> NOTE:\nSince tuples are immutable,\
    \ unlike lists, T[:] is the same as T!\n\n## 5.7 Adding, Multiplying and Copying\
    \ Tuples\n\nThe + (addition), += (addition and assignment), * (multiplication),\
    \ *= (multiplication and assignment) and = (assignment) operators are available\
    \ to operate on tuples, the same way they are available to operate on lists.\n\
    \n### 5.7.1 Adding Tuples\n\nTwo tuples can be concatenated to form a third tuple\
    \ using the + operator:\n\n```python\n>>> T1=(1,3)\n>>> T2=(7,8)\n>>> T3=T1+T2\n\
    >>> T3\n(1, 3, 7, 8)\n```\n\nThe += operator will concatenate the tuple on the\
    \ RHS to the list on the LHS:\n\n```python\n>>> T=(1,3)\n>>> T+=(7,8)\n>>> T\n\
    (1, 3, 7, 8)\n```\n\n> **NOTE:**\nT1 += T2 creates a new tuple and stores T1+T2\
    \ result in that and assigns the new tuple to T1. Note that tuples are immutable\
    \ and new elements cannot be added to an existing tuple.\n\n### 5.7.2 Multiplying\
    \ Tuples\n\nA tuple T can be multiplied by an integer n to denote the tuple T\
    \ repeated n times:\n\n```python\n>>> T=(5,2,3)*3\n>>> T\n(5, 2, 3, 5, 2, 3, 5,\
    \ 2, 3)\n```\n\n> **NOTE:**\ntuple * n is the same as n * tuple!\n\nSimilarly,\
    \ the *= operator repeats the tuple on LHS, RHS number of times, and assigns the\
    \ resultant tuple to the LHS variable:\n\n```python\n>>> T=(5,2,3)\n>>> T*=3\n\
    >>> T\n(5, 2, 3, 5, 2, 3, 5, 2, 3)\n```\n\n### 5.7.3 Assigning and Copying Tuples\n\
    \nBefore we proceed with assigning and copying tuples, we need to understand a\
    \ basic point: even though a tuple is immutable, the elements within a tuple need\
    \ not be immutable!\n\n1. A tuple is immutable and that means that we cannot add\
    \ elements to a tuple and cannot remove elements from a tuple. We also cannot\
    \ change the elements of a tuple.\n2. An element in a tuple can be a reference\
    \ to some object. We cannot change this reference, as suggested in the point above,\
    \ but can change the contents of the object! Thus, if a tuple contains a list,\
    \ we can add/remove/change elements in the list for instance.\n\nThe = operator\
    \ allows us to assign a tuple to a tuple variable. Just like in the case of lists,\
    \ this is not the same as copying elements of a tuple to another and is demonstrated\
    \ in the example below.\n\n```python\n>>> T1=(5, [], 3)\n>>> T2=T1\n>>> T2\n(5,\
    \ [], 3)\n>>> T1[1].append(9)\n>>> T1\n(5, [9], 3)\n>>> T2\n(5, [9], 3)\n```\n\
    \nSince tuples are immutable, we had to insert a list as a member in the tuple\
    \ and change the contents of the list instead. Since tuples are immutable, most\
    \ methods to copy tuples end up copying only its reference!\n\nTuples can be assigned\
    \ to tuples вАУ a tuple of values can be assigned to a tuple of variables. What\
    \ makes the syntax even more simpler here is the fact that it is the comma that\
    \ denotes we are dealing with a tuple, not the parentheses, and hence the parentheses\
    \ can be omitted. Have a look at these example of multiple assignment:\n\n```python\n\
    >>> x = y = 5\n>>> x\n5\n>>> y\n5\n>>> x,y = 2,3\n>>> x\n2\n>>> y\n3\n```\n\n\
    The statement `x = y = 5` is an example of multiple assignment that does not involve\
    \ tuples вАУ the value `5` gets stored in both `x` and `y`. But what if we wish\
    \ to assign different values to `x` and `y`? Can this be done in a single statement?\
    \ Yes! That's what the statement `x, y = 2, 3` achieves! In case the syntax is\
    \ not clear to you, maybe parentheses can help: `(x, y) = (2, 3)`. This is a tuple\
    \ to tuple assignment wherein each value of the RHS tuple is assigned to the corresponding\
    \ variable in the LHS tuple. Of course, the size of both the tuples must be the\
    \ same!\n\nHave a look at the classic way of swapping the values of 2 variables\
    \ in Python:\n\n```python\n>>> x, y = 2, 3\n>>> x\n2\n>>> y\n3\n>>> x, y = y,\
