    # 10.4 Positional Arguments


    While a function is a self-contained piece of code, it does interact with the
    calling routine in 2 ways:


    +   1. It can receive parameters from the calling routine

    2. It can return a value back to the calling routine


    This section concentrates on passing arguments to functions, which become parameters
    in the function while the sections 9.9 and 9.10 talk about returning to the caller.
    The following sections talk about special ways of passing arguments to functions.


    A function can not only perform a specific task it was meant to do, it can also
    receive inputs from the caller in order to perform the task. The values that are
    sent to a function as part of the function call are called *arguments*, and when
    they are received by the function in it''s definition, they are called *parameters*.
    There is a one-to-one correspondence between them in normal cases, and special
    cases will be dealt with in the sections that follow. Such arguments are called
    *positional arguments* in Python as their position is important for linking arguments
    with parameters.


    We will now define the function `sum` and call it to print the sum of 2 and 3:


    ```

    >>> def sum(x,y):

    ...     print(x+y)

    ...

    >>> sum(2,3)

    5

    ```


    **Observation:**


    +   1. The values sent to the function at the place of call (2 and 3) are *arguments*
    to the function.

    2. The variables in which values are received by the function in it''s definition
    (x and y) are *parameters*.

    3. At the time of function call, the argument 2 is sent to the parameter x and
    the argument 3 is sent to the parameter y.'
