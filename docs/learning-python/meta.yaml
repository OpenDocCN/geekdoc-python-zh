    # 12.4.5 Instance Methods as special Class Functions


    Having understood class functions, we can view methods from a new perspective
    now: methods are class functions that accept a reference to the invoking object
    as the first argument! The following code snippet will illustrate this:


    ```

    >>> class A:

    ...     def f(self):

    ...         print("Hello")

    ...

    >>> a=A()

    >>> a.f()

    Hello

    >>> A.f(a)

    Hello

    ```


    Observation:


    +   1. We have defined a class `A` with a method `f` that prints "Hello" when
    invoked. We have an instance of this class whose reference is stored in `a`.

    2. `a.f()` is a call to the method `f` of class `A` using `a` as the invoking
    object.

    3. `A.f(a)` is a call to the class function `f` of the class `A`, passing `a`
    as an argument that is received as `self` in `f`.


    Thus, methods are special class functions!'
