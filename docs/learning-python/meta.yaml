    minimal\"гАВ\n\n## 17.3.4 дїОиІ£жЮРж†СдЄ≠жПРеПЦзїЖиКВ\n\nзђђ17.3.2иКВдїЛзїНдЇЖе¶ВдљХе∞ЖHTMLе≠Чзђ¶дЄ≤жИЦжЦЗдїґиѓїеЕ•BeautifulSoupеѓєи±°пЉМдљЖеЊИе§ЪеЖЕеЃєйГљеЬ®еРОеП∞йЪРиЧПдЇЖпЉБжИСдїђзЬЛдЄНеИ∞BeautifulSoupеЬ®еРОеП∞дљњзФ®дЇЖеП¶дЄАдЄ™HTMLиІ£жЮРеЩ®жЭ•иІ£жЮРеЖЕеЃєпЉМеєґжЮДеїЇдЇЖдЄАдЄ™и°®з§ЇжХідЄ™HTMLжЦЗж°£зЪДиІ£жЮРж†СпЉБжЬђиКВе∞Же±Хз§Їе¶ВдљХжОҐзіҐиѓ•иІ£жЮРж†СеєґдїОдЄ≠жПРеПЦеАЉгАВ\n\
    \nдЄЇдЇЖжЉФз§ЇжЙАжЬЙињЩдЇЫеКЯиГљпЉМжИСдїђе∞ЖдљњзФ®е¶ВдЄЛз§ЇдЊЛHTMLеЖЕеЃєпЉЪ\n\n```\n>>> from bs4 import BeautifulSoup\n>>> html=\"\
