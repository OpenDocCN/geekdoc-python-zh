    # 12.6.5 Multiple Inheritance


    A class can derive from 2 or more base classes, resulting in multiple inheritance.
    The syntax for multiple inheritance is given below:


    ```

    class className(baseClass1,baseClass2[,baseClass3...])

    ```


    The above syntax shows at least 2 compulsory base classes as without that this
    would be called multiple inheritance in the first place! There is no limit to
    how many classes a class can extend from. The order of inheritance is an important
    property here and goes from left to right in the base class list. Thus, the first
    base class is `baseClass1`, the second base class is `baseClass2` and so on. The
    order of inheritance matters when we use built-ins like `super()`, and professionals
    always aim to ensure that constructor calls are always in the order of inheritance
    whereas destructor calls are always in the strict reverse order. These are demonstrated
    in the following sections.'
