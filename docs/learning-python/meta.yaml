    \ to the calling routine\n\nThis section concentrates on passing arguments to\
    \ functions, which become parameters in the function while the sections 9.9 and\
    \ 9.10 talk about returning to the caller. The following sections talk about special\
    \ ways of passing arguments to functions.\n\nA function can not only perform a\
    \ specific task it was meant to do, it can also receive inputs from the caller\
    \ in order to perform the task. The values that are sent to a function as part\
    \ of the function call are called *arguments*, and when they are received by the\
    \ function in its definition, they are called *parameters*. There is a one-to-one\
    \ correspondence between them in normal cases, and special cases will be dealt\
    \ with in the sections that follow. Such arguments are called *positional arguments*\
    \ in Python as their position is important for linking arguments with parameters.\n\
    \nWe will now define the function `sum` and call it to print the sum of 2 and\
    \ 3:\n\n```python\n>>> def sum(x,y):\n...     print(x+y)\n...\n>>> sum(2,3)\n\
    5\n```\n\n**Observation:**\n\n1.  The values sent to the function at the place\
    \ of call (2 and 3) are *arguments* to the function.\n2.  The variables in which\
    \ values are received by the function in its definition (x and y) are *parameters*.\n\
    3.  At the time of function call, the argument 2 is sent to the parameter x and\
    \ the argument 3 is sent to the parameter y.\n\n## 10.5 Default Arguments\n\n\
    Ideally, the number of parameters in the function definition and the number of\
    \ arguments in the function call would be the same. But Python supports many other\
    \ kinds of arguments that disturb this equation but adds a lot of flexibility!\
    \ The first such special kind of argument is default argument.\n\nDefault argument\
    \ values are values that are assumed to be present if not provided explicitly.\
    \ This makes the argument optional at the place of call, but the parameter compulsory.\
    \ If the programmer is happy with the default value for the parameter, the programmer\
    \ saves the effort of having to provide it manually at the place of call. On the\
    \ other hand, if the programmer is not happy with the default value, it can be\
    \ overridden by providing it explicitly like any other argument.\n\nHere is an\
    \ example of a function that receives 4 parameters вАУ 2 of them are compulsory,\
    \ like the previous example, while 2 of them are optional with default values:\n\
    \n```python\n>>> def f(a,b,c=2,d=3):\n...     print(a,b,c,d)\n...\n>>> f(10,20,30,40)\n\
    10 20 30 40\n>>> f(10,20,30)\n10 20 30 3\n>>> f(10,20)\n10 20 2 3\n>>> f(10)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: f() missing 1 required positional argument: 'b'\n```\n\n**Observation:**\n\
    \n1.  The syntax of default arguments is that a value is assigned to the parameter.\
    \ This is the default value which will be used when the actual argument is missing\
    \ in the call.\n2.  A positional parameter cannot follow a default argument. Hence\
    \ default arguments are always at the end of the parameter list.\n3.  The default\
    \ value need not be used and default arguments can be treated as normal arguments\
    \ as shown in the example `f(10,20,30,40)`.\n4.  When default arguments are omitted\
    \ at the place of call, the default value is assumed - like how 3 is assumed to\
    \ be the value of d in `f(10,20,30)`.\n5.  When multiple default arguments are\
    \ present and some are omitted, it is assumed that the omission is from right\
    \ to left. Thus, in the call `f(10,20,30)`, it is assumed that d is omitted and\
    \ the value of c is 30. Practically, we would put the default argument that is\
    \ most omitted at the rightmost end of the parameter list. (Section 10.6.2 shows\
    \ how we can explicitly override a default argument without providing any value\
    \ for previous default arguments).\n6.  The positional arguments cannot be omitted,\
    \ as shown in `f(10)`.\n\n## 10.6 Keyword Arguments\n\nKeyword arguments are special\
    \ arguments where the parameter name is identified at the place of call along\
    \ with the value. These have various applications as shown in the following subsections.\n\
    \n### 10.6.1 Keyword Arguments for Positional Arguments\n\nPositional Arguments\
    \ are values passed for parameters on a one-to-one basis. The use of keyword arguments\
    \ provides the flexibility of providing arguments in any order the programmer\
    \ desires. Thus, there is no need to remember or follow the order of parameters\
    \ in the function definition.\n\n```python\n>>> def si(p,t,r):\n...     print(\"\
    Interest:\",(p*t*r)/100)\n...\n>>> si(1000,3,9.5)\nInterest: 285.0\n>>> si(p=1000,r=9.5,t=3)\n\
    Interest: 285.0\n>>> si(1000,r=9.5,t=3)\nInterest: 285.0\n```\n\n**Observation:**\n\
    \n1.  In the above example, the `si()` function is designed to receive arguments\
    \ for principal, time duration and rate of interest вАУ in that order.\n2.  The\
    \ example `si(1000,3,9.5)` passes 1000 as p, 3 as t and 9.5 as r.\n3.  The example\
    \ `si(p=1000,r=9.5,t=3)` passes 1000 as p, 3 as t and 9.5 as r. Note that the\
    \ order of arguments given here do not match the order of parameters, but since\
    \ we have explicitly identified the parameter by its name, there is no confusion.\n\
    4.  We can also mix positional parameters with keyword arguments as shown in the\
    \ example `si(1000,r=9.5,t=3)`.\n\n> **NOTE:**\n> A keyword argument cannot be\
    \ followed by a non-keyword argument.\n\n### 10.6.2 Keyword Arguments for Default\
    \ Arguments\n\nOne of the problems in using default arguments is that the order\
    \ has to be retained. Thus, given 2 default consecutive arguments, it is not possible\
    \ to skip the first one while providing an explicit value for the second one.\
    \ But this becomes possible now using keyword arguments as shown below:\n\n```python\n\
    >>> def f(a,b,c=2,d=3):\n...     print(a,b,c,d)\n...\n>>> f(10,20,30)\n10 20 30\
    \ 3\n>>> f(10,20,d=30)\n10 20 2 30\n```\n\n**Observation:**\n\n1.  In the first\
    \ example, `f(10,20,30)`, 30 is assumed to be the value of c and d is assumed\
    \ to have been omitted and thus assumed to be the default value 3.\n2.  In the\
    \ second example, `f(10,20,d=30)`, the keyword argument d=30 explicitly states\
    \ that the value of d should be 30. The value of c is assumed to have been omitted\
    \ and thus assumed to be the default value 2.\n\n> **NOTE:**\n> A keyword argument\
    \ cannot be followed by a non-keyword argument.\n\n### 10.6.3 Keyword Arguments\
    \ for Additional Arguments\n\nWhen keyword arguments are to replace positional\
    \ parameters or default arguments, as shown in the previous sections, it is an\
    \ offence to provide a keyword argument for a parameter that does not exist in\
    \ the parameter list, as shown in the example below:\n\n```python\n>>> def f(a,b,c=2,d=3):\n\
    ...     print(a,b,c,d)\n...\n>>> f(1,2,m=9)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: f() got an unexpected keyword\
    \ argument 'm'\n```\n\nIt is however possible to invent additional keyword arguments\
    \ that are not even present in the formal parameter list! These additional keyword\
    \ arguments can then be received as a dictionary, the keys of which are parameter\
    \ names and values are argument values. The special syntax `**` prefix is used\
    \ for this purpose as shown in the example below:\n\n```python\n>>> def f(a,b,**x):\n\
    ...     print(a,b)\n...     for k,v in x.items():\n...         print(\"The value\
    \ of {} is {}\".format(k,v))\n...\n>>> f(1,2,c=2,d=3)\n1 2\nThe value of d is\
    \ 3\nThe value of c is 2\n>>> f(1,c=2,b=5,d=3)\n1 5\nThe value of d is 3\nThe\
    \ value of c is 2\n```\n\n**Observation:**\n\n1.  The function `f` receives 2\
    \ positional parameters `a` and `b` and any number of keyword arguments.\n2. \
    \ In the call `f(1,2,c=2,d=3)`, the values `1` and `2` are passed to the positional\
    \ parameters `a` and `b` respectively; whereas 2 keyword arguments `c` and `d`\
    \ are created with values `2` and `3` respectively.\n3.  The additional keyword\
    \ arguments are stored in a dictionary and passed as the value for the dictionary\
    \ parameter `x`. Recall from section 7.1 that the order of the keys in the dictionary\
    \ (in this case, the keys are the parameter names) are not under our control.\n\
    4.  The dictionary contains those parameters which are not present in the parameter\
    \ list. Thus, in the example `f(1,c=2,b=5,d=3)`, the parameter `b` will not be\
    \ found in the dictionary."
