    \ In Python, strings are instances of the class `str`.\n\nBeing a sequence, it\
    \ is possible to iterate through the characters of a string using a simple for\
    \ loop as shown below:\n\n```python\n>>> for c in \"Hello\":\n...     print(c)\n\
    ...\nH\ne\nl\nl\no\n```\n\n### 8.1 Conversion From and To Strings\n\nObjects of\
    \ other types can be converted to strings in a couple of ways. Primitives (like\
    \ integers and real numbers) can be easily converted to strings using the `str()`\
    \ function, discussed in section 2.3.4. General conversions between primitives\
    \ is discussed in section 20.1.1.3. Conversion of objects of other classes to\
    \ strings is also discussed in section 20.1.1.3.\n\nBear in mind that values like\
    \ `123` are integers whereas values like `'123'` and `\"123\"` are strings. More\
    \ types of quoting for strings are discussed in section 2.1.2. Integers and strings\
    \ are not implicitly convertible. Here are some examples of conversion:\n\n```python\n\
    >>> type(123)\n<class 'int'>\n>>> type('123')\n<class 'str'>\n>>> str(123)\n'123'\n\
    >>> type(str(123))\n<class 'str'>\n>>> int('123')\n123\n>>> type(int('123'))\n\
    <class 'int'>\n```\n\n### 8.2 Searching In Strings\n\nOne of the basic operations\
    \ we generally perform on strings is searching for a substring within it. Depending\
    \ on what kind of search it is, suitable Python functions can be used:\n\n1. \
    \ If we want to check if a string contains a particular substring at a particular\
    \ position, we can use `startswith()` or `endswith()`.\n2.  If we want to check\
