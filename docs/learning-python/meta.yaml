    \ and Lines\n\nA **statement** is a unit logical instruction to the interpreter.\
    \ Our `HelloWorld.py` program was made up of just 1 statement. A program, therefore,\
    \ is an integral collection of statements.\n\nA **line** is a sequence of characters\
