  md: '**Observation:**


    +   1. D.get(''mango'') is supposed to return the value of the key mango in the
    dictionary D, but since it does not exist it returns None instead. Therefore,
    there is no output at all.


    The complete version is `dict.get(key,default)` function, which returns the value
    corresponding to the key `key` in the dictionary `dict` if the key exists, and
    returns the value `default` if the key was not found.


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> D.get(''apple'',''blue'')

    ''red''

    >>> D.get(''mango'',''blue'')

    ''blue''

    >>> D.get(''mango'')

    >>>

    ```


    **Observation:**


    +   1. D.get(''apple'',''blue'') returns the value corresponding to the key apple
    in the dictionary D. The corresponding value is red and is hence returned.

    2. D.get(''mango'', ''blue'') tries to return the value of the key mango in the
    dictionary D, but since that key does not exist it returns the value blue instead.

    3. D.get(''mango'') is supposed to return the value of the key mango in the dictionary
    D, but since it does not exist it returns None instead. Therefore, there is no
    output at all.


    # 7.5.4 Extracting a Key Given it''s Associated Value


    While it is a trivial operation to extract the value associated with a key, extracting
    a key from it''s value is slightly more complicated due to the following reasons:


    +   1. There is no direct mechanism to extract a key from it''s value

    2. The values need not be unique. When there are multiple identical values, the
    question of which key to fetch comes into the picture. The only possibilities
    are to fetch any one of the candidate keys or fetch all the candidate keys.'
