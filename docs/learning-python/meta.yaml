  - "[PAGE 424]\n\n# 12.9.3 Empty Classes as Base Classes\n\nWhen we have a class\
    \ hierarchy and feel that certain classes вАЬbelongвАЭ to the same group, we decide\
    \ to inherit them from a common base class to establish this logical belongingness.\
    \ In such cases, it is perfectly valid for the common base class to have no implementation,\
    \ if the programmer does not see any need. Thus, empty classes are used as base\
    \ classes from which many related classes can derive.\n\nWe can change the program\
    \ `MyStack.py` discussed in the previous section and ensure that the classes `StackOverflowException`\
    \ and `StackUnderflowException` both derive from the common class `StackException`\
    \ for better logical clarity!\n\n```\nMyStack2.py\n\n1.  #!/usr/bin/python\n2.\
    \  \n3.  # Implementation of a fixed-length Stack\n4.  \n5.  class MyStack:\n\
    6.  \n7.      def __init__(self,MAX_SIZE):\n8.          self.MAX_SIZE = MAX_SIZE\n\
    9.          self.values=[]\n10. \n11.     def push(self,x):\n12.         if len(self.values)\
    \ == self.MAX_SIZE: raise StackOverflowException()\n13.         self.values.append(x)\n\
    14. \n15.     def pop(self):\n16.         if len(self.values) == 0: raise StackUnderflowException()\n\
    17.         return self.values.pop()\n18. \n19.     def display(self):\n20.  \
    \       for i in self.values: print(i)\n21. \n22. class StackException(Exception):\
    \ pass\n23. class StackOverflowException(StackException): pass\n24. class StackUnderflowException(StackException):\
    \ pass\n25. \n26. myStack = MyStack(3)\n27. \n28. while True:\n29.     try:\n\
    30.         print(\"1. Push\")\n```"
