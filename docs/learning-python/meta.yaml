    # 12.4.3 Class Variables


    As already introduced, class variables are variables that belong to the class
    and are shared across instances of that class. They are accessible using the class
    name (the class object) or any instance of that class. The following code snippets
    demonstrate these features:


    ```

    >>> class A:

    ...     x=10

    ...

    >>> A.x

    10

    ```


    We have created a class `A` with a class variable `x` initialized to `10`. We
    can access this using `A.x`, where `A` is the class object (class name for us)
    and `x` is the class variable. Let us create objects now:


    ```

    (continuation)

    >>> a=A()

    >>> b=A()

    >>> a.x

    10

    >>> b.x

    10

    ```


    We have created 2 objects `a` and `b`, and can see that they both have access
    to the class variable `x`, and provide us the same value `10`. Let us attempt
    to make an assignment to the class variable using an instance:


    ```

    (continuation)

    >>> a.x=20

    >>> A.x

    10

    >>> a.x

    20

    >>> b.x

    10

    ```


    When an assignment is made to a variable using an instance, the variable is assumed
    to be an instance variable. Thus, the statement `a.x=20` ends up creating an instance
    variable `x` in the instance `a` and assigns the value `20` to it without disturbing
    the class variable `x` that is accessible via `A` as well as `b`. Any attempt
    to access the variable `x` using the instance `a` will give preference to the
    instance variable `x` in the instance `a`. Let us now make an assignment to the
    class variable using the class object:'
