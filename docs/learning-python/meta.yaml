  md: '# 5.7.3 Assigning and Copying Tuples


    Before we proceed with assigning and copying tuples, we need to understand a basic
    point: even though a tuple is immutable, the elements within a tuple need not
    be immutable!


    +   1. A tuple is immutable and that means that we cannot add elements to a tuple
    and cannot remove elements from a tuple. We also cannot change the elements of
    a tuple.

    2. An element in a tuple can be a reference to some object. We cannot change this
    reference, as suggested in the the point above, but can change the contents of
    the object! Thus, if a tuple contains a list, we can add/remove/change elements
    in the list for instance.


    The = operator allows us to assign a tuple to a tuple variable. Just like in the
    case of lists, this is not the same as copying elements of a tuple to another
    and is demonstrated in the example below.


    ```

    >>> T1=(5, [], 3)

    >>> T2=T1

    >>> T2

    (5, [], 3)

    >>> T1[1].append(9)

    >>> T1

    (5, [9], 3)

    >>> T2

    (5, [9], 3)

    ```


    Since tuples are immutable, we had to insert a list as a member in the tuple and
    change the contents of the list instead. Since tuples are immutable, most methods
    to copy tuples end up copying only it''s reference!


    Tuples can be assigned to tuples вАУ a tuple of values can be assigned to a tuple
    of variables. What makes the syntax even more simpler here is the fact that it
    is the comma that denotes we are dealing with a tuple, not the parentheses, and
    hence the parentheses can be omitted. Have a look at these example of multiple
    assignment:


    ```

    >>> x = y = 5

    >>> x

    5

    >>> y

    5

    >>> x,y = 2,3

    >>> x

    2

    >>> y

    3

    ```'
