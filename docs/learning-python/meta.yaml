    \ 1, in <module>\nValueError: tuple.index(x): x not in tuple\n```\n\n**Form #2:\
    \ `tuple.index(x,i)`**\n\nIf the second argument (`i`) is given, the search starts\
    \ from index `i` instead of 0. This allows us to search for other occurrences\
    \ of an element or to skip some initial elements in the search.\n\n```python\n\
    >>> T=(5,2,3,2)\n>>> T.index(2,2)\n3\n```\n\nIn the above example, the first occurrence\
    \ of `2` is in index 1. If we want to search for the next occurrence of `2`, we\
