  md: '# 8.6.1 Justifying a String


    A string of a given length can be increased to a specified width by filling it
    with any character of choice (space by default). There are 3 functions in Python
    that do this for you, depending on where you want the original string content
    to be present in the final expanded string:


    +   - `ljust()` - to left justify the content within an expanded string

    - `rjust()` - to right justify the content within an expanded string

    - `center()` - to center justify the content within an expanded string


    # 8.6.1.1 The ljust() Function


    Complete syntax:


    ```

    str.ljust(width[,fill])

    ```


    Forms:


    +   1. `str.ljust(width)`

    2. `str.ljust(width, fill)`


    **Form #1:** `str.ljust(width)`


    The `ljust()` function left-justifies a given string within an expanded string
    of the given width, filling in spaces as required and returns the new string.
    As a special case, if the given width is less than the length of the string, the
    operation is ignored and the original string is returned.


    Examples:


    ```

    >>> s="Hello"

    >>> s.ljust(20)

    ''Hello               ''

    >>> s.ljust(2)

    ''Hello''

    ```


    **Form #2:** `str.ljust(width, fill)`


    If some other character is needed for filling instead of spaces, the required
    character can be given as the argument `fill`:'
