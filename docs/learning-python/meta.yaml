    # 16.4 Executing Queries


    # 16.4.1 Working with Cursors


    Now that we know how to create a connection with a database, let us see how we
    can execute queries on that database using the connection. A `Cursor` instance
    acts as an interface to execute queries on a `Connection` and can be created from
    a `Connection` using the `cursor()` method which has the following syntax:


    ```

    connection.cursor()

    ```


    We can create any number of `Cursor` objects from a single connection and using
    each we can execute any number of queries through the connection. While it is
    not necessary to create multiple `Cursor` objects to execute multiple queries,
    do bear in mind that if we are not done extracting the complete result of the
    previous query and execute the next query, we will lose the remaining results
    from the previous query. There are therefore situations wherein we may have to
    create multiple `Cursor` objects.


    Retrieving results from `Cursor` objects will be dealt with later in section 16.5,
    but for now let us see how to execute queries that don''t produce results (DML
    queries).


    # 16.4.2 Executing a Single Query


    In order to execute a query, we use the `execute()` method of `Cursor` which has
    the following syntax:


    ```

    cursor.execute(query)

    ```'
