  md: "The reason why we are revisiting function overriding with respect to multiple\
    \ inheritance is that it gets interesting now when we use the `super()` function\
    \ because the question arises: when there are 2 (or more) base classes, which\
    \ base class is considered to be the super class? To answer this question is obtained\
    \ by the order of inheritance, which was covered in section 12.6.5. To recall,\
    \ the order of inheritance is from left to right, and in this example, the first\
    \ base class of `C` is therefore `A`. The first preference is given to the method\
    \ `f` in class `A`. Only if `A` (and it's super classes, in the order of inheritance)\
    \ does not define method `f` will preference be given to class `B` (and it's super\
    \ classes in the order of inheritance). This is demonstrated by the following\
    \ program:\n\n# Inheritance9.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # Inheritance\
    \ Demo:\n4.  # Multiple Inheritance - Function Overriding\n5.  \n6.  class A:\n\
    7.      def f(self):\n8.          print(\"A\")\n9.  \n10. class B:\n11.     def\
    \ f(self):\n12.         print(\"B\")\n13. \n14. class C(A,B):\n15.     def f(self):\n\
    16.         super().f()\n17.         print(\"C\")\n18. \n19. c=C()\n20. c.f()\n\
    ```\n\n# Output:\n\n```\nA\nC\n```\n\nWhat if we want to call the method `f` of\
    \ class `B` from within class `C`? We use the class function syntax: `B.f(self)`."
