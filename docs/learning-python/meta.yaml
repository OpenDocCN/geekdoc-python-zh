  - '[PAGE 534]


    # 15.3.4 Accessing Symbols From Namespaces


    Considering that a module defines a namespace, we will now explore techniques
    to find out the complete contents of any namespace using the `dir()` function
    which has the following syntax:


    ```

    dir([moduleName])

    ```


    Forms:


    +   1. `dir()`

    2. `dir(moduleName)`


    **Form #1: `dir()`**


    This function returns a list of all the identifiers present in the current local
    scope of the current namespace, excluding the built-in identifiers, as shown below:


    ```

    >>> x=10

    >>> def f(x): return x

    ...

    >>> import fact

    >>> dir()

    [''__builtins__'', ''__doc__'', ''__loader__'', ''__name__'',

    ''__package__'', ''__spec__'', ''f'', ''fact'', ''x'']

    ```


    **Observation:**


    +   1. We have created a variable `x`, defined a function `f` and imported a module
    `fact`.

    2. We see that the `dir()` function returns a list of strings with each string
    naming an identifier in our current namespace. This list includes names of variables
    (like `x`), names of functions (like `f`) and names of modules (like `fact`).

    3. Certain standard identifiers are always included вАУ like `__builtins__` for
    example!


    > **NOTE:**

    If you want to see the list of all built-in identifiers, import the module `builtins`
    (`import builtins`) and pass `builtins` as an argument to `dir()` using the 2nd
    form (`dir(builtins)`).'
