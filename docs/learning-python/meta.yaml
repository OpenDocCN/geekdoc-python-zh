    >>> T.count(4)\n0\n```\n\n### 5.5.3 Locating Elements\n\nThe `index()` member\
    \ function of tuple searches for the first occurrence of an element within a tuple\
    \ and returns the index where it was found, and throws a `ValueError` if not found.\
    \ It's complete syntax is:\n\n```\ntuple.index(x[,i[,j]])\n```\n\n**Form #1: `tuple.index(x)`**\n\
    \nThis searches for the first occurrence of the element `x` in the tuple `tuple`,\
    \ as shown in the example below:\n\n```python\n>>> T=(5,2,3,2)\n>>> T.index(2)\n\
