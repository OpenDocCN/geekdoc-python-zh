    # 8. Strings


    # 8.2.1.2 The endswith() Function


    To check if a string ends with a particular substring or not, we can use the endswith()
    function:


    ```

    str.endswith(substring[,start=0[,end=len(str)]])

    ```


    Forms:


    +   1. str.endswith(substring)

    2. str.endswith(substring,start)

    3. str.endswith(substring,start,end)


    Form #1: str.endswith(substring)


    The function returns True if the string str ends with the string substring and
    returns False otherwise:


    ```

    >>> "This is a demo".endswith("demo")

    True

    >>> "This is a demo".endswith("is")

    False

    ```


    We can also provide a tuple of strings instead of a single string for substring:


    ```

    >>> "This is a demo".endswith(("is","demo"))

    True

    >>> "This is a demo".endswith(("is","was"))

    False

    ```


    Thus, we can check if a string ends with one of a set of substrings or not.


    Form #2: str.endswith(substring,start)


    The function returns True if the string str ends with the string substring, with
    the check starting from the index start within the string str. In other words,
    we are checking for the existence of the substring substring at the index start
    in the string str with nothing else following it:'
  - '[PAGE 184]


    ```

    >>> "This is a demo".endswith("is",2)

    False

    >>> "This is a demo".endswith("demo",10)

    True

    ```


    Again, we can give a tuple of substrings instead of a single substring:


    ```

    >>> "This is a demo".endswith(("is","demo"),10)

    True

    ```


    **Form #3:** `str.endswith(substring, start, end)`

    The function returns `True` if the substring `substring` is found starting from
    index `start` in the string `str`, but restricting the search till index `end`
    only and if there are no other characters following it in `str`. If the characters
    in `str` from index `start` till index `end` (excluding `end`) did not match the
    characters in `substring`, or if there are more characters after the match in
    the string `str`, this function returns `False`. If the range of indices from
    `start` to `end` are not enough to compare against the entire length of `substring`,
    the function returns `False`:


    ```

    >>> "This is a demo".endswith("demo",10,14)

    True

    >>> "This is a demo".endswith("demo",10,13)

    False

    ```


    This form is the least useful form and is almost useless when a single substring
    is provided. It can be of use when a tuple of substrings are provided.


    # 8.2.2 Checking For the Existence of a Substring in a String Using find(), rfind(),
    index() and rindex()


    The previous section showed how we can check for the existence of a substring
    in a string at a specific position. That will be helpful if we know where to search.
    But what if we want to see whether a substring exists within a string, and if
    so, where within the string? This section concentrates on that.


    # 8.2.2.1 Searching Using find()


    The `find()` function searches for the first occurrence of a substring within
    a string and returns the index where it was found on success and returns -1 if
    the substring was not found.'
  - '[PAGE 185]


    # 8. Strings


    Complete syntax:


    ```

    str.find(substring[,start=0[,end=len(str)]])

    ```


    Forms:


    +   1. str.find(substring)

    2. str.find(substring,start)

    3. str.find(substring,start,end)


    **Form #1:** `str.find(substring)`


    The function searches for the first occurrence of the substring `substring` within
    a string `str` and returns the index where it was found on success and returns
    -1 if the substring was not found:


    ```

    >>> "This is a demo".find("is")

    2

    ```


    **Form #2:** `str.find(substring,start)`


    The function searches for the first occurrence of the substring `substring` within
    a string `str`, starting from index `start` and returns the index where it was
    found on success and returns -1 if the substring was not found:


    ```

    >>> "This is a demo".find("is",3)

    5

    ```


    This form is useful if we want to search for a specific occurrence when there
    are multiple occurrences of a substring in a string. In fact, we can write a program
    that uses this form to show us all occurrences of a substring in a string:'
  - "[PAGE 186]\n\n# finddemo.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # Demonstration\
    \ of searching for all occurrences\n4.  # of a substring in a string\n5.  \n6.\
    \  string = input(\"Enter the string to search in:\")\n7.  substring = input(\"\
    Enter the substring to search for:\")\n8.  \n9.  index=-1\n10. indices=[]\n11.\
    \ while True:\n12.     index = string.find(substring,index+1)\n13.     if index==-1:\
    \ break\n14.     indices.append(index)\n15. \n16. print(string)\n17. col=0\n18.\
    \ for i in indices:\n19.     print(' '*(i-col), end='')\n20.     print('^',end='')\n\
    21.     col=i+1\n22. print()\n```\n\n# Output:\n\n```\nEnter the string to search\
    \ in:This is a demo\nEnter the substring to search for:is\nThis is a demo\n ^\
    \  ^\n```\n\n# Observation:\n\n+   1. We accept the main string from the user\
    \ in line 6 and store it in the variable `string`. We accept the substring to\
    \ be searched for from the user in line 7 and store it in the variable `substring`.\n\
    2. We have an infinite loop in line 11 to search for all occurrences of the substring\
    \ within the main string. We find the index of the next match in line 12 and break\
    \ out of the loop in line 13 if there are no more matches.\n3. To ensure that\
    \ each time we search we don't end up searching the same position in the string,\
    \ we use a starting position of `index+1` in line 12.\n4. To further ensure that\
    \ this code works correctly and we start searching from index 0, we initialise\
    \ `index` to -1 in line 9 so that the expression `index+1` in"
  - '[PAGE 187]


    line 12 yields the value 0 initially.


    +   5. Each time we obtain the index of a match, we add it to a list in line 14,
    with the list being created in line 10.

    6. Lines 16-22 then display the main string with carats (^) below each occurrence
    of the substring in the string, depending on the indices stored in the list.


    **Form #3:** `str.find(substring,start,end)`

    This form is similar to the previous form, except that the search ends at index
    `end` (excluding `end`) instead of ending at the end of the string. If the substring
    `substring` was not found between indices `start` and `end-1`, this function fails
    and returns -1.


    # **8.2.2.2 Searching Using rfind()**


    The `rfind()` function searches for the last (rightmost) occurrence of a substring
    within a string and returns the index where it was found on success and returns
    -1 if the substring was not found.


    **Complete syntax:**


    ```

