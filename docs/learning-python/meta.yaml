    2.  `div`ж†Зз≠ЊжЬЙ3дЄ™е≠РиКВзВєпЉМеЃГдїђйГљжШѓ`p`ж†Зз≠ЊгАВ


    #### 18.2.3.3 жПРеПЦж†Зз≠Ње±ЮжАІ


    `Element`зЪДжЙАжЬЙе±ЮжАІйГљдљЬдЄЇе≠ЧеЕЄеЬ®`attrib`е±ЮжАІдЄ≠еПѓзФ®гАВе≠ЧеЕЄдЄ≠зЪДйФЃжШѓе±ЮжАІеРНпЉМеАЉжШѓиѓ•е±ЮжАІзЪДеѓєеЇФеАЉгАВзФ±дЇО`html`ж†Зз≠Њж≤°жЬЙдїїдљХе±ЮжАІпЉМжИСдїђе∞ЖдљњзФ®`div`ж†Зз≠ЊињЫи°МжЉФз§ЇпЉЪ


    ```

