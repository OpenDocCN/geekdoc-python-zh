    \ for the menu choice) is performed in lines 90-92.\n\n12. Let us make observations\
    \ on each of the functions by providing their code again for quick reference.\n\
    \n```\n1. def menu():\n2.     print(\"Employee Management System\")\n3.     print(\"\
