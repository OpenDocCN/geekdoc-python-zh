    The `find_all()` method is perhaps the single method we need to perform any search
    in the parse tree. Despite this, there are other possibilities when it comes to
    searching. Let us have a quick look at these before we conclude this section.


    As a short-cut for the `find_all()` method, we can directly use parentheses on
    the `BeautifulSoup` document or `Tag` object, as shown below:


    ```

    (continuation of previous session)

    >>> soup.find_all("p")

    [<p>This is <b>Bold</b></p>, <p>This is <i>Italics</i></p>,

    <p>This is <u>Underlined</u></p>]

    >>> soup("p")

    [<p>This is <b>Bold</b></p>, <p>This is <i>Italics</i></p>,

    <p>This is <u>Underlined</u></p>]

    ```


    **Observation:**


    +   1. We see that the output is the same in both the above examples.

    2. Some people find the parentheses syntax simpler as it is briefer; others prefer
    the `find_all()` method for readability. The choice, of course, is left to you
    since there is no difference in their behaviour or efficiency.


    If we are only interested in searching one tag that matches a particular requirement,
    we can either use `limit=1` as shown in form #6, or can use the `find()` method
    instead, which is identical to the `find_all()` method except for these differences:


    +   1. The `find()` method returns a single tag that matched (and the tag would
    be the first match found)

    2. Even when there is a single match, the `find_all()` method returns a list containing
    that single tag whereas the `find()` method never returns a list.'
