    \n## StandardAttributesDemo.py\n\n```\n1.  #!/usr/bin/python\n2.  \n3.  # ж†ЗеЗЖе±ЮжАІжЉФз§ЇпЉЪ\n\
    4.  \n5.  class A:\n6.      pass\n7.  \n8.  class B:\n9.      pass\n10. \n11.\
    \ class C(A, B):\n12.     \"дЄАдЄ™зФ®дЇОжЉФз§Їж†ЗеЗЖе±ЮжАІзЪДз±ї\"\n13. \n14.     x = 10\n15. \n16.  \
    \   def __init__(self):\n17.         pass\n18. \n19.     def f(self):\n20.   \
    \      pass\n21. \n22. print(\"__name__:\", C.__name__)\n23. print(\"__doc__:\"\
    , C.__doc__)\n24. print(\"__bases__:\", C.__bases__)\n25. print(\"__module__:\"\
    , C.__module__)\n26. print(\"__dict__:\", C.__dict__)\n```\n\n## иЊУеЗЇпЉЪ\n\n```\n\
    __name__: C\n__doc__: дЄАдЄ™зФ®дЇОжЉФз§Їж†ЗеЗЖе±ЮжАІзЪДз±ї\n__bases__: (<class '__main__.A'>, <class '__main__.B'>)\n\
    __module__: __main__\n__dict__: {'f': <function C.f at 0x7f92c18564d0>, '__module__':\
