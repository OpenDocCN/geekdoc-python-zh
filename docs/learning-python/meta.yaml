    \ is negative, the formula can be split into 2 terms as:\n\n$$x = \\frac{-b}{2a}\
    \ \\pm i \\frac{\\sqrt{-discriminant}}{2a}$$\n\n## 3.2.4 Empty Blocks and the\
    \ pass Keyword\n\nThere are situations when we need a block to be empty вАУ something\
    \ that is not permitted in Python. This could be because out of the many conditions\
    \ that we would like to handle in particular ways, there might be certain exceptions\
    \ that we don't want to process at all. Or less genuinely, there might be cases\
    \ wherein we want to fill in the block contents at a later time when we are ready\
    \ and right now want to proceed with an empty block nevertheless. Whatever be\
    \ the reason, the fact remains that a single statement is a single statement and\
    \ a block of statements is a block of 1 or more statements вАУ Python does not support\
    \ zero statements when a statement is expected!\n\nIn such situations where a\
    \ statement is required, but we don't have anything to provide, we can use the\
