  md: '# DICTIONARIES


    A *dictionary* is a collection of key-value pairs subject to the constraint that
    all the keys should be unique.


    The *keys* of a dictionary can be considered to be members of a set (and are thus
    unique), with each key keeping track of a value.


    # 7.1 Creating Dictionaries


    Just as how a list object can be created and assigned to a variable using the
    `list()` function, a dictionary object can be created and assigned to a variable
    using the `dict()` function:


    ```

    >>> D=dict([(''apple'',''red''),(''grapes'',''green'')])

    >>> D

    {''grapes'': ''green'', ''apple'': ''red''}

    ```


    # Observation:


    +   1. A dictionary can be created in a variety of ways вАУ the above technique
    is one way by which an *iterable* (where each element of the iterable has 2 elements
    вАУ a key and a value) can be converted into a dictionary.

    2. In the above example, the iterable is a *list* and each element of the list
    is a *tuple* with 2 elements вАУ a key and a value.

    3. Since the keys of a dictionary can be considered to be stored in a set and
    sets are unordered collections, even the keys of a dictionary are unordered. As
    can be observed from the output above, the order of the keys is not directly under
    our control.


    Just as how `[]` is used to indicate list literals, `{}` are used to denote dictionary
    literals. Recall from section 6.1 that `{}` are also used to enclose members of
    a set. How does Python differentiate between sets and dictionaries then? Using
    the fact that a set comprises of multiple elements within `{}` separated by commas
    whereas a dictionary comprises of multiple elements within `{}` separated by colons
    (to separate the key from the value) and commas (to separate the pairs).


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> D

    {''grapes'': ''green'', ''apple'': ''red''}

    ```


    From now on, we will stick to the `{}` syntax for convenience and brevity.'
