    and columns. Such a matrix has 2 standard diagonals вАУ the *primary diagonal* that
    extends from the top-left to the bottom-right and the *secondary diagonal* that
    extends from the bottom-left to the top-right. The sum of the elements that lie
    on the principal diagonal of a square matrix is called the *trace* of the matrix.


    Here is a program to find the sum of the elements:


    +   1. On the principal diagonal

    2. Above the principal diagonal

