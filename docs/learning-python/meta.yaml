    # 2. Python Basics


    This built-in function is also helpful for converting other types like `float`
    and `string` to the type `int`:


    ```

    >>> int(23.99)

    23

    >>> int("25")

    25

    ```


    The default constructor of `int` class will create an integer with value 0, and
    a 2-argument constructor has been provided to convert a string representation
    of an integer in a particular base into a normal integer. The constructors have
    the following declaration:


    **Syntax:**


    ```

    int(x=0)

    int(str_x, base=10)

    ```


    Some examples follow:


    ```

    >>> int()

    0

    >>> int(25)

    25

    >>> int("25")

    25

    >>> int("25",8)

    21

    ```


    # 2.3.1.2 Operations on Type int


    The following table lists out the arithmetic operators that can be used with data
    items of type `int`:


    | Expression | Result | Meaning |

    | :--- | :--- | :--- |

    | 2 ** 3 | 8 | 2 to the power 3 |

    | 2 * 3 | 6 | Multiplication |

    | 10 / 3 | 3.3333333333333335 | Division |

    | 10 // 3 | 3 | Integer division |

    | 10 % 3 | 1 | Modulus/Remainder |

    | 2 + 3 | 5 | Addition |

    | 2 - 3 | -1 | Subtraction |


    *Table 1: Arithmetic operations on int*'
