    Some related modules have been grouped into packages and the submodule names have
    been simplified. The resulting new packages are:


    +   - dbm (anydbm, dbhash, dbm, dumbdbm, gdbm, whichdb).

    - html (HTMLParser, htmlentitydefs).

    - http (httplib, BaseHTTPServer, CGIHTTPServer, SimpleHTTPServer, Cookie, cookielib).

