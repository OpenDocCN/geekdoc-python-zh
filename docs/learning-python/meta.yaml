    \ зїИж≠ҐиДЪжЬђгАВ\n\n## 4 еИЧи°®\n\nеЬ®жЬђзЂ†дЄ≠пЉМдљ†е∞ЖиГље§ЯпЉЪ\n\n- [x] еИЫеїЇеИЧи°®еєґиЃњйЧЃеЕґеЕГзі†гАВ\n- [x] йБНеОЖеИЧи°®еєґжРЬзіҐзЙєеЃЪеЕГзі†гАВ\n- [x]\
    \ дљњзФ®еИЧи°®еИЗзЙЗзЪДж¶ВењµдїОеИЧи°®дЄ≠жПРеПЦе≠РеИЧи°®гАВ\n- [x] еЬ®еИЧи°®дЄ≠жЈїеК†гАБеИ†йЩ§еТМдњЃжФєеЕГзі†гАВ\n- [x] е§ДзРЖеµМе•ЧеИЧи°®пЉМеєґзЉЦеЖЩз®ЛеЇПдљњзФ®еИЧи°®иІ£еЖ≥йЧЃйҐШгАВ\n\n\
    ## еИЧи°®\n\nPython дЄ≠зЪД `list` иҐЂеЃЪдєЙдЄЇдЄАдЄ™еПѓдї•еК®жАБдњЃжФєзЪДжЬЙеЇПеЕГзі†еЇПеИЧгАВ\n\n- *жЬЙеЇП*жДПеС≥зЭАеИЧи°®дЄ≠зЪДжѓПдЄ™й°єзЫЃйГљжЬЙдЄАдЄ™еЯЇдЇОеЕґеЬ®еИЧи°®дЄ≠дљНзљЃзЪД*зіҐеЉХ*гАВ\n\
    - *еЇПеИЧ*жДПеС≥зЭАеЕГзі†ж†єжНЃеЕґзіҐеЉХжМЙй°ЇеЇПжОТеИЧпЉМй°ЇеЇПйБНеОЖеИЧи°®е∞ЖжМЙзіҐеЉХй°ЇеЇПзїЩжИСдїђеЕГзі†гАВ\n- вАЬ*еК®жАБдњЃжФє*вАЭињЩдЄАзЯ≠иѓ≠жДПеС≥зЭАеИЧи°®дЄ≠зЪДжѓПдЄ™й°єзЫЃйГљеПѓдї•жЫіжФєпЉМеИЧи°®жЬђиЇЂдєЯеПѓдї•жЫіжФєвАФвАФеПѓдї•жЈїеК†жЫіе§Ъй°єзЫЃпЉМзО∞жЬЙй°єзЫЃеПѓдї•иҐЂжЫњжНҐжИЦеИ†йЩ§гАВ\n\
    \n> **иЗі C/C++/Java з®ЛеЇПеСШпЉЪ**\n> еИЧи°®еПѓиГљжШѓжЬАжО•ињС C/C++/Java з®ЛеЇПеСШжЙАзІ∞жХ∞зїДзЪДжЫњдї£жЦєж°ИгАВ\n\nеИЧи°®жШѓеК®жАБеПѓеҐЮйХњеТМеПѓжФґзЉ©зЪДвАФвАФеПѓдї•йЪПжЧґжЈїеК†еТМеИ†йЩ§еЕГзі†гАВ\n\
    \n### 4.1 еИЫеїЇеИЧи°®\n\nж≠£е¶ВеПѓдї•дљњзФ® `int()` еЗљжХ∞еИЫеїЇжХіжХ∞еѓєи±°еєґе∞ЖеЕґиµЛеАЉзїЩеПШйЗПдЄАж†ЈпЉМеПѓдї•дљњзФ® `list()` еЗљжХ∞еИЫеїЇеИЧи°®еѓєи±°еєґе∞ЖеЕґиµЛеАЉзїЩеПШйЗПпЉЪ\n\
    \n```\n>>> x=int(5)\n>>> x\n5\n>>> L=list([5,2,3])\n>>> L\n[5, 2, 3]\n```\n\n\
    зФ±дЇО `list` жШѓеАЉзЪДйЫЖеРИпЉМеЫ†ж≠§дљњзФ®жЦєжЛђеПЈ (`[]`) жЭ•жЛђиµЈиѓ•йЫЖеРИпЉМеєґдЄФеЬ® Python дЄ≠еІЛзїИзФ®дЇОи°®з§ЇеИЧи°®гАВдЇЛеЃЮдЄКпЉМж≠£е¶ВжИСдїђжЬЙжХ∞жНЃз±їеЮЛиҐЂзРЖиІ£дЄЇ `int`\
    \ зЪДжХіжХ∞е≠ЧйЭҐйЗПдЄАж†ЈпЉМжИСдїђдєЯжЬЙдљњзФ® `[]` зЪДеИЧи°®е≠ЧйЭҐйЗПпЉМеЕґжХ∞жНЃз±їеЮЛиҐЂзРЖиІ£дЄЇ `list`пЉЪ\n\n```\n>>> x=5\n>>> x\n5\n>>>\
    \ L=[5,2,3]\n>>> L\n[5, 2, 3]\n```\n\nдїОзО∞еЬ®еЉАеІЛпЉМдЄЇдЇЖжЦєдЊњеТМзЃАжіБпЉМжИСдїђе∞ЖеЭЪжМБдљњзФ® [ ] иѓ≠ж≥ХпЉМйЩ§йЭЮиҐЂињЂдљњзФ® `list()`\
    \ еЗљжХ∞гАВ\n\n> **ж≥®жДПпЉЪ**\n> иЩљзДґ `list` жШѓдЄАзІНжХ∞жНЃз±їеЮЛпЉМдљЖеИЧи°®зЪДеЖЕеЃєжШѓеѓєи±°гАВеЫ†ж≠§пЉМдЄНе≠ШеЬ®еГП `int еИЧи°®` дЄО `float еИЧи°®`\
    \ ињЩж†ЈзЪДеМЇеИЂгАВ\n\n### 4.2 иЃњйЧЃеИЧи°®еЕГзі†\n\nеИЧи°®дЄ≠зЪДжѓПдЄ™еЕГзі†йГљжЬЙдЄАдЄ™зіҐеЉХпЉМеПѓзФ®дЇОж†ЗиѓЖиѓ•еЕГзі†гАВж≠§зіҐеЉХдїОеЈ¶еИ∞еП≥йАТеҐЮпЉМдїО 0 еЉАеІЛгАВиіЯзіҐеЉХзЫЄеѓєдЇОеИЧи°®жЬЂе∞ЊпЉМдїОеП≥еИ∞еЈ¶зїЭеѓєеАЉйАТеҐЮпЉМдїОеИЧи°®жЬЂе∞ЊзЪД\
    \ -1 еЉАеІЛгАВеЫ†ж≠§пЉМеИЧи°®дЄ≠зЪДжѓПдЄ™еЕГзі†йГљжЬЙдЄ§дЄ™еЕ≥иБФзЪДзіҐеЉХвАФвАФдЄАдЄ™жШѓдїОеИЧи°®еЉАе§іиЃ°зЃЧзЪДйЭЮиіЯзіҐеЉХпЉМеП¶дЄАдЄ™жШѓдїОеИЧи°®жЬЂе∞ЊиЃ°зЃЧзЪДиіЯзіҐеЉХгАВзїУеРИ [ ] ињРзЃЧзђ¶пЉМжИСдїђеПѓдї•ж†ЗиѓЖеИЧи°®дЄ≠зЪДдїїдљХеЕГзі†пЉМе¶ВдЄЛдЊЛжЙАз§ЇпЉЪ\n\
    \n```\n>>> L=[5,2,3]\n>>> L[0]\n5\n>>> L[1]\n2\n>>> L[2]\n3\n>>> L[-1]\n3\n>>>\
    \ L[-2]\n2\n>>> L[-3]\n5\n```\n\nеИЧи°®зЪДеЕГзі†еПѓдї•иЗ™зФ±дњЃжФєпЉЪ\n\n```\n>>> L=[5,2,3]\n>>> L\n[5,\
    \ 2, 3]\n>>> L[0]=0\n>>> L\n[0, 2, 3]\n>>> L[0]=L[1]+L[2]\n>>> L\n[5, 2, 3]\n\
    ```\n\n### 4.3 иЃ°зЃЧеИЧи°®еЕГзі†жХ∞йЗП\n\nеПѓдї•дљњзФ® `len()` еЗљжХ∞жЭ•иЃ°зЃЧеИЧи°®дЄ≠зЪДеЕГзі†жХ∞йЗПгАВдїїдљХеИЧи°®зЪДжЬАе∞Пе§Іе∞ПдЄЇ 0пЉМеѓєеЇФдЇОдЄАдЄ™з©ЇеИЧи°®пЉИзФ±\
    \ `[]` и°®з§ЇпЉЙгАВ\n\n```\n>>> L=[5,2,3]\n>>> L\n[5, 2, 3]\n>>> len(L)\n3\n>>> L=[5]\n\
    >>> L\n[5]\n>>> len(L)\n1\n>>> L=[]\n>>> L\n[]\n>>> len(L)\n0\n```\n\n### 4.4\
    \ йБНеОЖеИЧи°®еЕГзі†\n\nжИСдїђжЬАзїИеѓєеИЧи°®жЙІи°МзЪДжЬАеЃЮзФ®жУНдљЬдєЛдЄАжШѓйБНеОЖеЃГдїђеєґжМЙй°ЇеЇПе§ДзРЖжѓПдЄ™еЕГзі†гАВзФ±дЇОеИЧи°®жШѓеЇПеИЧпЉМ`for` еЊ™зОѓеПѓзЫіжО•еЕЉеЃєзФ®дЇОйБНеОЖпЉМе¶ВдЄЛдЊЛжЙАз§ЇпЉЪ\n\
    \n```\n>>> L=[5,2,3]\n>>> for i in L: print(i)\n...\n5\n2\n3\n```\n\n### 4.5 еЬ®еИЧи°®дЄ≠жРЬзіҐеЕГзі†\n\
    \nйЙідЇОеИЧи°®еПѓдї•еМЕеРЂе§ЪдЄ™й°єзЫЃпЉМжИСдїђеПѓиГљйЬАи¶БзЯ•йБУзЙєеЃЪеЕГзі†жШѓеР¶е≠ШеЬ®дЇОеИЧи°®дЄ≠пЉМе¶ВжЮЬе≠ШеЬ®пЉМеЃГеЬ®еИЧи°®дЄ≠еЗЇзО∞дЇЖе§Ъе∞Сжђ°дї•еПКеЬ®еУ™дЇЫдљНзљЃгАВPython дЄ≠жЬЙйТИеѓєжЙАжЬЙињЩдЇЫжГЕеЖµзЪДеЗљжХ∞гАВ\n\
    \n#### 4.5.1 ж£АжЯ•е≠ШеЬ®жАІ\n\n`in` еТМ `not in` ињРзЃЧзђ¶еЄЃеК©жИСдїђй™МиѓБзЙєеЃЪеЕГзі†жШѓеР¶е≠ШеЬ®дЇОеИЧи°®дЄ≠гАВ\n\n```\n>>> L=[5,2,3]\n\
    >>> 3 in L\nTrue\n>>> 4 in L\nFalse\n>>> 4 not in L\nTrue\n```\n\n#### 4.5.2 иЃ°зЃЧеЗЇзО∞жђ°жХ∞\n\
    \nеИЧи°®зЪД `count()` жИРеСШеЗљжХ∞еСКиѓЙжИСдїђжМЗеЃЪеѓєи±°еЬ®еИЧи°®дЄ≠е≠ШеЬ®е§Ъе∞СдЄ™еЃЮдЊЛгАВ\n\n```\n>>> L=[5,2,3,2]\n>>> L.count(3)\n\
    1\n>>> L.count(2)\n2\n>>> L.count(4)\n0\n```\n\n#### 4.5.3 еЃЪдљНеЕГзі†\n\nеИЧи°®зЪД `index()`\
    \ жИРеСШеЗљжХ∞еЬ®еИЧи°®дЄ≠жРЬзіҐеЕГзі†зЪДзђђдЄАжђ°еЗЇзО∞пЉМеєґињФеЫЮжЙЊеИ∞еЃГзЪДзіҐеЉХпЉМе¶ВжЮЬжЬ™жЙЊеИ∞еИЩжКЫеЗЇ `ValueError`гАВеЕґеЃМжХіиѓ≠ж≥ХдЄЇпЉЪ\n\n```\nlist.index(x[,i[,j]])\n\
    ```\n\n**ељҐеЉП #1пЉЪ** `list.index(x)`\nињЩеЬ®еИЧи°® `list` дЄ≠жРЬзіҐеЕГзі† `x` зЪДзђђдЄАжђ°еЗЇзО∞пЉМеєґињФеЫЮжЙЊеИ∞еЃГзЪДзіҐеЉХпЉМе¶ВжЮЬжЬ™жЙЊеИ∞иѓ•еЕГзі†еИЩеЉХеПС\
    \ `ValueError`пЉМе¶ВдЄЛдЊЛжЙАз§ЇпЉЪ\n\n```\n>>> L=[5,2,3,2]\n>>> L.index(2)\n1\n>>> L.index(4)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    ValueError: 4 is not in list\n```\n\n**ељҐеЉП #2пЉЪ** `list.index(x,i)`\n\nе¶ВжЮЬзїЩеЗЇдЇЖзђђдЇМдЄ™еПВжХ∞\
    \ (i)пЉМеИЩжРЬзіҐдїОзіҐеЉХ i еЉАеІЛпЉМиАМдЄНжШѓдїО 0 еЉАеІЛгАВињЩеЕБиЃЄжИСдїђжРЬзіҐеЕГзі†зЪДеЕґдїЦеЗЇзО∞пЉМжИЦеЬ®жРЬзіҐдЄ≠иЈ≥ињЗдЄАдЇЫеИЭеІЛеЕГзі†гАВеЬ®жЙАжЬЙеЕґдїЦжЦєйЭҐпЉМж≠§ељҐеЉПдЄОељҐеЉП #1 з±їдЉЉгАВ\n\
    \n```\n>>> L=[5,2,3,2]\n>>> L.index(2,2)\n3\n```\n\nеЬ®дЄКйЭҐзЪДдЊЛе≠РдЄ≠пЉМ2 зЪДзђђдЄАжђ°еЗЇзО∞еЬ®зіҐеЉХ 1 е§ДгАВе¶ВжЮЬжИСдїђжГ≥жРЬзіҐ\
    \ 2 зЪДдЄЛдЄАжђ°еЗЇзО∞пЉМжИСдїђйЬАи¶БдїОзіҐеЉХ 2 еЉАеІЛжРЬзіҐпЉМињЩж≠£жШѓиѓ•з§ЇдЊЛжЙАеБЪзЪДгАВ\n\n**ељҐеЉП #3пЉЪ** `list.index(x,i,j)`\n\nе¶ВжЮЬзїЩеЗЇдЇЖзђђдЄЙдЄ™еПВжХ∞\
    \ (j)пЉМжРЬзіҐе∞ЖдїОзіҐеЉХ i еЉАеІЛпЉМдљЖе∞ЖеЬ®зіҐеЉХ j е§ДеБЬж≠ҐпЉИдЄНеМЕжЛђзіҐеЉХ jпЉЙгАВиѓЈиЃ∞дљПпЉМе¶ВжЮЬеБЬж≠ҐжЧґжЬ™жЙЊеИ∞еЕГзі†пЉМеЃГе∞ЖжКЫеЗЇ ValueErrorгАВ\n\n```\n\
    >>> L=[5,2,3,2]\n>>> L.index(3,0,2)\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nValueError: 3 is not in list\n```\n\nеЬ®дЄКйЭҐзЪДдЊЛе≠РдЄ≠пЉМжИСдїђдїОзіҐеЉХ\
