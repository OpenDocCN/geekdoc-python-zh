    \n#### 2.7.1.6 жЙУеН∞з©Їи°М\n\nдљЬдЄЇзЙєдЊЛпЉМељУж≤°жЬЙеПВжХ∞дЉ†йАТзїЩ `print()` еЗљжХ∞жЧґпЉМеЃГжЬАзїИеП™жЙУеН∞зїИж≠Ґзђ¶е≠Чзђ¶дЄ≤пЉИйїШиЃ§дЄЇжНҐи°Мзђ¶пЉЙпЉМеЫ†ж≠§дЉЪжЙУеН∞дЄАдЄ™з©Їи°МпЉЪ\n\
    \n```\n>>> print()\n>>>\n```\n\n### 2.7.2 дљњзФ® format() еЗљжХ∞ж†ЉеЉПеМЦе≠Чзђ¶дЄ≤\n\nиЩљзДґжИСдїђиГље§ЯдљњзФ® `print()`\
    \ еЗљжХ∞ињЫи°МжЙУеН∞пЉМдљЖжИСдїђжЧ†ж≥Хдї•дїїдљХжЦєеЉПж†ЉеЉПеМЦиЊУеЗЇпЉИйЩ§дЇЖжЈїеК†еИЖйЪФзђ¶еТМзїИж≠Ґзђ¶е≠Чзђ¶дЄ≤пЉЙгАВеѓєдЇОжЫійЂШзЇІзЪДж†ЉеЉПеМЦпЉМжИСдїђеПѓдї•дЊЭиµЦе≠Чзђ¶дЄ≤з±їзЪД `format()` еЗљжХ∞пЉМиѓ•еЗљжХ∞еПѓдї•ж†ЉеЉПеМЦе≠Чзђ¶дЄ≤еєґињФеЫЮдЄАдЄ™зїУжЮЬе≠Чзђ¶дЄ≤пЉМзДґеРОеПѓдї•жЙУеН∞иѓ•е≠Чзђ¶дЄ≤гАВ\n\
    \n`format()` еЗљжХ∞еЬ®е≠Чзђ¶дЄ≤дЄ≠жРЬзіҐеН†дљНзђ¶гАВињЩдЇЫеН†дљНзђ¶зФ±иК±жЛђеПЈ ({}) и°®з§ЇпЉМи°®з§ЇйЬАи¶БеЬ®йВ£йЗМжЫњжНҐжЯРдЄ™еАЉпЉИеєґдЄФеПѓиГљдєЯйЬАи¶Бж†ЉеЉПеМЦпЉЙгАВдљЬдЄЇзЙєдЊЛпЉМе¶ВжЮЬе≠Чзђ¶дЄ≤дЄ≠ж≤°жЬЙеН†дљНзђ¶пЉМ`format()`\
    \ еЗљжХ∞дЄНдЉЪеѓєе≠Чзђ¶дЄ≤еБЪдїїдљХе§ДзРЖпЉМиАМжШѓеОЯж†ЈињФеЫЮеЃГпЉМе¶ВдЄЛдЊЛжЙАз§ЇпЉЪ\n\n```\n>>> 'Hello world'.format()\n'Hello world'\n\
    ```\n\n> **ж≥®жДПпЉЪ**\nе≠Чзђ¶дЄ≤з±їзЪД `format()` еЗљжХ∞дЄНдЉЪжЙУеН∞пЉБеЃГињФеЫЮж†ЉеЉПеМЦеРОзЪДе≠Чзђ¶дЄ≤пЉМе¶ВжЮЬйЬАи¶БпЉМеПѓдї•дљњзФ® `print()` жЙУеН∞иѓ•е≠Чзђ¶дЄ≤гАВ\n\
    \n#### 2.7.2.1 жЫњжНҐеПВжХ∞\n\nзО∞еЬ®иЃ©жИСдїђеИ©зФ®еН†дљНзђ¶жЭ•жЫњжНҐеАЉгАВ`format()` еЗљжХ∞еПѓдї•жО•жФґе§ЪдЄ™еПВжХ∞пЉМињЩдЇЫеПВжХ∞дїО 0 еЉАеІЛйЪРеЉПзЉЦеПЈгАВињЩдЇЫеПВжХ∞еАЉеПѓдї•еЬ®е≠Чзђ¶дЄ≤дЄ≠е≠ШеЬ®еН†дљНзђ¶зЪДдїїдљХеЬ∞жЦєиҐЂиЃњйЧЃеТМжЫњжНҐгАВеН†дљНзђ¶еПѓдї•йАЪињЗжМЗеЃЪеПВжХ∞зЉЦеПЈжЭ•ж†ЗиѓЖи¶БжЫњжНҐзЪДеПВжХ∞пЉМе¶ВдЄЛдЊЛжЙАз§ЇпЉЪ\n\
