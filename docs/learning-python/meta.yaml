    4. жЙАжЬЙеМєйЕНзЪДеНХдЄ™еИЖзїДеЬ®е≠Чзђ¶дЄ≤дЄ≠зЪДдљНзљЃ


    ### 9.6.1 жПРеПЦеОЯеІЛе≠Чзђ¶дЄ≤еТМж≠£еИЩи°®иЊЊеЉП


    дЄАжЧ¶иОЈеЊЧ `match` еѓєи±°пЉМжИСдїђе∞±еПѓдї•зФ®еЃГжЭ•жПРеПЦиҐЂжРЬзіҐзЪДеОЯеІЛе≠Чзђ¶дЄ≤ (`match.string`) еТМзФ®дЇОжРЬзіҐзЪДж≠£еИЩи°®иЊЊеЉП (`match.re`)гАВ


    **иѓ≠ж≥ХпЉЪ**


    ```

    match.string

    match.re

    ```


    **з§ЇдЊЛпЉЪ**


    ```python

    >>> import re

    >>> m=re.fullmatch(r"(\d\d?)/(\d\d?)/(\d\d){1,2}", "25/12/2016")

    >>> m.string

    ''25/12/2016''

    >>> m.re

    re.compile(''(\d\d?)/(\d\d?)/(\d\d){1,2}'')

    ```


    **иІВеѓЯпЉЪ**


    1. ж≠§з§ЇдЊЛдљњзФ®ж≠£еИЩи°®иЊЊеЉПеМєйЕНиЛ±еЫљж†ЉеЉПзЪДжЧ•жЬЯгАВињЩжђ°пЉМжИСдїђе∞Ж `fullmatch` зЪДињФеЫЮеАЉпЉИе∞ЖжШѓдЄАдЄ™ `match` еѓєи±°пЉЙе≠ШеВ®еЬ®еПШйЗП m дЄ≠гАВ

    2. `m.string` зїЩеЗЇеОЯеІЛе≠Чзђ¶дЄ≤пЉЪ''25/12/2016''

    3. `m.re` зїЩеЗЇеОЯеІЛж≠£еИЩи°®иЊЊеЉПпЉЪ`re.compile(''(\d\d?)/(\d\d?)/(\d\d){1,2}'')`


    ељУзДґпЉМдїОеМєйЕНеѓєи±°дЄ≠жПРеПЦе≠Чзђ¶дЄ≤еТМж≠£еИЩи°®иЊЊеЉПж≤°жЬЙжШЊиСЧдЉШеКњпЉМдљЖињЩеП™жШѓдЄАдЄ™еЉАеІЛгАВжИСдїђжЫіжДЯеЕіиґ£зЪДжШѓжПРеПЦжЙЊеИ∞зЪДеИЖзїДзЪДеЖЕеЃєпЉМињЩе∞ЖеЬ®дЄЛдЄАиКВдЄ≠иЃ®иЃЇгАВ


    ### 9.6.2 жПРеПЦеИЖзїДеЖЕеЃє


    жЙАжЬЙеИЖзїДйГљеПѓдї•дљњзФ® `match.groups()` жЦєж≥ХдљЬдЄЇеЕГзїДжПРеПЦпЉМеЕґиѓ≠ж≥Хе¶ВдЄЛпЉЪ


    ```

