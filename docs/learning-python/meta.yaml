    RDBMS do, joins across tables might be less frequently used here. Perhaps we need
    to first understand what is SQLite in order to better understand why things are
    slightly different in this RDBMS!


    SQLite is a C implementation of an embeddable RDBMS. It is thus highly efficient,
    highly portable (is shipped with the application and is not dependent on any databases
    to be installed/deployed there) and pretty simple (since a single application'
