    # 12.1.6 Polymorphism


    The term *polymorphism* in general means multiple forms of the same entity. In
    OOP, it means performing the same logical operation by choosing from multiple
    implementations appropriately. The two forms of polymorphism that we are going
    to see actively in Python are:


    +   1. *Operator overloading* вАУ performing the same logical operation using an
    operator in different ways (using different implementation) depending on the type
    of the invoking operand

    2. *Dynamic polymorphism* вАУ performing the same logical operation in different
    ways (using different implementation) depending on the type of the invoking object.


    In the `Date` example, an example of operator overloading would be providing an
    implementation for addition of days to a given date, resulting in a new Date object.


    # 12.1.7 Inheritance


    *Inheritance* is the mechanism wherein a class acquires all the features and properties
    of another class (or classes). Inheritance has the following uses:


    +   1. **Re-usability** вАУ it helps reduce effort by reusing existing code.

    2. **Extensibility** вАУ it helps add new code or apply changes without tampering
    with existing code.

    3. **Compartmentalisation** вАУ it helps manage code better by compartmentalising
    classes.


    Structurally, there are multiple types of inheritance:


    +   1. **Simple inheritance** вАУ when a class inherits from another class.


    ![](img/7831d9fe9e47e5b1109ec75197998a41_358_0.png)'
  - '[PAGE 359]


    2. **Multi-level inheritance** вАУ when a class inherits from a class that inherits
    from another class, thereby forming an inheritance chain.


    ![](img/7831d9fe9e47e5b1109ec75197998a41_359_0.png)


    3. **Multiple inheritance** вАУ when a class inherits from multiple classes.


    ![](img/7831d9fe9e47e5b1109ec75197998a41_359_1.png)'
