  - '[PAGE 240]


    Here is a more complex RE that handles all the above 3 enhancements as well:


    ```

    ^[A-Za-z]+([ .\-\''][A-Za-z]+)*$

    ```


    # Observation:


    +   1. The first part `[A-Za-z]+` ensures that the name starts with alphabets

    2. The part `[ .\-\'']` is a placeholder for a word separator, which could be
    a space, a period, a hyphen or an apostrophe. The hyphen (-) has to be escaped
    as otherwise it will be wrongly construed to mean a range within the character
    set. The apostrophe ('') has to be escaped if the RE is enclosed within single
    quotes, else it will mean the end of the string. The period (.) should not be
    escaped though it is a RE operator as it is present within [ ].

    3. The following part `[A-Za-z]+` requires alphabets to be present after every
    such separator and prevents a name from ending with a stray separator.

    4. Finally, the separator and the part following that is optional and can be present
    multiple times вАУ thus the grouping and the *.


    # 9.3.4.2 RE for Username


    Normally, a username follows rules for identifiers. Let''s say we have to adhere
    to the following rules:


    +   1. The length should be 3-16 characters.

    2. It can contain alphabets, digits and underscores but should not start with
    a digit.


    Here is the RE for our requirement:


    ```

    ^[A-Za-z_]\w{2,15}$

    ```


    # Observation:


    +   1. The first part `[A-Za-z_]` ensures that the username does not start with
    a digit.

    2. The second part `\w{2,15}` permits any word forming character (alphabets, digits
    and underscores) with the constraint of a length between 2 and 15 characters.
    Together with the first character matched earlier, it ensures a length of 3-16
    characters.'
