  md: '# SUMMARY


    +   - Exceptions can be monitored using the try block.

    - Exceptions can be caught and processed using the catch block.

    - The catch block can also catch multiple exception types identified by a tuple
    of exception class names.

    - An except block capable of handling a particular exception type is also capable
    of handling all the sub-classes of that exception type.

    - It is also possible to gain a reference to the actual exception instance in
    the except block.

    - An except block that does not specify the exception type it can handle will
    end up handling all exceptions. Such an except block cannot be followed by any
    other except blocks.

    - The else clause allows unmonitored code to exist along with monitored code!

    - The finally clause provides an opportunity to clean-up irrespective of whether
    an exception occurs or not.

    - Exceptions can be raised on demand using the raise statement.

    - Exceptions that are not handled at the level where they are raised propagate
    to outer levels, returning from functions if required, till they are handled somewhere
    or are reported as unhandled exceptions.'
