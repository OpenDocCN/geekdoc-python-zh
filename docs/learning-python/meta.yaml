    # 8.3.1.2 The rpartition() Function


    Syntax:


    ```

    str.rpartition(separator)

    ```


    The `rpartition()` function searches for the last (rightmost) occurrence of a
    separator within a string and returns a tuple containing 3 parts: the part before
    the separator, the separator itself and the part after the separator. In case
    the separator was not found in the string, it will still return a tuple containing
    3 parts: 2 null strings followed by the entire string.


    Here are the same examples we had used for `partition()`:


    ```

    >>> "India:New Delhi''.rpartition(":")

    (''India'', '':'', ''New Delhi'')

    >>> "India:New Delhi China:Beijing".rpartition(":")

    (''India:New Delhi China'', '':'', ''Beijing'')

    >>> "India:New Delhi".rpartition("-")

    ('''', '''', ''India:New Delhi'')

    ```


