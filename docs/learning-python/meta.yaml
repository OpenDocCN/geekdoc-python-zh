    # 2.3 Basic Data Types


    One of the first things to learn in a programming language is what kinds of data
    types it provides. This will then help us know what can be represented and what
    operations are permitted. Python being a dynamic scripting language does not require
    (and does not allow) a variable to be declared to be of a specific type before
    use. Being a powerful object-oriented language, all data is considered to be objects
    and therefore all data types are classes (more details on objects, classes and
    object-oriented programming is covered in section 12).


    When a variable stores a value, it is actually referring to an object of a specific
    type. The type of any expression can be found out using the built-in function
    `type()`. This will be a useful learning tool now and a useful debugging tool
    later on.


    We are going to cover the following data types in the following sections:


    +   1. Integers (`int`)

    2. Real numbers (`float`)

    3. Complex numbers (`complex`)

    4. Strings (`str`)

    5. Boolean (`bool`)


    A more detailed coverage of these data types is available in section 20.1.


    # 2.3.1 The `int` type


    The simplest numeric data type to deal with is `int`. Objects of this type represent
    integers (both positive and negative) and cannot store a fractional part. The
    range is not limited in Python and we can store very large integers without worrying
    about whether Python will be able to handle it!


    # 2.3.1.1 Literals of Type `int`


    +   - Any literal constant made up of only digits (with an optional leading sign)
    is considered as an `int` constant.

    - Any literal constant made up of only digits and with a leading `0o` (with an
    optional leading sign before that) is considered to be an octal constant of type
    `int`. Such constants cannot contain the digits 8 and 9 (as they are illegal in
    octal).'
