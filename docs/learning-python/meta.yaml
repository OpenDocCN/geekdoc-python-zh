    \n## жАїзїУ\n\n> з±їдЄ≠зЪДжЙАжЬЙжИРеСШйїШиЃ§иҐЂеБЗеЃЪдЄЇеЕђеЕ±зЪДгАВдї•еНХдЄ™дЄЛеИТзЇњеЉАе§ізЪДж†ЗиѓЖзђ¶иҐЂеБЗеЃЪдЄЇеПЧдњЭжК§зЪДпЉМиАМдї•дЄ§дЄ™дЄЛеИТзЇњеЉАе§ідЄФдЄНдї•дЄ§дЄ™жИЦжЫіе§ЪдЄЛеИТзЇњзїУе∞ЊзЪДж†ЗиѓЖзђ¶иҐЂеБЗеЃЪдЄЇзІБжЬЙзЪДгАВPythonзЫЃеЙНж≤°жЬЙеѓєеПЧдњЭжК§жИРеСШзЪДеЃЮзО∞жФѓжМБгАВ\n\
