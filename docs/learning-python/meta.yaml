    # 8.3.3 Splitting Lines Using splitlines()


    Given a multi-line string (a string containing newline characters), the `splitlines()`
    function can break them down into separate lines and return them as a list.


    **Complete syntax:**


    ```

    str.splitlines([keepends])

    ```


    **Forms:**


    +   1. `str.splitlines()`

    2. `str.splitlines(keepends)`


    **Form #1:** `str.splitlines()`


    This function breaks down a multi-line string into a list of strings corresponding
    to each line. The splitting is done when it finds a suitable newline character
    (for simplicity, can be considered to be \n, though there are other characters
    including \r and Unicode newline characters). The newline character that was found
    is not present in the list of strings it returns.


    **Example:**


    ```

    >>> "Hello\nWorld\nHow are you?".splitlines()

    [''Hello'', ''World'', ''How are you?'']

    ```


    **Form #2:** `str.splitlines(keepends)`


    This function works just like form #1, but if `keepends` is `True` then this retains
    the newline character at the end of each line in the list. If `keepends` is `False`,
    this works just like form #1.


    **Examples:**


    ```

    >>> "Hello\nWorld\nHow are you?".splitlines(True)

    [''Hello\n'', ''World\n'', ''How are you?'']

    >>> "Hello\nWorld\nHow are you?".splitlines(False)

    [''Hello'', ''World'', ''How are you?'']

    ```'
