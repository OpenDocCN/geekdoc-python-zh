    # 8.5.2 Replacing Substrings Using replace()


    Replacing a substring by another within a string is a common requirement вАУ but
    strings being immutable in Python means that any such modification would require
    the creation of a new string. The `replace()` function helps replace one or more
    occurrences of a substring by another, returning a new string with the replacements
    performed.


    Complete syntax:


    ```

    str.replace(old,new[,count])

    ```


    Forms:


    +   1. str.replace(old,new)

    2. str.replace(old,new,count)'
