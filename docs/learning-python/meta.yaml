    # 9. Regular Expressions


    Observation:


    +   1. The \d? means an optional digit. The {2} means 2 such optional digits.
    The \d after that means a compulsory digit.

    2. The RE therefore means: 2 optional digits followed by a compulsory digit. That
    compulsory digit matches the units place while the optional digits can match the
    hundreds place and tens place.


    If we wish to accept an integer within arbitrary intervals, the RE becomes more
    complex. For example, here is a RE for accepting a 3-digit integer between 000
    and 255:


    ```

    ^([01]\d\d|2[0-4]\d|25[0-5])$

    ```


    Observation:


    +   1. The RE is made up of 3 choices, covered below.

    2. The first choice is [01]\d\d which matches all 3-digit integers that start
    with 0 or 1, matching 000 to 199.

    3. The second choice is 2[0-4]\d which matches integers from 200 to 249.

    4. The third choice is 25[0-5] which matches integers from 250 to 255.


    If we wish to match integers from 0 to 255, this is the RE:


    ```

    ^([01]?\d?\d|2[0-4]\d|25[0-5])$

    ```


    Observation:


    +   1. The RE is made up of 3 choices, covered below.

    2. The first choice is [01]?\d?\d, which covers upto 2 optional digits followed
    by a compulsory digit, with additional constraints on the first optional digit
    that it should be 0 or 1. This takes care of all single digit integers, all 2-digit
    integers and all 3-digit integers starting with 0 or 1, hence matching 0-199 as
    well as 000-199.

    3. The second choice is 2[0-4]\d, which matches all 3-digit integers starting
    with 2, and hence matches the range 200-249.

    4. The third choice is 25[0-5], which matches all 3-digit integers in the range
    of 250-255.'
- md: '## 9.3.4.9 RE for Real Numbers


    Real numbers in programming can be represented using exponentiation notation or
    fixed/floating point notation. Here is a RE to match real numbers:


    ```

    ^[-+]?\d*\.?\d+([eE][-+]?\d+)?$

    ```


    Observation:


    1.  The [-+]? takes care of an optional leading sign.

    2.  The \d*\.?\d+ takes care of optional whole number part, an optional decimal
    point and a fractional part. It also takes care of situations where there is no
    fractional part вАУ the \d+ takes care of the integral part instead.

    3.  The ([eE][-+]?\d+)? takes care of the exponent notation (e or E), followed
    by an optional sign, followed by an integral exponent part. This entire part is
    optional.


    ## 9.3.4.10 RE for Coordinates


    A pair of coordinates are of the form (x, y) and will be matched by this RE:


    ```

    \([-+]?\d+, [-+]?\d+\)

    ```


    Observation:


    1.  The x- and y-coordinates are each matched using the same RE pattern. The "(",
    "," and ")" are retained as characters. Since parentheses are operators, they
    need to be escaped. Since "," is not an operator, it will not be escaped.

    2.  The pattern [-+]\d+ supports an optional sign followed by an integer. This
    RE matches only integers, but we could also use the pattern we had used to match
    real numbers instead.


    ## 9.4 Searching Strings Using match(), fullmatch() and search()


    Now that we know how to frame regular expressions in Python, let''s put them to
    use! Support for regular expressions in Python is present in the re module, and
    hence this module has to be imported using the following statement:


    ```

    import re

    ```


    ## 9. Regular Expressions


    The first 3 functions we will examine are `match()`, `fullmatch()` and `search()`,
    all of which can search for a regular expression match within a string, but differ
    slightly in functionality as summarised in the table below:


    | Function | Match Location |

    | :--- | :--- |

    | `match()` | Matches from the beginning of the string |

    | `fullmatch()` | Matches the entire string |

    | `search()` | Matches anywhere and any part of the string |


    Table 22: Different Functions for Matching Regular Expressions in Strings


    Thus, if the RE `not` is used to search within different strings, the table below
    summarises which functions will detect a match:


    | String | `match()` | `fullmatch()` | `search()` |

    | :--- | :---: | :---: | :---: |

    | `not` | вЬУ | вЬУ | вЬУ |

    | `note` | вЬУ | вЬЧ | вЬУ |

    | `cannot` | вЬЧ | вЬЧ | вЬУ |

    | `this, not that` | вЬЧ | вЬЧ | вЬУ |


    Note:


    1.  While `fullmatch()` is the most restrictive function, requiring a complete
    match, `search()` is the least restrictive function tolerating a match anywhere
    within the string.

    2.  The presence of a leading `^` or `\A` within the RE will make even the `search()`
    function behave like the `match()` function. The absence of these will not make
    any difference to the `match()` function.

    3.  The presence of a leading `^` or `\A` and a trailing `$` or `\Z` within the
    RE will make the `search()` and `match()` functions behave like the `fullmatch()`
    function. The absence of these will not make any difference to the `fullmatch()`
    function.

    4.  Anything matched by `fullmatch()` will definitely be matched by the `match()`
    and `search()` functions too.

    5.  Anything matched by `match()` will definitely be matched by the `search()`
    function too.


    ## 9.4.1 The search() Function


    Complete syntax:


    ```

    re.search(pattern,string[,flags])

    ```


    Forms:


    1.  re.search(pattern,string)

    2.  re.search(pattern,string,flags)


    Form #1: `re.search(pattern,string)`


    In this form, the function checks whether the string `string` matches the regular
    expression `pattern` or not. If there is a match, the function returns a *match
    object* (covered in detail in section 10.6). If there is no match, the function
    returns `None`.


    ```

    >>> import re

    >>> re.search(r"\d","Here are 5 apples")

    <_sre.SRE_Match object; span=(9, 10), match=''5''>

    >>> re.search(r"\d","Here are five apples")

    >>>

    ```


    > NOTE:

    The reason we are using a raw string (r"") for the regular expression has been
    covered in section 10.3.3.


    We can use this function as though it returns a Boolean value as shown in the
    example below:


    ```

    >>> import re

    >>> if re.search(r"\d","5"): print("Yes")

    ... else: print("No")

    ...

    Yes

    ```


    Form #2: `re.search(pattern, string, flags)`

    This form is identical in functionality to the previous form, but additionally
    allows us to provide `flags` that modify the search behaviour slightly. These
    flags are discussed in detail in section 10.4.4.


    ## 9.4.2 The fullmatch() Function


    Complete syntax:


    ```

    re.fullmatch(pattern, string[, flags])

    ```


    Forms:


    1.  `re.fullmatch(pattern, string)`

    2.  `re.fullmatch(pattern, string, flags)`


    Form #1: `re.fullmatch(pattern, string)`

    In this form, the function checks whether the string `string` completely matches
    the regular expression `pattern` or not. If there is a match, the function returns
    a *match object* (covered in detail in section 10.6). If there is no match, the
    function returns None.


    ```

    >>> import re

    >>> re.fullmatch(r"\d+", "1234")

    <_sre.SRE_Match object; span=(0, 4), match=''1234''>

    >>> re.fullmatch(r"\d+", "12a34")

    >>>

    ```


    We can use this function as though it returns a Boolean value as shown in the
    example below:


    ```

    >>> import re

    >>> if re.fullmatch(r"\d+", "1234"): print("Yes")

    ... else: print("No")

    ...

    Yes

    ```


    Form #2: `re.fullmatch(pattern, string, flags)`

    This form is identical in functionality to the previous form, but additionally
    allows us to provide `flags` that modify the search behaviour slightly. These
    flags are discussed in detail in section 10.4.4.


    ## 9.4.3 The match() Function


    Complete syntax:


    ```

    re.match(pattern,string[,flags])

    ```


    Forms:


    1.  re.match(pattern,string)

    2.  re.match(pattern,string,flags)


    Form #1: re.match(pattern,string)

    In this form, the function checks whether the string string starts with a match
    with the regular expression pattern or not. If there is a match, the function
    returns a match object (covered in detail in section 10.6). If there is no match,
    the function returns None.


    ```

    >>> import re

    >>> re.match(r"\d+","1234a")

    <_sre.SRE_Match object; span=(0, 4), match=''1234''>

    >>> re.match(r"\d+","a1234")

    >>>

    ```


    We can use this function as though it returns a Boolean value as shown in the
    example below:


    ```

    >>> import re

    >>> if re.match(r"\d+","1234a"): print("Yes")

    ... else: print("No")

    ...

    Yes

    ```


    Form #2: re.match(pattern,string,flags)

    This form is identical in functionality to the previous form, but additionally
    allows us to provide flags that modify the search behaviour slightly. These flags
    are discussed in detail in section 10.4.4.


    ## 9.4.4 Flags for Dealing with Regular Expressions


    All the preceding 3 functions (search, match and fullmatch) and many other regular
    expression based functions that we are going to discuss later as well, permit
    us to specify an additional flags argument, which can be a combination of any
    of the flags discussed in this section. As a special case, a flag value of 0 indicates
    the absence of any of these flags. Multiple flags can be combined by adding them
    using the + operator or by using the bitwise OR operator (|).


    ```

    re.I / re.IGNORECASE

    ```


    Regular expression matches are case-sensitive by default. This flag forces a case-insensitive
    match as demonstrated in the examples below:


    ```

    >>> import re

    >>> re.search("apple", "Here are some APPLES")

    >>> re.search("apple", "Here are some APPLES", re.I)

    <_sre.SRE_Match object; span=(14, 19), match=''APPLE''>

    ```


    **Observation:**


    1.  In the first example above, the RE "apple" was unable to match the substring
    "APPLE" due to the search being case-sensitive

    2.  In the second example, the same RE was able to match the same string due to
    case-insensitive comparison, specified by re.I


    ```

    re.M / re.MULTILINE

    ```


    It is typically expected when dealing with regular expressions that the string
    is a single line of text. The "^" and "$" operators therefore imply a match at
    the beginning of the string (and the line) and at the end of the string (and the
    line) respectively. If the string is a multi-line string that contains newline
    characters, these operators will be happily unaware of it. To force the "^" and
    "$" operators to anchor at the beginning and end of each line within the string
    (identified by the presence of the newline character), this flag can be specified.


    ```

    >>> import re

    >>> re.search("^This", "That is good.\nThis is bad.")

    >>> re.search("^This", "That is good.\nThis is bad.", re.M)

    <_sre.SRE_Match object; span=(14, 18), match=''This''>

    ```


    **Observation:**


    1.  In the first example, the RE "^This" is unable to match the string since the
    string does not start with "This".

    2.  In the second example, the same RE is able to match the same string since
    the string contains a line that starts with "This".


    ```

    re.S / re.DOTALL

    ```


