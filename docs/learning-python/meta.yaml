    # 5. Tuples


    ```

    >>> T1=(1,3)

    >>> T2=(7,8)

    >>> T3=T1+T2

    >>> T3

    (1, 3, 7, 8)

    ```


    The += operator will concatenate the tuple on the RHS to the list on the LHS:


    ```

    >>> T=(1,3)

    >>> T+=(7,8)

    >>> T

    (1, 3, 7, 8)

    ```


    > **NOTE:**

    T1 += T2 creates a new tuple and stores T1+T2 result in that and assigns the new
    tuple to T1. Note that tuples are immutable and new elements cannot be added to
    an existing tuple.


    # 5.7.2 Multiplying Tuples


    A tuple T can be multiplied by an integer n to denote the tuple T repeated n times:


    ```

    >>> T=(5,2,3)*3

    >>> T

    (5, 2, 3, 5, 2, 3, 5, 2, 3)

    ```


    > **NOTE:**

    tuple * n is the same as n * tuple!


    Similarly, the *= operator repeats the tuple on LHS, RHS number of times, and
    assigns the resultant tuple to the LHS variable:


    ```

    >>> T=(5,2,3)

    >>> T*=3

    >>> T

    (5, 2, 3, 5, 2, 3, 5, 2, 3)

    ```'
  - '[PAGE 136]


    # 5.7.3 Assigning and Copying Tuples


    Before we proceed with assigning and copying tuples, we need to understand a basic
    point: even though a tuple is immutable, the elements within a tuple need not
    be immutable!


    +   1. A tuple is immutable and that means that we cannot add elements to a tuple
    and cannot remove elements from a tuple. We also cannot change the elements of
    a tuple.

    2. An element in a tuple can be a reference to some object. We cannot change this
    reference, as suggested in the the point above, but can change the contents of
    the object! Thus, if a tuple contains a list, we can add/remove/change elements
    in the list for instance.


    The = operator allows us to assign a tuple to a tuple variable. Just like in the
    case of lists, this is not the same as copying elements of a tuple to another
    and is demonstrated in the example below.


    ```

    >>> T1=(5, [], 3)

    >>> T2=T1

    >>> T2

    (5, [], 3)

    >>> T1[1].append(9)

    >>> T1

    (5, [9], 3)

    >>> T2

    (5, [9], 3)

    ```


    Since tuples are immutable, we had to insert a list as a member in the tuple and
    change the contents of the list instead. Since tuples are immutable, most methods
    to copy tuples end up copying only it''s reference!


    Tuples can be assigned to tuples вАУ a tuple of values can be assigned to a tuple
    of variables. What makes the syntax even more simpler here is the fact that it
    is the comma that denotes we are dealing with a tuple, not the parentheses, and
    hence the parentheses can be omitted. Have a look at these example of multiple
    assignment:


    ```

    >>> x = y = 5

    >>> x

    5

    >>> y

    5

    >>> x,y = 2,3

    >>> x

    2

    >>> y

    3

    ```'
  - '[PAGE 137]


    # 5. Tuples


    The statement `x = y = 5` is an example of multiple assignment that does not involve
    tuples вАУ the value `5` gets stored in both `x` and `y`. But what if we wish to
    assign different values to `x` and `y`? Can this be done in a single statement?
    Yes! That''s what the statement `x, y = 2, 3` achieves! In case the syntax is
    not clear to you, maybe parentheses can help: `(x, y) = (2, 3)`. This is a tuple
    to tuple assignment wherein each value of the RHS tuple is assigned to the corresponding
    variable in the LHS tuple. Of course, the size of both the tuples must be the
    same!


    Have a look at the classic way of swapping the values of 2 variables in Python:


    ```

    >>> x, y = 2, 3

    >>> x

    2

    >>> y

    3

    >>> x, y = y, x

    >>> x

    3

    >>> y

    2

    ```


    # 5.8 Miscellaneous Operations on Tuples


    Just like lists, there are additional miscellaneous operations possible on tuples
    вАУ but only those operations that honour the fact that tuples are immutable! Thus,
    operations like sorting in place or reversing in place are not supported.


    # 5.8.1 Finding the Smallest Element in a Tuple


    The `min()` function returns the smallest element in the tuple:


    ```

    >>> T = (5, 2, 3)

    >>> min(T)

    2

    ```


    # 5.8.2 Finding the Largest Element in a Tuple


    The `max()` function returns the largest element in the tuple:


    ```

    >>> T = (5, 2, 3)

    >>> max(T)

    5

    ```'
- md: "## 5.8.3 Sorting a Tuple\n\nSince in-place sorting of a tuple is not possible,\
    \ owing to the fact that they are immutable, the `sorted()` function can be used\
    \ to obtain a copy of the sorted elements of a tuple as shown in the example below:\n\
    \n```\n>>> T=(5,2,3)\n>>> sorted(T)\n[2, 3, 5]\n```\n\nThe tuple elements can\
    \ be sorted in descending order as follows:\n\n```\n>>> T=(5,2,3)\n>>> sorted(T,reverse=True)\n\
    [5, 3, 2]\n```\n\n## 5.9 Comparison of Lists and Tuples\n\nSince lists and tuples\
    \ do have a lot of similarities, as a programmer it becomes necessary to know\
    \ how they are similar, how they differ, what are their unique capabilities and\
    \ which one of them to use when. This section addresses these questions.\n\nBoth\
    \ lists and tuples are *ordered sequences* вАУ elements within them are organised\
    \ based on indices and can be identified by their indices.\n\nLists and tuples\
    \ are freely *inter-convertible*:\n\n```\n>>> L=[5,2,3]\n>>> T=tuple(L)\n>>> T\n\
    (5, 2, 3)\n>>> L=list(T)\n>>> L\n[5, 2, 3]\n```\n\nBoth of them support a very\
    \ similar set of operations as far as *searching* for an element within them are\
    \ concerned.\n\nThe biggest difference between them is the fact that tuples are\
    \ *immutable* and lists are *dynamically alterable*! This single difference perhaps\
    \ makes the strongest distinction between lists and tuples and can help you decide\
    \ what to use when!\n\nIf you want a list whose contents are вАЬfrozenвАЭ (known at\
    \ the time of creation and do not change after that), switch over to a tuple.\
    \ If you want a tuple whose contents are manipulated later in the code, switch\
    \ over to a list.\n\nAlso, it might be helpful to keep in mind that lists are\
    \ generally *homogeneous* whereas tuples are generally *heterogeneous*. If you\
    \ find yourself dealing with a heterogeneous list, maybe you wanted a tuple there\
    \ instead. Do note however that Python does not enforce these and has no problems\
    \ dealing with a heterogeneous list or homogeneous tuple, per se.\n\n> **For C/C++\
    \ Programmers:**\n\nC/C++ arrays usually boil down to Python lists, but those\
    \ arrays that are statically initialised and never changed after that (for example,\
    \ lookup tables) usually boil down to Python tuples.\n\nC/C++ structures usually\
    \ boil down to either Python tuples (if you'd like to use indices to access the\
    \ fields) or Python dictionaries (if you'd like to use field names to access the\
    \ fields, covered later in section 7).\n\n## 5.10 Simple Programs Based on Tuples\n\
    \nApplying our understanding of the differences between lists and tuples and re-examining\
    \ the program `countries3.py`, we observe that both the lists - `countries` and\
    \ `capitals` - do not change once created. Therefore, we conclude that tuples\
    \ are a better choice there than lists. Let us rewrite `countries3.py` using tuples:\n\
    \n```\ncountries4.py\n\n1.  #!/usr/bin/python\n2.  \n3.  # Program to accept country\
    \ names and print their capitals\n4.  \n5.  \n6.  countries=(\"India\",\"Pakistan\"\
    ,\"Sri Lanka\",\"China\")\n7.  capitals=(\"New Delhi\",\"Islamabad\",\"Sri Jayawardenepura\
    \ Kotte\",\"Beijing\")\n8.  \n9.  while True:\n10.     country=input(\"Enter a\
    \ country name (or 'end' to terminate): \")\n11.     if country==\"end\": break\n\
    12.     index=countries.index(country)\n13.     capital=capitals[index]\n14. \
    \    print(\"The capital of {} is {}\".format(country,capital))\n```\n\n**Observation:**\n\
    \n1.  The program is identical to `countries3.py`, except that in lines 6 and\
    \ 7, we have used () instead of []. In other words, we are dealing with tuples\
    \ instead of lists.\n2.  Tuples have better efficiency than lists. Therefore,\
    \ if you find a list that could well exist as a tuple instead, switch over to\
    \ tuple.\n\nNext, we'll write a program to generate the first 'n' terms of the\
    \ Fibonacci sequence вАУ a sequence of numbers where each number is the sum of the\
    \ previous two numbers in the series.\n\n**fib.py**\n\n```\n1.  #!/usr/bin/python\n\
    2.  \n3.  # Program to generate the first 'n' Fibonacci terms\n4.  \n5.  t1 =\
    \ t2 = 1\n6.  \n7.  n = int(input(\"How many terms? \"))\n8.  \n9.  for i in range(n):\n\
    10.     print(t1)\n11.     t1,t2 = t2,t1+t2\n```\n\n**Observation:**\n\n1.  The\
    \ first 2 terms are 1 and 1 (some people consider the first 2 terms to be 0 and\
    \ 1). This is achieved with a multiple assignment in line 5. (In case you wish\
    \ to start the series from 0, then line 5 can be replaced by a tuple assignment:\
    \ `t1,t2=0,1`.\n2.  Within the loop that runs `n` times (line 9), we print one\
    \ term per iteration (line 10). The series moves on because of the tuple assignment\
    \ in line 11, where `t1=t2` and `t2=t1+t2`.\n\n## 5.11 Questions\n\n1.  How are\
    \ tuples different from lists? When do we prefer a list over a tuple and vice-versa?\n\
    2.  Write a short note on singleton tuples.\n3.  Write a short note on searching\
    \ within tuples.\n4.  Write a short note on tuple slices.\n5.  Write a short note\
    \ on the operators that can be used with tuples.\n\n## 5.12 Exercises\n\n1.  Write\
    \ a program to convert a tuple of values into a tuple of singleton tuples of values.\
    \ Thus, (1, 2, 3) should get converted to ((1,), (2,), (3,)).\n2.  Write a program\
    \ to count the number of elements in a list until it finds a tuple in the list.\n\
    3.  Write a program to add corresponding elements of two given tuples, giving\
    \ rise to a new tuple.\n4.  Write a program to multiply each element of a given\
    \ tuple with a given integer, giving rise to a new tuple.\n5.  Write a program\
    \ that classifies a triangle as being equilateral, isosceles or scalene, given\
    \ its 3 vertices as a tuple of tuples.\n\n## SUMMARY\n\n-   A tuple is an immutable\
    \ sequence of elements - elements cannot be added to or deleted from a tuple.\n\
    -   A tuple can be simply created using (). Elements of a tuple can be accessed\
    \ using [].\n-   Parentheses is not required for a tuple to be identified! Just\
    \ the comma between elements is enough!\n-   The len() function gives the number\
    \ of elements in a tuple and the count() method returns the number of occurrences\
    \ of a particular element in the tuple.\n-   The for loop can be naturally used\
    \ to iterate through the elements of a tuple.\n-   The in and not in operators\
    \ check for the existence of an element in a tuple. The index() method can return\
    \ the position of an element in a tuple.\n-   A tuple slice is an independent\
    \ tuple made up of elements taken from a tuple using the [:] syntax.\n\n![](img/7831d9fe9e47e5b1109ec75197998a41_142_0.png)\n\
    \n![](img/7831d9fe9e47e5b1109ec75197998a41_143_0.png)\n\n# 6 SETS\n\nIn this chapter\
    \ you will be able to:\n\n-   [x] Create a set and access its elements.\n-   [x]\
    \ Iterate through sets and search for specific elements.\n-   [x] Add and Delete\
    \ elements in a set.\n-   [x] Perform set operations like union, intersection,\
    \ difference and symmetric difference.\n-   [x] Check for disjoint sets, subsets\
    \ and supersets.\n\n## SETS\n\nA set is an unordered collection of unique elements.\n\
    \n-   *Unordered* means that elements in a set do not have an index by which they\
    \ can be addressed.\n-   *Unique* means that duplicates are not tolerated (attempt\
    \ to add an element into a set when the element already exists will be ignored).\n\
    \n> **NOTE:**\n> A set can contain only *hashable* elements вАУ those elements that\
    \ have a hash code. Though hashing is outside the scope of this book, do note\
    \ that all immutable collections (like tuples) are hashable in Python whereas\
    \ mutable collections (like lists) are not. Thus, for example, a set can contain\
    \ a tuple, but can't contain a list!\n\n### 6.1 Creating Sets\n\nJust as how the\
    \ `list()` function is used to create a list, the `set()` function is used to\
    \ create a set:\n\n```\n>>> S=set([1,2,3,4,5])\n>>> S\n{1, 2, 3, 4, 5}\n>>> S=set(range(1,6))\n\
    >>> S\n{1, 2, 3, 4, 5}\n```\n\n> **NOTE:**\n> The `set` constructor receives a\
    \ sequence (like `list` and `tuple`) and extracts their elements to create a set.\
    \ Do not mistake the above example to mean construction of a set that contains\
    \ a list! Remember from the previous note that sets cannot contain lists as they\
    \ are mutable!\n\nJust as how `[]` is used to implicitly define lists, `{}` is\
    \ used to implicitly define sets:\n\n```\n>>> S={2,4,6,8}\n>>> S\n{8, 2, 4, 6}\n\
    ```\n\nAs can be seen from the example above, the order of the elements within\
    \ a set is not under our control as sets are unordered collections. Sets support\
    \ the mathematical set operations of finding the union, intersection and difference.\
    \ We will explore these operations soon."
