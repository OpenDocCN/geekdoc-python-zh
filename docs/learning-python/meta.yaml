    ## 2.3.2 The float type


    The `float` data type of Python allows us to store numbers that have a decimal
    part too.


    > **For C/C++/Java programmers:**

    >

    > The `float` data type of Python can be considered to be equivalent to the `double`
    data types of languages like C, C++ and Java, rather than their `float` data type.


    ### 2.3.2.1 Literals of Type float


    Any literal constant made up of only digits (with an optional leading sign) with
    either a decimal point (.) or an exponentiation (e/E) is considered as a `float`
    constant.


    **Examples:**


    ```

    >>> 123.5

    123.5

    >>> 123.0

    123.0

    >>> 12e2

    1200.0

    >>> 123.5e2

    12350.0

    >>> 123.45678e2

    12345.678

    ```


    Objects of type `float` can also be created using the explicit constructor of
    class float. This of course also resembles a function call for type conversion.
    Thus, the following two statements are identical in function:


    **Example:**


    ```

    x = 2.5

    x = float(2.5)

    ```


    This built-in function is also helpful for converting other types like `int` and
    `string` to the type `float`. Also, the default constructor of `float` class will
    create a float with value 0.0.


    ```

    >>> float(23)

    23.0

    >>> float("23")

    23.0

    >>> float()

    0.0

    ```


    ### 2.3.2.2 Operations on Type float


    The following table lists out the arithmetic operators that can be used with data
    items of type `float`:


    | Expression | Result | Meaning |

    | :--- | :--- | :--- |

    | 1.2 ** 0.1 | 1.0183993761470242 | 1.2 to the power 0.1 |

    | 2.5 * 3 | 7.5 | Multiplication |

    | 7.5 / 3 | 2.5 | Division |

    | 7.5 // 3 | 2.0 | Integer Division |

    | 4.5 % 1.2 | 0.9000000000000001 | Modulus/Remainder |

    | 2.1 + 3.3 | 5.4 | Addition |

    | 2.1 - 3.3 | -1.1999999999999997 | Subtraction |


    **Table 6: Arithmetic operations on float**


    You might have observed that some results are not mathematically correct вАУ there
    is a very small deviation, but obvious in these examples. Python provides the
    `Decimal` class (not covered in this book) that works better as we''d expect it
    to, but it comes with its own cost in terms of efficiency.


    The following mathematical functions are available on type `float`:


    | Expression | Result | Meaning |

    | :--- | :--- | :--- |

    | pow(1.2, 0.1) | 1.0183993761470242 | 1.2 to the power 0.1 |

    | divmod(7.5, 3) | (2.0, 1.5) | A tuple containing the quotient and remainder
    after division. Tuples will be covered in section 5 |

    | abs(-1.2) | 1.2 | Absolute value |

    | math.floor(2.3) | 2.0 | Rounds down (towards -вИЮ) to the nearest integral float
    |

    | math.ceil(2.3) | 3.0 | Rounds up (towards +вИЮ) to the nearest integral float
    |

    | round(2.3) | 2.0 | Rounds to the nearest integral float |

    | `math.trunc(2.3)` | 2 | Truncates the float (towards 0) and gives an integer
    |

    | `math.exp(2.3)` | 9.974182454814718 | Exponentiation (eЋ£) |

    | `math.log(9.974182454814718)` | 2.3 | Natural logarithm |

    | `math.log10(100)` | 2.0 | Common logarithm |

    | `math.sqrt(2.3)` | 1.51657508881031 | Square root |

    | `math.hypot(3,4)` | 5.0 | Hypotenuse |

    | `math.degrees(math.pi)` | 180.0 | Radians to Degrees |

    | `math.radians(180)` | 3.141592653589793 | Degrees to Radians |

