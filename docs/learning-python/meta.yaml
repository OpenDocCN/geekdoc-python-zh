    \n### 4.6 еИЧи°®еИЗзЙЗ\n\nеИЧи°®еИЗзЙЗжШѓдїОеИЧи°®дЄ≠жПРеПЦзЪДе≠РеИЧи°®вАФвАФеЃГжШѓзФ±зО∞жЬЙеИЧи°®зЪДдЄАйГ®еИЖзїДжИРзЪДеИЧи°®гАВеИЧи°®еИЗзЙЗдљњзФ®иѓ≠ж≥Х `list[start:end]`пЉМеЕґдЄ≠\
