  md: '# 6.7 Set Operations


    Mathematically, a variety of operations can be performed on sets:


    +   - The *union* of set A and set B is a set comprising of all elements found
    in either set A or set B. The union of {1,2} and {2,3} is {1,2,3}.

    - The *intersection* of set A and set B is a set comprising of all elements found
    in both set A and set B. The intersection of {1,2} and {2,3} is {2}.

    - The *difference* of set A and set B (set A вАУ set B) is a set comprising of all
    elements found in set A with all elements of set B removed from it. The difference
    of {1,2} and {2,3} is {1}.

    - The *symmetric difference* of set A and set B is a set comprising of all elements
    found in either set A or set B, but not in both. The symmetric difference of {1,2}
    and {2,3} is {1,3}.


    In addition:


    +   - Two sets are said to be *disjoint* if there are no elements in common within
    them. The sets {1,2} and {2,3} are not disjoint because of the common element
    2.

    - A set A is said to be a *subset* of set B if all elements of set A are present
    in set B. Similarly, in such a case, set B is said to be a superset of set A.
    Neither is {1,2} a subset of {2,3}, nor the other way around.


    # 6.7.1 Set Union


    The `set.union(s)` function returns a new set that represents the union of the
    set `set` and the set `s`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1.union(S2)

    {1, 2, 3}

    >>> S1

    {1,2}

    ```


    The `|` operator plays the same role as `set.union(s)`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1 | S2

    {1, 2, 3}

    >>> S1

    {1, 2}

    ```'
