    # 10.15 Documentation Strings


    *Documentation strings* are strings added at strategic locations within the program
    to provide documentation for a program element. Such documentation strings are
    recognised by the Python parser and can also be parsed by various external tools.


    As far as functions are concerned, a documentation string can provide documentation
    on what the function is all about. The documentation string is identified as a
    string that starts on the first line of a function definition. Since the documentation
    string usually spans multiple lines, it is a common practice to use triple-quotes
    for enclosing it.'
