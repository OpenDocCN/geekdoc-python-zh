- img_proc: true
  md: 'Here is a list of important capabilities of BeautifulSoup:


    +   1. Can parse HTML, XHTML and XML documents

    2. Permits extraction of details in a very simple manner

    3. Permits navigation between nodes in the parse tree

    4. Permits a powerful search mechanism to directly locate nodes the programmer
    is interested in

    5. Permits writing back into the parse tree (modification and creation of documents)

    6. Can convert the tree into a string and can even prettify it!


    # 17.3.1 Installing BeautifulSoup


    The simplest way of installing BeautifulSoup is by using PIP (section 15.7) as
    follows:


    ```

    pip3 install beautifulsoup4

    ```


    While BeautifulSoup uses `lxml` parser or `HTMLParser` as it''s default backend
    engine, it can be configured to work with other parsers as well, in which case
    those parsers also need to be installed if not already present.


    # 17.3.2 Reading HTML Content


    If the HTML content is small (as was demonstrated in earlier sections), we can
    store that HTML content to be parsed in a string and pass it as an argument to
    the constructor of BeautifulSoup as illustrated in the syntax below:


    ```

    BeautifulSoup(htmlString [,parser])

    ```


    The `parser` argument can be either "lxml" to select the lxml HTML parser or "html.parser"
    to select the `HTMLParser` covered in section 17.2 before. If omitted, it will
    automatically pick a parser from amongst the available parsers in the system.'
