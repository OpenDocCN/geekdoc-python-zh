    \ <==> x.name\n |  \n |  __getitem__(...)\n |      x.__getitem__(y) <==> x[y]\n\
    \ |  \n |  __gt__(...)\n |      x.__gt__(y) <==> x>y\n |  \n |  __hash__(...)\n\
    \ |      x.__hash__() <==> hash(x)\n |  \n |  __iter__(...)\n |      x.__iter__()\
    \ <==> iter(x)\n |  \n |  __le__(...)\n |      x.__le__(y) <==> x<=y\n |  \n |\
    \  __len__(...)\n |      x.__len__() <==> len(x)\n |  \n |  __lt__(...)\n |  \
    \    x.__lt__(y) <==> x<y\n |  \n |  __ne__(...)\n |      x.__ne__(y) <==> x!=y\n\
    \ |  \n |  __reduce__(...)\n |  \n |  __repr__(...)\n |      x.__repr__() <==>\
