  md: '```

    >>> class A:

    ...     def __del__(self):

    ...         print("Destructor called!")

    ...

    >>> a=A()

    >>> b=a

    >>> del a

    >>> del b

    Destructor called!

    ```


    **Observation:**


    +   1. We create an object of class `A` and store it''s reference in the variable
    `a`. The reference count of this object is 1 (only 1 variable вАУ `a` вАУ is referring
    to the object)

    2. This reference is copied from `a` to `b`, ending up with 2 references to the
    object. Therefore, the reference count of the object becomes 2.

    3. When we delete the variable `a`, we also decrement the reference count of the
    object referred to by `a` by 1. Therefore, the reference count of the object decrements
    to 1. Since it has not reached 0, the object continues to exist unaffected by
    the deletion of the variable `a`.

    4. When we delete the variable `b`, we also decrement the reference count of the
    object referred to by `b` by 1. The reference count now reaches 0. This is when
    the object will be destroyed, and just prior to that the destructor gets automatically
    called.


    Since our `Date` class does not really require a destructor, we will not attempt
    to demonstrate the addition of the same.


    # 12.6 Inheritance


    Inheritance is one of the most important concepts in OOP and has these advantages:


    +   1. It helps **compartmentalise** the code, thereby helping the programmer
    organise the code better.

    2. It allows **reusability** of code by allowing a new class to completely obtain
    the functionality of other existing classes and add more functionality of it''s
    own.

    3. It permits **extensibility** of code, wherein new code is added without having
    to modify existing code and classes.'
