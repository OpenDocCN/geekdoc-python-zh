    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'a' is not defined\n\
    ```\n\nThe solution is additional magic methods that work in the reverse order!\
    \ Thus, `i+o` can be implemented using `o.__radd__(i)`, where `__radd__` is the\
    \ \"reverse addition\" magic method, as illustrated below:\n\n```python\n>>> class\
    \ A:\n...     def __radd__(self, x): pass\n...\n>>> o=A()\n>>> i=5\n>>> i+o\n\
    >>>\n```\n\n**Observation:**\n\n1.  We observe that `i+o` works without errors\
    \ since it maps on to `o.__radd__(i)`.\n2.  The `__add__` and `__radd__` magic\
    \ methods are related, but neither relies on the other and it is not mandatory\
    \ to have both, though possible and in many cases recommended.\n3.  Our `__radd__()`\
    \ method did not do anything since this is a demonstration. For the same reason,\
    \ the method also did not return anything.\n\nThe table below lists the magic\
