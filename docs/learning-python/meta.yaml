  - '[PAGE 412]


    The solution is additional magic methods that work in the reverse order! Thus,
    `i+o` can be implemented using `o.__radd__(i)`, where `__radd__` is the вАЬreverse
    additionвАЭ magic method, as illustrated below:


    ```

    >>> class A:

    ...     def __radd__(self, x): pass

    ...

    >>> o=A()

    >>> i=5

    >>> i+o

    >>>

    ```


    **Observation:**


    +   1. We observe that `i+o` works without errors since it maps on to `o.__radd__(i)`.

    2. The `__add__` and `__radd__` magic methods are related, but neither relies
    on the other and it is not mandatory to have both, though possible and in many
    cases recommended.

    3. Our `__radd__()` method did not do anything since this is a demonstration.
    For the same reason, the method also did not return anything.


    The table below lists the magic functions to perform reverse arithmetic operations:


    | Reverse Arithmetic Operator | Magic Function |

    | :--- | :--- |

    | + | `__radd__` |

    | - | `__rsub__` |

    | * | `__rmul__` |

    | // | `__rfloordiv__` |

    | / | `__rtruediv__` |

    | % | `__rmod__` |

    | divmod() | `__rdivmod__` |

    | **, pow() | `__rpow__` |


    **Table 26: Magic Functions for Reverse Arithmetic Operators**'
