    \nеРМж†ЈзЪДеОЯзРЖдєЯзФ®дЇОеЬ®PythonдЄ≠еЃЮзО∞ињРзЃЧзђ¶йЗНиљљвАФвАФдЄАзІНињРзЃЧзђ¶жЙЃжЉФзЫЄеРМйАїиЊСиІТиЙ≤пЉМдљЖеЕґеЃЮзО∞еПЦеЖ≥дЇОињРзЃЧзђ¶жЙАжУНдљЬзЪДжУНдљЬжХ∞з±їеЮЛзЪДжЬЇеИґгАВ\n\nиЩљзДґжЬђиКВйЗНзВєдїЛзїНињРзЃЧзђ¶йЗНиљљпЉМдљЖжИСдїђй¶ЦеЕИдїОеѓєеѓєи±°жЙІи°МжЯРдЇЫеЯЇжЬђжУНдљЬжЧґи∞ГзФ®зЪДжЯРдЇЫж†ЗеЗЖеЗљжХ∞еЉАеІЛгАВеЬ®зРЖиІ£дЇЖињЩдЄАзВєдєЛеРОпЉМжИСдїђе∞ЖзїІзї≠дЄЇжИСдїђзЪДз±їжЈїеК†ињРзЃЧзђ¶жФѓжМБгАВ\n\
    \n### 12.8.1 е±ЮжАІе§ДзРЖ\n\nзђђ12.4.1иКВдїЛзїНдЇЖеЃЮдЊЛеПѓдї•жЛ•жЬЙиЗ™еЈ±зЪДе±ЮжАІињЩдЄАдЇЛеЃЮгАВжИСдїђдљњзФ®иѓ≠ж≥Х`object.attribute`жЭ•иЃњйЧЃињЩдЇЫе±ЮжАІгАВPythonдЄ≠жЬЙеПѓзФ®зЪДеЗљжХ∞жЭ•е§ДзРЖеЃЮдЊЛзЪДе±ЮжАІгАВ\n\
    \n#### 12.8.1.1 hasattr() еЗљжХ∞\n\n`hasattr()`еЗљжХ∞зФ®дЇОеИ§жЦ≠дЄАдЄ™зЙєеЃЪзЪДеЃЮдЊЛжШѓеР¶еЕЈжЬЙзЙєеЃЪзЪДе±ЮжАІгАВ\n\n**иѓ≠ж≥ХпЉЪ**\n\
    \n```\nhasattr(object, attribute)\n```\n\nињЩжШѓдЄАдЄ™еЄГе∞ФеЗљжХ∞пЉМдїЕељУзїЩеЃЪзЪДеЃЮдЊЛеМЕеРЂзїЩеЃЪзЪДе±ЮжАІжЧґжЙНињФеЫЮtrueпЉМе¶ВдЄЛжЦєдї£з†БзЙЗжЃµжЙАз§ЇпЉЪ\n\
    \n```python\n>>> class A:\n...     def __init__(self):\n...             self.x=0\n\
    ...\n>>> a=A()\n>>> hasattr(a, 'x')\nTrue\n>>> hasattr(a, 'y')\nFalse\n```\n\n\
    **иІВеѓЯпЉЪ**\n\n1. жИСдїђеЃЪдєЙдЇЖдЄАдЄ™з±їAпЉМеЃГеМЕеРЂдЄАдЄ™жЮДйА†еЗљжХ∞пЉМиѓ•жЮДйА†еЗљжХ∞е∞Же±ЮжАІxеИЭеІЛеМЦдЄЇ0пЉИдїОиАМеИЫеїЇдЇЖеЃГпЉЙгАВзФ±дЇОжѓПжђ°еИЫеїЇеЃЮдЊЛжЧґйГљдЉЪи∞ГзФ®жЮДйА†еЗљжХ∞пЉМеЫ†ж≠§еПѓдї•дњЭиѓБAзЪДжЙАжЬЙеЃЮдЊЛйГље∞ЖеЕЈжЬЙе±ЮжАІxгАВ\n\
    2. еЫ†ж≠§пЉМ`hasattr(a, 'x')`ињФеЫЮTrueпЉМиАМ`hasattr(a, 'y')`ињФеЫЮFalseпЉМеЫ†дЄЇеЬ®еЃЮдЊЛaдЄ≠ж≤°жЬЙеИЫеїЇе±ЮжАІyгАВ\n\n####\
    \ 12.8.1.2 getattr() еЗљжХ∞\n\n`getattr()`еЗљжХ∞ињФеЫЮеЃЮдЊЛдЄ≠жЯРдЄ™е±ЮжАІзЪДеАЉпЉИе¶ВжЮЬиѓ•е±ЮжАІе≠ШеЬ®пЉЙпЉМе¶ВжЮЬе±ЮжАІдЄНе≠ШеЬ®пЉМеИЩињФеЫЮдЄАдЄ™йїШиЃ§еАЉпЉИе¶ВжЮЬжПРдЊЫдЇЖзЪДиѓЭпЉЙгАВ\n\
    \n**иѓ≠ж≥ХпЉЪ**\n\n```\ngetattr(object, attribute[, default])\n```\n\n**ж≥®жДПпЉЪ**\n\n1.\
    \ е¶ВжЮЬе±ЮжАІ`attribute`е≠ШеЬ®дЇОеЃЮдЊЛ`object`дЄ≠пЉМеИЩињФеЫЮеЕґеАЉгАВ\n2. е¶ВжЮЬе±ЮжАІ`attribute`дЄНе≠ШеЬ®дЇОеЃЮдЊЛ`object`дЄ≠пЉМеИЩињФеЫЮ`default`гАВ\n\
    3. е¶ВжЮЬе±ЮжАІ`attribute`дЄНе≠ШеЬ®дЇОеЃЮдЊЛ`object`дЄ≠пЉМеєґдЄФж≤°жЬЙжПРдЊЫ`default`пЉМеИЩдЉЪеПСзФЯ`AttributeError`гАВ\n\n**з§ЇдЊЛпЉЪ**\n\
    \n```python\n>>> class A:\n...     def __init__(self):\n...             self.x=0\n\
