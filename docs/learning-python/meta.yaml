    # 16.6.2 Accessing Columns by Indices


    Just like tuples, individual elements of a Row object can be accessed via the
    subscript operator:


    ```

    (continuation of previous session)

    >>> row[0]

    ''Ram''

    >>> row[1]

    1

    >>> row[2]

    ''ram@companycom''

    ```


    # 16.6.3 Accessing Columns by Name


    What makes the Row object more powerful than tuples is that it is possible to
    also treat a Row object like a dictionary, with the keys being the column names
    and the values being the corresponding value taken from the result:


    ```

    (continuation of previous session)

    >>> row[''name'']

    ''Ram''

    >>> row[''id'']

    1

    >>> row[''email'']

    ''ram@companycom''

    ```


