    \ in Python.\n5. Write a short note on magic methods.\n6. Write a short note on\
    \ attribute handling in Python.\n7. Write a short note on overloading arithmetic\
    \ operators on Python.\n8. Write a short note on base conversion of objects in\
    \ Python.\n9. Explain inheritance with an example in Python.\n10. Explain dynamic\
    \ polymorphism with an example in Python.\n11. How can empty classes be useful\
    \ in Python? Explain with examples.\n\n## 12.12 Exercises\n\n1. Write a script\
    \ in Python to implement the Queue data structure using OOP.\n2. Write a script\
    \ in Python to implement 3 different shapes as individual classes and calculate\
    \ their area using dynamic polymorphism.\n3. Write a script in Python to demonstrate\
    \ the overloading of the `or` operator.\n4. Write a class called `Time` that helps\
    \ represent the time of day in 24-hour format. Add these functionalities:\n  \
    \  1. Creation of a `Time` object, given the hour, minute, second and millisecond.\n\
    \    2. Extraction of the different pieces of the `Time` object.\n    3. Addition\
    \ of the specified absolute number of milliseconds to a `Time` object.\n    4.\
    \ Comparison of two `Time` objects to find if they are identical.\n    5. Comparison\
    \ of two `Time` objects to find which comes earlier.\n\n## SUMMARY\n\n> A Class\
    \ is a design according to which objects can later be instantiated. An Object\
    \ is an instance of a class.\n> Data Encapsulation is the encapsulation of data\
    \ and the code that acts on the data into a single unit. Data Hiding is the hiding\
    \ of data from the external world with the intention of protecting the object\
    \ against accidental changes, thereby maintaining the integrity of the object.\
    \ Data Abstraction is the hiding of the implementation details and revealing of\
    \ only an interface.\n> Polymorphism refers to the existence of multiple forms\
    \ of the same entity. Inheritance is the mechanism where one class derives all\
    \ features of another existing class.\n> Classes can be defined using the class\
    \ keyword. Objects can be created using the syntax ClassName().\n> Instance variables\
    \ can be created explicitly using an object, or by an instance method, and most\
    \ often by the constructor.\n> Class variables are defined directly within the\
    \ class and can be accessed by all instances of the class or by explicitly using\
    \ the class name to gain access it.\n> Instance methods are methods that automatically\
    \ work on the invoking object. Such methods will automatically receive a reference\
    \ to the invoking method as the first parameter. This parameter is usually called\
    \ self by programmers.\n> Class Functions are functions defined within the class\
    \ that are not dependent on the invoking object.\n\n## SUMMARY\n\n> All members\
    \ within a class are assumed to be public by default. Those identifiers that start\
    \ with a single underscore are assumed to be protected and those that start with\
    \ 2 underscores and do not end with 2 or more underscores are assumed to be private.\
    \ Python currently does not have implementation support for protected members.\n\
    > Constructors are identified by the special name `__init__()` while destructors\
    \ are identified by the special name `__del__()`.\n> Python supports multiple\
    \ inheritance too!\n> All functions undergo late binding. Therefore, no special\
    \ step is required to achieve dynamic polymorphism.\n> The method `super()` can\
    \ be used to reference the immediate/first base class instance.\n> Constructors\
    \ and Destructors of the base class are not automatically invoked during inheritance\
    \ - it is the responsibility of the programmer.\n> Magic functions are automatically\
    \ invoked in certain situations and help implement a variety of functionality,\
    \ including operator overloading. Such functions always start and end with 2 underscores!\n\
    \n![](img/7831d9fe9e47e5b1109ec75197998a41_435_0.png)\n\n![](img/7831d9fe9e47e5b1109ec75197998a41_436_0.png)\n\
    \n# 13 EXCEPTION HANDLING\n\nIn this chapter you will be able to:\n\n- [x] Appreciate\
    \ the Object Oriented Exception Handling mechanism used by Python\n- [x] Understand\
    \ the exception handling block and process exceptions that occur.\n- [x] Understand\
    \ the flow of control when exceptions do and don't occur.\n- [x] Create custom\
    \ exception classes and create and handle custom exceptions.\n\n## 13.1 Errors\
    \ vs. Exceptions\n\nEvery programmer would have definitely written programs that\
    \ didn't work as expected. Sometimes, we programmers violate the syntactic rules\
    \ of the language resulting in syntax errors and at other times our programs don't\
    \ work correctly due to various runtime anomalies. While syntax errors are definitely\
    \ the programmer's fault, various runtime anomalies can be caused due to reasons\
    \ beyond the instructions in the program. For example, the program may run out\
    \ of memory, or is unable to open a file, or unable to connect to a server, or\
    \ the user has given invalid input. In these situations, it would be wrong to\
    \ blame the programmer for the issue, though a good programmer always anticipates\
    \ these issues and handles them gracefully in the program. Object Oriented programming\
    \ languages like Python provide a very well-defined mechanism for dealing with\
    \ these issues.\n\nDo note however that some of Python's exception classes have\
    \ names that indicate Error, but are technically exceptions! For instance, `ZeroDivisionError`\
    \ is the name of an exception that is generated when we perform integer division\
    \ by 0. On the other hand, `SyntaxError`, which is an error, is derived from `Exception`\
    \ class and is treated as an exception. Some things are certainly strange in Python!\n\
    \n## 13.2 Handling Exceptions\n\nAs mentioned in the previous section, a good\
    \ programmer anticipates situations where the program will not be able to perform\
    \ as expected. Such blocks of code need to be *monitored* for exceptions. A good\
    \ programmer handles these exceptions gracefully and thus has to *respond* to\
    \ exceptions as they arise. This is done in a response block. Thus, the code will\
    \ have the following structure:\n\n![](img/7831d9fe9e47e5b1109ec75197998a41_437_0.png)"
