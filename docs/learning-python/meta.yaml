    # 20.2.5 Bit Shifting


    # 20.2.5.1 Left Bit Shift


    The value of the expression `x << y` is determined by left-shifting all the bits
    of `x` `y` times as shown in the diagram:


    Each time all bits are shifted left, the leftmost bit is dropped off and a 0 is
    inserted from the right.


    ![](img/7831d9fe9e47e5b1109ec75197998a41_640_0.png)


    > **NOTE:**

    The variable `x` is not affected by this operation unless the expression is `x
    <<= y`!


    **Example:**


    ```

    >>> x=10

    >>> bin(x)

    ''0b1010''

    >>> x<<2

    40

    >>> bin(40)

    ''0b101000''

    ```


    **Observation:**


    +   1. The binary pattern of the integer value `10` is `1010`.

    2. When this pattern is shifted left `2` times, with 0 being inserted from the
    right end, the pattern becomes `101000`


    # 20.2.5.2 Right Bit Shift


    The value of `x >> y` is determined by right-shifting all the bits of `x` `y`
    times. However, the actual procedure depends on whether the number is positive
    or negative! The diagram shows both possibilities:


    For positive integers, each time all bits are shifted right, the rightmost bit
    is dropped off and a 0 is inserted from the left.


    ![](img/7831d9fe9e47e5b1109ec75197998a41_640_1.png)'
  - '[PAGE 641]


    For negative integers, each time all bits are shifted right, the rightmost bit
    is dropped off and the leftmost bit is re-inserted as shown in the diagram.


    > **NOTE:**

    The variable `x` is not affected by this operation unless the expression is `x
    >>= y`!


    **Example:**


    ```

    >>> x=10

    >>> bin(x)

    ''0b1010''

    >>> x>>2

    2

    >>> bin(2)

    ''0b10''

    ```


    **Observation:**


    +   1. The binary pattern of the integer value `10` is `1010`.

    2. When this pattern is shifted right `2` times, with `0` being inserted from
    the left, the pattern becomes `10`.


    # 20.3 Dealing with Bytes


    Recollect from section 8 that strings in Python are immutable sequences of Unicode
    characters. If we are dealing with ASCII characters instead, we could probably
    same memory and time by having a similar immutable sequence of ASCII characters
    instead вАУ and that''s what the `bytes` class offers!


    # 20.3.1 Literals of Type bytes


    Just as how quotes are used to specify string literals, bytes literals can be
    specified in the same way but with a prefix of ''b'' as shown in the examples
    below:


    ```

    >>> b''Hello''

    b''Hello''

    >>> b"Hello"

    b''Hello''

    >>> b''''''Hello''''''

    b''Hello''

    >>> b"""Hello"""

    b''Hello''

    ```'
  - '[PAGE 642]


    Objects of type `bytes` can also be created using the `bytes()` constructor. The
    default constructor creates a `bytes` object representing a single null character
    (ASCII 0) as a byte:


    ```

    >>> bytes()

    b''''

    ```


    An integer argument can be provided to specify the length of the `bytes` sequence:


    ```

    >>> bytes(5)

    b''\x00\x00\x00\x00\x00''

    ```


    More commonly, a string can be passed as the first argument to construct the equivalent
    `bytes` sequence, with a second argument specifying the encoding, as shown in
    the example below:


    ```

    >>> bytes("Hello", "utf-8")

    b''Hello''

    ```


    Considering that each byte can be specified using 2 hexadecimal digits, it is
    also possible to build a `bytes` object using the `fromhex` class function, passing
    a hexadecimal string sequence with 2 hex digits per byte and optional spaces between
    bytes for readability:


    ```

    >>> bytes.fromhex("10 a96d")

    b''\x10\xa9m''

    ```


    **Observation:**


    +   1. Being a class function, we use the class name (`bytes`) to invoke it.

    2. We have specified hex values for 3 bytes вАУ 10, a9 and 6d. These are represented
    as \x10, \xa9 and m respectively. (6d is the hex ASCII code of the character m!)


