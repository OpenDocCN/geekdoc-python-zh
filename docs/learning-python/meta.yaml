    # 2.7.1.5 Separating Items and Terminating Items


    We can combine the separator string and terminator string as shown in the examples
    below:


    ```

    >>> print("Welcome","to","Python",sep="...",end="\n---=====---\n")

    Welcome...to...Python

    ---=====---

    >>> print("Welcome","to","Python",end="\n---=====---\n",sep="...")

    Welcome...to...Python

    ---=====---

    ```


    Observation:


    +   1. The order in which the keyword arguments `sep` and `end` are given do not
    matter

    2. Keyword arguments must be at the end of the argument list. They cannot precede
    any non-keyword argument.


    # 2.7.1.6 Printing Blank Lines


    As a special case, when no argument is passed to the `print()` function, it ends
    up printing only the terminator string, which is newline by default, and thus
    ends up printing a blank line:


    ```

    >>> print()

    >>>

    ```


    # 2.7.2 Formatting Strings Using the format() Function


    While we were able to print using the `print()` function, we were unable to format
    the output in any way (apart from adding separator and terminator strings). For
    more advanced formatting, we can rely on the `format()` function of string class,
    which can format a string and give us a resultant string that can then be printed.


    The `format()` function searches the string for placeholders. These placeholders
    are indicated by braces({}) and indicate that some value needs to be substituted
    there (and probably formatted too). As a special case, if the string has no placeholders
    in it, the `format()` function does nothing with the string and returns it as
    it is, as shown in the example below:


    ```

    >>> ''Hello world''.format()

    ''Hello world''

    ```'
  - '[PAGE 57]


    # 2. Python Basics


    > **NOTE:**

    The `format()` function of string class does not print! It returns the formatted
    string, which can then be printed using `print()` if required.


    # 2.7.2.1 Substituting Arguments


    Let''s now make use of the placeholders for substituting values. The `format()`
    function can receive multiple arguments which are implicitly numbered from 0.
    These argument values can be accessed and substituted in the string wherever placeholders
    are present. The placeholder can specify which argument is to be substituted by
    identifying the argument number as shown in the example below:


    ```

    >>> ''{0} {1}''.format(''Hello'', ''world'')

    ''Hello world''

    ```


    In the above example, argument #0 is `Hello` and is substituted within the string
    wherever `{0}` is present, and similarly argument #1 (`world`) is substituted
    wherever `{1}` is present in the string.


    # 2.7.2.2 Substituting Arguments Out of Order


    Since the argument number is present in the placeholder, we can even print argument
    values out of sequence as shown in the example below:


    ```

    >>> ''{1} {0}''.format(''Hello'', ''world'')

    ''world Hello''

    ```


    # 2.7.2.3 Substituting Arguments Multiple Times


    Now that we''ve got a hang of how placeholders work, nothing prevents us from
    referring to the same argument multiple times within the format string:


    ```

    >>> ''{0} {1}, {0} reader. Python is my {1}''.format(''Hello'', ''world'')

    ''Hello world, Hello reader. Python is my world''

    ```


    # 2.7.2.4 Substituting Arguments in Order


    As a shortcut, if all placeholders reference the arguments in order, the placeholders
    need not identify the argument at all as shown in the below example:


    ```

    >>> ''{} {}''.format(''Hello'', ''world'')

    ''Hello world''

    ```'
  - '[PAGE 58]


    # 2.7.2.5 Substituting Arguments by Name


    If you find argument numbering cumbersome, you can even name the arguments using
    the concept of *keyword arguments* and *named placeholders* as shown in the examples
    below:


    ```

    >>> ''{p} is {a}, {p} is {b}! {p} is {c}!''.format\n... (p=''Python'',a=''easy'',b=''fun'',c=''brilliant'')

    ''Python is easy, Python is fun! Python is brilliant!''

    >>> ''Hello {name}, welcome to {language}!''.format\n... (name=''Ram'',language=''Python'')

    ''Hello Ram, welcome to Python!''

    ```


    # 2.7.2.6 Basic Formatting of Arguments


    We have only visited the tip of the `format()` iceberg so far! Each placeholder
    supports additional formatting information that can control how something is to
    be printed. A more detailed coverage of this is provided in section 8.7, but for
    now let us learn just a few steps.


    To specify formatting for a placeholder, a '':'' is used after the argument specifier.
    After the '':'', the formatting information follows. Perhaps the simplest formatting
    is selecting the output base (b for binary, o for octal, d for decimal and x for
    hexadecimal). Check out this example:


    ```

    >>> ''bin={0:b} oct={0:o} dec={0:d} hex={0:x}''.format(10)

    ''bin=1010 oct=12 dec=10 hex=a''

    ```


    Considering that we now know the various ways of specifying the argument and also
    some simple formatting, let us see various combinations that we can use:


    | Combination | Meaning |

    |---|---|

    | {0} | Display argument #0 |

    | {age} | Display argument named `age` |

    | {} | Display next argument |

    | {0:d} | Display argument #0 in decimal |

    | {age:d} | Display argument named `age` in decimal |

    | {:d} | Display next argument in decimal |


    *Table 13: Examples of types of formatting*'
  - '[PAGE 59]


    # 2.7.3 Taking Input Using the input() Function


    We know how to print output. Let us now learn how to receive input from the user.
    This knowledge will help us write interactive Python scripts that ask the user
    to provide input for the script.


    # 2.7.3.1 Taking an input


    To receive any input from the user, the `input()` function can be used. This function,
    in it''s simplest form, waits for the user to enter a line of text and returns
    the input entered after chopping off the trailing newline character.


    **Example:**


    ```

    >>> name=input()

    Ram

    >>> language=input()

    Python

    >>> print(''{} is learning {}''.format(name,language))

    Ram is learning Python

    ```


    # 2.7.3.2 Taking an input After Prompting


    As is evident from the output above, when the `input()` function is executed,
    it merely waits for the user to enter a line of input. The user might have no
    clue that the script is waiting for input. It is therefore a good idea to print
    some message informing the user that some input is required. This message can
    be printed using a `print()` call before invoking `input()`. There is an easier
    method though! The `input()` function, helpful as it is, permits us to pass a
    prompt string to be displayed just prior to accepting input from the user. In
    the previous example, no prompt string was given and hence nothing was displayed.
    But if a prompt string is given, it will be displayed and then the user is given
    a chance to enter input.


    **Example:**


    ```

    >>> name=input("Enter your name:")

    Enter your name:Ram

    >>> language=input("Enter language:")

    Enter language:Python

    >>> print(''{} is learning {}''.format(name,language))

    Ram is learning Python

    ```'
- md: "## 2.8 Getting Help\n\nDuring the learning process, it is natural to get stuck\
    \ and the need arises to get timely help to overcome the temporary block in progress.\
    \ There are a couple of ways to get help.\n\n### 2.8.1 Getting Help in the Book\n\
    \nAs far as this book is concerned, it has been carefully crafted to show you\
    \ just enough steps at a time for you to understand, experiment and build confidence.\
    \ But there are numerous tables and appendices that provide a standard reference.\
    \ These might help.\n\n### 2.8.2 Getting Help in Python\n\nWhile working on the\
    \ Python interpreter, you can get help on any function, class, keyword or module\
    \ by typing `help(topic)`. You can scroll through the help document (just like\
    \ how you would use the `less` command in Linux) and finally type in 'q' to quit\
    \ help.\n\n### 2.8.3 Getting Help Online\n\nIf you are looking for online help,\
    \ there are a couple of websites that can help:\n\n- The official Python tutorial\
    \ can be found at https://docs.python.org/3/tutorial/index.html.\n- The standard\
    \ library of Python is discussed at https://docs.python.org/3/library/index.html.\n\
    - Frequently Asked Questions are available at https://docs.python.org/3/faq/.\n\
    - The complete Python language reference is available at https://docs.python.org/3/reference/index.html.\n\
    \n### 2.8.4 Getting Help From People\n\nIf you want to interact with people to\
    \ get help, here are some more \"official\" resources, but be sure to read \"\
    The Guide to Python Mailing Lists\" (available at https://www.python.org/community/lists/#comp-lang-python)\
    \ before proceeding with any of these options below:\n\n- Post to the Python newsgroup\
    \ (news:comp.lang.python)\n- Post to the Python Tutor Mailing List (http://mail.python.org/mailman/listinfo/tutor)\n\
    - Send a mail to help@python.org\n\n### 2.8.5 Other Ways of Getting Help\n\nLastly,\
    \ do not forget Google (https://www.google.com) and Stack Overflow (https://www.stackoverflow.com),\
    \ the most precious resources for programmers when they get stuck!\n\n## 2.9 Questions\n\
    \n1. Define a 'statement' in Python.\n2. Which ASCII character signifies the end\
    \ of a statement in Python?\n3. Which ASCII character is used to separate statements\
    \ in a single line in Python?\n4. How does triple quotes(\"\"\"\") help to form\
    \ a comment in Python?\n5. List the basic data types of Python.\n6. How do we\
    \ know the data type of a data item referred to by a variable in Python?\n7. Which\
    \ operator is used for integer division in Python?\n8. Which expression in Python\
    \ is equivalent to a mathematical function `pow()`?\n9. When does Python consider\
    \ a given literal as a 'float' type?\n10. How can a null string be represented\
    \ in Python?\n11. List any 3 operations that can be performed on the type 'str'\
    \ in Python.\n12. List any 2 operations that can be performed on the type 'bool'\
    \ in Python.\n13. List the rules for naming identifiers in Python.\n14. Write\
    \ a short note on variables and references in Python.\n15. Write a short note\
    \ on the `complex` type of Python.\n16. How is the `help()` function of the Python\
    \ interpreter different from the `--help` option?\n17. Write a short note on formatting\
    \ strings in Python.\n\n## 2.10 Exercises\n\n1. Write a program to find if a given\
    \ number is a perfect square or not.\n2. Write Python statements to calculate\
    \ and print the simple interest using variables `p`, `t` and `r` for principal,\
    \ rate of interest and time duration respectively.\n3. Write Python statements\
    \ to create 2 `complex` objects and print their sum, difference and product.\n\
    4. Write Python statements to convert a `complex` object from polar to rectangular\
    \ coordinates and vice-versa.\n5. Write Python statements to accept a string from\
    \ the user and print it in title-case.\n\n## SUMMARY\n\n- Generally, Python concludes\
    \ that 1 statement spans 1 line. A single statement can span multiple lines using\
    \ backslashes at the end of each line that continues. Multiple statements can\
    \ be present in the same line if separated by semicolons.\n- Python does not differentiate\
    \ between single quotes, double quotes, triple single-quotes and triple double-quotes!\n\
    - The basic data types of Python are int, float, complex, str and bool.\n- Variables\
    \ hold references to objects. Multiple variables can hold references to the same\
    \ object too!\n- The print() function prints a list of items whereas the input()\
    \ function prints an optional prompt message and reads in a single line of input.\n\
    - Output formatting can be done using the format() method of string (str) class.\
    \ This method returns the formatted string, which can be printed using the print()\
    \ function.\n\n## 3 Python Control Structures\n\nIn this chapter you will be able\
    \ to:\n\n- [x] Write Python scripts to solve problems and manage the flow of control\
    \ through it.\n- [x] Frame decision constructs to conditionally execute statements.\n\
    - [x] Frame loop constructs to repeat instructions as many times as required.\n\
    - [x] Learn how to terminate control from a loop, a function, a block and a script.\n\
    \n## 3.1 Getting Started with Programs\n\nWe did get started with writing Python\
    \ scripts that print \"Hello world\" and also learnt about various numeric data\
    \ types that Python supports. Let us put all this into practice now!\n\nA program\
    \ is a **sequence** of statements that are executed in a sequential fashion in\
    \ order to take in some input, process it as required and produce desired output.\
    \ Sometimes, we would need to alter the flow of control through the program. We\
    \ have **decision** constructs that help evaluate a condition and decide the path\
    \ through which control should flow in the program. Sometimes we might need to\
    \ repeat a set of statements multiple times, and **loops** can help implement\
    \ this flow of control. We will see all these kinds of constructs that are available\
    \ in Python.\n\nThis section ends with a description of how we can remove control\
    \ away from a control structure.\n\nLet us start with a program that asks the\
    \ user to enter his/her name and age and prints it back in the form of a greeting.\n\
    \n```\nname_age.py\n\n1.  #!/usr/bin/python3\n2.  \n3.  # Program that asks for\
    \ the user's name and age\n4.  # and prints it back as a greeting!\n5.  \n6. \
    \ name = input(\"Enter your name: \")\n7.  age = int(input(\"Enter your age: \"\
    ))\n8.  \n9.  print(\"Hi {}, you are {:d} years old!\".format(name,age))\n```\n\
    \nOutput:\n\n```\nEnter your name: Ram\nEnter your age: 25\nHi Ram, you are 25\
    \ years old!\n```\n\nObservation:\n\n1. The first line of the script is `#!/usr/bin/python`.\
    \ Recall from section 1.6 that this helps in executing the script implicitly.\
    \ Regardless of whether we intend to execute the script implicitly or pass it\
    \ to the interpreter explicitly, we will follow this style from now on.\n2. In\
    \ line 9, the `:d` format is being applied on age to print it in decimal (though\
    \ that is the default for an `int` anyway and would have printed the same as a\
    \ string too). This format requires age to be an `int` rather than a string that\
    \ `input()` returns. Therefore, this conversion is performed in line 7.\n3. The\
    \ `input()` function always returns a string. If we were expecting a different\
    \ type (like an `int`), it is a good idea to perform a conversion immediately\
    \ after obtaining the result from `input()` (as shown in line 7).\n\nLet us now\
    \ write a program that performs some basic operations on integers like:\n\n- Finding\
    \ it's previous and next integer\n- Finding it's square and cube\n- Finding it's\
    \ square root and factorial\n\n```\nint_demo.py\n\n1.  #!/usr/bin/python3\n2.\
    \  \n3.  # Program that performs basic operations on int\n4.  \n5.  import math\n\
    6.  \n7.  x = int(input(\"Enter an integer: \"))\n8.  \n9.  print(\"x={}\".format(x));\n\
    10. print(\"x lies between {} and {}\".format(x-1,x+1))\n11. print(\"square(x)={}\
    \ cube(x)={}\".format(x**2,pow(x,3)))\n12. print(\"sqrt(x)={}\".format(math.sqrt(x)))\n\
    13. print(\"factorial(x)={}\".format(math.factorial(x)))\n```\n\nOutput:\n\n```\n\
    Enter an integer: 5\nx=5\nx lies between 4 and 6\nsquare(x)=25 cube(x)=125\nsqrt(x)=2.23606797749979\n\
    factorial(x)=120\n```"
