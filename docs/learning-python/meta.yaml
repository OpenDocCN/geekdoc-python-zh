    # ## 16.1 Introduction


    This chapter is not intended as a complete material on databases and SQL programming.
    That would perhaps require a complete book of it''s own! We will nevertheless
    explore some basic concepts rapidly that will allow us to focus on how we can
    deal with SQLite databases in Python in the main part of this chapter.


    # ### 16.1.1 Introduction to Databases


    Whenever we find the need to deal with huge amounts of data, we find a need for
    organising them in a logical fashion that makes it manageable to store and access
    that data. A **database** is precisely that: an organised collection of data.
    In more complicated systems, a **Database Management System (DBMS)** takes care
    of interfacing with and managing the database.


    A **Relational DBMS (RDBMS)** is a type of database system that is based on the
    concept of relations that help link data stored across different tables. These
    are by far the most popular form of databases, though of late NewSQL is gaining
    prominence.


    Since Object Oriented Programming became very popular, databases also evolved
    to natively support objects вАУ such a database system is called an **Object Database**
    (if objects can be stored and retrieved directly) or an **Object Relational Database**
    (if the underlying storage is relational but the view provided is object-oriented).


    As mentioned earlier, what is gaining prominence is NewSQL and NoSQL. **NoSQL**
    deals with key-value pairs as opposed to the standard table structure used in
    RDBMS. **NewSQL** emphasises on the use of SQL to deal with NoSQL databases, keeping
    scalability and compatibility in mind.


    The most common language used for programming and interacting with databases is
    **SQL вАУ Structured Query Language**. SQL comprises of a set of standard statements
    having a pre-defined format. The language is English-like and case insensitive.
    SQL statements are broadly classified into:


    +   1. **Data Definition Language (DDL)** that comprises of statements that deal
    with tables вАУ their structures, creation, destruction, etc. Example: the `CREATE
    TABLE` statement.

    2. **Data Control Language (DCL)** that comprises of statements that deal with
    access rights and permissions. Example: the `GRANT` statement.

    3. **Data Manipulation Language (DML)** that comprises of statements that deal
    with changes to data. Example: the `INSERT` statement.

    4. **Data Query Language (DQL)** that comprises of the `SELECT` statement in all
    it''s forms and basically deals with the extraction of data.'
