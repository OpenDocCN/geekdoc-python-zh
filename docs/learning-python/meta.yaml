    # 8.7 Formatting Strings


    We have already seen the `format()` function in section 2.7.2. We will examine
    that function in detail in this section.


    We know the following about the `format()` function:


    +   1. It allows us to substitute values inside a string

    2. It allows us to substitute values in order if we use braces without identifying
    the argument

    3. It allows us to substitute values in any order if we identify the element by
    it''s argument number in the placeholder

    4. It allows us to substitute the same value multiple times if we use the same
    argument number in multiple placeholders

    5. It allows us to identify the argument by it''s name as well as by it''s position


    In this section, we will explore more properties and possibilities.


    Each placeholder can specify 2 things:


    +   1. The argument to be used

    2. The formatting that needs to be applied on the value of that argument


    These 2 parts are separated by a colon (:) and thus have these syntax:


    ```

    {argumentNumber:argumentFormat}

    {argumentName:argumentFormat}

    ```


    Both the parts are optional. If `argumentNumber` and `argumentName` are not given,
    it will extract an argument in order. If the `argumentFormat` is not given, it
    will not apply any special formatting вАУ it will display the value as it is using
    as many columns as necessary to display that value. If `argumentFormat` is omitted,
    the separating colon is not required.


    The complete syntax of the `argumentFormat` is shown below:


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```'
  - '[PAGE 214]


    Different parts of this syntax will be dealt with in detail in different sections
    as documented in the below table:


    | Part | Meaning | Section |

    | :--- | :--- | :--- |

    | `fill` | Fill character to be used for padding | 8.7.4 |

    | `align` | Alignment of the contents within the field | 8.7.3 |

    | `sign` | Sign to be displayed for numeric entities | 8.7.6.2 |

    | `#` | Display Base Prefix | 8.7.6.4 |

    | `0` | Zero Padding | 8.7.6.1 |

    | `width` | Width of the Field | 8.7.2 |

    | `grouping` | Digit Grouping | 8.7.6.3 |

    | `.precision` | Precision of the Field | 8.7.5 |

    | `type` | Type of the Field | 8.7.1 |


    Let us start with the format type that documents the type of the field.


    # 8.7.1 Format Types


    The format type specifies how the field contents have to be represented. The possibilities
    depend on whether the field content is a string, an integer or a real number.


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    # 8.7.1.1 Format Types for Integers


    Integers can be displayed in a variety of bases as shown in the table below:'
  - '[PAGE 215]


    # 8. Strings


    | Type | Meaning |

    |---|---|

    | b | Binary Format |

    | d | Decimal Format |

    | o | Octal Format |

    | x | Hexadecimal Format using Lowercase Alphabets |

    | X | Hexadecimal Format using Uppercase Alphabets |


    Table 15: Format Types for Integers


    In addition to bases, the following format types are also applicable:


    | Type | Meaning |

    |---|---|

    | n | Number formatted using current locale |

    | c | Character corresponding to the Unicode |


    Table 16: Additional Format Types for Integers


    > NOTE:

    If no format is selected for an integer, it will be displayed in decimal (the
    d format)


    Examples:


    ```

    >>> ''{}''.format(15) # Default format for integer

    ''15''

    >>> ''{:d}''.format(15) # Decimal format for integer

    ''15''

    >>> ''{:b}''.format(15) # Binary format for integer

    ''1111''

    >>> ''{:x}''.format(15) # Hexadecimal (Lowercase) format for integer

    ''f''

    >>> ''{:X}''.format(15) # Hexadecimal (Uppercase) format for integer

    ''F''

    >>> ''{:n}''.format(15000) # Numeric (Locale-Specific) format for integer

    ''15000''

    >>> ''{:c}''.format(65) # Character Format (A=ASCII 65)

    ''A''

    ```'
  - '[PAGE 216]


    # 8.7.1.2 Format Types for Real Numbers


    Real numbers can be displayed in fixed-point format, exponentiation format, general
    format, numeric format or as a percentage as shown in the table below:


    | Type | Meaning |

    |---|---|

    | f | Fixed-Point Format |

    | F | Fixed-Point Format using uppercase for inf and nan |

    | e | Exponentiation Format |

    | E | Exponentiation Format using E instead of e to denote exponentiation |

    | g | General Format (May use fixed-point or exponentiation depending on which
    is more appropriate) |

    | G | General Format using E instead of e to denote exponentiation (if exponentiation
    is used) |

    | n | Numeric Format (uses current locale for formatting) |

    | % | Percentage Format |


    Table 17: Format Types for Real Numbers


    > NOTE:

    If no format is selected for a real number, it will be displayed in general format
    (the g format), but guarantees at least 1 digit after the decimal point unlike
    the g format.


    # Examples:


    ```

    >>> ''{:f}''.format(12.165) # Fixed Point Format

    ''12.165000''

    >>> ''{:e}''.format(12.165) # Exponentiation Format

    ''1.216500e+01''

    >>> ''{:E}''.format(12.165) # Exponentiation Format

    ''1.216500E+01''

    >>> ''{:g}''.format(12.165) # General Format

    ''12.165''

    >>> ''{:n}''.format(12.165) # Numeric Format

    ''12,165''

    >>> ''{}''.format(12.165) # Default Format

    ''12.165''

    >>> ''{:%}''.format(12.165) # Percentage Format

    ''1216.500000%''

    ```'
  - '[PAGE 217]


    # 8.7.1.3 Format Types for Strings


    The s format is the only format that can be applied for strings and is also the
    default format, and thus, is not very useful (apart from improving readability):


    ```

    >>> ''{:s}''.format("Ram") # String Format

    ''Ram''

    >>> ''{}''.format("Ram") # Default Format

    ''Ram''

    ```


    > **NOTE:**

    Format types **cannot** be used for type conversion! For instance, the d format
    type cannot be used to convert a real number to an integer. Any attempt to perform
    such conversions will result in an error.


    # 8.7.2 Format Width


    Each field, when displayed by default, will occupy as many columns (characters)
    as needed to completely represent it in the chosen format type. It is possible
    to specify the field width, however, to ensure that at least those many columns
    are reserved for the display of the field.


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    > **NOTE:**

    If the given width is insufficient, it will use up as many columns as needed ignoring
    the field width request! Thus, the field width can be considered to be the *minimum*
    field width!


    **Examples:**


    ```

    >>> ''{:3d}''.format(2) # 1-digit number with field width of 3

    ''  2''

    >>> ''{:3d}''.format(12) # 2-digit number with field width of 3

    '' 12''

    >>> ''{:3d}''.format(1234) # 4-digit number with field width of 3

    ''1234''

    ```'
  - '[PAGE 218]


    # 8.7.3 Format Alignment


    ```

    [[fill]align] [sign] [#] [0] [width] [grouping] [.precision] [type]

    ```


    When a width is given, and the width exceeds the default width requirement of
    a field, spaces are used by default to fill in the rest of the columns. In such
    cases, the alignment controls where the spaces get added. The possible values
    for this and their interpretation are shown in the table below:


    | Alignment | Meaning |

    | :--- | :--- |

    | < | Left-align field (add spaces to the right of the content) |

    | > | Right-align field (add spaces to the left of the content) |

    | ^ | Center-align field (add spaces on either side of the content as necessary)
    |

    | = | Right-align numeric field (add spaces on the left, but after any sign) |


    Table 18: Format Alignment


    # Examples:


    ```

    >>> ''{:<10}''.format(12) # Left-align "12" in 10 columns

    ''12         ''

    >>> ''{:>10}''.format(12) # Right-align "12" in 10 columns

    ''         12''

    >>> ''{:^10}''.format(12) # Center-align "12" in 10 columns

    ''    12    ''

    >>> ''{:=10}''.format(12) # Right-align "12" in 10 columns, sign first

    ''        12''

    >>> ''{:=10}''.format(-12) # Right-align "-12" in 10 columns, sign first

    ''-       12''

    ```


    Note:


    +   1. The = alignment is helpful to produce a list of numbers, all aligned with
    their signs in one column.

    2. When no alignment is specified, strings are left-aligned whereas numbers are
    right-aligned by default.'
