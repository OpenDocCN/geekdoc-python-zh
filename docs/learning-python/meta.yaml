    # 8.5.4 String Translation Using maketrans() and translate()


    String translation is the mapping of each character of a string to zero or more
    replacement characters. One of the ways of doing this in Python is by making use
    of the `translate()` function for translation using a translation table by creating
    the translation table using the `maketrans()` function. This section concentrates
    on how to use these functions to perform string translation.


    While the `translate()` function performs the actual string translation, we will
    first see how to build translation tables using `maketrans()`.


    **Complete syntax:**


    ```

    str.maketrans(x[, y[, z]])

    ```


    **Note:**


    +   1. This is a static method (section 12.4.4) of `str` class and hence we will
    literally use `str` to invoke it, not any string instance.

    2. The meanings of the parameters `x`, `y` and `z` depend on how many parameters
    have been given. We will explore each case separately.


    **Forms:**


    ```

    1. str.maketrans(dict)

    2. str.maketrans(lookup, replacement)

    3. str.maketrans(lookup, replacement, discard)

    ```


    # 8.5.4.1 Building Translation Tables to Translate Based on Ordinals


    Ordinals are the codes (integers) that represent characters. ASCII and Unicode
    are two of the most popular systems to represent characters and therefore strings.
    ASCII codes and Unicode code values are ordinals.


    The first approach to building a translation table is by mapping an ordinal to
    it''s replacement using a dictionary. The keys of the dictionary represent what
    has to be translated while the values of the dictionary represent the replacement.


    Each key of the dictionary can be:


    +   1. An ordinal (ASCII or Unicode)

    2. Actual character itself


    Even if an actual character is given, it is converted to it''s ordinal. Thus,
    the keys of the dictionary are ordinals.'
  - '[PAGE 207]


    # 8. Strings


    Each value in the dictionary can be:


    +   1. A Unicode ordinal

    2. A string of any length

    3. The special value `None`


    # Syntax:


    ```

    str.maketrans(dict)

    ```


    The actual translation will be done by the `translate()` function, but the translation
    mechanism is finalised here. When the `translate()` function performs the translation
    of a string using this dictionary, it performs the following steps for each character
    found in the string to be translated:


    +   1. If the character''s ordinal is found in the keys of the dictionary and
    it''s corresponding value is not `None`, the value is substituted instead.

    2. In the above case, if the value found is `None`, the original character is
    silently deleted in the translated string.

    3. If the character''s ordinal was not found in the keys of the dictionary, the
    character is retained as it is without any changes in the translated string.


    Here is an example of building a translation table that translates octal numbers
    to lowercase alphabets:


    ```

    >>>

    d={''1'':''a'',''2'':''b'',''3'':''c'',''4'':''d'',''5'':''e'',''6'':''f'',''7'':''g'',''8'':None,''9'':None}

    >>> t=str.maketrans(d)

    >>> "hello 0468 world".translate(t)

    ''hello 0df world''

    ```


    # Observation:


    +   1. The keys of the dictionary are characters from 0 to 9 (in quotes), not
    integers! Note that the keys can be either ordinals (integers) or characters.
    What we require here are the characters 0 to 9 which have ordinals 48-57.

    2. The Octal system only supports digits from 0 to 7. Hence, we decide to eliminate
    8 and 9 using the value `None` for them.

    3. We decide to retain the character 0 as it is and hence it is not present in
    the dictionary.

    4. Thus, 0 is retained, 1-7 are replaced by a-g and 8-9 are deleted. All other
    characters are retained.'
  - '[PAGE 208]


    # 8.5.4.2 Building Translation Tables to Translate Based on Translation Strings


    Syntax:


    ```

    str.maketrans(lookup, replacement)

    ```


    In the second form, given 2 strings of equal length, each character of the string
    `lookup` will be mapped on to the corresponding character in the string `replacement`
    during translation. Characters in the string to be translated that are not present
    in lookup will be retained during translation without any changes.


    Here is an example that maps lowercase vowels to uppercase:


    ```

    >>> t=str.maketrans("aeiou","AEIOU")

    >>> "This is a demonstration".translate(t)

    ''ThIs Is A dEmOnstrAtIOn''

    ```


    # 8.5.4.3 Building Translation Tables to Translate Based on Translation Strings
    and Discard Strings


    Syntax:


    ```

    str.maketrans(lookup, replacement, discard)

    ```


    This third form is similar to the second form discussed in the previous section,
    except for the third parameter: a string of characters to be discarded during
    translation.


    While the second form retains all characters not found in lookup during translation,
    the third form discards all characters present in the string `discard` and retains
    only those characters without changes that are neither present in `lookup` nor
    in `discard`.


    Here is the same example we used in the previous section for converting lowercase
    vowels to uppercase, but with the added feature of discarding spaces:


    ```

    >>> t=str.maketrans("aeiou","AEIOU"," ")

    >>> "This is a demonstration".translate(t)

    ''ThIsIsAdEmOnstrAtIOn''

    ```


    # 8.6 Padding Strings


    Python has functions for filling strings with spaces in a variety of ways вАУ and
    that''s the focus of this section.'
  - '[PAGE 209]


    # 8.6.1 Justifying a String


    A string of a given length can be increased to a specified width by filling it
    with any character of choice (space by default). There are 3 functions in Python
    that do this for you, depending on where you want the original string content
    to be present in the final expanded string:


    +   - `ljust()` - to left justify the content within an expanded string

    - `rjust()` - to right justify the content within an expanded string

    - `center()` - to center justify the content within an expanded string


    # 8.6.1.1 The ljust() Function


    Complete syntax:


    ```

    str.ljust(width[,fill])

    ```


    Forms:


    +   1. `str.ljust(width)`

    2. `str.ljust(width, fill)`


    **Form #1:** `str.ljust(width)`


    The `ljust()` function left-justifies a given string within an expanded string
    of the given width, filling in spaces as required and returns the new string.
    As a special case, if the given width is less than the length of the string, the
    operation is ignored and the original string is returned.


    Examples:


    ```

    >>> s="Hello"

    >>> s.ljust(20)

    ''Hello               ''

    >>> s.ljust(2)

    ''Hello''

    ```


    **Form #2:** `str.ljust(width, fill)`


    If some other character is needed for filling instead of spaces, the required
    character can be given as the argument `fill`:'
  - '[PAGE 210]


    ```

    >>> s.ljust(20, "=")

    ''Hello===============''

    >>> s.ljust(2, "=")

    ''Hello''

    ```


    # 8.6.1.2 The rjust() Function


    Complete syntax:


    ```

    str.rjust(width[,fill])

    ```


    Forms:


    +   1. str.rjust(width)

    2. str.rjust(width, fill)


    # Form #1: str.rjust(width)


    The rjust() function right-justifies a given string within an expanded string
    of the given width, filling in spaces as required and returns the new string.
    As a special case, if the given width is less than the length of the string, the
    operation is ignored and the original string is returned.


    Examples:


    ```

    >>> s.rjust(20)

    ''              Hello''

    >>> s.rjust(2)

    ''Hello''

    ```


    # Form #2: str.rjust(width, fill)


    If some other character is needed for filling instead of spaces, the required
    character can be given as an additional argument:


    ```

    >>> s.rjust(20, "=")

    ''================Hello''

    >>> s.rjust(2, "=")

    ''Hello''

    ```


    # 8.6.1.3 The center() Function


    Complete syntax:


    ```

    str.center(width[,fill])

    ```'
  - '[PAGE 211]


    # 8. Strings


    Forms:


    +   1. str.center(width)

    2. str.center(width, fill)


    # Form #1: str.center(width)


    The center() function center-justifies a given string within an expanded string
    of the given width, filling in spaces as required and returns the new string.
    As a special case, if the given width is less than the length of the string, the
    operation is ignored and the original string is returned.


    # Examples:


    ```

    >>> s.center(20)

    ''        Hello        ''

    >>> s.center(2)

    ''Hello''

    ```


    # Form #2: str.center(width, fill)


    If some other character is needed for filling instead of spaces, the required
    character can be given as an additional argument:


    ```

    >>> s.center(20, "=")

    ''=======Hello========''

    >>> s.center(2, "=")

    ''Hello''

    ```


    # 8.6.2 Filling a String Using zfill()


    If a given string has numeric content, probably the best method of padding is
    by using zfill() which uses ''0'' padding, right-justifies content, but ensures
    that the padding starts only after the sign, if any.


    # Syntax:


    ```

    str.zfill(width)

    ```'
- md: "## 8.6.3 Expanding Tabs in a String Using expandtabs()\n\nGiven a string with\
    \ tab characters (`\\t`) within it, we can expand these tabs to spaces using the\
    \ `expandtabs()` function:\n\n```\nstr.expandtabs(tabsize=8)\n```\n\nForms:\n\n\
    - 1. `str.expandtabs()`\n- 2. `str.expandtabs(tabsize)`\n\nIn the first form,\
    \ the `tabsize` is assumed to be 8 whereas in the second form, we can provide\
    \ the `tabsize`.\n\nThe `tabsize` is used to divide the string into *zones*, starting\
    \ from column 0. Thus, with a `tabsize` of 8, the zones will start from column\
    \ 0, 8, 16, 24, etc. With a `tabsize` of 2, the zones will start from 0, 2, 4,\
    \ 6, etc. A tab character is supposed to move the *cursor* to the beginning of\
    \ the next zone. This effect is simulated by this function by adding spaces instead\
    \ of the tabs.\n\nExamples:\n\n```\n>>> s=\"a\\tb\\tc\"\n>>> s.expandtabs()\n\
    'a         b         c'\n 0123456789012345678901234 : Reference Ruler\n\n>>> s.expandtabs(2)\n\
    'a b c'\n 0123456 : Reference Ruler\n```\n\n> NOTE:\nThe \"Reference Ruler\" in\
    \ the output above has been added for readability in this book and is not printed\
    \ by the Python interpreter!\n\n## 8.7 Formatting Strings\n\nWe have already seen\
    \ the `format()` function in section 2.7.2. We will examine that function in detail\
    \ in this section.\n\nWe know the following about the `format()` function:\n\n\
    - 1. It allows us to substitute values inside a string\n- 2. It allows us to substitute\
    \ values in order if we use braces without identifying the argument\n- 3. It allows\
    \ us to substitute values in any order if we identify the element by its argument\
    \ number in the placeholder\n- 4. It allows us to substitute the same value multiple\
    \ times if we use the same argument number in multiple placeholders\n- 5. It allows\
    \ us to identify the argument by its name as well as by its position\n\nIn this\
    \ section, we will explore more properties and possibilities.\n\nEach placeholder\
    \ can specify 2 things:\n\n- 1. The argument to be used\n- 2. The formatting that\
    \ needs to be applied on the value of that argument\n\nThese 2 parts are separated\
    \ by a colon (`:`) and thus have these syntax:\n\n```\n{argumentNumber:argumentFormat}\n\
    {argumentName:argumentFormat}\n```\n\nBoth the parts are optional. If `argumentNumber`\
    \ and `argumentName` are not given, it will extract an argument in order. If the\
    \ `argumentFormat` is not given, it will not apply any special formatting вАУ it\
    \ will display the value as it is using as many columns as necessary to display\
    \ that value. If `argumentFormat` is omitted, the separating colon is not required.\n\
    \nThe complete syntax of the `argumentFormat` is shown below:\n\n```\n[[fill]align][sign][#][0][width][grouping][.precision][type]\n\
    ```\n\nDifferent parts of this syntax will be dealt with in detail in different\
    \ sections as documented in the below table:\n\n| Part | Meaning | Section |\n\
    | :--- | :--- | :--- |\n| `fill` | Fill character to be used for padding | 8.7.4\
    \ |\n| `align` | Alignment of the contents within the field | 8.7.3 |\n| `sign`\
    \ | Sign to be displayed for numeric entities | 8.7.6.2 |\n| `#` | Display Base\
    \ Prefix | 8.7.6.4 |\n| `0` | Zero Padding | 8.7.6.1 |\n| `width` | Width of the\
    \ Field | 8.7.2 |\n| `grouping` | Digit Grouping | 8.7.6.3 |\n| `.precision` |\
    \ Precision of the Field | 8.7.5 |\n| `type` | Type of the Field | 8.7.1 |\n\n\
    Let us start with the format type that documents the type of the field.\n\n###\
    \ 8.7.1 Format Types\n\nThe format type specifies how the field contents have\
    \ to be represented. The possibilities depend on whether the field content is\
    \ a string, an integer or a real number.\n\n```\n[[fill]align][sign][#][0][width][grouping][.precision][type]\n\
    ```\n\n#### 8.7.1.1 Format Types for Integers\n\nIntegers can be displayed in\
    \ a variety of bases as shown in the table below:\n\n| Type | Meaning |\n|---|---|\n\
    | b | Binary Format |\n| d | Decimal Format |\n| o | Octal Format |\n| x | Hexadecimal\
    \ Format using Lowercase Alphabets |\n| X | Hexadecimal Format using Uppercase\
    \ Alphabets |\n\nTable 15: Format Types for Integers\n\nIn addition to bases,\
    \ the following format types are also applicable:\n\n| Type | Meaning |\n|---|---|\n\
    | n | Number formatted using current locale |\n| c | Character corresponding to\
    \ the Unicode |\n\nTable 16: Additional Format Types for Integers\n\n> NOTE:\n\
    If no format is selected for an integer, it will be displayed in decimal (the\
    \ `d` format)\n\nExamples:\n\n```\n>>> '{}'.format(15) # Default format for integer\n\
    '15'\n>>> '{:d}'.format(15) # Decimal format for integer\n'15'\n>>> '{:b}'.format(15)\
    \ # Binary format for integer\n'1111'\n>>> '{:x}'.format(15) # Hexadecimal (Lowercase)\
    \ format for integer\n'f'\n>>> '{:X}'.format(15) # Hexadecimal (Uppercase) format\
    \ for integer\n'F'\n>>> '{:n}'.format(15000) # Numeric (Locale-Specific) format\
    \ for integer\n'15000'\n>>> '{:c}'.format(65) # Character Format (A=ASCII 65)\n\
    'A'\n```\n\n#### 8.7.1.2 Format Types for Real Numbers\n\nReal numbers can be\
    \ displayed in fixed-point format, exponentiation format, general format, numeric\
    \ format or as a percentage as shown in the table below:\n\n| Type | Meaning |\n\
    |---|---|\n| f | Fixed-Point Format |\n| F | Fixed-Point Format using uppercase\
    \ for inf and nan |\n| e | Exponentiation Format |\n| E | Exponentiation Format\
    \ using E instead of e to denote exponentiation |\n| g | General Format (May use\
    \ fixed-point or exponentiation depending on which is more appropriate) |\n| G\
    \ | General Format using E instead of e to denote exponentiation (if exponentiation\
    \ is used) |\n| n | Numeric Format (uses current locale for formatting) |\n| %\
    \ | Percentage Format |\n\nTable 17: Format Types for Real Numbers\n\n> NOTE:\n\
    If no format is selected for a real number, it will be displayed in general format\
    \ (the `g` format), but guarantees at least 1 digit after the decimal point unlike\
    \ the `g` format.\n\nExamples:\n\n```\n>>> '{:f}'.format(12.165) # Fixed Point\
    \ Format\n'12.165000'\n>>> '{:e}'.format(12.165) # Exponentiation Format\n'1.216500e+01'\n\
    >>> '{:E}'.format(12.165) # Exponentiation Format\n'1.216500E+01'\n>>> '{:g}'.format(12.165)\
    \ # General Format\n'12.165'\n>>> '{:n}'.format(12.165) # Numeric Format\n'12,165'\n\
    >>> '{}'.format(12.165) # Default Format\n'12.165'\n>>> '{:%}'.format(12.165)\
    \ # Percentage Format\n'1216.500000%'\n```\n\n#### 8.7.1.3 Format Types for Strings\n\
    \nThe `s` format is the only format that can be applied for strings and is also\
    \ the default format, and thus, is not very useful (apart from improving readability):\n\
    \n```\n>>> '{:s}'.format(\"Ram\") # String Format\n'Ram'\n>>> '{}'.format(\"Ram\"\
    ) # Default Format\n'Ram'\n```\n\n> **NOTE:**\nFormat types **cannot** be used\
    \ for type conversion! For instance, the `d` format type cannot be used to convert\
    \ a real number to an integer. Any attempt to perform such conversions will result\
    \ in an error.\n\n### 8.7.2 Format Width\n\nEach field, when displayed by default,\
    \ will occupy as many columns (characters) as needed to completely represent it\
    \ in the chosen format type. It is possible to specify the field width, however,\
    \ to ensure that at least those many columns are reserved for the display of the\
    \ field.\n\n```\n[[fill]align][sign][#][0][width][grouping][.precision][type]\n\
    ```\n\n> **NOTE:**\nIf the given width is insufficient, it will use up as many\
    \ columns as needed ignoring the field width request! Thus, the field width can\
    \ be considered to be the *minimum* field width!\n\nExamples:\n\n```\n>>> '{:3d}'.format(2)\
    \ # 1-digit number with field width of 3\n'  2'\n>>> '{:3d}'.format(12) # 2-digit\
    \ number with field width of 3\n' 12'\n>>> '{:3d}'.format(1234) # 4-digit number\
    \ with field width of 3\n'1234'\n```\n\n### 8.7.3 Format Alignment\n\n```\n[[fill]align]\
    \ [sign] [#] [0] [width] [grouping] [.precision] [type]\n```\n\nWhen a width is\
    \ given, and the width exceeds the default width requirement of a field, spaces\
    \ are used by default to fill in the rest of the columns. In such cases, the alignment\
    \ controls where the spaces get added. The possible values for this and their\
    \ interpretation are shown in the table below:\n\n| Alignment | Meaning |\n| :---\
    \ | :--- |\n| < | Left-align field (add spaces to the right of the content) |\n\
    | > | Right-align field (add spaces to the left of the content) |\n| ^ | Center-align\
    \ field (add spaces on either side of the content as necessary) |\n| = | Right-align\
    \ numeric field (add spaces on the left, but after any sign) |\n\nTable 18: Format\
    \ Alignment\n\nExamples:\n\n```\n>>> '{:<10}'.format(12) # Left-align \"12\" in\
    \ 10 columns\n'12         '\n>>> '{:>10}'.format(12) # Right-align \"12\" in 10\
    \ columns\n'         12'\n>>> '{:^10}'.format(12) # Center-align \"12\" in 10\
    \ columns\n'    12    '\n>>> '{:=10}'.format(12) # Right-align \"12\" in 10 columns,\
    \ sign first\n'        12'\n>>> '{:=10}'.format(-12) # Right-align \"-12\" in\
    \ 10 columns, sign first\n'-       12'\n```\n\nNote:\n\n- 1. The `=` alignment\
    \ is helpful to produce a list of numbers, all aligned with their signs in one\
    \ column.\n- 2. When no alignment is specified, strings are left-aligned whereas\
    \ numbers are right-aligned by default."
