    2\n```\n\n### 5.8.2 Finding the Largest Element in a Tuple\n\nThe `max()` function\
    \ returns the largest element in the tuple:\n\n```python\n>>> T = (5, 2, 3)\n\
    >>> max(T)\n5\n```"
