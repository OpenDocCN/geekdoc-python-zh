    # 9. Regular Expressions


    The first 3 functions we will examine are `match()`, `fullmatch()` and `search()`,
    all of which can search for a regular expression match within a string, but differ
    slightly in functionality as summarised in the table below:


    | Function | Match Location |

    | :--- | :--- |

    | `match()` | Matches from the beginning of the string |

    | `fullmatch()` | Matches the entire string |

    | `search()` | Matches anywhere and any part of the string |


    Table 22: Different Functions for Matching Regular Expressions in Strings


    Thus, if the RE `not` is used to search within different strings, the table below
    summarises which functions will detect a match:


    | String | `match()` | `fullmatch()` | `search()` |

    | :--- | :---: | :---: | :---: |

    | `not` | вЬУ | вЬУ | вЬУ |

    | `note` | вЬУ | вЬЧ | вЬУ |

    | `cannot` | вЬЧ | вЬЧ | вЬУ |

    | `this, not that` | вЬЧ | вЬЧ | вЬУ |


    Note:


    +   1. While `fullmatch()` is the most restrictive function, requiring a complete
    match, `search()` is the least restrictive function tolerating a match anywhere
    within the string.

    2. The presence of a leading `^` or `\A` within the RE will make even the `search()`
    function behave like the `match()` function. The absence of these will not make
    any difference to the `match()` function.

    3. The presence of a leading `^` or `\A` and a trailing `$` or `\Z` within the
    RE will make the `search()` and `match()` functions behave like the `fullmatch()`
    function. The absence of these will not make any difference to the `fullmatch()`
    function.

    4. Anything matched by `fullmatch()` will definitely be matched by the `match()`
    and `search()` functions too.

    5. Anything matched by `match()` will definitely be matched by the `search()`
    function too.'
