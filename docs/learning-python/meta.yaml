    \ example is shown syntactically below:\n\n```\ndef f():\n    try:\n        ...\
    \ # try block\n    except ExceptionName:\n        ... # Handle the exception\n\
    \        raise # Report to caller that this exception occurred\n\ntry:\n    f()\
    \ # Call the function f\n    ... # Do other stuff if the call to f() was exception-free\n\
    except ExceptionName:\n    ... # Respond to the exception\n```\n\n## 13.6 User-Defined\
    \ Exceptions\n\nWe have learnt everything about exceptions вАУ from monitoring them\
    \ to handling them to propagating them. This section focuses on the final aspect\
    \ вАУ creating our own exception classes and raising our own exceptions. The ability\
    \ to create and raise our own exceptions makes it possible to introduce meaningful\
    \ and different exceptions in our program. Here are some points to be borne in\
    \ mind when dealing with user-defined exceptions:\n\n- 1. User-defined exceptions\
    \ are never automatically raised! This means that such exceptions can only be\
    \ raised by explicitly using the `raise` statement and passing an object of our\
    \ exception class.\n- 2. Such user-defined classes have to directly or indirectly\
    \ derive from the built-in `Exception` class.\n- 3. Since exceptions are rare\
    \ and an indication of a specific event, raising such exceptions will generally\
    \ be conditional. Combined with point 1 above, it becomes the programmer's responsibility\
    \ to determine what condition needs to be used to fire the exception.\n\nLet us\
    \ revisit `ExceptionHandlingDemo8.py` and add our own exceptions for the following\
    \ cases:\n\n- 1. A value of greater than 100 should result in `OverflowException`\n\
    - 2. A negative value should result in `NegativeInputException`\n- 3. Division\
    \ by 0 will continue to give rise to `ZeroDivisionError` and a non-numeric input\
    \ will continue to give rise to `ValueError`\n\n## ExceptionHandlingDemo13.py\n\
    \n```\n#!/usr/bin/python\n\n# Exception Handling Demo\n# User-defined exceptions\n\
    \nclass OverflowException(Exception):\n    pass\n\nclass NegativeInputException(Exception):\n\
    \    pass\n\ndef check(n):\n    if n>100: raise OverflowException()\n    if n<0:\
    \ raise NegativeInputException()\n\ntry:\n    n = int(input(\"Enter an integer:\"\
    ))\n    check(n)\n    quotient = int(100/n)\n    print(\"100/{} = {}\".format(n,quotient))\n\
    except OverflowException:\n    print(\"Please enter an integer less than 100!\"\
    )\nexcept NegativeInputException:\n    print(\"Please do not enter a negative\
    \ integer!\")\nexcept ValueError:\n    print(\"Please enter an integer!\")\nexcept\
    \ ZeroDivisionError:\n    print(\"Sorry! Division by zero is not permitted!\"\
    )\n```\n\nOutput:\n\n```\nEnter an integer:5\n100/5 = 20\n```\n\n```\nEnter an\
    \ integer:0\nSorry! Division by zero is not permitted!\n```\n\n```\nEnter an integer:hi\n\
    Please enter an integer!\n```\n\n```\nEnter an integer:200\nPlease enter an integer\
    \ less than 100!\n```\n\n```\nEnter an integer:-100\nPlease do not enter a negative\
    \ integer!\n```\n\nObservation:\n\n- 1. We have defined classes `OverflowException`\
    \ (line 6) and `NegativeInputException` (line 9), meant to be raised when the\
    \ input is greater than 100 and when the input is negative respectively.\n- 2.\
    \ These exception classes of ours derive from the built-in `Exception` class.\
    \ They can also be derived from any of the classes derived from `Exception`, like\
    \ for example, `ValueError` class.\n- 3. The classes are empty as we do not find\
    \ the need to add any functionality in them. We are currently content with the\
    \ fact that we are able to differentiate between these exceptions. Soon, we will\
    \ see what functionality can be added to these classes to make them more useful.\n\
    - 4. Line 18 makes a call to our `check` function (defined in line 12) that scrutinizes\
    \ the given input and raises `OverflowException` or `NegativeInputException` as\
    \ required.\n- 5. We handle `OverflowException` and `NegativeInputException` in\
    \ lines 21 and 23 respectively.\n\nThe previous example showed how we can define\
    \ our own exception classes to suit our requirement. Apart from playing the role\
