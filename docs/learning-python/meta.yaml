  md: '# 15. Modules


    This will copy the identifier `identifier` from the symbol table of module `moduleName`
    into our current symbol table, making it possible for us to directly access `identifier`,
    as shown below for the `factorial` function of the `math` module:


    ```

    >>> from math import factorial

    >>> factorial(5)

    120

    ```


    While this has the advantage that it simplifies the way we use the identifier
    (`factorial`) without using the module name each time to access it, it also has
    the disadvantage that it can pollute the current symbol table and increase the
    number of identifiers, thereby making it possible for clashes to occur as more
    identifiers from more modules join in similarly. Though convenient, this practice
    of importing identifiers is frowned upon by professionals.


    The question arises: what will happen if we import identifiers with the same name
    from different modules? The answer is that each `import` can potentially overwrite
    existing identifiers in the symbol table, thus giving most preference to the last
    import. This is illustrated below:


    ```

    >>> from math import factorial

    >>> factorial(5)

    120

    >>> from fact import factorial

    >>> factorial(5)

    120

    >>> factorial.__doc__

    >>> from math import factorial

    >>> factorial.__doc__

    ''factorial(x) -> Integral\n\nFind x!. Raise a ValueError if x is\nnegative or
    non-integral.''

    ```


    **Observation:**


    +   1. We first imported the `factorial` function from the `math` module and verified
    that it worked correctly.

    2. We then imported the `factorial` function from the `fact` module and verified
    that we still get the correct output. The fact that there is a clash in the identifier
    name `factorial` did not result in any error. The fact that both `math.factorial`
    and `fact.factorial` give us the same output might make it a little difficult
    for us to figure out which of the two was invoked.

    3. Recollect from section 10.15 that functions can have documentation strings.
    We would expect `math.factorial` to also have it, but our `fact.factorial` did
    not have one. We can use this knowledge to figure out which module''s `factorial`
    function was called.'
