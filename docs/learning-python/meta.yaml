    ## 17.3.6 Searching in the Parse Tree


    While the previous section showed how to traverse through the parse tree, it is
    often handy to be able to directly access a particular node within the parse tree.
    We did see a mechanism to do this in section 17.3.4.4, but that only fetched the
    first such tag in the parse tree. In this section, we will see how to extract
    nodes of interest to us directly.


    In order to directly obtain all the tags that meet our criteria, we can use the
    `find_all()` method which has the following syntax:


    ```

    python

    BeautifulSoup.find_all(name, attrs, recursive, string, limit, **kwargs)

    ```


    > **NOTE:**

    > All the arguments shown above are optional! We frequently use keyword arguments
    to specify required arguments.

    > Instead of invoking this method on the BeautifulSoup object and searching through
    the entire parse tree, it is also possible to invoke this method on any `Tag`
    object and search through that sub-tree.


    Forms:


    1. `BeautifulSoup.find_all()`

    2. `BeautifulSoup.find_all(name)`

    3. `BeautifulSoup.find_all(name, attrs)`

    4. `BeautifulSoup.find_all(name, attrs, recursive)`

    5. `BeautifulSoup.find_all(name, attrs, recursive, string)`

    6. `BeautifulSoup.find_all(name, attrs, recursive, string, limit)`

    7. `BeautifulSoup.find_all(name, attrs, recursive, string, limit, **kwargs)`


    **Form #1:** `BeautifulSoup.find_all()`


    This returns a list of all tags in the HTML content parsed, as demonstrated below:


    ```

    (continuation of previous session)

    >>> for tag in soup.find_all():

    ...     print(tag.name)

    ...

    html

    head

    title

    body

    div

    p

    b

    p

    i

    p

    u

    ```


    **Observation:**


    1. We are iterating through all the tags of the HTML content and displaying the
    name of the tag.

    2. We observe that we get all the tags in the same order as present in the HTML
    content.


    ## 17. Parsing HTML


    **Form #2:** `BeautifulSoup.find_all(name)`


    This returns a list of all tags that match the given name, as demonstrated below:


    ```

    (continuation of previous session)

    >>> for tag in soup.find_all("p"):

    ...     print(tag.name)

    ...

    p

    p

    p

    ```


    **Observation:**


    1. This lists out all the `p` tags in the HTML content.

    2. We had 3 such `p` tags and each is listed.


    Instead of searching for a single tag with the specified name, we can search for
    tags that match any of a given list of names as demonstrated below:


    ```

    (continuation of previous session)

    >>> for tag in soup.find_all(["p","b","u"]):

    ...     print(tag.name)

    ...

    p

    b

    p

    p

    u

    ```


    **Observation:**


    1. This lists out all `p`, `b` and `u` tags.

    2. We observe that this lists out the tags in the same order as they are found
    in the HTML content.

    3. We observe that this does not print the `i` tag as that was not specified in
    the list of tags.


    It is also possible to use a regular expression for specifying the tags to match,
    as demonstrated below:


    ```

    (continuation of previous session)

    >>> import re

    >>> for tag in soup.find_all(re.compile("^.$")):

    ...     print(tag.name)

    ...

    p

    b

    p

    i

    p

    u

    ```


    **Observation:**


    1. We have imported the `re` module in order to deal with regular expressions.

    2. The regex we have given is one that matches a single character вАУ we are thus
    searching for tags that are single characters.

    3. We compile the regular expression and pass the regex object as the first argument
    to the `find_all()` method.

    4. We observe that this lists out all those tags that are made up of single characters!


    Finally, it is possible to pass a function object as the first argument, where
    the function is used for filtering as demonstrated below:


    ```

    (continuation of previous session)

    >>> def filter_tag(tag):

    ...     return tag.name=="b" or tag.name=="u"

    ...

    >>> for tag in soup.find_all(filter_tag):

    ...     print(tag.name)

    ...

    b

    u

    ```


    ## 17. Parsing HTML


    **Observation:**


    1. We are passing a function name without the parentheses (i.e. a function object)
    as the first argument to the `find_all()` method.

    2. This function (`filter_tag`) will receive each tag found in the HTML content
    and has to return `True` or `False` for each tag received. If the function returns
    `True`, the tag will be listed by `find_all()`, else it will be skipped.

    3. The filtering condition we have given in the `filter_tag` function is that
    it will return true only when the given tag is either `b` or `u`.

    4. We therefore observe that only `b` and `u` tags are listed.


    **Form #3:** `BeautifulSoup.find_all(name, attrs)`


    This returns a list of all tags with the given name (`name`) and the given attributes
    (`attrs`). The attributes are passed as a dictionary with the attribute name as
    the key and its value as the value. This is demonstrated in the examples below:


    ```

    (continuation of previous session)

    >>> for tag in soup.find_all(attrs={"id":"main"}):

    ...     print(tag.name)

    ...

    div

    ```


    **Observation:**


    1. We have passed only the `attrs` argument in the above example and have not
    passed the `name` argument. From the previous forms, we know that when the name
    is not provided, this will give a list of all the tags encountered in the HTML
    content. However, we are filtering by attributes now. Only those tags that have
    an "id" attribute with the value "main" will be selected.

    2. Verify from the HTML content assigned in section 17.3.4 that the `div` tag
    is the only one that has an "id" attribute with value "main", and hence gets processed.'
