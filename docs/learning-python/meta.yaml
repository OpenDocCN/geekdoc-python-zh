    > **NOTE:**

    A keyword argument cannot be followed by a non-keyword argument.


    # 10.7 Variable Arguments


    A function in Python can be designed to receive any number of arguments. In other
    words, the number of arguments can vary from call to call. For example, consider
    a function `sum` that is supposed to add multiple values. We do not know how many
    values will be provided вАУ in some calls there may be only 2 values, but some other
    calls may provide 5 values for example. Here is an example of how we could write
    the function `sum` using the concept of variable arguments:


    ```

    >>> def sum(*x):

    ...     s=0

    ...     for i in x: s+=i

    ...     print(s)

    ...

    >>> sum(2,3)

    5

    >>> sum(2,3,5,5,5,5)

    25

    >>> sum()

    0

    ```


    **Observation:**


    +   1. The special `*` prefix is used to denote that we are dealing with a variable
    arguments.

    2. These variable arguments are packed together into a tuple that is accessible
    as a single parameters in the function вАУ in our example, `x`.

    3. A simple `for` loop can help iterate through all the arguments passed, in order.


    # 10.7.1 Variable Arguments With Positional Parameters


    It is possible to combine positional parameters with variable arguments. These
    are helpful in cases where we expect a known number of values followed by an optional
    sequence of additional values. Let us redesign the `sum` function to add at least
    2 values when called:'
