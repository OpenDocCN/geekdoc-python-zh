    ## SUMMARY


    -   A list can be simply created using []. Elements of a list can be accessed
    using [].

    -   The len() function gives the number of elements in a list and the count()
    method returns the number of occurrences of a particular element in the list.

    -   The for loop can be naturally used to iterate through the elements of a list.

    -   The in and not in operators check for the existence of an element in a list.
    The index() method can return the position of an element in a list.

    -   A list slice is an independent list made up of elements taken from a list
    using the [:] syntax.

    -   The append() method adds a single element to a list while the extend() method
    adds all elements from one list to another. The insert() method inserts an element
    at a given position in a list.

    -   The del keyword can be used to delete an element within a list, to delete
    all the elements of a list or to delete the variables that holds a reference to
    a list.

    -   The remove() method can be used to search for and remove a particular element
    from a list, the pop() method can be used to delete an element at a specific index
    within the list or at the end of a list and the clear() method can be used to
    delete all the elements of a list.

    -   Two lists can be concatenated using the + and += operators.

    -   A list can be quickly built as duplicates of elements using the * and *= operators.

    -   The = operator only copies references! In order to create an independent copy
    of all elements of a list, the copy() method can be used.

    -   The min() and max() functions return the smallest and largest elements in
    a list, respectively.

    -   The sort() function sorts the elements of a list. The sorted() function returns
    a sorted copy of a list without affecting the original list.

    -   The reverse() function reverses the order of elements in a list.

    -   A list can contain any objects within it - including other lists!


    # 5 TUPLES


    In this chapter you will be able to:


    -   [x] Create tuples and access their elements.

    -   [x] Iterate through tuples and search for specific elements.

    -   [x] Extract sub-tuples from tuples using the concept of tuple slices.

    -   [x] Concatenate tuples and populate tuples instantly using tuple multiplication.

    -   [x] Learn to differentiate between lists and tuples.


    ## TUPLES


    A tuple in Python is defined as an immutable ordered sequence of elements.


    -   *Immutable* means that the contents of a tuple cannot be changed once created.

    -   *Ordered* means that each item in a tuple has an *index* based on its position
    in the tuple.

    -   *Sequence* means that the elements are arranged in order, based on their indices,
    and a sequential traversal through the tuple will give us the elements in the
    order of their indices.


    A tuple is very closely related to a list, and hence it might be helpful to compare
    them. We will do this in section 5.9 after having covered various properties of
    tuples, but for now, do remember a very important distinguishing property of tuples:
    they are immutable!


    ### 5.1 Creating Tuples


    #### 5.1.1 Creating Tuples From Lists Using tuple()


    Just as how a list object can be created and assigned to a variable using the
    `list()` function, a tuple object can be created from a list and assigned to a
    variable using the `tuple()` function:


    ```python

    >>> T=tuple([5,2,3])

    >>> T

    (5, 2, 3)

    ```


    > **NOTE:**

    > The `tuple()` function accepts an iterable object вАУ an object over which it
    can iterate and fetch values one by one. Lists are examples of iterables, and
    there are many other iterable types.


    #### 5.1.2 Creating Empty Tuples Using tuple()


    If a list is not passed as an argument, an empty tuple is created:


    ```python

    >>> T=tuple()

    >>> T

    ()

    ```


    #### 5.1.3 Creating Tuples Using (,)


    Just as how [] indicate list literals, () indicate tuple literals provided there
    is at least one comma within the parentheses:


    ```python

    >>> T=(5,2,3)

    >>> T

    (5, 2, 3)

    ```


    From now on, we will stick to the () syntax for convenience and brevity. The parentheses
    are used primarily for readability, and it is the presence of the comma that actually
    drives Python into concluding that we are dealing with a tuple! It is also possible
    to leave out the parentheses if required:


    ```python

    >>> T=5,2,3

    >>> T

    (5, 2, 3)

    ```


    > **NOTE:**

    > While lists are generally homogeneous, tuples are generally heterogeneous. Of
    course, Python does not prohibit us from having heterogeneous lists and homogeneous
    tuples!


    #### 5.1.4 Creating Empty Tuples Using ()


    Just as how [] represents an empty list, () represents an empty tuple:


    ```python

    >>> T=()

    >>> T

    ()

    ```


    #### 5.1.5 Creating Singleton Tuples


    We already know that empty tuples use parentheses, and further know that more
    than the parentheses, it is the comma that is important. Creating a singleton
    tuple вАУ a tuple that has only 1 element вАУ might look a little weird. We cannot
    use this syntax: `T= (5)`. The reason why we can''t use this syntax is that the
    interpreter has no way of knowing whether it has to treat (5) as an arithmetic
    expression that is using parentheses or as a tuple. The interpreter assumes that
    we are dealing with an arithmetic expression. Therefore, to clearly indicate that
    we are dealing with a tuple, we need to use a comma, with or without the parentheses:'
