    # SUMMARY


    +   - While the bs4.BeautifulSoup module can be used to parse XML, it is also
    possible to parse through XML content using the xml.etree.ElementTree module.

    - The Element object has various attributes of use like name, attrib, text, etc.

    - The itertext() method of Element allows us to iterate through the string content
    of all child nodes recursively.

    - The subscript operator can be used to access individual child elements of a
    given Element.

    - The most commonly used searching method of ElementTree is findall(), which returns
    a list of Element objects that matched the given tag name.

    - The find() method is similar to the findall() method, but returns only the first
    match.


