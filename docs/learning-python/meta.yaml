    # 9.9 Replacing Strings Using sub() and subn()


    Now that we know how to use regular expression functions to search within a string,
    it is time to focus on search-replace. This section focusses on how to search
    for a RE match within a string and replace the match by a string. The basic function
    that achieves this is `re.sub()`:


    ```

    re.sub(pattern, replacement/function, string, count=0, flags=0)

    ```


    Forms:


    +   1. `re.sub(pattern, replacement, string)`

    2. `re.sub(pattern, replacement , string, count)`

    3. `re.sub(pattern, replacement , string, count, flags)`

    4. `re.sub(pattern, function, string)`

    5. `re.sub(pattern, function, string, count)`

    6. `re.sub(pattern, function, string, count, flags)`'
  - '[PAGE 266]


    # Form #1: `re.sub(pattern, replacement, string)`


    Replaces all occurrences of the RE `pattern` within the string `string` by the
    string `replacement` and returns the new string:


    ```

    >>> import re

    >>> re.sub(r"\d+", "''n''", "There are 5 apples and 3 mangoes")

    "There are ''n'' apples and ''n'' mangoes"

    ```


    # Observation:


    +   1. The original string argument, `string`, is not changed by this function.
    The new string with replacements made is merely returned.


    We can also use back-references (\1, \2, etc.) to use content that matched in
    the RE within the replacement string:


    ```

    >>> import re

    >>> re.sub(r"(\d+)/(\d+)/(\d{4})", r"\2-\1-\3", "25/12/2016")

    ''12-25-2016''

    ```


    # Observation:


    +   1. We are attempting to match a UK-format date and convert it into a US-format
    equivalent.

    2. Since the replacement string contains backslashes, either we should prefix
    each backslash with another backslash or use raw strings вАУ we prefer the latter
    for simplicity and readability.

    3. The back-reference \1 refers to the content that matched the first group, \2
    for content that matched the second group and so on.


    # Form #2: `re.sub(pattern, replacement, string, count)`


    In this form, we can specify the maximum number of replacements we wish within
    the string. If `count` is 0, this reverts to form #1 and replaces all occurrences
    of the RE `pattern` in the string `string`.


    ```

    >>> import re

    >>> re.sub(r"\d+", "''n''", "There are 5 apples and 3 mangoes", 1)

    "There are ''n'' apples and 3 mangoes"

    >>> re.sub(r"\d+", "''n''", "There are 5 apples and 3 mangoes", 5)

    "There are ''n'' apples and ''n'' mangoes"

    >>> re.sub(r"\d+", "''n''", "There are 5 apples and 3 mangoes", 0)

    "There are ''n'' apples and ''n'' mangoes"

    ```'
