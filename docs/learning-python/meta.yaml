  md: '# 8. Strings


    Form #3: `template.substitute(dict, keyargs)`


    This form is a combination of the previous two forms: it uses both the dictionary
    `dict` and the keyword arguments `keyargs` to perform substitution in the template
    `template` and returns the string after substitution.


    If a placeholder is found both as a key in the dictionary `dict` as well as a
    keyword argument in `keyargs`, preference is given to the keyword argument in
    `keyargs`.


    Examples:


    ```

    >>> from string import Template

    >>> t=Template("The sum of $x and $y is $z")

    >>> t.substitute(dict(x=2,y=12,z=14),z=100)

    ''The sum of 2 and 12 is 100''

    ```


    Observation:


    +   1. The value of the template identifier `z` is taken from the keyword argument
    (100), even though the dictionary contained a different value (14) since preference
    is given to keyword arguments.

    2. The values of the template identifiers `x` and `y` are taken from the dictionary
    since no keyword arguments were provided for them.


    # 8.5.3.3 Substituting Values in a Template Using safe_substitute()


    The `safe_substitute()` function is very similar to the `substitute()` function
    covered in the previous section. Here are the differences:


    +   1. If a placeholder in the template is not found in the dictionary and keyword
    arguments, the placeholder is retained as it is without generating any `KeyError`.

    2. Any ''$'' that is not followed by an identifier is retained as it is without
    generating any `ValueError`.


    Example:


