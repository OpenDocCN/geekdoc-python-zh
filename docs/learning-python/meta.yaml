    \ |\n| / | `__truediv__` |\n| % | `__mod__` |\n| divmod() | `__divmod__` |\n|\
    \ **, pow() | `__pow__` |\n\nTable 25: Magic Functions for Arithmetic Operators\n\
    \nWhile we know that it is now possible to evaluate `o+i` since it maps on the\
    \ `o.__add__(i)`, the question now is what about evaluating expressions like `i+o`?\
    \ Since `i` is a reference to the built-in `int` class, there is no way that class\
    \ can define such an operation to work on an instance of a user-defined class,\
    \ as illustrated below:\n\n```python\n>>> class A:\n...     def __add__(self,\
