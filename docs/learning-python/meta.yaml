    # 7.6 Adding and Deleting Elements


    # 7.6.1 Adding Elements


    # 7.6.1.1 Adding Elements Using []


    As discussed in section 7.2, if an assignment is made to an element of a dictionary
    using a key that does not exist, the key is created with the given associated
    value:'
  - '[PAGE 170]


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> ''mango'' in D

    False

    >>> D[''mango'']=''yellow''

    >>> ''mango'' in D

    True

    ```


    # 7.6.1.2 Adding Elements Using setdefault()


    The function `dict.setdefault(key)` returns the value associated with the key
    `key` in the dictionary `dict` if the key exists, and creates it with a value
    of `None` if the key does not exist (returning the value `None` as well):


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> D.setdefault(''apple'')

    ''red''

    >>> D.setdefault(''pear'')

    >>> D

    {''mango'': ''blue'', ''apple'': ''red'', ''pear'': None, ''grapes'': ''green''}

    ```


    In the more complete form, the `dict.setdefault(key,default)` function returns
    the value associated with the key `key` in the dictionary `dict` if the key exists,
    and if the key does not exist, creates it with a corresponding value of `default`
    and returns the same value.


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> D.setdefault(''apple'',''blue'')

    ''red''

    >>> D

    {''apple'': ''red'', ''grapes'': ''green''}

    >>> D.setdefault(''mango'',''blue'')

    ''blue''

    >>> D

    {''mango'': ''blue'', ''apple'': ''red'', ''grapes'': ''green''}

    ```


    # 7.6.2 Deleting Elements


    An element (key-value pair) can be deleted from a dictionary using a variety of
    ways. Note that deleting an element is different from deleting the value associated
    with a key in the dictionary (which is nothing but setting the value as `None`
    for a given key in a dictionary).


    # 7.6.2.1 Using del to Delete an Element


    The `del` statement can be used to delete an element from a dictionary, identifying
    the element using it''s key. The specified key needs to exist, otherwise a `KeyError`
    will be generated:'
  - "[PAGE 171]\n\n# 7. Dictionaries\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> del D['apple']\n>>> D\n{'grapes': 'green'}\n>>> del D['mango']\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nKeyError:\
    \ 'mango'\n```\n\n# 7.6.2.2 Using popitem() to Delete Elements\n\nThe `dict.popitem()`\
    \ function removes an element (key-value pair) from the dictionary `dict` and\
    \ returns the pair in the form of a tuple. Each time this function is invoked,\
    \ the size of the dictionary `dict` reduces by one. It generates `KeyError` however\
    \ if invoked on an empty dictionary:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> D.popitem()\n('apple', 'red')\n>>> D\n{'grapes': 'green'}\n>>> D.popitem()\n\
    ('grapes', 'green')\n>>> D\n{}\n>>> D.popitem()\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nKeyError: 'popitem(): dictionary is\
    \ empty'\n```\n\n# 7.6.2.3 Using pop() to Delete Elements\n\nThe `dict.pop(key)`\
    \ function deletes the element (key-value pair) with the key `key` from the dictionary\
    \ `dict` and returns the corresponding value of the deleted key. If the key does\
    \ not exist, it generates a `KeyError`:\n\n```\n>>> D={'apple':'red','grapes':'green'}\n\
    >>> D.pop('apple')\n'red'\n>>> D\n{'grapes': 'green'}\n>>> D.pop('grapes')\n'green'\n\
    >>> D\n{}\n>>> D.pop('mango')\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nKeyError: 'mango'\n```"
  - '[PAGE 172]


    Another version of the function is `dict.pop(key,default)`, which deletes the
    element with key `key` from the dictionary `dict` and returns it''s value if the
    key was found. If the key was not found, it returns the value `default` instead
    without deleting anything:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> D.pop(''apple'',''blue'')

    ''red''

    >>> D

    {''grapes'': ''green''}

    >>> D.pop(''apple'',''blue'')

    ''blue''

    >>> D

    {''grapes'': ''green''}

    ```


    # 7.6.2.4 Using clear() To Delete All Elements of a Dictionary


    The `dict.clear()` function clears out the dictionary `dict` вАУ it removes all
    elements from the dictionary `dict`:


    ```

    >>> D={''apple'':''red'',''grapes'':''green''}

    >>> D.clear()

    >>> D

    {}

    ```


