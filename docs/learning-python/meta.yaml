    \ |\n| c | еѓєеЇФдЇО Unicode зЪДе≠Чзђ¶ |\n\nи°® 16пЉЪжХіжХ∞зЪДйЩДеК†ж†ЉеЉПз±їеЮЛ\n\n> ж≥®жДПпЉЪ\nе¶ВжЮЬжЬ™дЄЇжХіжХ∞йАЙжЛ©ж†ЉеЉПпЉМеЃГе∞Ждї•еНБињЫеИґпЉИ`d`\
    \ ж†ЉеЉПпЉЙжШЊз§ЇгАВ\n\nз§ЇдЊЛпЉЪ\n\n```\n>>> '{}'.format(15) # жХіжХ∞зЪДйїШиЃ§ж†ЉеЉП\n'15'\n>>> '{:d}'.format(15)\
    \ # жХіжХ∞зЪДеНБињЫеИґж†ЉеЉП\n'15'\n>>> '{:b}'.format(15) # жХіжХ∞зЪДдЇМињЫеИґж†ЉеЉП\n'1111'\n>>> '{:x}'.format(15)\
    \ # жХіжХ∞зЪДеНБеЕ≠ињЫеИґпЉИе∞ПеЖЩпЉЙж†ЉеЉП\n'f'\n>>> '{:X}'.format(15) # жХіжХ∞зЪДеНБеЕ≠ињЫеИґпЉИе§ІеЖЩпЉЙж†ЉеЉП\n'F'\n>>> '{:n}'.format(15000)\
    \ # жХіжХ∞зЪДжХ∞е≠ЧпЉИеМЇеЯЯзЙєеЃЪпЉЙж†ЉеЉП\n'15000'\n>>> '{:c}'.format(65) # е≠Чзђ¶ж†ЉеЉПпЉИA=ASCII 65пЉЙ\n'A'\n```\n\
    \n#### 8.7.1.2 еЃЮжХ∞зЪДж†ЉеЉПз±їеЮЛ\n\nеЃЮжХ∞еПѓдї•дї•еЃЪзВєж†ЉеЉПгАБжМЗжХ∞ж†ЉеЉПгАБйАЪзФ®ж†ЉеЉПгАБжХ∞е≠Чж†ЉеЉПжИЦзЩЊеИЖжѓФж†ЉеЉПжШЊз§ЇпЉМе¶ВдЄЛи°®жЙАз§ЇпЉЪ\n\n| з±їеЮЛ | еРЂдєЙ\
