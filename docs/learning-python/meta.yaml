  md: '# 9.6.4 Expanding a Template String


    Given that a match object is aware of the contents of all the groups, it can easily
    allow us to expand a template with values taken from the group contents. The `match.expand()`
    method allows us to pass a template string which can contain references to groups,
    whose values will be substituted and the new string will be returned. The group
    contents can be identified using the syntax `\groupNum` as will be illustrated
    in the examples.


    **Syntax:**


    ```

    match.expand(template)

    ```


    **Examples:**


    ```

    >>> import re

    >>> m=re.fullmatch(r"(\d\d)/(\d\d)/(\d\d\d\d)", "25/12/2016")

    >>> m.expand(r"\2-\1-\3")

    ''12-25-2016''

    >>> m.expand(r"US format: \2-\1-\3")

    ''US format: 12-25-2016''

    ```


    **Observation:**


    +   1. The statement `m.expand(r"\2-\1-\3")` is an attempt to convert a UK-format
    date to a US-format date. The RE was used to process a UK-format date (`dd/mm/yyyy`),
    which we now wish to convert to a US-format date (`mm-dd-yyyy`).

    2. `\1`, `\2` and `\3` represent the contents of groups 1, 2 and 3 respectively.

    3. Any other characters apart from group content substitution requests are retained
    verbatim.


