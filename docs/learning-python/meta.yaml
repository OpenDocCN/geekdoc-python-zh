    # PREFACE TO THE FIRST EDITION


    It was love at first sight and I was only 14!


    I fell in love with computers the moment I saw them work! I remember, it all started
    when our seniors were demonstrating how to boot MS-DOS using a 5¬Љ-inch bootable
    floppy disk and the first thing DOS would do upon booting was ask for the current
    date and time. I was stunned by the validation it would perform. I had a lot of
    questions:


    How does it know when I type in a particular number?

    How does it know that 1 and 2, when typed in succession makes 12?

    How does it know what is the meaning of day, month and year?

    How does it know what is a valid date and what isn''t?

    How does it know what is a leap year? And that a leap year has 29 days in February?

    How can something that runs on electricity have intelligence?


    One question led to another, and the answer to that led to yet another. And that''s
    how my journey in programming began!


    I first learnt BASIC, and when I felt there was something it could not do, I used
    to load binary instructions in my BASIC program using pre-assembled assembly code!
    There was no expert around to tell me that assembly language programming was not
    for kids!


    Over time, I reluctantly learnt many more programming languages вАУ some out of
    curiosity and some out of compulsion. I loved most of them, liked the rest of
    them and hated COBOL! I realised that learning programming languages was secondary;
    learning *programming* was primary! My strong programming base only made it a
    child''s task to learn more programming languages.


    I enjoyed programming so much that I could code, code and code for days together
    at a stretch, stopping only for eating, sleeping and other really important activities!
    I remember asking myself many a times, "Why do I enjoy programming so much?" I
    did find the answer, if I''m not mistaken!


    Programming allowed me to play God!


    Through programming, I could bring to life a machine that would faithfully, obediently,
    reliably, selflessly, correctly, accurately, quickly, tirelessly do as I commanded
    like a servant who never questions!


    I was not even 16 years old when I designed my first programming language! After
    that I have invented and implemented so many custom languages that frankly I can''t'
  - '[PAGE 6]


    even recollect all of them! This book''s existence is actually related to the
    fact that I used to invent languages!


    My fascination with gaming in particular led me to guide students to develop games
    in Java using a game development library we had invented in CyberPlus. I found
    the Java code too verbose and decided to invent a language specifically for writing
    and expressing game logic. I developed a C++ game engine and a game interpreter
    using C++ with Lex and Yacc, but what I realised later was that my game scripts
    looked shockingly close to Python scripts!


    Later when we were developing a game development framework in Java, I realised
    that Python could be directly used for writing game scripts that could run within
    the JVM!


    Right from my teenage I had always wanted to share my knowledge. While I did a
    lot of stuff вАУ from teaching friends and classmates, writing articles, course
    materials and lab manuals вАУ I still had one dream to be realised: writing books!
    This is my first book to be published, though I had made attempts in the past
    to write a book on C and data structures!


    Let me be honest here: I have spent far more time on other programming languages
    like C, C++, Java and Perl than on Python. It is probably preordained that my
    first book to be published will be on Python rather than on those other languages.
    But as I pointed out earlier, programming is different from programming languages
    and I was able to learn and understand the nuances of Python quickly because I
    knew and understood programming in these other languages very well!


    The proof of my deep understanding of programming concepts and languages was the
    feedback the participants would give after my training programs вАУ even those who
    knew the language(s) beforehand felt they learnt many new things in my training!
    Many novices also appreciated the way concepts were taught to them. They felt
    I could explain even highly technical concepts in a simple way! It is that belief
    that I can contribute that led me to write this book, though there are many books
    and materials out there teaching Python in a dozen different ways!


    **I sincerely hope this book delivers what I expect it to:** novices get to learn
    Python *well* and experienced programmers get to learn Python *fast*!


    While there are many people I am thankful to in my life, and many such contributions
    from others have indirectly made this book possible, I will only name those who
    have been directly responsible in making this book what it is!


    I thank Sumesh Kumar for being the first reviewer. I appreciate the fact that
    he has always been eager and more than willing to help, in any and every way he
    could.


    I thank Santosh Manoharan for all his inputs and critical analysis. I admire his
    attention to details in the review.'
- md: '# PREFACE TO THE SECOND EDITION


    It has been an amazing journey since I wrote the first edition of Learning Python!
    A lot of things have happened, completely unexpected, related to the book! Let
    me share a few such experiences:


    It was planned that we would be releasing the International Edition first, followed
    by the Indian Edition if needed. But we ended up releasing the Indian Edition
    first and the International Edition later! There were reasons for this, but most
    of these events happened spontaneously, forcing us to change our plans.


    I had primarily targeted the programming community and my vast network of students
    whom I had trained. The people I had trained on various technologies were working
    in different places in various capacities. I thought they would love the opportunity
    to learn this вАЬnewвАЭ programming language in my style that they love! Of course,
    I wrote the book in such a simple manner that even school kids could read, understand
    and apply. But what I was unprepared for was the mass marketing to engineering
    colleges where Python was just being introduced in the syllabus!


    In the process of conducting Python workshops for working professionals, I accidentally
    got in touch with a lecturer of mine, **Mr. Purushotham B. V.** He had taught
    me various subjects during engineering and we both have high regards for each
    other. With his help and support, I was able to reach out to about 50 engineering
    colleges across Karnataka. His business partner, **Prof. K. B. Shadaksharappa**,
    was earlier the HoD of CSE and ISE branches in PESIT, Bangalore, apart from having
    worked in the industry as well. He also actively assisted me in the endeavour
    and accompanied me to various colleges. I thank them both for all the help, and
    the time and efforts they have spent for popularising this book in engineering
    colleges.


    This connection with colleges resulted in me getting involved in some kind of
    вАЬPython awareness seminarsвАЭ in various colleges, and that in turn ended up with
    me being added as a Member of Board of Studies for the Information Technology
    Engineering Course in Alliance University! I have always maintained that C is
    definitely not the right language for beginners, and Python should be introduced
    as the common programming language in the first year of engineering!


    Special thanks are due to **Ms. Chethana R. Prasad**, who has always helped me
    in a lot many ways for more than a decade! As far as this book is concerned, she
    has helped reach out to colleges, conduct various programs there and of course,
    supply books there. She canвАЩt be thanked enough in this page! Writing a book like
    this is no small task and her encouragement and support ensured that I consistently
    put in the effort that was necessary to bring the book out to the world! In the
    same context, I also thank **Sumesh Kumar** for all his critical reviews and suggestions.
    **Sumesh Kumar**, **Ganapati Hegde** and **Roopa Rao** have helped improve the
    previous edition to the current form.


    Many thanks to **Prof. Nisha Choudhary**, Asst. Prof., CSE, MS Engineering College,
    Bangalore for framing the model VTU question papers on Python, added at the end
    of this book. This will help students get an idea on what to expect in the examination
    and help score better marks.


    Some colleges have already made the first edition of this book the recommended
    textbook for Python and we are thankful to those colleges! Not only have they
    made the right decision by introducing Python in their respective syllabii, but
    also evaluated our book and decided that this should be the book their students
    need to use!


    Since we somehow had got associated with engineering colleges and their students
    were becoming our customers, we decided to expand the book and add additional
    chapters so that it completely covers the VTU syllabus. These additional chapters
    are extensions that help students apply Python to solve common real world problems.
    There are chapters added on Regular Expressions, Database Access and Parsing HTML,
    XML and JSON. I hope that readers find the second edition even more practical
    than the first and are able to accomplish more with Python!


    As with the first edition of this book, my expectation remains the same: **novices
    get to learn Python *well* and experienced programmers get to learn Python *fast*!**


    # REVIEWS FOR THE FIRST EDITION


    Its a brilliant book, IвАЩm loving it!

    The author goes an extra mile to cover each concept and introduces it with reasoning
    followed by a sample program ending with its output.


    Its a great coursework material that will not only get you started with confidence
    if a beginner, but also lets the concepts sink-in broadening the knowledge of
    an experienced programmer!


    IвАЩve seen some other quick reads for python that assumes certain concepts, but
    the author makes sure he doesnвАЩt skip anything! The contents are very clear for
    each chapter if you wanted to go back and have a read again for any section.


    Lastly but primarily, it also deals with installation on various platforms and
    setups which I found it extremely helpful. I felt like I was in a practical session
    being assisted by a tutor on the spot! :)


    -Bhavana Ananda

    Software Developer, University of Oxford


    Congratulations to the author and team of members who have put in all the efforts
    to bring the book on "Learning Python" a successful one.


    Python programming book is found to be very simple and user friendly for the students
    as well as for the faculty members. It is contented with basic introductory chapters
    and an aim to show the differences between python and other languages. It also
    goes over how to use IDLE and run "Hello World" type program. The author explains
    how Python ''Compiles'' the source code before running it. Explains about the
    syntax and runtime errors.


    The early chapters gives an introduction to coding in python. Learn about comments,
    built-in functions, data types, arithmetic expressions, strings, control statements
    and few more topics. Also gives an idea about functions and modules, data structures
    like lists, Tuples, dictionaries, files and other topics.


    The book is actually quite good. I feel like it covers all the topics well.


    -Dr. Manjula Sanjay Koti

    Prof & HoD, Dept. of MCA,

    Member, BoE-VTU,

    Dayananda Sagar Academy of Technology & Management


    Content in the book is very good. Quality is excellent.


    -Manjunath N.,

    HoD, Computer Science & Engineering,

    R. L. Jalappa Institute of Technology


    The book Learning Python by Nagesh Rao is a well structured book for beginners.
    The example programs at the end of the chapter exposes learners to practical programming.
    The chapter 10 practical python is highlight of the book, which shows various
    data structures implementation. Overall the book written in simple language and
    is great for Python learners.


    -Vindhya N. S.

    Asst. Prof. (Computer Science & Engg.),

    Dayananda Sagar Academy of Technology & Management


    The book "Learning Python" by Mr. B. Nagesh Rao is a well written, well organised,
    cohesive book on the subject. It can be referred by the beginner as well as an
    intermediate programmer in Python. The flow of subject matter through the book
    is logical and elaborate. From basics of python, to its features, installation,
    data-types, variables, input output, control structures,derived data types like
    lists, tuples, dictionaries, sets, strings have all been explained in detail with
    a good number of examples. Functions, data structures like Stacks, Queues, Matrices
    have also been discussed appropriately. The Object Oriented Programming principles
    have been covered well with examples. The book provides nice coverage to Exception
    Handling and File Handling in Python along with an introductory chapter on Modules
    as well.


    -Prof. Sunilkumar S. Manvi

    Principal,

    Reva Institute of Technology and Mgmt

    & Director,

    School of Computing and Information Technology, Reva University


    "Learning Python" has allowed me to delve into the world of Python with such ease
    that i just didn''t realize the amount of knowledge that I have been able to garner
    in a span of a week. The book is just a master-class where the author''s inquisitive
    mind has worked phenomenally well in expressing complex and the most intricate
    details in the most lucid way. It has done complete justice to all those individuals
    who intend to make Python their primary skill. I am humbly and genuinely indebted
    to the author in releasing this first edition and wish him all the very best in
    his professional career.


    -Sumesh Kumar

    Oracle


    Impeccable!! Difficult things made easy to learn and almost impossible to forget!
    Very well organised and structured. A great way of learning Python and programming
    as such. Typical of B. Nagesh Rao - needs no more to say about it. He himself
    is the best adjective to describe the book.


    -Roopa Deepak

    Freelance Trainer'
