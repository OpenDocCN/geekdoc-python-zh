  md: '# 16.1.2.2 The DROP TABLE Statement


    In order to remove a table that is no longer required, the `DROP TABLE` statement
    can be used as follows:


    ```

    DROP TABLE Employee

    ```


    > **NOTE:**

    Dropping a table will not only remove the table, but also all data along with
    it! This is potentially dangerous to be executed accidentally!


    It is possible to drop a table conditionally only if it exists. Any attempt to
    drop a table that does not exist will otherwise give rise to a syntax error. Conditional
    dropping of a table is demonstrated below:


    ```

    DROP TABLE IF EXISTS Employee

    ```


    # 16.1.3 An Overview of Data Manipulation Language (DML)


    The most commonly DML SQL statements are `INSERT` to add rows to a table, `UPDATE`
    to modify rows in a table and `DELETE` to remove rows from a table.


    # 16.1.3.1 The INSERT Statement


    Once the `Employee` table is created, we can add rows into it as demonstrated
    below:


    ```

    INSERT INTO Employee VALUES("Ram",1,"ram@company.com")

    ```


    # 16.1.3.2 The UPDATE Statement


    In order to change an existing row in the `Employee` table, we can use the `UPDATE`
    statement as demonstrated below:


    ```

    UPDATE Employee SET email="ram2@company.com" WHERE id=1

    ```


    The above statement will replace the email address of any record(s) to "ram2@company.com"
    whenever it finds that the `id` in that record is 1.'
