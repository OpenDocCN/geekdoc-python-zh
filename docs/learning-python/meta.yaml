    >>> ''{:e}''.format(12.165) # Exponentiation Format

    ''1.216500e+01''

    >>> ''{:E}''.format(12.165) # Exponentiation Format

    ''1.216500E+01''

    >>> ''{:g}''.format(12.165) # General Format

    ''12.165''

    >>> ''{:n}''.format(12.165) # Numeric Format

    ''12,165''

    >>> ''{}''.format(12.165) # Default Format

    ''12.165''

