  md: 'The syntax of the `find()` method is the same as the `find_all()` method:


    ```

    BeautifulSoup.find_all(name, attrs, recursive, string, limit, **kwargs)

    ```


    As earlier, all the arguments are optional and the method can also be directly
    invoked on a `Tag` object.


    There are variants of `find()` and `find_all()` that have exactly the same syntax
    but work on different tags, summarised in the table below:


    | Search Range | Single Item | All Items |

    |---|---|---|

    | All descendants | `find()` | `find_all()` |

    | All ancestors | `find_parent()` | `find_parents()` |

    | All subsequent siblings | `find_next_sibling()` | `find_next_siblings()` |

    | All previous siblings | `find_previous_sibling()` | `find_previous_siblings()`
    |

    | All subsequent nodes | `find_next()` | `find_all_next()` |

    | All previous nodes | `find_previous()` | `find_all_previous()` |


