  md: '1. The most complex function in this program is the `do_delete_employee()`
    function that has to delete an employee record from the given file identified
    by the ID provided by the user. This input is taken in line 2.


    2. What makes this function complex is the fact that there is no direct support
    for deletion of content within files! The technique that we use here is to read
    each employee record and write it to a temporary file if it is not to be deleted.
    Thus, the record to be deleted will not be present in the temporary file while
    all other records would be present. We then transfer all records one by one from
    the temporary file to the given file and truncate the file to the current position
    after that to ensure that no other content will be there in the file beyond that
    point. We can then safely delete the temporary file created.


    3. Line 3 ensures that we start from the beginning of the given file and line
    4 creates a temporary file.


    4. Lines 7-11 read one employee record at a time from the given file and writes
    it to the temporary file if the ID does not match the ID given by the user.


    5. Lines 13-14 then seek back to the beginning of both the files, preparing to
    transfer content in the other direction now.


    6. Lines 68-70 transfer the records from the temporary file to the original file.


    7. Line 72 then flushes the contents from the buffer to the file to ensure that
    data is indeed present in the file rather than just in memory and to ensure that
    the following call to `truncate()` in line 73 works correctly. The `truncate()`
    function ensures that the file size is changed to the current position thereby
    effectively removing any content in the file beyond the current position, if any.


    8. Lines 74-75 then close the temporary file and delete it from the filesystem.


