    **Form #3:** `str.endswith(substring, start, end)`

    The function returns `True` if the substring `substring` is found starting from
    index `start` in the string `str`, but restricting the search till index `end`
    only and if there are no other characters following it in `str`. If the characters
    in `str` from index `start` till index `end` (excluding `end`) did not match the
    characters in `substring`, or if there are more characters after the match in
    the string `str`, this function returns `False`. If the range of indices from
    `start` to `end` are not enough to compare against the entire length of `substring`,
    the function returns `False`:


    ```

    >>> "This is a demo".endswith("demo",10,14)

    True

    >>> "This is a demo".endswith("demo",10,13)

    False

    ```


    This form is the least useful form and is almost useless when a single substring
    is provided. It can be of use when a tuple of substrings are provided.


