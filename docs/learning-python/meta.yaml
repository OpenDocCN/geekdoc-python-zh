    # SUMMARY


    +   - JSON parsing and conversion support is provided by the built-in json module.

    - Python objects and JSON objects have a close semblance - they are almost inter-convertible,
    thanks to the json module!

    - A Python object can be converted into a JSON string representation using json.dumps(),
    or can be stored in a file in JSON format using json.dump().

    - A JSON string can be converted into a corresponding Python object using json.loads(),
    or from a JSON file using json.load().


