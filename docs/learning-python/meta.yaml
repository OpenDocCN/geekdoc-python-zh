  md: '# 20.2.5 Bit Shifting


    # 20.2.5.1 Left Bit Shift


    The value of the expression `x << y` is determined by left-shifting all the bits
    of `x` `y` times as shown in the diagram:


    Each time all bits are shifted left, the leftmost bit is dropped off and a 0 is
    inserted from the right.


    ![](img/7831d9fe9e47e5b1109ec75197998a41_640_0.png)


    > **NOTE:**

    The variable `x` is not affected by this operation unless the expression is `x
    <<= y`!


    **Example:**


    ```

    >>> x=10

    >>> bin(x)

    ''0b1010''

    >>> x<<2

    40

    >>> bin(40)

    ''0b101000''

    ```


    **Observation:**


    +   1. The binary pattern of the integer value `10` is `1010`.

    2. When this pattern is shifted left `2` times, with 0 being inserted from the
    right end, the pattern becomes `101000`


    # 20.2.5.2 Right Bit Shift


    The value of `x >> y` is determined by right-shifting all the bits of `x` `y`
    times. However, the actual procedure depends on whether the number is positive
    or negative! The diagram shows both possibilities:


    For positive integers, each time all bits are shifted right, the rightmost bit
    is dropped off and a 0 is inserted from the left.


    ![](img/7831d9fe9e47e5b1109ec75197998a41_640_1.png)'
