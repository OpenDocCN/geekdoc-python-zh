    >>> type(type)\n<class 'type'>\n```\n\n### 4. жИСдїђеПѓдї•дї•зЉЦз®ЛжЦєеЉПжЙЊеЗЇдЄОеПШйЗПеЕ≥иБФзЪДеАЉзЪДжХ∞жНЃз±їеЮЛпЉМдєЯеПѓдї•з°ЃеЃЪиѓ•з±їеЮЛжШѓеР¶дЄОеП¶дЄАдЄ™вАЬеЕЉеЃєвАЭ\n\
