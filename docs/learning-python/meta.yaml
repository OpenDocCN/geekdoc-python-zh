    # # PYTHON BASICS


    # ## 2.1 Our First Python Script


    The first program in any language is typically a вАЬHello WorldвАЭ program, and let''s
    be no different! Here is our first program that prints `Hello World` when executed:


    ```

    python

    # HelloWorld.py

    1. print("Hello World")

    ```


    **Output:**


    ```


    Hello World

    ```


    Type the above program in your favourite text editor or IDE (See section 1.5 for
    help in selecting) and execute it.


    > > **NOTE:**

    > Of course, don''t type in the line number (вАЬ1.вАЭ) in your programs! They have
    been given only for your reference, and will help when we discuss larger programs.


    If you''re done executing the script, let''s discuss some points:


    # ### 2.1.1 Statements and Lines


    A **statement** is a unit logical instruction to the interpreter. Our `HelloWorld.py`
    program was made up of just 1 statement. A program, therefore, is an integral
    collection of statements.


    A **line** is a sequence of characters terminated by the newline character. Our
    `Helloworld.py` program was a 1-line program. Thus, our program was both a 1-line
    program as well as contained just a single statement.


    Statements in most popular programming languages end with a semi-colon, but this
    is not the case in Python. What it means to a simple programmer who does not want
    to think any deeper is that life has just become more convenient for you! You
    can simply type in statements and not worry about terminating them! But if you
    are the more inquisitive type who questions why this is so in Python, or maybe
    why this is not so in other languages, then let''s proceed to understand.


    Statements and Lines are connected in Python.'
  - '[PAGE 26]


    # 2.1.1.1 One Statement Per Line


    In Python, a line is typically considered to host 1 statement. Thus, as long as
    there is 1 statement per line, there is no need of using semi-colons at the end
    of the line.


    > **For C/C++/Java Programmers:**


    Programming languages like C, C++ and Java use semi-colons (;) as the **statement
    terminator**, which means that a semi-colon marks the end of a statement. This
    means that a statement is not considered complete unless the terminating semi-colon
    is seen, and thus allows a statement to span multiple lines as required.


    Python relies on indentation rules to decide which statements belong to which
    block (will be covered in section 3.2.1) and uses the newline character as the
    statement terminator. In other words, a statement in Python is understood to be
    terminated in the same line.


    Let us revisit `Helloworld.py` and write multiple statements вАУ of course, one
    per line.


    # HelloWorld2.py


    ```

    1.  print("Hello World")

    2.  print("Hi from India!")

    ```


    # Output:


    ```

    Hello World

    Hi from India!

    ```


    # 2.1.1.2 Multiple Statements Per Line


    Python uses semi-colons as **statement separators** and this behaviour is elaborated
    below:


    As a statement separator, the role of a semi-colon is to ensure that multiple
    statements can be given in one line and the translator is able to differentiate
    them as separate statements because of the semi-colon separating them.


    > **For Perl/Shell Scripters:**


    Perl and the shell in Linux use semi-colons the same way, forcing programmers
    to use them as separators if they want to issue multiple statements/commands in
    the same line!


    Let us revisit `HelloWorld2.py` and write multiple statements in a single line.'
