  md: "# 14.4 Writing to Text Files\n\nUnlike the many different ways of reading from\
    \ files, writing to files is pretty straightforward with the use of a single function\
    \ вАУ `write()` - whose syntax is shown below:\n\n```\nfileObject.write(string)\n\
    ```\n\n**Note:**\n\n+   1. This method writes the contents of the given string\
    \ (`string`) to the file specified by the invoking file object (`fileObject`).\n\
    2. This method does not add a terminating newline character of its own. If the\
    \ string terminates with a newline character, it is also written, else no newline\
    \ is automatically added to the file.\n3. The file identified by the file object\
    \ (`fileObject`) must have been opened in a mode that supports writing, else the\
    \ operation fails.\n\nHere is a program that generates the factorial of all integers\
    \ from 1 to 10 and stores them in a file called `factorials.txt`:\n\n```\nfactorials.py\n\
    \n1.  #!/usr/bin/python\n2.  \n3.  # Storing factorials in a text file\n4.  \n\
    5.  from math import factorial\n6.  \n7.  try:\n8.      file = open(\"factorials.txt\"\
    ,\"w\")\n9.      for i in range(1,11):\n10.         file.write(\"The factorial\
    \ of {} is {}\\n\".format(i,factorial(i)))\n11. except Exception as e:\n12.  \
    \   print(\"Unable to open file: {}\".format(filename))\n13.     print(\"Reason:\
    \ {}\".format(str(e)))\n14. else:\n15.     print(\"Factorials successfully written\
    \ to file factorials.txt\")\n```\n\n**Output:**\n\n```\nFactorials successfully\
    \ written to file factorials.txt\n```"
