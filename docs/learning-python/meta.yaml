    \ 1. иѓ•з®ЛеЇПдЄО `countries.py` з±їдЉЉпЉМеП™жШѓеҐЮеК†дЇЖзђђ8-11и°МпЉМеєґеЬ®зђђ6и°Ме∞ЖеИЧи°® `countries` еИЭеІЛеМЦдЄЇз©ЇеИЧи°®гАВ\n- 2. жИСдїђеЬ®зђђ11и°МдљњзФ®\
    \ `list.append()` еЗљжХ∞е∞ЖжЦ∞еЫљеЃґжЈїеК†еИ∞еИЧи°® `countries` дЄ≠гАВ\n- 3. е¶ВжЮЬеЬ®зђђ10и°МйБЗеИ∞зФ®жИЈиЊУеЕ•зЪД \"end\"пЉМжИСдїђе∞±иЈ≥еЗЇеЊ™зОѓгАВ\n\
    \nиЃ©жИСдїђдљњз®ЛеЇПжЫіеЕЈеЃЮзФ®жАІпЉЪзО∞еЬ®жИСдїђе∞ЖдїОзФ®жИЈйВ£йЗМжО•жФґеЫљеЃґеРНзІ∞еєґжЙУеН∞еЃГдїђзЪДй¶ЦйГљпЉБдЄЇж≠§пЉМжИСдїђйЬАи¶БжЬЙдЄАдЄ™еЫљеЃґй¶ЦйГљзЪДвАЬжХ∞жНЃеЇУвАЭгАВжИСдїђеПѓдї•е∞Жй¶ЦйГљеРНзІ∞е≠ШеВ®еЬ®дЄАдЄ™еИЧи°®дЄ≠пЉМжѓФе¶ВеПЂеБЪ\
    \ `capitals`гАВжИСдїђињШе∞ЖзЫЄеЇФеЫљеЃґзЪДеРНзІ∞е≠ШеВ®еЬ®еП¶дЄАдЄ™еИЧи°®дЄ≠пЉМжѓФе¶В `countries`пЉМй°ЇеЇПдЄО `capitals` дЄ≠е≠ШеВ®зЪДй¶ЦйГљзЫЄеРМгАВеЫ†ж≠§пЉМеѓєдЇОзїЩеЃЪзЪДзіҐеЉХ\
    \ `i`пЉМ`countries[i]` е∞ЖеСКиѓЙжИСдїђеЫљеЃґеРНзІ∞пЉМиАМ `capitals[i]` е∞ЖеСКиѓЙжИСдїђзЫЄеЇФзЪДй¶ЦйГљгАВзДґеРОжИСдїђе∞ЖдїОзФ®жИЈйВ£йЗМжО•еПЧдЄАдЄ™еЫљеЃґеРНзІ∞пЉМдљњзФ®зіҐеЉХеЗљжХ∞еЬ®жИСдїђзЪДеИЧи°®\
    \ `countries` дЄ≠жРЬзіҐиѓ•еЫљеЃґпЉМдљњзФ®ж£АзіҐеИ∞зЪДзіҐеЉХеЬ® `capitals` еИЧи°®дЄ≠еЃЪдљНй¶ЦйГљеєґжЙУеН∞дњ°жБѓгАВжИСдїђе∞ЖеГПдєЛеЙНзЪДз®ЛеЇПдЄАж†ЈпЉМеЬ®еЊ™зОѓдЄ≠йЗНе§Нж≠§жУНдљЬпЉМзЫіеИ∞зФ®жИЈиЊУеЕ•\
    \ \"end\"гАВ\n\n### countries3.py\n\n```\n#!/usr/bin/python\n\n# з®ЛеЇПзФ®дЇОжО•еПЧеЫљеЃґеРНзІ∞еєґжЙУеН∞еЕґй¶ЦйГљ\n\
    \ncountries=[\"India\",\"Pakistan\",\"Sri Lanka\",\"China\"]\ncapitals=[\"New\
