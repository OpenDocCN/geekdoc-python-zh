    # SUMMARY


    +   > Generally, Python concludes that 1 statement spans 1 line. A single statement
    can span multiple lines using backslashes at the end of each line that continues.
    Multiple statements can be present in the same line if separated by semicolons.

    > Python does not differentiate between single quotes, double quotes, triple single-quotes
    and triple double-quotes!

    > The basic data types of Python are int, float, complex, str and bool.

    > Variables hold references to objects. Multiple variables can hold references
    to the same object too!

    > The print() function prints a list of items whereas the input() function prints
    an optional prompt message and reads in a single line of input.

    > Output formatting can be done using the format() method of string (str) class.
    This method returns the formatted string, which can be printed using the print()
    function.


