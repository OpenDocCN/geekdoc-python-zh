    # 9. Regular Expressions


    Observation:


    +   1. In the first example, only the first occurrence of a sequence of digits
    was replaced.

    2. In the second example, while we have asked for maximum 5 replacements, there
    were only 2 occurrences of the pattern and both were replaced.

    3. The third example is identical to the example we saw for form #1.


    Form #3: `re.sub(pattern, replacement, string, count, flags)`

    This form is identical to form #2 and also allows us to pass various `flags`,
    as discussed in section 10.4.4.


    Form #4: `re.sub(pattern, function, string)`

    This form is similar to form #1 in that this is used to perform a replace-all
    task, with the difference being that instead of using a fixed string for replacement,
    this calls the specified function passing a `match` object corresponding to each
    match obtained and uses the return value from the function as a replacement string:


    ```

    >>> import re

    >>> def f(m):

    ...     if int(m.string[m.start():m.end()])<10: return "few"

    ...     else: return "many"

    ...

    >>> re.sub(r"\d+",f,"There are 15 apples and 3 mangoes")

    ''There are many apples and few mangoes''

    ```


    Observation:


    +   1. Note that when we are invoking the `re.sub()` function, we specify `f`
    and not `f()` - in other words, we are providing the function name and not calling
    the function ourselves.

    2. The function `f` will receive a `match` object `m` each time a match is found.
    Recall from section 10.6 that `m.string` gives us the original string that was
    searched, `m.start()` gives us the starting index within the string where the
    match was found and `m.end()` gives is the ending index within the string where
    the match was found. Thus, `m.string[m.begin():m.end()]` identifies the substring
    that was matched within the original string.

    3. The function `f` converts the matched substring into an integer and compares
    it with 10 вАУ if less than 10, the function returns the string "few", else it returns
    the string "many".'
