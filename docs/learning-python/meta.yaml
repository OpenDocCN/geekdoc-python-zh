- img_proc: true
  md: "The advantages of this mechanism are:\n\n+   1. We are able to separate the\
    \ exception testing code (checks in the monitoring block) and the exception handling\
    \ code (the response block). This makes the code in the monitoring block easier\
    \ to understand and maintain.\n2. We are able to respond to multiple exceptions\
    \ without multiple checks. All statements in the monitoring block are monitored.\
    \ This simplifies our code and makes it easy to maintain.\n3. We are able to respond\
    \ to different exceptions differently, or deal with multiple types of exceptions\
    \ in an identical manner, based on our requirement (section 13.2.2).\n4. We are\
    \ able to deal with exceptions in different levels or in multiple levels (section\
    \ 13.4).\n\n# 13.2.1 The Basic Exception Handling Block\n\nThe previous section\
    \ introduced the exception monitoring block and the exception handling block.\
    \ These blocks are called the `try` block and `except` block respectively in Python,\
    \ as shown in the syntax below:\n\n```\ntry:\n    ...\nexcept exceptionName:\n\
    \    ...\n```\n\nLet us understand the flow of control in the above syntax. Since\
    \ the flow of control depends on whether or not an exception is raised in the\
    \ `try` block, we will consider both situations separately:\n\n+   1. If no exception\
    \ is raised in the `try` block, the statements in the `try` block are executed\
    \ sequentially and the entire `except` block is ignored. This is what we normally\
    \ expect most of the times, as exceptions are supposed to be raised rarely.\n\
    2. If an exception is raised anywhere within the `try` block during the normal\
    \ sequential execution, control immediately exits the `try` block and starts examining\
    \ the `except` block(s). If it finds an `except` block capable of handling the\
    \ exception that was raised, then that `except` block is executed and control\
    \ resumes outside of the `try-except` blocks. We will cover more of this in the\
    \ next section where we see how to handle exceptions of multiple types. In the\
    \ syntax above, the `except` block is capable of handling an exception of type\
    \ `exceptionName` (and also it's derived classes as we learnt in section 12.7).\n\
    3. If an exception is raised anywhere within the `try` block during the normal\
    \ sequential execution, and that exception is not handled by the `except` block(s),\
    \ then control exits the entire `try-except` construct and the exception propagates.\
    \ This"
