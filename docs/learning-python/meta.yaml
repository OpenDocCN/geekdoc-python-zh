    # 1.2 About Python


    Python is a widely used high-level, general-purpose, interpreted, dynamic, object-oriented
    programming language. Its programming style emphasizes code readability and its
    syntax allows programmers to code their logic in much fewer lines than in languages
    like C++ and Java!


    It is a fairly old language created by Guido Van Rossum in the late 1980s, when
    he was working on the Amoeba distributed operating system group and wanted to
    use an interpreted language like ABC that could access the Amoeba system calls.
    He decided to create a language that was extensible and that led to the design
    of a new programming language which was later named Python.


    While most people at first might assume that the name ''Python'' was derived from
    the reptile, it was actually adopted from a comedy series of the late seventies
    called вАЬMonty PythonвАЩs Flying CircusвАЭ.


    The design began in the late 1980s and was first released in February 1991. Python
    2.0 was released on 16 October 2000 and had many major new features like a cycle-detecting
    garbage collector and support for Unicode. With this release the development mode
    got changed and it became more transparent and community-backed.


    Python 3.0 (which early in its development was commonly referred to as Python
    3000 or py3k), a major, backwards-incompatible release, was released on 3 December
    2008 after a long period of testing. Many of its major features have been back-ported
    to the backwards-compatible Python 2.6.x and 2.7.x version series


    # 1.3 Installing Python


    When downloading from Python''s website, currently both the latest 3.x series
    of Python as well as 2.x series will be available, as older versions of Python
    are still in use. Unless you have strong reasons to act on the contrary, always
    download the latest version of Python listed there. **This book concentrates on
    Python 3.x, which in many ways will be different from Python 2.x.**'
