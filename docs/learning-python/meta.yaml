    "+", "-", "*" and "/".


    **Steps for evaluating Postfix Arithmetic Expressions:**


    +   1. Scan the given postfix expression from left to right.

    2. When an operand is encountered, check if we already know it''s value. If not,
    ask the user for it''s value and note it. The value of the operand is pushed on
    to a stack.

