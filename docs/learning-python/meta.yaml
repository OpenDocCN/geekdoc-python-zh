  md: '# 2.7.1.5 Separating Items and Terminating Items


    We can combine the separator string and terminator string as shown in the examples
    below:


    ```

    >>> print("Welcome","to","Python",sep="...",end="\n---=====---\n")

    Welcome...to...Python

    ---=====---

    >>> print("Welcome","to","Python",end="\n---=====---\n",sep="...")

    Welcome...to...Python

    ---=====---

    ```


    Observation:


    +   1. The order in which the keyword arguments `sep` and `end` are given do not
    matter

    2. Keyword arguments must be at the end of the argument list. They cannot precede
    any non-keyword argument.


    # 2.7.1.6 Printing Blank Lines


    As a special case, when no argument is passed to the `print()` function, it ends
    up printing only the terminator string, which is newline by default, and thus
    ends up printing a blank line:


    ```

    >>> print()

    >>>

    ```


    # 2.7.2 Formatting Strings Using the format() Function


    While we were able to print using the `print()` function, we were unable to format
    the output in any way (apart from adding separator and terminator strings). For
    more advanced formatting, we can rely on the `format()` function of string class,
    which can format a string and give us a resultant string that can then be printed.


    The `format()` function searches the string for placeholders. These placeholders
    are indicated by braces({}) and indicate that some value needs to be substituted
    there (and probably formatted too). As a special case, if the string has no placeholders
    in it, the `format()` function does nothing with the string and returns it as
    it is, as shown in the example below:


    ```

    >>> ''Hello world''.format()

    ''Hello world''

    ```'
