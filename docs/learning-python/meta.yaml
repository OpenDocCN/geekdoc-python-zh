    # 12.8.1 Attribute Handling


    Section 12.4.1 introduced the fact that instances can have attributes of their
    own. We use the syntax `object.attribute` to access such attributes. There are
    functions available in Python to deal with attributes of instances.


    # 12.8.1.1 The hasattr() Function


    The `hasattr()` function tells whether a particular instance has a particular
    attribute or not.


    Syntax:


    ```

    hasattr(object, attribute)

    ```


    This is a Boolean function that returns true only if the given instance contains
    the given attribute, as shown in the code snippet below:


    ```

    >>> class A:

    ...     def __init__(self):

    ...             self.x=0

    ...

    >>> a=A()

    >>> hasattr(a, ''x'')

    True

    >>> hasattr(a, ''y'')

    False

    ```


    Observation:


    +   1. We define a class A that contains a constructor which initializes an attribute
    x to 0 (thereby creating it). Since the constructor is invoked each time an instance
    is created, it is guaranteed that all instances of A will have the attribute x
    in them.

    2. `hasattr(a, ''x'')` therefore returns True whereas `hasattr(a, ''y'')` returns
    False since no attribute y was created in the instance a.


    # 12.8.1.2 The getattr() Function


    The `getattr()` function returns the value of an attribute within an instance
    if it exists, returning a default value (if provided) if the attribute does not
    exist.


    Syntax:


    ```

    getattr(object, attribute[, default])

    ```'
