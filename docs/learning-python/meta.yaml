    # 10.13 Lambda Expressions


    Python provides a convenient mechanism for creating anonymous functions called
    *Lambda Expressions* and permits invoking them using their reference.


    Lambda expressions are ideally used when we have something simple to be done (something
    that can fit within a single expression), and we are more interested in quickly
    getting the job done rather than formally naming the function.


    Before we go on to powerful examples, let us consider some simple ones. But first,
    here is the syntax of a lambda expression:


    ```

    lambda parameters: expression

    ```'
  - '[PAGE 301]


    # 10. Functions


    A lambda can receive 0 or more parameters (just like functions) and end up returning
    the value of the expression on execution. Here is the first example:


    ```

    >>> (lambda x: x**2)(4)

    16

    ```


    **Observation:**


    +   1. We have created a lambda function using the keyword `lambda`. This function
    accepts a single parameter `x` and returns it''s square.

    2. We wish to execute the lambda function immediately with `4` as an argument.
    We therefore use parentheses to represent the function reference returned by the
    `lambda` keyword and pass `4` as an argument to it.

    3. Even though this example is valid, it is useless practically as we could have
    as well directly used the expression `4**2` instead. But this definitely serves
    as a first valid example.


    Since the keyword `lambda` manufactures a function and returns it''s reference,
    we can store the function reference in any variable and then use that variable
    like a function. This is illustrated below:


    ```

    >>> square=lambda x: x**2

    >>> square(4)

    16

    ```


    **Observation:**


    +   1. We have created the same lambda expression as in the previous example,
    but this time have stored it in the variable `square`.

    2. We then use `square` to invoke the functionality whenever we want, how many
    ever times we want and with whatever arguments we want.

    3. The use of lambda this way is again not very practical as we could have as
    well defined a function called square that works in a similar fashion. But this
    example illustrates the similarity in handling function references.


    Lambda expressions are especially useful when function objects are required. A
    *function object* is a reference to a function that can be stored (in variables),
    passed around in the script (as arguments to functions and return values from
    functions) and can be invoked whenever required. We will see examples of this
    in section 11.6.'
