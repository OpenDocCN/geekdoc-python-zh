    \ string, count=0)\n```\n\n**Observation:**\n\n1.  These methods behave identical\
    \ to the corresponding functions in the `re` module.\n2.  Most of these methods\
    \ receive optional `pos` and `endpos` parameters вАУ the `pos` parameter specifies\
    \ where to start matching within the string, and the `endpos` parameter specifies\
    \ where to stop matching in the string. When `pos` is omitted, the matching starts\
    \ at the beginning of the string and when `endpos` is omitted, the matching ends\
    \ at the end of the string. Note that this has no effect on the вАЬ^вАЭ and вАЬ$вАЭ operators\
    \ which will still consider the start of the string to be the index 0 regardless\
    \ of `pos` and the end of the string to be the last index of the string regardless\
    \ of `endpos`.\n3.  The RE is not present in these methods since it is already\
    \ placed within the regex object. The string against which the RE has to be matched\
    \ can change and is hence passed as a parameter.\n4.  The flags are not present\
    \ as parameters in these methods since they are already placed within the regex\
    \ object. If a different set of flags are required, another regex object instance\
    \ has to be created for that using `re.compile()`.\n\n## 9.11 Questions\n\n1.\
    \  Explain regular expression operators with examples.\n2.  Write a short note\
    \ on anchoring operators of regular expressions.\n3.  Differentiate between the\
    \ `match()`, `fullmatch()` and `search()` functions of the `re` module.\n4.  Write\
    \ a short note on flags that can be used while dealing with regular expressions.\n\
    5.  Briefly explain how we can work with `match` objects in Python.\n6.  Write\
    \ a short note on back-references in the context of regular expressions.\n7. \
    \ Explain the `findall()` and `finditer()` functions of the `re` module with examples.\n\
    8.  Explain the `split()` function of the `re` module in detail with examples.\n\
    9.  Write a short note on the `sub()` and `subn()` functions of the `re` module.\n\
    10. What is the benefit of вАЬcompilingвАЭ regular expressions? When are they useful?\n\
    \n## 9.12 Exercises\n\n1.  Write a Python script to check if a given string contains\
    \ an email address or not.\n2.  Write a Python script that accepts a line of CSV\
    \ (Comma Separated Values) and checks if the 3rd field contains exactly an email\
    \ address or not, given that there are more than 3 fields.\n3.  Write a Python\
    \ script that scans through a given piece of text and extracts all unique email\
    \ addresses from it.\n4.  Write a Python script that reads in a piece of text\
    \ and prints it out masking out email addresses. Thus, an email address вАЬhelloworld@python.comвАЭ\
    \ should become вАЬh*********d@python.comвАЭ.\n\n## SUMMARY\n\n- Regular Expressions\
    \ are pattern matching expressions. They help us formally frame patterns of strings\
    \ we are interested in searching.\n- Certain operators like ., [], *, +, ? and\
    \ {} are available that have special meanings. If these characters are to be used\
    \ as operands, they need to be escaped.\n- Regular expressions are case sensitive\
    \ by default.\n- Regular expression based search and replace functionality is\
    \ provided by the re module.\n- The search function searches for a pattern anywhere\
    \ within a string; the match function searches from the beginning of a string;\
    \ the fullmatch function searches from a match that spans the entire string.\n\
    - Parentheses can be used for grouping and substrings that matched within the\
    \ groups can be retrieved.\n- The split() function can be used to split a string\
    \ into parts based on a RE for specifying the delimiter string.\n- The sub() and\
    \ subn() functions can be used for performing regular expression based substitutions.\n\
    - Regular expressions that are frequently used can be pre-compiled using the compile()\
    \ function.\n\n# 10 FUNCTIONS\n\nIn this chapter you will be able to:\n\n- [x]\
    \ Define Functions and call them.\n- [x] Pass and Receive Positional Arguments,\
    \ Default Arguments, Keyword Arguments and Variable Arguments.\n- [x] Return single\
    \ values as well as collections from functions.\n- [x] Define and use nested functions\
    \ and lambda expressions.\n- [x] Unpack arguments from collections and pass them\
    \ as function arguments.\n\n## 10.1 Introduction to Functions\n\nFunctions (loosely\
    \ equivalent to subroutines/procedures, all of which are types of subprograms)\
    \ are self-contained blocks of code to perform a specific task. Functions are\
    \ used for the following reasons:\n\n1.  **They help reduce code redundancy**:\
    \ when the same piece of code is required in multiple places within a program,\
    \ the piece of code can be converted into a function, which can then be called\
    \ whenever and wherever required within the program.\n2.  **They help increase\
    \ code reusability**: a function once defined can be called any number of times\
    \ and can even be called from other programs (see section 15 for a discussion\
    \ of modules).\n3.  **They help improve program clarity**: putting all instructions\
    \ in one place results in cluttering, making the program difficult to read, understand\
    \ and maintain; whereas organising them into functions makes it far more manageable.\n\
    \nFunctions, being subprograms, can assist the main program in its activities.\
    \ During execution of a Python script, control always starts flowing from the\
    \ first line of the main program (the part that is outside of all functions) and\
    \ flows down sequentially line by line by default, executing all the lines in\
    \ a sequence. This flow can be altered by certain programming constructs like\
    \ decisions and loops, and is also altered when function calls are made. Thus,\
    \ a function defined in a program will not be executed unless explicitly called\
    \ from the main program. Of course, a function that is called can then call other\
    \ functions as well!\n\n## 10.2 Function Definition\n\nBefore a function can be\
    \ called, it needs to be defined. The function definition contains the body of\
    \ the function вАУ the instructions that constitute what will happen when the function\
    \ is called. A function definition has the following syntax:\n\n```\ndef function_name(parameters):\n\
    \    function_body\n    ...\n```\n\nThe def keyword specifies that we are defining\
    \ a function. The function name should be a valid identifier. A function can optionally\
    \ receive parameters, different forms of which will be covered in the next few\
    \ sections. The function body is a sequence of instructions and can span any number\
    \ of lines (including blank lines). As is the case everywhere in Python, the indentation\
    \ level decides which statements belong to this function.\n\nHere is the definition\
    \ of a function called `hi` that prints \"Hello World\" when called:\n\n```\n\
    >>> def hi():\n...     print(\"Hello World\")\n...\n```\n\n## 10.3 Function Call\n\
    \nOnce a function has been defined, it can be called as many times as required,\
    \ from almost any place thereafter in the script and with any arguments as required.\n\
    \nA *function call* is identified by the parentheses `()` that immediately follow\
    \ the function name (which as we know is an identifier).\n\nThus, the function\
    \ `hi` defined earlier can be called in the following manner:\n\n```\n>>> hi()\n\
    Hello World\n```\n\n> **NOTE:**\n> In an interactive Python session, once a function\
    \ has been defined, it can be called any number of times without requiring a redefinition.\n\
    \nFunctions once defined can be redefined later to perform a different task. The\
    \ latest definition seen will be used when a function call is executed:\n\n```\n\
    >>> def hi():\n...     print(\"Hello World\")\n...\n>>> hi()\nHello World\n>>>\
    \ def hi():\n...     print(\"Heya!\")\n...\n>>> hi()\nHeya!\n```\n\nA function\
    \ name without the parentheses is a *reference* to the function and as such can\
    \ be stored in variables and used later as a replacement for the original function\
    \ name:"
