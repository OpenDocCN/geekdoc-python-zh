  - "[PAGE 397]\n\nThe reason why we are revisiting function overriding with respect\
    \ to multiple inheritance is that it gets interesting now when we use the `super()`\
    \ function because the question arises: when there are 2 (or more) base classes,\
    \ which base class is considered to be the super class? To answer this question\
    \ is obtained by the order of inheritance, which was covered in section 12.6.5.\
    \ To recall, the order of inheritance is from left to right, and in this example,\
    \ the first base class of `C` is therefore `A`. The first preference is given\
    \ to the method `f` in class `A`. Only if `A` (and it's super classes, in the\
    \ order of inheritance) does not define method `f` will preference be given to\
    \ class `B` (and it's super classes in the order of inheritance). This is demonstrated\
    \ by the following program:\n\n# Inheritance9.py\n\n```\n1.  #!/usr/bin/python\n\
    2.  \n3.  # Inheritance Demo:\n4.  # Multiple Inheritance - Function Overriding\n\
    5.  \n6.  class A:\n7.      def f(self):\n8.          print(\"A\")\n9.  \n10.\
    \ class B:\n11.     def f(self):\n12.         print(\"B\")\n13. \n14. class C(A,B):\n\
    15.     def f(self):\n16.         super().f()\n17.         print(\"C\")\n18. \n\
    19. c=C()\n20. c.f()\n```\n\n# Output:\n\n```\nA\nC\n```\n\nWhat if we want to\
    \ call the method `f` of class `B` from within class `C`? We use the class function\
    \ syntax: `B.f(self)`."
- md: "## 12.6.7 Constructors and Destructors in Multiple Inheritance\n\nSection 12.6.4\
    \ emphasized on the order of construction and destruction and explained how this\
    \ can be done by the programmer. The following program puts it all together to\
    \ illustrate the best way of writing programs in Python that employ multiple inheritance:\n\
    \n**inheritance10.py**\n\n```python\n#!/usr/bin/python\n\n# Inheritance Demo:\n\
    # Multiple Inheritance - Constructors and Destructors\n\nclass A:\n    def __init__(self):\n\
    \        print(\"A constructed\")\n    def __del__(self):\n        print(\"A destroyed\"\
    )\n\nclass B:\n    def __init__(self):\n        print(\"B constructed\")\n   \
    \ def __del__(self):\n        print(\"B destroyed\")\n\nclass C(A,B):\n    def\
    \ __init__(self):\n        A.__init__(self)\n        B.__init__(self)\n      \
    \  print(\"C constructed\")\n    def __del__(self):\n        print(\"C destroyed\"\
    )\n        B.__del__(self)\n        A.__del__(self)\n\nc=C()\ndel(c)\n```\n\n\
    **Output:**\n\n```\nA constructed\nB constructed\nC constructed\nC destroyed\n\
    B destroyed\nA destroyed\n```\n\n**Observation:**\n\n1. The constructor of class\
    \ C first passes control to the constructor of class A, then the constructor of\
    \ class B and then continues its execution.\n2. The destructor of class C first\
    \ executes itself and finally calls the destructor of class B followed by the\
    \ destructor of class A.\n3. As pointed out in section 12.6.4, this is done to\
    \ honour the rule that base classes can exist without derived classes but not\
    \ the other way around.\n4. The order of inheritance is respected: class A is\
    \ the first base class of class C and hence is created first but destroyed last.\n\
    \n## 12.7 Dynamic Polymorphism\n\nA very important feature of OOP is *dynamic\
    \ polymorphism* вАУ the mechanism of deciding which function to invoke at runtime\
    \ depending on the type of the invoking object.\n\nBefore actually understanding\
    \ dynamic polymorphism, it is important to realize that *subclasses are perfectly\
    \ substitutable for base classes*, meaning that in any situation where we require\
    \ a reference to a base class instance, a reference to a derived class instance\
    \ will do equally well. Let us illustrate that through a sample program:\n\n**Inheritance11.py**\n\
    \n```python\n#!/usr/bin/python\n\n# Inheritance Demo:\n# Dynamic Polymorphism\n\
    \nclass Animal:\n    def __init__(self,name):\n        self.name = name\n\n  \
    \  def speak(self):\n        pass\n\nclass Dog(Animal):\n    def __init__(self):\n\
    \        super().__init__(\"Dog\")\n\n    def speak(self):\n        print(\"Bow\
    \ wow!\")\n\nclass Cat(Animal):\n    def __init__(self):\n        super().__init__(\"\
    Cat\")\n\n    def speak(self):\n        print(\"Meow!\")\n\n\ndef introduce(animal):\n\
    \    print(\"Hi! This animal is called\",animal.name)\n    print(\"This animal\
    \ says: \",end='')\n    animal.speak()\n\nanimal = Dog()\nintroduce(animal)\n\
    animal = Cat()\nintroduce(animal)\n```\n\n**Output:**\n\n```\nHi! This animal\
    \ is called Dog\nThis animal says: Bow wow!\nHi! This animal is called Cat\nThis\
    \ animal says: Meow!\n```\n\n**Observation:**\n\n1. Class `Animal` is defined\
    \ in line 6. It contains a constructor and a method called `speak`.\n2. The constructor\
    \ (defined in line 7) receives the name of the animal and stores it in the attribute\
    \ `name`.\n3. The `speak` method (defined in line 10) does nothing and will be\
    \ overridden by the derived classes suitably.\n4. The `Dog` class (defined in\
    \ line 13) derives from the `Animal` class. Its constructor receives nothing,\
    \ but invokes the constructor of `Animal` passing \"Dog\" as the name of the animal.\
    \ Its `speak` method ends up printing \"Bow wow!\"\n5. The `Cat` class (defined\
    \ in line 20) derives from the `Animal` class. Its constructor receives nothing,\
    \ but invokes the constructor of `Animal` passing \"Cat\" as the name of the animal.\
    \ Its `speak` method ends up printing \"Meow!\"\n6. The `introduce` function (defined\
    \ in line 28) accepts an animal, prints its name and invokes its `speak` method\
    \ to make the animal вАЬspeakвАЭ. While the function is designed to receive an instance\
    \ of the type `Animal`, it can also receive an instance of any derived class of\
    \ `Animal` because of the law of substitutability introduced at the beginning\
    \ of this section. If a `Dog` instance is passed, preference is given to the `speak`\
    \ method of `Dog` and if a `Cat` instance is passed, preference is given to the\
    \ `speak` method of `Cat`. If `Dog` or `Cat` class does not override the `speak`\
    \ method of `Animal`, then the speak method of `Animal` gets invoked which does\
    \ nothing.\n\n### 12.7.1 Abstract Methods and Classes\n\nThe previous program\
    \ shows 2 disadvantages of the way the `speak` method has been defined in `Animal`:\n\
    \n1. We are forced to provide an empty definition of the method, which can seem\
    \ a little odd at best.\n2. If any of the derived classes do not override the\
    \ `speak` method, there is no output on invoking the `speak` method as the `speak`\
    \ method of `Animal` gets invoked and it is empty. There was no way to force the\
    \ derived class to override the `speak` method.\n\nThese 2 disadvantages can be\
    \ eliminated. The class can be made an abstract class using the `abc` package\
    \ and the method can be made an abstract method using `@abstractmethod`, both\
    \ of which are outside the scope of this book.\n\n## 12.8 Attribute Handling,\
    \ Magic Functions and Operator Overloading\n\nA very interesting feature in Python\
    \ is that certain operations when performed on objects will result in certain\
    \ standard functions being called. What is interesting in this is that it does\
    \ not appear that such a call is taking place!\n\nThis same principle is also\
    \ used to implement operator overloading in Python вАУ the mechanism by which an\
    \ operator plays the same logical role but the implementation depends on the operand\
    \ types on which the operator operates.\n\nWhile this section focuses on operator\
    \ overloading, we start with certain standard functions that are called when some\
    \ basic operations are performed on objects. After an understanding of this, we\
    \ will proceed to add support for operators to our classes.\n\n### 12.8.1 Attribute\
    \ Handling\n\nSection 12.4.1 introduced the fact that instances can have attributes\
    \ of their own. We use the syntax `object.attribute` to access such attributes.\
    \ There are functions available in Python to deal with attributes of instances.\n\
    \n#### 12.8.1.1 The hasattr() Function\n\nThe `hasattr()` function tells whether\
    \ a particular instance has a particular attribute or not.\n\n**Syntax:**\n\n\
    ```\nhasattr(object, attribute)\n```\n\nThis is a Boolean function that returns\
    \ true only if the given instance contains the given attribute, as shown in the\
    \ code snippet below:\n\n```python\n>>> class A:\n...     def __init__(self):\n\
    ...             self.x=0\n...\n>>> a=A()\n>>> hasattr(a, 'x')\nTrue\n>>> hasattr(a,\
    \ 'y')\nFalse\n```\n\n**Observation:**\n\n1. We define a class A that contains\
    \ a constructor which initializes an attribute x to 0 (thereby creating it). Since\
    \ the constructor is invoked each time an instance is created, it is guaranteed\
    \ that all instances of A will have the attribute x in them.\n2. `hasattr(a, 'x')`\
    \ therefore returns True whereas `hasattr(a, 'y')` returns False since no attribute\
    \ y was created in the instance a.\n\n#### 12.8.1.2 The getattr() Function\n\n\
    The `getattr()` function returns the value of an attribute within an instance\
    \ if it exists, returning a default value (if provided) if the attribute does\
    \ not exist.\n\n**Syntax:**\n\n```\ngetattr(object, attribute[, default])\n```\n\
    \n**Note:**\n\n1. If the attribute `attribute` exists in the instance `object`,\
    \ its value is returned.\n2. If the attribute `attribute` does not exist in the\
    \ instance `object`, `default` is returned.\n3. If the attribute `attribute` does\
    \ not exist in the instance `object` and no `default` is provided, an `AttributeError`\
    \ occurs.\n\n**Example:**\n\n```python\n>>> class A:\n...     def __init__(self):\n\
    ...             self.x=0\n...\n>>> a=A()\n>>> getattr(a,'x',2)\n0\n>>> getattr(a,'y',2)\n\
    2\n>>> getattr(a,'y')\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nAttributeError: 'A' object has no attribute 'y'\n```\n\n\
    **Observation:**\n\n1. `getattr(a,'x',2)` returns the value of the attribute `x`\
    \ in the instance `a`, which is 0.\n2. `getattr(a,'y',2)` returns the value 2\
    \ (the `default`) as there is no attribute `y` in the instance `a`.\n3. `getattr(a,'y')`\
    \ generates an `AttributeError` as there is no attribute `y` in the instance `a`\
    \ and no `default` was provided either."
