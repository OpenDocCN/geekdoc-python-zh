  - '[PAGE 573]


    There are additional methods to handle these and their syntax is shown below:


    ```

    HTMLParser.handle_comment(self, commentText)

    HTMLParser.handle_entityref(self, entityName)

    HTMLParser.handle_charref(self, entityCode)

    HTMLParser.handle_decl(self, declarationText)

    HTMLPartser.unknown_decl(self, declarationText)

    HTMLParser.handle_pi(self, processingInstruction)

    ```


    # 17.2.2 Feeding HTML Data


    We have already seen how to respond to various parts in an HTML document. We have
    also seen the `feed()` method that is used to provide the HTML data and has the
    following syntax:


    ```

    HTMLParser.feed(self, data)

    ```


    This method feeds in the given `data` to the parser and that results in an immediate
    execution of suitable methods. Data can be вАЬaddedвАЭ to the parser by calling this
    method several times. Technically, data is buffered internally since this method
    can be called any time with more content. This means that text content can remain
    in the buffer, unreported via any of the methods discussed. The buffer is guaranteed
    to be flushed out when we invoke the `close()` method on the parser object:


    ```

    HTMLParser.close(self)

    ```


    # 17.3 Working with Beautiful Soup


    **BeautifulSoup** is another HTML/XHTML & XML parser that uses another parser
    as itвАЩs backend and provides many useful easy-to-use functionalities. BeautifulSoup
    is not in-built in Python and hence has to be manually installed. The next section
    shows you how to do it. Documentation is available at https://www.crummy.com/software/BeautifulSoup/bs4/doc/.'
  - '[PAGE 574]


    Here is a list of important capabilities of BeautifulSoup:


    +   1. Can parse HTML, XHTML and XML documents

    2. Permits extraction of details in a very simple manner

    3. Permits navigation between nodes in the parse tree

    4. Permits a powerful search mechanism to directly locate nodes the programmer
    is interested in

    5. Permits writing back into the parse tree (modification and creation of documents)

    6. Can convert the tree into a string and can even prettify it!


    # 17.3.1 Installing BeautifulSoup


    The simplest way of installing BeautifulSoup is by using PIP (section 15.7) as
    follows:


    ```

    pip3 install beautifulsoup4

    ```


    While BeautifulSoup uses `lxml` parser or `HTMLParser` as it''s default backend
    engine, it can be configured to work with other parsers as well, in which case
    those parsers also need to be installed if not already present.


    # 17.3.2 Reading HTML Content


    If the HTML content is small (as was demonstrated in earlier sections), we can
    store that HTML content to be parsed in a string and pass it as an argument to
    the constructor of BeautifulSoup as illustrated in the syntax below:


    ```

    BeautifulSoup(htmlString [,parser])

    ```


    The `parser` argument can be either "lxml" to select the lxml HTML parser or "html.parser"
    to select the `HTMLParser` covered in section 17.2 before. If omitted, it will
    automatically pick a parser from amongst the available parsers in the system.'
