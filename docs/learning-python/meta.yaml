    # SUMMARY


    +   > All objects are ultimate instances of classes that derive from __builtin__.object.
    All primitive data types derive from numbers.Number (which is a subclass of __builtin__.object),
    or more specifically from the numbers.Complex class, of which complex is a direct
    subclass.

    > All non-complex numbers are represented by the numbers.Real class, of which
    float is a direct subclass.

    > All non-float real numbers are represented by the numbers.Rational class, of
    which fractions.Fraction is a direct subclass.

    > All integral classes (int and bool) are subclasses of numbers.Integral, which
    derives from numbers.Rational.

    > The constructors int(), bool(), float(), complex() and str() help manufacture
    objects of their respective classes, and also help in converting from other types.

