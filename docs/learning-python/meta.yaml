- img_proc: true
  md: '1. We need not scan the expression for considering the operator precedence
    and associativity. We can easily evaluate from left to right.

    2. In infix expressions, parentheses are frequently used to alter operator precedence.
    In postfix expressions, we don''t use parentheses at all since there is no precedence
    to deal with once the expression has been carefully framed.

    3. For the above reasons, we find it easier to write programs to evaluate postfix
    expressions than infix expressions.

    4. The above reasons also justify the use of prefix over infix, but what makes
    postfix slightly better than prefix is that we can directly use a stack to evaluate
    postfix expressions (as will be seen later in this section).


    While evaluation of postfix expressions is very simple, conversion of infix expressions
    to postfix is slightly more complicated since we will have to deal with precedence
    of operators in the infix expression.


    The next program converts a valid infix arithmetic expressions to it''s postfix
    equivalent. Of course, the program makes the same assumptions as the previous
    one вАУ that the operands are single-character variables and the operators are binary
    вАЬ+вАЭ, вАЬ-вАЭ, вАЬ*вАЭ and вАЬ/вАЭ.


    The basic logic used in the program is as follows (using a stack for storing operators
    temporarily):


    +   1. Accept an infix expression from the user and scan it character by character
    from left to right.

    2. If the character is an operand, transfer it to the output string as it is (since
    operands are always in place and only operator positions are to be changed).

    3. On encountering an opening parentheses, push it into an operator stack (since
    we are interested in encountering the corresponding closing parentheses to process
    it completely).

    4. On encountering a closing parentheses, pop all operators from the operator
    stack to the output string till we encounter an opening parentheses in the stack,
    which is discarded. This will ensure that the entire expression within the parentheses
    is processed.

    5. On encountering an operator, we pop all operators from the stack that have
    a higher precedence than the operator currently being processed, transferring
    them to the output string. We then push the current operator into the operator
    stack. This will ensure that operators are presented in the right order.

    6. After processing the entire infix expression, we pop out the remaining operators
    from the operator stack and transfer them to the output string.'
