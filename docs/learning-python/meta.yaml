    There are certain conventions recommended for forming good documentation strings:


    +   1. The first line should be a 1-line summary of the function''s purpose. This
    line should typically start with an uppercase alphabet and end with a period,
    avoiding the function name (unless it is being used as an English word). This
    line must be indented as the rest of the function body is.

    2. The first line (summary) is separated from the rest of the lines (description)
    by a blank line.

    3. The description can span any number of lines and can provide additional information
    about the function and it''s specialities. These are generally indented as the
    rest of the function body is (but indentation is not compulsory). Any spaces and
    tabs used for indentation is retained as part of the documentation string by the
    Python parser (but other tools can be designed to ignore the indentation)


    Here is a revised `isPrime()` function definition, modified from `prime7.py`:


    ```

    >>> def isPrime(n):

    ...     """Returns whether n is prime or not.

    ...

    ...     Given a non-negative integer n, this function

    ...     returns True if n is prime and False otherwise.

    ...     The argument n is assumed to be a positive integer

    ...     greater than 1 (since 1 is neither prime nor composite).

    ...     No argument validation is performed.

    ...     """

    ...     for i in range(2,int(n/2)+1):

    ...             if n%i==0: return False

    ...     return True

    ...

    ```


    Since the Python parser parses through the documentation string, we can always
    access it using the special member `__doc__` of the function as shown below:


    ```

    >>> isPrime.__doc__

    ''Returns whether n is prime or not.\n\n\tGiven a non-negative integer n, this
    function\n\treturns True if n is prime and False otherwise.\n\tThe argument n
    is assumed to be a positive integer\n\tgreater than 1 (since 1 is neither prime
    nor composite).\n\tNo argument validation is performed.\n\t''

    ```


    # Observation:


    +   1. We are using the function reference (`isPrime`) to access the member `__doc__`.
    Note that there are no parentheses after the function name, preventing it from
    becoming a function call.'
