    \ filename:\")\n\ntry:\n    file = open(filename)\n    contents = list(file.read())\n\
    \    for line in contents: print(line,end='')\nexcept Exception as e:\n    print(\"\
    Unable to open file: {}\".format(filename))\n    print(\"Reason: {}\".format(str(e)))\n\
    ```\n\n```\nEnter filename:blah\nUnable to open file: blah\nReason: [Errno 2]\
    \ No such file or directory: 'blah'\n```\n\n**Observation:**\n\n- 1. This program\
    \ is very similar to the previous one with changes only in lines 9-10.\n- 2. A\
    \ file is a sequence of lines and hence can be passed to the constructor of list\
    \ to convert each item of the sequence (line in the file) to an item in the list.\
    \ This is done in line 9.\n- 3. Line 10 then iterates through the list and prints\
    \ each item of the list. Note that each line is terminated by the newline character\
    \ and hence we need to ask print not to print a newline character of its own.\
    \ The last line of the file may or may not have a terminating newline character,\
    \ and will be reflected accordingly in the last item of the list.\n\nThis same\
    \ functionality is obtained by using the `readlines()` method:\n\n```\nfileObject.readlines([sizeHint])\n\
    ```\n\n**Note:**\n\n- 1. The `readlines()` method reads the entire file and returns\
    \ a list of strings with each item being a line of the file.\n- 2. Each string\
    \ item of the list will have a terminating newline character, except perhaps the\
    \ last line which would depend on whether or not there was a terminating newline\
    \ character at the end of the file.\n- 3. The optional `sizeHint` parameter is\
    \ the suggested maximum number of bytes you are willing to read from the file,\
    \ but the actual result is implementation dependent and should not be relied upon.\
    \ When omitted (which is what we would be doing almost always), it means that\
    \ we are interested in reading the entire file contents.\n\n### 14.3.2 Reading\
    \ Files a Line at a Time\n\nThe previous section showed how we can access the\
    \ file contents by completely loading at one go. We saw 2 approaches that give\
    \ us identical results:\n\n- 1. Loading the entire content as a single string\n\
    - 2. Loading the entire content as a list of lines (strings)\n\nThis section focuses\
    \ on how to read the file contents a line at a time, which might appear similar\
    \ to approach 2 above, but differs in that we are not loading the entire file.\
    \ Loading an entire file into memory might be inefficient when the file is big\
    \ and could even make your program unstable as it runs out of memory. When it\
    \ is not known for sure that the file is expected to be reasonably small, it is\
    \ far better to load it a line at a time instead.\n\n#### 14.3.2.1 Reading a Line\
    \ at a Time by Iterating Through the File\n\nA file is a sequence of lines that\
    \ can be directly iterated upon, as demonstrated in the program below:\n\n**cat3.py**\n\
    \n```python\n#!/usr/bin/python\n\n# Implementation of cat command to display the\
    \ contents of a file\n\nfilename = input(\"Enter filename:\")\n\ntry:\n    file\
    \ = open(filename)\n    for line in file: print(line,end='')\nexcept Exception\
    \ as e:\n    print(\"Unable to open file: {}\".format(filename))\n    print(\"\
    Reason: {}\".format(str(e)))\n```\n\n**Output:**\n\n```\nEnter filename:cat3.py\n\
    #!/usr/bin/python\n\n# Implementation of cat command to display the contents of\
    \ a file\n\nfilename = input(\"Enter filename:\")\n\ntry:\n    file = open(filename)\n\
    \    for line in file: print(line,end='')\nexcept Exception as e:\n    print(\"\
    Unable to open file: {}\".format(filename))\n    print(\"Reason: {}\".format(str(e)))\n\
    ```\n\n```\nEnter filename:blah\nUnable to open file: blah\nReason: [Errno 2]\
    \ No such file or directory: 'blah'\n```\n\n**Observation:**\n\n- 1. This program\
    \ is similar to the previous program (`cat2.py`) with the change highlighted in\
    \ line 9.\n- 2. While the previous program read the entire file into a list and\
    \ then iterated through the list, this program iterates through the file directly,\
    \ giving scope for better memory handling.\n- 3. The loop in line 9 could have\
    \ been replaced by a statement like `for line in list(file)` or `for line in file.readlines()`,\
    \ but these would load the entire file in memory resulting in poorer memory management.\n\
    \n#### 14.3.2.2 Reading a Line at a Time From a File Using readline()\n\nJust\
    \ as how the `readlines()` method reads all lines from a file and returns it in\
    \ the form of a list, the `readline()` method reads a single line from a file\
    \ and returns it as a string.\n\n**Syntax:**\n\n```\nfileObject.readline([size])\n\
    ```\n\n**Note:**\n\n- 1. This method reads and returns a single line from the\
    \ file identified by the file object `fileObject`.\n- 2. The optional `size` parameter\
    \ can be used to specify the maximum number of characters to read from the file.\
    \ When omitted, it means read till the end of line (till the newline character\
    \ is read) or till the end of file.\n- 3. If the read line terminated with a newline\
    \ character (which would be the case for all lines except possibly the last line\
    \ in the file), the terminating newline character is retained as the last character\
    \ of the string that is returned.\n- 4. If already at the end of file, a null\
    \ string is returned.\n\nHere is an implementation of `cat` using `readline()`:\n\
    \n**cat4.py**\n\n```python\n#!/usr/bin/python\n\n# Implementation of cat command\
    \ to display the contents of a file\n\nfilename = input(\"Enter filename:\")\n\
    \ntry:\n    file = open(filename)\n    while 1:\n        line = file.readline()\n\
    \        if not line: break\n        print(line,end='')\nexcept Exception as e:\n\
    \    print(\"Unable to open file: {}\".format(filename))\n    print(\"Reason:\
    \ {}\".format(str(e)))\n```"
