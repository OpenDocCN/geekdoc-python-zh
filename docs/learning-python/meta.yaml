  md: '# APPENDIX вАУ PYTHON 2 VS. PYTHON 3


    # 21.1 Introduction


    Though we have stable releases of Python 3.x (3.6) and Python 2.x(2.7) available,
    the first question that comes to the mind of an individual is вАЬWhich version of
    Python do I use for my day to day activities?вАЭ. The short answer is вАЬPython 2
    is legacy and therefore Python 3 is the way to go!вАЭ. The long answer is вАЬit depends
    on what your needs are!вАЭ. However, if a beginner intends to start learning Python,
    he or she should consider learning and building on Python 3 and only if required,
    get gradually acquainted with Python 2 and its differences from Python 3.


    Python 3 evolved when the inventor of Python вАУ Guido Van Rossum вАУ decided to clean
    up Python 2 and in this journey gave very less importance to backward compatibility!
    It is therefore necessary to choose the right version and stick to it right from
    the beginning!


    It is interesting to note that few of the improvements in Python 3.0 & 3.1 were
    back-ported to Python 2.6 & 2.7 respectively! Hence, if there is a need to use
    Python 2, it is recommended to use Python 2.7.x.


    This module will first show you some fundamental and obvious differences between
    Python 2 and Python 3, then will proceed to show you how to convert legacy Python
    2 code into Python 3 with least effort, and finally, will show how to write code
    that runs equally well on both versions, if need be.


    # 21.2 The Fundamental Differences


    This section covers the fundamental and obvious changes that got introduced in
    Python 3.0 from Python 2.5


    # 21.2.1 The print() Function


    The `print` statement of Python 2 has been replaced by a `print()` function in
    Python 3.


    | Python 2 | Python 3 |

    | --- | --- |

    | >>> print "2+3=", 2+3<br>2+3=5 | >>> print("2+3=", 2+3)<br>2+3=5 |'
  merge: -1
  pgno: 646
- img_proc: true
  md: '# 21. Appendix вАУ Python 2 Vs. Python 3


    In Python 2, a trailing comma at the end of a print statement suppresses the newline
    character at the end. This has been replaced by the `end` keyword argument of
    the `print()` function in Python 3:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> print 25,`<br>`25`<br>`>>>` | `>>> print(25,end="")`<br>`25>>>` |


    > **NOTE:**

    In Python 2, the interpreter will display the prompt in the next line even when
    the print statement did not print a newline. This newline character will not be
    printed when executed as a script, however!


    To print an empty line, Python 3 uses `print()` whereas Python 2 uses `print`:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> print`<br>`>>>` | `>>> print()`<br>`>>>` |


    Keyword arguments like `end` were introduced in Python 3. We similarly can now
    provide a separator between items using the `sep` keyword argument (section 2.7.1.3)
    as follows:


    ```

    >>> print("I have", 5, "items", sep=":")

    I have:5:items

    ```


    # 21.2.2 Views and Iterators Instead of Lists


    Some methods that earlier returned lists/tuples in Python 2 have been replaced
    by methods that return views and iterators instead. What this means is that instead
    of getting an entire collection at one go, we instead get an object through which
    we can iterate and extract a single element at a time. This results in better
    efficiency. Of course, if required, we can construct a list or tuple out of it
    and access all the elements at once. This section shows some of the most noticeable
    changes introduced in Python 3 in this regard.'
  merge: -1
  pgno: 647
