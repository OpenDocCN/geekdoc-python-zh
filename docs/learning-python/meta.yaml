    **Form #1:** `str.lstrip()`

    This function left-strips the string `str`. It ends up removing the leading whitespaces
    from the string `str` and returns the new string:


    ```

    >>> " \t\r\nHello \t\r\n".lstrip()

    ''Hello \t\r\n''

    ```


    **Note:**

    1. If the string `str` does not start with a whitespace, this function simply
    returns the original string without any changes


    **Form #2:** `str.lstrip(chars)`

    If we wish to strip other characters apart from whitespaces, this form of the
    function can be used. We can specify all the characters (as a single string) that
    we wish to strip, if found at the beginning of the string `str`.


    The following example removes all digits from the beginning of a string:


    ```

    >>> "233Hello466World599".lstrip("0123456789")

    ''Hello466World599''

    ```


    # 8.5.1.2 Right Stripping Using rstrip()


    The `rstrip()` function strips trailing characters (rightmost characters) from
    a string and returns the new string.


    Complete syntax:


    ```

    str.rstrip([chars])

    ```'
