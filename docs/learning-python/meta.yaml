    3.  `([eE][-+]?\d+)?` е§ДзРЖжМЗжХ∞и°®з§Їж≥ХпЉИe жИЦ EпЉЙпЉМеРОиЈЯеПѓйАЙзЪДж≠£иіЯеПЈпЉМеЖНеРОиЈЯжХіжХ∞жМЗжХ∞йГ®еИЖгАВжХідЄ™йГ®еИЖжШѓеПѓйАЙзЪДгАВ


