  md: '# SUMMARY


    +   > Functions need to be defined before they can be called.

    > Functions are objects and references to them can be stored in variables!

    > Positional Arguments are always assigned on a one-to-one basis, from the function
    call arguments to the function definition parameters.

    > Default Arguments cannot be followed by Positional Arguments. Any default argument
    omitted at the place of call will take on its default value in the definition.

    > Keyword Arguments can be used to change the order of Positional Arguments at
    the place of function call.

    > Keyword Arguments can be used to specify certain Default Arguments while leaving
    out others.

    > Keyword Arguments permit the creation of dynamic, user-defined parameters that
    can be received and processed by the function without documenting the parameter
    names in advance!

    > Keyword Arguments cannot be followed by non-keyword arguments.

    > Variable Arguments permit the function call to pass as many arguments as required
    and yet be processed using a single collection variable in the function definition.

    > Variable Arguments should not be followed by Positional Arguments in the function
    definition parameter list.'
