    # 11.3.1 Using map() With Multiple Iterables


    A more general syntax of the `map()` function accepts multiple iterables instead
    of one. In such a mapping, corresponding elements from each of the iterables are
    taken at one time and sent to the mapping function and the return value is collected
    into an output sequence that is finally returned. Of course, now the mapping function
    has to receive as many arguments as the number of iterables passed to the `map`
    function!


    Here is an example of using `map` to add corresponding elements of 3 lists:


    ```

    >>> L1=[1,2,3]

    >>> L2=[4,5,6]

    >>> L3=[7,8,9]

    >>> def f(a,b,c): return a+b+c

    ...

    >>> M=list(map(f,L1,L2,L3))

    >>> M

    [12, 15, 18]

    ```


    **Observation:**


    +   1. The `map()` function is receiving the mapping function reference (`f`)
    and 3 lists (`L1`, `L2` and `L3`).

    2. The mapping function (`f`) therefore receives 3 arguments (`a`, `b` and `c`)
    вАУ one per list. The function `f` returns the sum of it''s arguments.

    3. The number of elements in the output sequence is the same as the number of
    elements in the other input lists. If the input lists did not all have the same
    number of elements, the smallest list is considered and the additional elements
    of the other lists are ignored. The length of the output list, therefore, is the
    same as the length of the smallest input list.


    # 11.4 The filter() Function


    As the name suggests, the `filter()` function filters a sequence вАУ it''s elements
    are passed through a filtering function and only those elements that pass a criteria
    are allowed to pass through while the rest are вАЬblockedвАЭ.


    **Syntax:**


    ```

    filter(func,sequence)

    ```


    Each element in the sequence `sequence` is sent to the function `func` as an argument,
    and if the function returns `True`, will be sent to an output sequence that is
    finally returned by `filter()`. The output sequence is returned as an iterable
    object'
- md: 'which can be sequentially accessed or can be converted to a suitable sequence
    like a list.


    Here is an example of using `filter` to filter out odd integers from a list and
    retain only even elements:


    ```

    >>> L=[1,6,4,9,7]

    >>> def f(x): return x%2==0

    ...

    >>> M=list(filter(f,L))

    >>> M

    [6, 4]

    ```


    ## Observation:


    - 1. Our input list is L, comprising of the elements 1, 6, 4, 9 and 7.

    - 2. We define a filtering function called f, which returns True only if it''s
    argument is even.

    - 3. We use the filter() function passing a reference to our filtering function(f),
    as the first argument and our input list(L) as the second.

    - 4. The filter() function will filter through the elements of L using f for each
    element of L and returns the final result as an iterable object, which we convert
    to a list for convenience.

    - 5. We finally observe that the list M contains only the even elements that were
    present in the list L, and in the same order as found in L.


    ## 11.4.1 Special Cases of filter()


    We have seen the typical use of filter() in the previous section. There are 2
    special cases to be considered, however.


    The first special case arises when the filtering function reference (first argument
    to filter()) is None. This will result in the filtering of all elements of the
    sequence based on their truth value -- only those elements in the sequence that
    evaluate to Boolean True are allowed to pass through, as shown in the example
    below:


    ```

    >>> L=[1,0,6,4,0,9,7]

    >>> M=list(filter(None,L))

    >>> M

    [1, 6, 4, 9, 7]

    ```


    For integers, 0 is considered False whereas any other integer value is considered
    True. Therefore, in the above example, we observe that the occurrences of 0 are
    filtered out.


    The second special case arises when we want the reverse вАУ we want to filter out
    those elements of the sequence that evaluate to Boolean `False`. This can be done
    using `itertools.filterfalse()` function, which is the negated form of `filter()`
    as demonstrated below:


    ```

    >>> from itertools import filterfalse

    >>> L=[1,0,6,4,0,9,7]

    >>> M=list(filterfalse(None,L))

    >>> M

    [0, 0]

    ```


    **Observation:**


    - 1. Unlike the `filter()` function which is a built-in, the `filterfalse` function
    is present in the module `itertools` and hence needs to be imported.

    - 2. When the filtering function reference (the first argument to `filterfalse`)
    is not `None`, this function filters out all those elements for which the filtering
    function returns `True` and only allows those elements to pass for which the filtering
    function return `False`, behaving in a manner opposite of `filter`.


    ## 11.5 The reduce() Function


    As the name suggests, the `reduce()` function reduces a sequence to a single value
    вАУ it''s elements are cumulatively passed through a reducing function that reduces
    two arguments to a single value each time. The first argument to the reducing
    function is the accumulated value so far while the second argument is an element
    picked up from the sequence.


    **Syntax:**


    ```

    reduce(func,sequence[,initial])

    ```


    The initial accumulated value is taken to be `initial` if specified, or `0` if
    not specified. To begin with, this initial accumulated value and the first element
    of sequence is passed to the function `func`. The return value from the function
    becomes the new accumulated value, which along with the next element from `sequence`
    is then passed to the function `func`. This process continues as many times as
    the number of elements in `sequence`. The final accumulated value is returned
    by `reduce()`.


    Here is an example of using `reduce` to find the sum of all elements in a list:


    ```

    >>> from functools import reduce

    >>> def f(x,y): return x+y

    ...

    >>> L=[1,6,4,9,7]

    >>> sum=reduce(f,L)

    >>> sum

    27

    ```


    ## Observation:


    - 1. The `reduce()` function is imported from the `functools` module.

    - 2. The reducing function (`f`) receives 2 arguments вАУ the accumulated value
    and an element from the sequence вАУ and returns their sum.

    - 3. The `reduce` function accepts a reference to the reducing function (`f`)
    and the sequence to operate on (`L`)

    - 4. Since 0 is the default initial accumulated value and is also the additive
    identity, we don''t need to explicitly provide any initial value.


    Similarly, here is an example of using `reduce` to find the product of all elements
    in a list:


    ```

    >>> from functools import reduce

    >>> def f(x,y): return x*y

    ...

    >>> L=[1,6,4,9,7]

    >>> product=reduce(f,L,1)

    >>> product

    1512

    ```


    ## Observation:


    - 1. This example is similar to the previous one, except for the third argument
    to `reduce()`.

    - 2. Since 1 is the multiplicative identity and 0 is the default initial accumulated
    value, we need the initial accumulated value to be 1. This is explicitly provided
    as the third argument to `reduce()`, failing which the product will always be
    0.


    ## 11.6 Practical Use of map(), filter() and reduce() Using Lambda Expressions


    The use of lambda expressions (section 10.13) in conjunction with `map()`, `filter()`
    and `reduce()` can help process sequences using minimal code! This section illustrates
    this point using a few practical examples.


    First of all, let us revisit all the examples we have covered for `map()`, `filter()`
    and `reduce()` in the preceding sections and rewrite them using lambda expressions.


    To multiply each element of a list by 2:


    ```

    >>> L=[1,6,4,9,7]

    >>> M=list(map(lambda x: 2*x, L))

    >>> M

    [2, 12, 8, 18, 14]

    ```


    To convert all characters of strings in a list to uppercase:


    ```

    >>> L=[''Hello'', ''World'']

    >>> M=list(map(lambda x: x.upper(), L))

    >>> M

    [''HELLO'', ''WORLD'']

    ```


    To add corresponding elements of 3 lists:


    ```

    >>> L1=[1,2,3]

    >>> L2=[4,5,6]

    >>> L3=[7,8,9]

    >>> M=list(map(lambda a,b,c: a+b+c, L1, L2, L3))

    >>> M

    [12, 15, 18]

    ```


    To filter out the odd integers and allow only even integers of a list to pass
    through:


    ```

    >>> L=[1,6,4,9,7]

    >>> M=list(filter(lambda x: x%2==0, L))

    >>> M

    [6, 4]

    ```


    To add all elements of a list:


    ```

    >>> from functools import reduce

    >>> L=[1,6,4,9,7]

    >>> sum=reduce(lambda x,y: x+y, L)

    >>> sum

    27

    ```


    To multiply all elements in a list:


    ```

    >>> from functools import reduce

    >>> L=[1,6,4,9,7]

    >>> product=reduce(lambda x,y: x*y, L, 1)

    >>> product

    1512

    ```


    And now, here is a program to analyse the marks of n students in a class:


    ## marksAnalyzer.py


    ```

    #!/usr/bin/python


    # Program to analyse the marks of ''n'' students in a class


    from functools import reduce


    marks = list( map(lambda x: int(x), input("Enter the marks of ''n'' students:
    ").split('' '')))

    n = len(marks)


    maxMarks = max(marks)

    minMarks = min(marks)

    sumMarks = reduce(lambda x,y: x+y, marks)

    avgMarks = sumMarks/n


    numPasses = len(list(filter(lambda x: x>35, marks)))

    numFailures = n-numPasses

    percentPasses = numPasses/n*100


    print("Analysed marks of {} students:".format(n))

    print("Minimum marks: {} Maximum marks: {}".format(minMarks,maxMarks))

    print("Average marks: {}".format(avgMarks))

    print("Passes: {} Failures: {}".format(numPasses,numFailures))

    print("Pass percentage: {}".format(percentPasses))

    ```


    ## Output:


    ```

    Enter the marks of ''n'' students: 60 90 25 12 59

    Analysed marks of 5 students:

    Minimum marks: 12 Maximum marks: 90

    Average marks: 49.2

    Passes: 3 Failures: 2

    Pass percentage: 60.0

    ```


    ## Observation:


    - 1. This program uses all 3 functions: `map()`, `filter()` and `reduce()`.

    - 2. In line 7, we ask the user to enter all the marks, split it on spaces, convert
    the split strings to integers using map, convert the result to a list and store
    it in `marks`.

    - 3. Lines 10-11 employ the built-in functions `max()` and `min()` to find the
    maximum and minimum marks respectively.

    - 4. Line 12 uses the `reduce()` function to find the sum of the marks present
    in the list `marks`.

    - 5. Line 15 filters the list `marks` to search for those marks that indicate
    a pass using the `filter()` function. Of course, we are only interested in the
    number of passes, which is counted by the built-in `len()` function.


    ## 11.7 List Comprehensions


    A *list comprehension* is a special syntax supported by Python to quickly build
    lists. A list comprehension can even eliminate the need to use `map()` and `filter()`
    functions, providing a shorter syntax instead! Let us therefore start introducing
    list comprehensions as replacements to `map()` and `filter()` using the examples
    we saw in preceding sections.


