    <class 'bs4.element.Tag'>\n```\n\n**иІВеѓЯпЉЪ**\n\n1.  и°®иЊЊеЉПsoup.titleпЉМеЕґдЄ≠soupжМЗдї£еЈ≤иІ£жЮРжЯРдЇЫHTMLеЖЕеЃєзЪДBeautifulSoupеѓєи±°пЉМињФеЫЮдЄАдЄ™еЉХзФ®пЉМиѓ•еЉХзФ®жМЗеРСи°®з§ЇHTMLеЖЕеЃєдЄ≠titleж†Зз≠ЊзЪДTagеѓєи±°гАВ\n\
    2.  жИСдїђзЬЛеИ∞Tagеѓєи±°зЪДе≠Чзђ¶дЄ≤и°®з§ЇжШѓж†Зз≠ЊеПКеЕґеЖЕеЃєвАФвАФеЬ®ж≠§з§ЇдЊЛдЄ≠дЄЇ\"<title>HTML Demonstration</title>\"гАВ\n3. \
    \ жИСдїђеПѓдї•й™МиѓБTagеѓєи±°зЪДз±їеЮЛз°ЃеЃЮжШѓbs4.element.TagгАВ\n\nзїЩеЃЪдЄАдЄ™`Tag`еѓєи±°пЉМе¶ВжИСдїђдЄКйЭҐжПРеПЦзЪДпЉМжИСдїђеПѓдї•иОЈеПЦдї•дЄЛдњ°жБѓпЉЪ\n\n1.\
    \  ж†Зз≠ЊзЪДеРНзІ∞\n2.  ж†Зз≠ЊзЪДе±ЮжАІ\n3.  ж†Зз≠ЊзЪДе≠Чзђ¶дЄ≤еЖЕеЃє\n4.  ж†Зз≠ЊеЖЕзЪДе≠Рж†Зз≠Њ\n5.  ж†Зз≠ЊеЖЕеЃМжХізЪДйАТељТе≠Чзђ¶дЄ≤еЖЕеЃє\n\n### 17.3.4.1\
    \ жПРеПЦж†Зз≠ЊеРНзІ∞\n\nж†Зз≠ЊзЪДеРНзІ∞еПѓдї•зЃАеНХеЬ∞йАЪињЗдљњзФ®`name`е±ЮжАІжЭ•жПРеПЦпЉМе¶ВдЄЛдЊЛжЙАз§ЇпЉЪ\n\n```\nпЉИеЙНдЄАдЄ™дЉЪиѓЭзЪДеїґзї≠пЉЙ\n>>> tag.name\n\
    'title'\n```\n\n### 17.3.4.2 жПРеПЦж†Зз≠Ње±ЮжАІ\n\n`Tag`зЪДжЙАжЬЙе±ЮжАІйГљдљЬдЄЇе≠ЧеЕЄеЬ®`attrs`е±ЮжАІдЄ≠еПѓзФ®гАВе≠ЧеЕЄдЄ≠зЪДйФЃжШѓе±ЮжАІеРНпЉМеАЉжШѓиѓ•е±ЮжАІзЪДеѓєеЇФеАЉгАВзФ±дЇО`title`ж†Зз≠Њж≤°жЬЙдїїдљХе±ЮжАІпЉМжИСдїђе∞ЖдљњзФ®`div`ж†Зз≠ЊињЫи°МжЉФз§ЇпЉЪ\n\
    \n```\nпЉИеЙНдЄАдЄ™дЉЪиѓЭзЪДеїґзї≠пЉЙ\n>>> tag=soup.div\n>>> tag.attrs\n{'id': 'main', 'class': ['main',\
    \ 'content']}\n```\n\n**иІВеѓЯпЉЪ**\n\n1.  `div`ж†Зз≠ЊжЬЙ2дЄ™е±ЮжАІпЉЪ`id`еТМ`class`гАВ\n2.  иЩљзДґ`id`е±ЮжАІеП™жЬЙдЄАдЄ™еАЉпЉМдљЖ`class`е±ЮжАІжЬЙ2дЄ™еАЉгАВеЬ®HTMLдЄ≠пЉМе±ЮжАІзЪДе§ЪдЄ™еАЉдї•з©Їж†ЉеИЖйЪФгАВBeautifulSoupеНізїЩдЇЖжИСдїђдЄАдЄ™еАЉеИЧи°®пЉБ\n\
    3.  дљЖиѓЈж≥®жДПпЉМBeautifulSoupеП™жЬЙеЬ®иЃ§дЄЇиѓ•е±ЮжАІжФѓжМБе§ЪдЄ™еАЉдЄФеАЉдЄ≠иЗ≥е∞СеПСзО∞дЄАдЄ™з©Їж†ЉжЧґпЉМжЙНдЉЪзїЩжИСдїђдЄАдЄ™еАЉеИЧи°®гАВе¶ВжЮЬиѓ•е±ЮжАІдЄНжЬЯжЬЫжЬЙе§ЪдЄ™еАЉпЉМBeautifulSoupе∞ЖдњЭзХЩеАЉдЄ≠зЪДз©Їж†ЉпЉМиАМдЄНжШѓињФеЫЮеИЧи°®пЉБ\n\
    \nдЄОеЈ≤зЯ•ж†Зз≠Ње±ЮжАІдЇ§дЇТзЪДдЄАзІНжЫізЃАеНХгАБжЫізЫіжО•зЪДжЦєж≥ХжШѓзЃАеНХеЬ∞е∞Же±ЮжАІеРНдљЬдЄЇдЄЛж†ЗзФ®дЇО`Tag`еѓєи±°пЉМе¶ВдЄЛжЙАз§ЇпЉЪ\n\n```\nпЉИеЙНдЄАдЄ™дЉЪиѓЭзЪДеїґзї≠пЉЙ\n>>> tag['id']\n\
    'main'\n>>> tag['class']\n['main', 'content']\n>>> tag['class'][0]\n'main'\n```\n\
    \n**иІВеѓЯпЉЪ**\n\n1.  ељУзДґпЉМдЄКињ∞жЦєж≥ХдїЕеЬ®жИСдїђзЯ•йБУйҐДжЬЯе±ЮжАІзЪДеРНзІ∞жЧґжЙНжЬЙжХИгАВ\n2.  иЩљзДґ`tag['class']`дї•еИЧи°®ељҐеЉПзїЩеЗЇе±ЮжАІclassзЪДеАЉпЉМдљЖ`tag['class'][0]`зїЩеЗЇиѓ•е±ЮжАІclassзЪДзђђдЄАдЄ™еАЉгАВ\n\
    \n### 17.3.4.3 жПРеПЦж†Зз≠ЊзЪДе≠Чзђ¶дЄ≤еЖЕеЃє\n\nи¶БжПРеПЦж†Зз≠ЊеЖЕзЪДжЦЗжЬђеЖЕеЃєпЉМеПѓдї•дљњзФ®`string`е±ЮжАІпЉМе¶ВдЄЛжЙАз§ЇпЉЪ\n\n```\nпЉИеЙНдЄАдЄ™дЉЪиѓЭзЪДеїґзї≠пЉЙ\n\
    >>> tag=soup.title\n>>> tag\n<title>HTML Demonstration</title>\n>>> tag.string\n\
    'HTML Demonstration'\n>>> type(tag.string)\n<class 'bs4.element.NavigableString'>\n\
    ```\n\n**иІВеѓЯпЉЪ**\n\n1.  `string`е±ЮжАІжПРдЊЫ`Tag`еЖЕзЪДжЦЗжЬђеЖЕеЃєгАВжЦЗжЬђеЖЕеЃєзЪДз±їеЮЛжШѓ`NavigableString`гАВ\n2. \
    \ ж≠§жЦЗжЬђеЖЕеЃєдїЕеЬ®`Tag`йЩ§дЇЖжЦЗжЬђе§ЦдЄНеМЕеРЂеЕґдїЦдїїдљХеЖЕеЃєжЧґжЙНеПѓзФ®пЉБзђђ17.3.4.5иКВе±Хз§ЇдЇЖе¶ВдљХдїОе≠РиКВзВєдЄ≠йАТељТжПРеПЦжЦЗжЬђгАВ\n3.  `NavigableString`еѓєи±°зЪДе≠Чзђ¶дЄ≤з≠ЙжХИељҐеЉПе∞±жШѓжЦЗжЬђеЖЕеЃєгАВ\n\
    \nе¶ВжЮЬзїЩеЃЪзЪД`Tag`еМЕеРЂе§ЪдЄ™е≠РжЦЗжЬђиКВзВєпЉМйВ£дєИжИСдїђеПѓдї•дљњзФ®`strings`е±ЮжАІйБНеОЖзїЩеЃЪ`Tag`зЪДжЙАжЬЙ`NavigableString`иКВзВєпЉМе¶ВдЄЛжЙАз§ЇпЉЪ\n\
    \n```\nпЉИеЙНдЄАдЄ™дЉЪиѓЭзЪДеїґзї≠пЉЙ\n>>> tag=soup.div\n>>> for string in tag.strings:\n...     print(\"\
    [\"+str(string)+\"]\")\n...\n[\n]\n[This is ]\n[Bold]\n[\n]\n[This is ]\n[Italics]\n\
    [\n]\n[This is ]\n[Underlined]\n[\n]\n```\n\n**иІВеѓЯпЉЪ**\n\n1.  жИСдїђж≠£еЬ®йБНеОЖ`div`ж†Зз≠ЊзЪДжЦЗжЬђеЖЕеЃєгАВ\n\
    2.  жИСдїђзЬЛеИ∞ињЩдЄНдїЕйБНеОЖдЇЖ`div`ж†Зз≠ЊеЖЕйГ®пЉМињШйБНеОЖдЇЖеЃГзЪДе≠РиКВзВєпЉБ\n3.  жИСдїђжШЊз§ЇжѓПдЄ™е≠РиКВзВєзЪДе≠Чзђ¶дЄ≤з≠ЙжХИељҐеЉПпЉМеєґзФ®жЦєжЛђеПЈжЛђиµЈжЭ•дї•жПРйЂШеПѓиѓїжАІгАВ\n4.\
    \  жИСдїђйЬАи¶БдљњзФ®`str()`еЗљжХ∞жШЊеЉПеЬ∞е∞ЖжѓПдЄ™еѓєи±°иљђжНҐдЄЇе≠Чзђ¶дЄ≤пЉМеЫ†дЄЇе≠Чзђ¶дЄ≤дЄНиГљдЄОеЕґдїЦеѓєи±°ињЮжО•гАВжИСдїђдєЛеЙНдїОжЬ™еПСзО∞йЬАи¶Бе∞ЖињЩдЇЫеѓєи±°иљђжНҐдЄЇе≠Чзђ¶дЄ≤пЉМеЫ†дЄЇеЬ®жЙАжЬЙйВ£дЇЫз§ЇдЊЛдЄ≠пЉМеИ∞е≠Чзђ¶дЄ≤зЪДиљђжНҐжШѓйЪРеЉПзЪДпЉБ\n\
    \nHTMLж†Зз≠ЊеРОзЪДжѓПдЄ™жНҐи°Мзђ¶йГљиҐЂиІЖдЄЇжЦЗжЬђеЖЕеЃєпЉМињЩдљњеЊЧиЊУеЗЇдЄНе§™жШУиѓїгАВжИСдїђеПѓдї•йАЙжЛ©дљњзФ®`stripped_strings`иАМдЄНжШѓ`strings`жЭ•йБНеОЖеЈ≤еОїйЩ§ињЩдЇЫз©ЇзЩљзЪДе≠Чзђ¶дЄ≤пЉЪ"
