    {1}\n>>> {1,2,3} - {2,4,6} - {3,6,9}\n{1}\n```\n\nThe `set.difference_update(s)`\
    \ function also finds the difference, but stores it back into the original set\
    \ `set`:\n\n```\n>>> S1={1,2}\n>>> S2={2,3}\n>>> S1.difference_update(S2)\n>>>\
    \ S1\n{1}\n```\n\nThe `-=` operator plays the same role as `set.difference_update(s)`:\n\
    \n```\n>>> S1={1,2}\n>>> S2={2,3}\n>>> S1 -= S2\n>>> S1\n{1}\n```\n\nIt is also\
    \ possible to find the difference of a set and the union of multiple sets and\
    \ store them in a set by passing multiple arguments to `difference_update()` or\
    \ using the `|` operator multiple times after using the `-=` operator as follows:\n\
    \n```\n>>> S={1,2,3}\n>>> S.difference_update({2,4,6},{3,6,9})\n>>> S\n{1}\n>>>\
    \ S={1,2,3}\n>>> S -= {2,4,6} | {3,6,9}\n>>> S\n{1}\n```\n\n### 6.7.4 Set Symmetric\
    \ Difference\n\nThe `set.symmetric_difference(s)` function returns a new set that\
    \ represents the symmetric difference of the set `set` and the set `s`:\n\n```\n\
    >>> S1={1,2}\n>>> S2={2,3}\n>>> S1.symmetric_difference(S2)\n{1, 3}\n>>> S1\n\
    {1, 2}\n```\n\nThe `^` operator plays the same role as `set.symmetric_difference(s)`:\n\
    \n```\n>>> S1={1,2}\n>>> S2={2,3}\n>>> S1 ^ S2\n{1, 3}\n>>> S1\n{1, 2}\n```\n\n\
    We can directly find the symmetric difference of set literals as follows:\n\n\
    ```\n>>> {1,2}.symmetric_difference({2,3})\n{1, 3}\n>>> {1,2} ^ {2,3}\n{1, 3}\n\
    ```\n\nThe `set.symmetric_difference_update(s)` function also finds the symmetric\
    \ difference, but stores it back into the original set `set`:\n\n```\n>>> S1={1,2}\n\
    >>> S2={2,3}\n>>> S1.symmetric_difference_update(S2)\n>>> S1\n{1, 3}\n```\n\n\
    The `^=` operator plays the same role as `set.symmetric_difference_update(s)`:\n\
    \n```\n>>> S1={1,2}\n>>> S2={2,3}\n>>> S1 ^= S2\n>>> S1\n{1, 3}\n```\n\n### 6.7.5\
    \ Summary of Fundamental Set Operations\n\nThe below table summarises the basic\
    \ set operations that were covered in the preceding sections:\n\n| Operation |\
    \ Operator | Function |\n| :--- | :--- | :--- |\n| Union | \\| | union() |\n|\
    \ Union (with assignment) | \\|= | update() |\n| Intersection | & | intersection()\
    \ |\n| Intersection (with assignment) | &= | intersection_update() |\n| Difference\
    \ | - | difference() |\n| Difference (with assignment) | -= | difference_update()\
    \ |\n| Symmetric Difference | ^ | symmetric_difference() |\n| Symmetric Difference\
    \ (with assignment) | ^= | symmetric_difference_update() |\n\nTable 14: Summary\
    \ of Fundamental Set Operations\n\n### 6.7.6 Disjoint Sets\n\nThe `set.isdisjoint(s)`\
    \ function tells whether the set `set` and the set `s` are disjoint or not:\n\n\
    ```\n>>> S1={1,2}\n>>> S2={2,3}\n>>> S1.isdisjoint(S2)\nFalse\n>>> S1.isdisjoint({3,4})\n\
    True\n```\n\n### 6.7.7 Subsets and Supersets\n\nThe `set.issubset(s)` function\
    \ tells whether the set `set` is a subset of the set `s` or not. The `<=` operator\
    \ plays the same role.\n\n```\n>>> {1,2}.issubset({2,3})\nFalse\n>>> {1,2}.issubset({1,2,3})\n\
    True\n>>> {1,2} <= {2,3}\nFalse\n>>> {1,2} <= {1,2,3}\nTrue\n```\n\nA set A is\
    \ a proper subset of a set B if A is a subset of B and A is not equal to B. While\
    \ there is no function to do this check in Python, we can use the `<` operator\
    \ for this:\n\n```\n>>> {1,2} <= {1,2}\nTrue\n>>> {1,2} < {1,2}\nFalse\n```\n\n\
    The `set.issuperset(s)` function tells whether the set `set` is a superset of\
    \ the set `s` or not. The `>=` operator plays the same role.\n\n```\n>>> {1,2}.issuperset({2,3})\n\
    False\n>>> {1,2,3}.issuperset({2,3})\nTrue\n>>> {1,2} >= {2,3}\nFalse\n>>> {1,2,3}\
    \ >= {2,3}\nTrue\n```\n\nA set A is a proper superset of a set B if A is a superset\
    \ of B and A is not equal to B. While there is no function to do this check in\
    \ Python, we can use the `>` operator for this:\n\n```\n>>> {1,2} >= {1,2}\nTrue\n\
    >>> {1,2} > {1,2}\nFalse\n```\n\n## 6.8 Programs Based on Sets\n\nPractically,\
    \ a set should be used when a collection is needed and at least one of the following\
    \ are required:\n\n- Duplicates don't matter вАУ we only need to store unique elements\n\
    - We want to compare collections to find out what is common, unique, etc.\n\n\
