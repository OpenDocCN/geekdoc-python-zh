    3.  жИСдїђиІВеѓЯеИ∞ `__doc__` е±ЮжАІиОЈеПЦдЇЖз±ї C зЪДжЦЗж°£е≠Чзђ¶дЄ≤гАВ\n4.  жИСдїђиІВеѓЯеИ∞ `__bases__` е±ЮжАІиѓЖеИЂеЗЇз±ї A еТМз±ї BпЉИеЭЗеЬ® `__main__`\
    \ ж®°еЭЧдЄ≠пЉЙдЄЇеЯЇз±їгАВ\n5.  жИСдїђиІВеѓЯеИ∞з±ї C жЙАеЬ®зЪДж®°еЭЧжШѓ `__main__`гАВ\n6.  жЬАеРОпЉМ`__dict__` е±ЮжАІжШѓдЄАдЄ™еМЕеРЂж†ЗеЗЖе±ЮжАІдї•еПКзФ®жИЈиЗ™еЃЪдєЙе±ЮжАІзЪДе≠ЧеЕЄгАВеЕЈдљУжЭ•иѓіпЉМжИСдїђиІВеѓЯеИ∞иѓ•е≠ЧеЕЄеМЕеРЂдЇЖжЦєж≥Х\
    \ fгАБжЮДйА†еЗљжХ∞еТМз±їеПШйЗП xгАВ\n\n## 12.8.2 й≠ФжЬѓеЗљжХ∞\n\nжИСдїђдљњзФ®жЬѓиѓ≠вАЬй≠ФжЬѓеЗљжХ∞вАЭжЭ•и°®з§ЇйВ£дЇЫжЧ†йЬАжИСдїђжШЊеЉПеСљеРНе∞±иГљиЗ™еК®и∞ГзФ®зЪДеЗљжХ∞/жЦєж≥ХпЉБжЙАжЬЙињЩдЇЫй≠ФжЬѓеЗљжХ∞зЪДзЙєжЃКдєЛе§ДеЬ®дЇОеЃГдїђзЪДеРНзІ∞йБµеЊ™дї•дЄЛиѓ≠ж≥ХпЉЪ\n\
    \n```\n__name__\n```\n\n## 12.8.2.1 жЮДйА†еЗљжХ∞еТМжЮРжЮДеЗљжХ∞\n\nдї•дЄЛжШѓжИСдїђеЈ≤зїПдљњзФ®ињЗзЪДдЄАдЇЫй≠ФжЬѓеЗљжХ∞з§ЇдЊЛпЉЪ\n\n1.  жѓПељУжИСдїђеИЫеїЇдЄАдЄ™еѓєи±°жЧґпЉМеЕґжЮДйА†еЗљжХ∞пЉИ`__init__`пЉЙе∞±дЉЪиҐЂиЗ™еК®и∞ГзФ®пЉБ\n\
    2.  жѓПељУжИСдїђдљњзФ® `del` еИ†йЩ§дЄАдЄ™еѓєи±°еЉХзФ®жЧґпЉМеЕґжЮРжЮДеЗљжХ∞пЉИ`__del__`пЉЙе∞±дЉЪиҐЂиЗ™еК®и∞ГзФ®пЉБ\n\nиІВеѓЯдЄКйЭҐзЪДз§ЇдЊЛпЉМиҐЂи∞ГзФ®зЪДеЗљжХ∞еРНзІ∞йГљдї•еПМдЄЛеИТзЇњеЉАе§іеТМзїУе∞ЊпЉМеєґдЄФжИСдїђдїОжЬ™жШЊеЉПи∞ГзФ®еЃГдїђпЉБдї•дЄЛжШѓиѓБжШОпЉЪ\n\
    \n```\n>>> class A:\n...     def __init__(self): print(\"Created\")\n...     def\
    \ __del__(self): print(\"Destroyed\")\n...\n>>> a = A()\nCreated\n>>> del(a)\n\
