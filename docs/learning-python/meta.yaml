    # 2.3.3 The `complex` type


    The `complex` type allows us to represent complex numbers. Python stores complex
    numbers in rectangular coordinates, but conversion to polar coordinates is possible.
    Similarly, it is possible to create a complex number from polar coordinates. Given
    a complex object, the `real` field tells us the real part and the `imag` field
    tells us the imaginary part.


    # 2.3.3.1 Literals of Type `complex`


    The notation Python uses to represent a complex number made up of real part `x`
    and imaginary part `y` is `x+yj` or `x+yJ`.


    **Examples:**


    ```

    >>> (2+3j)

    (2+3j)

    >>> 2+3J

    (2+3j)

    >>> (2+3j).real

    2.0

    >>> (2+3j).imag

    3.0

    ```


    Objects of type `complex` can also be created using the explicit constructor of
    class `complex`. This of course also resembles a function call for type conversion.
    Thus, the following two statements are identical in function:


    **Example:**


    ```

    x = 2+3j

    x = complex(2,3)

    ```


    This built-in function is also helpful for converting other types like `int` and
    `string` to the type `complex`. Also, the default constructor of `complex` class
    will create a `complex` with value `0j`, a 1-argument constructor that receives
    an `int` `x` will create a complex with value `x+0j` and a 1-argument constructor
    that receives a `string` in the format `x` or `x+yj` or `x+yJ` will create a complex
    object suitably.'
