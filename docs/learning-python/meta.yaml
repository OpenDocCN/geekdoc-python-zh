    Each match group has a starting index and ending index within the string within
    which it was found, and these can be extracted using the following methods:


    ```

    match.start(group=0)

    match.end(group=0)

    match.span(group=0)

    ```


    The `match.start()` method returns the start index of the specified group in the
    string.


    The `match.end()` method returns the end index of the specified group in the string.


    The `match.span()` method returns a tuple containing the start and end indices
    of the specified group in the string.


    In all the 3 methods, if the group is not specified, it is implied to be 0. A
    group argument of 0 means the entire match.


    ### Examples:


    ```

    >>> import re

    >>> m=re.fullmatch(r"(\d\d)/(\d\d)/(\d\d\d\d)", "25/12/2016")

    >>> m.groups()

    (''25'', ''12'', ''2016'')

    >>> m.start(1)

    0

    >>> m.end(1)

    2

    >>> m.span(1)

    (0, 2)

    >>> m.start(2)

    3

    >>> m.end(2)

    5

    >>> m.span(2)

    (3, 5)

    >>> m.start(3)

    6

    >>> m.end(3)

    10

    >>> m.span(3)

    (6, 10)

    >>> m.start()

    0

    >>> m.end()

    10

    >>> m.span()

    (0, 10)

    >>> m.start(0)

    0

    >>> m.end(0)

    10

    >>> m.span(0)

    (0, 10)

    ```


    ### Observation:


    - 1. As can be verified, the first group lies between indices 0 and 2. The second
    group lies between indices 3 and 5. The third group lies between indices 6 and
    10.

    - 2. The entire string is the match and therefore the entire match is between
    the indices 0 and 10.


    ## 9.6.4 Expanding a Template String


    Given that a match object is aware of the contents of all the groups, it can easily
    allow us to expand a template with values taken from the group contents. The `match.expand()`
    method allows us to pass a template string which can contain references to groups,
    whose values will be substituted and the new string will be returned. The group
    contents can be identified using the syntax `\groupNum` as will be illustrated
    in the examples.


    **Syntax:**


    ```

    match.expand(template)

    ```


    **Examples:**


    ```

    >>> import re

    >>> m=re.fullmatch(r"(\d\d)/(\d\d)/(\d\d\d\d)", "25/12/2016")

    >>> m.expand(r"\2-\1-\3")

    ''12-25-2016''

    >>> m.expand(r"US format: \2-\1-\3")

    ''US format: 12-25-2016''

    ```


    **Observation:**


    - 1. The statement `m.expand(r"\2-\1-\3")` is an attempt to convert a UK-format
    date to a US-format date. The RE was used to process a UK-format date (`dd/mm/yyyy`),
    which we now wish to convert to a US-format date (`mm-dd-yyyy`).

    - 2. `\1`, `\2` and `\3` represent the contents of groups 1, 2 and 3 respectively.

    - 3. Any other characters apart from group content substitution requests are retained
    verbatim.


    ## 9.7 Locating Matches Using findall() and finditer()


    The `re.findall()` function returns all the content that matched the given RE
    in the form of a list. Since the behaviour depends on the presence of groups,
    we will cover each case separately.


    **Syntax:**


    ```

    re.findall(pattern, string, flags=0)

    ```


    **Behaviour #1:** If the RE does not contain any groups, this function returns
    a list of all contents in the string `string` that matched the pattern `pattern`:


    ```

    >>> import re

    >>> re.findall(r"\d+", "4 four 25 twenty five 12 twelve")

    [''4'', ''25'', ''12'']

    ```


    **Observation:**


    - 1. The RE will match 1 or more occurrences of digits.

    - 2. There are 3 such matches within the given string.

    - 3. The function returns a list of the 3 matches found.


    **Behaviour #2:** If the RE contains 1 group, this function returns a list of
    all contents in the string `string` that matched the group in the RE `pattern`:


    ```

    >>> import re

    >>> re.findall(r"(\d\d)", "4 four 25 twenty five 12 twelve")

    [''25'', ''12'']

    ```


    **Observation:**


    - 1. Our RE contains 1 group: (\d\d).

    - 2. There are 2 matches for the group: 25 and 12.

    - 3. The function returns a list of the content obtained that matched the groups.


    **Another example:**


    ```

    >>> import re

    >>> re.findall(r"\d(\d)", "4 four 25 twenty five 12 twelve")

    [''5'', ''2'']

    ```


    **Observation:**


    - 1. The RE matches 2 consecutive digits, but the second digit is a member of
    a group.

    - 2. The list returned contains values that matched the group, not the entire
    RE.


    **Behaviour #3:** If the RE contains more than 1 group, this function returns
    a list of tuples вАУ each tuple for 1 match containing the content that matched
    each group:


    ```

    >>> import re

    >>> re.findall(r"(\d) (\d)", "4 four 25 twenty five 12 twelve")

    [(''2'', ''5''), (''1'', ''2'')]

    ```


    **Observation:**


    - 1. The RE contains 2 groups.

    - 2. Each element of the list returned contains a tuple with 2 values.

    - 3. The list contains as many elements as the number of matches.

    - 4. Each tuple contains as many values as the number of groups.


    The `finditer()` function is a cross between `findall()` discussed in this section
    and `match` objects dealt with in the previous section. This function gives an
    iterator using which we can loop through the matches found.


    **Syntax:**


    ```

    re.finditer(pattern, string, flags=0)

    ```


    **Example:**


    ```

    >>> import re

    >>> for m in re.finditer(r"(\d) (\d)", "4 four 25 twenty five 12 twelve"):

    ...     print(m.groups())

    ...

    (''2'', ''5'')

    (''1'', ''2'')

    ```


    **Observation:**


    - 1. Since `finditer()` returns an iterator, we can directly iterate through the
    result using a loop construct as shown.

    - 2. Each iteration provides a single `match` object corresponding to a match
    found. Methods of `match` instance were dealt with in section 9.6.


    ## 9.8 Splitting Strings Using split()


    A string can be split into pieces based on delimiters specified using a RE using
    the `re.split()` function:


    ```

    re.split(pattern, string, parts=0, flags=0)

    ```


    ### Forms:


    - 1. `re.split(pattern, string)`

    - 2. `re.split(pattern, string, parts)`

    - 3. `re.split(pattern, string, parts, flags)`


    ### Form #1: re.split(pattern, string)


    In this form, the contents of the string `string` is split into pieces wherever
    it finds a substring that matches the RE `pattern` and the split parts are returned:


    ```

    >>> import re

    >>> re.split(r"\d\d", "4 four 25 twenty five 12 twelve")

    [''4 four '', '' twenty five '', '' twelve'']

    ```


    **Observation:**


    - 1. The RE for the split specifies that splitting should occur wherever 2 consecutive
    digits are present - вАЬ25вАЭ and вАЬ12вАЭ in our example.

    - 2. After splitting, there are 3 parts which are returned as a list of strings.


    If the RE `pattern` contains any groups, then the contents of the groups are also
    returned in-between the split parts:


    ```

    >>> import re

    >>> re.split(r"(\d) (\d)", "4 four 25 twenty five 12 twelve")

    [''4 four '', ''2'', ''5'', '' twenty five '', ''1'', ''2'', '' twelve'']

    ```


    ### Form #2: re.split(pattern, string, parts)


    In this form, we can specify the number of split parts we want. The splitting
    will stop after that and the remainder string will also be returned:


    ```

    >>> import re

    >>> re.split(r"\d\d", "4 four 25 twenty five 12 twelve", 1)

    [''4 four '', '' twenty five 12 twelve'']

    ```'
