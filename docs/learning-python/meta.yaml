    # 3.3.5 Using range() in for Loops


    Syntax:


    ```

    range(end)

    range(start,end)

    range(start,end,step)

    ```


    **Form #1:** `range(end)`


    In the simplest form, the `range()` function generates a sequence of all numbers
    from 0 up to and excluding the number specified as shown in the example below:


    ```

    >>> for i in range(5): print(i)

    ...

    0

    1

    2

    3

    4

    ```


    **Form #2:** `range(start, end)`


    The `range()` function can also receive the starting and ending numbers and generate
    all the numbers in between as shown below:


    ```

    >>> for i in range(5,10): print(i)

    ...

    5

    6

    7

    8

    9

    ```


    > **NOTE:**

    When the syntax `range(start, end)` is used, the `range()` function generates
    all numbers from `start` (including `start`) till `end-1` (excludes `end`).'
