  md: '# 8.5.4 String Translation Using maketrans() and translate()


    String translation is the mapping of each character of a string to zero or more
    replacement characters. One of the ways of doing this in Python is by making use
    of the `translate()` function for translation using a translation table by creating
    the translation table using the `maketrans()` function. This section concentrates
    on how to use these functions to perform string translation.


    While the `translate()` function performs the actual string translation, we will
    first see how to build translation tables using `maketrans()`.


    **Complete syntax:**


    ```

    str.maketrans(x[, y[, z]])

    ```


    **Note:**


    +   1. This is a static method (section 12.4.4) of `str` class and hence we will
    literally use `str` to invoke it, not any string instance.

    2. The meanings of the parameters `x`, `y` and `z` depend on how many parameters
    have been given. We will explore each case separately.


    **Forms:**


    ```

    1. str.maketrans(dict)

    2. str.maketrans(lookup, replacement)

    3. str.maketrans(lookup, replacement, discard)

    ```


    # 8.5.4.1 Building Translation Tables to Translate Based on Ordinals


    Ordinals are the codes (integers) that represent characters. ASCII and Unicode
    are two of the most popular systems to represent characters and therefore strings.
    ASCII codes and Unicode code values are ordinals.


    The first approach to building a translation table is by mapping an ordinal to
    it''s replacement using a dictionary. The keys of the dictionary represent what
    has to be translated while the values of the dictionary represent the replacement.


    Each key of the dictionary can be:


    +   1. An ordinal (ASCII or Unicode)

    2. Actual character itself


    Even if an actual character is given, it is converted to it''s ordinal. Thus,
    the keys of the dictionary are ordinals.'
  merge: -1
  pgno: 206
- img_proc: true
  md: '# 8. Strings


    Each value in the dictionary can be:


    +   1. A Unicode ordinal

    2. A string of any length

    3. The special value `None`


    # Syntax:


    ```

    str.maketrans(dict)

    ```


    The actual translation will be done by the `translate()` function, but the translation
    mechanism is finalised here. When the `translate()` function performs the translation
    of a string using this dictionary, it performs the following steps for each character
    found in the string to be translated:


    +   1. If the character''s ordinal is found in the keys of the dictionary and
    it''s corresponding value is not `None`, the value is substituted instead.

    2. In the above case, if the value found is `None`, the original character is
    silently deleted in the translated string.

    3. If the character''s ordinal was not found in the keys of the dictionary, the
    character is retained as it is without any changes in the translated string.


    Here is an example of building a translation table that translates octal numbers
    to lowercase alphabets:


    ```

    >>>

    d={''1'':''a'',''2'':''b'',''3'':''c'',''4'':''d'',''5'':''e'',''6'':''f'',''7'':''g'',''8'':None,''9'':None}

    >>> t=str.maketrans(d)

    >>> "hello 0468 world".translate(t)

    ''hello 0df world''

    ```


    # Observation:


    +   1. The keys of the dictionary are characters from 0 to 9 (in quotes), not
    integers! Note that the keys can be either ordinals (integers) or characters.
    What we require here are the characters 0 to 9 which have ordinals 48-57.

    2. The Octal system only supports digits from 0 to 7. Hence, we decide to eliminate
    8 and 9 using the value `None` for them.

    3. We decide to retain the character 0 as it is and hence it is not present in
    the dictionary.

    4. Thus, 0 is retained, 1-7 are replaced by a-g and 8-9 are deleted. All other
    characters are retained.'
  merge: -1
  pgno: 207
