  md: '# 12.8.1.3 The setattr() Function


    The `setattr()` function sets the value of an attribute in an instance. If the
    attribute already existed in the instance, it''s value is overwritten and if it
    did not exist, it is created.


    Syntax:


    ```

    setattr(object,attribute,value)

    ```


    Example:


    ```

    >>> class A:

    ...     def __init__(self):

    ...             self.x=0

    ...

    >>> a=A()

    >>> setattr(a,''x'',2)

    >>> setattr(a,''y'',3)

    >>> a.x

    2

    >>> a.y

    3

    ```


    Observation:


    +   1. An instance `a` is created with an attribute `x` having the value `0`.

    2. `setattr(a,''x'',2)` overwrites the value of the attribute `x` in the instance
    `a` to `2`.

    3. `setattr(a,''y'',3)` creates an attribute `y` in the instance `a` and assigns
    a value `3` to it.


    # 12.8.1.4 The delattr() Function


    Finally, to remove an existing attribute from an instance, the `delattr()` function
    can be used.


    Syntax:


    ```

    delattr(object,attribute)

    ```'
