    \ this is only a *convention* and is not enforced by Python, but professionals\
    \ treat this convention as a rule.\n\n**Syntax:**\n\n```\n_member\n```\n\nSince\
    \ we have not dealt with inheritance yet, protected members will be demonstrated\
