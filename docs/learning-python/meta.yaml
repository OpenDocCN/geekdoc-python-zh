    \n**иІВеѓЯпЉЪ**\n\n- 1. е¶ВжЮЬиЊУеЕ•зЪДеЫљеЃґеРНзІ∞дЄНеЬ®жИСдїђзЪДеИЧи°® `countries` дЄ≠пЉМдЄКињ∞з®ЛеЇПе∞ЖжК•еСК `ValueError` еєґзїИж≠ҐгАВзђђ7.7иКВе∞Же±Хз§Їе¶ВдљХе§ДзРЖеЫљеЃґжЬ™еЬ®жИСдїђеИЧи°®дЄ≠зЪДжГЕеЖµгАВ\n\
    - 2. жИСдїђе∞ЖеЬ®зђђ5.10иКВзЬЛеИ∞еЃЮзО∞ж≠§з®ЛеЇПзЪДжЫіе•љжЦєж≥ХгАВ\n\nз±їдЉЉеЬ∞пЉМжИСдїђзО∞еЬ®е∞ЖзЉЦеЖЩдЄАдЄ™з®ЛеЇПпЉМдїОзФ®жИЈйВ£йЗМжО•еПЧдЄАдЄ™дЄАдљНжХ∞еєґе∞ЖеЕґжЙУеН∞дЄЇеНХиѓНгАВжИСдїђе∞ЖињЩдЇЫеНХиѓНе≠ШеВ®еЬ®дЄАдЄ™еИЧи°®дЄ≠пЉМеєґдљњзФ®жХ∞е≠ЧдљЬдЄЇзіҐеЉХгАВ\n\
    \n### digit2word.py\n\n```\n#!/usr/bin/python\n\n# з®ЛеЇПзФ®дЇОжО•еПЧдЄАдљНжХ∞еєґе∞ЖеЕґжЙУеН∞дЄЇеНХиѓН\n\ndigit=int(input(\"\
    Enter a digit: \"))\n\nwords=[\"zero\",\"one\",\"two\",\"three\",\"four\",\n \
    \   \"five\",\"six\",\"seven\",\"eight\",\"nine\"]\n\nprint(\"{} is {}\".format(digit,words[digit]))\n\
    ```\n\n### иЊУеЗЇпЉЪ\n\n```\nEnter a digit: 5\n5 is five\n```\n\n**иІВеѓЯпЉЪ**\n\n- 1. зђђ7и°МеЃЪдєЙзЪДеИЧи°®иҐЂеИЖжИРдЄ§и°МпЉМеЫ†дЄЇеЃГеЊИйХњпЉМдї•жПРйЂШеПѓиѓїжАІгАВ\n\
    - 2. дїїдљХдЄНеЬ®0еИ∞9иМГеЫіеЖЕзЪДжХ∞е≠ЧиЊУеЕ•йГље∞ЖеѓЉиЗійФЩиѓѓгАВ\n\nиЃ©жИСдїђеЬ®еЙНйЭҐзЪДдЊЛе≠РеЯЇз°АдЄКзЉЦеЖЩдЄАдЄ™е∞ЖжХ∞е≠ЧиљђжНҐдЄЇеНХиѓНзЪДз®ЛеЇПпЉБеЫ†ж≠§пЉМ`1234` е∞ЖиҐЂжЙУеН∞дЄЇ `one\
    \ thousand two hundred and thirty four`гАВдЄЇзЃАеНХиµЈиІБпЉМжИСдїђе∞ЖжХ∞е≠ЧйЩРеИґеЬ®9999дї•еЖЕгАВ\n\n### num2words.py\n\
    \n```\n#!/usr/bin/python\n\n# з®ЛеЇПзФ®дЇОе∞ЖжХ∞е≠ЧжЙУеН∞дЄЇеНХиѓН\n\nonesWords=('zero','one','two','three','four',\n\
    \    'five','six','seven','eight','nine')\ntensWords=('','ten','twenty','thirty','forty',\n\
    \    'fifty','sixty','seventy','eighty','ninety')\nteensWords=('','eleven','twelve','thirteen','fourteen',\n\
    \    'fifteen','sixteen','seventeen','eighteen','nineteen')\n\nn=int(input(\"\
    Enter an integer: \"))\n\nif n==0: print(\"Zero\")\nelse:\n    thousands=n//1000\n\
    \    hundreds=n//100%10\n    tens=n//10%10\n    ones=n%10\n\n    if thousands>0:\
    \ print(\"{} thousand\".format(onesWords[thousands]),end='')\n    if hundreds>0:\
    \ print(\"{} hundred\".format(onesWords[hundreds]),end='')\n    if (thousands>0\
    \ or hundreds>0) and (tens>0 or ones>0):\n        print(\"and \",end='')\n   \
    \ if tens==1 and ones>0: print(teensWords[ones],end='')\n    else:\n        if\
    \ tens>0: print(tensWords[tens],'',end='')\n        if ones>0: print(onesWords[ones],end='')\n\
    \    print()\n```\n\n**иІВеѓЯпЉЪ**\n\n- 1. еЕГзїД `onesWords`пЉИзђђ5и°МпЉЙзФ®дЇОиЈЯиЄ™дЄ™дљНжХ∞зЪДеНХиѓНгАВеЕГзїД `tensWords`пЉИзђђ7и°МпЉЙзФ®дЇОиЈЯиЄ™жППињ∞еНБдљНжХ∞зЪДеНХиѓНгАВеЕГзїД\
    \ `teensWords`пЉИзђђ9и°МпЉЙзФ®дЇОиЈЯиЄ™11еИ∞19зЪДеНХиѓНгАВињЩдЇЫжШѓе∞ЖзФ®дЇОиЊУеЗЇзЪДеНХиѓНгАВйЩ§дЇЖзФ®дЇОеИЖйЪФеНХиѓНзЪДз©Їж†Ље§ЦпЉМињШеПѓдї•еМЕеРЂзЪДйҐЭе§ЦеНХиѓНжЬЙ \"thousand\"\
    гАБ\"hundred\" еТМ \"and\"гАВеЬ®ињЩдЇЫеЕГзїДдЄ≠пЉМиѓЈж≥®жДПзіҐеЉХ0йАЪеЄЄжЬ™дљњзФ®пЉМдљЖдїНзДґе≠ШеЬ®дї•з°ЃдњЭзіҐеЉХж≠£з°ЃеЈ•дљЬгАВ\n- 2. еНГдљНйГ®еИЖгАБзЩЊдљНйГ®еИЖгАБеНБдљНйГ®еИЖеТМдЄ™дљНйГ®еИЖеЬ®зђђ16-19и°МжПРеПЦгАВ\n\
    - 3. е¶ВжЮЬе≠ШеЬ®еНГдљНжИЦзЩЊдљНйГ®еИЖпЉМеєґдЄФе≠ШеЬ®еНБдљНжИЦдЄ™дљНйГ®еИЖпЉМжИСдїђйЬАи¶БеЬ®зЩЊдљНеТМеНБдљНйГ®еИЖдєЛйЧіжЙУеН∞дЄАдЄ™ \"and\"гАВињЩеЬ®зђђ23и°МеЃМжИРгАВ\n- 4. зФ±дЇОжИСдїђдљњзФ®е§ЪдЄ™\
    \ `print()` и∞ГзФ®еИЖйШґжЃµжЙУеН∞пЉМеєґдЄФ `print()` еЗљжХ∞йїШиЃ§еЬ®жЬЂе∞ЊжЙУеН∞жНҐи°Мзђ¶пЉМиАМжИСдїђдЄНеЄМжЬЫињЩж†ЈпЉМеЫ†ж≠§жИСдїђдљњзФ® `end=''` жЭ•йШ≤ж≠ҐеЬ®жѓПдЄ™\
    \ `print()` и∞ГзФ®еРОжЙУеН∞дїїдљХеЖЕеЃєпЉМжЬАеРОеЬ®зђђ28и°Ми∞ГзФ® `print()` жЙУеН∞жНҐи°Мзђ¶гАВ\n- 5. иЊУеЕ•0жШѓдЄАдЄ™зЙєжЃКжГЕеЖµпЉМеЫ†ж≠§еЬ®зђђ14и°Ме§ДзРЖгАВ\n\
    \nжЫіеЉЇе§ІеТМеЃЮзФ®зЪДдЊЛе≠Ре∞ЖеЬ®зђђ11иКВдЄ≠зЬЛеИ∞гАВ\n\n## 4.11 еµМе•ЧеИЧи°®\n\nдЄАдЄ™еИЧи°®еМЕеРЂеѓєеѓєи±°зЪДеЉХзФ®пЉМињЩдЇЫеѓєи±°еПѓдї•жШѓдїїдљХз±їеЮЛпЉМеМЕжЛђеИЧи°®гАВеИЧи°®дЄ≠зЪДеИЧи°®зІ∞дЄЇ*еµМе•ЧеИЧи°®*гАВеЫ†ж≠§пЉМеµМе•ЧеИЧи°®зФ±еЕГзі†зїДжИРпЉМеЕґдЄ≠дЄАдЇЫпЉИжИЦеПѓиГљеЕ®йГ®пЉЙеЕГзі†жЬђиЇЂжШѓеИЧи°®гАВ\n\
    \nеЬ®еµМе•ЧеИЧи°®зЪДжГЕеЖµдЄЛпЉМеМЕеРЂеЕґдїЦеИЧи°®зЪДеИЧи°®еПѓдї•жМЗеЃЪдЄЇ*е§Це±ВеИЧи°®*пЉМиАМж≠§е§Це±ВеИЧи°®дЄ≠зЪДжѓПдЄ™еИЧи°®еПѓдї•жМЗеЃЪдЄЇ*еЖЕе±ВеИЧи°®*гАВжѓПдЄ™еЖЕе±ВеИЧи°®жЧҐдљЬдЄЇе§Це±ВеИЧи°®зЪДдЄАдЄ™еЕГзі†пЉМдєЯдљЬдЄЇдЄАдЄ™зЛђзЂЛзЪДеИЧи°®гАВдЄЛйЭҐжЉФз§ЇдЇЖињЩдЄАзВєпЉЪ\n\
    \n```\n>>> L1=[1,2,3]\n>>> L2=[4,5]\n>>> L3=[6,7,8,9]\n>>> L=[0,L1,L2,L3,100]\n\
