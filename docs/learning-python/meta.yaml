    # SUMMARY


    +   > Stacks can be implemented using list.append() and list.pop() methods.

    > Queues can be implemented using deque.append() and deque.popleft() methods.

    > The map() function maps each element of a sequence to another using a mapping
    function. It can also be used to map multiple corresponding elements of sequences
    into a single corresponding element of a target sequence using a mapping function.

    > The filter() function filters a sequence using a filtering function, allowing
    only certain values to pass through. As a special case, if no filtering function
    is provided, all True values pass through and False values are filtered out. The
    itertools.filterfalse() function does the reverse!

    > The reduce() function reduces a sequence into a single value using a reducing
    function which takes in 2 parameters - an accumulated value (0 by default) and
    an element from the given sequence.

    > List comprehensions are powerful mechanisms to create and populate lists with
    required values. They eliminate the need for elaborate lines of code to populate
    lists!


