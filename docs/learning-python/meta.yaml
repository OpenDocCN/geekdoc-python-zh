    # ## 12.1 Overview of OOP Principles


    Object Oriented Programming (OOP) is a programming paradigm вАУ a way of looking
    at problems and designing solutions. The main goal behind OOP is to model the
    real world within the software so that we have a parallel reality, making it easier
    for us to relate code to the real world. This programming paradigm essentially
    uses the following 8 principles to achieve this goal:


    +   1. Classes

    2. Objects

    3. Data Encapsulation

    4. Data Hiding

    5. Data Abstraction

    6. Polymorphism

    7. Inheritance

    8. Message Passing


    We therefore will briefly cover these 8 principles before proceeding with how
    OOP can be used in Python.


    # ### 12.1.1 Class


    A class can be defined as a design according to which objects can be later instantiated.


    The starting point of Object Oriented Modelling is the class. The class is the
    design of an entity that exists in the real world. This design comprises of attributes
    (everything an entity has) and behaviour (everything an entity can do).


    As an example, here is a diagrammatic representation of a `Date` class (technically
    using UML for the class representation) to represent a calendar date:'
