    # 9.6.3 Extracting the Group Locations


    Each match group has a starting index and ending index within the string within
    which it was found, and these can be extracted using the following methods:


    ```

    match.start(group=0)

    match.end(group=0)

    match.span(group=0)

    ```


    The `match.start()` method returns the start index of the specified group in the
    string.


    The `match.end()` method returns the end index of the specified group in the string.


    The `match.span()` method returns a tuple containing the start and end indices
    of the specified group in the string.


    In all the 3 methods, if the group is not specified, it is implied to be 0. A
    group argument of 0 means the entire match.'
