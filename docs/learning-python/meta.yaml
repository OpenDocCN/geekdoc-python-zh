  - '[PAGE 648]


    The `dict` methods `dict.keys()`, `dict.values()` and `dict.items()` (section
    7.4) return views instead of lists:


    | Python 2 | Python 3 |

    | --- | --- |

    | >>> d={}

    >>> type(d.keys())

    <type ''list''> | >>> d={}

    >>> type(d.keys())

    <class ''dict_keys''> |


    Python 2 had provided `dict.iterkeys()`, `dict.itervalues()` and `dict.iteritems()`
    methods for the same reason and are no longer supported in Python 3.


    The `map()` and `filter()` functions (section 11.3 & 11.4) return iterators in
    Python 3:


    | Python 2 | Python 3 |

    | --- | --- |

    | >>> L=map(lambda x:x, [])

    >>> type(L)

    <type ''list''> | >>> L=map(lambda x:x, [])

    >>> type(L)

    <class ''map''> |


    The `range()` function (section 3.3.5) returns an iterator instead of a list in
    Python 3:


    | Python 2 | Python 3 |

    | --- | --- |

    | >>> type(range(5))

    <type ''list''> | >>> type(range(5))

    <class ''range''> |


    Python 2 provided the `xrange()` for the same reason, which no longer exists in
    Python 3.'
  - '[PAGE 649]


    # 21.2.3 Comparisons


    The ordering comparison operators (<, <=, >=, >) raise a TypeError exception when
    the operands don''t have a meaningful natural ordering.:


    | Python 2 | Python 3 |

    | --- | --- |

    | >>> 1<""<br>True<br>>>> 0>None<br>True<br>>>> None<None<br>False | >>> 1<""<br>Traceback
    (most recent call last):<br>  File "<stdin>", line 1, in <module><br>TypeError:
    ''<'' not supported between instances of ''int'' and ''str''<br>>>> 0>None<br>Traceback
    (most recent call last):<br>  File "<stdin>", line 1, in <module><br>TypeError:
    ''>'' not supported between instances of ''int'' and ''NoneType''<br>>>> None<None<br>Traceback
    (most recent call last):<br>  File "<stdin>", line 1, in <module><br>TypeError:
    ''<'' not supported between instances of ''NoneType'' and ''NoneType'' |


    Furthermore, the cmp() function (and the underlying __cmp__() magic method) has
    been removed in Python 3:


    | Python 2 | Python 3 |

    | --- | --- |

    | >>> cmp(2,3)<br>-1 | >>> cmp(2,3)<br>Traceback (most recent call last):<br>  File
    "<stdin>", line 1, in <module><br>NameError: name ''cmp'' is not defined |


    If there is a need to use cmp() in Python 3, the expression to use is (a > b)
    - (a < b) instead of cmp(a, b).'
  - '[PAGE 650]


    # 21.2.4 Integers


    The `long` data type has been renamed to `int` in Python 3. Regardless of the
    "size" of the integer, the data type in Python 3 is `int`, which can handle arbitrarily
    large integers (section 2.3.1):


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> type(29482364)`<br>`<type ''int''>`<br>`>>>`<br>`type(2948236423472903749234)`<br>`<type
    ''long''>` | `>>> type(29482364)`<br>`<class ''int''>`<br>`>>>`<br>`type(2948236423472903749234)`<br>`<class
    ''int''>` |


    The `sys.maxint` constant was removed, since there is no longer a limit to the
    value of integers.


    The `repr()` of a long integer doesn''t include the trailing `L` anymore, so code
    that unconditionally strips that character will chop off the last digit instead.
    Use `str()` instead to obtain the string representation of an integer in Python
    3.


    In Python 3, the division operator (`/`) can return a `float`. To guarantee integer
    division, the `//` operator can be used:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> 1/2`<br>`0` | `>>> 1/2`<br>`0.5`<br>`>>> 1//2`<br>`0` |


    Octal literals in Python 3 no longer use the prefix "0" - "0o" needs to be used
    instead:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> 077`<br>`63` | `>>> 077`<br>`File "<stdin>", line 1`<br>`    077`<br>`    ^`<br>`SyntaxError:
    invalid token`<br>`>>> 0o77`<br>`63` |'
  - '[PAGE 651]


    # 21.2.5 Unicode and ASCII


    Python 3 uses the concepts of text and binary data instead of Unicode strings
    and 8-bit strings. All text is Unicode; however *encoded* Unicode is represented
    as binary data. The type used to hold text is `str`; while the type used to hold
    data is `bytes`. The biggest difference with Python 2 is that any attempt to mix
    text and data in Python 3 raises `TypeError`, whereas if you were to mix Unicode
    and 8-bit strings in Python 2, it would work fine if the 8-bit string happened
    to contain only 7-bit ASCII bytes, but you would get `UnicodeDecodeError` if it
    contained non-ASCII values.


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> "abc"+b"def"`<br>`''abcdef''` | `>>> "abc"+b"def"`<br>`Traceback (most
    recent call last):`<br>`  File "<stdin>", line 1, in <module>`<br>`TypeError:
    must be str, not bytes` |


    # 21.2.6 Syntax Changes


    Some of the significant syntactic changes are highlighted in this section.


    List comprehensions no longer support the syntactic form `[... for var in item1,
    item2, ...]`. Use `[... for var in (item1, item2, ...)]` instead in Python 3:


    | Python 2 | Python 3 |

    | --- | --- |

    | `>>> [x for x in 1,2,3]`<br>`[1, 2, 3]` | `>>> [x for x in 1,2,3]`<br>`  File
    "<stdin>", line 1`<br>`    [x for x in 1,2,3]`<br>`          ^`<br>`SyntaxError:
    invalid syntax`<br>`>>> [x for x in (1,2,3)]`<br>`[1, 2, 3]` |


    In Python 3, `nonlocal` is a reserved word. Using `nonlocal x` you can now assign
    directly to a variable in an outer (but non-global) scope.'
