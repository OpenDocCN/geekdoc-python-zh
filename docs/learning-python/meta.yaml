    \ number of bytes you are willing to read from the file, but the actual result\
    \ is implementation dependent and should not be replied upon. When omitted (which\
    \ is what we would be doing almost always), it means that we are interested in\
    \ reading the entire file contents.\n\n# 14.3.2 Reading Files a Line at a Time\n\
    \nThe previous section showed how we can access the file contents by completely\
    \ loading at one go. We saw 2 approaches that give us identical results:\n\n+\
    \   1. Loading the entire content as a single string\n2. Loading the entire content\
    \ as a list of lines (strings)\n\nThis section focuses on how to read the file\
    \ contents a line at a time, which might appear similar to approach 2 above, but\
    \ differs in that we are not loading the entire file. Loading an entire file into\
