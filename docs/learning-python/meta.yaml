  md: '# 6.7.7 Subsets and Supersets


    The `set.issubset(s)` function tells whether the set `set` is a subset of the
    set `s` or not. The `<=` operator plays the same role.


    ```

    >>> {1,2}.issubset({2,3})

    False

    >>> {1,2}.issubset({1,2,3})

    True

    >>> {1,2} <= {2,3}

    False

    >>> {1,2} <= {1,2,3}

    True

    ```


    A set A is a proper subset of a set B if A is a subset of B and A is not equal
    to B. While there is no function to do this check in Python, we can use the `<`
    operator for this:


    ```

    >>> {1,2} <= {1,2}

    True

    >>> {1,2} < {1,2}

    False

    ```


    The `set.issuperset(s)` function tells whether the set `set` is a superset of
    the set `s` or not. The `>=` operator plays the same role.


    ```

    >>> {1,2}.issuperset({2,3})

    False

    >>> {1,2,3}.issuperset({2,3})

    True

    >>> {1,2} >= {2,3}

    False

    >>> {1,2,3} >= {2,3}

    True

    ```


    A set A is a proper superset of a set B if A is a superset of B and A is not equal
    to B. While there is no function to do this check in Python, we can use the `>`
    operator for this:


    ```

    >>> {1,2} >= {1,2}

    True

    >>> {1,2} > {1,2}

    False

    ```'
