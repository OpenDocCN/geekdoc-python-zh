    7.     pickle.dump(Employee(name,id,designation),file)\n```\n\n1. The `do_add_employee()`\
    \ function accepts input from the user for a single employee record in lines 2-4.\n\
    \n2. Since we need to add this employee record to the given file and appending\
    \ is the simplest way of adding to a file, we prefer to seek to the end of the\
    \ file in line 6.\n\n3. We then create an `Employee` object using the input the\
    \ user provided and write it to the file in line 7.\n\n```\n1. def do_list_employees(file):\n\
    2.     try:\n3.         file.seek(0)\n4.         while 1:\n5.             employee\
    \ = pickle.load(file)\n6.             print(\"Name: {} ID: {} Designation: {}\"\
    .format(employee.name,employee.id,employee.designation))\n7.     except EOFError:\
    \ pass\n```\n\n1. The `do_list_employees()` function has to list all employee\
    \ records from the given file and hence we would want to seek to the beginning\
    \ of the file to ensure that we start from the first record in the file. This\
    \ is done in line 3.\n\n2. We read a single employee record at a time in line\
    \ 5 and display the employee details in line 6. This is repeated infinitely (till\
