    ```


    While the alignment uses spaces by default to fill the unused columns, any other
    character can be used to fill in the unused columns. We will revisit the same
    examples given in the previous section, using вАЬ*вАЭ instead of the default spaces:


    ```

    >>> ''{:*<10}''.format(12) # Left-align "12" in 10 columns

    ''12********''

    >>> ''{:*>10}''.format(12) # Right-align "12" in 10 columns

    ''********12''

    >>> ''{:*^10}''.format(12) # Center-align "12" in 10 columns

    ''****12****''

    >>> ''{:*=10}''.format(12) # Right-align "12" in 10 columns, sign first

    ''*********12''

    >>> ''{:*=10}''.format(-12) # Right-align "-12" in 10 columns, sign first

    ''-********12''

    ```


    ## 8.7.5 Format Precision


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The exact effect of precision depends on what we are displaying and which format
    type we are using. We will therefore see individual cases:


    ### 8.7.5.1 Format Precision for Fixed-Point Format


    When a real number is being displayed using fixed-point format (f or F), the precision
    specifies the number of decimal places required, as shown in the examples below:


    ```

    >>> ''{:.2f}''.format(12.3456789)

    ''12.35''

    >>> ''{:.12f}''.format(12.3456789)

    ''12.345678900000''

    ```


    Note:


    1. If the precision is less than the number of fractional digits, the fractional
    digits are rounded.

    2. If the precision is greater than the number of fractional digits, ''0'' is
    added.


    ### 8.7.5.2 Format Precision for Floating-Point General Format


    When a real number is being displayed using general format (g or G), the precision
    specifies the maximum number of digits displayed, as shown in the examples below:


    ```

    >>> ''{:.5g}''.format(12.3456789)

    ''12.346''

    >>> ''{:.10g}''.format(12.3456789)

    ''12.3456789''

    >>> ''{:.15g}''.format(12.3456789)

    ''12.3456789''

    ```


    ### 8.7.5.3 Format Precision for Strings


    When a string is being displayed, the precision specifies the maximum number of
    characters to be displayed from the string, as shown in the examples below:


    ```

    >>> ''{:5.2s}''.format(''abcdefghijkl'')

    ''ab   ''

    >>> ''{:5.4s}''.format(''abcdefghijkl'')

    ''abcd ''

    ```


    > NOTE:

    In the above examples, the width is 5 implying that 5 columns are reserved for
    the field. The alignment is left by default and spaces are used by default for
    filling the field. The precision controls how many characters from the string
    are available.


    ## 8.7.6 Numeric Formatting


    In this section, we will explore the left overs of the format specification.


    ### 8.7.6.1 Zero Padding


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The presence of a 0 before the width indicates 0-padding instead of space padding:


    ```

    >>> ''{:5d}''.format(12)

    ''   12''

    >>> ''{:05d}''.format(12)

    ''00012''

    >>> ''{:05d}''.format(-12)

    ''-0012''

    ```


    ### 8.7.6.2 Sign Preservation


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The sign controls how positive and negative numbers are differentiated and handled.
    The possibilities are listed in the table below:


    | Sign | Meaning |

    | :--- | :--- |

    | - | Negative numbers are prefixed with ''-'' and positive numbers have no prefix
    |

    | + | Negative numbers are prefixed with ''-'' and positive numbers are prefixed
    with ''+'' |

    | space ('' '') | Negative numbers are prefixed with ''-'' and positive numbers
    are prefixed with a space ('' '') |


    Table 19: Sign Preservation in Format


    The default behaviour (when no `sign` is used) is that of the ''-'' `sign` in
    the table.


    Examples:


    ```

    >>> ''{:d}''.format(12)

    ''12''

    >>> ''{:d}''.format(-12)

    ''-12''

    >>> ''{:-d}''.format(12)

    ''12''

    >>> ''{:-d}''.format(-12)

    ''-12''

    >>> ''{:+d}''.format(12)

    ''+12''

    >>> ''{:+d}''.format(-12)

    ''-12''

    >>> ''{: d}''.format(12)

    '' 12''

    >>> ''{: d}''.format(-12)

    ''-12''

    ```


    ### 8.7.6.3 Digit Grouping


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The `grouping` decides what separator will be used between groups of digits. If
    no `grouping` is specified, by default no separator is used. If a comma (`,`)
    is used as `grouping`, then groups of digits will be separated by commas as shown
    below:


    ```

    >>> ''{:,d}''.format(123456789)

    ''123,456,789''

    ```


    ### 8.7.6.4 Alternate Representation


    ```

    [[fill]align][sign][#][0][width][grouping][.precision][type]

    ```


    The presence of the ''#'' in the format specification indicates a request for
    an alternate representation вАУ a representation different from the default one.
    This alternate representation exists only for numbers and differs from type to
    type.


    For instance:


    1. The alternate representation for binary, octal and hexadecimal types is the
    presence of ''0b'', ''0o'' and ''0x'' respectively.

    2. The alternate representation for the ''e'' and ''E'' types is to display the
    decimal point even when there is no fractional part.

    3. The alternate representation for the ''g'' and ''G'' types is to retain trailing
    zeros.


    Examples:


    ```

    >>> ''{:b}''.format(12)

    ''1100''

    >>> ''{:#b}''.format(12)

    ''0b1100''

    >>> ''{:o}''.format(12)

    ''14''

    >>> ''{:#o}''.format(12)

    ''0o14''

    >>> ''{:x}''.format(12)

    ''c''

    >>> ''{:#x}''.format(12)

    ''0xc''

    >>> ''{:X}''.format(12)

    ''C''

    >>> ''{:#X}''.format(12)

    ''0XC''

    >>> ''{:.0f}''.format(12)

    ''12''

    >>> ''{:#.0f}''.format(12)

    ''12.''

    >>> ''{:g}''.format(1200000000)

    ''1.2e+09''

    >>> ''{:#g}''.format(1200000000)

    ''1.20000e+09''

    >>> ''{:G}''.format(1200000000)

    ''1.2E+09''

    >>> ''{:#G}''.format(1200000000)

    ''1.20000E+09''

    ```


    ## 8.8 Questions


    1. Explain any 5 operations that can be done on strings in Python with examples.

    2. How is the `index()` function different from `find()` function in Python?

    3. Explain the `lstrip()`, `rstrip()` and `strip()` methods of `str` class.

    4. Explain template processing using the `Template` class in Python.

    5. Explain string translation in Python.

    6. Explain the string functions used for string justification in Python.

    7. Write a short note on the `format()` method of `str` class.


    ## 8.9 Exercises


    1. Write a Python script to calculate the number of occurrences of a given character
    in an any given string.

    2. Write a Python script to count the number of occurrences of each word in a
    given string.

    3. Write a Python script to form a string out of the first 2 and last 2 characters
    from the given string. For example, given the string "I am a student", the output
    expected is "I nt".


    # SUMMARY


    - A string is an immutable sequence of characters.

    - To search within strings, these methods can be used: startswith(), endswith(),
    find(), rfind(), index(), rindex().

    - Strings can be split using partition(), rpartition(), split(), rsplit() and
    splitlines() methods. Strings can be joined using join().

    - Strings can be stripped using lstrip(), rstrip and strip(). Strings can be replaced
    using replace().

    - Advanced template-based substitution is possible using string.Template. Character-wise
    translation is also possible using maketrans() and translate().

    - Strings can be justified using ljust(), rjust() and center(). Strings can be
    zero-filled using zfill() and tab characters can be expanded using expandtabs().

    - Strings can be formatted using the format() method.


    # 9 REGULAR EXPRESSIONS


    In this chapter you will be able to:


    - [x] Understand what are Regular Expressions and learn to frame them.

    - [x] Learn how to search for patterns within strings.

    - [x] Deal with groups within search patterns and extract grouped parts.

    - [x] Work with matched parts within the string.

    - [x] Split strings based on string patterns.

    - [x] Replace matched patterns with custom replacement strings.

    - [x] Pre-compile frequently used regular expressions to improve efficiency.


    ## 9.1 Introduction to Regular Expressions


    A *regular expression* is a pattern matching expression вАУ it is an expression
    made up of operators and operands that help specify what kind of pattern should
    be searched for and matched within a string. Applications of regular expressions
    include:


    1. Checking whether a string conforms to a particular pattern or not (e.g. whether
    a string is a valid email id, valid integer, valid name, valid address, etc.)

    2. Checking whether a string contains a part that matches a particular patterns
    (e.g. checking if a string contains coordinates, website URLs or email addresses)

    3. Counting the number of occurrences of substrings that match a particular pattern
    (e.g. counting the number of operators present in an expression)

    4. Locating the substrings that match a particular pattern within a string (e.g.
    locating keywords or identifiers within a computer program statement)

    5. Substituting substrings that match a particular pattern with a replacement
    string (e.g. replacing all email addresses with the string ''EMAIL'')

    6. Substituting substrings that match a particular pattern with a replacement
    string that possibly reuses the content found in order to reorganise the string
    (e.g. converting dates in mm-dd-yy format to dd/mm/yy format)


    What makes a regular expression based search different from the string search
    functions that we saw in section 8.2 is that in the case of regular expressions,
    we are not necessarily searching for a particular string, but are instead possibly
    searching for multiple strings that all follow a common pattern. If we are searching
    for "info@cyberplusit.com" in a string, we can use normal string functions. But
    if we are searching for all email addresses related to cyberplusit.com, or possibly
    any and every email address without knowing what email addresses to expect, we
    need regular expressions.


    A regular expression is made up of operands and operators. Operands are merely
    characters that have to be found while operators are used to enforce rules pertaining
    to the occurrences of operands.


    Before we start framing regular expressions for matching, keep these points in
    mind:


    1. What matters currently is whether there is a match or not (Boolean).

    2. It does not matter where the match is.

    3. It does not matter what the match is.

    4. It does not matter how many matches are there.'
