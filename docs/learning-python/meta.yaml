    # 12.7.1 Abstract Methods and Classes


    The previous program shows 2 disadvantages of the way the way the `speak` method
    has been defined in `Animal`:


    +   1. We are forced to provide an empty definition of the method, which can seem
    a little odd at best.

    2. If any of the derived classes do not override the `speak` method, there is
    no output on invoking the `speak` method as the `speak` method of `Animal` gets
    invoked and it is empty. There was no way to force the derived class to override
    the `speak` method.


    These 2 disadvantages can be eliminated. The class can be made an abstract class
    using the `abc` package and the method can be made an abstract method using `@abstractmethod`,
    both of which are outside the scope of this book.


    # 12.8 Attribute Handling, Magic Functions and Operator Overloading


    A very interesting feature in Python is that certain operations when performed
    on objects will result in certain standard functions being called. What is interesting
    in this is that it does not appear that such a call is taking place!


    This same principle is also used to implement operator overloading in Python вАУ
    the mechanism by which an operator plays the same logical role but the implementation
    depends on the operand types on which the operator operates.


    While this section focuses on operator overloading, we start with certain standard
    functions that are called when some basic operations are performed on objects.
    After an understanding of this, we will proceed to add support for operators to
    our classes.'
