  md: "# 13.3 Raising Exceptions\n\nSo far we have seen how to handle exceptions when\
    \ they are raised. We have also seen exactly when some exceptions are raised вАУ\
    \ for example, we know that `ZeroDivisionError` is raised when we attempt to perform\
    \ a division by 0. In this section, we will learn how we can raise exceptions\
    \ ourselves whenever we want to.\n\nTo raise an exception, 2 steps need to be\
    \ followed:\n\n+   1. We need to create an exception object that has to be raised.\
    \ This object will belong to a class that should derive directly or indirectly\
    \ from the built-in `Exception` class. All built-in exception classes derive from\
    \ the `Exception` class.\n2. We need to use the `raise` statement to raise this\
    \ exception object, as shown in the syntax below.\n\n```\nraise exceptionInstance\n\
    ```\n\nExample:\n\n```\n>>> e=ZeroDivisionError()\n>>> raise e\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nZeroDivisionError\n\
    ```\n\nWhile it is necessary to follow the above mentioned 2 steps in order to\
    \ raise an exception, it is more practical to combine the 2 steps into one by\
    \ explicitly instantiating the exception class in the `raise` statement itself\
    \ as shown below:\n\n```\n>>> raise ZeroDivisionError()\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nZeroDivisionError\n```\n\
    \nThe reasons why we prefer this approach are:\n\n+   1. We generally need the\
    \ exception object only to pass it to `raise`. We therefore do not access the\
    \ variable that references the exception object and using a variable name for\
    \ this is therefore a waste.\n2. We do not prefer to create an exception object\
    \ in advance and then `raise` it if necessary. Remember that exceptions are supposed\
    \ to be rare and creating such exception objects in advance is inefficient. Indeed,\
    \ in many situations, it may be impossible to create an exception object in advance\
    \ as more"
