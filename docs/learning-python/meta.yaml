    # 2. Python Basics


    Examples:


    ```

    >>> not False

    True

    >>> not True

    False

    ```


    The `not` operator can work on other types too! To generalise it''s working, consider
    the example `not x`.


    +   - If `x` evaluates to `False`, the result is `True`

    - If `x` evaluates to `True`, the result is `False`


    ```

    >>> not 2

    False

    >>> not 5

    False

    >>> not 0

    True

    ```


    > **NOTE:**

    When other data types are used here instead of `bool`, a Boolean conversion takes
    place as documented in section 20.1.1.4.

    The type `bool` is considered to be a subtype of `Integral` (just like the type
    `int`), and hence all operators that work on `int` also work on `bool`. In such
    cases, it will help to remember to substitute `True=1` and `False=0`.


    # 2.4 Identifiers


    An identifier is a name given to a program element. Variable names, class names
    and function names are some examples of identifiers.

    The rules for naming identifiers in Python are similar to those of C but also
    permit Unicode characters:


    +   1. The permissible characters are alphabets, digits and underscores

    2. The first character cannot be a digit. Underscore as the first character can
    have special meanings that will be discussed in later sections

    3. The length is not limited (but is subject to practical limits however!)

    4. An identifier cannot have the same name as a keyword (discussed in section
    2.5)'
  - '[PAGE 50]


    Good programming practices dictate that identifier names be relevant and readable
    so that a reader can figure out what the identifier represents. The coding convention
    used by Python professionals are:


    +   1. Variable names and function names should be in lowercase with underscores
    separating words. E.g.: `variable_name`, `function_name()`

    2. Class names (and exception names as they are classes) should be in lowercase
    with the first letter of every word capitalized. E.g.: `ClassName`, `ExceptionName`

    3. Constant names should be in uppercase with underscores separating words. E.g.:
    `CONSTANT_NAME`

    4. All other identifiers (package name, module name, method name, instance variable
    name, local variable name, function parameter name) should follow the convention
    of variable names


    # 2.5 Keywords


    Keywords are special words that are understood by Python. These cannot be used
    as identifiers. We will learn keywords on a need basis as and when it is time
    to learn them. We have already seen some keywords like `True`, `False`, `and`,
    `or` and `not`. Below is the list of all keywords in Python in alphabetical order:


    | and | else | in | return |

    | --- | --- | --- | --- |

    | as | except | is | True |

    | assert | False | lambda | try |

    | break | finally | None | while |

    | class | for | nonlocal | with |

    | continue | from | not | yield |

    | def | global | or | |

    | del | if | pass | |

    | elif | import | raise | |'
  - '[PAGE 51]


    # 2.6 Variables


    Let us now discuss a few points about variables, their data types, their values
    and operations on them before proceeding to input and output. We have already
    seen the data types available in Python. These data types come into use when we
    have certain values of that type and the entity that holds this value is a variable.
    Here are a few important points about variables in Python:


    #1 Variables can be created when required and where required


    Unlike some of the more restrictive languages, we can start using a variable whenever
    required without having to declare it at the beginning of a block. This gives
    us flexibility and allows us to maintain focus on solving the problem at hand.
    A variable springs into existence the moment a value to assigned to it. There
    is no concept of specifying it''s data type.


    ```

    x = 10 #x is created here

    x = 25 * x

    y = x #y is created here

    ```


    #2 The value of a variable can change at any time


    Like other programming languages, the values of variables can be changed whenever
    required. However, what makes Python different here is the fact that there is
    no direct way in Python to implement constants. A good programmer recognises a
    constant from it''s name and treats it like a constant though the interpreter
    may not!


    ```

    x = 10 #x is created here

    x = 25 * x #The value of x changes here

    MAX = 100 #MAX is created here

    MAX = 200 #The value of MAX changes here

    ```


    > **For C/C++/Java programmers:**

    Python does not have the equivalent of keywords like `const` (C/C++) and `final`
    (Java).'
  - '[PAGE 52]


    # #3 The type of a variable can change at any time


    Unlike statically typed languages, the data type in Python is associated with
    a value and not with a variable! Since the value of a variable can change at any
    point of time, and the data type is an associated property of the value, the data
    type referred to by a variable could also change! The data type of any data item
    (possibly referred to by a variable) could be found out using the `type()` function
    as shown in the examples below.


    ```

    >>> x=2

    >>> type(x)

    <class ''int''>

    >>> x=2.5

    >>> type(x)

    <class ''float''>

    >>> type(int)

    <class ''type''>

    >>> type(type)

    <class ''type''>

    ```


    # #4 We can programmatically find out the data type of the value associated with
    a variable, and can also determine whether the type is вАЬcompatibleвАЭ with another


    While the `type()` function can give us the data type, what is more practical
    most of the times is simply verifying whether the data type of a particular value
    is a particular one or not (or whether it is a subtype of a particular one or
    not). For the built-in numeric types, the hierarchy is covered in detail in section
    20.1 and can be verified from the examples below:


    ```

    >>> import numbers

    >>> x=2.5

    >>> isinstance(x,int)

    False

    >>> isinstance(x,float)

    True

    >>> isinstance(x,numbers.Integral)

    False

    >>> isinstance(x,numbers.Real)

    True

    >>> isinstance(x,numbers.Complex)

    True

    >>> isinstance(x,numbers.Number)

    True

    >>> isinstance(x,object)

    True

    ```'
  - "[PAGE 53]\n\n# 2. Python Basics\n\nObservation:\n\n+   1. The value 2.5 is of\
    \ type float, which is a subtype of numbers.Real, which is a subtype of numbers.Complex,\
    \ which is a subtype of numbers.Number, which is a subtype of object. The entire\
    \ type hierarchy can be verified from section 20.1.\n2. At the end of the day,\
    \ all values are stored within objects, making object the root of the entire hierarchy.\n\
    \n# #5 The operations permissible on a variable depend on the data type of the\
    \ value the variable is currently referring to and thus can change during the\
    \ execution of the script\n\nSince we have established that the data type of a\
    \ variable can change depending on the data type of the value it is referring\
    \ to, and the operations that can be performed depends on the data type, what\
    \ can and cannot be done with a variable depends on the data type of the value\
    \ the variable currently refers to. As the data type of the value changes, so\
    \ do the permissible operations! This is illustrated in the examples below:\n\n\
    ```\n>>> x=25\n>>> x%7\n4\n>>> len(x)\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nTypeError: object of type 'int' has no len()\n\
    >>> x='Hello'\n>>> x%7\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: not all arguments converted during string formatting\n\
    >>> len(x)\n5\n```\n\n# #6 Values are objects and variables are merely references\
    \ to these objects\n\nAny data item (value) is an object, and when they are assigned\
    \ to a variable, what the variable is said to contain is a reference to that object.\
    \ Thus, values and variables are very different! A single value (object) can have\
    \ multiple references to it. Put another way, multiple variables can claim to\
    \ contain the same identical value. Destroying a variable decrements the number\
    \ of references that particular value has. When this reference count reaches 0\
    \ (an indication that the value does not have any variable referring to it) it\
    \ is considered to be garbage and is a candidate for garbage collection. Destroying\
    \ a variable is immediate and results in the variable disappearing from the program\
    \ (till it is recreated if required). This however need not imply a destruction\
    \ of the value."
- md: "A variable that is no longer needed can be destroyed using the `del` built-in.\
    \ Keep in mind the following:\n\n1.  There is no compulsion for using `del` to\
    \ delete variables that are no longer needed.\n2.  These destroy only the references;\
    \ there is no guarantee that any object will be freed from memory.\n3.  Even if\
    \ an object is to be freed, there is no saying whether and when it will be freed.\n\
    \n```\n>>> x=5\n>>> x\n5\n>>> del x\n>>> x\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'x' is not defined\n\
    ```\n\n## 2.7 Basic Input and Output\n\n### 2.7.1 Printing Using the print() Function\n\
    \nThere are multiple ways of generating output from a Python script вАУ the simplest\
    \ method being using the `print()` built-in function. The `print()` function can\
    \ print multiple objects one after another, with a user-defined separator string\
    \ and a user-defined terminator string and with defaults in place. Let's get started!\n\
    \n#### 2.7.1.1 Printing a Single Item\n\nTo print just a single item, we pass\
    \ that item to the `print()` function as shown in the examples below:\n\n```\n\
    >>> print('hello')\nhello\n>>> print(12)\n12\n>>> print(2.5)\n2.5\n>>> print(True)\n\
    True\n>>> print(\"2.5\")\n2.5\n>>> print(1.5 * 3)\n4.5\n```\n\n#### 2.7.1.2 Printing\
    \ Multiple Items\n\nTo print multiple items, we pass all the items in sequence\
    \ separated by commas as shown in the examples below. Do note that they are automatically\
    \ separated by spaces.\n\n```\n>>> print(\"hello\",\"world\")\nhello world\n>>>\
    \ print(\"2+3=\",2+3)\n2+3= 5\n```\n\n#### 2.7.1.3 Separating Items\n\nIf we want\
    \ to print multiple items but do not want space to be the separator, we can pass\
    \ the separator string as an argument to `print()` as shown in the examples below.\
    \ The separator string can be a single character, or multiple characters or even\
    \ a null string to indicate that we don't want any separator between the items.\
    \ Arguments like `sep` in the example below are called *keyword arguments* and\
    \ are covered in detail in section 10.6.\n\n```\n>>> print(\"hello\",\"world\"\
    ,sep=',')\nhello,world\n>>> print(\"hello\",\"world\",sep=\" <-> \")\nhello <->\
    \ world\n>>> print(\"Welcome\",\"to\",\"Python\",sep=\" <-> \")\nWelcome <-> to\
    \ <-> Python\n>>> print(\"2+3=\",2+3,sep=\"\")\n2+3=5\n```\n\n#### 2.7.1.4 Terminating\
    \ Items\n\nBy default, the `print()` function prints a newline character (`\\\
    n`) after printing all the items. If we choose, we can control this too using\
    \ the keyword argument `end` as shown in the examples below. Either we can end\
    \ up printing any suffix string of our choice, or more practically, remove the\
    \ newline so that multiple `print()` functions end up producing their output on\
    \ the same line.\n\n```\n>>> print(\"Python\", \"is\", \"a\", \"dynamic\", \"\
    language\", end=\"\\n\\t\\t--Python\\n\")\nPython is a dynamic language\n\t\t\
    --Python\n>>> print(\"Hello\",\"world\",end=\"\\n\\n\\n\\n\")\nHello world\n\n\
    \n\n>>> print(\"2+3=\",2+3,end=\"\")\n2+3= 5>>>\n```\n\n#### 2.7.1.5 Separating\
    \ Items and Terminating Items\n\nWe can combine the separator string and terminator\
    \ string as shown in the examples below:\n\n```\n>>> print(\"Welcome\",\"to\"\
    ,\"Python\",sep=\"...\",end=\"\\n---=====---\\n\")\nWelcome...to...Python\n---=====---\n\
    >>> print(\"Welcome\",\"to\",\"Python\",end=\"\\n---=====---\\n\",sep=\"...\"\
    )\nWelcome...to...Python\n---=====---\n```\n\nObservation:\n\n1.  The order in\
    \ which the keyword arguments `sep` and `end` are given do not matter.\n2.  Keyword\
    \ arguments must be at the end of the argument list. They cannot precede any non-keyword\
    \ argument.\n\n#### 2.7.1.6 Printing Blank Lines\n\nAs a special case, when no\
    \ argument is passed to the `print()` function, it ends up printing only the terminator\
    \ string, which is newline by default, and thus ends up printing a blank line:\n\
    \n```\n>>> print()\n>>>\n```\n\n### 2.7.2 Formatting Strings Using the format()\
    \ Function\n\nWhile we were able to print using the `print()` function, we were\
    \ unable to format the output in any way (apart from adding separator and terminator\
    \ strings). For more advanced formatting, we can rely on the `format()` function\
    \ of string class, which can format a string and give us a resultant string that\
    \ can then be printed.\n\nThe `format()` function searches the string for placeholders.\
    \ These placeholders are indicated by braces({}) and indicate that some value\
    \ needs to be substituted there (and probably formatted too). As a special case,\
    \ if the string has no placeholders in it, the `format()` function does nothing\
    \ with the string and returns it as it is, as shown in the example below:\n\n\
    ```\n>>> 'Hello world'.format()\n'Hello world'\n```\n\n> **NOTE:**\nThe `format()`\
    \ function of string class does not print! It returns the formatted string, which\
    \ can then be printed using `print()` if required.\n\n#### 2.7.2.1 Substituting\
    \ Arguments\n\nLet's now make use of the placeholders for substituting values.\
    \ The `format()` function can receive multiple arguments which are implicitly\
    \ numbered from 0. These argument values can be accessed and substituted in the\
    \ string wherever placeholders are present. The placeholder can specify which\
    \ argument is to be substituted by identifying the argument number as shown in\
    \ the example below:\n\n```\n>>> '{0} {1}'.format('Hello', 'world')\n'Hello world'\n\
    ```\n\nIn the above example, argument #0 is `Hello` and is substituted within\
    \ the string wherever `{0}` is present, and similarly argument #1 (`world`) is\
    \ substituted wherever `{1}` is present in the string.\n\n#### 2.7.2.2 Substituting\
    \ Arguments Out of Order\n\nSince the argument number is present in the placeholder,\
    \ we can even print argument values out of sequence as shown in the example below:\n\
    \n```\n>>> '{1} {0}'.format('Hello', 'world')\n'world Hello'\n```\n\n#### 2.7.2.3\
    \ Substituting Arguments Multiple Times\n\nNow that we've got a hang of how placeholders\
    \ work, nothing prevents us from referring to the same argument multiple times\
    \ within the format string:\n\n```\n>>> '{0} {1}, {0} reader. Python is my {1}'.format('Hello',\
    \ 'world')\n'Hello world, Hello reader. Python is my world'\n```\n\n#### 2.7.2.4\
    \ Substituting Arguments in Order\n\nAs a shortcut, if all placeholders reference\
    \ the arguments in order, the placeholders need not identify the argument at all\
    \ as shown in the below example:\n\n```\n>>> '{} {}'.format('Hello', 'world')\n\
    'Hello world'\n```\n\n#### 2.7.2.5 Substituting Arguments by Name\n\nIf you find\
    \ argument numbering cumbersome, you can even name the arguments using the concept\
    \ of *keyword arguments* and *named placeholders* as shown in the examples below:\n\
    \n```\n>>> '{p} is {a}, {p} is {b}! {p} is {c}!'.format(p='Python',a='easy',b='fun',c='brilliant')\n\
    'Python is easy, Python is fun! Python is brilliant!'\n>>> 'Hello {name}, welcome\
    \ to {language}!'.format(name='Ram',language='Python')\n'Hello Ram, welcome to\
    \ Python!'\n```\n\n#### 2.7.2.6 Basic Formatting of Arguments\n\nWe have only\
    \ visited the tip of the `format()` iceberg so far! Each placeholder supports\
    \ additional formatting information that can control how something is to be printed.\
    \ A more detailed coverage of this is provided in section 8.7, but for now let\
    \ us learn just a few steps.\n\nTo specify formatting for a placeholder, a ':'\
    \ is used after the argument specifier. After the ':', the formatting information\
    \ follows. Perhaps the simplest formatting is selecting the output base (b for\
    \ binary, o for octal, d for decimal and x for hexadecimal). Check out this example:\n\
    \n```\n>>> 'bin={0:b} oct={0:o} dec={0:d} hex={0:x}'.format(10)\n'bin=1010 oct=12\
    \ dec=10 hex=a'\n```\n\nConsidering that we now know the various ways of specifying\
    \ the argument and also some simple formatting, let us see various combinations\
    \ that we can use:\n\n| Combination | Meaning |\n|---|---|\n| {0} | Display argument\
    \ #0 |\n| {age} | Display argument named `age` |\n| {} | Display next argument\
    \ |\n| {0:d} | Display argument #0 in decimal |\n| {age:d} | Display argument\
    \ named `age` in decimal |\n| {:d} | Display next argument in decimal |\n\n*Table\
    \ 13: Examples of types of formatting*\n\n### 2.7.3 Taking Input Using the input()\
    \ Function\n\nWe know how to print output. Let us now learn how to receive input\
    \ from the user. This knowledge will help us write interactive Python scripts\
    \ that ask the user to provide input for the script.\n\n#### 2.7.3.1 Taking an\
    \ input\n\nTo receive any input from the user, the `input()` function can be used.\
    \ This function, in its simplest form, waits for the user to enter a line of text\
    \ and returns the input entered after chopping off the trailing newline character.\n\
    \n**Example:**\n\n```\n>>> name=input()\nRam\n>>> language=input()\nPython\n>>>\
    \ print('{} is learning {}'.format(name,language))\nRam is learning Python\n```\n\
    \n#### 2.7.3.2 Taking an input After Prompting\n\nAs is evident from the output\
    \ above, when the `input()` function is executed, it merely waits for the user\
    \ to enter a line of input. The user might have no clue that the script is waiting\
    \ for input. It is therefore a good idea to print some message informing the user\
    \ that some input is required. This message can be printed using a `print()` call\
    \ before invoking `input()`. There is an easier method though! The `input()` function,\
    \ helpful as it is, permits us to pass a prompt string to be displayed just prior\
    \ to accepting input from the user. In the previous example, no prompt string\
    \ was given and hence nothing was displayed. But if a prompt string is given,\
    \ it will be displayed and then the user is given a chance to enter input.\n\n\
    **Example:**\n\n```\n>>> name=input(\"Enter your name:\")\nEnter your name:Ram\n\
    >>> language=input(\"Enter language:\")\nEnter language:Python\n>>> print('{}\
    \ is learning {}'.format(name,language))\nRam is learning Python\n```"
