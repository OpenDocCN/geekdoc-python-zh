    # 8. Strings


    **Form #1:** `str.replace(old, new)`


    This function replaces all occurrences of the substring `old` in the string `str`
    by the substring `new` and returns the new string:


    ```

    >>> "Delhi-Bombay-Bangalore-Bombay".replace("Bombay","Mumbai")

    ''Delhi-Mumbai-Bangalore-Mumbai''

    ```


    **Form #2:** `str.replace(old, new, count)`


    In this form, the function performs at most `count` replacements from the beginning
    of the string `str`:


    ```

    >>> "Delhi-Bombay-Bangalore-Bombay".replace("Bombay","Mumbai",1)

    ''Delhi-Mumbai-Bangalore-Bombay''

    ```


    # 8.5.3 Substituting Substrings Using Template Strings


    An advanced form of string substitution is by making use of the `Template` class
    in the `string` module.


    A template is a string that contains placeholders for values to be substituted.
    A single template can be used multiple times to generate multiple strings, given
    values to be substituted. Thus, a template generates a string whenever values
    are substituted.


    # 8.5.3.1 Creating a Template


    Templates are objects of the class `Template` and use a string to represent the
    template itself internally. This template string can contain placeholders for
    values and these are indicated by the ''$'' symbol. Whenever a ''$'' is found
    in the template string, it''s interpretation is performed as follows:


    +   1. If the ''$'' is followed by a valid identifier, the identifier is considered
    to be the name of the placeholder.

    2. If the ''$'' is followed by ''{'', then the identifier found till ''}'' is
    considered to be the name of the placeholder.

    3. If the ''$'' is followed by another ''$'', it is considered as a single ''$''
    character


    We will examine substitution later вАУ first we''ll concentrate on the template
    string.'
  - '[PAGE 202]


    # Form #1: $identifier


    This is the simplest form wherein the identifier starts immediately after the
    ''$'' and goes on till the first character that cannot be used in an identifier.
    Here are some examples with identifiers (placeholders) highlighted:


    ```

    $capital is the capital of $country

    The sum of $x and $y is $z

    $abc123xyz789!@#

    ```


    # Form #2: ${identifier}


    A problem with form #1 is what if we want an identifier to be immediately followed
    by alphanumeric characters? How will it understand where the identifier ends and
    text begins? In such cases, we can use this form where the identifier is enclosed
    in braces. Here are some examples with the identifiers highlighted:


    ```

    ${thousand}000

    ${a}_${b}

    ```


    # Form #3: $$


    Since the ''$'' symbol has a special meaning as an indication of a placeholder,
    what if we want a simple ''$'' character within the template string? The solution
    is to use two ''$'' characters instead as shown in the examples below:


    ```

    $$1000

    $$x=10

    ```


    Now that we know how to frame template strings, let us see the code behind that
    in Python. Here is an example:


    ```

    >>> from string import Template

    >>> t=Template("The sum of $x and $y is $z")

    ```


    # Observation:


    +   1. We need the Template class which is present in the string module. The first
    line takes care of that.

    2. We create a Template object using a template string and store a reference to
    that object in the variable t.

    3. Using this template, we''ll be able to create multiple strings by substituting
    values, which we will see soon.'
  - "[PAGE 203]\n\n# 8. Strings\n\n# 8.5.3.2 Substituting Values in a Template Using\
    \ substitute()\n\nThe `substitute()` function of `Template` allows substitution\
    \ of values within a template and returns a string after substitution.\n\nThere\
    \ are multiple forms of `substitute()`:\n\n+   1. `template.substitute(dict)`\n\
    2. `template.substitute(keyargs)`\n3. `template.substitute(dict,keyargs)`\n\n\
    **Form #1:** `template.substitute(dict)`\n\nThis function substitutes values from\
    \ the dictionary `dict` into the placeholders in the template `template` and returns\
    \ the resultant string after substitution. The dictionary is supposed to contain\
    \ all the placeholder identifiers as keys with corresponding suitable values for\
    \ substitution.\n\nIn case a placeholder identifier exists in the template `template`\
    \ but not as a key in the dictionary `dict`, this will generate a `KeyError`.\n\
