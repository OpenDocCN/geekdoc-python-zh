    ## 9.9 Replacing Strings Using sub() and subn()


    Now that we know how to use regular expression functions to search within a string,
    it is time to focus on search-replace. This section focusses on how to search
    for a RE match within a string and replace the match by a string. The basic function
    that achieves this is `re.sub()`:


    ```

    re.sub(pattern, replacement/function, string, count=0, flags=0)

    ```


    Forms:


    1. `re.sub(pattern, replacement, string)`

    2. `re.sub(pattern, replacement, string, count)`

    3. `re.sub(pattern, replacement, string, count, flags)`

    4. `re.sub(pattern, function, string)`

    5. `re.sub(pattern, function, string, count)`

    6. `re.sub(pattern, function, string, count, flags)`


    ### Form #1: `re.sub(pattern, replacement, string)`


    Replaces all occurrences of the RE `pattern` within the string `string` by the
    string `replacement` and returns the new string:


    ```

    >>> import re

    >>> re.sub(r"\d+", "''n''", "There are 5 apples and 3 mangoes")

    "There are ''n'' apples and ''n'' mangoes"

    ```


    Observation:


    1. The original string argument, `string`, is not changed by this function. The
    new string with replacements made is merely returned.


    We can also use back-references (\1, \2, etc.) to use content that matched in
    the RE within the replacement string:


    ```

    >>> import re

    >>> re.sub(r"(\d+)/(\d+)/(\d{4})", r"\2-\1-\3", "25/12/2016")

    ''12-25-2016''

    ```


    Observation:


    1. We are attempting to match a UK-format date and convert it into a US-format
    equivalent.

    2. Since the replacement string contains backslashes, either we should prefix
    each backslash with another backslash or use raw strings вАУ we prefer the latter
    for simplicity and readability.

    3. The back-reference \1 refers to the content that matched the first group, \2
    for content that matched the second group and so on.


    ### Form #2: `re.sub(pattern, replacement, string, count)`


    In this form, we can specify the maximum number of replacements we wish within
    the string. If `count` is 0, this reverts to form #1 and replaces all occurrences
    of the RE `pattern` in the string `string`.


    ```

    >>> import re

    >>> re.sub(r"\d+", "''n''", "There are 5 apples and 3 mangoes", 1)

    "There are ''n'' apples and 3 mangoes"

    >>> re.sub(r"\d+", "''n''", "There are 5 apples and 3 mangoes", 5)

    "There are ''n'' apples and ''n'' mangoes"

    >>> re.sub(r"\d+", "''n''", "There are 5 apples and 3 mangoes", 0)

    "There are ''n'' apples and ''n'' mangoes"

    ```


    Observation:


    1. In the first example, only the first occurrence of a sequence of digits was
    replaced.

    2. In the second example, while we have asked for maximum 5 replacements, there
    were only 2 occurrences of the pattern and both were replaced.

    3. The third example is identical to the example we saw for form #1.


    ### Form #3: `re.sub(pattern, replacement, string, count, flags)`


    This form is identical to form #2 and also allows us to pass various `flags`,
    as discussed in section 10.4.4.


    ### Form #4: `re.sub(pattern, function, string)`


    This form is similar to form #1 in that this is used to perform a replace-all
    task, with the difference being that instead of using a fixed string for replacement,
    this calls the specified function passing a `match` object corresponding to each
    match obtained and uses the return value from the function as a replacement string:


    ```

    >>> import re

    >>> def f(m):

    ...     if int(m.string[m.start():m.end()])<10: return "few"

    ...     else: return "many"

    ...

    >>> re.sub(r"\d+",f,"There are 15 apples and 3 mangoes")

    ''There are many apples and few mangoes''

    ```


    Observation:


    1. Note that when we are invoking the `re.sub()` function, we specify `f` and
    not `f()` - in other words, we are providing the function name and not calling
    the function ourselves.

    2. The function `f` will receive a `match` object `m` each time a match is found.
    Recall from section 10.6 that `m.string` gives us the original string that was
    searched, `m.start()` gives us the starting index within the string where the
    match was found and `m.end()` gives is the ending index within the string where
    the match was found. Thus, `m.string[m.start():m.end()]` identifies the substring
    that was matched within the original string.

    3. The function `f` converts the matched substring into an integer and compares
    it with 10 вАУ if less than 10, the function returns the string "few", else it returns
    the string "many".


    ### Form #5: `re.sub(pattern, function, string, count)`


    This form of the function replaces up to `count` number of occurrences of the
    RE `pattern` within the string `string`, calling the function `function` each
    time a match is found, passing a `match` object to the function and using the
    function''s return value as the replacement string:


    ```

    >>> import re

    >>> def f(m):

    ...     if int(m.string[m.start():m.end()])<10: return "few"

    ...     else: return "many"

    ...

    >>> re.sub(r"\d+",f,"There are 15 apples and 3 mangoes", 1)

    ''There are many apples and 3 mangoes''

    ```


    Observation:


    1. We have asked for maximum 1 replacement and hence the number "3" remains in
    the original string.

    2. This form is similar to form #2, but uses a replacement function instead of
    a replacement string.

    3. As discussed in form #2, if the `count` is 0, this will work the same way as
    form #4 and replaces all occurrences of the pattern `pattern` in the string `string`.


    ### Form #6: `re.sub(pattern, function, string, count, flags)`


    This form is identical to form #5, but allows us to specify `flags` that control
    how the RE pattern should be treated, as discussed in section 10.4.4.


    The `re.subn()` is a very similar function that works the same way as `re.sub()`
    does, but returns a tuple containing the replaced string as well as the total
    number of substitutions performed:


    ```

    re.subn(pattern, replacement/function, string, count=0, flags=0)

    ```


    Example:


    ```

    >>> import re

    >>> re.subn(r"\d+","''n''","There are 5 apples and 3 mangoes")

    ("There are ''n'' apples and ''n'' mangoes", 2)

    ```


    ## 9.10 Compiling Regular Expressions


    If a particular RE is used frequently in the program, it is possible to optimize
    its use by "compiling" the regular expression and using the compiled regular expression
    object вАУ technically called a regex object - to perform operations instead. Here
    are some points to remember about regex objects:


    1. We can perform almost identical operations using the regex object instead of
    using the `re` library''s functions.

    2. Performing operations on regex objects are faster than working with `re` functions
    using RE strings.

    3. Python does compile regular expressions automatically and maintains a cache
    of recently used regular expressions. Thus, if we are using just a few regular
    expressions in our program, we need not worry about compiling them ourselves.

    4. In cases where we deal with many regular expressions in our program, we can
    compile the regular expressions ourselves and use the regex objects for better
    efficiency. At least the most frequently used regular expressions can be compiled.


    We use the `compile()` function of `re` to compile a RE and obtain a reference
    to the regex object:


    ```

    re.compile(pattern, flags=0)

    ```


    Forms:


    1. `re.compile(pattern)`

    2. `re.compile(pattern, flags)`


    **Form #1:** `re.compile(pattern)`


    In this form, the given RE pattern is compiled and a reference to the regex object
    is returned:


    ```

    >>> import re

    >>> c=re.compile(r"\d\d")

    ```


    **Form #2:** `re.compile(pattern, flags)`


    This form is identical to form #1, but also allows us to specify flags (discussed
    in section 10.4.4).'
