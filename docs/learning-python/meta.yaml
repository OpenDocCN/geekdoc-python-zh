    \ `index()` or `rindex()`.\n3.  If we want to count the number of occurrences\
    \ of a substring within a string, we can use the `count()` function.\n\n#### 8.2.1\
    \ Checking For the Existence of a Substring in a String Using startswith() and\
    \ endswith()\n\n##### 8.2.1.1 The startswith() Function\n\nTo check if a string\
    \ starts with a particular substring or not, we can use the `startswith()` function:\n\
    \n```\nstr.startswith(substring[,start=0[,end=len(str)]])\n```\n\nForms:\n\n```\n\
    1. str.startswith(substring)\n2. str.startswith(substring,start)\n3. str.startswith(substring,start,end)\n\
    ```\n\nForm #1: `str.startswith(substring)`\n\nThe function returns `True` if\
    \ the string `str` starts with the string `substring` and returns `False` otherwise:\n\
    \n```python\n>>> \"This is a demo\".startswith(\"This\")\nTrue\n>>> \"This is\
