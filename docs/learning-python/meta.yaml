    4. иѓ≠еП• `mod1.f()` и∞ГзФ®еМЕ `pkg1` зЪДж®°еЭЧ `mod1` зЪДеЗљжХ∞ `f`гАВз±їдЉЉеЬ∞пЉМиѓ≠еП• `mod2.f()` и∞ГзФ®еМЕ `pkg1` зЪДж®°еЭЧ\
    \ `mod2` зЪДеЗљжХ∞ `f`гАВ\n\nеЬ®дЄКињ∞иЃЊзљЃдЄ≠пЉМе¶ВжЮЬжИСдїђзЪДзЫЃж†ЗжШѓи∞ГзФ®еМЕ `pkg1` зЪДж®°еЭЧ `mod1` зЪДеЗљжХ∞ `f`пЉМдї•дЄЛжШѓеЗ†зІНжЦєж≥ХпЉЪ\n\n\
    ```\n>>> import pkg1.mod1\n>>> pkg1.mod1.f()\nThis is mod1's f\n```\n\n**иІВеѓЯпЉЪ**\n\
    \n1. иѓЈж≥®жДПпЉМињЩйЗМзїЩеЗЇзЪДжѓПдЄ™з§ЇдЊЛйГљеЬ®дЄНеРМзЪДдЇ§дЇТеЉПдЉЪиѓЭдЄ≠пЉМеЫ†дЄЇеЬ®еНХдЄ™дЉЪиѓЭдЄ≠пЉМжЙАжЬЙеЕИеЙНзЪДеѓЉеЕ•йГљдЉЪиҐЂиЃ∞дљПпЉБ\n2. иѓ≠еП• `import pkg1.mod1`\
    \ еѓЉеЕ•жХідЄ™зђ¶еПЈ `pkg1.mod1`гАВдїОињЩдЄ™иѓ≠ж≥ХеПѓдї•зРЖиІ£пЉМ`pkg1` жШѓеМЕзЪДеРНзІ∞пЉМиАМ `mod1` жШѓж®°еЭЧзЪДеРНзІ∞гАВ\n3. иѓ≠еП• `pkg1.mod1.f()`\
    \ и∞ГзФ®еѓЉеЕ•зЪДзђ¶еПЈ `pkg1.mod1` зЪДеЗљжХ∞ `f`пЉМеЃГе∞±жШѓеМЕ `pkg1` еЖЕзЪДж®°еЭЧ `mod1`гАВ\n\n```\n>>> from pkg1 import\
    \ mod1\n>>> mod1.f()\nThis is mod1's f\n```\n\n**иІВеѓЯпЉЪ**\n\n1. иѓ≠еП• `from pkg1 import\
