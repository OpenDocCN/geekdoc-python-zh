    # 15.7 Installing Packages and Modules


    There are many packages available for use with Python вАУ some of them are available
    when you install Python whereas others may have to be manually installed. This
    section shows how to install packages and modules using PythonвАЩs installer вАУ PIP
    (a recursive acronym for PIP Installs Packages).


    The syntax for installing a package using PIP is shown below:


    ```

    python -m pip install packageName

    ```


    **Observation:**


    +   1. We are running the Python interpreter (`python`) explicitly. If there are
    multiple Python interpreters installed, we can choose the appropriate one to be
    used for package installation.

    2. The `-m` option specifies that we are interested in running a named module
    (`pip`) as a script.

    3. The argument `install` is an argument for the PIP script that denotes that
    we wish to install a package.

    4. Finally, the `packageName` argument specifies the name of the package to be
    downloaded and installed.


    On many systems, PIP might be directly available as a command. On systems where
    both Python 2 and Python 3 are installed, PIP might be available as `pip` and
    `pip3` for these two version respectively. On such systems, the syntax for package
    installation is as follows:'
  - '[PAGE 546]


    ```

    pip install packageName

    pip3 install packageName

    ```


