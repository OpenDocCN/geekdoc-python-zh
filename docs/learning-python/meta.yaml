    The `find_all()` method is perhaps the single method we need to perform any search
    in the parse tree. Despite this, there are other possibilities when it comes to
    searching. Let us have a quick look at these before we conclude this section.


    As a short-cut for the `find_all()` method, we can directly use parentheses on
    the `BeautifulSoup` document or `Tag` object, as shown below:


    ```

    (continuation of previous session)

