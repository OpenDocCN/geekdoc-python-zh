  md: '# 2. Python Basics


    > **NOTE:**

    The `format()` function of string class does not print! It returns the formatted
    string, which can then be printed using `print()` if required.


    # 2.7.2.1 Substituting Arguments


    Let''s now make use of the placeholders for substituting values. The `format()`
    function can receive multiple arguments which are implicitly numbered from 0.
    These argument values can be accessed and substituted in the string wherever placeholders
    are present. The placeholder can specify which argument is to be substituted by
    identifying the argument number as shown in the example below:


    ```

    >>> ''{0} {1}''.format(''Hello'', ''world'')

    ''Hello world''

    ```


    In the above example, argument #0 is `Hello` and is substituted within the string
    wherever `{0}` is present, and similarly argument #1 (`world`) is substituted
    wherever `{1}` is present in the string.


    # 2.7.2.2 Substituting Arguments Out of Order


    Since the argument number is present in the placeholder, we can even print argument
    values out of sequence as shown in the example below:


    ```

    >>> ''{1} {0}''.format(''Hello'', ''world'')

    ''world Hello''

    ```


    # 2.7.2.3 Substituting Arguments Multiple Times


    Now that we''ve got a hang of how placeholders work, nothing prevents us from
    referring to the same argument multiple times within the format string:


    ```

    >>> ''{0} {1}, {0} reader. Python is my {1}''.format(''Hello'', ''world'')

    ''Hello world, Hello reader. Python is my world''

    ```


    # 2.7.2.4 Substituting Arguments in Order


    As a shortcut, if all placeholders reference the arguments in order, the placeholders
    need not identify the argument at all as shown in the below example:


    ```

    >>> ''{} {}''.format(''Hello'', ''world'')

    ''Hello world''

    ```'
