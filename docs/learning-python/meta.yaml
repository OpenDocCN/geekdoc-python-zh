  md: '# SUMMARY


    +   > A Class is a design according to which objects can later be instantiated.
    An Object is an instance of a class.

    > Data Encapsulation is the encapsulation of data and the code that acts on the
    data into a single unit. Data Hiding is the hiding of data from the external world
    with the intention of protecting the object against accidental changes, thereby
    maintaining the integrity of the object. Data Abstraction is the hiding of the
    implementation details and revealing of only an interface.

    > Polymorphism refers to the existence of multiple forms of the same entity. Inheritance
    is the mechanism where one class derives all features of another existing class.

    > Classes can be defined using the class keyword. Objects can be created using
    the syntax ClassName().

    > Instance variables can be created explicitly using an object, or by an instance
    method, and most often by the constructor.

    > Class variables are defined directly within the class and can be accessed by
    all instances of the class or by explicitly using the class name to gain access
    it.

    > Instance methods are methods that automatically work on the invoking object.
    Such methods will automatically receive a reference to the invoking method as
    the first parameter. This parameter is usually called self by programmers.

    > Class Functions are functions defined within the class that are not dependent
    on the invoking object.'
