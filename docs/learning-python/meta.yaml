    # 10.6 Keyword Arguments


    Keyword arguments are special arguments where the parameter name is identified
    at the place of call along with the value. These have various applications as
    shown in the following subsections.


    # 10.6.1 Keyword Arguments for Positional Arguments


    Positional Arguments are values passed for parameters on a one-to-one basis. The
    use of keyword arguments provides the flexibility of providing arguments in any
    order the programmer desires. Thus, there is no need to remember or follow the
    order of parameters in the function definition.


    ```

    >>> def si(p,t,r):

    ...     print("Interest:",(p*t*r)/100)

    ...

    >>> si(1000,3,9.5)

    Interest: 285.0

    >>> si(p=1000,r=9.5,t=3)

    Interest: 285.0

    >>> si(1000,r=9.5,t=3)

    Interest: 285.0

    ```


    **Observation:**


    +   1. In the above example, the `si()` function is designed to receive arguments
    for principal, time duration and rate of interest вАУ in that order.

    2. The example `si(1000,3,9.5)` passes 1000 as p, 3 as t and 9.5 as r.

    3. The example `si(p=1000,r=9.5,t=3)` passes 1000 as p, 3 as t and 9.5 as r. Note
    that the order of arguments given here do not match the order of parameters, but
    since we have explicitly identified the parameter by it''s name, there is no confusion.

    4. We can also mix positional parameters with keyword arguments as shown in the
    example `si(1000,r=9.5,t=3)`.'
