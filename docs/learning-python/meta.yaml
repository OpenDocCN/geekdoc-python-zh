    \ `builtins` дљЬдЄЇеПВжХ∞дЉ†йАТзїЩ `dir()`гАВ\n\n## 15. ж®°еЭЧ\n\n**ељҐеЉП #2пЉЪdir(moduleName)**\n\nж≠§еЗљжХ∞еИЧеЗЇжМЗеЃЪж®°еЭЧеСљеРНз©ЇйЧідЄ≠е≠ШеЬ®зЪДжЙАжЬЙж†ЗиѓЖзђ¶гАВдЄЛйЭҐжШѓдЄАдЄ™з§ЇдЊЛпЉМйАЪињЗжШЊеЉПж£АжЯ•\
