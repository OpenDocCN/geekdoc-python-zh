    # 14. File Handling


    ![](img/7831d9fe9e47e5b1109ec75197998a41_491_0.png)


    When a file is opened for reading or writing, the *current position* in that file
    will be byte 0 (the beginning of the file). This means that next read or write
    will start from position 0 and will increment the position by the number of bytes
    successfully read or written. (An exception to this is writes to files that have
    been opened in append modes, in which case data will always be written at the
    end of the file instead of at the current position). As we continue reading or
    writing, the position keeps incrementing, ensuring sequential access of the file
    contents.


    While writing to the file, it is possible to go past the end of the file, in which
    case the file grows with the writes. While reading from a file, it is not possible
    to go past the end of the file.


    Any particular position in the file can be selected by means of an offset applied
    from one of the standard positions:


    +   1. From the beginning of the file (identified by the standard position `SEEK_SET`)

    2. From the current position within the file (identified by the standard position
    `SEEK_CUR`)

    3. From the end of the file (identified by the standard position `SEEK_END`)


    A positive offset implies those many bytes after the selected standard position
    whereas a negative offset implies those many bytes before the selected standard
    position. An offset value of 0 implies exactly at the selected standard position.


    The table below shows some examples of how these offsets combined with standard
    positions can help locate a position in a file:


    | Offset | Standard Position | Meaning |

    | :--- | :--- | :--- |

    | 0 | `SEEK_SET` | Beginning of the file |

    | 10 | `SEEK_SET` | 10 bytes after the beginning of the file (positioned at the
    beginning of the 11th byte of the file) |

    | 0 | `SEEK_CUR` | Current position within the file (no change in position) |

    | 10 | `SEEK_CUR` | 10 bytes after the current position in the file (useful for
    the skipping over the next 10 bytes in the file) |'
