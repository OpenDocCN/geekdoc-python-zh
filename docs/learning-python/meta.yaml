    # # OOP IN PYTHON


    # ## 12.1 Overview of OOP Principles


    Object Oriented Programming (OOP) is a programming paradigm вАУ a way of looking
    at problems and designing solutions. The main goal behind OOP is to model the
    real world within the software so that we have a parallel reality, making it easier
    for us to relate code to the real world. This programming paradigm essentially
    uses the following 8 principles to achieve this goal:


    +   1. Classes

    2. Objects

    3. Data Encapsulation

    4. Data Hiding

    5. Data Abstraction

    6. Polymorphism

    7. Inheritance

    8. Message Passing


    We therefore will briefly cover these 8 principles before proceeding with how
    OOP can be used in Python.


    # ### 12.1.1 Class


    A class can be defined as a design according to which objects can be later instantiated.


    The starting point of Object Oriented Modelling is the class. The class is the
    design of an entity that exists in the real world. This design comprises of attributes
    (everything an entity has) and behaviour (everything an entity can do).


    As an example, here is a diagrammatic representation of a `Date` class (technically
    using UML for the class representation) to represent a calendar date:'
  - '[PAGE 356]


    ![](img/7831d9fe9e47e5b1109ec75197998a41_356_0.png)


    **Note:**


    +   1. For now, it is sufficient to just note that `Date` is the name of a class,
    which has 3 attributes - `day`, `month` and `year` - and 4 member functions -
    `setDate()`, `getDay()`, `getMonth()` and `getYear()`.

    2. Thus, the 3 pieces within the above UML diagram are: class name, data members
    and member functions.

    3. The "-" prefix denotes that we want to keep these members private (section
    12.4.6.2)

    4. The "+" prefix similarly denotes that we want to keep these members public
    (again, section 12.4.6).


    # 12.1.2 Object


    An *object* is an instance of a class.


    Once a class has been completely designed, multiple individual instances of the
    class can be created just as how once a car has been designed, multiple cars can
    be manufactured of the same design. These objects are identical to each other
    in terms of their design and yet independent of each other in terms of the values
    of their attributes. Thus, the different cars that are manufactured out of the
    same design can have different values for their attributes like their colour.
    The behaviour of all objects of the same class have to be identical, however.
    Thus, objects of a class typically have the same attributes and behaviour, but
    can differ from each other in the values of their attributes.


    In our `Date` example, `day`, `month` and `year` are attributes whereas `setDate()`,
    `getDay()`, `getMonth()` and `getYear()` are behaviour. Multiple `Date` objects
    can have different values for `day`, `month` and `year`, thereby representing
    possibly different dates, but will have identical functionality.'
  - '[PAGE 357]


    # 12.1.3 Data Encapsulation


    *Data Encapsulation* refers to the encapsulation of data and the code that acts
    on the data into a single unit. Since a class packs together attributes (data)
    and behaviour (code that acts on the data), we claim that classes make data encapsulation
    possible.


    Data Encapsulation is important in the programming world as it provides an equal
    status for code and data.


    In our `Date` example, the `Date` class encapsulates both the data (`day`, `month`
    and `year`) and the code that acts on the data (`setDate()`, `getDay()`, `getMonth()`
    and `getYear()`).


    # 12.1.4 Data Hiding


    An unwritten law in OOP is that all objects have to relate to reality at all times.
    Since an object in an instance of a class and a class is the design of an entity
    in the real world, we expect every object in our program to represent a valid
    real-world entity at all times. This law also entails ensuring that the attributes
    of an object are never meddled with in a way that it represents something absurd
    in reality. One of the ways of enforcing this is by hiding data that belongs to
    an object from the external world so that no one can accidentally tamper with
    it вАУ a concept called *Data Hiding*.


    In our `Date` example, we could try to hide the attributes `day`, `month` and
    `year` so as to prevent the users from tampering with them directly. This would
    prevent the user from, say, setting an invalid date like `40/30/2016`! We will
    instead provide functions for setting and getting the date, with validations enforced
    as necessary.


    # 12.1.5 Data Abstraction


    *Data Abstraction* refers to the hiding of implementation details while revealing
    a simple interface. The first advantage of Data Abstraction is that it makes the
    object easy to use as the users need to only be aware of the interface and need
    not know any implementation details. Secondly, when the implementation is insulated
    from the usage via the interface, it makes it possible to later change the implementation
    without affecting the usage by keeping the interface consistent. This adds a lot
    of value in practical programming, especially during the maintenance of the software.


    In our `Date` example, we have provided a simple interface to set and get the
    date without the user having to know how we end up storing the date within the
    object.


    Data Hiding and Data Abstraction are very much related but are not exactly the
    same! Both concentrate on hiding something, but with very different intentions!
    While Data Hiding concentrates on hiding data in order to help maintain the integrity
    of the object, Data Abstraction concentrates on hiding implementation details
    in order to simplify the usage of the object.'
- md: "## 12.1.6 Polymorphism\n\nThe term *polymorphism* in general means multiple\
    \ forms of the same entity. In OOP, it means performing the same logical operation\
    \ by choosing from multiple implementations appropriately. The two forms of polymorphism\
    \ that we are going to see actively in Python are:\n\n1. *Operator overloading*\
    \ вАУ performing the same logical operation using an operator in different ways\
    \ (using different implementation) depending on the type of the invoking operand.\n\
    2. *Dynamic polymorphism* вАУ performing the same logical operation in different\
    \ ways (using different implementation) depending on the type of the invoking\
    \ object.\n\nIn the `Date` example, an example of operator overloading would be\
    \ providing an implementation for addition of days to a given date, resulting\
    \ in a new Date object.\n\n## 12.1.7 Inheritance\n\n*Inheritance* is the mechanism\
    \ wherein a class acquires all the features and properties of another class (or\
    \ classes). Inheritance has the following uses:\n\n1. **Re-usability** вАУ it helps\
    \ reduce effort by reusing existing code.\n2. **Extensibility** вАУ it helps add\
    \ new code or apply changes without tampering with existing code.\n3. **Compartmentalisation**\
    \ вАУ it helps manage code better by compartmentalising classes.\n\nStructurally,\
    \ there are multiple types of inheritance:\n\n1. **Simple inheritance** вАУ when\
    \ a class inherits from another class.\n\n![](img/7831d9fe9e47e5b1109ec75197998a41_358_0.png)\n\
    \n2. **Multi-level inheritance** вАУ when a class inherits from a class that inherits\
    \ from another class, thereby forming an inheritance chain.\n\n![](img/7831d9fe9e47e5b1109ec75197998a41_359_0.png)\n\
    \n3. **Multiple inheritance** вАУ when a class inherits from multiple classes.\n\
    \n![](img/7831d9fe9e47e5b1109ec75197998a41_359_1.png)\n\n4. **Hierarchical inheritance**\
    \ вАУ When multiple classes inherit from a single class.\n\n![](img/7831d9fe9e47e5b1109ec75197998a41_360_0.png)\n\
    \nInheritance is an important concept as dynamic polymorphism is totally dependent\
    \ on it. In our `Date` example, we can inherit custom date format classes like\
    \ `USDate` and `UKDate` from the `Date` class, adding only as much functionality\
    \ as needed to support the date format.\n\n## 12.1.8 Message Passing\n\nIn OOP,\
    \ programs are expected to document class structures, create objects at runtime\
    \ and permit these objects to communicate with each other at runtime. This inter-object\
    \ communication between objects at runtime is called *message passing* and is\
    \ implemented typically by making function calls, with the arguments passed being\
    \ technically called the *message*.\n\n## 12.2 Defining Classes\n\nDesigning a\
    \ class is the first step in OOP. The simplest syntax of defining a class in Python\
    \ is shown below:\n\n```python\nclass className:\n    statements\n```\n\nThe statements\
    \ within a class can be any of the following:\n\n1. Blank lines\n2. Comments\n\
    3. Class variables\n4. Class functions\n\nWe will cover class variables in section\
    \ 12.4.3 and class functions in section 12.4.4. For now, let us start with an\
    \ empty class. Since at least 1 statement is compulsory within a class definition\
    \ (similar to how conditions, loops and functions need to have at least 1 statement\
    \ within their body), we can use the `pass` statement to get away without causing\
    \ any effect:\n\n```python\nclass Date:\n    pass\n```\n\nJust as how a function\
    \ definition can optionally start with a documentation string, even class definitions\
    \ can contain documentation strings, which are then accessible using the special\
    \ class variable `__doc__`:\n\n```python\n>>> class Date:\n...     \"\"\"This\
    \ is our first implementation of the Date class\"\"\"\n...     pass\n...\n>>>\
    \ Date.__doc__\n'This is our first implementation of the Date class'\n```\n\n\
    We will add more code into the class definition as we learn more features in Python.\n\
    \n## 12.3 Instantiating Classes\n\nOnce our class definition is ready, we can\
    \ instantiate it and create objects. Each object will have everything documented\
    \ in the class definition. In our `Date` example, since the class is empty, even\
    \ the objects will be almost empty. Do note that the documentation string which\
    \ was part of the class is now also accessible via the object. The simplest syntax\
    \ for instantiating a class and creating an object and storing its reference in\
    \ a variable is shown below:\n\n```python\nvar = ClassName()\n```\n\nThis is how\
    \ we can instantiate our `Date` class:\n\n```python\n>>> d = Date()\n>>> d\n<__main__.Date\
    \ object at 0x7f592e29fb50>\n>>> type(d)\n<class '__main__.Date'>\n>>> d.__doc__\n\
    'This is our first implementation of the Date class'\n```\n\nAs can be seen, the\
    \ `__doc__` member of the class is accessible through the object `d` too.\n\n\
    ## 12.4 Instance Variables, Class Variables, Functions and Methods\n\nThe attributes\
    \ present in a class are called *Class Variables* and the functionality provided\
    \ by the class using functions are called *Class Functions*.\n\nClass variables\
    \ belong to the class and are accessible using any object of the class too. In\
    \ other words, class variables could be said to be shared by objects of that class.\n\
    \nObjects can have their own independent variables called *Instance Variables*.\n\
    \nThe functions defined in a class are *Class Functions* and as such belong to\
    \ the class and are also accessible and invokable by any object of that class,\
    \ with the object playing no other role apart from identifying the class to which\
    \ the Class Function belongs. When these functions work on a per-object basis\
    \ (by keeping track of the invoking object and implicitly working on it), they\
    \ are called *Methods*.\n\nThis section focuses on these 4 concepts:\n\n1. Instance\
    \ Variables\n2. Instance Methods\n3. Class Variables\n4. Class Functions\n\n###\
    \ 12.4.1 Instance Variables\n\nInstance Variables are variables that belong to\
    \ an object.\n\n> **For C/C++/Java programmers:**\n> Unlike languages like C++\
    \ and Java where the class definition specifies the instance variables, in Python\
    \ the class can only specify the Class Variables (which are like `static` data\
    \ members in C++ and `static` fields in Java).\n\nPython uses the Perl style,\
    \ wherein the object can create whatever instance variables it desires. In fact,\
    \ it is possible for different objects of the same class to have different instance\
    \ variables, though doing so might not be a good idea! This creation of instance\
    \ variables is typically done using methods, as will be demonstrated in an example\
    \ soon.\n\nInstance variables can also be deleted using the `del` statement!\n\
    \nIn our `Date` example, we want the `Date` objects to have `day`, `month` and\
    \ `year` as instance variables вАУ we want each `Date` object to have its own value\
    \ for these. These instance variables can be created in the `setDate()` method\
    \ as shown below:\n\n```python\n>>> class Date:\n...     def setDate(self, d,\
    \ m, y):\n...         self.day, self.month, self.year = d, m, y\n...\n>>> d =\
    \ Date()\n>>> d.setDate(1, 2, 2000)\n>>> d\n<__main__.Date object at 0x7f592df6cb50>\n\
    >>> d.day\n1\n>>> d.month\n2\n>>> d.year\n2000\n```\n\n### Observation:\n\n1.\
    \ `setDate()` is a method вАУ a function of the class `Date` that requires an invoking\
    \ object to invoke it upon itself. In our example, the statement `d.setDate(1,\
    \ 2, 2000)` shows how the `Date` object `d` invokes the function `setDate()` upon\
    \ itself, passing `1`, `2` and `2000` as arguments to the method.\n2. A reference\
    \ to the invoking object is passed implicitly as the first argument to the method\
    \ `setDate()`, and is received as the parameter `self`. While the parameter name\
    \ should not matter strictly speaking, as a convention it is always named `self`.\
    \ It would be wise to follow this convention.\n3. Everything that belongs to the\
    \ invoking object should be explicitly preceded by the reference `self`. Thus,\
    \ to access the instance variable `day` of the invoking object, we would need\
    \ to access `self.day`. The first time an assignment is made to an instance variable\
    \ that does not exist, the instance variable is created.\n4. The `setDate()` method\
    \ copies the given parameters (`d`, `m` and `y`) to the corresponding instance\
    \ variables (`self.day`, `self.month` and `self.year` respectively). We will improve\
    \ this method later by adding validation support.\n5. The above example shows\
    \ that the `setDate()` works as expected.\n\n### 12.4.2 Instance Methods\n\nIn\
    \ the previous example, we have already seen the method `setDate()` in action.\
    \ We have seen that methods are functions of the class that use invoking objects,\
    \ and can access their corresponding invoking objects using the first parameter\
    \ вАУ typically called `self`.\n\nLet us add more instance methods to our `Date`\
    \ class:\n\n```python\n>>> class Date:\n...     def setDate(self, d, m, y):\n\
    ...             self.day, self.month, self.year = d, m, y\n...     def getDay(self):\
    \ return self.day\n...     def getMonth(self): return self.month\n...     def\
    \ getYear(self): return self.year\n...\n>>> d = Date()\n>>> d.setDate(1, 2, 2000)\n\
    >>> print(\"{}-{}-{}\".format(d.getDay(), d.getMonth(), d.getYear()))\n1-2-2000\n\
    ```"
  mdcn: "## 12.1.6 е§ЪжАБ\n\n*е§ЪжАБ*дЄАиѓНйАЪеЄЄжМЗеРМдЄАеЃЮдљУзЪДе§ЪзІНељҐжАБгАВеЬ®йЭҐеРСеѓєи±°зЉЦз®ЛдЄ≠пЉМеЃГжДПеС≥зЭАйАЪињЗйАВељУйАЙжЛ©е§ЪзІНеЃЮзО∞жЭ•жЙІи°МзЫЄеРМзЪДйАїиЊСжУНдљЬгАВжИСдїђе∞ЖеЬ®PythonдЄ≠зІѓжЮБзЬЛеИ∞зЪДдЄ§зІНе§ЪжАБељҐеЉПжШѓпЉЪ\n\
    \n1. *ињРзЃЧзђ¶йЗНиљљ* вАУ ж†єжНЃи∞ГзФ®жУНдљЬжХ∞зЪДз±їеЮЛпЉМдї•дЄНеРМжЦєеЉПпЉИдљњзФ®дЄНеРМеЃЮзО∞пЉЙдљњзФ®ињРзЃЧзђ¶жЙІи°МзЫЄеРМзЪДйАїиЊСжУНдљЬгАВ\n2. *еК®жАБе§ЪжАБ* вАУ ж†єжНЃи∞ГзФ®еѓєи±°зЪДз±їеЮЛпЉМдї•дЄНеРМжЦєеЉПпЉИдљњзФ®дЄНеРМеЃЮзО∞пЉЙжЙІи°МзЫЄеРМзЪДйАїиЊСжУНдљЬгАВ\n\
    \nеЬ®`Date`з§ЇдЊЛдЄ≠пЉМињРзЃЧзђ¶йЗНиљљзЪДдЄАдЄ™дЊЛе≠РжШѓдЄЇзїЩеЃЪжЧ•жЬЯжЈїеК†е§©жХ∞жПРдЊЫдЄАдЄ™еЃЮзО∞пЉМдїОиАМдЇІзФЯдЄАдЄ™жЦ∞зЪДDateеѓєи±°гАВ\n\n## 12.1.7 зїІжЙњ\n\n*зїІжЙњ*жШѓдЄАзІНжЬЇеИґпЉМеЕґдЄ≠дЄАдЄ™з±їиОЈеПЦеП¶дЄАдЄ™з±їпЉИжИЦе§ЪдЄ™з±їпЉЙзЪДжЙАжЬЙзЙєжАІеТМе±ЮжАІгАВзїІжЙњжЬЙдї•дЄЛзФ®йАФпЉЪ\n\
    \n1. **еПѓйЗНзФ®жАІ** вАУ йАЪињЗйЗНзФ®зО∞жЬЙдї£з†БжЭ•еЄЃеК©еЗПе∞СеЈ•дљЬйЗПгАВ\n2. **еПѓжЙ©е±ХжАІ** вАУ жЬЙеК©дЇОеЬ®дЄНдњЃжФєзО∞жЬЙдї£з†БзЪДжГЕеЖµдЄЛжЈїеК†жЦ∞дї£з†БжИЦеЇФзФ®жЫіжФєгАВ\n\
    3. **ж®°еЭЧеМЦ** вАУ йАЪињЗе∞Жз±їж®°еЭЧеМЦжЭ•еЄЃеК©жЫіе•љеЬ∞зЃ°зРЖдї£з†БгАВ\n\nдїОзїУжЮДдЄКзЬЛпЉМзїІжЙњжЬЙе§ЪзІНз±їеЮЛпЉЪ\n\n1. **зЃАеНХзїІжЙњ** вАУ ељУдЄАдЄ™з±їзїІжЙњиЗ™еП¶дЄАдЄ™з±їжЧґгАВ\n\
