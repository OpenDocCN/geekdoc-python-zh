    # 16. Working with Databases


    We will first demonstrate how to create the Employee table discussed in section
    16.1.2.1 using this method:


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="CREATE TABLE Employee( name TEXT, id INTEGER, email TEXT)"

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7f596a1ba490>

    >>> conn.commit()

    >>> conn.close()

    ```


    Now that we have created the table and committed it, it will be available for
    us anytime we want, even in a different Python session!


    Let us launch another Python interpreter session and continue writing a record
    into the table created.


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="""INSERT INTO Employee VALUES("Ram",1,"ram@company.com")"""

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7f35d86e7490>

    >>> conn.commit()

    >>> conn.close()

    ```


    # 16.4.3 Using Placeholders


    Many a times, we wish to frame a query template containing placeholders for values
    that will be filled in dynamically with suitable values when the query is to be
    executed. It is possible to frame such a query, using "?" as placeholders, as
    shown in the example below that continues to write 2 more records to the Employee
    database using a single query template:


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="""INSERT INTO Employee VALUES(?,?,?)"""

    >>> cursor.execute(query,("Sham",2,"sham@company.com"))

    <sqlite3.Cursor object at 0x7f35d86e7500>

    >>> cursor.execute(query,("Balram",3,"ballu@company.com"))

    <sqlite3.Cursor object at 0x7f35d86e7490>

    >>> conn.commit()

    >>> conn.close()

    ```


