    дЄАеѓєеЭРж†ЗзЪДж†ЉеЉПдЄЇ (x, y)пЉМе∞ЖзФ±дї•дЄЛж≠£еИЩи°®иЊЊеЉПеМєйЕНпЉЪ


    ```

    \([-+]?\d+, [-+]?\d+\)

    ```


    иІВеѓЯпЉЪ


    1.  x еЭРж†ЗеТМ y еЭРж†ЗеИЖеИЂдљњзФ®зЫЄеРМзЪДж≠£еИЩи°®иЊЊеЉПж®°еЉПеМєйЕНгАВ"("гАБ"," еТМ ")" дљЬдЄЇе≠Чзђ¶дњЭзХЩгАВзФ±дЇОжЛђеПЈжШѓињРзЃЧзђ¶пЉМйЬАи¶БиљђдєЙгАВзФ±дЇО "," дЄНжШѓињРзЃЧзђ¶пЉМеЫ†ж≠§дЄНдЉЪиҐЂиљђдєЙгАВ

    2.  ж®°еЉП `[-+]\d+` жФѓжМБеПѓйАЙзЪДж≠£иіЯеПЈеРОиЈЯдЄАдЄ™жХіжХ∞гАВж≠§ж≠£еИЩи°®иЊЊеЉПдїЕеМєйЕНжХіжХ∞пЉМдљЖдєЯеПѓдї•дљњзФ®жИСдїђдєЛеЙНзФ®дЇОеМєйЕНеЃЮжХ∞зЪДж®°еЉПгАВ


