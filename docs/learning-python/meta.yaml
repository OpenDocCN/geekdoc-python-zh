    \ this would be to handle the exception at the level where it occurred as well\
    \ as inform the caller that the process failed. The syntax for re-raising the\
    \ exception is shown below:\n\n```python\nraise\n```\n\n**Note:**\n\n1. Observe\
    \ that this differs from the normal syntax of `raise`, which requires an exception\
    \ object. This syntax is understood to mean that we wish to raise the same exception\
    \ that we are currently handling.\n2. This special syntax of `raise` is only available\
