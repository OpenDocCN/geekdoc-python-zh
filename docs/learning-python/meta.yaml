    # SUMMARY


    +   - Unhandled exceptions result in program termination!

    - An exception that is caught by an except statement can be re-raised for additional
    processing using the raise statement.

    - User-defined exceptions can be created by creating custom classes that extend
    directly or indirectly from the Exception class. Instances of such classes can
    then be raised as required.


