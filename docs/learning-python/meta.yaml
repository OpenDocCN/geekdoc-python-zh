    # 2. Python Basics


    This built-in function is also helpful for converting other types like `int` and
    `string` to the type `bool`. Also, the default constructor of `bool` class will
    create a `bool` with value `False`.


    ```

    >>> bool(0)

    False

    >>> bool(10)

    True

    >>> bool(0.0)

    False

    >>> bool(-12.5)

    True

    >>> bool("hello")

    True

    >>> bool("")

    False

    >>> bool()

    False

    ```


    > **NOTE:**

    Section 20.1.1.4 discusses conversion to `bool` in detail and can throw more light
    on why we are getting the above output.


    # 2.3.5.2 Operations on Type bool


    The most common and practical operations on Boolean types are Boolean operations
    of `and`, `or` and `not`.


    The `and` operator performs a logical AND operation. It is a short-circuiting
    operator, implying that if the result can be obtained after evaluation of the
    first operand itself, it does not bother evaluating the second operand.


    **Examples:**


    ```

    >>> True and False

    False

    >>> False and True

    False

    >>> True and True

    True

    ```'
  - '[PAGE 48]


    The `and` operator can work on other types too! To generalise it''s working, consider
    the example `x and y`.


    +   - If `x` evaluates to `False`, the result is `x`

    - If `x` evaluates to `True`, the result is `y`


    ```

    >>> 2 and 5

    5

    >>> 5 and 2

    2

    >>> 0 and 5

    0

    ```


    The `or` operator performs a logical OR operation. It is a short-circuiting operator,
    implying that if the result can be obtained after evaluation of the first operand
    itself, it does not bother evaluating the second operand.


    **Examples:**


    ```

    >>> True or False

    True

    >>> False or True

    True

    >>> False or False

    False

    ```


    The `or` operator can work on other types too! To generalise it''s working, consider
    the example `x or y`.


    +   - If `x` evaluates to `False`, the result is `y`

    - If `x` evaluates to `True`, the result is `x`


    ```

    >>> 2 or 5

    2

    >>> 5 or 2

    5

    >>> 0 or 5

    5

    ```


    The `not` operator performs a logical NOT operation.'
- md: "## 2. Python Basics\n\nExamples:\n\n```\n>>> not False\nTrue\n>>> not True\n\
    False\n```\n\nThe `not` operator can work on other types too! To generalise it's\
    \ working, consider the example `not x`.\n\n- If `x` evaluates to `False`, the\
    \ result is `True`\n- If `x` evaluates to `True`, the result is `False`\n\n```\n\
    >>> not 2\nFalse\n>>> not 5\nFalse\n>>> not 0\nTrue\n```\n\n> **NOTE:**\n> When\
    \ other data types are used here instead of `bool`, a Boolean conversion takes\
    \ place as documented in section 20.1.1.4.\n> The type `bool` is considered to\
    \ be a subtype of `Integral` (just like the type `int`), and hence all operators\
    \ that work on `int` also work on `bool`. In such cases, it will help to remember\
    \ to substitute `True=1` and `False=0`.\n\n## 2.4 Identifiers\n\nAn identifier\
    \ is a name given to a program element. Variable names, class names and function\
    \ names are some examples of identifiers.\nThe rules for naming identifiers in\
    \ Python are similar to those of C but also permit Unicode characters:\n\n1. The\
    \ permissible characters are alphabets, digits and underscores\n2. The first character\
    \ cannot be a digit. Underscore as the first character can have special meanings\
    \ that will be discussed in later sections\n3. The length is not limited (but\
    \ is subject to practical limits however!)\n4. An identifier cannot have the same\
    \ name as a keyword (discussed in section 2.5)\n\nGood programming practices dictate\
    \ that identifier names be relevant and readable so that a reader can figure out\
    \ what the identifier represents. The coding convention used by Python professionals\
    \ are:\n\n1. Variable names and function names should be in lowercase with underscores\
    \ separating words. E.g.: `variable_name`, `function_name()`\n2. Class names (and\
    \ exception names as they are classes) should be in lowercase with the first letter\
    \ of every word capitalized. E.g.: `ClassName`, `ExceptionName`\n3. Constant names\
    \ should be in uppercase with underscores separating words. E.g.: `CONSTANT_NAME`\n\
    4. All other identifiers (package name, module name, method name, instance variable\
    \ name, local variable name, function parameter name) should follow the convention\
    \ of variable names\n\n## 2.5 Keywords\n\nKeywords are special words that are\
    \ understood by Python. These cannot be used as identifiers. We will learn keywords\
    \ on a need basis as and when it is time to learn them. We have already seen some\
    \ keywords like `True`, `False`, `and`, `or` and `not`. Below is the list of all\
    \ keywords in Python in alphabetical order:\n\n| and | else | in | return |\n\
    | --- | --- | --- | --- |\n| as | except | is | True |\n| assert | False | lambda\
    \ | try |\n| break | finally | None | while |\n| class | for | nonlocal | with\
    \ |\n| continue | from | not | yield |\n| def | global | or | |\n| del | if |\
    \ pass | |\n| elif | import | raise | |\n\n## 2.6 Variables\n\nLet us now discuss\
    \ a few points about variables, their data types, their values and operations\
    \ on them before proceeding to input and output. We have already seen the data\
    \ types available in Python. These data types come into use when we have certain\
    \ values of that type and the entity that holds this value is a variable. Here\
    \ are a few important points about variables in Python:\n\n### 1. Variables can\
    \ be created when required and where required\n\nUnlike some of the more restrictive\
    \ languages, we can start using a variable whenever required without having to\
    \ declare it at the beginning of a block. This gives us flexibility and allows\
    \ us to maintain focus on solving the problem at hand. A variable springs into\
    \ existence the moment a value to assigned to it. There is no concept of specifying\
    \ it's data type.\n\n```\nx = 10 #x is created here\nx = 25 * x\ny = x #y is created\
    \ here\n```\n\n### 2. The value of a variable can change at any time\n\nLike other\
    \ programming languages, the values of variables can be changed whenever required.\
    \ However, what makes Python different here is the fact that there is no direct\
    \ way in Python to implement constants. A good programmer recognises a constant\
    \ from it's name and treats it like a constant though the interpreter may not!\n\
    \n```\nx = 10 #x is created here\nx = 25 * x #The value of x changes here\nMAX\
    \ = 100 #MAX is created here\nMAX = 200 #The value of MAX changes here\n```\n\n\
    > **For C/C++/Java programmers:**\n> Python does not have the equivalent of keywords\
    \ like `const` (C/C++) and `final` (Java).\n\n### 3. The type of a variable can\
    \ change at any time\n\nUnlike statically typed languages, the data type in Python\
    \ is associated with a value and not with a variable! Since the value of a variable\
    \ can change at any point of time, and the data type is an associated property\
    \ of the value, the data type referred to by a variable could also change! The\
    \ data type of any data item (possibly referred to by a variable) could be found\
    \ out using the `type()` function as shown in the examples below.\n\n```\n>>>\
    \ x=2\n>>> type(x)\n<class 'int'>\n>>> x=2.5\n>>> type(x)\n<class 'float'>\n>>>\
    \ type(int)\n<class 'type'>\n>>> type(type)\n<class 'type'>\n```\n\n### 4. We\
    \ can programmatically find out the data type of the value associated with a variable,\
    \ and can also determine whether the type is вАЬcompatibleвАЭ with another\n\nWhile\
    \ the `type()` function can give us the data type, what is more practical most\
    \ of the times is simply verifying whether the data type of a particular value\
    \ is a particular one or not (or whether it is a subtype of a particular one or\
    \ not). For the built-in numeric types, the hierarchy is covered in detail in\
    \ section 20.1 and can be verified from the examples below:\n\n```\n>>> import\
    \ numbers\n>>> x=2.5\n>>> isinstance(x,int)\nFalse\n>>> isinstance(x,float)\n\
    True\n>>> isinstance(x,numbers.Integral)\nFalse\n>>> isinstance(x,numbers.Real)\n\
    True\n>>> isinstance(x,numbers.Complex)\nTrue\n>>> isinstance(x,numbers.Number)\n\
    True\n>>> isinstance(x,object)\nTrue\n```\n\nObservation:\n\n1. The value 2.5\
    \ is of type float, which is a subtype of numbers.Real, which is a subtype of\
    \ numbers.Complex, which is a subtype of numbers.Number, which is a subtype of\
    \ object. The entire type hierarchy can be verified from section 20.1.\n2. At\
    \ the end of the day, all values are stored within objects, making object the\
    \ root of the entire hierarchy.\n\n### 5. The operations permissible on a variable\
    \ depend on the data type of the value the variable is currently referring to\
    \ and thus can change during the execution of the script\n\nSince we have established\
    \ that the data type of a variable can change depending on the data type of the\
    \ value it is referring to, and the operations that can be performed depends on\
    \ the data type, what can and cannot be done with a variable depends on the data\
    \ type of the value the variable currently refers to. As the data type of the\
    \ value changes, so do the permissible operations! This is illustrated in the\
    \ examples below:\n\n```\n>>> x=25\n>>> x%7\n4\n>>> len(x)\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: object of type\
    \ 'int' has no len()\n>>> x='Hello'\n>>> x%7\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: not all arguments converted\
    \ during string formatting\n>>> len(x)\n5\n```\n\n### 6. Values are objects and\
    \ variables are merely references to these objects\n\nAny data item (value) is\
    \ an object, and when they are assigned to a variable, what the variable is said\
    \ to contain is a reference to that object. Thus, values and variables are very\
    \ different! A single value (object) can have multiple references to it. Put another\
    \ way, multiple variables can claim to contain the same identical value. Destroying\
    \ a variable decrements the number of references that particular value has. When\
    \ this reference count reaches 0 (an indication that the value does not have any\
    \ variable referring to it) it is considered to be garbage and is a candidate\
    \ for garbage collection. Destroying a variable is immediate and results in the\
    \ variable disappearing from the program (till it is recreated if required). This\
    \ however need not imply a destruction of the value."
