  md: "# 12.4.4 Class Functions\n\nJust as how variables defined in a class automatically\
    \ become class variables, functions defined within a class also become class functions.\
    \ They are methods only when an object is used to invoke the function, in which\
    \ case a reference to the invoking object is passed automatically as the first\
    \ argument and is typically received as the `self` parameter. Class functions\
    \ can be invoked only through the class object and obviously do not receive any\
    \ invoking object reference as `self`.\n\nThe following code snippets will help\
    \ demonstrate these features:\n\n```\n>>> class A:\n...     x=10\n...     def\
    \ increment():\n...             A.x=A.x+1\n...\n>>> A.x\n10\n>>> A.increment()\n\
    >>> A.x\n11\n```\n\nWe define a class `A` with a class variable `x` that is initialized\
    \ to `10`. We define a function `increment()` that increments the value of this\
    \ class variable. The function is invoked using the class object (`A`) and not\
    \ by using any object of the class `A`.\n\n```\n(continuation)\n>>> a=A()\n>>>\
    \ b=A()\n>>> a.x\n11\n>>> b.x\n11\n```\n\nWe then create 2 objects of the class\
    \ `A` (`a` and `b`) and observe that they too give us the incremented value of\
    \ the class variable `x`.\n\nWe cannot however invoke the class function `increment()`\
    \ using any of the objects `a` and `b` as class functions are not methods:\n\n\
    ```\n(continuation)\n>>> a.increment()\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\nTypeError: increment() takes 0 positional\
    \ arguments but 1 was given\n```"
