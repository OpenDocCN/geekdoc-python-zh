    # 17.2.2 Feeding HTML Data


    We have already seen how to respond to various parts in an HTML document. We have
    also seen the `feed()` method that is used to provide the HTML data and has the
    following syntax:


    ```

    HTMLParser.feed(self, data)

    ```


    This method feeds in the given `data` to the parser and that results in an immediate
    execution of suitable methods. Data can be вАЬaddedвАЭ to the parser by calling this
    method several times. Technically, data is buffered internally since this method
    can be called any time with more content. This means that text content can remain
    in the buffer, unreported via any of the methods discussed. The buffer is guaranteed
    to be flushed out when we invoke the `close()` method on the parser object:


    ```

