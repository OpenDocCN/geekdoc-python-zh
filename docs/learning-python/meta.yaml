    # SUMMARY


    +   > A tuple is an immutable sequence of elements - elements cannot be added
    to or deleted from a tuple.

    > A tuple can be simply created using (). Elements of a tuple can be accessed
    using [].

    > Parentheses is not required for a tuple to be identified! Just the comma between
    elements is enough!

    > The len() function gives the number of elements in a tuple and the count() method
    returns the number of occurrences of a particular element in the tuple.

    > The for loop can be naturally used to iterate through the elements of a tuple.

    > The in and not in operators check for the existence of an element in a tuple.
    The index() method can return the position of an element in a tuple.

    > A tuple slice is an independent tuple made up of elements taken from a tuple
    using the [:] syntax.


