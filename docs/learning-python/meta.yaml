    # SUMMARY


    +   > Functions need to be defined before they can be called.

    > Functions are objects and references to them can be stored in variables!

    > Positional Arguments are always assigned on a one-to-one basis, from the function
    call arguments to the function definition parameters.

    > Default Arguments cannot be followed by Positional Arguments. Any default argument
    omitted at the place of call will take on its default value in the definition.

    > Keyword Arguments can be used to change the order of Positional Arguments at
    the place of function call.

    > Keyword Arguments can be used to specify certain Default Arguments while leaving
    out others.

    > Keyword Arguments permit the creation of dynamic, user-defined parameters that
    can be received and processed by the function without documenting the parameter
    names in advance!

    > Keyword Arguments cannot be followed by non-keyword arguments.

    > Variable Arguments permit the function call to pass as many arguments as required
    and yet be processed using a single collection variable in the function definition.

    > Variable Arguments should not be followed by Positional Arguments in the function
    definition parameter list.'
- md: '## SUMMARY


    - A function can return a single value to the caller. This single value can also
    be a collection! When a function does not specify what to return, the return value
    is taken as None. A function can return at any time using the return statement,
    optionally returning a value to the caller.

    - Global variables can be accessed by functions by using the global keyword and
    specifying the global variables the function wishes to access.

    - A function definition can contain other function definitions inside!

    - A lambda expression is a convenient and powerful way of creating an anonymous
    function!

    - A list of arguments can be unpacked and sent as individual arguments to a function
    by using the *args syntax.

    - A dictionary of keyword arguments can be unpacked and sent as individual keyword
    arguments to a function by using the **args syntax.

    - Documentation Strings can help document functions and provide help on the function
    usage to other programmers.


    ## II PRACTICAL PYTHON


    In this chapter you will be able to:


    - Implement data structures like stacks and queues.

    - Use the map(), filter() and reduce() functions to write powerful code.

    - Use list comprehensions and nested list comprehensions to build and populate
    lists quickly and easily.

    - Solve certain real-life problems with ease.


    ## 11.1 Implementing Stacks


    A *stack* is a linear data structure that follows the LIFO (Last In First Out)
    principle. Thus, the last element added into a stack is the first element to get
    deleted. The insertion operation is called a *push* operation whereas the deletion
    operation is called a *pop* operation.


    There is no direct support for stacks in Python (meaning there is no class or
    data type called `stack`), but stacks can be housed in suitable containers and
    operated upon. Tuples and Lists are two containers that are linear, but tuples
    being immutable cannot be used to store a stack as the stack contents should be
    able to change with time. Lists therefore are the best choice to house a stack.


    A stack has two ends: a *bottom* end which is fixed and from where the stack grows
    and a *top* end which is dynamic and where push and pop operations take place.


    This functionality can be implemented using a list in this manner:


    1. The push operation can be performed using `list.append()` which appends an
    element at the end of the list (the top end of the stack).

    2. The pop operation can be performed using the `list.pop()` function which deletes
    the last element in the list (from the top of the stack).

    3. The peek operation, which provides the last element of the stack (the topmost
    element) without deleting it from the stack, can be implemented as `list[-1]`.

    4. The number of elements in the stack can be found out using `len(list)`. This
    can also be used to find if the stack is empty or not.

    5. The stack can be cleared using the `list.clear()` function.

    6. More functionality is possible that typical stacks may not provide, like searching
    for an element in the stack, appending stacks, etc.


    Here is a simple program to demonstrate basic stack operations:


    ```python

    # stackdemo.py

    #!/usr/bin/python


    # Stack demonstration using lists


    S = []        # Creation of a stack S

    S.append(10)  # Push 10

    S.append(20)  # Push 20

    S.append(30)  # Push 30

    print(S)      # Display the stack


    print(S.pop())     # Pop 30

    print(S)      # Display the stack

    print(S[-1])  # Peek


    print(len(S))# Stack size

    print(len(S)==0)# Stack empty?

    ```


    Output:


    ```

    [10, 20, 30]

    30

    [10, 20]

    20

    2

    False

    ```


    ## 11.2 Implementing Queues


    A queue is a linear data structure that follows the FIFO (First In First Out)
    principle. Thus, the first element added into a queue is the first element to
    get deleted.


    There is no direct support for queues in Python (meaning there is no class or
    data type called queue), but queues can be housed in suitable containers and operated
    upon. There is a class called deque in the collections module that provides support
    for a double-ended queue where insertions and deletions are restricted to both
    the ends. A more restricted use of the deque will give us the required functionality
    as follows:


    1. To insert an element in the queue, the `deque.append()` function can be used.

    2. To delete an element from the queue, the `deque.popleft()` function can be
    used.

    3. To find the number of elements in a queue, the `len(deque)` function can be
    used. This function can also be used to find if the queue is empty or not.

    4. To remove all elements from the queue, the `deque.clear()` function can be
    used.

    5. In addition, the `deque.insert()` function permits insertion of an element
    at any place within the queue (thus allowing implementation of priority queues)
    and the `remove()` function deletes the first occurrence of a given value from
    a queue. The `index()` function searches for the first occurrence of the given
    element within the queue (or within a region of the queue).


    Here is a simple program to demonstrate basic queue operations:


    ```python

    # queuedemo.py

    #!/usr/bin/python


    # Queue demonstration using collections.deque


    from collections import deque


    q = deque()        # Creation of a queue

    q.append(10)       # Insert 10

    q.append(20)       # Insert 20

    q.append(30)       # Insert 30

    print(q)           # Display the queue


    print(q.popleft()) # Delete 10

    print(q)           # Display the queue

    print(q[0])        # Peek


    print(len(q))      # Queue size

    print(len(q)==0)   # Queue empty?

    ```


    **Output:**


    ```

    deque([10, 20, 30])

    10

    deque([20, 30])

    30

    2

    False

    ```


    ## 11.3 The map() Function


    The `map` function maps or transforms each element of an iterable resulting in
    a new iterable containing the transformed elements. The number of the elements
    in the output sequence will be equal to the number of elements in the input sequence.


    **Syntax:**


    ```python

    map(func, sequence)

    ```


    Each element in `sequence` is sent to the function `func` as an argument, and
    the return value from the function is sent to an output sequence that is finally
    returned by `map()`.


    Here is an example of using `map` to multiply each element of a list by 2 and
    obtain a new list with the corresponding results:


    ```python

    >>> def f(x): return 2*x

    ...

    >>> L=[1,6,4,9,7]

    >>> M=list(map(f,L))

    >>> M

    [2, 12, 8, 18, 14]

    ```


    **Observation:**


    1. Our input list is `L`, comprising of the elements 1, 6, 4, 9 and 7.

    2. We define a mapping function called `f`, which returns 2 times the value of
    the original argument.

    3. We use the `map()` function passing a reference to our mapping function(`f`),
    as the first argument and our input list(`L`) as the second.

    4. The `map()` function will map each element of `L` using `f` for individual
    element conversion and returns the final result as an iterable object, which we
    convert to a list for convenience.

    5. We finally observe that the list `M` contains elements with values twice of
    those elements that were present in the list `L`, and in the same order as found
    in `L`.


    Similarly, here is an example of converting a list of strings to a list of corresponding
    strings with all characters converted to uppercase:


    ```python

    >>> def f(x): return x.upper()

    ...

    >>> L=["Hello","World"]

    >>> M=list(map(f,L))

    >>> M

    [''HELLO'', ''WORLD'']

    ```


    ### 11.3.1 Using map() With Multiple Iterables


    A more general syntax of the `map()` function accepts multiple iterables instead
    of one. In such a mapping, corresponding elements from each of the iterables are
    taken at one time and sent to the mapping function and the return value is collected
    into an output sequence that is finally returned. Of course, now the mapping function
    has to receive as many arguments as the number of iterables passed to the `map`
    function!


    Here is an example of using `map` to add corresponding elements of 3 lists:


    ```python

    >>> L1=[1,2,3]

    >>> L2=[4,5,6]

    >>> L3=[7,8,9]

    >>> def f(a,b,c): return a+b+c

    ...

    >>> M=list(map(f,L1,L2,L3))

    >>> M

    [12, 15, 18]

    ```


    **Observation:**


    1. The `map()` function is receiving the mapping function reference (`f`) and
    3 lists (`L1`, `L2` and `L3`).

    2. The mapping function (`f`) therefore receives 3 arguments (`a`, `b` and `c`)
    вАУ one per list. The function `f` returns the sum of its arguments.

    3. The number of elements in the output sequence is the same as the number of
    elements in the other input lists. If the input lists did not all have the same
    number of elements, the smallest list is considered and the additional elements
    of the other lists are ignored. The length of the output list, therefore, is the
    same as the length of the smallest input list.


    ## 11.4 The filter() Function


    As the name suggests, the `filter()` function filters a sequence вАУ its elements
    are passed through a filtering function and only those elements that pass a criteria
    are allowed to pass through while the rest are вАЬblockedвАЭ.


    **Syntax:**


    ```python

    filter(func, sequence)

    ```


    Each element in the sequence `sequence` is sent to the function `func` as an argument,
    and if the function returns `True`, will be sent to an output sequence that is
    finally returned by `filter()`. The output sequence is returned as an iterable
    object.'
