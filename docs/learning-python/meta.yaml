    \ piece of code. Python provides the `if` Statement to implement decisions. Like\
    \ most other programming languages, this has many forms вАУ each of which will be\
    \ discussed in the following sections.\n\n# 3.2.1 The if Statement\n\nThe simple\
    \ `if` Statement conditionally executes a statement or a block of statements.\
    \ It's syntax is shown below:\n\n```\nif condition: statement\n\nif condition:\n\
    \    statements\n    ...\n```\n\nIn the first form shown above, if the condition\
    \ evaluates to `True`, the following statement is executed. If the condition evaluates\
    \ to `False`, that statement is skipped and control moves on to the next line.\n\
    \nIn the second form shown above, if the condition evaluates to `True`, all the\
    \ statements within the block are executed in sequence. If the condition evaluates\
    \ to `False`, all the statements within the block are skipped and control moves\
    \ to the first statement outside the block.\n\nThe statements inside the `if`\
    \ block are identified by their **indentation**! To keep things simple, for now\
    \ we'll use a single tab character per level of indentation.\n\nLet us write a\
