    # 12.4.5 Instance Methods as special Class Functions


    Having understood class functions, we can view methods from a new perspective
    now: methods are class functions that accept a reference to the invoking object
    as the first argument! The following code snippet will illustrate this:


    ```

    >>> class A:

    ...     def f(self):

