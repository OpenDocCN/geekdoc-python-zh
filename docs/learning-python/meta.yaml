    [9, 2, 3]

    ```


    In order to copy all the elements of a list to another (copying the list object
    instead of the list reference), the `list.copy()` function can be used as follows:


    ```

    >>> L1=[5,2,3]

    >>> L2=L1.copy()

    >>> L2

    [5, 2, 3]

    >>> L1[0]=9

    >>> L1

    ```'
