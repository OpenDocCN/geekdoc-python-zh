  md: '# 2.8 Getting Help


    During the learning process, it is natural to get stuck and the need arises to
    get timely help to overcome the temporary block in progress. There are a couple
    of ways to get help.


    # 2.8.1 Getting Help in the Book


    As far as this book is concerned, it has been carefully crafted to show you just
    enough steps at a time for you to understand, experiment and build confidence.
    But there are numerous tables and appendices that provide a standard reference.
    These might help.


    # 2.8.2 Getting Help in Python


    While working on the Python interpreter, you can get help on any function, class,
    keyword or module by typing `help(topic)`. You can scroll through the help document
    (just like how you would use the `less` command in Linux) and finally type in
    ''q'' to quit help.


    # 2.8.3 Getting Help Online


    If you are looking for online help, there are a couple of websites that can help:


    +   - The official Python tutorial can be found at https://docs.python.org/3/tutorial/index.html.

    - The standard library of Python is discussed at https://docs.python.org/3/library/index.html.

    - Frequently Asked Questions are available at https://docs.python.org/3/faq/.

    - The complete Python language reference is available at https://docs.python.org/3/reference/index.html.


    # 2.8.4 Getting Help From People


    If you want to interact with people to get help, here are some more "official"
    resources, but be sure to read "The Guide to Python Mailing Lists" (available
    at https://www.python.org/community/lists/#comp-lang-python) before proceeding
    with any of these options below:


    +   - Post to the Python newsgroup (news:comp.lang.python)

    - Post to the Python Tutor Mailing List (http://mail.python.org/mailman/listinfo/tutor)

    - Send a mail to help@python.org'
