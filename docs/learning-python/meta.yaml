    # 13.4 Exception Propagation


    In this section, we address the question, вАЬwhat happens if an exception that is
    raised at a particular place is not handled in that place.вАЭ The short answer to
    this question is that the exception propagates to the outer level. To understand
    how it propagates and how it can be handled at an outer level, we will classify
    the outer levels as shown below and see them in detail in separate sections:


    +   1. Nested try-except blocks

    2. Functions


