    ```


    # 17.3 Working with Beautiful Soup


    **BeautifulSoup** is another HTML/XHTML & XML parser that uses another parser
    as itвАЩs backend and provides many useful easy-to-use functionalities. BeautifulSoup
    is not in-built in Python and hence has to be manually installed. The next section
    shows you how to do it. Documentation is available at https://www.crummy.com/software/BeautifulSoup/bs4/doc/.'
  merge: -1
