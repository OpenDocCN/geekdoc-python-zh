    # Observation:


    +   1. `setDate()` is a method вАУ a function of the class `Date` that requires
    an invoking object to invoke it upon itself. In our example, the statement `d.setDate(1,2,2000)`
    shows how the `Date` object `d` invokes the function `setDate()` upon itself,
    passing `1`, `2` and `2000` as arguments to the method.

    2. A reference to the invoking object is passed implicitly as the first argument
    to the method `setDate()`, and is received as the parameter `self`. While the
    parameter name should not matter strictly speaking, as a convention it is always
    named `self`. It would be wise to follow this convention.

    3. Everything that belongs to the invoking object should be explicitly preceded
    by the reference `self`. Thus, to access the instance variable `day` of the invoking
    object, we would need to access `self.day`. The first time an assignment is made
    to an instance variable that does not exist, the instance variable is created.

    4. The `setDate()` method copies the given parameters (`d`, `m` and `y`) to the
    corresponding instance variables (`self.day`, `self.month` and `self.year` respectively).
    We will improve this method later by adding validation support.

    5. The above example shows that the `setDate()` works as expected.


    # 12.4.2 Instance Methods


    In the previous example, we have already seen the method `setDate()` in action.
    We have seen that methods are functions of the class that use invoking objects,
    and can access their corresponding invoking objects using the first parameter
    вАУ typically called `self`.


    Let us add more instance methods to our `Date` class:


    ```

    >>> class Date:

    ...     def setDate(self,d,m,y):

    ...             self.day,self.month,self.year = d,m,y

    ...     def getDay(self): return self.day

    ...     def getMonth(self): return self.month

    ...     def getYear(self): return self.year

    ...

    >>> d = Date()

    >>> d.setDate(1,2,2000)

    >>> print("{}-{}-{}".format(d.getDay(),d.getMonth(),d.getYear()))

    1-2-2000

    ```'
