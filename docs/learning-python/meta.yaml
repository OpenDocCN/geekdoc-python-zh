  md: '# 2.1.1.1 One Statement Per Line


    In Python, a line is typically considered to host 1 statement. Thus, as long as
    there is 1 statement per line, there is no need of using semi-colons at the end
    of the line.


    > **For C/C++/Java Programmers:**


    Programming languages like C, C++ and Java use semi-colons (;) as the **statement
    terminator**, which means that a semi-colon marks the end of a statement. This
    means that a statement is not considered complete unless the terminating semi-colon
    is seen, and thus allows a statement to span multiple lines as required.


    Python relies on indentation rules to decide which statements belong to which
    block (will be covered in section 3.2.1) and uses the newline character as the
    statement terminator. In other words, a statement in Python is understood to be
    terminated in the same line.


    Let us revisit `Helloworld.py` and write multiple statements вАУ of course, one
    per line.


    # HelloWorld2.py


    ```

    1.  print("Hello World")

    2.  print("Hi from India!")

    ```


    # Output:


    ```

    Hello World

    Hi from India!

    ```


    # 2.1.1.2 Multiple Statements Per Line


    Python uses semi-colons as **statement separators** and this behaviour is elaborated
    below:


    As a statement separator, the role of a semi-colon is to ensure that multiple
    statements can be given in one line and the translator is able to differentiate
    them as separate statements because of the semi-colon separating them.


    > **For Perl/Shell Scripters:**


    Perl and the shell in Linux use semi-colons the same way, forcing programmers
    to use them as separators if they want to issue multiple statements/commands in
    the same line!


    Let us revisit `HelloWorld2.py` and write multiple statements in a single line.'
