- md: "## 19.2.3 Encoding to Files\n\nJust as how the `dumps()` function dumps a JSON\
    \ representation as a string, the `dump()` function dumps the JSON string representation\
    \ to a file, identified by a file object. It has the following syntax:\n\n```\n\
    json.dump(obj, file)\n```\n\nHere is a simple example that writes a list into\
    \ a file in JSON format:\n\n```\n>>> import json\n>>> f=open(\"test.json\",\"\
    w\")\n>>> json.dump([1,3,5,7],f)\n>>> f.close()\n```\n\n**Observation:**\n\n1.\
    \ We import the `json` module. We open the file \"test.json\" in (textual) write\
    \ mode and obtain a file handle that is stored in the variable `f`.\n2. We dump\
    \ a list contents to the file represented by the file handle `f`.\n3. We close\
    \ the file to be sure that the data is indeed flushed and written to the file.\n\
    \nThe file \"test.json\" will contain the following text:\n\n```\n[1, 3, 5, 7]\n\
    ```\n\nWe will see how to read back the JSON content in section 19.3.2.\n\n##\
    \ 19.3 Converting From JSON to Python\n\n### 19.3.1 Converting JSON Strings into\
    \ Python Objects\n\nConverting from JSON to Python also uses a data type matching\
    \ that is summarised in the table below:\n\n| JSON Representation | Python Object\
    \ |\n|---|---|\n| Object | dict |\n| Array | list |\n| String | str |\n| Number\
    \ (integral) | int |\n| Number (non-integral) | float |\n| true, false | True,\
    \ False |\n| null | None |\n\nIn order to convert a JSON string into its equivalent\
    \ Python object representation, we use the `json.loads()` method (which stands\
    \ for вАЬload stringвАЭ) that has the following syntax:\n\n```\njson.loads(jsonString)\n\
    ```\n\nHere are some examples to convert various JSON strings into Python objects:\n\
    \n```\n>>> import json\n>>> json.loads('{\"a\":\"1\",\"b\":\"2\"}')\n{'a': '1',\
    \ 'b': '2'}\n>>> json.loads('[1,2,3,4]')\n[1, 2, 3, 4]\n>>> json.loads('\"Hello\"\
    ')\n'Hello'\n>>> json.loads('25')\n25\n>>> json.loads('true')\nTrue\n>>> json.loads('false')\n\
    False\n>>> json.loads('null')\n>>>\n```\n\n**Observation:**\n\n1. We have imported\
    \ the `json` module.\n2. We see that the Python output matches the JSON representation\
    \ pretty well. Objects become dictionaries, arrays become lists, integers and\
    \ strings become `int` and `str` objects, `true` and `false` become `True` and\
    \ `False` respectively and `null` becomes `None` (which of course, is not visible\
    \ in the output).\n\n### 19.3.2 Decoding from Files\n\nJust as how the `loads()`\
    \ function loads a JSON representation from a string, the `load()` function loads\
    \ a JSON string representation from a file, identified by a file object. It has\
    \ the following syntax:\n\n```\njson.load(file)\n```\n\nHere is a simple example\
    \ that reads the previously written list from the file `test.json` (in section\
    \ 19.2.3):\n\n```\n>>> import json\n>>> f=open(\"test.json\")\n>>> obj=json.load(f)\n\
    >>> print(obj)\n[1, 3, 5, 7]\n```\n\n**Observation:**\n\n1. We import the `json`\
    \ module. We load the file \"test.json\" for reading and store the file handle\
    \ in the variable `f`.\n2. We load an object from the file identified by the file\
    \ handle `f`.\n3. On printing the object, we see the same list we had stored in\
    \ the JSON file.\n4. Closing the file is not critical as we have opened it in\
    \ read mode.\n\n### 19.3.3 Exception Handling\n\nIt is possible that the JSON\
    \ representation we are reading from while attempting to convert it to a Python\
    \ object is malformed. In such situations, an exception of type `json.decoder.JSONDecodeError`\
    \ (which is a subclass of `ValueError`) is raised, as demonstrated below:\n\n\
    ```\n>>> import json\n>>> json.loads(\"[1,2,3\")\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\n  File \"/usr/lib64/python3.6/json/__init__.py\"\
    , line 354, in loads\n    return _default_decoder.decode(s)\n  File \"/usr/lib64/python3.6/json/decoder.py\"\
    , line 339, in decode\n    obj, end = self.raw_decode(s, idx=_w(s, 0).end())\n\
    \  File \"/usr/lib64/python3.6/json/decoder.py\", line 355, in raw_decode\n  \
    \  obj, end = self.scan_once(s, idx)\njson.decoder.JSONDecodeError: Expecting\
    \ ',' delimiter: line 1\ncolumn 7 (char 6)\n```\n\n**Observation:**\n\n1. We have\
    \ imported the `json` module. We are attempting to convert a JSON string into\
    \ its Python equivalent.\n2. The JSON string is malformed as the open square bracket\
    \ does not have a matching close square bracket.\n3. We see the `JSONDecodeError`\
    \ exception being raised, which identifies the error and its location within the\
    \ string.\n4. In programs, we might be interested in processing this exception\
    \ in the `except` block suitably.\n\n## 19.4 Questions\n\n1. Explain the following\
    \ functions of the `json` module in Python:\n   1. `dump()`\n   2. `dumps()`\n\
    2. Explain the following functions of the `json` module in Python:\n   1. `load()`\n\
    \   2. `loads()`\n\n## 19.5 Exercises\n\n1. Write a Python script to demonstrate\
    \ the saving and loading of data in JSON format using the `json` module.\n2. Write\
    \ a Python script to load XML data of a known format and write it to a JSON file.\n\
    3. Write a Python script to load JSON data of a known format and write it to an\
    \ XML file.\n\n# SUMMARY\n\n- JSON parsing and conversion support is provided\
    \ by the built-in json module.\n- Python objects and JSON objects have a close\
    \ semblance - they are almost inter-convertible, thanks to the json module!\n\
    - A Python object can be converted into a JSON string representation using json.dumps(),\
    \ or can be stored in a file in JSON format using json.dump().\n- A JSON string\
    \ can be converted into a corresponding Python object using json.loads(), or from\
    \ a JSON file using json.load().\n\n# 20 MISCELLANEOUS\n\nIn this chapter you\
    \ will be able to:\n\n- [x] Understand the built-in data type hierarchy\n- [x]\
    \ Convert a data item from one built-in type to another and know how the conversion\
    \ takes place.\n- [x] Deal with bit operations on data items.\n- [x] Deal with\
    \ bytes instead of strings.\n\n## 20.1 Data Types Revisited\n\nThe diagram below\
    \ shows the various built-in **numeric data types** available in Python:\n\nWe\
    \ can make out the following from the diagram:\n\n1. This is a **class hierarchy**\
    \ where each class **derives** features from another.\n2. The root of this hierarchy\
    \ is a class called **object**.\n3. The classes in bold are **concrete classes**\
    \ that we can use whereas the rest are merely **abstract base classes** that contain\
    \ functionality that can be derived by other classes, but can't be directly used.\n\
    4. **numbers** and **fractions** are names of **packages**. **__builtin__** is\
    \ a pseudo-package whose contents are known to the interpreter without having\
    \ to import any package.\n\nHere are some more observations on the class hierarchy:\n\
    \n1. All objects in Python ultimately are instances of `__builtin__.object`.\n\
    2. All numbers in Python are instances of `numbers.Number`.\n3. The `numbers.Complex`\
    \ class is an abstract class representing complex numbers and derives from `numbers.Number`.\n\
    4. If the programmer wants to specifically deal with complex numbers, the `complex`\
    \ class is a concrete representation of `numbers.Complex`.\n5. If the programmer\
    \ does not want to deal specifically with complex numbers, then the programmer\
    \ wishes to deal with real numbers, represented using `numbers.Real`, which is\
    \ a subclass of `numbers.Complex` since all real numbers are complex numbers with\
    \ the imaginary part being 0.\n6. Real numbers can be rational or irrational.\
    \ Rational numbers are those that are representable as $x/y$, where $x$ and $y$\
    \ are integers and $y$ is non-zero. Irrational numbers cannot be represented that\
    \ way, but can be approximated that way. If the programmer does not want to bother\
    \ about whether the real number is rational or irrational, the `float` class is\
    \ provided as a subclass of `numbers.Real` to deal with any real number.\n7. If\
    \ the programmer is interested specifically in rational numbers or integers, then\
    \ the `numbers.Rational` subclass of `numbers.Real` is useful. If the programmer\
    \ is not particularly interested in integers, then the `fractions.Fraction` subclass\
    \ of `numbers.Rational` class permits access to the numerator and denominator.\n\
    8. As a special case of rational numbers, if the denominator is 1, then mathematically\
    \ we are dealing with integers! The `numbers.Integral` subclass of `numbers.Rational`\
    \ describes those numbers that are rational with denominator 1 вАУ integers!\n9.\
    \ While the most common implementation of `numbers.Integral` is the `int` class,\
    \ `bool` is also considered to be an integral type whose values can only be 0\
    \ or 1, but called `False` and `True` respectively!"
