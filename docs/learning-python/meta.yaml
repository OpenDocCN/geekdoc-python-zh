- md: "## 14.8 Programs based on Files\n\n### 14.8.1 Implementation of head: Extract\
    \ First Few Lines of a File\n\nThe UNIX head command displays the first 10 lines\
    \ of a file by default. Let us write a Python script that does the same.\n\n```python\n\
    # head.py\n\n#!/usr/bin/python\n\n# Implementation of head command to display\
    \ the first 10 lines of a file\n\nfilename = input(\"Enter filename:\")\n\ntry:\n\
    \    file = open(filename)\n    for i in range(10):\n        data = file.readline()\n\
    \        if not data: break\n        print(data,end='')\nexcept Exception as e:\n\
    \    print(\"Unable to open file: {}\".format(filename))\n    print(\"Reason:\
    \ {}\".format(str(e)))\n```\n\n**Output:**\n\n```\nEnter filename:head.py\n#!/usr/bin/python\n\
    \n# Implementation of head command to display the first 10 lines of a file\n\n\
    filename = input(\"Enter filename:\")\n\ntry:\n    file = open(filename)\n   \
    \ for i in range(10):\n        data = file.readline()\n```\n\n**Observation:**\n\
    \n- 1. We ask the user for the filename in line 5 and open the file in line 8.\
    \ Errors are handled in lines 14-15.\n- 2. We run a loop that executes 10 times\
    \ in line 9. In each iteration, we read 1 line from the file (line 10), check\
    \ whether we have reached the end of file (line 11) and print the line read if\
    \ successful (line 12).\n- 3. If the file contains less than 10 lines, the loop\
    \ terminates prematurely in line 11 and we end up displaying as many lines as\
    \ were present.\n\n### 14.8.2 Implementation of tail: Extract Last Few Lines of\
    \ a File\n\nThe UNIX `tail` command displays the last 10 lines of a given file\
    \ by default. Let us see how we can write a Python script to do the same.\n\n\
    **tail.py**\n\n```python\n#!/usr/bin/python\n\n# Implementation of tail command\
    \ to display the last 10 lines of a file\n\nfilename = input(\"Enter filename:\"\
    )\n\ntry:\n    file = open(filename)\n    lines = file.readlines()\n    if len(lines)>10:\
    \ lines = lines[-10:]\n    print(\"\".join(lines),end='')\nexcept Exception as\
    \ e:\n    print(\"Unable to open file: {}\".format(filename))\n    print(\"Reason:\
    \ {}\".format(str(e)))\n```\n\n**Output:**\n\n```\nEnter filename:tail.py\nfilename\
    \ = input(\"Enter filename:\")\n\ntry:\n    file = open(filename)\n    lines =\
    \ file.readlines()\n    if len(lines)>10: lines = lines[-10:]\n    print(\"\"\
    .join(lines),end='')\nexcept Exception as e:\n    print(\"Unable to open file:\
    \ {}\".format(filename))\n    print(\"Reason: {}\".format(str(e)))\n```\n\n**Observation:**\n\
    \n- 1. We accept the filename from the user in line 5 and open the file in line\
    \ 8. Errors are handled in lines 13-14.\n- 2. We load the entire file into a list\
    \ in line 9. We need the last 10 entries of this list.\n- 3. If there are less\
    \ than 10 lines in the file, they should be displayed as it is. This check is\
    \ made in line 10 and if there are more than 10 lines, we pick the last 10 lines\
    \ of the list.\n- 4. The list contents are converted into a single string and\
    \ printed in line 11.\n- 5. This approach is simple but inefficient as the entire\
    \ file is loaded into memory. Especially when dealing with big files, it is better\
    \ to develop an alternate logic that loads a single line at a time and maintains\
    \ at most 10 lines in memory.\n\n### 14.8.3 Combination of head and tail Utilities\n\
    \nIn UNIX, the `head` and `tail` commands can be piped together to obtain any\
    \ consecutive sequence of lines from a file. We can implement the same as a Python\
    \ script.\n\n```python\n# headtail.py\n\n#!/usr/bin/python\n\n# Implementation\
    \ of head and tail command combination to display consecutive lines of a file\n\
    \nfilename = input(\"Enter filename:\")\nstart = int(input(\"Enter starting line:\"\
    ))\nlength = int(input(\"Enter number of lines:\"))\ntry:\n    file = open(filename)\n\
    \    lines = file.readlines()\n    lines = lines[start-1:start+length-1]\n   \
    \ print(\"\".join(lines),end='')\nexcept Exception as e:\n    print(\"Unable to\
    \ open file: {}\".format(filename))\n    print(\"Reason: {}\".format(str(e)))\n\
    ```\n\n**Output:**\n\n```\nEnter filename:headtail.py\nEnter starting line:6\n\
    Enter number of lines:4\nstart = int(input(\"Enter starting line:\"))\nlength\
    \ = int(input(\"Enter number of lines:\"))\ntry:\n    file = open(filename)\n\
    ```\n\n**Observation:**\n\n- 1. We accept the filename (line 5), starting line\
    \ number (line 6) and number of lines to be displayed (line 7) from the user and\
    \ open the file in line 9 and read all its contents into a list in line 10.\n\
    - 2. Since the user numbers from 1 while the list index starts from 0, the first\
    \ line required from the list is at index `start-1`. We extract the required lines\
    \ from the list in line 11 and display them after converting it to a string in\
    \ line 12.\n- 3. This program is simple but inefficient as the entire file contents\
    \ are loaded to memory. A more memory efficient alternative would be to load the\
    \ file contents line by line and conditionally display it by keeping track of\
    \ the current line number.\n\n### 14.8.4 Implementation of wc: Word Count\n\n\
    The UNIX `wc` utility counts the number of characters, words and lines in a given\
    \ file. Here is a Python script that does the same.\n\n**wc.py**\n\n```python\n\
    #!/usr/bin/python\n\n# Implementation of wc command to display\n# the number of\
    \ characters, words and lines in a file.\n\nfilename = input(\"Enter filename:\"\
    )\nchars,words,lines = 0,0,0\n\ntry:\n    file = open(filename)\n    while 1:\n\
    \        line = file.readline()\n        if not line: break\n        lines +=\
    \ 1\n        chars += len(line)\n        words += len(line.split())\nexcept Exception\
    \ as e:\n    print(\"Unable to open file: {}\".format(filename))\n    print(\"\
    Reason: {}\".format(str(e)))\nelse:\n    print(\"Number of characters :\",chars)\n\
    \    print(\"Number of words :\",words)\n    print(\"Number of lines :\",lines)\n\
    ```\n\n**Output:**\n\n```\nEnter filename:wc.py\nNumber of characters : 613\n\
    Number of words : 73\nNumber of lines : 23\n```\n\n**Observation:**\n\n- 1. We\
    \ obtain the filename from the user in line 6 and open the file in line 10. Errors\
    \ are handled in lines 18-19.\n- 2. We read the file contents a line at a time\
    \ (line 12). Each time we read a line, we increment the number of lines read (`lines`)\
    \ in line 14.\n- 3. We add the number of characters found in that line to the\
    \ variable `chars` in line 15.\n- 4. We use the `split()` function (section 8.3.2)\
    \ to split the line into a list of words and count the number of words using `len()`\
    \ and add that to `words` in line 16.\n- 5. The results are displayed in lines\
    \ 21-23 if there are no errors.\n\n### 14.8.5 Implementation of cp: Copy Files\n\
    \nThe UNIX `cp` command copies one file to another. Here is a Python script to\
    \ do something similar.\n\n**cp.py**\n\n```python\n#!/usr/bin/python\n\n# Implementation\
    \ of cp command to copy files\n\nsource_filename = input(\"Enter source filename:\"\
    )\ndest_filename = input(\"Enter destination filename:\")\n\ntry:\n    source_file\
    \ = open(source_filename,\"rb\")\n    dest_file = open(dest_filename,\"wb\")\n\
    \    while 1:\n        byte = source_file.read(1)\n        if not byte: break\n\
    \        dest_file.write(byte)\nexcept Exception as e:\n    print(\"Unable to\
    \ open file!\")\n    print(\"Reason: {}\".format(str(e)))\nelse:\n    print(\"\
    File successfully copied!\")\n```\n\n**Output:**\n\n```\nEnter source filename:cp.py\n\
    Enter destination filename:copy.py\nFile successfully copied!\n```\n\n**Observation:**\n\
    \n- 1. We obtain the source filename and destination filename from the user in\
