    # PARSING HTML


    # 17.1 Introduction


    **HyperText Markup Language (HTML)** is the language of the web. Whenever content
    has to be made available across the web, the most preferred form is through HTML
    output. This chapter concentrates on how HTML can be parsed in Python and how
    it can be created.


    Python 3 comes with a built-in HTML parser. We will first explore how to parse
    HTML content using this. Thereafter, we will explore another library called **BeautifulSoup**
    (which internally uses Python''s HTML parser) that provides more powerful and
    easier to use interface to HTML documents.


    # 17.2 Using the HTML Parser


    Python''s built-in HTML parser is available through the `html.parser` module''s
    `HTMLParser` class. This is the procedure for parsing HTML code using this:


    +   1. Define a class that derives from `HTMLParser`

    2. Override the methods we are interested in and provide suitable implementation

    3. Create an instance of our class

    4. Feed in HTML data to that instance

    5. Suitable methods of our class get called automatically depending on the HTML
    content parsed


    The following sections show how we can achieve each of these steps.


    # 17.2.1 Deriving a Class from HTMLParser


    The following sections cover the frequently called methods of `HTMLParser` that
    we might be interested in overriding:


    # 17.2.1.1 Handling Tags


    The most commonly occurring content in HTML is tags. Tags may be paired (Example:
    `<b>Hello world</b>`) or unpaired (Example: `<br/>`).


    Whenever the parser finds the beginning of a tag, it will invoke the `handle_starttag`
    method which has the following syntax:'
