    \ But what if we have multiple values already stored in a collection and we wish\
    \ to send them as individual arguments to a function? Recollect the `calc` function\
    \ discussed in section 10.10.1:\n\n```\n>>> def calc(x,y):\n...     return (x+y,\
    \ x-y, x*y, x/y)\n```\n\nGiven 2 values, this function will return as tuple containing\
    \ their sum, difference, product and quotient. If we have the 2 input values already\
    \ in a list, we will not be able to directly pass the list as an argument as it\
    \ will be considered to be a single list argument, as illustrated below:\n\n```\n\
    >>> def calc(x,y):\n...     return (x+y, x-y, x*y, x/y)\n...\n>>> L=[2,3]\n>>>\
    \ calc(L)\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nTypeError: calc() missing 1 required positional argument: 'y'\n```\n\
    \nThe solution is *argument unpacking*: extracting individual elements from a\
    \ collection and considering them to be individual arguments. The syntax for argument\
    \ unpacking is shown below:"
  - '[PAGE 303]


    ```

    *collection

    **dictionary

    ```


    Note:


    +   1. The `*collection` syntax is used for tuples, lists and sets whereas the
    `**dictionary` syntax is used specifically for dictionaries.

    2. The `*collection` syntax expands the collection into arguments that can either
    map on to corresponding parameters of a function or can be received as variable
    arguments using the `*args` syntax discussed in section 10.7.

    3. The `**dictionary` syntax expands the dictionary into keyword arguments that
    can either map on to corresponding named parameters of a function or can be received
    as additional keyword arguments using the `**kargs` syntax discussed in section
    10.6.


    This is illustrated in the revised examples below:


    ```

    >>> def calc(x,y):

    ...     return (x+y,x-y,x*y,x/y)

    ...

    >>> L=[2,3]

    >>> calc(*L)

    (5, -1, 6, 0.6666666666666666)

    ```


    ```

    >>> def calc(x,y):

    ...     return (x+y,x-y,x*y,x/y)

    ...

    >>> D={''x'':2,''y'':3}

    >>> calc(**D)

    (5, -1, 6, 0.6666666666666666)

    ```


    # 10.15 Documentation Strings


    *Documentation strings* are strings added at strategic locations within the program
    to provide documentation for a program element. Such documentation strings are
    recognised by the Python parser and can also be parsed by various external tools.


    As far as functions are concerned, a documentation string can provide documentation
    on what the function is all about. The documentation string is identified as a
    string that starts on the first line of a function definition. Since the documentation
    string usually spans multiple lines, it is a common practice to use triple-quotes
    for enclosing it.'
- md: "There are certain conventions recommended for forming good documentation strings:\n\
    \n1.  The first line should be a 1-line summary of the function's purpose. This\
    \ line should typically start with an uppercase alphabet and end with a period,\
    \ avoiding the function name (unless it is being used as an English word). This\
    \ line must be indented as the rest of the function body is.\n2.  The first line\
    \ (summary) is separated from the rest of the lines (description) by a blank line.\n\
    3.  The description can span any number of lines and can provide additional information\
    \ about the function and its specialities. These are generally indented as the\
    \ rest of the function body is (but indentation is not compulsory). Any spaces\
    \ and tabs used for indentation is retained as part of the documentation string\
    \ by the Python parser (but other tools can be designed to ignore the indentation).\n\
    \nHere is a revised `isPrime()` function definition, modified from `prime7.py`:\n\
    \n```python\n>>> def isPrime(n):\n...     \"\"\"Returns whether n is prime or\
    \ not.\n...\n...     Given a non-negative integer n, this function\n...     returns\
    \ True if n is prime and False otherwise.\n...     The argument n is assumed to\
    \ be a positive integer\n...     greater than 1 (since 1 is neither prime nor\
    \ composite).\n...     No argument validation is performed.\n...     \"\"\"\n\
    ...     for i in range(2,int(n/2)+1):\n...             if n%i==0: return False\n\
    ...     return True\n...\n```\n\nSince the Python parser parses through the documentation\
    \ string, we can always access it using the special member `__doc__` of the function\
    \ as shown below:\n\n```python\n>>> isPrime.__doc__\n'Returns whether n is prime\
    \ or not.\\n\\n\\tGiven a non-negative integer n, this function\\n\\treturns True\
    \ if n is prime and False otherwise.\\n\\tThe argument n is assumed to be a positive\
    \ integer\\n\\tgreater than 1 (since 1 is neither prime nor composite).\\n\\tNo\
    \ argument validation is performed.\\n\\t'\n```\n\n## Observation:\n\n1.  We are\
    \ using the function reference (`isPrime`) to access the member `__doc__`. Note\
    \ that there are no parentheses after the function name, preventing it from becoming\
    \ a function call.\n2.  Note that every whitespace used for indentation is retained\
    \ within the string by the Python parser.\n\nNot only that, we can access the\
    \ documentation string using the built-in `help()` function in the Python interpreter,\
    \ as shown in the examples below:\n\n```python\n>>> help(isPrime)\nHelp on function\
    \ isPrime in module __main__:\n\nisPrime(n)\n    Returns whether n is prime or\
