    # 9. Regular Expressions


    Of course, eventually we will learn to handle points 2-4 above. We will later
    learn how to:


    +   1. Find out where the matches are present in the given string.

    2. Find out what parts of the string matched.

    3. Find out how many matches were there.


    A good starting point is framing regular expressions that don''t contain operators.
    Here is our first example of a regular expression (without any operators) вАУ `not`:


    ### Regular Expression: `not`

    | Matches | Rejects |

    | :--- | :--- |

    | **not** | nt |

    | can**not** | pot |

    | **not**hing | nod |

    | foot**not**e | night |

    | **not** a **not**e | nest |


    As can be seen from these examples, the ones that are matched contain the characters
    n, o and t, exclusively in that order, with nothing in between them. What does
    not matter however, is where it was found within the string and how many times
    it was found.


    We will now explore some basic operators that can be used in regular expressions.


    > **NOTE:**

    We will use the abbreviation **RE** to denote **Regular Expression** from now
    on for brevity.


    # 9.2 Basic Regular Expression Operators


    The most basic operators used in regular expressions are ., [], *, +, ?, {}, |,
    ^, $ and (). Variants of the () operator will be seen in later sections.


    # 9.2.1 Matching a Single Character


    The simplest regular expressions with operators are those that employ operators
    for single characters.'
  - '[PAGE 228]


    # 9.2.1.1 Matching any Character Using the . Operator


    The . operator matches any one character (except the newline character вАУ a behaviour
    that can be changed as shown in section 10.4.4).


    Thus, the RE n.t matches those strings that contain an n, followed by any one
    non-newline character, followed by t, as shown in the table below:


    | Regular Expression: n.t |

    |---|

    | Matches | Rejects |

    | not | nt |

    | nut | night |

    | native | spent |

    | internet | nest |

    | against | sat |

    | knotted | nun |


    # 9.2.1.2 Matching a Character Within a Set Using the [] Operator


    The [] operator is similar to the . operator вАУ it is also a placeholder for a
    single character, except that the character is restricted to be one amongst the
    characters listed within the [].


    Thus, the RE n[aeiou]t will match any string containing n that is followed by
    a lowercase vowel followed by t, as shown below:


    | Regular Expression: n[aeiou]t |

    |---|

    | Matches | Rejects |

    | not | nt |

    | nut | against |

    | net | nest |

    | knit | constant |

    | native | Net |'
  - '[PAGE 229]


    # 9.2.1.3 Matching a Character Within a Range of Characters Using the [-] Operator


    To specify a range of characters within [ ], we can use the - operator within
    [ ].

    Thus, [a-e] represents any one character out of a, b, c, d and e. [4-6] represents
    any one character out of 4, 5 and 6.

    This can also be combined with the previous form. Thus, [a-emx-z] can match any
    of a, b, c, d, e, m, x, y and z.

    The RE n[a-e]t can match any string that contains n followed by any one of a,
    b, c, d and e followed by t, as shown below:


    | Regular Expression: n[a-e]t |

    |---|---|

    | Matches | Rejects |

    | native | nt |

    | net | nut |

    | punctual | against |


    # 9.2.1.4 Matching a Character Within a Negated Set Using the [^] Operator


    Finally, the negated character set indicated by [^] implies a placeholder for
    a single character with the constraint that the character can be any one apart
    from the ones listed within [ ].

    Thus, while [0-9] represents a digit, [^0-9] represents a non-digit.

    This can be combined with our understanding of sections 9.2.1.2 and 9.2.1.3 to
    create a regular expression like [^a-emx-z] which will match any single character
    that is either not a lowercase alphabet, or if it is, is only one of f, g, h,
    i, j, k, l, n, o, p, q, r, s, t, u, v, w.

    Thus, the RE n[^aeiou]t matches any string that contains n followed by a character
    that is not a lowercase vowel, followed by t, as shown below:


    | Regular Expression: n[^aeiou]t |

    |---|---|

    | Matches | Rejects |

    | against | not |

    | punctual | nt |'
  - '[PAGE 230]


    # 9.2.1.5 Shortcut Escape Sequences for Characters


    Certain escape sequences are understood to mean shortcuts for certain standard
    sets of characters as documented in the table below:


    | Escape Sequence | Meaning |

    |---|---|

    | \d | A Digit character; equivalent to [0-9] in ASCII |

    | \D | A non-Digit character; equivalent to [^0-9] in ASCII |

    | \w | A Word-forming character; equivalent to [a-zA-Z0-9_] in ASCII |

    | \W | A non Word-forming character; equivalent to [^a-zA-Z0-9_] in ASCII |

    | \s | A whitespace character; equivalent to [ \t\n\r\f\v] in ASCII |

    | \S | A non-whitespace character; equivalent to [^ \t\n\r\f\v] in ASCII |


    Table 20: Escape Sequences for Standard Regular Expression Character Classes


    Thus, the RE \w\D\d will match any string that contains a word-forming character
    followed by a non-digit followed by a digit, as shown below:


    | Regular Expression: \w\D\d |

    |---|

    | Matches | Rejects |

    | Ab2 | 333 |

    | 9e9 | abc |

    | cc3 | c33 |


    # 9.2.2 Matching Multiple Characters


    Now that we''ve learnt some basic operators that represent placeholders for single
    characters, let''s go on to learn operators that represent placeholders for multiple
    characters.


    # 9.2.2.1 Matching 0 or More Occurrences using the * Operator


    The * operator represents 0 or more occurrences of the preceding symbol. This
    also makes the preceding symbol optional (0 occurrences).'
  - '[PAGE 231]


    # 9. Regular Expressions


    Thus, the RE `go*d` matches any string that contains `g` followed by 0 or more
    `o` followed by `d` as shown below:


    | Regular Expression: `go*d` |

    |---|

    | Matches | Rejects |

    |---|---|

    | gd | g |

    | god | go |

    | good | gold |

    | gooooood | old |


    # 9.2.2.2 Matching 1 or More Occurrences using the + Operator


    The `+` operator represents 1 or more occurrences of the preceding symbol. Unlike
    the `*` operator, this makes the preceding symbol compulsory (at least 1 occurrence).


    Thus, the RE `go+d` matches any string that contains `g` followed by 1 or more
    `o` followed by `d` as shown below:


    | Regular Expression: `go*d` |

    |---|

    | Matches | Rejects |

    |---|---|

    | god | g |

    | good | gd |

    | gooooood | go |


    # 9.2.2.3 Matching 0 or 1 Occurrences using the ? Operator


    The `?` operator represents 0 or 1 occurrence of the preceding symbol. In other
    words, this makes the preceding symbol optional.


    Thus, the RE `goo?d` matches any string that contains `g` followed by `o`, followed
    by an optional `o`, followed by `d` as shown below:'
  - '[PAGE 232]


    | Regular Expression: go\*d |

    |---|---|

    | Matches | Rejects |

    | god | gd |

    | good | goooooood |


    # 9.2.2.4 Matching Multiple Occurrences using the {} Operator


    The {m, n} operator (where m and n are integers) represents minimum m occurrences
    and maximum n occurrences of the preceding symbol.


    Thus, the RE go{1, 2}d will match any string that contains g followed by at least
    1 occurrence and at most 2 occurrences of o, followed by d as shown below:


    | Regular Expression: go{1, 2}d |

    |---|---|

    | Matches | Rejects |

    | god | gd |

    | good | goooooood |


    The form {m, } implies minimum m occurrences of the preceding symbol without any
    upper limit.


    The *, + and ? operators can be considered to be special shortforms of the { }
    operator as shown below:


    | Operator | Full form using {} |

    |---|---|

    | * | {0, } |

    | + | {1, } |

    | ? | {0, 1} |


    As a special case, the form {m} represents exactly m occurrences of the preceding
    symbol.


    Thus, the RE go{2}d is exactly identical to the RE good вАУ both can match strings
    that contain g followed by exactly 2 occurrences of o, followed by d.'
