    \ script that reads an XML file and lists out all tags that contain the `class`\
    \ attribute with value \"test\". Note that a single tag can contain multiple values\
    \ for the `class` attribute. It would be required to check if \"test\" is present\
    \ as a value for the `class` attribute.\n\n## SUMMARY\n\n- While the bs4.BeautifulSoup\
    \ module can be used to parse XML, it is also possible to parse through XML content\
    \ using the xml.etree.ElementTree module.\n- The Element object has various attributes\
    \ of use like name, attrib, text, etc.\n- The itertext() method of Element allows\
    \ us to iterate through the string content of all child nodes recursively.\n-\
    \ The subscript operator can be used to access individual child elements of a\
    \ given Element.\n- The most commonly used searching method of ElementTree is\
    \ findall(), which returns a list of Element objects that matched the given tag\
    \ name.\n- The find() method is similar to the findall() method, but returns only\
    \ the first match.\n\n# 19 PARSING JSON\n\nIn this chapter you will be able to:\n\
    \n- [x] Work with JSON using the json module\n- [x] Convert Python objects into\
    \ their corresponding JSON string representation\n- [x] Parse JSON strings and\
    \ extract data in the form of Python objects\n- [x] Read from and write to JSON\
    \ files in Python\n\n## 19.1 Introduction\n\nThe **JavaScript Object Notation\
    \ (JSON)** has become a popular textual representation of data. Like XML, JSON\
    \ too is textual and structured, but differs from XML by requiring significantly\
    \ lesser metadata within the document! Originally developed as a textual representation\
    \ of JavaScript objects that can be transmitted through streams, it is now an\
    \ effective replacement for XML in many cases!\n\nA JSON document basically comprises\
    \ of collections and individual values. The supported collections are objects\
    \ and arrays that map on to Python's `dict` and `list` types respectively. The\
    \ scalar values could be numbers or strings, mapping to Python's `int/float` and\
    \ `str` types. In addition, JSON also supports Boolean literals (`true` and `false`)\
    \ and a special `null` literal, which map on to Python's `bool` and `None` respectively.\n\
    \nJSON objects and Python objects can be inter-converted using the built-in `json`\
    \ module. The interface of this module is very similar to the pickle module covered\
    \ in section 14.6 & 14.7 where we had used the methods `dump()` and `load()`,\
    \ but a significant difference is that multiple JSON objects written one after\
    \ another to a single file will not make it a JSON file! A single JSON file is\
    \ only supposed to have a single JSON object within it (which in turn can have\
    \ anything!). Multiple JSON objects written sequentially into a file can have\
    \ it's applications, but is technically not a single JSON file.\n\n## 19.2 Converting\
    \ From Python to JSON\n\n### 19.2.1 Converting Python Objects into JSON Strings\n\
    \nBefore we examine the methods that help convert Python objects into their JSON\
    \ equivalents, we will first see the JSON equivalents of each type of Python object:\n\
    \n| Python Object | JSON Representation |\n|---|---|\n| `dict` | Object |\n| `list`,\
    \ `tuple` | Array |\n| `str` | String |\n| `int`, `float` | Number |\n| `True`,\
    \ `False` | `true`, `false` |\n| None | null |\n\nIn order to convert an existing\
    \ Python object into it's equivalent JSON representation, we use the `json.dumps()`\
    \ method (which stands for \"dump string\") that has the following syntax:\n\n\
    ```\njson.dumps(obj)\n```\n\nHere is an example to convert various Python objects\
    \ to JSON :\n\n```\n>>> import json\n>>> json.dumps({\"a\":\"1\",\"b\":\"2\"})\n\
    '{\"a\": \"1\", \"b\": \"2\"}'\n>>> json.dumps([1,2,3,4])\n'[1, 2, 3, 4]'\n>>>\
    \ json.dumps(\"Hello\")\n'\"Hello\"'\n>>> json.dumps(25)\n'25'\n>>> json.dumps(True)\n\
    'true'\n>>> json.dumps(None)\n'null'\n```\n\n**Observation:**\n\n1. We have imported\
