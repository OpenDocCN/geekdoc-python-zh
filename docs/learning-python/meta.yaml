    # 2. Python Basics


    HelloWorld3.py


    ```

    1. print("Hello World"); print("Hi from India!")

    ```


    Output:


    ```

    Hello World

    Hi from India!

    ```


    > NOTE:

    There is no harm in ending a statement with a semi-colon, though it is neither
    required nor preferred.


    # 2.1.1.3 One Statement Spanning Multiple Lines


    What if a particular statement is long and we prefer to break it into multiple
    lines?

    A single statement can span multiple lines if required, but this information needs
    to be conveyed to the Python interpreter. Any line that is going to be continued
    in the next line needs to end with a backslash (\). Thus, if a single statement
    has to span 4 lines for example, the first 3 lines will end with backslashes,
    each indicating that the statement continues further into the following line,
    but the 4th line will not end with a backslash and thus terminates the statement.

    Let us intentionally rewrite HelloWorld3.py using multiple lines.


    HelloWorld4.py


    ```

    1. print(\n2. "Hello\n3. World")

    4. print("Hi fr\n5. om India!")

    ```


    Output:


    ```

    Hello World

    Hi from India!

    ```'
  - '[PAGE 28]


    # 2.1.2 Quotation Marks


    Strings in Python are enclosed in quotations, but unlike most other programming
    languages, Python does not differentiate between single quotes and double quotes.


    # 2.1.2.1 Single Quotes


    A string can well be enclosed in single quotes. Such a string can easily contain
    double quotes without any issue, but any single quote character inside the string
    needs to be escaped by prefixing it with backslash.


    Here is another version of HelloWorld.py:


    ```

    HelloWorld5.py


    1. print(''Hello World'')

    2. print(''"Hi" from \''India\''!'')

    ```


    Output:


    ```

    Hello World

    "Hi" from ''India''!

    ```


    # 2.1.2.2 Double Quotes


    Just like single quotes, a string can well be enclosed in double quotes too. Such
    a string can easily contain single quotes inside, but any double quote character
    inside the string needs to be escaped by prefixing it with backslash.


    Here is another version of HelloWorld5.py:


    ```

    HelloWorld6.py


    1. print("Hello World")

    2. print("''Hi'' from "India"!")

    ```


    Output:


    ```

    Hello World

    ''Hi'' from "India"!

    ```


    # 2.1.2.3 Triple Quotes


    Python also supports a special kind of quotation mark made up 3 single-quotes
    ('''''') or 3 double-quotes ("""). Triple quotes allow a string to span multiple
    lines.'
- md: "## 2. Python Basics\n\nFurthermore, single quotes and double quotes can be\
    \ freely used inside triple quotes вАУ of course you can't directly use the 3 quotes\
    \ used to start the string in succession or else it would be considered to be\
    \ triple quotes and will terminate the string. Escaping of single quotes and double\
    \ quotes is possible, if at all needed.\n\nHere is the improved program:\n\n```\n\
    HelloWorld7.py\n\n1. print(\"\"\"Hello World\n2. 'Hi' from \"India\"!\"\"\")\n\
    ```\n\nOutput:\n\n```\nHello World\n'Hi' from \"India\"!\n```\n\nTriple quotes\
    \ differs from single quotes and double quotes in the following ways:\n\n1. They\
    \ allow strings to span multiple lines\n2. They do not require a terminating backslash\
    \ at the end of every line to indicate continuation\n3. They allow the embedding\
    \ of both single quotes and double quotes without the need for escaping (except\
    \ when there are 3 quotes in succession in which case an escaping might be required)\n\
    4. They preserve the newline character (that exists at the end of every line)\
    \ within the string\n5. They can have a special purpose вАУ that of providing documentation\
    \ (covered in section 10.15)\n\n## 2.2 Comments\n\nComments are pieces of text\
    \ added within programs to improve the readability. Comments are non-executable\
    \ and the interpreter will ignore its contents.\n\nA comment in Python is indicated\
    \ by the hash (#) symbol вАУ everything from the hash till the end of that line\
    \ is considered to be a comment.\n\nHere is another version of HelloWorld.py using\
    \ comments:\n\n```\nHelloWorld8.py\n\n1.  #Script to print \"Hello World\"\n2.\
    \  #This two lines are comments\n3.  print(\"Hello World\") #One more comment\n\
    4.  print(\"Hi from India!\")\n```\n\nOutput:\n\n```\nHello World\nHi from India!\n\
    ```\n\nA good programmer always uses comments to document why the code is doing\
    \ what it is doing, or document facts that are either difficult to make out from\
    \ the code or is not present in the code. Of course, the code should always be\
    \ written in a manner that it clearly specifies what it is doing. Sometimes comments\
    \ are also added to summarise what a block is doing вАУ with the definition of a\
    \ block also extending to functions, classes and modules!\n\nSometimes, the comments\
    \ require multiple lines, and we end up using many hashes. There is a simpler\
    \ way to implement such a comment using the concept of triple quotes. Triple quotes\
    \ are not comments as such; they are technically strings вАУ but strings do not\
    \ do anything on their own, and can end up behaving like comments!\n\nSection\
    \ 10.15 will introduce an interesting application of comments used for documenting\
    \ program elements, implemented using triple-quoted strings!\n\nHere is a version\
    \ that demonstrates both approaches:\n\n```\nHelloWorld9.py\n\n1.  # Hi!\n2. \
    \ # This program prints Hello World\n3.  # I hope you like it!\n4.  # ==========================\n\
    5.  #\n6.  print(\"Hello World\")\n7.  \"\"\"\n8.  ==========================\n\
    9.  Hi!\n10. This program printed Hello World\n11. Did you run it?\n12. \"\"\"\
    \n```\n\nOutput:\n\n```\nHello World\n```\n\n## 2.3 Basic Data Types\n\nOne of\
    \ the first things to learn in a programming language is what kinds of data types\
    \ it provides. This will then help us know what can be represented and what operations\
    \ are permitted. Python being a dynamic scripting language does not require (and\
    \ does not allow) a variable to be declared to be of a specific type before use.\
    \ Being a powerful object-oriented language, all data is considered to be objects\
    \ and therefore all data types are classes (more details on objects, classes and\
    \ object-oriented programming is covered in section 12).\n\nWhen a variable stores\
    \ a value, it is actually referring to an object of a specific type. The type\
    \ of any expression can be found out using the built-in function `type()`. This\
    \ will be a useful learning tool now and a useful debugging tool later on.\n\n\
    We are going to cover the following data types in the following sections:\n\n\
    1. Integers (`int`)\n2. Real numbers (`float`)\n3. Complex numbers (`complex`)\n\
    4. Strings (`str`)\n5. Boolean (`bool`)\n\nA more detailed coverage of these data\
    \ types is available in section 20.1.\n\n### 2.3.1 The `int` type\n\nThe simplest\
    \ numeric data type to deal with is `int`. Objects of this type represent integers\
    \ (both positive and negative) and cannot store a fractional part. The range is\
    \ not limited in Python and we can store very large integers without worrying\
    \ about whether Python will be able to handle it!\n\n#### 2.3.1.1 Literals of\
    \ Type `int`\n\n- Any literal constant made up of only digits (with an optional\
    \ leading sign) is considered as an `int` constant.\n- Any literal constant made\
    \ up of only digits and with a leading `0o` (with an optional leading sign before\
    \ that) is considered to be an octal constant of type `int`. Such constants cannot\
    \ contain the digits 8 and 9 (as they are illegal in octal).\n- Any literal constant\
    \ made up of only digits and alphabets a-f in upper-case or lower-case and with\
    \ a leading 0x or 0X (with an optional leading sign before that) is considered\
    \ to be a hexadecimal constant of type `int`.\n\n**Example:**\n\n```\n>>> 15\n\
    15\n>>> -25 #Negative integer\n-25\n>>> 0o15 #Octal integer\n13\n>>> -0o15 #Negative\
    \ octal integer\n-13\n>>> 0o08 #Illegal octal integer\n  File \"<stdin>\", line\
    \ 1\n    0o08\n    ^\nSyntaxError: invalid syntax\n>>> 0x12abc4 #Hexadecimal integer\n\
    1223620\n>>> -0X12aBc4 #Negative hexadecimal integer with mixed case\n-1223620\n\
    >>>\n```\n\n> **NOTE:**\nAny output that contains the Python prompt `>>>` (as\
    \ in the case above) implies that this is a snapshot of an interactive python\
    \ session and not the execution of a Python script. An interactive Python session\
    \ helps us get output instantaneously as each statement is immediately processed\
    \ and its result is displayed. This can help as a learning tool. In such examples,\
    \ whatever we need to type is shown in bold and rest is printed by the Python\
    \ interpreter. When we want to combine multiple statements together for a more\
    \ complex job, we will shift to writing Python scripts instead. See section 1.4\
    \ for information on how to launch the Python interpreter.\n\nObjects of type\
    \ `int` can also be created using the explicit constructor of class `int`. This\
    \ of course also resembles a function call for type conversion. Thus, the following\
    \ two statements are identical in function:\n\n**Example:**\n\n```\nx = 2\nx =\
    \ int(2)\n```\n\nThis built-in function is also helpful for converting other types\
    \ like `float` and `string` to the type `int`:\n\n```\n>>> int(23.99)\n23\n>>>\
    \ int(\"25\")\n25\n```\n\nThe default constructor of `int` class will create an\
    \ integer with value 0, and a 2-argument constructor has been provided to convert\
    \ a string representation of an integer in a particular base into a normal integer.\
    \ The constructors have the following declaration:\n\n**Syntax:**\n\n```\nint(x=0)\n\
    int(str_x, base=10)\n```\n\nSome examples follow:\n\n```\n>>> int()\n0\n>>> int(25)\n\
    25\n>>> int(\"25\")\n25\n>>> int(\"25\",8)\n21\n```\n\n### 2.3.1.2 Operations\
    \ on Type int\n\nThe following table lists out the arithmetic operators that can\
    \ be used with data items of type `int`:\n\n| Expression | Result | Meaning |\n\
    | :--- | :--- | :--- |\n| 2 ** 3 | 8 | 2 to the power 3 |\n| 2 * 3 | 6 | Multiplication\
    \ |\n| 10 / 3 | 3.3333333333333335 | Division |\n| 10 // 3 | 3 | Integer division\
    \ |\n| 10 % 3 | 1 | Modulus/Remainder |\n| 2 + 3 | 5 | Addition |\n| 2 - 3 | -1\
    \ | Subtraction |\n\n*Table 1: Arithmetic operations on int*\n\n> **NOTE:**\n\
    If the example вАЬ10/3вАЭ above yields вАЬ3вАЭ as the answer, you are using an old version\
    \ of Python (less than 3.x). In such a case, while you can continue and learn\
    \ Python through this book, it is recommended that you upgrade Python to the latest\
    \ version to derive maximum benefits.\n\nThe following mathematical functions\
    \ are available on type `int`:\n\n| Expression | Result | Meaning |\n| :--- |\
    \ :--- | :--- |\n| `pow(2, 3)` | 8 | 2 to the power 3 |\n| `divmod(10, 3)` | (3,\
    \ 1) | A tuple containing the quotient and remainder after integer division. Tuples\
    \ will be covered in section 5 |\n| `abs(-10)` | 10 | Absolute value |\n| `math.factorial(5)`\
    \ | 120 | Factorial |\n\n**Table 2: Mathematical functions that operate on int**\n\
    \n> **NOTE:**\nWhen you encounter functions like вАЬ`math.factorial()`вАЭ, it indicates\
    \ that we are referring to the `factorial()` function of `math` module. For this\
    \ to work, it is necessary to execute the statement `import math` once before\
    \ invoking any function of that module in the session/script.\n\nObjects of type\
    \ `int` can be converted to other bases using these built-in functions:\n\n| Expression\
    \ | Result | Meaning |\n| :--- | :--- | :--- |\n| `bin(12)` | 0b1100 | Converts\
    \ the integer to binary |\n| `oct(12)` | 0o14 | Converts the integer to octal\
    \ |\n| `hex(12)` | 0xc | Converts the integer to hexadecimal |\n\n**Table 3: Base\
    \ conversion functions that operate on int**\n\nThe following bitwise operators\
    \ are available on type `int` (have a look at section 20.2 if you want to learn\
    \ bit manipulation):"
