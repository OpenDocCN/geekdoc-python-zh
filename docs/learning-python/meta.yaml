    \ do not want space to be the separator, we can pass the separator string as an\
    \ argument to `print()` as shown in the examples below. The separator string can\
    \ be a single character, or multiple characters or even a null string to indicate\
    \ that we don't want any separator between the items. Arguments like `sep` in\
    \ the example below are called *keyword arguments* and are covered in detail in\
    \ section 10.6.\n\n```\n>>> print(\"hello\",\"world\",sep=',')\nhello,world\n\
    >>> print(\"hello\",\"world\",sep=\" <-> \")\nhello <-> world\n>>> print(\"Welcome\"\
    ,\"to\",\"Python\",sep=\" <-> \")\nWelcome <-> to <-> Python\n>>> print(\"2+3=\"\
    ,2+3,sep=\"\")\n2+3=5\n```\n\n# 2.7.1.4 Terminating Items\n\nBy default, the `print()`\
    \ function prints a newline character (`\\n`) after printing all the items. If\
    \ we choose, we can control this too using the keyword argument `end` as shown\
    \ in the examples below. Either we can end up printing any suffix string of our\
    \ choice, or more practically, remove the newline so that multiple `print()` functions\
    \ end up producing their output on the same line.\n\n```\n>>> print(\"Python\"\
    , \"is\", \"a\", \"dynamic\", \"language\", end=\"\\n\\t\\t--Python\\n\")\nPython\
    \ is a dynamic language\n\t\t--Python\n>>> print(\"Hello\",\"world\",end=\"\\\
