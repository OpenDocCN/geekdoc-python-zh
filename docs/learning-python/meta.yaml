    \ (2 excluded). Thus, our search is restricted to the indices 0 and 1, and the\
    \ element 3 is not found in these indices.\n\n## 5.6 Tuple Slices\n\nJust like\
    \ a list slice, a tuple slice is a sub-tuple extracted from a tuple вАУ it is a\
    \ tuple comprising of a part of an existing tuple. A tuple slice uses syntax `tuple[start:end]`,\
    \ where `tuple` is the parent tuple from which to extract elements, `start` is\
    \ the starting index from where to start extracting elements and `end` is the\
    \ ending index (excluding `end`) till where to extract the elements. The parent\
    \ tuple does not undergo any change. Both `start` and `end` are optional, with\
    \ `start` defaulting to 0 (index of the first element) and `end` defaulting to\
    \ `len(tuple)`, i.e. the end of the tuple. Some examples follow:\n\n```python\n\
    >>> T=(5,2,3,2)\n>>> T[1:3] # Slice of T from 1 to 3 (exclusive)\n(2, 3)\n>>>\
    \ T[1:] # Slice of T from 1 till the end of the tuple\n(2, 3, 2)\n>>> T[:3] #\
