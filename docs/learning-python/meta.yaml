    # 6.7.2 Set Intersection


    The `set.intersection(s)` function returns a new set that represents the intersection
    of the set `set` and the set `s`:


    ```

    >>> S1={1,2}

    >>> S2={2,3}

    >>> S1.intersection(S2)

