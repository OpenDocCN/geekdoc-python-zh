    | \N{name} | Unicode character with name name |


    Table 10: Escape Sequences


    If a string contains backslashes, but the intention is not to denote escape sequences,
    the backslashes need to be escaped as shown in the table above. If however, the
    string contains many such backslashes, the entire string can be passed to Python
    as a raw string using the prefix r or R. In such cases, all characters are retained
    within the string without any special meaning and therefore no escape sequences
    are processed. Examples of escape sequences and raw strings follow.'
  - '[PAGE 44]


    # Examples:


    ```

    >>> "\tHello\nWorld\b\n\101\x41"

    ''\tHello\nWorld\x08\nAA''

    >>> r"\tHello\nWorld\b\n\101\x41"

    ''\tHello\nWorld\b\n\101\x41''

    >>> R"\tHello\nWorld\b\n\101\x41"

    ''\tHello\nWorld\b\n\101\x41''

    ```


    # Observation:


    +   1. The character A has an ASCII code of 65, which is 101 in octal and 41 in
    hexadecimal. These codes have been used in the examples above.

    2. Python processes certain escape sequences and represents them in a different
    form (\b became \x08 and \x41 became A).

    3. The r or R prefix will escape any backslashes so that they represent the literal
    backslash character rather than indicating an escape sequence.


    # 2.3.4.2 Operations on Type string


    Many useful functions are present in the string class to process strings and while
    some of them are documented in the tables below, formatting will be covered in
    section 8.7 and more formatting related functions will be examined in section
    8.6:


    | Expression | Result | Meaning |

    | :--- | :--- | :--- |

    | ''aBc''.lower() | ''abc'' | Converts all characters to lowercase |

    | ''aBc''.upper() | ''ABC'' | Converts all characters to uppercase |

    | ''hello woRLD''.capitalize() | ''Hello world'' | Converts all characters to
    lowercase and the first character to uppercase |

    | ''hello woRLD''.title() | ''Hello World'' | Converts all characters to lowercase
    and the first character of every word to uppercase |

    | ''hello woRLD''.swapcase() | ''HELLO WOrld'' | Converts all lowercase characters
    to uppercase and vice-versa |


