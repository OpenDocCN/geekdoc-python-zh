    # 3.3.5 Using range() in for Loops


    Syntax:


    ```

    range(end)

    range(start,end)

    range(start,end,step)

    ```


    **Form #1:** `range(end)`


    In the simplest form, the `range()` function generates a sequence of all numbers
    from 0 up to and excluding the number specified as shown in the example below:


    ```

    >>> for i in range(5): print(i)

    ...

    0

    1

    2

    3

    4

    ```


    **Form #2:** `range(start, end)`


    The `range()` function can also receive the starting and ending numbers and generate
    all the numbers in between as shown below:


    ```

    >>> for i in range(5,10): print(i)

    ...

    5

    6

    7

    8

    9

    ```


    > **NOTE:**

    When the syntax `range(start, end)` is used, the `range()` function generates
    all numbers from `start` (including `start`) till `end-1` (excludes `end`).'
  - '[PAGE 90]


    **Form #3:** `range(start, end, step)`


    Finally, a third argument can be provided to the `range()` function to act as
    a step size or increment, as is evident from this example:


    ```

    >>> for i in range (10,20,3): print(i)

    ...

    10

    13

    16

    19

    ```


    As always, the ending number is excluded (if at all present in the sequence).

    The step size can be negative in order to generate decreasing numbers as shown
    in the example below:


    ```

    >>> for i in range (20,10,-2): print(i)

    ...

    20

    18

    16

    14

    12

    ```


    The following calls to `range()` will result in an empty sequence:


    +   - `range(10,10)`

    - `range(20,10)`

    - `range(10,20,-2)`

    - `range(20,10,2)`


