    # 17.2.1.3 Handling Special Input


    Tags and textual content make up most of the content in HTML. What''s remaining
    are the following:


    +   1. Comments (Example: `<!-- This is a comment -->`)

    2. Entities (Examples: `&nbsp;`, `&#32` and `&#x20`)

    3. Declarations and processing instructions (Examples: `<!DOCTYPE HTML>` and `<?php
