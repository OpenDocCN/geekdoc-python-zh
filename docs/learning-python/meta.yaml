    # 11.6 Practical Use of map(), filter() and reduce() Using Lambda Expressions


    The use of lambda expressions (section 10.13) in conjunction with `map()`, `filter()`
    and `reduce()` can help process sequences using minimal code! This section illustrates
    this point using a few practical examples.


    First of all, let us revisit all the examples we have covered for `map()`, `filter()`
    and `reduce()` in the preceding sections and rewrite them using lambda expressions.


    To multiply each element of a list by 2:


    ```

    >>> L=[1,6,4,9,7]

