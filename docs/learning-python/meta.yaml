  md: '# 2.7.3 Taking Input Using the input() Function


    We know how to print output. Let us now learn how to receive input from the user.
    This knowledge will help us write interactive Python scripts that ask the user
    to provide input for the script.


    # 2.7.3.1 Taking an input


    To receive any input from the user, the `input()` function can be used. This function,
    in it''s simplest form, waits for the user to enter a line of text and returns
    the input entered after chopping off the trailing newline character.


    **Example:**


    ```

    >>> name=input()

    Ram

    >>> language=input()

    Python

    >>> print(''{} is learning {}''.format(name,language))

    Ram is learning Python

    ```


    # 2.7.3.2 Taking an input After Prompting


    As is evident from the output above, when the `input()` function is executed,
    it merely waits for the user to enter a line of input. The user might have no
    clue that the script is waiting for input. It is therefore a good idea to print
    some message informing the user that some input is required. This message can
    be printed using a `print()` call before invoking `input()`. There is an easier
    method though! The `input()` function, helpful as it is, permits us to pass a
    prompt string to be displayed just prior to accepting input from the user. In
    the previous example, no prompt string was given and hence nothing was displayed.
    But if a prompt string is given, it will be displayed and then the user is given
    a chance to enter input.


    **Example:**


    ```

    >>> name=input("Enter your name:")

    Enter your name:Ram

    >>> language=input("Enter language:")

    Enter language:Python

    >>> print(''{} is learning {}''.format(name,language))

    Ram is learning Python

    ```'
