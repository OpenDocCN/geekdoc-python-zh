  - '[PAGE 272]


    # SUMMARY


    +   - Regular Expressions are pattern matching expressions. They help us formally
    frame patterns of strings we are interested in searching.

    - Certain operators like ., [], *, +, ? and {} are available that have special
    meanings. If these characters are to be used as operands, they need to be escaped.

    - Regular expressions are case sensitive by default.

    - Regular expression based search and replace functionality is provided by the
    re module.

    - The search function searches for a pattern anywhere within a string; the match
    function searches from the beginning of a string; the fullmatch function searches
    from a match that spans the entire string.

    - Parentheses can be used for grouping and substrings that matched within the
    groups can be retrieved.

    - The split() function can be used to split a string into parts based on a RE
    for specifying the delimiter string.

    - The sub() and subn() functions can be used for performing regular expression
    based substitutions.

    - Regular expressions that are frequently used can be pre-compiled using the compile()
    function.


