    # 10.11 Global Variables


    Global variables are variables that are accessible throughout the script вАУ including
    inside functions as well as outside of all functions. While this makes it convenient
    for multiple functions to share the same variable(s), it is frowned upon as being
    an unprofessional practice for the following reasons:


    +   1. Global variables are invisibly tied to the function вАУ it may not be obvious
    to a person reading the program that the function uses/rely on a particular global
    variable. Parameters are far more readable, giving us a clear picture as to what
    inputs the function depends on.

    2. Global variables are shared by all functions and when a particular function
    is buggy and messes with the value of the global variable, it may result in other
    functions also behaving in an unexpected fashion, making it difficult to debug
    and identify the offending function. Parameters are local to the function and
    are not shared across functions.

    3. The dependency of the function on the global variable makes it more difficult
    to reuse the function across programs вАУ you can''t, for example, simply copy and
    paste the function to another program without also copying the global variable
    (though a copy-paste is not a professional way of reuse). Also, the function caller
    should be aware of the value that is to be stored in the global variable before
    the call is made. On the other hand, parameters of a function belong to the function
    and are copied when the function definition is copied.

    4. When multiple such functions co-exist within the same program, there can be
    confusion related to which globals are used by which functions. On the other hand,
    parameters in different functions are different even if their names are the same.

    5. Global variables continue to exist till the end of the program, which may be
    long after we require the variable, wasting memory and polluting the namespace.
    Parameters die the moment the called function returns.


    Thus, it is a bad idea to use global variables. But for now, we will continue
    with this topic and see how to make it possible to use globals in functions nevertheless.


    All variables used inside functions are local to the function by default. In other
    words, Python helps you by assuming you always want locals instead of globals.
    This is illustrated in the example below:


    ```

    >>> x=2

    >>> def f():

    ...     x=3

    ...     print(x)

    ...

    >>> print(x)

    2

    >>> f()

    3

    ```'
  - '[PAGE 294]


    ```

    >>> print(x)

    2

    ```


    **Observation:**


    +   1. The line x=2 introduces a global variable with name x and value 2.

    2. The function f has a reference to the variable x, but this is assumed to be
    a local variable x that is local to the function f. This variable is created when
    the function is called and is destroyed when the function returns. During the
    lifetime of the function, however, it exists with a value of 3.

    3. Any reference to a variable inside functions is assumed to be a local reference
    by default. Any reference to a variable outside functions is assumed to be a global
    reference.

    4. Any reference to x outside of all functions is a reference to the global variable
    x, with the value 2. Any reference to x inside the function f is a reference to
    the local variable x, with the value 3.


    What if in the previous example, we want the function to use the global variable
    x instead of creating a new local variable? We make this intention known to Python
    using the keyword global to seek access to one or more global variables as shown
    in the syntax below:


    ```

    global name1[,name2[,...]]

    ```


    This is demonstrated in the example below:


    ```

    >>> x=2

    >>> def f():

    ...     global x

    ...     x=3

    ...     print(x)

    ...

    >>> print(x)

    2

    >>> f()

    3

    >>> print(x)

    3

    ```'
  - "[PAGE 295]\n\n**Observation:**\n\n+   1. The statement `global x` makes it possible\
    \ for the function `f` to access the global variable `x`, which otherwise would\
    \ have construed to mean a local variable `x`.\n2. A function that needs access\
    \ to a global variable has to compulsorily use the `global` statement to request\
    \ access.\n3. Once the `global` statement is used to request access to a global\
    \ variable, it is not possible to have a local variable with the same name.\n\
    4. A function can request access to multiple global variables simultaneously using\
    \ either a single `global` statement and a list of all global variables or using\
    \ multiple `global` statements.\n\n# 10.12 Nested Functions\n\nJust as how the\
    \ previous section introduced the concept of global variables which are defined\
    \ outside of all functions and can be accessed by all function using the `global`\
    \ statement, it won't be wrong to similarly assume that all functions are also\
    \ defined in the global scope usually. Of course, functions do not need a `global`\
    \ statement to make them accessible to other functions. Similarly, just as how\
    \ we can have local variables inside functions that are accessible only within\
    \ the function, we can define a function within a function, making it local to\
    \ the function within which it is defined and thus accessible only to the function\
    \ within which it is defined.\n\nA function defined within another function is\
    \ called a *nested function*. In such cases, we differentiate between these functions\
    \ using the terminology of *outer function* and *inner function*. Thus, the inner\
    \ function is the one that is defined inside of the outer function, is local to\
    \ the outer function, and accessible only to the outer function. This is demonstrated\
    \ below:\n\n```\n>>> def f():\n...     print(\"This is f\")\n...     def g():\n\
    ...             print(\"This is g\")\n...     g()\n...\n>>> f()\nThis is f\nThis\
    \ is g\n>>> g()\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nNameError: name 'g' is not defined\n```"
  - "[PAGE 296]\n\n# 10. Functions\n\nObservation:\n\n+   1. The function f is the\
    \ outer function and the function g is the inner function.\n2. As is the case\
    \ everywhere else in Python, encountering a function definition does not automatically\
    \ result in a function call. An inner function is useless unless used in some\
