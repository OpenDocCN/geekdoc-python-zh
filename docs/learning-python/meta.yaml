  md: '# 14.2.1 Opening Files


    In order to open a file to access it''s contents, 2 pieces of information are
    required:


    +   1. The *pathname* of the file, identifying which file you wish to open

    2. The *access mode*, identifying what you wish to do with the file contents


    On successfully opening a file, a **file object** is returned that is to be used
    as a reference to the opened file later on in the program. All other file operations
    on the file can be performed using this file object.


    The `open` function is used to open a file and return a file object, and has the
    following syntax:


    ```

    open(pathName [,mode])

    ```


    **Note:**


    +   1. The file is identified in the filesystem by it''s pathname, which could
    be relative or absolute.

    2. If the file could not be opened for any reason, `FileNotFoundError` is raised.


    The permissible modes are listed in the table below:


    | Mode | Meaning |

    | :--- | :--- |

    | ''r'' | Open the file for reading. |

    | ''rb'' | If the file exists and has read permissions, you will be permitted
    to read it''s contents using the file object returned. If the file does not exist
    or does not have read permissions, this operation will fail. |

    | ''w'' | Open the file for writing. |

    | ''wb'' | If the file exists and has write permissions, you will be permitted
    to write to the file, but any data already present in the file is lost as the
    file is truncated. If the file does not exist, it will be created and you will
