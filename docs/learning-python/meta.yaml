    \n1. еПШйЗПеРНеТМеЗљжХ∞еРНеЇФдЄЇе∞ПеЖЩе≠ЧжѓНпЉМеНХиѓНдєЛйЧізФ®дЄЛеИТзЇњеИЖйЪФгАВдЊЛе¶ВпЉЪ`variable_name`гАБ`function_name()`\n2. з±їеРНпЉИдї•еПКеЉВеЄЄеРНзІ∞пЉМеЫ†дЄЇеЃГдїђжШѓз±їпЉЙеЇФдЄЇе∞ПеЖЩе≠ЧжѓНпЉМжѓПдЄ™еНХиѓНзЪДй¶Це≠ЧжѓНе§ІеЖЩгАВдЊЛе¶ВпЉЪ`ClassName`гАБ`ExceptionName`\n\
    3. еЄЄйЗПеРНеЇФдЄЇе§ІеЖЩе≠ЧжѓНпЉМеНХиѓНдєЛйЧізФ®дЄЛеИТзЇњеИЖйЪФгАВдЊЛе¶ВпЉЪ`CONSTANT_NAME`\n4. жЙАжЬЙеЕґдїЦж†ЗиѓЖзђ¶пЉИеМЕеРНгАБж®°еЭЧеРНгАБжЦєж≥ХеРНгАБеЃЮдЊЛеПШйЗПеРНгАБе±АйГ®еПШйЗПеРНгАБеЗљжХ∞еПВжХ∞еРНпЉЙеЇФйБµеЊ™еПШйЗПеРНзЪДжГѓдЊЛ\n\
    \n## 2.5 еЕ≥йФЃе≠Ч\n\nеЕ≥йФЃе≠ЧжШѓ Python иГље§ЯзРЖиІ£зЪДзЙєжЃКиѓНиѓ≠гАВињЩдЇЫдЄНиГљзФ®дљЬж†ЗиѓЖзђ¶гАВжИСдїђе∞ЖеЬ®йЬАи¶БжЧґе≠¶дє†еЕ≥йФЃе≠ЧгАВжИСдїђеЈ≤зїПзЬЛеИ∞дЇЖдЄАдЇЫеЕ≥йФЃе≠ЧпЉМе¶В `True`гАБ`False`гАБ`and`гАБ`or`\
