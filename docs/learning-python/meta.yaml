    The = operator allows us to assign a list to a list variable. However, this is
    not the same as copying elements of a list to another and is demonstrated in the
    example below. Recall from section 2.6 that variables merely hold references to
    objects вАУ lists are objects and list variables are references to such objects,
    and the = operator only copies the reference, not the objects!


    ```

