    \ how to parse HTML content using this. Thereafter, we will explore another library\
    \ called **BeautifulSoup** (which internally uses Python's HTML parser) that provides\
    \ more powerful and easier to use interface to HTML documents.\n\n## 17.2 Using\
    \ the HTML Parser\n\nPython's built-in HTML parser is available through the `html.parser`\
    \ module's `HTMLParser` class. This is the procedure for parsing HTML code using\
    \ this:\n\n1. Define a class that derives from `HTMLParser`\n2. Override the methods\
    \ we are interested in and provide suitable implementation\n3. Create an instance\
    \ of our class\n4. Feed in HTML data to that instance\n5. Suitable methods of\
    \ our class get called automatically depending on the HTML content parsed\n\n\
    The following sections show how we can achieve each of these steps.\n\n### 17.2.1\
    \ Deriving a Class from HTMLParser\n\nThe following sections cover the frequently\
    \ called methods of `HTMLParser` that we might be interested in overriding:\n\n\
    ### 17.2.1.1 Handling Tags\n\nThe most commonly occurring content in HTML is tags.\
    \ Tags may be paired (Example: `<b>Hello world</b>`) or unpaired (Example: `<br/>`).\n\
    \nWhenever the parser finds the beginning of a tag, it will invoke the `handle_starttag`\
    \ method which has the following syntax:\n\n```\nHTMLParser.handle_starttag(self,\
    \ tag, attrs)\n```\n\nWhile the first parameter has to be `self` (as this is an\
    \ instance method), the second parameter (`tag`) identifies the name of the tag\
    \ found and the third parameter (`attrs`) is a list containing all the attributes\
    \ present with the tag, with each attribute-value pair being stored as a tuple.\n\
    \nHere is a sample code to demonstrate how this works:\n\n```\n>>> from html.parser\
    \ import HTMLParser\n>>> class Parser(HTMLParser):\n...     def handle_starttag(self,\
    \ tag, attrs):\n...         print(\"Found tag:\", tag)\n...         print(\" Attributes:\"\
    , attrs)\n...\n>>> data='<html><body><p class=\"para text\" id=\"1\">This is a\
    \ <b>test</b><p><br/></body></html>'\n>>> parser=Parser()\n>>> parser.feed(data)\n\
    Found tag: html\n Attributes: []\nFound tag: body\n Attributes: []\nFound tag:\
    \ p\n Attributes: [('class', 'para text'), ('id', '1')]\nFound tag: b\n Attributes:\
    \ []\nFound tag: p\n Attributes: []\nFound tag: br\n Attributes: []\n```\n\n**Observation:**\n\
    \n1. We imported the `HTMLParser` class from the `html.parser` module, defined\
    \ our class (`Parser`) that derived from it, overrode the method `handle_starttag`\
    \ and instantiated our class.\n2. We used the `feed()` method to feed in HTML\
    \ data. We will explore this in detail later in section 17.2.2.\n3. We are merely\
    \ printing the tag name and its attribute as and when the parser encounters it.\n\
    4. We observe that parsing commences immediately after feeding in data.\n5. We\
    \ observe that we encounter the tags in the same order as they are present in\
    \ the HTML input.\n6. We observe that all attributes are also made available as\
    \ a list of tuples. Of course most of the tags did not have any attributes and\
    \ therefore the list was empty.\n\nSimilarly, whenever an ending tag is encountered,\
    \ the `handle_endtag` method is invoked, which has the following syntax:\n\n```\n\
    HTMLParser.handle_endtag(self, tag)\n```\n\nNote that the end tag cannot contain\
    \ any attributes and therefore we don't have the additional `attrs` parameter\
    \ that we had in `handle_starttag`.\nWe will now demonstrate the handling of end\
    \ tags in addition to start tags. Since we are reusing the code written earlier,\
    \ it would be easier for us to write this as a program instead:\n\n### htmlDemo1.py\n\
    \n```python\n#!/usr/bin/python\n\n# Program to demonstrate handling of start tags\n\
    # and end tags in HTML content\n\n\nfrom html.parser import HTMLParser\n\nclass\
    \ Parser(HTMLParser):\n    def handle_starttag(self, tag, attrs):\n        print(\"\
    Found tag:\", tag)\n        print(\" Attributes:\", attrs)\n    \n    def handle_endtag(self,\
    \ tag):\n        print(\"End tag:\", tag)\n\ndata='<html><body><p class=\"para\
    \ text\" id=\"1\">This is a <b>test</b><p><br/></body></html>'\nparser=Parser()\n\
    parser.feed(data)\n```"
