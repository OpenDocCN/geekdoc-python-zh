    ```


    `match.groups()` жЦєж≥Хдї•еЕГзїДељҐеЉПињФеЫЮжЙАжЬЙеИЖзїДзЪДеЖЕеЃєгАВе¶ВжЮЬдїїдљХеИЖзїДжЬ™еПВдЄОпЉМеЕґеЖЕеЃєе∞ЖжШѓжПРдЊЫзЪД `default` еАЉпЉИйїШиЃ§дЄЇ NoneпЉЙгАВ


    **з§ЇдЊЛпЉЪ**


    ```python

    >>> import re

    >>> m=re.fullmatch(r"(\d\d?)/(\d\d?)/(\d\d){1,2}", "25/12/2016")

    >>> m.groups()

    (''25'', ''12'', ''16'')

