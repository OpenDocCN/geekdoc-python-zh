    we need to extract the part before and after a separator in a string. One more
    common application in this context is storage of multi-line data and extraction
    of lines - since lines are separated by the newline character, multiple lines
    of data can be stored in a single string, separated by the newline character.
    If need be, we should be able to extract the individual lines from such a string.
