    - [x] Download images from a remote URL\n\n## 17.1 Introduction\n\n**HyperText\
    \ Markup Language (HTML)** is the language of the web. Whenever content has to\
    \ be made available across the web, the most preferred form is through HTML output.\
    \ This chapter concentrates on how HTML can be parsed in Python and how it can\
