    DROP TABLE Employee

    ```


    > **NOTE:**

    > Dropping a table will not only remove the table, but also all data along with
    it! This is potentially dangerous to be executed accidentally!


    It is possible to drop a table conditionally only if it exists. Any attempt to
    drop a table that does not exist will otherwise give rise to a syntax error. Conditional
    dropping of a table is demonstrated below:


    ```

    DROP TABLE IF EXISTS Employee

    ```


    ## 16.1.3 An Overview of Data Manipulation Language (DML)


    The most commonly DML SQL statements are `INSERT` to add rows to a table, `UPDATE`
    to modify rows in a table and `DELETE` to remove rows from a table.


    ### 16.1.3.1 The INSERT Statement


    Once the `Employee` table is created, we can add rows into it as demonstrated
    below:


    ```

    INSERT INTO Employee VALUES("Ram",1,"ram@company.com")

    ```


    ### 16.1.3.2 The UPDATE Statement


    In order to change an existing row in the `Employee` table, we can use the `UPDATE`
    statement as demonstrated below:


    ```

    UPDATE Employee SET email="ram2@company.com" WHERE id=1

    ```


    The above statement will replace the email address of any record(s) to "ram2@company.com"
    whenever it finds that the `id` in that record is 1.


    ### 16.1.3.3 The DELETE Statement


    In order to delete 1 or more rows from a table, the `DELETE` statement can be
    used as follows:


    ```

    DELETE FROM Employee WHERE name="Ram"

    ```


    As a special case, in order to delete all records of the table, the following
    `DELETE` statement can be used:


    ```

    DELETE FROM Employee

    ```


    > **NOTE:**

    > This is not the same as `DROP TABLE Employee`, which not only deletes the rows
    but also removes the table!


    ## 16.1.4 An Overview of Data Query Language (DQL)


    Perhaps the most powerful statement вАУ and also the most frequently used one вАУ
    in SQL is the `SELECT` statement, capable of retrieving data from tables:


    ```

    SELECT * FROM Employee

    ```


    The above statement fetches all records from the table `Employee`. If we wish
    to filter the results, we could do so as shown in the following example:


    ```

    SELECT * FROM Employee WHERE id<10

    ```


    ## 16.1.5 Introduction to SQLite


    All the above examples in this chapter are valid SQL examples, but were more fine
    tuned for use with SQLite. We thus saw data types like `TEXT` instead of the more
    traditional `VARCHAR`. Though SQLite supports primary keys the way other popular
    RDBMS do, joins across tables might be less frequently used here. Perhaps we need
    to first understand what is SQLite in order to better understand why things are
    slightly different in this RDBMS!


    SQLite is a C implementation of an embeddable RDBMS. It is thus highly efficient,
    highly portable (is shipped with the application and is not dependent on any databases
    to be installed/deployed there) and pretty simple (since a single application
    might rarely want to create large databases and store huge amounts of data). The
    installation process is simple and direct and so are the databases. Each database
    is stored locally as a file. In fact, if required, a database can be temporarily
    created directly in memory! This of course will have the limitation that when
    the application terminates, the database vanishes too!


    ## 16.2 Installation


    SQLite comes built-in in Python 3 and hence requires no installation. More information
    can be obtained on downloading the source and documentation at https://www.sqlite.org/.


    ## 16.3 Connecting and Closing


    All functionality of SQLite is provided by the `sqlite3` module, which has to
    be imported first.


    Before we can access the contents of a database, we need to establish a connection
    with. This is done by the `connect` function whose syntax is shown below:


    ```

    sqlite3.connect(databaseName)

    ```


    Recall from section 16.1.5 that SQLite stores databases as files. The `databaseName`
    parameter shown in the syntax above is the filename (or pathname if the file is
    not in the current directory) of the database file to be used. If the file does
    not exist, it will be created.


    > **NOTE:**

    > As a special case, if the `databaseName` parameter is ":memory:", the database
    is created in memory!


    The `connect()` function returns a `Connection` object that will be used further
    in section 16.4, but for now let us also see how to close a database connection
    using the `close()` method, whose syntax is shown below:


    ```

    connection.close()

    ```


    From the time a database connection is opened till the time it is closed, there
    could be any number of read/write operations on the database. None of the write
    operations would be committed to the database without an explicit call to the
    `commit()` method! It might be a good idea to follow the practice of committing
    before closing the database connection!


    The syntax of the `commit()` method is shown below:


    ```

    connection.commit()

    ```


    Here is a sample run using the above functions:


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("test.db")

    >>> conn

    <sqlite3.Connection object at 0x7f596a4183b0>

    >>> conn.commit()

    >>> conn.close()

    ```


    ## 16.4 Executing Queries


    ### 16.4.1 Working with Cursors


    Now that we know how to create a connection with a database, let us see how we
    can execute queries on that database using the connection. A `Cursor` instance
    acts as an interface to execute queries on a `Connection` and can be created from
    a `Connection` using the `cursor()` method which has the following syntax:


    ```

    connection.cursor()

    ```


    We can create any number of `Cursor` objects from a single connection and using
    each we can execute any number of queries through the connection. While it is
    not necessary to create multiple `Cursor` objects to execute multiple queries,
    do bear in mind that if we are not done extracting the complete result of the
    previous query and execute the next query, we will lose the remaining results
    from the previous query. There are therefore situations wherein we may have to
    create multiple `Cursor` objects.


    Retrieving results from `Cursor` objects will be dealt with later in section 16.5,
    but for now let us see how to execute queries that don''t produce results (DML
    queries).


    ### 16.4.2 Executing a Single Query


    In order to execute a query, we use the `execute()` method of `Cursor` which has
    the following syntax:


    ```

    cursor.execute(query)

    ```


    We will first demonstrate how to create the Employee table discussed in section
    16.1.2.1 using this method:


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="CREATE TABLE Employee( name TEXT, id INTEGER, email TEXT)"

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7f596a1ba490>

    >>> conn.commit()

    >>> conn.close()

    ```


    Now that we have created the table and committed it, it will be available for
    us anytime we want, even in a different Python session!


    Let us launch another Python interpreter session and continue writing a record
    into the table created.


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="""INSERT INTO Employee VALUES("Ram",1,"ram@company.com")"""

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x7f35d86e7490>

    >>> conn.commit()

    >>> conn.close()

    ```


    ### 16.4.3 Using Placeholders


    Many a times, we wish to frame a query template containing placeholders for values
    that will be filled in dynamically with suitable values when the query is to be
    executed. It is possible to frame such a query, using "?" as placeholders, as
    shown in the example below that continues to write 2 more records to the Employee
    database using a single query template:


    ```

    >>> import sqlite3

    >>> conn=sqlite3.connect("employee.db")

    >>> cursor=conn.cursor()

    >>> query="""INSERT INTO Employee VALUES(?,?,?)"""

    >>> cursor.execute(query,("Sham",2,"sham@company.com"))

    <sqlite3.Cursor object at 0x7f35d86e7500>

    >>> cursor.execute(query,("Balram",3,"ballu@company.com"))

    <sqlite3.Cursor object at 0x7f35d86e7490>

    >>> conn.commit()

    >>> conn.close()

    ```


