    >>> root[1][0].attrib

    {''id'': ''main'', ''class'': ''main content''}

    ```


    **иІВеѓЯпЉЪ**


    1.  дЄКдЄАиКВеРСжИСдїђе±Хз§ЇдЇЖ`root[1][0]`зїЩдЇЖжИСдїђдЄАдЄ™и°®з§Ї`div`ж†Зз≠ЊзЪД`Element`еѓєи±°гАВ

