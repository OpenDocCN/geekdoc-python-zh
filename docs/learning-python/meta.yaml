    - xmlrpc (xmlrpclib, DocXMLRPCServer, SimpleXMLRPCServer).


    # 21.2.9 Miscellaneous Changes


    This section shows some miscellaneous changes brought in by Python 3.


    # 21.2.9.1 Operators and Magic Methods


    The `!=` operator now returns the opposite of `==`, unless `==` returns `NotImplemented`.


    The concept of вАЬunbound methodsвАЭ has been removed from the language. When referencing
    a method as a class attribute, you now get a plain function object.


    The `__getslice__()`, `__setslice__()` and `__delslice__()` magic methods have
    been removed. The syntax `a[i:j]` now translates to `a.__getitem__(slice(i, j))`
    (or `__setitem__()` or `__delitem__()`, when used as an assignment or deletion
    target, respectively).


    The standard `next()` method has been renamed to `__next__()`.


    The `__oct__()` and `__hex__()` special methods are removed вАУ `oct()` and `hex()`
    use `__index__()` now to convert the argument to an integer.


    Support for `__members__` and `__methods__` have been removed.


    The function attributes of the form `func_X` have been renamed to the form `__X__`,
    freeing up these names in the function attribute namespace for user-defined attributes.
    This is illustrated in the table below:'
- md: "## 21. Appendix вАУ Python 2 Vs. Python 3\n\n| Python 2 Method | Python 3 Method\
    \ |\n| :--- | :--- |\n| func_closure | __closure__ |\n| func_code | __code__ |\n\
    | func_defaults | __defaults__ |\n| func_dict | __dict__ |\n| func_doc | __doc__\
    \ |\n| func_globals | __globals__ |\n| func_name | __name__ |\n\nThe `__nonzero__()`\
    \ magic method has now been replaced by `__bool__()`.\n\n### 21.2.9.2 The super()\
    \ Call\n\nYou can now invoke `super()` without arguments and (assuming this is\
    \ in a regular instance method defined inside a class statement) the right class\
    \ and instance will automatically be chosen. With arguments, the behaviour of\
    \ `super()` is unchanged.\n\n### 21.2.9.3 The input() Function\n\nThe `raw_input()`\
    \ function was renamed as `input()`. That is, the new `input()` function reads\
    \ a line from `sys.stdin` and returns it with the trailing newline stripped. It\
    \ raises `EOFError` if the input is terminated prematurely. To get the old behaviour\
    \ of `input()`, use `eval(input())`.\n\n### 21.2.9.4 The round() Function\n\n\
    The `round()` function rounding strategy and return type have changed. Exact halfway\
    \ cases are now rounded to the nearest even result instead of away from zero.\
    \ (For example, `round(2.5)` now returns 2 rather than 3). The call `round(x[,\
    \ n])` now delegates to `x.__round__([n])` instead of always returning a float.\
    \ It generally returns an `int` when called with a single argument and a value\
    \ of the same type as `x` when called with two arguments.\n\n### 21.2.9.5 The\
    \ reduce() Function\n\nThe `reduce()` function has been removed from the global\
    \ scope and placed in the `functools` module.\n\n### 21.2.9.6 The reload() Function\n\
    \nThe `reload()` function has been removed from the global scope and placed in\
    \ the `imp` module.\n\n### 21.2.9.7 The dict.has_key() Method\n\nThe `dict.has_key()`\
    \ method has been removed. Use the `in` operator instead.\n\n## 21.3 Porting Code\
    \ From Python 2 to Python 3\n\nIn situations where you want to use Python 3 and\
    \ there is a library in your codebase that is Python 2 compliant only, it is advisable\
    \ to port that particular library to Python 3 first. The solution adopted here\
    \ is to run the library against all the unit tests by using the `-3` command line\
    \ switch in Python 2. If tests fail or emit warnings, modify the code and try\
    \ again.\n\nOnce the code runs without warnings, then try it with Python 3. If\
    \ the tests still fail in Python 3, then the standard `2to3` utility can come\
    \ handy here to convert the version to Python 3. In addition to the `2to3` tool\
    \ that allows code to be generated from Python 2, there's also the `3to2` tool\
    \ which converts Python 3 code back to Python 2 code!\n\n> **NOTE:**\n> More information\
    \ on the `2to3` tool can be found at https://docs.python.org/2/library/2to3.html.\n\
    > More information on the `3to2` tool can be found at https://pypi.python.org/pypi/3to2.\n\
    \n## 21.4 Writing Common Code for Python 2 and Python 3\n\nIf there is a need\
    \ to maintain your code base in Python 2 as well as Python 3, you may come across\
    \ a few items which have different names in different versions. Instead of changing\
    \ your code, you may use the `six` compatibility library. It is a single Python\
    \ file and can be downloaded from http://pypi.python.org/pypi/six/.\n\nThis section\
    \ shows how we can write code that works across Python 2 and Python 3 using the\
    \ `six` compatibility module.\n\n## 21. Appendix вАУ Python 2 Vs. Python 3\n\nThe\
    \ below code snippet illustrates the challenge in using `intern(\"mysting\")`\
    \ in Python 3 directly as it is not readily available (you'll need to import it\
    \ from `sys`). Conversely, if we try to import the same in Python 2, we get an\
    \ `ImportError` exception:\n\n| Python 2 | Python 3 |\n| --- | --- |\n| `>>> intern('mystring')`<br>`'mystring'`<br>`>>>\
    \ from sys import intern`<br>`Traceback (most recent call last):`<br>`  File \"\
    <stdin>\", line 1, in <module>`<br>`ImportError: cannot import name intern` |\
    \ `>>> intern('mystring')`<br>`Traceback (most recent call last):`<br>`  File\
    \ \"<stdin>\", line 1, in <module>`<br>`NameError: name 'intern' is not defined`<br>`>>>\
    \ from sys import intern`<br>`>>> intern('mystring')`<br>`'mystring'` |\n\nTo\
    \ make the above code work with both Python 2 and Python 3, we could use the `six`\
    \ module as follows:\n\n```\n>>> from six.moves import intern\n>>> intern('mystring')\n\
    mystring\n```\n\nAnother demonstration of the `six` module is with respect to\
    \ a few constants that come handy as replacements for certain objects (that got\
    \ deprecated in Python 3):\n\n- `six.class_types`\n- `six.integer_types`\n- `six.string_types`\n\
    - `six.text_type`\n- `six.binary_type`\n\nHere is a demonstration in Python 2:\n\
    \n```\n>>> a=u'Hello World'\n>>> isinstance(a, basestring)\nTrue\n>>> isinstance(a,\
    \ str)\nFalse\n>>> import six\n>>> isinstance(a, six.string_types)\nTrue\n```\n\
    \n**Observation:**\n\n1. In Python 2, a Unicode string is definitely derived from\
    \ `basestring`, but does not qualify as being a `str` object.\n2. A Unicode string\
    \ in Python 2 qualifies as being `six.string_types` nevertheless.\n\nHere is a\
    \ similar piece of code in Python 3:\n\n```\n>>> a=u'Hello World'\n>>> isinstance(a,\
    \ basestring)\nTraceback (most recent call last):\n  File \"<stdin>\", line 1,\
    \ in <module>\nNameError: name 'basestring' is not defined\n>>> isinstance(a,\
    \ str)\nTrue\n>>> import six\n>>> isinstance(a, six.string_types)\nTrue\n```\n\
    \n**Observation:**\n\n1. In Python 3, all strings are Unicode strings and are\
    \ thus instances of the `str` class.\n2. There is no base class called `basestring`\
    \ in Python 3.\n3. However, Unicode strings in Python 3 still qualify as being\
    \ instances of `six.string_types`.\n\n> **NOTE:**\n> More information on the `six`\
    \ module can be found at https://pypi.python.org/pypi/six.\n\n## SUMMARY\n\n-\
    \ Python 2 is the past whereas Python 3 is the present and future!\n- Python 3\
    \ is not backward compatible with Python 2, and this is the main reason why Python\
    \ 2 still lives!\n- Even basic statements like printing and reading in input have\
    \ undergone changes from Python 2 to Python 3.\n- Python 2 code can be converted\
    \ to Python 3 code - either manually or by using the 2to3 tool.\n- To some extent,\
    \ Python code common to Python 2 and Python 3 can be written using the six compatibility\
    \ library."
