- md: '## 18.1 Introduction


    XML (eXtensible Markup Language) is the mother of many languages (including HTML
    covered in section 17) used for representation of data. This chapter shows how
    XML data can be parsed in Python.


    Python 3 comes with a built-in XML parser called `ElementTree` to parse XML documents,
    but BeautifulSoup covered in section 17.3 can also be used if the `lxml` HTML/XML
    parser is installed. This chapter focuses on how to use the `ElementTree` XML
    API.


    ## 18.2 Reading XML Content


    XML content can be read either from a file or from a string. We will examine both
    approaches.


    ### 18.2.1 Reading XML Content From a File


    Reading XML content from a file is recommended if we want higher levels of reusability
    and portability. Recollect the HTML example of section 17.3.4 that was used for
    demonstration. If that HTML content is stored in a file called `test.html` in
    the current directory, then we can load it using the statements below:


    ```

    >>> from xml.etree import ElementTree

    >>> tree=ElementTree.parse("test.html")

    >>> root=tree.getroot()

    >>> root

    <Element ''html'' at 0x7f519ae16e08>

    ```


    **Observation:**


    1. All valid and well-formed HTML documents are also valid XML documents.

    2. We import the `ElementTree` class from the `xml.etree` module.

    3. The `ElementTree.parse` function can parse through XML content from a file,
    given the pathname of the file or a file object. It returns an `ElementTree` object
    that represents the parsed XML document.

    4. Note that a well-formed and valid HTML document is a form of XML document!
    We are merely reusing examples discussed earlier in chapter ***.

    5. We extract the root node of this parse tree using the `getroot()` method of
    `ElementTree`, which returns the root node of the XML parse tree as an Element
    object.

    6. The root node of the XML parse tree is the `html` tag.


    ### 18.2.2 Reading XML Content From a String


    If the required XML content to be parsed is already available as a string, we
    can directly parse it as follows:


    ```

    >>> from xml.etree import ElementTree

    >>> data="""

    ... <!DOCTYPE html>

    ... <!-- Test file -->

    ... <html>

    ...   <head>

    ...     <title>HTML Demonstration</title>

    ...   </head>

    ...   <body>

    ...     <div id="main" class="main content">

    ...       <p>This is <b>Bold</b></p>

    ...       <p>This is <i>Italics</i></p>

    ...       <p>This is <u>Underlined</u></p>

    ...     </div>

    ...   </body>

    ... </html>

    ... """

    >>> root=ElementTree.fromstring(data)

    >>> root

    <Element ''html'' at 0x7f519255ce58>

    ```


    **Observation:**


    1. Instead of using the `parse()` function, we are now using the `fromstring()`
    function and passing the XML string instead.

    2. Once again, remember that HTML content can also be considered to be valid XML
    content if it is well-formed and valid.

    3. Unlike the `parse()` function that returns an `ElementTree` object from which
    we can extract the root node, the `fromstring()` method directly returns the root
    node!

    4. In this example, once again, the root node is the `html` tag.


    ### 18.2.3 Extracting Details from the Parse Tree


    Given any `Element` object, as we had extracted above, we can obtain the following
    information:


    1. The name of the tag

    2. The attributes of the tag

    3. The string content of the tag

    4. The child tags within the tag

    5. The complete recursive string content within the tag


    #### 18.2.3.1 Extracting the Tag Name


    The name of the tag can be extracted simply by using the `tag` attribute as shown
    in the example below:


    ```

    (continuation of previous session)

    >>> root.tag

    ''html''

    ```


    #### 18.2.3.2 Extracting the Child Tags Within a Tag


    Refer to the parse tree shown in section 17.3.4. The `ElementTree` is the document
    element and the root node is the `html` tag. This html tag has 2 children: `head`
    and `body`. The `body` tag has 1 child вАУ the `div` tag. We can use the subscript
    operator and access the child nodes as shown below:


    ```

    (continuation of previous session)

    >>> root

    <Element ''html'' at 0x7f519255ce58>

    >>> root.tag

    ''html''

    >>> root[1]

    <Element ''body'' at 0x7f518d0bd098>

    >>> root[1][0]

    <Element ''div'' at 0x7f518d0bd0e8>

    ```


    **Observation:**


    1. The root node is the `html` tag.

    2. The expression `root[0]` would have given us the `head` tag. We have used `root[1]`
    which gave us the `body` tag.

    3. The expression `root[1][0]` gives us the first child of `root[1]`, where `root[1]`
    represents the `body` tag. This first child of the `body` tag is the `div` tag.


    Another method to access the immediate children of an `Element` is to iterate
    over it as shown below:


    ```

    (continuation of previous session)

    >>> for child in root[1][0]:

    ...     print(child.tag)

    ...

    p

    p

    p

    ```


    **Observation:**


    1. The expression `root[1][0]` gives us an `Element` object that represents the
    `div` tag.

    2. The `div` tag has 3 children and all of them are `p` tags.


    #### 18.2.3.3 Extracting the Tag Attributes


    All the attributes of an `Element` are available as a dictionary in the attribute
    `attrib`. The key in the dictionary is the attribute name and the value is the
    corresponding value of that attribute. Since the `html` tag did not have any attributes,
    we will demonstrate using the `div` tag:


    ```

    (continuation of previous session)

    >>> root[1][0].attrib

    {''id'': ''main'', ''class'': ''main content''}

    ```


    **Observation:**


    1. The previous section showed us that `root[1][0]` gives us an `Element` object
    representing the `div` tag.

    2. The `attrib` attribute is a dictionary containing the attributes of the `div`
    tag and their corresponding values.


    We can also access an individual attribute''s value from an Element object using
    its `get()` method as shown below:


    ```

    (continuation of previous session)

    >>> root[1][0].get("id")

    ''main''

    ```


    **Observation:**


    1. The expression `root[1][0]` gives us an `Element` object representing the `div`
    tag.

    2. The `div` tag has an attribute called `id` whose value is `main`.


    #### 18.2.3.4 Extracting the String Content of a Tag


    To extract the text content within a tag, the `text` attribute can be used as
    shown below:


    ```

    (continuation of previous session)

    >>> root[0]

    <Element ''head'' at 0x7f518edc9f98>

    >>> root[0][0]

    <Element ''title'' at 0x7f518d0bd048>

    >>> root[0][0].text

    ''HTML Demonstration''

    ```


    **Observation:**


    1. The expression `root[0]` gives us an `Element` representing the `head` tag.

    2. The expression `root[0][0]` gives us an `Element` representing the `title`
    tag.

    3. The `text` attribute of this `Element` object gives us the string content within
    that tag.


    Let''s take another example вАУ this time we will extract the text content of the
    `div` tag as shown below:


    ```

    (continuation of previous session)

    >>> root[1][0].text

    ''\n    ''

    ```


    **Observation:**


    1. The expression `root[1][0]` gives us an `Element` object that represents the
    `div` tag.

    2. The text content of the `div` tag is reported as merely newlines and spaces,
    without considering the text content within its children.


    If a tag contains multiple child tags that contain text, we can iterate through
    all the nested text content as demonstrated below:


    ```

    (continuation of previous session)

    >>> for string in root[1][0].itertext():

    ...     print(string.strip())

    ...

    This is

    Bold


    This is

    Italics


    This is

    Underlined

    ```


    **Observation:**


    1. The `itertext()` method allows us to iterate through nested text content.

    2. The `strip()` method has been used to remove the additional whitespaces (especially
    the newline characters) in the beginning and end of each of the text content.

    3. We see that this lists out even the text content present within the `p` tags
    (and their child tags) that are present within the `div` tag.


    #### 18.2.3.5 Extracting the Recursive String Content Within a Tag


    The previous section showed how we can recursively access the string content within
    a tag and its children. While there is no separate method available that can do
    this, we can use a simple `join` call to extract the entire text as a single string
    as shown below:


    ```

    (continuation of previous session)

    >>> "".join(root[1][0].itertext())

    ''\n    This is Bold\n    This is Italics\n    This is Underlined\n    ''

    ```


    **Observation:**


    1. Recall from the previous example that `root[1][0]` represents the `div` tag
    and `itertext()` allows us to iterate through all its nested text nodes.

    2. The `join()` method will combine all those pieces of text together (using the
    null string separator, "").


    ### 18.2.4 Searching in the Parse Tree


    Support for navigation in `ElementTree` is not as rich as in BeautifulSoup. Support
    for searching in the parse tree is also not as powerful as in BeautifulSoup, but
    is done using the `findall()` and `find()` methods, similar to BeautifulSoup.


    #### 18.2.4.1 The findall() Method


    The `findall()` method returns a list of all `Element` objects that match the
    given name and are direct children of the invoking `Element`:


    ```

    (continuation of previous session)

    >>> for element in root[1][0].findall("p"):

    ...     print("".join(element.itertext()))

    ...

    This is Bold

    This is Italics

    This is Underlined

    ```


    **Observation:**


    1. We are iterating over all `p` tags that are the direct children of the `div`
    tag.

    2. We are combining all text within the `p` tags and printing them using the technique
    covered in section 18.2.3.5.'
