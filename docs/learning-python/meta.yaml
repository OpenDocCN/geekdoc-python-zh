  md: '# 12.5 Constructors and Destructors


    In OOP, a **constructor** is a member function of a class that is automatically
    invoked when an instance of that class is created in order to initialize the object
    to a valid state. A **destructor** is a member function of a class that is automatically
    invoked when an instance is destroyed in order to perform any clean-up required.


    Python does not have exact implementations for these, but does provide something
    very similar. This section focuses on Python''s version of constructors and destructors.


    # 12.5.1 Constructors


    A constructor in Python is an instance method that is automatically invoked when
    an instance is created and permits the programmer to perform any initialization
    required to ensure that the instance is in a valid state.


    A constructor is identified in Python by it''s special name: `__init__`. Note
    that the leading underscores do not make this instance method private as the method
    name does not end with at most 1 underscore вАУ it in fact ends with 2 underscores!


    The following code snippet demonstrates how constructors can be designed and how
    they are automatically invoked when objects are instantiated:


    ```

    >>> class A:

    ...     def __init__(self):

    ...             print("Constructor called!")

    ...

    >>> a=A()

    Constructor called!

    >>> b=A()

    Constructor called!

    ```


    **Observation:**


    +   1. The constructor is always called `__init__()` and being an instance method
    it will always receive `self` as the first parameter.

    2. The constructor can be designed to receive any number of parameters in addition
    to `self`, but since Python does not support function overloading, only 1 constructor
    can exist in a class.

    3. It is a good programming practice to use the constructor to create all instance
    variables that an object requires вАУ all initialized to meaningful values.

    4. In classes without explicitly defined constructors, one can imagine Python
    adding a dummy constructor that does nothing, i.e. an empty constructor.'
