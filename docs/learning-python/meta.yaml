    # 14.5.2 Seeking to a Particular Position Within a File


    In order to seek to a specific position within a file (using the concepts of the
    previous section), the `seek()` method can be used, which has the following syntax:


    ```

    fileObject.seek(offset [,whence])

    ```


    Note:


    +   1. The `offset` parameter specifies an offset relative to a standard position
    that is selected in the second parameter, `whence`.

    2. The `whence` parameter is the standard position selection relative to which
    the offset is applied. The values for this parameter has to be one of `os.SEEK_SET`
    (0), `os.SEEK_CUR`(1) or `os.SEEK_END`(2). If this parameter is not provided,
    the default standard position assumed in `os.SEEK_SET`.

    3. For text files, the offset must be 0 or a value that was previous returned
    by the `tell()` method (covered in section 14.5.3). For binary files, the offset
    can be any arbitrary number.


    # 14.5.3 Finding the Current Location Within a File


    Just as how the `seek()` method allows us to change the position within an opened
    file, the `tell()` method tells us the current location in an opened file and
    has the following syntax:'
