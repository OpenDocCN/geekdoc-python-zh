  md: '# SUMMARY


    +   > All members within a class are assumed to be public by default. Those identifiers
    that start with a single underscore are assumed to be protected and those that
    start with 2 underscores and do not end with 2 or more underscores are assumed
    to be private. Python currently does not have implementation support for protected
    members.

    > Constructors are identified by the special name `__init__()` while destructors
    are identified by the special name `__del__()`.

    > Python supports multiple inheritance too!

    > All functions undergo late binding. Therefore, no special step is required to
    achieve dynamic polymorphism.

    > The method `super()` can be used to reference the immediate/first base class
    instance.

    > Constructors and Destructors of the base class are not automatically invoked
    during inheritance - it is the responsibility of the programmer.

    > Magic functions are automatically invoked in certain situations and help implement
    a variety of functionality, including operator overloading. Such functions always
    start and end with 2 underscores!


