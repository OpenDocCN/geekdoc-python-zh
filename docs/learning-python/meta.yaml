    \ |\n| `type` | е≠ЧжЃµз±їеЮЛ | 8.7.1 |\n\nиЃ©жИСдїђдїОиЃ∞ељХе≠ЧжЃµз±їеЮЛзЪДж†ЉеЉПз±їеЮЛеЉАеІЛгАВ\n\n### 8.7.1 ж†ЉеЉПз±їеЮЛ\n\nж†ЉеЉПз±їеЮЛжМЗеЃЪе≠ЧжЃµеЖЕеЃєењЕй°їе¶ВдљХи°®з§ЇгАВеПѓиГљжАІеПЦеЖ≥дЇОе≠ЧжЃµеЖЕеЃєжШѓе≠Чзђ¶дЄ≤гАБжХіжХ∞ињШжШѓеЃЮжХ∞гАВ\n\
    \n```\n[[fill]align][sign][#][0][width][grouping][.precision][type]\n```\n\n####\
    \ 8.7.1.1 жХіжХ∞зЪДж†ЉеЉПз±їеЮЛ\n\nжХіжХ∞еПѓдї•дї•е§ЪзІНеЯЇжХ∞жШЊз§ЇпЉМе¶ВдЄЛи°®жЙАз§ЇпЉЪ\n\n| з±їеЮЛ | еРЂдєЙ |\n|---|---|\n| b | дЇМињЫеИґж†ЉеЉП\
