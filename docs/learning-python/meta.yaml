    \ | --- | --- |\n| as | except | is | True |\n| assert | False | lambda | try\
    \ |\n| break | finally | None | while |\n| class | for | nonlocal | with |\n|\
    \ continue | from | not | yield |\n| def | global | or | |\n| del | if | pass\
    \ | |\n| elif | import | raise | |\n\n## 2.6 еПШйЗП\n\nеЬ®зїІзї≠иЊУеЕ•еТМиЊУеЗЇдєЛеЙНпЉМиЃ©жИСдїђиЃ®иЃЇдЄАдЄЛеЕ≥дЇОеПШйЗПгАБеЃГдїђзЪДжХ∞жНЃз±їеЮЛгАБеЃГдїђзЪДеАЉдї•еПКеѓєеЃГдїђзЪДжУНдљЬзЪДеЗ†дЄ™и¶БзВєгАВжИСдїђеЈ≤зїПзЬЛеИ∞дЇЖ\
    \ Python дЄ≠еПѓзФ®зЪДжХ∞жНЃз±їеЮЛгАВељУжИСдїђжЛ•жЬЙиѓ•з±їеЮЛзЪДзЙєеЃЪеАЉеєґдЄФжМБжЬЙиѓ•еАЉзЪДеЃЮдљУжШѓеПШйЗПжЧґпЉМињЩдЇЫжХ∞жНЃз±їеЮЛе∞±дЉЪжіЊдЄКзФ®еЬЇгАВдї•дЄЛжШѓеЕ≥дЇО Python дЄ≠еПШйЗПзЪДдЄАдЇЫйЗНи¶БзВєпЉЪ\n\
    \n### 1. еПШйЗПеПѓдї•еЬ®йЬАи¶БжЧґеТМйЬАи¶БзЪДеЬ∞жЦєеИЫеїЇ\n\nдЄОдЄАдЇЫйЩРеИґжАІжЫіеЉЇзЪДиѓ≠и®АдЄНеРМпЉМжИСдїђеПѓдї•еЬ®йЬАи¶БжЧґйЪПжЧґеЉАеІЛдљњзФ®еПШйЗПпЉМиАМдЄНењЕеЬ®еЭЧзЪДеЉАе§іе£∞жШОеЃГгАВињЩзїЩдЇЖжИСдїђзБµжіїжАІпЉМеєґиЃ©жИСдїђиГље§ЯдЄУж≥®дЇОиІ£еЖ≥жЙЛе§ізЪДйЧЃйҐШгАВеПШйЗПеЬ®еАЉиҐЂиµЛзїЩеЃГзЪДйВ£дЄАеИїе∞±дЇІзФЯдЇЖгАВж≤°жЬЙжМЗеЃЪеЕґжХ∞жНЃз±їеЮЛзЪДж¶ВењµгАВ\n\
