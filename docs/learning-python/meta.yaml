    # 17.3.6 Searching in the Parse Tree


    While the previous section showed how to traverse through the parse tree, it is
    often handy to be able to directly access a particular node within the parse tree.
    We did see a mechanism to do this in section 17.3.4.4, but that only fetched the
    first such tag in the parse tree. In this section, we will see how to extract
    nodes of interest to us directly.


    In order to directly obtain all the tags that meet our criteria, we can use the
    `find_all()` method which has the following syntax:


    ```

    python

    BeautifulSoup.find_all(name, attrs, recursive, string, limit, **kwargs)

    ```


    > **NOTE:**

    All the arguments shown above are optional! We frequently use keyword arguments
    to specify required arguments.

    Instead of invoking this method on the BeautifulSoup object and searching through
    the entire parse tree, it is also possible to invoke this method on any `Tag`
    object and search through that sub-tree.'
