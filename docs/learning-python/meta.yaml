    \n`bool`з±їеЮЛеЕБиЃЄжИСдїђи°®з§ЇеЄГе∞ФеАЉгАВ\n\n### 2.3.5.1 `bool`з±їеЮЛзЪДе≠ЧйЭҐйЗП\n\nдЄ§дЄ™еПѓиГљзЪДеЄГе∞ФеАЉжШѓ`True`еТМ`False`пЉМеЃГдїђжШѓPythonдЄ≠зЪДеЕ≥йФЃе≠ЧпЉМеРМжЧґдєЯжШѓ`bool`з±їзЪДеѓєи±°гАВ\n\
    \n`bool`з±їеЮЛзЪДеѓєи±°дєЯеПѓдї•дљњзФ®`bool`з±їзЪДжШЊеЉПжЮДйА†еЗљжХ∞жЭ•еИЫеїЇгАВињЩељУзДґдєЯз±їдЉЉдЇОзФ®дЇОз±їеЮЛиљђжНҐзЪДеЗљжХ∞и∞ГзФ®гАВеЫ†ж≠§пЉМдї•дЄЛдЄ§жЭ°иѓ≠еП•еЬ®еКЯиГљдЄКжШѓзЫЄеРМзЪДпЉЪ\n\n\
    **з§ЇдЊЛпЉЪ**\n\n```\nx = True\nx = bool(True)\n```\n\nињЩдЄ™еЖЕзљЃеЗљжХ∞дєЯжЬЙеК©дЇОе∞ЖеЕґдїЦз±їеЮЛпЉИе¶В`int`еТМ`string`пЉЙиљђжНҐдЄЇ`bool`з±їеЮЛгАВж≠§е§ЦпЉМ`bool`з±їзЪДйїШиЃ§жЮДйА†еЗљжХ∞е∞ЖеИЫеїЇдЄАдЄ™еАЉдЄЇ`False`зЪД`bool`еѓєи±°гАВ\n\
    \n```\n>>> bool(0)\nFalse\n>>> bool(10)\nTrue\n>>> bool(0.0)\nFalse\n>>> bool(-12.5)\n\
    True\n>>> bool(\"hello\")\nTrue\n>>> bool(\"\")\nFalse\n>>> bool()\nFalse\n```\n\
    \n> **ж≥®жДПпЉЪ**\nзђђ20.1.1.4иКВиѓ¶зїЖиЃ®иЃЇдЇЖиљђжНҐдЄЇ`bool`з±їеЮЛзЪДеЖЕеЃєпЉМеПѓдї•жЫіжЄЕж•ЪеЬ∞иІ£йЗКдЄЇдїАдєИжИСдїђдЉЪеЊЧеИ∞дЄКињ∞иЊУеЗЇгАВ\n\n### 2.3.5.2\
    \ з±їеЮЛboolзЪДжУНдљЬ\n\nеЄГе∞Фз±їеЮЛдЄКжЬАеЄЄиІБеТМеЃЮзФ®зЪДжУНдљЬжШѓ`and`гАБ`or`еТМ`not`еЄГе∞ФињРзЃЧгАВ\n\n`and`ињРзЃЧзђ¶жЙІи°МйАїиЊСдЄОињРзЃЧгАВеЃГжШѓдЄАдЄ™зЯ≠иЈѓињРзЃЧзђ¶пЉМжДПеС≥зЭАе¶ВжЮЬдїЕеѓєзђђдЄАдЄ™жУНдљЬжХ∞ж±ВеАЉеРОе∞±иГљеЊЧеИ∞зїУжЮЬпЉМеЃГе∞±дЄНдЉЪиієењГеОїж±ВеАЉзђђдЇМдЄ™жУНдљЬжХ∞гАВ\n\
    \n**з§ЇдЊЛпЉЪ**\n\n```\n>>> True and False\nFalse\n>>> False and True\nFalse\n>>> True\
    \ and True\nTrue\n```\n\n`and`ињРзЃЧзђ¶дєЯеПѓдї•зФ®дЇОеЕґдїЦз±їеЮЛпЉБдЄЇдЇЖж¶ВжЛђеЕґеЈ•дљЬеОЯзРЖпЉМиѓЈиАГиЩСз§ЇдЊЛ`x and y`гАВ\n\n- е¶ВжЮЬ`x`ж±ВеАЉдЄЇ`False`пЉМзїУжЮЬе∞±жШѓ`x`\n\
