    \n# 13 еЉВеЄЄе§ДзРЖ\n\nеЬ®жЬђзЂ†дЄ≠пЉМдљ†е∞ЖиГље§ЯпЉЪ\n\n-   [x] йҐЖдЉЪPythonдљњзФ®зЪДйЭҐеРСеѓєи±°еЉВеЄЄе§ДзРЖжЬЇеИґ\n-   [x] зРЖиІ£еЉВеЄЄе§ДзРЖеЭЧеєґе§ДзРЖеПСзФЯзЪДеЉВеЄЄгАВ\n\
