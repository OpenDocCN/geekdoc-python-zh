    # 4.7 Adding and Deleting Elements


    We have already seen how we can add and delete elements from a list using assignment
    to list slices. There are better, more readable alternatives to do that, which
    will be explored now.


    # 4.7.1 Appending Elements


    To add one or more elements to the end of a list, the following functions can
    be used:


    ```

    list.append(x)

    ```


    The `list.append(x)` function appends the element `x` to the list `list`:


    ```

    >>> L=[5,2,3]

    >>> L.append(9)

    >>> L

    [5, 2, 3, 9]

    ```


    > NOTE:

    `list.append(x)` is similar to `list[len(list):]=[x]`


    ```

    list.extend(L)

    ```


    The `list.extend(L)` function appends all the elements of the list `L` to the
    list `list`:


    ```

    >>> L1=[5,2,3]

    >>> L2=[7,8,9]

    >>> L1.extend(L2)

    >>> L1

    [5, 2, 3, 7, 8, 9]

    ```


    > NOTE:

    `list.extend(L)` is similar to `list[len(list):]=L`'
