  - "[PAGE 441]\n\n# 13.2.2.1 Separate Handling of Each Exception\n\nAn extended syntax\
    \ of the `try-except` block is shown below:\n\n```\ntry:\n    ... # try block\n\
    except ExceptionName1:\n    ... # Exception handler for ExceptionName1\nexcept\
    \ ExceptionName2:\n    ... # Exception handler for ExceptionName2\nexcept ExceptionName3:\n\
    \    ... # Exception handler for ExceptionName3\n...\n```\n\nFrom this syntax,\
    \ it is evident that a single `try` block can be followed by any number of `except`\
    \ blocks, and each `except` block can handle a specific type of exception.\n\n\
    +   - If no exception occurs, only the `try` block is executed and the control\
    \ comes out of the entire construct.\n- If an exception is raised by any statement\
    \ in the `try` block, the control immediately comes out of the `try` block and\
    \ starts checking the `except` blocks sequentially. The first `except` block that\
    \ can handle the exception that was raised will then be executed, after which\
    \ control comes out of the entire construct, ignoring all other `except` blocks.\n\
    - If none of the `except` blocks can handle the exception that was raised, then\
    \ the exception propagates to the next higher level, which we will examine in\
    \ detail in section 13.4.\n\nLet us revisit `ExceptionHandlingDemo1.py`: if the\
    \ user does not give us a valid integer as input, then an attempt to convert such\
    \ a string to an integer using the `int()` function results in `ValueError` being\
    \ raised. Let us now handle both `ValueError` and `ZeroDivisionError`."
