    \n## 12.6 зїІжЙњ\n\nзїІжЙњжШѓйЭҐеРСеѓєи±°зЉЦз®ЛдЄ≠жЬАйЗНи¶БзЪДж¶ВењµдєЛдЄАпЉМеЕЈжЬЙдї•дЄЛдЉШзВєпЉЪ\n\n- 1. еЃГжЬЙеК©дЇО**ж®°еЭЧеМЦ**дї£з†БпЉМдїОиАМеЄЃеК©з®ЛеЇПеСШжЫіе•љеЬ∞зїДзїЗдї£з†БгАВ\n\
    - 2. еЃГеЕБиЃЄ**дї£з†БйЗНзФ®**пЉМеЕБиЃЄдЄАдЄ™жЦ∞з±їеЃМеЕ®иОЈеПЦеЕґдїЦзО∞жЬЙз±їзЪДеКЯиГљеєґжЈїеК†жЫіе§ЪиЗ™еЈ±зЪДеКЯиГљгАВ\n- 3. еЃГеЕБиЃЄ**дї£з†БжЙ©е±Х**пЉМеЬ®дЄНдњЃжФєзО∞жЬЙдї£з†БеТМз±їзЪДжГЕеЖµдЄЛжЈїеК†жЦ∞дї£з†БгАВ\n\
    \nиЩљзДґзђђ12.1.7иКВеЈ≤зїПдїЛзїНдЇЖзїІжЙњзЪДдЄНеРМзїУжЮДељҐеЉПпЉМдљЖжИСдїђе∞ЖдЄїи¶БиАГеѓЯдљњжЙАжЬЙеЕґдїЦељҐеЉПжИРдЄЇеПѓиГљзЪДдЄ§зІНељҐеЉПпЉЪ\n\n- 1. **зЃАеНХзїІжЙњ**пЉМеЕґдЄ≠дЄАдЄ™з±їдїОеП¶дЄАдЄ™з±їзїІжЙњ\n\
    - 2. **е§ЪйЗНзїІжЙњ**пЉМеЕґдЄ≠дЄАдЄ™з±їдїОе§ЪдЄ™з±їзїІжЙњ\n\nеЕ≥дЇОзїІжЙњйЬАи¶БиЃ∞дљПзЪДдЄАзВєжШѓпЉМжіЊзФЯз±їеМЕеРЂеЯЇз±їзЪД*жЙАжЬЙ*зЙєжАІгАВжИСдїђеПѓдї•жГ≥и±°жіЊзФЯз±їзЪДжѓПдЄ™еЃЮдЊЛдєЯеМЕеРЂдЄАдЄ™еЯЇз±їзЪДеЃЮдЊЛгАВеЯЇз±їзЪД*зІБжЬЙ*зЙєжАІдєЯе≠ШеЬ®дЇОжіЊзФЯз±їдЄ≠пЉМдљЖдЄНиГљзЫіжО•иЃњйЧЃгАВ\n\
