- md: "# 73 Python Object Oriented Programming Exercises Volume 2\n\nEdcorner Learning\n\
    \n# Table of Contents\n\n- [Introduction](Introduction)\n- [Module 1 Class Method\
    \ - Decorator](Module 1 Class Method - Decorator)\n- [Module 2 Static Method -\
    \ Decorator](Module 2 Static Method - Decorator)\n- [Module 3 Special Methods](Module\
    \ 3 Special Methods)\n- [Module 4 Inheritance](Module 4 Inheritance)\n- [Module\
    \ 5 Abstract Classes](Module 5 Abstract Classes)\n- [Module 6 Miscellaneous Exercises](Module\
    \ 6 Miscellaneous Exercises)\n\n# Introduction\n\nPython is a general-purpose\
    \ interpreted, interactive, object-oriented, and a powerful programming language\
    \ with dynamic semantics. It is an easy language to learn and become expert. Python\
    \ is one among those rare languages that would claim to be both easy and powerful.\
    \ Python's elegant syntax and dynamic typing alongside its interpreted nature\
    \ makes it an ideal language for scripting and robust application development\
    \ in many areas on giant platforms.\n\nPython helps with the modules and packages,\
    \ which inspires program modularity and code reuse. The Python interpreter and\
    \ thus the extensive standard library are all available in source or binary form\
    \ for free of charge for all critical platforms and can be freely distributed.\
    \ Learning Python doesn't require any pre-requisites. However, one should have\
    \ the elemental understanding of programming languages.\n\n**This Book consist\
    \ of 73 python Object Oriented Programming coding exercises to practice different\
    \ topics.**\n\nIn each exercise we have given the exercise coding statement you\
    \ need to complete and verify your answers. We also attached our own input output\
    \ screen of each exercise and their solutions.\n\nLearners can use their own python\
    \ compiler in their system or can use any online compilers available.\n\nWe have\
    \ covered all level of exercises in this book to give all the learners a good\
    \ and efficient Learning method to do hands on python different scenarios.\n\n\
    # Module 1 Class Method - Decorator\n\n1. Using the classmethod class (do it in\
    \ the standard way) implement a class named Person that has a class method named\
    \ show_details() which displays the following text to the console:\n'Running from\
    \ Person class.'\nTry to pass the class name using the appropriate attribute of\
    \ the Person class.\nIn response, call the show_details() class method.\n**Expected\
    \ result:**\n**Running from Person class.**\n\n```python\n#Edcorner Learning Python\
    \ OOPS Exercises\n\nclass Person:\n    def show_details(cls):\n        print(f'Running\
    \ from {cls.__name__} class.')\n    show_details = classmethod(show_details)\n\
    \nPerson.show_details()\n```\n\n2. Using the classmethod class (do it in the standard\
    \ way) implement a class named Person that has a class method named show_details()\
    \ which displays the following text to the console:\n'Running from Container class.'\n\
    Try to pass the class name using the appropriate attribute of the Person class.\n\
    In response, call the show_details() class method.\n\n**Expected result:**\n\n\
    **'Running from Container class.'**\n\n```python\n#Edcorner Learning Python OOPS\
    \ Exercises\n\nclass Container:\n    @classmethod\n    def show_details(cls):\n\
    \        print(f'Running from {cls.__name__} class.')\n\nContainer.show_details()\n\
    ```\n\n3. The Container class is given. Create an instance of this class named\
    \ container and call the show_details() method from this instance.\n\n**Expected\
    \ result:**\n\n**Running from Container class.**\n\n```python\nclass Container:\n\
    \    @classmethod\n    def show_details(cls):\n        print(f'Running from {cls.__name__}\
    \ class.')\n\ncontainer = Container()\ncontainer.show_details()\n```\n\n4. Implement\
    \ a class named Person which has a class attribute named instances as an empty\
    \ list. Then, each time you create an instance of the Person class, add it to\
    \ the Person.instances list (use the init() method for this).\nAlso implement\
    \ a class method called count_instances() that returns the number of Person objects\
    \ created (the number of items in the Person.instances list).\nCreate three instances\
    \ of the Person class. Then call the count_instances() class method and print\
    \ result to the console.\n\n**Expected result:**\n3\n\n```python\n#Edcorner Learning\
    \ Python OOPS Exercises\n\nclass Person:\n    instances = []\n\n    def __init__(self):\n\
    \        Person.instances.append(self)\n\n    @classmethod\n    def count_instances(cls):\n\
    \        return len(Person.instances)\n\np1 = Person()\np2 = Person()\np3 = Person()\n\
    print(Person.count_instances())\n```\n\n```\n3\n```\n\n5. A class named Person\
    \ is given. Modify the _init() method so that you can set two instance attributes:\
    \ firstname and lastname (bare attributes, without any validation).\nCreate two\
    \ instances of the Person class. Then call the count_instances() class method\
    \ and print result to the console.\n\n**Expected result:**\n2\n\n```python\n#Edcorner\
    \ Learning Python OOPS Exercises\n\nclass Person:\n    instances = []\n\n    def\
    \ __init__(self, first_name, last_name):\n        self.first_name = first_name\n\
    \        self.last_name = last_name\n        Person.instances.append(self)\n\n\
    \    @classmethod\n    def count_instances(cls):\n        return len(Person.instances)\n\
    \nperson1 = Person('John', 'Doe')\nperson2 = Person('Mike', 'Smith')\nprint(person1.count_instances())\n\
    ```\n\n```\n2\n```\n\n# Module 2 Static Method - Decorator\n\n6. Define a Container\
    \ class that has a static method (use the staticmethod class - do it in the standard\
    \ way) named get_current_time() returning the current time in the format '%H:%M:%S',\
    \ e.g. '09:45:10'.\nTip: Use the built-in time module.\n\n**Solution:**\n\n```python\n\
    import time\n\nclass Container:\n\n    def get_current_time():\n        return\
    \ time.strftime('%H:%M:%S', time.localtime())\n\n    get_current_time = staticmethod(get_current_time)\n\
    ```\n\n7. Define a Container class that has a static method (use the @staticmethod\
    \ decorator) named get_current_time() returning the current time in the format\
    \ '%H:%M:%S', e.g. '09:45:10'.\nTip: Use the built-in time module.\n\n**Solution:**\n\
    \n```python\nimport time\n\nclass Container:\n\n    @staticmethod\n    def get_current_time():\n\
    \        return time.strftime('%H:%M:%S', time.localtime())\n```\n\n8. Complete\
    \ the implementation of the Book class. In the `__init__()` method, set the bare\
    \ attributes of the instance with names:\n\n- title\n- author\n- book_id\n\nSet\
    \ the instance book_id attribute using the uuid module. Exactly the uuid.uuid4()\
    \ function from this module. An example of using this function:\n\n```python\n\
    import uuid\n\nstr(uuid.uuid4().fields[-1])[:6]\n```\n\nReturns a 6-element string.\
    \ This will be the value of the book_id attribute.\n\nUsing the above code, create\
    \ a static method of the Book class (use the @staticmethod decorator) called get_id()\
    \ which will generate a 6-digit str object (the value of the book_id field).\n\
    \nThen create an instance of the class named book1 with the following arguments:\n\
    \n- title='Python Object Oriented Programming Exercises Volume 2'\n- author='Edcorner\
    \ Learning'\n\nIn response, print all the __dict__ attribute keys of book1 to\
    \ the console.\n\n**Expected result:**\n**dict_keys(['book_id', 'title', 'author'])**\n\
    \n```python\nimport uuid\n\nclass Book:\n\n    def __init__(self, title, author):\n\
    \        self.book_id = self.get_id()\n        self.title = title\n        self.author\
    \ = author\n\n    @staticmethod\n    def get_id():\n        return str(uuid.uuid4().fields[-1])[:6]\n\
    \nbook1 = Book('Python Object Oriented Programming Exercises Volume 2', 'Edcorner\
    \ Learning')\nprint(book1.__dict__.keys())\n```"
  mdcn: "# 73个Python面向对象编程练习题 第二卷\n\nEdcorner Learning\n\n# 目录\n\n- [简介](Introduction)\n\
    - [模块1 类方法 - 装饰器](Module 1 Class Method - Decorator)\n- [模块2 静态方法 - 装饰器](Module\
    \ 2 Static Method - Decorator)\n- [模块3 特殊方法](Module 3 Special Methods)\n- [模块4\
    \ 继承](Module 4 Inheritance)\n- [模块5 抽象类](Module 5 Abstract Classes)\n- [模块6 综合练习](Module\
    \ 6 Miscellaneous Exercises)\n\n# 简介\n\nPython是一种通用的、解释型、交互式、面向对象且功能强大的编程语言，具有动态语义。它是一门易于学习和精通的语言。Python是少数既能声称简单又功能强大的语言之一。Python优雅的语法、动态类型以及其解释型特性，使其成为在大型平台上进行脚本编写和健壮应用开发的理想语言。\n\
    \nPython通过模块和包来辅助开发，这促进了程序的模块化和代码重用。Python解释器以及广泛的标准库均以源代码或二进制形式免费提供给所有关键平台，并可自由分发。学习Python不需要任何先决条件。然而，应该对编程语言有基本的理解。\n\
    \n**本书包含73个Python面向对象编程编码练习，用于实践不同的主题。**\n\n在每个练习中，我们给出了需要完成的练习编码语句，并验证你的答案。我们还附上了每个练习的输入输出屏幕截图及其解决方案。\n\
    \n学习者可以使用自己系统上的Python编译器，也可以使用任何可用的在线编译器。\n\n我们在本书中涵盖了所有级别的练习，为所有学习者提供良好且高效的学习方法，以实践Python的不同场景。\n\
    \n# 模块1 类方法 - 装饰器\n\n1. 使用`classmethod`类（以标准方式实现）创建一个名为`Person`的类，该类有一个名为`show_details()`的类方法，该方法向控制台显示以下文本：\n\
    'Running from Person class.'\n尝试使用`Person`类的适当属性传递类名。\n然后，调用`show_details()`类方法。\n\
    **预期结果：**\n**Running from Person class.**\n\n```python\n#Edcorner Learning Python\
    \ OOPS Exercises\n\nclass Person:\n    def show_details(cls):\n        print(f'Running\
    \ from {cls.__name__} class.')\n    show_details = classmethod(show_details)\n\
    \nPerson.show_details()\n```\n\n2. 使用`classmethod`类（以标准方式实现）创建一个名为`Person`的类，该类有一个名为`show_details()`的类方法，该方法向控制台显示以下文本：\n\
    'Running from Container class.'\n尝试使用`Person`类的适当属性传递类名。\n然后，调用`show_details()`类方法。\n\
    \n**预期结果：**\n\n**'Running from Container class.'**\n\n```python\n#Edcorner Learning\
    \ Python OOPS Exercises\n\nclass Container:\n    @classmethod\n    def show_details(cls):\n\
    \        print(f'Running from {cls.__name__} class.')\n\nContainer.show_details()\n\
    ```\n\n3. 给定`Container`类。创建一个名为`container`的该类实例，并从该实例调用`show_details()`方法。\n\n\
    **预期结果：**\n\n**Running from Container class.**\n\n```python\nclass Container:\n\
    \    @classmethod\n    def show_details(cls):\n        print(f'Running from {cls.__name__}\
    \ class.')\n\ncontainer = Container()\ncontainer.show_details()\n```\n\n4. 实现一个名为`Person`的类，该类有一个名为`instances`的类属性，初始为空列表。然后，每次创建`Person`类的实例时，将其添加到`Person.instances`列表中（为此使用`__init__()`方法）。\n\
    同时实现一个名为`count_instances()`的类方法，该方法返回已创建的`Person`对象数量（`Person.instances`列表中的项目数）。\n\
    创建三个`Person`类的实例。然后调用`count_instances()`类方法，并将结果打印到控制台。\n\n**预期结果：**\n3\n\n```python\n\
    #Edcorner Learning Python OOPS Exercises\n\nclass Person:\n    instances = []\n\
    \n    def __init__(self):\n        Person.instances.append(self)\n\n    @classmethod\n\
    \    def count_instances(cls):\n        return len(Person.instances)\n\np1 = Person()\n\
    p2 = Person()\np3 = Person()\nprint(Person.count_instances())\n```\n\n```\n3\n\
    ```\n\n5. 给定一个名为`Person`的类。修改`__init__()`方法，以便可以设置两个实例属性：`firstname`和`lastname`（裸属性，无需任何验证）。\n\
    创建两个`Person`类的实例。然后调用`count_instances()`类方法，并将结果打印到控制台。\n\n**预期结果：**\n2\n\n```python\n\
    #Edcorner Learning Python OOPS Exercises\n\nclass Person:\n    instances = []\n\
    \n    def __init__(self, first_name, last_name):\n        self.first_name = first_name\n\
    \        self.last_name = last_name\n        Person.instances.append(self)\n\n\
    \    @classmethod\n    def count_instances(cls):\n        return len(Person.instances)\n\
    \nperson1 = Person('John', 'Doe')\nperson2 = Person('Mike', 'Smith')\nprint(person1.count_instances())\n\
    ```\n\n```\n2\n```\n\n# 模块2 静态方法 - 装饰器\n\n6. 定义一个`Container`类，该类有一个静态方法（使用`staticmethod`类\
    \ - 以标准方式实现）名为`get_current_time()`，返回格式为`'%H:%M:%S'`的当前时间，例如`'09:45:10'`。\n提示：使用内置的`time`模块。\n\
    \n**解决方案：**\n\n```python\nimport time\n\nclass Container:\n\n    def get_current_time():\n\
    \        return time.strftime('%H:%M:%S', time.localtime())\n\n    get_current_time\
    \ = staticmethod(get_current_time)\n```\n\n7. 定义一个`Container`类，该类有一个静态方法（使用`@staticmethod`装饰器）名为`get_current_time()`，返回格式为`'%H:%M:%S'`的当前时间，例如`'09:45:10'`。\n\
    提示：使用内置的`time`模块。\n\n**解决方案：**\n\n```python\nimport time\n\nclass Container:\n\
    \n    @staticmethod\n    def get_current_time():\n        return time.strftime('%H:%M:%S',\
    \ time.localtime())\n```\n\n8. 完成`Book`类的实现。在`__init__()`方法中，设置实例的裸属性，名称为：\n\n\
    - title\n- author\n- book_id\n\n使用`uuid`模块设置实例的`book_id`属性。具体使用该模块中的`uuid.uuid4()`函数。使用此函数的示例：\n\
    \n```python\nimport uuid\n\nstr(uuid.uuid4().fields[-1])[:6]\n```\n\n返回一个6位字符串。这将是`book_id`属性的值。\n\
    \n使用上述代码，创建`Book`类的一个静态方法（使用`@staticmethod`装饰器）名为`get_id()`，该方法将生成一个6位的`str`对象（`book_id`字段的值）。\n\
    \n然后创建一个名为`book1`的类实例，参数如下：\n\n- title='Python Object Oriented Programming Exercises\
    \ Volume 2'\n- author='Edcorner Learning'\n\n然后，将`book1`的所有`__dict__`属性键打印到控制台。\n\
    \n**预期结果：**\n**dict_keys(['book_id', 'title', 'author'])**\n\n```python\nimport\
    \ uuid\n\nclass Book:\n\n    def __init__(self, title, author):\n        self.book_id\
    \ = self.get_id()\n        self.title = title\n        self.author = author\n\n\
    \    @staticmethod\n    def get_id():\n        return str(uuid.uuid4().fields[-1])[:6]\n\
    \nbook1 = Book('Python Object Oriented Programming Exercises Volume 2', 'Edcorner\
    \ Learning')\nprint(book1.__dict__.keys())\n```"
