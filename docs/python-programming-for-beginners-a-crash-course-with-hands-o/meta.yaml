  mdcn: "## 第10章\n\n## 文件操作\n\n### 10.1：打开和读取文本文件\n\n如何打开文本文件：\n你必须使用内置的 `open` 函数来打开文件。Python\
    \ 的文件 `open` 函数提供了一个文件对象，该对象包含可用于在 Python 中执行不同文件操作的方法和属性。Python 中的 `open` 文件方法具有以下语法：\n\
    \n语法：\n`file_object = open(\"filename\", \"mode\")`\n\n其中，“filename” 指定了文件对象所打开文件的名称，而\
    \ “mode” 是文件对象的一个属性，它告诉你文件是以哪种模式打开的。\n\n如何读取文件：\n在 Python 中，你可以通过以“读取模式”（r）调用文件来读取它。\n\
    \n步骤 1：\n以读取模式打开文件：\n`f = open(\"myfile.txt\", \"r\")`\n\n步骤 2：\n代码中使用 `mode`\
    \ 函数来验证文件是否处于打开模式。如果是，你可以继续下一步：\n`if f.mode == 'r':`\n\n步骤 3：\n要在 Python 中访问文件，请使用\
    \ `f.read` 从文件中读取数据并将其放入名为 `content` 的变量中。\n`contents = f.read()`\n\n步骤 4：\n对于\
    \ Python 读取的文本文件，打印其内容。\n\n示例：\n```python\ndef main():\n    f = open(\"myfile.txt\"\
    , \"r\")\n    if f.mode == \"r\":\n        contents = f.read()\n        print(contents)\n\
    \nif __name__ == \"__main__\":\n    main()\n```\n\n输出：\n```\nThis is a Python\
    \ text file 1\n\nThis is a Python text file 2\n\nThis is a Python text file 3\n\
    ```\n\n如何逐行读取文件：\n如果你的 .txt 文件太大无法一次读取，你可以逐行读取。`readlines()` 函数将你的数据分成易于阅读的部分。\n\
    \n示例：\n```python\ndef main():\n    f = open(\"myfile.txt\", \"r\")\n    f1 = f.readlines()\n\
    \    for x in f1:\n        print(x)\n\nif __name__ == \"__main__\":\n    main()\n\
    ```\n\n输出：\n```\nThis is a Python text file 1\n\nThis is a Python text file 2\n\
    \nThis is a Python text file 3\n```\n\n当你在 Python 中运行代码（`f1 = f.readlines()`）来逐行读取文件时，它会分隔每一行并清晰地显示文件内容；因为在我们的场景中行很短且可读，输出将类似于读取模式，然而，如果存在一个难以理解的复杂数据文件，这段代码可能会很有用。\n\
    \n### 10.2：使用 for 循环读取文本文件\n\n当使用 `open()` 过程启动文件时，它会返回一个可迭代对象。在 for 循环中遍历文件对象是逐行读取文件的终极方法。你正在使用一种内置的\
    \ Python 方法，该方法允许我们通过 for 循环与可迭代对象结合使用来隐式地遍历文件对象。这种方法需要的代码行数更少，这通常是一个值得遵循的好习惯。\n\
    \n示例：\n```python\n# Python program to\n# demonstrate reading files\n# using for\
    \ loop\nL = [\"Python\\n\", \"Text\\n\", \"File\\n\"]\n# Writing to file\nfile1\
    \ = open('myfile.txt', 'w')\nfile1.writelines(L)\nfile1.close()\n# Opening file\n\
    file1 = open('myfile.txt', 'r')\ncount = 0\n# Using for loop\nprint(\"Using for\
    \ loop\")\nfor line in file1:\n    count += 1\n    print(\"Line{}: {}\".format(count,\
    \ line.strip()))\n# Closing files\nfile1.close()\n```\n\n输出：\n```\nUsing for loop\n\
    Line1: Python\nLine2: Text\nLine3: File\n```\n\n### 10.3：写入文本文件\n\n要在 Python 中写入文件，你必须以写入模式\
    \ \"w\"、追加模式 \"a\" 和独占创建模式 \"x\" 打开它。因为 \"w\" 模式会覆盖已存在的文件，所以应谨慎使用。因此，所有先前的信息都会被擦除。要生成字符串/字节序列，请使用\
    \ `write()` 方法。此函数返回写入文件的字符数。\n\n示例：\n```python\nwith open(\"test.txt\", 'w',\
    \ encoding='utf-8') as f:\n    f.write(\"my first file\\n\")\n    f.write(\"This\
    \ file\\n\\n\")\n    f.write(\"contains three lines\\n\")\n```\n\n输出：\n```\n'my\
    \ first file\\nThis file\\n\\ncontains three lines\\n'\n```\n\n如果当前目录中不存在文件 \"\
    test.txt\"，此应用程序将创建它。如果存在，它将被覆盖。为了分隔不同的行，你必须自己插入换行符。\n\n### 10.4：按缓冲区大小打开和读取文本文件\n\
    \n通过在读取函数中设置缓冲区大小，你可以使用受限的缓冲区读取文件。它从文件中指针的当前位置读取你所需的字节数。\n\n示例：\n```python\nwith\
    \ open('test.txt', 'r') as f:\n    print(f.read(10))  # Read and print 10 bytes\n\
