  md: '# 2.1: WHAT ARE VARIABLES?


    A variable is a term that refers to a memory location. A Python variable, also
    called an identifier, is used to store data. In Python, you do not need to indicate
    the type of a variable since Python is an inferring language that is intelligent
    enough to determine the type of a variable. Variable names may include letters
    and numbers but must begin with either a letter or an underscore. It is advised
    that the variable name be written in lowercase letters. Both Rahul and Rahul are
    distinct variables. Python needs no command for defining variables. It is created
    when you first set its value.


    Variables are not required to be defined with a specific type. Variables are nothing
    more than memory addresses dedicated for storing values. This implies that when
    you declare a variable, you allocate memory for it. The interpreter allocates
    memory and determines what may be put in reserved memory based on the data type
    of a variable. As a result, by associating variables with multiple data types,
    you may store integers, characters, or decimals in these variables.


    Python has three sorts of numbers: complex, floating-point, and integer. Integers
    are non-decimal numbers. Floats are decimal-pointed numbers. Complex numbers are
    composed of imaginary and real parts. A string is another type of data that is
    very distinct from a number; it is a collection of characters. In other words,
    a variable in a Python program provides data to the computer for processing.'
  merge: -1
  pgno: 30
- img_proc: true
  md: '# 2.2: NAMING A VARIABLE


    A variable may be designated by a short name (such as x and y) or a more descriptive
    term (such as age, car name, or total volume). Variable names are case-sensitive.
    You should not use the lowercase letter “i” and the uppercase letter “O” as it
    may lead to confusion, and you could mistake them for a number 1 and the second
    for a number 0. Letters, underscores, and digits are permitted as variable names.
    However, the variable cannot begin with a number. Underscores improve readability.
    For instance, “this_variable” is more readable than “thisvariable.” It''s a good
    idea to keep variable names as brief as possible while still expressing the variable''s
    function. For instance, “member” is a better option than “m” for a variable. In
    the same way, “best_choice” is preferable to “bc” as a variable name.


    You want to be able to determine the variable''s purpose without having out-of-control
    names. “the_finest_member_of_group_is_what_is_held_in_this_variable” is a legal
    variable name but probably not a good choice to use in your programs. While the
    best member of the group is what is held in this variable is technically correct,
    it is probably not an acceptable variable name. Avoid using spaces or any other
    kind of whitespace character in variable names. As mentioned before, you may utilize
    the underscore to improve readability. Python contains a large number of specialized
    functions and keywords. You must be mindful of them to avoid using any of them
    as variable names in your software! These are reserved for Python-specific purposes.


    Example:


    ```

    #Legal variable names:

    myvar = "John"

    my_var = "John"

    _my_var = "John"

    myVar = "John"

    MYVAR = "John"

    myvar2 = "John"

    #Illegal variable names:

    2myvar = "John"

    my-var = "John"

    ```'
