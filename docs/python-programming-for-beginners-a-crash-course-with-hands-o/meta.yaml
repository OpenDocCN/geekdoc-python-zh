    ### 12.2.2: Stack


    A linear data structure that uses the First-In and Last-Out (FILO) or Last-In
    and First-Out (LIFO) ordering to store objects. A new mechanism is added to one
    end of a stack, while an element is withdrawn from the other end. Insert and delete
    processes are sometimes referred to as push and pop.


