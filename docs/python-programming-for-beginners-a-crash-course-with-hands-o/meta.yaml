    \ and heredity is a method of capturing real-world connections. For example, consider\
    \ the following: a vehicle, a bus, and a bicycle are all included in a bigger\
    \ category referred to as Vehicle. They have inherited the characteristics of\
    \ the vehicle class, i.e., they are all utilized for transportation.\n\n```python\n\
    class Car:       #parent class\n    def __init__(self, name, mileage):\n     \
    \   self.name = name\n        self.mileage = mileage\n    def description(self):\n\
    \        return f\"The {self.name} gives the mileage of {self.mileage}km\"\nclass\
    \ BMW(Car):   #child class\n    pass\nclass Audi(Car):  #child class\n    def\
    \ audi_desc(self):\n        return\n```\n\nUsing the parent class \"Car,\" we've\
    \ built two child classes, named \"BMW\" and \"Audi,\" which have each acquired\
    \ the methods and attributes of the parent class. In the BMW class, we have not\
    \ included any extra features or techniques that are not already available. On\
    \ the other hand, Audi has an extra method found inside the class.\n\n## 11.5.1:\
    \ Types of Inheritance\n\nDepending on the number of child and parent classes\
    \ involved, Python has four types of inheritance.\n\n- Single Inheritance\n\n\
    When a child class becomes a parent class for another child class.\n\n```python\n\
    class Parent:\n    def ParentFunction1(self):\n        print(\"This is parent\
    \ class 1\")\nclass Child(Parent):\n    def ChildFunction1(self):\n        print(\"\
    This is child class 1\")\nob = Child()\nob.ParentFunction1()\nob.ChildFunction1()\n\
    ```\n\nOutput:\n\n```\n[Running] python -u \"d:\\Ebook\\Ebook_Codes.py\"\nThis\
    \ is parent class 1\nThis is child class 1\n\n[Done] exited with code=0 in 0.452\
    \ seconds\n```\n\n- Multiple Inheritance\n\nIt is that a child class inherits\
    \ from more than one parent class.\n\n```python\nclass Parent:\n    def Parentfunction1(self):\n\
    \        print(\"This is parent class 1\")\nclass Parent2:\n    def Parentfunction2(self):\n\
    \        print(\"This is parent class 2\")\nclass Child(Parent , Parent2):\n \
    \   def ChildFunction1(self):\n        print(\"This is child class 1\")\nob =\
    \ Child()\nob.Parentfunction1()\nob.Parentfunction2()\nob.ChildFunction1()\n```\n\
    \nOutput:\n\n```\n[Running] python -u \"d:\\Ebook\\Ebook_Codes.py\"\nThis is parent\
    \ class 1\nThis is parent class 2\nThis is child class 1\n\n[Done] exited with\
    \ code=0 in 0.282 seconds\n```\n\n- Multilevel Inheritance\n\nWhen a child class\
    \ becomes a parent class for another child class.\n\n```python\nclass Parent:\n\
    \    def ParentFunction1(self):\n        print(\"This is parent class 1\")\nclass\
    \ Child(Parent):\n    def ChildFunction1(self):\n        print(\"This is child\
    \ class 1\")\nclass Child2(Child):\n    def ChildFunction2(self):\n        print(\"\
    This is child class 2\")\nob = Child2()\nob.ParentFunction1()\nob.ChildFunction1()\n\
    ob.ChildFunction2()\n```\n\nOutput:\n\n```\n[Running] python -u \"d:\\Ebook\\\
    Ebook_Codes.py\"\nThis is parent class 1\nThis is child class 1\nThis is child\
    \ class 2\n\n[Done] exited with code=0 in 0.407 seconds\n```\n\n## 11.5.2: Parent\
    \ Class Creation\n\nThe parent class is often referred to as the base class. Parent\
    \ classes provide a pattern on which children or subclasses may be built, reusing\
    \ them. This class may have the capability of creating a child class via inheritance,\
    \ eliminating the need to rewrite the same code every time.\n\nAs an illustration:\
    \ To create a bank account, we will use the term \"bank account\" as a personal\
    \ account that contains the child classes \"personal account\" and \"business\
    \ account.\" Several ways between personal and commercial accounts will be identical,\
    \ such as ways to withdraw and deposit money; thus, such methods may be grouped\
    \ under the parent class of bank account for convenience.\n\n## 11.5.3: Child\
    \ Class Creation\n\nChildren are categories that are descended from the base class\
    \ in some way. It simply implies that each child's class will utilize the procedures\
    \ and variables available in the parent class. For example, business_account is\
    \ a child class of bank_account.\n\n```python\nclass account(Bank_account):\n\
    \    pass\n```\n\nRemember that the 'pass' keyword is used when you do not add\
    \ more attributes or functions to the class.\n\nThis step will create a subclass\
    \ that will inherit the methods and properties from its parent class.\n\nInstead\
    \ of passing the 'pass' keyword to the child class, the `__init__()` function\
    \ is sent.\n\n`Super()` allows you to have a child class inherit all of the procedures\
    \ and characteristics from its parent class, which is very useful when dealing\
    \ with inheritance.\n\n![](img/97870751f4132139063aaf46bfceb248_172_0.png)\n\n\
    ## 11.5.4: Syntax Inheritance\n\nInheritance is the ability for a new class category\
    \ to inherit the attributes and behaviors of an existing class. The class from\
    \ which inheritance is derived is referred to as the parent class. A child class\
    \ is any class that derives from a base class in the Java programming language.\n\
    \nChild classes not only inherit all of their parent class's properties and methods,\
    \ but they also have the ability to expand or rewrite them.\n\nThe following is\
    \ the standard syntax for class Inheritance:\n\n```python\nclass Base_Class:\n\
    \    #Base class body\nclass Derived_Class(Base_Class):\n    #Derived class body\n\
    ```\n\n## 11.5.5: Advantages of Inheritance\n\n- Code reusability; There are many\
    \ ways available to you that will allow you to use the same functions and attributes\
    \ across your code.\n- It is a good representation of real-world relationships\
    \ between parent and child classes.\n- In nature, it has a transitive property.\
    \ If a subclass class gets attributes from a base class, then all of the child\
    \ class's subclasses will likewise receive the characteristics of the parent class,\
    \ as will all of the child class's subclasses.\n- Code reusability is the frequent\
    \ usage of code that has only been written once.\n- A single superclass may represent\
    \ the number of subclasses within a chain.\n- Inheritance eliminates duplication\
    \ and redundancy in data.\n- Inheritance is being used to reduce the amount of\
    \ space and time required.\n- There are no modifications to be made in any of\
    \ the base classes; only changes need to be made in the parent class.\n- The ability\
    \ to pass on inheritance in order to develop more dominating items.\n- The use\
    \ of inheritance forces subclasses to adhere to a common interface.\n- Inheritance\
    \ aids in the reduction of code duplication and the facilitation of code extension.\n\
    - The use of inheritance makes it easier to create class libraries.\n\n## 11.5.6:\
    \ Disadvantages of Inheritance\n\n- Incorrect usage of inheritance, or a lack\
    \ of understanding of it, may result in incorrect solutions. In addition, data\
    \ members in the base class may be left unused, resulting in memory over-utilization.\n\
    - It boosts the time and effort required. Required. Required to go through the\
    \ various levels of inheritance.\n- One of the primary drawbacks of inheriting\
    \ is the time and effort required for the program to go through all layers of\
