- md: "## 3.2: FLOAT\n\nFloating point numbers (float) in Python are negative and\
    \ positive real numbers with a fractional component represented by the decimal\
    \ sign (.) or the scientific symbol E or e, e.g., is 1234.56, 3.142, -1.55, 0.23.\n\
    \n```\n>>> f=1.2\n>>> f\n1.2\n>>> type(f)\n<class 'float'>\n```\n\nConvert text,\
    \ int, to float using the float() method.\n\n```\n>>> float('5.5')\n5.5\n>>> float('5')\n\
    5.0\n>>> float('    -5')\n-5.0\n>>> float('1e3')\n1000.0\n>>> float('-Infinity')\n\
    -inf\n>>> float('inf')\ninf\n```\n\n## 3.3: STRING\n\nArrays of bytes in Python\
    \ that correspond to Unicode types are known as strings. Nevertheless, since Python\
    \ requires a character, a distinct character is only a one-length string. Square\
    \ brackets may be utilized to retrieve the string's components.\n\nCreating a\
    \ String:\nPython allows for the creation of strings using single quotes, double\
    \ quotes, or even triple quotes.\n\nExample:\n\n```\n# Python Program for\n# Creation\
    \ of String\n# Creating a String\n# with single Quotes\nString1 = 'Welcome to\
    \ the World of Fantasy'\nprint(\"String created using Single Quotes: \")\nprint(String1)\n\
    # Creating a String\n# with double Quotes\nString1 = \"I'm a Super Hero\"\nprint(\"\
    \\nString created using Double Quotes: \")\nprint(String1)\n# Creating a String\n\
    # with triple Quotes\nString1 = \"\"\"I'm a Super Hero and I live in a world of\
    \ \"Fantasy\"\"\" \nprint(\"\\nString created using Triple Quotes: \")\nprint(String1)\n\
    # Creating String with triple\n# Quotes allows multiple lines\nString1 = \"\"\"\
    Nerds\nFor\nLife\"\"\"\nprint(\"\\nCreating a multiline String: \")\nprint(String1)\n\
    ```\n\nOutput:\n\n```\nString created using Single Quotes:\nWelcome to the World\
    \ of Fantasy\n\nString created using Double Quotes:\nI'm a Super Hero\n\nString\
    \ created using Triple Quotes:\nI'm a Super Hero and I live in a world of \"Fantasy\"\
    \n\nCreating a multiline String:\nNerds\n    For\n    Life\n```\n\nAccessing Characters\
    \ in Python:\nIndividual characters in a string may be retrieved in Python with\
    \ the Indexing function. Indexing enables negative address references to access\
    \ characters at the end of the String; for example, -1 corresponds to the final\
    \ character, -2 to the second-to-last character, and so on. In contrast, retrieving\
    \ an index that is not inside the range results in an IndexError. Only integers\
    \ are permitted as indexes, floats, or other kinds that will result in a TypeError.\n\
    \nExample:\n\n```\n# Python Program to Access\n# characters of String\nString1\
    \ = \"StrawberryCake\"\nprint(\"Initial String: \")\nprint(String1)\n# Printing\
    \ First character\nprint(\"\\nFirst character of the String is: \")\nprint(String1[0])\n\
    # Printing Last character\nprint(\"\\nLast character of the String is: \")\nprint(String1[-1])\n\
    ```\n\nOutput:\n\n```\nInitial String:\nStrawberryCake\n\nFirst character of the\
    \ String is:\nS\n\nLast character of the String is:\ne\n```\n\n## 3.4: TYPE CASTING\
    \ IN PYTHON\n\nType Casting is a technique for converting a variable's data type\
    \ to a specific data type to conduct the action requested by users.\n\nThere are\
    \ two types of typecasting in Python:\n\nImplicit Type Conversion:\n\nThe user\
    \ is not required to provide any particular data type during the implicit type\
    \ conversion.\n\nExample:\n\n```\n#program to demonstrate implicit type conversion\n\
    #initializing the value of w\nw = 20\nprint(w)\nprint(\"The type of w is \", type(w))\n\
    #initializing the value of x\nx = 6.5\nprint(x)\nprint(\"The type of x is \",\
    \ type(x))\n#initializing the value of y\ny = 7.0\nprint(y)\nprint(\"The type\
    \ of y is \", type(y))\n#initializing the value of z\nz = 3.0\nprint(z)\nprint(\"\
    The type of z is \", type(z))\n#performing arithmetic operations\nres = w * x\n\
    print(\"The product of w and x is \", res)\nadd = y + z\nprint(\"The addition\
    \ of y and z is \", add)\n```\n\nOutput:\n\n```\n20\nThe type of w is  <class\
    \ 'int'>\n6.5\nThe type of x is  <class 'float'>\n7.0\nThe type of y is  <class\
    \ 'float'>\n3.0\nThe type of z is  <class 'float'>\nThe product of w and x is\
    \  130.0\nThe addition of y and z is  10.0\n```\n\nIn the program above, the values\
    \ of w, x, y, and z are initialized to check how the values get converted on performing\
    \ the operations. After that, the data type of each one of them is checked. Finally,\
    \ addition is performed on the variables y and z and multiplication on the variables\
    \ w and x. When the above program is executed, it can be seen that the result\
    \ is a float value in the case of the product where w was an integer and x was\
    \ float.\n\nExplicit Type Conversion:\nThe user is expected to feed the value\
    \ into a function to acquire the desired data type. The int(), float(), and str()\
    \ are mostly used for the explicit type conversions.\n\nExample:\n\n```\n#program\
    \ to demonstrate explicit type conversion\n#initializing the value of x\nx=10.6\n\
    print(\"The type of 'x' before typecasting is \",type(x))\nprint(int(x))\nprint(\"\
    The type of 'x' after typecasting is\",type(x))\n#initializing the value of y\n\
    y=8.3\nprint(\"The type of 'y' before typecasting is \",type(y))\nprint(int(y))\n\
    print(\"The type of 'y' after typecasting is\",type(y))\n#initializing the value\
    \ of z\nz=7\nprint(\"The type of 'z' before typecasting is \",type(z))\nprint(float(z))\n\
    print(\"The type of 'z' after typecasting is\",type(z))\n```\n\nOutput:\n\n```\n\
    The type of 'x' before typecasting is  <class 'float'>\n10\nThe type of 'x' after\
    \ typecasting is <class 'float'>\nThe type of 'y' before typecasting is  <class\
    \ 'float'>\n8\nThe type of 'y' after typecasting is <class 'float'>\nThe type\
    \ of 'z' before typecasting is  <class 'int'>\n7.0\nThe type of 'z' after typecasting\
    \ is <class 'int'>\n```\n\nIn the program above, x, y, and z are initialized.\
    \ Int() and float() are used in this program to see how explicit type conversion\
    \ occurs. It can be checked how the data type changes by running this application.\n\
    \n## 3.5: LIST\n\nPython lists are among the most flexible data formats because\
    \ they enable the simultaneous manipulation of numerous components.\n\nCreating\
    \ Lists:\nA list is generated in Python by enclosing entries in square brackets\
    \ [], separated using commas.\n\n```\n# list of integers\nmy_list = [1, 2, 3]\n\
    ```\n\nA list may include any number of items and may contain objects of varying\
    \ categories (float, integer, string, etc.).\n\n```\n# empty list\nmy_list = []\n\
    # list with mixed data types\nmy_list = [1, \"Hello\", 3.4]\n```\n\nAdditionally,\
    \ a list may include an item from another list. This is referred to as a nested\
    \ list.\n\n```\n# nested list\nmy_list = [\"mouse\", [8, 4, 6], ['a']]\n```\n\n\
    Delete List Elements:\nThrough Python del statement, one or more entries from\
    \ a list can be removed. It is even capable of deleting the list completely.\n\
    \n```\n# Deleting list items\npython_list = ['p', 'r', 'o', 'b', 'l', 'e', 'm']\n\
    # delete one item\ndel python_list[2]\nprint(python_list)\n# delete the entire\
    \ list\ndel python_list\n# Error: List not defined\nprint(python_list)\n```\n\n\
    Output:\n\n```\n['p', 'r', 'b', 'l', 'e', 'm']\n\n---------------------------------------------------------------------------\n\
    NameError                                 Traceback (most recent call last)\n\
    <ipython-input-68-4fd1bee01e7a> in <module>\n     10 \n     11 # Error: List not\
    \ defined\n---> 12 print(python_list)\n\nNameError: name 'python_list' is not\
    \ defined\n```\n\nPython List Methods:\nPython has many handy list functions that\
    \ make working with lists simple.\n\nExample:\n\n```\n# Example on Python list\
    \ methods\npython_list = [3, 9, 2, 7, 9, 9, 4]\n# Add 'x' to the end\npython_list.append('x')\n\
    # Output: [3, 9, 2, 7, 9, 9, 4, 'x']\nprint(python_list)\n# Index of first occurrence\
    \ of 9\nprint(python_list.index(9))  # Output: 1\n# Count of 9 in the list\nprint(python_list.count(9))\
    \ # Output: 3\n```\n\nOutput:\n\n```\n[3, 9, 2, 7, 9, 9, 4, 'x']\n1\n3\n```\n\n\
    ## 3.6: ARRAY\n\nAn array is a group of items stored in adjacent memory locations.\
    \ The notion is to group equivalent elements. This simplifies the process of calculating\
    \ the position of each piece by simply adding an offset to a base value.\n\nCreating\
    \ an Array:\nAn array is created in Python by importing the array library; array\
    \ (data_type, value_list) is used to create an array using the type of data and\
    \ list of values given.\n\nExample:\n\n```\n# Python program to demonstrate\n\
    # Creation of Array\n# importing \"array\" for array creations\nimport array as\
