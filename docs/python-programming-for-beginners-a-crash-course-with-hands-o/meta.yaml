    # Creating a String\n# with triple Quotes\nString1 = \"\"\"I'm a Super Hero and\
    \ I live in a world of \"Fantasy\"\"\" \nprint(\"\\nString created using Triple\
    \ Quotes: \")\nprint(String1)\n# Creating String with triple\n# Quotes allows\
    \ multiple lines\nString1 = \"\"\"Nerds\nFor\nLife\"\"\"\nprint(\"\\nCreating\
