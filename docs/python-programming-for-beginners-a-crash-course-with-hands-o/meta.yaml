    \ is the process through which one class acquires the characteristics and methods\
    \ from another class. In programming, \"Parent class\" refers to inherited attributes\
    \ and methods. Likewise, the Child class is the class that receives all of the\
    \ attributes from its parent class. Instead of rewriting the same code repeatedly,\
    \ we can inherit the attributes of one class into another, saving us time and\
