  md: '# 3.7: TUPLE


    In Python, a tuple is analogous to a list. The distinction between the two is
    that once a tuple is allocated, its elements cannot be changed, but the contents
    of a list may be changed.


    Creating a Tuple:

    A tuple is formed by enclosing all items (elements) in parenthesis () and separating
    them with commas. While parentheses are not required, including them is a good
    practice. A tuple may include any number of elements and may contain objects of
    varying kinds (float, integer, string, list, etc.).


    Example:


    ```

    # Different types of tuples

    # Empty tuple

    myfirst_tuple = ()

    print(myfirst_tuple)

    # Tuple having integers

    myfirst_tuple = (1, 2, 3)

    print(myfirst_tuple)

    # tuple with mixed datatypes

    myfirst_tuple = (1, "Hello", 3.4)

    print(myfirst_tuple)

    # nested tuple

    myfirst_tuple = ("mouse", [8, 4, 6], (1, 2, 3))

    print(myfirst_tuple)

    ```


    Output:


    ```

    ()

    (1, 2, 3)

    (1, ''Hello'', 3.4)

    (''mouse'', [8, 4, 6], (1, 2, 3))

    ```


    Additionally, a tuple may be formed without the need for parentheses. This technique
    is referred to as tuple packing.


    Example:'
