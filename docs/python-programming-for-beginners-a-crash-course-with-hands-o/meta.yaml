- md: "## CHAPTER 5\n\n## CONDITION STATEMENTS\n\n### 5.1: IF STATEMENT\n\nIf Statement:\n\
    One of the most often used \"conditional statements\" in computer languages is\
    \ the \"if statement\" in Python. It determines whether or not particular assertions\
    \ must be performed. It tests for a specific condition, and if it is true, the\
    \ code within the \"if\" block will be performed; otherwise, it will not. The\
    \ if condition analyses a Boolean expression & only runs the block of code if\
    \ the expression is TRUE.\n\nSyntax:\nif expression\nStatement\nThe condition\
    \ will be converted to a \"Boolean expression\" in this step (true or false).\
    \ If the condition is fulfilled (true), the statement or program inside the \"\
    if\" block is run; if the condition becomes false, the statements or program inside\
    \ the \"otherwise\" block is executed.\n\nExample:\nnum = 5\nif (num < 10):\n\
    \    print(\"Num is smaller than 10\")\nprint(\"This statement will always be\
    \ executed\")\nOutput:\n\n```\nNum is smaller than 10\nThis statement will always\
    \ be executed\n```\n\nA variable named 'Num' is defined with the value of 5 in\
    \ the preceding example, and the \" if \" statement checks if the no. is less\
    \ than 10 or not. If the statement is satisfied (true), the if block will execute\
    \ a series of statements.\n\n**If-Else Statement:**\nThe statement itself specifies\
    \ that if a particular condition is true, then the statements inside the \"if\
    \ block\" should be executed, & if the condition is false, then the \"else\" block\
    \ should be executed. Only when the condition becomes false will the \"else\"\
    \ block be executed. It's the block in which you'll take action if the condition\
    \ isn't true. The Boolean expression is evaluated using the if-else statement.\
    \ If condition is TRUE, the \"if\" block's code will be run; otherwise, the \"\
    otherwise\" block's code will be executed.\n\n```\nSyntax:\nIf (EXPRESSION ==\
    \ TRUE):\n    Statement (Body of the block)\nelse:\n    Statement (Body of the\
    \ block)\n```\n\nThe condition will be converted to Boolean expression in this\
    \ step (true or false). If the condition is true, the statements or program inside\
    \ the \"if\" block will run, & if the condition is false, the statements or program\
    \ inside the \"otherwise\" block will run.\n\n```\nExample:\na = 7\nb = 0\nif\
    \ (a > b):\n    print(\"a is greater than b\")\nelse:\n    print(\"b is greater\
    \ than a\")\nOutput:\n```\n\n![](img/97870751f4132139063aaf46bfceb248_86_0.png)\n\
    \nIf \"a\" is greater than \"b\" in the following code, the statements in the\
    \ \"if\" block will be executed, but the ones in the \"otherwise\" block will\
    \ be skipped.\n\n### Elif Statements:\n\nAnother conditional statement in Python\
    \ is the \"elif\" statement. If the supplied condition is false, the \"elif\"\
    \ statement is being used to check several conditions. It's identical to an \"\
    if-else\" statement, with the exception that in \"else,\" the condition won't\
    \ be verified, but in \"elif,\" it will be verified. Elif statements are identical\
    \ to if-else statements, except that they examine several conditions.\n\n```\n\
    Syntax:\nif (condition):\n    #If condition is true, execute the following statements:\n\
    elif (condition):\n    #When the if condition is false & the elif condition is\
    \ true, a set of statements is performed.\nelse:\n    #When both the if & elif\
    \ conditions are false, a set of statements is performed.\nExample:\nnum = 10\n\
    if (num == 0):\n    print(\"Number is Zero\")\nelif (num > 5):\n    print(\"Number\
    \ is greater than 5\")\nelse:\n    print(\"Number is smaller than 5\")\nOutput:\n\
    ```\n\n![](img/97870751f4132139063aaf46bfceb248_87_0.png)\n\nIn the example above,\
    \ a variable named 'num' has been defined with a value of 10, and the condition\
    \ in the \"if\" statement is verified to see whether it becomes true. The piece\
    \ (block) of code included within the \"if\" condition will then be executed.\
    \ If condition is false, the \"elif\" condition is checked. If the condition is\
    \ met, a block of code contained within the \"elif\" expression is executed. If\
    \ true, a block of code included within the \"else\" expression will be executed.\n\
    \n### Nested If-Else Statement:\nAn \"if\" or \"if-else\" statement nested inside\
    \ another if/if-else block is referred to as nested \"if-else\" statements. This\
    \ capability is also available in Python, which allows us to verify several conditions\
    \ in a single application. An \"if\" statement is included within another \"if\"\
    \ statement, which is contained within yet another \"if\" statement, and so on.\n\
    \n```\nSyntax:\nif(condition):\n    #Statements to execute if condition is true\n\
    \    if(condition):\n        #Statements to execute if condition is true\n   \
    \ #end of nested if\n#end of if\n```\n\nAccording to the aforementioned grammar,\
    \ the if block will include another if block, and so on. If block can have as\
    \ many as 'n' if blocks inside it.\n\nExample:\n\n```\ni = 10\nif (i == 10):\n\
    \    if (i < 20):\n        print(i, \"is smaller than 20\")\n        if (i < 21):\n\
    \            print(i, \"is smaller than 21\")\n```\n\nOutput:\n\n```\n10 is smaller\
    \ than 20\n10 is smaller than 21\n```\n\n### Elif Ladder:\n\nA program with a\
    \ ladder of \"elif\" statements or \"elif\" statements arranged in the shape of\
    \ a ladder, as the name indicates. Multiple expressions are tested with this statement.\n\
    \nSyntax:\n\n```\nif (condition):\n    # If the condition is true, the following\
    \ set of statements will be executed:\n    elif(condition):\n        # If the\
    \ if condition is false & the elif condition is true, a set of statements will\
    \ be performed.\n        elif(condition):\n            # When both the if and\
    \ first elif conditions are false and the second elif condition is true, a set\
    \ of statements is performed.\n            elif(condition):\n                #\
    \ If the first & second elif conditions are false, and the third elif statement\
    \ is true, a set of statements will be performed.\n                else:\n   \
    \                 #Set of statements to be executed when all if and elif conditions\
    \ are false\n```\n\nExample:\n\n```\nmy_marks = 90\nif (my_marks < 35):\n    print(\"\
    Sorry!, You failed the exam\")\nelif(my_marks > 60 and my_marks > 100):\n    print(\"\
    Passed in First class\")\nelse:\n    print(\"Passed in First class with distinction\"\
    )\n```\n\nOutput:\n\n```\nPassed in First class with distinction\n```\n\n## 5.2:\
    \ INLINE IF\n\nIn Python, the if-else expression is logical. Inline if statements\
    \ in Python do not employ the ternary operator like they do in other languages.\
    \ Instead, if the condition is true, it provides just one code to analyze the\
    \ first expression. Otherwise, the second phase is evaluated.\n\n### Simple If\
    \ Statement:\nIn a basic, if statement, a condition is specified, and the if block\
    \ is performed depending on that condition.\n\nSyntax:\nif condition: statement\n\
    if condition:\nblock\n\nAn \"inline if statement\" is one in which the expression\
    \ is performed if the condition is True.\n\nExample:\ndata = 21\nif data < 22:\
    \ print(\"It's cool\")\nOutput:\n\n```\nIt's cool\n```\n\n### Inline If Else Statement:\n\
    Python's inline if-else statement must include an else clause.\nSyntax:\nx = 1\
    \ if y else 0\nIf you wish to keep the value of your 'x' variable the same, assign\
    \ the old 'x' value.\n\nExample:\ndata = 21\ninfo = 19\nprint(data if info else\
    \ 0)\nOutput:\n\nThis will output in 0 if the information is 0.\nExample:\ndata\
    \ = 21\ninfo = 0\nprint(data if info else 0)\nOutput:\n\n```\n0\n```\n\n## CHAPTER\
    \ 6\n\n## LOOPS\n\n### 6.1: FOR LOOP\n\nIn Python, the for loop is being used\
    \ to iterate over a list, tuple, string. Traversal is the process of iterating\
    \ across a sequence.\n\nSyntax:\nfor val in sequence:\n    loop body\n\n\"val\"\
    \ is a variable that obtains the value of each item in the series on each reiteration.\
    \ The loop will continue till the sequence's last item is reached. The essence\
    \ of the “for loop” is divided from the code by indentation.\n\nExample:\n\n```\n\
    # Program to find the sum of all nos. stored in a list\n# List of nos.\nnumber\
    \ = [6, 5, 3, 8, 4, 2, 5, 4, 11]\n# variable to store the sum\nsum = 0\n# iterate\
    \ over the list\nfor val in numbers:\n    sum = sum+val\nprint(\"The sum is\"\
    , sum)\n```\n\nOutput:\n\n```\nThe sum is 48\n```"
  mdcn: "## 第五章\n\n## 条件语句\n\n### 5.1：IF 语句\n\nIf 语句：\nPython 中最常用的“条件语句”之一是“if 语句”。它决定了是否必须执行特定的断言。它测试一个特定的条件，如果条件为真，则执行“if”块内的代码；否则，不执行。if\
    \ 条件分析一个布尔表达式，并且仅在表达式为 TRUE 时运行代码块。\n\n语法：\nif 表达式\n语句\n在此步骤中，条件将被转换为“布尔表达式”（真或假）。如果条件满足（为真），则运行“if”块内的语句或程序；如果条件为假，则执行“otherwise”块内的语句或程序。\n\
    \n示例：\nnum = 5\nif (num < 10):\n    print(\"Num is smaller than 10\")\nprint(\"\
    This statement will always be executed\")\n输出：\n\n```\nNum is smaller than 10\n\
    This statement will always be executed\n```\n\n在前面的示例中，定义了一个名为 'Num' 的变量，其值为 5，“if”语句检查该数字是否小于\
    \ 10。如果语句满足（为真），if 块将执行一系列语句。\n\n**If-Else 语句：**\n该语句本身规定，如果特定条件为真，则应执行“if 块”内的语句；如果条件为假，则应执行“else”块。只有当条件变为假时，才会执行“else”块。这是当条件不为真时你将采取行动的块。if-else\
    \ 语句用于计算布尔表达式。如果条件为 TRUE，则运行“if”块的代码；否则，执行“otherwise”块的代码。\n\n```\n语法：\nIf (EXPRESSION\
    \ == TRUE):\n    语句（块的主体）\nelse:\n    语句（块的主体）\n```\n\n在此步骤中，条件将被转换为布尔表达式（真或假）。如果条件为真，则运行“if”块内的语句或程序；如果条件为假，则运行“otherwise”块内的语句或程序。\n\
    \n```\n示例：\na = 7\nb = 0\nif (a > b):\n    print(\"a is greater than b\")\nelse:\n\
    \    print(\"b is greater than a\")\n输出：\n```\n\n![](img/97870751f4132139063aaf46bfceb248_86_0.png)\n\
    \n在下面的代码中，如果“a”大于“b”，则执行“if”块中的语句，但跳过“otherwise”块中的语句。\n\n### Elif 语句：\n\nPython\
    \ 中的另一个条件语句是“elif”语句。如果提供的条件为假，则使用“elif”语句来检查多个条件。它与“if-else”语句相同，不同之处在于“else”中不检查条件，而在“elif”中会检查条件。Elif\
    \ 语句与 if-else 语句相同，只是它们检查多个条件。\n\n```\n语法：\nif (条件):\n    #如果条件为真，执行以下语句：\nelif\
    \ (条件):\n    #当 if 条件为假且 elif 条件为真时，执行一组语句。\nelse:\n    #当 if 和 elif 条件都为假时，执行一组语句。\n\
    示例：\nnum = 10\nif (num == 0):\n    print(\"Number is Zero\")\nelif (num > 5):\n\
    \    print(\"Number is greater than 5\")\nelse:\n    print(\"Number is smaller\
    \ than 5\")\n输出：\n```\n\n![](img/97870751f4132139063aaf46bfceb248_87_0.png)\n\n\
    在上面的示例中，定义了一个名为 'num' 的变量，其值为 10，并验证“if”语句中的条件是否为真。然后将执行“if”条件内包含的代码块。如果条件为假，则检查“elif”条件。如果条件满足，则执行“elif”表达式内包含的代码块。如果为真，则执行“else”表达式内包含的代码块。\n\
    \n### 嵌套 If-Else 语句：\n嵌套在另一个 if/if-else 块内的“if”或“if-else”语句称为嵌套“if-else”语句。Python\
    \ 也提供了此功能，允许我们在单个应用程序中验证多个条件。一个“if”语句包含在另一个“if”语句中，而后者又包含在另一个“if”语句中，依此类推。\n\n\
    ```\n语法：\nif(条件):\n    #如果条件为真，执行以下语句\n    if(条件):\n        #如果条件为真，执行以下语句\n \
    \   #嵌套 if 结束\n#if 结束\n```\n\n根据上述语法，if 块将包含另一个 if 块，依此类推。If 块内可以包含多达 'n' 个 if\
    \ 块。\n\n示例：\n\n```\ni = 10\nif (i == 10):\n    if (i < 20):\n        print(i,\
    \ \"is smaller than 20\")\n        if (i < 21):\n            print(i, \"is smaller\
    \ than 21\")\n```\n\n输出：\n\n```\n10 is smaller than 20\n10 is smaller than 21\n\
    ```\n\n### Elif 梯形结构：\n\n顾名思义，这是一个包含“elif”语句梯形结构或以梯形结构排列的“elif”语句的程序。此语句用于测试多个表达式。\n\
    \n语法：\n\n```\nif (条件):\n    # 如果条件为真，将执行以下语句集：\n    elif(条件):\n        # 如果 if\
    \ 条件为假且 elif 条件为真，将执行一组语句。\n        elif(条件):\n            # 当 if 和第一个 elif 条件都为假且第二个\
    \ elif 条件为真时，执行一组语句。\n            elif(条件):\n                # 如果第一个和第二个 elif\
    \ 条件为假，且第三个 elif 语句为真，将执行一组语句。\n                else:\n                    #当所有\
    \ if 和 elif 条件都为假时要执行的语句集\n```\n\n示例：\n\n```\nmy_marks = 90\nif (my_marks < 35):\n\
    \    print(\"Sorry!, You failed the exam\")\nelif(my_marks > 60 and my_marks >\
    \ 100):\n    print(\"Passed in First class\")\nelse:\n    print(\"Passed in First\
    \ class with distinction\")\n```\n\n输出：\n\n```\nPassed in First class with distinction\n\
    ```\n\n## 5.2：内联 IF\n\n在 Python 中，if-else 表达式是逻辑性的。Python 中的内联 if 语句不像其他语言那样使用三元运算符。相反，如果条件为真，它只提供一个代码来分析第一个表达式。否则，将评估第二个阶段。\n\
    \n### 简单 If 语句：\n在基本的 if 语句中，指定一个条件，并根据该条件执行 if 块。\n\n语法：\nif 条件: 语句\nif 条件:\n\
    块\n\n“内联 if 语句”是指如果条件为 True 则执行表达式的语句。\n\n示例：\ndata = 21\nif data < 22: print(\"\
    It's cool\")\n输出：\n\n```\nIt's cool\n```\n\n### 内联 If Else 语句：\nPython 的内联 if-else\
    \ 语句必须包含一个 else 子句。\n语法：\nx = 1 if y else 0\n如果你希望保持 'x' 变量的值不变，请分配旧的 'x' 值。\n\
    \n示例：\ndata = 21\ninfo = 19\nprint(data if info else 0)\n输出：\n\n如果信息为 0，这将输出 0。\n\
    示例：\ndata = 21\ninfo = 0\nprint(data if info else 0)\n输出：\n\n```\n0\n```\n\n##\
    \ 第六章\n\n## 循环\n\n### 6.1：FOR 循环\n\n在 Python 中，for 循环用于遍历列表、元组、字符串。遍历是迭代序列的过程。\n\
    \n语法：\nfor val in sequence:\n    循环体\n\n“val”是一个变量，在每次重复中获取序列中每个项目的值。循环将持续进行，直到到达序列的最后一项。“for\
    \ 循环”的本质通过缩进与代码分开。\n\n示例：\n\n```\n# 查找存储在列表中的所有数字之和的程序\n# 数字列表\nnumber = [6, 5,\
    \ 3, 8, 4, 2, 5, 4, 11]\n# 用于存储总和的变量\nsum = 0\n# 遍历列表\nfor val in numbers:\n \
    \   sum = sum+val\nprint(\"The sum is\", sum)\n```\n\n输出：\n\n```\nThe sum is 48\n\
    ```"
