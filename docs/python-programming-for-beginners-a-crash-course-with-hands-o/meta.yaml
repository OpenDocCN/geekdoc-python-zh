    \    3.7: [Tuple](Tuple)\n    3.8: [Dictionary](Dictionary)\n4. [How to Make Your\
    \ Program Interactive?](How to Make Your Program Interactive?)\n    4.1: [Input()](Input())\n\
    \    4.2: [Print()](Print())\n    4.3: [Triple Quotes](Triple Quotes)\n    4.4:\
    \ [Escape Characters](Escape Characters)\n5. [Condition Statements](Condition\
    \ Statements)\n    5.1: [If statement](If statement)\n    5.2: [Inline If](Inline\
    \ If)\n6. [Loops](Loops)\n    6.1: [For loop](For loop)\n    6.2: [While loop](While\
    \ loop)\n    6.3: [Break](Break)\n    6.4: [Continue](Continue)\n    6.5: [Try,\
    \ Except](Try, Except)\n7. [Functions and Modules](Functions and Modules)\n  \
    \  7.1: [What are Functions?](What are Functions?)\n    7.2: [Built-In Functions](Built-In\
    \ Functions)\n    7.3: [Defining Your Functions](Defining Your Functions)\n  \
    \  7.4: [Recursive Functions](Recursive Functions)\n8. [Variable Scope](Variable\
    \ Scope)\n    8.1: [Default Parameters Values](Default Parameters Values)\n  \
    \  8.2: [Variable-Length Argument List](Variable-Length Argument List)\n9. [Importing\
    \ Modules](Importing Modules)\n    9.1: [Creating your Own Module](Creating your\
    \ Own Module)\n10. [Working with Files](Working with Files)\n    10.1: [Opening\
    \ and Reading Text Files](Opening and Reading Text Files)\n    10.2: [Using a\
    \ For Loop to Read Text Files](Using a For Loop to Read Text Files)\n    10.3:\
    \ [Writing to a Text File](Writing to a Text File)\n    10.4: [Opening & Reading\
    \ Text Files by Buffer Size](Opening & Reading Text Files by Buffer Size)\n  \
    \  10.5: [Opening, Reading, and Writing Binary Files](Opening, Reading, and Writing\
    \ Binary Files)\n    10.6: [Deleting and Renaming Files](Deleting and Renaming\
    \ Files)\n11. [Object-Oriented Programming](Object-Oriented Programming)\n   \
    \ 11.1: [Classes](Classes)\n    11.2: [Objects](Objects)\n    11.3: [Polymorphism](Polymorphism)\n\
    \    11.4: [Encapsulation](Encapsulation)\n    11.5: [Inheritance](Inheritance)\n\
    \    11.6: [Multiple Inheritance](Multiple Inheritance)\n    11.7: [Operator Overloading](Operator\
    \ Overloading)\n12. [Data Structures and Algorithms](Data Structures and Algorithms)\n\
    \    12.1: [Asymptotic Analysis](Asymptotic Analysis)\n    12.2: [Linear Data\
    \ Structures](Linear Data Structures)\n    12.3: [Non-Linear Data Structures](Non-Linear\
    \ Data Structures)\n13. [Python Gaming Project](Python Gaming Project)\n    13.1:\
    \ [Mario Game In Python With Source Code](Mario Game In Python With Source Code)\n\
    \    13.2: [Stages on how to make a Mario video game in Python](Stages on how\
    \ to make a Mario video game in Python)\n    13.3: [Code For Importing Libraries](Code\
    \ For Importing Libraries)\n    13.4: [Code For The Initialization & Declaration\
