- md: "## 11.1.5: Types of Classes\n\nThere are many different sorts of classes in\
    \ Python, with the following being a few examples:\n\n## 11.1.6: Abstract Class\n\
    \nWhen working with object-oriented programming, abstraction is a notion that\
    \ is utilized to keep the inner functionality of classes hidden from the users'\
    \ view. In this case, the users are acquainted with the objective of the class's\
    \ methods, but they are not aware of how the methods accomplish the purpose, which\
    \ implies that they are aware of the inputs and anticipated outputs, but the inner\
    \ workings of the methods are concealed from them.\n\nThe abstract classes are\
    \ used to implement abstraction in a program. It is customary in Python to build\
    \ abstract classes to specify a methodology that must be implemented by any child\
    \ classes built atop the abstract class. In a similar vein, an abstract methodology\
    \ is a technique that does not have any associated implementation.\n\nAbstract\
    \ methods compel the subclasses to include the execution of these ways in their\
    \ own instances, which aids in the achievement of abstraction since each subclass\
    \ may provide its own instance of the method. An abstract class consists of more\
    \ than one abstract method and many abstract methods.\n\nExamples of this may\
    \ be seen in everyday life, such as when we click a button on a TV set to change\
    \ the station. We aren't concerned with how the remote does it; we are just concerned\
    \ with the fact that when we click a certain button, the channel changes!\n\n\
    Smartphones are another example of abstraction; we are not conscious of any of\
    \ the phone's inherent operations; instead, we are just focused on what we need\
    \ to do to complete a certain job.\n\nFor example, we have no idea how the phone\
    \ captures a video when we push the record button; we just touch or hit a button\
    \ and perform what it is supposed to. There are a plethora of additional instances\
    \ of abstraction that we may see in action in the actual world.\n\nBased on the\
    \ examples provided above, we can conclude that abstraction makes things better\
    \ user-friendly and less complicated. Generally speaking, abstraction is used\
    \ in programming to make the lives of other developers easier by abstracting away\
    \ the details of the code. For example, in Python, we don't have to worry about\
    \ understanding how the sort() method of the list classes works; we can just use\
    \ it and sort a list for us.\n\nPython is not a completely object-oriented programming\
    \ language because we may create Python code without defining any classes. However,\
    \ Python does support all of the concepts associated with object-oriented programming,\
    \ including abstraction and the concept of abstract classes.\n\nIn Python, it\
    \ is not possible to explicitly build an abstract class. A module in Python enables\
    \ us to create abstract classes, albeit it is not often used. The abc (abstract\
    \ base class) modules in Python is the one that we may use to construct an abstract\
    \ class from scratch.\n\nFirst, we will create the Shape class and then Circle\
    \ and Triangle classes under it:\n\n```python\nfrom abc import ABC, abstractmethod\n\
    \nclass Shape(ABC):\n    def __init__(self, shape_name):\n        self.shape_name\
    \ = shape_name\n\n    @abstractmethod\n    def Create(self):\n        pass\n\n\
    from Circle import Circle\ncircle = Circle()\ncircle.Create()\n\nclass Triangle(Shape):\n\
    \    def __init__(self):\n        super().__init__(\"Triangle\")\n\n    def Create(self):\n\
    \        print(\"Drawing a Triangle\")\n\nfrom Circle import Circle\nfrom Triangle\
    \ import Triangle\n\n#create a circle object\ncircle = Circle()\ncircle.draw()\n\
    \n#create a triangle object\ntriangle = Triangle()\ntriangle.draw()\n```\n\nThe\
    \ importance of abstract classes in Python is stated below:\n\n- The abstract\
    \ class acts as a blueprint for the creation of further classes. In the case of\
    \ an abstract class, you may build a generic structure without providing entire\
    \ implementations for all of the methods. In an abstract class, concrete methods\
    \ are defined as methods that offer common functionality that all derived classes\
    \ may utilize, while abstract methods are defined as methods whose implementation\
    \ may differ from that of the concrete methods.\n- Since abstract classes cannot\
    \ be instantiated, it is not feasible to build objects that are instances of abstract\
    \ classes.\n- Ordinarily, abstract methods declared in an abstract class do not\
    \ have a body, but it is viable to develop abstract methods that have an implementation\
    \ in the abstract class. It is still necessary for every subclass inheriting from\
    \ such an abstract class and provide the implementation for the abstract methods.\n\
    - The Python interpreter raises an exception if the derived class does not define\
    \ any generic method.\n- Abstract classes may have concrete and abstract methods,\
    \ which can be combined.\n\n## 11.1.7: Partial Class\n\nPython has a useful package\
    \ called functools that is designed to be entertaining. The partial class is one\
    \ of the classes in this hierarchy. It may be used to build a new function that\
    \ applies just a portion of the parameters and words you supply. It is possible\
    \ to \"freeze\" a piece of your methods arguments or keywords using the partial\
    \ keyword, which creates a new object. Another way to say it is that it partially\
    \ generates a new method with a few defaults in its parameters.\n\nThis section\
    \ will develop a simple addition function that produces the sum of its two inputs,\
    \ x, and y. Following that, we create a new callable by making an object of partial\
    \ and handing it our function and input for that function to execute. In other\
    \ words, we are essentially setting the value of the x argument of our addition\
    \ function to integer 2 by default. We next call our new callable, p_addition,\
    \ with the number 4, which results in the 6 since 3 + 4 = 7 due to the addition.\n\
    \n```python\nfrom functools import partial\n\ndef addition(x, y):\n    return\
    \ x + y\n\np_addition = partial(addition, 3)\np_addition(4)\n```\n\n## 11.1.8:\
    \ Python Concrete Class\n\nAbstract classes may have concrete and abstract methods,\
    \ which can be combined. Concrete methods are available exclusively in function\
    \ Object() classes, but abstract methods are available in both concrete and abstract\
    \ methods. However, although the concrete Class is responsible for implementing\
    \ abstract methods, the abstract class may also do so by starting the methods\
    \ via super().\n\n## 11.1.9: Class Advantages over Functions\n\n- When you use\
    \ functions, they are placed at the top of your code, and the data you provide\
    \ to the functions may be located anywhere throughout the program. When a program\
    \ grows too lengthy, it becomes difficult to supervise. Classes allow you to tie\
    \ specific data to specific functions, allowing you to keep everything in one\
    \ place.\n- The fundamental premise of object orientation is that types (classes)\
    \ serve as the focal point of modularity, instead of procedures or functions,\
    \ rather than processes and functions.\n- The fact that it is very adaptable is\
    \ one of its advantages. The type is represented, but there are no members in\
    \ it. Any function has the authority to determine which fields should be included.\
    \ Different invocations of this class may generate objects of this kind, populated\
    \ in various ways.\n\n## 11.2: OBJECTS\n\n### 11.2.1: Introduction to Objects\n\
    \nWhen it comes to Python, classes are merely logical entities that act as a prototype\
    \ or template for creating objects, whereas an object is a group of variables\
    \ and Python methods. Parameters and functions are declared inside a class and\
    \ are accessible via object references. Attributes are a term used to refer to\
    \ a collection of variables and functions. Objects are simple collections of data\
    \ (parameters) and ways (functions) that operate on the data in a collection of\
    \ variables. Class definitions are similar to that of an object definition.\n\n\
    To better comprehend the notion of Python objects and classes, let's look at an\
    \ example. One way to think about an object is to be an ordinary everyday item,\
    \ such as a vehicle. As previously described, we know that a class has data and\
    \ functions specified inside it. These data and functions may be deemed characteristics\
    \ and behaviors of the object, respectively, based on their placement within the\
    \ class. The characteristics (data) of the automobile (object) include its color,\
    \ price, number of doors, etc. Car (object) actions (functions) include moving\
    \ at a certain speed, using the brakes, and so on. An object class allows for\
    \ creating several objects, each having its own set of data and methods associated\
    \ with it.\n\nPreviously, we learned that class objects could be used to retrieve\
    \ various characteristics.\n\nIt may also be used to generate new object instances\
    \ (instantiations) of a class that has been defined before. The technique for\
    \ creating an object is identical to calling a function.\n\n```python\nTom = Dog()\n\
    ```\n\nThis will result in creating a new individual object with the name Tom.\
    \ The characteristics of objects may be accessed by using the prefix of the object's\
    \ name.\n\nData or a procedure may be used as attributes. An object's procedures\
    \ correspond to the equivalent functionalities of the object's class.\n\n### 11.2.2:\
    \ Object Instantiation\n\nWhenever we declare a class, we create a representation\
    \ or a blueprint for the described thing. There are no modes until we construct\
    \ the object that will"
  mdcn: "## 11.1.5：类的类型\n\nPython 中存在许多不同种类的类，以下是一些示例：\n\n## 11.1.6：抽象类\n\n在面向对象编程中，抽象是一种用于将类的内部功能隐藏起来、不让用户看到的概念。在这种情况下，用户了解类方法的目的，但不知道这些方法是如何实现该目的的，这意味着他们知道输入和预期的输出，但方法的内部工作原理对他们来说是隐藏的。\n\
    \n抽象类用于在程序中实现抽象。在 Python 中，通常创建抽象类来定义一种必须由基于该抽象类构建的任何子类实现的方法。类似地，抽象方法是一种没有任何关联实现的方法。\n\
    \n抽象方法强制子类在其自身的实例中包含这些方法的实现，这有助于实现抽象，因为每个子类都可以提供自己的方法实例。一个抽象类包含多个抽象方法和许多具体方法。\n\
    \n日常生活中可以看到这方面的例子，比如当我们点击电视上的按钮来换台时。我们并不关心遥控器是如何做到的；我们只关心当我们点击某个按钮时，频道会改变！\n\n\
