    \ __init__` 并不包含我们对象所有可能属性的完整列表。\n在某些语言中，由于类定义要求你提供对象属性的列表，因此在对象形成后可能无法向其添加额外的属性。Python\
    \ 中的对象可以通过添加额外的属性和函数来动态增强。实际上，`__init__` 方法与属性设置无关。可以使用 `age` 函数缓存对象的年龄：\n\n```python\n\
    def Age(self):\n    if attribute(self, \"_age\"):\n        return self._age\n\
