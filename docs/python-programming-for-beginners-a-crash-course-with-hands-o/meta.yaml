    ### Implementation of LifoQueue using a list


    The list data structure included with Python may be utilized as a stack. Instead
    of pushing items to the top of the stack, append() adds them to the top of the
    stack, whereas pop() removes them in LIFO order.


    Regrettably, the list contains a few inaccuracies. The primary disadvantage is
    that it may encounter speed challenges as it expands. Because the list elements
    are kept next to one another in memory, if the stack becomes larger than the block
    of memory presently holding it, Python must perform memory allocations. As a result,
    some add() calls may take much longer than others.


