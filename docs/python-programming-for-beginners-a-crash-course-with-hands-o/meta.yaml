    \ the different lines, you must insert the newline characters ourselves.\n\n###\
    \ 10.4: OPENING & READING TEXT FILES BY BUFFER SIZE\n\nBy setting buffer size\
    \ in the read function, you may read a file with a restricted buffer. It reads\
