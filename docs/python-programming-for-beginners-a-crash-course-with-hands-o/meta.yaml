    The tree not a complete binary tree\")\n```\n\n输出：\n\n# The tree complete binary\
    \ tree\n\n### 满二叉树\n\n满二叉树是指每个内部节点恰好有两个子节点，并且所有叶子节点都处于同一层级的二叉树。所有内部节点的度数为 2。\n\
    满二叉树可以作为递归的准确且有用的信息：\n\n1. 当单个节点没有子节点时，形成高度 h = 0。\n2. 如果一个节点的两个子树也都是高度 h - 1\
