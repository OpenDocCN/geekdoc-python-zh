    ## CHAPTER 1


    ## INTRODUCTION TO PYTHON


    ![](img/97870751f4132139063aaf46bfceb248_11_0.png)


    ## 1.1: PYTHON AND ITS HISTORY


    Python is an object-oriented programming, high-level language with powerful semantics
    that can be interpreted. It incorporates high-level data structures, dynamic binding,
    dynamic typing, and various other characteristics that make it as effective for
    developing complex applications as it is for scripting or "glue code" that ties
    components together. Python''s straightforward, easy-to-learn syntax places a
    premium on readability, which lowers the cost of program maintenance. Python allows
    modules and packages, promoting the modularity and reuse of code in programs.
    Additionally, it may be modified to make system calls to nearly all operating
    systems and execute C or C++ programs. Python is a popular language that runs
    on almost every system architecture and is used in a wide range of diverse applications
    due to its ubiquity and ability to operate on nearly every system architecture.


    History was going to be written in the late 1980s. It was around this period that
    the development of Python began. Guido Van Rossum started his application-based
    work in December 1989 at the Netherlands'' Centrum Wiskunde and Informatica (CWI).
    It began as a hobby project since he sought something fascinating to keep him
    engaged throughout the Christmas season. Python is supposed to have succeeded
    the ABC Programming Language, which interfaced with the Amoeba Operating System
    and included exception handling. He had previously assisted in creating ABC earlier
    in his career, and although he saw certain flaws in the network, he admired the
    majority of its qualities. Following that, what he did was quite intelligent.
    He had appropriated ABC''s syntax and some of its advantageous qualities. It drew
    much criticism, so he resolved those faults fully and built a solid scripting
    language that was free of errors. The name was inspired by the BBC television
    program ''Monty Python''s Flying Circus'' since he was a huge admirer of the show
    and desired a short, distinctive, and somewhat mysterious name for his creation,
    therefore naming it Python! Guido Van Rossum was the "Benevolent dictator for
    life (BDFL)" until 12th July 2018, when he resigned as leader. He formerly worked
    for Google but is now employed by Dropbox.


    In 1991, the language was eventually launched. When it was launched, it required
    far fewer code lines to describe ideas compared to Java, C++, and C. Additionally,
    its design concept was extremely excellent. Its primary goal is to improve code
    readability and developer productivity. When it was published, it was more than
    capable of providing an inheritance for classes, numerous essential data types,
    exception handling, and functions.


    Python, one of the most commonly utilized programming languages worldwide, has
    been used to construct everything from Netflix''s recommendation system to the
    software that runs self-driving vehicles. It is a general-purpose language, which
    implies that it is intended for various applications, including data research,
    software and automation, web development, and general task completion. It is a
    programming language for computers that are often used to create websites and
    applications, automate operations, and undertake data analysis. It is a general-purpose
    language, which means that it may be used to develop a wide range of applications
    and is not specialized for any particular task. This flexibility, along with its
    accessibility to beginners, has helped make it one of the most widely used programming
    languages today. It is the 3rd most common programming language in the world because
    it is easy to learn and easy to use; it has a simple, straightforward syntax that
    is more English-like and is an open-source language that is very versatile. There
    are several reasons to learn Python, as python developers are in much demand.
    It could lead to a well-paid career and offer many job opportunities, given that
    it can be used in many evolving technologies, such as artificial intelligence,
    data analytics, and machine learning.


    ## 1.2: HOW TO INSTALL THE INTERPRETER


    ### Installation Steps for Windows


    - Step 1: Choose a Python version to download and install the Full Installer


    On Windows, you have the option of 32-bit (labeled x86) or 64-bit (labeled x86–64)
    versions, as well as many installer variants for each. Find the Latest Python
    3 Release — Python 3.9.4 — under the Python Releases for Windows.


    - Step 2: Install Python Executable Installer


    To open the following window, double-click the downloaded executable file. Proceed
    by selecting Customize installation. The Python path is automatically specified
    by checking the Add Path check box.


    1. Once downloaded, run the Python Installer.

    2. Ensure that the checkboxes for "Install launcher for all users" and "Add Python
    3.9 to PATH" are selected.

    3. Select “Install Now” from the recommended installation options.


    ![](img/97870751f4132139063aaf46bfceb248_15_0.png)


    - Step 3: Wait for it to finish the installation procedure.


    The following dialogue box will ask you to disable the path length limit. By selecting
    this option, Python will exceed the 260-character MAX PATH limit. In practice,
    this allows Python to utilizing symbolic path names.


    ![](img/97870751f4132139063aaf46bfceb248_16_0.png)


    The option to Disable the route length limit does not affect any other system
    settings. The possible name length problems with Python projects will be resolved
    by enabling it.


    - Step 4: Verification of Python''s installation on Windows


    1. Open command prompt in your system

    2. Run “Python-V”


    ![](img/97870751f4132139063aaf46bfceb248_17_0.png)


    ### Installation Steps for macOS


    - Step 1: Visit the Downloads page in a new browser window. To obtain the most
    recent version of Python, click the download button.


    ![](img/97870751f4132139063aaf46bfceb248_17_1.png)


    - Step 2: Select "Allow" when prompted to allow downloads from “www.python.org.”

    - Step 3: Open up a new Finder window (the keyboard shortcut is Command + n) and
    click on the sidebar for "Downloads." Then double-click on the Python package
    to install it.


    ![](img/97870751f4132139063aaf46bfceb248_18_0.png)


    - Step 4: This launches the Python Installer. Click the "Continue" button.


    ![](img/97870751f4132139063aaf46bfceb248_19_0.png)


    - Step 5: Following that is various displays. On the Read Me page, click "Continue."

    - Step 6: Following that comes to the License page. A pop-up window will appear
    by clicking "Continue," requesting your agreement to the conditions. Select "Agree."

    - Step 7: Python will be saved to your disc during the standard installation.
    To begin, click the "Install" button.'
  mdcn: 'Python。Python 强大的工具和框架是数据科学、Web 开发到机器学习等一切领域的核心。像 Java 和 C++ 这样的编程语言，虽然更适合服务器端应用，但不适合开发脚本或简单脚本等基础任务，它们不如
    Python 通用，因为 Python 拥有广泛的库和强大的社区。通过快速、全面地学习 Python，你可以在几周内开始开发程序、解决问题并制作出可运行的东西。


    本书涵盖了关于 Python 编程你需要知道的一切，包括数据类型以及它们如何与相应的运算符和语句交互。本书介绍了 Python 数据结构和技术、面向对象编程以及排序算法，无需你花费大量时间学习计算机科学理论。如果你是
    Python 新手，这本书是一个很好的起点。


    此外，你还将获得基于 Python 的游戏开发项目的实践知识。将工作与娱乐结合起来，你也能更容易地回忆起所学内容。这本书对于该领域的初学者和中级水平的人来说都非常出色。


    ## 第 1 章


    ## Python 简介


    ![](img/97870751f4132139063aaf46bfceb248_11_0.png)


    ## 1.1：Python 及其历史


    Python 是一种面向对象的、高级的、具有强大语义的可解释编程语言。它融合了高级数据结构、动态绑定、动态类型等多种特性，使其既能用于开发复杂应用程序，也能用于脚本编写或连接组件的“胶水代码”。Python
    简洁易学的语法注重可读性，从而降低了程序维护的成本。Python 支持模块和包，促进了程序中代码的模块化和重用。此外，它还可以被修改以对几乎所有操作系统进行系统调用，并执行
    C 或 C++ 程序。Python 是一种流行的语言，几乎可以在所有系统架构上运行，并因其普遍性和在几乎所有系统架构上运行的能力而被广泛应用于各种不同的领域。


    历史即将在 20 世纪 80 年代末被书写。Python 的开发大约始于这个时期。Guido Van Rossum 于 1989 年 12 月在荷兰的 Centrum
    Wiskunde and Informatica (CWI) 开始了他的基于应用的工作。它最初是一个业余项目，因为他想找点有趣的事情来打发整个圣诞假期。Python
    据说是 ABC 编程语言的后继者，ABC 语言与 Amoeba 操作系统接口并包含异常处理。他早年职业生涯中曾协助开发过 ABC，尽管他看到了该网络的一些缺陷，但他欣赏其大部分优点。之后，他做了一件非常聪明的事情。他借鉴了
    ABC 的语法和一些优点。这招致了很多批评，因此他完全解决了这些缺陷，并构建了一个没有错误的健壮的脚本语言。这个名字的灵感来源于 BBC 电视节目《蒙提·派森的飞行马戏团》，因为他是该节目的忠实粉丝，并希望为他的创作起一个简短、独特且略带神秘感的名字，因此将其命名为
    Python！Guido Van Rossum 在 2018 年 7 月 12 日辞去领导人职务之前，一直是“终身仁慈独裁者（BDFL）”。他曾在 Google
    工作，但现在受雇于 Dropbox。


    1991 年，该语言最终发布。发布时，与 Java、C++ 和 C 相比，它需要更少的代码行来描述想法。此外，它的设计理念非常出色。其主要目标是提高代码可读性和开发人员生产力。发布时，它已经能够提供类的继承、多种基本数据类型、异常处理和函数。


    Python 是全球最常用的编程语言之一，已被用于构建从 Netflix 的推荐系统到运行自动驾驶汽车的软件等一切事物。它是一种通用语言，这意味着它旨在用于各种应用，包括数据研究、软件和自动化、Web
    开发以及完成一般任务。它是一种计算机编程语言，通常用于创建网站和应用程序、自动化操作和进行数据分析。它是一种通用语言，这意味着它可以用于开发广泛的应用程序，而不专门用于任何特定任务。这种灵活性，加上它对初学者的易用性，使其成为当今使用最广泛的编程语言之一。它是世界上第三大最常用的编程语言，因为它易于学习和使用；它具有简单、直接的语法，更接近英语，并且是一种非常通用的开源语言。学习
    Python 有很多理由，因为 Python 开发人员需求量很大。鉴于它可以用于人工智能、数据分析和机器学习等许多不断发展的技术，它可能会带来高薪职业并提供许多工作机会。


    ## 1.2：如何安装解释器


    ### Windows 安装步骤


    - 步骤 1：选择要下载和安装的 Python 版本，选择完整安装程序


    在 Windows 上，你可以选择 32 位（标记为 x86）或 64 位（标记为 x86–64）版本，以及每个版本的多种安装程序变体。在“Python Releases
    for Windows”下找到最新的 Python 3 版本 — Python 3.9.4。


    - 步骤 2：安装 Python 可执行安装程序


    双击下载的可执行文件以打开以下窗口。通过选择“自定义安装”继续。通过勾选“Add Path”复选框，Python 路径会自动指定。


    1. 下载完成后，运行 Python 安装程序。

    2. 确保选中“为所有用户安装启动器”和“将 Python 3.9 添加到 PATH”的复选框。

    3. 从推荐的安装选项中选择“立即安装”。


    ![](img/97870751f4132139063aaf46bfceb248_15_0.png)


    - 步骤 3：等待安装过程完成。


    以下对话框将要求你禁用路径长度限制。选择此选项后，Python 将超过 260 个字符的 MAX PATH 限制。实际上，这允许 Python 使用符号路径名。


    ![](img/97870751f4132139063aaf46bfceb248_16_0.png)


    禁用路径长度限制的选项不会影响任何其他系统设置。启用它将解决 Python 项目可能存在的名称长度问题。


    - 步骤 4：在 Windows 上验证 Python 的安装


    1. 在系统中打开命令提示符

    2. 运行 “Python-V”


    ![](img/97870751f4132139063aaf46bfceb248_17_0.png)


    ### macOS 安装步骤


    - 步骤 1：在新的浏览器窗口中访问下载页面。要获取最新版本的 Python，请单击下载按钮。


    ![](img/97870751f4132139063aaf46bfceb248_17_1.png)


    - 步骤 2：当提示允许从 “www.python.org” 下载时，选择“允许”。

    - 步骤 3：打开一个新的 Finder 窗口（键盘快捷键是 Command + n），然后单击侧边栏中的“下载”。然后双击 Python 包进行安装。


    ![](img/97870751f4132139063aaf46bfceb248_18_0.png)


    - 步骤 4：这将启动 Python 安装程序。单击“继续”按钮。


    ![](img/97870751f4132139063aaf46bfceb248_19_0.png)


    - 步骤 5：接下来是各种显示。在“自述文件”页面上，单击“继续”。

    - 步骤 6：接下来是“许可”页面。单击“继续”将出现一个弹出窗口，要求你同意条款。选择“同意”。

    - 步骤 7：Python 将在标准安装过程中保存到你的磁盘。要开始，请单击“安装”按钮。'
