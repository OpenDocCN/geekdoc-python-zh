    \"\"\"\n        2\n       / \\\n      9   1\n     / \\ / \\\n    4  None None\
    \ None\n   /\n  None None\"\"\"\n```\n\n## Types of Binary Trees\n\n### Full Binary\n\
    \nBinary Tree in its Full Form, if each node has 0 or 2 offspring, it is called\
    \ a complete binary tree. A whole binary tree is shown in the examples below,\
    \ where all nodes have two offspring except the leaf nodes.\n\n```python\nclass\
    \ Node:\n    def __init__(self, item):\n        self.item = item\n        self.leftnode\
    \ = None\n        self.rightnode = None\ndef FullTree(root):\n    # Tree in empty\
    \ case\n    if root is None:\n        return True\n    # Check if child present\n\
    \    if root.leftnode is None and root.rightnode is None:\n        return True\n\
    \        if root.leftnode is not None and root.rightnode is not None:\n#recursively\
    \ call to check for every node\n            return (FullTree(root.leftnode) and\
    \ FullTree(root.rightnode))\n        return False\nroot = Node(2) #creating tree\n\
    root.rightChild = Node(4)\nroot.leftChild = Node(3)\nroot.leftChild.leftChild\
    \ = Node(5)\nroot.leftChild.rightChild = Node(6)\nroot.leftChild.rightChild.leftChild\
    \ = Node(7)\nroot.leftChild.rightChild.rightChild = Node(8)\nif FullTree(root):\
    \ #if true returned\n    print(\"tree is a full binary tree\")\nelse: #if false\
    \ returned\n    print(\"tree is not full binary tree\")\n```\n\n### Complete Binary\n\
    \nWhen each and every level is entirely filled, with the exception of the lowest,\
    \ which is possibly filled from the left, it is similar to a full binary tree,\
    \ but there are two significant distinctions.\n\n- A complete binary tree is not\
    \ always a full binary tree because the last leaf element may not have the right\
    \ sibling.\n- The leaf components must all slant to the left.\n\nCode:\n\n```python\n\
    # Checking if complete\nclass Node:\n\n    def __init__(self, item):\n       \
    \ self.item = item\n        self.left = None\n        self.right = None\n    def\
    \ count(root): #count the nodes\n        if root is None:\n            return\
    \ 0\n        return (1 + count(root.left) + count(root.right))#recursive call\
    \ to count\n    # Check if complete\n    def complete(root, index, numberNodes):\
    \ #pass parameters root index and number of nodes in tree\n        # in case tree\
    \ is empty\n        if root is None:\n            return True\n        if index\
    \ >= numberNodes: #if the index is greater than total number of nodes\n      \
    \      return False\n        return (complete(root.left, 2 * index + 1, numberNodes)#otherwise\
    \ return recursive call\n                and complete(root.right, 2 * index +\
    \ 2, numberNodes))\n\n    root = Node(2) #create tree\n    root.left = Node(3)\n\
    \    root.right = Node(4)\n    root.left.left = Node(5)\n    root.left.right =\
    \ Node(6)\n    root.right.left = Node(7)\n    node_count = count(root)\n    index\
    \ = 0\n    if complete(root, index, node_count):\n        print(\"The tree complete\
    \ binary tree\")\n    else:\n        print(\"The tree not a complete binary tree\"\
    )\n```\n\nOutput:\n\n# The tree complete binary tree\n\n### Perfect Binary\n\n\
    A perfect binary tree is one in which each internal node has precisely two child\
    \ nodes, and all leaf nodes would be at the same level. A degree of 2 is assigned\
    \ to all internal nodes.\nA perfect binary tree can be accurate and useful information\
    \ as recursion:\n\n1. height h = 0 is formed when a single node has no offspring.\n\
    2. If both of a node's subtrees are also of height h - 1 and are non-overlapping.\n\
    \n### Perfect Binary Tree Theorems\n\n- height h has $2^{h+1} - 1$ node.\n- The\
    \ average depth of a node is $\\Theta(\\ln(n))$.\n- n nodes have height $\\log(n+1)\
    \ - 1 = \\Theta(\\ln(n))$.\n- height h has $2^h$ leaf nodes.\n\nCode:\n\n```python\n\
    # if a binary tree is perfect\nclass newNode:\n    def __init__(self, k):\n  \
    \      self.key = k\n        self.right = self.left = None\n\n# To calculate depth\n\
    def calcDepth(node):\n    a = 0\n    while (node is not None):\n        a += 1\n\
