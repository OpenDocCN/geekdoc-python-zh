    ## 2.4: BASIC OPERATORS


    Operators are constructs that allow for the manipulation of operands'' values.


    Example:


    ```python

    >>> 2+3

    ```


    Output:


    ```

    5

    ```


    Here “+” is the addition operator. 2 and 3 are the operands, whereas 5 is the
    operation''s outcome.


    There are different kinds of operators in Python, which are listed below:


    ### Arithmetic Operators


    Arithmetic operators are used to performing mathematical operations such as addition,
    subtraction, multiplication, etc.


    Example:


    ```python

    # Examples of Arithmetic Operator

    a = 9

    b = 4

    # Addition of numbers

    add = a + b

    # Subtraction of numbers

    sub = a - b

    # Multiplication of number

    mul = a * b

    # Division(float) of number

    div1 = a / b

    # Division(floor) of number

    div2 = a // b

    # Modulo of both number

    mod = a % b

    # Power

    p = a ** b

    # print results

    print(add)

    print(sub)

    print(mul)

    print(div1)

    print(div2)

    print(mod)

    print(p)

    ```


    Output:


    ```

    13

    5

    36

    2.25

    2

    1

    6561

    ```


    ### Comparison Operators


    Relational operators perform comparisons on values. It yields either True or False
    depending on the criteria.


    Example:


    ```python

    # Examples of Relational Operators

    a = 13

    b = 33

    # a > b is False

    print(a > b)

    # a < b is True

    print(a < b)

    # a == b is False

    print(a == b)

    # a != b is True

    print(a != b)

    # a >= b is False

    print(a >= b)

    # a <= b is True

    print(a <= b)

    ```


    Output:


    ```

    False

    True

    False

    True

    False

    True

    ```


    ### Logical Operators


    Logical operators execute the operations Logically AND, Logical OR, and Logical
    NOT. It is used to group conditional statements.


    Example:


    ```python

    # Examples of Logical Operator

    a = True

    b = False

    # Print a and b is False

    print(a and b)

    # Print a or b is True

    print(a or b)

    # Print not a is False

    print(not a)

    ```


    Output:


    ```

    False

    True

    False

    ```


    ### Bitwise Operators


    Bitwise operators operate on bits and execute actions bit by bit. These are used
    to perform binary number operations.


    Example:


    ```python

    # Examples of Bitwise operators

    a = 10

    b = 4

    # Print bitwise AND operation

    print(a & b)

    # Print bitwise OR operation

    print(a | b)

    # Print bitwise NOT operation

    print(~a)

    # print bitwise XOR operation

    print(a ^ b)

    # print bitwise right shift operation

    print(a >> 2)

    # print bitwise left shift operation

    print(a << 2)

    ```


    Output:


    ```

    0

    14

    -11

    14

    2

    40

    ```


