- md: "## CHAPTER 10\n\n## WORKING WITH FILES\n\n### 10.1: OPENING AND READING TEXT\
    \ FILES\n\nHow to Open a Text File:\nYou must use the built-in \"open\" function\
    \ to open a file. The Python files open function provides a file object with methods\
    \ and properties that may be used to conduct different file operations in Python.\
    \ The open file method in Python has the following syntax:\n\nSyntax:\n`file_object\
    \ = open(\"filename\", \"mode\")`\n\nHere, “filename” gives the name of the file\
    \ that the file object has opened, and “mode” is the attribute of a file object\
    \ that tells you which mode a file was opened in.\n\nHow to Read Files:\nIn Python,\
    \ you may read a file by calling it in \"read mode\" (r).\n\nStep 1:\nOpen file\
    \ in read mode:\n`f = open(\"myfile.txt\", \"r\")`\n\nStep 2:\nThe mode function\
    \ is utilized in the code to verify if the file is in open mode. If that's the\
    \ case, you can go on to the next step:\n`if f.mode == 'r':`\n\nStep 3:\nFor accessing\
    \ files in Python, use f.read to read data from a file and put it in a variable\
    \ called content.\n`contents = f.read()`\n\nStep 4:\nFor a Python read text file,\
    \ print the contents.\n\nExample:\n```python\ndef main():\n    f = open(\"myfile.txt\"\
    , \"r\")\n    if f.mode == \"r\":\n        contents = f.read()\n        print(contents)\n\
    \nif __name__ == \"__main__\":\n    main()\n```\n\nOutput:\n```\nThis is a Python\
    \ text file 1\n\nThis is a Python text file 2\n\nThis is a Python text file 3\n\
    ```\n\nHow to Read a File Line by Line:\nIf your.txt file is too large to read,\
    \ you can read it line by line. The readlines() function separates your data into\
    \ easy-to-read sections.\n\nExample:\n```python\ndef main():\n    f = open(\"\
    myfile.txt\", \"r\")\n    f1 = f.readlines()\n    for x in f1:\n        print(x)\n\
    \nif __name__ == \"__main__\":\n    main()\n```\n\nOutput:\n```\nThis is a Python\
    \ text file 1\n\nThis is a Python text file 2\n\nThis is a Python text file 3\n\
    ```\n\nWhen you run code (`f1 = f.readlines()`) in Python to read a file line\
    \ by line, it separates each line and displays the file legibly; because the line\
    \ is short & readable in our scenario, the output will resemble the read mode,\
    \ this piece of code, however, might be beneficial if there is a complicated data\
    \ file that is not understandable.\n\n### 10.2: USING A FOR LOOP TO READ TEXT\
    \ FILES\n\nWhen the open() procedure is used to start a file, it returns an iterable\
    \ object. Iterating through a file object in for loop is the ultimate method of\
    \ reading in a file line by line. You're utilizing a built-in Python method that\
    \ allows us to iterate through file object implicitly using for loop in conjunction\
    \ with the iterable object in this way. This method requires fewer lines of code,\
    \ which is usually a good habit to follow.\n\nExample:\n```python\n# Python program\
    \ to\n# demonstrate reading files\n# using for loop\nL = [\"Python\\n\", \"Text\\\
    n\", \"File\\n\"]\n# Writing to file\nfile1 = open('myfile.txt', 'w')\nfile1.writelines(L)\n\
    file1.close()\n# Opening file\nfile1 = open('myfile.txt', 'r')\ncount = 0\n# Using\
    \ for loop\nprint(\"Using for loop\")\nfor line in file1:\n    count += 1\n  \
    \  print(\"Line{}: {}\".format(count, line.strip()))\n# Closing files\nfile1.close()\n\
    ```\n\nOutput:\n```\nUsing for loop\nLine1: Python\nLine2: Text\nLine3: File\n\
    ```\n\n### 10.3: WRITING TO A TEXT FILE\n\nTo write into a file in Python, you\
    \ must open it in write \"w,\" append \"a,\" and exclusive creation \"x\" mode.\
    \ Because the \"w\" mode will overwrite a file that already exists, it should\
    \ be used with caution. As a consequence, all previous information is erased.\
    \ To produce a string/series of bytes, use the write() method. This function returns\
    \ the no. of characters written to the file.\n\nExample:\n```python\nwith open(\"\
    test.txt\", 'w', encoding='utf-8') as f:\n    f.write(\"my first file\\n\")\n\
    \    f.write(\"This file\\n\\n\")\n    f.write(\"contains three lines\\n\")\n\
