    \ and data means of a process with an instantiation class/object may be disguised\
    \ via Encapsulation.\n\n### 11.4.2: Encapsulation in Python\n\nThroughout all\
    \ object-oriented programming languages, Encapsulation is just the same principle.\
    \ Whenever the notions are linked to individual language, the gap becomes noticeable.\
