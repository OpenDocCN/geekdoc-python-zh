    # 11.5.4: Syntax Inheritance


    Inheritance is the ability for a new class category to inherit the attributes
    and behaviors of an existing class. The class from which inheritance is derived
    is referred to as the parent class. A child class is any class that derives from
    a base class in the Java programming language.


    Child classes not only inherit all of their parent class''s properties and methods,
    but they also have the ability to expand or rewrite them.


    The following is the standard syntax for class Inheritance:


    ```

    class Base_Class:

    #Base class body

    class Derived_Class(Base_Class):

    #Derived class body

    ```


