  md: '# 10.5: OPENING, READING, AND WRITING BINARY FILES


    Write a Binary File:

    You must first write a file before you can read it. The file gets opened using
    file = open("document.bin","wb"), and the binary file is written using the "wb"
    mode. The name of the file is document.bin. "This is nice" has been assigned to
    a variable in the form of a sentence. sentence = bytearray("This is excellent")
    is used to decode the sentence. The function encodes ("ASCII") has been used.
    The file.write() function was used to save the sentence to the file. The write()
    method is used to save a file with the provided text. The file.close() function
    was then used to close the file.


    Example:


    ```

    file = open("document.bin","wb")

    sentence = bytearray("This is good".encode("ascii"))

    file.write(sentence)

    file.close()

    ```


    Read a Binary File:

    To read the file, take the document.bin file that has already been prepared &
