    \ perfect(root, d, level=0):\n    # in empty tree case\n    if (root is None):\n\
    \        return True\n    # presence of trees\n    if (root.left is None and root.right\
    \ is None):\n        return (d == level + 1)\n    if (root.left is None or root.right\
    \ is None):\n        return False\n    return (perfect(root.left, d, level + 1)\
    \ and\n            perfect(root.right, d, level + 1))\n\nroot = None\nroot = newNode(2)\n\
    root.left = newNode(3)\nroot.right = newNode(4)\nroot.left.left = newNode(5)\n\
    root.left.right = newNode(6)\nif (perfect(root, calcDepth(root))):\n    print(\"\
    The tree is perfect binary tree\")\nelse:\n    print(\"The tree not perfect\"\
    )\n```\n\n### Balanced Binary\n\nThe height is balanced if it is O(log n), where\
    \ n is the total number of nodes. The AVL tree, for example, maintains O(log n)\
    \ height by ensuring that the height difference between the left and right subtrees\
    \ is no more than 1. Red-Black trees keep their height constant by ensuring that\
    \ the proportion of nodes on each root-to-leaf path is the same and that no neighboring\
    \ red nodes exist. Even Binary Search trees provide high performance since they\
    \ search, insert, and delete in O(log n) time.\nThe criteria for a height-balanced\
    \ binary tree are as follows:\n\n- The left subtree is balanced\n- The other subtree\
    \ is balanced.\n- If there is no more than one variation between the left and\
    \ right subtrees for every node\n\nCode:\n\n```python\n# Checking if balance\n\
    class Node:\n    def __init__(self, data):\n        self.data = data\n       \
    \ self.left = self.right = None\nclass Height: #class for height checking\n  \
    \  def __init__(self):\n        self.height = 0\ndef HeightBalanced(root, height):\n\
    \    left_height = Height()#height for both sides of tree\n    right_height =\
    \ Height()\n    if root is None:#if empty\n        return True\n    left = HeightBalanced(root.left,\
    \ left_height)#recursively call to find\n    right = HeightBalanced(root.right,\
    \ right_height)\n```"
  mdcn: "## 12.3：非线性数据结构\n\n本节讲解树等非线性数据结构。\n\n## 12.3.1：树\n\n这是一种每个成员最多有两个子节点的树结构。由于每个元素最多只能有两个子节点，它们通常被称为左子节点和右子节点。\n\
    \n组成部分：\n\n- 数据\n- 指向右子节点的指针\n- 指向左子节点的指针\n\n树的根节点是最高层的节点。紧接在某个元素下方的组件被称为其子节点。其父节点是正好位于它上方的元素。例如，'a'\
