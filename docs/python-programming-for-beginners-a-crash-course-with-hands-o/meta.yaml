- md: "## 1.3: HOW TO USE THE PYTHON SHELL, IDLE, AND WRITE YOUR FIRST PROGRAM\n\n\
    ### Python Shell\n\nOnce open, execute python3 on the command line to invoke the\
    \ Python interpreter. When the prompt >>> appears, you know it is functioning.\
    \ Type print(\"Hello, World\") to confirm. Python is a coding dialect that runs\
    \ on an interpreter. That is, it runs the code line by line. Python includes a\
    \ Python Shell that may perform a single Python command and show the result.\n\
    \nAdditionally, it is referred to as REPL (Read, Evaluate, Print, Loop) since\
    \ it reads the command, evaluates it, publishes the result, and then loops back\
    \ to read the command again. To start the Python Shell, open the power shell or\
    \ command prompt on Windows or a terminal window on Mac, type python, and then\
    \ press enter. As seen below, a Python Prompt with three greater-than symbols\
    \ >>> displays.\n\nNow, you can submit a single statement and get the output.\
    \ For instance, input a basic formula such as 3 + 2 and hit enter; the result\
    \ will appear on the next line, as seen below.\n\n### Python IDLE\n\nPython IDLE's\
    \ default mode of operation is the shell. When you double-click the program's\
    \ icon to launch it, the shell is the very first thing you see. This is a new\
    \ Python interpreter window with no content. You may use it instantly to begin\
    \ interacting with Python. You may verify it with the following piece of code:\n\
    \nYou used print() to print the string \"Hello, from IDLE!\" on the screen in\
    \ this case. This is the simplest method of interacting with Python IDLE. You\
    \ enter commands one by one, and Python returns the results of each command. Following\
    \ that, examine the menu bar. You'll see many choices for interacting with the\
    \ shell:\n\nThis menu allows you to restart the shell. If you choose that option,\
    \ the shell's state will be cleared. It will behave as though you've launched\
    \ a new instance of Python IDLE. The shell will completely forget about its initial\
    \ state:\n\nIn the example shown above, you define a variable, x = 5. When you\
    \ use print(x), the shell outputs the proper value, which is 5. However, when\
    \ the shell is restarted, and print(x) is attempted again, the shell produces\
    \ a traceback. This error message tells the user that the variable x is undefined.\
    \ The shell has forgotten everything that occurred before being restarted.\n\n\
    Additionally, you may pause the shell's execution from this menu. This will terminate\
    \ any program or statement that is currently executing in the shell. Consider\
    \ the following when you send an interrupt from the keyboard to the shell:\n\n\
    ```\n>>> while True:\n        print('infinite')\n\ninfinite\ninfinite\ninfinite\n\
    infinite\ninfinite\ninfinite\ninfinite\ninfinite\ninfinite\ninfinite\ninfinite\n\
    infinite\ninfinite\ninfinite\ninfinite\ninfinite\ninfinite\ninfiniteTraceback\
    \ (most recent call last):\n  File \"<pyshell#2>\", line 2, in <module>\n    print('infinite')\n\
    KeyboardInterrupt\n```\n\nAt the bottom of your window, a Keyboard Interrupt error\
    \ notice is shown in red text. The program has halted execution as a result of\
    \ the interrupt.\n\n### Writing Your First Program\n\n1. IDLE is the Python environment\
    \ that will be used to write programs. Look for the item \"IDLE (Python 3.5 32-bit)\"\
    \ under Python 3.5 in the Programs list.\n2. The IDLE shell window is shown. Again,\
    \ you may write print(\"hello!\") and so on, and the shell will handle the printing\
    \ for you. As you can see, it is an interactive experience. Python executes each\
    \ line of code that you input.\n3. By creating a new window, a script file window\
    \ is created. Print (\"hello!\") does not instantly generate output in this case.\
    \ This is because this is a window for editing script files, and commands will\
    \ not execute until the file is saved and executed.\n4. You may launch the script\
    \ by selecting \"Run --> Run Module\" or by pressing F5 (or Fn + F5 on certain\
    \ systems).\n5. IDLE asks you to save the code as a file before execution. Select\
