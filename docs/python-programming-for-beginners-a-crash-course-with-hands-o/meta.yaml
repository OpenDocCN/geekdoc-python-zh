    # 3.5: LIST


    Python lists are among the most flexible data formats because they enable the
    simultaneous manipulation of numerous components.


    Creating Lists:

    A list is generated in Python by enclosing entries in square brackets [], separated
    using commas.


    ```

    # list of integers

    my_list = [1, 2, 3]

    ```


    A list may include any number of items and may contain objects of varying categories
    (float, integer, string, etc.).


    ```

    # empty list

    my_list = []

