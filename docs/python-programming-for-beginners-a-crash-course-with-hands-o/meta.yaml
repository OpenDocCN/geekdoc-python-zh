    \ None and root.right is None):\n        return (d == level + 1)\n    if (root.left\
    \ is None or root.right is None):\n        return False\n    return (perfect(root.left,\
    \ d, level + 1) and\n            perfect(root.right, d, level + 1))\n\nroot =\
    \ None\nroot = newNode(2)\nroot.left = newNode(3)\nroot.right = newNode(4)\nroot.left.left\
    \ = newNode(5)\nroot.left.right = newNode(6)\nif (perfect(root, calcDepth(root))):\n\
    \    print(\"The tree is perfect binary tree\")\nelse:\n    print(\"The tree not\
    \ perfect\")\n```\n\n### 平衡二叉树\n\n如果高度为 O(log n)，其中 n 是节点总数，则称其为高度平衡。例如，AVL 树通过确保左右子树的高度差不超过\
    \ 1 来维持 O(log n) 的高度。红黑树通过确保从每个根到叶子的路径上节点比例相同且不存在相邻的红色节点来保持其高度恒定。即使是二叉搜索树也提供高性能，因为它们在\
    \ O(log n) 时间内进行搜索、插入和删除。\n高度平衡二叉树的标准如下：\n\n- 左子树是平衡的。\n- 另一个子树是平衡的。\n- 如果对于每个节点，左右子树之间的差异不超过一个。\n\
    \n代码：\n\n```python\n# Checking if balance\nclass Node:\n    def __init__(self,\
