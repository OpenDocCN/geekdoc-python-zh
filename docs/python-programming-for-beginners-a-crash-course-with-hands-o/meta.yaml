    ```

    myfirst_tuple = 3, 4.6, "dog"

    print(myfirst_tuple)

    # tuple unpacking is also possible

    a, b, c = myfirst_tuple

    print(a)    # 3

    print(b)    # 4.6

    print(c)    # dog

    Output:

    ```


    ```

    (3, 4.6, ''dog'')

    3

    4.6

    dog

    ```


    Having a single element enclosed in the parenthesis is insufficient. A trailing
    comma will be required to demonstrate that this is a tuple.


    ```

    Example:

    myfirst_tuple = ("hello")

    print(type(myfirst_tuple)) # <class ''str''>

    # Creating a tuple having one element

    myfirst_tuple = ("hello",)

    print(type(myfirst_tuple)) # <class ''tuple''>

    # Parentheses is optional

    myfirst_tuple = "hello",

    print(type(myfirst_tuple)) # <class ''tuple''>

    Output:

    ```


    ```

    <class ''str''>

    <class ''tuple''>

    <class ''tuple''>

    ```


