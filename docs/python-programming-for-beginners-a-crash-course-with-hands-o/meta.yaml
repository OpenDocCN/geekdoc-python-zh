    \ is :  1 2 3\nThe new created array is :  2.5 3.2 3.3\n```\n\nAdding Elements\
    \ to an Array:\nTo add items to the Array, the built-in insert() technique may\
    \ be utilized."
  mdcn: "## 3.2：浮点数\n\nPython中的浮点数（float）是带有小数部分的正负实数，由小数点（.）或科学计数法符号E或e表示，例如：1234.56、3.142、-1.55、0.23。\n\
    \n```\n>>> f=1.2\n>>> f\n1.2\n>>> type(f)\n<class 'float'>\n```\n\n使用`float()`方法将文本、整数转换为浮点数。\n\
    \n```\n>>> float('5.5')\n5.5\n>>> float('5')\n5.0\n>>> float('    -5')\n-5.0\n\
    >>> float('1e3')\n1000.0\n>>> float('-Infinity')\n-inf\n>>> float('inf')\ninf\n\
    ```\n\n## 3.3：字符串\n\nPython中对应Unicode类型的字节数组被称为字符串。然而，由于Python要求一个字符，一个独立的字符只是一个长度为一的字符串。可以使用方括号来检索字符串的组成部分。\n\
    \n创建字符串：\nPython允许使用单引号、双引号甚至三引号来创建字符串。\n\n示例：\n\n```\n# Python Program for\n\
    # Creation of String\n# Creating a String\n# with single Quotes\nString1 = 'Welcome\
