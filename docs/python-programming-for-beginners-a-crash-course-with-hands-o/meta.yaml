  md: "# 7.4: RECURSIVE FUNCTIONS\n\nIt is the technique that an application goes\
    \ through when one of the phases in that application includes calling the application\
    \ itself (also known as recursion). In this case the technique is repeated inside\
    \ the method itself. A process that runs via recursion is a 'recursive' procedure.\
    \ To put it another way, recursive functions are functions that call themselves.\
    \ A recursive function must always be able to determine when it should cease reproducing\
    \ itself.\n\nThey may be divided into two categories: indirect recursion and direct\
    \ recursion.\n\n+   - Direct recursion occurs when a method calls oneself directly\
    \ from inside its own body instead of indirect recursion.\n\n```\nCode:\ndef recursive_function():\n\
    \    recursive_function()\n```\n\n+   - In contrast, indirect recursion occurs\
    \ when a function calls another function, which in turn invokes the method that\
    \ was invoked in the first place\n\n```\nCode:\ndef A_func():\n    B_func()\n\
    def B_func():\n    A_func()\n```\n\nA recursive function may be broken down into\
    \ two types:\n\n+   - Base Case or the case of termination A Base Scenario is\
    \ a case in which the outcome is known or anticipated, and no recursive calls\
    \ are made."
