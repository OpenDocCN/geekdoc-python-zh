    \ Python 解释器窗口。你可以立即使用它开始与 Python 交互。你可以用以下代码片段来验证：\n\n在这个例子中，你使用了 `print()` 在屏幕上打印字符串\
    \ `\"Hello, from IDLE!\"`。这是与 Python IDLE 交互的最简单方法。你逐个输入命令，Python 返回每个命令的结果。接下来，查看菜单栏。你会看到许多与\
    \ Shell 交互的选项：\n\n这个菜单允许你重启 Shell。如果你选择该选项，Shell 的状态将被清除。它的行为就像你启动了一个新的 Python\
