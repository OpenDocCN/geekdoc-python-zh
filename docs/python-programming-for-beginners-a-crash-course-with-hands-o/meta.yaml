  mdcn: "## 3.7：元组\n\n在 Python 中，元组类似于列表。两者的区别在于，一旦元组被分配，其元素就不能更改，而列表的内容则可以更改。\n\n\
    ### 创建元组\n\n元组是通过将所有项目（元素）括在圆括号 `()` 中并用逗号分隔来形成的。虽然圆括号不是必需的，但包含它们是一个好习惯。元组可以包含任意数量的元素，并且可以包含不同类型的对象（浮点数、整数、字符串、列表等）。\n\
    \n示例：\n\n```python\n# 不同类型的元组\n# 空元组\nmyfirst_tuple = ()\nprint(myfirst_tuple)\n\
    # 包含整数的元组\nmyfirst_tuple = (1, 2, 3)\nprint(myfirst_tuple)\n# 包含混合数据类型的元组\nmyfirst_tuple\
    \ = (1, \"Hello\", 3.4)\nprint(myfirst_tuple)\n# 嵌套元组\nmyfirst_tuple = (\"mouse\"\
    , [8, 4, 6], (1, 2, 3))\nprint(myfirst_tuple)\n```\n\n输出：\n\n```\n()\n(1, 2, 3)\n\
    (1, 'Hello', 3.4)\n('mouse', [8, 4, 6], (1, 2, 3))\n```\n\n此外，元组可以在不需要圆括号的情况下形成。这种技术被称为元组打包。\n\
    \n示例：\n\n```python\nmyfirst_tuple = 3, 4.6, \"dog\"\nprint(myfirst_tuple)\n# 元组解包也是可能的\n\
    a, b, c = myfirst_tuple\nprint(a)    # 3\nprint(b)    # 4.6\nprint(c)    # dog\n\
    ```\n\n输出：\n\n```\n(3, 4.6, 'dog')\n3\n4.6\ndog\n```\n\n仅将单个元素括在圆括号中是不够的。需要一个尾随逗号来表明这是一个元组。\n\
    \n示例：\n\n```python\nmyfirst_tuple = (\"hello\")\nprint(type(myfirst_tuple)) #\
    \ <class 'str'>\n# 创建一个包含一个元素的元组\nmyfirst_tuple = (\"hello\",)\nprint(type(myfirst_tuple))\
