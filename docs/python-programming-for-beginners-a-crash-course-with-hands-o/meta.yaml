  md: '# 1.3: HOW TO USE THE PYTHON SHELL, IDLE, AND WRITE YOUR FIRST PROGRAM


    Python Shell

    Once open, execute python3 on the command line to invoke the Python interpreter.
    When the prompt >>> appears, you know it is functioning. Type print("Hello, World")
    to confirm. Python is a coding dialect that runs on an interpreter. That is, it
    runs the code line by line. Python includes a Python Shell that may perform a
    single Python command and show the result.

    Additionally, it is referred to as REPL (Read, Evaluate, Print, Loop) since it
    reads the command, evaluates it, publishes the result, and then loops back to
    read the command again. To start the Python Shell, open the power shell or command
    prompt on Windows or a terminal window on Mac, type python, and then press enter.
    As seen below, a Python Prompt with three greater-than symbols >>> displays.


