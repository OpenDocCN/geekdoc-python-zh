  md: '# 12.1: ASYMPTOTIC ANALYSIS


    An asymptotic analysis of a procedure is a way to figure out the math behind how
    well it works at running. Asymptotic analysis can help us figure out the best
    case, the average case, and the worst case of an algorithm.


    This type of analysis is called "input bound," which means that if there is no
    input to the method, it is thought that it will work in an endless amount of time.
    Other than "input," all other components are recognized to be the same.


    Asymptotic analysis is the process of figuring out how long an operation will
    take in terms of mathematic units of time. For example, for one operation, the
    running time is f(n), and for another, it is g(n) (n2). As the amount of operations
    grows, so does the first operation''s running time. The second operation''s running
    time will grow exponentially as the number of operations increases. Both operations
    will run for about the same amount of time if n is very small.


    Most of the time, an algorithm takes falls into three groups. –

    Best Case: This is when the program runs in the shortest amount of time.

    Average Case: The average time it takes to run a program.

    Worst Case: The longest time it will take to run the program.

    Asymptotic notations are used to figure out how long an algorithm takes to run.
    These are the most common ones.


    +   1. θ Notations – Best Case

    2. Ω Notations – Average Case

    3. O Notations – Worst Case


    # Theta (θ) Notation


    The notation (n) is the correct way to say both the relatively low bound and the
    higher bound of an application''s runtime in a correct way. It is shown in this
    way:'
