    \ 1，将后者误认为数字 0。字母、下划线和数字可以用作变量名。但是，变量不能以数字开头。下划线可以提高可读性。例如，`\"this_variable\"\
    ` 比 `\"thisvariable\"` 更易读。最好让变量名尽可能简短，同时仍然表达变量的功能。例如，对于一个变量，`\"member\"` 比 `\"\
    m\"` 是更好的选择。同样，`\"best_choice\"` 比 `\"bc\"` 更适合作为变量名。\n\n你希望能够确定变量的目的，而不会出现名称失控的情况。`\"\
    the_finest_member_of_group_is_what_is_held_in_this_variable\"` 是一个合法的变量名，但可能不是在你的程序中使用的好选择。虽然“这个变量中保存的是组中最好的成员”在技术上是正确的，但它可能不是一个可接受的变量名。避免在变量名中使用空格或任何其他类型的空白字符。如前所述，你可以使用下划线来提高可读性。Python\
    \ 包含大量专用函数和关键字。你必须注意它们，以避免在你的软件中将它们用作变量名！这些是为 Python 特定用途保留的。\n\n示例：\n\n```\n\
    #合法的变量名：\nmyvar = \"John\"\nmy_var = \"John\"\n_my_var = \"John\"\nmyVar = \"\
    John\"\nMYVAR = \"John\"\nmyvar2 = \"John\"\n#非法的变量名：\n2myvar = \"John\"\nmy-var\
    \ = \"John\"\n```"
