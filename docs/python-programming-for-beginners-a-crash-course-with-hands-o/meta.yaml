- md: "## 11.6: MULTIPLE INHERITANCE\n\nAs its name is telling, In Python, multiple\
    \ inheritances occur when a class derives from numerous classes. In other words,\
    \ the subclass descends from more than one base class. An example of this is that\
    \ a kid acquires personality qualities from both parents.\n\nThe general notion\
    \ that multiple inheritances seem to be something \"risky\" or \"bad\" is largely\
    \ perpetuated by computer languages with poorly designed multiple inheritance\
    \ capabilities and, above all, by incorrect use of it. Java doesn't even enable\
    \ multiple inheritances, but C++ supports it. Python provides a complex and well-designed\
    \ solution to multiple inheritances.\n\nIf you derive a sub-class from more than\
    \ one parent class, such a situation is called Multiple Inheritance. It, however,\
    \ displays the same behavior, and so does the single inheritance.\n\nThe structure\
    \ for Multiple Inheritance is likewise comparable to the single inheritance. By\
    \ the way, under Multiple Inheritance, the subclass asserts the methods and properties\
    \ of all of the parent classes.\n\nIn Python, the modules and packages follow\
    \ a philosophy called DRY, i.e., don't-repeat-yourself. And class inheriting is\
    \ a wonderful method to construct a class utilizing the characteristics of another\
    \ one and stay DRY.\n\n![](img/97870751f4132139063aaf46bfceb248_175_0.png)\n\n\
    ## 11.6.1: Syntax for Multiple Inheritance\n\nWhen creating a class, we put the\
    \ names of the derived classes within the parentheses of the names of the parenthesis\
    \ of the derived classes. This allows a class to inherit from numerous Python\
    \ classes. We use commas to separate the names in this list.\n\n```\nCode:\nclass\
    \ Mother:\n    pass\nclass Father:\n    pass\nclass Child(Mother, Father):\n \
    \   pass\nsubclass=(Child,Mother)\nsubclass=(Child,Father)\n```\n\nAs a result,\
    \ the child class inherits attributes from both the mother and father classes.\n\
    \n## 11.6.2: Examples for Multiple Inheritance\n\nConsider the following example\
    \ of multiple inheritance\n\n```\nCode:\nclass Parent1:\n    def function1(self):\n\
    \        print(\"This is first function 1\")\nclass Parent2:\n    def function2(self):\n\
    \        print(\"This is second function 2\")\nclass Parent3:\n    def function3(self):\n\
    \        print(\"This is third function 3\")\nclass Child(Parent1, Parent2, Parent3):\n\
    \    def function4(self):\n        print(\"This is fourth function 4\")\nz = Child()\n\
    z.function1()\nz.function2()\nz.function3()\nz.function4()\n```\n\nOutput:\n\n\
    ```\n[Running] python -u \"d:\\Ebook\\Ebook_Codes.py\"\nThis is first function\
    \ 1\nThis is second function 2\nThis is third function 3\nThis is fourth function\
    \ 4\n\n[Done] exited with code=0 in 0.386 seconds\n```\n\nCode:\nclass TeamMember(object):\n\
    \    def __init__(self, name):\n        self.name = name\nclass Worker(object):\n\
    \    def __init__(self, pay):\n        self.pay = pay\nclass TeamLeader(TeamMember,\
    \ Worker):\n    def __init__(self, name, pay, exp):\n        self.exp = exp\n\
    \        TeamMember.__init__(self, name)\n        Worker.__init__(self, pay)\n\
    \        print(\"Name: {}, Pay: {}, Exp: {}\".format(self.name, self.pay, self.exp))\n\
    \nTL = TeamLeader('Jake',5000,'Master')\nOutput:\n\n```\n[Running] python -u \"\
    d:\\Ebook\\Ebook_Codes.py\"\nName: Jake, Pay: 5000, Exp: Master\n\n[Done] exited\
    \ with code=0 in 0.288 seconds\n```\n\n## 11.6.3: Method Resolution Order\n\n\
    When we look for a property in a class that is engaged in multiple inheritances\
    \ in Python, a sequence is followed. Firstly, it is checked in the current class.\
    \ If it is not identified, the search goes to parent classes. This is a depth-first,\
    \ left to right search.\n\n```\nCode:\nclass A:\n    def func(self):\n       \
    \ print(\" This is Parent Class A\")\nclass B(A):\n    def func(self):\n     \
    \   print(\" This is Child Class B\")\nr = B()\nr.func()\nOutput:\n```\n\n![](img/97870751f4132139063aaf46bfceb248_178_0.png)\n\
    \nThis is because the methods called are from class B rather than class A in the\
    \ preceding example due to the Method Resolution Order (MRO). The above-given\
    \ example is how the classes are listed in the code above: class B and then class\
    \ A.\n\nWhen there are multiple inheritances, the procedures are run in the order\
    \ in which they were indicated when the classes were inherited. The sequence in\
    \ which procedures are resolved is referred to as the resolution order. Not important\
    \ for languages that offer single inheritance, but for languages that enable multiple\
    \ inheritances, the order in which methods are resolved is quite important. This\
    \ arrangement is referred to as Linearization of a subclass, and the collection\
    \ of rules used to achieve it is referred to as MRO (Method Resolution Order).\
    \ You may acquire the MRO of a class by using either the __mro__ property or the\
    \ mro() method. Both of these methods are available in Java. In contrast to the\
    \ __mro__ attribute, the mro() function produces a python list instead of a tuple.\n\
    \nMethod Resolution Order (MRO) is a programming language term that refers to\
    \ the order in which a method or property is resolved. The Python programming\
    \ language permits classes that derive from other classes. The class that is being\
    \ inherited is referred to as the Base or Superclass, whereas the class that is\
    \ being inherited is referred to as the Child or Subclass. When a method is executed\
    \ in Python, the resolution order specifies the sequence in which the parent classes\
    \ are looked for and found. To find the method or attribute, it must first be\
    \ searched inside a class, and then it must follow the inheritance order set while\
    \ inheriting. This arrangement is also known as Linearization of a class, and\
    \ the collection of rules that govern it is known as MRO (Method Resolution Order).\
    \ Even though the interpreter is deriving from another class, it still has to\
    \ be able to fix the functions that are being invoked via an instance. As a result,\
    \ we need the technique resolution order.\n\n## 11.6.4: Advantages of Multiple\
    \ Inheritance\n\n- Since it contains many base classes, multiple inheritances\
    \ in C++ enable a derived class to acquire more traits and characteristics than\
    \ it would otherwise.\n- As an added benefit, it ensures transitivity, which means\
    \ that if class C inherits from P, then all of the sub-classes of C will likewise\
    \ inherit from P.\n- Because it allows a class to inherit functionality from more\
    \ than a base class, it has the benefit of being more flexible.\n- Designing multiple\
    \ design patterns has been shown to be useful in the long run. A few of these\
    \ patterns are as follows: Pattern for adapting to some other interface with your\
    \ class: This pattern is useful when you need to adapt your class to another interface\
    \ using another interface. In this case, Multiple Inheritance plays a significant\
    \ part in changing out one interface for another. Observer patterns include: This\
    \ pattern is used to keep track of a list of observers by defining a class for\
    \ each one.\n- There are no differences between this derived class and its parent\
    \ class.\n\n## 11.7: OPERATOR OVERLOADING\n\nPython operators can be used with\
    \ built-in classes, but they don't work with other types of classes. And the same\
    \ Operator behaves in different ways with different types of things. For instance,\
    \ the + Operator can add two numbers, combine two lists, or put two strings together.\
    \ It's called operator overloading, and it's a feature in Python that lets the\
    \ same operators have different meanings based on where they're being used. It\
