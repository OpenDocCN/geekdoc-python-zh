    \ returned\n    print(\"tree is not full binary tree\")\n```\n\n### 完全二叉树\n\n\
    当每一层都被完全填满，除了最后一层可能从左开始填充时，它类似于满二叉树，但有两个显著区别。\n\n- 完全二叉树不一定是满二叉树，因为最后一个叶子元素可能没有右兄弟节点。\n\
    - 所有叶子节点必须都向左倾斜。\n\n代码：\n\n```python\n# Checking if complete\nclass Node:\n\n\
    \    def __init__(self, item):\n        self.item = item\n        self.left =\
    \ None\n        self.right = None\n    def count(root): #count the nodes\n   \
