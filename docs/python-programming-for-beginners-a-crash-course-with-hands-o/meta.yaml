    \ \"Hello\", 3.4]\n```\n\n此外，一个列表可以包含来自另一个列表的项目。这被称为嵌套列表。\n\n```\n# nested list\n\
    my_list = [\"mouse\", [8, 4, 6], ['a']]\n```\n\n删除列表元素：\n通过Python的`del`语句，可以从列表中删除一个或多个条目。它甚至可以完全删除列表。\n\
    \n```\n# Deleting list items\npython_list = ['p', 'r', 'o', 'b', 'l', 'e', 'm']\n\
    # delete one item\ndel python_list[2]\nprint(python_list)\n# delete the entire\
