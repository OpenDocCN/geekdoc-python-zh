    found in the "Lib directory" of the Python installation path. Standard modules
    could be imported in the same way that user-defined modules are imported.


    Importing modules can be done in a variety of ways. They are as follows:


    Import Statement:


    You may use the import statement to import a module and the dot operator to access
    the definitions within it, as explained before.


    Example:


    ```

    import math

    print("pi value ", math.pi)

    ```


    Output:


    ```

    pi value  3.141592653589793

    ```


    Import with Renaming:


    A module can be imported by renaming it.


    Example:


    ```

    import math as m

    print("pi value", m.pi)

    ```


    Output:


    ```

    pi value  3.141592653589793

    ```


    The math module has been renamed to m. In certain circumstances, this can save
    us time typing. The term math is not recognized in our scope, as you can see.
    As a result, math.pi is incorrect, whereas m.pi is right.


    Python from Import Statement:


    You can import particular names from the module rather than the entire module.


    Example:


    ```

    # import only pi from the math module

    from math import pi

    print("The value of pi is", pi)

    ```


    Output:


    ```

    The value of pi is 3.141592653589793

    ```'
