    \ first unintended line. Any non-zero value in Python is interpreted as True.\
    \ False is read as None and 0.\n\nExample:\n\n```python\n# Program to add natural\n\
    # numbers up to\n# sum = 1+2+3+...+n\n# To take input from the user,\n# n = int(input(\"\
    Enter n: \"))\nn = 10\n# initialize sum and counter\nsum = 0\ni = 1\nwhile i <=\
    \ n:\n    sum = sum + i\n    i = i+1  # update counter\n\n# print the sum\nprint(\"\
    The sum is\", sum)\n```\n\nOutput:\n```\nThe sum is 55\n```\n\nAs long as the\
    \ iterative variable \"i\" is below or equal to n, the test phase in the preceding\
    \ program will be True (10 in our program). In the loop's body, the counter variable's\
    \ value needs to be raised. This is vital information (and mostly forgotten).\
    \ If you don't, you'll find yourself in an endless cycle (never-ending loop).\
    \ Finally, the outcome is shown.\n\n## 6.3: BREAK\n\nThe break statement in Python,\
    \ like the classic break in C, ends the current loop and continues execution at\
    \ the following statement. The break is most commonly used when an external situation\
    \ occurs that necessitates a quick escape from a loop. Both while & for loops\
    \ can employ the break statement.\n\nExample:\n\n```python\n# First Example\n\
    for letter in 'Python':\n    if letter == 'h':\n        break\n    print ('Current\
    \ Letter :', letter)\n\n# Second Example\nvar = 10\nwhile var > 0:\n    print\
    \ ('Current variable value :', var)\n    var = var -1\n    if var == 5:\n    \
    \    break\nprint (\"Goodbye!\")\n```\n\nOutput:\n```\nCurrent Letter : P\nCurrent\
    \ Letter : y\nCurrent Letter : t\nCurrent variable value : 10\nCurrent variable\
    \ value : 9\nCurrent variable value : 8\nCurrent variable value : 7\nCurrent variable\
    \ value : 6\nGoodbye!\n```\n\n## 6.4: CONTINUE\n\nIn Python, the continue statement\
    \ returns control to the start of the while loop. All remaining statements in\
    \ the current iteration of a loop are rejected by the continue statement, which\
    \ returns control to the start of the loop. Both while & for loops can employ\
    \ the continue statement.\n\nExample:\n\n```python\n# First Example\nfor letter\
    \ in 'Python':\n    if letter == 'h':\n        continue\n    print ('Current Letter\
    \ :', letter)\n\n# Second Example\nvar = 10\nwhile var > 0:\n    var = var -1\n\
    \    if var == 5:\n        continue\n    print ('Current variable value :', var)\n\
    print (\"Good bye!\")\n```\n\nOutput:\n```\nCurrent Letter : P\nCurrent Letter\
    \ : y\nCurrent Letter : t\nCurrent Letter : o\nCurrent Letter : n\nCurrent variable\
    \ value : 9\nCurrent variable value : 8\nCurrent variable value : 7\nCurrent variable\
    \ value : 6\nCurrent variable value : 4\nCurrent variable value : 3\nCurrent variable\
    \ value : 2\nCurrent variable value : 1\nCurrent variable value : 0\nGood bye!\n\
    ```\n\n## 6.5: TRY, EXCEPT\n\nExceptions:\nWhen your program detects an error,\
    \ Python raises a number of built-in exceptions (something in the program goes\
    \ wrong). When one of these exceptions occurs, the Python interpreter suspends\
    \ the current process and sends the control to the caller process until the problem\
    \ is resolved. The software will crash if it is not appropriately handled. Consider\
    \ a software in which function A calls the function B, which in turn calls the\
    \ function C. If the exception occurs in procedure (function) C but isn't handled\
    \ there, the exception is sent to B, who then sends it on to A. If the issue is\
    \ not addressed, an error notice appears, & our application comes to an abrupt\
    \ end.\n\nCatching Exceptions:\nThe try statement in Python can be used to manage\
    \ exceptions. The important operation that might result in an exception is contained\
    \ in the try clause. The code which handles exceptions is included in the except\
    \ clause. As a consequence, after the exception has been identified, you may choose\
    \ which steps to take.\n\nExample:\n\n```python\n# to get the type of exception\n\
    import sys\n\nrandomList = ['a', 0, 2]\n\nfor entry in randomList:\n    try:\n\
    \        print(\"The entry is\", entry)\n        r = 1/int(entry)\n        break\n\
    \    except:\n        print(\"Oops!\", sys.exc_info()[0], \"occurred.\")\n   \
    \     print(\"Next entry.\")\n\nprint()\nprint(\"The reciprocal of\", entry, \"\
    is\", r)\n```\n\nOutput:\n```\nThe entry is a\nOops! <class 'ValueError'> occurred.\n\
    Next entry.\n\nThe entry is 0\nOops! <class 'ZeroDivisionError'> occurred.\nNext\
    \ entry.\n\nThe entry is 2\nThe reciprocal of 2 is 0.5\n```\n\nThe values of randomList\
    \ list in this application are cycled over. As previously stated, the try block\
    \ contains the code that might produce an exception. If there is no exception,\
    \ except block is bypassed, & regular flow resumes (for last value). However,\
    \ if an exception happens, the except block will catch it (first & second values).\
    \ Using the exc_info() method in the sys module, the name of the exception is\
    \ output. It can be seen that 0 causes \"ZeroDivisionError\" & causes \"ValueError\"\
    .\n\nCatching Specific Exceptions:\nDon't identify any specific exceptions in\
    \ the except clause in the preceding example. This isn't a smart programming approach\
    \ because it will capture all exceptions and treat each instance the same. It\
    \ can be indicated which exceptions should be caught with an except clause. If\
    \ an exception occurs, a try clause can include any no. of except clauses to handle\
    \ distinct occurrences, but only one will be performed. In an except clause, several\
    \ exceptions may be declared by using a tuple of values.\n\nExample:\n\n```python\n\
    try:\n    1 / 0\nexcept ZeroDivisionError:\n    print('Divided by zero')\nprint('Should\
    \ reach here')\n```\n\nOutput:\n```\nDivided by zero\nShould reach here\n```\n\
    \nRaising Exceptions:\nExceptions are produced in Python programming when runtime\
    \ issues occur. The raise keyword can also be used to raise exceptions manually.\
    \ You may optionally give values to an exception to provide more information about\
    \ why it was raised.\n\nExample:\n\n```python\n>>> raise KeyboardInterrupt\n#Output\n\
    Traceback (most recent call last):\nKeyboardInterrupt\n\n>>> raise MemoryError(\"\
    This is an argument\")\n#Output\nTraceback (most recent call last):\nMemoryError:\
    \ This is an argument\n\n>>> try:\n    x = int(input(\"Enter a positive integer:\
    \ \"))\n    if x <= 0:\n        raise ValueError(\"This is not a positive number!\"\
    )\nexcept ValueError as ve:\n    print(ve)\n#Output\nEnter a positive integer:\
    \ -2\nThis is not a positive number!\n```\n\n# CHAPTER 7\n\n# FUNCTIONS AND MODULES\n\
    \n## 7.1: WHAT ARE FUNCTIONS?\n\nIn Python, a function is a collection of connected\
    \ statements used to complete a single job. It is possible to divide our software\
    \ into smaller, more modular portions with functions. As a result, as our program\
    \ develops in size and complexity, functions assist us in making it more ordered\
    \ and controllable. Furthermore, you may eliminate redundancy and make our code\
    \ more reusable with functions. In general, functions take in input, process it,\
    \ and give a result to the caller. Python has several built-in functions, such\
    \ as print() and others. You can build your functions in this programming language,\
    \ just as you do in other programming languages; these are user-defined functions.\n\
    \nThe fundamental concept is to group actions performed often or regularly and\
    \ package them as a function. This way, instead of writing the same code repeatedly\
    \ for various inputs, you can call the function as needed. You may keep our variable's\
    \ namespace as clean as possible when using functions. So, function one may use\
    \ the same variable as function two, and there will be no confusion. Function\
    \ two can likewise use the same variable as function one, and there will be no\
    \ confusion. Each variable exists just when the system is performing the specified\
    \ function. When you use functions, you can test tiny sections of your program\
    \ individually and in isolation from the rest.\n\nWhen calling a function, the\
    \ following requirements must be followed:\n\n- Using the def keyword in conjunction\
    \ with the given function name allows us to define a function.\n- The name of\
    \ the function must follow the identification rule.\n- A function accepts a parameter\
    \ (argument), which may be optional in certain cases. Function blocks are introduced\
    \ with the aid of the colon (:) and all block statements should be indented to\
    \ the same depth as the colon (:).\n- To return the result from the method, you\
    \ need to utilize the return clause. There may only be 1 return statement in a\
    \ function at any time.\n- For a function to be called, it must first be declared\
    \ by the Python interpreter. Otherwise, the Python interpreter returns an error."
  mdcn: "## 6.2：WHILE 循环\n\n在 Python 中，while 循环会在测试条件为真时，持续迭代执行一个代码块。当条件不满足时，我们无法提前知道循环会执行多少次。\n\
    \n语法：\nwhile 测试表达式:\n    while 循环体\n\n在 while 循环中，首先会测试测试表达式。只有当测试表达式结果为 True\
    \ 时，才会进入循环体。完成一次循环后，会再次验证“测试表达式”。此过程会一直重复，直到测试表达式返回 False。Python 中 while 循环体的范围由缩进决定。循环体从缩进开始，到第一个没有缩进的行结束。在\
    \ Python 中，任何非零值都被解释为 True。None 和 0 被解释为 False。\n\n示例：\n\n```python\n# 程序用于计算自然数\n\
    # 从 1 到 n 的和\n# sum = 1+2+3+...+n\n# 从用户处获取输入，\n# n = int(input(\"Enter n: \"\
    ))\nn = 10\n# 初始化 sum 和计数器\nsum = 0\ni = 1\nwhile i <= n:\n    sum = sum + i\n\
    \    i = i+1  # 更新计数器\n\n# 打印总和\nprint(\"The sum is\", sum)\n```\n\n输出：\n```\n\
    The sum is 55\n```\n\n在上面的程序中，只要迭代变量 \"i\" 小于或等于 n（在我们的程序中是 10），测试阶段的结果就会是 True。在循环体中，需要增加计数器变量的值。这是一个至关重要的信息（也常常被遗忘）。如果不这样做，你将陷入一个无限循环（永不停止的循环）。最后，程序会显示结果。\n\
    \n## 6.3：BREAK\n\nPython 中的 break 语句，类似于 C 语言中的经典 break，它会终止当前循环，并继续执行下一条语句。当发生需要立即退出循环的外部情况时，最常使用\
    \ break。while 和 for 循环都可以使用 break 语句。\n\n示例：\n\n```python\n# 第一个示例\nfor letter\
    \ in 'Python':\n    if letter == 'h':\n        break\n    print ('Current Letter\
    \ :', letter)\n\n# 第二个示例\nvar = 10\nwhile var > 0:\n    print ('Current variable\
    \ value :', var)\n    var = var -1\n    if var == 5:\n        break\nprint (\"\
    Goodbye!\")\n```\n\n输出：\n```\nCurrent Letter : P\nCurrent Letter : y\nCurrent\
    \ Letter : t\nCurrent variable value : 10\nCurrent variable value : 9\nCurrent\
    \ variable value : 8\nCurrent variable value : 7\nCurrent variable value : 6\n\
    Goodbye!\n```\n\n## 6.4：CONTINUE\n\n在 Python 中，continue 语句会将控制权返回到 while 循环的开始处。continue\
    \ 语句会跳过当前迭代中所有剩余的语句，并将控制权返回到循环的开始。while 和 for 循环都可以使用 continue 语句。\n\n示例：\n\n\
    ```python\n# 第一个示例\nfor letter in 'Python':\n    if letter == 'h':\n        continue\n\
    \    print ('Current Letter :', letter)\n\n# 第二个示例\nvar = 10\nwhile var > 0:\n\
    \    var = var -1\n    if var == 5:\n        continue\n    print ('Current variable\
    \ value :', var)\nprint (\"Good bye!\")\n```\n\n输出：\n```\nCurrent Letter : P\n\
    Current Letter : y\nCurrent Letter : t\nCurrent Letter : o\nCurrent Letter : n\n\
    Current variable value : 9\nCurrent variable value : 8\nCurrent variable value\
    \ : 7\nCurrent variable value : 6\nCurrent variable value : 4\nCurrent variable\
    \ value : 3\nCurrent variable value : 2\nCurrent variable value : 1\nCurrent variable\
    \ value : 0\nGood bye!\n```\n\n## 6.5：TRY, EXCEPT\n\n异常：\n当你的程序检测到一个错误时，Python\
    \ 会引发一些内置异常（程序中的某些部分出了问题）。当这些异常之一发生时，Python 解释器会暂停当前进程，并将控制权交给调用者进程，直到问题被解决。如果异常没有被妥善处理，程序将会崩溃。考虑一个软件，其中函数\
    \ A 调用函数 B，函数 B 又调用函数 C。如果异常发生在过程（函数）C 中，但没有在那里被处理，异常会被发送给 B，然后 B 再将其发送给 A。如果问题没有被解决，就会出现错误通知，我们的应用程序会突然终止。\n\
    \n捕获异常：\nPython 中的 try 语句可用于管理异常。可能引发异常的重要操作包含在 try 子句中。处理异常的代码包含在 except 子句中。因此，在识别出异常后，你可以选择采取哪些步骤。\n\
    \n示例：\n\n```python\n# 获取异常类型\nimport sys\n\nrandomList = ['a', 0, 2]\n\nfor entry\
    \ in randomList:\n    try:\n        print(\"The entry is\", entry)\n        r\
    \ = 1/int(entry)\n        break\n    except:\n        print(\"Oops!\", sys.exc_info()[0],\
    \ \"occurred.\")\n        print(\"Next entry.\")\n\nprint()\nprint(\"The reciprocal\
    \ of\", entry, \"is\", r)\n```\n\n输出：\n```\nThe entry is a\nOops! <class 'ValueError'>\
    \ occurred.\nNext entry.\n\nThe entry is 0\nOops! <class 'ZeroDivisionError'>\
    \ occurred.\nNext entry.\n\nThe entry is 2\nThe reciprocal of 2 is 0.5\n```\n\n\
    在这个应用程序中，程序会循环遍历 randomList 列表的值。如前所述，try 块包含可能产生异常的代码。如果没有异常发生，except 块会被跳过，程序恢复正常流程（对于最后一个值）。然而，如果发生异常，except\
    \ 块会捕获它（对于第一个和第二个值）。使用 sys 模块中的 exc_info() 方法，可以输出异常的名称。可以看到，0 引发了 \"ZeroDivisionError\"\
    ，而 'a' 引发了 \"ValueError\"。\n\n捕获特定异常：\n在前面的示例中，except 子句没有指定任何特定的异常。这不是一个明智的编程方法，因为它会捕获所有异常并以相同的方式处理每个实例。可以使用\
    \ except 子句来指定应该捕获哪些异常。如果发生异常，一个 try 子句可以包含任意数量的 except 子句来处理不同的情况，但只会执行其中一个。在\
    \ except 子句中，可以使用值元组来声明多个异常。\n\n示例：\n\n```python\ntry:\n    1 / 0\nexcept ZeroDivisionError:\n\
    \    print('Divided by zero')\nprint('Should reach here')\n```\n\n输出：\n```\nDivided\
    \ by zero\nShould reach here\n```\n\n引发异常：\n在 Python 编程中，当运行时问题发生时会产生异常。也可以使用\
    \ raise 关键字手动引发异常。你可以选择为异常提供值，以提供有关其引发原因的更多信息。\n\n示例：\n\n```python\n>>> raise\
    \ KeyboardInterrupt\n#Output\nTraceback (most recent call last):\nKeyboardInterrupt\n\
    \n>>> raise MemoryError(\"This is an argument\")\n#Output\nTraceback (most recent\
    \ call last):\nMemoryError: This is an argument\n\n>>> try:\n    x = int(input(\"\
    Enter a positive integer: \"))\n    if x <= 0:\n        raise ValueError(\"This\
    \ is not a positive number!\")\nexcept ValueError as ve:\n    print(ve)\n#Output\n\
    Enter a positive integer: -2\nThis is not a positive number!\n```\n\n# 第 7 章\n\
    \n# 函数和模块\n\n## 7.1：什么是函数？\n\n在 Python 中，函数是用于完成单个任务的一组相关语句。通过函数，我们可以将软件划分为更小、更模块化的部分。因此，随着程序规模和复杂性的增加，函数有助于我们使其更有序和可控。此外，通过函数，你可以消除冗余并使代码更具可重用性。通常，函数接收输入，进行处理，然后向调用者返回一个结果。Python\
    \ 有许多内置函数，例如 print() 等。你可以像在其他编程语言中一样，在 Python 中创建自己的函数；这些是用户定义的函数。\n\n基本思想是将经常或定期执行的操作分组并封装为一个函数。这样，你就不必为不同的输入重复编写相同的代码，而是可以根据需要调用该函数。使用函数时，你可以尽可能保持变量命名空间的整洁。因此，函数一可以使用与函数二相同的变量，而不会产生混淆。函数二同样可以使用与函数一相同的变量，也不会产生混淆。每个变量仅在系统执行指定函数时存在。使用函数时，你可以单独测试程序的小部分，并将其与程序的其余部分隔离开来。\n\
    \n调用函数时，必须遵循以下要求：\n\n- 使用 def 关键字与给定的函数名一起，可以定义一个函数。\n- 函数名必须遵循标识符规则。\n- 函数接受一个参数（实参），在某些情况下可以是可选的。函数块以冒号\
    \ (:) 开始，所有块语句的缩进深度应与冒号 (:) 相同。\n- 要从函数返回结果，你需要使用 return 子句。一个函数中一次只能有一个 return\
    \ 语句。\n- 要调用一个函数，它必须首先由 Python 解释器声明。否则，Python 解释器会返回错误。"
