    \ we'll iterate ahead of time while the loop is utilized.\n\nSyntax:\nwhile test_expression:\n\
    \    Body of while\n\nThe test expression is tested first in the while loop. Only\
    \ if the test expression comes to True is the body of the loop entered. The \"\
