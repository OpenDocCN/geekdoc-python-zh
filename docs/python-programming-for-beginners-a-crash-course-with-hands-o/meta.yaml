- md: '## 2.3: THE ASSIGNMENT OPERATOR


    Operations are used to manipulate values and variables. These are the specialized
    symbols that are used to perform arithmetic, logical, and bitwise operations.
    The operator''s operand is the value on which it works. Assignment Variables are
    assigned values via operators.


    To assign the value of the expression''s right side to the operand on the left,
    the assignment operator (=) is used.


    Example:


    ```python

    # Assigning values using

    # Assignment Operator

    a = 3

    b = 5

