    - n 个节点的高度为 $\\log(n+1) - 1 = \\Theta(\\ln(n))$。\n- 高度 h 有 $2^h$ 个叶子节点。\n\n代码：\n\
    \n```python\n# if a binary tree is perfect\nclass newNode:\n    def __init__(self,\
    \ k):\n        self.key = k\n        self.right = self.left = None\n\n# To calculate\
