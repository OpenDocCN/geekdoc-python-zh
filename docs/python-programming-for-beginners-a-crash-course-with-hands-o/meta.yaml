  md: 'Changing a Tuple:

    Tuples, in contrast to lists, are immutable. This implies that once a tuple''s
    elements are allocated, they cannot be modified. However, if the item is a changeable
    data type, such as a list, the nested elements may be modified. Additionally,
    a tuple may be associated with several values (reassignment).


    ```

    Example:

    # Changing tuple values

    myfirst_tuple = (4, 2, 3, [6, 5])

