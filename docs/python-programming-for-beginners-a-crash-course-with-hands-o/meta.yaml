    \n## 第 2 章\n\n## 变量与运算符\n\n## 2.1：什么是变量？\n\n变量是指代一个内存位置的术语。Python 变量，也称为标识符，用于存储数据。在\
    \ Python 中，你不需要指定变量的类型，因为 Python 是一种推断语言，足够智能以确定变量的类型。变量名可以包含字母和数字，但必须以字母或下划线开头。建议变量名使用小写字母书写。`Rahul`\
