    \ <module>\n    print('infinite')\nKeyboardInterrupt\n```\n\n在你的窗口底部，会以红色文本显示一个键盘中断错误通知。由于中断，程序已停止执行。\n\
    \n### 编写你的第一个程序\n\n1.  IDLE 是将用于编写程序的 Python 环境。在程序列表中找到 \"IDLE (Python 3.5 32-bit)\"\
    \ 项。\n2.  IDLE Shell 窗口显示出来。同样，你可以输入 `print(\"hello!\")` 等等，Shell 会为你处理打印。如你所见，这是一种交互式体验。Python\
    \ 执行你输入的每一行代码。\n3.  通过创建一个新窗口，会创建一个脚本文件窗口。在这种情况下，`print(\"hello!\")` 不会立即生成输出。这是因为这是一个用于编辑脚本文件的窗口，命令在文件保存并执行之前不会运行。\n\
    4.  你可以通过选择 \"Run --> Run Module\" 或按 F5（或在某些系统上按 Fn + F5）来启动脚本。\n5.  IDLE 要求你在执行前将代码保存为文件。选择一个以\
