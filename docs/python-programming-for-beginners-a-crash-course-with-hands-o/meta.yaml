- md: "## 12.3: NON-LINEAR DATA STRUCTURES\n\nNon-linear data structures like trees\
    \ are explained.\n\n## 12.3.1: Trees\n\nThis is a tree where every single member\
    \ has no more than two offspring. Because each element may only have two children,\
    \ they are commonly stated as the left and right child nodes.\n\nComponents:\n\
    \n- Data\n- Pointer to the right child\n- Pointer to left child\n\nThe root of\
    \ the tree is the highest node. The components just underneath an element are\
    \ referred to as its offspring. Its parent is the element that sits exactly above\
    \ it. For instance, 'a' is a child of 'f,' and 'f' is 'a's' parent. Finally, no-child\
    \ components are referred to as leaves.\n\nTree Class Code:\n\n```python\nclass\
    \ Node:\n    def __init__(self,key):\n        self.left = None #left node\n  \
    \      self.right = None #right node\n        self.val = key\nroot = Node(2) #create\
