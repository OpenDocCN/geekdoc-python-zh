  md: '# 12.2: LINEAR DATA STRUCTURES


    In this section, the linear type of data structures like stacks, queues, and so
    on are discussed.


    # 12.2.2: Stack


    A linear data structure that uses the First-In and Last-Out (FILO) or Last-In
    and First-Out (LIFO) ordering to store objects. A new mechanism is added to one
    end of a stack, while an element is withdrawn from the other end. Insert and delete
    processes are sometimes referred to as push and pop.


    Stack is connected with the following functions:


    +   - push(x) – this inserts an element at the top – Complexity = O(1)

    - empty() – determines if the stack is empty – Complexity = O(1)

    - top() – determines the element at the top of stack – Complexity = O(1)

    - size() – determines the size – Complexity = O(1)

    - pop() – deletes the top element – Complexity = O(1)


    # Implementation


    In Python, a stack may be implemented in a variety of ways. This article discusses
    how to create a stack using Python data structures and modules.


    In Python, the stack may be implemented in the following ways:


    +   - List

    - queue.LifoQueue

    - Collections.deque


