    # Operation of Search


    The approach is based on the BST characteristic that each left subtree has values
    lower than the root, and each right subtree has data higher than the root.


    If the number is below the root, we can be confident it is not in the right subtree;
    we only need to look in the left subtree, and if the value is over the root, we
    can be sure it is not in the left subtree; we only need to look in the right subtree.


