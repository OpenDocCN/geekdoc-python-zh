    \ known as a class. Variables aren't readily accessible in Python Encapsulation;\
    \ instead, they are retrieved via the class's methods. Python Encapsulation protects\
    \ the object's internal structure (state and behavior) from the rest of the program.\
    \ As a result, python Encapsulation enables data hiding. To grasp the notion of\
    \ data concealing, consider this. If a developer outside the class has access\
    \ to the information in a variable, there's a good chance they'll write their\
    \ own (non-encapsulated) code to handle it. If the solutions aren't consistent,\
    \ this would, at the very minimum result in duplicate data (i.e., pointless exercise)\
    \ and incompatibilities.\n\nOn the other hand, data hiding implies that everyone\
    \ must use the same ways to access data contained in a variable. A class's internal\
    \ workings and implementation are not necessary for an application that uses it.\
    \ The software merely constructs an object that it then uses to call the class's\
    \ functions. Encapsulation Abstraction is a technique for displaying just \"necessary\"\
    \ variables used to access information while hiding implementation specifics from\
    \ the client. Imagine your cell phone; everything you need to know is how to send\
