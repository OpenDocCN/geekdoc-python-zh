    \n- Class\n- Object\n- Method\n- Inheritance\n- Encapsulation\n- Polymorphism\n\
    - Data Abstraction\n\n## 11.1: CLASSES\n\nData and functions can be organized\
    \ into classes in Python. It allows for the creation of data structures that can\
    \ contain any data and are, as a result, more openly accessible.\n\nA bank employee,\
    \ for example, might go into the bank's website and click on the customer class\
    \ to see all of the client's properties, such as transaction information and withdrawal\
    \ and deposit records.\n\nThere is no doubt that classes are indeed a pattern\
    \ or blueprint for creating things. In another way, we create a class that contains\
    \ the properties and methods of several objects. Variables represent attributes,\
    \ whereas methods carry out operations. There are two types of variables and methods\
    \ in classes. When you construct objects from a class, you have access to all\
    \ the same attributes and methods. To make them stand out from other data in the\
    \ instance, they are termed instance variables' (i.e., object). A method is not\
    \ a function; they are two distinct concepts.\n\nThe overall structure of a class\
    \ may be summarized thusly:\n\n```\nClass NameOfClass(object):\n    attributes\
    \ def __init__(self):\n    def procedure1():\n    def procedure2():\n```\n\n###\
    \ 11.1.1: Class Creation\n\nWriting the Classname after the keyword class creates\
    \ a new kind of class. The word 'object' is inserted within the Classname after\
    \ the word 'Classname.' In Python, all classes are descended from a basic class\
    \ called object. We even have our classes derived from the object' class. Thus,\
    \ the parentheses need to include a reference to the 'object'. To avoid confusion,\
    \ it is unnecessary to use the word \"object.\"\n\nCode example for class creation\
    \ and instantiation is as follows:\n\n```\nclass Student:\n    # Class attribute\n\
    \    type = \"student\"\n    # Instance attribute\n    def __init__(self, name,\
    \ age):\n        self.name = name\n        self.age = age\n\n# Instantiate the\
    \ Student class\nAli = Student(\"Ali\", 10)\nZara = Student(\"Zara\", 15)\n# Access\
    \ the class attributes\nprint(\"Ali is a {}\".format(Ali.__class__.type))\nprint(\"\
    Zara is also a {}\".format(Zara.__class__.type))\n# Access the instance attributes\n\
    print(\"{} is {} years old\".format(Ali.name, Ali.age))\nprint(\"{} is {} years\
    \ old\".format(Zara.name, Zara.age))\n```\n\nInstance methods operate on a class's\
    \ instances (or objects). The memory address of the instance may be found. Instance\
    \ methods may access the instance variables since they know where the instance\
    \ is.\n\nThe methods init(self), and talk(self) was formerly referred to as \"\
    instance methods\" in the preceding source code. The __init__() function in the\
    \ student class is used by a student to provide us with his or her name and age.\
    \ In this picture, he is presenting himself to us. Ali is now enrolled as a student.\
    \ As of this age, Ali has reached the age of 10. You're not doing enough if you\
    \ only write a class like this. It ought to be used. To use a class, we must first\
    \ construct a class instance. When you create an instance of a variable, you allocate\
    \ the memory needed to hold the actual contents of that variable. To begin, a\
    \ chunk of heap memory is allotted. To determine how much memory is required,\
    \ look at the student class's characteristics and methods.\n\n__init(self)' is\
    \ called internally once the memory block has been allocated. The initial data\
    \ is saved in the variables using this way. This technique is referred to as a\
    \ 'function Object() { [native code] }' since it is helpful in creating an instance.\n\
    \nFinally, the instance's allocated main memory address is returned to the's1'\
    \ variable. We may use the id() function to view this memory address in decimal\
    \ system format (s1).\n\n![](img/97870751f4132139063aaf46bfceb248_142_0.png)\n\
    \n### 11.1.2: Class Instance\n\nThe def __init__ does not include a full list\
    \ of all possible properties for our object, which should be considered.\nYou\
    \ may not add additional attributes to an object after it has been formed in certain\
    \ languages because the class definition requires you to supply a list of the\
    \ object's attributes. An object in Python may be enhanced dynamically by adding\
    \ additional properties and functions. In reality, the __init__ method has nothing\
    \ to do with attribute setting. The object's age might be cached using the age\
    \ function:\n\n```\ndef Age(self):\n    if attribute(self, \"_age\"):\n      \
    \  return self._age\n    today = datetime.date.today()\n    age = today.year -\
    \ self.birthdate.year\n    if today < datetime.date(today.year, self.birthdate.month,\
    \ self.birthdate.day):\n        age -= 1\n    self._age = age\n    return age\n\
    ```\n\nA method that creates new attributes and does not initialize them in __init__\
    \ is considered poor practice. Updating the values of an object's attributes is\
    \ very frequent. To make matters worse, setting properties outside of an object\
    \ violates the object-oriented paradigm.\n\n### 11.1.3: Class Attributes\n\nAttributes\
    \ are also defined for the class. Each instance of that class will have these\
    \ characteristics. However, there are several limitations that you'd be aware\
    \ of while using them. Class attributes are defined at the same indentation level\
    \ as method declarations in the main body.\n\n```\nclass Car:\n    MODELS = ('Xli',\
    \ 'Gli', 'Reborn', 'Altis')\n    def __init__(self, name, year):\n        if model\
    \ not in self.MODELS:\n            raise ValueError(\"Is not a valid model.\"\
    )\n        self.name = name\n        self.year = year\n```\n\nAs you can see,\
    \ we use the self-variable to retrieve the class attribute MODELS exactly as we\
    \ would retrieve an instance attribute.\n\nMODELS is a class property applied\
    \ to all of our Car instances.\n\nIn many cases, class attributes are used to\
    \ designate constants that belong to a certain class. Class characteristics may\
    \ be accessed through class instances, but they can also be accessed directly\
    \ from class objects if desired.\n\n### 11.1.4: Creating a Class\n\nIn the same\
    \ way that the def keywords define a method in Python, a class in Python is defined\
    \ by the class keyword followed by the name of the class defined.\n\nDocstrings\
    \ are used in classes in a manner that is quite similar to that of functions.\
    \ The usage of documentation strings (docstrings) is not required, but it is strongly\
    \ advised since it is believed to be great training to add a short explanation\
    \ of the class to promote clarity and ease of understanding of the source code.\n\
    \n```\nclass NameOfClass:\n    pass\nclass A:\n    a = 5\n    def functionA(self):\n\
    \        print('Welcome to Class A')\n# accessing attributes using the class object\
    \ of the same name\nA.functionA(1)\nprint(A.a)\n```"
  mdcn: "## 10.6：删除和重命名文件\n\nPython 中的 OS 模块提供了执行文件处理活动的方法，包括重命名和删除文件。要使用此模块，必须在使用任何相关函数之前先导入它。\n\
    \n**rename() 方法：**\n将当前文件名和新文件名发送给 `rename()` 函数。\n语法：\n`os.rename(current_file_name,\
    \ new_file_name)`\n以下是如何重命名一个名为 `test.txt` 的现有文件的示例：\n示例：\n```python\n#!/usr/bin/python\n\
    import os\n# 将文件从 test.txt 重命名为 test2.txt\nos.rename(\"test.txt\", \"test1.txt\"\
    )\n```\n\n**remove() 方法：**\n通过将要删除的文件名作为参数传递给 `remove()` 函数，可以删除文件。\n语法：\n`os.remove(file_name)`\n\
    以下是如何删除文件 `test1.txt` 的示例：\n示例：\n```python\n#!/usr/bin/python\nimport os\n# 删除文件\
    \ test1.txt\nos.remove(\"test1.txt\")\n```\n\n## 第 11 章\n\n## 面向对象编程\n\n艾伦·凯在\
    \ 1966 年还是斯坦福大学研究生时提出了“面向对象编程”（OOP）这个术语。Simula 是第一个具有面向对象编程概念的编程语言，它在 1960 年代开发。它于\
    \ 1967 年创建，用于创建模拟程序，其中最相关的信息由“对象”一词表示。\n\n尽管面向对象编程（OOP）自 1960 年代初就已存在，但由于 C++\
    \ 的影响，直到 1990 年代 OOP 才真正兴起。各种编程语言都采用了这种编程技术，包括 Python。它在几乎所有领域都有实例，包括现实世界系统、机器智能、智能代理、客户端设备、面向对象数据库系统等等。\n\
    \nPython 编程利用面向对象编程（OOPs）作为一种编程范式。语言将包含继承、多态和封装等编程概念。使用 OOPs 时，内容及其操作方法被绑定在一起，形成一个单一单元，使得代码的其他部分无法访问它。\n\
    \n数据和对象是面向对象编程（OOP）的基础，这是一种近年来兴起的范式。如果一种编程语言被认为是面向对象的，它应该包含处理类和对象的机制，以及实现和使用关键面向对象思想和概念（如继承、抽象、封装和多态）的机制。\n\
    \n学习如何通过在 Python 类中定义自定义类型，然后实例化这些类来创建可在应用程序中使用的 Python 对象。\n\n以下是最重要的 Python\
    \ OOPs 概念：\n\n-   类\n-   对象\n-   方法\n-   继承\n-   封装\n-   多态\n-   数据抽象\n\n## 11.1：类\n\
    \n在 Python 中，数据和函数可以组织到类中。它允许创建可以包含任何数据的数据结构，因此可以更开放地访问。\n\n例如，银行职员可以进入银行网站并点击客户类，以查看所有客户属性，例如交易信息以及取款和存款记录。\n\
    \n毫无疑问，类确实是创建事物的模式或蓝图。换句话说，我们创建一个包含多个对象属性和方法的类。变量代表属性，而方法执行操作。类中有两种类型的变量和方法。当你从一个类创建对象时，你可以访问所有相同的属性和方法。为了使它们与实例中的其他数据区分开来，它们被称为“实例变量”（即对象）。方法不是函数；它们是两个不同的概念。\n\
    \n类的整体结构可以总结如下：\n\n```\nclass NameOfClass(object):\n    attributes def __init__(self):\n\
    \    def procedure1():\n    def procedure2():\n```\n\n### 11.1.1：类创建\n\n在关键字 `class`\
    \ 之后编写类名会创建一种新的类类型。单词 'object' 被插入到类名中，位于 'Classname' 之后。在 Python 中，所有类都派生自一个名为\
    \ `object` 的基本类。我们甚至可以从 `object` 类派生出我们自己的类。因此，括号中需要包含对 'object' 的引用。为避免混淆，使用单词\
    \ \"object\" 并非必需。\n\n类创建和实例化的代码示例如下：\n\n```python\nclass Student:\n    # 类属性\n\
