    , m.pi)\n```\n\n输出：\n\n```\npi value  3.141592653589793\n```\n\n`math` 模块被重命名为\
    \ `m`。在某些情况下，这可以节省我们输入的时间。如你所见，在我们的作用域中，`math` 这个词是无法识别的。因此，`math.pi` 是错误的，而 `m.pi`\
    \ 是正确的。\n\n### Python from Import 语句：\n你可以从模块中导入特定的名称，而不是整个模块。\n\n示例：\n\n```\n\
    # 仅从 math 模块导入 pi\nfrom math import pi\nprint(\"The value of pi is\", pi)\n```\n\
    \n输出：\n\n```\nThe value of pi is 3.141592653589793\n```\n\n在这种情况下，只导入了 `math`\
    \ 模块中的 `pi` 属性。在这些情况下，你不需要使用点运算符。也可以导入多个属性，如下所示：\n\n```\n示例：\n>>> from math import\
