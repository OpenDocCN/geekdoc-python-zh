    \nPython 有三种数字类型：复数、浮点数和整数。整数是非小数数字。浮点数是带小数点的数字。复数由虚部和实部组成。字符串是另一种与数字非常不同的数据类型；它是一组字符。换句话说，Python\
    \ 程序中的变量为计算机提供要处理的数据。\n\n## 2.2：命名变量\n\n变量可以用简短的名称（如 `x` 和 `y`）或更具描述性的术语（如 `age`、`car_name`\
