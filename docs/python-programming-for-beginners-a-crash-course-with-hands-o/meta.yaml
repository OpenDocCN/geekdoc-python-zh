    \ is {} years old\".format(Ali.name, Ali.age))\nprint(\"{} is {} years old\".format(Zara.name,\
    \ Zara.age))\n```\n\n实例方法作用于类的实例（或对象）。可以找到实例的内存地址。实例方法可以访问实例变量，因为它们知道实例的位置。\n\n\
    在前面的源代码中，方法 `init(self)` 和 `talk(self)` 以前被称为“实例方法”。学生类中的 `__init__()` 函数用于让学生向我们提供他或她的名字和年龄。在这个场景中，他正在向我们介绍自己。Ali\
    \ 现在注册为一名学生。截至这个年龄，Ali 已经 10 岁了。如果你只写一个这样的类，你做得还不够。它应该被使用。要使用一个类，我们必须首先创建一个类实例。当你创建一个变量的实例时，你需要分配内存来保存该变量的实际内容。首先，分配一块堆内存。要确定需要多少内存，请查看学生类的属性和方法。\n\
    \n内存块分配后，`__init(self)` 会在内部被调用一次。初始数据使用这种方式保存在变量中。由于此方法有助于创建实例，因此被称为“函数 Object()\
