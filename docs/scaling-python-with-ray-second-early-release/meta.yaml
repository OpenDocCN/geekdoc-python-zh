  md: '# t o r , s s c a l i n g a p p r o a c h e s


    | Scaling approach | Feature | Usage criteria |

    | --- | --- | --- |

    | Actor pool | Multiple processes, high CPU utilization | CPU-bound |

    | Async actor | Single process, single thread, cooperative multitasking, tasks
    cooperatively decide on switching. | Slow IO-bound |

    | Threaded actor | Single process, multiple threads, preemptive multitasking,
    OS decides on task switching. | Fast IO-bound and non-async libraries you do not
    control |'
