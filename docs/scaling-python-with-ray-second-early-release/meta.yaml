  md: "execution and can be a little easier to reason about. Ray Actors, but not remote\
    \ functions, integrate with AsyncIO allowing you to write asynchronous actor methods.\n\
    \nYou should use threaded execution when your code spends a lot of time blocking\
    \ but not yielding control by calling `await`. Threads are managed by the operating\
    \ system deciding when to run which thread. Using threaded execution can involve\
    \ fewer code changes, as you do not need to be explicit about where your code\
    \ is yielding. This can also make threaded execution more difficult to reason\
    \ about.\n\nYou need to be careful and selectively use locks when accessing or\
    \ modifying objects with both threads and *AsyncIo*. In both approaches, your\
    \ objects share the same memory. By using locks you ensure that only one thread\
    \ or task can access the specific memory. Locks have some overhead.⁶ As a result,\
    \ usage of actor’s concurrency is mostly applicable for use cases when a state\
    \ is populated in a constructor and never changes.\n\nTo create an actor that\
    \ uses AsyncIo, you need to define at least one async method. In this case, Ray\
    \ will create an AsyncIo event loop for executing the actor’s methods. Submitting\
    \ tasks to these actors is the same from the caller’s perspective as submitting\
    \ tasks to a regular actor. The only difference is that when the task is run on\
    \ the actor, it is posted to an AsyncIo event loop (note that usage of blocking\
    \ `ray.get` or `ray.wait` calls inside async actor method is not allowed, because\
    \ they will block the execution of the event loop) running in a background thread\
    \ or thread pool instead of running directly on the main thread. An example of\
    \ a very simple async actor is presented in [Example 4-8](#example-4-8-simple-async-actor).\n\
    \n# Example 4-8. Simple async actor\n\n```\n@ray.remote\nclass AsyncActor:\n \
    \   async def computation(self, num):\n        print(f'Actor waiting for {num}\
    \ sec')\n        for x in range(num):\n            await asyncio.sleep(1)\n  \
    \          print(f'Actor slept for {x+1} sec')\n        return num\n```"
