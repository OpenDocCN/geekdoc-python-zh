    In a nutshell, an actor is a computer process with an address (handle). This means
    that it can also store things in memory - private to that process. Before delving
    into the details of how to implement and scale Ray actors, let’s first take a
    look at the concepts behind them. Actors come from the actor model design pattern.
    Understanding the actor model is key to effectively managing the state and concurrency.


    # Understanding the Actor model


    The actor model is a conceptual model to deal with concurrent computation and
    was introduced by Carl Hewitt in 1973. The heart of this model is an actor - a
    universal primitive of concurrent computation with its state.


    An actor has a simple job:


    +   - Store data

    - Receive messages from other actors

    - Pass messages to other actors

    - Create additional child actors


    The data that an actor store is hidden from outside an actor and can be accessed/modified
    only by the actor itself. To change the actor’s state it is necessary to send
    messages to the actor that will modify the state. (Compare this to using method
    calls in object-oriented programming.) To ensure an actor’s state consistency,
    actors process one request at a time. This means that all actor method invocations
    are globally serialized for a given actor. To improve the throughput, people often
    create a pool of actors (assuming they can shard or replicate the actor’s state).


    The actor model is a good fit for many distributed systems scenarios. Here are
    some typical use cases where usage of the Actor model can be advantageous:


    +   - You need to deal with a large distributed state that is hard to synchronize
    between invocations.'
