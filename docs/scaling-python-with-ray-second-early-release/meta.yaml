    \ to become ready and exposes this functionality through the `get_next()` function\
    \ (note that this is a blocking call). Pool’s implementation manages a queue of\
    \ execution results (in the same order as requests), This means that whenever\
    \ we need to get a result from the pool it is necessary to first clear out the\
    \ pool results queue to ensure that we get the right result. In addition to the\
    \ multiprocessing-based scaling provided by the actor’s pool, Ray also supports\
    \ scaling of the actor’s execution through concurrency. Ray offers two types of\
    \ concurrency within an actor - threading and async execution.\n\nWhen using concurrency\
    \ inside actors, keep in mind that the Python’s Global Interpreter Lock (GIL)\
    \ will only allow one thread of Python code running at once. This means that pure\
    \ Python will not provide true parallelism. On another hand, if you invoke Numpy,\
    \ Cython, Tensorflow, or PyTorch code, these libraries will release the GIL when\
    \ calling into C/C++ functions. By overlapping the time waiting for IO or working\
    \ in native libraries both threading and async actor execution can achieve some\
    \ parallelism.\n\nAsyncIO can be thought of as cooperative multitasking, where\
    \ your code or libraries needs to explicitly signal that it is waiting on a result,\
    \ and Python can go ahead and execute another task by explicitly switching execution\
    \ context. AsyncIO works by having a single process running through an event loop\
    \ and changing which task it is executing when a task yields/awaits. AsyncIO tends\
    \ to be lower overhead than multithreaded execution and can be a little easier\
    \ to reason about. Ray Actors, but not remote functions, integrate with AsyncIO\
    \ allowing you to write asynchronous actor methods.\n\nYou should use threaded\
    \ execution when your code spends a lot of time blocking but not yielding control\
    \ by calling `await`. Threads are managed by the operating system deciding when\
    \ to run which thread. Using threaded execution can involve fewer code changes,\
    \ as you do not need to be explicit about where your code is yielding. This can\
    \ also make threaded execution more difficult to reason about.\n\nYou need to\
    \ be careful and selectively use locks when accessing or modifying objects with\
    \ both threads and *AsyncIO*. In both approaches, your objects share the same\
    \ memory. By using locks you ensure that only one thread or task can access the\
    \ specific memory. Locks have some overhead.⁶ As a result, usage of actor’s concurrency\
    \ is mostly applicable for use cases when a state is populated in a constructor\
    \ and never changes.\n\nTo create an actor that uses AsyncIO, you need to define\
    \ at least one async method. In this case, Ray will create an AsyncIO event loop\
    \ for executing the actor’s methods. Submitting tasks to these actors is the same\
    \ from the caller’s perspective as submitting tasks to a regular actor. The only\
    \ difference is that when the task is run on the actor, it is posted to an AsyncIO\
    \ event loop (note that usage of blocking `ray.get` or `ray.wait` calls inside\
    \ async actor method is not allowed, because they will block the execution of\
    \ the event loop) running in a background thread or thread pool instead of running\
    \ directly on the main thread. An example of a very simple async actor is presented\
    \ in [Example 4-8](#example-4-8-simple-async-actor).\n\n## Example 4-8. Simple\
    \ async actor\n\n```python\n@ray.remote\nclass AsyncActor:\n    async def computation(self,\
    \ num):\n        print(f'Actor waiting for {num} sec')\n        for x in range(num):\n\
    \            await asyncio.sleep(1)\n            print(f'Actor slept for {x+1}\
    \ sec')\n        return num\n```\n\nBecause method `computation` is defined as\
    \ `async`, Ray will create an async actor. Note that unlike ordinary `async` methods,\
    \ that require `await` to invoke them, usage of the Ray async actors does not\
    \ require any special invocation semantics. Additionally, Ray allows you to specify\
    \ max concurrency for async actor's execution during actor's creation:\n\n```python\n\
    actor = AsyncActor.options(max_concurrency=5).remote()\n```\n\nTo create a threaded\
    \ actor, you need to specify `max_concurrency` during actor creation (Example\
    \ 4-9).\n\n## Example 4-9. Simple threaded actor\n\n```python\n@ray.remote\nclass\
    \ ThreadedActor:\n    def computation(self, num):\n        print(f'Actor waiting\
    \ for {num} sec')\n        for x in range(num):\n            sleep(1)\n      \
    \      print(f'Actor slept for {x+1} sec')\n        return num\n\nactor = ThreadedActor.options(max_concurrency=3).remote()\n\
    ```\n\n> **TIP**\n\nBecause both Async and Threaded actors are using `max_concurrency`,\
    \ it might be a little confusing what type of actor is created. The thing to remember\
    \ is that if `max_concurrency` is used it can be either Async and Threaded actor.\
    \ If at least one of the actor's methods is async, then it is an Async actor,\
    \ otherwise, it is a Threaded one.\n\nSo, which scaling approach should we use\
    \ for our implementation? This [blog post](https://www.google.com) provides a\
    \ good summary of features for different approaches (Table 4-1).\n\n## Table 4-1.\
    \ Comparison of different actor scaling approaches\n\n| Scaling approach | Feature\
    \ | Usage criteria |\n| --- | --- | --- |\n| Actor pool | Multiple processes,\
    \ high CPU utilization | CPU-bound |\n| Async actor | Single process, single thread,\
    \ cooperative multitasking, tasks cooperatively decide on switching. | Slow IO-bound\
    \ |\n| Threaded actor | Single process, multiple threads, preemptive multitasking,\
    \ OS decides on task switching. | Fast IO-bound and non-async libraries you do\
    \ not control |\n\n## Ray Remote Actors’ Best Practices\n\nBecause Ray remote\
    \ actors are effectively remote functions, all of the Ray remote best practices\
    \ described in the previous chapter are applicable. In addition, there are some\
    \ actor-specific best practices.\n\nAs mentioned before, Ray offers support for\
    \ actors’ fault tolerance. Specifically for actors, you can specify `max_restarts`\
    \ to automatically enable restart for Ray actors. This means when your actor or\
