  md: "> This is any scenario where the worker process dies unexpectedly. For example,\
    \ a process that segfaults, or if the worker’s local raylet dies.\n\nTasks that\
    \ fail due to application-level errors are never retried. The exception is caught\
    \ and stored as the return value of the task. Tasks that fail due to system-level\
    \ errors may be automatically retried up to a specified number of attempts. This\
    \ is covered in more detail in [Link to Come].\n\nIn our examples so far, using\
    \ `ray.get` was fine because the futures all had the same execution time. If the\
    \ execution times are different, such as training, a model on different-sized\
    \ batches of data, and you don’t need all of the results at the same time, this\
    \ can be quite wasteful. Instead of directly calling `ray.get`, you should use\
    \ `ray.wait`, which returns the requested number of futures that have already\
    \ been completed. To see the performance difference, you will need to modify your\
    \ remote function to have a variable sleep time, as in Example 3-1.\n\n# Example\
    \ 3-1. Remote function with different execution times\n\n```\n@ray.remote\ndef\
    \ remote_task(x):\n    time.sleep(x)\n    return x\n```\n\nAs you may recall,\
    \ the example remote function sleeps based on the input argument. Since the range\
    \ is ascending in order, calling the remote function on it will result in futures\
    \ that are complete in order. To ensure that the futures won’t complete in order\
    \ you will need to modify the list, one way you can do this is by calling `things.sort(reverse=True)`\
    \ prior to mapping your remote function over things.\n\nTo see the difference\
    \ between using `ray.get` and `ray.wait`, you can write a function that collects\
    \ the values from your futures with some time delay on each object to simulate\
    \ business logic."
