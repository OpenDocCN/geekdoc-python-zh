  md: "Because method `computation` is defined as `async`, Ray will create an async\
    \ actor. Note that unlike ordinary `async` methods, that require `await` to invoke\
    \ them, usage of the Ray async actors does not require any special invocation\
    \ semantics. Additionally, Ray allows you to specify max concurrency for async\
    \ actor's execution during actor's creation:\n\n```\nactor = AsyncActor.options(max_concurrency=5).remote()\n\
    ```\n\nTo create a threaded actor, you need to specify `max_concurrency` during\
    \ actor creation (Example 4-9).\n\n# Example 4-9. Simple threaded actor\n\n```\n\
    @ray.remote\nclass ThreadedActor:\n    def computation(self, num):\n        print(f'Actor\
    \ waiting for {num} sec')\n        for x in range(num):\n            sleep(1)\n\
    \            print(f'Actor slept for {x+1} sec')\n        return num\n\nactor\
    \ = ThreadedActor.options(max_concurrency=3).remote()\n```\n\n> **TIP**\n\nBecause\
    \ both Async and Threaded actors are using `max_concurrency`, it might be a little\
    \ confusing what type of actor is created. The thing to remember is that if `max_concurrency`\
    \ is used it can be either Async and Threaded actor. If at least one of the actor's\
    \ methods is async, then it is an Async actor, otherwise, it is a Threaded one.\n\
    \nSo, which scaling approach should we use for our implementation? This [blog\
    \ post](https://www.google.com) provides a good summary of features for different\
