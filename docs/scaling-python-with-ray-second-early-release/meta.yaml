  md: '# “Big” Data / Scalable Dataframes


    Ray offers a few different APIs for scalable dataframes, a cornerstone of the
    big data ecosystem. It builds on top of the Apache Arrow project to provide a
    (limited) distributed Dataframe API called `ray.data.Dataset`. Beyond that, Ray
    also provides support for a more pandas-like experience through DaskOnRay.


    > **WARNING**


    In addition to the libraries above, you may find references to Mars on Ray or
    Ray’s (deprecated) built-in pandas support. These libraries do not support distributed
    mode, so they can limit your scalability.'
