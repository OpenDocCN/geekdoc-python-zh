    \ in your actor. Consider actor persistence approaches, described in this chapter\
    \ to ensure restoration of execution level states as well. If in your applications\
    \ you have global variables that you have to change do not change them in remote\
    \ functions, rather use actors to encapsulate them and access them through the\
    \ actor’s methods. This is because remote functions are running in different processes\
    \ and do not share the same address space and as a result, these changes are not\
    \ reflected across ray driver and remote functions. One of the common application\
    \ use cases is the execution of the same remote function many times for different\
    \ data sets. Usage of the remote functions directly can cause delays due to the\
    \ creation of new processes for each of the functions. It can also overwhelm the\
    \ Ray cluster with a large number of processes. A more controlled option for such\
    \ a use case is the usage of the Actor’s pool. In this case, a pool provides a\
    \ controlled set of workers that are readily available (no process creation delay)\
    \ for execution. As the pool is maintaining its requests queue, the programming\
    \ model for this option is identical to starting independent remote functions\
    \ but provides a better-controlled execution environment.\n\n## Conclusion"
  mdcn: "该函数。这里的限制在于`value`是一个单一对象。对于具有多个参数的函数，一种解决方案是使用可以包含任意数量组件的元组。函数本身被定义为所需actor方法上的远程函数。在池上的执行是异步的（它只是在内部将请求路由到某个远程actor）。这允许加速`store_state`方法的执行，该方法不需要数据存储的结果。这里的实现不会等待结果状态存储，它只是启动执行。另一方面，`restore_state`方法需要池调用的结果才能继续。池的实现内部管理等待执行结果就绪的过程，并通过`get_next()`函数暴露此功能（注意这是一个阻塞调用）。池的实现管理一个执行结果队列（与请求顺序相同），这意味着每当我们需要从池中获取结果时，必须先清空池的结果队列，以确保我们获得正确的结果。除了actor池提供的基于多进程的扩展外，Ray还支持通过并发来扩展actor的执行。Ray在actor内提供两种类型的并发——线程和异步执行。\n\
    \n在actor内部使用并发时，请记住Python的全局解释器锁（GIL）一次只允许一个Python代码线程运行。这意味着纯Python不会提供真正的并行性。另一方面，如果你调用Numpy、Cython、Tensorflow或PyTorch代码，这些库在调用C/C++函数时会释放GIL。通过重叠等待IO或在原生库中工作的时间，线程和异步actor执行都可以实现一定程度的并行性。\n\
    \nAsyncIO可以被视为协作式多任务，你的代码或库需要明确发出信号表明它正在等待结果，然后Python可以通过显式切换执行上下文来继续执行另一个任务。AsyncIO的工作原理是让单个进程运行一个事件循环，并在任务让出/等待时更改其正在执行的任务。AsyncIO通常比多线程执行开销更低，并且可能更容易理解。Ray\
    \ Actors（但不是远程函数）与AsyncIO集成，允许你编写异步actor方法。\n\n当你的代码花费大量时间阻塞但不通过调用`await`让出控制权时，你应该使用线程执行。线程由操作系统管理，由操作系统决定何时运行哪个线程。使用线程执行可能涉及更少的代码更改，因为你不需要明确指定代码在哪里让出。这也可能使线程执行更难以理解。\n\
    \n在使用线程和*AsyncIO*访问或修改对象时，你需要小心并有选择地使用锁。在这两种方法中，你的对象共享相同的内存。通过使用锁，你可以确保只有一个线程或任务可以访问特定的内存。锁有一些开销。⁶\
    \ 因此，actor并发的使用主要适用于在构造函数中填充状态且永不改变的用例。\n\n要创建一个使用AsyncIO的actor，你需要定义至少一个异步方法。在这种情况下，Ray将创建一个AsyncIO事件循环来执行actor的方法。从调用者的角度来看，向这些actor提交任务与向常规actor提交任务相同。唯一的区别是，当任务在actor上运行时，它被发布到在后台线程或线程池中运行的AsyncIO事件循环（注意不允许在异步actor方法内部使用阻塞的`ray.get`或`ray.wait`调用，因为它们会阻塞事件循环的执行），而不是直接在主线程上运行。一个非常简单的异步actor示例见[示例4-8](#example-4-8-simple-async-actor)。\n\
    \n## 示例4-8. 简单的异步actor\n\n```python\n@ray.remote\nclass AsyncActor:\n    async\
    \ def computation(self, num):\n        print(f'Actor waiting for {num} sec')\n\
    \        for x in range(num):\n            await asyncio.sleep(1)\n          \
    \  print(f'Actor slept for {x+1} sec')\n        return num\n```\n\n因为方法`computation`被定义为`async`，Ray将创建一个异步actor。请注意，与需要`await`来调用的普通`async`方法不同，使用Ray异步actor不需要任何特殊的调用语义。此外，Ray允许你在创建actor时指定异步actor执行的最大并发数：\n\
    \n```python\nactor = AsyncActor.options(max_concurrency=5).remote()\n```\n\n要创建一个线程actor，你需要在创建actor时指定`max_concurrency`（示例4-9）。\n\
    \n## 示例4-9. 简单的线程actor\n\n```python\n@ray.remote\nclass ThreadedActor:\n    def\
    \ computation(self, num):\n        print(f'Actor waiting for {num} sec')\n   \
    \     for x in range(num):\n            sleep(1)\n            print(f'Actor slept\
    \ for {x+1} sec')\n        return num\n\nactor = ThreadedActor.options(max_concurrency=3).remote()\n\
    ```\n\n> **提示**\n\n因为异步和线程actor都使用`max_concurrency`，所以创建的actor类型可能有点令人困惑。需要记住的是，如果使用了`max_concurrency`，它可能是异步或线程actor。如果actor的至少一个方法是异步的，那么它就是异步actor，否则，它就是线程actor。\n\
    \n那么，我们的实现应该使用哪种扩展方法呢？这篇[博客文章](https://www.google.com)很好地总结了不同方法的特性（表4-1）。\n\n\
    ## 表4-1. 不同actor扩展方法的比较\n\n| 扩展方法 | 特性 | 使用标准 |\n| --- | --- | --- |\n| Actor池\
    \ | 多进程，高CPU利用率 | CPU密集型 |\n| 异步actor | 单进程，单线程，协作式多任务，任务协作决定切换。 | 慢速IO密集型 |\n\
    | 线程actor | 单进程，多线程，抢占式多任务，操作系统决定任务切换。 | 快速IO密集型和你无法控制的非异步库 |\n\n## Ray远程Actor的最佳实践\n\
    \n因为Ray远程actor实际上是远程函数，所以前一章描述的所有Ray远程最佳实践都适用。此外，还有一些特定于actor的最佳实践。\n\n如前所述，Ray提供了对actor容错的支持。具体来说，对于actor，你可以指定`max_restarts`来自动启用Ray\
    \ actor的重启。这意味着当你的actor或托管该actor的节点崩溃时，actor将自动重建。然而，这并不提供恢复actor中应用程序级状态的方法。考虑本章描述的actor持久化方法，以确保执行级状态的恢复。如果你的应用程序中有必须更改的全局变量，不要在远程函数中更改它们，而是使用actor来封装它们，并通过actor的方法访问它们。这是因为远程函数在不同的进程中运行，不共享相同的地址空间，因此这些更改不会在ray驱动程序和远程函数之间反映出来。一个常见的应用程序用例是多次对不同数据集执行相同的远程函数。直接使用远程函数可能会因为为每个函数创建新进程而导致延迟。它还可能因大量进程而使Ray集群不堪重负。对于这种用例，一个更可控的选择是使用Actor池。在这种情况下，池提供了一组可控的、随时可用（没有进程创建延迟）的工作进程用于执行。由于池维护其请求队列，此选项的编程模型与启动独立远程函数相同，但提供了更好的受控执行环境。\n\
    \n## 结论"
