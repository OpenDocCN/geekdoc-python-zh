    hand, needs the result of pool invocation to proceed. A pool implementation internally
    manages the process of waiting for execution results to become ready and exposes
    this functionality through the `get_next()` function (note that this is a blocking
    call). Pool’s implementation manages a queue of execution results (in the same
    order as requests), This means that whenever we need to get a result from the
    pool it is necessary to first clear out the pool results queue to ensure that
    we get the right result. In addition to the multiprocessing-based scaling provided
    by the actor’s pool, Ray also supports scaling of the actor’s execution through
    concurrency. Ray offers two types of concurrency within an actor - threading and
    async execution.


    When using concurrency inside actors, keep in mind that the Python’s Global Interpreter
    Lock (GIL) will only allow one thread of Python code running at once. This means
    that pure Python will not provide true parallelism. On another hand, if you invoke
    Numpy, Cython, Tensorflow, or PyTorch code, these libraries will release the GIL
    when calling into C/C++ functions. By overlapping the time waiting for IO or working
    in native libraries both threading and async actor execution can achieve some
    parallelism.


    AsyncIO can be thought of as cooperative multitasking, where your code or libraries
    needs to explicitly signal that it is waiting on a result, and Python can go ahead
    and execute another task by explicitly switching execution context. AsyncIO works
    by having a single process running through an event loop and changing which task
    it is executing when a task yields/awaits. AsyncIO tends to be lower overhead
    than multithreaded'
