    updating the system state). To get the real advantage from the parallel execution,
    you need to make sure that this overhead is negligible compared to the execution
    time of the function itself.⁸


    As described in this chapter, one of the most powerful features of Ray remote
    is the ability to parallelize functions’ execution. Once you call the remote functions,
