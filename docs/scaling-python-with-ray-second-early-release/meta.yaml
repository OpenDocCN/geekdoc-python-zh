- md: "## Build the ray UI\npushd python/ray/new_dashboard/client; npm install &&\
    \ npm ci && npm run build; popd\n# Specify a specific bazel version as newer ones\
    \ sometimes break.\nexport USE_BAZEL_VERSION=4.2.1\ncd python\n# MAC ARM USERS\
    \ ONLY: cleanup the vendored files\nrm -rf ./thirdparty_files\n# Install in edit\
    \ mode or build a wheel\npip install -e .\n# python setup.py bdist_wheel\n\n>\
    \ **TIP**\n\nThe slowest part of the build is compiling the C++ code, which can\
    \ easily take up to an hour on even modern machines. If you have a cluster with\
    \ a number of ARM machines, it’s often worth it to build a wheel once and reuse\
    \ it on your cluster.\n\n## Hello Worlds\n\nNow that you have Ray installed, it’s\
    \ time to learn about some of the Ray APIs. We’ll cover these APIs in more detail\
    \ later, so don’t get too hung up on the details for now.\n\n### Ray Remote (Task/Futures)\
    \ Hello World\n\nOne of the core building blocks of Ray is that of “remote” functions/futures.\
    \ The term “remote” here refers to remote to our main process, and can be on the\
    \ same or a different machine.\n\nTo understand this better, you can write a function\
    \ that returns where it is running. Ray distributes work between multiple processes\
    \ and, when in distributed mode, multiple hosts. A local (non-ray) version of\
    \ this function is shown in Example 2-5.\n\n*Example 2-5.*\n\n```\ndef hi():\n\
    \    import os\n    import socket\n    return f\"Running on {socket.gethostname()}\
    \ in pid {os.getpid()}\"\n```\n\nYou can use the `ray.remote` decorator to create\
    \ a remote function. Calling remote functions is a bit different and is done by\
    \ calling `.remote` on the function. Ray will immediately return a future when\
    \ you call a remote function instead of blocking for the result. You can use `ray.get`\
    \ to get the values returned in those futures. To convert Example 2-5 to a remote\
    \ function, all you need to do is use the `ray.remote` decorator, as shown in\
    \ Example 2-6.\n\n*Example 2-6.*\n\n```\n@ray.remote\ndef remote_hi():\n    import\
    \ os\n    import socket\n    return f\"Running on {socket.gethostname()} in pid\
    \ {os.getpid()}\"\n\nfuture = remote_hi.remote()\nray.get(future)\n```\n\nWhen\
    \ you run these two examples, you’ll see that the first is executed in the same\
    \ process, and that Ray schedules the second one in another process. When we run\
    \ the two examples we get “Running on jupyter-holdenk in pid 33” and “Running\
    \ on jupyter-holdenk in pid 173”, respectively.\n\n### Sleepy task\n\nWhile artificial,\
    \ an easy way to understand how remote futures can help is by making an intentionally\
    \ slow function, in our case `slow_task`, and having Python compute in regular\
    \ function calls and Ray remote calls.\n\n*Example 2-7.*\n\n```\nimport timeit\n\
    \ndef slow_task(x):\n    import time\n    time.sleep(2) # Do something sciency/business\n\
    \    return x\n\n@ray.remote\ndef remote_task(x):\n    return slow_task(x)\n\n\
    things = range(10)\n\nvery_slow_result = map(slow_task, things)\nslowish_result\
    \ = map(lambda x: remote_task.remote(x), things)\n\nslow_time = timeit.timeit(lambda:\
    \ list(very_slow_result), number=1)\nfast_time = timeit.timeit(lambda:\nlist(ray.get(list(slowish_result))),\
    \ number=1)\nprint(f\"In sequence {slow_time}, in parallel {fast_time}\")\n```\n\
    \nWhen you run the code in Example 2-7, you’ll see that by using Ray remote functions\
    \ your code is able to execute multiple remote functions at the same time. While\
    \ you can do this without ray by using multiprocessing, Ray handles all of the\
    \ details for you and can also eventually scale up to multiple machines.\n\n###\
    \ Nested and chained tasks\n\nRay is notable in the distributed processing world\
    \ for allowing nested and chained tasks. Launching more tasks inside of other\
    \ tasks can make certain kinds of recursive algorithms easier to implement. One\
    \ of the more straightforward examples using nested tasks is a web crawler. In\
    \ the web crawler, each page we visit can launch multiple additional visits to\
    \ the links on that page, as shown in Example 2-8.\n\n*Example 2-8.*\n\n```\n\
    @ray.remote\ndef crawl(url, depth=0, maxdepth=1, maxlinks=4):\n    links = []\n\
    \    link_futures = []\n    import requests\n    from bs4 import BeautifulSoup\n\
    \    try:\n        f = requests.get(url)\n        links += [(url, f.text)]\n \
    \       if (depth > maxdepth):\n            return links # base case\n       \
    \ soup = BeautifulSoup(f.text, 'html.parser')\n        c = 0\n        for link\
    \ in soup.find_all('a'):\n            try:\n                c = c + 1\n      \
    \          link_futures += [crawl.remote(link[\"href\"], depth=(depth+1), maxdepth=maxdepth)]\n\
    \                # Don't branch too much were still in local mode\n          \
    \      # and the web is big\n                if c > maxlinks:\n              \
    \      break\n            except:\n                pass\n        for r in ray.get(link_futures):\n\
    \            links += r\n        return links\n    except requests.exceptions.InvalidSchema:\n\
    \        return [] # Skip non-web links\n    except requests.exceptions.MissingSchema:\n\
    \        return [] # Skip non-web links\n\nray.get(crawl.remote(\"http://holdenkarau.com/\"\
    ))\n```\n\nMany other systems require that all tasks launch on a central coordinator\
    \ node. Even those that support launching tasks in a nested fashion still usually\
    \ depend on a central scheduler.\n\n### Data Hello World\n\nRay has a somewhat\
    \ limited dataset API for working with structured data. Apache Arrow powers Ray’s\
    \ Data API. Arrow is a column-oriented, language-independent format with some\
    \ popular operations. Many popular tools support Arrow, allowing easy transfer\
    \ between them (such as Spark, Ray, Dask, Tensorflow, etc.)\n\nRay only recently\
    \ added keyed aggregations on datasets with version 1.9. The most popular distributed\
    \ data example is word count, which requires aggregates. Instead of using these,\
    \ we can perform embarrassingly parallel tasks, such as map transformations, as\
    \ shown, by constructing a dataset of web pages shown in Example 2-9.\n\n*Example\
    \ 2-9. Construct dataset of web pages*\n\n```\n# Create a Dataset of URLs objects.\
    \ We could also load this from a\n# text file with ray.data.read_text()\nurls\
    \ = ray.data.from_items([\n    \"https://github.com/scalingpythonml/scalingpythonml\"\
    ,\n    \"https://github.com/ray-project/ray\"])\n\ndef fetch_page(url):\n    import\
    \ requests\n    f = requests.get(url)\n    return f.text\n\npages = urls.map(fetch_page)\n\
    # Look at a page to make sure it worked\npages.take(1)\n```\n\nRay 1.9 added `GroupedDataset`\
    \ for supporting different kinds of aggregations. By calling `groupby` with either\
    \ a column name or a function that returns a key, you get a `GroupedDataset`.\
    \ `GroupedDataset`'s have built in support for `count`, `max`, `min`, and other\
    \ common aggregations. You can use `GroupedDatasets` to extend Example 2-9 into\
    \ a wordcount example as shown in Example 2-10.\n\n*Example 2-10. Construct dataset\
    \ of web pages*\n\n```\nwords = pages.flat_map(lambda x: x.split(\" \")).map(lambda\
    \ w: (w, 1))\ngrouped_words = words.groupby(lambda wc: wc[0])\n```\n\nWhen you\
    \ need to go beyond the built-in operations, Ray supports custom aggregations\
    \ provided you implement its interface. We will cover more on Datasets, including\
    \ aggregate functions, in [Link to Come].\n\n> **NOTE**\n\nRay uses blocking evaluation\
    \ for its Dataset API. This means that when you call a function on a Ray dataset,\
    \ it will wait until it completes the result instead of returning a future. The\
    \ rest of the Ray core API uses futures.\n\nIf you want a full-featured DataFrame\
    \ API, you can convert your Ray dataset into Dask. [Link to Come] covers how you\
    \ can use Dask for more complex operations. If you are interested in learning\
    \ more about Dask, you should check out Holden's book *Scaling Python with Dask*.\n\
    \n### Actor Hello World\n\nOne of the unique parts of Ray is its emphasis on actors.\
    \ Actors give you tools to manage the execution state, which is one of the more\
    \ challenging parts of scaling systems. Actors send and receive messages, updating\
    \ their state in response. These messages can come from other actors, programs,\
    \ or your “main” execution thread with the Ray client. For every actor, Ray starts\
    \ a dedicated process. Each actor has a mailbox of messages waiting to be processed,\
    \ and when you call an actor Ray adds a message to the corresponding mailbox.\
    \ which allows Ray to serialize message processing, thus avoiding expensive distributed\
    \ locks. Actors can return values in response to messages, so when you send a\
    \ message to an actor, Ray immediately returns a future so you can fetch the value\
    \ when done.\n\n> **ACTOR USES AND HISTORY**\n\nActors have a long history before\
    \ Ray, and were introduced in 1973. The actor model is an excellent solution to\
    \ concurrency with state, and can replace complicated locking structures. Some\
    \ other notable implementations of actors are AKKA in Scala and Erlang.\n\nThe\
    \ actor model can be used for everything from real world systems like e-mail,\
    \ IOT applications like tracking temperature, to flight booking. A common use\
    \ case in Ray actors is managing state, e.g., weights, while performing distributed\
    \ machine learning without requiring expensive locking.²\n\nThe actor model has\
    \ challenges with multiple events that need to be processed in order and rolled\
    \ back as a group. A classic example of this is banking, where transactions need\
    \ to touch multiple accounts and be rolled back as a group.\n\nRay actors are\
    \ created and called similarly to remote functions, but using Python classes,\
    \ which gives the actor a place to store state. You can see this in action by\
    \ modifying the classic “Hello World” example to greet you in sequence, as shown\
    \ in Example 2-11."
  mdcn: "## 构建 Ray UI\npushd python/ray/new_dashboard/client; npm install && npm ci\
    \ && npm run build; popd\n# 指定特定的 bazel 版本，因为较新的版本有时会导致问题。\nexport USE_BAZEL_VERSION=4.2.1\n\
    cd python\n# 仅限 MAC ARM 用户：清理第三方文件\nrm -rf ./thirdparty_files\n# 以编辑模式安装或构建 wheel\
    \ 包\npip install -e .\n# python setup.py bdist_wheel\n\n> **提示**\n\n构建过程中最耗时的部分是编译\
    \ C++ 代码，即使在现代机器上也可能需要长达一小时。如果你有一个包含多台 ARM 机器的集群，通常值得构建一次 wheel 包，然后在集群中重复使用。\n\
    \n## Hello World 示例\n\n既然你已经安装了 Ray，现在是时候了解一些 Ray API 了。我们将在后面更详细地介绍这些 API，所以现在不必过于纠结细节。\n\
    \n### Ray Remote（任务/Futures）Hello World\n\nRay 的核心构建模块之一是“远程”函数/futures。这里的“远程”指的是相对于我们的主进程而言，可以在同一台机器上，也可以在不同的机器上。\n\
    \n为了更好地理解这一点，你可以编写一个函数来返回它运行的位置。Ray 在多个进程之间分配工作，在分布式模式下，甚至在多个主机之间分配。这个函数的本地（非\
    \ Ray）版本如示例 2-5 所示。\n\n*示例 2-5.*\n\n```\ndef hi():\n    import os\n    import\
    \ socket\n    return f\"Running on {socket.gethostname()} in pid {os.getpid()}\"\
    \n```\n\n你可以使用 `ray.remote` 装饰器来创建一个远程函数。调用远程函数有些不同，需要通过调用函数的 `.remote` 方法来实现。当你调用远程函数时，Ray\
    \ 会立即返回一个 future，而不是阻塞等待结果。你可以使用 `ray.get` 来获取这些 future 中返回的值。要将示例 2-5 转换为远程函数，你只需要使用\
    \ `ray.remote` 装饰器，如示例 2-6 所示。\n\n*示例 2-6.*\n\n```\n@ray.remote\ndef remote_hi():\n\
    \    import os\n    import socket\n    return f\"Running on {socket.gethostname()}\
    \ in pid {os.getpid()}\"\n\nfuture = remote_hi.remote()\nray.get(future)\n```\n\
    \n当你运行这两个示例时，你会看到第一个示例在同一个进程中执行，而 Ray 将第二个示例调度到另一个进程中执行。当我们运行这两个示例时，分别得到“Running\
    \ on jupyter-holdenk in pid 33”和“Running on jupyter-holdenk in pid 173”。\n\n###\
    \ 耗时任务\n\n虽然有些刻意，但理解远程 futures 如何提供帮助的一个简单方法是创建一个故意很慢的函数，在我们的例子中是 `slow_task`，然后让\
    \ Python 使用常规函数调用和 Ray 远程调用来计算。\n\n*示例 2-7.*\n\n```\nimport timeit\n\ndef slow_task(x):\n\
    \    import time\n    time.sleep(2) # 执行一些科学计算/业务逻辑\n    return x\n\n@ray.remote\n\
    def remote_task(x):\n    return slow_task(x)\n\nthings = range(10)\n\nvery_slow_result\
    \ = map(slow_task, things)\nslowish_result = map(lambda x: remote_task.remote(x),\
    \ things)\n\nslow_time = timeit.timeit(lambda: list(very_slow_result), number=1)\n\
    fast_time = timeit.timeit(lambda:\nlist(ray.get(list(slowish_result))), number=1)\n\
    print(f\"In sequence {slow_time}, in parallel {fast_time}\")\n```\n\n当你运行示例 2-7\
    \ 中的代码时，你会看到通过使用 Ray 远程函数，你的代码能够同时执行多个远程函数。虽然你可以通过使用 multiprocessing 在没有 Ray 的情况下实现这一点，但\
    \ Ray 为你处理了所有细节，并且最终可以扩展到多台机器。\n\n### 嵌套和链式任务\n\nRay 在分布式处理领域的一个显著特点是允许嵌套和链式任务。在其他任务内部启动更多任务可以使某些类型的递归算法更容易实现。使用嵌套任务的一个更直接的例子是网络爬虫。在网络爬虫中，我们访问的每个页面都可以启动对该页面上链接的多次额外访问，如示例\
    \ 2-8 所示。\n\n*示例 2-8.*\n\n```\n@ray.remote\ndef crawl(url, depth=0, maxdepth=1,\
    \ maxlinks=4):\n    links = []\n    link_futures = []\n    import requests\n \
    \   from bs4 import BeautifulSoup\n    try:\n        f = requests.get(url)\n \
    \       links += [(url, f.text)]\n        if (depth > maxdepth):\n           \
    \ return links # 基本情况\n        soup = BeautifulSoup(f.text, 'html.parser')\n \
    \       c = 0\n        for link in soup.find_all('a'):\n            try:\n   \
    \             c = c + 1\n                link_futures += [crawl.remote(link[\"\
    href\"], depth=(depth+1), maxdepth=maxdepth)]\n                # 不要分支太多，我们仍在本地模式下，而且网络很大\n\
    \                if c > maxlinks:\n                    break\n            except:\n\
    \                pass\n        for r in ray.get(link_futures):\n            links\
    \ += r\n        return links\n    except requests.exceptions.InvalidSchema:\n\
    \        return [] # 跳过非网络链接\n    except requests.exceptions.MissingSchema:\n\
    \        return [] # 跳过非网络链接\n\nray.get(crawl.remote(\"http://holdenkarau.com/\"\
    ))\n```\n\n许多其他系统要求所有任务都在中央协调节点上启动。即使那些支持以嵌套方式启动任务的系统，通常也依赖于中央调度器。\n\n### 数据 Hello\
    \ World\n\nRay 有一个功能相对有限的数据集 API，用于处理结构化数据。Apache Arrow 为 Ray 的 Data API 提供支持。Arrow\
    \ 是一种面向列的、与语言无关的格式，具有一些流行的操作。许多流行工具支持 Arrow，允许在它们之间轻松传输（例如 Spark、Ray、Dask、Tensorflow\
    \ 等）。\n\nRay 最近在 1.9 版本中添加了对数据集的按键聚合功能。最流行的分布式数据示例是词频统计，它需要聚合操作。我们可以不使用这些，而是执行易于并行化的任务，例如\
    \ map 转换，如示例 2-9 所示，通过构建一个网页数据集。\n\n*示例 2-9. 构建网页数据集*\n\n```\n# 创建一个 URL 对象的数据集。我们也可以从文本文件加载，使用\
    \ ray.data.read_text()\nurls = ray.data.from_items([\n    \"https://github.com/scalingpythonml/scalingpythonml\"\
    ,\n    \"https://github.com/ray-project/ray\"])\n\ndef fetch_page(url):\n    import\
    \ requests\n    f = requests.get(url)\n    return f.text\n\npages = urls.map(fetch_page)\n\
    # 查看一个页面以确保它正常工作\npages.take(1)\n```\n\nRay 1.9 添加了 `GroupedDataset` 以支持不同类型的聚合。通过使用列名或返回键的函数调用\
    \ `groupby`，你会得到一个 `GroupedDataset`。`GroupedDataset` 内置支持 `count`、`max`、`min`\
    \ 和其他常见聚合。你可以使用 `GroupedDatasets` 将示例 2-9 扩展为词频统计示例，如示例 2-10 所示。\n\n*示例 2-10.\
    \ 构建网页数据集*\n\n```\nwords = pages.flat_map(lambda x: x.split(\" \")).map(lambda\
    \ w: (w, 1))\ngrouped_words = words.groupby(lambda wc: wc[0])\n```\n\n当你需要超越内置操作时，Ray\
    \ 支持自定义聚合，前提是你实现其接口。我们将在[待补充链接]中更详细地介绍数据集，包括聚合函数。\n\n> **注意**\n\nRay 对其 Data API\
    \ 使用阻塞求值。这意味着当你在 Ray 数据集上调用函数时，它会等待完成并返回结果，而不是返回一个 future。Ray 核心 API 的其余部分使用 futures。\n\
    \n如果你想要一个功能齐全的 DataFrame API，你可以将你的 Ray 数据集转换为 Dask。[待补充链接]介绍了如何使用 Dask 进行更复杂的操作。如果你有兴趣了解更多关于\
    \ Dask 的知识，你应该查看 Holden 的书 *Scaling Python with Dask*。\n\n### Actor Hello World\n\
    \nRay 的独特之处之一在于它对 actor 的强调。Actor 为你提供了管理执行状态的工具，这是扩展系统时更具挑战性的部分之一。Actor 发送和接收消息，并相应地更新其状态。这些消息可以来自其他\
    \ actor、程序，或者你的“主”执行线程（通过 Ray 客户端）。对于每个 actor，Ray 都会启动一个专用进程。每个 actor 都有一个等待处理的消息邮箱，当你调用一个\
    \ actor 时，Ray 会向相应的邮箱添加一条消息。这使得 Ray 能够序列化消息处理，从而避免昂贵的分布式锁。Actor 可以返回值以响应消息，因此当你向\
    \ actor 发送消息时，Ray 会立即返回一个 future，以便你在完成时获取值。\n\n> **Actor 的用途和历史**\n\nActor 在\
    \ Ray 之前就有很长的历史，最早于 1973 年引入。Actor 模型是解决有状态并发问题的优秀方案，可以替代复杂的锁结构。其他一些著名的 actor\
    \ 实现包括 Scala 中的 AKKA 和 Erlang。\n\nActor 模型可用于从电子邮件等现实世界系统、温度跟踪等物联网应用到航班预订等各种场景。Ray\
    \ actor 中一个常见的用例是管理状态（例如权重），同时执行分布式机器学习，而无需昂贵的锁。²\n\nActor 模型在处理需要按顺序处理并作为一组回滚的多个事件时面临挑战。一个经典的例子是银行业务，其中交易需要涉及多个账户并作为一组回滚。\n\
    \nRay actor 的创建和调用类似于远程函数，但使用 Python 类，这为 actor 提供了存储状态的地方。你可以通过修改经典的“Hello World”示例来按顺序向你问好，如示例\
    \ 2-11 所示，来实际体验这一点。"
