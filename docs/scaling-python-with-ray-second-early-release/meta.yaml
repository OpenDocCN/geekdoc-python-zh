  md: '# RAY AND SPARK


    It is tempting to compare Ray with Apache Spark, and in some abstract ways, they
    are very similar. From a user’s point of view, Apache Spark is ideal for data-intensive
    tasks, and Ray is better suited to compute-intensive tasks.


    Ray has a lower task overhead and has support for distributed state, making it
    especially appealing for machine learning tasks. Ray’s lower level APIs make it
    a more appealing platform to build tools on top of.


    Spark has more data tools but depends on centralized scheduling and state management.
    This centralization makes implementing reinforcement learning and recursive algorithms
    a challenge. For analytical use cases, especially in existing big data deployments,
    Spark may be a better choice.


    Ray and Spark are complementary and can be used together. A common pattern is
    data processing with Spark and then machine learning with Ray. In fact, the `RayDP`
    library provides you a way to use Spark Dataframes inside of Ray.


    # Machine Learning


    Ray has multiple machine learning libraries, and for the most part, they serve
    to delegate much of the fancy parts to existing tools like PyTorch, Scikit-Learn,
    and Tensorflow while using Ray’s distributed computing facilities to scale. Ray
    Tune implements hyper-parameter tuning, using Ray’s ability to train many local
    Python-based models in parallel across a distributed set of machines. Ray Train
    implements distributed training with PyTorch or Tensorflow. Ray’s RLlib interface
    offers reinforcement learning with a number of core algorithms.


    Part of what allows Ray to stand out from pure data-parallel systems for machine
    learning is its actor model, which allows easier tracking of “state”-'
  merge: -1
  pgno: 15
- img_proc: true
  md: 'like parameters and inter-worker communication. You can use this to implement
    your own custom algorithms that are not a part of Ray core.


    # Workflow Scheduling


    Workflow scheduling is one of these areas which, at first glance, can seem really
    simple. It’s “just” a graph of work that needs to be done. However, all programs
    can be expressed as “just” a graph of work that needs to be done. New in 2.0,
    Ray has a workflow library to simplify expressing both traditional business logic
    workflows and large-scale (e.g. ML training) workflows.


    Ray is unique in workflow scheduling because it allows tasks to schedule other
    tasks without having to call back to a central node. This allows for greater flexibility
    and throughput.


    If you find Ray’s workflow engine too low-level, you can use Ray to run Apache
    Airflow. Airflow is one of the more popular workflow scheduling engines in the
    big data space. The [Ray Airflow Provider](https://docs.ray.io/en/latest/ray-airflow/index.html)
    lets you use your Ray cluster as a worker pool for Airflow.


    # Streaming


    Streaming is generally considered to be processing “real-time-ish” data, or data
    “as-it-arrives-ish.” Streaming adds another layer of complexity, especially the
    closer to real-time you try to get, as not all of your data will always arrive
    in order or on time. Ray offers some standard streaming primitives and can use
    Kafka as a streaming data source and sink. Ray uses its actor model APIs to interact
    with streaming data.


    Ray streaming, like many streaming systems bolted on batch systems, has some interesting
    quirks. Ray streaming, notably, implements more of its logic in Java, unlike the
    rest of Ray. This can make debugging streaming applications more challenging than
    other components in Ray.


    # Interactive'
  merge: -1
  pgno: 16
- img_proc: true
  md: 'Not all “real-time-ish” applications are necessarily “streaming” applications.
    A common example of this is when you are interactively exploring a dataset. Similarly,
    interacting with user input (e.g., serving models) can be considered interactive
    rather than batch, but it is handled separately from the streaming libraries with
    “Ray Serve.”


    # What Ray Is Not


    While Ray is a general-purpose distributed system, it’s important to note there
    are some things Ray is not (although of course, you could make it be, but you
    may not want to):


    +   - SQL / analytics engine

    - Data storage system

    - Suitable for running nuclear reactors

    - Fully language independent


    In all of these cases Ray can be used to do a bit of them, but you’re likely better
    of using more specialized tooling. For example, while Ray does have a key/value
    store, it isn’t designed to survive the loss of the leader node. This doesn’t
    mean that if you find yourself working on a problem that needs a bit of SQL, or
    some non-Python libraries, Ray cannot meet your needs—just you may need to bring
    in additional tools.


    # Conclusion


    Ray has the potential to greatly simplify your development and operational overhead
    for medium-to-large scale problems. It achieves this by offering a unified API
    across a variety of traditionally separate problems while providing serverless
    scalability. If you have problems spanning the domains that Ray serves, or just
    are tired of the operational overhead of managing your own clusters, we hope you’ll
    join us on the adventure of learning Ray. In the next chapter, we’ll show you
    how to get Ray installed in local mode'
