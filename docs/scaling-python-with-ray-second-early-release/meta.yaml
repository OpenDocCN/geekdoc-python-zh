- md: "## Workflow Scheduling\n\nWorkflow scheduling is one of these areas which,\
    \ at first glance, can seem really simple. It’s “just” a graph of work that needs\
    \ to be done. However, all programs can be expressed as “just” a graph of work\
    \ that needs to be done. New in 2.0, Ray has a workflow library to simplify expressing\
    \ both traditional business logic workflows and large-scale (e.g. ML training)\
    \ workflows.\n\nRay is unique in workflow scheduling because it allows tasks to\
    \ schedule other tasks without having to call back to a central node. This allows\
    \ for greater flexibility and throughput.\n\nIf you find Ray’s workflow engine\
    \ too low-level, you can use Ray to run Apache Airflow. Airflow is one of the\
    \ more popular workflow scheduling engines in the big data space. The [Ray Airflow\
    \ Provider](https://docs.ray.io/en/latest/ray-airflow/index.html) lets you use\
    \ your Ray cluster as a worker pool for Airflow.\n\n## Streaming\n\nStreaming\
    \ is generally considered to be processing “real-time-ish” data, or data “as-it-arrives-ish.”\
    \ Streaming adds another layer of complexity, especially the closer to real-time\
    \ you try to get, as not all of your data will always arrive in order or on time.\
    \ Ray offers some standard streaming primitives and can use Kafka as a streaming\
    \ data source and sink. Ray uses its actor model APIs to interact with streaming\
    \ data.\n\nRay streaming, like many streaming systems bolted on batch systems,\
    \ has some interesting quirks. Ray streaming, notably, implements more of its\
    \ logic in Java, unlike the rest of Ray. This can make debugging streaming applications\
    \ more challenging than other components in Ray.\n\n## Interactive\n\nNot all\
    \ “real-time-ish” applications are necessarily “streaming” applications. A common\
    \ example of this is when you are interactively exploring a dataset. Similarly,\
    \ interacting with user input (e.g., serving models) can be considered interactive\
    \ rather than batch, but it is handled separately from the streaming libraries\
    \ with “Ray Serve.”\n\n## What Ray Is Not\n\nWhile Ray is a general-purpose distributed\
    \ system, it’s important to note there are some things Ray is not (although of\
    \ course, you could make it be, but you may not want to):\n\n- SQL / analytics\
    \ engine\n- Data storage system\n- Suitable for running nuclear reactors\n- Fully\
    \ language independent\n\nIn all of these cases Ray can be used to do a bit of\
    \ them, but you’re likely better off using more specialized tooling. For example,\
    \ while Ray does have a key/value store, it isn’t designed to survive the loss\
    \ of the leader node. This doesn’t mean that if you find yourself working on a\
    \ problem that needs a bit of SQL, or some non-Python libraries, Ray cannot meet\
    \ your needs—just you may need to bring in additional tools.\n\n## Conclusion\n\
    \nRay has the potential to greatly simplify your development and operational overhead\
    \ for medium-to-large scale problems. It achieves this by offering a unified API\
    \ across a variety of traditionally separate problems while providing serverless\
    \ scalability. If you have problems spanning the domains that Ray serves, or just\
    \ are tired of the operational overhead of managing your own clusters, we hope\
