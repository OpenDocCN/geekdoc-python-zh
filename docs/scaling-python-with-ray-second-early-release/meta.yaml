  md: 'BasePersistence class, which allows for easily changing persistence implementation
    without changing the actor’s code. Additionally, `restore_state` and `savestate`
    methods are generalized to move all of the persistence-specific code to the persistence
    class.


    This implementation is flexible enough to support different persistence implementations,
    but if a persistence implementation requires permanent connections to a persistence
    source (for example DB connection), it can become unscalable by simultaneously
    maintaining too many connections. In this case, we can implement persistence as
    an **additional actor**. But this requires scaling of this actor. Let’s take a
    look at the options that Ray provides for scaling actors.


    # Scaling Ray Remote Actors


    The original actor model described earlier in this chapter, typically assumes
    that actors are lightweight, e.g. contain a single piece of state, and they do
    not require scaling/parallelization. In Ray and similar systems,⁴ actors are often
    used for coarser grained implementations and can require scaling.⁵


    As with Ray remote functions, you can scale actors both horizontally (across processes/machines)
    with “pools” or vertically (with more resources). The [Link to Come] section covers
    how to request more resources, but for now, let’s focus on horizontal scaling.


    You can add more processes for actors Horizontal with Ray’s actor pool provided
    by the ray.util module. This class is similar to a multiprocessing pool and lets
    you schedule your tasks over a fixed pool of actors. It effectively uses a fixed
    set of actors as a single entity and manages which actor in the pool gets the
    next request. Note that actors in the pool are still individual actors and their
    state is not merged. So this scaling option only works in the case when an actor’s
    state is created in the constructor and does not change during the actor’s execution.


    Let’s take a look at how to use an actor’s pool to improve the scalability of
    our account class with **persistence actor** (Example 4-7).'
