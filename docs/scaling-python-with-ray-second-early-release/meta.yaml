    You can disable fetching of results by setting this to `false` if you are only
    interested in ensuring the futures are completed.


    > **TIP**


    The timeout parameter is extremely important in both `ray.get()` and `ray.wait()`.
    If this parameter is not specified and one of your remote functions misbehaves
    (i.e., never completes), then `ray.get()`/`ray.wait()` will never return, and
    your program will block forever.⁵ As a result, for any production code, we recommend
    that you use the timeout parameter in both to avoid deadlocks.


    Ray''s `get` and `wait` functions handle timeouts slightly differently. Ray doesn''t
    raise an exception on `ray.wait` when a timeout occurs; instead, it simply returns
