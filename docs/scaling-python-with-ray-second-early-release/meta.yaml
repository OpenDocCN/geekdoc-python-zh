  md: "```\nreturn f\"Running on {socket.gethostname()} in pid {os.getpid()}\"\n```\n\
    \nYou can use the `ray.remote` decorator to create a remote function. Calling\
    \ remote functions is a bit different and is done by calling `.remote` on the\
    \ function. Ray will immediately return a future when you call a remote function\
    \ instead of blocking for the result. You can use `ray.get` to get the values\
    \ returned in those futures. To convert Example 2-5 to a remote function, all\
    \ you need to do is use the `ray.remote` decorator, as shown in Example 2-6.\n\
    \n# Example 2-6.\n\n```\n@ray.remote\ndef remote_hi():\n    import os\n    import\
    \ socket\n    return f\"Running on {socket.gethostname()} in pid {os.getpid()}\"\
    \n\nfuture = remote_hi.remote()\nray.get(future)\n```\n\nWhen you run these two\
    \ examples, you’ll see that the first is executed in the same process, and that\
    \ Ray schedules the second one in another process. When we run the two examples\
    \ we get “Running on jupyter-holdenk in pid 33” and “Running on jupyter-holdenk\
    \ in pid 173”, respectively.\n\n# Sleepy task\n\nWhile artificial, an easy way\
