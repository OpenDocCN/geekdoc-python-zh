    # Conclusion


    In this chapter, you learned about a fundamental Ray feature—remote functions’
    invocation and their usage for the creation of parallel asynchronous execution
    of Python across multiple cores and machines. You also learned multiple approaches
    for waiting for remote functions execution completion and how to use `ray.wait`
    to prevent deadlocks in your code. Finally, you have learned about remote functions
    composition and how you can use it for rudimentary execution control (mini workflows).
    You have also learned how to implement nested parallelism, where you can invoke
    several functions in parallel with each of these functions in turn, invoking more
    parallel functions. In the next chapter, you will learn how to manage the state
    in Ray using actors.


