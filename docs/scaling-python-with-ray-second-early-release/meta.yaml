    is through the [multiprocessing module](https://docs.python.org/3/library/multiprocessing.html).
    Multiprocessing is limited in its ability to handle the requirements of modern
    applications. These requirements include the following:


    +   - Running the same code on multiple cores or machines

    - Tooling to handle machine and processing failures

    - Efficiently handling large parameters

    - Easily passing information between processes


    Unlike multiprocessing, Ray’s remote functions satisfy the above requirements.
    It’s important to note that “remote” doesn’t necessarily refer to a separate computer
