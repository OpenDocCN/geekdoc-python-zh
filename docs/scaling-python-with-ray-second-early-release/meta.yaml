  md: '*max_task_retries*


    Specify how many times to retry an actor’s task if the task fails due to a system
    error. If set to -1, the system will retry the failed task until the task succeeds,
    or the actor has reached its max_restarts limit. If set to n > 0, the system will
    retry the failed task up to n times, after which the task will throw a RayActorError
    exception upon ray.get.


