  - '[PAGE 50]


    # ACTOR LIFECYCLE


    Actor lifetimes and metadata (e.g., IP address and port) are managed by the global
    control store (GCS) service, which is currently a single point of failure. We
    cover the GCS in more detail in the next chapter.


    Each client of the actor may cache this metadata and use it to send tasks to the
    actor directly over gRPC without querying the GCS. When an actor is created in
    Python, the creating worker first synchronously registers the actor with the GCS.
    This ensures correctness in case the creating worker fails before the actor can
    be created. Once the GCS responds, the remainder of the actor creation process
    is asynchronous. The creating worker process queues locally a special task known
    as the actor creation task. This is similar to a normal non-actor task, except
    that its specified resources are acquired for the lifetime of the actor process.
    The creator asynchronously resolves the dependencies for the actor creation task,
    then sends it to the GCS service to be scheduled. Meanwhile, the Python call to
    create the actor immediately returns an “actor handle” that can be used even if
    the actor creation task has not yet been scheduled. Actor’s method execution is
    similar to a remote task invocation - it is submitted directly to the actor process
    via gRPC, will not run until all `ObjectRef` dependencies have been resolved and
    return futures. Note that no resource allocation is required for actor’s method
    invocation (it is performed during the actor’s creation), which makes them faster
    than remote function invocation.


    Here `account_actor` represents an actor handle. These handles play an important
    role in the actor’s life cycle. Actor processes will be terminated automatically
    when the initial actor handle goes out of scope in Python (note that in this case
    the actor’s state is lost).'
