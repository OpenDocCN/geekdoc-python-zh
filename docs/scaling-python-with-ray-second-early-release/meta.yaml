- md: "## ACTOR LIFECYCLE\n\nActor lifetimes and metadata (e.g., IP address and port)\
    \ are managed by the global control store (GCS) service, which is currently a\
    \ single point of failure. We cover the GCS in more detail in the next chapter.\n\
    \nEach client of the actor may cache this metadata and use it to send tasks to\
    \ the actor directly over gRPC without querying the GCS. When an actor is created\
    \ in Python, the creating worker first synchronously registers the actor with\
    \ the GCS. This ensures correctness in case the creating worker fails before the\
    \ actor can be created. Once the GCS responds, the remainder of the actor creation\
    \ process is asynchronous. The creating worker process queues locally a special\
    \ task known as the actor creation task. This is similar to a normal non-actor\
    \ task, except that its specified resources are acquired for the lifetime of the\
    \ actor process. The creator asynchronously resolves the dependencies for the\
    \ actor creation task, then sends it to the GCS service to be scheduled. Meanwhile,\
    \ the Python call to create the actor immediately returns an “actor handle” that\
    \ can be used even if the actor creation task has not yet been scheduled. Actor’s\
    \ method execution is similar to a remote task invocation - it is submitted directly\
    \ to the actor process via gRPC, will not run until all `ObjectRef` dependencies\
    \ have been resolved and return futures. Note that no resource allocation is required\
    \ for actor’s method invocation (it is performed during the actor’s creation),\
    \ which makes them faster than remote function invocation.\n\nHere `account_actor`\
    \ represents an actor handle. These handles play an important role in the actor’s\
    \ life cycle. Actor processes will be terminated automatically when the initial\
    \ actor handle goes out of scope in Python (note that in this case the actor’s\
    \ state is lost).\n\n> **TIP**\n\nYou can create multiple distinct actors from\
    \ the same class, they will each have their own independent state.\n\nLike an\
    \ ObjectRef, you can pass an actor handle as a parameter to another actor or Ray\
    \ remote function or a Python code. Note that Example 4-1 uses @ray.remote annotation\
    \ to define an ordinary Python class as a Ray remote actor. Alternatively, instead\
    \ of using an annotation, you can leverage the following code to convert a Python\
    \ class into a remote actor:\n\n```\nAccount = ray.remote(Account)\naccount_actor\
    \ = Account.remote(balance = 100., minimal_balance=20.)\n```\n\nOnce you have\
    \ a remote actor in place you can invoke it using the code in Example 4-2.\n\n\
    ### Example 4-2. Invoking remote actor\n\n```\nprint(f\"Current balance {ray.get(account_actor.balance.remote())}\"\
    )\nprint(f\"New balance {ray.get(account_actor.withdraw.remote(40.))}\")\nprint(f\"\
    New balance {ray.get(account_actor.deposit.remote(30.))}\")\n```\n\n> **TIP**\n\
    \nTo deal with exceptions that can be thrown from the deposit and withdrawal methods,\
    \ the code in Example 4-2 should be augmented with a try/except clause:\n\n```python\n\
    try:\n    print(f\"New balance {ray.get(account_actor.withdraw.remote(-40.))}\"\
    )\nexcept Exception as e:\n    print(f\"Oops! {e} occurred.\")\n```\n\nThis will\
    \ ensure that the code will intercept all the exceptions thrown by the actor’s\
    \ code and implement all the necessary actions.\n\nYou can also create named actors\
    \ using the following:\n\n```\naccount_actor = Account.options(name='Account')\
    \ \\\n    .remote(balance = 100., minimal_balance=20.)\n```\n\nOnce the actor\
    \ has a name you can use this name to obtain the actor’s handle from any place\
    \ in the code:\n\n```\nray.get_actor('Account')\n```\n\nAs defined above, the\
    \ default actor’s life cycle is linked to the actor’s handle being in scope. Actor\
    \ lifetime can be decoupled from its handle being in scope, allowing an actor\
    \ to persist even after the driver process exits. You can create a detached actor\
    \ by specifying the lifetime parameter as detached, as shown below:\n\n```\naccount_actor\
    \ = Account.options(name='Account',\n    lifetime=\"detached\") \\\n    .remote(balance\
    \ = 100., minimal_balance=20.)\n```\n\nIn theory, you can make an actor detached\
    \ without specifying its name, but it makes sense to use named detached actors\
    \ so that you can access them by name from any place in your code, even when an\
    \ actor’s handle went out of scope. The detached actor itself can own any other\
    \ tasks and objects. In addition, you can manually delete actors from both inside\
    \ an actor, using `ray.actor.exit_actor()` or using an actor’s handle `ray.kill(account_actor)`.\
    \ This can be useful if you know that you do not need specific actors anymore\
    \ and want to reclaim the resources. As shown here, it’s fairly easy to create\
    \ a basic Ray actor and manage its life cycle, but what happens if the Ray node\
    \ on which the actor is running will go down for some reason?¹ The @ray.remote\
    \ annotation allows you to specify two parameters that control behavior in this\
    \ case:\n\n*max_restarts*\n\nSpecify the maximum number of times that the actor\
    \ should be restarted when it dies unexpectedly. The minimum valid value is 0\
    \ (default), which indicates that the actor doesn’t need to be restarted. A value\
    \ of -1 indicates that an actor should be restarted indefinitely.\n\n*max_task_retries*\n\
    \nSpecify how many times to retry an actor’s task if the task fails due to a system\
    \ error. If set to -1, the system will retry the failed task until the task succeeds,\
