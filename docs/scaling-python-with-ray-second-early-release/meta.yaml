  md: 'Installing Ray, even on a single machine, can range from relatively straightforward
    to fairly complicated. Ray publishes wheels to PyPi following a normal release
    cadence as well as nightly releases. These wheels are currently only available
    for x86 users, so ARM users will mostly need to build Ray from source.¹


    > **TIP**

    M1 ARM users on OSX can use the x86 packages with Rosetta. There is some performance
    impact, but it’s a much simpler setup. To use the x86s package install Anaconda
    Python for OSX.


    # Installing (for x86 and M1 ARM)


    Most users can run `pip install -U ray` to install Ray from PyPi automatically.
    When you go to distribute your computation on multiple machines it’s often easier
    to have been working in a conda environment so you can match Python versions with
    your cluster and know your package dependencies. The commands in Example 2-1 set
    up a fresh conda environment with Python and install Ray with some minimal dependencies.


    ```

    Example 2-1.

    conda create -n ray python=3.7 mamba -y

    conda activate ray

    # In a conda env this won''t be auto-installed with ray so add them

    pip install jinja2 python-dateutil cloudpickle packaging pygments \n    psutil
    nbconvert ray

    ```


    # Installing (from Source) for ARM


    For ARM users or any users with a system architecture that does not have a prebuilt
    wheel available, you will need to build Ray from the source.


    On our ARM Ubuntu system, we need to install some additional packages, as shown
    in Example 2-2.


    ```

    Example 2-2.

    ```'
