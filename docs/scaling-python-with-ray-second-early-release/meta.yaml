    \n## 结论\n\n在本章中，你已经在本地机器上安装了 Ray 并使用了它的许多核心 API。在大多数情况下，你可以继续以本地模式运行我们为本书挑选的示例。当然，本地模式可能会限制你的规模或导致运行时间更长。在下一章中，我们将探讨\
    \ Ray 背后的一些核心概念。其中一个概念（容错）用集群或云来演示会更容易。因此，如果你有云账户或集群的访问权限，现在正是跳转到[后续链接]并查看不同部署选项的绝佳时机。\n\
    \n1. 随着 ARM 的日益普及，Ray 更有可能添加 ARM 轮子，因此希望这只是暂时的。\n2. Actor 仍然比无锁远程函数更昂贵，后者可以水平扩展。例如，大量\
    \ worker 调用同一个 actor 来更新模型权重，仍然会比尴尬并行操作慢。\n\n## 第 3 章. Ray 远程函数\n\n> **致早期发布读者的说明**\n\
    \n通过早期发布电子书，你可以在书籍的最早期形式——作者撰写时的原始未编辑内容——中获取书籍，从而在这些书籍正式发布之前很久就能利用这些技术。\n\n这将是最终书籍的第三章。请注意，GitHub\
    \ 仓库稍后将激活。\n\n如果你对我们如何改进本书的内容和/或示例有意见，或者你发现本章中有缺失的材料，请通过 vwilson@oreilly.com 联系编辑。\n\
    \n在大规模构建现代应用程序时，你通常需要某种形式的分布式或并行计算。许多 Python 开发者是通过 [multiprocessing 模块](https://docs.python.org/3/library/multiprocessing.html)\
    \ 接触到并行计算的。Multiprocessing 在处理现代应用程序的需求方面能力有限。这些需求包括：\n\n- 在多个核心或机器上运行相同的代码\n\
    - 处理机器和处理故障的工具\n- 高效处理大型参数\n- 轻松地在进程之间传递信息\n\n与 multiprocessing 不同，Ray 的远程函数满足上述要求。需要注意的是，“远程”并不一定指单独的计算机，尽管它的名字如此。当你创建一个远程函数时，Ray\
    \ 会接管对该函数的调用分发，而不是在同一个进程中运行。调用远程函数时，你实际上是在多个核心或不同机器上异步¹运行，而无需关心如何或在哪里运行。\n\n在本章中，你将学习如何创建远程函数、等待它们完成以及获取结果。一旦掌握了基础知识，你将学习如何将远程函数组合在一起以创建更复杂的操作。在深入之前，让我们先从理解我们在上一章中略过的一些内容开始。\n\
    \n## 理解 Ray 远程函数的要点\n\n在上一章中，你学习了如何创建一个基本的 Ray 远程函数（示例 2-7）。\n\n当你调用一个远程函数时，它会立即返回一个\
    \ ObjectRef（一个 future），这是一个对远程对象的引用。Ray 在后台的单独 worker 进程中创建并执行任务，并在完成后将结果写入原始引用。然后你可以对\
    \ ObjectRef 调用 `ray.get` 来获取值。请注意，`ray.get` 是一个阻塞方法，它会等待任务执行完成后再返回结果。\n\n> ###\
    \ RAY 中的远程对象\n\n远程对象只是一个对象，它可能位于另一个节点上。ObjectRef 就像指向对象的指针或 ID，你可以用它来获取远程函数的值或状态。除了从远程函数调用创建之外，你还可以使用\
    \ `ray.put` 函数显式创建 ObjectRefs。\n\n我们将在[后续链接]中进一步探讨远程对象及其容错性。\n\n上一章示例 2-7 中的一些细节值得理解。该示例在将迭代器传递给\
    \ `ray.get` 之前，将其从 `iterator` 转换为 `list`。当 `ray.get` 接收一个 future 列表或单个 future\
    \ 时，你需要这样做。² `ray.get` 会等待它拥有所有对象，以便按顺序返回列表。\n\n> **提示**\n\n与常规的 ray 远程函数一样，思考每个远程调用内部完成的工作量非常重要。例如，使用\
    \ `ray.remote` 递归计算阶乘会比在本地计算慢，因为即使整体工作量可能很大，但每个函数内部的工作量很小。具体数量取决于你的集群繁忙程度，但作为一般规则，任何在几秒内执行完毕且不需要特殊资源的任务都不值得远程调度。\n\
    \n## 远程函数的生命周期\n\n调用远程函数的 Ray 进程称为所有者，它调度提交的任务的执行，并在需要时协助将返回的 `ObjectRef` 解析为其底层值。\n\
    \n在任务提交时，所有者会等待所有依赖项（即作为参数传递给任务的 `ObjectRefs`）变为可用状态，然后再进行调度。依赖项可以是本地的也可以是远程的，所有者认为只要依赖项在集群中的任何地方可用，它们就是就绪的。当依赖项就绪时，所有者会向分布式调度器请求资源来执行任务。一旦资源可用，调度器会批准请求，并返回一个将执行该函数的\
    \ worker 的地址。\n\n此时，所有者通过 gRPC 将任务规范发送给 worker。执行任务后，worker 会存储返回值。如果返回值很小，³ worker\
    \ 会直接将值内联返回给所有者，所有者将其复制到其进程内对象存储中。如果返回值很大，worker 会将对象存储在其本地共享内存存储中，并回复所有者，表明对象现在位于分布式内存中。这使得所有者可以引用这些对象，而无需将对象获取到其本地节点。\n\
    \n当一个任务以 `ObjectRef` 作为其参数提交时，worker 必须先解析其值，然后才能开始执行任务。\n\n任务可能以错误结束。Ray 区分两种类型的任务错误：\n\
    \n*应用层*\n\n这是指 worker 进程存活但任务以错误结束的任何场景。例如，一个在 Python 中抛出 `IndexError` 的任务。\n\n\
    *系统层*\n\n这是指 worker 进程意外死亡的任何场景。例如，一个进程发生段错误，或者 worker 的本地 raylet 死亡。\n\n由于应用层错误而失败的任务永远不会重试。异常被捕获并存储为任务的返回值。由于系统层错误而失败的任务可能会自动重试，最多重试指定次数。这将在[后续链接]中有更详细的介绍。\n\
    \n在我们目前的示例中，使用 `ray.get` 是可以的，因为所有 future 的执行时间都相同。如果执行时间不同，例如在不同大小的数据批次上训练模型，并且你不需要同时获取所有结果，这可能会相当浪费。你应该使用\
    \ `ray.wait`，而不是直接调用 `ray.get`，它会返回指定数量的已完成 future。要查看性能差异，你需要修改你的远程函数，使其具有可变的睡眠时间，如示例\
    \ 3-1 所示。\n\n## 示例 3-1. 具有不同执行时间的远程函数\n\n```python\n@ray.remote\ndef remote_task(x):\n\
    \    time.sleep(x)\n    return x\n```\n\n你可能还记得，示例远程函数根据输入参数进行休眠。由于范围是升序排列的，对其调用远程函数将导致\
