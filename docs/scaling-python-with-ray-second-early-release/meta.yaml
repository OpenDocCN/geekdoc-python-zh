  md: "# Example 2-11. Actor Hello World\n\n```\n@ray.remote\nclass HelloWorld(object):\n\
    \    def __init__(self):\n        self.value = 0\n    def greet(self):\n     \
    \   self.value += 1\n        return f\"Hi user #{self.value}\"\n\n# Make an instance\
    \ of the actor\nhello_actor = HelloWorld.remote()\n\n# Call the actor\nprint(ray.get(hello_actor.greet.remote()))\n\
    print(ray.get(hello_actor.greet.remote()))\n```\n\nThis example is fairly basic;\
    \ it lacks any fault tolerance or concurrency within each actor. We’ll explore\
    \ those more in [Link to Come].\n\n# Conclusion\n\nIn this chapter, you have installed\
    \ Ray on your local machine and used many of its core APIs. For the most part,\
    \ you can continue to run the examples we’ve picked for this book in local mode.\
    \ Naturally, a local mode can limit your scale or take longer to run. In the next\
    \ chapter, we’ll look at some of the core concepts behind Ray. One of the concepts\
    \ (fault tolerance) will be easier to illustrate with a cluster or cloud. So if\
    \ you have access to a cloud account or a cluster, now would be an excellent time\
