    You may wish to specify one of the few optional parameters to `ray.wait`:


    `num_returns`


    The number of ObjectRefs for Ray to wait for completion before returning. You
    should set `num_returns` to less than or equal to the length of the input list
    of ObjectRefs; otherwise, the function throws an exception.⁴ The default value
    is 1.


    `timeout`


    The maximum amount of time in seconds to wait before returning. This defaults
    to -1 (which is treated as infinite).


    `fetch_local`


    You can disable fetching of results by setting this to `false` if you are only
    interested in ensuring the futures are completed.


    > **TIP**


    The timeout parameter is extremely important in both `ray.get()` and `ray.wait()`.
    If this parameter is not specified and one of your remote functions misbehaves
    (i.e., never completes), then `ray.get()`/`ray.wait()` will never return, and
    your program will block forever.⁵ As a result, for any production code, we recommend
    that you use the timeout parameter in both to avoid deadlocks.


    Ray''s `get` and `wait` functions handle timeouts slightly differently. Ray doesn''t
    raise an exception on `ray.wait` when a timeout occurs; instead, it simply returns
    fewer ready futures than `num_returns`. However, if `ray.get` encounters a timeout,
    Ray will raise a `GetTimeoutError`. Note that the return of the wait/get function
    does not mean that your remote function will be terminated; it will still run
    in the dedicated process. You'
