    # REMOTE FUNCTIONS LIFECYCLE


    The invoking Ray process, called the owner, of a remote function schedules the
    execution of a submitted task and facilitates the resolution of the returned `ObjectRef`
    to its underlying value if needed.


    On task submission, the owner waits for all dependencies, i.e., `ObjectRefs` that
    were passed as an argument to the task, to become available before scheduling.
    The dependencies can be local or remote, and the owner considers the dependencies
    to be ready as soon as they are available anywhere in the cluster. When the dependencies
    are ready, the owner requests resources from the distributed scheduler to execute
    the task. Once resources are available, the scheduler grants the request and responds
    with the address of a worker that will execute the function.


    At this point the owner sends the task specification over gRPC to the worker.
    After executing the task, the worker stores the return values. If the return values
    are small,^3 the worker returns the values inline directly to the owner, which
    copies them to its in-process object store. If the return values are large, the
    worker stores the objects in its local shared memory store and replies to the
    owner indicating that the objects are now in distributed memory. This allows the
    owner to refer to the objects without having to fetch the objects to its local
    node.


    When a task is submitted with an `ObjectRef` as its argument, the worker must
    resolve its value before it can start executing the task.


    Tasks can end in an error. Ray distinguishes between two types of task errors:


    *Application-level*


    This is any scenario where the worker process is alive, but the task ends in an
    error. For example, a task that throws an `IndexError` in Python.


    *System-level*'
  - "[PAGE 33]\n\n> This is any scenario where the worker process dies unexpectedly.\
