    \ 10.1. Definition of parametric surfaces in 3D\n\nA **parametric surface** *s*\
    \ in 3D is defined using a set of points $(p_{0,0}, p_{0,1}, \\dots, p_{i,j},\
    \ \\dots, p_{n,m})$; thus, the point $p_{i,j}$ is formed by three elements $(x(u,v),\
    \ y(u,v), z(u,v))$. The set of points is defined from three functions with two\
    \ parameters (*u* and *v*) (see Figure 10-1). The parameters (*u* and *v*) are\
    \ the independent variables (inputs) that three *x*, *y*, and *z* depend on (outputs),\
    \ and as the parameters increase, the values of $x(u,v)$, $y(u,v)$, and $z(u,v)$\
    \ trace out a path along a plane surface. A parametric surface $s$ in 3D describes\
    \ the relationship between a set of points, which can be expressed by means of\
    \ three functions: one function, $f_1(u,v)$, to get the $x$ values; another function,\
    \ $f_2(u,v)$ to get the $y$ values, and the last function $f_3(u,v)$ to get the\
    \ $z$ values (see Equation 10-1).\n\n**Equation 10-1**\n\n$$\ns: \\begin{cases}\
    \ \nx = f_1(u,v) \\\\\ny = f_2(u,v) \\\\\nz = f_3(u,v)\n\\end{cases}\n$$\n\n![](img/f66d0ac198ad4ed7b9ada3efb976375f_142_0.png)\n\
    \nFigure 10-1. Conceptualization of parametric surface in 3D.\n\nUnderstanding\
    \ 3D parametric surface modeling is simple. We can build on the conceptualization\
    \ learned in 2D parametric surface, and we only must add the z-axis, which is\
    \ defined as a third expression as a function of the u parameter, i.e., z = f₃(u,v).\n\
    \n> **Quick discussion:** Note that a parametric surface s in 3D has three coordinates:\
    \ x, y, and z. However, the parametric arrays (U and V) are defined by the combination\
    \ of the parameters (u, v); therefore, U and V have two dimensions. This is why\
    \ we can say the parametric surfaces in 3D take a two-dimensional parameter (u,\
    \ v) to a system of three coordinates (x, y, z).\n\nParametric surfaces in 3D\
    \ can be expressed with both explicit and implicit notation. In the following,\
    \ we will conceptualize the notation and application in geometric modeling.\n\n\
    ## 10.2. Explicit notation of parametric surfaces in 3D\n\n**Explicit notation\
    \ of parametric surfaces in 3D** is defined as a function in which a dependent\
    \ variable ($z$) can be explicitly written in terms of independent variables ($x$\
    \ and $y$). We can write a curve in standard form as Equation 10-2. Where $z$\
    \ is the output variable expressed entirely in terms of the input variables $x$\
