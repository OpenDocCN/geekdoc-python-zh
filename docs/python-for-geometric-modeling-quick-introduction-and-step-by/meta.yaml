    ## Summary\n\nThis chapter introduced the book, including its structure and essential\
    \ features created to facilitate reading and learning the elements that will be\
    \ taught.\n\nNow, let's start our journey to the world of computer geometric modeling!\n\
    \n## Chapter 02 – Geometric Modeling\n\nThis chapter aims to provide a general\
    \ understanding of computational geometric modeling, its significance, and its\
    \ applications across different fields. We introduce practical applications and\
    \ the impact of geometric modeling on the advancement of technology and innovation.\n\
    \nNext, we will cover the following sections:\n\n1. What is computational geometric\
    \ modeling?\n2. Why is geometric modeling needed?\n3. What is geometric computer\
    \ modeling for?\n\n### 2.1. What is computational geometric modeling?\n\n**Computational\
    \ geometric modeling** is a branch of computer *science* and *mathematics* that\
    \ uses computational techniques to represent, manipulate, and analyze geometric\
    \ shapes and structures. Computational geometric modeling plays a crucial role\
    \ in *computer-aided design* (CAD), computer graphics, virtual reality, and various\
    \ other fields where the digital representation of physical objects or spaces\
    \ is required.\n\nKey aspects of computational geometric modeling include *(i)\
    \ representation*: It involves choosing a suitable mathematical representation\
    \ for geometric objects. Common representations include points, lines, curves,\
    \ surfaces, and solids; and *(ii) parametric modeling*: This involves representing\
    \ objects using parameters that can be adjusted to modify the shape, which is\
    \ widely used in CAD systems. Therefore, computational geometric modeling provides\
    \ the foundation for creating and manipulating digital representations of geometric\
    \ objects, enabling various applications in computer science and engineering.\n\
    \n### 2.2. Why is geometric modeling needed?\n\nComputational geometric modeling\
