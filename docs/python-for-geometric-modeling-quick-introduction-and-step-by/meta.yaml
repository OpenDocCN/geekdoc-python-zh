    # # Chapter 11 – Special case: Extruded surfaces


    In the previous chapters, we learned parametric surfaces in 3D. This chapter will
    explain a special case of parametric surfaces in 3D called extruded Surfaces.


    Next, we will cover the following sections:


    +   1. What is extruded surfaces?

    2. Extruded surfaces based on a parametric curve in 2D

    3. Extruded surfaces based on a parametric curve in 3D

    4. Quick project.

    5. Exercises.


    The code developed for this chapter is located [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-11](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-11).
    We recommend that you enhance your coding skills by independently developing the
    code. If there are any issues, you can refer to the code in the repository for
    comparison.


    Remember that we suggest you create a new Colab document for each book chapter.
    It will allow you to keep your codes organized.


    # ## 11.1. What is Extruded Surfaces?


    **Extruded surfaces** are a type of geometric shape that results from extending
    a 2D curve (called *profile*) along a specified direction to create a 3D surface.
    In the context of CAD and computer graphics, extruded surfaces are often used
    to'
  - '[PAGE 165]


    model 3D surfaces by extending 2D shapes in a linear direction. Therefore, it
    provides a simple method for creating three-dimensional surfaces from a two-dimensional
    curve.


    Extruded surfaces just combines the concept of parametric curves and surfaces.
    The modeling of extruded surfaces is performed in two stages: (i) modeling of
    a parametric curve using the parameter $u$ and (ii) vertical expansion of the
    curve using the parameter $v$.


    Extruded surfaces can be modeled based on a parametric curve in 2D or a parametric
    curve in 3D as well. In the following, we will explain both modeling methods.


    # 11.2. Extruded surfaces based on a parametric curve in 2D


    # Constant extrude height


    We know a parametric curve in 2D is defined by means of a set of points $(p_0,
    p_1, ..., p_i, ..., p_n)$, which can be expressed by means of two functions, one
    function $f_1(u)$ to get the $x$ values and another function $f_2(u)$ to get the
    $y$ values (see Figure 11-1); later, the expression $z = v$ is used to get the
    $z$ values as the high of the extruded surface (see Equation 11-1).


    **Equation 11-1**


    $s: \begin{cases} x = f_1(u) \ y = f_2(u) \ z = v \end{cases} ; \text{ with }
    u = u_0...u_n, v = v_0...v_m$'
