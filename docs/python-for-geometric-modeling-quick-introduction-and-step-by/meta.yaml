    # 第01章 – 引言


    虽然现有的关于CAD应用几何建模的文献经常深入探讨线性代数、向量空间和拓扑学等抽象数学概念，但可能忽略了这些理论在实际问题解决中的直接应用。本书采取了一种独特的方法，优先考虑解决现实世界的挑战和开发几何建模应用，采用结构化和系统化的方法。它强调利用基础且易于理解的数学概念，确保您能够快速掌握所呈现的思想并轻松应用它们。主要目标是为寻求CAD几何建模实践见解的个人提供直接高效的学习体验。


    本章将解释本书的设计以及如何有效使用它。


    接下来，我们将涵盖以下部分：


    1.  书籍章节。

    2.  如何阅读本书。

    3.  书籍仓库。


    ## 1.1. 书籍章节


    本书分为16章。以下是您可以在每章中学习内容的简要概述：


    -   **第01章 – 引言。** 提供本书及其内容的概述。

    -   **第02章 – 几何建模。** 提供计算几何建模的背景、其重要性以及在不同领域的应用。

    -   **第03章 – 设置Colab。** 描述如何使用Colab，一个流行的Python编码工具。

    -   **第04章 – *NumPy*简介。** 介绍*NumPy*库并演示如何操作数学表达式。

    -   **第05章 – *Matplotlib*简介。** 演示如何使用*Matplotlib*在Python中创建光栅图像。

    -   **第06章 – *Plotly Express*简介。** 介绍*Plotly Express*模块并演示如何在Python中创建矢量图形。

    -   **第07章 – 二维参数曲线。** 介绍参数曲线的基本概念。它还解释了三维曲线的要素。

    -   **第08章 – 三维参数曲线。** 将参数曲线的概念扩展到三维。

    -   **第09章 – 二维参数曲面。** 介绍参数曲面的基本概念。它还解释了二维曲面的要素。

    -   **第10章 – 三维参数曲面。** 将参数曲面的概念扩展到三维。

    -   **第11章 – 特殊情况：拉伸曲面。** 开发三维参数拉伸曲面的概念。

    -   **第12章 – 特殊情况：旋转曲面。** 开发三维参数旋转曲面的概念。

    -   **第13章 – 特殊情况：极坐标曲面。** 开发基于极坐标系的三维参数曲面概念。

    -   **第14章 – 特殊情况：复杂曲面。** 将曲面建模的概念提升到更高层次。

    -   **第15章 – 将模型部署到云端。** 开发将模型部署到云端的概念。

    -   **第16章 – 练习解答。** 包含全书所提练习的答案。


    ## 1.2. 如何阅读本书


    为了充分利用本书并加深对所呈现概念的理解，我们建议遵循以下建议：


    ### 按顺序阅读


    如果这是您第一次接触计算几何建模，我们建议按顺序阅读本书。本书旨在按顺序教授不同的概念和要素。这些概念和要素将在后面的章节中重复使用，这意味着，例如，要理解和欣赏“第12章
    – 特殊情况：旋转曲面”，您需要理解几乎所有前面的章节。例如，在本章中，我们使用了前面章节介绍的各种要素，如*参数曲面描述*。


    ### 从实践中学习


    本书的关键要素之一是“从实践中学习”，灵感来源于Daniel和Paola最喜爱的书籍作者之一Greg Lim。**在本书中，您将通过建模来学习建模。** 我们为您提供了超过100个独立的代码片段供您开发，我们强烈建议您手动编写它们。通过这样做，您将获得建模技能并更好地理解所使用的每个要素。花时间阅读每个代码片段，详细分析并执行它。这种方法将帮助您掌握本书涵盖的概念。


    > **提示：** 从实践中学习：“人类是永不满足的知识寻求者；然而，他们并不学习他们所听到、阅读、记忆或研究的东西……他们学习他们所实践的东西。”（摘自：2019
    - Samsó, R. - *《自律的力量：改变你人生的习惯》*）。


    ### 练习实践


    在大多数章节的末尾，您会发现一组简单的练习，旨在帮助您巩固在该章中学到的概念和技能。我们鼓励您在进入下一章之前完成这些练习。这样做将使您能够测试自己的理解，并确保您已掌握预期的技能。此外，您可以在本书的最后一章找到所有练习的解答。


    ## 1.3. 书籍仓库


    在大多数章节中，我们将编写Python代码片段。本书中开发的所有代码片段都可以在以下链接的书籍仓库中找到：[https://github.com/PracticalBooks/Python-For-Geometric-Modeling](https://github.com/PracticalBooks/Python-For-Geometric-Modeling)。如果我们稍后修改代码，这些修改将反映在仓库中。


    ### 问题


    如果您有任何问题或想讨论本书的任何方面，我们建议使用书籍仓库的讨论区，位于[https://github.com/PracticalBooks/Python-For-Geometric-Modeling/discussions](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/discussions)（见图1-1）。该平台允许您从其他读者发布的问题和讨论中学习①，同时也使您能够寻求帮助并与本书的作者和社区互动。通过各位成员的输入和贡献，讨论区可以提供协作和丰富的学习体验。请注意，您需要一个GitHub账户才能访问“新讨论”按钮②。'
