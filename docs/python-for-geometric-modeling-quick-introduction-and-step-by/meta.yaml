    # Parametric Curve


    If a curve is expressed as *parametric equations*, it is called a **parametric
    curve**. However, what a *parametric equation* is? It is a type of equation that
    employs an independent variable called a **parameter** (here, we will denote it
    by $u$) and in which dependent variables ($x(u)$, $y(u)$) are defined as functions
    of the parameter and are not dependent on another variable.'
