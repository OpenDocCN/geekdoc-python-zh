    \ (see Figure 7-12 and Figure E7-5) you can define different expressions of radius\
    \ $r$ to obtain other flower-shaped curves.\n\nIn the next chapter, we will learn\
    \ about parametric curves in 3D.\n\n## Chapter 08 – Parametric curves in 3D\n\n\
    In the previous chapter, we learned parametric curves in 2D. In this chapter,\
    \ we will cover parametric curves in 3D.\n\nNext, we will cover the following\
    \ sections:\n\n1. Definition of parametric curves in 3D.\n2. How are parametric\
