    ## 11.3. 基于三维参数曲线的拉伸曲面


    我们知道，三维参数曲线是通过一组点 $(p_0, p_1, ..., p_i, ..., p_n)$ 来定义的，这些点可以通过三个函数来表达：一个函数 $f_1(u)$
    获取 $x$ 值，第二个函数 $f_2(u)$ 获取 $y$ 值，第三个函数 $f_3(u)$ 获取 $z$ 值（参见图 11-10）；然后，$z$ 值受到表达式
    $z = f_3(u)+v$ 的影响，以建模曲线的拉伸扩展（参见公式 11-7）。


    ## 公式 11-7


    $$s: \begin{cases} x = f_1(u) \\ y = f_2(u) \\ z = f_3(u) + v \end{cases} \quad
    ; \text{其中 } u = u_0...u_n, v = v_0...v_m$$


