    # ## 10.1. Definition of parametric surfaces in 3D


    A **parametric surface** *s* in 3D is defined using a set of points $(p_{0,0},
    p_{0,1}, \dots, p_{i,j}, \dots, p_{n,m})$; thus, the point $p_{i,j}$ is formed
    by three elements $(x(u,v), y(u,v), z(u,v))$. The set of points is defined from
    three functions with two parameters (*u* and *v*) (see Figure 10-1). The parameters
    (*u* and *v*) are the independent variables (inputs) that three *x*, *y*, and
    *z* depend on'
