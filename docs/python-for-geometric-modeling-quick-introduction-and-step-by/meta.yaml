    ## 第 14 章 – 特殊情况：复杂曲面


    在前面的章节中，我们学习了三维参数曲面，以及拉伸曲面、旋转曲面和极坐标曲面作为特殊情况。本章将解释第四种特殊情况，我们称之为复杂曲面。


    接下来，我们将涵盖以下部分：


    1. 什么是复杂曲面？

    2. 复杂曲面的显式表示

    3. 复杂曲面的隐式表示

    4. 快速项目。

    5. 练习。


    本章开发的代码位于 [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-14](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-14)。我们建议您通过独立开发代码来提升编码技能。如有任何问题，您可以参考仓库中的代码进行比较。


    请记住，我们建议您为本书的每一章创建一个新的 Colab 文档。这将使您的代码保持条理清晰。


    ### 14.1. 什么是复杂曲面？


    我们将**复杂曲面**定义为那些边界由边界线函数定义的三维曲面。它使用一个三阶段的建模过程：


    **阶段 1：** 使用一组基本参数（$u_b$ 和 $v_b$）构建*基本网格*（见图 14-1）。因此，*基本网格*由以下有序对组成：


    **分析**


    ```

    $$basic\ meshgrid = \begin{bmatrix} (u_{b0},v_{b0}) & (u_{b0},v_{b1}) & \cdots
    & (u_{b0},v_{bm}) \\ (u_{b1},v_{b0}) & (u_{b1},v_{b1}) & \cdots & (u_{b1},v_{bm})
    \\ \vdots & \vdots & \ddots & \vdots \\ (u_{bn},v_{b0}) & (u_{bn},v_{b1}) & \cdots
    & (u_{bn},v_{bm}) \end{bmatrix}$$

    ```


    **阶段 2：** 基于*基本网格*，构建一个二维参数曲面，以使用一组最终参数（$u_f$ 和 $v_f$）获得*最终网格*，见图 14-1。*最终网格*的点集由两个关于两个参数（$u_b$
    和 $v_b$）的函数定义。*最终网格*作为一个二维参数曲面 $s$，描述了一组点之间的关系，这可以通过两个函数来表达：一个函数 $f_1(u_b, v_b)$
    用于获取 $u_f$ 值，另一个函数 $f_2(u_b, v_b)$ 用于获取 $v_f$ 值。因此，*最终网格*由以下有序对组成：


    **分析**


    ```

    $$final\ meshgrid = \begin{bmatrix} (u_{f0},v_{f0}) & (u_{f0},v_{f1}) & \cdots
    & (u_{f0},v_{fm}) \\ (u_{f1},v_{f0}) & (u_{f1},v_{f1}) & \cdots & (u_{f1},v_{fm})
    \\ \vdots & \vdots & \ddots & \vdots \\ (u_{fn},v_{f0}) & (u_{fn},v_{f1}) & \cdots
    & (u_{fn},v_{fm}) \end{bmatrix}$$

    ```


    **阶段 3：** 基于*最终网格*，构建三维参数曲面，该曲面由一组点 $(p_{0,0}, p_{0,1}, \dots, p_{i,j}, \dots,
    p_{n,m})$ 定义；因此，点 $p_{i,j}$ 由两个元素 $(x(u_f, v_f), y(u_f, v_f), z(u_f, v_f))$ 构成。点集由三个关于两个参数（$u_f$
    和 $v_f$）的函数定义（见图 14-1）。在阶段 3 中，曲面通过三个函数来表达：一个函数 $f_3(u_f, v_f)$ 用于获取 $x$ 值，另一个函数
    $f_4(u_f, v_f)$ 用于获取 $y$ 值，最后一个函数 $f_5(u_f, v_f)$ 用于获取 $z$ 值。


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_246_0.png)


    遵循这三个阶段，我们得到了复杂曲面的完整表达式（见方程 14-1）。


    ```

    方程 14-1

    $$

    \begin{aligned}

    s: \quad & u_f = f_1(u_b, v_b) \\

    & v_f = f_2(u_b, v_b) \\

    & x = f_3(u_f, v_f) \\

    & y = f_4(u_f, v_f) \\

    & z = f_5(u_f, v_f)

    \end{aligned}

    $$

    ```


    ### 14.2. 复杂曲面的显式表示


    **复杂曲面的显式表示**是一个方程组，其中因变量（$z$）可以明确地用自变量（$x$ 和 $y$）来表示，而这些自变量（$x$ 和 $y$）被定义为*最终网格*，即
    $x = u_f$ 且 $y = v_f$（见方程 14-2）。


    ```

    方程 14-2

    $$

    \begin{aligned}

    s: \quad & u_f = f_1(u_b, v_b) \\

    & v_f = f_2(u_b, v_b) \\

    & x = u_f \\

    & y = v_f \\

    & z = f_5(u_f, v_f)

    \end{aligned}

    ; \text{ 其中 } u_b = u_{b0}\dots u_{bn}, v_b = v_{b0}\dots v_{bm}

    $$

    ```


    ### 示例：水面上的七角星


    我们使用复杂曲面的显式表示来描述水面上的七角星 $s$，其表达式如方程 14-3 所示。


    ## 方程 14-3


    ```

    $s : \begin{cases} r = v_b + 2 \sin(7u_b) + 5 \\ u_f = r \cos(u_b) \\ v_f = r
    \sin(u_b) \\ x = u_f \\ y = v_f \\ z = \sin(\sqrt{x^2 + y^2}) \end{cases} \quad
    ; \text{其中 } u_b = 0...2\pi, v_b = 1...15$

    ```


    请注意：


    - 方程 14-3 中描述半径（$r$）和最终参数集（$u_f$ 和 $v_f$）的表达式，类似于之前在 9.3 节（方程 9-6）中建模的二维星形曲面的方程，因为方程
    14-3 的*最终网格*将具有星形边界（见图 14-2 中的红色曲面）。

    - 方程 14-3 中描述 $x$、$y$ 和 $z$ 轴的表达式，类似于之前在 10.2 节（方程 10-3）中建模的隐式曲面，因为建模的隐式曲面将是水面上的波纹（见图
    14-2 中的蓝色曲面）。


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_249_0.png)


    图 14-2. 水面上七角星的概念化。


    以下代码对水面上的七角星进行建模：


    - 第 1 行和第 2 行导入库。

    - 第 3 行和第 4 行定义基本参数 $u_b$ 和 $v_b$。

    - 第 5 行根据参数（$u_b$ 和 $v_b$）定义*基本网格*（$U_b$ 和 $V_b$）。

    - 第 6 行定义半径函数 $r$。

    - 第 7 行和第 8 行根据参数数组（$U_b$ 和 $V_b$）定义*最终网格*（$U_f$ 和 $V_f$）。

    - 第 9 行和第 10 行将 $x$ 和 $y$ 轴定义为*最终网格*（$U_f$ 和 $V_f$）。

    - 第 11 行将 z 轴定义为 $z = f(x,y)$。

    - 第 12 行到第 15 行设置并显示曲面（执行结果见图 14-3）。'
