    This *torus* is obtained when the closed parametric curve *c* is shifted a distance
    *R* regarding to the *axis of symmetry* and is rotated using trigonometric functions
    (*cos(v)* and *sin(v)*). For example, Equation 12-6 shows a *torus* rotated around
    the *z*-axis. First, a distance *R* is defined. Then, the radius of the *surface
    profile* is expressed as a function of parameter *u*, *r = f(u)*. Later, the *x*
    and *y* axes are defined by means a trigonometric expression (*r cos(u)*) and
    the term *R* is used to shift the *surface profile* regarding to the *symmetry
    axis*. Finally, *y*-axis is defined by the expression (*r sin(u)*).'
