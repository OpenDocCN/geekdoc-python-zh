  md: '# # Chapter 02 – Geometric Modeling


    This chapter aims to provide a general understanding of computational geometric
    modeling, its significance, and its applications across different fields. We introduce
    practical applications and the impact of geometric modeling on the advancement
    of technology and innovation.


    Next, we will cover the following sections:


    +   1. What is computational geometric modeling?

    2. Why is geometric modeling needed?

    3. What is geometric computer modeling for?


    # ## 2.1. What is computational geometric modeling?


    **Computational geometric modeling** is a branch of computer *science* and *mathematics*
    that uses computational techniques to represent, manipulate, and analyze geometric
    shapes and structures. Computational geometric modeling plays a crucial role in
    *computer-aided design* (CAD), computer graphics, virtual reality, and various
    other fields where the digital representation of physical objects or spaces is
    required.


    Key aspects of computational geometric modeling include *(i) representation*:
    It involves choosing a suitable mathematical representation for geometric objects.
    Common representations include points, lines, curves, surfaces, and solids; and
    *(ii) parametric modeling*: This involves representing objects using parameters
    that can be adjusted to modify the shape, which is widely used in CAD systems.
    Therefore, computational geometric modeling provides the foundation for creating
    and manipulating digital representations of geometric objects, enabling various
    applications in computer science and engineering.'
  merge: -1
  pgno: 17
- img_proc: true
  md: '# 2.2. Why is geometric modeling needed?


    Computational geometric modeling enhances efficiency, accuracy, and innovation
    across different industries. It facilitates the entire product development lifecycle,
    from conceptualization and design to prototyping, testing, and final production.
    The ability to create and manipulate digital representations of physical objects
    has become a cornerstone of modern engineering, design, and simulation. Therefore,
    computational geometric modeling is important for several reasons:


    +   - **Cost Reduction:** The design and testing phases can be optimized, leading
    to cost savings. Identifying and rectifying issues early in the design process
    helps prevent costly mistakes in later stages of production.

    - **Efficient Communication:** Geometric models serve as a common language for
    communication among designers, engineers, architects, and other stakeholders.
    They provide an unambiguous way to convey design concepts and specifications.
    Moreover, geometric modeling allows designers and engineers to create detailed
    and accurate digital representations of objects, structures, and environments.
    It aids in visualization, enabling professionals to assess and refine designs
    before physical prototypes are built.

    - **Prototyping and Testing:** Geometric models are crucial in the prototyping
    process, allowing for the creation of physical prototypes through techniques like
    3D printing. It facilitates testing and validation of designs before mass production.

    - **Simulation and Training:** Geometric modeling is used in simulations to analyze
    and understand the behavior of systems and for training purposes. It is applicable
    in various fields, including physics, engineering, medicine, and more. For example,
    flight simulators use detailed geometric models of aircraft and landscapes to
    provide realistic training scenarios for pilots.'
  merge: -1
