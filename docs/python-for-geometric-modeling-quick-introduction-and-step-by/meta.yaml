    ## 示例：极坐标曲线的恒定拉伸高度


    接下来，我们使用隐式表示法来描述 $x$-$z$ 平面上的一条极坐标曲线，该曲线由参数 $u$ 定义，而 $y$ 轴定义了拉伸曲面的高度，该高度由参数 $v$
    定义（参见公式 11-4）。


    **公式 11-4**


    | s : | r = sin(8u/5) <br> x = r sin(u) <br> y = v <br> z = r cos(u) | ; 其中 u
    = 0...10π v = 0...1 |


    以下代码建模了极坐标曲线的拉伸曲面。


    - 第 1 和 2 行导入库。

    - 第 3 和 4 行定义参数 $u$ 和 $v$。

