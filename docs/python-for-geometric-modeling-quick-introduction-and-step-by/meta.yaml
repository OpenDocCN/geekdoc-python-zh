  md: "A **parametric curve** is a mathematical representation of a curve in which\
    \ each point is described in terms of the parameter *u*. In other words, instead\
    \ of expressing the position of a point in terms of *Cartesian coordinates* (*x*,\
    \ *y*), it is described by one parametric function that depends on the parameter\
    \ *u*.\n\nA **parametric curve *c* in 2D** is defined using a set of points (*p*₀,\
    \ *p*₁, ..., *p*ᵢ, ..., *p*ₙ); thus, the point *p*ᵢ is formed by two elements\
    \ (*x*(*u*), *y*(*u*)). The parameter *u* is an independent variable (input) that\
    \ both *x* and *y* depend on (outputs), and as the parameter increases, the values\
    \ of *x*(*u*) and *y*(*u*) trace out a path along a plane curve (see Figure 7-2).\
    \ A parametric curve *c* in 2D describes the relationship between a set of points,\
    \ which can be expressed using two functions, one function *f*₁(*u*) to get the\
    \ *x* values and another function *f*₂(*u*) to get the *y* values (see Equation\
    \ 7-2).\n\n```\nEquation 7-2\n\nc : \n    x = f₁(u)\n    y = f₂(u)\n```"
