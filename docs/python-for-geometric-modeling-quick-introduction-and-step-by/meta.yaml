  mdcn: '## 第五章 – Matplotlib 简介


    在前面的章节中，我们学习了如何使用 *NumPy* 库。然而，Python 还提供了其他用于开发几何模型的标准库。


    在本章中，我们将简要介绍 Python 中的 *Matplotlib* 库。我们将解释如何使用 *Matplotlib* 的几个元素进行数据可视化，这将在本书的后续章节中使用。


    数据可视化是几何建模的一个重要方面。可视化数据使我们能够看到原始数据中不明显的模式、关系和趋势。在本章中，我们将简要介绍 Python 中用于绘制图表的 *Matplotlib*，并探索
    *Matplotlib* 最流行的模块之一，称为 *PyPlot*；此外，我们将学习如何使用其中的一些功能。


    接下来，我们将涵盖以下部分：


    - 1. 什么是 Matplotlib？

    - 2. *Pyplot* 模块。


    本章开发的代码位于 [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-05](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-05)。我们建议您通过独立开发代码来增强您的编码技能。如果有任何问题，您可以参考仓库中的代码进行比较。


