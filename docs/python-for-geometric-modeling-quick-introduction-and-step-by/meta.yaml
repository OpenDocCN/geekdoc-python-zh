    ## 9.1. 二维参数曲面的定义


    **二维参数曲面 *s*** 使用一组点 $(p_{0,0}, p_{0,1}, \dots, p_{i,j}, \dots, p_{n,m})$ 来定义；因此，点
    $p_{i,j}$ 由两个元素 $(x(u,v), y(u,v))$ 组成。这组点由两个具有两个参数（$u$ 和 $v$）的函数定义（见图 9-1）。参数（$u,
    v$）是自变量（输入），$x$ 和 $y$ 都依赖于它们（输出），并且随着参数的增加，$x(u,v)$ 和 $y(u,v)$ 的值会沿着平面表面描绘出一条路径。二维参数曲面
    $s$ 描述了一组点之间的关系，这可以通过两个函数来表达，一个函数 $f_1(u,v)$ 用于获取 $x$ 值，另一个函数 $f_2(u,v)$ 用于获取
    $y$ 值（见方程 9-1）。


    ### 方程 9-1


    $$s: \begin{cases} x = f_1(u,v) \\ y = f_2(u,v) \end{cases} ; \text{ 其中 } u =
    u_0...u_n, v = v_0...v_m$$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_110_0.png)


    图 9-1. 二维参数曲面的概念化。


    ## 9.2. *meshgrid* 是如何工作的？


    参数 $u$ 只能沿数轴取值（从 $-u$ 到 $+u$）。类似地，参数 $v$ 只能沿数轴取值（从 $-v$ 到 $+v$）。这两个参数值的组合标记了一个有序对
    $(u_i, v_i)$。这组有序对定义了一个 *meshgrid*，曲面将在此网格上建模。


    ### 建模一个四元素网格曲面


    接下来，我们使用参数表达式来描述一个二维曲面 $s$，其表述如下（见方程 9-2）


    $$s: \begin{cases} x = 2u + v \\ y = u + v^2 \end{cases} ; \text{其中 } u = [1,
    2], v = [3, 4]$$


