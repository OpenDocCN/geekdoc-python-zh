    ## 3.4. Colab customization


    Before making a couple of customizations, let''s practice using Colab on the current
    document (Figure 3-12). The problem with the multiple lines of code is that it
    becomes harder to identify which line number corresponds to which instruction.
    So, let''s make minor customization in Colab.


    Click on “Tools” ①; then, click on “Settings” ②; thus, click on “Editor” ③ and
    select the options ④: (i) “Show line numbers” and (ii) “Show indentation guides”.
    Finally, ⑤ click on “Save” (see Figure 3-14).


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_40_0.png)


    Figure 3-14. Colab customization.


    Enabling the above options will make it easier to read the developed code.


    ## Python version


    Programming languages evolve, introducing new versions with new options and functionalities.
    Similarly, Colab regularly updates its Python version. At the time of writing,
    Colab is using version 3.10.12 of Python. To check the current Python version,
    you can execute the code shown in Figure 3-15.


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_41_0.png)


    Figure 3-15. Check the Python version in Colab.


    ## Critical errors in Colab


    Before concluding this chapter, let’s discuss one last suggestion regarding Colab.
    **Please pay close attention to this tip, as it will be crucial if your developed
    codes stop working mysteriously.**


    Every time a code cell is executed in Colab, the code data is stored in the memory
    of something called “runtime”. A runtime is a virtual machine that Colab allocates
    to you. Sometimes, due to errors in the programming logic, the stored data in
    the runtime memory can cause problems. For example, in Figure 3-16, you can see
    that we tried to execute the `print("Hello World")` code and received an error.
    Although the code looks fine, we intentionally introduced a bug in another code
    cell that changed the meaning of `print` in our current runtime memory.


    ```

    1 print("Hello World")

    ```


    ```

    ---------------------------------------------------------------------------

    TypeError                                 Traceback (most recent call last)

    <ipython-input-2-fb1c7aebe012> in <cell line: 1>()

    ----> 1 print("Hello World")


