    \n## 让我们来建模飞机机翼\n\n基于在拉伸曲面建模中获得的概念，我们为高空商用客机建模了一架固定翼飞机，其机翼具有以下几何值：$B = 2, T =\
    \ 0.2, P = 1, C = 0.05, E = 1, R = 0$。\n\n以下代码对飞机机翼进行建模。\n\n- 第1和第2行导入库。\n- 第3和第4行定义参数\
    \ $u$ 和 $v$。\n- 第5行定义参数数组 $U$ 和 $V$。\n- 第6到11行定义机翼几何值。\n- 第12和14行根据参数数组 $U$ 在\
    \ $x$-$z$ 平面内定义翼型曲线。\n- 第13行将 $y$ 轴定义为拉伸曲面的高度，它是参数数组 $V$ 的函数。\n- 第15到18行设置并显示曲面（执行结果见图11-14）。\n\
    \n## 代码与执行\n\n```\n1. import numpy as np\n2. import plotly.graph_objects as go\n\
