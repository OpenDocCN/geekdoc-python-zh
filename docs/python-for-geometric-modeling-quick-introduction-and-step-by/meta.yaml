  md: '# Chapter 13 – Special case: Polar-coordinate surfaces


    In the previous chapters, we learned parametric surfaces in 3D, extruded surfaces,
    and surfaces of revolution as special cases. This chapter will explain a third
    special case, which is surfaces based on polar coordinates.


    Next, we will cover the following sections:


    +   1. What is polar-coordinate Surfaces?

    2. Cartesian coordinates vs. polar coordinates.

    3. Explicit notation for polar-coordinate surfaces.

    4. Implicit notation for polar-coordinate surfaces.

    5. Quick project.

    6. Exercises.


    The code developed for this chapter is located at [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-13](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-13).
    We recommend that you enhance your coding skills by independently developing the
    code. If there are any issues, you can refer to the code in the repository for
    comparison.


    Remember that we suggest you create a new Colab document for each book chapter.
    It will allow you to keep your codes organized.


    # 13.1. What is polar-coordinate surfaces?


    **Polar-coordinate surfaces** use the parameter $(u)$ as a *radial distance* and
    the parameter $(v)$ as an *angle* to describe the position of points $(p_{0,0},
    p_{0,1}, \dots, p_{i,j}, \dots, p_{n,m})$; thus, the point $p_{i,j}$ is formed
    by two elements $(x(u,v), y(u,v), z(u,v))$. Therefore,'
  merge: -1
  pgno: 219
- img_proc: true
  md: 'polar-coordinate surfaces can be described parametrically by a *radial distance*
    function and an *angle* function (see Figure 13-1). A common representation for
    a surface in polar coordinate system involves using parametric equations of the
    next form (see Equation 13-1).


    ```

    **Equation 13-1**


    $$

    s: \begin{cases}

    r = u \nx = r \cos(v) \ny = r \sin(v) \nz = f(u,v)

    \end{cases}

    $$

    ```'
