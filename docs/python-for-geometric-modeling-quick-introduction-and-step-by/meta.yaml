    # 7.3. Implicit notation of curves in 2D


    An **implicit curve in 2D** is a plane curve defined by an *implicit equation*
    relating two coordinate variables $(x(u), y(u))$. What is an *implicit equation*?
    Implicit means that the equation is not expressed as a solution for either $x$
    in terms of $y$ or vice versa. We can write a curve in standard form as Equation
    7-8, where $x$ and $y$ are the output variables expressed entirely in terms of
    the input parameter $u$, i.e., $x = f_1(u)$ and $y = f_2(u)$ (see Figure 7-8).


    **Equation 7-8**


    | $c:$ | $x = f_1(u)$<br>$y = f_2(u)$ | ; with $u = u_0...u_n$ |'
