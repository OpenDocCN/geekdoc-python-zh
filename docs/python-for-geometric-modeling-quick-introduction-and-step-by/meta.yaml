  - "[PAGE 181]\n\nWings are the main component of airplanes, their main function\
    \ is to ensure lift, which compensates for the weight, i.e., it allows the airplane\
    \ to maintain a stable flight. The geometry of wings seen in cross section (called\
    \ wing profile), are of great interest since they have different functions such\
    \ as maintaining flight, providing control of the aircraft, providing takeoff\
    \ and landing capability, supporting engines and transmitting their thrust, housing\
    \ fuel, and hold lights and signaling.\n\nThe geometric profile (see Figure 11-13)\
    \ for aircraft wings can be defined by a 2D parametric curve as follow (see Equation\
    \ 11-9).\n\n![](img/f66d0ac198ad4ed7b9ada3efb976375f_181_0.png)\n\n```\nEquation\
    \ 11-9\n\nc: x = 0.5 (1 + |cos(u)|^B/cos(u))\n   z = (T/2) (sin^B(u) /sin(u))\
    \ (1-x^P) + C sin(π x^E) + R sin(2π x)    ; with u = 0.001...2π\n```"
  - '[PAGE 182]


    where:


    +   - $B$ is the base shape coefficient of the wing, which affects its leading
    edge. If $B = 2$, the airfoil base shape is an ellipse, but if $B$ approaches
    $1$, the shape becomes a rectangle.

    - $T$ is the thickness of the wing as a fraction of the chord.

    - $P$ is the wing taper exponent. If $P = 1$ the wing thickness approaches $0$
    linearly as it approaches the *trailing edge*. If $P$ has a higher value, the
    wing tapers more sharply near the *trailing edge*.

    - $C$ is the wing camber, as a fraction of the chord.

    - $E$ is the camber exponent, which defines the location of the maximum camber
    point. If $E = 1$ the camber point is at the $50\%$ regarding the width, but a
    smaller value shifts it towards the *leading edge*.

    - $R$ is the reflex parameter. Positive value generates reflexed trailing edge,
    while negative one emulates flaps.


