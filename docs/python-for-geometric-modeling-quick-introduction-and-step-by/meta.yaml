    # 13.1. What is polar-coordinate surfaces?


    **Polar-coordinate surfaces** use the parameter $(u)$ as a *radial distance* and
    the parameter $(v)$ as an *angle* to describe the position of points $(p_{0,0},
    p_{0,1}, \dots, p_{i,j}, \dots, p_{n,m})$; thus, the point $p_{i,j}$ is formed
    by two elements $(x(u,v), y(u,v), z(u,v))$. Therefore,'
- md: '## 13.2. Polar coordinates vs cartesian coordinate systems.


    Polar-coordinate surfaces can be described parametrically by a *radial distance*
    function and an *angle* function (see Figure 13-1). A common representation for
    a surface in polar coordinate system involves using parametric equations of the
    next form (see Equation 13-1).


    **Equation 13-1**


    $$

    s: \begin{cases}

    r = u \\

    x = r \cos(v) \\

    y = r \sin(v) \\

    z = f(u,v)

    \end{cases}

    $$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_221_0.png)


    Figure 13-1. Conceptualization of surfaces of revolution with axisymmetric around
    z-axis.


    The representation of surfaces in polar coordinates and Cartesian coordinates
    offers different perspectives and mathematical formulations. The choice between
    a polar-coordinate or cartesian-coordinate for describe surfaces depends on the
    nature of the model and the features you wish to highlight. In many cases, the
    choice between these two coordinate systems will depend on the convenience for
    the representation of the surface. Here are some general considerations:


    ### Cartesian-coordinate system:


    - Best for representing functions that depend on parameters $(u, v)$ with rectangular
    configuration.

    - Useful for modeling linear relationships and for representing surfaces defined
    by simple Cartesian equations.

    - It is more intuitive for most people since it is the most used coordinate system.


    ### Polar-coordinate system:


    - Useful when the function you are representing has radial symmetry or when polar
    coordinates are a natural description of the geometry of the problem.

    - May be more suitable for representing functions with circular or spiral features.

    - It can simplify the representation of certain curves and facilitate the identification
    of radial symmetries.


    Polar-coordinate surfaces can be expressed with both explicit and implicit notation.
    In the following, we will conceptualize the notation and application in geometric
    modeling.


    ## 13.3. Explicit notation for polar-coordinate surfaces


    **Explicit notation for polar-coordinate surfaces** is defined as a function in
    which an output variable $z$ can be described entirely in terms of the input variables
    $x$ and $y$ (see Figure 13-2), where the input variables are expressed by trigonometric
    functions ($\cos(v)$ and $\sin(v)$), i.e., $x = r \cos(v)$ and $y = r \sin(v)$.
    In standard form, we can write a curve as Equation 13-2.


    **Equation 13-2**


    $$

    s: \begin{cases}

    r = u \\

    x = r \cos(v) \\

    y = r \sin(v)

    \end{cases} \quad ; \text{with } u = u_0...u_n, v = v_0...v_m

    $$


    $z = f(x,y)$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_223_0.png)


    Figure 13-2. Conceptualization of explicit notation for polar-coordinate surfaces.


    ### Example: Waves on water’s surface


    We use explicit notation for describe waves on water’s surface $s$ expressed as
    Equation 13-3.


    **Equation 13-3**


    $$

    s: \begin{cases}

    r = u \\

    x = r \cos(v) \\

    y = r \sin(v) \\

    z = \sin(r)

    \end{cases} \quad ; \text{with } u = 0...9\pi, v = 0...2\pi

    $$


    Note that the equation to describe waves on water''s surface was previous developed
    using cartesian coordinate system in Section 10.2 (see Equation 10-3) for modeling
    the Figure 10-3. Now, we use polar coordinate system for modeling the same surface
    (see Equation 13-3). We show both models together: (i) Figure 13-3 which is the
    model form cartesian coordinate system, and (ii) Figure 13-4 which is the model
    from polar coordinate system. You can see the difference in the boundary: The
    model form cartesian coordinate system (Figure 13-3) has a rectangular boundary
    because it is modeled based on a rectangular meshgrid configuration; and the model
    form polar coordinate system (Figure 13-4) has a circular boundary because it
    is modeled based on a circular meshgrid configuration.


    The following code models the waves on water''s surface. Line 1 and line 2 import
    libraries. Line 3 and line 4 define the parameters $u$ and $v$. Line 5 defines
    the parametric arrays $U$ and $V$. Line 6 define the radius as the parametric
    array $U$. Line 7 and line 8 define the plane $x-y$ using trigonometric functions
    ($\cos(v)$ and $\sin(v)$) to obtain the polar-coordinate system. Line 9 defines
    the $z$-axis. From line 10 to line 13 set and show the surface (see execution
    in Figure 13-4).


    ### Code and execute


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,9*np.pi,50)

    4. v = np.linspace(0,2*np.pi,50)

    5. U,V = np.meshgrid(u,v)

    6. r = U

    7. X = r * np.cos(V)

    8. Y = r * np.sin(V)

    9. Z = np.sin(r)

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''ylorrd'', showscale=False,

    11. contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=False))))

    12. fig.update_layout(scene = dict(aspectratio = dict(x=1, y=1, z=.1)))

    13. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_225_0.png)


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_225_1.png)


    ### Example: Cowboy hat


    We use explicit notation of polar-coordinate surfaces for describe a cowboy hat
    $s$ expressed as Equation 13-4.


    **Equation 13-4**


    $$

    s: \begin{cases}

    r = u \\

    x = r \cos(v) \\

    y = r \sin(v) \\

    z = \sin(x^2 + y^2) e^{-x^2} + \cos(x^2 + y^2)

    \end{cases} \quad ; \text{with } u = 0...9\pi, v = 0...2\pi

    $$


    The following code models the cowboy hat. Line 1 and line 2 import libraries.
    Line 3 and line 4 define the parameters $u$ and $v$. Line 5 defines the parametric
    arrays $U$ and $V$. Line 6 define the radius as the parametric array $U$. Line
    7 and line 8 define the plane x-y using trigonometric functions ($\cos(v)$ and
    $\sin(v)$) to obtain the polar-coordinate system. Line 9 defines the z-axis. From
    line 10 to line 13 set and show the surface (see execution in Figure 13-5).


    ### Code and execute


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,2*np.pi/3,100)

    4. v = np.linspace(0,2*np.pi,100)

    5. U, V = np.meshgrid(u,v)

    6. r = U

    7. X = r * np.cos(V)

    8. Y = r * np.sin(V)

    9. Z = np.sin(X**2+Y**2) * np.exp(-X**2) + np.cos(X**2+Y**2)

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''burg'', showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(scene = dict(aspectratio = dict(x=1, y=1, z=.5)))

    13. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_227_0.png)


    Figure 13-5. Cowboy hat.


    > **TIP:** If you model an explicit notation for polar-coordinate surface described
    by $r = u, x = \cos(v)$, $y = \sin(v)$, and $z = r$, you obtain a cylinder. If
    you model a surface described by $r = u, x = r \cos(v)$, $y = r \sin(v)$, and
    $z = r$, you obtain a cone. If you model the cone expressions but change the $z$-axis
    by $z = r^2$, you obtain a paraboloid. If you model the same cone expressions
    but change the $z$-axis by $z = \sqrt{(r^2+1)}$, you obtain a hyperbolic surface.
    If you model the same expressions but change by $z = \sqrt{(-r^2+1)}$, you obtain
    a sphere.


    ## 13.4. Implicit notation for polar-coordinate surfaces


    **Implicit notation** is the general expression for **polar-coordinate surfaces**
    in 3D. It means that the equation is not expressed as a solution for either $x$
    in terms of $y$ or $z$. In standard form, we can write a surface as Equation 13-5.


    **Equation 13-5**


    $$

    s: \begin{cases}

    x = f_1(u,v) \cos(u) \cos(v) \\

    y = f_2(u,v) \sin(u) \cos(v) \\

    z = f_3(u,v)

    \end{cases} ; \text{ with } u = u_0...u_n, v = v_0...v_m

    $$


    Where $x$, $y$, and $z$ are the output variables expressed entirely in terms of
    the input parameter $u$, i.e., $x = f_1(u,v) \cos(u) \cos(v)$, $y = f_2(u,v) \sin(u)
    \cos(v)$, and $z = f_3(u,v)$.


    ### Example: Spiral toboggan


    We use implicit notation for describe a spiral toboggan described in Equation
    13-6.


    **Equation 13-6**


    $$

    s: \begin{cases}

    r = u \\

    x = r \cos(u) \cos(v) \\

    y = r \sin(u) \cos(v) \\

    z = -r \sin(v) - \sqrt{x^2 + y^2}

    \end{cases} ; \text{ with } u = 0...5\pi, v = 0...\pi

    $$


    The following code models the spiral toboggan. Line 1 and line 2 import libraries.
    Line 3 and line 4 define the parameters $u$ and $v$. Line 5 defines the parametric
    arrays $U$ and $V$. Line 6 defines the radius as the parametric array $U$. Line
    7 to line 9 define the $x$, $y$, and $z$ axes. From line 10 to line 13 set and
    show the surface (see execution in Figure 13-5).


    ### Code and execute


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,5*np.pi,100)

    4. v = np.linspace(0,np.pi,50)

    ```'
  mdcn: '## 13.2. 极坐标系与笛卡尔坐标系


    极坐标曲面可以通过*径向距离*函数和*角度*函数进行参数化描述（见图13-1）。极坐标系中曲面的常见表示形式涉及使用如下形式的参数方程（见公式13-1）。


    **公式13-1**


    $$

    s: \begin{cases}

    r = u \\

    x = r \cos(v) \\

    y = r \sin(v) \\

    z = f(u,v)

    \end{cases}

    $$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_221_0.png)


    图13-1. 绕z轴轴对称的旋转曲面概念化。


    极坐标和笛卡尔坐标对曲面的表示提供了不同的视角和数学表述。选择极坐标还是笛卡尔坐标来描述曲面，取决于模型的本质以及你希望强调的特征。在许多情况下，这两种坐标系的选择将取决于表示曲面的便利性。以下是一些一般性的考虑因素：


    ### 笛卡尔坐标系：


    - 最适合表示具有矩形配置的、依赖于参数$(u, v)$的函数。

    - 适用于建模线性关系以及表示由简单笛卡尔方程定义的曲面。

    - 对大多数人来说更直观，因为它是最常用的坐标系。


    ### 极坐标系：


    - 当所表示的函数具有径向对称性，或者极坐标是问题几何形状的自然描述时，非常有用。

    - 可能更适合表示具有圆形或螺旋特征的函数。

    - 可以简化某些曲线的表示，并有助于识别径向对称性。


    极坐标曲面可以用显式和隐式两种表示法来表达。接下来，我们将概念化其在几何建模中的表示法和应用。


    ## 13.3. 极坐标曲面的显式表示法


    **极坐标曲面的显式表示法**定义为一个函数，其中输出变量$z$可以完全用输入变量$x$和$y$来描述（见图13-2），其中输入变量由三角函数（$\cos(v)$和$\sin(v)$）表示，即$x
    = r \cos(v)$和$y = r \sin(v)$。标准形式下，我们可以将曲线写为公式13-2。


    **公式13-2**


    $$

    s: \begin{cases}

    r = u \\

    x = r \cos(v) \\

    y = r \sin(v)

    \end{cases} \quad ; \text{其中 } u = u_0...u_n, v = v_0...v_m

    $$


    $z = f(x,y)$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_223_0.png)


    图13-2. 极坐标曲面显式表示法的概念化。


    ### 示例：水面波纹


    我们使用显式表示法来描述水面波纹$s$，如公式13-3所示。


    **公式13-3**


    $$

    s: \begin{cases}

    r = u \\

    x = r \cos(v) \\

    y = r \sin(v) \\

    z = \sin(r)

    \end{cases} \quad ; \text{其中 } u = 0...9\pi, v = 0...2\pi

    $$


    请注意，描述水面波纹的方程之前在第10.2节（见公式10-3）中使用笛卡尔坐标系建模图10-3时已经推导过。现在，我们使用极坐标系对同一曲面进行建模（见公式13-3）。我们将两个模型并列展示：(i)
    图13-3是笛卡尔坐标系下的模型，(ii) 图13-4是极坐标系下的模型。你可以看到边界上的差异：笛卡尔坐标系下的模型（图13-3）具有矩形边界，因为它是基于矩形网格配置建模的；而极坐标系下的模型（图13-4）具有圆形边界，因为它是基于圆形网格配置建模的。


