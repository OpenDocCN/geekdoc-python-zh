    ## 4.1. What is the *NumPy* library?


    *NumPy* (from the acronym *Numerical Python*) is a Python library that provides
    different mathematical elements (such as arrays and matrices) and an assortment
    of routines for fast operations on mathematical, logical, basic linear algebra,
    and much more ([https://numpy.org/](https://numpy.org/)).


    ## 4.2. Why do we use *NumPy*?


    *NumPy* can be used to perform a wide variety of mathematical operations essential
    for geometric modeling. *NumPy* is widely used in geometric modeling for several
    reasons:


    - **Efficiency:** *NumPy* is highly optimized for numerical operations. Geometric
    modeling involves a lot of mathematical computations, such as scalar and array
    operations.

    - **Array handling:** Geometric models are often represented as arrays of points,
    vertices, or edges. *NumPy* provides an easy and efficient way to handle these
    arrays, making it simpler to manipulate geometric data.

    - **Compatibility with other libraries:** *NumPy* integrates well with other libraries
    commonly used in geometric modeling, such as *Matplotlib* or *Plotly* (for visualization).

    - **Mathematical functions:** *NumPy* offers various mathematical functions required
    for geometric computations, including algebraic functions, trigonometric functions,
    and linear algebra.


    Overall, *NumPy*''s efficiency, array handling capabilities, and compatibility
    with other libraries make it a powerful tool for geometric modeling in Python.


    ## 4.3. Using *NumPy* functions


    *NumPy* has a set of interesting functions to facilitate coding and obtain results
    **quickly** and **easily**. Now, we are going to explain how to use just a few
    of them because they will used to define and operate arrays:


    ### The *abs* function


    The **abs** function is used to compute the absolute value of a variable. Its
    syntax is simple: use the keyword *abs* followed by parentheses “( )”. Within
    these parentheses, specify the variable to be evaluated, in this instance, denoted
    as *a*. The formulation is as follows:


    ```

    abs(a)

    ```


    ### The *sin* function


    The **sin** function is used to compute the sine value of a variable. The syntax
    is simple: use the keyword *sin* followed by the parentheses “( )”. Within these
    parentheses, specify the variable to be evaluated, in this instance, denoted as
    *u*. The formulation is as follows:


    ```

    sin(u)

    ```


    ### The *cos* function


    The **cos** function is used to compute the cosine value of a variable. The syntax
    is simple: use the keyword *cos* followed by the parentheses “( )”. Within these
    parentheses, specify the variable to be evaluated, in this instance, denoted as
    *v*. The formulation is as follows:


    ```

    cos(v)

    ```


    ### The log10 function


    The *log10* function calculates a variable''s logarithmic base ten value. The
    syntax is simple: use the keyword *log10* followed by the parentheses “( )”. Within
    these parentheses, specify the variable to be evaluated, in this instance, denoted
    as *w*. The formulation is as follows:


    ```

    log10(w)

    ```


    ### The linspace function


    The *linspace* function creates an evenly spaced sequence of numbers in a specified
    interval. The syntax is simple: use the keyword *linspace* followed by the parentheses
    “( )”. Within these parentheses, specify three numbers (*start*, *stop*, *num*)
    separated by commas. *start* is the initial element of the array, *stop* is the
    final element of the array, and *num* is the number of elements. The formulation
    is as follows:


    ```

    linspace(start, stop, num)

    ```


    ### The ones function


    The *ones* function creates an array where the element''s value is set to 1. The
    syntax is simple: use the keyword *ones* followed by the parentheses “( )”. Specify
    two numbers (*rows*, *cols*) separated by a comma within these parentheses. *rows*
    is the number of rows for the array, and *cols* is the number of columns. The
    formulation is as follows:


    ```

    ones(rows, cols)

