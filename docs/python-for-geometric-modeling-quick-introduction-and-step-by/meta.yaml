  md: '# Example: Disc with a hole


    We use a parametric expression to describe a disc with a hole (see Equation 9-5).


    Equation 9-5


    | $s:$ | $r = 2v$<br>$x = r \sin(u)$<br>$y = r \cos(u)$ | ; with $u = 0...2\pi$,
    $v = 1...5$ |


    Note that the equation to describe a disc with a hole (Equation 9-5) is like the
    equation for a circle (Equation 7-9). However, we must change the radius ($r$)
    to a function depending on the parameter $v$, which the radius of the hole will
    be the minimum value of the parameter $v$, and the external radius of the disc
    will be the maximum value of the parameter $v$.


    The following code models the disc with a hole.


    +   - Lines 1 and 2 import libraries.

    - Lines 3 and 4 define the parameters $u$ and $v$ as one-dimension arrays.

    - Line 5 defines multi-dimensional parametric arrays $U$ and $V$.

    - Line 6 defines the radius function $r$.

    - Lines 7 and 8 define the $x$-axis and $y$-axis in function of the parametric
    arrays $U$ and $V$.

    - In line 9, a loop started running through each row of parametric arrays $U$
    and $V$.

    - In line 10, a loop started running through each column of the parametric arrays
    $U$ and $V$.

    - Finally, lines 11 to 13 plot and show each patch of the surface (see execution
    in Figure 9-10).


