    # 7.4. Quick project


    Do you know the *Lissajous* curves? *Lissajous* curves have applications in sciences
    such as physics and astronomy; moreover, they have been used in various engineering
    applications such as optics, imaging, antenna scans, machining, and mobile robotics.
    *Lissajous* curves are used in experimental tests to determine if a device may
    be appropriately categorized as a memristor (a non-linear two-terminal electrical
    component relating electric charge and magnetic flux linkage). It is also used
    to compare two different electrical signals: a known reference signal and a signal
    to be tested.


    *Lissajous* curves belong to the family of curves described by the form (see Equation
    7-12).


    ```

    Equation 7-12

    $$

    c : \begin{cases} x = A \sin(a u + \delta) \ y = B \sin(b u) \end{cases} \quad
    ; \text{with } u = 0...2\pi$$

    ```'
