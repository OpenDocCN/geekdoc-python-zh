- md: '## 13.5. Quick project


    Boats come in a wide variety of shapes and sizes, so do their hulls. Despite the
    variety, all hulls are designed to do one of only two things: either displace
    water, or ride on top of it, which is called planing.


    On the one hand, sailing boats, slow-moving boats, and large boats (such as cruisers)
    ships have displacement hulls. The combination of their weight and power means
    they move lower in the water, pushing or displacing water, rather than riding
    on top of it.


    On the other hand, smaller, faster boats (such as powerboats) or personal watercraft,
    typically have planing hulls. Planing hulls are designed to rise up and ride on
    top of the water at higher speeds.


    We propose to model a bio-inspired powerboat hull. The hull will be based on a
    seashell stated in (Equation 13-8).


    > Equation 13-8


    $$

    s : \begin{cases} r = u + \sin(u + v) \\ x = r \cos(u) \sin(v) \\ y = \cos(v)
    \\ z = r \sin(u) \sin(v) \end{cases} ; \text{with } u = 0...7\pi, v = 0...\pi

    $$


    ### Let''s model the powerboat hull


    The following code models the seashell. Line 1 and line 2 import libraries. Line
    3 to line 5 define the parameters u, v, U, and V. Line 6 to line 9 define the
    x, y, and z axes. From line 10 to line 13 set and show the surface (see execution
    in Figure 13-8).


    **Code and execute**


    ```python

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,7*np.pi,90)

    4. v = np.linspace(0,np.pi,80)

    5. U, V = np.meshgrid(u,v)

    6. r = U + np.sin(U + V)

    7. X = r * np.cos(U) * np.sin(V)

    8. Y = r * np.cos(V)

    9. Z = r * np.sin(U) * np.sin(V)

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale =''tealgrn'', showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(scene = dict(aspectratio = dict(x=1, y=1, z=1)))

    13. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_233_0.png)


    Figure 13-8. Original seashell.


    In a first step, we modify an element of Equation 13-8 to have a global approximation
    to a powerboat hull geometry, i.e., to obtain a lower concave surface. For such
    a result, we redefine the range of the parameter $u = \pi/2...2\pi$ (changing
    line 3 of the previous code), and thus, obtain only the lower section of the seashell
    (see Figure 13-9).


    In a second step, we modify another element of Equation 13-8 to obtain a slenderer
    hull geometry. For such a result, we redefine the radius $r = (2^u + \sin(u +
    v))/10$ (changing line 6 of the previous code), and thus, stretch the length of
    the x-axis (see Figure 13-10).


    In a third step, we adjust the proportions of the surface to those of the powerboat
    hull by modifying the y-axis, $y = r \cos(v)/5$, the objective is to reduce the
    height of the surface to correspond to that of the powerboat hull (see Figure
    13-11).


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_234_0.png)


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_234_1.png)


    The following code models the bio-inspired powerboat hull. Line 1 and line 2 import
    libraries. Line 3 has the modification made in the first step. Line 4 and line
    5 define the parameters $v$, $U$, and $V$. Line 6 has the modification made in
    the second step. Line 7 and line 9 define the $x$ and $z$ axes. Line 8 has the
    modification made in the third step. From line 10 to line 13 set and show the
    surface (see execution in Figure 13-11).


    ### Code and execute


    ```python

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(np.pi/2,2*np.pi,90)

    4. v = np.linspace(0,np.pi,80)

    5. U, V = np.meshgrid(u,v)

    6. r = (2**u + np.sin(U + V))/10

    7. X = r * np.cos(U) * np.sin(V)

    8. Y = r * np.cos(V)/5

    9. Z = r * np.sin(U) * np.sin(V)

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale =''tealgrn'', showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(scene = dict(aspectratio = dict(x=3, y=1, z=.6)))

    13. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_236_0.png)


