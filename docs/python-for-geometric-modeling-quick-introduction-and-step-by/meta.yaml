    $c: \begin{cases} y = u \\ x = (y^2 + 1) / (2y) \end{cases} ; \text{ 其中 } u =
    0.2...5$


    **E7.2.** 绘制并匹配以下二维参数曲线（使用隐式表示法）与对应的图形。


    ## 方程 E7-5


    $c: \begin{cases} r = 1 \\ x = r \sin(2u) \\ y = r \cos(3u) \end{cases} ; \text{
    其中 } u = 0...2\pi$


    ## 方程 E7-6


    $c: \begin{cases} r = 1 + 2 \sin(3u) \\ x = r \cos(u) \\ y = r \sin(u) \end{cases}
    ; \text{ 其中 } u = 0...2\pi$


    ## 方程 E7-7


    $c:$

    $A = 8$

    $B = 3$

    $x = (A-B) \cos(u) + B \cos((A-B) u/B)$

    $y = (A-B) \sin(u) - B \sin((A-B) u/B)$

    $; \text{其中 } u = 0...6\pi$


    ## 方程 E7-8


    $c:$

    $x = 16 \sin^3(u)$

    $y = 13 \cos(u) - 5 \cos(2u) - 2 \cos(3u) - \cos(4u)$

    $; \text{其中 } u = 0...2\pi$


    图 E7-5. 花形曲线。


