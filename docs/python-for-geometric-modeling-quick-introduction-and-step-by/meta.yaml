- md: '## Chapter 05 – Introduction to Matplotlib


    In the previous chapters, we learned how to use the *NumPy* library. However,
    Python also provides other standard libraries for developing geometric models.


    In this chapter, we will present a brief introduction to the *Matplotlib* library
    in Python. We will explain just how to use a few elements of *Matplotlib* for
    data visualization, which will be used in future chapters of this book.


    Data visualization is an essential aspect of geometric modeling. Visualizing data
    allows us to see patterns, relationships, and trends which are not immediately
    evident in raw data. In this chapter, we will present a brief introduction to
    *Matplotlib* in Python for plot charts, and we will explore one of the most popular
    modules of *Matplotlib* called *PyPlot*; moreover, we will learn how to use some
    of them.


    Next, we will cover the following sections:


    - 1. What is Matplotlib?

    - 2. *Pyplot* module.


    The code developed for this chapter is located at [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-05](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-05).
    We recommend that you enhance your coding skills by independently developing the
    code. If there are any issues, you can refer to the code in the repository for
    comparison.


    Remember that we suggest you create a new Colab document for each book chapter.
    It will allow you to keep your codes organized.


    ### 5.1. What is Matplotlib?


    **Matplotlib** is a popular library for creating static visualizations in Python.
    It provides a wide range of tools for creating various graphs, charts, plots,
    and other visual representations of data ([https://matplotlib.org/](https://matplotlib.org/)).
    This library showcases the impact the Python community can have through its collaborative
    development efforts.


    *Matplotlib* is used to create **raster images** (also called bitmaps) comprised
    of individual pixels of color. Each color pixel contributes to the overall image.
    Raster images might be compared to pointillist paintings, wherein each colored
    paint dot mirrors a single pixel within the context of a raster image. When viewed
    as an individual dot, it is just a color, but when viewed as a whole, the colored
    dots make up a vivid and detailed painting.


    ### 5.2. PyPlot module


    **PyPlot** is a collection of functions that make *matplotlib* work and provide
    several functions for creating different types of plots, such as line plots, scatter
    plots, bar plots, histograms, and many more. In this section, we will focus on
    the *plot* and *fill* functions.


    ### Plot function


    The *plot* function draws a line with vertices given by the *x*-axis and *y*-axis
    coordinates. The following code shows how to use the *plot* function (see execution
    in Figure 5-1):


    - In line 1, we import the *PyPlot* module from *matplotlib.pyplot* and assign
    it the alias *plt* using the *as* keyword. The alias is a short name that allows
    us to use the module directly with the name *plt* rather than the original extended
    version *matplotlib.pyplot*.

    - In line 2, we import the *NumPy* library and give the alias *np*.

    - In line 3 and line 4, we create two arrays, each with five elements using *np.array*.

    - In line 5, we use a *plot* function to create a **line plot** from the *x*-axis
    defined by the variable *x* and the *y*-axis defined by the variable *y*. The
    line color is determined by the *color* attribute, which can be modified by adjusting
    the text associated with the *color* attribute. Experiment with various text values
    to explore different line colors, such as ‘blue’, ‘red’, ‘yellow’, etc. Finally,
    the line width is set using the *linewidth* attribute. You can change the line
    width by varying the value associated with the *linewidth* attribute. Explore
    different line widths by experimenting with values such as *1, 2, 3, 4*, etc.

    - In line 6, we use the *plot* function to create a **point plot** from the *x*-axis
    defined by the variable *x* and the *y*-axis defined by the variable *y*. Then,
    the point color is set using the *color* attribute. Alter the line color by adjusting
    the text associated with the *color* attribute. Explore a variety of line colors,
    including options like ‘blue’, ‘black’, ‘yellow’, and more. Finally, the size
    of the points is set using the *markersize* attribute, which can change the line
    width by varying the number associated with the *markersize* attribute. Try different
    line widths (*1, 2, 3, 4*, etc.).

    - In line 7, we use the *grid* function to add a grid to the chart.

    - In line 8 and line 9, we use the *xlabel* and *ylabel* functions to add labels
    to the *x*-axis and *y*-axis, respectively.

    - In line 10, we use the *title* function to add a title to the chart.

    - Finally, in line 11, we use the *show* function to display the chart.


    ### Code and execute


    ```

    1. import matplotlib.pyplot as plt

    2. import numpy as np

    3. x = np.array([0,6,10,-5,-4])

    4. y = np.array([0,1, 5, 7, 3])

    5. plt.plot(x,y,color=''black'',linewidth=3)

    6. plt.plot(x,y,''o'',color=''red'',markersize=7)

    7. plt.grid()

    8. plt.xlabel(''x'')

    9. plt.ylabel(''f(x)'')

    10. plt.title(''Raster Graph using plot function'')

    11. plt.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_58_0.png)


    Figure 5-1. Raster Graph using plot function.


    ### Fill function


    The *fill* function draws an area with vertices given by the *x*-axis and *y*-axis
    coordinates. The following code shows how to use the *fill* function (see execution
    in Figure 5-2):


    - In line 1 and line 2, we import *PyPlot* and *NumPy* respectively.

    - In line 3 and line 4, we create two arrays, each with five elements using *np.array*.

    - In line 5, we use the *fill* function to create an area plot from the x-axis
    defined by the variable *x* and the y-axis defined by the variable *y*. The area
    color is set using the *color* attribute. Then, the transparency level is set
    by means of the *alpha* attribute. You can change the transparency level by varying
    from 0 to 1, the number associated with the *alpha* attribute, where 1 is a solid
    area and 0 is fully transparent. Finally, the linewidth is set using the *linewidth*
    attribute.

    - In line 6, we use the *grid* function to add a grid to the chart.

    - In line 7 and line 8, we use the *xlabel* and *ylabel* functions to add labels
    to the x-axis and y-axis, respectively.

    - In line 9, we use the *title* function to add a title to the chart.

    - Finally, in line 10, we use the *show* function to display the chart.


    ### Code and execute


    ```

    1. import matplotlib.pyplot as plt

    2. import numpy as np

    3. x = np.array([0,6,10,-5,-4])

    4. y = np.array([0,1,5,7,3])

    5. plt.fill(x,y,color=''red'',alpha=0.4,linewidth=3)

    6. plt.grid()

    7. plt.xlabel(''x'')

    8. plt.ylabel(''f(x)'')

    9. plt.title(''Raster Graph using fill function'')

    10. plt.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_60_0.png)


    Figure 5-2. Raster Graph using fill function.


