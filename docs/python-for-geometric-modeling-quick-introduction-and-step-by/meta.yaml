    \ 由三个元素 $(x(u,v), y(u,v), z(u,v))$ 组成。这组点由三个具有两个参数（*u* 和 *v*）的函数定义（见图 10-1）。参数（*u*\
    \ 和 *v*）是独立变量（输入），三个 *x*、*y* 和 *z* 依赖于它们（输出），并且随着参数的增加，$x(u,v)$、$y(u,v)$ 和 $z(u,v)$\
    \ 的值会沿着平面曲面描绘出一条路径。三维中的参数曲面 $s$ 描述了一组点之间的关系，这可以通过三个函数来表达：一个函数 $f_1(u,v)$ 用于获取\
    \ $x$ 值；另一个函数 $f_2(u,v)$ 用于获取 $y$ 值；最后一个函数 $f_3(u,v)$ 用于获取 $z$ 值（见方程 10-1）。\n\n\
    **方程 10-1**\n\n$$\ns: \\begin{cases} \nx = f_1(u,v) \\\\\ny = f_2(u,v) \\\\\n\
