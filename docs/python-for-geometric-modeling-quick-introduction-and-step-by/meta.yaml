    请注意，描述 $y$-$z$ 平面中心形曲线的公式（公式 11-3）类似于之前在 7.5 节中建模的曲线（参见公式 E7-10）。为了拉伸该曲线，我们只需通过参数
    $v$ 扩展 $x$ 轴即可。我们将两个模型一起展示：(i) 图 11-5，二维心形线曲线；(ii) 图 11-6，由二维心形线曲线拉伸而成的曲面。你可以看到两个模型中的曲线是相同的。


    以下代码建模了拉伸的心形曲面。


    - 第 1 和 2 行导入库。

    - 第 3 和 4 行定义参数 u 和 v。

    - 第 5 行定义参数数组 U 和 V。

    - 第 6 行将 x 轴定义为拉伸曲面的高度，作为参数数组 V 的函数。

    - 第 7 和 8 行将 $y$-$z$ 平面上的心形曲线定义为参数数组 U 的函数（参见图 11-5）。

    - 第 9 至 12 行设置并显示曲面（执行结果见图 11-6）。


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,2*np.pi,50)

    4. v = np.linspace(0,2,50)

    5. U,V = np.meshgrid(u,v)

    6. X = V

    7. Y = 16*np.sin(U)**3

    8. Z = 13*np.cos(U)-5*np.cos(2*U)-2*np.cos(3*U)-np.cos(4*U)

    9. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''solar'', showscale=False,

    10. contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True)))

    11. fig.update_layout(title=''Extruded heart-shaped surface'', autosize =False)

    12. fig.show()

