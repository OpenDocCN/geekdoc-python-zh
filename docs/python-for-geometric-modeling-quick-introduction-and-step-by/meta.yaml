    - [Chapter 08 – Parametric curves in 3D](Chapter%2008%20–%20Parametric%20curves%20in%203D)

    - [Chapter 09 – Parametric surfaces in 2D](Chapter%2009%20–%20Parametric%20surfaces%20in%202D)

    - [Chapter 10 – Parametric surfaces in 3D](Chapter%2010%20–%20Parametric%20surfaces%20in%203D)

    - [Chapter 11 – Special case: Extruded surfaces](Chapter%2011%20–%20Special%20case:%20Extruded%20surfaces)

    - [Chapter 12 – Special case: Surfaces of revolution](Chapter%2012%20–%20Special%20case:%20Surfaces%20of%20revolution)

    - [Chapter 13 – Special case: Polar-coordinate surfaces](Chapter%2013%20–%20Special%20case:%20Polar-coordinate%20surfaces)

    - [Chapter 14 – Special case: Complex surfaces](Chapter%2014%20–%20Special%20case:%20Complex%20surfaces)

    - [Chapter 15 – Deploying Models to the Cloud](Chapter%2015%20–%20Deploying%20Models%20to%20the%20Cloud)

    - [Chapter 16 – Exercise solutions](Chapter%2016%20–%20Exercise%20solutions)


    # Preface


    What is geometric modeling? It is an area of applied computational geometry that
    studies methods and algorithms for describing shapes, in which Computer Aided
    Design (CAD) is the computational representation of an object''s geometry. It
    includes both graphical and non-graphical information. This information is generated
    and displayed as geometric models, that is, figures; thus, it is possible to edit
    and analyze the models in different ways.


    In this book, we will discover some basic geometric models practically using Python
    language. It will be a quick introduction and step-by-step guide to CAD applications.


    The big difference between this book and other similar ones is that we will adopt
    a strategy governed by three fundamental elements: (i) we will develop concepts
    with a **theoretical/practical** approach, (ii) we will explain each element **step
    by step**, and (iii) we will use many **images** to explain the fundamental elements.


    **Theoretical/practical:** We will explain each concept we develop calmly and
    briefly, with words that any reader can understand (without going around in circles
    or using complex expressions). In addition, we will develop multiple pieces of
    code, examples, and exercises for the reader to practice and understand how to
    apply each element seen.


    **Step by step:** We will start with short and simple pieces of code. In addition,
    we will adequately explain each instruction developed. We will not assume that
    the reader magically understands everything.


    **Images:** We will use supporting images to facilitate understanding multiple
    concepts and pieces of code (both simple and complex). We will use diagrams and
    screen outputs for the reader to verify their progress.


    # Who is this book for?


    This book is designed for Python developers at any level of experience with Python
    programming who want to learn geometric computer modeling, whether they are young,
    adults, professionals, or teachers. In addition, it is a book designed for beginners
    or novices in mathematical concepts.


    To read this book fluently and get all the potential, we suggest previous fundamental
    programming elements in Python as variables, loops, functions, arrays, and a basic
    concept of libraries.


    If you need to learn about programming in Python language, we encourage you to
    read the book *Python For Beginners: A Practical and Step-by-Step Guide to Programming
    with Python*. You can get it at [https://www.amazon.com/dp/B0C3FQJ45T/](https://www.amazon.com/dp/B0C3FQJ45T/).
    Sometimes, the digital version of that book is available for free download. If
    it''s not, please email us at [practicalbooksco@gmail.com](mailto:practicalbooksco@gmail.com)
    with a screenshot of your Amazon purchase of this book, and we will give you a
    PDF version of the *Python For Beginners* book for free.


    # What does this book cover?


    As the title indicates, this book is a quick introduction and step-by-step guide
    to geometric modeling using Python, including parametric curves and surfaces modeling.
    It is a short book designed not to overwhelm the reader. Although it could have
    covered more topics, only the topics above are treated to explain them well and
    in detail.


    By the end of the book, the reader will have acquired knowledge of fundamental
    elements in geometric modeling, which they can then apply in more advanced projects,
    allowing them to gain new knowledge more easily.


