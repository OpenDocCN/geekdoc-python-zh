    ## 关于作者


    **罗纳德·M·马丁诺德** 自2015年起担任EAFIT大学副教授。他完成了机械工程教育，后来在法国洛林大学计算机与数学工程学院获得博士学位。他积累了参与研究项目的经验，这些项目支持组织优化维护政策和城市交通网络的运营。


    **丹尼尔·科雷亚** 是一位教授、研究员、软件开发者和多本编程书籍的作者。他拥有计算机科学博士学位，是哥伦比亚麦德林EAFIT大学的教授。他从教超过十年，并负责协调编程课程。他对软件架构、框架（如Laravel、Nest、Django、Express、Vue、React和Angular）、Web开发和整洁代码感兴趣。在Twitter上关注丹尼尔：**@danielgarax**。


    **保拉·巴列霍** 是一位教师和研究员。她拥有计算机科学博士学位。她目前在哥伦比亚麦德林EAFIT大学工作，教授基础编程和软件工程课程。她从教超过七年。她对与软件架构、软件设计和整洁代码相关的主题感兴趣。


    ## 关于技术编辑


    **卡米洛·埃雷拉** 是一位拥有工程学硕士学位的音响工程师，其研究重点在于数据科学和软件开发。他的研究在工业维护领域进行，致力于创建强大的数值工具和数字解决方案以支持决策。目前，他担任Python编程基础课程的兼职教授。


