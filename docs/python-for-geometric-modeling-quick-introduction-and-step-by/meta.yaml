    # 13.2. Polar coordinates vs cartesian coordinate systems.


    The representation of surfaces in polar coordinates and Cartesian coordinates
    offers different perspectives and mathematical formulations. The choice between
    a polar-coordinate or cartesian-coordinate for describe surfaces depends on the
    nature of the model and the features you wish to highlight. In many cases, the
    choice between these two coordinate systems will depend on the convenience for
    the representation of the surface. Here are some general considerations:'
  merge: -1
  pgno: 221
- img_proc: true
  md: "# Cartesian-coordinate system:\n\n+   - Best for representing functions that\
    \ depend on parameters $(u, v)$ with rectangular configuration.\n- Useful for\
    \ modeling linear relationships and for representing surfaces defined by simple\
    \ Cartesian equations.\n- It is more intuitive for most people since it is the\
    \ most used coordinate system.\n\n# Polar-coordinate system:\n\n+   - Useful when\
    \ the function you are representing has radial symmetry or when polar coordinates\
    \ are a natural description of the geometry of the problem.\n- May be more suitable\
    \ for representing functions with circular or spiral features.\n- It can simplify\
    \ the representation of certain curves and facilitate the identification of radial\
    \ symmetries.\n\nPolar-coordinate surfaces can be expressed with both explicit\
    \ and implicit notation. In the following, we will conceptualize the notation\
    \ and application in geometric modeling.\n\n# 13.3. Explicit notation for polar-coordinate\
    \ surfaces\n\n**Explicit notation for polar-coordinate surfaces** is defined as\
    \ a function in which an output variable $z$ can be described entirely in terms\
    \ of the input variables $x$ and $y$ (see Figure 13-2), where the input variables\
    \ are expressed by trigonometric functions ($cos(v)$ and $sin(v)$), i.e., $x =\
    \ r cos(v)$ and $y = r sin(v)$. In standard form, we can write a curve as Equation\
    \ 13-2.\n\n```\nEquation 13-2\n$$\ns: \\begin{cases} \nr = u \\nx = r cos(v) \\\
    ny = r sin(v)\n\\end{cases} \\quad ; \\text{with } u = u_0...u_n, v = v_0...v_m$$\n\
    ```"
  merge: -1
  pgno: 222
