    ## 10.3. Implicit notation of parametric surfaces in 3D


    **Implicit notation** is the general expression for parametric surfaces in 3D.
    It means the equation is not expressed as a solution for either $x$ in terms of
    $y$ or $z$. We can write a surface in standard form as Equation 10-5. Where $x$,
    $y$, and $z$ are the output variables expressed entirely in terms of the input
    parameter $u$, i.e., $x = f_1(u,v)$, $y = f_2(u,v)$, and $z = f_3(u,v)$, see Figure
    10-5.


    **Equation 10-5**


    $s: \begin{cases} x = f_1(u,v) \\ y = f_2(u,v) \\ z = f_3(u,v) \end{cases} ; \text{
    with } u = u_0...u_n, v = v_0...v_m$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_149_0.png)


    ## Example: Sphere with unitary radius


    We use implicit notation to describe a sphere with unitary radius (r = 1) Equation
    10-6.


    **Equation 10-6**


    $s: \begin{cases} x = r \sin(v) \cos(u) \\ y = r \sin(v) \sin(u) \\ z = r \cos(v)
    \end{cases} ; \text{ with } u = 0...2\pi, v = 0...\pi$


    Note that the equation to describe a sphere (Equation 10-6) is based on the equation
    for a circle modeled earlier in section 7.3 (Equation 7-9). The equation for a
    circle is expressed with one pair of sinusoidal terms (cos(u) and sin(u)) to obtain
    only one curvature on the x and y axes. However, the equation for a sphere is
    expressed with three pairs of sinusoidal terms to describe the three curvatures
    of the surface: the first pair of terms (the term cos(u) inside the x-axis equation
    and the term sin(u) inside the y-axis equation) describes the curvature for the
    x-axis and y-axis; the second pair of terms (the term cos(v) inside the z-axis
    equation and the term sin(v) inside the x-axis equation) describes the curvature
    for the z-axis and x-axis; and the third pair of terms (the term cos(v) inside
    the z-axis equation and the term sin(v) inside the y-axis equation) describes
    the curvature for the z-axis and y-axis.


    In order to explain the process of the model in detail, we will initially define
    the parameter u using just four elements u = [0, 0.1, 0.2, 0.3], and the parameter
    v is just defined by three elements: v = [0.5, 0.6, 0.7] (see Figure 10-6); then,
    the parametric model will have twelve points (p_{0,0}, p_{0,1}, p_{0,2}, p_{1,0},
    p_{1,1}, p_{1,2}, p_{2,0}, p_{2,1}, p_{2,2}, p_{3,0}, p_{3,1}, p_{3,2}).


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_151_0.png)


    Figure 10-6. Conceptualization of modeling using the parameters u and v with four
    and three elements respectively.


    The following code models a sphere with a unitary radius using the parameters
    $u$ and $v$ with 50 elements each.


    - Lines 1 and 2 import libraries.

    - Lines 3 and 4 define the parameters $u$ and $v$.

    - Line 5 defines the parametric arrays $U$ and $V$.

    - Line 6 defines the sphere radius.

    - Lines 7 to 9 define the x-axis, y-axis, and z-axis in function of the parametric
    arrays U and V.

    - Lines 10 to 13 set and show the surface (see execution in Figure 10-7).


    ### Code and execute


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,2*np.pi,50)

    4. v = np.linspace(0,np.pi,50)

    5. U, V = np.meshgrid(u,v)

    6. r = 1

    7. X = r * np.sin(V) * np.cos(U)

    8. Y = r * np.sin(V) * np.sin(U)

    9. Z = r * np.cos(V)

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''portland'',
    showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(title=''Sphere'',autosize=False)

    13. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_153_0.png)


    Figure 10-7. Sphere with unitary radius.


    ## Example: seashell


    The radius $r$ can be a variable defined as function of the parameter $U$ or $V$.
    The following code shows how we model a seashell using implicit notation with
    variable radius $r$ expressed as Equation 10-7.


    ### Equation 10-7


    | $s:$ | $r = 1 - u$<br>$x = r \sin(v) + 5u$<br>$y = r \cos(v) \cos(4\pi u)$<br>$z
