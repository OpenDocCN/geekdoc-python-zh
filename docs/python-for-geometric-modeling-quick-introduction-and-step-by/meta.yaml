    = f_3(u,v)$，见图 10-5。


    **公式 10-5**


    $s: \begin{cases} x = f_1(u,v) \\ y = f_2(u,v) \\ z = f_3(u,v) \end{cases} ; \text{
    其中 } u = u_0...u_n, v = v_0...v_m$


