    # 10.2. Explicit notation of parametric surfaces in 3D


    **Explicit notation of parametric surfaces in 3D** is defined as a function in
    which a dependent variable ($z$) can be explicitly written in terms of independent
    variables ($x$ and $y$). We can write a curve in standard form as Equation 10-2.
    Where $z$ is the output variable expressed entirely in terms of the input variables
