    - For **conic flower** bands (see Figure E11-7).


    In the next chapter, we will learn to model other special case of parametric surfaces
    in 3D: surfaces of revolution.


    ## Chapter 12 – Special case: Surfaces of revolution


    In the previous chapters, we learned parametric surfaces in 3D and extruded surfaces
    as a special case. This chapter will explain a second special case called surfaces
    of revolution.


    Next, we will cover the following sections:


    1. What is surfaces of revolution?

    2. Surfaces of revolution based on a parametric radius.

    3. Surfaces of revolution based on a parametric curve in 3D.

    4. Surfaces of revolution based on a closed parametric curve.

    5. Quick project.

    6. Exercises.


    The code developed for this chapter is located at [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-12](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-12).
    We recommend that you enhance your coding skills by independently developing the
    code. If there are any issues, you can refer to the code in the repository for
    comparison.


    Remember that we suggest you create a new Colab document for each book chapter.
    It will allow you to keep your codes organized.


    ### 12.1. What is surfaces of revolution?


    **Surfaces of revolution** are surfaces that can be modeled axisymmetric surfaces
    and they are obtained using a curve *c* (called *surface profile*) around an *axis
    of rotation*. A surface of revolution is generated by rotating the curve *c* around
    the axis of rotation (called **axis of symmetry**) given an angle (called **revolution
    angle**). For example, given an axisymmetric model from a rotation around the
    z-axis, the parametric representation is expressed by a contented *surface profile*
    on the x-z or y-z plane, which are perpendicular planes to its *axis of rotation*
    (see figure 12-1).


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_191_0.png)


    We can consider another example where the *surface profile* is rotated around
    the y-axis. The parametric representation is expressed by a contented *surface
    profile* on the x-y or y-z plane (see figure 12-2).


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_192_0.png)


    Figure 12-2. Conceptualization of surfaces of revolution with axisymmetric around
    y-axis.


    Surfaces of revolution are modeled from *surface profile* that can be expressed
    by a parametric radius, parametric curves in 3D, or parametric closed curves.
    In the following we will explain these modeling methods.


    ### 12.2. Surfaces of revolution based on parametric radius


    Surfaces of revolution based on a parametric radius are obtained when the *surface
    profile* is expressed as a radius function, $r = f(u)$ (see Equation 12-1) defined
    on a plane ($x-y$, $x-z$, or $y-z$) which is rotated about an axis using trigonometric
    functions ($cos(v)$ and $sin(v)$), see Figure 12-3.


    Equation 12-1


    $$s: \begin{cases} r = f(u) \\ x = r \cos(v) \\ y = r \sin(v) \\ z = u \end{cases}
    ; \text{ with } u = u_0 \dots u_n, v = v_0 \dots v_m$$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_193_0.png)


    ### Example: Cup model based on surface of revolution


    Next, we define a radius describe which the *surface profile* for obtaining the
    surface of revolution which is rotated around z-axis and stated in Equation 12-2.


    ### Equation 12-2


    $$s: \begin{cases} r = u + 3 \sin^3(u) \\ x = r \cos(v) \\ y = r \sin(v) \\ z
    = u \end{cases} ; \text{ with } u = -\pi...5\pi, v = -3\pi/2...0$$


    Note that the equation to describe surfaces of revolution (Equation 12-2) is like
    the curve modeled earlier in section 6.2 (Equation 6-7). Indeed, the curve in
    Equation 6-7 is the *surface profile* (see Figure 6-7) for Equation 12-2. In order
    get the surface of revolution, we only must define the radius function, modify
    the x and y axes (multiplying by the trigonometric functions cos(v) and sin(v),
    respectively), and add the z-axis by expanding it by the parameter u.


    The following code models the surface of revolution.


    - Line 1 and line 2 import libraries.

    - Line 3 and line 4 define the parameters u and v.

    - Line 5 defines the parametric arrays U and V.

    - Line 6 define the radius in function on the parametric array U, which is the
    surface profile.

    - Line 7 and line 8 define the x-axis and y-axis in function on the parametric
    array V.

    - Line 9 defines the z-axis in function on the parametric array U.

    - From line 10 to line 13 set and show the surface (see execution in Figure 12-4).


    ### Code and execute


    ```python

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(-np.pi,5*np.pi,100)

    4. v = np.linspace(-3*np.pi/2,0,50)

    5. U, V = np.meshgrid(u,v)

    6. r = U + 3*np.sin(U)**3

    7. X = r * np.cos(V)

    8. Y = r * np.sin(V)

    9. Z = U

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''rdylbu'', showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(title=''Cup'',autosize=False)

    13. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_196_0.png)


    Figure 12-4. Cup model based on surface of revolution.


    > **TIP:** Note that the previous surface of revolution was modeled defining the
    parameter $v = -3\pi/2...0$, in which is obtained a fraction of the surface of
    revolution. If you want to model the completed surface of revolution you must
    define the parameter $v = 0...2\pi$. to obtain all around.


    ### Example: Ball of American football


    Next, we model a ball of American football by means a surface of revolution, which
    is rotated about the $y$-axis (see Equation 12-3).


    Equation 12-3


    $$s: \begin{cases} r = (\sqrt{(1 - u^2)}) - 2\pi/10 \\ x = r \cos(v) \\ y = u
    \\ z = r \sin(v) \end{cases} ; \text{ with } u = -\pi/4...\pi/4, v = 0...2\pi$$


    Note that the equation to describe the surface of revolution (Equation 12-3) is
    like the curve modeled earlier in section 7.2 (Equation 7-5). Indeed, the curve
    in Equation 7-5 is the *surface profile* (see Figure 7-5) for Equation 12-3. In
    order get the surface of revolution, we only must define the radius function,
    modify the *x* and *z* axes (multiplying by the trigonometric functions *cos(v)*
    and *sin(v)*, respectively), and add the *y*-axis by expanding it by the parameter
    *u*.


    The following code models the Ball of American football. Line 1 and line 2 import
    libraries. Line 3 and line 4 define the parameters *u* and *v*. Line 5 defines
    the parametric arrays *U* and *V*. Line 6 define the radius in function on the
    parametric array *U*, which is the surface profile. Line 7 and line 9 define the
    *x*-axis and *z*-axis in function on the parametric array *V*. Line 8 defines
    the *y*-axis in function on the parametric array *U*. From line 10 to line 13
    set and show the surface (see execution in Figure 12-5).


    ### Code and execute


    ```python

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(-np.pi/4,np.pi/4,50)

    4. v = np.linspace(0,2*np.pi,20)

    5. U, V = np.meshgrid(u,v)

    6. r = np.sqrt(1-U**2)-2*np.pi/10

    7. X = r * np.cos(V)

    8. Y = U

    9. Z = r * np.sin(V)

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z, opacity=1,colorscale = ''red'', showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(title=''Ball of American football'',autosize=False)

    13. fig.show()

    ```'
