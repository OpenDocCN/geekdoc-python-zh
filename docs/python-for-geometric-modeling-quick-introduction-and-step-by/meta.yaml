    curve in 3D.


    ## Example: Surface of revolution using the parametric curve in 3D


    Next, we model a surface of revolution defined by a twisted cubic curve in 3D.
    The twisted cubic curve is expressed as $x = u, y = u^2$, and $z = u^3$. The surface
    is rotated around the z-axis; thus, the trigonometric functions ($\cos(v)$ and
    $\sin(v)$) are defined on the x-y plane (see Equation 12-5).


    ## Equation 12-5


    $$s: \begin{cases} x = u \cos(v) \\ y = u^2 \sin(v) \\ z = u^3 \end{cases} ; \text{
    with } u = -10...10, v = -3\pi/2...0$$


    The following code models the surface of revolution defined by the twisted cubic
    curve. Line 1 and line 2 import libraries. Line 3 and line 4 define the parameters
    $u$ and $v$. Line 5 defines the parametric arrays $U$ and $V$. The first term
    of line 6, line 7, and line 8 is the twisted cubic curve defined as a function
    of the parametric matrix $U$. The last term of line 6 and line 7 is a function
    of the parametric matrix $V$, and defines the revolution of the surface. Line
    9 to line 12 set and show the surface (see execution in Figure 12-7).


    ## Code and execute


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(-10,10,100)

    4. v = np.linspace(-3*np.pi/2,0,50)

    5. U, V = np.meshgrid(u,v)

