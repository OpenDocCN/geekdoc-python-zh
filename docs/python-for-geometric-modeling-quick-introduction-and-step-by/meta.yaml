    $$

    s: \begin{cases}

    x = f_1(u,v) \cos(u) \cos(v) \\

    y = f_2(u,v) \sin(u) \cos(v) \\

    z = f_3(u,v)

    \end{cases} ; \text{ 其中 } u = u_0...u_n, v = v_0...v_m

    $$


    其中$x$, $y$, 和$z$是完全用输入参数$u$表示的输出变量，即$x = f_1(u,v) \cos(u) \cos(v)$, $y = f_2(u,v)
    \sin(u) \cos(v)$, 和$z = f_3(u,v)$。


