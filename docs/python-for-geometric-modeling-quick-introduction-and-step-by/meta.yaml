    Great effort has been made to prepare this book and to ensure the information''s
    accuracy. However, the information contained in this book is sold without warranty,
    either express or implied. Neither the author nor its distributors shall be liable
    for any damages this book caused or allegedly directly or indirectly.


    **Technical Editor:** Camilo Herrera Arcila.


    **First edition:** March 2024.


    > With heartfelt gratitude to Laura and Angélica, whose unwavering support and
    patience have been my pillars of strength.

    - Ronald Martinod


    > To my wonderful sister, Juliana.

    - Daniel Correa


    > To my family for their unconditional support.

    - Paola Vallejo


    # Contributors


    ## About the authors


    **Ronald M. Martinod** has been an associate professor at Universidad EAFIT since
    2015. He completed his education in mechanical engineering and later obtained
    a Ph.D. from the University of Lorraine (France) in the School of Computer Science
    and Mathematics Engineering. He gained experience working on research projects
    that support organizations in optimizing maintenance policies and the operation
    of urban transport networks.


    **Daniel Correa** is a professor, researcher, software developer, and author of
    multiple programming books. He has a Ph.D. in Computer Science and is a professor
    at Universidad EAFIT in Medellin, Colombia. He has been a teacher for over ten
    years and coordinates programming courses. He is interested in software architectures,
    frameworks (such as Laravel, Nest, Django, Express, Vue, React, and Angular),
    web development, and clean code. Follow Daniel on Twitter at **@danielgarax**.


    **Paola Vallejo** is a teacher and researcher. She has a Ph.D. in Computer Science.
    She currently works at Universidad EAFIT in Medellin, Colombia, where she teaches
    basic programming and software engineering courses. She has been a teacher for
    more than seven years. She is interested in topics related to software architectures,
    software design, and clean code.


    ## About the technical editor


    **Camilo Herrera** is a sound engineer with an MSc in Engineering, whose focus
    lies in data science and software development. His research is conducted in the
    field of industrial maintenance, where he dedicates himself to creating robust
    numerical tools and digital solutions to support decision-making. Currently, he
    serves as an adjunct professor of Python programming fundamentals.


