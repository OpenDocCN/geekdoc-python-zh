    +   - In line 8, we use the *update_layout* function to add the title and size
    for the chart, and you can define the chart size by varying the value for the
    *autosize* attribute.

    - In line 8, we show the figure on the screen (see Figure 6-1 ①).


    # Code and execute


    ```

    1. import plotly.express as px

    2. import numpy as np

    3. x = np.array([0,6,10,-3,-2])

    4. y = np.array([0,1,5,7,4])

