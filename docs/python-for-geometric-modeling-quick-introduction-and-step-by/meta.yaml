    ## 12.4. Surfaces of revolution based on a closed parametric curve


    We can model a surface of revolution from a closed parametric curve *c*, which
    will be the *surface profile*, obtaining a ring (called *toroid* or *torus*) with
    a cross section according to the shape of the curve *c* (see Figure 12-8). This
    *torus* is obtained when the closed parametric curve *c* is shifted a distance
    *R* regarding to the *axis of symmetry* and is rotated using trigonometric functions
    (*cos(v)* and *sin(v)*). For example, Equation 12-6 shows a *torus* rotated around
    the *z*-axis. First, a distance *R* is defined. Then, the radius of the *surface
    profile* is expressed as a function of parameter *u*, *r = f(u)*. Later, the *x*
    and *y* axes are defined by means a trigonometric expression (*r cos(u)*) and
    the term *R* is used to shift the *surface profile* regarding to the *symmetry
    axis*. Finally, *y*-axis is defined by the expression (*r sin(u)*).


    ## Equation 12-6


    $$s: \begin{cases} R = k \\ r = f(u) \\ x = (R + r \cos(u)) \cos(v) \\ y = (R
    + r \cos(u)) \sin(v) \\ z = r \sin(u) \end{cases} ; \text{ with } u = u_0...u_n,
    v = v_0...v_m$$


    Where $k$ represents the shift distance regarding the *axis of symmetry*, and
    it is a scalar number.


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_203_0.png)


    Figure 12-8. Conceptualization of ring based on a parametric curve in 3D.


    ## Example: Ring with star-shape transversal section


    Next, we model a *torus* with star-shape cross section, which is rotated about
    the z-axis; thus, the trigonometric functions (*cos(v)* and *sin(v)*) are defined
    on the x-y plane (see Equation 12-7).


    **Equation 12-7**


    $$s : \begin{cases} R = 5 \\ r = 2 + \sin(5u) \\ x = (R + r \cos(u)) \cos(v) \\
    y = (R + r \cos(u)) \sin(v) \\ z = r \sin(u) \end{cases} ; \text{ with } u = 0...2\pi,
    v = -3\pi/2...0$$


    Note that the radius r used in Equation 12-7 is the same used in Equation 7-11;
    therefore, the cross section for the torus will be the same shown in Figure 7-11
    (i.e., outline of Patrick Star). The trigonometric terms (cos(u) and sin(u)) in
    the x, y, and z axes define the surface profile of the torus. The trigonometric
    terms (cos(v) and sin(v)) in the x, y, and z axes define revolution for the torus.


    The following code shows the torus with star-shape cross section. Line 1 and line
    2 import libraries. Line 3 and line 4 define the parameters u and v. Line 5 defines
    the parametric arrays U and V. Line 6 defines the R value, which is the shift
    distance for the cross section. Line 7 defines r, which is the surface profile.
    Line 8 to line 10 define the x, y, and z axes, respectively. Line 11 to line 14
    set and show the surface (see execution in Figure 12-8).


    ## Code and execute


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,2*np.pi,100)

    4. v = np.linspace(0,-np.pi,20)

    5. U, V = np.meshgrid(u,v)

    6. R = 6

    7. r = 2 + np.sin(5*U)

    8. X = (R + (r * np.cos(U))) * np.cos(V)

    9. Y = (R + (r * np.cos(U))) * np.sin(V)

    10. Z = r * np.sin(U)

    11. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''rdylgn'', showscale=False,

    12.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    13. fig.update_layout(title=''Ring with star-shape cross section'',autosize=False)

    14. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_205_0.png)


    > **TIP:** If you model a surface of revolution denoted as *r* equal to a scalar
    number, *R* > 2*r*, *x* = (*R* + *r* cos(*u*)) cos(*v*), *y* = (*R* + *r* cos(*u*))
    sin(*v*), and *z* = *r* sin(*u*), the obtained surface is a torus with circular
    cross section.


