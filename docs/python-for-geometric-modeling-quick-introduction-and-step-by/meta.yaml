    ## 12.3. Surfaces of revolution based on parametric curves in 3D


    Surfaces of revolution based on a 3D parametric curve are obtained when the *surface
    profile* is expressed as a 3D curve defined by the parameter $u$ (as we learned
    in Chapter 7), which is rotated around an *axis of symmetry* using trigonometric
    functions ($\cos(v)$ and $\sin(v)$). For example, Equation 12-4 shows a surface
    of revolution defined by a parametric curve that is rotated around the z-axis
    (see Figure 12-6).


    Equation 12-4


    $$s: \begin{cases} x = f_1(u) \cos(v) \\ y = f_2(u) \sin(v) \\ z = f_3(u) \end{cases}
    ; \text{ with } u = u_0 \dots u_n, v = v_0 \dots v_m$$


