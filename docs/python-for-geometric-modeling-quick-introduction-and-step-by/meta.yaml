    \ 11.1. What is Extruded Surfaces?\n\n**Extruded surfaces** are a type of geometric\
    \ shape that results from extending a 2D curve (called *profile*) along a specified\
    \ direction to create a 3D surface. In the context of CAD and computer graphics,\
    \ extruded surfaces are often used to model 3D surfaces by extending 2D shapes\
    \ in a linear direction. Therefore, it provides a simple method for creating three-dimensional\
    \ surfaces from a two-dimensional curve.\n\nExtruded surfaces just combines the\
    \ concept of parametric curves and surfaces. The modeling of extruded surfaces\
    \ is performed in two stages: (i) modeling of a parametric curve using the parameter\
    \ $u$ and (ii) vertical expansion of the curve using the parameter $v$.\n\nExtruded\
    \ surfaces can be modeled based on a parametric curve in 2D or a parametric curve\
    \ in 3D as well. In the following, we will explain both modeling methods.\n\n\
    ## 11.2. Extruded surfaces based on a parametric curve in 2D\n\n### Constant extrude\
    \ height\n\nWe know a parametric curve in 2D is defined by means of a set of points\
    \ $(p_0, p_1, ..., p_i, ..., p_n)$, which can be expressed by means of two functions,\
    \ one function $f_1(u)$ to get the $x$ values and another function $f_2(u)$ to\
    \ get the $y$ values (see Figure 11-1); later, the expression $z = v$ is used\
    \ to get the $z$ values as the high of the extruded surface (see Equation 11-1).\n\
    \n**Equation 11-1**\n\n$s: \\begin{cases} x = f_1(u) \\\\ y = f_2(u) \\\\ z =\
    \ v \\end{cases} ; \\text{ with } u = u_0...u_n, v = v_0...v_m$\n\n![](img/f66d0ac198ad4ed7b9ada3efb976375f_166_0.png)\n\
    \nFigure 11-1. Conceptualization of extruded surfaces based on a parametric curve\
    \ in 2D.\n\n### Example: Constant extrude height of explicit curve\n\nWe use implicit\
    \ notation to model a curve on the plane x-y, which is defined by the parameter\
    \ u, and the z-axis defines the height of the extruded surface from the parameter\
    \ v (see Equation 11-2).\n\n**Equation 11-2**\n\n```\ns : \n\\begin{cases} \n\
    x = u \\\\\ny = \\log_{10}(u) \\sin(u^2) + 1 \n\\end{cases} \\quad ; \\text{with\
    \ } u = 1...5, v = 0...6\n```\n\n$z = v$\n\nNote that the equation to describe\
    \ the curve on the x-y plane (Equation 11-2) is like the curve modeled previously\
    \ in section 7.2 (see Equation 7-4). In order to extrude the curve, we only must\
    \ add the z-axis by expanding it by the parameter v. We show both models together:\
    \ (i) Figure 11-3, a trigonometric curve in 2D, and (ii) Figure 11-4, an extruded\
    \ surface from the trigonometric curve in 2D. You can see the same curve in both\
    \ models.\n\nIn order to explain the process of the model in detail, we will initially\
    \ define the parameter u using just three elements u = [0, 1, 2], and the parameter\
    \ v is just defined by four elements: v = [1, 2, 3, 4] (see Figure 11-2); then,\
    \ the parametric model will have twelve points ($p_{0,0}, p_{1,0}, p_{2,0}, p_{0,1},\
    \ p_{1,1}, p_{2,1}, p_{0,2}, p_{1,2}, p_{2,2}, p_{0,3}, p_{1,3}, p_{2,3}$).\n\n\
