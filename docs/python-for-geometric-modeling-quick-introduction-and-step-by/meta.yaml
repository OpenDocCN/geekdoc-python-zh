    # ## 8.1. Definition of parametric curves in 3D


    A **parametric curve *c* in 3D** is defined by a set of points $(p_0, p_1, ...,
    p_i, ..., p_n)$. Each point $p_i$ within this set is composed of three elements
    $(x(u), y(u), z(u))$. The set of points is determined by three functions with
    respect to the parameter $u$ (see Figure 8-1). The parameter $u$ is an independent
    variable (input), while $x$, $y$, and $z$ are dependent variables (outputs). As
    the parameter $u$ increases, the values of $x(u)$, $y(u)$, and $z(u)$ trace out
    a path along a plane curve. A parametric curve $c$ in'
  merge: -1
