    - 用于**轨道**（见图 E10-7）。\n\n在下一章中，我们将学习如何建模三维参数曲面的一个特例：拉伸曲面。\n\n# 第 11 章 – 特例：拉伸曲面\n\
    \n在前面的章节中，我们学习了三维参数曲面。本章将解释三维参数曲面的一个特例，称为拉伸曲面。\n\n接下来，我们将涵盖以下部分：\n\n1. 什么是拉伸曲面？\n\
    2. 基于二维参数曲线的拉伸曲面\n3. 基于三维参数曲线的拉伸曲面\n4. 快速项目。\n5. 练习。\n\n本章开发的代码位于 [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-11](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-11)。我们建议你通过独立开发代码来提升编码技能。如果遇到任何问题，可以参考仓库中的代码进行对比。\n\
    \n请记住，我们建议你为本书的每一章创建一个新的 Colab 文档。这将有助于你保持代码的组织性。\n\n## 11.1. 什么是拉伸曲面？\n\n**拉伸曲面**是一种几何形状，它通过将一条二维曲线（称为*轮廓*）沿指定方向延伸而形成三维曲面。在\
    \ CAD 和计算机图形学的背景下，拉伸曲面通常用于通过沿线性方向延伸二维形状来建模三维曲面。因此，它提供了一种从二维曲线创建三维曲面的简单方法。\n\n\
    拉伸曲面结合了参数曲线和曲面的概念。拉伸曲面的建模分两个阶段进行：(i) 使用参数 $u$ 建模参数曲线，以及 (ii) 使用参数 $v$ 对曲线进行垂直扩展。\n\
    \n拉伸曲面既可以基于二维参数曲线建模，也可以基于三维参数曲线建模。下面，我们将解释这两种建模方法。\n\n## 11.2. 基于二维参数曲线的拉伸曲面\n\
    \n### 恒定拉伸高度\n\n我们知道，二维参数曲线由一组点 $(p_0, p_1, ..., p_i, ..., p_n)$ 定义，这可以通过两个函数来表示：一个函数\
    \ $f_1(u)$ 用于获取 $x$ 值，另一个函数 $f_2(u)$ 用于获取 $y$ 值（见图 11-1）；然后，表达式 $z = v$ 用于获取 $z$\
    \ 值作为拉伸曲面的高度（见方程 11-1）。\n\n**方程 11-1**\n\n$s: \\begin{cases} x = f_1(u) \\\\ y\
    \ = f_2(u) \\\\ z = v \\end{cases} ; \\text{ 其中 } u = u_0...u_n, v = v_0...v_m$\n\
    \n![](img/f66d0ac198ad4ed7b9ada3efb976375f_166_0.png)\n\n图 11-1. 基于二维参数曲线的拉伸曲面概念图。\n\
    \n### 示例：显式曲线的恒定拉伸高度\n\n我们使用隐式表示法在 x-y 平面上建模一条曲线，该曲线由参数 u 定义，z 轴定义拉伸曲面的高度，由参数\
    \ v 控制（见方程 11-2）。\n\n**方程 11-2**\n\n```\ns : \n\\begin{cases} \nx = u \\\\\ny\
    \ = \\log_{10}(u) \\sin(u^2) + 1 \n\\end{cases} \\quad ; \\text{其中 } u = 1...5,\
    \ v = 0...6\n```\n\n$z = v$\n\n请注意，描述 x-y 平面上曲线的方程（方程 11-2）类似于之前在 7.2 节中建模的曲线（见方程\
