    以下代码对 $r = u^2$ 的螺旋进行建模。


    - 第 1 行和第 2 行分别导入数学库和绘图库。

    - 第 3 行创建参数 $u$ 为一个包含 $1000$ 个元素的数组，范围从 $0$ 到 $16\pi$。

    - 第 4 行定义一个变量半径。

    - 第 5 行和第 6 行根据参数 u 定义 x 轴和 y 轴。

    - 第 7 到 10 行设置并显示螺旋 c（执行结果见图 7-11）。


    ## 代码与执行


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(0,16*np.pi,1000)

    4. r = u**2

    5. x = r * np.cos(u)

    6. y = r * np.sin(u)

    7. fig = px.line(x=x,y=y)

    8. fig.update_traces(line_color=''black'',line_width=4)

    9. fig.update_yaxes(scaleanchor="x",scaleratio=1)

    10. fig.show()

    ```


    **快速讨论：** 使用 *linspace* 函数，你可以为参数 *u* 创建不同数量的元素。如果你将参数 *u* 创建为一个包含少量元素的数组，你将得到一条有棱角的曲线；但如果你将参数
    *u* 创建为一个包含大量元素的数组，你将得到一条平滑的曲线。


    ## 示例：派大星（*海绵宝宝*的朋友）


    以下代码展示了另一个使用显式表示法和可变半径 *r* 在二维中建模参数化星形曲线 *c* 的示例（见方程 7-11）。


    | 方程 7-11 |

    | :--- |

    | $c: \begin{cases} r = 2 + \sin(5u) \\ x = r \cos(u) \\ y = r \sin(u) \end{cases}
    \quad ; \text{其中 } u = 0...2\pi$ |


    以下代码对参数化星形曲线进行建模。


    - 第 1 行和第 2 行分别导入数学库和绘图库。

    - 第 3 行创建参数 $u$ 为一个包含 $100$ 个元素的数组，范围从 $0$ 到 $2\pi$。

    - 第 4 行定义一个变量半径。第 5 行和第 6 行将 $x$ 轴和 $y$ 轴定义为参数 $u$ 的函数。

    - 第 5 行和第 6 行根据参数 $u$ 定义 $x$ 轴和 $y$ 轴。

    - 最后，第 7 到 10 行设置并显示圆 $c$（执行结果见图 7-12，它类似于*海绵宝宝*的无条件朋友*派大星*的轮廓）。


    ## 代码与执行


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(0,2*np.pi,100)

    4. r = 2 + np.sin(5*u)

    5. x = r * np.cos(u)

    6. y = r * np.sin(u)

    7. fig = px.line(x=x,y=y)

    8. fig.update_traces(line_color=''fuchsia'',line_width=5)

    9. fig.update_yaxes(scaleanchor="x",scaleratio=1)

    10. fig.show()

    ```


    图 7-12. 花形曲线（*派大星*的轮廓）。


    ## 7.4. 快速项目


    你知道*利萨如*曲线吗？*利萨如*曲线在物理学和天文学等科学领域有应用；此外，它们还被用于光学、成像、天线扫描、机械加工和移动机器人等各种工程应用中。*利萨如*曲线用于实验测试，以确定一个设备是否可以被恰当地归类为忆阻器（一种关联电荷和磁通链的非线性两端电气元件）。它也用于比较两个不同的电信号：一个已知的参考信号和一个待测信号。


    *利萨如*曲线属于由以下形式描述的曲线族（见方程 7-12）。


    方程 7-12


    $$

    c : \begin{cases} x = A \sin(a u + \delta) \\ y = B \sin(b u) \end{cases} \quad
    ; \text{其中 } u = 0...2\pi

    $$


    如果我们使用不同的参数值，我们会得到有趣的几何结果：


    - 使用参数 $a = 1$ 和 $\delta = 0$ 来建模直线。

    - 使用参数 $A = B, a = 1$ 和 $\delta = \pi/2$ 来建模圆。

    - 使用参数 $A \neq B, a = 1$ 和 $\delta = \pi/2$ 来建模椭圆。

    - 使用参数 $a = 12$ 和 $\delta = \pi/2$ 来建模抛物线的一段。


    在流行文化中，*利萨如*曲线有时被用于科幻系列和电影中模拟高科技设备；它们有时在平面设计中用作标志。*WhatsApp* 重新品牌为 *Meta Platforms*
    也是一个*利萨如*曲线，呼应了大写字母 *M* 的形状（使用参数：$A = 1, a = 1, B = 0.6, b = -2, \delta = \pi/20$）；该公司拥有并运营
    *Facebook*、*Instagram*、*Threads* 和 *WhatsApp* 等产品和服务。*Meta* 是全球最有价值的公司之一，也是十大上市公司之一。它被认为是五大信息技术公司之一，与
    *Google* 的母公司 *Alphabet*、*Amazon*、*Apple* 和 *Microsoft* 并列。


    ## 让我们建模 *Meta* 公司标志


    我们现在将展示如何根据本章获得的概念来建模 *Meta* 平台标志。以下代码展示了如何建模 *Meta* 公司标志（执行结果见图 7-13）。


    - 在第 1 行和第 2 行，我们分别导入数学库和绘图库。

    - 在第 3 行，我们自动创建一个包含 $5000$ 个元素的单行数组，范围从 $0$ 到 $2\pi$。

    - 第 4 到 8 行，我们定义 *Meta Platforms* 公司标志的参数。

    - 在第 9 行和第 10 行，我们使用参数 $u$ 将 $x$ 轴和 $y$ 轴定义为利萨如曲线。

    - 最后，第 11 到 14 行，我们创建、设置并显示绘制参数曲线的图表。


    ## 代码与执行


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(0,2*np.pi,5000)

    4. A = 1

    5. a = 1

    6. B = 0.6

    7. b = -2

    8. delta = np.pi/20

    9. x = A * np.sin(a*u + delta)

    10. y = B * np.sin(b*u)

    11. fig = px.line(x=x,y=y)

    12. fig.update_traces(line_color=''blue'',line_width=30)

    13. fig.update_yaxes(scaleanchor="x",scaleratio=1)

    14. fig.show()

    ```


    图 7-13. 利萨如曲线（*Meta* Platforms 标志）。


    > **提示：** 如果你想进一步探索*利萨如*曲线，我们建议你查看这些链接：[https://www.math.unipd.it/~erb/Lissajous.html](https://www.math.unipd.it/~erb/Lissajous.html)
    和 [https://www.wikiwand.com/en/Lissajous_curve](https://www.wikiwand.com/en/Lissajous_curve)。你将了解它们的属性，并找到示例和应用来提升你的潜力。


    ## 7.5. 练习


    **E7.1.** 绘制并匹配以下二维参数曲线（使用显式表示法）与对应的图形。


