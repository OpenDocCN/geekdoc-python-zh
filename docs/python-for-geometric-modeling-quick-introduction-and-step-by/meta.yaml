    ## 9.1. Definition of parametric surfaces in 2D


    A **parametric surface *s* in 2D** is defined using a set of points $(p_{0,0},
    p_{0,1}, \dots, p_{i,j}, \dots, p_{n,m})$; thus, the point $p_{i,j}$ is formed
    by two elements $(x(u,v), y(u,v))$. The set of points is defined from two functions
    with two parameters ($u$ and $v$) (see Figure 9-1). The parameters ($u, v$) are
    the independent variables (inputs) that both $x$ and $y$ depend on (outputs),
    and as the parameters increase, the values of $x(u,v)$ and $y(u,v)$ trace out
    a path along a plane surface. A parametric surface $s$ in 2D describes the relationship
    between a set of points, which can be expressed by means of two functions, one
    function $f_1(u,v)$ to get the $x$ values and another function $f_2(u,v)$ to get
    the $y$ values (see Equation 9-1).


    ### Equation 9-1


    $$s: \begin{cases} x = f_1(u,v) \\ y = f_2(u,v) \end{cases} ; \text{ with } u
    = u_0...u_n, v = v_0...v_m$$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_110_0.png)


    Figure 9-1. Conceptualization of parametric surface in 2D.


    ## 9.2. How does *meshgrid* works?


    The parameter $u$ can only have values along a number line (from $-u$ to $+u$).
    Similarly, the parameter $v$ can only have values along a number line (from $-v$
    to $+v$). The combination of the values of these two parameters marks an ordered
    pair $(u_i, v_i)$. The set of ordered pairs defines a *meshgrid* on which the
    surface will be modeled.


    ### Modeling a four-element meshgrid surface


    Next, we use a parametric expression to describe a surface $s$ in 2D, which is
    stated as (see Equation 9-2)


    $$s: \begin{cases} x = 2u + v \\ y = u + v^2 \end{cases} ; \text{with } u = [1,
    2], v = [3, 4]$$


    In this case, the parameter $u$ is defined by two elements: $u = [1,2]$, and the
    parameter $v$ is also defined by two elements: $v = [3,4]$; then, as the meshgrid
    is defined by the combination of the elements belong to the parameters, this meshgrid
    is set by four ordered pairs $((1,3), (2,3), (1,4), \text{and } (2,4))$, i.e.,
    four points (see figure 9-2) as follows:


    $$meshgrid = \begin{bmatrix} (u_0, v_0) & (u_1, v_0) \\ (u_0, v_1) & (u_1, v_1)
    \end{bmatrix} = \begin{bmatrix} (1,3) & (2,3) \\ (1,4) & (2,4) \end{bmatrix}$$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_112_0.png)


    In order to simplify the notation of the meshgrid, we group its ordered pairs:
    in one group for the $u$ terms and another group for the $v$ terms. Thus, we obtain
    two arrays ($U$ and $V$), each array consisting of two rows and two columns as
    follows:


    $$U = \begin{bmatrix} u_0 & u_1 \\ u_0 & u_1 \end{bmatrix} = \begin{bmatrix} 1
    & 2 \\ 1 & 2 \end{bmatrix} ; \quad V = \begin{bmatrix} v_0 & v_0 \\ v_1 & v_1
    \end{bmatrix} = \begin{bmatrix} 3 & 3 \\ 4 & 4 \end{bmatrix}$$


    **Quick discussion:** Note that, for clarity, the distribution of elements ($u_0$,
    $u_1$, $v_0$, and $v_1$) in the above analyses and Figure 9-2 is the same.


    $U$ and $V$ contain the parameters ($u$ and $v$) in multi-dimensional arrays;
    thus, they can be easily evaluated on the parametric functions ($f_1$ and $f_1$)
    defined on the surface.


