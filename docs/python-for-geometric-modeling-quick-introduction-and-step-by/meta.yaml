    在下一章中，我们将学习建模三维参数曲面的另一种特殊情况：旋转曲面。


    ## 第 12 章 – 特殊情况：旋转曲面


    在前面的章节中，我们学习了三维参数曲面以及作为特殊情况的拉伸曲面。本章将解释第二种特殊情况，称为旋转曲面。


    接下来，我们将涵盖以下部分：


    1.  什么是旋转曲面？

    2.  基于参数半径的旋转曲面。

    3.  基于三维参数曲线的旋转曲面。

    4.  基于封闭参数曲线的旋转曲面。

    5.  快速项目。

    6.  练习。


    本章开发的代码位于 [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-12](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-12)。我们建议您通过独立开发代码来提升编码技能。如有任何问题，可以参考仓库中的代码进行对比。


    请记住，我们建议您为本书的每一章创建一个新的 Colab 文档。这将有助于您保持代码的条理性。


    ### 12.1. 什么是旋转曲面？


    **旋转曲面**是可以建模为轴对称曲面的曲面，它们是通过将一条曲线 *c*（称为*曲面轮廓线*）绕一个*旋转轴*旋转而获得的。旋转曲面是通过将曲线 *c*
    绕旋转轴（称为**对称轴**）旋转给定角度（称为**旋转角**）而生成的。例如，给定一个绕 z 轴旋转的轴对称模型，其参数表示由位于 x-z 或 y-z 平面上的连续*曲面轮廓线*表达，这些平面垂直于其*旋转轴*（见图
    12-1）。


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_191_0.png)


    我们可以考虑另一个例子，其中*曲面轮廓线*绕 y 轴旋转。其参数表示由位于 x-y 或 y-z 平面上的连续*曲面轮廓线*表达（见图 12-2）。


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_192_0.png)


    图 12-2. 绕 y 轴轴对称的旋转曲面概念图。


    旋转曲面由*曲面轮廓线*建模而成，该轮廓线可以由参数半径、三维参数曲线或参数封闭曲线表示。下面我们将解释这些建模方法。


    ### 12.2. 基于参数半径的旋转曲面


    当*曲面轮廓线*表示为半径函数 $r = f(u)$（见公式 12-1），定义在平面（$x-y$、$x-z$ 或 $y-z$）上，并使用三角函数（$cos(v)$
    和 $sin(v)$）绕轴旋转时，即可获得基于参数半径的旋转曲面（见图 12-3）。


    公式 12-1


    $$s: \begin{cases} r = f(u) \\ x = r \cos(v) \\ y = r \sin(v) \\ z = u \end{cases}
    ; \text{ 其中 } u = u_0 \dots u_n, v = v_0 \dots v_m$$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_193_0.png)


    ### 示例：基于旋转曲面的杯子模型


    接下来，我们定义一个半径函数来描述*曲面轮廓线*，以获得绕 z 轴旋转的旋转曲面，该函数由公式 12-2 给出。


    ### 公式 12-2


    $$s: \begin{cases} r = u + 3 \sin^3(u) \\ x = r \cos(v) \\ y = r \sin(v) \\ z
    = u \end{cases} ; \text{ 其中 } u = -\pi...5\pi, v = -3\pi/2...0$$


    请注意，描述旋转曲面的方程（公式 12-2）类似于之前在 6.2 节（公式 6-7）中建模的曲线。实际上，公式 6-7 中的曲线就是公式 12-2 的*曲面轮廓线*（见图
    6-7）。为了获得旋转曲面，我们只需定义半径函数，修改 x 轴和 y 轴（分别乘以三角函数 cos(v) 和 sin(v)），并通过参数 u 扩展 z 轴。


    以下代码对旋转曲面进行建模。


    -   第 1 行和第 2 行导入库。

    -   第 3 行和第 4 行定义参数 u 和 v。

    -   第 5 行定义参数数组 U 和 V。

    -   第 6 行定义基于参数数组 U 的半径函数，即曲面轮廓线。

    -   第 7 行和第 8 行定义基于参数数组 V 的 x 轴和 y 轴。

    -   第 9 行定义基于参数数组 U 的 z 轴。

    -   第 10 行到第 13 行设置并显示曲面（执行结果见图 12-4）。


    ### 代码与执行


    ```python

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(-np.pi,5*np.pi,100)

    4. v = np.linspace(-3*np.pi/2,0,50)

    5. U, V = np.meshgrid(u,v)

    6. r = U + 3*np.sin(U)**3

    7. X = r * np.cos(V)

    8. Y = r * np.sin(V)

    9. Z = U

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''rdylbu'', showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(title=''Cup'',autosize=False)

    13. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_196_0.png)


    图 12-4. 基于旋转曲面的杯子模型。


    > **提示：** 请注意，前面的旋转曲面是通过定义参数 $v = -3\pi/2...0$ 建模的，这得到了旋转曲面的一部分。如果您想建模完整的旋转曲面，必须定义参数
    $v = 0...2\pi$，以获得完整的旋转。


    ### 示例：美式橄榄球


    接下来，我们通过旋转曲面来建模一个美式橄榄球，该曲面绕 $y$ 轴旋转（见公式 12-3）。


    公式 12-3


    $$s: \begin{cases} r = (\sqrt{(1 - u^2)}) - 2\pi/10 \\ x = r \cos(v) \\ y = u
    \\ z = r \sin(v) \end{cases} ; \text{ 其中 } u = -\pi/4...\pi/4, v = 0...2\pi$$


    请注意，描述旋转曲面的方程（公式 12-3）类似于之前在 7.2 节（公式 7-5）中建模的曲线。实际上，公式 7-5 中的曲线就是公式 12-3 的*曲面轮廓线*（见图
    7-5）。为了获得旋转曲面，我们只需定义半径函数，修改 *x* 轴和 *z* 轴（分别乘以三角函数 *cos(v)* 和 *sin(v)*），并通过参数 *u*
    扩展 *y* 轴。


    以下代码对美式橄榄球进行建模。第 1 行和第 2 行导入库。第 3 行和第 4 行定义参数 *u* 和 *v*。第 5 行定义参数数组 *U* 和 *V*。第
    6 行定义基于参数数组 *U* 的半径函数，即曲面轮廓线。第 7 行和第 9 行定义基于参数数组 *V* 的 *x* 轴和 *z* 轴。第 8 行定义基于参数数组
    *U* 的 *y* 轴。第 10 行到第 13 行设置并显示曲面（执行结果见图 12-5）。


    ### 代码与执行


    ```python

    1. import numpy as np

    2. import plotly.graph_objects as go

