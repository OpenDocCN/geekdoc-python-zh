    # Python for Geometric Modeling: Quick Introduction and Step-by-Step Guide to
    CAD Applications


    by Ronald Martinod, Daniel Correa, and Paola Vallejo


    Copyright © 2024 by Ronald Martinod, Daniel Correa, and Paola Vallejo.


    All rights are reserved. No part of this book may be reproduced, stored in any
    system, or transmitted in any form or by any means without prior authorization
