    Based on the concepts obtained in the modeling of extruded surfaces, we model
    a fixed-wing aircraft for high-altitude commercial passengers, which has the following
    geometric wing values: $B = 2, T = 0.2, P = 1, C = 0.05, E = 1, R = 0$.


    The following code models the aircraft wing.


    +   - Lines 1 and 2 import libraries.

    - Lines 3 and 4 define the parameters $u$ and $v$.'
