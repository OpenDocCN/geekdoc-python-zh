    # ## 9.1. Definition of parametric surfaces in 2D


    A **parametric surface *s* in 2D** is defined using a set of points $(p_{0,0},
    p_{0,1}, \dots, p_{i,j}, \dots, p_{n,m})$; thus, the point $p_{i,j}$ is formed
    by two elements $(x(u,v), y(u,v))$. The set of points is defined from two functions
    with two parameters ($u$ and $v$) (see Figure 9-1). The parameters ($u, v$) are
    the independent variables (inputs) that both $x$ and $y$ depend on (outputs),
    and as the'
