    \ v）的组合定义；因此，U 和 V 有两个维度。这就是为什么我们可以说三维参数曲面将二维参数（u, v）映射到三坐标系（x, y, z）。\n\n三维参数曲面可以用显式和隐式表示法来表达。接下来，我们将概念化几何建模中的表示法和应用。\n\
