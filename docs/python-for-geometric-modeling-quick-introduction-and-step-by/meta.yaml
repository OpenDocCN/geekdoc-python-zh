  md: '# # Chapter 14 – Special case: Complex surfaces


    In the previous chapters, we learned parametric surfaces in 3D, and extruded surfaces,
    surfaces of revolution and polar-coordinate surfaces as special cases. This chapter
    will explain a fourth special case, which we will call complex surfaces.


    Next, we will cover the following sections:


    +   1. What is complex surface?

    2. Explicit notation for complex surfaces

    3. Implicit notation for complex surfaces

    4. Quick project.

    5. Exercises.


    The code developed for this chapter is located at [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-14](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-14).
    We recommend that you enhance your coding skills by independently developing the
    code. If there are any issues, you can refer to the code in the repository for
    comparison.


    Remember that we suggest you create a new Colab document for each book chapter.
    It will allow you to keep your codes organized.


    # ## 14.1. What is complex surface?


    We call **complex surfaces** those 3D surfaces that have a boundary defined by
    a borderline function. It uses a three-stage model process:'
  merge: -1
  pgno: 244
- img_proc: true
  md: '**Stage 1:** Use a set of basic parameters ($u_b$ and $v_b$) to build a *basic
    meshgrid* (see Figure 14-1). Thus, the *basic meshgrid* is composed by the ordered
    pairs as follows:


    **Analyze**


    ```

    $$basic\ meshgrid = \begin{bmatrix} (u_{b0},v_{b0}) & (u_{b0},v_{b1}) & \cdots
    & (u_{b0},v_{bm}) \ (u_{b1},v_{b0}) & (u_{b1},v_{b1}) & \cdots & (u_{b1},v_{bm})
    \ \vdots & \vdots & \ddots & \vdots \ (u_{bn},v_{b0}) & (u_{bn},v_{b1}) & \cdots
    & (u_{bn},v_{bm}) \end{bmatrix}$$

    ```


    **Stage 2:** Form the *basic meshgrid*, build a parametric surface in 2D for obtaining
    *final meshgrid* with a set of final parameters ($u_f$ and $v_f$), see Figure
    14-1. The set of points of the *final meshgrid* is defined from two functions
    with two parameters ($u_b$ and $v_b$). The *final meshgrid*, as a parametric surface
    $s$ in 2D, describes the relationship between a set of points, which can be expressed
    by means of two functions, one function $f_1(u_b, v_b)$ to get the $u_f$ values
    and another function $f_2(u_b, v_b)$ to get the $v_f$ values. Thus, the *final
    meshgrid* is composed by the ordered pairs as follows:


    **Analyze**


    ```

    $$final\ meshgrid = \begin{bmatrix} (u_{f0},v_{f0}) & (u_{f0},v_{f1}) & \cdots
    & (u_{f0},v_{fm}) \ (u_{f1},v_{f0}) & (u_{f1},v_{f1}) & \cdots & (u_{f1},v_{fm})
    \ \vdots & \vdots & \ddots & \vdots \ (u_{fn},v_{f0}) & (u_{fn},v_{f1}) & \cdots
    & (u_{fn},v_{fm}) \end{bmatrix}$$

    ```'
  merge: -1
  pgno: 245
- img_proc: true
  md: '**Spage 3:** Form the *final meshgrid*, build the parametric surface in 3D,
    which is defined by means of a set of points $(p_{0,0}, p_{0,1}, \dots, p_{i,j},
    \dots, p_{n,m})$; thus, the point $p_{i,j}$ is formed by two elements $(x(u_f,
    v_f), y(u_f, v_f), z(u_f, v_f))$. The set of points is defined from three functions
    with two parameters $(u_f$ and $v_f)$ (see Figure 14-1). In the stage 3, the surface
    is expressed by means of three functions, one function $f_3(u_f, v_f)$ to get
    the $x$ values, other function $f_4(u_f, v_f)$ to get the $y$ values, and the
    last function $f_5(u_f, v_f)$ to get the $z$ values.


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_246_0.png)'
  merge: -1
  pgno: 246
- img_proc: true
  md: 'Following the three stages, we obtain the complete expression of complex surfaces
    (see Equation 14-1).


    ```

    Equation 14-1

    $$

    \begin{aligned}

    s: \quad & u_f = f_1(u_b, v_b) \n& v_f = f_2(u_b, v_b) \n& x = f_3(u_f, v_f) \n&
    y = f_4(u_f, v_f) \n& z = f_5(u_f, v_f)

    \end{aligned}

    $$

    ```


    # 14.2. Explicit notation for complex surfaces


    The **explicit notation for complex surface** is an equation set where the dependent
    variable ($z$) can be explicitly written in terms of independent variables ($x$
    and $y$), in which these independent variables ($x$ and $y$) are defined as the
    *final meshgrid*, i.e., $x = u_f$ and $y = v_f$ (see Equation 14-2).


    ```

    Equation 14-2

    $$

    \begin{aligned}

    s: \quad & u_f = f_1(u_b, v_b) \n& v_f = f_2(u_b, v_b) \n& x = u_f \n& y = v_f
    \n& z = f_5(u_f, v_f)

    \end{aligned}

    ; \text{ with } u_b = u_{b0}\dots u_{bn}, v_b = v_{b0}\dots v_{bm}

    $$

    ```


