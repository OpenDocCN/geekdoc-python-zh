    Surfaces of revolution are modeled from *surface profile* that can be expressed
    by a parametric radius, parametric curves in 3D, or parametric closed curves.
    In the following we will explain these modeling methods.


    # 12.2. Surfaces of revolution based on parametric radius


    Surfaces of revolution based on a parametric radius are obtained when the *surface
    profile* is expressed as a radius function, $r = f(u)$ (see Equation 12-1) defined
    on a plane ($x-y$, $x-z$, or $y-z$) which is rotated about an axis using trigonometric
    functions ($cos(v)$ and $sin(v)$), see Figure 12-3.


    Equation 12-1'
