    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_180_1.png)\n\n## 11.4. 快速项目\n\n在航空学中，机翼是一种具有非常坚固且结构抗性的气动体，由翼型构成。飞机机翼是航空工程最伟大的成就之一。它将高效的结构和惊人的轻量化结合在一个部件中。\n\
    \n机翼是飞机的主要部件，其主要功能是确保升力，以补偿重量，即允许飞机保持稳定飞行。机翼的横截面几何形状（称为翼型）备受关注，因为它们具有不同的功能，例如维持飞行、提供飞机控制、提供起降能力、支撑发动机并传递其推力、储存燃料以及容纳灯光和信号装置。\n\
    \n飞机机翼的几何翼型（见图11-13）可以由以下二维参数曲线定义（见方程11-9）。\n\n![](img/f66d0ac198ad4ed7b9ada3efb976375f_181_0.png)\n\
    \n```\n方程 11-9\n\nc: x = 0.5 (1 + |cos(u)|^B/cos(u))\n   z = (T/2) (sin^B(u) /sin(u))\
