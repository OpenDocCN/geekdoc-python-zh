    detail, and pan and hover over data points to display additional information.


    ## 6.4. Raster images vs. vectorial graphics


    Unlike **raster images** (which are made of a grid of pixels and can lose quality
    when resized), **vectorial graphics** refers to a type of digital graphic made
    up of mathematical descriptions of shapes, lines, and curves rather than individual
    pixels. Unlike raster images, vectorial graphics retain their appearance regardless
    of size. They maintain their quality and scalability, and then they can be scaled
    infinitely, rotated, and panned.


    Since raster images are comprised of colored pixels arranged to form an image,
    they cannot be scaled without sacrificing quality. If you enlarge a raster, it
    will pixelate or become blurry. The lower its resolution (pixels-per-inch), the
    smaller the image must be to maintain quality. In contrast, the mathematical equations
    that form the foundations for vectors can be recalculated when an image is resized;
    thus, you can infinitely scale a vectorial graphic and maintain crisp, sharp edges.
    Vectorial graphics are the most common type of electronic chart. They provide
    a computer-generated representation of a chart and contain all the geometric information
    for modeling.


    Vectorial graphics are commonly used in various applications such as planimetry
    (mechanical engineering, design engineering, civil engineering, architecture),
    logos, illustrations, fonts, technical drawings, and scalable designs for print
    and web. They are highly versatile and are often created and edited using software
    like *Solid Works*, *CREO*, *AutoCAD*, *Adobe Illustrator*, *CorelDraw*, etc.


