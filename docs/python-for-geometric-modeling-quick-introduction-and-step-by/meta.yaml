    *Plotly Express* 相较于 Python 中的其他库具有一些优势：(i) 语法简单（读起来几乎像英语）；(ii) 提供广泛的可视化类型（或用于创建自定义可视化的工具）；(iii)
    自动调整坐标轴和颜色比例；(iv) 提供超过 30 种函数来可视化各种类型的数据；(v) 允许我们对图表进行无尽的自定义，使我们的绘图对他人更有意义且更易理解。


    *Plotly Express* 提供**矢量图形**，允许用户使用光标点击元素以获取更多信息，放大和缩小以获取更多细节，以及平移和悬停在数据点上以显示附加信息。


    ## 6.4. 光栅图像与矢量图形


    与**光栅图像**（由像素网格组成，调整大小时可能会损失质量）不同，**矢量图形**是指一种由形状、线条和曲线的数学描述而非单个像素组成的数字图形。与光栅图像不同，矢量图形无论大小如何都能保持其外观。它们保持其质量和可扩展性，因此可以无限缩放、旋转和平移。


    由于光栅图像是由排列成图像的彩色像素组成的，因此在不牺牲质量的情况下无法缩放。如果放大光栅图像，它会像素化或变得模糊。其分辨率（每英寸像素数）越低，为保持质量所需的图像尺寸就越小。相反，构成矢量基础的数学方程可以在调整图像大小时重新计算；因此，您可以无限缩放矢量图形并保持清晰、锐利的边缘。矢量图形是最常见的电子图表类型。它们提供了图表的计算机生成表示，并包含建模所需的所有几何信息。


    矢量图形通常用于各种应用，例如平面测量（机械工程、设计工程、土木工程、建筑）、标志、插图、字体、技术图纸以及用于印刷和网络的可扩展设计。它们用途广泛，通常使用
    *Solid Works*、*CREO*、*AutoCAD*、*Adobe Illustrator*、*CorelDraw* 等软件创建和编辑。


