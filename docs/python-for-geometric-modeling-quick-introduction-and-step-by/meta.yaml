  md: '# # Chapter 01 – Introduction


    While existing literature on geometric modeling for CAD applications often delves
    into abstract mathematical concepts like linear algebra, vector spaces, and topology,
    it may neglect the direct application of these theories to practical problem-solving.
    This book takes a distinctive approach by prioritizing the resolution of real-world
    challenges and the development of geometric modeling applications, using a structured
    and systematic approach. It emphasizes the utilization of fundamental and accessible
    mathematical concepts, ensuring that you can swiftly grasp the ideas presented
    and easily apply them. The main objective is to facilitate a direct and efficient
    learning experience for individuals seeking practical insights into geometric
    modeling for CAD.


    This chapter will explain the book''s design and how to use it effectively.


    Next, we will cover the following sections:


    +   1. Book chapters.

    2. How to read this book.

    3. Book repository.


    # ## 1.1. Book chapters


    This book is divided into 16 chapters. Here is a brief overview of what you can
    expect to learn in each chapter:


    +   - **Chapter 01 – Introduction.** Provides an overview of the book and its
    contents.

    - **Chapter 02 – Geometric Modelling.** Provides the context computational geometric
    modeling, its significance, and applications across different fields.

    - **Chapter 03 – Setting Colab.** Describes how to use Colab, a popular tool for
    coding in Python.'
  merge: -1
  pgno: 12
- img_proc: true
  md: '+   - **Chapter 04 – Introduction to *NumPy*.** Introduces the *NumPy* library
    and demonstrates how to operate mathematical expressions.

    - **Chapter 05 – Introduction to *Matplotlib*.** Demonstrates how to use *Matplotlib*
    to create raster images in Python.

    - **Chapter 06 – Introduction to *Plotly Express*.** Introduces *Plotly Express*
    module and demonstrates how to create vectorial graphics in Python.

    - **Chapter 07 – Parametric curves in 2D.** Introduces fundamental concepts of
    parametric curves. It also explains the elements for curves in 3D.

    - **Chapter 08 – Parametric curves in 3D.** Extends the concept of parametric
    curves to 3D

    - **Chapter 09 – Parametric surfaces in 2D.** Introduces fundamental concepts
    of parametric surfaces. It also explains the elements for surfaces in 2D.

    - **Chapter 10 – Parametric surfaces in 3D.** Extends the concept of parametric
    surfaces to 3D.

    - **Chapter 11 – Special case: Extruded surfaces.** Develops the concept of parametric
    extruded surfaces in 3D.

    - **Chapter 12 – Special case: Surfaces of revolution.** Develops the concept
    of parametric surfaces of revolution in 3D.

    - **Chapter 13 – Special case: Polar-coordinate surfaces.** Develops the concept
    of parametric surfaces in 3D based on the polar coordinate system.

    - **Chapter 14 – Special case: Complex surfaces.** Develops the concept of surface
    modeling to a higher level.

    - **Chapter 15 – Deploying models to the Cloud.** Develops the concept to deploy
    your models on the Cloud.

    - **Chapter 16 – Exercises solutions.** Contains the answer to the exercises proposed
    throughout the book.'
  merge: -1
  pgno: 13
- img_proc: true
  md: '# 1.2. How to read this book


    To make the most out of this book and improve your understanding of the concepts
    presented, we recommend following these suggestions:


    # Read in order


    If this is your first time in computational geometric modeling, we recommend reading
    this book in order. The book is designed to teach different concepts and elements
    in order. These concepts and elements will be reused in later chapters, which
    means that, for example, to understand and enjoy “Chapter 12 – Special case: Surfaces
    of Revolution”, you will need to understand almost all previous chapters. For
    instance, within this chapter, we use various elements such as *parametric surfaces
    description* introduced in previous chapters.


    # Learning by doing


    One of the key elements of this book is “learning by doing”, inspired by one of
    Daniel and Paola’s favorite book authors, Greg Lim. **In this book, you will learn
    to model by modeling.** We have included over 100 independent pieces of code for
    you to develop, and we strongly recommend that you code them manually. By doing
    so, you will acquire modeling skills and better understand each element used.
    Take the time to read each piece of code, analyze it in detail, and execute it.
    This approach will help you master the concepts covered in this book.


    > **TIP:** Learning by doing: “Human beings are insatiable seekers of knowledge;
    however, they do not learn what they hear, read, memorize or study… they learn
    what they practice.” (Taken from: 2019 - Samsó, R. - *The Power of Discipline:
    The Habit that will Change your Life*).'
  merge: -1
  pgno: 14
- img_proc: true
  md: '# Exercises for practice


    At the end of most chapters, you will find a set of simple exercises designed
    to help you reinforce the concepts and skills learned in that chapter. We encourage
    you to complete these exercises before moving on to the next chapter. Doing so
    will allow you to test your understanding and ensure you have acquired the expected
    skills. In addition, you will find the solutions to all the exercises in the book''s
    last chapter.


    # 1.3. Book repository


    In most chapters, we will write pieces of code in Python. All code pieces developed
    in this book can be found in the book repository at the following link: [https://github.com/PracticalBooks/Python-For-Geometric-Modeling](https://github.com/PracticalBooks/Python-For-Geometric-Modeling).
    If we modify the code later, those modifications will be reflected in the repository.


    # Questions


    If you have any questions or would like to discuss any aspect of this book, we
    recommend using the discussion area of the book repository, located at [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/discussions](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/discussions)
    (see Figure 1-1). This platform allows you to learn from the questions and discussions
    posted by other readers ①, while also enabling you to seek help and interact with
    the book''s authors and community. With input and contributions from various members,
    the discussion area can provide a collaborative and enriched learning experience.
    Please note that you need a GitHub account to access the “New discussion” button
    ②.'
  merge: -1
  pgno: 15
- img_proc: true
  md: '![](img/f66d0ac198ad4ed7b9ada3efb976375f_16_0.png)


    In addition to using the book repository''s discussion area, you can email your
    questions or suggestions to [practicalbooksco@gmail.com](mailto:practicalbooksco@gmail.com).
    Please mention the book title in the subject of the message to be sent.


    # Summary


    This chapter introduced the book, including its structure and essential features
