    # 11.4. Quick project


    In aeronautics, a wing is an aerodynamic body with a very strong and structurally
    resistant configuration, composed of an airfoil. Aircraft wings are one of the
    greatest achievements of aeronautical engineering. It combines in a single component
    an efficient structure and an astonishing lightness.'
