    ## 7.4. Quick project


    Do you know the *Lissajous* curves? *Lissajous* curves have applications in sciences
    such as physics and astronomy; moreover, they have been used in various engineering
    applications such as optics, imaging, antenna scans, machining, and mobile robotics.
    *Lissajous* curves are used in experimental tests to determine if a device may
    be appropriately categorized as a memristor (a non-linear two-terminal electrical
    component relating electric charge and magnetic flux linkage). It is also used
    to compare two different electrical signals: a known reference signal and a signal
    to be tested.


    *Lissajous* curves belong to the family of curves described by the form (see Equation
    7-12).


    Equation 7-12


    $$

    c : \begin{cases} x = A \sin(a u + \delta) \\ y = B \sin(b u) \end{cases} \quad
    ; \text{with } u = 0...2\pi

    $$


    If we use different parameter values, we get interesting geometric results:


    - We model lines using the parameters $a = 1$ and $\delta = 0$.

    - We model circles using the parameters $A = B, a = 1$, and $\delta = \pi/2$.

    - We model ellipses using the parameters $A \neq B, a = 1$ and $\delta = \pi/2$.

    - We model a section of parabolas using the parameters $a = 12$ and $\delta =
    \pi/2$.


    In popular culture, *Lissajous* curves were sometimes used to simulate high-tech
    equipment in science-fiction series and films; they are sometimes used in graphic
    design as logos. *WhatsApp*''s rebrand into *Meta Platforms* is also a *Lissajous*
    curve, echoing the shape of a capital letter *M* (using the parameters: $A = 1,
    a = 1, B = 0.6, b = -2, \delta = \pi/20$); the company owns and operates *Facebook*,
    *Instagram*, *Threads*, and *WhatsApp*, among other products and services. *Meta*
    is one of the world''s most valuable companies and among the ten largest publicly
    traded corporations. It is considered one of the Big Five information technology
    companies, alongside *Google*''s parent company *Alphabet*, *Amazon*, *Apple*,
    and *Microsoft*.


    ## Let''s model the *Meta* company logo


    We will now show how to model the *Meta* platform logo from the concepts obtained
    in this chapter. The following code shows how to model the *Meta* company logo
    (see execution in Figure 7-13).


    - In lines 1 and 2, we import the libraries mathematics and plotting, respectively.

    - In line 3, we create a one-line array automatically with $5000$ elements from
    $0$ to $2\pi$.

    - Lines 4 to 8, we define the *Meta Platforms* company logo parameters.

    - In lines 9 and 10, we define the $x$-axis and $y$-axis as a Lissajous curve
    using the parameter $u$.

    - Finally, lines 11 to 14, we create, set, and show the chart plotting the parametric
    curve.


    ## Code and execute


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(0,2*np.pi,5000)

    4. A = 1

    5. a = 1

    6. B = 0.6

    7. b = -2

    8. delta = np.pi/20

    9. x = A * np.sin(a*u + delta)

    10. y = B * np.sin(b*u)

    11. fig = px.line(x=x,y=y)

    12. fig.update_traces(line_color=''blue'',line_width=30)

    13. fig.update_yaxes(scaleanchor="x",scaleratio=1)

    14. fig.show()

    ```


    Figure 7-13. Lissajous curve (*Meta* Platforms logo).


    > **TIP:** If you want to explore more about *Lissajous* curves, we suggest you
    check out these links: [https://www.math.unipd.it/~erb/Lissajous.html](https://www.math.unipd.it/~erb/Lissajous.html)
    and [https://www.wikiwand.com/en/Lissajous_curve](https://www.wikiwand.com/en/Lissajous_curve).
    You will learn about their properties and find examples and applications to increase
    your potential.


