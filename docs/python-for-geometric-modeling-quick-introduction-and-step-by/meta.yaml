    \nFigure 14-5. Five-pointed star on a hyperbolic paraboloid (Pringles®).\n\n##\
    \ 14.3. Implicit notation for complex surfaces\n\nThe **implicit notation for\
    \ complex surface** is an equation where the dependent variables (x, y, and z)\
    \ are written in terms of the *final meshgrid* (see Equation 14-5).\n\n**Equation\
    \ 14-5**\n\n| | |\n|---|---|\n| $s:$ | $u_f = f_1(u_b, v_b)$<br>$v_f = f_2(u_b,\
    \ v_b)$<br>$x = f_3(u_f, v_f)$<br>$y = f_4(u_f, v_f)$<br>$z = f_5(u_f, v_f)$ |\
    \ ; with $u_b = u_{b0}...u_{bn}$, $v_b = v_{b0}...v_{bm}$ |\n\nWhere $x$, $y$,\
    \ and $z$ are the output variables expressed entirely in terms of the input parameter\
    \ $u_f = f_1(u_b, v_b)$ and $v_f = f_2(u_b, v_b)$, i.e., $x = f_3(u_f, v_f)$,\
    \ $y = f_4(u_f, v_f)$, and $z = f_5(u_f, v_f)$.\n\n## Example: Six-pointed star\
    \ on a sphere\n\nWe use implicit notation for complex surfaces to describe a six-pointed\
    \ star with a hole on a sphere $s$ expressed as Equation 14-6.\n\n**Equation 14-6**\n\
    \n$s: \\begin{cases} r_b = v_b + 3 \\cos(3 \\sin(3 u_b)) \\\\ u_f = r_b \\sin(u_b)\
    \ / \\pi \\\\ v_f = r_b \\cos(u_b) / \\pi \\\\ r_f = 1 \\\\ x = r_f \\cos(u_f)\
    \ \\sin(v_f) \\\\ y = r_f \\sin(u_f) \\sin(v_f) \\\\ z = r_f \\cos(v_f) \\end{cases}\
    \ \\quad ; \\text{with } u_b = -\\pi...\\pi, v_b = 1.5...6$\n\nNote that:\n\n\
    - The expressions to describe $r_b$, $u_f$, and $v_f$ in Equation 14-6 are like\
    \ the star with seven picks modeled earlier in Section 9.3 (Equation 9-6). The\
    \ *final meshgrid* $(u_f, v_f)$ from Equation 14-6 will have the six-pointed star\
    \ boundary (see red color surface in Figure 14-6).\n- The expressions to describe\
    \ the $x$, $y$, and $z$ axes in Equation 14-6 are the same to the sphere modeled\
    \ earlier in Section 10.3 (Equation 10-3). The $x$, $y$, and $z$ axes from Equation\
    \ 14-6 will have the sphere surface (see red color surface in Figure 14-6).\n\n\
    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_257_0.png)\n\nFigure 14-6. Conceptualization\
    \ of six-pointed star on a sphere.\n\nThe following code models the disc with\
    \ a hole on a toroidal surface:\n\n- Lines 1 and 2 import libraries.\n- Lines\
    \ 3 and 4 define the basic parameters $u_b$ and $v_b$.\n- Line 5 defines the *basic\
    \ meshgrid* ($U_b$ and $V_b$) from the parameters ($u_b$ and $v_b$).\n- Line 6\
    \ defines a variable radius $r_b$.\n- Lines 7 and 8 define the *final meshgrid*\
    \ ($U_f$ and $V_f$) in function of the parametric arrays ($U_b$ and $V_b$).\n\
    - Line 9 defines the sphere radius $r_f$.\n- Lines 10 to line 12 define the $x$,\
    \ $y$, and $z$ axes from the *final meshgrid* ($U_f$ and $V_f$).\n- Lines 13 to\
    \ 16 set and show the surface (see execution in Figure 14-7).\n\n## Code and execute\n\
    \n```python\nimport numpy as np\nimport plotly.graph_objects as go\nub = np.linspace(-np.pi,\
    \ np.pi, 300)\nvb = np.linspace(1.5, 6, 300)\nUb, Vb = np.meshgrid(ub, vb)\nrb\
    \ = Vb + 3*np.cos(3*np.sin(3*Ub))\nUf = rb * np.sin(Ub)/np.pi\nVf = rb * np.cos(Ub)/np.pi\n\
    rf = 1\nX = rf * np.cos(Uf) * np.sin(Vf)\nY = rf * np.sin(Uf) * np.sin(Vf)\nZ\
    \ = rf * np.cos(Vf)\nfig = go.Figure(go.Surface(x=X, y=Y, z=Z, opacity=1, colorscale='redscale',\
    \ showscale=False,\n    contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))\n\
    fig.update_layout(title='Six-pointed star on a sphere', autosize=False)\nfig.show()\n\
    ```\n\n![](img/f66d0ac198ad4ed7b9ada3efb976375f_259_0.png)\n\nFigure 14-7. Six-pointed\
    \ star on a sphere.\n\n## Example: Disc with a hole on a toroidal surface\n\n\
    We use implicit notation for complex surfaces to describe a disc with a hole on\
