    ## 12.4. 基于闭合参数曲线的旋转曲面


    我们可以从一个闭合参数曲线 *c* 建模一个旋转曲面，该曲线将作为*曲面轮廓*，从而获得一个环面（称为*环形体*或*圆环面*），其横截面形状取决于曲线 *c*
    的形状（见图 12-8）。当闭合参数曲线 *c* 相对于*对称轴*平移距离 *R*，并使用三角函数（*cos(v)* 和 *sin(v)*）进行旋转时，就得到了这个*圆环面*。例如，公式
    12-6 展示了一个绕 *z* 轴旋转的*圆环面*。首先，定义一个距离 *R*。然后，*曲面轮廓*的半径表示为参数 *u* 的函数，*r = f(u)*。接着，*x*
    和 *y* 轴通过三角表达式（*r cos(u)*）定义，项 *R* 用于将*曲面轮廓*相对于*对称轴*进行平移。最后，*y* 轴由表达式（*r sin(u)*）定义。


    ## 公式 12-6


    $$s: \begin{cases} R = k \\ r = f(u) \\ x = (R + r \cos(u)) \cos(v) \\ y = (R
    + r \cos(u)) \sin(v) \\ z = r \sin(u) \end{cases} ; \text{ 其中 } u = u_0...u_n,
    v = v_0...v_m$$


    其中 $k$ 表示相对于*对称轴*的平移距离，它是一个标量数。


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_203_0.png)


    图 12-8. 基于三维参数曲线的环面概念图。


    ## 示例：具有星形横截面的环面


    接下来，我们对一个具有星形横截面的*圆环面*进行建模，该曲面绕 z 轴旋转；因此，三角函数（*cos(v)* 和 *sin(v)*）定义在 x-y 平面上（见公式
    12-7）。


    **公式 12-7**


    $$s : \begin{cases} R = 5 \\ r = 2 + \sin(5u) \\ x = (R + r \cos(u)) \cos(v) \\
    y = (R + r \cos(u)) \sin(v) \\ z = r \sin(u) \end{cases} ; \text{ 其中 } u = 0...2\pi,
    v = -3\pi/2...0$$


    请注意，公式 12-7 中使用的半径 r 与公式 7-11 中使用的相同；因此，圆环面的横截面将与图 7-11 所示的相同（即，派大星的轮廓）。x、y 和
    z 轴中的三角项（cos(u) 和 sin(u)）定义了圆环面的曲面轮廓。x、y 和 z 轴中的三角项（cos(v) 和 sin(v)）定义了圆环面的旋转。


    以下代码展示了具有星形横截面的圆环面。第1行和第2行导入库。第3行和第4行定义参数 u 和 v。第5行定义参数数组 U 和 V。第6行定义 R 值，即横截面的平移距离。第7行定义
    r，即曲面轮廓。第8行到第10行分别定义 x、y 和 z 轴。第11行到第14行设置并显示曲面（执行结果见图 12-8）。


    ## 代码与执行


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,2*np.pi,100)

    4. v = np.linspace(0,-np.pi,20)

    5. U, V = np.meshgrid(u,v)

    6. R = 6

    7. r = 2 + np.sin(5*U)

    8. X = (R + (r * np.cos(U))) * np.cos(V)

    9. Y = (R + (r * np.cos(U))) * np.sin(V)

    10. Z = r * np.sin(U)

    11. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''rdylgn'', showscale=False,

    12.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    13. fig.update_layout(title=''Ring with star-shape cross section'',autosize=False)

    14. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_205_0.png)


    > **提示：** 如果你对一个表示为 *r* 等于标量数、*R* > 2*r*、*x* = (*R* + *r* cos(*u*)) cos(*v*)、*y*
    = (*R* + *r* cos(*u*)) sin(*v*) 和 *z* = *r* sin(*u*) 的旋转曲面进行建模，得到的曲面是一个具有圆形横截面的圆环面。


    ## 12.5. 快速项目


    *SpaceX* 设计、制造和发射可重复使用的火箭和航天器。它是第一家：(*i*) 开发出达到轨道的液体推进剂火箭；(*ii*) 发射、入轨并回收航天器；以及
    (*iii*) 将航天器和宇航员送往国际空间站的私营公司。它也是第一个实现轨道火箭助推器垂直动力着陆的任何类型的组织，并且是第一个重复使用此类助推器的组织。


    随着 *SpaceX* 在火箭组件方面的创新，以及我们在几何建模方面的知识，该公司联系我们来改进一个特殊且关键部件的几何设计：火箭喷嘴。火箭喷嘴获取可燃液体或气体并将其燃烧，以产生稳定的废气流（见图
    12-9），这些废气被转化为推进力，用于提供持续的速度和方向。


