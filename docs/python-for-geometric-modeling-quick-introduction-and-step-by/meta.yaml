  md: "# 13.5. Quick project\n\nBoats come in a wide variety of shapes and sizes,\
    \ so do their hulls. Despite the variety, all hulls are designed to do one of\
    \ only two things: either displace water, or ride on top of it, which is called\
    \ planing.\n\nOn the one hand, sailing boats, slow-moving boats, and large boats\
    \ (such as cruisers) ships have displacement hulls. The combination of their weight\
    \ and power means they move lower in the water, pushing or displacing water, rather\
    \ than riding on top of it.\n\nOn the other hand, smaller, faster boats (such\
    \ as powerboats) or personal watercraft, typically have planing hulls. Planing\
    \ hulls are designed to rise up and ride on top of the water at higher speeds.\n\
    \nWe propose to model a bio-inspired powerboat hull. The hull will be based on\
    \ a seashell stated in (Equation 13-8).\n\n> Equation 13-8\n\ns : \n\nr = u +\
    \ sin(u + v)\nx = r cos(u) sin(v)\ny = cos(v)\nz = r sin(u) sin(v)\n\n; with u\
    \ = 0...7π, v = 0...π\n\n# Let's model the powerboat hull\n\nThe following code\
    \ models the seashell. Line 1 and line 2 import libraries. Line 3 to line 5 define\
    \ the parameters u, v, U, and V. Line 6 to line 9 define define the x, y, and\
    \ z axes. From line 10 to line 13 set and show the surface (see execution in Figure\
    \ 13-8).\n\n```\nCode and execute\n```"
  merge: -1
  pgno: 232
- img_proc: true
  md: '```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,7*np.pi,90)

    4. v = np.linspace(0,np.pi,80)

    5. U, V = np.meshgrid(u,v)

    6. r = U + np.sin(U + V)

    7. X = r * np.cos(U) * np.sin(V)

    8. Y = r * np.cos(V)

    9. Z = r * np.sin(U) * np.sin(V)

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale =''tealgrn'', showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(scene = dict(aspectratio = dict(x=1, y=1, z=1)))

    13. fig.show()

    ```


