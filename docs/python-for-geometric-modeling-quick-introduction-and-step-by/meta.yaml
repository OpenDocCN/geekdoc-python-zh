    ## 7.1. 二维参数曲线的定义


    ### 基本曲线


    在二维坐标系中，一个点 $p$ 由两个元素 $(x, y)$ 组成，其中 $x$ 表示输入（自变量），$y$ 表示输出（因变量）。一条曲线 $c$ 由一组点
    $(p_0, p_1, ...)$, $p_i$, …, $p_n$) 构成，用于图形表示（见图 7-1）；因此，曲线描述了点之间的关系，这可以表示为一个简单的函数（见公式
    7-1）。


    > **公式 7-1**

    > $c: y = f(x)$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_70_0.png)


    图 7-1. 二维曲线的概念化。


    ### 参数曲线


    如果一条曲线表示为*参数方程*，则称为**参数曲线**。然而，什么是*参数方程*？它是一种使用称为**参数**的自变量（这里我们将用 $u$ 表示）的方程类型，其中因变量（$x(u)$,
    $y(u)$）被定义为参数的函数，而不依赖于另一个变量。


    **参数曲线**是曲线的数学表示，其中每个点都用参数 *u* 来描述。换句话说，不是用*笛卡尔坐标*（*x*, *y*）来表示点的位置，而是用一个依赖于参数
    *u* 的参数函数来描述。


    **二维参数曲线 *c*** 使用一组点（*p*₀, *p*₁, ..., *p*ᵢ, ..., *p*ₙ）定义；因此，点 *p*ᵢ 由两个元素（*x*(*u*),
    *y*(*u*)）组成。参数 *u* 是一个自变量（输入），*x* 和 *y* 都依赖于它（输出），并且随着参数的增加，*x*(*u*) 和 *y*(*u*)
    的值沿着平面曲线描绘出一条路径（见图 7-2）。二维参数曲线 *c* 描述了一组点之间的关系，这可以使用两个函数来表示，一个函数 *f*₁(*u*) 获取
    *x* 值，另一个函数 *f*₂(*u*) 获取 *y* 值（见公式 7-2）。


    > **公式 7-2**

    > $c :$

    > $x = f_1(u)$

    > $y = f_2(u)$'
