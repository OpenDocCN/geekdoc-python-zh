    E7.4.2. *阿涅西箕舌线*曲线。


    **注意：** 如果你在网上找不到简单的参数方程，请使用链接：[https://mathshistory.st-andrews.ac.uk/Curves/Witch/](https://mathshistory.st-andrews.ac.uk/Curves/Witch/)。在那里，作者使用字母‘*t*’来命名参数，并使用一个名为‘*a*’的常数来定义曲线的高度；你可以选择一个大于
    *0* 的数字来定义它。'
