    ## 4.1. 什么是 *NumPy* 库？


    *NumPy*（源自 *Numerical Python* 的缩写）是一个 Python 库，它提供了不同的数学元素（如数组和矩阵）以及一系列用于快速执行数学、逻辑、基础线性代数等操作的例程（[https://numpy.org/](https://numpy.org/)）。


    ## 4.2. 为什么我们使用 *NumPy*？


    *NumPy* 可用于执行几何建模所需的广泛数学运算。*NumPy* 在几何建模中被广泛使用，原因如下：


    - **效率：** *NumPy* 针对数值运算进行了高度优化。几何建模涉及大量数学计算，例如标量和数组运算。

    - **数组处理：** 几何模型通常表示为点、顶点或边的数组。*NumPy* 提供了一种简单高效的方式来处理这些数组，使得操作几何数据更加简单。

    - **与其他库的兼容性：** *NumPy* 与几何建模中常用的其他库（如 *Matplotlib* 或 *Plotly*（用于可视化））集成良好。

    - **数学函数：** *NumPy* 提供了几何计算所需的各种数学函数，包括代数函数、三角函数和线性代数。


    总的来说，*NumPy* 的效率、数组处理能力以及与其他库的兼容性使其成为 Python 中几何建模的强大工具。


    ## 4.3. 使用 *NumPy* 函数


    *NumPy* 有一组有趣的函数，可以方便编码并**快速**、**轻松**地获得结果。现在，我们将解释如何使用其中的几个，因为它们将用于定义和操作数组：


    ### *abs* 函数


    **abs** 函数用于计算变量的绝对值。其语法很简单：使用关键字 *abs* 后跟括号“( )”。在这些括号内，指定要评估的变量，在此实例中表示为 *a*。公式如下：


    ```

    abs(a)

    ```


    ### *sin* 函数


    **sin** 函数用于计算变量的正弦值。语法很简单：使用关键字 *sin* 后跟括号“( )”。在这些括号内，指定要评估的变量，在此实例中表示为 *u*。公式如下：


    ```

    sin(u)

    ```


    ### *cos* 函数


    **cos** 函数用于计算变量的余弦值。语法很简单：使用关键字 *cos* 后跟括号“( )”。在这些括号内，指定要评估的变量，在此实例中表示为 *v*。公式如下：


    ```

    cos(v)

    ```


    ### log10 函数


    *log10* 函数计算变量的以 10 为底的对数值。语法很简单：使用关键字 *log10* 后跟括号“( )”。在这些括号内，指定要评估的变量，在此实例中表示为
    *w*。公式如下：


    ```

    log10(w)

    ```


    ### linspace 函数


    *linspace* 函数在指定区间内创建一个均匀间隔的数字序列。语法很简单：使用关键字 *linspace* 后跟括号“( )”。在这些括号内，指定三个用逗号分隔的数字（*start*、*stop*、*num*）。*start*
    是数组的起始元素，*stop* 是数组的结束元素，*num* 是元素的数量。公式如下：


    ```

    linspace(start, stop, num)

    ```


    ### ones 函数


    *ones* 函数创建一个元素值设置为 1 的数组。语法很简单：使用关键字 *ones* 后跟括号“( )”。在这些括号内，指定两个用逗号分隔的数字（*rows*、*cols*）。*rows*
    是数组的行数，*cols* 是列数。公式如下：


    ```

    ones(rows, cols)

    ```'
