    - $B$ 是机翼的基础形状系数，影响其前缘。如果 $B = 2$，翼型基础形状是椭圆形，但如果 $B$ 接近 $1$，形状则变为矩形。\n- $T$ 是机翼厚度与弦长的比值。\n\
    - $P$ 是机翼锥度指数。如果 $P = 1$，机翼厚度在接近*后缘*时线性趋近于 $0$。如果 $P$ 值更大，机翼在*后缘*附近锥度变化更剧烈。\n\
    - $C$ 是机翼弯度，与弦长的比值。\n- $E$ 是弯度指数，定义最大弯度点的位置。如果 $E = 1$，弯度点位于宽度的 $50\\%$ 处，但较小的值会将其向*前缘*移动。\n\
    - $R$ 是反弯参数。正值产生反弯后缘，而负值则模拟襟翼。\n\n> **提示：** 如果你想了解更多关于翼型（翼剖面）的知识以增加你的知识储备，我们建议查看以下链接：\n\
