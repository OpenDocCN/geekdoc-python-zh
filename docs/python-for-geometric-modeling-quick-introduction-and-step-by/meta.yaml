    expressed through three functions: $f_1(u)$ for obtaining the $x$ values, $f_2(u)$
    for the $y$ values, and $f_3(u)$ for the $z$ values (see Equation 8-1).


    ```

    Equation 8-1

    $$

    c: \begin{cases} x = f_1(u) \ y = f_2(u) \ z = f_3(u) \end{cases} \quad ; \text{with
