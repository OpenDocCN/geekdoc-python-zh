    ### 5.1. 什么是 Matplotlib？


    **Matplotlib** 是一个用于在 Python 中创建静态可视化的流行库。它提供了广泛的工具，用于创建各种图形、图表、绘图和其他数据的视觉表示（[https://matplotlib.org/](https://matplotlib.org/)）。这个库展示了
    Python 社区通过其协作开发工作所能产生的影响。


    *Matplotlib* 用于创建由单个颜色像素组成的**光栅图像**（也称为位图）。每个颜色像素都有助于整体图像。光栅图像可以与点彩派绘画相比较，其中每个彩色油漆点在光栅图像的上下文中对应一个像素。当作为一个单独的点来看时，它只是一种颜色，但当作为一个整体来看时，彩色点构成了一幅生动而详细的画作。


    ### 5.2. PyPlot 模块


    **PyPlot** 是一组使 *matplotlib* 工作的函数集合，并提供了多个用于创建不同类型绘图的函数，例如线图、散点图、条形图、直方图等等。在本节中，我们将重点介绍
    *plot* 和 *fill* 函数。


    ### Plot 函数


    *plot* 函数绘制一条由 *x* 轴和 *y* 轴坐标给出的顶点的线。以下代码展示了如何使用 *plot* 函数（执行结果见图 5-1）：


    - 在第 1 行，我们从 *matplotlib.pyplot* 导入 *PyPlot* 模块，并使用 *as* 关键字为其分配别名 *plt*。别名是一个简短的名称，允许我们直接使用名称
    *plt* 而不是原始的扩展版本 *matplotlib.pyplot*。

    - 在第 2 行，我们导入 *NumPy* 库并赋予别名 *np*。

    - 在第 3 行和第 4 行，我们使用 *np.array* 创建两个数组，每个数组包含五个元素。

    - 在第 5 行，我们使用 *plot* 函数从由变量 *x* 定义的 *x* 轴和由变量 *y* 定义的 *y* 轴创建一个**线图**。线条颜色由 *color*
    属性决定，可以通过调整与 *color* 属性相关的文本来修改。尝试不同的文本值以探索不同的线条颜色，例如 ''blue''、''red''、''yellow''
    等。最后，线宽使用 *linewidth* 属性设置。您可以通过改变与 *linewidth* 属性相关的值来更改线宽。尝试不同的值，如 *1, 2, 3,
    4* 等，以探索不同的线宽。

    - 在第 6 行，我们使用 *plot* 函数从由变量 *x* 定义的 *x* 轴和由变量 *y* 定义的 *y* 轴创建一个**点图**。然后，使用 *color*
    属性设置点的颜色。通过调整与 *color* 属性相关的文本来更改线条颜色。探索各种线条颜色，包括 ''blue''、''black''、''yellow''
    等选项。最后，点的大小使用 *markersize* 属性设置，可以通过改变与 *markersize* 属性相关的数字来更改线宽。尝试不同的线宽（*1,
    2, 3, 4* 等）。

    - 在第 7 行，我们使用 *grid* 函数为图表添加网格。

    - 在第 8 行和第 9 行，我们分别使用 *xlabel* 和 *ylabel* 函数为 *x* 轴和 *y* 轴添加标签。

    - 在第 10 行，我们使用 *title* 函数为图表添加标题。

    - 最后，在第 11 行，我们使用 *show* 函数显示图表。


    ### 代码与执行


    ```

    1. import matplotlib.pyplot as plt

    2. import numpy as np

    3. x = np.array([0,6,10,-5,-4])

    4. y = np.array([0,1, 5, 7, 3])

    5. plt.plot(x,y,color=''black'',linewidth=3)

    6. plt.plot(x,y,''o'',color=''red'',markersize=7)

    7. plt.grid()

    8. plt.xlabel(''x'')

    9. plt.ylabel(''f(x)'')

    10. plt.title(''Raster Graph using plot function'')

    11. plt.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_58_0.png)


    图 5-1. 使用 plot 函数的光栅图。


    ### Fill 函数


    *fill* 函数绘制一个由 *x* 轴和 *y* 轴坐标给出的顶点的区域。以下代码展示了如何使用 *fill* 函数（执行结果见图 5-2）：


    - 在第 1 行和第 2 行，我们分别导入 *PyPlot* 和 *NumPy*。

    - 在第 3 行和第 4 行，我们使用 *np.array* 创建两个数组，每个数组包含五个元素。

    - 在第 5 行，我们使用 *fill* 函数从由变量 *x* 定义的 x 轴和由变量 *y* 定义的 y 轴创建一个区域图。区域颜色使用 *color*
    属性设置。然后，通过 *alpha* 属性设置透明度级别。您可以通过改变与 *alpha* 属性相关的数字（从 0 到 1）来更改透明度级别，其中 1 是实心区域，0
    是完全透明。最后，线宽使用 *linewidth* 属性设置。

    - 在第 6 行，我们使用 *grid* 函数为图表添加网格。

    - 在第 7 行和第 8 行，我们分别使用 *xlabel* 和 *ylabel* 函数为 x 轴和 y 轴添加标签。

    - 在第 9 行，我们使用 *title* 函数为图表添加标题。

    - 最后，在第 10 行，我们使用 *show* 函数显示图表。


    ### 代码与执行


    ```

    1. import matplotlib.pyplot as plt

    2. import numpy as np

    3. x = np.array([0,6,10,-5,-4])

    4. y = np.array([0,1,5,7,3])

    5. plt.fill(x,y,color=''red'',alpha=0.4,linewidth=3)

    6. plt.grid()

    7. plt.xlabel(''x'')

    8. plt.ylabel(''f(x)'')

    9. plt.title(''Raster Graph using fill function'')

    10. plt.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_60_0.png)


    图 5-2. 使用 fill 函数的光栅图。


    > **提示：** *NumPy* 库提供了各种数学函数（三角函数、双曲函数、指数函数、对数函数等）。如果您想探索更多这些函数，我们建议查看此链接：[https://numpy.org/doc/stable/reference/routines.math.html](https://numpy.org/doc/stable/reference/routines.math.html)。您可以找到许多增加您潜力的方法示例。


    ### 总结


    在本章中，我们学习了如何使用带有 *PyPlot* 模块的 *Matplotlib* 来创建和设置光栅图像，作为几何建模的工具。


    在下一章中，我们将学习如何使用 *Plotly* 库创建交互式可视化，这是几何 2D 和 3D 建模的一个有趣工具。


