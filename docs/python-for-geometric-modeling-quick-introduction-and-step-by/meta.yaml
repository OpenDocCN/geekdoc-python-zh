    ## Chapter 03 – Setting Colab


    There are many tools available for programming in Python. In this book, we will
    use Colab, a Google product that enables Python code programming from our browser.
    This chapter will guide us in setting up Colab and creating our initial curve.


    Next, we will cover the following sections:


    - 1. Introduction.

    - 2. Colab activation.

    - 3. Modeling a line in Colab.

    - 4. Colab customization.


    The code developed for this chapter is located at [https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-03](https://github.com/PracticalBooks/Python-For-Geometric-Modeling/tree/main/Chapter-03).
    We recommend that you enhance your coding skills by independently developing the
    code. If there are any issues, you can refer to the code in the repository for
    comparison.


    ### 3.1. Introduction


    There are several options available to develop Python code. For instance, one
    could download and install Python from its official website ([https://www.python.org/downloads/](https://www.python.org/downloads/))
    or use the *Replit* website to program online ([https://replit.com/languages/python3](https://replit.com/languages/python3)),
    among other options. Each choice has its advantages and disadvantages.


    In this book, we will use Google Colab or simply **Colab**, a tool created by
    Google that enables users to write and execute Python code in the browser without
    the need for installation. To use Colab, a Google account is required, and then
    Colab documents can be created on Google Drive for Python programming.


    Compared to other tools, Colab offers several advantages, such as:


    - **No program installation required:** To program with Colab, no installations
    are necessary. All that''s required is an internet connection and a Google account.

    - **Online data storage:** Since Colab connects to Google Drive, all the programs
    we create are automatically stored on the Internet (on Google Drive).

    - **Easy code sharing:** Colab documents can be shared the same way as any other
    Google Document or Spreadsheet file, allowing for easy collaboration.

    - **Pre-installed libraries:** Colab already has many pre-installed libraries,
    such as *Matplotlib*, *NumPy*, and *Plotly*, which are used for modeling, data
    analytics, and graphing. Therefore, you do not need to install any components
    to follow this book.


    Next, we will guide you on how to activate Colab. However, please note that before
    proceeding, you must create a Google account if you do not already have one. To
    create a Google account, please follow these steps: go to [https://www.google.com/account/about/](https://www.google.com/account/about/)
