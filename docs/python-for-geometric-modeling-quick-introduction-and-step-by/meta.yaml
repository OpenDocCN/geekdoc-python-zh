    # 6.2. Plotly Express module


    *Plotly Express* is a powerful data visualization package in Python that allows
    users to create interactive and visually appealing charts and dashboards. Moreover,
    *Plotly Express* is an easy-to-use, high-level interface that operates on various
    data types.


    # 6.3. Why do we use Plotly Express?


    *Plotly Express* offers some benefits over the other libraries in Python: (i)
    simple syntax (reads almost like English); (ii) a wide range of visualizations
    (or tools to make up your own); (iii) automatic axis and color scaling; (iv) provides
    more than 30 functions to visualize a variety of types of data; and (v) allows
    us for the endless customization of our graphs that makes our plot more meaningful
    and understandable for others.


    *Plotly Express* provides **vectorial graphics**, allowing the user to use a cursor
    to click on elements to obtain more information, zoom in and out to obtain greater
    detail, and pan and hover over data points to display additional information.


    # 6.4. Raster images vs. vectorial graphics


    Unlike **raster images** (which are made of a grid of pixels and can lose quality
    when resized), **vectorial graphics** refers to a type of digital graphic made
    up of mathematical descriptions of shapes, lines, and curves rather than individual
    pixels. Unlike raster images, vectorial graphics retain their appearance regardless
    of size. They maintain their quality and scalability, and then they can be scaled
    infinitely, rotated, and panned.'
  - '[PAGE 64]


    Since raster images are comprised of colored pixels arranged to form an image,
    they cannot be scaled without sacrificing quality. If you enlarge a raster, it
    will pixelate or become blurry. The lower its resolution (pixels-per-inch), the
    smaller the image must be to maintain quality. In contrast, the mathematical equations
    that form the foundations for vectors can be recalculated when an image is resized;
    thus, you can infinitely scale a vectorial graphic and maintain crisp, sharp edges.
    Vectorial graphics are the most common type of electronic chart. They provide
    a computer-generated representation of a chart and contain all the geometric information
    for modeling.


    Vectorial graphics are commonly used in various applications such as planimetry
    (mechanical engineering, design engineering, civil engineering, architecture),
    logos, illustrations, fonts, technical drawings, and scalable designs for print
    and web. They are highly versatile and are often created and edited using software
    like *Solid Works*, *CREO*, *AutoCAD*, *Adobe Illustrator*, *CorelDraw*, etc.


    # 6.5. How to use Plotly Express


    *Plotly Express* is simple. The following code shows how to get a plot using this
    module (see execution in Figure 6-1).


    +   - In line 1, we import the *Plotly Express* package and give the alias *px*
    for quick access to its functions in our code. In the remainder of our code, we
    use the *Plotly Express* functions with “*px.*” as the prefix.

    - In line 2, we import the *NumPy* library and give the alias *np*.

    - In line 3 and line 4, we create two arrays, each with five elements using the
    *np.array*.

    - In line 5, the *px.line* function is employed to create a 2D **line plot** (fig)
    with the x-axis defined by the variable *x* and the y-axis defined by the variable
    *y*. Markers are sown by setting the *markers* attribute as *true*.

    - In line 6, we set the color and width attributes of the line.

    - In line 7, we set the axis equals for the chart using the *update_yaxes* function.'
