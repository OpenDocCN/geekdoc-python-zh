    # 前言


    什么是几何建模？它是应用计算几何的一个领域，研究描述形状的方法和算法，其中计算机辅助设计（CAD）是对象几何的计算表示。它包括图形和非图形信息。这些信息以几何模型（即图形）的形式生成和显示；因此，可以以不同方式编辑和分析这些模型。


    在本书中，我们将通过Python语言实践性地探索一些基本的几何模型。这将是一本关于CAD应用的快速入门与分步指南。


    本书与其他类似书籍的最大区别在于，我们将采用由三个基本要素主导的策略：(i) 我们将以**理论/实践**相结合的方式阐述概念，(ii) 我们将**逐步**解释每个元素，以及
    (iii) 我们将使用大量**图像**来解释基本元素。


    **理论/实践：** 我们将平静而简洁地解释我们阐述的每个概念，使用任何读者都能理解的语言（不绕圈子或使用复杂表达）。此外，我们将开发多段代码、示例和练习，供读者实践并理解如何应用所学的每个元素。


    **逐步：** 我们将从简短而简单的代码片段开始。此外，我们将充分解释每条开发的指令。我们不会假设读者能神奇地理解一切。


    **图像：** 我们将使用辅助图像来促进对多个概念和代码片段（无论简单还是复杂）的理解。我们将使用图表和屏幕输出，供读者验证他们的进度。


    # 本书适合谁？


    本书面向任何Python编程经验水平的Python开发者，他们希望学习几何计算机建模，无论他们是年轻人、成年人、专业人士还是教师。此外，它也是一本为数学概念初学者或新手设计的书籍。


    为了流畅阅读本书并充分发挥其潜力，我们建议读者具备Python的基础编程元素知识，如变量、循环、函数、数组以及库的基本概念。


    如果您需要学习Python语言编程，我们鼓励您阅读《Python入门：Python编程实用分步指南》一书。您可以在 [https://www.amazon.com/dp/B0C3FQJ45T/](https://www.amazon.com/dp/B0C3FQJ45T/)
    获取。有时，该书的数字版本可免费下载。如果不能，请通过电子邮件 [practicalbooksco@gmail.com](mailto:practicalbooksco@gmail.com)
    向我们发送您在亚马逊购买本书的截图，我们将免费为您提供《Python入门》一书的PDF版本。


    # 本书涵盖什么内容？


    正如标题所示，本书是使用Python进行几何建模的快速入门与分步指南，包括参数曲线和曲面建模。这是一本简短的书，旨在不让读者感到负担。虽然它本可以涵盖更多主题，但为了清晰详细地解释，只处理了上述主题。


    在本书结束时，读者将掌握几何建模基本元素的知识，然后可以将其应用于更高级的项目，从而更容易地获得新知识。


    # 作者有哪些先前经验？


    罗纳德拥有机械工程背景，并在计算机科学领域获得了博士学位。他'
