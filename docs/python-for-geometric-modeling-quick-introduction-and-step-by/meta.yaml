    ## 示例：单位半径球体


    我们使用隐式表示法来描述单位半径（r = 1）的球体，如公式 10-6 所示。


    **公式 10-6**


    $s: \begin{cases} x = r \sin(v) \cos(u) \\ y = r \sin(v) \sin(u) \\ z = r \cos(v)
    \end{cases} ; \text{ 其中 } u = 0...2\pi, v = 0...\pi$


    请注意，描述球体的方程（公式 10-6）是基于第 7.3 节（公式 7-9）中建模的圆的方程。圆的方程用一对正弦项（cos(u) 和 sin(u)）表示，以在
    x 轴和 y 轴上仅获得一个曲率。然而，球体的方程用三对正弦项表示，以描述曲面的三个曲率：第一对项（x 轴方程中的 cos(u) 项和 y 轴方程中的 sin(u)
    项）描述 x 轴和 y 轴的曲率；第二对项（z 轴方程中的 cos(v) 项和 x 轴方程中的 sin(v) 项）描述 z 轴和 x 轴的曲率；第三对项（z
    轴方程中的 cos(v) 项和 y 轴方程中的 sin(v) 项）描述 z 轴和 y 轴的曲率。


