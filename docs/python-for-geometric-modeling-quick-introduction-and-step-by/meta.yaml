    # 6.2. Plotly Express module


    *Plotly Express* is a powerful data visualization package in Python that allows
    users to create interactive and visually appealing charts and dashboards. Moreover,
    *Plotly Express* is an easy-to-use, high-level interface that operates on various
    data types.


    # 6.3. Why do we use Plotly Express?


    *Plotly Express* offers some benefits over the other libraries in Python: (i)
    simple syntax (reads almost like English); (ii) a wide range of visualizations
    (or tools to make up your own); (iii) automatic axis and color scaling; (iv) provides
    more than 30 functions to visualize a variety of types of data; and (v) allows
    us for the endless customization of our graphs that makes our plot more meaningful
    and understandable for others.


    *Plotly Express* provides **vectorial graphics**, allowing the user to use a cursor
    to click on elements to obtain more information, zoom in and out to obtain greater
    detail, and pan and hover over data points to display additional information.


    # 6.4. Raster images vs. vectorial graphics


    Unlike **raster images** (which are made of a grid of pixels and can lose quality
    when resized), **vectorial graphics** refers to a type of digital graphic made
    up of mathematical descriptions of shapes, lines, and curves rather than individual
    pixels. Unlike raster images, vectorial graphics retain their appearance regardless
    of size. They maintain their quality and scalability, and then they can be scaled
    infinitely, rotated, and panned.'
  merge: -1
