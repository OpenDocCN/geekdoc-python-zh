    图 11-8. 可变拉伸高度的概念化。


    ## 公式 11-5


    $$s : \begin{cases} x = f_1(u) \\ y = f_2(u) \\ z = f_2(u,v) \end{cases} ; \text{
    其中 } u = 0...u_n, v = 0...v_m$$


    ## 示例：螺旋曲线的可变拉伸高度


    我们展示一个使用可变高度拉伸曲面的例子，使用隐式表示法来描述一个螺旋形拉伸曲面（参见公式 11-6）。


    **公式 11-6**


    $s: \begin{cases} r = \sqrt{u} \\ x = r \cos(u) \\ y = r \sin(u) \\ z = u v \end{cases}$
    ; 其中 $u = 0...2\pi$, $v = 0...1$


    以下代码建模了一个具有可变高度的拉伸曲面。


    - 第 1 和 2 行导入库。

    - 第 3 和 4 行定义参数 $u$ 和 $v$。

    - 第 5 行定义参数数组 $U$ 和 $V$。

    - 第 6 行描述极坐标表达式的半径。

    - 第 7 和 8 行将 $x$-$y$ 平面中的螺旋曲线定义为参数数组 $U$ 的函数。

    - 第 9 行将 $z$ 轴定义为拉伸曲面的高度，作为参数数组（$U$ 和 $V$）的函数。

    - 第 10 至 13 行设置并显示曲面（执行结果见图 11-9）。


    代码与执行


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,2*np.pi,500)

    4. v = np.linspace(0,1,10)

    5. U,V = np.meshgrid(u,v)

    6. r = np.sqrt(U)

    7. X = r * np.cos(U)

    8. Y = r * np.sin(U)

    9. Z = U * V

    10. fig=go.Figure(go.Surface(x=X,y=Y,z=Z,opacity=1,colorscale = ''hot'', showscale=False,

    11.     contours=dict(x=dict(show=True), y=dict(show=True), z=dict(show=True))))

    12. fig.update_layout(title=''Spiral-shape extruded surface'', autosize = False)

