  md: '# Using a function to define a large meshgrid size


    In the previous code, line 5 and line 7 are very long because each array has twenty
    directly defined elements. However, *Numpy* offers a function called *meshgrid*,
    with which it is possible to automatically obtain the arrays (*U* and *V*) in
    a single line of code saving effort, time, and lines of code. The following code
    replicates the same procedure and results using the *meshgrid* function.


    +   - Lines 1 and 2 import libraries.

    - Lines 3 and 4 define the parameters *u* and *v* as one-dimensional arrays with
    four and five elements, respectively.

    - Line 5 defines the multi-dimensional array parameters *U* and *V* using the
    *meshgrid* function from the *Numpy* library.

    - Finally, lines 6 and 7 print the stored elements in the parametric arrays *U*
    and *V* (see execution in Figure 9-8).


    # Code and execute


