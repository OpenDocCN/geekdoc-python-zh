    ## 7.1. Definition of parametric curves in 2D


    ### Basic Curve


    In the two-dimensional coordinate system, a point $p$ is formed by two elements
    $(x, y)$, where $x$ represents the input (independent variable) and $y$ represents
    the output (dependent variable). A curve $c$ is made up of a set of points $(p_0,
    p_1, ...)$, $p_i$, …, $p_n$) for a graphical representation (see Figure 7-1);
    thus, a curve describes the relationship between the points, which can be expressed
    as a simple function (see Equation 7-1).


    > **Equation 7-1**

    > $c: y = f(x)$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_70_0.png)


    Figure 7-1. Conceptualization of curve in 2D.


    ### Parametric Curve


    If a curve is expressed as *parametric equations*, it is called a **parametric
    curve**. However, what a *parametric equation* is? It is a type of equation that
    employs an independent variable called a **parameter** (here, we will denote it
    by $u$) and in which dependent variables ($x(u)$, $y(u)$) are defined as functions
    of the parameter and are not dependent on another variable.


    A **parametric curve** is a mathematical representation of a curve in which each
    point is described in terms of the parameter *u*. In other words, instead of expressing
    the position of a point in terms of *Cartesian coordinates* (*x*, *y*), it is
    described by one parametric function that depends on the parameter *u*.


    A **parametric curve *c* in 2D** is defined using a set of points (*p*₀, *p*₁,
    ..., *p*ᵢ, ..., *p*ₙ); thus, the point *p*ᵢ is formed by two elements (*x*(*u*),
    *y*(*u*)). The parameter *u* is an independent variable (input) that both *x*
    and *y* depend on (outputs), and as the parameter increases, the values of *x*(*u*)
    and *y*(*u*) trace out a path along a plane curve (see Figure 7-2). A parametric
    curve *c* in 2D describes the relationship between a set of points, which can
    be expressed using two functions, one function *f*₁(*u*) to get the *x* values
    and another function *f*₂(*u*) to get the *y* values (see Equation 7-2).


    > **Equation 7-2**

    > $c :$

    > $x = f_1(u)$

    > $y = f_2(u)$'
