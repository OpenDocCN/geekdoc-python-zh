    E7.3.2. 参数化摆线。


    **注意：** 如果你使用半径来构建曲线，你可以选择一个大于 *0* 的数字来定义半径。为了建模更长的曲线，你可以将参数范围从 *0* 扩展到 *4π* 或从
    *0* 扩展到 *6π* 甚至更多。


    **E7.4.** 你知道一些有趣的曲线是以首次研究它们的人命名的吗？在互联网和谷歌上搜索，找到并建模以下著名曲线：


    E7.4.1. *狄奥克莱斯蔓叶线*曲线。


