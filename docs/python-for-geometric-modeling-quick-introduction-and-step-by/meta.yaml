    - 第 8 行将 $y$ 轴定义为拉伸曲面的高度，作为参数数组 $V$ 的函数。

    - 第 10 至 13 行设置并显示曲面（执行结果见图 11-7）。


    代码与执行


    ```

    1. import numpy as np

    2. import plotly.graph_objects as go

    3. u = np.linspace(0,10*np.pi,500)

