    # ## 7.1. Definition of parametric curves in 2D


    # ### Basic Curve


    In the two-dimensional coordinate system, a point $p$ is formed by two elements
    $(x, y)$, where $x$ represents the input (independent variable) and $y$ represents
    the output (dependent variable). A curve $c$ is made up of a set of points $(p_0,
    p_1, ...)$.'
  - '[PAGE 70]


    …, $p_i$, …, $p_n$) for a graphical representation (see Figure 7-1); thus, a curve
    describes the relationship between the points, which can be expressed as a simple
    function (see Equation 7-1).


    > **Equation 7-1**

    $c: y = f(x)$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_70_0.png)


    Figure 7-1. Conceptualization of curve in 2D.


    # Parametric Curve


    If a curve is expressed as *parametric equations*, it is called a **parametric
    curve**. However, what a *parametric equation* is? It is a type of equation that
    employs an independent variable called a **parameter** (here, we will denote it
    by $u$) and in which dependent variables ($x(u)$, $y(u)$) are defined as functions
    of the parameter and are not dependent on another variable.'
  - "[PAGE 71]\n\nA **parametric curve** is a mathematical representation of a curve\
    \ in which each point is described in terms of the parameter *u*. In other words,\
    \ instead of expressing the position of a point in terms of *Cartesian coordinates*\
    \ (*x*, *y*), it is described by one parametric function that depends on the parameter\
    \ *u*.\n\nA **parametric curve *c* in 2D** is defined using a set of points (*p*₀,\
    \ *p*₁, ..., *p*ᵢ, ..., *p*ₙ); thus, the point *p*ᵢ is formed by two elements\
    \ (*x*(*u*), *y*(*u*)). The parameter *u* is an independent variable (input) that\
    \ both *x* and *y* depend on (outputs), and as the parameter increases, the values\
    \ of *x*(*u*) and *y*(*u*) trace out a path along a plane curve (see Figure 7-2).\
    \ A parametric curve *c* in 2D describes the relationship between a set of points,\
    \ which can be expressed using two functions, one function *f*₁(*u*) to get the\
    \ *x* values and another function *f*₂(*u*) to get the *y* values (see Equation\
    \ 7-2).\n\n```\nEquation 7-2\n\nc : \n    x = f₁(u)\n    y = f₂(u)\n```"
- md: '## 7.2. Explicit notation of curves in 2D


    An **explicit notation** is a basic way to express a simple parametric curve.
    Parametric curves are defined as a function in which a dependent variable $y$
    can be explicitly written as an independent variable $x$. We can write a curve
    in standard form as Equation 7-3, where $y$ is the output variable expressed entirely
    in terms of the input variable $x$, i.e., $x = u$ and $y = f(x)$ (see Figure 7-3).
    In an explicit notation, it is easy to find the value of the function corresponding
    to each value as the dependent variable is expressed clearly in terms of the input.


    **Equation 7-3**

    $$

    c: \begin{cases} x = u \\ y = f(x) \end{cases}

    $$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_73_0.png)


    ### Example: Trigonometric curve using explicit notation


    Next, we use explicit notation to describe a parametric curve $c$ in 2D expressed
    as Equation 7-4.


    **Equation 7-4**

    $$

    c: x = u \\

    y = \log_{10}(x) \sin(x^2) + 1

    $$


    The following code models the parametric curve $c$ in 2D.


    - Lines 1 and 2 import the mathematics and plotting libraries, respectively.

    - Line 3 creates the parameter $u$ as an array with $200$ elements from $1$ to
    $5$.

    - Line 4 defines the $x$-axis equivalent to the parameter $u$.

    - Line 5 builds the $y$-axis as $f(x)$ to obtain the parametric curve in 2D using
    logarithmic and trigonometric terms.

    - Line 6 plots the curve $c$.

    - In line 7, we use the `update_traces` function to set the color and width attributes
    of the line. You can change the line color by varying the text associated with
    the `line_color` attribute. You can also change the line width by varying the
    number associated with the `line_width` attribute.

    - Finally, line 8 shows the figure (see execution in Figure 7-4).


    **Code and execute**


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(1,5,200)

    4. x = u

    5. y = np.log10(x) * np.sin(x**2) + 1

    6. fig = px.line(x=x,y=y)

    7. fig.update_traces(line_color=''black'',line_width=4)

    8. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_75_0.png)


    Figure 7-4. Trigonometric curve.


    ### Example: Polynomial curve modeling


    The parameter $u$ can adopt any range of values to plot a given parametric curve.
    Next, we use explicit notation to describe a parametric curve $c$ in 2D expressed
    as Equation 7-5.


    **Equation 7-5**

    $$

    c: x = u \\

    y = -\pi/5 + \sqrt{(1 - x^2)} \\

    \text{; with } u = -\pi/4...\pi/4

    $$


    The following code models the parametric curve $c$ in 2D.


    - Lines 1 and 2 import the libraries mathematics and plotting, respectively.

    - Line 3 creates the parameter $u$ as an array with $50$ elements from $-\pi/4$
    to $\pi/4$.

    - Line 4 defines the $x$-axis equivalent to the parameter $u$.

    - Line 5 builds the $y$-axis as $f(x)$ to obtain the parametric curve in 2D using
    a trigonometric term.

    - Finally, lines 6 to 8 set and show the curve $c$ (see execution in Figure 7-5).


    **Code and execute**


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(-np.pi/4,np.pi/4,50)

    4. x = u

    5. y = -np.pi/5 + np.sqrt(1-x**2)

    6. fig = px.line(x=x,y=y)

    7. fig.update_traces(line_color=''blue'',line_width=4)

    8. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_77_0.png)


    Explicit parametric curves are very versatile and adaptable. Thus, it can be easily
    defined by flipping the x-axis for the y-axis, i.e., in which x is the output
    variable expressed entirely in the input variable y (see Equation 7-6).


    **Equation 7-6**

    $$

    c: \begin{cases} x = f(y) \\ y = u \end{cases}

    $$


    In addition, parametric curves are much more useful than basic curves because
    the application of basic curves is limited, and it is not possible to model a
    wide range of curves, but parametric curves allow you to model as many curves
    as you want (see Figure 7-6). It is one of the reasons why the parametric curve
    notation is used in geometric modeling.


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_78_0.png)


    Figure 7-6. Conceptualization of explicit parametric curve in 2D with y = u.


    ### Example: Trigonometric curve using explicit notation


    Next, we use explicit notation with y = u to describe a parametric curve c in
    2D expressed as Equation 7-7.


    **Equation 7-7**

    $$

    c: x = y + 3 \sin^3(y) \\

    y = u \\

    \text{; with } u = -\pi...5\pi

    $$


    The following code models the parametric curve c in 2D.


    - Lines 1 and 2 import the libraries mathematics and plotting, respectively.

    - Line 3 creates the parameter u as an array with 100 elements from $-\pi$ to
    $5\pi$.

    - Line 4 defines the y-axis equivalent to the parameter u.

    - Line 5 builds the x-axis as $f(y)$ to obtain the parametric curve in 2D using
    a trigonometric term.

    - Finally, lines 6 to 8 set and show the curve $c$ (see execution in Figure 7-7).


    **Code and execute**


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(-np.pi,5*np.pi,100)

    4. y = u

    5. x = y + 3*np.sin(y)**3

    6. fig = px.line(x=x,y=y)

    7. fig.update_traces(line_color=''red'',line_width=4)

    8. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_80_0.png)


    Figure 7-7. Trigonometric curve.


    ## 7.3. Implicit notation of curves in 2D


    An **implicit curve in 2D** is a plane curve defined by an *implicit equation*
    relating two coordinate variables $(x(u), y(u))$. What is an *implicit equation*?
    Implicit means that the equation is not expressed as a solution for either $x$
    in terms of $y$ or vice versa. We can write a curve in standard form as Equation
    7-8, where $x$ and $y$ are the output variables expressed entirely in terms of
    the input parameter $u$, i.e., $x = f_1(u)$ and $y = f_2(u)$ (see Figure 7-8).


    **Equation 7-8**


    | $c:$ | $x = f_1(u)$<br>$y = f_2(u)$ | ; with $u = u_0...u_n$ |


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_81_0.png)


    Figure 7-8. Conceptualization of implicit parametric curve in 2D.


    ### Example: Circle with a unitary radius


    We use implicit notation to describe a circle with a unitary radius (r = 1), see
    Equation 7-9.


    **Equation 7-9**

    $$

    r = 1 \\

    c: x = r \cos(u) \quad \text{; with } u = 0...2\pi \\

    y = r \sin(u)

    $$


    In order to explain the process of the model in detail, we will initially define
    the parameter $u$ using just three elements: $u = [-0.6, -0.2, 0.5]$ (see Figure
    7-9); then, the parametric model will have three points $(p_0, p_1, p_2)$, where
    the point $p_0$ will be defined as $x = r \cos(-0.6) = 0.825$ and $y = r \sin(-0.6)
    = -0.565$, the point $p_1$ will be defined as $x = r \cos(-0.2) = 0.980$ and $y
    = r \sin(-0.2) = -0.199$, and the point $p_2$ will be defined as $x = r \cos(0.5)
    = 0.877$ and $y = r \sin(0.5) = 0.479.


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_82_0.png)


    The following code models the circle with a unitary radius ($r = 1$) using a parameter
    $u$ with $100$ elements.


    - Lines 1 and 2 import the libraries mathematics and plotting, respectively.

    - Line 3 creates the parameter $u$ as an array with $100$ elements from $0$ to
    $2\pi$.

    - Line 4 defines a unitary radius of the circle.

    - Lines 5 and 6 define the $x$-axis and $y$-axis in function of parameter $u$.

    - Finally, lines 7 to 10 set and show the circle $c$ (see execution in Figure
    7-10).


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(0,2*np.pi,100)

    4. r = 1

    5. x = r * np.cos(u)

    6. y = r * np.sin(u)

    7. fig = px.line(x=x,y=y)

    8. fig.update_traces(line_color=''purple'',line_width=5)

    9. fig.update_yaxes(scaleanchor="x",scaleratio=1)

    10. fig.show()

    ```'
  mdcn: '## 7.2. 二维曲线的显式表示法


    **显式表示法**是表达简单参数曲线的一种基本方式。参数曲线被定义为一个函数，其中因变量 $y$ 可以显式地表示为自变量 $x$ 的函数。我们可以将曲线写成标准形式，如公式
    7-3 所示，其中 $y$ 是完全用输入变量 $x$ 表示的输出变量，即 $x = u$ 且 $y = f(x)$（见图 7-3）。在显式表示法中，由于因变量是用输入变量清晰表达的，因此很容易找到每个值对应的函数值。


    **公式 7-3**

    $$

    c: \begin{cases} x = u \\ y = f(x) \end{cases}

    $$


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_73_0.png)


    ### 示例：使用显式表示法的三角曲线


    接下来，我们使用显式表示法来描述一个二维参数曲线 $c$，其表达式如公式 7-4 所示。


    **公式 7-4**

    $$

    c: x = u \\

    y = \log_{10}(x) \sin(x^2) + 1

    $$


    以下代码对二维参数曲线 $c$ 进行建模。


    -   第 1 行和第 2 行分别导入数学库和绘图库。

    -   第 3 行创建参数 $u$，它是一个包含 $200$ 个元素的数组，范围从 $1$ 到 $5$。

    -   第 4 行定义 $x$ 轴，等同于参数 $u$。

    -   第 5 行构建 $y$ 轴为 $f(x)$，使用对数项和三角函数项来获得二维参数曲线。

    -   第 6 行绘制曲线 $c$。

    -   在第 7 行，我们使用 `update_traces` 函数来设置线条的颜色和宽度属性。你可以通过改变与 `line_color` 属性关联的文本来改变线条颜色。你也可以通过改变与
    `line_width` 属性关联的数字来改变线条宽度。

    -   最后，第 8 行显示图形（执行结果见图 7-4）。


    **代码与执行**


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(1,5,200)

    4. x = u

    5. y = np.log10(x) * np.sin(x**2) + 1

    6. fig = px.line(x=x,y=y)

    7. fig.update_traces(line_color=''black'',line_width=4)

    8. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_75_0.png)


    图 7-4. 三角曲线。


    ### 示例：多项式曲线建模


    参数 $u$ 可以采用任何值范围来绘制给定的参数曲线。接下来，我们使用显式表示法来描述一个二维参数曲线 $c$，其表达式如公式 7-5 所示。


    **公式 7-5**

    $$

    c: x = u \\

    y = -\pi/5 + \sqrt{(1 - x^2)} \\

    \text{; 其中 } u = -\pi/4...\pi/4

    $$


    以下代码对二维参数曲线 $c$ 进行建模。


    -   第 1 行和第 2 行分别导入数学库和绘图库。

    -   第 3 行创建参数 $u$，它是一个包含 $50$ 个元素的数组，范围从 $-\pi/4$ 到 $\pi/4$。

    -   第 4 行定义 $x$ 轴，等同于参数 $u$。

    -   第 5 行构建 $y$ 轴为 $f(x)$，使用三角函数项来获得二维参数曲线。

    -   最后，第 6 至 8 行设置并显示曲线 $c$（执行结果见图 7-5）。


    **代码与执行**


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(-np.pi/4,np.pi/4,50)

    4. x = u

    5. y = -np.pi/5 + np.sqrt(1-x**2)

    6. fig = px.line(x=x,y=y)

    7. fig.update_traces(line_color=''blue'',line_width=4)

    8. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_77_0.png)


    显式参数曲线非常通用且适应性强。因此，可以通过翻转 x 轴和 y 轴来轻松定义，即 x 是完全用输入变量 y 表示的输出变量（见公式 7-6）。


    **公式 7-6**

    $$

    c: \begin{cases} x = f(y) \\ y = u \end{cases}

    $$


    此外，参数曲线比基本曲线有用得多，因为基本曲线的应用有限，无法建模广泛的曲线，而参数曲线允许你建模任意多的曲线（见图 7-6）。这是参数曲线表示法在几何建模中被使用的原因之一。


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_78_0.png)


    图 7-6. 二维显式参数曲线的概念化，其中 y = u。


    ### 示例：使用显式表示法的三角曲线


    接下来，我们使用 y = u 的显式表示法来描述一个二维参数曲线 c，其表达式如公式 7-7 所示。


    **公式 7-7**

    $$

    c: x = y + 3 \sin^3(y) \\

    y = u \\

    \text{; 其中 } u = -\pi...5\pi

    $$


    以下代码对二维参数曲线 c 进行建模。


    -   第 1 行和第 2 行分别导入数学库和绘图库。

    -   第 3 行创建参数 u，它是一个包含 100 个元素的数组，范围从 $-\pi$ 到 $5\pi$。

    -   第 4 行定义 y 轴，等同于参数 u。

    -   第 5 行构建 x 轴为 $f(y)$，使用三角函数项来获得二维参数曲线。

    -   最后，第 6 至 8 行设置并显示曲线 $c$（执行结果见图 7-7）。


    **代码与执行**


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(-np.pi,5*np.pi,100)

    4. y = u

    5. x = y + 3*np.sin(y)**3

    6. fig = px.line(x=x,y=y)

    7. fig.update_traces(line_color=''red'',line_width=4)

    8. fig.show()

    ```


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_80_0.png)


    图 7-7. 三角曲线。


    ## 7.3. 二维曲线的隐式表示法


    **二维隐式曲线**是由一个*隐式方程*定义的平面曲线，该方程关联两个坐标变量 $(x(u), y(u))$。什么是*隐式方程*？隐式意味着该方程没有表示为
    $x$ 关于 $y$ 的解，反之亦然。我们可以将曲线写成标准形式，如公式 7-8 所示，其中 $x$ 和 $y$ 是完全用输入参数 $u$ 表示的输出变量，即
    $x = f_1(u)$ 且 $y = f_2(u)$（见图 7-8）。


    **公式 7-8**


    | $c:$ | $x = f_1(u)$<br>$y = f_2(u)$ | ; 其中 $u = u_0...u_n$ |


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_81_0.png)


    图 7-8. 二维隐式参数曲线的概念化。


    ### 示例：单位半径的圆


    我们使用隐式表示法来描述一个单位半径（r = 1）的圆，见公式 7-9。


    **公式 7-9**

    $$

    r = 1 \\

    c: x = r \cos(u) \quad \text{; 其中 } u = 0...2\pi \\

    y = r \sin(u)

    $$


    为了详细解释模型的过程，我们将首先仅使用三个元素来定义参数 $u$：$u = [-0.6, -0.2, 0.5]$（见图 7-9）；然后，参数模型将有三个点
    $(p_0, p_1, p_2)$，其中点 $p_0$ 定义为 $x = r \cos(-0.6) = 0.825$ 且 $y = r \sin(-0.6)
    = -0.565$，点 $p_1$ 定义为 $x = r \cos(-0.2) = 0.980$ 且 $y = r \sin(-0.2) = -0.199$，点
    $p_2$ 定义为 $x = r \cos(0.5) = 0.877$ 且 $y = r \sin(0.5) = 0.479$。


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_82_0.png)


    以下代码使用包含 $100$ 个元素的参数 $u$ 对单位半径（$r = 1$）的圆进行建模。


    -   第 1 行和第 2 行分别导入数学库和绘图库。

    -   第 3 行创建参数 $u$，它是一个包含 $100$ 个元素的数组，范围从 $0$ 到 $2\pi$。

    -   第 4 行定义圆的单位半径。

    -   第 5 行和第 6 行根据参数 $u$ 定义 $x$ 轴和 $y$ 轴。

    -   最后，第 7 至 10 行设置并显示圆 $c$（执行结果见图 7-10）。


    ```

    1. import numpy as np

    2. import plotly.express as px

    3. u = np.linspace(0,2*np.pi,100)

    4. r = 1

    5. x = r * np.cos(u)

    6. y = r * np.sin(u)

    7. fig = px.line(x=x,y=y)

    8. fig.update_traces(line_color=''purple'',line_width=5)

    9. fig.update_yaxes(scaleanchor="x",scaleratio=1)

    10. fig.show()

    ```'
