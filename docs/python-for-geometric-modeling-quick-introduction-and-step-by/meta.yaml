    \ for each book chapter. It will allow you to keep your codes organized.\n\n###\
    \ 8.1. Definition of parametric curves in 3D\n\nA **parametric curve *c* in 3D**\
    \ is defined by a set of points $(p_0, p_1, ..., p_i, ..., p_n)$. Each point $p_i$\
    \ within this set is composed of three elements $(x(u), y(u), z(u))$. The set\
    \ of points is determined by three functions with respect to the parameter $u$\
    \ (see Figure 8-1). The parameter $u$ is an independent variable (input), while\
    \ $x$, $y$, and $z$ are dependent variables (outputs). As the parameter $u$ increases,\
    \ the values of $x(u)$, $y(u)$, and $z(u)$ trace out a path along a plane curve.\
    \ A parametric curve $c$ in 3D describes the relationship between a set of points.\
    \ This relationship is expressed through three functions: $f_1(u)$ for obtaining\
    \ the $x$ values, $f_2(u)$ for the $y$ values, and $f_3(u)$ for the $z$ values\
    \ (see Equation 8-1).\n\n```\nEquation 8-1\n$$\nc: \\begin{cases} x = f_1(u) \\\
    \\ y = f_2(u) \\\\ z = f_3(u) \\end{cases} \\quad ; \\text{with } u = u_0 \\dots\
    \ u_n$$\n```\n\n![](img/f66d0ac198ad4ed7b9ada3efb976375f_97_0.png)\n\nUnderstanding\
    \ 3D parametric curve modeling is simple. We can build on the conceptualization\
    \ learned in 2D parametric curves, and we only must add the z-axis, which is defined\
    \ as a third expression as a function of the u parameter, i.e., z = f₃(u).\n\n\
    > **Quick discussion:** Note that a parametric curve c in 3D has three coordinates:\
    \ x, y, and z. However, the parameter u has one dimension. This is why we can\
    \ say the parametric curves in 3D take a one-dimensional parameter to a three-axis\
    \ system.\n\n### 8.2. How are parametric curves modeled in 3D?\n\nWe will directly\
    \ explain the process of modeling curves in 3D by means of the following two examples.\n\
    \n#### Example: Coil curve\n\nWe use a parametric expression to describe a coil\
    \ curve, as Equation 8-2 states.\n\n```\nEquation 8-2\n\nc: r = 1\n   x = r cos(u)\n\
    \   y = r sin(u)\n   z = 2 u\n   ; with u = 0...10π\n```\n\nNote that the equation\
    \ to describe the coil curve (Equation 8-2) is like the equation for a circle\
    \ (Equation 7-9), but we must add the z-axis and extend the range value of the\
    \ parameter u.\n\nIn order to explain the process of the model in detail, we will\
    \ initially define the parameter u using just three elements: u = [1, 1.5, 2]\
    \ (see Figure 8-2); then, the parametric model will have three points (p₀, p₁,\
    \ p₂), where the point p₀ will be defined as $x = r \\cos(1) = 0.540$, and $y\
    \ = r \\sin(1) = 0.841$, and $z = 2$, the point $p_1$ will be defined as $x =\
    \ r \\cos(1.5) = 0.71, y = r \\sin(1.5) = 0.997$, and $z = 2(1.5) = 3$, and the\
    \ point $p_2$ will be defined as $x = r \\cos(2) = -0.416, y = r \\sin(2) = 0.909$,\
    \ and $z = 2(2) = 4$.\n\n![](img/f66d0ac198ad4ed7b9ada3efb976375f_99_0.png)\n\n\
    The following code models the coil curve using a parameter $u$ with $500$ elements.\n\
    \n- Lines 1 and 2 import libraries.\n- Line 3 defines the parameter $u$ as an\
    \ array with $500$ elements from $0$ to $10\\pi$.\n- Line 4 defines a unitary\
    \ radius of the circle.\n- Lines 5 to 7 define the $x$-axis, $y$-axis, and $z$-axis\
    \ in function of parameter $u$.\n- In line 8, the $px.line\\_3d$ function is employed\
    \ to create a 3D **line plot** (fig) with the $x$-axis defined by the variable\
    \ $x$, the $y$-axis defined by the variable $y$, and the $z$-axis defined by the\
    \ variable $z$.\n- Finally, lines 9 and 10 set and show the coil curve $c$ (see\
    \ execution in Figure 8-3).\n\n#### Code and execute\n\n```\n1. import numpy as\
    \ np\n2. import plotly.express as px\n3. u = np.linspace(0,10*np.pi,500)\n4. r\
    \ = 1\n5. x = r * np.cos(u)\n6. y = r * np.sin(u)\n7. z = 2 * u\n8. fig = px.line_3d(x=x,y=y,z=z)\n\
    9. fig.update_traces(line_color='darkgreen',line_width=5)\n10. fig.show()\n```\n\
    \n![](img/f66d0ac198ad4ed7b9ada3efb976375f_101_0.png)\n\nFigure 8-3. Coil curve.\n\
