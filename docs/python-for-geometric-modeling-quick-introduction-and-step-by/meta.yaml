- img_proc: true
  md: 'axis of rotation (called **axis of symmetry**) given an angle (called **revolution
    angle**). For example, given an axisymmetric model from a rotation around the
    z-axis, the parametric representation is expressed by a contented *surface profile*
    on the x-z or y-z plane, which are perpendicular planes to its *axis of rotation*
    (see figure 12-1).


    ![](img/f66d0ac198ad4ed7b9ada3efb976375f_191_0.png)


    We can consider another example where the *surface profile* is rotated around
    the y-axis. The parametric representation is expressed by a contented *surface
    profile* on the x-y or y-z plane (see figure 12-2).'
