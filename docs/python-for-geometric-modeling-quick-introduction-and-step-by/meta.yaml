    # Let’s model a rim wheel


    The rim wheel will be model I two steps:


    +   - In the first step, we will model the *rim wheel body* surface ($s_1$) from
    Equation 14-9. Note that: The expressions to describe $u_f$ and $v_f$ in Equation
    14-9 are like the expression for hypocycloid curves (see Equation 14-8). The only
    difference is the Equation 14-9 has additionally the parameter $v_b$, which models
    a hypocycloid band instead of a hypocycloid curve; thus, the parameter $v_b$ defines
    the hypocycloid band width. The *final meshgrid* ($u_f$, $v_f$) from Equation
    14-9 will have a hypocycloid band boundary. The expressions to describe the $x$,
    $y$, and $z$ axes in Equation 14-9 are like the hyperbolic'
  merge: -1
  pgno: 266
- img_proc: true
  md: 'roof modeled earlier in Section 10.2 (Equation 10-4). Then, the $x$, $y$, and
    $z$ axes from Equation 14-9 will have the hyperbolic shape surface.


    +   - In the second step, we will model the *rim wheel ring* surface ($s_2$) from
    Equation 14-9. Note that: The expressions to describe the $x_r$, $y_r$, and $z_r$
    axes in Equation 14-9 are like the surfaces of revolution based on parametric
    radius learned earlier in Section 12.2 (Equation 12-1), where the radius $r$ is
    a constant ($r = a$) and the *surface profile* is a circumference on the $x$-$y$
    plane ($x_r = r \cos(u_r)$ and $y_r = r \sin(u_r)$). Therefore, the *rim wheel
    ring* surface ($s_2$) will be a vertical cylinder.


    ```

    Equation 14-9


    $a = 3$

    $b = 1.25$


    $s_1$:

    $u_f = v_b ((a - b) \cos(u_b) + b \cos((a - b) u_b / b))$

    $v_f = v_b ((a - b) \sin(u_b) - b \sin((a - b) u_b / b))$

    $x = u_f$

    $y = v_f$

    $z = -(1 - x^2)(1 - y^2)/10$


    $s_2$:

    $r = a$

    $x_r = r \cos(u_r)$

    $y_r = r \sin(u_r)$

    $z_r = v_r$


    ; with $u_b = 0...10\pi$, $v_b = 0.65...1$

    ; with $u_r = 0...2\pi$, $v_r = -0.8...0.8$

    ```


