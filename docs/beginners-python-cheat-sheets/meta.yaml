  - "[PAGE 6]\n\n# Beginner's Python Cheat Sheet - If Statements and While Loops\n\
    \n# What are if statements? What are while loops?\n\nPython's if statements allow\
    \ you to examine the current state of a program and respond appropriately to that\
    \ state. You can write a simple if statement that checks one condition, or you\
    \ can create a complex series of statements that identify the exact conditions\
    \ you're interested in.\n\nWhile loops run as long as certain conditions remain\
    \ true. You can use while loops to let your programs run as long as your users\
    \ want them to.\n\n# Conditional Tests\n\nA conditional test is an expression\
    \ that can be evaluated as true or false. Python uses the values True and False\
    \ to decide whether the code in an if statement should be executed.\n\n# Checking\
    \ for equality\n\nA single equal sign assigns a value to a variable. A double\
    \ equal sign checks whether two values are equal.\n\nIf your conditional tests\
    \ aren't doing what you expect them to, make sure you're not accidentally using\
    \ a single equal sign.\n\n```\n>>> car = 'bmw'\n>>> car == 'bmw'\nTrue\n>>> car\
    \ = 'audi'\n>>> car == 'bmw'\nFalse\n```\n\n# Ignoring case when making a comparison\n\
    \n```\n>>> car = 'Audi'\n>>> car.lower() == 'audi'\nTrue\n```\n\n# Checking for\
    \ inequality\n\n```\n>>> topping = 'mushrooms'\n>>> topping != 'anchovies'\nTrue\n\
    ```\n\n# Numerical comparisons\n\nTesting numerical values is similar to testing\
    \ string values.\n\n# Testing equality and inequality\n\n```\n>>> age = 18\n>>>\
    \ age == 18\nTrue\n>>> age != 18\nFalse\n```\n\n# Comparison operators\n\n```\n\
    >>> age = 19\n>>> age < 21\nTrue\n>>> age <= 21\nTrue\n>>> age > 21\nFalse\n>>>\
    \ age >= 21\nFalse\n```\n\n# Checking multiple conditions\n\nYou can check multiple\
    \ conditions at the same time. The and operator returns True if all the conditions\
    \ listed are true. The or operator returns True if any condition is true.\n\n\
    # Using and to check multiple conditions\n\n```\n>>> age_0 = 22\n>>> age_1 = 18\n\
    >>> age_0 >= 21 and age_1 >= 21\nFalse\n>>> age_1 = 23\n>>> age_0 >= 21 and age_1\
    \ >= 21\nTrue\n```\n\n# Using or to check multiple conditions\n\n```\n>>> age_0\
    \ = 22\n>>> age_1 = 18\n>>> age_0 >= 21 or age_1 >= 21\nTrue\n>>> age_0 = 18\n\
    >>> age_0 >= 21 or age_1 >= 21\nFalse\n```\n\n# Boolean values\n\nA boolean value\
    \ is either True or False. Variables with boolean values are often used to keep\
    \ track of certain conditions within a program.\n\n# Simple boolean values\n\n\
    ```\ngame_active = True\nis_valid = True\ncan_edit = False\n```\n\n# If statements\n\
    \nSeveral kinds of if statements exist. Your choice of which to use depends on\
    \ the number of conditions you need to test. You can have as many elif blocks\
    \ as you need, and the else block is always optional.\n\n# Simple if statement\n\
    \n```\nage = 19\n\nif age >= 18:\n    print(\"You're old enough to vote!\")\n\
    ```\n\n# If-else statements\n\n```\nage = 17\n\nif age >= 18:\n    print(\"You're\
    \ old enough to vote!\")\nelse:\n    print(\"You can't vote yet.\")\n```\n\n#\
    \ The if-elif-else chain\n\n```\nage = 12\n\nif age < 4:\n    price = 0\nelif\
    \ age < 18:\n    price = 25\nelse:\n    price = 40\n\nprint(f\"Your cost is ${price}.\"\
    )\n```\n\n# Conditional tests with lists\n\nYou can easily test whether a certain\
    \ value is in a list. You can also test whether a list is empty before trying\
    \ to loop through the list.\n\n# Testing if a value is in a list\n\n```\n>>> players\
    \ = ['al', 'bea', 'cyn', 'dale']\n>>> 'al' in players\nTrue\n>>> 'eric' in players\n\
    False\n```\n\n# Testing if two values are in a list\n\n```\n>>> 'al' in players\
    \ and 'cyn' in players\n```\n\n![](img/12320e46b546a2862f3a411be6db7a27_6_0.png)\n\
    \nPython Crash Course\nA Hands-on, Project-Based Introduction to Programming\n\
    nostarch.com/pythoncrashcourse2e"
