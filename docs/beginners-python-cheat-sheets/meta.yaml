    msg = \"Play again?\"\nmsg_color = (100, 100, 100)\nbg_color = (230, 230, 230)\n\
    \nf = pygame.font.SysFont(None, 48)\nmsg_image = f.render(msg, True, msg_color,\n\
    \    bg_color)\nmsg_image_rect = msg_image.get_rect()\nmsg_image_rect.center =\
