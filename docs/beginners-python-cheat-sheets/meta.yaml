    \"\"Return the battery's range.\"\"\"\n        if self.size == 85:\n         \
    \   return 390\n        elif self.size == 100:\n            return 415\n```\n\n\
    ### 使用实例作为属性\n\n```python\nclass ElectricCar(Car):\n    --snip--\n\n    def __init__(self,\
