  md: "# Multiple plots\n\nYou can make as many plots as you want on one figure. When\
    \ you make multiple plots, you can emphasize relationships in the data. For example\
    \ you can fill the space between two sets of data.\n\n# Plotting two sets of data\n\
    \nHere we use ax.scatter() twice to plot square numbers and cubes on the same\
    \ figure.\n\n```\nimport matplotlib.pyplot as plt\n\nx_values = list(range(11))\n\
    squares = [x**2 for x in x_values]\ncubes = [x**3 for x in x_values]\n\nplt.style.use('seaborn')\n\
    fig, ax = plt.subplots()\n\nax.scatter(x_values, squares, c='blue', s=10)\nax.scatter(x_values,\
    \ cubes, c='red', s=10)\n\nplt.show()\n```\n\n# Filling the space between data\
    \ sets\n\nThe fill_between() method fills the space between two data sets. It\
    \ takes a series of x-values and two series of y-values. It also takes a facecolor\
    \ to use for the fill, and an optional alpha argument that controls the color's\
    \ transparency.\n\n```\nax.fill_between(x_values, cubes, squares,\n          \
    \      facecolor='blue', alpha=0.25)\n```\n\n# Working with dates and times\n\n\
    Many interesting data sets have a date or time as the x value. Python's datetime\
    \ module helps you work with this kind of data.\n\n# Generating the current date\n\
    \nThe datetime.now() function returns a datetime object representing the current\
    \ date and time.\n\n```\nfrom datetime import datetime as dt\n\ntoday = dt.now()\n\
    date_string = today.strftime('%m/%d/%Y')\nprint(date_string)\n```\n\n# Generating\
    \ a specific date\n\nYou can also generate a datetime object for any date and\
    \ time you want. The positional order of arguments is year, month, and day. The\
    \ hour, minute, second, and microsecond arguments are optional.\n\n```\nfrom datetime\
    \ import datetime as dt\n\nnew_years = dt(2021, 1, 1)\nfall_equinox = dt(year=2021,\
    \ month=9, day=22)\n```\n\n# Working with dates and times (cont.)\n\n# Datetime\
    \ formatting arguments\n\nThe strptime() function generates a datetime object\
    \ from a string, and the strftime() method generates a formatted string from a\
    \ datetime object. The following codes let you work with dates exactly as you\
    \ need to.\n\n```\n%A  Weekday name, such as Monday\n%B  Month name, such as January\n\
    %m  Month, as a number (01 to 12)\n%d  Day of the month, as a number (01 to 31)\n\
    %Y  Four-digit year, such as 2021\n%y  Two-digit year, such as 21\n%H  Hour, in\
    \ 24-hour format (00 to 23)\n%I  Hour, in 12-hour format (01 to 12)\n%p  AM or\
    \ PM\n%M  Minutes (00 to 59)\n%S  Seconds (00 to 61)\n```\n\n# Converting a string\
    \ to a datetime object\n\n```\nnew_years = dt.strptime('1/1/2021', '%m/%d/%Y')\n\
    ```\n\n# Converting a datetime object to a string\n\n```\nny_string = new_years.strftime('%B\
    \ %d, %Y')\nprint(ny_string)\n```\n\n# Plotting high temperatures\n\nThe following\
    \ code creates a list of dates and a corresponding list of high temperatures.\
    \ It then plots the high temperatures, with the date labels displayed in a specific\
    \ format.\n\n```\nfrom datetime import datetime as dt\n\nimport matplotlib.pyplot\
    \ as plt\nfrom matplotlib import dates as mdates\n\ndates = [\n    dt(2020, 6,\
    \ 21), dt(2020, 6, 22),\n    dt(2020, 6, 23), dt(2020, 6, 24),\n    ]\nhighs =\
    \ [56, 57, 57, 64]\n\nfig, ax = plt.subplots()\nax.plot(dates, highs, c='red')\n\
    \nax.set_title(\"Daily High Temps\", fontsize=24)\nax.set_ylabel(\"Temp (F)\"\
    , fontsize=16)\nx_axis = ax.get_xaxis()\nx_axis.set_major_formatter(\n    mdates.DateFormatter('%B\
    \ %d %Y')\n    )\nfig.autofmt_xdate()\n\nplt.show()\n```\n\n# Multiple plots in\
    \ one figure\n\nYou can include as many individual graphs in one figure as you\
    \ want.\n\n# Sharing an x-axis\n\nThe following code plots a set of squares and\
    \ a set of cubes on two separate graphs that share a common x-axis. The plt.subplots()\
    \ function returns a figure object and a tuple of axes. Each set of axes corresponds\
    \ to a separate plot in the figure. The first two arguments control the number\
    \ of rows and columns generated in the figure.\n\n```\nimport matplotlib.pyplot\
    \ as plt\n\nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\ncubes\
    \ = [x**3 for x in x_values]\n\nfig, axs = plt.subplots(2, 1, sharex=True)\n\n\
    axs[0].scatter(x_values, squares)\naxs[0].set_title('Squares')\n\naxs[1].scatter(x_values,\
    \ cubes, c='red')\naxs[1].set_title('Cubes')\n\nplt.show()\n```\n\n# Sharing a\
    \ y-axis\n\nTo share a y-axis, we use the sharey=True argument.\n\n```\nimport\
    \ matplotlib.pyplot as plt\n\nx_values = list(range(11))\nsquares = [x**2 for\
    \ x in x_values]\ncubes = [x**3 for x in x_values]\n\nplt.style.use('seaborn')\n\
    fig, axs = plt.subplots(1, 2, sharey=True)\n\naxs[0].scatter(x_values, squares)\n\
    axs[0].set_title('Squares')\n\naxs[1].scatter(x_values, cubes, c='red')\naxs[1].set_title('Cubes')\n\
    \nplt.show()\n```\n\n![](img/12320e46b546a2862f3a411be6db7a27_19_0.png)\n\nMore\
    \ cheat sheets available at ehmatthes.github.io/pcc_2e/"
