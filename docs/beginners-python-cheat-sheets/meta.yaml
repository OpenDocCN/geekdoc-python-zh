    last_name = 'einstein'\nfull_name = f\"{first_name} {last_name}\"\nprint(full_name)\n\
    ```\n\n# Lists\n\nA list stores a series of items in a particular order. You access\
    \ items using an index, or within a loop.\n\nMake a list\n\n```\nbikes = ['trek',\
    \ 'redline', 'giant']\n```\n\nGet the first item in a list\n\n```\nfirst_bike\
    \ = bikes[0]\n```\n\nGet the last item in a list\n\n```\nlast_bike = bikes[-1]\n\
    ```\n\nLooping through a list\n\n```\nfor bike in bikes:\n    print(bike)\n```\n\
    \nAdding items to a list\n\n```\nbikes = []\nbikes.append('trek')\nbikes.append('redline')\n\
    bikes.append('giant')\n```\n\nMaking numerical lists\n\n```\nsquares = []\nfor\
    \ x in range(1, 11):\n    squares.append(x**2)\n```\n\n# Lists (cont.)\n\nList\
    \ comprehensions\n\n```\nsquares = [x**2 for x in range(1, 11)]\n```\n\nSlicing\
    \ a list\n\n```\nfinishers = ['sam', 'bob', 'ada', 'bea']\nfirst_two = finishers[:2]\n\
    ```\n\nCopying a list\n\n```\ncopy_of_bikes = bikes[:]\n```\n\n# Tuples\n\nTuples\
    \ are similar to lists, but the items in a tuple can't be modified.\n\nMaking\
    \ a tuple\n\n```\ndimensions = (1920, 1080)\nresolutions = ('720p', '1080p', '4K')\n\
    ```\n\n# If statements\n\nIf statements are used to test for particular conditions\
    \ and respond appropriately.\n\nConditional tests\n\n```\nequal           x ==\
    \ 42\nnot equal       x != 42\ngreater than     x > 42\nor equal to     x >= 42\n\
    less than       x < 42\nor equal to     x <= 42\n```\n\nConditional tests with\
    \ lists\n\n```\n'trek' in bikes\n'surly' not in bikes\n```\n\nAssigning boolean\
    \ values\n\n```\ngame_active = True\ncan_edit = False\n```\n\nA simple if test\n\
    \n```\nif age >= 18:\n    print(\"You can vote!\")\n```\n\nIf-elif-else statements\n\
    \n```\nif age < 4:\n    ticket_price = 0\nelif age < 18:\n    ticket_price = 10\n\
    elif age < 65:\n    ticket_price = 40\nelse:\n    ticket_price = 15\n```\n\n#\
    \ Dictionaries\n\nDictionaries store connections between pieces of information.\
    \ Each item in a dictionary is a key-value pair.\n\nA simple dictionary\n\n```\n\
    alien = {'color': 'green', 'points': 5}\n```\n\nAccessing a value\n\n```\nprint(f\"\
    The alien's color is {alien['color']}.\")\n```\n\nAdding a new key-value pair\n\
    \n```\nalien['x_position'] = 0\n```\n\nLooping through all key-value pairs\n\n\
    ```\nfav_numbers = {'eric': 7, 'ever': 4, 'erin': 47}\n\nfor name, number in fav_numbers.items():\n\
    \    print(f\"{name} loves {number}.\")\n```\n\nLooping through all keys\n\n```\n\
    fav_numbers = {'eric': 7, 'ever': 4, 'erin': 47}\n\nfor name in fav_numbers.keys():\n\
    \    print(f\"{name} loves a number.\")\n```\n\nLooping through all the values\n\
    \n```\nfav_numbers = {'eric': 7, 'ever': 4, 'erin': 47}\n\nfor number in fav_numbers.values():\n\
    \    print(f\"{number} is a favorite.\")\n```\n\n# User input\n\nYour programs\
    \ can prompt the user for input. All input is stored as a string.\n\nPrompting\
    \ for a value\n\n```\nname = input(\"What's your name? \")\nprint(f\"Hello, {name}!\"\
    )\n```\n\nPrompting for numerical input\n\n```\nage = input(\"How old are you?\
    \ \")\nage = int(age)\n\npi = input(\"What's the value of pi? \")\npi = float(pi)\n\
    ```\n\n# Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_0_0.png)"
  - "[PAGE 1]\n\n# While loops\n\nA while loop repeats a block of code as long as\
    \ a certain condition is true. While loops are especially useful when you can't\
    \ know ahead of time how many times a loop should run.\n\n# A simple while loop\n\
    \n```\ncurrent_value = 1\nwhile current_value <= 5:\n    print(current_value)\n\
    \    current_value += 1\n```\n\n# Letting the user choose when to quit\n\n```\n\
    msg = ''\nwhile msg != 'quit':\n    msg = input(\"What's your message? \")\n \
    \   print(msg)\n```\n\n# Functions\n\nFunctions are named blocks of code, designed\
    \ to do one specific job. Information passed to a function is called an argument,\
    \ and information received by a function is called a parameter.\n\n# A simple\
    \ function\n\n```\ndef greet_user():\n    \"\"\"Display a simple greeting.\"\"\
    \"\n    print(\"Hello!\")\n\ngreet_user()\n```\n\n# Passing an argument\n\n```\n\
    def greet_user(username):\n    \"\"\"Display a personalized greeting.\"\"\"\n\
    \    print(f\"Hello, {username}!\")\n\ngreet_user('jesse')\n```\n\n# Default values\
    \ for parameters\n\n```\ndef make_pizza(topping='pineapple'):\n    \"\"\"Make\
    \ a single-topping pizza.\"\"\"\n    print(f\"Have a {topping} pizza!\")\n\nmake_pizza()\n\
    make_pizza('mushroom')\n```\n\n# Returning a value\n\n```\ndef add_numbers(x,\
    \ y):\n    \"\"\"Add two numbers and return the sum.\"\"\"\n    return x + y\n\
    \nsum = add_numbers(3, 5)\nprint(sum)\n```\n\n# Classes\n\nA class defines the\
    \ behavior of an object and the kind of information an object can store. The information\
    \ in a class is stored in attributes, and functions that belong to a class are\
    \ called methods. A child class inherits the attributes and methods from its parent\
    \ class.\n\n# Creating a dog class\n\n```\nclass Dog:\n    \"\"\"Represent a dog.\"\
    \"\"\n\n    def __init__(self, name):\n        \"\"\"Initialize dog object.\"\"\
    \"\n        self.name = name\n\n    def sit(self):\n        \"\"\"Simulate sitting.\"\
    \"\"\n        print(f\"{self.name} is sitting.\")\n\nmy_dog = Dog('Peso')\n\n\
    print(f\"{my_dog.name} is a great dog!\")\nmy_dog.sit()\n```\n\n# Inheritance\n\
    \n```\nclass SARDog(Dog):\n    \"\"\"Represent a search dog.\"\"\"\n\n    def\
    \ __init__(self, name):\n        \"\"\"Initialize the sardog.\"\"\"\n        super().__init__(name)\n\
    \n    def search(self):\n        \"\"\"Simulate searching.\"\"\"\n        print(f\"\
    {self.name} is searching.\")\n\nmy_dog = SARDog('Willie')\n\nprint(f\"{my_dog.name}\
    \ is a search dog.\")\nmy_dog.sit()\nmy_dog.search()\n```\n\n# Infinite Skills\n\
    \nIf you had infinite programming skills, what would you build?\nAs you're learning\
    \ to program, it's helpful to think about the real-world projects you'd like to\
    \ create. It's a good habit to keep an \"ideas\" notebook that you can refer to\
    \ whenever you want to start a new project.\nIf you haven't done so already, take\
    \ a few minutes and describe three projects you'd like to create. As you're learning\
    \ you can write small programs that relate to these ideas, so you can get practice\
    \ writing code relevant to topics you're interested in.\n\n# Working with files\n\
    \nYour programs can read from files and write to files. Files are opened in read\
    \ mode by default, but can also be opened in write mode and append mode.\n\n#\
    \ Reading a file and storing its lines\n\n```\nfilename = 'siddhartha.txt'\nwith\
    \ open(filename) as file_object:\n    lines = file_object.readlines()\n\nfor line\
    \ in lines:\n    print(line)\n```\n\n# Writing to a file\n\nThe variable referring\
    \ to the file object is often shortened to f.\n\n```\nfilename = 'journal.txt'\n\
    with open(filename, 'w') as f:\n    f.write(\"I love programming.\")\n```\n\n\
    # Appending to a file\n\n```\nfilename = 'journal.txt'\nwith open(filename, 'a')\
    \ as f:\n    f.write(\"\\nI love making games.\")\n```\n\n# Exceptions\n\nExceptions\
    \ help you respond appropriately to errors that are likely to occur. You place\
    \ code that might cause an error in the try block. Code that should run in response\
    \ to an error goes in the except block. Code that should run only if the try block\
    \ was successful goes in the else block.\n\n# Catching an exception\n\n```\nprompt\
    \ = \"How many tickets do you need? \"\nnum_tickets = input(prompt)\n\ntry:\n\
    \    num_tickets = int(num_tickets)\nexcept ValueError:\n    print(\"Please try\
    \ again.\")\nelse:\n    print(\"Your tickets are printing.\")\n```\n\n# Zen of\
    \ Python\n\nSimple is better than complex\nIf you have a choice between a simple\
    \ and a complex solution, and both work, use the simple solution. Your code will\
    \ be easier to maintain, and it will be easier for you and others to build on\
    \ that code later on.\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
  - "[PAGE 2]\n\n# Beginner's Python Cheat Sheet - Lists\n\n# What are lists?\n\n\
    A list stores a series of items in a particular order. Lists allow you to store\
    \ sets of information in one place, whether you have just a few items or millions\
    \ of items. Lists are one of Python's most powerful features readily accessible\
    \ to new programmers, and they tie together many important concepts in programming.\n\
    \n# Defining a list\n\nUse square brackets to define a list, and use commas to\
    \ separate individual items in the list. Use plural names for lists, to make it\
    \ clear that the variable represents more than one item.\n\n# Making a list\n\n\
    ```\nusers = ['val', 'bob', 'mia', 'ron', 'ned']\n```\n\n# Accessing elements\n\
    \nIndividual elements in a list are accessed according to their position, called\
    \ the index. The index of the first element is 0, the index of the second element\
    \ is 1, and so forth. Negative indices refer to items at the end of the list.\
    \ To get a particular element, write the name of the list and then the index of\
    \ the element in square brackets.\n\n# Getting the first element\n\n```\nfirst_user\
    \ = users[0]\n```\n\n# Getting the second element\n\n```\nsecond_user = users[1]\n\
    ```\n\n# Getting the last elements\n\n```\nnewest_user = users[-1]\n```\n\n# Modifying\
    \ individual items\n\nOnce you've defined a list, you can change the value of\
    \ individual elements in the list. You do this by referring to the index of the\
    \ item you want to modify.\n\n# Changing an element\n\n```\nusers[0] = 'valerie'\n\
    users[1] = 'robert'\nusers[-2] = 'ronald'\n```\n\n# Adding elements\n\nYou can\
    \ add elements to the end of a list, or you can insert them wherever you like\
    \ in a list. This allows you to modify existing lists, or start with an empty\
    \ list and then add items to it as the program develops.\n\n# Adding an element\
    \ to the end of the list\n\n```\nusers.append('amy')\n```\n\n# Starting with an\
    \ empty list\n\n```\nusers = []\nusers.append('amy')\nusers.append('val')\nusers.append('bob')\n\
    users.append('mia')\n```\n\n# Inserting elements at a particular position\n\n\
    ```\nusers.insert(0, 'joe')\nusers.insert(3, 'bea')\n```\n\n# Removing elements\n\
    \nYou can remove elements by their position in a list, or by the value of the\
    \ item. If you remove an item by its value, Python removes only the first item\
    \ that has that value.\n\n# Deleting an element by its position\n\n```\ndel users[-1]\n\
    ```\n\n# Removing an item by its value\n\n```\nusers.remove('mia')\n```\n\n# Popping\
    \ elements\n\nIf you want to work with an element that you're removing from the\
    \ list, you can \"pop\" the item. If you think of the list as a stack of items,\
    \ pop() takes an item off the top of the stack. By default pop() returns the last\
    \ element in the list, but you can also pop elements from any position in the\
    \ list.\n\n# Pop the last item from a list\n\n```\nmost_recent_user = users.pop()\n\
    print(most_recent_user)\n```\n\n# Pop the first item in a list\n\n```\nfirst_user\
    \ = users.pop(0)\nprint(first_user)\n```\n\n# List length\n\nThe len() function\
    \ returns the number of items in a list.\n\n# Find the length of a list\n\n```\n\
    num_users = len(users)\nprint(f\"We have {num_users} users.\")\n```\n\n# Sorting\
    \ a list\n\nThe sort() method changes the order of a list permanently. The sorted()\
    \ function returns a copy of the list, leaving the original list unchanged. You\
    \ can sort the items in a list in alphabetical order, or reverse alphabetical\
    \ order. You can also reverse the original order of the list. Keep in mind that\
    \ lowercase and uppercase letters may affect the sort order.\n\n# Sorting a list\
    \ permanently\n\n```\nusers.sort()\n```\n\n# Sorting a list permanently in reverse\
    \ alphabetical order\n\n```\nusers.sort(reverse=True)\n```\n\n# Sorting a list\
    \ temporarily\n\n```\nprint(sorted(users))\nprint(sorted(users, reverse=True))\n\
    ```\n\n# Reversing the order of a list\n\n```\nusers.reverse()\n```\n\n# Looping\
    \ through a list\n\nLists can contain millions of items, so Python provides an\
    \ efficient way to loop through all the items in a list. When you set up a loop,\
    \ Python pulls each item from the list one at a time and assigns it to a temporary\
    \ variable, which you provide a name for. This name should be the singular version\
    \ of the list name. The indented block of code makes up the body of the loop,\
    \ where you can work with each individual item. Any lines that are not indented\
    \ run after the loop is completed.\n\n# Printing all items in a list\n\n```\n\
    for user in users:\n    print(user)\n```\n\n# Printing a message for each item,\
    \ and a separate message afterwards\n\n```\nfor user in users:\n    print(f\"\\\
    nWelcome, {user}!\")\n    print(\"We're so glad you joined!\")\n\nprint(\"\\nWelcome,\
    \ we're glad to see you all!\")\n```\n\n# Python Crash Course\n\nA Hands-on, Project-Based\
    \ Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_2_0.png)"
- md: "## The range() function\n\nYou can use the range() function to work with a\
    \ set of numbers efficiently. The range() function starts at 0 by default, and\
    \ stops one number below the number passed to it. You can use the list() function\
    \ to efficiently generate a large list of numbers.\n\nPrinting the numbers 0 to\
    \ 1000\n\n```\nfor number in range(1001):\n    print(number)\n```\n\nPrinting\
    \ the numbers 1 to 1000\n\n```\nfor number in range(1, 1001):\n    print(number)\n\
    ```\n\nMaking a list of numbers from 1 to a million\n\n```\nnumbers = list(range(1,\
    \ 1000001))\n```\n\n## Simple statistics\n\nThere are a number of simple statistical\
    \ operations you can run on a list containing numerical data.\n\nFinding the minimum\
    \ value in a list\n\n```\nages = [93, 99, 66, 17, 85, 1, 35, 82, 2, 77]\nyoungest\
    \ = min(ages)\n```\n\nFinding the maximum value\n\n```\nages = [93, 99, 66, 17,\
    \ 85, 1, 35, 82, 2, 77]\noldest = max(ages)\n```\n\nFinding the sum of all values\n\
    \n```\nages = [93, 99, 66, 17, 85, 1, 35, 82, 2, 77]\ntotal_years = sum(ages)\n\
    ```\n\n## Slicing a list\n\nYou can work with any subset of elements from a list.\
    \ A portion of a list is called a slice. To slice a list start with the index\
    \ of the first item you want, then add a colon and the index after the last item\
    \ you want. Leave off the first index to start at the beginning of the list, and\
    \ leave off the second index to slice through the end of the list.\n\nGetting\
    \ the first three items\n\n```\nfinishers = ['kai', 'abe', 'ada', 'gus', 'zoe']\n\
    first_three = finishers[:3]\n```\n\nGetting the middle three items\n\n```\nmiddle_three\
    \ = finishers[1:4]\n```\n\nGetting the last three items\n\n```\nlast_three = finishers[-3:]\n\
    ```\n\n## Copying a list\n\nTo copy a list make a slice that starts at the first\
    \ item and ends at the last item. If you try to copy a list without using this\
    \ approach, whatever you do to the copied list will affect the original list as\
    \ well.\n\nMaking a copy of a list\n\n```\nfinishers = ['kai', 'abe', 'ada', 'gus',\
    \ 'zoe']\ncopy_of_finishers = finishers[:]\n```\n\n## List comprehensions\n\n\
    You can use a loop to generate a list based on a range of numbers or on another\
    \ list. This is a common operation, so Python offers a more efficient way to do\
    \ it. List comprehensions may look complicated at first; if so, use the for loop\
    \ approach until you're ready to start using comprehensions.\n\nTo write a comprehension,\
    \ define an expression for the values you want to store in the list. Then write\
    \ a for loop to generate input values needed to make the list.\n\nUsing a loop\
    \ to generate a list of square numbers\n\n```\nsquares = []\nfor x in range(1,\
    \ 11):\n    square = x**2\n    squares.append(square)\n```\n\nUsing a comprehension\
    \ to generate a list of square numbers\n\n```\nsquares = [x**2 for x in range(1,\
    \ 11)]\n```\n\nUsing a loop to convert a list of names to upper case\n\n```\n\
    names = ['kai', 'abe', 'ada', 'gus', 'zoe']\n\nupper_names = []\nfor name in names:\n\
    \    upper_names.append(name.upper())\n```\n\nUsing a comprehension to convert\
    \ a list of names to upper case\n\n```\nnames = ['kai', 'abe', 'ada', 'gus', 'zoe']\n\
    \nupper_names = [name.upper() for name in names]\n```\n\n## Styling your code\n\
    \nReadability counts\n\nFollow common Python formatting conventions:\n- Use four\
    \ spaces per indentation level.\n- Keep your lines to 79 characters or fewer.\n\
    - Use single blank lines to group parts of your program visually.\n\n## Tuples\n\
    \nA tuple is like a list, except you can't change the values in a tuple once it's\
    \ defined. Tuples are good for storing information that shouldn't be changed throughout\
    \ the life of a program. Tuples are usually designated by parentheses.\n\nYou\
    \ can overwrite an entire tuple, but you can't change the values of individual\
    \ elements.\n\nDefining a tuple\n\n```\ndimensions = (800, 600)\n```\n\nLooping\
    \ through a tuple\n\n```\nfor dimension in dimensions:\n    print(dimension)\n\
    ```\n\nOverwriting a tuple\n\n```\ndimensions = (800, 600)\nprint(dimensions)\n\
    \ndimensions = (1200, 900)\nprint(dimensions)\n```\n\n## Visualizing your code\n\
    \nWhen you're first learning about data structures such as lists, it helps to\
    \ visualize how Python is working with the information in your program. Python\
    \ Tutor is a great tool for seeing how Python keeps track of the information in\
    \ a list. Try running the following code on pythontutor.com, and then run your\
    \ own code.\n\nBuild a list and print the items in the list\n\n```\ndogs = []\n\
    dogs.append('willie')\ndogs.append('hootz')\ndogs.append('peso')\ndogs.append('goblin')\n\
    \nfor dog in dogs:\n    print(f\"Hello {dog}!\")\nprint(\"I love these dogs!\"\
    )\n\nprint(\"\\nThese were my first two dogs:\")\nold_dogs = dogs[:2]\nfor old_dog\
    \ in old_dogs:\n    print(old_dog)\n\ndel dogs[0]\ndogs.remove('peso')\nprint(dogs)\n\
    ```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/\n\n## Beginner's\
    \ Python Cheat Sheet - Dictionaries\n\n## What are dictionaries?\n\nPython's dictionaries\
    \ allow you to connect pieces of related information. Each piece of information\
    \ in a dictionary is stored as a key-value pair. When you provide a key, Python\
    \ returns the value associated with that key. You can loop through all the key-value\
    \ pairs, all the keys, or all the values.\n\n## Defining a dictionary\n\nUse curly\
    \ braces to define a dictionary. Use colons to connect keys and values, and use\
    \ commas to separate individual key-value pairs.\n\n## Making a dictionary\n\n\
    ```\nalien_0 = {'color': 'green', 'points': 5}\n```\n\n## Accessing values\n\n\
    To access the value associated with an individual key give the name of the dictionary\
    \ and then place the key in a set of square brackets. If the key you provided\
    \ is not in the dictionary, an error will occur.\nYou can also use the get() method,\
    \ which returns None instead of an error if the key doesn't exist. You can also\
    \ specify a default value to use if the key is not in the dictionary.\n\n## Getting\
    \ the value associated with a key\n\n```\nalien_0 = {'color': 'green', 'points':\
    \ 5}\n\nprint(alien_0['color'])\nprint(alien_0['points'])\n```\n\n## Getting the\
    \ value with get()\n\n```\nalien_0 = {'color': 'green'}\n\nalien_color = alien_0.get('color')\n\
    alien_points = alien_0.get('points', 0)\nalien_speed = alien_0.get('speed')\n\n\
    print(alien_color)\nprint(alien_points)\nprint(alien_speed)\n```\n\n## Adding\
    \ new key-value pairs\n\nYou can store as many key-value pairs as you want in\
    \ a dictionary, until your computer runs out of memory. To add a new key-value\
    \ pair to an existing dictionary give the name of the dictionary and the new key\
    \ in square brackets, and set it equal to the new value.\nThis also allows you\
    \ to start with an empty dictionary and add key-value pairs as they become relevant.\n\
    \n## Adding a key-value pair\n\n```\nalien_0 = {'color': 'green', 'points': 5}\n\
    \nalien_0['x'] = 0\nalien_0['y'] = 25\nalien_0['speed'] = 1.5\n```\n\n## Starting\
    \ with an empty dictionary\n\n```\nalien_0 = {}\nalien_0['color'] = 'green'\n\
    alien_0['points'] = 5\n```\n\n## Modifying values\n\nYou can modify the value\
    \ associated with any key in a dictionary. To do so give the name of the dictionary\
    \ and the key in square brackets, then provide the new value for that key.\n\n\
    ## Modifying values in a dictionary\n\n```\nalien_0 = {'color': 'green', 'points':\
    \ 5}\nprint(alien_0)\n\n# Change the alien's color and point value.\nalien_0['color']\
    \ = 'yellow'\nalien_0['points'] = 10\nprint(alien_0)\n```\n\n## Removing key-value\
    \ pairs\n\nYou can remove any key-value pair you want from a dictionary. To do\
    \ so use the del keyword and the dictionary name, followed by the key in square\
    \ brackets. This will delete the key and its associated value.\n\n## Deleting\
    \ a key-value pair\n\n```\nalien_0 = {'color': 'green', 'points': 5}\nprint(alien_0)\n\
    \ndel alien_0['points']\nprint(alien_0)\n```\n\n## Visualizing dictionaries\n\n\
    Try running some of these examples on pythontutor.com, and then run one of your\
    \ own programs that uses dictionaries.\n\n## Looping through a dictionary\n\n\
    You can loop through a dictionary in three ways: you can loop through all the\
    \ key-value pairs, all the keys, or all the values.\nDictionaries keep track of\
    \ the order in which key-value pairs are added. If you want to process the information\
    \ in a different order, you can sort the keys in your loop, using the sorted()\
    \ function.\n\n## Looping through all key-value pairs\n\n```\n# Store people's\
    \ favorite languages.\nfav_languages = {\n    'jen': 'python',\n    'sarah': 'c',\n\
    \    'edward': 'ruby',\n    'phil': 'python',\n    }\n\n# Show each person's favorite\
    \ language.\nfor name, language in fav_languages.items():\n    print(f\"{name}:\
    \ {language}\")\n```\n\n## Looping through all the keys\n\n```\n# Show everyone\
    \ who's taken the survey.\nfor name in fav_languages.keys():\n    print(name)\n\
    ```\n\n## Looping through all the values\n\n```\n# Show all the languages that\
    \ have been chosen.\nfor language in fav_languages.values():\n    print(language)\n\
    ```\n\n## Looping through all the keys in reverse order\n\n```\n# Show each person's\
    \ favorite language,\n#   in reverse order by the person's name.\nfor name in\
    \ sorted(fav_languages.keys(),\n                   reverse=True):\n    language\
    \ = fav_languages[name]\n    print(f\"{name}: {language}\")\n```\n\n## Dictionary\
    \ length\n\nYou can find the number of key-value pairs in a dictionary using the\
    \ len() function.\n\n## Finding a dictionary's length\n\n```\nnum_responses =\
    \ len(fav_languages)\n```\n\n## Python Crash Course\n\nA Hands-on, Project-Based\
    \ Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_4_0.png)"
  mdcn: "## range() 函数\n\n你可以使用 `range()` 函数来高效地处理一组数字。`range()` 函数默认从 0 开始，到比传入的数字小\
    \ 1 的位置结束。你可以使用 `list()` 函数来高效地生成一个包含大量数字的列表。\n\n打印数字 0 到 1000\n\n```\nfor number\
    \ in range(1001):\n    print(number)\n```\n\n打印数字 1 到 1000\n\n```\nfor number\
    \ in range(1, 1001):\n    print(number)\n```\n\n创建一个从 1 到一百万的数字列表\n\n```\nnumbers\
    \ = list(range(1, 1000001))\n```\n\n## 简单统计\n\n你可以对包含数值数据的列表执行一些简单的统计操作。\n\n查找列表中的最小值\n\
    \n```\nages = [93, 99, 66, 17, 85, 1, 35, 82, 2, 77]\nyoungest = min(ages)\n```\n\
    \n查找最大值\n\n```\nages = [93, 99, 66, 17, 85, 1, 35, 82, 2, 77]\noldest = max(ages)\n\
    ```\n\n计算所有值的总和\n\n```\nages = [93, 99, 66, 17, 85, 1, 35, 82, 2, 77]\ntotal_years\
    \ = sum(ages)\n```\n\n## 列表切片\n\n你可以处理列表中的任意元素子集。列表的一部分被称为切片。要对列表进行切片，首先指定你想要的第一个元素的索引，然后加上一个冒号和你想要的最后一个元素的索引。省略第一个索引表示从列表开头开始，省略第二个索引表示切片到列表末尾。\n\
    \n获取前三个元素\n\n```\nfinishers = ['kai', 'abe', 'ada', 'gus', 'zoe']\nfirst_three\
    \ = finishers[:3]\n```\n\n获取中间三个元素\n\n```\nmiddle_three = finishers[1:4]\n```\n\
    \n获取最后三个元素\n\n```\nlast_three = finishers[-3:]\n```\n\n## 复制列表\n\n要复制一个列表，可以创建一个从第一个元素开始到最后一个元素结束的切片。如果你不使用这种方法来复制列表，那么你对复制列表所做的任何操作也会影响原始列表。\n\
    \n复制列表\n\n```\nfinishers = ['kai', 'abe', 'ada', 'gus', 'zoe']\ncopy_of_finishers\
    \ = finishers[:]\n```\n\n## 列表推导式\n\n你可以使用循环基于一个数字范围或另一个列表来生成列表。这是一个常见的操作，因此 Python\
    \ 提供了一种更高效的方式来完成它。列表推导式起初可能看起来很复杂；如果是这样，在你准备好开始使用推导式之前，可以使用 `for` 循环方法。\n\n要编写一个推导式，首先定义一个表达式来表示你想要存储在列表中的值。然后编写一个\
    \ `for` 循环来生成创建列表所需的输入值。\n\n使用循环生成平方数列表\n\n```\nsquares = []\nfor x in range(1,\
    \ 11):\n    square = x**2\n    squares.append(square)\n```\n\n使用推导式生成平方数列表\n\n\
    ```\nsquares = [x**2 for x in range(1, 11)]\n```\n\n使用循环将名称列表转换为大写\n\n```\nnames\
    \ = ['kai', 'abe', 'ada', 'gus', 'zoe']\n\nupper_names = []\nfor name in names:\n\
    \    upper_names.append(name.upper())\n```\n\n使用推导式将名称列表转换为大写\n\n```\nnames =\
    \ ['kai', 'abe', 'ada', 'gus', 'zoe']\n\nupper_names = [name.upper() for name\
    \ in names]\n```\n\n## 代码风格\n\n可读性很重要\n\n遵循常见的 Python 格式约定：\n- 每个缩进级别使用四个空格。\n\
    - 每行保持 79 个字符或更少。\n- 使用单个空行在视觉上分隔程序的各个部分。\n\n## 元组\n\n元组类似于列表，但是一旦定义，你就不能更改元组中的值。元组非常适合存储在程序生命周期内不应更改的信息。元组通常用圆括号表示。\n\
    \n你可以覆盖整个元组，但不能更改单个元素的值。\n\n定义元组\n\n```\ndimensions = (800, 600)\n```\n\n遍历元组\n\
    \n```\nfor dimension in dimensions:\n    print(dimension)\n```\n\n覆盖元组\n\n```\n\
    dimensions = (800, 600)\nprint(dimensions)\n\ndimensions = (1200, 900)\nprint(dimensions)\n\
    ```\n\n## 可视化你的代码\n\n当你刚开始学习列表等数据结构时，可视化 Python 如何处理程序中的信息会很有帮助。Python Tutor 是一个很好的工具，可以查看\
    \ Python 如何跟踪列表中的信息。尝试在 pythontutor.com 上运行以下代码，然后运行你自己的代码。\n\n构建一个列表并打印列表中的项目\n\
    \n```\ndogs = []\ndogs.append('willie')\ndogs.append('hootz')\ndogs.append('peso')\n\
    dogs.append('goblin')\n\nfor dog in dogs:\n    print(f\"Hello {dog}!\")\nprint(\"\
    I love these dogs!\")\n\nprint(\"\\nThese were my first two dogs:\")\nold_dogs\
    \ = dogs[:2]\nfor old_dog in old_dogs:\n    print(old_dog)\n\ndel dogs[0]\ndogs.remove('peso')\n\
    print(dogs)\n```\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/ 获取\n\n## 初学者 Python 速查表\
    \ - 字典\n\n## 什么是字典？\n\nPython 的字典允许你连接相关的多条信息。字典中的每条信息都以键值对的形式存储。当你提供一个键时，Python\
    \ 会返回与该键关联的值。你可以遍历所有的键值对、所有的键或所有的值。\n\n## 定义字典\n\n使用花括号来定义字典。使用冒号连接键和值，并使用逗号分隔各个键值对。\n\
    \n## 创建字典\n\n```\nalien_0 = {'color': 'green', 'points': 5}\n```\n\n## 访问值\n\n\
    要访问与单个键关联的值，请提供字典的名称，然后将键放在一组方括号中。如果你提供的键不在字典中，将会发生错误。\n你也可以使用 `get()` 方法，如果键不存在，它会返回\
    \ `None` 而不是错误。你还可以指定一个默认值，以便在键不在字典中时使用。\n\n## 获取与键关联的值\n\n```\nalien_0 = {'color':\
    \ 'green', 'points': 5}\n\nprint(alien_0['color'])\nprint(alien_0['points'])\n\
    ```\n\n## 使用 get() 获取值\n\n```\nalien_0 = {'color': 'green'}\n\nalien_color = alien_0.get('color')\n\
    alien_points = alien_0.get('points', 0)\nalien_speed = alien_0.get('speed')\n\n\
    print(alien_color)\nprint(alien_points)\nprint(alien_speed)\n```\n\n## 添加新的键值对\n\
    \n你可以在字典中存储任意数量的键值对，直到计算机内存耗尽。要向现有字典添加新的键值对，请提供字典的名称和新的键（放在方括号中），并将其设置为新的值。\n\
    这也允许你从一个空字典开始，并在键值对变得相关时添加它们。\n\n## 添加键值对\n\n```\nalien_0 = {'color': 'green',\
    \ 'points': 5}\n\nalien_0['x'] = 0\nalien_0['y'] = 25\nalien_0['speed'] = 1.5\n\
    ```\n\n## 从空字典开始\n\n```\nalien_0 = {}\nalien_0['color'] = 'green'\nalien_0['points']\
    \ = 5\n```\n\n## 修改值\n\n你可以修改字典中与任何键关联的值。为此，请提供字典的名称和键（放在方括号中），然后提供该键的新值。\n\n\
    ## 修改字典中的值\n\n```\nalien_0 = {'color': 'green', 'points': 5}\nprint(alien_0)\n\
    \n# 更改外星人的颜色和点数。\nalien_0['color'] = 'yellow'\nalien_0['points'] = 10\nprint(alien_0)\n\
    ```\n\n## 删除键值对\n\n你可以从字典中删除任何你想要的键值对。为此，请使用 `del` 关键字和字典名称，后跟方括号中的键。这将删除该键及其关联的值。\n\
    \n## 删除键值对\n\n```\nalien_0 = {'color': 'green', 'points': 5}\nprint(alien_0)\n\
    \ndel alien_0['points']\nprint(alien_0)\n```\n\n## 可视化字典\n\n尝试在 pythontutor.com\
    \ 上运行一些这些示例，然后运行一个你自己的使用字典的程序。\n\n## 遍历字典\n\n你可以通过三种方式遍历字典：遍历所有的键值对、所有的键或所有的值。\n\
    字典会跟踪键值对添加的顺序。如果你想以不同的顺序处理信息，可以在循环中使用 `sorted()` 函数对键进行排序。\n\n## 遍历所有键值对\n\n```\n\
    # 存储人们最喜欢的语言。\nfav_languages = {\n    'jen': 'python',\n    'sarah': 'c',\n  \
    \  'edward': 'ruby',\n    'phil': 'python',\n    }\n\n# 显示每个人最喜欢的语言。\nfor name,\
    \ language in fav_languages.items():\n    print(f\"{name}: {language}\")\n```\n\
    \n## 遍历所有键\n\n```\n# 显示所有参与调查的人。\nfor name in fav_languages.keys():\n    print(name)\n\
    ```\n\n## 遍历所有值\n\n```\n# 显示所有被选择的语言。\nfor language in fav_languages.values():\n\
    \    print(language)\n```\n\n## 按相反顺序遍历所有键\n\n```\n# 显示每个人最喜欢的语言，\n#   按人名的相反顺序排列。\n\
    for name in sorted(fav_languages.keys(),\n                   reverse=True):\n\
    \    language = fav_languages[name]\n    print(f\"{name}: {language}\")\n```\n\
    \n## 字典长度\n\n你可以使用 `len()` 函数来查找字典中键值对的数量。\n\n## 查找字典的长度\n\n```\nnum_responses\
    \ = len(fav_languages)\n```\n\n## Python 入门教程\n\n一本基于实践、项目的编程入门指南\n\nnostarch.com/pythoncrashcourse2e\n\
