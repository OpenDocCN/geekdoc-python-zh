  md: "# Beginner's Python Cheat Sheet - Git\n\n# Version Control\n\nVersion control\
    \ software allows you to take snapshots of a project whenever it's in a working\
    \ state. If your project stops working, you can roll back to the most recent working\
    \ version of the project.\n\nVersion control is important because it frees you\
    \ to try new ideas with your code, without worrying that you'll break your overall\
    \ project. A distributed version control system like Git is also really useful\
    \ in working collaboratively with other developers.\n\n# Installing Git\n\nYou\
    \ can find an installer for your system at git-scm.com/. Before doing that, check\
    \ if Git is already on your system:\n\n```\n$ git --version\ngit version 2.20.1\
    \ (Apple Git-117)\n```\n\n# Configuring Git\n\nYou can configure Git so some of\
    \ its features are easier to use. The editor setting controls which editor Git\
    \ will open when it needs you to enter text.\n\nSee all global settings\n\n```\n\
    $ git config --list\n```\n\nSet username\n\n```\n$ git config --global user.name\
    \ \"eric\"\n```\n\nSet email\n\n```\n$ git config --global user.email\n    \"\
    eric@example.com\"\n```\n\nSet editor\n\n```\n$ git config --global core.editor\
    \ \"nano\"\n```\n\n# Ignoring files\n\nTo ignore files make a file called \".gitignore\"\
    , with a leading dot and no extension. Then list the directories and files you\
    \ want to ignore.\n\nIgnore directories\n\n```\n__pycache__/\nmy_venv/\n```\n\n\
    # Ignoring files (cont.)\n\nIgnore specific files\n\n```\n.DS_Store\nsecret_key.txt\n\
    ```\n\nIgnore files with specific extensions\n\n```\n*.pyc\n```\n\n# Initializing\
    \ a repository\n\nAll the files Git uses to manage the repository are located\
    \ in the hidden directory .git. Don't delete that directory, or you'll lose your\
    \ project's history.\n\nInitialize a repository\n\n```\n$ git init\nInitialized\
    \ empty Git repository in\n    my_project/.git/\n```\n\n# Checking the status\n\
    \nIt's important to check the status of your project often, even before the first\
    \ commit. This will tell you which files Git is planning to track.\n\nCheck status\n\
    \n```\n$ git status\nOn branch main\nNo commits yet\nUntracked files:\n    .gitignore\n\
    \    hello.py\n    ...\n```\n\n# Adding files\n\nYou'll need to add the files\
    \ you want Git to keep track of.\n\nAdd all files not in .gitignore\n\n```\n$\
    \ git add .\n```\n\nAdd a single file\n\n```\n$ git add hello.py\n```\n\n# Making\
    \ a commit\n\nWhen making a commit, the -am flag commits all files that have been\
    \ added, and records a commit message. (It's a good idea to check the status before\
    \ making each commit.)\n\nMake a commit with a message\n\n```\n$ git commit -am\
    \ \"Started project, everything\n    works.\"\n2 files changed, 8 insertions(+)\n\
    create mode 100644 .gitignore\n```\n\n# Checking the log\n\nGit logs all the commits\
    \ you've made. Checking the log is helpful for understanding the history of your\
    \ project.\n\nCheck log in default format\n\n```\n$ git log\ncommit 7c0a5d8...\
    \ (HEAD -> main)\nAuthor: Eric Matthes <eric@example.com>\nDate:   Mon Feb 15\
    \ 08:40:21 2021 -0900\n    Greets user.\ncommit b9aedbb...\n...\n```\n\nCheck\
    \ log in simpler format\n\n```\n$ git log --oneline\n7c0a5d8 (HEAD -> main) Greets\
    \ user.\nb9aedbb Started project, everything works.\n```\n\n# Exploring history\n\
    \nYou can explore a project's history by visiting specific commit hashes, or by\
    \ referencing the project's HEAD. HEAD refers to the most recent commit of the\
    \ current branch.\n\nVisit a specific commit\n\n```\n$ git checkout b9aedbb\n\
    ```\n\nReturn to most recent commit of main branch\n\n```\n$ git checkout main\n\
    ```\n\nVisit the previous commit\n\n```\n$ git checkout HEAD^\n```\n\nVisit an\
    \ earlier commit\n\n```\n$ git checkout HEAD^^^\n```\n\nVisit the previous commit\n\
    \n```\n$ git checkout HEAD~1\n```\n\nVisit an earlier commit\n\n```\n$ git checkout\
    \ HEAD~3\n```\n\n# Learning more\n\nYou can learn more about using Git with the\
    \ command git help. You can also go to Stack Overflow and search for git, and\
    \ then sort the questions by number of votes.\n\n# Python Crash Course\n\nA Hands-on,\
    \ Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_26_0.png)"
