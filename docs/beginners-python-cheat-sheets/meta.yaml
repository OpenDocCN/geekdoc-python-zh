  - "[PAGE 18]\n\n# Beginner's Python Cheat Sheet - Matplotlib\n\n# What is Matplotlib?\n\
    \nData visualization involves exploring data through visual representations. The\
    \ Matplotlib library helps you make visually appealing representations of the\
    \ data you're working with. Matplotlib is extremely flexible; these examples will\
    \ help you get started with a few simple visualizations.\n\n# Installing Matplotlib\n\
    \nMatplotlib runs on all systems, and you should be able to install it in one\
    \ line.\n\n# Installing Matplotlib\n\n```\n$ python -m pip install --user matplotlib\n\
    ```\n\n# Line graphs and scatter plots\n\n# Making a line graph\n\nThe fig object\
    \ represents the entire figure, or collection of plots; ax represents a single\
    \ plot in the figure. This convention is used even when there's only one plot\
    \ in the figure.\n\n```\nimport matplotlib.pyplot as plt\n\nx_values = [0, 1,\
    \ 2, 3, 4, 5]\nsquares = [0, 1, 4, 9, 16, 25]\n\nfig, ax = plt.subplots()\nax.plot(x_values,\
    \ squares)\n\nplt.show()\n```\n\n# Making a scatter plot\n\nscatter() takes a\
    \ list of x and y values; the s=10 argument controls the size of each point.\n\
    \n```\nimport matplotlib.pyplot as plt\n\nx_values = list(range(1000))\nsquares\
    \ = [x**2 for x in x_values]\n\nfig, ax = plt.subplots()\nax.scatter(x_values,\
    \ squares, s=10)\nplt.show()\n```\n\n# Customizing plots\n\nPlots can be customized\
    \ in a wide variety of ways. Just about any element of a plot can be modified.\n\
    \n# Using built-in styles\n\nMatplotlib comes with a number of built-in styles,\
    \ which you can use with one additional line of code. The style must be specified\
    \ before you create the figure.\n\n```\nimport matplotlib.pyplot as plt\n\nx_values\
    \ = list(range(1000))\nsquares = [x**2 for x in x_values]\n\nplt.style.use('seaborn')\n\
    fig, ax = plt.subplots()\nax.scatter(x_values, squares, s=10)\n\nplt.show()\n\
    ```\n\n# Seeing available styles\n\nYou can see all available styles on your system.\
    \ This can be done in a terminal session.\n\n```\n>>> import matplotlib.pyplot\
    \ as plt\n>>> plt.style.available\n['seaborn-dark', 'seaborn-darkgrid', ...\n\
    ```\n\n# Adding titles and labels, and scaling axes\n\n```\nimport matplotlib.pyplot\
    \ as plt\n\nx_values = list(range(1000))\nsquares = [x**2 for x in x_values]\n\
    \n# Set overall style to use, and plot data.\nplt.style.use('seaborn')\nfig, ax\
    \ = plt.subplots()\nax.scatter(x_values, squares, s=10)\n\n# Set chart title and\
    \ label axes.\nax.set_title('Square Numbers', fontsize=24)\nax.set_xlabel('Value',\
    \ fontsize=14)\nax.set_ylabel('Square of Value', fontsize=14)\n\n# Set scale of\
    \ axes, and size of tick labels.\nax.axis([0, 1100, 0, 1_100_000])\nax.tick_params(axis='both',\
    \ labelsize=14)\n\nplt.show()\n```\n\n# Using a colormap\n\nA colormap varies\
    \ the point colors from one shade to another, based on a certain value for each\
    \ point. The value used to determine the color of each point is passed to the\
    \ c argument, and the cmap argument specifies which colormap to use.\n\n```\n\
    ax.scatter(x_values, squares, c=squares,\n          cmap=plt.cm.Blues, s=10)\n\
    ```\n\n# Customizing plots (cont.)\n\n# Emphasizing points\n\nYou can plot as\
    \ much data as you want on one plot. Here we replot the first and last points\
    \ larger to emphasize them.\n\n```\nimport matplotlib.pyplot as plt\n\nx_values\
    \ = list(range(1000))\nsquares = [x**2 for x in x_values]\n\nfig, ax = plt.subplots()\n\
    ax.scatter(x_values, squares, c=squares,\n          cmap=plt.cm.Blues, s=10)\n\
    \nax.scatter(x_values[0], squares[0], c='green',\n          s=100)\nax.scatter(x_values[-1],\
    \ squares[-1], c='red',\n          s=100)\n\nax.set_title('Square Numbers', fontsize=24)\n\
    --snip--\n```\n\n# Removing axes\n\nYou can customize or remove axes entirely.\
    \ Here's how to access each axis, and hide it.\n\n```\nax.get_xaxis().set_visible(False)\n\
    ax.get_yaxis().set_visible(False)\n```\n\n# Setting a custom figure size\n\nYou\
    \ can make your plot as big or small as you want by using the figsize argument.\
    \ The dpi argument is optional; if you don't know your system's resolution you\
    \ can omit the argument and adjust the figsize argument accordingly.\n\n```\n\
    fig, ax = plt.subplots(figsize=(10, 6),\n                       dpi=128)\n```\n\
    \n# Saving a plot\n\nThe Matplotlib viewer has a save button, but you can also\
    \ save your visualizations programmatically by replacing plt.show() with plt.savefig().\
    \ The bbox_inches argument reduces the amount of whitespace around the figure.\n\
    \n```\nplt.savefig('squares.png', bbox_inches='tight')\n```\n\n# Online resources\n\
    \nThe matplotlib gallery and documentation are at matplotlib.org/. Be sure to\
    \ visit the examples, gallery, and pyplot links.\n\n# Python Crash Course\n\n\
    A Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_18_0.png)"
  - "[PAGE 19]\n\n# Multiple plots\n\nYou can make as many plots as you want on one\
    \ figure. When you make multiple plots, you can emphasize relationships in the\
    \ data. For example you can fill the space between two sets of data.\n\n# Plotting\
    \ two sets of data\n\nHere we use ax.scatter() twice to plot square numbers and\
    \ cubes on the same figure.\n\n```\nimport matplotlib.pyplot as plt\n\nx_values\
    \ = list(range(11))\nsquares = [x**2 for x in x_values]\ncubes = [x**3 for x in\
    \ x_values]\n\nplt.style.use('seaborn')\nfig, ax = plt.subplots()\n\nax.scatter(x_values,\
    \ squares, c='blue', s=10)\nax.scatter(x_values, cubes, c='red', s=10)\n\nplt.show()\n\
    ```\n\n# Filling the space between data sets\n\nThe fill_between() method fills\
    \ the space between two data sets. It takes a series of x-values and two series\
    \ of y-values. It also takes a facecolor to use for the fill, and an optional\
    \ alpha argument that controls the color's transparency.\n\n```\nax.fill_between(x_values,\
    \ cubes, squares,\n                facecolor='blue', alpha=0.25)\n```\n\n# Working\
    \ with dates and times\n\nMany interesting data sets have a date or time as the\
    \ x value. Python's datetime module helps you work with this kind of data.\n\n\
    # Generating the current date\n\nThe datetime.now() function returns a datetime\
    \ object representing the current date and time.\n\n```\nfrom datetime import\
    \ datetime as dt\n\ntoday = dt.now()\ndate_string = today.strftime('%m/%d/%Y')\n\
    print(date_string)\n```\n\n# Generating a specific date\n\nYou can also generate\
    \ a datetime object for any date and time you want. The positional order of arguments\
    \ is year, month, and day. The hour, minute, second, and microsecond arguments\
    \ are optional.\n\n```\nfrom datetime import datetime as dt\n\nnew_years = dt(2021,\
    \ 1, 1)\nfall_equinox = dt(year=2021, month=9, day=22)\n```\n\n# Working with\
    \ dates and times (cont.)\n\n# Datetime formatting arguments\n\nThe strptime()\
    \ function generates a datetime object from a string, and the strftime() method\
    \ generates a formatted string from a datetime object. The following codes let\
    \ you work with dates exactly as you need to.\n\n```\n%A  Weekday name, such as\
    \ Monday\n%B  Month name, such as January\n%m  Month, as a number (01 to 12)\n\
    %d  Day of the month, as a number (01 to 31)\n%Y  Four-digit year, such as 2021\n\
    %y  Two-digit year, such as 21\n%H  Hour, in 24-hour format (00 to 23)\n%I  Hour,\
    \ in 12-hour format (01 to 12)\n%p  AM or PM\n%M  Minutes (00 to 59)\n%S  Seconds\
    \ (00 to 61)\n```\n\n# Converting a string to a datetime object\n\n```\nnew_years\
    \ = dt.strptime('1/1/2021', '%m/%d/%Y')\n```\n\n# Converting a datetime object\
    \ to a string\n\n```\nny_string = new_years.strftime('%B %d, %Y')\nprint(ny_string)\n\
    ```\n\n# Plotting high temperatures\n\nThe following code creates a list of dates\
    \ and a corresponding list of high temperatures. It then plots the high temperatures,\
    \ with the date labels displayed in a specific format.\n\n```\nfrom datetime import\
    \ datetime as dt\n\nimport matplotlib.pyplot as plt\nfrom matplotlib import dates\
    \ as mdates\n\ndates = [\n    dt(2020, 6, 21), dt(2020, 6, 22),\n    dt(2020,\
    \ 6, 23), dt(2020, 6, 24),\n    ]\nhighs = [56, 57, 57, 64]\n\nfig, ax = plt.subplots()\n\
    ax.plot(dates, highs, c='red')\n\nax.set_title(\"Daily High Temps\", fontsize=24)\n\
    ax.set_ylabel(\"Temp (F)\", fontsize=16)\nx_axis = ax.get_xaxis()\nx_axis.set_major_formatter(\n\
    \    mdates.DateFormatter('%B %d %Y')\n    )\nfig.autofmt_xdate()\n\nplt.show()\n\
    ```\n\n# Multiple plots in one figure\n\nYou can include as many individual graphs\
    \ in one figure as you want.\n\n# Sharing an x-axis\n\nThe following code plots\
    \ a set of squares and a set of cubes on two separate graphs that share a common\
    \ x-axis. The plt.subplots() function returns a figure object and a tuple of axes.\
    \ Each set of axes corresponds to a separate plot in the figure. The first two\
    \ arguments control the number of rows and columns generated in the figure.\n\n\
    ```\nimport matplotlib.pyplot as plt\n\nx_values = list(range(11))\nsquares =\
    \ [x**2 for x in x_values]\ncubes = [x**3 for x in x_values]\n\nfig, axs = plt.subplots(2,\
    \ 1, sharex=True)\n\naxs[0].scatter(x_values, squares)\naxs[0].set_title('Squares')\n\
    \naxs[1].scatter(x_values, cubes, c='red')\naxs[1].set_title('Cubes')\n\nplt.show()\n\
    ```\n\n# Sharing a y-axis\n\nTo share a y-axis, we use the sharey=True argument.\n\
    \n```\nimport matplotlib.pyplot as plt\n\nx_values = list(range(11))\nsquares\
    \ = [x**2 for x in x_values]\ncubes = [x**3 for x in x_values]\n\nplt.style.use('seaborn')\n\
    fig, axs = plt.subplots(1, 2, sharey=True)\n\naxs[0].scatter(x_values, squares)\n\
    axs[0].set_title('Squares')\n\naxs[1].scatter(x_values, cubes, c='red')\naxs[1].set_title('Cubes')\n\
    \nplt.show()\n```\n\n![](img/12320e46b546a2862f3a411be6db7a27_19_0.png)\n\nMore\
    \ cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Plotly\n\n## What is Plotly?\n\nData visualization\
    \ involves exploring data through visual representations. Plotly helps you make\
    \ visually appealing representations of the data you're working with. Plotly is\
    \ particularly well suited for visualizations that will be presented online, because\
    \ it supports interactive elements.\n\n## Installing Plotly\n\nPlotly runs on\
    \ all systems, and can be installed in one line.\n\nInstalling Plotly\n\n```\n\
    $ python -m pip install --user plotly\n```\n\n## Line graphs, scatter plots, and\
    \ bar graphs\n\nTo make a plot with Plotly, you specify the data and then pass\
    \ it to a graph object. The data is stored in a list, so you can add as much data\
    \ as you want to any graph. In offline mode, the output should open automatically\
    \ in a browser window.\n\n## Making a line graph\n\nA line graph is a scatter\
    \ plot where the points are connected. Plotly generates JavaScript code to render\
    \ the plot file. If you're curious to see the code, open the squares.html file\
    \ in a text editor after running this program.\n\n```\nfrom plotly.graph_objs\
    \ import Scatter\nfrom plotly import offline\n\n# Define the data.\nx_values =\
    \ list(range(11))\nsquares = [x**2 for x in x_values]\n\n# Pass the data to a\
    \ graph object, and store it\n#   in a list.\ndata = [Scatter(x=x_values, y=squares)]\n\
    \n# Pass the data and a filename to plot().\noffline.plot(data, filename='squares.html')\n\
    ```\n\n## Making a scatter plot\n\nTo make a scatter plot, use the mode='markers'\
    \ argument to tell Plotly to only display the markers.\n\n```\ndata = [Scatter(x=x_values,\
    \ y=squares,\n                mode='markers')]\n```\n\n## Line graphs, scatter\
    \ plots, and bar graphs (cont.)\n\n## Making a bar graph\n\nTo make a bar graph,\
    \ pass your data to the Bar() graph object.\n\n```\nfrom plotly.graph_objs import\
    \ Bar\n--snip--\n\ndata = [Bar(x=x_values, y=squares)]\n\n# Pass the data and\
    \ a filename to plot().\noffline.plot(data, filename='squares.html')\n```\n\n\
    ## Adding a title and labels\n\n## Using layout objects\n\nThe Layout class allows\
    \ you to specify titles, labels, and other formatting directives for your visualizations.\n\
    \n```\nfrom plotly.graph_objs import Scatter, Layout\nfrom plotly import offline\n\
    \nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\n\ndata = [Scatter(x=x_values,\
    \ y=squares)]\n\n# Add a title, and a label for each axis.\ntitle = 'Square Numbers'\n\
    x_axis_config = {'title': 'x'}\ny_axis_config = {'title': 'Square of x'}\n\nmy_layout\
    \ = Layout(title=title,\n                   xaxis=x_axis_config, yaxis=y_axis_config)\n\
    \noffline.plot(\n    {'data': data, 'layout': my_layout},\n    filename='squares.html')\n\
    ```\n\n## Specifying complex data\n\n## Data as a dictionary\n\nPlotly is highly\
    \ customizable, and most of that flexibility comes from representing data and\
    \ formatting directives as a dictionary. Here is the same data from the previous\
    \ examples, defined as a dictionary.\nDefining the data as a dictionary also allows\
    \ you to specify more information about each series. Anything that pertains to\
    \ a specific data series such as markers, lines, and point labels, goes in the\
    \ data dictionary. Plotly has several ways of specifying data, but internally\
    \ all data is represented in this way.\n\n```\ndata = [{\n    'type': 'scatter',\n\
    \    'x': x_values,\n    'y': squares,\n    'mode': 'markers',\n}]\n```\n\n##\
    \ Multiple plots\n\nYou can include as many data series as you want in a visualization.\
    \ To do this, create one dictionary for each data series, and put these dictionaries\
    \ in the data list. Each of these dictionaries is referred to as a trace in the\
    \ Plotly documentation.\n\n## Plotting squares and cubes\n\nHere we use the 'name'\
    \ attribute to set the label for each trace.\n\n```\nfrom plotly.graph_objs import\
    \ Scatter\nfrom plotly import offline\n\nx_values = list(range(11))\nsquares =\
    \ [x**2 for x in x_values]\ncubes = [x**3 for x in x_values]\n\ndata = [\n   \
    \ {\n        # Trace 1: squares\n        'type': 'scatter',\n        'x': x_values,\n\
    \        'y': squares,\n        'name': 'Squares',\n    },\n    {\n        # Trace\
    \ 2: cubes\n        'type': 'scatter',\n        'x': x_values,\n        'y': cubes,\n\
    \        'name': 'Cubes',\n    },\n]\n\noffline.plot(data,\n             filename='squares_cubes.html')\n\
    ```\n\n## Online resources\n\nThe Plotly documentation is extensive and well-organized.\
    \ Start with the overview at plotly.com/python/. Here you can see an example of\
    \ all the basic chart types, and click on any example to see a relevant tutorial.\n\
    Then take a look at the Python Figure Reference, at plotly.com/python/reference/.\
    \ Check out the Figure Data Structure in Python page as well, at plotly.com/python/figure-structure/.\n\
    \n## Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_20_0.png)\n\
    \n## Specifying complex layouts\n\nYou can also specify the layout of your visualization\
    \ as a dictionary, which gives you much more control of the overall layout.\n\n\
    ## Layout as a dictionary\n\nHere is the same layout we used earlier, written\
    \ as a dictionary. Simple elements such as the title of the chart are just key-value\
    \ pairs. More complex elements such as axes, which can have many of their own\
    \ settings, are nested dictionaries.\n\n```\nmy_layout = {\n    'title': 'Square\
    \ Numbers',\n    'xaxis': {\n        'title': 'x',\n    },\n    'yaxis': {\n \
    \       'title': 'Square of x',\n    },\n}\n```\n\n## A more complex layout\n\n\
    Here is a layout for the same data, with more specific formatting directives in\
    \ the data and layout dictionaries.\n\n```\nfrom plotly.graph_objs import Scatter\n\
    from plotly import offline\n\nx_values = list(range(11))\nsquares = [x**2 for\
    \ x in x_values]\n\ndata = [{\n    'type': 'scatter',\n    'x': x_values,\n  \
    \  'y': squares,\n    'mode': 'markers',\n    'marker': {\n        'size': 10,\n\
    \        'color': '#6688dd',\n    },\n}]\n\nmy_layout = {\n    'title': 'Square\
    \ Numbers',\n    'xaxis': {\n        'title': 'x',\n        'titlefont': {'family':\
    \ 'monospace'},\n    },\n    'yaxis': {\n        'title': 'Square of x',\n   \
    \     'titlefont': {'family': 'monospace'},\n    },\n}\n\noffline.plot(\n    {'data':\
    \ data, 'layout': my_layout},\n    filename='squares.html')\n```\n\n## Specifying\
    \ complex layouts (cont.)\n\n## Using a colorscale\n\nColorscales are often used\
    \ to show variations in large datasets. In Plotly, colorscales are set in the\
    \ marker dictionary, nested inside a data dictionary.\n\n```\ndata = [{\n    'type':\
    \ 'scatter',\n    'x': x_values,\n    'y': squares,\n    'mode': 'markers',\n\
    \    'marker': {\n        'colorscale': 'Viridis',\n        'color': squares,\n\
    \        'colorbar': {'title': 'Value'},\n    },\n}]\n```\n\n## Using Subplots\n\
    \nIt's often useful to have multiple plots share the same axes. This is done using\
    \ the subplots module.\n\n## Adding subplots to a figure\n\nTo use the subplots\
    \ module, make a figure to hold all the charts that will be made. Then use the\
    \ add_trace() method to add each data series to the overall figure.\nFor more\
    \ help, see the documentation at plot.ly/python/subplots/.\n\n```\nfrom plotly.subplots\
    \ import make_subplots\nfrom plotly.graph_objects import Scatter\nfrom plotly\
    \ import offline\n\nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\n\
    cubes = [x**3 for x in x_values]\n\n# Make two subplots, sharing a y-axis.\nfig\
    \ = make_subplots(rows=1, cols=2,\n                    shared_yaxes=True)\n\n\
    data = {\n    'type': 'scatter',\n    'x': x_values,\n    'y': squares,\n}\nfig.add_trace(data,\
    \ row=1, col=1)\n\ndata = {\n    'type': 'scatter',\n    'x': x_values,\n    'y':\
    \ cubes,\n}\nfig.add_trace(data, row=1, col=2)\n\noffline.plot(fig, filename='subplots.html')\n\
    ```\n\n## Plotting global datasets\n\nPlotly has a variety of mapping tools. For\
    \ example, if you have a set of points represented by latitude and longitude,\
    \ you can create a scatter plot of those points overlaying a map.\n\n## The scattergeo\
    \ chart type\n\nHere's a map showing the location of three of the higher peaks\
    \ in North America. If you hover over each point, you'll see its location and\
    \ the name of the mountain.\n\n```\nfrom plotly import offline\n\n# Points in\
    \ (lat, lon) format.\npeak_coords = [\n    (63.069, -151.0063),\n    (60.5671,\
    \ -140.4055),\n    (46.8529, -121.7604),\n]\n\n# Make matching lists of lats,\
    \ lons,\n# and labels.\nlats = [pc[0] for pc in peak_coords]\nlons = [pc[1] for\
    \ pc in peak_coords]\npeak_names = ['Denali', 'Mt Logan',\n              'Mt Rainier']\n\
    \ndata = [{\n    'type': 'scattergeo',\n    'lon': lons,\n    'lat': lats,\n \
    \   'marker': {\n        'size': 20,\n        'color': '#227722',\n    },\n  \
    \  'text': peak_names,\n}]\n\nmy_layout = {\n    'title': 'Selected High Peaks',\n\
    \    'geo': {\n        'scope': 'north america',\n        'showland': True,\n\
    \        'showocean': True,\n        'showlakes': True,\n        'showrivers':\
    \ True,\n    },\n}\n\noffline.plot(\n    {'data': data, 'layout': my_layout},\n\
    \    filename='peaks.html')\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者 Python 速查表 - Plotly\n\n## 什么是 Plotly？\n\n数据可视化是通过视觉表示来探索数据的过程。Plotly\
    \ 帮助你制作出视觉上吸引人的数据表示。Plotly 特别适合用于在线展示的可视化，因为它支持交互元素。\n\n## 安装 Plotly\n\nPlotly\
    \ 可在所有系统上运行，并且可以通过一行命令安装。\n\n安装 Plotly\n\n```\n$ python -m pip install --user\
    \ plotly\n```\n\n## 折线图、散点图和条形图\n\n要使用 Plotly 制作图表，你需要指定数据，然后将其传递给图形对象。数据存储在列表中，因此你可以向任何图表添加任意多的数据。在离线模式下，输出应会自动在浏览器窗口中打开。\n\
    \n## 制作折线图\n\n折线图是将点连接起来的散点图。Plotly 生成 JavaScript 代码来渲染图表文件。如果你好奇想看看代码，可以在运行此程序后，在文本编辑器中打开\
    \ squares.html 文件。\n\n```\nfrom plotly.graph_objs import Scatter\nfrom plotly\
    \ import offline\n\n# 定义数据。\nx_values = list(range(11))\nsquares = [x**2 for x\
    \ in x_values]\n\n# 将数据传递给图形对象，并将其存储在列表中。\ndata = [Scatter(x=x_values, y=squares)]\n\
    \n# 将数据和文件名传递给 plot()。\noffline.plot(data, filename='squares.html')\n```\n\n##\
    \ 制作散点图\n\n要制作散点图，请使用 `mode='markers'` 参数来告诉 Plotly 只显示标记点。\n\n```\ndata = [Scatter(x=x_values,\
    \ y=squares,\n                mode='markers')]\n```\n\n## 折线图、散点图和条形图（续）\n\n##\
    \ 制作条形图\n\n要制作条形图，请将你的数据传递给 `Bar()` 图形对象。\n\n```\nfrom plotly.graph_objs import\
    \ Bar\n--snip--\n\ndata = [Bar(x=x_values, y=squares)]\n\n# 将数据和文件名传递给 plot()。\n\
    offline.plot(data, filename='squares.html')\n```\n\n## 添加标题和标签\n\n## 使用布局对象\n\n\
    `Layout` 类允许你为可视化指定标题、标签和其他格式化指令。\n\n```\nfrom plotly.graph_objs import Scatter,\
    \ Layout\nfrom plotly import offline\n\nx_values = list(range(11))\nsquares =\
    \ [x**2 for x in x_values]\n\ndata = [Scatter(x=x_values, y=squares)]\n\n# 添加标题和每个轴的标签。\n\
    title = 'Square Numbers'\nx_axis_config = {'title': 'x'}\ny_axis_config = {'title':\
    \ 'Square of x'}\n\nmy_layout = Layout(title=title,\n                   xaxis=x_axis_config,\
    \ yaxis=y_axis_config)\n\noffline.plot(\n    {'data': data, 'layout': my_layout},\n\
    \    filename='squares.html')\n```\n\n## 指定复杂数据\n\n## 数据作为字典\n\nPlotly 高度可定制，其大部分灵活性来自于将数据和格式化指令表示为字典。以下是与前面示例相同的数据，定义为字典。\n\
    将数据定义为字典还允许你指定关于每个数据系列的更多信息。任何与特定数据系列相关的内容，如标记、线条和点标签，都放在数据字典中。Plotly 有多种指定数据的方式，但内部所有数据都以这种方式表示。\n\
    \n```\ndata = [{\n    'type': 'scatter',\n    'x': x_values,\n    'y': squares,\n\
    \    'mode': 'markers',\n}]\n```\n\n## 多个图表\n\n你可以在一个可视化中包含任意多的数据系列。为此，请为每个数据系列创建一个字典，并将这些字典放入数据列表中。这些字典中的每一个在\
    \ Plotly 文档中都被称为一个 trace（轨迹）。\n\n## 绘制平方和立方\n\n这里我们使用 'name' 属性为每个 trace 设置标签。\n\
    \n```\nfrom plotly.graph_objs import Scatter\nfrom plotly import offline\n\nx_values\
    \ = list(range(11))\nsquares = [x**2 for x in x_values]\ncubes = [x**3 for x in\
    \ x_values]\n\ndata = [\n    {\n        # Trace 1: 平方\n        'type': 'scatter',\n\
    \        'x': x_values,\n        'y': squares,\n        'name': 'Squares',\n \
    \   },\n    {\n        # Trace 2: 立方\n        'type': 'scatter',\n        'x':\
    \ x_values,\n        'y': cubes,\n        'name': 'Cubes',\n    },\n]\n\noffline.plot(data,\n\
    \             filename='squares_cubes.html')\n```\n\n## 在线资源\n\nPlotly 文档内容丰富且组织良好。从\
    \ plotly.com/python/ 上的概述开始。在这里你可以看到所有基本图表类型的示例，并点击任何示例查看相关教程。\n然后查看 Python Figure\
    \ Reference（Python 图形参考），地址是 plotly.com/python/reference/。也请查看 plotly.com/python/figure-structure/\
    \ 上的 Figure Data Structure in Python（Python 中的图形数据结构）页面。\n\n## Python Crash Course\n\
    \nA Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_20_0.png)\n\n## 指定复杂布局\n\n你也可以将可视化的布局指定为字典，这让你对整体布局有更大的控制权。\n\
    \n## 布局作为字典\n\n这是我们之前使用的相同布局，写成字典形式。像图表标题这样的简单元素只是键值对。更复杂的元素，如坐标轴（它们可以有许多自己的设置），是嵌套字典。\n\
    \n```\nmy_layout = {\n    'title': 'Square Numbers',\n    'xaxis': {\n       \
    \ 'title': 'x',\n    },\n    'yaxis': {\n        'title': 'Square of x',\n   \
    \ },\n}\n```\n\n## 更复杂的布局\n\n这是相同数据的布局，在数据和布局字典中有更具体的格式化指令。\n\n```\nfrom plotly.graph_objs\
    \ import Scatter\nfrom plotly import offline\n\nx_values = list(range(11))\nsquares\
    \ = [x**2 for x in x_values]\n\ndata = [{\n    'type': 'scatter',\n    'x': x_values,\n\
    \    'y': squares,\n    'mode': 'markers',\n    'marker': {\n        'size': 10,\n\
    \        'color': '#6688dd',\n    },\n}]\n\nmy_layout = {\n    'title': 'Square\
    \ Numbers',\n    'xaxis': {\n        'title': 'x',\n        'titlefont': {'family':\
    \ 'monospace'},\n    },\n    'yaxis': {\n        'title': 'Square of x',\n   \
    \     'titlefont': {'family': 'monospace'},\n    },\n}\n\noffline.plot(\n    {'data':\
    \ data, 'layout': my_layout},\n    filename='squares.html')\n```\n\n## 指定复杂布局（续）\n\
    \n## 使用颜色比例尺\n\n颜色比例尺通常用于显示大型数据集中的变化。在 Plotly 中，颜色比例尺在标记字典中设置，该字典嵌套在数据字典内。\n\n\
    ```\ndata = [{\n    'type': 'scatter',\n    'x': x_values,\n    'y': squares,\n\
    \    'mode': 'markers',\n    'marker': {\n        'colorscale': 'Viridis',\n \
    \       'color': squares,\n        'colorbar': {'title': 'Value'},\n    },\n}]\n\
    ```\n\n## 使用子图\n\n让多个图表共享相同的坐标轴通常很有用。这可以通过使用 `subplots` 模块来完成。\n\n## 向图形添加子图\n\
    \n要使用 `subplots` 模块，请创建一个图形来容纳所有将要制作的图表。然后使用 `add_trace()` 方法将每个数据系列添加到整体图形中。\n\
    如需更多帮助，请参阅 plot.ly/python/subplots/ 上的文档。\n\n```\nfrom plotly.subplots import\
    \ make_subplots\nfrom plotly.graph_objects import Scatter\nfrom plotly import\
    \ offline\n\nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\n\
    cubes = [x**3 for x in x_values]\n\n# 创建两个共享 y 轴的子图。\nfig = make_subplots(rows=1,\
    \ cols=2,\n                    shared_yaxes=True)\n\ndata = {\n    'type': 'scatter',\n\
    \    'x': x_values,\n    'y': squares,\n}\nfig.add_trace(data, row=1, col=1)\n\
    \ndata = {\n    'type': 'scatter',\n    'x': x_values,\n    'y': cubes,\n}\nfig.add_trace(data,\
    \ row=1, col=2)\n\noffline.plot(fig, filename='subplots.html')\n```\n\n## 绘制全球数据集\n\
    \nPlotly 拥有各种地图工具。例如，如果你有一组由经纬度表示的点，你可以创建这些点的散点图并叠加在地图上。\n\n## scattergeo 图表类型\n\
    \n这是一张显示北美三座较高峰位置的地图。如果你将鼠标悬停在每个点上，你会看到它的位置和山峰的名称。\n\n```\nfrom plotly import\
    \ offline\n\n# 以 (纬度, 经度) 格式表示的点。\npeak_coords = [\n    (63.069, -151.0063),\n\
    \    (60.5671, -140.4055),\n    (46.8529, -121.7604),\n]\n\n# 制作匹配的纬度、经度和标签列表。\n\
    lats = [pc[0] for pc in peak_coords]\nlons = [pc[1] for pc in peak_coords]\npeak_names\
    \ = ['Denali', 'Mt Logan',\n              'Mt Rainier']\n\ndata = [{\n    'type':\
    \ 'scattergeo',\n    'lon': lons,\n    'lat': lats,\n    'marker': {\n       \
    \ 'size': 20,\n        'color': '#227722',\n    },\n    'text': peak_names,\n\
    }]\n\nmy_layout = {\n    'title': 'Selected High Peaks',\n    'geo': {\n     \
    \   'scope': 'north america',\n        'showland': True,\n        'showocean':\
    \ True,\n        'showlakes': True,\n        'showrivers': True,\n    },\n}\n\n\
    offline.plot(\n    {'data': data, 'layout': my_layout},\n    filename='peaks.html')\n\
    ```\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/ 获取"
