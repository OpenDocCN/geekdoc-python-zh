  md: "# Beginner's Python Cheat Sheet - Classes\n\n# What are classes?\n\nClasses\
    \ are the foundation of object-oriented programming. Classes represent real-world\
    \ things you want to model in your programs such as dogs, cars, and robots. You\
    \ use a class to make objects, which are specific instances of dogs, cars, and\
    \ robots. A class defines the general behavior that a whole category of objects\
    \ can have, and the information that can be associated with those objects.\n\n\
    Classes can inherit from each other — you can write a class that extends the functionality\
    \ of an existing class. This allows you to code efficiently for a wide variety\
    \ of situations. Even if you don't write many of your own classes, you'll frequently\
    \ find yourself working with classes that others have written.\n\n# Creating and\
    \ using a class\n\nConsider how we might model a car. What information would we\
    \ associate with a car, and what behavior would it have? The information is assigned\
    \ to variables called attributes, and the behavior is represented by functions.\
    \ Functions that are part of a class are called methods.\n\n# The Car class\n\n\
    ```\nclass Car:\n    \"\"\"A simple attempt to model a car.\"\"\"\n\n    def __init__(self,\
    \ make, model, year):\n        \"\"\"Initialize car attributes.\"\"\"\n      \
    \  self.make = make\n        self.model = model\n        self.year = year\n\n\
    \        # Fuel capacity and level in gallons.\n        self.fuel_capacity = 15\n\
    \        self.fuel_level = 0\n\n    def fill_tank(self):\n        \"\"\"Fill gas\
    \ tank to capacity.\"\"\"\n        self.fuel_level = self.fuel_capacity\n    \
    \    print(\"Fuel tank is full.\")\n\n    def drive(self):\n        \"\"\"Simulate\
    \ driving.\"\"\"\n        print(\"The car is moving.\")\n```\n\n# Creating and\
    \ using a class (cont.)\n\n# Creating an instance from a class\n\n```\nmy_car\
    \ = Car('audi', 'a4', 2021)\n```\n\n# Accessing attribute values\n\n```\nprint(my_car.make)\n\
    print(my_car.model)\nprint(my_car.year)\n```\n\n# Calling methods\n\n```\nmy_car.fill_tank()\n\
    my_car.drive()\n```\n\n# Creating multiple instances\n\n```\nmy_car = Car('audi',\
    \ 'a4', 2021)\nmy_old_car = Car('subaru', 'outback', 2015)\nmy_truck = Car('toyota',\
    \ 'tacoma', 2018)\nmy_old_truck = Car('ford', 'ranger', 1999)\n```\n\n# Modifying\
    \ attributes\n\nYou can modify an attribute's value directly, or you can write\
    \ methods that manage updating values more carefully. Methods like these can help\
    \ validate the kinds of changes that are being made to an attribute.\n\n# Modifying\
    \ an attribute directly\n\n```\nmy_new_car = Car('audi', 'a4', 2021)\nmy_new_car.fuel_level\
    \ = 5\n```\n\n# Writing a method to update an attribute's value\n\n```\ndef update_fuel_level(self,\
    \ new_level):\n    \"\"\"Update the fuel level.\"\"\"\n    if new_level <= self.fuel_capacity:\n\
    \        self.fuel_level = new_level\n    else:\n        print(\"The tank can't\
    \ hold that much!\")\n```\n\n# Writing a method to increment an attribute's value\n\
    \n```\ndef add_fuel(self, amount):\n    \"\"\"Add fuel to the tank.\"\"\"\n  \
    \  if (self.fuel_level + amount\n            <= self.fuel_capacity):\n       \
    \ self.fuel_level += amount\n        print(\"Added fuel.\")\n    else:\n     \
    \   print(\"The tank won't hold that much.\")\n```\n\n# Naming conventions\n\n\
    In Python class names are written in CamelCase and object names are written in\
    \ lowercase with underscores. Modules that contain classes should be named in\
    \ lowercase with underscores.\n\n# Class inheritance\n\nIf the class you're writing\
    \ is a specialized version of another class, you can use inheritance. When one\
    \ class inherits from another, it automatically takes on all the attributes and\
    \ methods of the parent class. The child class is free to introduce new attributes\
    \ and methods, and override attributes and methods of the parent class.\n\nTo\
    \ inherit from another class include the name of the parent class in parentheses\
    \ when defining the new class.\n\n# The __init__() method for a child class\n\n\
    ```\nclass ElectricCar(Car):\n    \"\"\"A simple model of an electric car.\"\"\
    \"\n\n    def __init__(self, make, model, year):\n        \"\"\"Initialize an\
    \ electric car.\"\"\"\n        super().__init__(make, model, year)\n\n       \
    \ # Attributes specific to electric cars.\n        # Battery capacity in kWh.\n\
    \        self.battery_size = 85\n\n        # Charge level in %.\n        self.charge_level\
    \ = 0\n```\n\n# Adding new methods to the child class\n\n```\nclass ElectricCar(Car):\n\
    \    --snip--\n\n    def charge(self):\n        \"\"\"Fully charge the vehicle.\"\
    \"\"\n        self.charge_level = 100\n        print(\"The vehicle is fully charged.\"\
    )\n```\n\n# Using child methods and parent methods\n\n```\nmy_ecar = ElectricCar('tesla',\
    \ 'model s', 2021)\n\nmy_ecar.charge()\nmy_ecar.drive()\n```\n\n# Finding your\
    \ workflow\n\nThere are many ways to model real world objects and situations in\
    \ code, and sometimes that variety can feel overwhelming. Pick an approach and\
    \ try it – if your first attempt doesn't work, try a different approach.\n\n#\
    \ Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_10_0.png)"
