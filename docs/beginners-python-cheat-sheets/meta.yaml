  - "[PAGE 20]\n\n# Beginner's Python Cheat Sheet - Plotly\n\n# What is Plotly?\n\n\
    Data visualization involves exploring data through visual representations. Plotly\
    \ helps you make visually appealing representations of the data you're working\
    \ with. Plotly is particularly well suited for visualizations that will be presented\
    \ online, because it supports interactive elements.\n\n# Installing Plotly\n\n\
    Plotly runs on all systems, and can be installed in one line.\n\nInstalling Plotly\n\
    \n```\n$ python -m pip install --user plotly\n```\n\n# Line graphs, scatter plots,\
    \ and bar graphs\n\nTo make a plot with Plotly, you specify the data and then\
    \ pass it to a graph object. The data is stored in a list, so you can add as much\
    \ data as you want to any graph. In offline mode, the output should open automatically\
    \ in a browser window.\n\n# Making a line graph\n\nA line graph is a scatter plot\
    \ where the points are connected. Plotly generates JavaScript code to render the\
    \ plot file. If you're curious to see the code, open the squares.html file in\
    \ a text editor after running this program.\n\n```\nfrom plotly.graph_objs import\
    \ Scatter\nfrom plotly import offline\n\n# Define the data.\nx_values = list(range(11))\n\
    squares = [x**2 for x in x_values]\n\n# Pass the data to a graph object, and store\
    \ it\n#   in a list.\ndata = [Scatter(x=x_values, y=squares)]\n\n# Pass the data\
    \ and a filename to plot().\noffline.plot(data, filename='squares.html')\n```\n\
    \n# Making a scatter plot\n\nTo make a scatter plot, use the mode='markers' argument\
    \ to tell Plotly to only display the markers.\n\n```\ndata = [Scatter(x=x_values,\
    \ y=squares,\n                mode='markers')]\n```\n\n# Line graphs, scatter\
    \ plots, and bar graphs (cont.)\n\n# Making a bar graph\n\nTo make a bar graph,\
    \ pass your data to the Bar() graph object.\n\n```\nfrom plotly.graph_objs import\
    \ Bar\n--snip--\n\ndata = [Bar(x=x_values, y=squares)]\n\n# Pass the data and\
    \ a filename to plot().\noffline.plot(data, filename='squares.html')\n```\n\n\
    # Adding a title and labels\n\n# Using layout objects\n\nThe Layout class allows\
    \ you to specify titles, labels, and other formatting directives for your visualizations.\n\
    \n```\nfrom plotly.graph_objs import Scatter, Layout\nfrom plotly import offline\n\
    \nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\n\ndata = [Scatter(x=x_values,\
    \ y=squares)]\n\n# Add a title, and a label for each axis.\ntitle = 'Square Numbers'\n\
    x_axis_config = {'title': 'x'}\ny_axis_config = {'title': 'Square of x'}\n\nmy_layout\
    \ = Layout(title=title,\n                   xaxis=x_axis_config, yaxis=y_axis_config)\n\
    \noffline.plot(\n    {'data': data, 'layout': my_layout},\n    filename='squares.html')\n\
    ```\n\n# Specifying complex data\n\n# Data as a dictionary\n\nPlotly is highly\
    \ customizable, and most of that flexibility comes from representing data and\
    \ formatting directives as a dictionary. Here is the same data from the previous\
    \ examples, defined as a dictionary.\nDefining the data as a dictionary also allows\
    \ you to specify more information about each series. Anything that pertains to\
    \ a specific data series such as markers, lines, and point labels, goes in the\
    \ data dictionary. Plotly has several ways of specifying data, but internally\
    \ all data is represented in this way.\n\n```\ndata = [{\n    'type': 'scatter',\n\
    \    'x': x_values,\n    'y': squares,\n    'mode': 'markers',\n}]\n```\n\n# Multiple\
    \ plots\n\nYou can include as many data series as you want in a visualization.\
    \ To do this, create one dictionary for each data series, and put these dictionaries\
    \ in the data list. Each of these dictionaries is referred to as a trace in the\
    \ Plotly documentation.\n\n# Plotting squares and cubes\n\nHere we use the 'name'\
    \ attribute to set the label for each trace.\n\n```\nfrom plotly.graph_objs import\
    \ Scatter\nfrom plotly import offline\n\nx_values = list(range(11))\nsquares =\
    \ [x**2 for x in x_values]\ncubes = [x**3 for x in x_values]\n\ndata = [\n   \
    \ {\n        # Trace 1: squares\n        'type': 'scatter',\n        'x': x_values,\n\
    \        'y': squares,\n        'name': 'Squares',\n    },\n    {\n        # Trace\
    \ 2: cubes\n        'type': 'scatter',\n        'x': x_values,\n        'y': cubes,\n\
    \        'name': 'Cubes',\n    },\n]\n\noffline.plot(data,\n             filename='squares_cubes.html')\n\
    ```\n\n# Online resources\n\nThe Plotly documentation is extensive and well-organized.\
    \ Start with the overview at plotly.com/python/. Here you can see an example of\
    \ all the basic chart types, and click on any example to see a relevant tutorial.\n\
    Then take a look at the Python Figure Reference, at plotly.com/python/reference/.\
    \ Check out the Figure Data Structure in Python page as well, at plotly.com/python/figure-structure/.\n\
    \n# Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_20_0.png)"
  - "[PAGE 21]\n\n# Specifying complex layouts\n\nYou can also specify the layout\
    \ of your visualization as a dictionary, which gives you much more control of\
    \ the overall layout.\n\n# Layout as a dictionary\n\nHere is the same layout we\
    \ used earlier, written as a dictionary. Simple elements such as the title of\
    \ the chart are just key-value pairs. More complex elements such as axes, which\
    \ can have many of their own settings, are nested dictionaries.\n\n```\nmy_layout\
    \ = {\n    'title': 'Square Numbers',\n    'xaxis': {\n        'title': 'x',\n\
    \    },\n    'yaxis': {\n        'title': 'Square of x',\n    },\n}\n```\n\n#\
    \ A more complex layout\n\nHere is a layout for the same data, with more specific\
    \ formatting directives in the data and layout dictionaries.\n\n```\nfrom plotly.graph_objs\
    \ import Scatter\nfrom plotly import offline\n\nx_values = list(range(11))\nsquares\
    \ = [x**2 for x in x_values]\n\ndata = [{\n    'type': 'scatter',\n    'x': x_values,\n\
    \    'y': squares,\n    'mode': 'markers',\n    'marker': {\n        'size': 10,\n\
    \        'color': '#6688dd',\n    },\n}]\n\nmy_layout = {\n    'title': 'Square\
    \ Numbers',\n    'xaxis': {\n        'title': 'x',\n        'titlefont': {'family':\
    \ 'monospace'},\n    },\n    'yaxis': {\n        'title': 'Square of x',\n   \
    \     'titlefont': {'family': 'monospace'},\n    },\n}\n\noffline.plot(\n    {'data':\
    \ data, 'layout': my_layout},\n    filename='squares.html')\n```\n\n# Specifying\
    \ complex layouts (cont.)\n\n# Using a colorscale\n\nColorscales are often used\
    \ to show variations in large datasets. In Plotly, colorscales are set in the\
    \ marker dictionary, nested inside a data dictionary.\n\n```\ndata = [{\n    'type':\
    \ 'scatter',\n    'x': x_values,\n    'y': squares,\n    'mode': 'markers',\n\
    \    'marker': {\n        'colorscale': 'Viridis',\n        'color': squares,\n\
    \        'colorbar': {'title': 'Value'},\n    },\n}]\n```\n\n# Using Subplots\n\
    \nIt's often useful to have multiple plots share the same axes. This is done using\
    \ the subplots module.\n\n# Adding subplots to a figure\n\nTo use the subplots\
    \ module, make a figure to hold all the charts that will be made. Then use the\
    \ add_trace() method to add each data series to the overall figure.\nFor more\
    \ help, see the documentation at plot.ly/python/subplots/.\n\n```\nfrom plotly.subplots\
    \ import make_subplots\nfrom plotly.graph_objects import Scatter\nfrom plotly\
    \ import offline\n\nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\n\
    cubes = [x**3 for x in x_values]\n\n# Make two subplots, sharing a y-axis.\nfig\
    \ = make_subplots(rows=1, cols=2,\n                    shared_yaxes=True)\n\n\
    data = {\n    'type': 'scatter',\n    'x': x_values,\n    'y': squares,\n}\nfig.add_trace(data,\
    \ row=1, col=1)\n\ndata = {\n    'type': 'scatter',\n    'x': x_values,\n    'y':\
    \ cubes,\n}\nfig.add_trace(data, row=1, col=2)\n\noffline.plot(fig, filename='subplots.html')\n\
    ```\n\n# Plotting global datasets\n\nPlotly has a variety of mapping tools. For\
    \ example, if you have a set of points represented by latitude and longitude,\
    \ you can create a scatter plot of those points overlaying a map.\n\n# The scattergeo\
    \ chart type\n\nHere's a map showing the location of three of the higher peaks\
    \ in North America. If you hover over each point, you'll see its location and\
    \ the name of the mountain.\n\n```\nfrom plotly import offline\n\n# Points in\
    \ (lat, lon) format.\npeak_coords = [\n    (63.069, -151.0063),\n    (60.5671,\
    \ -140.4055),\n    (46.8529, -121.7604),\n]\n\n# Make matching lists of lats,\
    \ lons,\n# and labels.\nlats = [pc[0] for pc in peak_coords]\nlons = [pc[1] for\
    \ pc in peak_coords]\npeak_names = ['Denali', 'Mt Logan',\n              'Mt Rainier']\n\
    \ndata = [{\n    'type': 'scattergeo',\n    'lon': lons,\n    'lat': lats,\n \
    \   'marker': {\n        'size': 20,\n        'color': '#227722',\n    },\n  \
    \  'text': peak_names,\n}]\n\nmy_layout = {\n    'title': 'Selected High Peaks',\n\
    \    'geo': {\n        'scope': 'north america',\n        'showland': True,\n\
    \        'showocean': True,\n        'showlakes': True,\n        'showrivers':\
    \ True,\n    },\n}\n\noffline.plot(\n    {'data': data, 'layout': my_layout},\n\
    \    filename='peaks.html')\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Django\n\n## What is Django?\n\nDjango is\
    \ a web framework that helps you build interactive websites using Python. With\
    \ Django you define the kind of data your site will work with, and the ways your\
    \ users can work with that data.\nDjango works well for tiny projects, and just\
    \ as well for sites with millions of users.\n\n## Installing Django\n\nIt's usually\
    \ best to install Django to a virtual environment, where your project can be isolated\
    \ from your other Python projects. Most commands assume you're working in an active\
    \ virtual environment.\n\n### Create a virtual environment\n\n```\n$ python -m\
    \ venv ll_env\n```\n\n### Activate the environment (macOS and Linux)\n\n```\n\
    $ source ll_env/bin/activate\n```\n\n### Activate the environment (Windows)\n\n\
    ```\n> ll_env\\Scripts\\activate\n```\n\n### Install Django to the active environment\n\
    \n```\n(ll_env)$ pip install Django\n```\n\n## Creating a project\n\nTo start\
    \ we'll create a new project, create a database, and start a development server.\n\
    \n### Create a new project\n\nMake sure to include the dot at the end of this\
    \ command.\n\n```\n$ django-admin startproject learning_log .\n```\n\n### Create\
    \ a database\n\n```\n$ python manage.py migrate\n```\n\n### View the project\n\
    \nAfter issuing this command, you can view the project at http://localhost:8000/.\n\
    \n```\n$ python manage.py runserver\n```\n\n### Create a new app\n\nA Django project\
    \ is made up of one or more apps.\n\n```\n$ python manage.py startapp learning_logs\n\
    ```\n\n## Working with models\n\nThe data in a Django project is structured as\
    \ a set of models. Each model is represented by a class.\n\n### Defining a model\n\
    \nTo define the models for your app, modify the file models.py that was created\
    \ in your app's folder. The `__str__()` method tells Django how to represent data\
    \ objects based on this model.\n\n```\nfrom django.db import models\n\nclass Topic(models.Model):\n\
    \    \"\"\"A topic the user is learning about.\"\"\"\n\n    text = models.CharField(max_length=200)\n\
    \    date_added = models.DateTimeField(\n        auto_now_add=True)\n\n    def\
    \ __str__(self):\n        return self.text\n```\n\n### Activating a model\n\n\
    To use a model the app must be added to the list `INSTALLED_APPS`, which is stored\
    \ in the project's settings.py file.\n\n```\nINSTALLED_APPS = [\n    # My apps.\n\
    \    'learning_logs',\n\n    # Default Django apps.\n    'django.contrib.admin',\n\
    ]\n```\n\n### Migrating the database\n\nThe database needs to be modified to store\
    \ the kind of data that the model represents. You'll need to run these commands\
    \ every time you create a new model, or modify an existing model.\n\n```\n$ python\
    \ manage.py makemigrations learning_logs\n$ python manage.py migrate\n```\n\n\
    ### Creating a superuser\n\nA superuser is a user account that has access to all\
    \ aspects of the project.\n\n```\n$ python manage.py createsuperuser\n```\n\n\
    ### Registering a model\n\nYou can register your models with Django's admin site,\
    \ which makes it easier to work with the data in your project. To do this, modify\
    \ the app's admin.py file. View the admin site at http://localhost:8000/admin/.\
    \ You'll need to log in using a superuser account.\n\n```\nfrom django.contrib\
    \ import admin\n\nfrom .models import Topic\n\nadmin.site.register(Topic)\n```\n\
    \n## Building a simple home page\n\nUsers interact with a project through web\
    \ pages, and a project's home page can start out as a simple page with no data.\
    \ A page usually needs a URL, a view, and a template.\n\n### Mapping a project's\
    \ URLs\n\nThe project's main urls.py file tells Django where to find the urls.py\
    \ files associated with each app in the project.\n\n```\nfrom django.contrib import\
    \ admin\nfrom django.urls import path, include\n\nurlpatterns = [\n    path('admin/',\
    \ admin.site.urls),\n    path('', include('learning_logs.urls')),\n]\n```\n\n\
    ### Mapping an app's URLs\n\nAn app's urls.py file tells Django which view to\
    \ use for each URL in the app. You'll need to make this file yourself, and save\
    \ it in the app's folder.\n\n```\nfrom django.urls import path\n\nfrom . import\
    \ views\n\napp_name = 'learning_logs'\nurlpatterns = [\n    # Home page.\n   \
    \ path('', views.index, name='index'),\n]\n```\n\n### Writing a simple view\n\n\
    A view takes information from a request and sends data to the browser, often through\
    \ a template. View functions are stored in an app's views.py file. This simple\
    \ view function doesn't pull in any data, but it uses the template index.html\
    \ to render the home page.\n\n```\nfrom django.shortcuts import render\n\ndef\
    \ index(request):\n    \"\"\"The home page for Learning Log.\"\"\"\n    return\
    \ render(request,\n        'learning_logs/index.html')\n```\n\n### Online resources\n\
    \nThe documentation for Django is available at docs.djangoproject.com/. The Django\
    \ documentation is thorough and user-friendly, so check it out!\n\n### Python\
    \ Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_22_0.png)\n\n## Building a simple home\
    \ page (cont.)\n\n### Writing a simple template\n\nA template sets up the structure\
    \ for a page. It's a mix of html and template code, which is like Python but not\
    \ as powerful. Make a folder called templates inside the project folder. Inside\
    \ the templates folder make another folder with the same name as the app. This\
    \ is where the template files should be saved.\n\nThe home page template will\
    \ be saved as learning_logs/templates/learning_logs/index.html.\n\n```\n<p>Learning\
    \ Log</p>\n\n<p>Learning Log helps you keep track of your learning, for any topic\
    \ you're learning about.</p>\n```\n\n### Template Inheritance\n\nMany elements\
    \ of a web page are repeated on every page in the site, or every page in a section\
    \ of the site. By writing one parent template for the site, and one for each section,\
    \ you can easily modify the look and feel of your entire site.\n\n### The parent\
    \ template\n\nThe parent template defines the elements common to a set of pages,\
    \ and defines blocks that will be filled by individual pages.\n\n```\n<p>\n  <a\
    \ href=\"{% url 'learning_logs:index' %}\">\n    Learning Log\n  </a>\n</p>\n\n\
    {% block content %}{% endblock content %}\n```\n\n### The child template\n\nThe\
    \ child template uses the `{% extends %}` template tag to pull in the structure\
    \ of the parent template. It then defines the content for any blocks defined in\
    \ the parent template.\n\n```\n{% extends 'learning_logs/base.html' %}\n\n{% block\
    \ content %}\n\n  <p>\n    Learning Log helps you keep track\n    of your learning,\
    \ for any topic you're\n    learning about.\n  </p>\n\n{% endblock content %}\n\
    ```\n\n### Template indentation\n\nPython code is usually indented by four spaces.\
    \ In templates you'll often see two spaces used for indentation, because elements\
    \ tend to be nested more deeply in templates.\n\n### Another model\n\nA new model\
    \ can use an existing model. The `ForeignKey` attribute establishes a connection\
    \ between instances of the two related models. Make sure to migrate the database\
    \ after adding a new model to your app.\n\n### Defining a model with a foreign\
    \ key\n\n```\nclass Entry(models.Model):\n    \"\"\"Learning log entries for a\
    \ topic.\"\"\"\n    topic = models.ForeignKey(Topic,\n            on_delete=models.CASCADE)\n\
    \    text = models.TextField()\n    date_added = models.DateTimeField(\n     \
    \       auto_now_add=True)\n\n    def __str__(self):\n        return f\"{self.text[:50]}...\"\
    \n```\n\n## Building a page with data\n\nMost pages in a project need to present\
    \ data that's specific to the current user.\n\n### URL parameters\n\nA URL often\
    \ needs to accept a parameter telling it what data to access from the database.\
    \ The URL pattern shown here looks for the ID of a specific topic and assigns\
    \ it to the parameter `topic_id`.\n\n```\nurlpatterns = [\n    --snip--\n    #\
    \ Detail page for a single topic.\n    path('topics/<int:topic_id>/', views.topic,\n\
    \         name='topic'),\n]\n```\n\n### Using data in a view\n\nThe view uses\
    \ a parameter from the URL to pull the correct data from the database. In this\
    \ example the view is sending a context dictionary to the template, containing\
    \ data that should be displayed on the page. You'll need to import any model you're\
    \ using.\n\n```\ndef topic(request, topic_id):\n    \"\"\"Show a topic and all\
    \ its entries.\"\"\"\n    topic = Topic.objects.get(id=topic_id)\n    entries\
    \ = topic.entry_set.order_by(\n            '-date_added')\n    context = {\n \
    \       'topic': topic,\n        'entries': entries,\n    }\n    return render(request,\n\
    \            'learning_logs/topic.html', context)\n```\n\n### Restarting the development\
    \ server\n\nIf you make a change to your project and the change doesn't seem to\
    \ have any effect, try restarting the server:\n\n```\n$ python manage.py runserver\n\
    ```\n\n## Building a page with data (cont.)\n\n### Using data in a template\n\n\
    The data in the view function's context dictionary is available within the template.\
    \ This data is accessed using template variables, which are indicated by doubled\
    \ curly braces.\n\nThe vertical line after a template variable indicates a filter.\
    \ In this case a filter called `date` formats date objects, and the filter `linebreaks`\
    \ renders paragraphs properly on a web page.\n\n```\n{% extends 'learning_logs/base.html'\
    \ %}\n\n{% block content %}\n\n  <p>Topic: {{ topic }}</p>\n\n  <p>Entries:</p>\n\
    \  <ul>\n    {% for entry in entries %}\n      <li>\n        <p>\n          {{\
    \ entry.date_added|date:'M d, Y H:i' }}\n        </p>\n\n        <p>\n       \
    \   {{ entry.text|linebreaks }}\n        </p>\n      </li>\n    {% empty %}\n\
    \      <li>There are no entries yet.</li>\n    {% endfor %}\n  </ul>\n\n{% endblock\
    \ content %}\n```\n\n### The Django shell\n\nYou can explore the data in your\
    \ project from the command line. This is helpful for developing queries and testing\
    \ code snippets.\n\n### Start a shell session\n\n```\n$ python manage.py shell\n\
    ```\n\n### Access data from the project\n\n```\n>>> from learning_logs.models\
    \ import Topic\n>>> Topic.objects.all()\n[<Topic: Chess>, <Topic: Rock Climbing>]\n\
    >>> topic = Topic.objects.get(id=1)\n>>> topic.text\n'Chess'\n>>> topic.entry_set.all()\n\
    <QuerySet [<Entry: In the opening phase...>]>\n```\n\nMore cheat sheets available\
    \ at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者 Python 速查表 - Django\n\n## 什么是 Django？\n\nDjango 是一个 Web 框架，可帮助你使用\
    \ Python 构建交互式网站。通过 Django，你可以定义网站将处理的数据类型，以及用户与这些数据交互的方式。\nDjango 既适用于小型项目，也同样适用于拥有数百万用户的网站。\n\
    \n## 安装 Django\n\n通常最好将 Django 安装到虚拟环境中，这样你的项目可以与其他 Python 项目隔离。大多数命令都假设你正在一个活动的虚拟环境中工作。\n\
    \n### 创建虚拟环境\n\n```\n$ python -m venv ll_env\n```\n\n### 激活环境（macOS 和 Linux）\n\
    \n```\n$ source ll_env/bin/activate\n```\n\n### 激活环境（Windows）\n\n```\n> ll_env\\\
    Scripts\\activate\n```\n\n### 将 Django 安装到活动环境中\n\n```\n(ll_env)$ pip install\
    \ Django\n```\n\n## 创建项目\n\n首先，我们将创建一个新项目，创建一个数据库，并启动一个开发服务器。\n\n### 创建新项目\n\n\
    请确保在此命令末尾包含点号。\n\n```\n$ django-admin startproject learning_log .\n```\n\n###\
    \ 创建数据库\n\n```\n$ python manage.py migrate\n```\n\n### 查看项目\n\n执行此命令后，你可以在 http://localhost:8000/\
    \ 查看项目。\n\n```\n$ python manage.py runserver\n```\n\n### 创建新应用\n\n一个 Django 项目由一个或多个应用组成。\n\
    \n```\n$ python manage.py startapp learning_logs\n```\n\n## 使用模型\n\nDjango 项目中的数据被组织为一组模型。每个模型由一个类表示。\n\
    \n### 定义模型\n\n要为你的应用定义模型，请修改在应用文件夹中创建的 `models.py` 文件。`__str__()` 方法告诉 Django\
    \ 如何基于此模型表示数据对象。\n\n```\nfrom django.db import models\n\nclass Topic(models.Model):\n\
    \    \"\"\"用户正在学习的主题。\"\"\"\n\n    text = models.CharField(max_length=200)\n \
    \   date_added = models.DateTimeField(\n        auto_now_add=True)\n\n    def\
    \ __str__(self):\n        return self.text\n```\n\n### 激活模型\n\n要使用模型，必须将该应用添加到\
    \ `INSTALLED_APPS` 列表中，该列表存储在项目的 `settings.py` 文件中。\n\n```\nINSTALLED_APPS = [\n\
    \    # 我的应用。\n    'learning_logs',\n\n    # 默认的 Django 应用。\n    'django.contrib.admin',\n\
    ]\n```\n\n### 迁移数据库\n\n需要修改数据库以存储模型所代表的数据类型。每次创建新模型或修改现有模型时，都需要运行这些命令。\n\n```\n\
    $ python manage.py makemigrations learning_logs\n$ python manage.py migrate\n\
    ```\n\n### 创建超级用户\n\n超级用户是一个可以访问项目所有方面的用户账户。\n\n```\n$ python manage.py createsuperuser\n\
    ```\n\n### 注册模型\n\n你可以将模型注册到 Django 的管理站点，这使得处理项目中的数据更加容易。为此，请修改应用的 `admin.py`\
    \ 文件。在 http://localhost:8000/admin/ 查看管理站点。你需要使用超级用户账户登录。\n\n```\nfrom django.contrib\
    \ import admin\n\nfrom .models import Topic\n\nadmin.site.register(Topic)\n```\n\
    \n## 构建简单主页\n\n用户通过网页与项目交互，项目的主页可以从一个没有数据的简单页面开始。一个页面通常需要一个 URL、一个视图和一个模板。\n\n\
    ### 映射项目的 URL\n\n项目的主 `urls.py` 文件告诉 Django 在哪里可以找到与项目中每个应用关联的 `urls.py` 文件。\n\
    \n```\nfrom django.contrib import admin\nfrom django.urls import path, include\n\
    \nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('', include('learning_logs.urls')),\n\
    ]\n```\n\n### 映射应用的 URL\n\n应用的 `urls.py` 文件告诉 Django 对于应用中的每个 URL 使用哪个视图。你需要自己创建此文件，并将其保存在应用文件夹中。\n\
    \n```\nfrom django.urls import path\n\nfrom . import views\n\napp_name = 'learning_logs'\n\
    urlpatterns = [\n    # 主页。\n    path('', views.index, name='index'),\n]\n```\n\
    \n### 编写简单视图\n\n视图从请求中获取信息并将数据发送到浏览器，通常通过模板。视图函数存储在应用的 `views.py` 文件中。这个简单的视图函数不获取任何数据，但它使用模板\
    \ `index.html` 来渲染主页。\n\n```\nfrom django.shortcuts import render\n\ndef index(request):\n\
    \    \"\"\"学习日志的主页。\"\"\"\n    return render(request,\n        'learning_logs/index.html')\n\
    ```\n\n### 在线资源\n\nDjango 的文档可在 docs.djangoproject.com/ 获取。Django 文档全面且用户友好，所以请查看一下！\n\
    \n### Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_22_0.png)\n\
    \n## 构建简单主页（续）\n\n### 编写简单模板\n\n模板为页面设置结构。它是 HTML 和模板代码的混合，模板代码类似于 Python 但功能不那么强大。在项目文件夹内创建一个名为\
    \ `templates` 的文件夹。在 `templates` 文件夹内，创建另一个与应用同名的文件夹。模板文件应保存在此处。\n\n主页模板将保存为 `learning_logs/templates/learning_logs/index.html`。\n\
    \n```\n<p>学习日志</p>\n\n<p>学习日志帮助你跟踪你正在学习的任何主题的学习情况。</p>\n```\n\n### 模板继承\n\n网页的许多元素在网站的每个页面或网站某个部分的每个页面上重复出现。通过为网站编写一个父模板，为每个部分编写一个子模板，你可以轻松修改整个网站的外观和感觉。\n\
    \n### 父模板\n\n父模板定义了一组页面共有的元素，并定义了将由各个页面填充的块。\n\n```\n<p>\n  <a href=\"{% url 'learning_logs:index'\
    \ %}\">\n    学习日志\n  </a>\n</p>\n\n{% block content %}{% endblock content %}\n\
    ```\n\n### 子模板\n\n子模板使用 `{% extends %}` 模板标签来引入父模板的结构。然后它为父模板中定义的任何块定义内容。\n\n\
    ```\n{% extends 'learning_logs/base.html' %}\n\n{% block content %}\n\n  <p>\n\
    \    学习日志帮助你跟踪\n    你正在学习的任何主题的学习情况。\n  </p>\n\n{% endblock content %}\n```\n\n\
    ### 模板缩进\n\nPython 代码通常缩进四个空格。在模板中，你通常会看到使用两个空格进行缩进，因为模板中的元素往往嵌套得更深。\n\n### 另一个模型\n\
    \n一个新模型可以使用现有模型。`ForeignKey` 属性在两个相关模型的实例之间建立连接。确保在向应用添加新模型后迁移数据库。\n\n### 定义带有外键的模型\n\
    \n```\nclass Entry(models.Model):\n    \"\"\"某个主题的学习日志条目。\"\"\"\n    topic = models.ForeignKey(Topic,\n\
    \            on_delete=models.CASCADE)\n    text = models.TextField()\n    date_added\
    \ = models.DateTimeField(\n            auto_now_add=True)\n\n    def __str__(self):\n\
    \        return f\"{self.text[:50]}...\"\n```\n\n## 构建包含数据的页面\n\n项目中的大多数页面需要呈现特定于当前用户的数据。\n\
    \n### URL 参数\n\nURL 通常需要接受一个参数，告诉它从数据库访问什么数据。此处显示的 URL 模式查找特定主题的 ID 并将其分配给参数 `topic_id`。\n\
    \n```\nurlpatterns = [\n    --snip--\n    # 单个主题的详情页。\n    path('topics/<int:topic_id>/',\
    \ views.topic,\n         name='topic'),\n]\n```\n\n### 在视图中使用数据\n\n视图使用 URL 中的参数从数据库中提取正确的数据。在此示例中，视图向模板发送一个上下文字典，其中包含应在页面上显示的数据。你需要导入你正在使用的任何模型。\n\
    \n```\ndef topic(request, topic_id):\n    \"\"\"显示一个主题及其所有条目。\"\"\"\n    topic\
    \ = Topic.objects.get(id=topic_id)\n    entries = topic.entry_set.order_by(\n\
    \            '-date_added')\n    context = {\n        'topic': topic,\n      \
    \  'entries': entries,\n    }\n    return render(request,\n            'learning_logs/topic.html',\
    \ context)\n```\n\n### 重启开发服务器\n\n如果你对项目进行了更改，但更改似乎没有任何效果，请尝试重启服务器：\n\n```\n$\
    \ python manage.py runserver\n```\n\n## 构建包含数据的页面（续）\n\n### 在模板中使用数据\n\n视图函数上下文字典中的数据在模板内可用。这些数据使用模板变量访问，模板变量由双花括号表示。\n\
    \n模板变量后的竖线表示过滤器。在这种情况下，一个名为 `date` 的过滤器格式化日期对象，而 `linebreaks` 过滤器在网页上正确渲染段落。\n\
    \n```\n{% extends 'learning_logs/base.html' %}\n\n{% block content %}\n\n  <p>主题：{{\
    \ topic }}</p>\n\n  <p>条目：</p>\n  <ul>\n    {% for entry in entries %}\n     \
    \ <li>\n        <p>\n          {{ entry.date_added|date:'M d, Y H:i' }}\n    \
    \    </p>\n\n        <p>\n          {{ entry.text|linebreaks }}\n        </p>\n\
    \      </li>\n    {% empty %}\n      <li>目前还没有条目。</li>\n    {% endfor %}\n  </ul>\n\
    \n{% endblock content %}\n```\n\n### Django shell\n\n你可以从命令行探索项目中的数据。这对于开发查询和测试代码片段很有帮助。\n\
    \n### 启动 shell 会话\n\n```\n$ python manage.py shell\n```\n\n### 从项目访问数据\n\n```\n\
    >>> from learning_logs.models import Topic\n>>> Topic.objects.all()\n[<Topic:\
    \ Chess>, <Topic: Rock Climbing>]\n>>> topic = Topic.objects.get(id=1)\n>>> topic.text\n\
    'Chess'\n>>> topic.entry_set.all()\n<QuerySet [<Entry: In the opening phase...>]>\n\
    ```\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/ 获取"
