  md: "# Beginner's Python Cheat Sheet - Django\n\n# What is Django?\n\nDjango is\
    \ a web framework that helps you build interactive websites using Python. With\
    \ Django you define the kind of data your site will work with, and the ways your\
    \ users can work with that data.\nDjango works well for tiny projects, and just\
    \ as well for sites with millions of users.\n\n# Installing Django\n\nIt's usually\
    \ best to install Django to a virtual environment, where your project can be isolated\
    \ from your other Python projects. Most commands assume you're working in an active\
    \ virtual environment.\n\n# Create a virtual environment\n\n```\n$ python -m venv\
    \ ll_env\n```\n\n# Activate the environment (macOS and Linux)\n\n```\n$ source\
    \ ll_env/bin/activate\n```\n\n# Activate the environment (Windows)\n\n```\n> ll_env\\\
    Scripts\\activate\n```\n\n# Install Django to the active environment\n\n```\n\
    (ll_env)$ pip install Django\n```\n\n# Creating a project\n\nTo start we'll create\
    \ a new project, create a database, and start a development server.\n\n# Create\
    \ a new project\n\nMake sure to include the dot at the end of this command.\n\n\
    ```\n$ django-admin startproject learning_log .\n```\n\n# Create a database\n\n\
    ```\n$ python manage.py migrate\n```\n\n# View the project\n\nAfter issuing this\
    \ command, you can view the project at http://localhost:8000/.\n\n```\n$ python\
    \ manage.py runserver\n```\n\n# Create a new app\n\nA Django project is made up\
    \ of one or more apps.\n\n```\n$ python manage.py startapp learning_logs\n```\n\
    \n# Working with models\n\nThe data in a Django project is structured as a set\
    \ of models. Each model is represented by a class.\n\n# Defining a model\n\nTo\
    \ define the models for your app, modify the file models.py that was created in\
    \ your app's folder. The __str__() method tells Django how to represent data objects\
    \ based on this model.\n\n```\nfrom django.db import models\n\nclass Topic(models.Model):\n\
    \    \"\"\"A topic the user is learning about.\"\"\"\n\n    text = models.CharField(max_length=200)\n\
    \    date_added = models.DateTimeField(\n        auto_now_add=True)\n\n    def\
    \ __str__(self):\n        return self.text\n```\n\n# Activating a model\n\nTo\
    \ use a model the app must be added to the list INSTALLED_APPS, which is stored\
    \ in the project's settings.py file.\n\n```\nINSTALLED_APPS = [\n    # My apps.\n\
    \    'learning_logs',\n\n    # Default Django apps.\n    'django.contrib.admin',\n\
    ]\n```\n\n# Migrating the database\n\nThe database needs to be modified to store\
    \ the kind of data that the model represents. You'll need to run these commands\
    \ every time you create a new model, or modify an existing model.\n\n```\n$ python\
    \ manage.py makemigrations learning_logs\n$ python manage.py migrate\n```\n\n\
    # Creating a superuser\n\nA superuser is a user account that has access to all\
    \ aspects of the project.\n\n```\n$ python manage.py createsuperuser\n```\n\n\
    # Registering a model\n\nYou can register your models with Django's admin site,\
    \ which makes it easier to work with the data in your project. To do this, modify\
    \ the app's admin.py file. View the admin site at http://localhost:8000/admin/.\
    \ You'll need to log in using a superuser account.\n\n```\nfrom django.contrib\
    \ import admin\n\nfrom .models import Topic\n\nadmin.site.register(Topic)\n```\n\
    \n# Building a simple home page\n\nUsers interact with a project through web pages,\
    \ and a project's home page can start out as a simple page with no data. A page\
    \ usually needs a URL, a view, and a template.\n\n# Mapping a project's URLs\n\
    \nThe project's main urls.py file tells Django where to find the urls.py files\
    \ associated with each app in the project.\n\n```\nfrom django.contrib import\
    \ admin\nfrom django.urls import path, include\n\nurlpatterns = [\n    path('admin/',\
    \ admin.site.urls),\n    path('', include('learning_logs.urls')),\n]\n```\n\n\
    # Mapping an app's URLs\n\nAn app's urls.py file tells Django which view to use\
    \ for each URL in the app. You'll need to make this file yourself, and save it\
    \ in the app's folder.\n\n```\nfrom django.urls import path\n\nfrom . import views\n\
    \napp_name = 'learning_logs'\nurlpatterns = [\n    # Home page.\n    path('',\
    \ views.index, name='index'),\n]\n```\n\n# Writing a simple view\n\nA view takes\
    \ information from a request and sends data to the browser, often through a template.\
    \ View functions are stored in an app's views.py file. This simple view function\
    \ doesn't pull in any data, but it uses the template index.html to render the\
    \ home page.\n\n```\nfrom django.shortcuts import render\n\ndef index(request):\n\
    \    \"\"\"The home page for Learning Log.\"\"\"\n    return render(request,\n\
    \        'learning_logs/index.html')\n```\n\n# Online resources\n\nThe documentation\
    \ for Django is available at docs.djangoproject.com/. The Django documentation\
    \ is thorough and user-friendly, so check it out!\n\n# Python Crash Course\n\n\
    A Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_22_0.png)"
