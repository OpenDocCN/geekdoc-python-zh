  - "[PAGE 16]\n\n# Beginner's Python Cheat Sheet - Pygame\n\n# What is Pygame?\n\n\
    Pygame is a framework for making games using Python. Making games is fun, and\
    \ it's a great way to expand your programming skills and knowledge. Pygame takes\
    \ care of many of the lower-level tasks in building games, which lets you focus\
    \ on the aspects of your game that make it interesting.\n\n# Installing Pygame\n\
    \nPygame runs on all systems, and you should be able to install it in one line.\n\
    \n# Installing Pygame\n\n```\n$ python -m pip install --user pygame\n```\n\n#\
    \ Starting a game\n\nThe following code sets up an empty game window, and starts\
    \ an event loop and a loop that continually refreshes the screen.\n\n# An empty\
    \ game window\n\n```\nimport sys\nimport pygame\n\nclass AlienInvasion:\n    def\
    \ __init__(self):\n        pygame.init()\n        self.screen = pygame.display.set_mode(\n\
    \            (1200, 800))\n        pygame.display.set_caption(\n            \"\
    Alien Invasion\")\n\n    def run_game(self):\n        while True:\n          \
    \  for event in pygame.event.get():\n                if event.type == pygame.QUIT:\n\
    \                    sys.exit()\n\n            pygame.display.flip()\n\nif __name__\
    \ == '__main__':\n    ai = AlienInvasion()\n    ai.run_game()\n```\n\n# Starting\
    \ a game (cont.)\n\n# Setting a custom window size\n\nThe display.set_mode() function\
    \ accepts a tuple that defines the screen size.\n\n```\nscreen_dim = (1500, 1000)\n\
    self.screen = pygame.display.set_mode(\n    screen_dim)\n```\n\n# Setting a custom\
    \ background color\n\nColors are defined as a tuple of red, green, and blue values.\
    \ Each value ranges from 0-255. The fill() method fills the screen with the color\
    \ you specify, and should be called before you add any other elements to the screen.\n\
    \n```\ndef __init__(self):\n    --snip--\n    self.bg_color = (225, 225, 225)\n\
    \ndef run_game(self):\n    while True:\n        for event in pygame.event.get():\n\
    \            --snip--\n\n        self.screen.fill(self.bg_color)\n        pygame.display.flip()\n\
    ```\n\n# Pygame rect objects\n\nMany objects in a game can be treated as simple\
    \ rectangles, rather than their actual shape. This simplifies code without noticeably\
    \ affecting game play. Pygame has a rect object that makes it easy to work with\
    \ game objects.\n\n# Getting the screen rect object\n\nWe already have a screen\
    \ object; we can easily access the rect object associated with the screen.\n\n\
    ```\nself.screen_rect = self.screen.get_rect()\n```\n\n# Finding the center of\
    \ the screen\n\nRect objects have a center attribute which stores the center point.\n\
    \n```\nscreen_center = self.screen_rect.center\n```\n\n# Useful rect attributes\n\
    \nOnce you have a rect object, there are a number of attributes that are useful\
    \ when positioning objects and detecting relative positions of objects. (You can\
    \ find more attributes in the Pygame documentation. The self variable has been\
    \ left off for clarity.)\n\n```\n# Individual x and y values:\nscreen_rect.left,\
    \ screen_rect.right\nscreen_rect.top, screen_rect.bottom\nscreen_rect.centerx,\
    \ screen_rect.centery\nscreen_rect.width, screen_rect.height\n\n# Tuples\nscreen_rect.center\n\
    screen_rect.size\n```\n\n# Pygame rect objects (cont.)\n\n# Creating a rect object\n\
    \nYou can create a rect object from scratch. For example a small rect object that's\
    \ filled in can represent a bullet in a game. The Rect() class takes the coordinates\
    \ of the upper left corner, and the width and height of the rect. The draw.rect()\
    \ function takes a screen object, a color, and a rect. This function fills the\
    \ given rect with the given color.\n\n```\nbullet_rect = pygame.Rect(100, 100,\
    \ 3, 15)\ncolor = (100, 100, 100)\n\npygame.draw.rect(screen, color, bullet_rect)\n\
    ```\n\n# Working with images\n\nMany objects in a game are images that are moved\
    \ around the screen. It's easiest to use bitmap (.bmp) image files, but you can\
    \ also configure your system to work with jpg, png, and gif files as well.\n\n\
    # Loading an image\n\n```\nship = pygame.image.load('images/ship.bmp')\n```\n\n\
    # Getting the rect object from an image\n\n```\nship_rect = ship.get_rect()\n\
    ```\n\n# Positioning an image\n\nWith rects, it's easy to position an image wherever\
    \ you want on the screen, or in relation to another object. The following code\
    \ positions a ship at the bottom center of the screen, by matching the midbottom\
    \ of the ship with the midbottom of the screen.\n\n```\nship_rect.midbottom =\
    \ screen_rect.midbottom\n```\n\n# Drawing an image to the screen\n\nOnce an image\
    \ is loaded and positioned, you can draw it to the screen with the blit() method.\
    \ The blit() method acts on the screen object, and takes the image object and\
    \ image rect as arguments.\n\n```\n# Draw ship to screen.\nscreen.blit(ship, ship_rect)\n\
    ```\n\n# Transforming an image\n\nThe transform module allows you to make changes\
    \ to an image such as rotation and scaling.\n\n```\nrotated_image = pygame.transform.rotate(\n\
    \    ship.image, 45)\n```\n\n# Python Crash Course\n\nA Hands-on, Project-Based\
    \ Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_16_0.png)"
