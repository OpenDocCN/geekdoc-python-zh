  - "[PAGE 8]\n\n# Beginner's Python Cheat Sheet - Functions\n\n# What are functions?\n\
    \nFunctions are named blocks of code designed to do one specific job. Functions\
    \ allow you to write code once that can then be run whenever you need to accomplish\
    \ the same task.\n\nFunctions can take in the information they need, and return\
    \ the information they generate. Using functions effectively makes your programs\
    \ easier to write, read, test, and fix.\n\n# Defining a function\n\nThe first\
    \ line of a function is its definition, marked by the keyword def. The name of\
    \ the function is followed by a set of parentheses and a colon. A docstring, in\
    \ triple quotes, describes what the function does. The body of a function is indented\
    \ one level.\n\nTo call a function, give the name of the function followed by\
    \ a set of parentheses.\n\n# Making a function\n\n```\ndef greet_user():\n   \
    \ \"\"\"Display a simple greeting.\"\"\"\n    print(\"Hello!\")\n\ngreet_user()\n\
    ```\n\n# Passing information to a function\n\nInformation that's passed to a function\
    \ is called an argument; information that's received by a function is called a\
    \ parameter. Arguments are included in parentheses after the function's name,\
    \ and parameters are listed in parentheses in the function's definition.\n\n#\
    \ Passing a simple argument\n\n```\ndef greet_user(username):\n    \"\"\"Display\
    \ a simple greeting.\"\"\"\n    print(f\"Hello, {username}!\")\n\ngreet_user('jesse')\n\
    greet_user('diana')\ngreet_user('brandon')\n```\n\n# Positional and keyword arguments\n\
    \nThe two main kinds of arguments are positional and keyword arguments. When you\
    \ use positional arguments Python matches the first argument in the function call\
    \ with the first parameter in the function definition, and so forth.\n\nWith keyword\
    \ arguments, you specify which parameter each argument should be assigned to in\
    \ the function call. When you use keyword arguments, the order of the arguments\
    \ doesn't matter.\n\n# Using positional arguments\n\n```\ndef describe_pet(animal,\
    \ name):\n    \"\"\"Display information about a pet.\"\"\"\n    print(f\"\\nI\
    \ have a {animal}.\")\n    print(f\"Its name is {name}.\")\n\ndescribe_pet('hamster',\
    \ 'harry')\ndescribe_pet('dog', 'willie')\n```\n\n# Using keyword arguments\n\n\
    ```\ndef describe_pet(animal, name):\n    \"\"\"Display information about a pet.\"\
    \"\"\n    print(f\"\\nI have a {animal}.\")\n    print(f\"Its name is {name}.\"\
    )\n\ndescribe_pet(animal='hamster', name='harry')\ndescribe_pet(name='willie',\
    \ animal='dog')\n```\n\n# Default values\n\nYou can provide a default value for\
    \ a parameter. When function calls omit this argument the default value will be\
    \ used. Parameters with default values must be listed after parameters without\
    \ default values in the function's definition so positional arguments can still\
    \ work correctly.\n\n# Using a default value\n\n```\ndef describe_pet(name, animal='dog'):\n\
    \    \"\"\"Display information about a pet.\"\"\"\n    print(f\"\\nI have a {animal}.\"\
    )\n    print(f\"Its name is {name}.\")\n\ndescribe_pet('harry', 'hamster')\ndescribe_pet('willie')\n\
    ```\n\n# Using None to make an argument optional\n\n```\ndef describe_pet(animal,\
    \ name=None):\n    \"\"\"Display information about a pet.\"\"\"\n    print(f\"\
    \\nI have a {animal}.\")\n    if name:\n        print(f\"Its name is {name}.\"\
    )\n\ndescribe_pet('hamster', 'harry')\ndescribe_pet('snake')\n```\n\n# Return\
    \ values\n\nA function can return a value or a set of values. When a function\
    \ returns a value, the calling line should provide a variable which the return\
    \ value can be assigned to. A function stops running when it reaches a return\
    \ statement.\n\n# Returning a single value\n\n```\ndef get_full_name(first, last):\n\
    \    \"\"\"Return a neatly formatted full name.\"\"\"\n    full_name = f\"{first}\
    \ {last}\"\n    return full_name.title()\n\nmusician = get_full_name('jimi', 'hendrix')\n\
    print(musician)\n```\n\n# Returning a dictionary\n\n```\ndef build_person(first,\
    \ last):\n    \"\"\"Return a dictionary of information\n    about a person.\n\
    \    \"\"\"\n    person = {'first': first, 'last': last}\n    return person\n\n\
    musician = build_person('jimi', 'hendrix')\nprint(musician)\n```\n\n# Returning\
    \ a dictionary with optional values\n\n```\ndef build_person(first, last, age=None):\n\
    \    \"\"\"Return a dictionary of information\n    about a person.\n    \"\"\"\
    \n    person = {'first': first, 'last': last}\n    if age:\n        person['age']\
    \ = age\n\n    return person\n\nmusician = build_person('jimi', 'hendrix', 27)\n\
    print(musician)\n\nmusician = build_person('janis', 'joplin')\nprint(musician)\n\
    ```\n\n# Visualizing functions\n\nTry running some of these examples, and some\
    \ of your own programs that use functions, on pythontutor.com.\n\n![](img/12320e46b546a2862f3a411be6db7a27_8_0.png)\n\
    \nPython Crash Course\nA Hands-on, Project-Based Introduction to Programming\n\
    nostarch.com/pythoncrashcourse2e"
  - "[PAGE 9]\n\n# Passing a list to a function\n\nYou can pass a list as an argument\
    \ to a function, and the function can work with the values in the list. Any changes\
    \ the function makes to the list will affect the original list. You can prevent\
    \ a function from modifying a list by passing a copy of the list as an argument.\n\
    \n# Passing a list as an argument\n\n```\ndef greet_users(names):\n    \"\"\"\
    Print a simple greeting to everyone.\"\"\"\n    for name in names:\n        msg\
    \ = f\"Hello, {name}!\"\n        print(msg)\n\nusernames = ['hannah', 'ty', 'margot']\n\
    greet_users(usernames)\n```\n\n# Allowing a function to modify a list\n\nThe following\
    \ example sends a list of models to a function for printing. The first list is\
    \ emptied, and the second list is filled.\n\n```\ndef print_models(unprinted,\
    \ printed):\n    \"\"\"3d print a set of models.\"\"\"\n    while unprinted:\n\
    \        current_model = unprinted.pop()\n        print(f\"Printing {current_model}\"\
    )\n        printed.append(current_model)\n\n# Store some unprinted designs,\n\
    #   and print each of them.\nunprinted = ['phone case', 'pendant', 'ring']\nprinted\
    \ = []\nprint_models(unprinted, printed)\n\nprint(f\"\\nUnprinted: {unprinted}\"\
    )\nprint(f\"Printed: {printed}\")\n```\n\n# Preventing a function from modifying\
    \ a list\n\nThe following example is the same as the previous one, except the\
    \ original list is unchanged after calling print_models().\n\n```\ndef print_models(unprinted,\
    \ printed):\n    \"\"\"3d print a set of models.\"\"\"\n    while unprinted:\n\
    \        current_model = unprinted.pop()\n        print(f\"Printing {current_model}\"\
    )\n        printed.append(current_model)\n\n# Store some unprinted designs,\n\
    #   and print each of them.\noriginal = ['phone case', 'pendant', 'ring']\nprinted\
    \ = []\n\nprint_models(original[:], printed)\nprint(f\"\\nOriginal: {original}\"\
    )\nprint(f\"Printed: {printed}\")\n```\n\n# Passing an arbitrary number of arguments\n\
    \nSometimes you won't know how many arguments a function will need to accept.\
    \ Python allows you to collect an arbitrary number of arguments into one parameter\
    \ using the * operator. A parameter that accepts an arbitrary number of arguments\
    \ must come last in the function definition. This parameter is often named *args.\n\
    The ** operator allows a parameter to collect an arbitrary number of keyword arguments.\
    \ These are stored as a dictionary with the parameter names as keys, and the arguments\
    \ as values. This is often named **kwargs.\n\n# Collecting an arbitrary number\
    \ of arguments\n\n```\ndef make_pizza(size, *toppings):\n    \"\"\"Make a pizza.\"\
    \"\"\n    print(f\"\\nMaking a {size} pizza.\")\n    print(\"Toppings:\")\n  \
    \  for topping in toppings:\n        print(f\"- {topping}\")\n\n# Make three pizzas\
    \ with different toppings.\nmake_pizza('small', 'pepperoni')\nmake_pizza('large',\
    \ 'bacon bits', 'pineapple')\nmake_pizza('medium', 'mushrooms', 'peppers',\n \
    \          'onions', 'extra cheese')\n```\n\n# Collecting an arbitrary number\
    \ of keyword arguments\n\n```\ndef build_profile(first, last, **user_info):\n\
    \    \"\"\"Build a dictionary for a user.\"\"\"\n    user_info['first'] = first\n\
    \    user_info['last'] = last\n    return user_info\n\n# Create two users with\
    \ different kinds\n#   of information.\nuser_0 = build_profile('albert', 'einstein',\n\
    \                       location='princeton')\nuser_1 = build_profile('marie',\
    \ 'curie',\n                       location='paris', field='chemistry')\n\nprint(user_0)\n\
    print(user_1)\n```\n\n# What's the best way to structure a function?\n\nThere\
    \ are many ways to write and call a function. When you're starting out, aim for\
    \ something that simply works. As you gain experience you'll develop an understanding\
    \ of the subtle advantages of different structures such as positional and keyword\
    \ arguments, and the various approaches to importing functions. For now if your\
    \ functions do what you need them to, you're doing well.\n\n# Modules\n\nYou can\
    \ store your functions in a separate file called a module, and then import the\
    \ functions you need into the file containing your main program. This allows for\
    \ cleaner program files. Make sure your module is stored in the same directory\
    \ as your main program.\n\n# Storing a function in a module\n\nFile: pizza.py\n\
    \n```\ndef make_pizza(size, *toppings):\n    \"\"\"Make a pizza.\"\"\"\n    print(f\"\
    \\nMaking a {size} pizza.\")\n    print(\"Toppings:\")\n    for topping in toppings:\n\
    \        print(f\"- {topping}\")\n```\n\n# Importing an entire module\n\nFile:\
    \ making_pizzas.py Every function in the module is available in the program file.\n\
    \n```\nimport pizza\n\npizza.make_pizza('medium', 'pepperoni')\npizza.make_pizza('small',\
    \ 'bacon', 'pineapple')\n```\n\n# Importing a specific function\n\nOnly the imported\
    \ functions are available in the program file.\n\n```\nfrom pizza import make_pizza\n\
    \nmake_pizza('medium', 'pepperoni')\nmake_pizza('small', 'bacon', 'pineapple')\n\
    ```\n\n# Giving a module an alias\n\n```\nimport pizza as p\n\np.make_pizza('medium',\
    \ 'pepperoni')\np.make_pizza('small', 'bacon', 'pineapple')\n```\n\n# Giving a\
    \ function an alias\n\n```\nfrom pizza import make_pizza as mp\n\nmp('medium',\
    \ 'pepperoni')\nmp('small', 'bacon', 'pineapple')\n```\n\n# Importing all functions\
    \ from a module\n\nDon't do this, but recognize it when you see it in others'\
    \ code. It can result in naming conflicts, which can cause errors.\n\n```\nfrom\
    \ pizza import *\n\nmake_pizza('medium', 'pepperoni')\nmake_pizza('small', 'bacon',\
    \ 'pineapple')\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Classes\n\n## What are classes?\n\nClasses\
    \ are the foundation of object-oriented programming. Classes represent real-world\
    \ things you want to model in your programs such as dogs, cars, and robots. You\
    \ use a class to make objects, which are specific instances of dogs, cars, and\
    \ robots. A class defines the general behavior that a whole category of objects\
    \ can have, and the information that can be associated with those objects.\n\n\
    Classes can inherit from each other — you can write a class that extends the functionality\
    \ of an existing class. This allows you to code efficiently for a wide variety\
    \ of situations. Even if you don't write many of your own classes, you'll frequently\
    \ find yourself working with classes that others have written.\n\n## Creating\
    \ and using a class\n\nConsider how we might model a car. What information would\
    \ we associate with a car, and what behavior would it have? The information is\
    \ assigned to variables called attributes, and the behavior is represented by\
    \ functions. Functions that are part of a class are called methods.\n\n## The\
    \ Car class\n\n```python\nclass Car:\n    \"\"\"A simple attempt to model a car.\"\
    \"\"\n\n    def __init__(self, make, model, year):\n        \"\"\"Initialize car\
    \ attributes.\"\"\"\n        self.make = make\n        self.model = model\n  \
    \      self.year = year\n\n        # Fuel capacity and level in gallons.\n   \
    \     self.fuel_capacity = 15\n        self.fuel_level = 0\n\n    def fill_tank(self):\n\
    \        \"\"\"Fill gas tank to capacity.\"\"\"\n        self.fuel_level = self.fuel_capacity\n\
    \        print(\"Fuel tank is full.\")\n\n    def drive(self):\n        \"\"\"\
    Simulate driving.\"\"\"\n        print(\"The car is moving.\")\n```\n\n## Creating\
    \ and using a class (cont.)\n\n## Creating an instance from a class\n\n```python\n\
    my_car = Car('audi', 'a4', 2021)\n```\n\n## Accessing attribute values\n\n```python\n\
    print(my_car.make)\nprint(my_car.model)\nprint(my_car.year)\n```\n\n## Calling\
    \ methods\n\n```python\nmy_car.fill_tank()\nmy_car.drive()\n```\n\n## Creating\
    \ multiple instances\n\n```python\nmy_car = Car('audi', 'a4', 2021)\nmy_old_car\
    \ = Car('subaru', 'outback', 2015)\nmy_truck = Car('toyota', 'tacoma', 2018)\n\
    my_old_truck = Car('ford', 'ranger', 1999)\n```\n\n## Modifying attributes\n\n\
    You can modify an attribute's value directly, or you can write methods that manage\
    \ updating values more carefully. Methods like these can help validate the kinds\
    \ of changes that are being made to an attribute.\n\n## Modifying an attribute\
    \ directly\n\n```python\nmy_new_car = Car('audi', 'a4', 2021)\nmy_new_car.fuel_level\
    \ = 5\n```\n\n## Writing a method to update an attribute's value\n\n```python\n\
    def update_fuel_level(self, new_level):\n    \"\"\"Update the fuel level.\"\"\"\
    \n    if new_level <= self.fuel_capacity:\n        self.fuel_level = new_level\n\
    \    else:\n        print(\"The tank can't hold that much!\")\n```\n\n## Writing\
    \ a method to increment an attribute's value\n\n```python\ndef add_fuel(self,\
    \ amount):\n    \"\"\"Add fuel to the tank.\"\"\"\n    if (self.fuel_level + amount\n\
    \            <= self.fuel_capacity):\n        self.fuel_level += amount\n    \
    \    print(\"Added fuel.\")\n    else:\n        print(\"The tank won't hold that\
    \ much.\")\n```\n\n## Naming conventions\n\nIn Python class names are written\
    \ in CamelCase and object names are written in lowercase with underscores. Modules\
    \ that contain classes should be named in lowercase with underscores.\n\n## Class\
    \ inheritance\n\nIf the class you're writing is a specialized version of another\
    \ class, you can use inheritance. When one class inherits from another, it automatically\
    \ takes on all the attributes and methods of the parent class. The child class\
    \ is free to introduce new attributes and methods, and override attributes and\
    \ methods of the parent class.\n\nTo inherit from another class include the name\
    \ of the parent class in parentheses when defining the new class.\n\n## The `__init__()`\
    \ method for a child class\n\n```python\nclass ElectricCar(Car):\n    \"\"\"A\
    \ simple model of an electric car.\"\"\"\n\n    def __init__(self, make, model,\
    \ year):\n        \"\"\"Initialize an electric car.\"\"\"\n        super().__init__(make,\
    \ model, year)\n\n        # Attributes specific to electric cars.\n        # Battery\
    \ capacity in kWh.\n        self.battery_size = 85\n\n        # Charge level in\
    \ %.\n        self.charge_level = 0\n```\n\n## Adding new methods to the child\
    \ class\n\n```python\nclass ElectricCar(Car):\n    --snip--\n\n    def charge(self):\n\
    \        \"\"\"Fully charge the vehicle.\"\"\"\n        self.charge_level = 100\n\
    \        print(\"The vehicle is fully charged.\")\n```\n\n## Using child methods\
    \ and parent methods\n\n```python\nmy_ecar = ElectricCar('tesla', 'model s', 2021)\n\
    \nmy_ecar.charge()\nmy_ecar.drive()\n```\n\n## Finding your workflow\n\nThere\
    \ are many ways to model real world objects and situations in code, and sometimes\
    \ that variety can feel overwhelming. Pick an approach and try it – if your first\
    \ attempt doesn't work, try a different approach.\n\n## Python Crash Course\n\n\
    A Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_10_0.png)\n\n## Class inheritance (cont.)\n\
    \n### Overriding parent methods\n\n```python\nclass ElectricCar(Car):\n    --snip--\n\
    \n    def fill_tank(self):\n        \"\"\"Display an error message.\"\"\"\n  \
    \      print(\"This car has no fuel tank!\")\n```\n\n## Instances as attributes\n\
    \nA class can have objects as attributes. This allows classes to work together\
    \ to model more complex real-world things and concepts.\n\n### A Battery class\n\
    \n```python\nclass Battery:\n    \"\"\"A battery for an electric car.\"\"\"\n\n\
    \    def __init__(self, size=85):\n        \"\"\"Initialize battery attributes.\"\
    \"\"\n        # Capacity in kWh, charge level in %.\n        self.size = size\n\
    \        self.charge_level = 0\n\n    def get_range(self):\n        \"\"\"Return\
    \ the battery's range.\"\"\"\n        if self.size == 85:\n            return\
    \ 390\n        elif self.size == 100:\n            return 415\n```\n\n### Using\
    \ an instance as an attribute\n\n```python\nclass ElectricCar(Car):\n    --snip--\n\
    \n    def __init__(self, make, model, year):\n        \"\"\"Initialize an electric\
    \ car.\"\"\"\n        super().__init__(make, model, year)\n\n        # Attribute\
    \ specific to electric cars.\n        self.battery = Battery()\n\n    def charge(self):\n\
    \        \"\"\"Fully charge the vehicle.\"\"\"\n        self.battery.charge_level\
    \ = 100\n        print(\"The vehicle is fully charged.\")\n```\n\n### Using the\
    \ instance\n\n```python\nmy_ecar = ElectricCar('tesla', 'model s', 2021)\n\nmy_ecar.charge()\n\
    print(my_ecar.battery.get_range())\nmy_ecar.drive()\n```\n\n## Importing classes\n\
    \nClass files can get long as you add detailed information and functionality.\
    \ To help keep your program files uncluttered, you can store your classes in modules\
    \ and import the classes you need into your main program.\n\n### Storing classes\
    \ in a file\n\n```python\n# car.py\n\"\"\"Represent gas and electric cars.\"\"\
    \"\n\nclass Car:\n    \"\"\"A simple attempt to model a car.\"\"\"\n    --snip--\n\
    \nclass Battery:\n    \"\"\"A battery for an electric car.\"\"\"\n    --snip--\n\
    \nclass ElectricCar(Car):\n    \"\"\"A simple model of an electric car.\"\"\"\n\
    \    --snip--\n```\n\n### Importing individual classes from a module\n\n```python\n\
    # my_cars.py\nfrom car import Car, ElectricCar\n\nmy_beetle = Car('volkswagen',\
    \ 'beetle', 2019)\nmy_beetle.fill_tank()\nmy_beetle.drive()\n\nmy_tesla = ElectricCar('tesla',\
    \ 'model s', 2021)\nmy_tesla.charge()\nmy_tesla.drive()\n```\n\n### Importing\
    \ an entire module\n\n```python\nimport car\n\nmy_beetle = car.Car(\n    'volkswagen',\
    \ 'beetle', 2019)\nmy_beetle.fill_tank()\nmy_beetle.drive()\n\nmy_tesla = car.ElectricCar(\n\
    \    'tesla', 'model s', 2021)\nmy_tesla.charge()\nmy_tesla.drive()\n```\n\n###\
    \ Importing all classes from a module\n\n(Don't do this, but recognize it when\
    \ you see it.)\n\n```python\nfrom car import *\n\nmy_beetle = Car('volkswagen',\
    \ 'beetle', 2019)\nmy_tesla = ElectricCar('tesla', 'model s', 2021)\n```\n\n##\
    \ Storing objects in a list\n\nA list can hold as many items as you want, so you\
    \ can make a large number of objects from a class and store them in a list.\n\n\
    Here's an example showing how to make a fleet of rental cars, and make sure all\
    \ the cars are ready to drive.\n\n### A fleet of rental cars\n\n```python\nfrom\
    \ car import Car, ElectricCar\n\n# Make lists to hold a fleet of cars.\ngas_fleet\
    \ = []\nelectric_fleet = []\n\n# Make 250 gas cars and 500 electric cars.\nfor\
    \ _ in range(250):\n    car = Car('ford', 'escape', 2021)\n    gas_fleet.append(car)\n\
    for _ in range(500):\n    ecar = ElectricCar('nissan', 'leaf', 2021)\n    electric_fleet.append(ecar)\n\
    \n# Fill the gas cars, and charge electric cars.\nfor car in gas_fleet:\n    car.fill_tank()\n\
    for ecar in electric_fleet:\n    ecar.charge()\n\nprint(f\"Gas cars: {len(gas_fleet)}\"\
    )\nprint(f\"Electric cars: {len(electric_fleet)}\")\n```\n\n## Understanding `self`\n\
    \nPeople often ask what the `self` variable represents. The `self` variable is\
    \ a reference to an object that's been created from the class.\n\nThe `self` variable\
    \ provides a way to make other variables and objects available everywhere in a\
    \ class. The `self` variable is automatically passed to each method that's called\
    \ through an object, which is why you see it listed first in every method definition.\
    \ Any variable attached to `self` is available everywhere in the class.\n\n##\
    \ Understanding `__init__()`\n\nThe `__init__()` method is a function that's part\
    \ of a class, just like any other method. The only special thing about `__init__()`\
    \ is that it's called automatically every time you make a new instance from a\
    \ class. If you accidentally misspell `__init__()`, the method won't be called\
    \ and your object may not be created correctly.\n\nMore cheat sheets available\
    \ at ehmatthes.github.io/pcc_2e/"
