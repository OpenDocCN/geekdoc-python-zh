  md: "# Specifying complex layouts\n\nYou can also specify the layout of your visualization\
    \ as a dictionary, which gives you much more control of the overall layout.\n\n\
    # Layout as a dictionary\n\nHere is the same layout we used earlier, written as\
    \ a dictionary. Simple elements such as the title of the chart are just key-value\
    \ pairs. More complex elements such as axes, which can have many of their own\
    \ settings, are nested dictionaries.\n\n```\nmy_layout = {\n    'title': 'Square\
    \ Numbers',\n    'xaxis': {\n        'title': 'x',\n    },\n    'yaxis': {\n \
    \       'title': 'Square of x',\n    },\n}\n```\n\n# A more complex layout\n\n\
    Here is a layout for the same data, with more specific formatting directives in\
    \ the data and layout dictionaries.\n\n```\nfrom plotly.graph_objs import Scatter\n\
    from plotly import offline\n\nx_values = list(range(11))\nsquares = [x**2 for\
    \ x in x_values]\n\ndata = [{\n    'type': 'scatter',\n    'x': x_values,\n  \
    \  'y': squares,\n    'mode': 'markers',\n    'marker': {\n        'size': 10,\n\
    \        'color': '#6688dd',\n    },\n}]\n\nmy_layout = {\n    'title': 'Square\
    \ Numbers',\n    'xaxis': {\n        'title': 'x',\n        'titlefont': {'family':\
    \ 'monospace'},\n    },\n    'yaxis': {\n        'title': 'Square of x',\n   \
    \     'titlefont': {'family': 'monospace'},\n    },\n}\n\noffline.plot(\n    {'data':\
    \ data, 'layout': my_layout},\n    filename='squares.html')\n```\n\n# Specifying\
    \ complex layouts (cont.)\n\n# Using a colorscale\n\nColorscales are often used\
    \ to show variations in large datasets. In Plotly, colorscales are set in the\
    \ marker dictionary, nested inside a data dictionary.\n\n```\ndata = [{\n    'type':\
    \ 'scatter',\n    'x': x_values,\n    'y': squares,\n    'mode': 'markers',\n\
    \    'marker': {\n        'colorscale': 'Viridis',\n        'color': squares,\n\
    \        'colorbar': {'title': 'Value'},\n    },\n}]\n```\n\n# Using Subplots\n\
    \nIt's often useful to have multiple plots share the same axes. This is done using\
    \ the subplots module.\n\n# Adding subplots to a figure\n\nTo use the subplots\
    \ module, make a figure to hold all the charts that will be made. Then use the\
    \ add_trace() method to add each data series to the overall figure.\nFor more\
    \ help, see the documentation at plot.ly/python/subplots/.\n\n```\nfrom plotly.subplots\
    \ import make_subplots\nfrom plotly.graph_objects import Scatter\nfrom plotly\
    \ import offline\n\nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\n\
    cubes = [x**3 for x in x_values]\n\n# Make two subplots, sharing a y-axis.\nfig\
    \ = make_subplots(rows=1, cols=2,\n                    shared_yaxes=True)\n\n\
    data = {\n    'type': 'scatter',\n    'x': x_values,\n    'y': squares,\n}\nfig.add_trace(data,\
    \ row=1, col=1)\n\ndata = {\n    'type': 'scatter',\n    'x': x_values,\n    'y':\
    \ cubes,\n}\nfig.add_trace(data, row=1, col=2)\n\noffline.plot(fig, filename='subplots.html')\n\
    ```\n\n# Plotting global datasets\n\nPlotly has a variety of mapping tools. For\
    \ example, if you have a set of points represented by latitude and longitude,\
    \ you can create a scatter plot of those points overlaying a map.\n\n# The scattergeo\
    \ chart type\n\nHere's a map showing the location of three of the higher peaks\
    \ in North America. If you hover over each point, you'll see its location and\
    \ the name of the mountain.\n\n```\nfrom plotly import offline\n\n# Points in\
    \ (lat, lon) format.\npeak_coords = [\n    (63.069, -151.0063),\n    (60.5671,\
    \ -140.4055),\n    (46.8529, -121.7604),\n]\n\n# Make matching lists of lats,\
    \ lons,\n# and labels.\nlats = [pc[0] for pc in peak_coords]\nlons = [pc[1] for\
    \ pc in peak_coords]\npeak_names = ['Denali', 'Mt Logan',\n              'Mt Rainier']\n\
    \ndata = [{\n    'type': 'scattergeo',\n    'lon': lons,\n    'lat': lats,\n \
    \   'marker': {\n        'size': 20,\n        'color': '#227722',\n    },\n  \
    \  'text': peak_names,\n}]\n\nmy_layout = {\n    'title': 'Selected High Peaks',\n\
    \    'geo': {\n        'scope': 'north america',\n        'showland': True,\n\
    \        'showocean': True,\n        'showlakes': True,\n        'showrivers':\
    \ True,\n    },\n}\n\noffline.plot(\n    {'data': data, 'layout': my_layout},\n\
    \    filename='peaks.html')\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
