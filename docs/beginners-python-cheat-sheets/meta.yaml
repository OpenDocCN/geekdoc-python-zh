    \n### 在字典中存储列表\n\n```python\n# Store multiple languages for each person.\nfav_languages\
    \ = {\n    'jen': ['python', 'ruby'],\n    'sarah': ['c'],\n    'edward': ['ruby',\
    \ 'go'],\n    'phil': ['python', 'haskell'],\n}\n\n# Show all responses for each\
    \ person.\nfor name, langs in fav_languages.items():\n    print(f\"{name}: \"\
    )\n    for lang in langs:\n        print(f\"- {lang}\")\n```\n\n## 嵌套 - 字典的字典\n\
    \n你可以将一个字典存储在另一个字典中。在这种情况下，与每个键关联的值本身就是一个字典。\n\n### 在字典中存储字典\n\n```python\nusers\
    \ = {\n    'aeinstein': {\n        'first': 'albert',\n        'last': 'einstein',\n\
    \        'location': 'princeton',\n        },\n    'mcurie': {\n        'first':\
    \ 'marie',\n        'last': 'curie',\n        'location': 'paris',\n        },\n\
    \    }\n\nfor username, user_dict in users.items():\n    full_name = f\"{user_dict['first']}\
    \ \"\n    full_name += user_dict['last']\n\n    location = user_dict['location']\n\
    \n    print(\"\\nUsername: \" + username)\n    print(f\"\\tFull name: {full_name.title()}\"\
    )\n    print(f\"\\tLocation: {location.title()}\")\n```\n\n## 嵌套的层级\n\n嵌套在某些情况下非常有用。但是，请注意不要让你的代码过于复杂。如果你嵌套的层级比这里看到的深得多，那么可能有更简单的方法来管理你的数据，例如使用类。\n\
    \n## 字典推导式\n\n推导式是一种生成字典的紧凑方式，类似于列表推导式。要创建字典推导式，请为要生成的键值对定义一个表达式。然后编写一个 `for`\
    \ 循环来生成将输入到该表达式的值。\n\n`zip()` 函数将一个列表中的每个项目与第二个列表中的每个项目匹配。它可以用来从两个列表创建一个字典。\n\n\
    ### 使用循环创建字典\n\n```python\nsquares = {}\nfor x in range(5):\n    squares[x] =\
    \ x**2\n```\n\n### 使用字典推导式\n\n```python\nsquares = {x:x**2 for x in range(5)}\n\
    ```\n\n### 使用 `zip()` 创建字典\n\n```python\ngroup_1 = ['kai', 'abe', 'ada', 'gus',\
    \ 'zoe']\ngroup_2 = ['jen', 'eva', 'dan', 'isa', 'meg']\n\npairings = {name:name_2\n\
    \    for name, name_2 in zip(group_1, group_2)}\n```\n\n## 生成一百万个字典\n\n如果所有字典都以相似的数据开始，你可以使用循环高效地生成大量字典。\n\
    \n### 一百万个外星人\n\n```python\naliens = []\n\n# Make a million green aliens, worth\
    \ 5 points\n#   each. Have them all start in one row.\nfor alien_num in range(1_000_000):\n\
    \    new_alien = {\n        'color': 'green',\n        'points': 5,\n        'x':\
    \ 20 * alien_num,\n        'y': 0\n    }\n    aliens.append(new_alien)\n\n# Prove\
    \ the list contains a million aliens.\nnum_aliens = len(aliens)\n\nprint(\"Number\
    \ of aliens created:\")\nprint(num_aliens)\n```\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/\
    \ 获取\n\n## 初学者 Python 速查表 - If 语句和 While 循环\n\n## 什么是 if 语句？什么是 while 循环？\n\n\
    Python 的 `if` 语句允许你检查程序的当前状态并对此状态做出适当的响应。你可以编写一个简单的 `if` 语句来检查一个条件，或者你可以创建一系列复杂的语句来识别你感兴趣的确切条件。\n\
    \n`while` 循环在某些条件保持为真时运行。你可以使用 `while` 循环让程序在用户需要时一直运行。\n\n## 条件测试\n\n条件测试是一个可以被求值为真或假的表达式。Python\
    \ 使用值 `True` 和 `False` 来决定是否应执行 `if` 语句中的代码。\n\n### 检查相等性\n\n单个等号将值赋给变量。双等号检查两个值是否相等。\n\
    \n如果你的条件测试没有按预期工作，请确保你没有意外地使用单个等号。\n\n```python\n>>> car = 'bmw'\n>>> car == 'bmw'\n\
    True\n>>> car = 'audi'\n>>> car == 'bmw'\nFalse\n```\n\n### 比较时忽略大小写\n\n```python\n\
    >>> car = 'Audi'\n>>> car.lower() == 'audi'\nTrue\n```\n\n### 检查不等性\n\n```python\n\
    >>> topping = 'mushrooms'\n>>> topping != 'anchovies'\nTrue\n```\n\n### 数值比较\n\
    \n测试数值与测试字符串值类似。\n\n### 测试相等性和不等性\n\n```python\n>>> age = 18\n>>> age == 18\n\
    True\n>>> age != 18\nFalse\n```\n\n### 比较运算符\n\n```python\n>>> age = 19\n>>> age\
    \ < 21\nTrue\n>>> age <= 21\nTrue\n>>> age > 21\nFalse\n>>> age >= 21\nFalse\n\
    ```\n\n### 检查多个条件\n\n你可以同时检查多个条件。`and` 运算符在列出的所有条件都为真时返回 `True`。`or` 运算符在任何条件为真时返回\
    \ `True`。\n\n### 使用 `and` 检查多个条件\n\n```python\n>>> age_0 = 22\n>>> age_1 = 18\n\
    >>> age_0 >= 21 and age_1 >= 21\nFalse\n>>> age_1 = 23\n>>> age_0 >= 21 and age_1\
    \ >= 21\nTrue\n```\n\n### 使用 `or` 检查多个条件\n\n```python\n>>> age_0 = 22\n>>> age_1\
    \ = 18\n>>> age_0 >= 21 or age_1 >= 21\nTrue\n>>> age_0 = 18\n>>> age_0 >= 21\
    \ or age_1 >= 21\nFalse\n```\n\n### 布尔值\n\n布尔值要么是 `True`，要么是 `False`。具有布尔值的变量通常用于跟踪程序中的某些条件。\n\
    \n### 简单的布尔值\n\n```python\ngame_active = True\nis_valid = True\ncan_edit = False\n\
    ```\n\n## If 语句\n\n存在几种 `if` 语句。选择使用哪种取决于你需要测试的条件数量。你可以根据需要拥有任意多个 `elif` 块，而 `else`\
    \ 块始终是可选的。\n\n### 简单的 if 语句\n\n```python\nage = 19\n\nif age >= 18:\n    print(\"\
    You're old enough to vote!\")\n```\n\n### If-else 语句\n\n```python\nage = 17\n\n\
    if age >= 18:\n    print(\"You're old enough to vote!\")\nelse:\n    print(\"\
    You can't vote yet.\")\n```\n\n### If-elif-else 链\n\n```python\nage = 12\n\nif\
    \ age < 4:\n    price = 0\nelif age < 18:\n    price = 25\nelse:\n    price =\
    \ 40\n\nprint(f\"Your cost is ${price}.\")\n```\n\n### 使用列表进行条件测试\n\n你可以轻松测试某个值是否在列表中。你也可以在尝试遍历列表之前测试列表是否为空。\n\
    \n### 测试值是否在列表中\n\n```python\n>>> players = ['al', 'bea', 'cyn', 'dale']\n>>>\
    \ 'al' in players\nTrue\n>>> 'eric' in players\nFalse\n```\n\n### 测试两个值是否在列表中\n\
    \n```python\n>>> 'al' in players and 'cyn' in players\n```\n\n![Python Crash Course](img/12320e46b546a2862f3a411be6db7a27_6_0.png)\n\
    \nPython Crash Course\nA Hands-on, Project-Based Introduction to Programming\n\
    nostarch.com/pythoncrashcourse2e\n\n## 使用列表进行条件测试（续）\n\n### 测试值是否不在列表中\n\n```python\n\
    banned_users = ['ann', 'chad', 'dee']\nuser = 'erin'\n\nif user not in banned_users:\n\
    \    print(\"You can play!\")\n```\n\n### 检查列表是否为空\n\n空列表在 `if` 语句中求值为 `False`。\n\
    \n```python\nplayers = []\n\nif players:\n    for player in players:\n       \
    \ print(f\"Player: {player.title()}\")\nelse:\n    print(\"We have no players\
    \ yet!\")\n```\n\n### 接受输入\n\n你可以允许用户使用 `input()` 函数输入内容。所有输入最初都存储为字符串。如果你想接受数值输入，你需要将输入的字符串值转换为数值类型。\n\
    \n### 简单输入\n\n```python\nname = input(\"What's your name? \")\nprint(f\"Hello,\
    \ {name}.\")\n```\n\n### 使用 `int()` 接受数值输入\n\n```python\nage = input(\"How old\
    \ are you? \")\nage = int(age)\n\nif age >= 18:\n    print(\"\\nYou can vote!\"\
    )\nelse:\n    print(\"\\nSorry, you can't vote yet.\")\n```\n\n### 使用 `float()`\
    \ 接受数值输入\n\n```python\ntip = input(\"How much do you want to tip? \")\ntip = float(tip)\n\
    print(f\"Tipped ${tip}.\")\n```\n\n## While 循环\n\n`while` 循环在条件为真时重复执行一段代码。\n\n\
    ### 数到 5\n\n```python\ncurrent_number = 1\n\nwhile current_number <= 5:\n    print(current_number)\n\
    \    current_number += 1\n```\n\n## While 循环（续）\n\n### 让用户选择何时退出\n\n```python\n\
    prompt = \"\\nTell me something, and I'll \"\nprompt += \"repeat it back to you.\"\
    \nprompt += \"\\nEnter 'quit' to end the program. \"\n\nmessage = \"\"\nwhile\
    \ message != 'quit':\n    message = input(prompt)\n\n    if message != 'quit':\n\
    \        print(message)\n```\n\n### 使用标志\n\n标志在长时间运行的程序中最有用，因为程序其他部分的代码可能需要结束循环。\n\
    \n```python\nprompt = \"\\nTell me something, and I'll \"\nprompt += \"repeat\
    \ it back to you.\"\nprompt += \"\\nEnter 'quit' to end the program. \"\n\nactive\
    \ = True\nwhile active:\n    message = input(prompt)\n\n    if message == 'quit':\n\
    \        active = False\n    else:\n        print(message)\n```\n\n### 使用 `break`\
    \ 退出循环\n\n```python\nprompt = \"\\nWhat cities have you visited?\"\nprompt +=\
    \ \"\\nEnter 'quit' when you're done. \"\n\nwhile True:\n    city = input(prompt)\n\
    \n    if city == 'quit':\n        break\n    else:\n        print(f\"I've been\
    \ to {city}!\")\n```\n\n### 在 Sublime Text 中接受输入\n\nSublime Text 和许多其他文本编辑器无法运行提示用户输入的程序。你可以使用这些编辑器编写提示输入的程序，但你需要从终端运行它们。\n\
    \n## 跳出循环\n\n你可以在 Python 的任何循环中使用 `break` 语句和 `continue` 语句。例如，你可以使用 `break` 来退出正在处理列表或字典的\
    \ `for` 循环。你也可以使用 `continue` 在遍历列表或字典时跳过某些项目。\n\n## While 循环（续）\n\n### 在循环中使用\
    \ `continue`\n\n```python\nbanned_users = ['eve', 'fred', 'gary', 'helen']\n\n\
    prompt = \"\\nAdd a player to your team.\"\nprompt += \"\\nEnter 'quit' when you're\
    \ done. \"\n\nplayers = []\nwhile True:\n    player = input(prompt)\n\n    if\
    \ player == 'quit':\n        break\n    elif player in banned_users:\n       \
    \ print(f\"{player} is banned!\")\n        continue\n    else:\n        players.append(player)\n\
    \nprint(\"\\nYour team:\")\nfor player in players:\n    print(player)\n```\n\n\
    ### 避免无限循环\n\n每个 `while` 循环都需要一种停止运行的方式，这样它才不会永远运行下去。如果条件无法变为假，循环将永远不会停止运行。通常你可以按\
    \ `Ctrl-C` 来停止无限循环。\n\n### 一个无限循环\n\n```python\nwhile True:\n    name = input(\"\
    \\nWho are you? \")\n    print(f\"Nice to meet you, {name}!\")\n```\n\n### 从列表中删除所有特定值的实例\n\
    \n`remove()` 方法从列表中删除一个特定的值，但它只删除你提供的值的第一个实例。你可以使用 `while` 循环来删除特定值的所有实例。\n\n\
    ### 从宠物列表中删除所有猫\n\n```python\npets = ['dog', 'cat', 'dog', 'fish', 'cat',\n  \
    \      'rabbit', 'cat']\nprint(pets)\n\nwhile 'cat' in pets:\n    pets.remove('cat')\n\
    \nprint(pets)\n```\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/ 获取"
