  - "[PAGE 24]\n\n# Beginner's Python Cheat Sheet - Django, Part 2\n\n# Users and\
    \ forms\n\nMost web applications need to let users create accounts. This lets\
    \ users create and work with their own data. Some of this data may be private,\
    \ and some may be public. Django's forms allow users to enter and modify their\
    \ data.\n\n# User accounts\n\nUser accounts are handled by a dedicated app which\
    \ we'll call users. Users need to be able to register, log in, and log out. Django\
    \ automates much of this work for you.\n\n# Making a users app\n\nAfter making\
    \ the app, be sure to add 'users' to INSTALLED_APPS in the project's settings.py\
    \ file.\n\n```\n$ python manage.py startapp users\n```\n\n# Including URLs for\
    \ the users app\n\nAdd a line to the project's urls.py file so the users app's\
    \ URLs are included in the project.\n\n```\nfrom django.contrib import admin\n\
    from django.urls import path, include\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    \    path('users/', include('users.urls')),\n    path('', include('learning_logs.urls')),\n\
    ]\n```\n\n# Using forms in Django\n\nThere are a number of ways to create forms\
    \ and work with them. You can use Django's defaults, or completely customize your\
    \ forms. For a simple way to let users enter data based on your models, use a\
    \ ModelForm. This creates a form that allows users to enter data that will populate\
    \ the fields on a model.\n\nThe register view on the back of this sheet shows\
    \ a simple approach to form processing. If the view doesn't receive data from\
    \ a form, it responds with a blank form. If it receives POST data from a form,\
    \ it validates the data and then saves it to the database.\n\n# User accounts\
    \ (cont.)\n\n# Defining the URLs\n\nUsers will need to be able to log in, log\
    \ out, and register. Make a new urls.py file in the users app folder.\n\n```\n\
    from django.urls import path, include\n\nfrom . import views\n\napp_name = 'users'\n\
    urlpatterns = [\n    # Include default auth urls.\n    path('', include(\n   \
    \     'django.contrib.auth.urls')),\n\n    # Registration page.\n    path('register/',\
    \ views.register,\n         name='register'),\n]\n```\n\n# The login template\n\
    \nThe login view is provided by default, but you need to provide your own login\
    \ template. The template shown here displays a simple login form, and provides\
    \ basic error messages. Make a templates folder in the users folder, and then\
    \ make a registration folder in the templates folder. Save this file as login.html.\
    \ The path should be users/templates/registration/login.html.\n\nThe tag {% csrf_token\
    \ %} helps prevent a common type of attack with forms. The {{ form.as_p }} element\
    \ displays the default login form in paragraph format. The <input> element named\
    \ next redirects the user to the home page after a successful login.\n\n```\n\
    {% extends \"learning_logs/base.html\" %}\n\n{% block content %}\n\n  {% if form.errors\
    \ %}\n    <p>Your username and password didn't match.\n    Please try again.</p>\n\
    \  {% endif %}\n\n  <form method=\"post\"\n        action=\"{% url 'users:login'\
    \ %}\">\n    {% csrf token %}\n    {{ form.as_p }}\n    <button name=\"submit\"\
    >Log in</button>\n\n    <input type=\"hidden\" name=\"next\"\n           value=\"\
    {% url 'learning_logs:index' %}\"/>\n\n  </form>\n\n{% endblock content %}\n```\n\
    \n# User accounts (cont.)\n\n# Showing the current login status\n\nYou can modify\
    \ the base.html template to show whether the user is currently logged in, and\
    \ to provide a link to the login and logout pages. Django makes a user object\
    \ available to every template, and this template takes advantage of this object.\n\
    \nThe tag with user.is_authenticated allows you to serve specific content to users\
    \ depending on whether they have logged in or not. The {{ user.username }} property\
    \ allows you to greet users who have logged in. Users who haven't logged in see\
    \ links to register or log in.\n\n```\n<p>\n  <a href=\"{% url 'learning_logs:index'\
    \ %}\">\n    Learning Log\n  </a>\n\n  {% if user.is_authenticated %}\n    Hello,\
    \ {{ user.username }}.\n    <a href=\"{% url 'users:logout' %}\">\n      Log out\n\
    \    </a>\n  {% else %}\n    <a href=\"{% url 'users:register' %}\">\n      Register\n\
    \    </a> -\n    <a href=\"{% url 'users:login' %}\">\n      Log in\n    </a>\n\
    \  {% endif %}\n\n</p>\n\n{% block content %}{% endblock content %}\n```\n\n#\
    \ The logged_out template\n\nThe default logout view renders the page using the\
    \ template logged_out.html, which needs to be saved in the users/templates/registration/\
    \ folder.\n\n```\n{% extends \"learning_logs/base.html\" %}\n\n{% block content\
    \ %}\n  <p>You have been logged out. Thank you\n  for visiting!</p>\n{% endblock\
    \ content %}\n```\n\n# Python Crash Course\n\nA Hands-on, Project-Based Introduction\
    \ to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_24_0.png)"
  - "[PAGE 25]\n\n# User accounts (cont.)\n\nThe register view\nThe register view\
    \ needs to display a blank registration form when the page is first requested,\
    \ and then process completed registration forms. A successful registration logs\
    \ the user in and redirects to the home page.\n\n```\nfrom django.shortcuts import\
    \ render, redirect\nfrom django.contrib.auth import login\nfrom django.contrib.auth.forms\
    \ import \\n    UserCreationForm\n\ndef register(request):\n    \"\"\"Register\
    \ a new user.\"\"\"\n\n    if request.method != 'POST':\n        # Display blank\
    \ registration form.\n        form = UserCreationForm()\n\n    else:\n       \
    \ # Process completed form.\n        form = UserCreationForm(\n            data=request.POST)\n\
    \n        if form.is_valid():\n            new_user = form.save()\n\n        \
    \    # Log in, redirect to home page.\n            login(request, new_user)\n\
    \            return redirect(\n                'learning_logs:index')\n\n    #\
    \ Display a blank or invalid form.\n    context = {'form': form}\n\n    return\
    \ render(request,\n        'registration/register.html', context)\n```\n\n# Styling\
    \ your project\n\nThe django-bootstrap4 app allows you to use the Bootstrap library\
    \ to make your project look visually appealing. The app provides tags that you\
    \ can use in your templates to style individual elements on a page. Learn more\
    \ at django-bootstrap4.readthedocs.io/.\n\n# Deploying your project\n\nHeroku\
    \ lets you push your project to a live server, making it available to anyone with\
    \ an internet connection. Heroku offers a free service level, which lets you learn\
    \ the deployment process without any commitment.\nYou'll need to install a set\
    \ of Heroku command line tools, and use Git to track the state of your project.\
    \ See devcenter.heroku.com/, and click on the Python link.\n\n# User accounts\
    \ (cont.)\n\nThe register template\nThe register.html template shown here displays\
    \ the registration form in paragraph format.\n\n```\n{% extends 'learning_logs/base.html'\
    \ %}\n\n{% block content %}\n\n  <form method='post'\n        action=\"{% url\
    \ 'users:register' %}\">\n\n    {% csrf_token %}\n    {{ form.as_p }}\n\n    <button\
    \ name='submit'>Register</button>\n    <input type='hidden' name='next'\n    \
    \       value=\"{% url 'learning_logs:index' %}\"/>\n\n  </form>\n\n{% endblock\
    \ content %}\n```\n\n# Connecting data to users\n\nUsers will have data that belongs\
    \ to them. Any model that should be connected directly to a user needs a field\
    \ connecting instances of the model to a specific user.\n\n# Making a topic belong\
    \ to a user\n\nOnly the highest-level data in a hierarchy needs to be directly\
    \ connected to a user. To do this import the User model, and add it as a foreign\
    \ key on the data model.\nAfter modifying the model you'll need to migrate the\
    \ database. You'll need to choose a user ID to connect each existing instance\
    \ to.\n\n```\nfrom django.db import models\nfrom django.contrib.auth.models import\
    \ User\n\nclass Topic(models.Model):\n    \"\"\"A topic the user is learning about.\"\
    \"\"\n    text = models.CharField(max_length=200)\n    date_added = models.DateTimeField(\n\
    \        auto_now_add=True)\n\n    owner = models.ForeignKey(User,\n        on_delete=models.CASCADE)\n\
    \n    def __str__(self):\n        return self.text\n```\n\n# Querying data for\
    \ the current user\n\nIn a view, the request object has a user attribute. You\
    \ can use this attribute to query for the user's data. The filter() method then\
    \ pulls the data that belongs to the current user.\n\n```\ntopics = Topic.objects.filter(\n\
    \    owner=request.user)\n```\n\n# Connecting data to users (cont.)\n\n# Restricting\
    \ access to logged-in users\n\nSome pages are only relevant to registered users.\
    \ The views for these pages can be protected by the @login_required decorator.\
    \ Any view with this decorator will automatically redirect non-logged in users\
    \ to an appropriate page. Here's an example views.py file.\n\n```\nfrom django.contrib.auth.decorators\
    \ import \\n    login_required\n--snip--\n\n@login_required\ndef topic(request,\
    \ topic_id):\n    \"\"\"Show a topic and all its entries.\"\"\"\n```\n\n# Setting\
    \ the redirect URL\n\nThe @login_required decorator sends unauthorized users to\
    \ the login page. Add the following line to your project's settings.py file so\
    \ Django will know how to find your login page.\n\n```\nLOGIN_URL = 'users:login'\n\
    ```\n\n# Preventing inadvertent access\n\nSome pages serve data based on a parameter\
    \ in the URL. You can check that the current user owns the requested data, and\
    \ return a 404 error if they don't. Here's an example view.\n\n```\nfrom django.http\
    \ import Http404\n--snip--\n\n@login_required\ndef topic(request, topic_id):\n\
    \    \"\"\"Show a topic and all its entries.\"\"\"\n    topic = Topics.objects.get(id=topic_id)\n\
    \    if topic.owner != request.user:\n        raise Http404\n--snip--\n```\n\n\
    # Using a form to edit data\n\nIf you provide some initial data, Django generates\
    \ a form with the user's existing data. Users can then modify and save their data.\n\
    \n# Creating a form with initial data\n\nThe instance parameter allows you to\
    \ specify initial data for a form.\n\n```\nform = EntryForm(instance=entry)\n\
    ```\n\n# Modifying data before saving\n\nThe argument commit=False allows you\
    \ to make changes before writing data to the database.\n\n```\nnew_topic = form.save(commit=False)\n\
    new_topic.owner = request.user\nnew_topic.save()\n```\n\nMore cheat sheets available\
    \ at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Git\n\n## Version Control\n\nVersion control\
    \ software allows you to take snapshots of a project whenever it's in a working\
    \ state. If your project stops working, you can roll back to the most recent working\
    \ version of the project.\n\nVersion control is important because it frees you\
    \ to try new ideas with your code, without worrying that you'll break your overall\
    \ project. A distributed version control system like Git is also really useful\
    \ in working collaboratively with other developers.\n\n## Installing Git\n\nYou\
    \ can find an installer for your system at git-scm.com/. Before doing that, check\
    \ if Git is already on your system:\n\n```\n$ git --version\ngit version 2.20.1\
    \ (Apple Git-117)\n```\n\n## Configuring Git\n\nYou can configure Git so some\
    \ of its features are easier to use. The editor setting controls which editor\
    \ Git will open when it needs you to enter text.\n\nSee all global settings\n\n\
    ```\n$ git config --list\n```\n\nSet username\n\n```\n$ git config --global user.name\
    \ \"eric\"\n```\n\nSet email\n\n```\n$ git config --global user.email \"eric@example.com\"\
    \n```\n\nSet editor\n\n```\n$ git config --global core.editor \"nano\"\n```\n\n\
    ## Ignoring files\n\nTo ignore files make a file called \".gitignore\", with a\
    \ leading dot and no extension. Then list the directories and files you want to\
    \ ignore.\n\nIgnore directories\n\n```\n__pycache__/\nmy_venv/\n```\n\nIgnore\
    \ specific files\n\n```\n.DS_Store\nsecret_key.txt\n```\n\nIgnore files with specific\
    \ extensions\n\n```\n*.pyc\n```\n\n## Initializing a repository\n\nAll the files\
    \ Git uses to manage the repository are located in the hidden directory .git.\
    \ Don't delete that directory, or you'll lose your project's history.\n\nInitialize\
    \ a repository\n\n```\n$ git init\nInitialized empty Git repository in my_project/.git/\n\
    ```\n\n## Checking the status\n\nIt's important to check the status of your project\
    \ often, even before the first commit. This will tell you which files Git is planning\
    \ to track.\n\nCheck status\n\n```\n$ git status\nOn branch main\nNo commits yet\n\
    Untracked files:\n    .gitignore\n    hello.py\n    ...\n```\n\n## Adding files\n\
    \nYou'll need to add the files you want Git to keep track of.\n\nAdd all files\
    \ not in .gitignore\n\n```\n$ git add .\n```\n\nAdd a single file\n\n```\n$ git\
    \ add hello.py\n```\n\n## Making a commit\n\nWhen making a commit, the -am flag\
    \ commits all files that have been added, and records a commit message. (It's\
    \ a good idea to check the status before making each commit.)\n\nMake a commit\
    \ with a message\n\n```\n$ git commit -am \"Started project, everything works.\"\
    \n2 files changed, 8 insertions(+)\ncreate mode 100644 .gitignore\n```\n\n## Checking\
    \ the log\n\nGit logs all the commits you've made. Checking the log is helpful\
    \ for understanding the history of your project.\n\nCheck log in default format\n\
    \n```\n$ git log\ncommit 7c0a5d8... (HEAD -> main)\nAuthor: Eric Matthes <eric@example.com>\n\
    Date:   Mon Feb 15 08:40:21 2021 -0900\n    Greets user.\ncommit b9aedbb...\n\
    ...\n```\n\nCheck log in simpler format\n\n```\n$ git log --oneline\n7c0a5d8 (HEAD\
    \ -> main) Greets user.\nb9aedbb Started project, everything works.\n```\n\n##\
    \ Exploring history\n\nYou can explore a project's history by visiting specific\
    \ commit hashes, or by referencing the project's HEAD. HEAD refers to the most\
    \ recent commit of the current branch.\n\nVisit a specific commit\n\n```\n$ git\
    \ checkout b9aedbb\n```\n\nReturn to most recent commit of main branch\n\n```\n\
    $ git checkout main\n```\n\nVisit the previous commit\n\n```\n$ git checkout HEAD^\n\
    ```\n\nVisit an earlier commit\n\n```\n$ git checkout HEAD^^^\n```\n\nVisit the\
    \ previous commit\n\n```\n$ git checkout HEAD~1\n```\n\nVisit an earlier commit\n\
    \n```\n$ git checkout HEAD~3\n```\n\n## Learning more\n\nYou can learn more about\
    \ using Git with the command git help. You can also go to Stack Overflow and search\
    \ for git, and then sort the questions by number of votes.\n\n## Python Crash\
    \ Course\n\nA Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_26_0.png)\n\n## Branching\n\nWhen the\
    \ work you're about to do will involve multiple commits, you can create a branch\
    \ where you'll do this work. The changes you make will be kept away from your\
    \ main branch until you choose to merge them. It's common to delete a branch after\
    \ merging back to the main branch. Branches can also be used to maintain independent\
    \ releases of a project.\n\nMake a new branch and switch to it\n\n```\n$ git checkout\
    \ -b new_branch_name\nSwitched to a new branch 'new_branch_name'\n```\n\nSee all\
    \ branches\n\n```\n$ git branch\n* new_branch_name\n  main\n```\n\nSwitch to a\
    \ different branch\n\n```\n$ git checkout main\nSwitched to branch 'main'\n```\n\
    \nMerge changes\n\n```\n$ git merge new_branch_name\nUpdating b9aedbb..5e5130a\n\
    Fast-forward\n hello.py | 5 +++++\n 1 file changed, 5 insertions(+)\n```\n\nDelete\
    \ a branch\n\n```\n$ git branch -D new_branch_name\nDeleted branch new_branch_name\
    \ (was 5e5130a).\n```\n\nMove last commit to new branch\n\n```\n$ git branch new_branch_name\n\
    $ git reset --hard HEAD~1\n$ git checkout new_branch_name\n```\n\n## Undoing recent\
    \ changes\n\nOne of the main points of version control is to allow you to go back\
    \ to any working state of your project and start over from there.\n\nGet rid of\
    \ all uncommitted changes\n\n```\n$ git checkout .\n```\n\nGet rid of all changes\
    \ since a specific commit\n\n```\n$ git reset --hard b9aedbb\n```\n\nCreate new\
    \ branch starting at a previous commit\n\n```\n$ git checkout -b branch_name b9aedbb\n\
    ```\n\n## Stashing changes\n\nIf you want to save some changes without making\
    \ a commit, you can stash your changes. This is useful when you want to revisit\
    \ the most recent commit without making a new commit. You can stash as many sets\
    \ of changes as you need.\n\nStash changes since last commit\n\n```\n$ git stash\n\
    Saved working directory and index state\n      WIP on main: f6f39a6...\n```\n\n\
    See stashed changes\n\n```\n$ git stash list\nstash@{0}: WIP on main: f6f39a6...\n\
    stash@{1}: WIP on main: f6f39a6...\n...\n```\n\nReapply changes from most recent\
    \ stash\n\n```\n$ git stash pop\n```\n\nReapply changes from a specific stash\n\
    \n```\n$ git stash pop --index 1\n```\n\nClear all stashed changes\n\n```\n$ git\
    \ stash clear\n```\n\n## Comparing commits\n\nIt's often helpful to compare changes\
    \ across different states of a project.\n\nSee all changes since last commit\n\
    \n```\n$ git diff\n```\n\nSee changes in one file since last commit\n\n```\n$\
    \ git diff hello.py\n```\n\nSee changes since a specific commit\n\n```\n$ git\
    \ diff HEAD~2\n$ git diff HEAD^^\n$ git diff fab2cdd\n```\n\nSee changes between\
    \ two commits\n\n```\n$ git diff fab2cdd 7c0a5d8\n```\n\nSee changes in one file\
    \ between two commits\n\n```\n$ git diff fab2cdd 7c0a5d8 hello.py\n```\n\n## Good\
    \ commit habits\n\nTry to make a commit whenever your project is in a new working\
    \ state. Make sure you're writing concise commit messages that focus on what changes\
    \ have been implemented. If you're starting work on a new feature or bugfix, consider\
    \ making a new branch.\n\n## Git & GitHub\n\nGitHub is a platform for sharing\
    \ code, and working collaboratively on code. You can clone any public project\
    \ on GitHub. When you have an account, you can upload your own projects, and make\
    \ them public or private.\n\nClone an existing repository to your local system\n\
    \n```\n$ git clone https://github.com/ehmatthes/pcc_2e.git/\nCloning into 'pcc_2e'...\n\
    ...\nResolving deltas: 100% (816/816), done.\n```\n\nPush a local project to a\
    \ GitHub repository\n\nYou'll need to make an empty repository on GitHub first.\n\
    \n```\n$ git remote add origin https://github.com/username/hello_repo.git\n$ git\
    \ push -u origin main\nEnumerating objects: 10, done.\n...\nTo https://github.com/username/hello_repo.git\n\
    \ * [new branch]      main -> main\nBranch 'main' set up to track remote branch\
    \ 'main' from 'origin'.\n```\n\nPush recent changes to your GitHub repository\n\
    \n```\n$ git push origin branch_name\n```\n\n## Using pull requests\n\nWhen you\
    \ want to pull a set of changes from one branch into the main branch of a project\
    \ on GitHub, you can make a pull request. To practice making pull requests on\
    \ your own repositories, make a new branch for your work. When you're finished\
    \ the work, push the branch to your repository. Then go to the \"Pull requests\"\
    \ tab on GitHub, and click \"Compare & pull request\" on the branch you wish to\
    \ merge. When you're ready, click \"Merge pull request\". You can then pull these\
    \ changes back into your local main branch with git pull origin main. This is\
    \ an alternative to merging changes to your main branch locally, and then pushing\
    \ the main branch to GitHub.\n\n## Practicing with Git\n\nGit can be used in simple\
    \ ways as a solo developer, and complex ways as part of a large collaborative\
    \ team. You can gain valuable experience by making a simple throwaway project\
    \ and trying all of these steps with that project. Make sure your project has\
    \ multiple files and nested folders to get a clear sense of how Git works.\n\n\
    More cheat sheets available at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者Python速查表 - Git\n\n## 版本控制\n\n版本控制软件允许你在项目处于可工作状态时随时创建快照。如果项目停止工作，你可以回滚到最近的可工作版本。\n\
    \n版本控制很重要，因为它让你可以自由尝试代码的新想法，而不用担心会破坏整个项目。像Git这样的分布式版本控制系统在与其他开发者协作时也非常有用。\n\n\
    ## 安装Git\n\n你可以在git-scm.com/找到适合你系统的安装程序。在此之前，请检查系统中是否已安装Git：\n\n```\n$ git --version\n\
    git version 2.20.1 (Apple Git-117)\n```\n\n## 配置Git\n\n你可以配置Git，使其某些功能更易于使用。编辑器设置控制Git在需要你输入文本时将打开哪个编辑器。\n\
    \n查看所有全局设置\n\n```\n$ git config --list\n```\n\n设置用户名\n\n```\n$ git config --global\
    \ user.name \"eric\"\n```\n\n设置邮箱\n\n```\n$ git config --global user.email \"\
    eric@example.com\"\n```\n\n设置编辑器\n\n```\n$ git config --global core.editor \"\
    nano\"\n```\n\n## 忽略文件\n\n要忽略文件，请创建一个名为\".gitignore\"的文件，以点开头且没有扩展名。然后列出你想要忽略的目录和文件。\n\
    \n忽略目录\n\n```\n__pycache__/\nmy_venv/\n```\n\n忽略特定文件\n\n```\n.DS_Store\nsecret_key.txt\n\
    ```\n\n忽略具有特定扩展名的文件\n\n```\n*.pyc\n```\n\n## 初始化仓库\n\nGit用于管理仓库的所有文件都位于隐藏目录.git中。不要删除该目录，否则你将丢失项目的历史记录。\n\
    \n初始化仓库\n\n```\n$ git init\nInitialized empty Git repository in my_project/.git/\n\
    ```\n\n## 检查状态\n\n经常检查项目状态很重要，即使在第一次提交之前也是如此。这将告诉你Git计划跟踪哪些文件。\n\n检查状态\n\n```\n\
    $ git status\nOn branch main\nNo commits yet\nUntracked files:\n    .gitignore\n\
    \    hello.py\n    ...\n```\n\n## 添加文件\n\n你需要添加你希望Git跟踪的文件。\n\n添加所有不在.gitignore中的文件\n\
    \n```\n$ git add .\n```\n\n添加单个文件\n\n```\n$ git add hello.py\n```\n\n## 进行提交\n\
    \n进行提交时，-am标志会提交所有已添加的文件，并记录提交信息。（在每次提交前检查状态是个好主意。）\n\n使用消息进行提交\n\n```\n$ git\
    \ commit -am \"Started project, everything works.\"\n2 files changed, 8 insertions(+)\n\
    create mode 100644 .gitignore\n```\n\n## 查看日志\n\nGit会记录你所做的所有提交。查看日志有助于了解项目的历史。\n\
    \n以默认格式查看日志\n\n```\n$ git log\ncommit 7c0a5d8... (HEAD -> main)\nAuthor: Eric\
    \ Matthes <eric@example.com>\nDate:   Mon Feb 15 08:40:21 2021 -0900\n    Greets\
    \ user.\ncommit b9aedbb...\n...\n```\n\n以更简洁的格式查看日志\n\n```\n$ git log --oneline\n\
    7c0a5d8 (HEAD -> main) Greets user.\nb9aedbb Started project, everything works.\n\
    ```\n\n## 探索历史\n\n你可以通过访问特定的提交哈希或引用项目的HEAD来探索项目的历史。HEAD指的是当前分支的最近一次提交。\n\n访问特定提交\n\
    \n```\n$ git checkout b9aedbb\n```\n\n返回到main分支的最近提交\n\n```\n$ git checkout main\n\
    ```\n\n访问上一次提交\n\n```\n$ git checkout HEAD^\n```\n\n访问更早的提交\n\n```\n$ git checkout\
    \ HEAD^^^\n```\n\n访问上一次提交\n\n```\n$ git checkout HEAD~1\n```\n\n访问更早的提交\n\n```\n\
    $ git checkout HEAD~3\n```\n\n## 学习更多\n\n你可以通过命令`git help`学习更多关于使用Git的知识。你也可以访问Stack\
    \ Overflow并搜索git，然后按投票数对问题进行排序。\n\n## Python速查表\n\n基于实践和项目的编程入门\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_26_0.png)\n\n## 分支\n\n当你即将进行的工作涉及多次提交时，你可以创建一个分支来完成这项工作。你所做的更改将与主分支保持分离，直到你选择合并它们。通常在合并回主分支后会删除该分支。分支也可用于维护项目的独立版本。\n\
    \n创建一个新分支并切换到它\n\n```\n$ git checkout -b new_branch_name\nSwitched to a new branch\
    \ 'new_branch_name'\n```\n\n查看所有分支\n\n```\n$ git branch\n* new_branch_name\n \
    \ main\n```\n\n切换到不同的分支\n\n```\n$ git checkout main\nSwitched to branch 'main'\n\
    ```\n\n合并更改\n\n```\n$ git merge new_branch_name\nUpdating b9aedbb..5e5130a\nFast-forward\n\
    \ hello.py | 5 +++++\n 1 file changed, 5 insertions(+)\n```\n\n删除一个分支\n\n```\n\
    $ git branch -D new_branch_name\nDeleted branch new_branch_name (was 5e5130a).\n\
    ```\n\n将最后一次提交移动到新分支\n\n```\n$ git branch new_branch_name\n$ git reset --hard\
    \ HEAD~1\n$ git checkout new_branch_name\n```\n\n## 撤销最近的更改\n\n版本控制的主要目的之一是允许你回到项目的任何可工作状态并从那里重新开始。\n\
    \n丢弃所有未提交的更改\n\n```\n$ git checkout .\n```\n\n丢弃自特定提交以来的所有更改\n\n```\n$ git reset\
    \ --hard b9aedbb\n```\n\n从之前的提交创建新分支\n\n```\n$ git checkout -b branch_name b9aedbb\n\
    ```\n\n## 暂存更改\n\n如果你想保存一些更改而不进行提交，可以暂存你的更改。当你想在不创建新提交的情况下重新访问最近一次提交时，这很有用。你可以根据需要暂存任意多组更改。\n\
    \n暂存自上次提交以来的更改\n\n```\n$ git stash\nSaved working directory and index state\n\
    \      WIP on main: f6f39a6...\n```\n\n查看暂存的更改\n\n```\n$ git stash list\nstash@{0}:\
    \ WIP on main: f6f39a6...\nstash@{1}: WIP on main: f6f39a6...\n...\n```\n\n重新应用最近一次暂存的更改\n\
    \n```\n$ git stash pop\n```\n\n重新应用特定暂存的更改\n\n```\n$ git stash pop --index 1\n\
    ```\n\n清除所有暂存的更改\n\n```\n$ git stash clear\n```\n\n## 比较提交\n\n比较项目不同状态之间的更改通常很有帮助。\n\
    \n查看自上次提交以来的所有更改\n\n```\n$ git diff\n```\n\n查看单个文件自上次提交以来的更改\n\n```\n$ git diff\
    \ hello.py\n```\n\n查看自特定提交以来的更改\n\n```\n$ git diff HEAD~2\n$ git diff HEAD^^\n\
    $ git diff fab2cdd\n```\n\n查看两个提交之间的更改\n\n```\n$ git diff fab2cdd 7c0a5d8\n```\n\
    \n查看两个提交之间单个文件的更改\n\n```\n$ git diff fab2cdd 7c0a5d8 hello.py\n```\n\n## 良好的提交习惯\n\
    \n尽量在项目处于新的可工作状态时进行提交。确保你编写简洁的提交信息，重点说明已实现的更改。如果你开始处理新功能或错误修复，请考虑创建一个新分支。\n\n\
    ## Git与GitHub\n\nGitHub是一个共享代码和协作开发代码的平台。你可以克隆GitHub上的任何公共项目。当你拥有账户时，你可以上传自己的项目，并将其设为公共或私有。\n\
    \n将现有仓库克隆到本地系统\n\n```\n$ git clone https://github.com/ehmatthes/pcc_2e.git/\n\
    Cloning into 'pcc_2e'...\n...\nResolving deltas: 100% (816/816), done.\n```\n\n\
    将本地项目推送到GitHub仓库\n\n你需要先在GitHub上创建一个空仓库。\n\n```\n$ git remote add origin https://github.com/username/hello_repo.git\n\
    $ git push -u origin main\nEnumerating objects: 10, done.\n...\nTo https://github.com/username/hello_repo.git\n\
    \ * [new branch]      main -> main\nBranch 'main' set up to track remote branch\
    \ 'main' from 'origin'.\n```\n\n将最近的更改推送到你的GitHub仓库\n\n```\n$ git push origin\
    \ branch_name\n```\n\n## 使用拉取请求\n\n当你想将一组更改从一个分支拉取到GitHub上项目的主分支时，可以创建一个拉取请求。要在自己的仓库中练习创建拉取请求，请为你的工作创建一个新分支。完成工作后，将分支推送到你的仓库。然后转到GitHub上的\"\
    Pull requests\"选项卡，并在你希望合并的分支上点击\"Compare & pull request\"。准备好后，点击\"Merge pull\
    \ request\"。然后你可以使用`git pull origin main`将这些更改拉回到你的本地主分支。这是将更改合并到本地主分支，然后将主分支推送到GitHub的替代方法。\n\
    \n## 练习使用Git\n\nGit可以作为独立开发者以简单方式使用，也可以作为大型协作团队的一部分以复杂方式使用。你可以通过创建一个简单的临时项目并尝试所有这些步骤来获得宝贵经验。确保你的项目有多个文件和嵌套文件夹，以清晰了解Git的工作原理。\n\
    \n更多速查表可在ehmatthes.github.io/pcc_2e/获取"
