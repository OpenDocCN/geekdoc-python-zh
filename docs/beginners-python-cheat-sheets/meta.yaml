    \ variable attached to self is available everywhere in the class.\n\n# Understanding\
    \ __init__()\n\nThe __init__() method is a function that's part of a class, just\
    \ like any other method. The only special thing about __init__() is that it's\
    \ called automatically every time you make a new instance from a class. If you\
    \ accidentally misspell __init__(), the method won't be called and your object\
    \ may not be created correctly.\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Files and Exceptions\n\n## What are files?\
    \ What are exceptions?\n\nYour programs can read information in from files, and\
    \ they can write data to files. Reading from files allows you to work with a wide\
    \ variety of information; writing to files allows users to pick up where they\
    \ left off the next time they run your program. You can write text to files, and\
    \ you can store Python structures such as lists in data files.\n\nExceptions are\
    \ special objects that help your programs respond to errors in appropriate ways.\
    \ For example if your program tries to open a file that doesn't exist, you can\
    \ use exceptions to display an informative error message instead of having the\
    \ program crash.\n\n## Reading from a file\n\nTo read from a file your program\
    \ needs to open the file and then read the contents of the file. You can read\
    \ the entire contents of the file at once, or read it line by line. The with statement\
    \ shown here makes sure the file is closed properly when the program has finished\
    \ accessing the file.\n\n### Reading an entire file at once\n\n```python\nfilename\
    \ = 'siddhartha.txt'\n\nwith open(filename) as f_obj:\n    contents = f_obj.read()\n\
    \nprint(contents)\n```\n\n### Reading line by line\n\nEach line that's read from\
    \ the file has a newline character at the end of the line, and the print function\
    \ adds its own newline character. The rstrip() method gets rid of the extra blank\
    \ lines this would result in when printing to the terminal.\n\n```python\nfilename\
    \ = 'siddhartha.txt'\n\nwith open(filename) as f_obj:\n    for line in f_obj:\n\
    \        print(line.rstrip())\n```\n\n### Storing the lines in a list\n\n```python\n\
    filename = 'siddhartha.txt'\n\nwith open(filename) as f_obj:\n    lines = f_obj.readlines()\n\
    \nfor line in lines:\n    print(line.rstrip())\n```\n\n## Writing to a file\n\n\
    Passing the 'w' argument to open() tells Python you want to write to the file.\
    \ Be careful; this will erase the contents of the file if it already exists. Passing\
    \ the 'a' argument tells Python you want to append to the end of an existing file.\n\
    \n### Writing to an empty file\n\n```python\nfilename = 'programming.txt'\n\n\
    with open(filename, 'w') as f:\n    f.write(\"I love programming!\")\n```\n\n\
    ### Writing multiple lines to an empty file\n\n```python\nfilename = 'programming.txt'\n\
    \nwith open(filename, 'w') as f:\n    f.write(\"I love programming!\\n\")\n  \
    \  f.write(\"I love creating new games.\\n\")\n```\n\n### Appending to a file\n\
    \n```python\nfilename = 'programming.txt'\n\nwith open(filename, 'a') as f:\n\
    \    f.write(\"I also love working with data.\\n\")\n    f.write(\"I love making\
    \ apps as well.\\n\")\n```\n\n## File paths\n\nWhen Python runs the open() function,\
    \ it looks for the file in the same directory where the program that's being executed\
    \ is stored. You can open a file from a subfolder using a relative path. You can\
    \ also use an absolute path to open any file on your system.\n\n### Opening a\
    \ file from a subfolder\n\n```python\nf_path = \"text_files/alice.txt\"\n\nwith\
    \ open(f_path) as f:\n    lines = f.readlines()\n\nfor line in lines:\n    print(line.rstrip())\n\
    ```\n\n### Opening a file using an absolute path\n\n```python\nf_path = \"/home/ehmatthes/books/alice.txt\"\
    \n\nwith open(f_path) as f:\n    lines = f.readlines()\n```\n\n### Opening a file\
    \ on Windows\n\nWindows will sometimes interpret forward slashes incorrectly.\
    \ If you run into this, use backslashes in your file paths.\n\n```python\nf_path\
    \ = \"C:\\Users\\ehmatthes\\books\\alice.txt\"\n\nwith open(f_path) as f:\n  \
    \  lines = f.readlines()\n```\n\n## The try-except block\n\nWhen you think an\
    \ error may occur, you can write a try-except block to handle the exception that\
    \ might be raised. The try block tells Python to try running some code, and the\
    \ except block tells Python what to do if the code results in a particular kind\
    \ of error.\n\n### Handling the ZeroDivisionError exception\n\n```python\ntry:\n\
    \    print(5/0)\nexcept ZeroDivisionError:\n    print(\"You can't divide by zero!\"\
    )\n```\n\n### Handling the FileNotFoundError exception\n\n```python\nf_name =\
    \ 'siddhartha.txt'\n\ntry:\n    with open(f_name) as f:\n        lines = f.readlines()\n\
    except FileNotFoundError:\n    msg = f\"Can't find file: {f_name}.\"\n    print(msg)\n\
    ```\n\n### Knowing which exception to handle\n\nIt can be hard to know what kind\
    \ of exception to handle when writing code. Try writing your code without a try\
    \ block, and make it generate an error. The traceback will tell you what kind\
    \ of exception your program needs to handle. It's a good idea to skim through\
    \ the exceptions listed at docs.python.org/3/library/exceptions.html.\n\n## The\
    \ else block\n\nThe try block should only contain code that may cause an error.\
    \ Any code that depends on the try block running successfully should be placed\
    \ in the else block.\n\n### Using an else block\n\n```python\nprint(\"Enter two\
    \ numbers. I'll divide them.\")\n\nx = input(\"First number: \")\ny = input(\"\
    Second number: \")\n\ntry:\n    result = int(x) / int(y)\nexcept ZeroDivisionError:\n\
    \    print(\"You can't divide by zero!\")\nelse:\n    print(result)\n```\n\n###\
    \ Preventing crashes caused by user input\n\nWithout the except block in the following\
    \ example, the program would crash if the user tries to divide by zero. As written,\
    \ it will handle the error gracefully and keep running.\n\n```python\n\"\"\"A\
    \ simple calculator for division only.\"\"\"\n\nprint(\"Enter two numbers. I'll\
    \ divide them.\")\nprint(\"Enter 'q' to quit.\")\n\nwhile True:\n    x = input(\"\
    \\nFirst number: \")\n    if x == 'q':\n        break\n\n    y = input(\"Second\
    \ number: \")\n    if y == 'q':\n        break\n\n    try:\n        result = int(x)\
    \ / int(y)\n    except ZeroDivisionError:\n        print(\"You can't divide by\
    \ zero!\")\n    else:\n        print(result)\n```\n\n### Deciding which errors\
    \ to report\n\nWell-written, properly tested code is not very prone to internal\
    \ errors such as syntax or logical errors. But every time your program depends\
    \ on something external such as user input or the existence of a file, there's\
    \ a possibility of an exception being raised.\n\nIt's up to you how to communicate\
    \ errors to your users. Sometimes users need to know if a file is missing; sometimes\
    \ it's better to handle the error silently. A little experience will help you\
    \ know how much to report.\n\n### Failing silently\n\nSometimes you want your\
    \ program to just continue running when it encounters an error, without reporting\
    \ the error to the user. Using the pass statement in an except block allows you\
    \ to do this.\n\n### Using the pass statement in an else block\n\n```python\n\
    f_names = ['alice.txt', 'siddhartha.txt',\n           'moby_dick.txt', 'little_women.txt']\n\
    \nfor f_name in f_names:\n    # Report the length of each file found.\n    try:\n\
    \        with open(f_name) as f:\n            lines = f.readlines()\n    except\
    \ FileNotFoundError:\n        # Just move on to the next file.\n        pass\n\
    \    else:\n        num_lines = len(lines)\n        msg = f\"{f_name} has {num_lines}\"\
    \n        msg += \" lines.\"\n\n        print(msg)\n```\n\n### Avoid bare except\
    \ blocks\n\nException handling code should catch specific exceptions that you\
    \ expect to happen during your program's execution. A bare except block will catch\
    \ all exceptions, including keyboard interrupts and system exits you might need\
    \ when forcing a program to close.\n\nIf you want to use a try block and you're\
    \ not sure which exception to catch, use Exception. It will catch most exceptions,\
    \ but still allow you to interrupt programs intentionally.\n\n### Don't use bare\
    \ except blocks\n\n```python\ntry:\n    # Do something\nexcept:\n    pass\n```\n\
    \n### Use Exception instead\n\n```python\ntry:\n    # Do something\nexcept Exception:\n\
    \    pass\n```\n\n### Printing the exception\n\n```python\ntry:\n    # Do something\n\
    except Exception as e:\n    print(e, type(e))\n```\n\n## Storing data with json\n\
    \nThe json module allows you to dump simple Python data structures into a file,\
    \ and load the data from that file the next time the program runs. The JSON data\
    \ format is not specific to Python, so you can share this kind of data with people\
    \ who work in other languages as well.\n\nKnowing how to manage exceptions is\
    \ important when working with stored data. You'll usually want to make sure the\
    \ data you're trying to load exists before working with it.\n\n### Using json.dump()\
    \ to store data\n\n```python\n\"\"\"Store some numbers.\"\"\"\n\nimport json\n\
    \nnumbers = [2, 3, 5, 7, 11, 13]\n\nfilename = 'numbers.json'\nwith open(filename,\
    \ 'w') as f:\n    json.dump(numbers, f)\n```\n\n### Using json.load() to read\
    \ data\n\n```python\n\"\"\"Load some previously stored numbers.\"\"\"\n\nimport\
    \ json\n\nfilename = 'numbers.json'\nwith open(filename) as f:\n    numbers =\
    \ json.load(f)\n\nprint(numbers)\n```\n\n### Making sure the stored data exists\n\
    \n```python\nimport json\n\nf_name = 'numbers.json'\ntry:\n    with open(f_name)\
    \ as f:\n        numbers = json.load(f)\nexcept FileNotFoundError:\n    msg =\
    \ f\"Can't find file: {f_name}.\"\n    print(msg)\nelse:\n    print(numbers)\n\
    ```\n\n## Practice with exceptions\n\nTake a program you've already written that\
    \ prompts for user input, and add some error-handling code to the program. Run\
    \ your program with appropriate and inappropriate data, and make sure it handles\
    \ each situation correctly.\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者Python速查表 - 文件与异常\n\n## 什么是文件？什么是异常？\n\n你的程序可以从文件中读取信息，也可以将数据写入文件。从文件读取信息使你能够处理各种各样的数据；将数据写入文件则让用户在下次运行程序时能够从上次中断的地方继续。你可以将文本写入文件，也可以将Python数据结构（如列表）存储在数据文件中。\n\
    \n异常是特殊的对象，它们帮助你的程序以适当的方式应对错误。例如，如果你的程序试图打开一个不存在的文件，你可以使用异常来显示一条有信息量的错误消息，而不是让程序崩溃。\n\
    \n## 从文件读取\n\n要从文件读取，你的程序需要先打开文件，然后读取文件内容。你可以一次性读取整个文件内容，也可以逐行读取。这里展示的`with`语句确保程序在完成文件访问后正确关闭文件。\n\
    \n### 一次性读取整个文件\n\n```python\nfilename = 'siddhartha.txt'\n\nwith open(filename)\
    \ as f_obj:\n    contents = f_obj.read()\n\nprint(contents)\n```\n\n### 逐行读取\n\
    \n从文件读取的每一行末尾都有一个换行符，而`print`函数也会添加自己的换行符。`rstrip()`方法可以去除打印到终端时由此产生的多余空行。\n\n\
    ```python\nfilename = 'siddhartha.txt'\n\nwith open(filename) as f_obj:\n    for\
    \ line in f_obj:\n        print(line.rstrip())\n```\n\n### 将行存储在列表中\n\n```python\n\
    filename = 'siddhartha.txt'\n\nwith open(filename) as f_obj:\n    lines = f_obj.readlines()\n\
    \nfor line in lines:\n    print(line.rstrip())\n```\n\n## 写入文件\n\n向`open()`传递`'w'`参数告诉Python你想要写入文件。请注意：如果文件已存在，这会**擦除**文件内容。传递`'a'`参数则告诉Python你想要向现有文件末尾追加内容。\n\
    \n### 写入空文件\n\n```python\nfilename = 'programming.txt'\n\nwith open(filename,\
    \ 'w') as f:\n    f.write(\"I love programming!\")\n```\n\n### 向空文件写入多行\n\n```python\n\
    filename = 'programming.txt'\n\nwith open(filename, 'w') as f:\n    f.write(\"\
    I love programming!\\n\")\n    f.write(\"I love creating new games.\\n\")\n```\n\
    \n### 追加到文件\n\n```python\nfilename = 'programming.txt'\n\nwith open(filename,\
    \ 'a') as f:\n    f.write(\"I also love working with data.\\n\")\n    f.write(\"\
    I love making apps as well.\\n\")\n```\n\n## 文件路径\n\n当Python运行`open()`函数时，它会在执行该程序的同一目录中查找文件。你可以使用相对路径从子文件夹打开文件。你也可以使用绝对路径来打开系统上的任何文件。\n\
    \n### 从子文件夹打开文件\n\n```python\nf_path = \"text_files/alice.txt\"\n\nwith open(f_path)\
    \ as f:\n    lines = f.readlines()\n\nfor line in lines:\n    print(line.rstrip())\n\
    ```\n\n### 使用绝对路径打开文件\n\n```python\nf_path = \"/home/ehmatthes/books/alice.txt\"\
    \n\nwith open(f_path) as f:\n    lines = f.readlines()\n```\n\n### 在Windows上打开文件\n\
    \nWindows有时会错误地解释正斜杠。如果遇到这种情况，请在文件路径中使用反斜杠。\n\n```python\nf_path = \"C:\\Users\\\
    ehmatthes\\books\\alice.txt\"\n\nwith open(f_path) as f:\n    lines = f.readlines()\n\
    ```\n\n## try-except块\n\n当你认为可能发生错误时，可以编写一个`try-except`块来处理可能引发的异常。`try`块告诉Python尝试运行一些代码，而`except`块告诉Python如果代码导致特定类型的错误该怎么办。\n\
    \n### 处理ZeroDivisionError异常\n\n```python\ntry:\n    print(5/0)\nexcept ZeroDivisionError:\n\
    \    print(\"You can't divide by zero!\")\n```\n\n### 处理FileNotFoundError异常\n\n\
    ```python\nf_name = 'siddhartha.txt'\n\ntry:\n    with open(f_name) as f:\n  \
    \      lines = f.readlines()\nexcept FileNotFoundError:\n    msg = f\"Can't find\
    \ file: {f_name}.\"\n    print(msg)\n```\n\n### 知道要处理哪种异常\n\n在编写代码时，可能很难知道要处理哪种异常。尝试在没有`try`块的情况下编写代码，并让它生成一个错误。回溯信息会告诉你程序需要处理哪种异常。浏览一下`docs.python.org/3/library/exceptions.html`上列出的异常是个好主意。\n\
    \n## else块\n\n`try`块应该只包含可能导致错误的代码。任何依赖于`try`块成功运行的代码都应该放在`else`块中。\n\n### 使用else块\n\
    \n```python\nprint(\"Enter two numbers. I'll divide them.\")\n\nx = input(\"First\
    \ number: \")\ny = input(\"Second number: \")\n\ntry:\n    result = int(x) / int(y)\n\
    except ZeroDivisionError:\n    print(\"You can't divide by zero!\")\nelse:\n \
    \   print(result)\n```\n\n### 防止由用户输入引起的崩溃\n\n在下面的例子中，如果没有`except`块，当用户试图除以零时程序会崩溃。按照现在的写法，它将优雅地处理错误并继续运行。\n\
    \n```python\n\"\"\"A simple calculator for division only.\"\"\"\n\nprint(\"Enter\
    \ two numbers. I'll divide them.\")\nprint(\"Enter 'q' to quit.\")\n\nwhile True:\n\
    \    x = input(\"\\nFirst number: \")\n    if x == 'q':\n        break\n\n   \
    \ y = input(\"Second number: \")\n    if y == 'q':\n        break\n\n    try:\n\
    \        result = int(x) / int(y)\n    except ZeroDivisionError:\n        print(\"\
    You can't divide by zero!\")\n    else:\n        print(result)\n```\n\n### 决定报告哪些错误\n\
    \n编写良好、经过适当测试的代码不太容易出现内部错误，如语法或逻辑错误。但每次你的程序依赖于外部因素（如用户输入或文件存在）时，都有可能引发异常。\n\n\
    如何向用户传达错误取决于你。有时用户需要知道文件是否缺失；有时最好默默地处理错误。一点经验会帮助你了解该报告多少信息。\n\n### 静默失败\n\n有时你希望程序在遇到错误时只是继续运行，而不向用户报告错误。在`except`块中使用`pass`语句可以让你做到这一点。\n\
    \n### 在else块中使用pass语句\n\n```python\nf_names = ['alice.txt', 'siddhartha.txt',\n\
    \           'moby_dick.txt', 'little_women.txt']\n\nfor f_name in f_names:\n \
    \   # Report the length of each file found.\n    try:\n        with open(f_name)\
    \ as f:\n            lines = f.readlines()\n    except FileNotFoundError:\n  \
    \      # Just move on to the next file.\n        pass\n    else:\n        num_lines\
    \ = len(lines)\n        msg = f\"{f_name} has {num_lines}\"\n        msg += \"\
    \ lines.\"\n\n        print(msg)\n```\n\n### 避免使用裸except块\n\n异常处理代码应该捕获你预期在程序执行期间发生的特定异常。一个裸`except`块会捕获所有异常，包括键盘中断和系统退出，而这些你可能在需要强制关闭程序时用到。\n\
    \n如果你想使用`try`块但不确定要捕获哪种异常，请使用`Exception`。它会捕获大多数异常，但仍然允许你有意地中断程序。\n\n### 不要使用裸except块\n\
    \n```python\ntry:\n    # Do something\nexcept:\n    pass\n```\n\n### 改用Exception\n\
    \n```python\ntry:\n    # Do something\nexcept Exception:\n    pass\n```\n\n###\
    \ 打印异常\n\n```python\ntry:\n    # Do something\nexcept Exception as e:\n    print(e,\
    \ type(e))\n```\n\n## 使用json存储数据\n\n`json`模块允许你将简单的Python数据结构转储到文件中，并在程序下次运行时从该文件加载数据。JSON数据格式并非Python特有，因此你也可以与使用其他语言的人共享此类数据。\n\
    \n在处理存储的数据时，了解如何管理异常很重要。通常，你需要在处理数据之前确保要加载的数据存在。\n\n### 使用json.dump()存储数据\n\n\
    ```python\n\"\"\"Store some numbers.\"\"\"\n\nimport json\n\nnumbers = [2, 3,\
    \ 5, 7, 11, 13]\n\nfilename = 'numbers.json'\nwith open(filename, 'w') as f:\n\
    \    json.dump(numbers, f)\n```\n\n### 使用json.load()读取数据\n\n```python\n\"\"\"\
    Load some previously stored numbers.\"\"\"\n\nimport json\n\nfilename = 'numbers.json'\n\
    with open(filename) as f:\n    numbers = json.load(f)\n\nprint(numbers)\n```\n\
    \n### 确保存储的数据存在\n\n```python\nimport json\n\nf_name = 'numbers.json'\ntry:\n \
    \   with open(f_name) as f:\n        numbers = json.load(f)\nexcept FileNotFoundError:\n\
    \    msg = f\"Can't find file: {f_name}.\"\n    print(msg)\nelse:\n    print(numbers)\n\
    ```\n\n## 异常练习\n\n找一个你已经写好的、提示用户输入的程序，并向该程序添加一些错误处理代码。用合适和不合适的数据运行你的程序，确保它能正确处理每种情况。\n\
    \n更多速查表可在 ehmatthes.github.io/pcc_2e/ 获取"
