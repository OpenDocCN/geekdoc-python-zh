    \n# Removing an item from a group\n\nIt's important to delete elements that will\
    \ never appear again in the game, so you don't waste memory and resources.\n\n\
    ```\nbullets.remove(bullet)\n```\n\n# Detecting collisions\n\nYou can detect when\
    \ a single object collides with any member of a group. You can also detect when\
    \ any member of one group collides with a member of another group.\n\n# Collisions\
    \ between a single object and a group\n\nThe spritecollideany() function takes\
    \ an object and a group, and returns True if the object overlaps with any member\
    \ of the group.\n\n```\nif pygame.sprite.spritecollideany(ship, aliens):\n   \
    \ ships_left -= 1\n```\n\n# Collisions between two groups\n\nThe sprite.groupcollide()\
    \ function takes two groups, and two booleans. The function returns a dictionary\
    \ containing information about the members that have collided. The booleans tell\
    \ Pygame whether to delete the members of either group that have collided.\n\n\
    ```\ncollisions = pygame.sprite.groupcollide(\n    bullets, aliens, True, True)\n\
    \nscore += len(collisions) * alien_point_value\n```\n\n# Rendering text\n\nYou\
    \ can use text for a variety of purposes in a game. For example you can share\
    \ information with players, and you can display a score.\n\n# Displaying a message\n\
    \nThe following code defines a message, then a color for the text and the background\
    \ color for the message. A font is defined using the default system font, with\
    \ a font size of 48. The font.render() function is used to create an image of\
    \ the message, and we get the rect object associated with the image. We then center\
    \ the image on the screen and display it.\n\n```\nmsg = \"Play again?\"\nmsg_color\
    \ = (100, 100, 100)\nbg_color = (230, 230, 230)\n\nf = pygame.font.SysFont(None,\
    \ 48)\nmsg_image = f.render(msg, True, msg_color,\n    bg_color)\nmsg_image_rect\
    \ = msg_image.get_rect()\nmsg_image_rect.center = screen_rect.center\nscreen.blit(msg_image,\
    \ msg_image_rect)\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Matplotlib\n\n## What is Matplotlib?\n\n\
    Data visualization involves exploring data through visual representations. The\
    \ Matplotlib library helps you make visually appealing representations of the\
    \ data you're working with. Matplotlib is extremely flexible; these examples will\
    \ help you get started with a few simple visualizations.\n\n## Installing Matplotlib\n\
    \nMatplotlib runs on all systems, and you should be able to install it in one\
    \ line.\n\n```\n$ python -m pip install --user matplotlib\n```\n\n## Line graphs\
    \ and scatter plots\n\n### Making a line graph\n\nThe fig object represents the\
    \ entire figure, or collection of plots; ax represents a single plot in the figure.\
    \ This convention is used even when there's only one plot in the figure.\n\n```python\n\
    import matplotlib.pyplot as plt\n\nx_values = [0, 1, 2, 3, 4, 5]\nsquares = [0,\
    \ 1, 4, 9, 16, 25]\n\nfig, ax = plt.subplots()\nax.plot(x_values, squares)\n\n\
    plt.show()\n```\n\n### Making a scatter plot\n\nscatter() takes a list of x and\
    \ y values; the s=10 argument controls the size of each point.\n\n```python\n\
    import matplotlib.pyplot as plt\n\nx_values = list(range(1000))\nsquares = [x**2\
    \ for x in x_values]\n\nfig, ax = plt.subplots()\nax.scatter(x_values, squares,\
    \ s=10)\nplt.show()\n```\n\n## Customizing plots\n\nPlots can be customized in\
    \ a wide variety of ways. Just about any element of a plot can be modified.\n\n\
    ### Using built-in styles\n\nMatplotlib comes with a number of built-in styles,\
    \ which you can use with one additional line of code. The style must be specified\
    \ before you create the figure.\n\n```python\nimport matplotlib.pyplot as plt\n\
    \nx_values = list(range(1000))\nsquares = [x**2 for x in x_values]\n\nplt.style.use('seaborn')\n\
    fig, ax = plt.subplots()\nax.scatter(x_values, squares, s=10)\n\nplt.show()\n\
    ```\n\n### Seeing available styles\n\nYou can see all available styles on your\
    \ system. This can be done in a terminal session.\n\n```python\n>>> import matplotlib.pyplot\
    \ as plt\n>>> plt.style.available\n['seaborn-dark', 'seaborn-darkgrid', ...\n\
    ```\n\n### Adding titles and labels, and scaling axes\n\n```python\nimport matplotlib.pyplot\
    \ as plt\n\nx_values = list(range(1000))\nsquares = [x**2 for x in x_values]\n\
    \n# Set overall style to use, and plot data.\nplt.style.use('seaborn')\nfig, ax\
    \ = plt.subplots()\nax.scatter(x_values, squares, s=10)\n\n# Set chart title and\
    \ label axes.\nax.set_title('Square Numbers', fontsize=24)\nax.set_xlabel('Value',\
    \ fontsize=14)\nax.set_ylabel('Square of Value', fontsize=14)\n\n# Set scale of\
    \ axes, and size of tick labels.\nax.axis([0, 1100, 0, 1_100_000])\nax.tick_params(axis='both',\
    \ labelsize=14)\n\nplt.show()\n```\n\n### Using a colormap\n\nA colormap varies\
    \ the point colors from one shade to another, based on a certain value for each\
    \ point. The value used to determine the color of each point is passed to the\
    \ c argument, and the cmap argument specifies which colormap to use.\n\n```python\n\
    ax.scatter(x_values, squares, c=squares,\n          cmap=plt.cm.Blues, s=10)\n\
    ```\n\n### Customizing plots (cont.)\n\n### Emphasizing points\n\nYou can plot\
    \ as much data as you want on one plot. Here we replot the first and last points\
    \ larger to emphasize them.\n\n```python\nimport matplotlib.pyplot as plt\n\n\
    x_values = list(range(1000))\nsquares = [x**2 for x in x_values]\n\nfig, ax =\
    \ plt.subplots()\nax.scatter(x_values, squares, c=squares,\n          cmap=plt.cm.Blues,\
    \ s=10)\n\nax.scatter(x_values[0], squares[0], c='green',\n          s=100)\n\
    ax.scatter(x_values[-1], squares[-1], c='red',\n          s=100)\n\nax.set_title('Square\
    \ Numbers', fontsize=24)\n--snip--\n```\n\n### Removing axes\n\nYou can customize\
    \ or remove axes entirely. Here's how to access each axis, and hide it.\n\n```python\n\
    ax.get_xaxis().set_visible(False)\nax.get_yaxis().set_visible(False)\n```\n\n\
    ### Setting a custom figure size\n\nYou can make your plot as big or small as\
    \ you want by using the figsize argument. The dpi argument is optional; if you\
    \ don't know your system's resolution you can omit the argument and adjust the\
    \ figsize argument accordingly.\n\n```python\nfig, ax = plt.subplots(figsize=(10,\
    \ 6),\n                       dpi=128)\n```\n\n### Saving a plot\n\nThe Matplotlib\
    \ viewer has a save button, but you can also save your visualizations programmatically\
    \ by replacing plt.show() with plt.savefig(). The bbox_inches argument reduces\
    \ the amount of whitespace around the figure.\n\n```python\nplt.savefig('squares.png',\
    \ bbox_inches='tight')\n```\n\n### Online resources\n\nThe matplotlib gallery\
    \ and documentation are at matplotlib.org/. Be sure to visit the examples, gallery,\
    \ and pyplot links.\n\n## Python Crash Course\n\nA Hands-on, Project-Based Introduction\
    \ to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_18_0.png)\n\
    \n## Multiple plots\n\nYou can make as many plots as you want on one figure. When\
    \ you make multiple plots, you can emphasize relationships in the data. For example\
    \ you can fill the space between two sets of data.\n\n### Plotting two sets of\
    \ data\n\nHere we use ax.scatter() twice to plot square numbers and cubes on the\
    \ same figure.\n\n```python\nimport matplotlib.pyplot as plt\n\nx_values = list(range(11))\n\
    squares = [x**2 for x in x_values]\ncubes = [x**3 for x in x_values]\n\nplt.style.use('seaborn')\n\
    fig, ax = plt.subplots()\n\nax.scatter(x_values, squares, c='blue', s=10)\nax.scatter(x_values,\
    \ cubes, c='red', s=10)\n\nplt.show()\n```\n\n### Filling the space between data\
    \ sets\n\nThe fill_between() method fills the space between two data sets. It\
    \ takes a series of x-values and two series of y-values. It also takes a facecolor\
    \ to use for the fill, and an optional alpha argument that controls the color's\
    \ transparency.\n\n```python\nax.fill_between(x_values, cubes, squares,\n    \
    \            facecolor='blue', alpha=0.25)\n```\n\n## Working with dates and times\n\
    \nMany interesting data sets have a date or time as the x value. Python's datetime\
    \ module helps you work with this kind of data.\n\n### Generating the current\
    \ date\n\nThe datetime.now() function returns a datetime object representing the\
    \ current date and time.\n\n```python\nfrom datetime import datetime as dt\n\n\
    today = dt.now()\ndate_string = today.strftime('%m/%d/%Y')\nprint(date_string)\n\
    ```\n\n### Generating a specific date\n\nYou can also generate a datetime object\
    \ for any date and time you want. The positional order of arguments is year, month,\
    \ and day. The hour, minute, second, and microsecond arguments are optional.\n\
    \n```python\nfrom datetime import datetime as dt\n\nnew_years = dt(2021, 1, 1)\n\
    fall_equinox = dt(year=2021, month=9, day=22)\n```\n\n### Working with dates and\
    \ times (cont.)\n\n### Datetime formatting arguments\n\nThe strptime() function\
    \ generates a datetime object from a string, and the strftime() method generates\
    \ a formatted string from a datetime object. The following codes let you work\
    \ with dates exactly as you need to.\n\n```\n%A  Weekday name, such as Monday\n\
    %B  Month name, such as January\n%m  Month, as a number (01 to 12)\n%d  Day of\
    \ the month, as a number (01 to 31)\n%Y  Four-digit year, such as 2021\n%y  Two-digit\
    \ year, such as 21\n%H  Hour, in 24-hour format (00 to 23)\n%I  Hour, in 12-hour\
    \ format (01 to 12)\n%p  AM or PM\n%M  Minutes (00 to 59)\n%S  Seconds (00 to\
    \ 61)\n```\n\n### Converting a string to a datetime object\n\n```python\nnew_years\
    \ = dt.strptime('1/1/2021', '%m/%d/%Y')\n```\n\n### Converting a datetime object\
    \ to a string\n\n```python\nny_string = new_years.strftime('%B %d, %Y')\nprint(ny_string)\n\
    ```\n\n### Plotting high temperatures\n\nThe following code creates a list of\
    \ dates and a corresponding list of high temperatures. It then plots the high\
    \ temperatures, with the date labels displayed in a specific format.\n\n```python\n\
    from datetime import datetime as dt\n\nimport matplotlib.pyplot as plt\nfrom matplotlib\
    \ import dates as mdates\n\ndates = [\n    dt(2020, 6, 21), dt(2020, 6, 22),\n\
    \    dt(2020, 6, 23), dt(2020, 6, 24),\n    ]\nhighs = [56, 57, 57, 64]\n\nfig,\
    \ ax = plt.subplots()\nax.plot(dates, highs, c='red')\n\nax.set_title(\"Daily\
    \ High Temps\", fontsize=24)\nax.set_ylabel(\"Temp (F)\", fontsize=16)\nx_axis\
    \ = ax.get_xaxis()\nx_axis.set_major_formatter(\n    mdates.DateFormatter('%B\
    \ %d %Y')\n    )\nfig.autofmt_xdate()\n\nplt.show()\n```\n\n## Multiple plots\
    \ in one figure\n\nYou can include as many individual graphs in one figure as\
    \ you want.\n\n### Sharing an x-axis\n\nThe following code plots a set of squares\
    \ and a set of cubes on two separate graphs that share a common x-axis. The plt.subplots()\
    \ function returns a figure object and a tuple of axes. Each set of axes corresponds\
    \ to a separate plot in the figure. The first two arguments control the number\
    \ of rows and columns generated in the figure.\n\n```python\nimport matplotlib.pyplot\
    \ as plt\n\nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\ncubes\
    \ = [x**3 for x in x_values]\n\nfig, axs = plt.subplots(2, 1, sharex=True)\n\n\
    axs[0].scatter(x_values, squares)\naxs[0].set_title('Squares')\n\naxs[1].scatter(x_values,\
    \ cubes, c='red')\naxs[1].set_title('Cubes')\n\nplt.show()\n```\n\n### Sharing\
    \ a y-axis\n\nTo share a y-axis, we use the sharey=True argument.\n\n```python\n\
    import matplotlib.pyplot as plt\n\nx_values = list(range(11))\nsquares = [x**2\
    \ for x in x_values]\ncubes = [x**3 for x in x_values]\n\nplt.style.use('seaborn')\n\
    fig, axs = plt.subplots(1, 2, sharey=True)\n\naxs[0].scatter(x_values, squares)\n\
    axs[0].set_title('Squares')\n\naxs[1].scatter(x_values, cubes, c='red')\naxs[1].set_title('Cubes')\n\
    \nplt.show()\n```\n\n![](img/12320e46b546a2862f3a411be6db7a27_19_0.png)\n\nMore\
    \ cheat sheets available at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者Python速查表 - Matplotlib\n\n## 什么是Matplotlib？\n\n数据可视化是通过视觉表示来探索数据的过程。Matplotlib库可以帮助你制作出美观的数据表示图。Matplotlib非常灵活；以下示例将帮助你从几个简单的可视化开始入门。\n\
    \n## 安装Matplotlib\n\nMatplotlib可在所有系统上运行，你应该能通过一行命令完成安装。\n\n```\n$ python -m pip\
    \ install --user matplotlib\n```\n\n## 折线图和散点图\n\n### 制作折线图\n\n`fig`对象代表整个图形或图表集合；`ax`代表图形中的单个图表。即使图形中只有一个图表，也使用这种约定。\n\
    \n```python\nimport matplotlib.pyplot as plt\n\nx_values = [0, 1, 2, 3, 4, 5]\n\
    squares = [0, 1, 4, 9, 16, 25]\n\nfig, ax = plt.subplots()\nax.plot(x_values,\
    \ squares)\n\nplt.show()\n```\n\n### 制作散点图\n\n`scatter()`函数接受x值和y值的列表；`s=10`参数控制每个点的大小。\n\
    \n```python\nimport matplotlib.pyplot as plt\n\nx_values = list(range(1000))\n\
    squares = [x**2 for x in x_values]\n\nfig, ax = plt.subplots()\nax.scatter(x_values,\
    \ squares, s=10)\nplt.show()\n```\n\n## 自定义图表\n\n图表可以通过多种方式进行自定义。图表的几乎任何元素都可以修改。\n\
    \n### 使用内置样式\n\nMatplotlib提供了多种内置样式，只需额外一行代码即可使用。必须在创建图形之前指定样式。\n\n```python\n\
    import matplotlib.pyplot as plt\n\nx_values = list(range(1000))\nsquares = [x**2\
    \ for x in x_values]\n\nplt.style.use('seaborn')\nfig, ax = plt.subplots()\nax.scatter(x_values,\
    \ squares, s=10)\n\nplt.show()\n```\n\n### 查看可用样式\n\n你可以查看系统上所有可用的样式。这可以在终端会话中完成。\n\
    \n```python\n>>> import matplotlib.pyplot as plt\n>>> plt.style.available\n['seaborn-dark',\
    \ 'seaborn-darkgrid', ...\n```\n\n### 添加标题和标签，以及缩放坐标轴\n\n```python\nimport matplotlib.pyplot\
    \ as plt\n\nx_values = list(range(1000))\nsquares = [x**2 for x in x_values]\n\
    \n# 设置要使用的整体样式，并绘制数据。\nplt.style.use('seaborn')\nfig, ax = plt.subplots()\nax.scatter(x_values,\
    \ squares, s=10)\n\n# 设置图表标题和坐标轴标签。\nax.set_title('Square Numbers', fontsize=24)\n\
    ax.set_xlabel('Value', fontsize=14)\nax.set_ylabel('Square of Value', fontsize=14)\n\
    \n# 设置坐标轴的刻度范围，以及刻度标签的大小。\nax.axis([0, 1100, 0, 1_100_000])\nax.tick_params(axis='both',\
    \ labelsize=14)\n\nplt.show()\n```\n\n### 使用颜色映射\n\n颜色映射根据每个点的某个值，将点的颜色从一种色调变化到另一种色调。用于确定每个点颜色的值传递给`c`参数，而`cmap`参数指定使用哪种颜色映射。\n\
    \n```python\nax.scatter(x_values, squares, c=squares,\n          cmap=plt.cm.Blues,\
    \ s=10)\n```\n\n### 自定义图表（续）\n\n### 强调点\n\n你可以在一个图表上绘制任意多的数据。这里我们重新绘制第一个和最后一个点，使其更大以强调它们。\n\
    \n```python\nimport matplotlib.pyplot as plt\n\nx_values = list(range(1000))\n\
    squares = [x**2 for x in x_values]\n\nfig, ax = plt.subplots()\nax.scatter(x_values,\
    \ squares, c=squares,\n          cmap=plt.cm.Blues, s=10)\n\nax.scatter(x_values[0],\
    \ squares[0], c='green',\n          s=100)\nax.scatter(x_values[-1], squares[-1],\
    \ c='red',\n          s=100)\n\nax.set_title('Square Numbers', fontsize=24)\n\
    --snip--\n```\n\n### 移除坐标轴\n\n你可以自定义或完全移除坐标轴。以下是访问每个坐标轴并隐藏它的方法。\n\n```python\n\
    ax.get_xaxis().set_visible(False)\nax.get_yaxis().set_visible(False)\n```\n\n\
    ### 设置自定义图形大小\n\n你可以使用`figsize`参数使图表变大或变小。`dpi`参数是可选的；如果你不知道系统的分辨率，可以省略该参数并相应地调整`figsize`参数。\n\
    \n```python\nfig, ax = plt.subplots(figsize=(10, 6),\n                       dpi=128)\n\
    ```\n\n### 保存图表\n\nMatplotlib查看器有一个保存按钮，但你也可以通过将`plt.show()`替换为`plt.savefig()`来以编程方式保存可视化图表。`bbox_inches`参数可以减少图形周围的空白区域。\n\
    \n```python\nplt.savefig('squares.png', bbox_inches='tight')\n```\n\n### 在线资源\n\
    \nmatplotlib的图库和文档位于matplotlib.org/。请务必访问示例、图库和pyplot链接。\n\n## Python速查表\n\n基于实践和项目的编程入门\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_18_0.png)\n\
    \n## 多个图表\n\n你可以在一个图形上制作任意多个图表。当你制作多个图表时，可以强调数据之间的关系。例如，你可以填充两组数据之间的空间。\n\n###\
    \ 绘制两组数据\n\n这里我们使用两次`ax.scatter()`在同一图形上绘制平方数和立方数。\n\n```python\nimport matplotlib.pyplot\
    \ as plt\n\nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\ncubes\
    \ = [x**3 for x in x_values]\n\nplt.style.use('seaborn')\nfig, ax = plt.subplots()\n\
    \nax.scatter(x_values, squares, c='blue', s=10)\nax.scatter(x_values, cubes, c='red',\
    \ s=10)\n\nplt.show()\n```\n\n### 填充数据集之间的空间\n\n`fill_between()`方法填充两个数据集之间的空间。它接受一系列x值和两系列y值。它还接受一个用于填充的`facecolor`，以及一个可选的`alpha`参数来控制颜色的透明度。\n\
    \n```python\nax.fill_between(x_values, cubes, squares,\n                facecolor='blue',\
    \ alpha=0.25)\n```\n\n## 处理日期和时间\n\n许多有趣的数据集以日期或时间作为x值。Python的`datetime`模块可以帮助你处理这类数据。\n\
    \n### 生成当前日期\n\n`datetime.now()`函数返回一个表示当前日期和时间的`datetime`对象。\n\n```python\nfrom\
    \ datetime import datetime as dt\n\ntoday = dt.now()\ndate_string = today.strftime('%m/%d/%Y')\n\
    print(date_string)\n```\n\n### 生成特定日期\n\n你也可以为任何你想要的日期和时间生成一个`datetime`对象。参数的顺序是年、月、日。小时、分钟、秒和微秒参数是可选的。\n\
    \n```python\nfrom datetime import datetime as dt\n\nnew_years = dt(2021, 1, 1)\n\
    fall_equinox = dt(year=2021, month=9, day=22)\n```\n\n### 处理日期和时间（续）\n\n### 日期时间格式化参数\n\
    \n`strptime()`函数从字符串生成`datetime`对象，而`strftime()`方法从`datetime`对象生成格式化的字符串。以下代码可以让你完全按照需要处理日期。\n\
    \n```\n%A  星期名称，例如 Monday\n%B  月份名称，例如 January\n%m  月份，数字形式（01 到 12）\n%d  月份中的日期，数字形式（01\
    \ 到 31）\n%Y  四位数年份，例如 2021\n%y  两位数年份，例如 21\n%H  小时，24小时制（00 到 23）\n%I  小时，12小时制（01\
    \ 到 12）\n%p  AM 或 PM\n%M  分钟（00 到 59）\n%S  秒（00 到 61）\n```\n\n### 将字符串转换为datetime对象\n\
    \n```python\nnew_years = dt.strptime('1/1/2021', '%m/%d/%Y')\n```\n\n### 将datetime对象转换为字符串\n\
    \n```python\nny_string = new_years.strftime('%B %d, %Y')\nprint(ny_string)\n```\n\
    \n### 绘制最高温度\n\n以下代码创建一个日期列表和一个对应的最高温度列表。然后绘制最高温度，并以特定格式显示日期标签。\n\n```python\n\
    from datetime import datetime as dt\n\nimport matplotlib.pyplot as plt\nfrom matplotlib\
    \ import dates as mdates\n\ndates = [\n    dt(2020, 6, 21), dt(2020, 6, 22),\n\
    \    dt(2020, 6, 23), dt(2020, 6, 24),\n    ]\nhighs = [56, 57, 57, 64]\n\nfig,\
    \ ax = plt.subplots()\nax.plot(dates, highs, c='red')\n\nax.set_title(\"Daily\
    \ High Temps\", fontsize=24)\nax.set_ylabel(\"Temp (F)\", fontsize=16)\nx_axis\
    \ = ax.get_xaxis()\nx_axis.set_major_formatter(\n    mdates.DateFormatter('%B\
    \ %d %Y')\n    )\nfig.autofmt_xdate()\n\nplt.show()\n```\n\n## 一个图形中的多个图表\n\n\
    你可以在一个图形中包含任意多个独立的图表。\n\n### 共享x轴\n\n以下代码在两个共享公共x轴的独立图表上绘制一组平方数和一组立方数。`plt.subplots()`函数返回一个图形对象和一个坐标轴元组。每组坐标轴对应图形中的一个独立图表。前两个参数控制图形中生成的行数和列数。\n\
    \n```python\nimport matplotlib.pyplot as plt\n\nx_values = list(range(11))\nsquares\
    \ = [x**2 for x in x_values]\ncubes = [x**3 for x in x_values]\n\nfig, axs = plt.subplots(2,\
    \ 1, sharex=True)\n\naxs[0].scatter(x_values, squares)\naxs[0].set_title('Squares')\n\
    \naxs[1].scatter(x_values, cubes, c='red')\naxs[1].set_title('Cubes')\n\nplt.show()\n\
    ```\n\n### 共享y轴\n\n要共享y轴，我们使用`sharey=True`参数。\n\n```python\nimport matplotlib.pyplot\
    \ as plt\n\nx_values = list(range(11))\nsquares = [x**2 for x in x_values]\ncubes\
    \ = [x**3 for x in x_values]\n\nplt.style.use('seaborn')\nfig, axs = plt.subplots(1,\
    \ 2, sharey=True)\n\naxs[0].scatter(x_values, squares)\naxs[0].set_title('Squares')\n\
    \naxs[1].scatter(x_values, cubes, c='red')\naxs[1].set_title('Cubes')\n\nplt.show()\n\
    ```\n\n![](img/12320e46b546a2862f3a411be6db7a27_19_0.png)\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/\
    \ 获取"
