    \ sheets available at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者 Python 速查表 - Pygame\n\n## 什么是 Pygame？\n\nPygame 是一个使用 Python 制作游戏的框架。制作游戏很有趣，也是扩展编程技能和知识的好方法。Pygame\
    \ 处理了构建游戏中的许多底层任务，让你能够专注于游戏的趣味性方面。\n\n## 安装 Pygame\n\nPygame 可在所有系统上运行，你应该能用一行命令安装它。\n\
    \n```\n$ python -m pip install --user pygame\n```\n\n## 开始一个游戏\n\n以下代码设置了一个空的游戏窗口，并启动了一个事件循环和一个持续刷新屏幕的循环。\n\
    \n### 一个空的游戏窗口\n\n```python\nimport sys\nimport pygame\n\nclass AlienInvasion:\n\
    \    def __init__(self):\n        pygame.init()\n        self.screen = pygame.display.set_mode(\n\
    \            (1200, 800))\n        pygame.display.set_caption(\n            \"\
    Alien Invasion\")\n\n    def run_game(self):\n        while True:\n          \
    \  for event in pygame.event.get():\n                if event.type == pygame.QUIT:\n\
    \                    sys.exit()\n\n            pygame.display.flip()\n\nif __name__\
    \ == '__main__':\n    ai = AlienInvasion()\n    ai.run_game()\n```\n\n### 设置自定义窗口大小\n\
    \n`display.set_mode()` 函数接受一个定义屏幕大小的元组。\n\n```python\nscreen_dim = (1500, 1000)\n\
    self.screen = pygame.display.set_mode(\n    screen_dim)\n```\n\n### 设置自定义背景颜色\n\
    \n颜色定义为红、绿、蓝值的元组。每个值的范围是 0-255。`fill()` 方法用你指定的颜色填充屏幕，并且应该在向屏幕添加任何其他元素之前调用。\n\n\
    ```python\ndef __init__(self):\n    --snip--\n    self.bg_color = (225, 225, 225)\n\
    \ndef run_game(self):\n    while True:\n        for event in pygame.event.get():\n\
    \            --snip--\n\n        self.screen.fill(self.bg_color)\n        pygame.display.flip()\n\
    ```\n\n## Pygame rect 对象\n\n游戏中的许多对象可以被视为简单的矩形，而不是它们的实际形状。这简化了代码，而不会明显影响游戏玩法。Pygame\
    \ 有一个 rect 对象，使得处理游戏对象变得容易。\n\n### 获取屏幕 rect 对象\n\n我们已经有了一个屏幕对象；我们可以轻松访问与屏幕关联的\
    \ rect 对象。\n\n```python\nself.screen_rect = self.screen.get_rect()\n```\n\n###\
    \ 查找屏幕中心\n\nRect 对象有一个 `center` 属性，用于存储中心点。\n\n```python\nscreen_center = self.screen_rect.center\n\
    ```\n\n### 有用的 rect 属性\n\n一旦你有了一个 rect 对象，就有许多属性在定位对象和检测对象相对位置时很有用。（你可以在 Pygame\
    \ 文档中找到更多属性。为了清晰起见，省略了 `self` 变量。）\n\n```python\n# 单个 x 和 y 值：\nscreen_rect.left,\
    \ screen_rect.right\nscreen_rect.top, screen_rect.bottom\nscreen_rect.centerx,\
    \ screen_rect.centery\nscreen_rect.width, screen_rect.height\n\n# 元组\nscreen_rect.center\n\
    screen_rect.size\n```\n\n### 创建一个 rect 对象\n\n你可以从头开始创建一个 rect 对象。例如，一个填充的小 rect\
    \ 对象可以代表游戏中的子弹。`Rect()` 类接受左上角的坐标，以及 rect 的宽度和高度。`draw.rect()` 函数接受一个屏幕对象、一个颜色和一个\
    \ rect。此函数用给定的颜色填充给定的 rect。\n\n```python\nbullet_rect = pygame.Rect(100, 100,\
    \ 3, 15)\ncolor = (100, 100, 100)\n\npygame.draw.rect(screen, color, bullet_rect)\n\
    ```\n\n## 处理图像\n\n游戏中的许多对象是在屏幕上移动的图像。使用位图（.bmp）图像文件最容易，但你也可以配置你的系统以处理 jpg、png\
    \ 和 gif 文件。\n\n### 加载图像\n\n```python\nship = pygame.image.load('images/ship.bmp')\n\
    ```\n\n### 从图像获取 rect 对象\n\n```python\nship_rect = ship.get_rect()\n```\n\n###\
    \ 定位图像\n\n使用 rect，可以轻松地将图像定位在屏幕上的任何位置，或相对于另一个对象的位置。以下代码通过将飞船的 `midbottom` 与屏幕的\
    \ `midbottom` 匹配，将飞船定位在屏幕底部中央。\n\n```python\nship_rect.midbottom = screen_rect.midbottom\n\
    ```\n\n### 将图像绘制到屏幕\n\n一旦图像被加载并定位，你就可以使用 `blit()` 方法将其绘制到屏幕上。`blit()` 方法作用于屏幕对象，并接受图像对象和图像\
    \ rect 作为参数。\n\n```python\n# 将飞船绘制到屏幕。\nscreen.blit(ship, ship_rect)\n```\n\n\
    ### 变换图像\n\n`transform` 模块允许你对图像进行更改，例如旋转和缩放。\n\n```python\nrotated_image = pygame.transform.rotate(\n\
    \    ship.image, 45)\n```\n\n### `blitme()` 方法\n\n像飞船这样的游戏对象通常被编写为类。然后通常定义一个 `blitme()`\
    \ 方法，用于将对象绘制到屏幕上。\n\n```python\ndef blitme(self):\n    \"\"\"在当前位置绘制飞船。\"\"\"\n\
    \    self.screen.blit(self.image, self.rect)\n```\n\n## 响应键盘输入\n\nPygame 监视按键和鼠标操作等事件。你可以在事件循环中检测任何你关心的事件，并以适合你游戏的任何操作进行响应。\n\
    \n### 响应按键\n\nPygame 的主事件循环在每次按键时注册一个 `KEYDOWN` 事件。当这种情况发生时，你可以检查特定的按键。\n\n```python\n\
    for event in pygame.event.get():\n    if event.type == pygame.KEYDOWN:\n     \
    \   if event.key == pygame.K_RIGHT:\n            ship_rect.x += 1\n        elif\
    \ event.key == pygame.K_LEFT:\n            ship_rect.x -= 1\n        elif event.key\
    \ == pygame.K_SPACE:\n            ship.fire_bullet()\n        elif event.key ==\
    \ pygame.K_q:\n            sys.exit()\n```\n\n### 响应释放的按键\n\n当用户释放按键时，会触发一个 `KEYUP`\
    \ 事件。\n\n```python\nfor event in pygame.event.get():\n    if event.type == pygame.KEYUP:\n\
    \        if event.key == pygame.K_RIGHT:\n            ship.moving_right = False\n\
    ```\n\n### 游戏是一个对象\n\n在下面显示的整体结构中（在“开始一个游戏”下），整个游戏被编写为一个类。这使得编写自动玩游戏的程序成为可能，也意味着你可以构建一个包含一系列游戏的游戏厅。\n\
    \n### Pygame 文档\n\nPygame 文档在构建自己的游戏时非常有帮助。Pygame 项目的主页在 pygame.org/，文档的主页在 pygame.org/docs/。\n\
    文档中最有用的部分是关于 Pygame 特定部分的页面，例如 `Rect()` 类和 `sprite` 模块。你可以在帮助页面的顶部找到这些元素的列表。\n\
    \n## 响应鼠标事件\n\nPygame 的事件循环在鼠标移动、按下或释放鼠标按钮时注册事件。\n\n### 响应鼠标按钮\n\n```python\n\
    for event in pygame.event.get():\n    if event.type == pygame.MOUSEBUTTONDOWN:\n\
    \        ship.fire_bullet()\n```\n\n### 查找鼠标位置\n\n鼠标位置以元组形式返回。\n\n```python\n\
    mouse_pos = pygame.mouse.get_pos()\n```\n\n### 点击按钮\n\n你可能想知道光标是否在按钮等对象上。`rect.collidepoint()`\
    \ 方法在点与 rect 对象重叠时返回 `True`。\n\n```python\nif button_rect.collidepoint(mouse_pos):\n\
    \    start_game()\n```\n\n### 隐藏鼠标\n\n```python\npygame.mouse.set_visible(False)\n\
    ```\n\n## Pygame 组\n\nPygame 有一个 `Group` 类，使得处理一组相似对象更容易。组就像一个列表，具有一些在构建游戏时有用的额外功能。\n\
    \n### 创建并填充组\n\n将被放入组中的对象必须继承自 `Sprite`。\n\n```python\nfrom pygame.sprite import\
    \ Sprite, Group\n\nclass Bullet(Sprite):\n    ...\n    def draw_bullet(self):\n\
    \        ...\n    def update(self):\n        ...\n\nbullets = Group()\n\nnew_bullet\
    \ = Bullet()\nbullets.add(new_bullet)\n```\n\n### 遍历组中的项目\n\n`sprites()` 方法返回组的所有成员。\n\
    \n```python\nfor bullet in bullets.sprites():\n    bullet.draw_bullet()\n```\n\
    \n### 在组上调用 `update()`\n\n在组上调用 `update()` 会自动调用组中每个成员的 `update()`。\n\n```python\n\
    bullets.update()\n```\n\n### 从组中移除项目\n\n删除游戏中永远不会再次出现的元素很重要，这样你就不会浪费内存和资源。\n\n\
    ```python\nbullets.remove(bullet)\n```\n\n### 检测碰撞\n\n你可以检测单个对象何时与组中的任何成员碰撞。你还可以检测一个组的任何成员何时与另一个组的成员碰撞。\n\
    \n#### 单个对象与组之间的碰撞\n\n`spritecollideany()` 函数接受一个对象和一个组，如果对象与组中的任何成员重叠，则返回 `True`。\n\
    \n```python\nif pygame.sprite.spritecollideany(ship, aliens):\n    ships_left\
    \ -= 1\n```\n\n#### 两个组之间的碰撞\n\n`sprite.groupcollide()` 函数接受两个组和两个布尔值。该函数返回一个字典，其中包含有关已碰撞成员的信息。布尔值告诉\
    \ Pygame 是否删除已碰撞的任一组的成员。\n\n```python\ncollisions = pygame.sprite.groupcollide(\n\
    \    bullets, aliens, True, True)\n\nscore += len(collisions) * alien_point_value\n\
    ```\n\n## 渲染文本\n\n你可以在游戏中使用文本实现多种目的。例如，你可以与玩家分享信息，也可以显示分数。\n\n### 显示消息\n\n以下代码定义了一条消息，然后定义了文本颜色和消息的背景颜色。使用默认系统字体定义了一个字体，字体大小为\
    \ 48。`font.render()` 函数用于创建消息的图像，我们获取与图像关联的 rect 对象。然后我们将图像居中显示在屏幕上。\n\n```python\n\
    msg = \"Play again?\"\nmsg_color = (100, 100, 100)\nbg_color = (230, 230, 230)\n\
    \nf = pygame.font.SysFont(None, 48)\nmsg_image = f.render(msg, True, msg_color,\n\
    \    bg_color)\nmsg_image_rect = msg_image.get_rect()\nmsg_image_rect.center =\
    \ screen_rect.center\nscreen.blit(msg_image, msg_image_rect)\n```\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/\
    \ 获取"
