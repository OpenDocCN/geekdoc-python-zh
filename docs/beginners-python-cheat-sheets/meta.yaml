    \ any file on your system.\n\n# Opening a file from a subfolder\n\n```\nf_path\
    \ = \"text_files/alice.txt\"\n\nwith open(f_path) as f:\n    lines = f.readlines()\n\
    \nfor line in lines:\n    print(line.rstrip())\n```\n\n# File paths (cont.)\n\n\
    # Opening a file using an absolute path\n\n```\nf_path = \"/home/ehmatthes/books/alice.txt\"\
    \n\nwith open(f_path) as f:\n    lines = f.readlines()\n```\n\n# Opening a file\
    \ on Windows\n\nWindows will sometimes interpret forward slashes incorrectly.\
    \ If you run into this, use backslashes in your file paths.\n\n```\nf_path = \"\
    C:\\Users\\ehmatthes\\books\\alice.txt\"\n\nwith open(f_path) as f:\n    lines\
    \ = f.readlines()\n```\n\n# The try-except block\n\nWhen you think an error may\
    \ occur, you can write a try-except block to handle the exception that might be\
    \ raised. The try block tells Python to try running some code, and the except\
    \ block tells Python what to do if the code results in a particular kind of error.\n\
    \n# Handling the ZeroDivisionError exception\n\n```\ntry:\n    print(5/0)\nexcept\
    \ ZeroDivisionError:\n    print(\"You can't divide by zero!\")\n```\n\n# Handling\
    \ the FileNotFoundError exception\n\n```\nf_name = 'siddhartha.txt'\n\ntry:\n\
    \    with open(f_name) as f:\n        lines = f.readlines()\nexcept FileNotFoundError:\n\
    \    msg = f\"Can't find file: {f_name}.\"\n    print(msg)\n```\n\n# Knowing which\
    \ exception to handle\n\nIt can be hard to know what kind of exception to handle\
    \ when writing code. Try writing your code without a try block, and make it generate\
    \ an error. The traceback will tell you what kind of exception your program needs\
    \ to handle. It's a good idea to skim through the exceptions listed at docs.python.org/3/library/exceptions.html.\n\
    \n# Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_12_0.png)"
  - "[PAGE 13]\n\n# The else block\n\nThe try block should only contain code that\
    \ may cause an error. Any code that depends on the try block running successfully\
    \ should be placed in the else block.\n\n# Using an else block\n\n```\nprint(\"\
    Enter two numbers. I'll divide them.\")\n\nx = input(\"First number: \")\ny =\
    \ input(\"Second number: \")\n\ntry:\n    result = int(x) / int(y)\nexcept ZeroDivisionError:\n\
    \    print(\"You can't divide by zero!\")\nelse:\n    print(result)\n```\n\n#\
    \ Preventing crashes caused by user input\n\nWithout the except block in the following\
    \ example, the program would crash if the user tries to divide by zero. As written,\
    \ it will handle the error gracefully and keep running.\n\n```\n\"\"\"A simple\
    \ calculator for division only.\"\"\"\n\nprint(\"Enter two numbers. I'll divide\
    \ them.\")\nprint(\"Enter 'q' to quit.\")\n\nwhile True:\n    x = input(\"\\nFirst\
    \ number: \")\n    if x == 'q':\n        break\n\n    y = input(\"Second number:\
    \ \")\n    if y == 'q':\n        break\n\n    try:\n        result = int(x) /\
    \ int(y)\n    except ZeroDivisionError:\n        print(\"You can't divide by zero!\"\
    )\n    else:\n        print(result)\n```\n\n# Deciding which errors to report\n\
    \nWell-written, properly tested code is not very prone to internal errors such\
    \ as syntax or logical errors. But every time your program depends on something\
    \ external such as user input or the existence of a file, there's a possibility\
    \ of an exception being raised.\n\nIt's up to you how to communicate errors to\
    \ your users. Sometimes users need to know if a file is missing; sometimes it's\
    \ better to handle the error silently. A little experience will help you know\
    \ how much to report.\n\n# Failing silently\n\nSometimes you want your program\
    \ to just continue running when it encounters an error, without reporting the\
    \ error to the user. Using the pass statement in an except block allows you to\
    \ do this.\n\n# Using the pass statement in an else block\n\n```\nf_names = ['alice.txt',\
    \ 'siddhartha.txt',\n           'moby_dick.txt', 'little_women.txt']\n\nfor f_name\
    \ in f_names:\n    # Report the length of each file found.\n    try:\n       \
    \ with open(f_name) as f:\n            lines = f.readlines()\n    except FileNotFoundError:\n\
    \        # Just move on to the next file.\n        pass\n    else:\n        num_lines\
    \ = len(lines)\n        msg = f\"{f_name} has {num_lines}\"\n        msg += \"\
    \ lines.\"\n\n        print(msg)\n```\n\n# Avoid bare except blocks\n\nException\
    \ handling code should catch specific exceptions that you expect to happen during\
    \ your program's execution. A bare except block will catch all exceptions, including\
    \ keyboard interrupts and system exits you might need when forcing a program to\
    \ close.\n\nIf you want to use a try block and you're not sure which exception\
    \ to catch, use Exception. It will catch most exceptions, but still allow you\
    \ to interrupt programs intentionally.\n\n# Don't use bare except blocks\n\n```\n\
    try:\n    # Do something\nexcept:\n    pass\n```\n\n# Use Exception instead\n\n\
    ```\ntry:\n    # Do something\nexcept Exception:\n    pass\n```\n\n# Printing\
    \ the exception\n\n```\ntry:\n    # Do something\nexcept Exception as e:\n   \
    \ print(e, type(e))\n```\n\n# Storing data with json\n\nThe json module allows\
    \ you to dump simple Python data structures into a file, and load the data from\
    \ that file the next time the program runs. The JSON data format is not specific\
    \ to Python, so you can share this kind of data with people who work in other\
    \ languages as well.\n\nKnowing how to manage exceptions is important when working\
    \ with stored data. You'll usually want to make sure the data you're trying to\
    \ load exists before working with it.\n\n# Using json.dump() to store data\n\n\
    ```\n\"\"\"Store some numbers.\"\"\"\n\nimport json\n\nnumbers = [2, 3, 5, 7,\
    \ 11, 13]\n\nfilename = 'numbers.json'\nwith open(filename, 'w') as f:\n    json.dump(numbers,\
    \ f)\n```\n\n# Using json.load() to read data\n\n```\n\"\"\"Load some previously\
    \ stored numbers.\"\"\"\n\nimport json\n\nfilename = 'numbers.json'\nwith open(filename)\
    \ as f:\n    numbers = json.load(f)\n\nprint(numbers)\n```\n\n# Making sure the\
    \ stored data exists\n\n```\nimport json\n\nf_name = 'numbers.json'\ntry:\n  \
    \  with open(f_name) as f:\n        numbers = json.load(f)\nexcept FileNotFoundError:\n\
    \    msg = f\"Can't find file: {f_name}.\"\n    print(msg)\nelse:\n    print(numbers)\n\
    ```\n\n# Practice with exceptions\n\nTake a program you've already written that\
    \ prompts for user input, and add some error-handling code to the program. Run\
    \ your program with appropriate and inappropriate data, and make sure it handles\
    \ each situation correctly.\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Testing Your Code\n\n## Why test your code?\n\
    \nWhen you write a function or a class, you can also write tests for that code.\
    \ Testing proves that your code works as it's supposed to in the situations it's\
    \ designed to handle, and also when people use your programs in unexpected ways.\
    \ Writing tests gives you confidence that your code will work correctly as more\
    \ people begin to use your programs. You can also add new features to your programs\
    \ and know whether or not you've broken existing behavior by running your tests.\n\
    \nA unit test verifies that one specific aspect of your code works as it's supposed\
    \ to. A test case is a collection of unit tests which verify that your code's\
    \ behavior is correct in a wide variety of situations.\n\n## Testing a function:\
    \ a passing test\n\nPython's unittest module provides tools for testing your code.\
    \ To try it out, we'll create a function that returns a full name. We'll use the\
    \ function in a regular program, and then build a test case for the function.\n\
    \n### A function to test\n\nSave this as full_names.py\n\n```python\ndef get_full_name(first,\
    \ last):\n    \"\"\"Return a full name.\"\"\"\n    full_name = f\"{first} {last}\"\
    \n    return full_name.title()\n```\n\n### Using the function\n\nSave this as\
    \ names.py\n\n```python\nfrom full_names import get_full_name\n\njanis = get_full_name('janis',\
    \ 'joplin')\nprint(janis)\n\nbob = get_full_name('bob', 'dylan')\nprint(bob)\n\
    ```\n\n### Testing a function (cont.)\n\n### Building a testcase with one unit\
    \ test\n\nTo build a test case, make a class that inherits from unittest.TestCase\
    \ and write methods that begin with test_. Save this as test_full_names.py\n\n\
    ```python\nimport unittest\nfrom full_names import get_full_name\n\nclass NamesTestCase(unittest.TestCase):\n\
    \    \"\"\"Tests for names.py.\"\"\"\n\n    def test_first_last(self):\n     \
    \   \"\"\"Test names like Janis Joplin.\"\"\"\n        full_name = get_full_name('janis',\
    \ 'joplin')\n        self.assertEqual(full_name, 'Janis Joplin')\n\nif __name__\
    \ == '__main__':\n    unittest.main()\n```\n\n### Running the test\n\nPython reports\
    \ on each unit test in the test case. The dot represents a single passing test.\
    \ Python informs us that it ran 1 test in less than 0.001 seconds, and the OK\
    \ lets us know that all unit tests in the test case passed.\n\n```\n.\n----------------------------------------------\n\
    Ran 1 test in 0.000s\n\nOK\n```\n\n## Testing a function: A failing test\n\nFailing\
    \ tests are important; they tell you that a change in the code has affected existing\
    \ behavior. When a test fails, you need to modify the code so the existing behavior\
    \ still works.\n\n### Modifying the function\n\nWe'll modify get_full_name() so\
    \ it handles middle names, but we'll do it in a way that breaks existing behavior.\n\
    \n```python\ndef get_full_name(first, middle, last):\n    \"\"\"Return a full\
    \ name.\"\"\"\n    full_name = f\"{first} {middle} {last}\"\n    return full_name.title()\n\
    ```\n\n### Using the function\n\n```python\nfrom full_names import get_full_name\n\
    \njohn = get_full_name('john', 'lee', 'hooker')\nprint(john)\n\ndavid = get_full_name('david',\
    \ 'lee', 'roth')\nprint(david)\n```\n\n### A failing test (cont.)\n\n### Running\
    \ the test\n\nWhen you change your code, it's important to run your existing tests.\
    \ This will tell you whether the changes you made affected existing behavior.\n\
    \n```\nE\n=============================================\nERROR: test_first_last\
    \ (__main__.NamesTestCase)\nTest names like Janis Joplin.\n---------------------------------------------\n\
    Traceback (most recent call last):\n  File \"test_full_names.py\", line 10, in\
    \ test_first_last\n    'joplin')\nTypeError: get_full_name() missing 1 required\
    \ positional argument: 'last'\n\n---------------------------------------------\n\
    Ran 1 test in 0.001s\n\nFAILED (errors=1)\n```\n\n### Fixing the code\n\nWhen\
    \ a test fails, the code needs to be modified until the test passes again. Don't\
    \ make the mistake of rewriting your tests to fit your new code, otherwise your\
    \ code will break for anyone who's using it the same way it's being used in the\
    \ failing test. Here we can make the middle name optional.\n\n```python\ndef get_full_name(first,\
    \ last, middle=''):\n    \"\"\"Return a full name.\"\"\"\n    if middle:\n   \
    \     full_name = f\"{first} {middle} {last}\"\n    else:\n        full_name =\
    \ f\"{first} {last}\"\n    return full_name.title()\n```\n\n### Running the test\n\
    \nNow the test should pass again, which means our original functionality is still\
    \ intact.\n\n```\n.\n----------------------------------------------\nRan 1 test\
    \ in 0.000s\n\nOK\n```\n\n## Python Crash Course\n\nA Hands-on, Project-Based\
    \ Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_14_0.png)\n\
    \n## Adding new tests\n\nYou can add as many unit tests to a test case as you\
    \ need. To write a new test, add a new method to your test case class.\n\n###\
    \ Testing middle names\n\nWe've shown that get_full_name() works for first and\
    \ last names. Let's test that it works for middle names as well.\n\n```python\n\
    import unittest\nfrom full_names import get_full_name\n\nclass NamesTestCase(unittest.TestCase):\n\
    \    \"\"\"Tests for names.py.\"\"\"\n\n    def test_first_last(self):\n     \
    \   \"\"\"Test names like Janis Joplin.\"\"\"\n        full_name = get_full_name('janis',\
    \ 'joplin')\n        self.assertEqual(full_name, 'Janis Joplin')\n\n    def test_middle(self):\n\
    \        \"\"\"Test names like David Lee Roth.\"\"\"\n        full_name = get_full_name('david',\
    \ 'roth', 'lee')\n        self.assertEqual(full_name, 'David Lee Roth')\n\nif\
    \ __name__ == '__main__':\n    unittest.main()\n```\n\n### Running the tests\n\
    \nThe two dots represent two passing tests.\n\n```\n..\n----------------------------------------------\n\
    Ran 2 tests in 0.000s\nOK\n```\n\n### A variety of assert methods\n\nPython provides\
    \ a number of assert methods you can use to test your code.\n\n#### Verify that\
    \ a==b, or a != b\n\n```python\nassertEqual(a, b)\nassertNotEqual(a, b)\n```\n\
    \n#### Verify that x is True, or x is False\n\n```python\nassertTrue(x)\nassertFalse(x)\n\
    ```\n\n#### Verify an item is in a list, or not in a list\n\n```python\nassertIn(item,\
    \ list)\nassertNotIn(item, list)\n```\n\n## Testing a class\n\nTesting a class\
    \ is similar to testing a function, since you'll mostly be testing your methods.\n\
    \n### A class to test\n\nSave as accountant.py\n\n```python\nclass Accountant():\n\
    \    \"\"\"Manage a bank account.\"\"\"\n\n    def __init__(self, balance=0):\n\
    \        self.balance = balance\n\n    def deposit(self, amount):\n        self.balance\
    \ += amount\n\n    def withdraw(self, amount):\n        self.balance -= amount\n\
    ```\n\n### Building a testcase\n\nFor the first test, we'll make sure we can start\
    \ out with different initial balances. Save this as test_accountant.py.\n\n```python\n\
    import unittest\nfrom accountant import Accountant\n\nclass TestAccountant(unittest.TestCase):\n\
    \    \"\"\"Tests for the class Accountant.\"\"\"\n\n    def test_initial_balance(self):\n\
    \        # Default balance should be 0.\n        acc = Accountant()\n        self.assertEqual(acc.balance,\
    \ 0)\n\n        # Test non-default balance.\n        acc = Accountant(100)\n \
    \       self.assertEqual(acc.balance, 100)\n\nif __name__ == '__main__':\n   \
    \ unittest.main()\n```\n\n### Running the test\n\n```\n.\n----------------------------------------------\n\
    Ran 1 test in 0.000s\nOK\n```\n\n### When is it okay to modify tests?\n\nIn general\
    \ you shouldn't modify a test once it's written. When a test fails it usually\
    \ means new code you've written has broken existing functionality, and you need\
    \ to modify the new code until all existing tests pass.\n\nIf your original requirements\
    \ have changed, it may be appropriate to modify some tests. This usually happens\
    \ in the early stages of a project when desired behavior is still being sorted\
    \ out, and no one is using your code yet.\n\n### The setUp() method\n\nWhen testing\
    \ a class, you usually have to make an instance of the class. The setUp() method\
    \ is run before every test. Any instances you make in setUp() are available in\
    \ every test you write.\n\n### Using setUp() to support multiple tests\n\nThe\
    \ instance self.acc can be used in each new test.\n\n```python\nimport unittest\n\
    from accountant import Accountant\n\nclass TestAccountant(unittest.TestCase):\n\
    \    \"\"\"Tests for the class Accountant.\"\"\"\n\n    def setUp(self):\n   \
    \     self.acc = Accountant()\n\n    def test_initial_balance(self):\n       \
    \ # Default balance should be 0.\n        self.assertEqual(self.acc.balance, 0)\n\
    \n        # Test non-default balance.\n        acc = Accountant(100)\n       \
    \ self.assertEqual(acc.balance, 100)\n\n    def test_deposit(self):\n        #\
    \ Test single deposit.\n        self.acc.deposit(100)\n        self.assertEqual(self.acc.balance,\
    \ 100)\n\n        # Test multiple deposits.\n        self.acc.deposit(100)\n \
    \       self.acc.deposit(100)\n        self.assertEqual(self.acc.balance, 300)\n\
    \n    def test_withdrawal(self):\n        # Test single withdrawal.\n        self.acc.deposit(1000)\n\
    \        self.acc.withdraw(100)\n        self.assertEqual(self.acc.balance, 900)\n\
    \nif __name__ == '__main__':\n    unittest.main()\n```\n\n### Running the tests\n\
    \n```\n...\n----------------------------------------------\nRan 3 tests in 0.001s\n\
    OK\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者Python速查表 - 测试你的代码\n\n## 为什么要测试你的代码？\n\n当你编写一个函数或一个类时，你也可以为该代码编写测试。测试可以证明你的代码在设计要处理的情况下能按预期工作，也能在人们以意想不到的方式使用你的程序时正常工作。编写测试可以让你确信，随着越来越多的人开始使用你的程序，你的代码将能正确运行。你还可以为你的程序添加新功能，并通过运行测试来了解你是否破坏了现有行为。\n\
    \n单元测试验证你代码的某个特定方面是否按预期工作。测试用例是一组单元测试的集合，用于验证你的代码在各种情况下行为是否正确。\n\n## 测试一个函数：一个通过的测试\n\
    \nPython的`unittest`模块提供了测试代码的工具。为了尝试它，我们将创建一个返回全名的函数。我们将在一个常规程序中使用该函数，然后为该函数构建一个测试用例。\n\
    \n### 一个待测试的函数\n\n将其保存为`full_names.py`\n\n```python\ndef get_full_name(first,\
    \ last):\n    \"\"\"Return a full name.\"\"\"\n    full_name = f\"{first} {last}\"\
    \n    return full_name.title()\n```\n\n### 使用该函数\n\n将其保存为`names.py`\n\n```python\n\
    from full_names import get_full_name\n\njanis = get_full_name('janis', 'joplin')\n\
    print(janis)\n\nbob = get_full_name('bob', 'dylan')\nprint(bob)\n```\n\n### 测试一个函数（续）\n\
    \n### 构建一个包含一个单元测试的测试用例\n\n要构建一个测试用例，创建一个继承自`unittest.TestCase`的类，并编写以`test_`开头的方法。将其保存为`test_full_names.py`\n\
    \n```python\nimport unittest\nfrom full_names import get_full_name\n\nclass NamesTestCase(unittest.TestCase):\n\
    \    \"\"\"Tests for names.py.\"\"\"\n\n    def test_first_last(self):\n     \
    \   \"\"\"Test names like Janis Joplin.\"\"\"\n        full_name = get_full_name('janis',\
    \ 'joplin')\n        self.assertEqual(full_name, 'Janis Joplin')\n\nif __name__\
    \ == '__main__':\n    unittest.main()\n```\n\n### 运行测试\n\nPython会报告测试用例中的每个单元测试。点号代表一个通过的测试。Python通知我们它在不到0.001秒内运行了1个测试，而`OK`让我们知道测试用例中的所有单元测试都通过了。\n\
    \n```\n.\n----------------------------------------------\nRan 1 test in 0.000s\n\
    \nOK\n```\n\n## 测试一个函数：一个失败的测试\n\n失败的测试很重要；它们告诉你代码中的更改影响了现有行为。当测试失败时，你需要修改代码，使现有行为仍然有效。\n\
    \n### 修改函数\n\n我们将修改`get_full_name()`以处理中间名，但我们会以一种破坏现有行为的方式来做。\n\n```python\n\
    def get_full_name(first, middle, last):\n    \"\"\"Return a full name.\"\"\"\n\
    \    full_name = f\"{first} {middle} {last}\"\n    return full_name.title()\n\
    ```\n\n### 使用该函数\n\n```python\nfrom full_names import get_full_name\n\njohn =\
    \ get_full_name('john', 'lee', 'hooker')\nprint(john)\n\ndavid = get_full_name('david',\
    \ 'lee', 'roth')\nprint(david)\n```\n\n### 一个失败的测试（续）\n\n### 运行测试\n\n当你更改代码时，运行现有测试非常重要。这将告诉你所做的更改是否影响了现有行为。\n\
    \n```\nE\n=============================================\nERROR: test_first_last\
    \ (__main__.NamesTestCase)\nTest names like Janis Joplin.\n---------------------------------------------\n\
    Traceback (most recent call last):\n  File \"test_full_names.py\", line 10, in\
    \ test_first_last\n    'joplin')\nTypeError: get_full_name() missing 1 required\
    \ positional argument: 'last'\n\n---------------------------------------------\n\
    Ran 1 test in 0.001s\n\nFAILED (errors=1)\n```\n\n### 修复代码\n\n当测试失败时，需要修改代码直到测试再次通过。不要犯重写测试以适应新代码的错误，否则你的代码会为任何以失败测试中相同方式使用它的人而中断。在这里，我们可以使中间名成为可选的。\n\
    \n```python\ndef get_full_name(first, last, middle=''):\n    \"\"\"Return a full\
    \ name.\"\"\"\n    if middle:\n        full_name = f\"{first} {middle} {last}\"\
    \n    else:\n        full_name = f\"{first} {last}\"\n    return full_name.title()\n\
    ```\n\n### 运行测试\n\n现在测试应该再次通过，这意味着我们原始的功能仍然完好无损。\n\n```\n.\n----------------------------------------------\n\
    Ran 1 test in 0.000s\n\nOK\n```\n\n## Python速查表\n\n基于实践和项目的编程入门\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_14_0.png)\n\n## 添加新测试\n\n你可以根据需要向测试用例添加任意数量的单元测试。要编写新测试，请向测试用例类添加一个新方法。\n\
    \n### 测试中间名\n\n我们已经展示了`get_full_name()`适用于名和姓。让我们测试它是否也适用于中间名。\n\n```python\n\
    import unittest\nfrom full_names import get_full_name\n\nclass NamesTestCase(unittest.TestCase):\n\
    \    \"\"\"Tests for names.py.\"\"\"\n\n    def test_first_last(self):\n     \
    \   \"\"\"Test names like Janis Joplin.\"\"\"\n        full_name = get_full_name('janis',\
    \ 'joplin')\n        self.assertEqual(full_name, 'Janis Joplin')\n\n    def test_middle(self):\n\
    \        \"\"\"Test names like David Lee Roth.\"\"\"\n        full_name = get_full_name('david',\
    \ 'roth', 'lee')\n        self.assertEqual(full_name, 'David Lee Roth')\n\nif\
    \ __name__ == '__main__':\n    unittest.main()\n```\n\n### 运行测试\n\n两个点代表两个通过的测试。\n\
    \n```\n..\n----------------------------------------------\nRan 2 tests in 0.000s\n\
    OK\n```\n\n### 多种断言方法\n\nPython提供了多种断言方法，你可以用来测试你的代码。\n\n#### 验证 a==b，或 a != b\n\
    \n```python\nassertEqual(a, b)\nassertNotEqual(a, b)\n```\n\n#### 验证 x 为 True，或\
    \ x 为 False\n\n```python\nassertTrue(x)\nassertFalse(x)\n```\n\n#### 验证一个项目在列表中，或不在列表中\n\
    \n```python\nassertIn(item, list)\nassertNotIn(item, list)\n```\n\n## 测试一个类\n\n\
    测试一个类类似于测试一个函数，因为你主要测试的是你的方法。\n\n### 一个待测试的类\n\n保存为`accountant.py`\n\n```python\n\
    class Accountant():\n    \"\"\"Manage a bank account.\"\"\"\n\n    def __init__(self,\
    \ balance=0):\n        self.balance = balance\n\n    def deposit(self, amount):\n\
    \        self.balance += amount\n\n    def withdraw(self, amount):\n        self.balance\
    \ -= amount\n```\n\n### 构建一个测试用例\n\n对于第一个测试，我们将确保我们可以从不同的初始余额开始。将其保存为`test_accountant.py`。\n\
    \n```python\nimport unittest\nfrom accountant import Accountant\n\nclass TestAccountant(unittest.TestCase):\n\
    \    \"\"\"Tests for the class Accountant.\"\"\"\n\n    def test_initial_balance(self):\n\
    \        # Default balance should be 0.\n        acc = Accountant()\n        self.assertEqual(acc.balance,\
    \ 0)\n\n        # Test non-default balance.\n        acc = Accountant(100)\n \
    \       self.assertEqual(acc.balance, 100)\n\nif __name__ == '__main__':\n   \
    \ unittest.main()\n```\n\n### 运行测试\n\n```\n.\n----------------------------------------------\n\
    Ran 1 test in 0.000s\nOK\n```\n\n### 什么时候可以修改测试？\n\n通常，一旦测试编写完成，就不应该修改它。当测试失败时，通常意味着你编写的新代码破坏了现有功能，你需要修改新代码直到所有现有测试通过。\n\
    \n如果你的原始需求发生了变化，修改一些测试可能是合适的。这通常发生在项目的早期阶段，当期望的行为仍在确定中，并且还没有人使用你的代码时。\n\n### setUp()\
    \ 方法\n\n测试一个类时，你通常需要创建该类的一个实例。`setUp()`方法在每个测试之前运行。你在`setUp()`中创建的任何实例在你编写的每个测试中都可用。\n\
    \n### 使用 setUp() 支持多个测试\n\n实例`self.acc`可以在每个新测试中使用。\n\n```python\nimport unittest\n\
    from accountant import Accountant\n\nclass TestAccountant(unittest.TestCase):\n\
    \    \"\"\"Tests for the class Accountant.\"\"\"\n\n    def setUp(self):\n   \
    \     self.acc = Accountant()\n\n    def test_initial_balance(self):\n       \
    \ # Default balance should be 0.\n        self.assertEqual(self.acc.balance, 0)\n\
    \n        # Test non-default balance.\n        acc = Accountant(100)\n       \
    \ self.assertEqual(acc.balance, 100)\n\n    def test_deposit(self):\n        #\
    \ Test single deposit.\n        self.acc.deposit(100)\n        self.assertEqual(self.acc.balance,\
    \ 100)\n\n        # Test multiple deposits.\n        self.acc.deposit(100)\n \
    \       self.acc.deposit(100)\n        self.assertEqual(self.acc.balance, 300)\n\
    \n    def test_withdrawal(self):\n        # Test single withdrawal.\n        self.acc.deposit(1000)\n\
    \        self.acc.withdraw(100)\n        self.assertEqual(self.acc.balance, 900)\n\
    \nif __name__ == '__main__':\n    unittest.main()\n```\n\n### 运行测试\n\n```\n...\n\
    ----------------------------------------------\nRan 3 tests in 0.001s\nOK\n```\n\
    \n更多速查表可在 ehmatthes.github.io/pcc_2e/ 获取"
