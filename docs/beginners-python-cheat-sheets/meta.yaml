  md: "# Beginner's Python Cheat Sheet - Matplotlib\n\n# What is Matplotlib?\n\nData\
    \ visualization involves exploring data through visual representations. The Matplotlib\
    \ library helps you make visually appealing representations of the data you're\
    \ working with. Matplotlib is extremely flexible; these examples will help you\
    \ get started with a few simple visualizations.\n\n# Installing Matplotlib\n\n\
    Matplotlib runs on all systems, and you should be able to install it in one line.\n\
    \n# Installing Matplotlib\n\n```\n$ python -m pip install --user matplotlib\n\
    ```\n\n# Line graphs and scatter plots\n\n# Making a line graph\n\nThe fig object\
    \ represents the entire figure, or collection of plots; ax represents a single\
    \ plot in the figure. This convention is used even when there's only one plot\
    \ in the figure.\n\n```\nimport matplotlib.pyplot as plt\n\nx_values = [0, 1,\
    \ 2, 3, 4, 5]\nsquares = [0, 1, 4, 9, 16, 25]\n\nfig, ax = plt.subplots()\nax.plot(x_values,\
    \ squares)\n\nplt.show()\n```\n\n# Making a scatter plot\n\nscatter() takes a\
    \ list of x and y values; the s=10 argument controls the size of each point.\n\
    \n```\nimport matplotlib.pyplot as plt\n\nx_values = list(range(1000))\nsquares\
    \ = [x**2 for x in x_values]\n\nfig, ax = plt.subplots()\nax.scatter(x_values,\
    \ squares, s=10)\nplt.show()\n```\n\n# Customizing plots\n\nPlots can be customized\
    \ in a wide variety of ways. Just about any element of a plot can be modified.\n\
    \n# Using built-in styles\n\nMatplotlib comes with a number of built-in styles,\
    \ which you can use with one additional line of code. The style must be specified\
    \ before you create the figure.\n\n```\nimport matplotlib.pyplot as plt\n\nx_values\
    \ = list(range(1000))\nsquares = [x**2 for x in x_values]\n\nplt.style.use('seaborn')\n\
    fig, ax = plt.subplots()\nax.scatter(x_values, squares, s=10)\n\nplt.show()\n\
    ```\n\n# Seeing available styles\n\nYou can see all available styles on your system.\
    \ This can be done in a terminal session.\n\n```\n>>> import matplotlib.pyplot\
    \ as plt\n>>> plt.style.available\n['seaborn-dark', 'seaborn-darkgrid', ...\n\
    ```\n\n# Adding titles and labels, and scaling axes\n\n```\nimport matplotlib.pyplot\
    \ as plt\n\nx_values = list(range(1000))\nsquares = [x**2 for x in x_values]\n\
    \n# Set overall style to use, and plot data.\nplt.style.use('seaborn')\nfig, ax\
    \ = plt.subplots()\nax.scatter(x_values, squares, s=10)\n\n# Set chart title and\
    \ label axes.\nax.set_title('Square Numbers', fontsize=24)\nax.set_xlabel('Value',\
    \ fontsize=14)\nax.set_ylabel('Square of Value', fontsize=14)\n\n# Set scale of\
    \ axes, and size of tick labels.\nax.axis([0, 1100, 0, 1_100_000])\nax.tick_params(axis='both',\
    \ labelsize=14)\n\nplt.show()\n```\n\n# Using a colormap\n\nA colormap varies\
    \ the point colors from one shade to another, based on a certain value for each\
    \ point. The value used to determine the color of each point is passed to the\
    \ c argument, and the cmap argument specifies which colormap to use.\n\n```\n\
    ax.scatter(x_values, squares, c=squares,\n          cmap=plt.cm.Blues, s=10)\n\
    ```\n\n# Customizing plots (cont.)\n\n# Emphasizing points\n\nYou can plot as\
    \ much data as you want on one plot. Here we replot the first and last points\
    \ larger to emphasize them.\n\n```\nimport matplotlib.pyplot as plt\n\nx_values\
    \ = list(range(1000))\nsquares = [x**2 for x in x_values]\n\nfig, ax = plt.subplots()\n\
    ax.scatter(x_values, squares, c=squares,\n          cmap=plt.cm.Blues, s=10)\n\
    \nax.scatter(x_values[0], squares[0], c='green',\n          s=100)\nax.scatter(x_values[-1],\
    \ squares[-1], c='red',\n          s=100)\n\nax.set_title('Square Numbers', fontsize=24)\n\
    --snip--\n```\n\n# Removing axes\n\nYou can customize or remove axes entirely.\
    \ Here's how to access each axis, and hide it.\n\n```\nax.get_xaxis().set_visible(False)\n\
    ax.get_yaxis().set_visible(False)\n```\n\n# Setting a custom figure size\n\nYou\
    \ can make your plot as big or small as you want by using the figsize argument.\
    \ The dpi argument is optional; if you don't know your system's resolution you\
    \ can omit the argument and adjust the figsize argument accordingly.\n\n```\n\
    fig, ax = plt.subplots(figsize=(10, 6),\n                       dpi=128)\n```\n\
    \n# Saving a plot\n\nThe Matplotlib viewer has a save button, but you can also\
    \ save your visualizations programmatically by replacing plt.show() with plt.savefig().\
    \ The bbox_inches argument reduces the amount of whitespace around the figure.\n\
    \n```\nplt.savefig('squares.png', bbox_inches='tight')\n```\n\n# Online resources\n\
    \nThe matplotlib gallery and documentation are at matplotlib.org/. Be sure to\
    \ visit the examples, gallery, and pyplot links.\n\n# Python Crash Course\n\n\
    A Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_18_0.png)"
