    \ The booleans tell Pygame whether to delete the members of either group that\
    \ have collided.\n\n```python\ncollisions = pygame.sprite.groupcollide(\n    bullets,\
    \ aliens, True, True)\n\nscore += len(collisions) * alien_point_value\n```\n\n\
    ## Rendering text\n\nYou can use text for a variety of purposes in a game. For\
    \ example you can share information with players, and you can display a score.\n\
    \n### Displaying a message\n\nThe following code defines a message, then a color\
