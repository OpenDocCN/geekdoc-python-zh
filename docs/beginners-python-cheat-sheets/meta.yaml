  md: "# Class inheritance (cont.)\n\nOverriding parent methods\n\n```\npython\nclass\
    \ ElectricCar(Car):\n    --snip--\n\n    def fill_tank(self):\n        \"\"\"\
    Display an error message.\"\"\"\n        print(\"This car has no fuel tank!\"\
    )\n```\n\n# Instances as attributes\n\nA class can have objects as attributes.\
    \ This allows classes to work together to model more complex real-world things\
    \ and concepts.\n\nA Battery class\n\n```\npython\nclass Battery:\n    \"\"\"\
    A battery for an electric car.\"\"\"\n\n    def __init__(self, size=85):\n   \
    \     \"\"\"Initialize battery attributes.\"\"\"\n        # Capacity in kWh, charge\
    \ level in %.\n        self.size = size\n        self.charge_level = 0\n\n   \
    \ def get_range(self):\n        \"\"\"Return the battery's range.\"\"\"\n    \
    \    if self.size == 85:\n            return 390\n        elif self.size == 100:\n\
    \            return 415\n```\n\nUsing an instance as an attribute\n\n```\npython\n\
    class ElectricCar(Car):\n    --snip--\n\n    def __init__(self, make, model, year):\n\
    \        \"\"\"Initialize an electric car.\"\"\"\n        super().__init__(make,\
    \ model, year)\n\n        # Attribute specific to electric cars.\n        self.battery\
    \ = Battery()\n\n    def charge(self):\n        \"\"\"Fully charge the vehicle.\"\
    \"\"\n        self.battery.charge_level = 100\n        print(\"The vehicle is\
    \ fully charged.\")\n```\n\nUsing the instance\n\n```\npython\nmy_ecar = ElectricCar('tesla',\
    \ 'model s', 2021)\n\nmy_ecar.charge()\nprint(my_ecar.battery.get_range())\nmy_ecar.drive()\n\
    ```\n\n# Importing classes\n\nClass files can get long as you add detailed information\
    \ and functionality. To help keep your program files uncluttered, you can store\
    \ your classes in modules and import the classes you need into your main program.\n\
    \nStoring classes in a file\n\n```\npython\ncar.py\n\"\"\"Represent gas and electric\
    \ cars.\"\"\"\n\nclass Car:\n    \"\"\"A simple attempt to model a car.\"\"\"\n\
    \    --snip--\n\nclass Battery:\n    \"\"\"A battery for an electric car.\"\"\"\
    \n    --snip--\n\nclass ElectricCar(Car):\n    \"\"\"A simple model of an electric\
    \ car.\"\"\"\n    --snip--\n```\n\nImporting individual classes from a module\n\
    \n```\npython\nmy_cars.py\nfrom car import Car, ElectricCar\n\nmy_beetle = Car('volkswagen',\
    \ 'beetle', 2019)\nmy_beetle.fill_tank()\nmy_beetle.drive()\n\nmy_tesla = ElectricCar('tesla',\
    \ 'model s', 2021)\nmy_tesla.charge()\nmy_tesla.drive()\n```\n\nImporting an entire\
    \ module\n\n```\npython\nimport car\n\nmy_beetle = car.Car(\n    'volkswagen',\
    \ 'beetle', 2019)\nmy_beetle.fill_tank()\nmy_beetle.drive()\n\nmy_tesla = car.ElectricCar(\n\
    \    'tesla', 'model s', 2021)\nmy_tesla.charge()\nmy_tesla.drive()\n```\n\nImporting\
    \ all classes from a module\n\n(Don't do this, but recognize it when you see it.)\n\
    \n```\npython\nfrom car import *\n\nmy_beetle = Car('volkswagen', 'beetle', 2019)\n\
    my_tesla = ElectricCar('tesla', 'model s', 2021)\n```\n\n# Storing objects in\
    \ a list\n\nA list can hold as many items as you want, so you can make a large\
    \ number of objects from a class and store them in a list.\n\nHere's an example\
    \ showing how to make a fleet of rental cars, and make sure all the cars are ready\
    \ to drive.\n\nA fleet of rental cars\n\n```\npython\nfrom car import Car, ElectricCar\n\
    \n# Make lists to hold a fleet of cars.\ngas_fleet = []\nelectric_fleet = []\n\
    \n# Make 250 gas cars and 500 electric cars.\nfor _ in range(250):\n    car =\
    \ Car('ford', 'escape', 2021)\n    gas_fleet.append(car)\nfor _ in range(500):\n\
    \    ecar = ElectricCar('nissan', 'leaf', 2021)\n    electric_fleet.append(ecar)\n\
    \n# Fill the gas cars, and charge electric cars.\nfor car in gas_fleet:\n    car.fill_tank()\n\
    for ecar in electric_fleet:\n    ecar.charge()\n\nprint(f\"Gas cars: {len(gas_fleet)}\"\
    )\nprint(f\"Electric cars: {len(electric_fleet)}\")\n```\n\n# Understanding self\n\
    \nPeople often ask what the self variable represents. The self variable is a reference\
    \ to an object that's been created from the class.\n\nThe self variable provides\
    \ a way to make other variables and objects available everywhere in a class. The\
    \ self variable is automatically passed to each method that's called through an\
    \ object, which is why you see it listed first in every method definition. Any\
    \ variable attached to self is available everywhere in the class.\n\n# Understanding\
    \ __init__()\n\nThe __init__() method is a function that's part of a class, just\
    \ like any other method. The only special thing about __init__() is that it's\
    \ called automatically every time you make a new instance from a class. If you\
    \ accidentally misspell __init__(), the method won't be called and your object\
    \ may not be created correctly.\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
