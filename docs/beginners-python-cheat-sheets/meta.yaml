  - "[PAGE 14]\n\n# Beginner's Python Cheat Sheet - Testing Your Code\n\n# Why test\
    \ your code?\n\nWhen you write a function or a class, you can also write tests\
    \ for that code. Testing proves that your code works as it's supposed to in the\
    \ situations it's designed to handle, and also when people use your programs in\
    \ unexpected ways. Writing tests gives you confidence that your code will work\
    \ correctly as more people begin to use your programs. You can also add new features\
    \ to your programs and know whether or not you've broken existing behavior by\
    \ running your tests.\n\nA unit test verifies that one specific aspect of your\
    \ code works as it's supposed to. A test case is a collection of unit tests which\
    \ verify that your code's behavior is correct in a wide variety of situations.\n\
    \n# Testing a function: a passing test\n\nPython's unittest module provides tools\
    \ for testing your code. To try it out, we'll create a function that returns a\
    \ full name. We'll use the function in a regular program, and then build a test\
    \ case for the function.\n\n# A function to test\n\nSave this as full_names.py\n\
    \n```\ndef get_full_name(first, last):\n    \"\"\"Return a full name.\"\"\"\n\
    \    full_name = f\"{first} {last}\"\n    return full_name.title()\n```\n\n# Using\
    \ the function\n\nSave this as names.py\n\n```\nfrom full_names import get_full_name\n\
    \njanis = get_full_name('janis', 'joplin')\nprint(janis)\n\nbob = get_full_name('bob',\
    \ 'dylan')\nprint(bob)\n```\n\n# Testing a function (cont.)\n\n# Building a testcase\
    \ with one unit test\n\nTo build a test case, make a class that inherits from\
    \ unittest.TestCase and write methods that begin with test_. Save this as test_full_names.py\n\
    \n```\nimport unittest\nfrom full_names import get_full_name\n\nclass NamesTestCase(unittest.TestCase):\n\
    \    \"\"\"Tests for names.py.\"\"\"\n\n    def test_first_last(self):\n     \
    \   \"\"\"Test names like Janis Joplin.\"\"\"\n        full_name = get_full_name('janis',\
    \ 'joplin')\n        self.assertEqual(full_name, 'Janis Joplin')\n\nif __name__\
    \ == '__main__':\n    unittest.main()\n```\n\n# Running the test\n\nPython reports\
    \ on each unit test in the test case. The dot represents a single passing test.\
    \ Python informs us that it ran 1 test in less than 0.001 seconds, and the OK\
    \ lets us know that all unit tests in the test case passed.\n\n```\n.\n----------------------------------------------\n\
    Ran 1 test in 0.000s\n\nOK\n```\n\n# Testing a function: A failing test\n\nFailing\
    \ tests are important; they tell you that a change in the code has affected existing\
    \ behavior. When a test fails, you need to modify the code so the existing behavior\
    \ still works.\n\n# Modifying the function\n\nWe'll modify get_full_name() so\
    \ it handles middle names, but we'll do it in a way that breaks existing behavior.\n\
    \n```\ndef get_full_name(first, middle, last):\n    \"\"\"Return a full name.\"\
    \"\"\n    full_name = f\"{first} {middle} {last}\"\n    return full_name.title()\n\
    ```\n\n# Using the function\n\n```\nfrom full_names import get_full_name\n\njohn\
    \ = get_full_name('john', 'lee', 'hooker')\nprint(john)\n\ndavid = get_full_name('david',\
    \ 'lee', 'roth')\nprint(david)\n```\n\n# A failing test (cont.)\n\n# Running the\
    \ test\n\nWhen you change your code, it's important to run your existing tests.\
    \ This will tell you whether the changes you made affected existing behavior.\n\
    \n```\nE\n=============================================\nERROR: test_first_last\
    \ (__main__.NamesTestCase)\nTest names like Janis Joplin.\n---------------------------------------------\n\
    Traceback (most recent call last):\n  File \"test_full_names.py\", line 10, in\
    \ test_first_last\n    'joplin')\nTypeError: get_full_name() missing 1 required\
    \ positional argument: 'last'\n\n---------------------------------------------\n\
    Ran 1 test in 0.001s\n\nFAILED (errors=1)\n```\n\n# Fixing the code\n\nWhen a\
    \ test fails, the code needs to be modified until the test passes again. Don't\
    \ make the mistake of rewriting your tests to fit your new code, otherwise your\
    \ code will break for anyone who's using it the same way it's being used in the\
    \ failing test. Here we can make the middle name optional.\n\n```\ndef get_full_name(first,\
    \ last, middle=''):\n    \"\"\"Return a full name.\"\"\"\n    if middle:\n   \
    \     full_name = f\"{first} {middle} {last}\"\n    else:\n        full_name =\
    \ f\"{first} {last}\"\n    return full_name.title()\n```\n\n# Running the test\n\
    \nNow the test should pass again, which means our original functionality is still\
    \ intact.\n\n```\n.\n----------------------------------------------\nRan 1 test\
    \ in 0.000s\n\nOK\n```\n\n# Python Crash Course\n\nA Hands-on, Project-Based Introduction\
    \ to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_14_0.png)"
  - "[PAGE 15]\n\n# Adding new tests\n\nYou can add as many unit tests to a test case\
    \ as you need. To write a new test, add a new method to your test case class.\n\
    \n# Testing middle names\n\nWe've shown that get_full_name() works for first and\
    \ last names. Let's test that it works for middle names as well.\n\n```\nimport\
    \ unittest\nfrom full_names import get_full_name\n\nclass NamesTestCase(unittest.TestCase):\n\
    \    \"\"\"Tests for names.py.\"\"\"\n\n    def test_first_last(self):\n     \
    \   \"\"\"Test names like Janis Joplin.\"\"\"\n        full_name = get_full_name('janis',\
    \ 'joplin')\n        self.assertEqual(full_name, 'Janis Joplin')\n\n    def test_middle(self):\n\
    \        \"\"\"Test names like David Lee Roth.\"\"\"\n        full_name = get_full_name('david',\
    \ 'roth', 'lee')\n        self.assertEqual(full_name, 'David Lee Roth')\n\nif\
    \ __name__ == '__main__':\n    unittest.main()\n```\n\n# Running the tests\n\n\
    The two dots represent two passing tests.\n\n```\n..\n----------------------------------------------\n\
    Ran 2 tests in 0.000s\nOK\n```\n\n# A variety of assert methods\n\nPython provides\
    \ a number of assert methods you can use to test your code.\n\n# Verify that a==b,\
    \ or a != b\n\n```\nassertEqual(a, b)\nassertNotEqual(a, b)\n```\n\n# Verify that\
    \ x is True, or x is False\n\n```\nassertTrue(x)\nassertFalse(x)\n```\n\n# Verify\
    \ an item is in a list, or not in a list\n\n```\nassertIn(item, list)\nassertNotIn(item,\
    \ list)\n```\n\n# Testing a class\n\nTesting a class is similar to testing a function,\
    \ since you'll mostly be testing your methods.\n\n# A class to test\n\nSave as\
    \ accountant.py\n\n```\nclass Accountant():\n    \"\"\"Manage a bank account.\"\
    \"\"\n\n    def __init__(self, balance=0):\n        self.balance = balance\n\n\
    \    def deposit(self, amount):\n        self.balance += amount\n\n    def withdraw(self,\
    \ amount):\n        self.balance -= amount\n```\n\n# Building a testcase\n\nFor\
    \ the first test, we'll make sure we can start out with different initial balances.\
    \ Save this as test_accountant.py.\n\n```\nimport unittest\nfrom accountant import\
    \ Accountant\n\nclass TestAccountant(unittest.TestCase):\n    \"\"\"Tests for\
    \ the class Accountant.\"\"\"\n\n    def test_initial_balance(self):\n       \
    \ # Default balance should be 0.\n        acc = Accountant()\n        self.assertEqual(acc.balance,\
    \ 0)\n\n        # Test non-default balance.\n        acc = Accountant(100)\n \
    \       self.assertEqual(acc.balance, 100)\n\nif __name__ == '__main__':\n   \
    \ unittest.main()\n```\n\n# Running the test\n\n```\n.\n----------------------------------------------\n\
    Ran 1 test in 0.000s\nOK\n```\n\n# When is it okay to modify tests?\n\nIn general\
    \ you shouldn't modify a test once it's written. When a test fails it usually\
    \ means new code you've written has broken existing functionality, and you need\
    \ to modify the new code until all existing tests pass.\n\nIf your original requirements\
    \ have changed, it may be appropriate to modify some tests. This usually happens\
    \ in the early stages of a project when desired behavior is still being sorted\
    \ out, and no one is using your code yet.\n\n# The setUp() method\n\nWhen testing\
    \ a class, you usually have to make an instance of the class. The setUp() method\
    \ is run before every test. Any instances you make in setUp() are available in\
    \ every test you write.\n\n# Using setUp() to support multiple tests\n\nThe instance\
    \ self.acc can be used in each new test.\n\n```\nimport unittest\nfrom accountant\
    \ import Accountant\n\nclass TestAccountant(unittest.TestCase):\n    \"\"\"Tests\
    \ for the class Accountant.\"\"\"\n\n    def setUp(self):\n        self.acc =\
    \ Accountant()\n\n    def test_initial_balance(self):\n        # Default balance\
    \ should be 0.\n        self.assertEqual(self.acc.balance, 0)\n\n        # Test\
    \ non-default balance.\n        acc = Accountant(100)\n        self.assertEqual(acc.balance,\
    \ 100)\n\n    def test_deposit(self):\n        # Test single deposit.\n      \
    \  self.acc.deposit(100)\n        self.assertEqual(self.acc.balance, 100)\n\n\
    \        # Test multiple deposits.\n        self.acc.deposit(100)\n        self.acc.deposit(100)\n\
    \        self.assertEqual(self.acc.balance, 300)\n\n    def test_withdrawal(self):\n\
    \        # Test single withdrawal.\n        self.acc.deposit(1000)\n        self.acc.withdraw(100)\n\
    \        self.assertEqual(self.acc.balance, 900)\n\nif __name__ == '__main__':\n\
    \    unittest.main()\n```\n\n# Running the tests\n\n```\n...\n----------------------------------------------\n\
    Ran 3 tests in 0.001s\nOK\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Pygame\n\n## What is Pygame?\n\nPygame is\
    \ a framework for making games using Python. Making games is fun, and it's a great\
    \ way to expand your programming skills and knowledge. Pygame takes care of many\
    \ of the lower-level tasks in building games, which lets you focus on the aspects\
    \ of your game that make it interesting.\n\n## Installing Pygame\n\nPygame runs\
    \ on all systems, and you should be able to install it in one line.\n\n```\n$\
    \ python -m pip install --user pygame\n```\n\n## Starting a game\n\nThe following\
    \ code sets up an empty game window, and starts an event loop and a loop that\
    \ continually refreshes the screen.\n\n### An empty game window\n\n```python\n\
    import sys\nimport pygame\n\nclass AlienInvasion:\n    def __init__(self):\n \
    \       pygame.init()\n        self.screen = pygame.display.set_mode(\n      \
    \      (1200, 800))\n        pygame.display.set_caption(\n            \"Alien\
    \ Invasion\")\n\n    def run_game(self):\n        while True:\n            for\
    \ event in pygame.event.get():\n                if event.type == pygame.QUIT:\n\
    \                    sys.exit()\n\n            pygame.display.flip()\n\nif __name__\
    \ == '__main__':\n    ai = AlienInvasion()\n    ai.run_game()\n```\n\n### Setting\
    \ a custom window size\n\nThe display.set_mode() function accepts a tuple that\
    \ defines the screen size.\n\n```python\nscreen_dim = (1500, 1000)\nself.screen\
    \ = pygame.display.set_mode(\n    screen_dim)\n```\n\n### Setting a custom background\
    \ color\n\nColors are defined as a tuple of red, green, and blue values. Each\
    \ value ranges from 0-255. The fill() method fills the screen with the color you\
    \ specify, and should be called before you add any other elements to the screen.\n\
    \n```python\ndef __init__(self):\n    --snip--\n    self.bg_color = (225, 225,\
    \ 225)\n\ndef run_game(self):\n    while True:\n        for event in pygame.event.get():\n\
    \            --snip--\n\n        self.screen.fill(self.bg_color)\n        pygame.display.flip()\n\
    ```\n\n## Pygame rect objects\n\nMany objects in a game can be treated as simple\
    \ rectangles, rather than their actual shape. This simplifies code without noticeably\
    \ affecting game play. Pygame has a rect object that makes it easy to work with\
    \ game objects.\n\n### Getting the screen rect object\n\nWe already have a screen\
    \ object; we can easily access the rect object associated with the screen.\n\n\
    ```python\nself.screen_rect = self.screen.get_rect()\n```\n\n### Finding the center\
    \ of the screen\n\nRect objects have a center attribute which stores the center\
    \ point.\n\n```python\nscreen_center = self.screen_rect.center\n```\n\n### Useful\
    \ rect attributes\n\nOnce you have a rect object, there are a number of attributes\
    \ that are useful when positioning objects and detecting relative positions of\
    \ objects. (You can find more attributes in the Pygame documentation. The self\
    \ variable has been left off for clarity.)\n\n```python\n# Individual x and y\
    \ values:\nscreen_rect.left, screen_rect.right\nscreen_rect.top, screen_rect.bottom\n\
    screen_rect.centerx, screen_rect.centery\nscreen_rect.width, screen_rect.height\n\
    \n# Tuples\nscreen_rect.center\nscreen_rect.size\n```\n\n### Creating a rect object\n\
    \nYou can create a rect object from scratch. For example a small rect object that's\
    \ filled in can represent a bullet in a game. The Rect() class takes the coordinates\
    \ of the upper left corner, and the width and height of the rect. The draw.rect()\
    \ function takes a screen object, a color, and a rect. This function fills the\
    \ given rect with the given color.\n\n```python\nbullet_rect = pygame.Rect(100,\
    \ 100, 3, 15)\ncolor = (100, 100, 100)\n\npygame.draw.rect(screen, color, bullet_rect)\n\
    ```\n\n## Working with images\n\nMany objects in a game are images that are moved\
    \ around the screen. It's easiest to use bitmap (.bmp) image files, but you can\
    \ also configure your system to work with jpg, png, and gif files as well.\n\n\
    ### Loading an image\n\n```python\nship = pygame.image.load('images/ship.bmp')\n\
    ```\n\n### Getting the rect object from an image\n\n```python\nship_rect = ship.get_rect()\n\
    ```\n\n### Positioning an image\n\nWith rects, it's easy to position an image\
    \ wherever you want on the screen, or in relation to another object. The following\
    \ code positions a ship at the bottom center of the screen, by matching the midbottom\
    \ of the ship with the midbottom of the screen.\n\n```python\nship_rect.midbottom\
    \ = screen_rect.midbottom\n```\n\n### Drawing an image to the screen\n\nOnce an\
    \ image is loaded and positioned, you can draw it to the screen with the blit()\
    \ method. The blit() method acts on the screen object, and takes the image object\
    \ and image rect as arguments.\n\n```python\n# Draw ship to screen.\nscreen.blit(ship,\
    \ ship_rect)\n```\n\n### Transforming an image\n\nThe transform module allows\
    \ you to make changes to an image such as rotation and scaling.\n\n```python\n\
    rotated_image = pygame.transform.rotate(\n    ship.image, 45)\n```\n\n### The\
    \ blitme() method\n\nGame objects such as ships are often written as classes.\
    \ Then a blitme() method is usually defined, which draws the object to the screen.\n\
    \n```python\ndef blitme(self):\n    \"\"\"Draw ship at current location.\"\"\"\
    \n    self.screen.blit(self.image, self.rect)\n```\n\n## Responding to keyboard\
    \ input\n\nPygame watches for events such as key presses and mouse actions. You\
    \ can detect any event you care about in the event loop, and respond with any\
    \ action that's appropriate for your game.\n\n### Responding to key presses\n\n\
    Pygame's main event loop registers a KEYDOWN event any time a key is pressed.\
    \ When this happens, you can check for specific keys.\n\n```python\nfor event\
    \ in pygame.event.get():\n    if event.type == pygame.KEYDOWN:\n        if event.key\
    \ == pygame.K_RIGHT:\n            ship_rect.x += 1\n        elif event.key ==\
    \ pygame.K_LEFT:\n            ship_rect.x -= 1\n        elif event.key == pygame.K_SPACE:\n\
    \            ship.fire_bullet()\n        elif event.key == pygame.K_q:\n     \
    \       sys.exit()\n```\n\n### Responding to released keys\n\nWhen the user releases\
    \ a key, a KEYUP event is triggered.\n\n```python\nfor event in pygame.event.get():\n\
    \    if event.type == pygame.KEYUP:\n        if event.key == pygame.K_RIGHT:\n\
    \            ship.moving_right = False\n```\n\n### The game is an object\n\nIn\
    \ the overall structure shown here (under Starting a Game), the entire game is\
    \ written as a class. This makes it possible to write programs that play the game\
    \ automatically, and it also means you can build an arcade with a collection of\
    \ games.\n\n### Pygame documentation\n\nThe Pygame documentation is really helpful\
    \ when building your own games. The home page for the Pygame project is at pygame.org/,\
    \ and the home page for the documentation is at pygame.org/docs/.\nThe most useful\
    \ part of the documentation are the pages about specific parts of Pygame, such\
    \ as the Rect() class and the sprite module. You can find a list of these elements\
    \ at the top of the help pages.\n\n## Responding to mouse events\n\nPygame's event\
    \ loop registers an event any time the mouse moves, or a mouse button is pressed\
    \ or released.\n\n### Responding to the mouse button\n\n```python\nfor event in\
    \ pygame.event.get():\n    if event.type == pygame.MOUSEBUTTONDOWN:\n        ship.fire_bullet()\n\
    ```\n\n### Finding the mouse position\n\nThe mouse position is returned as a tuple.\n\
    \n```python\nmouse_pos = pygame.mouse.get_pos()\n```\n\n### Clicking a button\n\
    \nYou might want to know if the cursor is over an object such as a button. The\
    \ rect.collidepoint() method returns True when a point overlaps a rect object.\n\
    \n```python\nif button_rect.collidepoint(mouse_pos):\n    start_game()\n```\n\n\
    ### Hiding the mouse\n\n```python\npygame.mouse.set_visible(False)\n```\n\n##\
    \ Pygame groups\n\nPygame has a Group class which makes working with a group of\
    \ similar objects easier. A group is like a list, with some extra functionality\
    \ that's helpful when building games.\n\n### Making and filling a group\n\nAn\
    \ object that will be placed in a group must inherit from Sprite.\n\n```python\n\
    from pygame.sprite import Sprite, Group\n\nclass Bullet(Sprite):\n    ...\n  \
    \  def draw_bullet(self):\n        ...\n    def update(self):\n        ...\n\n\
    bullets = Group()\n\nnew_bullet = Bullet()\nbullets.add(new_bullet)\n```\n\n###\
    \ Looping through the items in a group\n\nThe sprites() method returns all the\
    \ members of a group.\n\n```python\nfor bullet in bullets.sprites():\n    bullet.draw_bullet()\n\
    ```\n\n### Calling update() on a group\n\nCalling update() on a group automatically\
    \ calls update() on each member of the group.\n\n```python\nbullets.update()\n\
    ```\n\n### Removing an item from a group\n\nIt's important to delete elements\
    \ that will never appear again in the game, so you don't waste memory and resources.\n\
    \n```python\nbullets.remove(bullet)\n```\n\n### Detecting collisions\n\nYou can\
    \ detect when a single object collides with any member of a group. You can also\
    \ detect when any member of one group collides with a member of another group.\n\
    \n#### Collisions between a single object and a group\n\nThe spritecollideany()\
    \ function takes an object and a group, and returns True if the object overlaps\
    \ with any member of the group.\n\n```python\nif pygame.sprite.spritecollideany(ship,\
    \ aliens):\n    ships_left -= 1\n```\n\n#### Collisions between two groups\n\n\
    The sprite.groupcollide() function takes two groups, and two booleans. The function\
