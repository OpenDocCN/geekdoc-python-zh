    \n```\n$ django-admin startproject learning_log .\n```\n\n# Create a database\n\
    \n```\n$ python manage.py migrate\n```\n\n# View the project\n\nAfter issuing\
    \ this command, you can view the project at http://localhost:8000/.\n\n```\n$\
    \ python manage.py runserver\n```\n\n# Create a new app\n\nA Django project is\
    \ made up of one or more apps.\n\n```\n$ python manage.py startapp learning_logs\n\
    ```\n\n# Working with models\n\nThe data in a Django project is structured as\
    \ a set of models. Each model is represented by a class.\n\n# Defining a model\n\
    \nTo define the models for your app, modify the file models.py that was created\
    \ in your app's folder. The __str__() method tells Django how to represent data\
    \ objects based on this model.\n\n```\nfrom django.db import models\n\nclass Topic(models.Model):\n\
    \    \"\"\"A topic the user is learning about.\"\"\"\n\n    text = models.CharField(max_length=200)\n\
    \    date_added = models.DateTimeField(\n        auto_now_add=True)\n\n    def\
    \ __str__(self):\n        return self.text\n```\n\n# Activating a model\n\nTo\
    \ use a model the app must be added to the list INSTALLED_APPS, which is stored\
    \ in the project's settings.py file.\n\n```\nINSTALLED_APPS = [\n    # My apps.\n\
    \    'learning_logs',\n\n    # Default Django apps.\n    'django.contrib.admin',\n\
    ]\n```\n\n# Migrating the database\n\nThe database needs to be modified to store\
    \ the kind of data that the model represents. You'll need to run these commands\
    \ every time you create a new model, or modify an existing model.\n\n```\n$ python\
    \ manage.py makemigrations learning_logs\n$ python manage.py migrate\n```\n\n\
    # Creating a superuser\n\nA superuser is a user account that has access to all\
    \ aspects of the project.\n\n```\n$ python manage.py createsuperuser\n```\n\n\
    # Registering a model\n\nYou can register your models with Django's admin site,\
