  md: "# While loops\n\nA while loop repeats a block of code as long as a certain\
    \ condition is true. While loops are especially useful when you can't know ahead\
    \ of time how many times a loop should run.\n\n# A simple while loop\n\n```\n\
    current_value = 1\nwhile current_value <= 5:\n    print(current_value)\n    current_value\
    \ += 1\n```\n\n# Letting the user choose when to quit\n\n```\nmsg = ''\nwhile\
    \ msg != 'quit':\n    msg = input(\"What's your message? \")\n    print(msg)\n\
    ```\n\n# Functions\n\nFunctions are named blocks of code, designed to do one specific\
    \ job. Information passed to a function is called an argument, and information\
    \ received by a function is called a parameter.\n\n# A simple function\n\n```\n\
    def greet_user():\n    \"\"\"Display a simple greeting.\"\"\"\n    print(\"Hello!\"\
    )\n\ngreet_user()\n```\n\n# Passing an argument\n\n```\ndef greet_user(username):\n\
    \    \"\"\"Display a personalized greeting.\"\"\"\n    print(f\"Hello, {username}!\"\
    )\n\ngreet_user('jesse')\n```\n\n# Default values for parameters\n\n```\ndef make_pizza(topping='pineapple'):\n\
    \    \"\"\"Make a single-topping pizza.\"\"\"\n    print(f\"Have a {topping} pizza!\"\
    )\n\nmake_pizza()\nmake_pizza('mushroom')\n```\n\n# Returning a value\n\n```\n\
    def add_numbers(x, y):\n    \"\"\"Add two numbers and return the sum.\"\"\"\n\
    \    return x + y\n\nsum = add_numbers(3, 5)\nprint(sum)\n```\n\n# Classes\n\n\
    A class defines the behavior of an object and the kind of information an object\
    \ can store. The information in a class is stored in attributes, and functions\
    \ that belong to a class are called methods. A child class inherits the attributes\
    \ and methods from its parent class.\n\n# Creating a dog class\n\n```\nclass Dog:\n\
    \    \"\"\"Represent a dog.\"\"\"\n\n    def __init__(self, name):\n        \"\
    \"\"Initialize dog object.\"\"\"\n        self.name = name\n\n    def sit(self):\n\
    \        \"\"\"Simulate sitting.\"\"\"\n        print(f\"{self.name} is sitting.\"\
    )\n\nmy_dog = Dog('Peso')\n\nprint(f\"{my_dog.name} is a great dog!\")\nmy_dog.sit()\n\
    ```\n\n# Inheritance\n\n```\nclass SARDog(Dog):\n    \"\"\"Represent a search\
    \ dog.\"\"\"\n\n    def __init__(self, name):\n        \"\"\"Initialize the sardog.\"\
    \"\"\n        super().__init__(name)\n\n    def search(self):\n        \"\"\"\
    Simulate searching.\"\"\"\n        print(f\"{self.name} is searching.\")\n\nmy_dog\
    \ = SARDog('Willie')\n\nprint(f\"{my_dog.name} is a search dog.\")\nmy_dog.sit()\n\
    my_dog.search()\n```\n\n# Infinite Skills\n\nIf you had infinite programming skills,\
    \ what would you build?\nAs you're learning to program, it's helpful to think\
    \ about the real-world projects you'd like to create. It's a good habit to keep\
    \ an \"ideas\" notebook that you can refer to whenever you want to start a new\
    \ project.\nIf you haven't done so already, take a few minutes and describe three\
    \ projects you'd like to create. As you're learning you can write small programs\
    \ that relate to these ideas, so you can get practice writing code relevant to\
    \ topics you're interested in.\n\n# Working with files\n\nYour programs can read\
    \ from files and write to files. Files are opened in read mode by default, but\
    \ can also be opened in write mode and append mode.\n\n# Reading a file and storing\
    \ its lines\n\n```\nfilename = 'siddhartha.txt'\nwith open(filename) as file_object:\n\
    \    lines = file_object.readlines()\n\nfor line in lines:\n    print(line)\n\
    ```\n\n# Writing to a file\n\nThe variable referring to the file object is often\
    \ shortened to f.\n\n```\nfilename = 'journal.txt'\nwith open(filename, 'w') as\
    \ f:\n    f.write(\"I love programming.\")\n```\n\n# Appending to a file\n\n```\n\
    filename = 'journal.txt'\nwith open(filename, 'a') as f:\n    f.write(\"\\nI love\
    \ making games.\")\n```\n\n# Exceptions\n\nExceptions help you respond appropriately\
    \ to errors that are likely to occur. You place code that might cause an error\
    \ in the try block. Code that should run in response to an error goes in the except\
    \ block. Code that should run only if the try block was successful goes in the\
    \ else block.\n\n# Catching an exception\n\n```\nprompt = \"How many tickets do\
    \ you need? \"\nnum_tickets = input(prompt)\n\ntry:\n    num_tickets = int(num_tickets)\n\
    except ValueError:\n    print(\"Please try again.\")\nelse:\n    print(\"Your\
    \ tickets are printing.\")\n```\n\n# Zen of Python\n\nSimple is better than complex\n\
    If you have a choice between a simple and a complex solution, and both work, use\
    \ the simple solution. Your code will be easier to maintain, and it will be easier\
    \ for you and others to build on that code later on.\n\nMore cheat sheets available\
    \ at ehmatthes.github.io/pcc_2e/"
