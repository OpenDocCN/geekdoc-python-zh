- md: "# Beginner's Python Cheat Sheet\n\n## Variables and Strings\n\nVariables are\
    \ used to assign labels to values. A string is a series of characters, surrounded\
    \ by single or double quotes. Python's f-strings allow you to use variables inside\
    \ strings to build dynamic messages.\n\nHello world\n\n```\nprint(\"Hello world!\"\
    )\n```\n\nHello world with a variable\n\n```\nmsg = \"Hello world!\"\nprint(msg)\n\
    ```\n\nf-strings (using variables in strings)\n\n```\nfirst_name = 'albert'\n\
    last_name = 'einstein'\nfull_name = f\"{first_name} {last_name}\"\nprint(full_name)\n\
    ```\n\n## Lists\n\nA list stores a series of items in a particular order. You\
    \ access items using an index, or within a loop.\n\nMake a list\n\n```\nbikes\
    \ = ['trek', 'redline', 'giant']\n```\n\nGet the first item in a list\n\n```\n\
    first_bike = bikes[0]\n```\n\nGet the last item in a list\n\n```\nlast_bike =\
    \ bikes[-1]\n```\n\nLooping through a list\n\n```\nfor bike in bikes:\n    print(bike)\n\
    ```\n\nAdding items to a list\n\n```\nbikes = []\nbikes.append('trek')\nbikes.append('redline')\n\
    bikes.append('giant')\n```\n\nMaking numerical lists\n\n```\nsquares = []\nfor\
    \ x in range(1, 11):\n    squares.append(x**2)\n```\n\n### Lists (cont.)\n\nList\
    \ comprehensions\n\n```\nsquares = [x**2 for x in range(1, 11)]\n```\n\nSlicing\
    \ a list\n\n```\nfinishers = ['sam', 'bob', 'ada', 'bea']\nfirst_two = finishers[:2]\n\
    ```\n\nCopying a list\n\n```\ncopy_of_bikes = bikes[:]\n```\n\n## Tuples\n\nTuples\
    \ are similar to lists, but the items in a tuple can't be modified.\n\nMaking\
    \ a tuple\n\n```\ndimensions = (1920, 1080)\nresolutions = ('720p', '1080p', '4K')\n\
    ```\n\n## If statements\n\nIf statements are used to test for particular conditions\
    \ and respond appropriately.\n\nConditional tests\n\n```\nequal           x ==\
    \ 42\nnot equal       x != 42\ngreater than     x > 42\nor equal to     x >= 42\n\
    less than       x < 42\nor equal to     x <= 42\n```\n\nConditional tests with\
    \ lists\n\n```\n'trek' in bikes\n'surly' not in bikes\n```\n\nAssigning boolean\
    \ values\n\n```\ngame_active = True\ncan_edit = False\n```\n\nA simple if test\n\
    \n```\nif age >= 18:\n    print(\"You can vote!\")\n```\n\nIf-elif-else statements\n\
    \n```\nif age < 4:\n    ticket_price = 0\nelif age < 18:\n    ticket_price = 10\n\
    elif age < 65:\n    ticket_price = 40\nelse:\n    ticket_price = 15\n```\n\n##\
    \ Dictionaries\n\nDictionaries store connections between pieces of information.\
    \ Each item in a dictionary is a key-value pair.\n\nA simple dictionary\n\n```\n\
    alien = {'color': 'green', 'points': 5}\n```\n\nAccessing a value\n\n```\nprint(f\"\
    The alien's color is {alien['color']}.\")\n```\n\nAdding a new key-value pair\n\
    \n```\nalien['x_position'] = 0\n```\n\nLooping through all key-value pairs\n\n\
    ```\nfav_numbers = {'eric': 7, 'ever': 4, 'erin': 47}\n\nfor name, number in fav_numbers.items():\n\
    \    print(f\"{name} loves {number}.\")\n```\n\nLooping through all keys\n\n```\n\
    fav_numbers = {'eric': 7, 'ever': 4, 'erin': 47}\n\nfor name in fav_numbers.keys():\n\
    \    print(f\"{name} loves a number.\")\n```\n\nLooping through all the values\n\
    \n```\nfav_numbers = {'eric': 7, 'ever': 4, 'erin': 47}\n\nfor number in fav_numbers.values():\n\
    \    print(f\"{number} is a favorite.\")\n```\n\n## User input\n\nYour programs\
    \ can prompt the user for input. All input is stored as a string.\n\nPrompting\
    \ for a value\n\n```\nname = input(\"What's your name? \")\nprint(f\"Hello, {name}!\"\
    )\n```\n\nPrompting for numerical input\n\n```\nage = input(\"How old are you?\
    \ \")\nage = int(age)\n\npi = input(\"What's the value of pi? \")\npi = float(pi)\n\
    ```\n\n## Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_0_0.png)\n\
    \n## While loops\n\nA while loop repeats a block of code as long as a certain\
    \ condition is true. While loops are especially useful when you can't know ahead\
    \ of time how many times a loop should run.\n\n### A simple while loop\n\n```\n\
    current_value = 1\nwhile current_value <= 5:\n    print(current_value)\n    current_value\
    \ += 1\n```\n\n### Letting the user choose when to quit\n\n```\nmsg = ''\nwhile\
    \ msg != 'quit':\n    msg = input(\"What's your message? \")\n    print(msg)\n\
    ```\n\n## Functions\n\nFunctions are named blocks of code, designed to do one\
    \ specific job. Information passed to a function is called an argument, and information\
    \ received by a function is called a parameter.\n\n### A simple function\n\n```\n\
    def greet_user():\n    \"\"\"Display a simple greeting.\"\"\"\n    print(\"Hello!\"\
    )\n\ngreet_user()\n```\n\n### Passing an argument\n\n```\ndef greet_user(username):\n\
    \    \"\"\"Display a personalized greeting.\"\"\"\n    print(f\"Hello, {username}!\"\
    )\n\ngreet_user('jesse')\n```\n\n### Default values for parameters\n\n```\ndef\
    \ make_pizza(topping='pineapple'):\n    \"\"\"Make a single-topping pizza.\"\"\
    \"\n    print(f\"Have a {topping} pizza!\")\n\nmake_pizza()\nmake_pizza('mushroom')\n\
    ```\n\n### Returning a value\n\n```\ndef add_numbers(x, y):\n    \"\"\"Add two\
    \ numbers and return the sum.\"\"\"\n    return x + y\n\nsum = add_numbers(3,\
    \ 5)\nprint(sum)\n```\n\n## Classes\n\nA class defines the behavior of an object\
    \ and the kind of information an object can store. The information in a class\
    \ is stored in attributes, and functions that belong to a class are called methods.\
    \ A child class inherits the attributes and methods from its parent class.\n\n\
    ### Creating a dog class\n\n```\nclass Dog:\n    \"\"\"Represent a dog.\"\"\"\n\
    \n    def __init__(self, name):\n        \"\"\"Initialize dog object.\"\"\"\n\
    \        self.name = name\n\n    def sit(self):\n        \"\"\"Simulate sitting.\"\
    \"\"\n        print(f\"{self.name} is sitting.\")\n\nmy_dog = Dog('Peso')\n\n\
    print(f\"{my_dog.name} is a great dog!\")\nmy_dog.sit()\n```\n\n### Inheritance\n\
    \n```\nclass SARDog(Dog):\n    \"\"\"Represent a search dog.\"\"\"\n\n    def\
    \ __init__(self, name):\n        \"\"\"Initialize the sardog.\"\"\"\n        super().__init__(name)\n\
    \n    def search(self):\n        \"\"\"Simulate searching.\"\"\"\n        print(f\"\
    {self.name} is searching.\")\n\nmy_dog = SARDog('Willie')\n\nprint(f\"{my_dog.name}\
    \ is a search dog.\")\nmy_dog.sit()\nmy_dog.search()\n```\n\n## Infinite Skills\n\
    \nIf you had infinite programming skills, what would you build?\nAs you're learning\
    \ to program, it's helpful to think about the real-world projects you'd like to\
    \ create. It's a good habit to keep an \"ideas\" notebook that you can refer to\
    \ whenever you want to start a new project.\nIf you haven't done so already, take\
    \ a few minutes and describe three projects you'd like to create. As you're learning\
    \ you can write small programs that relate to these ideas, so you can get practice\
    \ writing code relevant to topics you're interested in.\n\n## Working with files\n\
    \nYour programs can read from files and write to files. Files are opened in read\
    \ mode by default, but can also be opened in write mode and append mode.\n\n###\
    \ Reading a file and storing its lines\n\n```\nfilename = 'siddhartha.txt'\nwith\
    \ open(filename) as file_object:\n    lines = file_object.readlines()\n\nfor line\
    \ in lines:\n    print(line)\n```\n\n### Writing to a file\n\nThe variable referring\
    \ to the file object is often shortened to f.\n\n```\nfilename = 'journal.txt'\n\
    with open(filename, 'w') as f:\n    f.write(\"I love programming.\")\n```\n\n\
    ### Appending to a file\n\n```\nfilename = 'journal.txt'\nwith open(filename,\
    \ 'a') as f:\n    f.write(\"\\nI love making games.\")\n```\n\n## Exceptions\n\
    \nExceptions help you respond appropriately to errors that are likely to occur.\
    \ You place code that might cause an error in the try block. Code that should\
    \ run in response to an error goes in the except block. Code that should run only\
    \ if the try block was successful goes in the else block.\n\n### Catching an exception\n\
    \n```\nprompt = \"How many tickets do you need? \"\nnum_tickets = input(prompt)\n\
    \ntry:\n    num_tickets = int(num_tickets)\nexcept ValueError:\n    print(\"Please\
    \ try again.\")\nelse:\n    print(\"Your tickets are printing.\")\n```\n\n## Zen\
    \ of Python\n\nSimple is better than complex\nIf you have a choice between a simple\
    \ and a complex solution, and both work, use the simple solution. Your code will\
    \ be easier to maintain, and it will be easier for you and others to build on\
    \ that code later on.\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/\n\
    \n# Beginner's Python Cheat Sheet - Lists\n\n## What are lists?\n\nA list stores\
    \ a series of items in a particular order. Lists allow you to store sets of information\
    \ in one place, whether you have just a few items or millions of items. Lists\
    \ are one of Python's most powerful features readily accessible to new programmers,\
    \ and they tie together many important concepts in programming.\n\n## Defining\
    \ a list\n\nUse square brackets to define a list, and use commas to separate individual\
    \ items in the list. Use plural names for lists, to make it clear that the variable\
    \ represents more than one item.\n\n### Making a list\n\n```\nusers = ['val',\
    \ 'bob', 'mia', 'ron', 'ned']\n```\n\n## Accessing elements\n\nIndividual elements\
    \ in a list are accessed according to their position, called the index. The index\
    \ of the first element is 0, the index of the second element is 1, and so forth.\
    \ Negative indices refer to items at the end of the list. To get a particular\
    \ element, write the name of the list and then the index of the element in square\
    \ brackets.\n\n### Getting the first element\n\n```\nfirst_user = users[0]\n```\n\
    \n### Getting the second element\n\n```\nsecond_user = users[1]\n```\n\n### Getting\
    \ the last elements\n\n```\nnewest_user = users[-1]\n```\n\n## Modifying individual\
    \ items\n\nOnce you've defined a list, you can change the value of individual\
    \ elements in the list. You do this by referring to the index of the item you\
    \ want to modify.\n\n### Changing an element\n\n```\nusers[0] = 'valerie'\nusers[1]\
    \ = 'robert'\nusers[-2] = 'ronald'\n```\n\n## Adding elements\n\nYou can add elements\
    \ to the end of a list, or you can insert them wherever you like in a list. This\
    \ allows you to modify existing lists, or start with an empty list and then add\
    \ items to it as the program develops.\n\n### Adding an element to the end of\
    \ the list\n\n```\nusers.append('amy')\n```\n\n### Starting with an empty list\n\
    \n```\nusers = []\nusers.append('amy')\nusers.append('val')\nusers.append('bob')\n\
    users.append('mia')\n```\n\n### Inserting elements at a particular position\n\n\
    ```\nusers.insert(0, 'joe')\nusers.insert(3, 'bea')\n```\n\n## Removing elements\n\
    \nYou can remove elements by their position in a list, or by the value of the\
    \ item. If you remove an item by its value, Python removes only the first item\
    \ that has that value.\n\n### Deleting an element by its position\n\n```\ndel\
    \ users[-1]\n```\n\n### Removing an item by its value\n\n```\nusers.remove('mia')\n\
    ```\n\n## Popping elements\n\nIf you want to work with an element that you're\
    \ removing from the list, you can \"pop\" the item. If you think of the list as\
    \ a stack of items, pop() takes an item off the top of the stack. By default pop()\
    \ returns the last element in the list, but you can also pop elements from any\
    \ position in the list.\n\n### Pop the last item from a list\n\n```\nmost_recent_user\
    \ = users.pop()\nprint(most_recent_user)\n```\n\n### Pop the first item in a list\n\
    \n```\nfirst_user = users.pop(0)\nprint(first_user)\n```\n\n## List length\n\n\
    The len() function returns the number of items in a list.\n\n### Find the length\
    \ of a list\n\n```\nnum_users = len(users)\nprint(f\"We have {num_users} users.\"\
    )\n```\n\n## Sorting a list\n\nThe sort() method changes the order of a list permanently.\
    \ The sorted() function returns a copy of the list, leaving the original list\
    \ unchanged. You can sort the items in a list in alphabetical order, or reverse\
    \ alphabetical order. You can also reverse the original order of the list. Keep\
    \ in mind that lowercase and uppercase letters may affect the sort order.\n\n\
    ### Sorting a list permanently\n\n```\nusers.sort()\n```\n\n### Sorting a list\
    \ permanently in reverse alphabetical order\n\n```\nusers.sort(reverse=True)\n\
    ```\n\n### Sorting a list temporarily\n\n```\nprint(sorted(users))\nprint(sorted(users,\
    \ reverse=True))\n```\n\n### Reversing the order of a list\n\n```\nusers.reverse()\n\
    ```\n\n## Looping through a list\n\nLists can contain millions of items, so Python\
    \ provides an efficient way to loop through all the items in a list. When you\
    \ set up a loop, Python pulls each item from the list one at a time and assigns\
    \ it to a temporary variable, which you provide a name for. This name should be\
    \ the singular version of the list name. The indented block of code makes up the\
    \ body of the loop, where you can work with each individual item. Any lines that\
    \ are not indented run after the loop is completed.\n\n### Printing all items\
    \ in a list\n\n```\nfor user in users:\n    print(user)\n```\n\n### Printing a\
    \ message for each item, and a separate message afterwards\n\n```\nfor user in\
    \ users:\n    print(f\"\\nWelcome, {user}!\")\n    print(\"We're so glad you joined!\"\
    )\n\nprint(\"\\nWelcome, we're glad to see you all!\")\n```\n\n## Python Crash\
    \ Course\n\nA Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_2_0.png)"
  mdcn: "# Python 初学者速查表\n\n## 变量与字符串\n\n变量用于将标签赋给值。字符串是由单引号或双引号括起来的一系列字符。Python 的\
    \ f-字符串允许你在字符串中使用变量来构建动态消息。\n\nHello world\n\n```\nprint(\"Hello world!\")\n```\n\
    \n使用变量的 Hello world\n\n```\nmsg = \"Hello world!\"\nprint(msg)\n```\n\nf-字符串（在字符串中使用变量）\n\
    \n```\nfirst_name = 'albert'\nlast_name = 'einstein'\nfull_name = f\"{first_name}\
    \ {last_name}\"\nprint(full_name)\n```\n\n## 列表\n\n列表按特定顺序存储一系列项目。你可以使用索引或在循环中访问项目。\n\
    \n创建列表\n\n```\nbikes = ['trek', 'redline', 'giant']\n```\n\n获取列表中的第一个项目\n\n```\n\
    first_bike = bikes[0]\n```\n\n获取列表中的最后一个项目\n\n```\nlast_bike = bikes[-1]\n```\n\
    \n遍历列表\n\n```\nfor bike in bikes:\n    print(bike)\n```\n\n向列表中添加项目\n\n```\nbikes\
    \ = []\nbikes.append('trek')\nbikes.append('redline')\nbikes.append('giant')\n\
    ```\n\n创建数字列表\n\n```\nsquares = []\nfor x in range(1, 11):\n    squares.append(x**2)\n\
    ```\n\n### 列表（续）\n\n列表推导式\n\n```\nsquares = [x**2 for x in range(1, 11)]\n```\n\
    \n列表切片\n\n```\nfinishers = ['sam', 'bob', 'ada', 'bea']\nfirst_two = finishers[:2]\n\
    ```\n\n复制列表\n\n```\ncopy_of_bikes = bikes[:]\n```\n\n## 元组\n\n元组与列表类似，但元组中的项目不能被修改。\n\
    \n创建元组\n\n```\ndimensions = (1920, 1080)\nresolutions = ('720p', '1080p', '4K')\n\
    ```\n\n## If 语句\n\nIf 语句用于测试特定条件并做出适当响应。\n\n条件测试\n\n```\n等于           x == 42\n\
    不等于         x != 42\n大于           x > 42\n或等于         x >= 42\n小于           x\
    \ < 42\n或等于         x <= 42\n```\n\n使用列表的条件测试\n\n```\n'trek' in bikes\n'surly'\
    \ not in bikes\n```\n\n赋值布尔值\n\n```\ngame_active = True\ncan_edit = False\n```\n\
    \n简单的 if 测试\n\n```\nif age >= 18:\n    print(\"You can vote!\")\n```\n\nIf-elif-else\
    \ 语句\n\n```\nif age < 4:\n    ticket_price = 0\nelif age < 18:\n    ticket_price\
    \ = 10\nelif age < 65:\n    ticket_price = 40\nelse:\n    ticket_price = 15\n\
    ```\n\n## 字典\n\n字典存储信息片段之间的关联。字典中的每个项目都是一个键值对。\n\n一个简单的字典\n\n```\nalien = {'color':\
    \ 'green', 'points': 5}\n```\n\n访问值\n\n```\nprint(f\"The alien's color is {alien['color']}.\"\
    )\n```\n\n添加新的键值对\n\n```\nalien['x_position'] = 0\n```\n\n遍历所有键值对\n\n```\nfav_numbers\
    \ = {'eric': 7, 'ever': 4, 'erin': 47}\n\nfor name, number in fav_numbers.items():\n\
    \    print(f\"{name} loves {number}.\")\n```\n\n遍历所有键\n\n```\nfav_numbers = {'eric':\
    \ 7, 'ever': 4, 'erin': 47}\n\nfor name in fav_numbers.keys():\n    print(f\"\
    {name} loves a number.\")\n```\n\n遍历所有值\n\n```\nfav_numbers = {'eric': 7, 'ever':\
    \ 4, 'erin': 47}\n\nfor number in fav_numbers.values():\n    print(f\"{number}\
    \ is a favorite.\")\n```\n\n## 用户输入\n\n你的程序可以提示用户输入。所有输入都存储为字符串。\n\n提示输入一个值\n\n\
    ```\nname = input(\"What's your name? \")\nprint(f\"Hello, {name}!\")\n```\n\n\
    提示输入数值\n\n```\nage = input(\"How old are you? \")\nage = int(age)\n\npi = input(\"\
    What's the value of pi? \")\npi = float(pi)\n```\n\n## Python 编程从入门到实践\n\n基于项目的编程入门教程\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_0_0.png)\n\
    \n## While 循环\n\nWhile 循环在条件为真时重复执行一段代码。当你无法提前知道循环应运行多少次时，While 循环尤其有用。\n\n###\
    \ 一个简单的 while 循环\n\n```\ncurrent_value = 1\nwhile current_value <= 5:\n    print(current_value)\n\
    \    current_value += 1\n```\n\n### 让用户选择何时退出\n\n```\nmsg = ''\nwhile msg != 'quit':\n\
    \    msg = input(\"What's your message? \")\n    print(msg)\n```\n\n## 函数\n\n\
    函数是命名的代码块，旨在完成一项特定任务。传递给函数的信息称为参数，函数接收的信息也称为参数。\n\n### 一个简单的函数\n\n```\ndef greet_user():\n\
    \    \"\"\"Display a simple greeting.\"\"\"\n    print(\"Hello!\")\n\ngreet_user()\n\
    ```\n\n### 传递参数\n\n```\ndef greet_user(username):\n    \"\"\"Display a personalized\
    \ greeting.\"\"\"\n    print(f\"Hello, {username}!\")\n\ngreet_user('jesse')\n\
    ```\n\n### 参数的默认值\n\n```\ndef make_pizza(topping='pineapple'):\n    \"\"\"Make\
    \ a single-topping pizza.\"\"\"\n    print(f\"Have a {topping} pizza!\")\n\nmake_pizza()\n\
    make_pizza('mushroom')\n```\n\n### 返回值\n\n```\ndef add_numbers(x, y):\n    \"\"\
    \"Add two numbers and return the sum.\"\"\"\n    return x + y\n\nsum = add_numbers(3,\
    \ 5)\nprint(sum)\n```\n\n## 类\n\n类定义了对象的行为以及对象可以存储的信息类型。类中的信息存储在属性中，属于类的函数称为方法。子类继承其父类的属性和方法。\n\
    \n### 创建一个 Dog 类\n\n```\nclass Dog:\n    \"\"\"Represent a dog.\"\"\"\n\n    def\
    \ __init__(self, name):\n        \"\"\"Initialize dog object.\"\"\"\n        self.name\
    \ = name\n\n    def sit(self):\n        \"\"\"Simulate sitting.\"\"\"\n      \
    \  print(f\"{self.name} is sitting.\")\n\nmy_dog = Dog('Peso')\n\nprint(f\"{my_dog.name}\
    \ is a great dog!\")\nmy_dog.sit()\n```\n\n### 继承\n\n```\nclass SARDog(Dog):\n\
    \    \"\"\"Represent a search dog.\"\"\"\n\n    def __init__(self, name):\n  \
    \      \"\"\"Initialize the sardog.\"\"\"\n        super().__init__(name)\n\n\
    \    def search(self):\n        \"\"\"Simulate searching.\"\"\"\n        print(f\"\
    {self.name} is searching.\")\n\nmy_dog = SARDog('Willie')\n\nprint(f\"{my_dog.name}\
    \ is a search dog.\")\nmy_dog.sit()\nmy_dog.search()\n```\n\n## 无限技能\n\n如果你拥有无限的编程技能，你会构建什么？\n\
    在学习编程的过程中，思考你想创建的真实世界项目是很有帮助的。养成一个“创意”笔记本的习惯是很好的，这样当你想开始一个新项目时就可以参考它。\n如果你还没有这样做，请花几分钟时间描述三个你想创建的项目。在学习过程中，你可以编写与这些想法相关的小程序，这样你就可以练习编写与你感兴趣的主题相关的代码。\n\
    \n## 文件处理\n\n你的程序可以从文件中读取数据，也可以向文件中写入数据。文件默认以读取模式打开，但也可以以写入模式和追加模式打开。\n\n### 读取文件并存储其行\n\
    \n```\nfilename = 'siddhartha.txt'\nwith open(filename) as file_object:\n    lines\
    \ = file_object.readlines()\n\nfor line in lines:\n    print(line)\n```\n\n###\
    \ 写入文件\n\n引用文件对象的变量通常简写为 f。\n\n```\nfilename = 'journal.txt'\nwith open(filename,\
    \ 'w') as f:\n    f.write(\"I love programming.\")\n```\n\n### 追加到文件\n\n```\n\
    filename = 'journal.txt'\nwith open(filename, 'a') as f:\n    f.write(\"\\nI love\
    \ making games.\")\n```\n\n## 异常\n\n异常帮助你对可能发生的错误做出适当响应。你将可能引发错误的代码放在 try 块中。响应错误而应运行的代码放在\
    \ except 块中。仅在 try 块成功时才应运行的代码放在 else 块中。\n\n### 捕获异常\n\n```\nprompt = \"How many\
    \ tickets do you need? \"\nnum_tickets = input(prompt)\n\ntry:\n    num_tickets\
    \ = int(num_tickets)\nexcept ValueError:\n    print(\"Please try again.\")\nelse:\n\
    \    print(\"Your tickets are printing.\")\n```\n\n## Python 之禅\n\n简单胜于复杂\n如果你在简单和复杂的解决方案之间有选择，并且两者都有效，请使用简单的解决方案。你的代码将更容易维护，并且你和其他人以后也更容易在此基础上构建。\n\
    \n更多速查表可在 ehmatthes.github.io/pcc_2e/ 获取\n\n# Python 初学者速查表 - 列表\n\n## 什么是列表？\n\
    \n列表按特定顺序存储一系列项目。列表允许你将一组信息存储在一个地方，无论你只有几个项目还是数百万个项目。列表是 Python 最强大的功能之一，对新程序员来说易于掌握，并且它们将编程中的许多重要概念联系在一起。\n\
    \n## 定义列表\n\n使用方括号定义列表，并使用逗号分隔列表中的各个项目。为列表使用复数名称，以清楚地表明该变量代表多个项目。\n\n### 创建列表\n\
    \n```\nusers = ['val', 'bob', 'mia', 'ron', 'ned']\n```\n\n## 访问元素\n\n列表中的各个元素根据其位置（称为索引）进行访问。第一个元素的索引是\
    \ 0，第二个元素的索引是 1，依此类推。负索引指的是列表末尾的项目。要获取特定元素，请编写列表的名称，然后在方括号中写入元素的索引。\n\n### 获取第一个元素\n\
    \n```\nfirst_user = users[0]\n```\n\n### 获取第二个元素\n\n```\nsecond_user = users[1]\n\
    ```\n\n### 获取最后一个元素\n\n```\nnewest_user = users[-1]\n```\n\n## 修改单个项目\n\n定义列表后，你可以更改列表中各个元素的值。你可以通过引用要修改的项目的索引来完成此操作。\n\
    \n### 更改元素\n\n```\nusers[0] = 'valerie'\nusers[1] = 'robert'\nusers[-2] = 'ronald'\n\
    ```\n\n## 添加元素\n\n你可以将元素添加到列表的末尾，也可以将它们插入到列表中的任何位置。这允许你修改现有列表，或者从一个空列表开始，然后在程序开发过程中向其中添加项目。\n\
    \n### 将元素添加到列表末尾\n\n```\nusers.append('amy')\n```\n\n### 从空列表开始\n\n```\nusers\
    \ = []\nusers.append('amy')\nusers.append('val')\nusers.append('bob')\nusers.append('mia')\n\
    ```\n\n### 在特定位置插入元素\n\n```\nusers.insert(0, 'joe')\nusers.insert(3, 'bea')\n\
    ```\n\n## 删除元素\n\n你可以根据元素在列表中的位置或项目的值来删除元素。如果你根据值删除项目，Python 只会删除第一个具有该值的项目。\n\
    \n### 根据位置删除元素\n\n```\ndel users[-1]\n```\n\n### 根据值删除项目\n\n```\nusers.remove('mia')\n\
    ```\n\n### 弹出元素\n\n如果你想处理从列表中移除的元素，你可以“弹出”该项目。如果你将列表视为一叠项目，pop() 会从栈顶取下一个项目。默认情况下，pop()\
    \ 返回列表中的最后一个元素，但你也可以从列表中的任何位置弹出元素。\n\n### 从列表中弹出最后一个项目\n\n```\nmost_recent_user\
    \ = users.pop()\nprint(most_recent_user)\n```\n\n### 弹出列表中的第一个项目\n\n```\nfirst_user\
    \ = users.pop(0)\nprint(first_user)\n```\n\n## 列表长度\n\nlen() 函数返回列表中的项目数。\n\n\
    ### 查找列表的长度\n\n```\nnum_users = len(users)\nprint(f\"We have {num_users} users.\"\
    )\n```\n\n## 列表排序\n\nsort() 方法永久更改列表的顺序。sorted() 函数返回列表的副本，保持原始列表不变。你可以按字母顺序或反向字母顺序对列表中的项目进行排序。你还可以反转列表的原始顺序。请记住，小写字母和大写字母可能会影响排序顺序。\n\
    \n### 永久排序列表\n\n```\nusers.sort()\n```\n\n### 按反向字母顺序永久排序列表\n\n```\nusers.sort(reverse=True)\n\
    ```\n\n### 临时排序列表\n\n```\nprint(sorted(users))\nprint(sorted(users, reverse=True))\n\
    ```\n\n### 反转列表的顺序\n\n```\nusers.reverse()\n```\n\n## 遍历列表\n\n列表可以包含数百万个项目，因此\
    \ Python 提供了一种高效的方法来遍历列表中的所有项目。当你设置一个循环时，Python 一次从列表中取出一个项目，并将其分配给你命名的临时变量。这个名称应该是列表名称的单数形式。缩进的代码块构成了循环的主体，你可以在其中处理每个单独的项目。任何未缩进的行都在循环完成后运行。\n\
    \n### 打印列表中的所有项目\n\n```\nfor user in users:\n    print(user)\n```\n\n### 为每个项目打印一条消息，之后再打印一条单独的消息\n\
    \n```\nfor user in users:\n    print(f\"\\nWelcome, {user}!\")\n    print(\"We're\
    \ so glad you joined!\")\n\nprint(\"\\nWelcome, we're glad to see you all!\")\n\
    ```\n\n## Python 编程从入门到实践\n\n基于项目的编程入门教程\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_2_0.png)"
