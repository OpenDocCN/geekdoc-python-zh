  md: "# Working with images (cont.)\n\nThe blitme() method\nGame objects such as\
    \ ships are often written as classes. Then a blitme() method is usually defined,\
    \ which draws the object to the screen.\n\n```\ndef blitme(self):\n    \"\"\"\
    Draw ship at current location.\"\"\"\n    self.screen.blit(self.image, self.rect)\n\
    ```\n\n# Responding to keyboard input\n\nPygame watches for events such as key\
    \ presses and mouse actions. You can detect any event you care about in the event\
    \ loop, and respond with any action that's appropriate for your game.\n\n# Responding\
    \ to key presses\n\nPygame's main event loop registers a KEYDOWN event any time\
    \ a key is pressed. When this happens, you can check for specific keys.\n\n```\n\
    for event in pygame.event.get():\n    if event.type == pygame.KEYDOWN:\n     \
    \   if event.key == pygame.K_RIGHT:\n            ship_rect.x += 1\n        elif\
    \ event.key == pygame.K_LEFT:\n            ship_rect.x -= 1\n        elif event.key\
    \ == pygame.K_SPACE:\n            ship.fire_bullet()\n        elif event.key ==\
    \ pygame.K_q:\n            sys.exit()\n```\n\n# Responding to released keys\n\n\
    When the user releases a key, a KEYUP event is triggered.\n\n```\nfor event in\
    \ pygame.event.get():\n    if event.type == pygame.KEYUP:\n        if event.key\
    \ == pygame.K_RIGHT:\n            ship.moving_right = False\n```\n\n# The game\
    \ is an object\n\nIn the overall structure shown here (under Starting a Game),\
    \ the entire game is written as a class. This makes it possible to write programs\
    \ that play the game automatically, and it also means you can build an arcade\
    \ with a collection of games.\n\n# Pygame documentation\n\nThe Pygame documentation\
    \ is really helpful when building your own games. The home page for the Pygame\
    \ project is at pygame.org/, and the home page for the documentation is at pygame.org/docs/.\n\
    The most useful part of the documentation are the pages about specific parts of\
    \ Pygame, such as the Rect() class and the sprite module. You can find a list\
    \ of these elements at the top of the help pages.\n\n# Responding to mouse events\n\
    \nPygame's event loop registers an event any time the mouse moves, or a mouse\
    \ button is pressed or released.\n\n# Responding to the mouse button\n\n```\n\
    for event in pygame.event.get():\n    if event.type == pygame.MOUSEBUTTONDOWN:\n\
    \        ship.fire_bullet()\n```\n\n# Finding the mouse position\n\nThe mouse\
    \ position is returned as a tuple.\n\n```\nmouse_pos = pygame.mouse.get_pos()\n\
    ```\n\n# Clicking a button\n\nYou might want to know if the cursor is over an\
    \ object such as a button. The rect.collidepoint() method returns True when a\
    \ point overlaps a rect object.\n\n```\nif button_rect.collidepoint(mouse_pos):\n\
    \    start_game()\n```\n\n# Hiding the mouse\n\n```\npygame.mouse.set_visible(False)\n\
    ```\n\n# Pygame groups\n\nPygame has a Group class which makes working with a\
    \ group of similar objects easier. A group is like a list, with some extra functionality\
    \ that's helpful when building games.\n\n# Making and filling a group\n\nAn object\
    \ that will be placed in a group must inherit from Sprite.\n\n```\nfrom pygame.sprite\
    \ import Sprite, Group\n\nclass Bullet(Sprite):\n    ...\n    def draw_bullet(self):\n\
    \        ...\n    def update(self):\n        ...\n\nbullets = Group()\n\nnew_bullet\
    \ = Bullet()\nbullets.add(new_bullet)\n```\n\n# Looping through the items in a\
    \ group\n\nThe sprites() method returns all the members of a group.\n\n```\nfor\
    \ bullet in bullets.sprites():\n    bullet.draw_bullet()\n```\n\n# Calling update()\
    \ on a group\n\nCalling update() on a group automatically calls update() on each\
    \ member of the group.\n\n```\nbullets.update()\n```\n\n# Pygame groups (cont.)\n\
    \n# Removing an item from a group\n\nIt's important to delete elements that will\
    \ never appear again in the game, so you don't waste memory and resources.\n\n\
    ```\nbullets.remove(bullet)\n```\n\n# Detecting collisions\n\nYou can detect when\
    \ a single object collides with any member of a group. You can also detect when\
    \ any member of one group collides with a member of another group.\n\n# Collisions\
    \ between a single object and a group\n\nThe spritecollideany() function takes\
    \ an object and a group, and returns True if the object overlaps with any member\
    \ of the group.\n\n```\nif pygame.sprite.spritecollideany(ship, aliens):\n   \
    \ ships_left -= 1\n```\n\n# Collisions between two groups\n\nThe sprite.groupcollide()\
    \ function takes two groups, and two booleans. The function returns a dictionary\
    \ containing information about the members that have collided. The booleans tell\
    \ Pygame whether to delete the members of either group that have collided.\n\n\
    ```\ncollisions = pygame.sprite.groupcollide(\n    bullets, aliens, True, True)\n\
    \nscore += len(collisions) * alien_point_value\n```\n\n# Rendering text\n\nYou\
    \ can use text for a variety of purposes in a game. For example you can share\
    \ information with players, and you can display a score.\n\n# Displaying a message\n\
    \nThe following code defines a message, then a color for the text and the background\
    \ color for the message. A font is defined using the default system font, with\
    \ a font size of 48. The font.render() function is used to create an image of\
    \ the message, and we get the rect object associated with the image. We then center\
    \ the image on the screen and display it.\n\n```\nmsg = \"Play again?\"\nmsg_color\
    \ = (100, 100, 100)\nbg_color = (230, 230, 230)\n\nf = pygame.font.SysFont(None,\
    \ 48)\nmsg_image = f.render(msg, True, msg_color,\n    bg_color)\nmsg_image_rect\
    \ = msg_image.get_rect()\nmsg_image_rect.center = screen_rect.center\nscreen.blit(msg_image,\
    \ msg_image_rect)\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
