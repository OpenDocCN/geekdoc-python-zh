  md: "# Beginner's Python Cheat Sheet - Testing Your Code\n\n# Why test your code?\n\
    \nWhen you write a function or a class, you can also write tests for that code.\
    \ Testing proves that your code works as it's supposed to in the situations it's\
    \ designed to handle, and also when people use your programs in unexpected ways.\
    \ Writing tests gives you confidence that your code will work correctly as more\
    \ people begin to use your programs. You can also add new features to your programs\
    \ and know whether or not you've broken existing behavior by running your tests.\n\
    \nA unit test verifies that one specific aspect of your code works as it's supposed\
    \ to. A test case is a collection of unit tests which verify that your code's\
    \ behavior is correct in a wide variety of situations.\n\n# Testing a function:\
    \ a passing test\n\nPython's unittest module provides tools for testing your code.\
    \ To try it out, we'll create a function that returns a full name. We'll use the\
    \ function in a regular program, and then build a test case for the function.\n\
    \n# A function to test\n\nSave this as full_names.py\n\n```\ndef get_full_name(first,\
    \ last):\n    \"\"\"Return a full name.\"\"\"\n    full_name = f\"{first} {last}\"\
    \n    return full_name.title()\n```\n\n# Using the function\n\nSave this as names.py\n\
    \n```\nfrom full_names import get_full_name\n\njanis = get_full_name('janis',\
    \ 'joplin')\nprint(janis)\n\nbob = get_full_name('bob', 'dylan')\nprint(bob)\n\
    ```\n\n# Testing a function (cont.)\n\n# Building a testcase with one unit test\n\
    \nTo build a test case, make a class that inherits from unittest.TestCase and\
    \ write methods that begin with test_. Save this as test_full_names.py\n\n```\n\
    import unittest\nfrom full_names import get_full_name\n\nclass NamesTestCase(unittest.TestCase):\n\
    \    \"\"\"Tests for names.py.\"\"\"\n\n    def test_first_last(self):\n     \
    \   \"\"\"Test names like Janis Joplin.\"\"\"\n        full_name = get_full_name('janis',\
    \ 'joplin')\n        self.assertEqual(full_name, 'Janis Joplin')\n\nif __name__\
    \ == '__main__':\n    unittest.main()\n```\n\n# Running the test\n\nPython reports\
    \ on each unit test in the test case. The dot represents a single passing test.\
    \ Python informs us that it ran 1 test in less than 0.001 seconds, and the OK\
    \ lets us know that all unit tests in the test case passed.\n\n```\n.\n----------------------------------------------\n\
    Ran 1 test in 0.000s\n\nOK\n```\n\n# Testing a function: A failing test\n\nFailing\
    \ tests are important; they tell you that a change in the code has affected existing\
    \ behavior. When a test fails, you need to modify the code so the existing behavior\
    \ still works.\n\n# Modifying the function\n\nWe'll modify get_full_name() so\
    \ it handles middle names, but we'll do it in a way that breaks existing behavior.\n\
    \n```\ndef get_full_name(first, middle, last):\n    \"\"\"Return a full name.\"\
    \"\"\n    full_name = f\"{first} {middle} {last}\"\n    return full_name.title()\n\
    ```\n\n# Using the function\n\n```\nfrom full_names import get_full_name\n\njohn\
    \ = get_full_name('john', 'lee', 'hooker')\nprint(john)\n\ndavid = get_full_name('david',\
    \ 'lee', 'roth')\nprint(david)\n```\n\n# A failing test (cont.)\n\n# Running the\
    \ test\n\nWhen you change your code, it's important to run your existing tests.\
    \ This will tell you whether the changes you made affected existing behavior.\n\
    \n```\nE\n=============================================\nERROR: test_first_last\
    \ (__main__.NamesTestCase)\nTest names like Janis Joplin.\n---------------------------------------------\n\
    Traceback (most recent call last):\n  File \"test_full_names.py\", line 10, in\
    \ test_first_last\n    'joplin')\nTypeError: get_full_name() missing 1 required\
    \ positional argument: 'last'\n\n---------------------------------------------\n\
    Ran 1 test in 0.001s\n\nFAILED (errors=1)\n```\n\n# Fixing the code\n\nWhen a\
    \ test fails, the code needs to be modified until the test passes again. Don't\
    \ make the mistake of rewriting your tests to fit your new code, otherwise your\
    \ code will break for anyone who's using it the same way it's being used in the\
    \ failing test. Here we can make the middle name optional.\n\n```\ndef get_full_name(first,\
    \ last, middle=''):\n    \"\"\"Return a full name.\"\"\"\n    if middle:\n   \
    \     full_name = f\"{first} {middle} {last}\"\n    else:\n        full_name =\
    \ f\"{first} {last}\"\n    return full_name.title()\n```\n\n# Running the test\n\
    \nNow the test should pass again, which means our original functionality is still\
    \ intact.\n\n```\n.\n----------------------------------------------\nRan 1 test\
    \ in 0.000s\n\nOK\n```\n\n# Python Crash Course\n\nA Hands-on, Project-Based Introduction\
    \ to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_14_0.png)"
