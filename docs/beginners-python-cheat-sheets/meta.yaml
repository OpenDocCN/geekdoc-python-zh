  - "[PAGE 26]\n\n# Beginner's Python Cheat Sheet - Git\n\n# Version Control\n\nVersion\
    \ control software allows you to take snapshots of a project whenever it's in\
    \ a working state. If your project stops working, you can roll back to the most\
    \ recent working version of the project.\n\nVersion control is important because\
    \ it frees you to try new ideas with your code, without worrying that you'll break\
    \ your overall project. A distributed version control system like Git is also\
    \ really useful in working collaboratively with other developers.\n\n# Installing\
    \ Git\n\nYou can find an installer for your system at git-scm.com/. Before doing\
    \ that, check if Git is already on your system:\n\n```\n$ git --version\ngit version\
    \ 2.20.1 (Apple Git-117)\n```\n\n# Configuring Git\n\nYou can configure Git so\
    \ some of its features are easier to use. The editor setting controls which editor\
    \ Git will open when it needs you to enter text.\n\nSee all global settings\n\n\
    ```\n$ git config --list\n```\n\nSet username\n\n```\n$ git config --global user.name\
    \ \"eric\"\n```\n\nSet email\n\n```\n$ git config --global user.email\n    \"\
    eric@example.com\"\n```\n\nSet editor\n\n```\n$ git config --global core.editor\
    \ \"nano\"\n```\n\n# Ignoring files\n\nTo ignore files make a file called \".gitignore\"\
    , with a leading dot and no extension. Then list the directories and files you\
    \ want to ignore.\n\nIgnore directories\n\n```\n__pycache__/\nmy_venv/\n```\n\n\
    # Ignoring files (cont.)\n\nIgnore specific files\n\n```\n.DS_Store\nsecret_key.txt\n\
    ```\n\nIgnore files with specific extensions\n\n```\n*.pyc\n```\n\n# Initializing\
    \ a repository\n\nAll the files Git uses to manage the repository are located\
    \ in the hidden directory .git. Don't delete that directory, or you'll lose your\
    \ project's history.\n\nInitialize a repository\n\n```\n$ git init\nInitialized\
    \ empty Git repository in\n    my_project/.git/\n```\n\n# Checking the status\n\
    \nIt's important to check the status of your project often, even before the first\
    \ commit. This will tell you which files Git is planning to track.\n\nCheck status\n\
    \n```\n$ git status\nOn branch main\nNo commits yet\nUntracked files:\n    .gitignore\n\
    \    hello.py\n    ...\n```\n\n# Adding files\n\nYou'll need to add the files\
    \ you want Git to keep track of.\n\nAdd all files not in .gitignore\n\n```\n$\
    \ git add .\n```\n\nAdd a single file\n\n```\n$ git add hello.py\n```\n\n# Making\
    \ a commit\n\nWhen making a commit, the -am flag commits all files that have been\
    \ added, and records a commit message. (It's a good idea to check the status before\
    \ making each commit.)\n\nMake a commit with a message\n\n```\n$ git commit -am\
    \ \"Started project, everything\n    works.\"\n2 files changed, 8 insertions(+)\n\
    create mode 100644 .gitignore\n```\n\n# Checking the log\n\nGit logs all the commits\
    \ you've made. Checking the log is helpful for understanding the history of your\
    \ project.\n\nCheck log in default format\n\n```\n$ git log\ncommit 7c0a5d8...\
    \ (HEAD -> main)\nAuthor: Eric Matthes <eric@example.com>\nDate:   Mon Feb 15\
    \ 08:40:21 2021 -0900\n    Greets user.\ncommit b9aedbb...\n...\n```\n\nCheck\
    \ log in simpler format\n\n```\n$ git log --oneline\n7c0a5d8 (HEAD -> main) Greets\
    \ user.\nb9aedbb Started project, everything works.\n```\n\n# Exploring history\n\
    \nYou can explore a project's history by visiting specific commit hashes, or by\
    \ referencing the project's HEAD. HEAD refers to the most recent commit of the\
    \ current branch.\n\nVisit a specific commit\n\n```\n$ git checkout b9aedbb\n\
    ```\n\nReturn to most recent commit of main branch\n\n```\n$ git checkout main\n\
    ```\n\nVisit the previous commit\n\n```\n$ git checkout HEAD^\n```\n\nVisit an\
    \ earlier commit\n\n```\n$ git checkout HEAD^^^\n```\n\nVisit the previous commit\n\
    \n```\n$ git checkout HEAD~1\n```\n\nVisit an earlier commit\n\n```\n$ git checkout\
    \ HEAD~3\n```\n\n# Learning more\n\nYou can learn more about using Git with the\
    \ command git help. You can also go to Stack Overflow and search for git, and\
    \ then sort the questions by number of votes.\n\n# Python Crash Course\n\nA Hands-on,\
    \ Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_26_0.png)"
  - "[PAGE 27]\n\n# Branching\n\nWhen the work you're about to do will involve multiple\
    \ commits, you can create a branch where you'll do this work. The changes you\
    \ make will be kept away from your main branch until you choose to merge them.\
    \ It's common to delete a branch after merging back to the main branch. Branches\
    \ can also be used to maintain independent releases of a project.\n\n# Make a\
    \ new branch and switch to it\n\n```\n$ git checkout -b new_branch_name\nSwitched\
    \ to a new branch 'new_branch_name'\n```\n\n# See all branches\n\n```\n$ git branch\n\
    * new_branch_name\n  main\n```\n\n# Switch to a different branch\n\n```\n$ git\
    \ checkout main\nSwitched to branch 'main'\n```\n\n# Merge changes\n\n```\n$ git\
    \ merge new_branch_name\nUpdating b9aedbb..5e5130a\nFast-forward\n hello.py |\
    \ 5 +++++\n 1 file changed, 5 insertions(+)\n```\n\n# Delete a branch\n\n```\n\
    $ git branch -D new_branch_name\nDeleted branch new_branch_name (was 5e5130a).\n\
    ```\n\n# Move last commit to new branch\n\n```\n$ git branch new_branch_name\n\
    $ git reset --hard HEAD~1\n$ git checkout new_branch_name\n```\n\n# Undoing recent\
    \ changes\n\nOne of the main points of version control is to allow you to go back\
    \ to any working state of your project and start over from there.\n\n# Get rid\
    \ of all uncommitted changes\n\n```\n$ git checkout .\n```\n\n# Get rid of all\
    \ changes since a specific commit\n\n```\n$ git reset --hard b9aedbb\n```\n\n\
    # Create new branch starting at a previous commit\n\n```\n$ git checkout -b branch_name\
    \ b9aedbb\n```\n\n# Stashing changes\n\nIf you want to save some changes without\
    \ making a commit, you can stash your changes. This is useful when you want to\
    \ revisit the most recent commit without making a new commit. You can stash as\
    \ many sets of changes as you need.\n\n# Stash changes since last commit\n\n```\n\
    $ git stash\nSaved working directory and index state\n      WIP on main: f6f39a6...\n\
    ```\n\n# See stashed changes\n\n```\n$ git stash list\nstash@{0}: WIP on main:\
    \ f6f39a6...\nstash@{1}: WIP on main: f6f39a6...\n...\n```\n\n# Reapply changes\
    \ from most recent stash\n\n```\n$ git stash pop\n```\n\n# Reapply changes from\
    \ a specific stash\n\n```\n$ git stash pop --index 1\n```\n\n# Clear all stashed\
    \ changes\n\n```\n$ git stash clear\n```\n\n# Comparing commits\n\nIt's often\
    \ helpful to compare changes across different states of a project.\n\n# See all\
    \ changes since last commit\n\n```\n$ git diff\n```\n\n# See changes in one file\
    \ since last commit\n\n```\n$ git diff hello.py\n```\n\n# See changes since a\
    \ specific commit\n\n```\n$ git diff HEAD~2\n$ git diff HEAD^^\n$ git diff fab2cdd\n\
    ```\n\n# See changes between two commits\n\n```\n$ git diff fab2cdd 7c0a5d8\n\
    ```\n\n# See changes in one file between two commits\n\n```\n$ git diff fab2cdd\
    \ 7c0a5d8 hello.py\n```\n\n# Good commit habits\n\nTry to make a commit whenever\
    \ your project is in a new working state. Make sure you're writing concise commit\
    \ messages that focus on what changes have been implemented. If you're starting\
    \ work on a new feature or bugfix, consider making a new branch.\n\n# Git & GitHub\n\
    \nGitHub is a platform for sharing code, and working collaboratively on code.\
    \ You can clone any public project on GitHub. When you have an account, you can\
    \ upload your own projects, and make them public or private.\n\n# Clone an existing\
    \ repository to your local system\n\n```\n$ git clone\n      https://github.com/ehmatthes/pcc_2e.git/\n\
    Cloning into 'pcc_2e'...\n...\nResolving deltas: 100% (816/816), done.\n```\n\n\
    # Push a local project to a GitHub repository\n\nYou'll need to make an empty\
    \ repository on GitHub first.\n\n```\n$ git remote add origin\n      https://github.com/username/hello_repo.git\n\
    $ git push -u origin main\nEnumerating objects: 10, done.\n...\nTo https://github.com/username/hello_repo.git\n\
    \ * [new branch]      main -> main\nBranch 'main' set up to track remote branch\n\
    \      'main' from 'origin'.\n```\n\n# Push recent changes to your GitHub repository\n\
    \n```\n$ git push origin branch_name\n```\n\n# Using pull requests\n\nWhen you\
    \ want to pull a set of changes from one branch into the main branch of a project\
    \ on GitHub, you can make a pull request. To practice making pull requests on\
    \ your own repositories, make a new branch for your work. When you're finished\
    \ the work, push the branch to your repository. Then go to the \"Pull requests\"\
    \ tab on GitHub, and click \"Compare & pull request\" on the branch you wish to\
    \ merge. When you're ready, click \"Merge pull request\". You can then pull these\
    \ changes back into your local main branch with git pull origin main. This is\
    \ an alternative to merging changes to your main branch locally, and then pushing\
    \ the main branch to GitHub.\n\n# Practicing with Git\n\nGit can be used in simple\
    \ ways as a solo developer, and complex ways as part of a large collaborative\
    \ team. You can gain valuable experience by making a simple throwaway project\
    \ and trying all of these steps with that project. Make sure your project has\
    \ multiple files and nested folders to get a clear sense of how Git works.\n\n\
    More cheat sheets available at ehmatthes.github.io/pcc_2e/"
