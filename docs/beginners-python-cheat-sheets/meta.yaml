  md: "# Passing a list to a function\n\nYou can pass a list as an argument to a function,\
    \ and the function can work with the values in the list. Any changes the function\
    \ makes to the list will affect the original list. You can prevent a function\
    \ from modifying a list by passing a copy of the list as an argument.\n\n# Passing\
    \ a list as an argument\n\n```\ndef greet_users(names):\n    \"\"\"Print a simple\
    \ greeting to everyone.\"\"\"\n    for name in names:\n        msg = f\"Hello,\
    \ {name}!\"\n        print(msg)\n\nusernames = ['hannah', 'ty', 'margot']\ngreet_users(usernames)\n\
    ```\n\n# Allowing a function to modify a list\n\nThe following example sends a\
    \ list of models to a function for printing. The first list is emptied, and the\
    \ second list is filled.\n\n```\ndef print_models(unprinted, printed):\n    \"\
    \"\"3d print a set of models.\"\"\"\n    while unprinted:\n        current_model\
    \ = unprinted.pop()\n        print(f\"Printing {current_model}\")\n        printed.append(current_model)\n\
    \n# Store some unprinted designs,\n#   and print each of them.\nunprinted = ['phone\
    \ case', 'pendant', 'ring']\nprinted = []\nprint_models(unprinted, printed)\n\n\
    print(f\"\\nUnprinted: {unprinted}\")\nprint(f\"Printed: {printed}\")\n```\n\n\
    # Preventing a function from modifying a list\n\nThe following example is the\
    \ same as the previous one, except the original list is unchanged after calling\
    \ print_models().\n\n```\ndef print_models(unprinted, printed):\n    \"\"\"3d\
    \ print a set of models.\"\"\"\n    while unprinted:\n        current_model =\
    \ unprinted.pop()\n        print(f\"Printing {current_model}\")\n        printed.append(current_model)\n\
    \n# Store some unprinted designs,\n#   and print each of them.\noriginal = ['phone\
    \ case', 'pendant', 'ring']\nprinted = []\n\nprint_models(original[:], printed)\n\
    print(f\"\\nOriginal: {original}\")\nprint(f\"Printed: {printed}\")\n```\n\n#\
    \ Passing an arbitrary number of arguments\n\nSometimes you won't know how many\
    \ arguments a function will need to accept. Python allows you to collect an arbitrary\
    \ number of arguments into one parameter using the * operator. A parameter that\
    \ accepts an arbitrary number of arguments must come last in the function definition.\
    \ This parameter is often named *args.\nThe ** operator allows a parameter to\
    \ collect an arbitrary number of keyword arguments. These are stored as a dictionary\
    \ with the parameter names as keys, and the arguments as values. This is often\
    \ named **kwargs.\n\n# Collecting an arbitrary number of arguments\n\n```\ndef\
    \ make_pizza(size, *toppings):\n    \"\"\"Make a pizza.\"\"\"\n    print(f\"\\\
    nMaking a {size} pizza.\")\n    print(\"Toppings:\")\n    for topping in toppings:\n\
    \        print(f\"- {topping}\")\n\n# Make three pizzas with different toppings.\n\
    make_pizza('small', 'pepperoni')\nmake_pizza('large', 'bacon bits', 'pineapple')\n\
    make_pizza('medium', 'mushrooms', 'peppers',\n           'onions', 'extra cheese')\n\
    ```\n\n# Collecting an arbitrary number of keyword arguments\n\n```\ndef build_profile(first,\
    \ last, **user_info):\n    \"\"\"Build a dictionary for a user.\"\"\"\n    user_info['first']\
    \ = first\n    user_info['last'] = last\n    return user_info\n\n# Create two\
    \ users with different kinds\n#   of information.\nuser_0 = build_profile('albert',\
    \ 'einstein',\n                       location='princeton')\nuser_1 = build_profile('marie',\
    \ 'curie',\n                       location='paris', field='chemistry')\n\nprint(user_0)\n\
    print(user_1)\n```\n\n# What's the best way to structure a function?\n\nThere\
    \ are many ways to write and call a function. When you're starting out, aim for\
    \ something that simply works. As you gain experience you'll develop an understanding\
    \ of the subtle advantages of different structures such as positional and keyword\
    \ arguments, and the various approaches to importing functions. For now if your\
    \ functions do what you need them to, you're doing well.\n\n# Modules\n\nYou can\
    \ store your functions in a separate file called a module, and then import the\
    \ functions you need into the file containing your main program. This allows for\
    \ cleaner program files. Make sure your module is stored in the same directory\
    \ as your main program.\n\n# Storing a function in a module\n\nFile: pizza.py\n\
    \n```\ndef make_pizza(size, *toppings):\n    \"\"\"Make a pizza.\"\"\"\n    print(f\"\
    \\nMaking a {size} pizza.\")\n    print(\"Toppings:\")\n    for topping in toppings:\n\
    \        print(f\"- {topping}\")\n```\n\n# Importing an entire module\n\nFile:\
    \ making_pizzas.py Every function in the module is available in the program file.\n\
    \n```\nimport pizza\n\npizza.make_pizza('medium', 'pepperoni')\npizza.make_pizza('small',\
    \ 'bacon', 'pineapple')\n```\n\n# Importing a specific function\n\nOnly the imported\
    \ functions are available in the program file.\n\n```\nfrom pizza import make_pizza\n\
    \nmake_pizza('medium', 'pepperoni')\nmake_pizza('small', 'bacon', 'pineapple')\n\
    ```\n\n# Giving a module an alias\n\n```\nimport pizza as p\n\np.make_pizza('medium',\
    \ 'pepperoni')\np.make_pizza('small', 'bacon', 'pineapple')\n```\n\n# Giving a\
    \ function an alias\n\n```\nfrom pizza import make_pizza as mp\n\nmp('medium',\
    \ 'pepperoni')\nmp('small', 'bacon', 'pineapple')\n```\n\n# Importing all functions\
    \ from a module\n\nDon't do this, but recognize it when you see it in others'\
    \ code. It can result in naming conflicts, which can cause errors.\n\n```\nfrom\
    \ pizza import *\n\nmake_pizza('medium', 'pepperoni')\nmake_pizza('small', 'bacon',\
    \ 'pineapple')\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
