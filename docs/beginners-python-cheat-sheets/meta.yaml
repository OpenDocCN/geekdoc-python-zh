    \ it. List comprehensions may look complicated at first; if so, use the for loop\
    \ approach until you're ready to start using comprehensions.\n\nTo write a comprehension,\
    \ define an expression for the values you want to store in the list. Then write\
    \ a for loop to generate input values needed to make the list.\n\nUsing a loop\
    \ to generate a list of square numbers\n\n```\nsquares = []\nfor x in range(1,\
    \ 11):\n    square = x**2\n    squares.append(square)\n```\n\nUsing a comprehension\
    \ to generate a list of square numbers\n\n```\nsquares = [x**2 for x in range(1,\
    \ 11)]\n```\n\nUsing a loop to convert a list of names to upper case\n\n```\n\
    names = ['kai', 'abe', 'ada', 'gus', 'zoe']\n\nupper_names = []\nfor name in names:\n\
    \    upper_names.append(name.upper())\n```\n\nUsing a comprehension to convert\
    \ a list of names to upper case\n\n```\nnames = ['kai', 'abe', 'ada', 'gus', 'zoe']\n\
    \nupper_names = [name.upper() for name in names]\n```\n\n# Styling your code\n\
    \nReadability counts\n\nFollow common Python formatting conventions:\n• Use four\
    \ spaces per indentation level.\n• Keep your lines to 79 characters or fewer.\n\
    • Use single blank lines to group parts of your program visually.\n\n# Tuples\n\
    \nA tuple is like a list, except you can't change the values in a tuple once it's\
    \ defined. Tuples are good for storing information that shouldn't be changed throughout\
    \ the life of a program. Tuples are usually designated by parentheses.\n\nYou\
    \ can overwrite an entire tuple, but you can't change the values of individual\
    \ elements.\n\nDefining a tuple\n\n```\ndimensions = (800, 600)\n```\n\nLooping\
    \ through a tuple\n\n```\nfor dimension in dimensions:\n    print(dimension)\n\
    ```\n\nOverwriting a tuple\n\n```\ndimensions = (800, 600)\nprint(dimensions)\n\
    \ndimensions = (1200, 900)\nprint(dimensions)\n```\n\n# Visualizing your code\n\
    \nWhen you're first learning about data structures such as lists, it helps to\
    \ visualize how Python is working with the information in your program. Python\
    \ Tutor is a great tool for seeing how Python keeps track of the information in\
    \ a list. Try running the following code on pythontutor.com, and then run your\
    \ own code.\n\nBuild a list and print the items in the list\n\n```\ndogs = []\n\
    dogs.append('willie')\ndogs.append('hootz')\ndogs.append('peso')\ndogs.append('goblin')\n\
    \nfor dog in dogs:\n    print(f\"Hello {dog}!\")\nprint(\"I love these dogs!\"\
    )\n\nprint(\"\\nThese were my first two dogs:\")\nold_dogs = dogs[:2]\nfor old_dog\
    \ in old_dogs:\n    print(old_dog)\n\ndel dogs[0]\ndogs.remove('peso')\nprint(dogs)\n\
    ```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
  - "[PAGE 4]\n\n# Beginner's Python Cheat Sheet - Dictionaries\n\n# What are dictionaries?\n\
    \nPython's dictionaries allow you to connect pieces of related information. Each\
    \ piece of information in a dictionary is stored as a key-value pair. When you\
    \ provide a key, Python returns the value associated with that key. You can loop\
    \ through all the key-value pairs, all the keys, or all the values.\n\n# Defining\
    \ a dictionary\n\nUse curly braces to define a dictionary. Use colons to connect\
    \ keys and values, and use commas to separate individual key-value pairs.\n\n\
    # Making a dictionary\n\n```\nalien_0 = {'color': 'green', 'points': 5}\n```\n\
    \n# Accessing values\n\nTo access the value associated with an individual key\
    \ give the name of the dictionary and then place the key in a set of square brackets.\
    \ If the key you provided is not in the dictionary, an error will occur.\nYou\
    \ can also use the get() method, which returns None instead of an error if the\
    \ key doesn't exist. You can also specify a default value to use if the key is\
    \ not in the dictionary.\n\n# Getting the value associated with a key\n\n```\n\
    alien_0 = {'color': 'green', 'points': 5}\n\nprint(alien_0['color'])\nprint(alien_0['points'])\n\
    ```\n\n# Getting the value with get()\n\n```\nalien_0 = {'color': 'green'}\n\n\
    alien_color = alien_0.get('color')\nalien_points = alien_0.get('points', 0)\n\
    alien_speed = alien_0.get('speed')\n\nprint(alien_color)\nprint(alien_points)\n\
    print(alien_speed)\n```\n\n# Adding new key-value pairs\n\nYou can store as many\
    \ key-value pairs as you want in a dictionary, until your computer runs out of\
    \ memory. To add a new key-value pair to an existing dictionary give the name\
    \ of the dictionary and the new key in square brackets, and set it equal to the\
    \ new value.\nThis also allows you to start with an empty dictionary and add key-value\
    \ pairs as they become relevant.\n\n# Adding a key-value pair\n\n```\nalien_0\
    \ = {'color': 'green', 'points': 5}\n\nalien_0['x'] = 0\nalien_0['y'] = 25\nalien_0['speed']\
    \ = 1.5\n```\n\n# Starting with an empty dictionary\n\n```\nalien_0 = {}\nalien_0['color']\
    \ = 'green'\nalien_0['points'] = 5\n```\n\n# Modifying values\n\nYou can modify\
    \ the value associated with any key in a dictionary. To do so give the name of\
    \ the dictionary and the key in square brackets, then provide the new value for\
    \ that key.\n\n# Modifying values in a dictionary\n\n```\nalien_0 = {'color':\
    \ 'green', 'points': 5}\nprint(alien_0)\n\n# Change the alien's color and point\
    \ value.\nalien_0['color'] = 'yellow'\nalien_0['points'] = 10\nprint(alien_0)\n\
    ```\n\n# Removing key-value pairs\n\nYou can remove any key-value pair you want\
    \ from a dictionary. To do so use the del keyword and the dictionary name, followed\
    \ by the key in square brackets. This will delete the key and its associated value.\n\
    \n# Deleting a key-value pair\n\n```\nalien_0 = {'color': 'green', 'points': 5}\n\
    print(alien_0)\n\ndel alien_0['points']\nprint(alien_0)\n```\n\n# Visualizing\
    \ dictionaries\n\nTry running some of these examples on pythontutor.com, and then\
    \ run one of your own programs that uses dictionaries.\n\n# Looping through a\
    \ dictionary\n\nYou can loop through a dictionary in three ways: you can loop\
    \ through all the key-value pairs, all the keys, or all the values.\nDictionaries\
    \ keep track of the order in which key-value pairs are added. If you want to process\
    \ the information in a different order, you can sort the keys in your loop, using\
    \ the sorted() function.\n\n# Looping through all key-value pairs\n\n```\n# Store\
    \ people's favorite languages.\nfav_languages = {\n    'jen': 'python',\n    'sarah':\
    \ 'c',\n    'edward': 'ruby',\n    'phil': 'python',\n    }\n\n# Show each person's\
    \ favorite language.\nfor name, language in fav_languages.items():\n    print(f\"\
    {name}: {language}\")\n```\n\n# Looping through all the keys\n\n```\n# Show everyone\
    \ who's taken the survey.\nfor name in fav_languages.keys():\n    print(name)\n\
    ```\n\n# Looping through all the values\n\n```\n# Show all the languages that\
    \ have been chosen.\nfor language in fav_languages.values():\n    print(language)\n\
    ```\n\n# Looping through all the keys in reverse order\n\n```\n# Show each person's\
    \ favorite language,\n#   in reverse order by the person's name.\nfor name in\
    \ sorted(fav_languages.keys(),\n                   reverse=True):\n    language\
    \ = fav_languages[name]\n    print(f\"{name}: {language}\")\n```\n\n# Dictionary\
    \ length\n\nYou can find the number of key-value pairs in a dictionary using the\
    \ len() function.\n\n# Finding a dictionary's length\n\n```\nnum_responses = len(fav_languages)\n\
    ```\n\n# Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_4_0.png)"
- md: "## Nesting - A list of dictionaries\n\nIt's sometimes useful to store a number\
    \ of dictionaries in a list; this is called nesting.\n\n### Storing dictionaries\
    \ in a list\n\n```python\n# Start with an empty list.\nusers = []\n\n# Make a\
    \ new user, and add them to the list.\nnew_user = {\n    'last': 'fermi',\n  \
    \  'first': 'enrico',\n    'username': 'efermi',\n    }\nusers.append(new_user)\n\
    \n# Make another new user, and add them as well.\nnew_user = {\n    'last': 'curie',\n\
    \    'first': 'marie',\n    'username': 'mcurie',\n    }\nusers.append(new_user)\n\
    \n# Show all information about each user.\nprint(\"User summary:\")\nfor user_dict\
    \ in users:\n    for k, v in user_dict.items():\n        print(f\"{k}: {v}\")\n\
    \    print(\"\\n\")\n```\n\nYou can also define a list of dictionaries directly,\
    \ without using append():\n\n```python\n# Define a list of users, where each user\n\
    #   is represented by a dictionary.\nusers = [\n    {\n        'last': 'fermi',\n\
    \        'first': 'enrico',\n        'username': 'efermi',\n    },\n    {\n  \
    \      'last': 'curie',\n        'first': 'marie',\n        'username': 'mcurie',\n\
    \    },\n]\n\n# Show all information about each user.\nprint(\"User summary:\"\
    )\nfor user_dict in users:\n    for k, v in user_dict.items():\n        print(f\"\
    {k}: {v}\")\n    print(\"\\n\")\n```\n\n## Nesting - Lists in a dictionary\n\n\
    Storing a list inside a dictionary allows you to associate more than one value\
    \ with each key.\n\n### Storing lists in a dictionary\n\n```python\n# Store multiple\
    \ languages for each person.\nfav_languages = {\n    'jen': ['python', 'ruby'],\n\
    \    'sarah': ['c'],\n    'edward': ['ruby', 'go'],\n    'phil': ['python', 'haskell'],\n\
    }\n\n# Show all responses for each person.\nfor name, langs in fav_languages.items():\n\
    \    print(f\"{name}: \")\n    for lang in langs:\n        print(f\"- {lang}\"\
    )\n```\n\n## Nesting - A dictionary of dictionaries\n\nYou can store a dictionary\
    \ inside another dictionary. In this case each value associated with a key is\
    \ itself a dictionary.\n\n### Storing dictionaries in a dictionary\n\n```python\n\
    users = {\n    'aeinstein': {\n        'first': 'albert',\n        'last': 'einstein',\n\
    \        'location': 'princeton',\n        },\n    'mcurie': {\n        'first':\
    \ 'marie',\n        'last': 'curie',\n        'location': 'paris',\n        },\n\
    \    }\n\nfor username, user_dict in users.items():\n    full_name = f\"{user_dict['first']}\
    \ \"\n    full_name += user_dict['last']\n\n    location = user_dict['location']\n\
    \n    print(\"\\nUsername: \" + username)\n    print(f\"\\tFull name: {full_name.title()}\"\
    )\n    print(f\"\\tLocation: {location.title()}\")\n```\n\n## Levels of nesting\n\
    \nNesting is extremely useful in certain situations. However, be aware of making\
    \ your code overly complex. If you're nesting items much deeper than what you\
    \ see here there are probably simpler ways of managing your data, such as using\
    \ classes.\n\n## Dictionary Comprehensions\n\nA comprehension is a compact way\
    \ of generating a dictionary, similar to a list comprehension. To make a dictionary\
    \ comprehension, define an expression for the key-value pairs you want to make.\
    \ Then write a for loop to generate the values that will feed into this expression.\n\
    \nThe zip() function matches each item in one list to each item in a second list.\
    \ It can be used to make a dictionary from two lists.\n\n### Using a loop to make\
    \ a dictionary\n\n```python\nsquares = {}\nfor x in range(5):\n    squares[x]\
    \ = x**2\n```\n\n### Using a dictionary comprehension\n\n```python\nsquares =\
    \ {x:x**2 for x in range(5)}\n```\n\n### Using zip() to make a dictionary\n\n\
    ```python\ngroup_1 = ['kai', 'abe', 'ada', 'gus', 'zoe']\ngroup_2 = ['jen', 'eva',\
    \ 'dan', 'isa', 'meg']\n\npairings = {name:name_2\n    for name, name_2 in zip(group_1,\
    \ group_2)}\n```\n\n## Generating a million dictionaries\n\nYou can use a loop\
    \ to generate a large number of dictionaries efficiently, if all the dictionaries\
    \ start out with similar data.\n\n### A million aliens\n\n```python\naliens =\
    \ []\n\n# Make a million green aliens, worth 5 points\n#   each. Have them all\
    \ start in one row.\nfor alien_num in range(1_000_000):\n    new_alien = {\n \
    \       'color': 'green',\n        'points': 5,\n        'x': 20 * alien_num,\n\
    \        'y': 0\n    }\n    aliens.append(new_alien)\n\n# Prove the list contains\
    \ a million aliens.\nnum_aliens = len(aliens)\n\nprint(\"Number of aliens created:\"\
    )\nprint(num_aliens)\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/\n\
    \n## Beginner's Python Cheat Sheet - If Statements and While Loops\n\n## What\
    \ are if statements? What are while loops?\n\nPython's if statements allow you\
    \ to examine the current state of a program and respond appropriately to that\
    \ state. You can write a simple if statement that checks one condition, or you\
    \ can create a complex series of statements that identify the exact conditions\
    \ you're interested in.\n\nWhile loops run as long as certain conditions remain\
    \ true. You can use while loops to let your programs run as long as your users\
    \ want them to.\n\n## Conditional Tests\n\nA conditional test is an expression\
    \ that can be evaluated as true or false. Python uses the values True and False\
    \ to decide whether the code in an if statement should be executed.\n\n### Checking\
    \ for equality\n\nA single equal sign assigns a value to a variable. A double\
    \ equal sign checks whether two values are equal.\n\nIf your conditional tests\
    \ aren't doing what you expect them to, make sure you're not accidentally using\
    \ a single equal sign.\n\n```python\n>>> car = 'bmw'\n>>> car == 'bmw'\nTrue\n\
    >>> car = 'audi'\n>>> car == 'bmw'\nFalse\n```\n\n### Ignoring case when making\
    \ a comparison\n\n```python\n>>> car = 'Audi'\n>>> car.lower() == 'audi'\nTrue\n\
    ```\n\n### Checking for inequality\n\n```python\n>>> topping = 'mushrooms'\n>>>\
    \ topping != 'anchovies'\nTrue\n```\n\n### Numerical comparisons\n\nTesting numerical\
    \ values is similar to testing string values.\n\n### Testing equality and inequality\n\
    \n```python\n>>> age = 18\n>>> age == 18\nTrue\n>>> age != 18\nFalse\n```\n\n\
    ### Comparison operators\n\n```python\n>>> age = 19\n>>> age < 21\nTrue\n>>> age\
    \ <= 21\nTrue\n>>> age > 21\nFalse\n>>> age >= 21\nFalse\n```\n\n### Checking\
    \ multiple conditions\n\nYou can check multiple conditions at the same time. The\
    \ and operator returns True if all the conditions listed are true. The or operator\
    \ returns True if any condition is true.\n\n### Using and to check multiple conditions\n\
    \n```python\n>>> age_0 = 22\n>>> age_1 = 18\n>>> age_0 >= 21 and age_1 >= 21\n\
    False\n>>> age_1 = 23\n>>> age_0 >= 21 and age_1 >= 21\nTrue\n```\n\n### Using\
    \ or to check multiple conditions\n\n```python\n>>> age_0 = 22\n>>> age_1 = 18\n\
    >>> age_0 >= 21 or age_1 >= 21\nTrue\n>>> age_0 = 18\n>>> age_0 >= 21 or age_1\
    \ >= 21\nFalse\n```\n\n### Boolean values\n\nA boolean value is either True or\
    \ False. Variables with boolean values are often used to keep track of certain\
    \ conditions within a program.\n\n### Simple boolean values\n\n```python\ngame_active\
    \ = True\nis_valid = True\ncan_edit = False\n```\n\n## If statements\n\nSeveral\
    \ kinds of if statements exist. Your choice of which to use depends on the number\
    \ of conditions you need to test. You can have as many elif blocks as you need,\
    \ and the else block is always optional.\n\n### Simple if statement\n\n```python\n\
    age = 19\n\nif age >= 18:\n    print(\"You're old enough to vote!\")\n```\n\n\
    ### If-else statements\n\n```python\nage = 17\n\nif age >= 18:\n    print(\"You're\
    \ old enough to vote!\")\nelse:\n    print(\"You can't vote yet.\")\n```\n\n###\
    \ The if-elif-else chain\n\n```python\nage = 12\n\nif age < 4:\n    price = 0\n\
    elif age < 18:\n    price = 25\nelse:\n    price = 40\n\nprint(f\"Your cost is\
    \ ${price}.\")\n```\n\n### Conditional tests with lists\n\nYou can easily test\
    \ whether a certain value is in a list. You can also test whether a list is empty\
    \ before trying to loop through the list.\n\n### Testing if a value is in a list\n\
    \n```python\n>>> players = ['al', 'bea', 'cyn', 'dale']\n>>> 'al' in players\n\
    True\n>>> 'eric' in players\nFalse\n```\n\n### Testing if two values are in a\
    \ list\n\n```python\n>>> 'al' in players and 'cyn' in players\n```\n\n![Python\
    \ Crash Course](img/12320e46b546a2862f3a411be6db7a27_6_0.png)\n\nPython Crash\
    \ Course\nA Hands-on, Project-Based Introduction to Programming\nnostarch.com/pythoncrashcourse2e\n\
    \n## Conditional tests with lists (cont.)\n\n### Testing if a value is not in\
    \ a list\n\n```python\nbanned_users = ['ann', 'chad', 'dee']\nuser = 'erin'\n\n\
    if user not in banned_users:\n    print(\"You can play!\")\n```\n\n### Checking\
    \ if a list is empty\n\nAn empty list evaluates as False in an if statement.\n\
    \n```python\nplayers = []\n\nif players:\n    for player in players:\n       \
    \ print(f\"Player: {player.title()}\")\nelse:\n    print(\"We have no players\
    \ yet!\")\n```\n\n## Accepting input\n\nYou can allow your users to enter input\
    \ using the input() function. All input is initially stored as a string. If you\
    \ want to accept numerical input, you'll need to convert the input string value\
    \ to a numerical type.\n\n### Simple input\n\n```python\nname = input(\"What's\
    \ your name? \")\nprint(f\"Hello, {name}.\")\n```\n\n### Accepting numerical input\
    \ using int()\n\n```python\nage = input(\"How old are you? \")\nage = int(age)\n\
    \nif age >= 18:\n    print(\"\\nYou can vote!\")\nelse:\n    print(\"\\nSorry,\
    \ you can't vote yet.\")\n```\n\n### Accepting numerical input using float()\n\
    \n```python\ntip = input(\"How much do you want to tip? \")\ntip = float(tip)\n\
    print(f\"Tipped ${tip}.\")\n```\n\n## While loops\n\nA while loop repeats a block\
    \ of code as long as a condition is true.\n\n### Counting to 5\n\n```python\n\
    current_number = 1\n\nwhile current_number <= 5:\n    print(current_number)\n\
    \    current_number += 1\n```\n\n## While loops (cont.)\n\n### Letting the user\
    \ choose when to quit\n\n```python\nprompt = \"\\nTell me something, and I'll\
    \ \"\nprompt += \"repeat it back to you.\"\nprompt += \"\\nEnter 'quit' to end\
    \ the program. \"\n\nmessage = \"\"\nwhile message != 'quit':\n    message = input(prompt)\n\
    \n    if message != 'quit':\n        print(message)\n```\n\n### Using a flag\n\
    \nFlags are most useful in long-running programs where code from other parts of\
    \ the program might need to end the loop.\n\n```python\nprompt = \"\\nTell me\
    \ something, and I'll \"\nprompt += \"repeat it back to you.\"\nprompt += \"\\\
    nEnter 'quit' to end the program. \"\n\nactive = True\nwhile active:\n    message\
    \ = input(prompt)\n\n    if message == 'quit':\n        active = False\n    else:\n\
    \        print(message)\n```\n\n### Using break to exit a loop\n\n```python\n\
    prompt = \"\\nWhat cities have you visited?\"\nprompt += \"\\nEnter 'quit' when\
    \ you're done. \"\n\nwhile True:\n    city = input(prompt)\n\n    if city == 'quit':\n\
    \        break\n    else:\n        print(f\"I've been to {city}!\")\n```\n\n###\
    \ Accepting input with Sublime Text\n\nSublime Text, and a number of other text\
    \ editors can't run programs that prompt the user for input. You can use these\
    \ editors to write programs that prompt for input, but you'll need to run them\
    \ from a terminal.\n\n## Breaking out of loops\n\nYou can use the break statement\
    \ and the continue statement with any of Python's loops. For example you can use\
    \ break to quit a for loop that's working through a list or a dictionary. You\
    \ can use continue to skip over certain items when looping through a list or dictionary\
    \ as well.\n\n## While loops (cont.)\n\n### Using continue in a loop\n\n```python\n\
    banned_users = ['eve', 'fred', 'gary', 'helen']\n\nprompt = \"\\nAdd a player\
    \ to your team.\"\nprompt += \"\\nEnter 'quit' when you're done. \"\n\nplayers\
    \ = []\nwhile True:\n    player = input(prompt)\n\n    if player == 'quit':\n\
    \        break\n    elif player in banned_users:\n        print(f\"{player} is\
    \ banned!\")\n        continue\n    else:\n        players.append(player)\n\n\
    print(\"\\nYour team:\")\nfor player in players:\n    print(player)\n```\n\n##\
    \ Avoiding infinite loops\n\nEvery while loop needs a way to stop running so it\
    \ won't continue to run forever. If there's no way for the condition to become\
    \ false, the loop will never stop running. You can usually press Ctrl-C to stop\
    \ an infinite loop.\n\n### An infinite loop\n\n```python\nwhile True:\n    name\
    \ = input(\"\\nWho are you? \")\n    print(f\"Nice to meet you, {name}!\")\n```\n\
    \n## Removing all instances of a value from a list\n\nThe remove() method removes\
    \ a specific value from a list, but it only removes the first instance of the\
    \ value you provide. You can use a while loop to remove all instances of a particular\
    \ value.\n\n### Removing all cats from a list of pets\n\n```python\npets = ['dog',\
    \ 'cat', 'dog', 'fish', 'cat',\n        'rabbit', 'cat']\nprint(pets)\n\nwhile\
    \ 'cat' in pets:\n    pets.remove('cat')\n\nprint(pets)\n```\n\nMore cheat sheets\
    \ available at ehmatthes.github.io/pcc_2e/"
