  md: "# Beginner's Python Cheat Sheet - Functions\n\n# What are functions?\n\nFunctions\
    \ are named blocks of code designed to do one specific job. Functions allow you\
    \ to write code once that can then be run whenever you need to accomplish the\
    \ same task.\n\nFunctions can take in the information they need, and return the\
    \ information they generate. Using functions effectively makes your programs easier\
    \ to write, read, test, and fix.\n\n# Defining a function\n\nThe first line of\
    \ a function is its definition, marked by the keyword def. The name of the function\
    \ is followed by a set of parentheses and a colon. A docstring, in triple quotes,\
    \ describes what the function does. The body of a function is indented one level.\n\
    \nTo call a function, give the name of the function followed by a set of parentheses.\n\
    \n# Making a function\n\n```\ndef greet_user():\n    \"\"\"Display a simple greeting.\"\
    \"\"\n    print(\"Hello!\")\n\ngreet_user()\n```\n\n# Passing information to a\
    \ function\n\nInformation that's passed to a function is called an argument; information\
    \ that's received by a function is called a parameter. Arguments are included\
    \ in parentheses after the function's name, and parameters are listed in parentheses\
    \ in the function's definition.\n\n# Passing a simple argument\n\n```\ndef greet_user(username):\n\
    \    \"\"\"Display a simple greeting.\"\"\"\n    print(f\"Hello, {username}!\"\
    )\n\ngreet_user('jesse')\ngreet_user('diana')\ngreet_user('brandon')\n```\n\n\
    # Positional and keyword arguments\n\nThe two main kinds of arguments are positional\
    \ and keyword arguments. When you use positional arguments Python matches the\
    \ first argument in the function call with the first parameter in the function\
    \ definition, and so forth.\n\nWith keyword arguments, you specify which parameter\
    \ each argument should be assigned to in the function call. When you use keyword\
    \ arguments, the order of the arguments doesn't matter.\n\n# Using positional\
    \ arguments\n\n```\ndef describe_pet(animal, name):\n    \"\"\"Display information\
    \ about a pet.\"\"\"\n    print(f\"\\nI have a {animal}.\")\n    print(f\"Its\
    \ name is {name}.\")\n\ndescribe_pet('hamster', 'harry')\ndescribe_pet('dog',\
    \ 'willie')\n```\n\n# Using keyword arguments\n\n```\ndef describe_pet(animal,\
    \ name):\n    \"\"\"Display information about a pet.\"\"\"\n    print(f\"\\nI\
    \ have a {animal}.\")\n    print(f\"Its name is {name}.\")\n\ndescribe_pet(animal='hamster',\
    \ name='harry')\ndescribe_pet(name='willie', animal='dog')\n```\n\n# Default values\n\
    \nYou can provide a default value for a parameter. When function calls omit this\
    \ argument the default value will be used. Parameters with default values must\
    \ be listed after parameters without default values in the function's definition\
    \ so positional arguments can still work correctly.\n\n# Using a default value\n\
    \n```\ndef describe_pet(name, animal='dog'):\n    \"\"\"Display information about\
    \ a pet.\"\"\"\n    print(f\"\\nI have a {animal}.\")\n    print(f\"Its name is\
    \ {name}.\")\n\ndescribe_pet('harry', 'hamster')\ndescribe_pet('willie')\n```\n\
    \n# Using None to make an argument optional\n\n```\ndef describe_pet(animal, name=None):\n\
    \    \"\"\"Display information about a pet.\"\"\"\n    print(f\"\\nI have a {animal}.\"\
    )\n    if name:\n        print(f\"Its name is {name}.\")\n\ndescribe_pet('hamster',\
    \ 'harry')\ndescribe_pet('snake')\n```\n\n# Return values\n\nA function can return\
    \ a value or a set of values. When a function returns a value, the calling line\
    \ should provide a variable which the return value can be assigned to. A function\
    \ stops running when it reaches a return statement.\n\n# Returning a single value\n\
    \n```\ndef get_full_name(first, last):\n    \"\"\"Return a neatly formatted full\
    \ name.\"\"\"\n    full_name = f\"{first} {last}\"\n    return full_name.title()\n\
    \nmusician = get_full_name('jimi', 'hendrix')\nprint(musician)\n```\n\n# Returning\
    \ a dictionary\n\n```\ndef build_person(first, last):\n    \"\"\"Return a dictionary\
    \ of information\n    about a person.\n    \"\"\"\n    person = {'first': first,\
    \ 'last': last}\n    return person\n\nmusician = build_person('jimi', 'hendrix')\n\
    print(musician)\n```\n\n# Returning a dictionary with optional values\n\n```\n\
    def build_person(first, last, age=None):\n    \"\"\"Return a dictionary of information\n\
    \    about a person.\n    \"\"\"\n    person = {'first': first, 'last': last}\n\
    \    if age:\n        person['age'] = age\n\n    return person\n\nmusician = build_person('jimi',\
    \ 'hendrix', 27)\nprint(musician)\n\nmusician = build_person('janis', 'joplin')\n\
    print(musician)\n```\n\n# Visualizing functions\n\nTry running some of these examples,\
    \ and some of your own programs that use functions, on pythontutor.com.\n\n![](img/12320e46b546a2862f3a411be6db7a27_8_0.png)\n\
    \nPython Crash Course\nA Hands-on, Project-Based Introduction to Programming\n\
    nostarch.com/pythoncrashcourse2e"
