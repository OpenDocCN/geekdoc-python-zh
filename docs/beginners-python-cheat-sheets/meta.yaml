    \ a list is empty\nAn empty list evaluates as False in an if statement.\n\n```\n\
    players = []\n\nif players:\n    for player in players:\n        print(f\"Player:\
    \ {player.title()}\")\nelse:\n    print(\"We have no players yet!\")\n```\n\n\
    # Accepting input\n\nYou can allow your users to enter input using the input()\
    \ function. All input is initially stored as a string. If you want to accept numerical\
    \ input, you'll need to convert the input string value to a numerical type.\n\n\
    Simple input\n\n```\nname = input(\"What's your name? \")\nprint(f\"Hello, {name}.\"\
    )\n```\n\nAccepting numerical input using int()\n\n```\nage = input(\"How old\
    \ are you? \")\nage = int(age)\n\nif age >= 18:\n    print(\"\\nYou can vote!\"\
    )\nelse:\n    print(\"\\nSorry, you can't vote yet.\")\n```\n\nAccepting numerical\
    \ input using float()\n\n```\ntip = input(\"How much do you want to tip? \")\n\
    tip = float(tip)\nprint(f\"Tipped ${tip}.\")\n```\n\n# While loops\n\nA while\
    \ loop repeats a block of code as long as a condition is true.\n\nCounting to\
    \ 5\n\n```\ncurrent_number = 1\n\nwhile current_number <= 5:\n    print(current_number)\n\
    \    current_number += 1\n```\n\n# While loops (cont.)\n\nLetting the user choose\
    \ when to quit\n\n```\nprompt = \"\\nTell me something, and I'll \"\nprompt +=\
    \ \"repeat it back to you.\"\nprompt += \"\\nEnter 'quit' to end the program.\
    \ \"\n\nmessage = \"\"\nwhile message != 'quit':\n    message = input(prompt)\n\
    \n    if message != 'quit':\n        print(message)\n```\n\nUsing a flag\nFlags\
    \ are most useful in long-running programs where code from other parts of the\
    \ program might need to end the loop.\n\n```\nprompt = \"\\nTell me something,\
    \ and I'll \"\nprompt += \"repeat it back to you.\"\nprompt += \"\\nEnter 'quit'\
    \ to end the program. \"\n\nactive = True\nwhile active:\n    message = input(prompt)\n\
    \n    if message == 'quit':\n        active = False\n    else:\n        print(message)\n\
    ```\n\nUsing break to exit a loop\n\n```\nprompt = \"\\nWhat cities have you visited?\"\
    \nprompt += \"\\nEnter 'quit' when you're done. \"\n\nwhile True:\n    city =\
    \ input(prompt)\n\n    if city == 'quit':\n        break\n    else:\n        print(f\"\
    I've been to {city}!\")\n```\n\n# Accepting input with Sublime Text\n\nSublime\
    \ Text, and a number of other text editors can't run programs that prompt the\
    \ user for input. You can use these editors to write programs that prompt for\
    \ input, but you'll need to run them from a terminal.\n\n# Breaking out of loops\n\
    \nYou can use the break statement and the continue statement with any of Python's\
    \ loops. For example you can use break to quit a for loop that's working through\
    \ a list or a dictionary. You can use continue to skip over certain items when\
    \ looping through a list or dictionary as well.\n\n# While loops (cont.)\n\nUsing\
    \ continue in a loop\n\n```\nbanned_users = ['eve', 'fred', 'gary', 'helen']\n\
    \nprompt = \"\\nAdd a player to your team.\"\nprompt += \"\\nEnter 'quit' when\
    \ you're done. \"\n\nplayers = []\nwhile True:\n    player = input(prompt)\n\n\
    \    if player == 'quit':\n        break\n    elif player in banned_users:\n \
    \       print(f\"{player} is banned!\")\n        continue\n    else:\n       \
    \ players.append(player)\n\nprint(\"\\nYour team:\")\nfor player in players:\n\
    \    print(player)\n```\n\n# Avoiding infinite loops\n\nEvery while loop needs\
    \ a way to stop running so it won't continue to run forever. If there's no way\
    \ for the condition to become false, the loop will never stop running. You can\
    \ usually press Ctrl-C to stop an infinite loop.\n\nAn infinite loop\n\n```\n\
    while True:\n    name = input(\"\\nWho are you? \")\n    print(f\"Nice to meet\
    \ you, {name}!\")\n```\n\n# Removing all instances of a value from a list\n\n\
    The remove() method removes a specific value from a list, but it only removes\
    \ the first instance of the value you provide. You can use a while loop to remove\
    \ all instances of a particular value.\n\nRemoving all cats from a list of pets\n\
    \n```\npets = ['dog', 'cat', 'dog', 'fish', 'cat',\n        'rabbit', 'cat']\n\
    print(pets)\n\nwhile 'cat' in pets:\n    pets.remove('cat')\n\nprint(pets)\n```\n\
    \nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Functions\n\n## What are functions?\n\n\
    Functions are named blocks of code designed to do one specific job. Functions\
    \ allow you to write code once that can then be run whenever you need to accomplish\
    \ the same task.\n\nFunctions can take in the information they need, and return\
    \ the information they generate. Using functions effectively makes your programs\
    \ easier to write, read, test, and fix.\n\n## Defining a function\n\nThe first\
    \ line of a function is its definition, marked by the keyword `def`. The name\
    \ of the function is followed by a set of parentheses and a colon. A docstring,\
    \ in triple quotes, describes what the function does. The body of a function is\
    \ indented one level.\n\nTo call a function, give the name of the function followed\
    \ by a set of parentheses.\n\n## Making a function\n\n```python\ndef greet_user():\n\
    \    \"\"\"Display a simple greeting.\"\"\"\n    print(\"Hello!\")\n\ngreet_user()\n\
    ```\n\n## Passing information to a function\n\nInformation that's passed to a\
    \ function is called an argument; information that's received by a function is\
    \ called a parameter. Arguments are included in parentheses after the function's\
    \ name, and parameters are listed in parentheses in the function's definition.\n\
    \n## Passing a simple argument\n\n```python\ndef greet_user(username):\n    \"\
    \"\"Display a simple greeting.\"\"\"\n    print(f\"Hello, {username}!\")\n\ngreet_user('jesse')\n\
    greet_user('diana')\ngreet_user('brandon')\n```\n\n## Positional and keyword arguments\n\
    \nThe two main kinds of arguments are positional and keyword arguments. When you\
    \ use positional arguments Python matches the first argument in the function call\
    \ with the first parameter in the function definition, and so forth.\n\nWith keyword\
    \ arguments, you specify which parameter each argument should be assigned to in\
    \ the function call. When you use keyword arguments, the order of the arguments\
    \ doesn't matter.\n\n## Using positional arguments\n\n```python\ndef describe_pet(animal,\
    \ name):\n    \"\"\"Display information about a pet.\"\"\"\n    print(f\"\\nI\
    \ have a {animal}.\")\n    print(f\"Its name is {name}.\")\n\ndescribe_pet('hamster',\
    \ 'harry')\ndescribe_pet('dog', 'willie')\n```\n\n## Using keyword arguments\n\
    \n```python\ndef describe_pet(animal, name):\n    \"\"\"Display information about\
    \ a pet.\"\"\"\n    print(f\"\\nI have a {animal}.\")\n    print(f\"Its name is\
    \ {name}.\")\n\ndescribe_pet(animal='hamster', name='harry')\ndescribe_pet(name='willie',\
    \ animal='dog')\n```\n\n## Default values\n\nYou can provide a default value for\
    \ a parameter. When function calls omit this argument the default value will be\
    \ used. Parameters with default values must be listed after parameters without\
    \ default values in the function's definition so positional arguments can still\
    \ work correctly.\n\n## Using a default value\n\n```python\ndef describe_pet(name,\
    \ animal='dog'):\n    \"\"\"Display information about a pet.\"\"\"\n    print(f\"\
    \\nI have a {animal}.\")\n    print(f\"Its name is {name}.\")\n\ndescribe_pet('harry',\
    \ 'hamster')\ndescribe_pet('willie')\n```\n\n## Using None to make an argument\
    \ optional\n\n```python\ndef describe_pet(animal, name=None):\n    \"\"\"Display\
    \ information about a pet.\"\"\"\n    print(f\"\\nI have a {animal}.\")\n    if\
    \ name:\n        print(f\"Its name is {name}.\")\n\ndescribe_pet('hamster', 'harry')\n\
    describe_pet('snake')\n```\n\n## Return values\n\nA function can return a value\
    \ or a set of values. When a function returns a value, the calling line should\
    \ provide a variable which the return value can be assigned to. A function stops\
    \ running when it reaches a return statement.\n\n## Returning a single value\n\
    \n```python\ndef get_full_name(first, last):\n    \"\"\"Return a neatly formatted\
    \ full name.\"\"\"\n    full_name = f\"{first} {last}\"\n    return full_name.title()\n\
    \nmusician = get_full_name('jimi', 'hendrix')\nprint(musician)\n```\n\n## Returning\
    \ a dictionary\n\n```python\ndef build_person(first, last):\n    \"\"\"Return\
    \ a dictionary of information\n    about a person.\n    \"\"\"\n    person = {'first':\
    \ first, 'last': last}\n    return person\n\nmusician = build_person('jimi', 'hendrix')\n\
    print(musician)\n```\n\n## Returning a dictionary with optional values\n\n```python\n\
    def build_person(first, last, age=None):\n    \"\"\"Return a dictionary of information\n\
    \    about a person.\n    \"\"\"\n    person = {'first': first, 'last': last}\n\
    \    if age:\n        person['age'] = age\n\n    return person\n\nmusician = build_person('jimi',\
    \ 'hendrix', 27)\nprint(musician)\n\nmusician = build_person('janis', 'joplin')\n\
    print(musician)\n```\n\n## Visualizing functions\n\nTry running some of these\
    \ examples, and some of your own programs that use functions, on pythontutor.com.\n\
    \n![img](img/12320e46b546a2862f3a411be6db7a27_8_0.png)\n\nPython Crash Course\n\
    A Hands-on, Project-Based Introduction to Programming\nnostarch.com/pythoncrashcourse2e\n\
    \n## Passing a list to a function\n\nYou can pass a list as an argument to a function,\
    \ and the function can work with the values in the list. Any changes the function\
    \ makes to the list will affect the original list. You can prevent a function\
    \ from modifying a list by passing a copy of the list as an argument.\n\n## Passing\
    \ a list as an argument\n\n```python\ndef greet_users(names):\n    \"\"\"Print\
    \ a simple greeting to everyone.\"\"\"\n    for name in names:\n        msg =\
    \ f\"Hello, {name}!\"\n        print(msg)\n\nusernames = ['hannah', 'ty', 'margot']\n\
    greet_users(usernames)\n```\n\n## Allowing a function to modify a list\n\nThe\
    \ following example sends a list of models to a function for printing. The first\
    \ list is emptied, and the second list is filled.\n\n```python\ndef print_models(unprinted,\
    \ printed):\n    \"\"\"3d print a set of models.\"\"\"\n    while unprinted:\n\
    \        current_model = unprinted.pop()\n        print(f\"Printing {current_model}\"\
    )\n        printed.append(current_model)\n\n# Store some unprinted designs,\n\
    #   and print each of them.\nunprinted = ['phone case', 'pendant', 'ring']\nprinted\
    \ = []\nprint_models(unprinted, printed)\n\nprint(f\"\\nUnprinted: {unprinted}\"\
    )\nprint(f\"Printed: {printed}\")\n```\n\n## Preventing a function from modifying\
    \ a list\n\nThe following example is the same as the previous one, except the\
    \ original list is unchanged after calling `print_models()`.\n\n```python\ndef\
    \ print_models(unprinted, printed):\n    \"\"\"3d print a set of models.\"\"\"\
    \n    while unprinted:\n        current_model = unprinted.pop()\n        print(f\"\
    Printing {current_model}\")\n        printed.append(current_model)\n\n# Store\
    \ some unprinted designs,\n#   and print each of them.\noriginal = ['phone case',\
    \ 'pendant', 'ring']\nprinted = []\n\nprint_models(original[:], printed)\nprint(f\"\
    \\nOriginal: {original}\")\nprint(f\"Printed: {printed}\")\n```\n\n## Passing\
    \ an arbitrary number of arguments\n\nSometimes you won't know how many arguments\
    \ a function will need to accept. Python allows you to collect an arbitrary number\
    \ of arguments into one parameter using the `*` operator. A parameter that accepts\
    \ an arbitrary number of arguments must come last in the function definition.\
    \ This parameter is often named `*args`.\n\nThe `**` operator allows a parameter\
    \ to collect an arbitrary number of keyword arguments. These are stored as a dictionary\
    \ with the parameter names as keys, and the arguments as values. This is often\
    \ named `**kwargs`.\n\n## Collecting an arbitrary number of arguments\n\n```python\n\
    def make_pizza(size, *toppings):\n    \"\"\"Make a pizza.\"\"\"\n    print(f\"\
    \\nMaking a {size} pizza.\")\n    print(\"Toppings:\")\n    for topping in toppings:\n\
    \        print(f\"- {topping}\")\n\n# Make three pizzas with different toppings.\n\
    make_pizza('small', 'pepperoni')\nmake_pizza('large', 'bacon bits', 'pineapple')\n\
    make_pizza('medium', 'mushrooms', 'peppers',\n           'onions', 'extra cheese')\n\
    ```\n\n## Collecting an arbitrary number of keyword arguments\n\n```python\ndef\
    \ build_profile(first, last, **user_info):\n    \"\"\"Build a dictionary for a\
    \ user.\"\"\"\n    user_info['first'] = first\n    user_info['last'] = last\n\
    \    return user_info\n\n# Create two users with different kinds\n#   of information.\n\
    user_0 = build_profile('albert', 'einstein',\n                       location='princeton')\n\
    user_1 = build_profile('marie', 'curie',\n                       location='paris',\
    \ field='chemistry')\n\nprint(user_0)\nprint(user_1)\n```\n\n## What's the best\
    \ way to structure a function?\n\nThere are many ways to write and call a function.\
    \ When you're starting out, aim for something that simply works. As you gain experience\
    \ you'll develop an understanding of the subtle advantages of different structures\
    \ such as positional and keyword arguments, and the various approaches to importing\
    \ functions. For now if your functions do what you need them to, you're doing\
    \ well.\n\n## Modules\n\nYou can store your functions in a separate file called\
    \ a module, and then import the functions you need into the file containing your\
    \ main program. This allows for cleaner program files. Make sure your module is\
    \ stored in the same directory as your main program.\n\n## Storing a function\
    \ in a module\n\nFile: `pizza.py`\n\n```python\ndef make_pizza(size, *toppings):\n\
    \    \"\"\"Make a pizza.\"\"\"\n    print(f\"\\nMaking a {size} pizza.\")\n  \
    \  print(\"Toppings:\")\n    for topping in toppings:\n        print(f\"- {topping}\"\
    )\n```\n\n## Importing an entire module\n\nFile: `making_pizzas.py` Every function\
    \ in the module is available in the program file.\n\n```python\nimport pizza\n\
    \npizza.make_pizza('medium', 'pepperoni')\npizza.make_pizza('small', 'bacon',\
    \ 'pineapple')\n```\n\n## Importing a specific function\n\nOnly the imported functions\
    \ are available in the program file.\n\n```python\nfrom pizza import make_pizza\n\
    \nmake_pizza('medium', 'pepperoni')\nmake_pizza('small', 'bacon', 'pineapple')\n\
    ```\n\n## Giving a module an alias\n\n```python\nimport pizza as p\n\np.make_pizza('medium',\
    \ 'pepperoni')\np.make_pizza('small', 'bacon', 'pineapple')\n```\n\n## Giving\
    \ a function an alias\n\n```python\nfrom pizza import make_pizza as mp\n\nmp('medium',\
    \ 'pepperoni')\nmp('small', 'bacon', 'pineapple')\n```\n\n## Importing all functions\
    \ from a module\n\nDon't do this, but recognize it when you see it in others'\
    \ code. It can result in naming conflicts, which can cause errors.\n\n```python\n\
    from pizza import *\n\nmake_pizza('medium', 'pepperoni')\nmake_pizza('small',\
    \ 'bacon', 'pineapple')\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者Python速查表 - 函数\n\n## 什么是函数？\n\n函数是设计用来完成特定任务的命名代码块。函数允许你编写一次代码，然后在需要完成相同任务时随时运行。\n\
    \n函数可以接收所需的信息，并返回生成的信息。有效使用函数使你的程序更易于编写、阅读、测试和修复。\n\n## 定义函数\n\n函数的第一行是其定义，由关键字\
    \ `def` 标记。函数名称后跟一对括号和一个冒号。一个用三引号括起来的文档字符串描述了函数的功能。函数体缩进一级。\n\n要调用函数，请给出函数名称，后跟一对括号。\n\
    \n## 创建函数\n\n```python\ndef greet_user():\n    \"\"\"显示简单的问候语。\"\"\"\n    print(\"\
    Hello!\")\n\ngreet_user()\n```\n\n## 向函数传递信息\n\n传递给函数的信息称为**参数**；函数接收的信息称为**形参**。参数包含在函数名称后的括号中，而形参列在函数定义的括号中。\n\
    \n## 传递简单参数\n\n```python\ndef greet_user(username):\n    \"\"\"显示简单的问候语。\"\"\"\
    \n    print(f\"Hello, {username}!\")\n\ngreet_user('jesse')\ngreet_user('diana')\n\
    greet_user('brandon')\n```\n\n## 位置参数和关键字参数\n\n两种主要的参数类型是位置参数和关键字参数。当你使用位置参数时，Python会将函数调用中的第一个参数与函数定义中的第一个形参匹配，依此类推。\n\
    \n使用关键字参数时，你可以在函数调用中指定每个参数应分配给哪个形参。使用关键字参数时，参数的顺序无关紧要。\n\n## 使用位置参数\n\n```python\n\
    def describe_pet(animal, name):\n    \"\"\"显示关于宠物的信息。\"\"\"\n    print(f\"\\nI\
    \ have a {animal}.\")\n    print(f\"Its name is {name}.\")\n\ndescribe_pet('hamster',\
    \ 'harry')\ndescribe_pet('dog', 'willie')\n```\n\n## 使用关键字参数\n\n```python\ndef\
    \ describe_pet(animal, name):\n    \"\"\"显示关于宠物的信息。\"\"\"\n    print(f\"\\nI have\
    \ a {animal}.\")\n    print(f\"Its name is {name}.\")\n\ndescribe_pet(animal='hamster',\
    \ name='harry')\ndescribe_pet(name='willie', animal='dog')\n```\n\n## 默认值\n\n\
    你可以为形参提供默认值。当函数调用省略此参数时，将使用默认值。在函数定义中，带有默认值的形参必须列在没有默认值的形参之后，以便位置参数仍然可以正常工作。\n\
    \n## 使用默认值\n\n```python\ndef describe_pet(name, animal='dog'):\n    \"\"\"显示关于宠物的信息。\"\
    \"\"\n    print(f\"\\nI have a {animal}.\")\n    print(f\"Its name is {name}.\"\
    )\n\ndescribe_pet('harry', 'hamster')\ndescribe_pet('willie')\n```\n\n## 使用None使参数可选\n\
    \n```python\ndef describe_pet(animal, name=None):\n    \"\"\"显示关于宠物的信息。\"\"\"\n\
    \    print(f\"\\nI have a {animal}.\")\n    if name:\n        print(f\"Its name\
    \ is {name}.\")\n\ndescribe_pet('hamster', 'harry')\ndescribe_pet('snake')\n```\n\
    \n## 返回值\n\n函数可以返回一个值或一组值。当函数返回一个值时，调用行应提供一个变量，以便将返回值赋给该变量。函数在到达 `return` 语句时停止运行。\n\
    \n## 返回单个值\n\n```python\ndef get_full_name(first, last):\n    \"\"\"返回格式整齐的全名。\"\
    \"\"\n    full_name = f\"{first} {last}\"\n    return full_name.title()\n\nmusician\
    \ = get_full_name('jimi', 'hendrix')\nprint(musician)\n```\n\n## 返回字典\n\n```python\n\
    def build_person(first, last):\n    \"\"\"返回包含个人信息的字典。\"\"\"\n    person = {'first':\
    \ first, 'last': last}\n    return person\n\nmusician = build_person('jimi', 'hendrix')\n\
    print(musician)\n```\n\n## 返回带有可选值的字典\n\n```python\ndef build_person(first, last,\
    \ age=None):\n    \"\"\"返回包含个人信息的字典。\"\"\"\n    person = {'first': first, 'last':\
    \ last}\n    if age:\n        person['age'] = age\n\n    return person\n\nmusician\
    \ = build_person('jimi', 'hendrix', 27)\nprint(musician)\n\nmusician = build_person('janis',\
    \ 'joplin')\nprint(musician)\n```\n\n## 可视化函数\n\n尝试在 pythontutor.com 上运行一些这些示例，以及一些你自己的使用函数的程序。\n\
    \n![img](img/12320e46b546a2862f3a411be6db7a27_8_0.png)\n\nPython Crash Course\n\
    A Hands-on, Project-Based Introduction to Programming\nnostarch.com/pythoncrashcourse2e\n\
    \n## 将列表传递给函数\n\n你可以将列表作为参数传递给函数，函数可以处理列表中的值。函数对列表所做的任何更改都会影响原始列表。你可以通过传递列表的副本来防止函数修改列表。\n\
    \n## 将列表作为参数传递\n\n```python\ndef greet_users(names):\n    \"\"\"向每个人打印简单的问候语。\"\
    \"\"\n    for name in names:\n        msg = f\"Hello, {name}!\"\n        print(msg)\n\
    \nusernames = ['hannah', 'ty', 'margot']\ngreet_users(usernames)\n```\n\n## 允许函数修改列表\n\
    \n以下示例将模型列表发送给函数进行打印。第一个列表被清空，第二个列表被填充。\n\n```python\ndef print_models(unprinted,\
    \ printed):\n    \"\"\"3D打印一组模型。\"\"\"\n    while unprinted:\n        current_model\
    \ = unprinted.pop()\n        print(f\"Printing {current_model}\")\n        printed.append(current_model)\n\
    \n# 存储一些未打印的设计，\n#   并打印每一个。\nunprinted = ['phone case', 'pendant', 'ring']\n\
    printed = []\nprint_models(unprinted, printed)\n\nprint(f\"\\nUnprinted: {unprinted}\"\
    )\nprint(f\"Printed: {printed}\")\n```\n\n## 防止函数修改列表\n\n以下示例与前一个示例相同，只是调用 `print_models()`\
    \ 后原始列表保持不变。\n\n```python\ndef print_models(unprinted, printed):\n    \"\"\"3D打印一组模型。\"\
    \"\"\n    while unprinted:\n        current_model = unprinted.pop()\n        print(f\"\
    Printing {current_model}\")\n        printed.append(current_model)\n\n# 存储一些未打印的设计，\n\
    #   并打印每一个。\noriginal = ['phone case', 'pendant', 'ring']\nprinted = []\n\nprint_models(original[:],\
    \ printed)\nprint(f\"\\nOriginal: {original}\")\nprint(f\"Printed: {printed}\"\
    )\n```\n\n## 传递任意数量的参数\n\n有时你不知道函数需要接受多少个参数。Python允许你使用 `*` 运算符将任意数量的参数收集到一个形参中。接受任意数量参数的形参必须在函数定义中放在最后。这个形参通常命名为\
    \ `*args`。\n\n`**` 运算符允许一个形参收集任意数量的关键字参数。这些参数以字典的形式存储，形参名称作为键，参数作为值。这通常命名为 `**kwargs`。\n\
    \n## 收集任意数量的参数\n\n```python\ndef make_pizza(size, *toppings):\n    \"\"\"制作披萨。\"\
    \"\"\n    print(f\"\\nMaking a {size} pizza.\")\n    print(\"Toppings:\")\n  \
    \  for topping in toppings:\n        print(f\"- {topping}\")\n\n# 制作三个不同配料的披萨。\n\
    make_pizza('small', 'pepperoni')\nmake_pizza('large', 'bacon bits', 'pineapple')\n\
    make_pizza('medium', 'mushrooms', 'peppers',\n           'onions', 'extra cheese')\n\
    ```\n\n## 收集任意数量的关键字参数\n\n```python\ndef build_profile(first, last, **user_info):\n\
    \    \"\"\"为用户构建一个字典。\"\"\"\n    user_info['first'] = first\n    user_info['last']\
    \ = last\n    return user_info\n\n# 创建两个具有不同类型\n#   信息的用户。\nuser_0 = build_profile('albert',\
    \ 'einstein',\n                       location='princeton')\nuser_1 = build_profile('marie',\
    \ 'curie',\n                       location='paris', field='chemistry')\n\nprint(user_0)\n\
    print(user_1)\n```\n\n## 构建函数的最佳方式是什么？\n\n编写和调用函数的方法有很多。当你刚开始时，目标是让函数简单地工作。随着经验的积累，你会逐渐理解不同结构（如位置参数和关键字参数）以及各种导入函数方法的微妙优势。目前，如果你的函数能完成你需要它们做的事情，你就做得很好。\n\
    \n## 模块\n\n你可以将函数存储在一个单独的文件中，称为模块，然后将需要的函数导入到包含主程序的文件中。这允许更清晰的程序文件。确保你的模块存储在与主程序相同的目录中。\n\
    \n## 将函数存储在模块中\n\n文件：`pizza.py`\n\n```python\ndef make_pizza(size, *toppings):\n\
    \    \"\"\"制作披萨。\"\"\"\n    print(f\"\\nMaking a {size} pizza.\")\n    print(\"\
    Toppings:\")\n    for topping in toppings:\n        print(f\"- {topping}\")\n\
    ```\n\n## 导入整个模块\n\n文件：`making_pizzas.py` 模块中的每个函数在程序文件中都可用。\n\n```python\nimport\
    \ pizza\n\npizza.make_pizza('medium', 'pepperoni')\npizza.make_pizza('small',\
    \ 'bacon', 'pineapple')\n```\n\n## 导入特定函数\n\n只有导入的函数在程序文件中可用。\n\n```python\nfrom\
    \ pizza import make_pizza\n\nmake_pizza('medium', 'pepperoni')\nmake_pizza('small',\
    \ 'bacon', 'pineapple')\n```\n\n## 为模块指定别名\n\n```python\nimport pizza as p\n\n\
    p.make_pizza('medium', 'pepperoni')\np.make_pizza('small', 'bacon', 'pineapple')\n\
    ```\n\n## 为函数指定别名\n\n```python\nfrom pizza import make_pizza as mp\n\nmp('medium',\
    \ 'pepperoni')\nmp('small', 'bacon', 'pineapple')\n```\n\n## 从模块导入所有函数\n\n不要这样做，但当你在别人的代码中看到它时要认出来。这可能导致命名冲突，从而引起错误。\n\
    \n```python\nfrom pizza import *\n\nmake_pizza('medium', 'pepperoni')\nmake_pizza('small',\
    \ 'bacon', 'pineapple')\n```\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/ 获取"
