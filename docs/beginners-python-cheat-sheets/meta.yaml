    \ the app's admin.py file. View the admin site at http://localhost:8000/admin/.\
    \ You'll need to log in using a superuser account.\n\n```\nfrom django.contrib\
    \ import admin\n\nfrom .models import Topic\n\nadmin.site.register(Topic)\n```\n\
    \n# Building a simple home page\n\nUsers interact with a project through web pages,\
    \ and a project's home page can start out as a simple page with no data. A page\
    \ usually needs a URL, a view, and a template.\n\n# Mapping a project's URLs\n\
    \nThe project's main urls.py file tells Django where to find the urls.py files\
    \ associated with each app in the project.\n\n```\nfrom django.contrib import\
    \ admin\nfrom django.urls import path, include\n\nurlpatterns = [\n    path('admin/',\
    \ admin.site.urls),\n    path('', include('learning_logs.urls')),\n]\n```\n\n\
    # Mapping an app's URLs\n\nAn app's urls.py file tells Django which view to use\
    \ for each URL in the app. You'll need to make this file yourself, and save it\
    \ in the app's folder.\n\n```\nfrom django.urls import path\n\nfrom . import views\n\
    \napp_name = 'learning_logs'\nurlpatterns = [\n    # Home page.\n    path('',\
    \ views.index, name='index'),\n]\n```\n\n# Writing a simple view\n\nA view takes\
    \ information from a request and sends data to the browser, often through a template.\
    \ View functions are stored in an app's views.py file. This simple view function\
    \ doesn't pull in any data, but it uses the template index.html to render the\
    \ home page.\n\n```\nfrom django.shortcuts import render\n\ndef index(request):\n\
    \    \"\"\"The home page for Learning Log.\"\"\"\n    return render(request,\n\
    \        'learning_logs/index.html')\n```\n\n# Online resources\n\nThe documentation\
    \ for Django is available at docs.djangoproject.com/. The Django documentation\
    \ is thorough and user-friendly, so check it out!\n\n# Python Crash Course\n\n\
    A Hands-on, Project-Based Introduction to Programming\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_22_0.png)"
  - "[PAGE 23]\n\n# Building a simple home page (cont.)\n\n# Writing a simple template\n\
    \nA template sets up the structure for a page. It's a mix of html and template\
    \ code, which is like Python but not as powerful. Make a folder called templates\
    \ inside the project folder. Inside the templates folder make another folder with\
    \ the same name as the app. This is where the template files should be saved.\n\
    \nThe home page template will be saved as learning_logs/templates/learning_logs/index.html.\n\
    \n```\n<p>Learning Log</p>\n\n<p>Learning Log helps you keep track of your learning,\
    \ for any topic you're learning about.</p>\n```\n\n# Template Inheritance\n\n\
    Many elements of a web page are repeated on every page in the site, or every page\
    \ in a section of the site. By writing one parent template for the site, and one\
    \ for each section, you can easily modify the look and feel of your entire site.\n\
    \n# The parent template\n\nThe parent template defines the elements common to\
    \ a set of pages, and defines blocks that will be filled by individual pages.\n\
    \n```\n<p>\n  <a href=\"{% url 'learning_logs:index' %}\">\n    Learning Log\n\
    \  </a>\n</p>\n\n{% block content %}{% endblock content %}\n```\n\n# The child\
    \ template\n\nThe child template uses the {% extends %} template tag to pull in\
    \ the structure of the parent template. It then defines the content for any blocks\
    \ defined in the parent template.\n\n```\n{% extends 'learning_logs/base.html'\
    \ %}\n\n{% block content %}\n\n  <p>\n    Learning Log helps you keep track\n\
    \    of your learning, for any topic you're\n    learning about.\n  </p>\n\n{%\
    \ endblock content %}\n```\n\n# Template indentation\n\nPython code is usually\
    \ indented by four spaces. In templates you'll often see two spaces used for indentation,\
    \ because elements tend to be nested more deeply in templates.\n\n# Another model\n\
    \nA new model can use an existing model. The ForeignKey attribute establishes\
    \ a connection between instances of the two related models. Make sure to migrate\
    \ the database after adding a new model to your app.\n\n# Defining a model with\
    \ a foreign key\n\n```\nclass Entry(models.Model):\n    \"\"\"Learning log entries\
    \ for a topic.\"\"\"\n    topic = models.ForeignKey(Topic,\n            on_delete=models.CASCADE)\n\
    \    text = models.TextField()\n    date_added = models.DateTimeField(\n     \
    \       auto_now_add=True)\n\n    def __str__(self):\n        return f\"{self.text[:50]}...\"\
    \n```\n\n# Building a page with data\n\nMost pages in a project need to present\
    \ data that's specific to the current user.\n\n# URL parameters\n\nA URL often\
    \ needs to accept a parameter telling it what data to access from the database.\
    \ The URL pattern shown here looks for the ID of a specific topic and assigns\
    \ it to the parameter topic_id.\n\n```\nurlpatterns = [\n    --snip--\n    # Detail\
    \ page for a single topic.\n    path('topics/<int:topic_id>/', views.topic,\n\
    \         name='topic'),\n]\n```\n\n# Using data in a view\n\nThe view uses a\
    \ parameter from the URL to pull the correct data from the database. In this example\
    \ the view is sending a context dictionary to the template, containing data that\
    \ should be displayed on the page. You'll need to import any model you're using.\n\
    \n```\ndef topic(request, topic_id):\n    \"\"\"Show a topic and all its entries.\"\
    \"\"\n    topic = Topic.objects.get(id=topic_id)\n    entries = topic.entry_set.order_by(\n\
    \            '-date_added')\n    context = {\n        'topic': topic,\n      \
    \  'entries': entries,\n    }\n    return render(request,\n            'learning_logs/topic.html',\
    \ context)\n```\n\n# Restarting the development server\n\nIf you make a change\
    \ to your project and the change doesn't seem to have any effect, try restarting\
    \ the server:\n\n```\n$ python manage.py runserver\n```\n\n# Building a page with\
    \ data (cont.)\n\n# Using data in a template\n\nThe data in the view function's\
    \ context dictionary is available within the template. This data is accessed using\
    \ template variables, which are indicated by doubled curly braces.\n\nThe vertical\
    \ line after a template variable indicates a filter. In this case a filter called\
    \ date formats date objects, and the filter linebreaks renders paragraphs properly\
    \ on a web page.\n\n```\n{% extends 'learning_logs/base.html' %}\n\n{% block content\
    \ %}\n\n  <p>Topic: {{ topic }}</p>\n\n  <p>Entries:</p>\n  <ul>\n    {% for entry\
    \ in entries %}\n      <li>\n        <p>\n          {{ entry.date_added|date:'M\
    \ d, Y H:i' }}\n        </p>\n\n        <p>\n          {{ entry.text|linebreaks\
    \ }}\n        </p>\n      </li>\n    {% empty %}\n      <li>There are no entries\
    \ yet.</li>\n    {% endfor %}\n  </ul>\n\n{% endblock content %}\n```\n\n# The\
    \ Django shell\n\nYou can explore the data in your project from the command line.\
    \ This is helpful for developing queries and testing code snippets.\n\n# Start\
    \ a shell session\n\n```\n$ python manage.py shell\n```\n\n# Access data from\
    \ the project\n\n```\n>>> from learning_logs.models import Topic\n>>> Topic.objects.all()\n\
    [<Topic: Chess>, <Topic: Rock Climbing>]\n>>> topic = Topic.objects.get(id=1)\n\
    >>> topic.text\n'Chess'\n>>> topic.entry_set.all()\n<QuerySet [<Entry: In the\
    \ opening phase...>]>\n```\n\nMore cheat sheets available at ehmatthes.github.io/pcc_2e/"
- md: "## Beginner's Python Cheat Sheet - Django, Part 2\n\n## Users and forms\n\n\
    Most web applications need to let users create accounts. This lets users create\
    \ and work with their own data. Some of this data may be private, and some may\
    \ be public. Django's forms allow users to enter and modify their data.\n\n##\
    \ User accounts\n\nUser accounts are handled by a dedicated app which we'll call\
    \ users. Users need to be able to register, log in, and log out. Django automates\
    \ much of this work for you.\n\n## Making a users app\n\nAfter making the app,\
    \ be sure to add 'users' to INSTALLED_APPS in the project's settings.py file.\n\
    \n```\n$ python manage.py startapp users\n```\n\n## Including URLs for the users\
    \ app\n\nAdd a line to the project's urls.py file so the users app's URLs are\
    \ included in the project.\n\n```\nfrom django.contrib import admin\nfrom django.urls\
    \ import path, include\n\nurlpatterns = [\n    path('admin/', admin.site.urls),\n\
    \    path('users/', include('users.urls')),\n    path('', include('learning_logs.urls')),\n\
    ]\n```\n\n## Using forms in Django\n\nThere are a number of ways to create forms\
    \ and work with them. You can use Django's defaults, or completely customize your\
    \ forms. For a simple way to let users enter data based on your models, use a\
    \ ModelForm. This creates a form that allows users to enter data that will populate\
    \ the fields on a model.\n\nThe register view on the back of this sheet shows\
    \ a simple approach to form processing. If the view doesn't receive data from\
    \ a form, it responds with a blank form. If it receives POST data from a form,\
    \ it validates the data and then saves it to the database.\n\n## User accounts\
    \ (cont.)\n\n## Defining the URLs\n\nUsers will need to be able to log in, log\
    \ out, and register. Make a new urls.py file in the users app folder.\n\n```\n\
    from django.urls import path, include\n\nfrom . import views\n\napp_name = 'users'\n\
    urlpatterns = [\n    # Include default auth urls.\n    path('', include(\n   \
    \     'django.contrib.auth.urls')),\n\n    # Registration page.\n    path('register/',\
    \ views.register,\n         name='register'),\n]\n```\n\n## The login template\n\
    \nThe login view is provided by default, but you need to provide your own login\
    \ template. The template shown here displays a simple login form, and provides\
    \ basic error messages. Make a templates folder in the users folder, and then\
    \ make a registration folder in the templates folder. Save this file as login.html.\
    \ The path should be users/templates/registration/login.html.\n\nThe tag {% csrf_token\
    \ %} helps prevent a common type of attack with forms. The {{ form.as_p }} element\
    \ displays the default login form in paragraph format. The <input> element named\
    \ next redirects the user to the home page after a successful login.\n\n```\n\
    {% extends \"learning_logs/base.html\" %}\n\n{% block content %}\n\n  {% if form.errors\
    \ %}\n    <p>Your username and password didn't match.\n    Please try again.</p>\n\
    \  {% endif %}\n\n  <form method=\"post\"\n        action=\"{% url 'users:login'\
    \ %}\">\n    {% csrf_token %}\n    {{ form.as_p }}\n    <button name=\"submit\"\
    >Log in</button>\n\n    <input type=\"hidden\" name=\"next\"\n           value=\"\
    {% url 'learning_logs:index' %}\"/>\n\n  </form>\n\n{% endblock content %}\n```\n\
    \n## User accounts (cont.)\n\n## Showing the current login status\n\nYou can modify\
    \ the base.html template to show whether the user is currently logged in, and\
    \ to provide a link to the login and logout pages. Django makes a user object\
    \ available to every template, and this template takes advantage of this object.\n\
    \nThe tag with user.is_authenticated allows you to serve specific content to users\
    \ depending on whether they have logged in or not. The {{ user.username }} property\
    \ allows you to greet users who have logged in. Users who haven't logged in see\
    \ links to register or log in.\n\n```\n<p>\n  <a href=\"{% url 'learning_logs:index'\
    \ %}\">\n    Learning Log\n  </a>\n\n  {% if user.is_authenticated %}\n    Hello,\
    \ {{ user.username }}.\n    <a href=\"{% url 'users:logout' %}\">\n      Log out\n\
    \    </a>\n  {% else %}\n    <a href=\"{% url 'users:register' %}\">\n      Register\n\
    \    </a> -\n    <a href=\"{% url 'users:login' %}\">\n      Log in\n    </a>\n\
    \  {% endif %}\n\n</p>\n\n{% block content %}{% endblock content %}\n```\n\n##\
    \ The logged_out template\n\nThe default logout view renders the page using the\
    \ template logged_out.html, which needs to be saved in the users/templates/registration/\
    \ folder.\n\n```\n{% extends \"learning_logs/base.html\" %}\n\n{% block content\
    \ %}\n  <p>You have been logged out. Thank you\n  for visiting!</p>\n{% endblock\
    \ content %}\n```\n\n## Python Crash Course\n\nA Hands-on, Project-Based Introduction\
    \ to Programming\n\nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_24_0.png)\n\
    \n## User accounts (cont.)\n\nThe register view needs to display a blank registration\
    \ form when the page is first requested, and then process completed registration\
    \ forms. A successful registration logs the user in and redirects to the home\
    \ page.\n\n```\nfrom django.shortcuts import render, redirect\nfrom django.contrib.auth\
    \ import login\nfrom django.contrib.auth.forms import \\\n    UserCreationForm\n\
    \ndef register(request):\n    \"\"\"Register a new user.\"\"\"\n\n    if request.method\
    \ != 'POST':\n        # Display blank registration form.\n        form = UserCreationForm()\n\
    \n    else:\n        # Process completed form.\n        form = UserCreationForm(\n\
    \            data=request.POST)\n\n        if form.is_valid():\n            new_user\
    \ = form.save()\n\n            # Log in, redirect to home page.\n            login(request,\
    \ new_user)\n            return redirect(\n                'learning_logs:index')\n\
    \n    # Display a blank or invalid form.\n    context = {'form': form}\n\n   \
    \ return render(request,\n        'registration/register.html', context)\n```\n\
    \n## Styling your project\n\nThe django-bootstrap4 app allows you to use the Bootstrap\
    \ library to make your project look visually appealing. The app provides tags\
    \ that you can use in your templates to style individual elements on a page. Learn\
    \ more at django-bootstrap4.readthedocs.io/.\n\n## Deploying your project\n\n\
    Heroku lets you push your project to a live server, making it available to anyone\
    \ with an internet connection. Heroku offers a free service level, which lets\
    \ you learn the deployment process without any commitment.\n\nYou'll need to install\
    \ a set of Heroku command line tools, and use Git to track the state of your project.\
    \ See devcenter.heroku.com/, and click on the Python link.\n\n## User accounts\
    \ (cont.)\n\nThe register.html template shown here displays the registration form\
    \ in paragraph format.\n\n```\n{% extends 'learning_logs/base.html' %}\n\n{% block\
    \ content %}\n\n  <form method='post'\n        action=\"{% url 'users:register'\
    \ %}\">\n\n    {% csrf_token %}\n    {{ form.as_p }}\n\n    <button name='submit'>Register</button>\n\
    \    <input type='hidden' name='next'\n           value=\"{% url 'learning_logs:index'\
    \ %}\"/>\n\n  </form>\n\n{% endblock content %}\n```\n\n## Connecting data to\
    \ users\n\nUsers will have data that belongs to them. Any model that should be\
    \ connected directly to a user needs a field connecting instances of the model\
    \ to a specific user.\n\n## Making a topic belong to a user\n\nOnly the highest-level\
    \ data in a hierarchy needs to be directly connected to a user. To do this import\
    \ the User model, and add it as a foreign key on the data model.\n\nAfter modifying\
    \ the model you'll need to migrate the database. You'll need to choose a user\
    \ ID to connect each existing instance to.\n\n```\nfrom django.db import models\n\
    from django.contrib.auth.models import User\n\nclass Topic(models.Model):\n  \
    \  \"\"\"A topic the user is learning about.\"\"\"\n    text = models.CharField(max_length=200)\n\
    \    date_added = models.DateTimeField(\n        auto_now_add=True)\n\n    owner\
    \ = models.ForeignKey(User,\n        on_delete=models.CASCADE)\n\n    def __str__(self):\n\
    \        return self.text\n```\n\n## Querying data for the current user\n\nIn\
    \ a view, the request object has a user attribute. You can use this attribute\
    \ to query for the user's data. The filter() method then pulls the data that belongs\
    \ to the current user.\n\n```\ntopics = Topic.objects.filter(\n    owner=request.user)\n\
    ```\n\n## Connecting data to users (cont.)\n\n## Restricting access to logged-in\
    \ users\n\nSome pages are only relevant to registered users. The views for these\
    \ pages can be protected by the @login_required decorator. Any view with this\
    \ decorator will automatically redirect non-logged in users to an appropriate\
    \ page. Here's an example views.py file.\n\n```\nfrom django.contrib.auth.decorators\
    \ import \\\n    login_required\n--snip--\n\n@login_required\ndef topic(request,\
    \ topic_id):\n    \"\"\"Show a topic and all its entries.\"\"\"\n```\n\n## Setting\
    \ the redirect URL\n\nThe @login_required decorator sends unauthorized users to\
    \ the login page. Add the following line to your project's settings.py file so\
    \ Django will know how to find your login page.\n\n```\nLOGIN_URL = 'users:login'\n\
    ```\n\n## Preventing inadvertent access\n\nSome pages serve data based on a parameter\
    \ in the URL. You can check that the current user owns the requested data, and\
    \ return a 404 error if they don't. Here's an example view.\n\n```\nfrom django.http\
    \ import Http404\n--snip--\n\n@login_required\ndef topic(request, topic_id):\n\
    \    \"\"\"Show a topic and all its entries.\"\"\"\n    topic = Topics.objects.get(id=topic_id)\n\
    \    if topic.owner != request.user:\n        raise Http404\n--snip--\n```\n\n\
    ## Using a form to edit data\n\nIf you provide some initial data, Django generates\
    \ a form with the user's existing data. Users can then modify and save their data.\n\
    \n## Creating a form with initial data\n\nThe instance parameter allows you to\
    \ specify initial data for a form.\n\n```\nform = EntryForm(instance=entry)\n\
    ```\n\n## Modifying data before saving\n\nThe argument commit=False allows you\
    \ to make changes before writing data to the database.\n\n```\nnew_topic = form.save(commit=False)\n\
    new_topic.owner = request.user\nnew_topic.save()\n```\n\nMore cheat sheets available\
    \ at ehmatthes.github.io/pcc_2e/"
  mdcn: "## 初学者Python速查表 - Django，第2部分\n\n## 用户与表单\n\n大多数Web应用程序需要让用户创建账户。这使用户能够创建和处理自己的数据。其中一些数据可能是私有的，另一些可能是公开的。Django的表单允许用户输入和修改他们的数据。\n\
    \n## 用户账户\n\n用户账户由一个专门的应用程序处理，我们称之为users。用户需要能够注册、登录和登出。Django为你自动化了大部分这项工作。\n\
    \n## 创建users应用\n\n创建应用后，务必将'users'添加到项目的settings.py文件中的INSTALLED_APPS。\n\n```\n\
    $ python manage.py startapp users\n```\n\n## 包含users应用的URL\n\n在项目的urls.py文件中添加一行，以便将users应用的URL包含在项目中。\n\
    \n```\nfrom django.contrib import admin\nfrom django.urls import path, include\n\
    \nurlpatterns = [\n    path('admin/', admin.site.urls),\n    path('users/', include('users.urls')),\n\
    \    path('', include('learning_logs.urls')),\n]\n```\n\n## 在Django中使用表单\n\n创建表单和处理表单有多种方式。你可以使用Django的默认设置，或者完全自定义你的表单。如果你想让用户基于你的模型输入数据，一个简单的方法是使用ModelForm。这会创建一个表单，允许用户输入数据来填充模型上的字段。\n\
    \n本速查表背面的register视图展示了表单处理的一个简单方法。如果视图没有从表单接收到数据，它会返回一个空白表单。如果它接收到表单的POST数据，它会验证数据，然后将其保存到数据库。\n\
    \n## 用户账户（续）\n\n## 定义URL\n\n用户需要能够登录、登出和注册。在users应用文件夹中创建一个新的urls.py文件。\n\n```\n\
    from django.urls import path, include\n\nfrom . import views\n\napp_name = 'users'\n\
    urlpatterns = [\n    # 包含默认的认证URL。\n    path('', include(\n        'django.contrib.auth.urls')),\n\
    \n    # 注册页面。\n    path('register/', views.register,\n         name='register'),\n\
    ]\n```\n\n## 登录模板\n\n登录视图是默认提供的，但你需要提供自己的登录模板。此处显示的模板展示了一个简单的登录表单，并提供基本的错误消息。在users文件夹中创建一个templates文件夹，然后在templates文件夹中创建一个registration文件夹。将此文件保存为login.html。路径应为users/templates/registration/login.html。\n\
    \n标签{% csrf_token %}有助于防止一种常见的表单攻击。{{ form.as_p }}元素以段落格式显示默认的登录表单。名为next的<input>元素在成功登录后将用户重定向到主页。\n\
    \n```\n{% extends \"learning_logs/base.html\" %}\n\n{% block content %}\n\n  {%\
    \ if form.errors %}\n    <p>您的用户名和密码不匹配。\n    请重试。</p>\n  {% endif %}\n\n  <form\
    \ method=\"post\"\n        action=\"{% url 'users:login' %}\">\n    {% csrf_token\
    \ %}\n    {{ form.as_p }}\n    <button name=\"submit\">登录</button>\n\n    <input\
    \ type=\"hidden\" name=\"next\"\n           value=\"{% url 'learning_logs:index'\
    \ %}\"/>\n\n  </form>\n\n{% endblock content %}\n```\n\n## 用户账户（续）\n\n## 显示当前登录状态\n\
    \n你可以修改base.html模板以显示用户当前是否已登录，并提供登录和登出页面的链接。Django使一个用户对象对每个模板都可用，此模板利用了这个对象。\n\
    \n带有user.is_authenticated的标签允许你根据用户是否已登录来提供特定内容。{{ user.username }}属性允许你向已登录的用户问好。未登录的用户会看到注册或登录的链接。\n\
    \n```\n<p>\n  <a href=\"{% url 'learning_logs:index' %}\">\n    学习日志\n  </a>\n\
    \n  {% if user.is_authenticated %}\n    你好，{{ user.username }}。\n    <a href=\"\
    {% url 'users:logout' %}\">\n      登出\n    </a>\n  {% else %}\n    <a href=\"\
    {% url 'users:register' %}\">\n      注册\n    </a> -\n    <a href=\"{% url 'users:login'\
    \ %}\">\n      登录\n    </a>\n  {% endif %}\n\n</p>\n\n{% block content %}{% endblock\
    \ content %}\n```\n\n## logged_out模板\n\n默认的登出视图使用模板logged_out.html渲染页面，该模板需要保存在users/templates/registration/文件夹中。\n\
    \n```\n{% extends \"learning_logs/base.html\" %}\n\n{% block content %}\n  <p>您已登出。感谢您的访问！</p>\n\
    {% endblock content %}\n```\n\n## Python速成课程\n\n基于实践的、项目导向的编程入门\n\nnostarch.com/pythoncrashcourse2e\n\
    \n![](img/12320e46b546a2862f3a411be6db7a27_24_0.png)\n\n## 用户账户（续）\n\nregister视图需要在页面首次请求时显示一个空白的注册表单，然后处理填写完成的注册表单。成功的注册会登录用户并重定向到主页。\n\
    \n```\nfrom django.shortcuts import render, redirect\nfrom django.contrib.auth\
    \ import login\nfrom django.contrib.auth.forms import \\\n    UserCreationForm\n\
    \ndef register(request):\n    \"\"\"注册新用户。\"\"\"\n\n    if request.method != 'POST':\n\
    \        # 显示空白注册表单。\n        form = UserCreationForm()\n\n    else:\n       \
    \ # 处理填写完成的表单。\n        form = UserCreationForm(\n            data=request.POST)\n\
    \n        if form.is_valid():\n            new_user = form.save()\n\n        \
    \    # 登录，重定向到主页。\n            login(request, new_user)\n            return redirect(\n\
    \                'learning_logs:index')\n\n    # 显示空白或无效的表单。\n    context = {'form':\
    \ form}\n\n    return render(request,\n        'registration/register.html', context)\n\
    ```\n\n## 为你的项目设置样式\n\ndjango-bootstrap4应用允许你使用Bootstrap库使你的项目在视觉上更具吸引力。该应用提供了你可以在模板中使用的标签来设置页面上各个元素的样式。更多信息请访问django-bootstrap4.readthedocs.io/。\n\
    \n## 部署你的项目\n\nHeroku允许你将项目推送到一个在线服务器，使其对任何有互联网连接的人可用。Heroku提供免费的服务级别，让你可以在没有任何承诺的情况下学习部署过程。\n\
    \n你需要安装一组Heroku命令行工具，并使用Git来跟踪项目的状态。请参阅devcenter.heroku.com/，并点击Python链接。\n\n\
    ## 用户账户（续）\n\n此处显示的register.html模板以段落格式显示注册表单。\n\n```\n{% extends 'learning_logs/base.html'\
    \ %}\n\n{% block content %}\n\n  <form method='post'\n        action=\"{% url\
    \ 'users:register' %}\">\n\n    {% csrf_token %}\n    {{ form.as_p }}\n\n    <button\
    \ name='submit'>注册</button>\n    <input type='hidden' name='next'\n          \
    \ value=\"{% url 'learning_logs:index' %}\"/>\n\n  </form>\n\n{% endblock content\
    \ %}\n```\n\n## 将数据连接到用户\n\n用户将拥有属于他们的数据。任何应直接连接到用户的模型都需要一个字段，将模型的实例连接到特定用户。\n\
    \n## 使主题属于用户\n\n只有层次结构中的最高级数据需要直接连接到用户。为此，导入User模型，并将其作为外键添加到数据模型上。\n\n修改模型后，你需要迁移数据库。你需要选择一个用户ID来连接每个现有实例。\n\
    \n```\nfrom django.db import models\nfrom django.contrib.auth.models import User\n\
    \nclass Topic(models.Model):\n    \"\"\"用户正在学习的主题。\"\"\"\n    text = models.CharField(max_length=200)\n\
    \    date_added = models.DateTimeField(\n        auto_now_add=True)\n\n    owner\
    \ = models.ForeignKey(User,\n        on_delete=models.CASCADE)\n\n    def __str__(self):\n\
    \        return self.text\n```\n\n## 查询当前用户的数据\n\n在视图中，request对象有一个user属性。你可以使用此属性来查询用户的数据。然后，filter()方法会提取属于当前用户的数据。\n\
    \n```\ntopics = Topic.objects.filter(\n    owner=request.user)\n```\n\n## 将数据连接到用户（续）\n\
    \n## 限制对已登录用户的访问\n\n某些页面仅与注册用户相关。这些页面的视图可以通过@login_required装饰器进行保护。任何带有此装饰器的视图都会自动将未登录的用户重定向到适当的页面。这是一个示例views.py文件。\n\
    \n```\nfrom django.contrib.auth.decorators import \\\n    login_required\n--snip--\n\
    \n@login_required\ndef topic(request, topic_id):\n    \"\"\"显示一个主题及其所有条目。\"\"\"\
    \n```\n\n## 设置重定向URL\n\n@login_required装饰器将未授权用户发送到登录页面。在你的项目的settings.py文件中添加以下行，以便Django知道如何找到你的登录页面。\n\
    \n```\nLOGIN_URL = 'users:login'\n```\n\n## 防止意外访问\n\n某些页面根据URL中的参数提供数据。你可以检查当前用户是否拥有请求的数据，如果没有，则返回404错误。这是一个示例视图。\n\
    \n```\nfrom django.http import Http404\n--snip--\n\n@login_required\ndef topic(request,\
    \ topic_id):\n    \"\"\"显示一个主题及其所有条目。\"\"\"\n    topic = Topics.objects.get(id=topic_id)\n\
    \    if topic.owner != request.user:\n        raise Http404\n--snip--\n```\n\n\
    ## 使用表单编辑数据\n\n如果你提供一些初始数据，Django会生成一个包含用户现有数据的表单。然后用户可以修改并保存他们的数据。\n\n## 创建带有初始数据的表单\n\
    \ninstance参数允许你为表单指定初始数据。\n\n```\nform = EntryForm(instance=entry)\n```\n\n##\
    \ 在保存前修改数据\n\ncommit=False参数允许你在将数据写入数据库之前进行更改。\n\n```\nnew_topic = form.save(commit=False)\n\
    new_topic.owner = request.user\nnew_topic.save()\n```\n\n更多速查表可在 ehmatthes.github.io/pcc_2e/\
    \ 获取"
