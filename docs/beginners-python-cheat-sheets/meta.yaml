  md: "# Beginner's Python Cheat Sheet - Files and Exceptions\n\n# What are files?\
    \ What are exceptions?\n\nYour programs can read information in from files, and\
    \ they can write data to files. Reading from files allows you to work with a wide\
    \ variety of information; writing to files allows users to pick up where they\
    \ left off the next time they run your program. You can write text to files, and\
    \ you can store Python structures such as lists in data files.\nExceptions are\
    \ special objects that help your programs respond to errors in appropriate ways.\
    \ For example if your program tries to open a file that doesn't exist, you can\
    \ use exceptions to display an informative error message instead of having the\
    \ program crash.\n\n# Reading from a file\n\nTo read from a file your program\
    \ needs to open the file and then read the contents of the file. You can read\
    \ the entire contents of the file at once, or read it line by line. The with statement\
    \ shown here makes sure the file is closed properly when the program has finished\
    \ accessing the file.\n\n# Reading an entire file at once\n\n```\nfilename = 'siddhartha.txt'\n\
    \nwith open(filename) as f_obj:\n    contents = f_obj.read()\n\nprint(contents)\n\
    ```\n\n# Reading line by line\n\nEach line that's read from the file has a newline\
    \ character at the end of the line, and the print function adds its own newline\
    \ character. The rstrip() method gets rid of the extra blank lines this would\
    \ result in when printing to the terminal.\n\n```\nfilename = 'siddhartha.txt'\n\
    \nwith open(filename) as f_obj:\n    for line in f_obj:\n        print(line.rstrip())\n\
    ```\n\n# Reading from a file (cont.)\n\n# Storing the lines in a list\n\n```\n\
    filename = 'siddhartha.txt'\n\nwith open(filename) as f_obj:\n    lines = f_obj.readlines()\n\
    \nfor line in lines:\n    print(line.rstrip())\n```\n\n# Writing to a file\n\n\
    Passing the 'w' argument to open() tells Python you want to write to the file.\
    \ Be careful; this will erase the contents of the file if it already exists. Passing\
    \ the 'a' argument tells Python you want to append to the end of an existing file.\n\
    \n# Writing to an empty file\n\n```\nfilename = 'programming.txt'\n\nwith open(filename,\
    \ 'w') as f:\n    f.write(\"I love programming!\")\n```\n\n# Writing multiple\
    \ lines to an empty file\n\n```\nfilename = 'programming.txt'\n\nwith open(filename,\
    \ 'w') as f:\n    f.write(\"I love programming!\\n\")\n    f.write(\"I love creating\
    \ new games.\\n\")\n```\n\n# Appending to a file\n\n```\nfilename = 'programming.txt'\n\
    \nwith open(filename, 'a') as f:\n    f.write(\"I also love working with data.\\\
    n\")\n    f.write(\"I love making apps as well.\\n\")\n```\n\n# File paths\n\n\
    When Python runs the open() function, it looks for the file in the same directory\
    \ where the program that's being executed is stored. You can open a file from\
    \ a subfolder using a relative path. You can also use an absolute path to open\
    \ any file on your system.\n\n# Opening a file from a subfolder\n\n```\nf_path\
    \ = \"text_files/alice.txt\"\n\nwith open(f_path) as f:\n    lines = f.readlines()\n\
    \nfor line in lines:\n    print(line.rstrip())\n```\n\n# File paths (cont.)\n\n\
    # Opening a file using an absolute path\n\n```\nf_path = \"/home/ehmatthes/books/alice.txt\"\
    \n\nwith open(f_path) as f:\n    lines = f.readlines()\n```\n\n# Opening a file\
    \ on Windows\n\nWindows will sometimes interpret forward slashes incorrectly.\
    \ If you run into this, use backslashes in your file paths.\n\n```\nf_path = \"\
    C:\\Users\\ehmatthes\\books\\alice.txt\"\n\nwith open(f_path) as f:\n    lines\
    \ = f.readlines()\n```\n\n# The try-except block\n\nWhen you think an error may\
    \ occur, you can write a try-except block to handle the exception that might be\
    \ raised. The try block tells Python to try running some code, and the except\
    \ block tells Python what to do if the code results in a particular kind of error.\n\
    \n# Handling the ZeroDivisionError exception\n\n```\ntry:\n    print(5/0)\nexcept\
    \ ZeroDivisionError:\n    print(\"You can't divide by zero!\")\n```\n\n# Handling\
    \ the FileNotFoundError exception\n\n```\nf_name = 'siddhartha.txt'\n\ntry:\n\
    \    with open(f_name) as f:\n        lines = f.readlines()\nexcept FileNotFoundError:\n\
    \    msg = f\"Can't find file: {f_name}.\"\n    print(msg)\n```\n\n# Knowing which\
    \ exception to handle\n\nIt can be hard to know what kind of exception to handle\
    \ when writing code. Try writing your code without a try block, and make it generate\
    \ an error. The traceback will tell you what kind of exception your program needs\
    \ to handle. It's a good idea to skim through the exceptions listed at docs.python.org/3/library/exceptions.html.\n\
    \n# Python Crash Course\n\nA Hands-on, Project-Based Introduction to Programming\n\
    \nnostarch.com/pythoncrashcourse2e\n\n![](img/12320e46b546a2862f3a411be6db7a27_12_0.png)"
