    \n```python\n# args and kwargs\ndef addition_fn(*args):\n    print(args)\n\naddition_fn(1,\
    \ 2, 3, 4, 5, 6)\n```\n\n```\n(1, 2, 3, 4, 5, 6)\n```\n\nGreat! Now we have a\
