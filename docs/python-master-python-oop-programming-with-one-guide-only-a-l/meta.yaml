    a professional web developer and programmer, therefore my goal is to teach you
    programming through perfect examples and clean and executable code. When I first
    started learning Python, I was afraid of how hard this language could be, but
    I can assure you that Python, like any other programming language, only requires
    patience, practice, and of course a good guide with practical examples. The goal
