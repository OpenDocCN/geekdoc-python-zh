- md: "## Python Functions\n\nWe have already seen a few of the built-in functions\
    \ in Python but we can create our own functions as well. Functions are a core\
    \ feature of Python. How we can create a function? Well, we can start using the\
    \ keyword ‘def’ which means define a function. After that, we need to name the\
    \ function:\n\n```python\n# functions\ndef hi_function():\n    print('Hi there')\n\
    ```\n\nAfter we name the function, we need to use these brackets () and colon\
    \ : that will tell the Interpreter that the function body will be in the following\
    \ line. But if we run the code above, we will not see the print message, why?\
    \ The functions need to be called in order to be executed so we can call the function\
    \ like this:\n\n```python\ndef hi_function():\n    print('Hi there')\n\nhi_function()\n\
    ```\n\n```\nHi there\n```\n\nWe make a function call outside the body using the\
    \ function name together with the brackets (). The functions are really useful\
    \ because once we create them, we can call them as many times as we want. This\
    \ is very handy because each function we write has a purpose and each function\
    \ must return something. Once the function is created, we don't have to repeat\
    \ and write the same code over and over again. This is called the DRY principle\
    \ and it means ‘Do Not Repeat Yourself’, so no unnecessary code or duplicates.\
    \ Another important thing you should know is that we cannot call a function before\
    \ it has been created or defined. Let's try to call a function before it has been\
    \ declared:\n\n![](img/9f2174949e81804f7192ec47968e0efb_212_0.png)\n\nThis will\
    \ throw a NameError because the function is not defined. The Python Interpreter\
    \ will throw the above error because it tries to call a function that does not\
    \ exist in the memory. Anytime we write a function name without the brackets,\
    \ we use that name to point to a place where that function is stored in the memory.\
    \ We can prove this if we print the function without the brackets:\n\n![](img/9f2174949e81804f7192ec47968e0efb_212_1.png)\n\
    \nAs we can see, the function called **hi_function** is stored somewhere in the\
    \ memory at this location: 0x7fdd9e7b0280. But when we write the hi_function()\
    \ with brackets, then the interpreter knows that we are trying to execute the\
    \ function body.\n\n## Function Arguments and Parameters\n\nThe functions we have\
    \ created so far were very easy because they only had one message to print. But\
    \ functions exist to do much more complex things. The hi_function() is very simple\
    \ because it does not take any parameters. We can add parameters inside the function\
    \ brackets. The name of these parameters can be anything and we can pass one or\
    \ more parameters but they need to be separated by a comma. Let us add one parameter\
    \ inside the function:\n\n```python\ndef hi_function1(name):\n    print('Hi there')\n\
    ```\n\nThis means that the hi_function can now receive one parameter called name.\
    \ We can add multiple parameters if we separate them with a comma:\n\n```python\n\
    def hi_function2(name, lastname):\n    print('Hi there')\n```\n\nThese two parameters\
    \ can now be used in the function body as local variables:\n\n```python\ndef hi_function3(name,\
    \ lastname):\n    print(f'Hi there {name} {lastname}')\n```\n\nNow we are using\
    \ the formatted ‘f’ string to print the values of these local variables. But where\
    \ will the values of these two parameters/variables come from? We can pass them\
    \ into the function during the function call. Here is a function call without\
    \ any parameters:\n\n```python\nhi_function()\n```\n\nLet’s pass the two arguments:\n\
    \n```python\nhi_function3('Rick', 'Sekuloski')\n```\n\nWhy have I used two different\
    \ terms (parameters and arguments) for the same thing? In the function definition,\
    \ they are called parameters, and arguments are called when we call/invoke the\
    \ function. They are the same thing and developers always mix them. But this is\
    \ not a big deal. Let’s run the function and see the output:\n\n```python\ndef\
    \ hi_function3(name,lastname):\n    print(f'Hi there {name} {lastname}')\n\nhi_function3('Rick','Sekuloski')\n\
    ```\n\n```\nHi there Rick Sekuloski\n```\n\nSo the arguments are the actual values\
    \ we send to the function and the parameters are the variables we use to access\
    \ those values in the function body. Parameters are used during the function declaration\
    \ and arguments during the function call. You will read somewhere that the function\
    \ call is called function invokation. So these are the terms I want you to learn\
    \ from this section:\n\n- Function declaration\n- Function call\n- Function invokation\
    \ or function call\n- Function arguments\n- Function parameters\n- Defining a\
    \ function\n\nI hope you now realize that the functions can do some calculations\
    \ based on the arguments we supply. We can call the same function with different\
    \ arguments and the output will always be different:\n\n```python\ndef hi_function3(name,lastname):\n\
    \    print(f'Hi there {name} {lastname}')\n\nhi_function3('Rick','Sekuloski')\n\
    hi_function3('Joseph','Smith')\nhi_function3('Abraham','Lincoln')\nhi_function3('Morgan','Freeman')\n\
    ```\n\n```\nHi there Rick Sekuloski\nHi there Joseph Smith\nHi there Abraham Lincoln\n\
    Hi there Morgan Freeman\n```\n\n## Positional and Keyword Arguments\n\nIn this\
    \ section, we will discuss the importance of positional and keyword arguments\
    \ in Python. The positional arguments as the name suggest are arguments that need\
    \ to be written in the right order or position. This means that the argument/arguments\
    \ must be provided in the correct position and order if we want to have the desired\
    \ function output. Let’s look at the previous function example again and modify\
    \ it slightly so it can take 3 arguments and 3 parameters:\n\n```python\ndef hi_function4(name,lastname,\
    \ age):\n    print(f'Hi there {name} {lastname}. Are you {age} old?')\n\nhi_function4('Rick','Sekuloski',\
    \ 33)\n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_215_0.png)\n\nAs you can\
    \ see from the figure above, we have a function that takes 3 values or arguments\
    \ and the last one is the person’s age. So in this case the order of the arguments\
    \ matters, for example, let us switch the lastname and age:\n\n![](img/9f2174949e81804f7192ec47968e0efb_215_1.png)\n\
    \nSo we have invoked the function with the name first, then age, and finally,\
    \ the lastname. The function will still work but the output will not make any\
    \ sense. Therefore, positional arguments are very important because their order\
    \ or position matters. What are the keyword arguments in Python? Keyword arguments\
    \ don’t care about the position because the arguments are labeled with a keyword.\
    \ Let’s create an example where we use keyword arguments:\n\n```python\ndef hi_function5(name,\
    \ lastname, age):\n    print(f'Hi there {name}{lastname}. Are you {age} old?')\n\
    \nhi_function5(name='Rick', lastname='Sekuloski', age=33)\n```\n\nI have to give\
    \ the functions different names because I save them in a file. Inside the file,\
    \ you cannot have functions with the same name because they will throw an error.\
    \ So let’s run the function:\n\n![](img/9f2174949e81804f7192ec47968e0efb_216_0.png)\n\
    \nLet us focus on the function invocation:\n\n```python\nhi_function5(name='Rick',\
    \ lastname='Sekuloski', age=33)\n```\n\nIn the function call, we have a keyword\
    \ that you can consider as a variable name and we assigned a value to that keyword.\
    \ If we look at the output, we can see that the order is correct, but let’s change\
    \ the order of the keywords in the function call and run it again:\n\n```python\n\
    hi_function5(name='Rick', age=33, lastname='Sekuloski')\n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_216_1.png)\n\
    \nThe output is correct again because of the keyword arguments. Keyword arguments\
    \ are very good because they will match the parameters in the function definition.\
    \ Personally, this is not the best practice, our function call looks messy. The\
    \ function call was so much cleaner without these keywords. This is everything\
    \ you should know about positional and keyword arguments in Python.\n\n## Default\
    \ Arguments and Parameters\n\nIn this section, we will talk about what default\
    \ parameters and arguments are. Default parameters will allow us to give default\
    \ values right in the function declaration. Please consider this example:\n\n\
    ```python\n# name, lastname are parameters\n\ndef hi_function6(name='John', lastname='Doe',\
    \ age=30):\n    print(f'Hi there {name} {lastname}. Are you {age} old?')\n```\n\
    \nIf we look closely, we will notice that this looks like the keyword arguments\
    \ we wrote in the function call, right? Yes, that is correct and this is another\
    \ reason why I don't recommend using the keyword arguments because most of the\
    \ time developers mix them with default parameters. The default parameters are\
    \ useful because now the parameters have default or starting value. This is great\
    \ because if we miss adding a value in the function call, there will be still\
    \ an output. Let's call the function with 3 arguments first:\n\n![](img/9f2174949e81804f7192ec47968e0efb_217_0.png)"
  mdcn: "## Python 函数\n\n我们已经见过一些 Python 的内置函数，但我们也可以创建自己的函数。函数是 Python 的核心特性。我们如何创建一个函数呢？我们可以使用关键字\
    \ `def`，它表示定义一个函数。之后，我们需要为函数命名：\n\n```python\n# functions\ndef hi_function():\n\
    \    print('Hi there')\n```\n\n为函数命名后，我们需要使用括号 `()` 和冒号 `:`，这会告诉解释器函数体将在下一行开始。但如果我们运行上面的代码，将看不到打印的消息，为什么呢？函数需要被调用才能执行，所以我们可以这样调用函数：\n\
    \n```python\ndef hi_function():\n    print('Hi there')\n\nhi_function()\n```\n\
    \n```\nHi there\n```\n\n我们在函数体外部使用函数名加括号 `()` 来进行函数调用。函数非常有用，因为一旦创建，我们就可以根据需要调用任意多次。这非常方便，因为我们编写的每个函数都有其目的，并且每个函数都必须返回某些内容。一旦函数被创建，我们就不必一遍又一遍地重复编写相同的代码。这被称为\
    \ DRY 原则，意思是“不要重复自己”，即避免不必要的代码或重复。另一个你应该知道的重要事项是，我们不能在函数被创建或定义之前调用它。让我们尝试在声明之前调用一个函数：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_212_0.png)\n\n这将抛出一个 `NameError`，因为该函数未定义。Python\
    \ 解释器会抛出上述错误，因为它试图调用一个在内存中不存在的函数。任何时候我们写一个不带括号的函数名，我们都是用该名称来指向该函数在内存中的存储位置。我们可以通过打印不带括号的函数来证明这一点：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_212_1.png)\n\n如我们所见，名为 **hi_function**\
    \ 的函数存储在内存中的某个位置：0x7fdd9e7b0280。但当我们写 `hi_function()` 带括号时，解释器就知道我们试图执行函数体。\n\n\
    ## 函数参数与形参\n\n到目前为止，我们创建的函数都非常简单，因为它们只打印一条消息。但函数的存在是为了完成更复杂的事情。`hi_function()`\
    \ 非常简单，因为它不接受任何参数。我们可以在函数括号内添加参数。这些参数的名称可以是任何东西，我们可以传递一个或多个参数，但它们需要用逗号分隔。让我们在函数内添加一个参数：\n\
    \n```python\ndef hi_function1(name):\n    print('Hi there')\n```\n\n这意味着 `hi_function`\
    \ 现在可以接收一个名为 `name` 的参数。如果用逗号分隔，我们可以添加多个参数：\n\n```python\ndef hi_function2(name,\
    \ lastname):\n    print('Hi there')\n```\n\n这两个参数现在可以在函数体中作为局部变量使用：\n\n```python\n\
    def hi_function3(name, lastname):\n    print(f'Hi there {name} {lastname}')\n\
    ```\n\n现在我们使用格式化的 `f` 字符串来打印这些局部变量的值。但这两个参数/变量的值从哪里来呢？我们可以在函数调用时将它们传递进去。这是一个不带任何参数的函数调用：\n\
