    \ Libraries list:\n\n![](img/9f2174949e81804f7192ec47968e0efb_407_0.png)\n\nYou\
    \ can also find them if you can navigate to ‘python 3.10 library root.’ Yours\
    \ might be a bit different, but click on it and it will expand and give us a list\
    \ of installed packages and modules. As an exercise, let’s import some of the\
    \ existing modules like the math module, and try to print where it comes from:\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_407_1.png)\n\nFrom the figure above,\
    \ we can see the actual path where this module is coming from. Another way to\
    \ display the list of the available modules is to use the help command:\n\n```\n\
    help('modules')\n```\n\nHere is part of the modules list:\n\n```\nPlease wait\
    \ a moment while I gather a list of all available modules...\n\n/Users/rick/PycharmProjects/chapter5/venv/lib/python3.10/site-packages/distutils/_distutils.py:36:\
    \ UserWarning: Setuptools is replacing distutils.\n  warnings.warn(\"Setuptools\
    \ is replacing distutils.\")\n__future__          _testmultiphase   getpass  \
    \       sched\n_abc                _thread          gettext         secrets\n\
    _aix_support        _threading_local glob            select\n_ast            \
    \    _tkinter         graphlib        selectors\n_asyncio            _tracemalloc\
    \     grp             setuptools\n_bisect             _uuid            gzip  \
    \          shelve\n_blake2             _virtualenv      hashlib         shlex\n\
    _bootsubprocess     _warnings        heapq           shutil\n_bz2            \
    \    _weakref         hmac            signal\n_codecs             _weakrefset\
    \      html            site\n_codecs_cn          _xxsubinterpreters http     \
    \     smtpd\n_codecs_hk          _xxtestfuzz      idlelib         smtplib\n_codecs_iso2022\
    \     _zoneinfo        imaplib         sndhdr\n_codecs_jp          abc       \
    \       imghdr          socket\n_codecs_kr          aifc             imp     \
    \        socketserver\n_codecs_tw          antgravity       importlib       sqlite3\n\
    _collections         argparse         inspect         sre_compile\n_collections_abc\
    \    array            io              sre_constants\n```\n\nBack to the ‘math’\
    \ module, if you are interested to know what functionality this module offers,\
    \ we can use the help keyword again and provide the name of the module as an argument\
    \ like this:\n\n```\nhelp(math)\n```\n\nThe help(math) will give us a complete\
    \ picture of what is in this module. If we are interested in knowing only the\
    \ methods in this module, we can use the dir() function:\n\n```\nprint(dir(math))\n\
    ```\n\nHere is the entire list:\n\n```\n/Users/rick/PycharmProjects/chapter5/venv/bin/python\n\
    /Users/rick/PycharmProjects/chapter5.2/main_file.py\n['__doc__', '__file__', '__loader__',\
    \ '__name__',\n '__package__', '__spec__', 'acos', 'acosh', 'asin',\n 'asinh',\
    \ 'atan', 'atan2', 'atanh', 'ceil', 'comb',\n 'copysign', 'cos', 'cosh', 'degrees',\
    \ 'dist', 'e', 'erf',\n 'erfc', 'exp', 'expm1', 'fabs', 'factorial', 'floor',\n\
    \ 'fmod', 'frexp', 'fsum', 'gamma', 'gcd', 'hypot', 'inf',\n 'isclose', 'isfinite',\
    \ 'isinf', 'isnan', 'isqrt', 'lcm',\n 'ldexp', 'lgamma', 'log', 'log10', 'log1p',\
    \ 'log2', 'modf',\n 'nan', 'nextafter', 'perm', 'pi', 'pow', 'prod',\n 'radians',\
    \ 'remainder', 'sin', 'sinh', 'sqrt', 'tan',\n 'tanh', 'tau', 'trunc', 'ulp']\n\
    ```\n\nLet’s use some of these methods, for example, the log() that will return\
    \ the natural logarithm of different numbers:\n\n```\nprint(math.log(2.35657))\n\
    print(math.log(3))\nprint(math.log(1))\n```\n\nThe output will be:\n\n```\n0.8572071720115416\n\
    1.0986122886681098\n0.0\n```\n\nWe can even use the math.pow() method so it will\
    \ return the value of x raised to the power of n.\n\n```\nprint(math.pow(3, 3))\n\
    ```\n\nOutput:\n\n```\n27.0\n```\n\nAnd finally, let’s find the square root of\
    \ a number:\n\n```\nprint(math.sqrt(9))\nprint(math.sqrt(25))\nprint(math.sqrt(16))\n\
    ```\n\nOutput:\n\n```\n3.0\n5.0\n4.0\n```\n\n## The biggest reason why Python\
    \ is a great programming language\n\nSo far, we have learned how we can create\
    \ modules and packages, and how to import these modules from the packages as well.\
    \ In the previous sections, we learned about the built-in library of modules that\
    \ comes installed with Python. But there is one more thing I want to mention that\
    \ makes Python one of the greatest languages ever. These are the millions of python\
    \ modules that are created by various Python developers and shared so we don’t\
    \ need to waste time creating them. These modules can be downloaded and imported\
    \ into our projects because they are developed by the Python community. Python\
    \ developers from all around the world created different modules that we can use.\
    \ How can we use other developers’ code? You can use the ‘pip install’ command\
    \ that will enable you to use these modules and pieces of code in your projects\
    \ in seconds. But where I can find and read more about what other developers created\
    \ and shared? There is a specific website called ‘pypi.org’ that is Python Package\
    \ Index. **PyPi** is a repository of software for Python programming languages\
    \ that helps us to find and install software that has been developed by the Python\
    \ community. Here is the link and screenshot to the actual Python Package Index\
    \ (PyPi):\n\n![](img/9f2174949e81804f7192ec47968e0efb_412_0.png)\n\n![](img/9f2174949e81804f7192ec47968e0efb_412_1.png)\n\
    \n**The Python Package Index (PyPI) is a repository of software for the Python\
    \ programming language.**\n\nPyPI helps you find and install software developed\
    \ and shared by the Python community. [Learn about installing packages](url).\n\
    \nPackage authors use PyPI to distribute their software. [Learn how to package\
    \ your Python code for PyPI](url).\n\n[https://pypi.org/](https://pypi.org/)\n\
    \nAt the moment, we have 611,137 users and over 390,352 projects, and these numbers\
    \ will only grow in the future. This shows you the real power of Python. For example,\
    \ if you want your website to be faster and all the images to be optimized, you\
    \ can search if something like that exists in pypi:\n\n![](img/9f2174949e81804f7192ec47968e0efb_413_0.png)\n\
    \nYou will probably have a list of different projects and all you need to do is\
    \ find a package that suits your project and install it. Not all of the packages\
    \ will be suitable and maintained regularly so you need to decide on which of\
    \ the packages is the best fit for your project. I have shown you these two websites\
    \ (Python Module Index Documentation and PyPi) so you can find modules and packages\
    \ that will help you build your program faster.\n\n## Install Python Packages\
    \ using PyPi repository\n\nWe know that **PyPi** is a repository website where\
    \ we can find, install, and even publish Python packages. Just to give you a demonstration\
    \ of how to find and install a package using PyCharm, I have done a very simple\
    \ Google search and I have found something very interesting. The package that\
    \ we will install is funny but useless, meaning it will only tell us Python jokes\
    \ and nothing else. There are multiple packages like this on Google. When you\
    \ type Fun/Weird Python Packages, you will find very interesting packages and\
    \ experiments. The package that we are going to install is called **pyjokes**.\
    \ Let us open the website [pypi.org](https://pypi.org/) and search for the project\
    \ called **pyjokes** on the search bar like this:\n\n![](img/9f2174949e81804f7192ec47968e0efb_414_0.png)\n\
    \nThis will list all of the projects but make sure you click on the one that says\
    \ ‘One-line Jokes for programmers (jokes as a service)’:\n\n![](img/9f2174949e81804f7192ec47968e0efb_414_1.png)\n\
    \nAs you can see, the pyjokes had a couple of versions and at the moment the latest\
    \ version is 0.6. If you open this package, you can find additional information:\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_415_0.png)\n\nFrom this page, you can\
    \ read more about this project, how to install the pyjokes module with pip, and\
    \ how to use it. You can download the files if you want, or visit the GitHub page.\
    \ GitHub is like a Facebook (meta) or Twitter for programmers. It’s a social network\
    \ where you can upload your work so the other developers can clone and download\
    \ it. You can also see some statistics, for example, how many people liked your\
    \ project (there will be stars) or how many people forked and used your code in\
    \ their own projects. There are different ways we can install this package/module,\
    \ and first I will try to show you how you can do it with PyCharm. I have created"
  mdcn: "当我们使用 PyCharm 创建一个新项目时，在项目中点击“外部库”列表：\n\n![](img/9f2174949e81804f7192ec47968e0efb_407_0.png)\n\
    \n你也可以通过导航到‘python 3.10 library root’来找到它们。你的路径可能略有不同，但点击它，它会展开并显示已安装的包和模块的列表。作为一个练习，让我们导入一些现有的模块，比如\
    \ `math` 模块，并尝试打印出它的来源位置：\n\n![](img/9f2174949e81804f7192ec47968e0efb_407_1.png)\n\
    \n从上图中，我们可以看到这个模块的实际来源路径。另一种显示可用模块列表的方法是使用 `help` 命令：\n\n```\nhelp('modules')\n\
    ```\n\n以下是模块列表的一部分：\n\n```\nPlease wait a moment while I gather a list of all\
    \ available modules...\n\n/Users/rick/PycharmProjects/chapter5/venv/lib/python3.10/site-packages/distutils/_distutils.py:36:\
    \ UserWarning: Setuptools is replacing distutils.\n  warnings.warn(\"Setuptools\
    \ is replacing distutils.\")\n__future__          _testmultiphase   getpass  \
    \       sched\n_abc                _thread          gettext         secrets\n\
    _aix_support        _threading_local glob            select\n_ast            \
    \    _tkinter         graphlib        selectors\n_asyncio            _tracemalloc\
    \     grp             setuptools\n_bisect             _uuid            gzip  \
    \          shelve\n_blake2             _virtualenv      hashlib         shlex\n\
    _bootsubprocess     _warnings        heapq           shutil\n_bz2            \
    \    _weakref         hmac            signal\n_codecs             _weakrefset\
    \      html            site\n_codecs_cn          _xxsubinterpreters http     \
    \     smtpd\n_codecs_hk          _xxtestfuzz      idlelib         smtplib\n_codecs_iso2022\
    \     _zoneinfo        imaplib         sndhdr\n_codecs_jp          abc       \
    \       imghdr          socket\n_codecs_kr          aifc             imp     \
    \        socketserver\n_codecs_tw          antgravity       importlib       sqlite3\n\
    _collections         argparse         inspect         sre_compile\n_collections_abc\
    \    array            io              sre_constants\n```\n\n回到 `math` 模块，如果你有兴趣了解该模块提供了哪些功能，我们可以再次使用\
    \ `help` 关键字，并将模块名作为参数提供，像这样：\n\n```\nhelp(math)\n```\n\n`help(math)` 会给我们一个关于该模块内容的完整概览。如果我们只对该模块中的方法感兴趣，可以使用\
    \ `dir()` 函数：\n\n```\nprint(dir(math))\n```\n\n以下是完整的列表：\n\n```\n/Users/rick/PycharmProjects/chapter5/venv/bin/python\n\
    /Users/rick/PycharmProjects/chapter5.2/main_file.py\n['__doc__', '__file__', '__loader__',\
    \ '__name__',\n '__package__', '__spec__', 'acos', 'acosh', 'asin',\n 'asinh',\
    \ 'atan', 'atan2', 'atanh', 'ceil', 'comb',\n 'copysign', 'cos', 'cosh', 'degrees',\
    \ 'dist', 'e', 'erf',\n 'erfc', 'exp', 'expm1', 'fabs', 'factorial', 'floor',\n\
    \ 'fmod', 'frexp', 'fsum', 'gamma', 'gcd', 'hypot', 'inf',\n 'isclose', 'isfinite',\
    \ 'isinf', 'isnan', 'isqrt', 'lcm',\n 'ldexp', 'lgamma', 'log', 'log10', 'log1p',\
    \ 'log2', 'modf',\n 'nan', 'nextafter', 'perm', 'pi', 'pow', 'prod',\n 'radians',\
    \ 'remainder', 'sin', 'sinh', 'sqrt', 'tan',\n 'tanh', 'tau', 'trunc', 'ulp']\n\
    ```\n\n让我们使用其中的一些方法，例如 `log()`，它将返回不同数字的自然对数：\n\n```\nprint(math.log(2.35657))\n\
    print(math.log(3))\nprint(math.log(1))\n```\n\n输出将是：\n\n```\n0.8572071720115416\n\
    1.0986122886681098\n0.0\n```\n\n我们甚至可以使用 `math.pow()` 方法，它将返回 x 的 n 次方的值。\n\n\
    ```\nprint(math.pow(3, 3))\n```\n\n输出：\n\n```\n27.0\n```\n\n最后，让我们求一个数的平方根：\n\n\
    ```\nprint(math.sqrt(9))\nprint(math.sqrt(25))\nprint(math.sqrt(16))\n```\n\n\
    输出：\n\n```\n3.0\n5.0\n4.0\n```\n\n## Python 成为一门优秀编程语言的最大原因\n\n到目前为止，我们已经学习了如何创建模块和包，以及如何从包中导入这些模块。在前面的章节中，我们学习了随\
    \ Python 一起安装的内置模块库。但还有一点我想提及，它使得 Python 成为有史以来最伟大的语言之一。那就是由各种 Python 开发者创建并共享的数百万个\
    \ Python 模块，这样我们就不必浪费时间从头创建它们。这些模块可以被下载并导入到我们的项目中，因为它们是由 Python 社区开发的。来自世界各地的\
    \ Python 开发者创建了我们可以使用的不同模块。我们如何使用其他开发者的代码？你可以使用 `pip install` 命令，它能让你在几秒钟内就在你的项目中使用这些模块和代码片段。但我在哪里可以找到并了解更多关于其他开发者创建和共享的内容呢？有一个专门的网站叫做\
    \ `pypi.org`，即 Python 包索引。**PyPi** 是一个 Python 编程语言的软件仓库，它帮助我们查找和安装由 Python 社区开发的软件。以下是\
    \ Python 包索引 (PyPi) 的实际链接和截图：\n\n![](img/9f2174949e81804f7192ec47968e0efb_412_0.png)\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_412_1.png)\n\n**Python 包索引 (PyPI) 是一个面向\
    \ Python 编程语言的软件仓库。**\n\nPyPI 帮助你查找和安装由 Python 社区开发和共享的软件。[了解如何安装包](url)。\n\n\
    包作者使用 PyPI 来分发他们的软件。[了解如何为 PyPI 打包你的 Python 代码](url)。\n\n[https://pypi.org/](https://pypi.org/)\n\
    \n目前，我们拥有 611,137 名用户和超过 390,352 个项目，并且这些数字未来只会增长。这向你展示了 Python 的真正力量。例如，如果你想让你的网站更快，所有图片都得到优化，你可以搜索\
    \ pypi 上是否存在这样的东西：\n\n![](img/9f2174949e81804f7192ec47968e0efb_413_0.png)\n\n\
    你可能会看到一个包含不同项目的列表，你需要做的就是找到一个适合你项目的包并安装它。并非所有的包都适合并且会定期维护，所以你需要决定哪个包最适合你的项目。我向你展示了这两个网站（Python\
    \ 模块索引文档和 PyPi），这样你就可以找到帮助你更快构建程序的模块和包。\n\n## 使用 PyPi 仓库安装 Python 包\n\n我们知道 **PyPi**\
    \ 是一个仓库网站，我们可以在那里查找、安装甚至发布 Python 包。只是为了向你演示如何使用 PyCharm 查找和安装包，我进行了一个非常简单的 Google\
    \ 搜索，并发现了一些非常有趣的东西。我们将安装的这个包很有趣但没什么用，意思是它只会告诉我们 Python 笑话，没有别的。Google 上有很多这样的包。当你输入“Fun/Weird\
    \ Python Packages”时，你会找到非常有趣的包和实验。我们将要安装的包叫做 **pyjokes**。让我们打开网站 [pypi.org](https://pypi.org/)\
    \ 并在搜索栏中搜索名为 **pyjokes** 的项目，像这样：\n\n![](img/9f2174949e81804f7192ec47968e0efb_414_0.png)\n\
    \n这将列出所有项目，但请确保你点击那个写着“One-line Jokes for programmers (jokes as a service)”的条目：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_414_1.png)\n\n正如你所见，pyjokes 已经有几个版本，目前最新的版本是\
    \ 0.6。如果你打开这个包，可以找到额外的信息：\n\n![](img/9f2174949e81804f7192ec47968e0efb_415_0.png)\n\
    \n在这个页面上，你可以阅读更多关于这个项目的信息、如何使用 pip 安装 pyjokes 模块以及如何使用它。你可以下载文件，或者访问 GitHub 页面。GitHub\
    \ 对程序员来说就像是 Facebook (Meta) 或 Twitter。它是一个社交网络，你可以在那里上传你的作品，以便其他开发者克隆和下载。你还可以看到一些统计数据，例如有多少人喜欢了你的项目（会有点赞），或者有多少人复刻并在他们自己的项目中使用了你的代码。我们可以通过多种方式安装这个包/模块，首先我将向你展示如何使用\
    \ PyCharm 来完成。我已经创建"
