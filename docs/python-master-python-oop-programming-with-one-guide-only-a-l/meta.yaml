    Let’s explore some of the very useful built-in functions you will use as a developer.
    The first one is called len(), which stands for length:


    ```python

    len()

    ```


    This built-in function will return the length or the number of items of an object.
    We still haven’t covered what Objects are in Python but they are the most important
    thing because basically everything is an Object in Python. The argument that we
    pass inside the len() function can be a sequence like a String. Because we learned
    a lot about String data type, we can use this function and pass the string as
    an argument like this:


    ```python

    # len() - returns the length

    text = ''A string''

    print(len(text))

    ```


    If we run the code, the output will be 8:


    ![](img/9f2174949e81804f7192ec47968e0efb_83_0.png)


    This means that the len() function will give us the actual length starting the
    count from 1 not from zero like with the indexes.


    ![](img/9f2174949e81804f7192ec47968e0efb_83_1.png)


    As you can see, the function we are using have only one purpose and that is to
    return some value. The len() function is used to return the actual length of an
    Object like the String. We have used the term functions but I have not explained
    what functions are. You can think of functions as a unit that includes one or
    more lines of code or statements. The purpose of a function is to run a piece
    of code with the data we provide. The data we provide is called arguments, and
    we are passing them directly into the function. As we know, functions have parenthesis
    like this (). Inside the parenthesis is where we pass the arguments or the data.
    We have seen a few built-in functions but before we start passing arguments, we
    need to know what that function accepts because we cannot pass any data we can
    think of. We can create our own functions as well and then we know exactly what
    data we need to pass but for the built-in functions we need to read the documentation
    first and only then we can start using them with confidence. We will learn how
    to create our own functions, how to define them, and how to call them, but at
    this stage, we just need to know what they are. To summarize, when we use a function,
    we need to know what arguments/data we should provide, for example, here is the
    round function:


    ```python

    round(number[, ndigits])

    ```


    This round() function accepts two arguments (number, ndigits) and if you read
    the Python documentation, you will know that the second argument (ndigits) can
    be omitted or is an optional argument. A function call is when we use the function
    name with the arguments:


    ![](img/9f2174949e81804f7192ec47968e0efb_85_0.png)


    The functions that are created by us are not built-in functions, they are called
    user-defined functions. Let’s talk about methods. What are methods in Python?
    Methods in Python are the exact same thing as functions, there is no difference
