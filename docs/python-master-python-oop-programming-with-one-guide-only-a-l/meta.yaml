  mdcn: "我们得到一个错误信息，提示我们传递了3个参数，但函数 **years_old()** 仅接受两个位置参数。这很好，因为它将帮助我解释Python中的\
    \ *args 和 **kwargs。*args 语法代表‘非关键字参数’，**kwargs 代表‘关键字参数’，但它们为何有用呢？嗯，当我们不知道需要传递给函数的确切参数数量时，可以使用\
    \ *args 作为参数。这将防止程序像上图那样崩溃，所以当不确定应传递多少个参数给函数时，它们非常有用。让我们通过使用星号 *args 来更改函数声明。这意味着我们可以使用任意数量的参数。让我们编写一个新函数来计算数字之和：\n\
    \n```python\n# args and kwargs\ndef addition_fn(*args):\n    print(*args)\n\n\
    addition_fn(1, 2, 3, 4, 5, 6)\n```\n\n如您所见，**addition_fn** 有6个参数，是从1到6的数字，但在函数声明中，我们仅将\
    \ *args 用作单个参数。在右侧，我们可以看到传递给 addition_fn 的参数是通过 *args 访问的。这使我们能够调用名为 sum() 的内置Python函数。该函数将返回来自可迭代集合（如元组）中所有项的和。但\
    \ *args 不是一个元组。使用 *args 的一种方式是省略前面的星号，如下所示：\n\n```python\n# args and kwargs\n\
    def addition_fn(*args):\n    print(args)\n\naddition_fn(1, 2, 3, 4, 5, 6)\n```\n\
    \n```\n(1, 2, 3, 4, 5, 6)\n```\n\n很好！现在我们得到了一个元组作为输出，因此我们可以毫无问题地调用 sum() 函数。让我们这样做并检查输出：\n\
    \n```python\n# args and kwargs\ndef addition_fn(*args):\n    return sum(args)\n\
    \nresult = addition_fn(1, 2, 3, 4, 5, 6)\nprint(result)\n```\n\n```\n21\n```\n\
    \n正如我们所见，我们的逻辑有效，我们将得到和为21。总而言之，当我们不确定函数将接受多少个参数时，使用 *args。我们可以为 *args 使用不同的名称，例如\
    \ *nums。现在让我们关注 **kwargs。Kwargs 是一个关键字参数字典，双星号 '**' 允许我们传递任意数量的关键字参数。我们可以在函数调用中添加关键字，并在函数体内以字典形式访问它们：\n\
    \n```python\n# args and kwargs\ndef addition_fn1(*args, **kwargs):\n    print(kwargs)\n\
    \    return sum(args)\n\nresult1 = addition_fn1(1, 2, 3, 4, 5, 6, n7=7, n8=8)\n\
    print(result1)\n```\n\n```\n{'n7': 7, 'n8': 8}\n21\n```\n\n但是，我们如何从 kwargs 中访问项及其值呢？我们可以使用循环来迭代字典项，然后使用\
    \ .values() 方法获取值：\n\n```python\n# args and kwargs\ndef addition_fn1(*args, **kwargs):\n\
    \    result = 0\n    for item in kwargs.values():\n        result += item\n  \
    \  return sum(args) + result\n\nresult1 = addition_fn1(1, 2, 3, 4, 5, 6, n7=7,\
    \ n8=8)\nprint(result1)\n```\n\n```\n36\n```\n\n如您所见，函数调用可以使用 *args 语法接受任意数量的位置参数，但也可以接受命名关键字参数。但这还不是您需要知道的一切，因为在使用参数时有一个很好的规则需要遵循。规则是：如果在同一个函数中使用所有这些参数，那么它们的顺序非常重要。优先级最高的是普通参数，然后是\
    \ *args，接着是默认参数，最后是 **kwargs。现在是时候总结一下我们可以用 *args 和 **kwargs 做什么了：\n\n1. *args\
    \ 和 **kwargs 用于使函数参数列表灵活，它们是允许函数接受任意数量参数的特殊关键字\n2. *args 表示非关键字参数，它们出现在函数定义中的\
    \ **kwargs 之前\n3. **kwargs 是关键字参数，它们像字典一样在函数中使用\n4. 如果你愿意，可以使用不同的名称；args 和 kwargs\
    \ 只是约定，而不是强制要求\n\n## 作用域\n\n作用域在Python中很重要。作用域指的是我们对变量的访问权限。当我们尝试访问一个尚未创建的变量时，会得到如下错误：\n\
    \n```python\n#scope\nprint(result)\n```\n\n```\nTraceback (most recent call last):\n\
    \  File \"main.py\", line 2, in <module>\n    print(result)\nNameError: name 'result'\
    \ is not defined\n```\n\n这是一个 **NameError**，因为结果变量甚至没有定义，而我们正尝试访问它。发生这种情况是因为该变量不存在于该作用域中。这就是我们需要了解不同作用域存在的原因。如果在Python中，我们在任何函数外部声明并初始化一个变量，这意味着该变量属于全局作用域。全局作用域就是提供该变量访问权限的作用域。任何人都可以访问在全局作用域中声明的变量。让我们在全局作用域中声明一个变量，并创建一个函数来打印该变量：\n\
    \n```python\n# local variable\nresult = 14.4\n\ndef num_func():\n    print(result)\n\
    \nnum_func()\n```\n\n如我们所见，名为 **result** 的变量属于其被声明并绑定到值14.4的全局作用域。由于全局作用域，我们可以安全地在函数体内使用此变量。但是Python中的函数有自己的块作用域。函数作用域意味着我们在函数体内定义的任何内容都只能在该函数内部访问和使用。如果我们有在函数中声明的变量，并尝试在函数体外部打印它们，我们将得到错误。这里是一个例子：\n\
    \n```python\ndef num_func1():\n    num1 = 11.4\n    print(num1)\n\nnum_func1()\n\
    \nprint(num1)\n```\n\n第8行是我们尝试打印在名为 num_func1() 的函数内部声明的变量。这将导致解释器用红色下划线标记。如果我们运行此代码，我们将得到NameError，因为\
    \ num1 在全局作用域中未定义。请你猜测以下代码的输出：\n\n```python\n#guess the output\nx = 1\ndef trick_me(x):\n\
    \    x = 4\n    return x\n```\n\n```python\nprint(x)\nprint(trick_me(5))\n```\n\
    \n如果你无法得出答案，以下是输出：\n\n如您在第8行所见，我们正在打印在第2行声明的变量 x 的值。不要与我们传递给函数的参数 x 混淆，因为我们本可以给这个参数起不同的名字。在第9行，我打印\
    \ trick_me 的值，其中我传递了一个值为5的参数，但这个参数不会产生任何差异，因为第5行将为该函数创建一个局部变量，并将该变量重新赋值为新值4。我之所以说是局部变量，是因为该变量对于函数来说是局部的。在第6行，我们返回\
    \ x 的最后一个值，该值将是4。这就是为什么函数 trick_me 的输出将是4。\n\n## 关于作用域的更多信息\n\n在上一节中，我提到函数参数是该函数的局部变量。它们属于定义它们的函数，而不属于全局作用域：\n\
    \n```python\n#global and function scope\nx = 1\n\ndef trick_me(x):\n    #local\
    \ variable\n    x = 4\n    return x\n\nprint(x)\nprint(trick_me(5))\n```\n\n如果你是初学者，另一个你会遇到的有趣错误是\
    \ UnboundLocalError。这个错误是什么意思？让我用这个例子来解释：\n\n```python\n#global and function scope\n\
    x = 1\n\ndef trick_me():\n    x += 4\n    return x\n\nprint(trick_me())\n```\n\
    \n```\nTraceback (most recent call last):\n  File \"main.py\", line 8, in <module>\n\
    \    print(trick_me())\n  File \"main.py\", line 5, in trick_me\n    x += 4\n\
    UnboundLocalError: local variable 'x' referenced before assignment\n```"
