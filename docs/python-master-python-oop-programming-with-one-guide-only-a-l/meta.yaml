    \ These are small things that you should know and they are very important. In\
    \ the figure below, you will see all of the keywords that we learned so far:\n\
    \nIf we run the following code, the output will be:\n\nBecause the if-statement\
    \ condition is evaluated to true, the if-block will be executed. When the last\
    \ statement in the if-block is executed, the Interpreter will go out of the if-block\
    \ and execute the next print(). But what if we change the `is_developer` variable\
    \ to have a Boolean False value, what will happen?\n\nAs we can see, the output\
    \ is different. The if-statement condition will be evaluated to False, therefore\
    \ the body of the if-block will never be executed. This means the statement/statements\
    \ in the if-block will never run if the condition is evaluated to False.\n\n###\
    \ if-else statement\n\nThe if-else statement is when we want to set an alternative\
    \ path, for example, if the condition is evaluated to true, execute the statement/statements\
    \ inside the body or if the condition is evaluated to False, execute the statements\
    \ in the else clause. The syntax of the if-else statement is:\n\n```\nif < expr\
    \ >:\n    <statement(s) >\nelse:\n    <statement(s) >\n```\n\nLet’s rewrite the\
    \ previous if-block example to include the else clause, but this time we need\
    \ to make the condition be evaluated to False:\n\n```\n# if-else\nis_developer\
    \ = False\n```"
