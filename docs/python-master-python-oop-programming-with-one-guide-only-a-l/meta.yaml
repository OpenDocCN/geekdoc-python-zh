    但问题在于，我在构造函数调用期间从未提供任何参数，因为我们像这样调用了类 `Person()` 而没有传递参数。在构造函数方法中，在 self 关键字之后，我们需要提供一个参数名：\n\
    \n```python\ndef __init__(self, name):\n```\n\n这意味着在 self 关键字之后，如果我们有参数，我们必须在类调用中提供它们，例如，`Person('Jason')`。我们需要像下图那样将它们关联起来：\n\
    \n```python\nclass Person:\n    def __init__(self, name):\n        self.name =\
