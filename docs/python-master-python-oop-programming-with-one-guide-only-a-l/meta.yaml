    You can read more about PEP:


    [https://peps.python.org/](https://peps.python.org/)


    # # What is PEP?


    The PEP is an abbreviation for Python Enhancement Proposal. PEP-8 is a document
    that provides guidelines on how to write code that will follow proper logic and
    coding style. The PEP-8 is the most popular one, but there are many other Enhancement
    Proposals. The PEP -8 will help us write beautiful code that is clean, readable,
    and styled. The PEP-8 is a Style Guide for Python code and the documentation is
    very detailed but long (luckily, you do not need to read the entire documentation):


    [https://peps.python.org/pep-0008/](https://peps.python.org/pep-0008/)


