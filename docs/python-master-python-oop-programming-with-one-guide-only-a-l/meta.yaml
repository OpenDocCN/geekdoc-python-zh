    \n我们调用函数时，先传了 name，然后是 age，最后是 lastname。函数仍然会运行，但输出将毫无意义。因此，位置参数非常重要，因为它们的顺序或位置很重要。Python\
    \ 中的关键字参数是什么？关键字参数不关心位置，因为参数是用关键字标记的。让我们创建一个使用关键字参数的例子：\n\n```python\ndef hi_function5(name,\
