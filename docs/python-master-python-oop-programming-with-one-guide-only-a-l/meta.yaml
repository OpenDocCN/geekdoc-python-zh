    **implicit type** conversion. This conversion doesn’t require us to get involved
    and use built-in Python functions. The implicit type conversion is automatically
    done by Python behind the scenes. The Interpreter will do some background checks
    and calculations just to avoid data loss. Here is one example where Python will
    automatically convert the integer to float number just to avoid data loss:


    ```

    int_number1 = 12

