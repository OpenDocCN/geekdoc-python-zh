- md: "Did you expect the output from above? If the answer is yes, then congratulations\
    \ because this means you understood how default parameters work in the background.\
    \ When we call the function with all of the arguments, the default parameter values\
    \ will be overwritten by the arguments we pass into the function call. But let’s\
    \ now make a function call with two values only:\n\n![](img/9f2174949e81804f7192ec47968e0efb_218_0.png)\n\
    \nAs we can see from the figure above, the function call doesn’t have all of the\
    \ arguments but in the output, the argument that was missing was replaced by the\
    \ default value. That is why the default arguments are so important because now\
    \ we called the function without any argument and it still produced a result at\
    \ the end:\n\n![](img/9f2174949e81804f7192ec47968e0efb_218_1.png)\n\n## Function\
    \ Return\n\nThe ‘return’ is a special keyword in Python and is very useful and\
    \ common in functions. The idea is that the functions always return a value and\
    \ we can use that value to do whatever we want. Let’s create a function to calculate\
    \ the sum of two integer numbers:\n\n```python\n# sum function with return keyword\n\
    def calc_fun(num1, num2):\n    num1 + num2\n\ncalc_fun(3, 4)\n```\n\nThe function\
    \ above will calculate the sum of the two arguments we pass in the function call\
    \ but when we run it, the output is not there. I know you are thinking we didn’t\
    \ use the print function so we can print the result. We don’t always have to use\
    \ the print function to get the value, instead of printing messages, the function\
    \ goal is to return a value. We can return the result like this:\n\n```python\n\
    # sum function with return keyword\ndef calc_fun(num1, num2):\n    return num1\
    \ + num2\n\ncalc_fun(3, 4)\n```\n\nGood! Now we can wrap the function call into\
    \ a print function so we can get the result:\n\n![](img/9f2174949e81804f7192ec47968e0efb_219_0.png)\n\
    \nWe can also store the return value into a variable and use that variable later\
    \ in our code:\n\n```python\n# return\ndef calc_fun(num1,num2):\n    return num1\
    \ + num2\n\nfn_result = calc_fun(3,4)\nfn_result += 1\nprint(fn_result)\n```\n\
    \nNow the value is 8 because we can manipulate the value of the variable. What\
    \ you need to know is that when the Interpreter sees the return keyword in the\
    \ body of the function, the function will return that value and it will be terminated.\
    \ You need to be careful about placing code after the keyword return in the function\
    \ body because that code will never be executed, like the following example:\n\
    \n```python\n# return\ndef calc_fun(num1,num2):\n    return num1 + num2\n    print(num1+num2)\n\
    \nfn_result = calc_fun(3,4)\nfn_result += 1\nprint(fn_result)\n```\n\nLine 4 will\
    \ never be executed because of the return keyword on line 3.\n\n## Nested functions\n\
    \nThe nested functions are very interesting because we can have a function that\
    \ is defined within another function. Instead of having one function, we will\
    \ have an inner/nested function that can access the variables defined in the enclosing\
    \ or outer function. I know this might be confusing but let’s create one simple\
    \ example so you can understand how nesting works.\n\n```python\n# nested function\n\
    def outer_fn(num1, num2):\n    def inner_fn(n1, n2):\n        return n1 + n2\n\
    \    total = inner_fn(num1, num2)\n    return total\n\nresult = outer_fn(2, 3)\n\
    print(result)\n```\n\nThe output will be 5 and here is the screenshot:\n\n![](img/9f2174949e81804f7192ec47968e0efb_221_0.png)\n\
    \nFrom the figure above, we have two functions, one is **outer_fn** which takes\
    \ two parameters **num1** and **num2** and the second function is **inner_fn**.\
    \ On line 8, we call the function with two arguments, and whatever is returned\
    \ is stored in the variable called **result**. When we call that function(outer_fn),\
    \ the Interpreter goes to line 2, and now the two function parameters num1 and\
    \ num2 will have access to the values 2 and 3 respectively. Then it goes into\
    \ the body of the **outer_fn** which will be in line 3. In line 3, we have another\
    \ function declaration that takes two new parameters **n1** and **n2**. This function\
    \ will be skipped because no one called it yet. The interpreter goes to line 5\
    \ where we have the actual call to the **inner_fn** with two arguments which are\
    \ the parameters from the **outer_fn**. This is the same as if we wrote it like\
    \ this:\n\n```python\ntotal = inner_fn(2,3)\n```\n\nNext, the interpreter goes\
    \ to line 3 again but now the parameters n1 and n2 will have the values 2 and\
    \ 3 and inside the function body we are returning the sum of these 2 parameters.\
    \ The function returns and goes to line number 6 where it returns the output with\
    \ the result from the **inner_fn**. In line 8, the result variable will have the\
    \ value 5 that is returned from **outer_fn**, and next, it will go to line 10\
    \ where it will print the result. That is how the **inner_fn** can use and have\
    \ access to the variables/parameters from the **outer_fn**. Remember the key part\
    \ here played the 'return' keyword otherwise we would never have gotten this result\
    \ back.\n\n## Docstrings in Python\n\nThe docstrings in Python are string literals\
    \ that will appear after the definition of function, class, method, or even a\
    \ module. First, we need to see how we can write a string literal:\n\n```python\n\
    \"\"\" This is string literal \"\"\"\n```\n\nWe write the string literals inside\
    \ triple quotation marks. Let's now create a function that will calculate the\
    \ square of a number:\n\n```python\n# docstrings\ndef num_square(num):\n    \"\
    \"\"This function takes a number and returns the square of that number\"\"\"\n\
    \    return num**2\n\nresult = num_square(4)\nprint(result)\n```\n\nIf we run\
    \ the code above, this will be the output:\n\n```python\n# docstrings\ndef num_square(num):\n\
    \    '''This function takes a number and returns the square of that number'''\n\
    \    return num**2\n\nresult = num_square(4)\nprint(result)\n```\n\nAs you can\
    \ see, we wrote the string literal in triple quotation marks after the function\
    \ declaration. And if we run this function, we will not see the string literal.\
    \ If you read the comment in the template literal you will see that it is a short\
    \ description or info on what this function does. If we hover with our mouse over\
    \ the function call, we will see the string literal message:\n\n![](img/9f2174949e81804f7192ec47968e0efb_223_0.png)\n\
    \nThis is called a docstring, and it is basically a comment inside the function\
    \ that explains what the function does. This is very good if we are working on\
    \ a large application and if other developers want to join so they can quickly\
    \ read about the functions without going through the entire documentation. Another\
    \ way to find out what the function does is by using the help() function. This\
    \ is another built-in Python function that is used by developers to understand\
    \ what some of the functions are:\n\n![](img/9f2174949e81804f7192ec47968e0efb_224_0.png)\n\
    \nWe can even do this:\n\n![](img/9f2174949e81804f7192ec47968e0efb_224_1.png)\n\
    \nAs you can see, the len() function will return the number of items in a container.\
    \ There are other ways to see what the function does, for example, we can use\
    \ the magic or dunder methods. The magic or dunder methods in Python are the special\
    \ methods that start and end with the double underscores:\n\n![](img/9f2174949e81804f7192ec47968e0efb_224_2.png)\n\
    \nTo summarize, the docstrings are the comments that we want others to see. These\
    \ comments should be meaningful and explain what the function does.\n\n## Python\
    \ *args and **kwargs\n\nIn this section, we will learn about ‘args’ and ‘kwargs’\
    \ and how they can be used. We know the functions we defined are reusable pieces\
    \ of code that can be called or invoked multiple times. During our function call,\
    \ we pass specific values known as arguments. Let’s define a function that will\
    \ calculate how old you are based on your birth year and current year:\n\n```python\n\
    # args and kwargs\ndef years_old(curr, dob):\n    return curr - dob\n\nage = years_old(2022,\
    \ 1999)\nprint(age)\n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_225_0.png)\n\
    \nAs we can see from the figure above, the current year is the first argument\
