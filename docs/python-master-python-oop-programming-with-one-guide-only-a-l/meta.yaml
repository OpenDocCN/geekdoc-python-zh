  mdcn: "## `__init__` 构造函数\n\n我在上面的章节中已经解释了什么是 `__init__` 构造函数，但我想补充一些我认为在类构造函数方面很重要的内容。让我们再来看一下构造函数：\n\
    \n```python\ndef __init__(self, name, lastname, age):\n    self.name = name  #\
    \ name attribute\n    self.lastname = lastname  # lastname attribute\n    self.age\
    \ = age  # age attribute\n```\n\n以及将立即调用该构造函数的对象/实例：\n\n```python\nperson_obj1\
    \ = Person('Jason', 'Brooks', 44)\n```\n\n一旦 `person_obj1` 从 `Person` 类实例化，构造函数就会被调用。为什么构造函数如此重要？嗯，构造函数会完成它的工作，它会构造一个新的\
    \ `Person` 类的对象或实例，以便新对象可以使用类的属性和方法。构造函数的第一个参数是 `self` 关键字。正如你所看到的，这个 `self` 关键字与构造函数的其他参数相比颜色不同。当我刚开始学习\
    \ Python 时，我理解 `self` 只是对调用对象的引用，每个对象都有自己的 `self`。我们创建的每个对象都是唯一的，因此 `self` 关键字必须只属于一个对象。\n\
    \n请查看下图：\n\n![](img/9f2174949e81804f7192ec47968e0efb_327_0.png)\n\n我希望你现在理解为什么在实例化对象时会调用构造函数。请不要被我这幅毕加索式的画吓到。构造函数可以复杂得多，例如，让我们允许新对象在满足特定条件（如年龄限制）时从\
    \ `Person` 类实例化。例如，让我们在构造函数中添加一个条件，以便在创建实际对象之前检查年龄。请看完整的代码：\n\n```python\nclass\
    \ Person:\n    # Class Object Attributes\n    is_person = True\n\n    # Constructor\n\
    \    def __init__(self, name, lastname, age):\n        if age >= 18:\n       \
    \     self.name = name  # name attribute\n            self.lastname = lastname\
    \  # lastname attribute\n            self.age = age  # age attribute\n\n    #\
    \ Method\n    def greet(self):\n        print(f'{self.name}, '\n             \
    \ f'{self.lastname}, old: {self.age}. '\n              f'Called by the class itself:\
    \ {Person.is_person}. '\n              f'Called by the self keyword {self.is_person}')\n\
    \nperson_obj1 = Person('Jason', 'Brooks', 17)\nprint(person_obj1.greet())\n```\n\
    \n由于 **init** 构造函数内部的 if 条件，我们将永远不会实例化 `person_obj1`，因为我们传递的当前年龄参数是 17。这将使条件评估为布尔值\
    \ False。如果我们尝试运行此代码，我们将得到 **AttributeError**：\n\n```\n<__main__.Person object\
    \ at 0x10b6cbdc0>\nTraceback (most recent call last):\n  File \"/Users/rick/PycharmProjects/firstproject/first.py\"\
    , line 22, in <module>\n    print(person_obj1.name)\nAttributeError: 'Person'\
    \ object has no attribute 'name'\n```\n\n非常好，现在如果我们把年龄改为 18 或更大，if 条件将评估为 true，对象将被成功创建：\n\
    \n```python\nperson_obj2 = Person('Andy', 'Garcia', 20)\nprint(person_obj2.greet())\n\
    ```\n\n上面的代码将打印出：\n\n> Andy, Garcia, old: 20. Called by the class itself: True.\
    \ Called by the self keyword True\n\n## 带有默认值的构造函数\n\n我们知道函数可以为其参数设置默认值，以防调用对象遗漏任何值。构造函数是一个函数，一个特殊的函数，你可能因为前面的\
    \ ‘def’ 关键字而知道这一点，所以它也可以有默认值：\n\n```python\n# Constructor\ndef __init__(self,\
    \ name='John', lastname='Doe', age=18):\n    if age >= 18:\n        self.name\
    \ = name  # name attribute\n        self.lastname = lastname  # lastname attribute\n\
    \        self.age = age  # age attribute\n```\n\n现在，这允许我们通过这样调用构造函数从 `Person`\
    \ 类创建对象或实例：\n\n```python\nperson_obj3 = Person()\nprint(person_obj3.name)\n```\n\
    \n上面代码的输出将是 John，即使我们没有向 `Person()` 构造函数传递任何参数。我们代码中的默认值被称为安全措施，以便我们可以适当地控制如何从类实例化对象。\n\
    \n## 使用 @classmethod 创建类方法\n\n在本节中，我们将创建一个属于类的类方法。为此，我们需要使用 `@classmethod` 关键字，它被称为装饰器。我们需要在函数声明之前使用装饰器：\n\
    \n```python\n# Class Method\n@classmethod\ndef date_created(today_date, year):\n\
    \    print(today_date, year)\n```\n\n正如我们所看到的，在方法声明之前，我们使用了 `@classmethod` 装饰器，然后方法的其余语法与以前相同。`Person`\
    \ 类的对象可以访问这个方法吗？让我们尝试运行以下代码：\n\n```python\nperson_obj3.date_created('14/05', 2023)\n\
    ```\n\n这将导致以下错误：\n\n```\nTraceback (most recent call last):\n  File \"/Users/rick/PycharmProjects/firstproject/first.py\"\
    , line 32, in <module>\n    person_obj3.date_created('14/05', 2023)\nTypeError:\
    \ Person.date_created() takes 2 positional arguments but 3 were given\n```\n\n\
    错误说我们提供了 2 个参数，但给出了 3 个。如果你记得，类中的每个方法都应该有 `self` 关键字作为第一个参数，但这里我们缺少这个关键字。类方法不属于对象，因此不再需要\
    \ ‘self’ 关键字，但我们需要使用一个关键字将此方法绑定到类。因此，我们使用 ‘cls’，它代表 class，现在是标准做法。类方法必须接收 class\
    \ 关键字作为第一个参数：\n\n```python\n# Class Method\n@classmethod\ndef date_created(cls,\
    \ today_date, year):\n    print(today_date, year)\n```\n\n现在对象可以调用此方法：\n\n```python\n\
    person_obj3.date_created('11/11', 2023)\n```\n\n那么，为什么我们需要这种类型的方法，当对象可以像访问其他方法一样访问它时？嗯，这种方法属于类本身，因此你不需要实例化类就可以使用它：\n\
    \n```python\n# the class can call this method without objects\nPerson.date_created('12/12',\
    \ 2023)\n```\n\n这仍然会打印输出，因为该方法是类方法，不需要对象来访问它。这类方法在 Python 中很少见，但了解它们是有好处的。\n\n\
    总结一下我们关于类方法所学到的内容：\n\n- 类方法绑定到类而不是对象\n- 类方法可以访问类及其状态，例如该类的所有属性\n- 它可以访问和修改类的状态和属性\n\
    \n## 静态方法 @staticmethod\n\n静态方法与类方法非常相似，但区别在于我们不必使用类的隐式关键字 ‘cls’。静态方法无法访问类状态，因此无法修改类。那么，为什么我们需要这些静态类方法呢？嗯，这些方法可以用作实用程序类型的方法，可以接受参数并执行某些操作。要创建静态方法，我们需要使用装饰器\
    \ `@staticmethod`：\n\n```python\ndef greet(self):\n    print(f\"{self.name}, {self.lastname},\
    \ old: {self.age}\")\n\nperson_obj1 = Person('Jason', 'Brooks', 44)\nperson_obj2\
    \ = Person('Carly', 'Stevenson', 32)\nprint(person_obj1.greet())\nprint(person_obj2.greet())\n\
    ```\n\n从上图中，我们有 **is_person** 类对象属性，它被设置为布尔值 True。此属性与其余属性之间的区别在于类对象属性是 **静态**\
    \ 的。在方法 `greet(self)` 中，我们传递 `self` 关键字，以便我们可以从调用该方法的对象获取 name、lastname 和 age，因为\
    \ `self` 绑定到对象。但这个静态属性也可以由类本身调用：\n\n```python\nclass Person:\n    # Class Object\
    \ Attributes\n    is_person = True\n\n    # Constructor\n    def __init__(self,\
    \ name, lastname, age):\n        self.name = name  # name attribute\n        self.lastname\
    \ = lastname  # lastname attribute\n        self.age = age  # age attribute\n\n\
    \    # Method\n    def greet(self):\n        print(f'{self.name}, '\n        \
    \      f'{self.lastname}, old: {self.age}. '\n              f'Called by the class\
    \ itself: {Person.is_person}. '\n              f'Called by the self keyword {self.is_person}')\n\
    \nperson_obj1 = Person('Jason', 'Brooks', 44)\nperson_obj2 = Person('Carly', 'Stevenson',\
    \ 32)\nprint(person_obj1.greet())\nprint(person_obj2.greet())\n```\n\n类对象属性是那些不会改变的属性，它们是静态的，可以直接由类本身或实例/对象访问。类对象属性属于类，它们在类本身中被初始化为某个值，而在构造函数或其他方法（如\
    \ name、age 和 lastname）中定义的属性将具有由调用对象动态分配的值。如果我们运行上面的代码，输出是：\n\n```\nJason, Brooks,\
    \ old: 44. Called by the class itself: True.\nCalled by the self keyword True\n\
    None\nCarly, Stevenson, old: 32. Called by the class itself:\n  True. Called by\
    \ the self keyword True\nNone\n```"
