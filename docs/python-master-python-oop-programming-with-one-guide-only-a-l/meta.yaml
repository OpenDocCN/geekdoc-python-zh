    \n与字符串一样，列表切片返回一个我们可以存储在变量中的结果，并且切片不会影响原始列表。当我们想要创建原始列表的副本时，这很有用：\n\n```python\n\
    #列表的副本\nstring_list = ['one','two','three']\nstring_list_copy = string_list[0:]\n\
    print(string_list_copy)\n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_97_1.png)\n\
    \n正如我们所看到的，我们已经成功地将第一个列表复制到了新列表中。这意味着在创建副本之后，我们可以修改`string_list_copy`中的一些元素，而不会影响原始列表：\n\
    \n```python\n# 向复制的列表添加新元素\nstring_list = ['one','two','three']\nstring_list_copy\
