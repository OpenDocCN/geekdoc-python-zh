  md: '# Lists Methods


    Same as the String data type, Lists have its own methods and we need to use the
    dot notation in order to call these methods. There are a few Lists methods that
    we can use and here is the link to where you can read all about them:


    https://docs.python.org/3/tutorial/datastructures.html


    We will cover the most used ones. Let’s start with the first one called append()


    # append() method


    We simply use this method to add an element at the end of the list:


    ```

    # 1 append

    my_list = [''one'',''two'',''three''];

    my_list.append(''four'')

    print(my_list); [''one'', ''two'', ''three'', ''four'']

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_102_0.png)


    It is important to know that this method will modify the existing array by adding
    the new element at the end.


    # insert() method


    This method will insert a new element into the list at the specified location.
    This means we need to provide the position/index where we want the new item to
    be inserted. For example, let’s add the element ‘five’ at the end of my_list:


    ```

    # 2 insert

    my_list.insert(4,''five'')

    ```'
