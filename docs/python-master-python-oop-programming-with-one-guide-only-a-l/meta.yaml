    \ evaluate the **if-expression** first, and if it’s **True,** it will execute\
    \ the code below the **if-statement**, and if the condition is evaluated to False,\
    \ it will go to the first **elif** statement where we have another condition.\
    \ The Interpreter will evaluate the condition (in the elif statement) to **True**\
    \ or **False** and if it’s True, then it will execute the statements inside the\
    \ **elif** block and if the condition is **False,** it will jump out and go to\
    \ the next **elif** statement where there is another condition. Finally, if every\
