    ## Preface


    This book is a perfect guide for someone that wants to learn Python. You will
    find that this book explains complex concepts in an easy-to-understand manner.
    After covering the basics, we will shift our focus to some intermediate features
    that every Python programmer should know. I’m not a professional writer but I’m
    a professional web developer and programmer, therefore my goal is to teach you
    programming through perfect examples and clean and executable code. When I first
    started learning Python, I was afraid of how hard this language could be, but
    I can assure you that Python, like any other programming language, only requires
    patience, practice, and of course a good guide with practical examples. The goal
    of my book is to help you bring your current skills to a professional level. If
    you are looking for additional reference materials then I can only suggest the
    Python documentation. If you have already looked at the Python documentation then
    you know it can be long, scary, and overwhelming. Do not worry because this book
    will save you months of researching, planning, and sleepless nights.


    You can visit Python’s official websites by clicking on following link:


    [https://docs.python.org/3/](https://docs.python.org/3/)


    I would also like to hear from you. If you need to contact me, please reach out
    through any of my social media accounts, and please consider leaving a review
    with your comment.


