    # MRO – Method Resolution Order


    When we are dealing with multiple inheritance, we can run into problems. That
    is why I mentioned that multiple inheritance is not a feature that all OOP programming
    languages support because they want to avoid complexity. For example, we have
    class A that inherits from two other classes, B and C, and this is the exact same
    scenario we had with the ‘Child, Father, and Mother’ classes in the previous section.
    But imagine that both of these classes (B and C) inherit from a fourth-class D.
    Let us have a look at the following figure:'
  merge: -1
