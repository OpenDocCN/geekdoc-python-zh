    \ **x**，对吗？是的，幸运的是，我们可以在函数体内使用 `global` 关键字，告诉函数我们想要使用在全局作用域中定义的变量，比如我们的变量 ‘x’：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_234_0.png)\n\n但还有一种更好的方式来访问在函数外部声明的变量，而且我们之前已经用过这个语法：\n\
