- md: "As you can see from the figure above, we have created a variable **x** on line\
    \ two and assigned a value of one. We have used that same global variable in our\
    \ trick_me function and we incremented its value by four. Please note that the\
    \ function trick_me() does not accept any parameters at this stage. On line eight,\
    \ we call the print function and we get the UnboundLocalError saying the local\
    \ variable ‘x’ is referenced before assignment. But this is not true because on\
    \ line two we declared and assigned the variable ‘x’ to a value of one. But the\
    \ function trick_me doesn’t know about what is being created outside the function\
    \ scope. There must be a way the function can use the global variable **x**, right?\
    \ Yes, luckily for us we can use the ‘global’ keyword inside the function body\
    \ to tell the function that we want to use the variable that is defined in the\
    \ global scope like our variable ‘x’:\n\n![](img/9f2174949e81804f7192ec47968e0efb_234_0.png)\n\
    \nBut there is better way of accessing variables that are declared outside the\
    \ function and we know this syntax because we have used it before:\n\n![](img/9f2174949e81804f7192ec47968e0efb_235_0.png)\n\
    \nThis is what we were doing so far, we passed the global variable x as an argument\
    \ on line 8 and we can use it in the function body through parameter x. This is\
    \ much better than using the global keyword inside the function, right?\n\n##\
    \ Python nonlocal Keyword\n\nThe non-local keyword was added in Python 3 and can\
    \ be explained if we use nested functions, therefore we need to go over the following\
    \ example:\n\n```python\n# nonlocal\ndef outer_fn():\n    x = 'John'\n\n    def\
    \ inner_fn():\n        nonlocal x\n        x = 'hello'\n    inner_fn()\n    return\
    \ x\n\nprint(outer_fn())\n```\n\n```python\n#nonlocal\ndef outer_fn():\n    x\
    \ = \"John\"\n    def inner_fn():\n        nonlocal x\n        x = \"hello\"\n\
    \    inner_fn()\n    return x\n\nprint(outer_fn())\n```\n\n```\nhello\n```\n\n\
    We can use the non-local keyword like the one on line five so we can work with\
    \ variables that are declared in the outer functions. We use the nonlocal keyword\
    \ to declare that the variable is not local for that function, meaning it belongs\
    \ to the functions that are one level up. When the Interpreter sees the nonlocal\
    \ ‘x’, it will automatically know that we don’t want to create another local variable\
    \ for that function but to use the variable that is declared in the outer function.\
    \ The outer function is the parent of the inner function. On line five, the non-local\
    \ variable value will be ‘John’ which comes from line three of the **outer_fn**\
    \ body. Line six is where we overwrite the value of x from ‘John’ to ‘hello.’\
    \ This will modify the value of **x** for the **outer_fn** and when we return\
    \ the **x**, the value will be ‘hello.’ What do you think will happen if we remove\
    \ line number five? It will print John because the x will become a local variable\
    \ for the inner_fn() that will never be used anywhere. The yellow underline in\
    \ Python occurs when we assign a variable but never use it, it’s like a soft warning.\n\
    \n```python\n#nonlocal\ndef outer_fn():\n    x = \"John\"\n    def inner_fn():\n\
    \        # nonlocal x\n        x = \"hello\"\n    inner_fn()\n    return x\n\n\
    print(outer_fn())\n```\n\n```\n> John\n```\n\nSo what are the advantages of having\
    \ non-local variables in our code? Well, the first one is that we can now access\
    \ the variables that are declared in the upper scope. When we reuse the same variable\
    \ in the inner function, we don’t create another variable somewhere in memory\
    \ so we save memory space and extra referencing. The disadvantage is that this\
    \ keyword works only inside nested structures and we can’t use it to reference\
    \ global or local variables.\n\n## Chapter 3 Python Installation\n\nIn this section,\
    \ we will learn how to install Python on different operating systems like Windows,\
