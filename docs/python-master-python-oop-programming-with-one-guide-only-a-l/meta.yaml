    \ 8 行将全局变量 `x` 作为参数传递，并在函数体内通过参数 `x` 来使用它。这比在函数内部使用 `global` 关键字好多了，不是吗？\n\n##\
    \ Python nonlocal 关键字\n\n`nonlocal` 关键字是在 Python 3 中引入的，我们可以通过嵌套函数来理解它，因此我们需要先看下面的例子：\n\
    \n```python\n# nonlocal\ndef outer_fn():\n    x = 'John'\n\n    def inner_fn():\n\
    \        nonlocal x\n        x = 'hello'\n    inner_fn()\n    return x\n\nprint(outer_fn())\n\
    ```\n\n```python\n#nonlocal\ndef outer_fn():\n    x = \"John\"\n    def inner_fn():\n\
    \        nonlocal x\n        x = \"hello\"\n    inner_fn()\n    return x\n\nprint(outer_fn())\n\
    ```\n\n```\nhello\n```\n\n我们可以像第五行那样使用 `nonlocal` 关键字，从而操作在外层函数中声明的变量。我们使用 `nonlocal`\
    \ 关键字来声明该变量不是当前函数的局部变量，意思是它属于上一级的函数。当解释器看到 `nonlocal 'x'` 时，它会自动明白我们不想为该函数创建另一个新的局部变量，而是要使用在外层函数中声明的那个变量。外层函数是内层函数的父级。在第五行，`nonlocal`\
    \ 变量的值将是 ‘John’，它来自 **outer_fn** 函数体的第三行。第六行是我们将 `x` 的值从 ‘John’ 覆写为 ‘hello’ 的地方。这将修改\
    \ **outer_fn** 函数的 **x** 值，当我们返回 **x** 时，其值将是 ‘hello’。你认为如果我们删除第五行会发生什么？它会打印 John，因为\
    \ `x` 将成为 `inner_fn()` 的局部变量，并且这个变量从未在任何地方被使用。在 Python 中，当我们给一个变量赋值但从未使用时，会出现黄色下划线，这有点像一个软性警告。\n\
    \n```python\n#nonlocal\ndef outer_fn():\n    x = \"John\"\n    def inner_fn():\n\
    \        # nonlocal x\n        x = \"hello\"\n    inner_fn()\n    return x\n\n\
    print(outer_fn())\n```\n\n```\n> John\n```\n\n那么，在我们的代码中使用非局部变量有什么优点呢？首先，我们现在可以访问在上层作用域中声明的变量。当我们在内层函数中重用同一个变量时，我们不会在内存中的其他地方创建另一个变量，从而节省了内存空间并避免了额外的引用。缺点是，这个关键字只能在嵌套结构内部使用，我们不能用它来引用全局或局部变量。\n\
