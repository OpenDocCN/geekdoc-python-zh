    \n**控制台：**\n\nTrue\nFalse\n>>>\n\n这是一个非常有用的关键字，因为我们可以查找某个项目是否存在于一个非常长的列表中。\n\n\
    ## 多维列表\n\n到目前为止，我们涵盖的列表示例都是一维的。多维列表是列表中的列表，当涉及到创建多维层级时，还有其他数据类型是更好的选择：\n\n```python\n\
