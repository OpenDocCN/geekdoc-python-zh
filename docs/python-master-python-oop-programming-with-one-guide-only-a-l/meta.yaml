    \ an option to guess it in 3 attempts. In each of the attempts, the program must\
    \ guide the user and provide minimal information if the random number is higher\
    \ or lower than the computer random number. This is the output when the user tries\
    \ to guess the number in three attempts but fails:\n\nThis is the output when\
    \ the user guesses the number:\n\n### Coding hints\n\nThere are different ways\
    \ you can write this program and there is no perfect solution. This means that\
    \ everyone can come up with different working solutions. The following tips that\
    \ I have included will contain bits and pieces of the final code so you can change\
