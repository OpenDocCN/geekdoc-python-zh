    <__main__.Person object at 0x10cddebf0>\n```\n\n如你所见，两个 Person 对象存储在计算机内存的不同位置。这很完美，因为现在每个对象都可以有自己的方法和属性，这些方法和属性对其他对象是隐藏的。\n\
    \n总之，类可以有属性和方法。属性由构造函数方法初始化，该方法将有一个 ‘self’ 关键字作为默认参数。当我们创建一个新的对象或 Person 类的实例时，我们立即调用构造函数，并将所有参数初始化为该对象特有的值。Person\
    \ 类的每个实例都可以访问类方法和属性，并且它们彼此独立，这意味着它们存储在不同的内存位置。\n\n## 类对象属性\n\n类对象属性与类中的其他属性不同。让我们先创建一个：\n\
    \n```python\nclass Person:\n    # Class Object Attribute\n    is_person = True\n\
