- md: "a copy of my previous projects and I called it ‘chapter5.3-packages.’ If you\
    \ are trying this on your own, you can name your project whatever you want. Now\
    \ let’s go to the menu and select **PyCharm>Preferences** and **Select Project:**\
    \ and then find and select the **Python Interpreter:**\n\n![](img/9f2174949e81804f7192ec47968e0efb_416_0.png)\n\
    \nAs we can see on the right side, we have a few packages already pre-installed\
    \ like **pip** and **setuptools** so all you need to do is locate the plus sign\
    \ where you can add or search for a new package, in our case, the package we need\
    \ to install is **pyjokes**:\n\n![](img/9f2174949e81804f7192ec47968e0efb_417_0.png)\n\
    \nMake sure the right package is selected and click on the button that says **Install\
    \ Package**. After the installation, you will get a message saying you have successfully\
    \ installed the **pyjokes** package. We can confirm this if we go back to the\
    \ Python Interpreter where you could see if the package is listed:\n\n![](img/9f2174949e81804f7192ec47968e0efb_418_0.png)\n\
    \nThe package will also be in the External Libraries > Site Packages > pyjokes:\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_418_1.png)\n\nLet’s now read the quick\
    \ description on the [PyPi](https://pypi.org/) website and there it says we can\
    \ access the jokes if we first import the **pyjokes** and then use some of the\
    \ two functions (**get_joke** or **get_joke**):\n\n![](img/9f2174949e81804f7192ec47968e0efb_419_0.png)\n\
    \nAs you can see, we can install packages easily with PyCharm but this is not\
    \ the way most developers install packages. Another, more professional way to\
    \ install packages is to use the terminal or Command Prompt. On my Desktop I have\
    \ created a folder called chapter5.4-packages and I have opened it with VS Code\
    \ editor and created a file inside this folder called test.py:\n\n![](img/9f2174949e81804f7192ec47968e0efb_420_0.png)\n\
    \nThe test.py file is empty for now but let’s add the pyjokes code from PyCharm:\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_421_0.png)\n\nModuleNotFoundError because\
    \ the pyjokes package was installed for the PyCharm IDE only and we can’t use\
    \ it everywhere. So how can we fix this? Well, if we go back to pypi.org we can\
    \ see there is a pip command to install packages using our terminals or command\
    \ prompt:\n\n![](img/9f2174949e81804f7192ec47968e0efb_421_1.png)\n\nCopy the command\
    \ ‘pip install pyjokes’ and open the terminal or command prompt. If you forget\
    \ some of the terminal commands, I suggest you go back and read that section again.\
    \ Instead of using the built-in terminal in VS Code editor, I will use the machine\
    \ terminal and check the current directory using the ‘pwd’ command:\n\n```\nrick\
    \ — -zsh — 80×24\nrick@Ristes-iMac ~ % pwd\n/Users/rick\nrick@Ristes-iMac ~ %\
    \ \n```\n\nNow I need to go to the Desktop and in the ‘chapter5.4-packages’ folder\
    \ where my test.py file is:\n\n```\nchapter5.4-packages — -zsh — 80×24\nrick@Ristes-iMac\
    \ ~ % cd Desktop/chapter5.4-packages\nrick@Ristes-iMac chapter5.4-packages % \n\
    ```\n\nAs you can see, we are in chapter5.4 folder. Let’s list all available files\
    \ there:\n\n```\nchapter5.4-packages — -zsh — 80×\nrick@Ristes-iMac ~ % pwd\n\
    /Users/rick\nrick@Ristes-iMac ~ % cd Desktop/chapter5.4-packages\nrick@Ristes-iMac\
    \ chapter5.4-packages % ls\ntest.py\nrick@Ristes-iMac chapter5.4-packages % \n\
    ```\n\nThe test.py file is the only file I have in the folder chapter5.4-packages.\
    \ Finally, we can check the pip version. When we installed Python on our machines,\
    \ it also installed the **pip**. Let’s check the pip version by typing pip -V,\
    \ and based on your machine this might work or might give you an error like this\
    \ one:\n\n```\nchapter5.4-packages — -zsh — 80×24\nrick@Ristes-iMac chapter5.4-packages\
    \ % pip -V\nzsh: command not found: pip\n```\n\nIf this is the case, we can type\
    \ pip3 -V and now we should get the right version:\n\n```\nrick@Ristes-iMac chapter5.4-packages\
    \ % pip3 -V\npip 22.0.4 from /Library/Frameworks/Python.framework/Versions/3.10/lib/python3.10/site-packages/pip\
    \ (python 3.10)\nrick@Ristes-iMac chapter5.4-packages %\n```\n\nFor me, this means\
    \ I can install pyjokes using the pip3 instead of the pip command (pip3 install\
    \ pyjokes):\n\n```\nrick@Ristes-iMac chapter5.4-packages % pip3 install pyjokes\n\
    Collecting pyjokes\n  Using cached pyjokes-0.6.0-py2.py3-none-any.whl (26 kB)\n\
    Installing collected packages: pyjokes\nSuccessfully installed pyjokes-0.6.0\n\
    WARNING: You are using pip version 22.0.4; however, version 22.2.1 is available.\n\
    You should consider upgrading via the '/Library/Frameworks/Python.framework/Versions/3.10/bin/python3.10\
    \ -m pip install --upgrade pip' command.\nrick@Ristes-iMac chapter5.4-packages\
    \ %\n```\n\nAfter you run the ‘pip3 install pyjokes,’ you should get the following\
    \ message ‘Successfully installed pyjokes.’ We can also upgrade package versions\
    \ as well. As you can see, I have some warnings in green color alerting me that\
    \ there is a new version of pip available:\n\n```\npip install --upgrade pip\n\
    ```\n\nIn my case, I need to use the following command:\n\n```\npip3 install --upgrade\
    \ pip\n```\n\nAs you can see, after I run the pip3 install command, I have the\
    \ following window:\n\n```\nrick@Ristes-iMac chapter5.4-packages % pip3 install\
    \ --upgrade pip\nRequirement already satisfied: pip in /Library/Frameworks/Python.framework/Versions/3.10/lib/python3.10/site-packages\
    \ (22.0.4)\nCollecting pip\n  Downloading pip-22.2.1-py3-none-any.whl (2.0 MB)\n\
    \     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 2.0/2.0 MB 4.3 MB/s eta 0:00:00\n\
    Installing collected packages: pip\n  Attempting uninstall: pip\n    Found existing\
    \ installation: pip 22.0.4\n    Uninstalling pip-22.0.4:\n      Successfully uninstalled\
    \ pip-22.0.4\nSuccessfully installed pip-22.2.1\nrick@Ristes-iMac chapter5.4-packages\
    \ %\n```\n\nLet’s now test if the package pyjokes is actually working and for\
    \ this, we can use the built-in terminal in VS Code or the machine terminal. I\
    \ will show you both ways, here is the terminal output:\n\n```\nrick@Ristes-iMac\
    \ chapter5.4-packages % python3 test.py\n===== Joke =====\nThere are 10 types\
    \ of people: those who understand binary, those who don't, and those who were\
    \ expecting this joke to be in trinary.\nrick@Ristes-iMac chapter5.4-packages\
    \ %\n```\n\nIf we go back to the VS Code editor and use the built-in terminal,\
    \ you should have this output:\n\n![](img/9f2174949e81804f7192ec47968e0efb_426_0.png)\n\
    \nVS Code terminal is working as well and that is basically what I wanted to show\
    \ you about how to find, install, and run packages from the Python Package Index\
    \ website. Finally, if you want to uninstall some of the packages you have already\
    \ installed, you can use the command pip3 uninstall and the name of the package.\
    \ For example, if you want to uninstall the previous package completely you can\
    \ use one of the following commands:\n\n```\npip uninstall pyjokes\n```\n\nOr\
    \ if you are using the pip command only:\n\n```\npip3 uninstall pyjokes\n```\n\
    \nIf for some reason you want to install a specific version of a package, you\
    \ can also do this from your terminal as long as you know the version number.\
    \ Most of the packages will have a different number like the pyjokes have 0.6.0\
    \ and this is called versioning because each new version will bring something\
    \ new, maybe some bug was discovered in version 0.5.0 and they rectified and updated\
    \ it in the new version 0.6.0. Therefore, the version numbers mean something,\
    \ they are not just random numbers. If you need to install a different version\
    \ of the package, you can do it like this:\n\n```\npip3 install pyjokes==0.5.0\n\
    ```\n\nThis will install the previous version of pyjokes. You can also list all\
    \ of the packages installed using the following command:\n\n```\npip3 list\n```\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_427_0.png)\n\n## Summary\n\nThis chapter\
    \ was one of my favorites because we learned a lot about modules and packages.\
    \ I hope by now you see the real power of Python because it doesn’t matter how\
    \ great a developer or programmer you are, it will be super hard to shine if you\
    \ don’t have a backup from your community. In the next chapter, we will focus\
    \ on reading and writing to files."
  mdcn: "我之前项目的一个副本，我将其命名为“chapter5.3-packages”。如果你自己尝试，可以将项目命名为任意你想要的名字。现在让我们打开菜单，选择\
