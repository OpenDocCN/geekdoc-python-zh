    \ today!')\n\n```\n\nHop on for a ride\n\nThe if condition will be evaluated to\
    \ True if only one of **is_licenced** or **my_age >=16** statements are evaluated\
    \ to true. Short-circuiting is essential because it will save time and increase\
    \ our program performance. Therefore, when the Python interpreter evaluates the\
    \ expression that involves the ‘or’ operator, it will stop immediately one of\
    \ the operands returns True. Let’s go line by line and explain how the Python\
    \ interpreter works:\n\n+   1. **my_age = 16**; The interpreter will assign a\
    \ value of 16 to the variable **my_age** in the first statement\n2. The second\
    \ statement is assigning the value True to the **is_licenced** variable\n3. The\
    \ third statement is the if-block: Now the interpreter will evaluate what is after\
    \ the if keyword and the first statement is the **is_licenced**. Obviously, this\
    \ one will immediately be evaluated to True and the Interpreter will go and evaluate\
    \ what is next but when it sees the ‘or’ operator, the Interpreter will stop because\
    \ the first operand already returned true.\n4. Then it will execute the print()\
    \ function below the if block\n\nThis is how short-circuiting works in Python,\
    \ it saves time and increases the performance because it can skip the evaluation\
    \ of the next expression because at least one returned True.\n\n# # Python Identity\
    \ Operators"
