    10 representation, or in simple words, the prefix denotes a binary literal. The
    binary value for the actual number 2 is represented by binary 10. Now that we
    know these two data types (int and float), it is time to learn what mathematical
    operations we can perform on them.


    ## Python Power Operator (**)


    Python like most programming languages allows us to use integer and float numbers
    to perform basic or complex mathematical operations. For example, the double multiple
    (**) is used to raise a number in Python to the power of an exponent. This operator
    is known as power operator and it requires two values to perform a calculation.
    Here is an example of how we can use the power operator:


    2 ** 3


    In this expression, 2 is raised to the power of 3, therefore the result will be
    8:


    ![](img/9f2174949e81804f7192ec47968e0efb_48_0.png)


    In the next section, we are going to discuss the floor division.


    ## Python Double Slash (//) Operator: Floor Division


    In Python, we can use the double forward slashes (//) to perform floor division.
    The floor division is known as integer division and it uses the following syntax:


    5 // 4


    This operator will divide the first argument by the second argument and will round
    the result to the nearest whole number. In Python, there is a function called
    math.floor() that will do the exact same thing but in order to use this function,
    we need to learn how to import an external module and we are not going to cover
    importing modules in this chapter, therefore the double slash (//) operator is
    what we will use at this point. If we run the above example in the main.py file,
    we will get an output of 1:


    ![](img/9f2174949e81804f7192ec47968e0efb_48_1.png)


    This operator will return an integer that is rounded down to the nearest whole
    number.


    ## Python Modulo Operator (%)


    This operator is known as the Modulo operator and the symbol we need to use is
    (%). This operator is used to return the remainder when we are dividing the left
    operand by the right operand like in the following example:


    ```python

    # Modulo operator

    print(5 % 4)

    ```


    The result is 1 because the modulo operator will give us the remainder of this
