- md: '## Variables in Python


    If we want to make our simple program even more interesting, we can use variables.
    We will discuss variables in detail later in this section but you should know
    that variables in Python are like containers where we can store values. In our
    case, I want the name from the input function to be stored in a variable like
    this:


    ```python

    name = input(''What is your name? '')

    print(name)

    ```


    If we click on the run button this will be the output:


    ```

    main.py

    1 print(''Hi everyone!'')

    2 name = input(''What is your name? '')

    3 print(name)


    Console Shell

    Hi everyone!

    What is your name? Rick

    Rick

    >

    ```


    The variable, in this case, is called ‘name’ and we assigned the value from the
    input function. The input function after typing the name will return whatever
    we have entered in the console. In our case, I have typed ‘Rick’ and pressed return
    or enter and the function input() returns the ‘Rick’. This is the same as what
    I have done:


    ```python

    name = ''Rick''

    ```


    On line three I’m using the print function to display the content of the variable
    name to the console and that is why I get the name ‘Rick’ in the output. To summarize,
    variables are names we give to the data we want to store. We need variables because
    we can store and manipulate different data. Our variable called name now can be
    reused again and again in our code. When we create a variable in the background,
    the program will allocate space in the memory where it will store the data. An
    important thing you need to know is that the data inside the variable can be changed
    with a different value in our program later. For example, after line number three,
    let’s write this code:


    ```python

    name = ''Jason''

    print(name)

    ```


    If we run the following code, what do you think will be the output ‘Rick’ or ‘Jason’?
    Let’s run the file and observe the result:


    ![](img/9f2174949e81804f7192ec47968e0efb_40_0.png)


    As you can see, we can change the content of the variable called name to a different
    value. There are a few keywords I want you to remember from this section:


    - Variable declaration

    - Initialization

    - Initial value


    The above keywords are not unique to Python only, they have been used in most
    programming languages. Please consider the following statement:


    ```python

    my_age = 10

    ```


    In this statement, we are defining a variable called my_age and this is called
    variable declaration because we are giving the variable a name. We use the equal
    sign = to assign a value to the variable and this is the process of initialization.
    During the variable declaration, it is advised to give an initial value or data.
    In our case, this will be 10, but in Python, we can create variables without values
    as well but this is a topic for another section. We can create multiple variables
    in one line like this:


    ```python

    first, second = 1, 2

    ```


    This is equivalent to:


    ```python

    first = 1

    second = 2

    ```


    When we are creating variables and initialize them to a value, we always use the
    assignment operator ‘=’. Because of this operator (equal), we can achieve the
    binding process between a variable name and value. We will learn about some rules
    on how we can name the variables in Python but I think it is the right time to
    move and learn other Python features. This was our warming-up section and I hope
    you liked it.


    ## Comments in Python


    We can write comments in our code if we use the # symbol in front. The comments
    are not going to be included in the final output and the Python Interpreter will
    ignore them. Comments are very useful in Python because they will make our code
    more readable not just for us but for any other developers that might read our
    code. In Python, we can write the single line comment like this:


    ```python

    # this is single line comment

    ```


    We can also write multiline comments if we use three single/double quotes like
    this:


    ```python

    ''''''

    Hi,

    this is multi-

    line comment!

    ''''''

    ```


    The rule of thumb is that the comments we are using in our code must add valuable
    information. This information can help you if you read your own code in the future
    but can also help other developers understand what your code is about because
    not all of the features are easy to understand. Please do not add comments on
    every piece of code you write because you will clutter your code. The comments
    you write must be short yet concise.


    ## Data Types


    Data types are values in Python. Each value in Python has a data type. There are
    various data types in Python. I will try to separate the data types in Python
    by their importance in different categories and I will start with listing the
    core or basic data types first:


    - Int – integer

    - Float – floating point number

    - Complex – this is used beside int and float numbers

    - Bool

    - Str – string


    There are more advanced data types in Python:


    - List

    - Tuple

    - Set

    - Dict – dictionary


    Most books will explain the above fundamental data types but in Python, some data
    types are beyond the core types. Python allows us to create our own data types
    using:


    - Classes - there are used for creating custom types


    In Python, we also have something called specialized data types. These data types
    are not built-in in python and they include:


    - Packages

    - Modules


    These **packages** and **modules** can be used from different libraries and are
    used if the above data types are not sufficient for us. Another important data
    type is **None**. The **None** data type is used when we want to specify the absence
    of value, similarly to **Null** in JavaScript language. The final data type that
    I want to mention is called **Complex Numbers**. The complex numbers are represented
    by complex **Class**. In the following figure you can clearly see how the data
    types are divided into categories:


    ![](img/9f2174949e81804f7192ec47968e0efb_44_0.png)


    In this chapter, we will cover all of the Python data types but I will not be
    following the exact order as in the figure above. There are a lot of other Python
    features that are worth mentioning and I think including them as I explain the
    different data types will help you to understand Python. I promise the first couple
    of sections are the hardest as we can’t move faster enough because we don’t know
    the core features of Python. Therefore, I would like to suggest that you carefully
    read all of the sections from now onwards.


    ## Int – Integer (data type)


    Python includes three numeric types (Integer, Float, and Complex) so we can represent
    the numbers. One of them is called Integer or Int. An Integer is a whole number,
    for example, it can be a zero (0), positive or negative whole number. Why do we
    need Integer numbers? Well, we use them to do mathematical operations using mathematical
    operators like +,-,/, *. We can do some basic calculations like the following:


    ```python

    # Int

    a = 6

    b = 3

    print(a + b)

    print(a * b)

    print(a / b)

    print(a - b)

    ```


    We can run the above code and check the output:


    # FirstPythonProject


    ![](img/9f2174949e81804f7192ec47968e0efb_45_0.png)


    | Code (main.py) | Output (Console) |

    |----------------|------------------|

    | a = 6          | 9                |

    | b = 3          | 18               |

    | print(a + b)   | 2.0              |

    | print(a * b)   | 3                |

    | print(a / b)   |                  |

    | print(a - b)   |                  |


    If you have noticed, when we write functions in Python, we always use the () (parenthesis)
    or brackets. The brackets are a very important part when we try to access the
    function. Without them, the function will not return the result we expect. In
    Python, we can use the type() function to determine the data type. If you have
    done other programming languages such as JavaScript, you will notice that we have
    a lot of similarities between these two languages. In JavaScript, to determine
    the type, we use the typeof() function. From the figure above, we have two variables
    that have a value from type Integer. Let us check if this is true using the type()
    function:


    ```python

    print(type(a))

    print(type(b))

    ```


    If we run the above code in the replit, we will get the following output:'
  mdcn: '## Python中的变量


    如果我们想让简单的程序变得更有趣，可以使用变量。本节后续会详细讨论变量，但你应该知道，Python中的变量就像是可以存储值的容器。就我们目前的情况而言，我希望将`input`函数获取的输入内容存储到一个变量中，如下所示：


    ```python

    name = input(''What is your name? '')

    print(name)

    ```


    如果点击运行按钮，输出将会是：


    ```

    main.py

    1 print(''Hi everyone!'')

    2 name = input(''What is your name? '')

    3 print(name)


    Console Shell

    Hi everyone!

    What is your name? Rick

    Rick

    >

    ```


    在这个例子中，变量名为`name`，我们将其赋值为`input`函数返回的结果。`input`函数在用户输入内容后，会返回在控制台输入的任何内容。在这个例子里，我输入了''Rick''并按了回车键，`input()`函数便返回了''Rick''。这等同于我直接写了：


    ```python

    name = ''Rick''

    ```


    在第三行，我使用`print`函数将变量`name`的内容显示到控制台，因此输出中出现了''Rick''。总结一下，变量是我们为想要存储的数据所起的名称。我们需要变量是因为它们允许我们存储和操作不同的数据。我们名为`name`的变量现在可以在代码中反复使用。当我们创建一个变量时，程序会在内存中分配一块空间来存储数据。你需要了解的一个重点是，变量中的数据在程序运行后期是可以被更改为不同的值的。例如，在第三行之后，我们编写以下代码：


    ```python

    name = ''Jason''

    print(name)

    ```


    如果我们运行这段代码，你认为输出会是''Rick''还是''Jason''？让我们运行文件来观察结果：


    ![](img/9f2174949e81804f7192ec47968e0efb_40_0.png)


    如你所见，我们可以将名为`name`的变量内容更改为不同的值。在本节中，有几个关键词需要你记住：


    - 变量声明

    - 初始化

    - 初始值


    以上关键词并非Python独有，它们已在大多数编程语言中使用。请看以下语句：


    ```python

    my_age = 10

    ```


    在这条语句中，我们定义了一个名为`my_age`的变量，这称为变量声明，因为我们正在给变量命名。我们使用等号`=`为变量赋值，这就是初始化过程。在变量声明时，建议赋予一个初始值或数据。在这个例子中，初始值是10，但在Python中，我们也可以创建没有值的变量，不过这是另一个主题。我们可以在一行中创建多个变量，如下所示：


    ```python

    first, second = 1, 2

    ```


    这等同于：


    ```python

    first = 1

    second = 2

    ```


    当我们创建变量并用一个值初始化它们时，总是使用赋值运算符`=`。正是通过这个运算符（等号），我们实现了变量名与值之间的绑定。我们将学习一些关于如何在Python中命名变量的规则，但现在是时候继续学习其他Python特性了。以上是我们热身章节，希望你喜欢。


    ## Python中的注释


    我们可以在代码中使用`#`符号来编写注释。注释不会包含在最终输出中，Python解释器会忽略它们。注释在Python中非常有用，因为它们不仅能让我们自己的代码更易读，也能帮助其他可能阅读我们代码的开发者理解。在Python中，我们可以像这样编写单行注释：


    ```python

    # this is single line comment

    ```


    我们也可以使用三个单引号或双引号来编写多行注释：


    ```python

    ''''''

    Hi,

    this is multi-

    line comment!

    ''''''

    ```


    一条经验法则是，代码中使用的注释必须提供有价值的信息。这些信息不仅有助于你未来阅读自己的代码，也能帮助其他开发者理解你的代码，因为并非所有功能都容易理解。请不要在你编写的每一行代码上都添加注释，否则会使你的代码显得杂乱。你编写的注释应简短而精炼。


    ## 数据类型


    数据类型是Python中的值。Python中的每个值都有一个数据类型。Python中有多种数据类型。我将尝试按重要性将Python中的数据类型分为不同类别，并首先列出核心或基础数据类型：


    - Int – 整数

    - Float – 浮点数

    - Complex – 用于整数和浮点数之外

    - Bool – 布尔值

    - Str – 字符串


    Python中还有更高级的数据类型：


    - List – 列表

    - Tuple – 元组

    - Set – 集合

    - Dict – 字典


    大多数书籍会解释上述基础数据类型，但在Python中，有些数据类型超出了核心类型范畴。Python允许我们使用以下方式创建自己的数据类型：


    - 类（Classes）- 用于创建自定义类型


    在Python中，我们还有所谓的专用数据类型。这些数据类型并非Python内置，包括：


    - 包（Packages）

    - 模块（Modules）


    这些**包**和**模块**可以从不同的库中使用，当上述数据类型不满足我们的需求时，就会用到它们。另一个重要的数据类型是**None**。**None**数据类型用于表示值的缺失，类似于JavaScript语言中的**Null**。最后要提及的数据类型叫做**复数（Complex
    Numbers）**。复数由复数**类（Class）** 表示。在下图中，你可以清楚地看到数据类型是如何分类的：


