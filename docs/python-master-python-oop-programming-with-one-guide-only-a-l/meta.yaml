  md: 'As you can see from the figure above, we have created a variable **x** on line
    two and assigned a value of one. We have used that same global variable in our
    trick_me function and we incremented its value by four. Please note that the function
    trick_me() does not accept any parameters at this stage. On line eight, we call
    the print function and we get the UnboundLocalError saying the local variable
    ‘x’ is referenced before assignment. But this is not true because on line two
    we declared and assigned the variable ‘x’ to a value of one. But the function
    trick_me doesn’t know about what is being created outside the function scope.
    There must be a way the function can use the global variable **x**, right? Yes,
    luckily for us we can use the ‘global’ keyword inside the function body to tell
    the function that we want to use the variable that is defined in the global scope
    like our variable ‘x’:


    ![](img/9f2174949e81804f7192ec47968e0efb_234_0.png)


    But there is better way of accessing variables that are declared outside the function
    and we know this syntax because we have used it before:'
  merge: -1
