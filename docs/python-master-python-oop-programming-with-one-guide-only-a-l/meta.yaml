- md: "As you can see from the figure above, we didn't get the error that will block\
    \ and terminate the entire program, instead, we are notifying the user what he/she\
    \ has done wrong and what he/she needs to do next. Now even if the user makes\
    \ a mistake, the Python interpreter will continue its work and execute the rest\
    \ of the statements. Let’s add a new print function after the try-except block\
    \ and confirm that the program will continue its normal execution:\n\nGreat! No\
    \ more red errors in our console but our code is far from perfect. For example,\
    \ the user inputs a string, and this error will be caught and handled in the except\
    \ block, but if the user wants to re-enter a new number to fix the previous mistake,\
    \ he/she will need to run the file again. To fix this, you can simply use a while-loop\
    \ and set the condition to True, and wrap the entire try-except block like this:\n\
    \n```python\n# Error Handling\nwhile True:\n    try:\n        dob = int(input('Enter\
    \ year of birth: '))\n        print(dob)\n    except:\n        print('You have\
    \ entered invalid value, please'\n              ' enter a valid number!')\nprint('This\
    \ is printed after while loop!')\n```\n\nIf we run the code now and if user enters\
    \ a string this will happen:\n\nGreat! Our logic works! Well, it works but not\
    \ perfectly because this will continue prompting the user to enter a value even\
    \ if the user entered a number:\n\n```\nEnter year of birth: Nineties\nYou have\
    \ entered invalid value, please enter a valid number!\nEnter year of birth: Again\n\
    You have entered invalid value, please enter a valid number!\nEnter year of birth:\
    \ 99\n99\nEnter year of birth: 1221\n1221\nEnter year of birth: |\n```\n\nWe can\
    \ fix this by adding an else clause after the except block so we can break from\
    \ this loop using the break statement:\n\n```python\n# Error Handling\nwhile True:\n\
    \    try:\n        dob = int(input('Enter year of birth: '))\n        print(dob)\n\
    \n    except:\n        print('You have entered invalid value, please'\n      \
    \        ' enter a valid number!')\n    else:\n        break\n\nprint('This is\
