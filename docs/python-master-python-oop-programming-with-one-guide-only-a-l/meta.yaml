- md: "## elif\n\nThe if-else statement is great but it only covers two scenarios\
    \ - if the condition is true, do this and if the condition is false, execute the\
    \ else clause statements. We can do much more than just these two operations because\
    \ there is a syntax that allows us to define more than two options. The name of\
    \ this is elif conditional statement, a shorthand for else-if. The syntax for\
    \ elif is:\n\n```\nif < expr >:\n    <statement(s) >\nelif < expr >:\n    <statement(s)\
    \ >\nelif < expr >:\n    <statement(s) >\n    ...\nelse:\n    <statement(s)>\n\
    ```\n\nMaybe the syntax does look a bit confusing at first but it is not that\
    \ hard in reality. The **Python** interpreter will evaluate the **if-expression**\
    \ first, and if it’s **True,** it will execute the code below the **if-statement**,\
    \ and if the condition is evaluated to False, it will go to the first **elif**\
    \ statement where we have another condition. The Interpreter will evaluate the\
    \ condition (in the elif statement) to **True** or **False** and if it’s True,\
    \ then it will execute the statements inside the **elif** block and if the condition\
    \ is **False,** it will jump out and go to the next **elif** statement where there\
    \ is another condition. Finally, if every condition is evaluated to False, the\
    \ final **else-clause** statement/statements will be executed.\n\nHere is one\
    \ example:\n\n```\n# elif\nis_developer = False\nis_employed = True\nif is_developer:\n\
    \    print('Wow this must be super exciting!')\nelif is_employed:\n    print('Great\
    \ at least you have a job :)')\nelse:\n    print('What is your profession then?')\n\
    ```\n\n```\n# Code in main.py:\n1 # elif\n2 is_developer = False\n3 is_employed\
    \ = True\n4 if is_developer:\n5     print('Wow this must be super exciting!')\n\
    6 elif is_employed:\n7     print('Great at least you have a job :)')\n8 else:\n\
    9     print('What is your profession then?')\n\n# Output in Console:\nGreat at\
    \ least you have a job\n```\n\nLet’s explain how the above example is working.\
    \ The if-condition, as we can see, will be evaluated to False because the is_developer\
    \ is set to False and then it will go to the next elif-statement where the condition\
    \ will be evaluated to True. Because the condition in the elif is True, the statement\
    \ inside the elif-block will be executed. Inside the elif block, we have only\
    \ one line of code or a simple message that gets printed. If we set both of the\
    \ if-statement and elif-statement conditions to False and run this code again,\
    \ we have:\n\nThe else clause statement will be executed. So far in the if and\
    \ elif conditions, we have used simple Boolean values that are either True or\
    \ False, and this is okay and normal but the condition itself can be a much more\
    \ complex expression like this:\n\n```\npython\nx = 10\n\nif x > 11:\n    print('The\
    \ value of x is smaller then 11')\nelif x > 5:\n    print('The value of x is bigger\
    \ than 5')\nelse:\n    print('The value of x is undefined')\n```\n\n## Understanding\
    \ Python Indentation\n\nIndentation in Python is very important and it refers\
    \ to the spaces at the beginning of the code. If you are a JavaScript developer,\
