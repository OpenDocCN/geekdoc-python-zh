    # Operator Precedence


    So far, we have learned that we can perform mathematical operations on the two
    Python data types (Integer and Float). In order to achieve this, we need to use
    operators like +, -, *, /. Most times, the mathematical expressions are complex
    and we use a combination of different operators to get the end result. This is
    where the operator precedence takes place. The operator precedence means that
    when different operators are combined in one expression, some of them will have
    precedence over others. The Python Interpreter knows these rules and always follows
    them.


    For example, let''s consider this expression:


    ```

    7 - 3 * 2

    ```


    From our math classes, we know that first, we need to perform multiplication (3
