    dictionaries {}. A tuple is a collection of data that is ordered and we cannot
    change the order of items once the tuple is created. We have already printed the
    tuple but if we want to access the individual items, we need to use their indexes.
    Same as with Lists, the indexes start from position zero. Same as lists, to access
    the items, we need to use the square brackets where we pass the index position:


    ```

    #access items

    print(new_tuple[2])

