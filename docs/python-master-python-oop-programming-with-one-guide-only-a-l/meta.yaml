- md: "## Chapter 6 – Working with Files in Python\n\nIn most programming languages,\
    \ you will find the phrase **FILE I/O**, but what does it mean? The letter 'I'\
    \ stands for **input** and the 'O' stands for **output**. In this chapter, we\
    \ will cover how we can work with files in Python. Python has several functions\
    \ for handling files like open, write, and read. The key function for working\
    \ with files in Python is the open() function so let's start with it.\n\n### Open\n\
    \nIn this chapter, I will use the VS Code editor instead of the PyCharm because\
    \ I want you to have a book that uses both development tools. I will create a\
    \ folder on my desktop called **'chapter6.1-files'** and inside I will add two\
    \ files, the first one will be a Python file called main.py and the second will\
    \ be a text file called text.txt file:\n\n![](img/9f2174949e81804f7192ec47968e0efb_429_0.png)\n\
    \nAs you can see from the figure above, the text.txt file contains the simple\
    \ text 'Hi there!' and the main.py file is empty for now. The idea is to use the\
    \ text.txt file and open it from our main.py file and if you want to do this,\
    \ you can use the open() function that is built-in Python:\n\n```\ntext_file =\
    \ open('text.txt')\n```\n\nHere we will use the function open that takes one argument.\
    \ The argument is the file name and we need to pass it as a string or in quotes\
    \ (single or double). Whatever the function open() returns, the result will be\
    \ stored in a variable called text_file. Let's run the main file and print what\
    \ we have in the **text_file** (I will use the VS Code terminal):\n\n```\ntext_file\
    \ = open('text.txt')\nprint(text_file)\n```\n\nThe output is the following:\n\n\
    ```\n<io.TextIOWrapper name='text.txt' mode='r' encoding='UTF-8'>\n```\n\nWe can\
    \ see that we have an **IO** object called **TextIOWrapper**, and then we have\
    \ the file name, the mode 'r' (we will learn what this means), and finally, the\
    \ encoding which is **UTF-8**. The encoding tells us how the file is encoded.\
    \ The goal is to read the content of this file, and luckily for us, Python gives\
    \ us the function to read called read():\n\n![](img/9f2174949e81804f7192ec47968e0efb_431_0.png)\n\
    \nAs you can see from the figure above, we can click on the triangle to run the\
    \ code instead of typing in the terminal **python3 main.py**. Regardless of how\
    \ you execute the main.py script, you will have the same output, but be careful,\
    \ we can read the file only once because of the open() function. Python treats\
    \ the open function as a cursor, therefore if you want to read the same file multiple\
    \ times, you will run into some problems. Okay let's test this and call the read()\
    \ function multiple times:\n\n```\nprint(text_file.read())\nprint(text_file.read())\n\
    print(text_file.read())\nprint(text_file.read())\n```\n\nIf you run the above\
    \ code, only the first read function will work and will produce an output, the\
    \ rest of the read functions will not produce results. This means that the contents\
    \ of the file are read as a cursor, one character at a time, and at the end of\
    \ the first read(), the cursor will reach the end of the file. We can fix this\
    \ if we use the seek() method where we can pass the index which will determine\
    \ the position where the reading should start. If we want to start from the beginning,\
    \ the index should be zero:\n\n![](img/9f2174949e81804f7192ec47968e0efb_432_0.png)\n\
    \nIf your text.txt file has multiple lines of content and you need to read the\
    \ first line only, you can use the method called readline(). Let's add a few more\
    \ lines in the text.txt file and test this readline() method:\n\n```\ntext.txt\n\
    1   Hi there!\n2   My Name is Rick\n3   What is your name?\n```\n\nLet's call\
    \ the readline() method:\n\n![](img/9f2174949e81804f7192ec47968e0efb_433_0.png)\n\
    \nIf you need to read all of the lines, then you can use the method called readlines()\
    \ but this method will return a List data type with all of the lines from the\
    \ file. The list will also include the newline character '\\n' that we use to\
    \ create a new line. Let's use this method and check the output:\n\n![](img/9f2174949e81804f7192ec47968e0efb_434_0.png)\n\
    \nAs a good practice, we need to close the file at the end because you might want\
    \ to use it somewhere else so it's a common practice to close the file/files that\
    \ are opened. To do this, we can call the close() method:\n\n```\ntext_file.close()\n\
    ```\n\nIn the next section, I will teach you another way to open and close a file\
    \ using the 'with' statement.\n\n### Write and Append to Files\n\nIn the previous\
    \ section, we saw how can we open files, read from them using some methods, and\
    \ finally we had to close them so they can be used again. Today there is a much\
    \ nicer way of doing I/O in other to avoid closing the file manually. This new\
    \ way of opening and closing the files can be achieved using the 'with' statement.\
    \ I will duplicate the main.py file and rename it to main1 so I can show you the\
    \ new features from this section. Let's open the text.txt file using the with\
    \ statement:\n\n![](img/9f2174949e81804f7192ec47968e0efb_435_0.png)\n\nAs you\
    \ can see, I don't need to close the file at the end using the 'with' statement.\
    \ This is what developers are using today.\n\n### Write to a file\n\nRemember\
    \ at the beginning of this chapter when we printed the file, we had access to\
    \ the mode='r':\n\n```\n<io.TextIOWrapper name='text.txt' mode='r' encoding='UTF-8'>\n\
    ```\n\nThe mode='r' stands for reading and we can even specify the mode directly\
    \ into the 'with' statement like this:\n\n```\nwith open('text.txt', mode='r')\
    \ as new_text_file:\n    print(new_text_file.read())\n```\n\nThe 'r' is the default\
    \ parameter, we don't need to specify it, but if you are interested in writing\
    \ to a file, we need to use the mode='w', where 'w' stands for writing into a\
    \ file. If we change the mode to write and run the same file, we will end up with\
    \ an error because we are trying to read from a file but the mode is set to write:\n\
    \n```\nwith open('text.txt', mode='w') as new_text_file:\n    print(new_text_file.read())\n\
    ```\n\n```\nFile \"/Users/rick/Desktop/chapter6.1-files/main1.py\", line 2, in\
    \ <module>\n    print(new_text_file.read())\nio.UnsupportedOperation: not readable\n\
    ```\n\nBefore we fix this problem, please check if your text.txt file content\
    \ is there. Well, the text file would be empty because we tried to write to a\
    \ file without specifying what needs to be written and that will delete the existing\
    \ content, therefore you must be careful when you are using the write mode. What\
    \ if you want to read and write in the same file? We can use the mode='r+' if\
    \ we want to read and write. Okay let's write some content back to a text.txt\
    \ file first:\n\n```\nwith open('text.txt', mode='r+') as new_text_file:\n   \
    \ content = new_text_file.write('Hi there!\\n' 'my name is Rick\\n' 'What is your\
    \ name?')\n```\n\n```\n/usr/local/bin/python3 /Users/rick/Desktop/chapter6.1-files/main1\n\
    ```\n\nIf we open the text.txt file, we can see that we have successfully written\
    \ the new content:\n\n![](img/9f2174949e81804f7192ec47968e0efb_437_0.png)\n\n\
    This works perfectly but let's do some further tests, for example, I don't think\
    \ the content is good enough and I want to write a new text and overwrite the\
    \ previous one. I can just simply do this:\n\n![](img/9f2174949e81804f7192ec47968e0efb_438_0.png)\n\
    \nLet's open the text file and check if the new content 'Hi readers!' has been\
    \ added:\n\n![](img/9f2174949e81804f7192ec47968e0efb_438_1.png)\n\nAs you can\
    \ see from the figure above, we have the new content plus some bits of the old\
    \ content as well. Why is this happening? The reason this is happening is because\
    \ the 'with' statement will reset the open() method or will close it for us so\
    \ the cursor will be back at zero index and we actually add the content at the\
    \ beginning of the old existing one.\n\n### Append\n\nWhen we want to add text\
    \ or content at the end of the existing content, we can use the append mode. All\
    \ we need to add is the letter 'a' in the mode like this:\n\n```\nmode='a'\n```\n\
    \nFor example, let's append the text 'I love Python' to the existing file:\n\n\
    ```\nwith open('text.txt', mode='a') as new_text_file:\n    content = new_text_file.write('I\
    \ love Python!')\n```\n\nAnd if we open the text.txt file, the text should be\
    \ added at the end:\n\n![](img/9f2174949e81804f7192ec47968e0efb_439_0.png)\n\n\
    As an exercise, copy the main1.py file and create a new file called main2.py.\
    \ I would like you to experiment a little bit. In the open() method, instead of\
    \ loading the file text.txt, try using a file that does not exist in your directory/folder,\
    \ for example, use a file called 'file.txt'. After you have done everything, run\
    \ the file and observe what will happen. Here is how the main2.py file looks before\
    \ I click on the run button:"
  mdcn: "## 第6章 – 在Python中处理文件\n\n在大多数编程语言中，你都会看到**FILE I/O**这个短语，但它是什么意思呢？字母'I'代表**输入**，'O'代表**输出**。在本章中，我们将介绍如何在Python中处理文件。Python有几个用于处理文件的函数，如`open`、`write`和`read`。在Python中处理文件的关键函数是`open()`函数，所以让我们从它开始。\n\
    \n### 打开文件\n\n在本章中，我将使用VS Code编辑器而不是PyCharm，因为我希望你拥有一本同时使用两种开发工具的书籍。我将在桌面上创建一个名为**'chapter6.1-files'**的文件夹，并在其中添加两个文件：第一个是名为`main.py`的Python文件，第二个是名为`text.txt`的文本文件：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_429_0.png)\n\n从上图可以看出，`text.txt`文件包含简单的文本'Hi\
    \ there!'，而`main.py`文件目前是空的。我们的想法是使用`text.txt`文件，并从我们的`main.py`文件中打开它。如果你想这样做，可以使用Python内置的`open()`函数：\n\
    \n```\ntext_file = open('text.txt')\n```\n\n这里我们将使用`open`函数，它接受一个参数。参数是文件名，我们需要将其作为字符串或用引号（单引号或双引号）传递。无论`open()`函数返回什么，结果都将存储在一个名为`text_file`的变量中。让我们运行主文件并打印**text_file**中的内容（我将使用VS\
    \ Code终端）：\n\n```\ntext_file = open('text.txt')\nprint(text_file)\n```\n\n输出如下：\n\
    \n```\n<io.TextIOWrapper name='text.txt' mode='r' encoding='UTF-8'>\n```\n\n我们可以看到有一个名为**TextIOWrapper**的**IO**对象，然后是文件名、模式'r'（我们稍后会学习这是什么意思），最后是编码**UTF-8**。编码告诉我们文件是如何编码的。目标是读取这个文件的内容，幸运的是，Python为我们提供了名为`read()`的读取函数：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_431_0.png)\n\n从上图可以看出，我们可以点击三角形来运行代码，而不是在终端中输入**python3\
    \ main.py**。无论你如何执行`main.py`脚本，输出结果都是一样的，但要注意，由于`open()`函数的原因，我们只能读取文件一次。Python将`open`函数视为一个游标，因此如果你想多次读取同一个文件，会遇到一些问题。好的，让我们测试一下，多次调用`read()`函数：\n\
    \n```\nprint(text_file.read())\nprint(text_file.read())\nprint(text_file.read())\n\
    print(text_file.read())\n```\n\n如果你运行上面的代码，只有第一个`read`函数会工作并产生输出，其余的`read`函数不会产生结果。这意味着文件内容是作为游标读取的，一次读取一个字符，在第一次`read()`结束时，游标将到达文件末尾。如果我们使用`seek()`方法，可以修复这个问题，我们可以传递一个索引来确定读取应该开始的位置。如果我们想从头开始，索引应该是零：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_432_0.png)\n\n如果你的`text.txt`文件有多行内容，而你只需要读取第一行，可以使用名为`readline()`的方法。让我们在`text.txt`文件中添加几行内容，并测试这个`readline()`方法：\n\
    \n```\ntext.txt\n1   Hi there!\n2   My Name is Rick\n3   What is your name?\n\
    ```\n\n让我们调用`readline()`方法：\n\n![](img/9f2174949e81804f7192ec47968e0efb_433_0.png)\n\
    \n如果你需要读取所有行，可以使用名为`readlines()`的方法，但此方法将返回一个包含文件中所有行的列表数据类型。该列表还将包含我们用于创建新行的换行符'\\\
    n'。让我们使用此方法并检查输出：\n\n![](img/9f2174949e81804f7192ec47968e0efb_434_0.png)\n\n作为良好的实践，我们需要在最后关闭文件，因为你可能想在其他地方使用它，所以关闭已打开的文件是常见的做法。为此，我们可以调用`close()`方法：\n\
    \n```\ntext_file.close()\n```\n\n在下一节中，我将教你另一种使用'with'语句打开和关闭文件的方法。\n\n### 写入和追加文件\n\
    \n在上一节中，我们看到了如何打开文件，使用一些方法从中读取，最后我们必须关闭它们以便再次使用。如今，有一种更好的方式进行I/O操作，以避免手动关闭文件。这种新的打开和关闭文件的方法可以通过使用'with'语句来实现。我将复制`main.py`文件并将其重命名为`main1`，以便我可以展示本节的新功能。让我们使用`with`语句打开`text.txt`文件：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_435_0.png)\n\n如你所见，使用'with'语句，我不需要在最后关闭文件。这就是开发者们今天正在使用的方式。\n\
    \n### 写入文件\n\n还记得本章开头我们打印文件时，我们访问了`mode='r'`：\n\n```\n<io.TextIOWrapper name='text.txt'\
    \ mode='r' encoding='UTF-8'>\n```\n\n`mode='r'`代表读取，我们甚至可以直接在'with'语句中指定模式，如下所示：\n\
    \n```\nwith open('text.txt', mode='r') as new_text_file:\n    print(new_text_file.read())\n\
    ```\n\n'r'是默认参数，我们不需要指定它，但如果你有兴趣写入文件，我们需要使用`mode='w'`，其中'w'代表写入文件。如果我们把模式改为写入并运行同一个文件，最终会出错，因为我们试图从文件中读取，但模式设置为写入：\n\
    \n```\nwith open('text.txt', mode='w') as new_text_file:\n    print(new_text_file.read())\n\
    ```\n\n```\nFile \"/Users/rick/Desktop/chapter6.1-files/main1.py\", line 2, in\
    \ <module>\n    print(new_text_file.read())\nio.UnsupportedOperation: not readable\n\
    ```\n\n在我们解决这个问题之前，请检查你的`text.txt`文件内容是否还在。嗯，文本文件会是空的，因为我们试图在没有指定要写入什么内容的情况下写入文件，这将删除现有内容，因此在使用写入模式时必须小心。如果你想在同一个文件中读取和写入怎么办？如果我们想读取和写入，可以使用`mode='r+'`。好的，让我们先向`text.txt`文件写回一些内容：\n\
    \n```\nwith open('text.txt', mode='r+') as new_text_file:\n    content = new_text_file.write('Hi\
    \ there!\\n' 'my name is Rick\\n' 'What is your name?')\n```\n\n```\n/usr/local/bin/python3\
    \ /Users/rick/Desktop/chapter6.1-files/main1\n```\n\n如果我们打开`text.txt`文件，可以看到我们已经成功写入了新内容：\n\
