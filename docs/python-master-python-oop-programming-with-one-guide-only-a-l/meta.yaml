    ## Python 中的布尔值（数据类型）


    布尔值是 Python 中的另一种数据类型。Python 中的布尔值只表示两个可能的值之一：`True` 或 `False`。布尔值并非 Python 独有，几乎所有编程语言中都有布尔值。这允许我们将变量设置为
    `True` 或 `False`，如以下示例所示：


    ```

    # Boolean True or False

    is_true = True

    print(is_true)


    is_false = False

    print(is_false)

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_91_0.png)


    当我们学习如何在 Python 中做决策时，布尔值的强大之处就会显现出来。像 `if` 语句这样的决策语句有一个条件，该条件的求值结果总是布尔值 `True`
    或 `False`。我们也可以将表达式求值为布尔值，如本例所示：


    ```

    #compare values

    print(2 > 1)

    print(10 == 10)

    print(10 < 6)

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_91_1.png)


    这个主题将在未来的某一节中进一步探讨。让我们运行这个示例，看看它产生的输出：


    ```

    print(bool(0))

    print(bool(1))

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_92_0.png)


    布尔值零（0）将返回 `False`，布尔值 1 将返回 `True`。`bool` 函数会将整数值转换为 `True` 或 `False`，这将在条件逻辑部分更详细地讨论。


    ## Python 中的列表（数据类型）


    如你所见，我们正在快速学习各种数据类型，在此过程中，我们学习了许多新的、基础的 Python 特性。这就是为什么我决定按照这个特定的顺序创建本指南，因为它对我们来说更自然。我本可以在一开始就列出所有数据类型，然后再解释其余的特性，但我发现这种方式更容易学习。Python
    中另一个重要的数据类型是列表。在 Python 中，列表是对象的有序序列，这些对象可以来自任何数据类型。如果你学过其他编程语言，你会注意到我即将教授的内容与其他编程语言中的数组相同，所以让我们创建一个名为
    `my_list` 的变量：


    ```

    # Lists - data type

    my_list = [1,2,3,4,5,6]

    my_list1 = [''a'',''b'',''c'',''d'']

    my_list2 = [''a'',2,''c'',3]


    print(my_list)

    print(my_list1)

    print(my_list2)

    ```


    ```

    [1, 2, 3, 4, 5, 6]

    [''a'', ''b'', ''c'', ''d'']

    [''a'', 2, ''c'', 3]

    ```


    正如我提到的，列表可以保存数据的有序序列。到目前为止，我们只使用变量来存储单个值，但现在列表使变量成为一个复杂的容器，我们可以在其中存储不同类型的多个数据。如你所见，名为
    `my_list` 的变量可以保存一个整数值的有序序列。第二个名为 `my_list1` 的变量是一个属于字符串数据类型的值的有序序列。最后一个变量具有混合数据类型，这是在一个容器中存储不同类型数据的正常行为。当我们创建列表时，需要使用方括号。方括号内的数据称为项或元素。项或元素之间用逗号分隔。这种数据类型（列表）与
    JavaScript 中的数组完全相同。列表是项的集合或对象的有序序列。列表也是我们的第一个**数据结构**。数据结构允许我们将数据存储在有组织的容器中，这就是为什么我们需要使用方括号，因为我们需要将数据包含在一个单一的单元中。数据结构是一个非常重要的概念，因为它允许我们将信息以有组织的方式包含在一个容器或盒子中。如果我们使用
    `print` 函数并传递列表变量，我们可以看到它会打印方括号中的所有项，但如何从列表中访问这些单独的项/元素呢？嗯，类似于字符串，我们可以使用索引位置。列表索引从位置零开始，就像字符串一样：


