    \n## Try – Except block for error handling\n\nTry – Except block is perfect to\
    \ catch and handle errors that can occur during the I/O operations. Whatever code\
    \ you want to test should be wrapped inside the try-block and the except block\
    \ is where you catch and handle the errors if any. In JavaScript, we have the\
    \ try-catch block and it uses the exact same logic. The same concept is in many\
    \ other programming languages. I have created another folder called chapter6.2-errors\
    \ and inside I copied the readme.txt file and main.py file. Now let’s try out\
    \ the try-except-block:\n\nAs you can see, we have everything indented correctly\
    \ and inside the try-block is where we will always put the code we want to test\
    \ or try out, and in the except block is where we will catch the errors and so\
    \ far we have seen the FileNotFoundError when the file we were trying to open\
    \ does not exist. Here is the complete code because sometimes the images can get\
    \ blurry:\n\n```python\n# try - except block\ntry:\n    with open('readme1.txt',\
    \ mode='r') as new_text_file:\n        print(new_text_file.read())\n\nexcept FileNotFoundError\
    \ as err:\n    print('File cannot be found!')\n```\n\nIf we run this file, the\
    \ Interpreter will see that we have a try-except block and it will go inside and\
    \ try and run the code. If we look at the open () method, we can see that the\
    \ file readme1.txt doesn’t exist in the current directory but the readme.txt file\
    \ exists. There will be an error thrown in the try-block and that error will be\
    \ handled by the except-block where we just print the error message. Python comes\
    \ with pre-defined default error messages for different types of errors. Now if\
    \ we want to access the default error message, we can use a variable that is declared\
    \ after the ‘as’ keyword (err). Think of this variable as a container for storing\
    \ the default error message and instead of printing the custom message we can\
    \ print the ‘err’ variable. We can name this variable differently if we want:\n\
    \n```python\n# try - except block\ntry:\n    with open('readme1.txt', mode='r')\
    \ as new_text_file:\n        print(new_text_file.read())\n\nexcept FileNotFoundError\
    \ as err:\n    print(err)\n```\n\nLet’s try to run the code and observe the output:\n\
