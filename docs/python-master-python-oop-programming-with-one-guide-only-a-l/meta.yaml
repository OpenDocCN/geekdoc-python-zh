    \n## Python 中的错误\n\n在我们目前的代码中，我们已经看到一些错误，我是故意制造这些错误的，因为你不应该害怕它们。最重要的部分是学习它们的含义，并在识别出其含义后采取适当的行动来处理它们。例如，最基本的\
    \ `print` 函数如果写得不正确，就会给我们抛出错误：\n\n```\n# 1 SyntaxError\nprint(')'\n```\n\n如果我们运行这个文件：\n\
