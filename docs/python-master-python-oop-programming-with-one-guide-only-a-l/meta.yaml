    # Power & Assignment

    num1 **= num2

    print(num1)

    # Output: 590490000000000


    num1 = 30

    num2 = 10

    # Modulo & Assignment

    num1 %= num2

    print(num1)

    # Output: 0

    ```


    ## Str – String (data type)


    Strings are another data type in Python. String or **str** in Python is a text
    that is surrounded by single or double quotes.


    String example:


    ```

    # Str - strings data type

    my_name = ''Keanu''

    my_lastname = "Reeves"

    print(my_name)

