- md: "## OOP三大支柱\n\n### 1st Pillar of OOP - Encapsulation\n\nEncapsulation is one\
    \ of the four most important principles of the OOP. We have already covered this\
    \ concept but now hopefully the definition will make sense. Encapsulation refers\
    \ to binding the data with the functions and methods that operate or manipulate\
    \ that data. The data will be the attributes and the functions will be the methods.\
    \ In our example, we have a Class called Person that encapsulates the data which\
    \ will be the attributes like name and age to the functions or methods that manipulate\
    \ that data. You can understand the encapsulation as a package because it holds\
    \ the data and the functions enclosed in one single box:\n\n```python\nclass Person:\n\
    \n    # Constructor\n    def __init__(self, name='John', lastname='Doe', age=18):\n\
    \        if age >= 18:\n            self.name = name  # name attribute\n     \
    \       self.lastname = lastname  # lastname attribute\n            self.age =\
    \ age  # age attribute\n\n    # Method\n    def greet(self):\n        print(f'The\
    \ data and functions are encapsulated, \\n'\n              f'My name is: {self.name},\\\
    n'\n              f'My last name: {self.lastname},\\n'\n              f'and I\\\
    'm old:{self.age} ')\n\nperson_obj1 = Person('Jason', 'Mamoa', 53)\nperson_obj1.greet()\n\
    \n@staticmethod\ndef is_adult(age):\n    return age >= 18\n\nprint(Person.is_adult(19))\n\
    ```\n\nThis will return true because the age (19 >= 18) which is evaluated to\
    \ True.\n\n### 2nd Pillar of OOP – Abstraction\n\nAbstraction means hiding information\
    \ and only giving access to what is necessary. Abstraction is the second most\
    \ important principle that we will cover in OOP. In other words, we are hiding\
    \ the internal implementation of the methods from outside users by only providing\
    \ access to limited data. Take a look at the following Object that accesses the\
    \ greet() method:\n\n![](img/9f2174949e81804f7192ec47968e0efb_334_0.png)\n\nThe\
    \ Object **person_obj1** does not know how the greet() method is implemented in\
    \ the Class Person, so that information is hidden but the Object gets an output\
    \ which means it gets only the essential data the method greet() provides. The\
    \ person_obj1 knows what the greet() function does and it can get the output but\
    \ it doesn't know the internal implementation.\n\n### Python Private vs Public\
    \ Variables\n\nIn this section, we will discuss what private and public variables\
    \ are, what they mean, and how can we use them in our code. Please check out the\
    \ following code:\n\n```python\n# private and public variables\nclass Person:\n\
    \    # Constructor\n    def __init__(self, name='John', lastname='Doe', age=18):\n\
    \        if age >= 18:\n            self.name = name\n            self.lastname\
    \ = lastname\n            self.age = age\n\n    # Class method\n    def greet(self):\n\
    \        print(f'The data and functions are encapsulated, \\n'\n             \
    \ f'My name is: {self.name}, \\n'\n              f'My last name is: {self.lastname},\
    \ \\n'\n              f'and I\\'m {self.age} old.')\n\nperson_obj1 = Person('Jason',\
