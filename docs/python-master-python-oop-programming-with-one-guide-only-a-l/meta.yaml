  md: '# # Chapter 4 – Object Oriented Programming – Advanced Python


    Python is an Object-Oriented Programming language. This term is used by many other
    languages and it’s fundamental. It’s so important to understand the concept of
    having Objects because in Python everything can be considered as an Object. OOP
    languages are organized around Objects and these Objects can be created and modified
    during runtime. We will learn where these Objects come from in the next sections
    but each object is known as an instance of a class. The Classes in OOP are the
    templates that allow us to create objects. In this chapter, we will learn what
    OOP is and what its most important features are.


    # ## Class keyword


    In the previous chapter, we have seen the keyword ‘class’ when we tried to confirm
    the data type using the function type():


    ![](img/9f2174949e81804f7192ec47968e0efb_311_0.png)


    The class keyword is everywhere in Python. I mentioned that everything in Python
    can be considered an Object. Each object has access to properties,'
  merge: -1
  pgno: 311
- img_proc: true
  md: methods, and attributes. The Classes in Python will allow us to create objects,
    so they are a blueprint for creating objects. This means that the classes can
    help us create new Objects and expand the initial list of data types. This also
    means that we can get creative and create our own data types that are different
    from the built-in ones. This chapter will help you to gain an in-depth understanding
    of these concepts. Therefore, Object-Oriented Programming is the most fundamental
    paradigm. Before Object-Oriented Programming, our code was a list of procedures
    where each procedure was executed in a specific order but this was changed when
    OOP was introduced. Please note that you can continue using replit.com to run
    the code that we are going to cover in this chapter or you can use some of the
    tools we have installed in the previous chapter. To put your curiosity at ease,
    let’s start learning OOP.
