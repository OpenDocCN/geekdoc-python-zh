    # Important Information


    For Python 3.10 releases, we provide a new universal2 installer variant that provides
    universal binaries for both ARM64 and Intel 64 architectures and is also supported
    on all Macs that support macOS 10.9 or later. Some of the advantages of the new
    installer variant: native ARM64 code on Apple Silicon Macs should run significantly
    faster than Rosetta2-emulated code; some operating system functions and options
    introduced in macOS releases since 10.9 are now exposed when available (primarily
    in the os module); and the new installer variant includes Tcl/Tk 8.6.11 rather
    than 8.6.8.


    On Apple Silicon Macs, it is possible to run Python either with native ARM64 code
    or under Intel 64 emulation using Rosetta2. This option might be useful for testing
    or if binary wheels are not yet available with native ARM64 binaries. To easily
    force Python to run in emulation mode, invoke it from a command line shell with
    the python3-intel64 command instead of just python3.


