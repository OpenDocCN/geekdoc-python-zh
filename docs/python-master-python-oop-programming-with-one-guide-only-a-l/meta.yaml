    \n![](img/9f2174949e81804f7192ec47968e0efb_218_0.png)\n\n从上图中我们可以看到，函数调用没有提供所有参数，但在输出中，缺失的参数被默认值替换了。这就是为什么默认参数如此重要，因为现在我们即使不传任何参数来调用函数，它最终仍然能产生一个结果：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_218_1.png)\n\n## 函数返回\n\n`return` 是\
    \ Python 中的一个特殊关键字，在函数中非常有用且常见。其理念是函数总是返回一个值，我们可以使用该值做任何我们想做的事。让我们创建一个函数来计算两个整数的和：\n\
    \n```python\n# 使用 return 关键字的求和函数\ndef calc_fun(num1, num2):\n    num1 + num2\n\
    \ncalc_fun(3, 4)\n```\n\n上面的函数会计算我们在函数调用中传入的两个参数的和，但当我们运行它时，输出结果却不见了。我知道你在想，是不是因为我们没有使用\
    \ `print` 函数来打印结果。我们并不总是必须使用 `print` 函数来获取值，函数的目标不是打印消息，而是返回一个值。我们可以这样返回结果：\n\n\
    ```python\n# 使用 return 关键字的求和函数\ndef calc_fun(num1, num2):\n    return num1 +\
    \ num2\n\ncalc_fun(3, 4)\n```\n\n很好！现在我们可以将函数调用包装在 `print` 函数中，这样就能得到结果：\n\n![](img/9f2174949e81804f7192ec47968e0efb_219_0.png)\n\
    \n我们也可以将返回值存储到一个变量中，然后在代码中后续使用该变量：\n\n```python\n# return\ndef calc_fun(num1,num2):\n\
    \    return num1 + num2\n\nfn_result = calc_fun(3,4)\nfn_result += 1\nprint(fn_result)\n\
    ```\n\n现在这个值是 8，因为我们可以操作这个变量的值。你需要知道的是，当解释器在函数体中看到 `return` 关键字时，函数将返回该值并终止执行。你需要小心在函数体中\
    \ `return` 关键字之后放置代码，因为那段代码将永远不会被执行，如下例所示：\n\n```python\n# return\ndef calc_fun(num1,num2):\n\
    \    return num1 + num2\n    print(num1+num2)\n\nfn_result = calc_fun(3,4)\nfn_result\
    \ += 1\nprint(fn_result)\n```\n\n第 4 行将永远不会被执行，因为第 3 行的 `return` 关键字已经终止了函数。\n\
    \n## 嵌套函数\n\n嵌套函数非常有趣，因为我们可以拥有在一个函数内部定义的函数。与其只有一个函数，我们会有一个内部/嵌套函数，它可以访问外部或外层函数中定义的变量。我知道这可能令人困惑，但让我们创建一个简单的例子，以便你能理解嵌套是如何工作的。\n\
    \n```python\n# 嵌套函数\ndef outer_fn(num1, num2):\n    def inner_fn(n1, n2):\n  \
    \      return n1 + n2\n    total = inner_fn(num1, num2)\n    return total\n\n\
    result = outer_fn(2, 3)\nprint(result)\n```\n\n输出将是 5，以下是截图：\n\n![](img/9f2174949e81804f7192ec47968e0efb_221_0.png)\n\
    \n从上图中，我们有两个函数，一个是 **outer_fn**，它接受两个参数 **num1** 和 **num2**；第二个函数是 **inner_fn**。在第\
