    ## 前言


    本书是想要学习 Python 的人的完美指南。你会发现本书以易于理解的方式解释了复杂概念。在涵盖基础知识之后，我们将把重点转向每位 Python 程序员都应该知道的一些中级特性。我不是专业作家，但我是一名专业的
    Web 开发人员和程序员，因此我的目标是通过完美的示例以及干净且可执行的代码来教你编程。当我刚开始学习 Python 时，我曾担心这门语言会有多难，但我可以向你保证，Python
    与任何其他编程语言一样，只需要耐心、实践，当然还需要一本带有实用示例的好指南。我这本书的目标是帮助你将当前的技能提升到专业水平。如果你正在寻找额外的参考资料，那么我只能建议你查阅
    Python 文档。如果你已经看过 Python 文档，那么你知道它可能很长、很吓人、令人不知所措。不用担心，因为这本书将为你节省数月的研究、规划和不眠之夜。


    你可以通过点击以下链接访问 Python 的官方网站：


    [https://docs.python.org/3/](https://docs.python.org/3/)


    我也想听听你的意见。如果你需要联系我，请通过我的任何社交媒体账户联系我，并请考虑留下评论和评价。


