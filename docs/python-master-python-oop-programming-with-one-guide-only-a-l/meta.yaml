    ## 列表方法\n\n与字符串数据类型一样，列表有自己的方法，我们需要使用点表示法来调用这些方法。有一些列表方法我们可以使用，这里是你可以阅读所有相关内容的链接：\n\
    \nhttps://docs.python.org/3/tutorial/datastructures.html\n\n我们将涵盖最常用的方法。让我们从第一个叫做`append()`的方法开始\n\
    \n### append() 方法\n\n我们简单地使用这个方法在列表末尾添加一个元素：\n\n```python\n# 1 追加\nmy_list = ['one','two','three'];\n\
