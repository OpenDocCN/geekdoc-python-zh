    ## 第一章 - Python 基础


    欢迎来到第一章。到目前为止，这是最重要的一章。这里的目的是尝试理解 Python 的基本特性，因为没有它们，你将很难理解后面章节中介绍的更高级的特性。在本章中，我们将首先介绍
    Python 的基础知识，比如 Python 是什么以及我们如何运行 Python 代码。虽然它被称为 Python 基础，但会有一些特性并不那么容易理解，因此，请确保你在进入下一节之前花足够的时间学习这些概念。


    ### 什么是 Python？


    根据官方文档，Python 是“一种解释型、面向对象、具有动态语义的高级编程语言”。Python 是一种通用的计算机编程语言，意味着它可以用来创建解决不同问题的应用程序。Python
    可以用来创建网站、软件，甚至进行数据分析。学习 Python 很简单，因为它使用简单的语法，因此，即使是编程新手也能学会它。Python 强调代码的可读性，这可以通过
    Python 支持模块和包来实现。简单来说，这意味着我们不必拥有一个包含数千行代码的大文件，而是可以拥有多个文件，这些文件可以与主文件通信并共享代码。这降低了程序的维护成本，并且由于
    Python 是免费使用的，它是一种完美的编程语言。Python 编程语言由 Guido van Rossum 创建，并于 1991 年 2 月 20 日首次发布。


    ### 为什么 Python 如此流行？


    Python 是一种广泛使用的高级编程语言，因为代码是用类似英语的格式编写的，或者如果你仔细观察代码，你会发现它的编写方式类似于人类的思维方式。有些人可能会认为
    Python 比其他高级语言如 **C、C++ 或 Java** 慢，但这并不影响最终用户。另一个巨大的优势是，与 **Java** 和 **C++** 相比，Python
    的生产力更高，因为构建应用程序所需的时间、精力和代码行数更少。由于其流行度，Python 社区非常出色且庞大。拥有一个庞大的社区非常重要，因为 Python
    允许我们创建可以与其他开发者共享的包和模块。这使得 Python 成为一种灵活的语言，具有不同的现实世界应用，例如：


    - 游戏开发

    - Web 开发

    - 人工智能和机器学习

    - 电子商务

    - 图像处理和平面设计

    - 科学计算


    另一个好处是 Python 代码是解释型的，而不是编译型的。这意味着代码在运行时逐行解释，不需要运行前编译。因为 Python 代码使用解释器，它逐行执行语句，更容易调试和发现错误。有一些第三方工具可以用来优化性能和处理错误。一个巨大的好处是
    Python 代码是可移植的，跨平台功能在当今的开发中是必须的。这意味着用 Python 创建的应用程序可以在任何操作系统上运行，如 Windows、macOS、Linux
    和 Unix，无需修改。这些是使 Python 成为最受欢迎的编程语言之一的一些特性。


    ### Python 解释器


    根据定义，我们知道 Python 是一种**解释型高级**语言。这意味着 Python 需要一个解释器来从我们的文件中读取代码并执行该文件中的指令。其他**高级**语言如
    **C++** 要求我们编译代码。编译过程将人类可理解的代码转换为只有机器能理解的代码，称为**机器码**。机器码由 **CPU** 执行的基本级指令组成。编译过程后，会生成一个可执行文件。另一方面，**Python**
    是一种解释型语言，意味着它不会将代码翻译成机器码，而是翻译成**字节码**，这将创建一个扩展名为（**.pyc**）的文件。Python 解释器在我们安装
    Python 时就附带了，我们将在第 3 章中看到如何操作。这意味着当我们安装官方的 Python 语言时，我们也可以访问 Python 解释器。简而言之，Python
    解释器是一个程序，它将读取我们的源代码并为我们运行它。那么，**字节码**文件和**编译**文件有什么区别呢？编译文件是在 **CPU** 上执行的一组指令，而字节码文件的指令是在一个称为
    **CPython VM** 的虚拟机上执行的。正因为如此（CPython VM），**字节码**可以在任何操作系统或平台上执行。简单来说，开发者用 Python
    编写代码，然后代码被编译成 Python **字节码**。这将创建一个扩展名为（**.pyc**）的文件，而**字节码**是我们作为开发者无法控制的，因为它是在后台发生的。所以，**字节码**是我们编写的代码的低级表示。**VM（Python
    虚拟机）**也是我们不需要担心的东西，因为它是 Python 系统的一部分，用于运行我们的 Python 文件/脚本。有趣的是，Python 解释器是用 C
    语言编写和实现的，这就是为什么它被称为 **CPython**。下图解释了解释器工作的整个过程：


    ![](img/9f2174949e81804f7192ec47968e0efb_29_0.png)


    从上图中，我们可以看到我们使用不同的工具（如 IDE 和代码编辑器，我们将在第 3 章安装它们）编写 Python 代码，文件被解释器获取，解释器使用编译器创建扩展名为（**.pyc**）的**字节码**文件。这个文件被虚拟机获取并执行，虚拟机是平台无关的，让我们可以在任何想要的系统上使用
    Python。在第 3 章中，我们将看到如何在我们的机器上安装 Python，以及如何使用不同的工具来专业地编写和执行 Python 代码。


    ## 为什么有这么多编程语言？


    为什么有这么多编程语言的答案很简单。今天我们有不同的语言，因为没有一种语言能做我们想做的一切。这意味着没有一种单一的终极语言能完美地用于制作游戏、网站、软件应用程序等等。今天我们有如此多不同的应用需求，使得一种语言不可能支持所有功能。这将使语言变慢，并且需要大量的时间'
