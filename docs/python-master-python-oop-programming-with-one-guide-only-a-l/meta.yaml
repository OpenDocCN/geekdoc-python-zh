    ## Type Conversion or Type Casting


    In Python, the strings are written as str and this is a built-in function in Python,
    but if str is a function, can we use brackets as with the other built-in functions?
    Let’s use the str function to pass an integer number as a value:


    ```

    python

    # type conversion

    print(str(250))

    ```


    If we run this in the browser, the output will be 250, but is 250 an integer number
    or string? Just to make things clear, let us rewrite the above code and store
    the result from the function str into a variable and then check the type of the
    variable:


    ![](img/9f2174949e81804f7192ec47968e0efb_67_0.png)


    As you can see, the result or the value 250 is from type string. This means that
    the str() function converts the 250 integer number we initially passed into the
    str function to string. Because the value of the result variable is string, we
    cannot do normal mathematical operations like the following:


    ```

    # can only concatenate str (not "int") to str

    print(result + 10)

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_67_1.png)


    This is called explicit type conversion, where users/developers like us try to
    convert the variable value from one data type to a required data type. We can
    do this type conversion with the built-in functions like int(), float(), str(),
    etc. Let''s try to do a type conversion from a string to integer:


    ```

