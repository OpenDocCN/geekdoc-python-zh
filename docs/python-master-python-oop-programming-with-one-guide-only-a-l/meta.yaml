  mdcn: "## elif\n\nif-else语句很好用，但它只涵盖两种情况——条件为真则执行此操作，条件为假则执行else子句语句。我们能做的远不止这两种操作，因为有一种语法允许我们定义两个以上的选项。这种语法叫做elif条件语句，是else-if的简写。elif的语法如下：\n\
    \n```\nif <表达式>:\n    <语句块>\nelif <表达式>:\n    <语句块>\nelif <表达式>:\n    <语句块>\n\
    \    ...\nelse:\n    <语句块>\n```\n\n也许这种语法一开始看起来有点令人困惑，但实际上并不那么难。**Python**解释器会首先计算**if-表达式**，如果结果为**真**，它将执行**if-语句**下方的代码；如果条件计算结果为假，它将跳转到第一个**elif**语句，这里有一个新的条件。解释器会计算该条件（在elif语句中）为**真**或**假**，如果为真，则执行**elif**块内的语句；如果为**假**，则跳出并继续检查下一个**elif**语句中的条件。最终，如果所有条件都计算为假，最终的**else-子句**语句将被执行。\n\
    \n这里有一个例子：\n\n```\n# elif\nis_developer = False\nis_employed = True\nif is_developer:\n\
    \    print('Wow this must be super exciting!')\nelif is_employed:\n    print('Great\
    \ at least you have a job :)')\nelse:\n    print('What is your profession then?')\n\
    ```\n\n```\n# main.py 中的代码：\n1 # elif\n2 is_developer = False\n3 is_employed =\
    \ True\n4 if is_developer:\n5     print('Wow this must be super exciting!')\n\
    6 elif is_employed:\n7     print('Great at least you have a job :)')\n8 else:\n\
    9     print('What is your profession then?')\n\n# 控制台输出：\nGreat at least you have\
    \ a job\n```\n\n我们来解释一下上面这个例子是如何工作的。如我们所见，if条件将被计算为假，因为`is_developer`被设置为假，然后它将进入下一个elif语句，其条件将被计算为真。因为elif中的条件为真，所以elif块内的语句将被执行。在elif块内部，我们只有一行代码或一个简单的消息被打印。如果我们把if语句和elif语句的条件都设为假，并再次运行此代码，我们将得到：\n\
    \nelse子句的语句将被执行。到目前为止，在if和elif条件中，我们使用的都是简单的布尔值，即真或假，这样是完全可以且正常的，但条件本身可以是一个更复杂的表达式，像这样：\n\
    \n```\npython\nx = 10\n\nif x > 11:\n    print('x的值小于11')\nelif x > 5:\n    print('x的值大于5')\n\
    else:\n    print('x的值未定义')\n```\n\n## 理解Python缩进\n\n在Python中，缩进非常重要，它指的是代码开头的空格。如果你是JavaScript开发者，那么你知道空格并没有那么重要，但我们（开发者）还是会这样做，只是为了美化代码风格。适当的缩进使代码更具可读性且更易于理解。在Python中，缩进将表明代码与上方的代码不同，属于另一个代码块，并且有自己的作用域。如果你不使用缩进，将会得到错误。只要至少有一个空格，空格的具体数量并不重要。如果你使用多个空格，请确保在整个文件中应用相同数量的空格，否则，你会得到一个名为**IndentationError**或意外缩进的错误：\n\
    \n正如你从上图所看到的，最后一个else子句下方的代码没有缩进，解释器会用红线标出它，如果我们尝试运行代码，就会抛出错误。另一个有趣的事情是，开发者喜欢通过按Tab键或简单地添加多个空格来进行缩进。他们通常添加的空格数是四个，但目前在replit.com上，系统为我们添加了两个空格。这可以在设置中更改，你可以在那里选择缩进类型（空格或Tab键）并设置缩进大小：\n\
    \n如果你想添加四个空格，那么将缩进类型设置为空格，并将缩进大小从二增加到四，如下图所示：\n\n正如你所见，缩进在Python中非常重要。\n\n## Python运算符\n\
    \n运算符在所有编程语言中都非常重要。Python将运算符分为不同的组：\n\n- 算术运算符\n- 赋值运算符\n- 比较运算符\n- 逻辑运算符\n-\
    \ 身份运算符\n- 成员运算符\n- 按位运算符\n\n## 算术运算符\n\n算术运算符用于数字，以便我们进行一些数学计算：\n\n| 运算符 | 名称\
    \ | 示例 |\n|--------|------|------|\n| + | 加法 | a + b |\n| - | 减法 | a - b |\n|\
    \ * | 乘法 | a * b |\n| / | 除法 | a / b |\n| % | 取模（取余数） | a % b |\n| ** | 指数（幂运算）\
    \ | a ** b |\n| // | 整除（地板除） | a // b |\n\n我们在第一章中已经解释过算术运算符，所以我只是想让你有这个表格作为参考。我们也使用过`+`运算符来连接不同的字符串。\n\
    \n## 赋值运算符\n\n如我们所知，当我们想给变量赋值时使用赋值运算符。我们在前面的章节中已经介绍了基本赋值运算符和增强赋值运算符，因为它们在Python编程中扮演着非常特殊的角色。增强赋值运算符的功能是将算术和按位运算符的功能与赋值运算符结合起来。增强赋值运算符不过是简短语法，这样我们就可以执行二元运算并将结果赋给其中一个操作数。\n\
    \n例如：\n\n```\na += 7\n```\n\n上面的表达式等同于下面的表达式：\n\n```\na = a + 7\n```\n\n| 运算符\
    \ | 描述 | 示例 | 等效形式 |\n|--------|------|------|----------|\n| = | 赋值；将等号`=`右侧的值赋给左侧操作数\
    \ | a = 3 | a = 3 |\n| += | 加并赋值；将右侧操作数与左侧操作数相加，然后将值赋给左侧操作数 | a += 2 | a = a +\
    \ 2 |\n| -= | 减并赋值；将左侧操作数减去右侧操作数，然后将值赋给左侧操作数。 | a -= 2 | a = a - 2 |\n| *= | 乘并赋值；将右侧操作数与左侧操作数相乘，然后将值赋给左侧操作数\
    \ | a *= 4 | a = a * 4 |\n| /= | 除并赋值；将左侧操作数除以右侧操作数，然后将值赋给左侧操作数 | a /= 3 | a =\
    \ a / 3 |\n| %= | 取模并赋值；对左右操作数取模，然后将结果赋给左侧操作数 | a %= 6 | a = a % 6 |\n| //= |\
    \ 整除并赋值；将左侧操作数除以右侧操作数，然后将整除后的值赋给左侧操作数 | a //= 4 | a = a // 4 |\n| **= | 指数并赋值；使用操作数计算指数，然后将值赋给左侧操作数\
    \ | a **= 4 | a = a ** 4 |\n| &= | 按位与并赋值；该运算符将对操作数执行按位与运算，然后将结果赋给左侧操作数 | a &=\
    \ 2 | a = a & 2 |"
