  mdcn: "## OOP三大支柱\n\n### 面向对象编程的第一支柱——封装\n\n封装是面向对象编程四大最重要原则之一。我们已经介绍过这个概念，现在希望这个定义能让你理解。封装指的是将数据与操作或处理该数据的函数和方法绑定在一起。数据将成为属性，而函数将成为方法。在我们的示例中，有一个名为\
    \ `Person` 的类，它将数据（如姓名和年龄等属性）封装到处理这些数据的函数或方法中。你可以将封装理解为一个包裹，因为它将数据和函数封装在一个单一的盒子里：\n\
    \n```python\nclass Person:\n\n    # Constructor\n    def __init__(self, name='John',\
    \ lastname='Doe', age=18):\n        if age >= 18:\n            self.name = name\
    \  # name attribute\n            self.lastname = lastname  # lastname attribute\n\
    \            self.age = age  # age attribute\n\n    # Method\n    def greet(self):\n\
    \        print(f'The data and functions are encapsulated, \\n'\n             \
    \ f'My name is: {self.name},\\n'\n              f'My last name: {self.lastname},\\\
    n'\n              f'and I\\'m old:{self.age} ')\n\nperson_obj1 = Person('Jason',\
    \ 'Mamoa', 53)\nperson_obj1.greet()\n\n@staticmethod\ndef is_adult(age):\n   \
    \ return age >= 18\n\nprint(Person.is_adult(19))\n```\n\n这将返回 true，因为年龄（19 >=\
    \ 18）的计算结果为真。\n\n### 面向对象编程的第二支柱——抽象\n\n抽象意味着隐藏信息，只提供必要内容的访问接口。抽象是我们将要在OOP中讲解的第二重要原则。换句话说，我们通过只提供对有限数据的访问，向外部用户隐藏方法的内部实现方式。请看以下调用\
    \ `greet()` 方法的对象：\n\n![](img/9f2174949e81804f7192ec47968e0efb_334_0.png)\n\n\
    对象 **person_obj1** 不知道 `greet()` 方法在 `Person` 类中是如何实现的，因此该信息被隐藏了，但对象获得了输出，这意味着它只获取了\
    \ `greet()` 方法提供的必要数据。`person_obj1` 知道 `greet()` 函数做什么并能获取输出，但它不知道内部实现。\n\n###\
    \ Python 私有变量与公有变量\n\n在本节中，我们将讨论什么是私有和公有变量，它们的含义，以及如何在代码中使用它们。请查看以下代码：\n\n```python\n\
    # private and public variables\nclass Person:\n    # Constructor\n    def __init__(self,\
    \ name='John', lastname='Doe', age=18):\n        if age >= 18:\n            self.name\
    \ = name\n            self.lastname = lastname\n            self.age = age\n\n\
    \    # Class method\n    def greet(self):\n        print(f'The data and functions\
    \ are encapsulated, \\n'\n              f'My name is: {self.name}, \\n'\n    \
    \          f'My last name is: {self.lastname}, \\n'\n              f'and I\\'m\
    \ {self.age} old.')\n\nperson_obj1 = Person('Jason', 'Mamoa', 53)\nperson_obj1.greet()\n\
    person_obj1.lastname = 'Bourne'\n\nprint('-------------------')\nperson_obj1.greet()\n\
    ```\n\n这是最后一个 `greet` 方法的输出结果：\n\n```\nThe data and functions are encapsulated,\n\
    My name is: Jason,\nMy last name is: Mamoa,\nand I'm 53 old.\n---------------------\n\
    The data and functions are encapsulated,\nMy name is: Jason,\nMy last name is:\
    \ Bourne,\nand I'm 53 old.\n```\n\n我知道你没想到这个结果，因为我使用了 `Person` 类的一个实例并更改了 `lastname`\
    \ 属性的值。这与面向对象编程的第二支柱——抽象——完全相反，因为该原则认为对象不应该能够访问和修改数据，而应该只是获取数据/信息。在 Java 中，我们可以创建私有变量，它们对实例来说保持私有。这是\
    \ Java 中一个很好的概念，我们所要做的就是在前面写上 `private` 关键字：\n\n```java\n// Private\nprivate String\
    \ name;\nprivate String lastname;\nprivate int age;\n```\n\n但我们在 Python 中无法做同样的事情。在\
    \ Python 中，当我们想表示这个属性或变量是私有的时，需要在它前面写一个下划线：\n\n```python\nself._name = name #\
    \ name attribute\nself._lastname = lastname # lastname attribute\nself._age =\
    \ age # age attribute\n```\n\n这与 Java 中的不完全一样。如果我们再次运行上面的代码，它不会报错，因为 `lastname`\
    \ 的值会被更改，那么写下划线的意义何在？嗯，意义在于当其他程序员看到这种命名约定时，他们会明白我们是在表示这个属性是私有的，我们不应试图更改其值。所有其他变量被认为是公有的，而带下划线的则被认为是私有的。这就是我们在\
    \ Python 中模拟私有性的方式——通过在前面添加下划线，但如果有人试图修改它，仍然会生效。在 Python 中，我们无法像在其他 OOP 语言中那样实现真正的私有，但至少我们有一种命名约定，即在属性名前使用单个下划线。当我们使用\
    \ `_lastname` 时，我们表明这是 Python 中的一个私有变量/属性。例如，`greet()` 方法现在也必须在变量前包含下划线，这样它才能无错误地工作：\n\
    \n```python\n# Method\ndef greet(self):\n    print(f'The data and functions are\
    \ encapsulated, \\n'\n          f'My name is: {self._name},\\n'\n          f'My\
    \ last name: {self._lastname},\\n'\n          f'and I\\'m old:{self._age} ')\n\
    ```\n\n### 面向对象编程的第三支柱——继承\n\n继承是 OOP 的核心原则之一。继承允许我们创建一个类，该类将继承另一个类的方法和属性。被继承的类称为父类或基类，而从父类继承方法和属性的类称为子类或派生类。到目前为止，我们一直使用\
    \ `Person` 类作为示例来解释 OOP 的一些原则。`Person` 类有 `name`、`lastname` 和 `age` 作为属性，以及一个名为\
    \ `greet` 的方法来打印这些属性。为了向你展示继承，我需要创建另一个名为 `Student` 的类，该类将从父类 `Person` 继承功能。让我们看看如何在\
    \ Python 中实现这一点：\n\n```python\n# inheritance\nclass Person:\n    # Constructor\n\
    \    def __init__(self, name='John', lastname='Doe', age=18):\n        if age\
    \ >= 18:\n            self._name = name  # name attribute\n            self._lastname\
    \ = lastname  # lastname attribute\n            self._age = age  # age attribute\n\
    \n    # Method\n    def greet(self):\n        print(f'The data and functions are\
    \ encapsulated, \\n'\n              f'My name is: {self._name},\\n'\n        \
    \      f'My last name: {self._lastname},\\n'\n              f'and I\\'m old:{self._age}\
    \ ')\n\nprint('------- Person Class -------')\n\nperson_obj1 = Person('Jason',\
    \ 'Mamoa', 53)\nperson_obj1.greet()\n\nclass Student(Person):\n    pass\n\nprint('-------\
    \ Student Class -------')\n\nstudent_obj1 = Student('Rick', 'Jameson', 33)\n\n\
    print(student_obj1.greet())\n```\n\n输出：\n\n```\n------- Person Class ------\n\
    The data and functions are encapsulated,\nMy name is: Jason,\nMy last name: Mamoa,\n\
    and I'm old:53\n\n------- Student Class ------\nThe data and functions are encapsulated,\n\
    My name is: Rick,\nMy last name: Jameson,\nand I'm old:33\n```\n\n这是 Python 中继承的语法：\n\
    \n```python\nclass Student(Person):\n```\n\n父类应包含在子类的括号中，仅此而已。在这个例子中，`Student`\
    \ 类没有自己的属性和方法，但它可以拥有新方法，并且这些新方法不会与父类共享。这意味着子类可以从父类继承所有内容，并且可以拥有自己的属性和方法。当我们不想包含任何代码时，我们使用\
    \ `pass` 关键字。让我们讨论以下代码：\n\n```python\nstudent_obj1 = Student('Rick', 'Jameson',\
    \ 33)\nprint(student_obj1.greet())\n```\n\n如你所见，学生类能够使用父类 `Person` 的 `__init__`\
    \ 构造函数方法来初始化 `name`、`lastname` 和 `age`，之后再使用 print 方法来打印 `student_obj1` 的详细信息。到目前为止，我们的子类继承了所有属性/特性"
