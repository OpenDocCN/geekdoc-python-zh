    如你所见，结果或值 250 的类型是字符串。这意味着 `str()` 函数将我们最初传递给 `str` 函数的整数 250 转换成了字符串。因为 `result`
    变量的值是字符串，我们不能进行正常的数学运算，比如：


    ```

    # can only concatenate str (not "int") to str

    print(result + 10)

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_67_1.png)


    这被称为显式类型转换，即我们用户/开发者尝试将变量值从一种数据类型转换为所需的数据类型。我们可以使用内置函数如 `int()`、`float()`、`str()`
    等来进行这种类型转换。让我们尝试将字符串转换为整数：


    ```

    # type conversion from string to int

    num0 = str(5)

    print(type(num0))

    num2 = 10

    num1 = int(num0)

    print(type(num1))

    result1 = num1 + num2

    print(result1)

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_68_0.png)


    总结一下，类型转换就是将一种数据类型转换为另一种数据类型。


    ## 隐式类型转换


    我们已经看到，如果我们使用一些 Python 内置函数，可以进行显式类型转换或类型强制转换，但还有另一种转换叫做**隐式类型转换**。这种转换不需要我们参与或使用
    Python 内置函数。隐式类型转换是 Python 在后台自动完成的。解释器会进行一些后台检查和计算，只是为了避免数据丢失。这里有一个例子，Python
    会自动将整数转换为浮点数，只是为了避免数据丢失：


    ```

    int_number1 = 12

    flo_number2 = 12.456

    print("data type of integer:", type(int_number1))

    print("data type of floalat:", type(flo_number2))

    sum_numbers = int_number1 + flo_number2

    print("Value of num_new:", sum_numbers)

    print("data type of the sum:", type(sum_numbers))

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_69_0.png)


    ## 转义字符


