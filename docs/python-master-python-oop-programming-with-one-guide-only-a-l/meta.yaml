    \nWe will cover the most used ones. Let’s start with the first one called append()\n\
    \n### append() method\n\nWe simply use this method to add an element at the end\
    \ of the list:\n\n```python\n# 1 append\nmy_list = ['one','two','three'];\nmy_list.append('four')\n\
    print(my_list); ['one', 'two', 'three', 'four']\n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_102_0.png)\n\
    \nIt is important to know that this method will modify the existing array by adding\
    \ the new element at the end.\n\n### insert() method\n\nThis method will insert\
    \ a new element into the list at the specified location. This means we need to\
    \ provide the position/index where we want the new item to be inserted. For example,\
    \ let’s add the element ‘five’ at the end of my_list:\n\n```python\n# 2 insert\n\
    my_list.insert(4,'five')\nprint(my_list)\n```\n\n```python\n# 1 append\nmy_list\
    \ = ['one','two','three'];\nmy_list.append('four')\n# 2 insert\nmy_list.insert(4,'five')\n\
    print(my_list)\n```\n\n输出:\n\n['one', 'two', 'three', 'four', 'five']\n\nInsert\
    \ method, just like the append method, will add a new element to the list at a\
    \ specified index and will modify the original list.\n\n### extend() method\n\n\
    This method takes an iterable as an argument. An iterable means something we can\
    \ iterate or loop over. Extend method works in a way that it appends all of the\
    \ items from the iterable to the items in the original list. I know it sounds\
