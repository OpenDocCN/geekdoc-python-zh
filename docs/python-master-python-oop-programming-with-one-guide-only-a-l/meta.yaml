- md: "## Nesting loops\n\nNested loops are very important because they allow us to\
    \ nest a loop within another loop as long as there is a proper indentation. Here\
    \ is one example of nesting two for-loops:\n\n```python\n# nested for-loops\n\n\
    numbers1 = [1, 2, 3]\nletters1 = ['x', 'l']\n\n# iterate over the two lists\n\n\
    for val in numbers1:\n    print(val)\n    for letter in letters1:\n        print(letter)\n\
    ```\n\n```\n1   # nested for-loops\n2   \n3   numbers1 = [1, 2, 3]\n4   letters1\
    \ = ['x', 'l']\n5   \n6   # iterate over the two lists\n7   \n8   for val in numbers1:\n\
    9       print(val)\n10      for letter in letters1:\n11          print(letter)\n\
    \n--- Console ---\n1\nx\nl\n2\nx\nl\n3\nx\nl\n> \n```\n\nThe output illustrates\
    \ that in the first iteration of the outer loop, the value that is printed is\
    \ 1, which then triggers the inner for-loop and this one will print the letters\
    \ ‘x’ and ‘l’ consecutively. Once the last letters of the inner loop are completed\
    \ the program will go back to the top of the outer loop and it will print 2. After\
    \ printing the value 2, the inner loop runs again and will print the letters ‘x’,’l,’\
    \ and so on. We can also nest if-statements like this:\n\n```python\n# nested\
    \ if statements\ngrade = 80\nif grade >= 60:\n    if grade >= 90:\n        print(\"\
    A\")\n    elif grade >= 80:\n        print(\"B\")\n    elif grade >= 70:\n   \
    \     print(\"C\")\n    elif grade >= 60:\n        print(\"D\")\nelse:\n    print(\"\
    Your grade is F\")\n```\n\n## While Loop\n\nIn Python, we have two primitive loops,\
    \ one is the for-loop we have already discussed and the second one is the while\
    \ loop. With the while loop, we can execute a set of statements as long as the\
    \ condition we set in the while loop is evaluated to True.\n\nSyntax:\n\n```python\n\
    while test_expression:\n    Body of while\n```\n\nThe syntax of the while loop\
    \ is very basic and if you understood how the for-loop works, the while loop will\
    \ be much easier to understand. So why do we need the while loop when we have\
    \ the for-loop? Well, we can use this loop when we don’t know the exact number\
    \ of times we need to iterate or loop. The condition in the while loop is evaluated\
    \ at the beginning before the loop can start. The body of the while loop will\
    \ be executed only if the condition is True. It is important to know that after\
    \ each iteration, the test expression (condition) is checked again. This loop\
    \ will stop when the expression evaluates to False. The body of the while-loop\
    \ in Python is determined by indentation and in other programming languages, this\
    \ can be done using curly brackets like in JavaScript. Let’s go over this example:\n\
    \n```python\n# while loop\n\n# calc sum up to this number\nthe_number = 10\n#\
    \ initialize sum and counter\nthe_sum = 0\ni = 1\n\nwhile i <= the_number:\n \
    \   the_sum = the_sum + i\n    i = i + 1  # update/increment the counter\n\n#\
    \ print the sum\nprint('The sum is: ', the_sum)\n```\n\n```\n# while loop\n\n\
    # calc sum up to this number\nthe_number = 10\n# initialize sum and counter\n\
    the_sum = 0\ni = 1\n\nwhile i <= the_number:\n    the_sum = the_sum + i\n    i\
    \ = i + 1  # update/increment the counter\n\n# print the sum\nprint('The sum is:\
    \ ', the_sum)\n\nConsole Output:\nThe sum is: 55\n```\n\nFrom the figure above,\
    \ we can see that test expression i <= the_number will be True as long as the\
    \ counter variable ‘i’ is less than or equal to the_number (10 in our case). We\
    \ need to find a way to increase the counter after each iteration because if we\
    \ don’t do this, the test expression will always be true and we will create an\
    \ infinite loop that will block our machine (please be careful). Therefore, after\
    \ the sum calculation, in the body of the while loop, we increase the value of\
    \ the counter variable ‘i’ by one. When the value of ‘i’ becomes 11, then the\
    \ test expression will be evaluated to False and that will terminate the while\
    \ loop. Another interesting feature that I want to share is the ‘break’ statement.\
    \ This is our way of stopping the while loop and forcing the loop to terminate\
    \ or stop its execution. We can break from the while loop before the while condition\
    \ is evaluated to False like this:\n\nAs you can see, when the counter ‘i’ reaches\
    \ the number 7, the if condition inside the while loop will be evaluated to True\
    \ and the break statement will terminate the loop. That is why the rest of the\
    \ numbers (8,9,10) will never be printed. I have also used the augmented operator\
    \ (+=) syntax or shorter syntax to increase the counter by one. The while loop\
    \ can be combined with an else clause if we want the else clause to be executed\
    \ at the end when the condition in the while loop becomes False:\n\n```python\n\
    # else clause statement\nj = 0\nwhile j <= 10:\n    print(j)\n    j += 1\nelse:\n\
    \    print('This means the while condition is false')\n\nprint('This line is outside\
    \ the while loop')\n```\n\nAs you can see, when the while condition becomes False,\
    \ the else-clause will be executed. Inside the else clause, we have a very simple\
    \ print simple message. But if we try the previous example where we used the ‘break’\
    \ statement then the else-clause will never be executed because we forced the\
    \ loop to exit at a certain point:\n\n```python\n# break statement\ni = 0\nwhile\
    \ i <= 10:\n    print(i)\n    if(i == 7):\n        break\n    i += 1\nelse:\n\
    \    print('This means the while condition is false')\n\nprint('This line is outside\
    \ the while loop')\n```\n\n```python\n# break statement\ni = 0\nwhile i <= 10:\n\
    \    print(i)\n    if(i == 7):\n        break\n    i += 1\nelse:\n    print('This\
    \ means the while conditon is false')\n\nprint('This line is outside the while\
    \ loop')\n```\n\n## Iterables\n\nIterables in Python are very important because\
    \ it is an Object or a collection of items that can be iterated over. In Python,\
    \ Iterables are Tuples, Sets, Dictionaries, Lists, and Strings. Another key term\
    \ is ‘iterated’ or ‘looped over’ and this simply means that the collection can\
    \ be visited for each of its items one by one. This feature can be found in other\
    \ programming languages like JavaScript. To summarize, the iterable is the collection\
    \ and ‘iterate’ is the action we perform on that collection. We have covered how\
    \ we can iterate most of the collections in Python but we didn’t include an example\
    \ of the Dictionary. Let us create one example where we iterate over a dictionary\
    \ collection:\n\n```python\n# looping over a dictionary\n# car dictionary\nford\
    \ = {\n    \"brand\": \"Ford\",\n    \"model\": \"Mustang\",\n    \"year\": 2023,\n\
    \    \"transmission\": \"Automatic\"\n}\n```\n\n```python\nfor item in ford:\n\
    \    print(item)\n```\n\nWhen looping over a dictionary, the values that are returned\
    \ will be the keys from the dictionary data type. But we can use other methods\
    \ that will return both keys and values. These methods are popular and used by\
    \ the developers:\n\n### items() method\n\nThis method will get the key/value\
    \ pairs and return them as a Tuple:\n\n```python\n# items method\nfor item in\
    \ ford.items():\n    print(item)\n```\n\n```python\n# looping over a dictionary\n\
    # car dictionary\nford = {\n    \"brand\": \"Ford\",\n    \"model\": \"Mustang\"\
    ,\n    \"year\": 2023,\n    \"transmission\": \"Automatic\"\n}\n\n#items method\n\
    for item in ford.items():\n    print(item)\n```\n\n### values() method\n\nThis\
    \ method will give us only the values from the dictionary, not the keys:\n\n```python\n\
    # values method\nfor item in ford.values():\n    print(item)\n```\n\n```python\n\
    # looping over a dictionary\n# car dictionary\nford = {\n    \"brand\": \"Ford\"\
    ,\n    \"model\": \"Mustang\",\n    \"year\": 2023,\n    \"transmission\": \"\
    Automatic\"\n}\n\n# values method\nfor item in ford.values():\n    print(item)\n\
    ```\n\n### keys() method\n\nThe normal for-loop does the same job as this method,\
    \ meaning it will only return the keys of a dictionary but I guess it’s more descriptive\
    \ like this:\n\n```python\n# keys method\nfor item in ford.keys():\n    print(item)\n\
    ```\n\nBut what if we want to get the key/value pairs without getting a Tuple\
    \ back? There is a simple trick we can do using the power of unpacking but we\
