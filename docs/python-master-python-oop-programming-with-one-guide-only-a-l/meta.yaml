    \ Joseph Smith\nHi there Abraham Lincoln\nHi there Morgan Freeman\n```\n\n## 位置参数与关键字参数\n\
    \n在本节中，我们将讨论 Python 中位置参数和关键字参数的重要性。顾名思义，位置参数是需要按正确顺序或位置书写的参数。这意味着，如果我们想要获得期望的函数输出，参数必须按正确的位置和顺序提供。让我们再次查看前面的函数示例，并稍作修改，使其可以接受\
    \ 3 个参数和 3 个形参：\n\n```python\ndef hi_function4(name,lastname, age):\n    print(f'Hi\
