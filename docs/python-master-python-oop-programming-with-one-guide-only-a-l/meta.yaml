    ## 运算符优先级


    到目前为止，我们已经学习了可以对 Python 的两种数据类型（整数和浮点数）执行数学运算。为了实现这一点，我们需要使用像 +, -, *, / 这样的运算符。通常，数学表达式是复杂的，我们使用不同运算符的组合来获得最终结果。这就是运算符优先级发挥作用的地方。运算符优先级意味着当不同的运算符组合在一个表达式中时，其中一些运算符会比其他运算符具有更高的优先级。Python
    解释器知道这些规则并始终遵循它们。


    例如，让我们考虑这个表达式：


    ```

    7 - 3 * 2

    ```


    从我们的数学课上，我们知道首先我们需要执行乘法（3 * 2），然后是减法。解释器知道这个规则，否则如果我们按照运算符的顺序进行计算，将会得到不同的结果：


    **正确答案：**

    1) 7 - 3 * 2 =

    2) 7 - 6 =

    3) 1


    **错误答案：**

    1) 7 - 3 * 2 =

    2) 4 * 2 =

    3) 8


    优先级顺序：


    1) () – 括号具有最高优先级；我们首先计算括号内的任何内容。

    2) ** – (幂运算) 只有在括号 () 之后才执行。

    3) * , / – 然后我们执行乘法和除法。

    4) + , - 最后是加法和减法。


    优先级顺序对于所有编程语言都相同，但了解它非常重要。在不查看答案的情况下，请计算以下表达式：

    (7 - 3) * 2 + 2**2


    答案：

    第 1 步) 括号中的内容 (7-3) 因为优先级顺序而最先执行。因此，7-3 减法后的结果是 4。

    第 2 步) 然后是幂运算符，2 ** 2 的结果等于 4。

    第 3 步) 接着是乘法运算符，它将使用第 1 步操作的结果（即 4），这个 4 将乘以 2，结果是 8。

    第 4 步) 最后，加法运算符执行，8 + 4 的和是 12。


    你可以在 replit 中运行以下代码。只需将其包装在一个 `print` 函数中，你就可以看到输出：


    ```python

    a = 6

    b = 3

    print(a + b)

    print(a * b)

    print(a / b)

    print(a - b)


    print(type(a))

    print(type(b))

    ```'
