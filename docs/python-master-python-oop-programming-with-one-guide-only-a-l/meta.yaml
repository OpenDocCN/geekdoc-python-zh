- img_proc: true
  md: '[https://pypi.org/project/bcrypt/](https://pypi.org/project/bcrypt/)


    This is good for password hashing and for example, the teacher will try to register
    with the password ‘MyPassword’ as a string. This package will take this string
    and using the hashing function will turn it into something:


    ```

    b''$2b$12$fwBh8IUk4pC917unYjStSuwmJXyOlWH2jCXKOazcXikZS7J1wzF9q''

    ```


    We can use another function from bcrypt that will compare the original password
    with the hashed password so it can let the teacher login to the system. This application
    is very simple but when working on larger applications, the security and password
    hashing is very, very important. To install this package, you will need to use
    the:


    ```

    pip install bcrypt

    ```


    or


    ```

    pip3 install bcrypt

    ```


