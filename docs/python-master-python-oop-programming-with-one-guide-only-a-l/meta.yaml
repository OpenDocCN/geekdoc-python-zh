    # Let’s start with removing and renaming files


    To remove and rename files, you can use the module called OS. This module provides
    a few functions that you can use to interact with the file system. You are going
    to use two methods only, the remove and rename methods. The os.remove() method
    is used to remove or delete a file path. Syntax:


    ```

    remove(''file.txt'')

    ```


    The second method is called rename and it’s used to rename the existing file:


    ```

    rename(''old_file_name.txt'', ''new_file_name.txt'')

    ```


    This means we will rename the old_file_name.txt to new_file_name.txt


    # Password hashing


    This application will not be a real register and login system but I wanted to
    give you an app where you install some packages and this was a perfect opportunity.
    You will use the pypi.org website where we can find and install a package called
    bcrypt:


