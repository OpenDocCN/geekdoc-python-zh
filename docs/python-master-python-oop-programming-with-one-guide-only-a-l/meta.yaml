    \ let you type something in your VS Code like in the figure below:\n\nNow when\
    \ we install the Python Interpreter, we installed a lot of other Python tools\
    \ in the background that we can now use, so if you start typing **Python: Enable**\
    \ you will get the following list of options:\n\nFrom the figure above, select\
    \ the **Python: Enable/Disable Linting** option, click on it, and select Enable\
    \ or On:\n\nAfter enabling linting, let’s remove the closing bracket of the print\
    \ function so we are making a mistake intentionally and finally save the test.py\
    \ file. This will immediately create a problem for us because linting will detect\
    \ that a bracket is missing and in the PROBLEMS tab/panel we can see a number\
    \ 1:\n\nClick on the PROBLEMS tab so you can read the error:\n\nAs we can see,\
    \ this is a syntax error that can be fixed easily because it even shows us the\
    \ line number where the error occurred. And these are all of the steps that you\
    \ need to take before you can start coding. Finally, let me show you how you can\
    \ install extensions in VS Code:\n\nFrom the figure above, you need to locate\
    \ the marketplace icon and click on it. From there I would suggest you install\
    \ some VS Code icon packs that will make your folder and files look better. You\
    \ can install dark themes like **drakula official** by typing it in the search\
    \ bar and then clicking on the install button next to it.\n\nNow your VS Code\
    \ is ready for writing Python code.\n\n## Useful Terminal/Command Prompt Commands\n\
    \nAs a future Python developer, you should know how to use the Terminal or Command\
    \ Prompt. In this section, we will go through some very useful commands. On Mac,\
    \ you open the terminal by pressing command + space and then you type terminal\
    \ and press return/enter. On Windows, you need to look for the start Windows icon\
    \ and search for Command Prompt. The terminals/command prompts are used today\
    \ but they were used a lot in the past because they run the code. After the GUI\
    \ (Graphical User Interface), the usage of the terminals decreased. As a developer,\
    \ you will use the terminal to download and run scripts, to communicate with servers\
    \ and databases. The commands for the terminal and command prompt are not the\
    \ same but I will provide screenshots and tips so you can practice the commands\
    \ on Windows, macOS, and Linux. For example, open your terminal or command prompt\
    \ and type ‘ls’ on Mac and ‘dir’ on Windows. The **ls** – (**dir** for Windows)\
    \ will list everything you will have in the current directory:\n\nAs you can see,\
    \ everything I have in this directory is listed. How can we check which directory\
    \ we are in at the moment? For Windows, we need to type ‘cd’ and for macOS, we\
    \ need to type ‘pwd’:\n\nAs you can see from the figure above, it says I’m in\
    \ the ‘Users/rick/ directory. Everything that is listed above is something I have\
    \ access to. So how can I navigate to my Desktop and see what’s there? Well, for\
    \ both Mac and Windows, we can write ‘**cd Desktop**.’ The cd means change directory:\n\
    \nIf for some reason you want to get out of the current directory, you can write\
    \ ‘cd ..’ and this will go from the Desktop back to /Users/rick:\n\nThe terminal\
    \ now has a lot of text and looks messy. You can use the ‘clear’ command on Mac\
    \ and ‘cls’ on Windows to clean the terminal window:\n\nIf for some reason you\
    \ want to navigate to the root directory you can use this command ‘cd /’, and\
    \ don’t forget the forward slash. If you want to list everything, use ‘ls’ or\
    \ ‘dir’ for windows:\n\nIf you want to get back to the user directory, you can\
    \ use the following command: cd ~\n\n```\nbash\nrick@Ristes-iMac ~ % cd /\nrick@Ristes-iMac\
    \ / % ls\nApplications  Volumes  etc  sbin\nLibrary       bin      home tmp\n\
    System        cores    opt  usr\nUsers         dev      private var\nrick@Ristes-iMac\
    \ / % cd ~\nrick@Ristes-iMac ~ % ls\nApplications  Movies  Users\nDesktop    \
    \   Music   evalonly.txt\nDocuments     Pictures pitchshiftLogFile.txt\nDownloads\
    \     Postman\nLibrary       Public\nrick@Ristes-iMac ~ %\n```\n\nI hope you are\
    \ enjoying this section so far, but we are not done yet. Let’s create a folder\
    \ with the name ‘p1’ somewhere on the desktop. We are not going to use the terminal\
    \ for this so go to your desktop and create the folder p1 where we can create\
    \ subfolders later on. I need to navigate to the desktop and I’m in the Users\
    \ directory at this stage ‘cd Desktop’:\n\n```\nbash\nrick@Ristes-iMac ~ % ls\n\
    Applications  Movies  Users\nDesktop       Music   evalonly.txt\nDocuments   \
    \  Pictures pitchshiftLogFile.txt\nDownloads     Postman\nLibrary       Public\n\
    rick@Ristes-iMac ~ % cd Desktop\nrick@Ristes-iMac Desktop %\n```\n\nIf you type\
    \ ‘ls’ or ‘dir’ you should be able to see what we have on the desktop:\n\n```\n\
    rick@Ristes-iMac ~ % ls\nApplications   Movies         Users\nevalonly.txt\nDesktop\
    \        Music          pitchshiftLogFile.txt\nebook         \nDocuments     \
    \ Pictures       \neverything      ~$rina-Low-Content-KDP.docx\nDownloads    \
    \  Postman        \nLibrary        Public         \nrick@Ristes-iMac ~ % cd Desktop\n\
    rick@Ristes-iMac Desktop % ls\nebook         \neverything      ~$rina-Low-Content-KDP.docx\n\
    rick@Ristes-iMac Desktop % \n```\n\nAs we can see from the figure above, I have\
    \ the folder (p1) that I have created. Now if I want to create other folders inside\
    \ this folder, I need to use the cd command again. So let us type ‘cd p1’ :\n\n\
    ```\nrick@Ristes-iMac ~ % ls\nApplications   Movies         Users\nevalonly.txt\n\
    Desktop        Music          pitchshiftLogFile.txt\nDocuments      Pictures \
    \      \neverything      ~$rina-Low-Content-KDP.docx\nDownloads      Postman \
    \       \nLibrary        Public         \nrick@Ristes-iMac ~ % cd Desktop\nrick@Ristes-iMac\
    \ Desktop % ls\nebook         \neverything      ~$rina-Low-Content-KDP.docx\n\
    rick@Ristes-iMac Desktop % cd p1\nrick@Ristes-iMac p1 % \n```\n\nYou can make\
    \ sure nothing is inside if you use the ls or ‘dir’ command. If you want to create\
    \ another folder inside the p1, you can use the command called ‘mkdir’ which stands\
    \ for make directory:"
