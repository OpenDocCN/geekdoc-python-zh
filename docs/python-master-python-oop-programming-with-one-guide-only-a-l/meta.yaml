- md: "## Project_2: Teacher, Student App\n\nThis project will be a bit harder compared\
    \ to the first one. The project will be about coding a simple program that will\
    \ allow a teacher to be created. Once the teacher is created, he/she can login\
    \ into the system and view all students and their scores. Also, the teacher can\
    \ add a new student and update students’ scores. The student data will come from\
    \ a file called student_scores.txt. Before we dive into this project, these are\
    \ some of the things this project will include:\n\n- I/O Files\n- Hashing Passwords\n\
    - Teacher Login\n- Teacher Registration\n- Adding new Students\n- Updating Students\n\
    - Removing files\n- Updating files\n- Using the datetime module\n\nThis is what\
    \ the application we are going to write will look like:\n\n![](img/9f2174949e81804f7192ec47968e0efb_481_0.png)\n\
    \nAs shown in the figure above, we have a teacher that will need to register first.\
    \ After the registration, the details will be stored in the teachers.txt file.\
    \ The teacher can then login with their name and password and will be able to:\n\
    \n- View all students and their scores\n- Update student score\n- Add new student\n\
    \nThe student details are located in the student_scores.txt file. Each of the\
    \ teacher’s actions for the students will be recorded in the student_scores.txt.\
    \ I will guide you step by step on how to write this app but if you feel confident\
    \ you can do it on your own, then start coding. Before you attempt to write your\
    \ code, these are some features that we haven’t talked about in this book and\
    \ you will need them to finish this app:\n\n- Remove and rename files\n- Password\
    \ hashing using bcrypt package from pypi.org\n- Datetime module to create current\
    \ date and time\n\n## Let’s start with removing and renaming files\n\nTo remove\
    \ and rename files, you can use the module called OS. This module provides a few\
    \ functions that you can use to interact with the file system. You are going to\
    \ use two methods only, the remove and rename methods. The os.remove() method\
    \ is used to remove or delete a file path. Syntax:\n\n```\nremove('file.txt')\n\
    ```\n\nThe second method is called rename and it’s used to rename the existing\
    \ file:\n\n```\nrename('old_file_name.txt', 'new_file_name.txt')\n```\n\nThis\
    \ means we will rename the old_file_name.txt to new_file_name.txt\n\n## Password\
    \ hashing\n\nThis application will not be a real register and login system but\
    \ I wanted to give you an app where you install some packages and this was a perfect\
    \ opportunity. You will use the pypi.org website where we can find and install\
    \ a package called bcrypt:\n\n![](img/9f2174949e81804f7192ec47968e0efb_482_0.png)\n\
    \n[https://pypi.org/project/bcrypt/](https://pypi.org/project/bcrypt/)\n\nThis\
