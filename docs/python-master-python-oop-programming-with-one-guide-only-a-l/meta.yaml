    \ | True; because 4 is greater or equal to 3 |\n| <= | Less than or equal to |\
    \ x = 3<br>y = 3<br>print(x <= y) | True; because 3 is greater or equal to 3 |\n\
    | != | Not equal | x = 4<br>y = 3<br>print(x != y) | True; because 4 is not equal\
    \ to 3 |\n\nThe Code:\n\n```\n# Comparison Operators\nx = 4\ny = 3\n\n# == equal\n\
    print(x == y)\n# Output False\n\n# > greater than\nprint(x > y)\n# Output True\n\
    \n# < less than\nprint(x < y)\n# Output False\n\n# >= greater than or equal to\n\
    print(x >= y)\n# Output True\n\n# >= less than or equal to\nprint(x <= y)\n# Output\
    \ False\n\n# != Not Equal\nprint(x != y)\n# Output True\n```\n\n## Logical operators\n\
    \nThe logical operators are very useful because they give us the option to check\
    \ multiple conditions at the same time. The logical operators are used to combine\
    \ conditional statements:\n\n| Operator | Description | Example | Output |\n|----------|-------------|---------|--------|\n\
    | and | If both statements are true, it will return true | a = 4<br>print(a >\
    \ 3 and a < 10) | True; because 4 is greater than 3 AND 4 is less than 10 |\n\
    | or | Only one of the statements needs to be true to return True | a = 4<br>print(a\
    \ > 3 or a > 10) | True; because we only need one of the statements to be true\
    \ and 4 is greater than 3 is evaluated to True, therefore, the whole expression\
    \ is evaluated to True |\n| not | Reverse the result, if it’s True will convert\
    \ to False and vice versa | a = 4<br>print(not(a > 3 and a > 10)) | False; The\
    \ inner expression within the ‘not’ keyword is evaluated to True but the ‘not’\
    \ keyword will reverse the result, therefore, the final return will be False |\n\
    \nI know the table is self-explanatory but let’s see how we can use the above\
    \ operators with conditional statements like the if-statement. Let’s create a\
    \ program that will tell us if we can legally drive a car based on our age. For\
    \ example, let’s say we have a driver’s license and we are 16 years of age so\
    \ we are allowed to drive:\n\n```\nmy_age = 16\nis_licenced = True\nif is_licenced\
    \ and my_age >= 16:\n    print('Hop on for a ride')\nelse:\n    print('Sorry buddy,\
    \ I'm driving today!')\n```\n\nAs you can see from the code above, I have used\
    \ the logical ‘and’ operator in conjunction with the comparison operator to evaluate\
    \ the if-condition. Both sides (left and right) of the ‘and’ logical operator\
    \ have to be true so the entire expression can be evaluated to True. We know that\
    \ **is_licenced** will be evaluated to True immediately but for the second part\
    \ of the expression, we have used the comparison operator to check whether the\
    \ driver’s age is greater than or equal to 16 years. I hope you can see the power\
    \ of the operators. If the logical operator in the middle is changed to the ‘or’\
    \ operator, then only one of the two statements (left or right) will need to be\
    \ evaluated to True for the entire condition to be evaluated to true. Let’s change\
    \ just the variable **my_age** to have a value of 15:\n\n```\nHop on for a ride\n\
    ```\n\nAs we can see, because the **is_licenced** is evaluated to True, the entire\
    \ condition will be evaluated as True and therefore the code in the if-block will\
    \ be executed.\n\n## Truthy vs Falsy values\n\nI think we've had enough of the\
    \ operators for now, we will cover more of them in this chapter but let's shift\
    \ our focus to something more interesting in Python. This new topic is called\
    \ truthy and falsy values. Up until this point, we have covered the two most common\
    \ Boolean values (True and False), but Python has truthy and falsy values as well.\
    \ The Boolean values are very important when we want to make our program smart\
    \ and make decisions based on the condition we set. For example, let's create\
    \ a very simple if-statement with a simple condition:\n\n```\n# Truthy vs Falsey\n\
    if 6 > 4:\n    print(\"True\")\nelse:\n    print(\"False\")\n```\n\nThe output\
    \ will be True because 6 is greater than 4. But can you guess the output of this\
    \ example?\n\n```\nm = 10\nif m:\n    print(\"True\")\nelse:\n    print(\"False\"\
    )\n```\n\nThe output is True, but why? As you can see in the condition, we don’t\
    \ actually have an expression so it can be evaluated to either True or False,\
    \ just a single variable ‘m’ which has a value of 10 assigned before the if-statement.\
    \ The question is, why is this variable in the condition evaluated to True? The\
    \ answer lies in the Truthy and Falsy values. In Python, in order for a value\
    \ to be evaluated to True or False, it does not have to be part of an expression\
    \ and this is based on some rules that are built-in in the language, and of course,\
    \ the Interpreter knows these rules. In the following section, I will discuss\
    \ the Boolean Context.\n\n## Boolean Context\n\nThe Boolean context is very important\
    \ because it requires a value to be in one of the two states, True and False,\
    \ therefore, any statement or a value we have in the if-condition must be converted\
    \ before in the background to True or False. I know this can be confusing but\
    \ in Python, by default, all of the values are considered truthy except for the\
    \ following list of values which are always ‘falsy’:\n\n- Constant False\n- Constant\
    \ None\n- Zero (0) of any numeric type\n- Float 0.0\n- Complex 0j\n- Empty list\
    \ []\n- Empty tuples ()\n- Empty dictionaries {}\n- Empty Sets sets()\n- Empty\
    \ strings “”\n- Empty range(0)\n\nLet’s run the above list of values and check\
    \ if they are actually considered as falsy:\n\n```\n# falsy\nn = 0\ns = ''\nprint(bool(n))\n\
    print(bool(s))\nprint(bool(False))\nprint(bool(None))\nprint(bool([]))\nprint(bool({}))\n\
    print(bool(()))\n```\n\nOutput:\n```\nFalse\nFalse\nFalse\nFalse\nFalse\nFalse\n\
    False\n```\n\n## The built-in bool() function"
