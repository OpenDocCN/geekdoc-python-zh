- md: '## Tuple methods


    Let’s demonstrate some of the tuple methods. For now, we have only two (count
    and index).


    ### count()


    It is a very easy method because it will return how many times the same value
    occurs in the Tuple collection.


    ```

    # count

    new_tuple = (1, 2, 3, 4, 5, 6, 1)

    print(new_tuple.count(1))

    ```


    ### index()


    The index method will return the index or position of the element:


    ```

    # index

    print(new_tuple.index(3))

    ```


    The element 3 index is two, but what will happen if we look for a value that occurs
    multiple times in the Tuple? What index will be returned?


    ```

    # index

    print(new_tuple.index(3))

    print(new_tuple.index(1))

    ```


    When we try index(1), the index will be 0. The same element is in index six but
    the index method will return index zero because that is the first occurrence of
    the value.


    ## Sets in Python (data type and data structure)


    The last data structure in Python is Set. Sets in Python are an unordered collection
    of unique elements/objects. Sets are iterable collection that does not contain
    duplicate elements. We can create Sets using the curly brackets just like dictionaries:


    ```

    # Sets

    new_set = {1, 2, 3, 4, 5, 6, 7}

    print(new_set)

    ```


    This is an unordered collection so you cannot be sure in which order the items
    will appear. It is also a collection of unique items so any duplicates will be
    discarded:


    ```

    # Duplicates will be removed

    new_set = {1, 2, 3, 4, 5, 6, 7, 1}

    print(new_set)

    ```


    We can add new items to the collection using the add() method:


    ```

    new_set = {1, 2, 3, 4, 5, 6, 7}

    new_set.add(8)

    print(new_set)

    ```


    The values in the Sets are located in the memory without any specific order but
    that will not cause problems when we access them because Sets do not contain duplicate
    values.


    ### Accessing Items in Sets


    We know that Sets are an unordered collection with unique values but how can we
    access its elements? Can we do it like this:


    ```

    # Accessing Set Items

    new_set = {1, 2, 3, 4, 5, 6, 7, 6}

    print(new_set[0])

    ```


    If we run this code on the replit website, we will get this error:


    As we can see, the Set items cannot be accessed by referring to an index since
    the Sets are an unordered collection of items. But there is another way we can
    access the Set items and it requires the use of loops so it loops or iterates
    over its elements. Because we haven’t covered loops in Python, we will use the
    ‘in’ keyword and ask if a specified value is present in a Set. If the item is
    there, we will get Boolean True but if the item we are asking for is not there,
    we will get False:


    ```

    # ask for item using the ''in'' Python keyword

    print(7 in new_set)

    print(0 in new_set)

    ```


    ### Check the Set length


    We can use the len() built-in function to get the exact number of items in the
    Set:


    ```

    print(len(new_set))

    ```


    If for example we have duplicate values in the Set, the len() function will give
    us the length of the items without the duplicates because it will count only the
    unique values.


    ### Create a Set from a List


    We know a List can contain items from any data type and they don''t have to be
    unique, so duplicates are allowed. The question here is how we can convert a List
    to a Set and remove all of the duplicates. All of this is taken care of by one
    function called set() and this is one of the Python built-in functions:


    ```

    # create a Set from a List using the set() function

    new_list = [1, 2, 3, 1, 5, 4, 5, 6, 7, 6]

    new_set = set(new_list)

    print(new_set)

    ```


    ### Convert a Set to a List


    Python has a built-in function called list() that we can use to convert the existing
    Set to a new List:


    ```

    # convert Set to a List

    new_set = {1, 2, 3, 4, 5, 6, 7, 7}

    new_list = list(new_set)

    print(new_list)

    ```


    ## Python Set Methods


    Compared to Tuples, Sets have many methods and we have already used the add()
    method to insert new items in a Set. Let’s start learning new methods in the following
    section.


    ### copy() method


    We can create a Set copy using the copy method:


    ```

    # copy() method

    new_set = {1, 2, 3, 4, 5, 6, 7, 7}

    new_set1 = new_set.copy()

    print(new_set1)

    ```


    ### clear() method


    This method will remove all of the elements from a Set


    ```

    # clear

    new_set = {1, 2, 3, 4, 5, 6, 7, 7}

    new_set.clear()

    print(new_set)

    ```


    ### difference() method


    This is a very useful method that returns the difference between two or more sets
    as a new set. This does not mean it will include all of the different items from
    both sets. It means it will return a new set with items that exist in the first/original
    set:


    ```

    # difference

    new_set = {1, 2, 3, 4, 5, 6, 7}

    new_set1 = {5, 6, 7, 8, 9, 10, 11}

    print(new_set.difference(new_set1))

    ```


    As you can see, it will return a new set that includes the different items from
    the new set and will not include the duplicate items for both Sets.


    ### difference_update() method


    This method will modify the existing set. We use this method when we want to remove
    the items that exist in both sets. The difference() method returned a new set
    without the unwanted items and the difference_update method will only remove the
    unwanted items from the original set


    ```

    # difference_update() method

    new_set = {1, 2, 3, 4, 5, 6, 7}

    new_set1 = {5, 6, 7, 8, 9, 10, 11}

    new_set.difference_update(new_set1)

    print(new_set)

    ```


    ### discard() method


    This method will remove or discard the specified item from the Set:


    ```

    # discard() method

    new_set = {1, 2, 3, 4, 5, 6, 7}

    new_set.discard(7)

    print(new_set)

    ```


    ### intersection() method


    Returns a new Set of items that contain the items that are the same between two
    or more sets. The new set will have items that exist in both sets:


    ```

    # intersection method

    new_set = {1, 2, 3, 4, 5, 6, 7}

    new_set1 = {5, 6, 7, 8, 9, 10, 11}

    print(new_set.intersection(new_set1))

    ```


    If we remove the intersection method and use this shorthand symbol ‘&’ the result
    will be the same:


    `print(new_set & new_set1)`


    ```

    # intersection method

    new_set = {1, 2, 3, 4, 5, 6, 7}

    new_set1 = {5, 6, 7, 8, 9, 10, 11}

    print(new_set & new_set1)

    ```


    **Output:**

    {5, 6, 7}


    ### intersection_update() method


    This method will remove the items from the first Set that are not present in the
    second Set and will update the original first set:


    ```

    # intersection_update method

    new_set = {1, 2, 3, 4, 5, 6, 7}

    new_set1 = {5, 6, 7, 8, 9, 10, 11}

    new_set.intersection_update(new_set1)

    print(new_set)

    ```


    **Output:**

    {5, 6, 7}


    ### isdisjoint() method


    This method will return either Boolean True or False as a result. It will return
    a True only if the Sets we are comparing have different items and it will return
    False if at least one of the items from one Set can be found in the second Set.


    ```

    # isdisjoint() method

    new_set = {1, 2, 3, 4, 5, 6, 7}

    new_set1 = {5, 6, 7, 8, 9, 10, 11}

