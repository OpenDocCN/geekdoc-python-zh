    \n```python\n# chapter-2 exercise\ndirty_list = [1, 2, 3, 2, 4, 1, 5, 6, 5, 5,\
    \ 7, 8, 1, 9, 10, 9, 8, 3]\n# empty list\nclean_list = []\n# loop over the items\n\
    for item in dirty_list:\n    # check if the item doesn't exist in the list\n \
    \   if item not in clean_list:\n        # if item is not found then add it\n \
    \       clean_list.append(item)\n\nprint(clean_list)\n```\n\nIf we run the code,\
    \ this will be the output:"
  mdcn: "从字典中获取键和值的另一种方法是稍微改变一下 `for` 循环的语法：\n\n```python\n# 我们可以这样获取键和值\nfor key,value\
    \ in ford.items():\n  print(key,value)\n```\n\n最后一种语法在开发者中非常常见。在结束如何循环字典的讨论之前，我想提一下，变量名（`key`,\
    \ `value`）可以由你自行决定。我使用了一些具有描述性的名称，但即使使用下面这样的代码也完全没问题且可执行：\n\n```python\nfor k,v\
    \ in ford.items():\n    print(k,v)\n```\n\n## 内置的 `range()` 函数\n\n`range()` 函数是\
    \ Python 的内置函数之一，它允许我们遍历一个数字序列。`range()` 函数将返回一个数字序列，默认从零（0）开始，每次递增 1，直到达到结束值（我们传入\
    \ `range` 函数的一个指定数字）。`range` 函数的语法如下：\n\n```python\nrange(start, stop, step)\n\
    ```\n\n如你所见，`range` 可以接受 3 个参数，第一个称为 `start`，是可选的。这是一个整数，用于指定起始位置。如果省略，默认值将是零（0）。第二个参数是\
    \ `stop`，这是必需的，它是一个整数，用于指定结束位置。最后一个参数称为 `step`，与 `start` 参数一样，它也是可选的，用于指定步长。默认步长为\
    \ 1。我们知道从参数来看，中间那个称为 `stop` 的参数是必需的，所以让我们打印一下当我们只提供一个参数时这个函数的作用：\n\n```python\n\
    # range 函数\nprint(range(10))\n```\n\n从上图中，我们现在有了一个从零开始到十结束的范围，虽然我们没有指定起始值，但它被自动添加了。`range()`\
    \ 在与循环结合使用时非常流行：\n\n```python\n# range() 与 for 循环\nfor number in range(0, 10):\n\
    \    print(number)\n```\n\n从上图中，我们可以看到我们使用了 `range` 函数，因此 `for` 循环可以运行 10 次。我们不必像\
    \ `'number'` 那样指定变量名，我们可以使用 `'_'` 下划线，它仍然是有效的：\n\n这意味着我们不关心变量的命名，但我们需要循环运行 `range`\
    \ 函数中指定的特定次数。我们甚至可以指定步长参数：\n\n```python\n# 步长\nfor _ in range(0, 10, 2):\n   \
    \ print(_)\n```\n\n## `enumerate()`\n\n类似于 `range()` 函数，我们有一个名为 `enumerate()`\
    \ 的函数。`enumerate()` 函数将接受一个类似元组（Tuple）的集合，并将其作为枚举对象返回。此函数还会为集合中的每个项目添加一个计数器/索引作为键。这意味着该函数允许我们遍历一个序列，但同时跟踪元素和索引。例如，让我们将一个元组集合传递给这个新函数：\n\
    \n```python\n# enumerate ()\nx = ('first', 'second', 'third')\ny = enumerate(x)\n\
    \nfor item in y:\n    print(item)\n```\n\n如我们所见，`enumerate()` 函数接受一个可迭代对象作为参数，并返回一个带有索引（作为键）的对象，现在元组可以像列表一样访问索引了。我们不必只打印变量\
    \ `'item'`，我们可以这样做：\n\n```python\nfor key, item in y:\n    print(key, item)\n\
    ```\n\n太棒了！现在我们不仅得到了集合的值，还得到了索引。我们也可以对字符串和列表实现同样的效果：\n\n```python\n# 字符串\nfor\
    \ key, item in enumerate('Rick'):\n    print(key, item)\n\n# 列表\nfor key, item\
    \ in enumerate([1, 2, 3]):\n    print(key, item)\n```\n\n如我们所见，`enumerate()` 函数非常有用，因为我们可以遍历集合，同时还能访问索引和值。\n\
    \n## `break`、`continue` 和 `pass` 语句\n\n我们看到 `break` 语句会停止循环的正常执行并终止该循环。在那个例子中，我们在\
    \ `while` 循环中使用了 `break` 语句，但如果需要，我们也可以在任何其他循环中使用 `break` 语句。`break` 语句可用于在循环遍历完所有项目之前停止循环：\n\
    \n```python\n# break, continue 和 pass 语句\nbrands = [\"ford\", \"bmw\", \"toyota\"\
    , \"audi\", \"mercedes\"]\nfor brand in brands:\n    print(brand)\n    if brand\
    \ == 'toyota':\n        break\nprint('如果你读到这行，循环已经结束')\n```\n\n我们可以在循环中使用的另一个语句是\
    \ `'continue'` 语句。当我们使用这个语句时，我们不会像使用 `'break'` 语句那样退出循环，而是会停止当前迭代的循环，而不是像 `'break'`\
    \ 语句那样停止整个循环。让我们使用 `continue` 语句在汽车品牌等于 `'bmw'` 时跳过该迭代，但我们需要继续遍历其余品牌：\n\n```python\n\
    # continue\nfor brand in brands:\n    if brand == 'bmw':\n        continue\n \
    \   print(brand)\nprint('如果你读到这行，循环已经结束')\n```\n\n第三个语句称为 `'pass'` 语句，它很少使用，因为它本身不做任何事情。`pass`\
    \ 语句将用作未来代码的占位符。例如，当 `pass` 语句被执行时，它不会做任何事情，但你可以避免因为空代码不被允许而出现错误。我知道这很令人困惑，但让我们看看下面的例子：\n\
    \n```python\n#pass\nis_old = True\nif is_old:\n    #没有代码\nprint('这会给我们一个错误')\n\
    ```\n\n如你所见，我们得到了 `IndentationError`，因为 `if` 语句之后没有代码，解释器期望我们完成 `if` 语句并编写一些代码。解释器会查看下一行（第\
    \ 5 行），看到没有缩进，就会抛出一个错误，因为解释器感到困惑，认为 `print` 消息应该放在 `if` 语句的主体中。因此，当我们不知道在 `if`\
    \ 块中写什么时，我们可以使用 `pass` 语句：\n\n```python\n#pass\nis_old = True\nif is_old:\n  \
    \  #没有代码\n    pass\nprint('这会给我们一个错误')\n```\n\n如我们所见，我们可以运行代码而不会出错。\n\n## 练习时间\n\
    \n现在是练习本章涵盖的一些内容的合适时机，这包括循环、条件语句和方法。练习内容是清理一个脏列表。脏列表是一个包含重复值的列表，我们的程序应该创建一个没有任何重复项的干净列表。在我展示我的解决方案之前，我希望你思考一下，甚至尝试编写你自己的解决方案。这是一个脏列表：\n\
    \n```python\n#第2章练习\ndirty_list = [1, 2, 3, 2, 4, 1, 5, 6, 5, 5, 7, 8, 1, 9, 10,\
    \ 9, 8, 3];\n```\n\n## 解决方案：\n\n从上面的列表中我们可以看到，一些项目是重复的，所以我们需要创建一个新列表并将其命名为 **clean_list**。提示：有很多不同的方法可以解决这个问题，但我建议使用成员运算符之一来简化我们的工作。\n\
    \n这是我的解决方案（仅代码）\n\n```python\n# 第2章练习\ndirty_list = [1, 2, 3, 2, 4, 1, 5, 6, 5,\
    \ 5, 7, 8, 1, 9, 10, 9, 8, 3]\n# 空列表\nclean_list = []\n# 遍历项目\nfor item in dirty_list:\n\
    \    # 检查项目是否不在列表中\n    if item not in clean_list:\n        # 如果未找到该项目，则添加它\n\
    \        clean_list.append(item)\n\nprint(clean_list)\n```\n\n如果我们运行代码，输出将是："
