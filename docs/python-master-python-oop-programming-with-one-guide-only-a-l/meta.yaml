  md: '# Ternary Operator


    So far, we have used the if, else, and elif conditional statements, and based
    on the condition, either True or False, one set of statement/statements will be
    executed. This makes our program branch the code. But there is another way we
    can achieve the conditional logic using a shorthand syntax called **ternary operator**.
    In some literature, this is called **conditional expression**. This will make
    your code cleaner but I admit it can look strange. Remember statements are different
    from expressions. Expressions are operations that will evaluate something based
    on a condition. Expressions are a representation of value. In Python, expressions
    are relatively new, meaning they existed since Python version 2.5.


    The syntax of Ternary Operator:


    ```

    [condition_if_true] if [expression] else [condtition_if_false]

    ```


    Let’s create an example::


    ```

    is_old = True

    is_allowed = "You can drink tonight" if is_old else "You cannot drink tonight
    coz of your age"

    print(is_allowed)

    on] else [condtition_if_false]

    ```


    If we run the above code, the output will be ‘You can drink tonight.’ Let’s start
    by explaining how this operator works. We can see that the variable **is_old**
    has the Boolean value True and the variable **is_allowed** will be the variable
    that will hold the result of what the ternary operator returns so its value at
    the end will be either ‘You can drink tonight’ or ‘You cannot drink tonight coz
    of your age.’ Because the condition **is_old** is evaluated to True, the **is_allowed**
    will be assigned the value ‘You can drink tonight.’ If the condition was evaluated
    to false, the message after the else-clause will be the one to be assigned to
    the variable **is_allowed**. In the following figure, I explain what section of
    the ternary operator will execute when the condition is True and what section
    when the condition is False:'
