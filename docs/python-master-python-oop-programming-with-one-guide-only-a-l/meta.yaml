    \ `False` 时，此循环将停止。Python 中 `while` 循环的主体由缩进决定，而在其他编程语言中，可以使用花括号来完成，例如在 JavaScript\
    \ 中。让我们来看这个例子：\n\n```python\n# while loop\n\n# calc sum up to this number\nthe_number\
    \ = 10\n# initialize sum and counter\nthe_sum = 0\ni = 1\n\nwhile i <= the_number:\n\
