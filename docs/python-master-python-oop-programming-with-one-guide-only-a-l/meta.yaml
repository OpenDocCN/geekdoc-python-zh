  md: "them by putting the first as closest and the last as furthest. In simple terms,\
    \ the MRO is a rule that Python will follow to determine which object to call\
    \ first. Okay let’s create a new example where we can see how the MRO algorithm\
    \ works:\n\n```\n# MRO - Method Resolution Order\n\n# class A\n\nclass A:\n  \
    \  def __init__(self, length=5):\n        self.length = length\n\n    def info(self):\n\
    \        return self.length\n\n\nclass B(A):\n    pass\n\n\nclass C(A):\n    def\
    \ __init__(self, length=2):\n        self.length = length\n\n    def info(self):\n\
    \        return self.length\n\n\nclass D(B, C):\n    pass\n\n# instance of class\
    \ D\nd_ob1 = D()\nprint(d_ob1.info())\n```\n\nIf we sketch this entire relationship,\
    \ we will end up with this drawing:"
