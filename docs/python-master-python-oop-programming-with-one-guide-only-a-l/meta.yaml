    \ ‘**def**’。所以，函数和方法的区别在于方法是特定于类的，它们属于该类，而函数属于全局作用域。这就是为什么在大多数文献中，作者在描述类时使用函数而不是方法，它们很容易被混淆。在我们的例子中，带有双下划线的方法是特殊的，它们被称为\
    \ **dunder** 方法或魔术方法。类声明顶部的方法被称为 **构造函数** 方法或 **init**()。当我们从 Person 类实例化对象时，此方法将自动调用。在这个阶段我们没有任何对象，但此方法将立即被调用。让我们创建一个\
    \ **person_obj1**，它将是 Person 类的一个实例，并尝试运行以下代码：\n\n![](img/9f2174949e81804f7192ec47968e0efb_317_0.png)\n\
    \n从上图中，右侧有一个 **TypeError**，提示 Person 方法 **__init__()** 缺少 **name** 参数，但它怎么知道的呢？嗯，我们正在创建\
