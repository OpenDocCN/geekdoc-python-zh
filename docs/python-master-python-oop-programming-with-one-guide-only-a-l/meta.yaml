    ![](img/9f2174949e81804f7192ec47968e0efb_94_1.png)


    **IndexError** 表示我们使用的索引超出了范围。列表项在内存中的存储方式是按顺序一个接一个的。我们可以使用 `type` 函数检查列表的类型，如下所示：


    ```

    python

    #list type

    print(type(my_list))

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_95_0.png)


    如果我们想知道列表中实际有多少项/元素，可以使用内置函数 `len()`。`len()` 函数将返回实际的项数，不要将它们与索引混淆，因为索引从零开始，而
    `len()` 从 1 开始计数：


