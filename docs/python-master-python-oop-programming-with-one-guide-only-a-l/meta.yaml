    # Coding hints


    There are different ways you can write this program and there is no perfect solution.
    This means that everyone can come up with different working solutions. The following
    tips that I have included will contain bits and pieces of the final code so you
    can change any variables that I have created and name them as you want. I mentioned
    earlier that there is no single solution to this problem. The first tip is that
    you need to import a module that will help you to generate a random number. The
    module is called **random** and here is the link from Python documentation that
    will explain how to use this module (the most important part for you to read in
    the **Functions for integers** from the documentation):


    [https://docs.python.org/3/library/random.html](https://docs.python.org/3/library/random.html)


    The second hint is to use the input function so the user can enter a number but
    be careful because the user inputs will not be in a number form, they are always
    Strings. This means that the user input needs to be converted from String to Integer.
    The third hint is to use a while loop that will count how many times the user
    has attempted to guess the random number. Before the while loop, you need some
    sort of counter variable like this:


    ```

    python

    number_of_guesses = 1

    ```'
