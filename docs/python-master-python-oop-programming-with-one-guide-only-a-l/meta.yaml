    print(person_obj1)\n```\n\n因此，当我们实例化 Person 类的一个对象时，我们需要提供在 init 构造函数中列出的参数。在我们的例子中，init\
    \ 构造函数只需要一个参数，那就是 ‘name’。\n\n![](img/9f2174949e81804f7192ec47968e0efb_319_0.png)\n\
    \n如你所见，我们在类调用中添加了一个参数：\n\n```python\nperson_obj1 = Person('Jason')\n```\n\n现在，如果我们再次运行代码，错误将消失。我们在\
    \ init() 方法中的 ‘self’ 关键字指的是类的当前实例（person_obj1）。在我们的例子中，self 参数是对 person_obj1 的引用，它是该类的唯一实例，因此\
    \ person_obj1 将能够访问类的方法和属性。‘self’ 关键字可以随意命名，但它必须是构造函数中的第一个参数，因为它被认为是类中任何方法的默认参数。这就是幕后发生的事情：\n\
    \n```python\nclass Person:\n    def __init__(self, name):\n        self.name =\
    \ name # Jason\n\n    def greet(self):\n        print(f'{self.name}')\n\n#self\
    \ refers to person_obj1\n\nperson_obj1 = Person('Jason')\nprint(person_obj1.name)\n\
    ```\n\n让我们从对象访问该 name 属性，因为对象是类的实例，它们可以访问类的方法和属性：\n\n![](img/9f2174949e81804f7192ec47968e0efb_320_0.png)\n\
    \n让我们从 Person 类创建另一个实例/对象，这次使用不同的名字：\n\n![](img/9f2174949e81804f7192ec47968e0efb_321_0.png)\n\
    \n如你所见，我们创建了 Person 类的另一个实例，这个实例现在有一个不同的 name 属性（Carly），当调用 `__init__` 方法时，name\
    \ 参数将分配 ‘Carly’，因为 ‘self’ 关键字会告诉构造函数该参数属于 person_obj2 对象。因此，我们遵循了良好的 DRY（不要重复自己）原则，因为我们能够创建两个独立的实例/对象，它们调用同一个类但具有不同的\
    \ name 属性。这些对象访问同一个类及其方法和属性。如果这不是面向对象编程，那么我们将不得不为这两个对象编写相同的代码。这使得代码更加动态。self 关键字绑定到被实例化的对象。在\
    \ Person 类中，**init** 构造函数非常简单，只接受一个参数，但它可以复杂得多，例如，假设我们希望构造函数被调用时带有 name、lastname\
