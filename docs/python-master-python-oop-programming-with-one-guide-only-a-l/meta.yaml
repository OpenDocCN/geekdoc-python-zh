    \ same as object b\nprint(a == b)\n# this returns true because the content of\
    \ a is same as the content of object b\n```\n\n```\nTrue\nFalse\nTrue\n```\n\n\
    以下是“is not”运算符的更多示例：\n\n```python\n# is not\na = [\"apple\"]\nb = [\"apple\"]\n\
