    \ 行，此时两个函数参数 num1 和 num2 将分别访问值 2 和 3。然后它进入 **outer_fn** 的函数体，即第 3 行。在第 3 行，我们有另一个函数声明，它接受两个新参数\
    \ **n1** 和 **n2**。这个函数将被跳过，因为还没有人调用它。解释器继续到第 5 行，这里我们实际调用了 **inner_fn**，传入两个参数，这两个参数是\
    \ **outer_fn** 的参数。这等同于我们这样写：\n\n```python\ntotal = inner_fn(2,3)\n```\n\n接下来，解释器再次回到第\
    \ 3 行，但这次参数 n1 和 n2 的值是 2 和 3，在函数体内我们返回这两个参数的和。函数返回后，跳到第 6 行，这里返回 **inner_fn**\
    \ 的结果作为输出。在第 8 行，result 变量将拥有从 **outer_fn** 返回的值 5，接着，程序会跳到第 10 行打印结果。这就是 **inner_fn**\
    \ 如何能够使用并访问 **outer_fn** 中的变量/参数的原理。记住这里的关键部分是 `return` 关键字，否则我们将永远无法得到这个返回结果。\n\
    \n## Python 中的文档字符串\n\nPython 中的文档字符串是位于函数、类、方法甚至模块定义之后的字符串字面量。首先，我们需要看看如何编写字符串字面量：\n\
    \n```python\n\"\"\" This is string literal \"\"\"\n```\n\n我们将字符串字面量写在三引号内。现在让我们创建一个函数来计算一个数字的平方：\n\
    \n```python\n# 文档字符串\ndef num_square(num):\n    \"\"\"This function takes a number\
    \ and returns the square of that number\"\"\"\n    return num**2\n\nresult = num_square(4)\n\
    print(result)\n```\n\n如果我们运行上面的代码，输出将是：\n\n```python\n# 文档字符串\ndef num_square(num):\n\
    \    '''This function takes a number and returns the square of that number'''\n\
    \    return num**2\n\nresult = num_square(4)\nprint(result)\n```\n\n正如你所看到的，我们在函数声明之后，在三引号内编写了字符串字面量。如果我们运行这个函数，我们将不会看到字符串字面量本身。如果你阅读这个模板字面量中的注释，你会看到它是对该函数功能的简短描述或说明。如果我们把鼠标悬停在函数调用上，将会看到这个字符串字面量消息：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_223_0.png)\n\n这被称为文档字符串，它基本上是函数内部的注释，用于解释函数的功能。这在大型应用程序开发中非常有用，如果其他开发人员想要加入，他们可以快速阅读函数说明，而不必通读整个文档。另一种了解函数功能的方法是使用\
