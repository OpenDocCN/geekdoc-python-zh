    \ on the year you are reading this book):\n\n```\nmain_file ×\n/Users/rick/PycharmProjects/chapter7\n\
    .1-errors/venv/bin/python\n/Users/rick/PycharmProjects/chapter7\n.1-errors/main_file.py\n\
