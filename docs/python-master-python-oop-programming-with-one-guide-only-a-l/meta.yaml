    This method is used when we want to remove an item from a list based on the item
    value. For example, let’s say we want to remove the item with the value ‘four’:


    ```python

    #5 remove

    my_list.remove(''four'')

    print(my_list)

    ```


    This method like the previous ones will modify the existing list but they don''t
    return anything else after the operation is done. We can check this if we wrap
    the remove method in a print function like this:


    As we can see from the figure above, this method returns None but it modifies
    the original list. If we try to print the other methods, we will see that they
    don''t return any value as well but they change the original list.


    ## clear() method


    This method will clear or remove all of the items in the specified list


    ```python

    # 6 clear

    my_list.clear()

    print(my_list)

    ```


    ## index() method


    This method will return the position or index of the value we pass into the method
    as an argument for:


    ```python

    #new list

    new_list = [''one'',''two'',''three'',''four'',''five'']

    # 7 index

    print(new_list.index(''three''))

    ```


    This simply means finding the item ‘three’ in the list and returning the index
    where this item is. This method takes two additional/optional arguments. These
    arguments are used when we want to speed up the searching process because we are
    saying start the searching from this index zero and stop at index 3:


    ```python

    # index method with 3 params

    print(new_list.index(''three'',0,3))

    ```


    As we can see from the figure above, the result will be the same but it will be
    a lot faster because we are not searching the entire List to get the item position.
    What will happen if the item we are looking for is not in the range we specified?
    Well, it will throw a Value Error saying the item we are looking for is not in
    the range:


    ```python

    print(new_list.index(''three'',0,2))

    ```


    ## count() method


    The count method will count how many times the same value occurs in the list:


    ```python

    # 8 count

    my_list1 = [''one'',''two'',''three'',''one'',''four'']

    print(my_list1.count(''one''))

    ```


    In the figure above, the count for the value ‘two’ is two because item two can
    be found at position zero and 3 in the **my_list1**.


    ## sort() method


    In order to explain this method, let us create a List with items that are random
    integer numbers:


    ```python

    #9 sort

    numbers_list = [3,6,7,1,5,2,4]

    numbers_list.sort()

    print(numbers_list)

    ```


    From the figure above, we can see that the un-ordered list is now sorted. In Python,
    we also have the built-in function called sorted() and this function produces
    a new array called the sorted array, but it will not affect the original one like
    with the sort() method:


    ```python

    # sorted() function not a method

    numbers_list1 = [3,6,7,1,5,2,4]

    store_sorted =sorted(numbers_list1)

    print(numbers_list1)

    print(store_sorted)

    ```


    This proves that the built-in function does not modify the existing list.


    ## copy() method


    We can use this method when we need a copy of some list:


    ```python

    #10 copy

    numbers_list = [3, 6, 7, 1, 5, 2, 4]

    new_list = numbers_list.copy()

    print(new_list)

    ```


    The new_list will be a copy from the numbers_list and if we want to add insert
    or remove elements from the new_list, then this will not affect the original numbers_list


    ## reverse() method


    This method will reverse the entire list without sorting it:


    ```python

    #11 reverse

    numbers_list2 = [3, 6, 7, 1, 5, 2, 4]

    numbers_list2.reverse()

    print(numbers_list2)

    ```


    This is the last method I wanted to show you but before we start learning some
    new Python features, I would like to mention that you can combine different List
    methods in your projects, for example, if you need a reversed list but sorted
    you can call the sort() method first and then the reverse method:


    ```python

    # combining different list methods

    numbers_list3 = [3,6,7,1,5,2,4]

    numbers_list3.sort()

    numbers_list3.reverse()

    print(numbers_list3)

    ```


    ## Useful tips and tricks used on Lists


    These are common tips and tricks that developers use on Python Lists, and once
    you know them, you will use them as well. We have already seen the **len()** function
    that returns the number of items in a list. We have also seen how we can reverse
    the String but the same can be done with Lists as well


    ### Reverse the list using list slicing


    ```python

    # reverse the list using slicing

    num_list = [3,6,7,1,5,2,4]

    print(num_list[::-1])

    ```


    ### Copy of the list using the slicing method


    ```python

    # copy the list using the slicing:

    num_list1 = [3,6,7,1,5,2,4]

    new_list = num_list1[:]

    print(new_list)

    print(num_list1)

    ```


    ### Generate new list using range() function


    We can generate and populate a numbered list using the range function. For example,
    I want to create a numbered list from a range of 0 to 50:


    ```python

    #create and populate numbered list

    num_list2 = list(range(0,50))

    print(num_list2)

    ```


    ### .join()


    This method will take all of the items from a list (iterable) and join the values
    into one string. We also need to specify the separator as well:


    ```python

    #.join()

    usernames = [''andy'',''carol'',''steve'',''jason'']

    joined_usernames = '', ''.join(usernames)

    print(joined_usernames);

    ```


    ### List Unpacking


    In JavaScript, this is known as the concept of destructuring, but in Python, this
    is known as list unpacking and it’s very useful when we want the values/items
    from the List to be stored in different variables:


    ```python

    # list unpacking

    andy,carol,steve,jason = [''andy'',''carol'',''steve'',''jason'']

    print(andy)

    print(carol)

    print(steve)

    print(jason)

    ```


    As you can see now, the variables on the left side of the ‘=’ operator will have
    the values from the list items. This is how we can unpack the list items into
    variables. But we can unpack only a few values from a List and keep the rest of
    the items stored in a single variable name as a list:


    ```python

    andy,carol,*rest = [''andy'',''carol'',''steve'',''jason'']

    print(andy)

    print(carol)

    print(rest)

    ```


    I think we have covered a lot of the basic and some intermediate features of Python
    in this section. Let’s learn the rest of the data types in Python.


    ## None in Python (data type)


    The **None** Python is a keyword and is used to define a **null** value or no
    value at all. The **None** is also a data type from the class **NoneType**. The
    **None** simply means absence of value, **null** value, or no value at all. In
    **JavaScript**, we have **Null** and we have **None**. Some developers still don’t
    understand that this **None** is not the same as 0 (zero) or empty string and
    it can be very useful in some scenarios. For example, you want to create a program
    and at the beginning of that program, you need a variable that is only declared
    but without any value. We can assign the variables to None like this:


    ```python

    # None Keyword and Data Type

    no_value = None

    print(no_value)

    print(type(no_value))

    ```


    Before we move to the next section, I want you to remember this about the **None**
    data type:


    - None is not the same as 0 (zero)

    - None is not the same as False

    - None is not an empty String " "

    - Comparing None to None will return True

    - Comparing None to anything else will always return False


