    ## Augmented assignment operator


    We know that we use the assignment operator (=) to assign value to a variable.
    Augmented assignment operators are a combination of the assignment operator and
    the arithmetic or bitwise operator. Example:


    ```

    # Augmented assignment operator

    num1 = 10

    num2 = 20


    num1 += num2

    print(num1)

    ```


    What does num1 += num2 mean? The augmented assignment operator provides a short
    way to perform a binary operation and assign the result back to one of the operands.
    This is a short syntax because it is equivalent to:


    ```

    num1 = num1 + num2

    ```


    The result is:


    The above operator combines the functionality of arithmetic addition and assignment.
    In Python, we can use several different augmented assignment operators:


    - +=, Addition and Assignment

    - -=, Subtraction and Assignment

    - *=, Multiplication and Assignment

    - /=, Division and Assignment

    - //=, Floor Division and Assignment

    - **=, Power and Assignment

    - %=, Modulo and Assignment


    Examples:


    ```

    # Augmented assignment operator

    num1 = 30

    num2 = 10

    # Addition & Assignment

    num1 += num2

    print(num1)

    # Output: 40


    num1 = 30

    num2 = 10

    # Subtraction & Assignment

    num1 -= num2

    print(num1)

    # Output: 20


    num1 = 30

    num2 = 10

    # Multiplication & Assignment

    num1 *= num2

    print(num1)

    # Output: 300


    num1 = 30

    num2 = 10

    # Division & Assignment

    num1 /= num2

    print(num1)

    # Output: 3.0


    num1 = 30

    num2 = 10

    # Floor Division & Assignment

    num1 //= num2

    print(num1)

    # Output: 3


    num1 = 30

