    \n![](img/9f2174949e81804f7192ec47968e0efb_224_2.png)\n\n总结来说，文档字符串是我们希望他人看到的注释。这些注释应该是有意义的，并解释函数的功能。\n\
    \n## Python 的 *args 和 **kwargs\n\n在本节中，我们将学习 ‘args’ 和 ‘kwargs’ 以及如何使用它们。我们知道我们定义的函数是可重用的代码片段，可以被多次调用或唤起。在我们的函数调用期间，我们传递特定的值，称为参数。让我们定义一个函数，根据出生年份和当前年份来计算你的年龄：\n\
