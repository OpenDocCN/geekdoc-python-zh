    \ `while` 循环的主体中，在求和计算之后，我们将计数器变量 'i' 的值增加一。当 'i' 的值变为 11 时，测试表达式将求值为 `False`，这将终止\
    \ `while` 循环。我想分享的另一个有趣的特性是 `break` 语句。这是我们停止 `while` 循环并强制循环终止或停止执行的方式。我们可以在\
