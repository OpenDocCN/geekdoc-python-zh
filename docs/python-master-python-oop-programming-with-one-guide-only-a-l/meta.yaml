- md: '## Code Editors and IDEs


    What is the difference between Code Editors and IDEs? Code editors are lightweight
    and allow us to enhance and ease the process of writing the code. The code editor
    is used by many programmers because they have built-in features that can speed
    up the process of writing the code. For example, they use **Emmet** to autocomplete
    the code and give you suggestions during your code writing and also has **linting**
    that is used to automatically check the source code for programmatic and stylistic
    errors. An IDE, on the other hand, is a more complex set that will combine different
    features like code editors, text editors, debuggers, compilers, code testers,
    code formatting, and much more. All of these features are under one hood. This
    is why when we download the IDEs, the file will be much bigger than that of the
    editors. I will not install all of the tools I have mentioned in the figure above
    but I will guide you on how to install and use the most important ones. The VS
    Code is the most popular code editor today and it is completely free. VS Code
    (Visual Studio Code) editor can be downloaded from this website: [https://code.visualstudio.com/](https://code.visualstudio.com/)


    ## Code editing. Redefined.


    Free. Built on open source. Runs everywhere.


    Download Mac Universal Stable Build


    |                     | Stable | Insiders |

    |---------------------|--------|----------|

    | macOS Universal      | ↓      | ↓        |

    | Windows x64 User Installer | ↓      | ↓        |

    | Linux x64 .deb      | ↓      | ↓        |

    | .rpm                | ↓      | ↓        |


    As you can see from the figure above, you need to get the right version for your
    Operating System. It will be automatically pre-selected for you, and in my case,
    it is the one that says macOS – Universal. If you are using Windows or Linux,
    you need to choose the right one for your system. There are also other versions
    of VS Code if you click on the link saying ‘Other downloads.’ They have an amazing
    get-started page that will help you if you have any issues. Do not get confused
    and scared of the screenshots on their website because they have included a few
    code snippets that you probably don’t understand at this stage. [https://code.visualstudio.com/docs](https://code.visualstudio.com/docs)


    This editor is my favorite and I have used it for all of my projects so far. The
    code I have written for my HTML and JavaScript books was written in this editor.
    This means we can use code editors like VS Code not just for one specific language
    like Python but for all other languages as well. You can click on the download
    link and install it on your machine because it is very easy and straightforward.


    ## Explore the Visual Studio Code


    I hope you have already installed VS Code (Visual Studio Code Editor). Like many
    other code editors, the VS Code has a simple but user-friendly interface.


    Please don''t be afraid of the code, files, and folders in the figure above because
    it is only for demonstration purposes. As you can see, we have a very basic layout
    with an explorer on the left side which shows all the files and folders we have
    opened, and an editor on the right side that shows the content of the files we
    have opened. The **GUI** or graphical user interface is divided into five different
    areas (note – all these areas will not be visible in our initial launch):


    -   - **Editor** – This is the main area where we can edit our files. We can open
    as many editors as we want and they will be displayed side by side

    - **Side Bar** – The side bar contains different views like **Explorer**, which
    can assist us during the coding

    - **Status Bar** – The status bar gives the information on what files are currently
    being edited

    - **Activity Bar** – This area is located on the far left-hand side and it allows
    us to switch between different views. It also shows the number of changes when
    **Git** is enabled

    - **Panels** – below the editor is where we have the output or debug information
    – all the errors and warnings. We can even use the integrated terminal if we want.


    ## How To Use The Visual Studio Code


    Navigate to your VS Code and open it. The first time you open it, it might look
    different from mine but it is okay (because I have installed some extensions which
    I will show you at the end how you can install them too):


    From the figure above, you can see that you can create a new file, open up a folder,
    etc. Select the new file on the top and it will give you access to the code editor:


    ## The dot''s on each side means that we have unsaved changed


    From the figure above, you can see that I have written the print (‘Hello World’)
    in the first line but immediately after you start typing the code, you will notice
    that two dots or circles will appear on each side. This means we have written
    a code and we haven’t saved the changes. We can fix this if we save the file by
    pressing command + S on Mac or Ctrl +S on Windows. We can even use the menu and
    go to file > Save as:


    As you can see from the figure above, we are saving the file with the .py extension
    and this means we are working with Python files. Also, it is best practice to
    create a folder on your desktop or anywhere you think your code files should go
    and save the files there. You can name your file as you want, but make sure you
    use the .py file extension and click save and the dots will disappear. Make sure
    you save the changes after you write your code. After you have saved your file,
    you will have some suggestions saying that no Python interpreter is selected,
    and if you want to use Python, you will need to install the recommended extensions:


    Note: in the future, the messages might change slightly but please continue reading
    because the actions you need to perform will be similar if not the same. If you
    see a message like in the figure above, click on the install button and start
    installing Python.


    As you can see in the figure above, Python is installed. After this, I got the
    following messages telling me about the next steps I should take:


    First, we need to click on the ‘Select Python Interpreter’ button and we need
    to select the Python version we installed before:


    As you can see, my Mac had listed the previously installed versions of Python
    and this is good because it gives me an option to select the latest one. If you
    remember, the version I installed was 3.10.5 therefore I need to select that one,
    but your version might be different so please make sure you select the Python
    version you downloaded and installed. If you don''t remember the version number
    you can head back to the official website and check the latest version in the
    downloads section: [https://www.python.org/](https://www.python.org/)


    Select the right version and that is it for now. Do not worry about installing
    the Linter pylint for now because you have selected the Python interpreter and
    we can start writing code, so you can close the message by clicking on the ‘x’.
    It is best to close the VS Code completely and open it again. Try to open the
    file you have created by selecting the folder where it was saved. So you need
    to click on the Open folder blue link:


    Then you need to select the right folder and this is what you will get:


    This tells you the name of the file, and location.


    As you can see, in my case, the file name is called ‘test.py’ and is located in
    the folder called python-exercises. Your file folder name can be different if
    you want. Let’s talk about the VS Code editor and what it can do apart from writing
    code. The VS Code like many other code editors comes with the terminal and you
    can open the terminal by going into the menu and selecting the terminal:'
  mdcn: '## 代码编辑器与 IDE


    代码编辑器和 IDE 有什么区别？代码编辑器是轻量级的工具，能够增强并简化编码过程。许多程序员都使用代码编辑器，因为它们内置了能加速编码过程的功能。例如，它们使用
    **Emmet** 来自动补全代码，并在编写过程中提供建议；同时还具备 **linting** 功能，用于自动检查源代码中的程序错误和风格错误。另一方面，IDE
    是一个更复杂的套件，它集成了代码编辑器、文本编辑器、调试器、编译器、代码测试器、代码格式化等多种功能。所有这些功能都整合在一个环境下。这就是为什么下载 IDE
    时，其文件大小远大于普通编辑器。我不会安装图中提到的所有工具，但会指导你如何安装和使用其中最重要的。VS Code 是当今最受欢迎的代码编辑器，且完全免费。VS
    Code (Visual Studio Code) 编辑器可从以下网站下载：[https://code.visualstudio.com/](https://code.visualstudio.com/)


    ## 重新定义代码编辑。


    免费。基于开源构建。处处运行。


    下载 Mac 通用稳定版


    |                     | 稳定版 | 内测版 |

    |---------------------|--------|----------|

    | macOS 通用版        | ↓      | ↓        |

    | Windows x64 用户安装程序 | ↓      | ↓        |

    | Linux x64 .deb 包   | ↓      | ↓        |

    | .rpm 包             | ↓      | ↓        |


    如上图所示，你需要为你的操作系统获取正确的版本。它会为你自动预选，在我这里就是标有“macOS – Universal”的选项。如果你使用的是 Windows
    或 Linux，你需要为你的系统选择正确的版本。如果你点击“其他下载”链接，还可以找到 VS Code 的其他版本。他们有一个出色的入门页面，如果你遇到任何问题，它会提供帮助。不要因为他们网站上的截图感到困惑或害怕，因为其中包含了一些你现阶段可能还不理解的代码片段。[https://code.visualstudio.com/docs](https://code.visualstudio.com/docs)


    这款编辑器是我的最爱，到目前为止我所有的项目都是用它完成的。我为 HTML 和 JavaScript 书籍编写的代码也是在这个编辑器中完成的。这意味着我们可以使用像
    VS Code 这样的代码编辑器，不仅用于 Python 等特定语言，也适用于所有其他语言。你可以点击下载链接并将其安装到你的机器上，因为它非常简单直接。


    ## 探索 Visual Studio Code


    希望你已经安装了 VS Code (Visual Studio Code 编辑器)。和许多其他代码编辑器一样，VS Code 拥有一个简洁但用户友好的界面。


    请不要害怕上图中的代码、文件和文件夹，它们仅用于演示目的。如你所见，我们有一个非常基础的布局：左侧是资源管理器，显示所有已打开的文件和文件夹；右侧是编辑器，显示已打开文件的内容。**GUI**
    或图形用户界面分为五个不同的区域（注意——在初始启动时，并非所有这些区域都可见）：


    -   - **编辑器** – 这是我们可以编辑文件的主要区域。我们可以根据需要打开多个编辑器，它们将并排显示。

    - **侧边栏** – 侧边栏包含不同的视图，如**资源管理器**，可以在编码过程中为我们提供帮助。

    - **状态栏** – 状态栏显示当前正在编辑的文件的信息。

    - **活动栏** – 此区域位于最左侧，允许我们在不同视图之间切换。当 **Git** 启用时，它还会显示更改的数量。

    - **面板** – 编辑器下方是输出或调试信息区域——所有错误和警告都显示在这里。如果我们需要，甚至可以使用集成终端。


    ## 如何使用 Visual Studio Code


    打开你的 VS Code。首次打开时，它可能看起来与我的不同，但没关系（因为我安装了一些扩展，我将在最后向你展示如何安装它们）：


    从上图中可以看到，你可以创建新文件、打开文件夹等。选择顶部的“新建文件”，即可进入代码编辑器：


    ## 两端的点表示我们有未保存的更改


    从上图中可以看到，我在第一行写了 `print (‘Hello World’`，但只要你开始输入代码，就会注意到两边出现了两个点或圆圈。这意味着我们写了代码但尚未保存更改。我们可以通过按
    Mac 上的 `command + S` 或 Windows 上的 `Ctrl + S` 保存文件来解决这个问题。我们甚至可以使用菜单，转到文件 > 另存为：


    如上图所示，我们将文件保存为 `.py` 扩展名，这意味着我们正在处理 Python 文件。此外，最佳实践是在桌面上或你认为代码文件应存放的位置创建一个文件夹，并将文件保存在那里。你可以按喜好命名文件，但请确保使用
    `.py` 文件扩展名，然后点击保存，那些点就会消失。请确保在编写代码后保存更改。保存文件后，你会看到一些建议提示，指出未选择 Python 解释器，如果你想使用
    Python，你需要安装推荐的扩展：


    注意：未来这些消息可能会略有变化，但请继续阅读，因为即使不完全相同，你需要执行的操作也会相似。如果你看到上图中的消息，点击“安装”按钮开始安装 Python。


    如上图所示，Python 已安装。之后，我收到了以下消息，告诉我接下来的步骤：


    首先，我们需要点击“选择 Python 解释器”按钮，并选择我们之前安装的 Python 版本：


    如图所示，我的 Mac 列出了先前安装的 Python 版本，这很好，因为它给了我选择最新版本的选项。如果你还记得，我安装的版本是 3.10.5，因此我需要选择那个版本，但你的版本可能不同，所以请确保选择你下载并安装的
    Python 版本。如果你不记得版本号，可以回到官方网站的下载部分查看最新版本：[https://www.python.org/](https://www.python.org/)


    选择正确的版本，目前就这些了。暂时不要担心安装 Linter pylint，因为你已经选择了 Python 解释器，我们可以开始编写代码，所以你可以点击“x”关闭消息。最好完全关闭
    VS Code 然后重新打开。尝试通过选择保存它的文件夹来打开你创建的文件。所以你需要点击蓝色的“打开文件夹”链接：


    然后你需要选择正确的文件夹，你会看到如下界面：


    这会告诉你文件的名称和位置。


    如图所示，在我的例子中，文件名为‘test.py’，位于名为“python-exercises”的文件夹中。如果你愿意，你的文件夹名称可以不同。让我们来谈谈
    VS Code 编辑器，除了编写代码，它还能做什么。和许多其他代码编辑器一样，VS Code 自带终端，你可以通过进入菜单并选择终端来打开终端：'
