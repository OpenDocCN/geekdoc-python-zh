    # ## Project_1: Guess the Random Number


    This project is a mini-interactive game that you need to write in Python. The
    computer will create a random number between 1 and 10 and the user will be given
    an option to guess it in 3 attempts. In each of the attempts, the program must
    guide the user and provide minimal information if the random number is higher
    or lower than the computer random number. This is the output when the user tries
    to guess the number in three attempts but fails:


    ![](img/9f2174949e81804f7192ec47968e0efb_477_0.png)


    This is the output when the user guesses the number:'
