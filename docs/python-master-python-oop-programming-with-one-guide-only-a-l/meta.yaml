    This is called the DRY principle and it means ‘Do Not Repeat Yourself’, so no
    unnecessary code or duplicates. Another important thing you should know is that
    we cannot call a function before it has been created or defined. Let''s try to
    call a function before it has been declared:


    ![](img/9f2174949e81804f7192ec47968e0efb_212_0.png)


    This will throw a NameError because the function is not defined. The Python Interpreter
    will throw the above error because it tries to call a function that does not exist
    in the memory. Anytime we write a function name without the brackets, we use that
