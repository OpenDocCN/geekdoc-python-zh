    ## Constants in Python


    In Python, a constant is a type of variable whose value cannot be changed. But
    this is not entirely true because we still can change the value. In JavaScript
    for example, when we can create a constant variable, the value cannot be changed
    because it will throw an error if we try. When we name constants in Python, we
    should follow some new naming conventions. We need to use all capital letters
    and underscores if we have a compound name. For example:


    ```

    # Constants

    PI = 3.14

    EARTH_GRAVITY = 9.807

    ```


    But we can change its value although it’s been declared as constant:


    ```

    # Constants

    PI = 3.14

    EARTH_GRAVITY = 9.807

    print(PI)

    print(EARTH_GRAVITY)


    # Assign new value

    PI = 3.1455

    EARTH_GRAVITY = 9.8

    print(PI)

    print(EARTH_GRAVITY)

    ```


    As we can see, the constants just like the normal variable can be reassigned to
