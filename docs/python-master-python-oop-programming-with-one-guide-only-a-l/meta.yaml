    # How Strings are Stored?


    So far, we learned how integer and float numbers are stored in memory. The strings
    are stored in memory as a sequence of individual characters. This means that a
    single character is stored as a string with a length of 1 and can be accessed
    by its index. In order to understand how strings are stored, we need to look at
    the following example:


    ```

    my_name = ''Rick S''

    ```


    As you can see, we have a variable my_name with type string data. We know the
    strings are stored as ordered sequence of characters and the first character is
    ‘R’ and it will be stored somewhere in memory at location/index zero (0). The
    following figure explains how the string is stored in memory and each of the characters
    has its own index starting from zero:


    ![](img/9f2174949e81804f7192ec47968e0efb_72_0.png)


    This is very powerful because the way the strings are stored makes it easy for
    us to retrieve a specific character based on its location. How we can get an individual
    character from a string? We can use the name of the variable followed by the square
    brackets where we pass the index value. Remember the strings start from position
    zero, not 1. Let us get the first character of the string above using the following
    syntax:


    ```

