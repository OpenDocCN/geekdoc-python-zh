- md: "##  dunder 魔术方法\n\n正如你所看到的，我们使用了 dunder 方法来改变方法的返回值，并且可以完全覆盖其功能。你不应该修改 dunder\
    \ 方法，但需要注意这些修改不会对每个类都起作用，因为它们不是永久的，也不是全局的。在我们的例子中，我们并没有完全改变 Python 方法 `__str__()`。它只会对\
    \ `Car` 类及其该类的实例生效。这意味着如果我有另一个类并创建该类的实例，然后尝试使用 dunder 字符串方法 `__str__()`，其输出将与原始的\
    \ Python 实现相同。让我们看看另一个 dunder 方法 `__del__`。这个方法与 C++ 中的析构函数非常相似，这些析构函数用于销毁对象状态。所以，与其销毁变量或对象，不如修改这个\
    \ `__del__` 来打印 “Deleted”：\n\n```python\ndef __del__(self):\n    print('Deleted')\n\
    ```\n\n我们可以这样调用它：\n\n```python\n# 调用 del 方法\ndel bmw_car\n\n# 如果我们尝试访问 bmw_car\
    \ 对象，将会出现错误\nprint(bmw_car)\n```\n\n输出：\n\n```\nDeleted\nTraceback (most recent\
    \ call last):\n  File \"/Users/rick/PycharmProjects/chapter4/dunder_magic_methods.py\"\
    , line 41, in <module>\n    print(bmw_car)\nNameError: name 'bmw_car' is not defined\n\
    ```\n\n它仍然会在程序结束时运行析构函数，并删除对该对象的所有引用。`del` 在 Python 中通常不那么受欢迎，如果你使用它可能会遇到一些问题，因为它不会只删除单个对象或变量，而是删除连接到该对象或变量的所有引用。但知道它存在总是好的。还有另一个\
    \ dunder 方法叫做 `delete`。`__del__` 和 `__delete__` 都是 Python 中的 dunder 方法。`__delete__`\
    \ 会删除描述符属性，我们可以在需要时执行它。它不会在程序结束时像 `__del__` 那样运行。\n\n```python\n# 调用 __delete__\n\
    def __delete__(self, instance):\n    print(\"Deleted\")\n```\n\n让我们来谈谈另一个 dunder\
    \ 方法 `__call__`。`call` 将赋予我们的类独特的功能：\n\n```python\ndef __call__(self):\n    return\
    \ 'Called!'\n```\n\n现在我们实际的对象 `bmw_car` 可以使用这些括号 `()` 来调用，或者像调用函数一样调用：\n\n```python\n\
    print(bmw_car())\n```\n\n结果将是：\n\n```\n5\nbmw\nbmw\nCalled!\nDeleted\nTraceback\
    \ (most recent call last):\n  File \"/Users/rick/PycharmProjects/chapter4/dunder_magic_methods.py\"\
    , line 48, in <module>\n    print(bmw_car)\nNameError: name 'bmw_car' is not defined\n\
    ```\n\n我想提到的另一个 dunder 方法是 `__getitem__()`。如果在类中使用此方法，它将允许该类的实例使用方括号 `[]` 并传递索引以从列表、字典或元组中获取项或值。所以让我们在类中定义另一个字典类型的属性：\n\
    \n```python\nclass Car(object):\n    def __init__(self, color, make, year, size):\n\
    \        self.color = color\n        self.make = make\n        self.year = year\n\
    \        self.size = size\n        self.engine_dict = {\n            'automatic':\
    \ 'Yes',\n            'manual': 'No'\n        }\n```\n\n现在我们可以创建 dunder `__getitem__()`\
    \ 方法：\n\n```python\ndef __getitem__(self, index):\n    return self.engine_dict[index]\n\
    ```\n\n最后，我们可以这样调用我们类的实例，在本例中是 `bmw_car`：\n\n```python\n# 使用方括号调用 bmw_car 实例\n\
    print(bmw_car['manual'])\n```\n\n这将给我们键 `'manual'` 的值，即 `'No'`。我想你现在明白我们可以修改 dunder\
    \ 方法并自定义它们的返回值。修改 dunder 方法不是最好的主意，但有时我们的代码逻辑需要我们这样做。dunder 方法确实是魔术般的，因为它们可以帮助我们改变特定类的方法返回内容的方式。这就是关于\
