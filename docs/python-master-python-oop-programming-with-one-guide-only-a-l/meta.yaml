    \n## The built-in Range() function\n\nThe range() function is one of the built-in\
    \ functions in Python that allows us to iterate over a sequence of numbers. The\
    \ range() function will return a sequence of numbers that will start from zero\
    \ (0) by default and will increment by 1 until it reaches the end (a specified\
    \ number we pass into the range function). The range function has the following\
    \ syntax:\n\n```python\nrange(start, stop, step)\n```\n\nAs you can see, the range\
    \ can take 3 parameters, the first one is called start and is optional. This would\
    \ be an integer number to specify the start position. If omitted, the default\
    \ will be zero (0). The second parameter is the ‘stop,’ and this one is required\
    \ and will be an integer number that will specify the end. The final parameter\
    \ is called ‘step’ and is the same as the ‘start’ parameter, this one is optional\
    \ as well and it will specify the step size. The default step size is one. We\
    \ know that from the parameters the one in the middle called stop is required\
    \ so let’s print what this function does when we supply only one parameter:\n\n\
    ```python\n# range function\nprint(range(10))\n```\n\nFrom the figure above we\
    \ now have a range that starts from zero and ends at ten and although we haven’t\
    \ specified the start, it was added for us. The range() is very popular when it’s\
    \ used in conjunction with loops:\n\n```python\n# range() with for-loop\nfor number\
    \ in range(0, 10):\n    print(number)\n```\n\nFrom the figure above, we can see\
    \ that we have used the range function so the for-loop can run 10 times. Instead\
    \ of specifying the variable name like ‘number,’ we can use ‘_’ underscore and\
    \ it will still be valid:\n\nThis means we don’t care about naming a variable\
    \ but we need the loop to run a specific number of times specified in the range\
    \ function. We can even specify the step over parameter:\n\n```python\n# step\
    \ over\nfor _ in range(0, 10, 2):\n    print(_)\n```\n\n## Enumerate ()\n\nSimilar\
    \ to the range () function, we have a function called enumerate(). The enumerate\
    \ () function will take a collection like a Tuple and will return it as enumerate\
    \ object. This function will also add a counter/index as the key to each item\
    \ in the set. This means that the function allows us to iterate through a sequence\
    \ but it will keep track of both element and index. For example, let’s pass a\
    \ Tuple collection into this new function:\n\n```python\n# enumerate ()\nx = ('first',\
    \ 'second', 'third')\ny = enumerate(x)\n\nfor item in y:\n    print(item)\n```\n\
    \nAs we can see, the enumerate() function took an iterable as a parameter and\
    \ it returned an object with an index which is the key, and now the Tuples have\
    \ access to indexes just like the Lists. Instead of printing just the variable\
    \ ‘item,’ we can do the following:\n\n```python\nfor key, item in y:\n    print(key,\
    \ item)\n```\n\nExcellent! Now we got back not just the value of the collection\
    \ but the index as well. We can achieve the same thing with Strings and Lists:\n\
    \n```python\n# Strings\nfor key, item in enumerate('Rick'):\n    print(key, item)\n\
    \n# Lists\nfor key, item in enumerate([1, 2, 3]):\n    print(key, item)\n```\n\
    \nAs we can see, the enumerate() function is very useful because we can iterate\
    \ over the collection plus we have access to the index and the value.\n\n## Break,\
    \ continue and pass statements\n\nWe saw that the break statement will stop a\
    \ normal execution of a loop and will terminate that loop. In that example, we\
    \ have used the break statement inside the while loop but we can use the break\
    \ statement in any other loops if we want. The break statement can be used to\
    \ stop the loop before it has finished looping all of the items:\n\n```python\n\
    # Break, continue and pass statements\nbrands = [\"ford\", \"bmw\", \"toyota\"\
    , \"audi\", \"mercedes\"]\nfor brand in brands:\n    print(brand)\n    if brand\
    \ == 'toyota':\n        break\nprint('If you read this line the loop is finished')\n\
    ```\n\nAnother statement we can use in our loops is the ‘continue’ statement.\
    \ When we use this statement, we will not exit the loop the way we did with the\
    \ ‘break’ statement but we will stop the loop once for the current iteration not\
    \ the entire loop like the ’break statements.’ Let’s use the continue statement\
    \ to skip the iteration when the car brand is equal to ‘bmw’ but we need to continue\
    \ to iterate over the rest of the brands:\n\n```python\n# continue\nfor brand\
    \ in brands:\n    if brand == 'bmw':\n        continue\n    print(brand)\nprint('If\
    \ you read this line the loop is finished')\n```\n\nThe third statement is called\
    \ ‘pass statement’ and it is rarely used because it doesn’t do anything in particular.\
    \ The pass statement will be used as a placeholder for future code. For example,\
    \ when the pass statement is executed, it will not do anything but you can avoid\
    \ getting an error because an empty code is not allowed. I know this is confusing\
    \ but let’s check the following example:\n\n```python\n#pass\nis_old = True\n\
    if is_old:\n    #no code\nprint('This will give us an error')\n```\n\nAs you can\
    \ see, we got IndentationError because there is no code after the if-statement\
    \ and the Interpreter expects us to finish the if-statement and write some code.\
    \ The Interpreter will look into the next line (5), see that there is no indentation,\
    \ and will throw an error because the Interpreter is confused and thinks the print\
    \ message should go in the body of the if-statement. Therefore, when we don’t\
    \ know what to write in the if-block, we can use the pass statement:\n\n```python\n\
    #pass\nis_old = True\nif is_old:\n    #no code\n    pass\nprint('This will give\
    \ us an error')\n```\n\nAs we can see, we can run the code without getting errors.\n\
    \n## Practice Time\n\nNow is the right time to practice some of the things we\
