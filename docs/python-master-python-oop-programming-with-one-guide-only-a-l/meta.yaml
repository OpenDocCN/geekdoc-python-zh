- md: '## How Strings are Stored?


    So far, we learned how integer and float numbers are stored in memory. The strings
    are stored in memory as a sequence of individual characters. This means that a
    single character is stored as a string with a length of 1 and can be accessed
    by its index. In order to understand how strings are stored, we need to look at
    the following example:


    ```

    my_name = ''Rick S''

    ```


    As you can see, we have a variable my_name with type string data. We know the
    strings are stored as ordered sequence of characters and the first character is
    ‘R’ and it will be stored somewhere in memory at location/index zero (0). The
    following figure explains how the string is stored in memory and each of the characters
    has its own index starting from zero:


    ![](img/9f2174949e81804f7192ec47968e0efb_72_0.png)


    This is very powerful because the way the strings are stored makes it easy for
    us to retrieve a specific character based on its location. How we can get an individual
    character from a string? We can use the name of the variable followed by the square
    brackets where we pass the index value. Remember the strings start from position
    zero, not 1. Let us get the first character of the string above using the following
    syntax:


    ```

    # String Indexes

    my_name = ''Rick S''

    print(my_name[0])

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_73_0.png)


    As you can see, we only need to know the index position to retrieve any character.
    What will happen if we try to run this code:


    ```

    print(my_name[4])

    ```


    It looks like nothing but we actually got the white space back because even those
    are stored in memory. On the right side of the following figure, I have highlighted
    where the empty space is actually printed:


    ![](img/9f2174949e81804f7192ec47968e0efb_73_1.png)


    What will happen if you use an index that is not in the string range? If we do
    this, we will get an IndexError and this means that the character we try to access
    by that index simply does not exist:


    ![](img/9f2174949e81804f7192ec47968e0efb_73_2.png)


    This happens very often. Beginners usually make these mistakes because they keep
    forgetting that the first character is stored at index zero (0).


    ## Slicing Strings – get a substring of a string


    We’ve learned that we can extract individual characters based on their indexes,
    now it is time to learn how to return multiple characters based on a specified
    range. This is called string slicing or extracting a substring of a string and
    we only need to use the following syntax:


    ```

    [start:stop]

    ```


    The first index is called the **start index** and it is separated by a colon from
    the second index called **stop**. Let’s try the following example:


    ```

    # String Indexes

    my_name = ''Rick S''

    print(my_name[0:4])

    ```


    Rick


    You should know that the character at the stop index will not be included in the
    output. In the above example, that would be the white space. If we want to get
    the full string, we need to write:


    ```

    print(my_name[0:6])

    ```


    ```

    # String Indexes

    my_name = ''Rick S''

    print(my_name[0:6])

    ```


    Rick S


    From the picture above, we can see that the stop or the end index is 6 but the
    indexes for these particular string end at position 5. This will not throw an
    error because the end index will never be used in the output.


    ### String slicing with stepover


    Here is the stepover syntax:


    ```

    [start:stop:stepover]

    ```


    In the previous section, we have learned how to slice a string based on the start
    and stop index but now we can include a third value which is called stepover.
    The default value of the stepover is 1 and we don’t have to write it explicitly.
    The step over indicates the step size and as I mentioned, the default value is
    1, meaning we are going character by character but if we increase the size of
    the step, then we will start skipping and the output will be different. Let’s
    take a look at the following example:


    ```

    # Step over

    number_string = ''012345678''

    print(number_string[0:9:2])

    ```


    From the example, we can see that now the step value is 2 and it will start from
    the first position, then step over 2 times and print 2 then step over 2 more times
    and print 4, and so on. Here is our output:


    ![](img/9f2174949e81804f7192ec47968e0efb_75_0.png)


    Working with string slicing is very interesting because there are different scenarios
    that we should be aware of. For example, if we only include the start index and
    omit the end index, for example like this:


    ```

    number_string[ 1 : ]

    ```


    Can you guess what will happen? Here is the output:


    ![](img/9f2174949e81804f7192ec47968e0efb_76_0.png)


    This basically means we need to start at position 1 and then because there is
    no stop index it will go until the end. This is perfect when we have a long string
    and we don''t know what the last index number is. We use this because we know
    it will go on until the end. Another interesting scenario is when we omit the
    start index but include the index of the end/stop position like this:


    ```

    number_string[:4]

    ```


    Can you guess the output? If not, here is the screenshot:


    ![](img/9f2174949e81804f7192ec47968e0efb_76_1.png)


    This means starting from zero although the value is missing and going until index
    4 but not including the value at the last fourth position. What will happen if
    we omit the first stop and the last end index and only include the stepover like
    this:


    ```

    number_string[::1]

    ```


    This will print the entire string because it starts at the default position zero,
    ends where the string ends, and stepping over will be the default value 1. Here
    is another example of when the two (start, stop) indexes are missing:


    ```

    # Step over

    number_string = ''012345678''

    print(number_string[::1])

    print(number_string[::2])

    ```


    Great! We have learned a lot about string slicing, so let’s see what will happen
    if we include negative values as well:


    ```

    # Step over

    number_string = ''012345678''

    print(number_string[-1])

    ```


    The output is 8 because in Python the negative index means start at the end of
    the string instead of position zero. One of the most common operations with negative
    indexes is this one:


    ```

    # Step over

    number_string = ''012345678''

    print(number_string[-1])

    print(number_string[::-1])

    ```


    This is a perfect example of when we need a string to be reversed. The negative
    values can even be included for the skip value.


    ## String immutability


    In the previous sections, we have learned a lot about strings - how we can create
    them, how they are stored in memory, and how we can access the individual characters.
    String slicing is even more useful because we can slice the string however we
    like and can get a specific substring if we specify the correct range. In this
    section, we are going to learn about an important concept for programming called
    **immutability**. What does **immutability** mean? Once the Strings in Python
    are created, they are immutable. You should not confuse mutability with value
    reassignment. For example, we can create a string with a simple text like this:


    ```

    python

    my_text = ''Strings are immutable''

    print(my_text)

    ```


    We know we can reassign a new value to a variable and it will work:


    ```

    python

    my_text = ''Strings are immutable''

    print(my_text)

    my_text = ''New text''

    print(my_text)

    ```


    If we run this on replit, we will get two different outputs:


    ![](img/9f2174949e81804f7192ec47968e0efb_78_0.png)


    But the strings are immutable, meaning we cannot change the individual characters
    from the strings. We know that in Python the strings can be accessed by their
    indexes, for example, if I want to access the first letter of the my_text, I need
    to use the index zero (0) like this:


    ![](img/9f2174949e81804f7192ec47968e0efb_79_0.png)


    Great! We got the expected result but can I change the first character to a new
    character like this:


    ```

    python

    my_text[0] = ''K''

    print(my_text)

    ```


    If we run this code, we will get a TypeError saying we cannot assign a new value
    to string item:


    ![](img/9f2174949e81804f7192ec47968e0efb_79_1.png)


    As we can see from the figure above, string immutability is not possible because
    we cannot change the value of individual characters once created. The individual
    characters are assigned with indexes and stored in the memory. The only way we
    can do this is to completely reassign a new value to the my_text variable. The
    Python interpreter will remove the old content from the memory and add new content
    and that is why reassigning is possible. To summarize, we cannot reassign part
    of the string like individual characters because the Strings in Python are immutable,
    but we can assign a new value to the existing string because Python completely
    deletes the old string from memory.


