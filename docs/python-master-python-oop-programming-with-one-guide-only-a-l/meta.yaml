    \n## Python 中的类和对象是什么？\n\n你需要理解这两个关键词：类和对象/实例。类是创建对象的蓝图或模板。当我们创建类时，我们定义一组将代表该类基础的属性和方法。类的方法就像函数，属性就像变量。对象将使用类模板，因此它可以访问类中属性和方法的副本。\n\
    \n到目前为止的关键字：\n\n- 类\n- 对象\n- 属性\n- 方法\n\n从上图中，我们有几个新关键字需要解释。在左侧，我们有一个类，它代表了我们想要创建的东西，以及我们希望这个类拥有什么样的属性和方法。所以，它是一个蓝图或模板。在右侧绿色背景的部分，有对象。当我们想要从特定类创建一个对象时，我们需要实例化那个类。我们创建的对象被称为类实例，我们可以创建任意数量的实例。如果你学过其他面向对象语言，那么你应该熟悉这种语法，因为它们都共享相同或相似的语法：\n\
    \n```\n# 类模板\nclass StudentObj:\n    pass\n```"
