    Last name: {self.personality}\\n\"\n              f\"gender: {self.gender}\\n\"\
    )\n```\n\n```python\n# 子类对象\n\nmorgan = Child('Morgan', 'cheeky', 'male')\nmorgan.child_info()\n\
