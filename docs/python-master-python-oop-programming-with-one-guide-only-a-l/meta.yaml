  mdcn: "## 错误处理\n\n让我们测试一下，如果函数的第二个参数为零会发生什么：\n\n```\nresult = div_numbers(10, 0)\n\
    print(result)\n```\n\n这将导致解释器抛出一个 `ZeroDivisionError`：\n\n这意味着我们需要处理这个错误，但与其编写多个\
    \ **except** 块，不如这样做：\n\n```\nexcept (TypeError, ZeroDivisionError) as err:\n\
    \    print(f'We got an error: {err}')\n```\n\n输出结果将是：\n\n以下是现在的完整代码：\n\n```\n\
    # Error Handling\n\ndef div_numbers(a, b):\n    try:\n        return a / b\n\n\
    \    except (TypeError, ZeroDivisionError) as err:\n        print(f'We got an\
    \ error: {err}')\n\nresult = div_numbers(10, 0)\nprint(result)\n```\n\n## Finally\
    \ 块\n\n我们已经了解了 try-except-else 块，但在处理异常时，我们还可以使用一个额外的块。这个块称为 **finally**，它会在其他所有操作完成后执行。以下是一个\
    \ try-catch-else-finally 块的示例：\n\n```\n# Error Handling finally\n\ntry:\n    number\
    \ = int(input('Enter a number: _'))\n    number >= 3\nexcept (TypeError, ValueError)\
    \ as err:\n    print(f'Something went wrong: {err}')\nelse:\n    print(f'Everything\
    \ is ok and the result'\n          f' is {number * 3}')\nfinally:\n    print(\"\
    The try-except block is finished\")\n```\n\n如果我们使用字符串而不是数字来运行它，那么 except 块应该会运行并处理错误：\n\
    \n```\n/Users/rick/PycharmProjects/chapter7.1-errors/venv/bin/python /Users/rick/PycharmProjects/chapter7.1-errors/finally.py\n\
    Enter a number: not a number\nSomething went wrong: invalid literal for int()\
    \ with base 10: 'not a number'\nThe try-except block is finished\n```\n\n但即使在出错的情况下，我们也可以看到\
    \ finally 块被执行了，并且打印出了其中的消息。finally 关键字块用于定义一个代码块，该代码块会在 try-except-else 块完成后运行。无论前面块中发生了什么，我们放在\
    \ finally 块中的任何代码都会执行。\n\n## 抛出异常\n\n有时，作为开发者，你需要在代码中出现特定条件时抛出异常，而 Python 允许我们使用\
    \ `raise` 关键字抛出自己的异常。请看下面的例子：\n\n```python\n# Error Handling finally\n\ntry:\n\
    \    number = int(input('Enter a number: _ '))\n    if number < 0:\n        raise\
    \ Exception('Enter a number bigger than zero')\n    number >= 3\nexcept (TypeError,\
    \ ValueError) as err:\n    print(f'Something went wrong: {err}')\nelse:\n    print(f'Everything\
    \ is ok and the result'\n          f' is {number * 3}')\nfinally:\n    print(\"\
    The try-except block is finished\")\n```\n\n正如你从 if 语句中看到的，我们手动抛出了一个带有消息的异常。如果我们用\
    \ -1 来运行相同的代码，将会得到如下结果：\n\n从上图中，我们可以看到 **finally** 语句在最后被执行了。如果我们不想让错误像这样显示，我们可以通过在\
    \ **except 块**中添加 **Exception** 来捕获这个错误：\n\n```python\nexcept (TypeError, ValueError,\
    \ Exception) as err:\n    print(f'Something went wrong: {err}')\n```\n\n如果我们再次使用值\
    \ -1 运行相同的代码，将会得到以下输出：\n\n很好！现在我们知道如何抛出自己的错误或异常了。如果我们把它们列在 except 块中，我们可以抛出任何特定的内置\
    \ Python 错误，比如 TypeError。这就是我想在本章教给你的所有内容，你应该知道，在任何编程中错误都是不可避免的，但一个优秀的程序员会知道如何处理这些错误，而不会使应用程序崩溃。\n\
    \n## 总结\n\n恭喜你！每当我完成最后一章时，我总是有些伤感。错误处理是一个非常重要的概念，而大多数时候它都被程序员忽视了，这就是为什么我决定将其作为最后一章。我们在本书中做了很多工作，我们从零开始，我猜你们大多数人一开始对\
    \ Python 一无所知，但现在已经不是这样了。从这里开始，你的道路将非常简单，因为你已经有了足够的知识来继续学习新的、更高级的 Python 特性。这是我的第一本关于\
    \ Python 的书，我希望你喜欢它，因为很快我将宣布我的第二本书，它将比这本高级得多。在导言章节中，我提到过需要你在任何社交媒体上与我联系，因为我经常会把我的书的价格降到一美元以下，这样每个人基本上都可以免费获得。在说再见之前，我希望你看看下面的“项目”部分，并尝试自己编写一些编码挑战。我们一起经历了一段有趣的旅程，现在是时候各自前行了。\n\
    \n## 项目\n\n在本节中，我们将有一些项目，这些项目将帮助你理解 Python 的工作原理。你应该尝试自己编写编码挑战，但如果你做不到，也没问题，因为最终代码将在附录部分提供。请仔细阅读项目说明，并尝试编写代码：\n\
    \n### 项目1：猜随机数\n\n这个项目是一个你需要用 Python 编写的小型交互式游戏。电脑将生成一个 1 到 10 之间的随机数，用户将有 3 次尝试机会来猜测它。在每次尝试中，程序必须引导用户，并在随机数高于或低于电脑生成的随机数时提供最少的提示信息。这是用户在三次尝试内未能猜中数字时的输出：\n\
    \n这是用户猜中数字时的输出：\n\n### 编程提示\n\n编写这个程序有多种方法，没有完美的解决方案。这意味着每个人都可以提出不同的有效解决方案。我提供的以下提示将包含最终代码的一些片段，因此你可以更改我创建的任何变量，并按你想要的方式命名它们。我之前提到过，这个问题没有单一的解决方案。第一个提示是你需要导入一个能帮助你生成随机数的模块。该模块名为\
    \ **random**，这是来自 Python 文档的链接，它将解释如何使用此模块（你需要阅读文档中 **Functions for integers**\
    \ 部分）：\n\n[https://docs.python.org/3/library/random.html](https://docs.python.org/3/library/random.html)\n\
    \n第二个提示是使用 input 函数，以便用户可以输入数字，但要小心，因为用户的输入不会是数字形式，它们始终是字符串。这意味着需要将用户输入从字符串转换为整数。第三个提示是使用一个\
    \ while 循环来统计用户尝试猜测随机数的次数。在 while 循环之前，你需要某种计数器变量，如下所示：\n\n```python\nnumber_of_guesses\
    \ = 1\n```\n\n这个变量将是 while 循环中的实际条件：\n\n```\nwhile number_of_guesses < 3:\n```\n\
    \n在 while 循环内部，你需要将 `number_of_guesses` 变量增加 1，以便它能跟踪用户尝试猜测数字的次数。内部将有几个 if 语句，例如，一个用于判断用户输入的数字是否大于电脑生成的随机数：\n\
    \n```\nif player_number > the_number:\n```\n\n你还需要另一个 if 语句来检查相反的情况。在 if 语句内部，你需要打印一条消息，说明用户接下来应该做什么，并再次使用\
    \ input 函数提示用户输入一个新数字。每次失败后，我们需要给用户一个再次输入数字的机会，因此 input 函数是必不可少的。最终的第三个 if 语句应该用于判断用户输入的数字是否与电脑生成的随机数相同。在这种情况下，你应该使用以下语句之一（请思考当用户猜对数字时，你应该使用哪个语句）：\n\
    \n- Break\n- Pass\n- Continue\n\n在 while 循环之后，你可以有另一个 if-else 语句，其中你说明用户猜了多少次数字，或者如果用户没有猜中数字，你需要打印出随机数是什么。如果你无法自己解决，答案将在附录A，项目1：猜随机数解决方案中。"
