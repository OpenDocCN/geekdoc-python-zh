    \n面向对象编程非常有用，因为我们编写一段代码，就可以通过创建不同的类和这些类的实例来重用该代码。这些类中的每一个都可以添加新功能，而无需编写、更改或修改现有代码。复杂的程序需要我们使用类和对象，因为我们可以创建多个可管理的代码块。\n\
    \n## 面向对象编程的原则\n\n以下原则通常适用于所有面向对象编程语言。\n\n- 抽象\n- 封装\n- 继承\n- 多态\n\n## 其他哪些语言支持面向对象编程？\n\
