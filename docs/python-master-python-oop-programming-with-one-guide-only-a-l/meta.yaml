    \ exercise\ndirty_list = [1, 2, 3, 2, 4, 1, 5, 6, 5, 5, 7, 8, 1, 9, 10, 9, 8,\
    \ 3];\n```\n\n## Solution:\n\nAs we can see from the list above, a few items are\
    \ repeated so we need to create a new list and call it **clean_list**. Hint, there\
