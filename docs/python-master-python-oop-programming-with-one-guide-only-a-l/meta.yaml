- img_proc: true
  md: "```\npython\n#nonlocal\ndef outer_fn():\n    x = \"John\"\n    def inner_fn():\n\
    \        nonlocal x\n        x = \"hello\"\n    inner_fn()\n    return x\n\nprint(outer_fn())\n\
    ```\n\n```\n\nhello\n```\n\nWe can use the non-local keyword like the one on line\
    \ five so we can work with variables that are declared in the outer functions.\
    \ We use the nonlocal keyword to declare that the variable is not local for that\
    \ function, meaning it belongs to the functions that are one level up. When the\
    \ Interpreter sees the nonlocal ‘x’, it will automatically know that we don’t\
    \ want to create another local variable for that function but to use the variable\
    \ that is declared in the outer function. The outer function is the parent of\
    \ the inner function. On line five, the non-local variable value will be ‘John’\
    \ which comes from line three of the **outer_fn** body. Line six is where we overwrite\
    \ the value of x from ‘John’ to ‘hello.’ This will modify the value of **x** for\
    \ the **outer_fn** and when we return the **x**, the value will be ‘hello.’ What\
    \ do you think will happen if we remove line number five? It will print John because\
    \ the x will become a local variable for the inner_fn() that will never be used\
    \ anywhere. The yellow underline in Python occurs when we assign a variable but\
    \ never use it, it’s like a soft warning."
