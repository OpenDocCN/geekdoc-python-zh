  md: '# # Why Object-Oriented Programming?


    Object-Oriented Programming is very useful because we can write a piece of code
    and reuse that code by creating different Classes and instances of these classes.
    Each of these Classes can add new features without having to write/change or modify
    the existing code. The complex programs require us to use Classes and Objects
    because we can create multiple manageable chunks of code.


    # # The Principles of Object-Oriented programming


    The following principles are generally applicable to all Object-Oriented Programming
    languages.


    +   - Abstraction

    - Encapsulation

    - Inheritance

    - Polymorphism


    # # What other languages support Object Oriented Programming?


    The oldest and most well-known object-oriented language is Java. Then there is
    C# which is another OOP language developed by Microsoft. Some of the more famous
    OOP languages are PHP, Ruby, TypeScript, and Python.


