    ## Booleans in Python (data type)


    Boolean is another data type in Python. The Boolean in Python represents only
    one of the two possible values: True or False. The Boolean is not unique to Python,
    we have Boolean in almost all programming languages. This allows us to set a variable
    to be True or False like in the following example:


    ```

    # Boolean True or False

    is_true = True

    print(is_true)


    is_false = False

    print(is_false)

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_91_0.png)


    The power of Boolean will be seen when we learn how to make decisions in Python.
    The decision statements like the if-statements have a condition and that condition
    will always be evaluated to Boolean True or False. We can also evaluate an expression
    to Boolean like in this example:


    ```

    #compare values

    print(2 > 1)

    print(10 == 10)

    print(10 < 6)

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_91_1.png)


    This topic will be explored more in one of the future sections. Let’s run this
    example and see the outputs it creates:


    ```

    print(bool(0))

    print(bool(1))

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_92_0.png)


    Boolean zero(0) will return False and Boolean 1 will return True. The Boolean
    function will convert the integer values to either True or False and it will be
    discussed in more detail in the conditional logic section.


