  md: "```\npython\nimport bcrypt\n\n# register new teacher\ndef teacher_register(user_name,\
    \ user_lastname, password):\n    # try - except block\n    try:\n        password_hashed\
    \ = hash_password(password)\n        with open('teachers.txt', mode='a') as new_text_file:\n\
    \            new_text_file.write(f'{user_name}, {user_lastname}, {password_hashed},\
    \ \\n')\n        return f'{user_name} , Your registration is successful, go back\
    \ and log in!'\n    except FileNotFoundError as err:\n        print('File cannot\
    \ be found!')\n\n# hashing function\ndef hash_password(user_password):\n    #\
    \ encode the password\n    bytePwd = user_password.encode('utf-8')\n    # Generate\
    \ salt\n    mySalt = bcrypt.gensalt()\n    # Hash password\n    user_password_hashed\
    \ = bcrypt.hashpw(bytePwd, mySalt)\n    return user_password_hashed\n\n```"
