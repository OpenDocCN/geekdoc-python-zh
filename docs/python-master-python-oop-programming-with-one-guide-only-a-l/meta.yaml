    \ lists\ntwo_dimensional = [\n    [1, 2, 3],\n    [3, 4, 5]\n]\nprint(two_dimensional[0])\n\
    print(two_dimensional[1])\n```\n\n**Console:**\n\n[1, 2, 3]\n[3, 4, 5]\n>>>\n\n\
    If we want to get an element from some of the inner lists, we can use the double\
    \ square brackets [] []. The first bracket will receive an index that will indicate\
    \ which of the inner list we are trying to access and in the second bracket, we\
    \ pass the index of the individual list item:\n\n```python\n#first inner list\
