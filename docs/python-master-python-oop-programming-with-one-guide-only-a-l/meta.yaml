- md: "## MRO – Method Resolution Order\n\nWhen we are dealing with multiple inheritance,\
    \ we can run into problems. That is why I mentioned that multiple inheritance\
    \ is not a feature that all OOP programming languages support because they want\
    \ to avoid complexity. For example, we have class A that inherits from two other\
    \ classes, B and C, and this is the exact same scenario we had with the ‘Child,\
    \ Father, and Mother’ classes in the previous section. But imagine that both of\
    \ these classes (B and C) inherit from a fourth-class D. Let us have a look at\
    \ the following figure:\n\n![](img/9f2174949e81804f7192ec47968e0efb_376_0.png)\n\
    \nI know this figure is confusing so let me explain what is happening. The two\
    \ classes, B and C, inherit from the Parent class, D, where we have a method called\
    \ info(). Because of the inheritance, this method is now available in classes\
    \ B and C. Class A on the other hand inherits all of the functionalities from\
    \ classes B and C. When we instantiate the class A and call the info() method,\
    \ where will this method come from? Will it come from class B or class C? This\
    \ is decided by the linearization algorithm. The MRO (Method Resolution Order)\
    \ is an algorithm that will decide how the classes are ordered and from which\
    \ class to use the method. So, the linearization will create a list of all ancestor\
    \ classes including the class itself and it will order them by putting the first\
    \ as closest and the last as furthest. In simple terms, the MRO is a rule that\
    \ Python will follow to determine which object to call first. Okay let’s create\
    \ a new example where we can see how the MRO algorithm works:\n\n```python\n#\
    \ MRO - Method Resolution Order\n\n# class A\n\nclass A:\n    def __init__(self,\
    \ length=5):\n        self.length = length\n\n    def info(self):\n        return\
    \ self.length\n\n\nclass B(A):\n    pass\n\n\nclass C(A):\n    def __init__(self,\
    \ length=2):\n        self.length = length\n\n    def info(self):\n        return\
    \ self.length\n\n\nclass D(B, C):\n    pass\n\n# instance of class D\nd_ob1 =\
    \ D()\nprint(d_ob1.info())\n```\n\nIf we sketch this entire relationship, we will\
    \ end up with this drawing:\n\n![](img/9f2174949e81804f7192ec47968e0efb_378_0.png)\n\
    \nIf we create an instance of the D class and call the info method, what will\
    \ be the output?\n\n```python\n# instance of class D\nd_ob1 = D()\nprint(d_ob1.info())\n\
    ```\n\nThe output will be 2 and not 5, why is this? Well, because the job of the\
    \ MRO algorithm is not going to follow our human logic and it will not go clockwise\
    \ and get the method from class A directly:\n\n![](img/9f2174949e81804f7192ec47968e0efb_379_0.png)\n\
    \nSo MRO will consider what is first in line when we have methods or attributes\
    \ that have the same name. It will consider the classes from which the inheritance\
    \ should happen first:\n\n![](img/9f2174949e81804f7192ec47968e0efb_379_1.png)\n\
    \nIn Python, there is a method called mro() that will tell us the exact order\
    \ that the algorithm will use so all we need to do is to type:\n\n```python\n\
    print(D.mro())\n```\n\nOutput:\n\n![](img/9f2174949e81804f7192ec47968e0efb_380_0.png)\n\
    \nFrom the figure above, we can see the algorithm order. First, it will check\
    \ if the info method is in class D, then it will go to the B class and check,\
    \ then C, then A, and finally the base Object class that each of the classes inherits\
    \ from. The Method Resolution Order is not easy to understand in more complex\
    \ scenarios. Can you guess the following output:\n\n```python\nclass First:\n\
    \    pass\n\nclass Second:\n    pass\n\nclass Third:\n    pass\n\nclass Fourth(First,\
    \ Second):\n    pass\n\nclass Fifth(Second, Third):\n    pass\n\nclass Sixth(Fifth,\
    \ Fourth, Third):\n    pass\n```\n\n```python\nprint(Sixth.mro())\n```\n\nThe\
    \ diagram of this relationship:\n\n![](img/9f2174949e81804f7192ec47968e0efb_381_0.png)\n\
    \nHere is the output (please try and guess the output):\n\n```\n[<class '__main__.Sixth'>,\
    \ <class '__main__.Fifth'>, <class '__main__.Fourth'>, <class '__main__.First'>,\
    \ <class '__main__.Second'>, <class '__main__.Third'>, <class 'object'>]\n```\n\
    \nWhy did the MRO visit the Sixth then the Fifth and not the Fourth class in the\
    \ figure above? Well, because for MRO, the order we are passing the classes is\
    \ important. Look at the last line of code:\n\n```python\nclass Sixth(Fifth, Fourth,\
    \ Third):\n```\n\nFrom the code above, the order starts with Fifth, then Fourth,\
    \ and then Third. But from the figure above, we can see that it starts with Sixth,\
    \ then it goes to Fifth and Fourth, but instead of going to Third, it goes directly\
    \ to First, Second, and finally Third. This is happening because of one algorithm\
    \ the MRO uses called **Depth First Search** but this is a more advanced concept\
    \ and it’s not in the scope of this book. The algorithm for MRO is not the same\
    \ one that was used in the previous versions of Python.\n\n## Summary\n\nThis\
    \ chapter was packed with information and new concepts. I know this was the hardest\
    \ chapter so far for some of you. My recommendation for you is to not get discouraged\
    \ because I can assure you if you keep practicing and reading, you will learn\
    \ all of the OOP features. Take your time, read some of the sections again and\
    \ never give up. Let’s get ready for our new chapter called modules and I promise,\
    \ the hardest features are already covered.\n\n## Chapter 5 – Python – Modules\
    \ and Packages\n\nIn this chapter, we will learn all about Python modules and\
    \ packages. A Python module is simply a file that contains Python code. Inside\
    \ a module, we can define classes, functions, and variables. In a module, we organize\
    \ related code. So far, we have organized and grouped the code in a few different\
    \ ways. The first way is to use files so here are a few of the files I have created\
    \ in the previous chapter:"
  mdcn: "## MRO – 方法解析顺序\n\n在处理多重继承时，我们可能会遇到问题。这就是为什么我提到多重继承并非所有面向对象编程语言都支持的特性，因为它们希望避免复杂性。例如，我们有一个类\
    \ A，它继承自另外两个类 B 和 C，这与上一节中我们看到的“子类、父类和母类”场景完全相同。但想象一下这两个类（B 和 C）都继承自第四个类 D。让我们看一下下面的图示：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_376_0.png)\n\n我知道这张图令人困惑，所以让我解释一下发生了什么。类\
    \ B 和类 C 都继承自父类 D，其中我们有一个名为 `info()` 的方法。由于继承关系，这个方法现在在类 B 和类 C 中都可用。另一方面，类 A\
    \ 继承了类 B 和类 C 的所有功能。当我们实例化类 A 并调用 `info()` 方法时，这个方法来自哪里？它来自类 B 还是类 C？这由线性化算法决定。MRO（方法解析顺序）是一种算法，它将决定如何排列类以及使用哪个类的方法。因此，线性化将创建一个包含所有祖先类（包括类本身）的列表，并通过将最靠近的放在前面、最远离的放在后面来排序。简单来说，MRO\
    \ 是 Python 遵循的一条规则，用于确定首先调用哪个对象。好的，让我们创建一个新的例子来看看 MRO 算法是如何工作的：\n\n```python\n\
    # MRO - Method Resolution Order\n\n# class A\n\nclass A:\n    def __init__(self,\
    \ length=5):\n        self.length = length\n\n    def info(self):\n        return\
    \ self.length\n\n\nclass B(A):\n    pass\n\n\nclass C(A):\n    def __init__(self,\
    \ length=2):\n        self.length = length\n\n    def info(self):\n        return\
    \ self.length\n\n\nclass D(B, C):\n    pass\n\n# instance of class D\nd_ob1 =\
    \ D()\nprint(d_ob1.info())\n```\n\n如果我们勾勒出整个关系，最终会得到这张图：\n\n![](img/9f2174949e81804f7192ec47968e0efb_378_0.png)\n\
    \n如果我们创建一个 D 类的实例并调用 `info` 方法，输出会是什么？\n\n```python\n# instance of class D\nd_ob1\
    \ = D()\nprint(d_ob1.info())\n```\n\n输出将是 2 而不是 5，为什么呢？嗯，这是因为 MRO 算法的工作原理不会遵循我们人类的逻辑，它不会顺时针从类\
    \ A 直接获取方法：\n\n![](img/9f2174949e81804f7192ec47968e0efb_379_0.png)\n\n因此，当我们有同名的方法或属性时，MRO\
    \ 将考虑哪个在先。它将考虑应该首先从哪个类继承：\n\n![](img/9f2174949e81804f7192ec47968e0efb_379_1.png)\n\
    \n在 Python 中，有一个名为 `mro()` 的方法，它会告诉我们算法将使用的精确顺序，所以我们需要做的就是输入：\n\n```python\nprint(D.mro())\n\
    ```\n\n输出：\n\n![](img/9f2174949e81804f7192ec47968e0efb_380_0.png)\n\n从上图中，我们可以看到算法的顺序。首先，它会检查\
    \ `info` 方法是否在类 D 中，然后进入类 B 并检查，接着是类 C，然后是类 A，最后是每个类都继承的基础 Object 类。方法解析顺序在更复杂的场景中并不容易理解。你能猜出下面的输出吗：\n\
    \n```python\nclass First:\n    pass\n\nclass Second:\n    pass\n\nclass Third:\n\
    \    pass\n\nclass Fourth(First, Second):\n    pass\n\nclass Fifth(Second, Third):\n\
    \    pass\n\nclass Sixth(Fifth, Fourth, Third):\n    pass\n```\n\n```python\n\
    print(Sixth.mro())\n```\n\n这种关系的图示：\n\n![](img/9f2174949e81804f7192ec47968e0efb_381_0.png)\n\
    \n以下是输出（请尝试猜测输出）：\n\n```\n[<class '__main__.Sixth'>, <class '__main__.Fifth'>,\
    \ <class '__main__.Fourth'>, <class '__main__.First'>, <class '__main__.Second'>,\
    \ <class '__main__.Third'>, <class 'object'>]\n```\n\n为什么 MRO 在上图中先访问 Sixth 然后\
    \ Fifth 而不是 Fourth 类？嗯，因为对于 MRO 来说，我们传递类的顺序很重要。看看代码的最后一行：\n\n```python\nclass\
    \ Sixth(Fifth, Fourth, Third):\n```\n\n从上面的代码来看，顺序从 Fifth 开始，然后是 Fourth，最后是 Third。但从上图中，我们可以看到它从\
    \ Sixth 开始，然后到 Fifth 和 Fourth，但它没有进入 Third，而是直接进入 First、Second，最后是 Third。这是因为\
    \ MRO 使用的一种叫做**深度优先搜索**的算法造成的，但这是一个更高级的概念，不在本书的范围内。MRO 的算法与 Python 以前版本中使用的不同。\n\
    \n## 总结\n\n本章包含大量信息和新概念。我知道对你们中的一些人来说这是迄今为止最困难的一章。我的建议是不要气馁，因为我可以向你保证，只要你持续练习和阅读，你将学会所有的面向对象特性。慢慢来，重新阅读某些章节，永不放弃。让我们准备好进入名为“模块”的新章节，我承诺，最困难的部分已经涵盖。\n\
    \n## 第5章 – Python – 模块与包\n\n在本章中，我们将学习关于 Python 模块和包的所有内容。Python 模块只是一个包含 Python\
    \ 代码的文件。在模块内部，我们可以定义类、函数和变量。在模块中，我们组织相关的代码。到目前为止，我们已经以几种不同的方式组织和分组了代码。第一种方式是使用文件，所以这里是我上一章创建的一些文件："
