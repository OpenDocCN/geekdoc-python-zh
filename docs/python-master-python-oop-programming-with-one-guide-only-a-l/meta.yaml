    \ will explain how to use this module (the most important part for you to read\
    \ in the **Functions for integers** from the documentation):\n\n[https://docs.python.org/3/library/random.html](https://docs.python.org/3/library/random.html)\n\
    \nThe second hint is to use the input function so the user can enter a number\
    \ but be careful because the user inputs will not be in a number form, they are\
    \ always Strings. This means that the user input needs to be converted from String\
    \ to Integer. The third hint is to use a while loop that will count how many times\
    \ the user has attempted to guess the random number. Before the while loop, you\
    \ need some sort of counter variable like this:\n\n```python\nnumber_of_guesses\
    \ = 1\n```\n\nThis variable will be the actual condition in the while loop:\n\n\
    ```\nwhile number_of_guesses < 3:\n```\n\nInside the while loop, you need to increment\
