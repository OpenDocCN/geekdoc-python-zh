    \nFrom the figure, I have used the key ‘Model’ instead of the key ‘model’ in all\
    \ lowercase letters. This will throw a KeyError because there is no key in the\
    \ dictionary named ‘Model’.\nThe next error is called ZeroDivisionError and this\
    \ will happen when we try to divide a number with zero, and for some of you, this\
