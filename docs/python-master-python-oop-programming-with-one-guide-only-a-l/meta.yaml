- md: "## Error Handling\n\nLet's test what will happen if the second parameter in\
    \ the function is zero:\n\n```\nresult = div_numbers(10, 0)\nprint(result)\n```\n\
    \nThis will make the Interpreter throw a ZeroDivisionError:\n\nThis means that\
    \ we need to handle this error but instead of writing multiple **except** blocks,\
    \ let's do this instead:\n\n```\nexcept (TypeError, ZeroDivisionError) as err:\n\
    \    print(f'We got an error: {err}')\n```\n\nThe output will be:\n\nHere is the\
    \ entire code now:\n\n```\n# Error Handling\n\ndef div_numbers(a, b):\n    try:\n\
    \        return a / b\n\n    except (TypeError, ZeroDivisionError) as err:\n \
    \       print(f'We got an error: {err}')\n\nresult = div_numbers(10, 0)\nprint(result)\n\
    ```\n\n## Finally block\n\nWe have seen the try-except-else block but there is\
    \ one more block we can use when we are dealing with exceptions. This block is\
    \ called **finally** and it will run at the end after everything else has been\
    \ completed. Here is one example of try-catch-else-finally block:\n\n```\n# Error\
    \ Handling finally\n\ntry:\n    number = int(input('Enter a number: _'))\n   \
    \ number >= 3\nexcept (TypeError, ValueError) as err:\n    print(f'Something went\
    \ wrong: {err}')\nelse:\n    print(f'Everything is ok and the result'\n      \
    \    f' is {number * 3}')\nfinally:\n    print(\"The try-except block is finished\"\
    )\n```\n\nIf we run this with a string instead of a number, then the except block\
    \ should run and handle the errors:\n\n```\n/Users/rick/PycharmProjects/chapter7.1-errors/venv/bin/python\
    \ /Users/rick/PycharmProjects/chapter7.1-errors/finally.py\nEnter a number: not\
    \ a number\nSomething went wrong: invalid literal for int() with base 10: 'not\
    \ a number'\nThe try-except block is finished\n```\n\nBut even in a case of an\
    \ error, we can see that the finally block is executed and the message it’s printed.\
    \ The finally keyword-block is used to define a block of code that will run when\
    \ the try-except-else block is finished. Whatever code we have in the finally\
    \ block will run no matter what we have in the previous blocks.\n\n## Raise an\
    \ Exception\n\nSometimes as a developer, you need to throw an exception if a specific\
    \ condition occurs in your code and Python allows us to raise our own exception\
    \ using the keyword raise. Please consider the following example:\n\n```python\n\
    # Error Handling finally\n\ntry:\n    number = int(input('Enter a number: _ '))\n\
    \    if number < 0:\n        raise Exception('Enter a number bigger than zero')\n\
    \    number >= 3\nexcept (TypeError, ValueError) as err:\n    print(f'Something\
    \ went wrong: {err}')\nelse:\n    print(f'Everything is ok and the result'\n \
    \         f' is {number * 3}')\nfinally:\n    print(\"The try-except block is\
    \ finished\")\n```\n\nAs you can see in the if-statement, we manually raise an\
    \ exception with a message. If we run the same code with -1, this is what we will\
    \ get:\n\nFrom the figure above, we can see that the **finally**-statement is\
    \ executed at the end. If we don’t want the error to be like this, then we can\
    \ list this error in the **except-block** by adding **Exception**:\n\n```python\n\
    except (TypeError, ValueError, Exception) as err:\n    print(f'Something went\
    \ wrong: {err}')\n```\n\nAnd if we run the same code again with a value of -1,\
    \ we will get the following output:\n\nGreat! Now we know how you can raise your\
    \ own errors or Exceptions. We can raise any specific built-in Python errors like\
    \ TypeError if we list them in the except block. This is everything I wanted to\
    \ teach you in this chapter and you should know that errors are inevitable in\
    \ any programming but a good programmer will know how to handle these errors without\
    \ crashing the application.\n\n## Summary\n\nCongratulations! I’m always sad when\
