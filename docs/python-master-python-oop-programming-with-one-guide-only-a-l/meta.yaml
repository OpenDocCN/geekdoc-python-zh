    in the os module); and the new installer variant includes Tcl/Tk 8.6.11 rather
    than 8.6.8.


    On Apple Silicon Macs, it is possible to run Python either with native ARM64 code
    or under Intel 64 emulation using Rosetta2. This option might be useful for testing
    or if binary wheels are not yet available with native ARM64 binaries. To easily
    force Python to run in emulation mode, invoke it from a command line shell with
    the python3-intel64 command instead of just python3.


    # Other changes


    For other changes in this release, see the What''s new section in the Documentation
    Set for this release and its Release Notes link at https://www.python.org/downloads/.


    +   * Print...

    * Save...

    * Go Back

    * Continue


    Continue by clicking on the ‘Continue’ button and ‘Agree’ with the license, then
    select the disk where you want the installation to happen:'
- md: "## Install Python\n\n### Select a Destination\n\n- Introduction\n- Read Me\n\
    - Licence\n- Destination Select\n- Installation Type\n- Installation\n- Summary\n\
    \nSelect the disk where you want to install the Python software.\n\n![](img/9f2174949e81804f7192ec47968e0efb_246_0.png)\n\
    \nInstalling this software requires 153.9 MB of space.\n\nYou have chosen to install\
    \ this software on the disk \"Macintosh HD\".\n\nAnd then it will finally give\
    \ you the option to install Python:\n\n![](img/9f2174949e81804f7192ec47968e0efb_247_0.png)\n\
    \nIt will ask for your password or fingerprint so provide your details and you\
    \ are done with this process:\n\n![](img/9f2174949e81804f7192ec47968e0efb_247_1.png)\n\
    \nFinally, after a while if the installation is successful, you will see this\
    \ window:\n\n![](img/9f2174949e81804f7192ec47968e0efb_248_0.png)\n\nClick the\
    \ ‘close’ button and you have now installed the latest version of Python on your\
    \ macOS. If the installation was successful, we can close the previous terminal\
    \ window or we can even type exit() and press return. Next is to check the latest\
    \ version by typing ‘python:’\n\n![](img/9f2174949e81804f7192ec47968e0efb_248_1.png)\n\
    \nThis was probably not the window you expected to see but this is normal when\
    \ it comes to installing Python, the installations are tricky, so type exit():\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_249_0.png)\n\nFinally, we can try again\
    \ but this time type python3 instead of python and hit return or enter:\n\n![](img/9f2174949e81804f7192ec47968e0efb_249_1.png)\n\
    \nGreat! After providing the version number of Python, we have success. In the\
    \ future, we might even need to type python4 in order to see if the latest version\
    \ was successfully installed. If for some reason you still cannot install Python,\
    \ then I suggest opening the following link:\nhttps://osxdaily.com/2018/06/13/how-install-update-python-3x-mac/\n\
    \n### Windows OS Python installation\n\nTo start the installation process, you\
    \ need to open the python.org website on your computer:\nhttps://www.python.org/\n\
    \nSelect the downloads tab and click on Python version 3.10.5 so it can start\
    \ downloading the Python file. It should recognize your machine operating system\
    \ version. In my case, it’s a 64-bit system but you might have another version\
    \ like 32-bit. If there is an option to choose, make sure the system version you\
    \ select is the right one based on your computer configuration.\n\nImportant,\
    \ Python 3.10 version cannot be used on Windows 7 or earlier versions. The Python\
    \ version number is currently 3.10.5 but when you read this book the numbers might\
    \ be different and this is normal as new versions tend to pop up pretty fast.\
    \ You should not worry because it will not change the installation process:\n\n\
    ![](img/9f2174949e81804f7192ec47968e0efb_250_0.png)\n\nAfter downloading the file,\
    \ you can find it in your downloads folder so click on the file so you can start\
    \ the installation:\n\n![](img/9f2174949e81804f7192ec47968e0efb_251_0.png)\n\n\
    Make sure you select the last two options, the first one should be preselected\
    \ but the second one saying ‘Add Python 3.10 to PATH.’ It is very important to\
    \ select this before you start the installation. Click the install now and follow\
    \ the setup wizard:\n\n![](img/9f2174949e81804f7192ec47968e0efb_251_1.png)\n\n\
    Make sure you allow the app to make changes to your device so click yes and the\
    \ installation should start immediately; after a while, you should see the following\
    \ window:\n\n### Setup was successful\n\nNew to Python? Start with the [online\
    \ tutorial](https://docs.python.org/3/tutorial/) and [documentation](https://docs.python.org/3/).\
    \ At your terminal, type \"py\" to launch Python, or search for Python in your\
    \ Start menu.\n\nSee [what's new](https://docs.python.org/3/whatsnew/3.10.html)\
    \ in this release, or find more info about [using Python on Windows](https://docs.python.org/3/using/windows.html).\n\
    \n> Disable path length limit\nChanges your machine configuration to allow programs,\
    \ including Python, to bypass the 260 character \"MAX_PATH\" limitation.\n\n![](img/9f2174949e81804f7192ec47968e0efb_252_0.png)\n\
    \nClick on the close button and find the command prompt. If you have an older\
    \ version of Windows, you can search for it or if you have the latest version\
    \ like me, you can click on the start Windows icon and type 'Command Prompt' in\
    \ the search bar:\n\n![](img/9f2174949e81804f7192ec47968e0efb_253_0.png)\n\nThis\
    \ will open the command prompt where you should type ‘python’ and press enter:\n\
    \n```\n\nMicrosoft Windows [Version 10.0.22000.739]\n(c) Microsoft Corporation.\
    \ All rights reserved.\n\nC:\\Users\\riste>python\nPython 3.10.5 (tags/v3.10.5:f377153,\
    \ Jun  6 2022, 16:14:13) [MSC v.1929 64 bit (AMD64)] on win32\nType \"help\",\
    \ \"copyright\", \"credits\" or \"license\" for more information.\n>>> _\n\n```\n\
    \nNow we can see that Python version 3.10.5 has been successfully installed and\
    \ working. In Windows, we can even use PowerShell. PowerShell is even more preferable\
    \ among developers because the same commands that work on Linux and Mac machines\
    \ work here as well. So just like we searched for the command prompt, we can search\
    \ for Windows PowerShell:\n\n### Windows PowerShell\n\n- All\n- Apps\n- Documents\n\
    - Web\n- More\n\n- Windows PowerShell\n  - App\n- Windows Defender Firewall\n\
    \  - Control panel\n- Apps\n- Windows Media Player\n- Windows Fax and Scan\n-\
    \ Windows Tools\n- Windows PowerShell ISE\n\n- Windows PowerShell\n  - App\n \
    \ - Open\n  - Run as Administrator\n  - Run ISE as Administrator\n  - Windows\
    \ PowerShell ISE\n\nWe can open the PowerShell and this is what it will look like:\n\
    \n```\nWindows PowerShell\nCopyright (C) Microsoft Corporation. All rights reserved.\n\
    \nInstall the latest PowerShell for new features and improvements! https://aka.ms/PSWindows\n\
    \nPS C:\\Users\\riste>\n```\n\nAs you can see, I need to update the PowerShell\
    \ version as well, but if you haven’t got PowerShell on your Windows machine,\
    \ I suggest you download it because you will be able to use the same commands\
    \ I use on my Mac. Type Python on the PowerShell and press enter and you should\
    \ see the same version number of Python that we just installed:\n\n![](img/9f2174949e81804f7192ec47968e0efb_257_0.png)\n\
    \nAnother way to run Python code on your Windows is to install Git Bash or Git\
    \ for Windows. This is basically a BASH emulation, which is a shell that will\
    \ allow you to use UNIX commands:\n\n![](img/9f2174949e81804f7192ec47968e0efb_257_1.png)\n\
    \nTo summarize, in order to run Python, you can use the Command Prompt, PowerShell,\
    \ or Git Bash. I recommend sticking to PowerShell if you are a Windows user and\
    \ updating it if you need to. Now the option we checked to add the PATH allows\
    \ us to run the Python command in PowerShell. The Python installation was super\
    \ important and now in the next sections, we will learn how to install different\
    \ tools so we can write and execute Python code.\n\n> Windows announced you can\
    \ install Windows terminal if you use Windows 10 or later. This will allow you\
    \ to use the exact same commands as other Linux and Mac users.\n\nInstall and\
    \ get started setting up Windows terminal by clicking this link and following\
    \ the steps:\n\n[https://docs.microsoft.com/en-us/windows/terminal/install](https://docs.microsoft.com/en-us/windows/terminal/install)\n\
    \n### LINUX user only - Python Installation\n\nIf you are a Linux user, then you\
    \ can read the following resources on how to install Python:\n\nDirect link to\
    \ download the Python:\n\n[https://www.python.org/](https://www.python.org/)\n\
    \nFor some installation issues:\n\n[https://realpython.com/installing-python/](https://realpython.com/installing-python/)\n\
    \nThe Installation Guide:\n\n[https://realpython.com/installing-python/](https://realpython.com/installing-python/)\n\
    \n## Developer Tools\n\nSo far, we executed our code on the website called replit.com\
    \ but we want to be able to use some tools to run and write Python code. In the\
    \ previous section, we saw that we can use the Command Prompt on Windows and the\
    \ Terminal on Mac to run Python code. In the Terminal or Command Prompt, we run\
    \ simple scripts that we want to test quickly but developers will use either Code\
    \ Editors or IDEs to write and execute Python code. You can write the code in\
    \ any text/code editor or even in a word document but we don’t have the same feeling\
    \ that we are writing code, it is like we are writing a piece of text and we can\
    \ easily make mistakes because of the spelling and indentation. We know that proper\
    \ indentation is very important in Python so no to the word documents. Therefore,\
    \ a professional developer will need some tools like code editors:\n\n- Sublime\n\
    - Atom\n- VS Code\n- Vim\n\nWe can even use IDEs like:\n\n- Spyder\n- PyCharm\n\
    - Thonny"
  mdcn: "## 安装 Python\n\n### 选择目标位置\n\n-   简介\n-   自述文件\n-   许可证\n-   选择目标位置\n-  \
    \ 安装类型\n-   安装\n-   总结\n\n选择你希望安装 Python 软件的磁盘。\n\n![](img/9f2174949e81804f7192ec47968e0efb_246_0.png)\n\
    \n安装此软件需要 153.9 MB 的空间。\n\n你已选择将此软件安装在名为“Macintosh HD”的磁盘上。\n\n然后，最终它会给你安装 Python\
    \ 的选项：\n\n![](img/9f2174949e81804f7192ec47968e0efb_247_0.png)\n\n它将要求你输入密码或进行指纹识别，请提供你的详细信息，然后你就完成了此过程：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_247_1.png)\n\n最后，稍等片刻，如果安装成功，你将看到此窗口：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_248_0.png)\n\n点击“关闭”按钮，现在你已经在 macOS\
    \ 上安装了最新版本的 Python。如果安装成功，我们可以关闭之前的终端窗口，或者甚至可以输入 `exit()` 并按回车键。接下来是通过输入 `python:`\
    \ 来检查最新版本：\n\n![](img/9f2174949e81804f7192ec47968e0efb_248_1.png)\n\n这可能不是你期望看到的窗口，但在安装\
    \ Python 时这是正常的，安装过程可能比较复杂，所以请输入 `exit()`：\n\n![](img/9f2174949e81804f7192ec47968e0efb_249_0.png)\n\
    \n最后，我们可以再次尝试，但这次输入 `python3` 而不是 `python`，然后按回车或回车键：\n\n![](img/9f2174949e81804f7192ec47968e0efb_249_1.png)\n\
    \n太好了！在提供了 Python 版本号后，我们成功了。将来，我们可能需要输入 `python4` 来查看最新版本是否已成功安装。如果由于某种原因你仍然无法安装\
    \ Python，我建议打开以下链接：\nhttps://osxdaily.com/2018/06/13/how-install-update-python-3x-mac/\n\
    \n### Windows 操作系统 Python 安装\n\n要开始安装过程，你需要在电脑上打开 python.org 网站：\nhttps://www.python.org/\n\
    \n选择下载选项卡，然后单击 Python 版本 3.10.5，以便开始下载 Python 文件。它应该会识别你的操作系统版本。在我的情况下，它是一个 64\
    \ 位系统，但你可能有其他版本，例如 32 位。如果有选择选项，请确保你选择的系统版本与你的计算机配置匹配。\n\n重要提示，Python 3.10 版本不能在\
    \ Windows 7 或更早版本上使用。Python 版本号目前是 3.10.5，但当你阅读本书时，数字可能会有所不同，这是正常的，因为新版本往往会很快出现。你不必担心，因为这不会改变安装过程：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_250_0.png)\n\n下载文件后，你可以在下载文件夹中找到它，因此请单击该文件以开始安装：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_251_0.png)\n\n请确保选择最后两个选项，第一个选项应该已被预选，但第二个选项“将\
    \ Python 3.10 添加到 PATH”非常重要。在开始安装之前，请务必选中此选项。单击“立即安装”并按照安装向导操作：\n\n![](img/9f2174949e81804f7192ec47968e0efb_251_1.png)\n\
    \n请确保你允许该应用对你的设备进行更改，因此单击“是”，安装应立即开始；稍等片刻，你应该会看到以下窗口：\n\n### 安装成功\n\nPython 新手？请从\
    \ [在线教程](https://docs.python.org/3/tutorial/) 和 [文档](https://docs.python.org/3/)\
    \ 开始。在终端中，输入 `py` 来启动 Python，或在开始菜单中搜索 Python。\n\n查看此版本的 [新增功能](https://docs.python.org/3/whatsnew/3.10.html)，或查找更多关于\
    \ [在 Windows 上使用 Python](https://docs.python.org/3/using/windows.html) 的信息。\n\n\
    > 禁用路径长度限制\n更改你的机器配置，以允许程序（包括 Python）绕过 260 个字符的 “MAX_PATH” 限制。\n\n![](img/9f2174949e81804f7192ec47968e0efb_252_0.png)\n\
    \n单击“关闭”按钮并找到命令提示符。如果你有较旧版本的 Windows，你可以搜索它；或者如果你像我一样拥有最新版本，你可以单击 Windows 开始图标，然后在搜索栏中输入“命令提示符”：\n\
    \n![](img/9f2174949e81804f7192ec47968e0efb_253_0.png)\n\n这将打开命令提示符，你应该在其中输入 `python`\
    \ 并按回车键：\n\n```\nMicrosoft Windows [Version 10.0.22000.739]\n(c) Microsoft Corporation.\
    \ All rights reserved.\n\nC:\\Users\\riste>python\nPython 3.10.5 (tags/v3.10.5:f377153,\
    \ Jun  6 2022, 16:14:13) [MSC v.1929 64 bit (AMD64)] on win32\nType \"help\",\
    \ \"copyright\", \"credits\" or \"license\" for more information.\n>>> _\n\n```\n\
    \n现在我们可以看到 Python 3.10.5 版本已成功安装并正在运行。在 Windows 中，我们甚至可以使用 PowerShell。PowerShell\
    \ 在开发者中甚至更受欢迎，因为在 Linux 和 Mac 上运行的相同命令在这里也可以运行。所以就像我们搜索命令提示符一样，我们可以搜索 Windows\
    \ PowerShell：\n\n### Windows PowerShell\n\n-   所有\n-   应用\n-   文档\n-   网页\n- \
    \  更多\n\n-   Windows PowerShell\n    -   应用\n-   Windows Defender 防火墙\n    - \
    \  控制面板\n-   应用\n-   Windows Media Player\n-   Windows 传真和扫描\n-   Windows 工具\n\
    -   Windows PowerShell ISE\n\n-   Windows PowerShell\n    -   应用\n    -   打开\n\
    \    -   以管理员身份运行\n    -   以管理员身份运行 ISE\n    -   Windows PowerShell ISE\n\n我们可以打开\
    \ PowerShell，它看起来会是这样的：\n\n```\nWindows PowerShell\n版权所有 (C) Microsoft Corporation。保留所有权利。\n\
    \n安装最新的 PowerShell 以获取新功能和改进！ https://aka.ms/PSWindows\n\nPS C:\\Users\\riste>\n\
    ```\n\n如你所见，我还需要更新 PowerShell 版本，但如果你的 Windows 机器上没有 PowerShell，我建议你下载它，因为你将能够使用我在\
    \ Mac 上使用的相同命令。在 PowerShell 中输入 Python 并按回车键，你应该会看到我们刚刚安装的相同版本号的 Python：\n\n![](img/9f2174949e81804f7192ec47968e0efb_257_0.png)\n\
    \n在 Windows 上运行 Python 代码的另一种方法是安装 Git Bash 或 Git for Windows。这本质上是一个 BASH 仿真，它是一个允许你使用\
    \ UNIX 命令的 shell：\n\n![](img/9f2174949e81804f7192ec47968e0efb_257_1.png)\n\n总结一下，为了运行\
    \ Python，你可以使用命令提示符、PowerShell 或 Git Bash。我建议 Windows 用户坚持使用 PowerShell，并在需要时进行更新。现在我们勾选的添加\
    \ PATH 选项允许我们在 PowerShell 中运行 Python 命令。Python 的安装非常重要，现在在接下来的部分中，我们将学习如何安装不同的工具，以便我们可以编写和执行\
    \ Python 代码。\n\n> Windows 宣布，如果你使用 Windows 10 或更高版本，可以安装 Windows 终端。这将允许你使用与其他\
    \ Linux 和 Mac 用户完全相同的命令。\n\n通过单击此链接并按照步骤操作来安装并开始设置 Windows 终端：\n\n[https://docs.microsoft.com/en-us/windows/terminal/install](https://docs.microsoft.com/en-us/windows/terminal/install)\n\
    \n### 仅限 LINUX 用户 - Python 安装\n\n如果你是 Linux 用户，那么你可以阅读以下关于如何安装 Python 的资源：\n\n\
    直接链接下载 Python：\n\n[https://www.python.org/](https://www.python.org/)\n\n针对一些安装问题：\n\
    \n[https://realpython.com/installing-python/](https://realpython.com/installing-python/)\n\
    \n安装指南：\n\n[https://realpython.com/installing-python/](https://realpython.com/installing-python/)\n\
    \n## 开发工具\n\n到目前为止，我们是在名为 replit.com 的网站上执行代码，但我们希望能够使用一些工具来运行和编写 Python 代码。在上一节中，我们看到可以在\
    \ Windows 上使用命令提示符，在 Mac 上使用终端来运行 Python 代码。在终端或命令提示符中，我们运行想要快速测试的简单脚本，但开发者将使用代码编辑器或\
    \ IDE 来编写和执行 Python 代码。你可以在任何文本/代码编辑器甚至 Word 文档中编写代码，但我们无法感受到正在编写代码的那种感觉，这就像在写一段文本，我们很容易因为拼写和缩进而犯错。我们知道在\
    \ Python 中正确的缩进非常重要，所以不要用 Word 文档。因此，专业的开发者需要一些工具，比如代码编辑器：\n\n-   Sublime\n- \
    \  Atom\n-   VS Code\n-   Vim\n\n我们甚至可以使用 IDE，例如：\n\n-   Spyder\n-   PyCharm\n\
    -   Thonny"
