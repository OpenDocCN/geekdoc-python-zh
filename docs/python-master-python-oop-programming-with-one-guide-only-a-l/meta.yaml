    \n![](img/9f2174949e81804f7192ec47968e0efb_102_0.png)\n\n重要的是要知道，这个方法将通过在末尾添加新元素来修改现有数组。\n\
    \n### insert() 方法\n\n此方法将在列表中的指定位置插入一个新元素。这意味着我们需要提供我们希望插入新项目的位罝/索引。例如，让我们在`my_list`的末尾添加元素`'five'`：\n\
    \n```python\n# 2 插入\nmy_list.insert(4,'five')\nprint(my_list)\n```\n\n```python\n\
    # 1 追加\nmy_list = ['one','two','three'];\nmy_list.append('four')\n# 2 插入\nmy_list.insert(4,'five')\n\
    print(my_list)\n```\n\n输出:\n\n['one', 'two', 'three', 'four', 'five']\n\n`insert`方法，就像`append`方法一样，将在指定索引处向列表添加一个新元素，并将修改原始列表。\n\
    \n### extend() 方法\n\n此方法接受一个可迭代对象作为参数。可迭代对象意味着我们可以迭代或循环遍历的东西。`extend`方法的工作方式是将可迭代对象中的所有项目附加到原始列表的项目中。我知道这听起来很困惑，但这里有一个例子：\n\
    \n```python\n# 3 扩展\nmy_list.extend(['six','seven'])\nprint(my_list)\n```\n\n\
    ```python\n# 1 追加\nmy_list = ['one','two','three'];\nmy_list.append('four')\n\
