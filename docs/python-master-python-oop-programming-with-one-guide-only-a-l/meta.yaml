    \ %\n```\n\n如果我们返回到VS Code编辑器并使用内置终端，你应该会看到这个输出：\n\n![](img/9f2174949e81804f7192ec47968e0efb_426_0.png)\n\
    \nVS Code终端也能正常工作。基本上，这就是我想向你展示的关于如何在Python Package Index网站上查找、安装和运行包的内容。最后，如果你想卸载一些已安装的包，可以使用命令pip3\
    \ uninstall加包名。例如，如果你想完全卸载之前的包，可以使用以下任一命令：\n\n```\npip uninstall pyjokes\n```\n\
    \n或者，如果你只使用pip命令：\n\n```\npip3 uninstall pyjokes\n```\n\n如果出于某种原因你想安装包的特定版本，只要你知道版本号，也可以从终端完成。大多数包会有不同的版本号，比如pyjokes有0.6.0，这被称为版本控制，因为每个新版本都会带来一些新内容，也许0.5.0版本中发现了某个bug，他们在0.6.0新版本中进行了修正和更新。因此，版本号是有意义的，而不仅仅是随机数字。如果你需要安装不同版本的包，可以这样做：\n\
    \n```\npip3 install pyjokes==0.5.0\n```\n\n这将安装pyjokes的上一个版本。你也可以使用以下命令列出所有已安装的包：\n\
    \n```\npip3 list\n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_427_0.png)\n\
    \n## 总结\n\n本章是我最喜欢的章节之一，因为我们学习了很多关于模块和包的知识。我希望到现在你能看到Python的真正威力，因为无论你是一位多么出色的开发者或程序员，如果没有社区的支持，你将很难脱颖而出。在下一章中，我们将重点讲解文件的读写操作。"
