    When naming a variable, it is important to always come up with a good name that
    is descriptive so that everyone can understand what the variable is about. Python
    is case sensitive language meaning the variable user_name is different variable
    from the variable user_Name.


    In Python, we can use two naming conventions:


    - Camel case

    - Snake case


    The camel case naming convention is noticeable when we are using compound words
    to create one variable name. For example, I would like to have a variable name
    that consists of these two words (first, name). The camel case rule is that the
    first word starts with a lowercase letter and then for every other word the first
    letter should be uppercase:


    ```

    #camel case notation

    firstName = ''Jason''

    ```


    The other convention I will use is the snake case where we use underscore to separate
    the words. Let us rewrite the camel case firstName variable to the snake case:


    ```

    # snake case notation

    first_name = ''Jason''

    ```


    You can use any of the naming notations you want but I would suggest picking only
    one and sticking to it. It is bad practice to use both naming conventions in one
