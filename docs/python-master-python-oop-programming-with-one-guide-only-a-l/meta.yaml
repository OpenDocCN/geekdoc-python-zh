    - 函数声明\n- 函数调用\n- 函数调用或函数调用\n- 函数实参\n- 函数形参\n- 定义一个函数\n\n我希望你现在意识到，函数可以根据我们提供的参数进行一些计算。我们可以用不同的参数调用同一个函数，输出总会不同：\n\
