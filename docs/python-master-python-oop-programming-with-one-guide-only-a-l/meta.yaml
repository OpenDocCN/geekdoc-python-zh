    \ sure the line after the if is_developer is always indented because the Python\
    \ Interpreter relies on indentation to determine the scope of the code or where\
    \ the code belongs. If we don’t have a proper indentation, it will throw an error.\
    \ In JavaScript, the same if-statement can be written like this:\n\n```\nIf(is_developer){\n\
    \    console.log('Wow this must be super exciting!');\n}\n```\n\nIn JavaScript,\
    \ we use curly brackets to define the scope or the body but if we have only one\
    \ line of code, the curly brackets can be omitted. Let’s get back to Python if-statement.\
    \ How does this statement actually work? Basically, after the ‘if’ keyword we\
    \ need to set the condition and it can be very simple like in our example, or\
    \ much more complex. The condition must be evaluated to True in order to execute\
    \ the statement/statements in the body. The body is the statement/statements that\
    \ go right below the if-statement and it must be indented to indicate that the\
    \ body belongs to the above if-statement. Now when the interpreter reads the first\
    \ line with the if keyword, it will check if the variable is_developer is True,\
    \ and in our case, the is_developer will always be True because we initialized\
    \ the variable before the if-statement. Because the condition is true, the interpreter\
    \ will know that next it should go into the body and execute the statement. In\
    \ our case, we have only one print() function in the body but as I mentioned,\
    \ we can have multiple lines of code/statements. When the interpreter executes\
    \ the statement/statements in the body, after that, it will exit the if-block.\
    \ Let us add one more line after the if-block but this time without indentation\
    \ and run this code in:\n\n```\n# If statements\nis_developer = True\nif is_developer:\n\
    \    print('Wow this must be super exciting!')\nprint('New line')\n```\n\nThe\
    \ second print() does not have an indentation and this will tell the Python interpreter\
    \ that the second print() function does not belong in the if code block. Notice\
    \ that in line two from the figure above, next to the if keyword there is a black\
