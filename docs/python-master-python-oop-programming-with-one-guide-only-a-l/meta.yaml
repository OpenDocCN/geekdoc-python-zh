    \n正如我们在例子中看到的，可迭代对象是一个包含两个项目的列表，它被称为可迭代对象是因为我们可以使用循环（将在本章后面部分介绍）来循环或迭代这个列表。\n\n\
    ### pop() 方法\n\n此方法将从列表末尾移除一个项目，如果我们对现有列表执行此操作，它将弹出/移除项目`'seven'`\n\n```python\n\
    # 4 弹出\nmy_list.pop()\nprint(my_list)\n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_104_0.png)\n\
    \n如果我们想从列表中移除特定项目，我们可以使用要移除项目的索引调用`pop()`方法，例如，假设我们想移除第一个项目，并且我们知道这个项目的索引将是零：\n\
    \n```python\n# 移除第一个项目\nmy_list.pop(0)\nprint(my_list)\n```"
