    ## Python IN Keyword


    Just like the built-in functions and methods in Python, we have reserved keywords
    as well. These keywords are known as identifiers and cannot be used as ordinary
    identifiers. The keywords must be spelled exactly as they are. In this section,
    we will talk about the keyword ‘in’ which is very useful because it has many applications.
    The ‘in’ reserved keyword can be used with Strings like this:


    ```

    python

    # In Keyword with Strings

    long_string = ''Andy is 5 years old!''

    print(''5'' in long_string)

    ```


    ![](img/9f2174949e81804f7192ec47968e0efb_89_1.png)


    This keyword has many purposes and one of them is to check if the part of a string
    is present in the sequence. We are trying to find if ‘5’ is present in the long_string
    sequence of characters. As we can see, the value ‘5’ is present and therefore
    it returns the output True. This value ‘True’ belongs to another data type in
    Python called Boolean. We will cover this data type in the next section. Here
    is a list of reserved keywords in Python:


    ## 2.3.1 Keywords


    The following identifiers are used as reserved words, or *keywords* of the language:


    - and

    - del

    - from

    - not

    - while

    - as

