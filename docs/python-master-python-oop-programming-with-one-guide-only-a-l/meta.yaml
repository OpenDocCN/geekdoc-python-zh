    \n- Learn PyCharm:\nhttps://www.jetbrains.com/pycharm/learn/\n\n- PyCharm Guide:\n\
    https://www.jetbrains.com/pycharm/guide/\n\n## Summary\n\nIn this chapter, you\
    \ have learned a lot. We started by installing Python on different operating systems\
    \ and then we installed different programming tools. We have installed the VS\
    \ Code editor which is one of the best code editors in the market, but if you\
    \ don’t like editors then I have provided the best IDE for Python called PyCharm.\
    \ You don’t have to use them both, it is up to you to decide which one is the\
    \ best for you. Everything you have learned in this chapter will make you a better\
    \ Python developer. We shouldn't forget to mention that you have learned the importance\
    \ of having clean and formatted code and together with the terminal commands,\
    \ you are now becoming a professional developer.\n\n# Chapter 4 – Object Oriented\
    \ Programming – Advanced Python\n\nPython is an Object-Oriented Programming language.\
    \ This term is used by many other languages and it’s fundamental. It’s so important\
    \ to understand the concept of having Objects because in Python everything can\
    \ be considered as an Object. OOP languages are organized around Objects and these\
    \ Objects can be created and modified during runtime. We will learn where these\
    \ Objects come from in the next sections but each object is known as an instance\
    \ of a class. The Classes in OOP are the templates that allow us to create objects.\
    \ In this chapter, we will learn what OOP is and what its most important features\
    \ are.\n\n## Class keyword\n\nIn the previous chapter, we have seen the keyword\
    \ ‘class’ when we tried to confirm the data type using the function type():\n\n\
    The class keyword is everywhere in Python. I mentioned that everything in Python\
    \ can be considered an Object. Each object has access to properties, methods,\
    \ and attributes. The Classes in Python will allow us to create objects, so they\
    \ are a blueprint for creating objects. This means that the classes can help us\
    \ create new Objects and expand the initial list of data types. This also means\
    \ that we can get creative and create our own data types that are different from\
    \ the built-in ones. This chapter will help you to gain an in-depth understanding\
    \ of these concepts. Therefore, Object-Oriented Programming is the most fundamental\
    \ paradigm. Before Object-Oriented Programming, our code was a list of procedures\
    \ where each procedure was executed in a specific order but this was changed when\
    \ OOP was introduced. Please note that you can continue using replit.com to run\
    \ the code that we are going to cover in this chapter or you can use some of the\
    \ tools we have installed in the previous chapter. To put your curiosity at ease,\
    \ let’s start learning OOP.\n\n## Why Object-Oriented Programming?\n\nObject-Oriented\
    \ Programming is very useful because we can write a piece of code and reuse that\
    \ code by creating different Classes and instances of these classes. Each of these\
    \ Classes can add new features without having to write/change or modify the existing\
    \ code. The complex programs require us to use Classes and Objects because we\
    \ can create multiple manageable chunks of code.\n\n## The Principles of Object-Oriented\
    \ programming\n\nThe following principles are generally applicable to all Object-Oriented\
    \ Programming languages.\n\n- Abstraction\n- Encapsulation\n- Inheritance\n- Polymorphism\n\
    \n## What other languages support Object Oriented Programming?\n\nThe oldest and\
    \ most well-known object-oriented language is Java. Then there is C# which is\
    \ another OOP language developed by Microsoft. Some of the more famous OOP languages\
    \ are PHP, Ruby, TypeScript, and Python.\n\n## How can we create Classes in Python?\n\
    \nIn order to create a class, we need to use the keyword `class`, and then we\
    \ should provide the class name.\n\nExample:\n\n```\nclass Student:\n```\n\nAs\
    \ you can see, the Class name starts with a capital letter and this is a naming\
    \ convention that you should get used to it. Another rule is that the class name\
    \ should be singular, for example, you should not name your classes like this\
    \ ‘class Students.’ If the class name needs to consist of two words then you should\
    \ use the following convention:\n\n```\nclass StudentObj:\n```\n\nAs we can see,\
    \ each of the words starts with a capital letter, which is different compared\
    \ to the snake case we used so far. The snake case is used to join multiple words\
    \ with underscore like student_obj. After the Class name, we have a colon ( :\
    \ ) and here we will need to write the class body. But before we do this, let’s\
    \ create an Object for this class. If we leave the code like this, it will throw\
    \ an error so let’s add the ‘pass’ keyword and create our first Object.\n\nOn\
    \ the right side of the figure, we have the output where we have the type class\
    \ and ignore the ‘main’ keyword for now because we will explain what it means\
    \ in future sections.\n\n## What are Classes and Objects in Python?\n\nYou need\
    \ to understand these two keywords Classes and Objects/instances. The Classes\
    \ are the blueprint or templates for creating Objects. When we create Classes,\
    \ we define a set of properties and methods that will represent the base of that\
    \ class. The methods of the Class are like the functions and the properties are\
    \ like variables. The Objects will use the class template so it can access a copy\
    \ of the properties and methods from the Class.\n\nKeywords so far:\n\n- Classes\n\
    - Objects\n- Properties\n- Methods.\n\nFrom the figure above, we have a few new\
    \ keywords that I need to explain. On the left side, we have a Class and this\
    \ represents what we want the create, and what kind of properties and methods\
    \ we want that Class to have. So, it is a blueprint or template. On the right\
    \ side with green background color, we have the Objects. When we want to create\
    \ an Object from a particular Class, we need to instantiate that class. The Objects\
    \ we are creating are called Class Instances and we can create as many instances\
    \ as we want. If you have learned other OOP languages, then you are familiar with\
    \ this syntax because they all share the same or similar syntax:\n\n```\n# class\
    \ template\nclass StudentObj:\n    pass\n```"
