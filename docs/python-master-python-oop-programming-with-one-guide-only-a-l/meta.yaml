  md: "# # While Loop\n\nIn Python, we have two primitive loops, one is the for-loop\
    \ we have already discussed and the second one is the while loop. With the while\
    \ loop, we can execute a set of statements as long as the condition we set in\
    \ the while loop is evaluated to True.\n\nSyntax:\n\n```\nwhile test_expression:\n\
    \    Body of while\n```"
  merge: -1
  pgno: 193
- img_proc: true
  md: "The syntax of the while loop is very basic and if you understood how the for-loop\
    \ works, the while loop will be much easier to understand. So why do we need the\
    \ while loop when we have the for-loop? Well, we can use this loop when we don’t\
    \ know the exact number of times we need to iterate or loop. The condition in\
    \ the while loop is evaluated at the beginning before the loop can start. The\
    \ body of the while loop will be executed only if the condition is True. It is\
    \ important to know that after each iteration, the test expression (condition)\
    \ is checked again. This loop will stop when the expression evaluates to False.\
    \ The body of the while-loop in Python is determined by indentation and in other\
    \ programming languages, this can be done using curly brackets like in JavaScript.\
    \ Let’s go over this example:\n\n```\n# while loop\n\n# calc sum up to this number\n\
    the_number = 10\n# initialize sum and counter\nthe_sum = 0\ni = 1\n\nwhile i <=\
    \ the_number:\n    the_sum = the_sum + i\n    i = i + 1  # update/increment the\
    \ counter\n\n# print the sum\nprint('The sum is: ', the_sum)\n```"
  merge: -1
  pgno: 194
- img_proc: true
  md: "```\n# while loop\n\n# calc sum up to this number\nthe_number = 10\n# initialize\
    \ sum and counter\nthe_sum = 0\ni = 1\n\nwhile i <= the_number:\n    the_sum =\
    \ the_sum + i\n    i = i + 1  # update/increment the counter\n\n# print the sum\n\
    print('The sum is: ', the_sum)\n\nConsole Output:\nThe sum is: 55\n```\n\nFrom\
    \ the figure above, we can see that test expression i <= the_number will be True\
    \ as long as the counter variable ‘i’ is less than or equal to the_number (10\
    \ in our case). We need to find a way to increase the counter after each iteration\
    \ because if we don’t do this, the test expression will always be true and we\
    \ will create an infinite loop that will block our machine (please be careful).\
    \ Therefore, after the sum calculation, in the body of the while loop, we increase\
    \ the value of the counter variable ‘i’ by one. When the value of ‘i’ becomes\
    \ 11, then the test expression will be evaluated to False and that will terminate\
    \ the while loop. Another interesting feature that I want to share is the ‘break’\
    \ statement. This is our way of stopping the while loop and forcing the loop to\
    \ terminate or stop its execution. We can break from the while loop before the\
    \ while condition is evaluated to False like this:"
  merge: -1
  pgno: 195
- img_proc: true
  md: "![](img/9f2174949e81804f7192ec47968e0efb_196_0.png)\n\nAs you can see, when\
    \ the counter ‘i’ reaches the number 7, the if condition inside the while loop\
    \ will be evaluated to True and the break statement will terminate the loop. That\
    \ is why the rest of the numbers (8,9,10) will never be printed. I have also used\
    \ the augmented operator (+=) syntax or shorter syntax to increase the counter\
    \ by one. The while loop can be combined with an else clause if we want the else\
    \ clause to be executed at the end when the condition in the while loop becomes\
    \ False:\n\n```\npython\n# else clause statement\nj = 0\nwhile j <= 10:\n    print(j)\n\
    \    j += 1\nelse:\n    print('This means the while condition is false')\n\nprint('This\
    \ line is outside the while loop')\n\n```"
