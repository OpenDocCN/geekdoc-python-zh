- md: "## The ‘is’ operator versus the ‘==’\n\nAlthough I have included the difference\
    \ between the ‘is’ and ‘==’ in the previous section, I think you deserve to know\
    \ a little bit more. Can you guess the output from the following expression?\n\
    \n```\nprint(True == 1)\n```\n\nThe output will be True, but why? Well, the equality\
    \ operator will check if both of the operands are equal to each other. But here\
    \ we are evaluating two different Data types, Boolean True on the left and Integer\
    \ number on the right. Because they are two different types, the Interpreter will\
    \ try to convert them to the same type. Therefore the integer will be converted\
    \ to Boolean using the bool() function, and bool(1) is evaluated to True:\n\n\
    ```\nprint(True == bool(1))\n```\n\nThe above code is exactly the same as the\
    \ following one:\n\n```\nprint(True == True)\n```\n\nNow you know why `True ==\
    \ 1` is evaluated to True:\n\nLet's check the equality of this code:\n\n```\n\
    #2 checking for equality\nprint('' == 1)\n```\n\nThe output will be False because\
    \ the empty Strings in Python are considered as Falsy value or Boolean False and\
    \ Integer 1 will be evaluated as True, so we are trying to check for equality\
    \ between (False == True) and that is why we got False in the first place:\n\n\
    ```\n#2 checking for equality\nprint('' == 1)\nprint(bool('') == bool(1))\nprint(False\
    \ == True)\n```\n\nWhen we use double equality, the best scenario is to compare\
    \ values that belong to the same data type but if they are different, then let’s\
    \ hope that Python using the truthy and falsy values rules will solve the problem\
    \ for us. Now you know that the equality operator will check for the equality\
    \ of the values. On the other hand, the ‘is’ operator will check if the location\
    \ in memory where the value is stored is exactly the same between both of the\
    \ objects. The ‘is’ operator will not perform type conversion using the bool()\
    \ function. Let’s go over a few more examples and see how the ‘is’ is working\
    \ compared to ==:\n\n```\n# is vs ==\nprint(True is True)\nprint([1, 2] is [1,\
    \ 2])\n```\n\nAnd the output is:\n\n```\n1\n2\n```\n\nThe expression `(True is\
    \ True)` will be evaluated as True because Boolean True values will always have\
    \ only one memory location and it could never be changed regardless of what we\
    \ do in our code. The second print will give us False output, but why? Both Lists\
    \ look the same. Those two Lists have the exact same values but every time a new\
    \ List is created, the values are stored somewhere in the memory in a new location.\
    \ Both Lists are in different locations in memory and although they have the same\
    \ values, they are not the same. Remember Lists are not only data type, they are\
    \ data structures as well. This means more memory is required to store a data\
    \ structure like Lists compared to other data types like Strings, Numbers, and\
    \ Boolean values.\n\nPlease consider the following example:\n\n```\nlist1 = [1,2]\n\
    list2 = list1\nprint(list1 is list2)\n```\n\nThe output will be True. The `list1`\
    \ is created and the values are stored somewhere in the memory in some location.\
    \ In the next line, we are saying that `list2` is equal to `list1`. This simply\
    \ means that `list2` will not create a new memory to store the same values because\
    \ they are already stored by `list1`. Both `list1` and `list2` will point to the\
    \ same values stored in the memory. Now if we change the `list2` and add a new\
    \ item, `list1` will also be affected because they both points to the same values\
    \ stored in the memory:\n\n```\nlist1 = [1,2]\nlist2 = list1\nprint(list1 is list2)\n\
    list2.append(3)\nprint(list1)\nprint(list2)\n```\n\nI hope you now understand\
    \ the difference between the ‘is’ operator and the ‘==’ operator.\n\n## Membership\
    \ Operators\n\nIn Python, we use the membership operator to test if an item is\
    \ present in the object. We have used this ‘in’ keyword in our examples but now\
    \ you know they are called membership operators:\n\n| Operator | Description |\
    \ Example | Output |\n|----------|-------------|---------|--------|\n| in    \
    \   | This will return true only if the sequence with the specified value is found\
    \ in the object | # in<br>a = [\"first\", \"second\"]<br>print(\"second\" in a)\
    \ | True, because the ‘second’ is present in the list |\n| not in   | This will\
    \ return true only if the sequence with the specified value is not found in the\
    \ object | # not in<br>a = [\"first\", \"second\"]<br>print(\"third\" not in a)\
    \ | True, because the item ‘three’ is not found or present in the list |\n\n##\
    \ Python Loops\n\nHere comes one of the most interesting features of any programming\
    \ language in general. So far, we have covered control structures and operators\
    \ that will direct the order of execution of the statements. Loops are very powerful\
    \ because based on a specified condition we can make a program to execute a block\
    \ of code over and over as long as the condition is True. This is very powerful\
    \ because we can run these loops as many times as we need, and the machines are\
    \ not going to be tired of repeating the same instructions because they are not\
    \ humans. Loops are one of the most essential features you should know. One of\
    \ the loops we are going to learn is called a ‘for’ loop and in order to create\
    \ one, we need to use the ‘for’ keyword.\n\nHere is the for-loop syntax:\n\n```\n\
    for val in sequence:\n    loop body\n```\n\nIn the syntax above, we have used\
    \ the ‘for’ keyword which is a must and after the for-keyword, we have a variable\
    \ name. The variable name can be any name you want but should be appropriate for\
    \ the loop. Then we have the ‘in’ keyword and sequence of items. The variable\
    \ ‘val’ which can be called ‘item’ will be created for each item in the sequence.\
    \ Remember we mentioned in the previous chapter that Strings or Lists are iterable\
    \ sequences. This means we can iterate over each item inside that sequence. Let’s\
    \ do a very basic example where we iterate over a simple sequence of characters\
    \ in the String:\n\nAs you can see, in the above example, I have used ‘char’ as\
    \ the variable name. I decided to name it ‘char’ because it symbolizes each of\
    \ the individual characters in the sequence ‘Your name is?’ And it will print\
    \ each character in the iterable sequence in order. We can loop Lists as well\
    \ using the for-loop:\n\n```\n# Iterate a List\nlist1 = [1, 3, 5, 7, 9]\nfor item\
    \ in list1:\n    print(item)\n```\n\nLet’s check another example where we loop\
    \ over the items in a Set:\n\n```\n# Iterate over a Set\nset1 = {\"apple\", \"\
    banana\", \"cherry\"}\nfor fruit in set1:\n    print(fruit)\n```\n\nWe can loop\
    \ over the Tuples as well:\n\n```\ntuple1 = (\"apple\", \"banana\", \"cherry\"\
    )\nfor fruit in tuple1:\n    print(fruit)\n```\n\nWe can loop over the dictionaries\
    \ as well but we will do this in some of the next sections. As you can see, the\
    \ for-loops syntax is similar to the if-statements. With the for-loops, we can\
    \ loop over a collection of data like lists, strings, tuples, sets, etc. Same\
    \ as the if-statements, we need to use colon ‘:’ after the collection and the\
    \ code needs to be properly indented. The indentation is important because it\
    \ will indicate to the Interpreter that the following code belongs to the for-block.\
    \ It is important to know that when the last item from the collection is reached,\
    \ the loop will terminate and the Interpreter will jump out of the loop and will\
    \ start executing the code that comes after the for-loop. Let’s use the for-loop\
    \ to calculate the sum of all of the items from a list:\n\n```\n# List of numbers\n\
    numbers = [1, 2, 4, 6, 5, 8, 11, 3, 14]\n\n# variable to store the sum\nnumbers_sum\
    \ = 0\n```"
  mdcn: "## ‘is’ 运算符与 ‘==’ 运算符的比较\n\n尽管我在上一节中已经介绍了 ‘is’ 和 ‘==’ 之间的区别，但我觉得你值得了解更多。你能猜出下面表达式的输出结果吗？\n\
    \n```\nprint(True == 1)\n```\n\n输出结果将是 True，但为什么呢？嗯，相等运算符会检查两个操作数是否相等。但这里我们评估的是两种不同的数据类型：左边是布尔值\
    \ True，右边是整数。因为它们是两种不同的类型，解释器会尝试将它们转换为相同的类型。因此，整数将使用 `bool()` 函数转换为布尔值，而 `bool(1)`\
    \ 的计算结果为 True：\n\n```\nprint(True == bool(1))\n```\n\n上面的代码与下面的代码完全相同：\n\n```\n\
    print(True == True)\n```\n\n现在你知道为什么 `True == 1` 的计算结果为 True 了：\n\n让我们检查一下这段代码的相等性：\n\
    \n```\n#2 检查相等性\nprint('' == 1)\n```\n\n输出结果将是 False，因为空字符串在 Python 中被视为假值或布尔值\
    \ False，而整数 1 将被视为 True，所以我们试图检查 (False == True) 的相等性，这就是为什么我们一开始得到 False 的原因：\n\
    \n```\n#2 检查相等性\nprint('' == 1)\nprint(bool('') == bool(1))\nprint(False == True)\n\
    ```\n\n当我们使用双等号时，最好的情况是比较属于相同数据类型的数据，但如果它们不同，那么我们只能希望 Python 使用真值和假值规则来为我们解决问题。现在你知道相等运算符会检查值的相等性。另一方面，‘is’\
    \ 运算符会检查两个对象存储值的内存位置是否完全相同。‘is’ 运算符不会使用 `bool()` 函数执行类型转换。让我们再看几个例子，看看 ‘is’ 与\
    \ == 相比是如何工作的：\n\n```\n# is 与 ==\nprint(True is True)\nprint([1, 2] is [1, 2])\n\
    ```\n\n输出结果是：\n\n```\n1\n2\n```\n\n表达式 `(True is True)` 的计算结果为 True，因为布尔值 True\
    \ 总是只有一个内存位置，无论我们在代码中做什么，它永远不会改变。第二个 print 会给我们 False 的输出，但为什么呢？这两个列表看起来一样。这两个列表具有完全相同的值，但每次创建一个新列表时，值都会存储在内存中的一个新位置。这两个列表在内存中的位置不同，尽管它们具有相同的值，但它们并不相同。请记住，列表不仅是数据类型，它们还是数据结构。这意味着与字符串、数字和布尔值等其他数据类型相比，存储像列表这样的数据结构需要更多的内存。\n\
    \n请考虑以下示例：\n\n```\nlist1 = [1,2]\nlist2 = list1\nprint(list1 is list2)\n```\n\n\
    输出结果将是 True。`list1` 被创建，值存储在内存中的某个位置。在下一行中，我们说 `list2` 等于 `list1`。这仅仅意味着 `list2`\
    \ 不会创建新的内存来存储相同的值，因为它们已经被 `list1` 存储了。`list1` 和 `list2` 都将指向存储在内存中的相同值。现在如果我们修改\
    \ `list2` 并添加一个新项目，`list1` 也会受到影响，因为它们都指向存储在内存中的相同值：\n\n```\nlist1 = [1,2]\nlist2\
    \ = list1\nprint(list1 is list2)\nlist2.append(3)\nprint(list1)\nprint(list2)\n\
    ```\n\n我希望你现在理解了 ‘is’ 运算符和 ‘==’ 运算符之间的区别。\n\n## 成员运算符\n\n在 Python 中，我们使用成员运算符来测试一个项目是否存在于对象中。我们在示例中已经使用过这个\
    \ ‘in’ 关键字，但现在你知道它们被称为成员运算符：\n\n| 运算符 | 描述 | 示例 | 输出 |\n|----------|-------------|---------|--------|\n\
    | in       | 仅当在对象中找到具有指定值的序列时才返回 true | # in<br>a = [\"first\", \"second\"]<br>print(\"\
    second\" in a) | True，因为 ‘second’ 存在于列表中 |\n| not in   | 仅当在对象中未找到具有指定值的序列时才返回\
    \ true | # not in<br>a = [\"first\", \"second\"]<br>print(\"third\" not in a)\
    \ | True，因为项目 ‘three’ 未在列表中找到或不存在 |\n\n## Python 循环\n\n现在我们来介绍任何编程语言中最有趣的功能之一。到目前为止，我们已经介绍了控制结构和运算符，它们将指导语句的执行顺序。循环非常强大，因为根据指定的条件，我们可以让程序只要条件为\
    \ True 就反复执行一段代码。这非常强大，因为我们可以根据需要运行这些循环多次，而机器不会因为重复相同的指令而感到疲倦，因为它们不是人类。循环是你应该知道的最基本的功能之一。我们将要学习的其中一个循环叫做\
    \ ‘for’ 循环，为了创建一个，我们需要使用 ‘for’ 关键字。\n\n以下是 for 循环的语法：\n\n```\nfor val in sequence:\n\
    \    loop body\n```\n\n在上面的语法中，我们使用了 ‘for’ 关键字，这是必须的，在 for 关键字之后，我们有一个变量名。变量名可以是任何你想要的名字，但应该适合循环。然后我们有\
    \ ‘in’ 关键字和项目序列。变量 ‘val’（可以称为 ‘item’）将为序列中的每个项目创建。请记住我们在上一章中提到过，字符串或列表是可迭代序列。这意味着我们可以迭代该序列中的每个项目。让我们做一个非常基础的例子，我们迭代字符串中的一个简单字符序列：\n\
    \n正如你所见，在上面的例子中，我使用了 ‘char’ 作为变量名。我决定将其命名为 ‘char’，因为它象征着序列 ‘Your name is?’ 中的每个单独字符。它将按顺序打印可迭代序列中的每个字符。我们也可以使用\
    \ for 循环来循环列表：\n\n```\n# 迭代列表\nlist1 = [1, 3, 5, 7, 9]\nfor item in list1:\n \
    \   print(item)\n```\n\n让我们看另一个例子，我们循环集合中的项目：\n\n```\n# 迭代集合\nset1 = {\"apple\"\
    , \"banana\", \"cherry\"}\nfor fruit in set1:\n    print(fruit)\n```\n\n我们也可以循环元组：\n\
    \n```\ntuple1 = (\"apple\", \"banana\", \"cherry\")\nfor fruit in tuple1:\n  \
    \  print(fruit)\n```\n\n我们也可以循环字典，但我们将在接下来的某些部分中进行。正如你所见，for 循环的语法类似于 if 语句。使用\
    \ for 循环，我们可以循环遍历数据集合，如列表、字符串、元组、集合等。与 if 语句一样，我们需要在集合后使用冒号 ‘:’，并且代码需要正确缩进。缩进很重要，因为它会向解释器指示以下代码属于\
    \ for 块。重要的是要知道，当到达集合中的最后一个项目时，循环将终止，解释器将跳出循环并开始执行 for 循环之后的代码。让我们使用 for 循环来计算列表中所有项目的总和：\n\
    \n```\n# 数字列表\nnumbers = [1, 2, 4, 6, 5, 8, 11, 3, 14]\n\n# 存储总和的变量\nnumbers_sum\
    \ = 0\n```"
