    \ Paths Read Me!\n```\n\n在 Python 中，自版本 3.4 起，我们有了一个叫做 **pathlib** 的东西，它代表面向对象的文件系统路径。这个库允许我们操作路径，以便我们可以在每个操作系统上使用相同的路径语法。你可以从官方\
    \ Python 文档中阅读更多关于 **pathlib** 及其使用方法：[https://docs.python.org/3/library/pathlib.html](https://docs.python.org/3/library/pathlib.html)\n\
    \n## 用于错误处理的 Try – Except 块\n\nTry – Except 块非常适合捕获和处理 I/O 操作期间可能发生的错误。你想要测试的任何代码都应包装在\
    \ try 块内，而 except 块则是你捕获和处理错误的地方（如果有的话）。在 JavaScript 中，我们有 try-catch 块，它使用完全相同的逻辑。同样的概念也存在于许多其他编程语言中。我创建了另一个名为\
    \ chapter6.2-errors 的文件夹，并在其中复制了 readme.txt 文件和 main.py 文件。现在让我们尝试一下 try-except\
    \ 块：\n\n如上所示，我们正确缩进了所有内容，在 try 块内是我们将始终放置要测试或尝试的代码的地方，而在 except 块内我们将捕获错误，到目前为止我们已经看到当我们尝试打开的文件不存在时会出现\
    \ FileNotFoundError。以下是完整的代码，因为有时图片可能会变得模糊：\n\n```python\n# try - except 块\ntry:\n\
    \    with open('readme1.txt', mode='r') as new_text_file:\n        print(new_text_file.read())\n\
    \nexcept FileNotFoundError as err:\n    print('File cannot be found!')\n```\n\n\
    如果我们运行此文件，解释器将看到我们有一个 try-except 块，它会进入其中并尝试运行代码。如果我们看 open() 方法，我们可以看到文件 readme1.txt\
