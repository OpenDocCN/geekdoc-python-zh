- img_proc: true
  md: '![](img/9f2174949e81804f7192ec47968e0efb_376_0.png)


    I know this figure is confusing so let me explain what is happening. The two classes,
    B and C, inherit from the Parent class, D, where we have a method called info().
    Because of the inheritance, this method is now available in classes B and C. Class
    A on the other hand inherits all of the functionalities from classes B and C.
    When we instantiate the class A and call the info() method, where will this method
    come from? Will it come from class B or class C? This is decided by the linearization
    algorithm. The MRO (Method Resolution Order) is an algorithm that will decide
    how the classes are ordered and from which class to use the method. So, the linearization
    will create a list of all ancestor classes including the class itself and it will
    order'
  merge: -1
