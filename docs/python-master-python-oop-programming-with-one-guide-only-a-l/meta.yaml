  md: '# Operator Precedence


    **Correct Answer:**

    1) 7 - 3 * 2 =

    2) 7 - 6 =

    3) 1


    **Incorrect Answer:**

    1) 7 - 3 * 2 =

    2) 4 * 2 =

    3) 8


    Order of precedence:


    +   1) () – brackets will have the highest precedence; we first calculate whatever
    is wrapped in the brackets

    2) ** – (power of) is done only after the parenthesis ()

    3) * , / – then we perform multiplication and division

    4) + , - The last precedence is the addition and subtraction


    The order of precedence is the same for all programming languages but it is very
    important to know it. Without looking at the answer, please calculate the following
    expression:

    (7 - 3) * 2 + 2**2


    The answer:

    1st) whatever is in brackets (7-3) is done first because of the order of precedence.
    Therefore, the result after subtraction of 7-3 will be 4

    2nd) will be the power operator and the result of 2 ** 2 will be equal to 4

    3rd) will be a multiplication operator that will use the result of the 1st operation
    which is 4 and this will be multiplied by 2 which will give us a result of 8

    4th) Finally, the addition operator takes place and the sum of 8 + 4 is 12


    You can run the following code in replit. Just wrap it around a print function
    so you can see the output:'
