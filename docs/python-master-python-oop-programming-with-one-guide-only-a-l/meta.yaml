  md: "Dunder or magic methods are very important in Python. We have already briefly\
    \ mentioned them but in this section, we will talk about them in more detail.\
    \ One example of the dunder method we have used is the __init__ method or known\
    \ as constructor. The __init__ is a magic method because it will be called automatically\
    \ when an instance(object) from that class is created. Luckily for us, Python\
    \ provides many dunder/magic methods like the len(), print(), and []. They are\
    \ all dunder methods. We have seen from the previous section that when we use\
    \ the dir() function on a class instance, the output will be a list of methods\
    \ inherited from the base Object class:\n\n```\nprint(dir(person_obj))\n```\n\n\
    Output:\n\n```\n['__class__', '__class_getitem__', '__contains__',\n '__delattr__',\
    \ '__delitem__', '__dir__', '__doc__', '__eq__',\n '__format__', '__ge__', '__getattribute__',\
    \ '__getitem__',\n '__gt__', '__hash__', '__init__', '__init_subclass__',\n '__ior__',\
    \ '__iter__', '__le__', '__len__', '__lt__',\n '__ne__', '__new__', '__or__',\
    \ '__reduce__', '__reduce_ex__',\n '__repr__', '__reversed__', '__ror__', '__setattr__',\n\
    \ '__setitem__', '__sizeof__', '__str__', '__subclasshook__',\n 'clear', 'copy',\
    \ 'fromkeys', 'get', 'items', 'keys', 'pop',\n 'popitem', 'setdefault', 'update',\
    \ 'values']\n```\n\nWe said that double underscore is what makes these methods\
    \ be considered as dunder or special but the len() function does not have underscores\
    \ and I stated it is a dunder method. Well, the len() is actually implemented\
    \ with the help of the dunder methods. The len() function will give us the length,\
    \ for example, if we have a list like this:\n\n```\nlist_obj = [1, 3, 5, 7, 9]\n\
    ```\n\nWe can use the len() function to get the list length:"
