  md: "Another statement we can use in our loops is the ‘continue’ statement. When\
    \ we use this statement, we will not exit the loop the way we did with the ‘break’\
    \ statement but we will stop the loop once for the current iteration not the entire\
    \ loop like the ’break statements.’ Let’s use the continue statement to skip the\
    \ iteration when the car brand is equal to ‘bmw’ but we need to continue to iterate\
    \ over the rest of the brands:\n\n```\n# continue\nfor brand in brands:\n    if\
    \ brand == 'bmw':\n        continue\n    print(brand)\nprint('If you read this\
    \ line the loop is finished')\n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_208_0.png)\n\
    \nThe third statement is called ‘pass statement’ and it is rarely used because\
    \ it doesn’t do anything in particular. The pass statement will be used as a placeholder\
    \ for future code. For example, when the pass statement is executed, it will not\
    \ do anything but you can avoid getting an error because an empty code is not\
    \ allowed. I know this is confusing but let’s check the following example:\n\n\
    ```\n#pass\nis_old = True\nif is_old:\n    #no code\nprint('This will give us\
    \ an error')\n```"
