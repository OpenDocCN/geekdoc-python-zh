    \ will return a sequence of numbers that will start from zero (0) by default and\
    \ will increment by 1 until it reaches the end (a specified number we pass into\
    \ the range function). The range function has the following syntax:\n\n```\npython\n\
    range(start, stop, step)\n\n```\n\nAs you can see, the range can take 3 parameters,\
    \ the first one is called start and is optional. This would be an integer number\
    \ to specify the start position. If omitted, the default will be zero (0). The\
    \ second parameter is the ‘stop,’ and this one is required and will be an integer\
    \ number that will specify the end. The final parameter is called ‘step’ and is\
    \ the same as the ‘start’ parameter, this one is optional as well and it will\
    \ specify the step size. The default step size is one. We know that from the parameters\
    \ the one in the middle called stop is required so let’s print what this function\
    \ does when we supply only one parameter:\n\n```\npython\n# range function\nprint(range(10))\n\
    \n```\n\n![](img/9f2174949e81804f7192ec47968e0efb_203_0.png)\n\nFrom the figure\
    \ above we now have a range that starts from zero and ends at ten and although\
    \ we haven’t specified the start, it was added for us. The range() is very popular\
    \ when it’s used in conjunction with loops:\n\n```\npython\n# range() with for-loop\n\
    for number in range(0, 10):\n\n```"
