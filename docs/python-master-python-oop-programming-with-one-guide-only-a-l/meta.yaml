    Index. **PyPi** is a repository of software for Python programming languages that
    helps us to find and install software that has been developed by the Python community.
    Here is the link and screenshot to the actual Python Package Index (PyPi):'
  - '[PAGE 412]


    ![](img/9f2174949e81804f7192ec47968e0efb_412_0.png)


    ![](img/9f2174949e81804f7192ec47968e0efb_412_1.png)


    **The Python Package Index (PyPI) is a repository of software for the Python programming
    language.**


    PyPI helps you find and install software developed and shared by the Python community.
    [Learn about installing packages](url).


    Package authors use PyPI to distribute their software. [Learn how to package your
    Python code for PyPI](url).


    [https://pypi.org/](https://pypi.org/)


    At the moment, we have 611,137 users and over 390,352 projects, and these numbers
    will only grow in the future. This shows you the real power of Python. For example,
    if you want your website to be faster and all the images to be optimized, you
    can search if something like that exists in pypi:'
  - '[PAGE 413]


    ![](img/9f2174949e81804f7192ec47968e0efb_413_0.png)


    You will probably have a list of different projects and all you need to do is
    find a package that suits your project and install it. Not all of the packages
    will be suitable and maintained regularly so you need to decide on which of the
    packages is the best fit for your project. I have shown you these two websites
    (Python Module Index Documentation and PyPi) so you can find modules and packages
    that will help you build your program faster.


    # Install Python Packages using PyPi repository'
  - '[PAGE 414]


    We know that **PyPi** is a repository website where we can find, install, and
    even publish Python packages. Just to give you a demonstration of how to find
    and install a package using PyCharm, I have done a very simple Google search and
    I have found something very interesting. The package that we will install is funny
    but useless, meaning it will only tell us Python jokes and nothing else. There
    are multiple packages like this on Google. When you type Fun/Weird Python Packages,
    you will find very interesting packages and experiments. The package that we are
    going to install is called **pyjokes**. Let us open the website [pypi.org](https://pypi.org/)
    and search for the project called **pyjokes** on the search bar like this:


    ![](img/9f2174949e81804f7192ec47968e0efb_414_0.png)


    This will list all of the projects but make sure you click on the one that says
    ‘One-line Jokes for programmers (jokes as a service)’:


    ![](img/9f2174949e81804f7192ec47968e0efb_414_1.png)'
  - '[PAGE 415]


    As you can see, the pyjokes had a couple of versions and at the moment the latest
