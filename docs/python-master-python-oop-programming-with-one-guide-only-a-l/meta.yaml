- img_proc: true
  md: "![](img/9f2174949e81804f7192ec47968e0efb_235_0.png)\n\nThis is what we were\
    \ doing so far, we passed the global variable x as an argument on line 8 and we\
    \ can use it in the function body through parameter x. This is much better than\
    \ using the global keyword inside the function, right?\n\n# Python nonlocal Keyword\n\
    \nThe non-local keyword was added in Python 3 and can be explained if we use nested\
    \ functions, therefore we need to go over the following example:\n\n```\n# nonlocal\n\
    def outer_fn():\n    x = 'John'\n\n    def inner_fn():\n        nonlocal x\n \
    \       x = 'hello'\n    inner_fn()\n    return x\n\nprint(outer_fn())\n```"
  merge: -1
