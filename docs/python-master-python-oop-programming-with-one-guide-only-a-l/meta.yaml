    \ without affecting the original list:\n\n```python\n# add new element to the\
    \ copied list\nstring_list = ['one','two','three']\nstring_list_copy = string_list[0:]\n\
    string_list_copy[2] = 'four'\nprint(string_list)\nprint(string_list_copy)\n```\n\
    \nGreat! The two lists are independent of each other; this means they are stored\
    \ in different locations in the memory. Most beginner developers will try creating\
    \ a copy of a list using the assignment operator like this:\n\n```python\n#create\
    \ a copy using assignment operator\nstring_list1 = ['one','two','three']\nstring_list_copy1\
    \ = string_list1\nprint(string_list_copy1)\n```\n\nWell, this looks like it’s\
    \ working but it’s not. Now let’s modify the last element of the newly copied\
    \ list and print both lists at the same time:\n\n```python\n#create a copy using\
    \ the assignment operator\nstring_list1 = ['one','two','three']\nstring_list_copy1\
    \ = string_list1\nstring_list_copy1[2] = 'four'\nprint(string_list_copy1)\nprint(string_list1)\n\
    ```\n\n![](img/9f2174949e81804f7192ec47968e0efb_99_0.png)\n\nWhat is happening\
    \ here? We have changed the string_list_copy1 and the change affected the original\
    \ list as well. This is happening because the string_list_copy1 is not a copy\
    \ of the string_list1 but a reference to the string_list1. The variables are just\
    \ a pointer to the values stored in the memory. This means the string_list1 and\
    \ string_list_copy1 point to the same values in the memory:\n\n![](img/9f2174949e81804f7192ec47968e0efb_99_1.png)\n\
    \n## Python IN Keyword with Lists\n\nSame as in Strings, we can use the ‘in’ keyword\
    \ to find if an item is present in the list. The output will be Boolean value\
    \ True or False:\n\n```python\n#in keyword with lists\nstring_list1 = ['one',\
    \ 'two', 'three']\nprint('two' in string_list1)\nprint('five' in string_list1)\n\
    ```\n\n```python\n#in keyword with lists\nstring_list1 = ['one', 'two', 'three']\n\
    print('two' in string_list1)\nprint('five' in string_list1)\n```\n\n**Console:**\n\
    \nTrue\nFalse\n>>>\n\nThis is a very useful keyword because we can find if the\
    \ item is present in a very long list.\n\n## Multi-Dimensional Lists\n\nThe list\
    \ examples we have covered so far are one-dimensional. Multi-dimensional lists\
    \ are lists within lists and there are other data types that are a better choice\
    \ when it comes to creating multi-dimensional levels:\n\n```python\n# two_dimensional\
    \ lists\ntwo_dimensional = [\n    [1, 2, 3],\n    [3, 4, 5]\n]\n```\n\nThe example\
    \ above is a two-dimensional list also known as matrix. It can be used in different\
