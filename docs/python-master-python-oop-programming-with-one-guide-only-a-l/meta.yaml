  md: "![](img/9f2174949e81804f7192ec47968e0efb_197_0.png)\n\nAs you can see, when\
    \ the while condition becomes False, the else-clause will be executed. Inside\
    \ the else clause, we have a very simple print simple message. But if we try the\
