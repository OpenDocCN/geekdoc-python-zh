    the features but I find this way much easier to learn. Another important data
    type in Python is Lists. In Python, lists are ordered sequence of objects that
    can be from any data type. If you have done any other programming language, you
    will notice that what I’m about to teach you is the same as the arrays in other
    programming languages so let’s create a variable called my_list:


    ```

    # Lists - data type

    my_list = [1,2,3,4,5,6]

    my_list1 = [''a'',''b'',''c'',''d'']

    my_list2 = [''a'',2,''c'',3]


    print(my_list)

    print(my_list1)

    print(my_list2)

    ```


    ```

    [1, 2, 3, 4, 5, 6]

    [''a'', ''b'', ''c'', ''d'']

    [''a'', 2, ''c'', 3]

    ```


    As I mentioned, the lists can hold an ordered sequence of data. So far, we have
    used the variables to store only a single value but now the lists are making the
    variables a complex container where we store multiple data of different types.
    As you can see, the variable called my_list can hold an ordered sequence of integer
    values. The second variable called my_list1 is an ordered sequence of values that
    belong to the String data type. The last variable has mixed data type and this
    is normal behavior for storing different types of data in one single container.
    When we create lists, we need to use square brackets. The data inside the brackets
    are called items or elements. The items or elements are separated by a comma.
    This data type (lists) is exactly the same as the arrays in JavaScript. Lists
    are a collection of items or ordered sequence of objects. Lists are also our first
    **Data Structure**. The Data structure allows us to store the data in an organized
    container and that is why we need to use those square brackets because we need
    to contain the data in one single unit. Data Structure is a very important concept
    because it allows us to contain the information in an organized manner in one
    container or box. If we use the print function and pass the list variable, we
    can see that it will print all of the items in square brackets but how can we
