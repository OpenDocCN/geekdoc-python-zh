  md: '# How Integer and Float are stored


    We have seen what Integer and Float numbers are but is there any major difference
    between the float and integer numbers? Yes, there is a big difference because
    float numbers are stored in memory in different locations, therefore, they take
    up more space in the memory compared to integer numbers. Take as an example the
    float number 4.5. In the memory, it will be stored as 4 and 5 in two different
    locations and that is why the float decimal numbers take more memory space. The
    integer numbers are converted to binary numbers and then stored in the memory.
    The binary numbers are made up of 0s and 1s. There is a function we can use called
    bin() for binary and this function will return a binary representation of the
    integer number.


    For example, let’s try to run the following code in replit:


    ![](img/9f2174949e81804f7192ec47968e0efb_47_0.png)


    From the figure above, we can see that the output is 0b10, the first part ‘0b’
    is a prefix (zero b) to differentiate the binary numbers from numbers in base
    10 representation, or in simple words, the prefix denotes a binary literal. The
    binary value for the actual number 2 is represented by binary 10. Now that we
    know these two data types (int and float), it is time to learn what mathematical
    operations we can perform on them.


