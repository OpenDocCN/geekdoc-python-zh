    \nIt's an opening curly brace, so we've found a match with the current closing\
    \ brace.\n\nStep 11: We encounter a closing parenthesis:\n\n```\n(var x = {y:\
    \ [1, 2, 3]})\n```\n\nStep 12: We pop the last element in the stack. It's a corresponding\
