    \n```\ndef sum(array):\n    # Base case: an empty array\n    if not array:\n \
    \       return 0\n\n    return array[0] + sum(array[1:])\n```\n\nAnd now we're\
    \ *really* done.\n\n# String Reversal\n\nLet's try another example. We're going\
    \ to write a reverse function that reverses a string. So if the function accepts\
