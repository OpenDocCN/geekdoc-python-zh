    In this case, the shift_amount is 3, indicating that array_2 needs to increase
    by 3 to hit the target sum. (Likewise, array_1 needs to *decrease* by 3.)


    So we can start building our algorithm by first calculating the sums of the two
    arrays. We can then loop through all the numbers in one of the arrays and look
    for the counterpart in the other.


    If we were to iterate over each number in array_2, for example, we know that the
    current number would have to be swapped with its counterpart, which would be the
    current number plus the shift_amount. For example, if the current number is 4,
    to find its counterpart, we add the shift_amount(3) to it and get 7. This means
    we need to find a 7 in array_1 to swap with our current number.


    So, we''ve figured out that we can look at any number in either array and know
    exactly what its counterpart from the other array should be. But how does this
    help? Don''t we still need to use nested loops and have an algorithm that is O(N
    * M)? That means that for each number in one array, we have to search the entire
    other array for the counterpart.


    This is where we can invoke magical lookups and ask ourselves, "If I could magically
    find a desired piece of information in O(1) time, can I make my algorithm faster?"


    Indeed, if we could find a number''s counterpart from the other array in just
