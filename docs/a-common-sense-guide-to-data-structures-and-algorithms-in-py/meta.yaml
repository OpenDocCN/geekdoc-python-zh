  md: '# # The Efficiency of Quicksort


    To figure out the efficiency of Quicksort, let''s first determine the efficiency
    of a *single* partition.


    When we break down the steps of a partition, we''ll note that a partition involves
    two primary types of steps:


    +   - *Comparisons*: We compare each of the values at hand to the pivot.

    - *Swaps*: When appropriate, we swap the values being pointed to by the left and
    right pointers.


    Each partition has at least N comparisons—that is, we compare each element of
    the array with the pivot. This is true because a partition always has the left
    and right pointers move through each cell until the left and right pointers reach
    each other.


    The number of swaps, however, will depend upon how the data is sorted. A single
    partition can have, at most, N / 2 swaps, as even if we''d swap values at every
    opportunity, each swap takes care of two values. As you can see in the following
    diagram, we partition six elements in just three swaps:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_224_0.png)


    Now, in most cases, we''re not making a swap every step of the way. For *randomly*
    sorted data, we generally swap about half of the values. On average, then, we''re
    making about N / 4 swaps.


    So on average, we make about N comparisons and N / 4 swaps. We can say, then,
    that there are about 1.25N steps for N data elements. In Big O notation, we ignore
    constants, so we''d say that a partition runs in O(N) time.


    Now, that''s the efficiency of a *single* partition. But Quicksort involves *many*
    partitions, so we need to conduct further analysis to determine the efficiency
    of Quicksort.


    # ## Quicksort from a Bird''s-Eye View


    To visualize this more easily, see the [diagram on page 214](link_placeholder),
    depicting a typical Quicksort on an array of eight elements from a bird''s-eye
    view. In particular, the diagram shows how many elements each partition acts upon.
    We''ve left out the actual numbers from the array since the exact values don''t
    matter. Note that in the diagram, the active subarray is the group of cells that''s
    not grayed out.'
