  md: "When I pass in the number 20,000 into the recurse function on my sleek, up-to-date\
    \ laptop, *my computer cannot process it*. Now, 20,000 doesn't seem like a very\
    \ large number. But this is what happens when I run recurse(20000):\n\nMy computer\
    \ prints the numbers from 20000 until 19005 and then terminates with the message:\n\
    \n```\nRecursionError: maximum recursion depth exceeded while calling a Python\
    \ object\n```\n\nBecause the recursion lasted from 20000 until about 19000 (I'm\
    \ rounding 19005 down), we can figure out that the call stack reached a size of\
    \ about 1,000 when the computer ran out of memory. It turns out my computer will\
    \ not tolerate a call stack that contains more than 1,000 items.\n\nThis is a\
    \ *huge* limitation on recursion, as I can't use my beautiful recurse function\
    \ on a number greater than 1,000!\n\nLet's contrast this to a simple loop approach:\n\
    \n```\ndef loop(n):\n    while n >= 0:\n        print(n)\n        n -= 1\n```\n\
    \nThis function accomplishes the same goal using a basic loop instead of recursion.\n\
    \nBecause this function doesn't use recursion, and doesn't take up any additional\
    \ memory, it can process a huge number without *ever* causing the computer to\
    \ run out of space. The function may take some time on huge numbers, but it'll\
    \ get the job done without giving up prematurely as the recursive function did.\n\
    \nWith this in mind, we can now understand why Quicksort is said to take up O(log\
    \ N) space. Quicksort makes O(log N) recursive calls, so at its peak has a call\
    \ stack that is the size of log(N).\n\nWhen we can implement a function using\
    \ recursion, then, we need to weigh recursion's benefits against its drawbacks.\
    \ Recursion allows us to use the \"magical\" top-down mindset, as you looked at\
    \ in [Chapter 11, Learning to Write in Recursive, on page 161](https://example.com),\
    \ but we also need our function to get the job done. And if we're processing a\
    \ lot of data, or even just a number like 20,000—or even 1,000—recursion may not\
    \ cut it."
