  md: 'However, we can take a slightly longer path to get to Irena as well:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_344_0.png)


    This is the longer path:


    Alice -> Elaine -> Derek -> Gina -> Irena


    The term *path* is an official graph term, and it means the specific sequence
    of edges to get from one vertex to another.


    Now, searching a graph (which you now know means getting from one vertex to another)
    can be useful for a variety of use cases.


    Perhaps the most obvious application for graph search is searching for a particular
    vertex within a connected graph. When this is the case, search can be used to
    find *any* vertex within the entire graph even if we have access to just one random
    vertex.


    Another use for graph search is to discover whether two vertices are connected.
    For example, we may want to know whether Alice and Irena are somehow connected
    to each other in this network. A search would give us the answer.


    Search can also be used even if we aren''t looking for one particular vertex;
    that is, we can use graph search to merely traverse a graph, which can be useful
    if we want to perform an operation on every vertex in the graph. You''ll see shortly
    how this works.


    # Depth-First Search


    The two well-known approaches for graph search are *depth-first search* and *breadth-first
    search*. Both approaches can get the job done, but each provides unique advantages
    in particular situations. We''re going to start with depth-first'
  merge: -1
  pgno: 344
- img_proc: true
  md: 'search, also referred to as DFS, because it''s actually quite similar to the
    algorithm for binary tree traversal that we discussed back in [Binary Search Tree
    Traversal, on page 272](Binary Search Tree Traversal, on page 272). In fact, it''s
    *also* the same essential algorithm that we saw in [Filesystem Traversal, on page
    156](Filesystem Traversal, on page 156).


    As mentioned earlier, graph search can be used to either find a particular vertex,
    or it can be used to simply traverse the graph. We''re going to begin by using
    depth-first search to traverse the graph since that algorithm is slightly simpler.


    The key to any graph search algorithm is keeping track of which vertices we''ve
    visited so far. If we don''t do this, we can end up in an infinite cycle. Take
    the following graph, for example:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_345_0.png)


    Here, Mohammad is friends with Felicia. And Felicia also happens to be friends
    with Zeina. But Zeina is friends with Mohammad. So our code would end up going
    in circles unless we keep track of which vertices we''ve already traversed.


    This problem didn''t occur when we dealt with trees (or filesystem traversal),
    since trees can''t have cycles. But since a graph *can* have a cycle, we need
    to address this issue now.


    One way to keep track of our visited vertices is by using a hash table. As we
    visit each vertex, we add the vertex (or its value) as a key in the hash table
    and assign it an arbitrary value, such as the Boolean `True`. If a vertex is present
    in the hash table, it means we''ve already visited it.


    With this in mind, the depth-first search algorithm works as follows.


    +   1. Start at any random vertex within the graph.

    2. Add the current vertex to the hash table to mark it as having been visited.

    3. Iterate through the current vertex''s adjacent vertices.

    4. For each adjacent vertex, if the adjacent vertex has already been visited,
    ignore it.

    5. If the adjacent vertex has *not* yet been visited, recursively perform depth-first
    search on that vertex.'
  merge: -1
