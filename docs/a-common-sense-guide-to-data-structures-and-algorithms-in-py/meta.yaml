    \ `a` and `b`, we'd find this:\n\n```python\na # [2, 4, 6, 8, 10]\nb # [2, 4,\
    \ 6, 8, 10]\n```\n\nThe in-place function modifies `a`, and `b` is just pointing\
    \ to the very same array that `a` is.\n\nWhether we choose to create a new array\
    \ or modify the original one in place is up to us and depends on the context of\
    \ our project. We're going to talk more about in-place algorithms in [Dealing\
