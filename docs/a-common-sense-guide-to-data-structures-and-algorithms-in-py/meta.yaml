- img_proc: true
  md: "Finally, here's the code for Dijkstra's algorithm. It doesn't make for light\
    \ reading, and it's probably the most complex piece of code in this book. However,\
    \ if you're ready to study it carefully, read on.\n\nIn our implementation here,\
    \ this method does not live inside the City class, but outside it. The method\
    \ accepts two City instances and returns the shortest path between them:\n\n```\n\
    def dijkstra_shortest_path(starting_city, final_destination):\n    cheapest_prices_table\
    \ = {}\n    cheapest_previous_stopover_city_table = {}\n    unvisited_cities =\
    \ [starting_city]\n    visited_cities = {}\n\n    cheapest_prices_table[starting_city.name]\
