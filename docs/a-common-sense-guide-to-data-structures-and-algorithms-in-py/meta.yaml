    \ = 1\n    current_number = number\n\n    while hash_table.get(current_number\
    \ + 1):\n        current_number += 1\n        current_sequence_length += 1\n\n\
    \        if current_sequence_length > greatest_sequence_length:\n            greatest_sequence_length\
    \ = current_sequence_length\n\nreturn greatest_sequence_length\n```\n\nIn this\
    \ algorithm, we take N steps to build the hash table. We take another N steps\
