- img_proc: true
  md: 'In this light, linear search can take fewer steps in an ordered array than
    in a classic array in certain situations. That being said, if we''re searching
    for a value that happens to be the final value or not within the array at all,
    we''ll still end up searching each and every cell.


    At first glance, then, standard arrays and ordered arrays don''t have tremendous
    differences in efficiency, or at least not in worst-case scenarios. For both kinds
    of arrays, if they contain N elements, linear search can take up to N steps.


    But we''re about to unleash an algorithm that is so powerful that it''ll leave
    linear search in the dust.


    We''ve been assuming until now that the only way to search for a value within
    an ordered array is linear search. The truth, however, is that linear search is
    only *one possible algorithm* for searching for a value. It''s not the *only*
    algorithm we can use.


    The big advantage of an ordered array over a classic array is that an ordered
    array allows for an alternative searching algorithm. This algorithm is known as
    *binary search*, and it is a much, *much* faster algorithm than linear search.


    # Binary Search


    You''ve probably played this guessing game as a child: I''m thinking of a number
    between 1 and 100. Keep guessing which number I''m thinking of, and I''ll let
    you know whether you need to guess higher or lower.


    You may know intuitively how to play this game. You wouldn''t begin by guessing
    number 1. Instead, you''d probably start with 50, which is smack in the middle.
    Why? Because by selecting 50, no matter whether I tell you to guess higher or
    lower, you''ve automatically eliminated half the possible numbers!


    If you guess 50 and I tell you to guess higher, you''d then pick 75, to eliminate
    half of the *remaining* numbers. If after guessing 75, I told you to guess lower,
    you''d pick 62 or 63. You''d keep on choosing the halfway mark to keep eliminating
    half of the remaining numbers.


    Let''s visualize this process where we''re told to guess a number between 1 and
    10, as shown in the [image on page 27](image on page 27).


    This, in a nutshell, is binary search.'
