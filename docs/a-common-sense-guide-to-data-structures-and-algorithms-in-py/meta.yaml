  - "[PAGE 179]\n\nIn [Chapter 10, Recursively Recurse with Recursion, on page 149](#),\
    \ we found that one area in which recursion shines is where we need to act on\
    \ a problem that has an arbitrary number of levels of depth. A second area in\
    \ which recursion shines is where *it is able to make a calculation based on a\
    \ subproblem of the problem at hand*.\n\nBefore I define what a subproblem is,\
    \ let's refer back to the factorial problem of the previous chapter. As you learned,\
    \ the factorial of 6 is as follows:\n\n6 * 5 * 4 * 3 * 2 * 1\n\nTo write a function\
    \ that calculates the factorial of a number, we could use a classic loop that\
    \ starts with the 1 and builds up from there. That is, we'd multiply the 2 by\
    \ the 1, and then multiply 3 by the result, and then 4, and so on until we reach\
    \ 6.\n\nSuch a function may look like this:\n\n```\ndef factorial(n):\n    product\
    \ = 1\n    for num in range(1, n + 1):\n        product *= num\n    return product\n\
    ```\n\nHowever, we could approach the problem differently: we could calculate\
    \ the factorial based on its subproblem.\n\nA *subproblem* is a version of the\
    \ very same problem applied to a smaller input. Let's apply this to our case.\n\
    \nIf you think about it, factorial(6) will be 6 multiplied by whatever the result\
    \ of factorial(5) is.\n\nSince factorial(6) is:\n\n6 * 5 * 4 * 3 * 2 * 1\n\nand\
    \ factorial(5) is:\n\n5 * 4 * 3 * 2 * 1\n\nwe can conclude that factorial(6) is\
    \ equivalent to:\n\n6 * factorial(5).\n\nThat is, once we have the result of factorial(5),\
    \ we can simply multiply that result by 6 to get the answer to factorial(6)."
