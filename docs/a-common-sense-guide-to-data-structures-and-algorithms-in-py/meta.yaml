  mdcn: "## 递归的隐藏成本\n\n我们在本书中已经接触了不少递归算法。让我们来看一个简单的递归函数：\n\n```python\ndef recurse(n):\n\
    \    if n < 0:\n        return\n    print(n)\n    recurse(n - 1)\n```\n\n这个函数接受一个数字\
    \ `n`，然后倒数到 0，沿途打印每个递减的数字。\n\n这是一段直截了当的递归，看起来似乎无害。它的速度是 O(N)，因为函数将运行与参数 `n` 相同的次数。而且它没有创建任何新的数据结构，所以看起来似乎不占用额外的空间。\n\
    \n真的如此吗？\n\n我在[第 10 章，用递归递归地递归，第 149 页](#)中解释了递归在底层是如何工作的。你了解到，每次函数递归调用自身时，都会向调用栈添加一个条目，以便计算机在内部函数完成后可以返回到外部函数。\n\
    \n如果我们把数字 100 传入 `recurse` 函数，它会在执行 `recurse(99)` 之前先将 `recurse(100)` 添加到调用栈。然后，在执行\
    \ `recurse(98)` 之前，它会将 `recurse(99)` 添加到调用栈。\n\n当调用 `recurse(-1)` 时，调用栈将达到峰值，此时调用栈中将有\
    \ 101 个条目，从 `recurse(100)` 到 `recurse(0)`。\n\n现在，尽管调用栈最终会被展开，但我们确实需要足够的内存来存储这\
    \ 101 个条目，*至少在一段时间内*。因此，我们的递归函数*占用 O(N) 的空间*。在这种情况下，N 是传入函数的数字；如果我们传入数字 100，就需要在调用栈中临时存储大约\
    \ 100 个函数调用。\n\n由此得出一个重要原则：*递归函数每进行一次递归调用，就占用一个单位的空间*。这就是递归悄悄吞噬内存的方式；即使我们的函数没有显式创建新数据，递归本身也会向调用栈添加数据。\n\
    \n要正确计算递归函数占用多少空间，我们总是需要弄清楚调用栈在峰值时有多大。\n\n对于我们的 `recurse` 函数，调用栈的大小大约与传入的数字 `n`\
    \ 一样大。\n\n起初，这可能看起来有点微不足道。毕竟，我们的现代计算机可以处理调用栈上的几个条目，对吧？嗯，让我们看看。\n\n当我在我的时尚、最新的笔记本电脑上将数字\
    \ 20,000 传入 `recurse` 函数时，*我的计算机无法处理它*。现在，20,000 看起来并不是一个很大的数字。但当我运行 `recurse(20000)`\
    \ 时，发生了这样的情况：\n\n我的计算机打印从 20000 到 19005 的数字，然后终止并显示消息：\n\n```\nRecursionError:\
    \ maximum recursion depth exceeded while calling a Python object\n```\n\n因为递归从\
    \ 20000 持续到大约 19000（我将 19005 四舍五入），我们可以推断出，当计算机内存耗尽时，调用栈的大小达到了大约 1,000。事实证明，我的计算机无法容忍包含超过\
    \ 1,000 个条目的调用栈。\n\n这对递归来说是一个*巨大*的限制，因为我无法在我的 `recurse` 函数上使用大于 1,000 的数字！\n\n\
    让我们将其与简单的循环方法进行对比：\n\n```python\ndef loop(n):\n    while n >= 0:\n        print(n)\n\
    \        n -= 1\n```\n\n这个函数使用基本的循环而不是递归来实现相同的目标。\n\n因为这个函数不使用递归，也不占用任何额外的内存，所以它可以处理巨大的数字，而*永远不会*导致计算机内存不足。这个函数在处理巨大数字时可能需要一些时间，但它会完成任务，而不会像递归函数那样过早放弃。\n\
    \n考虑到这一点，我们现在可以理解为什么说快速排序占用 O(log N) 的空间。快速排序进行 O(log N) 次递归调用，因此在峰值时，调用栈的大小为\
    \ log(N)。\n\n因此，当我们能够使用递归实现一个函数时，我们需要权衡递归的利弊。递归允许我们使用“神奇的”自顶向下思维，正如你在[第 11 章，学习用递归写作，第\
    \ 161 页](https://example.com)中看到的那样，但我们也需要我们的函数完成任务。而且，如果我们正在处理大量数据，或者甚至只是一个像\
    \ 20,000 这样的数字——甚至是 1,000——递归可能就不够用了。\n\n---\n\n为 True。但是，如果我们遇到一个已经是哈希表中键的项，我们返回\
    \ True，因为它意味着我们找到了一个重复的值。\n\n现在，这两个算法中哪个更高效？嗯，这完全取决于你考虑的是时间还是空间。就时间而言，版本 #2 效率高得多，因为它只有\
    \ O(N)，而版本 #1 是 O(N²)。\n\n然而，当涉及到*空间*时，版本 #1 实际上比版本 #2 更高效。版本 #2 消耗多达 O(N) 的空间，因为它创建了一个哈希表，该表最终可能包含传入函数的数组中的所有\
    \ N 个值。然而，版本 #1 除了原始数组外不消耗任何额外的内存，因此其空间复杂度为 O(1)。\n\n让我们看看 `has_duplicate_value`\
    \ 两个版本的完整对比：\n\n| 版本 | 时间复杂度 | 空间复杂度 |\n| :--- | :--- | :--- |\n| 版本 #1 | O(N²)\
    \ | O(1) |\n| 版本 #2 | O(N) | O(N) |\n\n我们可以看到，版本 #1 在内存方面更高效，但版本 #2 在原始速度方面更快。那么我们如何决定选择哪种算法呢？\n\
    \n答案当然是，这取决于具体情况。如果我们需要我们的应用程序速度极快，并且有足够的内存来处理它，那么版本 #2 可能更可取。另一方面，如果我们处理的是硬件/数据组合，需要节省内存，而速度不是我们最大的需求，那么版本\
    \ #1 可能是正确的选择。像所有技术决策一样，当存在权衡时，我们需要从大局出发。\n\n让我们看看这个函数的第三个版本，并看看它与前两个版本相比处于什么位置：\n\
    \n```python\ndef has_duplicate_value(array):\n    array.sort()\n    for i in range(len(array)\
    \ - 1):\n        if array[i] == array[i + 1]:\n            return True\n    return\
    \ False\n```\n\n这个实现，我们称之为版本 #3，首先对数组进行排序。然后，它遍历数组中的每个值，并检查它是否与下一个值相同。如果相同，我们就找到了一个重复的值。然而，如果我们到达数组末尾，没有两个连续的值相同，我们就知道数组不包含重复项。\n\
    \n让我们分析版本 #3 的时间和空间效率。\n\n就时间复杂度而言，这个算法是 O(N log N)。我们可以假设 Python 的排序算法是 O(N log\
    \ N) 的，因为已知最快的排序算法就是如此。遍历数组的额外 N 步与排序步骤相比微不足道，因此就速度而言，O(N log N) 是总和。\n\n空间是一个稍微复杂的问题，因为各种排序算法消耗的内存量不同。我们在本书中遇到的一些最早的算法，如冒泡排序和选择排序，不消耗额外空间，因为所有排序都是就地进行的。然而，有趣的是，更快的排序确实会占用一些空间，原因你很快就会看到。大多数快速排序的实现实际上占用\
    \ O(log N) 的空间。\n\n所以让我们看看版本 #3 与前两个版本相比处于什么位置：\n\n| 版本 | 时间复杂度 | 空间复杂度 |\n| :---\
    \ | :--- | :--- |\n| 版本 #1 | O(N²) | O(1) |\n| 版本 #2 | O(N) | O(N) |\n| 版本 #3\
    \ | O(N log N) | O(log N) |\n\n事实证明，版本 #3 在时间和空间之间取得了有趣的平衡。在时间方面，版本 #3 比版本 #1\
    \ 快，但比版本 #2 慢。在空间方面，它比版本 #2 更高效，但不如版本 #1。\n\n那么，我们什么时候可能想使用版本 #3？嗯，如果我们同时关心时间*和*空间，这可能是我们的解决方案。\n\
    \n最终，在每种给定情况下，我们需要知道我们可接受的最低速度和内存界限是什么。一旦我们理解了我们的约束条件，我们就可以从各种算法中进行选择，以便为我们的速度和内存需求挤出可接受的效率。\n\
    \n到目前为止，你已经看到我们的算法在创建额外的数据（如新数组或哈希表）时如何消耗额外的空间。然而，即使算法没有做这些事情，它也可能消耗空间。如果我们没有预料到，这可能会给我们带来麻烦。"
