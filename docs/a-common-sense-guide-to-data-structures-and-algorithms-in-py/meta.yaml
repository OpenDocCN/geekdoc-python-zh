    \n## 哈希表\n\n大多数编程语言都包含一种称为*哈希表*的数据结构，它拥有一个惊人的超能力：快速读取。请注意，哈希表在不同编程语言中有不同的名称。在Python中它们被称为*字典*，其他语言称它们为哈希、映射、哈希映射、字典或关联数组。我们将它们统称为哈希表，因为这是指代这种数据结构的通用方式。\n\
