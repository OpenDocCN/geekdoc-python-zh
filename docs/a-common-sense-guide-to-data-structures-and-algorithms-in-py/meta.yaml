- img_proc: true
  md: 'Let''s analyze this line by line.


    Again, our function now accepts two parameters, namely n and the memo hash table:


    ```

    def fib(n, memo):

    ```


    First off, the base cases of 0 and 1 both automatically return n and are unaffected
    by memoization.


    Before making any recursive calls, our code first checks to see whether fib(n)
    has already been calculated for the given n:


    ```

    if n not in memo:

    ```


    (If the calculation for n is already in the hash table, we simply return the result
    with return memo[n].)


    Only if the calculation for n has not yet been made do we proceed with the calculation:


    ```

    memo[n] = fib(n - 2, memo) + fib(n - 1, memo)

    ```


    Here, we store the result of the calculation in the memo hash table so we never
    have to calculate it again.


    Also note how we pass memo along as an argument to the fib function each time
    we call it. This is the key to sharing the memo hash table across all the calls
    to the fib function.


    As you can see, the guts of the algorithm remain the same. We''re still using
    recursion to solve our problem, as the computation of fib is still essentially
    fib(n - 2) + fib(n - 1). However, if the number we''re computing is new, we store
    the result in a hash table, and if the number we''re computing was already computed
    once before, we simply grab the result from the hash table instead of computing
    it again.


    When we map out the recursive calls in our memoized version, we get this:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_207_0.png)'
