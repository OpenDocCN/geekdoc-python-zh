    within an ordered array can become faster as well. Insertion requires a search
    before the actual insertion, but we can now upgrade that search from a linear
    search to a binary search. However, insertion within an ordered array still remains
    slower than within a regular array, as the regular array''s insertion doesn''t
    require a search at all.


    # Wrapping Up


    Often there''s more than one way to achieve a particular computing goal, and the
    algorithm you choose can seriously affect the speed of your code.


    It''s also important to realize that there usually isn''t a single data structure
    or algorithm that is perfect for every situation. For example, just because ordered
    arrays allow for binary search doesn''t mean you should always use ordered arrays.
    In situations where you don''t anticipate the need to search the data much but,
    instead, to add data, standard arrays may be a better choice because their insertion
    is faster.


    As we''ve seen, the way to analyze competing algorithms is to count the number
    of steps each one takes. In the next chapter, we''re going to look at a formalized
    way of expressing the time complexity of competing data structures and algorithms.
    Having this common language will give us clearer information that will allow us
    to make better decisions about which algorithms we choose.'
- md: '## Exercises


    The following exercises provide you with the opportunity to practice with binary
    search. The solutions to these exercises are found in the section [Chapter 2.
    on page 436](#).


    1.  How many steps would it take to perform a linear search for the number 8 in
    the ordered array [2, 4, 6, 8, 10, 12, 13]?

    2.  How many steps would binary search take for the previous example?

    3.  What is the maximum number of steps it would take to perform a binary search
    on an array of size 100,000?


    ## CHAPTER 3


    ## O Yes! Big O Notation


    We''ve seen in the preceding chapters that the primary factor in determining an
    algorithm''s efficiency is the number of steps it takes.


    However, we can''t simply label one algorithm a “22-step algorithm” and another
    a “400-step algorithm.” This is because the number of steps an algorithm takes
    cannot be pinned down to a single number. Let''s take linear search, for example.
    The number of steps linear search takes varies, as it takes as many steps as there
    are elements in the array. If the array contains 22 elements, linear search takes
    22 steps. If the array contains 400 elements, however, linear search takes 400
    steps.


    The more effective way, then, to quantify the efficiency of linear search is to
    say that linear search takes *N steps for N elements in the array*; that is, if
    an array has N elements, linear search takes N steps. Now, this is a pretty wordy
    way of expressing this concept.


    To help ease communication regarding time complexity, computer scientists have
    borrowed a concept from the world of mathematics to describe a concise and consistent
    language around the efficiency of data structures and algorithms. Known as Big
    O notation, this formalized expression of these concepts allows us to easily categorize
    the efficiency of a given algorithm and convey it to others.


    Once you understand Big O notation, you''ll have the tools to analyze each algorithm
    going forward in a consistent and concise way—it''s the way the pros do it.


    While Big O notation comes from the math world, I''m going to leave out all the
    mathematical jargon and explain it as it relates to computer science. Additionally,
    I''m going to begin by explaining Big O notation in simple terms and then continue
    to refine it as we proceed through this chapter and the next three chapters. It''s
    not a difficult concept, but it''ll be made even easier if I explain it in chunks
    over multiple chapters.


    ## Big O: How Many Steps Relative to N Elements?


    Big O achieves consistency by focusing on the number of steps an algorithm takes,
    but in a specific way. Let''s start off by applying Big O to the algorithm of
    linear search.


    In a worst-case scenario, linear search will take as many steps as there are elements
    in the array. As we''ve previously phrased it: for N elements in the array, linear
    search can take up to N steps. The appropriate way to express this in Big O notation
    is:


    O(N)


    Some pronounce this as “Big Oh of N.” Others call it “Order of N.” My personal
    preference, however, is “Oh of N.”


    Here''s what the notation means. It expresses the answer to what we''ll call the
    *key question*. The key question is this: *if there are N data elements, how many
    steps will the algorithm take?* Go ahead and read that sentence again. Then, emblazon
    it on your forehead, as this is the definition of Big O notation that we''ll be
    using throughout the rest of this book.


    The answer to the key question lies within the *parentheses* of our Big O expression.
    O(N) says that the answer to the key question is that *the algorithm will take
    N steps*.


    Let''s quickly review the thought process for expressing time complexity with
    Big O notation, again using the example of linear search. First, we ask the key
    question: if there are N data elements in an array, how many steps will linear
    search take? Because the answer to this question is that linear search will take
    N steps, we express this as O(N). For the record, an algorithm that is O(N) is
    also known as having *linear time*.


    Let''s contrast this with how Big O would express the efficiency of *reading*
    from a standard array. As you learned in [Chapter 1, Why Data Structures Matter,
    on page 1](https://example.com), reading from an array takes just one step, no
    matter how large the array is. To figure out how to express this in Big O terms,
    we''re going to again ask the key question: if there are N data elements, how
    many steps will reading from an array take? The answer is that reading takes just
    one step. So we express this as O(1), which I pronounce “Oh of 1.”


    O(1) is interesting, since although our key question revolves around N (“If there
    are N data elements, how many steps will the algorithm take?”), the answer has
    nothing to do with N. And that’s actually the whole point: *no matter how many
    elements* an array has, reading from the array *always* takes one step.


    And this is why O(1) is considered the “fastest” kind of algorithm. Even as the
    data increases, an O(1) algorithm doesn’t take any additional steps. The algorithm
    always takes a constant number of steps no matter what N is. In fact, an O(1)
    algorithm can also be referred to as having *constant time*.


    ### So, Where’s the Math?


    As I mentioned earlier in this book, I’m taking an easy-to-understand approach
    to the topic of Big O. That’s not the only way to do it; if you were to take a
    traditional college course on algorithms, you’d probably be introduced to Big
    O from a mathematical perspective. Big O is originally a concept from mathematics,
    and therefore, it’s often described in mathematical terms. For example, one way
    of describing Big O is that it describes the upper bound of the growth rate of
    a function, or that if a function g(x) grows no faster than a function f(x), then
    g is said to be a member of O(f). Depending on your mathematics background, that
    either makes sense or doesn’t help very much. I’ve written this book so that you
    don’t need as much math to understand the concept.


    If you want to dig further into the math behind Big O, check out *Introduction
    to Algorithms* by Thomas H. Cormen, Charles E. Leiserson, Ronald L. Rivest, and
    Clifford Stein (MIT Press, 2009) for a full mathematical explanation. Justin Abrahms
    also provides a pretty good definition in his article: [https://justin.abra.ms/computer-science/understanding-big-o-formal-definition.html](https://justin.abra.ms/computer-science/understanding-big-o-formal-definition.html).


    ## The Soul of Big O


    Now that we’ve encountered O(N) and O(1), we begin to see that Big O notation
    does more than simply describe the number of steps an algorithm takes, such as
    with a hard number like 22 or 400. Rather, it’s an answer to that key question
    on your forehead: if there are N data elements, how many steps will the algorithm
    take?


    While that key question is indeed the strict definition of Big O, there’s actually
    more to Big O than meets the eye.


    Let’s say we have an algorithm that always takes three steps no matter how much
    data there is. That is, for N elements, the algorithm always takes three steps.
    How would you express that in terms of Big O?


    Based on everything you''ve learned up to this point, you''d probably say that
    it''s O(3).


    However, it''s actually O(1). And that''s because of the next layer of understanding
    Big O, which I will reveal now.


    While Big O is an expression of the number of an algorithm''s steps relative to
    N data elements, that alone misses the deeper *why* behind Big O, what I dub the
    "soul of Big O."


    The soul of Big O is what Big O is truly concerned about: how will an algorithm''s
    performance *change as the data increases*?


    This is the soul of Big O. Big O doesn''t want to simply tell you how many steps
    an algorithm takes. It wants to tell you the story of how the number of steps
    increases as the data *changes*.


    Viewed with this lens, we don''t care very much whether an algorithm is O(1) or
    O(3). Because both algorithms are the type that aren''t affected by increased
    data, as their number of steps remains constant, they''re essentially the same
    kind of algorithm. They''re both algorithms whose steps remain constant irrespective
    of the data, and we don''t care to make a distinction between the two.


    An algorithm that is O(N), on the other hand, is a different type of algorithm.
    It''s an algorithm whose performance *is* affected as we increase the data. More
    specifically, it''s the kind of algorithm whose steps increase in direct proportion
    to the data as the data increases. This is the story O(N) tells. It tells you
    about the proportional relationship between the data and the algorithm''s efficiency.
    It describes exactly how the number of steps increases as the data increases.


    Look at how these two types of algorithms are plotted on a graph:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_57_0.png)'
  mdcn: '## 练习


    以下练习为你提供了实践二分查找的机会。这些练习的答案可在[第2章，第436页](#)中找到。


    1.  在有序数组 [2, 4, 6, 8, 10, 12, 13] 中，使用线性查找数字 8 需要多少步？

    2.  对于上一个例子，二分查找需要多少步？

    3.  在一个大小为 100,000 的数组上执行二分查找，最多需要多少步？


    ## 第3章


    ## O 是的！大O表示法


    我们在前面的章节中已经看到，决定算法效率的主要因素是它所需的步骤数。


    然而，我们不能简单地将一个算法标记为“22步算法”，另一个标记为“400步算法”。这是因为一个算法所需的步骤数不能固定为一个单一的数字。以线性查找为例。线性查找所需的步骤数是变化的，它需要的步骤数与数组中的元素数量一样多。如果数组包含22个元素，线性查找需要22步。然而，如果数组包含400个元素，线性查找就需要400步。


    那么，量化线性查找效率的更有效方式是说，线性查找需要*N步来处理数组中的N个元素*；也就是说，如果一个数组有N个元素，线性查找需要N步。现在，这是一种相当冗长的表达方式。


    为了帮助简化关于时间复杂度的沟通，计算机科学家从数学领域借鉴了一个概念，来描述一种关于数据结构和算法效率的简洁且一致的语言。这就是大O表示法，这种对这些概念的形式化表达使我们能够轻松地对给定算法的效率进行分类并传达给他人。


    一旦你理解了大O表示法，你将拥有以一致且简洁的方式分析后续每个算法的工具——这是专业人士的做法。


    虽然大O表示法来自数学领域，但我将省略所有数学术语，并从计算机科学的角度来解释它。此外，我将首先用简单的术语解释大O表示法，然后在本章和接下来的三章中逐步完善它。这不是一个难懂的概念，但如果我分多个章节分块解释，它会变得更容易理解。


    ## 大O：相对于N个元素需要多少步？


    大O通过关注算法所需的步骤数来实现一致性，但方式很具体。让我们首先将大O应用于线性查找算法。


    在最坏的情况下，线性查找将需要与数组中元素数量一样多的步骤。正如我们之前所说：对于数组中的N个元素，线性查找最多可能需要N步。用大O表示法表达这一点的恰当方式是：


    O(N)


    有些人将其读作“大O of N”。其他人称之为“N阶”。然而，我个人更喜欢读作“O of N”。


    这个表示法的含义是：它表达了我们称之为*关键问题*的答案。关键问题是：*如果有N个数据元素，算法将需要多少步？* 请再读一遍这句话。然后，把它铭记在心，因为这是我们将在本书其余部分使用的大O表示法的定义。


    关键问题的答案就在我们大O表达式的*括号*中。O(N)表示关键问题的答案是*算法将需要N步*。


    让我们快速回顾一下用大O表示法表达时间复杂度的思考过程，再次以线性查找为例。首先，我们提出关键问题：如果数组中有N个数据元素，线性查找需要多少步？因为这个问题的答案是线性查找需要N步，所以我们将其表示为O(N)。需要记录的是，一个O(N)的算法也被称为具有*线性时间*。


    让我们将其与大O如何表达从标准数组中*读取*的效率进行对比。正如你在[第1章，为什么数据结构很重要，第1页](https://example.com)中所学，从数组中读取只需要一步，无论数组有多大。为了弄清楚如何用大O术语来表达这一点，我们将再次提出关键问题：如果有N个数据元素，从数组中读取需要多少步？答案是读取只需要一步。所以我们将其表示为O(1)，我读作“O
    of 1”。


    O(1)很有趣，因为虽然我们的关键问题围绕着N（“如果有N个数据元素，算法将需要多少步？”），但答案与N无关。而这实际上正是重点：*无论数组有多少元素*，从数组中读取*总是*需要一步。


    这就是为什么O(1)被认为是“最快”的算法类型。即使数据增加，O(1)算法也不会采取任何额外的步骤。无论N是多少，该算法总是需要恒定数量的步骤。事实上，O(1)算法也可以被称为具有*常数时间*。


    ### 那么，数学在哪里？


    正如我之前在本书中提到的，我正在采用一种易于理解的方法来讲解大O这个主题。这不是唯一的方法；如果你参加传统的大学算法课程，你可能会从数学角度接触大O。大O最初是数学中的一个概念，因此，它经常用数学术语来描述。例如，描述大O的一种方式是，它描述了函数增长率的上界，或者说，如果一个函数g(x)的增长不快于函数f(x)，那么g被称为O(f)的成员。根据你的数学背景，这要么有意义，要么帮助不大。我写这本书是为了让你不需要太多数学知识就能理解这个概念。


    如果你想进一步探究大O背后的数学原理，请查阅托马斯·H·科曼、查尔斯·E·莱瑟森、罗纳德·L·里维斯特和克利福德·斯坦所著的《算法导论》（MIT出版社，2009年）以获得完整的数学解释。贾斯汀·亚伯拉罕在他的文章中也提供了一个相当好的定义：[https://justin.abra.ms/computer-science/understanding-big-o-formal-definition.html](https://justin.abra.ms/computer-science/understanding-big-o-formal-definition.html)。


    ## 大O的灵魂


    既然我们已经接触了O(N)和O(1)，我们开始看到大O表示法不仅仅描述算法所需的步骤数，比如像22或400这样的具体数字。相反，它是对你脑海中那个关键问题的回答：如果有N个数据元素，算法将需要多少步？


    虽然那个关键问题确实是大O的严格定义，但实际上大O的内涵远不止表面所见。


    假设我们有一个算法，无论数据量多少，它总是需要三步。也就是说，对于N个元素，该算法总是需要三步。你会如何用大O来表达这一点？


    根据你到目前为止所学的一切，你可能会说它是O(3)。


    然而，它实际上是O(1)。这是因为对大O的下一层理解，我现在将揭示。


    虽然大O是算法步骤数相对于N个数据元素的表达，但仅此一点忽略了大O背后更深层的*为什么*，我称之为“大O的灵魂”。


    大O的灵魂是大O真正关心的东西：随着数据增加，算法的性能*将如何变化*？


    这就是大O的灵魂。大O不想简单地告诉你一个算法需要多少步。它想告诉你的是，随着数据*变化*，步骤数如何增加的故事。


    从这个角度来看，我们并不太在意一个算法是O(1)还是O(3)。因为这两种算法都是不受数据增加影响的类型，它们的步骤数保持不变，本质上是同一种算法。它们都是步骤数与数据无关的算法，我们不想对两者进行区分。


    另一方面，O(N)的算法是另一种类型的算法。它的性能*会*随着我们增加数据而受到影响。更具体地说，它是那种步骤数随着数据增加而直接成比例增加的算法。这就是O(N)所讲述的故事。它告诉你数据与算法效率之间的比例关系。它精确地描述了随着数据增加，步骤数如何增加。


    看看这两种算法在图表上的绘制方式：


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_57_0.png)'
