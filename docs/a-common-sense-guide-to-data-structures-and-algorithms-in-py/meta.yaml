  - '[PAGE 167]


    So let''s break down the process of how the computer executes a recursive function.


    Say that we call factorial(3). Since 3 isn''t the base case, the computer reaches
    this line:


    ```

    return number * factorial(number - 1)

    ```


    This then launches the function factorial(2).


    But there''s a catch. When the computer begins to run factorial(2), did the computer
    yet complete running factorial(3)?


    This is what makes recursion tricky for the computer. Until the computer reaches
    the end keyword of factorial(3), it''s not done with factorial(3). So we enter
    into a weird situation. The computer didn''t yet complete executing factorial(3),
    yet it''s starting to run factorial(2) while *still in the middle* of factorial(3).


    And factorial(2) isn''t the end of the story, because factorial(2) **triggers**
    factorial(1). So it''s a crazy thing: while still in the middle of running factorial(3),
    the computer calls factorial(2). And while running factorial(2), the computer
    runs factorial(1). It turns out, then, that factorial(1) runs in the middle of
    *both* factorial(2) and factorial(3).


    How does the computer keep track of all of this? It needs some way to remember
    that after it finishes factorial(1), it needs to go back and finish running factorial(2).
    And then it needs to remember to complete factorial(3) once it completes factorial(2).


    # The Call Stack


    Luckily, you recently learned about stacks in [Chapter 9, Crafting Elegant Code,
    on page 133](https://example.com). The computer uses a stack to keep track of
    which functions it''s in the middle of calling. This stack is known, appropriately
    enough, as the *call stack*.


    Here''s how the call stack works in the context of our factorial example.


    The computer begins by calling factorial(3). Before the method completes executing,
    however, factorial(2) gets called. To track that the computer is still in the
    middle of factorial(3), the computer pushes that information onto a call stack:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_167_0.png)


    This indicates that the computer is in the middle of factorial(3). (Really, the
    computer also needs to save which line it''s in the middle of, and some other
    things like variable values, but I''m keeping the diagrams simple.)'
- md: "The computer then proceeds to execute factorial(2). Now, factorial(2), in turn,\
    \ calls factorial(1). Before the computer dives into factorial(1), though, the\
    \ computer needs to remember that it's still in the middle of factorial(2), so\
    \ it pushes that onto the call stack as well:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_168_0.png)\n\
    \nThe computer then executes factorial(1). Since 1 is the base case, factorial(1)\
    \ completes without calling the factorial method again.\n\nAfter the computer\
    \ completes factorial(1), it checks the call stack to see whether it's in the\
    \ middle of any other functions. If there's something in the call stack, it means\
    \ that the computer still has work to do—namely, wrap up some other functions\
    \ it was in the middle of.\n\nIf you recall, stacks are restricted in that we\
    \ can only pop its top element. This is ideal for recursion, since the top element\
    \ will be *the most recently called function*, which is what the computer needs\
    \ to wrap up next. It's a LIFO situation: the function that was called last (that\
    \ is, most recently) is the function we need to complete first.\n\nThe next thing\
    \ the computer does is pop the top element of the call stack, which currently\
    \ is factorial(2):\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_168_1.png)\n\n\
    The computer then completes its execution of factorial(2).\n\nNow, the computer\
    \ pops the next item from the stack. By this time, only factorial(3) is left on\
    \ the stack, so the computer pops it and therefore completes running factorial(3).\n\
    \nAt this point, the stack is empty, so the computer knows it's done executing\
    \ all of the methods, and the recursion is complete.\n\nLooking back at this example\
    \ from a bird's-eye view, you'll see that the order in which the computer calculates\
    \ the factorial of 3 is as follows:\n\n1. factorial(3) is called first. Before\
    \ it's done...\n2. factorial(2) is called second. Before it's done...\n3. factorial(1)\
    \ is called third.\n4. factorial(1) is *completed* first.\n5. factorial(2) is\
    \ completed based on the result of factorial(1).\n6. Finally, factorial(3) is\
    \ completed based on the result of factorial(2).\n\nThe factorial function is\
    \ a calculation made based on recursion. The calculation is ultimately made by\
    \ factorial(1) passing its result (which is 1) to factorial(2). Then factorial(2)\
    \ multiplies this 1 by 2, yielding 2, and passes this result to factorial(3).\
    \ Finally, factorial(3) takes this result and multiplies it by 3, computing the\
    \ result of 6.\n\nSome refer to this idea as *passing a value up through the call\
    \ stack*; that is, each recursive function returns its computed value to its “parent”\
    \ function. Eventually, the function that was initially called first computes\
    \ the final value.\n\n## Stack Overflow\n\nLet’s take a look back at the infinite\
    \ recursion example from the beginning of the chapter. Recall that blah() called\
    \ itself ad infinitum. What do you think will happen to the call stack?\n\nIn\
    \ the case of infinite recursion, the computer keeps pushing the same function\
    \ again and again onto the call stack. The call stack grows and grows until, eventually,\
    \ the computer reaches a point where there’s simply no more room in its short-term\
    \ memory to hold all this data. This causes an error known as *stack overflow*—the\
    \ computer just shuts down the recursion and says, “I refuse to call the function\
    \ again, because I’m running out of memory!”\n\n## Filesystem Traversal\n\nNow\
    \ that you’ve seen how recursion works, we can use it to solve certain problems\
    \ that would otherwise be uncrackable.\n\nOne type of problem in which recursion\
    \ is a natural fit is when we need to delve into multiple layers of a problem\
    \ without knowing how many layers there are.\n\nTake the example of traversing\
    \ through a filesystem. Let’s say you have a script that does something with all\
    \ the contents inside a directory, such as printing all the subdirectory names.\
    \ However, you don’t want the script to only handle the immediate subdirectories—you\
    \ want it to act on all the subdirectories *within* the subdirectories of the\
    \ directory and all of *their* subdirectories, and so on.\n\nLet's create a simple\
    \ script that prints the names of all subdirectories within a given directory:\n\
    \n```python\nimport os\n\ndef print_subdirectories(directory_name):\n    for filename\
    \ in os.listdir(directory_name):\n        if os.path.isdir(filename):\n      \
    \      path = os.path.join(directory_name, filename)\n            print(path)\n\
    ```\n\nWe can call this function by passing in a directory name. If we want to\
