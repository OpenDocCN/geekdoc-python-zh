    \n    return shortest_path\n```\n\n我们这里有相当多的代码，让我们分解一下。\n\n`dijkstra_shortest_path`\
    \ 函数接受两个顶点，分别代表 `starting_city` 和 `final_destination`。\n\n最终，我们的函数将返回一个字符串数组，表示最便宜的路径。对于我们的示例，此函数将返回：\n\
