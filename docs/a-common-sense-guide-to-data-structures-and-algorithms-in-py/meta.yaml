    if lowest_number_index != i:\n    array[i], array[lowest_number_index] = array[lowest_number_index],\
    \ array[i]\n```\n\nFinally, we return the sorted array:\n\n```\nreturn array\n\
    ```\n\n# The Efficiency of Selection Sort\n\nSelection Sort contains two types\
    \ of steps: comparisons and swaps. We compare each value with the lowest number\
    \ we've encountered in each pass-through, and we swap the lowest number into its\
    \ correct position.\n\nLooking back at our example array that contains five elements,\
    \ we had to make a total of 10 comparisons. Let's break it down in the following\
    \ table:\n\n| Pass-Through # | # of Comparisons |\n| :--- | :--- |\n| 1 | 4 comparisons\
    \ |\n| 2 | 3 comparisons |\n| 3 | 2 comparisons |\n| 4 | 1 comparison |\n\nThat's\
    \ a grand total of 4 + 3 + 2 + 1 = 10 comparisons.\n\nTo put it in a way that\
    \ works for arrays of all sizes, we'd say that for N elements, we make\n\n(N -\
    \ 1) + (N - 2) + (N - 3) ... + 1 comparisons.\n\nAs for *swaps*, though, we only\
    \ need to make a maximum of one swap per pass-through. This is because in each\
    \ pass-through, we make either one or zero swaps, depending on whether the lowest\
