  md: "Here's a recursive implementation that returns a number's factorial:\n\n```\n\
    def factorial(number):\n    if number <= 1:\n        return 1\n    else:\n   \
    \     return number * factorial(number - 1)\n```\n\nThis code can look somewhat\
    \ confusing at first glance. To walk through the code to see what it does, here's\
    \ the process I recommend:\n\n+   1. Identify the base case.\n2. Walk through\
    \ the function for the base case.\n3. Identify the next-to-last case. This is\
    \ the case just before the base case, as I'll demonstrate momentarily.\n4. Walk\
    \ through the function for the next-to-last case.\n5. Repeat this process by identifying\
    \ the case before the one you just analyzed and walking though the function for\
    \ that case.\n\nLet's apply this process to the preceding code. If we analyze\
    \ the code, we'll quickly notice that there are two paths. One path is where number\
    \ is less than or equal to 1, and the other path is where number is greater than\
    \ 1:\n\n```\nif number <= 1:  # Path 1\n    ...\nelse:  # Path 2: number is greater\
    \ than 1\n    ...\n```\n\nWe can see that the recursion happens inside the else\
    \ path, since factorial calls itself:\n\n```\nelse:\n    return number * factorial(number\
    \ - 1)\n```\n\nSo it must be that the base case is the first path, since it's\
    \ the path where no recursion is taking place:\n\n```\nif number <= 1:\n    return\
    \ 1\n```\n\nWe can conclude, then, that the base case is when number is less than\
    \ or equal to 1.\n\nNext, let's walk through the factorial method assuming it's\
    \ dealing with a base case, such as factorial(1). Again, the relevant code from\
    \ our method is the following:\n\n```\nif number <= 1:\n    return 1\n```"
