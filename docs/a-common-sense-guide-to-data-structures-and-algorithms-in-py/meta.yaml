- img_proc: true
  md: "The first is when there's an opening brace that doesn't have a corresponding\
    \ closing brace, such as this:\n\n```\n(var x = 2;\n```\n\nWe'll call this Syntax\
    \ Error Type #1.\n\nThe second is when there is a closing brace that was never\
    \ preceded by a corresponding opening brace:\n\n```\nvar x = 2;)\n```\n\nWe'll\
    \ call that Syntax Error Type #2.\n\nThe third, which we'll refer to as Syntax\
    \ Error Type #3, is when a closing brace is not the same *type* of brace as the\
    \ immediately preceding opening brace, such as:\n\n```\n(var x = [1, 2, 3)];\n\
    ```\n\nIn the preceding example, there's a matching set of parentheses and a matching\
    \ pair of square brackets, but the closing parenthesis is in the wrong place,\
    \ as it doesn't match the immediately preceding opening brace, which is a square\
    \ bracket.\n\nHow can we implement an algorithm that inspects a line of JavaScript\
    \ code and ensures that there are no brace-related syntax errors? This is where\
    \ a stack allows us to implement a beautiful linting algorithm, which works as\
    \ follows:\n\nWe prepare an empty stack, and then we read each character from\
    \ left to right following these rules:\n\n+   1. If we find any character that\
    \ isn't a type of brace (parenthesis, square bracket, or curly brace), we ignore\
    \ it and move on.\n2. If we find an *opening* brace, we push it onto the stack.\
    \ Having it on the stack means we're waiting to close that particular brace.\n\
    3. If we find a *closing* brace, we pop the top element in the stack and inspect\
    \ it. We then analyze:\n   - If the item we popped (which is always an opening\
    \ brace) does not match the current closing brace, it means we've encountered\
    \ Syntax Error Type #3.\n   - If we couldn't pop an element because the stack\
    \ was empty, that means the current closing brace doesn't have a corresponding\
    \ opening brace beforehand. This is Syntax Error Type #2."
