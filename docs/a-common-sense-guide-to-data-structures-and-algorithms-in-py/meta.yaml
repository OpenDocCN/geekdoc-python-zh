- img_proc: true
  md: "The implementation of the actual trie node itself is very simple. Here is our\
    \ Python version of the TrieNode class:\n\n```\nclass TrieNode:\n    def __init__(self):\n\
    \        self.children = {}\n```\n\nAs you can see, the TrieNode just contains\
    \ a hash table.\nIf we print (to the console) the data from our root node in the\
    \ previous example, we'll get something like this:\n\n```\n{'a': <__main__.TrieNode\
    \ instance at 0x108635638>,\n 'b': <__main__.TrieNode instance at 0x108635878>,\n\
    \ 'c': <__main__.TrieNode instance at 0x108635ab8>}\n```\n\nAgain, in this hash\
    \ table, the keys are individual character strings, and the values are instances\
    \ of other TrieNodes.\n\n# The Trie Class\n\nTo fully create our trie, we'll also\
    \ need a separate Trie class, which will keep track of the root node:\n\n```\n\
    import trie_node\n\nclass Trie:\n    def __init__(self):\n        self.root =\
    \ trie_node.TrieNode()\n```\n\nThis class keeps track of a self.root variable\
    \ that points to the root node. In this implementation, when we create a new Trie,\
    \ it begins with an empty TrieNode as its root.\n\nAs we progress through this\
    \ chapter, we're going to add our trie operation methods to this Trie class as\
    \ well.\n\n# Storing Words\n\nNow, the point of our trie is to store words. Let's\
    \ see how the following trie stores the words, \"ace\", \"bad\", and \"cat\",\
    \ as shown in the [diagram on page 306](diagram on page 306).\n\nThis trie stores\
    \ the three words by turning each character of each word into its own trie node.\
    \ If you start with the root node and follow its \"a\" key, for example, it points\
    \ to a child node containing a key of \"c\". The \"c\" key, in turn, points to\
    \ a node that contains a key of \"e\". When we string these three characters together,\
    \ we get the word \"ace\"."
