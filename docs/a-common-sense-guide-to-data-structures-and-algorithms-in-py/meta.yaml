  md: 'graphs have five vertices, but because the A-B-C-D-E graph has more edges,
    it takes considerably more steps.


    At the end of the day, graph search is O(V + E) in a worst-case scenario, where
    the vertex we''re searching for is the last one we find (or isn''t present in
    the graph at all). And this is true for both breadth-first search and depth-first
    search.


    However, we saw earlier that depending on the shape of the graph and the data
    we''re searching for, our choice of breadth-first versus depth-first can optimize
    our search where we''d hope to find our vertex at some point *before* having to
    traverse the entire graph. The right method of search can help us increase the
    odds that we won''t end up in a worst-case scenario and that we''ll find the vertex
    early.


    In the next section, you''re going to learn about a specific type of graph that
    comes with its own set of search methods that can be used to solve some complex
    but useful problems.


    > ### Graph Databases


    Because graphs are so efficient at working with data involving relationships (such
    as friends in a social network), special *graph databases* are often used to store
    this kind of data in real-world software applications. These databases use the
    concepts you''re learning about in this chapter, as well as other elements of
    graph theory, to optimize efficiency of operations around this kind of data. Indeed,
    many social networking applications are powered by graph databases under the hood.


    Some examples of graph databases include Neo4j<sup>a</sup> and ArangoDB<sup>b</sup>.
    These websites are a good place to start if you''re interested in learning more
    about how graph databases work.


    ---

    a. http://neo4j.com

    b. https://www.arangodb.com


    # Weighted Graphs


    We''ve already seen that graphs can come in a number of different flavors. Another
    useful type of graph, known as a *weighted graph*, adds additional information
    to the *edges* of the graph.'
