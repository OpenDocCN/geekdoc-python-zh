    **新书与精选**

    https://pragprog.com/news

    查看最新的 Pragmatic 动态、新书和其他产品。


    ## 购买本书


    如果你喜欢这本电子书，也许你会想要一本纸质版。你可以在当地的独立书店以及任何销售优质书籍的地方购买平装本。


    ## 联系我们


    | 在线订购： | https://pragprog.com/catalog |

