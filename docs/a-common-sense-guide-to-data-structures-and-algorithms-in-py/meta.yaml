    \ Big O notation to describe the time complexity of the function:\n\n```python\n\
    def select_a_strings(array):\n    new_array = []\n\n    for string in array:\n\
    \        if string[0] == \"a\":\n            new_array.append(string)\n\n    return\
    \ new_array\n```\n\n5.  The following function calculates the median from an *ordered*\
    \ array. Describe its time complexity in terms of Big O notation:\n\n```python\n\
    def median(array):\n    if not array:\n        return None\n\n    middle = len(array)\
    \ // 2\n\n    # If array has even amount of numbers:\n    if len(array) % 2 ==\
