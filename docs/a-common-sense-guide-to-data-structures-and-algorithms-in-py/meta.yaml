  md: 'We then iterate through the list of books and use the `author_hash_table` to
    “magically” find each author in a single step. This loop takes N steps, with N
    being the number of books.


    This optimized algorithm takes a grand total of O(N + M) steps, since we run a
    single loop through the N books, and a single loop through the M authors. This
    is drastically faster than our original algorithm, which took O(N * M).


    It''s worth noting that by creating the extra hash table, we''re using up an additional
    O(M) space, whereas our initial algorithm didn''t take up any extra space at all.
    However, this is great optimization if we''re willing to sacrifice the memory
    for the sake of speed.


    We made this magic happen by first dreaming what magical O(1) lookups could do
    for us, and we then granted ourselves our own wish by using a hash table to store
    our data in an easy-to-find way.


    The fact that we can look up hash table data in O(1) time isn''t new, as we looked
    at this back in [Blazing Fast Lookup with Hash Tables](Blazing Fast Lookup with
    Hash Tables). The specific tip I''m sharing here, though, is to constantly *imagine*
    that you can perform O(1) lookups on any kind of data and notice whether that
    would speed up your code. Once you have the vision of how O(1) lookups would help
    you, you can then try to use a hash table or other data structure to turn that
    dream into reality.


    # The Two Sum Problem


    Let''s look at another scenario in which we can benefit from magical lookups.
    This is one my favorite optimization examples.


    The *two sum problem* is a well-known coding exercise. The task is to write a
    function that accepts an array of numbers and return `True` or `False` depending
    on whether there are any two numbers in the array that add up to 10 (or another
    given number). For simplicity, let''s assume there will never be duplicate numbers
    in the array.


    Let''s say this is our array:


    ```

    [2, 0, 4, 1, 7, 9]

    ```


    Our function would return `True`, since the 1 and 9 add up to 10.


    But let''s look at the following array:


    ```

    [2, 0, 4, 5, 3, 9]

    ```


    In this case, we return `False`. Even though the three numbers 2, 5, and 3 add
    up to 10, we specifically need *two* numbers to add up to 10.'
