  - '[PAGE 187]


    someone take to reach the top? Write a function that will calculate this for N
    steps. The following image displays three possible paths of jumping up a five-step
    staircase.


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_187_0.png)


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_187_1.png)


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_187_2.png)


    These are just three of many possible paths.


    Let''s first explore this problem with a bottom-up approach. That is, we''ll work
    our way up from the simplest cases to the more complex ones.


    Obviously, if there''s only one step, there''s only one possible path.


    With two steps, there are two paths. The person can climb one step twice, or the
    person can jump up two steps at once. I''ll write this like so:


    ```

    1, 1

    2

    ```


    With a staircase of three steps, someone could take one of four possible paths:


    ```

    1, 1, 1

    1, 2

    2, 1

    3

    ```'
  - '[PAGE 188]


    With four steps, there are seven options:


    +   1, 1, 1, 1

    1, 1, 2

    1, 2, 1

    1, 3

    2, 1, 1

    2, 2

    3, 1


    Go ahead and try to draw up all the combinations for a five-step staircase. It''s
    not that easy! And this is just five steps. Imagine how many combinations there
    are for, say, eleven steps.


    Now, let''s get to the question at hand: how would we *write the code* to count
    all the paths?


    Without the recursive mindset, it can be difficult to wrap one''s mind around
    the algorithm for making this calculation. However, with the top-down way of thinking,
    the problem can become surprisingly easy.


    For an eleven-step staircase, the first subproblem that comes to mind is a ten-step
    staircase. Let''s go with that for now. If we knew how many possible paths there
    are to climb a ten-step staircase, can we use that as a base for calculating the
    paths for an eleven-step staircase?


    For starters, we do know that climbing an eleven-step staircase will take *at
    least* as many steps as climbing a ten-step staircase. That is, we have all the
    paths to get to stair number 10, and from there, one can climb one more step to
    get to the top.


    However, this can''t be the complete solution, since we know that someone can
    also jump to the top from stair numbers 9 and 8 as well.


    If we think about it further, we''ll realize that if you''re taking any path that
    includes going from stair 10 to stair 11, you''re not taking any of the paths
    that include jumping from stair 9 to stair 11. Conversely, if you jump from stair
    9 to stair 11, you''re not taking any of the paths that include stepping on stair
    10.


    So we know that the number of paths to the top will include at least the number
    of paths to stair 10 plus the number of paths to stair 9.


    And since it''s possible to also jump from stair 8 to stair 11, as one can jump
    three steps at a time, we need to include the count of those paths as well.


    We''ve determined, then, that the number of steps to the top is at least the sum
    of all the paths to stairs 10, 9, and 8.'
- md: "However, in thinking about it even further, it's evident there aren't any other\
    \ possible paths to the top beyond these. After all, one can't jump from stair\
    \ 7 to stair 11. So we can conclude that for N steps, the number of paths is the\
    \ following:\n\nnumber_of_paths(n - 1) + number_of_paths(n - 2) + number_of_paths(n\
    \ - 3)\n\nOther than the base case, this will be the code for our function!\n\n\
    ```\ndef number_of_paths(n):\n    return (number_of_paths(n - 1)\n           \
    \ + number_of_paths(n - 2)\n            + number_of_paths(n - 3))\n```\n\nIt seems\
    \ too good to be true that this is almost all the code we need. But it is true.\
    \ All that's left to deal with is the base case.\n\n## Staircase Problem Base\
    \ Case\n\nDetermining the base case for this problem is slightly tricky. That's\
    \ because when this function gets to an n of 3, 2, or 1, the function will call\
    \ itself on n of 0 or below. For example, number_of_paths(2) calls itself for\
    \ number_of_paths(1), number_of_paths(0), and number_of_paths(-1).\n\nOne way\
    \ we can deal with this is by hardcoding all the bottom cases:\n\n```\ndef number_of_paths(n):\n\
    \    if n <= 0:\n        return 0\n    if n == 1:\n        return 1\n    if n\
    \ == 2:\n        return 2\n    if n == 3:\n        return 4\n\n    return (number_of_paths(n\
    \ - 1)\n            + number_of_paths(n - 2)\n            + number_of_paths(n\
    \ - 3))\n```\n\nAnother way to devise the base cases here is to cleverly rig the\
    \ system by using strange but effective base cases that just happen to compute\
    \ the right numbers. Let me show you what I mean.\n\nWe know that we definitely\
    \ want the result of number_of_paths(1) to be 1, so we'll start with the following\
    \ base case:\n\n```\nif n == 1:\n    return 1\n```\n\nNow, we know that we want\
    \ number_of_paths(2) to return 2, but we don't *have* to create that base case\
    \ explicitly. Instead, we can take advantage of the fact that number_of_paths(2)\
    \ will compute as number_of_paths(1) + number_of_paths(0) + number_of_paths(-1).\
    \ Since number_of_paths(1) returns 1, if we made number_of_paths(0) also return\
    \ 1, and number_of_paths(-1) return 0, we'd end up with a sum of 2, which is what\
    \ we want.\n\nSo we can add the following base cases:\n\n```\nif n < 0:\n    return\
    \ 0\nif n == 0 or n == 1:\n    return 1\n```\n\nLet's move on to number_of_paths(3),\
    \ which will return the sum of number_of_paths(2) + number_of_paths(1) + number_of_paths(0).\
    \ We know that we want the result to be 4, so let's see if the math works out.\
    \ We already rigged number_of_paths(2) to return 2. number_of_paths(1) will return\
    \ 1, and number_of_paths(0) will also return 1, so we end up getting the sum of\
    \ 4, which is just what we need.\n\nOur complete function can also be written\
    \ as:\n\n```\ndef number_of_paths(n):\n    if n < 0:\n        return 0\n    if\
    \ n == 0 or n == 1:\n        return 1\n    return (number_of_paths(n - 1)\n  \
    \          + number_of_paths(n - 2)\n            + number_of_paths(n - 3))\n```\n\
    \nWhile this is less intuitive than our previous version, we cover all the base\
    \ cases with just two lines of code.\n\nAs you can see, the top-down recursive\
    \ approach made solving this problem much easier than it might have been otherwise.\n\
    \n## Anagram Generation\n\nTo top off our conversation, let's tackle our most\
    \ complex recursive problem yet. We're going to use everything we've got in our\
    \ recursion toolbox to make this work.\n\nWe're going to write a function that\
    \ returns an array of all anagrams of a given string. An anagram is a reordering\
    \ of all the characters within a string. For example, the anagrams of \"abc\"\
    \ are:\n\n```\n[\"abc\",\n\"acb\",\n\"bac\",\n\"bca\",\n\"cab\",\n\"cba\"]\n```\n\
    \nNow, let's say we were to collect all the anagrams of the string \"abcd\". Let's\
    \ apply our top-down mindset to this problem.\n\nPresumably, we could say that\
    \ the subproblem of \"abcd\" is \"abc\". The question then is this: if we had\
    \ a working anagrams function that returned all the anagrams of \"abc\", how can\
    \ we use them to produce all the anagrams of \"abcd\"? Think about this for a\
    \ bit and see if you can come up with any approaches.\n\nHere's the approach that\
    \ occurred to me. (There are others, though.)\n\nIf we had all six anagrams of\
    \ \"abc\", we can come up with every permutation of \"abcd\" if we stick the \"\
    d\" in every possible spot within each anagram of \"abc\":\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_191_0.png)\n\
    \nHere is a Python implementation of this algorithm. You'll note that it's certainly\
    \ more involved than the previous examples in this chapter:\n\n```\ndef anagrams_of(string):\n\
    \    if len(string) == 1:\n        return [string[0]]\n\n    collection = []\n\
    \    substring_anagrams = anagrams_of(string[1:])\n    for substring_anagram in\
    \ substring_anagrams:\n        for index in range(len(substring_anagram) + 1):\n\
    \            new_string = (substring_anagram[:index]\n                       \
    \   + string[0]\n                          + substring_anagram[index:])\n    \
    \        collection.append(new_string)\n\n    return collection\n```\n\nThis code\
    \ is not trivial, so let's break it down. For now, we'll skip over the base case.\n\
    \nWe start by creating an empty array in which we'll collect the entire collection\
    \ of anagrams:\n\n```\ncollection = []\n```\n\nThis is the same array we'll return\
    \ at the end of our function.\n\nNext, we grab the array of all anagrams from\
    \ the substring of our string. This substring is the subproblem string—namely,\
    \ from the second character until the end. For example, if the string is \"hello\"\
    , the substring is \"ello\":\n\n```\nsubstring_anagrams = anagrams_of(string[1:])\n\
    ```\n\nNote how we use the top-down mentality to assume that the `anagrams_of`\
    \ function already works on the substring.\n\nWe then iterate over each of the\
    \ `substring_anagrams`:\n\n```\nfor substring_anagram in substring_anagrams:\n\
    ```\n\nBefore moving on, it's worth noting at this point that we are using a combination\
    \ of loops and recursion together. Using recursion doesn't mean that you *have*\
    \ to eliminate loops from your code altogether! We're using each tool in the way\
    \ that most naturally helps us solve the problem at hand.\n\nFor each substring\
    \ anagram, we iterate over each of its indexes—plus an extra index at the end.\
    \ For each index, we create a brand new string (called `new_string`), and fill\
    \ it with the substring anagram plus the first character of our current string\
    \ inserted at the current index:\n\n```\nfor index in range(len(substring_anagram)\
    \ + 1):\n    new_string = (substring_anagram[:index]\n                  + string[0]\n\
    \                  + substring_anagram[index:])\n```\n\nFor example, if the string\
    \ is \"abcd\" and the substring anagram is \"bcd\", we iterate over each index\
    \ (plus an extra index at the end), which comes out to 0 through 3, and create\
    \ the following new strings:\n\n```\n\"abcd\"  # inserted 'a' at index 0\n\"bacd\"\
    \  # inserted 'a' at index 1\n\"bcad\"  # inserted 'a' at index 2\n\"bcda\"  #\
    \ inserted 'a' at index 3\n```\n\nReally, the substring anagram \"bcd\" doesn't\
    \ *have* an index 3, but we iterate through index 3 so we can insert the \"a\"\
    \ at the very end of the substring anagram.\n\nEach new_string represents a new\
    \ anagram, so we add it to our collection:\n\n```\ncollection.append(new_string)\n\
    ```\n\nWhen we're done, we return the collection of anagrams.\n\nThe base case\
    \ is where the substring contains only one character, in which case there's only\
    \ one anagram—the character itself!\n\n## The Efficiency of Anagram Generation\n\
    \nAs an aside, let's stop for a moment to analyze the efficiency of our anagram-generating\
    \ algorithm, since we'll discover something interesting. In fact, the time complexity\
    \ of generating anagrams is a new category of Big O that we haven't encountered\
    \ before.\n\nIf we think about how many anagrams we generate, we'll notice an\
    \ interesting pattern.\n\nFor a string containing three characters, we create\
    \ permutations that start with each of the three characters. Each permutation\
    \ then picks its middle character from one of the two remaining characters, and\
    \ its last character from the last character that's left. This is 3 * 2 * 1, which\
    \ is six permutations.\n\nLooking at this for other string lengths, we get:\n\n\
    ```\n4 characters: 4 * 3 * 2 * 1          anagrams\n5 characters: 5 * 4 * 3 *\
    \ 2 * 1      anagrams\n6 characters: 6 * 5 * 4 * 3 * 2 * 1  anagrams\n```\n\n\
    Do you recognize this pattern? It's a factorial!\n\nSo if the string has six characters,\
    \ the number of anagrams is whatever the factorial of 6 is. This is 6 * 5 * 4\
    \ * 3 * 2 * 1, which computes to 720.\n\nThe mathematical symbol for factorial\
    \ is the exclamation point. So, factorial 6 is expressed as 6!, and the factorial\
    \ of 10 is expressed as 10!.\n\nRemember that Big O expresses the answer to the\
    \ key question: if there are N data elements, how many steps will the algorithm\
    \ take? In our case, N would be the length of the string."
  mdcn: "然而，进一步思考后，很明显除了这些路径外，没有其他可能的路径能到达顶部。毕竟，人不可能从第7级台阶直接跳到第11级台阶。因此我们可以得出结论：对于N级台阶，路径数量如下：\n\
    \nnumber_of_paths(n - 1) + number_of_paths(n - 2) + number_of_paths(n - 3)\n\n\
    除了基本情况外，这就是我们函数的代码！\n\n```\ndef number_of_paths(n):\n    return (number_of_paths(n\
    \ - 1)\n            + number_of_paths(n - 2)\n            + number_of_paths(n\
    \ - 3))\n```\n\n这看起来好得令人难以置信，但这几乎就是我们需要的全部代码。确实如此。剩下的就是处理基本情况了。\n\n## 阶梯问题的基本情况\n\
    \n确定这个问题的基本情况稍微有些棘手。因为当函数中的n值为3、2或1时，函数会调用自身处理n为0或更小的值。例如，number_of_paths(2)会调用number_of_paths(1)、number_of_paths(0)和number_of_paths(-1)。\n\
    \n我们可以通过硬编码所有底层情况来处理这个问题：\n\n```\ndef number_of_paths(n):\n    if n <= 0:\n  \
    \      return 0\n    if n == 1:\n        return 1\n    if n == 2:\n        return\
    \ 2\n    if n == 3:\n        return 4\n\n    return (number_of_paths(n - 1)\n\
    \            + number_of_paths(n - 2)\n            + number_of_paths(n - 3))\n\
    ```\n\n另一种设计基本情况的方法是巧妙地设置系统，使用一些看似奇怪但有效的基本情况，这些情况恰好能计算出正确的数字。让我解释一下我的意思。\n\n我们知道肯定希望number_of_paths(1)的结果为1，所以从以下基本情况开始：\n\
    \n```\nif n == 1:\n    return 1\n```\n\n现在，我们知道希望number_of_paths(2)返回2，但我们*不必*显式创建那个基本情况。相反，我们可以利用number_of_paths(2)会计算为number_of_paths(1)\
    \ + number_of_paths(0) + number_of_paths(-1)这一事实。由于number_of_paths(1)返回1，如果我们让number_of_paths(0)也返回1，number_of_paths(-1)返回0，那么总和就是2，这正是我们想要的。\n\
    \n因此我们可以添加以下基本情况：\n\n```\nif n < 0:\n    return 0\nif n == 0 or n == 1:\n    return\
    \ 1\n```\n\n接下来看number_of_paths(3)，它将返回number_of_paths(2) + number_of_paths(1)\
    \ + number_of_paths(0)的和。我们知道希望结果是4，所以看看数学计算是否成立。我们已经设置number_of_paths(2)返回2。number_of_paths(1)将返回1，number_of_paths(0)也将返回1，所以总和是4，这正是我们需要的。\n\
    \n我们完整的函数也可以写成：\n\n```\ndef number_of_paths(n):\n    if n < 0:\n        return\
    \ 0\n    if n == 0 or n == 1:\n        return 1\n    return (number_of_paths(n\
    \ - 1)\n            + number_of_paths(n - 2)\n            + number_of_paths(n\
    \ - 3))\n```\n\n虽然这不如我们之前的版本直观，但我们只用两行代码就覆盖了所有基本情况。\n\n如你所见，自顶向下的递归方法使解决这个问题变得比其他方法容易得多。\n\
    \n## 变位词生成\n\n作为我们讨论的压轴内容，让我们来解决目前最复杂的递归问题。我们将运用递归工具箱中的一切来完成这个任务。\n\n我们将编写一个函数，返回给定字符串的所有变位词数组。变位词是字符串中所有字符的重新排列。例如，\"\
    abc\"的变位词是：\n\n```\n[\"abc\",\n\"acb\",\n\"bac\",\n\"bca\",\n\"cab\",\n\"cba\"\
    ]\n```\n\n现在，假设我们要收集字符串\"abcd\"的所有变位词。让我们将自顶向下的思维方式应用到这个问题上。\n\n可以认为\"abcd\"的子问题是\"\
    abc\"。那么问题是：如果我们有一个能返回\"abc\"所有变位词的变位词函数，我们如何利用它们来生成\"abcd\"的所有变位词？思考一下，看看是否能想出任何方法。\n\
    \n这是我想到的方法。（还有其他方法。）\n\n如果我们有\"abc\"的所有六个变位词，我们可以通过将\"d\"插入每个\"abc\"变位词的每个可能位置来生成\"\
    abcd\"的所有排列：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_191_0.png)\n\n以下是该算法的Python实现。你会注意到它确实比本章前面的示例更复杂：\n\
    \n```\ndef anagrams_of(string):\n    if len(string) == 1:\n        return [string[0]]\n\
    \n    collection = []\n    substring_anagrams = anagrams_of(string[1:])\n    for\
    \ substring_anagram in substring_anagrams:\n        for index in range(len(substring_anagram)\
    \ + 1):\n            new_string = (substring_anagram[:index]\n               \
    \           + string[0]\n                          + substring_anagram[index:])\n\
    \            collection.append(new_string)\n\n    return collection\n```\n\n这段代码并不简单，让我们分解一下。目前，我们先跳过基本情况。\n\
    \n我们首先创建一个空数组，用于收集所有变位词：\n\n```\ncollection = []\n```\n\n这就是我们函数最后要返回的数组。\n\n\
    接下来，我们获取字符串子串的所有变位词数组。这个子串就是子问题字符串——即从第二个字符到末尾。例如，如果字符串是\"hello\"，子串就是\"ello\"\
    ：\n\n```\nsubstring_anagrams = anagrams_of(string[1:])\n```\n\n注意我们如何运用自顶向下的思维方式，假设`anagrams_of`函数在子串上已经能正常工作。\n\
    \n然后我们遍历每个`substring_anagrams`：\n\n```\nfor substring_anagram in substring_anagrams:\n\
    ```\n\n在继续之前，值得注意的是我们在这里结合使用了循环和递归。使用递归并不意味着你*必须*完全消除代码中的循环！我们以最自然的方式使用每种工具来解决当前问题。\n\
    \n对于每个子串变位词，我们遍历它的每个索引——包括末尾的一个额外索引。对于每个索引，我们创建一个全新的字符串（称为`new_string`），并用子串变位词加上当前字符串的第一个字符插入到当前索引处：\n\
    \n```\nfor index in range(len(substring_anagram) + 1):\n    new_string = (substring_anagram[:index]\n\
    \                  + string[0]\n                  + substring_anagram[index:])\n\
    ```\n\n例如，如果字符串是\"abcd\"，子串变位词是\"bcd\"，我们遍历每个索引（包括末尾的额外索引），即0到3，并创建以下新字符串：\n\n\
    ```\n\"abcd\"  # 在索引0处插入'a'\n\"bacd\"  # 在索引1处插入'a'\n\"bcad\"  # 在索引2处插入'a'\n\"\
    bcda\"  # 在索引3处插入'a'\n```\n\n实际上，子串变位词\"bcd\"没有索引3，但我们遍历索引3是为了能将\"a\"插入到子串变位词的末尾。\n\
    \n每个new_string代表一个新的变位词，所以我们将其添加到集合中：\n\n```\ncollection.append(new_string)\n\
    ```\n\n完成后，我们返回变位词集合。\n\n基本情况是子串只包含一个字符的情况，此时只有一个变位词——就是该字符本身！\n\n## 变位词生成的效率\n\
    \n顺便说一下，让我们停下来分析一下变位词生成算法的效率，因为我们会发现一些有趣的东西。事实上，生成变位词的时间复杂度是我们之前没有遇到过的一种新的大O类别。\n\
    \n如果我们思考生成了多少变位词，会注意到一个有趣的模式。\n\n对于包含三个字符的字符串，我们创建以三个字符中每个字符开头的排列。每个排列然后从剩余的两个字符中选择中间字符，从最后一个字符中选择最后一个字符。这是3\
    \ * 2 * 1，即六个排列。\n\n查看其他字符串长度，我们得到：\n\n```\n4个字符：4 * 3 * 2 * 1          个变位词\n\
    5个字符：5 * 4 * 3 * 2 * 1      个变位词\n6个字符：6 * 5 * 4 * 3 * 2 * 1  个变位词\n```\n\n你认出这个模式了吗？这是阶乘！\n\
    \n所以如果字符串有六个字符，变位词的数量就是6的阶乘。即6 * 5 * 4 * 3 * 2 * 1，计算结果为720。\n\n阶乘的数学符号是感叹号。所以，6的阶乘表示为6!，10的阶乘表示为10!。\n\
    \n记住，大O表示的是关键问题的答案：如果有N个数据元素，算法需要多少步？在我们的例子中，N是字符串的长度。"
