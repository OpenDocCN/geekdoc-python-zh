  md: 'Let''s look more carefully at a subsection of our hash table''s underlying
    data storage:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_135_0.png)


    In our example, the computer wants to add "pat" to cell 8, but it already contains
    "evil". So it replaces the contents of cell 8 with an array, as shown here:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_135_1.png)


    This array contains subarrays, where the first value is the word and the second
    value is its synonym.


    Let''s walk through how a hash table lookup works in this case. Say we look up
    the following word:


    ```

    thesaurus.get("dab")

    ```


    The computer takes the following steps:


    +   1. It hashes the key: DAB = 4 * 1 * 2 = 8.

    2. It looks up cell 8. The computer takes note that cell 8 contains an array of
    arrays rather than a single value.

    3. It searches through the array linearly, looking at index 0 of each subarray
    until it finds our key ("dab"). It then returns the value at index 1 of the correct
    subarray.


    Let''s walk through these steps visually.'
