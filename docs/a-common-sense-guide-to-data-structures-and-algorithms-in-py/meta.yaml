  - '[PAGE 168]


    The computer then proceeds to execute factorial(2). Now, factorial(2), in turn,
    calls factorial(1). Before the computer dives into factorial(1), though, the computer
    needs to remember that it''s still in the middle of factorial(2), so it pushes
    that onto the call stack as well:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_168_0.png)


    The computer then executes factorial(1). Since 1 is the base case, factorial(1)
    completes without calling the factorial method again.


    After the computer completes factorial(1), it checks the call stack to see whether
    it''s in the middle of any other functions. If there''s something in the call
    stack, it means that the computer still has work to do—namely, wrap up some other
    functions it was in the middle of.


    If you recall, stacks are restricted in that we can only pop its top element.
    This is ideal for recursion, since the top element will be *the most recently
    called function*, which is what the computer needs to wrap up next. It''s a LIFO
    situation: the function that was called last (that is, most recently) is the function
    we need to complete first.


    The next thing the computer does is pop the top element of the call stack, which
    currently is factorial(2):


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_168_1.png)


    The computer then completes its execution of factorial(2).


    Now, the computer pops the next item from the stack. By this time, only factorial(3)
    is left on the stack, so the computer pops it and therefore completes running
    factorial(3).


    At this point, the stack is empty, so the computer knows it''s done executing
    all of the methods, and the recursion is complete.


    Looking back at this example from a bird''s-eye view, you''ll see that the order
    in which the computer calculates the factorial of 3 is as follows:


    +   1. factorial(3) is called first. Before it''s done...

    2. factorial(2) is called second. Before it''s done...

    3. factorial(1) is called third.'
  - '[PAGE 169]


    +   4. factorial(1) is *completed* first.

    5. factorial(2) is completed based on the result of factorial(1).

    6. Finally, factorial(3) is completed based on the result of factorial(2).


    The factorial function is a calculation made based on recursion. The calculation
    is ultimately made by factorial(1) passing its result (which is 1) to factorial(2).
    Then factorial(2) multiplies this 1 by 2, yielding 2. and passes this result to
    factorial(3). Finally, factorial(3) takes this result and multiplies it by 3,
    computing the result of 6.


    Some refer to this idea as *passing a value up through the call stack*; that is,
    each recursive function returns its computed value to its “parent” function. Eventually,
    the function that was initially called first computes the final value.


    # Stack Overflow


    Let’s take a look back at the infinite recursion example from the beginning of
    the chapter. Recall that blah() called itself ad infinitum. What do you think
    will happen to the call stack?


    In the case of infinite recursion, the computer keeps pushing the same function
    again and again onto the call stack. The call stack grows and grows until, eventually,
    the computer reaches a point where there’s simply no more room in its short-term
    memory to hold all this data. This causes an error known as *stack overflow*—the
    computer just shuts down the recursion and says, “I refuse to call the function
    again, because I’m running out of memory!”


    # Filesystem Traversal


    Now that you’ve seen how recursion works, we can use it to solve certain problems
    that would otherwise be uncrackable.


    One type of problem in which recursion is a natural fit is when we need to delve
    into multiple layers of a problem without knowing how many layers there are.


    Take the example of traversing through a filesystem. Let’s say you have a script
    that does something with all the contents inside a directory, such as printing
    all the subdirectory names. However, you don’t want the script to only handle
    the immediate subdirectories—you want it to act on all the subdirectories *within*
    the subdirectories of the directory and all of *their* subdirectories, and so
    on.'
