  md: "# Code Implementation: Doubly Linked List Insertion\n\nWe'll look next at the\
    \ implementation of a new append method that we can add to our DoublyLinkedList\
    \ class. Instead of inserting a value anywhere in the list, the append method\
    \ simply adds a new value at the end of the list. We're focusing on appending,\
    \ rather than classical inserting, simply to highlight how easy and fast it is\
    \ to append to a doubly linked list. Here's the append method:\n\n```\ndef append(self,\
    \ value):\n    new_node = double_ended_node.Node(value)\n\n    if not self.first_node:\n\
    \        self.first_node = new_node\n        self.last_node = new_node\n    else:\n\
    \        new_node.previous_node = self.last_node\n        self.last_node.next_node\
    \ = new_node\n        self.last_node = new_node\n```\n\nLet's highlight the most\
    \ important parts of this method.\nFirst, we create the new node:\n\n```\nnew_node\
    \ = double_ended_node.Node(value)\n```\n\nAt first, our code handles the case\
    \ where the list doesn't contain any nodes yet. But let's jump to the case where\
    \ we append to an existing list.\nWe set the previous_node link of the new_node\
    \ to point to what until this point was the last node:\n\n```\nnew_node.previous_node\
    \ = self.last_node\n```\n\nThen we change the last node's link (which was None\
    \ until this point) and have it point to our new_node:\n\n```\nself.last_node.next_node\
    \ = new_node\n```\n\nLast, we tell our instance of the DoublyLinkedList that its\
    \ last node is our new_node:\n\n```\nself.last_node = new_node\n```\n\n# Moving\
    \ Forward and Backward\n\nWith a classic linked list, we can only move *forward*\
    \ through the list; that is, we can access the first node and follow the links\
    \ to find all the other nodes of the list. But we're not able to move backward,\
    \ as no node is aware of what the previous node is."
