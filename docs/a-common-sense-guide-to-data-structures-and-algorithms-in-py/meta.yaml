    \ which will start immediately to the left of the index of the temp_value. This\
    \ position will represent each value we compare against the temp_value:\n\n```\n\
    position = index - 1\n```\n\nAs we move through the pass-through, this position\
    \ will keep moving leftward as we compare each value to the temp_value.\n\nWe\
    \ then begin an inner while loop, which runs as long as position is greater than\
    \ or equal to 0:\n\n```\nwhile position >= 0:\n```\n\nWe then perform our comparison;\
    \ that is, we check whether the value at position is greater than the temp_value:\n\
    \n```\nif array[position] > temp_value:\n```\n\nIf it is, we shift that left value\
    \ to the right:\n\n```\narray[position + 1] = array[position]\n```\n\nWe then\
    \ decrement position by 1 to compare the next left value against the temp_value\
    \ in the next round of the while loop:\n\n```\nposition = position - 1\n```\n\n\
    If at any point we encounter a value at position that is less than or equal to\
    \ the temp_value, we can get ready to end our pass-through, since it's time to\
    \ move the temp_value into the gap:\n\n```\nelse:\n    break\n```"
