    \ that's how we achieve our goal of printing the book titles in alphabetical order.\
    \ Note that tree traversal is O(N), since by definition, traversal visits all\
    \ N nodes of the tree.\n\n## Wrapping Up\n\nThe binary search tree is a powerful\
    \ node-based data structure that provides order maintenance, while also offering\
    \ fast search, insertion, and deletion. It's more complex than its linked list\
    \ cousin, but it offers tremendous value.\n\nHowever, the binary search tree is\
    \ just one type of tree. Trees are of many different kinds, and each type brings\
    \ unique advantages to specialized situations. In the next chapter, we're going\
    \ to discover another tree that will bring unique speed advantages to a specific,\
    \ but common, scenario.\n\n## Exercises\n\nThe following exercises provide you\
    \ with the opportunity to practice with binary search trees. The solutions to\
    \ these exercises are found in the section [Chapter 15, on page 452](#).\n\n1.\
    \ Imagine you were to take an empty binary search tree and insert the following\
    \ sequence of numbers in this order: [1, 5, 9, 2, 4, 10, 6, 3, 8].\n\n    Draw\
    \ a diagram showing what the binary search tree would look like. Remember, the\
    \ numbers are being inserted in the order presented here.\n\n2. If a well-balanced\
    \ binary search tree contains 1,000 values, what is the maximum number of steps\
    \ it would take to search for a value within it?\n\n3. Write an algorithm that\
    \ finds the greatest value within a binary search tree.\n\n4. In the text, I demonstrated\
    \ how to use *inorder* traversal to print a list of all the book titles. Another\
    \ way to traverse a tree is known as *preorder* traversal. Here's the code for\
    \ it as applied to our book app:\n\n    ```\n    def traverse_and_print(node):\n\
    \        if not node:\n            return\n        print(node.value)\n       \
    \ traverse_and_print(node.left_child)\n        traverse_and_print(node.right_child)\n\
    \    ```\n\n    For the example tree in the text (the one with \"Moby Dick\" and\
    \ the other book titles), write out the order in which the book titles are printed\
    \ with preorder traversal. As a reminder, here's the example tree:\n\n    ![](img/c0a46c67bb2536aa545ec1bd7065e742_286_0.png)\n\
    \n5. Yet another form of traversal is called *postorder* traversal. Here's the\
    \ code as applied to our book app:\n\n    ```\n    def traverse_and_print(node):\n\
    \        if not node:\n            return\n        traverse_and_print(node.left_child)\n\
    \        traverse_and_print(node.right_child)\n        print(node.value)\n   \
    \ ```\n\n    For the example tree in the text (which also appears in the previous\
    \ exercise), write out the order in which the book titles are printed with postorder\
    \ traversal.\n\n# CHAPTER 16\n\n## Keeping Your Priorities Straight with Heaps\n\
    \nNow that we've discovered the tree, we've unlocked many new data structures.\
    \ In the previous chapter, we focused specifically on the binary search tree,\
    \ but there are many other types of trees as well. Like all data structures, each\
    \ type of tree comes with its own benefits and drawbacks, and the trick is knowing\
    \ which one to harness in a specific situation.\n\nIn this chapter, we'll explore\
    \ the heap, a type of tree data structure that has special powers that can be\
    \ leveraged for specific scenarios, in particular when we want to constantly keep\
    \ tabs on the greatest or least data element in a dataset.\n\nTo appreciate what\
    \ a heap can do, let's take a look at a completely different data structure: the\
    \ priority queue.\n\n## Priority Queues\n\nYou learned about [Queues, on page\
    \ 143](#), and discovered that the queue is a list in which items are processed\
    \ first in, first out (FIFO). Essentially, this means that data is inserted only\
    \ at the *end* of the queue, and data is accessed and removed only from the *front*\
    \ of the queue. In accessing the queue's data, we give precedence to the order\
    \ in which the data was inserted.\n\nA *priority queue* is a list whose deletions\
    \ and access are just like a classic queue but whose insertions are like an ordered\
    \ array. So we only delete and access data from the *front* of the priority queue,\
    \ but when we insert data, we always make sure the data remains sorted in a specific\
    \ order.\n\nOne classic example of where a priority queue is helpful is an application\
    \ that manages the triage system for a hospital emergency room. In the ER, we\
    \ don't treat people strictly in the order in which they arrived. Instead, we\
    \ treat people in the order of the severity of their symptoms. If someone suddenly\
    \ arrives with a life-threatening injury, that patient will be placed at the front\
    \ of the queue, even if the person with the flu had arrived hours earlier.\n\n\
    Let's say our triage system ranked the severity of a patient's condition on a\
    \ scale of 1 to 10, with 10 being the most critical. Our priority queue may look\
    \ like this:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_288_0.png)\n\nIn determining\
    \ the next patient to treat, we'll always select the patient at the front of the\
    \ priority queue, since that person's need is the most urgent. In this case, the\
    \ next patient we'd treat is Patient C.\n\nIf a new patient now arrives with a\
    \ condition severity of 3, we'll initially place this patient at the appropriate\
    \ spot within the priority queue. We'll call this person Patient E:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_288_1.png)\n\
    \nThe priority queue is an example of an abstract data type—one that can be implemented\
    \ using other, more fundamental, data structures. One straightforward way we can\
    \ implement a priority queue is by using an ordered array; that is, we use an\
    \ array and apply the following constraints:\n\n- When we insert data, we ensure\
    \ we always maintain proper order.\n- Data can only be removed from the end of\
    \ the array. (This will represent the front of the priority queue.)\n\nThis approach\
    \ is straightforward, but now let's analyze its efficiency.\n\nThe priority queue\
    \ has two primary operations: deletions and insertions.\n\nWe saw in [Chapter\
    \ 1, Why Data Structures Matter, on page 1](#), that deleting from the front of\
    \ an array is O(N), since we have to shift all the data over to fill the gap created\
    \ at index 0. However, we've cleverly tweaked our implementation so that we consider\
    \ the *end* of the array to be the *front* of the priority queue. This way, we're\
    \ always deleting from the end of the array, which is O(1)."
