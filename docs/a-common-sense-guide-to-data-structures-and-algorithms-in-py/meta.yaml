  md: 'But let''s see if we can push our algorithm''s speed even further.

    To determine whether we can optimize our algorithm further, we need to ask ourselves
    what we think the best-imaginable Big O is.

    Because N is just a single number, I could conceive that we can make an algorithm
    that takes just O(1) time. Since we don''t actually have to touch N items in an
    array or anything like that, if someone told me they figured out an algorithm
