  md: 'When checking whether the hash tables are equal with `return first_word_hash_table
    == second_word_hash_table`, Python under the hood probably takes up to another
    N + M steps. This is because Python has to iterate over each of the key-value
    pairs in the hash tables to make sure the pairs exist in both hash tables. However,
    this still totals just 2(N + M) steps, which reduces to O(N + M). This is much
    faster than any of our previous approaches.


    To be fair, we''re taking up some extra space with the creation of these hash
    tables. Our previous suggestion of sorting the two strings and comparing them
    would take up no extra space if we did the sorting in place. But if speed is what
    we''re after, we can''t beat the hash table approach, as we touch each character
    from the strings *just once*.


    By converting the strings into another data structure (in this case, hash tables),
    we were able to access the original data in such a way that allowed our algorithm
    to become blazing fast.


    It''s not always obvious what new data structure to use, so it''s good to imagine
    how the current data may look if it were converted into a variety of formats,
    and see if that reveals any optimizations. That being said, hash tables turn out
    very often to be a great choice, so that''s a good place to start.


    # Group Sorting


    Here''s another example of how changing the data structure can allow us to optimize
    our code. Let''s say we have an array containing several different values and
    we want to reorder the data so that the same values are grouped together. However,
    we don''t necessarily care what order the *groups* are in.


    For example, let''s say we have the following array:


    ```

    ["a", "c", "d", "b", "b", "c", "a", "d", "c", "b", "a", "d"]

    ```


    Our goal is to sort this into groups, like so:


    ```

    ["c", "c", "c", "a", "a", "a", "d", "d", "d", "b", "b", "b"]

    ```


    Again, we don''t care about the order of the groups, so these results would also
    be acceptable:


    ```

    ["d", "d", "d", "c", "c", "c", "a", "a", "a", "b", "b", "b"]

    ["b", "b", "b", "c", "c", "c", "a", "a", "a", "d", "d", "d"]

    ```


    Now, any classic sorting algorithm would accomplish our task, since we''d end
    up with this:


    ```

    ["a", "a", "a", "b", "b", "b", "c", "c", "c", "d", "d", "d"]

    ```'
