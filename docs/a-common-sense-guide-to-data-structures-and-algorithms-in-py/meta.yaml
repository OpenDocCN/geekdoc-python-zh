    \n`adjacent_vertices`数组包含此顶点连接到的所有顶点。我们可以使用`add_adjacent_vertex`方法向给定顶点添加一个新的相邻顶点。\n\
    \n以下是我们如何使用这个类来构建一个有向图，以表示下图中谁关注了谁：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_341_0.png)\n\
    \n```python\nalice = Vertex(\"alice\")\nbob = Vertex(\"bob\")\ncynthia = Vertex(\"\
