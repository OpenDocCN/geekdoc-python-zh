  - '[PAGE 38]


    Step 6: Insert "figs" at the end of the set:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_38_0.png)


    Inserting a value at the end of a set is the best-case scenario, but we still
    had to perform six steps for a set originally containing five elements. That is,
    we had to search all five elements before performing the final insertion step.


    Said another way: insertion into the end of a set will take up to N + 1 steps
    for N elements. This is because there are N steps of search to ensure that the
    value doesn''t already exist within the set, and then one step for the actual
    insertion. Contrast this with the regular array, in which such an insertion takes
    a grand total of one step.


    In the worst-case scenario, where we''re inserting a value at the *beginning*
    of a set, the computer needs to search N cells to ensure that the set doesn''t
    already contain that value, another N steps to shift all the data to the right,
    and another final step to insert the new value. That''s a total of 2N + 1 steps.
    Contrast this to insertion into the beginning of a regular array, which only takes
    N + 1 steps.


    Now, does this mean you should avoid sets just because insertion is slower for
    sets than regular arrays? Absolutely not. Sets are important when you need to
    ensure that there''s no duplicate data. (Hopefully, one day my phone book will
    be fixed.) But when you don''t have such a need, an array may be preferable, since
    insertions for arrays are more efficient than insertions for sets. You must analyze
    the needs of your own application and decide which data structure is a better
    fit.


    # Wrapping Up


    Analyzing the number of steps an operation takes is the heart of understanding
    the performance of data structures. Choosing the right data structure for your
    program can spell the difference between bearing a heavy load versus collapsing
    under it. In this chapter, you''ve learned to use this analysis to weigh whether
    an array or a set might be the appropriate choice for a given application.'
