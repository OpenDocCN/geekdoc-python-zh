  md: 'You can think of a queue as a line of people at the movie theater. The first
    one in the line is the first one to leave the line and enter the theater. With
    queues, the first item added to the queue is the first item to be removed. That''s
    why computer scientists apply the acronym FIFO to queues: *first in, first out*.


    As with a line of people, a queue is usually depicted horizontally. It''s also
    common to refer to the beginning of the queue as its *front* and the end of the
    queue as its *back*.


    Like stacks, queues are arrays with three restrictions (it''s just a different
    set of restrictions):


    +   - Data can be inserted only at the *end* of a queue. (This is identical behavior
    to the stack.)

    - Data can be deleted only from the *front* of a queue. (This is the opposite
    behavior of the stack.)

    - Only the element at the *front* of a queue can be read. (This, too, is the opposite
    of behavior of the stack.)


    Let''s see a queue in action, beginning with an empty queue.


    First, we insert a 5 (a common term for inserting into a queue is *enqueue*, but
    we''ll use the terms insert and enqueue interchangeably):


