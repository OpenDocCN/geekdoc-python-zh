    \n然而，当数据随机排序时，我们会在某些遍历中比较并移动所有数据，某些遍历中只比较和移动部分数据，或者可能不移动任何数据。如果你查看前面[第 80 页的“插入排序实战”](https://example.com)中的示例，你会注意到在第一次和第三次遍历中，我们比较并移动了所有遇到的数据。在第四次遍历中，我们只比较和移动了部分数据，而在第二次遍历中，我们只进行了一次比较，没有移动任何数据。\n\
