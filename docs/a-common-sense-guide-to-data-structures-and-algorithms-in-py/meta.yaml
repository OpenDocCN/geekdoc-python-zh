  - '[PAGE 229]


    The worst-case scenario for Quicksort is one in which the pivot always ends up
    on one side of the subarray instead of in the middle. This can happen where the
    array is in perfect ascending or descending order. The visualization for this
    process is shown here:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_229_0.png)


    In this diagram you can see that the pivot always ends up on the left end of each
    subarray.


    While in this case each partition still involves only one swap, we lose out because
    of the increased number of comparisons. In the first example, when the pivot always
    ended up toward the middle, each partition after the first one was conducted on
    relatively small subarrays (the largest subarray had a size of 4). In this example,
    however, the first five partitions take place on subarrays of size 4 or greater.
    And each of these partitions has as many comparisons as there are elements in
    the subarray.'
  - '[PAGE 230]


    So in this worst-case scenario, we have partitions of 8 + 7 + 6 + 5 + 4 + 3 +
    2 + 1 elements, which yields a total of 36 comparisons.


    To put this a little more formulaically, we''d say that for N elements, there
    are N + (N - 1) + (N - 2) + (N - 3) ... + 1 steps. We saw in our discussion of
    [Get All the Products, on page 103](https://example.com), that this computes to
    N² / 2 steps, which for the purposes of Big O is O(N²).


    So in a worst-case scenario, Quicksort has an efficiency of O(N²).


    # Quicksort vs. Insertion Sort


    Now that we''ve got Quicksort down, let''s compare it with one of the simpler
    sorting algorithms, such as Insertion Sort:


    | | Best Case | Average Case | Worst Case |

    |---|---|---|---|

    | Insertion Sort | O(N) | O(N²) | O(N²) |

    | Quicksort | O(N log N) | O(N log N) | O(N²) |


    We can see they have identical worst-case scenarios and that Insertion Sort is
    faster than Quicksort in a best-case scenario. However, the reason Quicksort is
    superior to Insertion Sort is because of the average scenario—which, again, is
    what happens most of the time. For average cases, Insertion Sort takes a whopping
    O(N²), while Quicksort is much faster at O(N log N).


    Because of Quicksort''s superiority in average circumstances, many programming
    languages use Quicksort under the hood of their built-in sorting functions. So
    it''s unlikely you''ll be implementing Quicksort yourself. However, a very similar
    algorithm can come in handy for practical cases—and it''s called Quickselect.


    # Quickselect


    Let''s say you have an array in random order, and you don''t need to sort it,
    but you do want to know the tenth-lowest value in the array, or the fifth-highest.
    This can be useful if we have a lot of test grades and want to know what the 25th
    percentile is, or if we want to find the median grade.


    One way to solve this would be to sort the entire array and then jump to the appropriate
    index.


    However, even were we to use a fast sorting algorithm like Quicksort, this algorithm
    would take at least O(N log N) for average cases. And while that isn''t bad, we
    can do even better with a brilliant little algorithm known as'
  - '[PAGE 231]


    Quickselect. Like Quicksort, Quickselect relies on partitioning and can be thought
    of as a hybrid of Quicksort and binary search.


    As you''ve seen earlier in this chapter, after a partition, the pivot value ends
    up in the appropriate spot in the array. Quickselect takes advantage of this in
    the following way:


    Let''s say we have an array of eight values, and we want to find the second-to-lowest
    value within the array.


    First, we partition the entire array:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_231_0.png)


    After the partition, the pivot will hopefully end up somewhere toward the middle
    of the array:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_231_1.png)


    This pivot is now in its correct spot, and since it''s in the fifth cell, we now
    know which value is the fifth-lowest value within the array.


    Now, we''re looking for the second-lowest value, not the fifth-lowest. But we
    *do* know that the second-lowest value is *somewhere to the left* of the pivot.
    We can now ignore everything to the right of the pivot and focus on the left subarray.
    It''s in this respect that Quickselect is similar to binary search: we keep dividing
    the array in half and focus on the half in which we know the value we''re seeking
    will be found.


    Next, we partition the subarray to the left of the pivot:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_231_2.png)


    Let''s say the new pivot of this subarray ends up the third cell:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_231_3.png)'
  - '[PAGE 232]


    We now know that the value in the third cell is in its correct spot, meaning it''s
    the third-to-lowest value in the array. By definition, then, the second-to-lowest
    value will be somewhere to its left. We can now partition the subarray to the
    left of the third cell:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_232_0.png)


    After this next partition, the lowest and second-lowest values will end up in
    their correct spots within the array:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_232_1.png)


    We can then grab the value from the second cell and know with confidence that
    it''s the second-lowest value in the entire array. One of the beautiful things
    about Quickselect is that we can find the correct value *without having to sort
    the entire array*.


    With Quicksort, each time we halved the array, we needed to re-partition every
    single element again (in their subarray form), giving us O(N log N). With Quickselect,
    on the other hand, each time we cut the array in half, we only had to partition
    the one half we cared about—the half in which we know our value is to be found.


