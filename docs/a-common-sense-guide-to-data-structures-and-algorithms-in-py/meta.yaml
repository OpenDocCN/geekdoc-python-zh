    ![](img/c0a46c67bb2536aa545ec1bd7065e742_67_1.png)


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_67_2.png)


    # Bubble Sort in Action


    Let''s walk through a complete example of Bubble Sort.


    Assume we want to sort the array [4, 2, 7, 1, 3]. It''s currently out of order,
    and we want to produce an array that contains the same values in ascending order.'
