    \ the N books, we need to loop through M authors to find the book's author.\n\n\
    Now, let's see if we can do better.\n\nAgain, the first thing we need to do is\
    \ come up with the best-imaginable Big O. In this case, we definitely need to\
    \ iterate over all N books, so it would seem impossible to beat O(N). Since O(N)\
    \ is the fastest speed I can think of that isn't downright impossible, we'll say\
    \ that O(N) is our best-imaginable Big O.\n\nWe're now ready to use the new magical\
    \ lookups technique. To do this, I'll ask myself the question mentioned at the\
    \ start of this section: \"If I could magically find a desired piece of information\
    \ in O(1) time, can I make my algorithm faster?\"\n\nLet's apply this to our scenario.\
    \ We currently run an outer loop that iterates over all the books. Currently,\
    \ for each book, we run an inner loop that tries to find the book's author_id\
    \ in the authors array.\n\nBut what if we had the magical ability to find an author\
    \ *in just O(1) time*? What if we didn't have to loop through *all* the authors\
    \ each time we wanted to look one up and we could instead find the author immediately?\
    \ That would bring a huge speed boost to our algorithm, as we could potentially\
    \ eliminate our inner loop and bring our code's speed up to the vaunted O(N).\n\
    \nNow that we've determined that this magical finding ability could help us, the\
    \ next step is to try to make this magic come alive.\n\n## Bringing in the Extra\
    \ Data Structure\n\nOne of the easiest ways we can achieve this magical lookup\
    \ ability is to bring an additional data structure into our code. We'll use this\
    \ data structure to specifically store data in such a way that allows us to look\
    \ that data up quickly. In many cases, the hash table is the perfect data structure\
    \ for this, since it has O(1) lookups, as you learned in [Chapter 8, Blazing Fast\
    \ Lookup with Hash Tables, on page 113](Chapter 8, Blazing Fast Lookup with Hash\
    \ Tables, on page 113).\n\nRight now, because the author hash tables are stored\
    \ in an array, it will always take us O(M) steps (M being the number of authors)\
    \ to find any given author_id within that array. But if we store that same information\
    \ in a hash table, we now gain our magical ability to find each author in just\
    \ O(1) time.\n\nHere's one possibility of what this hash table could look like:\n\
    \n```\nauthor_hash_table = {\n    1: \"Virginia Woolf\",\n    2: \"Leo Tolstoy\"\
    ,\n    3: \"Dr. Seuss\",\n    4: \"J. K. Rowling\",\n    5: \"Mark Twain\"\n}\n\
    ```\n\nIn this hash table, each key is the author's ID, and the value of each\
    \ key is the author's name.\n\nSo let's optimize our algorithm by first moving\
    \ the authors data into this hash table and only then run our loop through the\
    \ books:\n\n```\ndef connect_books_with_authors(books, authors):\n    books_with_authors\
    \ = []\n    author_hash_table = {}\n\n    for author in authors:\n        author_hash_table[author[\"\
    author_id\"]] = author[\"name\"]\n\n    for book in books:\n        books_with_authors.append({\"\
    title\": book[\"title\"],\n                                  \"author\": author_hash_table[book[\"\
    author_id\"]]})\n\n    return books_with_authors\n```\n\nIn this version, we first\
    \ iterate through the authors array and use that data to create the author_hash_table.\
    \ This takes M steps, with M being the number of authors.\n\nWe then iterate through\
    \ the list of books and use the `author_hash_table` to “magically” find each author\
    \ in a single step. This loop takes N steps, with N being the number of books.\n\
    \nThis optimized algorithm takes a grand total of O(N + M) steps, since we run\
    \ a single loop through the N books, and a single loop through the M authors.\
    \ This is drastically faster than our original algorithm, which took O(N * M).\n\
    \nIt's worth noting that by creating the extra hash table, we're using up an additional\
    \ O(M) space, whereas our initial algorithm didn't take up any extra space at\
    \ all. However, this is great optimization if we're willing to sacrifice the memory\
    \ for the sake of speed.\n\nWe made this magic happen by first dreaming what magical\
    \ O(1) lookups could do for us, and we then granted ourselves our own wish by\
    \ using a hash table to store our data in an easy-to-find way.\n\nThe fact that\
    \ we can look up hash table data in O(1) time isn't new, as we looked at this\
