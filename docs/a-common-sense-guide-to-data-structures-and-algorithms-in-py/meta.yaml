  md: "```\ndef double_array(array):\n    index = 0\n    while index < len(array):\n\
    \        array[index] *= 2\n        index += 1\n```\n\nIn our recursive version,\
    \ though, the only argument to our function is the array. We need some way to\
    \ keep track of and increment an index. How do we pull this off?\n\nAnd now for\
    \ our next trick...\n\nLet's pass in extra parameters!\n\nLet's modify the beginning\
    \ of our function so that it accepts *two* arguments—the array itself and an index\
    \ to keep track of. Here's the code:\n\n```\ndef double_array(array, index):\n\
    ```\n\nAs things stand right now, when we call this function, we need to pass\
    \ in the array and the starting index, which will be 0:\n\n```\ndouble_array([1,\
    \ 2, 3, 4, 5], 0)\n```\n\nOnce we have the index as a function argument, we have\
    \ a way of incrementing and tracking the index as we make each successive recursive\
    \ call. Here's the code for this:\n\n```\ndef double_array(array, index):\n  \
    \  array[index] *= 2\n    double_array(array, index + 1)\n```\n\nIn each successive\
    \ call, we pass in the array again as the first argument, but we also pass along\
    \ an incremented index. This allows us to keep track of an index just as we would\
    \ in a classical loop.\n\nOur code isn't perfect just yet, though. Our function\
    \ will throw an error once the index goes past the end of the array and tries\
    \ to multiply a nonexistent number. To solve this, we need our base case:\n\n\
    ```\ndef double_array(array, index):\n    # Base case: when the index goes past\
    \ the end of the array\n    if index >= len(array):\n        return\n\n    array[index]\
    \ *= 2\n    double_array(array, index + 1)\n```"
