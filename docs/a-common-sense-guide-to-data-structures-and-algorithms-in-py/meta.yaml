    \n\nIndeed, you may not need a new mental strategy for simpler computations. But\
    \ when it comes to more complex functions, you may find that the recursive mindset\
    \ makes the writing of code much easier. It certainly does for me!\n\nHere's one\
    \ of my favorite examples. A famous question—known as the *staircase problem*—goes\
    \ like this:\n\nLet's say we have a staircase of N steps, and a person has the\
    \ ability to climb one, two, or three steps at a time. How many different possible\
    \ \"paths\" can someone take to reach the top? Write a function that will calculate\
    \ this for N steps. The following image displays three possible paths of jumping\
    \ up a five-step staircase.\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_187_0.png)\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_187_1.png)\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_187_2.png)\n\
    \nThese are just three of many possible paths.\n\nLet's first explore this problem\
    \ with a bottom-up approach. That is, we'll work our way up from the simplest\
    \ cases to the more complex ones.\n\nObviously, if there's only one step, there's\
    \ only one possible path.\n\nWith two steps, there are two paths. The person can\
    \ climb one step twice, or the person can jump up two steps at once. I'll write\
    \ this like so:\n\n```\n1, 1\n2\n```\n\nWith a staircase of three steps, someone\
    \ could take one of four possible paths:\n\n```\n1, 1, 1\n1, 2\n2, 1\n3\n```\n\
    \nWith four steps, there are seven options:\n\n```\n1, 1, 1, 1\n1, 1, 2\n1, 2,\
    \ 1\n1, 3\n2, 1, 1\n2, 2\n3, 1\n```\n\nGo ahead and try to draw up all the combinations\
    \ for a five-step staircase. It's not that easy! And this is just five steps.\
    \ Imagine how many combinations there are for, say, eleven steps.\n\nNow, let's\
    \ get to the question at hand: how would we *write the code* to count all the\
    \ paths?\n\nWithout the recursive mindset, it can be difficult to wrap one's mind\
    \ around the algorithm for making this calculation. However, with the top-down\
    \ way of thinking, the problem can become surprisingly easy.\n\nFor an eleven-step\
    \ staircase, the first subproblem that comes to mind is a ten-step staircase.\
    \ Let's go with that for now. If we knew how many possible paths there are to\
    \ climb a ten-step staircase, can we use that as a base for calculating the paths\
    \ for an eleven-step staircase?\n\nFor starters, we do know that climbing an eleven-step\
    \ staircase will take *at least* as many steps as climbing a ten-step staircase.\
    \ That is, we have all the paths to get to stair number 10, and from there, one\
    \ can climb one more step to get to the top.\n\nHowever, this can't be the complete\
    \ solution, since we know that someone can also jump to the top from stair numbers\
    \ 9 and 8 as well.\n\nIf we think about it further, we'll realize that if you're\
