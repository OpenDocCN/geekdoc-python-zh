  - '[PAGE 141]


    Here''s a simple array:


    ```

    array = [61, 30, 91, 11, 54, 38, 72]

    ```


    If you want to search for a number in this array, how many steps would it take?


    Because the array is unordered, you''d have to perform a linear search, which
    would take N steps—you learned this back at the beginning of the book.


    However, what would happen if we ran some code that would convert these numbers
    into a hash table that looked like this?


    ```

    hash_table = {61: True, 30: True, 91: True,

    11: True, 54: True, 38: True, 72: True}

    ```


    Here, we''ve stored each number as a key and assigned the Boolean True as the
    associated value for each number.


    Now, if I asked you to search this hash table for a certain number as a key, how
    many steps would it take?


    Well, I could use this simple code:


    ```

    hash_table.get(72)

    ```


    And I could look up the number 72 in a single step.


    In other words, by doing a hash table lookup using 72 as the key, I can determine
    in one step whether the 72 is present in the hash table. The reasoning is straightforward:
    if 72 is a key in the hash table, I''d get back True, since the 72 has True as
    its value. On the other hand, if the 72 is *not* a key in the hash table, I''d
    get back None.


    Since doing a hash table lookup takes just one step, I can therefore find any
    number in the hash table (as a key) in one step.


    Can you see the magic?


    By converting an array into a hash table in this way, we can go from O(N) searches
    to O(1) searches.


    Here''s what''s interesting about using a hash table in this way. Even though
    hash tables are often used for naturally paired data, our data here is *not* paired.
    We just care about a list of single numbers.


    While we did assign a value to each key, it doesn''t really matter what the value
    is. We used True as the value for each key, but any arbitrary value (that is "truthy")
    would achieve the same results.'
  - '[PAGE 142]


    The trick here is that by placing each number in the hash table as a key, we can
    later look up each of those keys in one step. If our lookup returns any value,
    it means the key itself must be in the hash table. If we get back None, then the
    key must not be in the hash table.


    I refer to using a hash table in this way as “using it as an index.” (It’s my
    own term.) An index at the back of a book tells you whether the topic can be found
    in the book instead of you having to flip through all the pages to find it. Here
    as well, we created the hash table to serve as a kind of index; in our case, it’s
    an index that tells us whether a specific item is contained within the original
    array.


    Let’s use this technique to boost the speed of a very practical algorithm.


    # Array Subset


    Let’s say we need to determine whether one array is a subset of another array.
    Take these two arrays, for example:


    ```

    ["a", "b", "c", "d", "e", "f"]

    ["b", "d", "f"]

    ```


    The second array, ["b", "d", "f"], is a subset of the first array, ["a", "b",
    "c", "d", "e", "f"], because every value of the second array is contained within
    the first array.


    However, say our arrays were these:


    ```

    ["a", "b", "c", "d", "e", "f"]

    ["b", "d", "f", "h"]

    ```


    The second array is *not* a subset of the first array, because the second array
    contains the value "h", which does not exist within the first array.


    How would we write a function that compares two arrays and lets us know if one
    is a subset of the other?


    One way we can do this is by using nested loops. Essentially, we’d iterate through
    every element of the smaller array, and for each element in the smaller array,
    we’d then begin a second loop that iterates through each element of the larger
    array. If we ever find an element in the smaller array that isn’t contained within
    the larger array, our function will return False. If the code gets past the loops,
    it means it never encountered a value in the smaller array that wasn’t contained
    within the larger array, so it returns True.'
