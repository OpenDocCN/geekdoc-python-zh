    \ know intuitively that 2 + 8 = 10.\n\nEssentially, then, we can calculate any\
    \ number's counterpart by subtracting it from 10. Because 10 - 2 = 8, that means\
    \ 8 is the 2's counterpart.\n\nWe now have all the ingredients to create a really\
    \ fast algorithm:\n\n```\npython\ndef two_sum(array):\n    hash_table = {}\n\n\
    \    for value in array:\n        if hash_table.get(10 - value):\n           \
    \ return True\n        else:\n            hash_table[value] = True\n\n    return\
    \ False\n```\n\nThis algorithm iterates once through each number in the array.\n\
    \nAs we visit each number, we check whether the hash table contains a key that\
    \ is the counterpart of the current number. We calculate this as 10 - value. (For\
    \ example, if value is 3, the counterpart would be 7, since 10 - 3 = 7.)\n\nIf\
    \ we find any number's counterpart, we immediately return `True`, as that means\
    \ we've found two numbers that add up to 10.\n\nAdditionally, as we iterate over\
    \ each number, we insert the number as a key into the hash table. This is how\
