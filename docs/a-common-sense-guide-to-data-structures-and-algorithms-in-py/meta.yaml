  md: "to look one up and we could instead find the author immediately? That would\
    \ bring a huge speed boost to our algorithm, as we could potentially eliminate\
    \ our inner loop and bring our code's speed up to the vaunted O(N).\n\nNow that\
    \ we've determined that this magical finding ability could help us, the next step\
    \ is to try to make this magic come alive.\n\n# Bringing in the Extra Data Structure\n\
    \nOne of the easiest ways we can achieve this magical lookup ability is to bring\
    \ an additional data structure into our code. We'll use this data structure to\
    \ specifically store data in such a way that allows us to look that data up quickly.\
    \ In many cases, the hash table is the perfect data structure for this, since\
    \ it has O(1) lookups, as you learned in [Chapter 8, Blazing Fast Lookup with\
    \ Hash Tables, on page 113](Chapter 8, Blazing Fast Lookup with Hash Tables, on\
    \ page 113).\n\nRight now, because the author hash tables are stored in an array,\
    \ it will always take us O(M) steps (M being the number of authors) to find any\
    \ given author_id within that array. But if we store that same information in\
    \ a hash table, we now gain our magical ability to find each author in just O(1)\
    \ time.\n\nHere's one possibility of what this hash table could look like:\n\n\
    author_hash_table =\n{1: \"Virginia Woolf\", 2: \"Leo Tolstoy\", 3: \"Dr. Seuss\"\
    ,\n4: \"J. K. Rowling\", 5: \"Mark Twain\"}\n\nIn this hash table, each key is\
    \ the author's ID, and the value of each key is the author's name.\n\nSo let's\
    \ optimize our algorithm by first moving the authors data into this hash table\
    \ and only then run our loop through the books:\n\n```\ndef connect_books_with_authors(books,\
