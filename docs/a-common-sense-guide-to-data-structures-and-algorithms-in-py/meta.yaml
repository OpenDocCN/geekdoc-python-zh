    \ path from Idris to Lina will be through Kamil. This table is similar to the\
    \ `cheapest_previous_stopover_city_table` from Dijkstra's algorithm.\n\nIn fact,\
    \ whenever we visit *any* vertex, the shortest path from Idris to that vertex\
