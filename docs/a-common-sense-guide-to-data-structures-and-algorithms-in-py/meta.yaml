    \n我们现在开始第三次遍历。\n\n设置：我们从索引 2 开始，其中包含值 7。7 是这次遍历中到目前为止遇到的最低值：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_85_1.png)\n\
