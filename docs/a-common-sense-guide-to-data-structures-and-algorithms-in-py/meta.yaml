    +   1. Imagine the function you''re writing has already been implemented by someone
    else.

    2. Identify the subproblem of the problem.

    3. See what happens when you call the function on the subproblem and go from there.


    While these steps sound vague at the moment, they''ll become more clear through
    the following examples.


    # Array Sum


    Say we have to write a function called sum that sums up all the numbers in a given
    array. For example, if we pass the array [1, 2, 3, 4, 5] into the function, it''ll
    return 15, which is the sum of those numbers.


    The first thing we''ll do is imagine that the sum function has already been implemented.
    Admittedly, this takes a certain suspension of disbelief, since we know that we''re
    in the middle of writing this function as we speak! But let''s try to let go and
    pretend that the sum function already works.


    Next, let''s identify the subproblem. This can be more of an art than a science,
    but practice will help you get better at it. In our case, we can say that the
    subproblem is the array [2, 3, 4, 5]—that is, all the numbers from the array save
    the first one.


    Finally, let''s see what happens when we apply the sum function to our subproblem.
    If the sum function “already works,” and the subproblem is [2, 3, 4, 5], what
    happens when we call sum([2, 3, 4, 5])? Well, we get the sum of 2 + 3 + 4 + 5,
    which is 14.


    To solve our problem of finding the sum of [1, 2, 3, 4, 5] then, we can just add
    the first number, 1, to the result of sum([2, 3, 4, 5]).


    In pseudocode, we''d write something like this:


    ```

    return array[0] + sum(the remainder of the array)

    ```


    In Python, we can write this like so:


    ```

    return array[0] + sum(array[1:])

    ```


    (In Python, the syntax array[1:] returns a new array that has the contents of
    the original array starting from index 1 until the end.)'
