    Here''s an example of the menu as implemented with a hash table:


    ```

    menu = { "french fries": 0.75, "hamburger": 2.5,

    "hot dog": 1.5, "soda": 0.6 }

    ```


    A hash table is a list of paired values. The first item in each pair is called
    the *key*, and the second item is called the *value*. In a hash table, the key
    and value have some significant association with one another. In this example,
    the string, “french fries” is the key, and 0.75 is the value. They are paired
    together to indicate that french fries cost 75 cents.


    In Python, you can look up a key''s value using this syntax:


    ```

    menu.get("french fries")

    ```


    This would return the value 0.75.


    Alternatively, you can look up a key''s value this way:


    ```

    menu["french fries"]

    ```


    However, this latter approach triggers an error if the key doesn''t exist in the
    hash table. Therefore, we''ll use the former approach, which simply returns None
    if the key isn''t found.


    Looking up a value in a hash table has an efficiency of O(1) on average, as it
    usually takes *just one step*. Let''s see why.


