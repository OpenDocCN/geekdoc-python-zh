- img_proc: true
  md: "We now reach a 4. Again, this is the beginning of a new subsection, so the\
    \ current sum is 4, which also becomes the greatest sum we've seen yet:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_425_0.png)\n\
    \nNext, we encounter the -3. The current sum is now 1:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_425_1.png)\n\
    \nWe next come upon a 5. This makes the current sum 6, which is the greatest sum\
    \ as well:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_425_2.png)\n\nFinally,\
    \ we reach the -9. This would make the current sum -3, in which case we'd reset\
    \ it to 0. However, we've also reached the end of the array, and we can conclude\
    \ the greatest sum is 6. And, indeed, that is the correct result.\n\nHere's the\
    \ code for this approach:\n\n```\npython\ndef max_sum(array):\n    current_sum\
    \ = 0\n    greatest_sum = 0\n\n    for num in array:\n        if current_sum +\
    \ num < 0:\n            current_sum = 0\n        else:\n            current_sum\
    \ += num\n            if current_sum > greatest_sum:\n                greatest_sum\
    \ = current_sum\n\n    return greatest_sum\n```\n\nUsing this greedy algorithm,\
    \ we were able to solve this thorny problem in just O(N) time, as we loop through\
    \ the array of numbers just once. That's a great improvement over our initial\
    \ O(N²) approach. In terms of space, this algorithm is O(1), as we don't generate\
    \ any extra data."
