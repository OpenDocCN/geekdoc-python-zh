  md: '# Designing Data Governance from the Ground Up


    Businesses own more data than ever before, but it’s of no value if you don’t know
    how to use it. Data governance manages the people, processes, and strategy needed
    for deploying data projects to production. But doing it well is far from easy:
    Less than one fourth of business leaders say their organizations are data driven.
    In *Designing Data Governance from the Ground Up*, you’ll build a cross-functional
    strategy to create roadmaps and stewardship for data-focused projects, embed data
    governance into your engineering practice, and put processes in place to monitor
    data after deployment.


    Lauren Maffeo

    (100 pages) ISBN: 9781680509809. $29.95

    https://pragprog.com/book/lmmllops


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_487_0.png)


    # Concurrent Data Processing in Elixir


    Learn different ways of writing concurrent code in Elixir and increase your application’s
    performance, without sacrificing scalability or fault-tolerance. Most projects
    benefit from running background tasks and processing data concurrently, but the
    world of OTP and various libraries can be challenging. Which Supervisor and what
    strategy to use? What about GenServer? Maybe you need back-pressure, but is GenStage,
    Flow, or Broadway a better choice? You will learn everything you need to know
    to answer these questions, start building highly concurrent applications in no
    time, and write code that’s not only fast, but also resilient to errors and easy
    to scale.


    Svilen Gospodinov

    (174 pages) ISBN: 9781680508192. $39.95

    https://pragprog.com/book/sgdpelixir


