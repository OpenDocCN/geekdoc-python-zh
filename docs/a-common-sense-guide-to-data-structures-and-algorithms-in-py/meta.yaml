    \ 章\n\n## 用大 O 加速你的代码\n\n大 O 表示法是表达算法效率的一个绝佳工具。我们已经能够用它来量化二分查找与线性查找之间的差异，因为二分查找是\
    \ O(log N)——一个比线性查找（O(N)）快得多的算法。\n\n有了大 O，你还有机会将你的算法与*世界上通用的算法*进行比较，你可以对自己说：“就一般算法而言，这是一个快算法还是慢算法？”\n\
