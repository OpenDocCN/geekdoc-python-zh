  - "[PAGE 88]\n\nIndeed, if we find a lower value, we store this new value's index\
    \ in lowest_number_index:\n\n```\nif array[j] < array[lowest_number_index]:\n\
    \    lowest_number_index = j\n```\n\nBy the end of the inner loop, we'll have\
