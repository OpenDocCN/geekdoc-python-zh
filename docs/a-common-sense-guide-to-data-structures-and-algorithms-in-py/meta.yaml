    \ it.\n\nStacks and queues handle this kind of temporary data but have a special\
    \ focus on the *order* in which the data is handled, as you'll now learn.\n\n\
    ## Stacks\n\nA *stack* stores data in the same way arrays do—it's simply a list\
    \ of elements. The one catch is that stacks have the following three constraints:\n\
    \n- Data can be inserted only at the end of a stack.\n- Data can be deleted only\
    \ from the end of a stack.\n- Only the last element of a stack can be read.\n\n\
    You can think of a stack as an actual stack of dishes; you can't look at the face\
    \ of any dish other than the one at the top. Similarly, you can't add any dish\
    \ except to the top of the stack, nor can you remove any dish besides the one\
    \ at the top. (At least, you shouldn't.) In fact, most computer science literature\
    \ refers to the end of the stack as its *top* and the beginning of the stack as\
    \ its *bottom*.\n\nOur diagrams will reflect this terminology by viewing stacks\
    \ as vertical arrays, like so:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_148_0.png)\n\
    \nAs you can see, the first item in the array becomes the bottom of the stack,\
    \ while the last item becomes the stack's top.\n\nWhile the restrictions of a\
    \ stack seem—well—restrictive, we'll see shortly how they're to our benefit.\n\
    \nTo see a stack in action, let's start with an empty stack.\n\nInserting a new\
    \ value into a stack is also called *pushing onto the stack*. Think of it as adding\
    \ a dish onto the top of the dish stack.\n\nLet's push a 5 onto the stack:\n\n\
    ![](img/c0a46c67bb2536aa545ec1bd7065e742_148_1.png)\n\nAgain, there's nothing\
    \ fancy going on here. All we're really doing is just inserting a data element\
    \ into the end of an array.\n\nNow let’s push a 3 onto the stack:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_149_0.png)\n\
    \nNext, let’s push a 0 onto the stack:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_149_1.png)\n\
    \nNote that we’re always adding data to the top (that is, the end) of the stack.\
    \ If we wanted to insert the 0 into the bottom or middle of the stack, we couldn’t,\
    \ because that’s the nature of a stack: data can only be added to the top.\n\n\
    Removing elements from the top of the stack is called *popping from the stack*.\
    \ Because of a stack’s restrictions, we can only pop data from the top.\n\nLet’s\
    \ pop some elements from our example stack.\n\nFirst, we pop the 0:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_149_2.png)\n\
    \nOur stack now contains only two elements: the 5 and the 3.\n\nNext, we pop the\
    \ 3:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_149_3.png)\n\nOur stack now only\
    \ contains the 5:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_149_4.png)\n\nA\
    \ handy acronym used to describe stack operations is LIFO, which stands for *last\
    \ in, first out*. All this means is the *last* item *pushed* onto a stack is always\
    \ the *first* item *popped* from it. It's sort of like students who slack off—they're\
    \ always the last to arrive to class but the first to leave.\n\n## Abstract Data\
    \ Types\n\nMost programming languages don't come with the stack as a built-in\
    \ data type or class. Instead, it's up to you to implement it yourself. This is\
    \ a stark contrast with arrays, which are available in most languages.\n\nTo create\
    \ a stack, then, you generally have to use one of the built-in data structures\
    \ to hold the data. Here's one way to implement a stack using Python, which uses\
    \ an array under the hood:\n\n```\nclass Stack:\n    def __init__(self):\n   \
    \     self.data = []\n\n    def push(self, element):\n        self.data.append(element)\n\
    \n    def pop(self):\n        if len(self.data) > 0:\n            return self.data.pop()\n\
    \        else:\n            return None\n\n    def read(self):\n        if len(self.data)\
    \ > 0:\n            return self.data[-1]\n        else:\n            return None\n\
    ```\n\nAs you can see, our stack implementation stores the data in an array called\
    \ self.data.\n\nWhenever a stack is initiated, we automatically build an empty\
    \ array with self.data = []. Our stack also contains methods that push a new element\
    \ onto the end of self.data, pop an element from the beginning of self.data, and\
    \ read the first element from the self.data array. (The read and pop methods return\
    \ None if the stack is empty.)\n\nHowever, by building the Stack class around\
    \ the array, we've built an interface that forces the user to interact with the\
    \ array in limited ways. While one can normally read from any index of an array,\
    \ when using the array through the stack interface, one can only read the last\
    \ item. The same goes for inserting and deleting data.\n\nThe stack data structure,\
    \ then, isn't the same kind of data structure that an array is. The array is built\
    \ into most programming languages and interacts directly with the computer's memory.\
    \ The stack, on the other hand, is a set of rules and processes around how we\
    \ should interact with an array so that we can achieve a particular result.\n\n\
    In fact, a stack doesn't even care about *what* data structure is under the hood.\
    \ All it cares about is that there's a list of data elements that act in a LIFO\
    \ way. Whether we accomplish this with an array or some other type of built-in\
    \ data structure doesn't matter. Because of this, the stack is an example of what\
    \ is known as an *abstract data type*—it's a kind of data structure that is a\
    \ set of theoretical rules that revolve around some other built-in data structure.\n\
    \nThe set we encountered in [Chapter 1, Why Data Structures Matter, on page 1](...),\
    \ is another example of an abstract data type. Some implementations of sets use\
    \ arrays under the hood, while other implementations use hash tables. The set\
    \ itself, though, is simply a theoretical concept: it's a list of non-duplicated\
