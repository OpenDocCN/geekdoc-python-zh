  md: '# Deleting a Node with Two Children


    Deleting a node that has two children is the most complex scenario. Let''s say
    we want to delete the 56 in this tree:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_272_0.png)


    What are we going to do with its former children, 52 and 61? We can''t move *both*
    of them to where the 56 was. This is where the next rule of the deletion algorithm
    comes into play:


    +   - When deleting a node with two children, replace the deleted node with the
    *successor* node. The successor node is the child node whose value is the *least
    of all values that are greater than the deleted node*.


    That was a tricky sentence. To put it in other words: if we were to put the deleted
    node and all of its descendants in ascending order, the successor node would be
    the next number after the one we just deleted.


    In this case, it''s easy to figure out which node is the successor since the deleted
    node had only two descendants. If we put the numbers 52-56-61 in ascending order,
    the next number after 56 is 61.


    Once we find the successor node, we plug it into where the deleted node was. So
    we replace the 56 with the 61:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_272_1.png)'
