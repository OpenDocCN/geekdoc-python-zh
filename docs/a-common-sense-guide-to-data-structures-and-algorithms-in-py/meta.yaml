    \     if is_i_the_greatest:\n            return i\n```\n\n# CHAPTER 5\n\n## Optimizing\
    \ Code With and Without Big O\n\nWe've seen that Big O notation is a great tool\
    \ for comparing algorithms and determining which algorithm should be used for\
    \ a given situation. However, it's certainly not the *only* tool. In fact, there\
    \ may be times when two competing algorithms are described in the same way using\
