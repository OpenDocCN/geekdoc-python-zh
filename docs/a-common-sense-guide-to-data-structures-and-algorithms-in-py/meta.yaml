    In the next diagram, you can see our shopping list array with its indexes and
    memory addresses:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_27_0.png)


    When the computer reads a value at a particular index of an array, it can jump
    straight to that index because of the combination of the following facts about
    computers:


    +   1. A computer can jump to any *memory address* in one step. For example, if
    you asked a computer to inspect whatever''s at memory address 1063, it can access
    that without having to perform any search process. As an analogy, if I ask you
    to raise your right pinky finger, you wouldn''t have to search all your fingers
    to find which one is your right pinky. You''d be able to identify it immediately.'
  - '[PAGE 28]


    2. Whenever a computer allocates an array, it also makes note at which memory
    address the array *begins*. So if we asked the computer to find the first element
    of the array, it would be able to instantly jump to the appropriate memory address
    to find it.


    Now, these facts explain how the computer can find the *first* value of an array
    in a single step. However, a computer can also find the value at *any* index by
    performing simple addition. If we asked the computer to find the value at index
    3, the computer would simply take the memory address at index 0 and add 3. (Memory
    addresses are sequential, after all.)


    Let''s apply this to our grocery list array. Our example array begins at memory
    address 1010. So, if we told the computer to read the value at index 3, the computer
    would go through the following thought process:


    +   1. The array begins with index 0, which is at memory address 1010.

    2. Index 3 will be exactly three slots past index 0.

    3. By logical extension, index 3 would be located at memory address 1013, since
    1010 + 3 is 1013.


    Once the computer knows that index 3 is at memory address 1013, it can jump right
    there and see that it contains the value "dates".


    Reading from an array is, therefore, an efficient operation, since the computer
    can read any index by jumping to any memory address in one step. Although I described
    the computer''s thought process by breaking it down into three parts, we are currently
    focusing on the main step of the computer jumping to a memory address. (In later
    chapters, we''ll explore how to know which steps are the ones worth focusing on.)


    Naturally, an operation that takes just one step is the fastest type of operation.
    Besides being a foundational data structure, arrays are also a very powerful data
    structure because we can read from them with such speed.


    Now, what if instead of asking the computer what value is contained at index 3,
    we flipped the question around and asked at what index "dates" can be found? That''s
    the search operation, and we''ll explore that next.


    # Searching


    As I stated previously, *searching* an array means looking to see whether a particular
    value exists within an array and if so, at which index it''s located.


    In a sense, it''s the inverse of reading. Reading means providing the computer
    an *index* and asking it to return the value contained there. Searching, on the'
  - '[PAGE 29]


    other hand, means providing the computer a *value* and asking it to return the
    index of that value''s location.


    While these two operations sound similar, there''s a world of difference between
    them when it comes to efficiency. Reading from an index is fast, since a computer
    can jump immediately to any index and discover the value contained there. Searching,
    though, is tedious since the computer has no way to jump to a particular value.


    This is an important fact about computers: a computer has immediate access to
    all of its memory addresses, but it has no idea offhand what *values* are contained
    at each memory address.


    Let''s take our earlier array of fruits and veggies, for example. The computer
    can''t immediately see the actual contents of each cell. To the computer, the
    array looks something like this:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_29_0.png)


    To search for a fruit within the array, the computer has no choice but to inspect
    each cell, one at a time.


    The following diagrams demonstrate the process the computer would use to search
    for "dates" within our array.


    First, the computer checks index 0:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_29_1.png)


    Since the value at index 0 is "apples", and not the "dates" we''re looking for,
    the computer moves on to the next index, as shown in the [diagram on page 10](page10).'
  - '[PAGE 30]


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_30_0.png)


    Since index 1 doesn''t contain the "dates" we''re looking for either, the computer
    moves on to index 2:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_30_1.png)


    Once again, we''re out of luck, so the computer moves to the next cell:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_30_2.png)


    Aha! We''ve found the elusive "dates" and now know that the "dates" are found
    at index 3. At this point, the computer doesn''t need to move on to the next cell
    of the array, since it already found what we''re looking for.


    In this example, because the computer had to check four different cells until
    it found the value we were searching for, we''d say that this particular operation
    took a total of four steps.


    In [Chapter 2. Why Algorithms Matter, on page 21](#), you''ll learn about another
    way to search an array, but this basic search operation—in which the computer
    checks each cell one at a time—is known as *linear search*.


    Now, what is the *maximum* number of steps a computer would need to perform to
    conduct a linear search on an array?


    If the value we''re seeking happens to be in the final cell in the array (like
    "elderberries"), then the computer would end up searching through *every* cell
    of the'
  - '[PAGE 31]


    array until it finally finds the value it''s looking for. Also, if the value we''re
    looking for doesn''t occur in the array at all, the computer likewise would have
    to search every cell so that it can be sure the value doesn''t exist within the
    array.


    So it turns out that for an array of 5 cells, the maximum number of steps linear
    search would take is 5. For an array of 500 cells, the maximum number of steps
    linear search would take is 500.


    Another way of saying this is that for N cells in an array, linear search would
    take a maximum of N steps. In this context, N is just a variable that can be replaced
    by any number.


    In any case, it''s clear that searching is less efficient than reading, since
    searching can take many steps, while reading always takes just one step, no matter
    the size of the array.


    Next, we''ll analyze the operation of insertion.


    # Insertion


    The efficiency of inserting a new piece of data into an array depends on *where*
    within the array you''re inserting it.


    Let''s say we want to add "figs" to the end of our shopping list. Such an insertion
    takes just one step.


    This is true due to another fact about computers: when allocating an array, the
    computer always keeps track of the array''s size.


    When we couple this with the fact that the computer also knows at which memory
    address the array begins, computing the memory address of the last item of the
    array is a cinch: if the array begins at memory address 1010 and is of size 5,
    that means its final memory address is 1014. So to insert an item beyond that
    would mean adding it to the *next* memory address, which is 1015.


    Once the computer calculates which memory address to insert the new value into,
    it can do so in one step.


    This is what inserting "figs" at the end of the array looks like:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_31_0.png)'
