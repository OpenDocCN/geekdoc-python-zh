    that the "e" points to a child node that contains a hash table with a key of "*",
    an asterisk. (The value doesn''t actually matter, so it can simply be None.) This
    indicates we''ve reached the end of a word, and that "ace", therefore, is a complete
    word. The need for this "*" key will become more apparent shortly.


    Now, here''s where tries become even more interesting. Let''s say we want to also
    store the word "act". To do this, we keep the existing "a" and "c" keys, but we
    add one new node containing the key of "t". Look at the following diagram:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_315_1.png)'
  - '[PAGE 316]


    As you can see, the bolded node''s hash table now contains *two* children nodes,
