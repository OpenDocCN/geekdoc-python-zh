    \ Search\n\nHere is an implementation of depth-first traversal:\n\n```\ndef dfs_traverse(vertex,\
    \ visited_vertices):\n    visited_vertices[vertex.value] = True\n\n    print(vertex.value)\n\
    \n    for adjacent_vertex in vertex.adjacent_vertices:\n        if not visited_vertices.get(adjacent_vertex.value):\n\
    \            dfs_traverse(adjacent_vertex, visited_vertices)\n```\n\nOur dfs_traverse\
    \ method accepts a single vertex and a visited_vertices hash table. The first\
    \ time we call this function, we pass in the empty hash table visited_vertices.\
    \ For the above example, we'd perform a depth-first traversal starting with Alice,\
    \ with the following:\n\n```\ndfs_traverse(alice, {})\n```\n\nAs we visit vertices,\
    \ though, we populate this hash table with the vertices we've visited and pass\
    \ along the same hash table with each recursive call.\n\nThe first thing we do\
    \ within the function is mark the current vertex as visited. We do this by adding\
    \ the vertex's value to the hash:\n\n```\nvisited_vertices[vertex.value] = True\n\
    ```\n\nWe then optionally print the vertex's value just to get feedback that we've\
    \ truly traversed it:\n\n```\nprint(vertex.value)\n```\n\nNext, we iterate over\
    \ all the adjacent vertices of the current vertex:\n\n```\nfor adjacent_vertex\
    \ in vertex.adjacent_vertices:\n```\n\nWe check each adjacent vertex to see whether\
    \ it has already been visited. If it has, we do nothing, but if it has never been\
    \ visited, we recursively call dfs_traverse on that adjacent vertex:\n\n```\n\
    if not visited_vertices.get(adjacent_vertex.value):\n    dfs_traverse(adjacent_vertex,\
