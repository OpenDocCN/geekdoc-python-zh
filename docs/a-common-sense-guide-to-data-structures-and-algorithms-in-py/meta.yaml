- md: '# The Pragmatic Programmers


    Volume 1


    ## A Common-Sense Guide to Data Structures and Algorithms in Python


    Level Up Your Core Programming Skills


    Jay Wengrow


    edited by Katharine Dvorak


    # Early Praise for *A Common-Sense Guide to Data Structures and Algorithms in
    Python, Volume 1*


    Students and programmers everywhere are told how important algorithms and data
    structures are for creating quality software—not to mention getting hired at the
    best companies—and, yet, there are so few resources that bring actual clarity
    to the topic. This book does! The combination of Python’s simplicity and Jay’s
    ability to drill down on what you need to know is a winning formula. Reading this
    book is a worthwhile investment for any software engineer.


    - ▶ **Lyndon Purcell**

    Software Developer, OK200


    *A Common Sense Guide to Data Structures and Algorithms in Python* is one of those
    rare books that both unravels the sometimes impenetrable algorithmic content and
    keeps the reader engaged with a direct and approachable writing style. I highly
    recommend this book to anyone that wants to dig into algorithms to improve their
    programming skills.


    - ▶ **Terry Peppers**

    Vice President of Engineering, LogicGate


    As a beginner to coding, I have read many books on algorithms and Jay’s book is
    the only one which doesn’t assume the reader is a math genius nor does it treat
    you in a condescending manner. From the start of the book he encourages your learning
    and understanding as a mentor and a friend.


    - ▶ **Katy Douglas**

    Student, The Open University


    The book serves as an exceptional reference for individuals seeking to grasp the
    fundamental concepts in data structures and algorithms (DSA) and an ideal entry
    point to the realm of DSA, particularly for those with limited or no prior background
    in computer science. It excels in explaining the complex algorithms by using clever
    illustrations and examples, making the book a fascinating read.


    Ahmad Shahba

    Lead Software Engineer, Science Systems and Applications, Inc.


    The easy-to-digest and approachable content makes the rather obtuse and math-heavy
    jargon field of data structures and algorithms quite approachable to all. If you
    don''t like switching contexts whilst studying, this special edition is for you,
    as it uses only Python to demonstrate concepts. You can''t go wrong with this
    book!


    Paa JAKE

    Software and Test Engineer


    ## A Common-Sense Guide to Data Structures and Algorithms in Python, Volume 1


    Level Up Your Core Programming Skills


    Jay Wengrow


    The Pragmatic Bookshelf


    Dallas, Texas


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_5_0.png)


