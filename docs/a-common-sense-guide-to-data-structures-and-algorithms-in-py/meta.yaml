    \ 8: We pop the element at the top of the stack, which happens to be an *opening*\
    \ square bracket:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_154_0.png)\n\nSince\
    \ our closing square bracket is a corresponding match to this top element of the\
