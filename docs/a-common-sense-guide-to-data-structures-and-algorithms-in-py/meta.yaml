    \ sequence by one. The loop repeats this process until it can't find the next\
    \ number in the sequence. Each of these lookups takes just one step.\n\nBut, you\
    \ may ask, how does this help? Imagine our array is [6, 5, 4, 3, 2, 1]. When we\
    \ iterate over the 6, we'll find that there isn't a sequence that builds up from\
