  md: '2. Whenever a computer allocates an array, it also makes note at which memory
    address the array *begins*. So if we asked the computer to find the first element
    of the array, it would be able to instantly jump to the appropriate memory address
    to find it.


    Now, these facts explain how the computer can find the *first* value of an array
    in a single step. However, a computer can also find the value at *any* index by
    performing simple addition. If we asked the computer to find the value at index
    3, the computer would simply take the memory address at index 0 and add 3. (Memory
    addresses are sequential, after all.)


    Let''s apply this to our grocery list array. Our example array begins at memory
    address 1010. So, if we told the computer to read the value at index 3, the computer
    would go through the following thought process:


    +   1. The array begins with index 0, which is at memory address 1010.

    2. Index 3 will be exactly three slots past index 0.

    3. By logical extension, index 3 would be located at memory address 1013, since
    1010 + 3 is 1013.


    Once the computer knows that index 3 is at memory address 1013, it can jump right
    there and see that it contains the value "dates".


    Reading from an array is, therefore, an efficient operation, since the computer
    can read any index by jumping to any memory address in one step. Although I described
    the computer''s thought process by breaking it down into three parts, we are currently
    focusing on the main step of the computer jumping to a memory address. (In later
    chapters, we''ll explore how to know which steps are the ones worth focusing on.)


    Naturally, an operation that takes just one step is the fastest type of operation.
    Besides being a foundational data structure, arrays are also a very powerful data
    structure because we can read from them with such speed.


    Now, what if instead of asking the computer what value is contained at index 3,
    we flipped the question around and asked at what index "dates" can be found? That''s
    the search operation, and we''ll explore that next.


    # Searching


    As I stated previously, *searching* an array means looking to see whether a particular
    value exists within an array and if so, at which index it''s located.


    In a sense, it''s the inverse of reading. Reading means providing the computer
