  md: 'For example, take a look at this example social network:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_343_0.png)


    Let''s say we currently have access to Alice''s vertex. If we said that we''ll
    search for Irena, it would mean that we''re trying to find our way from Alice
    to Irena.

    Interestingly, you can see that there are two different *paths* we can take to
