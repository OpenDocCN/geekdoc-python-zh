  md: 'In this diagram, each call that is surrounded by a box is one in which the
    result was retrieved from the hash table.


    So what is the Big O of our function now? Let''s look at how many recursive calls
    we make for different types of N:


    | N Elements | Number of Calls |

    |---|---|

    | 1 | 1 |

    | 2 | 3 |

    | 3 | 5 |

    | 4 | 7 |

    | 5 | 9 |

    | 6 | 11 |


    We can see that for N, we make (2N) - 1 calls. Since in Big O we drop the constants,
    this is an O(N) algorithm.


    This is an incredible improvement over O(2<sup>N</sup>). Go memoization!


    # Dynamic Programming Through Going Bottom-Up


    I mentioned earlier that dynamic programming can be achieved through one of two
    techniques. We looked at one technique, memoization, which is quite nifty.


    The second technique, known as *going bottom-up*, is a lot less fancy and may
    not even seem like a technique at all. All going bottom-up means is to ditch recursion
    and use some other approach (like a loop) to solve the same problem.


    The reason that going bottom-up is considered part of dynamic programming is because
    dynamic programming means taking a problem *that could be solved recursively*
    and ensuring that it doesn''t make duplicate calls for overlapping subproblems.
    Using iteration (that is, loops) instead of recursion is, technically, a way to
    achieve this.


    Going bottom-up becomes more of a "technique" when the problem is more naturally
    solved with recursion. Generating Fibonacci numbers is one example where recursion
    is a neat, elegant solution. Having to solve the same problem with iteration may
    take more brainpower, as an iterative approach may be less intuitive. (Imagine
    solving the staircase problem from the previous chapter with a loop. Ugh.)


    Let''s see how we might implement a bottom-up approach for our Fibonacci function.'
