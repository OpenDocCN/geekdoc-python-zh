    \ linked list ends there.\n\nA linked list's first node is also referred to as\
    \ its *head*, and its last node its *tail*. We may use the terms *head* and *first\
    \ node* interchangeably.\n\nIf the computer knows at which memory address the\
    \ linked list begins, it has all it needs to begin working with the list! Since\
    \ each node contains a link to the next node, all the computer needs to do is\
    \ follow each link to string together the entire list.\n\nThe fact that a linked\
    \ list's data can be spread throughout the computer's memory is a potential advantage\
    \ it has over the array. An array, by contrast, needs to find an entire block\
    \ of contiguous cells to store its data, which can get increasingly difficult\
    \ as the array size grows. These details are managed by your programming language\
    \ under the hood, so you may not have to worry about them. However, you'll see\
    \ shortly that there are more tangible differences between linked lists and arrays\
    \ that we can sink our teeth into.\n\n## Implementing a Linked List\n\nSome programming\
    \ languages, such as Java, come with linked lists built into the language. Many\
    \ languages don't, but it's fairly simple to implement them on our own.\n\nLet's\
    \ create our own linked list using Python. We'll use two classes to implement\
    \ this: Node and LinkedList. Let's create the Node class first:\n\n```\nclass\
    \ Node:\n    def __init__(self, data):\n        self.data = data\n        self.next_node\
    \ = None\n```\n\nThe Node class has two attributes: data contains the node's primary\
    \ value (for example, the string \"a\"), while next_node contains the link to\
    \ the next node in the list. We can use this class as follows:\n\n```\nnode_1\
    \ = Node(\"once\")\nnode_2 = Node(\"upon\")\nnode_3 = Node(\"a\")\nnode_4 = Node(\"\
    time\")\n\nnode_1.next_node = node_2\nnode_2.next_node = node_3\nnode_3.next_node\
    \ = node_4\n```\n\nWith this code, we've created a list of four nodes that serve\
    \ as a list containing the strings \"once\", \"upon\", \"a\", and \"time\".\n\n\
    Note that in our implementation, the next_node refers to another Node *instance*\
    \ rather than an actual memory address number. The effect, however, is the same—the\
    \ nodes are likely dispersed throughout the computer's memory, and yet we can\
    \ use the nodes' links to string the list together.\n\nGoing forward, then, we're\
    \ simply going to discuss each link as pointing to another node rather than to\
    \ a specific memory address. Accordingly, we're going to use simplified diagrams\
    \ to depict linked lists, such as this one:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_240_0.png)\n\
    \nEach node in this diagram consists of two cells. The first cell contains the\
    \ node's data, and the second cell points to the next node.\n\nThis reflects our\
    \ implementation of the Node class. In it, the data method returns the node's\
    \ data, while the next_node method returns the next node in the list. *In this\
    \ context, the next_node method serves as the node's link.*\n\nWhile we've been\
    \ able to create this linked list with the Node class alone, we still need an\
    \ easy way to tell our program where the linked list begins. To do this, we'll\
    \ create a LinkedList class in addition to our previous Node class. Here's the\
    \ LinkedList class in its basic form:\n\n```\npython\nimport node\n\nclass LinkedList:\n\
    \    def __init__(self, first_node=None):\n        self.first_node = first_node\n\
    ```\n\nNote that we import node at the beginning of our code, since we placed\
    \ the Node class in a separate file from this LinkedList class.\n\nAt this point,\
    \ all a LinkedList instance does is keep track of the first node of the list.\n\
    \nPreviously we created a chain of nodes containing node_1, node_2, node_3, and\
    \ node_4. We can now use our LinkedList class to reference this list by writing\
    \ the following code:\n\n```\npython\nlist = LinkedList(node_1)\n```\n\nThis list\
    \ variable now acts as a handle on the linked list, as it's an instance of LinkedList\
    \ that has access to the list's first node.\n\nAn important point emerges: *when\
    \ dealing with a linked list, we have immediate access only to its head*. This\
    \ is going to have serious ramifications, as we'll see shortly.\n\nAt first glance,\
    \ though, linked lists and arrays are similar—they're both just lists of stuff.\
    \ When we dig into the analysis, though, we'll see some dramatic differences in\
    \ these two data structures' performances! Let's jump into the four classic operations:\
    \ reading, searching, insertion, and deletion.\n\n## Reading\n\nAs you know, a\
    \ computer can read from an array in O(1) time. But now let's figure out the efficiency\
    \ of reading from a linked list.\n\nIf you want to read, say, the value of the\
    \ third item of a linked list, the computer cannot look it up in one step, because\
    \ it wouldn't immediately know where to find it in the computer's memory. After\
    \ all, each node of a linked list could be *anywhere* in memory! All our program\
    \ knows immediately is the memory address of the *first* node of the linked list;\
    \ it doesn't know offhand where any of the other nodes are.\n\nTo read from the\
    \ third node, then, the computer must go through a process. First, it accesses\
    \ the first node. It then follows the first node's link to the second node and\
    \ then the second node's link to the third node.\n\nTo get to any node, then,\
    \ we always need to start with the first node (the only node we initially have\
    \ access to), and follow the chain of nodes until we reach the node we want.\n\
    \nIt turns out, then, that if we were to read from the last node in the list,\
    \ it would take N steps for N nodes in the list. Linked lists having a worst-case\
    \ read of O(N) is a major disadvantage when compared with arrays that can read\
    \ any element in just O(1). But don't fret, as linked lists will have their moment\
    \ to shine, as we'll see soon.\n\n### Code Implementation: Linked List Reading\n\
    \nLet's go ahead and add a read method to our LinkedList class:\n\n```\ndef read(self,\
    \ index):\n    current_node = self.first_node\n    current_index = 0\n```\n\n\
    ```\nwhile current_index < index:\n    current_node = current_node.next_node\n\
    \    current_index += 1\n\n    if not current_node:\n        return None\n\nreturn\
    \ current_node.data\n```\n\nIf we want to read the fourth node from a list, for\
    \ example, we'd call our method by passing in the node's index as follows:\n\n\
    ```\nlist.read(3)\n```\n\nLet's walk through how this method works.\n\nFirst,\
    \ we create a variable called `current_node` that refers to the node we're currently\
    \ accessing. Since we're going to start by accessing the head, we say this:\n\n\
    ```\ncurrent_node = self.first_node\n```\n\nRecall that `first_node` is an instance\
    \ variable of the `LinkedList` class.\n\nWe also track the index of `current_node`\
    \ so that we can know when we reach the desired index. We start at 0 since the\
    \ first node's index is 0:\n\n```\ncurrent_index = 0\n```\n\nWe then launch a\
    \ loop that runs while `current_index` is less than the index we're attempting\
    \ to read:\n\n```\nwhile current_index < index:\n```\n\nIn each pass-through of\
    \ the loop, we access the next node in the list and make it the new `current_node`:\n\
    \n```\ncurrent_node = current_node.next_node\n```\n\nWe also bump up the `current_index`\
    \ by 1:\n\n```\ncurrent_index += 1\n```\n\nAt the end of each pass-through, we\
    \ check whether we've reached the end of the list, and we return `None` if the\
    \ index we're trying to read isn't in our list:\n\n```\nif not current_node:\n\
    \    return None\n```\n\nThis works because the final node of the list will actually\
    \ have a `next_node` that is `None` since the last node was never assigned a `next_node`\
    \ of its own. This being the case, when `current_node` refers to the final node\
    \ and we then execute `current_node = current_node.next_node`, the `current_node`\
    \ becomes `None`.\n\nFinally, if we do break out of the loop, it's because we\
    \ reached the desired index. We can then return the node's value with the following:\n\
    \n```\nreturn current_node.data\n```\n\n## Searching\n\nAs you know, searching\
    \ means looking for a value within the list and returning its index. We've seen\
    \ that linear search on an array has a speed of O(N), since the computer needs\
    \ to inspect each value one at a time.\n\nLinked lists also have a search speed\
    \ of O(N). To search for a value, we need to go through a similar process to the\
    \ one we did with reading; that is, we begin with the head and follow the links\
    \ of each node to the next one. Along the way, we inspect each value until we\
    \ find what we're looking for.\n\n### Code Implementation: Linked List Search\n\
    \nHere's how we can implement the search operation in Python. We'll call this\
    \ method search and pass in the value we're searching for:\n\n```\ndef search(self,\
    \ value):\n    current_node = self.first_node\n    current_index = 0\n\n    while\
    \ True:\n        if current_node.data == value:\n            return current_index\n\
    \n        current_node = current_node.next_node\n\n        if not current_node:\n\
    \            break\n\n        current_index += 1\n\n    return None\n```\n\nWe\
    \ can then search for any value within the list, like so:\n\n```\nlist.search(\"\
    time\")\n```\n\nUsing this, we would get back the index of where \"time\" is located\
    \ within the list. In our example above, this would be 3.\n\nAs you can see, the\
    \ mechanics of searching are similar to reading. The main difference is that the\
    \ loop doesn't stop at a particular index but runs until we either find the value\
    \ or reach the end of the list."
  mdcn: "内存中下一个节点开始。最后一个节点的链接包含 `None`，因为链表在此结束。\n\n链表的第一个节点也被称为其 *头节点*，最后一个节点被称为其\
    \ *尾节点*。我们可以互换使用 *头节点* 和 *第一个节点* 这两个术语。\n\n如果计算机知道链表从哪个内存地址开始，它就拥有了开始处理该链表所需的一切！由于每个节点都包含一个指向下一个节点的链接，计算机需要做的就是沿着每个链接将整个链表串联起来。\n\
    \n链表的数据可以分散在计算机内存中的这一事实，是其相对于数组的一个潜在优势。相比之下，数组需要找到一整块连续的存储单元来存储其数据，随着数组规模的增长，这可能会变得越来越困难。这些细节由你的编程语言在底层管理，因此你可能不必担心它们。然而，你很快就会看到链表和数组之间存在更多切实的、值得深入探讨的差异。\n\
    \n## 实现链表\n\n一些编程语言，如 Java，内置了链表。许多语言没有，但自己实现它们相当简单。\n\n让我们使用 Python 创建自己的链表。我们将使用两个类来实现：`Node`\
    \ 和 `LinkedList`。首先创建 `Node` 类：\n\n```\nclass Node:\n    def __init__(self, data):\n\
    \        self.data = data\n        self.next_node = None\n```\n\n`Node` 类有两个属性：`data`\
    \ 包含节点的主要值（例如，字符串 \"a\"），而 `next_node` 包含指向列表中下一个节点的链接。我们可以如下使用这个类：\n\n```\nnode_1\
    \ = Node(\"once\")\nnode_2 = Node(\"upon\")\nnode_3 = Node(\"a\")\nnode_4 = Node(\"\
    time\")\n\nnode_1.next_node = node_2\nnode_2.next_node = node_3\nnode_3.next_node\
    \ = node_4\n```\n\n通过这段代码，我们创建了一个包含四个节点的列表，这些节点构成了一个包含字符串 \"once\"、\"upon\"、\"\
    a\" 和 \"time\" 的列表。\n\n请注意，在我们的实现中，`next_node` 指向另一个 `Node` *实例*，而不是一个实际的内存地址数字。然而，效果是相同的——节点可能分散在计算机内存的各个位置，但我们仍然可以使用节点的链接将列表串联起来。\n\
    \n因此，接下来我们将简单地讨论每个链接指向另一个节点，而不是指向特定的内存地址。相应地，我们将使用简化的图表来描述链表，例如这个：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_240_0.png)\n\
    \n此图中的每个节点由两个单元格组成。第一个单元格包含节点的数据，第二个单元格指向下一个节点。\n\n这反映了我们对 `Node` 类的实现。其中，`data`\
    \ 方法返回节点的数据，而 `next_node` 方法返回列表中的下一个节点。*在此上下文中，`next_node` 方法充当节点的链接。*\n\n虽然我们已经能够仅使用\
    \ `Node` 类创建这个链表，但我们仍然需要一种简单的方法来告诉程序链表从哪里开始。为此，除了之前的 `Node` 类，我们还将创建一个 `LinkedList`\
    \ 类。以下是基本形式的 `LinkedList` 类：\n\n```\npython\nimport node\n\nclass LinkedList:\n\
    \    def __init__(self, first_node=None):\n        self.first_node = first_node\n\
    ```\n\n请注意，我们在代码开头导入了 `node`，因为我们将 `Node` 类放在了与这个 `LinkedList` 类不同的文件中。\n\n此时，`LinkedList`\
    \ 实例所做的只是跟踪列表的第一个节点。\n\n之前我们创建了一个包含 `node_1`、`node_2`、`node_3` 和 `node_4` 的节点链。我们现在可以使用\
    \ `LinkedList` 类来引用这个列表，编写以下代码：\n\n```\npython\nlist = LinkedList(node_1)\n```\n\
    \n这个 `list` 变量现在充当链表的句柄，因为它是一个 `LinkedList` 实例，可以访问列表的第一个节点。\n\n一个重要的点出现了：*在处理链表时，我们只能立即访问其头节点*。这将产生严重的影响，我们很快就会看到。\n\
    \n不过，乍一看，链表和数组是相似的——它们都只是东西的列表。然而，当我们深入分析时，我们会看到这两种数据结构在性能上存在显著差异！让我们深入探讨四种经典操作：读取、搜索、插入和删除。\n\
    \n## 读取\n\n如你所知，计算机可以在 O(1) 时间内从数组中读取数据。但现在让我们来计算一下从链表中读取数据的效率。\n\n如果你想读取，比如说，链表中第三项的值，计算机无法一步就找到它，因为它不会立即知道在计算机内存中的哪里可以找到它。毕竟，链表的每个节点都可能在内存中的\
    \ *任何地方*！我们的程序立即知道的只是链表 *第一个* 节点的内存地址；它并不知道其他任何节点的位置。\n\n因此，要读取第三个节点，计算机必须经历一个过程。首先，它访问第一个节点。然后，它沿着第一个节点的链接到达第二个节点，再沿着第二个节点的链接到达第三个节点。\n\
    \n因此，要到达任何节点，我们总是需要从第一个节点（我们最初唯一可以访问的节点）开始，并沿着节点链前进，直到到达我们想要的节点。\n\n结果证明，如果我们读取列表中的最后一个节点，对于包含\
    \ N 个节点的列表，将需要 N 步。链表最坏情况下的读取时间为 O(N)，与可以在 O(1) 时间内读取任何元素的数组相比，这是一个主要的缺点。但不要担心，链表也有其闪耀的时刻，我们很快就会看到。\n\
    \n### 代码实现：链表读取\n\n让我们继续为 `LinkedList` 类添加一个 `read` 方法：\n\n```\ndef read(self,\
    \ index):\n    current_node = self.first_node\n    current_index = 0\n```\n\n\
    ```\nwhile current_index < index:\n    current_node = current_node.next_node\n\
    \    current_index += 1\n\n    if not current_node:\n        return None\n\nreturn\
    \ current_node.data\n```\n\n例如，如果我们想从列表中读取第四个节点，我们将通过传递节点的索引来调用我们的方法，如下所示：\n\n\
    ```\nlist.read(3)\n```\n\n让我们逐步了解这个方法的工作原理。\n\n首先，我们创建一个名为 `current_node` 的变量，它指向我们当前正在访问的节点。由于我们将从访问头节点开始，我们这样写：\n\
    \n```\ncurrent_node = self.first_node\n```\n\n回想一下，`first_node` 是 `LinkedList`\
    \ 类的一个实例变量。\n\n我们还跟踪 `current_node` 的索引，以便知道何时到达所需的索引。我们从 0 开始，因为第一个节点的索引是 0：\n\
    \n```\ncurrent_index = 0\n```\n\n然后我们启动一个循环，当 `current_index` 小于我们尝试读取的索引时运行：\n\
    \n```\nwhile current_index < index:\n```\n\n在循环的每次遍历中，我们访问列表中的下一个节点，并使其成为新的 `current_node`：\n\
    \n```\ncurrent_node = current_node.next_node\n```\n\n我们还将 `current_index` 增加 1：\n\
    \n```\ncurrent_index += 1\n```\n\n在每次遍历结束时，我们检查是否已到达列表末尾，如果我们要读取的索引不在列表中，则返回 `None`：\n\
    \n```\nif not current_node:\n    return None\n```\n\n这之所以有效，是因为列表的最后一个节点实际上有一个\
    \ `next_node` 为 `None`，因为最后一个节点从未被分配过自己的 `next_node`。在这种情况下，当 `current_node` 指向最后一个节点，然后我们执行\
    \ `current_node = current_node.next_node` 时，`current_node` 就变成了 `None`。\n\n最后，如果我们确实跳出了循环，那是因为我们到达了所需的索引。然后我们可以用以下方式返回节点的值：\n\
    \n```\nreturn current_node.data\n```\n\n## 搜索\n\n如你所知，搜索意味着在列表中查找一个值并返回其索引。我们已经看到，数组上的线性搜索速度为\
    \ O(N)，因为计算机需要逐个检查每个值。\n\n链表的搜索速度也是 O(N)。要搜索一个值，我们需要经历一个与读取类似的过程；也就是说，我们从头节点开始，沿着每个节点的链接到达下一个节点。在此过程中，我们检查每个值，直到找到我们要找的东西。\n\
    \n### 代码实现：链表搜索\n\n以下是我们如何在 Python 中实现搜索操作。我们将这个方法命名为 `search`，并传入我们要搜索的值：\n\n\
    ```\ndef search(self, value):\n    current_node = self.first_node\n    current_index\
    \ = 0\n\n    while True:\n        if current_node.data == value:\n           \
    \ return current_index\n\n        current_node = current_node.next_node\n\n  \
    \      if not current_node:\n            break\n\n        current_index += 1\n\
    \n    return None\n```\n\n然后我们可以搜索列表中的任何值，如下所示：\n\n```\nlist.search(\"time\")\n\
    ```\n\n使用此方法，我们将返回 \"time\" 在列表中的索引。在我们上面的例子中，这将是 3。\n\n如你所见，搜索的机制与读取相似。主要区别在于循环不会在特定索引处停止，而是运行直到我们找到该值或到达列表末尾。"
