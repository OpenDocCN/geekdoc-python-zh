    \nWhen we use a simple array for keeping track of the cities we haven't visited\
    \ yet (unvisited_cities), our algorithm can take up to O(V²) steps. This is because\
    \ the worst-case scenario for Dijkstra's algorithm is when each vertex has an\
    \ edge leading to every other vertex within the graph. In this case, for every\
    \ vertex we visit, we check the weight of the path from that vertex to every other\
    \ vertex. This is V vertices multiplied by V vertices, which is O(V²).\n\nOther\
    \ implementations, such as using a priority queue instead of an array, lead to\
    \ faster speeds. Again, there are several variations of Dijkstra's algorithm,\
    \ and each variation needs its own analysis to determine its precise time complexity.\n\
    \nWhatever implementation of the algorithm you choose, though, is a big win over\
    \ the alternative, which would be to find *every* possible path through the"
