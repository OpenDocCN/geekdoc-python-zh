    \n我们通过首先设想神奇的O(1)查找能为我们做什么，然后通过使用哈希表以易于查找的方式存储数据来实现自己的愿望，从而让这种魔法成为现实。\n\n我们能在O(1)时间内查找哈希表数据的事实并不新鲜，正如我们在[使用哈希表实现极速查找](Blazing\
