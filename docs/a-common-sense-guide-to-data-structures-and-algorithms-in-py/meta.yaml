- img_proc: true
  md: "Here's a Python implementation of this approach:\n\n```\ndef is_subset(array1,\
    \ array2):\n    # Determine which array is smaller:\n    if len(array1) > len(array2):\n\
    \        larger_array = array1\n        smaller_array = array2\n    else:\n  \
    \      larger_array = array2\n        smaller_array = array1\n\n    # Iterate\
    \ through smaller array:\n    for i in smaller_array:\n        # Assume temporarily\
    \ that the current value from\n        # smaller array is not found in larger\
    \ array:\n        found_match = False\n\n        # For each value in smaller array,\
    \ iterate through\n        # larger array:\n        for j in larger_array:\n \
    \           # If the two values are equal, it means the current\n            #\
    \ value in smaller array is present in the larger array:\n            if i ==\
    \ j:\n                found_match = True\n                break\n\n        # If\
    \ the current value in smaller array doesn't exist\n        # in larger array,\
    \ return false:\n        if not found_match:\n            return False\n\n   \
    \ # If we get to the end of the loops, it means that all\n    # values from smaller\
    \ array are present in larger array:\n    return True\n```\n\nWhen we analyze\
    \ the efficiency of this algorithm, we find that it's O(N * M) since it runs for\
    \ the number of items in the first array multiplied by the number of items in\
    \ the second array.\n\nNow, let's harness the power of a hash table to dramatically\
    \ improve the efficiency of our algorithm. Let's ditch our original approach and\
    \ start again from scratch.\n\nIn our new approach, after we've determined which\
    \ array is larger and which is smaller, we're going to run a single loop through\
    \ the larger array and store each value inside of a hash table:\n\n```\nhash_table\
    \ = {}\n\nfor value in larger_array:\n    hash_table[value] = True\n```"
