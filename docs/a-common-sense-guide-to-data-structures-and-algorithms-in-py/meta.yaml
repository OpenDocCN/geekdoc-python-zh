  - '[PAGE 257]


    # CHAPTER 15


    # Speeding Up All the Things with Binary Search Trees


    Sometimes, we may want to arrange our data in a specific order. For example, we
    may want an alphabetized list of names or a list of products in order of lowest
    price to highest.


    While we can use a sorting algorithm such as Quicksort to arrange our data into
    perfect ascending order, it comes at a cost. As we''ve seen, even the fastest
    algorithms take O(N log N) time. So if we''re going to want our data sorted *often*,
    it would be sensible to always keep our data in sorted order in the first place
    so that we never need to resort it.


    An ordered array is a simple but effective tool for keeping data in order. It''s
    also fast for certain operations, as it has O(1) reads and O(log N) search (when
    using binary search).


    However, ordered arrays have a drawback.


    When it comes to insertions and deletions, ordered arrays are relatively slow.
    Whenever a value is inserted into an ordered array, we first shift all greater
    values one cell to the right. And when a value is deleted from an ordered array,
    we shift all greater values one cell to the left. This takes N steps in a worst-case
    scenario (inserting into or deleting from the first cell of the array), and N
    / 2 steps on average. Either way, it''s O(N), and O(N) is relatively slow for
    a simple insertion or deletion.


    Now, if we were looking for a data structure that delivers all-around amazing
    speed, a hash table is a great choice. Hash tables are O(1) for search, insertion,
    and deletion. However, they don''t maintain order, and order is what we need for
    our alphabetized-list application.'
  - '[PAGE 258]


    So what do we do if we want a data structure that maintains order yet *also* has
    fast search, insertion, and deletion? Neither an ordered array nor a hash table
    is ideal.


    Enter the binary search tree.


    # Trees


    You were introduced to node-based data structures in the previous chapter with
    linked lists. In a classic linked list, each node contains a link that connects
    the node to a single other node. A *tree* is also a node-based data structure,
    but within a tree each node can have links to *multiple* nodes.


    Here is a visualization of a simple tree:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_258_0.png)


    In this example, each node has links that lead to two other nodes. For the sake
    of simplicity, we can represent this tree visually without showing all the memory
    addresses:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_258_1.png)


    Trees come with their own unique nomenclature:


    +   - The uppermost node (in our example, “j”) is called the *root*. Yes, in our
    picture the root is at the *top* of the tree; it’s how trees are typically depicted.'
  - '[PAGE 259]


    +   - In our example, we''d say that "j" is a *parent* to "m" and "b". Conversely,
    "m" and "b" are *children* of "j". Similarly, the "m" is a parent of "q" and "z",
    and "q" and "z" are children of "m".


    +   - As in a family tree, a node can have *descendants* and *ancestors*. A node''s
    descendants are *all* the nodes that stem from a node, while a node''s ancestors
    are *all* the nodes that it stems from. In our example, "j" is the ancestor of
    all the other nodes in the tree, and all the other nodes are, therefore, descendants
    of "j".


    +   - Trees are said to have *levels*. Each level is a row within the tree. Our
    example tree has three levels:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_259_0.png)


    +   - One property of a tree is how *balanced* it is. A tree is balanced when
    its nodes'' subtrees have the same number of nodes in it.


    For instance, the preceding tree is said to be perfectly balanced. If you look
    at each node, its two subtrees have the same number of nodes. The root node ("j")
    has two subtrees, which each contain three nodes. You''ll see that the same is
    also true for every node in the tree. For example, the "m" node also has two subtrees
    where the two subtrees each contain one node.


    The following tree, on the other hand, is *imbalanced*:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_259_1.png)


    As you can see, the root''s right subtree contains more nodes than its left subtree,
    causing an imbalance.'
- md: "## Binary Search Trees\n\nMany different kinds of tree-based data structures\
    \ exist, but in this chapter, we'll focus on a particular tree known as a *binary\
    \ search tree*.\n\nNote that there are two adjectives here: *binary* and *search*.\n\
    \nA *binary* tree is a tree in which each node has zero, one, or two children.\n\
    \nA binary *search* tree is a binary tree that also abides by the following rules:\n\
    \n- Each node can have at most one *left* child and one *right* child.\n- A node's\
    \ *left* descendants can only contain values that are less than the node itself.\
    \ Likewise, a node's *right* descendants can only contain values that are greater\
    \ than the node itself.\n\nHere's an example of a binary search tree, in which\
    \ the values are numbers:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_260_0.png)\n\
    \nNote that each node has one child with a lesser value than itself, which is\
    \ depicted using a left arrow, and one child with a greater value than itself,\
    \ which is depicted using a right arrow.\n\nAdditionally, notice that all of the\
    \ 50's left descendants are less than it. At the same time, all of the 50's right\
    \ descendants are greater than it. The same pattern goes for each and every node.\n\
    \nWhile the following example is a binary tree, it's not a binary *search* tree:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_260_1.png)\n\nIt's a binary tree because\
    \ each node has zero, one, or two children. But it's not a binary *search* tree,\
    \ because the root node has two left children; that is, it has two children that\
    \ are less than it. For a binary search tree to be valid, it can have at most\
    \ one left (lesser) child and one right (greater) child.\n\nThe implementation\
    \ of a tree node in Python might look something like this:\n\n```\nclass TreeNode:\n\
    \    def __init__(self, value, left=None, right=None):\n        self.value = value\n\
    \        self.left_child = left\n        self.right_child = right\n```\n\nWe can\
    \ then build a simple tree like this:\n\n```\nnode1 = TreeNode(25)\nnode2 = TreeNode(75)\n\
    root = TreeNode(50, node1, node2)\n```\n\nBecause of the unique structure of a\
    \ binary search tree, we can search for any value within it very quickly, as we'll\
    \ now see.\n\n## Searching\n\nHere, again, is a binary search tree:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_261_0.png)\n\
    \nThe algorithm for searching within a binary search tree is as follows:\n\n1.\
    \ Designate a node to be the *current node*. (At the beginning of the algorithm,\
    \ the root node is the first current node.)\n2. Inspect the value at the current\
    \ node.\n3. If we've found the value we're looking for, great!\n4. If the value\
    \ we're looking for is less than the current node, search for it in its left subtree.\n\
    5. If the value we're looking for is greater than the current node, search for\
    \ it in its right subtree.\n6. Repeat Steps 1 through 5 until we find the value\
    \ we're searching for, or until we hit the bottom of the tree, in which case our\
    \ value must not be in the tree.\n\nSay we want to search for the 61. Let’s see\
    \ how many steps it would take, by walking through this visually.\n\nWhen searching\
    \ through a tree, we must always begin at the root:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_262_0.png)\n\
    \nNext, the computer asks itself: is the number we’re searching for (61) greater\
    \ or less than the value of this node? If the number we’re looking for is less\
    \ than the current node, look for it in the left child. If it’s greater than the\
    \ current node, look for it in the right child.\n\nIn this example, because 61\
    \ is greater than 50, we know it must be somewhere to the right, so we search\
    \ the right child. In the following picture, we’ve shaded out all the nodes we’ve\
    \ eliminated from our search, since we know that the 61 cannot possibly be there:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_262_1.png)\n\n“Are you my mother?”\
    \ asks the algorithm. Since the 75 is not the 61 we’re looking for, we need to\
    \ move down to the next level. And because 61 is less than 75, we’ll check the\
    \ left child, since the 61 could only be in that subtree, as shown in the diagram.\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_263_0.png)\n\nThe 56 is not the 61\
    \ we're looking for, so we continue our search. Since 61 is greater than 56, we\
    \ search for the 61 in the right child of the 56:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_263_1.png)\n\
    \nWe found it! In this example, it took us four steps to find our desired value.\n\
    \n## The Efficiency of Searching a Binary Search Tree\n\nIf you take another look\
    \ at the steps we just walked through, you'll notice that each step eliminates\
    \ half of the remaining nodes from our search. For example, when we begin our\
    \ search, we start at the root node, and our desired value may be found among\
    \ any of the root's descendants. However, when we then decide to continue the\
    \ search with, say, the root's right child, we eliminate the left child and *all\
    \ of its descendants* from the search.\n\nWe'd say, then, that searching in a\
    \ binary search tree is O(log N), which is the apt description for any algorithm\
    \ that eliminates half of the remaining values with each step. (We'll see soon,\
    \ though, that this is only for a perfectly balanced binary search tree, which\
    \ is a best-case scenario.)\n\n## Log(N) Levels\n\nHere's yet another way of describing\
    \ why search in a binary search tree is O(log N), which will reveal another property\
    \ about binary trees in general: *if there are N nodes in a balanced binary tree,\
    \ there will be about log N levels (that is, rows)*.\n\nTo understand this, let's\
    \ assume each row in the tree is completely filled with nodes, and that there\
    \ aren't any empty positions. If you think about it, each time we add a new full\
    \ level to the tree, we end up roughly doubling the number of nodes that the tree\
    \ has. (Really, we're doubling the nodes and adding one.)\n\nFor example, a binary\
    \ tree with four complete levels has fifteen nodes. (Go ahead, count them.) If\
    \ we add a fifth complete level, that means we add two children to each of the\
    \ eight nodes in the fourth level. This means we add sixteen new nodes, roughly\
    \ doubling the size of the tree.\n\nIt emerges that each new level doubles the\
    \ size of the tree. Accordingly, *a tree containing N nodes will require log(N)\
    \ levels* to hold all the nodes.\n\nIn the context of binary search, we noted\
    \ that the pattern of log(N) is that with each step of the search, we can eliminate\
    \ half of the remaining data. The number of levels needed in a binary tree follows\
    \ this pattern as well.\n\nLet's take a binary tree that needs to hold thirty-one\
    \ nodes. With our fifth level, we can hold sixteen of those nodes. This took care\
    \ of roughly half of the data, leaving us with just fifteen nodes that we still\
    \ need to find room for. With the fourth level, we take care of eight of those\
    \ nodes, leaving us with seven unaccounted for. With the third level, we take\
    \ care of four of those nodes, and so on.\n\nIndeed, log 31 is (approximately)\
    \ 5. So we've now concluded that a balanced tree with N nodes will have log(N)\
    \ levels.\n\nSince this is the case, it makes a lot of sense as to why searching\
    \ a binary search tree takes up to log(N) steps: because each step of the search\
    \ causes us to move down a level, we take up to as many steps as there are levels\
    \ in the tree.\n\nHowever you prefer to think about it, searching a binary search\
    \ tree takes O(log N).\n\nNow, while search in a binary search tree is O(log N),\
    \ so is binary search within an ordered array, in which each number we select\
    \ also eliminates half of the remaining possible values. In this regard, then,\
    \ searching a binary search tree has the same efficiency as binary search within\
    \ an ordered array.\n\nWhere binary search trees really shine over ordered arrays,\
    \ though, is with insertion. We'll get to that soon.\n\n## Code Implementation:\
    \ Searching a Binary Search Tree\n\nTo implement the search operation, as well\
    \ as the other binary search tree operations, we're going to make heavy use of\
    \ recursion. You learned back in Chapter 10, Recursively Recurse with Recursion,\
    \ on page 149, that recursion is key when dealing with data structures that have\
    \ an arbitrary number of levels of depth. A tree is such a data structure, as\
    \ it can have an infinite number of levels.\n\nHere's how we can use recursion\
    \ to implement search with Python. While we could have alternatively used a loop\
    \ instead, the recursive code for search is more concise and elegant:\n\n```\n\
    def search(search_value, node):\n    if not node or node.value == search_value:\n\
    \        return node\n    elif search_value < node.value:\n        return search(search_value,\
    \ node.left_child)\n    else:\n        return search(search_value, node.right_child)\n\
    ```\n\nThis search function accepts the search_value we're searching for and a\
    \ node that we'll use as the base for our search. The first time we call search,\
    \ the node will be the root node. However, in the subsequent recursive calls,\
    \ the node may be another node within the tree.\n\nOur function deals with four\
    \ possible cases, two of which are the base cases:\n\n```\nif not node or node.value\
    \ == search_value:\n    return node\n```\n\nOne base case is when the node contains\
    \ the search_value we're looking for, in which case we can return the node and\
    \ not make any recursive calls.\n\nThe other base case is when there is no node.\
    \ This will make more sense after we've examined the other cases, so let's come\
    \ back to this shortly.\n\nThe next case is when the search_value is less than\
    \ the value of the current node:\n\n```\nelif search_value < node.value:\n   \
    \ return search(search_value, node.left_child)\n```"
