  - "[PAGE 254]\n\nA doubly linked list allows for a lot more flexibility, as we can\
    \ move both forward *and* backward through the list. In fact, we can even start\
    \ with the tail and work our way backward to the head.\n\n# Queues as Doubly Linked\
    \ Lists\n\nBecause doubly linked lists have immediate access to both the front\
    \ and end of the list, they can insert data on either side at O(1) as well as\
    \ delete data on either side at O(1).\n\nBecause doubly linked lists can insert\
    \ data at the end in O(1) time and delete data from the front in O(1) time, *they\
    \ make the perfect underlying data structure for a queue*.\n\nWe looked at [Queues,\
    \ on page 143](https://example.com), and you'll recall that they are lists of\
    \ items in which data can only be inserted at the end and removed from the beginning.\
    \ You learned there that queues are an example of an abstract data type and that\
    \ we were able to use an array to implement them under the hood.\n\nNow, since\
    \ queues insert at the end and delete from the beginning, arrays are only so good\
    \ as the underlying data structure. While arrays are O(1) for insertions at the\
    \ end, they're O(N) for deleting from the beginning.\n\nA doubly linked list,\
    \ on the other hand, is O(1) for both inserting at the end *and* for deleting\
    \ from the beginning. That's what makes it a perfect fit for serving as the queue's\
    \ underlying data structure.\n\n# Code Implementation: Queue Built upon a Doubly\
    \ Linked List\n\nBefore implementing the queue itself, we'll first add one more\
    \ method to our DoublyLinkedList class. This `pop_head` method removes the head\
    \ from the list and returns it:\n\n```\ndef pop_head(self):\n    popped_node =\
    \ self.first_node\n    self.first_node = self.first_node.next_node\n    self.first_node.previous_node\
    \ = None\n    return popped_node\n```\n\nAs you can see, we effectively delete\
    \ the first node by changing the list's `self.first_node` to be what is currently\
    \ the second node. We also make sure that the new head doesn't link to any previous\
    \ node. Finally, we return the node we just deleted.\n\nWith this in place, we\
    \ can now create a queue implementation that is built upon a doubly linked list:"
  - "[PAGE 255]\n\n```\nimport doubly_linked_list\n\nclass Queue:\n    def __init__(self):\n\
    \        self.data = doubly_linked_list.DoublyLinkedList()\n\n    def enqueue(self,\
