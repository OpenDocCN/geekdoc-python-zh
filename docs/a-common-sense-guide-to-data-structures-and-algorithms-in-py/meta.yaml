  md: '![](img/c0a46c67bb2536aa545ec1bd7065e742_204_0.png)


    You''ve got to admit, O(2^N) can look pretty scary.


    While one simple change worked to optimize the first example in this chapter,
    optimizing our Fibonacci sequence isn''t as simple.


    And that''s because there isn''t just one single piece of data we can save in
    a variable. We *need* to calculate both fib(n - 2) and fib(n - 1) (as each Fibonacci
    number is the sum of those two numbers), and storing the result of one won''t
    alone give us the result for the other.


    This is a case of what computer scientists call *overlapping subproblems*. Let''s
    unpack that term.


    When a problem is solved by solving smaller versions of the same problem, the
    smaller problem is called a *subproblem*. This concept isn''t new—we''ve been
    dealing with it frequently throughout our discussion of recursion. In the case
    of the Fibonacci sequence, we compute each number by first computing the smaller
    numbers in the sequence. The computations of these smaller numbers are the subproblems.


    What makes these subproblems *overlapping*, though, is the fact that fib(n - 2)
    and fib(n - 1) end up calling many of the same functions as each other. Specifically,
    fib(n - 1) ends up making some of the very same calculations already made by fib(n
    - 2). For example, you can see in the previous diagram that fib(5) calls fib(3)
    even though fib(4) has itself already done so. Many other calls are duplicated
    too.


    Well, it seems that we''re at a dead end. Our Fibonacci example requires us to
    make many overlapping function calls, and our algorithm oozes along at a pace
    of O(2^N). There''s just nothing we can do.


    Or is there?'
