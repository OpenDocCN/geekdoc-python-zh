    \n## 阶梯问题\n\n你现在学会了使用一种新的思维策略，通过自顶向下的递归来解决某些计算问题。然而，你可能仍然持怀疑态度，并问：\"我们到底为什么需要这种新的思维策略？到目前为止，我用循环解决这些问题一直很好。\"\
