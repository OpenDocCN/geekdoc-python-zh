    # CHAPTER 13


    # Recursive Algorithms for Speed


    We''ve seen that understanding recursion unlocks all sorts of new algorithms,
    such as traversing a filesystem or producing anagrams. In this chapter, you''re
    going to learn that recursion is also the key to algorithms that can make our
    code run much, much faster.


    In previous chapters, we''ve encountered a number of sorting algorithms, including
    Bubble Sort, Selection Sort, and Insertion Sort. In real life, however, none of
    these methods are actually used to sort arrays. Most computer languages have built-in
    sorting functions for arrays that save us the time and effort of implementing
    our own. And in many of these languages, the sorting algorithm that is employed
    under the hood is Quicksort.


    The reason we''re going to dig into Quicksort (even though it''s already built
    into many computer languages) is because by studying how it works, you can learn
    how to use recursion to greatly speed up an algorithm, and you can do the same
    for other practical algorithms of the real world.


    Quicksort is an extremely fast sorting algorithm that is particularly efficient
    for average scenarios. While in worst-case scenarios (that is, inversely sorted
    arrays) it performs similarly to Insertion Sort and Selection Sort, it''s much
    faster for average scenarios—which are what occur most of the time.


    Quicksort relies on a concept called *partitioning*, so we''ll jump into that
    first.


    # Partitioning


    To *partition* an array is to take a random value from the array—which is then
    called the *pivot*—and make sure that every number that is less than the pivot
    ends up to the left of the pivot and that every number greater than the pivot
    ends up to the right of the pivot. We accomplish partitioning through a simple
    algorithm that will be described in the following example.'
  - '[PAGE 213]


    Let''s say we have the following array:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_213_0.png)


    For consistency''s sake, we''ll always select the rightmost value to be our pivot
    (although we can technically choose other values). In this case, the number 3
    is our pivot. We indicate this by circling it:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_213_1.png)


    We then assign *pointers*—one to the leftmost value of the array, and one to the
    rightmost value of the array, excluding the pivot itself:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_213_2.png)


    We''re now ready to begin the actual partition, which follows these steps. Don''t
    worry—the steps will become clearer shortly, when we walk through our example.


    +   1. The left pointer continuously moves one cell to the right until it reaches
    a value that is greater than or equal to the pivot and then stops.

    2. Then the right pointer continuously moves one cell to the left until it reaches
    a value that is less than or equal to the pivot and then stops. The right pointer
    will also stop if it reaches the beginning of the array.

    3. Once the right pointer has stopped, we reach a crossroads. If the left pointer
    has reached (or gone beyond) the right pointer, we move on to Step 4. Otherwise,
    we swap the values that the left and right pointers are pointing to, and then
    we go back to repeat Steps 1, 2, and 3 again.

    4. Finally, we swap the pivot with the value that the left pointer is currently
    pointing to.


    When we''re done with a partition, we are now assured that all values to the left
    of the pivot are less than the pivot, and all values to the right of the pivot
    are greater than it. And that means the pivot itself is now in its correct place
    within the array, although the other values are not yet necessarily completely
    sorted.'
