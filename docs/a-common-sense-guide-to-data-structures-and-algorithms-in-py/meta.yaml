    \ the node doesn't have a left child, we make the value into the left child, since\
    \ that's exactly where the value belongs:\n\n```\nif not node.left_child:\n  \
    \  node.left_child = tree_node.TreeNode(value)\n```\n\nThis is the base case,\
    \ since we don't need to make any recursive calls.\n\nHowever, if the node already\
    \ has a left child, we can't place the value there. Instead, we recursively call\
    \ insert on the left child so that we continue to search for the spot in which\
    \ we'll place the value:\n\n```\nelse:\n    insert(value, node.left_child)\n```\n\
    \nEventually, we'll hit a descendant node that doesn't have its own child, and\
    \ that's where the value is going to go.\n\nThe rest of the function is the exact\
    \ inverse; it handles cases where the value is greater than the current node.\n\
    \n# The Order of Insertion\n\nIt's important to note that only when creating a\
