- md: "## The Efficiency of Trie Search\n\nThe great thing about trie search is that\
    \ it’s incredibly efficient.\n\nLet’s analyze the number of steps it takes.\n\n\
    In our algorithm, we focus on each character of our search string one at a time.\
    \ As we do so, we use each node’s hash table to find the appropriate child node\
    \ in one step. As you know, a hash table lookup takes just O(1) time. It turns\
    \ out, then, that our algorithm takes as many steps *as there are characters in\
    \ our search string*.\n\nThis can be much faster than using binary search on an\
    \ ordered array. Binary search is O(log N), with N being the number of words in\
    \ our dictionary. Trie search, on the other hand, takes only as many steps as\
    \ the number of characters in our search term. For a word like “cat”, that’s just\
    \ three steps.\n\nExpressing trie search in terms of Big O is slightly tricky.\
    \ We can’t quite call it O(1), since the number of steps isn’t constant, as it\
    \ all depends on the search string’s length. And O(N) can be misleading, since\
    \ N normally refers to the amount of data in the data structure. This would be\
    \ the number of nodes in our trie, which is a much greater number than the number\
    \ of characters in our search string.\n\nMost references have decided to call\
    \ this O(K), where K is the number of characters in our search string. Any letter\
    \ other than N would have worked here, but K it is.\n\nEven though O(K) isn’t\
    \ constant, as the size of the search string can vary, O(K) is similar to constant\
    \ time in one important sense. Most *non-constant* algorithms are tied to the\
    \ amount of data at hand; that is, as N data increases, the algorithm slows down.\
    \ With an O(K) algorithm, though, our trie can grow tremendously, but that will\
    \ have no effect on the speed of our search. An O(K) algorithm on a string of\
    \ three characters will always take three steps, no matter how large the trie\
    \ is. The only factor that affects our algorithm’s speed is the size of our input\
    \ rather than all the available data. This makes our O(K) algorithm extremely\
    \ efficient.\n\nWhile search is the most common type of operation performed on\
    \ tries, it’s difficult to test drive it without populating our trie with data,\
    \ so let’s tackle insertion next.\n\n## Trie Insertion\n\nInserting a new word\
    \ into a trie is similar to searching for an existing word. We first search to\
    \ see if the word already exists in the trie. If it doesn't, we insert the new\
    \ word.\n\nHere's how the algorithm goes:\n\n1. We establish a variable called\
    \ `current_node`. At the beginning of our algorithm, this points to the root node.\n\
    2. We iterate over each character of our search string. Here, our search string\
    \ represents the new word we're inserting. We call it a search string since we're\
    \ also searching whether the string already exists in the trie.\n3. As we point\
    \ to each character of our search string, we look to see if the `current_node`\
    \ has a child with that character as a key.\n4. If it does, we update the `current_node`\
    \ to become that child node, and we go back to Step 2, moving on to the next character\
    \ of our search string.\n5. If the `current_node` does *not* have a child node\
    \ that matches the current character, we create such a child node and update the\
    \ `current_node` to be this new node. We then go back to Step 2, moving on to\
    \ the next character of our search string.\n6. After we insert the final character\
    \ of our new word, we add a \"*\" child to the last node to indicate the word\
    \ is complete.\n\nLet's see this in action by inserting the word \"can\" into\
    \ our earlier example trie.\n\nSetup: We set the `current_node` to be the root\
    \ node. We also point to the first character of our string, which is the \"c\"\
    , as shown in the top [diagram on page 315](diagram on page 315).\n\nStep 1: The\
    \ root node has a \"c\" child key, so we turn that key's value into the `current_node`.\
    \ We also point to the next character of our new word, the \"a\", as shown in\
    \ the bottom [diagram on page 315](diagram on page 315).\n\nStep 2: We inspect\
    \ the `current_node` for a child with the key of \"a\". There is one, so we make\
    \ that the `current_node` and point to the next character of our string, which\
    \ is the \"n\", as shown in the top [diagram on page 316](diagram on page 316).\n\
    \nStep 3: The `current_node` does *not* have an \"n\", so we need to create that\
    \ child, as shown in the bottom [diagram on page 316](diagram on page 316).\n\n\
    ![](img/c0a46c67bb2536aa545ec1bd7065e742_324_0.png)\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_324_1.png)\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_325_0.png)\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_325_1.png)\n\
    \nStep 4: We're done inserting \"can\" into our trie, so we cap it off with a\
    \ child of \"*\":\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_326_0.png)\n\nAnd\
    \ we're done!\n\n## Code Implementation: Trie Insertion\n\nHere's the insert method\
    \ for our Trie class. You'll note that most of it looks the same as the earlier\
    \ search method:\n\n```python\ndef insert(self, word):\n    current_node = self.root\n\
    \n    for char in word:\n        if current_node.children.get(char):\n       \
    \     current_node = current_node.children[char]\n        else:\n            new_node\
    \ = trie_node.TrieNode()\n            current_node.children[char] = new_node\n\
    \            current_node = new_node\n\n    current_node.children[\"*\"] = None\n\
    ```\n\nThe first part of this method is the same as search. It diverges when the\
    \ current_node doesn't have the child that matches the current character. When\
    \ this is the case, we add a new key-value pair to the current_node's hash table,\
    \ with the key being the current character and the value being a new TrieNode:\n\
    \n```python\nnew_node = trie_node.TrieNode()\ncurrent_node.children[char] = new_node\n\
    ```\n\nWe then update the current_node to be this new node:\n\n```python\ncurrent_node\
    \ = new_node\n```\n\nWe then repeat the loop until we're done inserting our new\
    \ word. Once we're done, we add a \"*\" key to the final node's hash table, with\
    \ the value as None:\n\n```python\ncurrent_node.children[\"*\"] = None\n```\n\n\
    Like search, trie insertion takes about O(K) steps. If we count the adding of\
    \ the \"*\" at the end, it's technically K + 1 steps, but because we drop the\
    \ constants, we express the speed as O(K).\n\n## Building Autocomplete\n\nWe're\
    \ just about ready to build a real autocomplete feature. To make this a tad easier,\
    \ let's first build a slightly simpler function that we'll use to help us with\
    \ this feature.\n\n## Collecting All the Words\n\nThe next method we're going\
    \ to add to our Trie class is a method that returns an array of *all* the words\
    \ in the trie. Now, it's rare that we'd actually want to list the *entire* dictionary.\
    \ However, we're going to allow this method to accept any node of the trie as\
    \ an argument so that it can list all the words that start from that node.\n\n\
    The following method, called collect_all_words, collects a list of all the trie's\
    \ words starting from a particular node:\n\n```python\ndef collect_all_words(self,\
    \ words, node=None, word=\"\"):\n    current_node = node or self.root\n    for\
    \ key, child_node in current_node.children.items():\n        if key == \"*\":\n\
    \            words.append(word)\n        else:\n            self.collect_all_words(words,\
    \ child_node, word + key)\n    return words\n```\n\nThis method relies heavily\
    \ on recursion, so let's break it down carefully.\n\nThe method accepts three\
    \ primary arguments: words, node, and word.\n\nWhen we first call this method,\
    \ we must pass in words as an empty array. As the method proceeds, it will fill\
    \ this array with words from the trie. The method eventually returns this array\
    \ once we've filled it with all the desired words.\n\nThe node argument allows\
    \ us to specify which node in the trie to start collecting the words from. If\
    \ we don't pass in this argument, our method will start from the root node, collecting\
    \ every word in the entire trie.\n\nThe word argument defaults to an empty string.\
    \ As we move through the trie, we add characters to this word. When we reach a\
    \ \"*\", the word is considered complete and we add it to the words array.\n\n\
    Let's now break down each line of code.\n\nThe first thing we do is set the current_node:\n\
    \n```python\ncurrent_node = node or self.root\n```\n\nBy default, the current_node\
    \ will be the root node, unless we passed in some other node as the method's first\
    \ parameter. Let's assume for now that the current_node is indeed the root node.\n\
    \nNext, we begin a loop that iterates over all the key-value pairs in the current_node's\
    \ children hash table:\n\n```python\nfor key, child_node in current_node.children.items():\n\
    ```\n\nIn each iteration of the loop, the key is always a single-character string,\
    \ and the value, child_node, is another instance of TrieNode.\n\nLet's skip to\
    \ the else clause, as this is where the magic happens:\n\n```python\nself.collect_all_words(words,\
    \ child_node, word + key)\n```\n\nThis line recursively calls the collect_all_words\
    \ function.\n\nThe first argument is the words array. By passing this array along\
    \ in each recursive call, we're able to fill it with complete words, effectively\
    \ building this list as we traverse the trie.\n\nThe second argument is the child_node.\
    \ This allows us to recursively call the collect_all_words method on the child\
    \ node, continuing to collect all the words from the child node and on.\n\nThe\
    \ third argument is word + key, making it so that as we move through each node\
    \ of the trie, we add the key to the current word, building up the word as we\
    \ go.\n\nThe base case is when we reach a \"*\" key, indicating we've completed\
    \ a word. At this point, we can add the word to the words array:\n\n```python\n\
    if key == \"*\":\n    words.append(word)\n```"
  mdcn: "## Trie 搜索的效率\n\nTrie 搜索的伟大之处在于其极高的效率。\n\n让我们分析一下它所需的步骤数量。\n\n在我们的算法中，我们一次专注于搜索字符串的每个字符。在此过程中，我们使用每个节点的哈希表在一步内找到合适的子节点。如你所知，哈希表查找仅需\
    \ O(1) 时间。因此，我们的算法所需的步骤数*与搜索字符串中的字符数相同*。\n\n这比在有序数组上使用二分查找要快得多。二分查找是 O(log N)，其中\
    \ N 是字典中的单词数量。而 Trie 搜索仅需与搜索词中的字符数相同的步骤。对于像“cat”这样的单词，只需三步。\n\n用大 O 表示法来描述 Trie\
    \ 搜索有点棘手。我们不能简单地称之为 O(1)，因为步骤数不是常数，它完全取决于搜索字符串的长度。而 O(N) 可能会产生误导，因为 N 通常指数据结构中的数据量。这将是我们的\
    \ Trie 中的节点数，这个数字远大于搜索字符串中的字符数。\n\n大多数参考资料决定将其称为 O(K)，其中 K 是搜索字符串中的字符数。这里用 N 以外的任何字母都可以，但最终选择了\
    \ K。\n\n尽管 O(K) 不是常数，因为搜索字符串的大小可以变化，但在一个重要方面，O(K) 类似于常数时间。大多数*非常数*算法都与手头的数据量相关；也就是说，随着\
    \ N 数据的增加，算法会变慢。然而，对于 O(K) 算法，我们的 Trie 可以变得非常庞大，但这不会影响我们的搜索速度。一个针对三个字符字符串的 O(K)\
    \ 算法将始终需要三步，无论 Trie 有多大。影响我们算法速度的唯一因素是输入的大小，而不是所有可用数据。这使得我们的 O(K) 算法极其高效。\n\n\
    虽然搜索是 Trie 上最常见的操作类型，但在没有向 Trie 填充数据的情况下很难进行测试，因此接下来让我们处理插入操作。\n\n## Trie 插入\n\
    \n将新单词插入 Trie 与搜索现有单词类似。我们首先搜索该单词是否已存在于 Trie 中。如果不存在，我们再插入新单词。\n\n算法步骤如下：\n\n\
    1.  我们建立一个名为 `current_node` 的变量。在算法开始时，它指向根节点。\n2.  我们遍历搜索字符串的每个字符。这里，我们的搜索字符串代表我们要插入的新单词。我们称其为搜索字符串，因为我们也在搜索该字符串是否已存在于\
    \ Trie 中。\n3.  当我们指向搜索字符串的每个字符时，我们查看 `current_node` 是否有一个以该字符为键的子节点。\n4.  如果有，我们将\
    \ `current_node` 更新为该子节点，然后返回步骤 2，继续处理搜索字符串的下一个字符。\n5.  如果 `current_node` *没有*与当前字符匹配的子节点，我们创建这样一个子节点，并将\
    \ `current_node` 更新为这个新节点。然后我们返回步骤 2，继续处理搜索字符串的下一个字符。\n6.  在插入新单词的最后一个字符后，我们在最后一个节点添加一个\
    \ \"*\" 子节点，以表示该单词已完成。\n\n让我们通过将单词“can”插入到我们之前的示例 Trie 中来看看实际操作。\n\n设置：我们将 `current_node`\
    \ 设置为根节点。我们还指向字符串的第一个字符，即“c”，如[第 315 页顶部图](diagram on page 315)所示。\n\n步骤 1：根节点有一个“c”子键，因此我们将该键的值变为\
    \ `current_node`。我们还指向新单词的下一个字符“a”，如[第 315 页底部图](diagram on page 315)所示。\n\n步骤\
    \ 2：我们检查 `current_node` 是否有一个键为“a”的子节点。有一个，所以我们将其设为 `current_node`，并指向字符串的下一个字符“n”，如[第\
    \ 316 页顶部图](diagram on page 316)所示。\n\n步骤 3：`current_node` *没有*“n”，因此我们需要创建该子节点，如[第\
    \ 316 页底部图](diagram on page 316)所示。\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_324_0.png)\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_324_1.png)\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_325_0.png)\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_325_1.png)\n\n步骤 4：我们完成了将“can”插入 Trie\
    \ 的操作，因此我们用一个“*”子节点来结束它：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_326_0.png)\n\
    \n这样就完成了！\n\n## 代码实现：Trie 插入\n\n以下是我们的 Trie 类的 insert 方法。你会注意到它的大部分内容与之前的 search\
    \ 方法相同：\n\n```python\ndef insert(self, word):\n    current_node = self.root\n\n\
    \    for char in word:\n        if current_node.children.get(char):\n        \
    \    current_node = current_node.children[char]\n        else:\n            new_node\
    \ = trie_node.TrieNode()\n            current_node.children[char] = new_node\n\
    \            current_node = new_node\n\n    current_node.children[\"*\"] = None\n\
    ```\n\n此方法的第一部分与 search 相同。当 `current_node` 没有与当前字符匹配的子节点时，它开始分叉。在这种情况下，我们向 `current_node`\
    \ 的哈希表添加一个新的键值对，键是当前字符，值是一个新的 TrieNode：\n\n```python\nnew_node = trie_node.TrieNode()\n\
    current_node.children[char] = new_node\n```\n\n然后我们将 `current_node` 更新为这个新节点：\n\
    \n```python\ncurrent_node = new_node\n```\n\n然后我们重复循环，直到完成新单词的插入。完成后，我们在最终节点的哈希表中添加一个\
    \ \"*\" 键，值为 None：\n\n```python\ncurrent_node.children[\"*\"] = None\n```\n\n\
    与搜索类似，Trie 插入大约需要 O(K) 步。如果我们计算最后添加的 \"*\"，技术上是 K + 1 步，但由于我们省略了常数，因此将其速度表示为 O(K)。\n\
    \n## 构建自动补全功能\n\n我们几乎准备好构建一个真正的自动补全功能了。为了让这稍微容易一点，让我们首先构建一个稍微简单的函数，我们将用它来帮助实现这个功能。\n\
    \n## 收集所有单词\n\n接下来我们要添加到 Trie 类中的方法是一个返回 Trie 中*所有*单词数组的方法。现在，我们实际上很少会想要列出*整个*字典。然而，我们将允许此方法接受\
