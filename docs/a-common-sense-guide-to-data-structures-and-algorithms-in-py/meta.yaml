    \n当然，对于给定的问题，O(N²)可能是我们能做到的最好结果。然而，知道我们的算法被认为很慢，可以提示我们更深入地分析是否有更快的替代方案。\n\n在本书的后续章节中，你将学习许多优化代码速度的技术。但优化的第一步是能够确定我们代码当前的速度。\n\
    \n那么，让我们开始吧。\n\n## 偶数的平均值\n\n以下方法接受一个数字数组，并返回所有*偶数*的平均值。我们如何用大O表示法来表达它的效率？\n\n\
