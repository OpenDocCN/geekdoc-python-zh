    \ within the `larger_array`, and the `smaller_array` is therefore not a subset\
    \ of the larger array, and we return `False`. (However, if we get past this loop,\
    \ it means the smaller array *is* a subset of the larger one.)\n\nLet's put this\
    \ altogether in one complete function:\n\n```\ndef is_subset(array1, array2):\n\
    \    hash_table = {}\n\n    # Determine which array is smaller:\n    if len(array1)\
    \ > len(array2):\n        larger_array = array1\n        smaller_array = array2\n\
    \    else:\n        larger_array = array2\n        smaller_array = array1\n\n\
    \    for value in larger_array:\n        hash_table[value] = True\n```"
