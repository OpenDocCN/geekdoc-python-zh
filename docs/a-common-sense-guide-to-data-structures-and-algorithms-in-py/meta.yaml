    \ the conditional statement (if array[0] > max(array[1:]):), we compare the 3\
    \ to max([4]). But calling max([4]) is itself a recursive call. The following\
    \ diagram depicts max([3, 4]) calling max([4]):\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_199_0.png)\n\
    \nNote that next to the arrow, we put the label “1st” to indicate that this recursive\
