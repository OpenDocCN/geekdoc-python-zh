    \ is different each time, we boil down the code’s essence to the fact that it\
    \ is repeatedly executing a task—namely, the printing of a number.\n\nThis was\
    \ our implementation of that algorithm:\n\n```python\ndef countdown(number):\n\
    \    print(number)\n    if number == 0:\n        return\n    else:\n        countdown(number\
