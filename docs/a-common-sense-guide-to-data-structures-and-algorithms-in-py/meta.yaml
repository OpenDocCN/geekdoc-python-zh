    \    如果我们要编写一个软件，不断减少一堆简历直到剩下一份，它可能会采取交替扔掉上半部分和下半部分的方法；也就是说，它首先淘汰堆的上半部分，然后继续淘汰剩下部分的下半部分。它不断交替淘汰上半部分和下半部分，直到剩下一份幸运的简历，那就是我们要雇用的人！\n\
