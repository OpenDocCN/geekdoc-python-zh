    data.


    Currently, the `cheapest_previous_stopover_city_table` looks like this:


    | Cheapest Previous Stopover City from Atlanta: | Boston | Chicago | Denver |
    El Paso |

    | :--- | :--- | :--- | :--- | :--- |

    | | Atlanta | Denver | Atlanta | Chicago |


    We can use this table to draw the shortest path from Atlanta to El Paso—if we
    go backward.


    Let''s look at El Paso. Its corresponding city is Chicago. This means the cheapest
    route from Atlanta to El Paso involves stopping over in Chicago as the *immediate
    step* before flying to El Paso. Let''s write this down:


    ```

    Chicago -> El Paso

    ```


    Now, if we look up Chicago in the `cheapest_previous_stopover_city_table`, we
    can see that its corresponding value is Denver. This means the cheapest route
