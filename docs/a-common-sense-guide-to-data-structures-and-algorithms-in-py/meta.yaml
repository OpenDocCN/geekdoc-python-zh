  - '[PAGE 426]


    While the discovery of a pattern helped us discover the precise solution, by adopting
    the greedy mindset, we knew what kind of pattern we were looking for in the first
    place.


    # Greedy Stock Predictions


    Let''s look at one more greedy algorithm.


    Say we''re writing financial software that makes stock predictions. The particular
    algorithm we''re working on now looks for a positive trend for a given stock.


    Specifically, we''re writing a function that accepts an array of stock prices
    and determines whether there are any *three* prices that create an upward trend.


    For example, take this array of stock prices that represents the price of a given
    stock over time:


    ```

    [22, 25, 21, 18, 19.6, 17, 16, 20.5]

    ```


    Although it may be difficult to spot at first, there are three prices that form
    an upward trend:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_426_0.png)


    As we go from left to right, there are three prices where a "right-hand" price
    is greater than a "middle" price, which in turn is greater than a "left-hand"
    price.


    The following array, on the other hand, does not contain a three-point upward
    trend:


    ```

    [50, 51.25, 48.4, 49, 47.2, 48, 46.9]

    ```


    Our function should return `True` if the array contains an upward trend of three
    prices and `False` if it does not.


    So how do we go about this?


    One way we can do this is with three nested loops. As one loop iterates over each
    stock price, a second loop iterates over all the stock prices that follow. And
    for each round of the second loop, a third nested loop checks all the prices that
    follow the second price. As we point to each set of three stock prices, we check
    whether they''re in ascending order. As soon as we find such a set, we return
    `True`. But if we complete the loops without finding any such trend, we return
    `False`.'
  - '[PAGE 427]


    The time complexity of this algorithm is O(N³). That''s pretty slow! Is there
    any way we can optimize this?


    Let''s first think about the best-imaginable Big O. We definitely need to inspect
    each stock price to find a trend, so we know that our algorithm cannot be faster
    than O(N). Let''s see if we can optimize for such a speed.


    Once again, it''s time to get greedy.


    To apply the greedy mentality to our case, we''d want to somehow keep grabbing
    what we think is the lowest point of our three-price upward trend. It would also
    be cool if we can use the same greedy approach to constantly grab what we think
    are the middle and highest points of that trend.


    Here''s what we''ll do:


    We''ll assume the first price from the array is the lowest point in the three-price
    upward trend.


    As far as the middle price, we''ll initialize it to a number that''s guaranteed
    to be greater than even the highest stock price in the array. To do this, we''ll
    set it to infinity. This particular step might be the least intuitive at first
    glance, but you''ll see shortly why we need to do this.


    We''ll then make a single pass through the entire array, according to the following
    steps:


    +   1. If the current price is lower than the lowest price we''ve encountered
    so far, this price becomes the new lowest price.

    2. If the current price is higher than the lowest price, but lower than the middle
    price, we update the middle price to be the current price.

    3. If the current price is higher than the middle price, it means we''ve found
    a three-price upward trend!


    Let''s see this in action. First, we''ll start with a simple example, working
    with this array of stock prices:


    ```

    [5, 2, 8, 4, 3, 7]

    ```


    We begin iterating through the array, starting with the 5. We start out of the
    gates with pure greed, and assume that this 5 is the smallest price in the three-point
    trend as shown in the following [array on page 421](#).'
