    \ encounter a 5. Let's ask ourselves the magical lookup question: “If I could\
    \ magically find a desired piece of information in O(1) time, can I make my algorithm\
    \ faster?”"
  - "[PAGE 471]\n\nWell, to determine whether the 5 is part of the longest consecutive\
    \ sequence, we'd want to know whether there's a 6 in the array. We'd also want\
    \ to know if there's a 7, and an 8, and so on.\n\nWe can achieve each of those\
    \ lookups in O(1) time if we first store all the numbers from our array in a hash\
    \ table; that is, the array [10, 5, 12, 3, 55, 30, 4, 11, 2] could look like this\
    \ if we moved the data to a hash table:\n\n```\n{10: True, 5: True, 12: True,\
    \ 3: True, 55: True,\n 30: True, 4: True, 11: True, 2: True}\n```\n\nIn this case,\
    \ if we encounter the 2, we can then run a loop that keeps checking for the next\
    \ number in the hash table. If it finds it, we increase the length of the current\
    \ sequence by one. The loop repeats this process until it can't find the next\
    \ number in the sequence. Each of these lookups takes just one step.\n\nBut, you\
    \ may ask, how does this help? Imagine our array is [6, 5, 4, 3, 2, 1]. When we\
    \ iterate over the 6, we'll find that there isn't a sequence that builds up from\
    \ there. When we reach the 5, we'll find the sequence 5-6. When we reach the 4,\
    \ we'll find the sequence 4-5-6. When we reach the 3, we'll find the sequence\
    \ 3-4-5-6, and so on. We'll still end up going through about N² / 2 steps finding\
    \ all those sequences.\n\nThe answer is that we'll only start building a sequence\
    \ if the current number is the *bottom number* of the sequence. So we won't build\
    \ 4-5-6 when there's a 3 in the array.\n\nBut how do we know if the current number\
    \ is the bottom of a sequence? By doing a magical lookup!\n\nHow? Before running\
    \ a loop to find a sequence, we'll do an O(1) lookup of the hash table to check\
    \ whether there's a number *that's 1 less than current number*. So if the current\
    \ number is 4, we'll first check to see whether there's a 3 in the array. If there\
    \ is, we won't bother to build a sequence. We only want to build a sequence starting\
    \ from the bottom number of that sequence; otherwise we have redundant steps.\n\
    \nHere's the code for this:\n\n```\ndef longest_sequence_length(array):\n    hash_table\
    \ = {}\n    greatest_sequence_length = 0\n\n    for number in array:\n       \
    \ hash_table[number] = True\n\n    for number in array:\n```"
