- md: "## Exercises\n\nThe following exercises provide you with the opportunity to\
    \ practice with hash tables. The solutions to these exercises are found in the\
    \ section [Chapter 8, on page 440](https://example.com).\n\n1.  Write a function\
    \ that returns the intersection of two arrays. The intersection is a third array\
    \ that contains all values contained within the first two arrays. For example,\
