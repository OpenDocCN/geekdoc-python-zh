    insertion of the new value.


    The worst-case scenario for insertion into an array—that is, the scenario in which
    insertion takes the most steps—is when we insert data at the *beginning* of the
    array. This is because when inserting at the beginning of the array, we have to
    move *all* the other values one cell to the right.


    We can say that insertion in a worst-case scenario can take *N + 1* steps for
    an array containing N elements. This is because we need to shift all N elements
    over, and then finally execute the actual insertion step.


    Now that we''ve covered insertion, we''re up to the array''s final operation:
    deletion.


    ## Deletion


    Deletion from an array is the process of eliminating the value at a particular
    index.


    Let''s return to our original example array and delete the value at index 2. In
    our example, this value is "cucumbers".


    Step 1: We delete "cucumbers" from the array:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_34_0.png)


    While the actual deletion of "cucumbers" technically took just one step, we now
    have a problem: we have an empty cell sitting smack in the middle of our array.
    An array isn''t effective when there are gaps in the middle of it, so to resolve
    this issue, we need to shift "dates" and "elderberries" to the left. This means
    our deletion process requires additional steps.


    Step 2: We shift "dates" to the left:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_34_1.png)


    Step 3: We shift "elderberries" to the left:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_34_2.png)


    It turns out that for this deletion, the entire operation took three steps. The
    first step involved the actual deletion, and the other two steps involved data
    shifts to close the gap.


    Like insertion, the worst-case scenario of deleting an element is deleting the
    very first element of the array. This is because index 0 would become empty, and
    we''d have to shift *all* the remaining elements to the left to fill the gap.


    For an array of 5 elements, we''d spend 1 step deleting the first element and
    4 steps shifting the 4 remaining elements. For an array of 500 elements, we''d
    spend 1 step deleting the first element, and 499 steps shifting the remaining
    data. We can say then, that for an array containing N elements, the maximum number
    of steps that deletion would take is N steps.


    Congratulations! We''ve analyzed the time complexity of our first data structure.
    Now that you''ve learned how to analyze a data structure''s efficiency, you can
    now discover how different data structures have different efficiencies. This is
    crucial, because choosing the correct data structure for your code can have serious
    ramifications on your software''s performance.


    The next data structure—the *set*—seems so similar to the array at first glance.
    However, you''ll see that the operations performed on arrays and sets have different
    efficiencies.


    ## Sets: How a Single Rule Can Affect Efficiency


    Let''s explore this other data structure: the *set*. A set is a data structure
    that does not allow duplicate values to be contained within it.


    Sets are of different types, but for this discussion, I''ll talk about an *array-based
    set*. This set is just like an array—it''s a simple list of values. The only difference
    between this set and a classic array is that the set never allows duplicate values
    to be inserted into it.


    For example, if you had the set ["a", "b", "c"] and tried to add another "b",
    the computer just wouldn''t allow it, since a "b" already exists within the set.


    Sets are useful when you need to ensure that you don''t have duplicate data.


    For instance, if you''re creating an online phone book, you don''t want the same
    phone number appearing twice. In fact, I''m currently suffering from this with
    my local phone book: my home phone number is not just listed for me but is also
    listed erroneously as the phone number for some family named Zirkind. (Yes, this
    is a true story.) Let me tell you—it''s annoying to receive phone calls and voicemail
    from people looking for the Zirkinds. For that matter, I''m sure the Zirkinds
    are also wondering why no one ever calls them. And when I call the Zirkinds to
    let them know about the error, my wife picks up the phone because I''ve called
    my own number. (Okay, that last part never happened.) If only the program that
    produced the phone book had used a set...


    In any case, an array-based set is an array with one additional constraint of
    barring duplicates. While not allowing duplicates is a useful feature, this simple
    constraint also causes the set to have a *different efficiency* for one of the
    four primary operations.


    Let''s analyze the reading, searching, insertion, and deletion operations in the
    context of an array-based set.


    Reading from a set is exactly the same as reading from an array—it takes just
    one step for the computer to look up what''s contained within a particular index.
    As I described earlier, this is because the computer can jump to any index within
    the set since it can easily calculate and jump to its memory address.


    Searching a set also turns out to be no different than searching an array—it takes
    up to N steps to search for a value within a set. And deletion is also identical
    between a set and an array—it takes up to N steps to delete a value and move data
    to the left to close the gap.


    Insertion, however, is where arrays and sets diverge. Let''s first explore inserting
    a value at the *end* of a set, which was a best-case scenario for an array. We
    saw that with an array, the computer can insert a value at its end in a single
    step.


    With a set, however, the computer first needs to determine that this value doesn''t
    already exist in this set—because that''s what sets do: they prevent duplicate
    data from being inserted into them.


