    \ with Python. While we could have alternatively used a loop instead, the recursive\
    \ code for search is more concise and elegant:\n\n```\ndef search(search_value,\
    \ node):\n    if not node or node.value == search_value:\n        return node\n\
    \    elif search_value < node.value:\n        return search(search_value, node.left_child)\n\
    \    else:\n        return search(search_value, node.right_child)\n```\n\nThis\
    \ search function accepts the search_value we're searching for and a node that\
    \ we'll use as the base for our search. The first time we call search, the node\
    \ will be the root node. However, in the subsequent recursive calls, the node\
    \ may be another node within the tree.\nOur function deals with four possible\
    \ cases, two of which are the base cases:\n\n```\nif not node or node.value ==\
    \ search_value:\n    return node\n```\n\nOne base case is when the node contains\
    \ the search_value we're looking for, in which case we can return the node and\
    \ not make any recursive calls.\nThe other base case is when there is no node.\
    \ This will make more sense after we've examined the other cases, so let's come\
    \ back to this shortly.\nThe next case is when the search_value is less than the\
    \ value of the current node:\n\n```\nelif search_value < node.value:\n    return\
    \ search(search_value, node.left_child)\n```"
- md: "In this case, we know that if it exists in the tree, the `search_value` will\
    \ have to be found somewhere among this node's left descendants. So we recursively\
    \ call the search function on this node's left child.\n\nThe next case is the\
    \ inverse; it's when the `search_value` is greater than the current node:\n\n\
    ```\nelse:\n    return search(search_value, node.right_child)\n```\n\nIn this\
    \ case, we recursively call search on the current node's right child.\n\nNow,\
    \ when we make these recursive calls on the current node's children, note that\
    \ we didn't check whether the current node even has any children. That's where\
    \ the first base case comes in:\n\n```\nif not node\n```\n\nThat is to say, if\
    \ it turns out that we called search on a child node that doesn't actually exist,\
    \ we end up returning `None` (since the `node` variable will actually contain\
    \ `None`). This case will happen if the `search_value` doesn't exist within our\
    \ tree, as we'll try to access the node where the `search_value` *should* be found,\
    \ but our search hits a dead end. In this case, it's appropriate that we return\
    \ `None`, indicating that the `search_value` is not within the tree.\n\n## Insertion\n\
    \nAs I mentioned earlier, binary search trees are at their best when it comes\
    \ to insertion. Now we'll see why.\n\nSay we want to insert the number 45 into\
    \ our example tree. The first thing we'd have to do is find the correct node to\
    \ attach the 45 to. To begin our search, we start at the root:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_266_0.png)\n\
    \nSince 45 is less than 50, we drill down to the left child:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_267_0.png)\n\
    \nSince 45 is greater than 25, we must inspect the right child:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_267_1.png)\n\
    \nSince 45 is greater than 33, we check the 33's right child:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_267_2.png)\n\
    \nAt this point, we've reached a node that has no children, so we have nowhere\
    \ to go. This means we're ready to perform our insertion.\n\nSince 45 is greater\
    \ than 40, we insert it as a right child of the 40:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_268_0.png)\n\
    \nIn this example, insertion took five steps, consisting of four search steps\
    \ plus one insertion step. Insertion always takes just one extra step beyond a\
    \ search, which means insertion takes (log N) + 1 steps. In Big O notation, which\
    \ ignores constants, this is O(log N).\n\nIn an ordered array, by contrast, insertion\
    \ takes O(N), because in addition to search, we must shift a lot of data to the\
    \ right to make room for the value we're inserting.\n\nThis is what makes binary\
    \ search trees so efficient. While ordered arrays have O(log N) search and O(N)\
    \ insertion, binary search trees have O(log N) search and O(log N) insertion.\
    \ This becomes critical in an application in which you anticipate a lot of changes\
    \ to your data.\n\n## Code Implementation: Binary Search Tree Insertion\n\nHere's\
    \ a Python implementation of inserting a new value into a binary search tree.\
    \ Like the search function, it's recursive:\n\n```python\nimport tree_node\n\n\
    def insert(value, node):\n    if value < node.value:\n        if not node.left_child:\n\
    \            node.left_child = tree_node.TreeNode(value)\n        else:\n    \
    \        insert(value, node.left_child)\n    elif value > node.value:\n      \
    \  if not node.right_child:\n            node.right_child = tree_node.TreeNode(value)\n\
    \        else:\n            insert(value, node.right_child)\n```\n\nThe insert\
    \ function accepts a value that we're going to insert and a node that serves as\
    \ the ancestor node for which our value will become a descendant.\n\nFirst, we\
    \ check whether the value is less than the value of the current node:\n\n```\n\
    if value < node.value:\n```\n\nIf the value is less than the node, we know that\
    \ we need to insert the value somewhere among the left descendants of the node.\n\
    \nWe then check to see whether the current node has a left child. If the node\
    \ doesn't have a left child, we make the value into the left child, since that's\
    \ exactly where the value belongs:\n\n```\nif not node.left_child:\n    node.left_child\
    \ = tree_node.TreeNode(value)\n```\n\nThis is the base case, since we don't need\
    \ to make any recursive calls.\n\nHowever, if the node already has a left child,\
    \ we can't place the value there. Instead, we recursively call insert on the left\
    \ child so that we continue to search for the spot in which we'll place the value:\n\
    \n```\nelse:\n    insert(value, node.left_child)\n```\n\nEventually, we'll hit\
    \ a descendant node that doesn't have its own child, and that's where the value\
    \ is going to go.\n\nThe rest of the function is the exact inverse; it handles\
    \ cases where the value is greater than the current node.\n\n## The Order of Insertion\n\
    \nIt's important to note that only when creating a tree out of randomly sorted\
    \ data do trees usually wind up being well-balanced. However, if we insert *sorted*\
    \ data into a tree, it can become imbalanced and less efficient. For example,\
    \ if we were to insert the following data in this order—1, 2, 3, 4, 5—we'd end\
    \ up with a tree that looks like this:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_269_0.png)\n\
    \nThis tree is completely linear, so searching for the 5 within this tree would\
    \ take O(N).\n\nHowever, if we inserted the same data in the following order—3,\
    \ 2, 4, 1, 5—the tree would be evenly balanced:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_270_0.png)\n\
    \nOnly with a balanced tree does search take O(log N).\n\nBecause of this, if\
    \ you ever want to convert an ordered array into a binary search tree, you'd want\
    \ to first randomize the order of the data.\n\nIt emerges that in a worst-case\
    \ scenario, when a tree is completely *imbalanced*, search is O(N). In a best-case\
    \ scenario, when it is perfectly balanced, search is O(log N). In the typical\
    \ scenario, in which data is inserted in random order, a tree will be pretty well\
    \ balanced and search will take about O(log N).\n\n## Deletion\n\nDeletion is\
    \ the least straightforward operation within a binary search tree and requires\
    \ some careful maneuvering.\n\nLet's say we want to delete the 4 from this binary\
    \ search tree:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_270_1.png)\n\nFirst,\
    \ we perform a search to find the 4. We won't visualize this search again, since\
    \ you've already got that down.\n\nOnce we find the 4, we can delete it in one\
    \ step:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_271_0.png)\n\nWell, that was\
    \ simple. But let's see what happens when we try to delete the 10:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_271_1.png)\n\
    \nWe end up with an 11 that isn't connected to the tree anymore. And we can't\
    \ have that, because we'd lose the 11 forever.\n\nHowever, to solve this problem,\
    \ we can plug the 11 into where the 10 used to be:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_271_2.png)\n\
    \nSo far, our deletion algorithm follows these rules:\n\n- If the node being deleted\
    \ has no children, simply delete it.\n- If the node being deleted has one child,\
    \ delete the node and plug the child into the spot where the deleted node was.\n\
    \n## Deleting a Node with Two Children\n\nDeleting a node that has two children\
    \ is the most complex scenario. Let's say we want to delete the 56 in this tree:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_272_0.png)\n\nWhat are we going to\
    \ do with its former children, 52 and 61? We can't move *both* of them to where\
    \ the 56 was. This is where the next rule of the deletion algorithm comes into\
    \ play:\n\n- When deleting a node with two children, replace the deleted node\
    \ with the *successor* node. The successor node is the child node whose value\
    \ is the *least of all values that are greater than the deleted node*.\n\nThat\
    \ was a tricky sentence. To put it in other words: if we were to put the deleted\
    \ node and all of its descendants in ascending order, the successor node would\
    \ be the next number after the one we just deleted.\n\nIn this case, it's easy\
    \ to figure out which node is the successor since the deleted node had only two\
    \ descendants. If we put the numbers 52-56-61 in ascending order, the next number\
    \ after 56 is 61.\n\nOnce we find the successor node, we plug it into where the\
    \ deleted node was. So we replace the 56 with the 61:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_272_1.png)"
  mdcn: "在这种情况下，我们知道如果它存在于树中，`search_value` 必须在该节点的左子节点中找到。因此，我们递归地在该节点的左子节点上调用搜索函数。\n\
    \n下一种情况是相反的；即 `search_value` 大于当前节点时：\n\n```\nelse:\n    return search(search_value,\
    \ node.right_child)\n```\n\n在这种情况下，我们递归地在当前节点的右子节点上调用搜索。\n\n现在，当我们对当前节点的子节点进行这些递归调用时，请注意我们没有检查当前节点是否有任何子节点。这就是第一个基本情况的由来：\n\
    \n```\nif not node\n```\n\n也就是说，如果我们调用搜索的子节点实际上不存在，我们最终会返回 `None`（因为 `node` 变量实际上会包含\
    \ `None`）。如果 `search_value` 在我们的树中不存在，就会发生这种情况，因为我们将尝试访问 `search_value` *应该*被找到的节点，但我们的搜索遇到了死胡同。在这种情况下，我们返回\
    \ `None` 是合适的，表示 `search_value` 不在树中。\n\n## 插入\n\n正如我之前提到的，二叉搜索树在插入方面表现最佳。现在我们将看到原因。\n\
    \n假设我们要将数字 45 插入到我们的示例树中。我们要做的第一件事是找到正确的节点来附加 45。为了开始搜索，我们从根节点开始：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_266_0.png)\n\
    \n由于 45 小于 50，我们向下钻取到左子节点：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_267_0.png)\n\
    \n由于 45 大于 25，我们必须检查右子节点：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_267_1.png)\n\
    \n由于 45 大于 33，我们检查 33 的右子节点：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_267_2.png)\n\
    \n此时，我们到达了一个没有子节点的节点，所以我们无处可去。这意味着我们准备好执行插入了。\n\n由于 45 大于 40，我们将其作为 40 的右子节点插入：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_268_0.png)\n\n在这个例子中，插入花了五步，包括四个搜索步骤和一个插入步骤。插入总是比搜索多一步，这意味着插入需要\
    \ (log N) + 1 步。在忽略常数的大 O 表示法中，这是 O(log N)。\n\n相比之下，在有序数组中，插入需要 O(N)，因为除了搜索之外，我们必须将大量数据向右移动，为要插入的值腾出空间。\n\
    \n这就是二叉搜索树如此高效的原因。虽然有序数组具有 O(log N) 的搜索和 O(N) 的插入，但二叉搜索树具有 O(log N) 的搜索和 O(log\
    \ N) 的插入。这在预期数据会频繁更改的应用程序中变得至关重要。\n\n## 代码实现：二叉搜索树插入\n\n以下是将新值插入二叉搜索树的 Python\
    \ 实现。与搜索函数一样，它是递归的：\n\n```python\nimport tree_node\n\ndef insert(value, node):\n\
    \    if value < node.value:\n        if not node.left_child:\n            node.left_child\
    \ = tree_node.TreeNode(value)\n        else:\n            insert(value, node.left_child)\n\
    \    elif value > node.value:\n        if not node.right_child:\n            node.right_child\
    \ = tree_node.TreeNode(value)\n        else:\n            insert(value, node.right_child)\n\
    ```\n\ninsert 函数接受一个我们要插入的值和一个节点，该节点作为我们值将成为其后代的祖先节点。\n\n首先，我们检查该值是否小于当前节点的值：\n\
    \n```\nif value < node.value:\n```\n\n如果该值小于节点，我们知道需要将该值插入到节点的左后代中的某个位置。\n\n然后我们检查当前节点是否有左子节点。如果节点没有左子节点，我们将该值设为左子节点，因为这正是该值所属的位置：\n\
    \n```\nif not node.left_child:\n    node.left_child = tree_node.TreeNode(value)\n\
    ```\n\n这是基本情况，因为我们不需要进行任何递归调用。\n\n但是，如果节点已经有左子节点，我们就不能将该值放在那里。相反，我们递归地在左子节点上调用\
    \ insert，以便继续搜索我们将放置该值的位置：\n\n```\nelse:\n    insert(value, node.left_child)\n\
    ```\n\n最终，我们将遇到一个没有自己子节点的后代节点，那就是该值将要放置的位置。\n\n函数的其余部分完全相反；它处理值大于当前节点的情况。\n\n\
    ## 插入顺序\n\n需要注意的是，只有在从随机排序的数据创建树时，树通常才会最终达到良好平衡。但是，如果我们向树中插入*已排序*的数据，它可能会变得不平衡且效率降低。例如，如果我们按以下顺序插入数据——1,\
    \ 2, 3, 4, 5——我们将得到一棵看起来像这样的树：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_269_0.png)\n\
    \n这棵树是完全线性的，因此在该树中搜索 5 将需要 O(N)。\n\n但是，如果我们按以下顺序插入相同的数据——3, 2, 4, 1, 5——树将是均匀平衡的：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_270_0.png)\n\n只有平衡树才能使搜索达到 O(log N)。\n\
    \n因此，如果您想将有序数组转换为二叉搜索树，您应该首先随机化数据的顺序。\n\n由此可见，在最坏的情况下，当树完全*不平衡*时，搜索是 O(N)。在最佳情况下，当它完美平衡时，搜索是\
    \ O(log N)。在典型情况下，数据按随机顺序插入，树将相当平衡，搜索大约需要 O(log N)。\n\n## 删除\n\n删除是二叉搜索树中最不直接的操作，需要一些仔细的操作。\n\
    \n假设我们要从这棵二叉搜索树中删除 4：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_270_1.png)\n\
    \n首先，我们执行搜索以找到 4。我们不会再次可视化此搜索，因为您已经掌握了。\n\n一旦我们找到 4，我们可以在一步内删除它：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_271_0.png)\n\
    \n嗯，这很简单。但让我们看看当我们尝试删除 10 时会发生什么：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_271_1.png)\n\
    \n我们最终得到一个不再连接到树的 11。我们不能这样，因为我们将永远失去 11。\n\n然而，为了解决这个问题，我们可以将 11 插入到 10 原来的位置：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_271_2.png)\n\n到目前为止，我们的删除算法遵循以下规则：\n\
    \n- 如果要删除的节点没有子节点，则直接删除它。\n- 如果要删除的节点有一个子节点，则删除该节点并将子节点插入到已删除节点的位置。\n\n## 删除具有两个子节点的节点\n\
    \n删除具有两个子节点的节点是最复杂的情况。假设我们要删除这棵树中的 56：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_272_0.png)\n\
    \n我们将如何处理它的前子节点 52 和 61？我们不能将*两者*都移动到 56 原来的位置。这就是删除算法的下一条规则发挥作用的地方：\n\n- 删除具有两个子节点的节点时，用*后继*节点替换已删除的节点。后继节点是其值*大于已删除节点的所有值中最小*的子节点。\n\
    \n这是一个棘手的句子。换句话说：如果我们将已删除的节点及其所有后代按升序排列，后继节点将是我们刚刚删除的数字之后的下一个数字。\n\n在这种情况下，很容易确定哪个节点是后继节点，因为已删除的节点只有两个后代。如果我们将数字\
    \ 52-56-61 按升序排列，56 之后的下一个数字是 61。\n\n一旦我们找到后继节点，我们就将其插入到已删除节点的位置。因此，我们用 61 替换\
    \ 56：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_272_1.png)"
