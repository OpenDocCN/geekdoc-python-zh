    \n## 代码实现：选择排序\n\n以下是选择排序的 Python 实现：\n\n```python\ndef selection_sort(array):\n\
    \    for i in range(len(array) - 1):\n        lowest_number_index = i\n\n    \
    \    for j in range(i + 1, len(array)):\n            if array[j] < array[lowest_number_index]:\n\
    \                lowest_number_index = j\n\n        if lowest_number_index !=\
    \ i:\n            array[i], array[lowest_number_index] = \\\n                array[lowest_number_index],\
    \ array[i]\n\n    return array\n```\n\n让我们逐行解析。\n\n我们开始一个循环，代表每一次遍历。它使用变量 `i`\
    \ 指向数组的每个索引，并一直遍历到倒数第二个值：\n\n```python\nfor i in range(len(array) - 1):\n```\n\
    \n它不需要为最后一个值本身运行，因为到那时数组将完全排序。\n\n接下来，开始跟踪包含我们目前遇到的最低值的 `索引`：\n\n```python\nlowest_number_index\
    \ = i\n```\n\n这个 `lowest_number_index` 在第一次遍历开始时为 0，在第二次遍历开始时为 1，依此类推。\n\n我们特别跟踪索引的原因是，在代码的其余部分中，我们需要同时访问最低值及其索引，而我们可以使用索引来引用两者。（我们可以通过调用\
    \ `array[lowest_number_index]` 来检查最低值）。\n\n在每次遍历中，我们检查数组的剩余值，看看是否存在比当前最低值更低的值：\n\
    \n```python\nfor j in range(i + 1, len(array)):\n```\n\n确实，如果我们找到一个更低的值，我们将这个新值的索引存储在\
    \ lowest_number_index 中：\n\n```python\nif array[j] < array[lowest_number_index]:\n\
    \    lowest_number_index = j\n```\n\n在内部循环结束时，我们将找到本次遍历中最低数字的索引。\n\n如果本次遍历的最低值已经处于其正确位置（当最低值是我们在遍历中遇到的第一个值时会发生这种情况），我们不需要做任何事情。但如果最低值*不*在其正确位置，我们需要执行交换。具体来说，我们将最低值与索引\
    \ i 处的值交换，i 是我们开始本次遍历的索引：\n\n```python\nif lowest_number_index != i:\n    array[i],\
    \ array[lowest_number_index] = array[lowest_number_index], array[i]\n```\n\n最后，我们返回排序后的数组：\n\
    \n```python\nreturn array\n```\n\n## 选择排序的效率\n\n选择排序包含两种类型的步骤：比较和交换。我们在每次遍历中将每个值与我们遇到的最低数字进行比较，并将最低数字交换到其正确位置。\n\
    \n回顾我们包含五个元素的示例数组，我们总共进行了 10 次比较。让我们在下表中分解：\n\n| 遍历次数 | 比较次数 |\n| :--- | :---\
    \ |\n| 1 | 4 次比较 |\n| 2 | 3 次比较 |\n| 3 | 2 次比较 |\n| 4 | 1 次比较 |\n\n总计 4 + 3 +\
    \ 2 + 1 = 10 次比较。\n\n为了适用于所有大小的数组，我们可以说，对于 N 个元素，我们进行\n\n(N - 1) + (N - 2) + (N\
    \ - 3) ... + 1 次比较。\n\n至于*交换*，我们每次遍历最多只需要进行一次交换。这是因为在每次遍历中，我们进行一次或零次交换，具体取决于该遍历的最低数字是否已处于正确位置。与冒泡排序相比，在最坏的情况下，我们不得不为*每一次*比较都进行一次交换。\n\
    \n以下是冒泡排序和选择排序的并排比较：\n\n| N 个元素 | 冒泡排序的最大步骤数 | 选择排序的最大步骤数 |\n| :--- | :--- | :---\
    \ |\n| 5 | 20 | 14 (10 次比较 + 4 次交换) |\n| 10 | 90 | 54 (45 次比较 + 9 次交换) |\n| 20\
    \ | 380 | 209 (190 次比较 + 19 次交换) |\n| 40 | 1560 | 819 (780 次比较 + 39 次交换) |\n|\
    \ 80 | 6320 | 3239 (3160 次比较 + 79 次交换) |\n\n从这个比较中可以清楚地看出，选择排序所需的步骤数大约是冒泡排序的一半，这表明选择排序的速度是其两倍。\n\
    \n## 忽略常数\n\n但有趣的是：在大 O 表示法的世界里，选择排序和冒泡排序的描述方式*完全相同*。\n\n再次强调，大 O 表示法回答了关键问题：如果有\
    \ N 个数据元素，算法将需要多少步？因为选择排序大约需要 N² / 2 步，所以将选择排序的效率描述为 O(N² / 2) 似乎是合理的。也就是说，对于\
    \ N 个数据元素，有 N² / 2 步。下表证实了这一点：\n\n| N 个元素 | N² / 2 | 选择排序的最大步骤数 |\n| :--- | :---\
    \ | :--- |\n| 5 | 5² / 2 = 12.5 | 14 |\n| 10 | 10² / 2 = 50 | 54 |\n| 20 | 20²\
    \ / 2 = 200 | 209 |\n| 40 | 40² / 2 = 800 | 819 |\n| 80 | 80² / 2 = 3200 | 3239\
    \ |\n\n然而，实际上，选择排序在大 O 中被描述为 O(N²)，就像冒泡排序一样。这是因为大 O 的一个主要规则，我现在首次引入：\n\n*大 O 表示法忽略常数。*\n\
    \n这仅仅是一种数学上的说法，即大 O 表示法从不包含不是指数的普通数字。我们直接从表达式中去掉这些普通数字。\n\n那么在我们的例子中，即使算法需要 N²\
    \ / 2 步，我们也去掉“/ 2”，因为它是一个普通数字，并将效率表示为 O(N²)。\n\n这里还有几个例子：\n\n对于一个需要 N / 2 步的算法，我们称之为\
    \ O(N)。\n\n一个需要 N² + 10 步的算法将被表示为 O(N²)，因为我们去掉了 10，它是一个普通数字。\n\n对于一个需要 2N 步（即\
    \ N * 2）的算法，我们去掉普通数字，称之为 O(N)。\n\n即使是 O(100N)，它比 O(N) *慢 100 倍*，也被称为 O(N)。\n\n\
    乍一看，这条规则似乎会使大 O 表示法完全无用，因为你可以有两个算法在大 O 中被描述得完全相同，但其中一个可能比另一个*快 100 倍*。而这正是我们在选择排序和冒泡排序中看到的情况。两者在大\
    \ O 中都被描述为 O(N²)，但选择排序的速度是冒泡排序的两倍。\n\n那么，这是怎么回事呢？\n\n## 大 O 类别\n\n这引出了大 O 中的下一个概念：大\
    \ O 表示法只关注算法速度的*一般类别*。\n\n打个比方，我们来谈谈物理建筑。当然，有许多不同类型的建筑。有一层楼的单户住宅，两层楼的单户住宅，三层楼的单户住宅。有不同楼层数的高层公寓楼。还有各种高度和形状的摩天大楼。\n\
    \n如果我们比较两栋建筑，其中一栋是单户住宅，另一栋是摩天大楼，那么提到每栋有多少层楼几乎就变得无关紧要了。因为这两栋建筑在规模和功能上差异如此之大，我们不需要说，“这是一栋两层楼的房子，而另一栋是一百层的摩天大楼。”我们不妨直接称一栋为房子，另一栋为摩天大楼。用它们的一般类别来称呼就足以表明它们的巨大差异。\n\
    \n算法效率也是如此。如果我们比较，比如说，一个 O(N) 算法和一个 O(N²) 算法，这两种效率差异如此之大，以至于 O(N) 算法实际上是 O(2N)、O(N\
    \ / 2) 甚至 O(100N) 并不真正重要。\n\n现在，这就是为什么 O(N) 和 O(N²) 被认为是两个不同的类别，而 O(N) 和 O(100N)\
    \ 属于同一个类别。\n\n记住[第 37 页的《大 O 的灵魂》](#)。大 O 表示法不仅仅关心算法需要多少步。它关心的是随着数据增加，算法步骤的长期轨迹。O(N)\
    \ 讲述了一个线性增长的故事——即步骤根据数据的某个比例呈直线增长。即使步骤是 100N，这也是正确的。O(N²) 讲述了一个不同的故事——一个指数增长的故事。\n\
    \n与任何形式的 O(N) 相比，指数增长是一个完全不同的类别。当我们考虑到 O(N²) 在数据增长的某个点上，会变得比 O(N) 乘以*任何*因子都慢时，这一点就真正凸显出来了。\n\
    \n在下图中，你可以看到 O(N²) 如何变得比 N 的各种因子都慢：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_91_0.png)\n\
    \n因此，当比较属于两个不同大 O 类别的两种效率时，用它们的一般类别来识别就足够了。将 O(2N) 与 O(N²) 进行比较，就像谈论一栋两层楼的房子与一栋摩天大楼相比。我们不妨直接说\
    \ O(2N) 属于 O(N) 的一般类别。\n\n我们遇到的所有大 O 类型，无论是 O(1)、O(log N)、O(N)、O(N²)，还是我们将在本书后面遇到的类型，都是彼此差异很大的大\
    \ O 一般类别。将步骤数乘以或除以一个普通数字并不会使它们改变到另一个类别。"
