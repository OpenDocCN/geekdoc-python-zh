    \ / count_of_even_numbers`的除法。从技术上讲，我们的算法除了3*N*步之外，还额外执行了三个步骤，因此总步数是3*N* + 3。\n\
    \n然而，你也学到了大O表示法忽略常数，因此我们不称我们的算法为O(3N + 3)，而是简单地称其为O(N)。\n\n## 单词构建器\n\n下一个算法收集由单个字符数组构建的两个字符字符串的所有组合。例如，给定数组[\"\
