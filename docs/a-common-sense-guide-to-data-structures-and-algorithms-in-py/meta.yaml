- md: "In this case, N is the size of the string passed to this function.\nThe guts\
    \ of the algorithm takes place within the while loop. Now, this loop is somewhat\
    \ interesting because it only runs until it reaches the midpoint of the string.\
    \ That would mean that the loop runs N / 2 steps.\nHowever, Big O ignores constants.\
    \ Because of this, we drop the division by 2, and our algorithm is O(N).\n\n##\
    \ Get All the Products\n\nOur next example is an algorithm that accepts an array\
    \ of numbers and returns the product of every combination of two numbers.\n\n\
    For example, if we passed in the array [1, 2, 3, 4, 5], the function returns:\n\
    [2, 3, 4, 5, 6, 8, 10, 12, 15, 20]\n\nThis is because we first multiply the 1\
    \ by the 2, 3, 4, and 5. Then we multiply the 2 by the 3, 4, and 5. Next, we multiply\
    \ the 3 by the 4 and the 5. And finally, we multiply the 4 by the 5.\n\nNote something\
    \ interesting: when we multiply, say, the 2 by the other numbers, we only have\
    \ to multiply it by the numbers that are to the right of it. We don't have to\
    \ go back and multiply 2 by the 1, because that was already covered back when\
    \ we multiplied the 1 by the 2. So each number only needs to be multiplied by\
    \ the remaining numbers to the right of it.\n\nHere's an implementation of this\
    \ algorithm:\n\n```\ndef two_number_products(array):\n    products = []\n\n  \
    \  for i in range(len(array)):\n        for j in range(i + 1, len(array)):\n \
    \           products.append(array[i] * array[j])\n\n    return products\n```\n\
    \nLet's break this down. N is the number of items in the array passed to this\
    \ function.\n\nWe run the outer loop N times. (We actually run it N - 1 times,\
    \ but we'll drop that constant.) The inner loop, though, is different. Since j\
    \ always begins one index to the right of i, the inner loop's number of steps\
    \ decreases each time that it's launched by the outer loop.\n\nLet's see how many\
    \ times the inner loop runs for our example array, which contains five elements:\n\
    \nWhen i is 0, the inner loop runs while j is 1, 2, 3, and 4. When i is 1, the\
    \ inner loop runs while j is 2, 3, and 4. When i is 2, the inner loop runs while\
    \ j is 3, and 4. When i is 3, the inner loop runs while j is 4. When all is said\
    \ and done, the inner loop runs:\n\n4 + 3 + 2 + 1 times.\n\nTo put this in terms\
    \ of N, we can say that the inner loop runs approximately:\n\nN + (N - 1) + (N\
    \ - 2) + (N - 3) ... + 1 times.\n\nThis formula always turns out to compute to\
    \ about N² / 2. We can visualize this in the following diagram. For the purposes\
    \ of the diagram, we'll say that N is 8, so there are 8², or 64, squares.\n\n\
    ![](img/c0a46c67bb2536aa545ec1bd7065e742_120_0.png)\n\nIf you work your way from\
    \ the top row to the bottom, you'll see that the top row has all N squares shaded\
    \ gray. The next row has N - 1 squares shaded gray, and the one after that has\
    \ N - 2 gray squares. This pattern continues until the bottom row, which has just\
    \ one shaded square.\n\nYou can also see at a glance that approximately half of\
    \ the squares are shaded. This demonstrates that the pattern of N + (N - 1) +\
    \ (N - 2) + (N - 3)... + 1 is equivalent to N² / 2.\n\nWe've figured out, then,\
    \ that the inner loop runs for N² / 2 steps. But because Big O ignores constants,\
    \ we express this as O(N²).\n\n## Dealing with Multiple Datasets\n\nNow, what\
    \ happens if instead of computing the product of every two numbers from a single\
    \ array, we instead compute the product of every number from one array by every\
    \ number of a *second* array?\n\nFor example, if we had the array [1, 2, 3] and\
    \ the array [10, 100, 1000], we'd compute the products as follows:\n\n[10, 100,\
    \ 1000, 20, 200, 2000, 30, 300, 3000]\n\nOur code would be similar to the previous\
    \ snippet, with some slight modifications:\n\n```\ndef two_number_products(array1,\
    \ array2):\n    products = []\n\n    for i in array1:\n        for j in array2:\n\
    \            products.append(i * j)\n\n    return products\n```\n\nLet's analyze\
    \ the time complexity of this function.\n\nFirst, what is N? This is the first\
    \ hurdle, as we now have *two* datasets, namely, the two arrays.\n\nIt's tempting\
    \ to lump everything together and say N is the total number of items of both arrays\
    \ combined. But this is problematic for the following reason:\n\nHere's a tale\
    \ of two scenarios. In Scenario 1, there are two arrays of size 5. In Scenario\
    \ 2, there's one array of size 9 and another of size 1.\n\nIn both scenarios,\
    \ we'd end up saying that N is 10, since 5 + 5 = 10 and 9 + 1 = 10. However, the\
    \ efficiency of each scenario is *very* different.\n\nIn Scenario 1, our code\
    \ takes twenty-five (5 * 5) steps. Because N is 10, this is equivalent to (N /\
    \ 2)² steps.\n\nIn Scenario 2, though, our code takes nine (9 * 1) steps, which\
    \ is close to about N steps. This is dramatically faster than Scenario 1!\n\n\
    So, we don't want to consider N to be the total number of integers from both arrays,\
    \ since we'd never be able to pin down the efficiency in terms of Big O notation,\
    \ as it varies based on the different scenarios.\n\nWe're in a bit of a bind here.\
    \ We have no choice but to express the time complexity as O(N * M), where N is\
    \ the size of one array and M is the size of the other.\n\nThis is a new concept:\
    \ whenever we have two distinct datasets that have to interact with each other\
    \ through multiplication, we have to identify both sources separately when we\
    \ describe the efficiency in terms of Big O.\n\nWhile this is the correct way\
    \ of expressing this algorithm in terms of Big O notation, it's a little less\
    \ useful than other expressions of Big O. Comparing an O(N * M) algorithm to algorithms\
    \ that only have an N (and not an M) is a little like comparing apples to oranges.\n\
    \nHowever, we do know that there's a specific range in which O(N * M) lies. That\
    \ is, if N and M are the same, it's equivalent to O(N²). And if they're not the\
    \ same, and we arbitrarily assign the smaller number to be M, even if M is as\
    \ low as 1, we end up with O(N). In a sense then, O(N * M) can be construed as\
    \ a range between O(N) and O(N²).\n\nIs this great? No, but it's the best we can\
    \ do.\n\n## Password Cracker\n\nYou're a hacker (an ethical one, of course) who's\
    \ trying to figure out someone's password. You decide on a brute-force approach\
    \ and write some code that produces every possible string of a given length. Here's\
    \ the code you whipped up:\n\n```\nfrom string import ascii_lowercase\nimport\
    \ itertools\n\ndef every_password(length):\n    for s in itertools.product(ascii_lowercase,\
    \ repeat=length):\n        print(\"\".join(s))\n```\n\nIn our code, we've imported\
    \ the entire alphabet using ascii_lowercase from Python's string module so we\
    \ don't have to actually type out the entire alphabet. We've also used Python's\
    \ itertools module to allow us to run an arbitrary number of nested loops with\
    \ minimum code.\n\nIn truth, we're not going to focus on how this code works,\
    \ but rather what this code *does*.\n\nWhen we call the every_password function,\
    \ we pass in an integer, which becomes the variable length.\n\nIf length is 3,\
    \ the code will return all possible strings within the range of \"aaa\" and \"\
    zzz\". Running this code will print the following:\n\n```\naaa\naab\naac\naad\n\
    aae\n...\nzzx\nzzy\nzzz\n```\n\nIf length is 4, your code will print all possible\
    \ strings of length 4:\n\n```\naaaa\naaab\naaac\naaad\naaae\n...\nzzzx\nzzzy\n\
    zzzz\n```\n\nIf you try running this code even for a mere length of 5, you may\
    \ be waiting some time for it to finish. This is a slow algorithm! But how do\
    \ we express it in terms of Big O?\n\nLet's break it down.\n\nIf we simply print\
    \ each letter from the alphabet once, it would take 26 steps.\n\nWhen we print\
    \ every two-character combination, we end up with 26 characters multiplied by\
    \ 26 characters.\n\nWhen printing every three-character combination, we end up\
    \ with 26 * 26 * 26 combinations.\n\nDo you see the pattern?\n\n| Length | Combinations\
    \ |\n|---|---|\n| 1 | 26 |\n| 2 | 26² |\n| 3 | 26³ |\n| 4 | 26⁴ |\n\nIf we look\
    \ at this in terms of N, it emerges that if N is the length of each string, *the\
    \ number of combinations* is 26<sup>N</sup>.\n\nTherefore, in Big O notation,\
    \ we express this as O(26<sup>N</sup>). This is an utterly glacial algorithm!\
