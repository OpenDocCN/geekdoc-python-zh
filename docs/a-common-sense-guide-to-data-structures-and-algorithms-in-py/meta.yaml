    \ just one base case again—all while still dealing with the possibility of an\
    \ empty array.\n\nIt relies upon the fact that in Python, when we call `array[1:]`\
    \ on an array with only one value in it, we get back an empty array. With this\
    \ in mind, we only need the base case of an empty array, since the recursion will\
