    \ mean the last cell is also in the correct order, and our entire array is properly\
    \ sorted:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_87_0.png)\n\n## Code Implementation:\
    \ Selection Sort\n\nHere's an implementation of Selection Sort in Python:\n\n\
    ```python\ndef selection_sort(array):\n    for i in range(len(array) - 1):\n \
    \       lowest_number_index = i\n\n        for j in range(i + 1, len(array)):\n\
    \            if array[j] < array[lowest_number_index]:\n                lowest_number_index\
    \ = j\n\n        if lowest_number_index != i:\n            array[i], array[lowest_number_index]\
    \ = \\\n                array[lowest_number_index], array[i]\n\n    return array\n\
    ```\n\nLet's break this down line by line.\n\nWe begin a loop that represents\
    \ each pass-through. It uses the variable `i` to point to each index of the array\
    \ and goes up through the second-to-last value:\n\n```python\nfor i in range(len(array)\
    \ - 1):\n```\n\nIt doesn't need to run for the last value itself, since the array\
    \ will be fully sorted by that point.\n\nNext, begin keeping track of the `index`\
    \ containing the lowest value we encounter so far:\n\n```python\nlowest_number_index\
    \ = i\n```\n\nThis `lowest_number_index` will be 0 at the beginning of the first\
    \ pass-through, 1 at the beginning of the second, and so on.\n\nThe reason we\
    \ specifically keep track of the index is because we'll need access to both the\
    \ lowest value and its index in the rest of our code, and we can use the index\
    \ to reference both. (We can check the lowest value by calling `array[lowest_number_index]`).\n\
    \nWithin each pass-through, we check the remaining values of the array to see\
    \ if there might be a lower value than the current lowest value:\n\n```python\n\
    for j in range(i + 1, len(array)):\n```\n\nIndeed, if we find a lower value, we\
    \ store this new value's index in lowest_number_index:\n\n```python\nif array[j]\
    \ < array[lowest_number_index]:\n    lowest_number_index = j\n```\n\nBy the end\
    \ of the inner loop, we'll have found the index of the lowest number from this\
    \ pass-through.\n\nIf the lowest value from this pass-through is already in its\
    \ correct place (which would happen when the lowest value is the first value we\
    \ encounter in the pass-through), we don't need to do anything. But if the lowest\
    \ value is *not* in its correct place, we need to perform a swap. Specifically,\
    \ we swap the lowest value with the value at i, which was the index we started\
    \ the pass-through with:\n\n```python\nif lowest_number_index != i:\n    array[i],\
    \ array[lowest_number_index] = array[lowest_number_index], array[i]\n```\n\nFinally,\
    \ we return the sorted array:\n\n```python\nreturn array\n```\n\n## The Efficiency\
    \ of Selection Sort\n\nSelection Sort contains two types of steps: comparisons\
    \ and swaps. We compare each value with the lowest number we've encountered in\
    \ each pass-through, and we swap the lowest number into its correct position.\n\
    \nLooking back at our example array that contains five elements, we had to make\
    \ a total of 10 comparisons. Let's break it down in the following table:\n\n|\
    \ Pass-Through # | # of Comparisons |\n| :--- | :--- |\n| 1 | 4 comparisons |\n\
    | 2 | 3 comparisons |\n| 3 | 2 comparisons |\n| 4 | 1 comparison |\n\nThat's a\
    \ grand total of 4 + 3 + 2 + 1 = 10 comparisons.\n\nTo put it in a way that works\
    \ for arrays of all sizes, we'd say that for N elements, we make\n\n(N - 1) +\
    \ (N - 2) + (N - 3) ... + 1 comparisons.\n\nAs for *swaps*, though, we only need\
    \ to make a maximum of one swap per pass-through. This is because in each pass-through,\
    \ we make either one or zero swaps, depending on whether the lowest number of\
    \ that pass-through is already in the correct position. Contrast this with Bubble\
    \ Sort, where in a worst-case scenario we have to make a swap for *each and every*\
    \ comparison.\n\nHere's a side-by-side comparison of Bubble Sort and Selection\
    \ Sort:\n\n| N Elements | Max # of Steps in Bubble Sort | Max # of Steps in Selection\
    \ Sort |\n| :--- | :--- | :--- |\n| 5 | 20 | 14 (10 comparisons + 4 swaps) |\n\
    | 10 | 90 | 54 (45 comparisons + 9 swaps) |\n| 20 | 380 | 209 (190 comparisons\
    \ + 19 swaps) |\n| 40 | 1560 | 819 (780 comparisons + 39 swaps) |\n| 80 | 6320\
    \ | 3239 (3160 comparisons + 79 swaps) |\n\nFrom this comparison, it's clear Selection\
    \ Sort takes about half the number of steps Bubble Sort does, indicating that\
    \ Selection Sort is twice as fast.\n\n## Ignoring Constants\n\nBut here's the\
    \ funny thing: in the world of Big O notation, Selection Sort and Bubble Sort\
    \ are described in *exactly the same way*.\n\nAgain, Big O notation answers the\
    \ key question: if there are N data elements, how many steps will the algorithm\
    \ take? Because Selection Sort takes roughly half of N² steps, it would seem reasonable\
    \ that we'd describe the efficiency of Selection Sort as being O(N² / 2). That\
    \ is, for N data elements, there are N² / 2 steps. The following table bears this\
    \ out:\n\n| N Elements | N² / 2 | Max # of Steps in Selection Sort |\n| :--- |\
    \ :--- | :--- |\n| 5 | 5² / 2 = 12.5 | 14 |\n| 10 | 10² / 2 = 50 | 54 |\n| 20\
    \ | 20² / 2 = 200 | 209 |\n| 40 | 40² / 2 = 800 | 819 |\n| 80 | 80² / 2 = 3200\
    \ | 3239 |\n\nIn reality, however, Selection Sort is described in Big O as O(N²),\
    \ just like Bubble Sort. This is because of a major rule of Big O that I'm now\
    \ introducing for the first time:\n\n*Big O notation ignores constants.*\n\nThis\
    \ is simply a mathematical way of saying that Big O notation never includes regular\
    \ numbers that aren't an exponent. We simply drop these regular numbers from the\
    \ expression.\n\nIn our case, then, even though the algorithm takes N² / 2 steps,\
    \ we drop the “/ 2” because it’s a regular number and express the efficiency as\
    \ O(N²).\n\nHere are a few more examples:\n\nFor an algorithm that takes N / 2\
    \ steps, we’d call it O(N).\n\nAn algorithm that takes N² + 10 steps would be\
    \ expressed as O(N²) since we drop the 10, which is a regular number.\n\nWith\
    \ an algorithm that takes 2N steps (meaning N * 2), we drop the regular number\
    \ and call it O(N).\n\nEven O(100N), which is *100 times slower than O(N)*, is\
    \ also referred to as O(N).\n\nOffhand, it would seem that this rule would render\
    \ Big O notation entirely useless, as you can have two algorithms that are described\
    \ in exactly the same way with Big O, and yet one can be *100 times faster* than\
    \ the other. And that’s exactly what we’re seeing here with Selection Sort and\
    \ Bubble Sort. Both are described in Big O as O(N²), but Selection Sort is twice\
    \ as fast as Bubble Sort.\n\nSo, what gives?\n\n## Big O Categories\n\nThis leads\
    \ us to the next concept within Big O: Big O notation only concerns itself with\
    \ *general categories* of algorithm speeds.\n\nAs an analogy, let’s talk about\
    \ physical buildings. There are, of course, many different types of buildings.\
    \ There are one-floor single-family homes, and two-floor single-family homes,\
    \ and three-floor single-family homes. There are high-rise apartment buildings\
    \ with varying numbers of floors. And there are skyscrapers with various heights\
    \ and shapes.\n\nIf we were to compare two buildings, one of which is a single-family\
    \ home and one of which is a skyscraper, it becomes almost moot to mention how\
    \ many floors each one has. Because the two buildings are so incredibly different\
    \ in their sizes and functions, we don’t need to say, “This one is a two-story\
    \ home, while the other is a one-hundred-floor skyscraper.” We may as well just\
    \ call one a house and the other a skyscraper. Calling them by their general categories\
    \ is enough to signify their vast differences.\n\nThe same applies to algorithm\
    \ efficiencies. If we compare, say, an O(N) algorithm with an O(N²) algorithm,\
    \ the two efficiencies are so different that it doesn’t really matter whether\
    \ the O(N) algorithm is actually O(2N), or O(N / 2) or even O(100N).\n\nNow, here's\
    \ why O(N) and O(N²) are considered two separate categories, while O(N) and O(100N)\
    \ are part of the same category.\n\nRemember [The Soul of Big O, on page 37](#).\
    \ Big O notation doesn't care merely about the number of steps an algorithm takes.\
    \ It cares about the long-term trajectory of the algorithm's steps as the data\
    \ increases. O(N) tells a story of straight growth—that the steps increase in\
    \ a straight line according to some proportion of the data. This is true even\
    \ when the steps are 100N. O(N²) tells a different story—one of exponential growth.\n\
    \nExponential growth is a completely different category compared to any form of\
    \ O(N). This point is really driven home when we consider that O(N²) will, at\
    \ some point in data growth, become slower than O(N) multiplied by *any* factor.\n\
    \nIn the following graph, you can see how O(N²) becomes slower than various factors\
    \ of N:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_91_0.png)\n\nTherefore, when\
    \ comparing two efficiencies that belong to two different categories of Big O,\
    \ it's enough to identify them by their general category. Talking about O(2N)\
    \ when compared to O(N²) is like talking about a two-story house compared to a\
    \ skyscraper. We may as well just say that O(2N) is part of the general category\
    \ of O(N).\n\nAll the types of Big O we've encountered, whether it's O(1), O(log\
    \ N), O(N), O(N²), or the types we'll encounter later in this book, are general\
    \ categories of Big O that are widely different from each other. Multiplying or\
    \ dividing the number of steps by a regular number doesn't make them change to\
    \ another category."
