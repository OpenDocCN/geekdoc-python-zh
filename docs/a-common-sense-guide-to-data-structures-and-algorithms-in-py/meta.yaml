  - '[PAGE 194]


    For a string of length N, we produce N! anagrams. In Big O notation then, this
    is expressed as O(N!). This is also known as *factorial time*.


    O(N!) is the slowest category of Big O we''ll encounter in this book. Let''s see
    how it looks compared to other "slow" Big O categories:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_194_0.png)


    Although O(N!) is extremely slow, we don''t have a better option here, since our
    task is to generate *all* the anagrams, and there simply are N! anagrams for an
    N-character word.


    In any case, recursion played a pivotal role in this algorithm, which is an important
    example of how recursion can be used to solve a complex problem.


    # Wrapping Up


    Learning to write functions that use recursion certainly takes practice. But you''re
    now armed with tricks and techniques that will make the learning process easier
    for you.


    We''re not done with our journey through recursion just yet, though. While recursion
    is a great tool for solving a variety of problems, it can actually slow your code
    down *a lot* if you''re not careful. In the next chapter, you''ll learn how to
    wield recursion while still keeping your code nice and speedy.


    # Exercises


    The following exercises provide you with the opportunity to practice with recursion.
    The solutions to these exercises are found in the section [Chapter 11, on page
    444](#).


    +   1. Use recursion to write a function that accepts an array of strings and
    returns the total number of characters across all the strings. For example,'
