  md: "To answer the preceding question, we need to analyze what steps our function\
    \ takes as well as what the worst-case scenario would be.\n\nThe preceding function\
    \ has one type of step, namely *comparisons*. It repeatedly compares array[i]\
    \ and array[j] to see if they are equal and therefore represent a duplicate pair.\
    \ In a worst-case scenario, the array contains no duplicates, which would force\
    \ our code to complete all of the loops and exhaust every possible comparison\
    \ before returning False.\n\nBased on this, we can conclude that for N values\
    \ in the array, our function would perform N² comparisons. This is because we\
    \ perform an outer loop that must iterate N times to get through the entire array,\
    \ and for *each iteration*, we must iterate *another N times* with our inner loop.\
    \ That's N steps * N steps, which is N² steps, leaving us with an algorithm of\
    \ O(N²).\n\nWe can actually prove that our function takes N² steps by adding some\
    \ code to our function that tracks the algorithm's number of steps:\n\n```\ndef\
    \ has_duplicate_value(array):\n    steps = 0  # count of steps\n    for i in range(len(array)):\n\
    \        for j in range(len(array)):\n            steps += 1  # increment number\
    \ of steps\n            if (i != j) and (array[i] == array[j]):\n            \
    \    return True\n    print(steps)  # print number of steps if no duplicates\n\
    \    return False\n```\n\nThis added code will print the number of steps taken\
    \ when there are no duplicates. If we run has_duplicate_value([1, 4, 5, 2, 9]),\
    \ for example, we'll see an output of 25 in the Python console, indicating that\
    \ there were twenty-five comparisons for the five elements in the array. If we\
    \ test this for other values, we'll see that the output is always the size of\
    \ the array squared. This is classic O(N²).\n\nVery often (but not always), when\
    \ an algorithm nests one loop inside another, the algorithm is O(N²). So whenever\
    \ you see a nested loop, O(N²) alarm bells should go off in your head.\n\nNow,\
    \ the fact that our function is O(N²) should give us pause. This is because O(N²)\
    \ is considered a relatively slow algorithm. Whenever you encounter a slow algorithm,\
    \ it's worth spending some time to consider whether there are any faster alternatives.\
    \ There may *not* be any better alternatives, but let's first make sure."
