- md: "## Array Sample\n\nIn the next example, we create a function that takes a small\
    \ sample of an array. We expect to have very large arrays, so our sample is just\
    \ the first, middlemost, and last value from the array.\n\nHere's an implementation\
    \ of this function. See if you can identify its efficiency in Big O:\n\n```\n\
    def sample(array):\n    if not array:\n        return None\n\n    first = array[0]\n\
    \    middle = array[len(array) // 2]\n    last = array[-1]\n\n    return [first,\
    \ middle, last]\n```\n\nIn this case again, the array passed into this function\
    \ is the primary data, so we can say that N is the number of elements in this\
    \ array.\n\nHowever, our function ends up taking the same number of steps no matter\
    \ what N is. Reading from the beginning, midpoint, and last indexes of an array\
    \ each takes one step no matter the size of the array. Similarly, finding the\
    \ array's length and dividing it by 2 also takes one step.\n\nSince the number\
    \ of steps is constant—that is, it remains the same no matter what N is—this algorithm\
    \ is considered O(1).\n\n## Average Celsius Reading\n\nHere's another example\
    \ that involves mean averages. Let's say we're building weather-forecasting software.\
    \ To determine the temperature of a city, we take temperature readings from many\
    \ thermometers across the city, and we calculate the mean average of those temperatures.\n\
    \nWe'd also like to display the temperatures in both Fahrenheit and Celsius, but\
    \ our readings are initially only provided to us in Fahrenheit.\n\nTo get the\
    \ average Celsius temperature, our algorithm does two things: first, it converts\
    \ all the readings from Fahrenheit to Celsius. Then it calculates the mean average\
    \ of all the Celsius numbers.\n\nBelow is some code that accomplishes this. What\
    \ is its Big O?\n\n```\ndef average_celsius(fahrenheit_readings):\n    if not\
    \ fahrenheit_readings:\n        return None\n\n    celsius_numbers = []\n\n  \
    \  # Convert each reading to Celsius and append to array:\n    for fahrenheit_reading\
    \ in fahrenheit_readings:\n        celsius_conversion = (fahrenheit_reading -\
    \ 32) / 1.8\n        celsius_numbers.append(celsius_conversion)\n\n    # Calculate\
    \ average:\n    sum = 0\n\n    for celsius_number in celsius_numbers:\n      \
    \  sum += celsius_number\n\n    return sum // len(celsius_numbers)\n```\n\nFirst,\
    \ we can say that N is the number of fahrenheit_readings passed into our method.\n\
    \nInside the method, we run two loops. The first converts the readings to Celsius,\
    \ and the second sums all the Celsius numbers. Since we have two loops that each\
    \ iterate over all N elements, we have N + N, which is 2N (plus a few constant\
    \ steps). Because Big O notation drops the constants, this gets reduced to O(N).\n\
    \nDon't get thrown off by the fact that in the earlier word builder example, two\
    \ loops led to an efficiency of O(N²). There, the loops were *nested*, which led\
    \ to N steps *multiplied* by N steps. In our case, however, we simply have two\
    \ loops, one after the other. This is N steps *plus* N steps (2N), which is a\
    \ mere O(N).\n\n## Clothing Labels\n\nSuppose we're writing software for a clothing\
    \ manufacturer. Our code accepts an array of newly produced clothing items (stored\
    \ as strings) and creates text for every possible label we'll need.\n\nSpecifically,\
    \ our labels should contain the item name plus its size, ranging from 1 to 5.\
    \ For example, if we have the array, [\"Purple Shirt\", \"Green Shirt\"], we want\
    \ to produce label text for those shirts like this:\n\n```\n[\n\"Purple Shirt\
    \ Size: 1\",\n\"Purple Shirt Size: 2\",\n\"Purple Shirt Size: 3\",\n\"Purple Shirt\
    \ Size: 4\",\n\"Purple Shirt Size: 5\",\n\"Green Shirt Size: 1\",\n\"Green Shirt\
    \ Size: 2\",\n\"Green Shirt Size: 3\",\n\"Green Shirt Size: 4\",\n\"Green Shirt\
    \ Size: 5\"\n]\n```\n\nHere's code that will create this text for an entire array\
    \ of clothing items:\n\n```\ndef mark_inventory(clothing_items):\n    clothing_options\
    \ = []\n\n    for item in clothing_items:\n        for size in range(1, 6):\n\
    \            clothing_options.append(item + \" Size: \" + str(size))\n\n    return\
    \ clothing_options\n```\n\nLet's determine this algorithm's efficiency. The clothing_items\
    \ are the primary data being processed, so N is the size of the array, clothing_items.\n\
    \nThis code contains nested loops, so it's tempting to declare this algorithm\
    \ to be O(N²). However, we need to analyze this case a little more carefully.\
    \ While code containing nested loops often is O(N²), in this case, it's not.\n\
    \nNested loops that result in O(N²) occur when each loop revolves around N. In\
    \ our case, however, while our outer loop runs N times, our inner loop runs a\
    \ constant five times; that is, this inner loop will always run five times no\
    \ matter what N is.\n\nSo while our outer loop runs N times, the inner loop runs\
    \ five times for each of the N strings. This means our algorithm runs 5N times,\
    \ but this is reduced to O(N), since Big O notation ignores constants.\n\n## Count\
    \ the Ones\n\nHere's another algorithm where the Big O is different from what\
    \ it seems at first glance. This function accepts an *array of arrays*, where\
    \ the inner arrays contain 1s and 0s. The function then returns how many 1s there\
    \ are.\n\nSo take a look at this example input:\n\n```\n[\n    [0, 1, 1, 1, 0],\n\
    \    [0, 1, 0, 1, 0, 1],\n    [1, 0]\n]\n```\n\nOur function will return 7 since\
    \ there are seven 1s.\n\nHere's the function:\n\n```\ndef count_ones(outer_array):\n\
    \    count = 0\n    for inner_array in outer_array:\n        for number in inner_array:\n\
    \            if number == 1:\n                count += 1\n    return count\n```\n\
    \nWhat's the Big O of this algorithm?\n\nAgain, it's easy to notice the nested\
    \ loops and jump to the conclusion that it's O(N²). However, the two loops are\
    \ iterating over two completely different things.\n\nThe outer loop is iterating\
    \ over the inner arrays, and the inner loop is iterating over the actual numbers.\
    \ At the end of the day, our inner loop only runs for as many numbers as there\
    \ are *in total*.\n\nBecause of this, we can say that N represents how many numbers\
    \ there are. And since our algorithm simply processes each number, the function's\
    \ time complexity is O(N).\n\n## Palindrome Checker\n\nA *palindrome* is a word\
    \ or phrase that reads the same both forward and backward. Some examples include\
    \ *racecar*, *kayak*, and *deified*.\n\nHere's a function that determines whether\
    \ a string is a palindrome:\n\n```\ndef is_palindrome(string):\n    left_index\
    \ = 0\n    right_index = len(string) - 1\n    # Iterate until left_index reaches\
    \ the middle of the array:\n    while left_index < len(string) // 2:\n       \
    \ # If the character on the left doesn't equal the character\n        # on the\
    \ right, the string is not a palindrome:\n        if (string[left_index] != string[right_index]):\n\
    \            return False\n        left_index += 1\n        right_index -= 1\n\
    \    # If we got through the entire loop without finding any\n    # mismatches,\
    \ the string must be a palindrome:\n    return True\n```\n\nLet's determine the\
    \ Big O of this algorithm."
  mdcn: "## 数组采样\n\n在下一个示例中，我们将创建一个函数，用于获取数组的一个小样本。我们预计会处理非常大的数组，因此我们的样本仅包含数组的第一个、中间和最后一个值。\n\
    \n以下是该函数的实现。请尝试分析其大O表示法下的效率：\n\n```\ndef sample(array):\n    if not array:\n \
    \       return None\n\n    first = array[0]\n    middle = array[len(array) //\
    \ 2]\n    last = array[-1]\n\n    return [first, middle, last]\n```\n\n同样，在这个例子中，传入函数的数组是主要数据，因此我们可以说N是该数组中的元素数量。\n\
    \n然而，无论N是多少，我们的函数最终执行的步骤数都是相同的。从数组的起始、中间和末尾索引读取数据，无论数组大小如何，每一步都只需要一个操作。同样，获取数组长度并将其除以2也只需要一个操作。\n\
    \n由于步骤数是恒定的——即无论N是多少都保持不变——该算法被认为是O(1)。\n\n## 平均摄氏温度读数\n\n这里还有一个涉及平均值的例子。假设我们正在构建天气预报软件。为了确定一个城市的温度，我们从城市各处的许多温度计获取读数，并计算这些温度的平均值。\n\
    \n我们还希望同时显示华氏度和摄氏度温度，但我们的读数最初只以华氏度提供。\n\n为了获得平均摄氏温度，我们的算法执行两个步骤：首先，将所有读数从华氏度转换为摄氏度。然后计算所有摄氏度数值的平均值。\n\
    \n以下是一些实现此功能的代码。它的大O表示法是什么？\n\n```\ndef average_celsius(fahrenheit_readings):\n\
    \    if not fahrenheit_readings:\n        return None\n\n    celsius_numbers =\
    \ []\n\n    # Convert each reading to Celsius and append to array:\n    for fahrenheit_reading\
    \ in fahrenheit_readings:\n        celsius_conversion = (fahrenheit_reading -\
    \ 32) / 1.8\n        celsius_numbers.append(celsius_conversion)\n\n    # Calculate\
    \ average:\n    sum = 0\n\n    for celsius_number in celsius_numbers:\n      \
    \  sum += celsius_number\n\n    return sum // len(celsius_numbers)\n```\n\n首先，我们可以说N是传入方法的fahrenheit_readings的数量。\n\
    \n在方法内部，我们运行两个循环。第一个循环将读数转换为摄氏度，第二个循环对所有摄氏度数值求和。由于我们有两个循环，每个循环都遍历所有N个元素，因此我们有N\
    \ + N，即2N（加上一些常数步骤）。因为大O表示法会忽略常数，所以这简化为O(N)。\n\n不要被之前单词构建器示例中两个循环导致O(N²)效率的情况所迷惑。在那里，循环是*嵌套*的，导致N步*乘以*N步。然而，在我们的例子中，我们只是有两个循环，一个接一个。这是N步*加上*N步（2N），仅仅是O(N)。\n\
    \n## 服装标签\n\n假设我们正在为一家服装制造商编写软件。我们的代码接受一个新生产的服装项目数组（存储为字符串），并为我们需要的每个可能标签创建文本。\n\
    \n具体来说，我们的标签应包含项目名称及其尺码，范围从1到5。例如，如果我们有数组[\"Purple Shirt\", \"Green Shirt\"]，我们希望为这些衬衫生成如下标签文本：\n\
    \n```\n[\n\"Purple Shirt Size: 1\",\n\"Purple Shirt Size: 2\",\n\"Purple Shirt\
    \ Size: 3\",\n\"Purple Shirt Size: 4\",\n\"Purple Shirt Size: 5\",\n\"Green Shirt\
    \ Size: 1\",\n\"Green Shirt Size: 2\",\n\"Green Shirt Size: 3\",\n\"Green Shirt\
    \ Size: 4\",\n\"Green Shirt Size: 5\"\n]\n```\n\n以下是为整个服装项目数组创建此文本的代码：\n\n```\n\
    def mark_inventory(clothing_items):\n    clothing_options = []\n\n    for item\
    \ in clothing_items:\n        for size in range(1, 6):\n            clothing_options.append(item\
    \ + \" Size: \" + str(size))\n\n    return clothing_options\n```\n\n让我们确定该算法的效率。clothing_items是被处理的主要数据，因此N是数组clothing_items的大小。\n\
    \n这段代码包含嵌套循环，因此很容易将该算法声明为O(N²)。然而，我们需要更仔细地分析这种情况。虽然包含嵌套循环的代码通常是O(N²)，但在这种情况下并非如此。\n\
    \n导致O(N²)的嵌套循环发生在每个循环都围绕N运行时。然而，在我们的例子中，虽然外层循环运行N次，但内层循环运行的是一个恒定的五次；也就是说，无论N是多少，这个内层循环总是运行五次。\n\
    \n因此，虽然我们的外层循环运行N次，但内层循环对每个N个字符串都运行五次。这意味着我们的算法运行5N次，但由于大O表示法忽略常数，这简化为O(N)。\n\n\
    ## 计数一\n\n这是另一个大O表示法与乍看之下不同的算法。该函数接受一个*数组的数组*，其中内部数组包含1和0。函数然后返回有多少个1。\n\n请看以下示例输入：\n\
    \n```\n[\n    [0, 1, 1, 1, 0],\n    [0, 1, 0, 1, 0, 1],\n    [1, 0]\n]\n```\n\n\
    我们的函数将返回7，因为有七个1。\n\n以下是该函数：\n\n```\ndef count_ones(outer_array):\n    count =\
    \ 0\n    for inner_array in outer_array:\n        for number in inner_array:\n\
    \            if number == 1:\n                count += 1\n    return count\n```\n\
    \n该算法的大O表示法是什么？\n\n同样，很容易注意到嵌套循环并得出结论它是O(N²)。然而，这两个循环遍历的是完全不同的东西。\n\n外层循环遍历内部数组，内层循环遍历实际的数字。归根结底，我们的内层循环只运行*总共*有多少个数字的次数。\n\
    \n因此，我们可以说N代表数字的总数。由于我们的算法只是处理每个数字，因此该函数的时间复杂度是O(N)。\n\n## 回文检查器\n\n*回文*是一个正向和反向读取都相同的单词或短语。一些例子包括*racecar*、*kayak*和*deified*。\n\
    \n以下是判断一个字符串是否为回文的函数：\n\n```\ndef is_palindrome(string):\n    left_index = 0\n\
    \    right_index = len(string) - 1\n    # Iterate until left_index reaches the\
    \ middle of the array:\n    while left_index < len(string) // 2:\n        # If\
    \ the character on the left doesn't equal the character\n        # on the right,\
    \ the string is not a palindrome:\n        if (string[left_index] != string[right_index]):\n\
    \            return False\n        left_index += 1\n        right_index -= 1\n\
    \    # If we got through the entire loop without finding any\n    # mismatches,\
    \ the string must be a palindrome:\n    return True\n```\n\n让我们确定该算法的大O表示法。"
