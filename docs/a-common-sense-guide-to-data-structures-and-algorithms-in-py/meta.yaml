  md: "Here's what a doubly linked list looks like:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_252_0.png)\n\
    \nWe can implement the core of a doubly linked list in Python like this. First,\
    \ we must create a new kind of “double-ended” node:\n\n```\npython\nclass Node:\n\
    \    def __init__(self, data):\n        self.data = data\n        self.next_node\
    \ = None\n        self.previous_node = None\n```\n\nYou'll notice how each node\
    \ now contains not just a next_node attribute but a previous_node attribute as\
    \ well.\n\nOnce we have that in place, we can now implement our doubly linked\
    \ list:\n\n```\npython\nimport double_ended_node\n\nclass DoublyLinkedList:\n\
    \    def __init__(self, first_node=None, last_node=None):\n        self.first_node\
    \ = first_node\n        self.last_node = last_node\n```\n\nSince a doubly linked\
    \ list always knows where both its head and tail are, we can access each of them\
    \ in a single step, or O(1). So just as we can read, insert, or delete from the\
    \ beginning of the list in O(1), we can do the same from the end of the list in\
    \ O(1) as well.\n\nHere's a depiction of inserting at the end of a doubly linked\
    \ list:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_252_1.png)\n\nAs you can see,\
    \ we create a new node (“Sue”) and have its previous_node point to what used to\
    \ be the last_node (“Greg”) of the linked list. Then we change the next_node of\
    \ the last_node (“Greg”) to point to this new node (“Sue”). Finally, we declare\
    \ the new node (“Sue”) to be the last_node of the linked list."
