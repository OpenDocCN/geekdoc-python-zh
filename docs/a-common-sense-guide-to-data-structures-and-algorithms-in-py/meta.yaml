    \ >= len(array):\n        return\n\n    array[index] *= 2\n    double_array(array,\
    \ index + 1)\n```\n\nWe can test this function out with the following code:\n\n\
    ```python\narray = [1, 2, 3, 4]\ndouble_array(array, 0)\nprint(array)\n```\n\n\
    Our recursive function is now complete. However, if our programming language supports\
