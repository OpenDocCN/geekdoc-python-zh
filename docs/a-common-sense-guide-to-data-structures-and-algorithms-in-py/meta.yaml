    Viewed with this lens, we don''t care very much whether an algorithm is O(1) or
    O(3). Because both algorithms are the type that aren''t affected by increased
    data, as their number of steps remains constant, they''re essentially the same
    kind of algorithm. They''re both algorithms whose steps remain constant irrespective
    of the data, and we don''t care to make a distinction between the two.


    An algorithm that is O(N), on the other hand, is a different type of algorithm.
    It''s an algorithm whose performance *is* affected as we increase the data. More
    specifically, it''s the kind of algorithm whose steps increase in direct proportion
    to the data as the data increases. This is the story O(N) tells. It tells you
    about the proportional relationship between the data and the algorithm''s efficiency.
    It describes exactly how the number of steps increases as the data increases.


    Look at how these two types of algorithms are plotted on a graph:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_57_0.png)'
- md: "Notice that O(N) makes a perfect diagonal line. This is because for every additional\
    \ piece of data, the algorithm takes one additional step. Accordingly, the more\
    \ data, the more steps the algorithm will take.\n\nContrast this with O(1), which\
    \ is a perfect horizontal line. No matter how much data there is, the number of\
    \ steps remains constant.\n\n## Deeper into the Soul of Big O\n\nTo see why the\
    \ soul of Big O is so important, let’s go one level deeper. Say we had an algorithm\
    \ of constant time that always took 100 steps no matter how much data there was.\
    \ Would you consider that to be more or less performant than an algorithm that\
    \ is O(N)?\n\nTake a look at the following graph:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_58_0.png)\n\
    \nAs the graph depicts, for a data set that is fewer than 100 elements, an O(N)\
    \ algorithm takes fewer steps than the O(1) 100-step algorithm. At exactly 100\
    \ elements, the lines cross, meaning the two algorithms take the same number of\
    \ steps, namely 100. But here’s the key point: for *all arrays greater than 100*,\
    \ the O(N) algorithm takes more steps.\n\nBecause there will always be *some*\
    \ amount of data at which the tides turn, and O(N) takes more steps from that\
    \ point until infinity, O(N) is considered to be, on the whole, less efficient\
    \ than O(1) no matter how many steps the O(1) algorithm actually takes.\n\nThe\
    \ same is true even for an O(1) algorithm that always takes one million steps.\
    \ As the data increases, there will inevitably reach a point at which O(N) becomes\
    \ less efficient than the O(1) algorithm and will remain so up toward an infinite\
    \ amount of data.\n\n## Same Algorithm, Different Scenarios\n\nAs you learned\
    \ in the previous chapters, linear search isn't *always* O(N). It's true that\
    \ if the item we're looking for is in the final cell of the array, it will take\
    \ N steps to find it. But when the item we're searching for is found in the *first*\
    \ cell of the array, linear search will find the item in just one step. So this\
    \ case of linear search would be described as O(1). If we were to describe the\
    \ efficiency of linear search in its totality, we'd say that linear search is\
    \ O(1) in a *best-case* scenario and O(N) in a *worst-case* scenario.\n\nWhile\
    \ Big O effectively describes both the best- and worst-case scenarios of a given\
    \ algorithm, Big O notation generally refers to the *worst-case scenario* unless\
    \ specified otherwise. This is why most references will describe linear search\
    \ as being O(N) even though it *can* be O(1) in a best-case scenario.\n\nThis\
    \ is because a “pessimistic” approach can be a useful tool: knowing exactly how\
    \ inefficient an algorithm can get in a worst-case scenario prepares us for the\
    \ worst and may have a strong impact on our choices.\n\n## An Algorithm of the\
    \ Third Kind\n\nIn the previous chapter, you learned that binary search on an\
    \ ordered array is much faster than linear search on the same array. Let's now\
    \ look at how to describe binary search in terms of Big O notation.\n\nWe can't\
    \ describe binary search as being O(1), because the number of steps increases\
    \ as the data increases. It also doesn't fit into the category of O(N), since\
    \ the number of steps is much fewer than the N data elements. As we have seen,\
    \ binary search takes only seven steps for an array containing 100 elements.\n\
    \nBinary search, then, seems to fall somewhere *in between* O(1) and O(N). So\
    \ what is it?\n\nIn Big O terms, we describe binary search as having a time complexity\
    \ of:\n\nO(log N)\n\nI pronounce this as “Oh of log N.” This type of algorithm\
    \ is also known as having a time complexity of *log time*.\n\nSimply put, O(log\
    \ N) is the Big O way of describing an algorithm that *increases one step each\
    \ time the data is doubled*. As you learned in the previous chapter, binary search\
    \ does just that. You'll see momentarily *why* this is expressed as O(log N),\
    \ but let's first summarize what you've learned so far.\n\nThe three types of\
    \ algorithms you've learned about so far can be sorted from most efficient to\
    \ least efficient as follows:\n\n- O(1)\n- O(log N)\n- O(N)\n\nLet's look at a\
    \ graph that compares the three types:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_60_0.png)\n\
    \nNote how O(log N) curves ever so slightly upward, making it less efficient than\
    \ O(1) but much more efficient than O(N).\n\nTo understand why this algorithm\
    \ is called O(log N), you need to first understand what *logarithms* are. If you're\
    \ already familiar with this mathematical concept, feel free to skip the next\
    \ section.\n\n## Logarithms\n\nLet's examine why algorithms such as binary search\
    \ are described as O(log N). What is a log, anyway?\n\nLog is shorthand for *logarithm*.\
    \ The first thing to note is that logarithms have nothing to do with algorithms,\
    \ even though the two words look and sound so similar.\n\nLogarithms are the inverse\
    \ of *exponents*. Here's a quick refresher on what exponents are:\n\n2³ is the\
    \ equivalent of:\n\n2 * 2 * 2\n\nThis just happens to be 8.\n\nNow, log₂ 8 is\
    \ the converse. It means: how many times do you have to multiply 2 by itself to\
    \ get a result of 8?\n\nBecause you have to multiply 2 by itself 3 times to get\
    \ 8, log₂ 8 = 3.\n\nHere's another example:\n\n2⁶ translates to:\n\n2 * 2 * 2\
    \ * 2 * 2 * 2 = 64\n\nBecause we had to multiply 2 by itself six times to get\
    \ 64, we have, therefore:\n\nlog₂ 64 = 6.\n\nWhile the preceding explanation is\
    \ the “textbook” definition of logarithms, I like to use an alternative way of\
    \ describing the same concept because many people find that they can wrap their\
    \ heads around it more easily, especially when it comes to Big O notation.\n\n\
    Another way of explaining log₂ 8 is this: if we kept *dividing* 8 by 2 until we\
    \ ended up with 1, how many 2s would we have in our equation?\n\n8 / 2 / 2 / 2\
    \ = 1\n\nIn other words, how many times do we need to halve 8 until we end up\
    \ with 1? In this example, it takes us three times. Therefore,\n\nlog₂ 8 = 3.\n\
    \nSimilarly, we could explain log₂ 64 as: how many times do we need to halve 64\
    \ until we end up with 1?\n\n64 / 2 / 2 / 2 / 2 / 2 / 2 = 1\n\nSince there are\
    \ six 2s, log₂ 64 = 6.\n\nNow that you understand what logarithms are, the meaning\
    \ behind O(log N) will become clear.\n\n## O(log N) Explained\n\nLet's bring this\
    \ all back to Big O notation. In computer science, whenever we say O(log N), it's\
    \ actually shorthand for saying O(log₂ N). We just omit that small 2 for convenience.\n\
    \nRecall that Big O notation resolves the key question: if there are N data elements,\
    \ how many steps will the algorithm take?\n\nO(log N) means that for N data elements,\
    \ the algorithm would take $log_2 N$ steps. If there are 8 elements, the algorithm\
    \ would take three steps, since $log_2 8 = 3$.\n\nSaid another way, if we keep\
    \ dividing the 8 elements in half, it would take us three steps until we end up\
    \ with 1 element.\n\nThis is *exactly* what happens with binary search. As we\
    \ search for a particular item, we keep dividing the array's cells in half until\
    \ we narrow it down to the correct number.\n\nSaid simply: *O(log N) means the\
    \ algorithm takes as many steps as it takes to keep halving the data elements\
    \ until we remain with 1*.\n\nThe following table demonstrates a striking difference\
    \ between the efficiencies of O(N) and O(log N):\n\n| N Elements | O(N) | O(log\
    \ N) |\n| :--- | :--- | :--- |\n| 8 | 8 | 3 |\n| 16 | 16 | 4 |\n| 32 | 32 | 5\
    \ |\n| 64 | 64 | 6 |\n| 128 | 128 | 7 |\n| 256 | 256 | 8 |\n| 512 | 512 | 9 |\n\
    | 1024 | 1024 | 10 |\n\nWhile the O(N) algorithm takes as many steps as there\
    \ are data elements, the O(log N) algorithm takes just one additional step each\
    \ time the data is doubled.\n\nIn future chapters, you'll encounter algorithms\
    \ that fall under categories of Big O notation other than the three you've learned\
    \ about so far. But in the meantime, let's apply these concepts to some examples\
    \ of everyday code.\n\n## Practical Examples\n\nHere's some typical Python code\
    \ that prints all the items from a list:\n\n```\nthings = ['apples', 'baboons',\
    \ 'cribs', 'dulcimers']\nfor thing in things:\n    print(\"Here's a thing: \"\
    \ + thing)\n```\n\nHow would we describe the efficiency of this algorithm in Big\
    \ O notation?"
  mdcn: "请注意，O(N) 形成了一条完美的对角线。这是因为每增加一个数据，算法就多执行一步。因此，数据越多，算法执行的步骤就越多。\n\n与之形成对比的是\
    \ O(1)，它是一条完美的水平线。无论数据有多少，步骤数都保持不变。\n\n## 深入理解大O的本质\n\n为了理解大O的本质为何如此重要，让我们再深入一层。假设我们有一个常数时间算法，无论数据量多少，它总是执行100步。你会认为它比一个\
    \ O(N) 算法性能更好还是更差？\n\n请看下面的图表：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_58_0.png)\n\
    \n如图所示，对于少于100个元素的数据集，O(N) 算法比执行100步的 O(1) 算法步骤更少。在恰好100个元素时，两条线相交，意味着两个算法执行的步骤数相同，都是100。但关键点在于：对于*所有大于100个元素的数组*，O(N)\
    \ 算法执行的步骤更多。\n\n因为总会存在*某个*数据量使得局势逆转，从该点起直到无穷，O(N) 都需要更多步骤，所以 O(N) 被认为总体上比 O(1)\
    \ 效率低，无论 O(1) 算法实际执行多少步。\n\n即使对于一个总是执行一百万步的 O(1) 算法也是如此。随着数据增加，必然会达到一个点，使得 O(N)\
    \ 变得比 O(1) 算法效率更低，并且在数据量趋向无穷时一直保持这种状态。\n\n## 同一算法，不同场景\n\n正如你在前几章所学，线性搜索*并非总是*\
    \ O(N)。确实，如果我们要找的元素位于数组的最后一个单元格，需要 N 步才能找到。但当我们要找的元素位于数组的*第一个*单元格时，线性搜索只需一步就能找到。因此，这种情况下的线性搜索应描述为\
    \ O(1)。如果我们全面描述线性搜索的效率，我们会说线性搜索在*最佳情况*下是 O(1)，在*最坏情况*下是 O(N)。\n\n虽然大O有效地描述了给定算法的最佳和最坏情况，但大O表示法通常指*最坏情况*，除非另有说明。这就是为什么大多数参考资料会将线性搜索描述为\
    \ O(N)，即使它在最佳情况下*可以*是 O(1)。\n\n这是因为“悲观”方法可能是一个有用的工具：确切了解算法在最坏情况下可能有多低效，能让我们为最坏情况做好准备，并可能对我们的选择产生重大影响。\n\
    \n## 第三类算法\n\n在前一章中，你了解到在有序数组上进行二分查找比线性查找快得多。现在让我们看看如何用大O表示法来描述二分查找。\n\n我们不能将二分查找描述为\
    \ O(1)，因为步骤数随数据增加而增加。它也不符合 O(N) 的类别，因为步骤数远少于 N 个数据元素。正如我们所见，对于包含100个元素的数组，二分查找只需七步。\n\
    \n那么，二分查找似乎介于 O(1) 和 O(N) 之间。它到底是什么？\n\n用大O术语，我们描述二分查找的时间复杂度为：\n\nO(log N)\n\n\
    我将其读作“log N 的大O”。这类算法也被称为具有*对数时间*复杂度。\n\n简单来说，O(log N) 是大O描述算法的一种方式，该算法*每将数据加倍，步骤数就增加一步*。正如你在前一章所学，二分查找正是如此。你很快就会明白*为什么*这被表示为\
    \ O(log N)，但让我们先总结一下你目前所学的内容。\n\n你目前学到的三种算法类型可以按效率从高到低排序如下：\n\n- O(1)\n- O(log\
    \ N)\n- O(N)\n\n让我们看一个比较这三种类型的图表：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_60_0.png)\n\
    \n注意 O(log N) 曲线如何轻微上扬，使其效率低于 O(1)，但远高于 O(N)。\n\n要理解为什么这个算法被称为 O(log N)，你首先需要理解*对数*是什么。如果你已经熟悉这个数学概念，可以跳过下一节。\n\
    \n## 对数\n\n让我们探讨为什么像二分查找这样的算法被描述为 O(log N)。对数到底是什么？\n\nLog 是 *logarithm*（对数）的缩写。首先要注意的是，对数与算法无关，尽管这两个词看起来和听起来很相似。\n\
    \n对数是*指数*的逆运算。这里快速回顾一下指数是什么：\n\n2³ 等同于：\n\n2 * 2 * 2\n\n这恰好是 8。\n\n现在，log₂ 8 是其逆运算。它的意思是：你需要将\
    \ 2 自乘多少次才能得到 8 的结果？\n\n因为你需要将 2 自乘 3 次才能得到 8，所以 log₂ 8 = 3。\n\n再举一个例子：\n\n2⁶\
    \ 转换为：\n\n2 * 2 * 2 * 2 * 2 * 2 = 64\n\n因为我们不得不将 2 自乘六次才得到 64，所以我们有：\n\nlog₂ 64\
    \ = 6。\n\n虽然前面的解释是“教科书”式的对数定义，但我喜欢用另一种方式来描述同一概念，因为许多人发现这样更容易理解，尤其是在涉及大O表示法时。\n\
    \n解释 log₂ 8 的另一种方式是：如果我们持续将 8 *除以* 2，直到结果为 1，我们的等式中会有多少个 2？\n\n8 / 2 / 2 / 2 =\
    \ 1\n\n换句话说，我们需要将 8 减半多少次才能得到 1？在这个例子中，我们需要三次。因此，\n\nlog₂ 8 = 3。\n\n类似地，我们可以将\
    \ log₂ 64 解释为：我们需要将 64 减半多少次才能得到 1？\n\n64 / 2 / 2 / 2 / 2 / 2 / 2 = 1\n\n因为有六个\
    \ 2，所以 log₂ 64 = 6。\n\n现在你理解了对数是什么，O(log N) 背后的含义就清晰了。\n\n## O(log N) 解释\n\n让我们将这一切回归到大O表示法。在计算机科学中，每当我们说\
    \ O(log N)，它实际上是 O(log₂ N) 的简写。为了方便，我们省略了那个小的 2。\n\n回想一下，大O表示法解决的关键问题是：如果有 N 个数据元素，算法需要多少步？\n\
    \nO(log N) 意味着对于 N 个数据元素，算法将需要 $log_2 N$ 步。如果有 8 个元素，算法将需要三步，因为 $log_2 8 = 3$。\n\
    \n换句话说，如果我们持续将 8 个元素减半，直到剩下 1 个元素，需要三步。\n\n这*正是*二分查找发生的情况。当我们搜索特定项时，我们持续将数组的单元格减半，直到将其缩小到正确的数字。\n\
    \n简单来说：*O(log N) 意味着算法执行的步骤数等于将数据元素持续减半直到剩下 1 个所需的次数*。\n\n下表展示了 O(N) 和 O(log N)\
    \ 效率之间的显著差异：\n\n| N 个元素 | O(N) | O(log N) |\n| :--- | :--- | :--- |\n| 8 | 8 |\
    \ 3 |\n| 16 | 16 | 4 |\n| 32 | 32 | 5 |\n| 64 | 64 | 6 |\n| 128 | 128 | 7 |\n\
    | 256 | 256 | 8 |\n| 512 | 512 | 9 |\n| 1024 | 1024 | 10 |\n\n虽然 O(N) 算法执行的步骤数与数据元素数量相同，但\
    \ O(log N) 算法每将数据加倍，只需多执行一步。\n\n在未来的章节中，你将遇到属于你目前学到的三种类型之外的大O表示法类别的算法。但与此同时，让我们将这些概念应用到一些日常代码示例中。\n\
    \n## 实际示例\n\n这是一些典型的 Python 代码，用于打印列表中的所有项目：\n\n```\nthings = ['apples', 'baboons',\
    \ 'cribs', 'dulcimers']\nfor thing in things:\n    print(\"Here's a thing: \"\
    \ + thing)\n```\n\n我们如何用大O表示法描述这个算法的效率？"
