    > ### Adjacency List vs. Adjacency Matrix


    Our implementation of the graph uses a simple list (in the form of an array) to
    store a vertex''s adjacent vertices. This approach is known as the *adjacency
    list* implementation.


    However, it''s good to know that there''s another implementation that uses two-dimensional
    arrays instead of lists. This alternative approach is known as the *adjacency
    matrix*, and it can provide advantages in specific situations.


    Both approaches are popular, and I''ve decided to stick with the adjacency list
    because I find it to be more intuitive. But I recommend you research the adjacency
    matrix as well, as it can be useful and is particularly interesting.


    # Graph Search


    One of the most common graph operations is searching for a particular vertex.
    When dealing with graphs, the term *search* can have several connotations. In
    the simplest sense, to search a graph means to find a particular vertex somewhere
    within the graph. This would be similar to searching for a value within an array
    or a key-value pair inside a hash table.


    However, when applied to graphs, the term *search* usually has a more specific
    connotation, and that is: *if we have access to one vertex in the graph, we must
    find another particular vertex that is somehow connected to this vertex*.'
