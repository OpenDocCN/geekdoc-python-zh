    # CHAPTER 5


    # Optimizing Code With and Without Big O


    We''ve seen that Big O notation is a great tool for comparing algorithms and determining
    which algorithm should be used for a given situation. However, it''s certainly
    not the *only* tool. In fact, there may be times when two competing algorithms
    are described in the same way using Big O, yet one algorithm is faster than the
    other.


    In this chapter, you''re going to learn how to discern between two algorithms
    that *seem* to have the same efficiency and how to select the faster of the two.


    # Selection Sort


    In the previous chapter, we explored a sorting algorithm known as Bubble Sort,
    which had an efficiency of O(N²). We''re now going to dig into another sorting
    algorithm called Selection Sort and see how it measures up to Bubble Sort.


    The steps of Selection Sort are as follows:


    +   1. We check each cell of the array from left to right to determine which value
    is least. As we move from cell to cell, we keep track of the lowest value we''ve
    encountered so far. (We''ll do this by storing its index in a variable.) If we
    encounter a cell that contains a value that is even lower than the one in our
    variable, we replace it so that the variable now points to the new index. See
    the following diagram:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_81_0.png)'
  - '[PAGE 82]


    2. Once we''ve determined which index contains the lowest value, we swap its value
    with the value we began the pass-through with. This would be index 0 in the first
    pass-through, index 1 in the second pass-through, and so on. The diagram here
    illustrates making the swap of the first pass-through.


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_82_0.png)


    3. Each pass-through consists of Steps 1 and 2. We repeat the pass-throughs until
    we reach a pass-through that would start at the end of the array. By this point,
    the array will have been fully sorted.


    # Selection Sort in Action


    Let''s walk through the steps of Selection Sort using the example array [4, 2,
    7, 1, 3].


    We begin our first pass-through:


    We set things up by inspecting the value at index 0. By definition, it''s the
    lowest value in the array we''ve encountered so far (as it''s the *only* value
