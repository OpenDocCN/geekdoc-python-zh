    greater than 56, we search for the 61 in the right child of the 56:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_263_1.png)


    We found it! In this example, it took us four steps to find our desired value.


    # The Efficiency of Searching a Binary Search Tree


    If you take another look at the steps we just walked through, you''ll notice that
    each step eliminates half of the remaining nodes from our search. For example,
    when we begin our search, we start at the root node, and our desired value may
    be found among any of the root''s descendants. However, when we then decide to
    continue the search with, say, the root''s right child, we eliminate the left
    child and *all of its descendants* from the search.


    We''d say, then, that searching in a binary search tree is O(log N), which is
    the apt description for any algorithm that eliminates half of the remaining values
    with each step. (We''ll see soon, though, that this is only for a perfectly balanced
    binary search tree, which is a best-case scenario.)'
