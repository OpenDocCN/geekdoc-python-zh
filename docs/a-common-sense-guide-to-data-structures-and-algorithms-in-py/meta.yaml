    If you try running this code even for a mere length of 5, you may be waiting some
    time for it to finish. This is a slow algorithm! But how do we express it in terms
    of Big O?


    Let''s break it down.


    If we simply print each letter from the alphabet once, it would take 26 steps.


    When we print every two-character combination, we end up with 26 characters multiplied
    by 26 characters.


    When printing every three-character combination, we end up with 26 * 26 * 26 combinations.


    Do you see the pattern?


    | Length | Combinations |

    |---|---|

    | 1 | 26 |

    | 2 | 26² |

    | 3 | 26³ |

    | 4 | 26⁴ |


    If we look at this in terms of N, it emerges that if N is the length of each string,
    *the number of combinations* is 26<sup>N</sup>.


