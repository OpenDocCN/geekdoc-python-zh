  md: "# Dynamic Programming Through Memoization\n\nLuckily, we *do* have options,\
    \ and that is through something called dynamic programming. *Dynamic programming*\
    \ is the process of optimizing recursive problems that have overlapping subproblems.\n\
    \n(Don't pay too much attention to the word *dynamic*. There's some debate about\
    \ how the term came about, and there's nothing obviously dynamic about the techniques\
    \ I'm about to demonstrate.)\n\nOptimizing an algorithm with dynamic programming\
    \ is typically accomplished with one of two techniques.\n\nThe first technique\
    \ is something called *memoization*. And no, that's not a typo. Pronounced meh-moe-ih-ZAY-shun,\
    \ memoization is a simple, but brilliant, technique for reducing recursive calls\
    \ in cases of overlapping subproblems.\n\nEssentially, memoization reduces recursive\
    \ calls by *remembering* previously computed functions. (In this respect, memoization\
    \ really is like its similar-sounding word memorization.)\n\nIn our Fibonacci\
    \ example, the first time fib(3) is called, the function does its computation\
    \ and returns the number 2. However, before moving on, the function stores this\
    \ result inside a hash table. The hash table will look something like this:\n\n\
    ```\n{3: 2}\n```\n\nThis indicates that the result of fib(3) is the number 2.\n\
    \nSimilarly, our code will memoize the results of all new computations it encounters.\
    \ After encountering fib(4), fib(5), and fib(6), for example, our hash table will\
    \ look like this:\n\n```\n{\n    3: 2,\n    4: 3,\n    5: 5,\n    6: 8\n}\n```\n\
    \nNow that we have this hash table, we can use it to prevent future recursive\
    \ calls. Here's the way this works:\n\nWithout memoization, fib(4) would normally\
    \ call fib(3) and fib(2), which in turn make their own recursive calls. Now that\
    \ we have this hash table, we can approach things differently. Instead of fib(4)\
    \ just blithely calling fib(3), for example, it first checks the hash table to\
    \ see if the result of fib(3) has already"
  merge: -1
  pgno: 205
- img_proc: true
  md: "been computed. Only if the 3 key is *not* in the hash table does the function\
    \ proceed to call fib(3).\n\nMemoization goes for the jugular of overlapping subproblems.\
    \ The whole issue with overlapping subproblems is that we end up computing the\
    \ same recursive calls over and over again. With memoization, though, each time\
    \ we make a new calculation, we store it in the hash table for future use. This\
    \ way, we only make a calculation if it hasn't ever been made before.\n\nOkay,\
    \ this all sounds good, but there's one glaring problem. How does each recursive\
    \ function get access to this hash table?\n\nThe answer is this: we pass the hash\
    \ table as a second parameter to the function.\n\nBecause the hash table is a\
    \ specific object in memory, we're able to pass it from one recursive call to\
    \ the next, even though we're modifying it as we go. This is true even as we unwind\
    \ the call stack. Even though the hash table may have been empty when the original\
    \ call was made, that same hash table can be full of data by the time the original\
    \ call has finished executing.\n\n# Implementing Memoization\n\nTo pass the hash\
    \ table along, we modify our function to accept *two* arguments, with the hash\
    \ table as the second. We call this hash table, memo, as in memoization:\n\n```\n\
    def fib(n, memo):\n```\n\nWhen calling the function the first time, we pass in\
    \ both the number and an empty hash table:\n\n```\nfib(6, {})\n```\n\nEach time\
    \ fib calls itself, it also passes along the hash table, which gets filled up\
    \ along the way.\n\nHere's the rest of the function:\n\n```\ndef fib(n, memo):\n\
    \    if n == 0 or n == 1:\n        return n\n    if n not in memo:\n        memo[n]\
    \ = fib(n - 2, memo) + fib(n - 1, memo)\n    return memo[n]\n```"
