  - '[PAGE 157]


    # The Importance of Constrained Data Structures


    By definition, if a stack is just a constrained version of an array, that means
    an array can do anything a stack can do. If so, what advantage does a stack provide?


    Constrained data structures like the stack (and the queue, which we''ll encounter
    shortly) are important for several reasons.


    First, when we work with a constrained data structure, we can prevent potential
    bugs. The linting algorithm, for example, only works if we exclusively remove
    items from the top of the stack. If a programmer inadvertently writes code that
    removes items from the middle of the array, the algorithm will break down. By
    using a stack, we''re forced into only removing items from the top, as it''s impossible
    to get the stack to remove any other item.


    Second, data structures like stacks give us a new mental model for tackling problems.
    The stack, for example, gives us the whole idea of a last-in, first-out process.
    We can then apply this LIFO mindset to solve all sorts of problems, such as the
    linter just described.


    And once we''re familiar with the stack and its LIFO nature, the code we write
    using the stack becomes familiar and elegant to other developers who read our
    code. As soon as someone sees a stack being used within an algorithm, they immediately
    know that the algorithm is working with a LIFO-based process.


    # Stack Wrap-Up


    Stacks are ideal for processing any data that should be handled last in, first
    out. The undo function in a word processor, for example, is a great use case for
    a stack. As the user types, we keep track of each keystroke by pushing the keystroke
    onto the stack. Then, when the user hits the undo key, we pop the most recent
    keystroke from the stack and eliminate it from the document. At this point, their
    next-to-most recent keystroke is now sitting at the top of the stack, ready to
    be undone if need be.


    # Queues


    A *queue* is another data structure designed to process temporary data. It''s
    like a stack in many ways, except that it processes data in a different order.
    Like a stack, a queue is also an abstract data type.'
  - '[PAGE 158]


    You can think of a queue as a line of people at the movie theater. The first one
    in the line is the first one to leave the line and enter the theater. With queues,
    the first item added to the queue is the first item to be removed. That''s why
    computer scientists apply the acronym FIFO to queues: *first in, first out*.


    As with a line of people, a queue is usually depicted horizontally. It''s also
    common to refer to the beginning of the queue as its *front* and the end of the
    queue as its *back*.


    Like stacks, queues are arrays with three restrictions (it''s just a different
    set of restrictions):


    +   - Data can be inserted only at the *end* of a queue. (This is identical behavior
    to the stack.)

    - Data can be deleted only from the *front* of a queue. (This is the opposite
    behavior of the stack.)

    - Only the element at the *front* of a queue can be read. (This, too, is the opposite
    of behavior of the stack.)


    Let''s see a queue in action, beginning with an empty queue.


    First, we insert a 5 (a common term for inserting into a queue is *enqueue*, but
    we''ll use the terms insert and enqueue interchangeably):


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_158_0.png)


    Next, we insert a 9:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_158_1.png)


    Next, we insert a 100:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_158_2.png)


    As of now, the queue has functioned just like a stack. However, removing data
    happens in the reverse, as we remove data from the *front* of the queue. (Removing
    an element from a queue is also known as *dequeuing*.)


    If we want to remove data, we must start with the 5, since it''s at the front
    of the queue:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_158_3.png)'
