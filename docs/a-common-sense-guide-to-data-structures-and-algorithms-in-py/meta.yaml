  md: "# CHAPTER 10\n\n# Recursively Recurse with Recursion\n\nRecursion is a key\
    \ concept in computer science that will unlock the more advanced algorithms we're\
    \ going to encounter in this book. When used correctly, recursion can be used\
    \ to solve certain types of tricky problems in surprisingly simple ways. Sometimes,\
    \ it even seems like magic.\n\nBut before we dive in, a pop quiz!\n\nWhat happens\
    \ when the blah() function defined here is called?\n\n```\ndef blah():\n    blah()\n\
    ```\n\nAs you probably guessed, it will call itself infinitely, since blah() calls\
    \ itself, which in turn calls itself, and so on.\n\nRecursion is the term for\
    \ a function calling itself. Indeed, infinite recursion, as in the above example,\
    \ is utterly useless. When harnessed correctly, though, recursion can be a powerful\
    \ tool.\n\n# Recurse Instead of Loop\n\nLet's say you work at NASA and need to\
    \ program a countdown function for launching spacecraft. The particular function\
    \ that you're asked to write should accept a number—such as 10—and display the\
