    Now, let''s get to the question at hand: how would we *write the code* to count
    all the paths?


    Without the recursive mindset, it can be difficult to wrap one''s mind around
    the algorithm for making this calculation. However, with the top-down way of thinking,
    the problem can become surprisingly easy.


    For an eleven-step staircase, the first subproblem that comes to mind is a ten-step
    staircase. Let''s go with that for now. If we knew how many possible paths there
    are to climb a ten-step staircase, can we use that as a base for calculating the
    paths for an eleven-step staircase?


    For starters, we do know that climbing an eleven-step staircase will take *at
    least* as many steps as climbing a ten-step staircase. That is, we have all the
    paths to get to stair number 10, and from there, one can climb one more step to
    get to the top.


    However, this can''t be the complete solution, since we know that someone can
    also jump to the top from stair numbers 9 and 8 as well.


    If we think about it further, we''ll realize that if you''re taking any path that
    includes going from stair 10 to stair 11, you''re not taking any of the paths
    that include jumping from stair 9 to stair 11. Conversely, if you jump from stair
    9 to stair 11, you''re not taking any of the paths that include stepping on stair
    10.


    So we know that the number of paths to the top will include at least the number
    of paths to stair 10 plus the number of paths to stair 9.


    And since it''s possible to also jump from stair 8 to stair 11, as one can jump
    three steps at a time, we need to include the count of those paths as well.


    We''ve determined, then, that the number of steps to the top is at least the sum
    of all the paths to stairs 10, 9, and 8.'
