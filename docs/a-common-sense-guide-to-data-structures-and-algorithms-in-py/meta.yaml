  - '[PAGE 302]


    If we want to insert a 5 into this heap, the only way to keep the heap well balanced
    is by making the 5 the last node—in this case, making it a child of the 10:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_302_0.png)


    Any alternative to this algorithm would cause imbalance. Say, in an alternative
    universe, the algorithm was to insert the new node into the bottom leftmost node,
    which we could easily find by traversing the left children until we hit the bottom.
    This would make the 5 a child of the 15:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_302_1.png)


    Our heap is now somewhat imbalanced, and it’s easy to see how much more imbalanced
    it would become if we kept inserting new nodes at the bottom leftmost spot.


    Similarly, when deleting from a heap, we always turn the last node into the root
    because, otherwise, the heap can become imbalanced. Take again our example heap:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_302_2.png)'
  - '[PAGE 303]


    If, in our alternative universe, we always moved the bottom rightmost node into
    the root position, the 10 would become the root node, and we''d end up with an
    imbalanced heap with a bunch of left descendants and zero right descendants.


    Now, the reason why this balance is so important is because it''s what allows
    us to achieve O(log N) operations. In a severely imbalanced tree like the following
    one, traversing it could take O(N) steps instead:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_303_0.png)


    But this brings us back to the problem of the last node. What algorithm would
    allow us to consistently find the last node of any heap? (Again, without having
    to traverse all N nodes.)


    And this is where our plot takes a sudden twist.


    # Arrays as Heaps


    Because finding the last node is so critical to the heap''s operations, and because
    we want to make sure that finding the last node is efficient, heaps are *usually
    implemented using arrays*.


    While until now we always assumed that every tree consists of independent nodes
    connected to each other with links (just like a linked list), you''ll now see
    that we can also use an array to implement a heap. The heap itself can be an abstract
    data type that really uses an array under the hood.


    The [diagram on page 294](link) shows how an array is used to store the values
    of a heap.


    The way this works is that we assign each node to an index within the array. In
    the previous diagram, the index of each node is found in a square below'
