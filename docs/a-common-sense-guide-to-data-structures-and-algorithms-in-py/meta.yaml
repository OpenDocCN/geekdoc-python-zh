    \ alternative approach is known as the *adjacency matrix*, and it can provide\
    \ advantages in specific situations.\n\nBoth approaches are popular, and I've\
    \ decided to stick with the adjacency list because I find it to be more intuitive.\
    \ But I recommend you research the adjacency matrix as well, as it can be useful\
    \ and is particularly interesting.\n\n## Graph Search\n\nOne of the most common\
    \ graph operations is searching for a particular vertex. When dealing with graphs,\
    \ the term *search* can have several connotations. In the simplest sense, to search\
    \ a graph means to find a particular vertex somewhere within the graph. This would\
    \ be similar to searching for a value within an array or a key-value pair inside\
    \ a hash table.\n\nHowever, when applied to graphs, the term *search* usually\
    \ has a more specific connotation, and that is: *if we have access to one vertex\
    \ in the graph, we must find another particular vertex that is somehow connected\
    \ to this vertex*.\n\nFor example, take a look at this example social network:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_343_0.png)\n\nLet's say we currently\
    \ have access to Alice's vertex. If we said that we'll search for Irena, it would\
    \ mean that we're trying to find our way from Alice to Irena. Interestingly, you\
    \ can see that there are two different *paths* we can take to get from Alice to\
    \ Irena.\n\nThe shorter path is obvious:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_343_1.png)\n\
    \nWe can get from Alice to Irena in this sequence:\nAlice -> Derek -> Gina ->\
    \ Irena\n\nHowever, we can take a slightly longer path to get to Irena as well:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_344_0.png)\n\nThis is the longer path:\n\
    \nAlice -> Elaine -> Derek -> Gina -> Irena\n\nThe term *path* is an official\
    \ graph term, and it means the specific sequence of edges to get from one vertex\
    \ to another.\n\nNow, searching a graph (which you now know means getting from\
    \ one vertex to another) can be useful for a variety of use cases.\n\nPerhaps\
    \ the most obvious application for graph search is searching for a particular\
    \ vertex within a connected graph. When this is the case, search can be used to\
    \ find *any* vertex within the entire graph even if we have access to just one\
    \ random vertex.\n\nAnother use for graph search is to discover whether two vertices\
    \ are connected. For example, we may want to know whether Alice and Irena are\
    \ somehow connected to each other in this network. A search would give us the\
    \ answer.\n\nSearch can also be used even if we aren't looking for one particular\
    \ vertex; that is, we can use graph search to merely traverse a graph, which can\
    \ be useful if we want to perform an operation on every vertex in the graph. You'll\
    \ see shortly how this works.\n\n## Depth-First Search\n\nThe two well-known approaches\
    \ for graph search are *depth-first search* and *breadth-first search*. Both approaches\
    \ can get the job done, but each provides unique advantages in particular situations.\
    \ We're going to start with depth-first search, also referred to as DFS, because\
    \ it's actually quite similar to the algorithm for binary tree traversal that\
    \ we discussed back in [Binary Search Tree Traversal, on page 272](Binary Search\
    \ Tree Traversal, on page 272). In fact, it's *also* the same essential algorithm\
    \ that we saw in [Filesystem Traversal, on page 156](Filesystem Traversal, on\
    \ page 156).\n\nAs mentioned earlier, graph search can be used to either find\
    \ a particular vertex, or it can be used to simply traverse the graph. We're going\
    \ to begin by using depth-first search to traverse the graph since that algorithm\
    \ is slightly simpler.\n\nThe key to any graph search algorithm is keeping track\
    \ of which vertices we've visited so far. If we don't do this, we can end up in\
    \ an infinite cycle. Take the following graph, for example:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_345_0.png)\n\
    \nHere, Mohammad is friends with Felicia. And Felicia also happens to be friends\
    \ with Zeina. But Zeina is friends with Mohammad. So our code would end up going\
    \ in circles unless we keep track of which vertices we've already traversed.\n\
    \nThis problem didn't occur when we dealt with trees (or filesystem traversal),\
    \ since trees can't have cycles. But since a graph *can* have a cycle, we need\
    \ to address this issue now.\n\nOne way to keep track of our visited vertices\
    \ is by using a hash table. As we visit each vertex, we add the vertex (or its\
    \ value) as a key in the hash table and assign it an arbitrary value, such as\
    \ the Boolean `True`. If a vertex is present in the hash table, it means we've\
    \ already visited it.\n\nWith this in mind, the depth-first search algorithm works\
    \ as follows.\n\n1. Start at any random vertex within the graph.\n2. Add the current\
    \ vertex to the hash table to mark it as having been visited.\n3. Iterate through\
    \ the current vertex's adjacent vertices.\n4. For each adjacent vertex, if the\
    \ adjacent vertex has already been visited, ignore it.\n5. If the adjacent vertex\
    \ has *not* yet been visited, recursively perform depth-first search on that vertex."
