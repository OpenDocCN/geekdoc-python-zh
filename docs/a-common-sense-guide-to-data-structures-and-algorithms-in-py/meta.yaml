- md: "Accordingly, we need to update the `cheapest_prices_table` to indicate our\
    \ newly found cheapest path to El Paso:\n\n| From Atlanta To: | Boston | Chicago\
    \ | Denver | El Paso |\n| :--- | :--- | :--- | :--- | :--- |\n| $0 | $100 | $200\
    \ | $160 | $280 |\n\nWe also need to update the `cheapest_previous_stopover_city_table`,\
    \ with El Paso as the key and Chicago as the value:\n\n| Cheapest Previous Stopover\
    \ City from Atlanta: | Boston | Chicago | Denver | El Paso |\n| :--- | :--- |\
    \ :--- | :--- | :--- |\n| | Atlanta | Denver | Atlanta | *Chicago* |\n\nChicago\
    \ has no more adjacent cities, so we can now visit our next city.\n\nStep 13:\
    \ El Paso is the only known unvisited city, so let's make it our `current_city`,\
    \ as shown in the [graph on page 374](#).\n\nStep 14: El Paso has only one outbound\
    \ flight, which is to Boston. That flight costs $100. Now, the `cheapest_prices_table`\
    \ reveals that the cheapest price from Atlanta to El Paso is $280. So if we travel\
    \ from Atlanta to Boston *with El Paso* as the second-to-last stop, our grand\
    \ total will be $380. This is more expensive than the cheapest-known price from\
    \ Atlanta to Boston ($100), so we don't update any of our tables.\n\nSince we've\
    \ visited every known city, we now have all the information we need to find the\
    \ cheapest path from Atlanta to El Paso.\n\n## Finding the Shortest Path\n\nIf\
    \ we just want to know the cheapest price from Atlanta to El Paso, we can look\
    \ in our `cheapest_prices_table` and see that it's $280. But if we want to figure\
    \ out the *exact* path to fly to snag that low price, we have one last thing to\
    \ do.\n\nRemember the `cheapest_previous_stopover_city_table`? It's now time to\
    \ use that data.\n\nCurrently, the `cheapest_previous_stopover_city_table` looks\
    \ like this:\n\n| Cheapest Previous Stopover City from Atlanta: | Boston | Chicago\
    \ | Denver | El Paso |\n| :--- | :--- | :--- | :--- | :--- |\n| | Atlanta | Denver\
    \ | Atlanta | Chicago |\n\nWe can use this table to draw the shortest path from\
    \ Atlanta to El Paso—if we go backward.\n\nLet's look at El Paso. Its corresponding\
    \ city is Chicago. This means the cheapest route from Atlanta to El Paso involves\
    \ stopping over in Chicago as the *immediate step* before flying to El Paso. Let's\
    \ write this down:\n\n```\nChicago -> El Paso\n```\n\nNow, if we look up Chicago\
    \ in the `cheapest_previous_stopover_city_table`, we can see that its corresponding\
    \ value is Denver. This means the cheapest route from Atlanta to *Chicago* involves\
    \ stopping in Denver right before Chicago. Let's add this to our figure:\n\n```\n\
    Denver -> Chicago -> El Paso\n```\n\nIf we then look up Denver in the `cheapest_previous_stopover_city_table`,\
    \ we can see that the cheapest flight to get from Atlanta to Denver is to fly\
    \ directly from Atlanta to Denver:\n\nAtlanta -> Denver -> Chicago -> El Paso\n\
    \nNow, Atlanta happens to be our starting city, so this route is the exact path\
    \ we'd take from Atlanta to El Paso to get the cheapest price.\n\nLet's review\
    \ the logic we're using to chain together the cheapest path.\n\nRemember, the\
    \ `cheapest_previous_stopover_city_table` contains, for each destination, the\
    \ second-to-last stop before that destination to earn the cheapest price if you're\
    \ flying from Atlanta.\n\nSo from the `cheapest_previous_stopover_city_table`,\
    \ we can see that the cheapest price from Atlanta to El Paso means:\n\n- We need\
    \ to fly directly from Chicago to El Paso, and\n- We need to fly directly from\
    \ Denver to Chicago, and\n- We need to fly directly from Atlanta to Denver.\n\n\
    This means that the following is our cheapest path:\n\nAtlanta -> Denver -> Chicago\
    \ -> El Paso\n\nAnd...that's it. Whew!\n\n## Code Implementation: Dijkstra's Algorithm\n\
    \nBefore we get to the actual algorithm, we can set up our example from earlier,\
    \ using this code:\n\n```\natlanta = City(\"Atlanta\")\nboston = City(\"Boston\"\
    )\nchicago = City(\"Chicago\")\ndenver = City(\"Denver\")\nel_paso = City(\"El\
    \ Paso\")\n\natlanta.add_route(boston, 100)\natlanta.add_route(denver, 160)\n\
    boston.add_route(chicago, 120)\nboston.add_route(denver, 180)\nchicago.add_route(el_paso,\
    \ 80)\ndenver.add_route(chicago, 40)\ndenver.add_route(el_paso, 140)\nel_paso.add_route(boston,\
    \ 100)\n```\n\nFinally, here's the code for Dijkstra's algorithm. It doesn't make\
    \ for light reading, and it's probably the most complex piece of code in this\
    \ book. However, if you're ready to study it carefully, read on.\n\nIn our implementation\
    \ here, this method does not live inside the City class, but outside it. The method\
    \ accepts two City instances and returns the shortest path between them:\n\n```\n\
    def dijkstra_shortest_path(starting_city, final_destination):\n    cheapest_prices_table\
    \ = {}\n    cheapest_previous_stopover_city_table = {}\n    unvisited_cities =\
    \ [starting_city]\n    visited_cities = {}\n\n    cheapest_prices_table[starting_city.name]\
    \ = 0\n    current_city = starting_city\n\n    while unvisited_cities:\n     \
    \   visited_cities[current_city.name] = True\n        unvisited_cities.remove(current_city)\n\
    \n        for adjacent_city in current_city.routes:\n            price = current_city.routes.get(adjacent_city)\n\
    \n            if (not visited_cities.get(adjacent_city.name)\n               \
    \     and adjacent_city not in unvisited_cities):\n                unvisited_cities.append(adjacent_city)\n\
    \n            price_through_current_city = \\\n                (cheapest_prices_table[current_city.name]\
    \ + price)\n\n            if (not cheapest_prices_table.get(adjacent_city.name)\
    \ or\n                    (price_through_current_city\n                     <\
    \ cheapest_prices_table[adjacent_city.name])):\n                cheapest_prices_table[adjacent_city.name]\
    \ = \\\n                    price_through_current_city\n                cheapest_previous_stopover_city_table[adjacent_city.name]\
    \ = \\\n                    current_city.name\n\n        cheapest_price = float('inf')\n\
    \        for city in unvisited_cities:\n            if cheapest_prices_table[city.name]\
    \ < cheapest_price:\n                current_city = city\n                cheapest_price\
    \ = cheapest_prices_table[city.name]\n\n    shortest_path = []\n    current_city_name\
    \ = final_destination.name\n\n    while current_city_name:\n        shortest_path.insert(0,\
    \ current_city_name)\n        current_city_name = \\\n            cheapest_previous_stopover_city_table.get(current_city_name)\n\
    \n    return shortest_path\n```\n\nWe have a decent amount of code here, so let's\
    \ break it down.\n\nThe `dijkstra_shortest_path` function accepts two vertices,\
    \ representing the `starting_city` and `final_destination`.\n\nEventually, our\
    \ function will return an array of strings that represent the cheapest path. For\
    \ our example, this function would return:\n\n```\n[\"Atlanta\", \"Denver\", \"\
    Chicago\", \"El Paso\"]\n```\n\nThe first thing our function does is set up the\
    \ two primary tables that fuel the entire algorithm:\n\n```\ncheapest_prices_table\
    \ = {}\ncheapest_previous_stopover_city_table = {}\n```\n\nWe then set up ways\
    \ to track which cities we've visited and the ones we have yet to visit:\n\n```\n\
    unvisited_cities = [starting_city]\nvisited_cities = {}\n```\n\nNote that we prepopulate\
    \ `unvisited_cities` with the `starting_city` as the only item in the array.\n\
    \nIt may seem odd that `unvisited_cities` is an array, while `visited_cities`\
    \ is a hash table. The reason we've made `visited_cities` a hash table is because\
    \ in the code that follows we only use it for lookups, for which a hash table\
    \ is an ideal choice in terms time complexity.\n\nThe choice of the best data\
    \ structure for the `unvisited_cities` is less simple. In our code that follows,\
    \ the next city we visit is always the cheapest unvisited city to reach from the\
    \ starting city. Ideally, then, we always want immediate access to the cheapest\
    \ option from among the unvisited cities. Our code that accesses this data is\
    \ simpler if the data structure is an array.\n\nIn truth, a priority queue would\
    \ be a perfect fit for this, as its whole function is to provide ready access\
    \ to the least (or greatest) value from a collection of items. As you saw in [Chapter\
    \ 16, Keeping Your Priorities Straight with Heaps, on page 277](https://example.com),\
    \ a heap is generally the best data structure for implementing a priority queue.\
    \ However, I've instead chosen to use a simple array for this implementation only\
    \ to keep the code as simple and small as possible, since Dijkstra's algorithm\
    \ is complex enough on its own. But I encourage you to try replacing the array\
    \ with a priority queue.\n\nNext, we add the first key-value pair to the `cheapest_prices_table`\
    \ with the `starting_city` as the key and 0 as the value. Again, this makes sense\
    \ because it costs nothing to get to the `starting_city` as we're already there:"
