    \ | O(N) (开头为 O(1)) |\n| 删除 | O(N) (末尾为 O(1)) | O(N) (开头为 O(1)) |\n\n从大局来看，链表在时间复杂度方面似乎表现平平。它们在搜索、插入和删除方面的表现与数组相似，而在读取方面则慢得多。既然如此，为什么还会有人想使用链表呢？\n\
    \n解锁链表威力的关键在于，*实际的插入和删除步骤*只是 O(1)。\n\n但这不是只在列表开头插入或删除时才相关吗？我们看到，要在其他地方插入或删除，仅仅访问我们要删除或在其后插入的节点就可能需要多达\
