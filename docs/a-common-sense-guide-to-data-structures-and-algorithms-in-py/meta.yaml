    \ used to speed up algorithms.)\n\nSince we want to be able to look up any number\
    \ from the array in O(1) time, we'll store those numbers as keys in a hash table.\
    \ The hash table may look like this:\n\n{2: True, 0: True, 4: True, 1: True, 7:\
    \ True, 9: True}\n\nWe can use any arbitrary item to serve as the values; let's\
