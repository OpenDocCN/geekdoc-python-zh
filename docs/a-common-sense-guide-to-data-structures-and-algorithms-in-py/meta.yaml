  md: 'We see that where the original array has 8 elements, Quicksort takes about
    21 steps. This assumes a best- or average-case scenario, where the pivot ends
    up roughly in the middle of the subarray after each partition.


    For an array of 16 elements, Quicksort takes about 64 steps, and for an array
    of 32 elements, Quicksort takes about 160 steps. Take a look at this table:


    | N | Quicksort Steps (approx.) |

    |---|---|

    | 4 | 8 |

    | 8 | 24 |

    | 16 | 64 |

    | 32 | 160 |


    (While in our example earlier, the number of Quicksort steps for an array of size
    8 was 21, I put 24 in this table. The exact number can vary from case to case,
    and 24 is also a reasonable approximation. I specifically made it 24 to make the
    following explanation a little clearer.)


    # The Big O of Quicksort


    How do we categorize Quicksort in terms of Big O notation?


    If we look at the pattern shown earlier, we''ll note that the number of Quicksort
    steps for N elements in the array is about *N multiplied by log N*, as shown in
    the following table:


    | N | log N | N * log N | Quicksort Steps (approx.) |

    |---|---|---|---|

    | 4 | 2 | 8 | 8 |

    | 8 | 3 | 24 | 24 |

    | 16 | 4 | 64 | 64 |

    | 32 | 5 | 160 | 160 |


    In fact, this is exactly how to express the efficiency of Quicksort. It''s an
    algorithm of *O(N log N)*. We''ve discovered a new category of Big O!


    The [graph on page 216](https://example.com) shows how O(N log N) looks beside
    other categories of Big O.


    Now, it''s not a coincidence that the number of steps in Quicksort just happens
    to align with N * log N. If we think about Quicksort more broadly, we can see
    *why* it''s this way.


    Each time we partition the array, we end up breaking it down into two subarrays.
    Assuming the pivot ends up somewhere in the middle of the array—which'
  merge: -1
