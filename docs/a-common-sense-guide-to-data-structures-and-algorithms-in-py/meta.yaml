    # CHAPTER 6


    # Optimizing for Optimistic Scenarios


    Until this point, we''ve focused primarily on how many steps an algorithm would
    take in a worst-case scenario. The rationale behind this is simple: if you''re
    prepared for the worst, things will turn out okay.


    However, you''ll discover in this chapter that the worst-case scenario isn''t
    the *only* situation worth considering. Being able to consider *all* scenarios
    is an important skill that can help you choose the appropriate algorithm for every
    situation.


    # Insertion Sort


    We''ve previously encountered two different sorting algorithms: Bubble Sort and
    Selection Sort. Both have efficiencies of O(N²), but Selection Sort is actually
    twice as fast. Now you''ll learn about a third sorting algorithm called Insertion
    Sort that will reveal the power of analyzing scenarios beyond the worst case.


    Insertion Sort consists of the following steps:


    +   1. In the first pass-through, we temporarily remove the value at index 1 (the
    second cell) and store it in a temporary variable. This will leave a gap at that
    index, since it contains no value:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_96_0.png)


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_96_1.png)'
  - '[PAGE 97]


    In subsequent pass-throughs, we remove the values at the subsequent indexes.


    2. We then begin a shifting phase, where we take each value to the left of the
    gap and compare it to the value in the temporary variable:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_97_0.png)


    If the value to the left of the gap is greater than the temporary variable, we
    shift that value to the right:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_97_1.png)


    As we shift values to the right, inherently the gap moves leftward. As soon as
    we encounter a value that is lower than the temporarily removed value, or we reach
    the left end of the array, this shifting phase is over.


    3. We then insert the temporarily removed value into the current gap:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_97_2.png)


    4. Steps 1 through 3 represent a single pass-through. We repeat these pass-throughs
    until the pass-through begins at the final index of the array. By then, the array
    will have been fully sorted.


    # Insertion Sort in Action


    Let''s apply Insertion Sort to the array [4, 2, 7, 1, 3].


    We begin the first pass-through by inspecting the value at index 1. This happens
    to contain the value 2:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_97_3.png)'
