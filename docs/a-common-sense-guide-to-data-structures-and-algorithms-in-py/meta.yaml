    N² + 2N - 2 steps


    You''ve already learned one major rule of Big O: that Big O ignores constants.
    With this rule in mind, we''d—at first glance—simplify this to O(N² + N).


    However, I''ll now reveal another major rule of Big O:


    > Big O notation only takes into account the highest order of N when we have multiple
    orders added together.


    In other words, if we have an algorithm that takes N⁴ + N³ + N² + N steps, we
    only consider N⁴ to be significant—and just call it O(N⁴). Why is this?


    Look at the following table:


    | N | N² | N³ | N⁴ |

    |---|---|---|---|

    | 2 | 4 | 8 | 16 |

    | 5 | 25 | 125 | 625 |

    | 10 | 100 | 1,000 | 10,000 |

    | 100 | 10,000 | 1,000,000 | 100,000,000 |'
- md: "As N increases, N⁴ becomes so much more significant than any other order of\
    \ N that the smaller orders are considered trivial. For example, when looking\
    \ at the bottom row of the table, when we add N⁴ + N³ + N² + N, we get a total\
    \ of 101,010,100. But we may as well round that down to 100,000,000, which is\
    \ accomplished by ignoring those lower orders of N.\n\nWe can apply this same\
    \ concept to Insertion Sort. Even though we've already simplified Insertion Sort\
    \ down to N² + N steps, we simplify the expression further by throwing out the\
    \ lower order, reducing it to O(N²).\n\nIt emerges that in a worst-case scenario,\
    \ Insertion Sort has the same time complexity as Bubble Sort and Selection Sort.\
    \ They're all O(N²).\n\nI noted in the previous chapter that although Bubble Sort\
    \ and Selection Sort are both O(N²), Selection Sort is faster because Selection\
    \ Sort has N² / 2 steps compared with Bubble Sort's N² steps. At first glance,\
    \ then, we'd say that Insertion Sort is as slow as Bubble Sort, since it too takes\
    \ about N² steps.\n\nIf I stop the book here, you'd walk away thinking that Selection\
    \ Sort is the best choice out of the three, since it's twice as fast as either\
    \ Bubble Sort or Insertion Sort. But it's actually not that simple.\n\n## The\
    \ Average Case\n\nIndeed, in a worst-case scenario, Selection Sort *is* faster\
    \ than Insertion Sort. However, it's critical we also take into account the *average-case\
    \ scenario*.\n\nWhy?\n\nBy definition, the cases that occur most frequently are\
    \ average scenarios. Take a look at this simple bell curve:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_105_0.png)\n\
    \nBest- and worst-case scenarios happen relatively infrequently. In the real world,\
    \ average scenarios are what occur most of the time.\n\nTake a randomly sorted\
    \ array, for example. What are the odds that the values will occur in perfect\
    \ ascending or descending order? It’s much more likely that the values will be\
    \ all over the place.\n\nLet’s examine Insertion Sort, then, in the context of\
    \ all scenarios.\n\nWe’ve looked at how Insertion Sort performs in a worst-case\
    \ scenario—where the array is sorted in descending order. In the worst case, we\
    \ saw that in each pass-through, we compare and shift every value we encounter.\
    \ (We calculated this to be a total of N² comparisons and shifts.)\n\nIn the best-case\
    \ scenario, where the data is already sorted in ascending order, we end up making\
    \ just one comparison per pass-through and not a single shift, since each value\
    \ is already in its correct place.\n\nWhere data is randomly sorted, however,\
    \ we’ll have pass-throughs in which we compare and shift all of the data, some\
    \ of the data, or possibly none of the data. If you look at the preceding walk-through\
    \ example in [Insertion Sort in Action, on page 80](https://example.com), you’ll\
    \ notice that in the first and third pass-throughs, we compare and shift all the\
    \ data we encounter. In the fourth pass-through, we compare and shift just some\
    \ of it, and in the second pass-through, we make just one comparison and shift\
    \ no data at all.\n\n> (This variance occurs because some pass-throughs compare\
    \ all the data to the left of the temp_value, while other pass-throughs end early,\
    \ due to encountering a value that is less than the temp_value.)\n\nSo in the\
    \ worst-case scenario, we compare and shift *all* the data, and in the best-case\
    \ scenario, we shift *none* of the data (and just make one comparison per pass-through).\
    \ For the average scenario, we can say that in the aggregate, we probably compare\
    \ and shift about *half* the data. Thus, if Insertion Sort takes N² steps for\
    \ the worst-case scenario, we’d say that it takes about N² / 2 steps for the average\
    \ scenario. (In terms of Big O, however, both scenarios are O(N²).)\n\nLet’s dive\
    \ into some specific examples.\n\nThe array [1, 2, 3, 4] is already presorted,\
    \ which is the best case. The worst case for the same data would be [4, 3, 2,\
    \ 1], and an example of an average case might be [1, 3, 4, 2].\n\nIn the worst\
    \ case ([4, 3, 2, 1]), there are six comparisons and six shifts, for a total of\
    \ twelve steps. In an average case of [1, 3, 4, 2], there are four comparisons\
    \ and two shifts, for a total of six steps. In the best case ([1, 2, 3, 4]), there\
    \ are three comparisons and zero shifts.\n\nWe can now see that the performance\
    \ of Insertion Sort *varies greatly* based on the scenario. In the worst-case\
    \ scenario, Insertion Sort takes N² steps. In an average scenario, it takes N²\
    \ / 2 steps. And in the best-case scenario, it takes about N steps.\n\nYou can\
    \ see these three types of performance in the following graph:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_107_0.png)\n\
    \nContrast this with Selection Sort. Selection Sort takes N² / 2 steps in *all*\
    \ cases, from worst to average to best-case scenarios. This is because Selection\
    \ Sort doesn't have any mechanism for ending a pass-through early at any point.\
    \ Each pass-through compares every value to the right of the chosen index no matter\
    \ what.\n\nHere's a table that compares Selection Sort and Insertion Sort:\n\n\
    | | Best Case | Average Case | Worst Case |\n|---|---|---|---|\n| Selection Sort\
    \ | N² / 2 | N² / 2 | N² / 2 |\n| Insertion Sort | N | N² / 2 | N² |\n\nSo which\
    \ is better: Selection Sort or Insertion Sort? The answer is, well, it depends.\
    \ In an average case—where an array is randomly sorted—they perform similarly.\
    \ If you have reason to assume you'll be dealing with data that is *mostly* sorted,\
    \ Insertion Sort will be a better choice. If you have reason to assume you'll\
    \ be dealing with data that is mostly sorted in reverse order, Selection Sort\
    \ will be faster. If you have no idea what the data will be like, that's essentially\
    \ an average case, and both will be equal.\n\n## A Practical Example\n\nSuppose\
    \ you're writing a Python application, and somewhere in your code you find that\
    \ you need to get the intersection between two arrays. The intersection is a list\
    \ of all the values that occur in *both* of the arrays. For example, if you have\
    \ the arrays [3, 1, 4, 2] and [4, 5, 3, 6], the intersection would be a third\
    \ array [3, 4] since both of those values are common to the two arrays.\n\nHere's\
    \ one possible implementation:\n\n```\ndef intersection(first_array, second_array):\n\
    \    result = []\n\n    for i in first_array:\n        for j in second_array:\n\
    \            if i == j:\n                result.append(i)\n\n    return result\n\
    ```\n\nHere, we're running nested loops. In the outer loop, we iterate over each\
    \ value in the first array. As we point to each value in the first array, we then\
    \ run an inner loop that checks each value of the second array to see if it can\
    \ find a match with the value being pointed to in the first array.\n\nTwo types\
    \ of steps are taking place in this algorithm: comparisons and insertions. We\
    \ compare every value of the two arrays against each other, and we insert matching\
