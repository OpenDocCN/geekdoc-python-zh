    If we imagine our array of temperatures as a *hash table*, we can store each temperature
    as a key and the number of occurrences as the value. This would look something
    like this:


    {98: 1, 99: 3, 95: 1, 105: 1, 104: 1, 101: 2, 97:1}


    With this in mind, we can run a loop that runs from 95 up through 105 and *checks
    the hash table* for how many occurrences of that temperature there are. Each of
    these lookups take just O(1) time.


