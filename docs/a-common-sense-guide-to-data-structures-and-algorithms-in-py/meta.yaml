  md: "```\nfor value in smaller_array:\n    if not hash_table.get(value):\n     \
    \   return False\n\nreturn True\n```\n\nNow, how many steps did this algorithm\
    \ take? We iterated through each item of the *larger* array once to build the\
    \ hash table.\n\nAnd we iterated through each item of the *smaller* array, taking\
    \ just one step per item to look up the item in the hash table. Remember, a hash\
    \ table lookup takes just one step.\n\nIf we say that N is the total number of\
    \ items of both arrays combined, our algorithm is O(N), since we touched each\
    \ item just once. We spent one step on each item from the larger array, followed\
    \ by one step on each item from the smaller array.\n\nThat's a *huge* win over\
    \ our first algorithm, which was O(N * M).\n\nThis technique of using a hash table\
    \ as an “index” comes up frequently in algorithms that require multiple searches\
    \ within an array; that is, if your algorithm will need to keep searching for\
    \ values inside an array, each search would itself take up to N steps. By creating\
    \ a hash table “index” of the array, we reduce each search to only one step.\n\
    \nAs I pointed out, what makes this technique particularly interesting is that\
    \ when using a hash table as an “index,” we aren't even dealing with naturally\
    \ paired data. Instead, we just want to know whether the key itself is in the\
    \ hash table. When we use the key to perform a lookup in the hash table and receive\
    \ any value (no matter how arbitrary it is), it means the key must be present\
    \ in the hash table.\n\n# Wrapping Up\n\nHash tables are indispensable when it\
    \ comes to building efficient software. With their O(1) reads and insertions,\
    \ it's a difficult data structure to beat.\n\nUntil now, our analysis of various\
    \ data structures revolved around their efficiency and speed. But did you know\
    \ that some data structures provide advantages other than speed? In the next lesson,\
    \ we're going to explore two data structures that can help improve code elegance\
    \ and maintainability."
