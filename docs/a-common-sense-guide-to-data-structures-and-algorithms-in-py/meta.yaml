    \n事实上，优先队列将非常适合此用途，因为它的全部功能就是提供对集合中最小（或最大）值的即时访问。正如你在[第16章 使用堆保持优先级，第277页](https://example.com)中看到的，堆通常是实现优先队列的最佳数据结构。然而，我选择在此实现中仅使用一个简单的数组，以使代码尽可能简单和小巧，因为迪杰斯特拉算法本身已经足够复杂。但我鼓励你尝试用优先队列替换数组。\n\
