    \ anagrams.\n\nHere's a Python implementation of this:\n\n```python\ndef are_anagrams(first_string,\
    \ second_string):\n    second_string_array = list(second_string)\n\n    for i\
    \ in range(len(first_string)):\n        if len(second_string_array) == 0:\n  \
