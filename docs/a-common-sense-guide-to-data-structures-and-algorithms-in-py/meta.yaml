- img_proc: true
  md: '![](img/c0a46c67bb2536aa545ec1bd7065e742_227_0.png)


    is what happens in the average case—these two subarrays are of roughly equal sizes.


    How many times can we break an array into halves until we''ve broken it completely
    down to the point where each subarray is of size 1? For an array of size N, this
    will take us log N times. Take a look at the following diagram:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_227_1.png)


    As you can see, for an array of size 8, it takes us three halvings until we''ve
    reduced the array into eight individual elements. This is log N, and fits with
    our definition of log N as being the number of times it takes to halve something
    until we reach 1.'
