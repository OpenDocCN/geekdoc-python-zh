    \ city the key and the current city the value.\n4. We then visit whichever unvisited\
    \ city has the cheapest price from the starting city, making it the current city.\n\
    5. We repeat the Steps 2 through 4 until we've visited every known city.\n\nAgain,\
    \ this will all make more sense when we walk through an example.\n\n### Dijkstra's\
    \ Algorithm Walk-Through\n\nLet's walk through Dijkstra's algorithm step by step.\n\
    \nTo start, our `cheapest_prices_table` only contains Atlanta:\n\n**From Atlanta\
    \ To:**\n$0\n\nAt the start of the algorithm, Atlanta is the only city we have\
