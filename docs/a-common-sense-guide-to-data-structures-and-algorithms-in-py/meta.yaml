    \ calculate any number's counterpart by subtracting it from 10. Because 10 - 2\
    \ = 8, that means 8 is the 2's counterpart.\n\nWe now have all the ingredients\
    \ to create a really fast algorithm:\n\n```python\ndef two_sum(array):\n    hash_table\
    \ = {}\n\n    for value in array:\n        if hash_table.get(10 - value):\n  \
    \          return True\n        else:\n            hash_table[value] = True\n\n\
    \    return False\n```\n\nThis algorithm iterates once through each number in\
