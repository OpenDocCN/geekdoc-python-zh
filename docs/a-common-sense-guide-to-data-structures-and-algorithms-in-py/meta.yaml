    \ of their popularity. We can then choose to only display the most popular word\
    \ options.\n\n## Wrapping Up\n\nWe've now covered three types of trees: binary\
    \ search trees, heaps, and tries. There are *many* other types of trees as well,\
    \ such as AVL trees, red black trees (covered in Volume 2 of this book), 2-3-4\
