  md: '# Finding the Successor Node


    How does the computer find the successor node? This can be tricky when we delete
    a node high up in the tree.


    Here''s the algorithm for finding the successor node:


    +   - Visit the right child of the deleted value, and then keep on visiting the
    left child of each subsequent child until there are no more left children. The
    bottom value is the successor node.


    Let''s see this again in action in a more complex example. Let''s delete the root
    node:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_273_0.png)


    We now need to plug the successor node into where the 50 was and turn it into
    the root node. So let''s find the successor node.


    To do this, we first visit the *right* child of the deleted node, and then keep
    descending *leftward* until we reach a node that doesn''t have a left child:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_273_1.png)


    It turns out that the 52 is the successor node.'
