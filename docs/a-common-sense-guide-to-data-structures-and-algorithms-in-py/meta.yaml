- md: "## Wrapping Up\n\nCongratulations! You're now a Big O pro. You can analyze\
    \ all sorts of algorithms and categorize their time complexities. Armed with this\
    \ knowledge, you'll be able to methodically optimize your code for speed.\n\n\
    Speaking of which, in the next chapter, we'll discover a new data structure that\
    \ is one of the most useful and common tools for speeding up algorithms. And I'm\
    \ talking about some serious speed.\n\n## Exercises\n\nThe following exercises\
    \ provide you with the opportunity to practice with algorithms in practical situations.\
    \ The solutions to these exercises are found in the section [Chapter 7, on page\
    \ 440](#).\n\n1.  Use Big O notation to describe the time complexity of the following\
    \ function. The function returns `True` if the array is a 100-sum array, and `False`\
    \ if it is not.\n\n    A 100-sum array meets the following criteria:\n    - Its\
    \ first and last numbers add up to 100.\n    - Its second and second-to-last numbers\
    \ add up to 100.\n    - Its third and third-to-last numbers add up to 100, and\
    \ so on.\n\n    Here's the function:\n\n    ```\n    def one_hundred_sum(array):\n\
    \        if (len(array) % 2 != 0) or not array:\n            return False\n\n\
    \        left_index = 0\n        right_index = len(array) - 1\n\n        while\
    \ left_index < (len(array) // 2):\n            if array[left_index] + array[right_index]\
    \ != 100:\n                return False\n\n            left_index += 1\n     \
    \       right_index -= 1\n\n        return True\n    ```\n\n2.  Use Big O notation\
    \ to describe the time complexity of the following function. It merges two sorted\
    \ arrays to create a new sorted array containing all the values from both arrays:\n\
    \n    ```\n    def merge(array_1, array_2):\n        new_array = []\n        array_1_pointer\
    \ = 0\n        array_2_pointer = 0\n\n        # Run the loop until we've reached\
    \ end of both arrays:\n        while array_1_pointer < len(array_1) or array_2_pointer\
    \ < len(array_2):\n            # If we already reached the end of the first array,\n\
    \            # add item from second array:\n            if array_1_pointer >=\
    \ len(array_1):\n                new_array.append(array_2[array_2_pointer])\n\
    \                array_2_pointer += 1\n            # If we already reached the\
    \ end of the second array,\n            # add item from first array:\n       \
    \     elif array_2_pointer >= len(array_2):\n                new_array.append(array_1[array_1_pointer])\n\
    \                array_1_pointer += 1\n            # If the current number in\
    \ first array is less than current\n            # number in second array, add\
    \ from first array:\n            elif array_1[array_1_pointer] < array_2[array_2_pointer]:\n\
    \                new_array.append(array_1[array_1_pointer])\n                array_1_pointer\
    \ += 1\n            # If the current number in second array is less than or equal\n\
    \            # to current number in first array, add from second array:\n    \
    \        else:\n                new_array.append(array_2[array_2_pointer])\n \
    \               array_2_pointer += 1\n\n        return new_array\n    ```\n\n\
    3.  Use Big O notation to describe the time complexity of the following function.\
    \ This function solves a famous problem known as “finding a needle in the haystack.”\n\
    \n    Both the needle and haystack are strings. For example, if the needle is\
    \ \"def\" and the haystack is \"abcdefghi\", the needle is contained somewhere\
    \ in the haystack, as \"def\" is a substring of \"abcdefghi\". However, if the\
    \ needle is \"dd\", it cannot be found in the haystack of \"abcdefghi\".\n\n \
    \   This function returns True or False depending on whether the needle can be\
    \ found in the haystack:\n\n    ```\n    def find_needle(needle, haystack):\n\
    \        needle_start_index = 0\n\n        while needle_start_index <= len(haystack)\
    \ - len(needle):\n            if needle[0] == haystack[needle_start_index]:\n\
    \                needle_offset = 0\n\n                while needle_offset < len(needle):\n\
    \                    if (needle[needle_offset]\n                            !=\
    \ haystack[needle_start_index + needle_offset]):\n                        break\n\
    \                    else:\n                        if needle_offset == len(needle)\
    \ - 1:\n                            return True\n\n                    needle_offset\
    \ += 1\n\n            needle_start_index += 1\n\n        return False\n    ```\n\
    \n4.  Use Big O notation to describe the time complexity of the following function.\
    \ This function finds the greatest product of three numbers from a given array:\n\
    \n    ```\n    def largest_product(array):\n        if len(array) < 3:\n     \
    \       return None\n\n        largest_product_so_far = array[0] * array[1] *\
    \ array[2]\n        i = 0\n\n        while i < len(array):\n            j = i\
    \ + 1\n\n            while j < len(array):\n                k = j + 1\n\n    \
    \            while k < len(array):\n                    if array[i] * array[j]\
    \ * array[k] > largest_product_so_far:\n                        largest_product_so_far\
    \ = array[i] * array[j] * array[k]\n                    k += 1\n\n           \
    \     j += 1\n\n            i += 1\n\n        return largest_product_so_far\n\
    \    ```\n\n5.  I once saw a joke aimed at HR people: “Want to immediately eliminate\
    \ the unluckiest people from your hiring process? Just take half of the resumes\
    \ on your desk and throw them in the trash.”\n\n    If we were to write software\
    \ that kept reducing a pile of resumes until we had one left, it might take the\
    \ approach of alternating between throwing out the top half and the bottom half;\
    \ that is, it will first eliminate the top half of the pile, and then proceed\
    \ to eliminate the bottom half of what remains. It keeps alternating between eliminating\
    \ the top and bottom until one lucky resume remains, and that’s who we’ll hire!\n\
    \n    Describe the efficiency of this function in terms of Big O:\n\n    ```\n\
    \    def pick_resume(resumes):\n        if not resumes:\n            return None\n\
    \n        eliminate = \"top\"\n\n        while len(resumes) > 1:\n           \
    \ midpoint = len(resumes) // 2\n\n            if eliminate == \"top\":\n     \
    \           resumes = resumes[:midpoint]\n                eliminate = \"bottom\"\
    \n            elif eliminate == \"bottom\":\n                resumes = resumes[-midpoint:]\n\
    \                eliminate = \"top\"\n\n        return resumes[0]\n    ```\n\n\
    ## CHAPTER 8\n\n## Blazing Fast Lookup with Hash Tables\n\nImagine you're writing\
    \ a program that allows customers to order fast food from a restaurant, and you're\
    \ implementing a menu of foods with their respective prices. You could, technically,\
    \ use an array:\n\n```\nmenu = [\n    [\"french fries\", 0.75],\n    [\"hamburger\"\
    , 2.5],\n    [\"hot dog\", 1.5],\n    [\"soda\", 0.6]\n]\n```\n\nThis array contains\
    \ several subarrays, and each subarray contains two elements. The first element\
    \ is a string representing the food on the menu, and the second element represents\
    \ the price of that food.\n\nAs you learned in [Chapter 2. Why Algorithms Matter,\
    \ on page 21](https://example.com), if this array were unordered, searching for\
    \ the price of a given food would take O(N) steps since the computer would have\
    \ to perform a linear search. If it's an *ordered* array, the computer could do\
    \ a binary search, which would take O(log N).\n\nWhile O(log N) isn't bad, we\
    \ can do better. In fact, we can do *much* better. By the end of this chapter,\
    \ you'll learn how to use a special data structure called a *hash table*, which\
    \ can be used to look up data in just O(1) time. By knowing how hash tables work\
    \ under the hood and the right places to use them, you can leverage their tremendous\
    \ lookup speeds in many situations.\n\n## Hash Tables\n\nMost programming languages\
    \ include a data structure called a *hash table*, and it has an amazing superpower:\
    \ fast reading. Note that hash tables are called by different names in various\
    \ programming languages. In Python they're called *dictionaries*, and other languages\
    \ call them hashes, maps, hash maps, dictionaries, or associative arrays. We'll\
    \ refer to them as hash tables, since that's a common universal way to refer to\
    \ this data structure.\n\nHere's an example of the menu as implemented with a\
    \ hash table:\n\n```\nmenu = { \"french fries\": 0.75, \"hamburger\": 2.5,\n\"\
    hot dog\": 1.5, \"soda\": 0.6 }\n```\n\nA hash table is a list of paired values.\
    \ The first item in each pair is called the *key*, and the second item is called\
    \ the *value*. In a hash table, the key and value have some significant association\
    \ with one another. In this example, the string, “french fries” is the key, and\
    \ 0.75 is the value. They are paired together to indicate that french fries cost\
    \ 75 cents.\n\nIn Python, you can look up a key's value using this syntax:\n\n\
    ```\nmenu.get(\"french fries\")\n```\n\nThis would return the value 0.75.\n\n\
    Alternatively, you can look up a key's value this way:\n\n```\nmenu[\"french fries\"\
    ]\n```\n\nHowever, this latter approach triggers an error if the key doesn't exist\
    \ in the hash table. Therefore, we'll use the former approach, which simply returns\
    \ None if the key isn't found.\n\nLooking up a value in a hash table has an efficiency\
    \ of O(1) on average, as it usually takes *just one step*. Let's see why.\n\n\
    ## Hashing with Hash Functions\n\nDo you remember those secret codes you used\
    \ as a kid to create and decipher messages? For example, here's a simple way to\
    \ map letters to numbers:\n\n- A = 1\n- B = 2\n- C = 3\n- D = 4\n- E = 5\n\nand\
    \ so on. According to this code,\n\nACE converts to 135,\nCAB converts to 312.\n\
    DAB converts to 412,\nand"
