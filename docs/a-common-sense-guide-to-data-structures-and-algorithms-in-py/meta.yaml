    # The Efficiency of Insertion Sort


    Four types of steps occur in Insertion Sort: removals, comparisons, shifts, and
    insertions. To analyze the efficiency of Insertion Sort, we need to tally up each
    of these steps.


    First, let''s dig into comparisons. A comparison takes place each time we compare
    a value to the left of the gap with the temp_value. In a worst-case scenario,
    where the array is sorted in reverse order, we have to compare every number to
    the left of temp_value with temp_value in each pass-through. This is because each
    value to the left of temp_value will always be greater than temp_value, so the
    pass-through will only end when the gap reaches the left end of the array.


    During the first pass-through, in which temp_value is the value at index 1, a
    maximum of one comparison is made, since there''s only one value to the left of
    the temp_value. On the second pass-through, the maximum number of comparisons
    made is two, and so on. On the final pass-through, we need to compare the temp_value
    with every single value in the array besides temp_value itself. In other words,
    if there are N elements in the array, the maximum number of comparisons made in
    the final pass-through is N - 1.


    We can, therefore, formulate the total number of comparisons as:


    1 + 2 + 3 + ... + (N - 1) comparisons.


    In our example array that contains five elements, that''s a maximum of:


    1 + 2 + 3 + 4 = 10 comparisons.


    For an array containing 10 elements, there would be:


    1 + 2 + 3 + 4 + 5 + 6 + 7 + 8 + 9 = 45 comparisons.


    For an array containing 20 elements, there would be a total of 190 comparisons,
    and so on.


    When examining this pattern, it emerges that for an array containing N elements,
    there are approximately N² / 2 comparisons. (10² / 2 is 50, and 20² / 2 is 200.
    We''ll look at this pattern more closely in the next chapter.)'
  merge: -1
  pgno: 103
- img_proc: true
  md: 'Let''s continue analyzing the other types of steps.


    Shifts occur each time we move a value one cell to the right. When an array is
    sorted in reverse order, there will be as many shifts as there are comparisons
    since every comparison will force us to shift a value to the right.


    Let''s add up comparisons and shifts for a worst-case scenario:


    N² / 2 comparisons

    + N² / 2 shifts


    N² steps


    Removing and inserting the temp_value from the array happens once per pass-through.
    Since there are always N - 1 pass-throughs, we can conclude that there are N -
    1 removals and N - 1 insertions.


    So now we''ve got:

    N² comparisons and shifts combined

    N - 1 removals

    + N - 1 insertions


    N² + 2N - 2 steps


    You''ve already learned one major rule of Big O: that Big O ignores constants.
    With this rule in mind, we''d—at first glance—simplify this to O(N² + N).


    However, I''ll now reveal another major rule of Big O:


    > Big O notation only takes into account the highest order of N when we have multiple
    orders added together.


    In other words, if we have an algorithm that takes N⁴ + N³ + N² + N steps, we
    only consider N⁴ to be significant—and just call it O(N⁴). Why is this?


    Look at the following table:


    | N | N² | N³ | N⁴ |

    |---|---|---|---|

    | 2 | 4 | 8 | 16 |

    | 5 | 25 | 125 | 625 |

    | 10 | 100 | 1,000 | 10,000 |

    | 100 | 10,000 | 1,000,000 | 100,000,000 |'
  merge: -1
  pgno: 104
- img_proc: true
  md: 'As N increases, N⁴ becomes so much more significant than any other order of
    N that the smaller orders are considered trivial. For example, when looking at
    the bottom row of the table, when we add N⁴ + N³ + N² + N, we get a total of 101,010,100.
    But we may as well round that down to 100,000,000, which is accomplished by ignoring
    those lower orders of N.


    We can apply this same concept to Insertion Sort. Even though we''ve already simplified
    Insertion Sort down to N² + N steps, we simplify the expression further by throwing
    out the lower order, reducing it to O(N²).


    It emerges that in a worst-case scenario, Insertion Sort has the same time complexity
    as Bubble Sort and Selection Sort. They''re all O(N²).


    I noted in the previous chapter that although Bubble Sort and Selection Sort are
    both O(N²), Selection Sort is faster because Selection Sort has N² / 2 steps compared
    with Bubble Sort''s N² steps. At first glance, then, we''d say that Insertion
    Sort is as slow as Bubble Sort, since it too takes about N² steps.


    If I stop the book here, you''d walk away thinking that Selection Sort is the
    best choice out of the three, since it''s twice as fast as either Bubble Sort
    or Insertion Sort. But it''s actually not that simple.


    # The Average Case


    Indeed, in a worst-case scenario, Selection Sort *is* faster than Insertion Sort.
    However, it''s critical we also take into account the *average-case scenario*.


    Why?


    By definition, the cases that occur most frequently are average scenarios. Take
    a look at this simple bell curve:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_105_0.png)


    Best- and worst-case scenarios happen relatively infrequently. In the real world,
    average scenarios are what occur most of the time.'
  merge: -1
  pgno: 105
- img_proc: true
  md: 'Take a randomly sorted array, for example. What are the odds that the values
    will occur in perfect ascending or descending order? It’s much more likely that
    the values will be all over the place.


    Let’s examine Insertion Sort, then, in the context of all scenarios.


    We’ve looked at how Insertion Sort performs in a worst-case scenario—where the
    array is sorted in descending order. In the worst case, we saw that in each pass-through,
    we compare and shift every value we encounter. (We calculated this to be a total
    of N² comparisons and shifts.)


    In the best-case scenario, where the data is already sorted in ascending order,
    we end up making just one comparison per pass-through and not a single shift,
    since each value is already in its correct place.


    Where data is randomly sorted, however, we’ll have pass-throughs in which we compare
    and shift all of the data, some of the data, or possibly none of the data. If
    you look at the preceding walk-through example in [Insertion Sort in Action, on
    page 80](https://example.com), you’ll notice that in the first and third pass-throughs,
    we compare and shift all the data we encounter. In the fourth pass-through, we
    compare and shift just some of it, and in the second pass-through, we make just
    one comparison and shift no data at all.


    > (This variance occurs because some pass-throughs compare all the data to the
    left of the temp_value, while other pass-throughs end early, due to encountering
    a value that is less than the temp_value.)


    So in the worst-case scenario, we compare and shift *all* the data, and in the
    best-case scenario, we shift *none* of the data (and just make one comparison
    per pass-through). For the average scenario, we can say that in the aggregate,
    we probably compare and shift about *half* the data. Thus, if Insertion Sort takes
    N² steps for the worst-case scenario, we’d say that it takes about N² / 2 steps
    for the average scenario. (In terms of Big O, however, both scenarios are O(N²).)


    Let’s dive into some specific examples.


    The array [1, 2, 3, 4] is already presorted, which is the best case. The worst
    case for the same data would be [4, 3, 2, 1], and an example of an average case
    might be [1, 3, 4, 2].


    In the worst case ([4, 3, 2, 1]), there are six comparisons and six shifts, for
    a total of twelve steps. In an average case of [1, 3, 4, 2], there are four comparisons
    and two shifts, for a total of six steps. In the best case ([1, 2, 3, 4]), there
    are three comparisons and zero shifts.'
