  md: "# In-Place Modifications\n\nLet's take a look at the concept of *in-place*\
    \ modifications, just in case it's not clear.\n\nGenerally speaking, there are\
    \ two basic approaches to manipulating data. Let's take the example of doubling\
    \ the values in an array. If I had the array [1, 2, 3, 4, 5] and wanted to “double”\
    \ it to produce the array [2, 4, 6, 8, 10]. I could do one of two things.\n\n\
    The first option is to create a new array that contains the doubled data but leave\
    \ the original array alone. Take the following code:\n\n```\na = [1, 2, 3, 4,\
    \ 5]\nb = double_array(a)\n```\n\nSince the double_array function is creating\
    \ and returning a brand-new array, if we were to check the values of a and b,\
    \ we'd get the following:\n\n```\na # [1, 2, 3, 4, 5]\nb # [2, 4, 6, 8, 10]\n\
    ```\n\nThe original array a was unmodified, and b holds a brand-new array.\n\n\
    The second option is called *in-place* modification, meaning the function actually\
    \ changes the *original array* passed into function.\n\nWith in-place modification,\
    \ if we now check a and b, we'd find this:\n\n```\na # [2, 4, 6, 8, 10]\nb # [2,\
    \ 4, 6, 8, 10]\n```\n\nThe in-place function modifies a, and b is just pointing\
    \ to the very same array that a is.\n\nWhether we choose to create a new array\
    \ or modify the original one in place is up to us and depends on the context of\
    \ our project. We're going to talk more about in-place algorithms in [Dealing\
    \ with Space Constraints](Dealing with Space Constraints).\n\nNext, we need to\
    \ add the code that will actually double the number. But which number will we\
    \ double? Let's try to double the first number:\n\n```\ndef double_array(array):\n\
    \    array[0] *= 2\n    double_array(array)\n```\n\nOkay, so we've doubled the\
    \ number at index 0, but how do we proceed to double the number at index 1?\n\n\
    Now, if we were to use a loop instead of recursion, we would have used a variable\
    \ to keep track of the index and continuously increased it by 1, something along\
    \ these lines:"
