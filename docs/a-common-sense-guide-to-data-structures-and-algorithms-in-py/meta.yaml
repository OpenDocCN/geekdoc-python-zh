  md: '# From Objects to Functions


    Build applications quicker and with less effort using functional programming and
    Kotlin. Learn by building a complete application, from gathering requirements
    to delivering a microservice architecture following functional programming principles.
    Learn how to implement CQRS and EventSourcing in a functional way to map the domain
    into code better and to keep the cost of change low for the whole application
    life cycle.


    If you''re curious about functional programming or you are struggling with how
    to put it into practice, this guide will help you increase your productivity composing
    small functions together instead of creating fat objects.


    Uberto Barbini

    (468 pages) ISBN: 9781680508451. $47.95

    https://pragprog.com/book/uboop


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_484_0.png)


    # Effective Haskell


    Put the power of Haskell to work in your programs, learning from an engineer who
    uses Haskell daily to get practical work done efficiently. Leverage powerful features
    like Monad Transformers and Type Families to build useful applications. Realize
    the benefits of a pure functional language, like protecting your code from side
    effects. Manage concurrent processes fearlessly. Apply functional techniques to
    working with databases and building RESTful services. Don''t get bogged down in
    theory, but learn to employ advanced programming concepts to solve real-world
    problems. Don''t just learn the syntax, but dive deeply into Haskell as you build
    efficient, well-tested programs.


    Rebecca Skinner

    (668 pages) ISBN: 9781680509342. $57.95

    https://pragprog.com/book/rshaskell


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_484_1.png)'
  merge: -1
  pgno: 484
- img_proc: true
  md: '# Functional Programming in Java, Second Edition


    Imagine writing Java code that reads like the problem statement, code that’s highly
    expressive, concise, easy to read and modify, and has reduced complexity. With
    the functional programming capabilities in Java, that’s not a fantasy. This book
    will guide you from the familiar imperative style through the practical aspects
    of functional programming, using plenty of examples. Apply the techniques you
    learn to turn highly complex imperative code into elegant and easy-to-understand
    functional-style code. Updated to the latest version of Java, this edition has
    four new chapters on error handling, refactoring to functional style, transforming
    data, and idioms of functional programming.


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_485_0.png)


    Venkat Subramaniam

    (274 pages) ISBN: 9781680509793. $53.95

    https://pragprog.com/book/vsjava2e


    # Programming Kotlin


    Programmers don’t just use Kotlin, they love it. Even Google has adopted it as
    a first-class language for Android development. With Kotlin, you can intermix
    imperative, functional, and object-oriented styles of programming and benefit
    from the approach that’s most suitable for the problem at hand. Learn to use the
    many features of this highly concise, fluent, elegant, and expressive statically
    typed language with easy-to-understand examples. Learn to write maintainable,
    high-performing JVM and Android applications, create DSLs, program asynchronously,
    and much more.


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_485_1.png)


    Venkat Subramaniam

    (460 pages) ISBN: 9781680506358. $51.95

    https://pragprog.com/book/vskotlin'
