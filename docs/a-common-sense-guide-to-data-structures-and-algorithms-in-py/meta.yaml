  md: "If we first store the numbers from one array in a hash table, we can then immediately\
    \ find any number from it in O(1) time as we iterate through the other array.\n\
    \nHere's the complete code:\n\n```\ndef sum_swap(array_1, array_2):\n    hash_table\
    \ = {}\n    sum_1 = 0\n    sum_2 = 0\n\n    for index, num in enumerate(array_1):\n\
    \        sum_1 += num\n        hash_table[num] = index\n\n    for num in array_2:\n\
    \        sum_2 += num\n\n    # If the input consists of integers and the difference\n\
    \    # between the two sums are odd, it's impossible to find\n    # an integer\
    \ smack in the middle, so no swap is possible:\n    if (sum_1 - sum_2) % 2 ==\
    \ 1:\n        return None\n\n    shift_amount = (sum_1 - sum_2) // 2\n\n    for\
    \ index, num in enumerate(array_2):\n        if num + shift_amount in hash_table:\n\
    \            return [hash_table[num + shift_amount], index]\n\n    return None\n\
    ```\n\nThis approach is much faster than our original O(N * M) one. If we consider\
    \ array_1 to be N and array_2 to be M, we could say that this algorithm runs in\
    \ O(N + M) time. While we do iterate over array_2 twice and it is technically\
    \ 2M, it becomes M since we drop the constants.\n\nThis approach takes up an extra\
    \ O(N) space since we copy all N numbers from array_1 into the hash table. Again,\
    \ we're sacrificing space to gain time, but this is a big win if speed is our\
    \ primary concern.\n\nIn any case, this is another example of where discovering\
    \ patterns allows us to cut to the heart of the problem and develop a simple and\
    \ fast solution.\n\n# Greedy Algorithms\n\nThis next tactic can speed up some\
    \ of the most stubborn algorithms. It doesn't work in every situation, but when\
    \ it does, it can be a game changer.\n\nLet's talk about writing greedy algorithms."
