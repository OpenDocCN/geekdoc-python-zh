  md: "Note how O(N²) curves sharply upward in terms of number of steps as the data\
    \ grows. Compare this with O(N), which plots along a simple, diagonal line.\n\
    One last note: O(N²) is also referred to as *quadratic time*.\n\n# A Quadratic\
    \ Problem\n\nHere's a practical example of where we can replace a slow O(N²) algorithm\
    \ with a speedy O(N) one.\n\nLet's say you're working on a Python application\
    \ that analyzes the ratings people give to products, where users leave ratings\
    \ from 0 to 10. Specifically, you're writing a function that checks whether an\
    \ array of ratings contains any duplicate numbers. This will be used in more complex\
    \ calculations in other parts of the software.\n\nFor example, the array [1, 5,\
    \ 3, 9, 1, 4] has two instances of the number 1, so we'd return True to indicate\
    \ that the array has a case of duplicate numbers.\nOne of the first approaches\
    \ that may come to mind is the use of nested loops, as follows:\n\n```\ndef has_duplicate_value(array):\n\
    \    for i in range(len(array)):\n        for j in range(len(array)):\n      \
    \      if (i != j) and (array[i] == array[j]):\n                return True\n\
    \    return False\n```\n\nIn this function, we iterate through each value of the\
    \ array using the variable i. As we focus on each value in i, we then run a *second*\
    \ loop that looks through all the values in the array—using j—and checks if the\
    \ values at positions i and j are the same. If they are, it means we've encountered\
    \ duplicate values and we return True. If we get through all of the looping and\
    \ we haven't encountered any duplicates, we return false, since we know that there\
    \ are no duplicates in the array.\n\nWhile this certainly works, is it efficient?\
    \ Now that we know a bit about Big O notation, let's take a step back and see\
    \ what Big O would say about this function.\n\nRemember that Big O expresses how\
    \ many steps the algorithm takes relative to N data values. To apply this to our\
    \ situation, we'd ask ourselves: for N values in the array provided to our has_duplicate_value\
    \ function, how many steps would our algorithm take in a worst-case scenario?"
