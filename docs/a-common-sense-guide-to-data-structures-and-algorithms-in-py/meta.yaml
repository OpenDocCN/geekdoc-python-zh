    \n这些只是众多可能路径中的三种。\n\n让我们首先用自底向上的方法来探索这个问题。也就是说，我们将从最简单的情况逐步处理到更复杂的情况。\n\n显然，如果只有一级台阶，只有一种可能的路径。\n\
    \n有两级台阶时，有两种路径。这个人可以爬两次一级台阶，或者一次跳两级台阶。我会这样写：\n\n```\n1, 1\n2\n```\n\n有三级台阶时，一个人可以选择四种可能的路径之一：\n\
    \n```\n1, 1, 1\n1, 2\n2, 1\n3\n```\n\n有四级台阶时，有七种选择：\n\n```\n1, 1, 1, 1\n1, 1,\
