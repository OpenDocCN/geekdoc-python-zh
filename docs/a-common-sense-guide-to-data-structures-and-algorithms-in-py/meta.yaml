  md: 'containing the two indexes. So, in this case, we swapped index 2 of array_1
    with index 0 of array_2, so we''ll return an array of [2, 0]. In a case where
    there''s no possible swap that makes the two arrays equal, we''ll return None.


    One way we can write this algorithm is to use nested loops; that is, as our outer
