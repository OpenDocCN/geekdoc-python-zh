- md: "## Chapter 16\n\nThese are the solutions to the exercises found in the section\
    \ [Exercises, on page 300](page300).\n\n1. After inserting an 11, the heap would\
    \ look like this:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_459_1.png)\n\n2.\
    \ After deleting the root node, the heap would look like this:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_459_2.png)\n\
    \n3. The numbers would be in perfect descending order. (This is for a max-heap.\
    \ For a min-heap, they'd be in *ascending* order.)\n\nDo you realize what this\
    \ means? It means you've just discovered another sorting algorithm!\n\n*Heapsort*\
    \ is a sorting algorithm that inserts all the values into a heap and then pops\
    \ each one. As you can see from this exercise, the values always end up in sorted\
    \ order.\n\nLike Quicksort, Heapsort is O(N log N). This is because we need to\
    \ insert N values into the heap, and each insertion takes log N steps.\n\nWhile\
    \ there are fancier versions of Heapsort that try to maximize its efficiency,\
    \ this is the basic idea.\n\n## Chapter 17\n\nThese are the solutions to the exercises\
    \ found in the section [Exercises, on page 326](#).\n\n1. This trie stores the\
    \ words: “tag”, “tan”, “tank”, “tap”, “today”, “total”, “we”, “well”, and “went”.\n\
    2. Here is a trie that stores the words “get”, “go”, “got”, “gotten”, “hall”,\
    \ “ham”, “hammer”, “hill”, and “zebra”:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_460_0.png)\n\
    \n3. The following code starts at the trie's node and iterates over each of its\
    \ children. For each child, it prints the key and then recursively calls itself\
    \ on the child node:\n\n```python\ndef traverse(self, node=None):\n    current_node\
    \ = node or self.root\n\n    for key, child_node in current_node.children.items():\n\
    \        print(key)\n\n        if key != \"*\":\n            self.traverse(child_node)\n\
    ```\n\n4. Our autocorrect implementation is a combination of the search and collect_all_words\
    \ functions:\n\n```python\ndef autocorrect(self, word):\n    current_node = self.root\n\
    \    word_found_so_far = \"\"\n\n    for char in word:\n        if current_node.children.get(char):\n\
    \            word_found_so_far += char\n            current_node = current_node.children.get(char)\n\
    \        else:\n            return word_found_so_far + \\\n                self.collect_all_words([],\
    \ current_node)[0]\n\n    return word\n```\n\nThe basic approach is that we first\
    \ search the trie to find as much of the prefix as we can. When we hit a dead\
    \ end, instead of just returning None (as the search function does), we call collect_all_words\
    \ on the current node to collect all the suffixes that stem from that node. We\
    \ then use the first suffix of the array and concatenate it with the prefix to\
    \ suggest a new word to the user.\n\n## Chapter 18\n\nThese are the solutions\
    \ to the exercises found in the section [Exercises, on page 381](https://example.com).\n\
    \n1. If a user is browsing “nails”, the website will recommend “nail polish”,\
    \ “needles”, “pins”, and “hammer”.\n2. The order of depth-first search would be\
    \ A-B-E-J-F-O-C-G-K-D-H-L-M-I-N-P, as seen in the following image:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_461_0.png)\n\
    \n3. The order of breadth-first search would be A-B-C-D-E-F-G-H-I-J-K-L-M-N-O-P,\
    \ as seen in the following image:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_462_0.png)\n\
    \n4. Following is an implementation of breadth-first search:\n\n```python\nimport\
    \ queue_implementation\n\ndef bfs(starting_vertex, search_value):\n    queue =\
    \ queue_implementation.Queue()\n    visited_vertices = {}\n    visited_vertices[starting_vertex.value]\
    \ = True\n    queue.enqueue(starting_vertex)\n\n    while queue.read():\n    \
    \    current_vertex = queue.dequeue()\n        if current_vertex.value == search_value:\n\
    \            return current_vertex\n\n        for adjacent_vertex in current_vertex.adjacent_vertices:\n\
    \            if not visited_vertices.get(adjacent_vertex.value):\n           \
    \     visited_vertices[adjacent_vertex.value] = True\n                queue.enqueue(adjacent_vertex)\n\
