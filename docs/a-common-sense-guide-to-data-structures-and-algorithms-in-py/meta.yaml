  md: '# CHAPTER 16


    # Keeping Your Priorities Straight with Heaps


    Now that we''ve discovered the tree, we''ve unlocked many new data structures.
    In the previous chapter, we focused specifically on the binary search tree, but
    there are many other types of trees as well. Like all data structures, each type
    of tree comes with its own benefits and drawbacks, and the trick is knowing which
    one to harness in a specific situation.


    In this chapter, we''ll explore the heap, a type of tree data structure that has
    special powers that can be leveraged for specific scenarios, in particular when
    we want to constantly keep tabs on the greatest or least data element in a dataset.


    To appreciate what a heap can do, let''s take a look at a completely different
    data structure: the priority queue.


    # Priority Queues


    You learned about [Queues, on page 143](#), and discovered that the queue is a
    list in which items are processed first in, first out (FIFO). Essentially, this
    means that data is inserted only at the *end* of the queue, and data is accessed
    and removed only from the *front* of the queue. In accessing the queue''s data,
    we give precedence to the order in which the data was inserted.


    A *priority queue* is a list whose deletions and access are just like a classic
    queue but whose insertions are like an ordered array. So we only delete and access
    data from the *front* of the priority queue, but when we insert data, we always
    make sure the data remains sorted in a specific order.


    One classic example of where a priority queue is helpful is an application that
    manages the triage system for a hospital emergency room. In the ER, we don''t
    treat people strictly in the order in which they arrived. Instead, we treat people
    in the order of the severity of their symptoms. If someone suddenly arrives'
  merge: -1
  pgno: 287
- img_proc: true
  md: 'with a life-threatening injury, that patient will be placed at the front of
    the queue, even if the person with the flu had arrived hours earlier.


    Let''s say our triage system ranked the severity of a patient''s condition on
    a scale of 1 to 10, with 10 being the most critical. Our priority queue may look
    like this:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_288_0.png)


    In determining the next patient to treat, we''ll always select the patient at
    the front of the priority queue, since that person''s need is the most urgent.
    In this case, the next patient we''d treat is Patient C.


    If a new patient now arrives with a condition severity of 3, we''ll initially
    place this patient at the appropriate spot within the priority queue. We''ll call
    this person Patient E:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_288_1.png)


    The priority queue is an example of an abstract data type—one that can be implemented
    using other, more fundamental, data structures. One straightforward way we can
    implement a priority queue is by using an ordered array; that is, we use an array
    and apply the following constraints:


    +   - When we insert data, we ensure we always maintain proper order.

    - Data can only be removed from the end of the array. (This will represent the
    front of the priority queue.)


    This approach is straightforward, but now let''s analyze its efficiency.


    The priority queue has two primary operations: deletions and insertions.


    We saw in [Chapter 1, Why Data Structures Matter, on page 1](#), that deleting
    from the front of an array is O(N), since we have to shift all the data over to
    fill the gap created at index 0. However, we''ve cleverly tweaked our implementation
    so that we consider the *end* of the array to be the *front* of the priority queue.
    This way, we''re always deleting from the end of the array, which is O(1).'
  merge: -1
  pgno: 288
- img_proc: true
  md: 'With O(1) deletions, our priority queue is in good shape so far. But what about
    insertions?


    You learned that inserting into an ordered array is O(N), since we have to inspect
    up to all N elements of the array to determine where our new data should go. (And
    even if we find the correct spot early, we need to then shift all the remaining
    data over to the right.)


    Our array-based priority queue, then, has deletions that are O(1) and insertions
    that are O(N). If we expect there to be many items in our priority queue, the
    O(N) insertions may cause some real unwanted drag in our application.


    Because of this, computer scientists discovered another data structure that serves
    as a more efficient foundation for the priority queue. This data structure is
    the heap.


    # Heaps


    Heaps are of several different types, but we''re going to focus on the *binary
    heap*.


    The binary heap is a specific kind of binary tree. As a reminder, a binary tree
    is a tree where each node has a maximum of two child nodes. (The binary *search*
    tree from the last chapter was one specific type of binary tree.)


    Now, even binary heaps come in two flavors: the max-heap and the min-heap. We''re
    *going* to work with the max-heap for now, but as you''ll see later, the difference
    between the two is trivial.


    Going forward, I''m going to refer to this data structure simply as a heap, even
    though we''re specifically working with a binary max-heap.


    The *heap* is a binary tree that maintains the following conditions:


    +   - The value of each node must be greater than each of its descendant nodes.
    This rule is known as the *heap condition*.

    - The tree must be *complete*. (I''ll explain the meaning of this shortly.)


    Let''s break down both of these conditions, starting with the heap condition.


    # The Heap Condition


    The *heap condition* says that each node''s value must be greater than each and
    every one of its descendants.


    For example, the following tree meets the heap condition since each node is greater
    than any of its descendants, as shown in the [diagram on page 280](diagram on
    page 280).'
  merge: -1
  pgno: 289
- img_proc: true
  md: '![](img/c0a46c67bb2536aa545ec1bd7065e742_290_0.png)


    In this example, the root node of 100 has no descendant that is greater than it.
    Similarly, the 88 is greater than both of its children, and so is the 25.


    The following tree isn''t a valid heap, because it doesn''t meet the heap condition:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_290_1.png)


    As you can see, the 92 is greater than its parent of 88. This violates the heap
    condition.


    Note how the heap is structured very differently than the binary search tree.
    In a binary search tree, each node''s right child is greater than it. In a heap,
    however, a node *never* has any descendant that is greater than it. As they say,
    “A binary search tree doth not a heap make.” (Or something like that.)


    We can also construct a heap that has the opposite heap condition, which is each
    node must contain a *smaller* value than any of its descendants. Such a heap is
    known as the min-heap, which I mentioned earlier. We''re going to continue to
    focus on the max-heap, where each node must be *greater* than all of its descendants.
    Ultimately, whether a heap is a max-heap or a min-heap is trivial, as everything
    else about both heaps is identical; they only have reversed heap conditions. Otherwise,
    the fundamental idea is the same.


    # Complete Trees


    Now, let''s get to the second rule of heaps—that the tree needs to be complete.


    A *complete tree* is a tree that is completely filled with nodes; no nodes are
    missing. So if you read each level of the tree from left to right, all of the
    nodes are there. However, the bottom row *can* have empty positions, as long as
    there'
