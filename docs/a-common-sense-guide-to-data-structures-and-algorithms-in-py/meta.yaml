- img_proc: true
  md: 'Now, log₂ 8 is the converse. It means: how many times do you have to multiply
    2 by itself to get a result of 8?


    Because you have to multiply 2 by itself 3 times to get 8, log₂ 8 = 3.


    Here''s another example:


    2⁶ translates to:


    2 * 2 * 2 * 2 * 2 * 2 = 64


    Because we had to multiply 2 by itself six times to get 64, we have, therefore:


    log₂ 64 = 6.


    While the preceding explanation is the “textbook” definition of logarithms, I
    like to use an alternative way of describing the same concept because many people
    find that they can wrap their heads around it more easily, especially when it
    comes to Big O notation.


    Another way of explaining log₂ 8 is this: if we kept *dividing* 8 by 2 until we
    ended up with 1, how many 2s would we have in our equation?


    8 / 2 / 2 / 2 = 1


    In other words, how many times do we need to halve 8 until we end up with 1? In
    this example, it takes us three times. Therefore,


    log₂ 8 = 3.


    Similarly, we could explain log₂ 64 as: how many times do we need to halve 64
    until we end up with 1?


    64 / 2 / 2 / 2 / 2 / 2 / 2 = 1


    Since there are six 2s, log₂ 64 = 6.


    Now that you understand what logarithms are, the meaning behind O(log N) will
    become clear.


    # O(log N) Explained


    Let''s bring this all back to Big O notation. In computer science, whenever we
    say O(log N), it''s actually shorthand for saying O(log₂ N). We just omit that
    small 2 for convenience.


    Recall that Big O notation resolves the key question: if there are N data elements,
    how many steps will the algorithm take?'
