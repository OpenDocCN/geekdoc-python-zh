  - '[PAGE 161]


    use of a queue for such an application is very real and serves as the foundation
    for building such a system.


    Queues are also the perfect tool for handling asynchronous requests—they ensure
    that the requests are processed in the order in which they were received. They’re
    also commonly used to model real-world scenarios where events need to occur in
    a certain order, such as airplanes waiting for takeoff and patients waiting for
    their doctor.


    # Wrapping Up


    As you’ve seen, stacks and queues are programmers’ tools for elegantly handling
    all sorts of practical algorithms.


    Now that you’ve learned about stacks and queues, you’ve unlocked a new achievement:
    you can learn about recursion, which depends upon a stack. Recursion also serves
    as the foundation for many of the more advanced and super-efficient algorithms
    that I’ll cover in the rest of this book.


    # Exercises


    The following exercises provide you with the opportunity to practice with stacks
    and queues. The solutions to these exercises are found in the section [Chapter
    9, on page 442](Chapter 9, on page 442).


    +   1. If you were writing software for a call center that places callers on hold
    and then assigns them to “the next available representative,” would you use a
    stack or a queue?

    2. If you pushed numbers onto a stack in the following order: 1, 2, 3, 4, 5, 6,
    and then popped two items, which number would you be able to read from the stack?

    3. If you inserted numbers into a queue in the following order: 1, 2, 3, 4, 5,
    6, and then dequeued two items, which number would you be able to read from the
    queue?

    4. Write a function that uses a stack to reverse a string. (For example, "abcde"
    would become "edcba".) You can work with our earlier implementation of the Stack
    class.'
- md: "## CHAPTER 10\n\n## Recursively Recurse with Recursion\n\nRecursion is a key\
    \ concept in computer science that will unlock the more advanced algorithms we're\
    \ going to encounter in this book. When used correctly, recursion can be used\
    \ to solve certain types of tricky problems in surprisingly simple ways. Sometimes,\
    \ it even seems like magic.\n\nBut before we dive in, a pop quiz!\n\nWhat happens\
    \ when the blah() function defined here is called?\n\n```\ndef blah():\n    blah()\n\
    ```\n\nAs you probably guessed, it will call itself infinitely, since blah() calls\
    \ itself, which in turn calls itself, and so on.\n\nRecursion is the term for\
    \ a function calling itself. Indeed, infinite recursion, as in the above example,\
    \ is utterly useless. When harnessed correctly, though, recursion can be a powerful\
    \ tool.\n\n## Recurse Instead of Loop\n\nLet's say you work at NASA and need to\
    \ program a countdown function for launching spacecraft. The particular function\
    \ that you're asked to write should accept a number—such as 10—and display the\
    \ numbers from 10 down to 0.\n\nTake a moment and implement this function yourself.\
    \ When you're done, read on.\n\nOdds are that you wrote a simple loop, along the\
    \ lines of this implementation:\n\n```\ndef countdown(number):\n    while number\
    \ >= 0:\n        print(number)\n        number -= 1\n```\n\nNothing is wrong with\
    \ this implementation, but it may have never occurred to you that you don't *have*\
    \ to use a loop.\n\nHow?\n\nLet's try recursion instead. Here's a first attempt\
    \ at using recursion to implement our countdown function:\n\n```\ndef countdown(number):\n\
    \    print(number)\n    countdown(number - 1)\n```\n\nLet's walk through this\
    \ code step by step.\n\nStep 1: We call countdown(10), so the argument variable\
    \ number starts out as 10.\n\nStep 2: We print number (which contains the value\
    \ 10) to the console.\n\nStep 3: Before the countdown function is complete, it\
    \ calls countdown(9), since number - 1 is 9.\n\nStep 4: countdown(9) begins running.\
    \ In it, we print number (which is currently 9) to the console.\n\nStep 5: Before\
    \ countdown(9) is complete, it calls countdown(8).\n\nStep 6: countdown(8) begins\
    \ running. We print 8 to the console.\n\nBefore we continue stepping through the\
    \ code, note how we're using recursion to achieve our goal. We're not using any\
    \ loop constructs, but by simply having the countdown function call itself, we're\
    \ able to count down from 10 and print each number to the console.\n\nIn almost\
    \ any case in which you can use a loop, you can also use recursion. Now, just\
    \ because you *can* use recursion doesn't mean that you *should* use recursion.\
    \ Recursion is a tool that allows for writing elegant code. In the preceding example,\
    \ the recursive approach isn't necessarily any more beautiful or efficient than\
    \ using a classic loop. However, we'll soon encounter examples in which recursion\
    \ shines. In the meantime, let's continue exploring how recursion works.\n\n##\
    \ The Base Case\n\nLet's continue our walk-through of the countdown function.\
    \ We'll skip a few steps for brevity...\n\nStep 21: We call countdown(0).\n\n\
    Step 22: We print number (that is, 0) to the console.\nStep 23: We call countdown(-1).\n\
    Step 24: We print number (that is, -1) to the console.\n\nUh-oh. As you can see,\
    \ our solution isn't perfect, as we'll end up infinitely printing negative numbers.\n\
    \nTo perfect our solution, we need a way to end our countdown at 0 and prevent\
    \ the recursion from continuing on forever.\n\nWe can solve this problem by adding\
    \ a conditional statement that ensures that if number is currently 0, we don't\
    \ call countdown() again:\n\n```\ndef countdown(number):\n    print(number)\n\
    \    if number == 0:\n        return\n    else:\n        countdown(number - 1)\n\
    ```\n\nNow when number is 0, our code will not call the countdown() function again\
    \ but instead just return, thereby preventing another call of countdown().\n\n\
    In recursion terminology, the case in which our function will *not* recurse is\
    \ known as the *base case*. So 0 is the base case for our countdown() function.\
    \ Again, every recursive function needs at least one base case to prevent it from\
    \ calling itself indefinitely.\n\n## Reading Recursive Code\n\nIt takes time and\
    \ practice to get used to recursion, and you'll ultimately learn *two* sets of\
    \ skills: *reading* recursive code and *writing* recursive code. Reading recursive\
    \ code is somewhat easier, so let's get some practice with that first.\n\nWe'll\
    \ do this by looking at another example: calculating factorials.\n\nA *factorial*\
    \ is best illustrated with some examples.\n\nThe factorial of 3 is:\n3 * 2 * 1\
    \ = 6\n\nThe factorial of 5 is:\n5 * 4 * 3 * 2 * 1 = 120\n\nAnd so on and so forth.\n\
    \nHere's a recursive implementation that returns a number's factorial:\n\n```\n\
    def factorial(number):\n    if number <= 1:\n        return 1\n    else:\n   \
    \     return number * factorial(number - 1)\n```\n\nThis code can look somewhat\
    \ confusing at first glance. To walk through the code to see what it does, here's\
    \ the process I recommend:\n\n1. Identify the base case.\n2. Walk through the\
    \ function for the base case.\n3. Identify the next-to-last case. This is the\
    \ case just before the base case, as I'll demonstrate momentarily.\n4. Walk through\
    \ the function for the next-to-last case.\n5. Repeat this process by identifying\
    \ the case before the one you just analyzed and walking though the function for\
    \ that case.\n\nLet's apply this process to the preceding code. If we analyze\
    \ the code, we'll quickly notice that there are two paths. One path is where number\
    \ is less than or equal to 1, and the other path is where number is greater than\
    \ 1:\n\n```\nif number <= 1:  # Path 1\n    ...\nelse:  # Path 2: number is greater\
    \ than 1\n    ...\n```\n\nWe can see that the recursion happens inside the else\
    \ path, since factorial calls itself:\n\n```\nelse:\n    return number * factorial(number\
    \ - 1)\n```\n\nSo it must be that the base case is the first path, since it's\
    \ the path where no recursion is taking place:\n\n```\nif number <= 1:\n    return\
    \ 1\n```\n\nWe can conclude, then, that the base case is when number is less than\
    \ or equal to 1.\n\nNext, let's walk through the factorial method assuming it's\
    \ dealing with a base case, such as factorial(1). Again, the relevant code from\
    \ our method is the following:\n\n```\nif number <= 1:\n    return 1\n```\n\n\
    Well, that's pretty simple—it's the base case, so no recursion actually happens.\
    \ If we call factorial(1), the method simply returns 1. Okay, so grab a napkin\
    \ and write this fact down:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_166_0.png)\n\
    \nNext, let's move up to the next case, which would be factorial(2). The relevant\
    \ line of code from our method is:\n\n```\nelse:\n    return number * factorial(number\
    \ - 1)\n```\n\nSo calling factorial(2) will return 2 * factorial(1). To calculate\
    \ 2 * factorial(1), we need to know what factorial(1) returns. If you check your\
    \ napkin, you'll see that it returns 1. So 2 * factorial(1) will return 2 * 1,\
    \ which just happens to be 2.\n\nAdd this fact to your napkin:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_166_1.png)\n\
    \nNow, what happens if we call factorial(3)? Again, the relevant line of code\
    \ is:\n\n```\nelse:\n    return number * factorial(number - 1)\n```\n\nSo that\
    \ would translate into return 3 * factorial(2). What does factorial(2) return?\
    \ You don't have to figure that out all over again, since it's on your napkin!\
    \ It returns 2. So, factorial(3) will return 6 (because 3 * 2 = 6). Go ahead and\
    \ add this wonderful factoid to your napkin:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_166_2.png)\n\
    \nTake a moment and figure out for yourself what factorial(4) will return.\n\n\
    As you can see, starting the analysis from the base case and building up is a\
    \ great way to reason about recursive code.\n\n## Recursion in the Eyes of the\
    \ Computer\n\nTo complete your understanding of recursion, we need to see how\
    \ the computer itself processes a recursive function. It's one thing for humans\
    \ to reason about recursion using the earlier \"napkin\" method. However, the\
    \ computer has to do the tricky work of calling a function from within the function\
    \ itself.\n\nSo let's break down the process of how the computer executes a recursive\
    \ function.\n\nSay that we call factorial(3). Since 3 isn't the base case, the\
    \ computer reaches this line:\n\n```\nreturn number * factorial(number - 1)\n\
    ```\n\nThis then launches the function factorial(2).\n\nBut there's a catch. When\
    \ the computer begins to run factorial(2), did the computer yet complete running\
    \ factorial(3)?\n\nThis is what makes recursion tricky for the computer. Until\
    \ the computer reaches the end keyword of factorial(3), it's not done with factorial(3).\
    \ So we enter into a weird situation. The computer didn't yet complete executing\
    \ factorial(3), yet it's starting to run factorial(2) while *still in the middle*\
    \ of factorial(3).\n\nAnd factorial(2) isn't the end of the story, because factorial(2)\
    \ **triggers** factorial(1). So it's a crazy thing: while still in the middle\
    \ of running factorial(3), the computer calls factorial(2). And while running\
    \ factorial(2), the computer runs factorial(1). It turns out, then, that factorial(1)\
    \ runs in the middle of *both* factorial(2) and factorial(3).\n\nHow does the\
    \ computer keep track of all of this? It needs some way to remember that after\
    \ it finishes factorial(1), it needs to go back and finish running factorial(2).\
    \ And then it needs to remember to complete factorial(3) once it completes factorial(2).\n\
    \n## The Call Stack\n\nLuckily, you recently learned about stacks in [Chapter\
    \ 9, Crafting Elegant Code, on page 133](https://example.com). The computer uses\
    \ a stack to keep track of which functions it's in the middle of calling. This\
    \ stack is known, appropriately enough, as the *call stack*.\n\nHere's how the\
    \ call stack works in the context of our factorial example.\n\nThe computer begins\
    \ by calling factorial(3). Before the method completes executing, however, factorial(2)\
    \ gets called. To track that the computer is still in the middle of factorial(3),\
    \ the computer pushes that information onto a call stack:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_167_0.png)\n\
    \nThis indicates that the computer is in the middle of factorial(3). (Really,\
    \ the computer also needs to save which line it's in the middle of, and some other\
    \ things like variable values, but I'm keeping the diagrams simple.)"
  mdcn: "## 第10章\n\n## 用递归实现递归\n\n递归是计算机科学中的一个关键概念，它将解锁我们在本书中将要遇到的更高级的算法。正确使用时，递归可以用来以惊人简单的方式解决某些棘手的问题。有时，它甚至看起来像魔法一样。\n\
    \n但在我们深入探讨之前，先来个突击测验！\n\n当调用此处定义的 `blah()` 函数时会发生什么？\n\n```\ndef blah():\n   \
    \ blah()\n```\n\n正如你可能猜到的那样，它会无限地调用自身，因为 `blah()` 调用自身，而自身又调用自身，如此循环往复。\n\n递归就是函数调用自身的术语。确实，像上面例子中的无限递归是完全无用的。然而，如果使用得当，递归可以成为一个强大的工具。\n\
    \n## 用递归代替循环\n\n假设你在 NASA 工作，需要为航天器发射编程一个倒计时函数。你被要求编写的特定函数应接受一个数字——例如 10——并显示从\
