    Let''s analyze the reading, searching, insertion, and deletion operations in the
    context of an array-based set.


    Reading from a set is exactly the same as reading from an array—it takes just
    one step for the computer to look up what''s contained within a particular index.
    As I described earlier, this is because the computer can jump to any index within
    the set since it can easily calculate and jump to its memory address.


    Searching a set also turns out to be no different than searching an array—it takes
    up to N steps to search for a value within a set. And deletion is also identical
    between a set and an array—it takes up to N steps to delete a value and move data
    to the left to close the gap.


    Insertion, however, is where arrays and sets diverge. Let''s first explore inserting
    a value at the *end* of a set, which was a best-case scenario for an array. We
    saw that with an array, the computer can insert a value at its end in a single
    step.


    With a set, however, the computer first needs to determine that this value doesn''t
    already exist in this set—because that''s what sets do: they prevent duplicate
    data from being inserted into them.


    Now, how will the computer ensure that the new data isn''t already contained in
    the set? Remember, a computer doesn''t know offhand what values are contained
    within the cells of an array or set. Because of this, the computer will first
    need to *search* the set to see whether the value we want to insert is already
    there. Only if the set does not yet contain our new value will the computer allow
    the insertion to take place.


    So, every insertion into a set *first requires a search*.


