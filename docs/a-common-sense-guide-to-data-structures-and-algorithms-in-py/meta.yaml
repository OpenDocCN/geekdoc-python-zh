    \ the second number and double it—and so on.\n\nLet's take a stab at writing this\
    \ algorithm in Python, which we'll call `double_array()`. We know that our final\
    \ line will be the recursive call, so let's include that line:\n\n```python\n\
    def double_array(array):\n    double_array(array)\n```\n\n## In-Place Modifications\n\
    \nLet's take a look at the concept of *in-place* modifications, just in case it's\
    \ not clear.\n\nGenerally speaking, there are two basic approaches to manipulating\
    \ data. Let's take the example of doubling the values in an array. If I had the\
    \ array `[1, 2, 3, 4, 5]` and wanted to “double” it to produce the array `[2,\
    \ 4, 6, 8, 10]`. I could do one of two things.\n\nThe first option is to create\
    \ a new array that contains the doubled data but leave the original array alone.\
    \ Take the following code:\n\n```python\na = [1, 2, 3, 4, 5]\nb = double_array(a)\n\
    ```\n\nSince the `double_array` function is creating and returning a brand-new\
