  md: "2. For this algorithm, generating examples to find a pattern will be immensely\
    \ helpful.\n\nLet's take an array that has six integers and see what would happen\
    \ if we removed a different integer each time:\n\n```\n[1, 2, 3, 4, 5, 6] : missing\
    \ 0: sum = 21\n[0, 2, 3, 4, 5, 6] : missing 1: sum = 20\n[0, 1, 3, 4, 5, 6] :\
    \ missing 2: sum = 19\n[0, 1, 2, 4, 5, 6] : missing 3: sum = 18\n[0, 1, 2, 3,\
    \ 5, 6] : missing 4: sum = 17\n[0, 1, 2, 3, 4, 6] : missing 5: sum = 16\n```\n\
    \nHmm. When we remove the 0, the sum is 21. When we remove the 1, the sum is 20.\
    \ And when we remove the 2, the sum is 19, and so on. This definitely seems like\
    \ a pattern!\n\nBefore we go further, let's call the 21 in this case the “full\
    \ sum.” This is the sum of the array when it's just missing the 0.\n\nIf we analyze\
    \ these cases carefully, we'll see that the sum of any array is less than the\
    \ full sum by the *amount of the missing number*. For example, when we're missing\
    \ the 4, the sum is 17, which is four less than 21. And when we're missing the\
    \ 1, the sum is 20, which is one less than 21.\n\nSo we can begin our algorithm\
    \ by calculating what the full sum is. We can then subtract the actual sum from\
    \ the full sum, and that will be our missing number.\n\nHere's the code for this:\n\
    \n```\ndef find_missing_number(array):\n    full_sum = 0\n    for num in range(1,\
    \ len(array) + 1):\n        full_sum += num\n    current_sum = 0\n    for num\
    \ in array:\n        current_sum += num\n    return full_sum - current_sum\n```\n\
    \nThis algorithm is O(N). It takes N steps to calculate the full sum and then\
    \ another N steps to calculate the actual sum. This is 2N steps, which reduces\
    \ to O(N).\n\n3. We can make this function much faster if we use a greedy algorithm.\
    \ (Perhaps this shouldn't be a surprise given that our code is trying to make\
    \ the greatest possible profit on stocks.)"
