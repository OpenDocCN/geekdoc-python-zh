  - '[PAGE 16]


    In *O Yes! Big O Notation*, I unveil Big O notation and explain it in terms that
    are easy to understand. We use this notation throughout the book, so this chapter
    is pretty important.


    In *Speeding Up Your Code with Big O*, *Optimizing Code With and Without Big O*,
    and *Optimizing for Optimistic Scenarios*, we delve further into Big O notation
    and use it to make our day-to-day code faster. Along the way, I cover various
    sorting algorithms, including Bubble Sort, Selection Sort, and Insertion Sort.


    In *Big O in Everyday Code*, you apply all that you learned about Big O notation
    and analyze the efficiency of code from the real world.


    In *Blazing Fast Lookup with Hash Tables* and *Crafting Elegant Code*, I discuss
    a few additional data structures, including hash tables, stacks, and queues. I
    show how they impact the speed and elegance of our code and how we can use them
    to solve real-world problems.


    *Recursively Recurse with Recursion* introduces recursion, an anchor concept in
    the world of computer science. We break it down in this chapter and see how it
    can be a great tool for certain situations. *Learning to Write in Recursive* teaches
    you how to write recursive code, which can be confusing if you''re not familiar
    with it.


    *Dynamic Programming* shows you how to optimize recursive code and prevent it
    from spiraling out of control. And *Recursive Algorithms for Speed* shows you
    how to use recursion as the foundation for turbo-fast algorithms like Quicksort
    and Quickselect, and then it takes your algorithm-development skills up a few
    notches.


    The following chapters, *Node-Based Data Structures*, *Speeding Up All the Things*,
    *Keeping Your Priorities Straight with Heaps*, *It Doesn''t Hurt to Trie*, and
    *Connecting Everything with Graphs*, explore node-based data structures including
    the linked list, the binary tree, the heap, the trie, and the graph and show how
    each is ideal for various applications.


    *Dealing with Space Constraints* explores space complexity, which is important
    when programming for devices with relatively small amounts of disk space or when
    dealing with big data.


    The final chapter, *Techniques for Code Optimization*, walks you through various
    practical techniques for optimizing the efficiency of code and gives you new ideas
    for improving the code you write every day.'
