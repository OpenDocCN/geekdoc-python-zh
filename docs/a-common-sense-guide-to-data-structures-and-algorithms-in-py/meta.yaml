    \n```python\ndef two_sum(array):\n    for i in range(len(array)):\n        for\
    \ j in range(len(array)):\n            if i != j and array[i] + array[j] == 10:\n\
    \                return True\n    return False\n```\n\nAs always, before attempting\
    \ an optimization, we need to satisfy our prereq and figure out the current Big\
    \ O of our code.\n\nAs is typical in a nested-loop algorithm, this function has\
    \ a runtime of O(N²).\n\nNext, to see if our algorithm is worth optimizing, we\
    \ need to see if the best-imaginable Big O would be any better.\n\nIn this case,\
    \ it would seem that we absolutely have to visit each number in the array at least\
    \ once. So, we couldn't beat O(N). And if someone told me that there's an O(N)\
    \ solution to this problem, I suppose I'd believe them. So let's make O(N) our\
    \ best-imaginable Big O.\n\nNow, let's ask ourselves the magical lookup question:\
    \ \"If I could magically find a desired piece of information in O(1) time, can\
    \ I make my algorithm faster?\"\n\nSometimes it helps to begin walking through\
    \ our current implementation while asking this question along the way, so let's\
    \ do that.\n\nLet's mentally walk through our outer loop with the example array\
    \ of [2, 0, 4, 1, 7, 9]. This loop begins with the first number, which is the\
    \ number 2.\n\nNow, what piece of information might we desire to look up while\
    \ we're looking at the 2? Again, we want to know if this 2 could be added to another\
    \ number in the array to provide a sum of 10.\n\nThinking about it further, while\
    \ looking at the 2, I'd want to know whether *there's an 8 somewhere* in this\
    \ array. If we could, magically, do an O(1) lookup and know that there's an 8\
    \ in the array, we could immediately return True. Let's call the 8 the 2's *counterpart*,\
    \ since the two numbers add up to 10.\n\nSimilarly, when we move on to the 0,\
    \ we'd want to do an O(1) lookup to find its counterpart—a 10—in the array, and\
    \ so on.\n\nWith this approach, we can iterate through the array just once and\
    \ do magical O(1) lookups along the way to see whether each number's counterpart\
    \ exists in the array. As soon as we find any number's counterpart, we return\
    \ `True`, but if we get to the end of the array without finding any numerical\
    \ counterparts, we return `False`.\n\nNow that we've determined we'd benefit from\
    \ these magical O(1) lookups, let's try to pull off our magic trick by bringing\
    \ in an extra data structure. Again, the hash table is usually the default option\
    \ for magical lookups because of its O(1) reads. (It's uncanny how often hash\
    \ tables can be used to speed up algorithms.)\n\nSince we want to be able to look\
    \ up any number from the array in O(1) time, we'll store those numbers as keys\
    \ in a hash table. The hash table may look like this:\n\n{2: True, 0: True, 4:\
    \ True, 1: True, 7: True, 9: True}\n\nWe can use any arbitrary item to serve as\
