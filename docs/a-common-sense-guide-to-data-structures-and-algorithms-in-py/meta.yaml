    \ 6, 8, 10]\n```\n\nThe original array a was unmodified, and b holds a brand-new\
    \ array.\n\nThe second option is called *in-place* modification, meaning the function\
    \ actually changes the *original array* passed into function.\n\nWith in-place\
    \ modification, if we now check a and b, we'd find this:\n\n```\na # [2, 4, 6,\
    \ 8, 10]\nb # [2, 4, 6, 8, 10]\n```\n\nThe in-place function modifies a, and b\
    \ is just pointing to the very same array that a is.\n\nWhether we choose to create\
    \ a new array or modify the original one in place is up to us and depends on the\
    \ context of our project. We're going to talk more about in-place algorithms in\
    \ [Dealing with Space Constraints](Dealing with Space Constraints).\n\nNext, we\
    \ need to add the code that will actually double the number. But which number\
    \ will we double? Let's try to double the first number:\n\n```\ndef double_array(array):\n\
    \    array[0] *= 2\n    double_array(array)\n```\n\nOkay, so we've doubled the\
    \ number at index 0, but how do we proceed to double the number at index 1?\n\n\
    Now, if we were to use a loop instead of recursion, we would have used a variable\
    \ to keep track of the index and continuously increased it by 1, something along\
    \ these lines:"
  - "[PAGE 177]\n\n```\ndef double_array(array):\n    index = 0\n    while index <\
    \ len(array):\n        array[index] *= 2\n        index += 1\n```\n\nIn our recursive\
    \ version, though, the only argument to our function is the array. We need some\
    \ way to keep track of and increment an index. How do we pull this off?\n\nAnd\
    \ now for our next trick...\n\nLet's pass in extra parameters!\n\nLet's modify\
    \ the beginning of our function so that it accepts *two* arguments—the array itself\
    \ and an index to keep track of. Here's the code:\n\n```\ndef double_array(array,\
    \ index):\n```\n\nAs things stand right now, when we call this function, we need\
    \ to pass in the array and the starting index, which will be 0:\n\n```\ndouble_array([1,\
    \ 2, 3, 4, 5], 0)\n```\n\nOnce we have the index as a function argument, we have\
    \ a way of incrementing and tracking the index as we make each successive recursive\
    \ call. Here's the code for this:\n\n```\ndef double_array(array, index):\n  \
    \  array[index] *= 2\n    double_array(array, index + 1)\n```\n\nIn each successive\
    \ call, we pass in the array again as the first argument, but we also pass along\
    \ an incremented index. This allows us to keep track of an index just as we would\
    \ in a classical loop.\n\nOur code isn't perfect just yet, though. Our function\
    \ will throw an error once the index goes past the end of the array and tries\
    \ to multiply a nonexistent number. To solve this, we need our base case:\n\n\
    ```\ndef double_array(array, index):\n    # Base case: when the index goes past\
    \ the end of the array\n    if index >= len(array):\n        return\n\n    array[index]\
    \ *= 2\n    double_array(array, index + 1)\n```"
  - "[PAGE 178]\n\nWe can test this function out with the following code:\n\n```\n\
    array = [1, 2, 3, 4]\ndouble_array(array, 0)\nprint(array)\n```\n\nOur recursive\
    \ function is now complete. However, if our programming language supports default\
    \ arguments as Python does, we can make things even prettier.\n\nRight now, we\
    \ need to call the function like this:\n\n```\ndouble_array([1, 2, 3, 4, 5], 0)\n\
    ```\n\nAdmittedly, passing in that 0 as a second parameter isn't beautiful—it's\
    \ just so we can achieve our trick of maintaining an index. After all, we *always*\
    \ want to start our index off at 0.\n\nHowever, we can use default parameters\
    \ to allow us to simply call the function the original way:\n\n```\ndouble_array([1,\
    \ 2, 3, 4, 5])\n```\n\nHere's our updated code to make this work:\n\n```\ndef\
    \ double_array(array, index=0):\n    # Base case: when the index goes past the\
    \ end of the array\n    if index >= len(array):\n        return\n\n    array[index]\
    \ *= 2\n    double_array(array, index + 1)\n```\n\nAll we updated here was setting\
    \ a default argument of index=0. This way, the first time we call the function,\
    \ we don't have to pass in the index parameter. However, we still get to use the\
    \ index parameter for all successive calls.\n\nThe \"trick\" of using extra function\
    \ parameters is a common technique in writing recursive functions, and a handy\
    \ one.\n\n# Recursive Category: Calculations\n\nIn the previous section, we discussed\
    \ the first category of recursive functions—those whose job it is to repeatedly\
    \ execute a task. For the remainder of this chapter, I'll elaborate on a second\
    \ general category: performing a calculation based on a subproblem.\n\nThe goal\
    \ of many functions is to perform a calculation. A function that returns the sum\
    \ of two numbers, or a function that finds the greatest value within an array,\
    \ are examples. These functions receive some sort of input and return the result\
    \ of calculations involving that input."
- md: "## Two Approaches to Calculations\n\nWe've seen that when writing a function\
    \ that makes a calculation, there are two potential approaches: we can try to\
    \ build the solution from the “bottom-up,” or we can attack the problem going\
    \ “top-down” by making the calculation based on the problem's subproblem. Indeed,\
    \ computer science literature refers to the terms *bottom-up* and *top-down* in\
    \ regard to recursion strategies.\n\nThe truth is that both approaches can be\
    \ achieved through recursion. We previously saw the bottom-up approach using a\
    \ classic loop; we can also use recursion to implement the bottom-up strategy.\n\
    \nTo do this, we need to use our trick of passing extra parameters, as follows:\n\
    \n```python\ndef factorial(n, i=1, product=1):\n    if i > n:\n        return\
    \ product\n    return factorial(n, i + 1, product * i)\n```\n\nIn this implementation,\
    \ we have three parameters. `n`, as before, is the number whose factorial we're\
    \ computing. `i` is a simple variable that starts at 1 and increments by one in\
    \ each successive call until it reaches `n`. Finally, `product` is the variable\
    \ in which we store the calculation as we keep multiplying each successive number.\
    \ We keep passing the product to the successive call so we can keep track of it\
    \ as we go.\n\nWhile we can use recursion in this way to achieve the bottom-up\
    \ approach, it's not particularly elegant and doesn't add much value over using\
    \ a classic loop.\n\nWhen going bottom-up, we're employing the same strategy for\
    \ making the calculation whether we're using a loop or recursion. The computational\
    \ approach is the same.\n\nBut to go top-down, we *need* recursion. And because\
    \ recursion is the only way to achieve a top-down strategy, it's one of the key\
    \ factors that makes recursion a powerful tool.\n\n## Top-Down Recursion: A New\
    \ Way of Thinking\n\nThis brings us to the central point of this chapter: recursion\
    \ shines when implementing a top-down approach because going top-down *offers\
    \ a new mental strategy for tackling a problem*. That is, a recursive top-down\
    \ approach allows one to think about a problem in a completely different way.\n\
    \nSpecifically, when we go top-down, we get to mentally “kick the problem down\
    \ the road.” We can free our mind from some of the nitty-gritty details we normally\
    \ have to think about when going bottom-up.\n\nTo see what I mean, let's take\
    \ another look at the key line from our top-down factorial implementation:\n\n\
    ```python\nreturn number * factorial(number - 1)\n```\n\nThis line of code makes\
    \ its calculation based on `factorial(number - 1)`. When we write this line of\
    \ code, do we have to understand how the factorial function it's calling works?\
    \ Technically, we don't. Whenever we write code that calls another function, we\
    \ assume that the function will return the correct value without necessarily understanding\
    \ how its internals work.\n\nHere as well, when we calculate our answer based\
    \ on calling the factorial function, we don't need to understand how the factorial\
    \ function works; we can just expect it to return the correct result. Of course,\
    \ the weird part is that *we're the ones writing the factorial function!* This\
    \ line of code exists *within the factorial function itself*. But that's what\
    \ is so great about top-down thinking: in a way, we can solve the problem without\
    \ even knowing how to solve the problem.\n\nWhen we write “in recursive” to implement\
    \ a top-down strategy, we get to relax our brains a little. We can even choose\
    \ to ignore the details of how the calculation actually works. We get to say,\
    \ “Let's just rely on the subproblem to deal with the details.”\n\n## The Top-Down\
    \ Thought Process\n\nIf you haven't done a lot of top-down recursion before, it\
    \ takes time and practice to learn to think in this way. I found that when tackling\
    \ a top-down problem, it helps to think the following three thoughts:\n\n1. Imagine\
    \ the function you're writing has already been implemented by someone else.\n\
    2. Identify the subproblem of the problem.\n3. See what happens when you call\
    \ the function on the subproblem and go from there.\n\nWhile these steps sound\
    \ vague at the moment, they'll become more clear through the following examples.\n\
    \n## Array Sum\n\nSay we have to write a function called `sum` that sums up all\
    \ the numbers in a given array. For example, if we pass the array `[1, 2, 3, 4,\
    \ 5]` into the function, it'll return 15, which is the sum of those numbers.\n\
    \nThe first thing we'll do is imagine that the `sum` function has already been\
    \ implemented. Admittedly, this takes a certain suspension of disbelief, since\
    \ we know that we're in the middle of writing this function as we speak! But let's\
    \ try to let go and pretend that the `sum` function already works.\n\nNext, let's\
    \ identify the subproblem. This can be more of an art than a science, but practice\
    \ will help you get better at it. In our case, we can say that the subproblem\
    \ is the array `[2, 3, 4, 5]`—that is, all the numbers from the array save the\
    \ first one.\n\nFinally, let's see what happens when we apply the `sum` function\
    \ to our subproblem. If the `sum` function “already works,” and the subproblem\
    \ is `[2, 3, 4, 5]`, what happens when we call `sum([2, 3, 4, 5])`? Well, we get\
    \ the sum of 2 + 3 + 4 + 5, which is 14.\n\nTo solve our problem of finding the\
    \ sum of `[1, 2, 3, 4, 5]` then, we can just add the first number, 1, to the result\
    \ of `sum([2, 3, 4, 5])`.\n\nIn pseudocode, we'd write something like this:\n\n\
    ```\nreturn array[0] + sum(the remainder of the array)\n```\n\nIn Python, we can\
    \ write this like so:\n\n```python\nreturn array[0] + sum(array[1:])\n```\n\n\
    (In Python, the syntax `array[1:]` returns a new array that has the contents of\
    \ the original array starting from index 1 until the end.)\n\nNow, believe it\
    \ or not, we're done! Save for the base case, which we'll get to in a moment,\
    \ our `sum` function can be written like this:\n\n```python\ndef sum(array):\n\
    \    return array[0] + sum(array[1:])\n```\n\nNote that we didn't think about\
    \ how we're going to add all the numbers together. All we did was imagine that\
    \ someone else wrote the `sum` function for us, which we applied to the subproblem.\
    \ We kicked the problem down the road, but in doing so, we solved the entire problem.\n\
    \nThe last thing we need to do is handle the base case. That is, if each subproblem\
    \ recursively calls its own subproblem, we will eventually reach the subproblem\
    \ of `sum([5])`. This function will eventually try to add the 5 to the remainder\
    \ of the array, but there *are* no other elements in the array.\n\nTo deal with\
    \ this, we can add the base case:\n\n```python\ndef sum(array):\n    # Base case:\
    \ only one element in the array:\n    if len(array) == 1:\n        return array[0]\n\
    \n    return array[0] + sum(array[1:])\n```\n\nAnd now we're done.\n\nTechnically,\
    \ there's another case we haven't handled, and that's if the input array is completely\
    \ empty. Currently, our code will throw an error for such an input.\n\nIn this\
    \ book, our code doesn't necessarily attempt to handle every edge case. (For example,\
    \ what if the input array contains strings instead of numbers?) However, we'll\
    \ sometimes put in a guard against an empty array by throwing an extra clause,\
    \ as follows:\n\n```python\ndef sum(array):\n    # If array is empty:\n    if\
    \ not array:\n        return 0\n\n    # Primary base case:\n    if len(array)\
    \ == 1:\n        return array[0]\n\n    return array[0] + sum(array[1:])\n```\n\
    \nWe now technically have *two* base cases. The possibility of the array being\
    \ empty is *kind* of a base case unto itself but will only be triggered if the\
    \ original"
  mdcn: "## 两种计算方法\n\n我们已经看到，在编写执行计算的函数时，有两种潜在的方法：我们可以尝试从“自底向上”构建解决方案，或者我们可以“自顶向下”地处理问题，即基于问题的子问题进行计算。事实上，计算机科学文献在讨论递归策略时，会使用*自底向上*和*自顶向下*这两个术语。\n\
    \n事实是，这两种方法都可以通过递归来实现。我们之前看到了使用经典循环的自底向上方法；我们也可以使用递归来实现自底向上策略。\n\n为此，我们需要使用传递额外参数的技巧，如下所示：\n\
    \n```python\ndef factorial(n, i=1, product=1):\n    if i > n:\n        return\
    \ product\n    return factorial(n, i + 1, product * i)\n```\n\n在这个实现中，我们有三个参数。`n`\
    \ 和之前一样，是我们要计算其阶乘的数字。`i` 是一个简单的变量，从 1 开始，在每次后续调用中递增 1，直到达到 `n`。最后，`product` 是一个变量，我们在其中存储计算结果，同时不断乘以每个后续数字。我们将乘积传递给后续调用，以便在过程中跟踪它。\n\
    \n虽然我们可以使用递归以这种方式实现自底向上方法，但它并不特别优雅，与使用经典循环相比也没有增加太多价值。\n\n在自底向上时，无论我们使用循环还是递归，我们都采用相同的计算策略。计算方法是相同的。\n\
    \n但要自顶向下，我们*需要*递归。并且因为递归是实现自顶向下策略的唯一方式，它是使递归成为强大工具的关键因素之一。\n\n## 自顶向下递归：一种新的思维方式\n\
    \n这引出了本章的核心观点：递归在实现自顶向下方法时大放异彩，因为自顶向下*提供了一种处理问题的新思维策略*。也就是说，递归的自顶向下方法允许人们以完全不同的方式思考问题。\n\
    \n具体来说，当我们自顶向下时，我们可以在心理上“把问题踢到以后解决”。我们可以将思想从通常在自底向上时必须考虑的一些繁琐细节中解放出来。\n\n为了理解我的意思，让我们再看一下自顶向下阶乘实现中的关键行：\n\
    \n```python\nreturn number * factorial(number - 1)\n```\n\n这行代码基于 `factorial(number\
    \ - 1)` 进行计算。当我们编写这行代码时，我们是否必须理解它调用的阶乘函数是如何工作的？从技术上讲，不需要。每当我们编写调用另一个函数的代码时，我们都假设该函数会返回正确的值，而不必理解其内部工作原理。\n\
    \n这里也是如此，当我们基于调用阶乘函数来计算答案时，我们不需要理解阶乘函数是如何工作的；我们只需要期望它返回正确的结果。当然，奇怪的部分是*我们正是编写阶乘函数的人！*\
    \ 这行代码存在于*阶乘函数本身内部*。但这就是自顶向下思维的伟大之处：在某种程度上，我们甚至可以在不知道如何解决问题的情况下解决问题。\n\n当我们编写“递归”来实现自顶向下策略时，我们可以让大脑稍微放松一下。我们甚至可以选择忽略计算实际如何工作的细节。我们可以说：“我们就依靠子问题来处理细节吧。”\n\
    \n## 自顶向下的思维过程\n\n如果你以前没有做过很多自顶向下的递归，那么学会以这种方式思考需要时间和练习。我发现，在处理自顶向下问题时，思考以下三个想法会有所帮助：\n\
    \n1.  想象你正在编写的函数已经被其他人实现了。\n2.  识别问题的子问题。\n3.  看看当你在子问题上调用该函数时会发生什么，然后从那里继续。\n\
    \n虽然这些步骤目前听起来很模糊，但通过下面的例子，它们会变得更加清晰。\n\n## 数组求和\n\n假设我们需要编写一个名为 `sum` 的函数，该函数对给定数组中的所有数字求和。例如，如果我们把数组\
    \ `[1, 2, 3, 4, 5]` 传入函数，它将返回 15，即这些数字的总和。\n\n我们要做的第一件事是想象 `sum` 函数已经被实现了。诚然，这需要一定程度的“暂停怀疑”，因为我们知道我们此刻正在编写这个函数！但让我们试着放手，假装\
    \ `sum` 函数已经可以工作了。\n\n接下来，让我们识别子问题。这更像是一门艺术而非科学，但练习会帮助你做得更好。在我们的例子中，我们可以说子问题是数组\
    \ `[2, 3, 4, 5]`——即数组中除第一个数字外的所有数字。\n\n最后，让我们看看当我们将 `sum` 函数应用于我们的子问题时会发生什么。如果\
    \ `sum` 函数“已经可以工作”，并且子问题是 `[2, 3, 4, 5]`，那么当我们调用 `sum([2, 3, 4, 5])` 时会发生什么？嗯，我们得到\
    \ 2 + 3 + 4 + 5 的和，即 14。\n\n那么，为了解决我们求 `[1, 2, 3, 4, 5]` 总和的问题，我们只需将第一个数字 1 加到\
    \ `sum([2, 3, 4, 5])` 的结果上。\n\n用伪代码表示，我们可以这样写：\n\n```\nreturn array[0] + sum(the\
    \ remainder of the array)\n```\n\n在 Python 中，我们可以这样写：\n\n```python\nreturn array[0]\
    \ + sum(array[1:])\n```\n\n（在 Python 中，语法 `array[1:]` 返回一个新数组，该数组包含从索引 1 开始到末尾的原始数组内容。）\n\
    \n现在，信不信由你，我们完成了！除了我们稍后会处理的基准情况，我们的 `sum` 函数可以这样编写：\n\n```python\ndef sum(array):\n\
    \    return array[0] + sum(array[1:])\n```\n\n请注意，我们并没有思考如何将所有数字加在一起。我们所做的只是想象别人为我们编写了\
    \ `sum` 函数，我们将其应用于子问题。我们把问题踢到了以后解决，但在这个过程中，我们解决了整个问题。\n\n我们需要做的最后一件事是处理基准情况。也就是说，如果每个子问题递归地调用它自己的子问题，我们最终会到达\
    \ `sum([5])` 这个子问题。这个函数最终会尝试将 5 加到数组的其余部分，但数组中*没有*其他元素了。\n\n为了解决这个问题，我们可以添加基准情况：\n\
    \n```python\ndef sum(array):\n    # 基准情况：数组中只有一个元素：\n    if len(array) == 1:\n\
    \        return array[0]\n\n    return array[0] + sum(array[1:])\n```\n\n现在我们完成了。\n\
    \n从技术上讲，我们还没有处理另一种情况，那就是输入数组完全为空的情况。目前，我们的代码对于这样的输入会抛出错误。\n\n在本书中，我们的代码不一定试图处理每一个边缘情况。（例如，如果输入数组包含字符串而不是数字怎么办？）然而，我们有时会通过添加一个额外的子句来防止空数组，如下所示：\n\
    \n```python\ndef sum(array):\n    # 如果数组为空：\n    if not array:\n        return\
    \ 0\n\n    # 主要基准情况：\n    if len(array) == 1:\n        return array[0]\n\n   \
    \ return array[0] + sum(array[1:])\n```\n\n我们现在从技术上讲有*两个*基准情况。数组为空的可能性*本身*算是一种基准情况，但只有在原始"
