  md: "Since factorial(5) is the smaller problem that can be used to compute the result\
    \ for the bigger problem, we call factorial(5) a *subproblem* of factorial(6).\n\
    Here's the implementation of this from the last chapter:\n\n```\ndef factorial(number):\n\
    \    if number <= 1:\n        return 1\n    else:\n        return number * factorial(number\
    \ - 1)\n```\n\nAgain, the key line here is return number * factorial(number -\
    \ 1), in which we compute the result as number multiplied by our subproblem, which\
    \ is factorial(number - 1).\n\n# Two Approaches to Calculations\n\nWe've seen\
    \ that when writing a function that makes a calculation, there are two potential\
    \ approaches: we can try to build the solution from the “bottom-up,” or we can\
    \ attack the problem going “top-down” by making the calculation based on the problem's\
    \ subproblem. Indeed, computer science literature refers to the terms *bottom-up*\
    \ and *top-down* in regard to recursion strategies.\nThe truth is that both approaches\
    \ can be achieved through recursion. We previously saw the bottom-up approach\
    \ using a classic loop; we can also use recursion to implement the bottom-up strategy.\n\
    To do this, we need to use our trick of passing extra parameters, as follows:\n\
    \n```\ndef factorial(n, i=1, product=1):\n    if i > n:\n        return product\n\
    \    return factorial(n, i + 1, product * i)\n```\n\nIn this implementation, we\
    \ have three parameters. n, as before, is the number whose factorial we're computing.\
    \ i is a simple variable that starts at 1 and increments by one in each successive\
    \ call until it reaches n. Finally, product is the variable in which we store\
    \ the calculation as we keep multiplying each successive number. We keep passing\
    \ the product to the successive call so we can keep track of it as we go.\nWhile\
    \ we can use recursion in this way to achieve the bottom-up approach, it's not\
    \ particularly elegant and doesn't add much value over using a classic loop.\n\
    When going bottom-up, we're employing the same strategy for making the calculation\
    \ whether we're using a loop or recursion. The computational approach is the same."
