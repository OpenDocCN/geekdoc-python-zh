    \    return array[-1] * array[-2] * array[-3]\n```\n\n（此代码默认数组中至少有三个值。你可以添加代码来处理数组元素不足的情况。）\n\
    \n2.  如果我们预先对数组排序，那么可以预期每个数字都位于其对应的索引位置。也就是说，0 应该在索引 0，1 应该在索引 1，以此类推。然后我们可以遍历数组，寻找一个不等于其索引的数字。一旦找到，我们就知道刚刚跳过了那个缺失的数字：\n\
    \n```python\ndef find_missing_number(array):\n    array.sort()\n\n    for index,\
    \ num in enumerate(array):\n        if num != index:\n            return index\n\
    \n    return None\n```\n\n排序需要 N log N 步，之后的循环需要 N 步。然而，我们将表达式 (N log N) + N 简化为\
    \ O(N log N)，因为增加的 N 相对于 N log N 是一个低阶项。\n\n3.  此实现使用嵌套循环，时间复杂度为 O(N²)：\n\n```python\n\
    def max(array):\n    if not array:\n        return None\n\n    for i in array:\n\
    \        i_is_greatest_number = True\n\n        for j in array:\n            if\
    \ j > i:\n                i_is_greatest_number = False\n\n        if i_is_greatest_number:\n\
    \            return i\n```\n\n下一个实现只是对数组进行排序并返回最后一个数字。排序的时间复杂度为 O(N log N)：\n\n\
    ```python\ndef max(array):\n    if not array:\n        return None\n\n    array.sort()\n\
    \n    return array[-1]\n```\n\n我们下一个也是最后一个实现的时间复杂度为 O(N)，因为我们只遍历数组一次：\n\n```python\n\
