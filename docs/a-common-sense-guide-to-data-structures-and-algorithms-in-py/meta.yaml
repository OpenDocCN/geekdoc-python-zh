- md: "## APPENDIX 1\n\n## Exercise Solutions\n\n## Chapter 1\n\nThese are the solutions\
    \ to the exercises found in the section [Exercises, on page 19](#).\n\n1.  Let's\
    \ break down each of the cases:\n    a. Reading from an array always takes just\
    \ one step.\n    b. Searching for a nonexistent element within an array of size\
    \ 100 will take 100 steps, as the computer needs to inspect each element of the\
    \ array before determining the element cannot be found.\n    c. The insertion\
    \ will take 101 steps: 100 shifts of each element to the right, and one step to\
    \ insert the new element at the front of the array.\n    d. Insertion at the end\
    \ of an array always takes one step.\n    e. The deletion will take 100 steps:\
    \ first the computer deletes the first element and then shifts the remaining 99\
    \ elements to the left, one at a time.\n    f. Deletion at the end of an array\
    \ always takes one step.\n\n2.  Let's break down each of the cases:\n    a. Like\
    \ the array, reading from the array-based set will take just one step.\n    b.\
    \ Like the array, searching the array-based set will take 100 steps, as we inspect\
    \ each element before concluding that the element isn't there.\n    c. To insert\
    \ into the set, we first need to conduct a full search to make sure the value\
    \ doesn't already exist within the set. This search will take 100 steps. Then\
    \ we need to shift all 100 elements to the right to make room for the new value.\
    \ Finally, we drop the new value at the beginning of the set. This is a total\
    \ of 201 steps.\n    d. This insertion takes 101 steps. Again, we need to conduct\
    \ a full search before inserting, which takes 100 steps. We then conclude with\
    \ the final step of inserting the new value at the end of the set.\n    e. The\
    \ deletion will take 100 steps, just like a classic array.\n    f. The deletion\
    \ will take one step, just like a classic array.\n\n3.  If the array contains\
    \ N elements, searching for all instances of the string “apple” in an array will\
    \ take N steps. When searching for just one instance, we can cut our search short\
    \ as soon as we find it. But if we need to find all instances, we have no choice\
    \ but inspect each element of the entire array.\n\n## Chapter 2\n\nThese are the\
    \ solutions to the exercises found in the section [Exercises, on page 34](https://example.com).\n\
    \n1.  Linear search on this array would take four steps. We start at the beginning\
    \ of the array and check each element from left to right. Because the 8 is the\
    \ fourth number, we’ll find it in four steps.\n2.  Binary search would take just\
    \ one step in this case. We start the binary search at the middlemost element,\
    \ and the 8 just happens to be the middlemost element!\n3.  To solve this, we\
    \ need to count how many times we halve 100,000 until we get down to 1. If we\
    \ keep dividing 100,000 by 2, we see that it takes us sixteen times until we get\
    \ down to about 1.53. If we halve this a seventeenth time, we get roughly 0.76,\
    \ which is already below 1. This suggests that in a worst-case scenario, it takes\
    \ either sixteen or seventeen steps to perform binary search on 100,000 elements.\
    \ If your answer is either sixteen or seventeen, it means you understand this\
    \ concept well. Nice job!\n\nIn practice, binary search takes *sixteen* steps.\
    \ We can see this if we (tediously) walk through each step.\n\nLet’s start with\
    \ 100,000 elements. When dealing with an even number of elements, there isn’t\
    \ an exact item in the center. Instead, there are *two* central elements, and\
    \ we arbitrarily search one of them. By searching this element, we’ve essentially\
    \ taken it out of the picture, leaving behind 50,000\n\n1.  You're working on\
    \ software that analyzes sports players. Following are two arrays of players of\
    \ different sports:\n\n```\nbasketball_players = [\n    {first_name: \"Jill\"\
    , last_name: \"Huang\", team: \"Gators\"},\n    {first_name: \"Janko\", last_name:\
    \ \"Barton\", team: \"Sharks\"},\n    {first_name: \"Wanda\", last_name: \"Vakulskas\"\
    , team: \"Sharks\"},\n    {first_name: \"Jill\", last_name: \"Moloney\", team:\
    \ \"Gators\"},\n    {first_name: \"Luuk\", last_name: \"Watkins\", team: \"Gators\"\
    }\n]\n\nfootball_players = [\n    {first_name: \"Hanzla\", last_name: \"Radosti\"\
    , team: \"32ers\"},\n    {first_name: \"Tina\", last_name: \"Watkins\", team:\
    \ \"Barleycorns\"},\n    {first_name: \"Alex\", last_name: \"Patel\", team: \"\
    32ers\"},\n    {first_name: \"Jill\", last_name: \"Huang\", team: \"Barleycorns\"\
    },\n    {first_name: \"Wanda\", last_name: \"Vakulskas\", team: \"Barleycorns\"\
    }\n]\n```\n\nIf you look carefully, you'll see that there are some players who\
    \ participate in more than one kind of sport. Jill Huang and Wanda Vakulskas play\
    \ both basketball *and* football.\n\nYou are to write a function that accepts\
    \ two arrays of players and returns an array of the players who play in *both*\
    \ sports. In this case, that would be the following:\n\n```\n[\"Jill Huang\",\
    \ \"Wanda Vakulskas\"]\n```\n\nWhile there are players who share first names and\
    \ players who share last names, we can assume there's only one person who has\
    \ a particular *full* name (meaning first *and* last name).\n\nWe can use a nested-loops\
    \ approach, comparing each player from one array against each player from the\
    \ other array, but this would have a runtime of O(N * M). Your job is to optimize\
    \ the function so that it can run in just O(N + M).\n\n2.  You're writing a function\
    \ that accepts an array of distinct integers from 0, 1, 2, 3...up to N. However,\
    \ the array will be missing one integer, and your function is to *return the missing\
    \ one*.\n\nFor example, this array has all the integers from 0 to 6 but is missing\
    \ the 4:\n\n```\n[2, 3, 0, 6, 1, 5]\n```\n\nTherefore, the function should return\
    \ 4.\n\nThe next example has all the integers from 0 to 9 but is missing the 1:\n\
    \n```\n[8, 2, 3, 9, 4, 7, 5, 0, 6]\n```\n\nIn this case, the function should return\
    \ the 1.\nUsing a nested-loops approach would take up to O(N²). Your job is to\
    \ optimize the code so that it has a runtime of O(N).\n\n3.  You’re working on\
    \ some more stock-prediction software. The function you’re writing accepts an\
    \ array of predicted prices for a particular stock over the course of time.\n\n\
    For example, look at this array of seven prices:\n\n[10, 7, 5, 8, 11, 2, 6]\n\n\
    It predicts that a given stock will have these prices over the next seven days.\
    \ (On Day 1, the stock will close at $10; on Day 2, the stock will close at $7;\
    \ and so on.)\n\nYour function should calculate the greatest profit that could\
    \ be made from a single “buy” transaction followed by a single “sell” transaction.\n\
    \nIn this example, the most money could be made if we bought the stock when it\
    \ was worth $5 and sold it when it was worth $11. This yields a profit of $6 per\
    \ share.\n\nNote that we could make even more money if we buy and sell multiple\
    \ times, but for now, this function focuses on the most profit that could be made\
    \ from just *one* purchase followed by *one* sale.\n\nNow, we could use nested\
    \ loops to find the profit of every possible buy-and-sell combination. However,\
    \ this would be O(N²) and too slow for our hotshot trading platform. Your job\
    \ is to optimize the code so that the function clocks in at just O(N).\n\n4. \
    \ You’re writing a function that accepts an array of numbers and computes the\
    \ highest product of any two numbers in the array. At first glance, this is easy,\
    \ as we can just find the two greatest numbers and multiply them. However, our\
    \ array can contain negative numbers and look like this:\n\n[5, -10, -6, 9, 4]\n\
    \nIn this case, it’s actually the product of the two *lowest* numbers, -10 and\
    \ -6 that yield the highest product of 60.\n\nWe could use nested loops to multiply\
    \ every possible pair of numbers, but this would take O(N²) time. Your job is\
    \ to optimize the function so that it’s a speedy O(N).\n\n5.  You're creating\
    \ software that analyzes the data of body temperature readings taken from hundreds\
    \ of human beings. These readings are taken from both healthy and sick people\
    \ and range from 95 to 105 degrees Fahrenheit.\n\nHere's a sample array of temperature\
    \ readings:\n\n```\n[98, 99, 95, 105, 104, 98, 101, 99, 100, 97]\n```\n\nYou are\
    \ to write a function that sorts these readings from lowest to highest.\n\nIf\
    \ you used a classic sorting algorithm such as Quicksort, this would take O(N\
    \ log N). However, in this case, it's possible to write a faster sorting algorithm.\n\
    \nYes, that's right. Even though you've learned that the fastest sorts are O(N\
    \ log N), this case is different. Why? In this case, there's a limited number\
    \ of possibilities of what the readings will be. In such a case, we can sort these\
    \ values in O(N). It may be N multiplied by a constant, but that's still considered\
    \ O(N).\n\n6.  You're writing a function that accepts an array of unsorted integers\
    \ and returns the length of the longest consecutive sequence among them. The sequence\
    \ is formed by integers that increase by 1. For example, have a look at this array:\n\
    \n```\n[10, 5, 12, 3, 55, 30, 4, 11, 2]\n```\n\nThe longest consecutive sequence\
    \ is 2-3-4-5. These four integers form an increasing sequence because each integer\
    \ is one greater than the previous one. While there's also a sequence of 10-11-12,\
    \ it's only a sequence of three integers. In this case, the function should return\
    \ 4, since that's the length of the longest consecutive sequence that can be formed\
    \ from this array.\n\nHere's one more example:\n\n```\n[19, 13, 15, 12, 18, 14,\
    \ 17, 11]\n```\n\nThis array's longest sequence is 11-12-13-14-15, so the function\
    \ would return 5.\n\nIf we sorted the array, we can then traverse the array just\
    \ once to find the longest consecutive sequence. However, the sorting itself would\
    \ take O(N log N). Your job is to optimize the function so that it takes O(N)\
    \ time."
  mdcn: "## 附录 1\n\n## 练习解答\n\n## 第 1 章\n\n以下是第 19 页[练习](#)部分中练习题的解答。\n\n1.  让我们逐一分析每种情况：\n\
    \    a. 从数组中读取数据始终只需要一步。\n    b. 在一个大小为 100 的数组中搜索一个不存在的元素将需要 100 步，因为计算机必须检查数组的每个元素，才能确定该元素不存在。\n\
    \    c. 插入操作将需要 101 步：将每个元素向右移动 100 步，以及在数组开头插入新元素的一步。\n    d. 在数组末尾插入始终只需要一步。\n\
    \    e. 删除操作将需要 100 步：首先计算机删除第一个元素，然后将其余 99 个元素逐个向左移动。\n    f. 在数组末尾删除始终只需要一步。\n\
    \n2.  让我们逐一分析每种情况：\n    a. 与数组类似，从基于数组的集合中读取数据也只需要一步。\n    b. 与数组类似，在基于数组的集合中搜索将需要\
    \ 100 步，因为我们需要检查每个元素才能得出该元素不存在的结论。\n    c. 要向集合中插入，我们首先需要进行一次完整搜索，以确保该值尚未存在于集合中。这次搜索将需要\
    \ 100 步。然后我们需要将所有 100 个元素向右移动，为新值腾出空间。最后，我们将新值放入集合的开头。总共需要 201 步。\n    d. 这次插入需要\
    \ 101 步。同样，我们需要在插入前进行一次完整搜索，这需要 100 步。然后我们执行最后一步，将新值插入集合的末尾。\n    e. 删除操作将需要 100\
    \ 步，与经典数组相同。\n    f. 删除操作将需要一步，与经典数组相同。\n\n3.  如果数组包含 N 个元素，在数组中搜索字符串“apple”的所有出现将需要\
    \ N 步。当只搜索一个实例时，我们可以一找到它就停止搜索。但如果我们需要找到所有实例，我们别无选择，只能检查整个数组的每个元素。\n\n## 第 2 章\n\
    \n以下是第 34 页[练习](https://example.com)部分中练习题的解答。\n\n1.  对此数组进行线性搜索将需要四步。我们从数组的开头开始，从左到右检查每个元素。因为\
    \ 8 是第四个数字，我们将在四步内找到它。\n2.  在这种情况下，二分搜索只需要一步。我们从最中间的元素开始二分搜索，而 8 恰好就是最中间的元素！\n\
    3.  要解决这个问题，我们需要计算将 100,000 减半多少次才能得到 1。如果我们不断将 100,000 除以 2，我们会发现需要十六次才能得到大约\
    \ 1.53。如果我们将这个数再减半一次（第十七次），我们得到大约 0.76，这已经低于 1。这表明在最坏的情况下，对 100,000 个元素执行二分搜索需要十六或十七步。如果你的答案是十六或十七，说明你很好地理解了这个概念。干得漂亮！\n\
    \n实际上，二分搜索需要*十六*步。如果我们（费力地）逐步检查每一步，就能看到这一点。\n\n让我们从 100,000 个元素开始。当处理偶数个元素时，中心没有一个确切的元素。相反，有*两个*中心元素，我们任意选择其中一个进行搜索。通过搜索这个元素，我们实际上已经将其从考虑中移除，剩下\
    \ 50,000 个元素。\n\n1.  你正在开发一款分析体育运动员的软件。以下是两种不同运动项目的运动员数组：\n\n```\nbasketball_players\
    \ = [\n    {first_name: \"Jill\", last_name: \"Huang\", team: \"Gators\"},\n \
    \   {first_name: \"Janko\", last_name: \"Barton\", team: \"Sharks\"},\n    {first_name:\
    \ \"Wanda\", last_name: \"Vakulskas\", team: \"Sharks\"},\n    {first_name: \"\
    Jill\", last_name: \"Moloney\", team: \"Gators\"},\n    {first_name: \"Luuk\"\
    , last_name: \"Watkins\", team: \"Gators\"}\n]\n\nfootball_players = [\n    {first_name:\
    \ \"Hanzla\", last_name: \"Radosti\", team: \"32ers\"},\n    {first_name: \"Tina\"\
    , last_name: \"Watkins\", team: \"Barleycorns\"},\n    {first_name: \"Alex\",\
    \ last_name: \"Patel\", team: \"32ers\"},\n    {first_name: \"Jill\", last_name:\
    \ \"Huang\", team: \"Barleycorns\"},\n    {first_name: \"Wanda\", last_name: \"\
    Vakulskas\", team: \"Barleycorns\"}\n]\n```\n\n如果你仔细观察，你会发现有些运动员参与了不止一种运动。Jill\
    \ Huang 和 Wanda Vakulskas 既打篮球*又*踢足球。\n\n你需要编写一个函数，该函数接受两个运动员数组，并返回一个包含*同时*参与两种运动的运动员的数组。在这种情况下，结果应该是：\n\
    \n```\n[\"Jill Huang\", \"Wanda Vakulskas\"]\n```\n\n虽然有些运动员共享名字或姓氏，但我们可以假设只有一个特定的*全名*（即名字*和*姓氏）对应一个人。\n\
    \n我们可以使用嵌套循环的方法，将一个数组中的每个运动员与另一个数组中的每个运动员进行比较，但这样运行时复杂度将是 O(N * M)。你的任务是优化这个函数，使其运行时复杂度仅为\
    \ O(N + M)。\n\n2.  你正在编写一个函数，该函数接受一个由 0, 1, 2, 3... 直到 N 的不同整数组成的数组。然而，数组会缺少一个整数，你的函数需要*返回缺失的那个*。\n\
    \n例如，这个数组包含从 0 到 6 的所有整数，但缺少 4：\n\n```\n[2, 3, 0, 6, 1, 5]\n```\n\n因此，函数应该返回 4。\n\
    \n下一个例子包含从 0 到 9 的所有整数，但缺少 1：\n\n```\n[8, 2, 3, 9, 4, 7, 5, 0, 6]\n```\n\n在这种情况下，函数应该返回\
    \ 1。\n使用嵌套循环的方法将需要 O(N²) 的时间。你的任务是优化代码，使其运行时复杂度为 O(N)。\n\n3.  你正在开发更多的股票预测软件。你编写的函数接受一个数组，该数组包含某只股票在一段时间内的预测价格。\n\
    \n例如，看看这个包含七个价格的数组：\n\n[10, 7, 5, 8, 11, 2, 6]\n\n它预测某只股票在未来七天内将有这些价格。（第 1 天，股票收盘价为\
    \ 10 美元；第 2 天，股票收盘价为 7 美元；以此类推。）\n\n你的函数应该计算通过一次“买入”交易后跟一次“卖出”交易可能获得的最大利润。\n\n\
    在这个例子中，如果我们在股票价值 5 美元时买入，在价值 11 美元时卖出，就能赚最多的钱。这将产生每股 6 美元的利润。\n\n请注意，如果我们多次买卖，可以赚更多的钱，但目前，这个函数只关注通过*一次*购买后跟*一次*销售可能获得的最大利润。\n\
    \n现在，我们可以使用嵌套循环来找到每种可能的买卖组合的利润。然而，这将是 O(N²)，对于我们的热门交易平台来说太慢了。你的任务是优化代码，使函数运行时复杂度仅为\
    \ O(N)。\n\n4.  你正在编写一个函数，该函数接受一个数字数组，并计算数组中任意两个数字的最大乘积。乍一看，这很容易，因为我们只需找到两个最大的数字并相乘即可。然而，我们的数组可能包含负数，如下所示：\n\
    \n[5, -10, -6, 9, 4]\n\n在这种情况下，实际上是两个*最小*的数字 -10 和 -6 的乘积产生了最高乘积 60。\n\n我们可以使用嵌套循环来乘以每一对可能的数字，但这将需要\
    \ O(N²) 的时间。你的任务是优化这个函数，使其运行时复杂度为快速的 O(N)。\n\n5.  你正在创建一款分析从数百人身上采集的体温读数数据的软件。这些读数来自健康人和病人，范围在\
    \ 95 到 105 华氏度之间。\n\n这是一个温度读数的示例数组：\n\n```\n[98, 99, 95, 105, 104, 98, 101, 99,\
    \ 100, 97]\n```\n\n你需要编写一个函数，将这些读数从低到高排序。\n\n如果你使用经典的排序算法，如快速排序，这将需要 O(N log N)。然而，在这种情况下，有可能编写出更快的排序算法。\n\
    \n是的，没错。尽管你已经学过最快的排序算法是 O(N log N)，但这种情况不同。为什么？在这种情况下，读数可能的值是有限的。在这种情况下，我们可以以\
    \ O(N) 的时间对这些值进行排序。它可能是 N 乘以一个常数，但这仍然被认为是 O(N)。\n\n6.  你正在编写一个函数，该函数接受一个未排序的整数数组，并返回其中最长连续序列的长度。序列由递增\
    \ 1 的整数组成。例如，看看这个数组：\n\n```\n[10, 5, 12, 3, 55, 30, 4, 11, 2]\n```\n\n最长的连续序列是\
    \ 2-3-4-5。这四个整数形成一个递增序列，因为每个整数都比前一个大 1。虽然也有一个 10-11-12 的序列，但它只是一个包含三个整数的序列。在这种情况下，函数应该返回\
    \ 4，因为这是从该数组中可以形成的最长连续序列的长度。\n\n再看一个例子：\n\n```\n[19, 13, 15, 12, 18, 14, 17, 11]\n\
    ```\n\n这个数组的最长序列是 11-12-13-14-15，所以函数将返回 5。\n\n如果我们对数组进行排序，然后只需遍历数组一次就能找到最长的连续序列。然而，排序本身将需要\
    \ O(N log N)。你的任务是优化这个函数，使其运行时复杂度为 O(N)。"
