- md: "## CHAPTER 13\n\n## Recursive Algorithms for Speed\n\nWe've seen that understanding\
    \ recursion unlocks all sorts of new algorithms, such as traversing a filesystem\
    \ or producing anagrams. In this chapter, you're going to learn that recursion\
    \ is also the key to algorithms that can make our code run much, much faster.\n\
    \nIn previous chapters, we've encountered a number of sorting algorithms, including\
    \ Bubble Sort, Selection Sort, and Insertion Sort. In real life, however, none\
    \ of these methods are actually used to sort arrays. Most computer languages have\
    \ built-in sorting functions for arrays that save us the time and effort of implementing\
    \ our own. And in many of these languages, the sorting algorithm that is employed\
    \ under the hood is Quicksort.\n\nThe reason we're going to dig into Quicksort\
    \ (even though it's already built into many computer languages) is because by\
    \ studying how it works, you can learn how to use recursion to greatly speed up\
    \ an algorithm, and you can do the same for other practical algorithms of the\
    \ real world.\n\nQuicksort is an extremely fast sorting algorithm that is particularly\
    \ efficient for average scenarios. While in worst-case scenarios (that is, inversely\
    \ sorted arrays) it performs similarly to Insertion Sort and Selection Sort, it's\
    \ much faster for average scenarios—which are what occur most of the time.\n\n\
    Quicksort relies on a concept called *partitioning*, so we'll jump into that first.\n\
    \n## Partitioning\n\nTo *partition* an array is to take a random value from the\
    \ array—which is then called the *pivot*—and make sure that every number that\
    \ is less than the pivot ends up to the left of the pivot and that every number\
    \ greater than the pivot ends up to the right of the pivot. We accomplish partitioning\
    \ through a simple algorithm that will be described in the following example.\n\
    \nLet's say we have the following array:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_213_0.png)\n\
    \nFor consistency's sake, we'll always select the rightmost value to be our pivot\
    \ (although we can technically choose other values). In this case, the number\
    \ 3 is our pivot. We indicate this by circling it:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_213_1.png)\n\
    \nWe then assign *pointers*—one to the leftmost value of the array, and one to\
    \ the rightmost value of the array, excluding the pivot itself:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_213_2.png)\n\
    \nWe're now ready to begin the actual partition, which follows these steps. Don't\
    \ worry—the steps will become clearer shortly, when we walk through our example.\n\
    \n1. The left pointer continuously moves one cell to the right until it reaches\
    \ a value that is greater than or equal to the pivot and then stops.\n2. Then\
    \ the right pointer continuously moves one cell to the left until it reaches a\
    \ value that is less than or equal to the pivot and then stops. The right pointer\
    \ will also stop if it reaches the beginning of the array.\n3. Once the right\
    \ pointer has stopped, we reach a crossroads. If the left pointer has reached\
    \ (or gone beyond) the right pointer, we move on to Step 4. Otherwise, we swap\
    \ the values that the left and right pointers are pointing to, and then we go\
    \ back to repeat Steps 1, 2, and 3 again.\n4. Finally, we swap the pivot with\
    \ the value that the left pointer is currently pointing to.\n\nWhen we're done\
    \ with a partition, we are now assured that all values to the left of the pivot\
    \ are less than the pivot, and all values to the right of the pivot are greater\
    \ than it. And that means the pivot itself is now in its correct place within\
    \ the array, although the other values are not yet necessarily completely sorted.\n\
    \nLet's apply this to our example:\n\nStep 1: Compare the left pointer (now pointing\
    \ to 0) to our pivot (the value 3):\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_0.png)\n\
    \nSince 0 is less than the pivot, the left pointer moves on in the next step.\n\
    \nStep 2: The left pointer moves on:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_1.png)\n\
    \nWe compare the left pointer (the 5) to our pivot. Is the 5 lower than the pivot?\
    \ It's not, so the left pointer stops, and we activate the right pointer in our\
    \ next step.\n\nStep 3: Compare the right pointer (6) to our pivot. Is the value\
    \ greater than the pivot? It is, so our pointer will move on in the next step.\n\
    \nStep 4: The right pointer moves on:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_2.png)\n\
    \nWe compare the right pointer (1) to our pivot. Is the value greater than the\
    \ pivot? It's not, so our right pointer stops.\n\nStep 5: Since both pointers\
    \ have stopped, we swap the values of the two pointers:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_3.png)\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_4.png)\n\nWe then activate our\
    \ left pointer again in the next step.\n\nStep 6: The left pointer moves on:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_215_0.png)\n\nWe compare the left pointer\
    \ (2) to our pivot. Is the value less than the pivot? It is, so the left pointer\
    \ moves on.\n\nStep 7: The left pointer moves on to the next cell. Note that at\
    \ this point, both the left and right pointers are pointing to the same value:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_215_1.png)\n\nWe compare the left pointer\
    \ to our pivot. Because our left pointer is pointing to a value that is greater\
    \ than our pivot, it stops. At this point, since our left pointer has reached\
    \ our right pointer, we're done with moving pointers.\n\nStep 8: For our final\
    \ step of the partition, we swap the value that the left pointer is pointing to\
    \ with the pivot:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_215_2.png)\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_215_3.png)\n\
    \nAlthough our array isn't completely sorted, we've successfully completed a partition:\
    \ that is, since our pivot was the number 3, all numbers that are less than 3\
    \ are to its left, while all numbers greater than 3 are to its right. This also\
    \ means, by definition, that the 3 is *now in its correct place within the array*.\n\
    \n## Code Implementation: Partitioning\n\nFollowing is an implementation of a\
    \ `SortableArray` class in Python that includes a `partition` method that partitions\
    \ the array as we've described:\n\n```python\nclass SortableArray:\n    def __init__(self,\
    \ array):\n        self.array = array\n\n    def partition(self, left_pointer,\
    \ right_pointer):\n        pivot_index = right_pointer\n        pivot = self.array[pivot_index]\n\
    \n        right_pointer -= 1\n\n        while True:\n            while self.array[left_pointer]\
    \ < pivot:\n                left_pointer += 1\n\n            while self.array[right_pointer]\
    \ > pivot:\n                right_pointer -= 1\n\n            if left_pointer\
    \ >= right_pointer:\n                break\n            else:\n              \
    \  self.array[left_pointer], self.array[right_pointer] = \\\n                \
    \    self.array[right_pointer], self.array[left_pointer]\n                left_pointer\
    \ += 1\n\n        self.array[left_pointer], self.array[pivot_index] = \\\n   \
    \         self.array[pivot_index], self.array[left_pointer]\n\n        return\
    \ left_pointer\n```\n\nLet's break this code down a bit.\n\nThe partition method\
    \ accepts the starting points of the left and right pointers as parameters:\n\n\
    ```python\ndef partition(self, left_pointer, right_pointer):\n```\n\nWhen this\
    \ method is first called on an array, these pointers will point to the left and\
    \ right ends of the array, respectively. However, we'll see that Quicksort will\
    \ call this method on subsections of the array as well. Because of this, we can't\
    \ always assume the left and right pointers are always the two extremities of\
    \ the array, so they need to become method arguments. This point will be clearer\
    \ when I explain the complete Quicksort algorithm.\n\nNext, we select our pivot,\
    \ which is always the rightmost element in the range we're dealing with:\n\n```python\n\
    pivot_index = right_pointer\npivot = self.array[pivot_index]\n```\n\nOnce our\
    \ pivot has been identified, we move the right_pointer to the item immediately\
    \ left of the pivot:\n\n```python\nright_pointer -= 1\n```\n\ninefficient, though!\
    \ Use memoization to optimize it. (You don't have to understand how the Golomb\
    \ sequence works to do this exercise.)\n\n```python\ndef golomb(n):\n    if n\
    \ == 1:\n        return 1\n\n    return 1 + golomb(n - golomb(golomb(n - 1)))\n\
    ```\n\n3. Here is a solution to the unique paths problem from an exercise in the\
    \ previous chapter. (Sorry, it's a bit of a spoiler if you haven't tried doing\
    \ that exercise yet.) Use memoization to improve its efficiency:\n\n```python\n\
    def unique_paths(rows, columns):\n    if rows == 1 or columns == 1:\n        return\
    \ 1\n\n    return unique_paths(rows - 1, columns) + unique_paths(rows, columns\
    \ - 1)\n```"
  mdcn: "## 第13章\n\n## 提升速度的递归算法\n\n我们已经看到，理解递归能解锁各种新算法，比如遍历文件系统或生成变位词。在本章中，你将学习到，递归也是让代码运行得更快的关键算法。\n\
    \n在前面的章节中，我们已经接触过一些排序算法，包括冒泡排序、选择排序和插入排序。然而，在实际生活中，这些方法实际上都没有被用来对数组进行排序。大多数计算机语言都有内置的数组排序函数，这节省了我们自己实现排序的时间和精力。而在许多这些语言中，底层使用的排序算法是快速排序。\n\
    \n我们之所以要深入研究快速排序（尽管它已经内置在许多计算机语言中），是因为通过研究它的工作原理，你可以学习如何使用递归来极大地加速算法，并且你可以将同样的方法应用于现实世界中的其他实用算法。\n\
    \n快速排序是一种极其快速的排序算法，对于平均情况尤其高效。虽然在最坏情况下（即逆序数组），它的表现与插入排序和选择排序相似，但在平均情况下——这是最常发生的情况——它要快得多。\n\
    \n快速排序依赖于一个称为*分区*的概念，所以我们首先来探讨这个概念。\n\n## 分区\n\n对数组进行*分区*，就是从数组中随机选取一个值——这个值被称为*基准值*——并确保所有小于基准值的数字最终都位于基准值的左侧，所有大于基准值的数字最终都位于基准值的右侧。我们通过一个简单的算法来实现分区，该算法将在下面的例子中描述。\n\
    \n假设我们有以下数组：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_213_0.png)\n\n为了保持一致性，我们将始终选择最右边的值作为我们的基准值（尽管从技术上讲我们可以选择其他值）。在这个例子中，数字3是我们的基准值。我们通过圈出它来表示这一点：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_213_1.png)\n\n然后我们分配*指针*——一个指向数组的最左边的值，另一个指向数组的最右边的值（不包括基准值本身）：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_213_2.png)\n\n我们现在准备好开始实际的分区了，它遵循以下步骤。别担心——当我们逐步讲解示例时，这些步骤会变得更加清晰。\n\
    \n1.  左指针持续向右移动一个单元格，直到它到达一个大于或等于基准值的值，然后停止。\n2.  然后右指针持续向左移动一个单元格，直到它到达一个小于或等于基准值的值，然后停止。如果右指针到达数组的开头，它也会停止。\n\
    3.  一旦右指针停止，我们就面临一个十字路口。如果左指针已经到达（或超过）右指针，我们就进入步骤4。否则，我们交换左指针和右指针所指向的值，然后返回重复步骤1、2和3。\n\
    4.  最后，我们将基准值与左指针当前指向的值进行交换。\n\n当我们完成一次分区后，我们就可以确保基准值左侧的所有值都小于基准值，基准值右侧的所有值都大于它。这意味着基准值本身现在已经在数组中处于正确的位置，尽管其他值不一定完全排序。\n\
    \n让我们将这个应用到我们的例子中：\n\n步骤1：将左指针（现在指向0）与我们的基准值（值3）进行比较：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_0.png)\n\
    \n由于0小于基准值，左指针在下一步继续移动。\n\n步骤2：左指针继续移动：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_1.png)\n\
    \n我们将左指针（值为5）与我们的基准值进行比较。5比基准值小吗？不是，所以左指针停止，我们在下一步激活右指针。\n\n步骤3：将右指针（值为6）与我们的基准值进行比较。该值大于基准值吗？是的，所以我们的指针在下一步继续移动。\n\
    \n步骤4：右指针继续移动：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_2.png)\n\n我们将右指针（值为1）与我们的基准值进行比较。该值大于基准值吗？不是，所以我们的右指针停止。\n\
    \n步骤5：由于两个指针都已停止，我们交换两个指针的值：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_3.png)\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_214_4.png)\n\n然后我们在下一步再次激活我们的左指针。\n\
    \n步骤6：左指针继续移动：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_215_0.png)\n\n我们将左指针（值为2）与我们的基准值进行比较。该值小于基准值吗？是的，所以左指针继续移动。\n\
    \n步骤7：左指针移动到下一个单元格。注意此时，左指针和右指针都指向同一个值：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_215_1.png)\n\
    \n我们将左指针与我们的基准值进行比较。因为我们的左指针指向一个大于我们基准值的值，所以它停止。此时，由于我们的左指针已经到达我们的右指针，我们完成了指针的移动。\n\
    \n步骤8：对于分区的最后一步，我们将左指针指向的值与基准值进行交换：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_215_2.png)\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_215_3.png)\n\n尽管我们的数组还没有完全排序，但我们已经成功完成了一次分区：也就是说，由于我们的基准值是数字3，所有小于3的数字都在它的左边，而所有大于3的数字都在它的右边。根据定义，这也意味着3*现在已经在数组中处于正确的位置*。\n\
    \n## 代码实现：分区\n\n以下是Python中`SortableArray`类的一个实现，其中包含一个`partition`方法，该方法按照我们描述的方式对数组进行分区：\n\
    \n```python\nclass SortableArray:\n    def __init__(self, array):\n        self.array\
    \ = array\n\n    def partition(self, left_pointer, right_pointer):\n        pivot_index\
    \ = right_pointer\n        pivot = self.array[pivot_index]\n\n        right_pointer\
    \ -= 1\n\n        while True:\n            while self.array[left_pointer] < pivot:\n\
    \                left_pointer += 1\n\n            while self.array[right_pointer]\
    \ > pivot:\n                right_pointer -= 1\n\n            if left_pointer\
    \ >= right_pointer:\n                break\n            else:\n              \
    \  self.array[left_pointer], self.array[right_pointer] = \\\n                \
    \    self.array[right_pointer], self.array[left_pointer]\n                left_pointer\
    \ += 1\n\n        self.array[left_pointer], self.array[pivot_index] = \\\n   \
    \         self.array[pivot_index], self.array[left_pointer]\n\n        return\
    \ left_pointer\n```\n\n让我们稍微分解一下这段代码。\n\n`partition`方法接受左指针和右指针的起始点作为参数：\n\n```python\n\
    def partition(self, left_pointer, right_pointer):\n```\n\n当这个方法第一次在数组上调用时，这些指针将分别指向数组的左端和右端。然而，我们将看到快速排序也会在数组的子部分上调用这个方法。因此，我们不能总是假设左指针和右指针总是数组的两个端点，所以它们需要成为方法参数。当我解释完整的快速排序算法时，这一点会更清楚。\n\
    \n接下来，我们选择我们的基准值，它总是我们处理范围内的最右边的元素：\n\n```python\npivot_index = right_pointer\n\
    pivot = self.array[pivot_index]\n```\n\n一旦确定了基准值，我们就将`right_pointer`移动到紧邻基准值左侧的项：\n\
    \n```python\nright_pointer -= 1\n```\n\n效率低下！使用记忆化来优化它。（你不需要理解Golomb序列是如何工作的就能完成这个练习。）\n\
    \n```python\ndef golomb(n):\n    if n == 1:\n        return 1\n\n    return 1\
    \ + golomb(n - golomb(golomb(n - 1)))\n```\n\n3.  这是上一章练习中唯一路径问题的一个解决方案。（抱歉，如果你还没有尝试做那个练习，这有点剧透。）使用记忆化来提高其效率：\n\
    \n```python\ndef unique_paths(rows, columns):\n    if rows == 1 or columns ==\
    \ 1:\n        return 1\n\n    return unique_paths(rows - 1, columns) + unique_paths(rows,\
    \ columns - 1)\n```"
