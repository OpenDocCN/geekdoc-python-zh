    \ earlier, the following traits of a heap are always true:\n\n+   - To find the\
    \ left child of any node, we can use the formula `(index * 2) + 1`.\n- To find\
    \ the right child of any node, we can use the formula `(index * 2) + 2`.\n\nTake\
