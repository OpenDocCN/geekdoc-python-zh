- md: "A doubly linked list allows for a lot more flexibility, as we can move both\
    \ forward *and* backward through the list. In fact, we can even start with the\
    \ tail and work our way backward to the head.\n\n## Queues as Doubly Linked Lists\n\
    \nBecause doubly linked lists have immediate access to both the front and end\
    \ of the list, they can insert data on either side at O(1) as well as delete data\
    \ on either side at O(1).\n\nBecause doubly linked lists can insert data at the\
    \ end in O(1) time and delete data from the front in O(1) time, *they make the\
    \ perfect underlying data structure for a queue*.\n\nWe looked at [Queues, on\
    \ page 143](https://example.com), and you'll recall that they are lists of items\
    \ in which data can only be inserted at the end and removed from the beginning.\
    \ You learned there that queues are an example of an abstract data type and that\
    \ we were able to use an array to implement them under the hood.\n\nNow, since\
    \ queues insert at the end and delete from the beginning, arrays are only so good\
    \ as the underlying data structure. While arrays are O(1) for insertions at the\
    \ end, they're O(N) for deleting from the beginning.\n\nA doubly linked list,\
    \ on the other hand, is O(1) for both inserting at the end *and* for deleting\
    \ from the beginning. That's what makes it a perfect fit for serving as the queue's\
    \ underlying data structure.\n\n## Code Implementation: Queue Built upon a Doubly\
    \ Linked List\n\nBefore implementing the queue itself, we'll first add one more\
    \ method to our DoublyLinkedList class. This `pop_head` method removes the head\
    \ from the list and returns it:\n\n```\ndef pop_head(self):\n    popped_node =\
    \ self.first_node\n    self.first_node = self.first_node.next_node\n    self.first_node.previous_node\
    \ = None\n    return popped_node\n```\n\nAs you can see, we effectively delete\
    \ the first node by changing the list's `self.first_node` to be what is currently\
    \ the second node. We also make sure that the new head doesn't link to any previous\
    \ node. Finally, we return the node we just deleted.\n\nWith this in place, we\
    \ can now create a queue implementation that is built upon a doubly linked list:\n\
    \n```\nimport doubly_linked_list\n\nclass Queue:\n    def __init__(self):\n  \
    \      self.data = doubly_linked_list.DoublyLinkedList()\n\n    def enqueue(self,\
    \ element):\n        self.data.append(element)\n\n    def dequeue(self):\n   \
    \     dequeued_node = self.data.pop_head()\n        return dequeued_node.data\n\
    \n    def read(self):\n        if not self.data.first_node:\n            return\
    \ None\n        return self.data.first_node.data\n```\n\nThe Queue class implements\
    \ its methods on top of our DoublyLinkedList. The enqueue method relies on the\
    \ append method of our DoublyLinkedList:\n\n```\ndef enqueue(self, element):\n\
    \    self.data.append(element)\n```\n\nSimilarly, the dequeue method takes advantage\
    \ of the linked list's ability to delete from the front of the list:\n\n```\n\
    def dequeue(self):\n    dequeued_node = self.data.pop_head()\n    return dequeued_node.data\n\
    ```\n\nBy implementing our queue with a doubly linked list, we can now both insert\
    \ and delete from the queue at a speedy O(1). And that's doubly awesome.\n\n##\
    \ Wrapping Up\n\nAs we've seen, the subtle differences between arrays and linked\
    \ lists unlock new ways to make our code faster than ever.\n\nBy looking at linked\
    \ lists, you've also learned the concept of nodes. However, the linked list is\
    \ only the simplest of node-based data structures. In the coming chapters, you'll\
    \ learn about node-based structures that are both more complex and more interesting—and\
    \ that will reveal new worlds about how nodes can yield tremendous power and efficiency.\n\
    \n## Exercises\n\nThe following exercises provide you with the opportunity to\
    \ practice with linked lists. The solutions to these exercises are found in the\
    \ section [Chapter 14, on page 449](#).\n\n1. Add a method to the classic LinkedList\
    \ class that prints all the values of the list.\n2. Add a method to the DoublyLinkedList\
    \ class that prints all the values of the list in reverse order.\n3. Add a method\
    \ to the classic LinkedList class that returns the last value from the list. Assume\
    \ you don't know how many elements are in the list.\n4. Here's a tricky one. Add\
    \ a method to the classic LinkedList class that reverses the list; that is, if\
    \ the original list is A -> B -> C, all of the list's links should change so that\
    \ C -> B -> A.\n5. Here's a brilliant little linked list puzzle for you. Let's\
    \ say you have access to a node from somewhere in the middle of a classic linked\
    \ list but not to the linked list itself; that is, you have a variable that points\
    \ to an instance of Node, but you don't have access to the LinkedList instance.\
    \ In this situation, if you follow this node's link, you can find all the values\
    \ from this middle node until the end, but you have no way to find the nodes that\
    \ precede this node in the list.\n\nWrite code that will effectively delete this\
    \ node from the list. The entire remaining list should remain complete, with only\
    \ this node removed.\n\n# CHAPTER 15\n\n## Speeding Up All the Things with Binary\
    \ Search Trees\n\nSometimes, we may want to arrange our data in a specific order.\
    \ For example, we may want an alphabetized list of names or a list of products\
    \ in order of lowest price to highest.\n\nWhile we can use a sorting algorithm\
    \ such as Quicksort to arrange our data into perfect ascending order, it comes\
    \ at a cost. As we've seen, even the fastest algorithms take O(N log N) time.\
    \ So if we're going to want our data sorted *often*, it would be sensible to always\
    \ keep our data in sorted order in the first place so that we never need to resort\
    \ it.\n\nAn ordered array is a simple but effective tool for keeping data in order.\
    \ It's also fast for certain operations, as it has O(1) reads and O(log N) search\
    \ (when using binary search).\n\nHowever, ordered arrays have a drawback.\n\n\
    When it comes to insertions and deletions, ordered arrays are relatively slow.\
    \ Whenever a value is inserted into an ordered array, we first shift all greater\
    \ values one cell to the right. And when a value is deleted from an ordered array,\
    \ we shift all greater values one cell to the left. This takes N steps in a worst-case\
    \ scenario (inserting into or deleting from the first cell of the array), and\
    \ N / 2 steps on average. Either way, it's O(N), and O(N) is relatively slow for\
    \ a simple insertion or deletion.\n\nNow, if we were looking for a data structure\
    \ that delivers all-around amazing speed, a hash table is a great choice. Hash\
    \ tables are O(1) for search, insertion, and deletion. However, they don't maintain\
    \ order, and order is what we need for our alphabetized-list application.\n\n\
    So what do we do if we want a data structure that maintains order yet *also* has\
    \ fast search, insertion, and deletion? Neither an ordered array nor a hash table\
    \ is ideal.\n\nEnter the binary search tree.\n\n## Trees\n\nYou were introduced\
    \ to node-based data structures in the previous chapter with linked lists. In\
    \ a classic linked list, each node contains a link that connects the node to a\
    \ single other node. A *tree* is also a node-based data structure, but within\
    \ a tree each node can have links to *multiple* nodes.\n\nHere is a visualization\
    \ of a simple tree:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_258_0.png)\n\n\
    In this example, each node has links that lead to two other nodes. For the sake\
    \ of simplicity, we can represent this tree visually without showing all the memory\
    \ addresses:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_258_1.png)\n\nTrees come\
    \ with their own unique nomenclature:\n\n- The uppermost node (in our example,\
    \ “j”) is called the *root*. Yes, in our picture the root is at the *top* of the\
    \ tree; it’s how trees are typically depicted.\n- In our example, we'd say that\
    \ \"j\" is a *parent* to \"m\" and \"b\". Conversely, \"m\" and \"b\" are *children*\
    \ of \"j\". Similarly, the \"m\" is a parent of \"q\" and \"z\", and \"q\" and\
    \ \"z\" are children of \"m\".\n- As in a family tree, a node can have *descendants*\
    \ and *ancestors*. A node's descendants are *all* the nodes that stem from a node,\
    \ while a node's ancestors are *all* the nodes that it stems from. In our example,\
    \ \"j\" is the ancestor of all the other nodes in the tree, and all the other\
    \ nodes are, therefore, descendants of \"j\".\n- Trees are said to have *levels*.\
    \ Each level is a row within the tree. Our example tree has three levels:\n\n\
    ![](img/c0a46c67bb2536aa545ec1bd7065e742_259_0.png)\n\n- One property of a tree\
    \ is how *balanced* it is. A tree is balanced when its nodes' subtrees have the\
    \ same number of nodes in it.\n\nFor instance, the preceding tree is said to be\
    \ perfectly balanced. If you look at each node, its two subtrees have the same\
    \ number of nodes. The root node (\"j\") has two subtrees, which each contain\
    \ three nodes. You'll see that the same is also true for every node in the tree.\
    \ For example, the \"m\" node also has two subtrees where the two subtrees each\
    \ contain one node.\n\nThe following tree, on the other hand, is *imbalanced*:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_259_1.png)\n\nAs you can see, the root's\
    \ right subtree contains more nodes than its left subtree, causing an imbalance."
  mdcn: "双向链表提供了更大的灵活性，因为我们可以在列表中向前*和*向后移动。事实上，我们甚至可以从尾部开始，反向遍历到头部。\n\n## 作为双向链表的队列\n\
    \n因为双向链表可以立即访问列表的前端和末端，它们可以在 O(1) 时间内向任一侧插入数据，也可以在 O(1) 时间内从任一侧删除数据。\n\n因为双向链表可以在\
    \ O(1) 时间内向末端插入数据，并在 O(1) 时间内从前端删除数据，*它们是队列的完美底层数据结构*。\n\n我们之前在[第 143 页的队列](https://example.com)中讨论过，你会记得它们是数据项的列表，数据只能在末端插入，从开头移除。你在那里了解到队列是抽象数据类型的一个例子，并且我们能够使用数组在底层实现它们。\n\
    \n现在，由于队列在末端插入，在开头删除，数组作为底层数据结构只是勉强够用。虽然数组在末端插入是 O(1)，但从开头删除是 O(N)。\n\n另一方面，双向链表在末端插入*和*从开头删除都是\
    \ O(1)。这就是为什么它非常适合作为队列的底层数据结构。\n\n## 代码实现：基于双向链表构建的队列\n\n在实现队列本身之前，我们将首先为我们的 DoublyLinkedList\
    \ 类添加一个方法。这个 `pop_head` 方法从列表中移除头部节点并返回它：\n\n```\ndef pop_head(self):\n    popped_node\
    \ = self.first_node\n    self.first_node = self.first_node.next_node\n    self.first_node.previous_node\
    \ = None\n    return popped_node\n```\n\n如你所见，我们通过将列表的 `self.first_node` 更改为当前的第二个节点来有效地删除第一个节点。我们还确保新头部不链接到任何先前的节点。最后，我们返回刚刚删除的节点。\n\
    \n有了这个方法，我们现在可以创建一个基于双向链表构建的队列实现：\n\n```\nimport doubly_linked_list\n\nclass Queue:\n\
    \    def __init__(self):\n        self.data = doubly_linked_list.DoublyLinkedList()\n\
    \n    def enqueue(self, element):\n        self.data.append(element)\n\n    def\
    \ dequeue(self):\n        dequeued_node = self.data.pop_head()\n        return\
    \ dequeued_node.data\n\n    def read(self):\n        if not self.data.first_node:\n\
    \            return None\n        return self.data.first_node.data\n```\n\nQueue\
    \ 类在其 DoublyLinkedList 之上实现其方法。enqueue 方法依赖于 DoublyLinkedList 的 append 方法：\n\n\
    ```\ndef enqueue(self, element):\n    self.data.append(element)\n```\n\n类似地，dequeue\
    \ 方法利用了链表能够从列表前端删除的能力：\n\n```\ndef dequeue(self):\n    dequeued_node = self.data.pop_head()\n\
    \    return dequeued_node.data\n```\n\n通过使用双向链表实现我们的队列，我们现在可以以快速的 O(1) 时间向队列插入和删除数据。这真是双重棒极了。\n\
    \n## 总结\n\n正如我们所看到的，数组和链表之间的细微差别为我们提供了让代码比以往更快的新方法。\n\n通过研究链表，你还学习了节点的概念。然而，链表只是基于节点的数据结构中最简单的一种。在接下来的章节中，你将学习更复杂、更有趣的基于节点的结构——这些结构将揭示节点如何产生巨大威力和效率的新世界。\n\
    \n## 练习\n\n以下练习为你提供了练习链表的机会。这些练习的答案可以在[第 14 章，第 449 页](#)中找到。\n\n1.  向经典的 LinkedList\
    \ 类添加一个方法，打印列表的所有值。\n2.  向 DoublyLinkedList 类添加一个方法，以相反的顺序打印列表的所有值。\n3.  向经典的\
    \ LinkedList 类添加一个方法，返回列表的最后一个值。假设你不知道列表中有多少个元素。\n4.  这是一个棘手的问题。向经典的 LinkedList\
    \ 类添加一个方法来反转列表；也就是说，如果原始列表是 A -> B -> C，列表的所有链接都应更改为 C -> B -> A。\n5.  这里有一个绝妙的链表小谜题。假设你可以访问经典链表中间某个节点，但无法访问链表本身；也就是说，你有一个指向\
    \ Node 实例的变量，但无法访问 LinkedList 实例。在这种情况下，如果你沿着这个节点的链接，你可以找到从这个中间节点到末尾的所有值，但你无法找到列表中位于此节点之前的节点。\n\
    \n编写代码来有效地从列表中删除此节点。整个剩余列表应保持完整，只删除此节点。\n\n# 第 15 章\n\n## 用二叉搜索树加速一切\n\n有时，我们可能希望以特定顺序排列我们的数据。例如，我们可能希望有一个按字母顺序排列的姓名列表，或者一个按价格从低到高排序的产品列表。\n\
    \n虽然我们可以使用快速排序等排序算法将数据排列成完美的升序，但这是有代价的。正如我们所看到的，即使最快的算法也需要 O(N log N) 时间。因此，如果我们希望数据*经常*排序，那么从一开始就始终将数据保持在排序状态是明智的，这样我们就不需要重新排序。\n\
    \n有序数组是保持数据有序的简单而有效的工具。对于某些操作来说它也很快，因为它具有 O(1) 的读取和 O(log N) 的搜索（当使用二分查找时）。\n\n\
    然而，有序数组有一个缺点。\n\n在插入和删除方面，有序数组相对较慢。每当一个值插入到有序数组中时，我们首先将所有更大的值向右移动一个单元格。当一个值从有序数组中删除时，我们将所有更大的值向左移动一个单元格。在最坏的情况下（插入或删除数组的第一个单元格），这需要\
    \ N 步，平均需要 N / 2 步。无论哪种方式，它都是 O(N)，而对于简单的插入或删除来说，O(N) 是相对较慢的。\n\n现在，如果我们正在寻找一种能提供全方位惊人速度的数据结构，哈希表是一个很好的选择。哈希表在搜索、插入和删除方面都是\
    \ O(1)。然而，它们不保持顺序，而顺序正是我们的字母列表应用程序所需要的。\n\n那么，如果我们想要一种既保持顺序*又*具有快速搜索、插入和删除的数据结构，我们该怎么办？有序数组和哈希表都不是理想的选择。\n\
    \n二叉搜索树应运而生。\n\n## 树\n\n你在上一章通过链表接触了基于节点的数据结构。在经典的链表中，每个节点包含一个将节点连接到单个其他节点的链接。*树*也是一种基于节点的数据结构，但在树中，每个节点可以有链接到*多个*节点。\n\
    \n这是一个简单树的可视化：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_258_0.png)\n\n在这个例子中，每个节点都有指向另外两个节点的链接。为了简单起见，我们可以在不显示所有内存地址的情况下直观地表示这棵树：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_258_1.png)\n\n树有其独特的命名法：\n\n- 最上面的节点（在我们的例子中是“j”）被称为*根*。是的，在我们的图中，根位于树的*顶部*；这是树通常的描绘方式。\n\
    - 在我们的例子中，我们可以说“j”是“m”和“b”的*父节点*。反过来，“m”和“b”是“j”的*子节点*。同样，“m”是“q”和“z”的父节点，而“q”和“z”是“m”的子节点。\n\
    - 就像在家族树中一样，一个节点可以有*后代*和*祖先*。一个节点的后代是*所有*从该节点衍生出来的节点，而一个节点的祖先是它所衍生出来的*所有*节点。在我们的例子中，“j”是树中所有其他节点的祖先，因此所有其他节点都是“j”的后代。\n\
    - 树被认为有*层级*。每个层级是树中的一行。我们的示例树有三个层级：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_259_0.png)\n\
    \n- 树的一个属性是它的*平衡性*。当节点的子树具有相同数量的节点时，树是平衡的。\n\n例如，前面的树被认为是完美平衡的。如果你看每个节点，它的两个子树具有相同数量的节点。根节点（“j”）有两个子树，每个子树包含三个节点。你会看到树中的每个节点也是如此。例如，“m”节点也有两个子树，每个子树包含一个节点。\n\
    \n另一方面，下面的树是*不平衡的*：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_259_1.png)\n\n\
    如你所见，根的右子树包含的节点比左子树多，导致了不平衡。"
