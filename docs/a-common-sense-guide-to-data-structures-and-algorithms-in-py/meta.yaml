    # Trie Insertion


    Inserting a new word into a trie is similar to searching for an existing word.
    We first search to see if the word already exists in the trie. If it doesn''t,
    we insert the new word.


    Here''s how the algorithm goes:


    +   1. We establish a variable called `current_node`. At the beginning of our
    algorithm, this points to the root node.

    2. We iterate over each character of our search string. Here, our search string
    represents the new word we''re inserting. We call it a search string since we''re
    also searching whether the string already exists in the trie.

    3. As we point to each character of our search string, we look to see if the `current_node`
    has a child with that character as a key.

    4. If it does, we update the `current_node` to become that child node, and we
    go back to Step 2, moving on to the next character of our search string.

    5. If the `current_node` does *not* have a child node that matches the current
    character, we create such a child node and update the `current_node` to be this
    new node. We then go back to Step 2, moving on to the next character of our search
    string.

    6. After we insert the final character of our new word, we add a "*" child to
    the last node to indicate the word is complete.


    Let''s see this in action by inserting the word "can" into our earlier example
    trie.


    Setup: We set the `current_node` to be the root node. We also point to the first
    character of our string, which is the "c", as shown in the top [diagram on page
    315](diagram on page 315).


    Step 1: The root node has a "c" child key, so we turn that key''s value into the
    `current_node`. We also point to the next character of our new word, the "a",
    as shown in the bottom [diagram on page 315](diagram on page 315).


    Step 2: We inspect the `current_node` for a child with the key of "a". There is
    one, so we make that the `current_node` and point to the next character of our
    string, which is the "n", as shown in the top [diagram on page 316](diagram on
    page 316).


    Step 3: The `current_node` does *not* have an "n", so we need to create that child,
    as shown in the bottom [diagram on page 316](diagram on page 316).'
