    \ 10 开始倒计时，并将每个数字打印到控制台。\n\n在几乎所有可以使用循环的情况下，你也可以使用递归。现在，仅仅因为你*可以*使用递归，并不意味着你*应该*使用递归。递归是一种允许编写优雅代码的工具。在前面的例子中，递归方法不一定比使用经典循环更优雅或更高效。然而，我们很快就会遇到递归大放异彩的例子。与此同时，让我们继续探索递归的工作原理。\n\
    \n## 基准情况\n\n让我们继续分析 `countdown` 函数。为了简洁，我们将跳过一些步骤...\n\n第21步：我们调用 `countdown(0)`。\n\
    \n第22步：我们将 `number`（即 0）打印到控制台。\n\n第23步：我们调用 `countdown(-1)`。\n\n第24步：我们将 `number`（即\
    \ -1）打印到控制台。\n\n糟糕。如你所见，我们的解决方案并不完美，因为最终会无限打印负数。\n\n为了完善我们的解决方案，我们需要一种方法在 0 处结束倒计时，并防止递归永远继续下去。\n\
    \n我们可以通过添加一个条件语句来解决这个问题，该语句确保如果 `number` 当前为 0，我们不再调用 `countdown()`：\n\n```\n\
    def countdown(number):\n    print(number)\n    if number == 0:\n        return\n\
    \    else:\n        countdown(number - 1)\n```\n\n现在当 `number` 为 0 时，我们的代码将不再调用\
    \ `countdown()` 函数，而是直接返回，从而防止再次调用 `countdown()`。\n\n在递归术语中，函数*不会*递归的情况被称为*基准情况*。因此，0\
    \ 是我们 `countdown()` 函数的基准情况。再次强调，每个递归函数都需要至少一个基准情况来防止它无限地调用自身。\n\n## 阅读递归代码\n\n\
    习惯递归需要时间和练习，你最终将学习*两套*技能：*阅读*递归代码和*编写*递归代码。阅读递归代码相对容易一些，所以让我们先练习一下。\n\n我们将通过查看另一个例子来做到这一点：计算阶乘。\n\
    \n*阶乘*最好用一些例子来说明。\n\n3 的阶乘是：\n3 * 2 * 1 = 6\n\n5 的阶乘是：\n5 * 4 * 3 * 2 * 1 = 120\n\
    \n以此类推。\n\n这是一个返回数字阶乘的递归实现：\n\n```\ndef factorial(number):\n    if number <= 1:\n\
    \        return 1\n    else:\n        return number * factorial(number - 1)\n\
    ```\n\n这段代码乍一看可能有点令人困惑。要逐步分析代码以了解其功能，我建议采用以下过程：\n\n1.  识别基准情况。\n2.  针对基准情况逐步分析函数。\n\
    3.  识别倒数第二种情况。这是基准情况之前的那个情况，我稍后会演示。\n4.  针对倒数第二种情况逐步分析函数。\n5.  通过识别你刚刚分析的情况之前的情况并针对该情况逐步分析函数来重复此过程。\n\
    \n让我们将此过程应用于前面的代码。如果我们分析代码，我们会很快注意到有两条路径。一条路径是 `number` 小于或等于 1，另一条路径是 `number`\
    \ 大于 1：\n\n```\nif number <= 1:  # 路径 1\n    ...\nelse:  # 路径 2：number 大于 1\n\
    \    ...\n```\n\n我们可以看到递归发生在 `else` 路径内，因为 `factorial` 调用了自身：\n\n```\nelse:\n\
    \    return number * factorial(number - 1)\n```\n\n因此，基准情况一定是第一条路径，因为它是没有发生递归的路径：\n\
    \n```\nif number <= 1:\n    return 1\n```\n\n那么，我们可以得出结论，基准情况是当 `number` 小于或等于\
    \ 1 时。\n\n接下来，让我们假设处理的是基准情况，例如 `factorial(1)`，来逐步分析 `factorial` 方法。同样，我们方法中的相关代码如下：\n\
    \n```\nif number <= 1:\n    return 1\n```\n\n嗯，这很简单——它是基准情况，所以实际上没有发生递归。如果我们调用\
    \ `factorial(1)`，该方法只是返回 1。好的，拿张餐巾纸把这个事实写下来：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_166_0.png)\n\
    \n接下来，让我们向上移动到下一个情况，即 `factorial(2)`。我们方法中的相关代码行是：\n\n```\nelse:\n    return number\
    \ * factorial(number - 1)\n```\n\n因此，调用 `factorial(2)` 将返回 `2 * factorial(1)`。要计算\
    \ `2 * factorial(1)`，我们需要知道 `factorial(1)` 返回什么。如果你查看你的餐巾纸，你会看到它返回 1。所以 `2 * factorial(1)`\
    \ 将返回 `2 * 1`，结果恰好是 2。\n\n把这个事实加到你的餐巾纸上：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_166_1.png)\n\
    \n现在，如果我们调用 `factorial(3)` 会发生什么？同样，相关的代码行是：\n\n```\nelse:\n    return number\
    \ * factorial(number - 1)\n```\n\n所以这将转化为 `return 3 * factorial(2)`。`factorial(2)`\
    \ 返回什么？你不必再重新计算一遍，因为它就在你的餐巾纸上！它返回 2。所以，`factorial(3)` 将返回 6（因为 3 * 2 = 6）。继续把这个精彩的事实加到你的餐巾纸上：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_166_2.png)\n\n花点时间自己算算 `factorial(4)`\
    \ 会返回什么。\n\n如你所见，从基准情况开始分析并逐步构建是推理递归代码的好方法。\n\n## 计算机眼中的递归\n\n为了完整理解递归，我们需要看看计算机本身是如何处理递归函数的。人类使用前面的“餐巾纸”方法推理递归是一回事。然而，计算机必须完成从函数内部调用函数的棘手工作。\n\
    \n所以让我们分解计算机执行递归函数的过程。\n\n假设我们调用 `factorial(3)`。由于 3 不是基准情况，计算机到达这一行：\n\n```\n\
    return number * factorial(number - 1)\n```\n\n这随后启动了函数 `factorial(2)`。\n\n但有一个问题。当计算机开始运行\
    \ `factorial(2)` 时，计算机是否已经完成了 `factorial(3)` 的运行？\n\n这就是递归对计算机来说棘手的地方。在计算机到达 `factorial(3)`\
    \ 的 `end` 关键字之前，它还没有完成 `factorial(3)`。所以我们进入了一个奇怪的情况。计算机尚未完成执行 `factorial(3)`，却在\
    \ `factorial(3)` *仍在进行中*时开始运行 `factorial(2)`。\n\n而 `factorial(2)` 并不是故事的结局，因为\
    \ `factorial(2)` **触发**了 `factorial(1)`。所以这是一件疯狂的事情：在仍在运行 `factorial(3)` 的过程中，计算机调用了\
    \ `factorial(2)`。而在运行 `factorial(2)` 的过程中，计算机运行了 `factorial(1)`。结果，`factorial(1)`\
    \ 在 `factorial(2)` 和 `factorial(3)` *两者*的中间运行。\n\n计算机如何跟踪所有这些？它需要某种方式来记住，在完成 `factorial(1)`\
    \ 之后，它需要回去完成 `factorial(2)` 的运行。然后它需要记住在完成 `factorial(2)` 之后完成 `factorial(3)`。\n\
    \n## 调用栈\n\n幸运的是，你最近在[第9章，打造优雅代码，第133页](https://example.com)中学习了栈。计算机使用一个栈来跟踪它正在调用哪些函数。这个栈被恰当地称为*调用栈*。\n\
    \n以下是在我们的阶乘示例中调用栈的工作原理。\n\n计算机开始调用 `factorial(3)`。然而，在方法完成执行之前，`factorial(2)`\
    \ 被调用。为了跟踪计算机仍在 `factorial(3)` 的中间，计算机将该信息推送到调用栈上：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_167_0.png)\n\
    \n这表明计算机正在 `factorial(3)` 的中间。（实际上，计算机还需要保存它正在执行的行号，以及其他一些东西，如变量值，但我让图表保持简单。）"
