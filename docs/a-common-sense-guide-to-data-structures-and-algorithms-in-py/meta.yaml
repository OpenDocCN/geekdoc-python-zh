    \ False\n\n    return True\n```\n\nNow, how many steps did this algorithm take?\
    \ We iterated through each item of the *larger* array once to build the hash table.\n\
    \nAnd we iterated through each item of the *smaller* array, taking just one step\
    \ per item to look up the item in the hash table. Remember, a hash table lookup\
    \ takes just one step.\n\nIf we say that N is the total number of items of both\
    \ arrays combined, our algorithm is O(N), since we touched each item just once.\
    \ We spent one step on each item from the larger array, followed by one step on\
    \ each item from the smaller array.\n\nThat's a *huge* win over our first algorithm,\
