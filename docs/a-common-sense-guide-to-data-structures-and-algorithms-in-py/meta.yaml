  md: "With this in mind, we should design our algorithm to keep track of these four\
    \ numbers:\n\n+   - The greatest number\n- The second-to-greatest number\n- The\
    \ lowest number\n- The second-to-lowest number\n\nWe can then compare the product\
    \ of the two greatest numbers versus the product of the two lowest numbers. And\
    \ whichever product is greater is the greatest product in the array.\n\nNow, how\
    \ do we find the greatest two numbers and the lowest two numbers? If we sorted\
    \ the array, that would be easy. But that’s still O(N log N), and the instructions\
    \ say that we can achieve O(N).\n\nIn fact, we can find all four numbers in *a\
    \ single pass* through the array. It’s time to get greedy again.\n\nHere’s the\
    \ code, followed by its explanation:\n\n```\ndef greatest_product(array):\n  \
    \  greatest_number = float(\"-inf\")\n    second_to_greatest_number = float(\"\
    -inf\")\n\n    lowest_number = float(\"inf\")\n    second_to_lowest_number = float(\"\
    inf\")\n\n    for number in array:\n        if number >= greatest_number:\n  \
    \          second_to_greatest_number = greatest_number\n            greatest_number\
    \ = number\n        elif number > second_to_greatest_number:\n            second_to_greatest_number\
    \ = number\n\n        if number <= lowest_number:\n            second_to_lowest_number\
    \ = lowest_number\n            lowest_number = number\n        elif number < second_to_lowest_number:\n\
    \            second_to_lowest_number = number\n\n    greatest_product_from_two_highest\
    \ = (greatest_number\n                                        * second_to_greatest_number)\n\
    \n    greatest_product_from_two_lowest = (lowest_number\n                    \
    \                   * second_to_lowest_number)\n\n    if (greatest_product_from_two_highest\n\
    \            > greatest_product_from_two_lowest):\n        return greatest_product_from_two_highest\n\
    \    else:\n        return greatest_product_from_two_lowest\n```"
