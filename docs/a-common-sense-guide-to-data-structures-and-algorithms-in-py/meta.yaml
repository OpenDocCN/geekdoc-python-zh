- img_proc: true
  md: 'Armed with the concept of hash functions, we can now understand how a hash
    table works.


    # Building a Thesaurus for Fun and Profit, but Mainly Profit


    On nights and weekends, you''re single-handedly working on a stealth startup that
    will take over the world. It''s...a thesaurus app. But this isn''t any *old* thesaurus
    app—this is Quickasaurus. And you know that it will totally disrupt the billion-dollar
    thesaurus market. When a user looks up a word in Quickasaurus, it returns just
    *one* synonym, instead of *every* possible synonym, as old-fashioned thesaurus
    apps do.


    Since every word has an associated synonym, this is a great use case for a hash
    table. After all, a hash table is a list of paired items. Let''s get started.


    We can represent our thesaurus using a hash table:


    ```

    thesaurus = {}

    ```


    Under the hood, a hash table stores its data in a bunch of cells in a row, similar
    to an array. Each cell has a corresponding number. For example:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_131_0.png)


    (We left off index 0 since nothing would be stored there given our multiplication
    hash function.)


    Let''s add our first entry into the hash table:


    ```

    thesaurus["bad"] = "evil"

    ```


    In code, our hash table now looks like this:


    ```

    {"bad": "evil"}

    ```


    Let''s explore how the hash table stores this data.


    First, the computer applies the hash function to the key. Again, we''ll be using
    the multiplication hash function described previously. So this would compute as:


    ```

    BAD = 2 * 1 * 4 = 8

    ```'
