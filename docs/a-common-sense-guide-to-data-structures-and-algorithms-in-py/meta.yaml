  md: "Nothing is wrong with this implementation, but it may have never occurred to\
    \ you that you don't *have* to use a loop.\n\nHow?\n\nLet's try recursion instead.\
    \ Here's a first attempt at using recursion to implement our countdown function:\n\
    \n```\ndef countdown(number):\n    print(number)\n    countdown(number - 1)\n\
    ```\n\nLet's walk through this code step by step.\n\nStep 1: We call countdown(10),\
    \ so the argument variable number starts out as 10.\n\nStep 2: We print number\
    \ (which contains the value 10) to the console.\n\nStep 3: Before the countdown\
    \ function is complete, it calls countdown(9), since number - 1 is 9.\n\nStep\
    \ 4: countdown(9) begins running. In it, we print number (which is currently 9)\
    \ to the console.\n\nStep 5: Before countdown(9) is complete, it calls countdown(8).\n\
    \nStep 6: countdown(8) begins running. We print 8 to the console.\n\nBefore we\
    \ continue stepping through the code, note how we're using recursion to achieve\
    \ our goal. We're not using any loop constructs, but by simply having the countdown\
    \ function call itself, we're able to count down from 10 and print each number\
    \ to the console.\n\nIn almost any case in which you can use a loop, you can also\
    \ use recursion. Now, just because you *can* use recursion doesn't mean that you\
    \ *should* use recursion. Recursion is a tool that allows for writing elegant\
    \ code. In the preceding example, the recursive approach isn't necessarily any\
    \ more beautiful or efficient than using a classic loop. However, we'll soon encounter\
    \ examples in which recursion shines. In the meantime, let's continue exploring\
    \ how recursion works.\n\n# The Base Case\n\nLet's continue our walk-through of\
    \ the countdown function. We'll skip a few steps for brevity...\n\nStep 21: We\
    \ call countdown(0)."
