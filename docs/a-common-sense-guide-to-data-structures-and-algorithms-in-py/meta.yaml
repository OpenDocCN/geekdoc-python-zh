    \     dequeued_node = self.data.pop_head()\n        return dequeued_node.data\n\
    \n    def read(self):\n        if not self.data.first_node:\n            return\
    \ None\n        return self.data.first_node.data\n```\n\nThe Queue class implements\
    \ its methods on top of our DoublyLinkedList. The enqueue method relies on the\
    \ append method of our DoublyLinkedList:\n\n```\ndef enqueue(self, element):\n\
    \    self.data.append(element)\n```\n\nSimilarly, the dequeue method takes advantage\
    \ of the linked list's ability to delete from the front of the list:\n\n```\n\
    def dequeue(self):\n    dequeued_node = self.data.pop_head()\n    return dequeued_node.data\n\
    ```\n\nBy implementing our queue with a doubly linked list, we can now both insert\
    \ and delete from the queue at a speedy O(1). And that's doubly awesome.\n\n#\
    \ Wrapping Up\n\nAs we've seen, the subtle differences between arrays and linked\
    \ lists unlock new ways to make our code faster than ever.\n\nBy looking at linked\
    \ lists, you've also learned the concept of nodes. However, the linked list is\
    \ only the simplest of node-based data structures. In the coming chapters, you'll\
    \ learn about node-based structures that are both more complex and more interesting—and\
