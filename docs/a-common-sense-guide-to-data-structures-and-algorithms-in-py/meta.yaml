  - '[PAGE 371]


    Here''s a weighted graph that represents a basic map of several major cities in
    the United States:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_371_0.png)


    In this graph, each edge is accompanied by a number that represents the distance
    in miles between the cities the edge connects. For example, there are 714 miles
    between Chicago and New York City.


    It''s also possible to have weighted graphs that are also directional. In the
    following example, we can see that although a flight from Dallas to Toronto is
    $138, a flight from Toronto back to Dallas is $216:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_371_1.png)'
  - "[PAGE 372]\n\n# Weighted Graphs in Code\n\nWe need to make a slight modification\
    \ to our code if we want to add weights to our graph. One way to do this is to\
    \ use a hash table to represent the adjacent vertices rather than using an array:\n\
    \n```\nclass WeightedGraphVertex:\n    def __init__(self, value):\n        self.value\
    \ = value\n        self.adjacent_vertices = {}\n\n    def add_adjacent_vertex(self,\
    \ vertex, weight):\n        self.adjacent_vertices[vertex] = weight\n```\n\nAs\
    \ you can see, self.adjacent_vertices is now a hash table instead of an array.\
    \ The hash table will contain key-value pairs, where in each pair, the adjacent\
    \ vertex is the key and the weight (of the edge from this vertex to the adjacent\
    \ vertex) is the value.\n\nWhen we use the add_adjacent_vertex method to add an\
    \ adjacent vertex, we now pass in both the adjacent vertex as well as the weight.\n\
    \nSince we'll continue to deal with the example of a graph that depicts flight\
    \ fares to and from various cities, we'll create a special class called City.\
    \ This is the same implementation as the preceding WeightedGraphVertex but uses\
    \ class and variable names appropriate to our use case:\n\n```\nclass City:\n\
    \    def __init__(self, name):\n        self.name = name\n        self.routes\
    \ = {}\n\n    def add_route(self, city, price):\n        self.routes[city] = price\n\
    ```\n\nSo if we want to create the Dallas–Toronto flight price graph from earlier,\
    \ we can run the following code:\n\n```\ndallas = City(\"Dallas\")\ntoronto =\
    \ City(\"Toronto\")\n\ndallas.add_route(toronto, 138)\ntoronto.add_route(dallas,\
    \ 216)\n```\n\n# The Shortest Path Problem\n\nWeighted graphs can be very useful\
    \ in modeling all sorts of datasets, and they also come with some powerful algorithms\
    \ that help us make the most out of that data."
  - '[PAGE 373]


    Let''s harness one of these algorithms to save us a bit of money.

    Here''s a graph that demonstrates the costs of available flights between five
    different cities:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_373_0.png)


    Now, say I''m in Atlanta and want to fly to El Paso. Unfortunately, we can see
    in this graph that there''s no direct route from Atlanta to El Paso at this time.
    However, I can get there if I''m willing to stop over in other cities along the
    way. For example, I can fly from Atlanta to Denver and then from Denver to El
    Paso. But there are other paths as well, and each path has a different price.
    The Atlanta–Denver–El Paso path will set me back $300, but the Atlanta–Denver–Chicago–El
    Paso path only costs $280.


    The puzzle, now, is this: how do we create an algorithm that finds the *cheapest*
    price I''d have to shell out to get to my destination? Let''s assume we don''t
    care about how many stops we have to make; we''re just out to get the cheapest
    fare.


    This kind of puzzle is known as the *shortest path problem*. This problem can
    take other forms as well. For example, if the graph showed us distances between
    cities, we might want to find the path that has the shortest distance. But here,
    the shortest path we''re looking for is the cheapest one, since the weights represent
    flight prices.


    # Dijkstra''s Algorithm


    Numerous algorithms can solve the shortest path problem, and one of the most famous
    is one discovered by Edsger Dijkstra (pronounced “dike'' struh”) in 1959. Unsurprisingly,
    this algorithm is known as *Dijkstra''s algorithm*.'
  - '[PAGE 374]


    In this section, we''re going to use Dijkstra''s algorithm to find the cheapest
    path in our city flights example.


    # Dijkstra''s Algorithm Setup


    The first thing to note is that Dijkstra''s algorithm comes with a free bonus.
    By the time we''re done, we''re not just going to find the cheapest price from
    Atlanta to El Paso, but also we''re going to find the cheapest prices from Atlanta
    to *all* known cities. As you''ll see, the algorithm simply works this way: we
    end up gathering all of this data. So we''ll know the cheapest price from Atlanta
    to Chicago, the cheapest price from Atlanta to Denver, and so on.


    To set things up, we''ll create a way to store the cheapest known prices from
    our starting city to all other known destinations. In our code that follows, we''ll
    use a hash table for this. For our example walk-through, though, we''ll use a
    visual table that looks like this:


    | From Atlanta To: | City #1 | City #2 | City #3 | Etc. |

    | :--- | :---: | :---: | :---: | :---: |

    | | ? | ? | ? | ? |


    The algorithm will begin at the Atlanta vertex, as it''s the only city we''re
    currently aware of. As we discover new cities, we''ll add them to our table and
    record the cheapest price from Atlanta to each of these cities.


    By the time the algorithm is complete, the table will look like this:


    | Cheapest Price from Atlanta To: | Boston | Chicago | Denver | El Paso |

    | :--- | :---: | :---: | :---: | :---: |

    | | $100 | $200 | $160 | $280 |


    In code, this will be represented with a hash table that looks like so:


    ```

    {"Atlanta": 0, "Boston": 100, "Chicago": 200, "Denver": 160, "El Paso": 280}

    ```


    (Note that Atlanta is in the hash table as well with a value of 0. We''ll need
    this to get the algorithm to work, but it also makes sense, as it costs nothing
    to get to Atlanta from Atlanta, since you''re already there!)


    In our code and going forward, we''ll call this table the `cheapest_prices_table`,
    as it stores all the cheapest prices from the starting city to all other destinations.


    Now, if all we wanted to do is figure out the cheapest price to get to a particular
    destination, the `cheapest_prices_table` would contain all the data we need. But
    we probably also want to know the actual path that would get us the cheapest price.
    For instance, if we want to get from Atlanta to El Paso, we don''t want to just
    know the cheapest price is $280; we also want to know that to get this price,
    we need to fly the specific path of Atlanta-Denver-Chicago-El Paso.'
