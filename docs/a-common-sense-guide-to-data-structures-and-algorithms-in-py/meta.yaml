    \ are always the two extremities of the array, so they need to become method arguments.\
    \ This point will be clearer when I explain the complete Quicksort algorithm.\n\
    \nNext, we select our pivot, which is always the rightmost element in the range\
    \ we're dealing with:\n\n```\npivot_index = right_pointer\npivot = self.array[pivot_index]\n\
    ```\n\nOnce our pivot has been identified, we move the right_pointer to the item\
    \ immediately left of the pivot:\n\n```\nright_pointer -= 1\n```"
