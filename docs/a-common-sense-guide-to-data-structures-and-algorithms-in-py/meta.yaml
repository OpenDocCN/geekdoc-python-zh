  - '[PAGE 281]


    # The Efficiency of Binary Search Tree Deletion


    Like search and insertion, deleting from trees is also typically O(log N). This
    is because deletion requires a search plus a few extra steps to deal with any
    hanging children. Contrast this with deleting a value from an ordered array, which
    is O(N) due to shifting elements to the left to close the gap of the deleted value.


    # Binary Search Trees in Action


    We''ve seen that binary search trees boast efficiencies of O(log N) for search,
    insertion, and deletion, making it an efficient choice for scenarios in which
    we need to store and manipulate ordered data. This is particularly true if we''ll
    be modifying the data often, because while ordered arrays are just as fast as
    binary search trees when searching data, binary search trees are significantly
    faster when it comes to inserting and deleting data.


    For example, let''s say we''re creating an application that maintains a list of
    book titles. We''d want our application to have the following functionality:


    +   - Our program should be able to print the list of book titles in alphabetical
    order.

    - Our program should allow for constant changes to the list.

    - Our program should allow the user to search for a title within the list.


    If we didn''t anticipate that our book list would be changing that often, an ordered
    array would be a suitable data structure to contain our data. However, we''re
    building an app that should be able to handle many changes in real time. If our
    list had millions of titles, a binary search tree may be a better choice.


    Such a tree might look something like this:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_281_0.png)


    Here, the titles are positioned based on their alphabetical order. A title that
    comes earlier in the alphabet is considered a "lower" value, while titles that
    come later are "greater" values.'
  - "[PAGE 282]\n\n# Binary Search Tree Traversal\n\nNow, we've already seen how to\
    \ search, insert, and delete data from a binary search tree. I mentioned, though,\
    \ that we also want to be able to print the entire list of book titles in alphabetical\
    \ order. How can we do that?\n\nFirst, we need the ability to *visit* every single\
    \ node in the tree. *Visiting* nodes is another term for accessing them. The process\
    \ of visiting every node in a data structure is known as *traversing* the data\
    \ structure.\n\nSecond, we need to make sure we traverse the tree in alphabetically\
    \ ascending order so that we can print the list in that order. You can traverse\
    \ a tree in multiple ways, but for this application, we'll perform what is known\
    \ as *inorder traversal*, so that we can print each title in alphabetical order.\n\
    \nRecursion is a great tool for performing traversal. We'll create a recursive\
    \ function called traverse that can be called on a particular node. The function\
    \ then performs the following steps:\n\n+   1. Call itself (traverse) recursively\
    \ on the node's left child. The function will keep getting called until we hit\
    \ a node that does not have a left child.\n2. Visit the node. (For our book title\
    \ app, we print the value of the node at this step.)\n3. Call itself (traverse)\
    \ recursively on the node's right child. The function will keep getting called\
    \ until we hit a node that does not have a right child.\n\nFor this recursive\
    \ algorithm, the base case is when we call traverse on a child that does not exist,\
    \ in which case we return without doing anything further.\n\nHere's a Python traverse_and_print\
    \ function that works for our list of book titles. Note how concise it is:\n\n\
    ```\ndef traverse_and_print(node):\n    if not node:\n        return\n    traverse_and_print(node.left_child)\n\
    \    print(node.value)\n    traverse_and_print(node.right_child)\n```\n\nLet's\
    \ walk through the inorder traversal step by step.\n\nWe first call traverse_and_print\
    \ on \"Moby Dick\". This, in turn, calls traverse_and_print on the left child\
    \ of \"Moby Dick\", which is \"Great Expectations\":\n\n```\ntraverse_and_print(node.left_child)\n\
    ```"
