    虽然“黄瓜”的实际删除技术上只花了一步，但现在我们有一个问题：数组中间出现了一个空单元。当数组中间有空隙时，它就不再高效，因此为了解决这个问题，我们需要将“枣”和“接骨木莓”向左移动。这意味着我们的删除过程需要额外的步骤。


    步骤2：我们将“枣”向左移动：


