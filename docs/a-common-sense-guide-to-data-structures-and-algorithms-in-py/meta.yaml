  md: "As you know, the fastest sorting algorithms clock in at O(N log N). But can\
    \ we do better?\n\nLet's begin by coming up with the best-imaginable Big O. Since\
    \ we know that there generally aren't sorting algorithms faster than O(N log N),\
    \ it may be difficult to imagine how we can sort something in a faster time.\n\
    \nBut since we're not doing a precise sort, if someone told me that our task can\
    \ be done in O(N) time, I suppose I'd believe them. We certainly can't beat O(N),\
    \ since we need to visit each value at least once. So let's aim for O(N).\n\n\
    Let's employ the technique we've been discussing and imagine our data in the form\
    \ of another data structure.\n\nWe may as well start with a hash table. What would\
    \ our array of strings look like if it were a hash table?\n\nIf we took a similar\
    \ approach to what we did with the anagrams, we could represent our array in the\
    \ following way:\n\n```\n{\"a\": 3, \"c\": 3, \"d\": 3, \"b\": 3}\n```\n\nAs with\
    \ our previous example, there's some data loss: we couldn't convert this hash\
    \ table back into our original array, as we wouldn't know the original order of\
    \ all the strings.\n\nHowever, for our purposes of grouping, this data loss doesn't\
    \ matter. In fact, the hash table contains all the data we need to create the\
    \ grouped array we're looking for.\n\nSpecifically, we can iterate over each key-value\
    \ pair within the hash table and use that data to populate an array with the correct\
    \ number of each string. Here's the code for this:\n\n```\ndef group_sort(array):\n\
    \    hash_table = {}\n    new_array = []\n\n    for value in array:\n        if\
    \ value in hash_table:\n            hash_table[value] += 1\n        else:\n  \
    \          hash_table[value] = 1\n\n    for key in hash_table:\n        count\
    \ = hash_table[key]\n        for i in range(count):\n            new_array.append(key)\n\
    \n    return new_array\n```"
