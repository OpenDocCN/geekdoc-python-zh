    When we are aware that a term used in this book is claimed as a trademark, the
    designation is printed with an initial capital letter or in all capitals.


    The Pragmatic Starter Kit, The Pragmatic Programmer, Pragmatic Programming, Pragmatic
    Bookshelf, PragProg and the linking g device are trademarks of The Pragmatic Programmers,
    LLC.


    Every precaution was taken in the preparation of this book. However, the publisher
    assumes no responsibility for errors or omissions, or for damages that may result
    from the use of information (including program listings) contained herein.


    ISBN-13: 979-8-88865-035-6

    Encoded using recycled binary digits.

    Book version: P1.0—December 2023


    ## Contents


    - Preface

    - Chapter 1: Why Algorithms and Data Structures Matter

    - Chapter 2: Algorithms and Big O

    - Chapter 3: Arrays and Linked Lists

    - Chapter 4: Hash Tables

    - Chapter 5: Stacks and Queues

    - Chapter 6: Trees

    - Chapter 7: Graphs

    - Chapter 8: Algorithms on Graphs

    - Chapter 9: Dynamic Programming

    - Chapter 10: Greedy Algorithms

    - Chapter 11: Common Patterns and Techniques

    - Appendix A: Python Refresher

    - Appendix B: Big O Cheat Sheet

    - Appendix C: Further Reading

    - Index'
  mdcn: '# 务实的程序员


    第一卷


    ## Python 数据结构与算法的常识指南


    提升你的核心编程技能


    Jay Wengrow


    由 Katharine Dvorak 编辑


    # 对《Python 数据结构与算法的常识指南，第一卷》的早期赞誉


    各地的学生和程序员都被告知算法和数据结构对于创建高质量软件的重要性——更不用说在顶尖公司获得职位了——然而，能真正阐明这个主题的资源却少之又少。这本书做到了！Python
    的简洁性与 Jay 深入讲解你需要知道的内容的能力相结合，是一个制胜的公式。阅读这本书对任何软件工程师来说都是一项值得的投资。


    - ▶ **Lyndon Purcell**

    OK200 软件开发者


    《Python 数据结构与算法的常识指南》是那种罕见的书籍之一，它既能解开有时令人费解的算法内容，又能通过直接且平易近人的写作风格让读者保持参与感。我强烈推荐这本书给任何想要深入研究算法以提高编程技能的人。


    - ▶ **Terry Peppers**

    LogicGate 工程副总裁


    作为一名编程初学者，我读过许多关于算法的书，Jay 的书是唯一一本不假设读者是数学天才，也不会以居高临下的态度对待你的书。从书的开始，他就以导师和朋友的身份鼓励你的学习和理解。


    - ▶ **Katy Douglas**

    开放大学学生


    这本书是寻求掌握数据结构与算法（DSA）基本概念的个人的绝佳参考，也是进入 DSA 领域的理想起点，特别是对于那些计算机科学背景有限或没有背景的人。它通过巧妙的插图和示例来解释复杂的算法，使这本书读起来引人入胜。


    Ahmad Shahba

    Science Systems and Applications, Inc. 首席软件工程师


    易于消化和易于理解的内容使得数据结构与算法这个相当晦涩且数学密集的术语领域对所有人都变得平易近人。如果你不喜欢在学习时切换上下文，这个特别版适合你，因为它只使用
    Python 来演示概念。这本书你不会选错！


    Paa JAKE

    软件与测试工程师


    ## Python 数据结构与算法的常识指南，第一卷


    提升你的核心编程技能


    Jay Wengrow


    务实书架


    德克萨斯州达拉斯


