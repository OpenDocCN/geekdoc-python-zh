    # The Efficiency of Anagram Generation


    As an aside, let''s stop for a moment to analyze the efficiency of our anagram-generating
    algorithm, since we''ll discover something interesting. In fact, the time complexity
    of generating anagrams is a new category of Big O that we haven''t encountered
    before.


    If we think about how many anagrams we generate, we''ll notice an interesting
    pattern.


    For a string containing three characters, we create permutations that start with
    each of the three characters. Each permutation then picks its middle character
    from one of the two remaining characters, and its last character from the last
    character that''s left. This is 3 * 2 * 1, which is six permutations.


    Looking at this for other string lengths, we get:


    ```

    4 characters: 4 * 3 * 2 * 1          anagrams

    5 characters: 5 * 4 * 3 * 2 * 1      anagrams

    6 characters: 6 * 5 * 4 * 3 * 2 * 1  anagrams

    ```


    Do you recognize this pattern? It''s a factorial!


    So if the string has six characters, the number of anagrams is whatever the factorial
    of 6 is. This is 6 * 5 * 4 * 3 * 2 * 1, which computes to 720.


    The mathematical symbol for factorial is the exclamation point. So, factorial
    6 is expressed as 6!, and the factorial of 10 is expressed as 10!.


    Remember that Big O expresses the answer to the key question: if there are N data
    elements, how many steps will the algorithm take? In our case, N would be the
    length of the string.'
