    All we do is change our list''s `first_node` to point to what is currently the
    second node, and we''re done!


    The rest of the method handles deletions anywhere else from the list. To do this,
    we use a `while` loop to access the node immediately preceding the one we want
    to delete. This becomes our `current_node`.


    We then grab the node that comes immediately *after* the node we''re going to
    delete and store it in a variable called `node_after_deleted_node`:


    ```

    node_after_deleted_node = current_node.next_node.next_node

    ```


    Notice our little trick in accessing that node. It''s simply the node that comes
    two nodes after the `current_node`!


    Then we modify the link of the `current_node` to point to the `node_after_deleted_node`:


    ```

    current_node.next_node = node_after_deleted_node

    ```


    # Efficiency of Linked List Operations


    After our analysis, it emerges that the comparison of linked lists and arrays
    breaks down as follows:


    | Operation | Array | Linked list |

    | :--- | :--- | :--- |

    | Reading | O(1) | O(N) |

    | Search | O(N) | O(N) |

    | Insertion | O(N) (O(1) at end) | O(N) (O(1) at beginning) |

    | Deletion | O(N) (O(1) at end) | O(N) (O(1) at beginning) |


    In the grand scheme of things, linked lists seem to be lackluster when it comes
    to time complexity. They perform similarly to arrays for search, insertion, and
    deletion, and are much slower when it comes to reading. If so, why would one ever
    want to use a linked list?


    The key to unlocking the linked list''s power is in the fact that the *actual
    insertion and deletion steps* are just O(1).


    But isn''t that only relevant when inserting or deleting at the beginning of the
    list? We saw that to insert or delete elsewhere, it takes up to N steps just to
    access the node we want to delete or insert after!


    Well, it just so happens that there are scenarios in which we may already have
    accessed the right node for some other purpose. The next example is a case in
    point.'
  - '[PAGE 251]


    # Linked Lists in Action


    One case where linked lists shine is when we examine a single list and delete
    many elements from it. Let''s say, for example, we''re building an application
    that combs through existing lists of email addresses and removes any email address
    that has an invalid format.


    No matter whether the list is an array or a linked list, we need to comb through
    the entire list one element at a time to inspect each email address. This, naturally,
    takes N steps. However, let''s examine what happens when we actually delete each
    email address.


    With an array, each time we delete an email address, we need another O(N) steps
    to shift the remaining data to the left to close the gap. All this shifting will
    happen before we can even inspect the next email address.


    Let''s assume that 1 in 10 email addresses are invalid. If we had a list of 1,000
    email addresses, we''d have about 100 invalid ones. Our algorithm, then, would
    take 1,000 steps to read all 1,000 email addresses. On top of that, though, it
    might take up to an additional 100,000 steps for deletion, as for each of the
    100 deleted addresses, we might shift up to 1,000 other elements.


    With a linked list, however, as we comb through the list, each deletion takes
    just one step, as we can simply change a node''s link to point to the appropriate
    node and move on. For our 1,000 emails, then, our algorithm would take just 1,100
    steps, as there are 1,000 reading steps, and 100 deletion steps.


    It turns out, then, that linked lists are an amazing data structure for moving
    through an entire list while making insertions or deletions, as we never have
    to worry about shifting other data as we make an insertion or deletion.


    # Doubly Linked Lists


    Linked lists come in a number of different flavors. The linked list we''ve discussed
    until this point is the *classic* linked list, but with some slight modifications
    we can grant linked lists additional superpowers.


    One variant form of the linked list is the *doubly linked list*.


    A doubly linked list is like a linked list except that each node has *two* links—one
    that points to the next node and another that points to the *previous* node. In
    addition, the doubly linked list always keeps track of both the head *and* tail
    nodes, instead of just the head.'
