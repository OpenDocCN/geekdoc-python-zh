    \nThis can be especially useful in social networking applications. Take the example\
    \ network that follows:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_391_0.png)\n\
    \nIf we want to know how Idris is connected to Lina, we'd see that she's connected\
