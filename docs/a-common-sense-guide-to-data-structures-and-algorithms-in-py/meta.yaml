  md: '# CHAPTER 19


    # Dealing with Space Constraints


    When analyzing the efficiency of various algorithms throughout this book, we''ve
    focused exclusively on how fast they run—that is, their time complexity. However,
    another measure of efficiency can be useful as well, which is how much *memory*
    an algorithm consumes. This measure is known as *space complexity*.


    Space complexity becomes an important factor when memory is limited. If you have
    an enormous amount of data, or are programming for a small device with limited
    memory, space complexity can matter a lot.


    In a perfect world, we''d always use algorithms that are both fast *and* memory-efficient.
    However, sometimes we can''t have both, and we need to choose between the two.
    Each situation requires a careful analysis to know when we need to prioritize
    speed over memory, and memory over speed.


    # Big O of Space Complexity


    Interestingly, computer scientists use Big O notation to describe space complexity
    just as they do for time complexity.


    Back when I introduced Big O notation in [Chapter 3, O Yes! Big O Notation, on
    page 35](#), I described Big O in terms of what I called the “key question.” For
    time complexity, the key question was: *if there are N data elements, how many
    steps will the algorithm take?*


    To use Big O for space complexity, we just need to reframe the key question. When
    it comes to memory consumption, the key question is: *if there are N data elements,
    how many units of memory will the algorithm consume?*'
  merge: -1
  pgno: 392
- img_proc: true
  md: "Here's a simple example.\n\nLet's say we're writing a function that accepts\
    \ an array of strings and returns an array of those strings in ALL CAPS. For example,\
    \ the function would accept an array like [\"tuvi\", \"leah\", \"shaya\", \"rami\"\
    , \"yechiel\"] and return [\"TUVI\", \"LEAH\", \"SHAYA\", \"RAMI\", \"YECHIEL\"\
    ]. Here's one way we can write this function:\n\n```\ndef make_uppercase(array):\n\
    \    new_array = []\n\n    for string in array:\n        new_array.append(string.upper())\n\
    \n    return new_array\n```\n\nIn this make_uppercase function, we accept an array.\
    \ We then create a *brand-new array* called new_array and fill it with uppercase\
    \ versions of each string from the original array.\n\nBy the time this function\
    \ is complete, we'll have two arrays floating around in our computer's memory.\
    \ We have the original array, which contains [\"tuvi\", \"leah\", \"shaya\", \"\
    rami\", \"yechiel\"], and we have new_array, which contains [\"TUVI\", \"LEAH\"\
    , \"SHAYA\", \"RAMI\", \"YECHIEL\"].\n\nWhen we analyze this function in terms\
    \ of space complexity, we can see that this function *creates* a brand-new array\
    \ that contains N elements. This is *in addition* to the original array which\
    \ also holds N elements.\n\nSo let's return to our key question: *if there are\
    \ N data elements, how many units of memory will the algorithm consume?*\n\nBecause\
    \ our function generated an additional N data elements (in the form of new_array),\
    \ we'd say that this function has a *space efficiency of O(N)*.\n\nThe way this\
    \ appears on the following graph should look familiar:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_393_0.png)"
  merge: -1
  pgno: 393
- img_proc: true
  md: "Note that this graph is identical to the way we've depicted O(N) in graphs\
    \ in previous chapters, with the exception that the vertical axis now represents\
    \ *memory consumed* rather than time.\n\nNow, let's present an alternative `make_uppercase`\
    \ function that is more memory-efficient:\n\n```\npython\ndef make_uppercase(array):\n\
    \    for index in range(len(array)):\n        array[index] = array[index].upper()\n\
    \    return array\n```\n\nIn this second version, we don't create any new arrays.\
    \ Instead, we modify each value within the original array *in place*, replacing\
    \ each string with an uppercase version of that string. We then return the modified\
    \ array.\n\nThis is a drastic improvement in terms of memory consumption since\
    \ our new function *doesn't consume any additional memory at all*.\n\nHow do we\
    \ describe this in terms of Big O notation?\n\nRecall that with time complexity,\
    \ an O(1) algorithm was one whose speed remained constant no matter how large\
    \ the data. Similarly, with space complexity, O(1) means that the memory consumed\
    \ by an algorithm is constant no matter how large the data.\n\nOur revised `make_uppercase`\
    \ function consumes a constant amount of additional space (zero!) no matter whether\
    \ the original array contains four elements or one hundred. Because of this, this\
    \ function is said to have a space efficiency of O(1).\n\nIt's worth emphasizing\
    \ that when using Big O to describe space complexity, we're only counting the\
    \ *new data* the algorithm is generating. Even our second `make_uppercase` function\
    \ deals with N elements of data in the form of the array passed into the function.\
    \ However, we're not factoring those N elements into our Big O description, since\
    \ the original array exists in any case, and we're only focused on the *extra*\
    \ space the algorithm consumes. This extra space is more formally known as *auxiliary\
    \ space*.\n\nHowever, it's good to know that there are some references that include\
    \ the original input when calculating the space complexity, and that's fine. We're\
    \ not including it, and whenever you see space complexity described in another\
    \ resource, you need to determine whether it's including the original input."
  merge: -1
  pgno: 394
