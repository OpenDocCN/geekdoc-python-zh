    这是我最喜欢的一个例子。一个著名的问题——被称为*阶梯问题*——是这样的：\n\n假设我们有一个N级的阶梯，一个人有能力一次爬一级、两级或三级台阶。一个人到达顶部有多少种不同的可能\"\
