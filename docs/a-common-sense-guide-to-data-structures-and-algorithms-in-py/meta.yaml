  md: '# Deletion


    Linked lists also shine when it comes to deletion, especially when deleting from
    the beginning of the list.


    To delete a node from the beginning of a linked list, all we need to do is perform
    one step: we change the `first_node` of the linked list to now point to the second
    node.


    Let''s return to our example of the linked list containing the values "once",
    "upon", "a", and "time". If we want to delete the value "once", we could simply
    change the linked list to begin at "upon":


    ```

    list.first_node = node_2

    ```


    Contrast this with an array, in which deleting the first element means shifting
    all remaining data one cell to the left, which takes O(N) time.


    When it comes to deleting the *final* node of a linked list, the actual deletion
    takes one step—we just take the second-to-last node and make its link None. However,
    it takes N steps to even access the second-to-last node in the first place, since
    we need to start at the beginning of the list and follow the links until we reach
    it.


    The following table contrasts the various scenarios of deletion for both arrays
    and linked lists. Note how it''s identical to insertion:


    | Situation | Array | Linked List |

    | :--- | :--- | :--- |

    | Delete at beginning | Worst case | Best case |

    | Delete at middle | Average case | Average case |

    | Delete at end | Best case | Worst case |


    While deleting from the beginning or end of a linked list is straightforward,
    deleting from anywhere in the middle is slightly more involved.


    Say we want to delete the value at index 2 ("purple") from our example linked
    list of colors, as shown in the following diagram:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_248_0.png)


    To accomplish this, we need to first access the node immediately *preceding* the
    one we''re deleting ("blue"). Then we change its link to point to the node that
    is immediately *after* the node we''re deleting ("green").'
  merge: -1
