    \ This is how we populate the hash table with the numbers as we proceed through\
    \ the array.\n\nWith this approach, we drastically increased the algorithm’s speed\
    \ to O(N). We pulled this off by storing all of the data elements in a hash table\
    \ for the express purpose of being able to perform O(1) lookups throughout the\
    \ loop.\n\nConsider the hash table your magical wand, and become the programming\
    \ wizard you were destined to be. (Okay, enough of that.)\n\n## Recognizing Patterns\n\
    \nOne of the most helpful strategies for both code optimization and algorithm\
    \ development in general is to find patterns within the problem at hand. Often,\
    \ the discovery of a pattern can help you cut through all the complexity of a\
    \ problem and develop an algorithm that is simple.\n\n## The Coin Game\n\nHere’s\
    \ a great example. A game I call “the coin game” has two players who compete in\
    \ the following way: they start with a pile of coins, and each player has the\
    \ choice of removing either one or two coins from the pile. The player who removes\
    \ the last coin *loses*. Fun, right?\n\nIt turns out that this isn’t a game of\
    \ random chance, and with the right strategy, you can *force* your opponent to\
    \ take the last coin and lose the game. To make this clear, let’s start with some\
    \ really small coin piles and see how the game plays out.\n\nIf there’s just one\
    \ coin in the pile, the player whose turn it is loses, since they have no choice\
    \ but to take the last coin.\n\nIf there are two coins left, the player whose\
    \ turn it is can force a win. This is because they can take just one coin and\
    \ thereby force their opponent to take the final coin.\n\nWhen there are three\
    \ coins remaining, the player whose turn it is can also force a win, since they\
    \ can remove two coins, forcing their opponent to take the final coin.\n\nNow,\
    \ when there are four coins left, the current player is in trouble. If they remove\
    \ one coin, the opponent is given a pile of three coins, which we established\
    \ earlier can allow that player to force a win. Similarly, if the current player\
    \ removes two coins, the opponent is left with two coins, which can also allow\
    \ the opponent to force a win.\n\nIf we were to write a function that calculated\
    \ whether you can win the game when presented with a coin pile of a given size,\
    \ what approach should we take? If we think about this carefully, we may realize\
    \ we can use subproblems to help calculate an accurate result for any number of\
    \ coins. This would make top-down recursion a natural fit for solving this problem.\n\
    \nHere's a Python implementation of a recursive approach:\n\n```python\ndef game_winner(number_of_coins,\
    \ current_player=\"you\"):\n    if number_of_coins <= 0:\n        return current_player\n\
    \n    if current_player == \"you\":\n        next_player = \"them\"\n    elif\
    \ current_player == \"them\":\n        next_player = \"you\"\n\n    if (game_winner(number_of_coins\
    \ - 1, next_player) == current_player or\n            game_winner(number_of_coins\
    \ - 2, next_player) == current_player):\n        return current_player\n    else:\n\
    \        return next_player\n```\n\nThis game_winner function is given a number\
    \ of coins and the player whose turn it is (either \"you\" or \"them\"). The function\
    \ then returns either \"you\" or \"them\" as the winner of the game. When the\
    \ function is first called, the current_player is \"you\".\n\nWe define our base\
    \ case as when the current_player is dealt 0 or fewer coins. This means the other\
    \ player took the last coin and the current player, by default, won the game.\n\
    \nWe then define a next_player variable, which keeps track of which player will\
    \ go next.\n\nThen we do our recursion. We recursively call our game_winner function\
    \ on piles of coins that are both one and two coins smaller than the current pile,\
    \ and see if the next player would win or lose in those scenarios. If the next_player\
    \ loses in both scenarios, that means the current_player will win.\n\nThis isn't\
