- md: "## The Importance of Constrained Data Structures\n\nBy definition, if a stack\
    \ is just a constrained version of an array, that means an array can do anything\
    \ a stack can do. If so, what advantage does a stack provide?\n\nConstrained data\
    \ structures like the stack (and the queue, which we'll encounter shortly) are\
    \ important for several reasons.\n\nFirst, when we work with a constrained data\
    \ structure, we can prevent potential bugs. The linting algorithm, for example,\
    \ only works if we exclusively remove items from the top of the stack. If a programmer\
    \ inadvertently writes code that removes items from the middle of the array, the\
    \ algorithm will break down. By using a stack, we're forced into only removing\
    \ items from the top, as it's impossible to get the stack to remove any other\
    \ item.\n\nSecond, data structures like stacks give us a new mental model for\
    \ tackling problems. The stack, for example, gives us the whole idea of a last-in,\
    \ first-out process. We can then apply this LIFO mindset to solve all sorts of\
    \ problems, such as the linter just described.\n\nAnd once we're familiar with\
    \ the stack and its LIFO nature, the code we write using the stack becomes familiar\
    \ and elegant to other developers who read our code. As soon as someone sees a\
    \ stack being used within an algorithm, they immediately know that the algorithm\
    \ is working with a LIFO-based process.\n\n## Stack Wrap-Up\n\nStacks are ideal\
    \ for processing any data that should be handled last in, first out. The undo\
    \ function in a word processor, for example, is a great use case for a stack.\
    \ As the user types, we keep track of each keystroke by pushing the keystroke\
    \ onto the stack. Then, when the user hits the undo key, we pop the most recent\
    \ keystroke from the stack and eliminate it from the document. At this point,\
    \ their next-to-most recent keystroke is now sitting at the top of the stack,\
    \ ready to be undone if need be.\n\n## Queues\n\nA *queue* is another data structure\
    \ designed to process temporary data. It's like a stack in many ways, except that\
    \ it processes data in a different order. Like a stack, a queue is also an abstract\
    \ data type.\n\nYou can think of a queue as a line of people at the movie theater.\
    \ The first one in the line is the first one to leave the line and enter the theater.\
    \ With queues, the first item added to the queue is the first item to be removed.\
    \ That's why computer scientists apply the acronym FIFO to queues: *first in,\
    \ first out*.\n\nAs with a line of people, a queue is usually depicted horizontally.\
    \ It's also common to refer to the beginning of the queue as its *front* and the\
    \ end of the queue as its *back*.\n\nLike stacks, queues are arrays with three\
    \ restrictions (it's just a different set of restrictions):\n\n- Data can be inserted\
    \ only at the *end* of a queue. (This is identical behavior to the stack.)\n-\
    \ Data can be deleted only from the *front* of a queue. (This is the opposite\
    \ behavior of the stack.)\n- Only the element at the *front* of a queue can be\
    \ read. (This, too, is the opposite of behavior of the stack.)\n\nLet's see a\
    \ queue in action, beginning with an empty queue.\n\nFirst, we insert a 5 (a common\
    \ term for inserting into a queue is *enqueue*, but we'll use the terms insert\
    \ and enqueue interchangeably):\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_158_0.png)\n\
    \nNext, we insert a 9:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_158_1.png)\n\
    \nNext, we insert a 100:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_158_2.png)\n\
    \nAs of now, the queue has functioned just like a stack. However, removing data\
    \ happens in the reverse, as we remove data from the *front* of the queue. (Removing\
    \ an element from a queue is also known as *dequeuing*.)\n\nIf we want to remove\
    \ data, we must start with the 5, since it's at the front of the queue:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_158_3.png)\n\
    \nNext, we remove the 9:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_159_0.png)\n\
    \nOur queue now only contains one element, the 100.\n\n## Queue Implementation\n\
    \nI mentioned that the queue is an abstract data type. Like many other abstract\
    \ data types, it doesn't come implemented in many programming languages. Here's\
    \ an implementation of a queue:\n\n```python\nclass Queue:\n    def __init__(self):\n\
    \        self.data = []\n\n    def enqueue(self, element):\n        self.data.append(element)\n\
    \n    def dequeue(self):\n        if len(self.data) > 0:\n            return self.data.pop(0)\n\
    \        else:\n            return None\n\n    def read(self):\n        if len(self.data)\
    \ > 0:\n            return self.data[0]\n        else:\n            return None\n\
    ```\n\nAgain, our Queue class wraps the array with an interface that restricts\
    \ our interaction with the data, only allowing us to process the data in specific\
    \ ways. The enqueue method allows us to insert data at the end of the array, while\
    \ the dequeue removes the first item from the array. And the read method allows\
    \ us to peek at just the very first element of the array.\n\n## Queues in Action\n\
    \nQueues are common in many applications, ranging from printing jobs to background\
    \ workers in web applications.\n\nLet's say we're programming a simple Python\
    \ interface for a printer that can accept printing jobs from various computers\
    \ across a network. We want to make sure we print each document in the order in\
    \ which it was received.\n\nThis code uses our implementation of the Queue class\
    \ from earlier:\n\n```python\nimport queue\n\nclass PrintManager:\n    def __init__(self):\n\
    \        self.queue = queue.Queue()\n\n    def queue_print_job(self, document):\n\
    \        self.queue.enqueue(document)\n\n    def run(self):\n        while self.queue.read():\n\
    \            self.print_document(self.queue.dequeue())\n\n    def print_document(self,\
    \ document):\n        # Code to run the actual printer goes here.\n        # For\
    \ demo purposes, we'll print to the terminal:\n        print(document)\n```\n\n\
    We can then utilize this class as follows:\n\n```python\nprint_manager = PrintManager()\n\
    print_manager.queue_print_job(\"First Document\")\nprint_manager.queue_print_job(\"\
    Second Document\")\nprint_manager.queue_print_job(\"Third Document\")\nprint_manager.run()\n\
    ```\n\nEach time we call queue_print_job, we add the “document” (represented by\
    \ a string, in this example) to the queue:\n\n```python\ndef queue_print_job(self,\
    \ document):\n    self.queue.enqueue(document)\n```\n\nWhen we call run, we print\
    \ each document by processing it in the order in which it was received. That is,\
    \ we dequeue each document from the queue and print it:\n\n```python\ndef run(self):\n\
    \    while self.queue.read():\n        self.print_document(self.queue.dequeue())\n\
    ```\n\nWhen we run the previous code, the program will output the three documents\
    \ in the same order in which they were received:\n\nFirst Document\nSecond Document\n\
    Third Document\n\nWhile this example is simplified and abstracts away some of\
    \ the nitty-gritty details that a real live printing system may have to deal with,\
    \ the fundamental use of a queue for such an application is very real and serves\
    \ as the foundation for building such a system.\n\nQueues are also the perfect\
    \ tool for handling asynchronous requests—they ensure that the requests are processed\
    \ in the order in which they were received. They’re also commonly used to model\
    \ real-world scenarios where events need to occur in a certain order, such as\
    \ airplanes waiting for takeoff and patients waiting for their doctor.\n\n## Wrapping\
    \ Up\n\nAs you’ve seen, stacks and queues are programmers’ tools for elegantly\
    \ handling all sorts of practical algorithms.\n\nNow that you’ve learned about\
    \ stacks and queues, you’ve unlocked a new achievement: you can learn about recursion,\
    \ which depends upon a stack. Recursion also serves as the foundation for many\
    \ of the more advanced and super-efficient algorithms that I’ll cover in the rest\
    \ of this book.\n\n## Exercises\n\nThe following exercises provide you with the\
    \ opportunity to practice with stacks and queues. The solutions to these exercises\
    \ are found in the section [Chapter 9, on page 442](Chapter 9, on page 442).\n\
    \n1. If you were writing software for a call center that places callers on hold\
    \ and then assigns them to “the next available representative,” would you use\
    \ a stack or a queue?\n2. If you pushed numbers onto a stack in the following\
    \ order: 1, 2, 3, 4, 5, 6, and then popped two items, which number would you be\
    \ able to read from the stack?\n3. If you inserted numbers into a queue in the\
    \ following order: 1, 2, 3, 4, 5, 6, and then dequeued two items, which number\
    \ would you be able to read from the queue?\n4. Write a function that uses a stack\
    \ to reverse a string. (For example, \"abcde\" would become \"edcba\".) You can\
    \ work with our earlier implementation of the Stack class."
  mdcn: "## 受限数据结构的重要性\n\n根据定义，如果栈只是数组的受限版本，那就意味着数组可以完成栈能做的任何事情。如果是这样，栈提供了什么优势呢？\n\
    \n像栈（以及我们即将遇到的队列）这样的受限数据结构之所以重要，有几个原因。\n\n首先，当我们使用受限数据结构时，可以防止潜在的错误。例如，代码检查算法只有在我们只从栈顶移除元素时才能正常工作。如果程序员不小心编写了从数组中间移除元素的代码，算法就会崩溃。通过使用栈，我们被迫只能从栈顶移除元素，因为不可能让栈移除其他任何元素。\n\
    \n其次，像栈这样的数据结构为我们解决问题提供了一种新的思维模型。例如，栈提供了后进先出的完整概念。然后我们可以应用这种LIFO思维模式来解决各种问题，比如刚才描述的代码检查器。\n\
    \n一旦我们熟悉了栈及其LIFO特性，我们使用栈编写的代码对于阅读我们代码的其他开发者来说就会变得熟悉而优雅。一旦有人在算法中看到栈的使用，他们立刻就知道该算法正在处理基于LIFO的过程。\n\
    \n## 栈总结\n\n栈非常适合处理任何应该后进先出的数据。例如，文字处理器中的撤销功能就是栈的一个绝佳用例。当用户输入时，我们通过将每次按键压入栈来跟踪每个按键。然后，当用户按下撤销键时，我们从栈中弹出最近的按键并将其从文档中消除。此时，他们次近的按键现在位于栈顶，如果需要可以随时撤销。\n\
    \n## 队列\n\n*队列*是另一种用于处理临时数据的数据结构。它在很多方面类似于栈，只是处理数据的顺序不同。和栈一样，队列也是一种抽象数据类型。\n\n\
    你可以把队列想象成电影院排队的人群。队伍中的第一个人是第一个离开队伍进入影院的人。对于队列，第一个添加到队列中的元素是第一个被移除的元素。这就是为什么计算机科学家用FIFO这个缩写来表示队列：*先进先出*。\n\
    \n就像排队的人群一样，队列通常被水平描绘。通常也将队列的开头称为*前端*，队列的末尾称为*后端*。\n\n像栈一样，队列是带有三种限制的数组（只是限制条件不同）：\n\
    \n- 数据只能在队列的*末端*插入。（这与栈的行为相同。）\n- 数据只能从队列的*前端*删除。（这与栈的行为相反。）\n- 只能读取队列*前端*的元素。（这也与栈的行为相反。）\n\
    \n让我们看看队列的实际操作，从一个空队列开始。\n\n首先，我们插入一个5（插入队列的常用术语是*入队*，但我们将交替使用插入和入队这两个术语）：\n\n\
    ![](img/c0a46c67bb2536aa545ec1bd7065e742_158_0.png)\n\n接下来，我们插入一个9：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_158_1.png)\n\
    \n接下来，我们插入一个100：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_158_2.png)\n\n到目前为止，队列的功能与栈完全一样。然而，删除数据的过程是相反的，因为我们从队列的*前端*删除数据。（从队列中移除元素也称为*出队*。）\n\
    \n如果我们想删除数据，必须从5开始，因为它在队列的前端：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_158_3.png)\n\
    \n接下来，我们移除9：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_159_0.png)\n\n我们的队列现在只包含一个元素，100。\n\
    \n## 队列实现\n\n我提到过队列是一种抽象数据类型。像许多其他抽象数据类型一样，它在许多编程语言中并没有现成的实现。这是一个队列的实现：\n\n```python\n\
    class Queue:\n    def __init__(self):\n        self.data = []\n\n    def enqueue(self,\
    \ element):\n        self.data.append(element)\n\n    def dequeue(self):\n   \
    \     if len(self.data) > 0:\n            return self.data.pop(0)\n        else:\n\
    \            return None\n\n    def read(self):\n        if len(self.data) > 0:\n\
    \            return self.data[0]\n        else:\n            return None\n```\n\
    \n同样，我们的Queue类用一个接口包装了数组，该接口限制了我们与数据的交互，只允许我们以特定的方式处理数据。enqueue方法允许我们在数组末尾插入数据，而dequeue从数组中移除第一个元素。read方法允许我们只查看数组的第一个元素。\n\
    \n## 队列的实际应用\n\n队列在许多应用中很常见，从打印作业到Web应用程序中的后台工作者。\n\n假设我们正在为一个打印机编程一个简单的Python接口，该打印机可以接受来自网络上各种计算机的打印作业。我们希望确保按照接收顺序打印每个文档。\n\
    \n这段代码使用了我们之前实现的Queue类：\n\n```python\nimport queue\n\nclass PrintManager:\n  \
    \  def __init__(self):\n        self.queue = queue.Queue()\n\n    def queue_print_job(self,\
    \ document):\n        self.queue.enqueue(document)\n\n    def run(self):\n   \
    \     while self.queue.read():\n            self.print_document(self.queue.dequeue())\n\
    \n    def print_document(self, document):\n    # 运行实际打印机的代码在这里。\n    # 为了演示目的，我们将打印到终端：\n\
    \    print(document)\n```\n\n然后我们可以这样使用这个类：\n\n```python\nprint_manager = PrintManager()\n\
    print_manager.queue_print_job(\"First Document\")\nprint_manager.queue_print_job(\"\
    Second Document\")\nprint_manager.queue_print_job(\"Third Document\")\nprint_manager.run()\n\
    ```\n\n每次调用queue_print_job时，我们将“文档”（在本例中由字符串表示）添加到队列中：\n\n```python\ndef queue_print_job(self,\
    \ document):\n    self.queue.enqueue(document)\n```\n\n当我们调用run时，我们按照接收顺序处理并打印每个文档。也就是说，我们从队列出队每个文档并打印它：\n\
    \n```python\ndef run(self):\n    while self.queue.read():\n        self.print_document(self.queue.dequeue())\n\
    ```\n\n当我们运行前面的代码时，程序将按照接收顺序输出三个文档：\n\nFirst Document\nSecond Document\nThird\
    \ Document\n\n虽然这个例子是简化的，并且抽象掉了实际打印系统可能需要处理的一些细节，但队列在此类应用中的基本使用是非常真实的，并且是构建此类系统的基础。\n\
    \n队列也是处理异步请求的完美工具——它们确保请求按照接收顺序被处理。它们也常用于建模需要按特定顺序发生事件的现实场景，例如飞机等待起飞和患者等待医生。\n\
    \n## 总结\n\n正如你所看到的，栈和队列是程序员优雅处理各种实用算法的工具。\n\n既然你已经了解了栈和队列，你就解锁了一个新成就：你可以学习递归，它依赖于栈。递归也是我在本书其余部分将介绍的许多更高级和超级高效算法的基础。\n\
