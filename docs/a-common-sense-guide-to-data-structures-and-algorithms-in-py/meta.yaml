    # The Efficiency of Anagram Generation


    As an aside, let''s stop for a moment to analyze the efficiency of our anagram-generating
    algorithm, since we''ll discover something interesting. In fact, the time complexity
    of generating anagrams is a new category of Big O that we haven''t encountered
    before.


    If we think about how many anagrams we generate, we''ll notice an interesting
    pattern.


    For a string containing three characters, we create permutations that start with
    each of the three characters. Each permutation then picks its middle character
    from one of the two remaining characters, and its last character from the last
    character that''s left. This is 3 * 2 * 1, which is six permutations.


    Looking at this for other string lengths, we get:


    ```

    4 characters: 4 * 3 * 2 * 1          anagrams

    5 characters: 5 * 4 * 3 * 2 * 1      anagrams

    6 characters: 6 * 5 * 4 * 3 * 2 * 1  anagrams

    ```


    Do you recognize this pattern? It''s a factorial!


    So if the string has six characters, the number of anagrams is whatever the factorial
    of 6 is. This is 6 * 5 * 4 * 3 * 2 * 1, which computes to 720.


    The mathematical symbol for factorial is the exclamation point. So, factorial
    6 is expressed as 6!, and the factorial of 10 is expressed as 10!.


    Remember that Big O expresses the answer to the key question: if there are N data
    elements, how many steps will the algorithm take? In our case, N would be the
    length of the string.'
- md: "For a string of length N, we produce N! anagrams. In Big O notation then, this\
    \ is expressed as O(N!). This is also known as *factorial time*.\n\nO(N!) is the\
    \ slowest category of Big O we'll encounter in this book. Let's see how it looks\
    \ compared to other \"slow\" Big O categories:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_194_0.png)\n\
    \nAlthough O(N!) is extremely slow, we don't have a better option here, since\
    \ our task is to generate *all* the anagrams, and there simply are N! anagrams\
    \ for an N-character word.\n\nIn any case, recursion played a pivotal role in\
    \ this algorithm, which is an important example of how recursion can be used to\
    \ solve a complex problem.\n\n## Wrapping Up\n\nLearning to write functions that\
    \ use recursion certainly takes practice. But you're now armed with tricks and\
    \ techniques that will make the learning process easier for you.\n\nWe're not\
    \ done with our journey through recursion just yet, though. While recursion is\
    \ a great tool for solving a variety of problems, it can actually slow your code\
    \ down *a lot* if you're not careful. In the next chapter, you'll learn how to\
    \ wield recursion while still keeping your code nice and speedy.\n\n## Exercises\n\
    \nThe following exercises provide you with the opportunity to practice with recursion.\
    \ The solutions to these exercises are found in the section [Chapter 11, on page\
    \ 444](#).\n\n- 1. Use recursion to write a function that accepts an array of\
    \ strings and returns the total number of characters across all the strings. For\
    \ example, if the input array is [\"ab\", \"c\", \"def\", \"ghij\"], the output\
    \ should be 10 since there are ten characters in total.\n\n- 2. Use recursion\
    \ to write a function that accepts an array of numbers and returns a new array\
    \ containing just the even numbers.\n\n- 3. A particular numerical sequence is\
    \ known as *triangular numbers*. The pattern begins as 1, 3, 6, 10, 15, 21, and\
    \ continues onward. To calculate the next number in the sequence, we add the previous\
    \ number from the sequence plus N, where N corresponds to the place in the sequence\
    \ where the number lies. For example, the seventh number in the sequence is 28,\
    \ since it's the seventh number in the pattern, so we add the number 7 plus 21\
    \ (the previous number in the sequence). Write a function that accepts a number\
    \ for N and returns the correct number from the series; that is, if the function\
    \ was passed the number 7, the function would return 28.\n\n- 4. Use recursion\
    \ to write a function that accepts a string and returns the first index that contains\
    \ the character \"x\". For example, the string, \"abcdefghijklmnopqrstuvwxyz\"\
    \ has an \"x\" at index 23. To keep things simple, assume the string *definitely*\
    \ has at least one \"x\".\n\n- 5. This problem is known as the *unique paths problem*:\
    \ Let's say you have a grid of rows and columns. Write a function that accepts\
    \ a number of rows and a number of columns and calculates the number of possible\
    \ \"shortest\" paths from the upper-leftmost square to the lower-rightmost square.\n\
    \nFor example, here's what the grid looks like with three rows and seven columns.\
    \ You want to get from the S (Start) to the F (Finish).\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_195_0.png)\n\
    \nBy \"shortest\" path, I mean that at every step, either you're moving one step\
    \ to the right:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_195_1.png)\n\nOr you're\
    \ moving one step downward:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_196_0.png)\n\
    \nAgain, your function should calculate the *number* of shortest paths.\n\n# CHAPTER\
    \ 12\n\n# Dynamic Programming\n\nIn the previous chapter, you learned how to write\
    \ recursively and how to use recursion to solve some rather complex problems.\n\
    \nWhile recursion can certainly solve *some* problems, it can also create *new*\
    \ ones if not used properly. In fact, recursion is often the culprit behind some\
    \ of the slowest categories of Big O, such as O(2^N).\n\nThe good news, though,\
    \ is that many of these problems can be avoided. In this chapter, you'll learn\
    \ how to identify some of the most common speed traps found in recursive code\
    \ and how to express such algorithms in terms of Big O. More important, you'll\
    \ learn the techniques to fix these problems.\n\nHere's some more good news: the\
    \ techniques found in this chapter are pretty simple. Let's take a look at how\
    \ to use these easy but effective methods for turning our recursive nightmares\
    \ into recursive bliss.\n\n## Unnecessary Recursive Calls\n\nHere's a recursive\
    \ function that finds the greatest number from an array:\n\n```\ndef max(array):\n\
    \    if not array:\n        return None\n\n    if len(array) == 1:\n        return\
    \ array[0]\n\n    if array[0] > max(array[1:]):\n        return array[0]\n   \
    \ else:\n        return max(array[1:])\n```\n\nThe essence of each recursive call\
    \ is the comparison of a single number (array[0]) to the maximum number from the\
    \ remainder of the array. (To calculate the maximum number from the remainder\
    \ of the array, we call the very max function we're in, which is what makes the\
    \ function recursive.)\n\nWe achieve the comparison with a conditional statement.\
    \ The first half of the conditional statement is as follows:\n\n```\nif array[0]\
    \ > max(array[1:]):\n    return array[0]\n```\n\nThis snippet says that if the\
    \ single number (array[0]) is greater than what has already been determined to\
    \ be the maximum number of the rest of the array (max(array[1:])), then by definition,\
    \ array[0] must be the greatest number, so we return it.\n\nHere is the second\
    \ half of the conditional statement:\n\n```\nelse:\n    return max(array[1:])\n\
    ```\n\nThis second snippet says that if array[0] is *not* greater than the greatest\
    \ number from the rest of the array, then the greatest number from the rest of\
    \ the array must be the greatest number overall, and we return it.\n\nWhile this\
    \ code works, it contains a hidden inefficiency. If you look carefully, you'll\
    \ note that our code contains the phrase, max(array[1:]) twice, once in each half\
    \ of the conditional statement.\n\nThe problem with this is that each time we\
    \ mention max(array[1:]), we trigger an entire avalanche of recursive calls.\n\
    \nLet's break this down for an example array of [1, 2, 3, 4].\n\nWe know that\
    \ we're going to start by comparing the 1 with the maximum number of the remaining\
    \ array, [2, 3, 4]. That, in turn, will compare the 2 against the max of the remaining\
    \ [3, 4], which in turn will compare the 3 against the [4]. This, too, triggers\
    \ one more recursive call on the [4] itself, which is the base case.\n\nHowever,\
    \ to really see how our code plays out, we're going to start by analyzing the\
    \ bottom call and working our way up the call chain.\n\nLet's begin.\n\n## Max\
    \ Recursive Walk-Through\n\nWhen we call max([4]), the function simply returns\
    \ the number 4. Again, this is because our base case is when the array only contains\
    \ one element, as dictated by the following line of code:\n\n```\nif len(array)\
    \ == 1:\n    return array[0]\n```\n\nThis is pretty straightforward—it’s a single\
    \ function call:\n\nmax([4])\n\nMoving up the call chain, let’s see what happens\
    \ when we call max([3, 4]). In the first half of the conditional statement (if\
    \ array[0] > max(array[1:]):), we compare the 3 to max([4]). But calling max([4])\
    \ is itself a recursive call. The following diagram depicts max([3, 4]) calling\
    \ max([4]):\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_199_0.png)\n\nNote that\
    \ next to the arrow, we put the label “1st” to indicate that this recursive call\
    \ was triggered by the first half of the conditional statement within max([3,\
    \ 4]).\n\nAfter this step has been completed, our code can now compare the 3 with\
    \ the result of max([4]). Since the 3 is not greater than that result (4), we\
    \ trigger the second half of the conditional. (This is the code, return max(array[1:]).)\
    \ In this case, we return max([4]).\n\nBut when our code returns max([4]), it\
    \ triggers the actual function call of max([4]). This is now the second time we’ve\
    \ triggered the max([4]) call:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_199_1.png)\n\
    \nAs you can see, the function, max([3, 4]) ends up calling max([4]) twice. Of\
    \ course, we’d rather try to avoid doing this if we don’t have to. If we’ve already\
    \ computed the result of max([4]) once, why should we call the same function again\
    \ just to get the same result?\n\nThis problem gets a lot worse when we move just\
    \ one level up the call chain. Here’s what happens when we call max([2, 3, 4])."
  mdcn: "对于一个长度为 N 的字符串，我们会生成 N! 个变位词。用大 O 表示法，这可以表示为 O(N!)。这也被称为*阶乘时间*。\n\nO(N!)\
    \ 是我们在本书中会遇到的最慢的大 O 类别。让我们看看它与其他“慢”大 O 类别相比如何：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_194_0.png)\n\
    \n尽管 O(N!) 极其缓慢，但我们在这里没有更好的选择，因为我们的任务是生成*所有*变位词，而一个 N 字符的词确实有 N! 个变位词。\n\n无论如何，递归在这个算法中扮演了关键角色，这是递归如何用于解决复杂问题的一个重要例子。\n\
    \n## 总结\n\n学习编写使用递归的函数当然需要练习。但你现在掌握了技巧和方法，这将使学习过程对你来说更容易。\n\n然而，我们的递归之旅尚未结束。虽然递归是解决各种问题的强大工具，但如果你不小心，它实际上可能会让你的代码*大幅*变慢。在下一章中，你将学习如何在保持代码简洁高效的同时运用递归。\n\
    \n## 练习\n\n以下练习为你提供了练习递归的机会。这些练习的答案可以在[第 11 章，第 444 页](#)部分找到。\n\n- 1. 使用递归编写一个函数，该函数接受一个字符串数组并返回所有字符串的总字符数。例如，如果输入数组是\
    \ [\"ab\", \"c\", \"def\", \"ghij\"]，输出应该是 10，因为总共有十个字符。\n\n- 2. 使用递归编写一个函数，该函数接受一个数字数组并返回一个仅包含偶数的新数组。\n\
    \n- 3. 一个特定的数字序列被称为*三角数*。模式以 1, 3, 6, 10, 15, 21 开始，并继续下去。要计算序列中的下一个数字，我们将序列中的前一个数字加上\
    \ N，其中 N 对应于该数字在序列中的位置。例如，序列中的第七个数字是 28，因为它是模式中的第七个数字，所以我们加上数字 7 和 21（序列中的前一个数字）。编写一个函数，该函数接受一个数字\
    \ N 并返回序列中正确的数字；也就是说，如果函数传入数字 7，函数将返回 28。\n\n- 4. 使用递归编写一个函数，该函数接受一个字符串并返回包含字符\
    \ \"x\" 的第一个索引。例如，字符串 \"abcdefghijklmnopqrstuvwxyz\" 在索引 23 处有一个 \"x\"。为简单起见，假设字符串*肯定*至少有一个\
    \ \"x\"。\n\n- 5. 这个问题被称为*唯一路径问题*：假设你有一个行和列的网格。编写一个函数，该函数接受行数和列数，并计算从左上角方格到右下角方格的可能的“最短”路径数量。\n\
    \n例如，这是一个三行七列的网格。你想从 S（起点）到达 F（终点）。\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_195_0.png)\n\
    \n“最短”路径的意思是，在每一步，你要么向右移动一步：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_195_1.png)\n\
    \n要么向下移动一步：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_196_0.png)\n\n同样，你的函数应该计算最短路径的*数量*。\n\
    \n# 第 12 章\n\n# 动态规划\n\n在上一章中，你学习了如何编写递归代码以及如何使用递归来解决一些相当复杂的问题。\n\n虽然递归当然可以解决*一些*问题，但如果使用不当，它也可能产生*新的*问题。事实上，递归通常是某些最慢的大\
    \ O 类别（如 O(2^N)）的罪魁祸首。\n\n不过，好消息是，许多这类问题是可以避免的。在本章中，你将学习如何识别递归代码中一些最常见的速度陷阱，以及如何用大\
    \ O 表示法来表达此类算法。更重要的是，你将学习解决这些问题的技术。\n\n还有一个好消息：本章中的技术相当简单。让我们看看如何使用这些简单但有效的方法，将我们的递归噩梦转变为递归的幸福。\n\
    \n## 不必要的递归调用\n\n这是一个递归函数，用于从数组中找到最大数：\n\n```\ndef max(array):\n    if not array:\n\
    \        return None\n\n    if len(array) == 1:\n        return array[0]\n\n \
    \   if array[0] > max(array[1:]):\n        return array[0]\n    else:\n      \
    \  return max(array[1:])\n```\n\n每次递归调用的本质是将单个数字（array[0]）与数组其余部分的最大数进行比较。（为了计算数组其余部分的最大数，我们调用了我们所在的同一个\
    \ max 函数，这就是函数递归的原因。）\n\n我们通过条件语句实现比较。条件语句的前半部分如下：\n\n```\nif array[0] > max(array[1:]):\n\
    \    return array[0]\n```\n\n这段代码的意思是，如果单个数字（array[0]）大于已经确定的数组其余部分的最大数（max(array[1:])），那么根据定义，array[0]\
    \ 必须是最大的数，所以我们返回它。\n\n这是条件语句的后半部分：\n\n```\nelse:\n    return max(array[1:])\n\
    ```\n\n这第二段代码的意思是，如果 array[0] *不*大于数组其余部分的最大数，那么数组其余部分的最大数就是整体最大的数，我们返回它。\n\n\
    虽然这段代码可以工作，但它包含一个隐藏的低效之处。如果你仔细观察，你会注意到我们的代码中出现了两次 max(array[1:]) 这个短语，分别在条件语句的每一半中。\n\
    \n问题在于，每次我们提到 max(array[1:])，我们都会触发一连串的递归调用。\n\n让我们用一个示例数组 [1, 2, 3, 4] 来分解一下。\n\
    \n我们知道我们将从比较 1 和剩余数组 [2, 3, 4] 的最大数开始。这反过来又会将 2 与剩余 [3, 4] 的最大数进行比较，而后者又会将 3 与\
    \ [4] 进行比较。这也会对 [4] 本身触发一次额外的递归调用，这是基本情况。\n\n然而，为了真正看清我们的代码是如何执行的，我们将从分析最底层的调用开始，然后沿着调用链向上分析。\n\
    \n让我们开始。\n\n## Max 递归过程分析\n\n当我们调用 max([4]) 时，函数简单地返回数字 4。同样，这是因为我们的基本情况是当数组只包含一个元素时，如以下代码行所示：\n\
    \n```\nif len(array) == 1:\n    return array[0]\n```\n\n这非常直接——它是一个单独的函数调用：\n\n\
    max([4])\n\n沿着调用链向上，让我们看看当我们调用 max([3, 4]) 时会发生什么。在条件语句的前半部分（if array[0] > max(array[1:]):），我们将\
    \ 3 与 max([4]) 进行比较。但调用 max([4]) 本身就是一个递归调用。下图描述了 max([3, 4]) 调用 max([4])：\n\n\
    ![](img/c0a46c67bb2536aa545ec1bd7065e742_199_0.png)\n\n注意，在箭头旁边，我们放了标签“1st”，表示这个递归调用是由\
    \ max([3, 4]) 内部条件语句的前半部分触发的。\n\n完成此步骤后，我们的代码现在可以将 3 与 max([4]) 的结果进行比较。由于 3 不大于该结果（4），我们触发条件语句的后半部分。（这是代码\
    \ return max(array[1:])。）在这种情况下，我们返回 max([4])。\n\n但当我们的代码返回 max([4]) 时，它触发了 max([4])\
    \ 的实际函数调用。这是我们第二次触发 max([4]) 调用：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_199_1.png)\n\
    \n如你所见，函数 max([3, 4]) 最终调用了 max([4]) 两次。当然，如果可以避免，我们宁愿不要这样做。如果我们已经计算过一次 max([4])\
    \ 的结果，为什么还要再次调用同一个函数来获取相同的结果呢？\n\n当我们沿着调用链向上移动一级时，这个问题会变得更糟。以下是当我们调用 max([2, 3,\
    \ 4]) 时发生的情况。"
