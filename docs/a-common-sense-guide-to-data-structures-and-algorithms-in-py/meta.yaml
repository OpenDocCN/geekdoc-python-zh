    Now that you understand what logarithms are, the meaning behind O(log N) will
    become clear.


    # O(log N) Explained


    Let''s bring this all back to Big O notation. In computer science, whenever we
    say O(log N), it''s actually shorthand for saying O(log₂ N). We just omit that
    small 2 for convenience.


    Recall that Big O notation resolves the key question: if there are N data elements,
    how many steps will the algorithm take?'
  - "[PAGE 62]\n\nO(log N) means that for N data elements, the algorithm would take\
    \ $log_2 N$ steps. If there are 8 elements, the algorithm would take three steps,\
    \ since $log_2 8 = 3$.\n\nSaid another way, if we keep dividing the 8 elements\
    \ in half, it would take us three steps until we end up with 1 element.\n\nThis\
    \ is *exactly* what happens with binary search. As we search for a particular\
    \ item, we keep dividing the array's cells in half until we narrow it down to\
    \ the correct number.\n\nSaid simply: *O(log N) means the algorithm takes as many\
    \ steps as it takes to keep halving the data elements until we remain with 1*.\n\
    \nThe following table demonstrates a striking difference between the efficiencies\
    \ of O(N) and O(log N):\n\n| N Elements | O(N) | O(log N) |\n| :--- | :--- | :---\
    \ |\n| 8 | 8 | 3 |\n| 16 | 16 | 4 |\n| 32 | 32 | 5 |\n| 64 | 64 | 6 |\n| 128 |\
    \ 128 | 7 |\n| 256 | 256 | 8 |\n| 512 | 512 | 9 |\n| 1024 | 1024 | 10 |\n\nWhile\
    \ the O(N) algorithm takes as many steps as there are data elements, the O(log\
    \ N) algorithm takes just one additional step each time the data is doubled.\n\
    \nIn future chapters, you'll encounter algorithms that fall under categories of\
    \ Big O notation other than the three you've learned about so far. But in the\
    \ meantime, let's apply these concepts to some examples of everyday code.\n\n\
    # Practical Examples\n\nHere's some typical Python code that prints all the items\
    \ from a list:\n\n```\nthings = ['apples', 'baboons', 'cribs', 'dulcimers']\n\
    for thing in things:\n    print(\"Here's a thing: \" + thing)\n```\n\nHow would\
    \ we describe the efficiency of this algorithm in Big O notation?"
