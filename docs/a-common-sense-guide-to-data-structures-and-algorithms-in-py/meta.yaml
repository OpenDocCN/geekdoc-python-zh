    \ steps. If there are 8 elements, the algorithm would take three steps, since\
    \ $log_2 8 = 3$.\n\nSaid another way, if we keep dividing the 8 elements in half,\
    \ it would take us three steps until we end up with 1 element.\n\nThis is *exactly*\
    \ what happens with binary search. As we search for a particular item, we keep\
    \ dividing the array's cells in half until we narrow it down to the correct number.\n\
    \nSaid simply: *O(log N) means the algorithm takes as many steps as it takes to\
    \ keep halving the data elements until we remain with 1*.\n\nThe following table\
    \ demonstrates a striking difference between the efficiencies of O(N) and O(log\
    \ N):\n\n| N Elements | O(N) | O(log N) |\n| :--- | :--- | :--- |\n| 8 | 8 | 3\
    \ |\n| 16 | 16 | 4 |\n| 32 | 32 | 5 |\n| 64 | 64 | 6 |\n| 128 | 128 | 7 |\n| 256\
    \ | 256 | 8 |\n| 512 | 512 | 9 |\n| 1024 | 1024 | 10 |\n\nWhile the O(N) algorithm\
    \ takes as many steps as there are data elements, the O(log N) algorithm takes\
