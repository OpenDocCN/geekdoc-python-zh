  md: '+   - In our example, we''d say that "j" is a *parent* to "m" and "b". Conversely,
    "m" and "b" are *children* of "j". Similarly, the "m" is a parent of "q" and "z",
    and "q" and "z" are children of "m".


    +   - As in a family tree, a node can have *descendants* and *ancestors*. A node''s
    descendants are *all* the nodes that stem from a node, while a node''s ancestors
    are *all* the nodes that it stems from. In our example, "j" is the ancestor of
    all the other nodes in the tree, and all the other nodes are, therefore, descendants
    of "j".


    +   - Trees are said to have *levels*. Each level is a row within the tree. Our
    example tree has three levels:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_259_0.png)


    +   - One property of a tree is how *balanced* it is. A tree is balanced when
    its nodes'' subtrees have the same number of nodes in it.


    For instance, the preceding tree is said to be perfectly balanced. If you look
    at each node, its two subtrees have the same number of nodes. The root node ("j")
