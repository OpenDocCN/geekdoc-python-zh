    ```\n\n## 第19章\n\n以下是第393页[练习](https://example.com)部分的习题解答。\n\n1.  空间复杂度为O(N²)。这是因为函数创建了一个名为`collection`的数组，该数组最终将包含N²个字符串。\n\
