  md: '# Agile Web Development with Rails 7


    Rails 7 completely redefines what it means to produce fantastic user experiences
    and provides a way to achieve all the benefits of single-page applications – at
    a fraction of the complexity. Rails 7 integrates the Hotwire frameworks of Stimulus
    and Turbo directly as the new defaults, together with that hot newness of import
    maps. The result is a toolkit so powerful that it allows a single individual to
    create modern applications upon which they can build a competitive business. The
    way it used to be.


    Sam Ruby

    (474 pages) ISBN: 9781680509298. $59.95

    https://pragprog.com/book/rails7


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_486_0.png)


    # Creating Software with Modern Diagramming Techniques


    Diagrams communicate relationships more directly and clearly than words ever can.
    Using only text-based markup, create meaningful and attractive diagrams to document
    your domain, visualize user flows, reveal system architecture at any desired level,
    or refactor your code. With the tools and techniques this book will give you,
    you''ll create a wide variety of diagrams in minutes, share them with others,
    and revise and update them immediately on the basis of feedback. Adding diagrams
    to your professional vocabulary will enable you to work through your ideas quickly
    when working on your own code or discussing a proposal with colleagues.


    Ashley Peacock

    (156 pages) ISBN: 9781680509830. $29.95

