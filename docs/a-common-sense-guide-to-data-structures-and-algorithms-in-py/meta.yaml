- img_proc: true
  md: "We can see that we need about 2N steps for N elements in the array.\n(Another\
    \ way to formulate this is to say that for N elements, we would need N + (N/2)\
    \ + (N/4) + (N/8) + ... 2 steps. This always turns out to be roughly 2N steps.)\n\
    Since Big O ignores constants, we drop the 2 from the 2N and say that Quickselect\
    \ has an efficiency of O(N).\n\n# Code Implementation: Quickselect\n\nFollowing\
    \ is an implementation of a quickselect method that can be dropped into the SortableArray\
    \ class described earlier. You'll note that it's very similar to the quicksort\
    \ method:\n\n```\ndef quickselect(self, kth_lowest_value, left_index, right_index):\n\
    \    if right_index - left_index <= 0:\n        return self.array[left_index]\n\
    \n    pivot_index = self.partition(left_index, right_index)\n\n    if kth_lowest_value\
    \ < pivot_index:\n        return self.quickselect(kth_lowest_value, left_index,\
    \ pivot_index - 1)\n    elif kth_lowest_value > pivot_index:\n        return self.quickselect(kth_lowest_value,\
    \ pivot_index + 1, right_index)\n    else:\n        return self.array[pivot_index]\n\
    ```\n\nThe variable kth_lowest_value allows us to choose which value we're searching\
    \ for. We can search for the second-to-lowest value, the fifth-to-lowest value,\
    \ or any other value we'd like.\n\nIf you want to find the second-to-lowest value\
    \ of an unsorted array, you'd run the following code:\n\n```\narray = [0, 50,\
    \ 20, 10, 60, 30]\nsortable_array = SortableArray(array)\nprint(sortable_array.quickselect(1,\
    \ 0, len(array) - 1))\n```\n\nThe first argument of the quickselect method accepts\
    \ the position you're looking for, starting at index 0. We've put in a 1 to represent\
    \ the second-to-lowest value. The second and third values are the left and right\
    \ indexes of the array, respectively.\n\n# Sorting as a Key to Other Algorithms\n\
    \nAs of this writing, the fastest sorting algorithms we know of have speeds of\
    \ O(N log N). While Quicksort is one of the most popular among them, there are\
    \ many others as well. Mergesort is another well-known O(N log N) sorting algorithm\
    \ and will be covered in Volume 2 of this book."
