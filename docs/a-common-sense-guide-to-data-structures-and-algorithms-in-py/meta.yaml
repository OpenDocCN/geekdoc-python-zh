  md: '# Log(N) Levels


    Here''s yet another way of describing why search in a binary search tree is O(log
    N), which will reveal another property about binary trees in general: *if there
    are N nodes in a balanced binary tree, there will be about log N levels (that
    is, rows)*.


    To understand this, let''s assume each row in the tree is completely filled with
    nodes, and that there aren''t any empty positions. If you think about it, each
    time we add a new full level to the tree, we end up roughly doubling the number
    of nodes that the tree has. (Really, we''re doubling the nodes and adding one.)


    For example, a binary tree with four complete levels has fifteen nodes. (Go ahead,
    count them.) If we add a fifth complete level, that means we add two children
    to each of the eight nodes in the fourth level. This means we add sixteen new
    nodes, roughly doubling the size of the tree.


    It emerges that each new level doubles the size of the tree. Accordingly, *a tree
    containing N nodes will require log(N) levels* to hold all the nodes.


    In the context of binary search, we noted that the pattern of log(N) is that with
    each step of the search, we can eliminate half of the remaining data. The number
    of levels needed in a binary tree follows this pattern as well.


    Let''s take a binary tree that needs to hold thirty-one nodes. With our fifth
    level, we can hold sixteen of those nodes. This took care of roughly half of the
    data, leaving us with just fifteen nodes that we still need to find room for.
    With the fourth level, we take care of eight of those nodes, leaving us with seven
    unaccounted for. With the third level, we take care of four of those nodes, and
    so on.


    Indeed, log 31 is (approximately) 5. So we''ve now concluded that a balanced tree
    with N nodes will have log(N) levels.


    Since this is the case, it makes a lot of sense as to why searching a binary search
    tree takes up to log(N) steps: because each step of the search causes us to move
    down a level, we take up to as many steps as there are levels in the tree.


    However you prefer to think about it, searching a binary search tree takes O(log
    N).


    Now, while search in a binary search tree is O(log N), so is binary search within
    an ordered array, in which each number we select also eliminates half'
  merge: -1
  pgno: 264
- img_proc: true
  md: "of the remaining possible values. In this regard, then, searching a binary\
    \ search tree has the same efficiency as binary search within an ordered array.\n\
    Where binary search trees really shine over ordered arrays, though, is with insertion.\
    \ We'll get to that soon.\n\n# Code Implementation: Searching a Binary Search\
    \ Tree\n\nTo implement the search operation, as well as the other binary search\
    \ tree operations, we're going to make heavy use of recursion. You learned back\
    \ in Chapter 10, Recursively Recurse with Recursion, on page 149, that recursion\
    \ is key when dealing with data structures that have an arbitrary number of levels\
    \ of depth. A tree is such a data structure, as it can have an infinite number\
    \ of levels.\nHere's how we can use recursion to implement search with Python.\
    \ While we could have alternatively used a loop instead, the recursive code for\
    \ search is more concise and elegant:\n\n```\ndef search(search_value, node):\n\
    \    if not node or node.value == search_value:\n        return node\n    elif\
    \ search_value < node.value:\n        return search(search_value, node.left_child)\n\
    \    else:\n        return search(search_value, node.right_child)\n```\n\nThis\
    \ search function accepts the search_value we're searching for and a node that\
    \ we'll use as the base for our search. The first time we call search, the node\
    \ will be the root node. However, in the subsequent recursive calls, the node\
    \ may be another node within the tree.\nOur function deals with four possible\
    \ cases, two of which are the base cases:\n\n```\nif not node or node.value ==\
    \ search_value:\n    return node\n```\n\nOne base case is when the node contains\
    \ the search_value we're looking for, in which case we can return the node and\
    \ not make any recursive calls.\nThe other base case is when there is no node.\
    \ This will make more sense after we've examined the other cases, so let's come\
    \ back to this shortly.\nThe next case is when the search_value is less than the\
    \ value of the current node:\n\n```\nelif search_value < node.value:\n    return\
    \ search(search_value, node.left_child)\n```"
