    [\"c\", \"c\", \"c\", \"a\", \"a\", \"a\", \"d\", \"d\", \"d\", \"b\", \"b\",\
    \ \"b\"]\n```\n\nAgain, we don't care about the order of the groups, so these\
    \ results would also be acceptable:\n\n```\n[\"d\", \"d\", \"d\", \"c\", \"c\"\
    , \"c\", \"a\", \"a\", \"a\", \"b\", \"b\", \"b\"]\n[\"b\", \"b\", \"b\", \"c\"\
    , \"c\", \"c\", \"a\", \"a\", \"a\", \"d\", \"d\", \"d\"]\n```\n\nNow, any classic\
    \ sorting algorithm would accomplish our task, since we'd end up with this:\n\n\
    ```\n[\"a\", \"a\", \"a\", \"b\", \"b\", \"b\", \"c\", \"c\", \"c\", \"d\", \"\
    d\", \"d\"]\n```\n\nAs you know, the fastest sorting algorithms clock in at O(N\
    \ log N). But can we do better?\n\nLet's begin by coming up with the best-imaginable\
    \ Big O. Since we know that there generally aren't sorting algorithms faster than\
    \ O(N log N), it may be difficult to imagine how we can sort something in a faster\
    \ time.\n\nBut since we're not doing a precise sort, if someone told me that our\
    \ task can be done in O(N) time, I suppose I'd believe them. We certainly can't\
    \ beat O(N), since we need to visit each value at least once. So let's aim for\
    \ O(N).\n\nLet's employ the technique we've been discussing and imagine our data\
    \ in the form of another data structure.\n\nWe may as well start with a hash table.\
    \ What would our array of strings look like if it were a hash table?\n\nIf we\
    \ took a similar approach to what we did with the anagrams, we could represent\
    \ our array in the following way:\n\n```\n{\"a\": 3, \"c\": 3, \"d\": 3, \"b\"\
    : 3}\n```\n\nAs with our previous example, there's some data loss: we couldn't\
    \ convert this hash table back into our original array, as we wouldn't know the\
    \ original order of all the strings.\n\nHowever, for our purposes of grouping,\
    \ this data loss doesn't matter. In fact, the hash table contains all the data\
    \ we need to create the grouped array we're looking for.\n\nSpecifically, we can\
    \ iterate over each key-value pair within the hash table and use that data to\
    \ populate an array with the correct number of each string. Here's the code for\
    \ this:\n\n```\ndef group_sort(array):\n    hash_table = {}\n    new_array = []\n\
    \n    for value in array:\n        if value in hash_table:\n            hash_table[value]\
    \ += 1\n        else:\n            hash_table[value] = 1\n\n    for key in hash_table:\n\
    \        count = hash_table[key]\n        for i in range(count):\n           \
    \ new_array.append(key)\n\n    return new_array\n```\n\nOur `group_sort` function\
    \ accepts an array and then begins by creating an empty `hash_table` and an empty\
    \ `new_array`.\n\nWe first collect the tallies of each string and store them in\
    \ the hash table:\n\n```\nfor value in array:\n    if hash_table.get(value):\n\
    \        hash_table[value] += 1\n    else:\n        hash_table[value] = 1\n```\n\
    \nThis creates the hash table that looks like this:\n\n```\n{\"a\": 3, \"c\":\
    \ 3, \"d\": 3, \"b\": 3}\n```\n\nThen we proceed to iterate over each key-value\
    \ pair and use this data to populate the `new_array`:\n\n```\nfor key in hash_table:\n\
    \    count = hash_table[key]\n    for i in range(0, count):\n        new_array.append(key)\n\
    ```\n\nSo when we reach the pair \"a\": 3, we add three \"a\"s to the `new_array`.\
    \ And when we reach \"c\": 3, we add three \"c\"s to the `new_array`, and so on.\
    \ By the time we're done, our `new_array` will contain all the strings organized\
    \ in groups.\n\nThis algorithm takes just O(N) time, which is a significant optimization\
    \ over the O(N log N) that sorting would have taken. We do use up O(N) space with\
    \ the extra hash table and `new_array`, although we could choose to overwrite\
    \ the original array to save additional memory. That being said, the space taken\
    \ up by the hash table would still be O(N) in the worst case, where each string\
    \ in the array is different.\n\nBut again, if speed is our goal, we achieved our\
    \ best-imaginable Big O, which is a fantastic win.\n\n## Wrapping Up\n\nThe techniques\
    \ presented here can be useful in optimizing your code. Again, you'll always want\
    \ to start by determining your current Big O and the best-imaginable Big O. After\
    \ that, you have all the other techniques at your disposal.\n\nYou'll find that\
    \ some techniques work better than others in certain situations, but they're all\
    \ worth thinking about in a given situation to see if they may be the right tool\
    \ for the job.\n\nWith experience, you'll hone your optimization sense and probably\
    \ develop additional techniques of your own!\n\n## Parting Thoughts\n\nYou've\
