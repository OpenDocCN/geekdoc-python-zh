- md: 'Step 1: We officially visit Atlanta and make it the current_city.

    To indicate that it''s the current_city, we''ll surround it with lines. And to
    add to the record that we''ve visited it, we''ll add a check mark:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_376_0.png)


    In the next steps, we''ll proceed to inspect each of the current_city''s adjacent
    cities. This is how we discover new cities; if a city we have access to has adjacent
    cities we weren''t aware of before, we can add them to our map.


    Step 2: One city adjacent to Atlanta is Boston. As we can see, the price from
    Atlanta to Boston is $100. We then check the cheapest_prices_table to see whether
    this is the cheapest known price from Atlanta to Boston, but it turns out we haven''t
    recorded *any* prices from Atlanta to Boston yet. That means this is the cheapest
    *known* flight from Atlanta to Boston (as of now), so we add that to the cheapest_prices_table:


    From Atlanta To: **Boston**

    $0 $100


    Since we''ve made a change to the cheapest_prices_table, we now also need to modify
    the cheapest_previous_stopover_city_table, making the adjacent city (Boston) the
    key and the current_city the value:


    **Cheapest Previous Stopover City from Atlanta:** **Boston**

    Atlanta


    Adding this data to this table means that to earn the cheapest known price from
    Atlanta to Boston ($100), the city we need to visit *immediately before Boston*
    is Atlanta. At this point, this is obvious, since Atlanta is the *only* way to
    get to Boston that we know of. However, as we proceed, we''ll see why this second
    table becomes useful.


    Step 3: We''ve checked out Boston, but Atlanta has another adjacent city, Denver.
    We check whether the price ($160) is the cheapest known route from Atlanta to
    Denver, but Denver isn''t in the `cheapest_prices_table` at all yet, so we add
    it as the cheapest known flight:


    From Atlanta To: Boston Denver

    $0 $100 $160


    We then also add Denver and Atlanta as a key-value pair to the `cheapest_previous_stopover_city_table`:


    Cheapest Previous Stopover City from Atlanta: Boston Denver

    Atlanta Atlanta


    Step 4: By this point, we''ve inspected all of Atlanta''s adjacent cities, so
    it''s time to visit our next city. But we need to figure out which city to visit
    next.


    Now, as stated in the algorithm steps earlier, we only proceed to visit cities
    we haven''t yet visited. Furthermore, among the unvisited cities, we always choose
    to *first* visit the city that has the cheapest known route *from the starting
    city*. We can get this data from the `cheapest_prices_table`.


    In our example, the only cities we know about that we haven''t visited yet are
    Boston or Denver. By looking at the `cheapest_prices_table`, we can see that it''s
    cheaper to get from Atlanta to Boston than it is to get from Atlanta to Denver,
    so we''re going to visit Boston next.


    Step 5: We visit Boston and designate it as the `current_city`:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_377_0.png)


    Next, we''re going to inspect Boston''s adjacent cities.


    Step 6: Boston has two adjacent cities, Chicago and Denver. (Atlanta isn''t considered
    adjacent, since we can''t fly from Boston to Atlanta.)


    Which city should we visit first—Chicago or Denver? Again, we want to first visit
    the city whose price is cheapest if we were flying to it *from Atlanta*. So let''s
    do the math.


    The price from Boston to Chicago alone is $120. When looking at the cheapest_prices_table,
    we can see that the cheapest route from Atlanta to Boston is $100. So this means
    that the cheapest flight from Atlanta to Chicago *with Boston as the previous
    stopover city* would be $220.


    Since, at this point, this is the only known price from Atlanta to Chicago, we''ll
    add it to the cheapest_prices_table. We''ll insert it in the middle of the table
    to keep the cities alphabetized:


    | From Atlanta To: | Boston | Chicago | Denver |

    | :--- | :--- | :--- | :--- |

    | | $0 | $100 | $220 | $160 |


    Again, because we made a change to that table, we''ll also modify the cheapest_previous_stopover_city_table.
    The adjacent city always becomes the key, and the current_city always becomes
    the value, so the table becomes:


    | Cheapest Previous Stopover City from Atlanta: | Boston | Chicago | Denver |

    | :--- | :--- | :--- | :--- |

    | | Atlanta | Boston | Atlanta |


    In our quest to find the city to visit next, we analyzed Chicago. We''ll inspect
    Denver next.


    Step 7: Let''s now look at the edge between Boston and Denver. We can see that
    the price is $180. Since the cheapest flight from Atlanta to Boston, again, is
    $100, that would mean the cheapest flight from Atlanta to Denver *through Boston
    as the previous stopover city* is $280.


    This gets a little interesting, because when we inspect our cheapest_prices_table,
    we can see that the cheapest route from Atlanta to Denver is $160, *which is cheaper*
    than the Atlanta–Boston–Denver route. Accordingly, *we do not modify* either of
    our tables; we want to leave $160 as the cheapest known route from Atlanta to
    Denver.


    We''re done with this step, and since we''ve looked at all of Boston''s adjacent
    cities, we can now visit our next city.


    Step 8: The current known unvisited cities are Chicago and Denver. Again, the
    one we visit next—and pay careful attention to this—is the city with the cheapest
    known path *from our starting city* (Atlanta).


    Looking at our cheapest_prices_table, we can see that it''s cheaper to go from
    Atlanta to Denver ($160) than it is to go to from Atlanta to Chicago ($220), so
    that means that we visit Denver next:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_379_0.png)


    Next up, we''ll look at Denver''s adjacent cities.


    Step 9: Denver has two adjacent cities, Chicago and El Paso. Which of these cities
    will we visit next? To find out, we need to analyze the prices to each city. Let''s
    start with Chicago.


    It costs just $40 to go from Denver to Chicago (a good deal!), which means the
    cheapest flight from Atlanta to Chicago *through Denver as the previous stopover
    city* would be $200, since the cheapest route from Atlanta to Denver is $160.


    When looking at the cheapest_prices_table, we can see that the current cheapest
    price from Atlanta to Chicago is $220. That means this new route we just found
    to Chicago through Denver is even cheaper, so we can update the cheapest_prices_table
    accordingly:


    | From Atlanta To: | Boston | Chicago | Denver |

    | :--- | :--- | :--- | :--- |

    | $0 | $100 | $200 | $160 |


    Whenever we update the cheapest_prices_table, we also have to update the cheapest_previous_stopover_city_table.
    We set the adjacent city (Chicago) as the key and the current_city (Denver) as
    the value. Now, in this case, Chicago already exists as a key. This means we''ll
    be overwriting its value from Boston to Denver:


    | Cheapest Previous Stopover City from Atlanta: | Boston | Chicago | Denver |

    | :--- | :--- | :--- | :--- |

    | | Atlanta | Denver | Atlanta |


    What this means is that to nab the cheapest flight path from Atlanta to Chicago,
    we need to stop over at Denver as the city immediately prior to Chicago; that
    is, Denver should be our second-to-last stop before we proceed to Chicago. Only
    then will we save the most money.


    This information will be useful in determining the cheapest path from Atlanta
    to our destination city, as you''ll see in a little bit. Hang on, we''re almost
    there!


    Step 10: Denver has another adjacent city, El Paso. The price from Denver to El
    Paso is $140. We can now construct our first known price from Atlanta to El Paso.
    The `cheapest_prices_table` tells us the cheapest price from Atlanta to Denver
    is $160. This means if we then go from Denver to El Paso, we incur another $140,
    making the total price from Atlanta to El Paso $300. We can add this to the `cheapest_prices_table`:


    | From Atlanta To: | Boston | Chicago | Denver | *El Paso* |

    | :--- | :--- | :--- | :--- | :--- |

    | | $0 | $100 | $200 | $160 | *$300* |


    We must then also add the key-value pair of El Paso-Denver to our `cheapest_previous_stopover_city_table`:


    | Cheapest Previous Stopover City from Atlanta: | Boston | Chicago | Denver |
    *El Paso* |

    | :--- | :--- | :--- | :--- | :--- |

    | | Atlanta | Denver | Atlanta | *Denver* |


    Again, this means that to save the most money when flying from Atlanta to El Paso,
    our second-to-last stop should be Denver.


    We''ve seen all our `current_city`''s adjacent cities, so it''s time to visit
    our next city.


    Step 11: We have two known unvisited cities, Chicago and El Paso. Since it''s
    cheaper to get from Atlanta to Chicago ($200) than it is to get from Atlanta to
    El Paso ($300), we visit Chicago next, as shown in the [graph on page 373](graph
    on page 373).


    Step 12: Chicago has only one adjacent city, El Paso. The price from Chicago to
    El Paso is $80 (not bad). With this information, we can now calculate the cheapest
    price from Atlanta to El Paso when assuming that Chicago is our second-to-last
    stop.


    The `cheapest_prices_table` shows us that the cheapest path from Atlanta to Chicago
    is $200. Adding the $80 to this means the cheapest price from Atlanta to El Paso
    *with Chicago as the second-to-last stop* would cost $280.


    Wait! This is cheaper than the currently known cheapest path from Atlanta to El
    Paso. In our `cheapest_prices_table`, we see that the cheapest known price is
    $300. But when we fly through Chicago, the price is $280, which is cheaper.'
  mdcn: '步骤 1：我们正式访问亚特兰大，并将其设为 `current_city`。

    为了表明它是 `current_city`，我们将用线条将其框起来。同时，为了记录我们已经访问过它，我们将添加一个勾选标记：


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_376_0.png)


    在接下来的步骤中，我们将逐一检查 `current_city` 的每个相邻城市。这就是我们发现新城市的方式；如果我们能到达的某个城市有我们之前不知道的相邻城市，我们就可以将它们添加到我们的地图中。


    步骤 2：亚特兰大的一个相邻城市是波士顿。如图所示，从亚特兰大到波士顿的价格是 $100。然后我们检查 `cheapest_prices_table`，看看这是否是从亚特兰大到波士顿已知的最便宜价格，但结果发现我们尚未记录从亚特兰大到波士顿的*任何*价格。这意味着这是目前从亚特兰大到波士顿最便宜的*已知*航班，因此我们将其添加到
    `cheapest_prices_table` 中：


    从亚特兰大到：**波士顿**

    $0 $100


    由于我们对 `cheapest_prices_table` 进行了更改，我们现在还需要修改 `cheapest_previous_stopover_city_table`，将相邻城市（波士顿）设为键，将
    `current_city` 设为值：


    **从亚特兰大出发的最便宜前序中转城市：** **波士顿**

    亚特兰大


    将此数据添加到该表中意味着，要获得从亚特兰大到波士顿的最便宜已知价格（$100），我们需要在*波士顿之前立即访问*的城市是亚特兰大。此时，这很明显，因为亚特兰大是我们已知的到达波士顿的*唯一*途径。然而，随着我们继续，我们将看到为什么这第二个表会变得有用。


    步骤 3：我们已经检查了波士顿，但亚特兰大还有另一个相邻城市丹佛。我们检查价格（$160）是否是从亚特兰大到丹佛的最便宜已知路线，但丹佛根本还没有出现在 `cheapest_prices_table`
    中，因此我们将其作为最便宜的已知航班添加：


    从亚特兰大到：波士顿 丹佛

    $0 $100 $160


    然后，我们还将丹佛和亚特兰大作为键值对添加到 `cheapest_previous_stopover_city_table` 中：


    从亚特兰大出发的最便宜前序中转城市：波士顿 丹佛

    亚特兰大 亚特兰大


    步骤 4：至此，我们已经检查了亚特兰大的所有相邻城市，所以是时候访问我们的下一个城市了。但我们需要确定接下来要访问哪个城市。


    现在，如前面的算法步骤所述，我们只继续访问尚未访问过的城市。此外，在未访问的城市中，我们总是选择*首先*访问从*起始城市*出发已知路线最便宜的城市。我们可以从
    `cheapest_prices_table` 中获取此数据。


    在我们的例子中，我们已知尚未访问的城市只有波士顿或丹佛。通过查看 `cheapest_prices_table`，我们可以看到从亚特兰大到波士顿比从亚特兰大到丹佛更便宜，因此我们接下来将访问波士顿。


    步骤 5：我们访问波士顿并将其指定为 `current_city`：


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_377_0.png)


    接下来，我们将检查波士顿的相邻城市。


    步骤 6：波士顿有两个相邻城市，芝加哥和丹佛。（亚特兰大不被视为相邻城市，因为我们不能从波士顿飞往亚特兰大。）


    我们应该先访问哪个城市——芝加哥还是丹佛？同样，我们希望首先访问从*亚特兰大*飞往该城市价格最便宜的那个。所以让我们计算一下。


    从波士顿到芝加哥的单独价格是 $120。查看 `cheapest_prices_table`，我们可以看到从亚特兰大到波士顿的最便宜路线是 $100。这意味着，*以波士顿为前序中转城市*，从亚特兰大到芝加哥的最便宜航班将是
    $220。


    由于此时这是从亚特兰大到芝加哥唯一已知的价格，我们将把它添加到 `cheapest_prices_table` 中。我们将把它插入表格中间以保持城市按字母顺序排列：


    | 从亚特兰大到： | 波士顿 | 芝加哥 | 丹佛 |

    | :--- | :--- | :--- | :--- |

    | | $0 | $100 | $220 | $160 |


    同样，因为我们对该表进行了更改，我们也将修改 `cheapest_previous_stopover_city_table`。相邻城市始终成为键，`current_city`
    始终成为值，因此表格变为：


    | 从亚特兰大出发的最便宜前序中转城市： | 波士顿 | 芝加哥 | 丹佛 |

    | :--- | :--- | :--- | :--- |

    | | 亚特兰大 | 波士顿 | 亚特兰大 |


    在我们寻找下一个要访问的城市的过程中，我们分析了芝加哥。接下来我们将检查丹佛。


    步骤 7：现在让我们看看波士顿和丹佛之间的边。我们可以看到价格是 $180。由于从亚特兰大到波士顿的最便宜航班同样是 $100，这意味着*以波士顿为前序中转城市*，从亚特兰大到丹佛的最便宜航班将是
    $280。


    这变得有点有趣，因为当我们检查 `cheapest_prices_table` 时，我们可以看到从亚特兰大到丹佛的最便宜路线是 $160，这比亚特兰大–波士顿–丹佛路线*更便宜*。因此，*我们不修改*任何一个表；我们希望将
    $160 保留为从亚特兰大到丹佛的最便宜已知路线。


    我们完成了这一步，并且由于我们已经查看了波士顿的所有相邻城市，我们现在可以访问我们的下一个城市。


    步骤 8：当前已知的未访问城市是芝加哥和丹佛。同样，我们接下来要访问的——请仔细注意这一点——是从*我们的起始城市*（亚特兰大）出发已知路径最便宜的城市。


    查看我们的 `cheapest_prices_table`，我们可以看到从亚特兰大到丹佛（$160）比从亚特兰大到芝加哥（$220）更便宜，这意味着我们接下来访问丹佛：


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_379_0.png)


    接下来，我们将查看丹佛的相邻城市。


    步骤 9：丹佛有两个相邻城市，芝加哥和埃尔帕索。接下来我们将访问这些城市中的哪一个？要找出答案，我们需要分析到每个城市的价格。让我们从芝加哥开始。


    从丹佛到芝加哥只需 $40（一笔划算的交易！），这意味着*以丹佛为前序中转城市*，从亚特兰大到芝加哥的最便宜航班将是 $200，因为从亚特兰大到丹佛的最便宜路线是
    $160。


    查看 `cheapest_prices_table`，我们可以看到当前从亚特兰大到芝加哥的最便宜价格是 $220。这意味着我们刚刚发现的这条经由丹佛到芝加哥的新路线甚至更便宜，因此我们可以相应地更新
    `cheapest_prices_table`：


    | 从亚特兰大到： | 波士顿 | 芝加哥 | 丹佛 |

    | :--- | :--- | :--- | :--- |

    | $0 | $100 | $200 | $160 |


    每当我们更新 `cheapest_prices_table` 时，我们也必须更新 `cheapest_previous_stopover_city_table`。我们将相邻城市（芝加哥）设为键，将
    `current_city`（丹佛）设为值。现在，在这种情况下，芝加哥已经作为一个键存在。这意味着我们将用丹佛覆盖其原来的值波士顿：


    | 从亚特兰大出发的最便宜前序中转城市： | 波士顿 | 芝加哥 | 丹佛 |

    | :--- | :--- | :--- | :--- |

    | | 亚特兰大 | 丹佛 | 亚特兰大 |


    这意味着，要获得从亚特兰大到芝加哥的最便宜航班路径，我们需要在丹佛中转，作为紧邻芝加哥之前的城市；也就是说，丹佛应该是我们前往芝加哥之前的倒数第二站。只有这样，我们才能节省最多的钱。


    这些信息在确定从亚特兰大到我们目的地城市的最便宜路径时将非常有用，你稍后就会看到。坚持住，我们快到了！


    步骤 10：丹佛还有另一个相邻城市，埃尔帕索。从丹佛到埃尔帕索的价格是 $140。我们现在可以构建从亚特兰大到埃尔帕索的第一个已知价格。`cheapest_prices_table`
    告诉我们从亚特兰大到丹佛的最便宜价格是 $160。这意味着如果我们从丹佛前往埃尔帕索，我们将再花费 $140，使得从亚特兰大到埃尔帕索的总价格为 $300。我们可以将其添加到
    `cheapest_prices_table` 中：


    | 从亚特兰大到： | 波士顿 | 芝加哥 | 丹佛 | *埃尔帕索* |

    | :--- | :--- | :--- | :--- | :--- |

    | | $0 | $100 | $200 | $160 | *$300* |


    然后，我们还必须将埃尔帕索-丹佛的键值对添加到我们的 `cheapest_previous_stopover_city_table` 中：


    | 从亚特兰大出发的最便宜前序中转城市： | 波士顿 | 芝加哥 | 丹佛 | *埃尔帕索* |

    | :--- | :--- | :--- | :--- | :--- |

    | | 亚特兰大 | 丹佛 | 亚特兰大 | *丹佛* |


    同样，这意味着为了在从亚特兰大飞往埃尔帕索时节省最多的钱，我们的倒数第二站应该是丹佛。


    我们已经查看了 `current_city` 的所有相邻城市，所以是时候访问我们的下一个城市了。


    步骤 11：我们有两个已知的未访问城市，芝加哥和埃尔帕索。由于从亚特兰大到芝加哥（$200）比从亚特兰大到埃尔帕索（$300）更便宜，我们接下来访问芝加哥，如[第
    373 页的图](graph on page 373)所示。


    步骤 12：芝加哥只有一个相邻城市，埃尔帕索。从芝加哥到埃尔帕索的价格是 $80（还不错）。有了这个信息，我们现在可以计算在假设芝加哥是我们倒数第二站的情况下，从亚特兰大到埃尔帕索的最便宜价格。


    `cheapest_prices_table` 显示从亚特兰大到芝加哥的最便宜路径是 $200。加上 $80，这意味着*以芝加哥为倒数第二站*，从亚特兰大到埃尔帕索的最便宜价格将是
    $280。


    等等！这比目前已知的从亚特兰大到埃尔帕索的最便宜路径更便宜。在我们的 `cheapest_prices_table` 中，我们看到已知的最便宜价格是 $300。但当我们经由芝加哥飞行时，价格是
    $280，这更便宜。'
