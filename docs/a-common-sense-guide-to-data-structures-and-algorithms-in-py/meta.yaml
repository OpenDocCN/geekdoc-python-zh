    \n有趣的是，每当我们从链表中删除一个节点时，该节点仍然存在于内存中的某个位置。我们只是通过确保列表中没有其他节点链接到它，从而将其从列表中移除。这产生了从列表中删除该节点的*效果*，即使该节点在内存中仍然存在。\n\
