    \n然后，我们递归调用 `collect_all_words` 处理“c”子节点。同时传入 `word + key` 作为 `word` 参数。由于 `word`\
    \ 为空且 `key` 是“c”，所以 `word + key` 是字符串“c”。我们还传入了仍然为空的 `words` 数组。下图展示了我们进行此递归调用后的位置：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_330_0.png)\n\n**第二次调用**：我们遍历当前节点的子节点。它只有一个子键“a”。在递归调用\
    \ `collect_all_words` 处理相应的子节点之前，我们将当前调用添加到调用栈中。在接下来的图中，我们将此当前节点称为“a”节点，意思是它是拥有“a”作为子节点的节点。\n\
    \n然后我们递归调用 `collect_all_words`。我们传入子节点、“ca”（即 `word + key`）以及仍然为空的 `words` 数组：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_330_1.png)\n\n**第三次调用**：我们遍历当前节点的子节点，它们是“n”和“t”。我们将从“n”开始。不过，在进行任何递归调用之前，我们需要先将当前调用添加到调用栈中。在接下来的图中，我们将此当前节点称为“n/t”节点，意思是它是同时拥有“n”和“t”作为子节点的节点。\n\
    \n当我们随后在“n”子节点上调用 `collect_all_words` 时，我们同时传入“can”作为 `word` 参数以及空的 `words` 数组：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_331_0.png)\n\n**第四次调用**：我们遍历当前节点的子节点。在这种情况下，它只有一个子节点，即“*”。这是我们的基本情况。我们将当前单词“can”添加到\
    \ `words` 数组中：\n\n```\nwords = [\"can\"]\n```\n\n**第五次调用**：现在我们从调用栈中弹出顶部的调用，即对拥有子键“n”和“t”的节点进行的\
    \ `collect_all_words` 调用，当时 `word` 是“ca”。这意味着我们现在返回到那个调用（就像我们返回到从调用栈中弹出的任何调用一样）：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_331_1.png)\n\n这里我们可以提出一个微妙但重要的观点。在当前调用中，`word`\
    \ 又变回了“ca”，因为那是我们最初发起此调用时的 `word` 参数。然而，`words` 数组现在包含了单词“can”，即使在我们最初进行此调用时数组是空的。\n\
    \n原因如下。在许多编程语言中，数组可以在调用栈中上下传递，因为即使我们向数组添加新值，数组在内存中仍然是同一个对象。（同样的概念也适用于哈希表，这就是我们能够在[动态规划](Dynamic\
    \ Programming)中查看的备忘录技术中传递它的原因。）\n\n另一方面，当字符串被修改时，计算机会创建一个新字符串，而不是真正修改原始字符串对象。因此，当我们通过将\
    \ `word` 从“ca”更改为“can”来更新它时，先前的调用仍然只能访问原始字符串“ca”。（在某些语言中，这可能略有不同。但就我们的目的而言，这是总体思路。）\n\
    \n无论如何，我们正处于一个调用中，其中 `words` 包含单词“can”，而 `word` 是“ca”。\n\n**第六次调用**：此时，我们已经遍历了“n”键，所以循环现在进行到“t”键。在递归调用\
    \ `collect_all_words` 处理“t”子节点之前，我们需要再次将当前调用添加到调用栈中。（这将是我们第二次将此调用添加到调用栈。我们之前将其弹出，但现在我们将再次添加它。）\n\
    \n当我们调用 `collect_all_words` 处理“t”子节点时，我们传入“cat”作为 `word` 参数（因为那是 `word + key`）以及\
    \ `words` 数组：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_332_0.png)\n\n**第七次调用**：我们遍历当前节点的子节点。这里唯一的子节点是“*”，所以我们把当前单词“cat”添加到\
    \ `words` 数组中：\n\n```\nwords = [\"can\", \"cat\"]\n```\n\n此时，我们可以展开调用栈，弹出每个调用并完成其执行，每个调用都以返回\
    \ `words` 数组结束。我们完成的最后一个调用——也就是最初启动这一切的调用——也返回了 `words`。因为它包含了字符串“can”和“cat”，所以我们成功地返回了字典树的整个单词列表。\n\
    \n## 完成自动补全功能\n\n我们终于可以实现自动补全功能了。事实上，我们基本上已经完成了所有准备工作。我们只需要将各个部分组合起来。\n\n这是一个可以放入我们\
    \ `Trie` 类的基本自动补全方法：\n\n```\ndef autocomplete(self, prefix):\n    current_node\
    \ = self.search(prefix)\n\n    if not current_node:\n        return None\n\n \
    \   return self.collect_all_words([], current_node)\n```\n\n是的，就是这样。通过结合使用我们的\
    \ `search` 方法和 `collect_all_words` 方法，我们可以自动补全任何前缀。以下是其工作原理。\n\n`autocomplete`\
    \ 方法接受 `prefix` 参数，即用户开始输入的字符串。\n\n首先，我们在字典树中搜索该前缀是否存在。如果 `search` 方法在字典树中找不到该前缀，它会返回\
    \ `None`，因此我们的方法也返回 `None`。\n\n然而，如果在字典树中找到了该前缀，`search` 方法会返回*字典树中代表该前缀最后一个字符的节点*。我们之前提到过，我们本可以让\
    \ `search` 方法在找到单词后返回 `True`。我们让它返回最终节点的原因是为了让我们可以利用 `search` 方法来帮助实现自动补全功能。\n\
    \n我们的 `autocomplete` 方法继续调用 `collect_all_words` 方法，处理由 `search` 方法返回的节点。这会找到并收集从该最终节点衍生出的所有单词，这些单词代表了可以附加到原始前缀以形成一个完整单词的所有可能后缀。\n\
    \n我们的方法最终返回一个包含用户前缀所有可能后缀的数组，然后我们可以将其作为可能的自动补全选项显示给用户。\n\n## 带值的字典树：更好的自动补全\n\n\
    仔细想想，一个好的自动补全功能不一定需要显示用户可能想要输入的*每一个*可能的单词。例如，显示十六个选项会让用户感到不知所措，所以我们宁愿只显示可用列表中最受欢迎的单词。\n\
    \n例如，如果用户开始输入“bal”，用户可能想要输入“ball”、“bald”或“balance”。当然，用户也可能在输入生僻词“balter”（如果你想知道的话，意思是笨拙地跳舞）。然而，“balter”很可能*不是*用户想要的词，因为它不是一个常用词。\n\
    \n为了显示最受欢迎的单词选项，我们需要以某种方式将单词的流行度数据也存储在我们的字典树中。我们很幸运，因为我们只需要对字典树进行轻微的修改就能实现这一点。\n\
    \n在我们当前的字典树实现中，每次我们设置“*”键时，我们都将其值设为 `None`。这是因为我们只关注“*”键；其值没有意义。\n\n然而，我们可以利用这些值来存储关于单词本身的额外数据，例如它们的流行程度。为了简单起见，我们使用一个简单的1到10的范围，其中1代表最罕见的单词，10代表极其流行的单词。\n\
    \n假设“ball”是一个非常流行的单词，流行度评分为10。单词“balance”可能稍微不那么流行，评分为9。单词“bald”使用频率更低，评分为7。而由于“balter”是一个鲜为人知的单词，我们给它评分为1。我们可以这样将这些分数存储在字典树中：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_334_0.png)"
