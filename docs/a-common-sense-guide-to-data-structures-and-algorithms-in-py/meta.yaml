    \n## Code Implementation: Insertion Sort\n\nHere's a Python implementation of\
    \ Insertion Sort:\n\n```python\ndef insertion_sort(array):\n    for index in range(1,\
    \ len(array)):\n        temp_value = array[index]\n        position = index -\
    \ 1\n\n        while position >= 0:\n            if array[position] > temp_value:\n\
    \                array[position + 1] = array[position]\n                position\
    \ = position - 1\n            else:\n                break\n\n        array[position\
    \ + 1] = temp_value\n\n    return array\n```\n\nLet's walk through this code step\
    \ by step.\n\nFirst, we start a loop beginning at index 1 that runs through the\
    \ entire array. Each round of this loop represents a pass-through:\n\n```python\n\
    for index in range(1, len(array)):\n```\n\nWithin each pass-through, we save the\
    \ value we're \"removing\" in a variable called temp_value:\n\n```python\ntemp_value\
    \ = array[index]\n```\n\nNext, we create a variable called position, which will\
    \ start immediately to the left of the index of the temp_value. This position\
    \ will represent each value we compare against the temp_value:\n\n```python\n\
    position = index - 1\n```\n\nAs we move through the pass-through, this position\
    \ will keep moving leftward as we compare each value to the temp_value.\n\nWe\
    \ then begin an inner while loop, which runs as long as position is greater than\
    \ or equal to 0:\n\n```python\nwhile position >= 0:\n```\n\nWe then perform our\
    \ comparison; that is, we check whether the value at position is greater than\
    \ the temp_value:\n\n```python\nif array[position] > temp_value:\n```\n\nIf it\
    \ is, we shift that left value to the right:\n\n```python\narray[position + 1]\
    \ = array[position]\n```\n\nWe then decrement position by 1 to compare the next\
    \ left value against the temp_value in the next round of the while loop:\n\n```python\n\
    position = position - 1\n```\n\nIf at any point we encounter a value at position\
    \ that is less than or equal to the temp_value, we can get ready to end our pass-through,\
    \ since it's time to move the temp_value into the gap:\n\n```python\nelse:\n \
    \   break\n```\n\nThe final step of each pass-through is moving the temp_value\
    \ into the gap:\n\n```python\narray[position + 1] = temp_value\n```\n\nAfter all\
    \ pass-throughs have been completed, we return the sorted array:\n\n```python\n\
    return array\n```\n\n## The Efficiency of Insertion Sort\n\nFour types of steps\
    \ occur in Insertion Sort: removals, comparisons, shifts, and insertions. To analyze\
    \ the efficiency of Insertion Sort, we need to tally up each of these steps.\n\
    \nFirst, let's dig into comparisons. A comparison takes place each time we compare\
    \ a value to the left of the gap with the temp_value. In a worst-case scenario,\
    \ where the array is sorted in reverse order, we have to compare every number\
    \ to the left of temp_value with temp_value in each pass-through. This is because\
    \ each value to the left of temp_value will always be greater than temp_value,\
    \ so the pass-through will only end when the gap reaches the left end of the array.\n\
    \nDuring the first pass-through, in which temp_value is the value at index 1,\
    \ a maximum of one comparison is made, since there's only one value to the left\
    \ of the temp_value. On the second pass-through, the maximum number of comparisons\
    \ made is two, and so on. On the final pass-through, we need to compare the temp_value\
    \ with every single value in the array besides temp_value itself. In other words,\
    \ if there are N elements in the array, the maximum number of comparisons made\
    \ in the final pass-through is N - 1.\n\nWe can, therefore, formulate the total\
    \ number of comparisons as:\n\n1 + 2 + 3 + ... + (N - 1) comparisons.\n\nIn our\
    \ example array that contains five elements, that's a maximum of:\n\n1 + 2 + 3\
    \ + 4 = 10 comparisons.\n\nFor an array containing 10 elements, there would be:\n\
    \n1 + 2 + 3 + 4 + 5 + 6 + 7 + 8 + 9 = 45 comparisons.\n\nFor an array containing\
    \ 20 elements, there would be a total of 190 comparisons, and so on.\n\nWhen examining\
    \ this pattern, it emerges that for an array containing N elements, there are\
    \ approximately N² / 2 comparisons. (10² / 2 is 50, and 20² / 2 is 200. We'll\
    \ look at this pattern more closely in the next chapter.)\n\nLet's continue analyzing\
    \ the other types of steps.\n\nShifts occur each time we move a value one cell\
    \ to the right. When an array is sorted in reverse order, there will be as many\
    \ shifts as there are comparisons since every comparison will force us to shift\
    \ a value to the right.\n\nLet's add up comparisons and shifts for a worst-case\
    \ scenario:\n\nN² / 2 comparisons\n+ N² / 2 shifts\n\nN² steps\n\nRemoving and\
    \ inserting the temp_value from the array happens once per pass-through. Since\
    \ there are always N - 1 pass-throughs, we can conclude that there are N - 1 removals\
    \ and N - 1 insertions.\n\nSo now we've got:\nN² comparisons and shifts combined\n\
    N - 1 removals\n+ N - 1 insertions\n\nN² + 2N - 2 steps\n\nYou've already learned\
    \ one major rule of Big O: that Big O ignores constants. With this rule in mind,\
    \ we'd—at first glance—simplify this to O(N² + N).\n\nHowever, I'll now reveal\
    \ another major rule of Big O:\n\n> Big O notation only takes into account the\
    \ highest order of N when we have multiple orders added together.\n\nIn other\
    \ words, if we have an algorithm that takes N⁴ + N³ + N² + N steps, we only consider\
    \ N⁴ to be significant—and just call it O(N⁴). Why is this?\n\nLook at the following\
    \ table:\n\n| N | N² | N³ | N⁴ |\n|---|---|---|---|\n| 2 | 4 | 8 | 16 |\n| 5 |\
    \ 25 | 125 | 625 |\n| 10 | 100 | 1,000 | 10,000 |\n| 100 | 10,000 | 1,000,000\
    \ | 100,000,000 |"
