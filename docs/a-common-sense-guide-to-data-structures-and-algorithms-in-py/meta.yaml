  md: '![](img/c0a46c67bb2536aa545ec1bd7065e742_238_0.png)


    Linked lists, on the other hand, work differently. Instead of being a contiguous
    block of memory, the data from linked lists can be scattered across different
    cells throughout the computer''s memory.


    Connected data that are dispersed throughout memory are known as *nodes*. In a
    linked list, each node represents one item in the list. The big question, then,
    is this: if the nodes are not next to each other in memory, how does the computer
    know which nodes are part of the same linked list?


    This is the key to the linked list: each node also comes with a little extra information—namely,
    the memory address of the *next* node in the list.


    This extra piece of data—this pointer to the next node''s memory address—is known
    as a *link*. Here''s a visual depiction of a linked list:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_238_1.png)


    In this example, we have a linked list that contains four pieces of data: "a",
    "b", "c", and "d". However, it uses *eight* cells of memory to store this data,
    because each node consists of two memory cells. The first cell holds the actual
    data, while the second cell serves as a link that indicates where in'
