  - "[PAGE 418]\n\nIf we first store the numbers from one array in a hash table, we\
    \ can then immediately find any number from it in O(1) time as we iterate through\
    \ the other array.\n\nHere's the complete code:\n\n```\ndef sum_swap(array_1,\
    \ array_2):\n    hash_table = {}\n    sum_1 = 0\n    sum_2 = 0\n\n    for index,\
    \ num in enumerate(array_1):\n        sum_1 += num\n        hash_table[num] =\
    \ index\n\n    for num in array_2:\n        sum_2 += num\n\n    # If the input\
    \ consists of integers and the difference\n    # between the two sums are odd,\
    \ it's impossible to find\n    # an integer smack in the middle, so no swap is\
    \ possible:\n    if (sum_1 - sum_2) % 2 == 1:\n        return None\n\n    shift_amount\
    \ = (sum_1 - sum_2) // 2\n\n    for index, num in enumerate(array_2):\n      \
    \  if num + shift_amount in hash_table:\n            return [hash_table[num +\
    \ shift_amount], index]\n\n    return None\n```\n\nThis approach is much faster\
    \ than our original O(N * M) one. If we consider array_1 to be N and array_2 to\
    \ be M, we could say that this algorithm runs in O(N + M) time. While we do iterate\
    \ over array_2 twice and it is technically 2M, it becomes M since we drop the\
    \ constants.\n\nThis approach takes up an extra O(N) space since we copy all N\
    \ numbers from array_1 into the hash table. Again, we're sacrificing space to\
    \ gain time, but this is a big win if speed is our primary concern.\n\nIn any\
    \ case, this is another example of where discovering patterns allows us to cut\
    \ to the heart of the problem and develop a simple and fast solution.\n\n# Greedy\
    \ Algorithms\n\nThis next tactic can speed up some of the most stubborn algorithms.\
    \ It doesn't work in every situation, but when it does, it can be a game changer.\n\
    \nLet's talk about writing greedy algorithms."
  - "[PAGE 419]\n\nThis may sound like a strange term, but here's what it means. A\
    \ *greedy algorithm* is one that, in each step, chooses what appears to be the\
    \ best option *at that moment in time*. This will make sense with a basic example.\n\
    \n# Array Max\n\nLet's write an algorithm that finds the greatest number in an\
    \ array. One way we can do this is to use nested loops and check each number against\
    \ every other number in the array. When we find the number that is greater than\
    \ every other number, it means we've found the greatest number in the array.\n\
    \nAs is typical for such algorithms, this approach takes O(N²) time.\n\nAnother\
    \ approach would be to sort the array in ascending order and return the final\
    \ value from the array. If we use a fast sorting algorithm like Quicksort, this\
    \ would take O(N log N) time.\n\nA third option is the greedy algorithm:\n\n```\n\
    def max(array):\n    if not array:\n        return None\n\n    greatest_number\
    \ = array[0]\n\n    for number in array:\n        if number > greatest_number:\n\
    \            greatest_number = number\n\n    return greatest_number\n```\n\nAfter\
    \ ensuring the array isn't empty, we say the following:\n\n```\ngreatest_number\
    \ = array[0]\n```\n\nThis line \"assumes\" that the first number in the array\
    \ is the `greatest_number`. Now, this is a \"greedy\" assumption; that is, we're\
    \ declaring the first number to be the `greatest_number` because it's the greatest\
    \ number we've encountered so far. Of course, it's also the *only* number we've\
    \ encountered so far! But that's what a greedy algorithm does—it chooses what\
    \ appears to be the best option based on the information available at that moment\
    \ in time.\n\nNext, we iterate over all the numbers in the array. As we find any\
    \ number that is greater than the `greatest_number`, we make this new number the\
    \ `greatest_number`. Here too, we're being greedy: each step selects the best\
    \ option based on what we know at that moment in time."
  - '[PAGE 420]


    We''re basically like a child in a candy shop grabbing the first candy we see,
    but as soon as we see a bigger candy, we drop the first one and grab the bigger
    one.


    Yet, this seemingly naive greediness actually works. By the time we''re done with
    the function, our greatest_number will indeed be the greatest number in the entire
    array.


    And while being greedy isn''t a virtue in a societal context, it can do wonders
    for algorithm speed. This algorithm takes just O(N) time, as we touch each number
    in the array just once.


    # Largest Subsection Sum


    Let''s see another example of how greed pays off.


    We''re going to write a function that accepts an array of numbers and returns
    the largest sum that could be computed from any "subsection" of the array.


    Here''s what I mean. Let''s take the following array:


    ```

    [3, -4, 4, -3, 5, -9]

    ```


    If we computed the sum of all the numbers in this array, we''d get -4.


    But we can also compute the sum of *subsections* of the array:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_420_0.png)


    When I refer to subsections, I mean *contiguous subsections*; that is, a subsection
    is a section of the array that contains a series of numbers *in a row*.


    The following is *not* a contiguous subsection, since the numbers are not in a
    row:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_420_1.png)'
  - '[PAGE 421]


    Our job is to find the largest sum that can be computed from *any* subsection
    within the array. In our example, the largest sum is 6, derived from the following
    subsection:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_421_0.png)


    To make the discussion simpler, let''s assume the array contains at least one
    positive number.


    Now, how can we write the code to calculate the largest subsection sum?


    One approach would be to calculate the sum of every subsection within the array
    and pick out the greatest one. However, there are about N² / 2 subsections for
    N items in an array, so the mere generation of the different subsections would
    take O(N²) time.


    Again, let''s start by dreaming up the best-imaginable Big O. We definitely need
    to inspect each number at least once, so we can''t beat O(N). So let''s make O(N)
    our goal.


    At first glance, O(N) seems beyond our reach. How can we add up multiple subsections
    by iterating over the array a single time?


    Let''s see what happens if we get a little greedy...


    A greedy algorithm in this context would attempt to "grab" the greatest sum at
    each step as we iterate over the array. Here''s what this might look like as we
    iterate over the earlier example array.


    Starting at the front of the array, we encounter a 3. In perfect greedy fashion,
    we''ll say that our greatest sum is 3:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_421_1.png)


    Next, we reach the -4. When we add this to the previous number of 3, we get a
    current sum -1. So 3 is still our greatest sum:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_421_2.png)'
  - '[PAGE 422]


    We then hit the 4. If we add this to our current sum, we get 3:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_422_0.png)


    As of now, 3 is still the greatest sum.


    The next number we reach is a -3. This puts our current sum at 0:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_422_1.png)


    Again, while 0 is our *current* sum, 3 is still our *greatest* sum.


    Next, we reach the 5. This makes our current sum 5. In our greed, we''ll declare
    this to be the greatest sum, as it''s the greatest sum we''ve encountered so far:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_422_2.png)


    We then reach the last number, which is -9. This deflates our current sum to -4:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_422_3.png)


    By the time we get to the end of the array, our greatest sum is 5. So if we follow
    this pure-greed approach, it would appear that our algorithm should return 5.


    However, 5 is *not* the greatest subsection sum. A subsection in the array yields
    a sum of 6:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_422_4.png)'
  - '[PAGE 423]


    The problem with our algorithm is that we only calculated the largest sum based
    on subsections that always begin with the first number in the array. But other
    subsections begin with numbers later on in the array as well, and we haven''t
    accounted for those.


    Our greedy algorithm, then, didn''t pan out as we''d hoped.


    But we shouldn''t give up yet! Often, we need to tweak greedy algorithms a bit
    to get them to work.


    Let''s see if finding a pattern may help. (It usually does.) As we''ve seen before,
    the best way to find a pattern is to generate lots of examples. So let''s come
    up with some examples of arrays with their largest subsection sums and see if
    we discover anything interesting:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_423_0.png)


    When analyzing these cases, an interesting question emerges: why is it that in
    some cases, the greatest sum comes from a subsection that starts at the beginning
    of the array, and in other cases it doesn''t?


    In looking at these cases, we can see that when the greatest subsection *doesn''t*
    start at the beginning, it''s because a negative number broke the streak:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_423_1.png)


    The greatest subsection *would''ve* been derived from the beginning of the array,
    but a negative number killed the streak, and the greatest subsection has to start
    later on in the array.


    But wait a second. In some cases, the greatest subsection *includes* a negative
    number, and the negative number didn''t break the streak:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_423_2.png)'
- md: "So what’s the difference?\n\nThe pattern is this: if the negative number causes\
    \ the preceding subsection’s sum to sink to a negative number, the streak is broken.\
    \ But if the negative number simply lowers the current subsection’s sum, and the\
    \ sum remains a positive number, the streak isn’t broken.\n\nIf we think about\
    \ it, this makes sense. If, as we’re iterating through the array, our current\
    \ subsection’s sum becomes less than 0, *we’re best off just resetting the current\
    \ sum to 0*. Otherwise, the current negative sum will just detract from the greatest\
    \ sum we’re trying to find.\n\nSo let’s use this insight to tweak our greedy algorithm.\n\
    \nAgain, let’s start with the 3. The greatest sum is currently 3:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_424_0.png)\n\
    \nNext, we encounter the -4. This would make our current sum -1:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_424_1.png)\n\
    \nSince we’re trying to find the subsection with the greatest sum, and our current\
    \ sum is a negative number, we need to reset the current sum to 0 before continuing\
    \ on to the next number:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_424_2.png)\n\
    \nWe’ll also start a brand-new subsection beginning with the next number.\n\n\
    Again, the reasoning is that if the next number is positive, we may as well just\
    \ start the next subsection from there, without letting the current negative number\
    \ drag down the sum. Instead, we’re going to perform a reset by setting the current\
    \ sum to 0 and considering the next number to be the *beginning* of a new subsection.\n\
    \nSo let’s continue.\n\nWe now reach a 4. Again, this is the beginning of a new\
    \ subsection, so the current sum is 4, which also becomes the greatest sum we've\
    \ seen yet:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_425_0.png)\n\nNext, we\
    \ encounter the -3. The current sum is now 1:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_425_1.png)\n\
    \nWe next come upon a 5. This makes the current sum 6, which is the greatest sum\
