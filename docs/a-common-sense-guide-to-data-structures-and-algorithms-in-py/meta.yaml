  md: 'Let''s analyze the time and space efficiency of Version #3.


    In terms of time complexity, this algorithm is O(N log N). We can assume that
    Python''s sorting algorithm is one that takes O(N log N), as the fastest known
    sorting algorithms are known to do. The additional N steps of iterating over the
    array are trivial beside the sorting steps, so O(N log N) is the grand total when
    it comes to speed.


    Space is a slightly more complex matter, as various sorting algorithms consume
    varying amounts of memory. Some of the earliest algorithms we''ve encountered
    in the book, like Bubble Sort and Selection Sort, consume no extra space because
    all the sorting happens in place. Interestingly, though, the faster sorts do take
    up some space for reasons you''ll see shortly. Most implementations of Quicksort
    actually take up O(log N) space.


    So let''s see where Version #3 lands in comparison with the previous two versions:


    | Version | Time Complexity | Space Complexity |

    | :--- | :--- | :--- |

    | Version #1 | O(N²) | O(1) |

    | Version #2 | O(N) | O(N) |

    | Version #3 | O(N log N) | O(log N) |


    It turns out Version #3 strikes an interesting balance between time and space.
    In terms of time, Version #3 is faster than Version #1 but slower than Version
    #2. When it comes to space, it''s more efficient than Version #2 but less efficient
    than Version #1.


    So when may we want to use Version #3? Well, if we''re concerned about both time
    *and* space, this might be our fix.


    Ultimately, in each given situation, we need to know what our minimum acceptable
    speeds and bounds of memory are. Once we understand our constraints, we can then
    pick and choose from various algorithms so that we can eke out acceptable efficiency
    for our speed and memory needs.


    Up until this point, you''ve seen how our algorithms can consume extra space when
    they create additional pieces of data, such as new arrays or hash tables. However,
    it''s possible for an algorithm to consume space even if it''s not doing any of
    those things. And this can come to bite us if we''re not expecting it.


    # The Hidden Cost of Recursion


    We''ve dealt quite a bit with recursive algorithms in this book. Let''s look at
    a simple recursive function:'
