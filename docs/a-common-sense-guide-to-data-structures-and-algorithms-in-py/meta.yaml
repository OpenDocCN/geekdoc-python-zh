    # Top-Down Recursion: A New Way of Thinking


    This brings us to the central point of this chapter: recursion shines when implementing
    a top-down approach because going top-down *offers a new mental strategy for tackling
    a problem*. That is, a recursive top-down approach allows one to think about a
    problem in a completely different way.


    Specifically, when we go top-down, we get to mentally “kick the problem down the
    road.” We can free our mind from some of the nitty-gritty details we normally
    have to think about when going bottom-up.


    To see what I mean, let''s take another look at the key line from our top-down
    factorial implementation:


    ```

    return number * factorial(number - 1)

    ```


    This line of code makes its calculation based on factorial(number - 1). When we
    write this line of code, do we have to understand how the factorial function it''s
    calling works? Technically, we don''t. Whenever we write code that calls another
    function, we assume that the function will return the correct value without necessarily
    understanding how its internals work.


    Here as well, when we calculate our answer based on calling the factorial function,
    we don''t need to understand how the factorial function works; we can just expect
    it to return the correct result. Of course, the weird part is that *we''re the
    ones writing the factorial function!* This line of code exists *within the factorial
    function itself*. But that''s what is so great about top-down thinking: in a way,
    we can solve the problem without even knowing how to solve the problem.


    When we write “in recursive” to implement a top-down strategy, we get to relax
    our brains a little. We can even choose to ignore the details of how the calculation
    actually works. We get to say, “Let''s just rely on the subproblem to deal with
    the details.”


    # The Top-Down Thought Process


    If you haven''t done a lot of top-down recursion before, it takes time and practice
    to learn to think in this way. I found that when tackling a top-down problem,
    it helps to think the following three thoughts:'
