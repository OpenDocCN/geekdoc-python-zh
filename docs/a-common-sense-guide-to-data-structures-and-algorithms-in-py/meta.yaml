    title\": book[\"title\"],\n                                  \"author\": author_hash_table[book[\"\
    author_id\"]]})\n\n    return books_with_authors\n```\n\n在这个版本中，我们首先遍历作者数组，并使用该数据创建author_hash_table。这需要M步，其中M是作者数量。\n\
    \n然后我们遍历书籍列表，并使用`author_hash_table`在单步内“神奇地”找到每位作者。这个循环需要N步，其中N是书籍数量。\n\n这个优化后的算法总共需要O(N\
