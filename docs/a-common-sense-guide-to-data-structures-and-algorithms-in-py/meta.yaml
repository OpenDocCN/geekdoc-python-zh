    \n无论列表是数组还是链表，我们都需要逐个元素地梳理整个列表以检查每个电子邮件地址。这自然需要 N 步。然而，让我们看看当我们实际删除每个电子邮件地址时会发生什么。\n\
    \n使用数组时，每次删除一个电子邮件地址，我们需要额外的 O(N) 步来将剩余数据向左移动以填补空隙。所有这些移动甚至在我们检查下一个电子邮件地址之前就会发生。\n\
    \n假设每 10 个电子邮件地址中有 1 个无效。如果我们有一个包含 1,000 个电子邮件地址的列表，那么大约有 100 个无效地址。那么，我们的算法将需要\
    \ 1,000 步来读取所有 1,000 个电子邮件地址。除此之外，删除操作可能还需要多达额外的 100,000 步，因为对于每个删除的地址，我们可能需要移动多达\
    \ 1,000 个其他元素。\n\n然而，使用链表时，当我们梳理列表时，每次删除只需要一步，因为我们只需更改一个节点的链接以指向适当的节点，然后继续即可。因此，对于我们的\
    \ 1,000 封电子邮件，我们的算法只需要 1,100 步，因为有 1,000 个读取步骤和 100 个删除步骤。\n\n事实证明，链表是一种了不起的数据结构，适用于在遍历整个列表的同时进行插入或删除，因为我们在进行插入或删除时，永远不必担心移动其他数据。\n\
    \n## 双向链表\n\n链表有多种不同的形式。我们到目前为止讨论的链表是*经典*链表，但通过一些轻微的修改，我们可以赋予链表额外的超能力。\n\n链表的一种变体形式是*双向链表*。\n\
    \n双向链表就像链表，只是每个节点有*两个*链接——一个指向下一个节点，另一个指向前一个节点。此外，双向链表始终同时跟踪头节点*和*尾节点，而不仅仅是头节点。\n\
    \n以下是双向链表的样子：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_252_0.png)\n\n我们可以在\
    \ Python 中这样实现双向链表的核心。首先，我们必须创建一种新的“双端”节点：\n\n```\nclass Node:\n    def __init__(self,\
    \ data):\n        self.data = data\n        self.next_node = None\n        self.previous_node\
    \ = None\n```\n\n你会注意到每个节点现在不仅包含一个 next_node 属性，还包含一个 previous_node 属性。\n\n一旦我们有了这个，我们现在就可以实现我们的双向链表：\n\
    \n```\nimport double_ended_node\n\nclass DoublyLinkedList:\n    def __init__(self,\
    \ first_node=None, last_node=None):\n        self.first_node = first_node\n  \
    \      self.last_node = last_node\n```\n\n由于双向链表始终知道其头节点和尾节点的位置，我们可以在单步内访问它们中的任何一个，即\
    \ O(1)。因此，正如我们可以在 O(1) 时间内从列表开头读取、插入或删除一样，我们也可以在 O(1) 时间内从列表末尾执行相同操作。\n\n以下是向双向链表末尾插入的示意图：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_252_1.png)\n\n如你所见，我们创建一个新节点（“Sue”），并让其\
    \ previous_node 指向链表中曾经是最后一个节点（“Greg”）的节点。然后，我们将最后一个节点（“Greg”）的 next_node 更改为指向这个新节点（“Sue”）。最后，我们声明新节点（“Sue”）是链表的最后一个节点。\n\
    \n## 代码实现：双向链表插入\n\n接下来，我们将看看我们可以添加到 DoublyLinkedList 类中的新 append 方法的实现。append\
    \ 方法不是在列表中的任何位置插入值，而只是在列表末尾添加一个新值。我们专注于追加，而不是经典的插入，只是为了突出向双向链表追加是多么容易和快速。以下是 append\
    \ 方法：\n\n```\ndef append(self, value):\n    new_node = double_ended_node.Node(value)\n\
    \n    if not self.first_node:\n        self.first_node = new_node\n        self.last_node\
    \ = new_node\n    else:\n        new_node.previous_node = self.last_node\n   \
    \     self.last_node.next_node = new_node\n        self.last_node = new_node\n\
    ```\n\n让我们重点介绍这个方法最重要的部分。\n\n首先，我们创建新节点：\n\n```\nnew_node = double_ended_node.Node(value)\n\
    ```\n\n起初，我们的代码处理列表尚不包含任何节点的情况。但让我们跳到向现有列表追加的情况。\n\n我们将 new_node 的 previous_node\
    \ 链接设置为指向到目前为止是最后一个节点的节点：\n\n```\nnew_node.previous_node = self.last_node\n```\n\
    \n然后，我们更改最后一个节点的链接（到目前为止一直是 None），使其指向我们的 new_node：\n\n```\nself.last_node.next_node\
    \ = new_node\n```\n\n最后，我们告诉 DoublyLinkedList 的实例，它的最后一个节点是我们的 new_node：\n\n```\n\
    self.last_node = new_node\n```\n\n## 向前和向后移动\n\n使用经典链表，我们只能*向前*遍历列表；也就是说，我们可以访问第一个节点并沿着链接找到列表的所有其他节点。但我们无法向后移动，因为没有节点知道前一个节点是什么。"
