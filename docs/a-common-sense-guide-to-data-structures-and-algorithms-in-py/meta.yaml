    \ [\n    [\"french fries\", 0.75],\n    [\"hamburger\", 2.5],\n    [\"hot dog\"\
    , 1.5],\n    [\"soda\", 0.6]\n]\n```\n\n这个数组包含几个子数组，每个子数组包含两个元素。第一个元素是一个字符串，代表菜单上的食物，第二个元素代表该食物的价格。\n\
    \n正如你在[第2章 算法为何重要，第21页](https://example.com)中所学，如果这个数组是无序的，查找给定食物的价格将需要O(N)步，因为计算机必须执行线性搜索。如果它是一个*有序*数组，计算机可以进行二分查找，这将需要O(log\
