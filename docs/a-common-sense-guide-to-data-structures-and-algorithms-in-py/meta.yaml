  md: "As we visit each vertex for the first time, then, we know that the *current*\
    \ vertex is *always* part of the shortest path from the *starting* vertex to the\
    \ *vertex* we're visiting. (Remember, with BFS, the current vertex and the vertex\
    \ we're visiting aren't necessarily the same.)\n\nFor example, when we visit Lina\
    \ for the first time, Kamil will be the current vertex. This is because in BFS,\
    \ we'll get to Lisa first through Kamil before we get to her through Sasha. When\
    \ we do visit Lina (through Kamil), we can store in a table that the shortest\
    \ path from Idris to Lina will be through Kamil. This table is similar to the\
    \ `cheapest_previous_stopover_city_table` from Dijkstra's algorithm.\n\nIn fact,\
    \ whenever we visit *any* vertex, the shortest path from Idris to that vertex\
    \ will be through the current vertex. We'll store *all* of this data in a table\
    \ called `previous_vertex_table`.\n\nFinally, we can then use this data to work\
    \ backward from Lina to Idris to build the precise shortest path between the two\
    \ of them.\n\nHere's our implementation:\n\n```\nimport queue_implementation\n\
    \ndef shortest_path(first_vertex, second_vertex, visited_vertices):\n    queue\
    \ = queue_implementation.Queue()\n    previous_vertex_table = {}\n\n    visited_vertices[first_vertex.value]\
    \ = True\n    queue.enqueue(first_vertex)\n\n    while queue.read():\n       \
    \ current_vertex = queue.dequeue()\n\n        for adjacent_vertex in current_vertex.adjacent_vertices:\n\
    \            if not visited_vertices.get(adjacent_vertex.value):\n           \
    \     visited_vertices[adjacent_vertex.value] = True\n                queue.enqueue(adjacent_vertex)\n\
    \                previous_vertex_table[adjacent_vertex.value] = \\n          \
    \          current_vertex.value\n\n    shortest_path = []\n    current_vertex_value\
    \ = second_vertex.value\n\n    while current_vertex_value != first_vertex.value:\n\
    \        shortest_path.insert(0, current_vertex_value)\n        current_vertex_value\
    \ = \\n            previous_vertex_table.get(current_vertex_value)\n\n    shortest_path.insert(0,\
