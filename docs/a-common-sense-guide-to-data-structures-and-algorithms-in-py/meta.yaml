  md: '# Binary Search Trees


    Many different kinds of tree-based data structures exist, but in this chapter,
    we''ll focus on a particular tree known as a *binary search tree*.


    Note that there are two adjectives here: *binary* and *search*.


    A *binary* tree is a tree in which each node has zero, one, or two children.


    A binary *search* tree is a binary tree that also abides by the following rules:


    +   - Each node can have at most one *left* child and one *right* child.

    - A node''s *left* descendants can only contain values that are less than the
    node itself. Likewise, a node''s *right* descendants can only contain values that
    are greater than the node itself.


    Here''s an example of a binary search tree, in which the values are numbers:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_260_0.png)


    Note that each node has one child with a lesser value than itself, which is depicted
    using a left arrow, and one child with a greater value than itself, which is depicted
    using a right arrow.


    Additionally, notice that all of the 50''s left descendants are less than it.
    At the same time, all of the 50''s right descendants are greater than it. The
    same pattern goes for each and every node.


    While the following example is a binary tree, it''s not a binary *search* tree:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_260_1.png)


    It''s a binary tree because each node has zero, one, or two children. But it''s
    not a binary *search* tree, because the root node has two left children; that
    is, it has two children than are less than it. For a binary search tree to be
    valid, it can have at most one left (lesser) child and one right (greater) child.'
  merge: -1
  pgno: 260
- img_proc: true
  md: "The implementation of a tree node in Python might look something like this:\n\
    \n```\nclass TreeNode:\n    def __init__(self, value, left=None, right=None):\n\
    \        self.value = value\n        self.left_child = left\n        self.right_child\
    \ = right\n```\n\nWe can then build a simple tree like this:\n\n```\nnode1 = TreeNode(25)\n\
    node2 = TreeNode(75)\nroot = TreeNode(50, node1, node2)\n```\n\nBecause of the\
    \ unique structure of a binary search tree, we can search for any value within\
    \ it very quickly, as we'll now see.\n\n# Searching\n\nHere, again, is a binary\
    \ search tree:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_261_0.png)\n\nThe algorithm\
    \ for searching within a binary search tree is as follows:\n\n+   1. Designate\
    \ a node to be the *current node*. (At the beginning of the algorithm, the root\
    \ node is the first current node.)\n2. Inspect the value at the current node.\n\
    3. If we've found the value we're looking for, great!\n4. If the value we're looking\
    \ for is less than the current node, search for it in its left subtree.\n5. If\
    \ the value we're looking for is greater than the current node, search for it\
    \ in its right subtree.\n6. Repeat Steps 1 through 5 until we find the value we're\
    \ searching for, or until we hit the bottom of the tree, in which case our value\
    \ must not be in the tree."
