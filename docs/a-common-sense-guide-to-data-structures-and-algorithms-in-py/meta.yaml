    # Recognizing Patterns


    One of the most helpful strategies for both code optimization and algorithm development
    in general is to find patterns within the problem at hand. Often, the discovery
    of a pattern can help you cut through all the complexity of a problem and develop
    an algorithm that is simple.


    # The Coin Game


    Here’s a great example. A game I call “the coin game” has two players who compete
    in the following way: they start with a pile of coins, and each player has the
    choice of removing either one or two coins from the pile. The player who removes
    the last coin *loses*. Fun, right?


    It turns out that this isn’t a game of random chance, and with the right strategy,
    you can *force* your opponent to take the last coin and lose the game. To make
    this clear, let’s start with some really small coin piles and see how the game
    plays out.


    If there’s just one coin in the pile, the player whose turn it is loses, since
    they have no choice but to take the last coin.


    If there are two coins left, the player whose turn it is can force a win. This
    is because they can take just one coin and thereby force their opponent to take
    the final coin.


    When there are three coins remaining, the player whose turn it is can also force
    a win, since they can remove two coins, forcing their opponent to take the final
    coin.


    Now, when there are four coins left, the current player is in trouble. If they
    remove one coin, the opponent is given a pile of three coins, which we established
    earlier can allow that player to force a win. Similarly, if the current player
    removes two coins, the opponent is left with two coins, which can also allow the
    opponent to force a win.


    If we were to write a function that calculated whether you can win the game when
    presented with a coin pile of a given size, what approach should we take? If we
    think about this carefully, we may realize we can use subproblems'
  merge: -1
