  md: "Since 45 is greater than 40, we insert it as a right child of the 40:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_268_0.png)\n\
    \nIn this example, insertion took five steps, consisting of four search steps\
    \ plus one insertion step. Insertion always takes just one extra step beyond a\
    \ search, which means insertion takes (log N) + 1 steps. In Big O notation, which\
    \ ignores constants, this is O(log N).\n\nIn an ordered array, by contrast, insertion\
    \ takes O(N), because in addition to search, we must shift a lot of data to the\
    \ right to make room for the value we're inserting.\n\nThis is what makes binary\
    \ search trees so efficient. While ordered arrays have O(log N) search and O(N)\
    \ insertion, binary search trees have O(log N) search and O(log N) insertion.\
    \ This becomes critical in an application in which you anticipate a lot of changes\
    \ to your data.\n\n# Code Implementation: Binary Search Tree Insertion\n\nHere's\
    \ a Python implementation of inserting a new value into a binary search tree.\
    \ Like the search function, it's recursive:\n\n```\npython\nimport tree_node\n\
    \ndef insert(value, node):\n    if value < node.value:\n        if not node.left_child:\n\
    \            node.left_child = tree_node.TreeNode(value)\n        else:\n    \
    \        insert(value, node.left_child)\n    elif value > node.value:\n      \
    \  if not node.right_child:\n            node.right_child = tree_node.TreeNode(value)\n\
    \        else:\n            insert(value, node.right_child)\n```"
