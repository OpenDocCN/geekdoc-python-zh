  - '[PAGE 89]


    already in the correct position. Contrast this with Bubble Sort, where in a worst-case
    scenario we have to make a swap for *each and every* comparison.


    Here''s a side-by-side comparison of Bubble Sort and Selection Sort:


    | N Elements | Max # of Steps in Bubble Sort | Max # of Steps in Selection Sort
    |

    | :--- | :--- | :--- |

    | 5 | 20 | 14 (10 comparisons + 4 swaps) |

    | 10 | 90 | 54 (45 comparisons + 9 swaps) |

    | 20 | 380 | 209 (190 comparisons + 19 swaps) |

    | 40 | 1560 | 819 (780 comparisons + 39 swaps) |

    | 80 | 6320 | 3239 (3160 comparisons + 79 swaps) |


    From this comparison, it''s clear Selection Sort takes about half the number of
    steps Bubble Sort does, indicating that Selection Sort is twice as fast.


    # Ignoring Constants


    But here''s the funny thing: in the world of Big O notation, Selection Sort and
    Bubble Sort are described in *exactly the same way*.


    Again, Big O notation answers the key question: if there are N data elements,
    how many steps will the algorithm take? Because Selection Sort takes roughly half
    of N² steps, it would seem reasonable that we''d describe the efficiency of Selection
    Sort as being O(N² / 2). That is, for N data elements, there are N² / 2 steps.
    The following table bears this out:


    | N Elements | N² / 2 | Max # of Steps in Selection Sort |

    | :--- | :--- | :--- |

    | 5 | 5² / 2 = 12.5 | 14 |

    | 10 | 10² / 2 = 50 | 54 |

    | 20 | 20² / 2 = 200 | 209 |

    | 40 | 40² / 2 = 800 | 819 |

    | 80 | 80² / 2 = 3200 | 3239 |


    In reality, however, Selection Sort is described in Big O as O(N²), just like
    Bubble Sort. This is because of a major rule of Big O that I''m now introducing
    for the first time:


    *Big O notation ignores constants.*


    This is simply a mathematical way of saying that Big O notation never includes
    regular numbers that aren''t an exponent. We simply drop these regular numbers
    from the expression.'
  - '[PAGE 90]


    In our case, then, even though the algorithm takes N² / 2 steps, we drop the “/
    2” because it’s a regular number and express the efficiency as O(N²).


    Here are a few more examples:


    For an algorithm that takes N / 2 steps, we’d call it O(N).


    An algorithm that takes N² + 10 steps would be expressed as O(N²) since we drop
    the 10, which is a regular number.


    With an algorithm that takes 2N steps (meaning N * 2), we drop the regular number
    and call it O(N).


    Even O(100N), which is *100 times slower than O(N)*, is also referred to as O(N).


    Offhand, it would seem that this rule would render Big O notation entirely useless,
    as you can have two algorithms that are described in exactly the same way with
    Big O, and yet one can be *100 times faster* than the other. And that’s exactly
    what we’re seeing here with Selection Sort and Bubble Sort. Both are described
    in Big O as O(N²), but Selection Sort is twice as fast as Bubble Sort.


    So, what gives?


    # Big O Categories


    This leads us to the next concept within Big O: Big O notation only concerns itself
    with *general categories* of algorithm speeds.


    As an analogy, let’s talk about physical buildings. There are, of course, many
    different types of buildings. There are one-floor single-family homes, and two-floor
    single-family homes, and three-floor single-family homes. There are high-rise
    apartment buildings with varying numbers of floors. And there are skyscrapers
    with various heights and shapes.


    If we were to compare two buildings, one of which is a single-family home and
    one of which is a skyscraper, it becomes almost moot to mention how many floors
    each one has. Because the two buildings are so incredibly different in their sizes
    and functions, we don’t need to say, “This one is a two-story home, while the
    other is a one-hundred-floor skyscraper.” We may as well just call one a house
    and the other a skyscraper. Calling them by their general categories is enough
    to signify their vast differences.


    The same applies to algorithm efficiencies. If we compare, say, an O(N) algorithm
    with an O(N²) algorithm, the two efficiencies are so different that it doesn’t
    really matter whether the O(N) algorithm is actually O(2N), or O(N / 2) or even
    O(100N).'
  - '[PAGE 91]


    Now, here''s why O(N) and O(N²) are considered two separate categories, while
    O(N) and O(100N) are part of the same category.


    Remember [The Soul of Big O, on page 37](#). Big O notation doesn''t care merely
    about the number of steps an algorithm takes. It cares about the long-term trajectory
    of the algorithm''s steps as the data increases. O(N) tells a story of straight
    growth—that the steps increase in a straight line according to some proportion
    of the data. This is true even when the steps are 100N. O(N²) tells a different
    story—one of exponential growth.


    Exponential growth is a completely different category compared to any form of
    O(N). This point is really driven home when we consider that O(N²) will, at some
    point in data growth, become slower than O(N) multiplied by *any* factor.


    In the following graph, you can see how O(N²) becomes slower than various factors
    of N:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_91_0.png)


    Therefore, when comparing two efficiencies that belong to two different categories
    of Big O, it''s enough to identify them by their general category. Talking about
    O(2N) when compared to O(N²) is like talking about a two-story house compared
    to a skyscraper. We may as well just say that O(2N) is part of the general category
    of O(N).


    All the types of Big O we''ve encountered, whether it''s O(1), O(log N), O(N),
    O(N²), or the types we''ll encounter later in this book, are general categories
    of Big O that are widely different from each other. Multiplying or dividing the
    number of steps by a regular number doesn''t make them change to another category.'
- md: "However, when two algorithms fall under the *same* classification of Big O,\
    \ it doesn't necessarily mean that both algorithms have the same speed. After\
    \ all, Bubble Sort is twice as slow as Selection Sort even though both are O(N²).\
    \ So while Big O is perfect for contrasting algorithms that fall under different\
    \ classifications of Big O, when two algorithms fall under the *same* classification,\
    \ further analysis is required to determine which algorithm is faster.\n\n## A\
    \ Practical Example\n\nLet's return to the first code example from Chapter 1,\
    \ with minor changes:\n\n```python\ndef print_numbers_version_one(upper_limit):\n\
    \    number = 2\n    while number <= upper_limit:\n        if number % 2 == 0:\n\
    \            print(number)\n        number += 1\n\ndef print_numbers_version_two(upper_limit):\n\
    \    number = 2\n    while number <= upper_limit:\n        print(number)\n   \
    \     number += 2\n```\n\nHere we have two algorithms for accomplishing the same\
    \ task, namely printing all even numbers starting from 2 to some `upper_limit`.\
    \ (In Chapter 1, the upper limit was fixed at 100, while here, we let the user\
    \ pass in a number as the `upper_limit`.)\n\nI noted in Chapter 1 that the first\
    \ version takes twice as many steps as the second version, but now let's see how\
    \ this plays out in terms of Big O.\n\nAgain, Big O expresses the answer to the\
    \ key question: if there are N data elements, how many steps will the algorithm\
    \ take? In this case, though, N isn't the size of an array, but simply the number\
    \ we pass into the function to serve as the `upper_limit`.\n\nThe first version\
    \ takes about N steps. That is, if the `upper_limit` is 100, the function takes\
    \ about 100 steps. (It really takes 99 steps, since it starts the count at 2.)\
    \ So we can safely say that the first algorithm has a time complexity of O(N).\n\
    \nThe second version takes N / 2 steps. When the upper_limit is 100, the function\
    \ takes just 50 steps. While it would be tempting to call this O(N / 2), you've\
    \ now learned that we drop the constants and reduce the expression to O(N).\n\n\
    Now, the second version is twice as fast as the first one and would naturally\
    \ be the better choice. This is another great example of where two algorithms\
    \ can be expressed the same way using Big O notation but further analysis is needed\
    \ to figure out which algorithm is faster.\n\n## Significant Steps\n\nLet's apply\
    \ one more level of analysis to the previous example. If we look again at the\
    \ first version, print_numbers_version_one, we said that it takes N steps. This\
    \ is because the loop runs N times, with N being the upper_limit.\n\nBut does\
    \ the function really take just N steps?\n\nIf we really break things down, we\
    \ can see that *multiple* steps occur in each round of the loop.\n\nFirst, we\
    \ have the comparison step (if number % 2 == 0), which checks whether the number\
    \ is divisible by 2. This comparison happens in each round of the loop.\n\nSecond,\
    \ we have the print step (print(number)), which happens just for the even numbers.\
    \ This, then, occurs in every *other* round of the loop.\n\nAnd third, we have\
    \ number += 1, which runs in each round of the loop.\n\nIn the previous chapters,\
    \ I alluded to the fact that you'd learn how to determine which steps are significant\
    \ enough to be counted when expressing the Big O of an algorithm. In our case,\
    \ then, which of these steps are considered significant? Do we care about the\
    \ comparisons, the printing, or the incrementing of number?\n\nThe answer is that\
    \ *all* steps are significant. It's just that when we express the steps in Big\
    \ O terms, we drop the constants and thereby simplify the expression.\n\nLet's\
    \ apply this here. If we count all the steps, we have N comparisons, N incrementings,\
    \ and N / 2 printings. This adds up to 2.5N steps. However, because we eliminate\
    \ the constant of 2.5, we express this as O(N). So which step was significant?\
    \ They all were, but by dropping the constant, we effectively focus more on the\
    \ number of times the loop runs, rather than the exact details of what happens\
    \ within the loop.\n\n## Wrapping Up\n\nWe now have some powerful analysis tools\
    \ at our disposal. We can use Big O to broadly determine the efficiency of an\
    \ algorithm, and we can also compare two algorithms that fall within one classification\
    \ of Big O.\n\nHowever, another important factor must be taken into account when\
    \ comparing the efficiencies of two algorithms. Until now, we've focused on how\
    \ fast an algorithm is in a worst-case scenario. Now, worst-case scenarios, by\
    \ definition, don't happen all the time. On average, most scenarios that occur\
    \ are...well...average-case scenarios. In the next chapter, you'll learn how to\
    \ take all scenarios into account.\n\n## Exercises\n\nThe following exercises\
    \ provide you with the opportunity to practice analyzing algorithms. The solutions\
    \ to these exercises are found in the section [Chapter 5, on page 438](Chapter\
    \ 5, on page 438).\n\n1. Use Big O notation to describe the time complexity of\
    \ an algorithm that takes 4N + 16 steps.\n2. Use Big O notation to describe the\
    \ time complexity of an algorithm that takes 2N².\n3. Use Big O notation to describe\
    \ the time complexity of the following function, which returns the sum of all\
    \ numbers of an array after the numbers have been doubled:\n4. Use Big O notation\
    \ to describe the time complexity of the following function, which accepts an\
    \ array of strings and prints each string in multiple cases:\n\n```python\ndef\
    \ double_then_sum(array):\n    doubled_array = []\n    for number in array:\n\
    \        doubled_array.append(number * 2)\n    sum = 0\n    for number in doubled_array:\n\
    \        sum += number\n    return sum\n```\n\n```python\ndef multiple_cases(array):\n\
    \    for string in array:\n        print(string.upper())\n        print(string.lower())\n\
    \        print(string.capitalize())\n```\n\n5. The next function iterates over\
    \ an array of numbers. As it does so, it focuses on every *other* number while\
    \ ignoring the numbers in between. For each “focus number,” the function proceeds\
    \ to print out *every* number from the array—one at a time—after being added to\
    \ the focus number.\n\nWhat is this function’s efficiency in terms of Big O notation?\n\
    \n```python\ndef every_other(array):\n    for index, number in enumerate(array):\n\
    \        if index % 2 == 0:\n            for other_number in array:\n        \
    \        print(number + other_number)\n```\n\n# CHAPTER 6\n\n## Optimizing for\
    \ Optimistic Scenarios\n\nUntil this point, we've focused primarily on how many\
    \ steps an algorithm would take in a worst-case scenario. The rationale behind\
    \ this is simple: if you're prepared for the worst, things will turn out okay.\n\
    \nHowever, you'll discover in this chapter that the worst-case scenario isn't\
    \ the *only* situation worth considering. Being able to consider *all* scenarios\
    \ is an important skill that can help you choose the appropriate algorithm for\
    \ every situation.\n\n## Insertion Sort\n\nWe've previously encountered two different\
    \ sorting algorithms: Bubble Sort and Selection Sort. Both have efficiencies of\
    \ O(N²), but Selection Sort is actually twice as fast. Now you'll learn about\
    \ a third sorting algorithm called Insertion Sort that will reveal the power of\
    \ analyzing scenarios beyond the worst case.\n\nInsertion Sort consists of the\
    \ following steps:\n\n1. In the first pass-through, we temporarily remove the\
    \ value at index 1 (the second cell) and store it in a temporary variable. This\
    \ will leave a gap at that index, since it contains no value:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_96_0.png)\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_96_1.png)\n\nIn subsequent pass-throughs,\
    \ we remove the values at the subsequent indexes.\n\n2. We then begin a shifting\
    \ phase, where we take each value to the left of the gap and compare it to the\
    \ value in the temporary variable:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_97_0.png)\n\
    \nIf the value to the left of the gap is greater than the temporary variable,\
    \ we shift that value to the right:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_97_1.png)\n\
    \nAs we shift values to the right, inherently the gap moves leftward. As soon\
    \ as we encounter a value that is lower than the temporarily removed value, or\
    \ we reach the left end of the array, this shifting phase is over.\n\n3. We then\
    \ insert the temporarily removed value into the current gap:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_97_2.png)\n\
    \n4. Steps 1 through 3 represent a single pass-through. We repeat these pass-throughs\
    \ until the pass-through begins at the final index of the array. By then, the\
    \ array will have been fully sorted.\n\n## Insertion Sort in Action\n\nLet's apply\
    \ Insertion Sort to the array [4, 2, 7, 1, 3].\n\nWe begin the first pass-through\
    \ by inspecting the value at index 1. This happens to contain the value 2:\n\n\
    ![](img/c0a46c67bb2536aa545ec1bd7065e742_97_3.png)"
  mdcn: "然而，当两个算法属于*相同*的大O分类时，并不一定意味着它们的速度相同。毕竟，即使冒泡排序和选择排序都是O(N²)，冒泡排序的速度也只有选择排序的一半。因此，虽然大O非常适合对比属于不同分类的算法，但当两个算法属于*相同*分类时，就需要进一步分析来确定哪个算法更快。\n\
    \n## 一个实际例子\n\n让我们回到第1章的第一个代码示例，并做些微小改动：\n\n```python\ndef print_numbers_version_one(upper_limit):\n\
    \    number = 2\n    while number <= upper_limit:\n        if number % 2 == 0:\n\
    \            print(number)\n        number += 1\n\ndef print_numbers_version_two(upper_limit):\n\
    \    number = 2\n    while number <= upper_limit:\n        print(number)\n   \
    \     number += 2\n```\n\n这里我们有两个算法来完成相同的任务，即打印从2到某个`upper_limit`的所有偶数。（在第1章中，上限固定为100，而这里我们让用户传入一个数字作为`upper_limit`。）\n\
    \n我在第1章中提到，第一个版本比第二个版本多花一倍的步骤，但现在让我们看看这在大O方面是如何体现的。\n\n再次强调，大O表达的是这个关键问题的答案：如果有N个数据元素，算法需要多少步骤？不过在这个例子中，N不是数组的大小，而是我们传入函数作为`upper_limit`的数字。\n\
    \n第一个版本大约需要N步。也就是说，如果`upper_limit`是100，函数大约需要100步。（实际上需要99步，因为它从2开始计数。）所以我们可以放心地说，第一个算法的时间复杂度是O(N)。\n\
    \n第二个版本需要N / 2步。当upper_limit是100时，函数只需要50步。虽然很想称之为O(N / 2)，但你现在已经知道，我们忽略常数，将表达式简化为O(N)。\n\
    \n现在，第二个版本比第一个版本快一倍，自然是更好的选择。这又是一个很好的例子，说明两个算法可以用相同的大O表示法表达，但需要进一步分析才能确定哪个算法更快。\n\
    \n## 重要步骤\n\n让我们对前面的例子再进行一层分析。如果我们再次查看第一个版本，print_numbers_version_one，我们说它需要N步。这是因为循环运行了N次，N就是upper_limit。\n\
    \n但函数真的只需要N步吗？\n\n如果我们真正分解开来，可以看到每轮循环中发生了*多个*步骤。\n\n首先，我们有比较步骤（if number % 2 ==\
    \ 0），检查数字是否能被2整除。这个比较在每轮循环中都会发生。\n\n其次，我们有打印步骤（print(number)），这只在偶数时发生。因此，这发生在每*隔*一轮的循环中。\n\
    \n第三，我们有number += 1，这在每轮循环中都会运行。\n\n在前面的章节中，我暗示过你将学会如何确定在表达算法的大O时，哪些步骤足够重要需要被计算在内。那么在我们的例子中，这些步骤中哪些被认为是重要的？我们关心比较、打印还是number的递增？\n\
    \n答案是*所有*步骤都很重要。只是当我们用大O表示步骤时，我们忽略常数，从而简化表达式。\n\n让我们应用到这里。如果我们计算所有步骤，我们有N次比较，N次递增，和N\
    \ / 2次打印。这加起来是2.5N步。然而，因为我们消除了2.5这个常数，我们将其表示为O(N)。那么哪个步骤是重要的？它们都是，但通过忽略常数，我们实际上更关注循环运行的次数，而不是循环内部发生的具体细节。\n\
    \n## 总结\n\n我们现在掌握了一些强大的分析工具。我们可以用大O来大致确定算法的效率，也可以比较属于同一分类的两个算法。\n\n然而，在比较两个算法的效率时，还必须考虑另一个重要因素。到目前为止，我们一直关注算法在最坏情况下的速度。而最坏情况，根据定义，并不是经常发生。平均而言，大多数发生的情况是……嗯……平均情况。在下一章中，你将学习如何考虑所有情况。\n\
    \n## 练习\n\n以下练习为你提供了分析算法的机会。这些练习的答案可以在[第5章，第438页](Chapter 5, on page 438)部分找到。\n\
    \n1.  使用大O表示法描述一个需要4N + 16步的算法的时间复杂度。\n2.  使用大O表示法描述一个需要2N²步的算法的时间复杂度。\n3.  使用大O表示法描述以下函数的时间复杂度，该函数返回数组中所有数字加倍后的总和：\n\
    4.  使用大O表示法描述以下函数的时间复杂度，该函数接受一个字符串数组并以多种大小写形式打印每个字符串：\n\n```python\ndef double_then_sum(array):\n\
    \    doubled_array = []\n    for number in array:\n        doubled_array.append(number\
    \ * 2)\n    sum = 0\n    for number in doubled_array:\n        sum += number\n\
    \    return sum\n```\n\n```python\ndef multiple_cases(array):\n    for string\
    \ in array:\n        print(string.upper())\n        print(string.lower())\n  \
    \      print(string.capitalize())\n```\n\n5.  下一个函数遍历一个数字数组。在遍历过程中，它专注于每*隔*一个数字，同时忽略中间的数字。对于每个“焦点数字”，该函数会继续打印数组中的*每个*数字——一次一个——在将其与焦点数字相加之后。\n\
    \n这个函数用大O表示法表示的效率是多少？\n\n```python\ndef every_other(array):\n    for index, number\
    \ in enumerate(array):\n        if index % 2 == 0:\n            for other_number\
    \ in array:\n                print(number + other_number)\n```\n\n# 第6章\n\n##\
    \ 为乐观情况优化\n\n到目前为止，我们主要关注算法在最坏情况下需要多少步骤。这背后的逻辑很简单：如果你为最坏情况做好了准备，事情就会顺利。\n\n然而，你将在本章中发现，最坏情况并不是*唯一*值得考虑的情况。能够考虑*所有*情况是一项重要技能，可以帮助你为每种情况选择合适的算法。\n\
    \n## 插入排序\n\n我们之前遇到过两种不同的排序算法：冒泡排序和选择排序。两者的效率都是O(N²)，但选择排序实际上快一倍。现在你将学习第三种排序算法，称为插入排序，它将揭示分析超越最坏情况场景的力量。\n\
    \n插入排序包含以下步骤：\n\n1.  在第一遍中，我们暂时移除索引1（第二个单元格）的值，并将其存储在一个临时变量中。这将在该索引处留下一个空隙，因为它不包含任何值：\n\
