  md: '# CHAPTER 9


    # Crafting Elegant Code with Stacks and Queues


    Until now, our discussion around data structures has focused primarily on how
    they affect the *performance* of various operations. However, having a variety
    of data structures in your programming arsenal also allows you to create code
    that is simpler and easier to read.


    In this chapter, you''re going to discover two new data structures: stacks and
    queues. The truth is that these two structures are not entirely new. They''re
    simply arrays with restrictions. Yet these restrictions are exactly what make
    them so elegant.


    More specifically, stacks and queues are elegant tools for handling temporary
    data. From operating system architecture to printing jobs to traversing data,
    stacks and queues serve as temporary containers that can be used to form beautiful
    algorithms.


    Think of temporary data like the food orders in a diner. What each customer orders
    is important until the meal is made and delivered; then you throw the order slip
    away. You don''t need to keep that information around. Temporary data is information
    that doesn''t have any meaning after it''s processed, so you can throw it away
    once you''re done with it.


    Stacks and queues handle this kind of temporary data but have a special focus
    on the *order* in which the data is handled, as you''ll now learn.


    # Stacks


    A *stack* stores data in the same way arrays do—it''s simply a list of elements.
    The one catch is that stacks have the following three constraints:'
  merge: -1
  pgno: 147
- img_proc: true
  md: '+   - Data can be inserted only at the end of a stack.

    - Data can be deleted only from the end of a stack.

    - Only the last element of a stack can be read.


    You can think of a stack as an actual stack of dishes; you can''t look at the
    face of any dish other than the one at the top. Similarly, you can''t add any
    dish except to the top of the stack, nor can you remove any dish besides the one
    at the top. (At least, you shouldn''t.) In fact, most computer science literature
    refers to the end of the stack as its *top* and the beginning of the stack as
    its *bottom*.


    Our diagrams will reflect this terminology by viewing stacks as vertical arrays,
    like so:


