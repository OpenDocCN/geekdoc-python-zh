  md: "Let's now compare the two versions of make_uppercase in both time and space\
    \ complexity:\n\n| Version | Time Complexity | Space Complexity |\n| :--- | :---\
    \ | :--- |\n| Version #1 | O(N) | O(N) |\n| Version #2 | O(N) | O(1) |\n\nBoth\
    \ versions are O(N) in time complexity, since they take N steps for N data elements.\
    \ However, the second version is more memory-efficient, as it is O(1) in space\
    \ complexity compared to the first version's O(N).\n\nIt turns out that Version\
    \ #2 is more efficient than Version #1 in terms of space while not sacrificing\
    \ any speed, which is a nice win.\n\n# Trade-Offs Between Time and Space\n\nHere's\
    \ a function that accepts an array and returns whether it contains any duplicate\
    \ values (you may recognize this function from [Chapter 4. Speeding Up Your Code\
    \ with Big O, on page 47](https://www.google.com/search?q=Chapter+4.+Speeding+Up+Your+Code+with+Big+O,+on+page+47)):\n\
    \n```\npython\ndef has_duplicate_value(array):\n    for i in range(len(array)):\n\
    \        for j in range(len(array)):\n            if (i != j) and (array[i] ==\
    \ array[j]):\n                return True\n\n    return False\n```\n\nThis algorithm\
    \ uses nested loops and has a time complexity of O(N²). We'll call this implementation\
    \ Version #1.\n\nHere's a second implementation, Version #2, that employs a hash\
    \ table and just a single loop:\n\n```\npython\ndef has_duplicate_value(array):\n\
    \    existing_values = {}\n\n    for value in array:\n        if value not in\
    \ existing_values:\n            existing_values[value] = True\n        else:\n\
    \            return True\n\n    return False\n```\n\nVersion #2 starts out with\
    \ an empty hash table called existing_values. We then iterate over each item from\
    \ the array, and as we encounter each new item, we store it as a key in the existing_values\
    \ hash table. (We set the value arbitrarily"
  merge: -1
  pgno: 395
- img_proc: true
  md: "to True.) If, however, we encounter an item that's already a key in the hash\
    \ table, we return True, as it means we found a duplicate value.\n\nNow, which\
    \ of these two algorithms is more efficient? Well, it all depends on whether you\
    \ consider time or space. As far as time is concerned, Version #2 is much more\
    \ efficient, as it's only O(N), compared with Version #1's O(N²).\n\nHowever,\
    \ when it comes to *space*, Version #1 is actually more efficient than Version\
    \ #2. Version #2 consumes up to O(N) space, as it creates a hash table that may\
    \ end up containing all N values from the array passed to the function. Version\
    \ #1, however, doesn't consume any additional memory beyond the original array,\
    \ and therefore has a space complexity of O(1).\n\nLet's look at the complete\
    \ contrast between the two versions of `has_duplicate_value`:\n\n| Version | Time\
    \ Complexity | Space Complexity |\n| :--- | :--- | :--- |\n| Version #1 | O(N²)\
    \ | O(1) |\n| Version #2 | O(N) | O(N) |\n\nWe can see that Version #1 more efficient\
    \ when it comes to memory, but Version #2 is faster in terms of raw speed. So\
    \ how do we decide which algorithm to choose?\n\nThe answer, of course, is that\
    \ it depends on the situation. If we need our application to be blazing fast and\
    \ we have enough memory to handle it, then Version #2 might be preferable. If,\
    \ on the other hand, we're dealing with a hardware/data combination where we need\
    \ to consume memory sparingly and speed isn't our biggest need, then Version #1\
    \ might be the right choice. Like all technology decisions, when there are trade-offs,\
    \ we need to look at the big picture.\n\nLet's look at a third version of this\
    \ same function and see where it falls compared to the first two versions:\n\n\
    ```\ndef has_duplicate_value(array):\n    array.sort()\n    for i in range(len(array)\
    \ - 1):\n        if array[i] == array[i + 1]:\n            return True\n    return\
    \ False\n```\n\nThis implementation, which we'll call Version #3, begins by sorting\
    \ the array. It then iterates over each value within the array and checks to see\
    \ whether it's the same as the next value. If it is, we've found a duplicate value.\
    \ However, if we get to the end of the array and there are no two consecutive\
    \ values that are the same, we know that the array contains no duplicates."
