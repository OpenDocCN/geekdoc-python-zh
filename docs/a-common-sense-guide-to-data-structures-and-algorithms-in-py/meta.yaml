    \ in the section [Exercises, on page 430](#).\n\n+   1. We can optimize this algorithm\
    \ if we ask ourselves, “If I could magically find a desired piece of information\
    \ in O(1) time, can I make my algorithm faster?”\n\nSpecifically, as we iterate\
    \ over one array, we’d want to “magically” look up that athlete from the other\
    \ array in O(1) time. To accomplish this, we can first transform one of the arrays\
    \ into a hash table. We’ll use the full name (that is, the first *and* last name)\
    \ as the key, and True (or any arbitrary item) as the value.\n\nOnce we’ve turned\
    \ one array into this hash table, we then iterate over the other array. As we\
    \ encounter each athlete, we do an O(1) lookup in the hash table to see if that\
    \ athlete already plays the other sport. If they do, we add that athlete to our\
    \ `multisport_athletes` array, which we return at the end of the function.\n\n\
    Here’s the code for this approach:\n\n```\npython\ndef find_multisport_athletes(array_1,\
    \ array_2):\n    hash_table = {}\n    multisport_athletes = []\n\n    for athlete\
    \ in array_1:\n        hash_table[athlete[\"first_name\"]\n                  \
    \ + \" \"\n                   + athlete[\"last_name\"]] = True\n\n    for athlete\
    \ in array_2:\n        if hash_table.get(athlete[\"first_name\"]\n           \
    \               + \" \"\n                          + athlete[\"last_name\"]):\n\
    \            multisport_athletes.append(athlete[\"first_name\"]\n            \
    \                          + \" \"\n                                      + athlete[\"\
    last_name\"])\n\n    return multisport_athletes\n```\n\nThis algorithm is O(N\
