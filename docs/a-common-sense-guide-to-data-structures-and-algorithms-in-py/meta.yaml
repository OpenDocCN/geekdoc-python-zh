- md: "The fact that the fastest sorting algorithms are O(N log N) is important, as\
    \ this has implications for other algorithms as well. This is because there are\
    \ algorithms that use sorting as a component of a larger process.\n\nFor example,\
    \ if you'll recall from Chapter 4, Speeding Up Your Code with Big O, on page 47,\
    \ we dealt with the problem of checking whether there are duplicate values within\
    \ an array.\n\nThe first solution we looked at involved nested loops and had an\
    \ efficiency of O(N²). While we found a solution that took O(N), I parenthetically\
    \ hinted at a disadvantage with that approach having to do with extra memory consumption.\
    \ (I'll eventually discuss this at length in Chapter 19, Dealing with Space Constraints,\
    \ on page 385.) So let's assume that the O(N) approach is out. Are there any other\
    \ ways we can improve upon the quadratic O(N²) solution? Hint: the solution has\
    \ something to do with sorting!\n\nWe can build a beautiful algorithm if we presort\
    \ the array.\n\nLet's say the original array was [5, 9, 3, 2, 4, 5, 6]. This array\
    \ has two instances of 5, so we do have a case of duplicates.\n\nNow, if we first\
    \ sorted this array, it would become [2, 3, 4, 5, 5, 6, 9].\n\nNext, we can use\
    \ a single loop to iterate over each number. As we inspect each number, we'd check\
    \ whether it's identical to the *next* number. If it is, we've found a duplicate.\
    \ If we get to the end of the loop without finding a duplicate, then we know that\
    \ we have no duplicates.\n\nThe trick here is that by presorting the numbers,\
    \ we end up bunching duplicate numbers together.\n\nIn our example, we'd start\
    \ by looking at the first number, which is the 2. We'd check whether it's identical\
    \ to the next number. The next number is 3, so they're not duplicates.\n\nWe'd\
    \ then check the 3 against the following number, which happens to be a 4, allowing\
    \ us to move on. We'd check the 4 against the 5, and we'd move on again.\n\nAt\
    \ this point, we'd inspect the first 5 and check it against the following number,\
    \ which is the second 5. Aha! We found a pair of duplicate numbers, and we can\
    \ return true.\n\nHere's a Python implementation of this:\n\n```python\ndef has_duplicate_value(array):\n\
    \    array.sort()\n    for index in range(len(array) - 1):\n        if array[index]\
    \ == array[index + 1]:\n            return True\n    return False\n```\n\nNow,\
    \ this is an algorithm that used sorting as one of its components. What’s the\
    \ Big O of this algorithm?\n\nWe start out by sorting the array. We can assume\
