- img_proc: true
  md: '+   1. We check both children of the trickle node and see which one is larger.

    2. If the trickle node is smaller than the larger of the two child nodes, we swap
    the trickle node with that larger child.

    3. We repeat Steps 1 and 2 until the trickle node has no children who are greater
    than it.


    Let''s see this in action.


    Step 1: The 3, which is the trickle node, currently has two children, the 88 and
    the 25. The 88 is larger of the two, and since the 3 is smaller than the 88, we
    swap the trickle node with the 88:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_298_0.png)


    Step 2: The trickle node now has two new children, the 87 and the 16. The 87 is
    the larger one, and it''s greater than the trickle node. So we swap the trickle
    node with the 87:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_298_1.png)'
  merge: -1
  pgno: 298
- img_proc: true
  md: 'Step 3: The trickle node''s children are currently the 86 and the 50. The 86
    is the larger of the two, and it''s also greater than the trickle node, so we
    swap the 86 with the trickle node:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_299_0.png)


    At this point, the trickle node has no children that are greater than it. (In
    fact, it has no children at all.) So we''re done, as the heap condition has been
    restored.


    The reason why we always swap the trickle node with the *greater* of its two children
    is because if we swap it the with the smaller one, we''d end up violating the
    heap condition immediately. Watch what happens when we try to swap the trickle
    node with a smaller child.


    Let''s start again with the trickle node of 3 as our root:


