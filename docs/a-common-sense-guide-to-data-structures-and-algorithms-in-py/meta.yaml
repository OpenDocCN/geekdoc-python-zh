    \ None\n\n    shift_amount = (sum_1 - sum_2) // 2\n\n    for index, num in enumerate(array_2):\n\
    \        if num + shift_amount in hash_table:\n            return [hash_table[num\
    \ + shift_amount], index]\n\n    return None\n```\n\n这种方法比我们最初 O(N * M) 的方法快得多。如果我们将\
    \ array_1 视为 N，array_2 视为 M，我们可以说这个算法的运行时间是 O(N + M)。虽然我们确实遍历了 array_2 两次，技术上是\
    \ 2M，但由于我们忽略了常数项，所以它变成了 M。\n\n这种方法需要额外的 O(N) 空间，因为我们将 array_1 中的所有 N 个数字都复制到了哈希表中。同样，我们是在用空间换取时间，但如果速度是我们的首要考虑，这将是一个巨大的胜利。\n\
    \n无论如何，这是另一个例子，说明发现规律能让我们直击问题核心，并开发出简单快速的解决方案。\n\n## 贪心算法\n\n下一个策略可以加速一些最棘手的算法。它并非在所有情况下都有效，但当它有效时，它可能是一个改变游戏规则的方法。\n\
    \n让我们来谈谈编写贪心算法。\n\n这可能听起来是个奇怪的术语，但它的意思是这样的。*贪心算法*是指在每一步中，都选择*在当时*看起来是最佳选项的算法。通过一个基本的例子，你就会明白。\n\
    \n### 数组最大值\n\n让我们编写一个算法来找到数组中的最大数。一种方法是使用嵌套循环，将每个数字与数组中的其他每个数字进行比较。当我们找到一个比所有其他数字都大的数字时，就意味着我们找到了数组中的最大数。\n\
    \n对于这类算法来说，这种方法通常需要 O(N²) 的时间。\n\n另一种方法是将数组按升序排序，然后返回数组中的最后一个值。如果我们使用像快速排序这样的快速排序算法，这将需要\
    \ O(N log N) 的时间。\n\n第三种选择是贪心算法：\n\n```\ndef max(array):\n    if not array:\n\
    \        return None\n\n    greatest_number = array[0]\n\n    for number in array:\n\
    \        if number > greatest_number:\n            greatest_number = number\n\n\
    \    return greatest_number\n```\n\n在确保数组不为空之后，我们执行以下操作：\n\n```\ngreatest_number\
    \ = array[0]\n```\n\n这一行“假设”数组中的第一个数字是 `greatest_number`。现在，这是一个“贪婪”的假设；也就是说，我们宣布第一个数字为\
    \ `greatest_number`，因为它是到目前为止我们遇到的最大数字。当然，它也是我们到目前为止遇到的*唯一*数字！但这就是贪心算法的工作方式——它根据当时可用的信息选择看起来是最佳的选项。\n\
    \n接下来，我们遍历数组中的所有数字。当我们发现任何大于 `greatest_number` 的数字时，我们就将这个新数字设为 `greatest_number`。在这里，我们也是贪婪的：每一步都根据当时所知的信息选择最佳选项。\n\
    \n我们基本上就像一个在糖果店里的孩子，抓起我们看到的第一颗糖果，但一旦我们看到一颗更大的糖果，我们就扔掉第一颗，抓起更大的那颗。\n\n然而，这种看似天真的贪婪实际上很有效。当我们完成这个函数时，我们的\
    \ greatest_number 确实会是整个数组中的最大数。\n\n虽然在社会环境中贪婪不是一种美德，但它可以为算法速度带来奇效。这个算法只需要 O(N)\
    \ 的时间，因为我们只触及数组中的每个数字一次。\n\n### 最大子段和\n\n让我们看看另一个例子，看看贪婪如何带来回报。\n\n我们将编写一个函数，它接受一个数字数组，并返回可以从数组的任何“子段”计算出的最大和。\n\
    \n我的意思是这样的。让我们取以下数组：\n\n```\n[3, -4, 4, -3, 5, -9]\n```\n\n如果我们计算这个数组中所有数字的和，我们会得到\
    \ -4。\n\n但我们也可以计算数组*子段*的和：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_420_0.png)\n\
    \n当我提到子段时，我指的是*连续子段*；也就是说，子段是数组中包含一系列*连续*数字的部分。\n\n以下*不是*一个连续子段，因为数字不是连续的：\n\n\
    ![](img/c0a46c67bb2536aa545ec1bd7065e742_420_1.png)\n\n我们的任务是找到可以从数组中*任何*子段计算出的最大和。在我们的例子中，最大和是\
    \ 6，来自以下子段：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_421_0.png)\n\n为了使讨论更简单，让我们假设数组至少包含一个正数。\n\
    \n现在，我们如何编写代码来计算最大子段和呢？\n\n一种方法是计算数组中每个子段的和，然后找出最大的那个。然而，对于一个有 N 个元素的数组，大约有 N²\
    \ / 2 个子段，所以仅仅生成不同的子段就需要 O(N²) 的时间。\n\n同样，让我们先设想一下最佳的大 O 表示法。我们肯定需要至少检查每个数字一次，所以我们无法超越\
    \ O(N)。所以让我们把 O(N) 作为我们的目标。\n\n乍一看，O(N) 似乎遥不可及。我们如何通过只遍历数组一次来计算多个子段的和呢？\n\n让我们看看如果我们稍微贪婪一点会发生什么……\n\
    \n在这种情况下，贪心算法会在我们遍历数组时，试图在每一步“抓住”最大的和。当我们遍历前面的示例数组时，这可能看起来像这样。\n\n从数组的开头开始，我们遇到一个\
    \ 3。按照完美的贪婪方式，我们会说我们的最大和是 3：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_421_1.png)\n\
    \n接下来，我们遇到 -4。当我们将它加到之前的数字 3 上时，我们得到当前和 -1。所以 3 仍然是我们的最大和：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_421_2.png)\n\
    \n然后我们遇到 4。如果我们将它加到当前和中，我们得到 3：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_422_0.png)\n\
    \n到目前为止，3 仍然是最大的和。\n\n我们遇到的下一个数字是 -3。这使我们的当前和变为 0：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_422_1.png)\n\
    \n同样，虽然 0 是我们的*当前*和，但 3 仍然是我们的*最大*和。\n\n接下来，我们遇到 5。这使我们的当前和变为 5。在我们的贪婪中，我们会宣布这是最大的和，因为它是到目前为止我们遇到的最大和：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_422_2.png)\n\n然后我们遇到最后一个数字，即 -9。这使我们的当前和降至\
    \ -4：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_422_3.png)\n\n当我们到达数组末尾时，我们的最大和是\
    \ 5。所以如果我们遵循这种纯粹的贪婪方法，我们的算法似乎应该返回 5。\n\n然而，5 *不是*最大的子段和。数组中的一个子段的和是 6：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_422_4.png)\n\
    \n我们算法的问题在于，我们只计算了基于总是从数组第一个数字开始的子段的最大和。但其他子段也从数组后面的数字开始，我们没有考虑到这些。\n\n因此，我们的贪心算法并没有像我们希望的那样奏效。\n\
    \n但我们还不应该放弃！通常，我们需要稍微调整一下贪心算法才能让它们工作。\n\n让我们看看寻找规律是否有所帮助。（通常确实如此。）正如我们之前看到的，寻找规律的最佳方法是生成大量示例。所以让我们想出一些带有最大子段和的数组示例，看看我们是否发现了什么有趣的东西：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_423_0.png)\n\n在分析这些情况时，一个有趣的问题出现了：为什么在某些情况下，最大和来自从数组开头开始的子段，而在其他情况下则不是？\n\
    \n观察这些情况，我们可以看到，当最大子段*不*从开头开始时，是因为一个负数打破了连续性：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_423_1.png)\n\
    \n最大子段*本来*会从数组开头开始，但一个负数打破了连续性，最大子段必须从数组后面开始。\n\n但等一下。在某些情况下，最大子段*包含*一个负数，而这个负数并没有打破连续性：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_423_2.png)"
