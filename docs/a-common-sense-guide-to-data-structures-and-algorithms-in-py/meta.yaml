    # Insertion


    Admittedly, linked lists have yet to impress us from a performance standpoint.
    They''re no better than arrays at search, and much worse at reading. But not to
    worry—linked lists will have their moment. In fact, that moment is now.


    Insertion is one operation in which linked lists have a distinct advantage over
    arrays *in certain situations*.


    Recall that the worst-case scenario for insertion into an array is when the program
    inserts data into index 0, because it first has to shift the rest of the data
    one cell to the right, which ends up yielding an efficiency of O(N). With linked
    lists, however, insertion at the beginning of the list takes just one step—which
    is O(1). Let''s see why.


    Say we have the following linked list:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_244_0.png)


    If we want to add "yellow" to the beginning of the list, all we have to do is
    create a new node and have its link point to the node containing "blue":


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_244_1.png)


    (In our code, we''d also need to update the LinkedList instance so that its first_node
    attribute now points to this "yellow" node.)


    In contrast with an array, the linked list provides the flexibility of inserting
    data to the front of the list without requiring the shifting of any data. How
    sweet is that?


    The truth is that, theoretically, inserting data *anywhere* within a linked list
    takes just one step, but there''s one gotcha. Let''s continue with our example.
    Here''s our linked list now:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_244_2.png)'
