- img_proc: true
  md: 'Here''s a simple array:


    ```

    array = [61, 30, 91, 11, 54, 38, 72]

    ```


    If you want to search for a number in this array, how many steps would it take?


    Because the array is unordered, you''d have to perform a linear search, which
    would take N steps—you learned this back at the beginning of the book.


    However, what would happen if we ran some code that would convert these numbers
    into a hash table that looked like this?


    ```

    hash_table = {61: True, 30: True, 91: True,

    11: True, 54: True, 38: True, 72: True}

    ```


    Here, we''ve stored each number as a key and assigned the Boolean True as the
    associated value for each number.


    Now, if I asked you to search this hash table for a certain number as a key, how
    many steps would it take?


    Well, I could use this simple code:


    ```

    hash_table.get(72)

    ```


    And I could look up the number 72 in a single step.


    In other words, by doing a hash table lookup using 72 as the key, I can determine
    in one step whether the 72 is present in the hash table. The reasoning is straightforward:
    if 72 is a key in the hash table, I''d get back True, since the 72 has True as
    its value. On the other hand, if the 72 is *not* a key in the hash table, I''d
    get back None.


    Since doing a hash table lookup takes just one step, I can therefore find any
    number in the hash table (as a key) in one step.


    Can you see the magic?


    By converting an array into a hash table in this way, we can go from O(N) searches
    to O(1) searches.


    Here''s what''s interesting about using a hash table in this way. Even though
    hash tables are often used for naturally paired data, our data here is *not* paired.
    We just care about a list of single numbers.


    While we did assign a value to each key, it doesn''t really matter what the value
    is. We used True as the value for each key, but any arbitrary value (that is "truthy")
    would achieve the same results.'
