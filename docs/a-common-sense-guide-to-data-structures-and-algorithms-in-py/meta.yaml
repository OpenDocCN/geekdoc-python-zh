    # Binary Search vs. Linear Search


    With ordered arrays of a small size, the algorithm of binary search doesn''t have
    much of an advantage over linear search. But let''s see what happens with larger
    arrays.


    With an array containing 100 values, here are the maximum number of steps each
    type of search would take:


    +   - Linear search: 100 steps

    - Binary search: 7 steps


    With linear search, if the value we''re searching for is in the final cell or
    is greater than the value in the final cell, we have to inspect each and every
    element. For an array of size 100, this would take 100 steps.


    When we use binary search, however, each guess we make eliminates half of the
    possible cells we''d have to search. In our very first guess, we get to eliminate
    a whopping fifty cells.


    Let''s look at this another way, and we''ll see a pattern emerge.


    With an array of size 3, binary search would take a maximum of two steps.


    If we double the number of cells in the array (and add one more to keep the number
    odd for simplicity''s sake), there are seven cells. For such an array, the maximum
    number of steps to find something using binary search is three.


    If we double it again (and add one) so that the ordered array contains fifteen
    elements, the maximum number of steps for binary search is four.


    The pattern that emerges is that for each time we double the size of the ordered
    array, the number of steps needed for binary search increases by one. This makes
    sense, as each lookup eliminates half of the elements from the search.


    This pattern is unusually efficient: each time we double the data, the binary
    search algorithm adds *just one more step*.


    Contrast this with linear search. If you had 3 elements, you''d need up to 3 steps.
    For 7 elements, you''d need a maximum of 3 steps. For 100 values, you''d need
    up to 100 steps. With linear search, then, *there are as many steps as there are
    items*. So for linear search, each time we double the size of the array, we *double*
    the number of steps of our search. For binary search, though, each time we double
    the size of the array, we only need to add *one more step*.'
