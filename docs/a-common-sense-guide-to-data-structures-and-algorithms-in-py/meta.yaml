    \ to just know the cheapest price is $280; we also want to know that to get this\
    \ price, we need to fly the specific path of Atlanta-Denver-Chicago-El Paso.\n\
    \nTo achieve this, we'll also need *another* table, which we'll call the `cheapest_previous_stopover_city_table`.\
    \ The purpose of this table will only become clear once we jump into the algorithm,\
    \ so I'll hold off on the explanation until then. For now, though, it'll suffice\
    \ to show what it'll look like by the end of the algorithm.\n\n| Cheapest Previous\
    \ Stopover City from Atlanta: | Boston | Chicago | Denver | El Paso |\n| :---\
    \ | :--- | :--- | :--- | :--- |\n| | Atlanta | Denver | Atlanta | Chicago |\n\n\
    (Note that this table, too, will be implemented using a hash table.)\n\n### Dijkstra's\
    \ Algorithm Steps\n\nNow that everything is set up, here are the steps for Dijkstra's\
    \ algorithm. For clarity, I'm going to describe the algorithm in terms of cities,\
    \ but you can replace the word \"city\" with \"vertex\" to make it work for any\
    \ weighted graph. Also note that these steps will become clearer when we walk\
    \ through an example. But for now, here we go:\n\n1. We visit the starting city,\
    \ making it our \"current city.\"\n2. We check the prices from the current city\
    \ to each of its adjacent cities.\n3. If the price to an adjacent city from the\
    \ starting city is cheaper than the price currently in `cheapest_prices_table`\
    \ (or the adjacent city isn't yet in the `cheapest_prices_table` at all):\n  \
