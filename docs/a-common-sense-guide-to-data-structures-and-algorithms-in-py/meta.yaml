    \n正如你所学到的，大O主要关注最坏情况。在我们的例子中，最坏情况是所有数字都是偶数，这种情况下我们在每轮循环中执行三个步骤。因此，我们可以说，对于*N*个数据元素，我们的算法需要3*N*步。也就是说，对于*N*个数字中的每一个，我们的算法执行三个步骤。\n\
