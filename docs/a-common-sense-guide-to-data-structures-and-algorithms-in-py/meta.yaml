    The second version takes N / 2 steps. When the upper_limit is 100, the function
    takes just 50 steps. While it would be tempting to call this O(N / 2), you''ve
    now learned that we drop the constants and reduce the expression to O(N).


    Now, the second version is twice as fast as the first one and would naturally
    be the better choice. This is another great example of where two algorithms can
    be expressed the same way using Big O notation but further analysis is needed
    to figure out which algorithm is faster.


    # Significant Steps


    Let''s apply one more level of analysis to the previous example. If we look again
    at the first version, print_numbers_version_one, we said that it takes N steps.
    This is because the loop runs N times, with N being the upper_limit.


    But does the function really take just N steps?


    If we really break things down, we can see that *multiple* steps occur in each
    round of the loop.


    First, we have the comparison step (if number % 2 == 0), which checks whether
    the number is divisible by 2. This comparison happens in each round of the loop.


    Second, we have the print step (print(number)), which happens just for the even
    numbers. This, then, occurs in every *other* round of the loop.


    And third, we have number += 1, which runs in each round of the loop.


    In the previous chapters, I alluded to the fact that you''d learn how to determine
    which steps are significant enough to be counted when expressing the Big O of
    an algorithm. In our case, then, which of these steps are considered significant?
    Do we care about the comparisons, the printing, or the incrementing of number?


    The answer is that *all* steps are significant. It''s just that when we express
    the steps in Big O terms, we drop the constants and thereby simplify the expression.


    Let''s apply this here. If we count all the steps, we have N comparisons, N incrementings,
    and N / 2 printings. This adds up to 2.5N steps. However, because we eliminate
    the constant of 2.5, we express this as O(N). So which step was significant? They
    all were, but by dropping the constant, we effectively focus more on the number
    of times the loop runs, rather than the exact details of what happens within the
    loop.'
