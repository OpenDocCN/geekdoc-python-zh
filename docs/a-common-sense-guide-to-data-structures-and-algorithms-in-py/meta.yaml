    \ we're going to use simplified diagrams to depict linked lists, such as this\
    \ one:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_240_0.png)\n\nEach node in\
    \ this diagram consists of two cells. The first cell contains the node's data,\
    \ and the second cell points to the next node.\n\nThis reflects our implementation\
    \ of the Node class. In it, the data method returns the node's data, while the\
    \ next_node method returns the next node in the list. *In this context, the next_node\
    \ method serves as the node's link.*\n\nWhile we've been able to create this linked\
    \ list with the Node class alone, we still need an easy way to tell our program\
    \ where the linked list begins. To do this, we'll create a LinkedList class in\
    \ addition to our previous Node class. Here's the LinkedList class in its basic\
    \ form:\n\n```\npython\nimport node\n\nclass LinkedList:\n    def __init__(self,\
    \ first_node=None):\n        self.first_node = first_node\n```\n\nNote that we\
    \ import node at the beginning of our code, since we placed the Node class in\
    \ a separate file from this LinkedList class.\n\nAt this point, all a LinkedList\
    \ instance does is keep track of the first node of the list.\n\nPreviously we\
