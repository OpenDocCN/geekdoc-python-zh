    # CHAPTER 18\nConnecting Everything with Graphs\n\nLet's say we're building a\
    \ social network that allows people to be friends with one another. These friendships\
    \ are mutual, so if Alice is friends with Bob, then Bob is also friends with Alice.\n\
    \nHow can we best organize this data?\n\nOne basic approach might be to use a\
    \ two-dimensional array that stores the list of friendships:\n\n```\nfriendships\
    \ = [\n    [\"Alice\", \"Bob\"],\n    [\"Bob\", \"Cynthia\"],\n    [\"Alice\"\
    , \"Diana\"],\n    [\"Bob\", \"Diana\"],\n    [\"Elise\", \"Fred\"],\n    [\"\
    Diana\", \"Fred\"],\n    [\"Fred\", \"Alice\"]\n]\n```\n\nHere, each subarray\
    \ containing a pair of names represents a friendship between two people.\n\nUnfortunately,\
    \ with this approach, there's no quick way to see who Alice's friends are. If\
    \ we look carefully, we can see that that Alice is friends with Bob, Diana, and\
    \ Fred. But for the computer to determine this, it would have to comb through\
    \ all the relationships in the list, since Alice can be present in any of them.\
    \ This is O(N), which is very slow.\n\nThankfully, we can do much, *much* better\
    \ than this. With a data structure known as a *graph*, we can find Alice's friends\
    \ in *just O(1) time*.\n\n## Graphs\n\nA *graph* is a data structure that specializes\
    \ in relationships, as it easily conveys how data is connected.\n\nHere's a visualization\
    \ of our social network, displayed as a graph:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_338_0.png)\n\
    \nEach person is represented by a node, and each line indicates a friendship with\
    \ another person. If you look at Alice, for example, you can see that she is friends\
    \ with Bob, Diana, and Fred, since her node has lines that connect to their nodes.\n\
    \n## Graphs vs. Trees\n\nYou might have noticed that graphs look similar to trees,\
    \ which we've dealt with in the past few chapters. Indeed, *trees are a type of\
    \ graph*. Both data structures consist of nodes connected to each other.\n\nSo\
    \ what's the difference between a graph and a tree?\n\nHere's the deal: while\
    \ all trees are graphs, not all graphs are trees.\n\nSpecifically, for a graph\
    \ to be considered a tree, it cannot have *cycles*, and all nodes must be *connected*.\
    \ Let's see what that means.\n\nA graph may have nodes that form what is known\
    \ as a *cycle*—that is, nodes that reference each other circularly. In the previous\
    \ example, Alice is friends with Diana, and Diana is connected to Bob, and Bob\
    \ is connected...to Alice. These three nodes form a cycle.\n\nTrees, on the other\
    \ hand, are not \"allowed\" to have cycles. If a graph has a cycle, then it's\
    \ not a tree.\n\nAnother characteristic specific to trees is that every node is\
    \ somehow connected to every other node, even if the connections are indirect.\
    \ However, it's possible for a graph to not be fully connected.\n\nSee the following\
    \ graph:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_339_0.png)\n\nIn this social\
    \ network, we have two pairs of friends. However, no one from either pair is friends\
    \ with anyone from the other pair. Additionally, we can see that Vicky has no\
    \ friends yet, as perhaps she signed up for this social network just minutes ago.\
    \ With trees, however, there's never a node that's disconnected from the rest\
    \ of the tree.\n\n## Graph Jargon\n\nGraphs have a bit of their own technical\
    \ jargon. We're used to calling each piece of data a *node*, but in “graph-speak,”\
    \ each node is called a *vertex*. The lines between nodes, um—vertices, have their\
    \ own name as well and are called *edges*. And vertices that are connected by\
    \ an edge are said to be *adjacent* to each other. Some computer scientists also\
    \ refer to adjacent vertices as *neighbors*.\n\nIn our first graph, then, the\
    \ vertices of Alice and Bob are adjacent to each other, since they share an edge.\n\
    \nI mentioned earlier that it's possible for a graph to have a vertex that isn't\
    \ connected at all to other vertices. However, a graph where *all* the vertices\
    \ are connected in some way is said to be a *connected graph*.\n\n## The Bare-Bones\
    \ Graph Implementation\n\nFor the sake of code organization, we're going to use\
