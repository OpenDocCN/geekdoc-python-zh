    \nWe can still use our simple hash-table implementation to store this data:\n\n\
    ```\nfollowees = {\n    \"Alice\": [\"Bob\", \"Cynthia\"],\n    \"Bob\": [\"Cynthia\"\
    ],\n    \"Cynthia\": [\"Bob\"]\n}\n```\n\nThe only difference here is that we're\
