  md: "Since we made at least one swap during this pass-through, we need to perform\
    \ another one.\n\nAnd so begins the fourth pass-through:\n\nStep 16: We compare\
    \ the 1 and the 2:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_71_0.png)\n\nBecause\
    \ they're in order, we don't need to swap. We can end this pass-through, since\
    \ all the remaining values are already correctly sorted.\n\nNow that we've made\
    \ a pass-through that didn't require any swaps, we know that our array is completely\
    \ sorted:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_71_1.png)\n\n# Code Implementation:\
    \ Bubble Sort\n\nHere's an implementation of Bubble Sort in Python:\n\n```\npython\n\
    def bubble_sort(array):\n    unsorted_until_index = len(array) - 1\n    sorted\
    \ = False\n\n    while not sorted:\n        sorted = True\n        for i in range(unsorted_until_index):\n\
    \            if array[i] > array[i+1]:\n                array[i], array[i+1] =\
    \ array[i+1], array[i]\n                sorted = False\n        unsorted_until_index\
    \ -= 1\n\n    return array\n```\n\nTo use this function, we can pass an unsorted\
    \ array to it, like so:\n\n```\npython\nprint(bubble_sort([65, 55, 45, 35, 25,\
    \ 15, 10]))\n```\n\nThis function will then return the sorted array.\n\nLet's\
    \ break the function down line by line to see how it works. I'll explain each\
    \ line by first providing the explanation, followed by the line of code itself.\n\
    \nThe first thing we do is create a variable called unsorted_until_index. This\
    \ keeps track of the rightmost index of the array that has *not* yet been sorted.\
    \ When we first start the algorithm, the array is completely unsorted, so we initialize\
    \ this variable to be the final index in the array:"
