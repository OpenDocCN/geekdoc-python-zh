    \ the middle point, it still means an upward trend is present in the array. This\
    \ is true even though we ended up overwriting the lower point to be some other\
    \ number later on.\n\nIn any case, our greedy approach paid off, as we only iterated\
    \ over our array a single time. This is an astounding improvement, as we turned\
    \ an algorithm that ran at O(N³) into one of O(N).\n\nOf course, a greedy approach\
    \ doesn't *always* work. But it's another tool you can try out when optimizing\
    \ your algorithms.\n\n## Change the Data Structure\n\nAnother helpful optimization\
    \ technique is to imagine what would happen if we stored our given data in an\
    \ alternative data structure.\n\nFor example, we may be working on a problem where\
    \ the data is given to us in the form of an array. However, reimagining that same\
    \ data stored as a hash table, tree, or other data structure can sometimes reveal\
    \ clever optimization opportunities.\n\nOur use of a hash table for the magical\
    \ lookup technique earlier is a specific example of this. And we're about to see\
    \ that changing the data structure can be useful for other scenarios as well.\n\
    \n## The Anagram Checker\n\nHere's one example. Let's say we're writing a function\
    \ that determines whether two given strings are anagrams of one another. We encountered\
    \ an anagram function before in [Anagram Generation, on page 177](page 177), but\
    \ there we dealt with a function that produced every anagram of a string. Here,\
    \ we're just going to compare two strings side by side. We'll return `True` if\
    \ they're anagrams of each other and `False` if they're not.\n\nNow, we could\
    \ use the anagram-generating function to solve this problem; that is, we can produce\
    \ all the anagrams of the first string and see if the second string matches any\
    \ of those anagrams. However, since for N characters in the string there will\
    \ always be N! anagrams, our algorithm will take at least O(N!) time. This is\
    \ disastrously slow.\n\nYou know the drill. Before we proceed to optimize our\
    \ code, we need to come up with our best-imaginable Big O.\n\nNow, we certainly\
    \ need to visit each character from both strings at least once. And since the\
    \ input strings may be of different sizes, touching each character just once would\
    \ be O(N + M). As I couldn't imagine a faster speed for the task at hand, this\
    \ is what we'll aim for.\n\nIn theory, we could put some code at the beginning\
    \ of the function that immediately returns `False` if the two strings have different\
    \ sizes, since it's impossible for strings of different sizes to be anagrams.\
    \ In that case, the speed we'd aim for is 2N since the algorithm will only be\
    \ working with strings that are the same size. This reduces to O(N).\n\nHowever,\
    \ for the sake of this discussion, we'll allow someone to input two strings that\
    \ may be of different sizes, and so we'll aim for O(N + M).\n\nLet's work our\
    \ way there.\n\nA second possible approach to our problem is to run nested loops\
    \ to compare the two strings. Specifically, as an outer loop iterates over each\
    \ character from the first string, we compare that character to every character\
    \ of the second string. Each time we find a match, we delete a character from\
    \ the second string. The idea here is that if every character from the first string\
    \ is also present in the second string, we'd end up deleting every character from\
