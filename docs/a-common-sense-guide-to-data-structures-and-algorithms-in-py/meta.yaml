    \ so that we can know when we reach the desired index. We start at 0 since the\
    \ first node's index is 0:\n\n```\ncurrent_index = 0\n```\n\nWe then launch a\
    \ loop that runs while `current_index` is less than the index we're attempting\
    \ to read:\n\n```\nwhile current_index < index:\n```\n\nIn each pass-through of\
    \ the loop, we access the next node in the list and make it the new `current_node`:\n\
    \n```\ncurrent_node = current_node.next_node\n```\n\nWe also bump up the `current_index`\
    \ by 1:\n\n```\ncurrent_index += 1\n```\n\nAt the end of each pass-through, we\
    \ check whether we've reached the end of the list, and we return `None` if the\
    \ index we're trying to read isn't in our list:\n\n```\nif not current_node:\n\
    \    return None\n```\n\nThis works because the final node of the list will actually\
    \ have a `next_node` that is `None` since the last node was never assigned a `next_node`\
    \ of its own. This being the case, when `current_node` refers to the final node\
    \ and we then execute `current_node = current_node.next_node`, the `current_node`\
