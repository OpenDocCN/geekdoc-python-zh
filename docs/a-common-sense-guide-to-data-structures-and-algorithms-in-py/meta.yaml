  md: "However, when two algorithms fall under the *same* classification of Big O,\
    \ it doesn't necessarily mean that both algorithms have the same speed. After\
    \ all, Bubble Sort is twice as slow as Selection Sort even though both are O(N²).\
    \ So while Big O is perfect for contrasting algorithms that fall under different\
    \ classifications of Big O, when two algorithms fall under the *same* classification,\
    \ further analysis is required to determine which algorithm is faster.\n\n# A\
    \ Practical Example\n\nLet's return to the first code example from Chapter 1,\
    \ with minor changes:\n\n```\ndef print_numbers_version_one(upper_limit):\n  \
    \  number = 2\n    while number <= upper_limit:\n        if number % 2 == 0:\n\
    \            print(number)\n        number += 1\n\ndef print_numbers_version_two(upper_limit):\n\
    \    number = 2\n    while number <= upper_limit:\n        print(number)\n   \
    \     number += 2\n```\n\nHere we have two algorithms for accomplishing the same\
    \ task, namely printing all even numbers starting from 2 to some `upper_limit`.\
    \ (In Chapter 1, the upper limit was fixed at 100, while here, we let the user\
    \ pass in a number as the `upper_limit`.)\n\nI noted in Chapter 1 that the first\
    \ version takes twice as many steps as the second version, but now let's see how\
    \ this plays out in terms of Big O.\n\nAgain, Big O expresses the answer to the\
    \ key question: if there are N data elements, how many steps will the algorithm\
    \ take? In this case, though, N isn't the size of an array, but simply the number\
    \ we pass into the function to serve as the `upper_limit`.\n\nThe first version\
    \ takes about N steps. That is, if the `upper_limit` is 100, the function takes\
    \ about 100 steps. (It really takes 99 steps, since it starts the count at 2.)\
    \ So we can safely say that the first algorithm has a time complexity of O(N)."
