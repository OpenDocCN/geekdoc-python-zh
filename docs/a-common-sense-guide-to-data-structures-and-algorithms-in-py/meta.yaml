  md: "# Completing Autocomplete\n\nWe're finally ready to implement our autocomplete\
    \ feature. In fact, we've pretty much done all the legwork already. All we need\
    \ to do is put the pieces together.\n\nHere's a basic autocomplete method that\
    \ we can drop into our Trie class:\n\n```\ndef autocomplete(self, prefix):\n \
    \   current_node = self.search(prefix)\n\n    if not current_node:\n        return\
    \ None\n\n    return self.collect_all_words([], current_node)\n```\n\nYes, that's\
    \ it. By using our search method and collect_all_words method together, we can\
    \ autocomplete any prefix. Here's how this works.\n\nThe autocomplete method accepts\
    \ the prefix parameter, which is the string of characters the user begins typing\
    \ in.\n\nFirst, we search the trie for the existence of the prefix. If the search\
    \ method doesn't find the prefix in the trie, the search method returns None,\
    \ and so our method does as well.\n\nHowever, if the prefix is found in the trie,\
    \ the search method returns *the node in the trie that represents the final character\
    \ in the prefix*. We noted earlier that we could have simply had the search method\
    \ return True once it finds the word. The reason why we had it return the final\
    \ node was so that we could use the search method to help us with the autocomplete\
    \ feature.\n\nOur autocomplete method continues by calling the collect_all_words\
    \ method on the node returned by the search method. This finds and collects all\
    \ words that stem from that final node, which represents all the complete words\
    \ that can be appended to the original prefix to form a word.\n\nOur method finally\
    \ returns an array of all possible endings to the user's prefix, which we could\
    \ then display to the user as possible autocomplete options.\n\n# Tries with Values:\
    \ A Better Autocomplete\n\nIf we think about it, a good autocomplete feature isn't\
    \ necessarily going to display *every* possible word the user might be intending\
    \ to type. Showing, say, sixteen options would be overwhelming to the user, so\
    \ we'd rather show just the most popular words from the available list.\n\nFor\
    \ example, if the user starts typing \"bal\", the user might be intending to type\
    \ \"ball\", \"bald\", or \"balance\". Now, it's also possible that the user is\
    \ typing"
