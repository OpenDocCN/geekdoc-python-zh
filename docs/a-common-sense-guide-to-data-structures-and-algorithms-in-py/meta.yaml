- img_proc: true
  md: 'So what’s the difference?


    The pattern is this: if the negative number causes the preceding subsection’s
    sum to sink to a negative number, the streak is broken. But if the negative number
    simply lowers the current subsection’s sum, and the sum remains a positive number,
    the streak isn’t broken.


    If we think about it, this makes sense. If, as we’re iterating through the array,
    our current subsection’s sum becomes less than 0, *we’re best off just resetting
    the current sum to 0*. Otherwise, the current negative sum will just detract from
    the greatest sum we’re trying to find.


    So let’s use this insight to tweak our greedy algorithm.


    Again, let’s start with the 3. The greatest sum is currently 3:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_424_0.png)


    Next, we encounter the -4. This would make our current sum -1:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_424_1.png)


    Since we’re trying to find the subsection with the greatest sum, and our current
    sum is a negative number, we need to reset the current sum to 0 before continuing
    on to the next number:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_424_2.png)


    We’ll also start a brand-new subsection beginning with the next number.


    Again, the reasoning is that if the next number is positive, we may as well just
    start the next subsection from there, without letting the current negative number
    drag down the sum. Instead, we’re going to perform a reset by setting the current
    sum to 0 and considering the next number to be the *beginning* of a new subsection.


    So let’s continue.'
