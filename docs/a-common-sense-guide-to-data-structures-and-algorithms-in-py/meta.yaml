  md: 'We have a decent amount of code here, so let''s break it down.


    The `dijkstra_shortest_path` function accepts two vertices, representing the `starting_city`
    and `final_destination`.


    Eventually, our function will return an array of strings that represent the cheapest
    path. For our example, this function would return:


    ```

    ["Atlanta", "Denver", "Chicago", "El Paso"]

    ```


    The first thing our function does is set up the two primary tables that fuel the
    entire algorithm:


    ```

    cheapest_prices_table = {}

    cheapest_previous_stopover_city_table = {}

    ```


    We then set up ways to track which cities we''ve visited and the ones we have
    yet to visit:


    ```

    unvisited_cities = [starting_city]

    visited_cities = {}

    ```


    Note that we prepopulate `unvisited_cities` with the `starting_city` as the only
    item in the array.


    It may seem odd that `unvisited_cities` is an array, while `visited_cities` is
    a hash table. The reason we''ve made `visited_cities` a hash table is because
    in the code that follows we only use it for lookups, for which a hash table is
    an ideal choice in terms time complexity.


    The choice of the best data structure for the `unvisited_cities` is less simple.
    In our code that follows, the next city we visit is always the cheapest unvisited
    city to reach from the starting city. Ideally, then, we always want immediate
    access to the cheapest option from among the unvisited cities. Our code that accesses
    this data is simpler if the data structure is an array.


    In truth, a priority queue would be a perfect fit for this, as its whole function
    is to provide ready access to the least (or greatest) value from a collection
    of items. As you saw in [Chapter 16, Keeping Your Priorities Straight with Heaps,
    on page 277](https://example.com), a heap is generally the best data structure
    for implementing a priority queue. However, I''ve instead chosen to use a simple
    array for this implementation only to keep the code as simple and small as possible,
    since Dijkstra''s algorithm is complex enough on its own. But I encourage you
    to try replacing the array with a priority queue.


    Next, we add the first key-value pair to the `cheapest_prices_table` with the
    `starting_city` as the key and 0 as the value. Again, this makes sense because
    it costs nothing to get to the `starting_city` as we''re already there:'
