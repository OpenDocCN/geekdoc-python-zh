    And we''re done!


    # Successor Node with a Right Child


    We haven''t accounted for one case yet, though, and that''s where the successor
    node has a right child of its own. Let''s re-create the preceding tree but add
    a right child to the 52:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_274_1.png)


    In this case, we can''t simply plug the successor node—the 52—into the root, since
    we''d leave its child of 55 hanging. This leads us to one more rule for our deletion
    algorithm:


    +   - If the successor node has a right child, after plugging the successor node
    into the spot of the deleted node, take the former right child of the successor
    node and place it where the successor node used to be.


