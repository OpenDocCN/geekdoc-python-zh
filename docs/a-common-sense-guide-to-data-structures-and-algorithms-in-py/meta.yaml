    \n# Reading\n\nAs you know, a computer can read from an array in O(1) time. But\
    \ now let's figure out the efficiency of reading from a linked list.\n\nIf you\
    \ want to read, say, the value of the third item of a linked list, the computer\
    \ cannot look it up in one step, because it wouldn't immediately know where to\
    \ find it in the computer's memory. After all, each node of a linked list could\
    \ be *anywhere* in memory! All our program knows immediately is the memory address\
    \ of the *first* node of the linked list; it doesn't know offhand where any of\
    \ the other nodes are.\n\nTo read from the third node, then, the computer must\
    \ go through a process. First, it accesses the first node. It then follows the\
    \ first node's link to the second node and then the second node's link to the\
    \ third node.\n\nTo get to any node, then, we always need to start with the first\
    \ node (the only node we initially have access to), and follow the chain of nodes\
    \ until we reach the node we want.\n\nIt turns out, then, that if we were to read\
    \ from the last node in the list, it would take N steps for N nodes in the list.\
    \ Linked lists having a worst-case read of O(N) is a major disadvantage when compared\
    \ with arrays that can read any element in just O(1). But don't fret, as linked\
    \ lists will have their moment to shine, as we'll see soon.\n\n# Code Implementation:\
    \ Linked List Reading\n\nLet's go ahead and add a read method to our LinkedList\
    \ class:\n\n```\ndef read(self, index):\n    current_node = self.first_node\n\
