  md: "# Searching an Ordered Array\n\nIn the previous chapter, I described the process\
    \ for searching for a particular value within a classic array: we check each cell\
    \ one at a time—from left to right—until we find the value we're looking for.\
    \ I noted that this process is referred to as linear search.\n\nLet's see how\
    \ linear search differs between a classic and an ordered array.\n\nSay we have\
    \ a regular array of [17, 3, 75, 202, 80]. If we were to search for the value\
    \ 22—which happens to be nonexistent in this array—we would need to search each\
    \ and every element because the 22 could potentially be anywhere in the array.\
    \ The only time we could stop our search before we reach the array's end is if\
    \ we happen to find the value we're looking for before we reach the end.\n\nWith\
    \ an ordered array, however, we can stop a search early even if the value isn't\
    \ contained within the array. Let's say we're searching for a 22 within an ordered\
    \ array of [3, 17, 75, 80, 202]. We can stop the search as soon as we reach the\
    \ 75, since it's impossible for the 22 to be anywhere to the right of it.\n\n\
    Here's a Python implementation of linear search on an ordered array:\n\n```\n\
    def linear_search(array, search_value):\n    for index, element in enumerate(array):\n\
    \        if element == search_value:\n            return index\n        elif element\
    \ > search_value:\n            break\n    return None\n```\n\nThis method accepts\
    \ two arguments: array is the ordered array we're searching, and search_value\
    \ is the value we're searching for.\n\nHere's how to use this function to find\
    \ the 22 in our example array:\n\n```\nprint(linear_search([3, 17, 75, 80, 202],\
    \ 22))\n```\n\nAs you can see, this linear_search method iterates over every element\
    \ of the array, looking for the search_value. The search stops as soon as the\
    \ element it's iterating over is greater than the search_value, since we know\
    \ that the search_value will not be found further within the array."
