  md: "Next, we identify the successor node using the following code:\n\n```\nsuccessor_node\
    \ = node.right_child\n\nif not successor_node.left_child:\n    node.value = successor_node.value\n\
    \    node.right_child = successor_node.right_child\n    return\n\nwhile successor_node.left_child:\n\
    \    parent_of_successor_node = successor_node\n    successor_node = successor_node.left_child\n\
    ```\n\nHere, we begin at the deleted node's right child, and then move down the\
    \ tree following left children until we can't go any further. That bottom node\
    \ is our successor node. We also keep track of the successor node's parent.\n\n\
    However, in the case that the successor node happens to be the deleted node's\
    \ right child (which occurs when the deleted node's right child has no left children),\
    \ we simply plug the successor node into the spot where the deleted node was.\
    \ If this is the case, this is all we need to do. But if the successor node is\
    \ a left child of its parent, we move on.\n\nNext, we remove the successor node\
    \ from its spot:\n\n```\nif successor_node.right_child:\n    parent_of_successor_node.left_child\
    \ = successor_node.right_child\nelse:\n    parent_of_successor_node.left_child\
    \ = None\n```\n\nOur code deals with two possible cases. The second case (in the\
    \ else clause) is the simpler case, which is when the successor node had no children.\
    \ In that case, we wipe away the successor node by replacing it with None.\n\n\
    In the more complex case, where the successor node has a right child, we place\
    \ that right child in the spot where the successor node used to be.\n\nWe've successfully\
    \ removed the successor node from the tree, but there's one more critical step.\
    \ Remember we didn't initially set out to delete the successor node. Our entire\
    \ goal was to delete the node from higher up in the tree.\n\nTo do that, we plug\
    \ the successor node into the spot of the node we're deleting:\n\n```\nnode.value\
    \ = successor_node.value\n```\n\nNote that we don't plug in the actual successor\
    \ node; instead, we simply use its value to overwrite the value of node, effectively\
    \ deleting node.\n\nAnd that's it! It was a journey, but we did it."
