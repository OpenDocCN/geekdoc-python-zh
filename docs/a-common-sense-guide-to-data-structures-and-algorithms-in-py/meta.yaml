    But let''s take a different scenario. Say our graph represents a family tree,
    which may look as follows:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_366_0.png)


    This family tree shows all the descendants of Great-Grandma Ruby, the proud matriarch
    of a wonderful family. Let''s say we know that Ruth is a great-grandchild of Ruby,
    and we want to find Ruth in the graph.


    Now, here''s the thing. If we used breadth-first search, we''d end up traversing
    all of Ruby''s children and grandchildren before reaching even the first great-grandchild.


    However, if we use depth-first search, we''d move down the graph right away, reaching
    the first great-grandchild in just a few steps. While it''s possible that we''d
    have to traverse the entire graph before finding Ruth, we at least have a shot
    at finding her quickly. With breadth-first search, though, we have no choice but
    to traverse all the non-great-grandchildren before we can start inspecting the
    great-grandchildren.


    The question to always ask, then, is do we want to stay close to the starting
    vertex during our search, or do we specifically want to move far away. Breadth-first
    search is good for staying close, and depth-first search is ideal for moving far
    away quickly.'
