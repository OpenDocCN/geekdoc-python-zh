  md: "The following visualization demonstrates us changing the link of the \"blue\"\
    \ node from \"purple\" to \"green\":\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_249_0.png)\n\
    \nIt's interesting to note that whenever we delete a node from our linked list,\
    \ the node still exists in memory somewhere. We're just removing the node from\
    \ our list by ensuring that no other node from the list links to it. This has\
    \ the *effect* of deleting the node from our list, even if the node still exists\
    \ in memory.\n\n(Different programming languages handle these deleted nodes in\
    \ various ways. Some will automatically detect that they're not being used and\
    \ will \"garbage collect\" them, freeing up memory.)\n\n# Code Implementation:\
    \ Linked List Deletion\n\nHere's what the delete operation might look like in\
    \ our LinkedList class. It's called delete, and we pass in the index we're going\
    \ to delete:\n\n```\ndef delete(self, index):\n    if index == 0:\n        self.first_node\
    \ = self.first_node.next_node\n        return\n\n    current_node = self.first_node\n\
    \    current_index = 0\n\n    while current_index < (index - 1):\n        current_node\
    \ = current_node.next_node\n        current_index += 1\n\n    node_after_deleted_node\
    \ = current_node.next_node.next_node\n    current_node.next_node = node_after_deleted_node\n\
    ```\n\nThis method is pretty similar to the insert method we saw earlier. Let's\
    \ highlight some of the novel points.\n\nThe method first deals with a case in\
    \ which index is 0, meaning we intend to delete the first node of the list. The\
    \ code for this is ridiculously simple:\n\n```\nif index == 0:\n    self.first_node\
    \ = self.first_node.next_node\n    return\n```"
