    \ <= 0:\n        return\n\n    pivot_index = self.partition(left_index, right_index)\n\
    \n    self.quicksort(left_index, pivot_index - 1)\n    self.quicksort(pivot_index\
    \ + 1, right_index)\n```\n\n这里的代码出奇地简洁，但让我们逐行分析。目前，我们将跳过第一行代码，它代表基本情况。让我们直接进入核心的递归部分。\n\
    \n我们首先对 `left_index` 和 `right_index` 之间的元素范围进行分区：\n\n```python\npivot_index =\
    \ self.partition(left_index, right_index)\n```\n\n我们第一次运行快速排序时，会对整个数组进行分区。然而，在后续调用中，这行代码会对\
    \ `left_index` 和 `right_index` 之间的任何元素范围进行分区，这可能是原始数组的一个子部分。\n\n请注意，我们将 `partition`\
    \ 的返回值赋给了一个名为 `pivot_index` 的变量。如果你还记得，这个值在分区方法完成时是 `left_pointer`，它指向枢轴。\n\n\
    然后，我们递归地对枢轴左右两侧的子数组调用快速排序：\n\n```python\nself.quicksort(left_index, pivot_index\
    \ - 1)\nself.quicksort(pivot_index + 1, right_index)\n```\n\n当我们达到基本情况时，递归结束，即当前处理的子数组包含不超过一个元素：\n\
    \n```python\nif right_index - left_index <= 0:\n    return\n```\n\n我们可以使用以下代码来测试我们的快速排序实现：\n\
    \n```python\narray = [0, 5, 2, 1, 6, 3]\nsortable_array = SortableArray(array)\n\
    sortable_array.quicksort(0, len(array) - 1)\nprint(sortable_array.array)\n```\n\
    \n## 快速排序的效率\n\n要弄清楚快速排序的效率，我们首先需要确定*单次*分区的效率。\n\n当我们分解分区的步骤时，我们会注意到分区涉及两种主要类型的步骤：\n\
    \n- *比较*：我们将每个待处理的值与枢轴进行比较。\n- *交换*：在适当的时候，我们交换左右指针所指向的值。\n\n每次分区至少有 N 次比较——也就是说，我们将数组的每个元素与枢轴进行比较。这是事实，因为分区总是让左右指针遍历每个单元格，直到左右指针相遇。\n\
    \n然而，交换的次数将取决于数据的排序方式。单次分区最多可以有 N / 2 次交换，因为即使我们在每个机会都交换值，每次交换也处理两个值。正如你在下图中看到的，我们仅用三次交换就对六个元素进行了分区：\n\
    \n![显示三次交换分区六个元素的图示](img/c0a46c67bb2536aa545ec1bd7065e742_224_0.png)\n\n现在，在大多数情况下，我们并不是每一步都进行交换。对于*随机*排序的数据，我们通常交换大约一半的值。因此，平均而言，我们大约进行\
    \ N / 4 次交换。\n\n所以平均而言，我们进行大约 N 次比较和 N / 4 次交换。那么，我们可以说，对于 N 个数据元素，大约有 1.25N 个步骤。在大\
    \ O 表示法中，我们忽略常数，因此我们说分区在 O(N) 时间内运行。\n\n现在，这是*单次*分区的效率。但快速排序涉及*多次*分区，因此我们需要进行进一步分析来确定快速排序的效率。\n\
    \n### 鸟瞰快速排序\n\n为了更直观地理解这一点，请参阅[第 214 页的图示](link_placeholder)，它从鸟瞰视角描绘了对八个元素数组进行的典型快速排序。特别是，该图显示了每次分区作用于多少个元素。我们省略了数组中的实际数字，因为具体值并不重要。请注意，在图中，活动子数组是未被灰显的单元格组。\n\
    \n![快速排序分区的鸟瞰图](img/c0a46c67bb2536aa545ec1bd7065e742_225_0.png)\n\n我们可以看到我们进行了八次分区，但每次分区发生在不同大小的子数组上。我们对原始的八个元素数组执行了一次分区，但也对大小为\
    \ 4、3 和 2 的子数组执行了分区，另外四次分区是在大小为 1 的数组上执行的。\n\n由于快速排序本质上由这一系列分区组成，而每次分区对于每个子数组的\
    \ N 个元素大约需要 N 个步骤，如果我们把所有子数组的大小加起来，就会得到快速排序所需的总步骤数：\n\n- 8 个元素\n- 3 个元素\n- 1 个元素\n\
    - 1 个元素\n- 4 个元素\n- 2 个元素\n- 1 个元素\n- 1 个元素\n\n总计 = 大约 21 步\n\n我们看到，当原始数组有 8 个元素时，快速排序大约需要\
    \ 21 步。这假设了最佳或平均情况，即每次分区后枢轴大致位于子数组的中间。\n\n对于一个有 16 个元素的数组，快速排序大约需要 64 步；对于一个有\
    \ 32 个元素的数组，快速排序大约需要 160 步。请看下表：\n\n| N | 快速排序步骤（近似值） |\n|---|---|\n| 4 | 8 |\n\
    | 8 | 24 |\n| 16 | 64 |\n| 32 | 160 |\n\n（虽然在我们之前的例子中，大小为 8 的数组的快速排序步骤数是 21，但我在本表中填了\
    \ 24。确切的数字可能因情况而异，24 也是一个合理的近似值。我特意将其设为 24，是为了让接下来的解释更清晰一些。）\n\n## 快速排序的大 O 表示法\n\
    \n我们如何用大 O 表示法来分类快速排序？\n\n如果我们看前面展示的模式，我们会注意到数组中 N 个元素的快速排序步骤数大约是 *N 乘以 log N*，如下表所示：\n\
    \n| N | log N | N * log N | 快速排序步骤（近似值） |\n|---|---|---|---|\n| 4 | 2 | 8 | 8\
    \ |\n| 8 | 3 | 24 | 24 |\n| 16 | 4 | 64 | 64 |\n| 32 | 5 | 160 | 160 |\n\n事实上，这正是表达快速排序效率的方式。它是一个\
    \ *O(N log N)* 的算法。我们发现了一个新的大 O 类别！\n\n[第 216 页的图表](https://example.com)展示了 O(N\
    \ log N) 与其他大 O 类别相比的样子。\n\n现在，快速排序的步骤数恰好与 N * log N 对齐，这并非巧合。如果我们更广泛地思考快速排序，我们就能看到*为什么*会是这样。\n\
    \n每次我们对数组进行分区时，最终都会将其分解为两个子数组。假设枢轴最终位于数组的某个中间位置——这在平均情况下会发生——这两个子数组的大小大致相等。\n\n\
    我们可以将一个数组对半分多少次，直到完全分解到每个子数组大小为 1？对于一个大小为 N 的数组，这将需要 log N 次。请看下图：\n\n![显示对半分过程的图示](img/c0a46c67bb2536aa545ec1bd7065e742_227_0.png)\n\
    \n![显示大小为 8 的数组需要 log N 次对半分的图示](img/c0a46c67bb2536aa545ec1bd7065e742_227_1.png)\n\
    \n如你所见，对于一个大小为 8 的数组，我们需要三次对半分，才能将数组缩减为八个单独的元素。这就是 log N，符合我们将 log N 定义为将某物对半分直到达到\
    \ 1 所需的次数。\n\n所以这就是为什么快速排序需要 N * log N 步。我们有 log N 次对半分，对于每次对半分，我们对所有元素总数为 N 的子数组执行一次分区。（它们加起来是\
    \ N，因为所有子数组都只是原始 N 个元素数组的片段。）\n\n这在前面的图示中得到了说明。例如，在图示的顶部，我们对原始的八个元素数组进行分区，创建了两个大小为\
    \ 4 的子数组。然后我们对两个大小为 4 的子数组都进行分区，这意味着我们再次对八个元素进行分区。\n\n请记住，O(N * log N) 只是一个近似值。实际上，我们首先对原始数组执行了一次额外的\
    \ O(N) 分区。此外，数组并不能整齐地分成两个相等的两半，因为枢轴不属于对半分的部分。\n\n以下是一个更现实的例子，其中我们在每次分区后忽略枢轴：\n\
    \n![显示现实分区情况的图示](img/c0a46c67bb2536aa545ec1bd7065e742_228_0.png)\n\n## 最坏情况下的快速排序\n\
    \n对于我们遇到的许多其他算法，最佳情况是数组已经排序好的。然而，对于快速排序来说，最佳情况是枢轴在分区后总是最终位于子数组的正中间。有趣的是，这通常发生在数组中的值混合得相当好的时候。"
