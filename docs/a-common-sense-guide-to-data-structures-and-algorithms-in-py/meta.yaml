    # Heap Insertion


    To insert a new value into the heap, we perform the following algorithm:


    +   1. We create a node containing the new value and insert it at the next available
    rightmost spot in the bottom level. Thus, this value becomes the heap''s last
    node.

    2. Next, we compare this new node with its parent node.

    3. If the new node is greater than its parent node, we swap the new node with
    the parent node.

    4. We repeat Step 3, effectively moving the new node up through the heap, until
    the new node has a parent whose value is greater than it.


    Let''s see this algorithm in action. Here''s what would happen if we were to insert
    a 40 into the heap.


    Step 1: We add the 40 as the heap''s last node:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_293_1.png)'
  merge: -1
  pgno: 293
- img_proc: true
  md: 'Note that doing the following would have been incorrect:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_294_0.png)


    Placing the 40 as a child of the 12 node makes the tree *incomplete* since we''d
    now have a node to the right of an empty position. For a heap to remain a heap,
    it must always be complete.


    Step 2: We compare the 40 with its parent node, which happens to be the 8. Since
    the 40 is greater than the 8, we swap the two nodes:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_294_1.png)


    Step 3: We compare the 40 with its new parent, the 25. Since the 40 is greater
    than the 25, we swap them:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_294_2.png)'
  merge: -1
