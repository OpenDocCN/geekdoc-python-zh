    This implementation also recursively calls itself for each vertex, but returns\
    \ the `vertex_we_are_searching_for` if it finds the correct vertex.\n\n# Breadth-First\
    \ Search\n\n*Breadth-first search*, often abbreviated BFS, is another way to search\
    \ a graph. Unlike depth-first search, breadth-first search does *not* use recursion.\
    \ Instead, the algorithm revolves around our old friend, the queue. As you'll\
    \ recall, the queue is a FIFO data structure, and whatever goes in first, comes\
    \ out first.\n\nLet's look at the algorithm for breadth-first search. As with\
    \ our walk-through of depth-first search, we're going to focus on graph *traversal*\
    \ using breadth-first search; that is, we're going to visit each vertex from our\
    \ example social network.\n\nHere's the BFS traversal algorithm:\n\n+   1. Start\
    \ at any vertex within the graph. We'll call this the *starting* vertex.\n2. Add\
    \ the starting vertex to the hash table to mark it as having been visited.\n3.\
    \ Add the starting vertex to a queue.\n4. Start a loop that runs while the queue\
    \ isn't empty."
