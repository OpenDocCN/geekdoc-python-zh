    \ ? |\n| Version #2 | ? | ? |\n| Version #3 | ? | ? |\n\n## CHAPTER 20\n\n## Techniques\
    \ for Code Optimization\n\nWe've come a long way. You now have the tools to analyze\
    \ the time and space complexity of algorithms across a wide variety of data structures.\
    \ With these concepts, you're now able to write code that is fast, memory-efficient,\
    \ and beautiful.\n\nIn this final chapter of our journey, I'd like to leave you\
    \ with some additional techniques for optimizing code. Sometimes it's difficult\
    \ to see how an algorithm can be improved. Over the years, I've found the following\
    \ mental strategies help me see how I can make my code more efficient. I hope\
    \ they'll be helpful to you as well.\n\n### Prerequisite: Determine Your Current\
    \ Big O\n\nBefore we get into the optimization techniques, though, it's important\
    \ to stress that there's something you need to do *before* you start optimizing\
    \ your algorithm.\n\nThe prerequisite to optimization is *determining the efficiency\
    \ of your current code*. After all, it's impossible to make an algorithm faster\
    \ if you don't know how fast it is now.\n\nBy now, you have a thorough understanding\
    \ of Big O notation and the various categories of Big O. Once you know what category\
    \ of Big O your algorithm belongs to, you can begin optimizing.\n\nThroughout\
    \ the rest of this chapter, I'll refer to this step of determining your current\
    \ algorithm's Big O as the \"prereq.\"\n\n### Start Here: The Best-Imaginable\
    \ Big O\n\nWhile all the techniques in this chapter are useful, you'll find that\
    \ some come in handy for certain scenarios, while others are effective for other\
    \ scenarios.\n\nThis first technique, however, applies to *all* algorithms and\
    \ should be the first step of your optimization process.\n\nAnd here it is.\n\n\
    Once you've determined the efficiency of your current algorithm (the prereq),\
    \ come up with what you believe to be what I call the \"best-imaginable Big O.\"\
    \ (I've seen others refer to this as the \"best-conceivable runtime\" when applied\
    \ to speed.)\n\nEssentially, the best-imaginable Big O is the absolute best Big\
    \ O you could dream of for the problem at hand. This is the Big O you know is\
    \ absolutely impossible to beat.\n\nFor example, if we were to write a function\
    \ that prints every item from an array, we'd probably say that the best-imaginable\
    \ Big O for this task is O(N). Given that we have to print each of the N items\
    \ in the array, *we have no choice* but to process each of the N items. There's\
    \ no way around this fact, as we need to \"touch\" each item to print it. Because\
    \ of this, O(N) is the best-imaginable Big O we could imagine for this scenario.\n\
    \nWhen optimizing an algorithm, then, we need to determine *two* Big Os. We need\
    \ to know the Big O our algorithm *currently* takes (the prereq), and we need\
    \ to come up with the best-imaginable Big O the task could *possibly* take.\n\n\
    If these two Big Os are not the same, it means we have something to optimize.\
