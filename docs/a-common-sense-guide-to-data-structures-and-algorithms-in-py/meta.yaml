  - '[PAGE 228]


    So this is why Quicksort takes N * log N steps. We have log N halvings, and for
    each halving, we perform a partition on all the subarrays whose elements add up
    to N. (They add up to N because all the subarrays are simply pieces of the original
    array of N elements.)


    This is illustrated in the previous diagram. At the top of the diagram, for example,
    we partition the original array of eight elements, creating two sub-arrays of
    size 4. We then partition both subarrays of size 4, which means that we''re again
    partitioning eight elements.


    Bear in mind that O(N * log N) is just an approximation. In reality, we first
    perform an extra O(N) partition on the original array as well. Additionally, an
    array doesn''t cleanly break into two even halves, since the pivot is not part
    of the halving.


    Here''s what a more realistic example looks like, where we ignore the pivot after
    each partition:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_228_0.png)


    # Quicksort in the Worst-Case Scenario


    For many other algorithms we''ve encountered, the best case was one where the
    array was already sorted. When it comes to Quicksort, however, the best-case scenario
    is one in which the pivot always ends up smack in the middle of the subarray after
    the partition. Interestingly, this generally occurs when the values in the array
    are mixed up pretty well.'
- md: "The worst-case scenario for Quicksort is one in which the pivot always ends\
    \ up on one side of the subarray instead of in the middle. This can happen where\
    \ the array is in perfect ascending or descending order. The visualization for\
    \ this process is shown here:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_229_0.png)\n\
    \nIn this diagram you can see that the pivot always ends up on the left end of\
    \ each subarray.\n\nWhile in this case each partition still involves only one\
    \ swap, we lose out because of the increased number of comparisons. In the first\
    \ example, when the pivot always ended up toward the middle, each partition after\
    \ the first one was conducted on relatively small subarrays (the largest subarray\
    \ had a size of 4). In this example, however, the first five partitions take place\
    \ on subarrays of size 4 or greater. And each of these partitions has as many\
    \ comparisons as there are elements in the subarray.\n\nSo in this worst-case\
    \ scenario, we have partitions of 8 + 7 + 6 + 5 + 4 + 3 + 2 + 1 elements, which\
    \ yields a total of 36 comparisons.\n\nTo put this a little more formulaically,\
    \ we'd say that for N elements, there are N + (N - 1) + (N - 2) + (N - 3) ...\
    \ + 1 steps. We saw in our discussion of [Get All the Products, on page 103](https://example.com),\
    \ that this computes to N² / 2 steps, which for the purposes of Big O is O(N²).\n\
    \nSo in a worst-case scenario, Quicksort has an efficiency of O(N²).\n\n## Quicksort\
    \ vs. Insertion Sort\n\nNow that we've got Quicksort down, let's compare it with\
    \ one of the simpler sorting algorithms, such as Insertion Sort:\n\n| | Best Case\
    \ | Average Case | Worst Case |\n|---|---|---|---|\n| Insertion Sort | O(N) |\
    \ O(N²) | O(N²) |\n| Quicksort | O(N log N) | O(N log N) | O(N²) |\n\nWe can see\
    \ they have identical worst-case scenarios and that Insertion Sort is faster than\
    \ Quicksort in a best-case scenario. However, the reason Quicksort is superior\
    \ to Insertion Sort is because of the average scenario—which, again, is what happens\
    \ most of the time. For average cases, Insertion Sort takes a whopping O(N²),\
    \ while Quicksort is much faster at O(N log N).\n\nBecause of Quicksort's superiority\
    \ in average circumstances, many programming languages use Quicksort under the\
    \ hood of their built-in sorting functions. So it's unlikely you'll be implementing\
    \ Quicksort yourself. However, a very similar algorithm can come in handy for\
    \ practical cases—and it's called Quickselect.\n\n## Quickselect\n\nLet's say\
    \ you have an array in random order, and you don't need to sort it, but you do\
    \ want to know the tenth-lowest value in the array, or the fifth-highest. This\
    \ can be useful if we have a lot of test grades and want to know what the 25th\
    \ percentile is, or if we want to find the median grade.\n\nOne way to solve this\
    \ would be to sort the entire array and then jump to the appropriate index.\n\n\
    However, even were we to use a fast sorting algorithm like Quicksort, this algorithm\
    \ would take at least O(N log N) for average cases. And while that isn't bad,\
    \ we can do even better with a brilliant little algorithm known as Quickselect.\
    \ Like Quicksort, Quickselect relies on partitioning and can be thought of as\
    \ a hybrid of Quicksort and binary search.\n\nAs you've seen earlier in this chapter,\
    \ after a partition, the pivot value ends up in the appropriate spot in the array.\
    \ Quickselect takes advantage of this in the following way:\n\nLet's say we have\
    \ an array of eight values, and we want to find the second-to-lowest value within\
    \ the array.\n\nFirst, we partition the entire array:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_231_0.png)\n\
    \nAfter the partition, the pivot will hopefully end up somewhere toward the middle\
    \ of the array:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_231_1.png)\n\nThis\
    \ pivot is now in its correct spot, and since it's in the fifth cell, we now know\
    \ which value is the fifth-lowest value within the array.\n\nNow, we're looking\
    \ for the second-lowest value, not the fifth-lowest. But we *do* know that the\
    \ second-lowest value is *somewhere to the left* of the pivot. We can now ignore\
    \ everything to the right of the pivot and focus on the left subarray. It's in\
    \ this respect that Quickselect is similar to binary search: we keep dividing\
    \ the array in half and focus on the half in which we know the value we're seeking\
    \ will be found.\n\nNext, we partition the subarray to the left of the pivot:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_231_2.png)\n\nLet's say the new pivot\
    \ of this subarray ends up the third cell:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_231_3.png)\n\
    \nWe now know that the value in the third cell is in its correct spot, meaning\
    \ it's the third-to-lowest value in the array. By definition, then, the second-to-lowest\
    \ value will be somewhere to its left. We can now partition the subarray to the\
    \ left of the third cell:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_232_0.png)\n\
    \nAfter this next partition, the lowest and second-lowest values will end up in\
    \ their correct spots within the array:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_232_1.png)\n\
    \nWe can then grab the value from the second cell and know with confidence that\
    \ it's the second-lowest value in the entire array. One of the beautiful things\
    \ about Quickselect is that we can find the correct value *without having to sort\
    \ the entire array*.\n\nWith Quicksort, each time we halved the array, we needed\
    \ to re-partition every single element again (in their subarray form), giving\
    \ us O(N log N). With Quickselect, on the other hand, each time we cut the array\
    \ in half, we only had to partition the one half we cared about—the half in which\
    \ we know our value is to be found.\n\n## The Efficiency of Quickselect\n\nWhen\
    \ analyzing the efficiency of Quickselect, we'll see that it's O(N) for average\
    \ scenarios. Why is this?\n\nIn our earlier example of an array of eight elements,\
    \ we executed three partitions: one on an array of eight elements, one on a subarray\
    \ of four elements, and one on a subarray of two elements.\n\nRecall that each\
    \ partition takes about N steps for the subarray it's run upon. The total steps,\
    \ then, for the three partitions is 8 + 4 + 2 = 14 steps. So an array of eight\
    \ elements yields roughly 14 steps.\n\nFor an array of 64 elements, we run about\
    \ 64 + 32 + 16 + 8 + 4 + 2 = 126 steps. For 128 elements, we would need about\
    \ 254 steps. And for 256 elements, we would end up with 510 steps.\n\nWe can see\
    \ that we need about 2N steps for N elements in the array.\n(Another way to formulate\
    \ this is to say that for N elements, we would need N + (N/2) + (N/4) + (N/8)\
    \ + ... 2 steps. This always turns out to be roughly 2N steps.)\nSince Big O ignores\
    \ constants, we drop the 2 from the 2N and say that Quickselect has an efficiency\
    \ of O(N).\n\n## Code Implementation: Quickselect\n\nFollowing is an implementation\
    \ of a quickselect method that can be dropped into the SortableArray class described\
    \ earlier. You'll note that it's very similar to the quicksort method:\n\n```python\n\
    def quickselect(self, kth_lowest_value, left_index, right_index):\n    if right_index\
    \ - left_index <= 0:\n        return self.array[left_index]\n\n    pivot_index\
    \ = self.partition(left_index, right_index)\n\n    if kth_lowest_value < pivot_index:\n\
    \        return self.quickselect(kth_lowest_value, left_index, pivot_index - 1)\n\
    \    elif kth_lowest_value > pivot_index:\n        return self.quickselect(kth_lowest_value,\
    \ pivot_index + 1, right_index)\n    else:\n        return self.array[pivot_index]\n\
    ```\n\nThe variable `kth_lowest_value` allows us to choose which value we're searching\
    \ for. We can search for the second-to-lowest value, the fifth-to-lowest value,\
    \ or any other value we'd like.\n\nIf you want to find the second-to-lowest value\
    \ of an unsorted array, you'd run the following code:\n\n```python\narray = [0,\
    \ 50, 20, 10, 60, 30]\nsortable_array = SortableArray(array)\nprint(sortable_array.quickselect(1,\
    \ 0, len(array) - 1))\n```\n\nThe first argument of the quickselect method accepts\
    \ the position you're looking for, starting at index 0. We've put in a 1 to represent\
    \ the second-to-lowest value. The second and third values are the left and right\
    \ indexes of the array, respectively.\n\n## Sorting as a Key to Other Algorithms\n\
    \nAs of this writing, the fastest sorting algorithms we know of have speeds of\
    \ O(N log N). While Quicksort is one of the most popular among them, there are\
    \ many others as well. Mergesort is another well-known O(N log N) sorting algorithm\
    \ and will be covered in Volume 2 of this book."
  mdcn: "快速排序最糟糕的情况是，基准值总是最终落在子数组的一侧，而不是中间。当数组处于完全升序或降序排列时，就可能发生这种情况。此过程的可视化展示如下：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_229_0.png)\n\n在此图中，你可以看到基准值总是最终落在每个子数组的左端。\n\
    \n虽然在这种情况下，每次分区仍然只涉及一次交换，但由于比较次数的增加，我们损失了效率。在第一个例子中，当基准值总是最终落在中间附近时，第一次分区之后的每次分区都是在相对较小的子数组上进行的（最大的子数组大小为4）。然而，在这个例子中，前五次分区是在大小为4或更大的子数组上进行的。而且，每次分区的比较次数都与子数组中的元素数量一样多。\n\
    \n因此，在这种最糟糕的情况下，我们进行了大小为8、7、6、5、4、3、2、1的元素分区，总共产生了36次比较。\n\n用公式化的方式来说，对于N个元素，我们有N\
    \ + (N - 1) + (N - 2) + (N - 3) ... + 1个步骤。我们在讨论[第103页的“获取所有乘积”](https://example.com)时看到，这计算为N²\
    \ / 2个步骤，就大O表示法而言，这是O(N²)。\n\n因此，在最糟糕的情况下，快速排序的效率是O(N²)。\n\n## 快速排序 vs. 插入排序\n\
    \n既然我们已经了解了快速排序，让我们将其与一种更简单的排序算法（如插入排序）进行比较：\n\n| | 最佳情况 | 平均情况 | 最坏情况 |\n|---|---|---|---|\n\
    | 插入排序 | O(N) | O(N²) | O(N²) |\n| 快速排序 | O(N log N) | O(N log N) | O(N²) |\n\n\
    我们可以看到它们具有相同的最坏情况，并且在最佳情况下，插入排序比快速排序更快。然而，快速排序优于插入排序的原因在于平均情况——而这再次是大多数时候发生的情况。对于平均情况，插入排序需要大量的O(N²)，而快速排序则快得多，为O(N\
    \ log N)。\n\n由于快速排序在平均情况下的优势，许多编程语言在其内置排序函数的底层使用了快速排序。因此，你不太可能自己实现快速排序。然而，一个非常相似的算法在实际案例中会派上用场——它被称为快速选择。\n\
    \n## 快速选择\n\n假设你有一个随机顺序的数组，你不需要对其进行排序，但你确实想知道数组中第十个最低的值，或者第五个最高的值。如果我们有很多考试成绩，并且想知道第25百分位数是多少，或者我们想找到中位数成绩，这会很有用。\n\
    \n解决这个问题的一种方法是对整个数组进行排序，然后跳转到相应的索引。\n\n然而，即使我们使用像快速排序这样的快速排序算法，该算法在平均情况下也至少需要O(N\
    \ log N)。虽然这并不差，但我们可以用一个叫做快速选择的巧妙小算法做得更好。与快速排序一样，快速选择依赖于分区，可以看作是快速排序和二分查找的混合体。\n\
    \n正如你在本章前面所看到的，在分区之后，基准值最终会落在数组中的适当位置。快速选择利用这一点的方式如下：\n\n假设我们有一个包含八个值的数组，我们想找到数组中第二低的值。\n\
    \n首先，我们对整个数组进行分区：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_231_0.png)\n\n分区后，基准值有望最终落在数组中间的某个位置：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_231_1.png)\n\n这个基准值现在处于其正确的位置，由于它在第五个单元格中，我们现在知道哪个值是数组中第五低的值。\n\
    \n现在，我们寻找的是第二低的值，而不是第五低的。但我们*确实*知道第二低的值在基准值的*左侧某处*。我们现在可以忽略基准值右侧的所有内容，专注于左侧子数组。正是在这一点上，快速选择类似于二分查找：我们不断将数组分成两半，并专注于我们知道要找的值所在的那一半。\n\
    \n接下来，我们对基准值左侧的子数组进行分区：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_231_2.png)\n\
    \n假设这个子数组的新基准值最终落在第三个单元格：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_231_3.png)\n\
    \n我们现在知道第三个单元格中的值处于其正确的位置，这意味着它是数组中第三低的值。根据定义，第二低的值将在其左侧某处。我们现在可以对第三个单元格左侧的子数组进行分区：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_232_0.png)\n\n经过下一次分区后，最低和第二低的值将最终落在数组中的正确位置：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_232_1.png)\n\n然后我们可以从第二个单元格中获取该值，并确信它是整个数组中第二低的值。快速选择的美妙之处之一在于，我们可以*无需对整个数组进行排序*就能找到正确的值。\n\
    \n使用快速排序时，每次我们将数组减半，都需要重新分区每一个元素（以它们的子数组形式），这给了我们O(N log N)。而使用快速选择，每次我们将数组减半时，我们只需要分区我们关心的那一半——我们知道我们的值所在的那一半。\n\
    \n## 快速选择的效率\n\n在分析快速选择的效率时，我们会看到它在平均情况下是O(N)。为什么是这样？\n\n在我们之前包含八个元素的数组示例中，我们执行了三次分区：一次在包含八个元素的数组上，一次在包含四个元素的子数组上，一次在包含两个元素的子数组上。\n\
    \n回想一下，每次分区大约需要N个步骤来处理它所运行的子数组。因此，三次分区的总步骤是8 + 4 + 2 = 14个步骤。所以一个包含八个元素的数组大约产生14个步骤。\n\
    \n对于一个包含64个元素的数组，我们大约需要64 + 32 + 16 + 8 + 4 + 2 = 126个步骤。对于128个元素，我们将需要大约254个步骤。对于256个元素，我们最终将得到510个步骤。\n\
    \n我们可以看到，对于数组中的N个元素，我们大约需要2N个步骤。\n（另一种表述方式是，对于N个元素，我们需要N + (N/2) + (N/4) + (N/8)\
    \ + ... 2个步骤。这总是大约等于2N个步骤。）\n由于大O表示法忽略常数，我们从2N中去掉2，并说快速选择的效率是O(N)。\n\n## 代码实现：快速选择\n\
    \n以下是快速选择方法的实现，可以插入到前面描述的SortableArray类中。你会注意到它与快速排序方法非常相似：\n\n```python\ndef\
    \ quickselect(self, kth_lowest_value, left_index, right_index):\n    if right_index\
    \ - left_index <= 0:\n        return self.array[left_index]\n\n    pivot_index\
    \ = self.partition(left_index, right_index)\n\n    if kth_lowest_value < pivot_index:\n\
    \        return self.quickselect(kth_lowest_value, left_index, pivot_index - 1)\n\
    \    elif kth_lowest_value > pivot_index:\n        return self.quickselect(kth_lowest_value,\
    \ pivot_index + 1, right_index)\n    else:\n        return self.array[pivot_index]\n\
    ```\n\n变量`kth_lowest_value`允许我们选择要搜索的值。我们可以搜索第二低的值、第五低的值或任何其他我们想要的值。\n\n如果你想找到一个未排序数组的第二低的值，你可以运行以下代码：\n\
    \n```python\narray = [0, 50, 20, 10, 60, 30]\nsortable_array = SortableArray(array)\n\
    print(sortable_array.quickselect(1, 0, len(array) - 1))\n```\n\n快速选择方法的第一个参数接受你要查找的位置，从索引0开始。我们输入了1来表示第二低的值。第二个和第三个值分别是数组的左索引和右索引。\n\
    \n## 排序作为其他算法的关键\n\n截至撰写本文时，我们所知的最快排序算法的速度为O(N log N)。虽然快速排序是其中最受欢迎的算法之一，但还有许多其他算法。归并排序是另一种著名的O(N\
    \ log N)排序算法，将在本书的第2卷中介绍。"
