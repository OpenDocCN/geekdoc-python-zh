- img_proc: true
  md: "```\nunsorted_until_index = len(array) - 1\n```\n\nWe also create a variable\
    \ called sorted that will keep track of whether the array is fully sorted. Of\
    \ course, when our code first runs, it isn't, so we set it to False:\n\n```\n\
    sorted = False\n```\n\nWe begin a while loop that continues to run as long as\
    \ the array is not sorted. Each round of this loop represents a pass-through of\
    \ the array:\n\n```\nwhile not sorted:\n```\n\nNext, we preliminarily establish\
    \ sorted to be True:\n\n```\nsorted = True\n```\n\nThe approach here is that in\
    \ each pass-through, we'll assume the array is sorted until we encounter a swap,\
    \ in which case we'll change the variable back to False. If we get through an\
    \ entire pass-through without having to make any swaps, sorted will remain True,\
    \ and we'll know that the array is completely sorted.\n\nWithin the while loop,\
    \ we begin a for loop in which we point to each pair of values in the array. We\
    \ use the variable i as our first pointer, and it starts from the beginning of\
    \ the array and goes until the index that hasn't yet been sorted:\n\n```\nfor\
    \ i in range(unsorted_until_index):\n```\n\nWithin this loop, we compare each\
    \ pair of adjacent values and swap those values if they're out of order. We also\
    \ change sorted to False if we have to make a swap:\n\n```\nfor i in range(unsorted_until_index):\n\
    \    if array[i] > array[i+1]:\n        array[i], array[i+1] = array[i+1], array[i]\n\
    \        sorted = False\n```\n\nAt the end of each pass-through, we know that\
    \ the value we bubbled up all the way to the right is now in its correct position.\
    \ Because of this, we decrement the unsorted_until_index by 1, since the index\
    \ it was already pointing to is now sorted:\n\n```\nunsorted_until_index -= 1\n\
    ```\n\nThe while loop ends once sorted is True, meaning the array is completely\
    \ sorted. Once this is the case, we return the sorted array:\n\n```\nreturn array\n\
    ```\n\n# The Efficiency of Bubble Sort"
