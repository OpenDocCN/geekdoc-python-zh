    O(1).

    But how do we get there? This is where finding a pattern can help.


    # Generating Examples


    While each problem has a unique pattern, I found a technique for finding patterns
    that helps across *all* problems—and that is to *generate numerous examples*.
    This means we should take a bunch of example inputs, calculate their respective
    outputs, and see if we can detect a pattern.

    Let''s apply this to our case.

    If we map out who wins for coin piles of size 1 through 10, we get this table:


    | Number of Coins | Winner |

    | :--- | :--- |

    | 1 | Them |

    | 2 | You |

    | 3 | You |

    | 4 | Them |

    | 5 | You |

    | 6 | You |

    | 7 | Them |

    | 8 | You |

    | 9 | You |

    | 10 | Them |


    The pattern becomes clear when we lay it out this way. Basically, starting with
    1 coin, every third number gives victory to the opponent. Otherwise, you are the
    winner.

    So if we take the number of coins and subtract 1, each "them" ends up at a number
    that is divisible by 3. At this point, then, we can determine who will win based
    on a single division calculation:'
