  md: '# CHAPTER 14


    # Node-Based Data Structures


    For the next several chapters, we''re going to explore a variety of data structures
    that all build upon a single concept—the *node*. As you''ll see shortly, nodes
    are pieces of data that may be dispersed throughout the computer''s memory. Node-based
    data structures offer new ways to organize and access data that provide a number
    of major performance advantages.


    In this chapter, we''ll explore the linked list, which is the simplest node-based
    data structure and the foundation for future chapters. You''ll discover that linked
    lists seem almost identical to arrays but come with their own set of trade-offs
    in efficiency that can give us a performance boost for certain situations.


    # Linked Lists


    Like an array, a *linked list* is a data structure that represents a list of items.
    While on the surface arrays and linked lists look and act quite similarly, under
    the hood there are big differences.


    As mentioned in [Chapter 1, Why Data Structures Matter, on page 1](https://example.com),
    memory inside a computer can be visualized as a giant set of cells in which bits
    of data are stored. You learned that when creating an array, your code finds a
    contiguous group of empty cells in memory and designates them to store data for
    your application, as [shown on page 228](https://example.com).


    You also saw that the computer has the ability to access any memory address in
    one step and can use that power to also immediately access any index within the
    array. If you wrote code that said, "Look up the value at index 4," your computer
    could locate that cell in a single step. Again, this is because your program knows
    which memory address the array starts at—say, memory address 1000—and therefore
    knows that if it wants to look up index 4, it should simply jump to memory address
    1004.'
