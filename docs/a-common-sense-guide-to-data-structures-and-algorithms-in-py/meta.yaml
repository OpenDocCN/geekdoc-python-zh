    \ any extra data.\n\nWhile the discovery of a pattern helped us discover the precise\
    \ solution, by adopting the greedy mindset, we knew what kind of pattern we were\
    \ looking for in the first place.\n\n## Greedy Stock Predictions\n\nLet's look\
    \ at one more greedy algorithm.\n\nSay we're writing financial software that makes\
    \ stock predictions. The particular algorithm we're working on now looks for a\
    \ positive trend for a given stock.\n\nSpecifically, we're writing a function\
    \ that accepts an array of stock prices and determines whether there are any *three*\
