  md: '# Same Algorithm, Different Scenarios


    As you learned in the previous chapters, linear search isn''t *always* O(N). It''s
    true that if the item we''re looking for is in the final cell of the array, it
    will take N steps to find it. But when the item we''re searching for is found
    in the *first* cell of the array, linear search will find the item in just one
    step. So this case of linear search would be described as O(1). If we were to
    describe the efficiency of linear search in its totality, we''d say that linear
    search is O(1) in a *best-case* scenario and O(N) in a *worst-case* scenario.


    While Big O effectively describes both the best- and worst-case scenarios of a
    given algorithm, Big O notation generally refers to the *worst-case scenario*
    unless specified otherwise. This is why most references will describe linear search
    as being O(N) even though it *can* be O(1) in a best-case scenario.


    This is because a “pessimistic” approach can be a useful tool: knowing exactly
    how inefficient an algorithm can get in a worst-case scenario prepares us for
    the worst and may have a strong impact on our choices.


    # An Algorithm of the Third Kind


    In the previous chapter, you learned that binary search on an ordered array is
    much faster than linear search on the same array. Let''s now look at how to describe
    binary search in terms of Big O notation.


    We can''t describe binary search as being O(1), because the number of steps increases
    as the data increases. It also doesn''t fit into the category of O(N), since the
    number of steps is much fewer than the N data elements. As we have seen, binary
    search takes only seven steps for an array containing 100 elements.


    Binary search, then, seems to fall somewhere *in between* O(1) and O(N). So what
    is it?


    In Big O terms, we describe binary search as having a time complexity of:


    O(log N)


    I pronounce this as “Oh of log N.” This type of algorithm is also known as having
    a time complexity of *log time*.


    Simply put, O(log N) is the Big O way of describing an algorithm that *increases
    one step each time the data is doubled*. As you learned in the previous chapter,
    binary search does just that. You''ll see momentarily *why* this is expressed
    as O(log N), but let''s first summarize what you''ve learned so far.'
  merge: -1
  pgno: 59
- img_proc: true
  md: 'The three types of algorithms you''ve learned about so far can be sorted from
    most efficient to least efficient as follows:


    +   - O(1)

    - O(log N)

    - O(N)


    Let''s look at a graph that compares the three types:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_60_0.png)


    Note how O(log N) curves ever so slightly upward, making it less efficient than
    O(1) but much more efficient than O(N).


    To understand why this algorithm is called O(log N), you need to first understand
    what *logarithms* are. If you''re already familiar with this mathematical concept,
    feel free to skip the next section.


    # Logarithms


    Let''s examine why algorithms such as binary search are described as O(log N).
    What is a log, anyway?


    Log is shorthand for *logarithm*. The first thing to note is that logarithms have
    nothing to do with algorithms, even though the two words look and sound so similar.


    Logarithms are the inverse of *exponents*. Here''s a quick refresher on what exponents
    are:


    2³ is the equivalent of:


    2 * 2 * 2


    This just happens to be 8.'
  merge: -1
