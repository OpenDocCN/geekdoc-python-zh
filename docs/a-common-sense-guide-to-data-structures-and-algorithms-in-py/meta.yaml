    # CHAPTER 4


    # Speeding Up Your Code with Big O


    Big O notation is a great tool for expressing the efficiency of an algorithm.
    We''ve already been able to use it to quantify the difference between binary search
    vs. linear search, as binary search is O(log N)—a much faster algorithm than linear
    search, which is O(N).


    With Big O, you also have the opportunity to compare your algorithm to *general
    algorithms out there in the world*, and you can say to yourself, “Is this a fast
    or slow algorithm as far as algorithms generally go?”


    If you find that Big O labels your algorithm as a slow one, you can now take a
    step back and try to figure out if there''s a way to optimize it by trying to
    get it to fall under a faster category of Big O. This may not always be possible,
    of course, but it''s certainly worth thinking about.


    In this chapter, we''ll write some code to solve a practical problem and then
    measure our algorithm using Big O. We''ll then see if we might be able to modify
    the algorithm to give it a nice efficiency bump. (Spoiler: we will.)


    # Bubble Sort


    Before jumping into our practical problem, though, we need to first look at a
    new category of algorithmic efficiency in the world of Big O. To demonstrate it,
    we''ll get to use one of the classic algorithms of computer-science lore.


    *Sorting algorithms* have been the subject of extensive research in computer science,
    and tens of such algorithms have been developed over the years. They all solve
    the following problem:


    > *Given an array of unsorted values, how can we sort them so that they end up
    in ascending order?*'
  - '[PAGE 67]


    In this chapter and those following, we''re going to encounter a number of these
    sorting algorithms. Some of the first ones you''ll learn about are known as *simple
    sorts*, in that they are easy to understand but are not as efficient as some of
    the faster sorting algorithms out there.


    Bubble Sort is a basic sorting algorithm and follows these steps:


    +   1. Point to two consecutive values in the array. (Initially, we start by pointing
    to the array''s first two values.) Compare the first item with the second one:


    2. If the two items are out of order (in other words, the left value is greater
    than the right value), swap them (if they already happen to be in the correct
    order, do nothing for this step):


    3. Move the "pointers" one cell to the right:


    4. Repeat Steps 1 through 3 until we reach the end of the array, or if we reach
    the values that have already been sorted. (This will make more sense in the walk-through
    that follows.) At this point, we''ve completed our first *pass-through* of the
    array—we "passed through" the array by pointing to each of its values until we
    reached the end.


    5. We then move the two pointers back to the first two values of the array and
    execute another pass-through of the array by running Steps 1 through 4 again.
    We keep on executing these pass-throughs until we have a pass-through in which
    we did not perform any swaps. When this happens, it means our array is fully sorted
    and our work is done.


