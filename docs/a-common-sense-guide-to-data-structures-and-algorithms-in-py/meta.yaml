    \ that dream into reality.\n\n## The Two Sum Problem\n\nLet's look at another\
    \ scenario in which we can benefit from magical lookups. This is one my favorite\
    \ optimization examples.\n\nThe *two sum problem* is a well-known coding exercise.\
