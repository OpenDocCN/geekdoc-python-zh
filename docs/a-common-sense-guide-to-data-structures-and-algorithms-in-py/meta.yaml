- img_proc: true
  md: "string. Each time we find a match, we delete a character from the second string.\
    \ The idea here is that if every character from the first string is also present\
    \ in the second string, we'd end up deleting every character from the second string\
    \ by the time we complete our outer loop.\n\nSo, if by the time we finish looping,\
    \ characters still remain from the second string, it means the strings aren't\
    \ anagrams. Also, if we're still iterating over the first word, but we've already\
    \ deleted the entire second string, it also means the strings aren't anagrams.\
    \ But if we make it to the end of the loop and the second string has been completely\
    \ deleted, we can conclude that the two strings are indeed anagrams.\n\nHere's\
    \ a Python implementation of this:\n\n```\ndef are_anagrams(first_string, second_string):\n\
    \    second_string_array = list(second_string)\n\n    for i in range(len(first_string)):\n\
    \        if len(second_string_array) == 0:\n            return False\n\n     \
    \   for j in range(len(second_string_array)):\n            if first_string[i]\
    \ == second_string_array[j]:\n                del second_string_array[j]\n   \
    \             break\n\n    return len(second_string_array) == 0\n```\n\nNow, it\
    \ just so happens that deleting items from an array while you're looping through\
    \ it can be error prone; if you don't do it right, it's like sawing off the tree\
    \ branch you're sitting on. But even though we've handled that correctly, our\
    \ algorithm runs at O(N * M). This is way faster than O(N!) but much slower than\
    \ the O(N + M) we're shooting for.\n\nAn even faster approach would be to sort\
    \ the two strings. If after sorting the two strings they're exactly the same,\
    \ it means they're anagrams; otherwise, they're not.\n\nThis approach will take\
    \ O(N log N) for each string using a fast sorting algorithm like Quicksort. Since\
    \ we may have two strings of different sizes, this adds up to be O(N log N + M\
    \ log M). This is a nice improvement over O(N * M), but let's not stop now—we're\
    \ aiming for O(N + M), remember?\n\nThis is where using an alternative data structure\
    \ can be extremely helpful. We're dealing with strings, but let's imagine that\
    \ we'd store the string data in other types of data structures.\n\nWe *could*\
    \ store a string as an array of single characters. But this doesn't help us."
