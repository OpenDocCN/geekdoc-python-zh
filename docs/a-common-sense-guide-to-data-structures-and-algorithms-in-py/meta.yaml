  md: "Finally, if we do break out of the loop, it's because we reached the desired\
    \ index. We can then return the node's value with the following:\n\n```\nreturn\
    \ current_node.data\n```\n\n# Searching\n\nAs you know, searching means looking\
    \ for a value within the list and returning its index. We've seen that linear\
    \ search on an array has a speed of O(N), since the computer needs to inspect\
    \ each value one at a time.\n\nLinked lists also have a search speed of O(N).\
    \ To search for a value, we need to go through a similar process to the one we\
    \ did with reading; that is, we begin with the head and follow the links of each\
    \ node to the next one. Along the way, we inspect each value until we find what\
    \ we're looking for.\n\n# Code Implementation: Linked List Search\n\nHere's how\
    \ we can implement the search operation in Python. We'll call this method search\
    \ and pass in the value we're searching for:\n\n```\ndef search(self, value):\n\
    \    current_node = self.first_node\n    current_index = 0\n\n    while True:\n\
    \        if current_node.data == value:\n            return current_index\n\n\
    \        current_node = current_node.next_node\n\n        if not current_node:\n\
    \            break\n\n        current_index += 1\n\n    return None\n```\n\nWe\
    \ can then search for any value within the list, like so:\n\n```\nlist.search(\"\
    time\")\n```\n\nUsing this, we would get back the index of where \"time\" is located\
    \ within the list. In our example above, this would be 3.\n\nAs you can see, the\
    \ mechanics of searching are similar to reading. The main difference is that the\
    \ loop doesn't stop at a particular index but runs until we either find the value\
    \ or reach the end of the list."
