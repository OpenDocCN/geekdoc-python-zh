    \n步骤 4：我们将 3 与到目前为止的最低值（即 1）进行比较。我们已经到达数组末尾，并确定 1 是整个数组中的最低值：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_83_3.png)\n\
