    \ built-in data structure can be an abstract data type. Even if a programming\
    \ language does implement its own Stack class, it doesn't change the fact that\
    \ the stack data structure is still a concept that allows for various data structures\
    \ to be used under the hood.\n\n## Stacks in Action\n\nAlthough a stack isn't\
    \ typically used to store data on a long-term basis, it can be a great tool to\
    \ handle temporary data as part of various algorithms. Let's look at an example.\n\
    \nLet's create the beginnings of a JavaScript linter—that is, a program that inspects\
