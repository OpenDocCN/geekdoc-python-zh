    \ these formulas always work, we're able to treat our array as a tree.\n\nLet's\
    \ add these two methods to our `Heap` class:\n\n```\ndef left_child_index(self,\
    \ index):\n    return (index * 2) + 1\n\ndef right_child_index(self, index):\n\
