    \ simply arrays with restrictions. Yet these restrictions are exactly what make\
    \ them so elegant.\n\nMore specifically, stacks and queues are elegant tools for\
    \ handling temporary data. From operating system architecture to printing jobs\
    \ to traversing data, stacks and queues serve as temporary containers that can\
    \ be used to form beautiful algorithms.\n\nThink of temporary data like the food\
    \ orders in a diner. What each customer orders is important until the meal is\
