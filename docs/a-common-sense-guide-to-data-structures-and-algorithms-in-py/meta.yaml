  md: "Here's the code for this:\n\n```\ndef sort_temperatures(array):\n    hash_table\
    \ = {}\n    for temperature in array:\n        if temperature in hash_table:\n\
    \            hash_table[temperature] += 1\n        else:\n            hash_table[temperature]\
    \ = 1\n    sorted_temperatures = []\n    temperature = 95\n    while temperature\
    \ <= 105:\n        if temperature in hash_table:\n            for i in range(hash_table[temperature]):\n\
    \                sorted_temperatures.append(temperature)\n        temperature\
    \ += 1\n    return sorted_temperatures\n```\n\nLet's now analyze the efficiency\
    \ of this algorithm. We take N steps to create the hash table. We then run a loop\
    \ eleven times for all possible temperatures from 95 up to 105.\n\nIn each round\
    \ of this loop, we run a nested loop to populate the sorted_temperatures with\
    \ the temperatures. However, this inner loop will *never end up running more times\
    \ than the N temperatures* from the input array. This is because the inner loop\
    \ only runs one time for each temperature in the original array.\n\nThus, we have\
    \ N steps to create the hash table, eleven steps for the outer loop, and N steps\
    \ for the inner loop. This is 2N + 11, which is reduced to a beautiful O(N).\n\
    \nThis algorithm is a classic sorting algorithm called *counting sort*. It's useful\
    \ any time we're dealing with a relatively small range of possible input values,\
