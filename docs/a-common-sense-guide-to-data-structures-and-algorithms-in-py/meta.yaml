  md: "# Weighted Graphs in Code\n\nWe need to make a slight modification to our code\
    \ if we want to add weights to our graph. One way to do this is to use a hash\
    \ table to represent the adjacent vertices rather than using an array:\n\n```\n\
    class WeightedGraphVertex:\n    def __init__(self, value):\n        self.value\
    \ = value\n        self.adjacent_vertices = {}\n\n    def add_adjacent_vertex(self,\
    \ vertex, weight):\n        self.adjacent_vertices[vertex] = weight\n```\n\nAs\
    \ you can see, self.adjacent_vertices is now a hash table instead of an array.\
    \ The hash table will contain key-value pairs, where in each pair, the adjacent\
    \ vertex is the key and the weight (of the edge from this vertex to the adjacent\
    \ vertex) is the value.\n\nWhen we use the add_adjacent_vertex method to add an\
    \ adjacent vertex, we now pass in both the adjacent vertex as well as the weight.\n\
    \nSince we'll continue to deal with the example of a graph that depicts flight\
    \ fares to and from various cities, we'll create a special class called City.\
    \ This is the same implementation as the preceding WeightedGraphVertex but uses\
    \ class and variable names appropriate to our use case:\n\n```\nclass City:\n\
    \    def __init__(self, name):\n        self.name = name\n        self.routes\
    \ = {}\n\n    def add_route(self, city, price):\n        self.routes[city] = price\n\
    ```\n\nSo if we want to create the Dallas–Toronto flight price graph from earlier,\
    \ we can run the following code:\n\n```\ndallas = City(\"Dallas\")\ntoronto =\
    \ City(\"Toronto\")\n\ndallas.add_route(toronto, 138)\ntoronto.add_route(dallas,\
    \ 216)\n```\n\n# The Shortest Path Problem\n\nWeighted graphs can be very useful\
    \ in modeling all sorts of datasets, and they also come with some powerful algorithms\
    \ that help us make the most out of that data."
  merge: -1
