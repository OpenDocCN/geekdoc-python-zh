  mdcn: "## 第13章\n\n以下是[第224页“练习”](https://example.com)部分中习题的解答。\n\n1.  如果我们对数字进行排序，那么最大的三个数将位于数组末尾，我们只需将它们相乘即可。排序操作的时间复杂度为\
