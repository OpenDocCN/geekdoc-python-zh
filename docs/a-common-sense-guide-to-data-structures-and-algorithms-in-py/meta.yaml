  - '[PAGE 289]


    With O(1) deletions, our priority queue is in good shape so far. But what about
    insertions?


    You learned that inserting into an ordered array is O(N), since we have to inspect
    up to all N elements of the array to determine where our new data should go. (And
    even if we find the correct spot early, we need to then shift all the remaining
    data over to the right.)


    Our array-based priority queue, then, has deletions that are O(1) and insertions
    that are O(N). If we expect there to be many items in our priority queue, the
    O(N) insertions may cause some real unwanted drag in our application.


    Because of this, computer scientists discovered another data structure that serves
    as a more efficient foundation for the priority queue. This data structure is
    the heap.


    # Heaps


    Heaps are of several different types, but we''re going to focus on the *binary
    heap*.


    The binary heap is a specific kind of binary tree. As a reminder, a binary tree
    is a tree where each node has a maximum of two child nodes. (The binary *search*
    tree from the last chapter was one specific type of binary tree.)


    Now, even binary heaps come in two flavors: the max-heap and the min-heap. We''re
    *going* to work with the max-heap for now, but as you''ll see later, the difference
    between the two is trivial.


    Going forward, I''m going to refer to this data structure simply as a heap, even
    though we''re specifically working with a binary max-heap.


    The *heap* is a binary tree that maintains the following conditions:


    +   - The value of each node must be greater than each of its descendant nodes.
    This rule is known as the *heap condition*.

    - The tree must be *complete*. (I''ll explain the meaning of this shortly.)


    Let''s break down both of these conditions, starting with the heap condition.


    # The Heap Condition


    The *heap condition* says that each node''s value must be greater than each and
    every one of its descendants.


    For example, the following tree meets the heap condition since each node is greater
    than any of its descendants, as shown in the [diagram on page 280](diagram on
    page 280).'
  - '[PAGE 290]


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_290_0.png)


    In this example, the root node of 100 has no descendant that is greater than it.
    Similarly, the 88 is greater than both of its children, and so is the 25.


    The following tree isn''t a valid heap, because it doesn''t meet the heap condition:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_290_1.png)


    As you can see, the 92 is greater than its parent of 88. This violates the heap
    condition.


    Note how the heap is structured very differently than the binary search tree.
    In a binary search tree, each node''s right child is greater than it. In a heap,
    however, a node *never* has any descendant that is greater than it. As they say,
    “A binary search tree doth not a heap make.” (Or something like that.)


    We can also construct a heap that has the opposite heap condition, which is each
    node must contain a *smaller* value than any of its descendants. Such a heap is
    known as the min-heap, which I mentioned earlier. We''re going to continue to
    focus on the max-heap, where each node must be *greater* than all of its descendants.
    Ultimately, whether a heap is a max-heap or a min-heap is trivial, as everything
    else about both heaps is identical; they only have reversed heap conditions. Otherwise,
    the fundamental idea is the same.


    # Complete Trees


    Now, let''s get to the second rule of heaps—that the tree needs to be complete.


    A *complete tree* is a tree that is completely filled with nodes; no nodes are
    missing. So if you read each level of the tree from left to right, all of the
    nodes are there. However, the bottom row *can* have empty positions, as long as
    there'
