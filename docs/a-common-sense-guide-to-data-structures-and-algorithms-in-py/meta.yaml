    \ should have a complexity of O(N). (If your programming language has a built-in\
    \ way of doing this, don't use it. The idea is to build the algorithm yourself.)\n\
    2.  Write a function that accepts an array of strings and returns the first duplicate\
    \ value it finds. For example, if the array is [\"a\", \"b\", \"c\", \"d\", \"\
    c\", \"e\", \"f\"], the function should return \"c\", since it's duplicated within\
    \ the array. (You can assume that there's one pair of duplicates within the array.)\
    \ Make sure the function has an efficiency of O(N).\n3.  Write a function that\
    \ accepts a string that contains all the letters of the alphabet except one and\
