    \ has a left child. If the node doesn't have a left child, we make the value into\
    \ the left child, since that's exactly where the value belongs:\n\n```\nif not\
    \ node.left_child:\n    node.left_child = tree_node.TreeNode(value)\n```\n\nThis\
    \ is the base case, since we don't need to make any recursive calls.\n\nHowever,\
    \ if the node already has a left child, we can't place the value there. Instead,\
    \ we recursively call insert on the left child so that we continue to search for\
    \ the spot in which we'll place the value:\n\n```\nelse:\n    insert(value, node.left_child)\n\
    ```\n\nEventually, we'll hit a descendant node that doesn't have its own child,\
    \ and that's where the value is going to go.\n\nThe rest of the function is the\
    \ exact inverse; it handles cases where the value is greater than the current\
    \ node.\n\n# The Order of Insertion\n\nIt's important to note that only when creating\
    \ a tree out of randomly sorted data do trees usually wind up being well-balanced.\
    \ However, if we insert *sorted* data into a tree, it can become imbalanced and\
    \ less efficient. For example, if we were to insert the following data in this\
    \ order—1, 2, 3, 4, 5—we'd end up with a tree that looks like this:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_269_0.png)"
  - '[PAGE 270]


    This tree is completely linear, so searching for the 5 within this tree would
    take O(N).


    However, if we inserted the same data in the following order—3, 2, 4, 1, 5—the
    tree would be evenly balanced:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_270_0.png)


    Only with a balanced tree does search take O(log N).


    Because of this, if you ever want to convert an ordered array into a binary search
    tree, you''d want to first randomize the order of the data.


    It emerges that in a worst-case scenario, when a tree is completely *imbalanced*,
    search is O(N). In a best-case scenario, when it is perfectly balanced, search
    is O(log N). In the typical scenario, in which data is inserted in random order,
    a tree will be pretty well balanced and search will take about O(log N).


    # Deletion


    Deletion is the least straightforward operation within a binary search tree and
    requires some careful maneuvering.


    Let''s say we want to delete the 4 from this binary search tree:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_270_1.png)


    First, we perform a search to find the 4. We won''t visualize this search again,
    since you''ve already got that down.'
  - '[PAGE 271]


    Once we find the 4, we can delete it in one step:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_271_0.png)


    Well, that was simple. But let''s see what happens when we try to delete the 10:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_271_1.png)


    We end up with an 11 that isn''t connected to the tree anymore. And we can''t
    have that, because we''d lose the 11 forever.


    However, to solve this problem, we can plug the 11 into where the 10 used to be:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_271_2.png)


    So far, our deletion algorithm follows these rules:


    +   - If the node being deleted has no children, simply delete it.

    - If the node being deleted has one child, delete the node and plug the child
    into the spot where the deleted node was.'
  - '[PAGE 272]


    # Deleting a Node with Two Children


    Deleting a node that has two children is the most complex scenario. Let''s say
    we want to delete the 56 in this tree:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_272_0.png)


    What are we going to do with its former children, 52 and 61? We can''t move *both*
    of them to where the 56 was. This is where the next rule of the deletion algorithm
    comes into play:


    +   - When deleting a node with two children, replace the deleted node with the
    *successor* node. The successor node is the child node whose value is the *least
    of all values that are greater than the deleted node*.


    That was a tricky sentence. To put it in other words: if we were to put the deleted
    node and all of its descendants in ascending order, the successor node would be
    the next number after the one we just deleted.


    In this case, it''s easy to figure out which node is the successor since the deleted
    node had only two descendants. If we put the numbers 52-56-61 in ascending order,
    the next number after 56 is 61.


    Once we find the successor node, we plug it into where the deleted node was. So
    we replace the 56 with the 61:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_272_1.png)'
