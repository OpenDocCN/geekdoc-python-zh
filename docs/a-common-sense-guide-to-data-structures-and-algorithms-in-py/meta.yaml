    \      print_subdirectories(path)\n```\n\nHere as well, the last line of code\
    \ is `print_subdirectories(path)`, which is a simple call to the recursive function,\
    \ triggering it again.\n\n## Recursive Trick: Passing Extra Parameters\n\nLet's\
    \ try our hand at another problem of the “repeatedly execute” category. We're\
    \ going to write an algorithm that takes an array of numbers and doubles each\
