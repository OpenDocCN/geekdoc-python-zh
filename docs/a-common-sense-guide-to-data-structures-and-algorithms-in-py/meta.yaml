    \n与此形成对比的是选择排序。选择排序在*所有*情况下——从最坏到平均再到最好情况——都需要 N² / 2 步。这是因为选择排序没有任何机制可以在任何时候提前结束一次遍历。无论什么情况，每次遍历都会比较所选索引右侧的每个值。\n\
