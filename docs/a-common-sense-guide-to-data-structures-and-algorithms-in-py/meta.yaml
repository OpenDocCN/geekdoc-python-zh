  - "[PAGE 243]\n\nFinally, if we do break out of the loop, it's because we reached\
    \ the desired index. We can then return the node's value with the following:\n\
    \n```\nreturn current_node.data\n```\n\n# Searching\n\nAs you know, searching\
    \ means looking for a value within the list and returning its index. We've seen\
    \ that linear search on an array has a speed of O(N), since the computer needs\
    \ to inspect each value one at a time.\n\nLinked lists also have a search speed\
    \ of O(N). To search for a value, we need to go through a similar process to the\
    \ one we did with reading; that is, we begin with the head and follow the links\
    \ of each node to the next one. Along the way, we inspect each value until we\
