- md: '# Preface


    Data structures and algorithms are more than abstract concepts. Mastering them
    enables you to write code that is *efficient*, leading to software that runs faster
    and consumes less memory. This is a big deal for today''s software applications,
    which exist on increasingly mobile platforms and handle increasingly greater amounts
    of data.


    The problem with most resources on these subjects, though, is that they are...well...obtuse.
    Most texts go heavy on the math jargon, and if you''re not a mathematician, it
    can be difficult to grasp what on earth is going on. Even books that claim to
    make algorithms “easy” seem to assume that the reader has an advanced math degree.
    Because of this, too many people shy away from these concepts feeling that they''re
    not “smart” enough to understand them.


    The truth, though, is that everything about data structures and algorithms boils
    down to common sense. Mathematical notation itself is simply a particular language,
    and everything in math can also be explained with common-sense terminology. In
    this book, I use that common-sense language (plus a lot of diagrams!) to explain
    these concepts in simple and, dare I say, enjoyable ways.


    Once you understand these concepts, you''ll be equipped to write code that is
    efficient, fast, and elegant. You''ll be able to weigh the pros and cons of various
    code alternatives and be able to make educated decisions as to which code is best
    for the given situation.


    In this book, I go out of my way to make these concepts real and practical with
    ideas that you can make use of *today*. Sure, you''ll learn some really cool computer
    science along the way. But this book is about taking that seemingly abstract stuff
    and making it directly practical. You''ll be writing better code and faster software
    by the time you''re done reading this book.


    # Who Is This Book For?


    This book is ideal for several audiences:


    - You''re a computer science student who wants a text that explains data structures
    and algorithms in plain English. This book can serve as a supplement to whatever
    “classic” textbook you happen to be using.

    - You''re a beginning developer who knows basic programming but wants to learn
    the fundamentals of computer science to write better code and increase your programming
    knowledge and skills.

    - You''re a self-taught developer who has never studied formal computer science
    (or a developer who did but forgot everything!) and wants to leverage the power
    of data structures and algorithms to write more scalable and elegant code.


    Whoever you may be, I tried to write this book so that it can be accessed and
    enjoyed by people of all skill levels.


    # The Python Edition


    Pythonistas, rejoice! All the code in this book is written in Python. The original
    edition of this book, *A Common-Sense Guide to Data Structures and Algorithms*
    (the second edition of which was published in 2020), was language-agnostic; it
    was written using multiple programming languages. The idea behind this was that
    we didn''t want to imply that the book would only be helpful for one language,
    given that data structures and algorithms are concepts that apply across all of
    computing in general.


    Over the years, I received feedback from readers who expressed that they would
    love to see language-specific editions of the book. After all, if you''re working
    with one particular programming language, wouldn''t it be nice to have a book
    in which all of the code is in that language?


    Accordingly, I set out to create new single-language versions of *A Common-Sense
    Guide to Data Structures and Algorithms*. The first of these is the Python version
    and is what you''re reading now! And because there''s so much to say about data
    structures and algorithms, this is the first volume in a progression of books.
    In this volume, I lay the foundation for these concepts and cover the most common
    data structures and algorithms. In the next volume, I''ll build upon this knowledge
    to level up further with more advanced ideas and techniques.


    # A Note About the Code


    I strived to follow PEP 8 standards (for the most part) and write the code in
    such a way so that it runs equivalently in both Python Version 2 and Python Version
    3. You can now enjoy reading the code samples in your language of choice.


    That being said, I still want to emphasize that the concepts in this book apply
    to virtually all coding languages, and I expect that some people not as familiar
    with Python will be reading this book. Because of this, sometimes I have avoided
    certain Python idioms where I thought that this would utterly confuse people coming
    from other languages. It’s a tricky balance to keep the code Pythonic while also
    being welcoming to non-Python coders, but I hope that I’ve maintained an equilibrium
    that satisfies most readers.


    Virtually all the code in this book can be downloaded online from the book’s web
    page.¹ This code repository contains automated tests too! I encourage you to check
    that out since the tests don’t appear in the actual book.


    You’ll find some longer code snippets under the headings that read “Code Implementation.”
    I certainly encourage you to study these code samples, but you don’t necessarily
    have to understand every last line to proceed to the next section of the book.
    If these long pieces of code are bogging you down, just skim (or skip) them for
    now.


    Finally, it’s important to note that the code in this book is not “production
    ready.” My greatest focus has been to clarify the concept at hand, and while I
    did also try to make the code generally complete, I have not accounted for every
    edge case. There’s certainly room for you to optimize the code further—so feel
    free to go crazy with that.


    # What’s in This Book?


    As you may have guessed, this book talks quite a bit about data structures and
    algorithms. More specifically, the book is laid out as follows:


    In *Why Data Structures Matter* and *Why Algorithms Matter*, I explain what data
    structures and algorithms are and explore the concept of time complexity—which
    is used to determine how fast an algorithm is. In the process, I also talk a great
    deal about arrays, sets, and binary search.


    In *O Yes! Big O Notation*, I unveil Big O notation and explain it in terms that
    are easy to understand. We use this notation throughout the book, so this chapter
    is pretty important.


    In *Speeding Up Your Code with Big O*, *Optimizing Code With and Without Big O*,
    and *Optimizing for Optimistic Scenarios*, we delve further into Big O notation
    and use it to make our day-to-day code faster. Along the way, I cover various
    sorting algorithms, including Bubble Sort, Selection Sort, and Insertion Sort.


    In *Big O in Everyday Code*, you apply all that you learned about Big O notation
    and analyze the efficiency of code from the real world.


    In *Blazing Fast Lookup with Hash Tables* and *Crafting Elegant Code*, I discuss
    a few additional data structures, including hash tables, stacks, and queues. I
    show how they impact the speed and elegance of our code and how we can use them
    to solve real-world problems.


    *Recursively Recurse with Recursion* introduces recursion, an anchor concept in
    the world of computer science. We break it down in this chapter and see how it
    can be a great tool for certain situations. *Learning to Write in Recursive* teaches
    you how to write recursive code, which can be confusing if you''re not familiar
    with it.


    *Dynamic Programming* shows you how to optimize recursive code and prevent it
    from spiraling out of control. And *Recursive Algorithms for Speed* shows you
    how to use recursion as the foundation for turbo-fast algorithms like Quicksort
    and Quickselect, and then it takes your algorithm-development skills up a few
    notches.


    The following chapters, *Node-Based Data Structures*, *Speeding Up All the Things*,
    *Keeping Your Priorities Straight with Heaps*, *It Doesn''t Hurt to Trie*, and
    *Connecting Everything with Graphs*, explore node-based data structures including
    the linked list, the binary tree, the heap, the trie, and the graph and show how
    each is ideal for various applications.


    *Dealing with Space Constraints* explores space complexity, which is important
    when programming for devices with relatively small amounts of disk space or when
    dealing with big data.


    The final chapter, *Techniques for Code Optimization*, walks you through various
    practical techniques for optimizing the efficiency of code and gives you new ideas
    for improving the code you write every day.


    ¹ https://pragprog.com/titles/jwpython'
  mdcn: '# 前言


    数据结构和算法不仅仅是抽象概念。掌握它们能让你编写出*高效*的代码，从而开发出运行更快、内存消耗更少的软件。这对于当今的软件应用至关重要，因为它们越来越多地运行在移动平台上，并处理着日益庞大的数据量。


    然而，大多数关于这些主题的资源都存在一个问题，那就是……嗯……过于晦涩。大多数教材充斥着大量数学术语，如果你不是数学家，可能很难理解到底在讲什么。即使是那些声称能让算法变得“简单”的书籍，似乎也默认读者拥有高等数学学位。正因如此，许多人对这些概念敬而远之，觉得自己不够“聪明”去理解它们。


    但事实是，数据结构和算法的一切都归结于常识。数学符号本身只是一种特定的语言，数学中的一切都可以用常识性术语来解释。在本书中，我将使用这种常识性语言（外加大量图表！）以简单、甚至可以说有趣的方式来解释这些概念。


    一旦你理解了这些概念，你就能编写出高效、快速且优雅的代码。你将能够权衡各种代码方案的利弊，并能根据具体情况做出明智的判断，选择最适合的代码。


    在本书中，我竭尽全力让这些概念变得真实而实用，提供一些你*今天*就能用上的想法。当然，在这个过程中你会学到一些非常酷的计算机科学知识。但本书的重点在于将那些看似抽象的东西变得直接实用。读完本书后，你将能编写出更好的代码和更快的软件。


    # 本书适合谁？


    本书非常适合以下几类读者：


    - 你是计算机科学专业的学生，希望有一本用通俗易懂的英语解释数据结构和算法的教材。本书可以作为你正在使用的任何“经典”教材的补充。

    - 你是初级开发者，了解基本编程，但想学习计算机科学的基础知识，以编写更好的代码并提升你的编程知识和技能。

    - 你是自学成才的开发者，从未系统学习过计算机科学（或者学过但全忘了！），并希望利用数据结构和算法的力量来编写更具扩展性和优雅性的代码。


    无论你是谁，我写这本书时都力求让所有技能水平的人都能轻松阅读并乐在其中。


    # Python 版


    Python 开发者们，欢呼吧！本书中的所有代码都使用 Python 编写。本书的原版，*《数据结构与算法：基于常识的指南》*（第二版于 2020 年出版），是语言无关的；它使用了多种编程语言编写。这样做的初衷是，我们不想暗示这本书只对一种语言有帮助，因为数据结构和算法是适用于整个计算领域的通用概念。


    多年来，我收到了读者的反馈，他们表示希望看到针对特定语言的版本。毕竟，如果你正在使用一种特定的编程语言，有一本所有代码都使用该语言的书岂不是更好？


    因此，我着手为*《数据结构与算法：基于常识的指南》*创建新的单语言版本。第一个版本就是 Python 版，也就是你现在正在阅读的这本！由于数据结构和算法的内容非常丰富，这是一系列书籍中的第一卷。在本卷中，我为这些概念奠定了基础，并涵盖了最常见的数据结构和算法。在下一卷中，我将在此基础上，通过更高级的概念和技术进一步提升。


    # 关于代码的说明


    我努力（在大多数情况下）遵循 PEP 8 标准编写代码，并使其在 Python 2 和 Python 3 中都能等效运行。你现在可以尽情阅读你选择的语言版本的代码示例了。


    话虽如此，我仍然想强调，本书中的概念几乎适用于所有编程语言，我预计一些不太熟悉 Python 的读者也会阅读本书。因此，有时我避免使用某些 Python 特有的惯用写法，因为我觉得这可能会让来自其他语言的读者感到困惑。在保持代码
    Pythonic 风格的同时，又要让非 Python 程序员感到友好，这是一个微妙的平衡，但我希望我达到了一个让大多数读者都满意的平衡点。


    本书中几乎所有的代码都可以从本书的网页上在线下载。¹ 这个代码仓库还包含自动化测试！我鼓励你去看看，因为这些测试并未出现在实际的书中。


    你会在标题为“代码实现”的部分找到一些较长的代码片段。我当然鼓励你研究这些代码示例，但你不一定需要理解每一行才能继续阅读本书的下一节。如果这些长代码让你感到吃力，现在可以先浏览（或跳过）它们。


    最后，需要指出的是，本书中的代码并非“生产就绪”。我最大的重点是阐明当前的概念，虽然我也努力让代码尽可能完整，但我并未考虑所有边缘情况。你当然还有进一步优化代码的空间——所以请随意发挥吧。


    # 本书内容


    你可能已经猜到，本书将大量讨论数据结构和算法。更具体地说，本书的结构如下：


    在*《为什么数据结构很重要》*和*《为什么算法很重要》*中，我解释了什么是数据结构和算法，并探讨了时间复杂度的概念——用于衡量算法的快慢。在此过程中，我还大量讨论了数组、集合和二分查找。


    在*《O 哇！大 O 表示法》*中，我揭示了大 O 表示法，并用易于理解的术语进行了解释。我们在整本书中都会使用这种表示法，所以这一章非常重要。


    在*《用大 O 加速你的代码》*、*《使用和不使用大 O 优化代码》*以及*《为乐观场景优化》*中，我们进一步深入探讨大 O 表示法，并用它来让我们的日常代码更快。在此过程中，我介绍了各种排序算法，包括冒泡排序、选择排序和插入排序。


    在*《日常代码中的大 O》*中，你将运用所学的大 O 知识来分析现实世界中代码的效率。


    在*《使用哈希表实现极速查找》*和*《编写优雅代码》*中，我讨论了几种额外的数据结构，包括哈希表、栈和队列。我展示了它们如何影响我们代码的速度和优雅性，以及我们如何利用它们来解决现实世界的问题。


    *《递归地递归》*介绍了递归，这是计算机科学世界中的一个核心概念。我们在本章中将其分解，并看看它如何成为某些情况下的绝佳工具。*《学习用递归方式思考》*教你如何编写递归代码，如果你不熟悉它，这可能会令人困惑。


    *《动态编程》*向你展示如何优化递归代码并防止其失控。而*《用于加速的递归算法》*向你展示如何以递归为基础构建超快算法，如快速排序和快速选择，然后将你的算法开发技能提升几个层次。


    接下来的章节，*《基于节点的数据结构》*、*《加速一切》*、*《用堆保持优先级》*、*《尝试一下 Trie 树也无妨》*和*《用图连接一切》*，探讨了基于节点的数据结构，包括链表、二叉树、堆、Trie
    树和图，并展示了每种结构如何适用于各种应用。


    *《应对空间限制》*探讨了空间复杂度，这在为磁盘空间相对较小的设备编程或处理大数据时非常重要。


    最后一章，*《代码优化技术》*，将引导你了解各种优化代码效率的实用技术，并为你改进日常编写的代码提供新的思路。


    ¹ https://pragprog.com/titles/jwpython'
