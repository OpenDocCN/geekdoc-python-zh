- md: '## Alternate Heap Implementations


    Our heap implementation is now complete. It''s worth noting that while we did
    use an array to implement the heap under the hood, it *is possible* to implement
    a heap using linked nodes as well. (This alternative implementation uses a different
    trick to solve the problem of the last node, one that involves binary numbers.)


    However, the array implementation is the more common approach, so that''s what
    I presented here. It''s also interesting to see how an array can be used to implement
    a tree.


    Indeed, it''s possible to use an array to implement *any* sort of binary tree,
    such as the binary search tree from the previous chapter. However, the heap is
    the first case of a binary tree where an array implementation provides an advantage,
    as it helps us find the last node easily.


    ## Heaps as Priority Queues


    Now that you understand how heaps work, we can circle back to our old friend,
    the priority queue.


    Again, the primary function of a priority queue is to allow us immediate access
    to the highest-priority item in the queue. In our emergency room example, we want
    to first address the person with the most serious problem.


    It''s for this reason that a heap is a natural fit for priority queue implementations.
    The heap gives us immediate access to the highest-priority item, which can always
    be found at the root node. Each time we take care of the highest-priority item
    (and then remove it from the heap), the next-highest item floats to the top of
    the heap and is on deck to be addressed next. And the heap accomplishes this while
    maintaining very fast insertions and deletions, both of which are O(log N).


    Contrast this to the ordered array, which requires much slower insertions of O(N)
    to ensure that each new value is in its proper place.


    It turns out that the heap''s weak ordering *is its very advantage*. The fact
    that it doesn''t have to be perfectly ordered allows us to insert new values in
    O(log N) time. At the same time, the heap is ordered *just enough* so that we
    can always access the one item we need at any given time, namely, the heap''s
    greatest value.


    ## Wrapping Up


    So far, we''ve seen how different types of trees can optimize different types
    of problems. Binary search trees kept search fast while minimizing the cost of
    insertions, and heaps were the perfect tool for building priority queues.


    In the next chapter, we''ll explore another tree that''s used to power some of
    the most common text-based operations you use on a day-to-day basis.


    ## Exercises


    The following exercises provide you with the opportunity to practice with heaps.
    The solutions to these exercises are found in the section [Chapter 16, on page
    453](#).


    - 1. Draw what the following heap would look like after we insert the value 11
    into it:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_310_0.png)


    - 2. Draw what the previous heap would look like after we delete the root node.


    - 3. Imagine you''ve built a brand-new heap by inserting the following numbers
    into the heap in this particular order: 55, 22, 34, 10, 2, 99, 68. If you then
    pop them from the heap one at a time and insert the numbers into a new array,
    in what order would the numbers now appear?


    # CHAPTER 17


    # It Doesn’t Hurt to Trie


    Did you ever wonder how your smartphone’s autocomplete feature works? Autocomplete
    is the feature you see when you start typing “catn” and your phone suggests that
    the word you’re about to type is either “catnip” or “cat-nap”. (Yes, I text my
    friends about catnip all the time.)


    For this to work, your phone has access to an entire dictionary of words. But
    what data structure are these words stored in?


    Let’s imagine, for a moment, that all the words in the English language are stored
    within an array. If the array were unsorted, we’d have to search *every word*
    in the dictionary to find all words that start with “catn”. This is O(N), and
    a very slow operation considering that N is a pretty large number in this case,
    as it’s the number of all the words in the dictionary.


    A hash table wouldn’t help us either, as it hashes the *entire word* to determine
    where in memory the value should be stored. As the hash table wouldn’t have a
    “catn” key, we’d have no easy way to locate “catnip” or “catnap” within the hash
    table.


    Things improve greatly if we store the words inside an ordered array. If the array
    contained all the words in alphabetical order, we could use binary search to find
    a word beginning with “catn” in O(log N) time. And while O(log N) isn’t bad, we
    can do even better. In fact, if we use a special tree-based data structure, we
    can approach O(1) speeds in finding our desired words.


    The examples in this chapter show how tries can be used for applications dealing
    with text, as tries allow for important features such as autocomplete and autocorrect.
    However, tries have other uses as well, including applications involving IP addresses
    or phone numbers.


    ## Tries


    The *trie* is a kind of tree that''s ideal for text-based features such as autocomplete.
    Before we get into how the trie works, though, let''s first address its pronunciation.


    In my (unasked for) opinion, the trie is one of the most unfortunately named data
    structures out there. The word *trie* is derived from the word *retrieval*. So
    technically, it should be pronounced "tree." But since that would be confused
    with the word *tree*, which is the general term for all tree-based data structures,
    most people pronounce trie as "try." Some resources refer to this same data structure
    as the prefix tree or the digital tree, but trie, amazingly, remains the most
    popular name. So there you have it.


    Here''s one last comment before we dive into the details. The trie is not as well
    documented as the other data structures in this book, and many different resources
    implement the trie in slightly different ways. I''ve chosen a particular implementation
    that I find to be the most straightforward and understandable, but you''ll find
    other implementations out there. In any case, the general ideas behind most of
    the implementations remain the same.


    ## The Trie Node


    Like most other trees, the trie is a collection of nodes that point to other nodes.
    However, the trie is *not* a binary tree. Whereas a binary tree doesn''t allow
    any node to have more than two child nodes, a trie node can have *any number*
    of child nodes.


    In our implementation, each trie node contains a hash table, where the keys are
    English characters and the values are other nodes of the trie. Take a look at
    the following diagram:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_313_0.png)


    Here, the root node contains a hash table with the keys "a", "b", and "c". The
    values are other trie nodes, which are the children of this node. These children
    also contain hash tables, which will in turn point to *their* children. (For now,
    we left the children''s hash tables empty, but they''ll contain data in future
    diagrams.)'
  mdcn: '## 替代的堆实现


    我们的堆实现现在已经完成。值得注意的是，虽然我们底层确实使用了数组来实现堆，但*也有可能*使用链式节点来实现堆。（这种替代实现使用了不同的技巧来解决最后一个节点的问题，该技巧涉及二进制数。）


    然而，数组实现是更常见的方法，因此我在这里介绍了它。看到如何使用数组来实现树也很有趣。


    实际上，可以使用数组来实现*任何*类型的二进制树，例如上一章的二叉搜索树。然而，堆是第一个数组实现能提供优势的二叉树案例，因为它帮助我们轻松找到最后一个节点。


    ## 堆作为优先队列


    既然你已经理解了堆的工作原理，我们可以回到我们的老朋友——优先队列。


    同样，优先队列的主要功能是让我们能够立即访问队列中优先级最高的项目。在我们的急诊室示例中，我们希望首先处理问题最严重的人。


    正是由于这个原因，堆非常适合优先队列的实现。堆让我们能够立即访问优先级最高的项目，它总是位于根节点。每次我们处理完最高优先级的项目（并将其从堆中移除）后，下一个最高优先级的项目就会浮到堆顶，准备接下来被处理。堆在实现这一点的同时，还保持了非常快的插入和删除速度，两者都是
    O(log N)。


    与此形成对比的是有序数组，它需要慢得多的 O(N) 插入操作，以确保每个新值都处于其正确的位置。


    事实证明，堆的弱排序*正是它的优势*。它不必完美排序的事实允许我们以 O(log N) 的时间插入新值。同时，堆的排序*恰到好处*，使我们能够在任何给定时间始终访问我们需要的那一个项目，即堆的最大值。


    ## 总结


    到目前为止，我们已经看到不同类型的树如何优化不同类型的问题。二叉搜索树在最小化插入成本的同时保持了搜索的快速性，而堆则是构建优先队列的完美工具。


    在下一章中，我们将探索另一种树，它用于支持你日常使用的许多最常见的基于文本的操作。


    ## 练习


    以下练习为你提供了练习堆的机会。这些练习的答案可以在[第 16 章，第 453 页](#)中找到。


    - 1. 画出将值 11 插入以下堆后，堆的样子：


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_310_0.png)


    - 2. 画出删除上一个堆的根节点后，堆的样子。


    - 3. 想象你通过按以下特定顺序将数字插入堆中，构建了一个全新的堆：55, 22, 34, 10, 2, 99, 68。如果你然后将它们从堆中逐个弹出并插入到一个新数组中，这些数字现在会以什么顺序出现？


    # 第 17 章


    # 尝试一下 Trie 无妨


    你是否曾好奇过智能手机的自动完成功能是如何工作的？自动完成是你在开始输入“catn”时看到的功能，手机会建议你即将输入的单词是“catnip”或“cat-nap”。（是的，我经常给朋友发关于猫薄荷的短信。）


    为了实现这一点，你的手机可以访问整个单词词典。但这些单词存储在什么数据结构中呢？


    让我们想象一下，英语中的所有单词都存储在一个数组中。如果数组是无序的，我们就必须搜索词典中的*每一个单词*来找到所有以“catn”开头的单词。这是 O(N)
    操作，考虑到 N 在这种情况下是一个相当大的数字（因为它是词典中所有单词的数量），这是一个非常慢的操作。


    哈希表也帮不了我们，因为它对*整个单词*进行哈希以确定值应存储在内存中的哪个位置。由于哈希表中没有“catn”键，我们将无法轻松地在哈希表中定位“catnip”或“catnap”。


    如果我们把单词存储在有序数组中，情况会大大改善。如果数组按字母顺序包含所有单词，我们就可以使用二分查找在 O(log N) 时间内找到以“catn”开头的单词。虽然
    O(log N) 并不差，但我们还可以做得更好。事实上，如果我们使用一种特殊的基于树的数据结构，我们在查找所需单词时可以接近 O(1) 的速度。


    本章的示例展示了如何将 trie 用于处理文本的应用程序，因为 trie 允许实现自动完成和自动更正等重要功能。然而，trie 还有其他用途，包括涉及 IP
    地址或电话号码的应用程序。


    ## Trie


    *Trie* 是一种非常适合基于文本的功能（如自动完成）的树。不过，在我们深入了解 trie 的工作原理之前，让我们先谈谈它的发音。


    在我看来（未经请求的），trie 是最不幸命名的数据结构之一。单词 *trie* 源自单词 *retrieval*。因此，从技术上讲，它应该发音为“tree”。但由于这会与单词
    *tree*（所有基于树的数据结构的通用术语）混淆，大多数人将 trie 发音为“try”。一些资料将这种相同的数据结构称为前缀树或数字树，但令人惊讶的是，trie
    仍然是最受欢迎的名称。所以，情况就是这样。


    在深入细节之前，最后一点说明。trie 的文档记录不如本书中的其他数据结构完善，许多不同的资源以略有不同的方式实现 trie。我选择了一种我认为最直接和易于理解的特定实现，但你会发现其他实现方式。无论如何，大多数实现背后的基本思想是相同的。


    ## Trie 节点


    与大多数其他树一样，trie 是指向其他节点的节点集合。然而，trie *不是*二叉树。二叉树不允许任何节点拥有超过两个子节点，而 trie 节点可以拥有*任意数量*的子节点。


    在我们的实现中，每个 trie 节点包含一个哈希表，其中键是英文字符，值是 trie 的其他节点。请看下图：


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_313_0.png)


    这里，根节点包含一个哈希表，键为“a”、“b”和“c”。值是其他 trie 节点，它们是该节点的子节点。这些子节点也包含哈希表，这些哈希表将反过来指向*它们的*子节点。（目前，我们留空了子节点的哈希表，但它们将在未来的图中包含数据。）'
