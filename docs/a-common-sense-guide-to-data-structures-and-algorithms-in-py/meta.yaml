  md: 'To build our autocomplete feature, let''s first analyze the basic trie operations.


    # Trie Search


    The most classic trie operation is search—namely, determining whether a string
    is found in the trie. Search has two flavors: we can search to see whether the
    string is a *complete* word, or we can search to see whether the string is at
    least a word *prefix* (that is, the beginning of a word). These two versions are
    similar, but we''ll implement the latter one, where our search will look for prefixes.
    This search will end up finding complete words as well, since a complete word
    is at least as good as a prefix.


    The algorithm for prefix search performs the following steps (they''ll become
    clearer when we walk though an example that follows):


    +   1. We establish a variable called `current_node`. At the beginning of our
    algorithm, this points to the root node.

    2. We iterate over each character of our search string.

    3. As we point to each character of our search string, we look to see if the `current_node`
    has a child with that character as a key.

    4. If it does not, we return `None`, as it means our search string does not exist
    in the trie.

    5. If the `current_node` *does* have a child with the current character as the
    key, we update the `current_node` to become that child. We then go back to Step
    2, continuing to iterate over each character in our search string.

    6. If we get to the end of our search string, it means we''ve found our search
    string.


    Let''s see this in action by searching for the string "cat" in our trie from earlier.


    Setup: We set the `current_node` to be the root node. (The `current_node` is indicated
    in bold in the diagrams on the following pages.) We also point to the first character
    of our string, which is the "c", as shown in the top [diagram on page 310](diagram
    on page 310).


    Step 1: Since the root node has "c" as a child key, we update the `current_node`
    to become that key''s value. We also continue iterating through the characters
    in our search string, so we point to the next character, which is the "a", as
    shown in the bottom [diagram on page 310](diagram on page 310).'
