    \nIt emerges that when inserting into an ordered array, we need to always conduct\
    \ a search before the actual insertion to determine the correct spot for the insertion.\
    \ This is one difference in performance between a classic array and an ordered\
    \ array.\n\nWe can see in this example that there were initially four elements\
    \ and that insertion took six steps. In terms of N, we'd say that for N elements\
    \ in an ordered array, the insertion took N + 2 steps in total.\n\nInterestingly,\
    \ the number of steps for insertion remains similar no matter where in the ordered\
    \ array our new value ends up. If our value ends up toward the beginning of the\
    \ ordered array, we have fewer comparisons and more shifts. If our value ends\
    \ up toward the end, we get more comparisons but fewer shifts. The fewest steps\
    \ occur when the new value winds up at the very end, since no shifts are necessary.\
    \ In this case, we take N steps to compare the new value with all N existing values,\
    \ plus one step for the insertion itself, yielding a total of N + 1 steps.\n\n\
    While insertion is less efficient for an ordered array than for a classic array,\
    \ the ordered array has a secret superpower when it comes to searching.\n\n##\
    \ Searching an Ordered Array\n\nIn the previous chapter, I described the process\
    \ for searching for a particular value within a classic array: we check each cell\
    \ one at a time—from left to right—until we find the value we're looking for.\
    \ I noted that this process is referred to as linear search.\n\nLet's see how\
    \ linear search differs between a classic and an ordered array.\n\nSay we have\
    \ a regular array of [17, 3, 75, 202, 80]. If we were to search for the value\
    \ 22—which happens to be nonexistent in this array—we would need to search each\
    \ and every element because the 22 could potentially be anywhere in the array.\
    \ The only time we could stop our search before we reach the array's end is if\
    \ we happen to find the value we're looking for before we reach the end.\n\nWith\
    \ an ordered array, however, we can stop a search early even if the value isn't\
    \ contained within the array. Let's say we're searching for a 22 within an ordered\
    \ array of [3, 17, 75, 80, 202]. We can stop the search as soon as we reach the\
    \ 75, since it's impossible for the 22 to be anywhere to the right of it.\n\n\
    Here's a Python implementation of linear search on an ordered array:\n\n```python\n\
    def linear_search(array, search_value):\n    for index, element in enumerate(array):\n\
    \        if element == search_value:\n            return index\n        elif element\
    \ > search_value:\n            break\n    return None\n```\n\nThis method accepts\
    \ two arguments: array is the ordered array we're searching, and search_value\
    \ is the value we're searching for.\n\nHere's how to use this function to find\
    \ the 22 in our example array:\n\n```python\nprint(linear_search([3, 17, 75, 80,\
    \ 202], 22))\n```\n\nAs you can see, this linear_search method iterates over every\
