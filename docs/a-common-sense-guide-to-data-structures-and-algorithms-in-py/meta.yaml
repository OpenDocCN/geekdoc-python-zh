    # The Efficiency of Insertion Sort


    Four types of steps occur in Insertion Sort: removals, comparisons, shifts, and
    insertions. To analyze the efficiency of Insertion Sort, we need to tally up each
    of these steps.


    First, let''s dig into comparisons. A comparison takes place each time we compare
    a value to the left of the gap with the temp_value. In a worst-case scenario,
    where the array is sorted in reverse order, we have to compare every number to
    the left of temp_value with temp_value in each pass-through. This is because each
    value to the left of temp_value will always be greater than temp_value, so the
    pass-through will only end when the gap reaches the left end of the array.


    During the first pass-through, in which temp_value is the value at index 1, a
    maximum of one comparison is made, since there''s only one value to the left of
    the temp_value. On the second pass-through, the maximum number of comparisons
    made is two, and so on. On the final pass-through, we need to compare the temp_value
    with every single value in the array besides temp_value itself. In other words,
    if there are N elements in the array, the maximum number of comparisons made in
    the final pass-through is N - 1.


    We can, therefore, formulate the total number of comparisons as:


    1 + 2 + 3 + ... + (N - 1) comparisons.


    In our example array that contains five elements, that''s a maximum of:


    1 + 2 + 3 + 4 = 10 comparisons.


    For an array containing 10 elements, there would be:


    1 + 2 + 3 + 4 + 5 + 6 + 7 + 8 + 9 = 45 comparisons.


    For an array containing 20 elements, there would be a total of 190 comparisons,
    and so on.


    When examining this pattern, it emerges that for an array containing N elements,
    there are approximately N² / 2 comparisons. (10² / 2 is 50, and 20² / 2 is 200.
    We''ll look at this pattern more closely in the next chapter.)'
