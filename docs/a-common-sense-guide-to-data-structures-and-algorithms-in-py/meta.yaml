    在前面的章节中，你学习了如何使用大O表示法来表达代码的时间复杂度。正如你所看到的，大O分析涉及相当多的细节。在本章中，我们将运用你目前所学的一切来分析可能在实际代码库中找到的实际代码样本的效率。\n\
