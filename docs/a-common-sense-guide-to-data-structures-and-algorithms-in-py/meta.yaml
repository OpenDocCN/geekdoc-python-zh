- md: "## CHAPTER 19\n\n### Dealing with Space Constraints\n\nWhen analyzing the efficiency\
    \ of various algorithms throughout this book, we've focused exclusively on how\
    \ fast they run—that is, their time complexity. However, another measure of efficiency\
    \ can be useful as well, which is how much *memory* an algorithm consumes. This\
    \ measure is known as *space complexity*.\n\nSpace complexity becomes an important\
    \ factor when memory is limited. If you have an enormous amount of data, or are\
    \ programming for a small device with limited memory, space complexity can matter\
    \ a lot.\n\nIn a perfect world, we'd always use algorithms that are both fast\
    \ *and* memory-efficient. However, sometimes we can't have both, and we need to\
    \ choose between the two. Each situation requires a careful analysis to know when\
    \ we need to prioritize speed over memory, and memory over speed.\n\n### Big O\
    \ of Space Complexity\n\nInterestingly, computer scientists use Big O notation\
    \ to describe space complexity just as they do for time complexity.\n\nBack when\
    \ I introduced Big O notation in [Chapter 3, O Yes! Big O Notation, on page 35](#),\
    \ I described Big O in terms of what I called the “key question.” For time complexity,\
    \ the key question was: *if there are N data elements, how many steps will the\
    \ algorithm take?*\n\nTo use Big O for space complexity, we just need to reframe\
    \ the key question. When it comes to memory consumption, the key question is:\
    \ *if there are N data elements, how many units of memory will the algorithm consume?*\n\
    \nHere's a simple example.\n\nLet's say we're writing a function that accepts\
    \ an array of strings and returns an array of those strings in ALL CAPS. For example,\
    \ the function would accept an array like [\"tuvi\", \"leah\", \"shaya\", \"rami\"\
    , \"yechiel\"] and return [\"TUVI\", \"LEAH\", \"SHAYA\", \"RAMI\", \"YECHIEL\"\
    ]. Here's one way we can write this function:\n\n```python\ndef make_uppercase(array):\n\
    \    new_array = []\n\n    for string in array:\n        new_array.append(string.upper())\n\
    \n    return new_array\n```\n\nIn this make_uppercase function, we accept an array.\
    \ We then create a *brand-new array* called new_array and fill it with uppercase\
    \ versions of each string from the original array.\n\nBy the time this function\
    \ is complete, we'll have two arrays floating around in our computer's memory.\
    \ We have the original array, which contains [\"tuvi\", \"leah\", \"shaya\", \"\
    rami\", \"yechiel\"], and we have new_array, which contains [\"TUVI\", \"LEAH\"\
    , \"SHAYA\", \"RAMI\", \"YECHIEL\"].\n\nWhen we analyze this function in terms\
    \ of space complexity, we can see that this function *creates* a brand-new array\
    \ that contains N elements. This is *in addition* to the original array which\
    \ also holds N elements.\n\nSo let's return to our key question: *if there are\
    \ N data elements, how many units of memory will the algorithm consume?*\n\nBecause\
    \ our function generated an additional N data elements (in the form of new_array),\
    \ we'd say that this function has a *space efficiency of O(N)*.\n\nThe way this\
    \ appears on the following graph should look familiar:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_393_0.png)\n\
    \nNote that this graph is identical to the way we've depicted O(N) in graphs in\
    \ previous chapters, with the exception that the vertical axis now represents\
    \ *memory consumed* rather than time.\n\nNow, let's present an alternative `make_uppercase`\
    \ function that is more memory-efficient:\n\n```python\ndef make_uppercase(array):\n\
    \    for index in range(len(array)):\n        array[index] = array[index].upper()\n\
    \    return array\n```\n\nIn this second version, we don't create any new arrays.\
    \ Instead, we modify each value within the original array *in place*, replacing\
    \ each string with an uppercase version of that string. We then return the modified\
    \ array.\n\nThis is a drastic improvement in terms of memory consumption since\
    \ our new function *doesn't consume any additional memory at all*.\n\nHow do we\
    \ describe this in terms of Big O notation?\n\nRecall that with time complexity,\
    \ an O(1) algorithm was one whose speed remained constant no matter how large\
    \ the data. Similarly, with space complexity, O(1) means that the memory consumed\
    \ by an algorithm is constant no matter how large the data.\n\nOur revised `make_uppercase`\
    \ function consumes a constant amount of additional space (zero!) no matter whether\
    \ the original array contains four elements or one hundred. Because of this, this\
    \ function is said to have a space efficiency of O(1).\n\nIt's worth emphasizing\
    \ that when using Big O to describe space complexity, we're only counting the\
    \ *new data* the algorithm is generating. Even our second `make_uppercase` function\
    \ deals with N elements of data in the form of the array passed into the function.\
    \ However, we're not factoring those N elements into our Big O description, since\
    \ the original array exists in any case, and we're only focused on the *extra*\
    \ space the algorithm consumes. This extra space is more formally known as *auxiliary\
    \ space*.\n\nHowever, it's good to know that there are some references that include\
    \ the original input when calculating the space complexity, and that's fine. We're\
    \ not including it, and whenever you see space complexity described in another\
    \ resource, you need to determine whether it's including the original input.\n\
    \nLet's now compare the two versions of make_uppercase in both time and space\
    \ complexity:\n\n| Version | Time Complexity | Space Complexity |\n| :--- | :---\
    \ | :--- |\n| Version #1 | O(N) | O(N) |\n| Version #2 | O(N) | O(1) |\n\nBoth\
    \ versions are O(N) in time complexity, since they take N steps for N data elements.\
    \ However, the second version is more memory-efficient, as it is O(1) in space\
    \ complexity compared to the first version's O(N).\n\nIt turns out that Version\
    \ #2 is more efficient than Version #1 in terms of space while not sacrificing\
    \ any speed, which is a nice win.\n\n### Trade-Offs Between Time and Space\n\n\
    Here's a function that accepts an array and returns whether it contains any duplicate\
    \ values (you may recognize this function from [Chapter 4. Speeding Up Your Code\
    \ with Big O, on page 47](https://www.google.com/search?q=Chapter+4.+Speeding+Up+Your+Code+with+Big+O,+on+page+47)):\n\
    \n```python\ndef has_duplicate_value(array):\n    for i in range(len(array)):\n\
    \        for j in range(len(array)):\n            if (i != j) and (array[i] ==\
    \ array[j]):\n                return True\n\n    return False\n```\n\nThis algorithm\
    \ uses nested loops and has a time complexity of O(N²). We'll call this implementation\
    \ Version #1.\n\nHere's a second implementation, Version #2, that employs a hash\
    \ table and just a single loop:\n\n```python\ndef has_duplicate_value(array):\n\
    \    existing_values = {}\n\n    for value in array:\n        if value not in\
    \ existing_values:\n            existing_values[value] = True\n        else:\n\
    \            return True\n\n    return False\n```\n\nVersion #2 starts out with\
    \ an empty hash table called existing_values. We then iterate over each item from\
    \ the array, and as we encounter each new item, we store it as a key in the existing_values\
    \ hash table. (We set the value arbitrarily\n\n3. If we perform *breadth*-first\
    \ search on the previous graph starting with the A vertex, what is the order in\
    \ which we'll traverse all the vertices? Assume that when given the choice to\
    \ visit multiple adjacent vertices, we'll first visit the node that is earliest\
    \ in the alphabet.\n\n4. In this chapter, I only provided the code for breadth-first\
    \ *traversal*, as discussed in [Breadth-First Search, on page 346](#); that is,\
    \ the code simply printed the value of each vertex. Modify the code so that it\
    \ performs an actual *search* for a vertex value provided to the function. (We\
