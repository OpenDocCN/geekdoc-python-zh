    As of now, the queue has functioned just like a stack. However, removing data
    happens in the reverse, as we remove data from the *front* of the queue. (Removing
    an element from a queue is also known as *dequeuing*.)


    If we want to remove data, we must start with the 5, since it''s at the front
    of the queue:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_158_3.png)'
