    Congratulations! We''ve analyzed the time complexity of our first data structure.
    Now that you''ve learned how to analyze a data structure''s efficiency, you can
    now discover how different data structures have different efficiencies. This is
    crucial, because choosing the correct data structure for your code can have serious
    ramifications on your software''s performance.


    The next data structure—the *set*—seems so similar to the array at first glance.
    However, you''ll see that the operations performed on arrays and sets have different
    efficiencies.


    # Sets: How a Single Rule Can Affect Efficiency


    Let''s explore this other data structure: the *set*. A set is a data structure
    that does not allow duplicate values to be contained within it.


    Sets are of different types, but for this discussion, I''ll talk about an *array-based
    set*. This set is just like an array—it''s a simple list of values. The only difference
    between this set and a classic array is that the set never allows duplicate values
    to be inserted into it.


    For example, if you had the set ["a", "b", "c"] and tried to add another "b",
    the computer just wouldn''t allow it, since a "b" already exists within the set.


    Sets are useful when you need to ensure that you don''t have duplicate data.


    For instance, if you''re creating an online phone book, you don''t want the same
    phone number appearing twice. In fact, I''m currently suffering from this with
    my local phone book: my home phone number is not just listed for me but is also
    listed erroneously as the phone number for some family named Zirkind. (Yes, this
    is a true story.) Let me tell you—it''s annoying to receive phone calls and voicemail
    from people looking for the Zirkinds. For that matter, I''m sure the Zirkinds
    are also wondering why no one ever calls them. And when I call the Zirkinds to
    let them know about the error, my wife picks up the phone because I''ve called
    my own number. (Okay, that last part never happened.) If only the program that
    produced the phone book had used a set...


    In any case, an array-based set is an array with one additional constraint of
    barring duplicates. While not allowing duplicates is a useful feature, this simple
    constraint also causes the set to have a *different efficiency* for one of the
    four primary operations.'
