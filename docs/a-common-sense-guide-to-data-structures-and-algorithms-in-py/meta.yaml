    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_261_0.png)\n\n在二叉搜索树中搜索的算法如下：\n\n1.\
    \  指定一个节点为*当前节点*。（在算法开始时，根节点是第一个当前节点。）\n2.  检查当前节点的值。\n3.  如果我们找到了要找的值，很好！\n4.\
    \  如果我们要找的值小于当前节点，则在其左子树中搜索。\n5.  如果我们要找的值大于当前节点，则在其右子树中搜索。\n6.  重复步骤1到5，直到找到我们要找的值，或者到达树的底部，此时我们的值一定不在树中。\n\
    \n假设我们要搜索61。让我们通过直观地逐步演示来看看需要多少步。\n\n在树中搜索时，我们必须始终从根节点开始：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_262_0.png)\n\
    \n接下来，计算机会问自己：我们要搜索的数字（61）是大于还是小于这个节点的值？如果我们要找的数字小于当前节点，则在左子节点中查找。如果大于当前节点，则在右子节点中查找。\n\
