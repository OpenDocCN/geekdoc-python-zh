    \ \"a\". It has one, so we make that child the new current_node. We then proceed\
    \ to search for the next character in our string, which is the \"t\":\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_320_0.png)\n\
    \nStep 3: We're now pointing to the \"t\" of our search string. Since the current_node\
    \ has a \"t\" child, we follow it, as shown in the [diagram on page 312](#).\n\
    \nSince we've reached the end of our search string, it means we've found \"cat\"\
    \ in our trie.\n\n# Code Implementation: Trie Search\n\nLet's implement trie search\
    \ by adding a search method to our Trie class:\n\n```\npython\ndef search(self,\
    \ word):\n    current_node = self.root\n\n    for char in word:\n        if current_node.children.get(char):\n\
    \            current_node = current_node.children[char]\n        else:\n     \
    \       return None\n\n    return current_node\n```\n\nOur search method accepts\
