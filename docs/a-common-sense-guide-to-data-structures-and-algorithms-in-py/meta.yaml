- img_proc: true
  md: 'We found "dab", which would indicate that the value at index 1 of that subarray
    ("pat") is the value we''re looking for.


    In a scenario where the computer hits upon a cell that references an array, its
    search can take some extra steps, as it needs to conduct a linear search within
    an array of multiple values. If somehow all of our data ended up within a single
    cell of our hash table, our hash table would be no better than an array. So, it
    actually turns out that the worst-case performance for a hash table lookup is
    O(N).


    Because of this, it''s critical that a hash table is designed in such a way that
    it will have few collisions and, therefore, typically perform lookups in O(1)
    time rather than O(N) time.


    Luckily, most programming languages implement hash tables and handle these details
    for us. However, by understanding how it all works under the hood, we can appreciate
    how hash tables eke out O(1) performance.


    Let''s see how hash tables can be set up to avoid frequent collisions.


    # Making an Efficient Hash Table


    Ultimately, a hash table''s efficiency depends on three factors:


    +   - How much data we''re storing in the hash table

    - How many cells are available in the hash table

    - Which hash function we''re using


    It makes sense why the first two factors are important. If you have a lot of data
    and only a few cells, there will be many collisions and the hash table will lose
    its efficiency. Let''s explore, however, why the hash function itself is important
    for efficiency.


    Let''s say we''re using a hash function that always produces a value that falls
    in the range from 1 to 9. An example of this is a hash function that converts
    letters into their corresponding numbers and keeps adding the resulting digits
    together until it ends up with a single digit.


    For example:


    PUT = 16 + 21 + 20 = 57


    Because 57 contains more than one digit, the hash function breaks up the 57 into
    5 + 7:


    5 + 7 = 12'
  merge: -1
  pgno: 137
- img_proc: true
  md: '12 also contains more than one digit, so it breaks up the 12 into 1 + 2:

    1 + 2 = 3

    In the end, PUT hashes into 3.

    This hash function by its very nature will *always* return a number 1 through
    9.

    Let''s return to our example hash table:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_138_0.png)


    With this hash function, the computer would never even use cells 10 through 16
    even though they exist. All data would be stuffed into cells 1 through 9.

    A good hash function, therefore, is one that distributes its data across *all*
    available cells. The more we can spread out our data, the fewer collisions we''ll
    have.


    # The Great Balancing Act


    You learned that a hash table''s efficiency goes up as its number of collisions
    goes down. In theory, then, the best way to avoid collisions would be to have
    a hash table with a large number of cells. Imagine we want to store just five
    items in our hash table. A hash table with 1,000 cells would seem to be wonderful
    for our case, since odds are there would be no collisions.

    However, while avoiding collisions is important, we have to balance that with
    avoiding memory hogging as well.

    Although a hash table with 1,000 cells for our five pieces of data is great for
    avoiding collisions, we''d be using up 1,000 cells to store just five pieces of
    data, and that''s a poor use of memory.

    This is the balancing act that a hash table must perform. A good hash table *strikes
    a balance of avoiding collisions while not consuming lots of memory*.

    To accomplish this, computer scientists have developed the following rule of thumb:
    for every seven data elements stored in a hash table, it should have ten cells.

    So if you''re planning on storing fourteen elements, you''d want to have twenty
    available cells, and so on.'
  merge: -1
  pgno: 138
- img_proc: true
  md: 'This ratio of data to cells is called the *load factor*. Using this terminology,
    we''d say that the ideal load factor is 0.7 (7 elements / 10 cells).


    If you initially stored seven pieces of data in a hash table, the computer might
    allocate a hash table with ten cells. When you begin to add more data, though,
    the computer will expand the hash table by adding more cells and changing the
    hash function so that the new data will be distributed evenly across the new cells.


    Again, most of the internals of a hash table are managed by the computer language
    you''re using. It decides how big the hash table needs to be, what hash function
    to use, and when it''s time to expand the hash table. You have the right to assume
    that your programming language has implemented its hash table to allow for peak
    performance.


    Now that we''ve seen how hashes work, it''s clear that they have a superior lookup
    efficiency of O(1). We''re going to use this knowledge shortly to optimize our
    code for speed.


    But let''s first take a quick tour of the many different use cases for hash tables
    when it comes to simple data organization.


    # Hash Tables for Organization


    Because hash tables keep data in pairs, they''re useful in many scenarios for
    organizing data.


    Some data exists naturally in paired form. The fast-food menu and thesaurus scenarios
    from this chapter are classic examples. The menu contains each food item paired
    with its price. The thesaurus contains each word paired with its synonym. In fact,
    this is why Python refers to hash tables as dictionaries. A dictionary is a common
    form of paired data; it''s a list of words with their respective definitions.


    Other examples of naturally paired data can include tallies, such as political
    candidates and the number of votes each received:


    ```

    {"Candidate A": 1402021, "Candidate B": 2321443, "Candidate C": 432}

    ```


    An inventory tracking system, which keeps track of how much of each item is in
    supply, is another tally example:


    ```

    {"Yellow Shirt": 1203, "Blue Jeans": 598, "Green Felt Hat": 65}

    ```


    Hash tables are such a natural fit for paired data that we can even use them to
    simplify conditional logic in certain instances.'
