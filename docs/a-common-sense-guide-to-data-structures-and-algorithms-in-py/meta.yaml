  - "[PAGE 197]\n\n# CHAPTER 12\n\n# Dynamic Programming\n\nIn the previous chapter,\
    \ you learned how to write recursively and how to use recursion to solve some\
    \ rather complex problems.\n\nWhile recursion can certainly solve *some* problems,\
    \ it can also create *new* ones if not used properly. In fact, recursion is often\
    \ the culprit behind some of the slowest categories of Big O, such as O(2^N).\n\
    \nThe good news, though, is that many of these problems can be avoided. In this\
    \ chapter, you'll learn how to identify some of the most common speed traps found\
    \ in recursive code and how to express such algorithms in terms of Big O. More\
    \ important, you'll learn the techniques to fix these problems.\n\nHere's some\
    \ more good news: the techniques found in this chapter are pretty simple. Let's\
    \ take a look at how to use these easy but effective methods for turning our recursive\
    \ nightmares into recursive bliss.\n\n# Unnecessary Recursive Calls\n\nHere's\
    \ a recursive function that finds the greatest number from an array:\n\n```\n\
    def max(array):\n    if not array:\n        return None\n\n    if len(array) ==\
    \ 1:\n        return array[0]\n\n    if array[0] > max(array[1:]):\n        return\
    \ array[0]\n    else:\n        return max(array[1:])\n```\n\nThe essence of each\
    \ recursive call is the comparison of a single number (array[0]) to the maximum\
    \ number from the remainder of the array. (To calculate"
  - "[PAGE 198]\n\nthe maximum number from the remainder of the array, we call the\
    \ very max function we're in, which is what makes the function recursive.)\n\n\
    We achieve the comparison with a conditional statement. The first half of the\
    \ conditional statement is as follows:\n\n```\nif array[0] > max(array[1:]):\n\
    \    return array[0]\n```\n\nThis snippet says that if the single number (array[0])\
    \ is greater than what has already been determined to be the maximum number of\
    \ the rest of the array (max(array[1:])), then by definition, array[0] must be\
    \ the greatest number, so we return it.\n\nHere is the second half of the conditional\
    \ statement:\n\n```\nelse:\n    return max(array[1:])\n```\n\nThis second snippet\
    \ says that if array[0] is *not* greater than the greatest number from the rest\
    \ of the array, then the greatest number from the rest of the array must be the\
    \ greatest number overall, and we return it.\n\nWhile this code works, it contains\
    \ a hidden inefficiency. If you look carefully, you'll note that our code contains\
    \ the phrase, max(array[1:]) twice, once in each half of the conditional statement.\n\
    \nThe problem with this is that each time we mention max(array[1:]), we trigger\
    \ an entire avalanche of recursive calls.\n\nLet's break this down for an example\
    \ array of [1, 2, 3, 4].\n\nWe know that we're going to start by comparing the\
    \ 1 with the maximum number of the remaining array, [2, 3, 4]. That, in turn,\
    \ will compare the 2 against the max of the remaining [3, 4], which in turn will\
    \ compare the 3 against the [4]. This, too, triggers one more recursive call on\
    \ the [4] itself, which is the base case.\n\nHowever, to really see how our code\
    \ plays out, we're going to start by analyzing the bottom call and working our\
    \ way up the call chain.\n\nLet's begin.\n\n# Max Recursive Walk-Through\n\nWhen\
    \ we call max([4]), the function simply returns the number 4. Again, this is because\
    \ our base case is when the array only contains one element, as dictated by the\
    \ following line of code:"
  - "[PAGE 199]\n\n```\nif len(array) == 1:\n    return array[0]\n```\n\nThis is pretty\
    \ straightforward—it’s a single function call:\n\nmax([4])\n\nMoving up the call\
