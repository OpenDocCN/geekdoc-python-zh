    \ `node_after_deleted_node`：\n\n```\ncurrent_node.next_node = node_after_deleted_node\n\
    ```\n\n## 链表操作的效率\n\n经过我们的分析，链表和数组的比较可以总结如下：\n\n| 操作 | 数组 | 链表 |\n| :--- | :---\
