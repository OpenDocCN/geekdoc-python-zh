- img_proc: true
  md: 'We can now see that the performance of Insertion Sort *varies greatly* based
    on the scenario. In the worst-case scenario, Insertion Sort takes N² steps. In
    an average scenario, it takes N² / 2 steps. And in the best-case scenario, it
    takes about N steps.


    You can see these three types of performance in the following graph:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_107_0.png)


    Contrast this with Selection Sort. Selection Sort takes N² / 2 steps in *all*
    cases, from worst to average to best-case scenarios. This is because Selection
    Sort doesn''t have any mechanism for ending a pass-through early at any point.
    Each pass-through compares every value to the right of the chosen index no matter
    what.


    Here''s a table that compares Selection Sort and Insertion Sort:


    | | Best Case | Average Case | Worst Case |

    |---|---|---|---|

    | Selection Sort | N² / 2 | N² / 2 | N² / 2 |

    | Insertion Sort | N | N² / 2 | N² |


    So which is better: Selection Sort or Insertion Sort? The answer is, well, it
    depends. In an average case—where an array is randomly sorted—they perform similarly.
    If you have reason to assume you''ll be dealing with data that is *mostly* sorted,
    Insertion Sort will be a better choice. If you have reason to assume you''ll be
    dealing with data that is mostly sorted in reverse order, Selection Sort will
    be faster. If you have no idea what the data will be like, that''s essentially
    an average case, and both will be equal.


    # A Practical Example


    Suppose you''re writing a Python application, and somewhere in your code you find
    that you need to get the intersection between two arrays. The intersection is
    a list of all the values that occur in *both* of the arrays. For example,'
