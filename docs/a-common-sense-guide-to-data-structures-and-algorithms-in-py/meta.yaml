    \ index as a function argument, we have a way of incrementing and tracking the\
    \ index as we make each successive recursive call. Here's the code for this:\n\
    \n```python\ndef double_array(array, index):\n    array[index] *= 2\n    double_array(array,\
    \ index + 1)\n```\n\nIn each successive call, we pass in the array again as the\
    \ first argument, but we also pass along an incremented index. This allows us\
