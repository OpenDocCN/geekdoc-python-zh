    \ part of the algorithm—the for loop—takes four steps. In this example, there\
    \ are four things in the list, and we print each one out a single time.\n\nHowever,\
    \ the number of steps isn’t constant. If the list contained ten elements, the\
    \ for loop would take ten steps. Since this for loop takes as many steps as there\
    \ are elements, we’d say that this algorithm has an efficiency of O(N).\n\nThe\
    \ next example is a simple Python-based algorithm for determining whether a number\
    \ is prime:\n\n```python\ndef is_prime(number):\n    for i in range(2, number):\n\
    \        if number % i == 0:\n            return False\n    return True\n```\n\
    \nThe preceding code accepts a number as an argument and begins a for loop in\
    \ which we divide the number by every integer from 2 up to (but not including)\
    \ that number and see if there’s a remainder. If there’s no remainder, we know\
    \ that the number is not prime and we immediately return False. If we make it\
    \ all the way up to the number and always find a remainder, then we know that\
    \ the number is prime and we return True.\n\nIn this case, the key question is\
    \ slightly different than in the previous examples. In the previous examples,\
    \ our key question asked how many steps the algorithm would take if there were\
    \ N data elements in an array. Here, we’re not dealing with an array, but we *are*\
    \ dealing with a number that we pass into this function. Depending on the number\
    \ we pass in, this will affect how many times the function’s loop runs.\n\nIn\
    \ this case, then, our key question will be: when passing in the number N, how\
    \ many steps will the algorithm take?\n\nIf we pass the number 7 into `is_prime`,\
    \ the for loop runs about 7 times. (It technically runs 5 times, since it starts\
    \ at 2 and ends right before the actual number.) For the number 101, the loop\
