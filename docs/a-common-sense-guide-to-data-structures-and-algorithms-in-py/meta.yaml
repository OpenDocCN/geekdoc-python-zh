- img_proc: true
  md: "Let's next imagine the string as a hash table. What would that even look like?\n\
    \nOne possibility is to create a hash table where each character is a key, and\
    \ the value is the number of occurrences of that character within the word. For\
    \ example, the string \"balloon\" would look like so:\n\n```\n{\"b\": 1, \"a\"\
    : 1, \"l\": 2, \"o\": 2, \"n\": 1}\n```\n\nThis hash table indicates that the\
    \ string has one \"b\", one \"a\", two \"l\"s, two \"o\"s, and one \"n\".\n\n\
    Now, this doesn't tell us *everything* about the string. Namely, we couldn't tell\
    \ from the hash table the *order* of characters within the string. So there's\
    \ a bit of data loss in this regard.\n\nHowever, that data loss is *exactly* what\
    \ we need to help us determine whether the two strings are anagrams: two strings\
    \ turn out to be anagrams if they have the same number of each character, no matter\
    \ what the order is.\n\nTake the words \"rattles\", \"startle\", and \"starlet\"\
    . They all have two \"t\"s, one \"a\", one \"l\", one \"e\", and one \"s\"—and\
    \ that's what allows them to be anagrams and easily reordered to become each other.\n\
    \nWe can now write an algorithm that converts each string into a hash table that\
    \ tallies the count of each type of character. Once we've converted the two strings\
    \ into two hash tables, all that's left is to compare the two hash tables. If\
    \ they're equal, it means the two strings are anagrams.\n\nHere's an implementation:\n\
    \n```\ndef are_anagrams(first_string, second_string):\n    first_word_hash_table\
    \ = {}\n    second_word_hash_table = {}\n\n    for char in first_string:\n   \
    \     if char in first_word_hash_table:\n            first_word_hash_table[char]\
    \ += 1\n        else:\n            first_word_hash_table[char] = 1\n\n    for\
    \ char in second_string:\n        if char in second_word_hash_table:\n       \
    \     second_word_hash_table[char] += 1\n        else:\n            second_word_hash_table[char]\
    \ = 1\n\n    return first_word_hash_table == second_word_hash_table\n```\n\nIn\
    \ this algorithm, we iterate over each character from both strings just once,\
    \ which is N + M steps."
