- md: "## Code Implementation: Quicksort\n\nFollowing is a quicksort method we can\
    \ add to the previous SortableArray class that would successfully complete the\
    \ Quicksort:\n\n```python\ndef quicksort(self, left_index, right_index):\n   \
    \ if right_index - left_index <= 0:\n        return\n\n    pivot_index = self.partition(left_index,\
    \ right_index)\n\n    self.quicksort(left_index, pivot_index - 1)\n    self.quicksort(pivot_index\
    \ + 1, right_index)\n```\n\nThe code here is surprisingly concise, but let's look\
    \ at each line. For now, we'll skip over the first line of code, which represents\
    \ the base case. Let's jump straight to the meaty recursion.\n\nWe begin by partitioning\
    \ the range of elements between the `left_index` and `right_index`:\n\n```python\n\
    pivot_index = self.partition(left_index, right_index)\n```\n\nThe first time we\
    \ run quicksort, we partition the entire array. In subsequent calls, though, this\
    \ line of code partitions whatever range of elements that lies between the `left_index`\
    \ and `right_index`, which may be a subsection of the original array.\n\nNote\
    \ that we assign the return value of partition to a variable called `pivot_index`.\
    \ If you'll recall, this value was the `left_pointer` which pointed to the pivot\
    \ by the time the partition method was complete.\n\nWe then recursively call quicksort\
    \ on the subarrays to the left and right of the pivot:\n\n```python\nself.quicksort(left_index,\
    \ pivot_index - 1)\nself.quicksort(pivot_index + 1, right_index)\n```\n\nThe recursion\
    \ ends when we reach the base case, which is when the subarray at hand contains\
    \ no more than one element:\n\n```python\nif right_index - left_index <= 0:\n\
    \    return\n```\n\nWe can take our Quicksort implementation for a test drive\
    \ using the following code:\n\n```python\narray = [0, 5, 2, 1, 6, 3]\nsortable_array\
    \ = SortableArray(array)\nsortable_array.quicksort(0, len(array) - 1)\nprint(sortable_array.array)\n\
    ```\n\n## The Efficiency of Quicksort\n\nTo figure out the efficiency of Quicksort,\
    \ let's first determine the efficiency of a *single* partition.\n\nWhen we break\
    \ down the steps of a partition, we'll note that a partition involves two primary\
    \ types of steps:\n\n- *Comparisons*: We compare each of the values at hand to\
    \ the pivot.\n- *Swaps*: When appropriate, we swap the values being pointed to\
    \ by the left and right pointers.\n\nEach partition has at least N comparisons—that\
    \ is, we compare each element of the array with the pivot. This is true because\
    \ a partition always has the left and right pointers move through each cell until\
    \ the left and right pointers reach each other.\n\nThe number of swaps, however,\
    \ will depend upon how the data is sorted. A single partition can have, at most,\
    \ N / 2 swaps, as even if we'd swap values at every opportunity, each swap takes\
    \ care of two values. As you can see in the following diagram, we partition six\
    \ elements in just three swaps:\n\n![Diagram showing partitioning six elements\
    \ in three swaps](img/c0a46c67bb2536aa545ec1bd7065e742_224_0.png)\n\nNow, in most\
    \ cases, we're not making a swap every step of the way. For *randomly* sorted\
    \ data, we generally swap about half of the values. On average, then, we're making\
    \ about N / 4 swaps.\n\nSo on average, we make about N comparisons and N / 4 swaps.\
    \ We can say, then, that there are about 1.25N steps for N data elements. In Big\
    \ O notation, we ignore constants, so we'd say that a partition runs in O(N) time.\n\
    \nNow, that's the efficiency of a *single* partition. But Quicksort involves *many*\
    \ partitions, so we need to conduct further analysis to determine the efficiency\
    \ of Quicksort.\n\n### Quicksort from a Bird's-Eye View\n\nTo visualize this more\
    \ easily, see the [diagram on page 214](link_placeholder), depicting a typical\
    \ Quicksort on an array of eight elements from a bird's-eye view. In particular,\
    \ the diagram shows how many elements each partition acts upon. We've left out\
    \ the actual numbers from the array since the exact values don't matter. Note\
    \ that in the diagram, the active subarray is the group of cells that's not grayed\
    \ out.\n\n![Bird's-eye view diagram of Quicksort partitions](img/c0a46c67bb2536aa545ec1bd7065e742_225_0.png)\n\
    \nWe can see that we have eight partitions, but each partition takes place on\
    \ subarrays of various sizes. We perform a partition on the original array of\
    \ eight elements but also perform partitions on subarrays of sizes 4, 3, and 2,\
    \ and another four partitions on arrays of size 1.\n\nSince Quicksort is essentially\
    \ comprised of this series of partitions, and each partition takes about N steps\
    \ for N elements of each subarray, if we add the sizes of all the subarrays together,\
    \ we'll get the total number of steps Quicksort takes:\n\n- 8 elements\n- 3 elements\n\
    - 1 element\n- 1 element\n- 4 elements\n- 2 elements\n- 1 element\n- 1 element\n\
    \nTotal = About 21 steps\n\nWe see that where the original array has 8 elements,\
    \ Quicksort takes about 21 steps. This assumes a best- or average-case scenario,\
    \ where the pivot ends up roughly in the middle of the subarray after each partition.\n\
    \nFor an array of 16 elements, Quicksort takes about 64 steps, and for an array\
    \ of 32 elements, Quicksort takes about 160 steps. Take a look at this table:\n\
    \n| N | Quicksort Steps (approx.) |\n|---|---|\n| 4 | 8 |\n| 8 | 24 |\n| 16 |\
    \ 64 |\n| 32 | 160 |\n\n(While in our example earlier, the number of Quicksort\
    \ steps for an array of size 8 was 21, I put 24 in this table. The exact number\
    \ can vary from case to case, and 24 is also a reasonable approximation. I specifically\
    \ made it 24 to make the following explanation a little clearer.)\n\n## The Big\
    \ O of Quicksort\n\nHow do we categorize Quicksort in terms of Big O notation?\n\
    \nIf we look at the pattern shown earlier, we'll note that the number of Quicksort\
    \ steps for N elements in the array is about *N multiplied by log N*, as shown\
    \ in the following table:\n\n| N | log N | N * log N | Quicksort Steps (approx.)\
    \ |\n|---|---|---|---|\n| 4 | 2 | 8 | 8 |\n| 8 | 3 | 24 | 24 |\n| 16 | 4 | 64\
    \ | 64 |\n| 32 | 5 | 160 | 160 |\n\nIn fact, this is exactly how to express the\
    \ efficiency of Quicksort. It's an algorithm of *O(N log N)*. We've discovered\
    \ a new category of Big O!\n\nThe [graph on page 216](https://example.com) shows\
    \ how O(N log N) looks beside other categories of Big O.\n\nNow, it's not a coincidence\
    \ that the number of steps in Quicksort just happens to align with N * log N.\
    \ If we think about Quicksort more broadly, we can see *why* it's this way.\n\n\
    Each time we partition the array, we end up breaking it down into two subarrays.\
    \ Assuming the pivot ends up somewhere in the middle of the array—which is what\
    \ happens in the average case—these two subarrays are of roughly equal sizes.\n\
    \nHow many times can we break an array into halves until we've broken it completely\
    \ down to the point where each subarray is of size 1? For an array of size N,\
    \ this will take us log N times. Take a look at the following diagram:\n\n![Diagram\
    \ showing halving process](img/c0a46c67bb2536aa545ec1bd7065e742_227_0.png)\n\n\
    ![Diagram showing log N halvings for array of size 8](img/c0a46c67bb2536aa545ec1bd7065e742_227_1.png)\n\
    \nAs you can see, for an array of size 8, it takes us three halvings until we've\
    \ reduced the array into eight individual elements. This is log N, and fits with\
    \ our definition of log N as being the number of times it takes to halve something\
    \ until we reach 1.\n\nSo this is why Quicksort takes N * log N steps. We have\
    \ log N halvings, and for each halving, we perform a partition on all the subarrays\
    \ whose elements add up to N. (They add up to N because all the subarrays are\
    \ simply pieces of the original array of N elements.)\n\nThis is illustrated in\
    \ the previous diagram. At the top of the diagram, for example, we partition the\
    \ original array of eight elements, creating two sub-arrays of size 4. We then\
    \ partition both subarrays of size 4, which means that we're again partitioning\
    \ eight elements.\n\nBear in mind that O(N * log N) is just an approximation.\
    \ In reality, we first perform an extra O(N) partition on the original array as\
    \ well. Additionally, an array doesn't cleanly break into two even halves, since\
    \ the pivot is not part of the halving.\n\nHere's what a more realistic example\
    \ looks like, where we ignore the pivot after each partition:\n\n![Diagram showing\
    \ realistic partitioning](img/c0a46c67bb2536aa545ec1bd7065e742_228_0.png)\n\n\
    ## Quicksort in the Worst-Case Scenario\n\nFor many other algorithms we've encountered,\
    \ the best case was one where the array was already sorted. When it comes to Quicksort,\
    \ however, the best-case scenario is one in which the pivot always ends up smack\
    \ in the middle of the subarray after the partition. Interestingly, this generally\
    \ occurs when the values in the array are mixed up pretty well."
