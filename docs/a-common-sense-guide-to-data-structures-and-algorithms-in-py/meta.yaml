    \ 二叉搜索树删除的效率\n\n与搜索和插入一样，从树中删除通常也是 O(log N)。这是因为删除需要搜索加上一些额外的步骤来处理任何悬挂的子节点。与之相比，从有序数组中删除一个值是\
