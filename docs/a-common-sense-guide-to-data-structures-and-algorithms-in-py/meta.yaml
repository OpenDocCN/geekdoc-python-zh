  - "[PAGE 21]\n\n# CHAPTER 1\n\n# Why Data Structures Matter\n\nWhen people first\
    \ learn to code, their focus is—and *should* be—on getting their code to run properly.\
    \ Their code is measured using one simple metric: does the code actually work?\n\
    \nAs software engineers gain more experience, though, they begin to learn about\
    \ additional layers and nuances regarding the *quality* of their code. They learn\
    \ that there can be two snippets of code that both accomplish the same task, but\
    \ that one snippet is *better* than the other.\n\nThere are numerous measures\
    \ of code quality. One important measure is code maintainability. Maintainability\
    \ of code involves aspects such as the readability, organization, and modularity\
    \ of one’s code.\n\nHowever, another aspect of high-quality code is code *efficiency*.\
    \ For example, you can have two code snippets that both achieve the same goal,\
    \ but one *runs faster than the other*.\n\nTake a look at these two functions,\
    \ both of which print all the even numbers from 2 to 100:\n\n```\ndef print_numbers_version_one():\n\
    \    number = 2\n\n    while number <= 100:\n        # If number is even, print\
    \ it:\n        if number % 2 == 0:\n            print(number)\n\n        number\
    \ += 1\n```"
- md: "def print_numbers_version_two():\n    number = 2\n\n    while number <= 100:\n\
    \        print(number)\n\n        # Increase number by 2, which, by definition,\n\
    \        # is the next even number:\n        number += 2\n\nWhich of these functions\
    \ do you think runs faster?\n\nIf you said Version 2, you're right. This is because\
    \ Version 1 ends up looping 100 times, while Version 2 only loops 50 times. The\
    \ first version then, takes twice as many steps as the second version.\n\nThis\
    \ book is about writing *efficient* code. Having the ability to write code that\
    \ runs quickly is an important aspect of becoming a better software developer.\n\
    \nThe first step in writing fast code is to understand what data structures are\
    \ and how different data structures can affect the speed of our code. So let's\
    \ dive in.\n\n## Data Structures\n\nLet's talk about data.\n\n*Data* is a broad\
    \ term that refers to all types of information, down to the most basic numbers\
    \ and strings. In the simple but classic “Hello World!” program, the string “Hello\
    \ World!” is a piece of data. In fact, even the most complex pieces of data usually\
    \ break down into a bunch of numbers and strings.\n\n*Data structures* refer to\
    \ how data is *organized*. You're going to learn how the same data can be organized\
    \ in a variety of ways.\n\nLet's look at the following code:\n\n```\nx = \"Hello!\
    \ \"\ny = \"How are you \"\nz = \"today?\"\n\nprint(x + y + z)\n```\n\nThis simple\
    \ program deals with three pieces of data, outputting three strings to make one\
    \ coherent message. If we were to describe how the data is organized in this program,\
    \ we'd say that we have three independent strings, each contained within a single\
    \ variable.\n\nHowever, this same data can also be stored in an array:\n\n```\n\
    array = [\"Hello! \", \"How are you \", \"today?\"]\nprint(array[0] + array[1]\
    \ + array[2])\n```\n\nYou're going to learn in this book that the organization\
    \ of data doesn't just matter for organization's sake, but can significantly impact\
    \ *how fast your code runs*. Depending on how you choose to organize your data,\
    \ your program may run faster or slower by orders of magnitude. And if you're\
    \ building a program that needs to deal with lots of data, or a web app used by\
    \ thousands of people simultaneously, the data structures you select may affect\
    \ whether your software runs at all or simply conks out because it can't handle\
    \ the load.\n\nWhen you have a solid grasp on data structures' performance implications\
    \ on the software you're creating, you'll have the keys to write fast and elegant\
    \ code, and your expertise as a software engineer will be greatly enhanced.\n\n\
    In this chapter, we're going to begin our analysis of two data structures: arrays\
    \ and sets. While the two data structures may seem almost identical, you're going\
    \ to learn the tools to analyze the performance implications of each choice.\n\
    \n## The Array: The Foundational Data Structure\n\nThe *array* is one of the most\
    \ basic data structures in computer science. (In Python, the built-in array-like\
    \ data structure is called a *list*, but I'll refer to them as arrays, keeping\
    \ in line with the more general computer science term.) I assume you've worked\
    \ with arrays before, so you're aware that an array is a list of data elements.\
    \ The array is versatile and can serve as a useful tool in many situations, but\
    \ let's take a look at one quick example.\n\nIf you're looking at the source code\
    \ for an application that allows users to create and use shopping lists for the\
    \ grocery store, you might find code like this:\n\n```\narray = [\"apples\", \"\
    bananas\", \"cucumbers\", \"dates\", \"elderberries\"]\n```\n\nThis array happens\
    \ to contain five strings, each representing something that I might buy at the\
    \ supermarket. (You've *got* to try elderberries.)\n\nArrays come with their own\
    \ technical jargon.\n\nThe *size* of an array is how many data elements the array\
    \ holds. Our grocery list array has a size of 5 since it contains five values.\n\
    \nThe *index* of an array is the number that identifies where a piece of data\
    \ lives inside the array.\n\nIn most programming languages, we begin counting\
    \ the index at 0. So for our example array, \"apples\" is at index 0, and \"elderberries\"\
    \ is at index 4, like this:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_24_0.png)\n\
    \n## Data Structure Operations\n\nTo understand the performance of any data structure—such\
    \ as the array—we need to analyze the common ways our code might interact with\
    \ that data structure.\n\nMany data structures are used in four basic ways, which\
    \ we refer to as *operations*. These operations are:\n\n- *Read*: Reading refers\
    \ to looking something up at a particular spot within the data structure. With\
    \ an array, this means looking up a value at a particular index. For example,\
    \ looking up which grocery item is located at index 2 would be *reading* from\
    \ the array.\n- *Search*: Searching refers to looking for a particular value within\
    \ a data structure. With an array, this means looking to see if a particular value\
    \ exists within the array and, if so, at which index. For example, looking up\
    \ the index of \"dates\" in our grocery list would be *searching* the array.\n\
    - *Insert*: Insertion refers to adding a new value to our data structure. With\
    \ an array, this means adding a new value to an additional slot within the array.\
    \ If we were to add \"figs\" to our shopping list, we'd be *inserting* a new value\
    \ into the array.\n- *Delete*: Deletion refers to removing a value from our data\
    \ structure. With an array, this means removing one of the values from the array.\
    \ For example, if we removed \"bananas\" from our grocery list, this value would\
    \ be *deleted* from the array.\n\nIn this chapter, we'll analyze how fast each\
    \ of these operations is when applied to an array.\n\n## Measuring Speed\n\nSo\
    \ how do we measure the speed of an operation?\n\nIf you take away just one thing\
    \ from this book, let it be this: when we measure how “fast” an operation is,\
    \ we do not refer to how fast the operation takes in terms of pure *time*, but\
    \ instead in how many *steps* it takes.\n\nWe’ve actually seen this earlier in\
    \ the context of printing the even numbers from 2 to 100. The second version of\
    \ that function was faster because it took half as many steps as the first version\
    \ did.\n\nWhy do we measure code’s speed in terms of steps?\n\nWe do this because\
    \ we can never say definitively that any operation takes, say, five seconds. While\
    \ a piece of code may take five seconds on a particular computer, that same piece\
    \ of code may take longer on an older piece of hardware. For that matter, that\
    \ same code might run much faster on the supercomputers of tomorrow. Measuring\
    \ the speed of an operation in terms of time is undependable, since the time will\
    \ always change depending on the hardware it’s run on.\n\nHowever, we *can* measure\
    \ the speed of an operation in terms of how many computational *steps* it takes.\
    \ If Operation A takes 5 steps, and Operation B takes 500 steps, we can assume\
    \ that Operation A will always be faster than Operation B on *all* pieces of hardware.\
    \ Measuring the number of steps is, therefore, the key to analyzing the speed\
    \ of an operation.\n\nMeasuring the speed of an operation is also known as measuring\
    \ its *time complexity*. Throughout this book, I’ll use the terms *speed*, *time\
    \ complexity*, *efficiency*, *performance*, and *runtime* interchangeably. They\
    \ all refer to the number of steps a given operation takes.\n\nLet’s jump into\
