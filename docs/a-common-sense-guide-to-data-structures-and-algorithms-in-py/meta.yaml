    \n有什么方法可以改进这个算法吗？\n\n这就是考虑最坏情况之外的情况变得重要的地方。在当前交集函数的实现中，我们在*所有*情况下都进行 N² 次比较，无论数组是否相同，或者数组是否没有一个共同值。\n\
