    When we think about it further, this third pattern is a logical outgrowth of the
    other patterns. Since a swap causes the two arrays to shift their sums by the
    same amount, the *only* way to make their sums equal is to meet in the middle.


    Based on this, if we know the sums of the two arrays, we should be able to look
    at any number in one of the arrays and calculate what number it should be swapped
    with.


    Let''s take this example again:


    ```

    array_1 = [5, 3, 3, 7]  Sum: 18

    array_2 = [4, 1, 1, 6]  Sum: 12

    ```


    We know that for a swap to work successfully, we''ll need the two arrays'' sums
    to land in the middle. The exact middle between 18 and 12 is 15.


    Let''s look at different numbers from array_1 and figure out what number we''d
    want to swap it with. We can call this other number its counterpart. Let''s start
    with the first number from array_1, which is the number 5.


    What number would we want to swap the 5 with? Well, we know that we want array_1
    to decrease by 3, and array_2 to increase by 3, so we''d need to swap the 5 with
    a number 2. It just so happens that array_2 doesn''t contain a 2, so the 5 cannot
    be successfully swapped with any number from array_2.'
