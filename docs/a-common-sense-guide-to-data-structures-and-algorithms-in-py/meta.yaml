    \ or reach the end of the list."
- md: "## Insertion\n\nAdmittedly, linked lists have yet to impress us from a performance\
    \ standpoint. They're no better than arrays at search, and much worse at reading.\
    \ But not to worry—linked lists will have their moment. In fact, that moment is\
    \ now.\n\nInsertion is one operation in which linked lists have a distinct advantage\
    \ over arrays *in certain situations*.\n\nRecall that the worst-case scenario\
    \ for insertion into an array is when the program inserts data into index 0, because\
    \ it first has to shift the rest of the data one cell to the right, which ends\
    \ up yielding an efficiency of O(N). With linked lists, however, insertion at\
    \ the beginning of the list takes just one step—which is O(1). Let's see why.\n\
    \nSay we have the following linked list:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_244_0.png)\n\
    \nIf we want to add \"yellow\" to the beginning of the list, all we have to do\
    \ is create a new node and have its link point to the node containing \"blue\"\
    :\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_244_1.png)\n\n(In our code, we'd\
    \ also need to update the LinkedList instance so that its first_node attribute\
    \ now points to this \"yellow\" node.)\n\nIn contrast with an array, the linked\
    \ list provides the flexibility of inserting data to the front of the list without\
    \ requiring the shifting of any data. How sweet is that?\n\nThe truth is that,\
    \ theoretically, inserting data *anywhere* within a linked list takes just one\
    \ step, but there's one gotcha. Let's continue with our example. Here's our linked\
    \ list now:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_244_2.png)\n\nSay we now\
    \ want to insert \"purple\" at index 2 (which would be between \"blue\" and \"\
    green\"). The actual insertion takes just one step; that is, we can create the\
    \ new purple node and simply change the blue node's link to point to the purple\
    \ node, as shown here:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_245_0.png)\n\
    \nHowever, for the computer to do this, it first needs to *get to* the node at\
    \ index 1 (\"blue\") so that it can modify its link to point to the newly created\
    \ node. As we've seen, though, reading—which is accessing an item at a given index—from\
    \ a linked list already takes O(N). Let's see this in action.\n\nWe know that\
    \ we want to add a new node after index 1. So the computer needs to get to index\
    \ 1 of the list. To do this, we must start at the beginning of the list:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_245_1.png)\n\
    \nWe then access the next node by following the first link:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_245_2.png)\n\
    \nNow that we've found index 1, we can finally add the new node:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_245_3.png)\n\
    \nIn this case, adding \"purple\" took three steps. If we were to add it to the\
    \ *end* of our list, it would take five steps: four steps to access index 3 and\
    \ one step to insert the new node.\n\nPractically speaking, then, inserting into\
    \ a linked list is O(N), as the worst-case scenario of inserting at the end of\
    \ the list will take N + 1 steps.\n\nHowever, we've seen that the best-case scenario\
    \ of inserting at the *beginning* of the list is only O(1).\n\nInterestingly,\
    \ our analysis shows that the best- and worst-case scenarios for arrays and linked\
    \ lists are the opposite of one another. The following table breaks this all down:\n\
    \n| Scenario | Array | Linked List |\n| :--- | :--- | :--- |\n| Insert at beginning\
    \ | Worst case | Best case |\n| Insert at middle | Average case | Average case\
    \ |\n| Insert at end | Best case | Worst case |\n\nAs you can see, arrays favor\
    \ insertions at the end, while linked lists favor insertions at the beginning.\n\
    \nWe've now found one thing that linked lists are great at—inserting things at\
    \ the beginning of the list. Later in this chapter, we'll see a great practical\
    \ example of where we can take advantage of this.\n\n## Code Implementation: Linked\
    \ List Insertion\n\nLet's add an insertion method to our `LinkedList` class. We'll\
    \ call it `insert`:\n\n```\ndef insert(self, index, value):\n    new_node = node.Node(value)\n\
    \n    if index == 0:\n        new_node.next_node = self.first_node\n        self.first_node\
    \ = new_node\n        return\n\n    current_node = self.first_node\n    current_index\
    \ = 0\n\n    while current_index < (index - 1):\n        current_node = current_node.next_node\n\
    \        current_index += 1\n\n    new_node.next_node = current_node.next_node\n\
    \    current_node.next_node = new_node\n```\n\nTo use the method, we pass in both\
    \ the new value as well as the index of where we want to insert it.\n\nFor example,\
    \ to insert \"purple\" at index 2, we'd say this:\n\n```\nlist.insert(2, \"purple\"\
    )\n```\n\nLet's break this insert method down.\n\nFirst, we create a new Node\
    \ instance with the value provided to our method:\n\n```\nnew_node = node.Node(value)\n\
    ```\n\n(Here, the node from node.Node refers to the node module we imported at\
    \ the beginning of the file, as we placed the Node class in a separate file from\
    \ the LinkedList class.)\n\nNext, we deal with the case where we're inserting\
    \ into index 0—that is, at the beginning of our list. The algorithm for this case\
    \ is different than if we insert elsewhere into the list, so we deal with this\
    \ case separately.\n\nTo insert at the beginning of the list, we simply have our\
    \ new_node link to the first node of the list and declare our new_node to be the\
    \ first node going forward:\n\n```\nif index == 0:\n    new_node.next_node = self.first_node\n\
    \    self.first_node = new_node\n    return\n```\n\nThe return keyword ends the\
    \ method early, as there's nothing left to do.\n\nThe rest of the code deals with\
    \ a case in which we're inserting anywhere other than at the beginning.\n\nAs\
    \ with reading and searching, we start off by accessing the head of the list:\n\
    \n```\ncurrent_node = self.first_node\ncurrent_index = 0\n```\n\nWe then use a\
    \ while loop to access the node just before the spot where we want to insert our\
    \ new_node:\n\n```\nwhile current_index < (index - 1):\n    current_node = current_node.next_node\n\
    \    current_index += 1\n```\n\nAt this point, the current_node is the node that'll\
    \ immediately precede our new_node.\n\nNext, we set the link of our new_node to\
    \ point to the node after the current_node:\n\n```\nnew_node.next_node = current_node.next_node\n\
    ```\n\nFinally, we change the link of the current_node (which, again, is to be\
    \ the node that precedes our new_node) to point to our new_node:\n\n```\ncurrent_node.next_node\
    \ = new_node\n```\n\nAnd we're done!\n\n## Deletion\n\nLinked lists also shine\
    \ when it comes to deletion, especially when deleting from the beginning of the\
    \ list.\n\nTo delete a node from the beginning of a linked list, all we need to\
    \ do is perform one step: we change the `first_node` of the linked list to now\
    \ point to the second node.\n\nLet's return to our example of the linked list\
    \ containing the values \"once\", \"upon\", \"a\", and \"time\". If we want to\
    \ delete the value \"once\", we could simply change the linked list to begin at\
    \ \"upon\":\n\n```\nlist.first_node = node_2\n```\n\nContrast this with an array,\
    \ in which deleting the first element means shifting all remaining data one cell\
    \ to the left, which takes O(N) time.\n\nWhen it comes to deleting the *final*\
    \ node of a linked list, the actual deletion takes one step—we just take the second-to-last\
    \ node and make its link None. However, it takes N steps to even access the second-to-last\
    \ node in the first place, since we need to start at the beginning of the list\
    \ and follow the links until we reach it.\n\nThe following table contrasts the\
    \ various scenarios of deletion for both arrays and linked lists. Note how it's\
    \ identical to insertion:\n\n| Situation | Array | Linked List |\n| :--- | :---\
    \ | :--- |\n| Delete at beginning | Worst case | Best case |\n| Delete at middle\
    \ | Average case | Average case |\n| Delete at end | Best case | Worst case |\n\
    \nWhile deleting from the beginning or end of a linked list is straightforward,\
    \ deleting from anywhere in the middle is slightly more involved.\n\nSay we want\
    \ to delete the value at index 2 (\"purple\") from our example linked list of\
    \ colors, as shown in the following diagram:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_248_0.png)\n\
    \nTo accomplish this, we need to first access the node immediately *preceding*\
    \ the one we're deleting (\"blue\"). Then we change its link to point to the node\
    \ that is immediately *after* the node we're deleting (\"green\")."
  mdcn: "## 插入\n\n诚然，从性能角度来看，链表尚未给我们留下深刻印象。在搜索方面，它们并不比数组更好，而在读取方面则差得多。但不用担心——链表终将大放异彩。事实上，那个时刻就是现在。\n\
    \n在*某些情况下*，插入是链表相对于数组具有明显优势的一种操作。\n\n回想一下，向数组中插入数据的最坏情况是程序将数据插入到索引 0 处，因为它必须先将其余数据向右移动一个单元，最终导致效率为\
    \ O(N)。然而，对于链表，在列表开头插入只需一步——即 O(1)。让我们看看原因。\n\n假设我们有以下链表：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_244_0.png)\n\
    \n如果我们要在列表开头添加 \"yellow\"，我们只需创建一个新节点，并让它的链接指向包含 \"blue\" 的节点：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_244_1.png)\n\
    \n（在我们的代码中，我们还需要更新 LinkedList 实例，使其 first_node 属性现在指向这个 \"yellow\" 节点。）\n\n与数组相比，链表提供了在列表前端插入数据的灵活性，而无需移动任何数据。这多好啊！\n\
    \n事实上，理论上，在链表中*任何位置*插入数据只需一步，但有一个陷阱。让我们继续我们的例子。这是我们的链表现在的样子：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_244_2.png)\n\
    \n假设我们现在想在索引 2 处（即 \"blue\" 和 \"green\" 之间）插入 \"purple\"。实际的插入只需一步；也就是说，我们可以创建新的\
    \ purple 节点，并简单地将 blue 节点的链接更改为指向 purple 节点，如下所示：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_245_0.png)\n\
    \n然而，为了让计算机做到这一点，它首先需要*到达*索引 1 处的节点（\"blue\"），以便修改其链接以指向新创建的节点。不过，正如我们所看到的，从链表中读取——即访问给定索引处的项目——已经需要\
    \ O(N)。让我们看看实际操作。\n\n我们知道我们想在索引 1 之后添加一个新节点。因此计算机需要到达列表的索引 1。为此，我们必须从列表的开头开始：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_245_1.png)\n\n然后我们通过第一个链接访问下一个节点：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_245_2.png)\n\n现在我们已经找到了索引 1，我们终于可以添加新节点了：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_245_3.png)\n\n在这种情况下，添加 \"purple\"\
    \ 花了三步。如果我们要将其添加到列表的*末尾*，则需要五步：四步访问索引 3，一步插入新节点。\n\n因此，实际上，向链表中插入的时间复杂度是 O(N)，因为在列表末尾插入的最坏情况需要\
    \ N + 1 步。\n\n然而，我们已经看到，在列表*开头*插入的最佳情况仅为 O(1)。\n\n有趣的是，我们的分析表明，数组和链表的最佳情况和最坏情况正好相反。下表对此进行了分解：\n\
    \n| 场景 | 数组 | 链表 |\n| :--- | :--- | :--- |\n| 在开头插入 | 最坏情况 | 最佳情况 |\n| 在中间插入 |\
    \ 平均情况 | 平均情况 |\n| 在末尾插入 | 最佳情况 | 最坏情况 |\n\n如你所见，数组有利于在末尾插入，而链表有利于在开头插入。\n\n我们现在发现了一件链表非常擅长的事情——在列表开头插入内容。在本章后面，我们将看到一个很好的实际例子，说明我们可以如何利用这一点。\n\
    \n## 代码实现：链表插入\n\n让我们为我们的 `LinkedList` 类添加一个插入方法。我们将其命名为 `insert`：\n\n```\ndef\
    \ insert(self, index, value):\n    new_node = node.Node(value)\n\n    if index\
    \ == 0:\n        new_node.next_node = self.first_node\n        self.first_node\
    \ = new_node\n        return\n\n    current_node = self.first_node\n    current_index\
    \ = 0\n\n    while current_index < (index - 1):\n        current_node = current_node.next_node\n\
    \        current_index += 1\n\n    new_node.next_node = current_node.next_node\n\
    \    current_node.next_node = new_node\n```\n\n要使用该方法，我们需要传入新值以及要插入的位置索引。\n\n\
    例如，要在索引 2 处插入 \"purple\"，我们会这样写：\n\n```\nlist.insert(2, \"purple\")\n```\n\n让我们分解一下这个\
    \ insert 方法。\n\n首先，我们使用提供给方法的值创建一个新的 Node 实例：\n\n```\nnew_node = node.Node(value)\n\
    ```\n\n（这里，node.Node 中的 node 指的是我们在文件开头导入的 node 模块，因为我们将 Node 类放在了与 LinkedList\
    \ 类不同的文件中。）\n\n接下来，我们处理在索引 0 处插入的情况——即在列表的开头。这种情况的算法与在列表其他位置插入不同，因此我们单独处理这种情况。\n\
    \n要在列表开头插入，我们只需让 new_node 链接到列表的第一个节点，并声明我们的 new_node 从现在起成为第一个节点：\n\n```\nif\
    \ index == 0:\n    new_node.next_node = self.first_node\n    self.first_node =\
    \ new_node\n    return\n```\n\nreturn 关键字会提前结束方法，因为没有其他事情可做了。\n\n其余代码处理在开头以外的任何位置插入的情况。\n\
    \n与读取和搜索一样，我们首先访问列表的头部：\n\n```\ncurrent_node = self.first_node\ncurrent_index\
    \ = 0\n```\n\n然后我们使用 while 循环访问我们想要插入 new_node 的位置之前的那个节点：\n\n```\nwhile current_index\
    \ < (index - 1):\n    current_node = current_node.next_node\n    current_index\
    \ += 1\n```\n\n此时，current_node 就是紧接在 new_node 之前的节点。\n\n接下来，我们将 new_node 的链接设置为指向\
    \ current_node 之后的节点：\n\n```\nnew_node.next_node = current_node.next_node\n```\n\
    \n最后，我们更改 current_node（再次强调，它将是紧接在 new_node 之前的节点）的链接，使其指向我们的 new_node：\n\n```\n\
    current_node.next_node = new_node\n```\n\n这样就完成了！\n\n## 删除\n\n链表在删除方面也表现出色，尤其是在从列表开头删除时。\n\
    \n要从链表的开头删除一个节点，我们只需执行一步：将链表的 `first_node` 更改为现在指向第二个节点。\n\n让我们回到包含值 \"once\"\
    、\"upon\"、\"a\" 和 \"time\" 的链表示例。如果我们想删除值 \"once\"，我们只需将链表更改为从 \"upon\" 开始：\n\n\
    ```\nlist.first_node = node_2\n```\n\n与数组相比，删除第一个元素意味着将所有剩余数据向左移动一个单元，这需要 O(N)\
    \ 时间。\n\n当涉及到删除链表的*最后一个*节点时，实际的删除只需一步——我们只需将倒数第二个节点的链接设为 None。然而，要访问倒数第二个节点本身就需要\
    \ N 步，因为我们需要从列表的开头开始，沿着链接直到到达它。\n\n下表对比了数组和链表在各种删除场景下的情况。请注意，它与插入完全相同：\n\n| 情况\
    \ | 数组 | 链表 |\n| :--- | :--- | :--- |\n| 在开头删除 | 最坏情况 | 最佳情况 |\n| 在中间删除 | 平均情况\
