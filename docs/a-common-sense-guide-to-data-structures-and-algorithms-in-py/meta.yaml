  md: "```\nclass SortableArray:\n    def __init__(self, array):\n        self.array\
    \ = array\n\n    def partition(self, left_pointer, right_pointer):\n        pivot_index\
    \ = right_pointer\n        pivot = self.array[pivot_index]\n\n        right_pointer\
    \ -= 1\n\n        while True:\n            while self.array[left_pointer] < pivot:\n\
    \                left_pointer += 1\n\n            while self.array[right_pointer]\
    \ > pivot:\n                right_pointer -= 1\n\n            if left_pointer\
    \ >= right_pointer:\n                break\n            else:\n              \
    \  self.array[left_pointer], self.array[right_pointer] = \\n                 \
    \   self.array[right_pointer], self.array[left_pointer]\n                left_pointer\
    \ += 1\n\n        self.array[left_pointer], self.array[pivot_index] = \\n    \
    \        self.array[pivot_index], self.array[left_pointer]\n\n        return left_pointer\n\
    ```\n\nLet's break this code down a bit.\n\nThe partition method accepts the starting\
    \ points of the left and right pointers as parameters:\n\n```\ndef partition(self,\
    \ left_pointer, right_pointer):\n```\n\nWhen this method is first called on an\
    \ array, these pointers will point to the left and right ends of the array, respectively.\
    \ However, we'll see that Quicksort will call this method on subsections of the\
