- img_proc: true
  md: 'However, this same data can also be stored in an array:


    ```

    array = ["Hello! ", "How are you ", "today?"]

    print(array[0] + array[1] + array[2])

    ```


    You''re going to learn in this book that the organization of data doesn''t just
    matter for organization''s sake, but can significantly impact *how fast your code
    runs*. Depending on how you choose to organize your data, your program may run
    faster or slower by orders of magnitude. And if you''re building a program that
    needs to deal with lots of data, or a web app used by thousands of people simultaneously,
    the data structures you select may affect whether your software runs at all or
    simply conks out because it can''t handle the load.


    When you have a solid grasp on data structures'' performance implications on the
    software you''re creating, you''ll have the keys to write fast and elegant code,
    and your expertise as a software engineer will be greatly enhanced.


    In this chapter, we''re going to begin our analysis of two data structures: arrays
    and sets. While the two data structures may seem almost identical, you''re going
    to learn the tools to analyze the performance implications of each choice.


    # The Array: The Foundational Data Structure


    The *array* is one of the most basic data structures in computer science. (In
    Python, the built-in array-like data structure is called a *list*, but I''ll refer
    to them as arrays, keeping in line with the more general computer science term.)
    I assume you''ve worked with arrays before, so you''re aware that an array is
    a list of data elements. The array is versatile and can serve as a useful tool
    in many situations, but let''s take a look at one quick example.


    If you''re looking at the source code for an application that allows users to
    create and use shopping lists for the grocery store, you might find code like
    this:


    ```

    array = ["apples", "bananas", "cucumbers", "dates", "elderberries"]

    ```


    This array happens to contain five strings, each representing something that I
    might buy at the supermarket. (You''ve *got* to try elderberries.)


    Arrays come with their own technical jargon.


    The *size* of an array is how many data elements the array holds. Our grocery
    list array has a size of 5 since it contains five values.


    The *index* of an array is the number that identifies where a piece of data lives
    inside the array.'
