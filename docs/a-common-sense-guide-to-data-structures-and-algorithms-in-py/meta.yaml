  mdcn: "最快的排序算法时间复杂度为 O(N log N) 这一事实很重要，因为它对其他算法也有影响。这是因为有些算法会将排序作为更大流程的一个组成部分。\n\
    \n例如，如果你还记得第 4 章《使用大 O 表示法加速代码》（第 47 页）的内容，我们曾处理过检查数组中是否存在重复值的问题。\n\n我们研究的第一个解决方案涉及嵌套循环，其效率为\
    \ O(N²)。虽然我们找到了一个时间复杂度为 O(N) 的解决方案，但我曾顺带暗示过这种方法的一个缺点，即与额外的内存消耗有关。（我最终会在第 19 章《处理空间限制》（第\
    \ 385 页）中详细讨论这一点。）那么，假设 O(N) 的方法不可行。我们还有其他方法可以改进二次时间复杂度 O(N²) 的解决方案吗？提示：解决方案与排序有关！\n\
    \n如果我们先对数组进行排序，就能构建出一个优美的算法。\n\n假设原始数组是 [5, 9, 3, 2, 4, 5, 6]。这个数组中有两个 5，所以我们确实存在重复值的情况。\n\
    \n现在，如果我们先对这个数组进行排序，它会变成 [2, 3, 4, 5, 5, 6, 9]。\n\n接下来，我们可以使用单个循环遍历每个数字。在检查每个数字时，我们会检查它是否与*下一个*数字相同。如果相同，我们就找到了一个重复值。如果循环结束都没有找到重复值，那么我们就知道没有重复值。\n\
    \n这里的技巧在于，通过预先排序，我们最终将重复的数字聚集在了一起。\n\n在我们的例子中，我们会从第一个数字开始，也就是 2。我们会检查它是否与下一个数字相同。下一个数字是\
    \ 3，所以它们不是重复值。\n\n然后我们会将 3 与下一个数字进行比较，下一个数字恰好是 4，这样我们就可以继续下去。我们会将 4 与 5 进行比较，然后再次继续。\n\
    \n此时，我们会检查第一个 5，并将其与下一个数字（即第二个 5）进行比较。啊哈！我们找到了一对重复的数字，可以返回 true。\n\n以下是该算法的 Python\
    \ 实现：\n\n```python\ndef has_duplicate_value(array):\n    array.sort()\n    for\
    \ index in range(len(array) - 1):\n        if array[index] == array[index + 1]:\n\
    \            return True\n    return False\n```\n\n现在，这是一个将排序作为其组成部分之一的算法。这个算法的大\
    \ O 表示法是什么？\n\n我们首先对数组进行排序。我们可以假设 Python 的 sort() 函数在底层使用了类似快速排序的方法，其效率为 O(N log\
    \ N)。接下来，我们花费最多 N 步来遍历数组。因此，我们的算法总共需要 (N log N) + N 步。\n\n你已经学过，当我们将多个阶数相加时，大\
    \ O 表示法只保留 N 的最高阶数，因为低阶数在高阶数面前是微不足道的。这里也是如此，N 在 N log N 面前是微不足道的，所以我们将其简化为 O(N\
    \ log N)。\n\n所以，就是这样！我们利用排序开发了一个时间复杂度为 O(N log N) 的算法，这比原始的 O(N²) 算法有了显著的改进。\n\
    \n许多算法都将排序作为更大流程的一部分。我们现在知道，任何时候我们这样做，我们的算法的时间复杂度就*至少*是 O(N log N)。当然，如果算法还有其他操作，它可能会比这更慢，但我们知道\
    \ O(N log N) 将始终是基准。\n\n## 总结\n\n快速排序和快速选择算法是递归算法，它们为棘手的问题提供了优美而高效的解决方案。它们是非显而易见但经过深思熟虑的算法如何提升性能的绝佳例子。\n\
    \n既然我们已经看了一些更高级的算法，我们现在将转向一个新的方向，探索大量额外的数据结构。其中一些数据结构的操作涉及递归，因此我们现在将做好充分准备来处理它们。除了它们真的很有趣之外，我们还将看到每种数据结构都有其特殊的能力，可以为各种应用带来显著的优势。\n\
    \n## 练习\n\n以下练习为你提供了练习快速排序的机会。这些练习的答案可以在第 13 章（第 447 页）中找到。\n\n1.  给定一个正数数组，编写一个函数，返回任意三个数字的最大乘积。使用三个嵌套循环的方法时间复杂度为\
    \ O(N^3)，这非常慢。请使用排序来实现该函数，使其计算速度达到 O(N log N)。（其他一些实现甚至更快，但我们专注于使用排序作为加速代码的技术。）\n\
    \n2.  以下函数用于从整数数组中找到缺失的数字；也就是说，该数组预期包含从 0 到数组长度的所有整数，但缺少一个。例如，数组 [5, 2, 4, 1,\
    \ 0] 缺少数字 3，数组 [9, 3, 2, 5, 6, 7, 1, 0, 4] 缺少数字 8。\n\n    这是一个时间复杂度为 O(N^2) 的实现（子句\
    \ `if number not in array` 本身已经是 O(N)，因为计算机需要搜索整个数组来查找 number）：\n\n    ```python\n\
    \    def find_missing_number(array):\n        for number in range(len(array) +\
    \ 1):\n            if number not in array:\n                return number\n  \
    \      return None\n    ```\n\n    使用排序编写一个新的实现，使其时间复杂度仅为 O(N log N)。（其他一些实现甚至更快，但我们专注于使用排序作为加速代码的技术。）\n\
    \n3.  编写三个不同的函数实现，用于找到数组中的最大数字。编写一个时间复杂度为 O(N^2) 的函数，一个为 O(N log N)，一个为 O(N)。\n\
    \n# 第 14 章\n\n## 基于节点的数据结构\n\n在接下来的几章中，我们将探索各种数据结构，它们都建立在一个单一概念之上——*节点*。正如你很快将看到的，节点是可能分散在计算机内存各处的数据片段。基于节点的数据结构提供了组织和访问数据的新方式，这些方式带来了许多主要的性能优势。\n\
    \n在本章中，我们将探索链表，这是最简单的基于节点的数据结构，也是后续章节的基础。你会发现链表与数组几乎完全相同，但在效率方面有其自身的权衡，这可以在某些情况下为我们带来性能提升。\n\
    \n## 链表\n\n与数组一样，*链表*是一种表示项目列表的数据结构。虽然表面上数组和链表看起来和行为都很相似，但在底层存在很大差异。\n\n正如第 1\
    \ 章《为什么数据结构很重要》（第 1 页）中提到的，计算机内部的内存可以被可视化为一个巨大的单元格集合，其中存储着数据位。你已经了解到，创建数组时，你的代码会在内存中找到一组连续的空单元格，并指定它们来存储你的应用程序的数据，如第\
    \ 228 页所示。\n\n你还看到计算机有能力一步访问任何内存地址，并利用这一能力立即访问数组中的任何索引。如果你编写代码说“查找索引 4 处的值”，你的计算机可以在一步内定位到该单元格。同样，这是因为你的程序知道数组从哪个内存地址开始——比如内存地址\
    \ 1000——因此知道如果要查找索引 4，它应该直接跳转到内存地址 1004。\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_238_0.png)\n\
    \n另一方面，链表的工作方式不同。链表的数据不是连续的内存块，而是可以分散在计算机内存的不同单元格中。\n\n分散在内存中的相互连接的数据被称为*节点*。在链表中，每个节点代表列表中的一个项目。那么，关键问题是：如果节点在内存中不相邻，计算机如何知道哪些节点属于同一个链表？\n\
    \n这就是链表的关键：每个节点还附带一点额外的信息——即列表中*下一个*节点的内存地址。\n\n这额外的数据——这个指向下一个节点内存地址的指针——被称为*链接*。以下是链表的可视化描述：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_238_1.png)\n\n在这个例子中，我们有一个包含四个数据项的链表：\"\
    a\"、\"b\"、\"c\" 和 \"d\"。然而，它使用了*八个*内存单元格来存储这些数据，因为每个节点由两个内存单元格组成。第一个单元格保存实际数据，而第二个单元格用作链接，指示下一个节点在内存中的位置。"
