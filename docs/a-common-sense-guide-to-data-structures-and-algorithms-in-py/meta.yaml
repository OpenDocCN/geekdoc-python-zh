  - '[PAGE 130]


    BAD converts to 214.


    This process of taking characters and converting them to numbers is known as *hashing*.
    And the code that is used to convert those letters into particular numbers is
    called a *hash function*.


    Many other hash functions exist besides this one. Another example of a hash function
    may be to take each letter’s corresponding number and return the *sum* of all
    the numbers. If we did that, BAD would become the number 7 following a two-step
    process:


    Step 1: First, BAD converts to 214.


    Step 2: We then take each of these digits and get their sum:


    2 + 1 + 4 = 7


    Another example of a hash function may be to return the *product* of all the letters’
    corresponding numbers. This would convert the word BAD into the number 8:


    Step 1: First, BAD converts to 214.


    Step 2: We then take the product of these digits:


    2 * 1 * 4 = 8


    In our examples for the remainder of this chapter, we’re going to stick with this
    last version of the hash function. Real-world hash functions are more complex
    than this, but this multiplication hash function will keep our examples clear
    and simple.


    The truth is that a hash function needs to meet only one criterion to be valid:
    a hash function must convert the same string to the *same number* every single
    time it’s applied. If the hash function can return inconsistent results for a
    given string, it’s not valid.


    Examples of invalid hash functions include functions that use random numbers or
    the current time as part of their calculation. With these functions, BAD might
    convert to 12 one time and 106 another time.


    With our multiplication hash function, however, BAD will *always* convert to 8.
    That’s because B is always 2, A is always 1, and D is always 4. And 2 * 1 * 4
    is *always* 8. There’s no way around this.


    Note that with this hash function, DAB will *also* convert into 8 just as BAD
    will. This will cause some issues that I’ll address later.'
  - '[PAGE 131]


    Armed with the concept of hash functions, we can now understand how a hash table
    works.


    # Building a Thesaurus for Fun and Profit, but Mainly Profit


    On nights and weekends, you''re single-handedly working on a stealth startup that
    will take over the world. It''s...a thesaurus app. But this isn''t any *old* thesaurus
    app—this is Quickasaurus. And you know that it will totally disrupt the billion-dollar
    thesaurus market. When a user looks up a word in Quickasaurus, it returns just
    *one* synonym, instead of *every* possible synonym, as old-fashioned thesaurus
    apps do.


    Since every word has an associated synonym, this is a great use case for a hash
    table. After all, a hash table is a list of paired items. Let''s get started.


    We can represent our thesaurus using a hash table:


    ```

    thesaurus = {}

    ```


    Under the hood, a hash table stores its data in a bunch of cells in a row, similar
    to an array. Each cell has a corresponding number. For example:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_131_0.png)


    (We left off index 0 since nothing would be stored there given our multiplication
    hash function.)


    Let''s add our first entry into the hash table:


    ```

    thesaurus["bad"] = "evil"

    ```


    In code, our hash table now looks like this:


    ```

    {"bad": "evil"}

    ```


    Let''s explore how the hash table stores this data.


    First, the computer applies the hash function to the key. Again, we''ll be using
    the multiplication hash function described previously. So this would compute as:


    ```

    BAD = 2 * 1 * 4 = 8

    ```'
  - '[PAGE 132]


    Since our key ("bad") hashes into 8, the computer places the value ("evil") into
    cell 8:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_132_0.png)


    Now, let''s add another key-value pair:


    ```

    thesaurus["cab"] = "taxi"

    ```


    Again, the computer hashes the key:


    CAB = 3 * 1 * 2 = 6


    Since the resulting value is 6, the computer stores the value ("taxi") inside
    cell 6.


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_132_1.png)


    Let''s add one more key-value pair:


    ```

    thesaurus["ace"] = "star"

    ```


    To sum up what''s happening here: for every key-value pair, each *value* is stored
    at the *index* of the *key*, after the key has been hashed.


    ACE hashes into 15, since ACE = 1 * 3 * 5 = 15, so "star" gets placed into cell
    15:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_132_2.png)


    In code, our hash table currently looks like this:


    ```

    {"bad": "evil", "cab": "taxi", "ace": "star"}

    ```


    # Hash Table Lookups


    When we look up items from a hash table, we use a key to find its associated value.
    Let''s see how this works with our Quickasaurus example hash table.


    Suppose we want to look up the value associated with the key "bad". In our code,
    we''d say:


    ```

    thesaurus.get("bad")

    ```'
  - '[PAGE 133]


    To find the value associated with "bad", the computer executes two simple steps:


    +   1. The computer hashes the key we''re looking up: BAD = 2 * 1 * 4 = 8.

    2. Since the result is 8, the computer looks inside cell 8 and returns the value
    stored there. In this case, that is the string "evil".


    Let''s take a step back and look at the big picture here. In a hash table, the
    placement of each value is determined by its key; that is, by hashing the key
    itself, we compute the index number where the key''s associated value should be
    placed.


    Because the key determines the placement of the value, we use this principle to
    make lookups a cinch. When we have any key and want to find its value, the key
    itself tells us where the value will be found. Just as we hashed the key to insert
    the value in the appropriate cell, we can hash the key again to find where we
    previously put that value.


    It now becomes clear why looking up a value in a hash table is typically O(1):
    it''s a process that takes a constant amount of time. The computer hashes the
    key, turns it into a number, and jumps to the index with that number to retrieve
    the value stored there.


    We can now understand why a hash table would yield faster lookups for our restaurant
    menu than an array. With an array, when we look up the price of a menu item, we
    would have to search through each cell until we find it. For an unordered array,
    this would take up to O(N), and for an ordered array, this would take up to O(log
    N). Using a hash table, however, we can now use the actual menu items as keys,
    allowing us to do a hash table lookup of O(1). And *that''s* the beauty of a hash
    table.


    # One-Directional Lookups


    It''s important to point out that the ability to find any value within the hash
    table in a single step only works if we know the value''s key. If we tried to
    find a particular value without knowing its key, we''d still have to resort to
    searching each and every key-value pair within the hash table, which is O(N).


    Similarly, we can only do O(1) lookups when using a *key* to find the *value*.
    If, on the other hand, we want to use a *value* to find its associated *key*,
    we can''t take advantage of the hash table''s fast lookup ability.


    This is because the whole premise of the hash table is that the key determines
    the value''s location. But this premise only works in one direction: we use the'
  - '[PAGE 134]


    key to find the value. The value does not determine the key''s location, so we
    have no way to easily find any key without combing through all of them.


    Come to think of it, where are the keys stored? In the previous diagrams, we only
    saw how the values are stored in the hash table.


    While this detail may vary from language to language, some languages store the
    keys next to the values themselves. This is useful in case of collisions, which
    I''ll discuss in the next section.


    In any case, another aspect of the hash table''s one-directional nature is worth
    noting. Each key can exist only once in the hash table, but there can be multiple
    instances of a value.


    If we think about the menu example from the beginning of this chapter, we can''t
    have the hamburger listed twice (nor would we want to, as it only has one price).
    However, we *could* have multiple foods that cost $2.50.


    In many languages, if we try to store a key-value pair where the key already exists,
    it simply overwrites the old value while keeping the same key.


    # Dealing with Collisions


    Hash tables are awesome but are not without complications.


    Continuing our thesaurus example: what happens if we want to add the following
    entry into our thesaurus?


    ```

    thesaurus["dab"] = "pat"

    ```


    First, the computer would hash the key:


    DAB = 4 * 1 * 2 = 8


    Then, it would try to add "pat" to our hash table''s cell 8:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_134_0.png)


    Uh-oh. Cell 8 is already filled with "evil"—literally!


    Trying to add data to a cell that is already filled is known as a *collision*.
    Fortunately, there are ways around it.


    One classic approach for handling collisions is known as *separate chaining*.
    When a collision occurs, instead of placing a *single* value in the cell, it places
    in it a reference to an array.'
- md: "Let's look more carefully at a subsection of our hash table's underlying data\
    \ storage:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_135_0.png)\n\nIn our example,\
    \ the computer wants to add \"pat\" to cell 8, but it already contains \"evil\"\
    . So it replaces the contents of cell 8 with an array, as shown here:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_135_1.png)\n\
    \nThis array contains subarrays, where the first value is the word and the second\
    \ value is its synonym.\n\nLet's walk through how a hash table lookup works in\
    \ this case. Say we look up the following word:\n\n```\nthesaurus.get(\"dab\"\
    )\n```\n\nThe computer takes the following steps:\n\n1.  It hashes the key: DAB\
    \ = 4 * 1 * 2 = 8.\n2.  It looks up cell 8. The computer takes note that cell\
    \ 8 contains an array of arrays rather than a single value.\n3.  It searches through\
    \ the array linearly, looking at index 0 of each subarray until it finds our key\
    \ (\"dab\"). It then returns the value at index 1 of the correct subarray.\n\n\
    Let's walk through these steps visually.\n\nWe hash DAB into 8, so the computer\
    \ inspects that cell:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_136_0.png)\n\
    \nBecause cell 8 contains an array of subarrays, we begin a linear search through\
    \ each subarray, starting at the first one. We inspect index 0 of the first subarray:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_136_1.png)\n\nIt doesn't contain the\
    \ key we're looking for (\"dab\"), so we move on to index 0 of the next subarray:\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_136_2.png)\n\nWe found \"dab\", which\
    \ would indicate that the value at index 1 of that subarray (\"pat\") is the value\
    \ we're looking for.\n\nIn a scenario where the computer hits upon a cell that\
    \ references an array, its search can take some extra steps, as it needs to conduct\
    \ a linear search within an array of multiple values. If somehow all of our data\
    \ ended up within a single cell of our hash table, our hash table would be no\
    \ better than an array. So, it actually turns out that the worst-case performance\
    \ for a hash table lookup is O(N).\n\nBecause of this, it's critical that a hash\
    \ table is designed in such a way that it will have few collisions and, therefore,\
    \ typically perform lookups in O(1) time rather than O(N) time.\n\nLuckily, most\
    \ programming languages implement hash tables and handle these details for us.\
    \ However, by understanding how it all works under the hood, we can appreciate\
    \ how hash tables eke out O(1) performance.\n\nLet's see how hash tables can be\
    \ set up to avoid frequent collisions.\n\n## Making an Efficient Hash Table\n\n\
    Ultimately, a hash table's efficiency depends on three factors:\n\n-   How much\
    \ data we're storing in the hash table\n-   How many cells are available in the\
    \ hash table\n-   Which hash function we're using\n\nIt makes sense why the first\
    \ two factors are important. If you have a lot of data and only a few cells, there\
    \ will be many collisions and the hash table will lose its efficiency. Let's explore,\
    \ however, why the hash function itself is important for efficiency.\n\nLet's\
    \ say we're using a hash function that always produces a value that falls in the\
    \ range from 1 to 9. An example of this is a hash function that converts letters\
    \ into their corresponding numbers and keeps adding the resulting digits together\
    \ until it ends up with a single digit.\n\nFor example:\n\nPUT = 16 + 21 + 20\
    \ = 57\n\nBecause 57 contains more than one digit, the hash function breaks up\
    \ the 57 into 5 + 7:\n\n5 + 7 = 12\n\n12 also contains more than one digit, so\
    \ it breaks up the 12 into 1 + 2:\n\n1 + 2 = 3\n\nIn the end, PUT hashes into\
    \ 3.\n\nThis hash function by its very nature will *always* return a number 1\
    \ through 9.\n\nLet's return to our example hash table:\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_138_0.png)\n\
    \nWith this hash function, the computer would never even use cells 10 through\
    \ 16 even though they exist. All data would be stuffed into cells 1 through 9.\n\
    \nA good hash function, therefore, is one that distributes its data across *all*\
    \ available cells. The more we can spread out our data, the fewer collisions we'll\
    \ have.\n\n## The Great Balancing Act\n\nYou learned that a hash table's efficiency\
    \ goes up as its number of collisions goes down. In theory, then, the best way\
    \ to avoid collisions would be to have a hash table with a large number of cells.\
    \ Imagine we want to store just five items in our hash table. A hash table with\
    \ 1,000 cells would seem to be wonderful for our case, since odds are there would\
    \ be no collisions.\n\nHowever, while avoiding collisions is important, we have\
    \ to balance that with avoiding memory hogging as well.\n\nAlthough a hash table\
    \ with 1,000 cells for our five pieces of data is great for avoiding collisions,\
    \ we'd be using up 1,000 cells to store just five pieces of data, and that's a\
    \ poor use of memory.\n\nThis is the balancing act that a hash table must perform.\
    \ A good hash table *strikes a balance of avoiding collisions while not consuming\
    \ lots of memory*.\n\nTo accomplish this, computer scientists have developed the\
    \ following rule of thumb: for every seven data elements stored in a hash table,\
    \ it should have ten cells.\n\nSo if you're planning on storing fourteen elements,\
    \ you'd want to have twenty available cells, and so on.\n\nThis ratio of data\
    \ to cells is called the *load factor*. Using this terminology, we'd say that\
    \ the ideal load factor is 0.7 (7 elements / 10 cells).\n\nIf you initially stored\
    \ seven pieces of data in a hash table, the computer might allocate a hash table\
    \ with ten cells. When you begin to add more data, though, the computer will expand\
    \ the hash table by adding more cells and changing the hash function so that the\
    \ new data will be distributed evenly across the new cells.\n\nAgain, most of\
    \ the internals of a hash table are managed by the computer language you're using.\
    \ It decides how big the hash table needs to be, what hash function to use, and\
    \ when it's time to expand the hash table. You have the right to assume that your\
    \ programming language has implemented its hash table to allow for peak performance.\n\
    \nNow that we've seen how hashes work, it's clear that they have a superior lookup\
    \ efficiency of O(1). We're going to use this knowledge shortly to optimize our\
    \ code for speed.\n\nBut let's first take a quick tour of the many different use\
    \ cases for hash tables when it comes to simple data organization.\n\n## Hash\
    \ Tables for Organization\n\nBecause hash tables keep data in pairs, they're useful\
    \ in many scenarios for organizing data.\n\nSome data exists naturally in paired\
    \ form. The fast-food menu and thesaurus scenarios from this chapter are classic\
    \ examples. The menu contains each food item paired with its price. The thesaurus\
    \ contains each word paired with its synonym. In fact, this is why Python refers\
    \ to hash tables as dictionaries. A dictionary is a common form of paired data;\
    \ it's a list of words with their respective definitions.\n\nOther examples of\
    \ naturally paired data can include tallies, such as political candidates and\
    \ the number of votes each received:\n\n```\n{\"Candidate A\": 1402021, \"Candidate\
    \ B\": 2321443, \"Candidate C\": 432}\n```\n\nAn inventory tracking system, which\
    \ keeps track of how much of each item is in supply, is another tally example:\n\
    \n```\n{\"Yellow Shirt\": 1203, \"Blue Jeans\": 598, \"Green Felt Hat\": 65}\n\
    ```\n\nHash tables are such a natural fit for paired data that we can even use\
    \ them to simplify conditional logic in certain instances.\n\nSay we encounter\
    \ a function that returns the meaning of common HTTP status code numbers:\n\n\
    ```\ndef status_code_meaning(number):\n    if number == 200:\n        return \"\
    OK\"\n    elif number == 301:\n        return \"Moved Permanently\"\n    elif\
    \ number == 401:\n        return \"Unauthorized\"\n    elif number == 404:\n \
    \       return \"Not Found\"\n    elif number == 500:\n        return \"Internal\
    \ Server Error\"\n```\n\nIf we think about this code, we'll realize that the conditional\
    \ logic revolves around paired data, namely, the status code numbers and their\
    \ respective meanings.\n\nBy using a hash table, we can completely eliminate the\
    \ conditional logic:\n\n```\nstatus_codes = {200: \"OK\", 301: \"Moved Permanently\"\
    ,\n                401: \"Unauthorized\", 404: \"Not Found\",\n              \
    \  500: \"Internal Server Error\"}\n\ndef status_code_meaning(number):\n    return\
    \ status_codes.get(number)\n```\n\nAnother common use for hash tables is to represent\
    \ objects that have various attributes. For example, here's a representation of\
    \ a dog:\n\n```\n{\"name\": \"Fido\", \"breed\": \"Pug\", \"age\": 3, \"gender\"\
    : \"Male\"}\n```\n\nAs you can see, attributes are a kind of paired data, since\
    \ the attribute name becomes the key, and the actual attribute becomes the value.\n\
    \nWe can create an entire list of dogs if we place multiple hash tables inside\
    \ an array:\n\n```\n[\n    {\"name\": \"Fido\", \"breed\": \"Pug\", \"age\": 3,\
    \ \"gender\": \"Male\"},\n    {\"name\": \"Lady\", \"breed\": \"Poodle\", \"age\"\
    : 6, \"gender\": \"Female\"},\n    {\"name\": \"Spot\", \"breed\": \"Dalmatian\"\
    , \"age\": 2, \"gender\": \"Male\"}\n]\n```\n\n## Hash Tables for Speed\n\nWhile\
    \ hash tables are a perfect fit for paired data, they can also be used to make\
    \ your code faster—even if your data doesn't exist as pairs. And this is where\
    \ things get exciting."
  mdcn: "让我们更仔细地观察哈希表底层数据存储的一个子部分：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_135_0.png)\n\
    \n在我们的例子中，计算机想要将 \"pat\" 添加到单元格 8，但该单元格已经包含了 \"evil\"。因此，它将单元格 8 的内容替换为一个数组，如下所示：\n\
    \n![](img/c0a46c67bb2536aa545ec1bd7065e742_135_1.png)\n\n这个数组包含子数组，其中第一个值是单词，第二个值是其同义词。\n\
    \n让我们逐步了解在这种情况下哈希表查找是如何工作的。假设我们查找以下单词：\n\n```\nthesaurus.get(\"dab\")\n```\n\n\
    计算机会执行以下步骤：\n\n1.  它对键进行哈希运算：DAB = 4 * 1 * 2 = 8。\n2.  它查找单元格 8。计算机注意到单元格 8 包含的是一个数组的数组，而不是单个值。\n\
    3.  它在线性搜索该数组，查看每个子数组的索引 0，直到找到我们的键（\"dab\"）。然后，它返回正确子数组中索引 1 的值。\n\n让我们通过图示来逐步说明这些步骤。\n\
    \n我们将 DAB 哈希为 8，因此计算机检查该单元格：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_136_0.png)\n\
    \n因为单元格 8 包含一个子数组的数组，我们开始对每个子数组进行线性搜索，从第一个开始。我们检查第一个子数组的索引 0：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_136_1.png)\n\
    \n它不包含我们正在寻找的键（\"dab\"），所以我们继续检查下一个子数组的索引 0：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_136_2.png)\n\
    \n我们找到了 \"dab\"，这表明该子数组索引 1 的值（\"pat\"）就是我们正在寻找的值。\n\n在计算机遇到一个引用数组的单元格的情况下，其搜索可能需要额外的步骤，因为它需要在包含多个值的数组内进行线性搜索。如果我们的所有数据最终都落入哈希表的单个单元格中，那么我们的哈希表将不比数组更好。因此，实际上，哈希表查找的最坏情况性能是\
    \ O(N)。\n\n正因如此，哈希表的设计必须使其冲突尽可能少，从而通常能在 O(1) 时间内完成查找，而不是 O(N) 时间。\n\n幸运的是，大多数编程语言都实现了哈希表，并为我们处理了这些细节。然而，通过理解其底层工作原理，我们可以领会哈希表是如何实现\
    \ O(1) 性能的。\n\n让我们看看如何设置哈希表以避免频繁的冲突。\n\n## 制作高效的哈希表\n\n最终，哈希表的效率取决于三个因素：\n\n-\
    \   我们在哈希表中存储了多少数据\n-   哈希表中有多少可用的单元格\n-   我们使用的是哪个哈希函数\n\n前两个因素的重要性不言而喻。如果你有很多数据但只有很少的单元格，就会发生很多冲突，哈希表将失去其效率。然而，让我们探讨一下为什么哈希函数本身对效率很重要。\n\
    \n假设我们使用一个总是产生 1 到 9 之间值的哈希函数。一个例子是，将字母转换为相应的数字，然后不断将结果数字相加，直到得到一个单个数字。\n\n例如：\n\
    \nPUT = 16 + 21 + 20 = 57\n\n因为 57 包含多个数字，哈希函数将 57 拆分为 5 + 7：\n\n5 + 7 = 12\n\n\
    12 也包含多个数字，所以它将 12 拆分为 1 + 2：\n\n1 + 2 = 3\n\n最终，PUT 哈希为 3。\n\n这个哈希函数本质上*总是*返回一个\
    \ 1 到 9 之间的数字。\n\n让我们回到我们的示例哈希表：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_138_0.png)\n\
    \n使用这个哈希函数，计算机甚至永远不会使用单元格 10 到 16，即使它们存在。所有数据都会被塞进单元格 1 到 9。\n\n因此，一个好的哈希函数是能够将其数据分布到*所有*可用单元格中的函数。我们越能分散数据，冲突就越少。\n\
    \n## 伟大的平衡艺术\n\n你了解到，哈希表的效率随着冲突数量的减少而提高。那么，理论上，避免冲突的最佳方法是拥有一个具有大量单元格的哈希表。想象一下，我们只想在哈希表中存储五个项目。一个拥有\
    \ 1,000 个单元格的哈希表对我们来说似乎非常理想，因为很可能不会发生冲突。\n\n然而，虽然避免冲突很重要，但我们必须将其与避免占用过多内存相平衡。\n\
    \n虽然一个拥有 1,000 个单元格的哈希表用于存储我们的五条数据对于避免冲突非常有利，但我们将使用 1,000 个单元格来存储仅仅五条数据，这是对内存的糟糕利用。\n\
    \n这就是哈希表必须执行的平衡艺术。一个好的哈希表*在避免冲突和不消耗大量内存之间取得平衡*。\n\n为了实现这一点，计算机科学家们制定了以下经验法则：对于存储在哈希表中的每七个数据元素，它应该有十个单元格。\n\
    \n因此，如果你计划存储十四个元素，你就需要有二十个可用的单元格，以此类推。\n\n这种数据与单元格的比率称为*负载因子*。使用这个术语，我们可以说理想的负载因子是\
    \ 0.7（7 个元素 / 10 个单元格）。\n\n如果你最初在哈希表中存储了七条数据，计算机可能会分配一个有十个单元格的哈希表。然而，当你开始添加更多数据时，计算机将通过添加更多单元格并更改哈希函数来扩展哈希表，以便新数据能够均匀地分布在新的单元格中。\n\
    \n同样，哈希表的大部分内部机制由你使用的编程语言管理。它决定哈希表需要多大、使用哪个哈希函数以及何时扩展哈希表。你有权假设你的编程语言已经实现了哈希表以达到最佳性能。\n\
    \n现在我们已经了解了哈希的工作原理，很明显它们具有 O(1) 的卓越查找效率。我们很快将利用这些知识来优化我们的代码速度。\n\n但让我们首先快速浏览一下哈希表在简单数据组织方面的多种不同用例。\n\
    \n## 用于组织的哈希表\n\n因为哈希表以键值对的形式保存数据，所以它们在许多场景中对于组织数据非常有用。\n\n一些数据天然以成对的形式存在。本章中的快餐菜单和同义词库场景就是经典例子。菜单包含每个食品项目及其价格的配对。同义词库包含每个单词及其同义词的配对。事实上，这就是为什么\
    \ Python 将哈希表称为字典。字典是一种常见的配对数据形式；它是一个单词列表及其各自的定义。\n\n其他天然成对的数据示例可以包括计数，例如政治候选人及其各自获得的票数：\n\
    \n```\n{\"Candidate A\": 1402021, \"Candidate B\": 2321443, \"Candidate C\": 432}\n\
    ```\n\n库存跟踪系统，用于跟踪每种物品的供应量，是另一个计数示例：\n\n```\n{\"Yellow Shirt\": 1203, \"Blue Jeans\"\
    : 598, \"Green Felt Hat\": 65}\n```\n\n哈希表非常适合配对数据，我们甚至可以在某些情况下使用它们来简化条件逻辑。\n\n\
    假设我们遇到一个返回常见 HTTP 状态码数字含义的函数：\n\n```\ndef status_code_meaning(number):\n    if\
    \ number == 200:\n        return \"OK\"\n    elif number == 301:\n        return\
    \ \"Moved Permanently\"\n    elif number == 401:\n        return \"Unauthorized\"\
    \n    elif number == 404:\n        return \"Not Found\"\n    elif number == 500:\n\
    \        return \"Internal Server Error\"\n```\n\n如果我们思考这段代码，我们会意识到条件逻辑围绕着配对数据，即状态码数字及其各自的含义。\n\
    \n通过使用哈希表，我们可以完全消除条件逻辑：\n\n```\nstatus_codes = {200: \"OK\", 301: \"Moved Permanently\"\
    ,\n                401: \"Unauthorized\", 404: \"Not Found\",\n              \
    \  500: \"Internal Server Error\"}\n\ndef status_code_meaning(number):\n    return\
    \ status_codes.get(number)\n```\n\n哈希表的另一个常见用途是表示具有各种属性的对象。例如，这里是一个狗的表示：\n\n```\n\
    {\"name\": \"Fido\", \"breed\": \"Pug\", \"age\": 3, \"gender\": \"Male\"}\n```\n\
    \n如你所见，属性是一种配对数据，因为属性名称成为键，而实际属性成为值。\n\n如果我们把多个哈希表放在一个数组中，就可以创建一个完整的狗列表：\n\n```\n\
    [\n    {\"name\": \"Fido\", \"breed\": \"Pug\", \"age\": 3, \"gender\": \"Male\"\
    },\n    {\"name\": \"Lady\", \"breed\": \"Poodle\", \"age\": 6, \"gender\": \"\
    Female\"},\n    {\"name\": \"Spot\", \"breed\": \"Dalmatian\", \"age\": 2, \"\
    gender\": \"Male\"}\n]\n```\n\n## 用于提升速度的哈希表\n\n虽然哈希表非常适合配对数据，但它们也可以用来让你的代码更快——即使你的数据不是成对存在的。而这正是令人兴奋的地方。"
