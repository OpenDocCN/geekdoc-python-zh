    \n步骤 19：我们将 4 与 `temp_value` 进行比较：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_101_0.png)\n\
    \n步骤 20：4 大于 3，所以我们移动 4：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_101_1.png)\n\
    \n步骤 21：我们将 2 与 `temp_value` 进行比较。2 小于 3，所以我们的移动阶段完成：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_101_2.png)\n\
    \n步骤 22：我们将 `temp_value` 插回间隙中：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_101_3.png)\n\
    \n我们的数组现在已完全排序：\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_101_4.png)\n\n## 代码实现：插入排序\n\
    \n以下是插入排序的 Python 实现：\n\n```python\ndef insertion_sort(array):\n    for index\
    \ in range(1, len(array)):\n        temp_value = array[index]\n        position\
    \ = index - 1\n\n        while position >= 0:\n            if array[position]\
    \ > temp_value:\n                array[position + 1] = array[position]\n     \
    \           position = position - 1\n            else:\n                break\n\
    \n        array[position + 1] = temp_value\n\n    return array\n```\n\n让我们逐步解析这段代码。\n\
    \n首先，我们启动一个从索引 1 开始、遍历整个数组的循环。这个循环的每一轮代表一次遍历：\n\n```python\nfor index in range(1,\
    \ len(array)):\n```\n\n在每次遍历中，我们将“移除”的值保存在一个名为 `temp_value` 的变量中：\n\n```python\n\
    temp_value = array[index]\n```\n\n接下来，我们创建一个名为 `position` 的变量，它将从 `temp_value`\
    \ 索引的左侧紧邻位置开始。这个 `position` 将代表我们与 `temp_value` 进行比较的每个值：\n\n```python\nposition\
    \ = index - 1\n```\n\n在遍历过程中，随着我们将每个值与 `temp_value` 进行比较，这个 `position` 会不断向左移动。\n\
    \n然后我们开始一个内部的 `while` 循环，只要 `position` 大于或等于 0，它就会运行：\n\n```python\nwhile position\
    \ >= 0:\n```\n\n然后我们执行比较；也就是说，我们检查 `position` 处的值是否大于 `temp_value`：\n\n```python\n\
    if array[position] > temp_value:\n```\n\n如果是，我们将左侧的这个值向右移动：\n\n```python\narray[position\
    \ + 1] = array[position]\n```\n\n然后我们将 `position` 减 1，以便在下一轮 `while` 循环中将下一个左侧的值与\
    \ `temp_value` 进行比较：\n\n```python\nposition = position - 1\n```\n\n如果在任何时候我们遇到\
    \ `position` 处的值小于或等于 `temp_value`，我们就可以准备结束这次遍历，因为是时候将 `temp_value` 移入间隙了：\n\n\
    ```python\nelse:\n    break\n```\n\n每次遍历的最后一步是将 `temp_value` 移入间隙：\n\n```python\n\
    array[position + 1] = temp_value\n```\n\n在所有遍历完成后，我们返回已排序的数组：\n\n```python\nreturn\
    \ array\n```\n\n## 插入排序的效率\n\n插入排序中会发生四种类型的步骤：移除、比较、移动和插入。为了分析插入排序的效率，我们需要统计每种步骤的数量。\n\
    \n首先，让我们深入探讨比较。每次我们将间隙左侧的值与 `temp_value` 进行比较时，就会发生一次比较。在最坏的情况下，即数组按降序排列时，我们必须在每次遍历中将\
    \ `temp_value` 左侧的每个数字与 `temp_value` 进行比较。这是因为 `temp_value` 左侧的每个值总是大于 `temp_value`，因此遍历只会在间隙到达数组左端时结束。\n\
    \n在第一次遍历中，`temp_value` 是索引 1 处的值，最多进行一次比较，因为 `temp_value` 左侧只有一个值。在第二次遍历中，最多进行两次比较，依此类推。在最后一次遍历中，我们需要将\
    \ `temp_value` 与数组中除 `temp_value` 本身之外的每个值进行比较。换句话说，如果数组中有 N 个元素，最后一次遍历中进行的最大比较次数是\
    \ N - 1。\n\n因此，我们可以将总比较次数表述为：\n\n1 + 2 + 3 + ... + (N - 1) 次比较。\n\n在我们包含五个元素的示例数组中，最大比较次数为：\n\
    \n1 + 2 + 3 + 4 = 10 次比较。\n\n对于包含 10 个元素的数组，比较次数为：\n\n1 + 2 + 3 + 4 + 5 + 6 +\
    \ 7 + 8 + 9 = 45 次比较。\n\n对于包含 20 个元素的数组，总比较次数为 190 次，依此类推。\n\n观察这个模式，可以发现对于一个包含\
    \ N 个元素的数组，大约有 N² / 2 次比较。（10² / 2 是 50，20² / 2 是 200。我们将在下一章更仔细地研究这个模式。）\n\n\
    让我们继续分析其他类型的步骤。\n\n每次我们将一个值向右移动一个单元格时，就会发生移动。当数组按降序排列时，移动的次数将与比较的次数相同，因为每次比较都会迫使我们将一个值向右移动。\n\
    \n让我们将最坏情况下的比较和移动次数相加：\n\nN² / 2 次比较\n+ N² / 2 次移动\n\nN² 步\n\n每次遍历都会发生一次从数组中移除和插入\
    \ `temp_value` 的操作。由于总是有 N - 1 次遍历，我们可以得出结论：有 N - 1 次移除和 N - 1 次插入。\n\n所以现在我们得到：\n\
    N² 次比较和移动（合计）\nN - 1 次移除\n+ N - 1 次插入\n\nN² + 2N - 2 步\n\n你已经学到了大 O 表示法的一个主要规则：大\
    \ O 忽略常数。考虑到这个规则，我们乍一看会将其简化为 O(N² + N)。\n\n然而，我现在将揭示大 O 表示法的另一个主要规则：\n\n> 当有多个阶数相加时，大\
    \ O 表示法只考虑 N 的最高阶数。\n\n换句话说，如果一个算法需要 N⁴ + N³ + N² + N 步，我们只认为 N⁴ 是重要的——并称之为 O(N⁴)。为什么是这样？\n\
    \n看下面的表格：\n\n| N | N² | N³ | N⁴ |\n|---|---|---|---|\n| 2 | 4 | 8 | 16 |\n| 5\
    \ | 25 | 125 | 625 |\n| 10 | 100 | 1,000 | 10,000 |\n| 100 | 10,000 | 1,000,000\
    \ | 100,000,000 |"
