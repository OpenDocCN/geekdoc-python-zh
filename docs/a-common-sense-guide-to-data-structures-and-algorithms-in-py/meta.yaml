    \n```\npython\ndef dfs(vertex, search_value, visited_vertices):\n    visited_vertices[vertex.value]\
    \ = True\n\n    if vertex.value == search_value:\n        return vertex\n\n  \
    \  for adjacent_vertex in vertex.adjacent_vertices:\n        if adjacent_vertex.value\
