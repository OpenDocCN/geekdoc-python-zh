- img_proc: true
  md: 'Notice the inefficiency here. As the number of elements increases, the number
    of steps grows *exponentially*. (In technical math terms, we''d actually say that
    it grows quadratically.) We can see this clearly in the following table:


    | N Data Elements | Max # of Steps |

    | :--- | :--- |

    | 5 | 20 |

    | 10 | 90 |

    | 20 | 380 |

    | 40 | 1560 |

    | 80 | 6320 |


    If you look at the growth of steps as N increases, you''ll see that it''s growing
    by approximately N². Take a look at the following table:


    | N Data Elements | # of Bubble Sort Steps | N² |

    | :--- | :--- | :--- |

    | 5 | 20 | 25 |

    | 10 | 90 | 100 |

    | 20 | 380 | 400 |

    | 40 | 1560 | 1600 |

    | 80 | 6320 | 6400 |


    Let''s express the time complexity of Bubble Sort with Big O notation. Remember,
    Big O always answers the key question: if there are N data elements, how many
    steps will the algorithm take?


    Because for N values, Bubble Sort takes N² steps, in Big O we say that Bubble
    Sort has an efficiency of O(N²).


    O(N²) is considered to be a relatively inefficient algorithm, since as the data
    increases, the steps increase dramatically. Look at this graph, which compares
    O(N²) against the faster O(N):


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_74_0.png)'
