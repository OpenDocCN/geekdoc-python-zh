  md: '# Graphs


    A *graph* is a data structure that specializes in relationships, as it easily
    conveys how data is connected.


    Here''s a visualization of our social network, displayed as a graph:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_338_0.png)


    Each person is represented by a node, and each line indicates a friendship with
    another person. If you look at Alice, for example, you can see that she is friends
    with Bob, Diana, and Fred, since her node has lines that connect to their nodes.


    # Graphs vs. Trees


    You might have noticed that graphs look similar to trees, which we''ve dealt with
    in the past few chapters. Indeed, *trees are a type of graph*. Both data structures
    consist of nodes connected to each other.


    So what''s the difference between a graph and a tree?


    Here''s the deal: while all trees are graphs, not all graphs are trees.


    Specifically, for a graph to be considered a tree, it cannot have *cycles*, and
    all nodes must be *connected*. Let''s see what that means.


    A graph may have nodes that form what is known as a *cycle*—that is, nodes that
    reference each other circularly. In the previous example, Alice is friends with
    Diana, and Diana is connected to Bob, and Bob is connected...to Alice. These three
    nodes form a cycle.


    Trees, on the other hand, are not "allowed" to have cycles. If a graph has a cycle,
    then it''s not a tree.'
  merge: -1
  pgno: 338
- img_proc: true
  md: 'Another characteristic specific to trees is that every node is somehow connected
    to every other node, even if the connections are indirect. However, it''s possible
    for a graph to not be fully connected.


    See the following graph:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_339_0.png)


    In this social network, we have two pairs of friends. However, no one from either
    pair is friends with anyone from the other pair. Additionally, we can see that
    Vicky has no friends yet, as perhaps she signed up for this social network just
    minutes ago. With trees, however, there''s never a node that''s disconnected from
    the rest of the tree.


    # Graph Jargon


    Graphs have a bit of their own technical jargon. We''re used to calling each piece
    of data a *node*, but in “graph-speak,” each node is called a *vertex*. The lines
    between nodes, um—vertices, have their own name as well and are called *edges*.
    And vertices that are connected by an edge are said to be *adjacent* to each other.
    Some computer scientists also refer to adjacent vertices as *neighbors*.


    In our first graph, then, the vertices of Alice and Bob are adjacent to each other,
    since they share an edge.


    I mentioned earlier that it''s possible for a graph to have a vertex that isn''t
    connected at all to other vertices. However, a graph where *all* the vertices
    are connected in some way is said to be a *connected graph*.


    # The Bare-Bones Graph Implementation


    For the sake of code organization, we''re going to use object-oriented classes
    to represent our graphs, but it''s worth noting that we can also use a basic hash
    table (see [Chapter 8, Blazing Fast Lookup with Hash Tables, on page 113](#))
    to represent a rudimentary graph. Here''s a bare-bones implementation of our social
    network using a hash table:'
  merge: -1
  pgno: 339
