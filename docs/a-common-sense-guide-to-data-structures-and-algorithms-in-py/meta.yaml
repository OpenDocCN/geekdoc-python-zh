    \ O notation to describe the time complexity of this function, which is below:\n\
    \n```python\ndef chessboard_space(number_of_grains):\n    chessboard_spaces =\
    \ 1\n    placed_grains = 1\n\n    while placed_grains < number_of_grains:\n  \
