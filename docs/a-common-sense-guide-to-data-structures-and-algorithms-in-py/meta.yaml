    The reason that going bottom-up is considered part of dynamic programming is because
    dynamic programming means taking a problem *that could be solved recursively*
    and ensuring that it doesn''t make duplicate calls for overlapping subproblems.
    Using iteration (that is, loops) instead of recursion is, technically, a way to
    achieve this.


    Going bottom-up becomes more of a "technique" when the problem is more naturally
    solved with recursion. Generating Fibonacci numbers is one example where recursion
    is a neat, elegant solution. Having to solve the same problem with iteration may
    take more brainpower, as an iterative approach may be less intuitive. (Imagine
    solving the staircase problem from the previous chapter with a loop. Ugh.)


    Let''s see how we might implement a bottom-up approach for our Fibonacci function.'
  - "[PAGE 209]\n\n# Bottom-Up Fibonacci\n\nIn the following bottom-up approach, we\
    \ start with the first two Fibonacci numbers: 0 and 1. We then use good ol' iteration\
    \ to build up the sequence:\n\n```\ndef fib(n):\n    if n == 0:\n        return\
    \ 0\n\n    a = 0\n    b = 1\n\n    for _ in range(1, n):\n        a, b = b, a\
    \ + b\n\n    return b\n```\n\nThe very first thing we do is return 0 if the input\
    \ n is 0. Officially, fib(0) should return 0, so we easily dispense with that\
    \ with a simple conditional statement.\n\nNow, we get to the meat of the code.\
    \ We initialize variables a and b as 0 and 1 respectively, as those are the first\
    \ two numbers of the Fibonacci sequence.\n\nWe then start a loop so we can calculate\
    \ each number of the sequence until we reach n:\n\n```\nfor _ in range(1, n):\n\
    ```\n\nIn Python, this is equivalent to for i in range(1, n), except that we're\
    \ not going to need an i variable.\n\nTo calculate the next number in the sequence,\
    \ we need to add the two previous numbers together, namely a + b. We'll update\
    \ b to be this new number, since b always is supposed to point to the last number\
    \ in the sequence. We also update a to what b was, so that a continues to point\
    \ to the second-to-last number:\n\n```\na, b = b, a + b\n```\n\nBecause our code\
    \ is a simple loop from 1 to N, our code takes N steps. Like the memoization approach,\
    \ it's O(N).\n\n# Memoization vs. Bottom-Up\n\nYou've now seen the two primary\
    \ techniques of dynamic programming: memoization and going bottom-up. Is one technique\
    \ better than the other?"
  - "[PAGE 210]\n\nUsually, it depends on the problem and why you're using recursion\
    \ in the first place. If recursion presents an elegant and intuitive solution\
    \ to a given problem, you may want to stick with it and use memoization to deal\
    \ with any overlapping subproblems. However, if the iterative approach is equally\
    \ intuitive, you may want to go with that.\n\nIt's important to point out that\
    \ even with memoization, recursion does carry some extra overhead versus iteration.\
    \ Specifically, with any recursion, the computer needs to keep track of all the\
    \ calls in a call stack, which consumes memory. The memoization itself also requires\
    \ the use of a hash table, which will take up additional space on your computer\
    \ as well. (More on this in [Chapter 19, Dealing with Space Constraints, on page\
    \ 385.](#))\n\nGenerally speaking, going bottom-up is often the better choice,\
    \ unless the recursive solution is more intuitive. Where recursion is more intuitive,\
    \ you can keep the recursion and keep it fast by using memoization.\n\n# Wrapping\
