  md: "Indeed, if we find a lower value, we store this new value's index in lowest_number_index:\n\
    \n```\nif array[j] < array[lowest_number_index]:\n    lowest_number_index = j\n\
    ```\n\nBy the end of the inner loop, we'll have found the index of the lowest\
    \ number from this pass-through.\n\nIf the lowest value from this pass-through\
    \ is already in its correct place (which would happen when the lowest value is\
    \ the first value we encounter in the pass-through), we don't need to do anything.\
    \ But if the lowest value is *not* in its correct place, we need to perform a\
    \ swap. Specifically, we swap the lowest value with the value at i, which was\
    \ the index we started the pass-through with:\n\n```\nif lowest_number_index !=\
    \ i:\n    array[i], array[lowest_number_index] = array[lowest_number_index], array[i]\n\
    ```\n\nFinally, we return the sorted array:\n\n```\nreturn array\n```\n\n# The\
    \ Efficiency of Selection Sort\n\nSelection Sort contains two types of steps:\
    \ comparisons and swaps. We compare each value with the lowest number we've encountered\
    \ in each pass-through, and we swap the lowest number into its correct position.\n\
    \nLooking back at our example array that contains five elements, we had to make\
    \ a total of 10 comparisons. Let's break it down in the following table:\n\n|\
    \ Pass-Through # | # of Comparisons |\n| :--- | :--- |\n| 1 | 4 comparisons |\n\
    | 2 | 3 comparisons |\n| 3 | 2 comparisons |\n| 4 | 1 comparison |\n\nThat's a\
    \ grand total of 4 + 3 + 2 + 1 = 10 comparisons.\n\nTo put it in a way that works\
    \ for arrays of all sizes, we'd say that for N elements, we make\n\n(N - 1) +\
    \ (N - 2) + (N - 3) ... + 1 comparisons.\n\nAs for *swaps*, though, we only need\
    \ to make a maximum of one swap per pass-through. This is because in each pass-through,\
    \ we make either one or zero swaps, depending on whether the lowest number of\
    \ that pass-through is"
