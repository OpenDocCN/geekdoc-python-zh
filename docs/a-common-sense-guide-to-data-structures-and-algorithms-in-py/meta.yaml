    \ N / 2 步。\n然而，大 O 表示法忽略常数。因此，我们去掉除以 2，算法的时间复杂度为 O(N)。\n\n## 获取所有乘积\n\n我们的下一个例子是一个算法，它接受一个数字数组，并返回所有两个数字组合的乘积。\n\
    \n例如，如果我们传入数组 [1, 2, 3, 4, 5]，函数返回：\n[2, 3, 4, 5, 6, 8, 10, 12, 15, 20]\n\n这是因为我们首先将\
    \ 1 乘以 2、3、4 和 5。然后我们将 2 乘以 3、4 和 5。接着，我们将 3 乘以 4 和 5。最后，我们将 4 乘以 5。\n\n注意一个有趣的现象：当我们用\
    \ 2 乘以其他数字时，我们只需要乘以它右边的数字。我们不需要回头将 2 乘以 1，因为那已经在之前将 1 乘以 2 时涵盖了。所以每个数字只需要乘以它右边剩余的数字。\n\
    \n以下是该算法的一个实现：\n\n```\ndef two_number_products(array):\n    products = []\n\n\
    \    for i in range(len(array)):\n        for j in range(i + 1, len(array)):\n\
    \            products.append(array[i] * array[j])\n\n    return products\n```\n\
    \n让我们分解一下。N 是传递给此函数的数组中的项目数量。\n\n我们运行外层循环 N 次。（实际上我们运行 N - 1 次，但我们会忽略这个常数。）然而，内层循环则不同。由于\
    \ j 总是从 i 右边一个索引开始，内层循环的步数每次被外层循环启动时都会减少。\n\n让我们看看对于包含五个元素的示例数组，内层循环运行了多少次：\n\n\
    当 i 为 0 时，内层循环在 j 为 1、2、3 和 4 时运行。当 i 为 1 时，内层循环在 j 为 2、3 和 4 时运行。当 i 为 2 时，内层循环在\
    \ j 为 3 和 4 时运行。当 i 为 3 时，内层循环在 j 为 4 时运行。最终，内层循环运行了：\n\n4 + 3 + 2 + 1 次。\n\n\
    用 N 来表示，我们可以说内层循环大约运行：\n\nN + (N - 1) + (N - 2) + (N - 3) ... + 1 次。\n\n这个公式的结果总是大约为\
    \ N² / 2。我们可以在下图中直观地看到这一点。为了图示方便，我们假设 N 为 8，因此有 8²，即 64 个方格。\n\n![](img/c0a46c67bb2536aa545ec1bd7065e742_120_0.png)\n\
    \n如果你从顶行往下看，你会看到顶行所有 N 个方格都被涂成灰色。下一行有 N - 1 个灰色方格，再下一行有 N - 2 个灰色方格。这种模式一直持续到底行，底行只有一个灰色方格。\n\
    \n你也可以一眼看出大约一半的方格被涂色了。这证明了 N + (N - 1) + (N - 2) + (N - 3)... + 1 的模式等同于 N² /\
    \ 2。\n\n那么，我们得出结论，内层循环运行 N² / 2 步。但由于大 O 表示法忽略常数，我们将其表示为 O(N²)。\n\n## 处理多个数据集\n\
    \n现在，如果我们不是计算单个数组中每两个数字的乘积，而是计算一个数组中的每个数字与*第二个*数组中的每个数字的乘积，会发生什么？\n\n例如，如果我们有数组\
    \ [1, 2, 3] 和数组 [10, 100, 1000]，我们将按如下方式计算乘积：\n\n[10, 100, 1000, 20, 200, 2000,\
    \ 30, 300, 3000]\n\n我们的代码将与之前的代码片段类似，但有一些细微的修改：\n\n```\ndef two_number_products(array1,\
    \ array2):\n    products = []\n\n    for i in array1:\n        for j in array2:\n\
    \            products.append(i * j)\n\n    return products\n```\n\n让我们分析一下这个函数的时间复杂度。\n\
    \n首先，N 是什么？这是第一个障碍，因为我们现在有*两个*数据集，即两个数组。\n\n很容易将所有东西混为一谈，说 N 是两个数组的总项目数。但这样做有问题，原因如下：\n\
    \n这是一个关于两种场景的故事。在场景 1 中，有两个大小为 5 的数组。在场景 2 中，有一个大小为 9 的数组和一个大小为 1 的数组。\n\n在这两种场景中，我们最终都会说\
    \ N 是 10，因为 5 + 5 = 10 且 9 + 1 = 10。然而，每种场景的效率*非常*不同。\n\n在场景 1 中，我们的代码需要二十五（5\
    \ * 5）步。因为 N 是 10，这相当于 (N / 2)² 步。\n\n然而，在场景 2 中，我们的代码需要九（9 * 1）步，这大约接近 N 步。这比场景\
    \ 1 快得多！\n\n所以，我们不想将 N 视为两个数组的整数总数，因为我们永远无法用大 O 表示法来确定效率，因为它因不同的场景而异。\n\n我们有点进退两难。我们别无选择，只能将时间复杂度表示为\
    \ O(N * M)，其中 N 是一个数组的大小，M 是另一个数组的大小。\n\n这是一个新概念：每当有两个不同的数据集必须通过乘法相互交互时，我们在用大\
    \ O 描述效率时必须分别识别这两个来源。\n\n虽然这是用大 O 表示法表达此算法的正确方式，但它比其他大 O 表达式用处稍小。将一个 O(N * M)\
    \ 算法与只有 N（没有 M）的算法进行比较，有点像比较苹果和橘子。\n\n然而，我们确实知道 O(N * M) 有一个特定的范围。也就是说，如果 N 和\
    \ M 相同，它等同于 O(N²)。如果它们不同，我们任意将较小的数字指定为 M，即使 M 低至 1，我们最终得到 O(N)。从某种意义上说，O(N * M)\
    \ 可以被理解为介于 O(N) 和 O(N²) 之间的范围。\n\n这很好吗？不，但这是我们能做到的最好程度了。\n\n## 密码破解者\n\n你是一名黑客（当然是道德黑客），试图破解某人的密码。你决定采用暴力破解方法，并编写一些代码来生成给定长度的所有可能字符串。以下是你快速编写的代码：\n\
    \n```\nfrom string import ascii_lowercase\nimport itertools\n\ndef every_password(length):\n\
    \    for s in itertools.product(ascii_lowercase, repeat=length):\n        print(\"\
    \".join(s))\n```\n\n在我们的代码中，我们使用了 Python 字符串模块中的 ascii_lowercase 导入了整个字母表，这样我们就不必实际输入整个字母表。我们还使用了\
    \ Python 的 itertools 模块，以便用最少的代码运行任意数量的嵌套循环。\n\n实际上，我们不会关注这段代码是如何工作的，而是关注这段代码*做了什么*。\n\
    \n当我们调用 every_password 函数时，我们传入一个整数，它成为变量 length。\n\n如果 length 是 3，代码将返回 \"aaa\"\
    \ 和 \"zzz\" 范围内的所有可能字符串。运行此代码将打印以下内容：\n\n```\naaa\naab\naac\naad\naae\n...\nzzx\n\
    zzy\nzzz\n```\n\n如果 length 是 4，你的代码将打印所有长度为 4 的可能字符串：\n\n```\naaaa\naaab\naaac\n\
    aaad\naaae\n...\nzzzx\nzzzy\nzzzz\n```\n\n如果你尝试运行这段代码，即使长度仅为 5，你可能也需要等待一段时间才能完成。这是一个很慢的算法！但我们如何用大\
    \ O 来表示它呢？\n\n让我们分解一下。\n\n如果我们只是打印字母表中的每个字母一次，需要 26 步。\n\n当我们打印每个两个字符的组合时，我们得到\
    \ 26 个字符乘以 26 个字符。\n\n当打印每个三个字符的组合时，我们得到 26 * 26 * 26 个组合。\n\n你看到规律了吗？\n\n| 长度\
    \ | 组合数 |\n|---|---|\n| 1 | 26 |\n| 2 | 26² |\n| 3 | 26³ |\n| 4 | 26⁴ |\n\n如果我们用\
    \ N 来看，就会发现如果 N 是每个字符串的长度，*组合的数量*就是 26<sup>N</sup>。\n\n因此，在大 O 表示法中，我们将其表示为 O(26<sup>N</sup>)。这是一个极其缓慢的算法！事实是，即使是“仅仅”\
    \ O(2<sup>N</sup>) 的算法也慢得令人难以置信。让我们看看它在图表上的样子，如[第 108 页](https://example.com)所示，与我们目前看到的一些其他算法进行比较。\n\
