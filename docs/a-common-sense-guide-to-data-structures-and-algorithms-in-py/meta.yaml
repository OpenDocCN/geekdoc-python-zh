  md: "To make the most profit, we want to buy as low as possible and sell as high\
    \ as possible. Our greedy algorithm begins by assigning the very first price to\
    \ be the buy_price. We then iterate over all the prices, and as soon as we find\
    \ a lower price, we make it the new buy_price.\n\nSimilarly, as we iterate over\
    \ the prices, we check how much profit we'd make if we sold at that price. This\
    \ is calculated by subtracting the buy_price from the current price. In good greedy\
    \ fashion, we save this profit in a variable called greatest_profit. As we iterate\
    \ through all the prices, whenever we find a greater profit, we turn that into\
    \ the greatest_profit.\n\nBy the time we're done looping through the prices, the\
    \ greatest_profit will hold the greatest possible profit we can make by buying\
    \ and selling the stock one time.\n\nHere's the code for our algorithm:\n\n```\n\
    def find_greatest_profit(array):\n    buy_price = array[0]\n    greatest_profit\
    \ = 0\n\n    for price in array:\n        potential_profit = price - buy_price\n\
    \n        if price < buy_price:\n            buy_price = price\n        elif potential_profit\
    \ > greatest_profit:\n            greatest_profit = potential_profit\n\n    return\
    \ greatest_profit\n```\n\nBecause we iterate over the N prices just once, our\
    \ function takes O(N) time. We not only made a lot of money, but we made it fast.\n\
    \n+   4. This is another algorithm where generating examples to find a pattern\
    \ will be the key to optimizing it.\n\nAs stated in the exercise, it's possible\
    \ for the greatest product to be a result of negative numbers. Let's look at various\
    \ examples of arrays and their greatest products formed by two numbers:\n\n```\n\
    [-5, -4, -3, 0, 3, 4] -> Greatest product: 20 (-5 * -4)\n[-9, -2, -1, 2, 3, 7]\
    \ -> Greatest product: 21 (3 * 7)\n[-7, -4, -3, 0, 4, 6] -> Greatest product:\
    \ 28 (-7 * -4)\n[-6, -5, -1, 2, 3, 9] -> Greatest product: 30 (-6 * -5)\n[-9,\
    \ -4, -3, 0, 6, 7] -> Greatest product: 42 (6 * 7)\n```\n\nSeeing all these cases\
    \ may help us realize that the greatest product can only be formed by either the\
    \ greatest two numbers or the lowest two (negative) numbers."
