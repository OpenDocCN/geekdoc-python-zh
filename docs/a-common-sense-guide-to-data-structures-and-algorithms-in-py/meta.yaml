    no possible swap that makes the two arrays equal, we''ll return None.


    One way we can write this algorithm is to use nested loops; that is, as our outer
    loop points to each number from array_1, an inner loop can iterate over each number
    from array_2 and test the sums of each array if we were to swap the two numbers.


    To begin optimizing this, we must first satisfy our prereq of knowing the Big
    O of our current algorithm.


    Because our nested-loops approach visits M numbers from the second array for each
    of the N numbers of the first array, this algorithm is O(N * M). (I''m discussing
    N and M because the arrays may be two different sizes.)


    Can we do better? To find out, let''s determine what we think the best-imaginable
    Big O may be.


    It would seem that we absolutely have to visit each number from the two arrays
    at least once, since we need to be aware of what all the numbers are. But it''s
    possible that this may be *all* we need to do. If so, this would be O(N + M).
    Let''s make this our best-imaginable Big O and aim for that.


    Next, we need to try to dig up any patterns hidden within the problem. Again,
    the best technique to dig up patterns is to come up with numerous examples and
    look for patterns among them.


    So let''s look at a number of different examples where swapping numbers will cause
    the two arrays to have equal sums, as shown in the [diagram on page 409](diagram
    on page 409).


    In looking at these examples, a few patterns begin to emerge. Some of these patterns
    may seem obvious, but let''s look at them anyway.


    One pattern is that to achieve equal sums, the larger array needs to trade a larger
    number with a smaller number from the smaller array.


    A second pattern is that with a single swap, each array''s sum changes by the
    same amount. For example, when we swap a 7 with a 4, one array''s sum *decreases*
    by 3, while the other array''s sum *increases* by 3.


    A third interesting pattern is that the swaps always cause the two array sums
    to fall out *exactly in the middle* of where the two array sums began.


    In the first case, for example, array_1 was 18 and array_2 was 12. When making
    a correct swap, the two arrays land at 15, which is exactly in the middle between
    18 and 12.'
