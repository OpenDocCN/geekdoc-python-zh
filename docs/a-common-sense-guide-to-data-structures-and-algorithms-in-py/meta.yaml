- img_proc: true
  md: 'The stack data structure, then, isn''t the same kind of data structure that
    an array is. The array is built into most programming languages and interacts
    directly with the computer''s memory. The stack, on the other hand, is a set of
    rules and processes around how we should interact with an array so that we can
    achieve a particular result.


    In fact, a stack doesn''t even care about *what* data structure is under the hood.
    All it cares about is that there''s a list of data elements that act in a LIFO
    way. Whether we accomplish this with an array or some other type of built-in data
    structure doesn''t matter. Because of this, the stack is an example of what is
    known as an *abstract data type*—it''s a kind of data structure that is a set
    of theoretical rules that revolve around some other built-in data structure.


    The set we encountered in [Chapter 1, Why Data Structures Matter, on page 1](...),
    is another example of an abstract data type. Some implementations of sets use
    arrays under the hood, while other implementations use hash tables. The set itself,
    though, is simply a theoretical concept: it''s a list of non-duplicated data elements.


    Many of the data structures we''ll encounter in the remainder of this book are
    abstract data types—they''re pieces of code that are written on top of other built-in
    data structures.


    It should be noted that even a built-in data structure can be an abstract data
    type. Even if a programming language does implement its own Stack class, it doesn''t
    change the fact that the stack data structure is still a concept that allows for
    various data structures to be used under the hood.


    # Stacks in Action


    Although a stack isn''t typically used to store data on a long-term basis, it
    can be a great tool to handle temporary data as part of various algorithms. Let''s
    look at an example.


    Let''s create the beginnings of a JavaScript linter—that is, a program that inspects
    a programmer''s JavaScript code and ensures that each line is syntactically correct.
    JavaScript is notorious for having an abundance of parentheses in its code, so
    that''s the aspect of syntax we''ll be focusing on. This includes parentheses,
    square brackets, and curly braces—all common causes of frustrating syntax errors.


    To solve this problem, let''s first analyze what type of syntax is incorrect when
    it comes to braces. If we break it down, we''ll find three situations of erroneous
    syntax.'
  merge: -1
