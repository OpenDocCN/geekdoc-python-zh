- img_proc: true
  md: "```\ndef recurse(n):\n    if n < 0:\n        return\n    print(n)\n    recurse(n\
    \ - 1)\n```\n\nThis function accepts a number n and counts down to 0, printing\
    \ each decrementing number along the way.\n\nIt's a straightforward bit of recursion\
    \ and seems harmless. Its speed is O(N), as the function will run as many times\
    \ as the argument n. And it doesn't create any new data structures, so it doesn't\
    \ seem to take up any additional space.\n\nOr does it?\n\nI explained how recursion\
    \ works under the hood back in [Chapter 10, Recursively Recurse with Recursion,\
    \ on page 149](#). You learned that each time a function recursively calls itself,\
    \ an item is added to the call stack so that the computer can come back to the\
    \ outer function once the inner function is complete.\n\nIf we pass the number\
    \ 100 into our `recurse` function, it would add `recurse(100)` before proceeding\
    \ to execute `recurse(99)`. And it would then add `recurse(99)` to the call stack\
    \ before executing `recurse(98)`.\n\nThe call stack would be at its peak when\
    \ `recurse(-1)` is called, and there would be 101 items in the call stack, from\
    \ `recurse(100)` down to `recurse(0)`.\n\nNow, even though the call stack will\
    \ eventually get unwound, we do need enough memory to store these 101 items for\
    \ *at least some period of time*. It emerges, then, that our recursive function\
    \ *takes up O(N) space*. In this case, N is the number passed into the function;\
    \ if we pass in the number 100, we need to temporarily store about 100 function\
    \ calls in the call stack.\n\nAn important principle emerges from all of this:\
    \ *a recursive function takes up a unit of space for each recursive call it makes*.\
    \ This is the sneaky way recursion can gobble up memory; even if our function\
    \ doesn't explicitly create new data, the recursion itself adds data to the call\
    \ stack.\n\nTo properly calculate how much space a recursive function takes, we\
    \ always need to figure out how big the call stack would be at its peak.\n\nFor\
    \ our `recurse` function, the call stack will be about as large as whatever number\
    \ n is.\n\nAt first, this may seem a bit trivial. After all, our modern computers\
    \ can handle a few items on the call stack, right? Well, let's see."
