  md: "memory the next node begins. The final node's link contains None since the\
    \ linked list ends there.\n\nA linked list's first node is also referred to as\
    \ its *head*, and its last node its *tail*. We may use the terms *head* and *first\
    \ node* interchangeably.\n\nIf the computer knows at which memory address the\
    \ linked list begins, it has all it needs to begin working with the list! Since\
    \ each node contains a link to the next node, all the computer needs to do is\
    \ follow each link to string together the entire list.\n\nThe fact that a linked\
    \ list's data can be spread throughout the computer's memory is a potential advantage\
    \ it has over the array. An array, by contrast, needs to find an entire block\
    \ of contiguous cells to store its data, which can get increasingly difficult\
    \ as the array size grows. These details are managed by your programming language\
    \ under the hood, so you may not have to worry about them. However, you'll see\
    \ shortly that there are more tangible differences between linked lists and arrays\
    \ that we can sink our teeth into.\n\n# Implementing a Linked List\n\nSome programming\
    \ languages, such as Java, come with linked lists built into the language. Many\
    \ languages don't, but it's fairly simple to implement them on our own.\n\nLet's\
    \ create our own linked list using Python. We'll use two classes to implement\
    \ this: Node and LinkedList. Let's create the Node class first:\n\n```\nclass\
    \ Node:\n    def __init__(self, data):\n        self.data = data\n        self.next_node\
    \ = None\n```\n\nThe Node class has two attributes: data contains the node's primary\
    \ value (for example, the string \"a\"), while next_node contains the link to\
    \ the next node in the list. We can use this class as follows:\n\n```\nnode_1\
    \ = Node(\"once\")\nnode_2 = Node(\"upon\")\nnode_3 = Node(\"a\")\nnode_4 = Node(\"\
    time\")\n\nnode_1.next_node = node_2\nnode_2.next_node = node_3\nnode_3.next_node\
    \ = node_4\n```"
