  md: "Practically speaking, then, inserting into a linked list is O(N), as the worst-case\
    \ scenario of inserting at the end of the list will take N + 1 steps.\n\nHowever,\
    \ we've seen that the best-case scenario of inserting at the *beginning* of the\
    \ list is only O(1).\n\nInterestingly, our analysis shows that the best- and worst-case\
    \ scenarios for arrays and linked lists are the opposite of one another. The following\
    \ table breaks this all down:\n\n| Scenario | Array | Linked List |\n| :--- |\
    \ :--- | :--- |\n| Insert at beginning | Worst case | Best case |\n| Insert at\
    \ middle | Average case | Average case |\n| Insert at end | Best case | Worst\
    \ case |\n\nAs you can see, arrays favor insertions at the end, while linked lists\
    \ favor insertions at the beginning.\n\nWe've now found one thing that linked\
    \ lists are great at—inserting things at the beginning of the list. Later in this\
    \ chapter, we'll see a great practical example of where we can take advantage\
    \ of this.\n\n# Code Implementation: Linked List Insertion\n\nLet's add an insertion\
    \ method to our `LinkedList` class. We'll call it `insert`:\n\n```\ndef insert(self,\
    \ index, value):\n    new_node = node.Node(value)\n\n    if index == 0:\n    \
    \    new_node.next_node = self.first_node\n        self.first_node = new_node\n\
    \        return\n\n    current_node = self.first_node\n    current_index = 0\n\
    \n    while current_index < (index - 1):\n        current_node = current_node.next_node\n\
    \        current_index += 1\n\n    new_node.next_node = current_node.next_node\n\
    \    current_node.next_node = new_node\n```\n\nTo use the method, we pass in both\
    \ the new value as well as the index of where we want to insert it.\n\nFor example,\
    \ to insert \"purple\" at index 2, we'd say this:\n\n```\nlist.insert(2, \"purple\"\
    )\n```"
