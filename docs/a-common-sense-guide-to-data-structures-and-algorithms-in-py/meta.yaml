  - '[PAGE 295]


    Step 4: We compare the 40 to its parent, which is the 100. Since the 40 is smaller
    than the 100, we''re done!


    This process of moving the new node up the heap, is called *trickling* the node
    up through the heap. Sometimes it moves up to the right, and sometimes it moves
    up to the left, but it always moves up until it settles into the correct position.


    The efficiency of inserting into a heap is O(log N). As you saw in the previous
    chapter, for N nodes in any binary tree, the tree is organized into about log(N)
    rows. Since at most we''d have to trickle the new value up to the top row, this
    will take log(N) steps at most.


    # Looking for the Last Node


    While the insertion algorithm seems straightforward, there''s one little snag.
    The first step has us place the new value as the heap''s last node. But this begs
    the question: how do we find the spot that will be the last node?


    Let''s take a look again at the heap before we inserted the 40:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_295_0.png)


    We know by looking at the diagram that to make the 40 into the last node, we''d
    make it the right child of the 8, as that''s the next available spot in the bottom
    row.


    But a computer doesn''t have eyeballs and doesn''t see the heap as a bunch of
    rows. All it sees is the root node, and it can follow links to child nodes. So
    how do we create an algorithm for the computer to find the spot for the new value?'
  - '[PAGE 296]


    Take our example heap. When we start at the root node of 100, do we tell the computer
    to look among the 100''s right descendants to find the next available spot for
    the new last node?


    While it''s true that in our example heap the next available spot is among the
    100''s right descendants, take a look at the following alternative heap:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_296_0.png)


    In this heap, the next available spot for the new last node would be the 88''s
    right child, which is among the 100''s *left* descendants.


    Essentially, then, just as it''s impossible to search through a heap, it''s impossible
    to efficiently find the heap''s last node (or next available spot to hold a new
    last node) without having to inspect each and every node.


    So how *do* we find the next available node? I''ll explain this later on, but
    for now, let''s call this issue the *problem of the last node*. I promise we''ll
    come back to it.


    In the meantime, let''s explore the heap''s other primary operation, which is
    deletion.


    # Heap Deletion


    The first thing to know about deleting a value from a heap is that *we only ever
    delete the root node*. This is right in line with the way a priority queue works,
    in that we only access and remove the highest-priority item.


    The algorithm for deleting the root node of a heap is as follows:


    +   1. Move the *last node* into where the root node was, effectively removing
    the original root node.

    2. Trick the root node down into its proper place. I''ll explain how trickling
    down works shortly.


    Let''s say we''re going to remove the root node from the [heap on page 287](#).'
  - '[PAGE 297]


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_297_0.png)


    In this example, the root node is the 100. To delete it, we overwrite the root
    by placing the last node there instead. In this case, the last node is the 3.
    So we move the 3 and place it where the 100 was:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_297_1.png)


    Now, we can''t leave the heap as is, because the heap condition has been violated
    since the 3 is currently less than some (actually, most) of its descendants. To
    make things right again, we need to trickle the 3 down until its heap condition
    has been restored.


    Trickling down is a tad more complex than trickling up, since each time we trickle
    a node down, we have two possible directions as to where we''ll trickle it down;
    that is, we can either swap it with its left child or its right child. (When trickling
    up, on the other hand, each node has only one parent to swap with.)


    Here''s the algorithm for trickling *down*. For the sake of clarity, we''re going
    to call the node we''re trickling the "trickle node." (Sounds gross, I know.)'
  - '[PAGE 298]


    +   1. We check both children of the trickle node and see which one is larger.

    2. If the trickle node is smaller than the larger of the two child nodes, we swap
    the trickle node with that larger child.

    3. We repeat Steps 1 and 2 until the trickle node has no children who are greater
    than it.


    Let''s see this in action.


    Step 1: The 3, which is the trickle node, currently has two children, the 88 and
    the 25. The 88 is larger of the two, and since the 3 is smaller than the 88, we
    swap the trickle node with the 88:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_298_0.png)


    Step 2: The trickle node now has two new children, the 87 and the 16. The 87 is
    the larger one, and it''s greater than the trickle node. So we swap the trickle
    node with the 87:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_298_1.png)'
  - '[PAGE 299]


    Step 3: The trickle node''s children are currently the 86 and the 50. The 86 is
    the larger of the two, and it''s also greater than the trickle node, so we swap
    the 86 with the trickle node:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_299_0.png)


    At this point, the trickle node has no children that are greater than it. (In
    fact, it has no children at all.) So we''re done, as the heap condition has been
    restored.


    The reason why we always swap the trickle node with the *greater* of its two children
    is because if we swap it the with the smaller one, we''d end up violating the
    heap condition immediately. Watch what happens when we try to swap the trickle
    node with a smaller child.


    Let''s start again with the trickle node of 3 as our root:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_299_1.png)'
  - '[PAGE 300]


    Let''s swap the 3 with the 25, which is the smaller of the children:


    ![](img/c0a46c67bb2536aa545ec1bd7065e742_300_0.png)


    We''ve now placed the 25 in a situation where it is a parent of the 88. Since
    the 88 is greater than its parent, the heap condition has been broken.


    Like insertion, the time complexity of deletion from a heap is O(log N), as we
    have to trickle a node from the root down through all log(N) levels of the heap.


    # Heaps vs. Ordered Arrays


    Now that you know the efficiency of heaps, let''s see why it''s a great choice
    for implementing priority queues.


    Here''s a side-by-side comparison of ordered arrays versus heaps:


    | | Ordered Array | Heap |

    |---|---|---|

    | Insertion | O(N) | O(log N) |

    | Deletion | O(1) | O(log N) |


    At first glance, it seems that it''s a wash. Ordered arrays are slower than heaps
    when it comes to insertion but faster than heaps for deletion.


    However, heaps are considered to be the better choice, and here''s why.


    While O(1) is extremely fast, O(log N) is still *very* fast. And O(N), by comparison,
    is slow. With this in mind, we can rewrite the earlier table this way:


    | | Ordered Array | Heap |

    |---|---|---|

    | Insertion | Slow | Very fast |

    | Deletion | Extremely fast | Very fast |'
  - '[PAGE 301]


    In this light, it becomes clearer as to why the heap is considered the better
    choice. We''d rather use a data structure that is consistently very fast than
    a data structure that is sometimes extremely fast and sometimes slow.


    It''s worth pointing out that priority queues generally perform insertions and
    deletions in about equal proportion. Think about the emergency room example, where
    we expect to treat everyone who comes in. So we want both our insertions and deletions
    to be fast. If either operation is slow, our priority queue will be inefficient.


    With a heap, then, we ensure that both of the priority queue''s primary operations—insertion
    and deletion—perform at a very fast clip.


    # The Problem of the Last Node…Again


    While the heap deletion algorithm seems straightforward, it once again raises
    the problem of the last node.


    I explained that the first step of deletion requires us to move the last node
    and turn it into the root node. But how do we find the last node in the first
    place?


    Before we solve the problem of the last node, let''s first explore why insertion
    and deletion are so dependent on the last node anyway. Why couldn''t we insert
    new values elsewhere in the heap? And why, when deleting, can''t we replace the
    root node with some other node other than the last node?


    Now, if you think about it, you''ll realize that if we were to use other nodes,
    the heap would become incomplete. But this begs the next question: why is completeness
    *important* for the heap?


    The reason why completeness is important is because we want to ensure our heap
    remains *well balanced*.


    To see this clearly, let''s take another look at insertion. Let''s say we have
    the following heap:


