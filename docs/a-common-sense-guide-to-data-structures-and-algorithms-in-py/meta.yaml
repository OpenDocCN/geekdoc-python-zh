  md: "# CHAPTER 1\n\n# Why Data Structures Matter\n\nWhen people first learn to code,\
    \ their focus is—and *should* be—on getting their code to run properly. Their\
    \ code is measured using one simple metric: does the code actually work?\n\nAs\
    \ software engineers gain more experience, though, they begin to learn about additional\
    \ layers and nuances regarding the *quality* of their code. They learn that there\
    \ can be two snippets of code that both accomplish the same task, but that one\
    \ snippet is *better* than the other.\n\nThere are numerous measures of code quality.\
    \ One important measure is code maintainability. Maintainability of code involves\
    \ aspects such as the readability, organization, and modularity of one’s code.\n\
    \nHowever, another aspect of high-quality code is code *efficiency*. For example,\
    \ you can have two code snippets that both achieve the same goal, but one *runs\
    \ faster than the other*.\n\nTake a look at these two functions, both of which\
    \ print all the even numbers from 2 to 100:\n\n```\ndef print_numbers_version_one():\n\
    \    number = 2\n\n    while number <= 100:\n        # If number is even, print\
    \ it:\n        if number % 2 == 0:\n            print(number)\n\n        number\
    \ += 1\n```"
  merge: -1
  pgno: 21
- img_proc: true
  md: "```\ndef print_numbers_version_two():\n    number = 2\n\n    while number <=\
    \ 100:\n        print(number)\n\n        # Increase number by 2, which, by definition,\n\
    \        # is the next even number:\n        number += 2\n```\n\nWhich of these\
    \ functions do you think runs faster?\n\nIf you said Version 2, you're right.\
    \ This is because Version 1 ends up looping 100 times, while Version 2 only loops\
    \ 50 times. The first version then, takes twice as many steps as the second version.\n\
    \nThis book is about writing *efficient* code. Having the ability to write code\
    \ that runs quickly is an important aspect of becoming a better software developer.\n\
    \nThe first step in writing fast code is to understand what data structures are\
    \ and how different data structures can affect the speed of our code. So let's\
    \ dive in.\n\n# Data Structures\n\nLet's talk about data.\n\n*Data* is a broad\
    \ term that refers to all types of information, down to the most basic numbers\
    \ and strings. In the simple but classic “Hello World!” program, the string “Hello\
    \ World!” is a piece of data. In fact, even the most complex pieces of data usually\
    \ break down into a bunch of numbers and strings.\n\n*Data structures* refer to\
    \ how data is *organized*. You're going to learn how the same data can be organized\
    \ in a variety of ways.\n\nLet's look at the following code:\n\n```\nx = \"Hello!\
    \ \"\ny = \"How are you \"\nz = \"today?\"\n\nprint(x + y + z)\n```\n\nThis simple\
    \ program deals with three pieces of data, outputting three strings to make one\
    \ coherent message. If we were to describe how the data is organized in this program,\
    \ we'd say that we have three independent strings, each contained within a single\
    \ variable."
