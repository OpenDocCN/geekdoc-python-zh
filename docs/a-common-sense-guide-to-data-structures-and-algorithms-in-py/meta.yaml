  md: "Let's create a simple script that prints the names of all subdirectories within\
    \ a given directory:\n\n```\nimport os\n\ndef print_subdirectories(directory_name):\n\
    \    for filename in os.listdir(directory_name):\n        if os.path.isdir(filename):\n\
    \            path = os.path.join(directory_name, filename)\n            print(path)\n\
    ```\n\nWe can call this function by passing in a directory name. If we want to\
    \ call it on the current directory, we could write the following:\n\n```\nprint_subdirectories(\"\
    .\")\n```\n\nIn this script, we look through each file within the given directory.\
    \ If the file is itself a subdirectory, we print the subdirectory name.\n\nWhile\
    \ this works well, it only prints the names of the subdirectories *immediately*\
    \ within the current directory. It doesn't print the names of the subdirectories\
    \ *within* those subdirectories.\n\nLet's update our script so that it can search\
    \ one level deeper:\n\n```\nimport os\n\ndef print_subdirectories(directory_name):\n\
    \    for filename in os.listdir(directory_name):\n        if os.path.isdir(filename):\n\
    \            path = os.path.join(directory_name, filename)\n            print(path)\n\
    \n            for filename2 in os.listdir(path):\n                path2 = os.path.join(path,\
    \ filename2)\n                if os.path.isdir(path2):\n                    print(path2)\n\
    ```\n\nNow, every time our script discovers a directory, it then conducts an identical\
    \ loop through the subdirectories of *that* directory and prints the names of\
    \ the subdirectories. But this script also has its limitations because it's only\
    \ searching two levels deep. What if we want to search three, four, or five levels\
    \ deep? We would need five levels of nested loops.\n\nAnd what if we want to search\
    \ as deep as our subdirectories go? That would seem to be impossible, as we don't\
    \ even know how many levels there are."
