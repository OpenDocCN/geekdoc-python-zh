- md: '## Chapter 5: Data Manipulation Language (DML)


    Inserting, Updating, and Deleting Data


    ## Introduction to Data Manipulation Language


    The chapter would open by defining the Data Manipulation Language (DML) component
    of SQL. It would explain the importance of DML in everyday database operations
    and its role in maintaining and updating data within databases.


    ## INSERT Statement: Adding New Data


    This section would introduce the INSERT statement. It would cover how to add new
    rows to a table, including the syntax for specifying columns and values. Examples
    would illustrate inserting single rows as well as multiple rows in one query.


    ## UPDATE Statement: Modifying Existing Data


    Next, the chapter would explore the UPDATE statement. It would explain how to
    modify existing data in a database, focusing on the syntax and best practices
    to target specific rows using conditions.


    ## DELETE Statement: Removing Data


    The DELETE statement would be the focus of this section. It would cover how to
    remove rows from a database table, emphasizing the importance of using conditions
    to selectively delete data and the implications of deleting data.


    ## Practical Example: Managing a Human Resources Database


    To provide hands-on learning, the chapter would introduce a practical scenario
    involving a human resources (HR) database. This database would include tables
    for employees, departments, and roles.


    ## Creating and Populating the HR Database


    An exercise would guide the reader through creating the HR database and populating
    it with initial data. This would set the stage for practical DML operations.


    ## Using INSERT to Add New Employees


    Utilizing the HR database, this section would demonstrate how to add new employees
    using the INSERT statement. It would show how to insert data into multiple related
    tables (like employees and roles).


    ## Updating Employee Information with UPDATE


    The chapter would continue with examples of how to use the UPDATE statement to
    modify employee records, such as updating employee roles, salaries, or department
    assignments.


    ## Deleting Records with DELETE


    Using the DELETE statement, the chapter would demonstrate how to remove records,
    such as deleting records of employees who have left the organization. It would
    also discuss the implications of cascade deletes and how to handle them.


    ## Transaction Control in DML Operations


    This important section would introduce the concept of transactions in SQL. It
