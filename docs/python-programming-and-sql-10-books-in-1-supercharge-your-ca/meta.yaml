    \n要建立连接，你需要数据库主机、数据库名称、用户名和密码。连接器使用这些凭据创建一个连接对象，该对象用于后续的数据库操作。\n\n```python\n\
    import mysql.connector\ncnx = mysql.connector.connect(user='username', password='password',\
