    ```\n\n这个例子展示了一个程序如何被组织成单独的函数，每个函数执行特定的任务，从而增强了代码的可读性和可维护性。\n\n## 高级函数概念\n\n随着我们深入探讨函数，本节将探索更高级的概念，如递归、lambda函数、闭包和装饰器。这些概念使得在Python中能够更复杂和强大地使用函数。\n\
