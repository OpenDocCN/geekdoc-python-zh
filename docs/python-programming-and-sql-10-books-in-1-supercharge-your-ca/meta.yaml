    \ as err:\n    print(f\"Error: {err}\")\n```\n\n## 5.6 创建游标对象\n\n连接建立后，使用连接对象创建一个游标对象。游标用于执行\
    \ SQL 语句。\n\n```python\ncursor = cnx.cursor()\n```\n\n## 5.7 执行 SQL 语句\n\nSQL\
    \ 语句使用游标对象执行。例如，要执行 SELECT 语句：\n\n```python\nquery = \"SELECT * FROM mytable\"\
    \ncursor.execute(query)\n```\n\n## 5.8 获取结果\n\n执行 SELECT 语句后，可以使用游标获取结果。有诸如 fetchone()、fetchmany()\
    \ 和 fetchall() 等方法用于检索结果。"
