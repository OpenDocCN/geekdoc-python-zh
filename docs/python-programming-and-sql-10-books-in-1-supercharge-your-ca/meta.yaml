- md: "To create a module, simply save your code in a new file with the .py extension.\n\
    \n## Using a Module\n\nYou can use any Python file as a module by importing it\
    \ into another Python file. For example, if you have a file named mymodule.py,\
    \ you can use it in another file by importing it:\n\n```python\nimport mymodule\n\
    \nmymodule.my_function()\n```\n\n## Practical Example: A Simple Database Query\
    \ Tool\n\nLet's create a simple Python tool that uses functions and modules to\
    \ interact with a SQL database. This tool will allow users to execute basic SQL\
    \ queries and retrieve results.\n\nFirst, create a module for database operations,\
    \ dbmodule.py:\n\n```python\nimport sqlite3\n\ndef create_connection(db_file):\n\
    \    \"\"\"Create a database connection to a SQLite database.\"\"\"\n    conn\
    \ = None\n    try:\n        conn = sqlite3.connect(db_file)\n        return conn\n\
    \    except Exception as e:\n        print(e)\n\ndef execute_query(conn, query):\n\
    \    \"\"\"Execute a SQL query.\"\"\"\n    try:\n        c = conn.cursor()\n \
    \       c.execute(query)\n        return c.fetchall()\n    except Exception as\
    \ e:\n        print(e)\n```\n\nNext, use this module in the main application:\n\
    \n```python\nimport dbmodule\n\ndatabase = \"mydatabase.db\"\n\ndef main():\n\
    \    conn = dbmodule.create_connection(database)\n\n    while True:\n        sql\
    \ = input(\"Enter SQL query or 'exit' to quit: \")\n        if sql.lower() ==\
    \ 'exit':\n            break\n\n        results = dbmodule.execute_query(conn,\
    \ sql)\n        for row in results:\n            print(row)\n\n    if conn:\n\
    \        conn.close()\n\nif __name__ == \"__main__\":\n    main()\n```\n\nIn this\
    \ example, dbmodule.py contains functions to create a database connection and\
    \ execute SQL queries. The main application imports this module and uses its functions\
    \ to interact with the database. This modular approach not only makes the code\
    \ more organized and readable but also allows reusability of the database interaction\
    \ logic.\n\nAs we progress through the rest of this chapter, our exploration will\
    \ extend into more advanced aspects of Python's functions and modules. These advanced\
    \ topics are not only intellectually stimulating but also immensely practical,\
    \ particularly in the realm of data-driven applications where Python's interaction\
    \ with SQL is often central.\n\n## Lambda Functions\n\nLambda functions, also\
    \ known as anonymous functions, are small, one-line functions defined without\
    \ a name. They can have any number of arguments but only one expression. The power\
    \ of lambda functions lies in their simplicity and the fact that they can be used\
    \ wherever function objects are required.\n\n```python\nmultiply = lambda x, y:\
    \ x * y\nprint(multiply(5, 6)) # Output: 30\n```\n\nWe will examine how lambda\
    \ functions can streamline your code, particularly in data manipulation tasks\
    \ such as sorting or filtering data.\n\n## Function Decorators\n\nDecorators are\
    \ a significant Python feature that allows for the modification of the behavior\
    \ of a function or class. Decorators wrap a function, modifying its behavior before\
    \ and after the function call.\n\n```python\ndef my_decorator(func):\n    def\
    \ wrapper():\n        print(\"Something is happening before the function is called.\"\
    )\n        func()\n        print(\"Something is happening after the function is\
    \ called.\")\n    return wrapper\n\n@my_decorator\ndef say_hello():\n    print(\"\
    Hello!\")\n\nsay_hello()\n```\n\nThis segment will focus on how decorators can\
    \ be used to extend the functionality of existing code, for example, adding logging\
    \ or performance measurement in data processing functions.\n\n## Creating and\
    \ Using Packages\n\nA package in Python is a directory containing a special file\
    \ __init__.py and can include modules and sub-packages. Packages allow for a hierarchical\
    \ structuring of the module namespace using dot notation.\n\nWe'll delve into\
    \ creating packages, structuring them, and using them effectively in your projects.\
    \ This is crucial for organizing large Python projects, particularly those involving\
    \ multiple modules interacting with SQL databases.\n\n## Project Structure and\
    \ Dependency Management\n\nProper project structure and dependency management\
    \ are critical for the maintainability and scalability of Python applications.\
    \ We'll cover best practices for structuring Python projects, including organizing\
    \ files and directories, managing environment variables, and utilizing virtual\
    \ environments.\n\n**Dependency management** with tools like pip and virtualenv\
    \ will also be a focus, teaching readers how to manage external libraries and\
    \ dependencies, ensuring that their Python applications remain stable and reproducible.\n\
    \n## Integrating Python Functions with SQL\n\nIn the context of SQL integration,\
    \ we will explore how Python functions can be used to encapsulate database operations,\
    \ making the code more modular and reusable. This includes creating functions\
    \ to handle database connections, execute queries, and process results.\n\n##\
    \ Practical Applications\n\nReal-world scenarios and case studies will illustrate\
    \ how these concepts can be applied in data-driven projects. For instance, how\
    \ to structure a Python project for data analysis, utilizing modules and packages\
    \ for handling different aspects of data retrieval, processing, and visualization.\n\
    \n# Chapter 8: Data Manipulation with SQL\n\nIn this chapter, we delve into the\
    \ crucial aspects of data manipulation using SQL. This involves understanding\
    \ and executing the various operations that can be performed on data within a\
    \ database, such as insertion, updating, deletion, and more complex data manipulation\
    \ techniques. These operations form the foundation of interacting with databases\
    \ and are essential for any application that relies on persistent data storage.\n\
    \n## Understanding SQL Data Manipulation Language (DML)\n\nSQL Data Manipulation\
    \ Language (DML) is a subset of SQL commands used to add, update, and delete data\
    \ in a database. The primary DML commands are INSERT, UPDATE, and DELETE.\n\n\
    1. **INSERT**: Used to add new rows to a table.\n2. **UPDATE**: Used to modify\
    \ existing data in a table.\n3. **DELETE**: Used to remove rows from a table.\n\
    \n## Inserting Data into Tables\n\nThe INSERT command is used to add new records\
    \ to a table. The syntax allows for inserting data into specific columns or all\
    \ columns in a table.\n\n```sql\nINSERT INTO table_name (column1, column2, column3,\
    \ ...)\nVALUES (value1, value2, value3, ...);\n```\n\n## Updating Data in Tables\n\
    \nThe UPDATE command is used to modify existing records in a table. It is crucial\
    \ to use a WHERE clause to specify which records should be updated; otherwise,\
    \ all records will be updated.\n\n```sql\nUPDATE table_name\nSET column1 = value1,\
    \ column2 = value2, ...\nWHERE condition;\n```\n\n## Deleting Data from Tables\n\
    \nThe DELETE command is used to remove rows from a table. Similar to the UPDATE\
    \ command, it is important to use a WHERE clause to specify which rows to delete.\n\
    \n```sql\nDELETE FROM table_name WHERE condition;\n```\n\n## Practical Example:\
    \ Library Management System\n\nLet's apply these concepts to a practical example:\
    \ a library management system. We'll create a simple database with two tables,\
    \ Books and Borrowers, and demonstrate how to perform basic DML operations.\n\n\
    1. **Books Table:** Contains details about the books.\n2. **Borrowers Table:**\
    \ Contains details about the borrowers.\n\n```sql\n-- Create Books table\nCREATE\
    \ TABLE Books (\n    BookID INT PRIMARY KEY,\n    Title VARCHAR(100),\n    Author\
    \ VARCHAR(100),\n    IsBorrowed BOOLEAN\n);\n\n-- Create Borrowers table\nCREATE\
    \ TABLE Borrowers (\n    BorrowerID INT PRIMARY KEY,\n    Name VARCHAR(100)\n\
    );\n\n-- Inserting data into Books\nINSERT INTO Books (BookID, Title, Author,\
    \ IsBorrowed)\nVALUES (1, '1984', 'George Orwell', FALSE),\n       (2, 'To Kill\
    \ a Mockingbird', 'Harper Lee', FALSE);\n\n-- Inserting data into Borrowers\n\
    INSERT INTO Borrowers (BorrowerID, Name)\nVALUES (1001, 'John Doe'),\n       (1002,\
    \ 'Jane Smith');\n```\n\n## Borrowing a Book\n\nWhen a borrower takes a book,\
    \ we need to update the IsBorrowed field in the Books table.\n\n```sql\n-- John\
    \ Doe borrows the book with BookID = 1\nUPDATE Books\nSET IsBorrowed = TRUE\n\
    WHERE BookID = 1;\n```\n\n## Returning a Book\n\nWhen a book is returned, we update\
    \ the IsBorrowed field back to FALSE.\n\n```sql\nUPDATE Books\nSET IsBorrowed\
    \ = FALSE\nWHERE BookID = 1;\n```"
  mdcn: "要创建一个模块，只需将你的代码保存在一个扩展名为 `.py` 的新文件中即可。\n\n## 使用模块\n\n你可以通过将任何 Python 文件导入到另一个\
