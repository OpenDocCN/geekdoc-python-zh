    # 8.1 Understanding Advanced SQL Concepts


    Advanced SQL involves concepts such as subqueries, complex joins, window functions,
    and CTEs (Common Table Expressions). These concepts enable more intricate operations
    on data.


    # 8.2 Using Subqueries


    Subqueries are queries nested within other SQL queries. They can be used in various
    places such as in the SELECT, FROM, and WHERE clauses.


    ```

    sql

    SELECT * FROM users WHERE id IN (SELECT user_id FROM orders WHERE purchase_date
    > ''2023-01-01'')

    ```


    # 8.3 Implementing Complex Joins


    Complex joins involve joining multiple tables in a single query, which is particularly
    useful in databases with normalized schemas.


    ```

    sql

    SELECT orders.id, users.username, products.name

    FROM orders

    JOIN users ON orders.user_id = users.id

    JOIN products ON orders.product_id = products.id

    ```


