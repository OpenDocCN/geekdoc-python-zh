    \n## 第四章：高级数据结构\n\n超越基础：列表、元组、集合和字典\n\n在本章中，我们将探讨Python的高级数据结构——列表、元组、集合和字典——重点关注它们的独特特性、用例，以及它们如何增强Python程序的功能和效率。\n\
    \n## 列表：Python中的动态数组\n\nPython中的列表是可以存储不同数据类型元素的动态数组。本节将回顾列表，探讨它们的属性、方法，以及使用列表推导式以简洁可读的方式创建列表的概念。\n\
    \n## 实际示例：使用列表\n\n考虑一个管理任务列表的程序。我们将演示如何在列表中添加、删除和操作元素，以及使用列表推导式过滤任务。\n\n```python\n\
