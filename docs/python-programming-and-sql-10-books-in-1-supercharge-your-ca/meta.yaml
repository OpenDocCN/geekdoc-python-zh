    \ various types of functions, including scalar functions, table-valued functions,\
    \ and aggregate functions. This section explains each type with examples.\n\n\
    ### Section 3: Introduction to Stored Procedures\n\nStored procedures are similar\
    \ to functions but are more powerful and versatile. They can perform a series\
    \ of operations and can return zero or more results.\n\n### Example:\n\nCreating\
    \ a stored procedure in 'EmployeeDB' to insert a new employee record:\n\n```sql\n\
    CREATE PROCEDURE AddEmployee\n    @FirstName VARCHAR(50),\n    @LastName VARCHAR(50),\n\
    \    @DepartmentID INT\nAS\nBEGIN\n    INSERT INTO Employees (FirstName, LastName,\
