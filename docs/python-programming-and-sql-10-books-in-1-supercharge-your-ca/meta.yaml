    \ INNER JOIN\n\nINNER JOIN is the most common type of SQL join, which returns\
    \ rows when there is a match in both tables.\n\nExample:\n\nConsider two tables\
    \ in a database 'CompanyDB': 'Employees' and 'Departments'. To list all employees\
