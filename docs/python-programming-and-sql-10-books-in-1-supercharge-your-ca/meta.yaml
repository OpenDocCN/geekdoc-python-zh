    # Chapter 5: Advanced Data Queries: Subqueries and Complex Joins


    **Subline: Enhancing SQL Skills for Sophisticated Data Retrieval**


    Building on the foundational SQL skills established in previous chapters, Chapter
    5 delves into more complex aspects of SQL: subqueries and advanced join operations.
    These advanced techniques are essential for tackling intricate data retrieval
    scenarios often encountered in real-world applications.


    # 5.1 The Role of Subqueries in SQL


    A subquery is a SQL query nested inside a larger query. It can be used in various
    places within a query, including the SELECT, FROM, and WHERE clauses. Subqueries
    are incredibly versatile and can be used to simplify complex queries, perform
    advanced data analysis, and aggregate data in ways not possible with basic queries
    alone.


    # 5.2 Types of Subqueries


    There are two main types of subqueries: correlated and non-correlated. A non-correlated
    subquery is independent of the outer query and can be run alone. In contrast,
    a correlated subquery depends on data from the outer query.


    # 5.3 Basic Subquery Syntax


    The basic syntax for a subquery involves nesting a SELECT statement inside another
    SQL statement. Here''s a simple example:


    ```

    sql

    SELECT * FROM employees WHERE department_id IN (SELECT department_id FROM departments
    WHERE name = ''Sales'');

    ```


    In this example, the subquery retrieves department IDs for the ''Sales'' department,
    which are then used by the outer query to fetch employees from those departments.


    # 5.4 Using Subqueries in the FROM Clause


    Subqueries can also be used in the FROM clause to create a temporary table that
    the outer query can then access.'
