    <!-- templates/index.html -->\n<html>\n<head>\n    <title>{{ title }}</title>\n\
    </head>\n<body>\n    <h1>Welcome to the Home Page</h1>\n</body>\n</html>\n```\n\
    \n## Working with Databases in Web Applications\n\nIntegrating databases is crucial\
    \ for most web applications to store and retrieve data.\n\n### Database Integration\
    \ with Flask:\n\nFlask can be integrated with SQL databases using extensions like\
    \ Flask-SQLAlchemy.\n\n```python\nfrom flask import Flask\nfrom flask_sqlalchemy\
    \ import SQLAlchemy\n\napp = Flask(__name__)\napp.config['SQLALCHEMY_DATABASE_URI']\
    \ = 'sqlite:///site.db'\ndb = SQLAlchemy(app)\n\nclass User(db.Model):\n    id\
    \ = db.Column(db.Integer, primary_key=True)\n    username = db.Column(db.String(20),\
    \ unique=True, nullable=False)\n\n@app.route('/')\ndef home():\n    return \"\
    Hello, World!\"\n\nif __name__ == '__main__':\n    app.run(debug=True)\n```\n\n\
    ## Practical Example: Building a Blog Application with Flask\n\nAs a practical\
