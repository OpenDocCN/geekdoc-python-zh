    # Chapter 6: Data Manipulation and CRUD Operations


    Inserting, Updating, Deleting, and Retrieving Data using Python and SQL Server


    In this chapter, we delve deeper into Data Manipulation Language (DML), focusing
    on the four fundamental operations of any database application: Create, Read,
    Update, and Delete (CRUD). These operations form the backbone of data management
    in SQL Server and are crucial for maintaining and manipulating data within a database.
    We will explore how to execute these operations using Python, best practices for
    efficiency and security, and error handling. A comprehensive example will be included
    to demonstrate these concepts in a practical scenario.


    # Understanding CRUD Operations


    +   1. **Create (Insert)**: Adding new records to a database table.

    2. **Read (Select)**: Retrieving data from a table.

    3. **Update**: Modifying existing records in a table.

    4. **Delete**: Removing records from a table.


    # Executing CRUD Operations in Python


    CRUD operations in Python, when working with SQL Server, are executed using the
    pyodbc library. The process involves forming a SQL query and executing it through
    a cursor object.


    # Best Practices


    When performing CRUD operations, certain best practices should be followed:


    +   1. **Use Parameterized Queries**: To prevent SQL injection and ensure data
    integrity.

    2. **Manage Transactions**: To maintain data consistency, especially in the case
    of multi-step operations.

    3. **Handle Exceptions**: To deal with errors and unexpected issues in a controlled
    way.'
