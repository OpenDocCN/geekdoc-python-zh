    # Chapter 5: Executing SQL Queries through Python


    Crafting and Running SQL Statements from Python Applications


    In this chapter, we focus on the execution of SQL queries from within Python applications.
    This ability is central to leveraging the full potential of Python and SQL Server
    integration. We will explore various types of SQL queries, from basic data retrieval
    to complex joins and subqueries, and how they can be executed using Python. Handling
    query results and error management will also be discussed. To illustrate these
    concepts, a practical example will be provided.


    # SQL Query Basics


    SQL queries are used to interact with the database, allowing for data retrieval,
    updates, insertions, and deletions. In Python, these queries are executed through
    a cursor object obtained from the database connection.


    # Types of SQL Queries


    +   1. **Select Queries:** Used for data retrieval.

    2. **Insert Queries:** Used to add new records to a table.

    3. **Update Queries:** Used to modify existing records.

    4. **Delete Queries:** Used to remove records from a table.


    # Executing SQL Queries in Python


    With pyodbc, executing an SQL query involves creating a cursor from the database
    connection, executing the query using the cursor, and then fetching the results
    if it''s a SELECT query.


    # Handling Query Results


    The results of SELECT queries can be retrieved using methods like fetchone(),
    fetchall(), or fetchmany(). It''s important to handle these results correctly
    to avoid issues like memory overload or incomplete data retrieval.'
