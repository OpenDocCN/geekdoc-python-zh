    FROM Sales;

    ```


    This query calculates the total and average sale amounts from the ''Sales'' table.


    # Section 3: Window Functions in SQL


    Window functions perform calculations across a set of table rows that are somehow
    related to the current row. They are useful for complex analytical tasks.


    # Example:


    To calculate a running total of sales in ''SalesDB'':


    ```

    sql

