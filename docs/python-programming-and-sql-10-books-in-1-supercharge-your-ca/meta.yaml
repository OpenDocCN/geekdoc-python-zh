    \        self.title = title\n        self.author = author\n        self.pages\
    \ = pages\n\n    def get_info(self):\n        return f\"{self.title} by {self.author},\
    \ {self.pages} pages\"\n\n# Creating an object of the Book class\nbook1 = Book(\"\
    Python Programming\", \"Jane Doe\", 300)\nprint(book1.get_info())\n```\n\nThis\
    \ example demonstrates how to define a class, initialize its attributes, and add\
    \ methods to it.\n\n## Inheritance in Python\n\nInheritance allows new classes\
    \ to inherit properties and methods from existing classes. This section explores\
