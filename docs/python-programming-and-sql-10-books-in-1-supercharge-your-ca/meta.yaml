    ```\n\nNext, we define our Book class as shown earlier and create a table in the\
    \ database:\n\n```python\nfrom sqlalchemy.ext.declarative import declarative_base\n\
    from sqlalchemy import Column, Integer, String\n\nBase = declarative_base()\n\n\
    class Book(Base):\n    __tablename__ = 'books'\n    id = Column(Integer, primary_key=True)\n\
    \    title = Column(String)\n    author = Column(String)\n\nBase.metadata.create_all(engine)\n\
    ```\n\nNow, let's add a new book to our library:\n\n```python\nfrom sqlalchemy.orm\
    \ import sessionmaker\n\nSession = sessionmaker(bind=engine)\nsession = Session()\n\
    \nnew_book = Book(title='Python and SQL', author='Alice Smith')\nsession.add(new_book)\n\
    session.commit()\n```\n\nThis code creates a new instance of the Book class and\
    \ adds it to the database.\n\nFinally, we can query our library to find all books\
    \ by a particular author:\n\n```python\nbooks = session.query(Book).filter_by(author='Alice\
    \ Smith').all()\nfor book in books:\n    print(book.title)\n```\n\nThis application\
    \ demonstrates the power of integrating Python with SQL, allowing for efficient\
    \ and effective data management in a database-driven environment.\n\nThrough this\
    \ chapter, we have explored the essentials of integrating Python with SQL databases,\
    \ focusing on libraries like SQLAlchemy and PyMySQL. This integration forms the\
    \ backbone of many data-driven applications and is an invaluable skill in the\
    \ toolkit of a modern data professional. The following chapters will build upon\
    \ these concepts, introducing more advanced techniques for data retrieval, manipulation,\
    \ and analysis using Python and SQL.\n\n## Chapter 4: Data Retrieval and Manipulation:\
    \ Python Meets SQL\n\nSubline: Executing SQL Queries within Python Scripts\n\n\
    In this chapter, we delve into the practical aspects of using Python for executing\
    \ SQL queries and manipulating the retrieved data. This integration of Python\
    \ and SQL is pivotal in the field of data science, where data retrieval and manipulation\
    \ are routine tasks. We will explore various techniques for executing SQL queries\
    \ from Python scripts, handling the results, and performing data manipulation\
    \ tasks.\n\n### 4.1 The Importance of Data Retrieval and Manipulation\n\nData\
    \ retrieval and manipulation are at the heart of data analysis and management.\
    \ SQL provides powerful tools for retrieving data from databases, and Python excels\
    \ in data manipulation, offering a comprehensive set of libraries for processing\
    \ and analyzing data.\n\n### 4.2 Setting up the Environment\n\nTo execute SQL\
    \ queries within Python, you need a database to connect to and a Python environment\
    \ set up with the necessary libraries (like SQLAlchemy or PyMySQL, as discussed\
    \ in Chapter 3). For demonstration purposes, we will use a MySQL database and\
    \ SQLAlchemy for database interactions.\n\n### 4.3 Executing Basic SQL Queries\
    \ in Python\n\nPython allows for executing all types of SQL queries – SELECT,\
    \ INSERT, UPDATE, and DELETE – through its libraries. Here's an example of executing\
    \ a basic SELECT query using SQLAlchemy:\n\n```python\nfrom sqlalchemy import\
    \ create_engine\n\n# Create a database engine\nengine = create_engine('mysql+pymysql://user:password@host/database')\n\
    \n# Execute a query\nwith engine.connect() as connection:\n    result = connection.execute(\"\
    SELECT * FROM users\")\n    for row in result:\n        print(row)\n```\n\nThis\
    \ script connects to a database and prints out every row in the users table.\n\
    \n### 4.4 Parameterized Queries\n\nParameterized queries are crucial for preventing\
    \ SQL injection attacks. They allow you to safely insert user-supplied data into\
    \ SQL statements.\n\nHere's how to execute a parameterized query with SQLAlchemy:\n\
    \n```python\nfrom sqlalchemy.sql import text\n\nwith engine.connect() as connection:\n\
    \    query = text(\"SELECT * FROM users WHERE username = :username\")\n    result\
    \ = connection.execute(query, username=\"alice\")\n    for row in result:\n  \
    \      print(row)\n```\n\nIn this example, :username is a placeholder for a parameter\
    \ whose value is provided in the execute method.\n\n### 4.5 Data Manipulation\
    \ after Retrieval\n\nOnce data is retrieved from the database, Python can be used\
    \ for various data manipulation tasks. For example, you might want to process\
    \ the data and prepare it for analysis or reporting.\n\nSuppose you have retrieved\
    \ a list of user records and want to calculate the average age:\n\n```python\n\
    users = connection.execute(\"SELECT age FROM users\").fetchall()\nages = [row['age']\
    \ for row in users]\naverage_age = sum(ages) / len(ages)\nprint(\"Average Age:\"\
    , average_age)\n```\n\nThis code calculates and prints the average age of users.\n\
    \n### 4.6 Inserting and Updating Data\n\nPython can also be used to insert and\
    \ update data in a SQL database. Here's an example of adding a new user:\n\n```python\n\
    insert_query = text(\"INSERT INTO users (username, age) VALUES (:username, :age)\"\
    )\nconnection.execute(insert_query, username=\"bob\", age=25)\n```\n\nAnd here's\
    \ how to update an existing user's age:\n\n```python\nupdate_query = text(\"UPDATE\
    \ users SET age = :age WHERE username = :username\")\nconnection.execute(update_query,\
    \ age=26, username=\"bob\")\n```\n\n### 4.7 Deleting Data\n\nSimilarly, Python\
    \ can be used to delete data from a database:\n\n```python\ndelete_query = text(\"\
    DELETE FROM users WHERE username = :username\")\nconnection.execute(delete_query,\
    \ username=\"bob\")\n```\n\n### 4.8 Practical Example: A User Management System\n\
    \nLet's create a simple user management system that performs basic CRUD (Create,\
    \ Read, Update, Delete) operations on a database using Python and SQL.\n\nFirst,\
    \ we set up our database connection:\n\n```python\nengine = create_engine('mysql+pymysql://user:password@host/database')\n\
    ```\n\nNext, we define a function to add a new user:\n\n```python\ndef add_user(username,\
    \ age):\n    query = text(\"INSERT INTO users (username, age) VALUES (:username,\
    \ :age)\")\n    with engine.connect() as connection:\n        connection.execute(query,\
    \ username=username, age=age)\n```\n\nWe also define functions for retrieving,\
    \ updating, and deleting users:\n\n```python\ndef get_users():\n    with engine.connect()\
    \ as connection:\n        return connection.execute(\"SELECT * FROM users\").fetchall()\n\
    \ndef update_user(username, age):\n    query = text(\"UPDATE users SET age = :age\
    \ WHERE username = :username\")\n    with engine.connect() as connection:\n  \
    \      connection.execute(query, username=username, age=age)\n\ndef delete_user(username):\n\
    \    query = text(\"DELETE FROM users WHERE username = :username\")\n    with\
    \ engine.connect() as connection:\n        connection.execute(query, username=username)\n\
    ```\n\nWith these functions, we can manage users in our database through Python,\
    \ showcasing the practical utility of integrating Python and SQL for data retrieval\
    \ and manipulation.\n\nThis chapter demonstrates the efficiency and power of combining\
    \ Python's data manipulation capabilities with SQL's data retrieval features.\
    \ As we move forward, the subsequent chapters will delve into more advanced topics,\
    \ further enhancing your ability to manage and analyze data effectively.\n\n##\
    \ Chapter 5: Advanced Data Queries: Subqueries and Complex Joins\n\n**Subline:\
    \ Enhancing SQL Skills for Sophisticated Data Retrieval**\n\nBuilding on the foundational\
    \ SQL skills established in previous chapters, Chapter 5 delves into more complex\
    \ aspects of SQL: subqueries and advanced join operations. These advanced techniques\
    \ are essential for tackling intricate data retrieval scenarios often encountered\
    \ in real-world applications.\n\n### 5.1 The Role of Subqueries in SQL\n\nA subquery\
    \ is a SQL query nested inside a larger query. It can be used in various places\
    \ within a query, including the SELECT, FROM, and WHERE clauses. Subqueries are\
    \ incredibly versatile and can be used to simplify complex queries, perform advanced\
    \ data analysis, and aggregate data in ways not possible with basic queries alone.\n\
    \n### 5.2 Types of Subqueries\n\nThere are two main types of subqueries: correlated\
    \ and non-correlated. A non-correlated subquery is independent of the outer query\
    \ and can be run alone. In contrast, a correlated subquery depends on data from\
    \ the outer query.\n\n### 5.3 Basic Subquery Syntax\n\nThe basic syntax for a\
    \ subquery involves nesting a SELECT statement inside another SQL statement. Here's\
    \ a simple example:\n\n```sql\nSELECT * FROM employees WHERE department_id IN\
    \ (SELECT department_id FROM departments WHERE name = 'Sales');\n```\n\nIn this\
    \ example, the subquery retrieves department IDs for the 'Sales' department, which\
    \ are then used by the outer query to fetch employees from those departments.\n\
    \n### 5.4 Using Subqueries in the FROM Clause\n\nSubqueries can also be used in\
    \ the FROM clause to create a temporary table that the outer query can then access."
  mdcn: "## 3.8 实践示例：一个数据库驱动的Python应用程序\n\n让我们考虑一个实际例子，我们将开发一个简单的Python应用程序，该程序与SQL数据库交互以管理一个图书馆系统。\n\
    \n首先，我们建立与数据库的连接：\n\n```python\nengine = create_engine('mysql+pymysql://user:password@host/library')\n\
    ```\n\n接下来，我们像之前那样定义我们的Book类，并在数据库中创建一个表：\n\n```python\nfrom sqlalchemy.ext.declarative\
    \ import declarative_base\nfrom sqlalchemy import Column, Integer, String\n\n\
    Base = declarative_base()\n\nclass Book(Base):\n    __tablename__ = 'books'\n\
    \    id = Column(Integer, primary_key=True)\n    title = Column(String)\n    author\
    \ = Column(String)\n\nBase.metadata.create_all(engine)\n```\n\n现在，让我们向图书馆添加一本新书：\n\
    \n```python\nfrom sqlalchemy.orm import sessionmaker\n\nSession = sessionmaker(bind=engine)\n\
    session = Session()\n\nnew_book = Book(title='Python and SQL', author='Alice Smith')\n\
    session.add(new_book)\nsession.commit()\n```\n\n这段代码创建了一个新的Book类实例并将其添加到数据库中。\n\
    \n最后，我们可以查询图书馆，找出特定作者的所有书籍：\n\n```python\nbooks = session.query(Book).filter_by(author='Alice\
    \ Smith').all()\nfor book in books:\n    print(book.title)\n```\n\n这个应用程序展示了将Python与SQL集成的强大功能，允许在数据库驱动的环境中进行高效且有效的数据管理。\n\
    \n通过本章，我们探讨了将Python与SQL数据库集成的基础知识，重点关注了SQLAlchemy和PyMySQL等库。这种集成构成了许多数据驱动应用程序的基石，是现代数据专业人员工具箱中的一项宝贵技能。后续章节将在此基础上，介绍使用Python和SQL进行数据检索、操作和分析的更高级技术。\n\
    \n## 第4章：数据检索与操作：Python与SQL相遇\n\n副标题：在Python脚本中执行SQL查询\n\n在本章中，我们将深入探讨使用Python执行SQL查询和操作检索到的数据的实际方面。Python和SQL的这种集成在数据科学领域至关重要，因为数据检索和操作是日常任务。我们将探索从Python脚本执行SQL查询、处理结果以及执行数据操作任务的各种技术。\n\
    \n### 4.1 数据检索与操作的重要性\n\n数据检索与操作是数据分析和管理的核心。SQL提供了从数据库检索数据的强大工具，而Python在数据操作方面表现出色，提供了一套全面的库来处理和分析数据。\n\
    \n### 4.2 设置环境\n\n要在Python中执行SQL查询，你需要一个可连接的数据库以及一个设置了必要库（如第3章讨论的SQLAlchemy或PyMySQL）的Python环境。为了演示目的，我们将使用MySQL数据库和SQLAlchemy进行数据库交互。\n\
    \n### 4.3 在Python中执行基本SQL查询\n\nPython允许通过其库执行所有类型的SQL查询——SELECT、INSERT、UPDATE和DELETE。以下是使用SQLAlchemy执行基本SELECT查询的示例：\n\
    \n```python\nfrom sqlalchemy import create_engine\n\n# 创建数据库引擎\nengine = create_engine('mysql+pymysql://user:password@host/database')\n\
    \n# 执行查询\nwith engine.connect() as connection:\n    result = connection.execute(\"\
    SELECT * FROM users\")\n    for row in result:\n        print(row)\n```\n\n此脚本连接到数据库并打印出users表中的每一行。\n\
    \n### 4.4 参数化查询\n\n参数化查询对于防止SQL注入攻击至关重要。它们允许你安全地将用户提供的数据插入到SQL语句中。\n\n以下是使用SQLAlchemy执行参数化查询的方法：\n\
    \n```python\nfrom sqlalchemy.sql import text\n\nwith engine.connect() as connection:\n\
    \    query = text(\"SELECT * FROM users WHERE username = :username\")\n    result\
    \ = connection.execute(query, username=\"alice\")\n    for row in result:\n  \
    \      print(row)\n```\n\n在这个例子中，:username是一个参数占位符，其值在execute方法中提供。\n\n### 4.5\
    \ 检索后的数据操作\n\n一旦从数据库检索到数据，就可以使用Python执行各种数据操作任务。例如，你可能想要处理数据并为分析或报告做准备。\n\n假设你检索到了一个用户记录列表，并想计算平均年龄：\n\
    \n```python\nusers = connection.execute(\"SELECT age FROM users\").fetchall()\n\
    ages = [row['age'] for row in users]\naverage_age = sum(ages) / len(ages)\nprint(\"\
    Average Age:\", average_age)\n```\n\n这段代码计算并打印出用户的平均年龄。\n\n### 4.6 插入和更新数据\n\n\
    Python也可用于向SQL数据库插入和更新数据。以下是添加新用户的示例：\n\n```python\ninsert_query = text(\"INSERT\
    \ INTO users (username, age) VALUES (:username, :age)\")\nconnection.execute(insert_query,\
    \ username=\"bob\", age=25)\n```\n\n以下是更新现有用户年龄的方法：\n\n```python\nupdate_query\
    \ = text(\"UPDATE users SET age = :age WHERE username = :username\")\nconnection.execute(update_query,\
    \ age=26, username=\"bob\")\n```\n\n### 4.7 删除数据\n\n类似地，Python可用于从数据库中删除数据：\n\n\
    ```python\ndelete_query = text(\"DELETE FROM users WHERE username = :username\"\
    )\nconnection.execute(delete_query, username=\"bob\")\n```\n\n### 4.8 实践示例：一个用户管理系统\n\
    \n让我们创建一个简单的用户管理系统，该系统使用Python和SQL对数据库执行基本的CRUD（创建、读取、更新、删除）操作。\n\n首先，我们设置数据库连接：\n\
    \n```python\nengine = create_engine('mysql+pymysql://user:password@host/database')\n\
    ```\n\n接下来，我们定义一个添加新用户的函数：\n\n```python\ndef add_user(username, age):\n    query\
    \ = text(\"INSERT INTO users (username, age) VALUES (:username, :age)\")\n   \
    \ with engine.connect() as connection:\n        connection.execute(query, username=username,\
    \ age=age)\n```\n\n我们还定义了用于检索、更新和删除用户的函数：\n\n```python\ndef get_users():\n   \
    \ with engine.connect() as connection:\n        return connection.execute(\"SELECT\
    \ * FROM users\").fetchall()\n\ndef update_user(username, age):\n    query = text(\"\
    UPDATE users SET age = :age WHERE username = :username\")\n    with engine.connect()\
    \ as connection:\n        connection.execute(query, username=username, age=age)\n\
    \ndef delete_user(username):\n    query = text(\"DELETE FROM users WHERE username\
    \ = :username\")\n    with engine.connect() as connection:\n        connection.execute(query,\
    \ username=username)\n```\n\n通过这些函数，我们可以通过Python管理数据库中的用户，展示了将Python和SQL集成用于数据检索和操作的实际效用。\n\
    \n本章展示了将Python的数据操作能力与SQL的数据检索特性相结合的效率和强大功能。随着我们继续前进，后续章节将深入探讨更高级的主题，进一步增强你有效管理和分析数据的能力。\n\
    \n## 第5章：高级数据查询：子查询与复杂连接\n\n**副标题：提升SQL技能以实现复杂数据检索**\n\n在前几章建立的SQL基础技能之上，第5章深入探讨了SQL更复杂的方面：子查询和高级连接操作。这些高级技术对于处理现实世界应用中经常遇到的复杂数据检索场景至关重要。\n\
    \n### 5.1 子查询在SQL中的作用\n\n子查询是嵌套在较大查询中的SQL查询。它可以在查询的多个位置使用，包括SELECT、FROM和WHERE子句。子查询功能极其多样，可用于简化复杂查询、执行高级数据分析以及以基本查询无法实现的方式聚合数据。\n\
    \n### 5.2 子查询的类型\n\n子查询主要有两种类型：相关子查询和非相关子查询。非相关子查询独立于外部查询，可以单独运行。相反，相关子查询依赖于外部查询的数据。\n\
    \n### 5.3 基本子查询语法\n\n子查询的基本语法涉及将SELECT语句嵌套在另一个SQL语句中。这里有一个简单的例子：\n\n```sql\nSELECT\
    \ * FROM employees WHERE department_id IN (SELECT department_id FROM departments\
    \ WHERE name = 'Sales');\n```\n\n在这个例子中，子查询检索'Sales'部门的部门ID，然后外部查询使用这些ID来获取这些部门的员工。\n\
    \n### 5.4 在FROM子句中使用子查询\n\n子查询也可以在FROM子句中使用，以创建一个临时表，然后外部查询可以访问该表。"
