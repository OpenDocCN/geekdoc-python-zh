    \ query)\n\nif data:\n    format_and_display_data(data)\n```\n\n请将连接详细信息替换为你的\
    \ SQL Server 信息。\n\n### 步骤 3：运行脚本\n\n使用 `python data_reporting_tool.py` 执行脚本。这将从数据库中检索并显示员工数据。\n\
    \n## 结论\n\n本章详细探讨了通过 Python 执行 SQL 查询，涵盖了各种查询类型及其执行方法。数据报告工具示例展示了实际应用，突出了 Python\
    \ 和 SQL Server 集成在数据处理方面的便捷性和有效性。同时，也讨论了错误处理和结果管理，强调了编写健壮且容错代码的重要性。这些技能对于任何旨在使用\
    \ Python 和 SQL Server 构建数据驱动型应用程序的开发者来说都是基础，为后续章节中更高级的数据操作和分析技术奠定了基础。\n\n## 第\
    \ 6 章：数据操作与 CRUD 操作\n\n使用 Python 和 SQL Server 进行数据的插入、更新、删除和检索\n\n本章我们将深入探讨数据操作语言（DML），重点关注任何数据库应用的四个基本操作：创建、读取、更新和删除（CRUD）。这些操作构成了\
    \ SQL Server 中数据管理的支柱，对于维护和操作数据库中的数据至关重要。我们将探讨如何使用 Python 执行这些操作、提高效率和安全性的最佳实践，以及错误处理。将包含一个综合示例，以在实际场景中演示这些概念。\n\
    \n### 理解 CRUD 操作\n\n1.  **创建（Create，即插入）**：向数据库表中添加新记录。\n2.  **读取（Read，即选择）**：从表中检索数据。\n\
    3.  **更新（Update）**：修改表中的现有记录。\n4.  **删除（Delete）**：从表中移除记录。\n\n### 在 Python 中执行\
    \ CRUD 操作\n\n使用 SQL Server 时，Python 中的 CRUD 操作通过 pyodbc 库执行。该过程涉及构建 SQL 查询并通过游标对象执行它。\n\
    \n### 最佳实践\n\n执行 CRUD 操作时，应遵循某些最佳实践：\n\n1.  **使用参数化查询**：以防止 SQL 注入并确保数据完整性。\n\
    2.  **管理事务**：以维护数据一致性，尤其是在多步操作的情况下。\n3.  **处理异常**：以受控的方式处理错误和意外问题。"
