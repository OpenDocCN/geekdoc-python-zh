    report\" in task]\n\nprint(\"Tasks:\", tasks)\nprint(\"Urgent tasks:\", urgent_tasks)\n\
    ```\n\n这个例子展示了Python中列表的灵活性和实用性。\n\n## 元组：不可变的集合\n\n元组与列表类似，但不可变，这意味着一旦创建，其元素就不能更改。本节讨论何时以及为何使用元组而不是列表，并探讨元组操作和解包。\n\
    \n## 实际示例：使用元组\n\n在这里，我们使用元组来存储有关产品的信息，例如其名称、价格和类别，演示了元组用于固定数据集的用法。\n\n```python\n\
    # 包含产品信息的元组\n\nproduct = (\"Smartphone\", 599.99, \"Electronics\")\n\n# 访问元组元素\n\
    print(\"Name:\", product[0])\nprint(\"Price:\", product[1])\nprint(\"Category:\"\
    , product[2])\n```\n\n## 集合：唯一元素的无序集合\n\n集合是唯一元素的无序集合。本节涵盖集合在Python中的用途，包括并集、交集和差集等操作。\n\
    \n## 实际示例：集合操作\n\n想象一个场景，我们需要找出两组物品之间的共同元素和唯一元素。这个例子说明了集合操作。\n\n```python\n# 物品集合\n\
    set1 = {\"apple\", \"banana\", \"cherry\"}\nset2 = {\"google\", \"microsoft\"\
    , \"apple\"}\n\n# 共同元素\ncommon = set1.intersection(set2)\n\n# set1中的唯一元素\nunique\
    \ = set1.difference(set2)\n\nprint(\"Common elements:\", common)\nprint(\"Unique\
    \ elements in set1:\", unique)\n```\n\n## 字典：键值对\n\n字典以键值对的形式存储数据，对于处理Python中的结构化数据至关重要。本节探讨字典操作、方法和实际用途，包括字典推导式。\n\
    \n## 实际示例：使用字典\n\n考虑一个将用户信息存储在字典中的程序。这个例子演示了创建、访问和操作字典数据。\n\n```python\n# 用户信息字典\n\
    \nuser = {\n    \"name\": \"Alice\",\n    \"age\": 30,\n    \"email\": \"alice@example.com\"\
    \n}\n\n# 添加一个键值对\nuser[\"is_admin\"] = True\n\n# 访问值\nprint(\"Name:\", user[\"\
    name\"])\nprint(\"Email:\", user[\"email\"])\n\n# 使用字典推导式过滤用户数据\nfiltered_user\
    \ = {k: v for k, v in user.items() if k != \"email\"}\n\nprint(\"Filtered user\
    \ data:\", filtered_user)\n```\n\n## 高级数据结构应用\n\n本章的最后一节探讨了这些数据结构的更复杂应用，例如嵌套数据结构、数据处理以及高效的数据存储和检索技术。"
