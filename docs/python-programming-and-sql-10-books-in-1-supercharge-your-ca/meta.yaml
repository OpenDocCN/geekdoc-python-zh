    # 7.4 Second Normal Form (2NF)


    A table is in the second normal form (2NF) if it is in 1NF and all non-key columns
    are fully dependent on the primary key.


    Example:

    If the Orders table has an additional column ProductPrice, which depends only
    on Product, not on OrderID, it violates 2NF. We would split this into two tables:
    Orders and Products.


    # 7.5 Third Normal Form (3NF)


    A table is in the third normal form (3NF) if it is in 2NF and all its columns
    are not only fully dependent on the primary key but also non-transitively dependent.


    Example:

    If the Products table has an additional column SupplierID that determines ProductPrice,
    this table violates 3NF. We would then create a separate Suppliers table.'
