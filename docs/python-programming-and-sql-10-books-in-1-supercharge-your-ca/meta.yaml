    \n## ETL流程与数据流\n\nETL流程涉及三个主要阶段：\n\n1.  **提取（E）：** 从源系统中提取数据。这可以包括关系数据库、平面文件、云存储、API等。使用pandas、SQLAlchemy和requests等Python库进行提取。\n\
    2.  **转换（T）：** 将提取的数据进行转换以满足数据仓库模式的要求。转换可能包括数据清洗、聚合、数据类型转换和数据丰富。Python用于编写复杂转换的脚本。\n\
    3.  **加载（L）：** 将转换后的数据加载到数据仓库中。SQL用于定义模式并将数据加载到表中。\n\n## 实践案例：构建销售数据仓库\n\n想象一家零售公司希望创建一个数据仓库，以集中来自多个门店和在线渠道的销售数据。该公司使用SQL数据库存储交易数据。以下是使用Python和SQL完成此任务的方法：\n\
    \n1.  **数据提取（Extract）：** Python脚本使用API从各个门店数据库和在线销售平台提取每日交易数据。数据以JSON或CSV文件形式获取。\n\
    2.  **数据转换（Transform）：** Python脚本清洗并转换提取的数据。例如，它们标准化产品名称、计算总销售额并格式化日期。\n3.  **数据加载（Load）：**\
    \ SQL用于定义数据仓库模式，包括销售、产品、门店和时间维度表。转换后的数据被加载到这些表中。"
