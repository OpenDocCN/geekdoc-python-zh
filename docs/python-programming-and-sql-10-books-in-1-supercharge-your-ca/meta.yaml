  md: "# Chapter 8: Subqueries and Nested Queries\n\n# Enhancing SQL Queries with\
    \ Advanced Techniques\n\nThis chapter explores the use of subqueries and nested\
    \ queries in SQL, powerful tools for creating more complex and dynamic queries.\n\
    \n# Section 1: Introduction to Subqueries and Nested Queries\n\nSubqueries are\
    \ queries within a query, used to perform complex operations that cannot be achieved\
    \ with a single standard SQL statement. Nested queries are a type of subquery\
    \ where a query is nested inside another query.\n\n# Section 2: Understanding\
    \ Subqueries\n\nSubqueries can be used in various places within a SQL statement,\
    \ including SELECT, FROM, and WHERE clauses. This section covers the basics of\
    \ subquery syntax and usage.\n\n# Example:\n\nConsider a database 'EmployeeDB'\
    \ with tables 'Employees' and 'Departments'. To find employees who work in the\
    \ department with the highest average salary:\n\n```\nsql\nSELECT *\nFROM Employees\n\
    WHERE DepartmentID = (\n    SELECT DepartmentID\n    FROM Departments\n    WHERE\
    \ AverageSalary = (\n        SELECT MAX(AverageSalary)\n        FROM Departments\n\
    \    )\n);\n```"
  merge: -1
  pgno: 391
- img_proc: true
  md: "This query uses nested subqueries to find the department with the highest average\
    \ salary and then selects employees from that department.\n\n# Section 3: Types\
    \ of Subqueries\n\nThis section categorizes subqueries into different types: scalar\
    \ subqueries, correlated subqueries, and subqueries in the FROM clause.\n\n# Section\
    \ 4: Correlated Subqueries\n\nCorrelated subqueries are a type of subquery that\
    \ reference columns from the outer query, making them dynamic and context-sensitive.\n\
    \n# Example:\n\nTo find employees in 'EmployeeDB' whose salary is above the average\
    \ for their department:\n\n```\nsql\nSELECT E.Name, E.Salary\nFROM Employees E\n\
    WHERE E.Salary > (\n    SELECT AVG(Salary)\n    FROM Employees\n    WHERE DepartmentID\
    \ = E.DepartmentID\n);\n```\n\nThis correlated subquery compares each employee's\
    \ salary to the average salary of their department.\n\n# Section 5: Using Subqueries\
    \ in the FROM Clause\n\nSubqueries can also be used in the FROM clause to create\
    \ a temporary table for the main query to use.\n\n# Example:\n\nTo calculate the\
    \ average salary by department in 'EmployeeDB':"
  merge: -1
  pgno: 392
- img_proc: true
  md: "```\nsql\nSELECT DepartmentID, AVG(Salary) AS AvgSalary\nFROM (\n    SELECT\
    \ DepartmentID, Salary\n    FROM Employees\n) AS DeptSalaries\nGROUP BY DepartmentID;\n\
    ```\n\nThis query uses a subquery in the FROM clause to create a temporary table\
    \ of department salaries."
