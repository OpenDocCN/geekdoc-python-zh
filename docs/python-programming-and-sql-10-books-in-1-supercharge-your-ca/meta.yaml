    \ FirstName, LastName, Department, Salary)\nVALUES (1, 'John', 'Doe', 'Finance',\
    \ 75000);\n```\n\n此语句向 'Employees' 表中插入一行具有指定值的新记录。\n\n### 第六节：从表中查询数据\n\nSELECT\
