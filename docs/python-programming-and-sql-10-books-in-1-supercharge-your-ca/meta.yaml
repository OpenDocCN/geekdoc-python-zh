    This query retrieves all employees and their department names, including employees\
    \ who might not be assigned to any department.\n\n## 5.7 FULL OUTER JOIN\n\nFULL\
    \ OUTER JOIN returns all records when there is a match in either left or right\
    \ table. This can be particularly useful for finding discrepancies between two\
    \ tables.\n\n## 5.8 Practical Example: Company Database Analysis\n\nConsider a\
    \ company database with two tables: Employees and Departments. The Employees table\
