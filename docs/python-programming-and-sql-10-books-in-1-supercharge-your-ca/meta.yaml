    \ Creating Tables\n\nCreating a table in SQL involves defining its structure.\
    \ Here's an example of creating a simple table:\n\n```sql\nCREATE TABLE Employees\
    \ (\n    EmployeeID INT PRIMARY KEY,\n    Name VARCHAR(100),\n    Position VARCHAR(100),\n\
    \    Salary FLOAT\n);\n```\n\nIn this statement, a table named Employees is created\
    \ with four columns: EmployeeID, Name, Position, and Salary.\n\n## Keys and Indexes\n\
    \nPrimary keys and foreign keys are essential in SQL tables for ensuring data\
    \ integrity and establishing relationships between tables.\n\n- **Primary Key**:\
    \ A unique identifier for each record in a table.\n- **Foreign Key**: A field\
    \ in one table that links to the primary key in another table.\n\nIndexes are\
    \ used to quickly locate data without having to search every row in a database\
    \ table every time a database table is accessed.\n\n## Table Relationships\n\n\
    There are three main types of relationships in SQL:\n\n1. **One-to-One**: Each\
    \ row in Table A is linked to one and only one row in Table B.\n2. **One-to-Many**:\
    \ A row in Table A can be related to many rows in Table B.\n3. **Many-to-Many**:\
    \ Rows in Table A can be related to many rows in Table B and vice versa.\n\n##\
    \ Practical Example: Library Database System\n\nTo illustrate these concepts,\
    \ let's create a simple library database system. We will have two tables: Books\
