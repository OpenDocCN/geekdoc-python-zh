    \ a program that reads a text file and displays its contents. This example demonstrates\
    \ how to open a file, read its contents, and then close the file.\n\n```python\n\
    # Reading from a text file\n\nwith open('example.txt', 'r') as file:\n    content\
    \ = file.read()\n    print(content)\n```\n\nThis example illustrates the use of\
    \ the `with` statement for efficient file handling, ensuring that the file is\
