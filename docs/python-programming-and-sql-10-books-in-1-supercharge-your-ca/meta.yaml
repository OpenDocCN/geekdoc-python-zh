    NumPy is a foundational library for numerical computing in Python. It introduces
    objects for multi-dimensional arrays and matrices, along with a collection of
    mathematical functions to operate on these arrays.


    Example 3.1.1 - Basic Operations with NumPy:


    ```python

    import numpy as np


