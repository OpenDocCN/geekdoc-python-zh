    import mymodule\n\nmymodule.my_function()\n```\n\n## 实践示例：一个简单的数据库查询工具\n\n让我们创建一个简单的\
    \ Python 工具，该工具使用函数和模块与 SQL 数据库进行交互。这个工具将允许用户执行基本的 SQL 查询并检索结果。\n\n首先，为数据库操作创建一个模块\
    \ `dbmodule.py`：\n\n```python\nimport sqlite3\n\ndef create_connection(db_file):\n\
    \    \"\"\"Create a database connection to a SQLite database.\"\"\"\n    conn\
    \ = None\n    try:\n        conn = sqlite3.connect(db_file)\n        return conn\n\
    \    except Exception as e:\n        print(e)\n\ndef execute_query(conn, query):\n\
    \    \"\"\"Execute a SQL query.\"\"\"\n    try:\n        c = conn.cursor()\n \
    \       c.execute(query)\n        return c.fetchall()\n    except Exception as\
    \ e:\n        print(e)\n```\n\n接下来，在主应用程序中使用这个模块：\n\n```python\nimport dbmodule\n\
    \ndatabase = \"mydatabase.db\"\n\ndef main():\n    conn = dbmodule.create_connection(database)\n\
    \n    while True:\n        sql = input(\"Enter SQL query or 'exit' to quit: \"\
    )\n        if sql.lower() == 'exit':\n            break\n\n        results = dbmodule.execute_query(conn,\
    \ sql)\n        for row in results:\n            print(row)\n\n    if conn:\n\
    \        conn.close()\n\nif __name__ == \"__main__\":\n    main()\n```\n\n在这个示例中，`dbmodule.py`\
    \ 包含用于创建数据库连接和执行 SQL 查询的函数。主应用程序导入此模块并使用其函数与数据库交互。这种模块化方法不仅使代码更有条理、更易读，还允许数据库交互逻辑的重用。\n\
    \n随着我们继续本章的后续内容，我们的探索将扩展到 Python 函数和模块的更高级方面。这些高级主题不仅在智力上引人入胜，而且非常实用，特别是在数据驱动的应用领域，其中\
    \ Python 与 SQL 的交互通常是核心。\n\n## Lambda 函数\n\nLambda 函数，也称为匿名函数，是无需命名的小型单行函数。它们可以有任意数量的参数，但只能有一个表达式。Lambda\
    \ 函数的强大之处在于其简洁性，以及它们可以在任何需要函数对象的地方使用。\n\n```python\nmultiply = lambda x, y: x\
    \ * y\nprint(multiply(5, 6)) # Output: 30\n```\n\n我们将研究 Lambda 函数如何简化你的代码，特别是在数据操作任务中，例如排序或过滤数据。\n\
    \n## 函数装饰器\n\n装饰器是 Python 的一个重要特性，它允许修改函数或类的行为。装饰器包装一个函数，在函数调用前后修改其行为。\n\n```python\n\
    def my_decorator(func):\n    def wrapper():\n        print(\"Something is happening\
    \ before the function is called.\")\n        func()\n        print(\"Something\
    \ is happening after the function is called.\")\n    return wrapper\n\n@my_decorator\n\
    def say_hello():\n    print(\"Hello!\")\n\nsay_hello()\n```\n\n本节将重点介绍如何使用装饰器扩展现有代码的功能，例如，在数据处理函数中添加日志记录或性能测量。\n\
    \n## 创建和使用包\n\nPython 中的包是一个包含特殊文件 `__init__.py` 的目录，可以包含模块和子包。包允许使用点表示法对模块命名空间进行层次结构化。\n\
    \n我们将深入探讨如何创建包、构建包结构以及在项目中有效地使用它们。这对于组织大型 Python 项目至关重要，特别是那些涉及多个模块与 SQL 数据库交互的项目。\n\
    \n## 项目结构和依赖管理\n\n适当的项目结构和依赖管理对于 Python 应用程序的可维护性和可扩展性至关重要。我们将介绍构建 Python 项目的最佳实践，包括组织文件和目录、管理环境变量以及利用虚拟环境。\n\
    \n使用 `pip` 和 `virtualenv` 等工具进行**依赖管理**也将是一个重点，教导读者如何管理外部库和依赖项，确保他们的 Python 应用程序保持稳定和可重现。\n\
    \n## 将 Python 函数与 SQL 集成\n\n在 SQL 集成的背景下，我们将探讨如何使用 Python 函数来封装数据库操作，使代码更具模块化和可重用性。这包括创建函数来处理数据库连接、执行查询和处理结果。\n\
    \n## 实际应用\n\n现实世界的场景和案例研究将说明如何将这些概念应用于数据驱动的项目。例如，如何为数据分析构建一个 Python 项目，利用模块和包来处理数据检索、处理和可视化的不同方面。\n\
    \n# 第 8 章：使用 SQL 进行数据操作\n\n在本章中，我们将深入探讨使用 SQL 进行数据操作的关键方面。这涉及理解和执行可以在数据库中对数据执行的各种操作，例如插入、更新、删除以及更复杂的数据操作技术。这些操作构成了与数据库交互的基础，对于任何依赖持久数据存储的应用程序都至关重要。\n\
    \n## 理解 SQL 数据操作语言 (DML)\n\nSQL 数据操作语言 (DML) 是 SQL 命令的一个子集，用于在数据库中添加、更新和删除数据。主要的\
    \ DML 命令是 `INSERT`、`UPDATE` 和 `DELETE`。\n\n1.  **INSERT**：用于向表中添加新行。\n2.  **UPDATE**：用于修改表中的现有数据。\n\
    3.  **DELETE**：用于从表中删除行。\n\n## 向表中插入数据\n\n`INSERT` 命令用于向表中添加新记录。其语法允许将数据插入到表的特定列或所有列中。\n\
    \n```sql\nINSERT INTO table_name (column1, column2, column3, ...)\nVALUES (value1,\
    \ value2, value3, ...);\n```\n\n## 更新表中的数据\n\n`UPDATE` 命令用于修改表中的现有记录。使用 `WHERE`\
    \ 子句来指定应更新哪些记录至关重要；否则，所有记录都将被更新。\n\n```sql\nUPDATE table_name\nSET column1 = value1,\
    \ column2 = value2, ...\nWHERE condition;\n```\n\n## 从表中删除数据\n\n`DELETE` 命令用于从表中删除行。与\
    \ `UPDATE` 命令类似，使用 `WHERE` 子句来指定要删除哪些行非常重要。\n\n```sql\nDELETE FROM table_name\
    \ WHERE condition;\n```\n\n## 实践示例：图书馆管理系统\n\n让我们将这些概念应用到一个实际示例中：一个图书馆管理系统。我们将创建一个包含两个表\
    \ `Books` 和 `Borrowers` 的简单数据库，并演示如何执行基本的 DML 操作。\n\n1.  **Books 表：** 包含有关书籍的详细信息。\n\
    2.  **Borrowers 表：** 包含有关借阅者的详细信息。\n\n```sql\n-- Create Books table\nCREATE TABLE\
    \ Books (\n    BookID INT PRIMARY KEY,\n    Title VARCHAR(100),\n    Author VARCHAR(100),\n\
    \    IsBorrowed BOOLEAN\n);\n\n-- Create Borrowers table\nCREATE TABLE Borrowers\
    \ (\n    BorrowerID INT PRIMARY KEY,\n    Name VARCHAR(100)\n);\n\n-- Inserting\
    \ data into Books\nINSERT INTO Books (BookID, Title, Author, IsBorrowed)\nVALUES\
    \ (1, '1984', 'George Orwell', FALSE),\n       (2, 'To Kill a Mockingbird', 'Harper\
    \ Lee', FALSE);\n\n-- Inserting data into Borrowers\nINSERT INTO Borrowers (BorrowerID,\
    \ Name)\nVALUES (1001, 'John Doe'),\n       (1002, 'Jane Smith');\n```\n\n## 借阅一本书\n\
    \n当借阅者借走一本书时，我们需要更新 `Books` 表中的 `IsBorrowed` 字段。\n\n```sql\n-- John Doe borrows\
    \ the book with BookID = 1\nUPDATE Books\nSET IsBorrowed = TRUE\nWHERE BookID\
    \ = 1;\n```\n\n## 归还一本书\n\n当一本书被归还时，我们将 `IsBorrowed` 字段更新回 `FALSE`。\n\n```sql\n\
    UPDATE Books\nSET IsBorrowed = FALSE\nWHERE BookID = 1;\n```"
