    \n- **The unittest Framework**: Python's built-in library unittest is used for\
    \ creating unit tests.\n\n```python\nimport unittest\n\ndef add(a, b):\n    return\
    \ a + b\n\nclass TestAddFunction(unittest.TestCase):\n    def test_add(self):\n\
    \        self.assertEqual(add(1, 2), 3)\n        self.assertEqual(add(-1, 1),\
