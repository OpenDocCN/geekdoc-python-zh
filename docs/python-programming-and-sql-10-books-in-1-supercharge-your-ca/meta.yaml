    \n### 步骤 1：创建 Python 脚本\n\n创建一个名为 `data_reporting_tool.py` 的新文件。\n\n### 步骤 2：编写报告工具代码\n\
    \n在你的脚本中包含以下代码：\n\n```python\nimport pyodbc\n\ndef create_connection():\n    connection_string\
