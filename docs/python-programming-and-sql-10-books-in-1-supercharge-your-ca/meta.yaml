    \ speak(self):\n        return \"Meow\"\n\n# 使用多态\nanimals = [Dog(), Cat(), Animal()]\n\
    \nfor animal in animals:\n    print(animal.speak())\n```\n\n这个例子说明了不同的类如何为同一个方法提供自己的实现。\n\
    \n### 抽象与抽象类\n\n面向对象编程中的抽象涉及隐藏复杂的实现细节，只显示对象的必要特征。本节介绍Python中的抽象类，它们用于为其他类定义蓝图。\n\
    \n#### 实践示例：创建抽象类\n\n一个演示Python中抽象类使用的例子：\n\n```python\nfrom abc import ABC, abstractmethod\n\
