    print(\"Emails found:\", emails)\n```\n\n### 高级正则表达式特性\n\n除了基础功能，Python中的正则表达式还提供了高级特性，如前瞻、后顾和非捕获组。本节深入探讨这些高级方面，说明它们的实际应用。\n\
