    ```


    ## 8.2 Supervised Learning


    Supervised learning involves learning a function that maps an input to an output
    based on input-output pairs. This section covers the basics of supervised learning,
    including common algorithms like linear regression and decision trees.


    Example 8.2.1 - Implementing Linear Regression:


    ```python

    from sklearn.linear_model import LinearRegression


    # Sample data

    X = [[0, 0], [1, 1], [2, 2]]

    y = [0, 1, 2]


    # Training a linear regression model

    model = LinearRegression().fit(X, y)

    ```


    ## 8.3 Unsupervised Learning


    In contrast to supervised learning, unsupervised learning deals with learning
    patterns from unlabelled data. This section introduces unsupervised learning concepts
    and algorithms like clustering and principal component analysis (PCA).


    Example 8.3.1 - K-Means Clustering:


    ```python

    from sklearn.cluster import KMeans


    # Sample data

    X = np.array([[1, 2], [1, 4], [1, 0], [4, 2], [4, 4], [4, 0]])


    # Applying K-Means clustering

    kmeans = KMeans(n_clusters=2, random_state=0).fit(X)

    ```


    ## 8.4 Evaluating Machine Learning Models


    Evaluation of machine learning models is crucial to determine their performance.
    This section discusses various metrics and methods for evaluating models in both
    supervised and unsupervised settings.


    Example 8.4.1 - Model Evaluation:


    ```python

    from sklearn.metrics import mean_squared_error


    # Predicting values

    y_pred = model.predict(X)


    # Calculating Mean Squared Error

    mse = mean_squared_error(y, y_pred)

    ```


