    \ a report that includes all employees, their department names, and the total\
    \ number of employees in each department.\n\nFirst, we use a subquery to calculate\
    \ the total number of employees in each department:\n\n```\nsql\nSELECT department_id,\
    \ COUNT(*) as total_employees\nFROM Employees\nGROUP BY department_id;\n```\n\n\
    Next, we use a LEFT JOIN to combine this information with the employees' data:\n\
