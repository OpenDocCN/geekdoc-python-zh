    \ 和 'Salary' 等列。\n\n一个简单的 SQL 查询，用于检索所有员工姓名及其部门，如下所示：\n\n```sql\nSELECT FirstName,\
    \ LastName, Department\nFROM Employees;\n```\n\n此查询从 'Employees' 表中选择 'FirstName'、'LastName'\
