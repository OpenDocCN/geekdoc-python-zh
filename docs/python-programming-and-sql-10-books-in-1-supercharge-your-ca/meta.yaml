    \n## 3. Else 和 Finally 子句\n\n- **使用 Else 子句：** 当 try 块未引发异常时执行代码。\n- **Finally\
    \ 子句：** 使用 finally 子句确保某些代码无论如何都会运行。\n\n```python\ntry:\n    number = int(input(\"\
    Enter a number: \"))\nexcept ValueError:\n    print(\"That's not a number!\")\n\
    else:\n    print(f\"You entered {number}\")\nfinally:\n    print(\"This executes\
    \ no matter what.\")\n```\n\n## 4. 引发异常\n\n- **使用 Raise 语句：** 如何以及何时在代码中引发异常。\n\
    - **自定义异常：** 创建和使用自定义异常类。\n\n## 5. Python 中的断言\n\n- **理解断言：** 使用断言来检查必须为真的条件。\n\
    - **何时使用断言：** Python 代码中使用断言的适当场景。\n\n## 6. 处理多个异常\n\n- **多个 Except 块：** 为不同的异常编写单独的块。\n\
    - **用于多个异常的元组语法：** 在单个块中捕获多个异常。\n\n## 7. 上下文管理器（with 语句）\n\n- **使用 with 语句：**\
    \ 使用上下文管理器自动管理资源。\n- **上下文管理器的优势：** 使用 with 进行资源管理的好处，尤其是在文件操作中。\n\n## 8. 实践示例：文件读取应用\n\
