    Consistency, Isolation, Durability) properties.


    ### Transaction Control Statements


    The chapter will cover SQL transaction control statements, including BEGIN TRANSACTION,
    COMMIT, ROLLBACK, and SAVEPOINT. It will explain how to use these statements to
