  md: '# Chapter 3: Data Types and Structures in Python


    Understanding data types and structures is pivotal in mastering Python, as these
    are the building blocks of any Python program. Python''s simplicity in handling
    data types and its powerful data structures are among the key features that make
    it such a versatile tool for programmers.


    # Data Types in Python


    In Python, data types are the classification of data items. They represent the
    kind of value that tells what operations can be performed on a particular data.
    The primary data types in Python are:


    +   1. **Integers** (int): Whole numbers, positive or negative.

    2. **Floating Point Numbers** (float): Numbers with a decimal point.

    3. **Strings** (str): A sequence of characters.

    4. **Booleans** (bool): Represents True or False.


    # Variables and Type Conversion


    In Python, variables are containers for storing data values. Python has no command
    for declaring a variable; it is created the moment you first assign a value to
    it. Type conversion in Python can be done using various methods like int(), float(),
    and str().


    ```

    python

    x = 5       # x is of type int

    y = "John"   # y is of type str

    x = float(x) # x is now of type float

    ```


    # Python Data Structures'
