    # Exploring Strings, Lists, Tuples, and Dictionaries


    Introduction to Python Data Types


    In this chapter, we delve into the core data types of Python - strings, lists,
    tuples, and dictionaries. Understanding these fundamental types is crucial for
    any Python programmer, as they form the building blocks of more complex data structures
    and algorithms.


    Strings in Python


    Strings in Python are used to store textual data and are one of the most commonly
    used data types. They are immutable, meaning once a string is created, it cannot
    be modified.


    +   1. **String Basics:** A string in Python can be created by enclosing characters
    in quotes. Python supports both single and double quotes.


    ```

    python

    my_string = "Hello, World!"

    ```


    +   - **String Operations:** Strings come with a variety of built-in methods.
    These include len() for length, str.upper() and str.lower() for case changes,
    str.strip() for trimming whitespace, and many more.


    +   - **String Formatting:** Python provides several ways to format strings. The
    most powerful and versatile is the format method and the newer f-strings (formatted
    string literals).


    ```

    python

    name = "Alice"

    greeting = f"Hello, {name}!"

    ```


    +   - **String Slicing and Indexing:** Strings in Python are arrays of bytes representing
    Unicode characters. This means they can be indexed and sliced.'
