    \ in scenarios where you need to combine data from multiple tables.\n\n## 5.6\
    \ LEFT JOIN and RIGHT JOIN\n\nLEFT JOIN returns all records from the left table\
    \ and the matched records from the right table. The result is NULL from the right\
    \ side if there is no match. RIGHT JOIN is the opposite of LEFT JOIN.\n\n```sql\n\
    SELECT employee.name, department.name\nFROM employees AS employee\nLEFT JOIN departments\
