    \ sums) using pandas.\n- **Data Enrichment:** Merging data from different sources\
    \ based on common keys, often performed with SQL-like JOIN operations.\n- **Applying\
    \ Business Rules:** Implementing specific business logic for data transformation.\n\
    \n# Practical Example: Sales ETL Process\n\nLet's consider a scenario where a\
    \ retail company needs to perform ETL on sales data from multiple sources, including\
    \ a database, CSV files, and a REST API. The goal is to combine this data, clean\
    \ it, aggregate sales by product category, and load it into a database for analysis.\n\
    \nWe can use Python to:\n\n1. Extract data from the database using SQLAlchemy.\n\
    2. Read CSV files using pandas.\n3. Fetch additional sales data from a REST API\
    \ using the requests library.\n4. Clean, transform, and aggregate the data.\n\
    5. Load the transformed data into a database using SQL INSERT statements.\n\n\
    ```python\nimport pandas as pd\nfrom sqlalchemy import create_engine\nimport requests\n\
    \n# Extract data from the database\ndb_engine = create_engine('postgresql://username:password@localhost:5432/mydb')\n\
    db_conn = db_engine.connect()\ndb_data = pd.read_sql('SELECT * FROM sales', db_conn)\n\
    \n# Extract data from CSV files\ncsv_data = pd.read_csv('sales_data.csv')\n\n\
    # Extract data from a REST API\napi_response = requests.get('https://api.example.com/sales')\n\
    api_data = pd.DataFrame(api_response.json())\n\n# Transform and clean the data\
    \ (e.g., remove duplicates, handle missing values)\n\n# Aggregate sales data by\
    \ product category\naggregated_data = pd.concat([db_data, csv_data, api_data])\n\
    sales_by_category = aggregated_data.groupby('Category')['Amount'].sum().reset_index()\n\
    \n# Load the aggregated data into the database\nsales_by_category.to_sql('sales_summary',\
