- md: "## Managing Transactions\n\nTransactions are crucial for maintaining data integrity.\
    \ pyodbc supports transaction management, allowing you to commit or rollback changes\
    \ based on the execution results.\n\n## Practical Example: CRUD Operations\n\n\
    Let's create a Python script that performs basic Create, Read, Update, and Delete\
    \ (CRUD) operations on a SQL Server database.\n\n### Step 1: Create a Python Script\n\
    \nCreate a new file named crud_operations.py.\n\n### Step 2: Write the CRUD Functions\n\
    \nInclude the following code in your script:\n\n```python\nimport pyodbc\n\ndef\
    \ create_connection():\n    connection_string = \"Driver={SQL Server};Server=YOUR_SERVER_NAME;Database=YOUR_DATABASE_NAME;UID=YOUR_USERNAME;PWD=YOUR_PASSWORD;\"\
    \n    return pyodbc.connect(connection_string)\n\ndef create_employee(conn, employee):\n\
    \    with conn.cursor() as cursor:\n        cursor.execute(\"INSERT INTO Employees\
    \ (Name, Department) VALUES (?, ?);\", (employee['name'], employee['department']))\n\
    \        conn.commit()\n\ndef read_employees(conn):\n    with conn.cursor() as\
    \ cursor:\n        cursor.execute(\"SELECT * FROM Employees;\")\n        for row\
    \ in cursor:\n            print(row)\n\ndef update_employee(conn, employee_id,\
    \ new_department):\n    with conn.cursor() as cursor:\n        cursor.execute(\"\
    UPDATE Employees SET Department = ? WHERE EmployeeID = ?;\", (new_department,\
    \ employee_id))\n        conn.commit()\n\ndef delete_employee(conn, employee_id):\n\
    \    with conn.cursor() as cursor:\n        cursor.execute(\"DELETE FROM Employees\
    \ WHERE EmployeeID = ?;\", (employee_id,))\n        conn.commit()\n\n# Example\
    \ usage\nconn = create_connection()\n\n# Create an employee\ncreate_employee(conn,\
    \ {'name': 'John Doe', 'department': 'IT'})\n\n# Read employees\nread_employees(conn)\n\
    \n# Update an employee's department\nupdate_employee(conn, 1, 'HR')\n\n# Delete\
    \ an employee\ndelete_employee(conn, 1)\n```\n\nReplace the connection details\
