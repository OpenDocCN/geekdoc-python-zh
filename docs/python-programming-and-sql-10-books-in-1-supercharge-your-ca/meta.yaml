    \ -m venv myprojectenv\nsource myprojectenv/bin/activate (Linux/Mac)\nmyprojectenv\\\
    Scripts\\activate (Windows)\n```\n\n## 2.4 Installing MySQL\n\nMySQL can be downloaded\
    \ from its official website. Choose the version appropriate for your operating\
    \ system and follow the installation guide. During installation, set a root password\
    \ and remember it, as it will be needed later.\n\n## 2.5 Connecting Python and\
    \ MySQL\n\nTo connect Python with MySQL, you need a connector, which is a Python\
    \ library. MySQL Connector/Python can be installed via pip.\n\n```shell\npip install\
    \ mysql-connector-python\n```\n\n## 2.6 Establishing the Database Connection\n\
    \nWith the connector installed, you can now establish a connection to the MySQL\
    \ database from Python.\n\n```python\nimport mysql.connector\n\ncnx = mysql.connector.connect(user='root',\
    \ password='YOURPASSWORD', host='127.0.0.1', database='testdb')\ncursor = cnx.cursor()\n\
    ```\n\nReplace 'YOURPASSWORD' with your MySQL root password and 'testdb' with\
    \ your database name.\n\n## 2.7 Creating a Database and Tables\n\nIf you haven't\
    \ already created a database, you can create one using Python.\n\n```python\n\
    cursor.execute(\"CREATE DATABASE IF NOT EXISTS testdb\")\ncursor.execute(\"USE\
    \ testdb\")\n```\n\nNext, create a table within this database.\n\n```python\n\
    cursor.execute(\"\"\"CREATE TABLE products\n                (id INT AUTO_INCREMENT\
    \ PRIMARY KEY, name VARCHAR(255), price DECIMAL(10, 2))\"\"\")\n```\n\n## 2.8\
    \ Inserting Data into the Table\n\nNow, let's insert some data into the 'products'\
    \ table.\n\n```python\nadd_product = (\"INSERT INTO products (name, price) VALUES\
    \ (%s, %s)\")\ndata_product = ('Computer', '800.00')\ncursor.execute(add_product,\
    \ data_product)\n\n# Commit the transaction\ncnx.commit()\n```\n\n## 2.9 Retrieving\
    \ Data\n\nTo retrieve data from the database, you execute a SELECT statement and\
    \ fetch the results.\n\n```python\nquery = (\"SELECT name, price FROM products\
    \ WHERE price > %s\")\ncursor.execute(query, (500,))\n\nfor (name, price) in cursor:\n\
    \    print(f\"Product: {name}, Price: {price}\")\n```\n\n## 2.10 Practical Example:\
    \ Inventory Management\n\nAs a practical example, let's create a simple inventory\
    \ management system. We'll start by creating a table for inventory items.\n\n\
    ```python\ncursor.execute(\"\"\"CREATE TABLE inventory\n                    (item_id\
    \ INT AUTO_INCREMENT PRIMARY KEY, product_id INT, quantity INT, last_updated DATE)\"\
    \"\")\n```\n\nWe can insert data representing our current inventory.\n\n```python\n\
    inventory_items = [\n    (1, 10, '2023-03-01'),\n    (2, 5, '2023-03-01'),\n \
    \   (3, 20, '2023-03-02'),\n]\n\nadd_inventory = (\"INSERT INTO inventory (product_id,\
    \ quantity, last_updated) VALUES (%s, %s, %s)\")\ncursor.executemany(add_inventory,\
    \ inventory_items)\ncnx.commit()\n```\n\nTo manage this inventory, we might want\
    \ to write a function to update the quantity of an item.\n\n```python\ndef update_inventory(item_id,\
    \ new_quantity, date):\n    update_query = (\"UPDATE inventory SET quantity =\
    \ %s, last_updated = %s WHERE item_id = %s\")\n    cursor.execute(update_query,\
    \ (new_quantity, date, item_id))\n    cnx.commit()\n\n# Update the quantity of\
    \ an item\nupdate_inventory(1, 15, '2023-03-05')\n```\n\n## 2.11 Summary\n\nThis\
    \ chapter provided a step-by-step guide on setting up a development environment\
