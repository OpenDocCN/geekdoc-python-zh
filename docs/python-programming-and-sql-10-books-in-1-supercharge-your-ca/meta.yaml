    要在 'EmployeeDB' 中创建一个简单的表来存储员工详细信息：\n\n```sql\nCREATE TABLE Employees (\n    EmployeeID\
    \ INT PRIMARY KEY,\n    FirstName VARCHAR(50),\n    LastName VARCHAR(50),\n  \
    \  Department VARCHAR(50),\n    Salary DECIMAL\n);\n```\n\n此语句创建一个名为 'Employees'\
    \ 的新表，包含员工 ID、名字、姓氏、部门和薪水等列。\n\n### 第五节：向表中插入数据\n\n表创建后，可以使用 INSERT INTO 语句向其中插入数据。\n\
