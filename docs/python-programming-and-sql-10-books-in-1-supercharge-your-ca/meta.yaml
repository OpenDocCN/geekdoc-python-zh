    \nSQL，即结构化查询语言，是与关系型数据库交互的基石。它使用户能够以结构化和高效的方式创建、操作和查询数据。本章旨在介绍 SQL 的基本方面，重点关注其语法和基本结构。\n\
    \n### 第一节：SQL 简介\n\nSQL 是一种领域特定语言，用于编程，旨在管理存储在关系型数据库管理系统（RDBMS）中的数据。它在处理结构化数据方面特别有用，因为数据的不同实体/变量之间存在关系。\n\
    \n### 第二节：SQL 语法基础\n\nSQL 的语法是定义符号组合的规则集，这些组合被认为是结构正确的 SQL 查询。理解这种语法对于编写有效的 SQL\
    \ 查询至关重要。SQL 查询的基本结构涉及一个 SELECT 语句，用于从数据库中选择数据。\n\n### 示例：\n\n考虑一个名为 'EmployeeDB'\
