- md: "## 9.3 Building loops with an indeterminate end\n\nIf you have to end a loop\
    \ when ‚Äúsome condition occurs,‚Äù but you cannot tell up front how many times the\
    \ loop code should be run, you must use a while loop. There are two main ways\
    \ to write a while loop. The first you use if the condition is a fairly straightforward\
    \ test.\n\nFor instance, suppose that I am searching for a number of 4 digits\
    \ for which the sum of the digits is the same as the product of the digits (this\
    \ was an exercise in a previous chapter). I have written two functions, `sum_of_digits()`\
    \ and `product_of_digits()` that calculate the sum and product of the digits of\
    \ a number, respectively. I can use them to write a while loop where the condition\
    \ of the loop basically says: do this loop as long as you have not found a solution\
    \ to the problem. I do not know exactly how many times I have to go through the\
    \ loop, but once I found the solution, the loop ends (in fact, the body of the\
    \ loop is executed 124 times).\n\n```python\ndef sum_of_digits(num):\n    strnum\
    \ = str(num)\n    total = 0\n    for c in strnum:\n        total += int(c)\n \
    \   return total\n\ndef product_of_digits(num):\n    strnum = str(num)\n    total\
    \ = 1\n    for c in strnum:\n        total *= int(c)\n    return total\n\nnum\
    \ = 1000\nwhile sum_of_digits(num) != product_of_digits(num):\n    num += 1\n\
    print(num)\n```\n\nNow, there is a bit of a problem with this code. The problem\
    \ is that, before I solved the problem, I did not know if there actually was a\
    \ 4-digit number for which the sum of the digits equals the product of the digits.\
    \ If such number does not exist, the loop is endless!\n\nOne way of solving this\
    \ is using a logical operator. If extend the condition of the loop with an extra\
    \ clause, namely that the number should not be higher than 9999. So I do the loop\
    \ while I have not found a solution and the number is still smaller than 10000.\
    \ This I can solve with a logical **and**. The main loop becomes:\n\n```python\n\
    num = 1000\nwhile sum_of_digits(num) != product_of_digits(num) and num < 10000:\n\
    \    num += 1\n```\n\nWhile writing a loop with one or more logical operators\
    \ in the condition works, such conditions tend to become unreadable quickly. That\
    \ is why I often write them differently, namely by using **while True**, which\
    \ means that the loop is endless, but then write conditions as the first statements\
    \ in the loop which **break** out of the loop if certain conditions occur. This\
    \ also tends to be easier to read as you can make positive rather than negative\
    \ conditions, i.e., the loop ends when a solution is found, rather than the loop\
    \ continues as long as the solution is not found. The following main loop does\
    \ this:\n\n```python\nnum = 1000\nwhile True:\n    if num > 9999:\n        break\n\
    \    if sum_of_digits(num) == product_of_digits(num):\n        break\n    num\
    \ += 1\n```\n\nThe **while True** construction tends to be confusing to students,\
    \ but it is not more than what I describe above: the conditions on which the loops\
    \ ends are written at the top of the loop, with **break** statements to end the\
    \ loop. It is also a good solution if you have to execute a function or do a calculation\
    \ before you can test the condition. For instance, if you read lines from a file,\
    \ and you should end the loop when there is nothing to read anymore, you first\
    \ have to do a readline() before you can draw the conclusion that you are done.\
    \ For example:\n\n```python\nfp = open(\"pc_woodchuck.txt\")\nwhile True:\n  \
    \  buffer = fp.readline()\n    if buffer == \"\":  # There is nothing to read\
    \ anymore\n        break\n    print(buffer, end=\"\")\n```\n\n## 9.4 Initializing\
    \ and deinitializing\n\nOften when you have to compute something, you need to\
    \ do some initializing, like setting variables to an initial value, and some deinitializing,\
    \ like using the computed values of the variables you initialized. I often see\
    \ students having problems finding the right spot in the code where to initialize\
    \ a variable, and where to use it.\n\nIf you know ‚Äúthe right spot‚Äù for one of\
    \ them, you usually know the right spot for the other, as they tend be on the\
    \ same indentation level. I.e., if I do some sort of calculation which produces\
    \ a value in a variable, then I read out that variable right after the calculation,\
    \ and the initialization of the variable almost always has to be at the same indentation\
    \ level right before the calculation.\n\nLet‚Äôs give an example. Suppose that with\
    \ a simulation I want to estimate the percentage of rolls of five six-sided dice\
    \ that have a total value of 15 or more. This means I have to code a nested loop.\
    \ Using bottom-up development, I first program the inner loop, where I roll five\
    \ dice.\n\n```python\nfrom random import randint\n\ntotal = 0  # initialization\n\
    for i in range(5):\n    total += randint(1, 6)\n\nprint(total)  # deinitialization\n\
    ```\n\nWhen I want to calculate a total value for five dice which are rolled,\
    \ I need to roll a single die five times, and add up the values. For that I need\
    \ a variable in which to store the total value, which I call total. That variable\
    \ is initialized at 0, and can be read out after the loop is done. In the code\
    \ you can see that setting the value of total to zero and having the value of\
    \ total be the total of five dice, is at the same indentation level.\n\nNow, I\
    \ said that I wanted to estimate what percentage of rolls end up with a total\
    \ of 15 or higher. Let‚Äôs say that I simulate rolling the dice 1000 times. That\
    \ means that I have to build a loop around my previous code, which executes that\
    \ code 1000 times. I need to keep track of how many of those rolls are 15 or higher.\
    \ So I have to keep track of that using a second variable, which I need to initialize\
    \ to 0 before the simulation, and which will have the desired value after the\
    \ simulation. So the code becomes:\n\n```python\nfrom random import randint\n\n\
    TRIALS = 1000\n\nover15 = 0  # initialization 1\nfor j in range(TRIALS):\n   \
    \ total = 0  # initialization 2\n    for i in range(5):\n        total += randint(1,\
    \ 6)\n    if total >= 15:  # deinitialization 2\n        over15 += 1\n\nprint(over15\
    \ / TRIALS)  # deinitialization 1\n```\n\nIn this code I had to change the line\
    \ where I printed the value of total to using this value to see if I need to increase\
    \ over15, which keeps track of how many rolls were 15 or higher. This use of total\
    \ is (of course) still at the same indentation level as the initialization of\
    \ total. In the same vein, the initialization of over15 is at the same level as\
    \ the use of over15, in the last line of the code.\n\nI often see students doing\
    \ this wrong. Two typical errors that are made in the code that I developed above\
    \ are initializing total too early and initializing it too late. If you initialize\
    \ total too early, i.e., at the same spot where you initialize over15, total will\
    \ never be reset to zero in the code and thus will be increased after every roll,\
    \ which means that you end up with 0.999 or 1.000. If you initialize it too late,\
    \ i.e., underneath the line for i in range(5), you set total to zero before every\
    \ individual die roll, and you end up with 0.000.\n\nIt is a rule-of-thumb that\
    \ applies almost always that, as I said, initialization and deinitialization are\
    \ at the same indentation level.\n\n## 9.5 Capturing errors\n\nDuring coding,\
    \ try to capture errors. Anything that can go wrong, should lead to an error message.\
    \ Even if you think that something can never go wrong, still program an error\
    \ message. If it does not go wrong, you will never see the message and it won't\
    \ take any processing time, but sometimes you will be surprised.\n\nFor instance,\
    \ suppose you calculate a fraction, e.g., all numbers on a list of numbers that\
    \ are bigger than 10. You know that the fraction should always fall in the range\
    \ [0,1]. However, if you are going to use that fraction later in the program and\
    \ it will lead to problems if the fraction is outside that range, it makes sense\
    \ to at least build in a check right after calculating the fraction to make sure\
    \ that it does fall in the range, and produce an error message otherwise.\n\n\
    You do that because, even if you are an experienced programmer and feel certain\
    \ that you are able to calculate such a fraction correctly, you may have made\
    \ a typo and produced the wrong result. Everyone makes such mistakes, so it makes\
    \ sense to build in these checks regardless how experienced you are. You may need\
    \ a few seconds to build it in, but it occasionally may save you hours of debugging."
