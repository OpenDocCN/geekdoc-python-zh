    # Introduction


    During my years of teaching programming to university students, I have found that
    while most students have no problems learning the language elements of programming
    languages, a considerable number of them have troubles designing algorithms.


    A programming language is like a toolkit. It offers the programmer ways to specify
    commands, conditions, loops, and other constructs. It is the programmer‚Äôs job
    to combine these constructs in different ways so that the resulting program solves
    a particular problem.


    Programming courses that teach students a programming language usually are limited
    to teaching the different language elements. They introduce topics such as: what
    is a loop, what different ways does the language offer to write a loop, and how
    exactly does a loop work? The students then get to practice with these language
    elements to solve simple, straightforward problems. Such courses do not teach
    students how to solve more complex problem for which it is not immediately clear
    which language elements need to be used, and how and when they need to be used.


    Designing an approach to solve a problem with a computer program requires, maybe
    surprisingly, no programming skills. It requires computational thinking skills.


    What is computational thinking? I have found many definitions of the term, all
    different and all focusing on different aspects. In general, computational thinking
    encompasses the skills one needs to analyze a problem in such a way that one can
    design a computational solution for the problem, i.e., a solution which consists
    of a series of specific steps which, when executed exactly as specified, lead
    to a desired outcome. Once such a solution is designed, it can be turned into
    a program, which is when programming skills come in.


    What kind of skills are we talking about? Obviously, the ability to think logically
    and analytically helps. The ability to see patterns and to use abstractions is
    highly beneficial. The ability to distinguish relevant details from irrelevant
    ones is crucial. Occasionally, creativity plays a role in designing computational
    solutions. These skills are not only necessary for creating programs which solve
    complex problems, but are also highly desirable when dealing with real-life problems
    and when working in science.


    One would hope that such skills would be taught in secondary schools, but usually
    the opposite is true. Most secondary schools teach pupils to solve a limited set
    of problems in very particular ways, leading to students who are used to following
    predefined steps'
