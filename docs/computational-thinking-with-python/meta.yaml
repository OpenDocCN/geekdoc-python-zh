    strings.


    Regardless how you represent the contents of the file, they are the input for
    the next step, ‚ÄúCount how often each word occurs.‚Äù What this step should produce
    is some data structure which contains all the words that are in the contents of
    the file, with for each word how often it occurs.


    Again, it is not clear yet how you represent the words with their counts, but
