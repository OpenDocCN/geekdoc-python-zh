    \ )\n    sorteditems.append( lowestitem )\n\nprint( sorteditems )\n```\n\n# 3.5\
    \ Efficiency of sorting a deck of cards in a less naive way\n\nLet‚Äôs now look\
    \ at the sorting of a deck of cards in the way I described above, where you first\
    \ split the deck into four piles, each of one suit, and then sort those piles\
    \ before putting them together.\n\nTo create the piles with the suits, you have\
    \ to look at each card once, which is 52 looks.\n\nNow you have to find an approach\
    \ to sort each of the piles. Let‚Äôs use the same naive approach described above,\
    \ which feels a lot less unwieldy for 13 cards than if you use it for the whole\
    \ deck. In the worst-case scenario, you find the first card with 13 looks, the\
    \ second card with 12 looks, the third card with 11 looks, etc. In total, in the\
    \ worst-case scenario, you need 91 looks to sort a suit. On average it will be\
    \ about 45.5 looks. For 4 suits, that will be a total of 182 looks.\n\nThis means\
    \ that, using the less naive approach, you need 52 + 182 = 234 looks. This is\
    \ a considerable improvement over the 689 looks that we need for the naive approach.\
    \ This means that, if you indeed used an approach in which you first sorted out\
    \ the suits and then sorted the cards for each suit, you designed an algorithm\
    \ that is considerably more efficient than if you naively went through the deck\
    \ separately for each card.\n\nIn computer science, this approach is called ‚Äúbucket\
    \ sort‚Äù for the creation of the four piles, followed by ‚Äúselection sort‚Äù for each\
    \ of the piles.\n\n# 3.6 More efficient sorting\n\nThere are sorting methods which\
    \ are more efficient than the two described above. Yet in practice you will not\
    \ use them when you have to sort a deck of cards. The reason is that the more\
    \ efficient algorithms split the deck of cards in more complex ways; to give an\
    \ example: an algorithm could, for instance, instruct you to split the deck into\
    \ three piles, with pile 1 containing all Diamonds cards and the Clubs up to the\
    \ 8 of Clubs, pile 2 contains"
