  md: "# 5.3 Selecting data structures\n\nAs indicated, you need two data structures\
    \ for the steps which are given in the flow diagram in Figure 5.1. One data structure\
    \ needs to represent the contents of the file, and a second data structure needs\
    \ to represent all the words with their counts.\n\nYou know that when you read\
    \ a file, you can either get a string or a list of strings. Which of these two\
    \ would be most appropriate for the present problem? A list of strings is mainly\
    \ useful if you need to do something with the separate lines in the file, but\
    \ the lines are not important for the current problem. So a string suffices. So,\
    \ let's decide to represent the contents of the file as a string.\n\nHow to represent\
    \ words with their counts? Since we have to store multiple words ‚Äì we do not know\
    \ yet how many ‚Äì, we probably need a data structure which has some repetition\
    \ in it. The three basic data structures in Python which have this are the list,\
    \ the dictionary, and the set. Since we have to store a count with each word,\
    \ we have the following main possibilities:\n\n+   - a list of tuples (word,count)\n\
    - a dictionary with the word as key and the count as value\n- a set of tuples\
    \ (word,count)\n\nWith some experience you may realize that the dictionary is\
    \ probably the best choice, as you will have to go over all the words in the file\
    \ contents, and update the count for a word every time you encounter it. Searching\
    \ for a word in a list is slow (unless the list has a structure which allows fast\
    \ searching), while for a dictionary it is fast.\n\nA set of tuples will not work,\
    \ but you have to know a bit about sets to realize why not. Suppose that I have\
    \ in my set stored that the word ‚Äúyou‚Äù occurs twice; that would entail that according\
    \ to my description, (\"you\", 2) is an element of the set. I find the word ‚Äúyou‚Äù\
    \ once more in the file contents, so I have to remove the item (\"you\", 2) from\
    \ the set, and add the item (\"you\", 3). But I do not actually know that (\"\
    you\", 2) is in the set. So I have to search the whole set to see if somewhere\
    \ there is an item in the set which has ‚Äúyou‚Äù as the first element of the item\
    \ ‚Äì if I find it, I can read the second element, remove the item, and add a new\
    \ item with 1 added to the second element; otherwise I add (\"you\", 1) to the\
    \ set. Really, if I am going to jump through such hoops, I better just use a list.\n\
    \nFor now, let's decide that we will use a dictionary to store the words with\
    \ their counts.\n\n# 5.4 Using functions for steps\n\nWe can now write with comments\
    \ in the given code which steps we need to take:\n\n```\ndef get_word_with_highest_count(\
    \ filename ):\n    # Step 1: Read the contents of filename, and put them in\n\
    \    # string \"contents\".\n    # Step 2: Build a dictionary \"wordcounts\" which\
    \ contains\n    # all the different words in \"contents\" with their counts.\n\
    \    # Step 3: Select the word with the highest count from\n    # \"wordcounts\"\
    .\n    return \"<word with highest count>\"\n```"
