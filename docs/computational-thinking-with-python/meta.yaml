    \ {}\n    return wordcounts\n\n# Selects the word with the highest count from\
    \ dictionary\n#     wordcounts.\ndef select_highest_count( wordcounts ):\n   \
    \ return \"\"\n\ndef get_word_with_highest_count( filename ):\n    contents =\
    \ read_contents( filename )     # Step 1\n    wordcounts = build_dictionary( contents\
    \ ) # Step 2\n    return select_highest_count( wordcounts ) # Step 3\n\nprint(\
    \ get_word_with_highest_count( \"pc_woodchuck.txt\" ) )\n```\n\nWe can now develop\
