    # 4.7 What to consider


    In summary, when you examine a problem and strike upon a functionality that you
    may want to lift out of the problem and develop a separate function for, consider
    the following:


    +   - Is the functionality clearly defined? What exactly does it need to do?

    - Precondition: what does the functionality need as input? Make sure that you
    can give it everything it needs.

    - What should happen if the requirements of the precondition are not met? It is
    okay if the functionality then produces nonsense or crashes the program, but you
    should at least consider whether you can handle erroneous inputs gracefully.

    - Postcondition: what does the functionality produce? This will define the return
    values.

    - Will the functionality have side effects with respect to the program it is part
    of? In general, it should not, but if it does this should be documented.

    - Is the functionality doing ‚Äútoo much‚Äù? If you can recognize multiple steps in
    the functionality, some of which would have a general purpose beyond the functionality,
    you may have situation wherein it makes sense to split the functionality up further.


