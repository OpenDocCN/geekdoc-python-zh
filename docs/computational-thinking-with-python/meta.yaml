  md: '# Chapter 3


    # Thinking about Sorting


    The point I wanted to make in the previous chapter is that you are able to think
    computationally, to design algorithms, because you do it all the time. However,
    as a human you have the ability to adapt your algorithms on the fly if they are
    faulty. That is called ‚Äúimprovisation,‚Äù which, by the way, is also a form of computational
    thinking. Because of your ability to improvise, there is no need for you to really
    think carefully about the algorithms you use in your daily life. This is different
    for computers.


    An algorithm for a computer must be precise. It must be complete. It must be able
    to deal with any unforeseen circumstance, otherwise the algorithm will not reach
    its legitimate end and thus will not produce the desired result.


    Programming languages have been created to allow you to specify algorithms in
    a way that a computer can understand them. It is up to you, the programmer, to
    ensure that the algorithms that you present the computer with are indeed able
    to achieve the result that you want them to reach.


    In this chapter I will discuss the everyday task of sorting things, which is something
    that you occasionally need to do and for which you usually think a bit on how
    to do it most efficiently. This kind of thinking is also needed when writing computer
    programs. I will start, however, with a discussion of pseudo code, which can be
    an intermediate step between thinking about an algorithm and implementing it into
    code.


    # 3.1 Pseudo code


    This course assumes that you can code in Python (even if you are not strong at
    designing algorithms with Python). So you can write program code. Writing pseudo
    code is a lot like writing program code, except that in pseudo code you can take
    ‚Äúshortcuts.‚Äù Your code does not need to be able to run. It just must give a good,
    preferably unambiguous insight in what a program should look like. A programmer
    should be able to turn the pseudo code into a program in any computer language
    that would be suitable for implementing the algorithm.


    Often, in pseudo code you will be explicit about certain code elements which you
    would not need to be explicit about in your chosen programming language. For instance,
    in'
