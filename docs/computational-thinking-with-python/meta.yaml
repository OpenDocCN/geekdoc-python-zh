- md: "## Exercise 3.5\n\nDesign an algorithm to play tic-tac-toe. You do not have\
    \ to play it attempting to win, you just have to play legal moves. This is easiest\
    \ if you use a tic-tac-toe diagram with 9 numbered fields to play on. At least\
    \ describe the algorithm in English, but if you can, turn it into a flow diagram\
    \ or pseudo code. Or, for an extra challenge, real Python code.\n\n## Exercise\
    \ 3.6\n\nConsider the following approach to sort a deck of cards. You start by\
    \ taking a random card from the deck, for instance, the first one. Then you go\
    \ through the deck, putting all cards that need to be higher in the deck than\
    \ the card you selected on top of the selected card, and putting all the other\
    \ cards on the bottom of it. You can put the selected card sideways, so that you\
    \ can see where it is. Once you have done this, the selected card is in the right\
    \ spot in the deck, though all the other cards may not yet be. Now you repeat\
    \ the procedure for the pile on top of the selected card, and the pile on the\
    \ bottom of the selected card. You continue repeating the procedure for smaller\
    \ and smaller piles until the deck is sorted. In computer science, this is called\
    \ \"quicksort.\" The card that you select to split each of the piles is called\
    \ the \"pivot\" for this algorithm.\n\n1. If you do not understand how the described\
    \ algorithm works, then try it out for a single suit of 13 cards. Things will\
    \ soon fall into place.\n2. Assuming that the pivot always splits a pile of cards\
    \ in two piles of about equal size, can you make an estimate of the efficiency\
    \ of this approach to sorting a deck of cards?\n3. If you compare the efficiency\
    \ of this approach with the slightly less naive approach discussed in the chapter,\
    \ you will probably find that it seems to be a bit less efficient than that approach.\
    \ However, suppose that a deck of cards consists of 4 suits of 25 cards each.\
    \ Would the ‚Äúquicksort‚Äù approach still be less efficient?\n4. Why would or wouldn‚Äôt\
    \ you use the quicksort approach in real life?\n\n# Chapter 4\n\n# Functions\n\
    \nA function is a programming construct that may or may not receive some arguments,\
    \ performs a task (in which it uses arguments that it received), and may or may\
    \ not (but usually will) deliver one or more outcome values. In Python, a function\
    \ is defined with the keyword **def**. Since this course assumes that you know\
    \ the basics of Python, it assumes that you know about functions. However, you\
    \ may not yet realize how and why you should use functions.\n\n## 4.1 A simple\
    \ function\n\nBelow I give a function which converts a temperature given in degrees\
    \ Kelvin to degrees Celsius. The function, which is called `kelvin2celsius`, gets\
    \ one parameter (or argument), namely `kelvin`, which is a temperature given in\
    \ degrees Kelvin. It returns a floating-point value which is the corresponding\
    \ temperature in degrees Celsius.\n\n```python\n# kelvin2celsius converts a temperature\
    \ in degrees Kelvin (given\n# to the function as a numerical argument \"kelvin\"\
    \ which must be\n# at least zero) to a temperature in degrees Celsius, which it\n\
    # returns as a floating-point value.\ndef kelvin2celsius( kelvin ):\n    return\
    \ kelvin - 273.15\n\ntemp = 100\nprint( f\"{temp} degrees Kelvin is {kelvin2celsius(\
    \ temp ):.2f} degrees Celsius\" )\n```\n\nWhen you examine the function, you see\
    \ that it is pretty simple: it merely subtracts 273.15 from the argument given\
    \ to the function, and returns the resulting value. Maybe you knew how simple\
    \ this conversion is. Maybe you did not. One of the big advantages of having functions\
    \ is that you do not need to know how to do something, as long as you know how\
    \ to use a function that does it for you.\n\nFor the function `kelvin2celsius()`\
    \ you need to know:\n\n- that you can give it a temperature in degrees Kelvin\
    \ as an integer or floating-point value\n- that it will calculate the corresponding\
    \ temperature in degrees Celsius\n- that it will return the calculated temperature\
    \ as a floating-point value\n\nThere are two more things that you should also\
    \ know, or at least realize:\n\nFirst, the function will not have any side effects,\
    \ i.e., by calling the function you will not influence anything else in the program.\
    \ Caveat: The function may influence the argument or arguments given to it, if\
    \ they are references (pointers). However, this then should be made clear in the\
    \ function description. If you do not understand references, you can forget about\
    \ them for this course, but they are an important advanced topic of a programming\
    \ course.\n\nSecond, the return value of the function is undefined if the argument\
    \ given to it is not a legal value. For instance, if you call the function with\
    \ -100 as argument, it will return -373.15; however, as zero degrees Kelvin is\
    \ absolute zero, there are no lower temperatures, and thus the return value is\
    \ not a legal temperature. Moreover, if you call the function with, for instance,\
    \ a string, it will simply crash your program. The function could, of course,\
    \ check whether the argument given is a legal value, and handle it in a graceful\
    \ way (for instance, in the function above you could say that if an illegal temperature\
    \ is given as argument, you will return -10000). But in principle it has no responsibility\
    \ to do so, unless the function description says that it does.\n\n## 4.2 Contract\
    \ programming\n\n‚ÄúContract programming‚Äù is a programming paradigm in which software\
    \ designers write a precise definition of software components (such as functions)\
    \ not only with respect to what they do, but specifically preconditions, postconditions,\
    \ and invariants. Such a definition is called a ‚Äúcontract.‚Äù I will not go into\
    \ the exact technical meaning of what contract programming is and requires, but\
    \ I will use the contract metaphor to discuss how one should think about functions.\n\
    \nA precondition is a description of the program‚Äôs situation before a call to\
    \ a function is made. In principle, a function can only know about this situation\
    \ what is communicated to it by the arguments given to it. While it is true that\
    \ in Python a function can also access global variables that exist outside the\
    \ function, it is highly preferable that it does not do that. Because if it does\
    \ not, when you call a function you know exactly what the function gets to work\
    \ with: the arguments that you give to it, and nothing else. This makes the function\
    \ independent from the program it resides in.\n\nFrom the perspective of the function,\
    \ the precondition entails that it gets arguments that it can use. In the function\
    \ description it must be specified what arguments the function needs, such as\
    \ with respect to the data types and the value ranges. The contract only defines\
    \ what the function will do if the arguments are ‚Äúlegal.‚Äù If you give the function\
    \ anything else, what the function does is not specified.\n\nThe postcondition\
    \ of a function can be interpreted as its return value or values, and, if applicable,\
    \ the changes it has made to the data structures which you have handed to it.\
    \ For example, the `kelvin2celsius()` function above has as its postcondition\
    \ that it presents you with the temperature in degrees Celsius which is equivalent\
    \ to the temperature in degrees Kelvin given to the function. It does not make\
    \ changes to a data structure. For an example of a function that changes a data\
    \ structure: think about a function that you can give a list of numbers, which\
    \ will then sort that list. Once the function has finished, the original list\
    \ has been changed: it is now sorted.\n\nFinally, for functions the main invariant\
    \ should be that no data within reach of the program is changed, with the exception\
    \ of data that the function is given access to.\n\nIn actuality, invariants are\
    \ also meant to be about certain relations within the data. For instance, suppose\
    \ that you are working with a program that is used to collect orders, such as\
    \ you see on websites where you can buy stuff online. You have a list of items\
    \ that you are going to order, and you also see the total cost of these items.\
    \ Suppose now that there is a function that you can use to add an item to the\
    \ list. An invariant would be that the sum of the prices of the items on the list\
    \ is equal to the total cost shown, which entails that the function which adds\
    \ the item also ensures that the total cost is updated when the function ends.\
    \ When you write functions for a fairly complex programs which may influence relations\
    \ between data items in the program, it makes sense to consider invariants about\
    \ those relations as well.\n\n## 4.3 Using functions\n\nThere are two main ways\
    \ in which you can use functions to make thinking about algorithms easier.\n\n\
    The first is that when you think about an algorithm, you may realize that you\
    \ need to do several things, each of which requires some non-trivial code. Taking\
    \ all that code together might feel overwhelming. However, if you can split the\
    \ whole algorithm in multiple function calls, it may become easier and more natural.\
    \ Since this use of functions ties in with Problem Decomposition, I will leave\
    \ it for the next chapter, which is all about that.\n\nThe second is that you\
    \ can use a function to encapsulate a functionality that you know you need to\
    \ use, but can extract from the rest of your program in a way that you can solve\
    \ it separately. This may sound a bit abstract, so let me make this clear with\
    \ an example.\n\nWhen you do text processing, you often have to examine individual\
    \ words in the text. For instance, you may wish to count how often a particular\
    \ word occurs in the text. Now, to get access to the individual words, you need\
    \ to split the text into those words. Usually a programming language has built-in\
    \ functionalities for that; for instance, Python has the string method `split()`,\
    \ which splits a string into individual words. However, suppose that I use that\
    \ `split()` method on a particular string using the following code:\n\n```python\n\
    drseuss = \"You know you're in love when you can't fall asleep because reality\
    \ is finally better than your dreams.\"\ndrseusslist = drseuss.split()\nprint(\
    \ drseusslist )\nprint( f\"Number of times \\\"you\\\" occurs in this list: {drseusslist.count('you')}\"\
    \ )\n```\n\nHow often does the word ‚Äúyou‚Äù occur in the given string? The answer\
    \ is three times, but each of these times, it appears differently in the list\
    \ of words produced by `split()`. You"
