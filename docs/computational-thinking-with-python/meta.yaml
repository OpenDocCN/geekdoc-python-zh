  md: '![](img/5a08c0143f116cd2579eedd36ecc1b2b_39_0.png)


    Figure 5.1: Flow diagram of finding the word that occurs the most.


    # 5.2 Problem decomposition: Flow diagram


    Which smaller problems do you have to solve to accomplish the task? Obviously,
    you will have to read the contents of the file. You will have to count how often
    each word in the file occurs. And then you have to select the word that occurs
    the most. This can be represented by the flow diagram shown in Figure 5.1.


    We may consider each of the steps in this flow diagram a function. A function
    has a pre-condition/input (what goes into the function) and a postcondition/output
    (what does the function produce). Usually, the product of one step is what goes
    into the next step. So what are the inputs and outputs of each of these steps?


    For the first step, ‚ÄúRead contents of file,‚Äù the input is the name of the file.
    In the code supplied for the problem, the file name is indeed given, so it is
    available. What the step should produce is ‚Äúthe contents of the file.‚Äù The step
    is not explicit about how these contents are represented, but you probably know
    that if you read the contents of a file, you either get a string or a list of
    strings.


    Regardless how you represent the contents of the file, they are the input for
    the next step, ‚ÄúCount how often each word occurs.‚Äù What this step should produce
    is some data structure which contains all the words that are in the contents of
    the file, with for each word how often it occurs.


    Again, it is not clear yet how you represent the words with their counts, but
    they are the input for the last step, ‚ÄúSelect the word with the highest count.‚Äù
    The output of this step is a single word, namely the word which occurs the most,
    which you indeed can select if you know all the words in the file contents with
    their counts.'
