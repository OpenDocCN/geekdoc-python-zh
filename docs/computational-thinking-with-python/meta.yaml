    \n## 9.2 ÊûÑÂª∫Â∫èÂàó‰∏äÁöÑÂæ™ÁéØ\n\n‰ªéÂäüËÉΩ‰∏äËÆ≤ÔºåÂæ™ÁéØÊúâ‰∏§ÁßçÔºö‰∏ÄÁßçÊòØÈÅçÂéÜ‰∏ÄÁ≥ªÂàóÈ°πÁõÆÔºàÂ¶ÇÂàóË°®‰∏≠ÁöÑÈ°πÁõÆÔºâÁöÑÂæ™ÁéØÔºåÂè¶‰∏ÄÁßçÊòØÊåÅÁª≠‰∏çÁ°ÆÂÆöÊó∂Èó¥Áõ¥Âà∞Êüê‰∏™Êù°‰ª∂ÂèëÁîüÁöÑÂæ™ÁéØ„ÄÇ\n\
    \nÁ¨¨‰∏ÄÁßçÂæ™ÁéØÈÄöÂ∏∏Ôºà‰ΩÜ‰∏ç‰∏ÄÂÆöÔºâÈÄöËøá**for**Âæ™ÁéØÂÆûÁé∞„ÄÇÂè¶‰∏ÄÁßçÂæ™ÁéØÂ∞ÜÂú®‰∏ã‰∏ÄËäÇËÆ®ËÆ∫„ÄÇ\n\nÂ¶ÇÊûú‰ΩÝË¶ÅÂ§ÑÁêÜÁöÑÈ°πÁõÆÂ∫èÂàó‰Ωç‰∫éÈ°∫Â∫èÊï∞ÊçÆÁªìÊûÑÔºàÂàóË°®„ÄÅÂ≠óÂÖ∏„ÄÅÈõÜÂêàÔºåÁîöËá≥ÂÖÉÁªÑÔºâ‰∏≠Ôºå‰ΩÝÂèØ‰ª•Áõ¥Êé•ÂÜô**for**\
    \ `<item>` **in** `<sequence>`ÔºåÂæ™ÁéØ‰Ωì‰∏≠ÁöÑ‰ª£ÁÝÅÂ∞Ü‰∏∫Â∫èÂàó‰∏≠ÁöÑÊØè‰∏™È°πÁõÆËøêË°å„ÄÇÂÅ∂Â∞îÔºå‰ΩÝÂèØËÉΩÈúÄË¶ÅÈ°πÁõÆÂú®Â∫èÂàó‰∏≠ÁöÑÁ¥¢ÂºïÔºåÂú®ËøôÁßçÊÉÖÂÜµ‰∏ãÔºå‰ΩÝÈÄöÂ∏∏Â∞Ü**for**Âæ™ÁéØÂÜôÊàê‰ΩøÁî®**range**()Â§ÑÁêÜÁ¥¢Âºï„ÄÇ‰æãÂ¶ÇÔºö\n\
