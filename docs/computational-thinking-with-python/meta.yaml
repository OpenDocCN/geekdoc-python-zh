    # 5.8 How to decompose a problem


    Problem decomposition goes through the following steps:


    +   - If a problem seems to be too big to solve in one go, try to determine the
    different steps you need to take to solve the problem. You may be inspired by
    how you would solve the problem manually to determine the steps. It may help initially
    to draw a flow diagram or write pseudo code for the problem.

    - For each step, determine what you need to execute the step, and what the step
    produces. Determine whether you indeed have what you need to take the step.

    - If a step still seems to big to solve it in one go, further decompose it into
    smaller steps.

    - Once all the steps are so simple that you can write code for them without much
    further thinking, implement and test the steps one by one.


    # Exercises


    **Exercise 5.1** Several issues were not dealt with in the program developed in
    this chapter. One issue is what you will do when the file cannot be found. In
    that case, the program should return the word ‚ÄúError‚Äù. Another is that there may
    be more than one word which occurs the most. In that case, the program should
    return of those possible answers the word that is earliest in the alphabet. Identify
    in which steps you will have to take care of these issues, and adapt the program
    accordingly. Note that one of the advantages of a good decomposition is that it
    isn‚Äôt hard to find where an adaptation must be made.


    **Exercise 5.2** When you count how often words occur in a file, you will find
    that some words occur only once, some words occur twice, some words occur three
    times, etc. Design and implement a function which returns how many words in a
    file occur only once. You probably realize that you can reuse most of the code
    which is given in the chapter; you only need to adapt the last step a bit.


    **Exercise 5.3** In continuation of the previous exercise, design and implement
    a function which returns which wordcount occurs least often for a file. For instance,
    supposed that 5 words occur once, 3 words occur twice, 6 words occur three times,
    and 2 words occur four times, then the function returns 4, as the wordcount that
    occurs the least is 4 (namely it occurs for only 2 words). If you base this function
    on the code that was developed in this chapter, you will have to redesign the
    final step of the code. Do this with a flow diagram before implementing it. You
    may want to build a new data structure from the dictionary wordcounts in your
    solution.


    **Exercise 5.4** Take a number. If the number is even, divide it by 2, otherwise
    multiply it by 3 and add 1. Repeat the procedure with the new number. Continue
    repeating the procedure until you reach 1. E.g., if you start with 10, you divide
    by 2 to get 5. You multiply by 3 and add 1, which gives 16. 16 gets divided by
    2 which gives 8. 8 gets divided by 2 which gives 4. 4 gets divided by 2 which
    gives 2. 2 gets divided by 2 which gives 1. The procedure was executes 6 times,
    namely 5 times dividing by 2, and once multiplying by 3 and adding 1.'
