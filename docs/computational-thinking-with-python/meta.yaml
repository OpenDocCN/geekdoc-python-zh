    \ )\n\nhi_lo()\n```\n\n## 6.4 How to implement a program top-down\n\nWith top-down\
    \ programming you go through the following steps:\n\n- You make a general, high-level\
    \ outline of the program, consisting of tasks that you need to implement to make\
    \ the program work.\n- Very simple tasks you implement immediately. For more complex\
    \ tasks you call functions which simply return a legal value.\n- You now should\
    \ have a program that can run and can be tested, albeit with very limited functionality.\n\
    - You now create an implementation of each of the functions that still need an\
    \ implementation. You do this function by function, and if necessary apply further\
    \ problem decomposition for each of the functions.\n\nThe big advantage of top-down\
    \ programming is in the third step: very early in the development process you\
    \ have a working program available that can be tested. Moreover, you generally\
    \ do not have to develop the functions in the order that the program needs them:\
    \ even if a function depends on the output of another function which would be\
    \ called earlier, that other function already exists and gives a legal output,\
    \ so a more detailed implementation of that function can be postponed if you want.\n\
