    \ one word per line. Make a program that produces a list of all 5-letter words\
    \ which contain an ‚Äòx‚Äô.\n\n**Exercise 9.3** Make a program that uses the file\
    \ ‚ÄúwordsEn.txt‚Äù to produce a list of all 5-letter words of which the letters are\
    \ in alphabetical order. E.g., the word ‚Äúabort‚Äù has all its letters in alphabetical\
    \ order as ‚Äòa‚Äô < ‚Äòb‚Äô < ‚Äòo‚Äô < ‚Äòr‚Äô < ‚Äòt‚Äô.\n\n**Exercise 9.4** Make a program that\
    \ uses the file ‚ÄúwordsEn.txt‚Äù to produce a list of all 5-letter words of which\
