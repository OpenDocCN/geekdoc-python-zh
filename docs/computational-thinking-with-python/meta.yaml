  - "[PAGE 64]\n\napproach you have to make three more copies of one of the functions\
    \ and adapt those.\n\n# 8.2 Generalizing the input function\n\nTo make the program\
    \ more elegant, we want to make a generalized number-input function. This function\
    \ should be usable in each of the cases that we need a number as input. To generalize\
    \ a function, we need to identify what different cases the function needs to handle,\
    \ and how we can let the function distinguish those cases based on input parameters.\n\
    \nFirst, let's consider the situation in which the function has to ask a number\
    \ in a certain range, like a number between 1 and 1000, and a number between 10\
    \ and 30. You can probably see that you can do this if you give the minimum and\
    \ the maximum value of the range as parameters. We then get a function like this:\n\
    \n```\ndef input_number_in_range( minvalue, maxvalue ):\n    while True:\n   \
    \     strnum = input( f\"Give number ({minvalue}-{maxvalue}): \" )\n        if\
    \ not strnum.isdigit():\n            print( \"This is not an integer\" )\n   \
    \         continue\n        num = int( strnum )\n        if num < minvalue or\
    \ num > maxvalue:\n            print( f\"Number outside range {minvalue}-{maxvalue}\"\
    \ )\n            continue\n        break\n    return num\n\nnum1 = input_number_in_range(\
    \ 1, 1000 )\nnum2 = input_number_in_range( 10, 30 )\nprint( f\"The numbers are\
    \ {num1} and {num2}.\" )\n```\n\nNote that the minvalue and maxvalue are used\
    \ in three places in the function, namely in the prompt, in the comparison, and\
    \ in one of the error messages.\n\nThere is a bit of a problem in this function\
    \ if the programmer calls the function with a minvalue that is higher than the\
    \ maxvalue, because then the loop in the function becomes endless. To handle that,\
    \ we can, for instance, let the function generate an exception (exception generation\
    \ is a bit of an advanced topic, but it entails that the program will end with\
    \ an error message if a certain condition occurs, in this case, when the function\
    \ is called with minvalue greater than maxvalue). The function then looks as follows:\n\
    \n```\ndef input_number_in_range( minvalue, maxvalue ):\n    if minvalue > maxvalue:\n\
    \        raise Exception( f\"Error: {minvalue} > {maxvalue}\" )\n    while True:\n\
    \        strnum = input( f\"Give number ({minvalue}-{maxvalue}): \" )\n      \
    \  if not strnum.isdigit():\n            print( \"This is not an integer\" )\n\
