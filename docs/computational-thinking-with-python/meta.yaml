    \ count how often each word in the file occurs. And then you have to select the\
    \ word that occurs the most. This can be represented by the flow diagram shown\
    \ in Figure 5.1.\n\nWe may consider each of the steps in this flow diagram a function.\
    \ A function has a pre-condition/input (what goes into the function) and a postcondition/output\
    \ (what does the function produce). Usually, the product of one step is what goes\
    \ into the next step. So what are the inputs and outputs of each of these steps?\n\
    \nFor the first step, ‚ÄúRead contents of file,‚Äù the input is the name of the file.\
    \ In the code supplied for the problem, the file name is indeed given, so it is\
    \ available. What the step should produce is ‚Äúthe contents of the file.‚Äù The step\
    \ is not explicit about how these contents are represented, but you probably know\
    \ that if you read the contents of a file, you either get a string or a list of\
    \ strings.\n\nRegardless how you represent the contents of the file, they are\
    \ the input for the next step, ‚ÄúCount how often each word occurs.‚Äù What this step\
    \ should produce is some data structure which contains all the words that are\
    \ in the contents of the file, with for each word how often it occurs.\n\nAgain,\
    \ it is not clear yet how you represent the words with their counts, but they\
    \ are the input for the last step, ‚ÄúSelect the word with the highest count.‚Äù The\
    \ output of this step is a single word, namely the word which occurs the most,\
    \ which you indeed can select if you know all the words in the file contents with\
    \ their counts.\n\n## 5.3 Selecting data structures\n\nAs indicated, you need\
    \ two data structures for the steps which are given in the flow diagram in Figure\
    \ 5.1. One data structure needs to represent the contents of the file, and a second\
    \ data structure needs to represent all the words with their counts.\n\nYou know\
    \ that when you read a file, you can either get a string or a list of strings.\
    \ Which of these two would be most appropriate for the present problem? A list\
    \ of strings is mainly useful if you need to do something with the separate lines\
    \ in the file, but the lines are not important for the current problem. So a string\
    \ suffices. So, let's decide to represent the contents of the file as a string.\n\
    \nHow to represent words with their counts? Since we have to store multiple words\
    \ ‚Äì we do not know yet how many ‚Äì, we probably need a data structure which has\
    \ some repetition in it. The three basic data structures in Python which have\
    \ this are the list, the dictionary, and the set. Since we have to store a count\
    \ with each word, we have the following main possibilities:\n\n- a list of tuples\
    \ (word, count)\n- a dictionary with the word as key and the count as value\n\
    - a set of tuples (word, count)\n\nWith some experience you may realize that the\
    \ dictionary is probably the best choice, as you will have to go over all the\
    \ words in the file contents, and update the count for a word every time you encounter\
    \ it. Searching for a word in a list is slow (unless the list has a structure\
    \ which allows fast searching), while for a dictionary it is fast.\n\nA set of\
    \ tuples will not work, but you have to know a bit about sets to realize why not.\
    \ Suppose that I have in my set stored that the word ‚Äúyou‚Äù occurs twice; that\
