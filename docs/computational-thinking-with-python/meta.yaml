  - "[PAGE 33]\n\nget one ‚ÄúYou‚Äù, one ‚Äúyou‚Äôre‚Äù, and one ‚Äúyou‚Äù. You want the word ‚Äúyou‚Äù\
    \ to be recognized in each of these cases. A simple solution is to turn the string\
    \ into lowercase characters, and replace all characters in the string which are\
    \ not letters with spaces, before you apply split(). You may say that you will\
    \ ‚Äúclean‚Äù the string before processing it.\n\nThis ‚Äúcleaning‚Äù of the string can\
    \ be considered a separate activity that you need to undertake. You can imagine\
    \ that you implement this activity in a function. That function would have as\
    \ precondition that it receives a string, and as postcondition that it returns\
    \ a ‚Äúcleaned‚Äù version of the string. Naturally, the function should not affect\
