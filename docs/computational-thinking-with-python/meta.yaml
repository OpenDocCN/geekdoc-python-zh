    # 4.2 Contract programming


    ‚ÄúContract programming‚Äù is a programming paradigm in which software designers write
    a precise definition of software components (such as functions) not only with
    respect to what they do, but specifically preconditions, postconditions, and invariants.
    Such a definition is called a ‚Äúcontract.‚Äù I will not go into the exact technical
    meaning of what contract programming is and requires, but I will use the contract
    metaphor to discuss how one should think about functions.


    A precondition is a description of the program‚Äôs situation before a call to a
    function is made. In principle, a function can only know about this situation
    what is communicated to it by the arguments given to it. While it is true that
    in Python a function can also access global variables that exist outside the function,
    it is highly preferable that it does not do that. Because if it does not, when
    you call a function you know exactly what the function gets to work with: the
    arguments that you give to it, and nothing else. This makes the function independent
    from the program it resides in.


    From the perspective of the function, the precondition entails that it gets arguments
    that it can use. In the function description it must be specified what arguments
    the function needs, such as with respect to the data types and the value ranges.
    The contract only defines what the function will do if the arguments are ‚Äúlegal.‚Äù
    If you give the function anything else, what the function does is not specified.


    The postcondition of a function can be interpreted as its return value or values,
    and, if applicable, the changes it has made to the data structures which you have
    handed to it. For example, the `kelvin2celsius()` function above has as its postcondition
    that it presents'
