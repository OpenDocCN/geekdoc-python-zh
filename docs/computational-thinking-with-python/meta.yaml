    This definitely improves the function. However, is it still doing ‚Äútoo much‚Äù?


    There is at least one reason why you may think that this function is still doing
    too much, and that is that it will clean the original string every time that you
    want to count how often a particular word occurs in the string. In practice, you
    would only need to clean the string once, and use the cleaned string every time
    you want to count a word. In fact, the function is not only cleaning the string
    but also splitting it, and that splitting you are now doing for every word as
    well, while it would suffice to do it only once.


    A final reason why I would assess this function as doing too much, is that cleaning
    a string is a functionality that may have multiple uses. You can use it to count
    words, but you can, for instance, also use it to check how many words in the sentence
    occur in a dictionary. Or you can use it when you want to find out how long the
    longest word in a text is. If you combine the cleaning of the string with the
    use of the cleaned string (which is what the function `stringcountword()` does),
    then you make your functionality less generally useable.


    This reason might not hold for a program that only needs to count how often a
    word occurs. However, an experienced programmer would probably still consider
    that later the program may need changing and in that case it might be discovered
    that the cleaning code should have been isolated from the word counting code.


    # 4.6 When is a function doing too little?


    In principle, a function can never do ‚Äútoo little.‚Äù


    You may wonder whether it makes sense to develop a function which consists of
    only a single line of code. My answer would be: if one line of code is all it
    needs, why not?


    Take, for instance, the `kelvin2celsius()` function at the top of this chapter.
    It consists of one line of code, which subtracts 273.15 from the input value.
    If you need to do this conversion in a program, why not just do this subtraction
    in the main code rather than call a function for it? There are multiple reasons
    why you should have a function for this:


    +   - It makes the code self-documenting. If I see a call to a function `kelvin2celsius()`,
    I immediately understand what the code is doing. If instead I see 273.15 being
    subtracted from another number, I might not understand what it does. You can,
    of course, write a comment next to the subtraction, but I personally rather have
    code for which the comments are not necessary for understanding.

    - It removes the necessity for me to understand how you convert Kelvin to Celsius.
    The function call turns this calculation into a ‚Äúblack box.‚Äù There are other temperature
    conversions which are more complex, such as converting Fahrenheit to Celsius.
    If I simply call functions for these conversions, the details of the conversion
    can be considered irrelevant for the understanding of the main program.

    - It allows me to easily expand the functionality without affecting the main program.
    For instance, suppose that I have a Python program that needs to convert Kelvin
