    **Exercise 6.4** Consider a program which keeps track of an inventory. The inventory
    consists of different goods, which have a name, and a quantity. When you start
    the program, there is no inventory. You can give the program three different commands.
    A command consists of a letter, potentially followed by a comma, a word, another
    comma, and an integer.


    The first command is A for ‚Äúadd,‚Äù which adds goods to the inventory. It is followed
    by a word which indicates the name of the good, and an integer which indicates
    the quantity of the good. These goods are added to the inventory. For instance,
    ‚ÄúA,apples,100‚Äù adds 100 apples to the inventory. If the good is already in the
    inventory, you have to add the quantity to what there already is for that good
    in the inventory.


    The second command is R for ‚Äúremove,‚Äù which removes goods from the inventory.
    The word is the good, and the integer is how much of that good should be removed.
    For instance, ‚ÄúR,apples,50‚Äù removes 50 apples from the inventory. If there isn‚Äôt
    enough of the good in the inventory, no change is made but an error message is
    given.


    The third command is L for ‚Äúlist,‚Äù which simply lists all the goods in the inventory
    with their quantities.


    Design this program using a top-down approach. You will probably need to distinguish
    four tasks which are more complex, for which you should use separate functions
    (namely getting and unraveling the command, and the three different commands).
    For the inventory you best use a dictionary.'
