  - "[PAGE 25]\n\nalgorithm means that you determine its ‚Äútime complexity‚Äù (if it\
    \ is about the speed of the algorithm). I will not discuss the formal approach\
    \ to determine time complexity here, but will simply use the loose definition\
    \ of ‚Äúcounting looks at cards,‚Äù which suffices for the purposes of this chapter.\n\
    \nOne way of sorting the deck would be to simply search the whole deck from top\
    \ to bottom to find the first card, which would be the 2 of Diamonds. Once you\
    \ have found the card, you put it aside, and search the deck for the next card,\
    \ which would be the 3 of Diamonds. Once you have found it, you put it on top\
    \ (or bottom, depending on how you are working) of the 2 of Diamonds. Then you\
    \ search for the 4 of Diamonds, then the 5 of Diamonds, etc. You do this until\
    \ you have sorted the deck.\n\nAssuming that the deck contains 52 cards (no Jokers),\
    \ how many cards do you need to look at before you have sorted the deck using\
    \ this algorithm? That depends on how the deck is shuffled. If, after shuffling,\
    \ the deck was already sorted, you only need to look at 52 cards, because every\
    \ time you search for a card, it will be the first one you look at. This is the\
    \ ‚Äúbest-case‚Äù scenario.\n\nWhat is the ‚Äúworst-case‚Äù scenario? That is that the\
    \ deck is sorted in reverse order. Using the given procedure, you will have to\
    \ look at 52 cards to find the 2 of Diamonds, at 51 cards to find the 3 of Diamonds,\
    \ at 50 cards to find the 4 of Diamonds, etc. In total you will look at 1378 cards.\n\
    \nIn practice, you probably will look at less cards, because you will have found\
    \ the card that you are looking for earlier than that. On average, the card you\
    \ search for will be halfway through the remaining deck, so you can probably make\
    \ do with about half the number of looks than in the worst-case scenario, so around\
    \ 689 looks.\n\nIn computer science, the approach to sorting a deck of cards as\
    \ described here is called ‚Äúselection sort.‚Äù It is known as a sorting algorithm\
    \ that is less efficient than sorting can be, though it works fine if the number\
    \ of items that need to be sorted is relatively small.\n\nNote that in selection\
    \ sort you will always be looking for the ‚Äúlowest‚Äù item in the remainder of the\
    \ set of items you are sorting, without knowing what that lowest item actually\
    \ is. For sorting the deck of cards, we knew which was the next card that we were\
    \ looking for, and thus could stop searching when we found that card. However,\
    \ if some cards would be missing from the deck, a sorting algorithm which would\
    \ search for a specific card would not give the desired result. So it may be preferable\
    \ to search for the ‚Äúlowest‚Äù of the remaining cards rather than a specific card,\
    \ but that would mean that for each pass through the deck, you would have to look\
    \ at every card, and this would need the worst-case number of looks.\n\nA pseudo\
    \ code description of selection sort is:\n\n```\n# selection sort algorithm which\
    \ sorts a list of items called \"items\"\nlist sorteditems = empty set;\nwhile\
    \ not list items is empty\n{\n    item lowestitem = the lowest item in list items;\n\
    \    items.remove(lowestitem);\n    sorteditems.append(lowestitem);\n}\n```\n\n\
    If you want to turn this pseudo code into actual Python code, you should be able\
    \ to go through it step by step and replace each line with legitimate Python.\
    \ If you think a line"
