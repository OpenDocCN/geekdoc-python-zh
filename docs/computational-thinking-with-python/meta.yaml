    Pieter Spronck


    Version 1.0.0

    June 10, 2023


    Copyright ¬© 2023 Pieter Spronck.


    Permission is granted to copy, distribute, and/or modify this document under the
    terms of the Creative Commons Attribution-NonCommercial 3.0 Unported License,
    which is available at https://creativecommons.org/licenses/by-nc/3.0/.


    The original form of this book is $\LaTeX$ source code. Compiling this $\LaTeX$
    source has the effect of generating a device-independent representation of a textbook,
    which can be converted to other formats and printed.


    The $\LaTeX$ source for this book will (at some point in time) be available from
    http://www.spronck.net/pythonbook


    **The latest version of this book will always be available from http://www.spronck.net/pythonbook.**


    ## Preface


    This course book is a companion for my book ‚ÄúThe Coder‚Äôs Apprentice: Learning
    Programming with Python 3.‚Äù


    The course is designed to teach computational thinking skills to students who
    manage to learn the elements of programming languages, but have troubles designing
    algorithms. It aims to provide students with the ability to think about problems
    in such a way that they can design a program to solve them.


    The course assumes that the student knows the basics of a programming language.
    The course uses Python 3, but other programming languages should work as well.


    You are welcome to use this course and adapt it to your own needs, but please
    give credit where credit is due.


    Feedback on the course is appreciated, to fix errors and inconsistencies, to add
    extra information, and to improve the learning experience of the students. In
    particular, I am interested in other aspects of Computational Thinking for which
    students can be taught practical approaches.


    You can send feedback to pythonbook@spronck.net. Please indicate that your feedback
    concerns the Computational Thinking book, and not the Python book.


    Pieter Spronck

    June 9, 2023

    Tilburg, The Netherlands


    Pieter Spronck is a Professor of Computer Science at Tilburg University, The Netherlands.


    ## Contents


    Preface v


    1 Introduction 1


    1.1 Prerequisites and assumptions 2


    1.2 Outline 3


    2 Everyday Computational Thinking 5


    2.1 Handling a shopping list 5


    2.2 Algorithms 6


    2.3 Flow diagrams 6


    2.4 Shopping list flow diagram 7


    2.5 A second shopping list flow diagram 10


    2.6 Shopping in real life 10


    3 Thinking about Sorting 13


    3.1 Pseudo code 13


    3.2 Real life sorting 14


    3.3 Sorting a deck of cards 15


    3.4 Efficiency of sorting a deck of cards in a naive way 15


    3.5 Efficiency of sorting a deck of cards in a less naive way 17


    3.6 More efficient sorting 17


    3.7 Designing algorithms for a computer 18


    ## 4 Functions


    - 4.1 A simple function'
