  md: "# Chapter 5\n\n# Problem Decomposition\n\nThe core skill that you must acquire\
    \ to successfully design and implement algorithms is ‚Äúproblem decomposition.‚Äù\
    \ This entails that you are able to divide a problem into a collection of smaller,\
    \ manageable problems, each of which you can solve separately, which together\
    \ solve the problem as a whole.\n\n# 5.1 Problem: Which word occurs the most?\n\
    \nConsider the following task: you have a text file, and you have to determine\
    \ which word in the text file occurs the most. How will you accomplish this task?\n\
    \nThis is a very straightforward problem which you may see on an exam. On the\
    \ exam, you usually get some code which you have to complete, which could look\
    \ as follows:\n\n```\n# Function get_word_with_highest_count() gets the name of\
    \ a text\n# file as input, and should return the word that occurs most\n# often\
    \ in this file.\ndef get_word_with_highest_count( filename ):\n    # Write your\
    \ code here.\n    return \"<word with highest count>\"\n\nprint( get_word_with_highest_count(\
    \ \"pc_woodchuck.txt\" ) )\n```\n\nAn experienced programmer will hardly think\
    \ about this problem, but will code a solution in a few minutes. The skills which\
    \ such a programmer uses come with years and years of writing programs, and are\
    \ not natural to most people who start out designing and implementing more complex\
    \ programs. An inexperienced programmer will have to approach the problem systematically.\n\
    \nIf you get such a task as an inexperienced programmer, what you should definitely\
    \ not do is start typing code. What you should do is think about the problem and\
    \ devise a general solution. Because the problem as a whole might seem too daunting\
    \ a task, what you should do is decompose the problem into smaller problems."
