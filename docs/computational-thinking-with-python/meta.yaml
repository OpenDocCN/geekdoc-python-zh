    thinking skills ‚Äì however, even for these topics pupils can get a passing grade
    if they just blindly follow the teacher‚Äôs instructions. The consequence is that
    many students enter university with only limited computational thinking skills.


    However, my experience is that most students can pick up these skills when practicing
    with solving programming problems. They struggle at first, but over time, with
    enough practice, they get better at creating solutions. Many students have told
    me that there came a moment that they ‚Äúsaw the light,‚Äù after which creating programs
    became much easier and more fun. I have met only very few students who never reached
    the stage where they had acquired the necessary computational thinking skills.


    For me the question is how I teach computational thinking skills to students who
    still need to develop them further. Until recently, my only approach was telling
    students to practice: building solutions for problems with increasing complexity,
    asking for help when getting stuck, and studying other people‚Äôs solutions after
    having designed a solution on one‚Äôs own. I show students how I approach problems
    step by step, hoping that they pick up the skills that I am using by observing
    me.


    This approach works reasonably well. Most students who have trouble creating programming
    solutions do possess plenty of computational thinking skills, but sometimes they
    lie dormant because there was little reason to use them in the past. With practice,
    when using these skills, over time using them becomes natural.


    Regardless, I believe that the training of computational thinking skills can be
    more effective if it does not just rely on practicing with creating solutions.
    There are common concepts to computational thinking which can be made explicit
    and can be taught to students, to give them assistance in computational thought
    processes.


    This course teaches those common concepts.


    # 1.1 Prerequisites and assumptions


    This course assumes that the students have basic programming skills. The programming
    language used in the course to create solutions is Python 3, but other programming
    languages will work as well. I picked Python because it is taught at many universities,
    and is easy to use, while still being extremely powerful. It is also really easy
    to read, so that those who know a different programming language but not Python,
    usually are still able to read and understand Python programs.


    The book is mostly useful to students who have learned about the following topics:
    expressions, variables, functions, conditions, iterations, strings, lists, dictionaries,
    and text files. However, even those who have not gotten much further than iterations
    may find some of the discussed topics useful.


    The book is meant for self study. If a student is already able to use computational
    thinking skills, it is of little value. The course is really aimed at students
    who know programming language elements but have problems coming up with solutions
    to programming exercises.'
