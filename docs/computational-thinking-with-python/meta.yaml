    +   - While the flow diagram contains ‚Äúloops‚Äù (arrows pointing back at earlier
    points of the diagram) and ‚Äúconditions‚Äù (decision points where the diagram splits
    based on a question), when the flow diagram gets executed it turns into a sequence
    of instructions. When you examine the list of instructions that the flow diagram
    turns into, it is very clear that this list is inefficient, as you travel to town
    and back home no less than three times.


    # 2.5 A second shopping list flow diagram


    Figure 2.3 shows the flow diagram which represents Approach 5 as given above.


    You may notice that this flow diagram consists of two parts. In the first part,
    the list is checked and items which you already have in the home are crossed off.
    In the second part, you go into town, purchase everything that you need to purchase,
    and go home again. This approach seems to be more efficient than Approach 4, and
    indeed, if you write out the sequence of steps for the shopping list used to check
    the previous flow diagram, you will notice that you go into town only once, rather
    than three times.


    You may also notice that Approach 5 is still not as efficient as it could be.
    You visit the supermarket twice in this approach, and in between the visits you
    go to the butcher. Even if you would reorder the shopping list to put the minced
    meat at the top or bottom, the instruction ‚Äúgo to store which sells top item‚Äù
    would be encountered twice for the supermarket. Approach 6 attempts to solve this
    issue.


    Moreover, Approach 7 introduces yet another optimization which was not demonstrated
    with the example shopping list used. Namely, if you have all items on the list
    already in your home, then there is no need to go into town altogether, so Approach
    7 makes sure that exceptional situation is handled as well.


    # 2.6 Shopping in real life


    There is no doubt in my mind that if you go shopping for ingredients of a recipe
    in real life, you will use a pretty optimized series of steps that bring the ingredients
    into your home. You will not play video games the whole day expecting that the
    ingredients just appear, nor will you use a random process in the hopes that it
    will lead to the desired result. You will not go shopping if you already have
    all the ingredients in your home. You will not travel into town multiple times
    if you can avoid it, and you will try to do all your shopping in one store before
    you go to the next.


    This means that in real life, you are quite capable of designing an algorithm
    for the activity of ‚Äúgoing shopping,‚Äù even if you have not written out the algorithm
    in a flow diagram.


    You can argue that you do this automatically ‚Äì you never spend any time on ‚Äúdesigning
    a shopping algorithm,‚Äù you just go shopping and it turns out that you do it in
    a relatively efficient way. This may be true, but you are still using an algorithm.
    Moreover, you are able to recognize inefficiencies in your algorithms and correct
    them. You adapt to new situations. If you drive your car into town and you find
    that the road you always use is inaccessible, you find a way around it.'
- md: "![](img/5a08c0143f116cd2579eedd36ecc1b2b_20_0.png)\n\nFigure 2.3: Flow diagram\
    \ of Approach 5.\n\n## Exercises\n\n**Exercise 2.1** Create a flow diagram for\
    \ Approach 6 and/or 7 which are listed at the top of this chapter.\n\n**Exercise\
    \ 2.2** Run through the flow diagram you created in Exercise 2.1 with the example\
    \ shopping list given in the chapter, with a shopping list with only items you\
    \ have in the home, and with a shopping list that is empty.\n\n**Exercise 2.3**\
    \ Design an algorithm for doing the dishes. You may keep it fairly high level.\
    \ Include in the algorithm both the possibility that you have a dish washer and\
    \ that you have to do the dishes by hand. Create a flow diagram.\n\n## Chapter\
    \ 3\n\n## Thinking about Sorting\n\nThe point I wanted to make in the previous\
    \ chapter is that you are able to think computationally, to design algorithms,\
    \ because you do it all the time. However, as a human you have the ability to\
    \ adapt your algorithms on the fly if they are faulty. That is called ‚Äúimprovisation,‚Äù\
    \ which, by the way, is also a form of computational thinking. Because of your\
    \ ability to improvise, there is no need for you to really think carefully about\
    \ the algorithms you use in your daily life. This is different for computers.\n\
    \nAn algorithm for a computer must be precise. It must be complete. It must be\
    \ able to deal with any unforeseen circumstance, otherwise the algorithm will\
    \ not reach its legitimate end and thus will not produce the desired result.\n\
    \nProgramming languages have been created to allow you to specify algorithms in\
    \ a way that a computer can understand them. It is up to you, the programmer,\
    \ to ensure that the algorithms that you present the computer with are indeed\
    \ able to achieve the result that you want them to reach.\n\nIn this chapter I\
    \ will discuss the everyday task of sorting things, which is something that you\
    \ occasionally need to do and for which you usually think a bit on how to do it\
    \ most efficiently. This kind of thinking is also needed when writing computer\
    \ programs. I will start, however, with a discussion of pseudo code, which can\
    \ be an intermediate step between thinking about an algorithm and implementing\
    \ it into code.\n\n### 3.1 Pseudo code\n\nThis course assumes that you can code\
    \ in Python (even if you are not strong at designing algorithms with Python).\
    \ So you can write program code. Writing pseudo code is a lot like writing program\
    \ code, except that in pseudo code you can take ‚Äúshortcuts.‚Äù Your code does not\
    \ need to be able to run. It just must give a good, preferably unambiguous insight\
    \ in what a program should look like. A programmer should be able to turn the\
    \ pseudo code into a program in any computer language that would be suitable for\
    \ implementing the algorithm.\n\nOften, in pseudo code you will be explicit about\
    \ certain code elements which you would not need to be explicit about in your\
    \ chosen programming language. For instance, in Python, if I want to create a\
    \ variable, I just introduce the variable name and assign an initial value to\
    \ it, e.g., `num = 0` creates a variable `num` which is a numerical variable,\
    \ as a numerical value was assigned to it. In other programming languages variables\
    \ have to be declared with a specific type before you can assign them a value.\
    \ Therefore, someone who knows C++ but not Python might protest when they see\
    \ a statement in pseudo code that just says `num = 0`, because in the eyes of\
    \ this person the algorithm does not know that `num` is supposed to be an integer.\
    \ Therefore, in pseudo code you would probably write `int num = 0`, to make explicit\
    \ that `num` is a variable of the integer type, which can be used from the moment\
    \ it has been declared.\n\nAnother thing that you will often see in pseudo code\
    \ is that code ‚Äúblocks‚Äù are started with a curly starting bracket and closed with\
    \ a curly closing bracket. The indentation of a code block would still be like\
    \ it is in Python (as that is the most readable), but the curly brackets are there\
    \ to make explicit that the statements within belong to a code block, as most\
    \ programming languages are not as picky as Python about indentation.\n\nFinally,\
    \ in pseudo code statements are often ended with a semi-colon, as that is common\
    \ in most programming languages.\n\nThe advantage of writing pseudo code is that\
    \ you are allowed to be fairly ‚Äúloose‚Äù in what you write. For instance, if in\
    \ a statement you want to sort a list of persons with the name `personlist` by\
    \ last name, followed by first name, you can just write `sort personlist by lastname,\
    \ firstname` without being more specific on how you actually implement that.\n\
    \nWhile the shopping list examples of the previous chapter are probably not suitable\
    \ for pseudo code, considering that you will not implement them in actually program\
    \ code, I could write a program in pseudo code for the flow diagrams that I gave.\
    \ For instance, for the first flow diagram (Figure 2.2), the pseudo code is:\n\
    \n```\nwhile not all items on the list are crossed off\n{\n    item topitem =\
    \ top item on the list;\n    if not topitem is in the home\n    {\n        go\
    \ into town;\n        go to store which sells topitem;\n        purchase topitem;\n\
    \        go home;\n    }\n    cross off topitem on the list;\n}\n```\n\nIf it\
    \ is not clear to you that this pseudo code is equivalent to the flow diagram\
    \ in Figure 2.2, please study it until it is clear.\n\n### 3.2 Real life sorting\n\
    \nI will now give an example of a real-life task for which you will actually design\
    \ an algorithm when you encounter it. Suppose that you have several boxes of books,\
    \ and an empty bookcase. You are going to place the books on the shelves of the\
    \ bookcase, and want to have them on the shelves in a particular order, for instance\
    \ alphabetically. A situation like this may occur when you are moving houses.\
    \ Ordering books on shelves is not something that you do every day, so you may\
    \ not have an algorithm for it ready that you apply without thinking. So, how\
    \ will you do this?\n\nSuppose that you want to order the books on the shelves\
    \ by the last name of the author. A straightforward approach is that you begin\
    \ by placing the first book on the top-left position of the top shelf, and every\
    \ next book that you take you insert in its correct spot between the books that\
    \ you have already placed. While this works, you will be constantly shifting books\
    \ on shelves, as shelves fill up and you have to make room for new books.\n\n\
    A slightly more complex approach is that you assign each shelf a range of letters,\
    \ which are the first letters of the author names. For instance, the top shelf\
    \ A‚ÄìD (‚ÄúAafjes‚Äù‚Äì‚ÄúDyson‚Äù), the second shelf E‚ÄìH, the third shelf I‚ÄìL, etc. You\
    \ then do the same as in the first approach, except that you place the books on\
    \ the shelf where the author belongs. This will result in a lot less shifting\
    \ of books. The disadvantage of the approach is that you probably are going to\
    \ end up with some shelves that do not fill completely, while other shelves get\
    \ overly full and you will have to reassign letters during the process.\n\nA third\
    \ approach, if you have the space, is that you first sort the books in piles by\
    \ the first letter of the author‚Äôs last name. Thus you end up with about 26 piles\
    \ of books on the floor. You then handle each pile separately, starting with the\
    \ pile of authors whose name starts with an A. If a pile seems to be too big to\
    \ handle in one go, you may repeat the process for that pile, for instance by\
    \ splitting it into two or more smaller piles based on the second letter of the\
    \ author‚Äôs last name.\n\n### 3.3 Sorting a deck of cards\n\nTake a deck of cards,\
    \ and shuffle it (yes, this is an exercise, so please do it). Now sort the deck\
    \ as follows: on top of the deck will be all the Diamonds cards, ordered from\
    \ 2 (lowest) to Ace (highest). Below that will be the Clubs, again ordered from\
    \ 2 to Ace. Below that the Hearts, and at the bottom the Spades, again, both ordered\
    \ from 2 to Ace. If there are any Jokers, put them on the bottom. Once you have\
    \ finished doing it, think about which algorithm you used.\n\nIt is more than\
    \ likely that you first made four stacks of cards, each for one of the suits,\
    \ and then sorted each of the stacks in your hand, as you can probably hold 13\
    \ cards in one hand. Alternatively, to sort a stack you may just have spread it\
    \ out on the table, picked out the Ace and put it aside, then picked out the King\
    \ and put it on top of the Ace, then picked up the Queen, etc.\n\nThe point is\
    \ that you probably would not have tried to sort all the cards at once, holding\
    \ 52 (or more, with Jokers) in your hands while trying to move cards around until\
    \ they are in the right order. You would not have done it like that because you\
    \ intuitively know that it makes for an unwieldy and inefficient process.\n\n\
    ### 3.4 Efficiency of sorting a deck of cards in a naive way\n\nTo estimate how\
    \ efficient a particular method of sorting a deck of cards is, we can count how\
    \ often you have to look at a particular card. Note: determining the efficiency\
