    for any of them. From a perspective of efficiency, however, you may have a preference.


    # 2.2 Algorithms


    An algorithm is a sequence of well-defined instructions which can be followed
    to reach a certain goal. A computer program is an implementation of an algorithm.


    What exactly is meant with ‚Äúwell-defined‚Äù depends on who or what is supposed to
    follow the instructions of the algorithm. If, for instance, there is an algorithm
    for handling a shopping list with one of the approaches mentioned above, and you
    are the person who executes the algorithm, an instruction such as ‚Äúpurchase a
    liter of low-fat milk‚Äù might be sufficiently well-defined. An instruction such
    as ‚Äúgo into town‚Äù might not be, however, as you might wonder which town is meant,
    if there are certain time limits, and what vehicle you should use.


    For the purpose of the discussions in this chapter, however, I will not bother
    too much about making instructions well-defined. Later on, when discussing algorithms
    that have to be turned into computer programs, we have to worry about that, but
    not right now.


    There are different ways of expressing algorithms. A very specific one is writing
    computer code using a programming language. A slightly more high-level one is
    using so-called ‚Äúpseudo-code,‚Äù which is a language which looks a bit like a programming
    language, but is more general so that it can be translated to different programming
    languages. A very high-level one is using so-called ‚Äúflow diagrams.‚Äù


    # 2.3 Flow diagrams


    A flow diagram or ‚Äúflowchart‚Äù consists of boxes connected by lines. Boxes with
    different shapes have a different role. The boxes contain instructions. The lines
    which connect the boxes together indicate the order in which the instructions
    must be executed. A beginning and an end to the flow diagram are specified.'
  - '[PAGE 16]


    # 2.4 Shopping list flow diagram


    Traditionally, flow diagrams were used by computer programmers to define their
    programs before they implemented them. As creating flow diagrams tends to be a
    very time-intensive process which is unwieldy for anything but really small programs,
    almost no one uses them nowadays, except for educational purposes. For the purpose
    of this course it makes sense to explain them here.


    We will only use the most basic flow diagram elements, as shown in Figure 2.1


    ![](img/5a08c0143f116cd2579eedd36ecc1b2b_16_0.png)


    The start/end point element will bear the label ‚Äústart‚Äù or ‚Äúend.‚Äù In general,
    in a flow diagram there is only one ‚Äústart‚Äù point, which is where the algorithm
    starts. There may be multiple ‚Äúend‚Äù points; the algorithm will end as soon as
    one of those is reached.


    By following the flow direction arrows, you follow the steps of the algorithm.
    You move in the arrow‚Äôs direction. Sometimes, when the direction is unambiguous,
    the arrow tip is left off (as you cannot ‚Äúflow backwards‚Äù in the diagram.


    A ‚Äúprocess step‚Äù node indicates an instruction that must be followed.


    A ‚Äúdecision‚Äù node has multiple direction lines coming out of it. In the node is
    a question, and each line is marked by a possible answer to that question. You
    follow the direction line which bears the correct answer to the question. Very
    often the questions have only two answers: ‚Äúyes‚Äù or ‚Äúno,‚Äù or ‚Äútrue‚Äù or ‚Äúfalse.‚Äù
    There is nothing against having decision nodes with more than two possible answers,
    though, except that the flow diagram may become unreadable if there are too many
    direction lines coming out of one decision node.


    I will now use flow diagrams to schematically represent some of the approaches
    to handling a shopping list discussed above.


    # 2.4 Shopping list flow diagram


    Figure 2.2 shows the flow diagram which represents Approach 4 as given above.


    To make abundantly clear how a flow chart is processed, suppose that you have
    a shopping list that contains the following items:


    +   - spaghetti (sold at supermarket)

    - pasta sauce (sold at supermarket)

    - minced meat (sold at butcher)

    - cheese (sold at supermarket)


    If you follow the flow diagram with this shopping list, where you already have
    pasta sauce in the home, you take the following steps (if you have troubles following
    this, then please go over the steps one by one until you understand):'
