    # 3.7 Designing algorithms for a computer


    While I argued above that a computer may run algorithms which would be hard to
    use for a human, usually when you need to design an algorithm for a computer it
    makes sense to consider the question: ‚Äúhow would I solve this problem if I had
    to do it manually?‚Äù While pondering this question, you should not reject approaches
    because they would be too boring or too time-intensive. Since the algorithm you
    come up with would be used by a computer, it does not matter if it is boring or
    time-intensive, because we have computers to do the boring and time-intensive
    things for us. As long as the steps of the algorithm you design lead to the desired
    outcome, in principle you have found something that is worth your while to try
    out in code.


    My experience is that for many students the hint ‚Äúthink about how you would do
    this task if you had to do it manually‚Äù is insufficient to get them to design
    an algorithm. Therefore, in the next chapters I will describe approaches that
    you can use to come up with simple algorithms. My goal is to give you some handholds
    which you can use when you need to write code for a problem that you see for the
    first time.


