  md: "The second improvement is to pack running a single trial in a function. While\
    \ the present program is rather short and may not really need functions, for more\
    \ complex programs which, for instance, need deeper nested loops, packing a task\
    \ which can be distinguished naturally in a function may improve readability and\
    \ may help debugging.\n\nIf you do this, you have to consider what the function\
    \ needs (the input) and what it produces (the output). In this case, the function\
    \ does not need any input, but will produce the number of rolls needed, as that\
    \ is the only thing that we need to know of a trial. With the introduction of\
    \ such a function, namely provide it with the imput parameters which make it ‚Äúgeneralized‚Äù\
    \ for different numbers of dice, and different types of dice.\n\nThe whole program,\
    \ with constants for magic numbers and a generalized trial function, becomes:\n\
    \n```\nfrom random import randint\n\n# Runs a single trial, in which num_dice\
    \ dice are rolled, and all\n# dice which do not show die_value are rerolled until\
    \ they all\n# show die_value. It returns the number of rolls needed.\ndef trial(\
    \ die_value, num_dice ):\n    rolls = 0\n    number_of_die_value = 0\n    while\
    \ number_of_die_value < num_dice:\n        # Roll all dice which do not show die_value\
    \ yet\n        for i in range( num_dice - number_of_die_value ):\n           \
    \ # Roll a single die\n            die = randint( 1, die_value )\n           \
    \ # Count number of dice which show die_value\n            if die == die_value:\n\
    \                number_of_die_value += 1\n        # Count number of rolls\n \
    \       rolls += 1\n    return rolls\n\nTRIALS = 1000\nDIE_VALUE = 6\nNUM_DICE\
    \ = 6\n\ntotal_rolls = 0\nfor j in range( TRIALS ):\n    rolls = trial( DIE_VALUE,\
    \ NUM_DICE)\n    total_rolls += rolls\n\nprint( total_rolls/TRIALS )\n```\n\n\
    # 7.4 How to implement a program bottom-up\n\nWith bottom-up programming you go\
    \ through the following steps:"
