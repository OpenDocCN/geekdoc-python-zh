  md: '# 1.2 Outline


    Each chapter briefly discusses a topic on the practical use of computational thinking,
    usually guided by an example. Solutions will be developed step by step, to demonstrate
    how the particular use of computational thinking which is discussed, is applied.
    Usually the solution is also developed as a Python program (Python 3.5 or higher
    required).


    The chapters are not long. I deliberately wanted a short course. If I would hand
    someone a 200-page book they would probably not get into it at all. I wanted each
    chapter to quickly explain a simple concept which can be applied in many ways.
    Students should learn these concepts, and when they encounter a new problem, think
    which concepts apply to that problem. This may help creating solutions.


    Each chapter ends with several exercises. Note that these exercises are not sufficient
    to practice with the topics under discussion. However, computational thinking
    is required for almost any exercise that you do during a programming course. So
    you can practice with the approaches which are explained by doing any exercise
    at all. For starters, the exercises in ‚ÄúThe Coder‚Äôs Apprentice,‚Äù for which this
    course is a companion, are suitable for practicing with computational thinking,
    in particular the harder ones.


    I wish to note that this course may not be complete. There may be many more topics
    that I could discuss. So I am interested in suggestions for further topics, for
    which I can then create new chapters.'
