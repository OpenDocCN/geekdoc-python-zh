    \ \"kelvin\" ‰ºÝÈÄíÁªôÂáΩÊï∞Ôºå\n# ËØ•ÂèÇÊï∞ÂøÖÈ°ªËá≥Â∞ë‰∏∫Èõ∂ÔºâËΩ¨Êç¢‰∏∫ÊëÑÊ∞èÊ∏©Â∫¶ÔºåÂπ∂Â∞ÜÂÖ∂‰Ωú‰∏∫ÊµÆÁÇπÂÄºËøîÂõû„ÄÇ\ndef kelvin2celsius( kelvin\
    \ ):\n    return kelvin - 273.15\n\ntemp = 100\nprint( f\"{temp} degrees Kelvin\
