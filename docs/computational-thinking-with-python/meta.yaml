    \nËß£ÂÜ≥Ëøô‰∏™ÈóÆÈ¢òÁöÑ‰∏ÄÁßçÊñπÊ≥ïÊòØ‰ΩøÁî®ÈÄªËæëËøêÁÆóÁ¨¶„ÄÇÂ¶ÇÊûúÊàëÂú®Âæ™ÁéØÊù°‰ª∂‰∏≠Â¢ûÂäÝ‰∏Ä‰∏™È¢ùÂ§ñÁöÑÂ≠êÂè•ÔºåÂç≥Êï∞Â≠ó‰∏çÂ∫îÈ´ò‰∫é 9999„ÄÇËøôÊÝ∑ÔºåÊàëÂ∞±ÂèØ‰ª•Âú®Â∞öÊú™ÊâæÂà∞Ëß£‰∏îÊï∞Â≠ó‰ªçÂ∞è‰∫é 10000\
    \ Êó∂ÊâßË°åÂæ™ÁéØ„ÄÇËøôÂèØ‰ª•ÈÄöËøáÈÄªËæë **‰∏é** ËøêÁÆóÁ¨¶Êù•Ëß£ÂÜ≥„ÄÇ‰∏ªÂæ™ÁéØÂèò‰∏∫Ôºö\n\n```python\nnum = 1000\nwhile sum_of_digits(num)\
    \ != product_of_digits(num) and num < 10000:\n    num += 1\n```\n\nËôΩÁÑ∂Âú®Êù°‰ª∂‰∏≠‰ΩøÁî®‰∏Ä‰∏™ÊàñÂ§ö‰∏™ÈÄªËæëËøêÁÆóÁ¨¶Êù•ÁºñÂÜôÂæ™ÁéØÊòØÂèØË°åÁöÑÔºå‰ΩÜËøôÁßçÊù°‰ª∂ÂæÄÂæÄ‰ºöÂæàÂø´ÂèòÂæóÈöæ‰ª•ÈòÖËØª„ÄÇËøôÂ∞±ÊòØ‰∏∫‰ªÄ‰πàÊàëÁªèÂ∏∏ÈááÁî®‰∏çÂêåÁöÑÂÜôÊ≥ïÔºåÂç≥‰ΩøÁî®\
    \ **while True**ÔºåËøôÊÑèÂë≥ÁùÄÂæ™ÁéØÊòØÊóÝÂ∞ΩÁöÑÔºå‰ΩÜÂú®Âæ™ÁéØÈ°∂ÈÉ®ÁºñÂÜôÊù°‰ª∂ËØ≠Âè•ÔºåÂΩìÊª°Ë∂≥ÁâπÂÆöÊù°‰ª∂Êó∂‰ΩøÁî® **break** ËØ≠Âè•Ë∑≥Âá∫Âæ™ÁéØ„ÄÇËøô‰πüÂæÄÂæÄÊõ¥ÂÆπÊòìÈòÖËØªÔºåÂõÝ‰∏∫‰ΩÝÂèØ‰ª•‰ΩøÁî®ËÇØÂÆöÊù°‰ª∂ËÄåÈùûÂê¶ÂÆöÊù°‰ª∂ÔºåÂç≥ÂΩìÊâæÂà∞Ëß£Êó∂Âæ™ÁéØÁªìÊùüÔºåËÄå‰∏çÊòØÂè™Ë¶ÅËß£Êú™ÊâæÂà∞Â∞±ÁªßÁª≠Âæ™ÁéØ„ÄÇ‰ª•‰∏ã‰∏ªÂæ™ÁéØÈááÁî®‰∫ÜËøôÁßçÊñπÊ≥ïÔºö\n\
    \n```python\nnum = 1000\nwhile True:\n    if num > 9999:\n        break\n    if\
    \ sum_of_digits(num) == product_of_digits(num):\n        break\n    num += 1\n\
    ```\n\n**while True** ÁªìÊûÑÂØπÂ≠¶ÁîüÊù•ËØ¥ÂèØËÉΩ‰ª§‰∫∫Âõ∞ÊÉëÔºå‰ΩÜÂÆÉ‰∏çËøáÊòØÊàë‰∏äÈù¢ÊèèËø∞ÁöÑÂÜÖÂÆπÔºöÂæ™ÁéØÁªìÊùüÁöÑÊù°‰ª∂ÂÜôÂú®Âæ™ÁéØÈ°∂ÈÉ®ÔºåÂπ∂‰ΩøÁî® **break**\
    \ ËØ≠Âè•Êù•ÁªìÊùüÂæ™ÁéØ„ÄÇÂ¶ÇÊûú‰ΩÝÂøÖÈ°ªÂú®ÊµãËØïÊù°‰ª∂‰πãÂâçÊâßË°å‰∏Ä‰∏™ÂáΩÊï∞ÊàñËøõË°åËÆ°ÁÆóÔºåËøô‰πüÊòØ‰∏Ä‰∏™ÂæàÂ•ΩÁöÑËß£ÂÜ≥ÊñπÊ°à„ÄÇ‰æãÂ¶ÇÔºåÂ¶ÇÊûú‰ΩÝ‰ªéÊñá‰ª∂‰∏≠ËØªÂèñË°åÔºåÂπ∂‰∏îÂ∫îËØ•Âú®Ê≤°ÊúâÊõ¥Â§öÂÜÖÂÆπÂèØËØªÊó∂ÁªìÊùüÂæ™ÁéØÔºå‰ΩÝÂøÖÈ°ªÂÖàÊâßË°å‰∏ÄÊ¨°\
    \ readline()ÔºåÁÑ∂ÂêéÊâçËÉΩÂæóÂá∫Â∑≤ÂÆåÊàêÁöÑÁªìËÆ∫„ÄÇ‰æãÂ¶ÇÔºö\n\n```python\nfp = open(\"pc_woodchuck.txt\")\n\
    while True:\n    buffer = fp.readline()\n    if buffer == \"\":  # Ê≤°ÊúâÊõ¥Â§öÂÜÖÂÆπÂèØËØª‰∫Ü\n\
    \        break\n    print(buffer, end=\"\")\n```\n\n## 9.4 ÂàùÂßãÂåñ‰∏éÂèçÂàùÂßãÂåñ\n\nÈÄöÂ∏∏ÔºåÂΩì‰ΩÝÈúÄË¶ÅËÆ°ÁÆóÊüê‰∫õ‰∏úË•øÊó∂Ôºå‰ΩÝÈúÄË¶ÅËøõË°å‰∏Ä‰∫õÂàùÂßãÂåñÔºåÊØîÂ¶ÇÂ∞ÜÂèòÈáèËÆæÁΩÆ‰∏∫ÂàùÂßãÂÄºÔºå‰ª•Âèä‰∏Ä‰∫õÂèçÂàùÂßãÂåñÔºåÊØîÂ¶Ç‰ΩøÁî®‰ΩÝÂàùÂßãÂåñÁöÑÂèòÈáèÁöÑËÆ°ÁÆóÂÄº„ÄÇÊàëÁªèÂ∏∏ÁúãÂà∞Â≠¶ÁîüÂú®‰ª£ÁÝÅ‰∏≠Êâæ‰∏çÂà∞Ê≠£Á°ÆÁöÑ‰ΩçÁΩÆÊù•ÂàùÂßãÂåñÂèòÈáè‰ª•ÂèäÂú®Âì™Èáå‰ΩøÁî®ÂÆÉ„ÄÇ\n\
    \nÂ¶ÇÊûú‰ΩÝÁü•ÈÅìÂÖ∂‰∏≠‰∏Ä‰∏™ÁöÑ‚ÄúÊ≠£Á°Æ‰ΩçÁΩÆ‚ÄùÔºå‰ΩÝÈÄöÂ∏∏‰πüÁü•ÈÅìÂè¶‰∏Ä‰∏™ÁöÑÊ≠£Á°Æ‰ΩçÁΩÆÔºåÂõÝ‰∏∫ÂÆÉ‰ª¨ÂæÄÂæÄÂ§Ñ‰∫éÁõ∏ÂêåÁöÑÁº©ËøõÁ∫ßÂà´„ÄÇ‰πüÂ∞±ÊòØËØ¥ÔºåÂ¶ÇÊûúÊàëËøõË°åÊüêÁßçËÆ°ÁÆóÔºåÂú®‰∏Ä‰∏™ÂèòÈáè‰∏≠‰∫ßÁîü‰∏Ä‰∏™ÂÄºÔºåÈÇ£‰πàÊàëÂú®ËÆ°ÁÆó‰πãÂêéÁ´ãÂç≥ËØªÂèñËØ•ÂèòÈáèÔºåËÄåËØ•ÂèòÈáèÁöÑÂàùÂßãÂåñÂáÝ‰πéÊÄªÊòØÂøÖÈ°ªÂú®ËÆ°ÁÆó‰πãÂâçÂ§Ñ‰∫éÁõ∏ÂêåÁöÑÁº©ËøõÁ∫ßÂà´„ÄÇ\n\
    \nËÆ©Êàë‰ª¨‰∏æ‰∏™‰æãÂ≠ê„ÄÇÂÅáËÆæÈÄöËøáÊ®°ÊãüÔºåÊàëÊÉ≥‰º∞ÁÆó‰∫îÈ¢óÂÖ≠Èù¢È™∞Â≠êÊé∑Âá∫ÊÄªÂÄº‰∏∫ 15 ÊàñÊõ¥È´òÁöÑÁôæÂàÜÊØî„ÄÇËøôÊÑèÂë≥ÁùÄÊàëÂøÖÈ°ªÁºñÂÜô‰∏Ä‰∏™ÂµåÂ•óÂæ™ÁéØ„ÄÇ‰ΩøÁî®Ëá™Â∫ïÂêë‰∏äÁöÑÂºÄÂèëÊñπÊ≥ïÔºåÊàëÈ¶ñÂÖàÁºñÂÜôÂÜÖÂ±ÇÂæ™ÁéØÔºåÂç≥Êé∑‰∫îÈ¢óÈ™∞Â≠ê„ÄÇ\n\
    \n```python\nfrom random import randint\n\ntotal = 0  # ÂàùÂßãÂåñ\nfor i in range(5):\n\
    \    total += randint(1, 6)\n\nprint(total)  # ÂèçÂàùÂßãÂåñ\n```\n\nÂΩìÊàëÊÉ≥ËÆ°ÁÆóÊé∑Âá∫ÁöÑ‰∫îÈ¢óÈ™∞Â≠êÁöÑÊÄªÂÄºÊó∂ÔºåÊàëÈúÄË¶ÅÊé∑‰∏ÄÈ¢óÈ™∞Â≠ê‰∫îÊ¨°ÔºåÂπ∂Â∞ÜÂÄºÁõ∏ÂäÝ„ÄÇ‰∏∫Ê≠§ÔºåÊàëÈúÄË¶Å‰∏Ä‰∏™ÂèòÈáèÊù•Â≠òÂÇ®ÊÄªÂÄºÔºåÊàëÁß∞‰πã‰∏∫\
    \ total„ÄÇËØ•ÂèòÈáèÂàùÂßãÂåñ‰∏∫ 0ÔºåÂπ∂‰∏îÂèØ‰ª•Âú®Âæ™ÁéØÂÆåÊàêÂêéËØªÂèñ„ÄÇÂú®‰ª£ÁÝÅ‰∏≠Ôºå‰ΩÝÂèØ‰ª•ÁúãÂà∞Â∞Ü total ÁöÑÂÄºËÆæÁΩÆ‰∏∫Èõ∂ÂíåËÆ© total ÁöÑÂÄºÊàê‰∏∫‰∫îÈ¢óÈ™∞Â≠êÁöÑÊÄªÂíåÔºåÂ§Ñ‰∫éÁõ∏ÂêåÁöÑÁº©ËøõÁ∫ßÂà´„ÄÇ\n\
    \nÁé∞Âú®ÔºåÊàëËØ¥ËøáÊàëÊÉ≥‰º∞ÁÆóÊúâÂ§öÂ∞ëÁôæÂàÜÊØîÁöÑÊäïÊé∑ÁªìÊûúÊÄªÂÄº‰∏∫ 15 ÊàñÊõ¥È´ò„ÄÇÂÅáËÆæÊàëÊ®°ÊãüÊäïÊé∑È™∞Â≠ê 1000 Ê¨°„ÄÇËøôÊÑèÂë≥ÁùÄÊàëÂøÖÈ°ªÂú®Êàë‰πãÂâçÁöÑ‰ª£ÁÝÅÂë®Âõ¥ÊûÑÂª∫‰∏Ä‰∏™Âæ™ÁéØÔºåËØ•Âæ™ÁéØÊâßË°åËØ•‰ª£ÁÝÅ\
    \ 1000 Ê¨°„ÄÇÊàëÈúÄË¶ÅË∑üË∏™Ëøô‰∫õÊäïÊé∑‰∏≠ÊúâÂ§öÂ∞ëÊ¨°ÊòØ 15 ÊàñÊõ¥È´ò„ÄÇÂõÝÊ≠§ÔºåÊàëÂøÖÈ°ª‰ΩøÁî®Á¨¨‰∫å‰∏™ÂèòÈáèÊù•Ë∑üË∏™Ëøô‰∏ÄÁÇπÔºåËØ•ÂèòÈáèÈúÄË¶ÅÂú®Ê®°Êãü‰πãÂâçÂàùÂßãÂåñ‰∏∫ 0ÔºåÂπ∂‰∏îÂú®Ê®°Êãü‰πãÂêéÂ∞ÜÂÖ∑ÊúâÊâÄÈúÄÁöÑÂÄº„ÄÇÂõÝÊ≠§‰ª£ÁÝÅÂèò‰∏∫Ôºö\n\
    \n```python\nfrom random import randint\n\nTRIALS = 1000\n\nover15 = 0  # ÂàùÂßãÂåñ\
    \ 1\nfor j in range(TRIALS):\n    total = 0  # ÂàùÂßãÂåñ 2\n    for i in range(5):\n\
    \        total += randint(1, 6)\n    if total >= 15:  # ÂèçÂàùÂßãÂåñ 2\n        over15\
    \ += 1\n\nprint(over15 / TRIALS)  # ÂèçÂàùÂßãÂåñ 1\n```\n\nÂú®ËøôÊÆµ‰ª£ÁÝÅ‰∏≠ÔºåÊàë‰∏çÂæó‰∏çÂ∞ÜÊâìÂç∞ total ÂÄºÁöÑË°åÊîπ‰∏∫‰ΩøÁî®ËØ•ÂÄºÊù•Êü•ÁúãÊòØÂê¶ÈúÄË¶ÅÂ¢ûÂäÝ\
    \ over15Ôºåover15 Áî®‰∫éË∑üË∏™ÊúâÂ§öÂ∞ëÊ¨°ÊäïÊé∑ÁªìÊûúÊòØ 15 ÊàñÊõ¥È´ò„ÄÇÂØπ total ÁöÑËøôÁßç‰ΩøÁî®ÔºàÂΩìÁÑ∂Ôºâ‰ªçÁÑ∂‰∏é total ÁöÑÂàùÂßãÂåñÂ§Ñ‰∫éÁõ∏ÂêåÁöÑÁº©ËøõÁ∫ßÂà´„ÄÇÂêåÊÝ∑Ôºåover15\
    \ ÁöÑÂàùÂßãÂåñ‰∏é over15 ÁöÑ‰ΩøÁî®ÔºàÂú®‰ª£ÁÝÅÁöÑÊúÄÂêé‰∏ÄË°åÔºâÂ§Ñ‰∫éÁõ∏ÂêåÁöÑÁ∫ßÂà´„ÄÇ\n\nÊàëÁªèÂ∏∏ÁúãÂà∞Â≠¶ÁîüÂÅöÈîô„ÄÇÂú®Êàë‰∏äÈù¢ÂºÄÂèëÁöÑ‰ª£ÁÝÅ‰∏≠Ôºå‰∏§‰∏™ÂÖ∏ÂûãÁöÑÈîôËØØÊòØËøáÊó©ÂàùÂßãÂåñ total\
    \ ÂíåËøáÊôöÂàùÂßãÂåñ total„ÄÇÂ¶ÇÊûú‰ΩÝËøáÊó©ÂàùÂßãÂåñ totalÔºåÂç≥Âú®‰ΩÝÂàùÂßãÂåñ over15 ÁöÑÂêå‰∏Ä‰ΩçÁΩÆÔºåtotal Âú®‰ª£ÁÝÅ‰∏≠Â∞ÜÊ∞∏Ëøú‰∏ç‰ºöË¢´ÈáçÁΩÆ‰∏∫Èõ∂ÔºåÂõÝÊ≠§‰ºöÂú®ÊØèÊ¨°ÊäïÊé∑ÂêéÂ¢ûÂäÝÔºåËøôÊÑèÂë≥ÁùÄ‰ΩÝÊúÄÁªà‰ºöÂæóÂà∞\
    \ 0.999 Êàñ 1.000„ÄÇÂ¶ÇÊûú‰ΩÝËøáÊôöÂàùÂßãÂåñÂÆÉÔºåÂç≥Âú® `for i in range(5)` ËøôË°å‰∏ãÈù¢Ôºå‰ΩÝ‰ºöÂú®ÊØèÊ¨°ÂçïÁã¨ÁöÑÈ™∞Â≠êÊäïÊé∑ÂâçÂ∞Ü total ËÆæÁΩÆ‰∏∫Èõ∂ÔºåÊúÄÁªàÂæóÂà∞\
    \ 0.000„ÄÇ\n\nËøôÊòØ‰∏Ä‰∏™ÂáÝ‰πéÊÄªÊòØÈÄÇÁî®ÁöÑÁªèÈ™åÊ≥ïÂàôÔºåÊ≠£Â¶ÇÊàëÊâÄËØ¥ÔºåÂàùÂßãÂåñÂíåÂèçÂàùÂßãÂåñÂ§Ñ‰∫éÁõ∏ÂêåÁöÑÁº©ËøõÁ∫ßÂà´„ÄÇ\n\n## 9.5 ÊçïËé∑ÈîôËØØ\n\nÂú®ÁºñÁÝÅËøáÁ®ã‰∏≠ÔºåÂ∞ùËØïÊçïËé∑ÈîôËØØ„ÄÇ‰ªª‰ΩïÂèØËÉΩÂá∫ÈîôÁöÑÂú∞ÊñπÔºåÈÉΩÂ∫îËØ•ÂØºËá¥ÈîôËØØÊ∂àÊÅØ„ÄÇÂç≥‰Ωø‰ΩÝËÆ§‰∏∫Êüê‰ª∂‰∫ãÊ∞∏Ëøú‰∏ç‰ºöÂá∫ÈîôÔºå‰πüË¶ÅÁºñÂÜôÈîôËØØÊ∂àÊÅØ„ÄÇÂ¶ÇÊûúÂÆÉÊ≤°ÊúâÂá∫ÈîôÔºå‰ΩÝÂ∞ÜÊ∞∏ËøúÁúã‰∏çÂà∞ËØ•Ê∂àÊÅØÔºåÂπ∂‰∏îÂÆÉ‰∏ç‰ºöÂçÝÁî®‰ªª‰ΩïÂ§ÑÁêÜÊó∂Èó¥Ôºå‰ΩÜÊúâÊó∂‰ΩÝ‰ºöÊÑüÂà∞ÊÉäËÆ∂„ÄÇ\n\
    \n‰æãÂ¶ÇÔºåÂÅáËÆæ‰ΩÝËÆ°ÁÆó‰∏Ä‰∏™ÂàÜÊï∞Ôºå‰æãÂ¶ÇÔºå‰∏Ä‰∏™Êï∞Â≠óÂàóË°®‰∏≠ÊâÄÊúâÂ§ß‰∫é 10 ÁöÑÊï∞Â≠óÊâÄÂçÝÁöÑÊØî‰æã„ÄÇ‰ΩÝÁü•ÈÅìËøô‰∏™ÂàÜÊï∞Â∫îËØ•ÂßãÁªàÂú® [0,1] ËåÉÂõ¥ÂÜÖ„ÄÇÁÑ∂ËÄåÔºåÂ¶ÇÊûú‰ΩÝÊâìÁÆóÂú®Á®ãÂ∫èÁöÑÂêéÈù¢‰ΩøÁî®Ëøô‰∏™ÂàÜÊï∞ÔºåÂπ∂‰∏îÂ¶ÇÊûúÂàÜÊï∞Ë∂ÖÂá∫ËØ•ËåÉÂõ¥‰ºöÂØºËá¥ÈóÆÈ¢òÔºåÈÇ£‰πàËá≥Â∞ëÂú®ËÆ°ÁÆóÂàÜÊï∞ÂêéÁ´ãÂç≥ËøõË°åÊ£ÄÊü•‰ª•Á°Æ‰øùÂÆÉÁ°ÆÂÆûÂú®ËåÉÂõ¥ÂÜÖÔºåÂπ∂Âú®Âê¶ÂàôÁöÑÊÉÖÂÜµ‰∏ã‰∫ßÁîüÈîôËØØÊ∂àÊÅØÔºåËøôÊòØÊúâÊÑè‰πâÁöÑ„ÄÇ\n\
    \n‰ΩÝËøôÊÝ∑ÂÅöÊòØÂõÝ‰∏∫ÔºåÂç≥‰Ωø‰ΩÝÊòØ‰∏Ä‰∏™ÁªèÈ™å‰∏∞ÂØåÁöÑÁ®ãÂ∫èÂëòÔºåÂπ∂‰∏îÁ°Æ‰ø°Ëá™Â∑±ËÉΩÂ§üÊ≠£Á°ÆËÆ°ÁÆóËøôÊÝ∑ÁöÑÂàÜÊï∞Ôºå‰ΩÝ‰πüÂèØËÉΩÊâìÈîôÂ≠óÂπ∂‰∫ßÁîüÈîôËØØÁöÑÁªìÊûú„ÄÇÊØè‰∏™‰∫∫ÈÉΩ‰ºöÁäØËøôÊÝ∑ÁöÑÈîôËØØÔºåÊâÄ‰ª•ÊóÝËÆ∫‰ΩÝÁªèÈ™åÂ¶Ç‰ΩïÔºåËøõË°åËøô‰∫õÊ£ÄÊü•ÈÉΩÊòØÊúâÊÑè‰πâÁöÑ„ÄÇ‰ΩÝÂèØËÉΩÈúÄË¶ÅÂáÝÁßíÈíüÊù•ÊûÑÂª∫ÂÆÉÔºå‰ΩÜÂÆÉÂÅ∂Â∞îÂèØËÉΩ‰ºö‰∏∫‰ΩÝËäÇÁúÅÊï∞Â∞èÊó∂ÁöÑË∞ÉËØïÊó∂Èó¥„ÄÇ"
  merge: 0
