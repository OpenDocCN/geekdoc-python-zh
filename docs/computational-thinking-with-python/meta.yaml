    the remaining Clubs cards and the Hearts cards up to the Jack of Hearts, and pile
    3 all the remaining cards. For a human, making such a split needs more concentration
    than just splitting the deck into piles which contain different suits.


    For a computer such distinctions need not matter. So when you design an algorithm
    that a computer should execute, you sometimes can make the algorithm ‚Äúbetter‚Äù
    than an algorithm that you would have to execute manually, by taking into account
    that many things which are hard or non-intuitive for a human are actually easy
    for a computer.


    # 3.7 Designing algorithms for a computer


    While I argued above that a computer may run algorithms which would be hard to
    use for a human, usually when you need to design an algorithm for a computer it
    makes sense to consider the question: ‚Äúhow would I solve this problem if I had
    to do it manually?‚Äù While pondering this question, you should not reject approaches
    because they would be too boring or too time-intensive. Since the algorithm you
    come up with would be used by a computer, it does not matter if it is boring or
    time-intensive, because we have computers to do the boring and time-intensive
    things for us. As long as the steps of the algorithm you design lead to the desired
    outcome, in principle you have found something that is worth your while to try
    out in code.


    My experience is that for many students the hint ‚Äúthink about how you would do
    this task if you had to do it manually‚Äù is insufficient to get them to design
    an algorithm. Therefore, in the next chapters I will describe approaches that
    you can use to come up with simple algorithms. My goal is to give you some handholds
    which you can use when you need to write code for a problem that you see for the
    first time.


    # Exercises


    **Exercise 3.1** In the previous chapter you created a flow diagram for doing
    the dishes (Exercise 2.3). Turn this flow diagram into pseudo code.


    **Exercise 3.2** Take two decks of cards with different-colored card backs (or,
    if you do not have those ready, imagine that you do). Shuffle the decks together.
    Now sort them again, as described in the chapter (Diamonds, Clubs, Hearts, Spades,
    and within each suit ordered from 2 to Ace), with each of the two card backs in
    their own pile. What algorithm do you use?


    **Exercise 3.3** In the previous exercise you probably first distributed the cards
    over two piles, by card back. Can you think of an algorithm of about similar efficiency
    that uses a different approach?


    **Exercise 3.4** Can you think of a different approach to sorting a deck of cards
    than the naive and slightly less naive ways discussed in the chapter? Can you
