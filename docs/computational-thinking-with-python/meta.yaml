    \ you can make a flow diagram for just the **let_human_make_a_guess()** function.\
    \ After that you can make your implementation. For completeness sake, I give my\
    \ implementation of the finished program here, but with a different flow diagram\
    \ the implementation may turn out differently.\n\n```python\nfrom random import\
    \ randint\n\ndef memorize_a_number():\n    return randint( 1, 1000 )\n\ndef let_human_make_a_guess(\
    \ guesses ):\n    print( \"Number of guesses until now:\", guesses )\n    while\
    \ True:\n        strnum = input( \"Guess a number between 1 and 1000: \" )\n \
    \       if not strnum.isdigit():\n            print( \"This is not a positive\
    \ integer\" )\n            continue\n        num = int( strnum )\n        if num\
    \ < 1 or num > 1000:\n            print( \"This is not a number between 1 and\
