- md: "## Chapter 9\n\n## Implementation Tips\n\nWhen students start out with programming,\
    \ they still have to discover certain standardized ways of implementation. If\
    \ you stick to such standardized ways, you have a much easier time designing programs\
    \ as you no longer need to think about certain details which are obvious to experienced\
    \ programmers. In this chapter I will discuss some of these ways. The chapter\
    \ is aimed specifically at Python programming, as other programming languages\
    \ may have idiosyncrasies which may make some of the ways discussed here less\
    \ applicable.\n\n## 9.1 Choosing data structures\n\nData structures are constructs\
    \ which allow you to store values. When you learn Python programming, initially\
    \ there are three data structures which you focus on: single-value variables (integers,\
    \ strings, and floating-points), lists, and dictionaries. You may occasionally\
    \ encounter two more: tuples and sets. For novice programmers it is often unclear\
    \ when one should use which data structure. There are some straightforward rules-of-thumb\
    \ which one can use to make decisions in this respect.\n\nObviously, when you\
    \ need to store a single value, you use a single-value variable. That much is\
    \ clear. But when do you use a list, dictionary, tuple, or set? Tuples and sets\
    \ are used in exceptional cases, so let‚Äôs first look at lists and dictionaries.\n\
    \nA *list* is a data structure with an ordering. That means that if you have a\
    \ series of values which you need to store, and you need to be able to say ‚Äúthis\
    \ one is the first, this one is the second, this one is the third, etc.‚Äù then\
    \ a list is the obvious choice. Furthermore, since a list has an ordering, it\
    \ can be sorted. None of the other standard data structures can be sorted. Thus,\
    \ if you need sorting, you need a list.\n\nA dictionary is a data structure which\
    \ has no ordering. It is used to store values which belong to a ‚Äúkey.‚Äù Thus you\
    \ use a dictionary when you need to store a series of values, which you can look\
    \ up based on some key. Often, you think of dictionaries as data structures which\
    \ store ‚Äúpairs,‚Äù namely a value tied to a key. (Note: since Python 3.7 dictionaries\
    \ seem to have an ordering, namely the insertion order is preserved; however,\
    \ internally there is no ordering, and you cannot apply any methods which work\
    \ with ordering, such as sorting.)\n\nTo give an example to distinguish the two,\
    \ suppose that you have to read all the words in a file, and do something with\
    \ them. Which data structure do you use? The answer is: that depends on what you\
    \ need to do with them. If, for instance, you need to present all the words in\
    \ the file in alphabetical order, then you will have to sort them at some point\
    \ and thus a list is the obvious way of storing them. However, if you have to\
    \ count how often each word occurs in the file, you have to store a word with\
    \ a counter, i.e., you have to store key-value pairs, so a dictionary is the obvious\
    \ way of storing them.\n\nHere is some code which does both these things (if you\
    \ want to practice with coding, you may wish to develop this code yourself before\
    \ you look at how I do it; I have based my code on the code developed in the chapter\
    \ on problem decomposition):\n\n```python\ndef stringclean( inputstring ):\n \
    \   outputstring = \"\"\n    for letter in inputstring.lower():\n        if letter\
    \ >= 'a' and letter <= 'z':\n            outputstring += letter\n        else:\n\
    \            outputstring += \" \"\n    return outputstring\n\ndef get_wordlist(\
    \ filename ):\n    with open( filename ) as fp:\n        contents = fp.read()\n\
    \    wordlist = stringclean( contents ).split()\n    wordlist.sort()\n    return\
    \ wordlist\n\ndef get_wordcounts( filename ):\n    with open( filename ) as fp:\n\
    \        contents = fp.read()\n    wordcounts = {}\n    wordlist = stringclean(\
    \ contents ).split()\n    for word in wordlist:\n        wordcounts[word] = wordcounts.get(\
    \ word, 0 )+1\n    return wordcounts\n\nprint( \"Word list:\" )\nwordlist = get_wordlist(\
    \ \"pc_woodchuck.txt\" )\nprint( \", \".join( wordlist ) )\nprint()\nprint( \"\
    Word counts:\" )\nworddict = get_wordcounts( \"pc_woodchuck.txt\" )\nfor word\
    \ in worddict:\n    print( f\"{word}: {worddict[word]}\" )\n```\n\nIf this difference\
    \ is clear, then you may consider when to use a set or a tuple.\n\nA *set* is\
    \ unordered, and each item in the set can occur only once. You may have noticed\
    \ that in the code above, the list of words had words which occurred multiple\
    \ times. Perhaps you do not want that. You may then consider using a set to store\
    \ the words, because it will guarantee automatically that each word would be in\
    \ the set just once. However, a set would not be a suitable approach for this,\
    \ because I said that the words should be presented in alphabetical order. Since\
    \ a set cannot be ordered, you cannot sort it. So when would you use a set?\n\n\
    The main reason to use a set is when you have to perform set operations. You can\
    \ create a union of two sets, or create the intersection of two sets. Other set\
    \ operations are possible as well. Thus if, for instance, I have two files and\
    \ I am asked to list all the words that occur in both files, a good solution would\
    \ be to put all the words of one file in one set, and all the words of the other\
    \ file in another set, and then create the intersection of those two sets. Obviously,\
    \ it does not happen often that you would need to perform such operations. Therefore\
    \ the application of sets is rare.\n\nSo how would I solve the issue with listing\
    \ all the words of a file in alphabetical order, but only list each word once?\
    \ There are numerous solutions for this problem, of which I list two. The first\
    \ is that before I store a word in the list, I check if it is already in the list,\
    \ and only store it if it is not there yet. This is an acceptable solution, though\
    \ relatively time-intensive, as checking whether something exists in a list is\
    \ an expensive operation. The second solution is to simply build the list, then\
    \ convert the list to a set, then convert the set back to the list, and then sort\
    \ the list. The conversion to the set I do to get rid of doubles, and the conversion\
    \ back to the list I do because I need to sort the list. Both these solutions\
    \ are in the following code:\n\n```python\ndef stringclean( inputstring ):\n \
    \   outputstring = \"\"\n    for letter in inputstring.lower():\n        if letter\
    \ >= 'a' and letter <= 'z':\n            outputstring += letter\n        else:\n\
    \            outputstring += \" \"\n    return outputstring\n\ndef get_wordlist_with_unique_test(\
    \ filename ):\n    with open( filename ) as fp:\n        contents = fp.read()\n\
    \    words = stringclean( contents ).split()\n    wordlist = []\n    for word\
    \ in words:\n        if word not in wordlist:\n            wordlist.append( word\
    \ )\n    wordlist.sort()\n    return wordlist\n\ndef get_wordlist_via_set( filename\
    \ ):\n    with open( filename ) as fp:\n        contents = fp.read()\n    wordlist\
    \ = stringclean( contents ).split()\n    wordset = set( wordlist )\n    wordlist\
    \ = list( wordset )\n    wordlist.sort()\n    return wordlist\n```\n\n```python\n\
    wordlist = get_wordlist_with_unique_test( \"pc_woodchuck.txt\" )\nprint( \", \"\
    .join( wordlist ) )\nwordlist = get_wordlist_via_set( \"pc_woodchuck.txt\" )\n\
    print( \", \".join( wordlist ) )\n```\n\nYou may think of other solutions to the\
    \ problem yourself. For instance, you can think of how you would use a dictionary\
    \ with word counts to create an alphabetically ordered list of all the unique\
    \ words.\n\nFinally, a few words on tuples.\n\nA *tuple* is an ordered data structure\
    \ which is immutable. You may consider that a tuple is a list, but you cannot\
    \ make changes to that list, e.g., you cannot sort a tuple. In general, almost\
    \ any application for a tuple can just as well be done with a list, and a list\
    \ can do much more than a tuple. The main exception is when you must use an immutable\
    \ data structure somewhere. A good example is when you want to build a dictionary\
    \ where each key consists of multiple values. Since the keys for a dictionary\
    \ must be immutable, you cannot use lists for such keys; you must use tuples.\
    \ However, this kind of application is pretty advanced, so you do not need to\
    \ spend much thought on it at this time.\n\n## 9.2 Building loops over sequences\n\
    \nFunctionally, there two kinds of loops: a loop that moves through a sequence\
    \ of items (such as the items in a list), and a loop which continues for an indeterminate\
    \ amount of time, until a certain conditions occurs.\n\nThe first kind of loop\
    \ is usually (but not necessarily) implemented by a **for**-loop. The other kind\
    \ of loop is discussed in the next section.\n\nIf the sequence of items you have\
    \ to process are in a sequential data structure (list, dictionary, set, or even\
    \ tuple), you can just write **for** `<item>` **in** `<sequence>`, and the code\
    \ in the body of the loop will be run for each item in the sequence. Occasionally,\
    \ you may need the index of the item in the sequence, and in that case you usually\
    \ write the **for**-loop as processing the indices with a **range**(). For example:\n\
    \n```python\nsequence = [ 'apple', 'pear', 'banana', 'grape', 'orange' ]\n\nfor\
    \ item in sequence:\n    print( item )\nprint()\nfor i in range( len( sequence\
    \ ) ):\n    print( sequence[i] )\n```\n\nWhen you run this code, you see that\
    \ both loops produce the same output. The first loop, however, does not have access\
    \ to the indices of the items in the list.\n\nFor the second loop, please note\
    \ the following: the variable `i` takes on the values that are produced by **range**().\
    \ **range**() gets as argument the length of the sequence. The values that it\
    \ produces are integers 0, 1, 2, ... up to but not including the length of the\
    \ sequence."
