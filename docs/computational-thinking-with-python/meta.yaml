    \ that uses the file ‚ÄúwordsEn.txt‚Äù to produce a list of all 5-letter words of\
    \ which the letters are in alphabetical order and at least two pairs of letters\
    \ are right next to each other in the alphabet. E.g., the word ‚Äúghost‚Äù meets the\
    \ requirements as the letters are in alphabetical order and the ‚Äòg‚Äô is next to\
    \ the ‚Äòh‚Äô, and the ‚Äòs‚Äô is next to the ‚Äòt‚Äô.\n\n**Exercise 9.6** Make a program\
    \ that uses the file ‚ÄúwordsEn.txt‚Äù to produce a list of all 5-letter words which\
    \ also have an anagram that is a legal 5-letter word. E.g., ‚Äúearth‚Äù and ‚Äúheart‚Äù\
    \ would both be on the list, as they are anagrams of each other. An extra nice\
    \ solution shows the anagrams next to each other, so ‚Äúcrate,‚Äù ‚Äúcater,‚Äù ‚Äúreact,‚Äù\
    \ ‚Äúcaret,‚Äù and ‚Äútrace‚Äù (and perhaps also ‚Äúrecta‚Äù and ‚Äúcarte,‚Äù if they are in the\
    \ dictionary) are all on one line.\n\n**Exercise 9.7** Make a program that uses\
    \ the file ‚ÄúwordsEn.txt‚Äù to produce a list of all words (regardless their number\
    \ of letters) of which the letters are in alphabetical order. However, words that\
    \ are part of other words on the list should be excluded. E.g., the word ‚Äúmost‚Äù\
    \ should not be on the list as it is part of the word ‚Äúalmost.‚Äù There are many\
    \ ways to approach this exercise. Once you have found one, see if you can make\
    \ it more efficient.\n\n## Chapter 10\n\n## Recursion\n\nRecursion entails that\
    \ functions can call themselves to make certain problems easier to solve. While\
    \ it is an advanced topic, I thought that I would still spend a chapter on it,\
    \ to try to explain it in a way that makes intuitively clear what recursion is\
    \ about and why it works.\n\n### 10.1 Recursion in real life\n\nIn an earlier\
    \ chapter I discussed sorting. An example I used was sorting books on bookshelves.\
    \ I explained that a typical way that people do this is first distribute the books\
    \ over piles, for instance based on letters of the alphabet. Let‚Äôs look at this\
    \ example in a bit more detail.\n\nYou have a large number of books, and you know\
    \ that you can easily sort a pile of 10 books or less. You want the books on the\
    \ shelves by the author‚Äôs last name. So you begin by splitting the books over\
    \ 26 piles, based on the first letter of the author‚Äôs last name. Once you have\
    \ done this, some of these piles will be 10 books or less; e.g., there may be\
    \ no books at all on the pile marked by X, and just a few on the pile marked by\
    \ U. However, many of the piles will be more than 10 books.\n\nNow you repeat\
    \ the procedure for all the piles with more than 10 books, now using the second\
    \ letter of the author‚Äôs last name. For instance, the pile marked by S may have\
    \ more than 10 books, so you now make piles Sa, Sb, Sc, ..., Sz. Many of these\
    \ piles will remain empty, some of them may hold 10 books or less, and maybe some\
    \ of them will still have more than 10 books.\n\nSo you repeat the procedure with\
    \ those piles which have more than 10 books, but now based on the third letter\
    \ of the author‚Äôs last name. For instance, the pile marked St will be divided\
    \ over piles Sta, Stb, Stc, ..., etc.\n\nWhen does the procedure end? The easy\
    \ answer is that it will end when all piles have 10 books or less. There is a\
    \ small problem with this answer, as it may be the case that there is a pile with\
    \ more than 10 books which all have the same last name. If we assume that in that\
    \ case we do not want to further split up the pile as we no longer need to further\
    \ sort it (which may not actually be the case, as there may be multiple authors\
    \ with the same last name and we might still want to split it up further, but\
    \ I will leave that possibility out), the answer is that it will end when all\
    \ piles have either 10 books or less, or consist of only books with one and the\
    \ same last name for the author.\n\nYou can imagine code for this as follows:\n\
    \n```\nfunction sort_books( books ):\n    divide books over piles based on first\
    \ letter of author name\n    for each of the piles do the following:\n       \
    \ if pile contains > 10 books and multiple author names:\n            divide books\
    \ over piles based on 2nd letter of name\n            for each of the piles do\
    \ the following:\n                if pile contains > 10 books and multiple author\
    \ names:\n                    divide books over piles based on 3rd letter of name\n\
    \                    ...etc.\n    place the books on the shelves in the order\
    \ of the piles\n```\n\nA big problem with this code is that we do not know how\
    \ many loops we need to nest for this. If the maximum length of an author‚Äôs last\
    \ name is 20, then 20 nestings would suffice. However, notice that we are doing\
    \ almost the same thing in each loop implementation, namely:\n\n- We check whether\
    \ we need to further split up a pile, and\n- If we need to further split up a\
    \ pile, we do so on the next letter of the last name\n\nSo, you can imagine that\
    \ you have a function that gets a pile of books, and a number of a letter of the\
    \ last name, and splits up the pile.\n\n```\nfunction split_pile( books, nr_of_letter\
    \ ):\n    split books into piles based on nr_of_letter of author name\n    for\
    \ each pile:\n        if pile contains > 10 books and multiple author names:\n\
    \            split_pile( pile, nr_of_letter + 1 )\n```\n\nAs you can see, this\
    \ is a recursive call, as the function split_pile() calls itself.\n\nThis is how\
    \ recursion works. You have a problem which you solve by turning it into one or\
    \ more easier problems (a big pile of books is turned into a series of smaller\
    \ piles of books). The easier problems need the same solution approach as the\
    \ harder problem. If an easier problem is still too hard, you turn it into one\
    \ or more easier problems again, which again need the same solution approach.\
    \ You continue doing this until the problems have become so easy that they basically\
    \ have solved themselves.\n\nWhat is important is that this procedure is guaranteed\
    \ to end at some point. In our case, the procedure will stop as soon as all piles\
    \ are 10 books or less, or contain only books with the same last name. Because\
    \ a pile can always be split up further if there are multiple last names in a\
    \ pile, this procedure is guaranteed to end.\n\n### 10.2 Guessing a number\n\n\
    In the chapter on top-down programming, one of the exercises asks you to develop\
    \ a program which lets the computer guess a number, that you memorize. You have\
    \ to tell the computer ‚Äúhigher,‚Äù ‚Äúlower,‚Äù or ‚Äúcorrect.‚Äù"
