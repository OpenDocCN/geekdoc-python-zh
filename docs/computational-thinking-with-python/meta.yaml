    \ of 1 the number is guessed (it may be possible that the range gets length zero\
    \ at some point, if the human gave incorrect answers to the guesses).\n\nIn the\
    \ following recursive implementation of the guess-the-number game, I use a list\
    \ to store the numbers, and the list is halved on every recursive call. This is\
    \ not an efficient way of coding as these lists take a lot of memory, but it seemed\
    \ to me the clearest way to explain the example.\n\n```\ndef get_answer():\n \
