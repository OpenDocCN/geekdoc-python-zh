    # Chapter 2


    # Everyday Computational Thinking


    We do a lot of planning in our daily lives. To plan well, one has to use some
    form of computational thinking. Most people do this naturally. In this chapter
    I will show some examples of this, to demonstrate that, regardless how easy or
    how hard you think programming is, computational thinking is already a natural
    part of how you analyze problems.


    # 2.1 Handling a shopping list


    Suppose that you have to make dinner in the evening, and you have to go shopping
    for ingredients. You check out the recipe that you want to make, and write down
    a list of ingredients that you need to purchase. Your goal is to have all those
    ingredients in your home when you are done shopping. Consider the following approaches:


    +   - *Approach 1*: You stay home and play videogames all day. When evening comes,
    the ingredients have mystically appeared in your fridge.

    - *Approach 2*: You leave your house and wander about in a random way. If by chance
    you encounter one of the ingredients on the list, you take it. When dusk sets
    in your return home.

    - *Approach 3*: You take your list of ingredients into town. There you ask everyone
    you see whether they can help you acquire one of the items on the list. If they
    can, you do what they tell you to do. When the shops close, you return home.


    Using your computational thinking skills, analyzing these approaches, you will
    probably conclude that none of them is likely to result in your desired goal.
    The first one most certainly will not, and the second and third will only succeed
    if you are really, really lucky. They definitely do not guarantee success. In
    practice, you will not follow any of these approaches ‚Äì you will have rejected
    them out of hand.


    Here are some approaches that are likely to achieve your goal.


    +   - *Approach 4*: You look at the top item on the list. You then check whether
    you already have this item in your home. If you do not, you go into town, go to
    the store that sells the item, purchase the item, and go home again. You then
    cross off the item. You repeat this procedure until you have no more items on
    the list.'
- md: '## 2.2 Algorithms


    An algorithm is a sequence of well-defined instructions which can be followed
    to reach a certain goal. A computer program is an implementation of an algorithm.


    What exactly is meant with ‚Äúwell-defined‚Äù depends on who or what is supposed to
    follow the instructions of the algorithm. If, for instance, there is an algorithm
    for handling a shopping list with one of the approaches mentioned above, and you
    are the person who executes the algorithm, an instruction such as ‚Äúpurchase a
    liter of low-fat milk‚Äù might be sufficiently well-defined. An instruction such
    as ‚Äúgo into town‚Äù might not be, however, as you might wonder which town is meant,
    if there are certain time limits, and what vehicle you should use.


    For the purpose of the discussions in this chapter, however, I will not bother
    too much about making instructions well-defined. Later on, when discussing algorithms
    that have to be turned into computer programs, we have to worry about that, but
    not right now.


    There are different ways of expressing algorithms. A very specific one is writing
    computer code using a programming language. A slightly more high-level one is
    using so-called ‚Äúpseudo-code,‚Äù which is a language which looks a bit like a programming
    language, but is more general so that it can be translated to different programming
    languages. A very high-level one is using so-called ‚Äúflow diagrams.‚Äù


    ## 2.3 Flow diagrams


    A flow diagram or ‚Äúflowchart‚Äù consists of boxes connected by lines. Boxes with
    different shapes have a different role. The boxes contain instructions. The lines
    which connect the boxes together indicate the order in which the instructions
    must be executed. A beginning and an end to the flow diagram are specified.


    ## 2.4 Shopping list flow diagram


    Traditionally, flow diagrams were used by computer programmers to define their
    programs before they implemented them. As creating flow diagrams tends to be a
    very time-intensive process which is unwieldy for anything but really small programs,
    almost no one uses them nowadays, except for educational purposes. For the purpose
    of this course it makes sense to explain them here.


    We will only use the most basic flow diagram elements, as shown in Figure 2.1.


    ![](img/5a08c0143f116cd2579eedd36ecc1b2b_16_0.png)


    The start/end point element will bear the label ‚Äústart‚Äù or ‚Äúend.‚Äù In general,
    in a flow diagram there is only one ‚Äústart‚Äù point, which is where the algorithm
    starts. There may be multiple ‚Äúend‚Äù points; the algorithm will end as soon as
    one of those is reached.


    By following the flow direction arrows, you follow the steps of the algorithm.
    You move in the arrow‚Äôs direction. Sometimes, when the direction is unambiguous,
    the arrow tip is left off (as you cannot ‚Äúflow backwards‚Äù in the diagram).


    A ‚Äúprocess step‚Äù node indicates an instruction that must be followed.


    A ‚Äúdecision‚Äù node has multiple direction lines coming out of it. In the node is
    a question, and each line is marked by a possible answer to that question. You
    follow the direction line which bears the correct answer to the question. Very
    often the questions have only two answers: ‚Äúyes‚Äù or ‚Äúno,‚Äù or ‚Äútrue‚Äù or ‚Äúfalse.‚Äù
    There is nothing against having decision nodes with more than two possible answers,
    though, except that the flow diagram may become unreadable if there are too many
    direction lines coming out of one decision node.


    I will now use flow diagrams to schematically represent some of the approaches
    to handling a shopping list discussed above.


    Figure 2.2 shows the flow diagram which represents Approach 4 as given above.


    To make abundantly clear how a flow chart is processed, suppose that you have
    a shopping list that contains the following items:


    - spaghetti (sold at supermarket)

    - pasta sauce (sold at supermarket)

    - minced meat (sold at butcher)

    - cheese (sold at supermarket)


    If you follow the flow diagram with this shopping list, where you already have
    pasta sauce in the home, you take the following steps (if you have troubles following
    this, then please go over the steps one by one until you understand):


    ![](img/5a08c0143f116cd2579eedd36ecc1b2b_17_0.png)


    Figure 2.2: Flow diagram of Approach 4.


    - Start

    - all items on shopping list crossed off?: **No**

    - look at top item on list: **spaghetti**

    - **spaghetti** already in home?: **No**

    - go into town

    - go to store which sells **spaghetti**: **supermarket**

    - purchase **spaghetti**

    - go home

    - cross off **spaghetti** on list

    - all items on shopping list crossed off?: **No**

    - look at top item on list: **pasta sauce**

    - **pasta sauce** already in home?: **Yes**

    - cross off **pasta sauce** on list

    - all items on shopping list crossed off?: **No**

    - look at top item on list: **minced meat**

    - **minced meat** already in home?: **No**

    - go into town

    - go to store which sells **minced meat**: **butcher**

    - purchase **minced meat**

    - go home

    - cross off **minced meat** on list

    - all items on shopping list crossed off?: **No**

    - look at top item on list: **cheese**

    - **cheese** already in home?: **No**

    - go into town

    - go to store which sells **cheese**: **supermarket**

    - purchase **cheese**

    - go home

    - cross off **cheese** on list

    - all items on shopping list crossed off?: **Yes**

    - End


    A few remarks on things you may have noticed when examining this run-through of
    the flow diagram:


    - While the first step described in Approach 4 is ‚Äúlook at the top item of the
    list,‚Äù the first step in the flow diagram is the question whether all items on
    the shopping list are crossed off, while only the second step is ‚Äúlook at top
    item on list.‚Äù The reason I have chosen to draw the flow diagram as I did, is
    that if by chance all items of the list are already crossed off when you use the
    flow diagram, there is no top item to look at, and ‚Äúlook at top item on list‚Äù
    would result in an error. This change to Approach 4 is an example of what you
    may need to do when turning a procedure into an algorithm. An algorithm is supposed
    to ‚Äúwork‚Äù under any circumstance, in this case, even if the shopping list is empty.

    - I filled in ‚Äútop item‚Äù and ‚Äústore‚Äù with specific values. For ‚Äútop item‚Äù I substituted
    ‚Äúspaghetti,‚Äù ‚Äúpasta sauce,‚Äù ‚Äúminced meat,‚Äù and ‚Äúcheese,‚Äù and for store I substituted
    ‚Äúsupermarket‚Äù and ‚Äúbutcher.‚Äù This is an example of using ‚Äúvariables‚Äù in a flow
    diagram. The instructions in the diagram may refer to certain elements which may
    take on different values at different moments.

    - While the flow diagram contains ‚Äúloops‚Äù (arrows pointing back at earlier points
    of the diagram) and ‚Äúconditions‚Äù (decision points where the diagram splits based
    on a question), when the flow diagram gets executed it turns into a sequence of
    instructions. When you examine the list of instructions that the flow diagram
    turns into, it is very clear that this list is inefficient, as you travel to town
    and back home no less than three times.


    ## 2.5 A second shopping list flow diagram


    Figure 2.3 shows the flow diagram which represents Approach 5 as given above.


    You may notice that this flow diagram consists of two parts. In the first part,
    the list is checked and items which you already have in the home are crossed off.
    In the second part, you go into town, purchase everything that you need to purchase,
    and go home again. This approach seems to be more efficient than Approach 4, and
    indeed, if you write out the sequence of steps for the shopping list used to check
    the previous flow diagram, you will notice that you go into town only once, rather
    than three times.


    You may also notice that Approach 5 is still not as efficient as it could be.
    You visit the supermarket twice in this approach, and in between the visits you
    go to the butcher. Even if you would reorder the shopping list to put the minced
    meat at the top or bottom, the instruction ‚Äúgo to store which sells top item‚Äù
    would be encountered twice for the supermarket. Approach 6 attempts to solve this
    issue.


    Moreover, Approach 7 introduces yet another optimization which was not demonstrated
    with the example shopping list used. Namely, if you have all items on the list
    already in your home, then there is no need to go into town altogether, so Approach
    7 makes sure that exceptional situation is handled as well.


    ## 2.6 Shopping in real life


    There is no doubt in my mind that if you go shopping for ingredients of a recipe
    in real life, you will use a pretty optimized series of steps that bring the ingredients
    into your home. You will not play video games the whole day expecting that the
    ingredients just appear, nor will you use a random process in the hopes that it
    will lead to the desired result. You will not go shopping if you already have
    all the ingredients in your home. You will not travel into town multiple times
    if you can avoid it, and you will try to do all your shopping in one store before
    you go to the next.


    This means that in real life, you are quite capable of designing an algorithm
    for the activity of ‚Äúgoing shopping,‚Äù even if you have not written out the algorithm
    in a flow diagram.


    You can argue that you do this automatically ‚Äì you never spend any time on ‚Äúdesigning
    a shopping algorithm,‚Äù you just go shopping and it turns out that you do it in
    a relatively efficient way. This may be true, but you are still using an algorithm.
    Moreover, you are able to recognize inefficiencies in your algorithms and correct
    them. You adapt to new situations. If you drive your car into town and you find
    that the road you always use is inaccessible, you find a way around it.'
