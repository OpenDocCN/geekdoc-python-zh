- md: "## 7.2 Rolling dice\n\nWhen creating a solution for the die-rolling problem,\
    \ we have to identify what the simplest task is that we need to solve. In the\
    \ example, the simplest task is the rolling of a single die. There is no smaller\
    \ task. We start by creating code for this task, which is a call to the `randint()`\
    \ function.\n\n```python\nfrom random import randint\n\n# Roll a single die\n\
    die = randint(1, 6)\n\nprint(die)\n```\n\nNow rolling a single die works, you\
    \ have to continue by rolling multiple dice. The problem says that you roll six\
    \ dice. Rolling six dice you do in a loop.\n\n```python\nfrom random import randint\n\
    \n# Roll 6 dice\nfor i in range(6):\n    # Roll a single die\n    die = randint(1,\
    \ 6)\n    print(die)\n```\n\nThe next step is that we run an actual trial: we\
    \ need to set aside the sixes, and continue repeating the rolling of the remaining\
    \ dice until we have six sixes. This is probably the hardest step, so we may want\
    \ to split it up into different steps again. First, let's determine how many sixes\
    \ we have rolled.\n\n```python\nfrom random import randint\n\nnumber_of_sixes\
    \ = 0\n# Roll 6 dice\nfor i in range(6):\n    # Roll a single die\n    die = randint(1,\
    \ 6)\n    print(die)\n    # Count number of sixes\n    if die == 6:\n        number_of_sixes\
    \ += 1\n\nprint(\"Number of sixes:\", number_of_sixes)\n```\n\nThe code above\
    \ represents the rolling of six dice once. But we need to reroll the dice until\
    \ they all show a 6. This means that we have to build a loop around this code.\
    \ To build that loop, we need to realize two things: (1) the variable `number_of_sixes`\
    \ is set to zero before we do the first roll, and we continue rolling dice until\
    \ this variable is 6; and (2) we only reroll those dice which do not show 6, so\
    \ we do not roll six dice every time, but `6 - number_of_sixes` dice. This leads\
    \ to the following code:\n\n```python\nfrom random import randint\n\nnumber_of_sixes\
    \ = 0\nwhile number_of_sixes < 6:\n    # Roll all dice which do not show 6 yet\n\
    \    for i in range(6 - number_of_sixes):\n        # Roll a single die\n     \
    \   die = randint(1, 6)\n        print(die)\n        # Count number of sixes\n\
    \        if die == 6:\n            number_of_sixes += 1\n    print(\"Number of\
    \ sixes:\", number_of_sixes)\n```\n\nWhat we have to count is how many rolls we\
    \ needed to get to six sixes, so we have to count how often the while-loop is\
    \ repeated. We do this by initializing a variable `rolls` to zero at the beginning,\
    \ and increasing it every time we go through the outer loop.\n\n```python\nfrom\
    \ random import randint\n\nrolls = 0\nnumber_of_sixes = 0\nwhile number_of_sixes\
    \ < 6:\n    # Roll all dice which do not show 6 yet\n    for i in range(6 - number_of_sixes):\n\
    \        # Roll a single die\n        die = randint(1, 6)\n        print(die)\n\
    \        # Count number of sixes\n        if die == 6:\n            number_of_sixes\
    \ += 1\n    # Count number of rolls\n    rolls += 1\n    print(\"Number of sixes:\"\
    , number_of_sixes)\nprint(\"Number of rolls:\", rolls)\n```\n\nYou can test this\
    \ code and see that it works. We have completed the code for running a single\
    \ trial. We now need to repeat this a large number of times, and calculate the\
    \ average of the number of rolls needed. I usually recommend starting with a small\
    \ number of trials as you do not know yet how slow the code is. Also, before you\
    \ add running more trials, you should remove the `print()` statements that were\
    \ added for debugging purposes, otherwise the output will be unreadable.\n\nIn\
    \ the following code a variable `total_rolls` is added, which keeps track of the\
    \ total number of rolls for all the trials. At the end of the program, this total\
    \ is divided by the number of trials to determine the estimated number of rolls\
    \ needed.\n\n```python\nfrom random import randint\n\ntotal_rolls = 0\nfor j in\
    \ range(1000):\n    rolls = 0\n    number_of_sixes = 0\n    while number_of_sixes\
    \ < 6:\n        # Roll all dice which do not show 6 yet\n        for i in range(6\
    \ - number_of_sixes):\n            # Roll a single die\n            die = randint(1,\
    \ 6)\n            # Count number of sixes\n            if die == 6:\n        \
    \        number_of_sixes += 1\n        # Count number of rolls\n        rolls\
    \ += 1\n    # Count total number of rolls needed\n    total_rolls += rolls\n\n\
    print(total_rolls / 1000)\n```\n\n## 7.3 Improvements to the dice rolling program\n\
    \nWhile the dice rolling program that we developed works, I wish to point out\
    \ several potential improvements.\n\nThe first improvement has to do with so-called\
    \ \"magic numbers.\" Sometimes a program contains numbers which have an arbitrary\
    \ value that needs an explanation on what they mean. In the case of the developed\
    \ program, there are three magic numbers: 6 which is the maximum value of a die,\
    \ 6 which is the number of dice, and 1000 which is the number of trials.\n\nIn\
    \ general, it makes sense to replace such magic numbers with a constant: in Python\
    \ a variable with a fixed value which is never changed in the program, and which\
    \ for clarity is written in uppercase letters. There are three advantages of doing\
    \ this: (1) the meaning of such a value is self-documented; (2) if two of these\
    \ magic numbers are the same (e.g., 6 in this program) their uses are clearly\
    \ distinguished in the program; and (3) if the value changes (e.g., you want to\
    \ run more trials), you only need to change it in one place in the program.\n\n\
    The second improvement is to pack running a single trial in a function. While\
    \ the present program is rather short and may not really need functions, for more\
    \ complex programs which, for instance, need deeper nested loops, packing a task\
    \ which can be distinguished naturally in a function may improve readability and\
    \ may help debugging.\n\nIf you do this, you have to consider what the function\
    \ needs (the input) and what it produces (the output). In this case, the function\
    \ does not need any input, but will produce the number of rolls needed, as that\
    \ is the only thing that we need to know of a trial. With the introduction of\
    \ such a function, you can provide it with the input parameters which make it\
    \ \"generalized\" for different numbers of dice, and different types of dice.\n\
    \nThe whole program, with constants for magic numbers and a generalized trial\
    \ function, becomes:\n\n```python\nfrom random import randint\n\n# Runs a single\
    \ trial, in which num_dice dice are rolled, and all\n# dice which do not show\
    \ die_value are rerolled until they all\n# show die_value. It returns the number\
    \ of rolls needed.\ndef trial(die_value, num_dice):\n    rolls = 0\n    number_of_die_value\
    \ = 0\n    while number_of_die_value < num_dice:\n        # Roll all dice which\
    \ do not show die_value yet\n        for i in range(num_dice - number_of_die_value):\n\
    \            # Roll a single die\n            die = randint(1, die_value)\n  \
    \          # Count number of dice which show die_value\n            if die ==\
    \ die_value:\n                number_of_die_value += 1\n        # Count number\
    \ of rolls\n        rolls += 1\n    return rolls\n\nTRIALS = 1000\nDIE_VALUE =\
    \ 6\nNUM_DICE = 6\n\ntotal_rolls = 0\nfor j in range(TRIALS):\n    rolls = trial(DIE_VALUE,\
    \ NUM_DICE)\n    total_rolls += rolls\n\nprint(total_rolls / TRIALS)\n```\n\n\
    ## 7.4 How to implement a program bottom-up\n\nWith bottom-up programming you\
    \ go through the following steps:\n\n- You identify the simplest tasks in the\
    \ program, and implement those first and test them.\n- You build more complex\
    \ tasks around the simpler tasks that you already implemented, and test them.\n\
    - When you have implemented a naturally distinguishable task, you consider placing\
    \ that task in a function. This is particularly helpful to avoid loops that are\
    \ nested so deep that they become unreadable.\n\nBottom-up programming is most\
    \ useful for tasks which are complex but which cannot easily be distinguished\
    \ in sequential steps.\n\n## Exercises\n\n**Exercise 7.1** Design and write a\
    \ program which estimates what the chance is that if you roll six regular six-sided\
    \ dice, that the total value of the dice is 25 or higher. Use a bottom-up approach.\
    \ Also make sure that it is easy to make the following three changes to the program:\
    \ (1) you roll a different number of dice; (2) you roll a different kind of dice\
    \ (e.g., 8-sided); and (3) you want the total value of the dice to be higher than\
    \ something else than 25.\n\n**Exercise 7.2** List all the 4-digit numbers for\
    \ which the sum of the digits is equal to the product of the digits. Use a bottom-up\
    \ approach.\n\n**Exercise 7.3** List all numbers in a given range (so not just\
    \ 4-digit numbers) for which the sum of the digits is equal to the product of\
    \ the digits. If you wrote the code for the previous exercise in a generalised\
    \ way, you have pretty much solved this. If you did not use a generalised way,\
    \ you are probably going to have to add another loop somewhere."
