    \n### 3.1 ‰º™‰ª£ÁÝÅ\n\nÊú¨ËØæÁ®ãÂÅáËÆæ‰ΩÝËÉΩÂ§üÁî® Python ÁºñÂÜô‰ª£ÁÝÅÔºàÂç≥‰Ωø‰ΩÝÂú®Áî® Python ËÆæËÆ°ÁÆóÊ≥ïÊñπÈù¢Âπ∂‰∏çÊìÖÈïøÔºâ„ÄÇÂõÝÊ≠§Ôºå‰ΩÝÂèØ‰ª•ÁºñÂÜôÁ®ãÂ∫è‰ª£ÁÝÅ„ÄÇÁºñÂÜô‰º™‰ª£ÁÝÅ‰∏éÁºñÂÜôÁ®ãÂ∫è‰ª£ÁÝÅÈùûÂ∏∏Áõ∏‰ººÔºåÂè™ÊòØÂú®‰º™‰ª£ÁÝÅ‰∏≠‰ΩÝÂèØ‰ª•‚ÄúËµ∞Êç∑ÂæÑ‚Äù„ÄÇ‰ΩÝÁöÑ‰ª£ÁÝÅ‰∏çÈúÄË¶ÅËÉΩÂ§üËøêË°å„ÄÇÂÆÉÂè™ÈúÄË¶ÅÊèê‰æõ‰∏Ä‰∏™ËâØÂ•ΩÁöÑ„ÄÅÊúÄÂ•ΩÊòØÊòéÁ°ÆÁöÑÂÖ≥‰∫éÁ®ãÂ∫èÂ∫îËØ•ÊòØ‰ªÄ‰πàÊÝ∑Â≠êÁöÑËßÅËß£„ÄÇÁ®ãÂ∫èÂëòÂ∫îËØ•ËÉΩÂ§üÂ∞Ü‰º™‰ª£ÁÝÅËΩ¨Êç¢Êàê‰ªª‰ΩïÈÄÇÂêàÂÆûÁé∞ËØ•ÁÆóÊ≥ïÁöÑËÆ°ÁÆóÊú∫ËØ≠Ë®ÄÁºñÂÜôÁöÑÁ®ãÂ∫è„ÄÇ\n\
    \nÈÄöÂ∏∏ÔºåÂú®‰º™‰ª£ÁÝÅ‰∏≠Ôºå‰ΩÝ‰ºöÊòéÁ°ÆÊåáÂá∫Êüê‰∫õ‰ª£ÁÝÅÂÖÉÁ¥ÝÔºåËÄåËøô‰∫õÂú®‰ΩÝÈÄâÊã©ÁöÑÁºñÁ®ãËØ≠Ë®Ä‰∏≠Âπ∂‰∏çÈúÄË¶ÅÊòéÁ°ÆÊåáÂá∫„ÄÇ‰æãÂ¶ÇÔºåÂú® Python ‰∏≠ÔºåÂ¶ÇÊûúÊàëÊÉ≥ÂàõÂª∫‰∏Ä‰∏™ÂèòÈáèÔºåÊàëÂè™ÈúÄÂºïÂÖ•ÂèòÈáèÂêçÂπ∂‰∏∫ÂÖ∂Ëµã‰∏Ä‰∏™ÂàùÂßãÂÄºÔºå‰æãÂ¶ÇÔºå`num\
    \ = 0` ÂàõÂª∫‰∫Ü‰∏Ä‰∏™ÂèòÈáè `num`ÔºåÂÆÉÊòØ‰∏Ä‰∏™Êï∞ÂÄºÂèòÈáèÔºåÂõÝ‰∏∫ÁªôÂÆÉËµã‰∫Ü‰∏Ä‰∏™Êï∞ÂÄº„ÄÇÂú®ÂÖ∂‰ªñÁºñÁ®ãËØ≠Ë®Ä‰∏≠ÔºåÂèòÈáèÂú®ËµãÂÄº‰πãÂâçÂøÖÈ°ªÂ£∞ÊòéÁâπÂÆöÁ±ªÂûã„ÄÇÂõÝÊ≠§Ôºå‰∏Ä‰∏™ÊáÇ C++ ‰ΩÜ‰∏çÊáÇ\
    \ Python ÁöÑ‰∫∫ÔºåÂΩìÁúãÂà∞‰º™‰ª£ÁÝÅ‰∏≠Âè™ÂÜôÁùÄ `num = 0` ÁöÑËØ≠Âè•Êó∂ÂèØËÉΩ‰ºöÊèêÂá∫ÂºÇËÆÆÔºåÂõÝ‰∏∫Âú®‰ªñ‰ª¨ÁúãÊù•ÔºåÁÆóÊ≥ï‰∏çÁü•ÈÅì `num` Â∫îËØ•ÊòØ‰∏Ä‰∏™Êï¥Êï∞„ÄÇÂõÝÊ≠§ÔºåÂú®‰º™‰ª£ÁÝÅ‰∏≠Ôºå‰ΩÝÂèØËÉΩ‰ºöÂÜô\
    \ `int num = 0`Ôºå‰ª•ÊòéÁ°Æ `num` ÊòØ‰∏Ä‰∏™Êï¥Êï∞Á±ªÂûãÁöÑÂèòÈáèÔºå‰ªéÂ£∞ÊòéÁöÑÈÇ£‰∏ÄÂàªËµ∑Â∞±ÂèØ‰ª•‰ΩøÁî®„ÄÇ\n\nÂú®‰º™‰ª£ÁÝÅ‰∏≠‰ΩÝÁªèÂ∏∏ÁúãÂà∞ÁöÑÂè¶‰∏Ä‰ª∂‰∫ãÊòØÔºå‰ª£ÁÝÅ‚ÄúÂùó‚Äù‰ª•Â∑¶Ëä±Êã¨Âè∑ÂºÄÂßãÔºå‰ª•Âè≥Ëä±Êã¨Âè∑ÁªìÊùü„ÄÇ‰ª£ÁÝÅÂùóÁöÑÁº©Ëøõ‰ªçÁÑ∂ÂÉè\
