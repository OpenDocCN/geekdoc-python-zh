    \ your dreams.\"\nfor word in ['you', 'love']:\n    print( f\"Number of times\
    \ \\\"{word}\\\" occurs in this string: { stringcountword(drseuss,word)}\" )\n\
    ```\n\nËøôÊóÝÁñëÊîπËøõ‰∫ÜËøô‰∏™ÂáΩÊï∞„ÄÇÁÑ∂ËÄåÔºåÂÆÉÊòØÂê¶‰ªçÁÑ∂ÂÅöÂæó‚ÄúÂ§™Â§ö‚ÄùÔºü\n\nËá≥Â∞ëÊúâ‰∏Ä‰∏™ÁêÜÁî±ËÆ©‰ΩÝÂèØËÉΩËÆ§‰∏∫Ëøô‰∏™ÂáΩÊï∞‰ªçÁÑ∂ÂÅöÂæóÂ§™Â§öÔºåÈÇ£Â∞±ÊòØÊØèÊ¨°‰ΩÝÊÉ≥ËÆ°ÁÆóÂ≠óÁ¨¶‰∏≤‰∏≠Êüê‰∏™ÁâπÂÆöÂçïËØçÂá∫Áé∞ÁöÑÊ¨°Êï∞Êó∂ÔºåÂÆÉÈÉΩ‰ºöÊ∏ÖÁêÜÂéüÂßãÂ≠óÁ¨¶‰∏≤„ÄÇÂÆûÈôÖ‰∏äÔºå‰ΩÝÂè™ÈúÄË¶ÅÊ∏ÖÁêÜÂ≠óÁ¨¶‰∏≤‰∏ÄÊ¨°ÔºåÁÑ∂ÂêéÂú®ÊØèÊ¨°ÊÉ≥ËÆ°ÁÆóÂçïËØçÊó∂‰ΩøÁî®Ê∏ÖÁêÜÂêéÁöÑÂ≠óÁ¨¶‰∏≤„ÄÇ‰∫ãÂÆû‰∏äÔºåËøô‰∏™ÂáΩÊï∞‰∏ç‰ªÖÊ∏ÖÁêÜÂ≠óÁ¨¶‰∏≤ÔºåËøòÂàÜÂâ≤ÂÆÉÔºåËÄå‰ΩÝÁé∞Âú®ÂØπÊØè‰∏™ÂçïËØçÈÉΩËøõË°å‰∫ÜÂàÜÂâ≤ÔºåËÄåÂÆûÈôÖ‰∏äÂè™ÈúÄË¶ÅÂÅö‰∏ÄÊ¨°„ÄÇ\n\
