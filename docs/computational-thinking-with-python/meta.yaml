  - "[PAGE 80]\n\n# 10.2 Guessing a number\n\nIf you make this a smart program, it\
    \ will try to exclude half the possible numbers with each guess. For instance,\
    \ if the number is between 1 and 1000, the computer can first guess 500. If the\
    \ actual number is lower, the range is 1‚Äì499 (499 numbers), and if it is higher,\
    \ then the range is 501‚Äì1000 (500 numbers). Suppose that the number is higher,\
    \ then the computer‚Äôs next guess would be the middle of the remaining range, so\
    \ 750. If the actual number is lower, then the range is 501‚Äì749. Next, the computer\
    \ asks the middle of that range, so 625. Etc. This approach guarantees that the\
    \ computer needs no more than the square root of the maximum number as guesses\
    \ (10 guesses for the range 1‚Äì1000).\n\nYou can implement this in an iterative\
    \ way. I.e., you keep track of the lower end and higher end of the range. The\
    \ computer guesses the middle of the range. If the actual number is lower, the\
    \ higher end of the range is moved to the middle (minus 1). If the actual number\
    \ is higher, the lower end of the range is moved to the middle (plus 1). You continue\
    \ doing this until the number is guessed or the range spans a single number.\n\
    \nCode for this could be the following:\n\n```\ndef get_answer():\n    while True:\n\
    \        answer = input( \"(H)igher, (L)ower, (C)orrect: \" ).upper()\n      \
    \  if answer not in \"HLC\":\n            continue\n        return answer\n\n\
    print( \"Memorize a number between 1 and 100\" )\nlo = 1\nhi = 100\nwhile True:\n\
    \    if lo > hi:\n        raise Exception( \"You are trying to cheat.\" )\n  \
    \  mid = (lo + hi) // 2\n    if lo == hi:\n        break\n    print( \"I guess\
    \ the number is\", mid )\n    answer = get_answer()\n    if answer == 'C':\n \
    \       break\n    elif answer == \"H\":\n        lo = mid + 1\n    else:\n  \
    \      hi = mid - 1\n\nprint( \"The number is\", mid )\n```\n\nYou can also think\
    \ of implementing this recursively (though I hasten to add that that is not the\
    \ preferred approach, for many reasons).\n\nA ‚Äúguess the number‚Äù function gets\
    \ a range of possible numbers. It will guess the middle of the range. If that\
    \ is correct, the function is finished and returns the guessed number. If it is\
    \ not correct, if the actual number is lower, it will play \"guess the number\"\
    \ (i.e., a recursive call) with the smaller range which is lower than the guessed\
    \ number. If the actual number"
  - "[PAGE 81]\n\nis higher, it will play ‚Äúguess the number‚Äù (i.e., a recursive call)\
    \ with the smaller range which is higher than the guessed number. In both cases\
    \ where the number is not correct, it will return the return value of the recursive\
    \ call.\n\nThis procedure is guaranteed to end, as upon every recursive call the\
    \ length of the range is halved, and if the range has a length of 1 the number\
    \ is guessed (it may be possible that the range gets length zero at some point,\
    \ if the human gave incorrect answers to the guesses).\n\nIn the following recursive\
    \ implementation of the guess-the-number game, I use a list to store the numbers,\
    \ and the list is halved on every recursive call. This is not an efficient way\
    \ of coding as these lists take a lot of memory, but it seemed to me the clearest\
    \ way to explain the example.\n\n```\ndef get_answer():\n    while True:\n   \
    \     answer = input( \"(H)igher, (L)ower, (C)orrect: \" ).upper()\n        if\
    \ answer not in \"HLC\":\n            continue\n        return answer\n\ndef guess_number(\
    \ numbers ):\n    if len( numbers ) < 1:\n        raise Exception( \"You are trying\
    \ to cheat.\" )\n    if len( numbers ) == 1:\n        return( numbers[0] )\n \
    \   mid = len( numbers ) // 2\n    print( \"I guess the number is\", numbers[mid]\
    \ )\n    answer = get_answer()\n    if answer == 'C':\n        return numbers[mid]\n\
    \    elif answer == \"H\":\n        return guess_number( numbers[mid+1:] )\n \
    \   else:\n        return guess_number( numbers[:mid] )\n\nprint( \"Memorize a\
    \ number between 1 and 100\" )\nprint( \"The number is\", guess_number( list(\
    \ range( 1, 101 ) ) ) )\n```\n\n# Exercises\n\n**Exercise 10.1** In the ‚Äúguess\
    \ the number‚Äù game, can you keep track of the number of guesses made without using\
    \ a global variable? Hint: let the function return two values, namely the correct\
    \ number and the number of guesses, instead of only one.\n\n**Exercise 10.2**\
    \ A list is sorted if the first half of the list is sorted, and the second half\
    \ of the list is sorted, and the last element of the first half is lower than\
    \ the first element of the second half. And, of course, a list of only one element\
    \ is sorted. This is a recursive definition. Write a recursive function that checks\
    \ if a list is sorted."
