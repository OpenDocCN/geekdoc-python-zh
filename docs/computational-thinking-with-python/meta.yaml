    ÈÇ£‰πàÔºåÂ¶ÇÊûúÊàëËÆ©Ëøô‰∏™ÂáΩÊï∞Êõ¥ÈÄöÁî®‰∏Ä‰∫õÂë¢ÔºüÊàë‰∏çËÆ©ÂÆÉËÆ°ÁÆó‚Äúyou‚ÄùÔºåËÄåÊòØËÆ©ÂÆÉËÆ°ÁÆó‰ªª‰ΩïÂçïËØçÔºåÈÄöËøáÂ∞ÜÈúÄË¶ÅËÆ°ÁÆóÁöÑÂçïËØç‰Ωú‰∏∫ÂèÇÊï∞‰ºÝÈÄí„ÄÇÂÉèËøôÊÝ∑Ôºö\n\n```python\n\
    def stringcountword( inputstring, word ):\n    outputstring = \"\"\n    for letter\
    \ in inputstring.lower():\n        if letter >= 'a' and letter <= 'z':\n     \
    \       outputstring += letter\n        else:\n            outputstring += \"\
    \ \"\n    return outputstring.split().count(word)\n\ndrseuss = \"You know you're\
