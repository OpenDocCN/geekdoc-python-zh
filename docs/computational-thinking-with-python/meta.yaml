  md: '# Exercises


    **Exercise 9.1** You read a file with some contents, and you have to do something
    with those contents. In the following situations, which data structure would you
    use to store the contents of the file? Note: sometimes you may wish to use multiple
    data structures. Note 2: Sometimes there is a ‚Äúbest answer,‚Äù but not always.


    +   - The file contains a list of items ordered by a client. Each item is listed
    with a quantity and a price. You must determine the total cost of the order.

    - The file contains a list of words that are legal in a particular language. You
    must use these words to spellcheck a text.

    - The file contains a list of matches in an eSports event. For each match is listed
    which two competitors engaged in the match, and who of them won the match. You
    must use the match information to produce a ranked list of all the competitors,
    from best-scoring to worst-scoring.

    - The file contains a list of bachelor courses with for each course the number
    of the course and the number of study points (ECTS). You have a series of files,
    each file for one student, which contains a list of the courses the student took
    (by course number), and their final grade for the course. You must determine which
    students are ready to receive their bachelor diploma (i.e., which students have
    a total of 180 study points of courses they passed).

    - The file contains a text which has, in several places, links to other texts
    which must be inserted in the given text. You have to produce the text which has
    all these links replaced by the texts that are to be inserted.


    **Exercise 9.2** This exercise and the following exercises in this chapter all
    use a file which contains a dictionary of English words, stored in a file. A standard
    dictionary of this type is the file ‚ÄúwordsEn.txt,‚Äù which can easily be found on
    the Internet.


    The file ‚ÄúwordsEn.txt‚Äù contains a list of words, one word per line. Make a program
    that produces a list of all 5-letter words which contain an ‚Äòx‚Äô.


    **Exercise 9.3** Make a program that uses the file ‚ÄúwordsEn.txt‚Äù to produce a
