  - "[PAGE 50]\n\n# Chapter 6\n\n# Top-down Development\n\nIn the previous chapter\
    \ a problem was divided into tasks, which could be further split up into smaller\
    \ tasks until all tasks were small enough to handle. This is an example of top-down\
    \ programming. So at this point you probably already understand how to do top-down\
    \ programming, but the topic can use some further discussion.\n\n# 6.1 Top-down\
    \ programming\n\nIn top-down programming we start by creating a program which\
    \ consists of certain high-level tasks, which, when taken together, would clearly\
    \ solve the programming problem if they are implemented correctly. In general,\
    \ a first flow diagram which you would make for such a programming task would\
    \ represent this top-down view.\n\nFor instance, suppose that we want to implement\
    \ a program which plays the game Hi-Lo. In this game, one player memorizes a number\
    \ between 1 and, let's say, 1000, and the other player has to guess the number.\
    \ Every time the second player states a number, the first player will say whether\
    \ the memorized number is higher than, lower than, or equal to the guessed number.\
    \ The game ends when the number is guessed correctly, or the second player took\
    \ too many guesses without arriving at the correct number, e.g., 10 guesses.\n\
    \nLet's assume that the computer memorizes a number, and the human plays the game.\
    \ Figure 6.1 shows a flow diagram for this game.\n\nIf you do not understand why\
    \ this flow diagram correctly represents the game, study it until you do. In (pseudo)\
    \ code form, where the function hi_lo() plays the game, it looks like this:\n\n\
    ```\ndef hi_lo():\n    number = ...; # memorize a number\n    guesses = 0;\n \
    \   while guesses < 10:\n        guess = ...; # let human make a guess\n     \
    \   if guess == number:\n            print( \"You win!\" );\n            return;\n\
    ```"
