- md: "## 5.8 How to decompose a problem\n\nProblem decomposition goes through the\
    \ following steps:\n\n- If a problem seems to be too big to solve in one go, try\
    \ to determine the different steps you need to take to solve the problem. You\
    \ may be inspired by how you would solve the problem manually to determine the\
    \ steps. It may help initially to draw a flow diagram or write pseudo code for\
    \ the problem.\n- For each step, determine what you need to execute the step,\
    \ and what the step produces. Determine whether you indeed have what you need\
    \ to take the step.\n- If a step still seems too big to solve it in one go, further\
    \ decompose it into smaller steps.\n- Once all the steps are so simple that you\
    \ can write code for them without much further thinking, implement and test the\
    \ steps one by one.\n\n## Exercises\n\n**Exercise 5.1** Several issues were not\
    \ dealt with in the program developed in this chapter. One issue is what you will\
    \ do when the file cannot be found. In that case, the program should return the\
    \ word ‚ÄúError‚Äù. Another is that there may be more than one word which occurs the\
    \ most. In that case, the program should return of those possible answers the\
    \ word that is earliest in the alphabet. Identify in which steps you will have\
    \ to take care of these issues, and adapt the program accordingly. Note that one\
    \ of the advantages of a good decomposition is that it isn‚Äôt hard to find where\
    \ an adaptation must be made.\n\n**Exercise 5.2** When you count how often words\
    \ occur in a file, you will find that some words occur only once, some words occur\
    \ twice, some words occur three times, etc. Design and implement a function which\
    \ returns how many words in a file occur only once. You probably realize that\
    \ you can reuse most of the code which is given in the chapter; you only need\
    \ to adapt the last step a bit.\n\n**Exercise 5.3** In continuation of the previous\
    \ exercise, design and implement a function which returns which wordcount occurs\
    \ least often for a file. For instance, suppose that 5 words occur once, 3 words\
    \ occur twice, 6 words occur three times, and 2 words occur four times, then the\
    \ function returns 4, as the wordcount that occurs the least is 4 (namely it occurs\
    \ for only 2 words). If you base this function on the code that was developed\
    \ in this chapter, you will have to redesign the final step of the code. Do this\
    \ with a flow diagram before implementing it. You may want to build a new data\
    \ structure from the dictionary wordcounts in your solution.\n\n**Exercise 5.4**\
    \ Take a number. If the number is even, divide it by 2, otherwise multiply it\
    \ by 3 and add 1. Repeat the procedure with the new number. Continue repeating\
    \ the procedure until you reach 1. E.g., if you start with 10, you divide by 2\
    \ to get 5. You multiply by 3 and add 1, which gives 16. 16 gets divided by 2\
    \ which gives 8. 8 gets divided by 2 which gives 4. 4 gets divided by 2 which\
    \ gives 2. 2 gets divided by 2 which gives 1. The procedure was executed 6 times,\
    \ namely 5 times dividing by 2, and once multiplying by 3 and adding 1.\n\nThe\
    \ Collatz Conjecture says that this procedure will inevitably lead to 1. While\
    \ the Conjecture is not proven yet, it has been checked up to numbers of 19 digits.\n\
    \nDesign and implement a function which gets a number as input and returns how\
    \ often the procedure was executed before 1 was reached. Start by making a flow\
    \ diagram which represents a task decomposition. If you can implement such tasks\
    \ immediately, do so. Otherwise, make a further decomposition before you start\
    \ implementing.\n\n**Exercise 5.5** In the Hangman game, you have to guess a word.\
    \ You do this by guessing letters. The word is displayed as dashes for each letter,\
    \ where a dash is replaced by the correct letter when you have guessed it. For\
    \ instance, the word PROGRAMMING would be displayed as ----------- as long as\
    \ you have not guessed any letters, but when you have guessed R, it is displayed\
    \ as -R--R------, and if you then guess M, it is displayed as -R--R--MM--. When\
    \ guessing letters, a ‚Äúfail‚Äù means that you guess a letter which is not in the\
    \ word. You have a limited number of fails available before you lose the game.\
    \ You win if you guess the word.\n\nConsider a Hangman program in which the computer\
    \ controls the game. The computer selects a word, and lets the human player make\
    \ guesses. The game ends with a win for the human when the word is completed,\
    \ or with a loss for the human when there are 10 fails.\n\nDesign and implement\
    \ a Hangman program. Start with a high-level flow diagram. Each of the steps in\
    \ the flow diagram is a task, and the flow diagram represents the problem decomposition.\
    \ If for a task you can easily implement an algorithm, program it. If not, make\
    \ a further decomposition of the task.\n\nOnce you have an initial version of\
    \ the program working, you will probably see further improvements that you can\
    \ make. For instance, if your implementation lets the computer select a word from\
    \ a small list, you can let the computer select the word from a dictionary which\
    \ is stored in a text file. If you allowed the human to repeat letters as guesses,\
    \ you can build in a check for that. If you did not tell the human what the actual\
    \ word was when the game ends in a loss, you should probably add that. You can\
    \ let the human specify the length of the word before a word is selected. Etcetera.\
    \ This probably means that some of the tasks you defined become more complex,\
    \ and you may have to make a further decomposition of the task. However, you should\
    \ note that if you made a good problem decomposition in the first place, you usually\
    \ only need to make changes to a single task to add the new functionality.\n\n\
    ## Chapter 6\n\n## Top-down Development\n\nIn the previous chapter a problem was\
    \ divided into tasks, which could be further split up into smaller tasks until\
    \ all tasks were small enough to handle. This is an example of top-down programming.\
    \ So at this point you probably already understand how to do top-down programming,\
    \ but the topic can use some further discussion.\n\n## 6.1 Top-down programming\n\
    \nIn top-down programming we start by creating a program which consists of certain\
    \ high-level tasks, which, when taken together, would clearly solve the programming\
    \ problem if they are implemented correctly. In general, a first flow diagram\
    \ which you would make for such a programming task would represent this top-down\
    \ view.\n\nFor instance, suppose that we want to implement a program which plays\
    \ the game Hi-Lo. In this game, one player memorizes a number between 1 and, let's\
    \ say, 1000, and the other player has to guess the number. Every time the second\
    \ player states a number, the first player will say whether the memorized number\
    \ is higher than, lower than, or equal to the guessed number. The game ends when\
    \ the number is guessed correctly, or the second player took too many guesses\
    \ without arriving at the correct number, e.g., 10 guesses.\n\nLet's assume that\
    \ the computer memorizes a number, and the human plays the game. Figure 6.1 shows\
    \ a flow diagram for this game.\n\nIf you do not understand why this flow diagram\
    \ correctly represents the game, study it until you do. In (pseudo) code form,\
    \ where the function hi_lo() plays the game, it looks like this:\n\n```\ndef hi_lo():\n\
    \    number = ...; # memorize a number\n    guesses = 0;\n    while guesses <\
    \ 10:\n        guess = ...; # let human make a guess\n        if guess == number:\n\
    \            print( \"You win!\" );\n            return;\n        if guess < number:\n\
    \            print( \"Higher\" );\n        else:\n            print( \"Lower\"\
    \ );\n        guesses += 1;\n    print( \"You lose!\" );\n\nhi_lo();\n```\n\n\
    When you examine the tasks distinguished in the flow diagram, you probably will\
    \ say of some of them ‚ÄúI can implement those easily,‚Äù while for others you may\
    \ say ‚ÄúI have to think a bit about how to implement these tasks.‚Äù In fact, in\
    \ the pseudo code, I already implemented the reports of wins and losses, the reporting\
    \ of ‚Äúhigher‚Äù and ‚Äúlower,‚Äù and the increase of the number of guesses, as they\
    \ are such small and easy tasks.\n\nFor the sake of argument, let‚Äôs say that the\
    \ two tasks that seem to be more of a challenge to implement are ‚Äúmemorize a number‚Äù\
    \ and ‚Äúlet the human make a guess.‚Äù\n\n## 6.2 Postpone tasks via functions\n\n\
    When you must implement a relatively complex program, you do not want to postpone\
    \ testing the program until you have implemented everything. Using top-down programming,\
    \ you can postpone implementing certain functionalities by placing them in functions."
