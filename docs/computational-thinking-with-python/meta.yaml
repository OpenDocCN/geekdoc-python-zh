    - When you have implemented a naturally distinguishable task, you consider placing
    that task in a function. This is particularly helpful to avoid loops that are
    nested so deep that they become unreadable.


    Bottom-up programming is most useful for tasks which are complex but which cannot
    easily be distinguished in sequential steps.


