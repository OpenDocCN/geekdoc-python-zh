  md: '# Chapter 9


    # Implementation Tips


    When students start out with programming, they still have to discover certain
    standardized ways of implementation. If you stick to such standardized ways, you
    have a much easier time designing programs as you no longer need to think about
    certain details which are obvious to experienced programmers. In this chapter
    I will discuss some of these ways. The chapter is aimed specifically at Python
    programming, as other programming languages may have idiosyncrasies which may
    make some of the ways discussed here less applicable.


    # 9.1 Choosing data structures


    Data structures are constructs which allow you to store values. When you learn
    Python programming, initially there are three data structures which you focus
    on: single-value variables (integers, strings, and floating-points), lists, and
    dictionaries. You may occasionally encounter two more: tuples and sets. For novice
    programmers it is often unclear when one should use which data structure. There
    are some straightforwards rules-of-thumb which one can use to make decisions in
    this respect.


    Obviously, when you need to store a single value, you use a single-value variable.
    That much is clear. But when do you use a list, dictionary, tuple, or set? Tuples
    and sets are used in exceptional cases, so let‚Äôs first look at lists and dictionaries.


    A *list* is a data structure with an ordering. That means that if you have a series
    of values which you need to store, and you need to be able to say ‚Äúthis one is
    the first, this one is the second, this one is the third, etc.‚Äù then a list is
    the obvious choice. Furthermore, since a list has an ordering, it can be sorted.
    None of the other standard data structures can be sorted. Thus, if you need sorting,
    you need a list.


    A dictionary is a data structure which has no ordering. It is used to store values
    which belong to a ‚Äúkey.‚Äù Thus you use a dictionary when you need to store a series
    of values, which you can look up based on some key. Often, you think of dictionaries
    as data structures which store ‚Äúpairs,‚Äù namely a value tied to a key. (Note: since
    Python 3.7 dictionaries seem to have an ordering, namely the insertion order is
    preserved; however, internally there is no ordering, and you cannot apply any
    methods which work with ordering, such as sorting.)'
