  - "[PAGE 62]\n\n# Chapter 8\n\n# Generalization\n\nAt the end of the previous chapter\
    \ I showed how you can create a function that solves a task in a more general\
    \ way than for the specific case that was required to solve the particular problem\
    \ that you have at hand. A typical application of functions (and other programming\
    \ concepts, but in this course the focus is on functions) is to generalize over\
    \ multiple problems which need the same or very similar solutions. While seldom\
    \ needed for smaller problems, it can be helpful to gain a ‚Äúfeel‚Äù for programming\
    \ to think about how you can solve a problem in a more generalized way.\n\n# 8.1\
    \ Getting input with constraints\n\nIn a previous chapter I introduced a function\
    \ which asks the user for a number, which we used to ask for a number between\
    \ 1 and 1000. The function looked something like this:\n\n```\ndef input_number_between_1_and_1000():\n\
    \    while True:\n        strnum = input( \"Give me a number between 1 and 1000:\
    \ \" )\n        if not strnum.isdigit():\n            print( \"This is not an\
    \ integer\" )\n            continue\n        num = int( strnum )\n        if num\
    \ < 1 or num > 1000:\n            print( \"This is not a number between 1 and\
    \ 1000\" )\n            continue\n        break\n    return num\n\nnum = input_number_between_1_and_1000()\n\
    print( \"The number is:\", num )\n```\n\nSuppose that we need to write a program\
    \ which asks the user for three numbers. One can be any number, as long as it\
    \ is an integer, one has to be between 1 and 1000, and the last one has to be\
    \ between 10 and 30. Potentially, you could write that program as follows:"
