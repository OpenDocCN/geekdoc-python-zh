    print( \"The number is:\", num )\n```\n\nSuppose that we need to write a program\
    \ which asks the user for three numbers. One can be any number, as long as it\
    \ is an integer, one has to be between 1 and 1000, and the last one has to be\
    \ between 10 and 30. Potentially, you could write that program as follows:\n\n\
    ```python\ndef input_number():\n    while True:\n        strnum = input( \"Give\
    \ me a number: \" )\n        if not strnum.isdigit():\n            print( \"This\
    \ is not an integer\" )\n            continue\n        num = int( strnum )\n \
    \       break\n    return num\n\ndef input_number_between_1_and_1000():\n    while\
    \ True:\n        strnum = input( \"Give me a number between 1 and 1000: \" )\n\
    \        if not strnum.isdigit():\n            print( \"This is not an integer\"\
    \ )\n            continue\n        num = int( strnum )\n        if num < 1 or\
    \ num > 1000:\n            print( \"This is not a number between 1 and 1000\"\
    \ )\n            continue\n        break\n    return num\n\ndef input_number_between_10_and_30():\n\
    \    while True:\n        strnum = input( \"Give me a number between 10 and 30:\
    \ \" )\n        if not strnum.isdigit():\n            print( \"This is not an\
    \ integer\" )\n            continue\n        num = int( strnum )\n        if num\
    \ < 10 or num > 30:\n            print( \"This is not a number between 10 and\
    \ 30\" )\n            continue\n        break\n    return num\n\nnum1 = input_number()\n\
    num2 = input_number_between_1_and_1000()\nnum3 = input_number_between_10_and_30()\n\
    print( f\"The numbers are {num1}, {num2}, and {num3}.\" )\n```\n\nWhile this program\
    \ works as it should, I assume that you see that this approach, whereby you have\
    \ three functions which are pretty much the same apart from some details, is rather\
    \ inferior. If you do not see it, please consider the following:\n\n- If you discover\
    \ that you made a mistake in one of the functions, you probably have to fix it\
    \ in three places rather than just one place.\n- If you have to extend the program\
    \ and let it ask for a number between 90 and 250, a number smaller than 120, and\
    \ a number between -40 and 40, if you follow the same approach you have to make\
    \ three more copies of one of the functions and adapt those.\n\n## 8.2 Generalizing\
    \ the input function\n\nTo make the program more elegant, we want to make a generalized\
    \ number-input function. This function should be usable in each of the cases that\
    \ we need a number as input. To generalize a function, we need to identify what\
    \ different cases the function needs to handle, and how we can let the function\
    \ distinguish those cases based on input parameters.\n\nFirst, let's consider\
    \ the situation in which the function has to ask a number in a certain range,\
    \ like a number between 1 and 1000, and a number between 10 and 30. You can probably\
    \ see that you can do this if you give the minimum and the maximum value of the\
    \ range as parameters. We then get a function like this:\n\n```python\ndef input_number_in_range(\
    \ minvalue, maxvalue ):\n    while True:\n        strnum = input( f\"Give number\
    \ ({minvalue}-{maxvalue}): \" )\n        if not strnum.isdigit():\n          \
    \  print( \"This is not an integer\" )\n            continue\n        num = int(\
    \ strnum )\n        if num < minvalue or num > maxvalue:\n            print( f\"\
    Number outside range {minvalue}-{maxvalue}\" )\n            continue\n       \
    \ break\n    return num\n\nnum1 = input_number_in_range( 1, 1000 )\nnum2 = input_number_in_range(\
    \ 10, 30 )\nprint( f\"The numbers are {num1} and {num2}.\" )\n```\n\nNote that\
    \ the minvalue and maxvalue are used in three places in the function, namely in\
    \ the prompt, in the comparison, and in one of the error messages.\n\nThere is\
    \ a bit of a problem in this function if the programmer calls the function with\
    \ a minvalue that is higher than the maxvalue, because then the loop in the function\
    \ becomes endless. To handle that, we can, for instance, let the function generate\
    \ an exception (exception generation is a bit of an advanced topic, but it entails\
    \ that the program will end with an error message if a certain condition occurs,\
    \ in this case, when the function is called with minvalue greater than maxvalue).\
    \ The function then looks as follows:\n\n```python\ndef input_number_in_range(\
    \ minvalue, maxvalue ):\n    if minvalue > maxvalue:\n        raise Exception(\
    \ f\"Error: {minvalue} > {maxvalue}\" )\n    while True:\n        strnum = input(\
    \ f\"Give number ({minvalue}-{maxvalue}): \" )\n        if not strnum.isdigit():\n\
    \            print( \"This is not an integer\" )\n            continue\n     \
    \   num = int( strnum )\n        if num < minvalue or num > maxvalue:\n      \
    \      print( f\"Number outside range {minvalue}-{maxvalue}\" )\n            continue\n\
    \        break\n    return num\n```\n\nIn the solution above we can use one function\
    \ to ask for a number between 1 and 1000, and between 10 and 30. However, we also\
    \ need to be able to ask for ‚Äúany number.‚Äù How can we solve that?\n\nDifferent\
    \ approaches are possible. If there is a certain absolute minimum and a certain\
    \ absolute maximum, we can give those as arguments. However, Python does not have\
    \ any limitation on the size of integers (most other programming languages do,\
    \ and this is a common approach in such languages). We could also add a third\
    \ parameter, which is a boolean which indicates whether ‚Äúany number is allowed‚Äù\
    \ or ‚Äúonly numbers in a certain range are allowed.‚Äù However, in that case we need\
    \ to work with an extra parameter of which the functionality is confusing.\n\n\
    You may also consider that a range is only legal if the minvalue is not higher\
    \ than the maxvalue. We could therefore define that if you give a minvalue which\
    \ is higher than the maxvalue, the function does not raise an exception, but simply\
    \ allows any number. We can give default values to minvalue and maxvalue such\
    \ that when the function is called without these arguments, it will allow any\
    \ number, while if a minvalue and maxvalue are specified, they are used to constrain\
    \ the input.\n\nSince the function is now no longer limited to a range, we change\
    \ the name to input_number(), which looks like this:\n\n```python\ndef input_number(\
    \ minvalue=0, maxvalue=-1 ):\n    while True:\n        prompt = \"Give me a number:\
    \ \"\n        if minvalue <= maxvalue:\n            prompt = f\"Give a number\
    \ ({minvalue}-{maxvalue}): \"\n        strnum = input( prompt )\n        if not\
    \ strnum.isdigit():\n            print( \"This is not an integer\" )\n       \
    \     continue\n        num = int( strnum )\n        if minvalue <= maxvalue:\n\
    \            if num < minvalue or num > maxvalue:\n                print( f\"\
    Nr outside range {minvalue}-{maxvalue}\" )\n                continue\n       \
    \ break\n    return num\n```\n\n## 8.3 Abstraction\n\nAbstraction is a form of\
    \ generalization. I want to mention it here because it comes up sometimes, and\
    \ for many it is unclear what the difference between abstraction and generalization\
    \ is. And frankly, the difference in computational terms is not entirely clear.\n\
    \nWe talk about abstraction when referring to the common attributes of a group\
    \ of entities which we deal with in a program. For instance, when we have a program\
    \ that deals with creating identification cards for the people who have an affiliation\
    \ with a university, that program only needs to know of a person their administration\
    \ number, their first name, and their last name, because it only needs to know\
    \ these features to create a card. Of course, persons are much more than those\
    \ three features, but for the program an abstraction of a person is an entity\
    \ which only has these three features. As long as an entity is given to the program\
    \ which has the features of this abstraction of a person, it can create a card\
    \ for the entity.\n\nSo it does not matter if the person is a student or a staff\
    \ member, they can get a card from the program. Maybe in the past there was a\
    \ separate program for creating cards for students and for creating cards for\
    \ staff members, but since students and staff members have the features of the\
    \ same, abstract person, one program is all that is necessary. You can say that\
    \ the program has generalized over persons‚Äô roles.\n\nAbstraction is not of importance\
    \ for the contents of this course, as it ignores object orientation, which is\
    \ an advanced topic. Once you study object orientation, however, you may encounter\
    \ the notion of ‚Äúabstract classes,‚Äù which are entities in a program which are\
    \ never instantiated by themselves, but which can be implemented by more specified\
    \ classes. I will not say more about it here, as it will come up when you get\
    \ to object orientation.\n\n## Exercises\n\n**Exercise 8.1** Write a function\
