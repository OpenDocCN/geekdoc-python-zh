    {% block content %}\n  {% for book in book_list %}\n    <div>\n      <h2><a href=\"\
    \">{{ book.title }}</a></h2>\n    </div>\n  {% endfor %}\n{% endblock content\
    \ %}\n```\n\nRefresh the page and it will still work as before! This technique\
    \ is especially helpful on larger projects where multiple developers are working\
    \ on a project. It's hard for a front-end engineer to guess correctly what object_list\
    \ means!\n\nTo prove the list view works for multiple items add two more books\
    \ to the site via the admin. I've added my two other Django books—Django for APIs\
