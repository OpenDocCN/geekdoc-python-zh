    # # Chapter 13: File/Image Uploads


    We previously configured static assets such as images in Chapter 6, but user-uploaded
    files, such as book covers, are somewhat different. To start with, Django refers
    to the former as `static` whereas anything uploaded by a user, whether it be a
    file or an image, is referred to as `media`.


    The process for adding this feature for files or images is similar, but for images
    the Python image processing library [Pillow](https://python-pillow.org/) must
    be installed which includes additional features such as basic validation.


    Let''s install `pillow` using our by-now-familiar pattern of adding it to the
    `requirements.txt` file.


    **requirements.txt**


    ```


    asgiref==3.5.2

    Django==4.0.4

    psycopg2-binary==2.9.3

    sqlparse==0.4.2

    django-crispy-forms==1.14.0

    crispy-bootstrap5==0.6

    django-allauth==0.50.0

    environs[django]==9.5.0

    pillow==9.0.1

    ```


    Then stop our Docker container, rebuild the Docker image so it now contains `pillow`,
    and start up the container up again.


    **Shell**


    ```

    shell

    $ docker-compose down

    $ docker-compose up -d --build

    ```


