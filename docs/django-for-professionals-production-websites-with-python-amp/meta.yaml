  md: "# Shell\n\n```\n$ docker build .\n...\n---> Using cache\n```\n\nThat's because\
    \ whenever you build a new `Dockerfile`, Docker will automatically check if it\
    \ can use the cached results of previous builds. And since this `Dockerfile` is\
    \ the same as the one from Chapter 1 everything is the same except for the final\
    \ `COPY` command that syncs local files with those on the container's filesystem.\n\
    \nThis caching means that the order of a `Dockerfile` is important for performance\
    \ reasons. In order to avoid constantly invalidating the cache we start the `Dockerfile`\
    \ with commands that are less likely to change while putting commands that are\
    \ more likely to change, like `COPY`ing the local filesystem, at the end.\n\n\
    Time now for the `docker-compose.yml` file which also matches what we saw previously\
    \ in Chapter 1.\n\n# docker-compose.yml\n\n```\nversion: \"3.9\"\n\nservices:\n\
    \  web:\n    build: .\n    command: python /code/manage.py runserver 0.0.0.0:8000\n\
    \    volumes:\n      - .:/code\n    ports:\n      - 8000:8000\n```\n\n# Detached\
    \ Mode\n\nWe'll start up our container now but this time in detached mode which\
    \ requires either the `-d` or `--detach` flag (they do the same thing)."
