    ## Conclusion\n\n- Learning Resources 292\n- Feedback 292\n\n## Introduction\n\
    \nWelcome to *Django for Professionals*, a guide to building professional websites\
    \ with the [Django](https://djangoproject.com)¹, a Python-based web framework.\
    \ There is a massive gulf between building simple \"toy apps\" that can be created\
    \ and deployed quickly and what it takes to build a \"production-ready\" web application\
    \ suitable for deployment to thousands or even millions of users. This book will\
    \ show you to how to bridge that gap on both Windows and macOS computers.\n\n\
    When you first install Django and create a new project the default settings are\
    \ geared towards local development. And this makes sense: there's no need to add\
    \ all the additional features required of a large website until you know you need\
    \ them. These defaults include the use of SQLite as the default database, a local\
    \ web server, local static asset hosting, built-in User model, `DEBUG` mode turned\
    \ on, and many other settings that are implicitly set.\n\nFor a production project\
    \ many, if not most, of these settings must be reconfigured. And even then there\
    \ can be a frustrating lack of agreement among the experts. Rather than overwhelm\
    \ the reader with the full array of choices available this book shows one approach\
    \ for building a professional website grounded in current Django community best\
    \ practices. The topics covered include using Docker for local development and\
    \ deployment, PostgreSQL, a custom user model, robust user authentication flow\
    \ with email, comprehensive testing, environment variables, security and performance\
    \ improvements, and more.\n\nBy the end of this book you will have built a professional\
    \ website step-by-step and learned about additional areas for further exploration.\
    \ Whether you are starting a new project that hopes to be as large as Instagram\
    \ (currently the largest Django website in the world) or making much-needed updates\
    \ to an existing Django project, you will have the tools and knowledge to do so.\n\
    \n¹https://djangoproject.com\n\n## Prerequisites\n\nIf you're brand-new to either\
    \ Django or web development, this is not the book for you. The pace will be far\
    \ too fast. While you *could* read along, copy all the code, and have a working\
    \ website at the end, I instead recommend starting with my book [Django for Beginners](https://djangoforbeginners.com)².\
    \ It starts with the very basics and progressively introduces concepts via building\
    \ five increasingly complex Django applications. After completing that book you\
    \ will be ready for success with this book.\n\nI have also written a book on transforming\
    \ Django websites into web APIs called [Django for APIs](https://djangoforapis.com)³.\
    \ In practice most Django developers work in teams with other developers and focus\
    \ on back-end APIs, not full-stack web applications that require dedicated JavaScript\
    \ front-ends. Reading *Django for APIs* is therefore helpful to your education\
    \ as a Django developer, but not required before reading this book.\n\nWe will\
    \ use Docker throughout most of this book but still rely, briefly, on having Python\
    \ and Django installed locally. Git and the command line are also necessary components\
    \ of the modern developers toolchain and will both be used extensively in this\
    \ book as well.\n\n## Book Structure\n\n*Chapter 1* starts with setting up your\
    \ local computer for development by using the command line, installing Python,\
    \ configuring Git, and creating virtual environments. *Chapter 2* is an introduction\
    \ to Docker and explores how to \"Dockerize\" a traditional Django project. In\
    \ *Chapter 3* PostgreSQL is introduced, a production-ready database that we can\
    \ run locally within our Docker environment and also deploy to production. Then\
    \ *Chapter 4* starts the main project in the book: an online Bookstore featuring\
    \ a custom user model, search, image uploads, permissions, and a host of other\
    \ goodies.\n\n*Chapter 5* focuses on building out a Pages app for a basic homepage\
    \ along with robust testing which is included with every new feature on the site.\
    \ In *Chapter 6* a complete user registration flow is implemented from scratch\
    \ using the built-in auth app for sign up, log in, and log out.\n\n²https://djangoforbeginners.com\n\
    ³https://djangoforapis.com"
