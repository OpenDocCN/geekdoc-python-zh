- md: "## Shell\n\n```\n$ docker-compose up -d\n```\n\nDetached mode runs [containers\
    \ in the background](https://docs.docker.com/compose/reference/up/), which means\
    \ we can use a single command line tab without needing a separate one open as\
    \ well. This saves us from switching back and forth between two command line tabs\
    \ constantly. The downside is that if/when there is an error, the output won't\
    \ always be visible. So if your screen does not match this book at some point,\
    \ try typing `docker-compose logs` to see the current output and debug any issues.\n\
    \nYou likely will see a \"Warning: Image for service web was built because it\
    \ did not already exist\" message at the bottom of the command. Docker automatically\
    \ created a new image for us within the container. As we'll see later in the book,\
    \ adding the `--build` flag to force an image build is necessary when software\
    \ packages are updated because, by default, Docker will look for a local cached\
    \ copy of software and use that which improves performance.\n\nTo confirm things\
    \ are working properly go back to `http://127.0.0.1:8000/` in your web browser.\
    \ Refresh the page to see the Django welcome page again.\n\nSince we're working\
    \ within Docker now as opposed to locally we must preface traditional commands\
    \ with `docker-compose exec [service]` where we specify the name of the service.\
    \ For example, to create a superuser account instead of typing `python manage.py\
    \ createsuperuser` the updated command would now look like the line below, using\
    \ the web service.\n\n## Shell\n\n```\n$ docker-compose exec web python manage.py\
    \ createsuperuser\n```\n\n**Note**: If you are on a newer M1-based macOS computer\
    \ it's possible this command will yield the following cryptic error: `django.db.utils.OperationalError:\
    \ SCRAM authentication requires libpq version 10 or above`. Currently there is\
    \ a bug upstream in `libpg` that's building against the wrong library version\
    \ on ARM. The fix is to update the first line of your `Dockerfile` to specify\
    \ the proper local platform by adding `--platform=linux/amd64` to the initial\
    \ `FROM` command that installs Python.\n\n## Dockerfile\n\n```\n# Pull base image\n\
    FROM --platform=linux/amd64 python:3.10.4-slim-bullseye\n...\n```\n\nFor the username\
    \ choose `sqliteadmin`, `sqliteadmin@email.com` as the email address, and select\
    \ the password of your choice. I often use `testpass123`.\n\nThen navigate directly\
    \ into the admin at `http://127.0.0.1:8000/admin` and log in. You will be redirected\
    \ to the admin homepage. Note in the upper right corner `sqliteadmin` is the username.\n\
    \n![](img/d9b58f5e350349fe0759c8474cded65a_50_0.png)\n\nDjango sqliteadmin\n\n\
    Django has impressive support for multiple languages so if you'd like to see the\
    \ Admin, forms, and other default messages in language other than English, try\
    \ adjusting the `LANGUAGE_CODE` configuration in `django_project/settings.py`\
    \ which is automatically set to American English, `en-us`.\n\nMoving along, if\
    \ you click on the `Users` button it takes us to the Users page where we can confirm\
    \ only one user has been created.\n\n![](img/d9b58f5e350349fe0759c8474cded65a_51_0.png)\n\
    \nAdmin Users page\n\nIt's important to highlight another aspect of Docker at\
    \ this point: so far we've been updating our database-currently represented by\
    \ the `db.sqlite3` file-within Docker. That means the actual `db.sqlite3` file\
    \ is changing each time. And thanks to the `volumes` mount in our `docker-compose.yml`\
    \ config each file change has been copied over into a `db.sqlite3` file on our\
    \ local computer too. You could quit Docker, start the shell, start the server\
    \ with `python manage.py runserver`, and see the exact same admin login at this\
    \ point because the underlying SQLite database is the same.\n\n## PostgreSQL\n\
    \nPostgreSQL is a database that can be used by almost any programming language.\
    \ But if you think about it, how does a programming language-and they all vary\
    \ in some way or another-connect to the database itself?\n\nThe answer is via\
    \ a database adapter! And that's what [Psycopg](http://initd.org/psycopg/) is,\
    \ the most popular database adapter for Python. If you'd like to learn more about\
    \ how Psycopg works here is a link to a [fuller description](http://initd.org/psycopg/docs/index.html)\
    \ on the official site.\n\nPsycopg 3.0 was recently released but many packages\
    \ and hosting providers are still focused on Psycopg2 so that's what we'll use.\
    \ Note that there are actually two versions of Psycopg2 available: `psycopg2`\
    \ and `psycopg2-binary`. We will use the binary version in this book because it\
    \ is simpler to use and works just fine for most websites. Using the non-binary\
    \ version requires multiple additional steps of configuration and is only relevant\
    \ to truly massive websites. If way down the line you find slowness with your\
    \ database, investigating `psycopg2` vs `psycopg2-binary` is a worthy use of time.\
    \ But starting out it is not.\n\nTo install it first stop running the Docker container\
    \ with `docker-compose down`.\n\n## Shell\n\n```\n$ docker-compose down\n```\n\
    \nIt's important to pause right now and think about what it means to install a\
    \ package into Docker as opposed to a local virtual environment. In a traditional\
    \ project we'd run the command `python -m pip install psycopg2-binary==2.9.3`\
    \ from the command line to install Psycopg2. But we're working with Docker now.\n\
    \nThere are two options. The first is to install `psycopg2-binary` locally and\
    \ then `pip freeze` our virtual environment to update `requirements.txt`. If we\
    \ were going to use the local environment this might make sense. But since we\
    \ are committed to Docker we can skip that step and instead just update `requirements.txt`\
    \ with the `psycopg2-binary` package. We don't need to update the actual virtual\
    \ environment further because it is unlikely we'll be using it. And if we ever\
    \ did we can just update it based on `requirements.txt` anyway.\n\nIn your text\
    \ editor open the existing `requirements.txt` file and add `psycopg2-binary==2.9.3`\
    \ to the bottom.\n\n## requirements.txt\n\n```\nasgiref==3.5.2\nDjango==4.0.4\n\
    sqlparse==0.4.2\npsycopg2-binary==2.9.3\n```\n\nAt the end of our PostgreSQL configuration\
    \ changes we will build the new image and spin up our containers. But not yet.\n\
    \n## docker-compose.yml\n\nIn the existing `docker-compose.yml` file add a new\
    \ service called `db`. This means there will be two separate containers running\
    \ within our Docker host: `web` for the Django local server and `db` for our PostgreSQL\
    \ database.\n\nThe `web` service depends on the `db` service to run so we'll add\
    \ a line called `depends_on` to `web` signifying this.\n\nWithin the `db` service\
    \ we specify which version of PostgreSQL to use. As of this writing, Heroku supports\
    \ version 13 as the latest release so that is what we will use. Docker containers\
    \ are ephemeral meaning when the container stops running all information is lost.\
    \ This would obviously be a problem for our database! The solution is to create\
    \ a `volumes` mount called `postgres_data` and then bind it to a dedicated directory\
    \ within the container at the location `/var/lib/postgresql/data/`. The final\
    \ step is to add a [trust authentication](https://www.postgresql.org/docs/current/auth-trust.html)\
    \ to the `environment` for the `db`. For large databases with many database users\
    \ it is recommended to be more explicit with permissions, but this setting is\
    \ a good choice when there is just one developer.\n\nHere is what the updated\
    \ file looks like:\n\n## docker-compose.yml\n\n```\nversion: \"3.9\"\n\nservices:\n\
    \  web:\n    build: .\n    command: python /code/manage.py runserver 0.0.0.0:8000\n\
    \    volumes:\n      - .:/code\n    ports:\n      - 8000:8000\n    depends_on:\n\
