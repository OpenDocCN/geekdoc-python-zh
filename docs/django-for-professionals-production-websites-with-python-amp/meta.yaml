    (.venv) $ python3 -m pip install django~=4.0.0\n```\n\n接下来，我们可以创建一个名为 `django_project`\
    \ 的新项目，迁移数据库以初始化它，并使用 `runserver` 启动本地服务器。\n\n**Shell**\n\n```\n(.venv) $ django-admin\
    \ startproject django_project .\n(.venv) $ python manage.py migrate\n(.venv) $\
    \ python manage.py runserver\n```\n\n通常我不建议在新项目上运行 `migrate`，直到*配置好*自定义用户模型之后。否则\
    \ Django 会将数据库绑定到内置的 `User` 模型，这在项目后期很难修改。我们将在第 3 章中详细介绍这一点，但由于本章主要用于演示目的，这里使用默认的\
    \ `User` 模型是一次性的例外。\n\n通过在 Web 浏览器中导航到 `http://127.0.0.1:8000/` 来确认一切正常。你可能需要刷新页面，但应该会看到熟悉的\
    \ Django 欢迎页面。\n\n在切换到 Docker 之前的最后一步，是使用我们在上一章中学到的命令创建 `requirements.txt` 文件。\n\
    \n**Shell**\n\n```\n(.venv) $ pip freeze > requirements.txt\n```\n\n这将生成一个新的 `requirements.txt`\
    \ 文件，包含我们当前虚拟环境的固定内容。\n\n### Docker\n\n要切换到 Docker，首先 `deactivate` 我们的虚拟环境，然后在文本编辑器中创建新的\
    \ `Dockerfile` 和 `docker-compose.yml` 文件，它们将分别控制我们的 Docker 镜像和容器。\n\n**Shell**\n\
    \n```\n(.venv) $ deactivate\n$\n```\n\nDockerfile 与第 1 章中的相同。\n\n**Dockerfile**\n\
    \n```\n# Pull base image\nFROM python:3.10.4-slim-bullseye\n\n# Set environment\
    \ variables\nENV PIP_DISABLE_PIP_VERSION_CHECK 1\nENV PYTHONDONTWRITEBYTECODE\
    \ 1\nENV PYTHONUNBUFFERED 1\n\n# Set work directory\nWORKDIR /code\n\n# Install\
    \ dependencies\nCOPY ./requirements.txt .\nRUN pip install -r requirements.txt\n\
    \n# Copy project\nCOPY . .\n```\n\n在构建镜像之前，确保创建一个 `.dockerignore` 文件。\n\n**.dockerignore**\n\
    \n```\n.venv\n.git\n.gitignore\n```\n\n注意，如果你使用 `docker build .` 命令构建初始镜像，它比上一章快得多，快得多。\n\
    \n**Shell**\n\n```\n$ docker build .\n...\n---> Using cache\n```\n\n这是因为每当你构建一个新的\
    \ `Dockerfile` 时，Docker 会自动检查是否可以使用之前构建的缓存结果。由于这个 `Dockerfile` 与第 1 章中的相同，除了最后的\
    \ `COPY` 命令将本地文件与容器文件系统上的文件同步之外，其他一切都相同。\n\n这种缓存意味着 `Dockerfile` 的顺序对性能很重要。为了避免不断使缓存失效，我们将不太可能发生变化的命令放在\
    \ `Dockerfile` 的开头，而将更可能发生变化的命令，比如 `COPY` 本地文件系统，放在末尾。\n\n现在是 `docker-compose.yml`\
    \ 文件的时间，它也与我们在第 1 章中看到的相匹配。\n\n**docker-compose.yml**\n\n```\nversion: \"3.9\"\
    \n\nservices:\n  web:\n    build: .\n    command: python /code/manage.py runserver\
    \ 0.0.0.0:8000\n    volumes:\n      - .:/code\n    ports:\n      - 8000:8000\n\
    ```\n\n### 分离模式\n\n我们现在将启动容器，但这次使用分离模式，这需要 `-d` 或 `--detach` 标志（它们的作用相同）。"
