    \ we'll include the bare minimum needed and add `block` tags for both `title`\
    \ and `content`. Block tags give higher-level templates the option to override\
    \ just the content within the tags. For example, the homepage will have a title\
    \ of \"Home\" but we want that to appear between html `<title></title>` tags.\
    \ Using block tags make it easier to update this content, as needed, in inherited\
    \ templates.\n\nWhy use the name `content` for the main content of our project?\
    \ This name could be anything—`main` or some other generic indicator—but using\
    \ `content` is a common naming convention in the Django world. Can you use something\
    \ else? Absolutely. Is `content` the most common one you'll see? Yes."
