    \ Django 文档[\"强烈推荐\"](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#using-a-custom-user-model-when-starting-a-project)这样做。为什么？因为在项目生命周期中的某个时刻，你*一定*需要对内置的\
