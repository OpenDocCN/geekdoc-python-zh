    \ of overhead can be quite slow and caching is one of the first solutions in a\
    \ web developer's tool bag. Implementing caching on our current project is definitely\
    \ overkill, but we will nonetheless review the options and implement a basic version.\n\
    \nDjango has its own [cache framework](https://docs.djangoproject.com/en/4.0/topics/cache/)\
    \ which includes four different caching options in descending order of granularity:\n\
    \n+   1) The [per-site cache](https://docs.djangoproject.com/en/4.0/topics/cache/#the-per-site-cache)\
    \ is the simplest to set up and caches your entire site.\n\n²³²https://docs.djangoproject.com/en/4.0/topics/cache/\n\
