    # SECURE_PROXY_SSL_HEADER


    Some sleuthing uncovers that the issue is related to our [SECURE_SSL_REDIRECT](https://docs.djangoproject.com/en/4.0/ref/settings/#secure-ssl-redirect)
    setting. Heroku uses proxies and so we must find the proper header and update
    [SECURE_PROXY_SSL_HEADER](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-SECURE_PROXY_SSL_HEADER)
    accordingly.


    By default it is set to None, but since we do trust Heroku we can update it to
    `(''HTTP_X_FORWARDED_PROTO'', ''https'')`. This setting won''t harm us for local
    development so we''ll add it directly into the `django_project/settings.py` file
    as follows:


    # Code


    ```

    # django_project/settings.py

    SECURE_PROXY_SSL_HEADER = ("HTTP_X_FORWARDED_PROTO", "https")  # new

    ```


    Commit these change to Git and push the updated code to Heroku.


    # Shell


    ```

    $ git status

    $ git commit -m ''secure_proxy_ssl_header and allowed_hosts update''

    $ git push heroku main

    ```


