    Detached mode runs [containers in the background](https://docs.docker.com/compose/reference/up/)²⁹,
    which means we can use a single command line tab without needing a separate one
    open as well. This saves us from switching back and forth between two command
    line tabs constantly. The downside is that if/when there is an error, the output
    won''t always be visible. So if your screen does not match this book at some point,
    try typing `docker-compose logs` to see the current output and debug any issues.


    You likely will see a "Warning: Image for service web was built because it did
    not already exist" message at the bottom of the command. Docker automatically
    created a new image for us within the container. As we''ll see later in the book,
    adding the `--build` flag to force an image build is necessary when software packages
    are updated because, by default, Docker will look for a local cached copy of software
    and use that which improves performance.


    To confirm things are working properly go back to `http://127.0.0.1:8000/` in
    your web browser. Refresh the page to see the Django welcome page again.


    Since we''re working within Docker now as opposed to locally we must preface traditional
    commands with `docker-compose exec [service]` where we specify the name of the
    service. For example, to create a superuser account instead of typing `python
    manage.py createsuperuser` the updated command would now look like the line below,
    using the web service.


    # Shell


    ```

    $ docker-compose exec web python manage.py createsuperuser

    ```


    **Note**: If you are on a newer M1-based macOS computer it''s possible this command
    will yield the following cryptic error: `django.db.utils.OperationalError: SCRAM
    authentication requires libpq version 10 or above`. Currently there is a bug upstream
    in `libpg` that''s building against the wrong library version on ARM. The fix
    is to update the first line of your `Dockerfile` to specify the proper local platform
    by adding `--platform=linux/amd64` to the initial `FROM` command that installs
    Python.'
