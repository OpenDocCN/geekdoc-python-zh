    # # Chapter 9: Environment Variables


    [Environment variables](https://en.wikipedia.org/wiki/Environment_variable) are
    variables that can be loaded into the operating environment of a project at run
    time as opposed to hard coded into the codebase itself. They are considered an
    integral part of the popular [Twelve-Factor App Design](https://12factor.net/)
    methodology and a Django best practice because they allow a greater level of security
    and simpler local/production configurations.


    Why greater security? Because we can store truly secret information–database credentials,
    API keys, and so on–separate from the actual code base. This is a good idea because
    using a version control system, like `git`, means that it only takes one bad commit
    for credentials to be added in there forever. Which means that *anyone* with access
    to the codebase has full control over the project. This is very, very dangerous.
    It''s much better to limit who has access to the application and environment variables
    provide an elegant way to do so.


    A secondary advantage is that environment variables make it much easier to switch
    between local and production code environments. As we will see, there are a number
    of setting configurations that Django uses by default intended to make local development
    easier, but which must be changed once the same project is ready for production.


    # ## Environs


    There are many different ways to work with environment variables in Python but
    for this project we''ll use the [environs](https://github.com/sloria/environs)
    package, which has a Django-specific option that installs a number of additional
    packages that help with configuration.


    We will install it by first updating the `requirements.txt` file.'
  - '[PAGE 152]


    ```


    requirements.txt

    asgiref==3.5.2

