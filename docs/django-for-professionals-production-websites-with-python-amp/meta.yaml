    # # Chapter 12: Reviews App


    In this chapter we''ll add a reviews app so that readers can leave reviews of
    their favorite books. It gives us a chance to discuss foreign keys, app structure,
    and dive into forms.


    # ## Foreign Keys


    We''ve already used a foreign key with our user model, but didn''t have to think
    about it. Now we do! Fundamentally a database table can be thought of as similar
    to a spreadsheet with rows and columns. There needs to be a primary key field
    that is unique and refers to each record. In the last chapter we changed that
    from `id` to a `UUID`, but one still exists!


    This matters when we want to link two tables together. For example, our `Books`
    model will link to a `Reviews` model since each review has to be connected to
    a relevant book. This implies a foreign key relationship.


    There are three possible types of foreign key relationships:


    +   - [One-to-one](https://docs.djangoproject.com/en/4.0/ref/models/fields/#onetoonefield)¹⁵⁸

    - [One-to-many](https://docs.djangoproject.com/en/4.0/ref/models/fields/#foreignkey)¹⁵⁹

    - [Many-to-many](https://docs.djangoproject.com/en/4.0/ref/models/fields/#manytomanyfield)¹⁶⁰


    A `one-to-one` relationship is the simplest kind. An example would be a table
    of people''s names and a table of social security numbers. Each person has only
    **one** social security number and each social security number is linked to only
    **one** person.


    In practice `one-to-one` relationships are rare. It''s unusual for both sides
    of a relationship to only be matched to one counterpart. Some other examples though
    would be country-flag or person-passport.'
