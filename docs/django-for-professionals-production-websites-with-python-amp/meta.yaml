  md: '# ## Django updates


    Keeping your project up-to-date with the latest version of Django is another important
    way to stay secure. And I don''t just mean being current with the [latest feature
    release](https://www.djangoproject.com/download/) (3.2, 4.0, 4.1, etc) which comes
    out roughly every 8 months. There are also monthly security patch updates that
    take the form of 4.0.1, 4.0.2, 4.0.3, etc.


    What about **long-term support (LTS) releases**? Certain feature releases are
    designated as LTS and receive security and data loss fixes for a guaranteed period
    of time, usually around 3 years. For example, Django 3.2 LTS came out in April
    2021 and will have extended support until April 2024. Django 4.2, the next LTS
    release, comes out in April 2023 and will have extended support until April 2026.


    Can you stay on only LTS versions and not upgrade in the interim? Yes. Should
    you? No. It is better and far more secure to stay up-to-date with the latest version
    of Django if possible.


    Resist the temptation and reality of many real-world projects which is not to
    devote a portion of developer time to staying current with Django versions. A
    website is like a car: it needs regular maintenance to run at its best. You are
    only compounding the problem if you put off updates.


    How to update? Django features [deprecation warnings](https://docs.djangoproject.com/en/4.0/howto/upgrade-version/)
    that can and should be run for each new release by typing `python -Wa manage.py
    test`. It is far better to update from 3.0 to 3.1 to 3.2 and run the deprecation
    warnings each time rather than skipping multiple versions.


