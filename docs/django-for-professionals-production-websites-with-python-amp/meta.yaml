    # ## HTTP Strict Transport Security (HSTS)


    [HTTP Strict Transport Security (HSTS)](https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security)[^286]
    is a security policy that lets our server enforce that web browsers should only
    interact via HTTPS by adding a [Strict-Transport-Security header](https://docs.djangoproject.com/en/4.0/ref/middleware/#http-strict-transport-security)[^287].


    There are three implicit HSTS configurations in our `settings.py` file that need
    to be updated for production:


    +   - [SECURE_HSTS_SECONDS](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-SECURE_HSTS_SECONDS)[^288]
    = `0`

    - [SECURE_HSTS_INCLUDE_SUBDOMAINS](https://docs.djangoproject.com/en/4.0/ref/settings/#secure-hsts-include-subdomains)[^289]
    = `False`

    - [SECURE_HSTS_PRELOAD](https://docs.djangoproject.com/en/4.0/ref/settings/#secure-hsts-preload)[^290]
    = `False`


    The `SECURE_HSTS_SECONDS` setting is set to `0` by default but the greater the
    better for security purposes. We will set it to the recommended 30 days, or 2,592,000
    seconds, in our project.


    `SECURE_HSTS_INCLUDE_SUBDOMAINS` forces subdomains to use SSL. We will set it
    to `True` in production.


    `SECURE_HSTS_PRELOAD` only has an effect when there is a non-zero value for `SECURE_HSTS_SECONDS`,
    but since we just set one, we''ll need to set this to `True`.


    Add these three lines to the bottom of the `django_project/settings.py` file.'
