  md: 'It seems there is some sort of SSL Protocol Error, which makes sense because
    we just updated an SSL setting. Where could we find more info though? How about
    trying the logs:


    # Shell


    ```

    $ docker-compose logs

    ...

    You''re accessing the development server over HTTPS, but it only supports HTTP.

    ```


    Ah, that''s more descriptive. Since we switched the default over to `True` our
    website is automatically enforcing SLL. But the problem is that the local Django
    server only works over HTTP. We can run the deployment checklist to gain confidence
    in our production settings in `docker-compose-prod.yml` but in terms of actually
    using using the production site locally, we won''t be able to enforce SSL.


    That''s ok though. It''s one of many reasons why we have separate local and production
    configurations. Companies typically actually have **three** different environments
    set up: one for local, one for production, and a staging server that mimics production
    but allows for more actual testing before switching things over completely. The
    staging server is often deployed but with a hidden URL and additional permissions
    so only team developers can try it out.


    Going forward if you want to try out the local website with production settings
    be aware you will have to toggle off `DJANGO_SECURE_SSL_REDIRECT`.


    One more common gotcha is that even if you restart the Docker containers and start
    the local configuration, your web browser might still complain of an SSL error.


    # Shell


    ```

    $ docker-compose down

    $ docker-compose up -d

    ```


    This is because most web browsers once they find out an HTTPS version of a site
    exists–even if it''s a localhost like `http://127.0.0.1:8000/`–will cache that
    and continually revert to it. You can look up different ways to clear the cache
    but the most effective in this case is to restart your web browser. As ever, when
    something isn''t working try turning it off and restarting.'
