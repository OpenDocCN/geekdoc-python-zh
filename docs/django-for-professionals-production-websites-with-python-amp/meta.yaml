  - '[PAGE 252]


    # ## select_related and prefetch_related


    Reducing SQL queries is one of the first steps when optimizing a Django project.
    There are two powerful methods included in the Django ORM to help us that can
    boost performance by creating a single more complex QuerySet rather than multiple,
    smaller queries:


    +   - [select_related](https://docs.djangoproject.com/en/4.0/ref/models/querysets/#select-related)
    for Foreign Key relationships

    - [prefetch_related()](https://docs.djangoproject.com/en/4.0/ref/models/querysets/#prefetch-related)
    for [Many to Many](https://docs.djangoproject.com/en/4.0/topics/db/examples/many_to_many/)
    relationships


    `select_related` returns a QuerySet that "follows" foreign-key relationships–either
    One-to-One or One-to-Many–selecting additional related-object data as needed.
    Under the hood the Django ORM creates a SQL join and includes the fields of a
    related object in the `SELECT` statement, which results in all related objects
    being included in a single more complex database query.


    `prefetch_related` performs a separate lookup for each relationship and "joins"
    them together with Python, not SQL. This allows it to prefetch many-to-many and
    many-to-one objects, which cannot be done using [select_related](https://docs.djangoproject.com/en/4.0/ref/models/querysets/#select-related).


    At first glance it might seem the issue here is a Foreign Key one and calls for
    `select_related`. But in fact it is a Many-to-Many issue of authors to reviews
    since for one article there can be many reviews by many authors.


    Studying your QuerySets deeply is vital for intermediate-to-advanced Django developers.
    There are many [built-in methods available](https://docs.djangoproject.com/en/4.0/ref/models/querysets/)
    and understanding how QuerySets are built, the fact [they are unique](https://docs.djangoproject.com/en/4.0/topics/db/queries/#filtered-querysets-are-unique-1)
    and [also lazy](https://docs.djangoproject.com/en/4.0/topics/db/queries/#querysets-are-lazy-1),
    can yield insight into speeding up performance.


    We can access the [Python shell](https://docs.djangoproject.com/en/4.0/ref/django-admin/#shell)
    directly from the command line to play around with our current QuerySets. After
    starting the shell the first step is to import the Book model from our books app.
    Then we can select all of it to see our three books.'
