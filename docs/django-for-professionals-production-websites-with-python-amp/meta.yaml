    django-crispy-forms==1.14.0

    crispy-bootstrap5==0.6

    django-allauth==0.50.0

    environs[django]==9.5.0

    ```


    Then spin down the currently running Docker container, rebuild our Docker image
    which will contain the new software package, and start up the container again.


    ```


    Shell

    $ docker-compose down

    $ docker-compose up -d --build

    ```


    In the `django_project/settings.py` file, there are three lines of imports to
    add at the top of the file, just under the import of `Path`.


    ```

    python

    # django_project/settings.py

    from pathlib import Path

    from environs import Env  # new


    env = Env()  # new

    env.read_env()  # new

    ```


    All set.


    # ## SECRET_KEY


    For our first environment variable we''ll set the [SECRET_KEY](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-SECRET_KEY)^124,
    a randomly generated string used for [cryptographic signing](https://docs.djangoproject.com/en/4.0/topics/signing/)^125
    and created whenever the `startproject` command is run. It is very important that
    `SECRET_KEY` actually be kept, well, secret.'
