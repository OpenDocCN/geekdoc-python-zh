    ```\n$ mkdir templates/account\n$ mv templates/registration/login.html templates/account/login.html\n\
    $ mv templates/registration/signup.html templates/account/signup.html\n```\n\n\
    > It's easy to add an s onto account here by accident, but don't or you'll get\
    \ an error. The correct directory is `templates/account/`.\n\nWe can delete the\
    \ `templates/registration` directory at this point since it is no longer needed."
  - "[PAGE 136]\n\n# Shell\n\n```\n$ rm -r templates/registration\n```\n\nrm means\
    \ remove and -r means do it recursively, which is necessary whenever you are dealing\
    \ with a directory. If you'd like further information on this command you can\
    \ type man rm to read the manual.\n\nNote that if you ever see a command that\
    \ includes rm -rf–and especially sudo rm -rf–use incredible caution! It is possible\
    \ to wipe your entire computer with this command. Don't ever execute it unless\
    \ you are 100% sure the result is intended.\n\nThe last step is to update the\
