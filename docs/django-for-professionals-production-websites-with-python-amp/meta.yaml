    \nOn Mac, the official installer on the Python website is the best approach. In\
    \ a new browser window go the [Python downloads page](https://www.python.org/downloads/)⁸\
    \ and click on the button underneath the text \"Download the latest version for\
    \ Mac OS X.\" As of this writing, that is Python 3.10. The package will be in\
    \ your `Downloads` directory. Double click on it which launches the Python Installer\
    \ and follow through the prompts.\n\nTo confirm the download was successful, open\
    \ up a new Terminal window and type `python3 --version`.\n\n## Shell\n\n```\n\
    $ python3 --version\nPython 3.10.4\n```\n\nThe result should be at least 3.10.\
    \ Then type `python3` to open the Python interpreter.\n\n## Shell\n\n```\n$ python3\n\
    Python 3.10.4 (v3.10.4:9d38120e33, Mar 23 2022, 17:29:05)\n  [Clang 13.0.0 (clang-1300.0.29.30)]\
    \ on darwin\nType \"help\", \"copyright\", \"credits\" or \"license\" for more\
    \ information.\n>>>\n```\n\n## Text Editor\n\nThe command line is where we execute\
    \ commands for our programs but a text editor is where actual code is written.\
    \ The computer doesn't care what text editor you use–the end result is just code–but\
    \ a good text editor can provide helpful hints and catch typos for you.\n\nThere\
    \ are many modern text editors available but a very popular one is [Visual Studio\
    \ Code](https://code.visualstudio.com/), which is free, easy to install, and enjoys\
    \ widespread popularity. If you're not already using a text editor, download and\
    \ install VSCode from the official website.\n\nAn optional–but highly recommended–additional\
    \ step is to take advantage of the large ecosystem of extensions available on\
    \ VSCode. On Windows, navigate to `File -> Preferences -> Extensions` or on macOS\
    \ `Code -> Preferences -> Extensions`. This launches a search bar for the extensions\
    \ marketplace. Enter \"python\" which will bring up the Microsoft extension as\
    \ the first result. Install it.\n\nA second extension to add is [Black](https://pypi.org/project/black/),\
    \ which is a Python code formatter that has quickly become the default within\
    \ the Python community. To install Black, open a Terminal window within VSCode\
    \ by going to `Terminal -> New Terminal` at the top of the page. In the new terminal\
    \ window opened at the bottom of the page, type `python -m pip install black`.\
    \ Next, open up the VSCode settings by navigating to `File -> Preferences -> Settings`\
    \ on Windows or `Code -> Preferences -> Settings` on macOS. Search for \"python\
    \ formatting provider\" and select `black` from the dropdown options. Then search\
    \ for \"format on save\" and enable \"Editor: Format on Save\". Black will now\
    \ automatically format your code whenever a `*.py` file is saved.\n\nTo confirm\
    \ this is working, use your text editor to create a new file called `hello.py`\
    \ within the `ch1-setup` directory located on your Desktop and type in the following\
    \ using single quotes:\n\n**hello.py**\n\n```python\nprint('Hello, World!')\n\
    ```\n\nOn save, it should be automatically updated to using double quotes which\
    \ is [Black's default preference](https://black.readthedocs.io/en/stable/the_black_code_style/current_style.html#strings):\
    \ `print(\"Hello, World!\")`. That means everything is working properly.\n\n##\
    \ Install Git\n\nThe final step is to install Git, a version control system that\
    \ is indispensable to modern software development. With Git you can collaborate\
    \ with other developers, track all your work via commits, and revert to any previous\
    \ version of your code even if you accidentally delete something important!\n\n\
    On Windows, navigate to the official website at `https://git-scm.com/` and click\
    \ on the \"Download\" link which should install the proper version for your computer.\
    \ Save the file and then open your Downloads folder and double click on the file.\
    \ This will launch the Git for Windows installer. Click the \"Next\" button through\
    \ most of the early defaults as they are fine and can always be updated later\
    \ as needed. There are two exceptions however: under \"Choosing the default editor\
    \ used by Git\" select VS Code not Vim. And in the section on \"Adjusting the\
    \ name of the initial branch in new repositories\" select the option to use \"\
    main\" as opposed to \"master\" as the default branch name. Otherwise the recommended\
    \ defaults are fine and can always be tweaked later if needed.\n\nTo confirm Git\
    \ is installed on Windows, close all current shell windows and then open a new\
    \ one which will load the changes to our PATH variable. Type in `git --version`\
    \ which should show it is installed.\n\n```\n# Windows\n$ git --version\ngit version\
    \ 2.35.1.windows.2\n```\n\nOn macOS, installing Git via Xcode is currently the\
    \ easiest option. To check if Git is already installed on your computer, type\
    \ `git --version` in a new terminal window.\n\n```\n# macOS\n$ git --version\n\
    ```\n\nIf you do not have Git installed, a popup message will ask if you want\
    \ to install it as part of \"command line developer tools.\" Select \"Install\"\
    \ which will load Xcode and its command line tools package. Or if you do not see\
    \ the message for some reason, type `xcode-select --install` instead to install\
    \ Xcode directly.\n\nBe aware that Xcode is a very large package so the initial\
    \ download may take some time. Xcode is primarily designed for building iOS apps\
    \ but also includes many developer features needed on macOS. Once the download\
    \ is complete close all existing terminal shells, open a new window, and type\
    \ in `git --version` to confirm the install worked.\n\n```\n# macOS\n$ git --version\n\
    git version 2.32.0 (Apple Git-132)\n```\n\nOnce Git is installed on your machine\
    \ we need to do a one-time system configuration by declaring the name and email\
    \ address associated with all your Git commits. We will also set the default branch\
    \ name to `main`. Within the command line shell type the following two lines.\
    \ Make sure to update them with your name and email address.\n\n## Shell\n\n```\n\
    $ git config --global user.name \"Your Name\"\n$ git config --global user.email\
    \ \"yourname@email.com\"\n$ git config --global init.defaultBranch main\n```\n\
    \nYou can always change these configs later if you desire by retyping the same\
    \ commands with a new name or email address.\n\n## Conclusion\n\nDjango is an\
    \ excellent choice for any developer who wants to build modern, robust web applications\
    \ with a minimal amount of code. While configuring a software development environment\
    \ is no easy task you should now have Python 3.10 installed, Git installed, and\
    \ configured a modern text editor.\n\nIn the next chapter we'll learn about Docker\
    \ and how to configure any computer for Django development with Docker.\n\n# Chapter\
    \ 2: Docker Hello, World!\n\nProperly configuring a local development environment\
    \ remains a steep challenge despite all the other advances in modern programming.\
    \ There are simply too many variables: different computers, operating systems,\
    \ versions of Django, virtual environment options, and so on. When you add in\
    \ the challenge of working in a team environment where everyone needs to have\
    \ the same set up the problem only magnifies itself.\n\nIn recent years a solution\
    \ has emerged: [Docker](https://www.docker.com/)¹². It has quickly become the\
    \ default choice for many developers working on production-level projects.\n\n\
    With Docker it's finally possible to faithfully and dependably reproduce a production\
    \ environment locally, everything from the proper Python version to installing\
    \ Django and running additional services like a production-level database. This\
    \ means it no longer matters if you are on a Mac, Windows, or Linux computer.\
    \ Everything is running within Docker itself.\n\nDocker also makes collaboration\
    \ in teams exponentially easier. Gone are the days of sharing long, out-of-date\
    \ `README` files for adding a new developer to a group project. Instead with Docker\
    \ you simply share two files–a `dockerfile` and `docker-compose.yml` file–and\
    \ the developer can have confidence that their local development environment is\
    \ exactly the same as the rest of the team.\n\nDocker is not a perfect technology.\
    \ It is still relatively new, complex under-the-hood, and under active development.\
    \ But the promise that it aspires to–a consistent and shareable developer environment,\
    \ that can be run either locally on any computer or deployed to any server–makes\
    \ it a solid choice. It is also widely used among companies at this point so writing\
    \ a book for \"Professionals\" and not covering Docker feels shortsighted.\n\n\
    In this chapter we'll learn a little bit more about Docker itself and \"Dockerize\"\
    \ our first Django project.\n\n¹²https://www.docker.com/"
