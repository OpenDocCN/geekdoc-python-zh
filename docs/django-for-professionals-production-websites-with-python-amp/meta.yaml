    # ## django-storages


    There are several steps that a truly production website could take but are beyond
    the current scope of this book. The most important is storing all media files
    on a dedicated CDN (Content Delivery Network) rather than on our own server. Unlike
    static files, which the developer controls and can trust, media files are user-generated
    and should always be treated with caution. The popular third-party package [django-storages](https://github.com/jschneier/django-storages)
    allows for storing Django media files on a service like Amazon''s S3.


    Furthermore the hosting service we will be using later on, Heroku, has an [ephemeral
    file system](https://devcenter.heroku.com/articles/dynos#ephemeral-filesystem).
    Each internal dyno boots with a clean copy of the file system from the most recent
    deploy. Static files are located on the file system; media files are not. As a
    result, in production media files will not remain with Heroku. Using `django-storages`
    is therefore basically mandatory alongside Heroku and will be mentioned again
    in the deployment chapter.


    ¹⁷⁸ https://github.com/jschneier/django-storages


    ¹⁷⁹ https://devcenter.heroku.com/articles/dynos#ephemeral-filesystem'
