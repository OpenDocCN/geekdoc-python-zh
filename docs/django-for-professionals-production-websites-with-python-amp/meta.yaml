    $ git commit -m 'ch2-hello'\n```\n\n你可以将本章的代码与 Github 上的[官方仓库](https://github.com/wsvincent/djangoforprofessionals/tree/main/ch2-hello)进行对比。\n\
    \n### 结论\n\nDocker 是一个自包含的环境，包含我们在本地开发中所需的一切：Web 服务、数据库，以及更多我们想要的内容。将其与 Django\
    \ 一起使用时，一般模式总是相同的：\n\n- 创建一个新的虚拟环境并安装 Django\n- 在其中创建一个新的 Django 项目\n- 编写一个 `Dockerfile`\
    \ 并构建初始镜像\n- 编写一个 `docker-compose.yml` 文件，并使用 `docker-compose up` 运行容器\n\n我们将使用\
    \ Docker 构建更多 Django 项目，因此这个流程会更有意义，但这实际上就是全部内容了。在下一章中，我们将使用 Docker 创建一个新的 Django\
    \ 项目，并在单独的容器中添加 PostgreSQL 作为我们的数据库。\n\n## 第 3 章：PostgreSQL\n\n在 Django 中开发\"\
    玩具应用\"和生产就绪应用之间最显著的差异之一就是数据库。Django 默认使用 SQLite 进行本地开发，因为它体积小、速度快，而且是基于文件的，易于使用。无需额外的安装或配置。\n\
    \n然而，这种便利性是有代价的。一般来说，SQLite 不是专业网站的理想数据库选择。因此，虽然在原型设计阶段本地使用 SQLite 是可以的，但在生产项目中实际使用\
    \ SQLite 作为数据库的情况很少见。\n\nDjango 内置支持[五种数据库](https://docs.djangoproject.com/en/4.0/ref/databases/#databases)[^27]：PostgreSQL、MariaDB、MySQL、Oracle\
    \ 和 SQLite。我们将在本书中使用 [PostgreSQL](https://www.postgresql.org/)[^28]，因为它是 Django\
    \ 开发者最受欢迎的选择，然而，Django ORM（对象关系映射器）的美妙之处在于，即使我们想使用 MySQL、MariaDB 或 Oracle，我们实际编写的\
    \ Django 代码也几乎完全相同。Django ORM 会自动为我们处理从 Python 代码到为每个数据库配置的 SQL 的转换，如果你仔细想想，这相当令人惊叹。\n\
    \n使用非文件型数据库的挑战在于，如果你想在自己的计算机上忠实地模拟生产环境，就必须在本地安装和运行它们。而我们确实想要这样做！虽然 Django 为我们处理了数据库切换的细节，但如果你在本地开发使用\
    \ SQLite，而在生产环境中使用不同的数据库，不可避免地会出现一些难以发现的小 bug。因此，最佳实践是在本地和生产环境中使用相同的数据库。\n\n在本章中，我们将从一个使用\
    \ SQLite 数据库的新 Django 项目开始，然后切换到 Docker 和 PostgreSQL。\n\n[^27]: https://docs.djangoproject.com/en/4.0/ref/databases/#databases\n\
    [^28]: https://www.postgresql.org/\n\n### Django 设置\n\n在命令行中，确保你已经导航回桌面上的 code\
    \ 文件夹。你可以通过两种方式做到这一点。要么输入 `cd ..` 向上移动一级，所以如果你当前在 `Desktop/code/hello`，你将移动到 `Desktop/code`。或者你可以直接在\
    \ Windows 上输入 `cd onedrive\\desktop`，或在 macOS 上输入 `cd ~/desktop/code`，这将直接带你到\
    \ code 目录。然后创建一个名为 `ch3-postgresql` 的新目录，用于本章的代码。\n\n**Shell**\n\n```\n# Windows\n\
    $ cd onedrive\\desktop\n$ mkdir ch3-postgresql\n\n# macOS\n$ cd ~/desktop/code\n\
    $ mkdir ch3-postgresql\n```\n\n我们将遵循创建新 Django 项目的标准步骤：创建一个专用的虚拟环境，激活它，并安装 Django。\n\
    \n**Shell**\n\n```\n# Windows\n$ python -m venv .venv\n$ Set-ExecutionPolicy -ExecutionPolicy\
    \ RemoteSigned -Scope CurrentUser\n$ .venv\\Scripts\\Activate.ps1\n(.venv) $ python\
