  md: '# # Chapter 3: PostgreSQL


    One of the most immediate differences between working on a "toy app" in Django
    and a production-ready one is the database. Django ships with SQLite as the default
    choice for local development because it is small, fast, and file-based which makes
    it easy to use. No additional installation or configuration is required.


    However this convenience comes at a cost. Generally speaking SQLite is not a good
    database choice for professional websites. So while it is fine to use SQLite locally
    while prototyping an idea, it is rare to actually use SQLite as the database on
    a production project.


    Django ships with built-in support for [five databases](https://docs.djangoproject.com/en/4.0/ref/databases/#databases)27:
    PostgreSQL, MariaDB, MySQL, Oracle, and SQLite. We''ll be using [PostgreSQL](https://www.postgresql.org/)28
    in this book as it is the most popular choice for Django developers, however,
    the beauty of Django''s ORM (Object-Relational-Mapper) is that even if we wanted
    to use MySQL, MariaDB, or Oracle the actual Django code we write will be almost
    identical. The Django ORM handles the translation from Python code to SQL configured
    for each database automatically for us which is quite amazing if you think about
    it.


    The challenge of using non-file based databases is that they must be installed
    and run locally if you want to faithfully mimic a production environment on your
    own computer. And we do want that! While Django handles the details of switching
    between databases for us there are inevitably small, hard-to-catch bugs that can
    crop up if you use SQLite for local development but a different database in production.
    Therefore a best practice is to use the same database locally and in production.


    In this chapter we''ll start a new Django project with a SQLite database and then
    switch over to both Docker and PostgreSQL.


    27https://docs.djangoproject.com/en/4.0/ref/databases/#databases

    28https://www.postgresql.org/'
