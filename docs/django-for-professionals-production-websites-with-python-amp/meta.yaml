    Environment variables serve two purposes in our Django project: they keep items
    like `SECRET_KEY` actually secret and they act as a way to toggle between local
    and production settings. While there is nothing wrong with having two environment
    variables for a setting like `DEBUG`, it is arguably cleaner to use a default
    value when we don''t need to keep something secret.


    For example, let''s rewrite the `DEBUG` configuration to look as follows:'
