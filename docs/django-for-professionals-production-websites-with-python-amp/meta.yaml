  - "[PAGE 116]\n\n# # Bootstrap\n\nWriting custom CSS for your website is a worthy\
    \ goal and something I advise all software developers, even back-end ones, to\
    \ try at some point. But practically speaking there is a reason front-end frameworks\
    \ like [Bootstrap](https://getbootstrap.com/) exist: they save you a ton of time\
    \ when starting a new project. Unless you have a dedicated designer to collaborate\
    \ with, stick with a framework for the early iterations of your website.\n\nBootstrap\
    \ can be installed locally or used via a CDN. The latter is a far simpler approach\
    \ so we will adopt it in this book. Instructions [can be found here](https://getbootstrap.com/docs/5.1/getting-started/download/#cdn-via-jsdelivr)\
    \ to deliver a cached version of Bootstrap's compiled CSS and JS to our project.\n\
    \nNote that the full links for Bootstrap are not included. You should copy and\
    \ paste them in from the Bootstrap website to be accurate. They are referenced\
    \ here as `Bootstrap CSS` and `Bootstrap JavaScript`.\n\n# ## Code\n\n```\nhtml\n\
    <!-- templates/_base.html -->\n{% load static %}\n<!DOCTYPE html>\n<html>\n<head>\n\
    \  <meta charset=\"utf-8\">\n  <title>{% block title %}Bookstore{% endblock %}</title>\n\
