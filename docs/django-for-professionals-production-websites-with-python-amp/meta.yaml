    # ## Sign Up


    Implementing a sign up page for user registration is completely up to us. We''ll
    go through the standard steps for any new page:


    +   - create an app-level `accounts/urls.py` file

    - update the project-level `django_project/urls.py` to point to the accounts app

    - add a view called `SignupPageView`

    - create a `signup.html` template file

    - update `home.html` to display the sign up page


    A common question is: what''s the right order for implementing these steps? Honestly,
    it doesn''t matter since we need *all* of them for the sign up page to work properly.
    I know it would be more comforting if there was a prescribed order but each is
    a puzzle piece that fits together in their entirety. That said, I generally like
    to start with `urls`, then switch to `views`, and finally `templates` but it''s
    a matter of personal preference.


    To start use your text editor to create an `accounts/urls.py` file. Up to this
    point the accounts app has only contained our `CustomUser` in the `models.py`
    file; we haven''t configured any routes or views.


    The URL path for the sign up page will take a view called `SignupPageView` (which
    we''ll create next), at the route `signup/`, and have a name of `signup` which
    we can later use to refer to the page with a `url` template tag. The existing
    url names for `login` and `signup` are written within the built-in Django app
    file `django/contrib/auth/urls.py` we saw above.'
  - "[PAGE 100]\n\n# Code\n\n```\n# accounts/urls.py\nfrom django.urls import path\n\
    \nfrom .views import SignupPageView\n\nurlpatterns = [\n    path(\"signup/\",\
    \ SignupPageView.as_view(), name=\"signup\"),\n]\n```\n\nNext update the django_project/urls.py\
    \ file to include the accounts app. We can create any route we like but it's common\
    \ to use the same accounts/ one used by the default auth app. Note that it's important\
    \ to include the path for accounts.urls **below**: URL paths are loaded top-to-bottom\
    \ so this ensures that any built-in auth app URL paths will be loaded first.\n\
    \n# Code\n\n```\n# django_project/urls.py\nfrom django.contrib import admin\n\
    from django.urls import path, include\n\nurlpatterns = [\n    # Django admin\n\
    \    path(\"admin/\", admin.site.urls),\n    # User management\n    path(\"accounts/\"\
    , include(\"django.contrib.auth.urls\")),\n    # Local apps\n    path(\"accounts/\"\
    , include(\"accounts.urls\")),  # new\n    path(\"\", include(\"pages.urls\")),\n\
    ]\n```\n\nNow create the view `SignupPageView`. It references the `CustomUserCreationForm`\
    \ and has a `success_url` that points to the login page, meaning after the form\
    \ is submitted the user will be redirected there. The `template_name` will be\
    \ `signup.html`."
- md: "## Code\n\n```python\n# accounts/views.py\nfrom django.urls import reverse_lazy\n\
