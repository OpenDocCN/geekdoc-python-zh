    # Windows\n$ cd onedrive\\desktop\n$ pwd\n\nPath\n----\nC:\\Users\\wsv\\onedrive\\\
    desktop\n\n# macOS\n$ cd desktop\n$ pwd\n/Users/wsv/desktop\n```\n\n要创建新目录，请使用命令\
    \ `mkdir` 后跟名称。我们将在桌面上创建一个名为 `code` 的目录，然后在其内部创建一个名为 `ch2-hello` 的新目录。\n\n**Shell**\n\
