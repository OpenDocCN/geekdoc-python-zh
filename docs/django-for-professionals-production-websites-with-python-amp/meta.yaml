  md: '# # Chapter 17: Security


    The World Wide Web is a dangerous place. There are many bad actors and even more
    automated bots that *will* try to hack into your website and cause ill. Therefore
    understanding and implementing security features is a must in any website.


    Fortunately, Django has a very strong record when it comes to security thanks
    to its years of experience handling web security issues as well as a robust and
    regular security update cycle.


    However, as with any tool, it''s important to implement security features correctly
    and in this chapter we''ll cover how to do so in our Bookstore project.


    # ## Social Engineering


    The biggest security risk to any website is ultimately not technical: it is people.
    The term [social engineering](https://en.wikipedia.org/wiki/Social_engineering_%28security%29)
    refers to the technique of finding individuals with access to a system who will
    willingly or unwillingly share their login credentials with a bad actor.


    These days [phishing](https://en.wikipedia.org/wiki/Phishing) is probably the
    most likely culprit if you are in a technical organization. All it takes is one
    bad click on an email link for a malicious actor to potentially gain access to
    the system, or at least all the access the compromised employee has.


    To mitigate this risk, implement a robust permissions scheme and only provide
    the exact security access an employee needs, not more. Does every engineer need
    access to the production database? Probably not. Do non-engineers need write access?
    Again, probably not. These are discussions best had up front and a good default
    is to only add permissions as needed, not to default to superuser status for everyone!


    +   - [https://en.wikipedia.org/wiki/Social_engineering_%28security%29](https://en.wikipedia.org/wiki/Social_engineering_%28security%29)

    - [https://en.wikipedia.org/wiki/Phishing](https://en.wikipedia.org/wiki/Phishing)'
