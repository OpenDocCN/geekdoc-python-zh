    \n## 结论\n\n我们的书店项目并不是世界上最漂亮的网站，但到目前为止它非常实用。在下一章中，我们将配置静态资源并添加 [Bootstrap](https://getbootstrap.com/)⁸⁹\
    \ 以改进样式。\n\n# 第 7 章：静态资源\n\nCSS、JavaScript 和图像等静态资源是任何现代 Web 应用程序的核心组件。Django\
    \ 为它们的配置和存储提供了很大程度的灵活性，这可能会让新手感到困惑，但实际上所有项目的模式几乎完全相同。在本章中，我们将配置初始静态资源并添加 [Bootstrap](https://getbootstrap.com/)⁸⁹\
    \ 以改进样式。\n\n## 本地开发\n\n对于本地开发，Django Web 服务器会自动提供静态文件，只需最少的配置。静态文件可以放在应用级目录 `static`\
    \ 中，因此例如，我们可以在 pages 应用中创建一个名为 `pages/static/` 的新目录。\n\n然而，大多数项目会在多个应用之间重用静态资源。我们的书店应用当然也会！因此，更常见的方法是创建一个基础级目录\
    \ `static` 文件夹，并将所有静态文件放在其中。作为开发人员，这样更容易理解。\n\n从命令行创建一个新的 `static` 文件夹，以及用于 CSS、JavaScript\
    \ 和图像的新子目录。\n\n**Shell**\n\n```\n$ mkdir static\n$ mkdir static/css\n$ mkdir static/js\n\
    $ mkdir static/images\n```\n\n此时你的 Django 项目应该具有以下结构：\n\n## 项目结构\n\n```\n├── Dockerfile\n\
