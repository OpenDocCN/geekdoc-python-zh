  - "[PAGE 233]\n\n# ## Basic Filtering\n\nIn Django a [QuerySet](https://docs.djangoproject.com/en/4.0/topics/db/queries/#retrieving-objects)\
    \ is used to filter the results from a database model. Currently our search results\
    \ page doesn't feel like one because it is outputting all results from the Book\
    \ model. Ultimately we want to run the filter based on the user's search query,\
    \ but first we'll work through multiple filtering options.\n\nIt turns out there\
    \ are multiple ways to customize a queryset including via a [manager](https://docs.djangoproject.com/en/4.0/topics/db/managers/#django.db.models.Manager)\
    \ on the model itself but to keep things simple, we can add a filter with just\
    \ one line. So let's do that!\n\nWe can override the default queryset attribute\
    \ on `ListView` which by default shows all results. The queryset documentation\
    \ is quite robust and detailed, but often using [contains](https://docs.djangoproject.com/en/4.0/ref/models/querysets/#contains)\
    \ (which is case sensitive) or [icontains](https://docs.djangoproject.com/en/4.0/ref/models/querysets/#icontains)\
    \ (which is not case sensitive) are good starting points. We will implement the\
    \ filter based on the `title` that \"contains\" the name \"beginners\".\n\n**Code**\n\
    \n```\npython\n# books/views.py\nclass SearchResultsListView(ListView):\n    model\
    \ = Book\n    context_object_name = \"book_list\"\n    template_name = \"books/search_results.html\"\
    \n    queryset = Book.objects.filter(title__icontains=\"beginners\")  # new\n\
    ```\n\nRefresh the search results page and now only a book with the title containing\
    \ \"beginners\" is displayed. Success!"
  - '[PAGE 234]


    ![](img/d9b58f5e350349fe0759c8474cded65a_234_0.png)


    Search page for "beginners"


    For basic filtering most of the time the [built-in queryset methods](https://docs.djangoproject.com/en/4.0/topics/db/queries/#other-queryset-methods)
    of `filter()`, `all()`, `get()`, or `exclude()` will be enough. However there
    is also a very robust and detailed [QuerySet API](https://docs.djangoproject.com/en/4.0/ref/models/querysets/#queryset-api)
    available as well that is worthy of further study.


    # ## Q Objects


    Using `filter()` is powerful and it''s even possible to [chain filters](https://docs.djangoproject.com/en/4.0/topics/db/queries/#chaining-filters)
    together such as search for all titles that contain "beginners" and "django".
    However often you''ll want more complex lookups that can use "OR" not just "AND";
    that''s when it is time to turn to [Q objects](https://docs.djangoproject.com/en/4.0/topics/db/queries/#complex-lookups-with-q-objects).


    Here''s an example where we set the filter to look for a result that matches a
    title of either "beginners" or "api". It''s as simple as importing `Q` at the
    top of the file and then subtly tweaking our existing query. The `|` symbol represents
    the "or" operator. We can filter on any available field: not just `title` but
    also `author` or `price` as desired.


    As the number of filters grows it can be helpful to separate out the queryset
    override via `get_queryset()`. That''s what we''ll do here but note that this
    choice is optional.'
  - "[PAGE 235]\n\n# Code\n\n```\n# books/views.py\nfrom django.db.models import Q\
    \  # new\n...\n\nclass SearchResultsListView(ListView):\n    model = Book\n  \
    \  context_object_name = \"book_list\"\n    template_name = \"books/book_list.html\"\
    \n\n    def get_queryset(self):  # new\n        return Book.objects.filter(\n\
    \            Q(title__icontains=\"beginners\") | Q(title__icontains=\"api\")\n\
    \        )\n```\n\nRefresh the search results page to see the new result.\n\n\
    ![](img/d9b58f5e350349fe0759c8474cded65a_235_0.png)\n\nSearch with Q objects\n\
    \nNow let's turn our attention to the corresponding search form so that rather\
    \ than hardcode our filters in we can populate them based on the user's search\
    \ query."
