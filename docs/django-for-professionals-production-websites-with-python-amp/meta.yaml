  - '[PAGE 80]


    At the top we import `SimpleTestCase` as well as [reverse](https://docs.djangoproject.com/en/4.0/ref/urlresolvers/#reverse)
    which is useful for testing our URLs. Then we create a class called `HomepageTests`
    that extends `SimpleTestCase` and within it add a method for each unit test.


    Note that we''re adding `self` as the first argument of each unit test. This is
    a [Python convention](https://docs.python.org/3/tutorial/classes.html#random-remarks)
    that is worth repeating.


    It is best to be overly descriptive with your unit test names but be aware that
    each method must start with `test` to be run by the Django test suite.


    The two tests here both check that the HTTP status code for the homepage equals
    `200` which means that it exists. It does not yet tell us anything specific about
    the contents of the page. For `test_url_exists_at_correct_location` we''re creating
