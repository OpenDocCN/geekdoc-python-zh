    \ }}\n    <button type=\"submit\">Log In</button>\n  </form>\n{% endblock content\
    \ %}\n```\n\nYou should **always** add [CSRF protection](https://docs.djangoproject.com/en/4.0/ref/csrf/)\
    \ on any submittable form. Otherwise a malicious website can change the link and\
    \ attack the site and the user. Django has CSRF middleware to handle this for\
    \ us; all we need to do is add `{% csrf_token %}` tags at the start of the form.\n\
    \nNext we can control the look of the form contents. For now we'll use [as_p()](https://docs.djangoproject.com/en/4.0/ref/forms/api/#as-p)\
