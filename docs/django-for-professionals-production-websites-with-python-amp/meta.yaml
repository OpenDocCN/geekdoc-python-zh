    To customize these files we''ll override them by recreating the same structure
    of `django-allauth` in our project. That means creating an `email` directory within
    the `templates/account` directory.


    # Shell


    ```

    shell

    $ mkdir templates/account/email

    ```


    And then in the text editor create the two new files:


    +   - `templates/account/email/email_confirmation_subject.txt`

    - `templates/account/email/email_confirmation_message.txt`


    Let''s start with the subject line since it''s the shorter of the two. Here is
    the default text from `django-allauth`.


    [^131]: https://github.com/pennersr/django-allauth'
  - '[PAGE 161]


    # **email_confirmation_subject.txt**


    ```


    {% load i18n %}

    {% autoescape off %}

    {% blocktrans %}Please Confirm Your E-mail Address{% endblocktrans %}

    {% endautoescape %}

    ```


    The first line, `{% load i18n %}`, is to support Django''s [internationalization](https://docs.djangoproject.com/en/4.0/topics/i18n/)
    functionality which supports multiple languages. Then comes the Django template
    tag for [autoescape](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#autoescape).
    By default it is "on" and protects against security issues like cross site scripting.
    But since we can trust the content of the text here, it is turned off.


    Finally, we come to our text itself which is wrapped in [blocktrans](https://docs.djangoproject.com/en/4.0/topics/i18n/translation/#std:templatetag-blocktrans)
    template tags to support translations. Let''s change the text from "E-mail Address"
    to "Sign Up" to demonstrate that we can.


    # **email_confirmation_subject.txt**


    ```


    {% load i18n %}

    {% autoescape off %}

    {% blocktrans %}Confirm Your Sign Up{% endblocktrans %}

    {% endautoescape %}

    ```


    Now turn to the email confirmation message itself. Here is [the current default](https://github.com/pennersr/django-allauth/blob/353386216b79f16709e97bb487c0bbbba2bc0c71/allauth/templates/account/email/email_confirmation_message.txt):'
