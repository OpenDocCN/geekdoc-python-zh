    # ## Conclusion


    There was a lot of code in this chapter so if you have any errors, please check
    the [official source code on Github](https://github.com/wsvincent/djangoforprofessionals/tree/main/ch18-deployment).


    Even with all the advantages of a modern Platform-as-a-Service like Heroku, deployment
    remains a complicated and often frustrating task for many developers. Personally,
    I want my web apps to "just work". But many engineers come to enjoy the challenges
    of working on performance, security, and scaling. After all, it is far easier
    to measure improvements in this realm: did page load times decrease? Did site
    uptime improve? Is security up-to-date? Working on these problems can often feel
    far more rewarding than debating which new feature to add to the site itself.


    +   - https://elements.heroku.com/addons/

    - https://devcenter.heroku.com/articles/understanding-ssl-on-heroku

    - https://github.com/wsvincent/djangoforprofessionals/tree/main/ch18-deployment'
