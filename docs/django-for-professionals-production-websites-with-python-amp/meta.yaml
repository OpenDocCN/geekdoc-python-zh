    \n![](img/d9b58f5e350349fe0759c8474cded65a_50_0.png)\n\nDjango sqliteadmin\n\n\
    Django对多语言有令人印象深刻的支持，所以如果你想以英语以外的语言查看管理后台、表单和其他默认消息，可以尝试调整`django_project/settings.py`中的`LANGUAGE_CODE`配置，它默认设置为美式英语`en-us`。\n\
    \n继续，如果你点击`Users`按钮，它会带我们到用户页面，在那里我们可以确认只创建了一个用户。\n\n![](img/d9b58f5e350349fe0759c8474cded65a_51_0.png)\n\
    \nAdmin Users page\n\n此时需要强调Docker的另一个方面：到目前为止，我们一直在Docker中更新我们的数据库——目前由`db.sqlite3`文件表示。这意味着实际的`db.sqlite3`文件每次都在变化。多亏了`docker-compose.yml`配置中的`volumes`挂载，每次文件更改都会被复制到我们本地计算机上的`db.sqlite3`文件中。你可以退出Docker，启动shell，用`python\
    \ manage.py runserver`启动服务器，此时看到完全相同的管理后台登录界面，因为底层的SQLite数据库是相同的。\n\n## PostgreSQL\n\
    \nPostgreSQL是一个几乎可以被任何编程语言使用的数据库。但如果你想一下，编程语言——它们都以某种方式有所不同——如何连接到数据库本身呢？\n\n\
    答案是通过数据库适配器！而[Psycopg](http://initd.org/psycopg/)就是Python最流行的数据库适配器。如果你想了解更多关于Psycopg的工作原理，这里有一个链接指向官方网站上的[更完整描述](http://initd.org/psycopg/docs/index.html)。\n\
    \nPsycopg 3.0最近发布了，但许多包和托管提供商仍然专注于Psycopg2，所以这就是我们要使用的。请注意，实际上有两个版本的Psycopg2可用：`psycopg2`和`psycopg2-binary`。我们将在本书中使用二进制版本，因为它更简单易用，对大多数网站来说工作得很好。使用非二进制版本需要多个额外的配置步骤，只与真正大规模的网站相关。如果在遥远的将来你发现数据库有性能问题，调查`psycopg2`与`psycopg2-binary`的区别是值得花时间的事情。但刚开始时不需要。\n\
    \n要安装它，首先用`docker-compose down`停止运行Docker容器。\n\n## Shell\n\n```\n$ docker-compose\
    \ down\n```\n\n现在重要的是停下来思考一下，在Docker中安装包与在本地虚拟环境中安装意味着什么。在传统项目中，我们会从命令行运行`python\
    \ -m pip install psycopg2-binary==2.9.3`来安装Psycopg2。但我们现在使用的是Docker。\n\n有两个选项。第一个是在本地安装`psycopg2-binary`，然后`pip\
    \ freeze`我们的虚拟环境来更新`requirements.txt`。如果我们打算使用本地环境，这可能是有意义的。但由于我们致力于使用Docker，我们可以跳过这一步，直接更新`requirements.txt`添加`psycopg2-binary`包。我们不需要进一步更新实际的虚拟环境，因为我们不太可能使用它。而且如果我们确实需要，我们也可以随时根据`requirements.txt`来更新它。\n\
    \n在你的文本编辑器中打开现有的`requirements.txt`文件，并在底部添加`psycopg2-binary==2.9.3`。\n\n## requirements.txt\n\
    \n```\nasgiref==3.5.2\nDjango==4.0.4\nsqlparse==0.4.2\npsycopg2-binary==2.9.3\n\
    ```\n\n在我们完成PostgreSQL配置更改后，我们将构建新镜像并启动我们的容器。但还不是现在。\n\n## docker-compose.yml\n\
    \n在现有的`docker-compose.yml`文件中添加一个名为`db`的新服务。这意味着我们的Docker主机中将运行两个独立的容器：`web`用于Django本地服务器，`db`用于我们的PostgreSQL数据库。\n\
    \n`web`服务依赖于`db`服务才能运行，所以我们将在`web`中添加一行`depends_on`来表示这一点。\n\n在`db`服务中，我们指定使用哪个版本的PostgreSQL。截至本文撰写时，Heroku支持版本13作为最新版本，所以这就是我们要使用的。Docker容器是临时的，意味着当容器停止运行时，所有信息都会丢失。这对我们的数据库来说显然是个问题！解决方案是创建一个名为`postgres_data`的`volumes`挂载，然后将其绑定到容器内`/var/lib/postgresql/data/`位置的专用目录。最后一步是为`db`的`environment`添加[信任认证](https://www.postgresql.org/docs/current/auth-trust.html)。对于有许多数据库用户的大型数据库，建议更明确地设置权限，但当只有一个开发者时，这个设置是一个不错的选择。\n\
    \n以下是更新后的文件内容：\n\n## docker-compose.yml\n\n```\nversion: \"3.9\"\n\nservices:\n\
    \  web:\n    build: .\n    command: python /code/manage.py runserver 0.0.0.0:8000\n\
    \    volumes:\n      - .:/code\n    ports:\n      - 8000:8000\n    depends_on:\n\
    \      - db\n\n  db:\n    image: postgres:13\n    volumes:\n      - postgres_data:/var/lib/postgresql/data/\n\
    \    environment:\n      - \"POSTGRES_HOST_AUTH_METHOD=trust\"\n\nvolumes:\n \
    \ postgres_data:\n```\n\n## DATABASES\n\n第三步也是最后一步是更新`django_project/settings.py`文件以使用PostgreSQL而不是SQLite。在你的文本编辑器中向下滚动到`DATABASES`配置。\n\
    \n默认情况下，Django指定`sqlite3`作为数据库引擎，名称为`db.sqlite3`，并将其放在`BASE_DIR`处，这意味着在我们的项目级目录中。"
