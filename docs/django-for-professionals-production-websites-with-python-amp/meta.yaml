    # ## Groups & UserPassesTestMixin


    The third permissions mixin available is [UserPassesTestMixin](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.mixins.UserPassesTestMixin)
    which restricts a view''s access only to users who pass a specific test.


    And in large projects [Groups](https://docs.djangoproject.com/en/4.0/topics/auth/default/#groups),
    which are Django''s way of applying permissions to a category of users, become
    prominent. If you look on the Admin homepage there is a dedicated Groups section
    where they can be added and have permissions set. This is far more efficient than
    adding permissions on a per-user basis.


    An example of groups is if you have a premium section on your website, a user
    upgrading could switch them into the premium group and then have access to however
    many specific extra'
