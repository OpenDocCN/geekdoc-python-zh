    The only default you might want to adjust is `CACHE_MIDDLEWARE_SECONDS` which
    is the default number of seconds (600) to cache a page. After the period is up,
    the cache expires and becomes empty. A good default when starting out is 604800
    seconds or 1 week (60secs x 60minutes x 168hours) for a site with content that
    doesn''t change very often. But if you find your cache filling up rapidly or you
    are running a site where the content changes on a frequent basis, shortening this
    setting is a good first step.


    Implementing caching is strictly optional at this point though. Once a website
    is up and running the need for caching–per site, per page, and so on–will quickly
    become apparent. As a site grows in size, a dedicated and separate caching server
    often makes sense. The two most popular options for this are [Redis](https://docs.djangoproject.com/en/4.0/topics/cache/#redis)^240
    and [Memcached](https://docs.djangoproject.com/en/4.0/topics/cache/#memcached)^241
    which, as of Django 4.0, both come with built-in Django support.


    # ## Front-end Assets


    Another major source of bottlenecks in a website is loading front-end assets.
    CSS and JavaScript can become quite large and therefore tools like [django-compressor](https://github.com/django-compressor/django-compressor)^242
    can help to minimize their size.


    Images are often the first place to look in terms of asset size. The `static/media`
    file set up we have in place will scale to a quite large size, but for truly large
    sites it is worth investigating the use of a [Content Delivery Network (CDN)](https://en.wikipedia.org/wiki/Content_delivery_network)^243
    for images instead of storing them on the server filesystem.


    You can also serve different size images to users. For example, rather than shrink
    down a large book cover for a list or search page you could store a smaller thumbnail
    version instead and serve *that* where needed. The third-party [easy-thumbnails](https://github.com/SmileyChris/easy-thumbnails)^244
    package is a good place to start for this.


