    \ which is used to start the container. It won't be applied until we restart the\
    \ current container which we'll do so now.\n\n# ### Shell\n\n```\nshell\n$ docker-compose\
    \ down\n$ docker-compose up -d\n```\n\nRefresh the page again and everything works\
    \ as before, which is what we want. Astute readers may notice that even though\
