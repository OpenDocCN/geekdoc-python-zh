  - "[PAGE 109]\n\nThe built-in `staticfiles` app that ships with Django–you can see\
    \ it in the `INSTALLED_APPS` section of `django_project/settings.py`–ships with\
    \ a quick and dirty helper view that will serve files locally for development.\
    \ It will automatically look for a `static` directory within each application.\n\
    \nMany static files are not app-specific though and are intended to be used project-wide.\
    \ That's why creating a base directory `static` folder, as we did above, is a\
    \ common practice. We just need to provide a list of additional directories for\
    \ Django to look in, which is the job of [STATICFILES_DIRS](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATICFILES_DIRS).\
    \ Since this is a list we must place brackets, `[]`, around it in standard Python\
    \ syntax.\n\nHere is what the updated `django_project/settings.py` file should\
    \ look like.\n\n```\npython\n# django_project/settings.py\nSTATIC_URL = \"/static/\"\
    \nSTATICFILES_DIRS = [BASE_DIR / \"static\"]  # new\n```\n\n# ## CSS\n\nWe'll\
    \ update `base.css` now and keep things simple by having our `h1` headline be\
    \ red. The point is to show how CSS can be added to our project, not to delve\
    \ too deeply into CSS itself.\n\n```\ncss\n/* static/css/base.css */\nh1 {\n \
    \ color: red;\n}\n```\n\nIf you refresh the homepage now you'll see that nothing\
    \ has changed. That's because static assets must be explicitly loaded into templates!\
    \ To do this we must add `{% load static %}` at the top of `_base.html` and then\
    \ use the [static](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#std:templatetag-static)\
    \ template tag to reference our `base.css` file. Even though this file is located\
    \ at `static/css/base.css` we can refer to it as `css/base.css` because the `static`\
    \ tag automatically looks within the `/static/` directory specified in `STATIC_URL`.\n\
    \nHere is what the updated `templates/_base.html` file should look like."
