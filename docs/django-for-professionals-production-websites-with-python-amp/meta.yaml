    # Production


    Local development is designed to keep things nice and easy for static files. Whether
    they are located in an individual app or in a base-level directory, the Django
    server will display everything for us. But this approach is not very efficient
    since each resource must be individually requested and served from each location.
    In a production environment it is far more efficient to combine all static files
    into one location and serve that in a single, larger HTTP request.


    Django comes with a built-in management command, [collectstatic](https://docs.djangoproject.com/en/4.0/ref/contrib/staticfiles/#django-admin-collectstatic),
    that does this for us. But we need to configure two more settings in our `django_project/settings.py`
    file before `collectstatic` will work properly.


    The first setting is [STATIC_ROOT](https://docs.djangoproject.com/en/4.0/ref/settings/#static-root)
    which sets the absolute location of these collected files. This can be named anything
    you like but is typically called "staticfiles". When `collectstatic` is run locally
    it will combine all available static files as defined by `STATICFILES_DIRS` and
    place'
  - '[PAGE 115]


    them within a directory as defined by `STATIC_ROOT`. We are setting `STATIC_ROOT`
    to be in the base directory with the name `staticfiles`. Here is what the code
    looks like:


    # Code


    ```

    # django_project/settings.py

    STATIC_URL = "/static/"

    STATICFILES_DIRS = [BASE_DIR / "static"]

    STATIC_ROOT = BASE_DIR / "staticfiles"  # new

    ```


    The second setting is [STATICFILES_STORAGE](https://docs.djangoproject.com/en/4.0/ref/settings/#staticfiles-storage)^96,
    which is the file storage engine used when collecting static files with the `collectstatic`
    command. By default, it is implicitly set to `django.contrib.staticfiles.storage.StaticFilesStorage`.
    Let''s make that explicit for now in our `django_project/settings.py` file.


    # Code


    ```

    # django_project/settings.py

    STATIC_URL = "/static/"

    STATICFILES_DIRS = [BASE_DIR / "static"]

    STATIC_ROOT = BASE_DIR / "staticfiles"

    STATICFILES_STORAGE = "django.contrib.staticfiles.storage.StaticFilesStorage"  #
    new

    ```


    There is actually one more default static files setting available, [STATICFILES_FINDERS](https://docs.djangoproject.com/en/4.0/ref/settings/#staticfiles-finders)^97,
    but it is typically not customized so we will leave it out of the `django_project/settings.py`
    file at this time.


    Now we can run the command `python manage.py collectstatic` which will combine
    all static files into a new `staticfiles` directory.


    # Shell


    ```

    (.venv) $ docker-compose exec web python manage.py collectstatic

    131 static files copied to ''/code/staticfiles''.

    ```


    If you look within your text editor, there is now a `staticfiles` directory with
    four subdirectories: `admin`, `css`, `images`, and `js`. The first one is the
    static assets of the Django admin app and the other three we specified. That''s
    why there are 122 files copied over.'
