    7050e35b49f5: Pull complete\nDigest: sha256:80f31da1ac7b312ba29d65080fddf797dd76acfb870e677f390d5acba9741b17\n\
    Status: Downloaded newer image for hello-world:latest\n\nHello from Docker!\n\
    This message shows that your installation appears to be working correctly.\n```\n\
    \n要生成此消息，Docker 执行了以下步骤：\n\n1. Docker 客户端联系了 Docker 守护进程。\n2. Docker 守护进程从 Docker\
    \ Hub 拉取了\"hello-world\"镜像。（arm64v8）\n3. Docker 守护进程从该镜像创建了一个新容器，运行生成你当前正在阅读的输出的可执行文件。\n\
    4. Docker 守护进程将该输出流式传输到 Docker 客户端，客户端将其发送到你的终端。\n\n要尝试更具挑战性的操作，你可以运行 Ubuntu 容器：\n\
    \n```\n$ docker run -it ubuntu bash\n```\n\n使用免费的 Docker ID 分享镜像、自动化工作流等：\n\n\
    https://hub.docker.com/\n\n更多示例和创意，请访问：\n\nhttps://docs.docker.com/get-started/\n\
    \n命令 `docker info` 让我们检查 Docker。它会包含大量输出，但请关注顶部几行，显示我们现在有 1 个已停止的容器和 1 个镜像。\n\n\
