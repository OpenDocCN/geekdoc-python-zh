    \ accounts, admin, auth, contenttypes, sessions, sites\nRunning migrations:\n\
    \  Applying account.0001_initial... OK\n  Applying account.0002_email_max_length...\
    \ OK\n  Applying sites.0001_initial... OK\n  Applying sites.0002_alter_domain_unique...\
    \ OK\n```\n\n# URLs\n\nWe also need to swap out the built-in auth app URLs for\
