    # ## Forms


    Fundamentally a web form is simple: it takes user input and sends it to a URL
    via either a `GET` or `POST` method. However in practice this fundamental behavior
    of the web can be monstrously complex.


    The first issue is sending the form data: where does the data actually go and
    how do we handle it once there? Not to mention there are numerous security concerns
    whenever we allow users to submit data to a website.


    There are only two options for "how" a form is sent: either via `GET` or `POST`
    HTTP methods.


    A `POST` bundles up form data, encodes it for transmission, sends it to the server,
    and then receives a response. Any request that changes the state of the database—creates,
    edits, or deletes data—should use a `POST`.


    A `GET` bundles form data into a string that is added to the destination URL.
    `GET` should only be used for requests that do not affect the state of the application,
    such as a search where nothing within the database is changing, basically we''re
    just doing a filtered list view.


    If you look at the URL after visiting Google.com you''ll see your search query
    in the actual search results page URL itself.


    For more information, Mozilla has detailed guides on both [sending form data](https://developer.mozilla.org/en-US/docs/Learn/HTML/Forms/Sending_and_retrieving_form_data)
    and [form data validation](https://developer.mozilla.org/en-US/docs/Learn/HTML/Forms/Form_validation)
    that are worth reviewing if you''re not already familiar with form basics.


    # ## Search Form


    Let''s add a basic search form to the navbar right now so it is available on every
    page. That means updating the `_base.html` template and in particular, the bottom
    of the `<ul></ul>` tags after the if/else/elif logic.


    Here is what the updated code looks like which we''ll explain below.'
