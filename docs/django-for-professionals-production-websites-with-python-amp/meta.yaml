    # PostgreSQL


    The last step is switching over to PostgreSQL. Even though we already installed
    `psycopg2-binary` and have PostgreSQL available in our `docker-compose.yml` file,
    we still must explicitly tell Django'
- md: "what DATABASE to use which we can do in the `django_project/settings.py` file.\
    \ Remember that by default Django will use a SQLite database instead.\n\nThe updated\
    \ code is the same as in the previous chapter.\n\n## Code\n\n```python\n# django_project/settings.py\n\
    DATABASES = {\n    \"default\": {\n        \"ENGINE\": \"django.db.backends.postgresql\"\
    ,\n        \"NAME\": \"postgres\",\n        \"USER\": \"postgres\",\n        \"\
    PASSWORD\": \"postgres\",\n        \"HOST\": \"db\",\n        \"PORT\": 5432,\n\
    \    }\n}\n```\n\nMake sure to refresh the web browser for the homepage to confirm\
    \ everything still works correctly.\n\n## Custom User Model\n\nNow we come to\
    \ new material! We begin by implementing a custom user model which the official\
    \ Django documentation [\"highly recommends.\"](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#using-a-custom-user-model-when-starting-a-project)\
    \ Why? Because you *will* need to make changes to the built-in User model at some\
    \ point in your project's life and if you have not started with a custom user\
    \ model from the very first `migrate` command you run, then you're in for a world\
    \ of hurt because User is tightly interwoven with the rest of Django internally.\
    \ It is challenging to switch over to a custom user model mid-project.\n\nA point\
    \ of confusion for many people is that custom user models were only added in Django\
    \ 1.5. Up until that point the recommended approach was to add a [OneToOneField](https://docs.djangoproject.com/en/4.0/ref/models/fields/#django.db.models.OneToOneField),\
    \ often called a Profile model, to User. You'll often see this set up in older\
    \ projects.\n\nBut these days using a custom user model is the more common approach.\
    \ However as with many things Django-related, there are implementation choices:\
    \ either extend [AbstractUser](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.models.AbstractUser)\
    \ which keeps the default user fields and permissions or extend [AbstractBaseUser](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.models.AbstractBaseUser)\
    \ which is even more granular, and flexible, but requires more work.\n\nWe'll\
    \ stick with the simpler `AbstractUser` in this book as `AbstractBaseUser` can\
    \ be added later if needed.\n\nThere are four steps for adding a custom user model\
    \ to our project:\n\n- 1. Create a `CustomUser` model\n- 2. Update `django_project/settings.py`\n\
    - 3. Customize `UserCreationForm` and `UserChangeForm`\n- 4. Add the custom user\
    \ model to `admin.py`\n\nThe first step is to create a `CustomUser` model which\
    \ will live within its own app. I like to name this app `accounts`. Going forward\
    \ we'll run the majority of our commands within Docker itself. Because we configured\
    \ a `volumes` within the web service of `docker-compose.yml` any file system changes\
    \ within Docker will be reflected in the local file system.\n\n## Shell\n\n```bash\n\
    $ docker-compose exec web python manage.py startapp accounts\n```\n\nCreate a\
    \ new `CustomUser` model which extends `AbstractUser`. That means we're essentially\
    \ making a copy where `CustomUser` now has inherited all the functionality of\
    \ `AbstractUser`, but we can override or add new functionality as needed. We're\
    \ not making any changes yet so include the Python `pass` statement which acts\
    \ as a placeholder for our future code.\n\n## Code\n\n```python\n# accounts/models.py\n\
    from django.contrib.auth.models import AbstractUser\nfrom django.db import models\n\
    \n\nclass CustomUser(AbstractUser):\n    pass\n```\n\nNow go in and update our\
    \ settings.py file in the INSTALLED_APPS section to tell Django about our new\
    \ accounts app. We also want to add a AUTH_USER_MODEL config at the bottom of\
    \ the file which will cause our project to use CustomUser instead of the default\
    \ User model.\n\n## Code\n\n```python\n# django_project/settings.py\nINSTALLED_APPS\
    \ = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\"\
    ,\n    \"django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"\
    django.contrib.staticfiles\",\n    # Local\n    \"accounts.apps.AccountsConfig\"\
    ,  # new\n]\n...\nAUTH_USER_MODEL = \"accounts.CustomUser\"  # new\n```\n\nTime\
    \ to create a migrations file for the changes. We'll add the optional app name\
    \ accounts to the command so that only changes to that app are included.\n\n##\
    \ Shell\n\n```bash\n$ docker-compose exec web python manage.py makemigrations\
    \ accounts\nMigrations for 'accounts':\n  accounts/migrations/0001_initial.py\n\
    \    - Create model CustomUser\n```\n\nThen run `migrate` to initialize the database\
    \ for the very first time.\n\n## Shell\n\n```bash\n$ docker-compose exec web python\
    \ manage.py migrate\nOperations to perform:\n  Apply all migrations: accounts,\
    \ admin, auth, contenttypes, sessions\nRunning migrations:\n  No migrations to\
    \ apply.\n```\n\n## Custom User Forms\n\nA user model can be both created and\
    \ edited within the Django admin. So we'll need to update the built-in forms too\
    \ to point to `CustomUser` instead of `User`. In your text editor create a new\
    \ file called `accounts/forms.py` and type in the following code to switch over\
    \ to `CustomUser`.\n\n## Code\n\n```python\n# accounts/forms.py\nfrom django.contrib.auth\
    \ import get_user_model\nfrom django.contrib.auth.forms import UserCreationForm,\
    \ UserChangeForm\n\n\nclass CustomUserCreationForm(UserCreationForm):\n    class\
    \ Meta:\n        model = get_user_model()\n        fields = (\n            \"\
    email\",\n            \"username\",\n        )\n\n\nclass CustomUserChangeForm(UserChangeForm):\n\
    \    class Meta:\n        model = get_user_model()\n        fields = (\n     \
    \       \"email\",\n            \"username\",\n        )\n```\n\nAt the very top\
    \ we've imported `CustomUser` model via [get_user_model](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.get_user_model)\
    \ which looks to our `AUTH_USER_MODEL` config in `settings.py`. This might feel\
    \ a bit more circular than directly importing `CustomUser` here, but it enforces\
    \ the idea of making one single reference to the custom user model rather than\
    \ directly referring to it all over our project.\n\nNext we import [UserCreationForm](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.forms.UserCreationForm)\
    \ and [UserChangeForm](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.forms.UserChangeForm)\
    \ which will both be extended.\n\nThen create two new forms—`CustomUserCreationForm`\
    \ and `CustomUserChangeForm`—that extend the base user forms imported above and\
    \ specify swapping in our `CustomUser` model and displaying the fields `email`\
    \ and `username`. The password field is implicitly included by default and so\
    \ does not need to be explicitly named here as well.\n\n### Custom User Admin\n\
    \nFinally we have to update our `accounts/admin.py` file. The admin is a common\
    \ place to manipulate user data and there is tight coupling between the built-in\
    \ `User` and the admin.\n\nWe'll extend the existing `UserAdmin` into `CustomUserAdmin`\
    \ and tell Django to use our new forms and custom user model. We can also list\
    \ [any user attributes](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/)\
    \ we want but for now will just focus on three: email, username, and superuser\
    \ status.\n\n## Code\n\n```python\n# accounts/admin.py\nfrom django.contrib import\
    \ admin\nfrom django.contrib.auth import get_user_model\nfrom django.contrib.auth.admin\
    \ import UserAdmin\n\nfrom .forms import CustomUserCreationForm, CustomUserChangeForm\n\
    \nCustomUser = get_user_model()\n\n\nclass CustomUserAdmin(UserAdmin):\n    add_form\
    \ = CustomUserCreationForm\n    form = CustomUserChangeForm\n    model = CustomUser\n\
    \    list_display = [\n        \"email\",\n        \"username\",\n        \"is_superuser\"\
    ,\n    ]\n\n\nadmin.site.register(CustomUser, CustomUserAdmin)\n```\n\nPhew. A\
    \ bit of code upfront but this saves a ton of heartache later on.\n\n## Superuser\n\
    \nA good way to confirm our custom user model is up and running properly is to\
    \ create a superuser account so we can log into the admin. This command will access\
    \ `CustomUserCreationForm` under the hood.\n\n## Shell\n\n```bash\n$ docker-compose\
    \ exec web python manage.py createsuperuser\n```\n\nI've used the username `wsv`,\
    \ email of `will@wsvincent.com`, and password `testpass123`. You can use your\
    \ own preferred variations here."
