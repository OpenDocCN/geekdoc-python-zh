  md: '# ## Tests


    Since we''ve added new functionality to our project we should test it. Whether
    you are a solo developer or working on a team, tests are important. In the words
    of Django co-founder Jacob Kaplan-Moss, "Code without tests is broken as designed."


    There are two main types of tests:


    +   - Unit tests are small, fast, and isolated to a specific piece of functionality

    - Integration tests are large, slow, and used for testing an entire application
    or a user flow like payment that covers multiple screens


    You should write many unit tests and a small number of integration tests.


    The Python programming language contains its own [unit testing framework](https://docs.python.org/3/library/unittest.html)
    and Django''s [automated testing framework](https://docs.djangoproject.com/en/4.0/topics/testing/)
    extends this with multiple additions into a web context. There is no excuse for
    not writing a lot of tests; they will save you time.


    It''s important to note that not everything needs to be tested. For example, any
    built-in Django features already contain tests in the source code. If we were
    using the default `User` model in our project we would not need to test it. But
    since we''ve created a `CustomUser` model we should.


    # ## Unit Tests


    To write unit tests in Django we use [TestCase](https://docs.djangoproject.com/en/4.0/topics/testing/tools/#django.test.TestCase)
    which is, itself, an extension of Python''s [TestCase](https://docs.python.org/3/library/unittest.html#unittest.TestCase).
    Our accounts app already contains a `tests.py` file which is automatically added
    when the `startapp` command is used. Currently it is blank. Let''s fix that!


    Each method must be prefaced with `test` in order to be run by the Django test
    suite. It is also a good idea to be overly descriptive with your unit test names
    since mature projects have hundreds if not thousands of tests!'
