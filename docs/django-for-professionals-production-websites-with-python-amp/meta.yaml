    # # Chapter 18: Deployment


    So far we have been working entirely in a local development environment on our
    computer. But now it is time to deploy our project so that it is accessible to
    the public. In truth, the topic of deployment is worth an entire book on its own.
    Compared to other web frameworks Django is very hands-off and agnostic on the
    topic. There are no one-click deploys for most hosting platforms and while this
    requires more developer work it also allows, in typical Django fashion, for a
    high degree of customization.


    In the previous chapter we configured a completely separate `docker-compose-prod.yml`
    file and updated `django_project/settings.py` to be production-ready. In this
    chapter we''ll review how to choose a hosting provider, add a production-ready
    web server, and properly configure static/media files before deploying our Bookstore
    site!


    # ## PaaS vs IaaS


    The first question is whether to use a Platform-as-a-Service (PaaS) or Infrastructure-as-a-Service
    (IaaS). A PaaS is an opinionated hosting option that handles much of the initial
    configuration and scaling needed for a website. Popular examples include [Heroku](https://www.heroku.com/)^{298},
    [PythonAnywhere](https://www.pythonanywhere.com/details/django_hosting)^{299},
    and [Dokku](http://dokku.viewdocs.io/dokku/)^{300} among many others. While a
    PaaS costs more money upfront than an IaaS it saves an incredible amount of developer
    time, handles security updates automatically, and can be quickly scaled.


    An IaaS by contrast provides total flexibility and is typically cheaper, but it
    requires a high degree of knowledge and effort to properly set up. Prominent IaaS
    options include [DigitalOcean](https://www.digitalocean.com/)^{301},


    +   - [^298] https://www.heroku.com/

    - [^299] https://www.pythonanywhere.com/details/django_hosting

    - [^300] http://dokku.viewdocs.io/dokku/

    - [^301] https://www.digitalocean.com/'
  - '[PAGE 284]


    [Linode](https://www.linode.com/), [Amazon EC2](https://aws.amazon.com/ec2/),
    and [Google Compute Engine](https://cloud.google.com/compute/) among many others.


    So which one to use? Django developers tend to fall in one of two camps: either
    they already have a deployment pipeline configured with their IaaS of choice or
    they use a PaaS. Since the former is far more complex and varies widely in its
    configuration, we will use a PaaS in this book, specifically Heroku.


    The choice of Heroku is somewhat arbitrary, but it is a mature technology that
    comes with a truly free tier sufficient for deploying our Bookstore project.


    # ## WhiteNoise


    We have already seen that for local development Django relies on the `staticfiles`
    app to serve static files from across an entire project. This is convenient, but
    quite inefficient and likely insecure, too.


    For production, the [collectstatic](https://docs.djangoproject.com/en/4.0/ref/contrib/staticfiles/#collectstatic)
    command must be run to compile all static files into a single directory specified
    by [STATIC_ROOT](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATIC_ROOT).
    The consolidated files can then be served either on the same server, a separate
    server, or a dedicated cloud service/CDN by updating [STATICFILES_STORAGE](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATICFILES_STORAGE).


    In our project, we will rely on serving files from our server with the aid of
    the [WhiteNoise](https://github.com/evansd/whitenoise) project which works extremely
    well on Heroku and is both faster and more configurable than Django defaults.
    To install `whitenoise` we will add it to our `requirements.txt` file, stop the
    container, rebuild the image, and start the server again.'
