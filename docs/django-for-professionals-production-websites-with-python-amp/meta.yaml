  - "[PAGE 180]\n\n![](img/d9b58f5e350349fe0759c8474cded65a_180_0.png)\n\nThree Books\n\
    \n# Individual Book Page\n\nNow we can add individual pages for each book by using\
    \ another Generic Class-Based View called [DetailView](https://docs.djangoproject.com/en/4.0/ref/class-based-views/generic-display/#detailview)¹⁴⁶.\n\
    \nOur process is similar to the Books page and starts with the URL importing `BookDetailView`\
    \ on the second line and then setting the path to be the primary key of each book\
    \ which will be represented as an integer `<int:pk>`.\n\nCode\n\n```\n# books/urls.py\n\
    from django.urls import path\n\nfrom .views import BookListView, BookDetailView\
    \  # new\n\nurlpatterns = [\n    path(\"\", BookListView.as_view(), name=\"book_list\"\
    ),\n    path(\"<int:pk>/\", BookDetailView.as_view(), name=\"book_detail\"), \
    \ # new\n]\n```\n\nDjango automatically adds an [auto-incrementing primary key](https://docs.djangoproject.com/en/4.0/topics/db/models/#automatic-primary-key-fields)¹⁴⁷\
    \ to our database models. So while we only declared the fields `title`, `author`,\
    \ and `body` on our `Book` model, under-the-hood Django also added another field\
    \ called `id`, which is our primary key. We can access it as either `id` or `pk`."
  - "[PAGE 181]\n\nThe pk for our first book is 1. For the second one it will 2. And\
    \ so on. Therefore when we go to the individual entry page for our first book,\
    \ we can expect that its URL route will be books/1.\n\nNow on to the `books/views.py`\
    \ file where we'll import `DetailView` and create a `BookDetailView` class that\
    \ also specifies model and template_name fields.\n\n# Code\n\n```\n# books/views.py\n\
    from django.views.generic import ListView, DetailView  # new\n\nfrom .models import\
    \ Book\n\n\nclass BookListView(ListView):\n    model = Book\n    context_object_name\
    \ = \"book_list\"\n    template_name = \"books/book_list.html\"\n\n\nclass BookDetailView(DetailView):\
    \  # new\n    model = Book\n    template_name = \"books/book_detail.html\"\n```\n\
    \nAnd finally create the new template file `templates/books/book_detail.html`.\
    \ It will display all the current fields. We can also showcase the title in the\
    \ title tags so that it appears in the web browser tab.\n\n# Code\n\n```\n<!--\
    \ templates/books/book_detail.html -->\n{% extends \"_base.html\" %}\n\n{% block\
    \ title %}{{ object.title }}{% endblock title %}\n\n{% block content %}\n  <div\
    \ class=\"book-detail\">\n    <h2><a href=\"\">{{ object.title }}</a></h2>\n \
    \   <p>Author: {{ object.author }}</p>\n    <p>Price: {{ object.price }}</p>\n\
    \  </div>\n{% endblock content %}\n```"
  - "[PAGE 182]\n\nIn your web browser navigate to `http://127.0.0.1:8000/books/1/`\
    \ and you'll see a dedicated page for our first book.\n\n![](img/d9b58f5e350349fe0759c8474cded65a_182_0.png)\n\
    \nBook Detail Page\n\n# context_object_name\n\nJust as `ListView` defaults to\
    \ `object_list` which we updated to be more specific, so too `DetailView` defaults\
    \ to `object` which we can make more descriptive using `context_object_name`.\
    \ We'll set it to `book`.\n\nCode\n\n```\n# books/views.py\n...\nclass BookDetailView(DetailView):\n\
    \    model = Book\n    context_object_name = \"book\"  # new\n    template_name\
    \ = \"books/book_detail.html\"\n```\n\nDon't forget to update our template too\
    \ with this change, swapping out `object` for `book` for our three fields."
