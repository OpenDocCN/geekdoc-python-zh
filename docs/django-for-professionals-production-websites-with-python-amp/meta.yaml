  md: 'is run. It is used to provide [cryptographic signing](https://docs.djangoproject.com/en/4.0/topics/signing/)
    throughout your project and it is very, very important to keep secure.


    Our current `SECRET_KEY` is not secure because it has been added to the Git source
    control multiple times. Even if we moved its current value to an environment variable
    now, the value will live on in our Git history forever. So a new `SECRET_KEY`
    must be generated and stored properly. It needs to have at least 50 characters,
    five or more unique characters, and not be prefixed with "django-insecure-"!


    Luckily it is easy enough to generate a new random key. We can use Python''s built-in
    [secrets](https://docs.python.org/3/library/secrets.html) module. The parameter
    `token_urlsafe` returns the number of bytes in a URL-safe text string. With Base64
    encoding on average each byte has 1.3 characters. So using 38 results in 51 characters
    in this case.


    # Shell


    ```


    $ docker-compose exec web python -c "import secrets; print(secrets.token_urlsafe(38))"

    LHanzMtuuenbzKGXGBSHZYHXrydW3_4zBeEE7WRtZGIr00NNCbs

