  md: "+   2) The [per-view cache](https://docs.djangoproject.com/en/4.0/topics/cache/#the-per-view-cache)\
    \ lets you cache individual views.\n\n+   3) [Template fragment caching](https://docs.djangoproject.com/en/4.0/topics/cache/#template-fragment-caching)\
    \ lets you specify a specific section of a template to cache.\n\n+   4) The [low-level\
    \ cache API](https://docs.djangoproject.com/en/4.0/topics/cache/#the-low-level-cache-api)\
    \ lets you manually set, retrieve, and maintain specific objects in the cache.\n\
    \nWhy not just cache everything all the time? Two big reasons. The first is that\
    \ cache memory is expensive since it is stored as RAM. Think about the cost of\
    \ going from 8GB to 16GB of RAM on your laptop vs. 256GB to 512GB of hard drive\
    \ space! Another is the cache must be \"warm,\" that is filled with updated content,\
    \ so depending upon the needs of a site, optimizing the cache so it is accurate,\
    \ but not wasteful, takes quite a bit of tuning.\n\nIf you wanted to implement\
    \ per-site caching, which is the simplest approach, you'd add `UpdateCacheMiddleware`\
    \ at the very top of the `MIDDLEWARE` configuration in `django_project/settings.py`\
    \ and `FetchFromCacheMiddleware` at the very bottom. Also set three additional\
    \ fields [CACHE_MIDDLEWARE_ALIAS](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-CACHE_MIDDLEWARE_ALIAS),\
    \ [CACHE_MIDDLEWARE_SECONDS](https://docs.djangoproject.com/en/4.0/ref/settings/#cache-middleware-seconds),\
    \ and [CACHE_MIDDLEWARE_KEY_PREFIX](https://docs.djangoproject.com/en/4.0/ref/settings/#cache-middleware-key-prefix).\n\
    \n# Code\n\n```\n# django_project/settings.py\nMIDDLEWARE = [\n    \"django.middleware.cache.UpdateCacheMiddleware\"\
    ,  # new\n    \"django.middleware.security.SecurityMiddleware\",\n    \"django.contrib.sessions.middleware.SessionMiddleware\"\
    ,\n    \"django.middleware.common.CommonMiddleware\",\n    \"debug_toolbar.middleware.DebugToolbarMiddleware\"\
