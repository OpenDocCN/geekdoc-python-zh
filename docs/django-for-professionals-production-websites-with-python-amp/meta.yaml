    to the *Applications* directory, scroll down to open the Utilities directory,
    and double-click the application called Terminal. This opens a new screen with
    a white background by default and a blinking cursor after the `%` prompt. Don''t
    worry about what comes to the *left* of the `%` prompt. It varies by computer
    and can be customized later on.


    # Shell


    ```

    Wills-Macbook-Pro:~ wsv%

    ```


    To avoid confusion around the different prompts for each operating system—`>`
    on Windows and `%` on macOS—in this book we will use the Unix prompt of `$` for
    any command line usage. Where there is a difference between Windows and macOS
    both commands will be listed.


    There are many available shell commands but most developers rely on the same handful
    over and over again and look up more complicated ones as needed. In most cases,
    the commands for Windows (PowerShell) and macOS are similar. For example, the
    command `whoami` returns the computer name/username on Windows and just the username
    on macOS. As with all shell commands, type the command itself followed by the
    `return` key. Note that the `#` symbol represents a comment and will not be executed
    on the command line.'
  - '[PAGE 18]


    # Shell


    ```

    # Windows

    $ whoami

    wsv2022/wsv


    # macOS

    $ whoami

    wsv

    ```


    Sometimes, however, the shell commands on Windows and macOS are completely different.
    A good example is the command for outputting a basic "Hello, World!" message to
    the console. On Windows the command is `Write-Host` while on macOS the command
    is `echo`.


    # Shell


    ```

    # Windows

    $ Write-Host "Hello, World!"

    Hello, World!


    # macOS

    $ echo "Hello, World!"

    Hello, World!

    ```


    Most Django developers are not command line experts and rely on the same handful
    of commands over and over again. In this book I will provide the exact instructions
    to run each time but if you are curious, a complete list of shell commands for
    each operating system can be found over at `ss64.com`.


    # Install Python 3


    Make sure that the latest version of Python (3.10 as of this writing) is available
    on your computer. On Windows, Microsoft hosts a community release of Python 3
    in the Microsoft Store. In the search bar on the bottom of your screen type in
    "python" and click on the best match result. This will automatically launch Python
    3.10 on the Microsoft Store. Click on the blue "Get" button to download it.


    To confirm Python was installed correctly, open a new Terminal window with PowerShell
    and then type `python --version`.'
