    have to make changes to our `django_project/settings.py` file first. Since we''re
    using Docker it''s possible to switch to WhiteNoise locally as well as in production.
    While it''s possible to do this by passing in a `--nostatic` flag to the `runserver`
    command, this becomes tiring in practice. A better approach is to add `whitenoise.runserver_nostatic`
    before `django.contrib.staticfiles` in the `INSTALLED_APPS` config which will
    do the same thing. We''ll also add it to our `MIDDLEWARE` right below `SecurityMiddleware`
