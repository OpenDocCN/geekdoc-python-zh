    \ \"_base.html\" %}\n\n{% block title %}{{ book.title }}{% endblock title %}\n\
    \n{% block content %}\n  <div class=\"book-detail\">\n    <h2><a href=\"\">{{\
    \ book.title }}</a></h2>\n    <p>Author: {{ book.author }}</p>\n    <p>Price:\
    \ {{ book.price }}</p>\n  </div>\n{% endblock content %}\n```\n\n# Adding URLs\n\
    \nWe want the links on the book list page to point to individual pages. With the\
    \ [url template tag](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#url)\
    \ we can point to `book_detail` – the URL name set in `books/urls.py` – and then\
    \ pass in the pk.\n\n# Code\n\n```\n<!-- templates/books/book_list.html -->\n\
    {% extends \"_base.html\" %}\n\n{% block title %}Books{% endblock title %}\n\n\
    {% block content %}\n  {% for book in book_list %}\n    <div>\n      <h2><a href=\"\
    {% url 'book_detail' book.pk %}\">{{ book.title }}</a></h2>\n    </div>\n  {%\
    \ endfor %}\n{% endblock content %}\n```\n\nRefresh the book list page at http://127.0.0.1:8000/books/\
    \ and links are now all clickable and direct to the correct individual book page."
  - "[PAGE 184]\n\nAs a final step, let's add a navbar link for \"Books\" so we don't\
