    \ *Chapter 9* introduces environment variables, a key component of Twelve-Factor\
    \ App development and a best practice widely used in the web development community.\
    \ Rounding out the set up of our project, *Chapter 10* focuses on email and adding\
    \ a dedicated third-party provider.\n\nThe structure of the first half of the\
    \ book is intentional. When it comes time to build your own Django projects, chances\
    \ are you will be repeating many of the same steps from Chapters 3-9. After all,\
    \ every new project needs proper configuration, user authentication, and environment\
    \ variables. So treat these chapters as your detailed explanation and guide. The\
    \ second half of the book focuses on specific features related to our Bookstore\
    \ website.\n\n*Chapter 11* starts with building out the models, tests, and pages\
    \ for our Bookstore via a Books app. There is also a discussion of URLs and switching\
    \ from `id` to a slug to a UUID (Universally Unique IDentifier) in the URLs. *Chapter\
    \ 12* features the addition of reviews to our Bookstore and a discussion of foreign\
    \ keys.\n\nIn *Chapter 13* image-uploading is added and in *Chapter 14* permissions\
    \ are set across the site to lock it down. For any site but especially e-commerce,\
    \ search is a vital component and *Chapter 15* walks through building a form and\
    \ increasingly complex search filters for the site.\n\nIn *Chapter 16* the focus\
    \ switches to performance optimizations including the addition of `django-debug-toolbar`\
    \ to inspect queries and templates, database indexes, front-end assets, and multiple\
    \ built-in caching options. *Chapter 17* covers security in Django, both the built-in\
    \ options as well as additional configurations that can–and should–be added for\
    \ a production environment. The final section, *Chapter 18*, is on deployment,\
    \ the standard upgrades needed to migrate away from the Django web server, local\
    \ static file handling, and configuring `ALLOWED_HOSTS`.\n\nThe Conclusion touches\
    \ upon various next steps to take with the project and additional Django best\
    \ practices.\n\n## Book Layout\n\nThere are many code examples in this book, which\
    \ are formatted as follows:\n\n**Code**\n\n```python\n# This is Python code\n\
    print(\"Hello, World!\")\n```\n\nFor brevity we will use three dots, `...`, to\
    \ denote existing code that remains unchanged in a longer code example. For example,\
    \ in the function below, the previous content is unchanged and the `print()` statement\
    \ has been added. In these cases there will also be a comment, `# new`, indicating\
    \ where the new code has been added.\n\n**Code**\n\n```python\ndef make_my_website:\n\
    \    ...\n    print(\"All done!\")  # new\n```\n\nComplete source code for the\
    \ book can be found in the [official Github repository](https://github.com/wsvincent/djangoforprofessionals)⁴.\
    \ It is a good place to check first if there are any issues with your code.\n\n\
    ## Community\n\n\"Come for the framework, stay for the community\" is a common\
    \ saying among Django developers. While the Django code base is very impressive,\
    \ ultimately the health of the project up to this point and going forward depends\
    \ upon the community that has grown around it. Django development happens publicly\
    \ on the [django-developers](https://docs.djangoproject.com/en/dev/internals/mailing-lists/#django-developers-mailing-list)⁵\
    \ list and the project is overseen by a non-profit, the [Django Software Foundation](https://www.djangoproject.com/foundation/)⁶,\
    \ which manages contributions, supports annual DjangoCon conferences, and local\
    \ meetups where developers gather to share knowledge and insights. There is an\
    \ official [Django forum](https://forum.djangoproject.com/) populated by many\
    \ members of the community which is an ideal place to ask for help.\n\nNo matter\
    \ what your level of technical expertise becoming involved in Django itself is\
    \ a great way to learn, to meet other developers, and to enhance your own reputation.\n\
    \n## Conclusion\n\nDjango is an excellent choice for any developer who wants to\
    \ build modern, robust web applications with a minimal amount of code. In the\
    \ next chapter we'll make sure your computer is properly set up for web development\
    \ before diving deeply into Django itself in the rest of the book.\n\n⁷https://forum.djangoproject.com/\n\
    \n# Chapter 1: Initial Set Up\n\nThis chapter covers how to properly configure\
    \ your Windows or macOS computer to work on Django projects. It is similar to\
    \ the set up guides in both *Django for Beginners* and *Django for APIs* so if\
    \ you are already familiar with the command line, have the latest version of Python\
    \ installed, know how to create virtual environments, and use Git you can consider\
    \ this chapter optional. Otherwise read through to make sure your computer is\
    \ ready for professional Django development and success in the rest of this book.\n\
    \n## The Command Line\n\nThe command line is a text-only interface that is used\
    \ frequently by developers. It harkens back to the early days of computer interfaces\
    \ before the mouse and graphical user interfaces became the norm. In practice,\
    \ multiple terms are used to refer to the command line: Command Line Interface\
    \ (CLI), console, terminal, shell, or prompt. Technically speaking, the *terminal*\
    \ is the program that opens up a new window to access the command line, a *console*\
    \ is a text-based application, the *shell* is the program that runs commands on\
    \ the underlying operating system, and the *prompt* is where commands are typed\
    \ and run. It is easy to be confused by these terms initially but they all essentially\
    \ mean the same thing: the command line is where we run and execute text-only\
    \ commands on our computer.\n\nOn Windows, the built-in terminal and shell are\
    \ both called *PowerShell*. To access it, locate the taskbar on the bottom of\
    \ the screen next to the Windows button and type in \"powershell\" to launch the\
    \ app. It will open a new window with a dark blue background and a blinking cursor\
    \ after the > prompt. Here is how it looks on my computer.\n\n**Shell**\n\n```\n\
    PS C:\\Users\\wsv>\n```\n\nOn macOS, the built-in terminal is called appropriately\
    \ enough *Terminal*. It can be opened via Spotlight: press the `Command` and `space\
    \ bar` keys at the same time and then type in \"terminal.\" Alternatively, open\
    \ a new Finder window, navigate to the *Applications* directory, scroll down to\
    \ open the Utilities directory, and double-click the application called Terminal.\
    \ This opens a new screen with a white background by default and a blinking cursor\
    \ after the `%` prompt. Don't worry about what comes to the *left* of the `%`\
    \ prompt. It varies by computer and can be customized later on.\n\n**Shell**\n\
    \n```\nWills-Macbook-Pro:~ wsv%\n```\n\nTo avoid confusion around the different\
    \ prompts for each operating system—`>` on Windows and `%` on macOS—in this book\
    \ we will use the Unix prompt of `$` for any command line usage. Where there is\
    \ a difference between Windows and macOS both commands will be listed.\n\nThere\
    \ are many available shell commands but most developers rely on the same handful\
    \ over and over again and look up more complicated ones as needed. In most cases,\
    \ the commands for Windows (PowerShell) and macOS are similar. For example, the\
    \ command `whoami` returns the computer name/username on Windows and just the\
    \ username on macOS. As with all shell commands, type the command itself followed\
    \ by the `return` key. Note that the `#` symbol represents a comment and will\
    \ not be executed on the command line.\n\n**Shell**\n\n```\n# Windows\n$ whoami\n\
    wsv2022/wsv\n\n# macOS\n$ whoami\nwsv\n```\n\nSometimes, however, the shell commands\
    \ on Windows and macOS are completely different. A good example is the command\
    \ for outputting a basic \"Hello, World!\" message to the console. On Windows\
    \ the command is `Write-Host` while on macOS the command is `echo`.\n\n**Shell**\n\
    \n```\n# Windows\n$ Write-Host \"Hello, World!\"\nHello, World!\n\n# macOS\n$\
    \ echo \"Hello, World!\"\nHello, World!\n```\n\nMost Django developers are not\
    \ command line experts and rely on the same handful of commands over and over\
    \ again. In this book I will provide the exact instructions to run each time but\
    \ if you are curious, a complete list of shell commands for each operating system\
    \ can be found over at `ss64.com`.\n\n## Install Python 3\n\nMake sure that the\
    \ latest version of Python (3.10 as of this writing) is available on your computer.\
    \ On Windows, Microsoft hosts a community release of Python 3 in the Microsoft\
    \ Store. In the search bar on the bottom of your screen type in \"python\" and\
    \ click on the best match result. This will automatically launch Python 3.10 on\
    \ the Microsoft Store. Click on the blue \"Get\" button to download it.\n\nTo\
    \ confirm Python was installed correctly, open a new Terminal window with PowerShell\
    \ and then type `python --version`."
  mdcn: "*第7章*介绍了CSS、JavaScript和图片的静态资源配置，以及添加Bootstrap进行样式设计。\n\n在*第8章*中，重点转向高级用户注册，即仅通过邮箱登录和通过第三方`django-allauth`包进行社交认证。*第9章*介绍了环境变量，这是十二要素应用开发的关键组成部分，也是Web开发社区广泛使用的最佳实践。为了完善项目的设置，*第10章*专注于电子邮件和添加专用的第三方提供商。\n\
    \n本书前半部分的结构是精心设计的。当你开始构建自己的Django项目时，很可能会重复第3-9章中的许多相同步骤。毕竟，每个新项目都需要适当的配置、用户认证和环境变量。因此，将这些章节视为你的详细解释和指南。本书的后半部分专注于与我们的Bookstore网站相关的特定功能。\n\
    \n*第11章*从通过Books应用构建Bookstore的模型、测试和页面开始。还讨论了URL以及将URL从`id`切换到slug再到UUID（通用唯一标识符）。*第12章*介绍了为Bookstore添加评论以及外键的讨论。\n\
    \n在*第13章*中添加了图片上传功能，在*第14章*中设置了整个网站的权限以锁定网站。对于任何网站，尤其是电子商务网站，搜索是一个至关重要的组成部分，*第15章*详细介绍了如何构建表单以及为网站构建越来越复杂的搜索过滤器。\n\
    \n在*第16章*中，重点转向性能优化，包括添加`django-debug-toolbar`来检查查询和模板、数据库索引、前端资源以及多种内置缓存选项。*第17章*涵盖了Django中的安全性，包括内置选项以及可以在生产环境中添加（而且应该添加）的额外配置。最后一部分，*第18章*，是关于部署的，包括从Django\
    \ Web服务器迁移所需的标准升级、本地静态文件处理以及配置`ALLOWED_HOSTS`。\n\n结论部分涉及项目的各种后续步骤以及额外的Django最佳实践。\n\
    \n## 本书布局\n\n本书中有许多代码示例，格式如下：\n\n**代码**\n\n```python\n# This is Python code\n\
    print(\"Hello, World!\")\n```\n\n为简洁起见，我们将使用三个点`...`来表示较长代码示例中保持不变的现有代码。例如，在下面的函数中，之前的内容保持不变，添加了`print()`语句。在这些情况下，还会有一个注释`#\
    \ new`，指示新代码添加的位置。\n\n**代码**\n\n```python\ndef make_my_website:\n    ...\n   \
    \ print(\"All done!\")  # new\n```\n\n本书的完整源代码可以在[官方Github仓库](https://github.com/wsvincent/djangoforprofessionals)⁴中找到。如果你的代码有任何问题，这是一个首先检查的好地方。\n\
    \n## 社区\n\n\"为框架而来，为社区而留\"是Django开发者中常说的一句话。虽然Django代码库非常令人印象深刻，但最终项目到目前为止以及未来的健康发展取决于围绕它成长的社区。Django开发在[django-developers](https://docs.djangoproject.com/en/dev/internals/mailing-lists/#django-developers-mailing-list)⁵列表上公开进行，该项目由非营利组织[Django软件基金会](https://www.djangoproject.com/foundation/)⁶监督，该基金会管理贡献、支持年度DjangoCon会议以及开发者聚集分享知识和见解的本地聚会。有一个官方的[Django论坛](https://forum.djangoproject.com/)，由社区许多成员组成，是寻求帮助的理想场所。\n\
    \n无论你的技术水平如何，参与Django本身都是学习、结识其他开发者以及提升自己声誉的好方法。\n\n## 结论\n\n对于任何希望用最少代码构建现代、健壮的Web应用程序的开发者来说，Django是一个绝佳的选择。在下一章中，我们将确保你的计算机已正确配置用于Web开发，然后在本书的其余部分深入探讨Django本身。\n\
    \n⁷https://forum.djangoproject.com/\n\n# 第1章：初始设置\n\n本章介绍如何正确配置你的Windows或macOS计算机以进行Django项目开发。它与*Django\
    \ for Beginners*和*Django for APIs*中的设置指南类似，所以如果你已经熟悉命令行、安装了最新版本的Python、知道如何创建虚拟环境并使用Git，你可以认为本章是可选的。否则，请通读本章以确保你的计算机为专业Django开发和本书其余部分的成功做好准备。\n\
    \n## 命令行\n\n命令行是开发者经常使用的纯文本界面。它让人回想起鼠标和图形用户界面成为常态之前的早期计算机界面时代。在实践中，有多个术语用于指代命令行：命令行界面（CLI）、控制台、终端、shell或提示符。严格来说，*终端*是打开新窗口以访问命令行的程序，*控制台*是基于文本的应用程序，*shell*是在底层操作系统上运行命令的程序，*提示符*是输入和运行命令的地方。一开始这些术语很容易混淆，但它们本质上都是同一个意思：命令行是我们在计算机上运行和执行纯文本命令的地方。\n\
    \n在Windows上，内置的终端和shell都称为*PowerShell*。要访问它，找到屏幕底部Windows按钮旁边的任务栏，输入\"powershell\"\
    来启动应用程序。它将打开一个新窗口，带有深蓝色背景和`>`提示符后的闪烁光标。以下是我的计算机上的样子。\n\n**Shell**\n\n```\nPS C:\\\
    Users\\wsv>\n```\n\n在macOS上，内置终端的名称恰如其分地称为*Terminal*。它可以通过Spotlight打开：同时按下`Command`和`空格键`，然后输入\"\
    terminal\"。或者，打开一个新的Finder窗口，导航到*Applications*目录，向下滚动打开Utilities目录，然后双击名为Terminal的应用程序。这将打开一个默认白色背景的新屏幕，以及`%`提示符后的闪烁光标。不要担心`%`提示符*左侧*显示的内容。它因计算机而异，以后可以自定义。\n\
    \n**Shell**\n\n```\nWills-Macbook-Pro:~ wsv%\n```\n\n为了避免每个操作系统不同提示符的混淆——Windows上的`>`和macOS上的`%`——在本书中，我们将使用Unix的`$`提示符来表示任何命令行用法。如果Windows和macOS之间存在差异，两个命令都会列出。\n\
    \n有许多可用的shell命令，但大多数开发者反复依赖相同的少数几个命令，并在需要时查找更复杂的命令。在大多数情况下，Windows（PowerShell）和macOS的命令是相似的。例如，`whoami`命令在Windows上返回计算机名/用户名，在macOS上仅返回用户名。与所有shell命令一样，输入命令本身，然后按`return`键。请注意，`#`符号表示注释，不会在命令行上执行。\n\
    \n**Shell**\n\n```\n# Windows\n$ whoami\nwsv2022/wsv\n\n# macOS\n$ whoami\nwsv\n\
    ```\n\n然而，有时Windows和macOS上的shell命令完全不同。一个很好的例子是向控制台输出基本的\"Hello, World!\"消息的命令。在Windows上，命令是`Write-Host`，而在macOS上，命令是`echo`。\n\
    \n**Shell**\n\n```\n# Windows\n$ Write-Host \"Hello, World!\"\nHello, World!\n\
    \n# macOS\n$ echo \"Hello, World!\"\nHello, World!\n```\n\n大多数Django开发者不是命令行专家，反复依赖相同的少数几个命令。在本书中，我将每次提供要运行的确切指令，但如果你好奇，可以在`ss64.com`找到每个操作系统的完整shell命令列表。\n\
    \n## 安装Python 3\n\n确保你的计算机上安装了最新版本的Python（截至本文撰写时为3.10）。在Windows上，Microsoft在Microsoft\
    \ Store中托管了Python 3的社区版本。在屏幕底部的搜索栏中输入\"python\"，然后点击最佳匹配结果。这将自动在Microsoft Store上启动Python\
    \ 3.10。点击蓝色的\"Get\"按钮进行下载。\n\n要确认Python已正确安装，请使用PowerShell打开一个新的Terminal窗口，然后输入`python\
    \ --version`。"
