    # # Chapter 15: Search


    Search is a fundamental feature of most websites and certainly anything e-commerce
    related like our Bookstore. In this chapter we will learn how to implement basic
    search with forms and filters. Then we will improve it with additional logic and
    touch upon ways to go even more deeply with search options in Django. We only
    have three books in our database now but the code here will scale to as many books
    as we''d like.


    Search functionality consists of two parts: a form to pass along a user search
    query and then a results page that performs a filter based on that query. Determining
    "the right" type of filter is where search becomes interesting and hard. But first
    we need to create both a form and the search results page.


    We could start with either one at this point, but we''ll configure the filtering
    first and then the form.


    # ## Search Results Page


    We''ll start with the search results page. As with all Django pages that means
    adding a dedicated URL, view, and template. The implementation order doesn''t
    particularly matter, but we will add them in that order.


    Within `books/urls.py`, add a `search/` path with a URL name of `search_results`
    that uses a view called `SearchResultsListView`.'
