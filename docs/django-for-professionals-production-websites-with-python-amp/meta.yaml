    \    success_url = reverse_lazy(\"login\")\n    template_name = \"registration/signup.html\"\
    \n```\n\nAs a final step create a file called templates/registration/signup.html\
    \ which will contain code basically identical to the log in page.\n\n## Code\n\
    \n```html\n<!-- templates/registration/signup.html -->\n{% extends \"_base.html\"\
    \ %}\n\n{% block title %}Sign Up{% endblock title %}\n\n{% block content %}\n\
    \  <h2>Sign Up</h2>\n  <form method=\"post\">\n    {% csrf_token %}\n    {{ form.as_p\
    \ }}\n    <button type=\"submit\">Sign Up</button>\n  </form>\n{% endblock content\
    \ %}\n```\n\nAs a final step we can add a line for \"Sign Up\" to our home.html\
    \ template right below the link for \"Log In\". This is a one-line change.\n\n\
    ## Code\n\n```html\n<!-- templates/home.html -->\n{% extends \"_base.html\" %}\n\
    \n{% block title %}Home{% endblock title %}\n\n{% block content %}\n  <h1>This\
    \ is our home page.</h1>\n  {% if user.is_authenticated %}\n    <p>Hi {{ user.email\
    \ }}!</p>\n    <p><a href=\"{% url 'logout' %}\">Log Out</a></p>\n  {% else %}\n\
    \    <p>You are not logged in</p>\n    <a href=\"{% url 'login' %}\">Log In</a>\n\
    \    <a href=\"{% url 'signup' %}\">Sign Up</a>\n  {% endif %}\n{% endblock content\
    \ %}\n```\n\nAll done! Reload the homepage to see our work.\n\n![](img/d9b58f5e350349fe0759c8474cded65a_102_0.png)\n\
    \nHomepage with Signup\n\nThe \"Sign Up\" link now redirects to the webpage http://127.0.0.1:8000/accounts/signup/.\n\
    \n![](img/d9b58f5e350349fe0759c8474cded65a_103_0.png)\n\nSignup page\n\nCreate\
