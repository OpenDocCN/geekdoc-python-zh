- md: "## Dockerfile\n\n```\n# Pull base image\nFROM python:3.10.4-slim-bullseye\n\
    \n# Set environment variables\nENV PIP_DISABLE_PIP_VERSION_CHECK 1\nENV PYTHONDONTWRITEBYTECODE\
    \ 1\nENV PYTHONUNBUFFERED 1\n\n# Set work directory\nWORKDIR /code\n\n# Install\
    \ dependencies\nCOPY ./requirements.txt .\nRUN pip install -r requirements.txt\n\
    \n# Copy project\nCOPY . .\n```\n\nDockerfiles are read from top-to-bottom when\
    \ an image is created. The first instruction is a `FROM` command that tells Docker\
    \ what base image we would like to use for our application. Docker images can\
    \ be inherited from other images so instead of creating our own base image, we'll\
    \ use the official Python image that already has all the tools and packages that\
    \ we need for our Django application. In this case we're using Python 3.10.4 and\
    \ the much smaller in size `slim` variant that does not contain the common packages\
    \ contained in the default tag. The tag `bullseye` refers to the latest stable\
    \ Debian release. It is a good idea to set this explicitly to minimize potential\
    \ breakage when there are new releases of Debian.\n\nThen we use the `ENV` command\
    \ to set three environment variables:\n\n- `PIP_DISABLE_PIP_VERSION_CHECK` disables\
    \ an automatic check for pip updates each time\n- `PYTHONDONTWRITEBYTECODE` means\
    \ Python will not try to write `.pyc` files\n- `PYTHONUNBUFFERED` ensures our\
    \ console output is not buffered by Docker\n\nThe command `WORKDIR` is used to\
    \ set a default working directory when running the rest of our commands. This\
    \ tells Docker to use this path as the default location for all subsequent commands.\
    \ As a result, we can use relative paths based on the working directory rather\
    \ than typing out the full file path each time. In our case the working directory\
    \ is `/code` but it can often be much longer and something like `/app/src`, `/usr/src/app`,\
    \ or similar variations depending upon the specific needs of a project.\n\nThe\
    \ next step is to install our dependencies with `pip` and the `requirements.txt`\
    \ file we already created. The `COPY` command takes two parameters: the first\
    \ parameter tells Docker what file(s) to copy into the image and the second parameter\
    \ tells Docker where you want the file(s) to be copied to. In this case we are\
    \ copying the existing `requirements.txt` file from our local computer into the\
    \ current working directory which is represented by `.`.\n\nOnce the `requirements.txt`\
    \ file is inside the image we can use our last command, `RUN`, to execute `pip\
    \ install`. This works exactly the same as if we were running `pip install` locally\
    \ on our machine, but this time the modules are installed into the image. The\
    \ `-r` flag tells `pip` to open a file–called `requirements.txt` here–and install\
    \ its contents. If we did not include the `-r` flag `pip` would try and fail to\
    \ install `requirements.txt` since it isn't itself an actual Python package.\n\
    \nAt the moment we have a new image based on the `slim-bullseye` variant of `Python\
    \ 3.10.4` and have installed our dependencies. The final step is to copy all the\
    \ files in our current directory into the working directory on the image. We can\
    \ do this by using the `COPY` command. Remember it takes two parameters so we'll\
    \ copy the current directory on our local filesystem (`.`) into the working directory\
    \ (`.`) of the image.\n\nIf you're confused right now don't worry. Docker is a\
    \ lot to absorb but the good news is that the steps involved to \"Dockerize\"\
    \ an existing project are very similar.\n\n## .dockerignore\n\nA `.dockerignore`\
    \ file is a best practice way to specify certain files and directories that should\
    \ not be included in a Docker image. This can help reduce overall image size and\
    \ improves security by keeping things that are meant to be secret out of Docker.\n\
    \nAt the moment we can safely ignore the local virtual environment (`.venv`),\
    \ our future `.git` directory, and a `.gitignore` file. In your text editor create\
    \ a new file called `.dockerignore` in the base directory next to the existing\
    \ `manage.py` file.\n\n```\n.venv\n.git\n.gitignore\n```\n\nWe now have our complete\
    \ instructions for creating a custom image but we haven't actually built it yet.\
    \ The command to do this is unsurprisingly `docker build` followed by the period,\
    \ `.`, indicating the `Dockerfile` is located in the current directory. There\
    \ will be a lot of output here. I've only included the first two lines and the\
    \ last one.\n\n## Shell\n\n```\n$ docker build .\n[+] Building 9.1s (10/10) FINISHED\n\
    \ => [internal] load build definition from Dockerfile\n...\n=> => writing image\
    \ sha256:89ede1...\n```\n\n## docker-compose.yml\n\nOur fully-built custom image\
    \ is now available to run as a container. In order to run the container we need\
    \ a list of instructions in a file called `docker-compose.yml`. With your text\
    \ editor create a `docker-compose.yml` file in the project-level directory next\
    \ to the `Dockerfile`. It will contain the following code.\n\n```\nversion: \"\
    3.9\"\nservices:\n  web:\n    build: .\n    ports:\n      - \"8000:8000\"\n  \
    \  command: python manage.py runserver 0.0.0.0:8000\n    volumes:\n      - .:/code\n\
    ```\n\nOn the top line we set the [most recent version](https://docs.docker.com/compose/compose-file/compose-versioning/)\
    \ of Docker Compose which is currently 3.9. Then we specify which services (or\
    \ containers) we want to have running within our Docker host. It's possible to\
    \ have multiple services running, but for now we just have one for web.\n\nWithin\
    \ web we set `build` to look in the current directory for our `Dockerfile`. We'll\
    \ use the Django default ports of `8000` and execute the command to run the local\
    \ web server. Finally the [volumes](https://docs.docker.com/storage/volumes/)\
    \ mount automatically syncs the Docker filesystem with our local computer's filesystem.\
    \ This if we make a change to the code within Docker it will automatically be\
    \ synced with the local filesystem.\n\nThe final step is to run our Docker container\
    \ using the command `docker-compose up`. This command will result in another long\
    \ stream of output code on the command line.\n\n## Shell\n\n```\n$ docker-compose\
    \ up\n[+] Building .4s (10/10) FINISHED\n => [internal] load build definition\
    \ from Dockerfile\n...\nAttaching to docker-web-1\ndocker-web-1  | Watching for\
    \ file changes with StatReloader\ndocker-web-1  | Performing system checks...\n\
    docker-web-1  |\ndocker-web-1  | System check identified no issues (0 silenced).\n\
    docker-web-1  | May 16, 2022 - 18:08:08\ndocker-web-1  | Django version 4.0.4,\
    \ using settings 'django_project.settings'\ndocker-web-1  | Starting development\
    \ server at http://0.0.0.0:8000/\ndocker-web-1  | Quit the server with CONTROL-C.\n\
    ```\n\nTo confirm it actually worked, go back to `http://127.0.0.1:8000/` in your\
    \ web browser. Refresh the page and the \"Hello, World\" page should still appear.\n\
    \nDjango is now running purely within a Docker container. We are not working within\
    \ a virtual environment locally. We did not execute the `runserver` command. All\
    \ of our code now exists and our Django server is running within a self-contained\
    \ Docker container. Success!\n\nWe will create multiple Docker images and containers\
    \ over the course of this book and with practice the flow will start to make more\
    \ sense:\n\n- create a `Dockerfile` with custom image instructions\n- add a `.dockerignore`\
    \ file\n- build the image\n- create a `docker-compose.yml` file\n- spin up the\
    \ container(s)\n\nStop the currently running container with `Control+c` (press\
    \ the \"Control\" and \"c\" button at the same time) and additionally type `docker-compose\
    \ down`. Docker containers take up a lot of memory so it's a good idea to stop\
    \ them when you're done using them. Containers are meant to be stateless which\
    \ is why we use `volumes` to copy our code over locally where it can be saved.\n\
    \n## Shell\n\n```\n$ docker-compose down\n[+] Running 2/0\n ⠿ Container docker-web-1\
    \  Removed\n ⠿ Network docker_default  Removed\n$\n```\n\nWhenever any new technology\
    \ is introduced there are potential security concerns. In Docker's case, one example\
    \ is that it sets the default user to `root`. The root user (also known as the\
    \ \"superuser\" or \"admin\") is a special user account used in Linux for system\
    \ administration. It is the most privileged user on a Linux system and has access\
    \ to all commands and files.\n\nThe Docker docs contain a large section on Security\
    \ and specifically on [rootless mode](https://docs.docker.com/engine/security/rootless/)²⁵\
    \ to avoid this. We will not be covering it here since this is a book on Django,\
    \ not Docker, but"
