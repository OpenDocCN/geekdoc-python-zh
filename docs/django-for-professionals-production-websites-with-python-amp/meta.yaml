  md: "# PermissionRequiredMixin\n\nThe last step is to apply the custom permission\
    \ using the [PermissionRequiredMixin](https://docs.djangoproject.com/en/4.0/topics/auth/default/#the-permissionrequiredmixin-mixin).\
    \ One of the many great features of class-based views is we can implement advanced\
    \ functionality with very little code on our part and this particular mixin is\
    \ a good example of that.\n\nWe will add `PermissionRequiredMixin` to our list\
    \ of imports on the top line. Then add it to `DetailView` *after* `LoginRequiredMixin`\
    \ but before `DetailView`. The order should make sense: if a user isn't already\
    \ logged in it makes no sense to do the additional check of whether they have\
    \ permission. Finally add a `permission_required` field which specifies the desired\
    \ permission. In our case its name is `special_status` and it exists on the books\
    \ model.\n\n# Code\n\n```\n# books/views.py\nfrom django.contrib.auth.mixins import\
    \ (\n    LoginRequiredMixin,\n    PermissionRequiredMixin  # new\n)\nfrom django.views.generic\
    \ import ListView, DetailView\n\nfrom .models import Book\n\n\nclass BookListView(LoginRequiredMixin,\
    \ ListView):\n    model = Book\n    context_object_name = \"book_list\"\n    template_name\
    \ = \"books/book_list.html\"\n    login_url = \"account_login\"\n\n\nclass BookDetailView(\n\
    \        LoginRequiredMixin,\n        PermissionRequiredMixin,  # new\n      \
    \  DetailView):\n    model = Book\n    context_object_name = \"book\"\n    template_name\
    \ = \"books/book_detail.html\"\n    login_url = \"account_login\"\n    permission_required\
    \ = \"books.special_status\"  # new\n```"
