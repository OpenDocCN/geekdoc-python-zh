  md: '# ## What is Docker?


    Docker is a way to isolate an entire operating system via Linux containers which
    are a type of [virtualization](https://en.wikipedia.org/wiki/Virtualization)^13.
    Virtualization has its roots at the beginning of computer science when large,
    expensive mainframe computers were the norm. How could multiple programmers use
    the same single machine? The answer was virtualization and specifically [virtual
    machines](https://en.wikipedia.org/wiki/Virtual_machine)^14 which are complete
    copies of a computer system from the operating system on up.


    If you rent space on a cloud provider like Amazon Web Services (AWS) they are
    typically not providing you with a dedicated piece of hardware. Instead you are
    sharing one physical server with other clients. But because each client has their
    virtual machine running on the server, it appears to the client as if they have
    their own server.


    This technology is what makes it possible to quickly add or remove servers from
    a cloud provider. It''s largely software behind the scenes, not actual hardware
    being changed.


    What''s the downside to a virtual machine? Size and speed. A typical guest operating
    system can easily take up 700MB of size. So if one physical server supports three
    virtual machines, that''s at least 2.1GB of disk space taken up along with separate
    needs for CPU and memory resources.


    Enter Docker. The key idea is that most computers rely on the same Linux operating
    system, so what if we virtualized from the Linux layer up instead? Wouldn''t that
    provide a lightweight, faster way to duplicate much of the same functionality?
    The answer is yes. And in recent years Linux containers have become widely popular.
    For most applications-especially web applications-a virtual machine provides far
    more resources than are needed and a container is more than sufficient. This,
    fundamentally, is what Docker is: a way to implement Linux containers!


    An analogy we can use here is that of homes and apartments. Virtual Machines are
    like homes: stand-alone buildings with their own infrastructure including plumbing
    and heating, as well as a kitchen, bathrooms, bedrooms, and so on. Docker containers
    are like apartments: they share common infrastructure like plumbing and heating,
    but come in various sizes that match the exact needs of an owner.


    +   13. https://en.wikipedia.org/wiki/Virtualization

    14. https://en.wikipedia.org/wiki/Virtual_machine'
