    # ## Primary Keys vs. IDs


    It can be confusing whether to use a primary key (PK) or an ID in a project, especially
    since Django''s `DetailView` treats them interchangeably. However there is a subtle
    difference.


    The `id` is a model field automatically set by Django internally to auto-increment.
    So the first book has an `id` of 1, the second entry of 2, and so on. This is
    also, by default, treated as the primary key `pk` of a model.


    However it''s possible to manually change what the primary key is for a model.
    It doesn''t have to be `id`, but could be something like `object_id` depending
    on the use case. Additionally Python has a built-in `id()`[^151] object which
    can sometimes cause confusion and/or bugs.


    By contrast the primary key `pk` refers to the primary key field of a model so
    you''re safer using `pk` when in doubt. And in fact in the next section we will
    update the `id` of our model!


    # ## Slugs vs. UUIDs


    Using the `pk` field in the URL of our `DetailView` is quick and easy, but not
    ideal for a real-world project. The `pk` is currently the same as our auto-incrementing
    `id`. Among other concerns, it tells a potential hacker *exactly* how many records
    you have in your database; it tells them exactly what the `id` is which can be
    used in a potential attack; and there can be synchronization issues if you have
    multiple front-ends.


    There are two alternative approaches. The first is called a "slug," a newspaper
    term for a short label for something that is often used in URLs. For example,
    in our example of "Django for Professionals" its slug could be `django-for-professionals`.
    There''s even a `SlugField`[^152] model field that can be used and either added
    when creating the `title` field by hand or auto-populated upon save. The main
    challenge with slugs is handling duplicates, though this can be solved by


    [^151]: https://docs.python.org/3/library/functions.html#id


    [^152]: https://docs.djangoproject.com/en/4.0/ref/models/fields/#slugfield'
  merge: -1
  pgno: 186
- img_proc: true
  md: "adding random strings or numbers to a given slug field. The synchronization\
    \ issue remains though.\n\nA better approach is to use a [UUID (Universally Unique\
    \ IDentifier)](https://docs.python.org/3/library/uuid.html?highlight=uuid#module-uuid)\
    \ which Django now supports via a dedicated [UUIDField](https://docs.djangoproject.com/en/4.0/ref/models/fields/#django.db.models.UUIDField).\n\
    \nLet's implement a UUID now by adding a new field to our model and then updating\
    \ the URL path.\n\nImport `uuid` at the top and then update the `id` field to\
    \ actually be a `UUIDField` that is now the primary key. We also use `uuid4` for\
    \ the encryption. This allows us to use `DetailView` which requires either a slug\
    \ or pk field; it won't work with a `UUID` field without significant modification.\n\
    \n# Code\n\n```\npython\n# books/models.py\nimport uuid  # new\nfrom django.db\
    \ import models\nfrom django.urls import reverse\n\n\nclass Book(models.Model):\n\
    \    id = models.UUIDField(  # new\n        primary_key=True,\n        default=uuid.uuid4,\n\
    \        editable=False)\n    title = models.CharField(max_length=200)\n    author\
    \ = models.CharField(max_length=200)\n    price = models.DecimalField(max_digits=6,\
    \ decimal_places=2)\n\n    def __str__(self):\n        return self.title\n\n \
    \   def get_absolute_url(self):\n        return reverse(\"book_detail\", args=[str(self.id)])\n\
    ```\n\nIn the URL path swap out `int` for `uuid` in the detail view."
