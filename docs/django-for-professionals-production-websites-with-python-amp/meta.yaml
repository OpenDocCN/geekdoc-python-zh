    # # Chapter 2: Docker Hello, World!


    Properly configuring a local development environment remains a steep challenge
    despite all the other advances in modern programming. There are simply too many
    variables: different computers, operating systems, versions of Django, virtual
    environment options, and so on. When you add in the challenge of working in a
    team environment where everyone needs to have the same set up the problem only
    magnifies itself.


    In recent years a solution has emerged: [Docker](https://www.docker.com/)¹². It
    has quickly become the default choice for many developers working on production-level
    projects.


    With Docker it''s finally possible to faithfully and dependably reproduce a production
    environment locally, everything from the proper Python version to installing Django
    and running additional services like a production-level database. This means it
    no longer matter if you are on a Mac, Windows, or Linux computer. Everything is
    running within Docker itself.


    Docker also makes collaboration in teams exponentially easier. Gone are the days
    of sharing long, out-of-date `README` files for adding a new developer to a group
    project. Instead with Docker you simply share two files–a `dockerfile` and `docker-compose.yml`
    file–and the developer can have confidence that their local development environment
    is exactly the same as the rest of the team.


    Docker is not a perfect technology. It is still relatively new, complex under-the-hood,
    and under active development. But the promise that it aspires to–a consistent
    and shareable developer environment, that can be run either locally on any computer
    or deployed to any server–makes it a solid choice. It is also widely used among
    companies at this point so writing a book for "Professionals" and not covering
    Docker feels shortsighted.


    In this chapter we''ll learn a little bit more about Docker itself and "Dockerize"
    our first Django project.


    ¹²https://www.docker.com/'
- md: "## What is Docker?\n\nDocker is a way to isolate an entire operating system\
    \ via Linux containers which are a type of [virtualization](https://en.wikipedia.org/wiki/Virtualization)^13.\
    \ Virtualization has its roots at the beginning of computer science when large,\
    \ expensive mainframe computers were the norm. How could multiple programmers\
    \ use the same single machine? The answer was virtualization and specifically\
    \ [virtual machines](https://en.wikipedia.org/wiki/Virtual_machine)^14 which are\
    \ complete copies of a computer system from the operating system on up.\n\nIf\
    \ you rent space on a cloud provider like Amazon Web Services (AWS) they are typically\
    \ not providing you with a dedicated piece of hardware. Instead you are sharing\
    \ one physical server with other clients. But because each client has their virtual\
    \ machine running on the server, it appears to the client as if they have their\
    \ own server.\n\nThis technology is what makes it possible to quickly add or remove\
    \ servers from a cloud provider. It's largely software behind the scenes, not\
    \ actual hardware being changed.\n\nWhat's the downside to a virtual machine?\
    \ Size and speed. A typical guest operating system can easily take up 700MB of\
    \ size. So if one physical server supports three virtual machines, that's at least\
    \ 2.1GB of disk space taken up along with separate needs for CPU and memory resources.\n\
    \nEnter Docker. The key idea is that most computers rely on the same Linux operating\
    \ system, so what if we virtualized from the Linux layer up instead? Wouldn't\
    \ that provide a lightweight, faster way to duplicate much of the same functionality?\
    \ The answer is yes. And in recent years Linux containers have become widely popular.\
    \ For most applications—especially web applications—a virtual machine provides\
    \ far more resources than are needed and a container is more than sufficient.\
    \ This, fundamentally, is what Docker is: a way to implement Linux containers!\n\
    \nAn analogy we can use here is that of homes and apartments. Virtual Machines\
    \ are like homes: stand-alone buildings with their own infrastructure including\
    \ plumbing and heating, as well as a kitchen, bathrooms, bedrooms, and so on.\
    \ Docker containers are like apartments: they share common infrastructure like\
    \ plumbing and heating, but come in various sizes that match the exact needs of\
    \ an owner.\n\n- 13. https://en.wikipedia.org/wiki/Virtualization\n- 14. https://en.wikipedia.org/wiki/Virtual_machine\n\
    \n## Virtual Environments vs Containers\n\nVirtual environments are a way to isolate\
    \ Python packages. Thanks to virtual environments, one computer can run multiple\
    \ projects locally. For example, Project A might use Python 3.10 and Django 4.0\
    \ among other dependencies; whereas Project B uses Python 3.5 and Django 1.11.\
    \ By creating a new virtual environment for each project and installing Python\
    \ packages into it, rather than globally on the computer itself, all the necessary\
    \ Python packages can be maintained, managed, and updated as needed.\n\nThere\
    \ are several ways to implement virtual environments but arguably the simplest\
    \ is with the [venv](https://docs.python.org/3/library/venv.html) module already\
    \ installed as part of the Python 3 standard library. We will use `venv` shortly\
    \ to install Django locally on the computer.\n\nThe important distinction between\
    \ virtual environments and Docker containers is that virtual environments *can\
    \ only isolate Python packages*. They cannot isolate non-Python software like\
    \ a PostgreSQL or MySQL database. And virtual environments still rely on a global,\
    \ system-level installation of Python (in other words, on your computer). The\
    \ virtual environment points to an existing Python installation; it does not contain\
    \ Python itself.\n\nLinux containers go a step further and isolate the entire\
    \ operating system, not just the Python parts. In other words, we will install\
    \ Python itself within Docker as well as install and run a production-level database.\n\
    \nDocker itself is a complex topic and we won't dive that deep into it in this\
    \ book, however understanding its background and key components is important.\
    \ If you'd like to learn more about it, I recommend the [Dive into Docker video\
    \ course](https://diveintodocker.com/ref-dfp).\n\n## Install Docker\n\nOk, enough\
    \ theory. Let's start using Docker and Django together. The first step is to sign\
    \ up for a free account on [Docker Hub](https://hub.docker.com/signup) and then\
    \ install the Docker desktop app on your local machine:\n\n- Docker for Mac^18\n\
    - Docker for Windows^19\n\nThis download might take some time as it is a very\
    \ big file! Feel free to stretch your legs at this point.\n\nOnce Docker is done\
    \ installing we can confirm the correct version is running by typing the command\
    \ `docker --version` in the command line shell. It should be at least version\
    \ 18.\n\n**Shell**\n\n```\n$ docker --version\nDocker version 20.10.14, build\
    \ a224086\n```\n\n## Docker Hello, World\n\nDocker ships with its own \"Hello,\
    \ World\" image that is a helpful first step to run. On the command line type\
    \ `docker run hello-world`. This will download an official Docker image and then\
    \ run it within a container. We'll discuss both images and containers in a moment.\n\
    \n**Shell**\n\n```\n$ docker run hello-world\nUnable to find image 'hello-world:latest'\
    \ locally\nlatest: Pulling from library/hello-world\n7050e35b49f5: Pull complete\n\
    Digest: sha256:80f31da1ac7b312ba29d65080fddf797dd76acfb870e677f390d5acba9741b17\n\
    Status: Downloaded newer image for hello-world:latest\n\nHello from Docker!\n\
    This message shows that your installation appears to be working correctly.\n```\n\
    \nTo generate this message, Docker took the following steps:\n\n1. The Docker\
    \ client contacted the Docker daemon.\n2. The Docker daemon pulled the \"hello-world\"\
    \ image from the Docker Hub. (arm64v8)\n3. The Docker daemon created a new container\
    \ from that image which runs the executable that produces the output you are currently\
    \ reading.\n4. The Docker daemon streamed that output to the Docker client, which\
    \ sent it to your terminal.\n\nTo try something more ambitious, you can run an\
    \ Ubuntu container with:\n\n```\n$ docker run -it ubuntu bash\n```\n\nShare images,\
    \ automate workflows, and more with a free Docker ID:\n\nhttps://hub.docker.com/\n\
    \nFor more examples and ideas, visit:\n\nhttps://docs.docker.com/get-started/\n\
    \nThe command `docker info` lets us inspect Docker. It will contain a lot of output\
    \ but focus on the top lines which show we now have 1 container which is stopped\
    \ and 1 image.\n\n**Shell**\n\n```\n$ docker info\nClient:\n Debug Mode: false\n\
    \nServer:\n Containers: 1\n  Running: 0\n  Paused: 0\n  Stopped: 1\n Images: 1\n\
    ...\n```\n\nThis means Docker is successfully installed and running.\n\n## Install\
    \ Django\n\nNow we will create a Django \"Hello, World\" project that runs locally\
    \ on our computer and then move it entirely within Docker (\"Dockerize it\") so\
    \ you can see how all the pieces fit together.\n\nYou can save your Django code\
    \ anywhere you like but for convenience we will place our code the desktop directory.\
    \ The command `cd` (change directory) followed by the intended location works\
    \ on both Windows and macOS computers to navigate to the desktop from the command\
    \ line.\n\n**Shell**\n\n```\n# Windows\n$ cd onedrive\\desktop\n$ pwd\n\nPath\n\
    ----\nC:\\Users\\wsv\\onedrive\\desktop\n\n# macOS\n$ cd desktop\n$ pwd\n/Users/wsv/desktop\n\
    ```\n\nTo make a new directory use the command `mkdir` followed by the name. We\
    \ will create one called `code` on the Desktop and then within it a new directory\
    \ called `ch2-hello`.\n\n**Shell**\n\n```\n# Windows\n$ mkdir code\n$ cd code\n\
    $ mkdir ch2-hello\n$ cd ch2-hello\n\n# macOS\n$ mkdir code\n$ cd code\n$ mkdir\
    \ ch2-hello\n$ cd ch2-hello\n```\n\nTo create a virtual environment within this\
    \ new directory use the format `python -m venv <name_of_env>` on Windows or `python3\
    \ -m venv <name_of_env>` on macOS. Once created, a virtual environment must be\
    \ *activated*. It is up to the developer to choose a proper environment name but\
    \ a common choice is to call it `.venv`.\n\nOn Windows an Execution Policy must\
    \ be set to enable running scripts. This is a safety precaution. The [Python docs](https://docs.python.org/3/library/venv.html)^20\
    \ recommend allowing scripts for the `CurrentUser` only, which is what we will"
  mdcn: "## 什么是 Docker？\n\nDocker 是一种通过 Linux 容器来隔离整个操作系统的方式，而 Linux 容器是一种[虚拟化](https://en.wikipedia.org/wiki/Virtualization)^13技术。虚拟化的根源可以追溯到计算机科学初期，当时大型、昂贵的大型计算机是常态。多个程序员如何使用同一台机器？答案就是虚拟化，特别是[虚拟机](https://en.wikipedia.org/wiki/Virtual_machine)^14——即从操作系统开始向上完整复制整个计算机系统。\n\
    \n如果你在亚马逊网络服务（AWS）等云提供商上租用空间，它们通常不会为你提供专用的硬件。相反，你与其他客户共享一台物理服务器。但由于每个客户都在该服务器上运行自己的虚拟机，对客户而言就像拥有自己的服务器一样。\n\
    \n这项技术使得从云提供商快速添加或移除服务器成为可能。这主要是幕后的软件操作，而非实际硬件的变更。\n\n虚拟机的缺点是什么？体积和速度。一个典型的客户操作系统可以轻松占用\
    \ 700MB 的空间。因此，如果一台物理服务器支持三个虚拟机，那至少需要 2.1GB 的磁盘空间，外加独立的 CPU 和内存资源需求。\n\nDocker\
    \ 应运而生。核心思想是大多数计算机都依赖相同的 Linux 操作系统，那么如果我们从 Linux 层开始向上虚拟化会怎样？这不就提供了一种轻量级、更快速的方式来实现大部分相同功能吗？答案是肯定的。近年来，Linux\
    \ 容器已变得广受欢迎。对于大多数应用程序——尤其是 Web 应用程序——虚拟机提供的资源远远超出所需，而容器则完全足够。从根本上说，这就是 Docker：一种实现\
    \ Linux 容器的方式！\n\n我们可以用一个类比来理解：房屋和公寓。虚拟机就像房屋：独立的建筑，拥有自己的基础设施，包括管道和供暖，以及厨房、浴室、卧室等。Docker\
    \ 容器就像公寓：它们共享管道和供暖等公共基础设施，但有各种尺寸，精确匹配业主的需求。\n\n- 13. https://en.wikipedia.org/wiki/Virtualization\n\
    - 14. https://en.wikipedia.org/wiki/Virtual_machine\n\n## 虚拟环境与容器\n\n虚拟环境是一种隔离\
    \ Python 包的方式。借助虚拟环境，一台计算机可以在本地运行多个项目。例如，项目 A 可能使用 Python 3.10 和 Django 4.0 等依赖项；而项目\
    \ B 使用 Python 3.5 和 Django 1.11。通过为每个项目创建新的虚拟环境，并将 Python 包安装到其中，而不是全局安装到计算机上，所有必需的\
    \ Python 包都可以按需维护、管理和更新。\n\n实现虚拟环境有几种方式，但可以说最简单的是使用 [venv](https://docs.python.org/3/library/venv.html)\
    \ 模块，它已作为 Python 3 标准库的一部分预先安装。我们很快将使用 `venv` 在计算机上本地安装 Django。\n\n虚拟环境与 Docker\
    \ 容器之间的重要区别在于，虚拟环境*只能隔离 Python 包*。它们无法隔离非 Python 软件，如 PostgreSQL 或 MySQL 数据库。而且虚拟环境仍然依赖全局的、系统级别的\
    \ Python 安装（换句话说，在你的计算机上）。虚拟环境指向现有的 Python 安装；它本身不包含 Python。\n\nLinux 容器更进一步，隔离整个操作系统，而不仅仅是\
