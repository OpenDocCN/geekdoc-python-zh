    \ still visible in our source code as it's merely moved to `docker-compose.yml`\
    \ which is tracked by Git. This is true! However, when we configure our website\
    \ for production, we will create a separate file for production purposes—`docker-compose-production.yml`—and\
    \ immediately add it to our `.gitignore` file so it is not tracked in the source\
