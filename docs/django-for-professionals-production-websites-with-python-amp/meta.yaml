- md: "especially if your website stores sensitive information do review the entire\
    \ Security section closely before going live.\n\n## Git\n\nGit is the version\
    \ control system of choice these days and we'll use it in this book. Initialize\
    \ a new repository with `git init` and run `git status` to see which files/directories\
    \ will be tracked.\n\n**Shell**\n\n```\n$ git init\n$ git status\n```\n\nBefore\
    \ making our first commit it is always a good idea to create a `.gitignore` file\
    \ in the project root directory. We will include our virtual environment directory,\
    \ `.venv`, the pycache folder, the local database `db.sqlite3`, and if on macOS\
    \ `.DS_Store`.\n\n**.gitignore**\n\n```\n.venv\n__pycache__/\ndb.sqlite3\n.DS_Store\
    \  # Mac only\n```\n\nIf you run `git status` again it should show the following:\n\
    \n**Shell**\n\n```\n$ git status\n.......\n```\n\nBoth the database and virtual\
    \ environment are not ignored by Git. Go ahead and add all current files to Git\
    \ and create our first commit and message.\n\n```\n$ git add .\n$ git commit -m\
    \ 'ch2-hello'\n```\n\nYou can compare your code for this chapter with the [official\
    \ repository](https://github.com/wsvincent/djangoforprofessionals/tree/main/ch2-hello)\
    \ available on Github.\n\n### Conclusion\n\nDocker is a self-contained environment\
    \ that includes everything we need for local development: web services, databases,\
    \ and more if we want. The general pattern will always be the same when using\
    \ it with Django:\n\n- create a new virtual environment and install Django\n-\
    \ create a new Django project within it\n- write a `Dockerfile` and build the\
    \ initial image\n- write a `docker-compose.yml` file and run the container with\
    \ `docker-compose up`\n\nWe will build several more Django projects with Docker\
    \ so this flow makes more sense, but that's really all there is to it. In the\
    \ next chapter we'll create a new Django project using Docker and add PostgreSQL\
    \ in a separate container as our database.\n\n## Chapter 3: PostgreSQL\n\nOne\
    \ of the most immediate differences between working on a \"toy app\" in Django\
    \ and a production-ready one is the database. Django ships with SQLite as the\
    \ default choice for local development because it is small, fast, and file-based\
    \ which makes it easy to use. No additional installation or configuration is required.\n\
    \nHowever this convenience comes at a cost. Generally speaking SQLite is not a\
    \ good database choice for professional websites. So while it is fine to use SQLite\
    \ locally while prototyping an idea, it is rare to actually use SQLite as the\
    \ database on a production project.\n\nDjango ships with built-in support for\
    \ [five databases](https://docs.djangoproject.com/en/4.0/ref/databases/#databases)[^27]:\
    \ PostgreSQL, MariaDB, MySQL, Oracle, and SQLite. We'll be using [PostgreSQL](https://www.postgresql.org/)[^28]\
    \ in this book as it is the most popular choice for Django developers, however,\
    \ the beauty of Django's ORM (Object-Relational-Mapper) is that even if we wanted\
    \ to use MySQL, MariaDB, or Oracle the actual Django code we write will be almost\
    \ identical. The Django ORM handles the translation from Python code to SQL configured\
    \ for each database automatically for us which is quite amazing if you think about\
    \ it.\n\nThe challenge of using non-file based databases is that they must be\
    \ installed and run locally if you want to faithfully mimic a production environment\
    \ on your own computer. And we do want that! While Django handles the details\
    \ of switching between databases for us there are inevitably small, hard-to-catch\
    \ bugs that can crop up if you use SQLite for local development but a different\
    \ database in production. Therefore a best practice is to use the same database\
    \ locally and in production.\n\nIn this chapter we'll start a new Django project\
    \ with a SQLite database and then switch over to both Docker and PostgreSQL.\n\
    \n[^27]: https://docs.djangoproject.com/en/4.0/ref/databases/#databases\n[^28]:\
    \ https://www.postgresql.org/\n\n### Django Set Up\n\nOn the command line make\
    \ sure you've navigated back to the code folder on our desktop. You can do this\
    \ two ways. Either type `cd ..` to move \"up\" a level so if you are currently\
    \ in `Desktop/code/hello` you will move to `Desktop/code`. Or you can simply type\
    \ `cd onedrive\\desktop` on Windows or `cd ~/desktop/code` on macOS which will\
    \ take you directly to the code directory. Then create a new directory called\
    \ `ch3-postgresql` for this chapter's code.\n\n**Shell**\n\n```\n# Windows\n$\
    \ cd onedrive\\desktop\n$ mkdir ch3-postgresql\n\n# macOS\n$ cd ~/desktop/code\n\
    $ mkdir ch3-postgresql\n```\n\nWe will follow the standard steps for creating\
    \ a new Django project: make a dedicated virtual environment, activate it, and\
    \ install Django.\n\n**Shell**\n\n```\n# Windows\n$ python -m venv .venv\n$ Set-ExecutionPolicy\
    \ -ExecutionPolicy RemoteSigned -Scope CurrentUser\n$ .venv\\Scripts\\Activate.ps1\n\
    (.venv) $ python -m pip install django~=4.0.0\n\n# macOS\n$ python3 -m venv .venv\n\
    $ source .venv/bin/activate\n(.venv) $ python3 -m pip install django~=4.0.0\n\
    ```\n\nNext we can create a new project called `django_project`, migrate our database\
    \ to initialize it, and use `runserver` to start the local server.\n\n**Shell**\n\
    \n```\n(.venv) $ django-admin startproject django_project .\n(.venv) $ python\
    \ manage.py migrate\n(.venv) $ python manage.py runserver\n```\n\nNormally I don't\
    \ recommend running `migrate` on new projects until *after* a custom user model\
    \ has been configured. Otherwise Django will bind the database to the built-in\
    \ `User` model which is difficult to modify later on in the project. We'll cover\
    \ this properly in Chapter 3 but since this chapter is primarily for demonstration\
    \ purposes, using the default `User` model here is a one-time exception.\n\nConfirm\
    \ everything worked by navigating to `http://127.0.0.1:8000/` in your web browser.\
    \ You may need to refresh the page but should see the familiar Django welcome\
    \ page.\n\nThe last step before switching over to Docker is creating a `requirements.txt`\
    \ file using the command we learned in the previous chapter.\n\n**Shell**\n\n\
    ```\n(.venv) $ pip freeze > requirements.txt\n```\n\nThis will generate a new\
    \ `requirements.txt` file containing the pinned contents of our current virtual\
    \ environment.\n\n### Docker\n\nTo switch over to Docker first `deactivate` our\
    \ virtual environment and then in your text editor create new `Dockerfile` and\
    \ `docker-compose.yml` files which will control our Docker image and container\
    \ respectively.\n\n**Shell**\n\n```\n(.venv) $ deactivate\n$\n```\n\nThe Dockerfile\
    \ is the same as in Chapter 1.\n\n**Dockerfile**\n\n```\n# Pull base image\nFROM\
    \ python:3.10.4-slim-bullseye\n\n# Set environment variables\nENV PIP_DISABLE_PIP_VERSION_CHECK\
    \ 1\nENV PYTHONDONTWRITEBYTECODE 1\nENV PYTHONUNBUFFERED 1\n\n# Set work directory\n\
    WORKDIR /code\n\n# Install dependencies\nCOPY ./requirements.txt .\nRUN pip install\
    \ -r requirements.txt\n\n# Copy project\nCOPY . .\n```\n\nBefore building the\
    \ image make sure to create a `.dockerignore` file.\n\n**.dockerignore**\n\n```\n\
    .venv\n.git\n.gitignore\n```\n\nNotice that if you build the initial image using\
    \ the `docker build .` command it is much, much faster than the previous chapter.\n\
    \n**Shell**\n\n```\n$ docker build .\n...\n---> Using cache\n```\n\nThat's because\
    \ whenever you build a new `Dockerfile`, Docker will automatically check if it\
    \ can use the cached results of previous builds. And since this `Dockerfile` is\
    \ the same as the one from Chapter 1 everything is the same except for the final\
    \ `COPY` command that syncs local files with those on the container's filesystem.\n\
    \nThis caching means that the order of a `Dockerfile` is important for performance\
    \ reasons. In order to avoid constantly invalidating the cache we start the `Dockerfile`\
    \ with commands that are less likely to change while putting commands that are\
    \ more likely to change, like `COPY`ing the local filesystem, at the end.\n\n\
    Time now for the `docker-compose.yml` file which also matches what we saw previously\
    \ in Chapter 1.\n\n**docker-compose.yml**\n\n```\nversion: \"3.9\"\n\nservices:\n\
    \  web:\n    build: .\n    command: python /code/manage.py runserver 0.0.0.0:8000\n\
    \    volumes:\n      - .:/code\n    ports:\n      - 8000:8000\n```\n\n### Detached\
    \ Mode\n\nWe'll start up our container now but this time in detached mode which\
    \ requires either the `-d` or `--detach` flag (they do the same thing)."
