    \ homepage\n\nYou can also click on the `Users` section to see the email and username\
    \ of your superuser account.\n\n![](img/d9b58f5e350349fe0759c8474cded65a_70_1.png)\n\
    \nDjango admin users page\n\n## Tests\n\nSince we've added new functionality to\
    \ our project we should test it. Whether you are a solo developer or working on\
    \ a team, tests are important. In the words of Django co-founder Jacob Kaplan-Moss,\
    \ \"Code without tests is broken as designed.\"\n\nThere are two main types of\
    \ tests:\n\n- Unit tests are small, fast, and isolated to a specific piece of\
    \ functionality\n- Integration tests are large, slow, and used for testing an\
    \ entire application or a user flow like payment that covers multiple screens\n\
    \nYou should write many unit tests and a small number of integration tests.\n\n\
    The Python programming language contains its own [unit testing framework](https://docs.python.org/3/library/unittest.html)\
    \ and Django's [automated testing framework](https://docs.djangoproject.com/en/4.0/topics/testing/)\
    \ extends this with multiple additions into a web context. There is no excuse\
    \ for not writing a lot of tests; they will save you time.\n\nIt's important to\
    \ note that not everything needs to be tested. For example, any built-in Django\
    \ features already contain tests in the source code. If we were using the default\
    \ `User` model in our project we would not need to test it. But since we've created\
    \ a `CustomUser` model we should.\n\n## Unit Tests\n\nTo write unit tests in Django\
    \ we use [TestCase](https://docs.djangoproject.com/en/4.0/topics/testing/tools/#django.test.TestCase)\
    \ which is, itself, an extension of Python's [TestCase](https://docs.python.org/3/library/unittest.html#unittest.TestCase).\
    \ Our accounts app already contains a `tests.py` file which is automatically added\
    \ when the `startapp` command is used. Currently it is blank. Let's fix that!\n\
    \nEach method must be prefaced with `test` in order to be run by the Django test\
    \ suite. It is also a good idea to be overly descriptive with your unit test names\
    \ since mature projects have hundreds if not thousands of tests!\n\n### Code\n\
    \n```python\n# accounts/tests.py\nfrom django.contrib.auth import get_user_model\n\
    from django.test import TestCase\n\n\nclass CustomUserTests(TestCase):\n    def\
    \ test_create_user(self):\n        User = get_user_model()\n        user = User.objects.create_user(\n\
    \            username=\"will\", email=\"will@email.com\", password=\"testpass123\"\
    \n        )\n        self.assertEqual(user.username, \"will\")\n        self.assertEqual(user.email,\
    \ \"will@email.com\")\n        self.assertTrue(user.is_active)\n        self.assertFalse(user.is_staff)\n\
    \        self.assertFalse(user.is_superuser)\n\n    def test_create_superuser(self):\n\
    \        User = get_user_model()\n        admin_user = User.objects.create_superuser(\n\
    \            username=\"superadmin\", email=\"superadmin@email.com\", password=\"\
    testpass123\"\n        )\n        self.assertEqual(admin_user.username, \"superadmin\"\
    )\n        self.assertEqual(admin_user.email, \"superadmin@email.com\")\n    \
    \    self.assertTrue(admin_user.is_active)\n        self.assertTrue(admin_user.is_staff)\n\
    \        self.assertTrue(admin_user.is_superuser)\n```\n\nWe have imported both\
    \ get_user_model and TestCase before creating a CustomUserTests class. Within\
    \ it are two separate tests. test_create_user confirms that a new user can be\
    \ created. First we set our user model to the variable User and then create one\
    \ via the manager method create_user[^49] which does the actual work of creating\
    \ a new user with the proper permissions.\n\nFor test_create_superuser we follow\
    \ a similar pattern but reference create_superuser[^50] instead of create_user.\
    \ The difference between the two users is that a superuser should have both is_staff\
    \ and is_superuser set to True.\n\n[^49]: https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.models.UserManager.create_user\n\
    \n[^50]: https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.models.UserManager.create_superuser\n\
    \nTo run our tests within Docker we'll prefix `docker-compose exec web` to the\
    \ traditional command `python manage.py test`.\n\n### Shell\n\n```shell\n$ docker-compose\
    \ exec web python manage.py test\nFound 2 test(s).\nCreating test database for\
    \ alias 'default'...\nSystem check identified no issues (0 silenced).\n..\n----------------------------------------------------------------------\n\
    Ran 2 tests in 0.115s\n\nOK\nDestroying test database for alias 'default'...\n\
    ```\n\nAll the tests pass so we can proceed.\n\n### Git\n\nWe've accomplished\
    \ quite a lot in this chapter so it is a good point to pause and commit our work\
    \ by initializing a new Git repository, adding changes, and including a commit\
    \ message.\n\n### Shell\n\n```shell\n$ git init\n$ git status\n$ git add .\n$\
    \ git commit -m 'ch4'\n```\n\nYou can compare with the [official source code for\
    \ this chapter on Github](https://github.com/wsvincent/djangoforprofessionals/tree/main/ch4-books)[^51].\n\
    \n## Conclusion\n\nOur Bookstore project is now running with Docker and PostgreSQL\
    \ and we've configured a custom user model. Next up will be a pages app for our\
    \ static pages.\n\n# Chapter 5: Pages App\n\nLet's build a homepage for our new\
    \ project. For now this will be a static page meaning it will not interact with\
    \ the database in any way. Later on it will be a dynamic page displaying books\
    \ for sale but... one thing at a time.\n\nIt's common to have multiple static\
    \ pages in even a mature project such as an About page so let's create a dedicated\
    \ pages app for them. On the command line use the `startapp` command again to\
    \ make a pages app.\n\n### Shell\n\n```shell\n$ docker-compose exec web python\
    \ manage.py startapp pages\n```\n\nThen add it to our `INSTALLED_APPS` setting.\
    \ We'll also update `TEMPLATES` so that Django will look for a project-level templates\
    \ folder. By default Django looks within each app for a templates folder, but\
    \ organizing all templates in one space is easier to manage.\n\n### Code\n\n```python\n\
    # django_project/settings.py\nINSTALLED_APPS = [\n    \"django.contrib.admin\"\
    ,\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\",\n    \"\
    django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"django.contrib.staticfiles\"\
    ,\n    # Local\n    \"accounts.apps.AccountsConfig\",\n    \"pages.apps.PagesConfig\"\
    ,  # new\n]\n\nTEMPLATES = [\n    {\n        ...\n        \"DIRS\": [BASE_DIR\
    \ / \"templates\"],  # new\n```\n\n```python\n    ...\n  }\n]\n```\n\nNote that\
    \ updating the `DIRS` setting means that Django will also look in this new folder;\
    \ it will still look for any templates folders within an app.\n\n## Templates\n\
    \nMoving on it is time to create that new templates directory on the command line.\n\
    \n### Shell\n\n```shell\n$ mkdir templates\n```\n\nThen with your text editor\
    \ create two new files within it: `templates/_base.html` and `templates/home.html`.\
    \ The first base level file will be inherited by all other files; `home.html`\
    \ will be our homepage.\n\nWhy call the base template `_base.html` with the underscore\
    \ instead of `base.html`? This is an optional practice but some developers prefer\
    \ to add an underscore, `_`, to files solely meant to be inherited by other files.\n\
    \nIn the base file we'll include the bare minimum needed and add `block` tags\
    \ for both `title` and `content`. Block tags give higher-level templates the option\
    \ to override just the content within the tags. For example, the homepage will\
    \ have a title of \"Home\" but we want that to appear between html `<title></title>`\
    \ tags. Using block tags make it easier to update this content, as needed, in\
    \ inherited templates.\n\nWhy use the name `content` for the main content of our\
    \ project? This name could be anything—`main` or some other generic indicator—but\
    \ using `content` is a common naming convention in the Django world. Can you use\
    \ something else? Absolutely. Is `content` the most common one you'll see? Yes."
  mdcn: "在浏览器中打开页面 `http://127.0.0.1:8000/admin` 并登录。你应该能在登录后页面的右上角看到你的超级用户名。\n\n\
    ![](img/d9b58f5e350349fe0759c8474cded65a_70_0.png)\n\nDjango 管理后台首页\n\n你也可以点击\
    \ `Users` 部分来查看超级用户账户的邮箱和用户名。\n\n![](img/d9b58f5e350349fe0759c8474cded65a_70_1.png)\n\
    \nDjango 管理后台用户页面\n\n## 测试\n\n由于我们已为项目添加了新功能，因此应该对其进行测试。无论你是独立开发者还是团队成员，测试都很重要。用\
    \ Django 联合创始人 Jacob Kaplan-Moss 的话来说，\"没有测试的代码就是设计上的缺陷。\"\n\n测试主要有两种类型：\n\n-\
    \   单元测试规模小、速度快，且针对特定功能进行隔离测试\n-   集成测试规模大、速度慢，用于测试整个应用或覆盖多个页面的用户流程（如支付流程）\n\n\
    你应该编写大量单元测试和少量集成测试。\n\nPython 编程语言自带[单元测试框架](https://docs.python.org/3/library/unittest.html)，而\
    \ Django 的[自动化测试框架](https://docs.djangoproject.com/en/4.0/topics/testing/)在此基础上进行了多项扩展，使其适用于\
    \ Web 场景。不写大量测试是没有借口的；测试会为你节省时间。\n\n需要注意的是，并非所有内容都需要测试。例如，任何内置的 Django 功能在源代码中已经包含了测试。如果我们在项目中使用默认的\
    \ `User` 模型，就不需要对其进行测试。但由于我们创建了 `CustomUser` 模型，所以应该进行测试。\n\n## 单元测试\n\n要在 Django\
    \ 中编写单元测试，我们使用 [TestCase](https://docs.djangoproject.com/en/4.0/topics/testing/tools/#django.test.TestCase)，它本身是\
    \ Python [TestCase](https://docs.python.org/3/library/unittest.html#unittest.TestCase)\
    \ 的扩展。我们的 accounts 应用已经包含了一个 `tests.py` 文件，这是在使用 `startapp` 命令时自动添加的。目前它是空白的。让我们来完善它！\n\
    \n每个方法必须以 `test` 开头，才能被 Django 测试套件运行。此外，单元测试名称最好尽可能描述详细，因为成熟的项目往往有数百甚至数千个测试！\n\
    \n### 代码\n\n```python\n# accounts/tests.py\nfrom django.contrib.auth import get_user_model\n\
    from django.test import TestCase\n\n\nclass CustomUserTests(TestCase):\n    def\
    \ test_create_user(self):\n        User = get_user_model()\n        user = User.objects.create_user(\n\
    \            username=\"will\", email=\"will@email.com\", password=\"testpass123\"\
    \n        )\n        self.assertEqual(user.username, \"will\")\n        self.assertEqual(user.email,\
    \ \"will@email.com\")\n        self.assertTrue(user.is_active)\n        self.assertFalse(user.is_staff)\n\
    \        self.assertFalse(user.is_superuser)\n\n    def test_create_superuser(self):\n\
    \        User = get_user_model()\n        admin_user = User.objects.create_superuser(\n\
    \            username=\"superadmin\", email=\"superadmin@email.com\", password=\"\
    testpass123\"\n        )\n        self.assertEqual(admin_user.username, \"superadmin\"\
    )\n        self.assertEqual(admin_user.email, \"superadmin@email.com\")\n    \
    \    self.assertTrue(admin_user.is_active)\n        self.assertTrue(admin_user.is_staff)\n\
    \        self.assertTrue(admin_user.is_superuser)\n```\n\n我们导入了 `get_user_model`\
    \ 和 `TestCase`，然后创建了 `CustomUserTests` 类。其中包含两个独立的测试。`test_create_user` 确认可以创建新用户。首先我们将用户模型赋值给变量\
    \ `User`，然后通过管理器方法 `create_user`[^49] 创建一个用户，该方法负责实际创建具有适当权限的新用户。\n\n对于 `test_create_superuser`，我们遵循类似的模式，但引用的是\
    \ `create_superuser`[^50] 而非 `create_user`。两种用户的区别在于，超级用户的 `is_staff` 和 `is_superuser`\
    \ 都应该设置为 True。\n\n[^49]: https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.models.UserManager.create_user\n\
    \n[^50]: https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.models.UserManager.create_superuser\n\
    \n要在 Docker 中运行测试，我们需要在常规命令 `python manage.py test` 前加上 `docker-compose exec web`。\n\
    \n### Shell\n\n```shell\n$ docker-compose exec web python manage.py test\nFound\
    \ 2 test(s).\nCreating test database for alias 'default'...\nSystem check identified\
    \ no issues (0 silenced).\n..\n----------------------------------------------------------------------\n\
    Ran 2 tests in 0.115s\n\nOK\nDestroying test database for alias 'default'...\n\
    ```\n\n所有测试都通过了，我们可以继续了。\n\n### Git\n\n我们在本章完成了相当多的工作，因此现在是暂停并提交工作的好时机：初始化一个新的\
    \ Git 仓库，添加更改，并附上提交信息。\n\n### Shell\n\n```shell\n$ git init\n$ git status\n$ git\
    \ add .\n$ git commit -m 'ch4'\n```\n\n你可以在 [Github 上对比本章的官方源代码](https://github.com/wsvincent/djangoforprofessionals/tree/main/ch4-books)[^51]。\n\
    \n## 总结\n\n我们的 Bookstore 项目现在已使用 Docker 和 PostgreSQL 运行，并且我们配置了自定义用户模型。接下来将创建一个用于静态页面的\
    \ pages 应用。\n\n# 第 5 章：Pages 应用\n\n让我们为新项目构建一个主页。目前这将是一个静态页面，意味着它不会以任何方式与数据库交互。稍后它将成为一个动态页面，展示待售图书，但……要一步一步来。\n\
    \n即使是一个成熟的项目，通常也会有多个静态页面（如\"关于\"页面），因此让我们为它们创建一个专门的 pages 应用。在命令行上再次使用 `startapp`\
    \ 命令来创建 pages 应用。\n\n### Shell\n\n```shell\n$ docker-compose exec web python manage.py\
    \ startapp pages\n```\n\n然后将其添加到我们的 `INSTALLED_APPS` 设置中。我们还将更新 `TEMPLATES`，以便\
    \ Django 查找项目级别的 templates 文件夹。默认情况下，Django 会在每个应用中查找 templates 文件夹，但将所有模板组织在一个空间中更易于管理。\n\
    \n### 代码\n\n```python\n# django_project/settings.py\nINSTALLED_APPS = [\n    \"\
    django.contrib.admin\",\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\"\
    ,\n    \"django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"\
    django.contrib.staticfiles\",\n    # Local\n    \"accounts.apps.AccountsConfig\"\
    ,\n    \"pages.apps.PagesConfig\",  # new\n]\n\nTEMPLATES = [\n    {\n       \
    \ ...\n        \"DIRS\": [BASE_DIR / \"templates\"],  # new\n```\n\n```python\n\
    \    ...\n  }\n]\n```\n\n请注意，更新 `DIRS` 设置意味着 Django 也会在这个新文件夹中查找；它仍然会查找应用内的任何\
    \ templates 文件夹。\n\n## 模板\n\n接下来，是时候在命令行上创建新的 templates 目录了。\n\n### Shell\n\n\
    ```shell\n$ mkdir templates\n```\n\n然后使用文本编辑器在其中创建两个新文件：`templates/_base.html`\
    \ 和 `templates/home.html`。第一个基础级文件将被所有其他文件继承；`home.html` 将是我们的主页。\n\n为什么将基础模板命名为\
    \ `_base.html` 而不是 `base.html`？这是一种可选的做法，但有些开发者更喜欢在仅用于被其他文件继承的文件名前加上下划线 `_`。\n\
    \n在基础文件中，我们将包含最低限度的必要内容，并为 `title` 和 `content` 添加 `block` 标签。块标签让更高级别的模板可以选择仅覆盖标签内的内容。例如，主页的标题将是\
    \ \"Home\"，但我们希望它出现在 html 的 `<title></title>` 标签之间。使用块标签可以更方便地在继承模板中根据需要更新此内容。\n\
    \n为什么使用 `content` 作为项目主要内容的名字？这个名字可以是任何名称——`main` 或其他通用标识符——但在 Django 世界中，使用 `content`\
    \ 是一种常见的命名约定。你能用别的吗？当然可以。`content` 是你最常见的吗？是的。"
