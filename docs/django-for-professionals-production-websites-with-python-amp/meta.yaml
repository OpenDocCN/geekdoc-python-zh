    # ## Password Reset and Password Change


    Django and `django-allauth` also come with support for additional user account
    features such as the ability to reset a forgotten password and change your existing
    password if already logged in.


    The locations of the default password reset and password change pages are as follows:


    +   - http://127.0.0.1:8000/accounts/password/reset/

    - http://127.0.0.1:8000/accounts/password/change/


    If you go through the flow of each you can find the corresponding templates and
    email messages in the `django-allauth` source code.'
  - '[PAGE 168]


    # Email Service


    The emails we have configured so far are generally referred to as "Transactional
    Emails" as they occur based on a user action of some kind. This is in contrast
    to "Marketing Emails" such as, say, a monthly newsletter.


    There are many transactional email providers available including SendGrid, MailGun,
    Amazon''s Simple Email Service. Django is agnostic about which provider is used;
    the steps are similar for all and many have a free tier available.


    After signing up for an account with your email service of choice you''ll often
    have a choice between using [SMTP](https://en.wikipedia.org/wiki/Simple_Mail_Transfer_Protocol)
    or a Web API. SMTP is easier to configure, but a web API is more configurable
    and robust. Start with SMTP and work your way from there: email configurations
    can be quite complex in their own right.


    After obtaining a username and password with an email provider, a few settings
    tweaks will allow Django to use them to send emails.


    The first step would be to update the `EMAIL_BACKEND` config, which should be
    near the bottom of the `django_project/settings.py` file since we previously updated
    it in the `django-allauth` config section.


    # Code


    ```

    # django_project/settings.py

    EMAIL_BACKEND = "django.core.mail.backends.smtp.EmailBackend"  # new

    ```


    This means email will no longer output to the command line console but instead
    attempt to connect with an SMTP server. Then configure `EMAIL_HOST`, `EMAIL_HOST_USER`,
    `EMAIL_HOST_PASSWORD`, `EMAIL_PORT`, and `EMAIL_USE_TLS` based on the instructions
    from your email provider as environment variables.


    In the official source code the `EMAIL_BACKEND` will remain console, but the previous
    steps are how to add an email service. If you find yourself frustrated properly
    configuring email, well, you''re not alone! Django does at least make it far,
    far easier than implementing without the benefits of a batteries-included framework.'
