    # Conclusion


    The goal of this chapter was to demonstrate how Docker and PostgreSQL work together
    on a Django project. Switching between a SQLite database and a PostgreSQL is a
    mental leap for many developers initially.


    The key point is that with Docker we don''t need to be in a local virtual environment
    anymore. Docker is our virtual environment...and our database and more if desired.
    The Docker host essentially replaces our local operating system and within it
    we can run multiple containers, such as for our web app and for our database,
    which can all be isolated and run separately.


    In the next chapter we will start our online Bookstore project. Let''s begin!'
