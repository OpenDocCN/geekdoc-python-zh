    # Indexes


    [Indexing](https://en.wikipedia.org/wiki/Database_index)^229 is a common technique
    for speeding up database performance. It is a separate data structure that allows
    faster searches and is typically only applied to the primary key in a model. The
    downside is that indexes require additional space on a disk so they must be used
    with care.


    ^229 https://en.wikipedia.org/wiki/Database_index'
