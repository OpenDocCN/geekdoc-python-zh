  md: '# # Chapter 7: Static Assets


    Static assets like CSS, JavaScript, and images are a core component of any modern
    web application. Django provides us with a large degree of flexibility around
    their configuration and storage which can be confusing to newcomers but in practice
    the pattern is almost identical for all projects. In this chapter we''ll configure
    our initial static assets and add [Bootstrap](https://getbootstrap.com/)⁸⁹ for
    improved styling.


    # ## Local Development


    For local development the Django web server automatically serves static files
    and minimal configuration is required. Static files can be placed in an app-level
    directory called `static` so we could, for example, create a new directory within
    the pages app called `pages/static/`.


    However most projects reuse static assets across multiple apps. Our bookstore
    app certainly will! So a more common approach is to create a base-level directory
    `static` folder and place all static files within there. This is easier to reason
    about as a developer.


    From the command line create a new `static` folder along with new subdirectories
    for CSS, JavaScript, and images.


    **Shell**


    ```

    shell

    $ mkdir static

    $ mkdir static/css

    $ mkdir static/js

    $ mkdir static/images

    ```


    Your Django project should have the following structure at this point:'
  merge: -1
  pgno: 107
- img_proc: true
  md: "# ## Project Structure\n\n```\n\n├── Dockerfile\n├── accounts\n│   ...\n├──\
    \ db.sqlite3\n├── django_project\n│   ...\n├── docker-compose.yml\n├── manage.py\n\
    ├── pages\n│   ...\n├── requirements.txt\n├── static\n│   ├── css\n│   ├── images\n\
    │   └── js\n└── templates\n    ...\n```\n\nIt's important to be aware that Git,\
    \ by default, will not track directories that are empty. Thus when we eventually\
    \ push our code to both GitHub and Heroku these empty directories will not appear\
    \ which can cause problems in deployment when `collectstatic` is run. To avoid\
    \ this we will add an empty file to each directory now.\n\nIn your text editor\
    \ create the following three files:\n\n+   - `static/css/base.css`\n- `static/js/base.js`\n\
    - `static/images/.keep`\n\n# ## STATICFILES_DIRS\n\nAt the bottom of the `django_project/settings.py`\
    \ file is a section on \"Static files\" which has already set [STATIC_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATIC_URL)\
    \ to `\"static/\"`. This is the URL used when referring to static files. It means\
    \ that for local usage all static files are located at `http://127.0.0.1:8000/static/`.\n\
    \n> 90 https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATIC_URL"
  merge: -1
  pgno: 108
- img_proc: true
  md: "The built-in `staticfiles` app that ships with Django–you can see it in the\
    \ `INSTALLED_APPS` section of `django_project/settings.py`–ships with a quick\
    \ and dirty helper view that will serve files locally for development. It will\
    \ automatically look for a `static` directory within each application.\n\nMany\
    \ static files are not app-specific though and are intended to be used project-wide.\
    \ That's why creating a base directory `static` folder, as we did above, is a\
    \ common practice. We just need to provide a list of additional directories for\
    \ Django to look in, which is the job of [STATICFILES_DIRS](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATICFILES_DIRS).\
    \ Since this is a list we must place brackets, `[]`, around it in standard Python\
    \ syntax.\n\nHere is what the updated `django_project/settings.py` file should\
    \ look like.\n\n```\npython\n# django_project/settings.py\nSTATIC_URL = \"/static/\"\
    \nSTATICFILES_DIRS = [BASE_DIR / \"static\"]  # new\n```\n\n# ## CSS\n\nWe'll\
    \ update `base.css` now and keep things simple by having our `h1` headline be\
    \ red. The point is to show how CSS can be added to our project, not to delve\
    \ too deeply into CSS itself.\n\n```\ncss\n/* static/css/base.css */\nh1 {\n \
    \ color: red;\n}\n```\n\nIf you refresh the homepage now you'll see that nothing\
    \ has changed. That's because static assets must be explicitly loaded into templates!\
    \ To do this we must add `{% load static %}` at the top of `_base.html` and then\
    \ use the [static](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#std:templatetag-static)\
    \ template tag to reference our `base.css` file. Even though this file is located\
    \ at `static/css/base.css` we can refer to it as `css/base.css` because the `static`\
    \ tag automatically looks within the `/static/` directory specified in `STATIC_URL`.\n\
    \nHere is what the updated `templates/_base.html` file should look like."
  merge: -1
  pgno: 109
