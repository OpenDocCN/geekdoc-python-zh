    # ## HTTPS/SSL


    All modern websites should use [HTTPS](https://en.wikipedia.org/wiki/HTTPS), which
    provides encrypted communication between a client and server. [HTTP (Hypertext
    Transfer Protocol)](https://en.wikipedia.org/wiki/Hypertext_Transfer_Protocol)
    is the backbone of the modern web, but it does not, by default, have encryption.


    The "s" in HTTPS refers to its encrypted nature first due to SSL (Secure Sockets
    Layer) and these days its successor [TLS (Transport Layer Security)](https://en.wikipedia.org/wiki/Transport_Layer_Security).
    With HTTPS enabled, which we will do in our deployment chapter, malicious actors
    can''t sniff the incoming and outgoing traffic for data like authentication credentials
    or API keys.


    One of the 4 remaining issues in our Django deployment checklist is that `SECURE_SSL_REDIRECT`
    is currently set to `False`. For security reasons, it''s far better to force this
    to be `True` in production. Let''s change that now. At the bottom of the `django_project/settings.py`
    file add a configuration for `SECURE_SSL_REDIRECT`: set it to either the environment
    variable `DJANGO_SECURE_SSL_REDIRECT` or the default value of `True`.


    # **Code**


    ```

    python

    # django_project/settings.py

    SECURE_SSL_REDIRECT = env.bool("DJANGO_SECURE_SSL_REDIRECT", default=True)

    ```


    Then we will add the environment variable to `docker-compose.yml` so that for
    *local* development it defaults to `False` which is the less secure setting.'
