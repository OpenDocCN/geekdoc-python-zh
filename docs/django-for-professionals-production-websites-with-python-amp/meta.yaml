    This is because most web browsers once they find out an HTTPS version of a site
    exists–even if it''s a localhost like `http://127.0.0.1:8000/`–will cache that
    and continually revert to it. You can look up different ways to clear the cache
    but the most effective in this case is to restart your web browser. As ever, when
    something isn''t working try turning it off and restarting.'
