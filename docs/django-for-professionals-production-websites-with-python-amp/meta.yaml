  md: '# # Chapter 16: Performance


    The first priority for any website is that it must work properly and contain proper
    tests. But if your project is fortunate enough to receive a large amount of traffic
    the focus quickly shifts to performance and making things as efficient as possible.
    This is a fun and challenging exercise for many engineers, but it can also be
    a trap.


    The computer scientist Donald Knuth has [a famous quote](http://www.paulgraham.com/knuth.html)
    worth reading in its entirety:


    > > "The real problem is that programmers have spent far too much time worrying
    about efficiency in the wrong places and at the wrong times; premature optimization
    is the root of all evil (or at least most of it) in programming."


    While it''s important to set up proper monitoring so you *can* optimize your project
    later on, don''t focus too much on it upfront. There''s no way to properly mimic
    production environments locally. And there is no way to predict exactly how a
    site''s traffic will look. But it is possible to spend far too much time seeking
    out tiny performance gains in the early stages instead of talking to users and
    making larger code improvements!


    In this chapter we''ll focus on the broad strokes of Django-related performance
    and highlight areas worth further investigation at scale. Generally speaking performance
    comes down to four major areas: optimizing database queries, caching, indexes,
    and compressing front-end assets like images, JavaScript, and CSS.


    # ## django-debug-toolbar


    Before we can optimize our database queries we need to see them. The go-to tool
    for this in the Django community is the third-party package [django-debug-toolbar](https://github.com/jazzband/django-debug-toolbar).
    It comes with a configurable set of panels to inspect the complete request/response
    cycle of any given page.


    Per usual we can install it by adding the latest version to our `requirements.txt`
    file.'
