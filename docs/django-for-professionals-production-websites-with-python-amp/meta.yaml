    \      - .:/code\n    ports:\n      - 8000:8000\n    depends_on:\n      - db\n\
    \n  db:\n    image: postgres:13\n    volumes:\n      - postgres_data:/var/lib/postgresql/data/\n\
    \    environment:\n      - \"POSTGRES_HOST_AUTH_METHOD=trust\"\n\nvolumes:\n \
