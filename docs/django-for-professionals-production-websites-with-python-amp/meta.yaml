    # ## Django Source Code


    You might have been able to piece together these steps on your own from reading
    [the official docs](https://docs.djangoproject.com/en/4.0/topics/auth/default/)⁷².
    But the deeper–and better–approach is to learn how to read the Django source code
    on your own.


    One question is, how was the `user` and its related variables magically available
    in our template? The answer is that Django has a concept called the [template
    context](https://docs.djangoproject.com/en/4.0/topics/auth/default/#authentication-data-in-templates)⁷³
    which means each'
  - '[PAGE 92]


    template is loaded with data from the corresponding `views.py` file. We can use
    `user` within template tags to access User attributes. In other words, Django
    just gives this to us automatically.


    So to check if a user is logged in or not, we access `user` and then can use the
    boolean `is_authenticated`^74 attribute. If a user is logged in, it will return
    True and we can do things like display the user''s email. Or if no user is logged
    in, the result will be False.


    Moving on we have the URL name `login`. Where did that come from? The answer,
    of course, is from Django itself! Let''s unpack the code snippet `{% url ''login''
    %}` piece by piece.


    First up we''re using the [url template tag](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#url)^75
    which takes as its first argument a [named URL pattern](https://docs.djangoproject.com/en/4.0/topics/http/urls/#naming-url-patterns)^76.
    That''s the optional `name` section we add as a best practice to all our URL paths.
    Therefore there must be a `''login''` name attached to the URL used by Django
    for log ins, right!


    There are two ways we could have known this. In other words, if I hadn''t just
    told you that we wanted to use `{% url ''login'' %}`, how could you have figured
    it out?


    First look at the [official documentation](https://docs.djangoproject.com/en/4.0/)^77.
    Personally I often use the search feature so I would have typed in something like
    "login" and then clicked around until I found a description of log in. The one
    we want is actually called [authentication views](https://docs.djangoproject.com/en/4.0/topics/auth/default/#module-django.contrib.auth.views)^78
    and lists the corresponding URL patterns for us.


    # Code


    ```

    accounts/login/ [name="login"]

    accounts/logout/ [name="logout"]

    accounts/password_change/ [name="password_change"]

    accounts/password_change/done/ [name="password_change_done"]

    accounts/password_reset/ [name="password_reset"]

    accounts/password_reset/done/ [name="password_reset_done"]

    accounts/reset/<uidb64>/<token>/ [name="password_reset_confirm"]

    accounts/reset/done/ [name="password_reset_complete"]

    ```


    This tells us at the path `accounts/login/` is where "login" is located and its
    name is `''login''`. A little confusing at first, but here is the info we need.'
  - "[PAGE 93]\n\nGoing a step deeper to phase two, we can investigate the underlying\
    \ Django source code to see \"logout\" in action. If you perform a search [over\
    \ on Github](https://github.com/django/django) you'll eventually find the [auth\
    \ app itself](https://github.com/django/django/tree/b9cf764be62e77b4777b3a75ec256f6209a57671/django/contrib/auth).\
    \ Ok, now let's start by investigating the `urls.py` file. [Here is the link](https://github.com/django/django/blob/b9cf764be62e77b4777b3a75ec256f6209a57671/django/contrib/auth/urls.py)\
    \ to the complete code:\n\n# Code\n\n```\n# django/contrib/auth/urls.py\nfrom\
    \ django.contrib.auth import views\nfrom django.urls import path\n\nurlpatterns\
    \ = [\n    path('login/', views.LoginView.as_view(), name='login'),\n    path('logout/',\
    \ views.LogoutView.as_view(), name='logout'),\n\n    path('password_change/',\
    \ views.PasswordChangeView.as_view(),\n        name='password_change'),\n    path('password_change/done/',\
    \ views.PasswordChangeDoneView.as_view(),\n        name='password_change_done'),\n\
    \    path('password_reset/', views.PasswordResetView.as_view(),\n        name='password_reset'),\n\
    \    path('password_reset/done/', views.PasswordResetDoneView.as_view(),\n   \
    \     name='password_reset_done'),\n    path('reset/<uidb64>/<token>/', views.PasswordResetConfirmView.as_view(),\n\
    \        name='password_reset_confirm'),\n    path('reset/done/', views.PasswordResetCompleteView.as_view(),\n\
    \        name='password_reset_complete'),\n]\n```\n\nHere is the underlying code\
    \ Django uses itself for the auth app. I hope you can see that the \"logout\"\
    \ route is not magic. It's right there in plain sight, it uses the view `LogoutView`\
    \ and has the URL name `'logout'`. Not magic at all! Just a little challenging\
    \ to find the first time.\n\nThis three-step process is a great way to learn:\
    \ either remember the Django shortcut, look it up in the docs, or on occasion\
    \ dive into the source code and truly understand where all this goodness comes\
    \ from."
- md: "# Log In\n\nBack on our basic homepage, click on the \"Log In\" link and...\
    \ it results in an error!\n\n![](img/d9b58f5e350349fe0759c8474cded65a_94_0.png)\n\
    \n**TemplateDoesNotExist error**\n\nDjango is throwing a `TemplateDoesNotExist`\
    \ error at us. Specifically, it seems to expect a log in template at `registration/login.html`.\
    \ In addition to Django telling us this, we can look in the [documentation](https://docs.djangoproject.com/en/4.0/topics/auth/default/#all-authentication-views)⁸²\
    \ and see that the desired `template_name` has that location.\n\nBut let's really\
    \ be sure and check the source code so we can remove any perceived magic here.\
    \ After all, it's just Django.\n\nBack in the [auth/views.py](https://github.com/django/django/blob/b9cf764be62e77b477b3a75ec256f6209a57671/django/contrib/auth/views.py)⁸³\
    \ file we can see on line 47 for `LoginView` that the `template_name` is `'registration/login.html'`.\
    \ So if we wanted to change the default location we could, but it would mean overriding\
    \ `LoginView` which seems like overkill. Let's just use what Django gives us here.\n\
    \nCreate a new `registration` folder within the existing templates directory.\n\
    \n## Shell\n\n```\n$ mkdir templates/registration\n```\n\nThen in your text editor\
    \ create a `login.html` file within the `templates/registration` directory. The\
    \ actual code is as follows. We extend our base template, add a title, and then\
    \ specify that we want to use a form that will \"post\" or send the data.\n\n\
    ## Code\n\n```\n<!-- templates/registration/login.html -->\n{% extends \"_base.html\"\
    \ %}\n\n{% block title %}Log In{% endblock title %}\n\n{% block content %}\n \
    \ <h2>Log In</h2>\n  <form method=\"post\">\n    {% csrf_token %}\n    {{ form.as_p\
    \ }}\n    <button type=\"submit\">Log In</button>\n  </form>\n{% endblock content\
    \ %}\n```\n\nYou should **always** add [CSRF protection](https://docs.djangoproject.com/en/4.0/ref/csrf/)\
    \ on any submittable form. Otherwise a malicious website can change the link and\
    \ attack the site and the user. Django has CSRF middleware to handle this for\
    \ us; all we need to do is add `{% csrf_token %}` tags at the start of the form.\n\
    \nNext we can control the look of the form contents. For now we'll use [as_p()](https://docs.djangoproject.com/en/4.0/ref/forms/api/#as-p)\
    \ so that each form field is displayed within a paragraph p tag.\n\nWith that\
    \ explanation out of the way, let's check if our new template is working correctly.\
    \ Refresh the web page at http://127.0.0.1:8000/accounts/login/.\n\n![](img/d9b58f5e350349fe0759c8474cded65a_96_0.png)\n\
    \nLog in page\n\nAnd there is our page! Lovely. You can navigate back to the homepage\
    \ and confirm that the \"Log In\" link works, too, if you like. As a final step,\
    \ go ahead and try to log in with your superuser account on the log in page.\n\
    \n## Redirects\n\nDid you notice I said \"try\" in that last sentence? If you\
    \ click on the \"Log In\" link it brings up a `Page not found (404)` error.\n\n\
    ![](img/d9b58f5e350349fe0759c8474cded65a_96_1.png)\n\nPage not found error\n\n\
    Django has redirected us to `127.0.0.1:8000/accounts/profile/` yet no such page\
    \ exists. Now why would Django do this? Well, if you think about it, how does\
    \ Django know where we want to redirect the user after log in? Maybe it's the\
    \ homepage. But maybe it's a user profile page. Or any number of options.\n\n\
    The final piece of the log in puzzle is to set the proper configuration for [LOGIN_REDIRECT_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#login-redirect-url)\
    \ because by default it redirects to `accounts/profile`.\n\nFortunately, this\
    \ is a quick fix. We'll send the user to our homepage. And since we specified\
    \ a URL name of `home` that's all we need to redirect logged in users to the homepage.\n\
    \nAt the bottom of the `django_project/settings.py` file add this one line.\n\n\
    ## Code\n\n```\n# django_project/settings.py\nLOGIN_REDIRECT_URL = \"home\"  #\
    \ new\n```\n\nAttempt to log in again at `http://127.0.0.1:8000/accounts/login/`.\
    \ Upon success it redirects the user to the homepage greeting the superuser account\
    \ you just logged in with!\n\n![](img/d9b58f5e350349fe0759c8474cded65a_97_0.png)\n\
    \n**Homepage logged out**\n\n# Log Out\n\nNow let's add a log out option to our\
    \ homepage since only a superuser will have access to the admin. How do we do\
    \ this?\n\nIf you look at the auth views above we can see that logout uses `LogoutView`,\
    \ which we could explore in the source code, and has a URL name of `logout`. That\
    \ means we can refer to it with a template tag as just `logout`.\n\nBut we can\
    \ set this ourself, if desired, using [LOGOUT_REDIRECT_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#logout-redirect-url)\
    \ which can be added to the bottom of our `django_project/settings.py` file. Let's\
    \ do that so a logged out user is redirected to the homepage.\n\n## Code\n\n```\n\
    # django_project/settings.py\nLOGIN_REDIRECT_URL = \"home\"\nLOGOUT_REDIRECT_URL\
    \ = \"home\"  # new\n```\n\nThen add the logout link to `templates/home.html`.\n\
    \n## Code\n\n```\n<!-- templates/home.html -->\n{% extends \"_base.html\" %}\n\
    \n{% block title %}Home{% endblock title %}\n\n{% block content %}\n  <h1>This\
    \ is our home page.</h1>\n  {% if user.is_authenticated %}\n    <p>Hi {{ user.email\
    \ }}!</p>\n    <p><a href=\"{% url 'logout' %}\">Log Out</a></p>\n  {% else %}\n\
    \    <p>You are not logged in</p>\n    <a href=\"{% url 'login' %}\">Log In</a>\n\
    \  {% endif %}\n{% endblock content %}\n```\n\nRefresh the homepage at `http://127.0.0.1:8000/`\
    \ and the \"Log out\" link is now visible.\n\n![](img/d9b58f5e350349fe0759c8474cded65a_98_0.png)\n\
    \nHomepage with logout link\n\nIf you click on it you will be logged out and redirected\
    \ to the homepage, which has the \"Log In\" link visible.\n\n![](img/d9b58f5e350349fe0759c8474cded65a_99_0.png)\n\
    \nHomepage with login link\n\n## Sign Up\n\nImplementing a sign up page for user\
    \ registration is completely up to us. We'll go through the standard steps for\
    \ any new page:\n\n- create an app-level `accounts/urls.py` file\n- update the\
    \ project-level `django_project/urls.py` to point to the accounts app\n- add a\
    \ view called `SignupPageView`\n- create a `signup.html` template file\n- update\
    \ `home.html` to display the sign up page\n\nA common question is: what's the\
    \ right order for implementing these steps? Honestly, it doesn't matter since\
    \ we need *all* of them for the sign up page to work properly. I know it would\
    \ be more comforting if there was a prescribed order but each is a puzzle piece\
    \ that fits together in their entirety. That said, I generally like to start with\
    \ `urls`, then switch to `views`, and finally `templates` but it's a matter of\
    \ personal preference.\n\nTo start use your text editor to create an `accounts/urls.py`\
    \ file. Up to this point the accounts app has only contained our `CustomUser`\
    \ in the `models.py` file; we haven't configured any routes or views.\n\nThe URL\
    \ path for the sign up page will take a view called `SignupPageView` (which we'll\
    \ create next), at the route `signup/`, and have a name of `signup` which we can\
    \ later use to refer to the page with a `url` template tag. The existing url names\
    \ for `login` and `signup` are written within the built-in Django app file `django/contrib/auth/urls.py`\
    \ we saw above.\n\n## Code\n\n```\n# accounts/urls.py\nfrom django.urls import\
    \ path\n\nfrom .views import SignupPageView\n\nurlpatterns = [\n    path(\"signup/\"\
    , SignupPageView.as_view(), name=\"signup\"),\n]\n```\n\nNext update the django_project/urls.py\
    \ file to include the accounts app. We can create any route we like but it's common\
    \ to use the same accounts/ one used by the default auth app. Note that it's important\
    \ to include the path for accounts.urls **below**: URL paths are loaded top-to-bottom\
    \ so this ensures that any built-in auth app URL paths will be loaded first.\n\
    \n## Code\n\n```\n# django_project/urls.py\nfrom django.contrib import admin\n\
    from django.urls import path, include\n\nurlpatterns = [\n    # Django admin\n\
    \    path(\"admin/\", admin.site.urls),\n    # User management\n    path(\"accounts/\"\
    , include(\"django.contrib.auth.urls\")),\n    # Local apps\n    path(\"accounts/\"\
    , include(\"accounts.urls\")),  # new\n    path(\"\", include(\"pages.urls\")),\n\
    ]\n```\n\nNow create the view `SignupPageView`. It references the `CustomUserCreationForm`\
    \ and has a `success_url` that points to the login page, meaning after the form\
    \ is submitted the user will be redirected there. The `template_name` will be\
    \ `signup.html`."
  mdcn: "# 登录\n\n回到我们的基础主页，点击\"Log In\"链接，然后……结果出错了！\n\n![](img/d9b58f5e350349fe0759c8474cded65a_94_0.png)\n\
    \n**TemplateDoesNotExist 错误**\n\nDjango 向我们抛出了一个 `TemplateDoesNotExist` 错误。具体来说，它似乎期望在\
    \ `registration/login.html` 位置有一个登录模板。除了 Django 告诉我们这一点之外，我们还可以查看[文档](https://docs.djangoproject.com/en/4.0/topics/auth/default/#all-authentication-views)⁸²，可以看到期望的\
    \ `template_name` 就在那个位置。\n\n但我们还是要真正确认一下，查看源代码，这样我们就可以消除这里任何 perceived magic。毕竟，这只是\
    \ Django。\n\n回到 [auth/views.py](https://github.com/django/django/blob/b9cf764be62e77b477b3a75ec256f6209a57671/django/contrib/auth/views.py)⁸³\
    \ 文件，我们可以在第 47 行看到 `LoginView` 的 `template_name` 是 `'registration/login.html'`。所以如果我们想更改默认位置，我们可以这样做，但这意味着要覆盖\
    \ `LoginView`，这似乎有些过度。让我们就使用 Django 在这里提供给我们的方案。\n\n在现有的 templates 目录中创建一个新的 `registration`\
    \ 文件夹。\n\n## Shell\n\n```\n$ mkdir templates/registration\n```\n\n然后在你的文本编辑器中，在\
    \ `templates/registration` 目录下创建一个 `login.html` 文件。实际代码如下。我们扩展了我们的基础模板，添加了一个标题，然后指定我们要使用一个会\"\
    post\"或发送数据的表单。\n\n## Code\n\n```\n<!-- templates/registration/login.html -->\n\
    {% extends \"_base.html\" %}\n\n{% block title %}Log In{% endblock title %}\n\n\
    {% block content %}\n  <h2>Log In</h2>\n  <form method=\"post\">\n    {% csrf_token\
    \ %}\n    {{ form.as_p }}\n    <button type=\"submit\">Log In</button>\n  </form>\n\
    {% endblock content %}\n```\n\n你应该**始终**在任何可提交的表单上添加 [CSRF 保护](https://docs.djangoproject.com/en/4.0/ref/csrf/)。否则恶意网站可以更改链接并攻击网站和用户。Django\
    \ 有 CSRF 中间件来为我们处理这个问题；我们只需要在表单开头添加 `{% csrf_token %}` 标签。\n\n接下来我们可以控制表单内容的外观。目前我们将使用\
    \ [as_p()](https://docs.djangoproject.com/en/4.0/ref/forms/api/#as-p)，这样每个表单字段都会显示在一个段落\
    \ p 标签内。\n\n解释完毕，让我们检查一下我们的新模板是否正常工作。刷新网页 http://127.0.0.1:8000/accounts/login/。\n\
    \n![](img/d9b58f5e350349fe0759c8474cded65a_96_0.png)\n\n登录页面\n\n这就是我们的页面！很好。如果你愿意，你可以导航回主页并确认\"\
    Log In\"链接也能正常工作。作为最后一步，继续在登录页面上尝试用你的超级用户账户登录。\n\n## 重定向\n\n你注意到我在上一句中说了\"尝试\"\
    吗？如果你点击\"Log In\"链接，它会显示一个 `Page not found (404)` 错误。\n\n![](img/d9b58f5e350349fe0759c8474cded65a_96_1.png)\n\
    \n页面未找到错误\n\nDjango 将我们重定向到了 `127.0.0.1:8000/accounts/profile/`，但这样的页面并不存在。那么\
    \ Django 为什么要这样做呢？嗯，如果你仔细想想，Django 怎么知道我们想在登录后将用户重定向到哪里？可能是主页。但也可能是用户个人资料页面。或者其他任何选项。\n\
    \n登录拼图的最后一块是正确配置 [LOGIN_REDIRECT_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#login-redirect-url)，因为默认情况下它会重定向到\
    \ `accounts/profile`。\n\n幸运的是，这是一个快速修复。我们将把用户发送到我们的主页。由于我们指定了名为 `home` 的 URL，这就是我们需要将已登录用户重定向到主页的全部内容。\n\
    \n在 `django_project/settings.py` 文件的底部添加这一行。\n\n## Code\n\n```\n# django_project/settings.py\n\
    LOGIN_REDIRECT_URL = \"home\"  # new\n```\n\n再次尝试在 `http://127.0.0.1:8000/accounts/login/`\
    \ 登录。成功后会将用户重定向到主页，问候你刚刚登录的超级用户账户！\n\n![](img/d9b58f5e350349fe0759c8474cded65a_97_0.png)\n\
    \n**已登录主页**\n\n# 登出\n\n现在让我们在主页上添加一个登出选项，因为只有超级用户才能访问管理后台。我们该怎么做呢？\n\n如果你查看上面的认证视图，我们可以看到登出使用\
    \ `LogoutView`，我们可以在源代码中探索它，并且它的 URL 名称为 `logout`。这意味着我们可以用模板标签直接引用它为 `logout`。\n\
    \n但如果我们愿意，我们可以自己设置这个，使用 [LOGOUT_REDIRECT_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#logout-redirect-url)，它可以添加到我们\
    \ `django_project/settings.py` 文件的底部。让我们这样做，以便登出的用户被重定向到主页。\n\n## Code\n\n```\n\
    # django_project/settings.py\nLOGIN_REDIRECT_URL = \"home\"\nLOGOUT_REDIRECT_URL\
    \ = \"home\"  # new\n```\n\n然后将登出链接添加到 `templates/home.html`。\n\n## Code\n\n```\n\
    <!-- templates/home.html -->\n{% extends \"_base.html\" %}\n\n{% block title %}Home{%\
    \ endblock title %}\n\n{% block content %}\n  <h1>This is our home page.</h1>\n\
    \  {% if user.is_authenticated %}\n    <p>Hi {{ user.email }}!</p>\n    <p><a\
    \ href=\"{% url 'logout' %}\">Log Out</a></p>\n  {% else %}\n    <p>You are not\
    \ logged in</p>\n    <a href=\"{% url 'login' %}\">Log In</a>\n  {% endif %}\n\
    {% endblock content %}\n```\n\n刷新主页 `http://127.0.0.1:8000/`，现在可以看到\"Log out\"\
    链接。\n\n![](img/d9b58f5e350349fe0759c8474cded65a_98_0.png)\n\n带登出链接的主页\n\n如果你点击它，你将会登出并重定向到主页，主页上会显示\"\
    Log In\"链接。\n\n![](img/d9b58f5e350349fe0759c8474cded65a_99_0.png)\n\n带登录链接的主页\n\
    \n## 注册\n\n实现用户注册的注册页面完全取决于我们自己。我们将按照任何新页面的标准步骤进行：\n\n- 创建应用级别的 `accounts/urls.py`\
    \ 文件\n- 更新项目级别的 `django_project/urls.py` 以指向 accounts 应用\n- 添加一个名为 `SignupPageView`\
    \ 的视图\n- 创建一个 `signup.html` 模板文件\n- 更新 `home.html` 以显示注册页面\n\n一个常见的问题是：实现这些步骤的正确顺序是什么？老实说，这并不重要，因为我们需要*所有*这些步骤才能让注册页面正常工作。我知道如果有一个规定的顺序会更令人安心，但每一个都是拼图的一块，需要完整拼合。也就是说，我通常喜欢从\
    \ `urls` 开始，然后切换到 `views`，最后是 `templates`，但这取决于个人偏好。\n\n首先使用你的文本编辑器创建一个 `accounts/urls.py`\
    \ 文件。到目前为止，accounts 应用只包含我们在 `models.py` 文件中的 `CustomUser`；我们还没有配置任何路由或视图。\n\n\
    注册页面的 URL 路径将采用一个名为 `SignupPageView` 的视图（我们接下来会创建），路由为 `signup/`，名称为 `signup`，我们以后可以使用\
    \ `url` 模板标签来引用该页面。`login` 和 `signup` 的现有 URL 名称写在我们上面看到的内置 Django 应用文件 `django/contrib/auth/urls.py`\
    \ 中。\n\n## Code\n\n```\n# accounts/urls.py\nfrom django.urls import path\n\nfrom\
    \ .views import SignupPageView\n\nurlpatterns = [\n    path(\"signup/\", SignupPageView.as_view(),\
    \ name=\"signup\"),\n]\n```\n\n接下来更新 django_project/urls.py 文件以包含 accounts 应用。我们可以创建任何我们喜欢的路由，但通常使用与默认认证应用相同的\
    \ accounts/ 路由。注意，将 accounts.urls 的路径放在**下面**很重要：URL 路径是从上到下加载的，这确保了任何内置认证应用的\
    \ URL 路径将首先被加载。\n\n## Code\n\n```\n# django_project/urls.py\nfrom django.contrib\
    \ import admin\nfrom django.urls import path, include\n\nurlpatterns = [\n   \
    \ # Django admin\n    path(\"admin/\", admin.site.urls),\n    # User management\n\
    \    path(\"accounts/\", include(\"django.contrib.auth.urls\")),\n    # Local\
    \ apps\n    path(\"accounts/\", include(\"accounts.urls\")),  # new\n    path(\"\
    \", include(\"pages.urls\")),\n]\n```\n\n现在创建视图 `SignupPageView`。它引用了 `CustomUserCreationForm`，并且有一个指向登录页面的\
    \ `success_url`，意味着表单提交后用户将被重定向到那里。`template_name` 将是 `signup.html`。"
