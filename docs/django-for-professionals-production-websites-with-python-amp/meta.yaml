  - "[PAGE 132]\n\n# Code\n\n```\nAUTHENTICATION_BACKENDS = (\n    \"django.contrib.auth.backends.ModelBackend\"\
    ,\n)\n```\n\nHowever, for `django-allauth` we need to add its specific authentication\
    \ options, too, which will allow us to switch over to using login via e-mail in\
    \ a moment. At the bottom of your `django-project/settings.py` file add the following\
    \ section:\n\n# Code\n\n```\n# django_project/settings.py\n# django-allauth config\n\
    SITE_ID = 1\nAUTHENTICATION_BACKENDS = (\n    \"django.contrib.auth.backends.ModelBackend\"\
    ,\n    \"allauth.account.auth_backends.AuthenticationBackend\",  # new\n)\n```\n\
    \n# EMAIL_BACKEND\n\nAnother configuration implicitly set by is EMAIL_BACKEND^109.\
    \ By default Django will look for a configured SMTP server^110 to send emails.\n\
    \n`django-allauth` will send such an email upon a successful user registration,\
    \ which we can and will customize later, but since we don't yet have a SMTP server\
    \ properly configured, it will result in an error.\n\nThe solution, for now, is\
    \ to have Django output any emails to the command line console instead. Thus we\
    \ can override the default, implicit config by using console^111 instead of smtp.\
    \ Add this at the bottom of the `settings.py` file."
  - "[PAGE 133]\n\n# Code\n\n```\n# django_project/settings.py\n# django-allauth config\n\
    SITE_ID = 1\nAUTHENTICATION_BACKENDS = (\n    \"django.contrib.auth.backends.ModelBackend\"\
    ,\n    \"allauth.account.auth_backends.AuthenticationBackend\",\n)\nEMAIL_BACKEND\
    \ = \"django.core.mail.backends.console.EmailBackend\"  # new\n```\n\n# ACCOUNT_LOGOUT_REDIRECT\n\
    \nThere's one more subtle change to make to our configurations at this time. If\
    \ you look at the [configurations page](https://django-allauth.readthedocs.io/en/latest/configuration.html)\
    \ again you'll see there is a setting for `ACCOUNT_LOGOUT_REDIRECT` that defaults\
    \ to the path of the homepage at `/`.\n\nIn our current `settings.py` file we\
    \ have the following two lines for redirects which point to the homepage via its\
    \ URL name of `\"home\"`.\n\n# Code\n\n```\n# django_project/settings.py\nLOGIN_REDIRECT_URL\
    \ = \"home\"\nLOGOUT_REDIRECT_URL = \"home\"\n```\n\nThe issue is that `django-allauth`'s\
    \ `ACCOUNT_LOGOUT_REDIRECT` actually overrides the built-in `LOGOUT_REDIRECT_URL`\
    \ but since they both point to the homepage this change may not be immediately\
    \ apparent. To future-proof our application–since maybe we don't want to always\
    \ redirect to the homepage on logout–we should be explicit here with the logout\
    \ redirect.\n\nWe can also move the two redirect lines under our `django-allauth\
    \ config` section. This is what the entire `django-allauth config` section should\
    \ look like at this time.\n\n> 112https://django-allauth.readthedocs.io/en/latest/configuration.html"
  - "[PAGE 134]\n\n# Code\n\n```\n# django_project/settings.py\n# django-allauth config\n\
    LOGIN_REDIRECT_URL = \"home\"\nACCOUNT_LOGOUT_REDIRECT = \"home\"  # new\nSITE_ID\
    \ = 1\nAUTHENTICATION_BACKENDS = (\n    \"django.contrib.auth.backends.ModelBackend\"\
    ,\n    \"allauth.account.auth_backends.AuthenticationBackend\",\n)\nEMAIL_BACKEND\
    \ = \"django.core.mail.backends.console.EmailBackend\"\n```\n\nGiven that we have\
