    \ Profile 模型。你经常在较旧的项目中看到这种设置。\n\n但如今，使用自定义用户模型是更常见的方法。然而，与许多 Django 相关的事物一样，实现方式有多种选择：要么扩展\
    \ [AbstractUser](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.models.AbstractUser)，保留默认的用户字段和权限；要么扩展\
    \ [AbstractBaseUser](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.models.AbstractBaseUser)，它更加细粒度和灵活，但需要更多的工作。\n\
    \n本书中我们将坚持使用更简单的 `AbstractUser`，因为如果需要，以后可以添加 `AbstractBaseUser`。\n\n将自定义用户模型添加到我们的项目中有四个步骤：\n\
    \n- 1. 创建 `CustomUser` 模型\n- 2. 更新 `django_project/settings.py`\n- 3. 自定义 `UserCreationForm`\
    \ 和 `UserChangeForm`\n- 4. 将自定义用户模型添加到 `admin.py`\n\n第一步是创建一个 `CustomUser` 模型，它将位于自己的应用中。我喜欢将这个应用命名为\
    \ `accounts`。今后我们将在 Docker 本身中运行大部分命令。因为我们在 `docker-compose.yml` 的 web 服务中配置了\
    \ `volumes`，所以 Docker 内的任何文件系统更改都会反映到本地文件系统中。\n\n## Shell\n\n```bash\n$ docker-compose\
    \ exec web python manage.py startapp accounts\n```\n\n创建一个新的 `CustomUser` 模型，扩展\
    \ `AbstractUser`。这意味着我们本质上是在制作一个副本，`CustomUser` 现在继承了 `AbstractUser` 的所有功能，但我们可以根据需要覆盖或添加新功能。我们暂时不做任何更改，所以包含\
    \ Python 的 `pass` 语句，作为我们未来代码的占位符。\n\n## 代码\n\n```python\n# accounts/models.py\n\
    from django.contrib.auth.models import AbstractUser\nfrom django.db import models\n\
    \n\nclass CustomUser(AbstractUser):\n    pass\n```\n\n现在进入并更新 settings.py 文件中的\
    \ INSTALLED_APPS 部分，告诉 Django 我们的新 accounts 应用。我们还希望在文件底部添加一个 AUTH_USER_MODEL\
    \ 配置，这将使我们的项目使用 CustomUser 而不是默认的 User 模型。\n\n## 代码\n\n```python\n# django_project/settings.py\n\
    INSTALLED_APPS = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\"\
    ,\n    \"django.contrib.contenttypes\",\n    \"django.contrib.sessions\",\n  \
    \  \"django.contrib.messages\",\n    \"django.contrib.staticfiles\",\n    # Local\n\
    \    \"accounts.apps.AccountsConfig\",  # new\n]\n...\nAUTH_USER_MODEL = \"accounts.CustomUser\"\
    \  # new\n```\n\n是时候为更改创建迁移文件了。我们将在命令中添加可选的应用名称 accounts，以便只包含对该应用的更改。\n\n## Shell\n\
    \n```bash\n$ docker-compose exec web python manage.py makemigrations accounts\n\
    Migrations for 'accounts':\n  accounts/migrations/0001_initial.py\n    - Create\
    \ model CustomUser\n```\n\n然后运行 `migrate` 来首次初始化数据库。\n\n## Shell\n\n```bash\n\
    $ docker-compose exec web python manage.py migrate\nOperations to perform:\n \
    \ Apply all migrations: accounts, admin, auth, contenttypes, sessions\nRunning\
    \ migrations:\n  No migrations to apply.\n```\n\n## 自定义用户表单\n\n用户模型可以在 Django\
    \ 管理后台中创建和编辑。因此，我们也需要更新内置表单，使其指向 `CustomUser` 而不是 `User`。在你的文本编辑器中创建一个名为 `accounts/forms.py`\
    \ 的新文件，输入以下代码以切换到 `CustomUser`。\n\n## 代码\n\n```python\n# accounts/forms.py\nfrom\
    \ django.contrib.auth import get_user_model\nfrom django.contrib.auth.forms import\
    \ UserCreationForm, UserChangeForm\n\n\nclass CustomUserCreationForm(UserCreationForm):\n\
    \    class Meta:\n        model = get_user_model()\n        fields = (\n     \
    \       \"email\",\n            \"username\",\n        )\n\n\nclass CustomUserChangeForm(UserChangeForm):\n\
    \    class Meta:\n        model = get_user_model()\n        fields = (\n     \
    \       \"email\",\n            \"username\",\n        )\n```\n\n在最顶部，我们通过 [get_user_model](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.get_user_model)\
    \ 导入了 `CustomUser` 模型，它查找我们在 `settings.py` 中的 `AUTH_USER_MODEL` 配置。这可能比直接在这里导入\
    \ `CustomUser` 感觉更绕一些，但它强化了这样一个理念：对自定义用户模型只做一个单一引用，而不是在整个项目中直接引用它。\n\n接下来我们导入\
    \ [UserCreationForm](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.forms.UserCreationForm)\
    \ 和 [UserChangeForm](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.forms.UserChangeForm)，它们都将被扩展。\n\
    \n然后创建两个新表单——`CustomUserCreationForm` 和 `CustomUserChangeForm`——它们扩展上面导入的基础用户表单，并指定使用我们的\
    \ `CustomUser` 模型，显示 `email` 和 `username` 字段。密码字段默认隐式包含，因此也不需要在这里显式命名。\n\n###\
    \ 自定义用户管理后台\n\n最后我们必须更新 `accounts/admin.py` 文件。管理后台是操作用户数据的常见场所，内置的 `User` 与管理后台之间存在紧密耦合。\n\
    \n我们将现有的 `UserAdmin` 扩展为 `CustomUserAdmin`，并告诉 Django 使用我们的新表单和自定义用户模型。我们还可以列出[任何用户属性](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/)，但现在只关注三个：email、username\
    \ 和超级用户状态。\n\n## 代码\n\n```python\n# accounts/admin.py\nfrom django.contrib import\
    \ admin\nfrom django.contrib.auth import get_user_model\nfrom django.contrib.auth.admin\
    \ import UserAdmin\n\nfrom .forms import CustomUserCreationForm, CustomUserChangeForm\n\
    \nCustomUser = get_user_model()\n\n\nclass CustomUserAdmin(UserAdmin):\n    add_form\
    \ = CustomUserCreationForm\n    form = CustomUserChangeForm\n    model = CustomUser\n\
    \    list_display = [\n        \"email\",\n        \"username\",\n        \"is_superuser\"\
    ,\n    ]\n\n\nadmin.site.register(CustomUser, CustomUserAdmin)\n```\n\n呼。前期写了一些代码，但这为以后节省了大量的麻烦。\n\
    \n## 超级用户\n\n确认我们的自定义用户模型正常运行的良好方法是创建一个超级用户账户，这样我们就可以登录到管理后台。这个命令将在底层访问 `CustomUserCreationForm`。\n\
    \n## Shell\n\n```bash\n$ docker-compose exec web python manage.py createsuperuser\n\
    ```\n\n我使用的用户名是 `wsv`，邮箱是 `will@wsvincent.com`，密码是 `testpass123`。你可以在这里使用自己喜欢的变体。"
