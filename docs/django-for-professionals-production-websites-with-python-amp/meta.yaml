  md: '# # Chapter 6: User Registration


    User registration is a core feature in any dynamic website. And it will be in
    our Bookstore project, too. In this chapter we will implement log in, log out,
    and sign up functionality. The first two are relatively straightforward since
    Django provides us with the necessary views and urls for them, however sign up
    is more challenging since there is no built-in solution.


    # ## Auth App


    Let''s begin by implementing log in and log out using Django''s own [auth](https://docs.djangoproject.com/en/4.0/topics/auth/default/)
    app. Django provides us with the necessary views and urls which means we only
    need to update a template for things to work. This saves us a lot of time as developers
    and it ensures that we don''t make a mistake since the underlying code has already
    been tested and used by millions of developers.


    However this simplicity comes at the cost of feeling "magical" to Django newcomers.
    We covered some of these steps previously in my book, [Django for Beginners](https://djangoforbeginners.com),
    but we did not slow down and look at the underlying source code. That book demonstrated
    "how" to implement user registration properly but did not do a deep dive into
    the "why."


    Since this is a more advanced book, we will dive deeper to understand the underlying
    source code. The approach here can also be used to explore any other built-in
    Django functionality on your own.


    The first thing we need to do is make sure the `auth` app is included in our `INSTALLED_APPS`
    setting. We have added our own apps here previously, but have you ever taken a
    close look at the built-in apps Django adds automatically for us? Most likely
    the answer is no. Let''s do that now!'
