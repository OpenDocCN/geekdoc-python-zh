  - '[PAGE 194]


    A one-to-many relationship is more common and is the [default foreign key](https://docs.djangoproject.com/en/4.0/ref/models/fields/#foreignkey)
    setting within Django. For example, consider a restaurant where **one** customer
    can place **many** orders.


    It''s also possible to have a [ManyToManyField](https://docs.djangoproject.com/en/4.0/ref/models/fields/#manytomanyfield)
    relationship. Let''s consider a list of books and a list of authors: each book
    could have more than one author and each author can write more than one book.
    That''s a many-to-many relationship. Just as with the previous two examples you
    need a linked Foreign Key field to connect the two lists. Additional examples
    include doctors and patients (every doctor sees multiple patients and vice versa)
    or employees and tasks (each employee has multiple tasks while each task is worked
    on by multiple employees).


    Database design is a fascinating, deep topic that is both an art and a science.
    As the number of tables grow in a project over time it is almost inevitable that
    a refactoring will need to occur to address issues around inefficiency, bloat,
    and outright errors. [Normalization](https://en.wikipedia.org/wiki/Database_normalization)
    is the process of structuring a relational database though far beyond the scope
    of this book.


    # ## Reviews model


    Coming back to our basic reviews app, the first consideration is what type of
    foreign key relationship will there be. If we are going to link a user to a review,
    then it is a straightforward one-to-many relationship. However it could also be
    possible to link books to reviews which would be many-to-many. The "correct" choice
    quickly becomes somewhat subjective and certainly dependent upon the particular
    needs of the project.


    In this project we''ll treat the reviews app as a one-to-many between authors
    and reviews as it''s the simpler approach.


    Here again we face a choice around how to design our project. Do we add the `Reviews`
    model within our existing `books/models.py` file or create a dedicated `reviews`
    app that we then link to? Let''s start by adding a Reviews model to the books
    app.'
