    # ## Docker Image


    A Docker *image* is a read-only template that describes how to create a Docker
    container. The image is the instructions while the container is the actual running
    instance of an image. To continue our apartment analogy from earlier in the chapter,
    an image is the blueprint or set of plans for building an apartment; the container
    is the actual, fully-built building.


    Images are often based on another image with some additional customization. For
    example, there is a long list of officially supported images for [Python](https://hub.docker.com/_/python/)
    depending on the version and flavor of Python desired.


    # ## Dockerfile


    For our Django project we need to create a custom image that contains Python but
    also installs our code and has additional configuration details. To build our
    own image we create a special file known as a *Dockerfile* that defines the steps
    to create and run the custom image.


    Use your text editor to create a new `Dockerfile` file in the project-level directory
    next to the `manage.py` file. Within it add the following code which we''ll walk
    through line-by-line below.'
  merge: -1
  pgno: 36
- img_proc: true
  md: '# Dockerfile


    ```

    # Pull base image

    FROM python:3.10.4-slim-bullseye


    # Set environment variables

    ENV PIP_DISABLE_PIP_VERSION_CHECK 1

    ENV PYTHONDONTWRITEBYTECODE 1

    ENV PYTHONUNBUFFERED 1


    # Set work directory

    WORKDIR /code


    # Install dependencies

    COPY ./requirements.txt .

    RUN pip install -r requirements.txt


    # Copy project

    COPY . .

    ```


    Dockerfiles are read from top-to-bottom when an image is created. The first instruction
    is a `FROM` command that tells Docker what base image we would like to use for
    our application. Docker images can be inherited from other images so instead of
    creating our own base image, we''ll use the official Python image that already
    has all the tools and packages that we need for our Django application. In this
    case we''re using Python 3.10.4 and the much smaller in size `slim` variant that
    does not contain the common packages contained in the default tag. The tag `bullseye`
    refers to the latest stable Debian release. It is a good idea to set this explicitly
    to minimize potential breakage when there are new releases of Debian.


    Then we use the `ENV` command to set three environment variables:


    +   - `PIP_DISABLE_PIP_VERSION_CHECK` disables an automatic check for pip updates
    each time

    - `PYTHONDONTWRITEBYTECODE` means Python will not try to write `.pyc` files

    - `PYTHONUNBUFFERED` ensures our console output is not buffered by Docker


    The command `WORKDIR` is used to set a default working directory when running
    the rest of our commands. This tells Docker to use this path as the default location
    for all subsequent commands. As a result, we can use relative paths based on the
    working directory rather than typing out the'
  merge: -1
  pgno: 37
- img_proc: true
  md: 'full file path each time. In our case the working directory is `/code` but
    it can often be much longer and something like `/app/src`, `/usr/src/app`, or
    similar variations depending upon the specific needs of a project.


    The next step is to install our dependencies with `pip` and the `requirements.txt`
    file we already created. The `COPY` command takes two parameters: the first parameter
    tells Docker what file(s) to copy into the image and the second parameter tells
    Docker where you want the file(s) to be copied to. In this case we are copying
    the existing `requirements.txt` file from our local computer into the current
    working directory which is represented by `.`.


    Once the `requirements.txt` file is inside the image we can use our last command,
    `RUN`, to execute `pip install`. This works exactly the same as if we were running
    `pip install` locally on our machine, but this time the modules are installed
    into the image. The `-r` flag tells `pip` to open a file–called `requirements.txt`
    here–and install its contents. If we did not include the `-r` flag `pip` would
    try and fail to install `requirements.txt` since it isn''t itself an actual Python
    package.


    At the moment we have a new image based on the `slim-bullseye` variant of `Python
    3.10.4` and have installed our dependencies. The final step is to copy all the
    files in our current directory into the working directory on the image. We can
    do this by using the `COPY` command. Remember it takes two parameters so we''ll
    copy the current directory on our local filesystem (`.`) into the working directory
    (`.`) of the image.


    If you''re confused right now don''t worry. Docker is a lot to absorb but the
    good news is that the steps involved to "Dockerize" an existing project are very
    similar.


