    # Dockerfile


    ```

    # Pull base image

    FROM python:3.10.4-slim-bullseye


    # Set environment variables

    ENV PIP_DISABLE_PIP_VERSION_CHECK 1

    ENV PYTHONDONTWRITEBYTECODE 1

    ENV PYTHONUNBUFFERED 1


    # Set work directory

    WORKDIR /code


    # Install dependencies

    COPY ./requirements.txt .

    RUN pip install -r requirements.txt


    # Copy project

    COPY . .

    ```


    Dockerfiles are read from top-to-bottom when an image is created. The first instruction
    is a `FROM` command that tells Docker what base image we would like to use for
    our application. Docker images can be inherited from other images so instead of
    creating our own base image, we''ll use the official Python image that already
    has all the tools and packages that we need for our Django application. In this
    case we''re using Python 3.10.4 and the much smaller in size `slim` variant that
    does not contain the common packages contained in the default tag. The tag `bullseye`
    refers to the latest stable Debian release. It is a good idea to set this explicitly
    to minimize potential breakage when there are new releases of Debian.


    Then we use the `ENV` command to set three environment variables:


    +   - `PIP_DISABLE_PIP_VERSION_CHECK` disables an automatic check for pip updates
    each time

    - `PYTHONDONTWRITEBYTECODE` means Python will not try to write `.pyc` files

    - `PYTHONUNBUFFERED` ensures our console output is not buffered by Docker


    The command `WORKDIR` is used to set a default working directory when running
    the rest of our commands. This tells Docker to use this path as the default location
    for all subsequent commands. As a result, we can use relative paths based on the
    working directory rather than typing out the'
