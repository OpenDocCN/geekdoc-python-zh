    # ## Conclusion


    We have configured our templates and added the first page to our project, a static
    homepage. We also added tests which should *always* be included with new code
    changes. Some developers prefer a method called Test-Driven Development where
    they write the tests first and then the code. Personally I prefer to write the
    tests *immediately after* which is what we''ll do here.


    Both approaches work, the key thing is to be rigorous with your testing. Django
    projects quickly grow in size where it''s impossible to remember all the working
    pieces in your head. And if you are working on a team, it is a nightmare to work
    on an untested codebase. Who knows what will break?


