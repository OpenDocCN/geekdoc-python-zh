  - "[PAGE 68]\n\n```\npython\nmodel = get_user_model()\nfields = (\n    \"email\"\
    ,\n    \"username\",\n)\n```\n\nAt the very top we've imported `CustomUser` model\
    \ via [get_user_model](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.get_user_model)\
    \ which looks to our `AUTH_USER_MODEL` config in `settings.py`. This might feel\
    \ a bit more circular than directly importing `CustomUser` here, but it enforces\
    \ the idea of making one single reference to the custom user model rather than\
    \ directly referring to it all over our project.\n\nNext we import [UserCreationForm](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.forms.UserCreationForm)\
    \ and [UserChangeForm](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.forms.UserChangeForm)\
    \ which will both be extended.\n\nThen create two new forms—`CustomUserCreationForm`\
    \ and `CustomUserChangeForm`—that extend the base user forms imported above and\
    \ specify swapping in our `CustomUser` model and displaying the fields `email`\
    \ and `username`. The password field is implicitly included by default and so\
    \ does not need to be explicitly named here as well.\n\n# ## Custom User Admin\n\
    \nFinally we have to update our `accounts/admin.py` file. The admin is a common\
    \ place to manipulate user data and there is tight coupling between the built-in\
    \ `User` and the admin.\n\nWe'll extend the existing `UserAdmin` into `CustomUserAdmin`\
    \ and tell Django to use our new forms and custom user model. We can also list\
    \ [any user attributes](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/)\
    \ we want but for now will just focus on three: email, username, and superuser\
    \ status."
