  md: "# ## Shell\n\n```\n\n$ python3\nPython 3.10.4 (v3.10.4:9d38120e33, Mar 23 2022,\
    \ 17:29:05)\n  [Clang 13.0.0 (clang-1300.0.29.30)] on darwin\nType \"help\", \"\
    copyright\", \"credits\" or \"license\" for more information.\n>>>\n```\n\n# ##\
    \ Text Editor\n\nThe command line is where we execute commands for our programs\
    \ but a text editor is where actual code is written. The computer doesn't care\
    \ what text editor you use–the end result is just code–but a good text editor\
    \ can provide helpful hints and catch typos for you.\n\nThere are many modern\
    \ text editors available but a very popular one is [Visual Studio Code](https://code.visualstudio.com/),\
    \ which is free, easy to install, and enjoys widespread popularity. If you're\
    \ not already using a text editor, download and install VSCode from the official\
    \ website.\n\nAn optional–but highly recommended–additional step is to take advantage\
    \ of the large ecosystem of extensions available on VSCode. On Windows, navigate\
    \ to `File -> Preferences -> Extensions` or on macOS `Code -> Preferences -> Extensions`.\
    \ This launches a search bar for the extensions marketplace. Enter \"python\"\
    \ which will bring up the Microsoft extension as the first result. Install it.\n\
    \nA second extension to add is [Black](https://pypi.org/project/black/), which\
    \ is a Python code formatter that has quickly become the default within the Python\
    \ community. To install Black, open a Terminal window within VSCode by going to\
    \ `Terminal -> New Terminal` at the top of the page. In the new terminal window\
    \ opened at the bottom of the page, type `python -m pip install black`. Next,\
    \ open up the VSCode settings by navigating to `File -> Preferences -> Settings`\
    \ on Windows or `Code -> Preferences -> Settings` on macOS. Search for \"python\
    \ formatting provider\" and select `black` from the dropdown options. Then search\
    \ for \"format on save\" and enable \"Editor: Format on Save\". Black will now\
    \ automatically format your code whenever a `*.py` file is saved."
