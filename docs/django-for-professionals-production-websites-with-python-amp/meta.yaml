    # docker-compose.yml


    In the existing `docker-compose.yml` file add a new service called `db`. This
    means there will be two separate containers running within our Docker host: `web`
    for the Django local server and `db` for our PostgreSQL database.


    The `web` service depends on the `db` service to run so we''ll add a line called
    `depends_on` to `web` signifying this.


    Within the `db` service we specify which version of PostgreSQL to use. As of this
    writing, Heroku supports version 13 as the latest release so that is what we will
    use. Docker containers are ephemeral meaning when the container stops running
    all information is lost. This would obviously be a problem for our database! The
    solution is to create a `volumes` mount called `postgres_data` and then bind it
    to a dedicated directory within the container at the location `/var/lib/postgresql/data/`.
    The final step is to add a [trust authentication](https://www.postgresql.org/docs/current/auth-trust.html)
    to the `environment` for the `db`. For large databases with many database users
    it is recommended to be more explicit with permissions, but this setting is a
    good choice when there is just one developer.


    Here is what the updated file looks like:'
