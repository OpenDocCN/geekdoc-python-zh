    {% extends "account/email/base_message.txt" %}

    {% load account %}

    {% load i18n %}


    {% block content %}{% autoescape off %}{% user_display user as user_display %}\n{%
    blocktrans with site_name=current_site.name site_domain=current_site.domain %}\nYou''re
    receiving this e-mail because user {{ user_display }} has given your\ne-mail address
    to register an account on {{ site_domain }}.


    To confirm this is correct, go to {{ activate_url }}\n{% endblocktrans %}{% endautoescape
    %}{% endblock %}

    ```


