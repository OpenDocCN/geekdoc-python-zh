    # # Chapter 8: Advanced User Registration


    At this point we have the standard Django user registration implemented. But often
    that''s just the starting point on professional projects. What about customizing
    things a bit? For example, Django''s default username/email/password pattern is
    somewhat dated these days. It''s far more common to simply require email/password
    for sign up and log in. And really every part of the authentication flow–the forms,
    emails, pages–can be customized if so desired.


    Another major factor in many projects is the need for social authentication, that
    is handling sign up and log in via a third-party service like Google, Facebook,
    and so on.


    We could implement our own solutions here from scratch but there are some definite
    risks: user registration is a complex area with many moving parts and one area
    where we really do not want to make a security mistake.


    For this reason, many professional Django developers rely on the popular third-party
    [django-allauth](https://github.com/pennersr/django-allauth)[^104]. Adding any
    third party package should come with a degree of caution since you are adding
    another dependency to your technical stack. It''s important to make sure any package
    is both up-to-date and well tested. Fortunately `django-allauth` is both.


    At the cost of a little bit of *magic* it addresses all of these concerns and
    makes customization much, much easier.


    # ## django-allauth


    We will install `django-allauth` in the usual manner. Start off by adding it to
    the existing `requirements.txt` file.


    [^104]: https://github.com/pennersr/django-allauth'
  - '[PAGE 130]


    # requirements.txt


    ```

    asgiref==3.5.2

    Django==4.0.4

    psycopg2-binary==2.9.3

    sqlparse==0.4.2

    django-crispy-forms==1.14.0

    crispy-bootstrap5==0.6

    django-allauth==0.50.0

    ```


    Then spin down the currently running Docker container, rebuild our Docker image,
    and start up a new container.


    # Shell


    ```

    $ docker-compose down

    $ docker-compose up -d --build

    ```


    Our website will still function the same as before since we haven''t explicitly
    told Django about this new `django-allauth` package. To do that we need to update
    the `INSTALLED_APPS` config within our `django_project/settings.py` file adding
    Django''s built-in, but optional, [sites framework](https://docs.djangoproject.com/en/4.0/ref/contrib/sites/)105,
    `allauth`, and its account feature, `allauth.account`.


    `django-allauth` also requires an update to Django''s [AUTHENTICATION_BACKENDS](https://docs.djangoproject.com/en/4.0/ref/settings/#authentication-backends)106.
    By default, Django includes `ModelBackend` which is needed to login by username
    in the Django admin. `django-allauth` needs its own additional backend, `AuthenticationBackend`,
    so users can login by e-mail.


    Here is what the complete updates look like in the `django_project/settings.py`
    file.'
  - "[PAGE 131]\n\n# Code\n\n```\n# django_project/settings.py\nINSTALLED_APPS = [\n\
    \    \"django.contrib.admin\",\n    \"django.contrib.auth\",\n    \"django.contrib.contenttypes\"\
    ,\n    \"django.contrib.sessions\",\n    \"django.contrib.messages\",\n    \"\
    django.contrib.staticfiles\",\n    \"django.contrib.sites\",  # new\n    # Third-party\n\
    \    \"crispy_forms\",\n    \"crispy_bootstrap5\",\n    \"allauth\",  # new\n\
    \    \"allauth.account\",  # new\n    # Local\n    \"accounts.apps.AccountsConfig\"\
    ,\n    \"pages.apps.PagesConfig\",\n]\n\n# django-allauth config\nSITE_ID = 1\
    \  # new\n```\n\n# AUTHENTICATION_BACKENDS\n\nThe `settings.py` file created by\
    \ Django for any new project contains a number of explicit settings–those that\
    \ we see in the file already–as well as a longer additional list of implicit settings\
    \ that exist but aren't visible. This can be confusing at first. The complete\
    \ list of settings configurations [is available here](https://docs.djangoproject.com/en/4.0/ref/settings/)¹⁰⁷.\n\
    \nAn example is the [AUTHENTICATION_BACKENDS](https://docs.djangoproject.com/en/4.0/ref/settings/#authentication-backends)¹⁰⁸\
    \ setting. Under the hood Django sets this to `'django.contrib.auth.backends.ModelBackend'`,\
    \ which is used when Django attempts to authenticate a user. We could add the\
    \ following line to `django_project/settings.py` and the current behavior would\
    \ remain unchanged:"
