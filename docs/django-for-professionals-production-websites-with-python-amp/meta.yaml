    # ## Virtual Environments vs Containers


    Virtual environments are a way to isolate Python packages. Thanks to virtual environments,
    one computer can run multiple projects locally. For example, Project A might use
    Python 3.10 and Django 4.0 among other dependencies; whereas Project B uses Python
    3.5 and Django 1.11. By creating a new virtual environment for each project and
    installing Python packages into it, rather than globally on the computer itself,
    all the necessary Python packages can be maintained, managed, and updated as needed.


    There are several ways to implement virtual environments but arguably the simplest
    is with the [venv](https://docs.python.org/3/library/venv.html) module already
    installed as part of the Python 3 standard library. We will use `venv` shortly
    to install Django locally on the computer.


    The important distinction between virtual environments and Docker containers is
    that virtual environments *can only isolate Python packages*. They cannot isolate
    non-Python software like a PostgreSQL or MySQL database. And virtual environments
    still rely on a global, system-level installation of Python (in other words, on
    your computer). The virtual environment points to an existing Python installation;
    it does not contain Python itself.


    Linux containers go a step further and isolate the entire operating system, not
    just the Python parts. In other words, we will install Python itself within Docker
    as well as install and run a production-level database.


    Docker itself is a complex topic and we won''t dive that deep into it in this
    book, however understanding its background and key components is important. If
    you''d like to learn more about it, I recommend the [Dive into Docker video course](https://diveintodocker.com/ref-dfp).


    # ## Install Docker


    Ok, enough theory. Let''s start using Docker and Django together. The first step
    is to sign up for a free account on [Docker Hub](https://hub.docker.com/signup)
    and then install the Docker desktop app on your local machine:'
