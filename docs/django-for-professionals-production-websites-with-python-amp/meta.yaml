    # ## Install Git


    The final step is to install Git, a version control system that is indispensable
    to modern software development. With Git you can collaborate with other developers,
    track all your work via commits, and revert to any previous version of your code
    even if you accidentally delete something important!


    On Windows, navigate to the official website at `https://git-scm.com/` and click
    on the "Download" link which should install the proper version for your computer.
    Save the file and then open your Downloads folder and double click on the file.
    This will launch the Git for Windows installer. Click the "Next" button through
    most of the early defaults as they are fine and can always be updated later as
    needed. There are two exceptions however: under "Choosing the default editor used
    by Git" select VS Code not Vim. And in the section on "Adjusting the name of the
    initial branch in new repositories" select the option to use "main" as opposed
    to "master" as the default branch name. Otherwise the recommended defaults are
    fine and can always be tweaked later if needed.


    To confirm Git is installed on Windows, close all current shell windows and then
    open a new one which will load the changes to our PATH variable. Type in `git
    --version` which should show it is installed.'
