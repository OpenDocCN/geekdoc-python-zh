  - '[PAGE 271]


    A full explanation of each is beyond the scope of this book, but it is worth reading
    about the protections provided by the Django security team over the years. Do
    not change the defaults without good cause.


    # ## SQL injection


    Let''s start with a [SQL injection attack](https://en.wikipedia.org/wiki/SQL_injection)
    which occurs when a malicious user can execute arbitrary SQL code on a database.
    Consider a log in form on a site. What happens if a malicious user instead types
    `DELETE from users WHERE user_id=user_id`? If this is run against the database
    without proper protections it could result in the deletion of all user records!
    Not good. This [XKCD comic](https://www.xkcd.com/327/) provides a humorous though
    potentially accurate example of how this can occur.


    Fortunately the Django ORM automatically sanitizes user inputs by default when
    constructing querysets to prevent this type of attack. Where you need to be careful
    is that Django does provide the option to execute [custom sql](https://docs.djangoproject.com/en/4.0/topics/db/sql/#executing-custom-sql)
    or [raw queries](https://docs.djangoproject.com/en/4.0/topics/db/sql/#executing-raw-queries).
    These should both be used with extreme caution since they could open up a vulnerability
    to SQL injection.


    The non-profit Open Web Application Security Project (OWASP) has a fantastic and
    very detailed [SQL Injection Cheat Sheet](https://github.com/OWASP/CheatSheetSeries/blob/master/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.md)
    that is recommended for further reading.


    # ## XSS (Cross Site Scripting)


    [Cross-site scripting (XSS)](https://en.wikipedia.org/wiki/Cross-site_scripting)
    is another classic attack that occurs when an attacker is able to inject small
    bits of code onto web pages viewed by other people. This code, typically JavaScript,
    if stored in the database will then be retrieved and displayed to other users.


    For example, consider the form used for writing book reviews on our current site.
    What if instead of typing, "This book was great" a user typed something with JavaScript?
    For example,'
  - '[PAGE 272]


    `<script>alert(''hello'');</script>`. If this script were stored on the database
    then every future user''s page would have a pop-up saying "hello". While this
    particular example is more annoying than dangerous, a site vulnerable to XSS is
    very dangerous because a malicious user could insert *any JavaScript* into the
    page, including JavaScript that steals pretty much anything from an unsuspecting
    user.


    To prevent an XSS attack Django templates [automatically escape](https://docs.djangoproject.com/en/4.0/ref/templates/language/#automatic-html-escaping)
    specific characters that are potentially dangerous including brackets (`<` and
    `>`), single quotes `''`, double quotes `"`, and the ampersand `&`. There are
    some edge cases where you might want to turn [autoscape off](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#std:templatetag-autoescape)
    but this should be used with extreme caution.


    OWASP''s [XSS Cheat Sheet](https://github.com/OWASP/CheatSheetSeries/blob/master/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.md)
    is recommended for further reading.


    # ## Cross-Site Request Forgery (CSRF)


    A [Cross-Site Request Forgery (CSRF)](https://en.wikipedia.org/wiki/Cross-site_request_forgery)
    is the third major type of attack but generally lesser known than SQL Injection
    or XSS. Fundamentally it exploits that trust a site has in a user''s web browser.


    When a user logs in to a website, let''s call it a banking website for illustration
    purposes, the server sends back a session token for that user. This is included
    in the HTTP Headers of all future requests and authenticates the user. But what
    happens if a malicious actor somehow obtains access to this session token?


    For example, consider a user who logs into their bank in one browser tab. Then
    in another tab they open their email and click on an email link from a malicious
    actor. This link looks legitimate, but in fact it is pointing to the user''s bank
    which they are *still logged into*! So instead of leaving a blog comment on this
    fake site, behind the scenes the user''s credentials are used to transfer money
    from their account to the hacker''s account.'
  - '[PAGE 273]


    In practice there are multiple ways to obtain a user''s credentials via a CSRF
    attack, not just links, but hidden forms, special image tags, and even AJAX requests.


    Django provides [CSRF protection](https://docs.djangoproject.com/en/4.0/ref/csrf/#how-it-works)
    by including a random secret key both as a cookie via [CSRF Middleware](https://docs.djangoproject.com/en/4.0/ref/middleware/#django.middleware.csrf.CsrfViewMiddleware)
    and in a form via the [csrf_token](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#csrf-token)
    template tag. A 3rd party website will not have access to a user''s cookies and
    therefore any discrepancy between the two keys causes an error.


    As ever, Django does allow customization: you can disable the CSRF middleware
    and use the [csrf_protect()](https://docs.djangoproject.com/en/4.0/ref/csrf/#django.views.decorators.csrf.csrf_protect)
    template tag on specific views. However, undertake this step with extreme caution.


    The OWASP [CSRF Cheat Sheet](https://github.com/OWASP/CheatSheetSeries/blob/master/cheatsheets/Cross-Site_Request_Forgery_Prevention_Cheat_Sheet.md)
    provides a comprehensive look at the issue. Almost all major websites have been
    victims of CSRF attacks at some point in time.


    A good rule of thumb is whenever you have a form on your site, think about whether
    you need to include the `csrf_token` tag in it. Most of the time you will!


    # ## Clickjacking Protection


    [Clickjacking](https://en.wikipedia.org/wiki/Clickjacking) is yet another attack
    where a malicious site tricks a user into clicking on a hidden frame. An internal
    frame, known as an iframe, is commonly used to embed one website within another.
    For example, if you wanted to include a Google Map or YouTube video on your site
    you would include the `iframe` tag that puts that site within your own. This is
    very convenient.


    But it has a security risk which is that a frame can be hidden from a user. Consider
    if a user is already logged into their Amazon account and then visits a malicious
    site that purports to be a picture of kittens. The user clicks on said malicious
    site to see more kittens, but in fact they click an iFrame of an Amazon item that
    is unknowingly purchased. This is but one example of clickjacking.'
