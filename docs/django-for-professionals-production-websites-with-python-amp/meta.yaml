    # docker-compose-prod.yml


    Ultimately, our local development settings will differ from our production settings.
    We already started to configure this back in Chapter 9: Environment Variables.
    Recall that we added environment variables for `SECRET_KEY`, `DEBUG`, and `DATABASES`.
    But we did not set production values or a way to toggle efficiently between local
    and production.


    There are a number of ways to tackle this challenge. Our approach will be to create
    a dedicated `docker-compose-prod.yml` file that we can use to test the production
    environment locally. When it comes down to deploy our project into production,
    we will manually update the environment variables to match.


    To start, in the base directory create a `docker-compose-prod.yml` file. It will
    be located right next to the existing `docker-compose.yml` file. Then *immediately*
    add it to our exiting `.gitignore` file. We definitely do not want our production
    secrets to be stored in Git and available in the source code.'
