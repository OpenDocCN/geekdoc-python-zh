    The answer is via a database adapter! And that''s what [Psycopg](http://initd.org/psycopg/)
    is, the most popular database adapter for Python. If you''d like to learn more
    about how Psycopg works here is a link to a [fuller description](http://initd.org/psycopg/docs/index.html)
    on the official site.


    Psycopg 3.0 was recently released but many packages and hosting providers are
    still focused on Psycopg2 so that''s what we''ll use. Note that there are actually
    two versions of Psycopg2 available: `pyscopg2` and `pyscopg2-binary`. We will
    use the binary version in this book because it is simpler to use and works just
    fine for most websites. Using the non-binary version requires multiple additional
    steps of configuration and is only relevant to truly massive websites. If way
    down the line you find slowness with your database, investigating `pyscopg2` vs
    `psycopg2-binary` is a worthy use of time. But starting out it is not.


    To install it first stop running the Docker container with `docker-compose down`.


    # Shell


    ```


    $ docker-compose down

    ```


    It''s important to pause right now and think about what it means to install a
    package into Docker as opposed to a local virtual environment. In a traditional
    project we''d run the command `python -m pip install psycopg2-binary==2.9.3` from
    the command line to install Pyscopg2. But we''re working with Docker now.


    There are two options. The first is to install `psycopg2-binary` locally and then
    `pip freeze` our virtual environment to update `requirements.txt`. If we were
    going to use the local environment this might make sense. But since we are committed
    to Docker we can skip that step and instead just update `requirements.txt` with
    the `psycopg2-binary` package. We don''t need to update the actual virtual environment
    further because it is unlikely we''ll be using it. And if we ever did we can just
    update it based on `requirements.txt` anyway.


    In your text editor open the existing `requirements.txt` file and add `psycopg2-binary==2.9.3`
    to the bottom.'
