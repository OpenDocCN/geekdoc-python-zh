    # ## Conclusion


    There is an almost endless list of performance optimizations that can be applied
    to a project. But take care to recall Donald Knuth''s sage advice and not go too
    crazy on this. Bottlenecks will reveal themselves in production and should largely
    be addressed then; not in advance. There are also several third-party packages
    that can be helpful in identifying N+1 issues, most notably [nplusone](https://github.com/jmcarp/nplusone),
    [django-zen-queries](https://github.com/dabapps/django-zen-queries), and [django-auto-prefetch](https://github.com/tolomea/django-auto-prefetch).'
