    # # Chapter 14: Permissions


    Currently there are no permissions set on our Bookstore project. Any user, even
    one not logged in, can visit any page and perform any available action. While
    this is fine for prototyping, implementing a robust permissions structure is a
    must before deploying a website to production.


    Django comes with [built-in authorization options](https://docs.djangoproject.com/en/4.0/topics/auth/default/#permissions-and-authorization)
    for locking down pages to either logged in users, specific groups, or users with
    the proper individual permission.


    # ## Logged-In Users Only


    Confusingly there are multiple ways to add even the most basic permission: restricting
    access only to logged-in users. It can be done in a [raw way](https://docs.djangoproject.com/en/4.0/topics/auth/default/#the-raw-way)
    using the [login_required()](https://docs.djangoproject.com/en/4.0/topics/auth/default/#the-login-required-decorator)
    decorator, or since we are using class-based views so far via the [LoginRequired
    mixin](https://docs.djangoproject.com/en/4.0/topics/auth/default/#the-loginrequired-mixin).


    Let''s start by limiting access to the Books pages only to logged-in users. There
    is a link for it in the navbar so this is not the case of a user accidentally
    finding a URL (which also can happen); in this case the URL is quite public.


    First import `LoginRequiredMixin` at the top which we will then add to our `BookListView`
    class. It is important that `LoginRequiredMixin` come before `ListView` in order
    to work properly. Mixins are powerful but can be a little tricky in practice.
    As the official docs note, "[not all mixins can be used together, and not all
    generic class based views can be used with all other mixins.](https://docs.djangoproject.com/en/4.0/topics/class-based-views/mixins/#using-django-s-class-based-view-mixins)"


    The second update is adding a `login_url` for the user to be redirected to. This
    is the URL name for log in which, since we''re using `django-allauth` is `account_login`.
    If we were using the traditional Django authentication system then this link would
    be called simply `login`.'
