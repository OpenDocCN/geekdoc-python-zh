  md: "# ## Book Layout\n\nThere are many code examples in this book, which are formatted\
    \ as follows:\n\n**Code**\n\n```\npython\n# This is Python code\nprint(\"Hello,\
    \ World!\")\n```\n\nFor brevity we will use three dots, `...`, to denote existing\
    \ code that remains unchanged in a longer code example. For example, in the function\
    \ below, the previous content is unchanged and the `print()` statement has been\
    \ added. In these cases there will also be a comment, `# new`, indicating where\
    \ the new code has been added.\n\n**Code**\n\n```\npython\ndef make_my_website:\n\
    \    ...\n    print(\"All done!\")  # new\n```\n\nComplete source code for the\
    \ book can be found in the [official Github repository](https://github.com/wsvincent/djangoforprofessionals)⁴.\
    \ It is a good place to check first if there are any issues with your code.\n\n\
    # ## Community\n\n\"Come for the framework, stay for the community\" is a common\
    \ saying among Django developers. While the Django code base is very impressive,\
    \ ultimately the health of the project up to this point and going forward depends\
    \ upon the community that has grown around it. Django development happens publicly\
    \ on the [django-developers](https://docs.djangoproject.com/en/dev/internals/mailing-lists/#django-developers-mailing-list)⁵\
    \ list and the project is overseen by a non-profit, the [Django Software Foundation](https://www.djangoproject.com/foundation/)⁶,\
    \ which manages contributions, supports annual DjangoCon conferences, and local\
    \ meetups where developers gather to share knowledge and insights. There"
  merge: -1
  pgno: 14
- img_proc: true
  md: 'is an official [Django forum](https://forum.djangoproject.com/) populated by
    many members of the community which is an ideal place to ask for help.


    No matter what your level of technical expertise becoming involved in Django itself
    is a great way to learn, to meet other developers, and to enhance your own reputation.


    # ## Conclusion


    Django is an excellent choice for any developer who wants to build modern, robust
    web applications with a minimal amount of code. In the next chapter we''ll make
    sure your computer is properly set up for web development before diving deeply
    into Django itself in the rest of the book.


    ⁷https://forum.djangoproject.com/'
