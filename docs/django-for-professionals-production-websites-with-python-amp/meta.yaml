    ├── manage.py\n├── pages\n│   ...\n├── requirements.txt\n├── static\n│   ├── css\n\
    │   ├── images\n│   └── js\n└── templates\n    ...\n```\n\n需要注意的是，Git 默认不会跟踪空目录。因此，当我们最终将代码推送到\
    \ GitHub 和 Heroku 时，这些空目录将不会出现，这可能会在运行 `collectstatic` 时导致部署问题。为了避免这种情况，我们现在将向每个目录添加一个空文件。\n\
    \n在你的文本编辑器中创建以下三个文件：\n\n- `static/css/base.css`\n- `static/js/base.js`\n- `static/images/.keep`\n\
    \n## STATICFILES_DIRS\n\n在 `django_project/settings.py` 文件的底部有一个\"静态文件\"部分，其中已经将\
    \ [STATIC_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATIC_URL)\
    \ 设置为 `\"static/\"`。这是引用静态文件时使用的 URL。这意味着对于本地使用，所有静态文件都位于 `http://127.0.0.1:8000/static/`。\n\
    \n> ⁹⁰ https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATIC_URL"
