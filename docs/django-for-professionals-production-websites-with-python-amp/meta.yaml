  md: "Tempting as it is to simply add indexes to primary keys from the beginning,\
    \ it is better to start without them and only add them later based on production\
    \ needs. A general rule of thumb is that if a given field is being used frequently,\
    \ such as 10-25% of all queries, it is a prime candidate to be indexed.\n\nHistorically\
    \ an index field could be created by adding `db_index=True` to any model field.\
    \ For example, if we wanted to add one to the `id` field in our Book model it\
    \ would look as follows (don't actually implement this though).\n\n# Code\n\n\
    ```\n# books/models.py\n...\nclass Book(models.Model):\n    id = models.UUIDField(\n\
    \        primary_key=True,\n        db_index=True,  # new\n        default=uuid.uuid4,\n\
    \        editable=False)\n...\n```\n\nThis change would need to be added via a\
    \ migration file and migrated.\n\nStarting in Django 1.11^230^, class-based model\
    \ indexes were added so can include in the Meta section instead^231^. So you could\
    \ write the previous index as follows instead:\n\n# Code\n\n```\n# books/models.py\n\
    ...\nclass Book(models.Model):\n    id = models.UUIDField(\n        primary_key=True,\n\
    \        default=uuid.uuid4,\n        editable=False)\n    ...\n\n    class Meta:\n\
    \        indexes = [  # new\n            models.Index(fields=[\"id\"], name=\"\
    id_index\"),\n```"
