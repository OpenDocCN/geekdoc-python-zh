    \n## Conclusion\n\nThe goal of this chapter was to demonstrate how Docker and\
    \ PostgreSQL work together on a Django project. Switching between a SQLite database\
    \ and a PostgreSQL is a mental leap for many developers initially.\n\nThe key\
    \ point is that with Docker we don't need to be in a local virtual environment\
    \ anymore. Docker is our virtual environment...and our database and more if desired.\
    \ The Docker host essentially replaces our local operating system and within it\
    \ we can run multiple containers, such as for our web app and for our database,\
    \ which can all be isolated and run separately.\n\nIn the next chapter we will\
    \ start our online Bookstore project. Let's begin!\n\n# Chapter 4: Bookstore Project\n\
    \nIt is time to build the main project of this book, an online Bookstore. In this\
    \ chapter we will start a new project, switch over to Docker, add a custom user\
    \ model, and write our first tests.\n\nLet's start by creating a new Django project.\
    \ From the desktop create a new directory called ch4-bookstore and then create\
    \ and activate a new Python virtual environment. From there we will install both\
    \ Django and the `psycopg2-binary` adapter necessary to connect to a PostgreSQL\
    \ database.\n\n**Shell**\n\n```\n# Windows\n$ cd onedrive\\desktop\n$ mkdir ch4-bookstore\n\
    $ cd ch4-bookstore\n$ python -m venv .venv\n$ Set-ExecutionPolicy -ExecutionPolicy\
    \ RemoteSigned -Scope CurrentUser\n$ .venv\\Scripts\\Activate.ps1\n(.venv) $ python\
    \ -m pip install django~=4.0.0 psycopg2-binary==2.9.3\n\n# macOS\n$ cd ~/desktop/code\n\
    $ mkdir ch4-bookstore\n$ cd ch4-bookstore\n$ python3 -m venv .venv\n$ source .venv/bin/activate\n\
    (.venv) $ python3 -m pip install django~=4.0.0 psycopg2-binary==2.9.3\n```\n\n\
    We use the `startproject` command to make our new Django project called `django_project`.\
    \ Make sure you don't forget that period, `.`, at the end of the command or else\
    \ Django will create an extra directory which we don't need. Then use `runserver`\
    \ to start the local Django web server and confirm everything is working correctly.\n\
    \n## Shell\n\n```\n(.venv) $ django-admin startproject django_project .\n(.venv)\
