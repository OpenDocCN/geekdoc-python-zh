    # ## Media Files


    Fundamentally the difference between static and media files is that we can trust
    the former, but we definitely can''t trust the latter by default. There are always
    [security concerns](https://docs.djangoproject.com/en/4.0/ref/models/fields/#file-upload-security)
    when dealing with [user-uploaded content](https://docs.djangoproject.com/en/4.0/topics/security/#user-uploaded-content).
    Notably, it''s important to *validate all uploaded files* to ensure they are what
    they say they are. There are a number of nasty ways a malicious actor can attack
    a website that blindly accepts user uploads.


    To start let''s add two new configurations to the `django_project/settings.py`
    file. By default `MEDIA_URL` and `MEDIA_ROOT` are both empty and not displayed
    so we need to configure them:


    +   - [MEDIA_ROOT](https://docs.djangoproject.com/en/4.0/ref/settings/#media-root)
    is the absolute file system path to the directory for user-uploaded files

    - [MEDIA_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#media-url) is
    the URL we can use in our templates for the files


    We can add both of these settings after `STATICFILES_STORAGE` near the bottom
    of the `django_project/settings.py` file. We''ll use the common convention of
    calling both `media`. Don''t forget to include the trailing slash `/` for `MEDIA_URL`!


    **Code**


    ```

    python

    # django_project/settings.py

    MEDIA_URL = "/media/"  # new

    MEDIA_ROOT = BASE_DIR / "media"  # new

    ```


    Next add a new directory called `media` and a subdirectory called `covers` within
    it.


    **Shell**


    ```

    shell

    $ mkdir media

    $ mkdir media/covers

    ```


    And finally, since user-uploaded content is assumed to exist in a production context,
    to see media items locally we need to update `django_project/urls.py` to show
    the files locally. This involves importing both `settings` and `static` at the
    top and then adding an additional line at the bottom.'
