    ```\n\nThe official source code is [located on Github](https://github.com/wsvincent/djangoforprofessionals/tree/main/ch6-user-registration)\
    \ if you want to compare your code.\n\n## Conclusion\n\nOur Bookstore project\
    \ is not the most beautiful site in the world, but it is very functional at this\
    \ point. In the next chapter we'll configure our static assets and add Bootstrap\
    \ for improved styling.\n\n# Chapter 7: Static Assets\n\nStatic assets like CSS,\
    \ JavaScript, and images are a core component of any modern web application. Django\
    \ provides us with a large degree of flexibility around their configuration and\
    \ storage which can be confusing to newcomers but in practice the pattern is almost\
    \ identical for all projects. In this chapter we'll configure our initial static\
    \ assets and add [Bootstrap](https://getbootstrap.com/)⁸⁹ for improved styling.\n\
    \n## Local Development\n\nFor local development the Django web server automatically\
    \ serves static files and minimal configuration is required. Static files can\
    \ be placed in an app-level directory called `static` so we could, for example,\
    \ create a new directory within the pages app called `pages/static/`.\n\nHowever\
    \ most projects reuse static assets across multiple apps. Our bookstore app certainly\
    \ will! So a more common approach is to create a base-level directory `static`\
    \ folder and place all static files within there. This is easier to reason about\
    \ as a developer.\n\nFrom the command line create a new `static` folder along\
    \ with new subdirectories for CSS, JavaScript, and images.\n\n**Shell**\n\n```\n\
    $ mkdir static\n$ mkdir static/css\n$ mkdir static/js\n$ mkdir static/images\n\
    ```\n\nYour Django project should have the following structure at this point:\n\
    \n## Project Structure\n\n```\n├── Dockerfile\n├── accounts\n│   ...\n├── db.sqlite3\n\
    ├── django_project\n│   ...\n├── docker-compose.yml\n├── manage.py\n├── pages\n\
    │   ...\n├── requirements.txt\n├── static\n│   ├── css\n│   ├── images\n│   └──\
    \ js\n└── templates\n    ...\n```\n\nIt's important to be aware that Git, by default,\
    \ will not track directories that are empty. Thus when we eventually push our\
    \ code to both GitHub and Heroku these empty directories will not appear which\
    \ can cause problems in deployment when `collectstatic` is run. To avoid this\
    \ we will add an empty file to each directory now.\n\nIn your text editor create\
    \ the following three files:\n\n- `static/css/base.css`\n- `static/js/base.js`\n\
    - `static/images/.keep`\n\n## STATICFILES_DIRS\n\nAt the bottom of the `django_project/settings.py`\
    \ file is a section on \"Static files\" which has already set [STATIC_URL](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATIC_URL)\
    \ to `\"static/\"`. This is the URL used when referring to static files. It means\
    \ that for local usage all static files are located at `http://127.0.0.1:8000/static/`.\n\
    \n> ⁹⁰ https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-STATIC_URL"
