    \ [Python 下载页面](https://www.python.org/downloads/)⁸，然后点击\"Download the latest\
    \ version for Mac OS X\"文字下方的按钮。截至本文撰写时，该版本为 Python 3.10。安装包将位于您的 `Downloads`\
    \ 目录中。双击它以启动 Python 安装程序，并按照提示完成安装。\n\n要确认下载成功，请打开一个新的终端窗口并输入 `python3 --version`。\n\
    \n## Shell\n\n```\n$ python3 --version\nPython 3.10.4\n```\n\n结果至少应为 3.10。然后输入\
    \ `python3` 打开 Python 解释器。\n\n## Shell\n\n```\n$ python3\nPython 3.10.4 (v3.10.4:9d38120e33,\
    \ Mar 23 2022, 17:29:05)\n  [Clang 13.0.0 (clang-1300.0.29.30)] on darwin\nType\
    \ \"help\", \"copyright\", \"credits\" or \"license\" for more information.\n\
    >>>\n```\n\n## 文本编辑器\n\n命令行是我们执行程序命令的地方，但文本编辑器是实际编写代码的地方。计算机不在乎你使用什么文本编辑器——最终结果只是代码——但一个好的文本编辑器可以提供有用的提示并帮你捕获拼写错误。\n\
    \n有许多现代文本编辑器可供选择，但非常流行的一个是 [Visual Studio Code](https://code.visualstudio.com/)，它免费、易于安装，并且广受欢迎。如果你还没有使用文本编辑器，请从官方网站下载并安装\
    \ VSCode。\n\n一个可选但强烈推荐的额外步骤是利用 VSCode 上可用的大型扩展生态系统。在 Windows 上，导航到 `File -> Preferences\
    \ -> Extensions`，或在 macOS 上导航到 `Code -> Preferences -> Extensions`。这将启动扩展市场的搜索栏。输入\"\
    python\"，Microsoft 扩展将作为第一个结果显示。安装它。\n\n第二个要添加的扩展是 [Black](https://pypi.org/project/black/)，它是一个\
    \ Python 代码格式化工具，已迅速成为 Python 社区中的默认选择。要安装 Black，请通过转到页面顶部的 `Terminal -> New Terminal`\
    \ 在 VSCode 中打开一个终端窗口。在页面底部打开的新终端窗口中，输入 `python -m pip install black`。接下来，通过导航到\
    \ Windows 上的 `File -> Preferences -> Settings` 或 macOS 上的 `Code -> Preferences\
    \ -> Settings` 打开 VSCode 设置。搜索\"python formatting provider\"，然后从下拉选项中选择 `black`。然后搜索\"\
    format on save\"并启用\"Editor: Format on Save\"。现在，每当保存 `*.py` 文件时，Black 将自动格式化你的代码。\n\
    \n要确认这是否正常工作，请使用你的文本编辑器在桌面上 `ch1-setup` 目录中创建一个名为 `hello.py` 的新文件，并使用单引号输入以下内容：\n\
    \n**hello.py**\n\n```python\nprint('Hello, World!')\n```\n\n保存时，它应该自动更新为使用双引号，这是\
    \ [Black 的默认偏好](https://black.readthedocs.io/en/stable/the_black_code_style/current_style.html#strings)：`print(\"\
    Hello, World!\")`。这意味着一切正常工作。\n\n## 安装 Git\n\n最后一步是安装 Git，这是一个版本控制系统，对于现代软件开发来说是不可或缺的。使用\
    \ Git，你可以与其他开发人员协作，通过提交跟踪所有工作，并在意外删除重要内容时恢复到代码的任何先前版本！\n\n在 Windows 上，导航到官方网站\
    \ `https://git-scm.com/` 并点击\"Download\"链接，该链接应为你的计算机安装正确的版本。保存文件，然后打开你的下载文件夹并双击该文件。这将启动\
    \ Git for Windows 安装程序。在大多数早期默认设置中点击\"Next\"按钮，因为它们都很好，并且以后可以根据需要随时更新。但是有两个例外：在\"\
    Choosing the default editor used by Git\"下选择 VS Code 而不是 Vim。在\"Adjusting the\
    \ name of the initial branch in new repositories\"部分中，选择使用\"main\"作为默认分支名称，而不是\"\
    master\"。否则，推荐的默认设置是好的，以后如果需要可以随时调整。\n\n要确认 Git 已在 Windows 上安装，请关闭所有当前的 shell\
    \ 窗口，然后打开一个新窗口，这将加载我们对 PATH 变量的更改。输入 `git --version`，应该会显示已安装。\n\n```\n# Windows\n\
    $ git --version\ngit version 2.35.1.windows.2\n```\n\n在 macOS 上，通过 Xcode 安装 Git\
    \ 目前是最简单的选择。要检查你的计算机上是否已安装 Git，请在新终端窗口中输入 `git --version`。\n\n```\n# macOS\n$\
    \ git --version\n```\n\n如果你尚未安装 Git，将弹出一条消息，询问你是否要将其作为\"command line developer\
    \ tools\"的一部分进行安装。选择\"Install\"，这将加载 Xcode 及其命令行工具包。或者，如果你由于某种原因没有看到该消息，请改为输入\
    \ `xcode-select --install` 直接安装 Xcode。\n\n请注意，Xcode 是一个非常大的包，因此初始下载可能需要一些时间。Xcode\
    \ 主要用于构建 iOS 应用程序，但也包括 macOS 所需的许多开发人员功能。下载完成后，关闭所有现有的终端 shell，打开一个新窗口，然后输入 `git\
    \ --version` 以确认安装成功。\n\n```\n# macOS\n$ git --version\ngit version 2.32.0 (Apple\
    \ Git-132)\n```\n\n在你的机器上安装 Git 后，我们需要通过声明与所有 Git 提交关联的名称和电子邮件地址来进行一次性系统配置。我们还将把默认分支名称设置为\
    \ `main`。在命令行 shell 中输入以下两行。确保使用你的姓名和电子邮件地址更新它们。\n\n## Shell\n\n```\n$ git config\
    \ --global user.name \"Your Name\"\n$ git config --global user.email \"yourname@email.com\"\
    \n$ git config --global init.defaultBranch main\n```\n\n如果你愿意，以后可以随时通过使用新名称或电子邮件地址重新输入相同的命令来更改这些配置。\n\
    \n## 结论\n\n对于任何希望用最少代码构建现代、健壮的 Web 应用程序的开发人员来说，Django 是一个绝佳的选择。虽然配置软件开发环境并非易事，但你现在应该已经安装了\
    \ Python 3.10、安装了 Git，并配置了一个现代文本编辑器。\n\n在下一章中，我们将了解 Docker 以及如何使用 Docker 为任何计算机配置\
    \ Django 开发环境。\n\n# 第 2 章：Docker Hello, World!\n\n尽管现代编程取得了所有其他进步，但正确配置本地开发环境仍然是一个艰巨的挑战。变量实在太多：不同的计算机、操作系统、Django\
    \ 版本、虚拟环境选项等等。当你加上在团队环境中工作的挑战，即每个人都需要拥有相同的设置时，问题只会更加放大。\n\n近年来，一个解决方案已经出现：[Docker](https://www.docker.com/)¹²。它已迅速成为许多从事生产级项目的开发人员的默认选择。\n\
    \n使用 Docker，终于可以在本地忠实可靠地重现生产环境，从正确的 Python 版本到安装 Django 和运行额外的服务（如生产级数据库）。这意味着无论你使用的是\
    \ Mac、Windows 还是 Linux 计算机都不再重要。一切都在 Docker 本身中运行。\n\nDocker 还使团队协作变得指数级更容易。共享冗长、过时的\
    \ `README` 文件以将新开发人员添加到团队项目的日子已经一去不复返了。相反，使用 Docker，你只需共享两个文件——一个 `dockerfile`\
    \ 和一个 `docker-compose.yml` 文件——开发人员就可以确信他们的本地开发环境与团队其他成员完全相同。\n\nDocker 并非完美的技术。它仍然相对较新，底层复杂，并且正在积极开发中。但它所追求的承诺——一个一致且可共享的开发人员环境，可以在任何计算机上本地运行或部署到任何服务器——使其成为一个可靠的选择。它目前在各公司中也得到广泛使用，因此编写一本面向\"\
    专业人士\"的书而不涵盖 Docker 感觉目光短浅。\n\n在本章中，我们将进一步了解 Docker 本身，并\"Dockerize\"我们的第一个 Django\
    \ 项目。\n\n¹²https://www.docker.com/"
