    # Deploying with Docker


    Since we are using Docker containers locally we might as well do the same in production.
    Traditional non-Docker Heroku relies on a custom `Procfile` for configuring a
    site for deployment. For containers Heroku relies on a similar approach but it
    is called a [heroku.yml](https://devcenter.heroku.com/articles/build-docker-images-heroku-yml)^315
    file.


    In your text editor create a `heroku.yml` file now in the base directory. There
    are four [top-level sections](https://devcenter.heroku.com/articles/build-docker-images-heroku-yml#heroku-yml-overview)^316
    available for configuration: `setup`, `build`, `release`, and `run`.


    The main function of `setup` is to specify which add-ons are needed. These are
    hosted solutions Heroku provides, typically for a fee. The big one is our database
    which will rely on the free [heroku-postgresql](https://elements.heroku.com/addons/heroku-postgresql)^317
    tier. Heroku takes care of provisioning it, security updates, and we can easily
    upgrade the database size and uptime as needed.


    The `build` section is where we specify how the `Dockerfile` should be built.
    This relies on our current `Dockerfile` in the root directory. The `release` phase
    is used to run tasks before each new release is deployed. For example, we can
    make sure `collectstatic` is run on every deploy'
