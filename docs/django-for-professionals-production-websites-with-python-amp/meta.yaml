    PASSWORD\": \"postgres\",\n        \"HOST\": \"db\",\n        \"PORT\": 5432,\n\
    \    }\n}\n```\n\nMake sure to refresh the web browser for the homepage to confirm\
    \ everything still works correctly.\n\n# Custom User Model\n\nNow we come to new\
    \ material! We begin by implementing a custom user model which the official Django\
    \ documentation [\"highly recommends.\"](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#using-a-custom-user-model-when-starting-a-project)\
    \ Why? Because you *will* need to make changes to the built-in User model at some\
    \ point in your project's life and if you have not started with a custom user\
    \ model from the very first `migrate` command you run, then you're in for a world\
    \ of hurt because User is tightly interwoven with the rest of Django internally.\
    \ It is challenging to switch over to a custom user model mid-project.\n\nA point\
    \ of confusion for many people is that custom user models were only added in Django\
    \ 1.5. Up until that point the recommended approach was to add a [OneToOneField](https://docs.djangoproject.com/en/4.0/ref/models/fields/#django.db.models.OneToOneField),\
    \ often called a Profile model, to User. You'll often see this set up in older\
    \ projects."
  - '[PAGE 65]


    But these days using a custom user model is the more common approach. However
    as with many things Django-related, there are implementation choices: either extend
    [AbstractUser](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.models.AbstractUser)
    which keeps the default user fields and permissions or extend [AbstractBaseUser](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#django.contrib.auth.models.AbstractBaseUser)
    which is even more granular, and flexible, but requires more work.


    We''ll stick with the simpler `AbstractUser` in this book as `AbstractBaseUser`
    can be added later if needed.


    There are four steps for adding a custom user model to our project:


    +   1. Create a `CustomUser` model

    2. Update `django_project/settings.py`

    3. Customize `UserCreationForm` and `UserChangeForm`

    4. Add the custom user model to `admin.py`


    The first step is to create a `CustomUser` model which will live within its own
    app. I like to name this app `accounts`. Going forward we''ll run the majority
    of our commands within Docker itself. Because we configured a `volumes` within
    the web service of `docker-compose.yml` any file system changes within Docker
    will be reflected in the local file system.


    # Shell


    ```


    $ docker-compose exec web python manage.py startapp accounts

    ```


    Create a new `CustomUser` model which extends `AbstractUser`. That means we''re
    essentially making a copy where `CustomUser` now has inherited all the functionality
    of `AbstractUser`, but we can override or add new functionality as needed. We''re
    not making any changes yet so include the Python `pass` statement which acts as
    a placeholder for our future code.'
