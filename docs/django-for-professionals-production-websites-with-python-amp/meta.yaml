    Django is hosted on the [Python Package Index (PyPI)](https://pypi.org)^21, a\
    \ central repository for most Python packages. We will use `pip`, the most popular\
    \ package installer, which comes included with Python 3. To install the latest\
    \ version of Django use the command `python -m pip install django~=4.0.0`.\n\n\
    The comparison operator `~=` ensures that subsequent security updates for Django,\
    \ such as 4.0.1, 4.0.2, and so on are automatically installed. Note that while\
    \ it is possible to use the shorter version of `pip install <package>`, it is\
    \ a best practice to use the longer but more explicit form of `python -m pip install\
    \ <package>` to ensure that the correct version of Python is used. This can be\
    \ an issue if you have multiple versions of Python installed on your computer.\n\
    \n```\n(.venv) $ python -m pip install django~=4.0.0\n```\n\nYou might see a WARNING\
    \ message about updating `pip` after running these commands. It's always good\
    \ to be on the latest version of software and to remove the annoying WARNING message\
    \ each time you use `pip`. You can either copy and paste the recommended command\
    \ or run `python -m pip install --upgrade pip` to be on the latest version.\n\n\
    ```\n(.venv) $ python -m pip install --upgrade pip\n```\n\n## Django Hello, World\n\
    \nNow we can use the `startproject` command to create a new Django project called\
    \ `django_project`. Adding a period, `.`, at the end of the command is an optional\
    \ step but one many Django developers do. Without the period Django adds an additional\
    \ directory to the project; with the period it does not.\n\nWe can also use the\
    \ `migrate` command to initialize the database and start the local web server\
    \ with the `runserver` command.\n\n```\n(.venv) $ django-admin startproject django_project\
    \ .\n(.venv) $ python manage.py migrate\n(.venv) $ python manage.py runserver\n\
    ```\n\nAssuming everything worked correctly you should now be able to navigate\
    \ to see the Django Welcome page at `http://127.0.0.1:8000/` in your web browser.\n\
    \n![](img/d9b58f5e350349fe0759c8474cded65a_32_0.png)\n\nDjango welcome page\n\n\
    ## Pages App\n\nNow we will make a simple homepage by creating a dedicated pages\
    \ app for it. Stop the local server by typing `Control+c` and then use the `startapp`\
    \ command appending our desired `pages` name.\n\n**Shell**\n\n```\n(.venv) $ python\
    \ manage.py startapp pages\n```\n\nDjango automatically installs a new pages directory\
    \ and several files for us. But even though the app has been created our `django_project`\
    \ won't recognize it until we add it to the `INSTALLED_APPS` config within the\
    \ `django_project/settings.py` file. Django loads apps from top to bottom so generally\
    \ speaking it's a good practice to add new apps below built-in apps they might\
    \ rely on such as `admin`, `auth`, and all the rest.\n\n## Code\n\n```\n# django_project/settings.py\n\
    INSTALLED_APPS = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\"\
    ,\n    \"django.contrib.contenttypes\",\n    \"django.contrib.sessions\",\n  \
    \  \"django.contrib.messages\",\n    \"django.contrib.staticfiles\",\n    # Local\n\
    \    \"pages.apps.PagesConfig\",  # new\n]\n```\n\nNow we can set the URL route\
    \ for the pages app. Since we want our message to appear on the homepage we'll\
    \ use the empty string \"\". Don't forget to add the include import on the second\
    \ line as well.\n\n## Code\n\n```\n# django_project/urls.py\nfrom django.contrib\
    \ import admin\nfrom django.urls import path, include  # new\n\nurlpatterns =\
    \ [\n    path(\"admin/\", admin.site.urls),\n    path(\"\", include(\"pages.urls\"\
    )),  # new\n]\n```\n\nRather than set up a template at this point we can just\
    \ hardcode a message in our view layer at pages/views.py which will output the\
    \ string \"Hello, World!\".\n\n## Code\n\n```\n# pages/views.py\nfrom django.http\
    \ import HttpResponse\n\ndef home_page_view(request):\n    return HttpResponse(\"\
    Hello, World!\")\n```\n\nWhat's next? Our last step is to create a `urls.py` file\
    \ within the pages app and link it to `home_page_view`. Do so now with your text\
    \ editor. Then in the new file `pages/urls.py` import path on the top line, add\
    \ the `home_page_view`, and then set its route to again be the empty string of\
    \ `\"\"`. Note that we also provide an optional name, `home`, for this route which\
    \ is a best practice.\n\n## Code\n\n```\n# pages/urls.py\nfrom django.urls import\
    \ path\n\nfrom .views import home_page_view\n\nurlpatterns = [\n    path(\"\"\
    , home_page_view, name=\"home\")\n]\n```\n\nThe full flow of our Django homepage\
    \ is as follows:\n\n- when a user goes to the homepage they will first be routed\
    \ to `django_project/urls.py`\n- then routed to `pages/urls.py`\n- and finally\
    \ directed to the `home_page_view` which returns the string \"Hello, World!\"\n\
    \nOur work is done for a basic homepage. Start up the local server again.\n\n\
    ## Shell\n\n```\n(.venv) $ python manage.py runserver\n```\n\nIf you refresh the\
    \ web browser at `http://127.0.0.1:8000/` it will now output our desired message.\n\
    \n![](img/d9b58f5e350349fe0759c8474cded65a_35_0.png)\n\n**Hello World**\n\nThe\
    \ last step is to create a `requirements.txt` file containing a record of all\
    \ Python packages currently installed in our virtual environment. The command\
    \ `pip freeze` will output the contents of your current virtual environment and\
    \ by using the `>` operator we can do all this in one step: output the contents\
    \ into a new file called `requirements.txt`. If your server is still running enter\
    \ `Ctrl+c` and `Enter` to exit before entering this command.\n\n**Shell**\n\n\
    ```\n(.venv) $ pip freeze > requirements.txt\n```\n\nA new `requirements.txt`\
    \ file will be created. It should contain `Django` as well as the packages `asgiref`\
    \ and `sqlparse` which are automatically included when Django is installed.\n\n\
    **requirements.txt**\n\n```\nasgiref==3.5.2\nDjango==4.0.4\nsqlparse==0.4.2\n\
    ```\n\nNow it's time to switch to Docker. Exit our virtual environment since we\
    \ no longer need it by typing `deactivate` and Return.\n\n**Shell**\n\n```\n(.venv)\
    \ $ deactivate\n$\n```\n\nHow do we know the virtual environment is no longer\
    \ active? There will no longer be parentheses around the directory name on the\
    \ command line prompt. Any normal Django commands you try to run at this point\
    \ will fail. For example, try `python manage.py runserver` to see what happens.\n\
    \n```\n$ python manage.py runserver\n...\nModuleNotFoundError: No module named\
    \ 'django'\n```\n\nThis means we're fully out of the virtual environment and ready\
    \ for Docker.\n\n## Docker Image\n\nA Docker *image* is a read-only template that\
    \ describes how to create a Docker container. The image is the instructions while\
    \ the container is the actual running instance of an image. To continue our apartment\
    \ analogy from earlier in the chapter, an image is the blueprint or set of plans\
    \ for building an apartment; the container is the actual, fully-built building.\n\
    \nImages are often based on another image with some additional customization.\
    \ For example, there is a long list of officially supported images for [Python](https://hub.docker.com/_/python/)\
    \ depending on the version and flavor of Python desired.\n\n## Dockerfile\n\n\
    For our Django project we need to create a custom image that contains Python but\
    \ also installs our code and has additional configuration details. To build our\
    \ own image we create a special file known as a *Dockerfile* that defines the\
    \ steps to create and run the custom image.\n\nUse your text editor to create\
    \ a new `Dockerfile` file in the project-level directory next to the `manage.py`\
    \ file. Within it add the following code which we'll walk through line-by-line\
    \ below."
