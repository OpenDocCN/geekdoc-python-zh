    # ## Production Database


    New web developers often wonder why our new live site doesn''t mimic what we have
    locally. Where are the books? And reviews?


    This is because our local database and production database are completely different
    things. The live site doesn''t know anything about the local Docker container
    containing our PostgreSQL database and the information we''ve added. To mimic
    what we have locally you need to log into the admin section of your live production
    site. Then add any users, books, reviews, and so on that you want.


    Remember that `django-storages` needs to be configured if you want book covers,
    which are media files, to remain for an extended period of time.


    # ## Heroku Logs


    It is inevitable that you will have errors in your deployment at some point. When
    you do, run `heroku logs` to see error and info logs and debug what''s going on.'
