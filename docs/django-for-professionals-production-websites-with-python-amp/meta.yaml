    # ## Media Files


    Media files such as the book covers in our site are unfortunately a little more
    complicated than static files for reasons covered in Chapter 13. As a result,
    while they will appear as desired in local development, they will not remain long
    in a production setting. The recommended approach is to use the very popular [django-storages](https://django-storages.readthedocs.io/en/latest/)
    package alongside a dedicated CDN like S3. However this requires additional configuration
    that is beyond the scope of this book.


    # ## Gunicorn


    When we ran the `startproject` command way back in Chapter 3, a `django_project/wsgi.py`
    file was created with a default [WSGI (Web Server Gateway Interface)](https://wsgi.readthedocs.io/en/latest/)
