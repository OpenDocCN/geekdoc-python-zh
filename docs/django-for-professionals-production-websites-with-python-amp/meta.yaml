  md: '# DEBUG and ALLOWED_HOSTS


    As the Django [deployment checklist](https://docs.djangoproject.com/en/4.0/howto/deployment/checklist/)
    notes, there are a number of settings that must be updated before a website can
    be deployed safely in production. Chief among them are [DEBUG](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-DEBUG)
    and [ALLOWED_HOSTS](https://docs.djangoproject.com/en/4.0/ref/settings/#allowed-hosts).


    When `DEBUG` is set to `True`, Django displays a lengthy message and detailed
    bug report whenever an error occurs. For example, try visiting a page that does
    not exist such as `/debug`.


    ![](img/d9b58f5e350349fe0759c8474cded65a_155_0.png)


    Debug Page


    This is great for our purposes as developers, but it is also a roadmap for a hacker
    in a production setting. When `DEBUG` is set to `False` it is required to add
    a setting for `ALLOWED_HOSTS`, which controls the specific hosts or domains that
    can access the website. We''ll add the two local ports—`localhost` and `127.0.0.1`—as
    well as `.herokuapp.com`, which will be used by Heroku for our production website.


    Update the `django_project/settings.py` file with two new settings:'
  merge: -1
  pgno: 155
- img_proc: true
  md: "# Code\n\n```\n# django_project/settings.py\nDEBUG = False  # new\nALLOWED_HOSTS\
    \ = [\".herokuapp.com\", \"localhost\", \"127.0.0.1\"]  # new\n```\n\nThen refresh\
    \ the web page.\n\n![](img/d9b58f5e350349fe0759c8474cded65a_156_0.png)\n\n**Debug\
    \ Page Not Found**\n\nThis is the behavior we want for our production site: no\
    \ information, just a generic message. When we deploy the website we'll use an\
    \ elegant way to toggle between the two settings, but for now change `DEBUG` to\
    \ an environment variable called `DJANGO_DEBUG`.\n\n# Code\n\n```\n# django_project/settings.py\n\
    DEBUG = env.bool(\"DJANGO_DEBUG\")  # new\n```\n\nThen proceed to update `docker-compose.yml`\
    \ so `DJANGO_DEBUG` is set to `True`.\n\n# docker-compose.yml\n\n```\nversion:\
    \ '3.9'\n\nservices:\n  web:\n    build: .\n    command: python /code/manage.py\
    \ runserver 0.0.0.0:8000\n    volumes:\n      - .:/code\n    ports:\n      - 8000:8000\n\
    \    depends_on:\n      - db\n    environment:\n```"
