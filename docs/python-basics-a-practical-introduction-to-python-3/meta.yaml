- md: "## 4.4 Interact With User Input\n\nNow that you've seen how to work with string\
    \ methods, let's make things interactive. In this section, you will learn how\
    \ to get some input from a user with the `input()` function. You'll write a program\
    \ that asks a user to input some text and then display that text back to them\
    \ in uppercase.\n\nEnter the following into IDLE's interactive window:\n\n```\n\
    >>> input()\n```\n\nWhen you press Enter, it looks like nothing happens. The cursor\
    \ moves to a new line, but a new `>>>` doesn't appear. Python is waiting for you\
    \ to enter something!\n\nGo ahead and type some text and press Enter:\n\n```\n\
    >>> input()\nHello there!\n'Hello there!'\n>>>\n```\n\nThe text you entered is\
    \ repeated on a new line with single quotes. That's because `input()` returns\
    \ any text entered by the user as a string.\n\nTo make `input()` a bit more user\
    \ friendly, you can give it a **prompt** to display to the user. The prompt is\
    \ just a string that you put in between the parentheses of `input()`. It can be\
    \ anything you want: a word, a symbol, a phrase—anything that is a valid Python\
    \ string.\n\nThe `input()` function displays the prompt and waits for the user\
    \ to type something on their keyboard. When the user hits Enter, `input()` returns\
    \ their input as a string that can be assigned to a variable and used to do something\
    \ in your program.\n\nTo see how `input()` works, save and run the following script:\n\
    \n```\nprompt = \"Hey, what's up? \"\nuser_input = input(prompt)\nprint(\"You\
    \ said:\", user_input)\n```\n\nWhen you run this script, you'll see `Hey, what's\
    \ up?` displayed in the interactive window with a blinking cursor.\n\nThe single\
    \ space at the end of the string `\"Hey, what's up? \"` makes sure that when the\
    \ user starts to type, the text is separated from the prompt with a space. When\
    \ you type a response and press Enter, your response is assigned to the `user_input`\
    \ variable.\n\nHere's a sample run of the program:\n\n```\nHey, what's up? Mind\
    \ your own business.\n\nYou said: Mind your own business.\n```\n\nOnce you have\
    \ input from a user, you can do something with it. For example, the following\
    \ script takes user input and converts it to uppercase with `.upper()` and prints\
    \ the result:\n\n```\nresponse = input(\"What should I shout? \")\nshouted_response\
    \ = response.upper()\nprint(\"Well, if you insist...\", shouted_response)\n```\n\
    \n## Review Exercises\n\nYou can find the solutions to these exercises and many\
    \ other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n- 1. Write a script that takes input from the user and displays that input back.\n\
    - 2. Write a script that takes input from the user and displays the input in lowercase.\n\
    - 3. Write a script that takes input from the user and displays the number of\
    \ characters inputted.\n\n[Leave feedback on this section »](https://realpython.com/python-basics/resources)\n\
    \n## 4.5 Challenge: Pick Apart Your User’s Input\n\nWrite a script named `first_letter.py`\
    \ that first prompts the user for input by using the string `\"Tell me your password:\"\
    ` The script should then determine the first letter of the user’s input, convert\
    \ that letter to upper-case, and display it back.\n\nFor example, if the user\
    \ input is `\"no\"` then the program should respond like this:\n\n```\nThe first\
    \ letter you entered was: N\n```\n\nFor now, it’s okay if your program crashes\
    \ when the user enters nothing as input—that is, they just hit `Enter` instead\
    \ of typing something in. You’ll learn about a couple of ways you can deal with\
    \ this situation in an upcoming chapter.\n\nYou can find the solutions to this\
    \ code challenge and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n[Leave feedback on this section »](https://realpython.com)\n\n## 4.6 Working\
    \ With Strings and Numbers\n\nWhen you get user input using the `input()` function,\
    \ the result is always a string. There are many other times when input is given\
    \ to a program as a string. Sometimes those strings contain numbers that need\
    \ to be fed into calculations.\n\nIn this section you will learn how to deal with\
    \ strings of numbers. You will see how arithmetic operations work on strings,\
    \ and how they often lead to surprising results. You will also learn how to convert\
    \ between strings and number types.\n\n### Strings and Arithmetic Operators\n\n\
    You've seen that string objects can hold many types of characters, including numbers.\
    \ However, don't confuse numerals in a string with actual numbers. For instance,\
    \ try this bit of code out in IDLE's interactive window:\n\n```\n>>> num = \"\
    2\"\n>>> num + num\n'22'\n```\n\nThe `+` operator concatenates two strings together.\
    \ So, the result of `\"2\" + \"2\"` is `\"22\"`, not `\"4\"`.\n\nStrings can be\
    \ \"multiplied\" by a number as long as that number is an integer, or whole number.\
    \ Type the following into the interactive window:\n\n```\n>>> num = \"12\"\n>>>\
    \ num * 3\n'121212'\n```\n\n`num * 3` concatenates the string `\"12\"` with itself\
    \ three times and returns the string `\"121212\"`. To compare this operation to\
    \ arithmetic with numbers, notice that `\"12\" * 3 = \"12\" + \"12\" + \"12\"\
    `. In other words, multiplying a string by an integer `n` concatenates that string\
    \ with itself `n` times.\n\nThe number on the right-hand side of the expression\
    \ `num * 3` can be moved to the left, and the result is unchanged:\n\n```\n>>>\
    \ 3 * num\n'121212'\n```\n\nWhat do you think happens if you use the `*` operator\
    \ between two strings? Type `\"12\" * \"3\"` in the interactive window and press\
    \ Enter:\n\n```\n>>> \"12\" * \"3\"\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nTypeError: can't multiply sequence by non-int\
    \ of type 'str'\n```\n\nPython raises a `TypeError` and tells you that you can't\
    \ multiply a sequence by a non-integer. When the `*` operator is used with a string\
    \ on either the left or the right side, it always expects an integer on the other\
    \ side.\n\n> **Note**\n>\n> A **sequence** is any Python object that supports\
    \ accessing elements by index. Strings are sequences. You will learn about other\
    \ sequence types in Chapter 9.\n\nWhat do you think happens when you try to add\
    \ a string and a number?\n\n```\n>>> \"3\" + 3\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: can only concatenate str\
    \ (not \"int\") to str\n```\n\nAgain, Python throws a `TypeError` because the\
    \ `+` operator expects both things on either side of it to be of the same type.\
    \ If any one of the objects on either side of `+` is a string, Python tries to\
    \ perform string concatenation. Addition will only be performed if both objects\
    \ are numbers. So, to add `\"3\" + 3` and get `6`, you must first convert the\
    \ string `\"3\"` to a number.\n\n### Converting Strings to Numbers\n\nThe `TypeError`\
    \ errors you saw in the previous section highlight a common problem encountered\
    \ when working with user input: type mismatches when trying to use the input in\
    \ an operation that requires a number and not a string.\n\nLet's look at an example.\
    \ Save and run the following script.\n\n```\nnum = input(\"Enter a number to be\
    \ doubled: \")\ndoubled_num = num * 2\nprint(doubled_num)\n```\n\nWhen you enter\
    \ a number, such as `2`, you expect the output to be `4`, but in this case, you\
    \ get `22`. Remember, `input()` always returns a string, so if you input `2`,\
    \ then `num` is assigned the string `\"2\"`, not the integer `2`. Therefore, the\
    \ expression `num * 2` returns the string `\"2\"` concatenated with itself, which\
    \ is `\"22\"`.\n\nTo perform arithmetic on numbers that are contained in a string,\
    \ you must first convert them from a string type to a number type. There are two\
    \ ways to do this: `int()` and `float()`.\n\n`int()` stands for **integer** and\
    \ converts objects into whole numbers, while `float()` stands for **floating-point\
    \ number** and converts objects into numbers with decimal points. Here's what\
    \ using them looks like in the interactive window:"
