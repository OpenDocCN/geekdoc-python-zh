    \ of these exceptions and display the string `\"encountered a problem\"` if either\
    \ exception is raised.\n\nMany times, though, it is helpful to catch each error\
    \ individually so that you can display text that is more helpful to the user.\
    \ To do this, you can use multiple `except` blocks after a `try` block:\n\n```python\n\
    def divide(num1, num2):\n    try:\n```"
