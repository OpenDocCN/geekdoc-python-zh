    # Breakpoints and the “Go” Button


    Often, you may know that the bug must be in a particular section of your code,
    but you may not know precisely where. Rather than clicking the `Step` button all
    day long, you can set a **breakpoint** that tells the debugger to run all code
    before the breakpoint continuously until the breakpoint is reached.


    Breakpoints tell the debugger when to pause code execution so that you can take
    a look at the current state of the program. They don’t actually break anything.


    To set a breakpoint, right-click (Mac: `Ctrl` + `Click`) on the line of code in
    your script window you would like to pause at and select `Set Breakpoint`. IDLE
    highlights the line in yellow to indicate that your breakpoint has been set. You
    can remove a breakpoint at any time by right-clicking on the line with a breakpoint
    and selecting `Clear Breakpoint`.


    Go ahead and press the `Quit` button at the top of the Debug Control Window to
    turn off the debugger for now. This won’t close the window, and you’ll want to
    keep it open because you’ll be using it again in just a moment.


    Set a breakpoint on the line of code with the `print()` statement. The script
