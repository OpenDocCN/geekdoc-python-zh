  md: "# 6.6. Understand Scope in Python\n\nPython resolves scope in the order in\
    \ which each scope appears in the list LEGB. Here is a quick overview to help\
    \ you remember how all of this works:\n\n**Local (L):** The local, or current,\
    \ scope. This could be the body of a function or the top-level scope of a script.\
    \ It always represents the scope that the Python interpreter is currently working\
    \ in.\n\n**Enclosing (E):** The enclosing scope. This is the scope one level up\
    \ from the local scope. If the local scope is an inner function, the enclosing\
    \ scope is the scope of the outer function. If the scope is a top-level function,\
    \ the enclosing scope is the same as the global scope.\n\n**Global (G):** The\
    \ global scope, which is the top-most scope in the script. This contains all of\
    \ the names defined in the script that are not contained in a function body.\n\
    \n**Built-in (B):** The built-in scope contains all of the names, such as keywords,\
    \ that are built-in to Python. Functions such as `round()` and `abs()` are in\
    \ the built-in scope. Anything that you can use without first defining yourself\
    \ is contained in the built-in scope.\n\n# Break the Rules\n\nConsider the following\
    \ script. What do you think the output is?\n\n```\npython\ntotal = 0\n\ndef add_to_total(n):\n\
    \    total = total + n\n\nadd_to_total(5)\nprint(total)\n```\n\nYou would think\
    \ that script outputs the value 5, right? Try running it to see what happens.\n\
    \nSomething unexpected occurs. You get an error!"
  merge: -1
