    \n## 6.4 循环运行\n\n计算机的一大优点是你可以让它们一遍又一遍地做同样的事情，而它们很少抱怨或感到疲倦。\n\n**循环**是一段代码块，它会一遍又一遍地重复执行，要么执行指定的次数，要么直到满足某个条件。Python\
    \ 中有两种循环：**while 循环**和 **for 循环**。在本节中，你将学习如何使用这两种循环。\n\n让我们从了解 `while` 循环的工作原理开始。\n\
    \n## while 循环\n\nwhile 循环在某个条件为真时重复执行一段代码。每个 while 循环都有两个部分：\n\n1.  while **语句**以\
    \ while 关键字开头，后跟一个**测试条件**，并以冒号 (:) 结尾。\n2.  **循环体**包含在循环的每一步中重复执行的代码。每行缩进四个空格。\n\
    \n当执行 while 循环时，Python 会评估测试条件并确定其为真还是假。如果测试条件为真，则执行循环体中的代码。否则，跳过循环体中的代码，并执行程序的其余部分。\n\
    \n如果测试条件为真并且循环体被执行，那么一旦 Python 到达循环体的末尾，它就会返回到 while 语句并重新评估测试条件。如果测试条件仍然为真，则再次执行循环体。如果为假，则跳过循环体。\n\
    \n这个过程一遍又一遍地重复，直到测试条件失败，导致 Python 循环执行 while 循环体中的代码。\n\n让我们看一个例子。在交互式窗口中输入以下代码：\n\
    \n```\n>>> n = 1\n>>> while n < 5:\n...     print(n)\n...     n = n + 1\n...\n\
    1\n2\n3\n4\n```\n\n首先，整数 1 被赋值给变量 n。然后创建一个 while 循环，测试条件为 n < 5，它检查 n 的值是否小于 5。\n\
    \n如果 n 小于 5，则执行循环体。循环体中有两行代码。在第一行中，n 的值被打印在屏幕上，然后在第二行中，n 被**递增** 1。\n\n循环执行分为五个步骤，如下表所述：\n\
    \n| 步骤 # | n 的值 | 测试条件 | 发生的情况 |\n| :--- | :--- | :--- | :--- |\n| 1 | 1 | 1 <\
    \ 5 (true) | 打印 1；n 递增到 2 |\n| 2 | 2 | 2 < 5 (true) | 打印 2；n 递增到 3 |\n| 3 | 3\
    \ | 3 < 5 (true) | 打印 3；n 递增到 4 |\n| 4 | 4 | 4 < 5 (true) | 打印 4；n 递增到 5 |\n|\
    \ 5 | 5 | 5 < 5 (false) | 不打印任何内容；循环结束。 |\n\n如果不小心，你可能会创建一个**无限循环**。当测试条件始终为真时，就会发生这种情况。无限循环永远不会终止。循环体会永远重复下去。\n\
    \n这是一个无限循环的例子：\n\n```\n>>> n = 1\n>>> while n < 5:\n...     print(n)\n...\n```\n\
    \n这个 `while` 循环与前一个的唯一区别是，在循环体中 n 从未被递增。在循环的每一步中，n 都等于 1。这意味着测试条件 n < 5 始终为真，数字\
    \ 1 会一遍又一遍地永远打印出来。\n\n> **注意**\n\n无限循环本身并不总是坏事。有时它们正是你需要的那种循环。\n\n例如，与硬件交互的代码可能会使用无限循环来持续检查按钮或开关是否已被激活。\n\
    \n如果你运行一个进入无限循环的程序，你可以通过按 `Ctrl+C` 强制 Python 退出。Python 停止运行程序并引发一个 `KeyboardInterrupt`\
    \ 错误：\n\n```\nTraceback (most recent call last):\n  File \"<pyshell#8>\", line\
    \ 2, in <module>\n    print(n)\nKeyboardInterrupt\n```\n\n让我们看一个 `while` 循环的实际例子。`while`\
    \ 循环的一个用途是检查用户输入是否满足某个条件，如果不满足，则反复要求用户输入新的输入，直到收到有效的输入。\n\n例如，以下程序持续要求用户输入一个正数，直到输入一个正数为止：\n\
    \n```\nnum = float(input(\"Enter a positive number: \"))\n\nwhile num <= 0:\n\
    \    print(\"That's not a positive number!\")\n    num = float(input(\"Enter a\
    \ positive number: \"))\n```\n\n首先，提示用户输入一个正数。测试条件 `num <= 0` 确定 `num` 是否小于或等于\
    \ 0。\n\n如果 `num` 是正数，则测试条件失败。循环体被跳过，程序结束。\n\n否则，如果 `num` 是 0 或负数，则执行循环体。通知用户其输入不正确，并再次提示他们输入一个正数。\n\
    \n`while` 循环非常适合在满足某个条件时重复一段代码。然而，它们不适合重复一段代码特定的次数。\n\n## `for` 循环\n\n`for` 循环对集合中的每个项目执行一次代码段。代码执行的次数由集合中的项目数量决定。\n\
    \n与其 `while` 对应部分一样，`for` 循环有两个主要部分：\n\n1.  **for 语句**以 `for` 关键字开头，后跟一个**成员表达式**，并以冒号\
    \ (:) 结尾。\n2.  **循环体**包含在循环的每一步中要执行的代码，并缩进四个空格。\n\n让我们看一个例子。以下 `for` 循环逐个打印字符串\
    \ \"Python\" 的每个字母：\n\n```\nfor letter in \"Python\":\n    print(letter)\n```\n\
    \n在这个例子中，`for` 语句是 `for letter in \"Python\"`。成员表达式是 `letter in \"Python\"`。\n\
    \n在循环的每一步中，变量 `letter` 被赋值为字符串 \"Python\" 中的下一个字母，然后打印 `letter` 的值。\n\n循环对字符串\
    \ \"Python\" 中的每个字符运行一次，因此循环体执行六次。下表总结了这个 `for` 循环的执行情况：\n\n| 步骤 # | `letter`\
    \ 的值 | 发生的情况 |\n| :--- | :--- | :--- |\n| 1 | \"P\" | 打印 P |"
