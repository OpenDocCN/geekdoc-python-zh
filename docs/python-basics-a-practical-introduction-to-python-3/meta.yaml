    ```


    This tells you that line 1 (which contains the code `for i in range(1, 4):`) is
    *about* to be run but has not started yet. The `''__main__''.module()` part of
    the message in the debugger refers to the fact that we''re currently in the “main”
    section of the script, as opposed to being, for example, in a function definition
    before the main block of code has been reached.


    Below the *Stack* panel, there is a *Locals* panel that lists some strange looking
    stuff like `__annotations__`, `__builtins__`, `__doc__`, and so on. These are
    some internal system variables that you can ignore for now. As your program runs,
    you will see variables declared in the code displayed in this window so that you
    can keep track of their value.


    There are five buttons located at the top left-hand corner of the Debug window:
    `Go`, `Step`, `Over`, `Out`, and `Quit`. These buttons control how the debugger
    moves through your code.'
