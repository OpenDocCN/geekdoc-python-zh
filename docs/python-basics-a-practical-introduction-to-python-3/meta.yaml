    \ time only paths that match the pattern `\"*.txt\"` are returned. `.glob()` returns\
    \ only paths that are directly contained in the folder on which it is called.\n\
    \n## 12.3. Common File System Operations\n\nYou can convert the return value of\
    \ `.glob()` to a list:\n\n```\n>>> list(new_dir.glob())\n[WindowsPath('C:/Users/David/new_directory/file1.txt')]\n\
    ```\n\nYou will most often use `.glob()` in a `for` loop.\n\nThe following table\
    \ describes some common wildcard characters:\n\n| Wildcard Character | Description\
