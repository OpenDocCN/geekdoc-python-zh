    # ## 3.1 Write a Python Script


    If you don’t have IDLE open already, go ahead and open it. There are two main
    windows that you will work with in IDLE: the **interactive window**, which is
    the one that opens when you start IDLE, and the **script window**.


    You can type code into both the interactive and script windows. The difference
    between the two is how the code is executed. In this section,'
  merge: -1
  pgno: 43
- img_proc: true
  md: 'you will write your first Python program and learn how to run it in both windows.


    # The Interactive Window


    The interactive window contains a **Python shell**, which is a textual user interface
    used to interact with the Python language. Hence the name “interactive window.”


    When you first open IDLE, the text displayed looks something like this:


    ```

    Python 3.8.1 (tags/v3.8.1:1b293b6, Dec 18 2019, 22:39:24)

    [MSC v.1916 32 bit (Intel)] on win32

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    The first line tells you what version of Python is running. In this case, IDLE
    is running Python 3.8.1. The second and third lines give some information about
    the operating system and some commands you can use to get more information about
    Python.


    The >>> symbol in the last line is called the **prompt**. This is where you will
    type in your code. Go ahead and type 1 + 1 at the prompt and press Enter.


    When you hit Enter, Python evaluates the expression, displays the result 2, and
    then prompts you for more input:


    ```

    >>> 1 + 1

    2

    >>>

    ```


    Notice that the Python prompt >>> appears again after your result. Python is ready
    for more instructions! Every time you run some code, a new prompt appears directly
    below the output.


    The sequence of events in the interactive window can be described as a loop with
    three steps:'
  merge: -1
  pgno: 44
- img_proc: true
  md: '# 3.1. Write a Python Script


    +   1. First, Python reads the code entered at the prompt.

    2. Then the code is evaluated.

    3. Finally, the output is printed in the window and a new prompt is displayed.


    This loop is commonly referred to as a **Read-Evaluate-Print Loop**, or **REPL**.
    Python programmers sometimes refer the Python shell as a “Python REPL”, or just
    “the REPL” for short.


    > **Note**


    From this point on, the final >>> prompt displayed after executing code in the
    interactive window is excluded from code examples.


    Let’s try something a little more interesting than adding two numbers. A rite
    of passage for every programmer is writing their first “Hello, world” program
    that prints the phrase “Hello, world” on the screen.


    To print text to the screen in Python, you use the `print()` function. A **function**
    is a bit of code that typically takes some input, called an **argument**, does
    something with that input, and produces some output, called the **return value**.


    Loosely speaking, functions in code work like mathematical functions. For example,
    the mathematical function $A(r)=\pi r^2$ takes the radius r of a circle as input
    and produces the area of the circle as output.'
  merge: -1
  pgno: 45
- img_proc: true
  md: '> **Important**


    The analogy to mathematical functions has some problems, though, because code
    functions can have **side effects**. A side effect occurs anytime a function performs
    some operation that changes something about the program or the computer running
    the program.


    For example, you can write a function in Python that takes someone’s name as input,
    stores the name in a file on the computer, and then outputs the path to the file
    with the name in it. The operation of saving the name to a file is a side effect
    of the function.


    You’ll learn more about functions, including how to write your own, in Chapter
    6.


    Python’s `print()` function takes some text as input and then displays that text
    on the screen. To use `print()`, type the word `print` at the prompt in the interactive
    window, followed by the text "Hello, world" inside of parentheses:


    ```

    >>> print("Hello, world")

    Hello, world

    ```


    Here "Hello, world" is the argument that is being **passed** to `print()`. "Hello,
    world" must be written with quotation marks so that Python interprets it as text
    and not something else.


    > **Note**


    As you type code into the interactive window, you may notice that the font color
    changes for certain parts of the code. IDLE **highlights** parts of your code
    in different colors to help make it easier for you to identify what the different
    parts are.


    By default, built-in functions, such as `print()` are displayed in purple, and
    text is displayed in green.'
