    # 14.1. Extract Text From a PDF


    > **Note**


    If you haven''t already, you can download the exercise solutions and practice
    files [here](https://nostarch.com/pythonbasics2).


    Open IDLE''s interactive window and import the `PdfFileReader` class from the
    `PyPDF2` package:


    ```

    >>> from PyPDF2 import PdfFileReader

    ```


    To create a new instance of the `PdfFileReader` class, you''ll need to path to
    the PDF file that you want to open. Let''s get that now using the `pathlib` module:


    ```

    >>> from pathlib import Path

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "Pride_and_Prejudice.pdf"

    ... )

    ```


    The `pdf_file` path variable now contains the path to a PDF version of Jane Austen''s
    *Pride and Prejudice*.


    > **Note**


    You may need to change `pdf_path` so that it corresponds to the location of the
    `python-basics-exercises/` folder on your computer.


    Now create the `PdfFileReader` instance:


    ```

    >>> pdf = PdfFileReader(str(pdf_path))

    ```


    `pdf_path` is converted to a string because `PdfFileReader` doesn''t know how
    to read from a `pathlib.Path` object.


    Recall from *Chapter 12: File Input and Output* that all open files'
