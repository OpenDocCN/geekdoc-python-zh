    \n就像之前一样，你的脚本现在在进入 `add_underscores()` 函数中的 `for` 循环之前暂停。反复按下 `Step` 按钮，观察 `new_word`\
    \ 变量在每次迭代中的变化。你现在看到了什么？成功了！一切都在按预期工作！\n\n在这个例子中，你第一次尝试修复错误就成功了，所以你不需要再重复步骤 1-3。然而，情况并非总是如此。有时你需要重复这个过程几次才能修复一个错误。\n\
    \n同样重要的是要记住，像调试器这样的工具不会告诉你如何修复错误。它们只是帮助你识别代码中问题发生的确切位置。\n\n## 在代码中寻找错误的其他方法\n\n\
    调试可能很棘手且耗时，但有时它是找到你忽略的错误的最可靠方法。然而，在打开调试器之前，有时使用放置得当的 `print()` 函数来显示变量的值来定位错误会更简单。\n\
    \n例如，与其使用调试控制窗口调试前面的脚本，你可以在 `add_underscores()` 函数的 `for` 循环末尾添加以下行：\n\n```\n\
    print(f\"i = {i}; new_word = {new_word}\")\n```\n\n修改后的脚本将如下所示：\n\n```\ndef add_underscores(word):\n\
    \    new_word = \"_\"\n    for i in range(0, len(word)):\n        new_word = word[i]\
    \ + \"_\"\n        print(f\"i = {i}; new_word = {new_word}\")\n    return new_word\n\
    \nphrase = \"hello\"\nprint(add_underscores(phrase))\n```\n\n当你运行脚本时，交互式窗口显示以下输出：\n\
    \n```\ni = 0; new_word = h_\ni = 1; new_word = e_\ni = 2; new_word = l_\ni = 3;\
    \ new_word = l_\ni = 4; new_word = o_\no_\n```\n\n这向你展示了 `new_word` 在 `for` 循环每次迭代中的值。最后一行仅包含一个下划线，是脚本末尾运行\
    \ `print(add_underscore(phrase))` 的结果。\n\n## 7.2. 消灭一些 Bug\n\n通过查看上述输出，你可以得出与使用调试控制窗口调试时相同的结论。也就是说，问题是\
    \ `new_word` 在每次迭代中都被覆盖了。\n\n许多 Python 程序员更喜欢这种简单的方法来进行一些快速而粗糙的即时调试。这是一种方便的技术，但与\
    \ IDLE 的调试器相比有一些缺点。\n\n最显著的缺点是，使用 `print()` 函数调试需要你每次检查变量值时都运行整个脚本。对于长脚本，与在调试控制窗口中设置断点并使用“Go”按钮相比，这可能是巨大的时间浪费。\n\
    \n另一个缺点是，调试完成后，你必须记住从代码中删除那些 `print()` 函数调用。否则，用户在运行你的程序时可能会看到不必要且可能令人困惑的输出。\n\
    \n本节中的示例循环可能是说明调试过程的好例子，但它不是 Pythonic 代码的最佳示例。使用索引 `i` 表明可能有更好的方式来编写循环。\n\n改进此循环的一种方法是直接迭代字符串\
    \ `word` 中的字符。以下是实现此目的的一种方式：\n\n```\ndef add_underscores(word):\n    new_word\
    \ = \"_\"\n    for char in word:\n        new_word = new_word + char + \"_\"\n\
    \    return new_word\n```\n\n将现有代码重写为更简洁、更易于阅读和理解，或遵守团队设定的代码标准的过程称为**重构**。我们不会在本课程中过多讨论重构，但它是编写专业质量代码的重要组成部分。\n\
    \n对本节留下反馈 »"
