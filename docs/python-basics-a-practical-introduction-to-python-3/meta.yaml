    # Foreword


    Hello and welcome to **Python Basics: A Practical Introduction to Python 3**.
    I hope you are ready to learn why so many professional and hobbyist developers
    are drawn to Python and how you can begin using it on your projects, small and
    large, right away.


    This book is targeted at beginners who either know a little programming but not
    the Python language and ecosystem, as well as complete beginners.


    If you don’t have a Computer Science degree, don’t worry. Fletcher, David, Dan,
    and Joanna will guide you through the important computing concepts while teaching
    you the Python basics, and just as importantly, skipping the unnecessary details
    at first.


    # Python Is a Full-Spectrum Language


    When learning a new programming language, you don’t yet have the experience to
    judge how well it will serve you in the long run. If you are considering Python,
    let me assure you that this is a good choice. One key reason is that Python is
    a **full-spectrum** language.


    What do I mean by this? Some languages are very good for beginners. They hold
    your hand and make programming super easy. We can go to the extreme and look at
    visual languages such as Scratch.


    Here you get blocks that represent programming concepts, like variables, loops,
    method calls, and so on, and you drag and drop them on a visual surface. Scratch
    may be easy to get started with for sim-'
