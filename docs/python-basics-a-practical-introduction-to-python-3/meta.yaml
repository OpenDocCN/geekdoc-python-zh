    \n[Leave feedback on this section »](https://realpython.com/python-basics/resources)\n\
    \n## 11.2 Working With Packages\n\nModules allow you to divide a program into\
    \ individual files that can be reused as needed. Related code can be organized\
    \ into a single module and kept separate from other code.\n\nPackages take this\
    \ organizational structure one step further by allowing you to group related modules\
    \ under a single namespace.\n\nIn this section, you'll learn how to create your\
    \ own Python package and import code from that package into another module.\n\n\
    ### Creating Packages\n\nA **package** is a folder that contains one or more Python\
    \ modules. It must also contain a special module called `__init__.py`. Here is\
    \ an example of a package so that you can see this structure:\n\n```\nmypackage/\n\
    ├── __init__.py\n├── module1.py\n└── module2.py\n```\n\nThe `__init__.py` module\
    \ doesn't need to contain any code! It only needs to exist so that Python recognizes\
    \ the `mypackage/` folder as a Python package.\n\nUsing your computer's file explorer,\
    \ or whatever tool you are comfortable with, create a new folder somewhere on\
    \ your computer called `packages_example/`. Inside of that folder, create another\
    \ folder called `mypackage/`.\n\nThe `packages_example/` folder is called the\
    \ **project folder**, or **project root folder**, because it contains all of the\
    \ files or folders in the `packages_example` project. The `mypackage/` folder\
    \ will eventually become a Python package. It isn't one right now because it doesn't\
