    \ 语句的变体。为了保持 `datetime` 包的上下文，Python 程序员通常会导入该包并将其重命名为 `dt`：\n\n```python\nimport\
    \ datetime as dt\n```\n\n现在，要使用 `datetime` 类，你只需要输入 `dt.datetime`：\n\n```python\n\
    dt.datetime(2020, 2, 2)\n```\n\nPython 程员也经常直接将 `datetime` 类导入到调用模块的命名空间中：\n\n\
    ```python\nfrom datetime import datetime\n```\n\n这样做是可以的，因为上下文并没有真正丢失。毕竟，类和模块共享相同的名称。\n\
    \n直接导入后，你不再需要使用带点的模块名来访问 `datetime` 类：\n\n```python\ndatetime(2020, 2, 2)\n```\n\
    \n各种 `import` 语句允许你减少输入和不必要的长带点模块名。话虽如此，滥用各种 `import` 语句可能会导致上下文丢失，从而使代码更难理解。\n\
    \n在导入模块时，请始终运用良好的判断力，以尽可能保留最多的上下文。\n\n## 复习练习\n\n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
