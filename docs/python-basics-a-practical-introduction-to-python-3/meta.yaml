    A **namespace** is a collection of names, such as variable names, function names,
    and class names. Every Python module has its own namespace.


    Variables, functions, and classes in a module can be accessed from within the
    same module by just typing their name. That''s how you''ve been doing it throughout
    this book so far. However, this doesn''t work for imported modules.


    To access a name in an imported module from the calling module, type the imported
    module''s name followed by a dot (.) and the name you want to use:


    ```

    <module>.<name>

    ```


    For instance, to use the `add()` function in the `adder` module, you need to type
