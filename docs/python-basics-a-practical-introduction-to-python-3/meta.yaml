    \    event = events_list[0]\n\n    # 如果事件是按键事件对象\n    if event.type == \"keypress\"\
    :\n        # 调用按键事件处理函数\n        handle_keypress(event)\n```\n\n当你调用 Tkinter 的\
    \ `window.mainloop()` 方法时，类似上面的循环会为你运行！`.mainloop()` 为你处理了循环的两个部分：它维护一个已发生事件的列表，并且每当有新事件添加到该列表时，它就会运行一个事件处理函数。\n\
    \n让我们更新我们的事件循环，使用 `window.mainloop()` 代替我们自己的事件循环：\n\n```python\nimport tkinter\
    \ as tk\n\n# 创建一个窗口对象\nwindow = tk.Tk()\n\n# 创建一个事件处理函数\ndef handle_keypress(event):\n\
