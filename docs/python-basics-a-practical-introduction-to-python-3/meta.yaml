- md: '## 14.5. Rotating and Cropping PDF Pages


    We''ll discuss two different ways of doing it. Both of them rely on the `.rotateClockwise()`
    method, but they take different approaches determining which pages get rotated.


    The first method is to loop over the indices of the pages in the PDF. During each
    iteration, check if the index corresponds to a page that needs to be rotated and
    call `.rotateClockwise()` to rotate the page if needed. Then add the page `pdf_writer`.


    Here''s what that looks like:


    ```

    >>> for n in range(pdf_reader.getNumPages()):

    ...     page = pdf_reader.getPage(n)

    ...     if n % 2 == 0:

    ...         page.rotateClockwise(90)

    ...     pdf_writer.addPage(page)

    ...

    >>>

    ```


    Notice that the page gets rotated if the index is even. That might seem odd because
    it''s the odd pages in the PDF that are rotated incorrectly. However, page numbers
    in the PDF start with 1, while page indices start with 0. That means odd PDF pages
    have even indices.


    If that makes your head spin, don''t worry! After years of dealing with stuff
    like this, even professional programmers get tripped up by these sorts of things!


    > **Note**


    When you execute the `for` loop above, you''ll see a bunch of output in IDLE''s
    interactive window. That''s because `.rotateClockwise()` returns a `PageObject`
    instance.


    You can ignore this output for the time being. When you execute programs from
    IDLE''s script window, this output won''t be visible.


    Now that you''ve rotated all the pages in PDF, you can write the content of pdf_writer
    to a new file and check that everything worked:


    ```

    >>> with Path("ugly_rotated.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    You should now have a file called ugly_rotated.pdf in your current working directory
    with the pages from the ugly.pdf file all rotated correctly.


    The problem with the approach we just used to rotate the pages in the ugly.pdf
    file is that it depends on knowing ahead of time which pages need to be rotated.
    In a real-world scenario, it isn''t practical to go through an entire PDF taking
    note of the page numbers of pages to rotate.


    In fact, you can determine which pages need to be rotated without prior knowledge.
    Well, *sometimes* you can.


    Let''s see how by getting a new PdfFileReader instance:


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    ```


    We need to do this because we altered the pages in the old PdfFileReader by rotating
    them. So by creating a new instance, we''re starting fresh.


    PageObject instances maintain a dictionary of values containing information about
    the page.


    ```

    >>> pdf_reader.getPage(0)

    {''/Contents'': [IndirectObject(11, 0), IndirectObject(12, 0),

    IndirectObject(13, 0), IndirectObject(14, 0), IndirectObject(15, 0),

    IndirectObject(16, 0), IndirectObject(17, 0), IndirectObject(18, 0)],

    ''/Rotate'': -90, ''/Resources'': {''/ColorSpace'': {''/CS1'':

    IndirectObject(19, 0), ''/CS0'': IndirectObject(19, 0)}, ''/XObject'':

    {''/Im0'': IndirectObject(21, 0)}, ''/Font'': {''/TT1'':

    IndirectObject(23, 0), ''/TT0'': IndirectObject(25, 0)}, ''/ExtGState'': {''/GS0'':
    IndirectObject(27, 0)}, ''/CropBox'': [0, 0, 612, 792], ''/Parent'': IndirectObject(1,
    0), ''/MediaBox'': [0, 0, 612, 792], ''/Type'': ''/Page'', ''/StructParents'':
    0}

    ```


    Yikes! Mixed in with all that nonsensical looking stuff is a key called /Rotate,
    which you can see on the fourth line of output above. The value of this key is
    -90.


    You can access the /Rotate key on a PageObject using subscript notation, just
    like you can on a Python dict object:


    ```

    >>> page = pdf_reader.getPage(0)

    >>> page["/Rotate"]

    -90

    ```


    If you look at the /Rotate key for the second page in pdf_reader, you''ll see
    that it has a value of 0:


    ```

    >>> page = pdf_reader.getPage(1)

    >>> page["/Rotate"]

    0

    ```


    What all this means is that the page at index 0 has a rotation value of -90 degrees,
    meaning it has been rotated ninety degrees counterclockwise. The page at index
    1 has a rotation value of 0, so it has not been rotated at all.


    If you rotate the first page using .rotateClockwise(), the value of /Rotate changes
    from -90 to 0:


    ```

    >>> page = pdf_reader.getPage(0)

    >>> page["/Rotate"]

    -90

    >>> page.rotateClockwise(90)

    >>> page["/Rotate"]

    0

    ```


    Now that we know how to inspect the /Rotate key, let''s use it to rotate the pages
    in the ugly.pdf file.


    The first thing we need to do is re-initialize our pdf_reader and pdf_writer objects
    so that we get a fresh start:


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    >>> pdf_writer = PdfFileWriter()

    ```


    Now write a loop that loops over the pages in the pdf_reader.pages iterable, checks
    the value of /Rotate, and rotates the page if that value is -90:


    ```

    >>> for page in pdf_reader.pages:

    ...     if page["/Rotate"] == -90:

    ...         page.rotateClockwise(90)

    ...     pdf_writer.addPage(page)

    ...

    >>>

    ```


    Not only is this loop slightly shorter than the loop in the first solution, but
    it doesn''t rely on any prior knowledge of which pages need to be rotated. You
    could use a loop like this to rotate pages in any PDF without ever having to open
    it up and look at it.


    To finish out the solution, write the contents of pdf_writer to a new file:


    ```

    >>> with Path("ugly_rotated2.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    Now you can open the ugly_rotated2.pdf in your current working directory and compare
    it to the ugly_rotated.pdf you generated earlier. They should look identical.


    > **Important**


    One word of warning about the `/Rotate` key: it is not guaranteed to exist on
    a page.


    If the `/Rotate` key doesn''t exist, this usually means that the page has not
    been rotated. However, that isn''t always a safe assumption.


    If a `PageObject` has no `/Rotate` key, then a `KeyError` is raised when you try
    to access it. You can catch this exception with a `try...except` block.


    The value of `/Rotate` may not always be what you expect. For example, if you
    scan a paper document with the paper page rotated ninety degrees counter clockwise,
    then the contents of the PDF will appear rotated. However, the `/Rotate` key may
    have the value 0.


    This is one of many things that can make working with PDF files frustrating. Sometimes,
    you will just need to open a PDF in a PDF reader program and manually figure some
    things out.


    ## Cropping Pages


    Another common operation with PDFs is cropping pages. You might need to do this
    to split a single page into multiple pages, or to extract just a small portion
    of a page, such as a signature or a figure.


    For example, there is a file called `half_and_half.pdf` located in the `practice_files/`
    subdirectory of the `ch13-interact-with-pdf-files/` directory. This PDF contains
    a portion of Hans Christian Andersen''s *The Little Mermaid*.


    Each page in this PDF has two columns. Let''s split each page of this PDF into
    two pages, one for each column.


    To get started, import the `PdfFileReader` and `PdfFileWriter` classes from `PyPDF2`,
    and the `Path` class from the `pathlib` module:


    ```

    >>> from pathlib import Path

    >>> from PyPDF2 import PdfFileReader, PdfFileWriter

    ```


    Now create a `Path` object for the `half_and_half.pdf` file:


    ```

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "half_and_half.pdf"

    ... )

    ```


    Next, create a new `PdfFileReader` object and get the first page of the PDF:


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    >>> first_page = pdf_reader.getPage(0)

    ```


    In order to crop the page, you need to know a little bit more about how pages
    are structured. `PageObject` instances like `first_page` have an attribute `.mediaBox`
    that represents a rectangular area that defines the boundaries of a page.


    Let''s use IDLE''s interactive window to explore the `.mediaBox` before using
    it to crop the page:


    ```

    >>> first_page.mediaBox

    RectangleObject([0, 0, 792, 612])

    ```


    Notice that the `.mediaBox` attribute returns a `RectangleObject`. This is an
    object defined in the `PyPDF2` package and represents a rectangular area on the
    page.


    You''ll notice the list `[0, 0, 792, 612]` of four numbers in the output. The
    first two numbers are the x- and y-coordinates of the lower left corner of the
    rectangle. The third number is the width of the rectangle, and the fourth number
    represents the height of the rectangle.'
  mdcn: '## 14.5. 旋转与裁剪PDF页面


    我们将讨论两种不同的方法。这两种方法都依赖于`.rotateClockwise()`方法，但在确定哪些页面需要旋转时采用了不同的策略。


    第一种方法是遍历PDF中页面的索引。在每次迭代中，检查该索引对应的页面是否需要旋转，如果需要，则调用`.rotateClockwise()`来旋转页面。然后将页面添加到`pdf_writer`中。


    具体代码如下：


    ```

    >>> for n in range(pdf_reader.getNumPages()):

    ...     page = pdf_reader.getPage(n)

    ...     if n % 2 == 0:

    ...         page.rotateClockwise(90)

    ...     pdf_writer.addPage(page)

    ...

    >>>

    ```


    请注意，当索引为偶数时，页面会被旋转。这看起来可能有些奇怪，因为PDF中实际是奇数页被错误地旋转了。然而，PDF中的页码是从1开始的，而页面索引是从0开始的。这意味着PDF中的奇数页对应的是偶数索引。


    如果这让你感到困惑，别担心！即使是专业程序员，在处理这类问题时也常常会出错！


    > **注意**


    当你执行上面的`for`循环时，你会在IDLE的交互窗口中看到一堆输出。这是因为`.rotateClockwise()`返回了一个`PageObject`实例。


    你可以暂时忽略这些输出。当你从IDLE的脚本窗口执行程序时，这些输出将不会显示。


    现在你已经旋转了PDF中的所有页面，可以将`pdf_writer`的内容写入一个新文件，并检查一切是否正常：


    ```

    >>> with Path("ugly_rotated.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    现在，你的当前工作目录中应该有一个名为`ugly_rotated.pdf`的文件，其中`ugly.pdf`文件的所有页面都已正确旋转。


    我们刚刚用来旋转`ugly.pdf`文件页面的方法存在一个问题：它依赖于事先知道哪些页面需要旋转。在实际场景中，遍历整个PDF并记下需要旋转的页面的页码是不切实际的。


    事实上，你可以在没有先验知识的情况下确定哪些页面需要旋转。嗯，*有时候*可以。


    让我们通过获取一个新的`PdfFileReader`实例来看看如何做到这一点：


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    ```


    我们需要这样做，因为我们通过旋转页面修改了旧的`PdfFileReader`中的页面。因此，通过创建一个新实例，我们重新开始。


    `PageObject`实例维护一个包含页面信息的字典。


    ```

    >>> pdf_reader.getPage(0)

    {''/Contents'': [IndirectObject(11, 0), IndirectObject(12, 0),

    IndirectObject(13, 0), IndirectObject(14, 0), IndirectObject(15, 0),

    IndirectObject(16, 0), IndirectObject(17, 0), IndirectObject(18, 0)],

    ''/Rotate'': -90, ''/Resources'': {''/ColorSpace'': {''/CS1'':

    IndirectObject(19, 0), ''/CS0'': IndirectObject(19, 0)}, ''/XObject'':

    {''/Im0'': IndirectObject(21, 0)}, ''/Font'': {''/TT1'':

    IndirectObject(23, 0), ''/TT0'': IndirectObject(25, 0)}, ''/ExtGState'': {''/GS0'':
    IndirectObject(27, 0)}, ''/CropBox'': [0, 0, 612, 792], ''/Parent'': IndirectObject(1,
    0), ''/MediaBox'': [0, 0, 612, 792], ''/Type'': ''/Page'', ''/StructParents'':
    0}

    ```


    哎呀！在所有这些看起来毫无意义的内容中，混杂着一个名为`/Rotate`的键，你可以在上面输出的第四行看到它。这个键的值是-90。


    你可以使用下标表示法访问`PageObject`上的`/Rotate`键，就像访问Python字典对象一样：


    ```

    >>> page = pdf_reader.getPage(0)

    >>> page["/Rotate"]

    -90

    ```


    如果你查看`pdf_reader`中第二页的`/Rotate`键，你会看到它的值是0：


    ```

    >>> page = pdf_reader.getPage(1)

    >>> page["/Rotate"]

    0

    ```


    所有这些意味着索引为0的页面的旋转值为-90度，表示它被逆时针旋转了九十度。索引为1的页面的旋转值为0，因此它根本没有被旋转。


    如果你使用`.rotateClockwise()`旋转第一页，`/Rotate`的值会从-90变为0：


    ```

    >>> page = pdf_reader.getPage(0)

    >>> page["/Rotate"]

    -90

    >>> page.rotateClockwise(90)

    >>> page["/Rotate"]

    0

    ```


    现在我们知道了如何检查`/Rotate`键，让我们用它来旋转`ugly.pdf`文件中的页面。


    我们需要做的第一件事是重新初始化我们的`pdf_reader`和`pdf_writer`对象，以便重新开始：


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    >>> pdf_writer = PdfFileWriter()

    ```


    现在编写一个循环，遍历`pdf_reader.pages`可迭代对象中的页面，检查`/Rotate`的值，如果该值为-90，则旋转页面：


    ```

    >>> for page in pdf_reader.pages:

    ...     if page["/Rotate"] == -90:

    ...         page.rotateClockwise(90)

    ...     pdf_writer.addPage(page)

    ...

    >>>

    ```


    这个循环不仅比第一个解决方案中的循环稍短，而且它不依赖于任何关于哪些页面需要旋转的先验知识。你可以使用这样的循环来旋转任何PDF中的页面，而无需打开它查看。


    为了完成解决方案，将`pdf_writer`的内容写入一个新文件：


    ```

    >>> with Path("ugly_rotated2.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    现在你可以打开当前工作目录中的`ugly_rotated2.pdf`，并与之前生成的`ugly_rotated.pdf`进行比较。它们应该看起来完全相同。


    > **重要提示**


    关于`/Rotate`键的一个警告：不能保证它一定存在于页面上。


    如果`/Rotate`键不存在，通常意味着页面没有被旋转。然而，这并不总是一个安全的假设。


    如果一个`PageObject`没有`/Rotate`键，那么当你尝试访问它时，会引发一个`KeyError`。你可以使用`try...except`块来捕获这个异常。


    `/Rotate`的值可能并不总是你所期望的。例如，如果你扫描一份纸质文档时，纸张被逆时针旋转了九十度，那么PDF的内容看起来就会是旋转的。然而，`/Rotate`键的值可能是0。


    这是许多可能让处理PDF文件变得令人沮丧的事情之一。有时，你只需要在PDF阅读器程序中打开PDF，并手动弄清楚一些事情。


    ## 裁剪页面


    PDF的另一个常见操作是裁剪页面。你可能需要这样做来将单个页面拆分为多个页面，或者只提取页面的一小部分，例如签名或图表。


    例如，在`ch13-interact-with-pdf-files/`目录的`practice_files/`子目录中有一个名为`half_and_half.pdf`的文件。这个PDF包含了汉斯·克里斯蒂安·安徒生的《小美人鱼》的一部分。


    这个PDF中的每一页都有两列。让我们将这个PDF的每一页拆分成两页，每列一页。


    首先，从`PyPDF2`导入`PdfFileReader`和`PdfFileWriter`类，从`pathlib`模块导入`Path`类：


    ```

    >>> from pathlib import Path

    >>> from PyPDF2 import PdfFileReader, PdfFileWriter

    ```


    现在为`half_and_half.pdf`文件创建一个`Path`对象：


    ```

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "half_and_half.pdf"

    ... )

    ```


    接下来，创建一个新的`PdfFileReader`对象并获取PDF的第一页：


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    >>> first_page = pdf_reader.getPage(0)

    ```


    为了裁剪页面，你需要更多地了解页面的结构。像`first_page`这样的`PageObject`实例有一个`.mediaBox`属性，它表示一个定义页面边界的矩形区域。


    让我们在使用它裁剪页面之前，使用IDLE的交互窗口来探索`.mediaBox`：


    ```

    >>> first_page.mediaBox

    RectangleObject([0, 0, 792, 612])

    ```


    请注意，`.mediaBox`属性返回一个`RectangleObject`。这是`PyPDF2`包中定义的一个对象，表示页面上的一个矩形区域。


    你会注意到输出中的列表`[0, 0, 792, 612]`包含四个数字。前两个数字是矩形左下角的x和y坐标。第三个数字是矩形的宽度，第四个数字表示矩形的高度。'
