    strings delimited with single quotes are valid SQLite strings.


    When you write SQL queries as strings, you need to make sure that they are delimited
    with double quotation marks so that you can use single quotation marks inside
    of the Python strings to delimit SQLite strings.


    SQLite is not the only SQL database that follows the single quote convention.
    Keep an eye out for this whenever you work with any SQL database.


