    # 9.6. Store Relationships in Dictionaries


    > **Note**


    If you happen to be following along with a Python version older than 3.6, then
    you will notice that the output dictionaries in the interactive window have a
    different order than the ones that appear in these examples.


    Prior to Python 3.6, the order of key-value pairs in a Python dictionary was random.
    In later versions, the order of the key-value pairs is guaranteed to match the
    order in which they were inserted.


    You can create an empty dictionary using either a literal or `dict()`:


    ```

    >>> {}

    {}

    >>> dict()

    {}

    ```


    Now that we''ve created a dictionary, let''s look at how you access its values.


    # Accessing Dictionary Values


    To access a value in a dictionary, enclose the corresponding key in square brackets
    ([ and ]) at the end of dictionary or a variable name assigned to a dictionary:


    ```

    >>> capitals["Texas"]

    ''Austin''

    ```


    The bracket notation used to access a dictionary value looks similar to the index
    notation used to get values from strings, lists, and tuples. However, dictionaries
    are a fundamentally different data structure than sequence types like lists and
    tuples.


    To see the difference, let''s step back for a second and notice that we could
    just as well define the `capitals` dictionary as a list:'
- md: "## 9.6. Store Relationships in Dictionaries\n\n```python\n>>> capitals_list\
