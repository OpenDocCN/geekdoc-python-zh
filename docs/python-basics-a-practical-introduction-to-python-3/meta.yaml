    ## 8.10 Summary and Additional Resources


    In this chapter, you learned about conditional statements and conditional logic.
    You saw how to compare values using comparison operators like `<`, `>`, `<=`,
    `>=`, `!=`, and `==`. You also saw how to build complex conditional statements
    using `and`, `or` and `not`.


    Next, you saw how to control the flow of your program using `if` statements. You
    learned how to create branches in your program using `if...else` and `if...elif...else`.
    You also learned how to control precisely how code is executed inside of an `if`
    block using `break` and `continue`.


    You learned about the `try...except` pattern to handle errors that may occur during
    run-time. This is an important construct that allows your programs to handle the
    unexpected gracefully, and keep users of your programs happy that the program
    doesn''t crash.


    Finally, you applied the techniques you learned in this chapter and used the `random`
    module to build some simple simulations.


