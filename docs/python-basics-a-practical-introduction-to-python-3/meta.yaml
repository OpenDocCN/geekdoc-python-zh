  md: '# 11.1. Working With Modules


    The country codes in this scenario are an examples of **namespaces**, and illustrate
    three of the main reasons namespaces are used:


    +   1. They **group** names into logical containers

    2. They **prevent clashes** between duplicate names

    3. They **provide context** to names


    Namespace in code provide the same advantages.


    You have seen three different ways to import a module into another one. Keeping
    in mind the advantages namespaces give you can help you determine which kind of
    `import` statement makes the most sense.


    In general, `import <module>` is the preferred way to import a module because
    it keeps the imported module''s namespace completely separate from the calling
    module''s namespace. Moreover, every name from the imported module is accessed
    from the calling module with the `<module>.<name>` format, which immediately tells
    you which module the name originates in.


    There are two reasons you might use the `import <module> as <other_name>` format:


    +   1. The module name is long and you wish to import an abbreviated version of
    it

