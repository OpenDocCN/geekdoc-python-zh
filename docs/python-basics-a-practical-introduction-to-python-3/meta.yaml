    \ `\\n` at the beginning of the text if you want to put it on a new line:\n\n\
    ```python\ntext_box.insert(tk.END, \"\\nPut me on a new line!\")\n```\n\n`Label`,\
    \ `Button`, `Entry`, and `Text` widgets are just a few of the widgets available\
    \ in Tkinter. There are several others, including widgets for checkboxes, radio\
    \ buttons, scroll bars, and progress bars. For more information on the other widgets\
    \ available, check out the [tutorial on tkdocs.com](https://tkdocs.com).\n\nIn\
    \ this chapter, we're going to work with only five widgets: the four you have\
    \ seen so far plus the Frame widget. Frame widgets are important for organizing\
    \ the layout of your widgets in an application.\n\nBefore we get into the details\
    \ about laying out the visual presentation of your widgets, let's take a closer\
    \ look at how Frame widgets work, and how you can assign other widgets to them.\n\
    \n## Assigning Widgets to Frames\n\nThe following script creates a blank Frame\
    \ widget and assigns it to the main application window:\n\n```python\nimport tkinter\
    \ as tk\n\nwindow = tk.Tk()\nframe = tk.Frame()\nframe.pack()\n\nwindow.mainloop()\n\
    ```\n\nThe `frame.pack()` method packs the frame into the window so that the window\
    \ sizes itself as small as possible to encompass the frame.\n\nWhen you run the\
    \ above script, you get some seriously uninteresting output:\n\n![](img/4efa9a991b645f75be61871447c559ca_581_0.png)\n\
    \nAn empty Frame widget is practically invisible. Frames are best thought of as\
    \ containers for other widgets. You can assign a widget to a frame by setting\
    \ the widget's `master` attribute:\n\n```python\nframe = tk.Frame()\nlabel = tk.Label(master=frame)\n\
    ```\n\nTo get a feel for how this works, let's write a script that creates two\
    \ Frame widgets called `frame_a` and `frame_b`. `frame_a` contains a label with\
    \ the text \"I'm in Frame A\", and `frame_b` contains the label \"I'm in Frame\
    \ B\". Here's one way to do that:\n\n```python\nimport tkinter as tk\n\nwindow\
    \ = tk.Tk()\n\nframe_a = tk.Frame()\nframe_b = tk.Frame()\n\nlabel_a = tk.Label(master=frame_a,\
    \ text=\"I'm in Frame A\")\nlabel_a.pack()\n\nlabel_b = tk.Label(master=frame_b,\
    \ text=\"I'm in Frame B\")\nlabel_b.pack()\n\nframe_a.pack()\nframe_b.pack()\n\
    \nwindow.mainloop()\n```\n\nNotice that `frame_a` is packed into the window before\
    \ `frame_b`. The window that opens shows the label in `frame_a` above the label\
    \ in `frame_b`:\n\n![](img/4efa9a991b645f75be61871447c559ca_582_0.png)\n\nNow\
    \ let's see what happens when you swap the order of `frame_a.pack()` and `frame_b.pack()`:\n\
    \n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\n\nframe_a = tk.Frame()\n\
    label_a = tk.Label(master=frame_a, text=\"I'm in Frame A\")\nlabel_a.pack()\n\n\
    frame_b = tk.Frame()\nlabel_b = tk.Label(master=frame_b, text=\"I'm in Frame B\"\
    )\nlabel_b.pack()\n\n# Order of `frame_a` and `frame_b` is swapped\nframe_b.pack()\n\
    frame_a.pack()\n\nwindow.mainloop()\n```\n\nThe output looks like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_583_0.png)\n\
    \nNow `label_b` is on top. Since `label_b` was assigned to `frame_b`, it moves\
    \ to wherever `frame_b` is positioned.\n\nAll four of the widget types you have\
    \ learned about — `Label`, `Button`, `Entry`, and `Text` — have a `master` attribute\
    \ that is set when you instantiate them. That way you can control which `Frame`\
    \ a widget is assigned to.\n\nFrame widgets are great for organizing other widgets\
    \ in a logical manner. Related widgets can be assigned to the same frame so that\
    \ if the frame is ever moved in the window, the related widgets stay together.\n\
    \nIn addition to grouping your widgets logically, Frame widgets can add a little\
    \ flare to the visual presentation of your application. Read on to see how to\
    \ create various borders for Frame widgets.\n\n## Adjusting Frame Appearance With\
    \ Reliefs\n\nFrame widgets can be configured with a relief attribute that creates\
    \ a border around the frame. You can set relief to be any of the following values:\n\
    \n- `tk.FLAT`, no border effect (this is the default value).\n- `tk.SUNKEN`, which\
    \ creates a sunken effect.\n- `tk.RAISED`, which creates a raised effect.\n- `tk.GROOVE`,\
    \ which creates a grooved border effect.\n- `tk.RIDGE`, which creates a ridged\
    \ effect.\n\nTo apply the border effect, you must set the borderwidth attribute\
    \ to a value greater than 1. This attribute adjusts the width of the border, in\
    \ pixels.\n\nThe best way to get a feel for what each effect looks like is to\
    \ see them for yourself. Here is a script that packs five Frame widgets into a\
    \ window, each with a different value for the relief argument.\n\n```python\n\
    import tkinter as tk\n\n# 1\nborder_effects = {\n    \"flat\": tk.FLAT,\n    \"\
    sunken\": tk.SUNKEN,\n    \"raised\": tk.RAISED,\n    \"groove\": tk.GROOVE,\n\
    \    \"ridge\": tk.RIDGE,\n}\n\nwindow = tk.Tk()\n\nfor relief_name, relief in\
    \ border_effects.items():\n    # 2\n    frame = tk.Frame(master=window, relief=relief,\
    \ borderwidth=5)\n    # 3\n    frame.pack(side=tk.LEFT)\n    # 4\n    label =\
    \ tk.Label(master=frame, text=relief_name)\n    label.pack()\n\nwindow.mainloop()\n\
    ```\n\nLet's break that script down some.\n\nFirst, a dictionary is created whose\
    \ keys are the names of the different relief effects available in Tkinter, and\
    \ whose values are the corresponding Tkinter objects. This dictionary is assigned\
    \ to the `border_effects` variable (#1).\n\nAfter creating the window, object,\
    \ a `for` loop is used to loop over each item in the `border_effects` dictionary.\
    \ At each step in the loop:\n\n- A new `Frame` widget is created and assigned\
    \ to the `window` object (#2). The `relief` attribute is set to the corresponding\
    \ relief in the `border_effects` dictionary, and the `border` attribute is set\
    \ to 5 so that the effect is visible.\n- The `Frame` is then packed into the window\
    \ using the `.pack()` method (#3). The `side` keyword argument you see is telling\
    \ Tkinter which direction to pack the `frame` objects. You'll see more on how\
    \ this works in the next section.\n- A `Label` widget is created to display the\
    \ name of the relief and is packed into the `frame` object just created (#4).\n\
    \nThe window produced by the above script looks like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_586_0.png)\n\
    \nIn this image, you can see that:\n\n- `tk.FLAT` creates a flat looking frame\n\
    - `tk.SUNKEN` adds a border that gives the frame the appearance of being sunk\
    \ into the window\n- `tk.RAISED` gives the frame a border that makes it appear\
    \ to protrude from the screen\n- `tk.GROOVE` adds a border that appears as a sunken\
    \ groove around an otherwise flat frame\n- `tk.RIDGE` gives the appearance of\
    \ a raised lip around the edge of the frame\n\n## Widget Naming Conventions\n\n\
    When you create a widget you can give it any name you like as long as it is a\
    \ valid Python identifier. It is usually a good idea, though, to include the name\
    \ of the widget class in the variable name you assign to the widget instance.\n\
    \nFor example, if a `Label` widget is used to display a user's name, you might\
    \ name the widget `label_user_name`. An `Entry` widget used to collect a user's\
    \ age might be called `entry_age`.\n\nWhen you include the widget class name in\
    \ the variable name, you help yourself and anyone else that needs to read your\
    \ code understand what type of widget to which the variable name refers."
