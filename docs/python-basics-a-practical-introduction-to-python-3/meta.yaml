    \n## 运行时错误\n\nIDLE 在程序开始运行之前就能捕获语法错误，但有些错误只有在程序执行时才能被捕获。这些错误被称为**运行时错误**，因为它们只在程序运行时发生。\n\
    \n要生成一个运行时错误，请将 `hello_world.py` 中的代码更改为以下内容：\n\n```\nprint(Hello, world)\n```\n\
    \n现在，短语 \"Hello, world\" 两边的引号都被移除了。你注意到当你移除引号时，文本颜色如何变成黑色了吗？IDLE 不再将 `Hello,\
    \ world` 识别为一个字符串。\n\n你认为运行脚本时会发生什么？试一试看看！\n\n交互式窗口中显示了一些红色文本：\n\n```\nTraceback\
    \ (most recent call last):\n  File \"/home/hello_world.py\", line 1, in <module>\n\
    \    print(Hello, world)\nNameError: name 'Hello' is not defined\n```\n\n发生了什么？在尝试执行程序时，Python\
    \ **引发**了一个错误。每当发生错误时，Python 就会停止执行程序，并在 IDLE 的交互式窗口中显示错误。\n\n为错误显示的文本称为**回溯**。回溯为你提供了一些关于错误的有用信息。上面的回溯告诉我们以下所有信息：\n\
    \n- 错误发生在 `hello_world.py` 的第 1 行。\n- 生成错误的行是：`print(Hello, world)`。\n- 发生了一个\
    \ `NameError`。\n- 具体的错误是 `name 'Hello' is not defined`。\n\n`Hello, world` 周围的引号缺失了，所以\
