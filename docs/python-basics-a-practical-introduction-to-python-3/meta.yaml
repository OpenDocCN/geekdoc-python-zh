- md: "## 18.1. Add GUI Elements With EasyGUI\n\nType in a color name, such as `Yellow`,\
    \ and press `OK`. The text you entered is returned as a string:\n\n```\n>>> gui.enterbox(\n\
    ...     msg=\"What is your favorite color?\",\n...     title=\"Favorite color\"\
    ,\n... )\n'Yellow'\n```\n\nOne of the most common reasons for displaying a dialog\
    \ box is to allow a user to select a file or folder in their filesystem. EasyGUI\
    \ has some special functions designed just for these operations.\n\n**`fileopenbox()`**\n\
    \n`fileopenbox()` displays a dialog box for selecting a file to be opened:\n\n\
    ```\n>>> gui.fileopenbox(title=\"Select a file\")\n```\n\nThe dialog box looks\
    \ like the standard system file open dialog box:\n\nSelect a file and click the\
    \ `Open` button. A string containing the full path to the selected file is returned.\n\
    \n> **Important**\n\n`fileopenbox()` does not actually open the file! To do that\
    \ you need to use the `open()` built-in like you learned to do in Chapter 12.\n\
    \nJust like `msgbox()` and `buttonbox()`, the value `None` is returned if the\
    \ user presses `Cancel` or closes the dialog box without selecting a file.\n\n\
    **`diropenbox()` and `filesavebox()`**\n\nEasyGUI has two other functions that\
    \ generate dialogs nearly identical to the one generated by `fileopenbox()`:\n\
    \n- 1. `diropenbox()` opens a dialog that can be used to select a folder instead\
    \ of a file. When the user presses `Open`, the full path to the directory is returned.\n\
    - 2. `filesavebox()` opens a dialog to select a location for saving a file and\
    \ will confirm that the user wants to overwrite the file if the chosen name already\
    \ exists. Just like `fileopenbox()`, the file path is returned when the user presses\
    \ `Save`. The file is not actually saved.\n\n> **Important**\n\nNeither `diropenbox()`\
    \ nor `filesavebox()` actually open a directory or save a file. They only return\
    \ the absolute path to the directory to be opened or the file to be saved.\n\n\
    You must write the code yourself to open the directory or save the file.\n\nBoth\
    \ `diropenbox()` and `filesavebox()` return `None` if the dialogs are closed without\
    \ pressing `Open` or `Save`. This can cause your program to crash if you aren't\
    \ careful.\n\nFor example, the following raises a `TypeError` if the dialog box\
    \ is closed without making any selection:\n\n```\n>>> path = gui.fileopenbox(title=\"\
    Select a file\")\n>>> open_file = open(path, \"r\")\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 2, in <module>\nTypeError: expected str, bytes\
    \ or os.PathLike object, not NoneType\n```\n\nHow you handle situations like these\
    \ has a huge impact on a user's experience with your program.\n\n## Exiting Your\
    \ Program Gracefully\n\nSuppose you are writing a program for extracting pages\
    \ from a PDF file. The first thing the program might do is use `fileopenbox()`\
    \ so that the user can select which PDF to open.\n\nWhat do you do if the user\
    \ decides they don't want to run the program and presses the `Cancel`?\n\nYou\
    \ must make sure that your program handles these situations gracefully. The program\
    \ shouldn't crash or produce any unexpected output. In the situation described\
    \ above, the program should probably just stop running altogether.\n\nOne way\
    \ to stop a program from running is with Python's built-in `exit()` function.\n\
    \nFor example, the following program uses `exit()` to stop the program when the\
    \ user presses the `Cancel` button in a file selection dialog box:\n\n```\nimport\
    \ easygui as gui\n\npath = gui.fileopenbox(title=\"Select a file\")\n\nif path\
    \ is None:\n    exit()\n```\n\nIf the user closes the file open dialog box without\
    \ pressing `OK`, then `path` is `None` and the program executes the `exit()` function\
    \ in the `if` block. This program closes and execution stops.\n\n> **Note**\n\n\
    If you're running the program in IDLE, `exit()` also closes the current interactive\
    \ window. It's very thorough.\n\nNow that you know how to create dialog boxes\
