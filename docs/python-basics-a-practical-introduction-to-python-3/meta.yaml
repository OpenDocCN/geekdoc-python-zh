    \  编写一个脚本，将以下字典列表写入你主目录中名为 `favorite_colors.csv` 的文件：\n\n    ```python\n    favorite_colors\
    \ = [\n        {\"name\": \"Joe\", \"favorite_color\": \"blue\"},\n        {\"\
    name\": \"Anne\", \"favorite_color\": \"green\"},\n        {\"name\": \"Bailey\"\
    , \"favorite_color\": \"red\"},\n    ]\n    ```\n\n    输出的 CSV 文件应具有以下格式：\n\n\
