    \ letter of the string \"Python\" one at a time:\n\n```\nfor letter in \"Python\"\
    :\n    print(letter)\n```\n\nIn this example, the `for` statement is `for letter\
    \ in \"Python\"`. The membership expression is `letter in \"Python\"`.\n\nAt each\
    \ step of the loop, the variable `letter` is assigned the next letter in the string\
    \ \"Python\", and then the value of `letter` is printed.\n\nThe loops runs once\
    \ for each character in the string \"Python\", so the loop body executes six times.\
    \ The following table summarizes the execution of this `for` loop:\n\n| Step #\
    \ | Value of `letter` | What Happens |\n| :--- | :--- | :--- |\n| 1 | \"P\" |\
    \ P is printed |"
- md: "## 6.4. Run in Circles\n\n| Step # | Value of letter | What Happens |\n|---|---|---|\n\
    | 2 | \"y\" | y is printed |\n| 3 | \"t\" | t is printed |\n| 4 | \"h\" | h is\
    \ printed |\n| 5 | \"o\" | o is printed |\n| 6 | \"n\" | n is printed |\n\nTo\
    \ see why for loops are better for looping over collections of items, let's re-write\
    \ the for loop in previous example as a while loop.\n\nTo do so, we can use a\
    \ variable to store the index of the next character in the string. At each step\
    \ of the loop, we'll print out the character at the current index and then increment\
    \ the index.\n\nThe loop will stop once the value of the index variable is equal\
    \ to the length of the string. Remember, indices start at 0, so the last index\
    \ of the string \"Python\" is 5.\n\nHere's how you might write that code:\n\n\
    ```\nword = \"Python\"\nindex = 0\n\nwhile index < len(word):\n    print(word[index])\n\
    \    index = index + 1\n```\n\nThat's significantly more complex than the for\
    \ loop version!\n\nNot only is the for loop less complex, the code itself looks\
    \ more natural. It more closely resembles how you might describe the loop in English.\n\
    \n> **Note**\n\nYou may sometimes hear people describe some code as being particularly\
    \ “Pythonic.” The term **Pythonic** is generally used to describe code that is\
    \ clear, concise, and uses Python’s built-in features to its advantage.\n\nIn\
    \ these terms, using a `for` loop to loop over a collection of items is more Pythonic\
    \ than using a `while` loop.\n\nSometimes it’s useful to loop over a range of\
    \ numbers. Python has a handy built-in function `range()` that produces just that\
    \ — a range of numbers!\n\nFor example, `range(3)` returns the range of integers\
    \ starting with 0 and up to, but not including, 3. That is, `range(3)` is the\
    \ range of numbers 0, 1, and 2.\n\nYou can use `range(n)`, where `n` is any positive\
    \ number, to execute a loop exactly `n` times. For instance, the following `for`\
    \ loop prints the string \"Python\" three times:\n\n```\nfor n in range(3):\n\
    \    print(\"Python\")\n```\n\nYou can also give a range a starting point. For\
    \ example, `range(1, 5)` is the range of numbers 1, 2, 3, and 4. The first argument\
    \ is the starting number, and the second argument is the endpoint, which is not\
    \ included in the range.\n\nUsing the two-argument version of `range()`, the following\
    \ `for` loop prints the square of every number starting with 10 and up to, but\
    \ not including, 20:\n\n```\nfor n in range(10, 20):\n    print(n * n)\n```\n\n\
    Let’s look at a practical example. The following program asks the user to input\
    \ an amount and then displays how to split that amount between 2, 3, 4, and 5\
    \ people:\n\n```\namount = float(input(\"Enter an amount: \"))\n\nfor num_people\
    \ in range(2, 6):\n    print(f\"{num_people} people: ${amount / num_people:,.2f}\
    \ each\")\n```\n\nThe for loop loops over the number 2, 3, 4, and 5, and prints\
    \ the number of people and the amount each person should pay. The formatting specifier\
    \ ,.2f is used to format the amount as fixed-point number rounded to two decimal\
    \ places and commas every three digits.\n\nRunning the program with the input\
    \ 10 produces the following output:\n\n```\nEnter an amount: 10\n2 people: $5.00\
    \ each\n3 people: $3.33 each\n4 people: $2.50 each\n5 people: $2.00 each\n```\n\
    \nfor loops are generally used more often than while loops in Python. Most of\
    \ the time, a for loop is more concise and easier to read than an equivalent while\
    \ loop.\n\n## Nested Loops\n\nAs long as you indent the code correctly, you can\
    \ even put loops inside of other loops.\n\nType the following into IDLE's interactive\
    \ window:\n\n```\nfor n in range(1, 4):\n    for j in range(4, 7):\n        print(f\"\
    n = {n} and j = {j}\")\n```\n\nWhen Python enters the body of the first for loop,\
    \ the variable n is assigned the value 1. Then the body of the second for loop\
    \ is executed and j is assigned the value 4. The first thing printed is n = 1\
    \ and j = 4.\n\nAfter executing the `print()` function, Python returns to the\
    \ *inner* for loop, assigns to `j` the value of 5, and then prints `n = 1` and\
    \ `j = 5`. Python doesn't return the outer for loop because the inner for loop,\
    \ which is inside the body of the outer for loop, isn't done executing.\n\nNext,\
    \ `j` is assigned the value 6 and Python prints `n = 1` and `j = 6`. At this point,\
    \ the inner for loop is done executing, so control returns to the outer for loop.\n\
    \nThe variable `n` gets assigned the value 2, and the inner for loop executes\
    \ a second time. That is, `j` is assigned the value 4 and `n = 2` and `j = 4`\
    \ is printed to the console.\n\nThe two loops continue to execute in this fashion,\
    \ and the final output looks like this:\n\n```\nn = 1 and j = 4\nn = 1 and j =\
    \ 5\nn = 1 and j = 6\nn = 2 and j = 4\nn = 2 and j = 5\nn = 2 and j = 6\nn = 3\
    \ and j = 4\nn = 3 and j = 5\nn = 3 and j = 6\n```\n\nA loop inside of another\
    \ loop is called a **nested loop**, and they come up more often than you might\
    \ expect. You can nest while loops inside of for loops, and vice versa, and even\
    \ nest loops more than two levels deep!\n\n> **Important**\n\nNesting loops inherently\
    \ increases the complexity of your code, as you can see by the dramatic increase\
    \ in the number of steps run in the previous example compared to examples with\
    \ a single for loop.\n\nUsing nested loops is sometimes the only way to get something\
    \ done, but too many nested loops can have a negative effect on a program’s performance.\n\
    \nLoops are a powerful tool. They tap into one of the greatest advantages computers\
    \ provide as tools for computation: the ability to repeat the same task a vast\
    \ number of times without tiring and without complaining.\n\n## Review Exercises\n\
    \nYou can find the solutions to these exercises and many other bonus resources\
    \ online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n1. Write a `for` loop that prints out the integers 2 through 10, each on a new\
    \ line, by using the `range()` function.\n2. Use a `while` loop that prints out\
    \ the integers 2 through 10 (Hint: You’ll need to create a new integer first.)\n\
    3. Write a function called `doubles()` that takes one number as its input and\
    \ doubles that number. Then use the `doubles()` function in a loop to double the\
    \ number 2 three times, displaying each result on a separate line. Here is some\
    \ sample output:\n\n```\n4\n8\n16\n```\n\n[Leave feedback on this section »](https://realpython.com/python-basics/resources)\n\
    \n## 6.5 Challenge: Track Your Investments\n\nIn this challenge, you will write\
    \ a program called `invest.py` that tracks the growing amount of an investment\
    \ over time.\n\nAn initial deposit, called the principal amount, is made. Each\
    \ year, the amount increases by a fixed percentage, called the annual rate of\
    \ return.\n\nFor example, a principal amount of $100 with an annual rate of return\
    \ of 5% increases the first year by $5. The second year, the increase is 5% of\
    \ the new amount $105, which is $5.25.\n\nWrite a function called `invest` with\
    \ three parameters: the principal amount, the annual rate of return, and the number\
    \ of years to calculate. The function signature might look something like this:\n\
    \n```\ndef invest(amount, rate, years):\n```\n\nThe function then prints out the\
    \ amount of the investment, rounded to 2 decimal places, at the end of each year\
    \ for the specified number of years.\n\nFor example, calling `invest(100, .05,\
    \ 4)` should print the following:\n\n```\nyear 1: $105.00\nyear 2: $110.25\nyear\
    \ 3: $115.76\nyear 4: $121.55\n```\n\nTo finish the program, prompt the user to\
    \ enter an initial amount, an annual percentage rate, and a number of years. Then\
    \ call `invest()` to display the calculations for the values entered by the user.\n\
    \nYou can find the solutions to this code challenge and many other bonus resources\
    \ online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n[Leave feedback on this section »](https://realpython.com/python-basics/resources)\n\
    \n## 6.6 Understand Scope in Python\n\nAny discussion of functions and loops in\
    \ Python would be incomplete without some mention of the issue of **scope**.\n\
    \nScope can be one of the more difficult concepts to understand in programming,\
    \ so in this section you will get a gentle introduction to it.\n\nBy the end of\
    \ this section, you'll know what a **scope** is and why it is important. You will\
    \ also learn the LEGB rule for **scope resolution**.\n\n## What Is a Scope?\n\n\
    When you assign a value to a variable, you are giving that value a name. Names\
    \ are unique. For example, you can't assign the same name to two different numbers.\n\
    \n```\n>>> x = 2\n>>> x\n2\n\n>>> x = 3\n>>> x\n3\n```\n\nWhen you assign 3 to\
    \ x, you can no longer recall the value 2 with the name x.\n\nThis behavior makes\
    \ sense. After all, if the variable x has the values 2 and 3 simultaneously, how\
    \ do you evaluate x + 2? Should it be 4 or 5?\n\nAs it turns out, there is a way\
    \ to assign the same name to two different values. Try running the following script:\n\
    \n```\nx = \"Hello World\"\n\ndef func():\n    x = 2\n```"
  mdcn: "## 6.4. 循环往复\n\n| 步骤 # | 字母值 | 发生了什么 |\n|---|---|---|\n| 2 | \"y\" | 打印 y\
    \ |\n| 3 | \"t\" | 打印 t |\n| 4 | \"h\" | 打印 h |\n| 5 | \"o\" | 打印 o |\n| 6 | \"\
    n\" | 打印 n |\n\n为了理解为什么 `for` 循环更适合遍历项目集合，让我们将上一个示例中的 `for` 循环改写为 `while` 循环。\n\
    \n为此，我们可以使用一个变量来存储字符串中下一个字符的索引。在循环的每一步，我们将打印当前索引处的字符，然后递增索引。\n\n一旦索引变量的值等于字符串的长度，循环就会停止。请记住，索引从\
    \ 0 开始，因此字符串 \"Python\" 的最后一个索引是 5。\n\n以下是你可能编写的代码：\n\n```\nword = \"Python\"\n\
    index = 0\n\nwhile index < len(word):\n    print(word[index])\n    index = index\
    \ + 1\n```\n\n这比 `for` 循环版本要复杂得多！\n\n`for` 循环不仅复杂度更低，代码本身看起来也更自然。它更接近于你用英语描述循环的方式。\n\
    \n> **注意**\n\n你有时可能会听到人们将某些代码描述为特别“Pythonic”。术语 **Pythonic** 通常用于描述清晰、简洁并充分利用\
    \ Python 内置特性的代码。\n\n从这个角度来看，使用 `for` 循环遍历项目集合比使用 `while` 循环更具 Pythonic 风格。\n\n\
    有时遍历一系列数字很有用。Python 有一个方便的内置函数 `range()`，它恰好可以生成一系列数字！\n\n例如，`range(3)` 返回从 0\
    \ 开始到（但不包括）3 的整数范围。也就是说，`range(3)` 是数字 0、1 和 2 的范围。\n\n你可以使用 `range(n)`，其中 `n`\
    \ 是任何正数，来精确执行循环 `n` 次。例如，以下 `for` 循环打印字符串 \"Python\" 三次：\n\n```\nfor n in range(3):\n\
    \    print(\"Python\")\n```\n\n你也可以为范围指定一个起点。例如，`range(1, 5)` 是数字 1、2、3 和 4 的范围。第一个参数是起始数字，第二个参数是终点，该终点不包含在范围内。\n\
    \n使用双参数版本的 `range()`，以下 `for` 循环打印从 10 开始到（但不包括）20 的每个数字的平方：\n\n```\nfor n in\
    \ range(10, 20):\n    print(n * n)\n```\n\n让我们看一个实际的例子。以下程序要求用户输入一个金额，然后显示如何将该金额分配给\
    \ 2、3、4 和 5 个人：\n\n```\namount = float(input(\"Enter an amount: \"))\n\nfor num_people\
    \ in range(2, 6):\n    print(f\"{num_people} people: ${amount / num_people:,.2f}\
    \ each\")\n```\n\n`for` 循环遍历数字 2、3、4 和 5，并打印人数和每人应支付的金额。格式说明符 `,.2f` 用于将金额格式化为固定点数，四舍五入到两位小数，并每三位数字加一个逗号。\n\
    \n使用输入 10 运行程序会产生以下输出：\n\n```\nEnter an amount: 10\n2 people: $5.00 each\n3 people:\
    \ $3.33 each\n4 people: $2.50 each\n5 people: $2.00 each\n```\n\n在 Python 中，`for`\
    \ 循环通常比 `while` 循环使用得更频繁。大多数情况下，`for` 循环比等效的 `while` 循环更简洁、更易于阅读。\n\n## 嵌套循环\n\
    \n只要你正确缩进代码，你甚至可以将循环放在其他循环内部。\n\n在 IDLE 的交互式窗口中输入以下内容：\n\n```\nfor n in range(1,\
    \ 4):\n    for j in range(4, 7):\n        print(f\"n = {n} and j = {j}\")\n```\n\
    \n当 Python 进入第一个 `for` 循环的主体时，变量 `n` 被赋值为 1。然后执行第二个 `for` 循环的主体，`j` 被赋值为 4。打印的第一件事是\
    \ `n = 1 and j = 4`。\n\n执行 `print()` 函数后，Python 返回到*内部* `for` 循环，将 `j` 赋值为 5，然后打印\
    \ `n = 1 and j = 5`。Python 不会返回外部 `for` 循环，因为位于外部 `for` 循环主体内的内部 `for` 循环尚未执行完毕。\n\
    \n接下来，`j` 被赋值为 6，Python 打印 `n = 1 and j = 6`。此时，内部 `for` 循环执行完毕，因此控制权返回到外部 `for`\
    \ 循环。\n\n变量 `n` 被赋值为 2，内部 `for` 循环第二次执行。也就是说，`j` 被赋值为 4，并将 `n = 2 and j = 4` 打印到控制台。\n\
    \n两个循环继续以这种方式执行，最终输出如下所示：\n\n```\nn = 1 and j = 4\nn = 1 and j = 5\nn = 1 and\
    \ j = 6\nn = 2 and j = 4\nn = 2 and j = 5\nn = 2 and j = 6\nn = 3 and j = 4\n\
    n = 3 and j = 5\nn = 3 and j = 6\n```\n\n一个循环放在另一个循环内部称为**嵌套循环**，它们出现的频率可能比你想象的要高。你可以将\
    \ `while` 循环嵌套在 `for` 循环中，反之亦然，甚至可以嵌套超过两层！\n\n> **重要提示**\n\n嵌套循环本质上增加了代码的复杂性，正如你在前面的示例中看到的，与单个\
    \ `for` 循环的示例相比，运行的步骤数量急剧增加。\n\n使用嵌套循环有时是完成某项任务的唯一方法，但过多的嵌套循环可能会对程序的性能产生负面影响。\n\
    \n循环是一个强大的工具。它们利用了计算机作为计算工具所能提供的最大优势之一：能够重复执行相同的任务无数次，而不会感到疲倦或抱怨。\n\n## 复习练习\n\
    \n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 在线找到这些练习的解决方案和许多其他额外资源。\n\n1. 编写一个 `for` 循环，使用 `range()` 函数打印整数 2 到 10，每个数字占一行。\n\
    2. 使用一个 `while` 循环打印整数 2 到 10（提示：你需要先创建一个新的整数。）\n3. 编写一个名为 `doubles()` 的函数，该函数接受一个数字作为输入并将其加倍。然后在循环中使用\
    \ `doubles()` 函数将数字 2 加倍三次，每次结果显示在单独的行上。以下是一些示例输出：\n\n```\n4\n8\n16\n```\n\n[为此部分提供反馈\
    \ »](https://realpython.com/python-basics/resources)\n\n## 6.5 挑战：跟踪你的投资\n\n在这个挑战中，你将编写一个名为\
    \ `invest.py` 的程序，该程序跟踪投资随时间增长的金额。\n\n首先进行一笔初始存款，称为本金。每年，金额按固定百分比增加，称为年回报率。\n\n\
    例如，本金为 100 美元，年回报率为 5%，第一年增加 5 美元。第二年，增加额是新金额 105 美元的 5%，即 5.25 美元。\n\n编写一个名为\
    \ `invest` 的函数，包含三个参数：本金、年回报率和要计算的年数。函数签名可能如下所示：\n\n```\ndef invest(amount, rate,\
    \ years):\n```\n\n然后，该函数打印出在指定年数结束时的投资金额，四舍五入到 2 位小数。\n\n例如，调用 `invest(100, .05,\
    \ 4)` 应打印以下内容：\n\n```\nyear 1: $105.00\nyear 2: $110.25\nyear 3: $115.76\nyear\
    \ 4: $121.55\n```\n\n要完成该程序，请提示用户输入初始金额、年百分比利率和年数。然后调用 `invest()` 来显示用户输入值的计算结果。\n\
    \n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 在线找到此代码挑战的解决方案和许多其他额外资源。\n\n[为此部分提供反馈 »](https://realpython.com/python-basics/resources)\n\
    \n## 6.6 理解 Python 中的作用域\n\n任何关于 Python 函数和循环的讨论，如果不提及**作用域**问题，都是不完整的。\n\n作用域可能是编程中较难理解的概念之一，因此在本节中，你将得到一个温和的介绍。\n\
    \n在本节结束时，你将了解什么是**作用域**以及它为什么重要。你还将学习用于**作用域解析**的 LEGB 规则。\n\n## 什么是作用域？\n\n当你将一个值赋给一个变量时，你是在给这个值一个名称。名称是唯一的。例如，你不能将相同的名称赋给两个不同的数字。\n\
    \n```\n>>> x = 2\n>>> x\n2\n\n>>> x = 3\n>>> x\n3\n```\n\n当你将 3 赋给 x 时，你就不能再用名称\
    \ x 来回忆值 2 了。\n\n这种行为是有道理的。毕竟，如果变量 x 同时具有值 2 和 3，你如何计算 x + 2？它应该是 4 还是 5？\n\n\
    事实证明，有一种方法可以将相同的名称赋给两个不同的值。尝试运行以下脚本：\n\n```\nx = \"Hello World\"\n\ndef func():\n\
    \    x = 2\n```"
