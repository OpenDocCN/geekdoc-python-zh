    match the pattern because the dot is followed by three characters.


    # The [] Wildcard


    The [] wildcard works kind of like the ? wildcard because it matches only a single
    character. The difference is that instead of matching any single character like
    ? does, [] only matches characters that are included between the square brackets.


    For example, the pattern "program[13].py" matches any path containing the word
    `program`, followed by either a 1 or 3 and the extension `.py`. In the `new_directory/`
    folder, `program1.py` is the only path matching this pattern:


    ```

    >>> list(new_dir.glob("program[13].py"))

    [WindowsPath(''C:/Users/David/new_directory/program1.py'')]

    ```


    As with the other wildcards, you can use multiple instances of the [] wildcard,
    as well as combine it with any of the others.


    # Recursive Matching With The ** Wildcard


    The major limitation you''ve seen with both `.iterdir()` and `.glob()` is that
    they only return paths that are directly contained in the folder on which they
    are called.


    For example, `new_dir.glob("*.txt")` only returns the `file1.txt` path in `new_directory/`.
    It does not return the `file2.txt` path in the `folder_c/` subdirectory, even
    though that path matches the `"*.txt"` pattern.


    There is a special wildcard character `**` that makes the pattern recursive. The
    common was to use it is to prefix your pattern with `"**/"`. This tells `.glob()`
    to match your pattern in the current directory and any of its subdirectories.


    For example, the pattern `"**/*.txt"` matches both `file1.txt` and `folder_c/file2.txt`:'
  - '[PAGE 353]


    # 12.3. Common File System Operations


    ```

    >>> list(new_dir.glob("**/*.txt"))

    [WindowsPath(''C:/Users/David/new_directory/file1.txt''),

    WindowsPath(''C:/Users/David/new_directory/folder_c/file2.txt'')]

    ```


    Similarly, the pattern "**/*.py" matches any .py files in `new_directory/` and
    any of its subdirectories:


    ```

    >>> list(new_dir.glob("**/*.py"))

    [WindowsPath(''C:/Users/David/new_directory/program1.py''),

    WindowsPath(''C:/Users/David/new_directory/program2.py''),

    WindowsPath(''C:/Users/David/new_directory/folder_a/program3.py'')]

    ```


    There is also a shorthand method to doing recursive matching called `.rglob()`.
    To use it, pass the pattern without the `**/` prefix:


    ```

    >>> list(new_dir.rglob("*.py"))

    [WindowsPath(''C:/Users/David/new_directory/program1.py''),

    WindowsPath(''C:/Users/David/new_directory/program2.py''),

    WindowsPath(''C:/Users/David/new_directory/folder_a/program3.py'')]

    ```


    The `r` in `.rglob()` stands for “recursive.” Some people prefer to use this method
    instead of prefixing their patterns with `**/` because it is slightly shorter.
    Both versions are perfectly valid. In this book, we’ll use `.rglob()` instead
    of the `**/` prefix.


    # Moving and Deleting Files and Folders


    Sometimes you need to move a file or directory to a new location or delete a file
    or directory all together. You can do this using `pathlib`, but keep in mind that
    doing so can result in the loss of data, so these operations must be made with
    extreme care.


    To move a file or directory, use the `.replace()` method. For example, the following
    moves the `file1.txt` file in the `new_directory/` folder to the `folder_a/` subfolder:


    ```

    >>> source = new_dir / "file1.txt"

    ```'
