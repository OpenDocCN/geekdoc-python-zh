    # 18.6 Controlling Layout With Geometry Managers


    Up until now, you''ve been adding widgets to windows and `Frame` widgets using
    the `.pack()` method, but you haven''t been told what exactly this method does.
    Let''s clear things up!


    Application layout in Tkinter is controlled with **geometry managers**. `.pack()`
    is an example of a geometry manager, but it isn''t the only one. Tkinter has two
    others: `.place()` and `.grid()`.


    Each window and `Frame` in your application can use only one geometry manager.
    However, different frames can use different geometry managers, even if they are
    assigned to a frame or window using another geometry manager.


    Let''s start by taking a closer look at `.pack()`.


    # The `.pack()` Geometry Manager


    .pack() uses a **packing algorithm** to place widgets in a `Frame` or window in
    a specified order. The packing algorithm has two primary steps. For a given widget,
    the algorithm:


    +   1. Computes a rectangular area, called a **parcel**, that is just tall (or
    wide) enough to hold the widget and fills the remaining width (or height) in the
    window with blank space.

    2. Centers the widget in the parcel, unless a different location is specified.'
