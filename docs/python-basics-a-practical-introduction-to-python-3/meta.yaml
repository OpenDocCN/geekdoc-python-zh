  - "[PAGE 161]\n\n# 6.6 Understand Scope in Python\n\nAny discussion of functions\
    \ and loops in Python would be incomplete without some mention of the issue of\
    \ **scope**.\n\nScope can be one of the more difficult concepts to understand\
    \ in programming, so in this section you will get a gentle introduction to it.\n\
    \nBy the end of this section, you'll know what a **scope** is and why it is important.\
    \ You will also learn the LEGB rule for **scope resolution**.\n\n# What Is a Scope?\n\
    \nWhen you assign a value to a variable, you are giving that value a name. Names\
    \ are unique. For example, you can't assign the same name to two different numbers.\n\
    \n```\n>>> x = 2\n>>> x\n2\n\n>>> x = 3\n>>> x\n3\n```\n\nWhen you assign 3 to\
    \ x, you can no longer recall the value 2 with the name x.\n\nThis behavior makes\
    \ sense. After all, if the variable x has the values 2 and 3 simultaneously, how\
    \ do you evaluate x + 2? Should it be 4 or 5?\n\nAs it turns out, there is a way\
    \ to assign the same name to two different values. Try running the following script:\n\
    \n```\nx = \"Hello World\"\n\ndef func():\n    x = 2\n```"
- md: "## 6.6. Understand Scope in Python\n\n```python\nprint(f\"Inside 'func', x\
    \ has the value {x}\")\n\nfunc()\nprint(f\"Outside 'func', x has the value {x}\"\
    )\n```\n\nIn this example, the variable `x` is assigned two different values.\
    \ `x` is assigned \"Hello, World\" at the beginning, and is assigned 2 inside\
    \ of `func()`.\n\nThe output of the script, which you might find surprising, looks\
    \ like this:\n\n```\nInside 'func', x has the value 2\nOutside 'func', x has the\
    \ value Hello World\n```\n\nHow does `x` still have the value \"Hello World\"\
    \ after calling `func()`, which changes the value of `x` to 2?\n\nThe answer is\
    \ that the function `func()` has a different **scope** than the code that exists\
    \ outside of the function. That is, you can name an object inside `func()` the\
    \ same name as something outside `func()` and Python can keep the two separated.\n\
    \nThe function body has what is known as a **local scope**, with its own set of\
    \ names available to it. Code outside of the function body is in the **global\
    \ scope**.\n\nYou can think of a scope as a set of names mapped to objects. When\
    \ you use a particular name in your code, such as a variable or a function name,\
    \ Python checks the current scope to determine whether or not that name exists.\n\
    \n## Scope Resolution\n\nScopes have a hierarchy. For example, consider the following:\n\
    \n```python\nx = 5\n\ndef outer_func():\n    y = 3\n\n    def inner_func():\n\
    \        z = x + y\n        return z\n\n    return inner_func()\n```\n\n> **Note**\n\
    \nThe `inner_func()` function is called an **inner function** because it is defined\
    \ inside of another function. Just like you can nest loops, you can also define\
    \ functions within other functions!\n\nYou can read more about inner functions\
    \ in Real Python's article [Inner Functions—What Are They Good For?](https://realpython.com/inner-functions-what-are-they-good-for/).\n\
    \nThe variable `z` is in the local scope of `inner_func()`. When Python executes\
    \ the line `z = x + y`, it looks for the variables `x` and `y` in the local scope.\
    \ However, neither of them exist there, so it moves up to the scope of the `outer_func()`\
    \ function.\n\nThe scope for `outer_func()` is an **enclosing** scope of `inner_func()`.\
    \ It is not quite the global scope, and is not the local scope for `inner_func()`.\
    \ It lies in between those two.\n\nThe variable `y` is defined in the scope for\
    \ `outer_func()` and is assigned the value 3. However, `x` does not exist in this\
    \ scope, so Python moves up once again to the global scope. There it finds the\
    \ name `x`, which has the value 5. Now that the names `x` and `y` are resolved,\
    \ Python can execute the line `z = x + y`, which assigns to `z` the value of 8.\n\
    \n## The LEGB Rule\n\nA useful way to remember how Python resolves scope is with\
    \ the **LEGB** rule. This rule is an acronym for **L**ocal, **E**nclosing, **G**lobal,\
    \ **B**uilt-in.\n\nPython resolves scope in the order in which each scope appears\
    \ in the list LEGB. Here is a quick overview to help you remember how all of this\
    \ works:\n\n**Local (L):** The local, or current, scope. This could be the body\
    \ of a function or the top-level scope of a script. It always represents the scope\
    \ that the Python interpreter is currently working in.\n\n**Enclosing (E):** The\
    \ enclosing scope. This is the scope one level up from the local scope. If the\
    \ local scope is an inner function, the enclosing scope is the scope of the outer\
    \ function. If the scope is a top-level function, the enclosing scope is the same\
    \ as the global scope.\n\n**Global (G):** The global scope, which is the top-most\
    \ scope in the script. This contains all of the names defined in the script that\
    \ are not contained in a function body.\n\n**Built-in (B):** The built-in scope\
    \ contains all of the names, such as keywords, that are built-in to Python. Functions\
    \ such as `round()` and `abs()` are in the built-in scope. Anything that you can\
    \ use without first defining yourself is contained in the built-in scope.\n\n\
    ## Break the Rules\n\nConsider the following script. What do you think the output\
    \ is?\n\n```python\ntotal = 0\n\ndef add_to_total(n):\n    total = total + n\n\
    \nadd_to_total(5)\nprint(total)\n```\n\nYou would think that script outputs the\
    \ value 5, right? Try running it to see what happens.\n\nSomething unexpected\
    \ occurs. You get an error!\n\n```\nTraceback (most recent call last):\n  File\
    \ \"C:/Users/davea/stuff/python/scope.py\", line 6, in <module>\n    add_to_total(5)\n\
    \  File \"C:/Users/davea/stuff/python/scope.py\", line 4, in add_to_total\n  \
    \  total = total + n\nUnboundLocalError: local variable 'total' referenced before\
    \ assignment\n```\n\nWait a minute! According to the LEGB rule, Python should\
    \ have recognized that the name `total` doesn't exist in the `add_to_total()`\
    \ function's local scope and moved up to the global scope to resolve the name,\
    \ right?\n\nThe problem here is that the script attempts to make an assignment\
    \ to the variable `total`, which creates a new name in the local scope. Then,\
    \ when Python executes the right-hand side of the assignment it finds the name\
    \ `total` in the local scope with nothing assigned to it yet.\n\nThese kinds of\
    \ errors are tricky and are one of the reasons it is best to use unique variable\
    \ and function names no matter what scope you are in.\n\nYou can get around this\
    \ issue with the `global` keyword. Try running the following altered script:\n\
    \n```python\ntotal = 0\n\ndef add_to_total(n):\n    global total\n    total =\
    \ total + n\n\nadd_to_total(5)\nprint(total)\n```\n\nThis time, you get the expected\
    \ output 5. Why's that?\n\nThe line `global total` tells Python to look in the\
    \ global scope for the name `total`. That way, the line `total = total + n` does\
    \ not create a new local variable.\n\nAlthough this “fixes” the script, the use\
    \ of the `global` keyword is considered bad form in general.\n\nIf you find yourself\
    \ using `global` to fix problems like the one above, stop and think if there is\
    \ a better way to write your code. Often, you’ll find that there is!\n\n## 6.7\
    \ Summary and Additional Resources\n\nIn this chapter, you learned about two of\
    \ the most essential concepts in programming: functions and loops.\n\nFirst, you\
    \ learned how to define your own custom functions. You saw that functions are\
    \ made up of two parts:\n\n1.  The **function signature**, which starts with the\
    \ `def` keyword and includes the name of the function and the function’s parameters.\n\
    2.  The **function body**, which contains the code that runs whenever the function\
    \ is called.\n\nFunctions help avoid repeating similar code throughout a program\
    \ by creating re-usable components. This helps make code easier to read and maintain.\n\
    \nThen you learned about Python’s two kinds of loops:\n\n1.  **while loops** repeat\
    \ some code while some condition remains true.\n2.  **for loops** repeat some\
    \ code for each element in a set of objects.\n\nFinally, you learned what a **scope**\
    \ is and how Python resolves scope using the LEGB rule.\n\n### Interactive Quiz\n\
    \nThis chapter comes with a free online quiz to check your learning progress.\
    \ You can access the quiz using your phone or computer at the following web address:\n\
    \n[realpython.com/quizzes/python-basics-6](https://realpython.com/quizzes/python-basics-6)\n\
    \n### Additional Resources\n\nTo learn more about functions and loops, check out\
    \ the following resources:\n\n- [Python “while” Loops (Indefinite Iteration)](https://realpython.com/python-while-loop/)\n\
    - [Python “for” Loops (Definite Iteration)](https://realpython.com/python-for-loop/)\n\
    - [Recommended resources on realpython.com](https://realpython.com/)\n\n## Chapter\
    \ 7: Finding and Fixing Code Bugs\n\nEveryone makes mistakes—even seasoned professional\
    \ developers!\n\nIDLE is pretty good at catching mistakes like syntax and run-time\
    \ errors, but there’s a third type of error that you may have already experienced.\
    \ **Logic errors** occur when an otherwise valid program doesn’t do what was intended.\n\
    \nLogic errors cause unexpected behaviors called **bugs**. Removing bugs is called\
    \ **debugging**, and a **debugger** is a tool that helps you hunt down bugs and\
    \ understand why they are happening.\n\nKnowing how to find and fix bugs in your\
    \ code is a skill that you will use for your entire coding career!\n\n**In this\
    \ chapter, you will:**\n\n- Learn how to use IDLE’s Debug Control Window.\n- Practice\
    \ debugging on a buggy function.\n\nLet’s go!"
  mdcn: "## 6.6. 理解 Python 中的作用域\n\n```python\nprint(f\"Inside 'func', x has the value\
    \ {x}\")\n\nfunc()\nprint(f\"Outside 'func', x has the value {x}\")\n```\n\n在这个例子中，变量\
    \ `x` 被赋予了两个不同的值。`x` 在开始时被赋值为 \"Hello, World\"，然后在 `func()` 内部被赋值为 2。\n\n脚本的输出可能出乎你的意料，如下所示：\n\
    \n```\nInside 'func', x has the value 2\nOutside 'func', x has the value Hello\
    \ World\n```\n\n在调用 `func()`（它将 `x` 的值更改为 2）之后，`x` 怎么仍然拥有值 \"Hello World\" 呢？\n\
    \n答案是函数 `func()` 与函数外部的代码具有不同的**作用域**。也就是说，你可以在 `func()` 内部给一个对象命名，与外部某个对象同名，而\
    \ Python 能将两者区分开来。\n\n函数体拥有所谓的**局部作用域**，其中包含一组可供其使用的名称。函数体外部的代码处于**全局作用域**中。\n\
    \n你可以将作用域想象成一组映射到对象的名称。当你在代码中使用某个特定名称（如变量名或函数名）时，Python 会检查当前作用域以确定该名称是否存在。\n\n\
    ## 作用域解析\n\n作用域具有层次结构。例如，考虑以下代码：\n\n```python\nx = 5\n\ndef outer_func():\n  \
    \  y = 3\n\n    def inner_func():\n        z = x + y\n        return z\n\n   \
    \ return inner_func()\n```\n\n> **注意**\n\n`inner_func()` 函数被称为**内部函数**，因为它是在另一个函数内部定义的。就像你可以嵌套循环一样，你也可以在其他函数内部定义函数！\n\
    \n你可以在 Real Python 的文章 [内部函数——它们有什么用？](https://realpython.com/inner-functions-what-are-they-good-for/)\
    \ 中了解更多关于内部函数的信息。\n\n变量 `z` 位于 `inner_func()` 的局部作用域中。当 Python 执行 `z = x + y`\
    \ 这一行时，它会在局部作用域中查找变量 `x` 和 `y`。然而，它们都不存在于那里，因此它向上移动到 `outer_func()` 函数的作用域。\n\n\
    `outer_func()` 的作用域是 `inner_func()` 的**外层**作用域。它既不是全局作用域，也不是 `inner_func()` 的局部作用域。它介于两者之间。\n\
    \n变量 `y` 在 `outer_func()` 的作用域中定义，并被赋值为 3。然而，`x` 在此作用域中不存在，因此 Python 再次向上移动到全局作用域。在那里它找到了名称\
    \ `x`，其值为 5。现在名称 `x` 和 `y` 都已解析，Python 就可以执行 `z = x + y` 这一行，将值 8 赋给 `z`。\n\n\
    ## LEGB 规则\n\n记住 Python 如何解析作用域的一个有用方法是 **LEGB** 规则。这个规则是 **L**ocal（局部）、**E**nclosing（外层）、**G**lobal（全局）、**B**uilt-in（内置）的首字母缩写。\n\
    \nPython 按照 LEGB 列表中每个作用域出现的顺序来解析作用域。以下是帮助你记住这一切如何工作的快速概述：\n\n**局部 (L)：** 局部作用域，或当前作用域。这可能是函数体或脚本的顶层作用域。它始终代表\
    \ Python 解释器当前正在其中工作的那个作用域。\n\n**外层 (E)：** 外层作用域。这是比局部作用域高一级的作用域。如果局部作用域是一个内部函数，那么外层作用域就是外部函数的作用域。如果作用域是一个顶层函数，那么外层作用域与全局作用域相同。\n\
    \n**全局 (G)：** 全局作用域，这是脚本中最顶层的作用域。它包含脚本中定义的所有不在函数体内的名称。\n\n**内置 (B)：** 内置作用域包含所有内置到\
    \ Python 中的名称，例如关键字。像 `round()` 和 `abs()` 这样的函数就在内置作用域中。任何你无需先定义就能使用的东西都包含在内置作用域中。\n\
    \n## 打破规则\n\n考虑以下脚本。你认为输出是什么？\n\n```python\ntotal = 0\n\ndef add_to_total(n):\n\
    \    total = total + n\n\nadd_to_total(5)\nprint(total)\n```\n\n你可能会认为脚本输出值 5，对吧？试着运行一下看看会发生什么。\n\
    \n发生了意想不到的事情。你得到了一个错误！\n\n```\nTraceback (most recent call last):\n  File \"C:/Users/davea/stuff/python/scope.py\"\
    , line 6, in <module>\n    add_to_total(5)\n  File \"C:/Users/davea/stuff/python/scope.py\"\
    , line 4, in add_to_total\n    total = total + n\nUnboundLocalError: local variable\
    \ 'total' referenced before assignment\n```\n\n等等！根据 LEGB 规则，Python 应该已经识别出名称\
    \ `total` 在 `add_to_total()` 函数的局部作用域中不存在，并向上移动到全局作用域来解析该名称，对吧？\n\n这里的问题在于，脚本试图对变量\
    \ `total` 进行赋值，这会在局部作用域中创建一个新名称。然后，当 Python 执行赋值的右侧时，它在局部作用域中找到了名称 `total`，但该名称尚未被赋值。\n\
    \n这类错误很棘手，也是为什么无论你在哪个作用域，最好使用唯一的变量名和函数名的原因之一。\n\n你可以使用 `global` 关键字来解决这个问题。试着运行以下修改后的脚本：\n\
    \n```python\ntotal = 0\n\ndef add_to_total(n):\n    global total\n    total =\
    \ total + n\n\nadd_to_total(5)\nprint(total)\n```\n\n这一次，你得到了预期的输出 5。为什么呢？\n\n\
    `global total` 这一行告诉 Python 在全局作用域中查找名称 `total`。这样，`total = total + n` 这一行就不会创建一个新的局部变量。\n\
    \n虽然这“修复”了脚本，但使用 `global` 关键字通常被认为是不良的编程习惯。\n\n如果你发现自己使用 `global` 来修复像上面那样的问题，请停下来思考是否有更好的方法来编写代码。通常，你会发现确实有！\n\
    \n## 6.7 总结与补充资源\n\n在本章中，你学习了编程中两个最基本的概念：函数和循环。\n\n首先，你学习了如何定义自己的自定义函数。你看到函数由两部分组成：\n\
    \n1.  **函数签名**，以 `def` 关键字开头，包含函数名和函数的参数。\n2.  **函数体**，包含每次调用函数时运行的代码。\n\n函数通过创建可重用的组件来帮助避免在程序中重复相似的代码。这有助于使代码更易于阅读和维护。\n\
    \n然后你学习了 Python 的两种循环：\n\n1.  **while 循环**在某个条件保持为真时重复执行一些代码。\n2.  **for 循环**对一组对象中的每个元素重复执行一些代码。\n\
    \n最后，你学习了什么是**作用域**以及 Python 如何使用 LEGB 规则来解析作用域。\n\n### 互动测验\n\n本章附带一个免费的在线测验，以检查你的学习进度。你可以使用手机或电脑通过以下网址访问测验：\n\
    \n[realpython.com/quizzes/python-basics-6](https://realpython.com/quizzes/python-basics-6)\n\
