  - '[PAGE 17]


    Python, on the other hand, is special. It is a full-spectrum language. We often
    judge the simplicity of a language based on the “hello world” test. That is, what
    syntax and actions are necessary to get that language to output “hello world”
    to the user? In Python, it couldn’t be simpler:


    ```

    print("Hello world")

    ```


    That’s it. However, I find this an unsatisfying test.


    The “hello world” test is useful but really not enough to show the power or complexity
    of a language. Let’s try another example. Not everything here needs to make total
    sense, just follow along to get the Zen of it. The book covers these concepts
    and more as you go through. The next example is certainly something you could
    write near the end.


    Here’s the new test: What would it take to write a program that accesses an external
    website, downloads the content to your app in memory, then displays a subsection
    of that content to the user? Let’s try that experiment with Python 3 with the
    help of the requests package (which needs to be installed—more on that in chapter
    12):


    ```

    import requests

    resp = requests.get("https://realpython.com")

    html = resp.text

    print(html[205:294])

    ```


    Incredibly, that’s it. When run, the output is (something like):


    ```

    <title>Python Tutorials - Real Python</title>

    <meta name="author" content="Real Python">

    ```


    This is the easy, getting started side of the spectrum of Python. A few trivial
    lines and incredible power is unleashed. Because Python has access to so many
    powerful but well-packaged libraries, such as requests, it is often described
    as *having batteries included*.


    So there you have a simple powerful starter example. On the real apps'
