  mdcn: "## 12.6. 读写 CSV 数据\n\n```python\n>>> file_path = Path.home() / \"employees.csv\"\
    \n>>> file = file_path.open(mode=\"r\", encoding=\"utf-8\")\n>>> reader = csv.DictReader(file)\n\
    ```\n\n当你创建一个 `DictReader` 对象时，CSV 文件的第一行被假定为包含字段名。这些值被存储在一个列表中，并赋值给 `DictReader`\
    \ 实例的 `.fieldnames` 属性：\n\n```python\n>>> reader.fieldnames\n['name', 'department',\
    \ 'salary']\n```\n\n就像 `csv.reader` 对象一样，`DictReader` 对象也是可迭代的：\n\n```python\n\
    >>> for row in reader:\n...     print(row)\n...\n{'name': 'Lee', 'department':\
    \ 'Operations', 'salary': '75000.000'}\n{'name': 'Jane', 'department': 'Engineering',\
    \ 'salary': '85000.00'}\n{'name': 'Diego', 'department': 'Sales', 'salary': '80000.00'}\n\
    >>> file.close()\n```\n\n`DictReader` 对象不是将每一行作为列表返回，而是将每一行作为字典返回。字典的键是字段名，值是\
    \ CSV 文件中每一行的字段值。\n\n请注意，`salary` 字段被读取为字符串。由于 CSV 文件是纯文本文件，值总是被读取为字符串。你需要根据需要将字符串转换为不同的数据类型。\n\
    \n例如，你可以使用一个函数来处理每一行，将键转换为正确的数据类型：\n\n```python\n>>> def process_row(row):\n...\
    \     row[\"salary\"] = float(row[\"salary\"])\n...     return row\n...\n>>> with\
    \ file_path.open(mode=\"r\", encoding=\"utf-8\") as file:\n...     reader = csv.DictReader(file)\n\
    ...     for row in reader:\n...         print(process_row(row))\n...\n{'name':\
    \ 'Lee', 'department': 'Operations', 'salary': 75000.0}\n{'name': 'Jane', 'department':\
    \ 'Engineering', 'salary': 85000.0}\n{'name': 'Diego', 'department': 'Sales',\
    \ 'salary': 80000.0}\n```\n\n`process_row()` 函数接受从 CSV 文件读取的行字典，并返回一个新的字典，其中 \"\
    salary\" 键被转换为浮点数。\n\n你可以使用 `csv.DictWriter` 类来写入带有表头的 CSV 文件，该类将具有共享键的字典写入 CSV\
    \ 文件的行中。\n\n以下字典列表表示一个包含人员及其年龄的小型数据库：\n\n```python\n>>> people = [\n...     {\"\
    name\": \"Veronica\", \"age\": 29},\n...     {\"name\": \"Audrey\", \"age\": 32},\n\
    ...     {\"name\": \"Sam\", \"age\": 24},\n... ]\n```\n\n要将 `people` 列表中的数据存储到\
    \ CSV 文件中，请以写入模式打开一个名为 `people.csv` 的新文件，并从文件对象创建一个新的 `csv.DictWriter` 对象：\n\n\
    ```python\n>>> file_path = Path.home() / \"people.csv\"\n>>> file = file_path.open(mode=\"\
    w\", encoding=\"utf-8\")\n>>> writer = csv.DictWriter(file, fieldnames=[\"name\"\
    , \"age\"])\n```\n\n当你实例化一个新的 `DictWriter` 对象时，第一个参数是用于写入 CSV 数据的文件对象。必需的 `fieldnames`\
    \ 参数是一个字段名字符串列表。\n\n> **注意**\n>\n> 在上面的示例中，字符串字面量 `[\"name\", \"age\"]` 被传递给 `fieldnames`\
    \ 参数，但你不必使用字符串字面量。例如，你也可以将 `fieldnames` 参数设置为 `people[0].keys()`。\n>\n> 如果在编写程序时不知道字段名，或者字段太多导致列表字面量不实用，这会很有用。\n\
    \n就像 `csv.writer` 对象一样，`DictWriter` 对象有一个 `.writerow()` 方法用于将单行写入 CSV 文件，还有一个\
    \ `.writerows()` 方法用于一次写入多行。但 `DictWriter` 对象还有一个名为 `.writeheader()` 的第三个方法，用于将表头行写入\
    \ CSV 文件：\n\n```python\n>>> writer.writeheader()\n10\n```\n\n`.writeheader()`\
    \ 返回写入文件的字符数，在本例中为 10。写入表头行是可选的，但建议这样做，因为它有助于定义 CSV 文件中包含的数据所代表的含义。它还使得使用 `DictReader`\
