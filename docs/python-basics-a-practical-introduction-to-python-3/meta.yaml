    \ store your two-dimensional data.\n\n## Install NumPy\n\nBefore you can work\
    \ with NumPy, you’ll need to install it using `pip`:\n\n```\n$ pip3 install numpy\n\
    ```\n\nOnce NumPy has finished installing, you can see some details about the\
