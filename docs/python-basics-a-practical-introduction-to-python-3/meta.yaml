- md: '## 14.4. Concatenating and Merging PDFs


    The names of the three files are listed, but they aren''t in order. Furthermore,
    the order of the files you see in the output on your computer may not match the
    output shown here.


    In general, the order of paths returned by `.glob()` is not guaranteed, so you''ll
    need to order them yourself. You can do this by creating a list containing the
    three file paths, and then calling the `.sort()` method on that list:


    ```

    >>> expense_reports = list(reports_dir.glob("*.pdf"))

    >>> expense_reports.sort()

    ```


    Recall that `.sort()` sorts a list in place, so you don''t need to assign the
    return value to a variable. After calling `.sort()`, the `expense_reports` list
    is sorted by file name in alphabetical order.


    Let''s check that the sorting worked by looping over `expense_reports` again and
    printing out the file names:


    ```

    >>> for path in expense_reports:

    ...     print(path.name)

    ...

    Expense report 1.pdf

    Expense report 2.pdf

    Expense report 3.pdf

    ```


    That looks good!


    Now we can concatenate the three PDFs together. To do that, we''ll use the `PdfFileMerger.append()`
    method, which requires a single string argument representing the path to a PDF
    file. When you call `.append()`, all of the pages in the PDF file are appended
    to the set of pages in the `PdfFileMerger` object.


    Let''s see this in action. First import the `PdfFileMerger` class and create a
    new instance:


    ```

    >>> from PyPDF2 import PdfFileMerger

    >>> pdf_merger = PdfFileMerger()

    ```


    Now loop over the paths in the sorted `expense_reports` list and append them to
    `pdf_merger`:


    ```

    >>> for path in expense_reports:

    ...     pdf_merger.append(str(path))

    ...

    >>>

    ```


    Notice that each `Path` object in `expense_reports/` is converted to a string
    with `str()` before being passed to `pdf_merger.append()`.


    With all of the PDF files in the `expense_reports/` directory concatenated together
    in the `pdf_merger` object, the last thing you need to do is write everything
    to an output PDF file. `PdfFileMerger` instances have a `.write()` method that
    works just like the `PdfFileWriter.write()`.


    Open a new file in binary write mode, then pass the file object to `pdf_merger.write()`:


    ```

    >>> with Path("expense_reports.pdf").open(mode="wb") as output_file:

    ...     pdf_merger.write(output_file)

    ...

    >>>

    ```


    You now have a PDF file called `expense_reports.pdf` in your current working directory.
    Open it up with a PDF reader and you''ll find all three expense reports together
    in the same PDF file.


    ## Merging PDFs With `.merge()`


    To merge two or more PDFs together, use the `PdfFileMerger.merge()` method. This
    method is similar to the `.append()` method, except that you must specify where
    in the output PDF to insert all of the content of the PDF you are merging.


    Let''s look at an example. Goggle, Inc has prepared a quarterly report, but forgot
    to include a table of contents. Peter Python noticed the mistake and quickly created
    a PDF with the missing table of contents. Now he needs to merge that PDF into
    the original report.


    The first thing you need to do is import everything you need from PyPDF2 and pathlib:


    ```

    >>> from pathlib import Path

    >>> from PyPDF2 import PdfFileMerger

    ```


    The report PDF and table of contents PDF can be found in the quarterly_report/
    subfolder of the Chapter 14 Practice Files folder. The report is in a file called
    report.pdf, and the table of contents is in a file a toc.pdf.


    Let’s go ahead and get the paths to both of those files:


    ```

    >>> report_dir = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "quarterly_report"

    ... )

    >>> report_path = report_dir / "report.pdf"

    >>> toc_path = report_dir / "toc.pdf"

    ```


    The first thing we’ll do is append the report PDF to a new PdfFilerMerger instance
    using the .append() method:


    ```

    >>> pdf_merger = PdfFileMerger()

    >>> pdf_merger.append(str(report_path))

    ```


    Now that pdf_merger has some pages in it, we can merge the table of contents PDF
    into it at the correct location. If you open the report.pdf file with a PDF reader,
    you’ll see that the first page of the report is a title page. The second is an
    introduction, and the remaining pages have different report sections in them.


    We want to insert the table of contents after the title page and just before the
    introduction section. Since PDF pages are indexed starting with 0 in PyPDF2, this
    means that we need to insert the table of contents after the page at index 0 and
    before the page at index 1.


    To do that, call `pdf_merger.merge()` with two arguments: first the integer 1
    indicating the index of the page where the table of contents should be inserted,
    and second a string containing the path the PDF file for the table of contents.


    Here''s what that looks like:


    ```

    >>> pdf_merger.merge(1, str(toc_path))

    ```


    Every page in the table of contents PDF is inserted *before* the page at index
    1. Since the table of contents PDF is only one page, it gets inserted at index
    1 and the page currently at index 1 gets shifted to index 2, the page currently
    at index 2 gets shifted to index 3, and so on.


    Now write the merged PDF to an output file:


    ```

    >>> with Path("full_report.pdf").open(mode="wb") as output_file:

    ...     pdf_merger.write(output_file)

    ...

    >>>

    ```


    You now have a `full_report.pdf` file in your current working directory. Open
    it up with a PDF reader and check that the table of contents was inserted at the
    correct spot.


    Concatenating and merging PDFs are common operations. While the examples in this
    section are admittedly somewhat contrived, you can imagine how useful a program
    would be for merging thousands of PDFs, or for automating routine tasks that would
    otherwise take a human lots of time to complete.


    ## Review Exercises


    - 1. In the Chapter 14 Practice Files directory there are three PDFs called `merge1.pdf`,
    `merge2.pdf`, and `merge3.pdf`. Using a `PdfFileMerger` instance, concatenate
    the two files `merge1.pdf` and `merge2.pdf` using `.append()`. Save the concatenated
    PDFs to a file called `concatenated.pdf` in your home directory.

    - 2. With a new `PdfFileMerger` instance, use `.merge()` to merge the file `merge3.pdf`
    in-between the two pages in the `concatenated.pdf` file you made in exercise 1.
    Save the new file to your home directory as `merged.pdf`. The final result should
    be a PDF with three pages. The first page should have the number 1 on it, the
    second should have 2, and the third should have 3.


    [Leave feedback on this section »](http://example.com)


    ## 14.5 Rotating and Cropping PDF Pages


    So far you’ve learned how to extract text from PDF files, extract pages, and concatenate
    and merge PDF files. These are all common operations with PDF files, but PyPDF2
    has many other useful features.


    In this section, you’ll learn how to rotate and crop pages in a PDF file.


    ## Rotating Pages


    Let’s start by learning how to rotate pages. For this example, we’ll use the `ugly.pdf`
    file in the Chapter 14 Practice Files folder. The `ugly.pdf` file contains a lovely
    version of Hans Christian Andersen’s *The Ugly Duckling*, except that every odd-numbered
    page is rotated counter-clockwise by ninety degrees.


    Let’s fix that. In a new IDLE interactive window, start by importing the `PdfFileReader`
    and `PdfFileWriter` classes from `PyPDF2`, as well as the `Path` class from the
    `pathlib` module:


    ```

    >>> from pathlib import Path

    >>> from PyPDF2 import PdfFileReader, PdfFileWriter

    ```


    Now create a `Path` object for the `ugly.pdf` file:


    ```

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "ugly.pdf"

    ... )

    ```


    Finally, let''s create new `PdfFileReader` and `PdfFileWriter` instances:


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    >>> pdf_writer = PdfFileWriter()

    ```


    Our goal is to create a new PDF file using `pdf_writer` that has all of the pages
    in the PDF rotated correctly. The even numbered pages in the PDF are already properly
    oriented, but the odd numbered pages in the PDF file are rotated counterclockwise
    by ninety degrees.


    To correct the problem, you''ll use the `PageObject.rotateClockwise()` method.
    This method takes an integer argument, in degrees, and rotates a page clockwise
    by that many degrees. For example, `.rotateClockwise(90)` rotates a PDF page clockwise
    by ninety degrees.


    > **Note**


    In addition to the `.rotateClockwise()` method, the `PageObject` class also has
    `.rotateCounterClockwise()` method for rotating pages counterclockwise.


    There are several ways you can go about rotating the pages in the PDF.'
  mdcn: '## 14.4. 连接与合并 PDF 文件


    三个文件的名称已列出，但顺序不对。此外，你在计算机输出中看到的文件顺序可能与此处显示的输出不匹配。


    通常，`.glob()` 返回的路径顺序无法保证，因此你需要自行排序。可以通过创建一个包含三个文件路径的列表，然后对该列表调用 `.sort()` 方法来实现：


    ```

    >>> expense_reports = list(reports_dir.glob("*.pdf"))

    >>> expense_reports.sort()

    ```


    请记住，`.sort()` 是原地排序列表，因此你无需将返回值赋给变量。调用 `.sort()` 后，`expense_reports` 列表将按文件名的字母顺序排序。


    让我们通过再次遍历 `expense_reports` 并打印文件名来检查排序是否成功：


