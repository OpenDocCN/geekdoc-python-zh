  md: 'string with the file location represented in this manner is called a **file
    path**.


    For example, the file path for the `jack_russel.gif` file in the above file system
    is `root/photos/dogs/jack_russel.gif`.


    How you write file paths depends on your operating system. Here are three examples
    of file paths on Windows, macOS, and Linux:


    +   1. **Windows:** `C:\Users\David\Documents\hello.txt`

    2. **macOS:** `/Users/David/Documents/hello.txt`

    3. **Ubuntu Linux:** `/home/David/Documents/hello.txt`


    All three of these file paths locate a text file named `hello.txt` that is stored
    in the `Documents` subfolder of the user directory for a user named David. As
    you can see, there are some pretty big differences between file paths from one
    operating system to another.


    On macOS and Ubuntu Linux, the operating system uses a **virtual file system**
    that organizes all files and directories for all devices on the system under a
    single root directory, usually represented by a forward slash symbol (`/`). Files
    and folders from external storage devices are usually located in a subdirectory
    called `media/`.


    In Windows, there is no universal root directory. Each device has a separate file
    system with a unique root directory that is named with a **drive letter** followed
    by a colon (`:`) and a back slash symbol (`\`). Typically, the hard drive where
    the operating system is installed is assigned the letter c, so the root directory
    of the file system for that drive is `c:`.


    The other major difference between Windows, macOS, and Ubuntu files paths is that
    directories in a Windows file path are separated by back slashes (`\`), whereas
    directories in macOS and Ubuntu file paths are separated by forward slashes (`/`).


    When you write programs that need to run on multiple operating systems, it is
    critical that you handle the differences in file paths appropriately.'
