    >>> n = 3

    >>> m = 4

    >>> f"{n} times {m} is {n*m}"

    ''3 times 4 is 12''

    ```


    It is a good idea to keep any expressions used in an f-string as simple as possible.
    Packing in a bunch of complicated expressions into a string literal can result
    in code that is difficult to read and difficult to maintain.


    f-strings are only available in Python version 3.6 and above. In earlier versions
    of Python, the `.format()` method can be used to get the same results. Returning
    to the Zaphod example, you can use `.format()` method to format the string like
    this:


    ```

    >>> "{} has {} heads and {} arms".format(name, heads, arms)

    ''Zaphod has 2 heads and 3 arms''

    ```


    f-strings are shorter, and sometimes more readable, than using `.format()`. You
    will see f-strings used throughout this book.


    For an in-depth guide to f-strings and comparisons to other string formatting
    techniques, check out the [Python 3''s f-Strings: An Improved String Formatting
    Syntax (Guide)](https://realpython.com/python-f-strings/) on realpython.com


    > **Note**


    There is also another way to print formatted strings: using the `%` operator.
    You might see this in code that you find elsewhere, and you can [read about how
    it works here](https://realpython.com/python-f-strings/) if you''re curious.


    Keep in mind that this style has been phased out entirely in Python 3. Just be
    aware that it exists and you may see it in legacy Python code bases.'
