  md: '# Chapter 1


    # Introduction


    Welcome to Real Python’s *Python Basics* book, fully updated for Python 3.8! In
    this book you’ll learn real-world Python programming techniques, illustrated with
    useful and interesting examples.


    Whether you’re new to programming or a professional software developer looking
    to dive into a new language, this book will teach you all of the practical Python
    that you need to get started on projects on your own.


    No matter what your ultimate goals may be, if you work with a computer at all,
    you will soon be finding endless ways to improve your life by automating tasks
    and solving problems through Python programs that you create.


    But what’s so great about Python as a programming language? Python is open-source
    freeware, meaning you can download it for free and use it for any purpose, commercial
    or not.


    Python also has an amazing community that has built a number of additional useful
    tools you can use in your own programs. Need to work with PDF documents? There’s
    a comprehensive tool for that. Want to collect data from web pages? No need to
    start from scratch!


    Python was built to be easier to use than other programming lan-'
  merge: -1
  pgno: 22
- img_proc: true
  md: "guages. It's usually much easier to read Python code and much faster to write\
    \ code in Python than in other languages.\n\nFor instance, here's some simple\
    \ code written in C, another commonly used programming language:\n\n```\n#include\
    \ <stdio.h>\n\nint main(void)\n{\n    printf(\"Hello, world\\n\");\n}\n```\n\n\
    All the program does is show the text `Hello, world` on the screen. That was a\
    \ lot of work to output one phrase! Here's the same program, written in Python:\n\
    \n```\nprint(\"Hello, world\")\n```\n\nThat's pretty simple, right? The Python\
    \ code is faster to write and easier to read. We find that it looks friendlier\
    \ and more approachable, too!\n\nAt the same time, Python has all the functionality\
    \ of other languages and more. You might be surprised how many professional products\
    \ are built on Python code: Instagram, YouTube, Reddit, Spotify, to name just\
