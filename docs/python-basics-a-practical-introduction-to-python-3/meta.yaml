    # Searching For Files In a Directory


    Sometimes you only need to iterate over files of a certain type, or files with
    certain naming schemes. You can use the `Path.glob()` method on a path representing
    a directory to get an iterable over directory contents that meet some criteria.


    It might seem strange that a method that searches for files is called `.glob()`.
    The reason the method is given this name is historical. In early version of the
    Unix operating system, a program called `glob` was used expand to file path patterns
    to full file paths.


    The `.glob()` method does something similar. You pass to the method a string containing
    a partial containing a wildcard character and `.glob()` returns a list of file
    paths that match the pattern.


    A **wildcard character** is a special character that acts as a placeholder in
    a **pattern**. The are replaced with other characters to create a concrete file
    path. For example, in the pattern `"*.txt"`, the asterisk `*` is a wildcard character
    that can be replaced with any number of other characters.


    The pattern `"*.txt"` matches any file path that ends with `.txt`. That is, if
    replacing the `*` in the pattern with everything in some file path up to the last
    four characters results in the original file path, then that file path is a **match**
    for the pattern `"*.txt"`.


    Let''s look at an example using the `new_directory/` folder previously assigned
    to the `new_dir` variable:


    ```

    >>> for path in new_dir.glob("*.txt"):

    ...     print(path)

    ...

    C:\Users\David\new_directory\file1.txt

    ```


    Like `.iterdir()`, the `.glob()` method returns an iterable of paths, but this
    time only paths that match the pattern `"*.txt"` are returned. `.glob()` returns
    only paths that are directly contained in the folder on which it is called.'
