    3. The parameter list, `(x, y)`

    4. A colon (`:`) at the end of the line


    When Python reads a line beginning with the `def` keyword, it creates a new function.
    The function is assigned to a variable with the same name as the function name.


    > **Note**


    Since function names become variables, they must follow the same rules for variable
    names that you learned in Chapter 3.


    So, a function name can only contain numbers, letters, and underscores, and must
    not begin with a number.


    The parameter list is a list of parameter names surrounded by opening and closing
    parentheses. It defines the function''s expected inputs. `(x, y)` is the parameter
    list for the `multiply` function. It creates two parameters, `x` and `y`.


    A **parameter** is sort of like a variable, except that it has no value. It is
    a placeholder for actual values that are provided whenever the function is called
    with one or more arguments.


    Code in the function body can use parameters as if they are variables with real
    values. For example, the function body may contain a line of code with the expression
    `x * y`.


    Since `x` and `y` have no value, `x * y` has no value. Python saves the expression
    as a template and fills in the missing values when the function is executed.


    A function can have any number of parameters, including no parameters at all!'
