    # 9.8 How to Pick a Data Structure


    In this chapter, you''ve learned about three data structures native to Python:
    lists, tuples, and dictionaries.


    You might be wondering, "How do I know when to use which data structure?" It''s
    a great question, and one many new Python programmers struggle with.


    The type of data structure you use depends on the problem you are solving, and
    there is no hard and fast rule you can use to pick the right data structure every
    time. You''ll always need to spend a little time thinking about the problem, and
    which structure works best for it.


    Fortunately, there are some guidelines you can use to help you make the right
    choice. These are presented below:


    **Use a list when:**


    +   - Data has a natural order to it

    - You will need to update or alter the data during the program

    - The primary purpose of the data structure is iteration'
  merge: -1
  pgno: 275
- img_proc: true
  md: '**Use a tuple when:**


    +   - Data has a natural order to it

    - You **will not** need to update or alter the data during the program

    - The primary purpose of the data structure is iteration


    **Use a dictionary when:**


    +   - The data is unordered, or the order does not matter

    - You will need to update or alter the data during the program

    - The primary purpose of the data structure is looking up values


