    \ it still returns a value:\n\n```\n>>> return_value = greet(\"Dave\")\nHello,\
    \ Dave!\n>>> print(return_value)\nNone\n```\n\nNotice also that the string \"\
    Hello, Dave!\" is printed even when the result of greet(\"Dave\") is assigned\
    \ to a variable. That's because the call to print() inside of the greet() function\
