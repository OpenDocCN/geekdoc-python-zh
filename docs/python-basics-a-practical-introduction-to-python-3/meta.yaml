    # Setting The Page Size


    You can change the page size when you instantiate a `Canvas` object with the optional
    `pagesize` parameter. This parameter accepts a tuple of floating point values
    representing the width and height of the page in points.


    For example, to set the page size to 8.5 inches width by 11 inches tall, you would
    create the following `Canvas`:


    ```

    canvas = Canvas("hello.pdf", pagesize=(612.0, 729.0))

    ```


    (612, 729) represents a letter sized paper because 8.5 times 72 is 612 and 11
    times 72 is 729.


    If doing the math to convert points to inches or centimeters isn''t your cup of
    tea, you can use the `reportlab.lib.units` module to help you with the conversions.
    The `.units` module contains several helper objects, such as `inch` and `cm`,
    that simplify your conversions.


