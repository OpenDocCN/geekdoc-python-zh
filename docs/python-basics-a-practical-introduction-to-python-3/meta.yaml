    \ »](https://realpython.com/python-basics/resources)\n\n## 18.10 挑战：诗人的回归\n\n\
    在这个挑战中，你将编写一个用于生成诗歌的 GUI 应用程序。该应用程序基于第 9 章的诗歌生成器。\n\n在视觉上，该应用程序应与此类似：\n\n![](img/4efa9a991b645f75be61871447c559ca_632_0.png)\n\
    \n你可以使用任何你喜欢的几何管理器，但应用程序应完成以下所有操作：\n\n1.  只允许用户在每个 Entry 小部件中输入正确数量的单词：\n    -\
    \ 至少 3 个名词\n    - 至少 3 个动词\n    - 至少 3 个形容词\n    - 至少 3 个介词\n    - 至少 1 个副词\n\n\
    \    如果在任何 Entry 小部件中输入的单词太少，应在显示生成诗歌的区域显示错误消息。\n\n2.  从用户输入中随机选择三个名词、副词、形容词和介词，以及一个副词。\n\
    \n3.  程序应使用以下模板生成诗歌：\n\n```\n{A/An} {adj1} {noun1}\n\nA {adj1} {noun1} {verb1}\
    \ {prep1} the {adj2} {noun2}\n{adverb1}, the {noun1} {verb2}\nthe {noun2} {verb3}\
    \ {prep2} a {adj3} {noun3}\n```\n\n4.  应用程序必须允许用户将他们的诗歌导出到文件。\n5.  **额外加分：** 检查用户是否在每个\
    \ `Entry` 小部件中输入了唯一的单词。例如，如果用户在名词 `Entry` 小部件中两次输入相同的名词，当用户尝试生成诗歌时，应用程序应显示错误消息。\n\
