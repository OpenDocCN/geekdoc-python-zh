    ```


    Another feature that strings and tuples have in common is slicing. Recall that
    you can extract a substring from a string using slicing notation:


    ```

    >>> name = "David"

    >>> name[2:4]

    "vi"

    ```


    The slice notation `[2:4]` after the variable `name` creates a new string containing
    the characters in `name` starting at position 2 and up to, but not including,
    the character at position 4.


    Slicing notation also works with tuples:


    ```

    >>> values = (1, 3, 5, 7, 9)

    >>> values[2:4]

    (5, 7)

    ```


    The slice `values[2:4]` creates a new tuple containing the all integers in `values`
    starting at position 2 and up to, but not including, the integer at position 4.


    The same rules governing string slices also apply to tuple slices. You may want
    to take some time to review the slicing examples in Chapter 4 with some of your
    own examples of tuples.


    # Tuples Are Immutable


    Like strings, tuples are immutable. This means you can''t change the value of
    an element of a tuple once it has been created.


    If you do try to change the value at some index of a tuple, Python will raise
    a `TypeError`:'
