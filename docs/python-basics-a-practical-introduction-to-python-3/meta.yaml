    # 18.5 Working With Widgets


    Widgets are the bread and butter of Tkinter. They are the elements through which
    users interact with your program.


    Each widget in Tkinter is defined by a class. Here are some of the widgets available:


    | Widget Class | Description |

    |---|---|

    | Label | A widget used to display text on the screen. |

    | Button | A button that can contain text and can perform an action when clicked.
    |

    | Entry | A text entry widget that allows only a single line of text. |

    | Text | A text entry widget that allows multiline text entry. |

    | Frame | A rectangular region used to group related widgets or provide padding
    between widgets. |


    You''ll see how to work with each of these in the following sections.


    > **Note**


    Tkinter has many more widgets than the ones listed here. For a full list, check
