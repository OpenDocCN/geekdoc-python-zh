    # 4.3. Manipulate Strings With Methods


    +   - Convert a string to upper or lower case

    - Remove whitespace from string

    - Determine if a string begins and ends with certain characters


    Let''s go!


    # Converting String Case


    To convert a string to all lower case letters, you use the string''s `.lower()`
    method. This is done by tacking `.lower()` on to the end of the string itself:


    ```

    >>> "Jean-luc Picard".lower()

    ''jean-luc picard''

    ```


    The dot (`.`) tells Python that what follows is the name of a method—the `lower()`
    method in this case.


    > **Note**


    We will refer to the names of string methods with a dot at the beginning of them.
    So, for example, the `.lower()` method is written with a dot, instead of `lower()`.


    The reason we do this is to make it easy to spot functions that are string methods,
    as opposed to built-in functions like `print()` and `type()`.


    String methods don''t just work on string literals. You can also use the `.lower()`
    method on a string assigned to a variable:


    ```

    >>> name = "Jean-luc Picard"

    >>> name.lower()

    ''jean-luc picard''

    ```


    The opposite of the `.lower()` method is the `.upper()` method, which converts
    every character in a string to upper case:'
  - '[PAGE 83]


    # 4.3. Manipulate Strings With Methods


    ```

    >>> loud_voice = "Can you hear me yet?"

    >>> loud_voice.upper()

    ''CAN YOU HEAR ME YET?''

    ```


    Compare the `.upper()` and `.lower()` string methods to the general-purpose `len()`
    function you saw in the last section. Aside from the different results of these
    functions, the important distinction here is how they are used.


    The `len()` function is a stand-alone function. If you want to determine the length
    of the `loud_voice` string, you call the `len()` function directly, like this:


    ```

    >>> len(loud_voice)

    20

    ```


    On the other hand, `.upper()` and `.lower()` must be used in conjunction with
    a string. They do not exist independently.


    # Removing Whitespace From a String


    Whitespace is any character that is printed as blank space. This includes things
    like spaces and **line feeds**, which are special characters that move output
    to a new line.


    Sometimes you need to remove whitespace from the beginning or end of a string.
    This is especially useful when working with strings that come from user input,
    where extra whitespace characters may have been introduced by accident.


    There are three string methods that you can use to remove whitespace from a string:


    +   1. `.rstrip()`

    2. `.lstrip()`

    3. `.strip()`


    `.rstrip()` removes whitespace from the right side of a string:'
  - '[PAGE 84]


    # 4.3. Manipulate Strings With Methods


    ```

    >>> name = "Jean-luc Picard     "

    >>> name

    ''Jean-luc Picard     ''

    >>> name.rstrip()

    ''Jean-luc Picard''

    ```


    In this example, the string "Jean-luc Picard     " has five trailing spaces. Python
    doesn''t remove any trailing spaces in a string automatically when the string
    is assigned to a variable. The .rstrip() method removes trailing spaces from the
    right-hand side of the string and returns a new string "Jean-luc Picard", which
    no longer has the spaces at the end.


    The .lstrip() method works just like .rstrip(), except that it removes whitespace
    from the left-hand side of the string:


    ```

    >>> name = "     Jean-luc Picard"

    >>> name

    ''     Jean-luc Picard''

    >>> name.lstrip()

    ''Jean-luc Picard''

    ```


    To remove whitespace from both the left and the right sides of the string at the
    same time, use the .strip() method:


    ```

    >>> name = "     Jean-luc Picard     "

    >>> name

    ''     Jean-luc Picard     ''

    >>> name.strip()

    ''Jean-luc Picard''

    ```


    > **Note**

    None of the .rstrip(), .lstrip(), and .strip() methods remove whitespace from
    the middle of the string. In each of the previous examples the space between "Jean-luc"
    and "Picard" is always preserved.'
