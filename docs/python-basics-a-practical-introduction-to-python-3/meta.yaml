    \ tall, you would create the following `Canvas`:\n\n```python\ncanvas = Canvas(\"\
    hello.pdf\", pagesize=(612.0, 729.0))\n```\n\n(612, 729) represents a letter sized\
    \ paper because 8.5 times 72 is 612 and 11 times 72 is 729.\n\nIf doing the math\
