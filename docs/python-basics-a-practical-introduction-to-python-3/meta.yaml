    # # Chapter 11


    # # Modules and Packages


    As you gain experience writing code, you will eventually work on projects that
    are so large that keeping all of the code in a single file becomes cumbersome.


    Instead of writing a single file, you can put related code into separate files
    called **modules**. Individual modules can be put together like building blocks
    to create a larger application.


    There are four main advantages to breaking a program into modules:


    +   1. **Simplicity:** Modules are focused on a single problem.

    2. **Maintainability:** Small files are better than large files.

    3. **Reusability:** Modules reduce duplicate code.

    4. **Scoping:** Modules have their own **namespaces**.


    **In this chapter, you will learn how to:**


    +   - Create your own modules

    - Use modules in another file via the **import** statement

    - Organize several modules into a **package**


    Let''s get started!'
