    The important section of HTML code is the login form—that is, everything inside
    the `<form>` tags. The `<form>` on this page has the name attribute set to login.
    This form contains two `<input>` elements, one named user and the other named
    pwd. The third `<input>` element is the “Submit” button.


    Now that you know the underlying structure of the login form, as well as the credentials
    needed to log in, let’s take a look at a script that fills the form out and submits
    it:


    ```python

    import mechanicalsoup


    # 1

    browser = mechanicalsoup.Browser()

    url = "http://olympus.realpython.org/login"

    login_page = browser.get(url)

    login_html = login_page.soup


    # 2

    form = login_html.select("form")[0]

    form.select("input")[0]["value"] = "zeus"

    form.select("input")[1]["value"] = "ThunderDude"


    # 3

    profiles_page = browser.submit(form, login_page.url)

    ```


    After saving and running the script, you can confirm that you successfully logged
    in by typing the following into the interactive window:


    ```python

    >>> profiles_page.url

    ''http://olympus.realpython.org/profiles''

    ```


    Let''s break down the above example.


    1.  In the first part of the script, a Browser instance is created and used to
    request the http://olympus.realpython.org/login page. The HTML content of the
    page is assigned to the login_html variable using the .soup property.

    2.  The next section handles filling out the form. The first step is to retrieve
    the `<form>` element itself from the page''s HTML. login_html.select("form") returns
    a list of all `<form>` elements on the page. Since the page has only one `<form>`
    element, you can access the form by retrieving the 0th element of the list. The
    next two lines select the username and password inputs and set their value to
    "zeus" and "ThunderDude", respectively.

    3.  Finally, the form is submitted with the browser.submit() method. Notice that
    two arguments are passed to this method, the form object and the URL of the login_page,
    which is accessed via login_page.url.


    In the interactive window, you confirmed that the submission successfully redirected
    to the /profiles page. If something had gone wrong, the value of profiles_page.url
    would still be .


    > **Note**


    We are always being encouraged to use long passwords with many different types
    of characters in them, and now you know the main reason: automated scripts like
    the one we just designed can be used by hackers to “brute force” logins by rapidly
    trying to log in with many different usernames and passwords until they find a
    working combination.


    Besides this being highly illegal, almost all websites these days lock you out
    and report your IP address if they see you making too many failed requests, so
    don’t try it!


    Now that we have the `profiles_page` variable set let’s see how to programmatically
    obtain the URL for each link on the `/profiles` page.


    To do this, you use the `.select()` method again, this time passing the string
    `"a"` to select all of the `<a>` anchor elements on the page:


    ```python

    >>> links = profiles_page.soup.select("a")

    ```


    Now you can iterate of each link and print the `href` attribute:


    ```python

    >>> for link in links:

    ...     address = link["href"]

    ...     text = link.text

    ...     print(f"{text}: {address}")

    ...

    Aphrodite: /profiles/aphrodite

    Poseidon: /profiles/poseidon

    Dionysus: /profiles/dionysus

    ```


    The URLs contained in each `href` attribute are relative URLs, which aren’t very
    helpful if you want to navigate to them later using Mechanical Soup. If you happen
    to know the full URL, you can assign the portion needed to construct a full URL.
    In this case, the base URL is just http://olympus.realpython.org. Then you can
    concatenate the base URL with the relative URLs found in the `src` attribute:


    ```python

    >>> base_url = "http://olympus.realpython.org"

    >>> for link in links:

    ...     address = base_url + link["href"]

    ...     text = link.text

    ...     print(f"{text}: {address}")

    ...

    Aphrodite: http://olympus.realpython.org/profiles/aphrodite

    Poseidon: http://olympus.realpython.org/profiles/poseidon

    Dionysus: http://olympus.realpython.org/profiles/dionysus

    ```


    You can do a lot with just the .get(), .select(), and .submit() methods. That
    said, Mechanical Soup’s is capable of much more. To learn more about Mechanical
    Soup, check out the [official docs](http://docs.python-requests.org/).


