- md: '## Using the / Operator


    If you have an existing `Path` object, you can use the `/` operator to extend
    the path with subdirectories or file names.


    For example, the following creates a `Path` object representing a file named `hello.txt`
    in the `Documents` subdirectory of the current user''s home directory:


    ```

    >>> home / "Desktop" / "hello.txt"

    WindowsPath(''C:/Users/David/Desktop/hello.txt'')

    ```


    The `/` operator must always have a `Path` object on the left hand side. The right
    hand side can have either string representing a single file or directory, or a
    string representing a path, or another `Path` object.


    ## Absolute vs. Relative Paths


    A path that begins with the root directory in a file system is called an **absolute
    file path**. Not all file paths are absolute. A file path that is not absolute
    is called a **relative file path**.


    Here''s an example of a `Path` object that references a relative path:


    ```

    >>> # Relative Windows path

    >>> path = pathlib.Path(r"Photos\image.jpg")


    >>> # Relative macOS or Linux path

    >>> path = pathlib.Path("Photos/image.jpg")

    ```


    Notice that the path string does not start with `c:\` on Windows, or `/` on macOS
    and Linux.


    You can check whether or not a file path is absolute using the `.is_absolute()`
    method:


    ```

    >>> path.is_absolute()

    False

    ```


    Relative paths only make sense when considered within the context of some other
    directory. They are perhaps most commonly used to describe the path to a file
    relative to the current working directory, or the user''s home directory.


    You can extend a relative path to an absolute path using the forward slash (`/`)
    operator:


    ```

    >>> home = pathlib.Path.home()

    WindowsPath(''C:/Users/David'')

    >>> home / pathlib.Path(r"Photos\image.png")

    WindowsPath(''C:/Users/David/Photos/image.png'')

    ```


    On the left of the forward slash (`/`), put an absolute path to the directory
    that contains the relative path. Then put the relative path on the right side
    of the forward slash.


    Once you create a Path object, you can inspect the various components of the file
    path that it refers to.


    ## Accessing File Path Components


    All file paths contain a list of directories. The `.parents` attribute of a Path
    object returns an iterable containing the list of directories in the file path:


    ```

    >>> path = pathlib.Path.home() / "hello.txt"

    >>> path

    WindowsPath("C:\Users\David")

    >>> list(path.parents)

    [WindowsPath("C:\Users\David"), WindowsPath("C:\Users"),

    WindowsPath("C:")]

    ```


    Notice that the list of the directories are returned in reverse order from how
    they appear in the file path. That is, the last directory in the path is the first
    directory in the list of parent directories.


    You can iterate over the parent directories in a `for` loop:


    ```

    >>> for directory in path.parents:

    ...     print(directory)

    ...

    C:\Users\David

    C:\Users

    C:\

    ```


    The `.parent` attribute returns the name of the first parent directory in the
    file path as a string:


    ```

    >>> path.parent

    ''C:\Users\David''

    ```


    If the file path is absolute, you can access the root directory of the file path
    with the `.anchor` attribute:


    ```

    >>> path.anchor

    ''C:\''

    ```


    Note that `.anchor` returns a string, and not another `Path` object.


    For relative paths, `.anchor` return an empty string:


    ```

    >>> path = pathlib.Path("hello.txt")

    >>> path.anchor

    ''''

    ```


    The `.name` attribute returns the name of the file or directory that the path
    points to:


    ```

    >>> home = pathlib.Path.home()    # C:\Users\David

    >>> home.name

    ''David''

    >>> path = home / "hello.txt"

    >>> path.name

    ''hello.txt''

    ```


    The name of a file is broken down into two parts. The part to the left of the
    dot (`.`) is called the **stem**, and the part to the right of the dot (`.`) is
    called the **suffix** or **file extension**.


    The `.stem` and `.suffix` attributes return strings containing each of these parts
    of the file name:


    ```

    >>> path = pathlib.Path.home() / "hello.txt"

    >>> path.stem

    ''hello''

    >>> path.suffix

    ''.txt''

    ```


    You might be wondering at this point how to actually do something with the `hello.txt`
    file. You''ll learn how to read and write files in the next section. But before
    you open a file for reading, it might be a good idea to know whether or not that
    file exists.


    ## Checking Whether Or Not a File Path Exists


    You can create a `Path` object for a file path even if that path doesn''t actually
    exist. Of course, file paths that don''t represent actual files or directories
    aren''t very useful, unless you plan on creating them at some point.


    Path objects have an `.exists()` method that returns `True` or `False` depending
    on whether or not the file path exists on the machine executing the program.


    For instance, if you don''t have a `hello.txt` file in your home directory, then
    the `.exists()` method on the `Path` object representing that file path returns
    `False`:


    ```

    >>> path = pathlib.Path.home() / "hello.txt"

    >>> path.exists()

    False

    ```


    Using a text editor, or some other means, create a blank text file called `hello.txt`
    in your home directory. Then re-run the code from above, making sure `path.exists`
    returns `True`.


    You can check whether or not a file path refers to a file or a directory. To check
    if the path is a file, use the `.is_file()` method:


    ```

    >>> path.is_file()

    True

    ```


    Note that if the file path refers to a file, but doesn''t exist, then `.is_file()`
    returns `False`.


    Use the `.is_dir()` method to check if the file path refers to a directory:


    ```

    >>> # The path to "hello.txt" is not a directory

    >>> path.is_dir()

    False


    >>> # The path to the home directory is a directory

    >>> home.is_dir()

    True

    ```


    Working with file paths is an essential part of any programming project that reads
    or writes data from a hard drive or other storage device. Understanding the differences
    between file paths on different operating systems and how to work with `pathlib.Path`
    objects so that your programs can work on any operating system is an important
    and useful skill.


    ## Review Exercises


    You can find the solutions to these exercises and many other bonus resources online
    at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).


    1.  Create a new `Path` object to a file called `my_file.txt` in a folder called
    `my_folder/` in your computer’s home directory. Assign this `Path` object to the
    variable name `file_path`.

    2.  Check whether or not the path assigned to `file_path` exists.

    3.  Print the name of the path assigned to `file_path`. The output should be `my_file.txt`.

    4.  Print the name of the parent directory of the path assigned to `file_path`.
    The output should be `my_folder`.


    [Leave feedback on this section »](https://realpython.com/python-basics/resources)


