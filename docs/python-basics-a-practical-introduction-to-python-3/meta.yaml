    - 2. Indexing, which gets a single character from a string\n- 3. Slicing, which\
    \ gets several characters from a string at once\n\nLet’s dive in!\n\n### String\
    \ Concatenation\n\nTwo strings can be combined, or **concatenated**, using the\
    \ + operator:\n\n```\n>>> string1 = \"abra\"\n>>> string2 = \"cadabra\"\n>>> magic_string\
    \ = string1 + string2\n>>> magic_string\n'abracadabra'\n```\n\nIn this example,\
    \ string concatenation occurs on the third line. `string1` and `string2` are concatenated\
    \ using `+` and the result is assigned to the variable `magic_string`. Notice\
    \ that the two strings are joined without any whitespace between them.\n\nYou\
    \ can use string concatenation to join two related strings, such as joining a\
    \ first and last name into a full name:\n\n```\n>>> first_name = \"Arthur\"\n\
    >>> last_name = \"Dent\"\n>>> full_name = first_name + \" \" + last_name\n>>>\
    \ full_name\n'Arthur Dent'\n```\n\nHere string concatenation occurs twice on the\
    \ same line. `first_name` is concatenated with `\" \"`, resulting in the string\
