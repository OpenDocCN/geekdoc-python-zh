    # 17.1 Use NumPy for Matrix Manipulation


    In this section, you will learn how to store and manipulate matrices of data using
    the NumPy package. Before getting to that, though, let’s take a look at the problem
    NumPy solves.


    If you have ever taken a course in linear algebra, you may recall that a matrix
    is a rectangular array of numbers. You can easily create a matrix in pure Python
    with a list of lists:


    ```

    >>> matrix = [[1, 2, 3], [4, 5, 6], [7, 8, 9]]

    ```


    This seemingly works well. You can access individual elements of the matrix using
    their indices. For example, to access the second element of the first row of the
    matrix, you would type:


    ```

    >>> matrix[0][1]

    2

    ```


    Now suppose you want to multiply every element of the matrix by 2. To do this,
    you need to write a nested for loop that loops of every element of each row of
    the matrix. You might use a nested for loop, like this:


    ```

    >>> for row in matrix:

    ...     for i in range(len(row)):

    ...         row[i] = row[i] * 2

    ...

    >>> matrix

    [[2, 4, 6], [8, 10, 12], [14, 16, 18]]

    ```


    While this may not seem so hard, the point is that in pure Python, you need to
    do a lot of work from scratch to implement even simple linear algebra tasks. Think
    about what you need to do if you want to multiply two matrices together!


    NumPy provides nearly all of the functionality you might ever need'
- md: "## 17.1. Use NumPy for Matrix Manipulation\n\nNumPy is a powerful library for\
    \ numerical computing in Python. It provides an out-of-the-box and is more efficient\
