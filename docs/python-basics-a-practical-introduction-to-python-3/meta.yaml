  md: "# 18.7. Making Your Applications Interactive\n\nThe event loop is provided\
    \ for you with Tkinter, so you do not have to write any code that checks for event\
    \ yourself. However, you do have to write the code that is executed in response\
    \ to an event. In Tkinter, you write functions called **event handlers** for the\
    \ events that you use in your application.\n\nSo what is an event, and what happens\
    \ when one occurs? An **event** is any action that occurs during the event loop\
    \ that might trigger some behavior in the application, such as when a key or mouse\
    \ button is pressed.\n\nWhen an event occurs, an **event object** is emitted,\
    \ which means that an instance of a class representing the event is instantiated.\
    \ You don't need to worry about creating these classes yourself. Tkinter will\
    \ create instances of event classes for you automatically.\n\nLet's write our\
    \ own event loop in order to better understand how Tkinter's event loop works.\
    \ That way you can see how Tkinter's event loop fits into your application, and\
