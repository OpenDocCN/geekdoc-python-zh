    # 5.8 Summary and Additional Resources


    In this chapter you learned all about working with numbers in Python. You saw
    that there are two basic types of numbers—integers and floating-point numbers—and
    that Python also has built-in support for complex numbers.


    First you learned how to do basic arithmetic with numbers using the +, -, *, /,
    and % operators. You saw how to write arithmetic expressions, and learned what
    the best practices are in PEP 8 for formatting arithmetic expressions in your
    code.


    Then you learned about floating-point numbers and how they may not always be 100%
    accurate. This limitation has nothing to do with Python. It is a fact of modern-day
    computing and is due to the way floating-point numbers are stored in a computer’s
    memory.


    Next you saw how to round numbers to a given decimal place with the round() function,
    and learned that round() rounds ties to even, which is different from the way
    most people learned to round numbers in school.


    Finally, you saw numerous ways to format numbers for display.'
