    \ 找到这些练习的解决方案和许多其他额外资源。\n\n1.  使用 `break`，编写一个程序，反复要求用户输入，仅当用户输入 \"q\" 或 \"Q\"\
    \ 时才退出。\n2.  使用 `continue`，编写一个程序，循环遍历数字 1 到 50，并打印所有不是 3 的倍数的数字。\n\n[为此部分提供反馈\
    \ »](https://realpython.com/python-basics/resources)\n\n## 8.6 从错误中恢复\n\n在代码中遇到错误可能会令人沮丧，但这完全正常！即使是最优秀的程序员也会遇到。\n\
    \n程序员通常将运行时错误称为 **异常**。因此，当你遇到错误时，恭喜你！你刚刚让代码做了一些非凡的事情！\n\n错误并不总是坏事。也就是说，它们并不总是意味着你犯了错误。例如，尝试将\
    \ 1 除以 0 会导致 `ZeroDivisionError`。如果除数是由用户输入的，你无法提前知道用户是否会输入 0！\n\n为了创建健壮的程序，你需要能够处理由无效用户输入或任何其他不可预测来源引起的错误。在本节中，你将学习如何做到这一点。\n\
    \n### 异常动物园\n\n当你遇到异常时，了解出了什么问题很有用。Python 有许多内置的异常类型，描述不同类型的错误。\n\n在本书中，你已经看到了几种不同的错误。让我们在这里收集它们，并在列表中添加一些新的。\n\
    \n### ValueError\n\n当操作遇到无效值时，会发生 `ValueError`。例如，尝试将字符串 `\"not a number\"` 转换为整数会导致\
    \ `ValueError`：\n\n```python\n>>> int(\"not a number\")\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#1>\", line 1, in <module>\n    int(\"not a number\"\
    )\nValueError: invalid literal for int() with base 10: 'not a number'\n```\n\n\
    异常的名称显示在最后一行，后面是发生的具体问题的描述。这是所有 Python 异常的通用格式。\n\n### TypeError\n\n当对错误类型的值执行操作时，会发生\
    \ `TypeError`。例如，尝试将字符串和整数相加将导致 `TypeError`：\n\n```python\n>>> \"1\" + 2\nTraceback\
    \ (most recent call last):\n  File \"<pyshell#1>\", line 1, in <module>\n    \"\
    1\" + 2\nTypeError: can only concatenate str (not \"int\") to str\n```\n\n###\
    \ NameError\n\n当你尝试使用尚未定义的变量名时，会发生 `NameError`：\n\n```python\n>>> print(does_not_exist)\n\
    Traceback (most recent call last):\n  File \"<pyshell#3>\", line 1, in <module>\n\
    \    print(does_not_exist)\nNameError: name 'does_not_exist' is not defined\n\
    ```\n\n### ZeroDivisionError\n\n当除法运算中的除数为 0 时，会发生 `ZeroDivisionError`：\n\n```python\n\
    >>> 1 / 0\nTraceback (most recent call last):\n  File \"<pyshell#4>\", line 1,\
    \ in <module>\n    1 / 0\nZeroDivisionError: division by zero\n```\n\n### OverflowError\n\
    \n当算术运算的结果太大时，会发生 `OverflowError`。例如，尝试将值 2.0 提升到 1_000_000 次幂会导致 `OverflowError`：\n\
    \n```python\n>>> pow(2.0, 1_000_000)\nTraceback (most recent call last):\n  File\
    \ \"<pyshell#6>\", line 1, in <module>\n    pow(2.0, 1_000_000)\nOverflowError:\
    \ (34, 'Result too large')\n```\n\n你可能还记得第 5 章，Python 中的整数具有无限精度。这意味着 `OverflowError`\
    \ 只能发生在浮点数上。\n\n将 *整数* 2 提升到 1_000_000 次幂不会引发 `OverflowError`！\n\nPython 内置异常的列表可以在[文档](https://docs.python.org/3/library/exceptions.html)中找到。\n\
    \n### try 和 except 关键字\n\n有时你可以预测某个异常可能会发生。与其让程序崩溃，不如在错误发生时捕获它并执行其他操作。\n\n例如，你可能需要要求用户输入一个整数。如果用户输入非整数值，例如字符串\
    \ `\"a\"`，你需要让他们知道他们输入了无效值。\n\n为了防止程序崩溃，你可以使用 `try` 和 `except` 关键字。让我们看一个例子：\n\
    \n```python\ntry:\n    number = int(input(\"Enter an integer: \"))\nexcept ValueError:\n\
    \    print(\"That was not an integer\")\n```\n\n`try` 关键字用于指示一个 `try` 块，后面跟着一个冒号。`try`\
    \ 之后缩进的代码被执行。在这个例子中，要求用户输入一个整数。由于 `input()` 返回一个字符串，用户输入通过 `int()` 转换为整数，结果赋值给变量\
    \ `number`。\n\n如果用户输入非整数值，`int()` 操作将引发 `ValueError`。如果发生这种情况，`except ValueError`\
    \ 行下方缩进的代码将被执行。因此，程序不会崩溃，而是显示字符串 `\"That was not an integer\"`。\n\n如果用户确实输入了有效的整数值，那么\
    \ `except ValueError` 块中的代码永远不会执行。\n\n另一方面，如果发生了不同类型的异常，例如 `TypeError`，那么程序将崩溃。上面的例子只处理一种类型的异常——`ValueError`。\n\
    \n你可以通过用逗号分隔异常名称并将名称列表放在括号中来处理多种异常类型：\n\n```python\ndef divide(num1, num2):\n\
    \    try:\n        print(num1 / num2)\n    except (TypeError, ZeroDivisionError):\n\
    \        print(\"encountered a problem\")\n```\n\n在这个例子中，函数 `divide()` 接受两个参数\
    \ `num1` 和 `num2`，并打印 `num1` 除以 `num2` 的结果。\n\n如果使用字符串参数调用 `divide()`，那么除法操作将引发\
    \ `TypeError`。此外，如果 `num2` 为 0，则会引发 `ZeroDivisionError`。\n\n`except (TypeError,\
    \ ZeroDivisionError)` 行将处理这两种异常，并在引发任一异常时显示字符串 `\"encountered a problem\"`。\n\n\
    然而，很多时候，单独捕获每个错误是有帮助的，这样你可以显示对用户更有帮助的文本。为此，你可以在 `try` 块之后使用多个 `except` 块：\n\n\
    ```python\ndef divide(num1, num2):\n    try:\n```"
