    # 18.11 Summary and Additional Resources


    In this chapter, you learned how to build some simple graphical user interfaces
    (GUIs).


    First, you learned how to use the EasyGUI package to create dialog boxes to display
    messages to a user, accept user input, and allow a user to select files for reading
    and writing. Then you learned about Tkinter, which is Python''s built-in GUI framework.
    Tkinter is more complex than EasyGUI, but also more flexible.


    You learned how to work with widgets in Tkinter, including `Frame`, `Label`, `Button`,
    `Entry` and `Text` widgets. Widgets can be customized by assigning values to their
    various attributes. For example, setting the `text` attribute of a `Label` widget
    assigns some text to the label.


    Next, you saw how to use Tkinter''s `.pack()`, `.place()` and `.grid()` geometry
    managers to give your GUI applications a layout. You learned how to control various
    aspects of the layout including internal and ex-'
