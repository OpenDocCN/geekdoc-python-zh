  md: '# Syntax Errors


    In loose terms, a **syntax error** occurs when you write some code that isn''t
    allowed in the Python language. You can create a syntax error by changing the
    contents of the `hello_world.py` script from the last section to the following:


    ```

    print("Hello, world)

    ```


    In this example, the double quotation mark at the end of "Hello, world" has been
    removed. Python won''t be able to tell where the string of text ends. Save the
    altered script and then try to run it. What happens?


    The code won''t run! IDLE displays an alert box with the following message:


    ```

    EOL while scanning string literal.

    ```


    **EOL** stands for **End Of Line**, so this message tells you that Python read
    all the way to the end of the line without finding the end of something called
    a string literal.


    A **string literal** is text contained in-between two double quotation marks.
    The text "Hello, world" is an example of a string literal.


    > **Note**


    For brevity, string literals are often referred to as **strings**, although the
