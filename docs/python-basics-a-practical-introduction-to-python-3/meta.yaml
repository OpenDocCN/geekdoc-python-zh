    ## 3.4 Inspect Values in the Interactive Window


    You have already seen how to use `print()` to display a string that has been assigned
    to a variable. There is another way to display the value of a variable when you
    are working in the Python shell.


    Type the following into IDLE''s interactive window:


    ```

    >>> phrase = "Hello, world"

    >>> phrase

    ```


    When you press Enter after typing phrase a second time, the following output is
    displayed:


    ```

    ''Hello, world''

    ```


    Python prints the string "Hello, world", and you didn''t have to type print(phrase)!


    Now type the following:


    ```

    >>> print(phrase)

    ```


    This time, when you hit Enter you see:


    ```

    Hello, world

    ```


    Do you see the difference between this output and the output of simply typing
    phrase? It doesn''t have any single quotes surrounding it. What''s going on here?


    When you type phrase and press Enter, you are telling Python to **inspect** the
    variable phrase. The output displayed is a useful representation of the value
    assigned to the variable.


    In this case, phrase is assigned the string "Hello, world", so the output is surrounded
    with single quotes to indicate that phrase is a string.


    On the other hand, when you print() a variable, Python displays a more human-readable
    representation of the variable''s value. For strings, both ways of being displayed
    are human-readable, but this is not the case for every type of value.


    Sometimes, both printing and inspecting a variable produces the same output:


    ```

    >>> x = 2

    >>> x

    2

    >>> print(x)

    2

    ```


    Here, x is assigned to the number 2. Both the output of `print(x)` and inspecting
    x is not surrounded with quotes, because 2 is a number and not a string.


    Inspecting a variable, instead of printing it, is useful for a couple of reasons.
    You can use it to display the value of a variable without typing `print()`. More
    importantly, though, inspecting a variable usually gives you more useful information
    than `print()` does.


    Suppose you have two variables: x = 2 and y = "2". In this case, `print(x)` and
    `print(y)` both display the same thing. However, inspecting x and y shows the
    difference between the each variable''s value:


    ```

    >>> x = 2

    >>> y = "2"

    >>> print(x)

    2

    >>> print(y)

    2

    >>> x

    2

    >>> y

    ''2''

    ```


    The key takeaway here is that `print()` displays a readable representation of
    a variable''s value, while inspection provides additional information about the
    type of the value.


    You can inspect more than just variables in the Python shell. Check out what happens
    when you type `print` and hit Enter:


    ```

    >>> print

    <built-in function print>

    ```


    Keep in mind that you can only inspect variables in a Python shell. For example,
    save and run the following script:


    ```

    phrase = "Hello, world"

    phrase

    ```


    The script executes without any errors, but no output is displayed! Throughout
    this book, you will see examples that use the interactive window to inspect variables.


