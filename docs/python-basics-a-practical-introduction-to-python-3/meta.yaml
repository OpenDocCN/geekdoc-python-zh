    is now a rectangle whose upper left corner is at the top center of the page, and
    upper right corner is at the top right of the page.


    Finally, add the `left_side` and `right_side` pages to `pdf_writer` and write
    them to a new PDF file:


    ```

    >>> pdf_writer.addPage(left_side)

    >>> pdf_writer.addPage(right_sie)

    >>> with Path("cropped_pages.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    Now open the `cropped_pages.pdf` file with a PDF reader. You should see a file
    with two pages, the first containing the text from the left-hand side of the original
    first page, and the second containing the text from the original right-hand side.


