    # Chapter 14


    # Creating and Modifying PDF Files


    The **PDF**, or **p**ortable **d**ocument **f**ormat, is one of the most common
    formats for sharing documents over the internet. PDF files can contain text, images,
    tables, forms, and even rich media like videos and animations, all in a single
    file.


    The abundance of content types PDFs may contain can make working with them somewhat
    difficult. There''s a lot of data to decode when opening a PDF file! Fortunately,
    the Python ecosystem has some great packages for reading, manipulating, and creating
    PDF files!


    **In this chapter, you will learn how to:**


    +   - Read text from a PDF

    - Extract pages and split a PDF into multiple files

    - Concatenate and Merge PDF files

    - Rotate and crop pages in a PDF file

    - Encrypt and Decrypt PDF files with passwords

    - Create a PDF file from scratch


    Let''s get started!'
