    \ <module>` 时，模块的整个命名空间都会被导入。任何添加到 `adder.py` 的新变量或函数都可以在 `main.py` 中访问，而无需导入任何新内容。\n\
    \n打开 `adder.py` 的脚本窗口，并在 `add()` 下方添加以下函数：\n\n```\n# adder.py\n\n# 保持此代码不变\ndef\
