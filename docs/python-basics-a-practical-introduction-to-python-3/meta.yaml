    \n**文档字符串**是一个放在函数体顶部的三引号字符串字面量。文档字符串用于记录函数的功能以及它期望的参数类型。\n\n以下是添加了文档字符串的 `multiply()`\
    \ 的样子：\n\n```\ndef multiply(x, y):\n    \"\"\"返回两个数字 x 和 y 的乘积。\"\"\"\n    product\
