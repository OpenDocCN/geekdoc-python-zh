    \n## 4.3 Manipulate Strings With Methods\n\nStrings come bundled with special\
    \ functions called **string methods** that can be used to work with and manipulate\
    \ strings. There are numerous string methods available, but we'll focus on some\
    \ of the most commonly used ones.\n\nIn this section, you will learn how to:\n\
    \n- Convert a string to upper or lower case\n- Remove whitespace from string\n\
    - Determine if a string begins and ends with certain characters\n\nLet's go!\n\
    \n### Converting String Case\n\nTo convert a string to all lower case letters,\
    \ you use the string's `.lower()` method. This is done by tacking `.lower()` on\
    \ to the end of the string itself:\n\n```\n>>> \"Jean-luc Picard\".lower()\n'jean-luc\
    \ picard'\n```\n\nThe dot (`.`) tells Python that what follows is the name of\
    \ a method—the `lower()` method in this case.\n\n> **Note**\n>\n> We will refer\
    \ to the names of string methods with a dot at the beginning of them. So, for\
    \ example, the `.lower()` method is written with a dot, instead of `lower()`.\n\
    >\n> The reason we do this is to make it easy to spot functions that are string\
    \ methods, as opposed to built-in functions like `print()` and `type()`.\n\nString\
    \ methods don't just work on string literals. You can also use the `.lower()`\
    \ method on a string assigned to a variable:\n\n```\n>>> name = \"Jean-luc Picard\"\
    \n>>> name.lower()\n'jean-luc picard'\n```\n\nThe opposite of the `.lower()` method\
    \ is the `.upper()` method, which converts every character in a string to upper\
    \ case:\n\n```\n>>> loud_voice = \"Can you hear me yet?\"\n>>> loud_voice.upper()\n\
    'CAN YOU HEAR ME YET?'\n```\n\nCompare the `.upper()` and `.lower()` string methods\
    \ to the general-purpose `len()` function you saw in the last section. Aside from\
    \ the different results of these functions, the important distinction here is\
    \ how they are used.\n\nThe `len()` function is a stand-alone function. If you\
    \ want to determine the length of the `loud_voice` string, you call the `len()`\
    \ function directly, like this:\n\n```\n>>> len(loud_voice)\n20\n```\n\nOn the\
    \ other hand, `.upper()` and `.lower()` must be used in conjunction with a string.\
    \ They do not exist independently.\n\n### Removing Whitespace From a String\n\n\
    Whitespace is any character that is printed as blank space. This includes things\
    \ like spaces and **line feeds**, which are special characters that move output\
    \ to a new line.\n\nSometimes you need to remove whitespace from the beginning\
    \ or end of a string. This is especially useful when working with strings that\
    \ come from user input, where extra whitespace characters may have been introduced\
    \ by accident.\n\nThere are three string methods that you can use to remove whitespace\
    \ from a string:\n\n- 1. `.rstrip()`\n- 2. `.lstrip()`\n- 3. `.strip()`\n\n`.rstrip()`\
    \ removes whitespace from the right side of a string:\n\n```\n>>> name = \"Jean-luc\
    \ Picard     \"\n>>> name\n'Jean-luc Picard     '\n>>> name.rstrip()\n'Jean-luc\
    \ Picard'\n```\n\nIn this example, the string \"Jean-luc Picard     \" has five\
    \ trailing spaces. Python doesn't remove any trailing spaces in a string automatically\
    \ when the string is assigned to a variable. The .rstrip() method removes trailing\
    \ spaces from the right-hand side of the string and returns a new string \"Jean-luc\
    \ Picard\", which no longer has the spaces at the end.\n\nThe .lstrip() method\
    \ works just like .rstrip(), except that it removes whitespace from the left-hand\
    \ side of the string:\n\n```\n>>> name = \"     Jean-luc Picard\"\n>>> name\n\
    '     Jean-luc Picard'\n>>> name.lstrip()\n'Jean-luc Picard'\n```\n\nTo remove\
    \ whitespace from both the left and the right sides of the string at the same\
    \ time, use the .strip() method:\n\n```\n>>> name = \"     Jean-luc Picard   \
    \  \"\n>>> name\n'     Jean-luc Picard     '\n>>> name.strip()\n'Jean-luc Picard'\n\
    ```\n\n> **Note**\n>\n> None of the .rstrip(), .lstrip(), and .strip() methods\
    \ remove whitespace from the middle of the string. In each of the previous examples\
    \ the space between \"Jean-luc\" and \"Picard\" is always preserved.\n\n### Determine\
    \ if a String Starts or Ends With a Particular String\n\nWhen you work with text,\
    \ sometimes you need to determine if a given string starts with or ends with certain\
    \ characters. You can use two string methods to solve this problem: .startswith()\
    \ and .endswith().\n\nLet's look at an example. Consider the string \"Enterprise\"\
    . Here's how you use .startswith() to determine if the string starts with the\
    \ letters e and n:\n\n```\n>>> starship = \"Enterprise\"\n>>> starship.startswith(\"\
    en\")\nFalse\n```\n\nYou must tell .startswith() what characters to search for\
    \ by providing a string containing those characters. So, to determine if \"Enterprise\"\
    \ starts with the letters e and n, you call .startswith(\"en\"). This returns\
    \ False. Why do you think that is?\n\nIf you guessed that .startswith(\"en\")\
    \ returns False because \"Enterprise\" starts with a capital E, you're absolutely\
    \ right! The .startswith() method is **case-sensitive**. To get .startswith()\
    \ to return True, you need to provide it with the string \"En\":\n\n```\n>>> starship.startswith(\"\
    En\")\nTrue\n```\n\nThe .endswith() method is used to determine if a string ends\
    \ with certain characters:\n\n```\n>>> starship.endswith(\"rise\")\nTrue\n```\n\
    \nJust like .startswith(), the .endswith() method is case-sensitive:\n\n```\n\
    >>> starship.endswith(\"risE\")\nFalse\n```\n\n> **Note**\n>\n> The `True` and\
    \ `False` values are not strings. They are a special kind of data type called\
    \ a **Boolean value**. You will learn more about Boolean values in Chapter 8.\n\
    \n### String Methods and Immutability\n\nRecall from the previous section that\
    \ strings are immutable—they can’t be changed once they have been created. Most\
    \ string methods that alter a string, like `.upper()` and `.lower()`, actually\
    \ return copies of the original string with the appropriate modifications.\n\n\
    If you aren’t careful, this can introduce subtle bugs into your program. Try this\
    \ out in IDLE’s interactive window:\n\n```\n>>> name = \"Picard\"\n>>> name.upper()\n\
    'PICARD'\n>>> name\n'Picard'\n```\n\nWhen you call `name.upper()`, nothing about\
    \ `name` actually changes. If you need to keep the result, you need to assign\
    \ it to a variable:\n\n```\n>>> name = \"Picard\"\n>>> name = name.upper()\n>>>\
    \ name\n'PICARD'\n```\n\n`name.upper()` returns a new string \"PICARD\", which\
    \ is re-assigned to the `name` variable. This **overrides** the original string\
    \ \"Picard\" assigned to \"name\".\n\n### Use IDLE to Discover Additional String\
    \ Methods\n\nStrings have lots of methods associated to them. The methods introduced\
    \ in this section barely scratch the surface. IDLE can help you find new string\
    \ methods. To see how, first assign a string literal to a variable in the interactive\
    \ window:\n\n```\n>>> starship = \"Enterprise\"\n```\n\nNext, type starship followed\
    \ by a period, but do not hit Enter. You should see the following in the interactive\
    \ window:\n\n```\n>>> starship.\n```\n\nNow wait for a couple of seconds. IDLE\
    \ displays a list of every string method that you can scroll through with the\
    \ arrow keys.\n\nA related shortcut in IDLE is the ability to fill in text automatically\
    \ without having to type in long names by hitting Tab. For instance, if you only\
    \ type in starship.u and then hit the Tab key, IDLE automatically fills in starship.upper\
    \ because there is only one method belonging to starship that begins with a u.\n\
    \nThis even works with variable names. Try typing in just the first few letters\
    \ of starship and, assuming you don't have any other names already defined that\
    \ share those first letters, IDLE completes the name starship for you when you\
    \ hit the Tab key.\n\n## Review Exercises\n\nYou can find the solutions to these\
    \ exercises and many other bonus resources online at realpython.com/python-basics/resources.\n\
    \n- 1. Write a script that converts the following strings to lowercase: \"Animals\"\
    , \"Badger\", \"Honey Bee\", \"Honeybadger\". Print each lowercase string on a\
    \ separate line.\n- 2. Repeat Exercise 1, but convert each string to uppercase\
    \ instead of lowercase.\n- 3. Write a script that removes whitespace from the\
    \ following strings:\n    string1 = \"    Filet Mignon\"\n    string2 = \"Brisket\
    \    \""
