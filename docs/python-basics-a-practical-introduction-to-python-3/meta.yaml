    # Copying a List


    Sometimes you need to copy one list into another list. However, you can’t just
    reassign one list object to another list object, because you’ll get this (possibly
    surprising) result:


    ```

    >>> animals = ["lion", "tiger", "frumious Bandersnatch"]

    >>> large_cats = animals

    >>> large_cats.append("Tigger")

    >>> animals

    [''lion'', ''tiger'', ''frumious Bandersnatch'', ''Tigger'']

    ```


    In this example, you first assign the list stored in the `animals` variable to
    the variable `large_cats`, and then we add a new string to the `large_cats` list.
    But, when the contents of `animals` are displayed you can see that the original
    list has also been changed.


    This is a quirk of object-oriented programming, but it’s by design. When you say
    `large_cats = animals`, the `large_cats` and `animals` variables both refer to
    the same object.


    A variable name is really just a reference to a specific location in computer
    memory. Instead of copying all the contents of the list object and creating a
    new list, `large_cats = animals` assigns the memory location referenced by `animals`
    to `large_cats`. That is, both variables now refer to the same object in memory,
    and any changes made to one will affect the other.


    To get an independent copy of the `animals` list, you can use slicing no-'
  - '[PAGE 257]


    # 9.3. Nesting, Copying, and Sorting Tuples and Lists


    tation to return a new list with the same values:


    ```

    >>> animals = ["lion", "tiger", "frumious Bandersnatch"]

    >>> large_cats = animals[:]

    >>> large_cats.append("leopard")

    >>> large_cats

    [''lion'', ''tiger'', ''frumious Bandersnatch'', ''leopard'']

    >>> animals

    ["lion", "tiger", "frumious Bandersnatch"]

    ```


    Since no index numbers are specified in the [:] slice, every element of the list
    is returned from beginning to end. The large_cats list now has the same elements
    as animals, and in the same order, but you can .append() items to it without changing
    the list assigned to animals.


    If you want to make a copy of a list of lists, you can do so using the [:] notation
    you saw earlier:


    ```

    >>> matrix1 = [[1, 2], [3, 4]]

    >>> matrix2 = matrix1[:]

    >>> matrix2[0] = [5, 6]

    >>> matrix2

    [[5, 6], [3, 4]]

    >>> matrix1

    [[1, 2], [3, 4]]

    ```


    Let’s see what happens when you change the first element of the second list in
    matrix2:


    ```

