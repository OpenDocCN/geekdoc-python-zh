    \n请注意，脚本被分为两个不同的部分：一个函数定义（其中定义了 `add_underscores()`），以及一个“主”代码块，该块定义了一个值为 \"hello\"\
    \ 的变量 `phrase`，然后打印调用 `add_underscores(phrase)` 的结果。\n\n看看“主”部分：\n\n```\nphrase\
    \ = \"hello\"\nprint(add_underscores(phrase))\n```\n\n你认为问题可能出在这里吗？看起来不像，对吧？这两行代码看起来都没问题。所以，问题一定出在函数定义中：\n\
    \n```\ndef add_underscores(word):\n    new_word = \"_\"\n    for i in range(0,\
    \ len(word)):\n        new_word = word[i] + \"_\"\n    return new_word\n```\n\n\
    函数内的第一行代码创建了一个值为 \"_\" 的变量 `new_word`。这里没问题，所以我们可以得出结论，问题出在 `for` 循环体内的某个地方。\n\
    \n## 第二步：设置断点并检查代码\n\n既然你已经确定了错误的位置，就在 `for` 循环的开始处设置一个断点，这样你就可以使用调试控制窗口准确地追踪内部发生的情况：\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_179_0.png)\n\n现在打开调试控制窗口并运行脚本。执行仍然会在它看到的第一行（即定义函数的那一行）暂停。按下“Go”按钮运行代码，直到遇到断点。调试窗口现在将如下所示：\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_179_1.png)\n\n此时，代码在进入 `add_underscores()`\
    \ 函数中的 `for` 循环之前暂停。请注意，两个局部变量 `word` 和 `new_word` 显示在 Locals 面板中。目前，`word` 的值为\
    \ \"hello\"，`new_word` 的值为 \"_\"，正如预期的那样。\n\n点击 `Step` 按钮一次以进入 `for` 循环。调试窗口发生变化，一个新的变量\
    \ `i`（值为 0）显示在“Locals”面板中。`i` 是 `for` 循环中使用的计数器，你可以用它来跟踪当前正在查看 `for` 循环的哪一次迭代：\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_180_0.png)\n\n再点击一次 `Step`。如果你查看 *Locals*\
    \ 面板，你会看到变量 `new_word` 已经变成了值 \"h_\"：\n\n## 7.2. 消灭一些 Bug\n\n![](img/4efa9a991b645f75be61871447c559ca_181_0.png)\n\
    \n这是不对的。最初，`new_word` 的值是 \"_\"，在 `for` 循环的第二次迭代中，它现在应该具有值 \"_h_\"。如果你再点击几次 `Step`，你会看到\
    \ `new_word` 被设置为 `e_`，然后是 `l_`，依此类推。\n\n## 第三步：识别错误并尝试修复\n\n此时你可以得出的结论是，`new_word`\
    \ 在 `for` 循环的每次迭代中都被字符串 \"hello\" 中的下一个字符和一个尾随下划线覆盖了。由于 `for` 循环内只有一行代码，你知道问题一定出在以下代码中：\n\
    \n```\nnew_word = word[i] + \"_\"\n```\n\n仔细看看。这行代码告诉 Python 获取 `word` 的下一个字符，在其末尾添加一个下划线，并将这个新字符串赋值给变量\
    \ `new_word`。这正是你通过单步执行 `for` 循环所观察到的行为！\n\n要修复这个问题，你需要告诉 Python 将字符串 `word[i]\
    \ + \"_\"` 连接到 `new_word` 的现有值上。按下调试控制窗口中的“Quit”按钮，但暂时不要关闭该窗口。打开脚本窗口，将 `for` 循环内的行更改为：\n\
    \n```\nnew_word = new_word + word[i] + \"_\"\n```\n\n## 第四步：重复步骤 1-3 直到错误消失\n\n\
    将新的更改保存到你的脚本并再次运行它。在调试窗口中，按下 `Go` 按钮执行代码直到断点。\n\n> **注意**\n\n如果你在上一步中没有点击 `Quit`\
    \ 就关闭了调试器，当你重新打开调试控制窗口时可能会看到以下错误：\n\nYou can only toggle the debugger when idle\n\
