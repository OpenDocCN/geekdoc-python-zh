    `Entry` widgets are great for capturing small amounts of text from a user, but
    because they are only displayed on a single line, they are not ideal for gathering
    large amounts of text. That''s where `Text` widgets come in!


    # Text Widgets


    `Text` widgets are used for entering text, just like `Entry` widgets. The difference
    is that `Text` widgets may contain multiple lines of text.


    With a `Text` widget, a user can input a whole paragraph, or even several pages,
    of text!


    Just like `Entry` widgets, there are three main operations you can perform with
    `Text` widgets:


    +   1. Retrieve text with the `.get()` method'
  - '[PAGE 570]


    +   2. Delete text with the `.delete()` method

    3. Insert text with the `.insert()` method


