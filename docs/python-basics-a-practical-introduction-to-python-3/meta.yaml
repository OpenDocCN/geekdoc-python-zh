    \n## 9.8 How to Pick a Data Structure\n\nIn this chapter, you've learned about\
    \ three data structures native to Python: lists, tuples, and dictionaries.\n\n\
    You might be wondering, \"How do I know when to use which data structure?\" It's\
    \ a great question, and one many new Python programmers struggle with.\n\nThe\
    \ type of data structure you use depends on the problem you are solving, and there\
    \ is no hard and fast rule you can use to pick the right data structure every\
    \ time. You'll always need to spend a little time thinking about the problem,\
    \ and which structure works best for it.\n\nFortunately, there are some guidelines\
    \ you can use to help you make the right choice. These are presented below:\n\n\
    **Use a list when:**\n\n- Data has a natural order to it\n- You will need to update\
    \ or alter the data during the program\n- The primary purpose of the data structure\
    \ is iteration\n\n**Use a tuple when:**\n\n- Data has a natural order to it\n\
    - You **will not** need to update or alter the data during the program\n- The\
