    \ 语句解决了这个问题：\n\n```python\nsport = input(\"Enter a sport: \")\np1_score = int(input(\"\
    Enter player 1 score: \"))\np2_score = int(input(\"Enter player 2 score: \"))\n\
    \n# 1\nif sport.lower() == \"basketball\":\n    if p1_score == p2_score:\n   \
    \     print(\"The game is a draw.\")\n    elif p1_score > p2_score:\n        print(\"\
    Player 1 wins.\")\n    else:\n        print(\"Player 2 wins.\")\n# 2\nelif sport.lower()\
    \ == \"golf\":\n    if p1_score == p2_score:\n        print(\"The game is a draw.\"\
    )\n    elif p1_score < p2_score:\n        print(\"Player 1 wins.\")\n    else:\n\
    \        print(\"Player 2 wins.\")\n# 3\nelse:\n    print(\"Unknown sport\")\n\
    ```\n\n这个程序首先要求用户输入一项运动以及两位选手的分数。\n\n在（#1）中，分配给 `sport` 的字符串使用 `.lower()` 转换为小写，并与字符串\
    \ \"basketball\" 进行比较。这确保了用户输入如 \"Basketball\" 或 \"BasketBall\" 都会被解释为同一种运动。\n\
    \n然后比较选手的分数。如果分数相等，则比赛平局。如果选手1的分数大于选手2的分数，则选手1赢得篮球比赛。否则，选手2赢得篮球比赛。\n\n在（#2）中，分配给\
    \ `sport` 的字符串再次转换为小写，并与字符串 \"golf\" 进行比较。然后再次检查选手的分数。如果两位选手的分数相等，则比赛平局。如果选手1的分数小于选手2的分数，则选手1获胜。否则，选手2获胜。\n\
    \n最后，在（#3）中，如果 `sport` 变量被赋值为 \"basketball\" 或 \"golf\" 以外的字符串，则显示消息 \"Unknown\
    \ sport\"。\n\n脚本的输出取决于输入值。以下是使用 \"basketball\" 作为运动的示例执行：\n\n```\nEnter a sport:\
    \ basketball\nPlayer 1 score: 75\nPlayer 2 score: 64\nPlayer 1 wins.\n```\n\n\
    以下是使用相同选手分数但将运动更改为 \"golf\" 的输出：\n\n```\nEnter a sport: golf\nPlayer 1 score:\
    \ 75\nPlayer 2 score: 64\nPlayer 2 wins.\n```\n\n如果你为运动输入 `basketball` 或 `golf`\
    \ 以外的任何内容，程序将显示 `Unknown sport`。\n\n总的来说，程序有七种可能的运行方式，如下表所述：\n\n| 运动 | 分数值 |\n\
    |---|---|\n| \"basketball\" | p1_score == p2_score |\n| \"basketball\" | p1_score\
    \ > p2_score |\n| \"basketball\" | p1_score < p2_score |\n| \"golf\" | p1_score\
    \ == p2_score |\n| \"golf\" | p1_score > p2_score |\n| \"golf\" | p1_score < p2_score\
    \ |"
