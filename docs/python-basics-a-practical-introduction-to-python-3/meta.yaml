  md: '# 12.2. Working With File Paths in Python


    ```

    >>> path = pathlib.Path("/Users/David/Documents/hello.txt")

    ```


    There''s problem, though, with Windows paths. On Windows, directories are separated
    by back slashes \ . Python interprets back slashes as the start of an **escape
    sequence** that represent a special character in the string, such as the newline
    character (\n).


    Attempting to create a `Path` object with the Windows file path "C:\Users\David\Desktop\hello.txt"
    raises an exception:


    ```

    >>> path = pathlib.Path("C:\Users\David\Desktop\hello.txt")

    SyntaxError: (unicode error) ''unicodeescape'' codec can''t decode bytes

    in position 2-3: truncated \UXXXXXXXX escape

    ```


    There are two ways to get around this problem:


    You can use a forward slash (/) instead of a back slash (\) in your Windows file
    paths


    ```

    >>> path = pathlib.Path("C:/Users/David/Desktop/hello.txt")

    ```


    Python can interpret this just fine and will translate the path appropriately
    and automatically when interfacing with the Windows operating system.


