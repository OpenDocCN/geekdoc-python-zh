    \ 找到此代码挑战的解决方案和许多其他额外资源。\n\n[为此部分提供反馈 »](https://realpython.com)\n\n## 4.6 处理字符串和数字\n\
    \n当你使用 `input()` 函数获取用户输入时，结果始终是一个字符串。在许多其他情况下，输入也是以字符串形式提供给程序的。有时这些字符串包含需要用于计算的数字。\n\
    \n在本节中，你将学习如何处理数字字符串。你将看到算术运算如何作用于字符串，以及它们如何经常导致令人惊讶的结果。你还将学习如何在字符串和数字类型之间进行转换。\n\
    \n### 字符串和算术运算符\n\n你已经看到字符串对象可以包含多种类型的字符，包括数字。但是，不要将字符串中的数字与实际数字混淆。例如，在 IDLE 的交互窗口中尝试以下代码：\n\
    \n```\n>>> num = \"2\"\n>>> num + num\n'22'\n```\n\n`+` 运算符将两个字符串连接在一起。因此，`\"\
    2\" + \"2\"` 的结果是 `\"22\"`，而不是 `\"4\"`。\n\n只要数字是整数或整数，字符串就可以被数字“乘”。在交互窗口中输入以下内容：\n\
    \n```\n>>> num = \"12\"\n>>> num * 3\n'121212'\n```\n\n`num * 3` 将字符串 `\"12\"\
    ` 与自身连接三次，并返回字符串 `\"121212\"`。要将此操作与数字算术进行比较，请注意 `\"12\" * 3 = \"12\" + \"12\"\
    \ + \"12\"`。换句话说，将字符串乘以整数 `n` 会将该字符串与自身连接 `n` 次。\n\n表达式 `num * 3` 右侧的数字可以移到左侧，结果不变：\n\
    \n```\n>>> 3 * num\n'121212'\n```\n\n你认为如果在两个字符串之间使用 `*` 运算符会发生什么？在交互窗口中输入 `\"\
    12\" * \"3\"` 并按回车键：\n\n```\n>>> \"12\" * \"3\"\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: can't multiply sequence by\
    \ non-int of type 'str'\n```\n\nPython 引发 `TypeError` 并告诉你不能将序列乘以非整数。当 `*` 运算符与字符串一起使用时，无论字符串在左侧还是右侧，它总是期望另一侧是一个整数。\n\
    \n> **注意**\n>\n> **序列**是任何支持通过索引访问元素的 Python 对象。字符串是序列。你将在第 9 章学习其他序列类型。\n\n你认为当你尝试将字符串和数字相加时会发生什么？\n\
    \n```\n>>> \"3\" + 3\nTraceback (most recent call last):\n  File \"<stdin>\",\
    \ line 1, in <module>\nTypeError: can only concatenate str (not \"int\") to str\n\
    ```\n\n同样，Python 抛出 `TypeError`，因为 `+` 运算符期望其两侧的两个对象类型相同。如果 `+` 两侧的任何一个对象是字符串，Python\
    \ 就会尝试执行字符串连接。只有当两个对象都是数字时才会执行加法。因此，要将 `\"3\" + 3` 相加得到 `6`，你必须首先将字符串 `\"3\"`\
    \ 转换为数字。\n\n### 将字符串转换为数字\n\n你在上一节中看到的 `TypeError` 错误突出了使用用户输入时遇到的一个常见问题：当尝试在需要数字而不是字符串的操作中使用输入时，会出现类型不匹配。\n\
    \n让我们看一个例子。保存并运行以下脚本。\n\n```\nnum = input(\"Enter a number to be doubled: \")\n\
    doubled_num = num * 2\nprint(doubled_num)\n```\n\n当你输入一个数字，例如 `2` 时，你期望输出是 `4`，但在这种情况下，你得到的是\
    \ `22`。记住，`input()` 总是返回一个字符串，所以如果你输入 `2`，那么 `num` 被赋值为字符串 `\"2\"`，而不是整数 `2`。因此，表达式\
    \ `num * 2` 返回字符串 `\"2\"` 与自身连接的结果，即 `\"22\"`。\n\n要对包含在字符串中的数字执行算术运算，你必须首先将它们从字符串类型转换为数字类型。有两种方法可以做到这一点：`int()`\
