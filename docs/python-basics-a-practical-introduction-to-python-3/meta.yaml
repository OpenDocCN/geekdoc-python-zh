  md: "# 18.6. Controlling Layout With Geometry Managers\n\nweight is set to 0 by\
    \ default, which means that the column or row does not expand as the window resizes.\
    \ If every column and row is given a weight of 1, they all grow at the same rate.\
    \ If one column has a weight of 1 and another a weight of 2, then the second column\
    \ expands at twice the rate of the first.\n\nLet's adjust the previous script\
    \ to better handle window resizing:\n\n```\nimport tkinter as tk\n\nwindow = tk.Tk()\n\
    \nfor i in range(3):\n    window.columnconfigure(i, weight=1, minsize=75)\n  \
    \  window.rowconfigure(i, weight=1, minsize=50)\n\n    for j in range(0, 3):\n\
    \        frame = tk.Frame(\n            master=window,\n            relief=tk.RAISED,\n\
    \            borderwidth=1\n        )\n        frame.grid(row=i, column=j, padx=5,\
    \ pady=5)\n\n        label = tk.Label(master=frame, text=f\"Row {i}\\nColumn {j}\"\
    )\n        label.pack(padx=5, pady=5)\n\nwindow.mainloop()\n```\n\nThe .columnconfigure()\
    \ and .rowconfigure() methods are placed in the body of the outer for loop. You\
    \ could explicitly configure each column and row outside of the for loop, but\
    \ that would require writing an additional six lines of code.\n\nOn each iteration\
    \ of the loop, the i-th column and row are configured to have a weight of 1. This\
    \ ensures that each row and column expands at the same rate whenever the window\
