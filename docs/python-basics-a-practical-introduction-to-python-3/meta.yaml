    # 15.1 An Introduction to SQLite


    There are numerous SQL databases, and some are better suited to particular purposes
    than others. One of the simplest, most lightweight SQL databases is SQLite, which
    runs directly on your machine and comes bundled with Python automatically.


    In this section, you will learn how to use the `sqlite3` package to create a new
    database and store and retrieve data.


    # SQLite Basics


    There are four basic steps to working with SQLite:


    +   1. Import the `sqlite3` package

    2. Connect to an existing database, or create a new database

    3. Execute SQL statements on the database

    4. Close the database connection


    Let’s get started by exploring these four steps in IDLEs interactive window. Open
    IDLE and type the following:


    ```

    >>> import sqlite3

    >>> connection = sqlite3.connect("test_database.db")

    ```


    The `sqlite3.connect()` function is used to connect to, or create, a database.
    When you execute `.connect("test_database.db")`, Python searches for an existing
    database called "test_database.db". If no database with that name is found, a
    new one is created in the current working directory. To create a database in a
    different directory, you must specify the full path in the argument to `.connect()`.'
- md: "> **Note**\n\nIf you want to create a one-time-use database while you're testing\
    \ code or playing around with table structures, you can use the special name \"\
    :memory:\" to create the database in temporary memory, like so:\n\n```python\n\
    connection = sqlite3.connect(\":memory:\")\n```\n\nThe `.connect()` function returns\
    \ a `sqlite3.Connection` object, which you can verify with the `type()` function:\n\
    \n```python\n>>> type(connection)\n<class 'sqlite3.Connection'>\n```\n\nConnection\
    \ objects represent the connection between your program and the database. They\
    \ have several attributes and methods that can be used to interact with the database.\
    \ To store and retrieve data, you need a Cursor object, which can be obtained\
    \ with the `Connection.cursor()` function:\n\n```python\n>>> cursor = connection.cursor()\n\
    >>> type(cursor)\n<class 'sqlite3.Cursor'>\n```\n\nThe `sqlite3.Cursor` object\
    \ is your gateway to interacting with the database. Using a Cursor, you can create\
    \ database tables, execute SQL statements, and fetch query results.\n\n> **Note**\n\
    \nThe term **cursor** in database jargon usually refers to an object that is used\
    \ to fetch results from a database query one row at a time. Although `sqlite3.Cursor`\
    \ objects are used for this operation, they also do much more than is typically\
    \ expected from a cursor. This is one important distinction to keep in mind when\
    \ you use other databases besides SQLite.\n\nLet's use the SQLite datetime function\
    \ to get the current local time:\n\n```python\n>>> query = \"SELECT datetime('now',\
    \ 'localtime');\"\n>>> cursor.execute(query)\n<sqlite3.Cursor object at 0x000001A27EB85E30>\n\
    ```\n\nTo get the current time, you first build a SQL statement with the correct\
    \ syntax. In this case, `\"SELECT datetime('now', 'localtime');\"` is the statement\
    \ we need, and it is assigned to the `query` variable. This returns the current\
    \ time using the local time zone settings on your machine. Then the query is executed\
    \ using the `cursor.execute()` method.\n\nNote that `.execute()` returns a Cursor\
    \ object, but we didn't assign this to a new variable. That's because `.execute()`\
    \ alters the state of cursor and also returns the cursor object itself. This might\
    \ look kind of strange, but it allows you to chain multiple Cursor methods together\
    \ on a single line.\n\nYou might be wondering where the time returned by the datetime\
    \ function is. To get the query results, use the `cursor.fetchone()` method. `.fetchone()`\
    \ returns a tuple containing the first row of results:\n\n```python\n>>> cursor.fetchone()\n\
    ('2018-11-20 23:07:21',)\n```\n\nSince `.fetchone()` returns a tuple, you need\
    \ to unpack the tuple elements to get the string containing the date and time\
    \ information. Here's how you can do this by chaining the `.execute()` and `.fetchone()`\
    \ methods:\n\n```python\n>>> time = cursor.execute(query).fetchone()[0]\n>>> time\n\
    '2018-11-20 23:09:45'\n```\n\nFinally, to close the database connection, use the\
    \ `connection.close()` method:\n\n```python\n>>> connection.close()\n```\n\n##\
    \ Using `with` to Manage Your Database Connection\n\nRecall from Chapter 12 that\
    \ you can use a `with` statement with the `open()` function to open the file and\
    \ then automatically close the file once the `with` block has executed. The same\
    \ pattern applies to SQLite database connections and is the recommended way to\
    \ open a database connection.\n\nHere's the `datetime` example from above using\
    \ a `with` statement to manage the database connection:\n\n```python\n>>> with\
    \ sqlite3.connect(\"test_database.db\") as connection:\n...     cursor = connection.cursor()\n\
    ...     query = \"SELECT datetime('now', 'localtime');\"\n...     time = cursor.execute(query).fetchone()[0]\n\
    ...\n>>> time\n'2018-11-20 23:14:37'\n```\n\nIn this example, the `connection`\
    \ variable is assigned to the `Connection` object returned by `sqlite3.connect()`\
    \ in the `with` statement. The code in the `with` block gets a new `Cursor` object\
    \ using `connection.cursor()`, and then gets the current time with the `Cursor`\
    \ object's `.execute()` and `.fetchone()` methods.\n\nManaging your database connections\
    \ in a `with` statement has many advantages. The resulting code is often cleaner\
    \ and shorter than code written without a `with` statement. Moreover, any changes\
    \ made to the database are saved automatically, as you'll see in the next example.\n\
    \n## Working With Database Tables\n\nYou don't usually want to create a whole\
    \ database just to get the current time. Databases are used to store and retrieve\
    \ information. To store data in a database, you need to create a table and write\
    \ some values to it.\n\nLet's create a table called `People` with three columns:\
    \ `FirstName`, `LastName`, and `Age`. The SQL query to create this table looks\
    \ like this:\n\n```sql\nCREATE TABLE People(FirstName TEXT, LastName TEXT, Age\
    \ INT);\n```\n\nNotice that `FirstName` and `LastName` have the word `TEXT` next\
    \ to them, and `Age` is next to the word `INT`. This tells SQLite that values\
    \ in the `FirstName` and `LastName` columns are text values, and values in the\
    \ `Age` column are integers.\n\nOnce the table is created, you can populate it\
    \ with some data using the `INSERT INTO` SQL command. The following query inserts\
    \ the values `Ron`, `Obvious`, and `42` in the `FirstName`, `LastName`, and `Age`\
    \ columns, respectively:\n\n```sql\nINSERT INTO People VALUES('Ron', 'Obvious',\
    \ 42);\n```\n\n> **Note**\n\nNote that the string `'Ron'` and `'Obvious'` are\
    \ delimited with single quotation marks. This makes them valid Python strings\
    \ as well, but more importantly, only strings delimited with single quotes are\
    \ valid SQLite strings.\n\nWhen you write SQL queries as strings, you need to\
    \ make sure that they are delimited with double quotation marks so that you can\
    \ use single quotation marks inside of the Python strings to delimit SQLite strings.\n\
    \nSQLite is not the only SQL database that follows the single quote convention.\
    \ Keep an eye out for this whenever you work with any SQL database.\n\nLet's walk\
    \ through how to execute these statements and save the changes to the database.\
    \ First, we'll do it without using a `with` statement. Save and run the following\
    \ script:\n\n```python\nimport sqlite3\n\nconnection = sqlite3.connect(\"test_database.db\"\
    )\ncursor = connection.cursor()\ncursor.execute(\n    \"\"\"CREATE TABLE People(\n\
    \        FirstName TEXT,\n        LastName TEXT,\n        Age INT\n    );\"\"\"\
    \n)\ncursor.execute(\n    \"\"\"INSERT INTO People VALUES(\n        'Ron',\n \
    \       'Obvious',\n        42\n    );\"\"\"\n)\nconnection.commit()\nconnection.close()\n\
    ```\n\nFirst, you get a `Connection` object with `sqlite3.connect()` and assign\
    \ it to the `connection` variable. A `Cursor` object is created with `connection.cursor()`\
    \ and used to execute the two SQL statements for creating the `People` table and\
    \ inserting some data.\n\nThe SQL statement in both `.execute()` methods have\
    \ been written using triple quote strings so that we can format the SQL nicely.\
    \ SQL ignores whitespace, so we can get away with this here and improve the readability\
    \ of the Python code.\n\nFinally, `connection.commit()` is used to save the data\
    \ to the database. **Commit** is database jargon for saving data. If you do not\
    \ run `connection.commit()`, no `People` table is created.\n\nAfter the script\
    \ runs, `test_database.db` has a `People` table with one row in it. You can verify\
    \ this in the interactive window:\n\n```python\n>>> connection = sqlite3.connect(\"\
    test_database.db\")\n>>> cursor = connection.cursor()\n>>> cursor.execute(\"SELECT\
    \ * FROM People;\")\n<sqlite3.Cursor object at 0x000001F739DB6650>\n>>> cursor.fetchone()\n\
    ('Ron', 'Obvious', 42)\n```\n\nNext, let's look at the same script written using\
    \ a `with` statement to manage the database connection. Before you can do anything,\
    \ though, you need to delete the `People` table so that we can recreate it. Type\
    \ the following into the interactive window to remove the `People` table from\
    \ the database:\n\n```python\n>>> cursor.execute(\"DROP TABLE People;\")\n<sqlite3.Cursor\
    \ object at 0x000001F739DB6650>\n>>> connection.commit()\n>>> connection.close()\n\
    ```\n\nNow save and run the following script:\n\n```python\nimport sqlite3\n\n\
    with sqlite3.connect(\"test_database.db\") as connection:\n    cursor = connection.cursor()\n\
    \    cursor.execute(\n        \"\"\"CREATE TABLE People(\n            FirstName\
    \ TEXT,\n            LastName TEXT,\n            Age INT\n        );\"\"\"\n \
    \   )\n    cursor.execute(\n        \"\"\"INSERT INTO People VALUES(\n       \
    \     'Ron',\n            'Obvious',\n            42\n        );\"\"\"\n    )\n\
    ```"
