    \n# Strings and String Methods\n\nMany programmers, regardless of their specialty,\
    \ deal with text on a daily basis. For example, web developers work with text\
    \ that gets input from web forms. Data scientists process text to extract data\
    \ and perform things like sentiment analysis, which can help identify and classify\
    \ opinions in a body of text.\n\nCollections of text in Python are called **strings**.\
    \ Special functions called **string methods** are used to manipulate strings.\
    \ There are string methods for changing a string from lowercase to uppercase,\
    \ removing whitespace from the beginning or end of a string, or replacing parts\
    \ of a string with different text, and many more.\n\n**In this chapter, you will\
    \ learn how to:**\n\n- Manipulate strings with string methods\n- Work with user\
    \ input\n- Deal with strings of numbers\n- Format strings for printing\n\nLet's\
    \ get started!\n\n[Leave feedback on this section »](Leave feedback on this section\
    \ »)\n\n## 4.1 What is a String?\n\nIn Chapter 3, you created the string \"Hello,\
    \ world\" and printed it in IDLE's interactive window using the `print()` function.\
    \ In this section, you'll get a deeper look into what exactly a string is and\
    \ the various ways you can create them in Python.\n\n### The String Data Type\n\
    \nStrings are one of the fundamental Python data types. The term **data type**\
    \ refers to what kind of data a value represents. Strings are used to represent\
    \ text.\n\n> **Note**\n>\n> There are several other data types built-in to Python.\
    \ For example, you'll learn about numerical data types in Chapter 5, and Boolean\
    \ types in Chapter 8.\n\nWe say that strings are a **fundamental** data type because\
    \ they can't be broken down into smaller values of a different type. Not all data\
    \ types are fundamental. You'll learn about compound data types, also known as\
    \ **data structures**, in Chapter 9.\n\nThe string data type has a special abbreviated\
    \ name in Python: `str`. You can see this by using the `type()` function, which\
    \ is used to determine the data type of a given value.\n\nType the following into\
    \ IDLE's interactive window:\n\n```\n>>> type(\"Hello, world\")\n<class 'str'>\n\
    ```\n\nThe output `<class 'str'>` indicates that the value \"Hello, world\" is\
    \ an instance of the `str` data type. That is, \"Hello, world\" is a string.\n\
    \n> **Note**\n>\n> For now, you can think of the word “class” as a synonym for\
    \ “data type,” although it actually refers to something more specific. You’ll\
    \ see just what a class is in Chapter 10.\n\n`type()` also works for values that\
    \ have been assigned to a variable:\n\n```\n>>> phrase = \"Hello, world\"\n>>>\
    \ type(phrase)\n<class 'str'>\n```\n\nStrings have three properties that you’ll\
    \ explore in the coming sections:\n\n1. Strings contain **characters**, which\
    \ are individual letters or symbols.\n2. Strings have a **length**, which is the\
    \ number of characters contained in the string.\n3. Characters in a string appear\
    \ in a **sequence**, meaning each character has a numbered position in the string.\n\
    \nLet’s take a closer look at how strings are created.\n\n### String Literals\n\
    \nAs you’ve already seen, you can create a string by surrounding some text with\
    \ quotation marks:\n\n```\nstring1 = 'Hello, world'\nstring2 = \"1234\"\n```\n\
    \nEither single quotes (`string1`) or double quotes (`string2`) can be used to\
    \ create a string, as long as both quotation marks are the same type.\n\nWhenever\
    \ you create a string by surrounding text with quotation marks, the string is\
    \ called a **string literal**. The name indicates that the string is literally\
    \ written out in your code. All of the strings you have seen thus far are string\
    \ literals.\n\n> **Note**\n>\n> Not every string is a string literal. For example,\
    \ a string captured as user input isn’t a string literal because it isn’t explicitly\
    \ written out in the program’s code.\n>\n> You’ll learn how to work with user\
    \ input in section 4 of this chapter.\n\nThe quotes surrounding a string are called\
    \ **delimiters** because they tell Python where a string begins and where it ends.\
    \ When one type of quotes is used as the delimiter, the other type of quote can\
    \ be used inside of the string:\n\n```\nstring3 = \"We're #1!\"\nstring4 = 'I\
    \ said, \"Put it over by the llama.\"'\n```\n\nAfter Python reads the first delimiter,\
    \ all of the characters after it are considered a part of the string until a second\
    \ matching delimiter is read. This is why you can use a single quote in a string\
    \ delimited by double quotes and vice versa.\n\nIf you try to use double quotes\
    \ inside of a string that is delimited by double quotes, you will get an error:\n\
    \n```\n>>> text = \"She said, \"What time is it?\"\"\nFile \"<stdin>\", line 1\n\
    \    text = \"She said, \"What time is it?\"\"\n          ^\nSyntaxError: invalid\
    \ syntax\n```\n\nPython throws a `SyntaxError` because it thinks that the string\
    \ ends after the second `\"` and doesn’t know how to interpret the rest of the\
    \ line."
