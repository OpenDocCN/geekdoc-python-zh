- md: "## list.insert()\n\nThe `list.insert()` method is used to insert a single new\
    \ value into a list. It takes two parameters, an index `i` and a value `x`, and\
    \ inserts the value `x` at index `i` in the list.\n\n```python\n>>> colors = [\"\
    red\", \"yellow\", \"green\", \"blue\"]\n>>> # Insert \"orange\" into the second\
    \ position\n>>> colors.insert(1, \"orange\")\n>>> colors\n['red', 'orange', 'yellow',\
    \ 'green', 'blue']\n```\n\nThere are a couple of important observations to make\
    \ about this example.\n\nThe first observation applies to all list methods. To\
    \ use them, you first write the name of the list you want to manipulate, followed\
    \ by a dot (`.`) and then the name of the list method.\n\nSo, to use `insert()`\
    \ on the `colors` list, you must write `colors.insert()`. This works just like\
    \ string and number methods do.\n\nNext, notice that when the value `\"orange\"\
    ` is inserted at the index 1, the value `\"yellow\"` and all following values\
    \ are shifted to the right.\n\nIf the value for the index parameter of `.insert()`\
    \ is larger than the greatest index in the list, the value is inserted at the\
    \ end of the list:\n\n```python\n>>> colors.insert(10, \"violet\")\n>>> colors\n\
    ['red', 'orange', 'yellow', 'green', 'blue', 'violet']\n```\n\nHere the value\
    \ `\"violet\"` is actually inserted at index 5, even though `.insert()` was called\
    \ with 10 for the index.\n\nYou can also use negative indices with `.insert()`:\n\
    \n```python\n>>> colors.insert(-1, \"indigo\")\n>>> colors\n['red', 'orange',\
    \ 'yellow', 'green', 'blue', 'indigo', 'violet']\n```\n\nThis inserts `\"indigo\"\
    ` into the slot at index -1 which is the last element of the list. The value `\"\
    violet\"` is shifted to the right by one slot.\n\n> **Important**\n\nWhen you\
    \ `.insert()` an item into a list, you do not need to assign the result to the\
    \ original list.\n\nFor example, the following code actually erases the `colors`\
    \ list:\n\n```python\n>>> colors = colors.insert(-1, \"indigo\")\n>>> print(colors)\n\
    None\n```\n\n`.insert()` is said to alter `colors` **in place**. This is true\
    \ for all list methods that do not return a value.\n\nIf you can insert a value\
    \ at a specified index, it only makes sense that you can also remove an element\
    \ at a specified index.\n\n## list.pop()\n\nThe `list.pop()` method takes one\
    \ parameter, an index `i`, and removes the value from the list at that index.\
    \ The value that is removed is returned by the method:\n\n```python\n>>> color\
    \ = colors.pop(3)\n>>> color\n'green'\n>>> colors\n['red', 'orange', 'yellow',\
    \ 'blue', 'indigo', 'violet']\n```\n\nHere, the value `\"green\"` at index 3 is\
    \ removed and assigned to the variable `color`. When you inspect the `colors`\
    \ list, you can see that the string `\"green\"` has indeed been removed.\n\nUnlike\
    \ `.insert()`, Python raises an `IndexError` if you pass to `.pop()` an argument\
    \ larger than the last index:\n\n```python\n>>> colors.pop(10)\nTraceback (most\
    \ recent call last):\n  File \"<pyshell#0>\", line 1, in <module>\n    colors.pop(10)\n\
    IndexError: pop index out of range\n```\n\nNegative indices also work with `.pop()`:\n\
    \n```python\n>>> colors.pop(-1)\n'violet'\n>>> colors\n['red', 'orange', 'yellow',\
    \ 'blue', 'indigo']\n```\n\nIf you do not pass a value to `.pop()`, it removes\
    \ the last item in the list:\n\n```python\n>>> colors.pop()\n'indigo'\n>>> colors\n\
    ['red', 'orange', 'yellow', 'blue']\n```\n\nThis way of removing the final element,\
    \ by calling `.pop()` with no specified index, is generally considered the most\
    \ Pythonic.\n\n## list.append()\n\nThe `list.append()` method is used to append\
    \ a new element to the end of a list:\n\n```python\n>>> colors.append(\"indigo\"\
    )\n>>> colors\n['red', 'orange', 'yellow', 'blue', 'indigo']\n```\n\nAfter calling\
    \ `.append()`, the length of the list increases by one and the value `\"indigo\"\
    ` is inserted into the final slot. Note that `.append()` alters the list in place,\
    \ just like `.insert()`.\n\n`.append()` is equivalent to inserting an element\
    \ at an index greater than or equal to the length of the list. The above example\
    \ could also have been written as follows:\n\n```python\n>>> colors.insert(len(colors),\
    \ \"indigo\")\n```\n\n`.append()` is both shorter and more descriptive than using\
    \ `.insert()` this way, and is generally considered the more Pythonic way of adding\
    \ an element to the end of a list.\n\n## list.extend()\n\nThe `list.extend()`\
    \ method is used to add several new elements to the end of a list:\n\n```python\n\
    >>> colors.extend([\"violet\", \"ultraviolet\"])\n>>> colors\n['red', 'orange',\
    \ 'yellow', 'blue', 'indigo', 'violet', 'ultraviolet']\n```\n\n`.extend()` takes\
    \ a single parameter that must be an iterable type. The elements of the iterable\
    \ are appended to the list in the same order that they appear in the argument\
    \ passed to `.extend()`.\n\nJust like `.insert()` and `.append()`, `.extend()`\
    \ alters the list in place.\n\nTypically, the argument passed to `.extend()` is\
    \ another list, but it could also be a tuple. For example, the above example could\
    \ be written as follows:\n\n```python\n>>> colors.extend((\"violet\", \"ultraviolet\"\
    ))\n```\n\nThe four list methods discussed in this section make up the most common\
    \ methods used with lists. The following table serves to recap everything you\
    \ have seen here:\n\n| List Method | Description |\n| :--- | :--- |\n| `.insert(i,\
    \ x)` | Insert the value `x` at index `i` |\n| `.append(x)` | Insert the value\
    \ `x` at the end of the list |\n| `.extend(iterable)` | Insert all the values\
    \ of `iterable` at the end of the list, in order |\n| `.pop(i)` | Remove and return\
    \ the element at index `i` |\n\nIn addition to list methods, Python has a couple\
    \ of useful built-in functions for working with lists of numbers.\n\n## Lists\
    \ of Numbers\n\nOne very common operation with lists of numbers is to add up all\
    \ the values to get the total.\n\nYou can do this with a `for` loop:\n\n```python\n\
    >>> nums = [1, 2, 3, 4, 5]\n>>> total = 0\n>>> for number in nums:\n...     total\
    \ = total + number\n...\n>>> total\n15\n```\n\nFirst you initialize the variable\
    \ `total` to 0, and then loop over each number in `nums` and add it to `total`,\
    \ finally arriving at the value 15.\n\nAlthough this `for` loop is straightforward,\
    \ there is a much more succinct way of doing this in Python:\n\n```python\n>>>\
    \ sum([1, 2, 3, 4, 5])\n15\n```\n\nThe built-in `sum()` function takes a list\
    \ as an argument and returns the total of all the values in the list.\n\nIf the\
    \ list passed to `sum()` contains any values that aren’t numeric, a `TypeError`\
    \ is raised:\n\n```python\n>>> sum([1, 2, 3, \"four\", 5])\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: unsupported\
    \ operand type(s) for +: 'int' and 'str'\n```\n\nBesides `sum()`, there are two\
    \ other useful built-in functions for working with lists of numbers: `min()` and\
    \ `max()`. These functions return the minimum and maximum values in the list,\
    \ respectively:\n\n```python\n>>> min([1, 2, 3, 4, 5])\n1\n\n>>> max([1, 2, 3,\
    \ 4, 5])\n5\n```\n\nNote that `sum()`, `min()`, and `max()` also work with tuples:\n\
    \n```python\n>>> sum((1, 2, 3, 4, 5))\n15\n\n>>> min((1, 2, 3, 4, 5))\n1\n\n>>>\
    \ max((1, 2, 3, 4, 5))\n5\n```\n\nThe fact that `sum()`, `min()`, and `max()`\
    \ are all built-in to Python tells you that they are used frequently. Chances\
    \ are, you'll find yourself using them quite a bit in your own programs!\n\n##\
    \ List Comprehensions\n\nYet another way to create a list from an existing iterable\
    \ is with a **list comprehension**:\n\n```python\n>>> numbers = (1, 2, 3, 4, 5)\n\
    >>> squares = [num**2 for num in numbers]\n>>> squares\n[1, 4, 9, 16, 25]\n```\n\
    \nA list comprehension is a short-hand for a `for` loop. In the example above,\
    \ a tuple literal containing five numbers is created and assigned to the `numbers`\
    \ variable. On the second line, a list comprehension loops over each number in\
    \ `numbers`, squares each number, and adds it to a new list called `squares`.\n\
    \nTo create the `squares` list using a traditional `for` loop involves first creating\
    \ an empty list, looping over the numbers in `numbers`, and appending the square\
    \ of each number to the list:\n\n```python\n>>> squares = []\n>>> for num in numbers:\n\
    ...     squares.append(num**2)\n...\n>>> squares\n[1, 4, 9, 16, 25]\n```\n\nList\
    \ comprehensions are commonly used to convert values in one list to a different\
    \ type.\n\nFor instance, suppose you needed to convert a list of strings containing\
    \ floating point values to a list of `float` objects. The following list comprehension\
    \ achieves this:\n\n```python\n>>> str_numbers = [\"1.5\", \"2.3\", \"5.25\"]\n\
    >>> float_numbers = [float(value) for value in str_numbers]\n>>> float_numbers\n\
    [1.5, 2.3, 5.25]\n```\n\nList comprehensions are not unique to Python, but they\
    \ are one of its many beloved features. If you find yourself creating an empty\
    \ list, looping over some other iterable, and appending new items to the list,\
    \ then chances are you can replace your code with a list comprehension!\n\n##\
    \ 9.2. Lists Are Mutable Sequences"
