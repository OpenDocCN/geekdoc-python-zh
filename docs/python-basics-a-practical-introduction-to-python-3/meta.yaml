- md: "## 8.3. Control the Flow of Your Program\n\n| Sport | Score values |\n|---|---|\n\
    | everything else | any combination |\n\nNested if statements can create many\
    \ possible ways that your code can run. If you have many deeply nested if statements\
    \ (more than two levels), then the number of possible ways the code can execute\
    \ grows quickly.\n\n> **Note**\n\nThe complexity that results from using deeply\
    \ nested if statements may make it difficult to predict how your program will\
    \ behave under given conditions.\n\nFor this reason, nested if statements are\
    \ generally discouraged.\n\nLet's see how we simplify the previous program by\
    \ removing nested if statements.\n\nFirst, regardless of the sport, the game is\
    \ a draw if p1_score is equal to p2_score. So, we can move the check for equality\
    \ out from the nested if statements under each sport to make a single if statement:\n\
    \n```\nif p1_score == p2_score:\n    print(\"The game is a draw.\")\n\nelif sport.lower()\
    \ == \"basketball\":\n    if p1_score > p2_score:\n        print(\"Player 1 wins.\"\
    )\n    else:\n        print(\"Player 2 wins.\")\n\nelif sport.lower() == \"golf\"\
    :\n    if p1_score < p2_score:\n        print(\"Player 1 wins.\")\n    else:\n\
    \        print(\"Player 2 wins.\")\n\nelse:\n    print(\"Unknown sport.\")\n```\n\
    \nNow there are only six ways that the program can execute.\n\nThat’s still quite\
    \ a few ways. Can you think of any way to make the program simpler?\n\nHere’s\
    \ one way to simplify it. Player 1 wins if the sport is basketball and their score\
    \ is greater than player 2’s score, or if the sport is golf and their score is\
    \ less than player 2’s score.\n\nWe can describe this with compound conditional\
    \ expressions:\n\n```\nsport = sport.lower()\np1_wins_basketball = (sport == \"\
    basketball\") and (p1_score > p2_score)\np1_wins_golf = (sport == \"golf\") and\
    \ (p1_score < p2_score)\np1_wins = p1_wins_basketball or p1_wins_golf\n```\n\n\
    This code is pretty dense, so let’s walk through it one step at a time.\n\nFirst\
    \ the string assigned to `sport` is converted to all lowercase so that we can\
    \ compare the value to other strings without worrying about errors due to case.\n\
    \nOn the next line, we have a structure that might look a little strange. There\
    \ is an assignment operator (=) followed by an expression with the equality comparator\
    \ (==). This line evaluates the following compound logical expression and assigns\
    \ its value to the `p1_wins_basketball` variable:\n\n```\n(sport == \"basketball\"\
    ) and (p1_score > p2_score)\n```\n\nIf `sport` is \"basketball\" and player 1’s\
    \ score is larger than player 2’s score, then `p1_wins_basketball` is True.\n\n\
    Next, a similar operation is done for the `p1_wins_golf` variable. If `sport`\
    \ is \"golf\" and player 1's score is less than player 2's score, then p1_wins_golf\
    \ is True.\n\nFinally, p1_wins will be True if player 1 wins the basketball game\
    \ or the golf game, and will be False otherwise.\n\nUsing this code, you can simplify\
    \ the program quite a bit:\n\n```\nif p1_score == p2_score:\n    print(\"The game\
    \ is a draw.\")\nelif (sport.lower() == \"basketball\") or (sport.lower() == \"\
    golf\"):\n    sport = sport.lower()\n    p1_wins_basketball = (sport == \"basketball\"\
    ) and (p1_score > p2_score)\n    p1_wins_golf = (sport == \"golf\") and (p1_score\
    \ < p2_score)\n    p1_wins = p1_wins_basketball or p1_wins_golf\n    if p1_wins:\n\
    \        print(\"Player 1 wins.\")\n    else:\n        print(\"Player 2 wins.\"\
    )\nelse:\n    print(\"Unknown sport\")\n```\n\nIn this revised version of the\
    \ program, there are only four ways the program can execute, and the code is easier\
    \ to understand.\n\nNested if statements are sometimes necessary. However, if\
    \ you find yourself writing lots of nested if statements, it might be a good idea\
    \ to stop and think about how you might simplify your code.\n\n## Review Exercises\n\
    \nYou can find the solutions to these exercises and many other bonus resources\
    \ online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n- 1. Write a script that prompts the user to enter a word using the `input()`\
    \ function, stores that input in a variable, and then displays whether the length\
    \ of that string is less than 5 characters, greater than 5 characters, or equal\
    \ to 5 characters by using a set of if, elif and else statements.\n\nLeave feedback\
    \ on this section »\n\n## 8.4 Challenge: Find the Factors of a Number\n\nA factor\
    \ of a positive integer $n$ is any positive integer less than or equal to $n$\
    \ that divides $n$ with no remainder.\n\nFor example, 3 is a factor of 12 because\
    \ 12 divided by 3 is 4, with no remainder. However, 5 is not a factor of 12 because\
    \ 5 goes into 12 twice with a remainder of 2.\n\nWrite a script `factors.py` that\
    \ asks the user to input a positive integer and then prints out the factors of\
    \ that number. Here’s a sample run of the program with output:\n\n```\nEnter a\
    \ positive integer: 12\n1 is a factor of 12\n2 is a factor of 12\n3 is a factor\
    \ of 12\n4 is a factor of 12\n6 is a factor of 12\n12 is a factor of 12\n```\n\
    \n**Hint:** Recall from Chapter 5 that you can use the % operator to get the remainder\
    \ of dividing one number by another.\n\n*You can find the solutions to this code\
    \ challenge and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).*\n\
    \nLeave feedback on this section »\n\n## 8.5 Break Out of the Pattern\n\nIn Chapter\
    \ 6 you learned how to repeat a block of code many times using a `for` or `while`\
    \ loop. Loops are useful for performing a repetitive task and for applying some\
    \ processing to many different inputs.\n\nCombining `if` statements with `for`\
    \ loops opens up powerful techniques for controlling how code is run.\n\nIn this\
    \ section, you'll learn how to write `if` statements that are nested in `for`\
    \ loops and learn about two keywords — `break` and `continue` — that allow you\
    \ to more precisely control the flow of execution through a loop.\n\n### if Statements\
    \ and for Loops\n\nThe block of code in a `for` loop is just like any other block\
    \ of code. That means you can nest an `if` statement in a `for` loop just like\
    \ you can anywhere else in your code.\n\nThe following example uses a `for` loop\
    \ with an `if` statement to compute and display the sum of all even integers less\
    \ than 100:\n\n```\nsum_of_evens = 0\n\nfor n in range(1, 100):\n    if n % 2\
    \ == 0:\n        sum_of_evens = sum_of_evens + n\n\nprint(sum_of_evens)\n```\n\
    \nFirst, the `sum_of_evens` variable is initialized to 0. Then the program loops\
    \ over the numbers 1 to 99 and adds the even values to `sum_of_evens`. The final\
    \ value of `sum_of_evens` is 2450.\n\n### break\n\nThe `break` keyword tells Python\
    \ to literally break out of a loop. That is, the loop stops completely and any\
    \ code after the loop is executed.\n\nFor example, the following code loops over\
    \ the numbers 0 to 3, but stops the loop when the number 2 is encountered:\n\n\
    ```\nfor n in range(0, 4):\n    if n == 2:\n        break\n    print(n)\n\nprint(f\"\
    Finished with n = {n}\")\n```\n\nOnly the first two numbers are printed in the\
    \ output:\n\n```\n0\n1\nFinished with n = 2\n```\n\n### continue\n\nThe `continue`\
    \ keyword is used to skip any remaining code in the loop body and continue on\
    \ to the next iteration.\n\nFor example, the following code loops over the numbers\
    \ 0 to 3, printing each number as it goes, but skips the number 2:\n\n```\nfor\
    \ i in range(0, 4):\n    if i == 2:\n        continue\n    print(i)\n\nprint(f\"\
    Finished with i = {i}\")\n```\n\nAll the numbers except for 2 are printed in the\
    \ output:\n\n```\n0\n1\n3\nFinished with i = 3\n```\n\n> **Note**\n\nIt’s always\
    \ a good idea to give short but descriptive names to your variables that make\
    \ it easy to tell what they are supposed to represent.\n\nThe letters i, j and\
    \ k are exceptions because they are so common in programming.\n\nThese letters\
    \ are almost always used when we need a “throw-away” number solely for the purpose\
    \ of keeping count while working through a loop.\n\nTo summarize, the `break`\
    \ keyword is used to stop a loop if a certain condition is met, and the `continue`\
    \ keyword is used to skip an iteration of a loop when a certain condition is met.\n\
    \n### for...else Loops\n\nLoops can have their own `else` clause in Python, although\
    \ this structure isn’t used very frequently.\n\nLet’s look at an example:\n\n\
    ```\nphrase = \"it marks the spot\"\n\nfor character in phrase:\n    if character\
    \ == \"X\":\n        break\nelse:\n    print(\"There was no 'X' in the phrase\"\
    )\n```\n\nThe `for` loop in this example loops over the characters in the phrase\
    \ \"it marks the spot\". If the character \"X\" is found, the loop breaks. If\
    \ the loop completes without finding \"X\", the `else` clause is executed."
  mdcn: "## 8.3. 控制程序流程\n\n| 运动项目 | 得分值 |\n|---|---|\n| 其他所有项目 | 任意组合 |\n\n嵌套的 `if`\
