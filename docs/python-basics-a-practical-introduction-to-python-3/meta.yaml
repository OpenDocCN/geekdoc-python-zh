    # 5.6. Print Numbers in Style


    ```

    >>> n = 1234.56

    >>> f"The value of n is {n:,.2f}"

    ''The value of n is 1,234.56''

    ```


    The specifier ,.2f is useful for displaying currency values:


    ```

    >>> balance = 2000.0

    >>> spent = 256.35

    >>> remaining = balance - spent


    >>> f"After spending ${spent:.2f}, I was left with ${remaining:,.2f}"

    ''After spending $256.35, I was left with $1,743.65''

    ```


    Another useful option is %, which is used to display percentages. The % option
    multiplies a number by 100 and displays it in fixed-point format, followed by
    a percentage sign.


    The % option should always go at the end of your formatting specification, and
    you can''t mix it with the f option. For example, .1% displays a number as a percentage
    with exactly one decimal place:


    ```

    >>> ratio = 0.9

    >>> f"Over {ratio:.1%} of Pythonistas say ''Real Python rocks!''"

    "Over 90.0% of Pythonistas say ''Real Python rocks!''"


    >>> # Display percentage with 2 decimal places

    >>> f"Over {ratio:.2%} of Pythonistas say ''Real Python rocks!''"

    "Over 90.00% of Pythonistas say ''Real Python rocks!''"

    ```


    The formatting mini language is powerful and extensive. You''ve only seen the
    basics here. For more information, you are encouraged to read the [official documentation](https://realpython.com/python-basics/resources).


    # Review Exercises


    You can find the solutions to these exercises and many other bonus resources online
    at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).'
