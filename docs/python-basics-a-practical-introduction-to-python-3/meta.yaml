    \ 找到此代码挑战的解决方案和许多其他额外资源。\n\n[对此部分提供反馈 »](https://realpython.com/python-basics/resources)\n\
    \n## 18.11 总结与附加资源\n\n在本章中，你学习了如何构建一些简单的图形用户界面（GUI）。\n\n首先，你学习了如何使用 EasyGUI 包创建对话框，以向用户显示消息、接受用户输入，并允许用户选择用于读写的文件。然后你了解了\
    \ Tkinter，这是 Python 的内置 GUI 框架。Tkinter 比 EasyGUI 更复杂，但也更灵活。\n\n你学习了如何在 Tkinter\
    \ 中使用小部件，包括 `Frame`、`Label`、`Button`、`Entry` 和 `Text` 小部件。可以通过为小部件的各种属性赋值来自定义它们。例如，设置\
    \ `Label` 小部件的 `text` 属性会为标签分配一些文本。\n\n接下来，你看到了如何使用 Tkinter 的 `.pack()`、`.place()`\
