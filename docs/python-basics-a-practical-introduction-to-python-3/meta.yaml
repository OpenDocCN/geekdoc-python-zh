- md: "## 9.1. Tuples Are Immutable Sequences\n\nFor example, suppose you are asked\
    \ to provide a tuple containing all the integers that are both even and odd. No\
    \ such integer exists, but the empty tuple allows you to provide the requested\
    \ tuple.\n\nHow do you think you create a tuple with exactly one element? Try\
    \ out the following in IDLE:\n\n```\n>>> x = (1)\n>>> type(x)\n<class 'int'>\n\
    ```\n\nWhen you surround a value with parentheses, but don't include any commas,\
    \ Python interprets the value not as a tuple but as the type of value inside the\
    \ parentheses. So, in this case, (1) is a just a weird way of writing the integer\
    \ 1.\n\nTo create the tuple containing the single value 1, you need to include\
    \ a comma after the 1:\n\n```\n>>> x = (1,)\n>>> type(x)\n<class 'tuple'>\n```\n\
    \nA tuple containing a single element might seem as a strange as the empty tuple.\
    \ Couldn't you just drop all this tuple business and just use the value itself?\n\
    \nIt all depends on the problem you are solving.\n\nIf you are asked to provide\
    \ a tuple containing all prime numbers that are also even, you must provide the\
    \ tuple (2,) since 2 is the only even prime number. The value 2 isn't a good solution\
    \ because it isn't a tuple.\n\nThis might seem overly pedantic, but programming\
    \ often involves a certain amount of pedantry. Computers are, after all, the ultimate\
    \ pedants.\n\n## The tuple() Built-In\n\nYou can also use the `tuple()` built-in\
    \ to create a tuple from another sequence type, such as a string:\n\n```\n>>>\
    \ tuple(\"Python\")\n('P', 'y', 't', 'h', 'o', 'n')\n```\n\n`tuple()` only accepts\
    \ a single parameter, so you can't just list the values you want in the tuple\
    \ as individual arguments. If you do, Python raises a `TypeError`:\n\n```\n>>>\
    \ tuple(1, 2, 3)\nTraceback (most recent call last):\n  File \"<pyshell#0>\",\
    \ line 1, in <module>\n    tuple(1, 2, 3)\nTypeError: tuple expected at most 1\
    \ arguments, got 3\n```\n\nYou will also get a `TypeError` if the argument passed\
    \ to `tuple()` can't be interpreted as a list of values:\n\n```\n>>> tuple(1)\n\
    Traceback (most recent call last):\n  File \"<pyshell#1>\", line 1, in <module>\n\
    \    tuple(1)\nTypeError: 'int' object is not iterable\n```\n\nThe word **iterable**\
    \ in the error message indicates that a single integer can't be **iterated**,\
    \ which is to say that the integer data type doesn't contain multiple values that\
    \ can be accessed one-by-one.\n\nThe single parameter of `tuple()` is optional,\
    \ though, and leaving it out produces an empty tuple:\n\n```\n>>> tuple()\n()\n\
    ```\n\nHowever, most Python programmers prefer to use the shorter `()` for creating\
    \ an empty tuple.\n\n## Similarities Between Tuples and Strings\n\nTuples and\
    \ strings have a lot in common. Both are sequence types with a finite length,\
    \ support indexing and slicing, are immutable, and can be iterated over in a loop.\n\
    \nThe main difference between strings and tuples is that the elements of tuples\
    \ can be any kind of value you like, whereas strings can only contain characters.\n\
    \nLet's look at some of the parallels between strings in tuples in more depth.\n\
    \n## Tuples Have a Length\n\nBoth strings and tuples have a **length**. The length\
    \ of a string is the number of characters in it. The length of a tuple is the\
    \ number of elements it contains.\n\nJust like strings, the `len()` function can\
    \ be used to determine the length of a tuple:\n\n```\n>>> numbers = (1, 2, 3)\n\
    >>> len(numbers)\n3\n```\n\n## Tuples Support Indexing and Slicing\n\nRecall from\
    \ Chapter 4 that you can access a character in a string using index notation:\n\
    \n```\n>>> name = \"David\"\n>>> name[1]\n'a'\n```\n\nThe index notation `[1]`\
    \ after the variable `name` tells Python to get the character at index 1 in the\
    \ string \"David\". Since counting starts at 0, the character at index 1 is the\
    \ letter \"a\".\n\nTuples also support index notation:\n\n```\n>>> values = (1,\
    \ 3, 5, 7, 9)\n>>> values[2]\n5\n```\n\nAnother feature that strings and tuples\
    \ have in common is slicing. Recall that you can extract a substring from a string\
    \ using slicing notation:\n\n```\n>>> name = \"David\"\n>>> name[2:4]\n\"vi\"\n\
    ```\n\nThe slice notation `[2:4]` after the variable `name` creates a new string\
    \ containing the characters in `name` starting at position 2 and up to, but not\
    \ including, the character at position 4.\n\nSlicing notation also works with\
    \ tuples:\n\n```\n>>> values = (1, 3, 5, 7, 9)\n>>> values[2:4]\n(5, 7)\n```\n\
    \nThe slice `values[2:4]` creates a new tuple containing the all integers in `values`\
    \ starting at position 2 and up to, but not including, the integer at position\
    \ 4.\n\nThe same rules governing string slices also apply to tuple slices. You\
    \ may want to take some time to review the slicing examples in Chapter 4 with\
    \ some of your own examples of tuples.\n\n## Tuples Are Immutable\n\nLike strings,\
    \ tuples are immutable. This means you can't change the value of an element of\
    \ a tuple once it has been created.\n\nIf you do try to change the value at some\
    \ index of a tuple, Python will raise a `TypeError`:\n\n```\n>>> values[0] = 2\n\
    Traceback (most recent call last):\n  File \"<pyshell#1>\", line 1, in <module>\n\
    \    values[0] = 2\nTypeError: 'tuple' object does not support item assignment\n\
    ```\n\n> **Note**\n\nAlthough tuples are immutable, there are some situations\
    \ in which the values in a tuple can change.\n\nThese quirks and oddities are\
    \ covered in depth in Real Python's [Immutability in Python](https://realpython.com/immutable-python/)\
    \ video course.\n\n## Tuples Are Iterable\n\nJust like strings, tuples are **iterable**,\
    \ so you can loop over them:\n\n```\n>>> vowels = (\"a\", \"e\", \"i\", \"o\"\
    , \"u\")\n>>> for vowel in vowels:\n...     print(vowel.upper())\n...\nA\nE\n\
