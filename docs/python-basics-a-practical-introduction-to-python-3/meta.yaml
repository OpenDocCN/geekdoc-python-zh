    \ to display text in it that reads \"What is your name?\".\n\nLeave feedback on\
    \ this section »\n\n## 18.6 Controlling Layout With Geometry Managers\n\nUp until\
    \ now, you've been adding widgets to windows and `Frame` widgets using the `.pack()`\
    \ method, but you haven't been told what exactly this method does. Let's clear\
    \ things up!\n\nApplication layout in Tkinter is controlled with **geometry managers**.\
    \ `.pack()` is an example of a geometry manager, but it isn't the only one. Tkinter\
    \ has two others: `.place()` and `.grid()`.\n\nEach window and `Frame` in your\
    \ application can use only one geometry manager. However, different frames can\
    \ use different geometry managers, even if they are assigned to a frame or window\
    \ using another geometry manager.\n\nLet's start by taking a closer look at `.pack()`.\n\
    \n### The `.pack()` Geometry Manager\n\n`.pack()` uses a **packing algorithm**\
    \ to place widgets in a `Frame` or window in a specified order. The packing algorithm\
    \ has two primary steps. For a given widget, the algorithm:\n\n1.  Computes a\
    \ rectangular area, called a **parcel**, that is just tall (or wide) enough to\
    \ hold the widget and fills the remaining width (or height) in the window with\
    \ blank space.\n2.  Centers the widget in the parcel, unless a different location\
    \ is specified.\n\n`.pack()` is powerful, but can be difficult to visualize. The\
    \ best way to get a feel for `.pack()` is to look at some examples.\n\nLet's see\
    \ what happens when you `.pack()` three Label widgets into a Frame:\n\n```python\n\
    import tkinter as tk\n\nwindow = tk.Tk()\n\nframe1 = tk.Frame(master=window, width=100,\
    \ height=100, bg=\"red\")\nframe1.pack()\n\nframe2 = tk.Frame(master=window, width=50,\
    \ height=50, bg=\"yellow\")\nframe2.pack()\n\nframe3 = tk.Frame(master=window,\
    \ width=25, height=25, bg=\"blue\")\nframe3.pack()\n\nwindow.mainloop()\n```\n\
    \nBy default, `.pack()` places each Frame below the previous one, in the order\
    \ that they are assigned to the window:\n\n![](img/4efa9a991b645f75be61871447c559ca_589_0.png)\n\
    \nEach `Frame` is placed at the top-most available position. The red `Frame` is\
    \ placed at the top of the window. Then the yellow `Frame` is placed just below\
    \ the red one, and the blue `Frame` just below the yellow one.\n\nThere are three\
    \ invisible parcels containing each of the three `Frame` widgets. Each parcel\
    \ is as wide as the window and as tall as the `Frame` that it contains. Since\
    \ no anchor point was specified when `.pack()` was called for each `Frame`, they\
    \ are all centered inside of their parcels. That's why each `Frame` is centered\
    \ in the window.\n\n`.pack()` accepts some keyword arguments for more precisely\
    \ configuring widget placement. For example, you can set the `fill` keyword argument\
    \ to specify which direction the frames should fill. The options are `tk.X` to\
    \ fill in the horizontal direction, `tk.Y` to fill vertically, and `tk.BOTH` to\
    \ fill in both directions.\n\nHere's how you would stack the three frames so that\
    \ each one fills the whole window horizontally:\n\n```python\nimport tkinter as\
    \ tk\n\nwindow = tk.Tk()\n\nframe1 = tk.Frame(master=window, height=100, bg=\"\
    red\")\nframe1.pack(fill=tk.X)\n\nframe2 = tk.Frame(master=window, height=50,\
    \ bg=\"yellow\")\nframe2.pack(fill=tk.X)\n\nframe3 = tk.Frame(master=window, height=25,\
    \ bg=\"blue\")\nframe3.pack(fill=tk.X)\n\nwindow.mainloop()\n```\n\nNotice that\
    \ the `width` is not set on any of the `Frame` widgets. `width` is no longer necessary\
    \ because the `.pack()` method on each frame is set to fill horizontally, overriding\
    \ any width you may set.\n\nThe window produced by this script looks like this:\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_591_0.png)\n\nOne of the nice things\
    \ about filling the window with `.pack()` is that the fill is responsive to window\
    \ resizing. Try widening the window generated by the previous script to see how\
    \ this works.\n\nAs you widen the window, the width of the three `Frame` widgets\
    \ grow to fill the window. Notice, though, that the `Frame` widgets do not expand\
    \ in the vertical direction.\n\nThe `side` keyword argument of `.pack()` specifies\
    \ on which side of the window the widget should be placed. The available options\
    \ are `tk.TOP`, `tk.BOTTOM`, `tk.LEFT`, and `tk.RIGHT`. If you do not set `side`,\
    \ `.pack()` automatically used `tk.TOP` and places new widgets at the top of the\
    \ window, or at the top-most portion of the window that isn't already occupied\
    \ by a widget.\n\nFor example, the following script places three frames side by\
    \ side from left to right and expands each frame to fill the window vertically:\n\
    \n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\n\nframe1 = tk.Frame(master=window,\
    \ width=200, height=100, bg=\"red\")\nframe1.pack(fill=tk.Y, side=tk.LEFT)\n\n\
    frame2 = tk.Frame(master=window, width=100, bg=\"yellow\")\nframe2.pack(fill=tk.Y,\
    \ side=tk.LEFT)\n\nframe3 = tk.Frame(master=window, width=50, bg=\"blue\")\nframe3.pack(fill=tk.Y,\
    \ side=tk.LEFT)\n\nwindow.mainloop()\n```\n\nThis time, you have to specify the\
    \ `height` keyword argument on at least one of the frames to force the window\
    \ to have some height.\n\nThe resulting window looks like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_592_0.png)\n\
    \nJust like setting `fill=tk.X` made the frames resize responsively when the window\
    \ is resized horizontally, setting `fill=tk.Y` makes the frames resize responsively\
    \ when the window is resized vertically. Try it out!\n\nTo make the layout truly\
    \ responsive, you can set an initial size for your frames using the `width` and\
