    Sometimes `round()` doesn''t get the answer quite right:


    ```

    >>> # Expected value: 2.68

    >>> round(2.675, 2)

    2.67

    ```


    2.675 is a tie because it lies exactly halfway between the numbers 2.67 and 2.68.
    Since Python rounds ties to the nearest even number, you would expect `round(2.675,
    2)` to return 2.68, but it returns 2.67 instead. This error is a result of floating-point
    representation error, and isn''t a bug in the `round()` function.


    Dealing with floating-point numbers can be frustrating, but this frustration isn''t
    specific to Python. All languages that implement the IEEE floating-point standard
    have the same issues, including C/C++, Java, and JavaScript.


    In most cases, though, the little errors encountered with floating-point numbers
    are negligible, and the results of `round()` are perfectly useful.


    # The abs() Function


    The **absolute value** of a number *n* is just *n* if *n* is positive, and -*n*
    if *n* is negative. For example, the absolute value of 3 is 3, while the absolute
    value of -5 is 5.


    To get the absolute value of a number in Python, you use the `abs()` function:


    ```

    >>> abs(3)

    3


    >>> abs(-5.0)

    5.0

    ```'
  - '[PAGE 124]


    abs() always returns a positive number of the same type as its argument. That
    is, the absolute value of an integer is always a positive integer, and the absolute
    value of a float is always a positive float.


    # The pow() Function


    In section 5.2, you learned how to raise a number to a power using the ** operator.
    You can also use the pow() function. pow() takes two arguments. The first is the
    **base**, that is the number to be raised to a power, and the second argument
    is the **exponent**.


    For example, the following uses pow() to raise 2 to the exponent 3:


    ```

    >>> pow(2, 3)

    8

    ```


    Just like **, the exponent in pow() can be negative:


    ```

    >>> pow(2, -2)

    0.25

    ```


    So, what''s the difference between ** and pow()? The pow() function accepts an
    optional third argument that computes the first number raised to the power of
    the second number and then takes the modulo with respect to the third number.


    In other words, pow(x, y, z) is equivalent to (x ** y) % z. Here''s an example
    with x = 2, y = 3, and z = 2:


    ```

    >>> pow(2, 3, 2)

    0

    ```


    First, 2 is raised to the power 3 to get 8. Then 8 % 2 is calculated, which is
    0 because 2 divides 8 with no remainder.


