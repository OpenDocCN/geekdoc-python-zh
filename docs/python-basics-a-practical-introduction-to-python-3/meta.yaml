    SyntaxError: invalid syntax\n```\n\n上述脚本的输出是：\n\n```\nYou did not pass the class\
    \ :(\nThank you for attending.\n```\n\n即使执行了 `else` 之后的缩进代码块，打印 \"Thank you for\
    \ attending.\" 的那一行仍然会运行。\n\n如果你只需要测试一个恰好有两种状态的条件，`if` 和 `else` 关键字可以很好地协同工作。\n\
    \n有时，你需要检查三个或更多条件。为此，你可以使用 `elif`。\n\n## `elif` 关键字\n\n`elif` 关键字是 \"else if\"\
    \ 的缩写，可用于在 `if` 语句之后添加额外的条件。\n\n与 `if` 语句一样，`elif` 语句有三个部分：\n\n1. `elif` 关键字\n\
    2. 一个测试条件，后跟一个冒号\n3. 一个缩进的代码块，如果测试条件求值为 `True`，则执行该代码块\n\n> **重要提示**\n\n如果 `elif`\
    \ 语句末尾漏掉了冒号（`:`），将会引发 `SyntaxError`：\n\n```python\n>>> if 2 + 2 == 5:\n...   \
    \  print(\"Who broke my math?\")\n... elif 2 + 2 == 4\nSyntaxError: invalid syntax\n\
    ```\n\n以下脚本结合使用 `if`、`elif` 和 `else` 来打印学生在课程中获得的字母等级：\n\n```python\ngrade = 85\
    \  # 1\n\nif grade >= 90:  # 2\n    print(\"You passed the class with a A.\")\n\
