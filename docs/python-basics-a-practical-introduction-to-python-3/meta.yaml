    In general, the following format is the most explicit:


    ```

    import <package>.<module>

    ```


    Then, to access names from module, you need to type something like the following


    ```

    <package>.<module>.<name>

    ```


    When you encounter names that are used from the imported module, there is no question
    where those names come from. But sometimes package and module names are long,
    and you find yourself typing <package>.<module> over and over again in your code.


    The following format allows you to skip the package name and import just the module
    name into the calling module’s namespace:


    ```

    from <package> import <module>

    ```


    Now you can just type <module>.<name> to access some name from the module. While
    this no longer tells you from which package the name comes from, it does keep
    the context of the module apparent.


    Finally, the following format is generally ambiguous and should only be used when
    there is no risk of importing a name from a module that clashes with a name in
    the calling module:


    ```

    from <package>.<module> import <name>

    ```


