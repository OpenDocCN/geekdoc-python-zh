    要从整个 PDF 中提取所有文本，你需要一种方法来遍历文档中的所有页面。


    每个 `PdfFileReader` 对象都有一个 `.pages` 属性，用于访问 PDF 中每一页的 `PageObject` 对象的可迭代对象。这个可迭代对象是有序的，因此第一个
