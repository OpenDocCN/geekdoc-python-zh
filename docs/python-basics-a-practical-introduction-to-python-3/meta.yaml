    \n[为此部分提供反馈 »](https://realpython.com/python-basics/resources)\n\n## 3.3 创建变量\n\
    \n在 Python 中，**变量**是可以被赋值并在整个代码中用于引用该值的名称。变量是编程的基础，原因有二：\n\n1.  **变量保持值的可访问性：**\
    \ 例如，某个耗时操作的结果可以被赋值给一个变量，这样就不需要每次使用结果时都执行该操作。\n2.  **变量赋予值上下文：** 数字 28 可能意味着很多不同的事情，比如班级的学生人数，或者用户访问网站的次数等等。将值\
    \ 28 命名为 `num_students` 之类的名称可以使值的含义清晰明了。\n\n在本节中，你将学习如何在代码中使用变量，以及 Python 程序员在为变量选择名称时遵循的一些惯例。\n\
    \n## 赋值运算符\n\n值使用一个称为**赋值运算符**的特殊符号 = 赋值给变量。**运算符**是一个符号，如 = 或 +，它对一个或多个值执行某些操作。\n\
    \n例如，+ 运算符接受两个数字，一个在运算符左边，一个在运算符右边，并将它们相加。同样，= 运算符接受运算符右边的一个值，并将其赋值给运算符左边的名称。\n\
    \n为了看看赋值运算符的实际作用，让我们修改你在上一节看到的 \"Hello, world\" 程序。这次，我们将在将其打印到屏幕之前使用一个变量来存储一些文本：\n\
    \n```\n>>> phrase = \"Hello, world\"\n>>> print(phrase)\nHello, world\n```\n\n\
    在第一行，使用 = 运算符创建了一个名为 `phrase` 的变量，并为其赋值 \"Hello, world\"。原本在 `print()` 函数括号内使用的字符串\
    \ \"Hello, world\" 被变量 `phrase` 替换。\n\n当你执行 `print(phrase)` 时，会显示输出 `Hello, world`，因为\
    \ Python 查找名称 `phrase` 并发现它已被赋值为 \"Hello, world\"。\n\n如果你在执行 `print(phrase)` 之前没有执行\
    \ `phrase = \"Hello, world\"`，你就会看到一个 `NameError`，就像你在上一节尝试执行 `print(Hello, world)`\
    \ 时看到的那样。\n\n> **注意**\n\n虽然 = 看起来像数学中的等号，但它在 Python 中具有不同的含义。区分 = 运算符和等号很重要，这可能是初学程序员感到沮丧的一个原因。\n\
    \n只需记住，每当你看到 = 运算符时，它右边的任何内容都会被赋值给左边的变量。\n\n变量名**区分大小写**，因此名为 `phrase` 的变量与名为\
    \ `Phrase` 的变量（注意大写的 P）是不同的。例如，以下代码会产生一个 `NameError`：\n\n```\n>>> phrase = \"\
    Hello, world\"\n>>> print(Phrase)\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nNameError: name 'Phrase' is not defined\n\
    ```\n\n当你在本书的代码示例中遇到问题时，请务必仔细检查代码中的每个字符（包括空格）是否与示例完全匹配。计算机无法使用常识来解释你想要说什么，所以*几乎*正确不会让计算机做正确的事情！\n\
    \n## 有效变量名的规则\n\n变量名可以任意长或任意短，但你必须遵循几条规则。变量名只能包含大写和小写字母（A-Z，a-z）、数字（0-9）和下划线（_）。但是，变量名不能以数字开头。\n\
    \n例如，`phrase`、`string1`、`_a1p4a` 和 `list_of_names` 都是有效的变量名，但 `91lives` 不是。\n\n\
    > **注意**\n\nPython 变量名可以包含许多不同的有效 Unicode 字符。**Unicode** 是一个用于数字化表示世界上大多数书写系统中文本的标准。\n\
    \n这意味着变量名可以包含非英文字母表中的字母，例如带装饰的字母 é 和 ü，甚至中文、日文和阿拉伯文符号。\n\n但是，并非每个系统都能显示带装饰的字符，因此如果你的代码将与许多不同地区的人共享，最好避免使用它们。\n\
    \n你可以在 [Wikipedia](https://en.wikipedia.org/wiki/Unicode) 上了解更多关于 Unicode 的信息。Python\
    \ 对 Unicode 的支持在 [Python 官方文档](https://docs.python.org/3/howto/unicode.html) 中有介绍。\n\
    \n仅仅因为一个变量名是有效的，并不一定意味着它是一个好名字。为变量选择一个好名字可能出奇地困难。然而，你可以遵循一些指导原则来帮助你选择更好的名字。\n\n\
    ## 描述性名称优于简短名称\n\n描述性的变量名至关重要，尤其是在复杂的程序中。通常，描述性名称需要使用多个单词。不要害怕使用长变量名。\n\n在下面的例子中，值\
