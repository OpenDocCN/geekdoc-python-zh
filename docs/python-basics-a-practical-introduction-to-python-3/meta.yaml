    # 12.3. Common File System Operations


    The problem is that the directory `folder_a/` does not exist. Typically, to create
    a directory, all of the parent directories of the target directory `folder_b/`
    in the path must already exist.


    To create any parent directories needed in order to create the target directory,
    set the optional `parents` parameter of `.mkdir()` to `True`:


    ```

    >>> nested_dir.mkdir(parents=True)

    ```


    Now `.mkdir()` creates the parent directory `folder_a/` so that the target directory
    `folder_b/` can be created.


    By putting all of this together you get the following common pattern for creating
    directories:


    ```

    path.mkdir(parents=True, exist_ok=True)

    ```


    By setting both the `parents` and `exist_ok` parameters to `True`, the entire
    path is created, if needed, and no exception is raised if the path already exists.


    This pattern is useful, but it may not always be what you want. For example, if
    the path is input by a user, you may wish to instead catch an exception so that
    you can ask the user to verify that the path they entered is correct. They might
    have just mistyped a directory name!


    Now let''s look at how to create files. Create a new `Path` object called `file_path`
    for the path `new_directory/file1.txt`:


    ```

    >>> file_path = new_dir / "file1.txt"

    ```


    There is no file in `new_directory/` called `file1.txt`, so the path doesn''t
    exist yet:


    ```

    >>> file_path.exists()

    False

    ```


    You can create the file using the `Path.touch()` method:'
