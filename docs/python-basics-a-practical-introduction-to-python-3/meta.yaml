- md: '## 5.1. Integers and Floating-Point Numbers


    The first example is straightforward. Just type a 1 followed by six zeros. The
    downside to this notation is that large numbers can be difficult to read.


    When you write large numbers by hand, you probably group digits into groups of
    three, separated by a comma. 1,000,000 is a lot easier to read than 1000000.


    In Python, you can''t use commas to group digits in integer literals, but you
    can use an underscore (_). The value 1_000_000 expresses one million in a more
    readable manner.


    There is no limit to how large an integer can be, which might be surprising considering
    computers have finite memory. Try typing the largest number you can think of into
    IDLE''s interactive window. Python can handle it with no problem!


    ## Floating-Point Numbers


    A **floating-point number**, or **float** for short, is a number with a decimal
    place. 1.0 is a floating-point number, as is -2.75. The name of a floating-point
    data type is float:


    ```

    >>> type(1.0)

    <class ''float''>

    ```


    Floats can be created by typing a number directly into your code, or by using
    the float() function. Like int(), float() can be used to convert a string containing
    a number to a floating-point number:


    ```

    >>> float("1.25")

    1.25

    ```


    A **floating-point literal** is a floating-point value that is written explicitly
    in your code. 1.25 is a floating-point literal, while float("1.25") is not.


    Floating-point literals can be created in three different ways. Each of the following
    creates a floating-point literal with a value of one million:


    ```

    >>> 1000000.0

    1000000.0


    >>> 1_000_000.0

    1000000.0


    >>> 1e6

    1000000.0

    ```


    The first two ways are similar to the two methods for creating integer literals
    that you saw earlier. The second method, which uses underscores to separate digits
    into groups of three, is useful for creating float literals with lots of digits.


    For really large numbers, you can use **E-notation**. The third method in the
    previous example uses E-notation to create a float literal.


    To write a float literal in E-notation, type a number followed by the letter e
    and then another number. Python takes the number to the left of the e and multiplies
    by 10 raised to the power of the number after the e. So 1e6 is equivalent to 1×10⁶.


    > **Note**


    E-notation is short for **exponential notation**, and is the more common name
    for how many calculators and programming languages display large numbers.


    Python also uses E-notation to display large floating point numbers:


    ```

    >>> 200000000000000000.0

    2e+17

    ```


    The float 200000000000000000.0 gets displayed as 2e+17. The + sign indicates that
    the exponent 17 is a positive number. You can also use negative numbers as the
    exponent:


    ```

    >>> 1e-4

    0.0001

    ```


    The literal `1e-4` is interpreted as 10 raised to the power -4, which is 1/10000
    or, equivalently, 0.0001.


    Unlike integers, floats do have a maximum size. The maximum floating-point number
    depends on your system, but something like `2e400` ought to be well beyond most
    machines'' capabilities. `2e400` is $2\times10^{400}$, which is far more than
    the [total number of atoms in the universe](https://en.wikipedia.org/wiki/Observable_universe#Matter_content)!


    When you reach the maximum floating-point number, Python returns a special float
    value `inf`:


    ```

    >>> 2e400

    inf

    ```


    `inf` stands for infinity, and it just means that the number you''ve tried to
    create is beyond the maximum floating-point value allowed on your computer. The
    type of `inf` is still float:


    ```

    >>> n = 2e400

    >>> n

    inf

    >>> type(n)

    <class ''float''>

    ```


    There is also `-inf` which stands for negative infinity, and represents a negative
    floating-point number that is beyond the minimum floating-point number allowed
    on your computer:


    ```

    >>> -2e400

    -inf

    ```


    You probably won''t come across `inf` and `-inf` often as a programmer, unless
    you regularly work with extremely large numbers.


    ## Review Exercises


    You can find the solutions to these exercises and many other bonus resources online
    at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).


    1. Write a script that creates the two variables, `num1` and `num2`. Both `num1`
    and `num2` should be assigned the integer literal 25,000,000, one written with
    underscored and one without. Print `num1` and `num2` on two separate lines.

    2. Write a script that assigns the floating-point literal 175000.0 to the variable
    `num` using exponential notation, and then prints `num` in the interactive window.

    3. In IDLE’s interactive window, try and find the smallest exponent N so that
    2e<N>, where <N> is replaced with your number, returns `inf`.


    [Leave feedback on this section »](https://realpython.com/python-basics/resources)


    ## 5.2 Arithmetic Operators and Expressions


    In this section, you’ll learn how to do basic arithmetic with numbers in Python,
    such as addition, subtraction, multiplication, and division. Along the way, you’ll
    learn some conventions for writing mathematical expressions in code.


    ## Addition


    Addition is performed with the `+` operator:


    ```

    >>> 1 + 2

    3

    ```


    The two numbers on either side of the `+` operator are called **operands**. In
    the previous example, both operands are integers, but operands do not need to
    be the same type. You can add an `int` to a `float` with no problem:


    ```

    >>> 1.0 + 2

    3.0

    ```


    Notice that the result of `1.0 + 2` is `3.0`, which is a `float`. Any time a `float`
    is added to a number, the result is another `float`. Adding two integers together
    always results in an `int`.


    > **Note**


    PEP 8 recommends separating both operands from an operator with a space.


    Python can evaluate `1+1` just fine, but `1 + 1` is the preferred format because
    it''s generally considered easier to read. This rule of thumb applies to all of
    the operators in this section.


    ## Subtraction


    To subtract two numbers, just put a `-` in between them:


    ```

    >>> 1 - 1

    0


    >>> 5.0 - 3

    2.0

    ```


    Just like adding two integers, subtracting two integers always results in an `int`.
    Whenever one of the operands is a `float`, the result is also a `float`.


    The `-` operator is also used to denote negative numbers:


    ```

    >>> -3

    -3

    ```


    You can subtract a negative number from another number, but as you can see below,
    this can sometimes look confusing:


    ```

    >>> 1 - -3

    4


    >>> 1 --3

    4


    >>> 1- -3

    4


    >>>1--3

    4

    ```


    Of the four examples above, the first is the most PEP 8 compliant. That said,
    you can surround -3 with parentheses to make it even clearer that the second -
    is modifying 3:


    ```

    >>> 1 - (-3)

    4

    ```


    Using parentheses is a good idea because it makes the code more explicit. Computers
    execute code, but humans read code. Anything you can do to make your code easier
    to read and understand is a good thing.


    ## Multiplication


    To multiply two numbers, use the * operator:


    ```

    >>> 3 * 3

    9


    >>> 2 * 8.0

    16.0

    ```


    The type of number you get from multiplication follows the same rules as addition
    and subtraction. Multiplying two integers results in an `int`, and multiplying
    a number with a `float` results in a `float`.


    ## Division


    The / operator is used to divide two numbers:


    ```

    >>> 9 / 3

    3.0


    >>> 5.0 / 2

    2.5

    ```


    Unlike addition, subtraction, and multiplication, division with the / operator
    always returns a float. If you want to make sure that you get an integer after
    dividing two numbers, you can use int() to convert the result:


    ```

    >>> int(9 / 3)

    3

    ```


    Keep in mind that int() discards any fractional part of the number:


    ```

    >>> int(5.0 / 2)

    2

    ```


    5.0 / 2 returns the float 2.5, and int(2.5) returns the integer 2 with the .5
    part removed.


    ## Integer Division


    If writing int(5.0 / 2) seems a little long-winded to you, Python provides a second
    division operator, //, called the integer division operator:


    ```

    >>> 9 // 3

    3


    >>> 5.0 // 2

    2.0

    ```'
  mdcn: '## 5.1. 整数与浮点数


    第一个例子很简单。只需输入一个1后面跟着六个零。这种表示法的缺点是大数字可能难以阅读。


    当你手写大数字时，你可能会将数字分成每三位一组，用逗号分隔。1,000,000 比 1000000 容易阅读得多。


    在Python中，你不能在整数字面量中使用逗号来分组数字，但你可以使用下划线（_）。值 1_000_000 以更易读的方式表示一百万。


    整数可以有多大是没有限制的，考虑到计算机内存有限，这可能令人惊讶。尝试在IDLE的交互式窗口中输入你能想到的最大数字。Python可以毫无问题地处理它！


    ## 浮点数


    **浮点数**，简称**float**，是带有小数点的数字。1.0 是一个浮点数，-2.75 也是。浮点数据类型的名称是 float：


    ```

    >>> type(1.0)

    <class ''float''>

    ```


    浮点数可以通过直接在代码中输入数字或使用 float() 函数来创建。像 int() 一样，float() 可用于将包含数字的字符串转换为浮点数：


    ```

    >>> float("1.25")

    1.25

    ```


    **浮点字面量**是在代码中明确写出的浮点值。1.25 是一个浮点字面量，而 float("1.25") 不是。


    浮点字面量可以用三种不同的方式创建。以下每种方式都创建一个值为一百万的浮点字面量：


    ```

    >>> 1000000.0

    1000000.0


    >>> 1_000_000.0

    1000000.0


    >>> 1e6

    1000000.0

    ```


    前两种方式类似于你之前看到的创建整数字面量的两种方法。第二种方法使用下划线将数字分成每三位一组，对于创建包含大量数字的浮点字面量很有用。


    对于非常大的数字，你可以使用**E表示法**。上一个例子中的第三种方法使用E表示法创建浮点字面量。


    要用E表示法编写浮点字面量，请输入一个数字，后跟字母e，然后是另一个数字。Python将e左边的数字乘以10的e后面数字次幂。所以 1e6 等于 1×10⁶。


    > **注意**


    E表示法是**指数表示法**的缩写，是许多计算器和编程语言显示大数字的更常见名称。


    Python也使用E表示法来显示大浮点数：


    ```

    >>> 200000000000000000.0

    2e+17

    ```


    浮点数 200000000000000000.0 显示为 2e+17。+号表示指数17是一个正数。你也可以使用负数作为指数：


    ```

    >>> 1e-4

    0.0001

    ```


    字面量 `1e-4` 被解释为10的-4次幂，即1/10000或等效地，0.0001。


    与整数不同，浮点数确实有最大大小。最大浮点数取决于你的系统，但像 `2e400` 这样的值应该远远超出大多数机器的能力。`2e400` 是 $2\times10^{400}$，这远远超过了[宇宙中原子的总数](https://en.wikipedia.org/wiki/Observable_universe#Matter_content)！


    当你达到最大浮点数时，Python返回一个特殊的浮点值 `inf`：


    ```

    >>> 2e400

    inf

    ```


    `inf` 代表无穷大，它只是意味着你尝试创建的数字超出了你的计算机上允许的最大浮点值。`inf` 的类型仍然是 float：


    ```

    >>> n = 2e400

    >>> n

    inf

    >>> type(n)

    <class ''float''>

    ```


    还有 `-inf`，代表负无穷大，表示一个超出你的计算机上允许的最小浮点数的负浮点数：


    ```

    >>> -2e400

    -inf

    ```


    作为程序员，你可能不会经常遇到 `inf` 和 `-inf`，除非你经常处理极大的数字。


    ## 复习练习


    你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)
    找到这些练习的解决方案和许多其他额外资源。


    1. 编写一个脚本，创建两个变量 `num1` 和 `num2`。`num1` 和 `num2` 都应被赋值为整数字面量 25,000,000，一个使用下划线编写，另一个不使用。在两行上分别打印
    `num1` 和 `num2`。

    2. 编写一个脚本，使用指数表示法将浮点字面量 175000.0 赋值给变量 `num`，然后在交互式窗口中打印 `num`。

    3. 在IDLE的交互式窗口中，尝试找到最小的指数N，使得 2e<N>（其中 <N> 替换为你的数字）返回 `inf`。


    [为此部分提供反馈 »](https://realpython.com/python-basics/resources)


    ## 5.2 算术运算符与表达式


    在本节中，你将学习如何在Python中对数字进行基本算术运算，如加法、减法、乘法和除法。在此过程中，你将学习一些在代码中编写数学表达式的约定。


    ## 加法


    加法使用 `+` 运算符执行：


    ```

    >>> 1 + 2

    3

    ```


    `+` 运算符两侧的两个数字称为**操作数**。在前面的例子中，两个操作数都是整数，但操作数不需要是相同的类型。你可以将 `int` 加到 `float`
    上而没有问题：


    ```

    >>> 1.0 + 2

    3.0

    ```


    注意 `1.0 + 2` 的结果是 `3.0`，这是一个 `float`。任何时候将 `float` 加到一个数字上，结果都是另一个 `float`。将两个整数相加总是得到一个
    `int`。


    > **注意**


    PEP 8 建议在运算符两侧都用空格分隔操作数。


    Python可以很好地计算 `1+1`，但 `1 + 1` 是首选格式，因为它通常被认为更容易阅读。这个经验法则适用于本节中的所有运算符。


    ## 减法


    要减去两个数字，只需在它们之间放一个 `-`：


    ```

    >>> 1 - 1

    0


    >>> 5.0 - 3

    2.0

    ```


    就像将两个整数相加一样，将两个整数相减总是得到一个 `int`。只要其中一个操作数是 `float`，结果也是 `float`。


    `-` 运算符也用于表示负数：


    ```

    >>> -3

    -3

    ```


    你可以从一个数字中减去一个负数，但正如你下面所看到的，这有时可能看起来令人困惑：


    ```

    >>> 1 - -3

    4


    >>> 1 --3

    4


    >>> 1- -3

    4


    >>>1--3

    4

    ```


    在上面的四个例子中，第一个最符合PEP 8。也就是说，你可以用括号将 -3 括起来，以更清楚地表明第二个 - 正在修改 3：


    ```

    >>> 1 - (-3)

    4

    ```


    使用括号是个好主意，因为它使代码更明确。计算机执行代码，但人类阅读代码。任何你能做的使你的代码更容易阅读和理解的事情都是好事。


    ## 乘法


    要将两个数字相乘，使用 * 运算符：


    ```

    >>> 3 * 3

    9


    >>> 2 * 8.0

    16.0

    ```


    从乘法得到的数字类型遵循与加法和减法相同的规则。将两个整数相乘得到一个 `int`，将一个数字与一个 `float` 相乘得到一个 `float`。


    ## 除法


    / 运算符用于将两个数字相除：


    ```

    >>> 9 / 3

    3.0


    >>> 5.0 / 2

    2.5

    ```


    与加法、减法和乘法不同，使用 / 运算符的除法总是返回一个浮点数。如果你想确保在将两个数字相除后得到一个整数，你可以使用 int() 来转换结果：


    ```

    >>> int(9 / 3)

    3

    ```


    请记住，int() 会丢弃数字的任何小数部分：


    ```

    >>> int(5.0 / 2)

    2

    ```


    5.0 / 2 返回浮点数 2.5，而 int(2.5) 返回整数 2，去掉了 .5 部分。


    ## 整数除法


    如果编写 int(5.0 / 2) 对你来说似乎有点冗长，Python提供了第二个除法运算符 //，称为整数除法运算符：


    ```

    >>> 9 // 3

    3


    >>> 5.0 // 2

    2.0

    ```'
