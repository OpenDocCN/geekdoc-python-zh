    # 12.5 Reading and Writing Files


    Files are abundant in the modern world. They are the medium through with data
    is digitally stored and transferred. Chances are, you''ve opened dozens, if not
    hundreds, of files just today.


    In this section, you''ll learn how to read and write files with Python.


    # What Is a File?


    A **file** is a sequence of bytes and a **byte** is a number between 0 and 255.
    That is, a file is a sequence of integer values.


    The bytes in a file must be **decoded** into something meaningful in order to
    understand the contents of the file.


    Python has standard library modules for working with text, csv, and audio files.
    There are a number of third-party packages available for working with other file
    types.


    You''ll learn how to install third-party packages in Chapter 13: *Installing Packages
    with Pip*. You''ll also see how to work with PDF files in Chapter 14: *Creating
    and Modifying PDF Files*.


    In this section, you''ll learn how to work with plain text files.


    # Understanding Text Files


    Text files are files that contain only text. They are perhaps the easiest files
    to work with. There are two issues, though, that can be frustrating when working
    with text files:


    +   1. Character encoding

    2. Line endings


    Before jumping into reading and writing text files, let''s look at what these
    issues are so that you know how to deal with them effectively.'
  - '[PAGE 360]


    # Character Encoding


    Text files are stored on disk as a sequence of bytes. Each byte, or group of bytes
    in some cases, represents a different character in the file.


    When text files are written, characters typed on the keyboard are converted to
    bytes in a process called **encoding**. When a text file is read, the bytes are
    **decoded** back into text.


    The integer a character is associated to is determined by the file''s **character
    encoding**. There are many character encodings. Four of the most widely used character
    encodings are:


    +   1. ASCII

    2. UTF-8

    3. UTF-16

    4. UTF-32


    Some character encodings, such as ASCII and UTF-8, encode characters the same
    way. For example, numbers and English letters are encoded the same way in both
    ASCII and UTF-8.


    The difference between ASCII and UTF-8 is that UTF-8 can encode more characters
    than ASCII. ASCII can''t encode characters like ñ or ü, but UTF-8 can. This means
    you can decode ASCII encoded text with UTF-8, but you can''t always decode UTF-8
    encoded text with ASCII.'
- md: '## Important


    Serious problems may occur when different encodings are used to encode and decode
    text.


    For instance, text encoded as UTF-8 that is decoded with UTF-16 may be interpreted
    as an entirely different language than originally intended!


    For a thorough introduction to character encodings, check out Real Python’s [Unicode
    & Character Encodings in Python: A Painless Guide](https://realpython.com/python-encodings-guide/).


    Knowing what encoding a file uses is important, but it isn’t always obvious. On
    modern Windows computers, txt files are usually encoded with UTF-16 or UTF-8.
    On macOS and Ubuntu Linux, the default character encoding is usually UTF-8.


    For the remainder of this section, we’ll assume that the character encoding of
    all text files that we work with is UTF-8. If you encounter problems, you may
    need to alter the examples to use a different encoding.


    ## Line Endings


    Each line in a text file ends with one or two characters that indicate the line
    has ended. These characters aren’t usually displayed in a text editor, but they
    exist as bytes in the file data.


    The two characters used to represent line endings are the **carriage return**
    and **line feed** characters. In Python strings, these characters are represented
    by the escape sequence `\r` and `\n`, respectively.


    On Windows, line endings are represented by default with both a carriage return
    and a line feed. On macOS and most Linux distributions, line endings are represented
    with just a single line feed character.


    When you read a Windows file on macOS or Linux you will sometimes see extra blank
    lines between lines of text. This is because the carriage return also represents
    a line ending on macOS and Linux.


    For example, suppose the following text file was created in Windows:


    ```

    Pug\r\n

    Jack Russell Terrier\r\n

    English Springer Spaniel\r\n

    German Shepherd\r\n

    ```


    On macOS or Ubuntu, this file is interpreted with double spacing between lines:


    ```

    Pug\r

    \n

    Jack Russell Terrier\r

    \n

    English Springer Spaniel\r

    \n

    German Shepherd\r

    \n

    ```


    In practice, the differences between line endings on different operating systems
    is rarely problematic. Python can handle line ending conversions for you automatically,
    so you don''t have to worry about it too often.


    ## Python File Objects


    Files are represented in Python with **file objects**, which are instances of
    classes designed to work with different types of files.


    Python has a couple of different types of file objects:


    - Text file objects are used for interacting with text files.

    - Binary file objects are used for working directly with the bytes contained in
    files.


    Text file objects handle encoding and decoding bytes for you. All you need to
    do is specify which character encoding to use. On the other hand, binary file
    objects do not perform any kind of encoding or decoding.


    There are two ways to create a file object in Python:


    - The `Path.open()` method.

    - The `open()` built-in function.


    Let''s look at each of these.


    ## The `Path.open()` Method


    To use the `Path.open()` method, you first need a `Path` object. In IDLE''s interactive
    window, execute the following:


    ```

    >>> from pathlib import Path

    >>> path = Path.home() / "hello.txt"

    >>> path.touch()

    >>> file = path.open(mode="r", encoding="utf-8")

    ```


    First, a `Path` object for the `hello.txt` file is created and assigned to the
    `path` variable. Then `path.touch()` creates the file in your home directory.
    Finally, `.open()` returns a new file object representing the `hello.txt` file
    and assigns it to the `file` variable.


    Two keyword parameters used to open the file:


    - The `mode` parameter determines in which mode the file should be opened. The
    "r" argument opens the file in **read mode**.

    - The `encoding` parameter determines the character encoding used to decode the
    file. The argument "utf-8" represents the UTF-8 character encoding.


    You can inspect the `file` variable to see that it is assigned to a text file
    object:


    ```

    >>> file

    <_io.TextIOWrapper name=''C:\Users\David\hello.txt'' mode=''r'' encoding=''utf-8''>

    ```


    Text file objects are instances of the `TextIOWrapper` class. You will never need
    to instantiate this class directly, since you can create them with the `Path.open()`
    method.


    There are a number of different modes you can use to open a file. These are described
    in the following table:


    | Mode | Description |

    |---|---|

    | "r" | Creates a text file object for reading and raises an error if the file
    can''t be opened. |

    | "w" | Creates a text file object for writing and overwrites all existing data
    in the file. |

    | "a" | Creates a text file object for appending data to the end of a file. |

    | "rb" | Creates a binary file object for reading and raises an error if the file
    can''t be opened. |

    | "wb" | Creates a binary file object for writing and overwrites all existing
    data in the file. |

    | "ab" | Creates a binary file object for appending data to the end of the file.
    |


    The strings for some of the most commonly used character encodings can be found
    in the table below:


    | String | Character Encoding |

    |---|---|

    | "ascii" | ASCII |

    | "utf-8" | UTF-8 |

    | "utf-16" | UTF-16 |

    | "utf-32" | UTF-32 |


    When you create a file object with `.open()`, Python maintains a link to the file
    resource until you either explicitly tell Python to close the file, or the program
    ends.


    ## Important


    You should always explicitly tell Python to close a file.


    Forgetting to close opened files like littering. When your program stops running,
    it shouldn''t leave unnecessary waste laying around the system.


    To close a file, use the file object''s `.close()` method:


    ```

    >>> file.close()

    ```


    Using `Path.open()` is the preferred way to open a file when you have an existing
    `Path` object, but there is also a built-in function called `open()` that you
    can use to open a file.


    ## The `open()` Built-in


    The built-in `open()` function works almost exactly like the `Path.open()` method,
    except that it''s first parameter is a string containing the path the file you
    want to open.


    First, create a new variable called `file_path` and assign to it a string containing
    the path to the `hello.txt` file you created above:


    ```

    >>> file_path = "C:/Users/David/hello.txt"

    ```


    Note that you''ll need to change the path to match the path of the file on your
    own computer.


    Next, create a new file object using the `open()` built-in and assign it to the
    variable `file`:


    ```

    >>> file = open(file_path, mode="r", encoding="utf-8")

    ```


    The first parameter of `open()` must be a path string. The `mode` and `encoding`
    parameters are the same as the parameters for the `Path.open()` method. In this
    example, `mode` is set to "r" for read mode, and `encoding` is set to "utf-8".


    Just like the file object returned by `Path.open()`, the file object returned
    by `open()` is a `TextIOWrapper` instance:


    ```

    >>> file

    <_io.TextIOWrapper name=''C:/Users/David/hello.txt'' mode=''r'' encoding=''utf-8''>

    ```


    To close the file, use the file object''s `.close()` method:


    ```

    >>> file.close()

    ```


    For the most part, you''ll use the `Path.open()` method to open a file from an
    existing `pathlib.Path` object. However, if you don''t need all of the functionality
    of the `pathlib` module, then `open()` is a great way to quickly create a file
    object.


    ## The `with` Statement


    When you open a file, your program is accessing data external to the program itself.
    The operating system must manage the connection between your program and physical
    file itself. When you call a file object''s `.close()` method, the operating system
    knows to close the connection.


    If your program crashes between the time that a file is opened and when it is
    closed, the system resources maintained by the connection may continue to live
    on until the operating system realizes that it''s no longer needed.


    To ensure that file system resources are cleaned up even if a program crashes,
    you can open a file in a `with` statement. The pattern for using the `with` statement
    looks like this:'
  mdcn: '## 重要提示


    当使用不同的编码来编码和解码文本时，可能会出现严重问题。


    例如，以 UTF-8 编码的文本如果用 UTF-16 解码，可能会被解释为与原始意图完全不同的语言！


    要全面了解字符编码，请查阅 Real Python 的 [Python 中的 Unicode 与字符编码：轻松入门指南](https://realpython.com/python-encodings-guide/)。


    了解文件使用的编码很重要，但这并不总是显而易见的。在现代 Windows 计算机上，txt 文件通常使用 UTF-16 或 UTF-8 编码。在 macOS
    和 Ubuntu Linux 上，默认字符编码通常是 UTF-8。


    在本节的剩余部分，我们将假设所有处理的文本文件的字符编码都是 UTF-8。如果遇到问题，你可能需要修改示例以使用不同的编码。


    ## 行尾符


    文本文件中的每一行都以一个或两个字符结尾，表示该行已结束。这些字符通常不会在文本编辑器中显示，但它们作为字节存在于文件数据中。


    用于表示行尾的两个字符是**回车符**和**换行符**。在 Python 字符串中，这些字符分别由转义序列 `\r` 和 `\n` 表示。


    在 Windows 上，行尾默认由回车符和换行符共同表示。在 macOS 和大多数 Linux 发行版上，行尾仅由单个换行符表示。


    当你在 macOS 或 Linux 上读取 Windows 文件时，有时会在文本行之间看到额外的空行。这是因为在 macOS 和 Linux 上，回车符也表示行尾。


    例如，假设以下文本文件是在 Windows 上创建的：


    ```

    Pug\r\n

    Jack Russell Terrier\r\n

    English Springer Spaniel\r\n

    German Shepherd\r\n

    ```


    在 macOS 或 Ubuntu 上，该文件会被解释为行间有双倍间距：


    ```

    Pug\r

    \n

    Jack Russell Terrier\r

    \n

    English Springer Spaniel\r

    \n

    German Shepherd\r

    \n

    ```


    实际上，不同操作系统上行尾符的差异很少造成问题。Python 可以自动为你处理行尾转换，因此你不必经常为此担心。


    ## Python 文件对象


    文件在 Python 中用**文件对象**表示，它们是为处理不同类型文件而设计的类的实例。


    Python 有几种不同类型的文件对象：


    - 文本文件对象用于与文本文件交互。

    - 二进制文件对象用于直接处理文件中包含的字节。


    文本文件对象为你处理字节的编码和解码。你只需要指定使用哪种字符编码。另一方面，二进制文件对象不执行任何类型的编码或解码。


    在 Python 中创建文件对象有两种方式：


    - `Path.open()` 方法。

    - `open()` 内置函数。


    让我们逐一了解。


    ## `Path.open()` 方法


    要使用 `Path.open()` 方法，你首先需要一个 `Path` 对象。在 IDLE 的交互窗口中，执行以下操作：


    ```

    >>> from pathlib import Path

    >>> path = Path.home() / "hello.txt"

    >>> path.touch()

    >>> file = path.open(mode="r", encoding="utf-8")

    ```


    首先，为 `hello.txt` 文件创建一个 `Path` 对象并赋值给 `path` 变量。然后 `path.touch()` 在你的主目录中创建该文件。最后，`.open()`
    返回一个表示 `hello.txt` 文件的新文件对象，并将其赋值给 `file` 变量。


    打开文件时使用了两个关键字参数：


    - `mode` 参数决定以哪种模式打开文件。"r" 参数以**读取模式**打开文件。

    - `encoding` 参数决定用于解码文件的字符编码。参数 "utf-8" 代表 UTF-8 字符编码。


    你可以检查 `file` 变量，看到它被赋值为一个文本文件对象：


    ```

    >>> file

    <_io.TextIOWrapper name=''C:\Users\David\hello.txt'' mode=''r'' encoding=''utf-8''>

    ```


    文本文件对象是 `TextIOWrapper` 类的实例。你永远不需要直接实例化这个类，因为你可以使用 `Path.open()` 方法创建它们。


    你可以使用多种不同的模式打开文件。下表描述了这些模式：


    | 模式 | 描述 |

    |---|---|

    | "r" | 创建一个用于读取的文本文件对象，如果文件无法打开则引发错误。 |

    | "w" | 创建一个用于写入的文本文件对象，并覆盖文件中的所有现有数据。 |

    | "a" | 创建一个用于向文件末尾追加数据的文本文件对象。 |

    | "rb" | 创建一个用于读取的二进制文件对象，如果文件无法打开则引发错误。 |

    | "wb" | 创建一个用于写入的二进制文件对象，并覆盖文件中的所有现有数据。 |

    | "ab" | 创建一个用于向文件末尾追加数据的二进制文件对象。 |


    一些最常用字符编码的字符串可以在下表中找到：


    | 字符串 | 字符编码 |

    |---|---|

    | "ascii" | ASCII |

    | "utf-8" | UTF-8 |

    | "utf-16" | UTF-16 |

    | "utf-32" | UTF-32 |


    当你使用 `.open()` 创建文件对象时，Python 会维护与文件资源的链接，直到你明确告诉 Python 关闭文件，或者程序结束。


    ## 重要提示


    你应该始终明确告诉 Python 关闭文件。


    忘记关闭打开的文件就像乱扔垃圾。当你的程序停止运行时，它不应该在系统中留下不必要的废物。


    要关闭文件，请使用文件对象的 `.close()` 方法：


    ```

    >>> file.close()

    ```


    当你有一个现有的 `Path` 对象时，使用 `Path.open()` 是打开文件的首选方式，但还有一个名为 `open()` 的内置函数可用于打开文件。


    ## `open()` 内置函数


    内置的 `open()` 函数的工作方式与 `Path.open()` 方法几乎完全相同，只是它的第一个参数是一个包含要打开的文件路径的字符串。


