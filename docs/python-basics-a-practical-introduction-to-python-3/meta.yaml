    ## 4.3 使用方法操作字符串\n\n字符串附带了称为**字符串方法**的特殊函数，可用于处理和操作字符串。有众多字符串方法可用，但我们将重点介绍一些最常用的方法。\n\
    \n在本节中，你将学习如何：\n\n- 将字符串转换为大写或小写\n- 从字符串中移除空白字符\n- 确定字符串是否以特定字符开头和结尾\n\n开始吧！\n\
    \n### 转换字符串大小写\n\n要将字符串转换为全小写字母，请使用字符串的 `.lower()` 方法。这通过在字符串本身末尾添加 `.lower()`\
    \ 来实现：\n\n```\n>>> \"Jean-luc Picard\".lower()\n'jean-luc picard'\n```\n\n点号 (`.`)\
    \ 告诉 Python 后面跟的是一个方法的名称——本例中是 `lower()` 方法。\n\n> **注意**\n>\n> 我们将在字符串方法名称前加上一个点号来指代它们。因此，例如，`.lower()`\
    \ 方法写作带点号的形式，而不是 `lower()`。\n>\n> 这样做是为了更容易识别哪些函数是字符串方法，而不是像 `print()` 和 `type()`\
    \ 这样的内置函数。\n\n字符串方法不仅适用于字符串字面量。你也可以对赋值给变量的字符串使用 `.lower()` 方法：\n\n```\n>>> name\
    \ = \"Jean-luc Picard\"\n>>> name.lower()\n'jean-luc picard'\n```\n\n`.lower()`\
    \ 方法的反面是 `.upper()` 方法，它将字符串中的每个字符转换为大写：\n\n```\n>>> loud_voice = \"Can you hear\
    \ me yet?\"\n>>> loud_voice.upper()\n'CAN YOU HEAR ME YET?'\n```\n\n将 `.upper()`\
    \ 和 `.lower()` 字符串方法与你在上一节看到的通用 `len()` 函数进行比较。除了这些函数产生的不同结果外，这里的重要区别在于它们的使用方式。\n\
    \n`len()` 函数是一个独立的函数。如果你想确定 `loud_voice` 字符串的长度，你可以直接调用 `len()` 函数，如下所示：\n\n```\n\
    >>> len(loud_voice)\n20\n```\n\n另一方面，`.upper()` 和 `.lower()` 必须与字符串一起使用。它们不能独立存在。\n\
    \n### 从字符串中移除空白字符\n\n空白字符是指任何打印为空白的字符。这包括空格和**换行符**，后者是将输出移动到新行的特殊字符。\n\n有时你需要从字符串的开头或结尾移除空白字符。这在处理来自用户输入的字符串时特别有用，因为可能会意外引入额外的空白字符。\n\
    \n有三种字符串方法可用于从字符串中移除空白字符：\n\n- 1. `.rstrip()`\n- 2. `.lstrip()`\n- 3. `.strip()`\n\
    \n`.rstrip()` 从字符串的右侧移除空白字符：\n\n```\n>>> name = \"Jean-luc Picard     \"\n>>>\
    \ name\n'Jean-luc Picard     '\n>>> name.rstrip()\n'Jean-luc Picard'\n```\n\n\
    在这个例子中，字符串 \"Jean-luc Picard     \" 有五个尾随空格。当字符串被赋值给变量时，Python 不会自动移除字符串中的任何尾随空格。`.rstrip()`\
    \ 方法从字符串的右侧移除尾随空格，并返回一个不再包含末尾空格的新字符串 \"Jean-luc Picard\"。\n\n`.lstrip()` 方法的工作方式与\
    \ `.rstrip()` 类似，只是它从字符串的左侧移除空白字符：\n\n```\n>>> name = \"     Jean-luc Picard\"\
    \n>>> name\n'     Jean-luc Picard'\n>>> name.lstrip()\n'Jean-luc Picard'\n```\n\
    \n要同时从字符串的左侧和右侧移除空白字符，请使用 `.strip()` 方法：\n\n```\n>>> name = \"     Jean-luc Picard\
    \     \"\n>>> name\n'     Jean-luc Picard     '\n>>> name.strip()\n'Jean-luc Picard'\n\
    ```\n\n> **注意**\n>\n> `.rstrip()`、`.lstrip()` 和 `.strip()` 方法都不会移除字符串中间的空白字符。在前面的每个例子中，\"\
    Jean-luc\" 和 \"Picard\" 之间的空格始终被保留。\n\n### 确定字符串是否以特定字符串开头或结尾\n\n处理文本时，有时需要确定给定字符串是否以某些字符开头或结尾。你可以使用两种字符串方法来解决这个问题：`.startswith()`\
    \ 和 `.endswith()`。\n\n让我们看一个例子。考虑字符串 \"Enterprise\"。以下是如何使用 `.startswith()` 来确定字符串是否以字母\
    \ e 和 n 开头：\n\n```\n>>> starship = \"Enterprise\"\n>>> starship.startswith(\"\
    en\")\nFalse\n```\n\n你必须通过提供一个包含要搜索字符的字符串来告诉 `.startswith()` 要搜索哪些字符。因此，要确定 \"\
    Enterprise\" 是否以字母 e 和 n 开头，你调用 `.startswith(\"en\")`。这返回 False。你认为这是为什么？\n\n\
    如果你猜到 `.startswith(\"en\")` 返回 False 是因为 \"Enterprise\" 以大写字母 E 开头，那你就完全正确了！`.startswith()`\
    \ 方法是**区分大小写**的。要让 `.startswith()` 返回 True，你需要提供字符串 \"En\"：\n\n```\n>>> starship.startswith(\"\
    En\")\nTrue\n```\n\n`.endswith()` 方法用于确定字符串是否以某些字符结尾：\n\n```\n>>> starship.endswith(\"\
    rise\")\nTrue\n```\n\n就像 `.startswith()` 一样，`.endswith()` 方法也是区分大小写的：\n\n```\n\
    >>> starship.endswith(\"risE\")\nFalse\n```\n\n> **注意**\n>\n> `True` 和 `False`\
    \ 值不是字符串。它们是一种称为**布尔值**的特殊数据类型。你将在第 8 章学习更多关于布尔值的知识。\n\n### 字符串方法与不可变性\n\n回顾上一节，字符串是不可变的——一旦创建就不能更改。大多数修改字符串的字符串方法，如\
    \ `.upper()` 和 `.lower()`，实际上返回的是经过适当修改的原始字符串的副本。\n\n如果不小心，这可能会在你的程序中引入微妙的错误。在\
    \ IDLE 的交互式窗口中试试这个：\n\n```\n>>> name = \"Picard\"\n>>> name.upper()\n'PICARD'\n\
    >>> name\n'Picard'\n```\n\n当你调用 `name.upper()` 时，`name` 本身没有任何变化。如果你需要保留结果，你需要将其赋值给一个变量：\n\
