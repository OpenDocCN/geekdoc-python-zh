  md: '# 1.1. Why This Book?


    uring out *what* to learn and *in what order* to learn it.


    You may be asking yourself, “What should I learn about Python in the beginning
    to get a strong foundation?” If so, this book is for you—whether you’re a complete
    beginner or already dabbled in Python or other languages before.


    *Python Basics* is written in plain English and breaks down the core concepts
    you really need to know into bite-sized chunks. This means you’ll know “enough
    to be dangerous” with Python, fast.


    Instead of just going through a boring list of language features, you’ll see exactly
    how the different building blocks fit together and what’s involved in building
    real applications and scripts with Python.


    Step by step you’ll master fundamental Python concepts that will help you get
    started on your journey to learn Python.


    Many programming books try to cover every last possible variation of every command
    which makes it easy for readers to get lost in the details. This approach is great
    if you’re looking for a reference manual, but it’s a horrible way to learn a programming
    language. Not only do you spend most of your time cramming things into your head
    you’ll never use, it also isn’t any fun!


    This book is built on the 80/20 principle. We will cover the commands and techniques
    used in the vast majority of cases and focus on how to program real-world solutions
    to problems that will help make your life easier.


    This way, we guarantee that you will:


    +   - Learn useful programming techniques quickly

    - Spend less time struggling with unimportant complications

    - Find more practical uses for Python in your own life

    - Have more fun in the process


    Once you’ve mastered the material in this book, you will have gained'
  merge: -1
  pgno: 24
- img_proc: true
  md: 'a strong enough foundation that venturing out into more advanced territory
    on your own will be a breeze.


    So dive in! Learn to program in a widely used, free language that can do more
    than you ever thought was possible.


    # 1.2 About Real Python


    At [Real Python](https://realpython.com), you''ll learn real-world programming
    skills from a community of professional Pythonistas from all around the world.


    The [realpython.com](https://realpython.com) website launched in 2012 and currently
    helps more than two million Python developers each month with books, programming
    tutorials, and other in-depth learning resources.


    Everyone who worked on this book is a *Python practitioner* recruited from the
    Real Python team with several years of professional experience in the software
    industry.


    Here''s where you can find Real Python on the web:


    +   - [realpython.com](https://realpython.com)

    - [@realpython on Twitter](https://twitter.com/realpython)

    - [The Real Python Email Newsletter](https://realpython.com/newsletters/)


    # 1.3 How to Use This Book


    The first half of this book is a quick but thorough overview of all the Python
    fundamentals. You do not need any prior experience with programming to get started.
    The second half is focused on finding practical solutions to interesting, real-world
    coding problems.


    As a beginner, we recommend that you go through the first half of this book from
    start to end. The second half covers topics that don''t overlap as much so you
    can jump around more easily, but the chapters do increase in difficulty as you
    go along.'
  merge: -1
  pgno: 25
- img_proc: true
  md: '# 1.3. How to Use This Book


    If you are a more experienced programmer, then you may find yourself heading toward
    the second part of the book right away. But don’t neglect getting a strong foundation
    in the basics first and be sure to fill in any knowledge gaps along the way.


    Most sections within a chapter are followed by **review exercises** to help you
    make sure that you’ve mastered all the topics covered. There are also a number
    of **code challenges**, which are more involved and usually require you to tie
    together a number of different concepts from previous chapters.


    The practice files that accompany this book also include full solutions to the
    challenges as well as some of the trickier exercises. But to get the most out
    of the material, you should try your best to solve the challenge problems on your
    own before looking at the example solutions.


    If you’re completely new to programming, you may want to supplement the first
    few chapters with additional practice. We recommend working through the *Python
    Fundamentals* tutorials available for free at [realpython.com](https://realpython.com)
    to make sure you are on solid footing.


    If you have any questions or feedback about the book, you’re always welcome to
    [contact us](https://realpython.com/contact) directly.


    # Learning by Doing


    This book is all about learning by doing, so be sure to *actually type in* the
    code snippets you encounter in the book. For best results, we recommend that you
    avoid copying and pasting the code examples.


    You will learn the concepts better and pick up the syntax faster if you type out
    each line of code yourself. Plus, if you screw up—which is totally normal and
    happens to all developers on a daily basis—the simple act of correcting typos
    will help you learn how to debug your code.


    Try to complete the review exercises and code challenges on your own before getting
    help from outside resources. With enough practice, you will master this material—and
    have fun along the way!'
  merge: -1
  pgno: 26
- img_proc: true
  md: '# How Long Will It Take to Finish This Book?


    If you’re already familiar with a programming language you could finish the book
    in as little as 35 to 40 hours. If you’re new to programming you may need to spend
    up to 100 hours or more. Take your time and don’t feel like you have to rush.
