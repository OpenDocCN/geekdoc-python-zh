    ```

    >>> input_pdf = PdfFileReader(str(pdf_path))

    ```


    Our goal is to extract the pages at indices 1, 2, and 3, add these to a new PdfFileWriter
    instance, and then write them to a new PDF file.


    One way to do this is to loop over the range of numbers starting at 1 and ending
    at 3, extracting the page at each step of the loop and adding it to the PdfFileWriter
    instance. Here''s what that looks like in code:


    ```

    >>> pdf_writer = PdfFileWriter()

