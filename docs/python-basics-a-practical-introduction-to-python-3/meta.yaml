    # 10.2. Instantiate an Object


    ```

    >>> Dog()

    <__main__.Dog object at 0x0004ccc90>

    ```


    The new Dog instance is located at a different memory address. This is because
    it is an entirely new instance, completely unique from the first Dog object you
    instantiated.


    To see this another way, type the following:


    ```

    >>> a = Dog()

    >>> b = Dog()

    >>> a == b

    False

    ```


    Two new Dog objects are created and assigned to the variables a and b. When a
    and b are compared using the == operator, the result is False. For user defined
    classes, the default behavior of the == operator is to compare the memory addresses
    of two objects and return True if the address is the same and False otherwise.


    What this means is that even though the a and b objects are both instances of
    the Dog class and have the exact same attributes and methods—namely, no attributes
    or methods, in this case—a and b represent two distinct objects in memory.


    > **Note**


    The default behavior of the == operator can be overridden. How this is done is
    outside the scope of this book.


    If you would like more information on how to customize the behavior of your classes,
    check out Real Python’s [Operator and Function Overloading in Custom Python Classes](https://realpython.com/operator-function-overloading/)
    tutorial.


    You can use the type() function to determine an object’s class:


    ```

    >>> type(a)

    <class ''__main__.Dog''>

    ```'
