    \n## 18.4 Introduction to Tkinter\n\nPython has a lot of GUI frameworks, but Tkinter\
    \ is the only framework that is built into the Python standard library.\n\nTkinter\
    \ has several strengths. It is **cross-platform**, meaning the same code works\
    \ on Windows, macOS, and Linux. Visual elements are rendered using native operating\
    \ system elements, so applications built with Tkinter look like they belong on\
    \ the platform where they are run.\n\nAlthough Tkinter is considered the *de facto*\
    \ Python GUI framework, it is not without criticism. One notable criticism is\
    \ that GUIs built with Tkinter look outdated. If you want a shiny, modern interface,\
    \ then Tkinter may not be what you are looking for.\n\nHowever, Tkinter is lightweight\
    \ and is relatively simple to use compared to other frameworks. This makes it\
    \ a compelling choice for building GUI applications in Python, especially for\
    \ applications where a modern sheen is unnecessary and quickly building something\
    \ that is functional and cross-platform is the top priority.\n\n> **Note**\n>\n\
    > As was mentioned in the last section, IDLE is built with Tkinter. You may encounter\
    \ difficulties when running your own GUI programs within IDLE.\n>\n> If you find\
    \ that the GUI window you are trying to create is unexpectedly freezing or appears\
    \ to be making IDLE misbehave in some unexpected way, try running your script\
    \ from the a command prompt or terminal.\n\nLet's dive right in and see how you\
    \ build an application with Tkinter.\n\n### Your First Tkinter Application\n\n\
    The foundational element of a Tkinter GUI is the **window**. Windows are the containers\
    \ in which all other GUI elements live. Other GUI elements, such as text boxes,\
    \ labels, and buttons, are known as **widgets**. Widgets are contained inside\
    \ of windows.\n\nLet's create a window that contains a single widget. Start by\
    \ opening a new interactive window in IDLE.\n\nThe first thing you need to do\
    \ is import the Tkinter module:\n\n```python\n>>> import tkinter as tk\n```\n\n\
    A window is an instance of Tkinter's Tk class. Go ahead and create a new window\
    \ and assign it to the variable window:\n\n```python\n>>> window = tk.Tk()\n```\n\
    \nWhen you execute the above code, a new window pops up on your screen. How it\
    \ looks depends on your operating system:"
