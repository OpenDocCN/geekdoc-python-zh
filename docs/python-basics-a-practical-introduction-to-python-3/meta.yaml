    The slice [x:y] returns the substring between the boundaries x and y. So, for
    "apple pie", the slice [0:3] returns the string "app", and the slice [3:9] returns
    the string "le pie".


    If you omit the first index in a slice, Python assumes you want to start at index
    0:


    ```

    >>> flavor[:5]

    ''apple''

    ```


    The slice [:5] is equivalent to the slice [0:5], so flavor[:5] returns the first
    five characters in the string "apple pie".


    Similarly, if you omit the second index in the slice, Python assumes you want
    to return the substring that begins with the character whose index is the first
    number in the slice and ends with the last character in the string:


    ```

    >>> flavor[5:]

    '' pie''

    ```


    For "apple pie", the slice [5:] is equivalent to the slice [5:9]. Since the character
    with index 5 is a space, flavor[5:9] returns the substring that starts with the
    space and ends with the last letter, which is " pie".


    If you omit both the first and second numbers in a slice, you get a string that
    starts with the character with index 0 and ends with the last character. In other
    words, omitting both numbers in a slice returns the entire string:


    ```

    >>> flavor[:]

    ''apple pie''

    ```


    It''s important to note that, unlike string indexing, Python won''t raise an IndexError
    when you try to slice between boundaries before or after'
