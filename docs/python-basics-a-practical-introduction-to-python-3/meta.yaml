    "Chief Medical Officer" instead of Dr. McCoy’s age.


    A great way to make this type of code more manageable and more maintainable is
    to use **classes**.


    # ## Classes vs Instances


    Classes are used to create user-defined data structures. Classes also have special
    functions, called **methods**, that define behaviors and actions that an object
    created from the class can perform with its data.


    In this chapter you’ll create a `Dog` class that stores some basic information
    about a dog.'
- md: "It’s important to note that a class just provides structure. A class is a blueprint\
    \ for how something should be defined. It doesn’t actually provide any real content\
    \ itself. The Dog class may specify that the name and age are necessary for defining\
    \ a dog, but it will not actually state what a specific dog’s name or age is.\n\
    \nWhile the class is the blueprint, an **instance** is an object built from a\
    \ class that contains real data. An instance of the Dog class is not a blueprint\
    \ anymore. It’s an actual dog with a name, like Miles, who’s four years old.\n\
    \nPut another way, a class is like a form or questionnaire. It defines the needed\
    \ information. After you fill out the form, your specific copy is an instance\
    \ of the class. It contains actual information relevant to you.\n\nYou can fill\
    \ out multiple copies of a form to create many different instances, but without\
    \ the form as a guide, you would be lost, not knowing what information is required.\
    \ Thus, before you can create individual instances of an object, you must first\
    \ specify what is needed by defining a class.\n\n## How to Define a Class\n\n\
    All class definitions start with the `class` keyword, which is followed by the\
    \ name of the class and a colon. This is similar to the signature of a function,\
    \ except that you don’t need to add any parameters in parentheses. Any code that\
    \ is indented below the class definition is considered part of the class’s body.\n\
    \nHere is an example of a simple Dog class:\n\n```\nclass Dog:\n    pass\n```\n\
    \nThe body of the Dog class consists of a single statement: the `pass` keyword.\
    \ `pass` is often used as a place holder where code will eventually go. It allows\
    \ you to run this code without throwing an error.\n\n> **Note**\n\nUnlike functions\
    \ and variables, the convention for naming classes in Python is to use CamelCase\
    \ notation, starting with a capital letter. For example, a class for a specific\
    \ breed of a dog, like the Jack Russell Terrier, would be written as `JackRussellTerrier`.\n\
    \nThe `Dog` class isn't very interesting right now, so let's spruce it up a bit\
    \ by defining some properties that all `Dog` objects should have. There are a\
    \ number of properties that we can choose from, such as name, age, coat color,\
    \ and breed. To keep things simple, we'll stick with just two for now: name and\
    \ age.\n\nTo define the properties, or **instance attributes**, that all `Dog`\
    \ objects must have, you need to define a special method called `__init__()`.\
    \ This method is run every time a new `Dog` object is created and tells Python\
    \ what the initial **state**—that is, the initial values of the object's properties—of\
    \ the object should be.\n\nThe first positional argument of `__init__()` is always\
    \ a variable that references the class instance. This variable is almost universally\
    \ named `self`. After the `self` argument, you can specify any other arguments\
    \ required to create an instance of the class.\n\nThe following updated definition\
    \ of the `Dog` class shows how to write an `__init__()` method that creates two\
    \ instance attributes: `.name` and `.age`:\n\n```python\nclass Dog:\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n```\n\nNotice\
    \ that the function signature—the part that starts with the `def` keyword—is indented\
    \ four spaces. The body of the function is indented by eight spaces. This indentation\
    \ is vitally important. It tells Python that the `__init__()` method belongs to\
    \ the `Dog` class.\n\nWithout the indentation, Python would treat `__init__()`\
    \ as just another function.\n\n> **Note**\n\nFunctions that belong to a class\
    \ are called **instance methods** because they belong to the instance of a class.\
    \ For example, `list.append()` and `string.find()` are instance methods.\n\nIn\
    \ the body of the `__init__()` method, there are two statements using the `self`\
    \ variable. The first line, `self.name = name`, creates an instance attribute\
    \ called `name` and assigns to it the value of the `name` variable that was passed\
    \ to the `__init__()` method. The second line creates an instance attribute called\
    \ `age` and assigns to it the value of the `age` argument.\n\nThis might look\
    \ kind of strange. The `self` variable is referring to an instance of the `Dog`\
    \ class, but we haven't actually created an instance yet. It is a place holder\
    \ that is used to build the blueprint. Remember, the class is used to define the\
    \ `Dog` data structure. It does not actually create any instances of individual\
    \ dogs with specific names and ages.\n\nWhile instance attributes are specific\
    \ to each object, **class attributes** are the same for all instances—which in\
    \ this case is all dogs. In the next example, a class attribute called `species`\
    \ is created and assigned the value \"Canis familiaris\":\n\n```python\nclass\
    \ Dog:\n    # Class Attribute\n    species = \"Canis familiaris\"\n\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n```\n\nClass\
    \ attributes are defined directly underneath the first line of the class and outside\
    \ of any method definition. They must be assigned a value because they are created\
    \ on a class instance without arguments to determine what their initial value\
    \ should be.\n\nYou should use class attributes whenever a property should have\
    \ the same initial value for all instances of a class. Use instance attributes\
    \ for properties that must be specified before an instance is created.\n\nNow\
    \ that we have a `Dog` class, let's create some dogs!\n\nLeave feedback on this\
    \ section »\n\n## 10.2 Instantiate an Object\n\nOnce a class has been defined,\
    \ you have a blueprint for creating—also known as **instantiating**—new objects.\
    \ To instantiate an object, type the name of the class, in the original CamelCase,\
    \ followed by parentheses containing any values that must be passed to the class's\
    \ `.__init__()` method.\n\nLet's take a look at an actual example. Open IDLE's\
    \ interactive window and type the following:\n\n```\n>>> class Dog:\n...     pass\n\
    ...\n```\n\nThis creates a new `Dog` class with no attributes and methods.\n\n\
    Next, instantiate a new `Dog` object:\n\n```\n>>> Dog()\n<__main__.Dog object\
    \ at 0x106702d30>\n```\n\nThe output indicates that you now have a new `Dog` object\
    \ at memory address `0x106702d30`. Note that the address you see on your screen\
    \ will very likely be different from the address shown here.\n\nNow let's instantiate\
    \ another `Dog` object:\n\n```\n>>> Dog()\n<__main__.Dog object at 0x0004ccc90>\n\
    ```\n\nThe new Dog instance is located at a different memory address. This is\
    \ because it is an entirely new instance, completely unique from the first Dog\
    \ object you instantiated.\n\nTo see this another way, type the following:\n\n\
    ```\n>>> a = Dog()\n>>> b = Dog()\n>>> a == b\nFalse\n```\n\nTwo new Dog objects\
    \ are created and assigned to the variables a and b. When a and b are compared\
    \ using the == operator, the result is False. For user defined classes, the default\
    \ behavior of the == operator is to compare the memory addresses of two objects\
    \ and return True if the address is the same and False otherwise.\n\nWhat this\
    \ means is that even though the a and b objects are both instances of the Dog\
    \ class and have the exact same attributes and methods—namely, no attributes or\
    \ methods, in this case—a and b represent two distinct objects in memory.\n\n\
    > **Note**\n\nThe default behavior of the == operator can be overridden. How this\
    \ is done is outside the scope of this book.\n\nIf you would like more information\
    \ on how to customize the behavior of your classes, check out Real Python’s [Operator\
    \ and Function Overloading in Custom Python Classes](https://realpython.com/operator-function-overloading/)\
    \ tutorial.\n\nYou can use the type() function to determine an object’s class:\n\
    \n```\n>>> type(a)\n<class '__main__.Dog'>\n```\n\nOf course, even though both\
    \ `a` and `b` are distinct `Dog` instances, they have the same type:\n\n```\n\
    >>> type(a) == type(b)\nTrue\n```\n\n### Class and Instance Attributes\n\nLet's\
    \ look at a slightly more complex example using the `Dog` class we defined with\
    \ `.name` and `.age` instance attributes:\n\n```\n>>> class Dog:\n...     species\
    \ = \"Canis familiaris\"\n...     def __init__(self, name, age):\n...        \
    \ self.name = name\n...         self.age = age\n...\n>>> buddy = Dog(\"Buddy\"\
    , 9)\n>>> miles = Dog(\"Miles\", 4)\n```\n\nAfter declaring the new `Dog` class,\
    \ two new instances are created—one `Dog` whose name is Buddy and is nine years\
    \ old, and another named Miles who is four years old.\n\nDoes anything look a\
    \ little strange about how the `Dog` objects are instantiated? The `.__init__()`\
    \ method has three parameters, so why are only two arguments passed to it in the\
    \ example?\n\nWhen you instantiate a `Dog` object, Python creates a new instance\
    \ and passes it to the first parameter of `.__init__()`. This essentially removes\
    \ the `self` parameter, so you only need to worry about the `name` and `age` parameters.\n\
    \nAfter the `Dog` instances are created, you can access their instance attributes\
    \ by using **dot notation**:\n\n```\n>>> buddy.name\n'Buddy'\n```"
  mdcn: "需要指出的是，类仅仅提供了结构。类是定义事物应该如何构建的蓝图。它本身并不提供任何实际内容。`Dog`类可能规定了定义一只狗需要名字和年龄，但它不会具体说明某只特定狗的名字或年龄是什么。\n\
    \n类是蓝图，而**实例**则是从类构建出来的、包含真实数据的对象。`Dog`类的实例不再是蓝图。它是一只真实的狗，有名字，比如叫Miles，四岁。\n\n\
    换句话说，类就像一张表格或问卷。它定义了所需的信息。当你填好表格后，你那份具体的副本就是该类的一个实例。它包含了与你相关的实际信息。\n\n你可以填写多份表格来创建许多不同的实例，但如果没有表格作为指引，你就会迷失方向，不知道需要哪些信息。因此，在创建对象的单个实例之前，你必须首先通过定义一个类来指定需要什么。\n\
    \n## 如何定义一个类\n\n所有类定义都以`class`关键字开头，后面跟着类的名称和一个冒号。这类似于函数的签名，只是你不需要在括号中添加任何参数。类定义下方缩进的任何代码都被视为类主体的一部分。\n\
    \n这是一个简单的`Dog`类示例：\n\n```\nclass Dog:\n    pass\n```\n\n`Dog`类的主体由单个语句组成：`pass`关键字。`pass`通常用作占位符，表示代码最终会放在这里。它允许你运行这段代码而不会抛出错误。\n\
    \n> **注意**\n\n与函数和变量不同，Python中命名类的惯例是使用驼峰命名法（CamelCase），以大写字母开头。例如，一个特定犬种的类，如杰克罗素梗，应写为`JackRussellTerrier`。\n\
    \n`Dog`类现在还不太有趣，所以让我们通过定义一些所有`Dog`对象都应该具有的属性来让它更完善一些。我们可以选择许多属性，如名字、年龄、毛色和品种。为了简单起见，我们现在只使用两个：名字和年龄。\n\
    \n要定义所有`Dog`对象必须具有的属性或**实例属性**，你需要定义一个名为`__init__()`的特殊方法。每次创建新的`Dog`对象时，这个方法都会运行，并告诉Python对象的初始**状态**——即对象属性的初始值——应该是什么。\n\
    \n`__init__()`的第一个位置参数总是一个引用类实例的变量。这个变量几乎普遍命名为`self`。在`self`参数之后，你可以指定创建类实例所需的任何其他参数。\n\
    \n以下更新后的`Dog`类定义展示了如何编写一个`__init__()`方法，该方法创建两个实例属性：`.name`和`.age`：\n\n```python\n\
    class Dog:\n    def __init__(self, name, age):\n        self.name = name\n   \
    \     self.age = age\n```\n\n注意函数签名——以`def`关键字开头的部分——缩进了四个空格。函数体缩进了八个空格。这种缩进至关重要。它告诉Python\
    \ `__init__()`方法属于`Dog`类。\n\n没有缩进，Python会将`__init__()`视为另一个普通函数。\n\n> **注意**\n\
    \n属于类的函数称为**实例方法**，因为它们属于类的实例。例如，`list.append()`和`string.find()`就是实例方法。\n\n在`__init__()`方法的主体中，有两条语句使用了`self`变量。第一行`self.name\
    \ = name`创建了一个名为`name`的实例属性，并将传递给`__init__()`方法的`name`变量的值赋给它。第二行创建了一个名为`age`的实例属性，并将`age`参数的值赋给它。\n\
    \n这可能看起来有点奇怪。`self`变量引用的是`Dog`类的一个实例，但我们实际上还没有创建实例。它是一个用于构建蓝图的占位符。记住，类用于定义`Dog`数据结构。它实际上并不创建任何具有特定名字和年龄的单个狗的实例。\n\
    \n虽然实例属性对每个对象都是特定的，但**类属性**对所有实例都是相同的——在这种情况下，就是所有的狗。在下一个示例中，创建了一个名为`species`的类属性，并赋值为\"\
    Canis familiaris\"：\n\n```python\nclass Dog:\n    # 类属性\n    species = \"Canis\
    \ familiaris\"\n\n    def __init__(self, name, age):\n        self.name = name\n\
    \        self.age = age\n```\n\n类属性直接定义在类的第一行之下，任何方法定义之外。它们必须被赋值，因为它们是在没有参数来确定其初始值的情况下在类实例上创建的。\n\
    \n当某个属性对于类的所有实例都应具有相同的初始值时，你应该使用类属性。对于必须在创建实例之前指定的属性，则使用实例属性。\n\n现在我们有了一个`Dog`类，让我们来创建一些狗吧！\n\
    \n对此部分提供反馈 »\n\n## 10.2 实例化一个对象\n\n一旦定义了一个类，你就有了创建——也称为**实例化**——新对象的蓝图。要实例化一个对象，请输入类的原始驼峰命名法名称，后跟括号，括号内包含必须传递给类的`.__init__()`方法的任何值。\n\
    \n让我们看一个实际的例子。打开IDLE的交互窗口并输入以下内容：\n\n```\n>>> class Dog:\n...     pass\n...\n\
    ```\n\n这将创建一个新的`Dog`类，没有属性和方法。\n\n接下来，实例化一个新的`Dog`对象：\n\n```\n>>> Dog()\n<__main__.Dog\
    \ object at 0x106702d30>\n```\n\n输出表明你现在在内存地址`0x106702d30`处有一个新的`Dog`对象。请注意，你在屏幕上看到的地址很可能与此处显示的地址不同。\n\
    \n现在让我们实例化另一个`Dog`对象：\n\n```\n>>> Dog()\n<__main__.Dog object at 0x0004ccc90>\n\
    ```\n\n新的`Dog`实例位于不同的内存地址。这是因为它是一个全新的实例，与你实例化的第一个`Dog`对象完全不同。\n\n要从另一个角度查看这一点，请输入以下内容：\n\
    \n```\n>>> a = Dog()\n>>> b = Dog()\n>>> a == b\nFalse\n```\n\n创建了两个新的`Dog`对象，并分别赋值给变量`a`和`b`。当使用`==`运算符比较`a`和`b`时，结果为`False`。对于用户定义的类，`==`运算符的默认行为是比较两个对象的内存地址，如果地址相同则返回`True`，否则返回`False`。\n\
    \n这意味着即使`a`和`b`对象都是`Dog`类的实例，并且具有完全相同的属性和方法——在这种情况下，即没有属性或方法——`a`和`b`在内存中代表两个不同的对象。\n\
    \n> **注意**\n\n`==`运算符的默认行为可以被覆盖。如何做到这一点超出了本书的范围。\n\n如果你想了解更多关于如何自定义类行为的信息，请查看Real\
    \ Python的[自定义Python类中的运算符和函数重载](https://realpython.com/operator-function-overloading/)教程。\n\
    \n你可以使用`type()`函数来确定一个对象的类：\n\n```\n>>> type(a)\n<class '__main__.Dog'>\n```\n\
    \n当然，尽管`a`和`b`是不同的`Dog`实例，但它们具有相同的类型：\n\n```\n>>> type(a) == type(b)\nTrue\n```\n\
    \n### 类属性和实例属性\n\n让我们看一个稍微复杂一点的例子，使用我们定义的带有`.name`和`.age`实例属性的`Dog`类：\n\n```\n\
    >>> class Dog:\n...     species = \"Canis familiaris\"\n...     def __init__(self,\
    \ name, age):\n...         self.name = name\n...         self.age = age\n...\n\
    >>> buddy = Dog(\"Buddy\", 9)\n>>> miles = Dog(\"Miles\", 4)\n```\n\n声明新的`Dog`类后，创建了两个新实例——一只名叫Buddy、九岁的`Dog`，以及另一只名叫Miles、四岁的`Dog`。\n\
    \n`Dog`对象的实例化方式看起来有什么奇怪的地方吗？`.__init__()`方法有三个参数，但为什么在示例中只传递了两个参数？\n\n当你实例化一个`Dog`对象时，Python会创建一个新实例并将其传递给`.__init__()`的第一个参数。这实际上移除了`self`参数，因此你只需要关心`name`和`age`参数。\n\
    \n创建`Dog`实例后，你可以使用**点表示法**访问它们的实例属性：\n\n```\n>>> buddy.name\n'Buddy'\n```"
