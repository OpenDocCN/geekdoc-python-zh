    ```


    Let’s take a closer look at the first regular expression in the pattern string
    by breaking it down into three parts—<title.*?>, .*?, and </title.*?>.


    +   1. <title.*?>—This pattern matches the opening <TITLE > tag in html. The <title
    part of the pattern matches with <TITLE because re.search() is called with re.IGNORECASE,
    and .*?> matches any text after <TITLE up to the first instance of >.

    2. .*?—This pattern matches all text after the opening <TITLE > non-greedily,
    stopping at the first match for </title.*?>.

    3. </title.*?>—The only difference between this pattern and the first one is the
    / character, so this matches the closing </title / > tag in html.'
