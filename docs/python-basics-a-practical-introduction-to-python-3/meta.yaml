  - '[PAGE 312]


    # 11.1. Working With Modules


    | Import Statement | Result |

    | :--- | :--- |

    | `import <module>` | Import all of `<module>`''s namespace into the name `<module>`.
    Import module names can be accessed from the calling module with `<module>.<name>`.
    |

    | `import <module> as <other_name>` | Import all of `<modules>`''s namespace into
    the name `<other_name>`. Import module names can be accessed from the calling
    module with `<other_name>.<name>`. |

    | `from <module> import <name1>, <name2>, ...` | Import only the names `<name1>`,
    `<name2>`, etc, from `<module>`. The names are added to the calling modules''s
    local namespace and can be accessed directly. |


    Separate namespaces are one of the great advantages of dividing code into individual
    modules, so let''s take some time to explore why namespaces matter and why you
    should care about them.


    # Why Use Namespaces?


    Suppose every person on the entire planet is given an ID number. In order to distinguish
    one person from the next, each ID number needs to be unique. We''ll need a whole
    bunch of ID numbers to make that work!


    The world is divided into countries, and we can group people by their country
    of birth. If we assign each country a unique code, we can include that code in
    a person''s ID number. For example, a person from the United States might have
    an ID of `US-357`, and a person from Great Britain might have an ID of `GB-246`.


    Two people from different countries can now have the same ID number. We can distinguish
    them because their ID''s begin with different country codes. Every person from
    the same country must have a unique ID number, but we no longer need globally
    unique ID numbers.'
  - '[PAGE 313]


    # 11.1. Working With Modules


    The country codes in this scenario are an examples of **namespaces**, and illustrate
    three of the main reasons namespaces are used:


    +   1. They **group** names into logical containers

    2. They **prevent clashes** between duplicate names

    3. They **provide context** to names


    Namespace in code provide the same advantages.


    You have seen three different ways to import a module into another one. Keeping
    in mind the advantages namespaces give you can help you determine which kind of
    `import` statement makes the most sense.


    In general, `import <module>` is the preferred way to import a module because
    it keeps the imported module''s namespace completely separate from the calling
    module''s namespace. Moreover, every name from the imported module is accessed
    from the calling module with the `<module>.<name>` format, which immediately tells
    you which module the name originates in.


    There are two reasons you might use the `import <module> as <other_name>` format:


    +   1. The module name is long and you wish to import an abbreviated version of
    it

    2. The module name clashes with an existing name in the calling module


    `import <module> as <other_name>` still keeps the imported module''s namespace
    separate from the calling module''s namespace. The tradeoff is that the name you
    give the module might not be as easily recognizable as the original module name.


    Importing specific names from a module is generally the least preferred way to
    import code from a module. The imported names are added directly to the calling
    module''s namespace, completely removing them from context of the calling module.'
- md: "## 11.1. Working With Modules\n\nSometimes, modules contain a single function\
    \ or class that has the same name as the module. For example, there is a module\
    \ in the Python standard library called `datetime` that contains a class called\
    \ `datetime`.\n\nSuppose you add the following `import` statement to your code:\n\
    \n```python\nimport datetime\n```\n\nThis imports the `datetime` module into your\
    \ code's namespace, so in order to use the `datetime` class contained in the `datetime`\
    \ module, you need to type the following:\n\n```python\ndatetime.datetime(2020,\
    \ 2, 2)\n```\n\nDon't worry about how the `datetime` class works right now. The\
    \ important part of this example is that having to constantly type `datetime.datetime`\
    \ anytime you want to use the `datetime` class is redundant and tiring.\n\nThis\
    \ is a great example of when it's appropriate to use one of the variations of\
    \ the `import` statement. To keep the context of the `datetime` package, it is\
    \ common for Python programmers to import the package and rename it as `dt`:\n\
    \n```python\nimport datetime as dt\n```\n\nNow, to use the `datetime` class, you\
    \ only need to type `dt.datetime`:\n\n```python\ndt.datetime(2020, 2, 2)\n```\n\
    \nIt is also common for Python programmers to import the `datetime` class directly\
    \ into the calling module's namespace:\n\n```python\nfrom datetime import datetime\n\
    ```\n\nThis is fine because the context isn't really lost. The class and the module\
    \ share the same name, after all.\n\nWhen imported directly, you no longer have\
    \ to use dotted module names to access the `datetime` class:\n\n```python\ndatetime(2020,\
    \ 2, 2)\n```\n\nThe various import statements allow you to reduce typing and unnecessarily\
    \ long dotted module names. That said, abusing the various `import` statements\
    \ can lead to a loss of context, resulting in code that is more difficult to understand.\n\
    \nAlways use good judgment when importing modules so that the most context possible\
    \ is preserved.\n\n## Review Exercises\n\nYou can find the solutions to these\
