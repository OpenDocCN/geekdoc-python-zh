    # 4.8. Find a String in a String


    ```

    >>> "My number is 555-555-5555".find("5")

    13

    ```


    Sometimes you need to find all occurrences of a particular substring and replace
    them with a different string. Since .find() only returns the index of the first
    occurrence of a substring, you can''t easily use it to perform this operation.
    Fortunately, string objects have a .replace() method that replaces each instance
    of a substring with another string.


    Just like .find(), you tack .replace() on to the end of a variable or string literal.
    In this case, though, you need to put two strings inside of the parentheses in
    .replace() and separate them with a comma. The first string is the substring to
    find, and the second string is the string to replace each occurrence of the substring
    with.


    For example, the following code shows how to replace each occurrence of "the truth"
    in the string "I''m telling you the truth; nothing but the truth" with the string
    "lies":


    ```

    >>> my_story = "I''m telling you the truth; nothing but the truth!"

    >>> my_story.replace("the truth", "lies")

    "I''m telling you lies; nothing but lies!"

    ```


    Since strings are immutable objects, .replace() doesn''t alter my_story. If you
    immediately type my_story into the interactive window after running the above
    example, you''ll see the original string, unaltered:


    ```

    >>> my_story

    "I''m telling you the truth; nothing but the truth!"

    ```


    To change the value of my_story, you need to reassign to it the new value returned
    by .replace():


    ```

    >>> my_story = my_story.replace("the truth", "lies")

    >>> my_story

    "I''m telling you lies; nothing but lies!"

    ```


    .replace() can only replace one substring at a time, so if you want to replace
    multiple substrings in a string you need to use .replace() mul-'
