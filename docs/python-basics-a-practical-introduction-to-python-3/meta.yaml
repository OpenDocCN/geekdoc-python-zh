    \n```python\n>>> capitals_list[0]  # Capital of California\n'Sacramento'\n\n>>>\
    \ capitals_list[2]  # Capital of Texas\n'Austin'\n```\n\nOne nice thing about\
    \ dictionaries is that they can be used to provide context to the values they\
