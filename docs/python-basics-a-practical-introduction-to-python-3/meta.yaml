  md: '# Chapter 19


    # Final Thoughts and Next Steps


    Congratulations! You''ve made it to all the way to the end of this book. You already
    know enough to do a lot of amazing things with Python, but now the real fun starts:
    it''s time to explore on your own!


    The best way to learn is by solving real problems of your own. Sure, your code
    might not be very pretty or efficient when you''re just starting out, but it will
    be useful. If you don''t think you have any problems of the variety that Python
    could solve, pick a [popular module](https://realpython.com) that interests you
    and create your own project around it.


    Part of what makes Python so great is the community. Know someone learning Python?
    Help them out! The only way to know you''ve really mastered a concept is when
    you can explain it to someone else.


    Next up, dive into the more advanced material available at [realpython.com](https://realpython.com)
    or peruse the articles & tutorials featured in the [PyCoder''s Weekly newsletter](https://pycoders.com).


    When you feel ready, consider helping out with an open-source project on [GitHub](https://github.com).
    If puzzles are more your style, try working through some of the mathematical challenges
    on [Project Euler](https://projecteuler.net).'
