    # Checking Existence of Values With in


    You can check whether or not a value is contained in a tuple with the in keyword.


    ```

    >>> vowels = ("a", "e", "i", "o", "u")

    >>> "o" in vowels

    True

    >>> "x" in vowels

    False

    ```


