    # 18.6. Controlling Layout With Geometry Managers


    .pack() is powerful, but can be difficult to visualize. The best way to get a
    feel for .pack() is to look at some examples.


    Let''s see what happens when you .pack() three Label widgets into a Frame:


    ```

    import tkinter as tk


    window = tk.Tk()


    frame1 = tk.Frame(master=window, width=100, height=100, bg="red")

    frame1.pack()


    frame2 = tk.Frame(master=window, width=50, height=50, bg="yellow")

    frame2.pack()


    frame3 = tk.Frame(master=window, width=25, height=25, bg="blue")

    frame3.pack()


    window.mainloop()

    ```


    By default, .pack() places each Frame below the previous one, in the order that
    they are assigned to the window:


    ![](img/4efa9a991b645f75be61871447c559ca_589_0.png)'
