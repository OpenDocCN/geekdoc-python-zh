  md: '# Foreword


    Hello and welcome to **Python Basics: A Practical Introduction to Python 3**.
    I hope you are ready to learn why so many professional and hobbyist developers
    are drawn to Python and how you can begin using it on your projects, small and
    large, right away.


    This book is targeted at beginners who either know a little programming but not
    the Python language and ecosystem, as well as complete beginners.


    If you don’t have a Computer Science degree, don’t worry. Fletcher, David, Dan,
    and Joanna will guide you through the important computing concepts while teaching
    you the Python basics, and just as importantly, skipping the unnecessary details
    at first.


    # Python Is a Full-Spectrum Language


    When learning a new programming language, you don’t yet have the experience to
    judge how well it will serve you in the long run. If you are considering Python,
    let me assure you that this is a good choice. One key reason is that Python is
    a **full-spectrum** language.


    What do I mean by this? Some languages are very good for beginners. They hold
    your hand and make programming super easy. We can go to the extreme and look at
    visual languages such as Scratch.


    Here you get blocks that represent programming concepts, like variables, loops,
    method calls, and so on, and you drag and drop them on a visual surface. Scratch
    may be easy to get started with for sim-'
  merge: -1
  pgno: 15
- img_proc: true
  md: "ple programs. But you cannot build professional applications with it. Name\
    \ one Fortune 500 company that powers its core business logic with Scratch.\n\n\
    Came up empty? Me too—because that would be insanity.\n\nOther languages are incredibly\
    \ powerful for expert developers. The most popular one in this category is likely\
    \ C++ and its close relative C. Whatever web browser you used today was likely\
    \ written in C or C++. Your operating system running that browser was also very\
    \ likely built with C/C++. Your favorite first-person shooter or strategy video\
    \ game? You nailed it: C/C++.\n\nYou can do amazing things with these languages.\
    \ But they are wholly unwelcoming to newcomers looking for a gentle introduction.\n\
    \nYou might not have read a lot of C++ code. It can almost make your eyes burn.\
    \ Here’s an example, a real albeit complex one:\n\n```\ntemplate <typename T>\n\
    _Defer<void(*)(PID<T>, void (T::*)(void))>\n    (const PID<T>&, void (T::*)(void))>\n\
    defer(const PID<T>& pid, void (T::*method)(void))\n{\n    void (*dispatch)(const\
    \ PID<T>&, void (T::*)(void)) =\n        &process::template dispatch<T>;\n   \
    \ return std::tr1::bind(dispatch, pid, method);\n}\n```\n\nPlease, just no.\n\n\
    Both Scratch and C++ are decidedly not what I would call full-spectrum languages.\
    \ In the Scratch level, it’s easy to start but you have to switch to a “real”\
    \ language to build real applications. Conversely, you can build real apps with\
    \ C++, yet there is no gentle on-ramp. You dive head first into all the complexity\
    \ of that language which exists to support these rich applications."
