  - '[PAGE 537]


    # Your First EasyGUI Application


    EasyGUI is great for displaying **dialog boxes** to collect user input and display
    output. It is not particularly great for creating a large application with several
    windows, menus, and toolbars.


    You can think of EasyGUI as a sort of replacement for the `input()` and `print()`
    functions that you have been using for input and output.


    Program flow with EasyGUI typically works like this:


    +   1. At some point in the code, a visual element is displayed on the user''s
    screen.

    2. Execution of the code pauses until the user provides input with the visual
    element.

    3. The user''s input is returned as an object and execution of the code is resumed.


    To get a feel for how EasyGUI works, open a new interactive window in IDLE and
    execute the following lines of code:


    ```

    >>> import easygui as gui

    >>> gui.msgbox(msg="Hello!", title="My first message box")

    ```


    If you run the code on Windows, you will see a window like the following displayed
    on your screen:


    ![](img/4efa9a991b645f75be61871447c559ca_537_0.png)'
