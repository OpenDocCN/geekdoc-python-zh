  md: "```\n# Call the keypress event handler\nhandle_keypress(event)\n```\n\nWhen\
    \ you call Tkinter’s `window.mainloop()` method, something like the above loop\
    \ is run for you! `.mainloop()` takes care of two parts of the loop for you: it\
    \ maintains a list of events that have occurred, and it runs an event handler\
    \ any time a new event is added to that list.\n\nLet’s update our event loop to\
    \ use `window.mainloop()` instead of our own event loop:\n\n```\nimport tkinter\
    \ as tk\n\n# Create a window object\nwindow = tk.Tk()\n\n# Create an event handler\n\
    def handle_keypress(event):\n    \"\"\"Print the character associated to the key\
