    There are a lot of blank lines in this output. These are the result of newline
    characters in the HTML document’s text. You can remove these with the string `.replace()`
    method, if you need to.


    Often, you only need to get specific text from an HTML document. Using Beautiful
    Soup to extract the text first and then using the `.find()` string method is *sometimes*
    easier than working with regular expressions.


    However, sometimes the HTML tags themselves are the elements that point out the
    data you want to retrieve. For instance, perhaps you want to retrieve the URLs
    for all the images on the page. These links are contained in the `src` attribute
    of `<img>` HTML tags. In this case, you can use the `find_all()` method to return
    a list of all instances of that particular tag:


    ```

    >>> soup.find_all("img")

    [<img src="/static/dionysus.jpg"/>, <img src="/static/grapes.png"/>]

    ```


    This returns a list of all `<img>` tags in the HTML document. The objects in the
    list look like they might be strings representing the tags, but they are actually
    instances of the `Tag` object provided by Beautiful Soup. `Tag` objects provide
    a simple interface for working with the information they contain.


    Let’s explore this a little by first unpacking the `Tag` objects from the list:'
