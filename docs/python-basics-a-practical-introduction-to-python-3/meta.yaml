    # 13.1. Installing Third-Party Packages With Pip


    > **Important**


    On macOS and Ubuntu Linux, it is important to run `pip` commands using the `python3`
    command and not `python`. This ensures that the `pip` installation for Python
    3 is used, instead of the Python 2 version of `pip` that may have come pre-installed
    on your machine.


    On Windows, the `python3` command may not work. If you do not see any output,
    or encounter and error, try the command with `python` instead:



    $ python -m pip --version



    If that works for you, replace all the `python3` commands in this chapter with
    `python`.


    Note that the version you see displayed on your computer may be different, and
    that it might be linked to a different Python installation. This is just fine,
    as long as the version of Python you see displayed is any version of Python 3.


    If your operating system tells you that `pip3` is an unrecognized command, then
    `pip` was not installed with your Python distribution. In that case, you may want
    to review the instructions for installing Python in Chapter 2.


    # Upgrading `pip` to the Latest Version


    Before we go any further, let''s make sure that you have the latest version of
    `pip` installed. To upgrade `pip`, run type the following into your terminal and
    press `Enter`:


    ```

    $ python3 -m pip install --upgrade pip

    ```


    If a newer version of `pip` is available, it will be downloaded and installed.
    Otherwise, you will see a message indicating that the latest version is already
    installed. This message usually says something like:'
