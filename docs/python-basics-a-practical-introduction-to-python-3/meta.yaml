  md: '# 14.5. Rotating and Cropping PDF Pages


    > **Note**

    The width and height of a `RectangleObject` are defined in **points**. One point
    is equal to 1/72 inches.


    So `RectangleObject([0, 0, 792, 612])` represents a rectangular region with the
    lower left corner at the origin with a height of 792 points, or 11 inches, and
    a height of 612 points, or 8.5 inches. Those are the dimensions of a standard
    letter sized page.


    A `RectangleObject` has four attributes that return the coordinates of the rectangle''s
    corners: `.lowerLeft`, `.lowerRight`, `.upperLeft`, and `.upperRight`. Just like
    the width and height values, coordinates are also given in points.


    You can use these four properties to get the coordinates of each corner of the
    `RectangleObject`:


    ```

    >>> first_page.mediaBox.lowerLeft

    (0, 0)

    >>> first_page.mediaBox.lowerRight

    (792, 0)

    >>> first_page.mediaBox.upperLeft

    (0, 612)

    >>> first_page.mediaBox.upperRight

    (792, 612)

    ```


    Each property returns a `tuple` containing the coordinates of the specified corner.
    You can access individual coordinates with square brackets, just like you would
    any other Python tuple:


    ```

    >>> first_page.mediaBox.upperRight[0]

    792

    >>> first_page.mediaBox.upperRight[1]

    612

    ```


    You can alter the coordinates of a `mediaBox` by assigning a new tuple to one
    of its properties:'
