    # 14.6 Encrypting and Decrypting PDFs


    Sometimes PDF files are password protected. With the PyPDF2 package, you can work
    with encrypted PDF files, as well as add password protection to existing PDFs.


    # PDF Encryption


    The .encrypt() method of a PdfFileWriter() instance is used to add password protection
    to a PDF file. It has two main parameters:


    +   1. user_pwd for setting the user password. This allows for opening and reading
    the PDF file.

    2. owner_pwd for setting the owner password. This allows for opening the PDF without
    any restrictions, including editing.


    Let''s use .encrypt() to add a password to a PDF file. First, let''s open the
    newsletter.pdf file in the Chapter 14 Practice Files directory:


    ```

    >>> from pathlib import Path

    >>> from PyPDF2 import PdfFileReader, PdfFileWriter

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "newsletter.pdf"

    ... )

    ```'
  - '[PAGE 439]


    # 14.6. Encrypting and Decrypting PDFs


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    ```


    Now create a new PdfFileWriter instance and add the pages from pdf_reader to it:


    ```

    >>> pdf_writer = PdfFileWriter()

    >>> pdf_writer.appendPagesFromReader(pdf_reader)

    ```


    Now we''ll add the password "SuperSecret" with the pdf_writer.encrypt() method:


    ```

    >>> pdf_writer.encrypt(user_pwd="SuperSecret")

    ```


    When you set only user_pwd, the owner_pwd argument defaults to the same string,
    so the above line of code sets both the user and owner passwords.


    Finally write the encrypted PDF to an output file called newsletter_protected.pdf
    in your home directory:


    ```

    >>> output_path = Path.home() / "newsletter_protected.pdf"

    >>> with output_path.open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ```


    When you open the PDF with a PDF reader software you''ll be prompted to enter
    a password. Enter "SuperSecret" to open the PDF.


    If you need to set a separate owner password for the PDF, pass a second string
    to the owner_pwd parameter. For example, the following sets the user password
    to "SuperSecret" and the owner password to "ReallySuperSecret":


    ```

    >>> pdf_writer.encrypt(user_pwd="SuperSecret", onwer_pwd="ReallySuperSecret")

    ```


    # PDF Decryption


    When you work with password-protected files programmatically, you need to decrypt
    them before you can access any of the contents.'
