    Notice that FirstName and LastName have the word TEXT next to them, and Age is
    next to the word INT. This tells SQLite that values in the FirstName and LastName
    columns are text values, and values in the Age column are integers.


    Once the table is created, you can populate it with some data using the INSERT
    INTO SQL command. The following query inserts the values Ron, Obvious, and 42
