    ... )

    ```


    Here''s what the dialog box looks like:


    ![](img/4efa9a991b645f75be61871447c559ca_542_0.png)


    The difference between indexbox() and buttonbox() is that indexbox() returns the
    index of the button label in the list or tuple passed to choices, instead of the
    label itself.


    For example, if you click on the `Yellow` button, the integer 1 is returned:


    ```

    >>> gui.indexbox(

    ...     msg="What''s your favorite color?",

    ...     title="Favorite color",

    ...     choices=("Red", "Yellow", "Blue"),

    ... )

    ```'
