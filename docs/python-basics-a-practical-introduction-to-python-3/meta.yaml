- md: "## 8.5. Break Out of the Pattern\n\n`the spot` and stops if the letter `x`\
    \ is found.\n\nIf you run the code in the example, you'll see that `There was\
    \ no 'X' in the phrase` is printed to the console.\n\nNow try changing `phrase`\
    \ to the string `\"X marks the spot\"`. When you run the same code with this phrase,\
    \ there is no output. What's going on?\n\nAny code in the `else` block after a\
    \ `for` loop is executed only if the `for` loop completes without encountering\
    \ a `break` statement.\n\nSo, when you run the code with `phrase = \"it marks\
    \ the spot\"`, the line of code containing the `break` statement is never run\
    \ since there is no `x` character in the phrase, which means that the `else` block\
    \ is executed and the string `\"There was no 'X' in the phrase\"` is displayed.\n\
    \nOn the other hand, when you run the code with `phrase = \"X marks the spot\"\
    `, the line containing the `break` statement does get executed, so the `else`\
    \ block is never run and no output gets displayed.\n\nHere's a practical example\
    \ that gives a user three attempts to enter a password:\n\n```python\nfor n in\
    \ range(3):\n    password = input(\"Password: \")\n    if password == \"I<3Bieber\"\
    :\n        break\n    print(\"Password is incorrect.\")\nelse:\n    print(\"Suspicious\
    \ activity. The authorities have been alerted.\")\n```\n\nThis example loops over\
    \ the number 0 to 2. On each iteration, the user is prompted to enter a password.\
    \ If the password entered is correct, then `break` is used to exit the loop. Otherwise,\
    \ the user is told that the password is incorrect and given another attempt.\n\
    \nAfter three unsuccessful attempts, the `for` loop terminates without ever executing\
    \ the line of code containing `break`. In that case, the `else` block is executed\
    \ and the user is warned that the authorities have been alerted.\n\n> **Note**\n\
    >\n> We have focused on `for` loops in this section because they are generally\
