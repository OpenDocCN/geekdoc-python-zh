  md: '# Chapter 8


    # Conditional Logic and Control Flow


    Nearly all of the code you have seen in this book is **unconditional**. That is,
    the code does not make any choices. Every line of code is executed in the order
    that is written or that functions are called, with possible repetitions inside
    of loops.


    In this chapter, you will learn how to write programs that perform different actions
    based on different conditions using **conditional logic**. Paired with functions
    and loops, conditional logic allows you to write complex programs that handle
    many different situations.


    **In this chapter, you will learn how to:**


    +   - Compare the values of two or more variables

    - Write `if` statements to control the flow of your programs

    - Handle errors with `try` and `except`

    - Apply conditional logic to create simple simulations


    Let''s get started!


    [Leave feedback on this section »](https://example.com)'
