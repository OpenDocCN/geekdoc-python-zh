- md: "## Chapter 6\n\n## Functions and Loops\n\nFunctions are the building blocks\
    \ of almost every Python program. They’re where the real action takes place!\n\
    \nYou’ve already seen how to use several functions, including `print()`, `len()`,\
    \ and `round()`. These are all **built-in functions** because they come built\
    \ into the Python language itself. You can also create **user-defined functions**\
    \ that perform specific tasks.\n\nFunctions break code into smaller chunks, and\
    \ are great for tasks that a program uses repeatedly. Instead of writing the same\
    \ code each time the program needs to perform the task, just call the function!\n\
    \nBut sometimes you need to repeat some code several times in a row, and this\
    \ is where **loops** come in.\n\n**In this chapter, you will learn:**\n\n- How\
    \ to create user-defined functions\n- How to write `for` and `while` loops\n-\
    \ What scope is and why it is important\n\nLet’s dive in!\n\n## 6.1 What is a\
    \ Function, Really?\n\nIn the past few chapters you used functions like `print()`\
    \ and `len()` to display text and determine the length of a string. But what is\
    \ a function, really?\n\nIn this section you'll take a closer look at `len()`\
    \ to learn more about what a function is and how it is executed.\n\n### Functions\
    \ Are Values\n\nOne of the most important properties of a function in Python is\
    \ that functions are values and can be assigned to a variable.\n\nIn IDLE's interactive\
    \ window, inspect the name `len` by typing the following in at the prompt:\n\n\
    ```\n>>> len\n<built-in function len>\n```\n\nWhen you hit Enter, Python tells\
    \ you that the name `len` is a variable whose value is a built-in function.\n\n\
    Just like integer values have a type called `int`, and strings have a type `str`,\
    \ function values also have a type:\n\n```\n>>> type(len)\n<class 'builtin_function_or_method'>\n\
    ```\n\nLike any other variable, you can assign any value you want to `len`:\n\n\
    ```\n>>> len = \"I'm not the len you're looking for.\"\n>>> len\n\"I'm not the\
    \ len you're looking for.\"\n```\n\nNow `len` has a string value, and you can\
    \ verify that the type is `str` with `type()`:\n\n```\n>>> type(len)\n<class 'str'>\n\
    ```\n\nThe variable name `len` is a keyword in Python, and even though you can\
    \ change its value, it's usually a bad idea to do so. Changing the value of `len`\
    \ can make your code confusing because it's easy to mistake the new `len` for\
    \ the built-in function.\n\n> **Important**\n\nIf you typed in the previous code\
    \ examples, **you no longer have access to the built-in `len` function in IDLE.**\n\
    \nYou can get it back with the following code:\n\n```\n>>> del len\n```\n\nThe\
    \ `del` keyword is used to un-assign a variable from a value. `del` stands for\
    \ delete, but it doesn't delete the value. Instead, it detaches the name from\
    \ the value and deletes the name.\n\nNormally, after using `del`, trying to use\
    \ the deleted variable name raises a `NameError`. In this case, however, the name\
    \ `len` doesn't get deleted:\n\n```\n>>> len\n<built-in function len>\n```\n\n\
    Because `len` is a built-in function name, it gets reassigned to the original\
    \ function value.\n\nBy going through each of these steps, we've seen that a function's\
    \ name is separate from the function itself.\n\n### How Python Executes Functions\n\
    \nNow let's take a closer look at how Python executes a function.\n\nThe first\
    \ thing to notice is that you can't execute a function by just typing its name.\
    \ You must **call** the function to tell Python to actually execute it.\n\nLet's\
    \ look at how this works with `len()`:\n\n```\n>>> # Typing just the name doesn't\
    \ execute the function.\n>>> # IDLE inspects the variable as usual.\n>>> len\n\
    <built-in function len>\n\n>>> # Use parentheses to call the function.\n>>> len()\n\
    Traceback (most recent call last):\n  File \"<pyshell#3>\", line 1, in <module>\n\
    \    len()\nTypeError: len() takes exactly one argument (0 given)\n```\n\nIn this\
    \ example, Python raises a `TypeError` when `len()` is called because `len()`\
    \ expects an argument.\n\nAn **argument** is a value that gets **passed** to the\
    \ function as input. Some functions can be called with no arguments, and some\
    \ can take as many arguments as you like. `len()` requires exactly one argument.\n\
    \nWhen a function is done executing, it **returns** a value as output. The return\
    \ value usually — but not always — depends on the values of any arguments passed\
    \ to the function.\n\nThe process for executing a function can be summarized in\
    \ three steps:\n\n1. The function is **called**, and any arguments are passed\
    \ to the function as input.\n2. The function **executes**, and some action is\
    \ performed with the arguments.\n3. The function **returns**, and the original\
    \ function call is replaced with the return value.\n\nLet's look at this in practice\
    \ and see how Python executes the following line of code:\n\n```\n>>> num_letters\
    \ = len(\"four\")\n```\n\nFirst, `len()` is called with the argument \"four\"\
    . The length of the string \"four\" is calculated, which is the number 4. Then\
    \ `len()` returns the number 4 and replaces the function call with the value.\n\
    \nSo, after the function executes, the line of code looks like this:\n\n```\n\
    >>> num_letters = 4\n```\n\nThen Python assigns the value 4 to `num_letters` and\
    \ continues executing any remaining lines of code in the program.\n\n### Functions\
    \ Can Have Side Effects\n\nYou've learned how to call a function and that they\
    \ return a value when they are done executing. Sometimes, though, functions do\
    \ more than just return a value.\n\nWhen a function changes or affects something\
    \ external to the function itself, it is said to have a **side effect**. You have\
    \ already seen one function with a side effect: `print()`.\n\nWhen you call `print()`\
    \ with a string argument, the string is displayed in the Python shell as text.\
    \ But `print()` doesn't return any text as a value.\n\nTo see what `print()` returns,\
    \ you can assign the return value of `print()` to a variable:\n\n```\n>>> return_value\
    \ = print(\"What do I return?\")\nWhat do I return?\n>>> return_value\n>>>\n```\n\
    \nWhen you assign `print(\"What do I return?\")` to `return_value`, the string\
    \ \"What do I return?\" is displayed. However, when you inspect the value of `return_value`,\
    \ nothing is shown.\n\n`print()` returns a special value called `None` that indicates\
    \ the absence of data. `None` has a type called `NoneType`:\n\n```\n>>> type(return_value)\n\
    <class 'NoneType'>\n>>> print(return_value)\nNone\n```\n\nWhen you call `print()`,\
    \ the text that gets displayed is not the return value. It is a side effect of\
    \ `print()`.\n\nNow that you know that functions are values, just like strings\
    \ and numbers, and have learned how functions are called and executed, let's take\
    \ a look at how you can create your own user-defined functions.\n\n## 6.2 Write\
    \ Your Own Functions\n\nAs you write longer and more complex programs, you may\
    \ find that you need to use the same few lines of code repeatedly. Or maybe you\
    \ need to calculate the same formula with different values several times in your\
    \ code.\n\nYou might be tempted to copy and paste similar code to other parts\
    \ of your program and modify it as needed, but this is usually a bad idea!\n\n\
    Repetitive code can be a nightmare to maintain. If you find a mistake in some\
    \ code that's been copied and pasted all over the place, you'll end up having\
    \ to apply the fix everywhere the code was copied. That's a lot of work, and you\
    \ might miss a spot!\n\nIn this section, you'll learn how to define your own functions\
    \ so that you can avoid repeating yourself when you need to reuse code. Let's\
    \ go!\n\n### The Anatomy of a Function\n\nEvery function has two parts:\n\n1.\
    \ The **function signature** defines the name of the function and any inputs it\
    \ expects.\n2. The **function body** contains the code that runs every time the\
    \ function is used.\n\nLet’s start by writing a function that takes two numbers\
    \ as input and returns their product. Here’s what this function might look like,\
    \ with the signature, body, and return statement identified with comments:\n\n\
    ```\ndef multiply(x, y):  # Function signature\n    # Function body\n    product\
    \ = x * y\n    return product\n```\n\nIt might seem odd to make a function for\
    \ something as simple as the `*` operator. In fact, `multiply` is not a function\
    \ you would probably write in a real-world scenario. But it makes a great first\
    \ example for understanding how functions are created!\n\nLet’s break the function\
    \ down to see what’s going on.\n\n### The Function Signature\n\nThe first line\
    \ of code in a function is called the **function signature**. It always starts\
    \ with the `def` keyword, which is short for “define.”\n\nLet’s look more closely\
    \ at the signature of the `multiply` function:\n\n```\ndef multiply(x, y):\n```\n\
    \nThe function signature has four parts:\n\n1. The `def` keyword"
  mdcn: "## 第六章\n\n## 函数与循环\n\n函数是几乎所有 Python 程序的构建模块。它们是真正执行操作的地方！\n\n你已经了解了如何使用几个函数，包括\
    \ `print()`、`len()` 和 `round()`。这些都是**内置函数**，因为它们内置于 Python 语言本身。你也可以创建**用户定义函数**来执行特定任务。\n\
    \n函数将代码分解成更小的块，非常适合程序重复使用的任务。无需在程序每次需要执行任务时都编写相同的代码，只需调用函数即可！\n\n但有时你需要连续多次重复一些代码，这时就需要用到**循环**了。\n\
    \n**在本章中，你将学习：**\n\n- 如何创建用户定义函数\n- 如何编写 `for` 和 `while` 循环\n- 什么是作用域以及它为何重要\n\
    \n让我们开始吧！\n\n## 6.1 函数究竟是什么？\n\n在过去的几章中，你使用了像 `print()` 和 `len()` 这样的函数来显示文本和确定字符串的长度。但函数究竟是什么呢？\n\
    \n在本节中，你将更仔细地研究 `len()`，以了解更多关于函数是什么以及它是如何执行的。\n\n### 函数是值\n\nPython 中函数最重要的属性之一是函数是值，可以赋值给变量。\n\
