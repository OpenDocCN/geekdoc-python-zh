    # Chapter 9


    ## Tuples, Lists, and Dictionaries


    So far, you have been working with fundamental data types like `str`, `int`, and
    `float`. Many real-world problems are easier to solve when simple data types are
    combined into more complex data structures.


    A **data structure** models a collection of data, such as a list of numbers, a
    row in a spreadsheet, or a record in a database. Modeling the data that your program
    interacts with using the right data structure is often the key to writing simple
    and effective code.


    Python has three built-in data structures that are the focus of this chapter:
    tuples, lists, and dictionaries.


    **In this chapter, you will learn:**


    - How to work with tuples, lists, and dictionaries

    - What immutability is and why it is important

    - When to use different data structures


    Let''s dive in!


    [Leave feedback on this section »](Leave feedback on this section »)


    ## 9.1 Tuples Are Immutable Sequences


    Perhaps the simplest compound data structure is a sequence of items.


    A **sequence** is an ordered list of values. Each element in a sequence is assigned
    an integer, called an **index**, that determines the order in which the values
    appear. Just like strings, the index of the first value in a sequence is 0.


    For example, the letters of the English alphabet form a sequence whose first element
    is A and last element is Z. Strings are also sequences. The string "Python" has
    six elements, starting with "P" at index 0, and "n" at index 5.


    Some real-world examples of sequences include the values emitted by a sensor every
    second, the sequence of a student''s test scores, or the sequence of daily stock
    values for some company over a period of time.


    In this section, you''ll learn how to use Python''s built-in `tuple` data type
    to create sequences of values.


    ### What is a Tuple?


    The word **tuple** comes from mathematics, where it is used to describe a finite
    ordered sequence of values.


    Usually, mathematicians write tuples by listing each element, separated by a comma,
    inside a pair of parentheses. (1, 2, 3) is a tuple containing three integers.


    Tuples are **ordered** because their elements appear in an ordered fashion. The
    first element of (1, 2, 3) is 1, the second element is 2, and the third is 3.


    Python borrows both the name and the notation for tuples from mathematics.


    ### How to Create a Tuple


    There are a few ways to create a tuple in Python. We will cover two of them:


    1. Tuple literals

    2. The tuple() built-in


    #### Tuple Literals


    Just like a string literal is a string that is explicitly created by surrounding
    some text with quotes, a **tuple literal** is a tuple that is written out explicitly
    as a comma-separated list of values surrounded by parentheses.


    Here''s an example of a tuple literal:


    ```

    >>> my_first_tuple = (1, 2, 3)

    ```


    This creates a tuple containing the integers 1, 2, and 3, and assigns it to the
    name `my_first_tuple`.


    You can check that `my_first_tuple` is a tuple using `type()`:


    ```

    >>> type(my_first_tuple)

    <class ''tuple''>

    ```


    Unlike strings, which are sequences of characters, tuples may contain any type
    of value, including values of different types. The tuple (1, 2.0, "three") is
    perfectly valid.


    There is a special tuple that doesn''t contain any values. This tuple is called
    the **empty tuple** and can be created by typing two parentheses without anything
    between them:


    ```

    >>> empty_tuple = ()

    ```


    At first glance, the empty tuple may seem like a strange and useless concept,
    but it is actually quite practical.'
