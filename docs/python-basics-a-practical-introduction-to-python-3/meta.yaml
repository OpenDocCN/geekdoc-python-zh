    ## 9.2 Lists Are Mutable Sequences


    The `list` data structure is another sequence type in Python. Just like strings
    and tuples, lists contain items that are indexed by integers, starting with 0.


    On the surface, lists look and behave a lot like tuples. You can use index and
    slicing notation with lists, check for the existence of an element using `in`,
    and iterate over lists with a `for` loop.


    Unlike tuples, however, lists are **mutable**, meaning you can change the value
    at an index even after the list has been created.


    In this section, you will learn how to create lists and compare them with tuples.


    ### Creating Lists


    A **list literal** looks almost exactly like a tuple literal, except that it is
    surrounded with square brackets ([ and ]) instead of parentheses:


    ```

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> type(colors)

    <class ''list''>

    ```


    When you inspect a list, Python displays it as a list literal:


    ```

    >>> colors

    [''red'', ''yellow'', ''green'', ''blue'']

    ```


    Like tuples, lists values are not required to be of the same type. The list literal
    ["one", 2, 3.0] is perfectly valid.


    Aside from list literals, you can also use the `list()` built-in to create a new
    list object from any other sequence. For instance, the tuple (1, 2, 3) can be
    passed to `list()` to create the list [1, 2, 3]:


    ```

    >>> list((1, 2, 3))

    [1, 2, 3]

    ```


    You can even create a list from a string:


    ```

    >>> list("Python")

    [''P'', ''y'', ''t'', ''h'', ''o'', ''n'']

    ```


    Each letter in the string becomes an element of the list.


    There is more useful way to create a list from a string. You can create a list
    from a string of a comma-separated list of items using the string object''s `.split()`
    method:


    ```

    >>> groceries = "eggs, milk, cheese"

    >>> grocery_list = groceries.split(", ")

    >>> grocery_list

    [''eggs'', ''milk'', ''cheese'']

    ```


    The string argument passed to `.split()` is called the separator. By changing
    the separator you can split strings into lists in numerous ways:


    ```

    >>> # Split string on semi-colons

    >>> "a;b;c".split(";")

    [''a'', ''b'', ''c'']


    >>> # Split string on spaces

    >>> "The quick brown fox".split(" ")

    [''The'', ''quick'', ''brown'', ''fox'']


    >>> # Split string on multiple characters

    >>> "abbaabba".split("ba")

    [''ab'', ''ab'', '''']

    ```


    In the last example above, the string is split around occurrences of the substring
    "ba", which occurs first at index 2 and again at index 6. The separator has two
    characters, only the characters at indices 1, 2, 5, and 6 become elements of the
    list.


    .split() always returns a string whose length is one more than the number of separators
    contained in the string. The string "abbaabba" contains two instances of the separator
    "ba" so the list returned by split() has three elements. Since the third separator
    isn''t followed by any other characters, the third element of the list is set
    to the empty string.


    If the separator is not contained in the string at all, .split() returns a list
    with the string as its only element:


    ```

    >>> "abbaabba".split("c")

    [''abbaabba'']

    ```


    In all, you''ve seen three ways to create a list:


    1. A list literal

    2. The `list()` built-in

    3. The string `.split()` method


    Lists support the all of the same operations supported by tuples.


    ### Basic List Operations


    Indexing and slicing operations work on lists the same way they do on tuples.


    You can access list elements using index notation:


    ```

    >>> numbers = [1, 2, 3, 4]

    >>> numbers[1]

    2

    ```


    You can create a new list from an existing once using slice notation:


    ```

    >>> numbers[1:3]

    [2, 3]

    ```


    You can check for the existence of list elements using the `in` operator:


    ```

    >>> # Check existence of an element

    >>> "Bob" in numbers

    False

    ```


    Because lists are iterable, you can iterate over them with a `for` loop.


    ```

    >>> # Print only the even numbers in the list

    >>> for number in numbers:

    ...     if number % 2 == 0:

    ...         print(number)

    ...

    2

    4

    ```


    The major difference between lists and tuples is that elements of lists may be
    changed, but elements of tuples can not.


    ### Changing Elements in a List


    Think of a list as a sequence of numbered slots. Each slot holds a value, and
    every slot must be filled at all times, but you can swap out the value in a given
    slot with a new one whenever you want.


    The ability to swap values in a list for other values is called **mutability**.
    Lists are **mutable**. The elements of tuples may not be swapped for new values,
    so tuples are said to be **immutable**.


    To swap a value in a list with another, assign the new value to a slot using index
    notation:


    ```

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> colors[0] = "burgundy"

    ```


    The value at index 0 changes from "red" to "burgundy":


    ```

    >>> colors

    [''burgundy'', ''yellow'', ''green'', ''blue'']

    ```


    You can change several values in a list at once with a **slice assignment**:


    ```

    >>> colors[1:3] = ["orange", "magenta"]

    >>> colors

    [''burgundy'', ''orange'', ''magenta'', ''blue'']

    ```


    colors[1:3] selects the slots with indices 1 and 2. The values in these slots
    are assigned to "orange" and "magenta", respectively.


    The list assigned to a slice does not need to have the same length as the slice.
    For instance, you can assign a list of three elements to a slice with two elements:


    ```

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> colors[1:3] = ["orange", "magenta", "aqua"]

    >>> colors

    [''red'', ''orange'', ''magenta'', ''aqua'', ''blue'']

    ```


    The values "orange" and "magenta" replace the original values "yellow" and "green"
    in `colors` at the indices 1 and 2. Then a new slot is created at index 4 and
    "blue" is assigned to this index. Finally, "aqua" is assigned to index 3.


    When the length of the list being assigned to the slice is less than the length
    of the slice, the overall length of the original list is reduced:


    ```

    >>> colors

    [''red'', ''orange'', ''magenta'', ''aqua'', ''blue'']

    >>> colors[1:4] = ["yellow", "green"]

    >>> colors

    [''red'', ''yellow'', ''green'', ''blue'']

    ```


    The values "yellow" and "green" replace the values "orange" and "magenta" in `colors`
    at the indices 1 and 2. Then the value at index 3 is replaced with the value "blue".
    Finally, the slot at index 4 is removed from `colors` entirely.


    The above examples show how to change, or **mutate**, lists using index and slice
    notation. There are also several list methods that you can use to mutate a list.


    ### List Methods For Adding and Removing Elements


    Although you can add and remove elements with slice notation, list methods provide
    a more natural and readable way to mutate a list.


    We''ll look at several list methods, starting with how to insert a single'
