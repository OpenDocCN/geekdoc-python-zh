    # 14.2 Extract Pages From a PDF


    In the last section, you learned how to extract all of the text from a PDF file
    and save the text to a .txt file. Now you''ll learn how to extract a page, or
    a range of pages, from an existing PDF and save them to a new PDF.


    The `PdfFileWriter` class is used to created a new PDF file. Let''s explore this
    class and learn the steps needed to create a PDF using PyPDF2.


    # The PdfFileWriter Class


    The `PdfFileWriter` class is used to create new PDF files. In IDLE''s interactive
    window, import the `PdfFileWriter` class and create a new instance called `pdf_writer`:


    ```

    >>> from PyPDF2 import PdfFileWriter

    >>> pdf_writer = PdfFileWriter()

    ```


    `PdfFileWriter` objects are containers for pages. To create an new PDF, you need
    to add some `PageObject` instances to the `PdfFileWriter` and then write those
    pages to a file.


    Let''s add a blank page to the `pdf_writer` object:


    ```

    >>> page = pdf_writer.addBlankPage(width=72, height=72)

    ```


    The `.addBlankPage()` method adds a blank page to the PDF writer object. Since
    there are no pages in the writer, it is added as the first page.


    The `width` and `height` parameters are required and determine the width and height
    of the page in **points**. One point is equal to 1/72 inches. So the above code
    adds a one inch square blank page to `pdf_writer`.


    .addBlankPage() returns a new `PageObject` instance representing the page that
    was added to the `PdfFileWriter`:'
  - '[PAGE 412]


    ```

    >>> type(page)

    <class ''PyPDF2.pdf.PageObject''>

    >>> page

    {''/Type'': ''/Page'', ''/Parent'': IndirectObject(1, 0), ''/Resources'': {},
    ''/MediaBox'': RectangleObject([0, 0, 72, 72])}

    ```


    In this example you''ve assigned the `PageObject` instance returned by `.addBlankPage()`
    to the `page` variable, but in practice you don''t usually need to do this. That
    is, you usually call `.addBlankPage()` without assigning the return value to anything:


    ```

    >>> pdf_writer.addBlankPage(width=72, height=72)

    ```


    With at least one page added to `pdf_writer`, you can write the contents to a
    new PDF file. To do this, pass a file object in binary write mode to the `PdfFileWriter.write()`
    method:


    ```

    >>> from pathlib import Path

    >>> with Path("blank.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    This creates a new file called `blank.pdf` in your current working directory.
    If you open the file with a PDF reader, such as Adobe Acrobat, you''ll see a document
    with a single blank one inch square page.'
