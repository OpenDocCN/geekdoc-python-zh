    \ = age\n\n    def __str__(self):\n        return f\"{self.name} is {self.age}\
    \ years old\"\n\n    def speak(self, sound):\n        return f\"{self.name} says\
    \ {sound}\"\n```\n\n记住，要创建一个子类，你需要创建一个具有自己名称的新类，然后将父类的名称放在括号中。以下代码创建了 `Dog` 类的三个新子类：\n\
    \n```python\nclass JackRussellTerrier(Dog):\n    pass\n\nclass Dachshund(Dog):\n\
