    2. The string "My first message box" passed to the `title` parameter is displayed
    as the title of the message box.

    3. There is one button in the message box labelled OK.


    Press the OK button to close the dialog box and look at IDLE''s interactive window.
    The string ''OK'' is displayed below the last line of code you typed:


    ```

    >>> gui.msgbox(msg="Hello, EasyGUI!", title="My first message box")

    ''OK''

    ```


    `msgbox()` returns the button label when the dialog box is closed. If the dialog
    box is closed without pressing the OK button, then the value `None` is returned.


    You can customize the button label by setting a third optional parameter called
    `ok_button`. For example, the following creates a message box with a button labeled
    *Click me*:


    ```

    >>> gui.msgbox(msg="Hello!", title="Greeting", ok_button="Click me")

    ```


    `msgbox()` is great for displaying a message, but it doesn''t provide the user
    with many options for interacting with your program. EasyGUI has several functions
    that display various types of dialog boxes. Let''s explore some of these now!'
