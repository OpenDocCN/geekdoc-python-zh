    \n通常，在使用 `del` 后，尝试使用已删除的变量名会引发 `NameError`。然而，在这种情况下，名称 `len` 并没有被删除：\n\n```\n\
    >>> len\n<built-in function len>\n```\n\n因为 `len` 是一个内置函数名，它会被重新赋值给原始的函数值。\n\n\
