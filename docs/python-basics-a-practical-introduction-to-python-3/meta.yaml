    | Key | Value |

    |---|---|

    | "Texas" | "Austin" |


    In the table above, the keys of the dictionary are the names of the states, and
    the values of the dictionary are the names of the capitals.


    The difference between an English dictionary and a Python dictionary is that the
    relationship between a key and its value is completely arbitrary. Any key can
    be assigned to any value.


    For example, the following table of key-value pairs is valid:


    | Key | Value |

    |---|---|

    | 1 | "Sunday" |

    | "red" | 12:45pm |

    | 17 | True |


    The keys in this table don''t appear to be related to the values at all. The only
    relationship is that each key is assigned to its corresponding value by the dictionary.


    In this sense, a Python dictionary is much more like a **map** than it is an English
    dictionary. The term map here comes from mathematics. It is used to describe a
    relation between two sets of values, not a geographical map.


    In practice, it is this idea of dictionaries as a map that is particularly useful.
    Under this lens, the English dictionary is a special case of a map that relates
    words to their definitions.


    So in summary, a Python dictionary is a data structure that relates a set of keys
    to a set of values. Each key is assigned a single value, which defines a relationship
    between the two sets.


    Now that you have an idea what a dictionary is, let''s see how to create'
