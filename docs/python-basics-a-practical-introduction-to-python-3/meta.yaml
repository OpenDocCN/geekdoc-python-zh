    \ page, and where the user would like to save the new PDF. Then the program needs\
    \ to open the file, rotate the pages, and save the new file.\n\nLet’s map this\
    \ out into explicit steps that we can more easily translate into code:\n\n+  \
    \ 1. Display a file selection dialog for opening a PDF file.\n2. If the user cancels\
