    # 9.10 Summary and Additional Resources


    In this chapter, you learned about three data structures: lists, tuples, and dictionaries.


    Lists, such as [1, 2, 3, 4], are mutable sequences of objects. You can interact
    with lists using various list methods, such as .append(), .remove(), and .extend().
    Lists can be sorted using the .sort() method. You can access individual elements
    of a list using subscript notation, just like strings. Slicing notation also works
    with lists.


    Tuples, like lists, are sequences of objects. The big difference between lists
    and tuples is that tuples are immutable. Once you create a tuple, it cannot be
    changed. Just like lists, you can access elements by index and using slicing notation.


    Dictionaries store data as key-value pairs. They are not sequences, so you cannot
    access elements by index. Instead, you access elements by their key. Dictionaries
    are great for storing relationships, or when you need quick access to data. Like
    lists, dictionaries are mutable.


    Lists, tuples and dictionaries are all iterable, meaning they can be looped over.
    You saw how to loop over all three of these structures'
