    \ in the file system are contained in the root directory.\n\nEach file in directory\
    \ has a **file name** that must be unique from any other file in the same directory.\
    \ Directories can also contain other directories, called **subdirectories** or\
    \ **subfolders**.\n\nThe following **directory tree** visualizes the hierarchy\
    \ of files and directories in an example file system:\n\n```\nroot/\n├── app/\n\
