    There is one more function in the re module that is useful for parsing out text.
    The re.sub() function, which is short for “substitute,” allows you to replace
    text in a string that matches a regular expression with new text (sort of like
    the .replace() method). The arguments passed to re.sub() are the regular expression,
    followed by the replacement text, followed by the string. For example:


    ```

    >>> string = "Everything is <replaced> if it''s in <tags>."

    >>> string = re.sub("<.*>", "ELEPHANTS", string)

    >>> string

    ''Everything is ELEPHANTS.''

    ```


    Perhaps that wasn''t quite what you expected to happen.


    The re.sub() function uses the regular expression "<.*>" to find and replace everything
    in between the first < and last >, which is most of the string. This is because
    Python''s regular expressions are **greedy**, meaning that they try to find the
    longest possible match when characters like * are used.


    Alternatively, you can use the non-greedy matching pattern *?, which works the
    same way as * except that it matches the shortest possible string of text:


    ```

    >>> string = "Everything is <replaced> if it''s in <tags>."

    >>> string = re.sub("<.*?>", "ELEPHANTS", string)

    >>> string

    "Everything is ELEPHANTS if it''s in ELEPHANTS."

    ```'
