  md: '# 11.1. Working With Modules


    | Import Statement | Result |

    | :--- | :--- |

    | `import <module>` | Import all of `<module>`''s namespace into the name `<module>`.
    Import module names can be accessed from the calling module with `<module>.<name>`.
    |

    | `import <module> as <other_name>` | Import all of `<modules>`''s namespace into
    the name `<other_name>`. Import module names can be accessed from the calling
    module with `<other_name>.<name>`. |

    | `from <module> import <name1>, <name2>, ...` | Import only the names `<name1>`,
    `<name2>`, etc, from `<module>`. The names are added to the calling modules''s
    local namespace and can be accessed directly. |


    Separate namespaces are one of the great advantages of dividing code into individual
    modules, so let''s take some time to explore why namespaces matter and why you
    should care about them.


    # Why Use Namespaces?


    Suppose every person on the entire planet is given an ID number. In order to distinguish
    one person from the next, each ID number needs to be unique. We''ll need a whole
    bunch of ID numbers to make that work!


    The world is divided into countries, and we can group people by their country
    of birth. If we assign each country a unique code, we can include that code in
    a person''s ID number. For example, a person from the United States might have
    an ID of `US-357`, and a person from Great Britain might have an ID of `GB-246`.


    Two people from different countries can now have the same ID number. We can distinguish
    them because their ID''s begin with different country codes. Every person from
    the same country must have a unique ID number, but we no longer need globally
    unique ID numbers.'
