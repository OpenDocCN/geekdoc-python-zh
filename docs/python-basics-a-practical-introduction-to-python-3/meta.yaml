    # 11.2. Working With Packages


    ```

    import <package_name>.<module_name>

    ```


    First type the name of the package followed by a dot (.) and the name of the module
    you want to import.


    > **Important**


    Just like module file names, package folder names must be valid Python identifiers.
    They may only contain upper and lower case letters, numbers, and underscores (_),
    and they may not start with a digit.


    As with modules, there are several variations on the `import` statement that you
    can use when importing packages.


    # Import Statement Variations For Packages


    There are three variations of the `import` statement that you learned for importing
    names from modules. These three variations translate to the following four variations
    for importing modules from packages:


    +   1. `import <package>`

    2. `import <package> as <other_name>`

    3. `from <package> import <module>`

    4. `from <package> import <module> as <other_name>`


    These variations work much the same was as the counterparts for modules.


    For instance, rather than importing `mypackage.module1` and `mypackage.module2`,
    you can import both modules from the package on the same line.


    Change your `main.py` file to the following:


    ```

    # main.py


    from mypackage import module1, module2

    ```'
- md: "## Guidelines For Importing Packages\n\nThe same guidelines for importing names\
    \ from modules apply to importing modules from packages. You should prefer that\
    \ imports be as explicit as possible, so that the modules and names imported from\
    \ the package into the calling module have the appropriate context.\n\nIn general,\
    \ the following format is the most explicit:\n\n```\nimport <package>.<module>\n\
    ```\n\nThen, to access names from module, you need to type something like the\
    \ following:\n\n```\n<package>.<module>.<name>\n```\n\nWhen you encounter names\
    \ that are used from the imported module, there is no question where those names\
    \ come from. But sometimes package and module names are long, and you find yourself\
    \ typing `<package>.<module>` over and over again in your code.\n\nThe following\
    \ format allows you to skip the package name and import just the module name into\
    \ the calling module’s namespace:\n\n```\nfrom <package> import <module>\n```\n\
    \nNow you can just type `<module>.<name>` to access some name from the module.\
    \ While this no longer tells you from which package the name comes from, it does\
    \ keep the context of the module apparent.\n\nFinally, the following format is\
    \ generally ambiguous and should only be used when there is no risk of importing\
    \ a name from a module that clashes with a name in the calling module:\n\n```\n\
    from <package>.<module> import <name>\n```\n\nNow that you’ve seen how to import\
    \ modules from packages, let’s take a quick look at how to nest packages inside\
    \ of other packages.\n\n## Importing Modules From Subpackages\n\nA package is\
    \ just a folder containing one or more Python modules, one of which must be named\
    \ `__init__.py`, so it’s entirely possible to have the following package structure:\n\
    \n```\nmypackage/\n├── mysubpackage/\n│   ├── __init__.py\n│   └── module3.py\n\
    ├── __init__.py\n├── module1.py\n└── module2.py\n```\n\nA package nested inside\
    \ of another package is called a **subpackage**. For example, the `mysubpackage`\
    \ folder is a subpackage of `mypackage` because it contains an `__init__.py` module,\
    \ as well as a second module called `module3.py`.\n\nUsing your computer's file\
    \ explorer, or some other tool, create the `mysubpackage/` folder on your computer.\
    \ Make sure you place the folder inside of the `mypackage/` folder you created\
    \ earlier.\n\nIn IDLE, open two new script windows. Create the files `__init__.py`\
    \ and `module3.py` and save both modules to the `mysubpackage/` folder.\n\nIn\
    \ your `module3.py` file, add the following code:\n\n```python\n# module3.py\n\
    \npeople = [\"John\", \"Paul\", \"George\", \"Ringo\"]\n```\n\nNow open the `main.py`\
    \ file in your root `packages_examples/` project folder. Remove any existing code\
    \ and replace it with the following:\n\n```python\n# main.py\n\nfrom mypackage.module1\
    \ import greet\nfrom mypackage.mysubpackage.module3 import people\n\nfor person\
    \ in people:\n    greet(person)\n```\n\nThe `people` list from the `module3` module\
    \ inside of `mysubpackage` is imported into the `main.py` module via the dotted\
    \ module name `mypackage.mysubpackage.module3`.\n\nNow save and run `main.py`.\
    \ The following output is displayed in the interactive window:\n\n```\nHello,\
    \ John!\nHello, Paul!\nHello, George!\nHello, Ringo!\n```\n\nSubpackages are great\
    \ for organizing code inside of very large packages. They help keep the folder\
    \ structure of a package clean and organized.\n\nHowever, deeply nested subpackages\
    \ introduce long dotted module names. You can imagine how much typing it would\
    \ take to import a module from a subpackage of a subpackage of a subpackage of\
    \ a package.\n\nIt's good practice to try and keep your subpackages at most one\
    \ or two levels deep.\n\n## Review Exercises\n\nYou can find the solutions to\
    \ these exercises and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n1.  In a new project folder called `package_exercises/`, create a package called\
    \ `helpers` with three modules: `__init__.py`, `string.py`, and `math.py`.\n\n\
    \    In the `string.py` module, add a function called `shout()` that takes a single\
    \ string parameter and returns a new string with all of the letters in uppercase.\n\
    \n    In the `math.py` module, add a function called `area()` that takes two parameters\
    \ called `length` and `width` and returns their product `length * width`.\n\n\
    2.  In the root project folder, create a module called `main.py` that imports\
    \ the `shout()` and `area()` functions. Use the `shout()` and `area()` functions\
    \ to print the following output:\n\n    ```\n    THE AREA OF A 5-BY-8 RECTANGLE\
    \ IS 40\n    ```\n\nLeave feedback on this section »\n\n## 11.3 Summary and Additional\
    \ Resources\n\nIn this chapter you learned how to create your own Python modules\
    \ and packages, and how to import objects from one module into another.\n\nYou\
    \ saw that dividing code into modules and packages is advantageous because:\n\n\
    -   Small code files are **simpler** than large code files\n-   Small code files\
    \ are **easier to maintain** than large code files\n-   Modules can be **reused**\
    \ throughout a project\n-   Modules group related objects together into isolated\
