- img_proc: true
  md: '![](img/4efa9a991b645f75be61871447c559ca_558_0.png)


    (a) Windows (b) macOS (c) Ubuntu


    For the rest of this chapter, Windows screenshots will be used.


    Now that we have a window, let''s add a widget. The `tk.Label` class is used to
    add some text to a window.


    Create a `Label` widget with the text "Hello, Tkinter" and assign it to a variable
    called `greeting`:


    ```

    >>> greeting = tk.Label(text="Hello, Tkinter")

    ```


    The window you created earlier doesn''t change. You just created a `Label` widget,
    but it hasn''t been added to the window yet.


    There are several ways to add widgets to a window. Right now, we''ll use the `Label`
    widget''s `.pack()` method:


    ```

    >>> greeting.pack()

    ```


    The window now looks like this:


    ![](img/4efa9a991b645f75be61871447c559ca_558_1.png)


    When you `.pack()` a widget into a window, Tkinter sizes the window as small as
    it can while still fully encompassing the widget.'
