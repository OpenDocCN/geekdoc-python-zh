    ```


    At this point, line 1 of your code was run, and the debugger has stopped just
    before executing line 2.


    The second change to notice is the new variable `i` that is assigned the value
    1 in the *Locals* panel. That''s because the `for` loop in the first line of code
    created the variable `i` and assigned it the value 1.'
