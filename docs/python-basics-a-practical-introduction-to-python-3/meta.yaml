    # 13.1. Installing Third-Party Packages With Pip


    Once `pip` is done installing `requests` and its dependencies, run `pip3 list`
    in your terminal again. You should now see the following list:


    ```

    $ python3 -m pip list

    Package    Version

    ---------- ----------

    certifi    2019.11.28

    chardet    3.0.4

    idna       2.8

    pip        19.3.1

    requests   2.22.0

    setuptools 41.2.0

    urllib3    1.25.7

    ```


    You can see that version 2.22.0 of `requests` was installed, as well as the `chardet`,
    `certifi`, `idna`, and `urllib3` dependencies.


    By default, `pip` installs the latest version of a package. You can control which
    version of a package gets installed with some optional version specifiers.


    # Installing Specific Package Versions With Version Specifiers


    There are several ways to control which version of a package gets installed. For
    example, you can:


    +   1. Install the latest version greater than some version number

    2. Install the latest version less than some version number

    3. Install a specific version number


    To install the latest version of `requests` whose version number is 2 or greater,
    you can execute the following:


    ```

    $ python3 -m pip install requests>=2.0

    ```


    Notice the `>=2.0` after the package name `requests`. This tells `pip` to install
    the latest version of `requests` that is greater than or equal to version 2.0.'
- md: "## 13.1. Installing Third-Party Packages With Pip\n\nThe symbol `<=` is called\
    \ a **version specifier** because it specifies which version of the package should\
    \ be installed. There are several different version specifiers that you can use.\
    \ Here are the most widely used ones:\n\n| Version Specifier | Description |\n\
    | :--- | :--- |\n| `<=`, `>=` | Inclusive less than and greater than specifiers\
    \ |\n| `<`, `>` | Exclusive less than and greater than specifiers |\n| `==` |\
    \ Exactly equal to specifier |\n\nLet's look at some examples.\n\nTo install the\
    \ latest version that is less than or equal to some number, use the `<=` version\
    \ specifier:\n\n```\n$ python3 -m pip install requests<=3.0\n```\n\nThis will\
    \ install the latest version of `requests` that is less than or equal to version\
    \ 3.0.\n\nThe `<=` and `>=` version specifiers are **inclusive** because they\
    \ include the version number that follows the specifier. **Exclusive** versions,\
    \ `<` and `>`, exist as well.\n\nFor instance, the following command installs\
    \ the latest version of requests that is strictly less than version 3.0:\n\n```\n\
    $ python3 -m pip install requests<3.0\n```\n\nYou can combine version specifiers\
    \ to ensure `pip` installs the latest version within a specified version range.\
    \ For example, the following command installs the latest version of `requests`\
    \ in the 1.0 series:\n\n```\n$ python3 -m pip install requests>=1.0,<2.0\n```\n\
    \nYou would use something like the above command if your project was only compatible\
    \ with the 1.0 series of the package and you want to make sure you install the\
    \ latest updates to that series.\n\nFinally, you can **pin** dependencies to a\
    \ specific version with the `==` version specifier:\n\n```\n$ python3 -m pip install\
    \ requests==2.22.0\n```\n\nThis command installs exactly version 2.22.0 of the\
    \ `requests` package.\n\n## Show Package Details\n\nNow that you've installed\
    \ the `requests` package, you can use `pip` to view some details about the package:\n\
    \n```\n$ python3 -m pip show requests\nName: requests\nVersion: 2.22.0\nSummary:\
    \ Python HTTP for Humans.\nHome-page: http://python-requests.org\nAuthor: Kenneth\
    \ Reitz\nAuthor-email: me@kennethreitz.org\nLicense: Apache 2.0\nLocation: c:\\\
    users\\David\\...\\python\\python38-32\\lib\\site-packages\nRequires: chardet,\
    \ idna, certifi, urllib3\nRequired-by:\n```\n\nThe `python3 -m pip show` command\
    \ displays information about an installed package, including the author's name\
    \ and email, and a home page you can navigate to in your internet browser to learn\
    \ more about what the package does.\n\nThe `requests` package is used for making\
    \ HTTP requests from a Python program. It is extremely useful in a variety of\
    \ domains, and is a dependency of a large number of other Python packages.\n\n\
    ## Uninstalling a Package\n\nIf you can install a package with `pip`, it only\
    \ makes sense that you can also uninstall a package. Let's uninstall the requests\
    \ package now.\n\nTo uninstall `requests`, type the following into your terminal:\n\
    \n```\n$ python3 -m pip uninstall requests\n```\n\n> **Important**\n>\n> If you\
    \ already have projects that use `requests` or one of its dependencies, you may\
    \ not want to run the commands in the remainder of this section.\n\nYou will immediately\
    \ see the following prompt:\n\n```\nUninstalling requests-2.22.0:\n  Would remove:\n\
    \    c:\\users\\damos\\...\\requests-2.22.0.dist-info\\*\n    c:\\users\\damos\\\
    a...\\requests\\*\nProceed (y/n)?\n```\n\nBefore `pip` actually removes anything\
    \ from your computer, it asks for your permission first. How considerate!\n\n\
    Type `y` and press `Enter` to continue. You should then see the following message\
    \ confirming that `requests` was removed:\n\n```\nSuccessfully uninstalled requests-2.22.0\n\
    ```\n\nTake a look at your package list again:\n\n```\n$ python3 -m pip list\n\
    Package    Version\n---------- -------\ncertifi    2018.4.16\nchardet    3.0.4\n\
    idna        2.7\npip         10.0.1\nsetuptools  39.0.1\nurllib3     1.23\n```\n\
    \nNotice that `pip` uninstalled `requests`, but it didn’t remove any of its dependencies!\
    \ This behavior is a feature, not a bug.\n\nImagine that you have installed several\
    \ packages into your environment with `pip`, some of which share dependencies.\
    \ If `pip` uninstalled a package *and* its dependencies, it would render any other\
    \ package requiring those dependencies unusable!\n\nFor now, though, go ahead\
    \ and remove the remaining packages by running `pip uninstall`. You can uninstall\
    \ all four packages in a single command:\n\n```\n$ python3 -m pip uninstall certifi\
    \ chardet idna urllib3\n```\n\n```\n...\n```\n\nWhen you are done, verify that\
    \ everything has been removed by running `pip list` again. You should see the\
    \ same list of packages you saw when you first started:\n\n```\nPackage     Version\n\
    ----------  -------\npip         10.0.1\nsetuptools  39.0.1\n```\n\nPython’s ecosystem\
    \ of third-party packages is one of its greatest strengths. These packages allow\
    \ Python programmers to be highly productive and create full-featured software\
    \ much more quickly than can be done in, say, a language like C++.\n\nThat said,\
    \ using third-party packages in your code introduces several concerns that must\
    \ be addressed with care. You’ll learn about some of the pitfalls associated with\
    \ third-party packages in the next section.\n\n## 13.2 The Pitfalls of Third-Party\
    \ Packages\n\nThe beauty of third-party packages is that they give you the ability\
    \ to add functionality to your project without having to implement everything\
    \ from scratch. This offers massive boosts in productivity.\n\nBut with great\
    \ power comes great responsibility. As soon as you include someone else's package\
    \ in your project, you are placing an enormous amount of trust in those responsible\
    \ for developing and maintaining the package.\n\nBy using a package you did not\
    \ develop, you lose control over certain aspects of your project. In particular,\
    \ the maintainers of a package may release a new version that introduces changes\
    \ that are incompatible with the version you use in your project.\n\nBy default,\
    \ `pip` installs the latest release of a package, so if you distribute your code\
    \ to someone else and they install a newer version of a package required by your\
    \ project, they may not be able to run your code.\n\nThis presents a significant\
    \ challenge, for both the end user and yourself. Fortunately, Python comes with\
    \ a fix for this all-to-common problem: virtual environments.\n\nA virtual environment\
    \ creates an isolated and, most importantly, reproducible environment that you\
    \ can use to develop a project. The environment can contain a specific version\
    \ of Python, as well as specific versions of your project's dependencies.\n\n\
    When you distribute your code to someone else, they can reproduce this environment\
    \ and be confident that they can run your code without error.\n\nVirtual environments\
    \ are a more advanced topic outside the scope of this book. To learn more about\
    \ virtual environments and how to use them, check out Real Python’s [Managing\
    \ Python Dependencies With Pip and Virtual Environments](https://realpython.com/courses/managing-python-dependencies-pip-virtual-environments/)\
    \ course. In it you will learn how to:\n\n- Install, use, and manage third-party\
    \ Python packages with the “pip” package manager on Windows, macOS, and Linux,\
    \ in more detail than presented here.\n- Isolate project dependencies with so-called\
    \ virtual environments to avoid version conflicts in your Python projects.\n-\
    \ Apply a complete 7-step workflow for finding and identifying quality third-party\
    \ packages to use in your own Python projects (and justifying your decisions to\
    \ your team or manager.)\n- Set up repeatable development environments and application\
    \ deployments using the “pip” package manager and requirements files.\n\n[Managing\
    \ Python Dependencies With Pip and Virtual Environments](https://realpython.com/courses/managing-python-dependencies-pip-virtual-environments/)\
    \ is a great next step when you have completed this book.\n\n[Leave feedback on\
    \ this section »](https://realpython.com/feedback/)\n\n## 13.3 Summary and Additional\
    \ Resources\n\nIn this chapter, you learned how to install third-party packages\
    \ using Python’s package manager `pip`. You saw several useful `pip` commands,\
    \ including `pip install`, `pip list`, `pip show` and `pip uninstall`.\n\nYou\
    \ also learned about some of the pitfalls associated with third party packages.\
    \ Not every package that is downloadable with `pip` is a good choice for your\
    \ project. Since you do not have control over the code in the package you install,\
    \ you must trust that the package is safe and will work well for the users of\
    \ your program."
  mdcn: "## 13.1. 使用 Pip 安装第三方包\n\n符号 `<=` 被称为**版本说明符**，因为它指定了应安装哪个版本的包。你可以使用几种不同的版本说明符。以下是最常用的几种：\n\
    \n| 版本说明符 | 描述 |\n| :--- | :--- |\n| `<=`, `>=` | 包含小于和大于的说明符 |\n| `<`, `>` |\
    \ 不包含小于和大于的说明符 |\n| `==` | 精确等于的说明符 |\n\n让我们看一些例子。\n\n要安装小于或等于某个数字的最新版本，请使用 `<=`\
    \ 版本说明符：\n\n```\n$ python3 -m pip install requests<=3.0\n```\n\n这将安装 `requests`\
    \ 的最新版本，该版本小于或等于 3.0 版。\n\n`<=` 和 `>=` 版本说明符是**包含**的，因为它们包括说明符后面的版本号。**不包含**的版本，`<`\
    \ 和 `>`，也存在。\n\n例如，以下命令安装严格小于 3.0 版的 `requests` 的最新版本：\n\n```\n$ python3 -m pip\
    \ install requests<3.0\n```\n\n你可以组合版本说明符，以确保 `pip` 在指定的版本范围内安装最新版本。例如，以下命令安装\
    \ `requests` 在 1.0 系列中的最新版本：\n\n```\n$ python3 -m pip install requests>=1.0,<2.0\n\
    ```\n\n如果你的项目仅与该包的 1.0 系列兼容，并且你想确保安装该系列的最新更新，你会使用类似上面的命令。\n\n最后，你可以使用 `==` 版本说明符将依赖项**固定**到特定版本：\n\
    \n```\n$ python3 -m pip install requests==2.22.0\n```\n\n此命令精确安装 `requests` 包的\
    \ 2.22.0 版本。\n\n## 显示包详情\n\n既然你已经安装了 `requests` 包，你可以使用 `pip` 查看有关该包的一些详细信息：\n\
    \n```\n$ python3 -m pip show requests\nName: requests\nVersion: 2.22.0\nSummary:\
    \ Python HTTP for Humans.\nHome-page: http://python-requests.org\nAuthor: Kenneth\
    \ Reitz\nAuthor-email: me@kennethreitz.org\nLicense: Apache 2.0\nLocation: c:\\\
    users\\David\\...\\python\\python38-32\\lib\\site-packages\nRequires: chardet,\
    \ idna, certifi, urllib3\nRequired-by:\n```\n\n`python3 -m pip show` 命令显示有关已安装包的信息，包括作者的姓名和电子邮件，以及一个你可以在互联网浏览器中导航到的主页，以了解更多关于该包功能的信息。\n\
    \n`requests` 包用于从 Python 程序发出 HTTP 请求。它在许多领域都非常有用，并且是许多其他 Python 包的依赖项。\n\n##\
    \ 卸载包\n\n如果你可以使用 `pip` 安装包，那么你也可以卸载包就很有道理了。现在让我们卸载 requests 包。\n\n要卸载 `requests`，请在终端中输入以下内容：\n\
    \n```\n$ python3 -m pip uninstall requests\n```\n\n> **重要提示**\n>\n> 如果你已经有使用 `requests`\
    \ 或其依赖项的项目，你可能不想运行本节剩余部分的命令。\n\n你将立即看到以下提示：\n\n```\nUninstalling requests-2.22.0:\n\
    \  Would remove:\n    c:\\users\\damos\\...\\requests-2.22.0.dist-info\\*\n  \
    \  c:\\users\\damos\\a...\\requests\\*\nProceed (y/n)?\n```\n\n在 `pip` 实际从你的计算机中删除任何内容之前，它会先征求你的许可。多么体贴啊！\n\
    \n输入 `y` 并按 `Enter` 继续。然后你应该会看到以下确认 `requests` 已被移除的消息：\n\n```\nSuccessfully uninstalled\
    \ requests-2.22.0\n```\n\n再次查看你的包列表：\n\n```\n$ python3 -m pip list\nPackage  \
    \  Version\n---------- -------\ncertifi    2018.4.16\nchardet    3.0.4\nidna \
    \       2.7\npip         10.0.1\nsetuptools  39.0.1\nurllib3     1.23\n```\n\n\
    注意 `pip` 卸载了 `requests`，但它没有删除它的任何依赖项！这种行为是一个特性，而不是一个错误。\n\n想象一下，你已经使用 `pip` 在你的环境中安装了几个包，其中一些共享依赖项。如果\
    \ `pip` 卸载了一个包*及其*依赖项，它将使任何其他需要这些依赖项的包无法使用！\n\n不过，现在请继续运行 `pip uninstall` 来删除剩余的包。你可以用一条命令卸载所有四个包：\n\
    \n```\n$ python3 -m pip uninstall certifi chardet idna urllib3\n```\n\n```\n...\n\
    ```\n\n完成后，通过再次运行 `pip list` 来验证所有内容都已删除。你应该看到与你最初开始时相同的包列表：\n\n```\nPackage \
    \    Version\n----------  -------\npip         10.0.1\nsetuptools  39.0.1\n```\n\
    \nPython 的第三方包生态系统是其最大的优势之一。这些包允许 Python 程序员高效工作，并比使用 C++ 等语言更快地创建功能齐全的软件。\n\n\
    也就是说，在你的代码中使用第三方包会引入一些必须谨慎处理的问题。你将在下一节中了解与第三方包相关的一些陷阱。\n\n## 13.2 第三方包的陷阱\n\n\
    第三方包的美妙之处在于，它们使你能够为项目添加功能，而无需从头开始实现所有内容。这极大地提高了生产力。\n\n但是，能力越大，责任越大。一旦你在项目中包含了别人的包，你就对负责开发和维护该包的人给予了极大的信任。\n\
    \n通过使用你未开发的包，你失去了对项目某些方面的控制。特别是，包的维护者可能会发布一个新版本，该版本引入了与你项目中使用的版本不兼容的更改。\n\n默认情况下，`pip`\
    \ 安装包的最新版本，因此如果你将代码分发给其他人，他们安装了你的项目所需包的较新版本，他们可能无法运行你的代码。\n\n这对最终用户和你自己都提出了重大挑战。幸运的是，Python\
    \ 为这个非常常见的问题提供了一个解决方案：虚拟环境。\n\n虚拟环境创建了一个隔离的，最重要的是，可重现的环境，你可以用它来开发项目。该环境可以包含特定版本的\
    \ Python，以及项目依赖项的特定版本。\n\n当你将代码分发给其他人时，他们可以重现此环境，并确信他们可以无误地运行你的代码。\n\n虚拟环境是一个更高级的主题，超出了本书的范围。要了解更多关于虚拟环境以及如何使用它们的信息，请查看\
    \ Real Python 的 [使用 Pip 和虚拟环境管理 Python 依赖项](https://realpython.com/courses/managing-python-dependencies-pip-virtual-environments/)\
    \ 课程。在其中，你将学习如何：\n\n- 在 Windows、macOS 和 Linux 上，使用“pip”包管理器更详细地安装、使用和管理第三方 Python\
    \ 包，比这里介绍的更详细。\n- 使用所谓的虚拟环境隔离项目依赖项，以避免 Python 项目中的版本冲突。\n- 应用完整的 7 步工作流程来查找和识别可在你自己的\
    \ Python 项目中使用的优质第三方包（并向你的团队或经理证明你的决定是合理的）。\n- 使用“pip”包管理器和需求文件设置可重复的开发环境和应用程序部署。\n\
    \n[使用 Pip 和虚拟环境管理 Python 依赖项](https://realpython.com/courses/managing-python-dependencies-pip-virtual-environments/)\
    \ 是你完成本书后很好的下一步。\n\n[对此部分提供反馈 »](https://realpython.com/feedback/)\n\n## 13.3\
    \ 总结与补充资源\n\n在本章中，你学习了如何使用 Python 的包管理器 `pip` 安装第三方包。你看到了几个有用的 `pip` 命令，包括 `pip\
    \ install`、`pip list`、`pip show` 和 `pip uninstall`。\n\n你还了解了与第三方包相关的一些陷阱。并非每个可以通过\
    \ `pip` 下载的包都是你项目的最佳选择。由于你无法控制你安装的包中的代码，你必须相信该包是安全的，并且能很好地为你的程序用户工作。"
