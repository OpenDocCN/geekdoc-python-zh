    Sometimes you need to remove whitespace from the beginning or end of a string.
    This is especially useful when working with strings that come from user input,
    where extra whitespace characters may have been introduced by accident.


    There are three string methods that you can use to remove whitespace from a string:


    +   1. `.rstrip()`

    2. `.lstrip()`

    3. `.strip()`


