    \ the following text:\n    The product of 2 and 4 is 8.0.\n\n[Leave feedback on\
    \ this section »](https://realpython.com/python-basics/resources)\n\n## 4.7 Streamline\
    \ Your Print Statements\n\nSuppose you have a string `name = \"Zaphod\"` and two\
    \ integers `heads = 2` and `arms = 3`. You want to display them in the following\
    \ line: `Zaphod has 2 heads and 3 arms`. This is called **string interpolation**,\
    \ which is just a fancy way of saying that you want to insert some variables into\
    \ specific locations in a string.\n\nYou've already seen two ways of doing this.\
    \ The first involves using commas to insert spaces between each part of the string\
    \ inside of a `print()` function:\n\n```python\nprint(name, \"has\", str(heads),\
    \ \"heads and\", str(arms), \"arms\")\n```\n\nAnother way to do this is by concatenating\
    \ the strings with the `+` operator:\n\n```python\nprint(name + \" has \" + str(heads)\
    \ + \" heads and \" + str(arms) + \" arms\")\n```\n\nBoth techniques produce code\
    \ that can be hard to read. Trying to keep track of what goes inside or outside\
    \ of the quotes can be tough. Fortunately, there's a third way of combining strings:\
    \ [formatted string literals](https://docs.python.org/3/reference/lexical_analysis.html#f-strings),\
    \ more commonly known as f-strings.\n\nThe easiest way to understand f-strings\
    \ is to see them in action. Here's what the above string looks like when written\
    \ as an f-string:\n\n```python\n>>> f\"{name} has {heads} heads and {arms} arms\"\
    \n'Zaphod has 2 heads and 3 arms'\n```\n\nThere are two important things to notice\
    \ about the above examples:\n\n1. The string literal starts with the letter `f`\
    \ before the opening quotation mark\n2. Variable names surrounded by curly braces\
    \ (`{` and `}`) are replaced with their corresponding values without using `str()`\n\
    \nYou can also insert Python expressions in between the curly braces. The expressions\
    \ are replaced with their result in the string:\n\n```python\n>>> n = 3\n>>> m\
    \ = 4\n>>> f\"{n} times {m} is {n*m}\"\n'3 times 4 is 12'\n```\n\nIt is a good\
    \ idea to keep any expressions used in an f-string as simple as possible. Packing\
    \ in a bunch of complicated expressions into a string literal can result in code\
    \ that is difficult to read and difficult to maintain.\n\nf-strings are only available\
    \ in Python version 3.6 and above. In earlier versions of Python, the `.format()`\
    \ method can be used to get the same results. Returning to the Zaphod example,\
    \ you can use `.format()` method to format the string like this:\n\n```python\n\
    >>> \"{} has {} heads and {} arms\".format(name, heads, arms)\n'Zaphod has 2 heads\
    \ and 3 arms'\n```\n\nf-strings are shorter, and sometimes more readable, than\
    \ using `.format()`. You will see f-strings used throughout this book.\n\nFor\
    \ an in-depth guide to f-strings and comparisons to other string formatting techniques,\
    \ check out the [Python 3's f-Strings: An Improved String Formatting Syntax (Guide)](https://realpython.com/python-f-strings/)\
    \ on realpython.com\n\n> **Note**\n\nThere is also another way to print formatted\
    \ strings: using the `%` operator. You might see this in code that you find elsewhere,\
    \ and you can [read about how it works here](https://realpython.com/python-f-strings/)\
    \ if you're curious.\n\nKeep in mind that this style has been phased out entirely\
    \ in Python 3. Just be aware that it exists and you may see it in legacy Python\
    \ code bases.\n\n## Review Exercises\n\nYou can find the solutions to these exercises\
