  md: '# 8.1 Compare Values


    Conditional logic is based on performing different actions depending on whether
    or not some expression, called a **conditional**, is true or false. This idea
    is not specific to computers. Humans use conditional logic all the time to make
    decisions.


    For example, the legal age for purchasing alcoholic beverages in the United States
    is 21. The statement “If you are at least 21 years old, then you may purchase
    a beer” is an example of conditional logic. The phrase “you are at least 21 years
    old” is a conditional because it may be either true or false.


    In computer programming, conditionals often take the form of comparing two values,
    such as determining if one value is greater than another, or whether or not two
    values are equal to each other. A standard set of symbols called **boolean comparators**
    are used to make comparisons, and most of them may already be familiar to you.


    The following table describes these boolean comparators:


    | Boolean Comparator | Example | Meaning |

    | :--- | :--- | :--- |

    | > | a > b | a greater than b |

    | < | a < b | a less than b |

    | >= | a >= b | a greater than or equal to b |

    | <= | a <= b | a less than or equal to b |

    | != | a != b | a not equal to b |

    | == | a == b | a equal to b |


    The term **boolean** is derived from the last name of the English mathematician
    George Boole, whose works helped lay the foundations of modern computing. In Boole’s
    honor, conditional logic is sometimes called **boolean logic**, and conditionals
    are sometimes called **boolean expressions**.


    There is also a fundamental data type called the **boolean**, or **bool** for
    short, which can have only one of two values. In Python, these values'
