  md: 'To illustrate this idea, suppose you are a biologist. Should you drop out of
    biology and get a front-end web developer job? Probably not. But having skills
    such as the one I opened this foreword with, using requests to get data from the
    web, will be incredible powerful for you as you do biology.


    Rather than manually exporting and scraping data from the web or spreadsheets,
    with Python you can scrape 1,000’s of data sources or spreadsheets in the time
    it takes you to do just one manually. Python skills can be what takes your *biology
    power* and amplifies it well beyond your colleagues’ and makes it your *superpower*.


    # Dan and Real Python


    Finally, let me leave you with a comment on your authors. Dan Bader along with
    the other Real Python authors work day in and out to bring clear and powerful
    explanations of Python concepts to all of us via realpython.com.


    They have a unique view into the Python ecosystem and are keyed into what beginners
    need to know.


    I’m confident leaving you in their hands on this Python journey. Go forth and
    learn this amazing language using this great book. Most importantly, remember
    to have fun!


    — **Michael Kennedy**, Founder of Talk Python (@mkennedy)'
