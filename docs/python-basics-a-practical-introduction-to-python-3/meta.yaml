    # 11.2 Working With Packages


    Modules allow you to divide a program in to individual files that can be reused
    as needed. Related code can be organized into a single module and kept separate
    from other code.


    Package take this organizational structure one step further by allowing you to
    group related modules under a single namespace.


    In this section, you''ll learn how to create your own Python package and import
    code from that package into another module.'
