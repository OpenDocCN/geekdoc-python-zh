  md: '# How to Create a Tuple


    There are a few ways to create a tuple in Python. We will cover two of them:


    +   1. Tuple literals

    2. The tuple() built-in


    # Tuple Literals


    Just like a string literal is a string that is explicitly created by surrounding
    some text with quotes, a **tuple literal** is a tuple that is written out explicitly
    as a comma-separated list of values surrounded by parentheses.


    Here''s an example of a tuple literal:


    ```

    >>> my_first_tuple = (1, 2, 3)

    ```


    This creates a tuple containing the integers 1, 2, and 3, and assigns it to the
    name `my_first_tuple`.


    You can check that `my_first_tuple` is a tuple using `type()`:


    ```

    >>> type(my_first_tuple)

    <class ''tuple''>

    ```


    Unlike strings, which are sequences of characters, tuples may contain any type
    of value, including values of different types. The tuple (1, 2.0, "three") is
    perfectly valid.


    There is a special tuple that doesn''t contain any values. This tuple is called
    the **empty tuple** and can be created by typing two parentheses without anything
    between them:


    ```

    >>> empty_tuple = ()

    ```


    At first glance, the empty tuple may seem like a strange and useless concept,
    but it is actually quite practical.'
