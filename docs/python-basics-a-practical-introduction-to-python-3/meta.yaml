    ```\n\n如果 `sport` 是 \"basketball\" 且玩家1的得分大于玩家2的得分，那么 `p1_wins_basketball` 为 True。\n\
    \n接下来，对 `p1_wins_golf` 变量进行类似的操作。如果 `sport` 是 \"golf\" 且玩家1的得分小于玩家2的得分，那么 `p1_wins_golf`\
    \ 为 True。\n\n最后，如果玩家1赢得了篮球比赛或高尔夫比赛，`p1_wins` 将为 True，否则为 False。\n\n使用这段代码，你可以大大简化程序：\n\
    \n```\nif p1_score == p2_score:\n    print(\"The game is a draw.\")\nelif (sport.lower()\
    \ == \"basketball\") or (sport.lower() == \"golf\"):\n    sport = sport.lower()\n\
    \    p1_wins_basketball = (sport == \"basketball\") and (p1_score > p2_score)\n\
    \    p1_wins_golf = (sport == \"golf\") and (p1_score < p2_score)\n    p1_wins\
    \ = p1_wins_basketball or p1_wins_golf\n    if p1_wins:\n        print(\"Player\
    \ 1 wins.\")\n    else:\n        print(\"Player 2 wins.\")\nelse:\n    print(\"\
    Unknown sport\")\n```\n\n在这个修改后的程序版本中，程序只有四种可能的执行路径，并且代码更容易理解。\n\n嵌套的 `if` 语句有时是必要的。然而，如果你发现自己写了很多嵌套的\
    \ `if` 语句，停下来思考一下如何简化代码可能是个好主意。\n\n## 复习练习\n\n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到这些练习的解答和许多其他额外资源。\n\n- 1. 编写一个脚本，使用 `input()` 函数提示用户输入一个单词，将该输入存储在一个变量中，然后使用一组\
    \ `if`、`elif` 和 `else` 语句显示该字符串的长度是小于5个字符、大于5个字符还是等于5个字符。\n\n对此部分提供反馈 »\n\n##\
    \ 8.4 挑战：找出一个数的因数\n\n正整数 $n$ 的因数是任何小于或等于 $n$ 且能整除 $n$ 而没有余数的正整数。\n\n例如，3 是 12\
    \ 的因数，因为 12 除以 3 等于 4，没有余数。然而，5 不是 12 的因数，因为 5 除以 12 商为 2，余数为 2。\n\n编写一个脚本 `factors.py`，要求用户输入一个正整数，然后打印出该数的所有因数。以下是程序的一个示例运行及输出：\n\
    \n```\nEnter a positive integer: 12\n1 is a factor of 12\n2 is a factor of 12\n\
    3 is a factor of 12\n4 is a factor of 12\n6 is a factor of 12\n12 is a factor\
    \ of 12\n```\n\n**提示：** 回想一下第5章的内容，你可以使用 `%` 运算符来获取一个数除以另一个数的余数。\n\n*你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到这个代码挑战的解答和许多其他额外资源。*\n\n对此部分提供反馈 »\n\n## 8.5 跳出循环模式\n\n在第6章中，你学习了如何使用 `for`\
    \ 或 `while` 循环来重复执行一段代码多次。循环对于执行重复性任务以及对许多不同输入应用某些处理非常有用。\n\n将 `if` 语句与 `for`\
    \ 循环结合起来，为控制代码的执行方式开辟了强大的技术。\n\n在本节中，你将学习如何编写嵌套在 `for` 循环中的 `if` 语句，并了解两个关键字——`break`\
    \ 和 `continue`——它们允许你更精确地控制循环中的执行流程。\n\n### if 语句和 for 循环\n\n`for` 循环中的代码块就像任何其他代码块一样。这意味着你可以在\
    \ `for` 循环中嵌套一个 `if` 语句，就像在代码中的任何其他地方一样。\n\n以下示例使用一个带有 `if` 语句的 `for` 循环来计算并显示所有小于100的偶数的和：\n\
    \n```\nsum_of_evens = 0\n\nfor n in range(1, 100):\n    if n % 2 == 0:\n     \
    \   sum_of_evens = sum_of_evens + n\n\nprint(sum_of_evens)\n```\n\n首先，`sum_of_evens`\
    \ 变量被初始化为0。然后程序遍历数字1到99，并将偶数值加到 `sum_of_evens`。`sum_of_evens` 的最终值是2450。\n\n###\
    \ break\n\n`break` 关键字告诉 Python 字面上跳出循环。也就是说，循环完全停止，循环之后的任何代码都会被执行。\n\n例如，以下代码遍历数字0到3，但当遇到数字2时停止循环：\n\
    \n```\nfor n in range(0, 4):\n    if n == 2:\n        break\n    print(n)\n\n\
    print(f\"Finished with n = {n}\")\n```\n\n输出中只打印了前两个数字：\n\n```\n0\n1\nFinished\
    \ with n = 2\n```\n\n### continue\n\n`continue` 关键字用于跳过循环体中剩余的任何代码，并继续下一次迭代。\n\
    \n例如，以下代码遍历数字0到3，打印每个数字，但跳过数字2：\n\n```\nfor i in range(0, 4):\n    if i == 2:\n\
    \        continue\n    print(i)\n\nprint(f\"Finished with i = {i}\")\n```\n\n\
    输出中打印了除2以外的所有数字：\n\n```\n0\n1\n3\nFinished with i = 3\n```\n\n> **注意**\n\n给你的变量起简短但描述性的名字总是一个好主意，这样可以很容易地看出它们应该代表什么。\n\
    \n字母 i、j 和 k 是例外，因为它们在编程中非常常见。\n\n这些字母几乎总是在我们需要一个“一次性”数字，仅仅是为了在循环过程中计数时使用。\n\n\
    总结一下，`break` 关键字用于在满足某个条件时停止循环，而 `continue` 关键字用于在满足某个条件时跳过循环的一次迭代。\n\n### for...else\
    \ 循环\n\n在 Python 中，循环可以有自己的 `else` 子句，尽管这种结构并不常用。\n\n让我们看一个例子：\n\n```\nphrase\
    \ = \"it marks the spot\"\n\nfor character in phrase:\n    if character == \"\
    X\":\n        break\nelse:\n    print(\"There was no 'X' in the phrase\")\n```\n\
    \n这个例子中的 `for` 循环遍历短语 \"it marks the spot\" 中的字符。如果找到字符 \"X\"，循环就会中断。如果循环在没有找到\
    \ \"X\" 的情况下完成，则执行 `else` 子句。"
