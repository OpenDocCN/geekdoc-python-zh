    # Chapter 16


    ## Interacting With the Web


    The Internet hosts perhaps the greatest source of information—and misinformation—on
    the planet.


    Many disciplines, such as data science, business intelligence, and investigative
    reporting, can benefit enormously from collecting and analyzing data from websites.


    **Web scraping** is the process of collecting and parsing raw data from the web,
    and the Python community has come up with some pretty powerful web scraping tools.


    **In this chapter, you will learn how to:**


    - Parse website data using string methods and regular expressions

    - Parse website data using an HTML parser

    - Interact with forms and other website components


    > **Important**


    Some experience with **HTML**, short for **HyperText Markup Language**—will be
    helpful when reading this chapter. To learn more about HTML, check out the [resources
    on Real Python](https://realpython.com).


    Let''s go!


    ## 16.1 Scrape and Parse Text From Websites


    Collecting data from websites using an automated process is known as web scraping.
    Some websites explicitly forbid users from scraping their data with automated
    tools like the ones you will create in this chapter. Websites do this for either
    of two possible reasons:


    1. The site has a good reason to protect its data. For instance, Google Maps doesn’t
    let you request too many results too quickly.

    2. Making many repeated requests to a website’s server may use up bandwidth, slowing
    down the website for other users and potentially overloading the server such that
    the website stops responding entirely.


    > **Important**


    You should always check a website’s acceptable use policy before scraping its
    data to see if accessing the website by using automated tools is a violation of
    its terms of use. Legally, web scraping against the wishes of a website is very
    much a [gray area](https://realpython.com).


    *Please be aware that the following techniques may be illegal when used on websites
    that prohibit web scraping.*


    Let’s start by grabbing all of the HTML code from a single webpage. We’ll take
    a [straightforward page](https://realpython.com) that’s been set up just for practice:


    ```python

    from urllib.request import urlopen


    url = "http://olympus.realpython.org/profiles/aphrodite"

    html_page = urlopen(url)

    ```


    ```python

    html_text = html_page.read().decode("utf-8")


    print(html_text)

    ```


    This displays the following result for us, which represents the full HTML of the
    page just as a web browser would see it:


    ```html

    <html>

    <head>

    <title>Profile: Aphrodite</title>

    </head>

    <body bgcolor="yellow">

    <center>

    <br><br>

    <img src="/static/aphrodite.gif" />

    <h2>Name: Aphrodite</h2>

    <br><br>

    Favorite animal: Dove

    <br><br>

    Favorite color: Red

    <br><br>

    Hometown: Mount Olympus

    </center>

    </body>

    </html>

    ```


    Calling `urlopen()` will cause the following error if Python cannot connect to
    the Internet:


    ```

    URLError: <urlopen error [Errno 11001] getaddrinfo failed>

    ```


    If you provide an invalid web address that can’t be found, you will see the following
    error, which is equivalent to the “404” page that a browser would load:


    ```

    HTTPError: HTTP Error 404: Not Found

    ```


    Now we can scrape specific information from the webpage using **text parsing**
    techniques. Text parsing involves looking through the full string of text and
    grabbing only the pieces that are relevant to us.


    For instance, if we wanted to get the title of the webpage (in this case, “Profile:
    Aphrodite”), we could use the string `find()` method to search through the text
    of the HTML for the `<title>` tags and parse out the actual title using index
    numbers:


    ```python

    from urllib.request import urlopen


    url = "http://olympus.realpython.org/profiles/aphrodite"

    page = urlopen(url)

    html = page.read().decode(''utf-8'')


    start_tag = "<title>"

    end_tag = "</title>"

    start_index = html.find(start_tag) + len(start_tag)

    end_index = html.find(end_tag)


    print(html[start_index:end_index])

    ```


    Running this script displays the HTML code limited to only the text in the title:


    ```

    Profile: Aphrodite

    ```


    Of course, this worked for a simple example, but HTML in the real world can be
    much more complicated and far less predictable. For a small taste of the “expectations
    versus reality” of text parsing, visit /profiles/poseidon and view the HTML source
    code.


    The HTML for the /profiles/poseidon page looks similar to the /profiles/aphrodite
    page, but there is a small difference. The opening `<title >` tag has an extra
    space in it before the closing `>` character. Re-run the script you used to parse
    the title from the profiles/aphrodite page, but this time set the `url` variable
    to `http://olympus.realpython.org/profiles/poseidon`.


    Instead of just seeing the text `Profile: Poseidon`, you get the following:


    ```html

    <head>

    <title >Profile: Poseidon

    ```


    The modified script doesn''t find the beginning of the `<title>` tag correctly
    because of that pesky space before the closing `>`. So, `html.find(end_tag)` returns
    -1 because the exact string `<title>` wasn''t found anywhere. When -1 is added
    to `len(start_tag)`, which is 7, the `start_index` variable gets assigned the
    value 6.


    The 6th character of the `html_text` string is the beginning `<` of the `<head>`
    tag. This means that `html[start_index:end_index]` returns all of the HTML starting
    with `<head>` and ending just before `</title>`.


    These sorts of problems can occur in countless unpredictable ways. A more reliable
    alternative than using `find()` is to use **regular expressions**. [Regular expressions](https://automatetheboringstuff.com/2e/chapter7/)—or
    “regex” for short—are strings that can be used to determine whether or not text
    matches a particular pattern.


    > **Note**


    Regular expressions are not particular to Python. They are a general programming
    concept that can be used with a wide variety of programming languages. Regular
    expressions use a language all of their own that is notoriously difficult to learn
    but incredibly useful once mastered.


    Python provides built-in support for regular expressions through the `re` module.
    Just as Python uses the backslash character as an “escape character” for representing
    special characters that can''t simply be typed into strings, regular expressions
    use many different “special” characters (called **meta-characters**) that are
    interpreted as ways to signify different types of patterns.


    For instance, the asterisk character, `*`, stands for “zero or more” of whatever
    came just before the asterisk. In the following example, the `re.findall()` function
    is used to find any text within a string'
