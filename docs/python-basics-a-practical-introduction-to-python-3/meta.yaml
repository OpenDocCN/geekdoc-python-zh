    Again, Python throws a TypeError because the + operator expects both things on
    either side of it to be of the same type. If any one of the objects on either
    side of + is a string, Python tries to perform string concatenation. Addition
    will only be performed if both objects are numbers. So, to add "3" + 3 and get
    6, you must first convert the string "3" to a number.


    # Converting Strings to Numbers


    The TypeError errors you saw in the previous section highlight a common problem
    encountered when working with user input: type mismatches when trying to use the
    input in an operation that requires a number and not a string.


    Let''s look at an example. Save and run the following script.


    ```

    num = input("Enter a number to be doubled: ")

    doubled_num = num * 2

    print(doubled_num)

    ```


    When you enter a number, such as 2, you expect the output to be 4, but in this
    case, you get 22. Remember, input() always returns a string, so if you input 2,
    then num is assigned the string "2", not the integer 2. Therefore, the expression
    num * 2 returns the string "2" concatenated with itself, which is "22".


    To perform arithmetic on numbers that are contained in a string, you must first
    convert them from a string type to a number type. There are two ways to do this:
    int() and float().


    int() stands for **integer** and converts objects into whole numbers, while float()
    stands for **floating-point number** and converts objects into numbers with decimal
    points. Here''s what using them looks like in the interactive window:'
- md: "## 4.6. Working With Strings and Numbers\n\n```python\n>>> int(\"12\")\n12\n\
    \n>>> float(\"12\")\n12.0\n```\n\nNotice how `float()` adds a decimal point to\
    \ the number. Floating-point numbers always have at least one decimal place of\
    \ precision. For this reason, you can't change a string that looks like a floating-point\
    \ number into an integer because you would lose everything after the decimal point:\n\
    \n```python\n>>> int(\"12.0\")\nTraceback (most recent call last):\n  File \"\
    <stdin>\", line 1, in <module>\nValueError: invalid literal for int() with base\
    \ 10: '12.0'\n```\n\nEven though the extra 0 after the decimal place doesn't add\
    \ any value to the number, Python won't change 12.0 into 12 because it would result\
    \ in the loss of precision.\n\nLet's revisit the script from the beginning of\
    \ this section and see how to fix it. Here's the script again:\n\n```python\n\
    num = input(\"Enter a number to be doubled: \")\ndoubled_num = num * 2\nprint(doubled_num)\n\
    ```\n\nThe issue lies in the line `doubled_num = num * 2` because `num` references\
    \ a string and 2 is an integer. You can fix the problem by wrapping `num` with\
    \ either `int()` or `float()`. Since the prompts asks the user to input a number,\
    \ and not specifically an integer, let's convert `num` to a floating-point number:\n\
    \n```python\nnum = input(\"Enter a number to be doubled: \")\ndoubled_num = float(num)\
    \ * 2\nprint(doubled_num)\n```\n\nNow when you run this script and input 2, you\
    \ get 4.0 as expected. Try it out!\n\n## Converting Numbers to Strings\n\nSometimes\
    \ you need to convert a number to a string. You might do this, for example, if\
    \ you need to build a string from some pre-existing variables that are assigned\
    \ to numeric values.\n\nAs you've already seen, the following produces a TypeError:\n\
    \n```python\n>>> num_pancakes = 10\n>>> \"I am going to eat \" + num_pancakes\
    \ + \" pancakes.\"\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nTypeError: can only concatenate str (not \"int\") to str\n```\n\
    \nSince num_pancakes is a number, Python can't concatenate it with the string\
    \ \"I'm going to eat\". To build the string, you need to convert num_pancakes\
    \ to a string using str():\n\n```python\n>>> num_pancakes = 10\n>>> \"I am going\
    \ to eat \" + str(num_pancakes) + \" pancakes.\"\n'I am going to eat 10 pancakes.'\n\
    ```\n\nYou can also call str() on a number literal:\n\n```python\n>>> \"I am going\
    \ to eat \" + str(10) + \" pancakes.\"\n'I am going to eat 10 pancakes.'\n```\n\
    \nstr() can even handle arithmetic expressions:\n\n```python\n>>> total_pancakes\
    \ = 10\n>>> pancakes_eaten = 5\n>>> \"Only \" + str(total_pancakes - pancakes_eaten)\
    \ + \" pancakes left.\"\n'Only 5 pancakes left.'\n```\n\nYou're not limited to\
    \ numbers when using str(). You can pass it all sorts of objects to get their\
    \ string representations:\n\n```python\n>>> str(print)\n'<built-in function print>'\n\
    \n>>> str(int)\n\"<class 'int'>\"\n\n>>> str(float)\n\"<class 'float'>\"\n```\n\
    \nThese examples may not seem very useful, but they illustrate how flexible str()\
    \ is.\n\nIn the next section, you'll learn how to format strings neatly to display\
    \ values in a nice, readable manner. Before you move on, though, check your understanding\
    \ with the following review exercises.\n\n## Review Exercises\n\nYou can find\
    \ the solutions to these exercises and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n1. Create a string containing an integer, then convert that string into an actual\
    \ integer object using `int()`. Test that your new object is a number by multiplying\
    \ it by another number and displaying the result.\n2. Repeat the previous exercise,\
