    \ a widget in the third column of the second row.\n\nFor example, the following\
    \ script creates a 3 × 3 grid of frames with Label widgets packed into them:\n\
    \n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\n\nfor i in range(3):\n\
    \    for j in range(3):\n        frame = tk.Frame(\n            master=window,\n\
    \            relief=tk.RAISED,\n            borderwidth=1\n        )\n       \
    \ frame.grid(row=i, column=j)\n        label = tk.Label(master=frame, text=f\"\
    Row {i}\\nColumn {j}\")\n        label.pack()\n\nwindow.mainloop()\n```\n\nHere’s\
    \ what the resulting window looks like:\n\n![](img/4efa9a991b645f75be61871447c559ca_596_0.png)\n\
    \nTwo geometries managers are being used in this example. Each Frame is attached\
    \ to the window with the .grid() geometry manager, and each label is attached\
    \ to its master Frame with .pack().\n\nThe important thing to realize here is\
    \ that even though `.grid()` is called on each `Frame` object, the geometry manager\
    \ applies to the `window` object. Similarly, the layout of each `frame` is controlled\
    \ with the `.pack()` geometry manager.\n\nThe frames in the previous example are\
    \ placed tightly next to one another. To add some space around each `Frame`, you\
    \ can set the padding of each cell in the grid. **Padding** is just some blank\
    \ space that surrounds a widget and separates it visually from its contents.\n\
    \nThere are two types of padding: **external padding** and **internal padding**.\
    \ External padding adds some space around the outside of a grid cell. It is controlled\
    \ with two keyword arguments of `.grid()`:\n\n1. `padx`, which adds padding in\
    \ the horizontal direction\n2. `pady`, which adds padding in the vertical direction.\n\
    \nBoth `padx` and `pady` are measured in pixels, not text units, so setting both\
    \ of them to the same value with create the same amount of padding in both directions.\n\
    \nLet's add some padding around the outside of the frames in the previous example:\n\
    \n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\n\nfor i in range(3):\n\
    \    for j in range(3):\n        frame = tk.Frame(\n            master=window,\n\
    \            relief=tk.RAISED,\n            borderwidth=1\n        )\n       \
    \ frame.grid(row=i, column=j, padx=5, pady=5)\n        label = tk.Label(master=frame,\
    \ text=f\"Row {i}\\nColumn {j}\")\n        label.pack()\n\nwindow.mainloop()\n\
    ```\n\nHere's the resulting window:\n\n![](img/4efa9a991b645f75be61871447c559ca_598_0.png)\n\
    \n.pack() also has padx and pady parameters. The following code is nearly identical\
    \ to the previous code, except that 5 pixels of additional padding have been added\
    \ around each Label in the both the x and y directions:\n\n```python\nimport tkinter\
    \ as tk\n\nwindow = tk.Tk()\n\nfor i in range(3):\n    for j in range(3):\n  \
    \      frame = tk.Frame(\n            master=window,\n            relief=tk.RAISED,\n\
    \            borderwidth=1\n        )\n        frame.grid(row=i, column=j, padx=5,\
    \ pady=5)\n\n        label = tk.Label(master=frame, text=f\"Row {i}\\nColumn {j}\"\
    )\n        label.pack(padx=5, pady=5)\n\nwindow.mainloop()\n```\n\nThe extra padding\
    \ around the Label widgets gives each cell in the grid a little bit of breathing\
    \ room between the Frame border and the text in the Label:\n\n![](img/4efa9a991b645f75be61871447c559ca_599_0.png)\n\
    \nThat looks pretty nice! But, if you try and expand the window in any direction,\
    \ you’ll notice that the layout isn’t very responsive. The whole grid stays at\
    \ the top left corner as the window expands.\n\nYou can adjust how the rows and\
    \ columns of the grid grow as the window is resized using the `.columnconfigure()`\
    \ and `.rowconfigure()` methods on the `window` object. Remember, the grid is\
    \ attached to `window`, even though you are calling `.grid()` on each `Frame`\
    \ widget.\n\nBoth `.columnconfigure()` and `.rowconfigure()` take three essential\
    \ arguments:\n\n1. The index of the grid column or row that you want to configure.\
    \ You may also specify a list of indices to configure multiple rows or columns\
    \ at the same time.\n2. A keyword argument called `weight` that determines how\
    \ the column or row should respond to window resizing relative to the other columns\
    \ and rows.\n3. A keyword argument called `minsize` that sets the minimum size\
    \ of the row height or column width in pixels.\n\nweight is set to 0 by default,\
    \ which means that the column or row does not expand as the window resizes. If\
    \ every column and row is given a weight of 1, they all grow at the same rate.\
    \ If one column has a weight of 1 and another a weight of 2, then the second column\
    \ expands at twice the rate of the first.\n\nLet's adjust the previous script\
    \ to better handle window resizing:\n\n```python\nimport tkinter as tk\n\nwindow\
    \ = tk.Tk()\n\nfor i in range(3):\n    window.columnconfigure(i, weight=1, minsize=75)\n\
    \    window.rowconfigure(i, weight=1, minsize=50)\n\n    for j in range(0, 3):\n\
    \        frame = tk.Frame(\n            master=window,\n            relief=tk.RAISED,\n\
    \            borderwidth=1\n        )\n        frame.grid(row=i, column=j, padx=5,\
    \ pady=5)\n\n        label = tk.Label(master=frame, text=f\"Row {i}\\nColumn {j}\"\
    )\n        label.pack(padx=5, pady=5)\n\nwindow.mainloop()\n```\n\nThe .columnconfigure()\
    \ and .rowconfigure() methods are placed in the body of the outer for loop. You\
    \ could explicitly configure each column and row outside of the for loop, but\
    \ that would require writing an additional six lines of code.\n\nOn each iteration\
    \ of the loop, the i-th column and row are configured to have a weight of 1. This\
    \ ensures that each row and column expands at the same rate whenever the window\
    \ is resized."
