    \n## 6.4 Run in Circles\n\nOne of the great things about computers is that you\
    \ can make them do the same thing over and over again, and they rarely complain\
    \ or get tired.\n\nA **loop** is a block of code that gets repeated over and over\
    \ again either a specified number of times or until some condition is met. There\
    \ are two kinds of loops in Python: **while loops** and **for loops**. In this\
    \ section, you'll learn how to use both.\n\nLet's start by looking at how `while`\
    \ loops work.\n\n## The while Loop\n\nwhile loops repeat a section of code while\
    \ some condition is true. There are two parts to every while loop:\n\n1. The while\
    \ **statement** starts with the while keyword, followed by a **test condition**,\
    \ and ends with a colon (:).\n2. The **loop body** contains the code that gets\
    \ repeated at each step of the loop. Each line is indented four spaces.\n\nWhen\
    \ a while loop is executed, Python evaluates the test condition and determines\
    \ if it is true or false. If the test condition is true, then the code in the\
    \ loop body is executed. Otherwise, the code in the body is skipped and the rest\
    \ of the program is executed.\n\nIf the test condition is true and the body of\
    \ the loop is executed, then once Python reaches the end of the body, it returns\
    \ to the while statement and re-evaluates the test condition. If the test condition\
    \ is still true, the body is executed again. If it is false, the body is skipped.\n\
    \nThis process repeats over and over until the test condition fails, causing Python\
    \ to loop over the code in the body of the while loop.\n\nLet's look at an example.\
    \ Type the following code into the interactive window:\n\n```\n>>> n = 1\n>>>\
    \ while n < 5:\n...     print(n)\n...     n = n + 1\n...\n1\n2\n3\n4\n```\n\n\
    First, the integer 1 is assigned to the variable n. Then a while loop is created\
    \ with the test condition n < 5, which checks whether or not the value of n is\
    \ less than 5.\n\nIf n is less than 5, the body of the loop is executed. There\
    \ are two lines of code in the loop body. In the first line, the value of n is\
    \ printed on the screen, and then n is **incremented** by 1 in the second line.\n\
    \nThe loop execution takes place in five steps, described in the following table:\n\
    \n| Step # | Value of n | Test Condition | What Happens |\n| :--- | :--- | :---\
    \ | :--- |\n| 1 | 1 | 1 < 5 (true) | 1 printed; n incremented to 2 |\n| 2 | 2\
    \ | 2 < 5 (true) | 2 printed; n incremented to 3 |\n| 3 | 3 | 3 < 5 (true) | 3\
    \ printed; n incremented to 4 |\n| 4 | 4 | 4 < 5 (true) | 4 printed; n incremented\
    \ to 5 |\n| 5 | 5 | 5 < 5 (false) | Nothing printed; loop ends. |\n\nIf you aren't\
    \ careful, you can create an **infinite loop**. This happens when the test condition\
    \ is always true. An infinite loop never terminates. The loop body keeps repeating\
    \ forever.\n\nHere's an example of an infinite loop:\n\n```\n>>> n = 1\n>>> while\
    \ n < 5:\n...     print(n)\n...\n```\n\nThe only difference between this `while`\
    \ loop and the previous one is that n is never incremented in the loop body. At\
    \ each step of the loop, n is equal to 1. That means the test condition n < 5\
    \ is always true, and the number 1 is printed over and over again forever.\n\n\
    > **Note**\n\nInfinite loops aren't inherently bad. Sometimes they are exactly\
    \ the kind of loop you need.\n\nFor example, code that interacts with hardware\
    \ may use an infinite loop to constantly check whether or not a button or switch\
    \ has been activated.\n\nIf you run a program that enters an infinite loop, you\
    \ can force Python to quit by pressing `Ctrl+C`. Python stops running the program\
    \ and raises a `KeyboardInterrupt` error:\n\n```\nTraceback (most recent call\
    \ last):\n  File \"<pyshell#8>\", line 2, in <module>\n    print(n)\nKeyboardInterrupt\n\
    ```\n\nLet's look at an example of a `while` loop in practice. One use of a `while`\
    \ loop is to check whether or not user input meets some condition and, if not,\
    \ repeatedly ask the user for new input until valid input is received.\n\nFor\
    \ instance, the following program continuously asks a user for a positive number\
    \ until a positive number is entered:\n\n```\nnum = float(input(\"Enter a positive\
    \ number: \"))\n\nwhile num <= 0:\n    print(\"That's not a positive number!\"\
    )\n    num = float(input(\"Enter a positive number: \"))\n```\n\nFirst, the user\
    \ is prompted to enter a positive number. The test condition `num <= 0` determines\
    \ whether or not `num` is less than or equal to 0.\n\nIf `num` is positive, then\
    \ the test condition fails. The body of the loop is skipped and the program ends.\n\
    \nOtherwise, if `num` is 0 or negative, the body of the loop executes. The user\
    \ is notified that their input was incorrect, and they are prompted again to enter\
    \ a positive number.\n\n`while` loops are perfect for repeating a section of code\
    \ while some condition is met. They aren't well-suited, however, for repeating\
    \ a section of code a specific number of times.\n\n## The `for` Loop\n\nA `for`\
    \ loop executes a section of code once for each item in a collection of items.\
    \ The number of times that the code is executed is determined by the number of\
    \ items in the collection.\n\nLike its `while` counterpart, the `for` loop has\
    \ two main parts:\n\n1. The **for statement** begins with the `for` keyword, followed\
    \ by a **membership expression**, and ends in a colon (:).\n2. The **loop body**\
    \ contains the code to be executed at each step of the loop, and is indented four\
    \ spaces.\n\nLet's look at an example. The following `for` loop prints each letter\
    \ of the string \"Python\" one at a time:\n\n```\nfor letter in \"Python\":\n\
    \    print(letter)\n```\n\nIn this example, the `for` statement is `for letter\
    \ in \"Python\"`. The membership expression is `letter in \"Python\"`.\n\nAt each\
    \ step of the loop, the variable `letter` is assigned the next letter in the string\
    \ \"Python\", and then the value of `letter` is printed.\n\nThe loops runs once\
    \ for each character in the string \"Python\", so the loop body executes six times.\
    \ The following table summarizes the execution of this `for` loop:\n\n| Step #\
    \ | Value of `letter` | What Happens |\n| :--- | :--- | :--- |\n| 1 | \"P\" |\
    \ P is printed |"
