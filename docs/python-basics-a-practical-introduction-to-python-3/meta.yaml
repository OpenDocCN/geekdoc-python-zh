    > **Important**


    Notice that you save the PDF file by passing the file object to the `PdfFileWriter`
    object''s `.write()` method, and *not* the file object''s `.write()` method.


    In particular, the following code will not work:


    python

    >>> with Path("blank.pdf").open(mode="wb") as output_file:

    ...     output_file.write(pdf_writer)



    This might seem backwards to you, so make sure you avoid this mistake!


    `PdfFileWriter` objects can write to new PDF files, but they can''t create new
    content from scratch other than blank pages. This might seem like a big problem,
    but in many situations you don''t need to create new content. Often, you''ll work
    with pages extracted from PDF files that you''ve opened with a `PdfFileReader`
    instance.


    > **Note**


    You''ll learn how to create PDF files from scratch in Section 13.8 *Create a PDF
    File From Scratch*.


    In the example you saw above, there were three steps to create a new PDF file
    using `PyPDF2`:


    +   1. Create a `PdfFileWriter` instance

    2. Add one or more pages to the `PdfFileWriter` instance

    3. Write to a file using the `PdfFileWriter.write()` method


    You''ll see this pattern over and over as you learn various ways to add pages
    to a `PdfFileWriter` instance.'
