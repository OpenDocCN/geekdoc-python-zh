    # 6.7 Summary and Additional Resources


    In this chapter, you learned about two of the most essential concepts in programming:
    functions and loops.


    First, you learned how to define your own custom functions. You saw that functions
    are made up of two parts:


    +   1. The **function signature**, which starts with the `def` keyword and includes
    the name of the function and the function’s parameters

    2. The **function body**, which contains the code that runs whenever the function
    is called.


    Functions help avoid repeating similar code throughout a program by creating re-usable
    components. This helps make code easier to read and maintain.


    Then you learned about Python’s two kinds of loops:


    +   1. **while loops** repeat some code while some condition remains true

    2. **for loops** repeat some code for each element in a set of objects


    Finally, you learned what a **scope** is and how Python resolves scope using the
    LEGB rule.'
