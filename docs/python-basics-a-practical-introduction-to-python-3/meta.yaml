    \n假设我们的应用程序需要响应按键操作。我们需要检查 `event` 是否由用户按下键盘上的键产生，如果是，则将 `event` 传递给按键事件处理函数。\n\
    \n我们假设如果事件是按键事件对象，则 `event` 的 `.type` 属性被设置为字符串 \"keypress\"，并且 `.char` 属性包含所按键的字符。\n\
    \n> 注意\n\n让我们添加一个 `handle_keypress()` 函数并更新我们的事件循环代码：\n\n```python\nevents_list\
    \ = []\n\n# 创建一个事件处理函数\ndef handle_keypress(event):\n    \"\"\"打印与按键关联的字符\"\"\"\
