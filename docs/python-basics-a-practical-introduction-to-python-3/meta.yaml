- md: "## Searching For Files In a Directory\n\nSometimes you only need to iterate\
    \ over files of a certain type, or files with certain naming schemes. You can\
    \ use the `Path.glob()` method on a path representing a directory to get an iterable\
    \ over directory contents that meet some criteria.\n\nIt might seem strange that\
    \ a method that searches for files is called `.glob()`. The reason the method\
    \ is given this name is historical. In early versions of the Unix operating system,\
    \ a program called `glob` was used to expand file path patterns to full file paths.\n\
    \nThe `.glob()` method does something similar. You pass to the method a string\
    \ containing a partial path with a wildcard character and `.glob()` returns a\
    \ list of file paths that match the pattern.\n\nA **wildcard character** is a\
    \ special character that acts as a placeholder in a **pattern**. They are replaced\
    \ with other characters to create a concrete file path. For example, in the pattern\
    \ `\"*.txt\"`, the asterisk `*` is a wildcard character that can be replaced with\
    \ any number of other characters.\n\nThe pattern `\"*.txt\"` matches any file\
    \ path that ends with `.txt`. That is, if replacing the `*` in the pattern with\
    \ everything in some file path up to the last four characters results in the original\
    \ file path, then that file path is a **match** for the pattern `\"*.txt\"`.\n\
    \nLet's look at an example using the `new_directory/` folder previously assigned\
    \ to the `new_dir` variable:\n\n```\n>>> for path in new_dir.glob(\"*.txt\"):\n\
    ...     print(path)\n...\nC:\\Users\\David\\new_directory\\file1.txt\n```\n\n\
