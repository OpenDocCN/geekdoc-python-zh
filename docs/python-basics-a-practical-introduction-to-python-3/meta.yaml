    of the PDF, and then create a new PDF file containing just the single extracted
    page.


    Open IDLE’s interactive window and import both `PdfFileReader` and `PdfFileWriter`
    from `PyPDF2`, as well as the `Path` class from the `pathlib` module:


    ```

