  md: '# String Slicing


    Suppose you need the string containing just the first three letters of the string
    "apple pie". You could access each character by index and concatenate them, like
    this:


    ```

    >>> first_three_letters = flavor[0] + flavor[1] + flavor[2]

    >>> first_three_letters

    ''app''

    ```


    If you need more than just the first few letters of a string, getting each character
    individually and concatenating them together is clumsy and long-winded. Fortunately,
    Python provides a way to do this with much less typing.


    You can extract a portion of a string, called a **substring**, by inserting a
    colon between two index numbers inside of square brackets, like this:


    ```

    >>> flavor = "apple pie"

    >>> flavor[0:3]

    ''app''

    ```


    flavor[0:3] returns the first three characters of the string assigned to flavor,
    starting with the character with index 0 and going up to, but not including, the
    character with index 3. The [0:3] part of flavor[0:3] is called a **slice**. In
    this case, it returns a slice of "apple pie". Yum!


    String slices can be confusing because the substring returned by the slice includes
    the character whose index is the first number, but doesn''t include the character
    whose index is the second number.


    To remember how slicing works, you can think of a string as a sequence of square
    slots. The left and right boundary of each slot is numbered from zero up to the
    length of the string, and each slot is filled with a character in the string.


    Here''s what this looks like for the string "apple pie":


    ```

    | a | p | p | l | e |   | p | i | e |

    ```'
