  mdcn: "# 前言\n\n你好，欢迎阅读**《Python基础：Python 3实用入门指南》**。我希望你已经准备好了解为何众多专业和业余开发者都对Python情有独钟，以及如何立即开始在你的项目中——无论大小——使用它。\n\
    \n本书面向那些略懂编程但不熟悉Python语言和生态系统的初学者，以及完全零基础的初学者。\n\n如果你没有计算机科学学位，别担心。Fletcher、David、Dan和Joanna将在教授你Python基础知识的同时，引导你理解重要的计算概念，并且同样重要的是，一开始会跳过不必要的细节。\n\
    \n## Python是一门全谱语言\n\n学习一门新的编程语言时，你还没有足够的经验来判断它长期来看是否适合你。如果你正在考虑Python，请让我向你保证这是一个很好的选择。一个关键原因是Python是一门**全谱**语言。\n\
    \n我这么说是什么意思呢？有些语言对初学者非常友好。它们手把手教你，让编程变得超级简单。我们可以举个极端的例子，看看像Scratch这样的可视化语言。\n\n\
    在这里，你会得到代表编程概念的积木块，比如变量、循环、方法调用等等，然后将它们拖放到一个可视化的界面上。对于简单的程序，Scratch可能很容易上手。但你无法用它构建专业的应用程序。请说出一家世界500强公司用Scratch来驱动其核心业务逻辑。\n\
    \n想不出来吧？我也想不出来——因为那太疯狂了。\n\n其他语言对专家开发者来说则异常强大。这类语言中最流行的可能是C++及其近亲C。无论你今天使用的是哪个网络浏览器，它很可能是用C或C++编写的。运行该浏览器的操作系统也非常可能是用C/C++构建的。你最喜欢的第一人称射击或策略类电子游戏？你猜对了：C/C++。\n\
    \n你可以用这些语言做出令人惊叹的事情。但对于寻求温和入门的新手来说，它们完全不友好。\n\n你可能没读过很多C++代码。它几乎能让你的眼睛灼痛。这里有一个例子，虽然复杂但很真实：\n\
    \n```\ntemplate <typename T>\n_Defer<void(*)(PID<T>, void (T::*)(void))>\n   \
    \ (const PID<T>&, void (T::*)(void))>\ndefer(const PID<T>& pid, void (T::*method)(void))\n\
    {\n    void (*dispatch)(const PID<T>&, void (T::*)(void)) =\n        &process::template\
    \ dispatch<T>;\n    return std::tr1::bind(dispatch, pid, method);\n}\n```\n\n\
    拜托，还是别了。\n\nScratch和C++都绝对不是我所说的全谱语言。在Scratch这个层面，入门很容易，但你必须切换到“真正的”语言来构建实际的应用程序。相反，你可以用C++构建真正的应用程序，但却没有温和的入门路径。你一头扎进这门语言的所有复杂性中，而这些复杂性正是为了支持这些丰富的应用而存在的。\n\
    \n另一方面，Python很特别。它是一门全谱语言。我们通常根据“hello world”测试来判断一门语言的简单性。也就是说，要让这门语言向用户输出“hello\
    \ world”，需要什么语法和操作？在Python中，没有比这更简单的了：\n\n```\nprint(\"Hello world\")\n```\n\n\
    就是这样。然而，我觉得这个测试并不令人满意。\n\n“hello world”测试很有用，但真的不足以展示一门语言的力量或复杂性。让我们尝试另一个例子。这里的内容不需要完全理解，只需跟着感受其精髓即可。本书将在后续章节中涵盖这些概念以及更多内容。下一个例子肯定是你接近学完时能够编写的。\n\
    \n新的测试是：编写一个程序，访问一个外部网站，将内容下载到你的应用程序内存中，然后向用户显示该内容的一个子部分，这需要什么？让我们在Python 3中借助`requests`包（需要安装——更多内容见第12章）来尝试这个实验：\n\
    \n```\nimport requests\nresp = requests.get(\"https://realpython.com\")\nhtml\
    \ = resp.text\nprint(html[205:294])\n```\n\n难以置信的是，就是这样。运行后，输出是（类似）：\n\n```\n\
    <title>Python Tutorials - Real Python</title>\n<meta name=\"author\" content=\"\
    Real Python\">\n```\n\n这就是Python光谱中简单易上手的一面。寥寥数行，却释放出惊人的力量。因为Python可以访问众多强大但封装良好的库，例如`requests`，它常被描述为*自带电池*。\n\
    \n所以，这里有一个简单而强大的入门示例。在实际应用方面，我们也有许多用Python编写的令人惊叹的应用程序。\n\nYouTube，全球最受欢迎的视频流媒体网站，就是用Python编写的，每秒处理超过100万次请求。Instagram是另一个Python应用的例子。更贴近我们生活的，我们甚至有realpython.com以及我的网站如talkpython.fm。\n\
    \nPython的这种全谱特性意味着你可以轻松入门，并在应用需求增长时采用更高级的功能。\n\n## Python很受欢迎\n\n你可能听说过Python很受欢迎。一方面，如果你能用它构建想要的应用程序，一门语言有多受欢迎似乎并不那么重要。\n\
    \n无论好坏，在软件开发中，受欢迎程度是衡量你可用库的质量以及职位空缺数量的一个重要指标。简而言之，你应该倾向于选择更受欢迎的技术，因为会有更多的选择和集成可用。\n\
    \n那么，Python真的那么受欢迎吗？是的。你当然会看到很多炒作和夸张的说法。但也有大量的统计数据支持这一点。让我们看看StackOverflow.com提供和展示的一些分析数据。\n\
    \n他们运营着一个名为**StackOverflow Trends**的网站。在这里，你可以通过标签查看各种技术的趋势。当我们把Python与其他你可能选择来学习编程的候选语言进行比较时，你会发现其中一个与众不同：\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_19_0.png)\n\n你可以在[insights.stackoverflow.com/trends](https://insights.stackoverflow.com/trends)探索这个图表并创建类似的图表。\n\
    \n注意Python与其他通常候选语言相比的惊人增长，而其他语言则趋于平稳甚至呈下降趋势！如果你将自己的未来押注于某项技术的成功，你会从这个列表中选择哪一个？\n\
    \n这只是一张图表，它真正告诉我们什么？嗯，让我们看看另一张。StackOverflow每年对开发者进行一次调查。它非常全面且做得很好。你可以在[insights.stackoverflow.com/survey/2018/](https://insights.stackoverflow.com/survey/2018/)找到完整的2018年结果。从那篇报告中，我想请你注意一个名为[最受喜爱、最令人畏惧和最令人向往的语言](https://insights.stackoverflow.com/survey/2018/#most-loved-dreaded-and-wanted)的部分。在“最令人向往”部分，你会看到以下回应：\n\
    \n> > 未使用该语言或技术进行开发，但表达了使用其进行开发兴趣的开发者。\n\n同样，在下面的图表中，你会看到Python高居榜首，甚至远超第二名：\n\
    \n# 开发者有多想使用一门语言？\n\n![](img/4efa9a991b645f75be61871447c559ca_20_0.png)\n\n所以，如果你同意我的观点，即一门编程语言的相对受欢迎程度很重要。那么Python显然是一个不错的选择。\n\
    \n## 我们不需要你是计算机科学家\n\n在你开始学习Python的旅程时，我还要强调一点：我们不需要你是计算机科学家。如果那是你的目标，很好。学习Python是朝着那个方向迈出的有力一步。但学习编程常常被框定为“我们有所有这些开发者职位空缺，我们需要软件开发者！”\n\
    \n这可能是真的，也可能不是。但对你来说更重要的是，编程（即使是一点点编程）对你个人而言可以是一种超能力。"
