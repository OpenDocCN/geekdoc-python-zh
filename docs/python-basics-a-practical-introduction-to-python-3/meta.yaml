    \ >= 70:  # 4\n    print(\"You passed the class with a C.\")\nelse:  # 5\n   \
    \ print(\"You did not pass the class :(\")\n\nprint(\"Thanks for attending.\"\
    )  # 6\n```\n\n当 `grade` 为85时，`grade >= 80` 和 `grade >= 70` 都为 `True`，因此你可能期望第3行和第4行的两个\
    \ `elif` 块都会被执行。\n\n然而，只有第一个测试条件为 `True` 的块会被执行。所有剩余的 `elif` 和 `else` 块都会被跳过，因此执行脚本的输出如下：\n\
    \n```\nYou passed the class with a B.\nThanks for attending.\n```\n\n让我们逐步分解脚本的执行过程：\n\
    \n1. 在标记为1的行中，`grade` 被赋值为85。\n2. `grade >= 90` 为 `False`，因此跳过标记为2的 `if` 语句。\n\
    3. `grade >= 80` 为 `True`，因此执行第3行 `elif` 语句下的代码块，并打印 \"You passed the class with\
    \ a B.\"。\n4. 第4行和第5行的 `elif` 和 `else` 语句被跳过，因为第3行 `elif` 语句的条件已满足。\n5. 最后，执行第6行，打印\
    \ \"Thanks for attending.\"。\n\n`if`、`elif` 和 `else` 关键字是 Python 语言中最常用的关键字之一。它们允许你编写能够根据不同条件做出不同响应的代码。\n\
    \n`if` 语句允许你解决比没有任何条件逻辑的代码更复杂的问题。你甚至可以将一个 `if` 语句嵌套在另一个 `if` 语句中，以编写处理极其复杂逻辑的代码！\n\
    \n## 嵌套 if 语句\n\n就像 `for` 和 `while` 循环可以相互嵌套一样，你也可以将一个 `if` 语句嵌套在另一个 `if` 语句中，以创建复杂的决策结构。\n\
    \n考虑以下场景。两个人进行一对一的体育比赛。你必须根据选手的分数和他们所进行的运动来决定两位选手中谁获胜：\n\n- 如果两位选手进行篮球比赛，得分最高的选手获胜。\n\
