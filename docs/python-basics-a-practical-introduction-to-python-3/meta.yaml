  - '[PAGE 573]


    Line numbers start with 1 and character positions start with 0.


    To make an index, you create a string of the form "<line>.<char>", replacing <line>
    with the line number and <char> with the character number.


    For example, "1.0" represents the first character on the first line. "2.3" represents
    the fourth character on the second line.


    Let''s use the index "1.0" to get the first letter from the text box we created
    earlier:


    ```

    >>> text_box.get("1.0")

    ''H''

    ```


    There are five letters in the word "Hello", and the character number of o is 4,
    since character numbers start from 0 and the word "Hello" starts at the first
    position in the text box. Just like Python string slices, in order to get the
    entire word Hello from the text box, the end index must be one more than the index
    of the last character to be read.


    So, to get the word "Hello" from the text box, use "1.0" for the first index and
    "1.5" for the second index:


    ```

    >>> text_box.get("1.0", "1.5")

    ''Hello''

    ```


    To get the word "World" on the second line of the text box, change the line numbers
    in each index to 2:


    ```

    >>> text_box.get("2.0", "2.5")

    ''World''

    ```


    To get all of the text in a text box, set the starting index in "1.0" and use
    the special tk.END constant for the second index:


    ```

    >>> text_box.get("1.0", tk.END)

    ''Hello\nWorld\n''

    ```


    Notice that text returned by .get() includes any newline characters.'
