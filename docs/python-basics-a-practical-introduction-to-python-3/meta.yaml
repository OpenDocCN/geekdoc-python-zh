    ```


    This happens because Python parses logical operators according to an **operator
    precedence**, just like arithmetic operators have an order of precedence in everyday
    math.


    The order of precedence for logical and boolean operators, from highest to lowest,
    is described in the following table. Operators on the same row have equal precedence.


    Operator Order of Precedence (Highest to Lowest)

    ---

    <, <=, ==, >=, >

    not

    and

    or


    Looking again at the expression `False == not True`, `not` has a lower precedence
    than `==` in the order of operations. This means that when Python evaluates `False
    == not True`, it first tries to evaluate `False == not` which is syntactically
    incorrect.


    You can avoid the `SyntaxError` by surrounding `not True` with parentheses:


    ```

    >>> False == (not True)

    True

    ```


    Grouping expressions with parentheses is a great way to clarify which operators
    belong to which part of a compound expression.


