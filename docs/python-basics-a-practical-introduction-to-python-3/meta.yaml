  md: '# 12.1 Files and the File System


    You have likely been working with computer files for a long time. Even so, there
    are some things that programmers need to know about files that the general user
    does not.


    In this section, you’ll learn the concepts necessary to get started working with
    files in Python.


    > **Note**


    If you are familiar with concepts like the file system and file paths, may wish
    to read the *Working With File Paths in Python* and *File Metadata* sections before
    skipping to the next section.


    Let’s start by exploring what a file is and how computers interact with them.


    # The Anatomy of a File


    There are a multitude of types of files out there: text files, image files, audio
    files, and PDF files, just to name a few. Ultimately, though, a file is just a
    sequence of **bytes** called the **contents** of the file.


    Each byte in a file can be thought of as an integer with a value between 0 and
    255, including both endpoints. The bytes are the values that are stored on a physical
    storage device when a file is saved.


    When you access a file on a computer, the contents of the file are read from the
    disk in the correct sequence of bytes. The important thing to know here is that
    there is nothing intrinsic to the file itself that dictates how to interpret the
    contents.


    As a programmer, it’s your job to properly interpret the contents when you open
    a file. This might sound difficult, but Python does a lot of the hard work for
    you.'
  merge: -1
  pgno: 329
- img_proc: true
  md: 'For example, when you open a text file, Python can convert the numerical bytes
    of the file into text characters for you. You do not need to know the specifics
    of how this conversion happens. There are tools in the standard library for working
    with all sorts of file types, including images and audio files.


    In order to access a file from a storage device, a whole host of things need to
    happen. You need to know on which device the file is stored, how to interact with
    that device, and where exactly on the device the file is located.


    This monumental task is managed by a file system. Python interacts with the file
    system on your computer in order to read, write, and manipulate files.


    # The File System


    The file system on a computer does two things:


    +   1. It provides an abstract representation of the files stored on your computer
    and devices connected to it.

    2. It interfaces with devices to control storage and retrieval file data.


    Python interacts with the file system on your computer, so you can only do in
    Python whatever your file system allows.


    > **Important**


    Different operating systems use different file systems. This is very important
    to keep in mind when writing code that will be run on different operating systems.


    The file system itself manages communication between the computer and the physical
    storage device, so the only part of the file system you need to understand as
    a programmer is how it represents files.'
