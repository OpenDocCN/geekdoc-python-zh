    \ filled at all times, but you can swap out the value in a given slot with a new\
    \ one whenever you want.\n\nThe ability to swap values in a list for other values\
    \ is called **mutability**. Lists are **mutable**. The elements of tuples may\
    \ not be swapped for new values, so tuples are said to be **immutable**.\n\nTo\
    \ swap a value in a list with another, assign the new value to a slot using index\
