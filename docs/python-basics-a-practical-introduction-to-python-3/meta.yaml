    \ | 移除并返回索引 `i` 处的元素 |\n\n除了列表方法，Python 还有一些用于处理数字列表的有用内置函数。\n\n## 数字列表\n\n数字列表的一个非常常见的操作是将所有值相加得到总和。\n\
