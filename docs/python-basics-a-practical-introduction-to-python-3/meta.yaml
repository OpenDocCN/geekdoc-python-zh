    \n有几种表示复数的方法，但一种常见的方法是用字母 *i* 表示实部，用字母 *j* 表示虚部。例如，`1i + 2j` 是实部为 1、虚部为 2 的复数。\n\
    \n要在 Python 中创建一个复数，你只需写出实部，后跟一个加号和虚部，并在末尾加上字母 `j`：\n\n```python\n>>> n = 1 +\
    \ 2j\n```\n\n当你检查 `n` 的值时，你会注意到 Python 用括号将数字括起来：\n\n```python\n>>> n\n(1+2j)\n\
    ```\n\n这种约定有助于消除显示的输出可能代表字符串或数学表达式的任何混淆。\n\n虚数有两个属性，`.real` 和 `.imag`，分别返回数字的实部和虚部：\n\
    \n```python\n>>> n.real\n1.0\n\n>>> n.imag\n2.0\n```\n\n注意，即使实部和虚部被指定为整数，Python\
    \ 也会将它们作为浮点数返回。\n\n复数还有一个 `.conjugate()` 方法，返回该数字的复共轭：\n\n```python\n>>> n.conjugate()\n\
    (1-2j)\n```\n\n对于任何复数，其**共轭**是具有相同实部且虚部绝对值相同但符号相反的复数。因此，在这种情况下，`1 + 2j` 的复共轭是\
    \ `1 - 2j`。\n\n> **注意**\n>\n> `.real` 和 `.imag` 属性不需要像方法 `.conjugate()` 那样在后面加括号。\n\
    >\n> `.conjugate()` 方法是一个对复数执行操作的函数。`.real` 和 `.imag` 不执行任何操作，它们只是返回关于数字的一些信息。\n\
    >\n> 方法和属性之间的区别是**面向对象编程**的一部分，你将在第 10 章学习。\n\n所有适用于浮点数和整数的算术运算符也适用于复数，除了地板除法\
    \ (`//`) 运算符。由于这不是一本数学书，我们不会讨论[复数运算](complex arithmetic)的机制。相反，这里有一些使用复数与算术运算符的例子：\n\
    \n```python\n>>> a = 1 + 2j\n>>> b = 3 - 4j\n\n>>> a + b\n(4-2j)\n\n>>> a - b\n\
    (-2+6j)\n\n>>> a * b\n(11+2j)\n\n>>> a ** b\n(932.1391946432212+95.9465336603419j)\n\
    \n>>> a / b\n(-0.2+0.4j)\n\n>>> a // b\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\nTypeError: can't take floor of complex\
    \ number.\n```\n\n有趣的是，尽管从数学角度来看并不奇怪，`int` 和 `float` 对象也具有 `.real` 和 `.imag` 属性，以及\
    \ `.conjugate()` 方法：\n\n```python\n>>> x = 42\n>>> x.real\n42\n>>> x.imag\n0\n\
    >>> x.conjugate()\n42\n\n>>> y = 3.14\n>>> y.real\n3.14\n>>> y.imag\n0.0\n>>>\
    \ y.conjugate()\n3.14\n```\n\n对于浮点数和整数，`.real` 和 `.conjugate()` 总是返回数字本身，而 `.imag`\
    \ 总是返回 0。然而，需要注意的一点是，如果 `n` 是整数，`n.real` 和 `n.imag` 返回整数；如果 `n` 是浮点数，则返回浮点数。\n\
    \n现在你已经了解了复数的基础知识，你可能想知道什么时候需要使用它们。如果你是为了 Web 开发或自动化而学习 Python，事实是你可能永远不需要使用复数。\n\
    \n另一方面，复数在科学计算和计算机图形学等领域非常重要。如果你曾在这些领域工作过，你可能会发现 Python 对复数的内置支持很有用。\n\n对这些主题的详细探讨超出了本书的范围。然而，你将在第\
    \ 17 章获得对 NumPy 包的介绍，这是 Python 科学计算的常用工具。\n\n[为此部分提供反馈 »](https://realpython.com/feedback/)\n\
    \n## 5.8 总结与附加资源\n\n在本章中，你学习了关于在 Python 中处理数字的所有内容。你看到了数字有两种基本类型——整数和浮点数——并且 Python\
    \ 也内置支持复数。\n\n首先，你学习了如何使用 `+`、`-`、`*`、`/` 和 `%` 运算符对数字进行基本算术运算。你看到了如何编写算术表达式，并学习了\
    \ PEP 8 中关于在代码中格式化算术表达式的最佳实践。\n\n然后，你了解了浮点数以及它们可能并不总是 100% 准确的原因。这种限制与 Python\
    \ 无关。这是现代计算的一个事实，是由于浮点数在计算机内存中的存储方式造成的。\n\n接下来，你看到了如何使用 `round()` 函数将数字四舍五入到给定的小数位，并学习了\
    \ `round()` 会将平局舍入到偶数，这与大多数人在学校学到的四舍五入方式不同。\n\n最后，你看到了许多格式化数字以供显示的方法。\n\n> **互动测验**\n\
    >\n> 本章附带一个免费的在线测验，以检查你的学习进度。你可以使用手机或电脑访问以下网址进行测验：\n>\n> [realpython.com/quizzes/python-basics-5](https://realpython.com/quizzes/python-basics-5)\n\
    \n### 附加资源\n\n要了解更多信息，请查看以下资源：\n\n- [Python 中的基本数据类型](https://realpython.com/python-data-types/)\n\
    - [如何在 Python 中四舍五入数字](https://realpython.com/python-round/)\n- [realpython.com\
