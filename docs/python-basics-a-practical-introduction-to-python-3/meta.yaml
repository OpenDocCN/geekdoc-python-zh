    ## 16.4 Interact With Websites in Real-Time


    Sometimes we want to be able to fetch real-time data from a website that offers
    continually updated information. In the dark days, before you learned Python programming,
    you would have been forced to sit in front of a browser, clicking the “Refresh”
    button to reload the page each time you want to check if updated content is available.
    Instead, you can easily automate this process using the .get() method of the Mechanical
    Soup Browser object.


    Open up your browser of choice and navigate to http://olympus.realpython.org/dice.
    This page simulates a roll of a 6-sided die, updating the result each time you
    refresh the browser. As an example of working with real-time data, you will write
    a script that periodically scrapes this page for a new result. While this example
    is admittedly contrived, you will learn the basics of interacting with a website
    to retrieve periodically updated results.


    The first thing you need to do is determine which element on the page contains
    the result of the die roll. Do this now by right-clicking anywhere on the page
    and clicking on “View page source.” A little more than halfway down the HTML code,
    there is an `<h2>` tag that looks like this:


    ```html

    <h2 id="result">4</h2>

    ```


    The text of the `<h2>` tag might be different for you, but this is the page element
    you need to scrape the result.'
