- md: "## 5.5 Math Functions and Number Methods\n\nPython has a few built-in functions\
    \ you can use to work with numbers. In this section, you'll learn about three\
    \ of the most common ones:\n\n1. `round()`, for rounding numbers to some number\
    \ of decimal places\n2. `abs()`, for getting the absolute value of a number\n\
    3. `pow()`, for raising a number to some power\n\nYou'll also learn about a method\
    \ that floating-point numbers have to check whether or not they have an integer\
    \ value.\n\nLet's go!\n\n### The round() function\n\nYou can use `round()` to\
    \ round a number to the nearest integer:\n\n```\n>>> round(2.3)\n2\n\n>>> round(2.7)\n\
    3\n```\n\n`round()` has some unexpected behavior when the number ends in .5:\n\
    \n```\n>>> round(2.5)\n2\n\n>>> round(3.5)\n4\n```\n\n2.5 gets rounded down to\
    \ 2 and 3.5 is rounded up to 4. Most people expect a number that ends in .5 to\
    \ get rounded up, so let's take a closer look at what's going on here.\n\nPython\
    \ 3 rounds numbers according to a strategy called **rounding ties to even.** A\
    \ **tie** is any number whose last digit is a five. 2.5 and 3.1415 are ties, but\
    \ 1.37 is not.\n\nWhen you round ties to even, you first look at the digit one\
    \ decimal place to the left of the last digit in the tie. If that digit is even,\
    \ you round down. If the digit is odd, you round up. That's why 2.5 rounds down\
    \ to 2 and 3.5 round up to 4.\n\n> **Note**\n\nRounding ties to even is the rounding\
    \ strategy recommended for floating-point numbers by the [IEEE](https://en.wikipedia.org/wiki/IEEE)\
    \ (Institute of Electrical and Electronics Engineers) because it helps limit the\
    \ impact rounding has on operations involving lots of numbers.\n\nThe IEEE maintains\
    \ a standard called [IEEE 754](https://en.wikipedia.org/wiki/IEEE_754) for how\
    \ floating-point numbers are dealt with on a computer. It was published in 1985\
    \ and is still commonly used by hardware manufacturers today.\n\nYou can round\
    \ a number to a given number of decimal places by passing a second argument to\
    \ `round()`:\n\n```\n>>> round(3.14159, 3)\n3.142\n\n>>> round(2.71828, 2)\n2.72\n\
    ```\n\nThe number 3.14159 is rounded to 3 decimal places to get 3.142, and the\
    \ number 2.71828 is rounded to 2 decimal places to get 2.72.\n\nThe second argument\
    \ of `round()` must be an integer. If it isn't, Python raises a TypeError:\n\n\
    ```\n>>> round(2.65, 1.4)\nTraceback (most recent call last):\n  File \"<pyshell#0>\"\
    , line 1, in <module>\n    round(2.65, 1.4)\nTypeError: 'float' object cannot\
    \ be interpreted as an integer\n```\n\nSometimes `round()` doesn't get the answer\
    \ quite right:\n\n```\n>>> # Expected value: 2.68\n>>> round(2.675, 2)\n2.67\n\
    ```\n\n2.675 is a tie because it lies exactly halfway between the numbers 2.67\
    \ and 2.68. Since Python rounds ties to the nearest even number, you would expect\
    \ `round(2.675, 2)` to return 2.68, but it returns 2.67 instead. This error is\
    \ a result of floating-point representation error, and isn't a bug in the `round()`\
    \ function.\n\nDealing with floating-point numbers can be frustrating, but this\
    \ frustration isn't specific to Python. All languages that implement the IEEE\
    \ floating-point standard have the same issues, including C/C++, Java, and JavaScript.\n\
    \nIn most cases, though, the little errors encountered with floating-point numbers\
    \ are negligible, and the results of `round()` are perfectly useful.\n\n### The\
    \ abs() Function\n\nThe **absolute value** of a number *n* is just *n* if *n*\
    \ is positive, and -*n* if *n* is negative. For example, the absolute value of\
    \ 3 is 3, while the absolute value of -5 is 5.\n\nTo get the absolute value of\
    \ a number in Python, you use the `abs()` function:\n\n```\n>>> abs(3)\n3\n\n\
    >>> abs(-5.0)\n5.0\n```\n\n`abs()` always returns a positive number of the same\
    \ type as its argument. That is, the absolute value of an integer is always a\
    \ positive integer, and the absolute value of a float is always a positive float.\n\
    \n### The pow() Function\n\nIn section 5.2, you learned how to raise a number\
    \ to a power using the ** operator. You can also use the `pow()` function. `pow()`\
    \ takes two arguments. The first is the **base**, that is the number to be raised\
    \ to a power, and the second argument is the **exponent**.\n\nFor example, the\
    \ following uses `pow()` to raise 2 to the exponent 3:\n\n```\n>>> pow(2, 3)\n\
    8\n```\n\nJust like **, the exponent in `pow()` can be negative:\n\n```\n>>> pow(2,\
    \ -2)\n0.25\n```\n\nSo, what's the difference between ** and `pow()`? The `pow()`\
    \ function accepts an optional third argument that computes the first number raised\
    \ to the power of the second number and then takes the modulo with respect to\
    \ the third number.\n\nIn other words, `pow(x, y, z)` is equivalent to `(x **\
    \ y) % z`. Here's an example with x = 2, y = 3, and z = 2:\n\n```\n>>> pow(2,\
    \ 3, 2)\n0\n```\n\nFirst, 2 is raised to the power 3 to get 8. Then 8 % 2 is calculated,\
    \ which is 0 because 2 divides 8 with no remainder.\n\n### Check if a Float Is\
    \ Integral\n\nIn Chapter 3 you learned about string methods like `.lower()`, `.upper()`,\
    \ and `.find()`. Integers and floating-point numbers also have methods.\n\nNumber\
    \ methods aren’t used very often, but there is one that can be useful. Floating-point\
    \ numbers have an `.is_integer()` method that returns `True` if the number is\
    \ **integral**—meaning it has no fractional part—and returns `False` otherwise:\n\
    \n```\n>>> num = 2.5\n>>> num.is_integer()\nFalse\n\n>>> num = 2.0\n>>> num.is_integer()\n\
    True\n```\n\nThe `.is_integer()` method can be useful for validating user input.\
    \ For example, if you are writing an app for a shopping cart for a store that\
    \ sells pizzas, you will want to check that the quantity of pizzas the customer\
    \ inputs is a whole number. You’ll learn how to do these kinds of checks in Chapter\
    \ 8.\n\n### Review Exercises\n\nYou can find the solutions to these exercises\
    \ and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n1. Write a script that asks the user to input a number and then displays that\
    \ number rounded to two decimal places. When run, your program should look like\
    \ this:\n\n   ```\n   Enter a number: 5.432\n   5.432 rounded to 2 decimal places\
    \ is 5.43\n   ```\n\n2. Write a script that asks the user to input a number and\
    \ then displays the absolute value of that number. When run, your program should\
    \ look like this:\n\n   ```\n   Enter a number: -10\n   The absolute value of\
    \ -10 is 10.0\n   ```\n\n3. Write a script that asks the user to input two numbers\
    \ by using the `input()` function twice, then display whether or not the difference\
    \ between those two number is an integer. When run, your program should look like\
    \ this:\n\n   ```\n   Enter a number: 1.5\n   Enter another number: .5\n   The\
    \ difference between 1.5 and .5 is an integer? True!\n   ```\n\n   If the user\
    \ inputs two numbers whose difference is not integral, the output should look\
    \ like this:\n\n   ```\n   Enter a number: 1.5\n   Enter another number: 1.0\n\
    \   The difference between 1.5 and 1.0 is an integer? False!\n   ```\n\nLeave\
    \ feedback on this section »\n\n## 5.6 Print Numbers in Style\n\nDisplaying numbers\
    \ to a user requires inserting numbers into a string. In Chapter 3, you learned\
    \ how to do this with f-strings by surrounding a variable assigned to a number\
    \ with curly braces:\n\n```\n>>> n = 7.125\n>>> f\"The value of n is {n}\"\n'The\
    \ value of n is 7.125'\n```\n\nThose curly braces support a simple formatting\
    \ language you can use to alter the appearance of the value in the final formatted\
    \ string.\n\nFor example, to format the value of n in the above example to two\
    \ decimal places, replace the contents of the curly braces in the f-string with\
    \ `{n:.2f}`:\n\n```\n>>> n = 7.125\n>>> f\"The value of n is {n:.2f}\"\n'The value\
    \ of n is 7.12'\n```\n\nThe colon (`:`) after the variable `n` indicates that\
    \ everything after it is part of the formatting specification. In this example,\
    \ the formatting specification is `.2f`.\n\nThe `.2` in `.2f` rounds the number\
    \ to two decimal places, and the `f` tells Python to display `n` as a **fixed-point\
    \ number**. This means the number is displayed with exactly two decimal places,\
    \ even if the original number has fewer decimal places.\n\nWhen `n = 7.125`, the\
    \ result of `{n:.2f}` is 7.12. Just like `round()`, Python rounds ties to even\
    \ when formatting numbers inside of strings. So, if you replace `n = 7.125` with\
    \ `n = 7.126`, then the result of `{n:.2f}` is \"7.13\":\n\n```\n>>> n = 7.126\n\
    >>> f\"The value of n is {n:.2f}\"\n'The value of n is 7.13'\n```\n\nTo round\
    \ to one decimal places, replace `.2` with `.1`:\n\n```\n>>> n = 7.126\n>>> f\"\
    The value of n is {n:.1f}\"\n'The value of n is 7.1'\n```\n\nWhen you format a\
    \ number as fixed-point, it's always displayed with the precise number of decimal\
    \ places specified:\n\n```\n>>> n = 1\n>>> f\"The value of n is {n:.2f}\"\n'The\
    \ value of n is 1.00'\n>>> f\"The value of n is {n:.3f}\"\n'The value of n is\
    \ 1.000'\n```\n\nYou can insert commas to group the integer part of large numbers\
    \ by the thousands with the `,` option:\n\n```\n>>> n = 1234567890\n>>> f\"The\
    \ value of n is {n:,}\"\n'The value of n is 1,234,567,890'\n```\n\nTo round to\
    \ some number of decimal places and also group by thousands, put the `,` before\
    \ the dot `.` in your formatting specification:"
  mdcn: "## 5.5 数学函数与数字方法\n\nPython 提供了一些内置函数，可用于处理数字。在本节中，你将学习其中三个最常用的函数：\n\n1. \
    \ `round()`，用于将数字四舍五入到指定的小数位数\n2.  `abs()`，用于获取数字的绝对值\n3.  `pow()`，用于将数字提升到某个幂次\n\
    \n你还将学习浮点数的一个方法，用于检查其是否具有整数值。\n\n开始吧！\n\n### round() 函数\n\n你可以使用 `round()` 将数字四舍五入到最接近的整数：\n\
    \n```\n>>> round(2.3)\n2\n\n>>> round(2.7)\n3\n```\n\n当数字以 .5 结尾时，`round()` 的行为可能出乎意料：\n\
    \n```\n>>> round(2.5)\n2\n\n>>> round(3.5)\n4\n```\n\n2.5 被向下舍入为 2，而 3.5 被向上舍入为\
    \ 4。大多数人期望以 .5 结尾的数字会被向上舍入，因此让我们仔细看看这里发生了什么。\n\nPython 3 根据一种称为**四舍六入五成双**的策略对数字进行舍入。**平局**是指最后一位数字为五的任何数字。2.5\
    \ 和 3.1415 是平局，但 1.37 不是。\n\n当你进行四舍六入五成双时，首先查看平局数字最后一位数字左边一位的数字。如果该数字是偶数，则向下舍入。如果该数字是奇数，则向上舍入。这就是为什么\
    \ 2.5 向下舍入为 2，而 3.5 向上舍入为 4。\n\n> **注意**\n\n四舍六入五成双是 [IEEE](https://en.wikipedia.org/wiki/IEEE)（电气与电子工程师协会）推荐的浮点数舍入策略，因为它有助于限制舍入对涉及大量数字的运算的影响。\n\
    \nIEEE 维护着一个名为 [IEEE 754](https://en.wikipedia.org/wiki/IEEE_754) 的标准，规定了计算机如何处理浮点数。该标准于\
    \ 1985 年发布，至今仍被硬件制造商广泛使用。\n\n你可以通过向 `round()` 传递第二个参数，将数字舍入到给定的小数位数：\n\n```\n\
    >>> round(3.14159, 3)\n3.142\n\n>>> round(2.71828, 2)\n2.72\n```\n\n数字 3.14159\
    \ 被舍入到 3 位小数，得到 3.142；数字 2.71828 被舍入到 2 位小数，得到 2.72。\n\n`round()` 的第二个参数必须是整数。如果不是，Python\
    \ 会引发 TypeError：\n\n```\n>>> round(2.65, 1.4)\nTraceback (most recent call last):\n\
    \  File \"<pyshell#0>\", line 1, in <module>\n    round(2.65, 1.4)\nTypeError:\
    \ 'float' object cannot be interpreted as an integer\n```\n\n有时 `round()` 的结果并不完全正确：\n\
    \n```\n>>> # 期望值：2.68\n>>> round(2.675, 2)\n2.67\n```\n\n2.675 是一个平局，因为它恰好位于数字\
    \ 2.67 和 2.68 的正中间。由于 Python 将平局舍入到最接近的偶数，你可能期望 `round(2.675, 2)` 返回 2.68，但它却返回了\
    \ 2.67。这个误差是浮点数表示误差的结果，而不是 `round()` 函数的错误。\n\n处理浮点数可能会令人沮丧，但这种沮丧并非 Python 特有。所有实现\
    \ IEEE 浮点标准的语言都有相同的问题，包括 C/C++、Java 和 JavaScript。\n\n不过在大多数情况下，浮点数遇到的小误差可以忽略不计，`round()`\
    \ 的结果完全可用。\n\n### abs() 函数\n\n数字 *n* 的**绝对值**，如果 *n* 为正，则就是 *n*；如果 *n* 为负，则是 -*n*。例如，3\
    \ 的绝对值是 3，而 -5 的绝对值是 5。\n\n要在 Python 中获取数字的绝对值，你可以使用 `abs()` 函数：\n\n```\n>>> abs(3)\n\
    3\n\n>>> abs(-5.0)\n5.0\n```\n\n`abs()` 总是返回与其参数类型相同的正数。也就是说，整数的绝对值始终是正整数，浮点数的绝对值始终是正浮点数。\n\
    \n### pow() 函数\n\n在第 5.2 节中，你学习了如何使用 ** 运算符将数字提升到某个幂次。你也可以使用 `pow()` 函数。`pow()`\
    \ 接受两个参数。第一个是**底数**，即要被提升到某个幂次的数字，第二个参数是**指数**。\n\n例如，以下代码使用 `pow()` 将 2 提升到指数\
    \ 3：\n\n```\n>>> pow(2, 3)\n8\n```\n\n就像 ** 一样，`pow()` 中的指数可以是负数：\n\n```\n>>>\
    \ pow(2, -2)\n0.25\n```\n\n那么，** 和 `pow()` 有什么区别呢？`pow()` 函数接受一个可选的第三个参数，该参数计算第一个数字的第二个数字次幂，然后对第三个数字取模。\n\
    \n换句话说，`pow(x, y, z)` 等同于 `(x ** y) % z`。这里有一个 x = 2, y = 3, z = 2 的例子：\n\n```\n\
    >>> pow(2, 3, 2)\n0\n```\n\n首先，2 被提升到 3 次幂得到 8。然后计算 8 % 2，结果为 0，因为 2 整除 8 没有余数。\n\
    \n### 检查浮点数是否为整数\n\n在第 3 章中，你学习了字符串方法，如 `.lower()`、`.upper()` 和 `.find()`。整数和浮点数也有方法。\n\
    \n数字方法并不常用，但有一个方法可能很有用。浮点数有一个 `.is_integer()` 方法，如果数字是**整数**（即没有小数部分），则返回 `True`，否则返回\
    \ `False`：\n\n```\n>>> num = 2.5\n>>> num.is_integer()\nFalse\n\n>>> num = 2.0\n\
    >>> num.is_integer()\nTrue\n```\n\n`.is_integer()` 方法可用于验证用户输入。例如，如果你正在为一家销售披萨的商店编写购物车应用程序，你需要检查用户输入的披萨数量是否为整数。你将在第\
    \ 8 章学习如何进行此类检查。\n\n### 复习练习\n\n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到这些练习的解答和许多其他额外资源。\n\n1.  编写一个脚本，要求用户输入一个数字，然后显示该数字四舍五入到两位小数的结果。运行时，你的程序应如下所示：\n\
    \n    ```\n    Enter a number: 5.432\n    5.432 rounded to 2 decimal places is\
    \ 5.43\n    ```\n\n2.  编写一个脚本，要求用户输入一个数字，然后显示该数字的绝对值。运行时，你的程序应如下所示：\n\n    ```\n\
    \    Enter a number: -10\n    The absolute value of -10 is 10.0\n    ```\n\n3.\
    \  编写一个脚本，通过两次使用 `input()` 函数要求用户输入两个数字，然后显示这两个数字的差是否为整数。运行时，你的程序应如下所示：\n\n  \
    \  ```\n    Enter a number: 1.5\n    Enter another number: .5\n    The difference\
    \ between 1.5 and .5 is an integer? True!\n    ```\n\n    如果用户输入的两个数字的差不是整数，输出应如下所示：\n\
    \n    ```\n    Enter a number: 1.5\n    Enter another number: 1.0\n    The difference\
    \ between 1.5 and 1.0 is an integer? False!\n    ```\n\n对本节提出反馈 »\n\n## 5.6 以特定格式打印数字\n\
    \n向用户显示数字需要将数字插入字符串中。在第 3 章中，你学习了如何使用 f-string 来实现这一点，方法是将赋值给数字的变量用花括号括起来：\n\n\
    ```\n>>> n = 7.125\n>>> f\"The value of n is {n}\"\n'The value of n is 7.125'\n\
    ```\n\n这些花括号支持一种简单的格式化语言，你可以用它来改变最终格式化字符串中值的外观。\n\n例如，要将上面示例中 n 的值格式化为两位小数，请将\
