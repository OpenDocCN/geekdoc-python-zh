    # 6.6. Understand Scope in Python


    ```

    print(f"Inside ''func'', x has the value {x}")


    func()

    print(f"Outside ''func'', x has the value {x}")

    ```


    In this example, the variable x is assigned two different values. x is assigned
    "Hello, World" at the beginning, and is assigned 2 inside of func().


    The output of the script, which you might find surprising, looks like this:


    ```

    Inside ''func'', x has the value 2

    Outside ''func'', x has the value Hello World

    ```


    How does x still have the value "Hello World" after calling func(), which changes
    the value of x to 2?


    The answer is that the function func() has a different **scope** than the code
    that exists outside of the function. That is, you can name an object inside func()
    the same name as something outside func() and Python can keep the two separated.


    The function body has what is known as a **local scope**, with its own set of
    names available to it. Code outside of the function body is in the **global scope**.


    You can think of a scope as a set of names mapped to objects. When you use a particular
    name in your code, such as a variable or a function name, Python checks the current
    scope to determine whether or not that name exists.


    # Scope Resolution


    Scopes have a hierarchy. For example, consider the following:


    ```

    x = 5

    ```'
