    # 6.4 Run in Circles


    One of the great things about computers is that you can make them do the same
    thing over and over again, and they rarely complain or get tired.


    A **loop** is a block of code that gets repeated over and over again either a
    specified number of times or until some condition is met. There are two kinds
    of loops in Python: **while loops** and **for loops**. In this section, you''ll
    learn how to use both.


    Let''s start by looking at how `while` loops work.'
  merge: -1
