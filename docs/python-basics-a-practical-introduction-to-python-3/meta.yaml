    \ and you don't have to remember the order of data in a long list or tuple.\n\n\
    This idea of ordering is really the main difference between how items in a sequence\
    \ type are accessed compared to a dictionary.\n\nValues in a sequence type are\
    \ accessed by index, which is an integer value expressing the order of items in\
    \ the sequence.\n\nOn the other hand, items in a dictionary are accessed by a\
    \ key, which doesn't define any kind of order, but just provides a label that\
    \ can be used to reference the value.\n\n## Adding and Removing Values in a Dictionary\n\
    \nLike lists, dictionaries are mutable data structures. This means you can add\
    \ and remove items from a dictionary.\n\nLet's add the capital of Colorado to\
    \ the `capitals` dictionary:\n\n```python\n>>> capitals[\"Colorado\"] = \"Denver\"\
    \n```\n\nFirst you use the square bracket notation with \"Colorado\" as the key,\
    \ as if you were looking up the value. Then you use the assignment operator =\
    \ to assign the value \"Denver\" to the new key.\n\nWhen you inspect capitals,\
    \ you see that a new key \"Colorado\" exists with the value \"Denver\":\n\n```python\n\
    >>> capitals\n{'California': 'Sacramento', 'New York': 'Albany', 'Texas': 'Austin',\n\
    'Colorado': 'Denver'}\n```\n\nEach key in a dictionary can only be assigned a\
    \ single value. If a key is given a new value, Python just overwrites the old\
    \ one:\n\n```python\n>>> capitals[\"Texas\"] = \"Houston\"\n>>> capitals\n{'California':\
    \ 'Sacramento', 'New York': 'Albany', 'Texas': 'Houston',\n'Colorado': 'Denver'}\n\
    ```\n\nTo remove an item from a dictionary, use the `del` keyword with the key\
    \ for the value you want to delete:\n\n```python\n>>> del capitals[\"Texas\"]\n\
    >>> capitals\n{'California': 'Sacramento', 'New York': 'Albany',\n'Colorado':\
    \ 'Denver'}\n```\n\n## Checking the Existence of Dictionary Keys\n\nIf you try\
    \ to access a value in a dictionary using a key that doesn't exist, Python raises\
    \ a `KeyError`:\n\n```python\n>>> capitals[\"Arizona\"]\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#1>\", line 1, in <module>\n    capitals[\"Arizona\"\
    ]\nKeyError: 'Arizona'\n```\n\nThe `KeyError` is the most common error encountered\
    \ when working with dictionaries. Whenever you see it, it means that an attempt\
    \ was made to access a value using a key that doesn't exist.\n\nYou can check\
    \ that a key exists in a dictionary using the `in` keyword:\n\n```python\n>>>\
    \ \"Arizona\" in capitals\nFalse\n>>> \"California\" in capitals\nTrue\n```\n\n\
    With `in`, you can first check that a key exists before doing something with the\
    \ value for that key:\n\n```python\n>>> if \"Arizona\" in capitals:\n...     #\
    \ Only print if the \"Arizona\" key exists\n...     print(f\"The capital of Arizona\
    \ is {capitals['Arizona']}.\")\n```\n\nIt is important to remember that `in` only\
    \ checks the existence of keys:\n\n```python\n>>> \"Sacramento\" in capitals\n\
    False\n```\n\nEven though \"Sacramento\" is a value for the existing \"California\"\
    \ key in capitals, checking for its existence returns False.\n\n## Iterating Over\
    \ Dictionaries\n\nLike lists and tuples, dictionaries are iterable. However, looping\
    \ over a dictionary is a bit different than looping over a list or tuple.\n\n\
    When you loop over a dictionary with a for loop, you iterate over the dictionary's\
    \ keys:\n\n```python\n>>> for key in capitals:\n...     print(key)\n...\nCalifornia\n\
    New York\nColorado\n```\n\nSo, if you want to loop over the capitals dictionary\
    \ and print \"The capital of X is Y\", where X is the name of the state and Y\
    \ is the state's capital, you can do the following:\n\n```python\n>>> for state\
    \ in capitals:\n        print(f\"The capital of {state} is {capitals[state]}\"\
    )\n```\n\nThe capital of California is Sacramento\nThe capital of New York is\
    \ Albany\nThe capital of Colorado is Denver\n\nHowever, there is a slightly more\
    \ succinct way to do this using the `.items()` dictionary method. `.items()` returns\
    \ a list-like object containing tuples of key-value pairs. For example, `capitals.items()`\
    \ returns a list of tuples of states and their corresponding capitals:\n\n```python\n\
    >>> capitals.items()\ndict_items([('California', 'Sacramento'), ('New York', 'Albany'),\
    \ ('Colorado', 'Denver')])\n```\n\nThe object returned by `.items()` isn't really\
    \ a list. It has a special type called a `dict_items`:\n\n```python\n>>> type(capitals.items())\n\
    <class 'dict_items'>\n```\n\nYou don't need to worry about what `dict_items` really\
    \ is, because you usually won't work with it directly. The important thing to\
    \ know about it is that you can use `.items()` to loop over a dictionary's keys\
    \ and values simultaneously.\n\nLet's rewrite the previous loop using `.items()`:\n\
    \n```python\n>>> for state, capital in capitals.items():\n...     print(f\"The\
    \ capital of {state} is {capital}\")\n```\n\nThe capital of California is Sacramento\n\
    The capital of New York is Albany\nThe capital of Colorado is Denver\n\nWhen you\
    \ loop over `capitals.items()`, each iteration of the loop produces a tuple containing\
    \ the state name and the corresponding capital city name. By assigning this tuple\
    \ to `state, capital`, the components of the tuple are unpacked into the two variables\
    \ `state` and `capital`.\n\n## Dictionary Keys and Immutability\n\nIn the capitals\
    \ dictionary you've been working with throughout this section, each key is a string.\
    \ However, there is no rule that says dictionary keys must all be of the same\
    \ type.\n\nFor instance, you can add an integer key to capitals:\n\n```python\n\
    >>> capitals[50] = \"Honolulu\"\n>>> capitals\n{'California': 'Sacramento', 'New\
    \ York': 'Albany',\n'Colorado': 'Denver', 50: 'Honolulu'}\n```\n\nThere is only\
    \ one restriction on what constitutes a valid dictionary key. Only immutable types\
    \ are allowed. This means, for example, that a list cannot be a dictionary key.\n\
    \nConsider this: what should happen if a list were used as a key in a dictionary\
    \ and, somewhere later in the code, the list is changed?\n\nShould the list be\
    \ associated to the same value as the old list in the dictionary? Or should the\
    \ value for the old key be removed from the dictionary all together?\n\nRather\
    \ than make a guess about what should be done, Python raises an exception:\n\n\
    ```python\n>>> capitals[[1, 2, 3]] = \"Bad\"\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: unhashable type: 'list'\n\
    ```\n\nIt might not seem fair that some types can be keys and others can't, but\
    \ it's important that a programming language always has well-defined behavior.\
    \ It should never make guesses about what the author intended.\n\nFor reference,\
    \ here’s a list of all the data types you’ve learned about so far that are valid\
    \ dictionary keys:\n\n| Valid Dictionary Key Types |\n|---|\n| integers |\n| floats\
    \ |\n| strings |\n| booleans |\n| tuples |\n\nUnlike keys, dictionary values can\
    \ be any valid Python type, including other dictionaries!\n\n## Nested Dictionaries\n\
    \nJust as you can nest lists inside of other lists, and tuples inside of other\
