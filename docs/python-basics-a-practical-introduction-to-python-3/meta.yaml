    \ 2, 3], [4, 5, 6], [7, 8, 9]])\n\n>>> # Get a tuple of axis length\n>>> matrix.shape\n\
    (3, 3)\n\n>>> # Get an array of the diagonal entries\n>>> matrix.diagonal()\n\
    array([1, 5, 9])\n\n>>> # Get a 1-dimensional array of all entries\n>>> matrix.flatten()\n\
