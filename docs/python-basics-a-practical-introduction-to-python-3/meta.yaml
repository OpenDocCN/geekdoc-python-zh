    Now loop over the paths in the sorted `expense_reports` list and append them to
    `pdf_merger`:


    ```

    >>> for path in expense_reports:

    ...     pdf_merger.append(str(path))

    ...

    >>>

    ```


    Notice that each `Path` object in `expense_reports/` is converted to a string
    with `str()` before being passed to `pdf_merger.append()`.


    With all of the PDF files in the `expense_reports/` directory concatenated together
    in the `pdf_merger` object, the last thing you need to do is write everything
    to an output PDF file. `PdfFileMerger` instances have a `.write()` method that
    works just like the `PdfFileWriter.write()`.


    Open a new file in binary write mode, then pass the file object to `pdf_merger.write()`:


    ```

    >>> with Path("expense_reports.pdf").open(mode="wb") as output_file:

    ...     pdf_merger.write(output_file)

    ...

    >>>

    ```


