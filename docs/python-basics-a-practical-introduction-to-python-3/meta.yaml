    The list.insert() method is used to insert a single new value into a list. It
    takes two parameters, an index i and a value x, and inserts the value x at index
    i in the list.


    ```

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> # Insert "orange" into the second position

    >>> colors.insert(1, "orange")

    >>> colors

    [''red'', ''orange'', ''yellow'', ''green'', ''blue'']

    ```


    There are a couple of important observations to make about this example.


    The first observation applies to all list methods. To use them, you first write
    the name of the list you want to manipulate, followed by a dot (.) and then the
    name of the list method.


    So, to use insert() on the colors list, you must write colors.insert(). This works
    just like string and number methods do.


    Next, notice that when the value "orange" is inserted at the index 1, the value
    "yellow" and all following values are shifted to the right.


    If the value for the index parameter of .insert() is larger than the greatest
    index in the list, the value is inserted at the end of the list:


    ```

    >>> colors.insert(10, "violet")

    >>> colors

    [''red'', ''orange'', ''yellow'', ''green'', ''blue'', ''violet'']

    ```


    Here the value "violet" is actually inserted at index 5, even though .insert()
    was called with 10 for the index.


    You can also use negative indices with .insert():'
