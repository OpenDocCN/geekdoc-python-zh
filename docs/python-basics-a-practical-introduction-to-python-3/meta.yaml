    ```


    `re` 模块中还有一个用于解析文本的有用函数。`re.sub()` 函数是“substitute”（替换）的缩写，允许你将字符串中与正则表达式匹配的文本替换为新文本（有点像
    `.replace()` 方法）。传递给 `re.sub()` 的参数是正则表达式，后跟替换文本，再后跟字符串。例如：


    ```python

    >>> string = "Everything is <replaced> if it''s in <tags>."

    >>> string = re.sub("<.*>", "ELEPHANTS", string)

    >>> string

    ''Everything is ELEPHANTS.''

    ```


    也许这并不是你预期的结果。


    `re.sub()` 函数使用正则表达式 `"<.*>"` 来查找并替换第一个 `<` 和最后一个 `>` 之间的所有内容，这占据了字符串的大部分。这是因为
    Python 的正则表达式是**贪婪的**，这意味着当使用 `*` 等字符时，它们会尝试找到尽可能长的匹配。


    或者，你可以使用非贪婪匹配模式 `*?`，它的作用与 `*` 相同，只是它匹配尽可能短的文本字符串：


    ```python

    >>> string = "Everything is <replaced> if it''s in <tags>."

    >>> string = re.sub("<.*?>", "ELEPHANTS", string)

    >>> string

    "Everything is ELEPHANTS if it''s in ELEPHANTS."

    ```


    ## 16.1. 从网站抓取和解析文本


    掌握了所有这些知识，现在让我们尝试从 `http://olympus.realpython.org/profiles/dionysus` 解析出标题，该页面包含这行写得相当随意的
    HTML：


    ```html

    <TITLE >Profile: Dionysus</title / >

    ```


    `.find()` 方法在处理这里的不一致性时会很困难，但通过巧妙地使用正则表达式，你可以轻松处理这段代码：


    ```python

    import re

    from urllib.request import urlopen


    url = "http://olympus.realpython.org/profiles/dionysus"

    page = urlopen(url)

    html = page.read().decode("utf-8")


    pattern = "<title.*?>.*?</title.*?>"

    match_results = re.search(pattern, html, re.IGNORECASE)

    title = match_results.group()

    title = re.sub("<.*?>", "", title) # Remove HTML tags


    print(title)

    ```


    让我们通过将模式字符串中的第一个正则表达式分解为三个部分——`<title.*?>`、`.*?` 和 `</title.*?>`——来仔细看看它。


    1.  `<title.*?>`——此模式匹配 `html` 中的开头 `<TITLE >` 标签。模式的 `<title` 部分与 `<TITLE` 匹配，因为调用
    `re.search()` 时使用了 `re.IGNORECASE`，而 `.*?>` 匹配 `<TITLE` 之后直到第一个 `>` 的任何文本。

    2.  `.*?`——此模式非贪婪地匹配开头 `<TITLE >` 之后的所有文本，直到第一个匹配 `</title.*?>` 的位置。

    3.  `</title.*?>`——此模式与第一个模式的唯一区别是 `/` 字符，因此它匹配 `html` 中的结尾 `</title / >` 标签。


    第二个正则表达式，字符串 `"<.*?>"` 也使用了非贪婪的 `.*?` 来匹配 `title` 字符串中的所有 HTML 标签。通过将任何匹配项替换为
    `""`，`re.sub()` 函数会移除所有标签并仅返回文本。


    正则表达式在正确使用时是一个强大的工具。本介绍只是浅尝辄止。你可以在 Python 文档的 [Python 正则表达式 HOWTO](https://docs.python.org/3/howto/regex.html)
    部分了解更多关于正则表达式及其使用方法的信息。


    > **注意**

    >

    > 网页抓取可能很繁琐。没有两个网站的组织方式是相同的，而且 HTML 通常很混乱。此外，网站会随时间变化。今天能工作的网页抓取器不能保证明年——甚至下周——还能工作！


