    It may seem strange that the label in the window is not square event thought width
    and height are both set to 10. This is because the height and width are measured
    in **text units**.


    One horizontal text unit is determined by the width of the character "0" (the
    number zero) in the default system font. Similarly, one vertical text unit is
    determined by the height of the character "0".


    > **Note**


    Tkinter uses text units for width and height measurements, instead of something
    like inches, centimeters, or pixels, to ensure consistent behavior of the application
    across platforms.


    Measuring units by the width of a character means that the size of a widget is
    relative to the default font on a user''s machine. This ensures text fits properly
    in labels and buttons, no matter where the application is running.


    Labels are great for displaying some text, but they don''t help you get input
    from a user. The next three widgets that we''ll look at are all used to get user
    input.'
