    should be closed before a program terminates. The PdfFileReader object does all
    of this for you, so you don''t need to worry about opening or closing the PDF
    file!


    Now that you''ve created a PdfFileReader instance, you can use it to gather information
    about the PDF. For instance, the .getNumPages() method returns the number of pages
    contained in the PDF file:


    ```

    >>> pdf.getNumPages()

    234

    ```


    The Pride_and_Prejudice.pdf file has 234 pages!


    Notice that .getNumPages() is written in camelCase and not snake_case, as recommend
    in PEP 8. Remember, PEP 8 is a set of guidelines, not rules. As far as Python
    is concerned, camelCase is perfectly acceptable.


    > **Note**


    PyPDF2 is adapted from the PyPDF package. PyPDF was written in 2005, only four
    years after PEP 8 was published.


    At that time, many Python programmers were migrating from languages where camelCase
    is more common.


    You can also access some document information using the .documentInfo attribute:


    ```

    >>> pdf.documentInfo

    {''/Title'': ''Pride and Prejudice, by Jane Austen'', ''/Author'': ''Chuck'',
    ''/Creator'':

    ```


    The object returned by .documentInfo looks like a dictionary, but it''s not really
    the same thing. You can access each item in .documentInfo as an attribute.


    For example, the get the title, use the .title attribute:'
