- md: "## Syntax Errors\n\nIn loose terms, a **syntax error** occurs when you write\
    \ some code that isn't allowed in the Python language. You can create a syntax\
    \ error by changing the contents of the `hello_world.py` script from the last\
    \ section to the following:\n\n```\nprint(\"Hello, world)\n```\n\nIn this example,\
    \ the double quotation mark at the end of \"Hello, world\" has been removed. Python\
    \ won't be able to tell where the string of text ends. Save the altered script\
    \ and then try to run it. What happens?\n\nThe code won't run! IDLE displays an\
    \ alert box with the following message:\n\n```\nEOL while scanning string literal.\n\
    ```\n\n**EOL** stands for **End Of Line**, so this message tells you that Python\
    \ read all the way to the end of the line without finding the end of something\
    \ called a string literal.\n\nA **string literal** is text contained in-between\
    \ two double quotation marks. The text \"Hello, world\" is an example of a string\
    \ literal.\n\n> **Note**\n\nFor brevity, string literals are often referred to\
    \ as **strings**, although the term \"string\" technically has a more general\
    \ meaning in Python. You will learn more about strings in Chapter 4.\n\nBack in\
    \ the script window, notice that the line containing \"Hello, world\" is highlighted\
    \ in red. This handy feature helps you quickly find which line of code caused\
    \ the syntax error.\n\n## Run-time Errors\n\nIDLE catches syntax errors before\
    \ a program starts running, but some errors can't be caught until a program is\
    \ executed. These errors are known as **run-time errors** because they only occur\
    \ at the time that a program is run.\n\nTo generate a run-time error, change the\
    \ code in `hello_world.py` to the following:\n\n```\nprint(Hello, world)\n```\n\
    \nNow both quotation marks from the phrase \"Hello, world\" have been removed.\
    \ Did you notice how the text color changes to black when you removed the quotation\
    \ marks? IDLE no longer recognizes `Hello, world` as a string.\n\nWhat do you\
    \ think happens when you run the script? Try it out and see!\n\nSome red text\
    \ is displayed in the interactive window:\n\n```\nTraceback (most recent call\
    \ last):\n  File \"/home/hello_world.py\", line 1, in <module>\n    print(Hello,\
    \ world)\nNameError: name 'Hello' is not defined\n```\n\nWhat happened? While\
    \ trying to execute the program Python **raised** an error. Whenever an error\
    \ occurs, Python stops executing the program and displays the error in IDLE's\
    \ interactive window.\n\nThe text that gets displayed for an error is called a\
    \ **traceback**. Tracebacks give you some useful information about the error.\
    \ The traceback above tells us all of the following:\n\n- The error happened on\
    \ line 1 of the `hello_world.py`.\n- The line that generated the error was: `print(Hello,\
    \ world)`.\n- A `NameError` occurred.\n- The specific error was `name 'Hello'\
    \ is not defined`.\n\nThe quotation marks around `Hello, world` are missing, so\
    \ Python doesn't understand that it is a string of text. Instead, Python thinks\
    \ that `Hello` and `world` are the names of something else in the code. Since\
