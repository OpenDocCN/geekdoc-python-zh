  - "[PAGE 297]\n\n```\n>>> isinstance(miles, Bulldog)\nFalse\n\n>>> isinstance(jack,\
    \ Dachshund)\nFalse\n```\n\nMore generally, all objects created from a child class\
    \ are instances of the parent class, although they may not be instances of other\
    \ child classes.\n\nNow that you've got some child classes created for some different\
    \ breeds of dogs, let's give each breed its own sound.\n\n# Extending the Functionality\
    \ of a Parent Class\n\nAt this point, we have four classes floating around: a\
    \ parent class—Dog—and three child classes—JackRussellTerrier, Dachshund and Bulldog.\
    \ All three child classes inherit every attribute and method from the parent class,\
    \ including the .speak() method.\n\nSince different breeds of dogs have slightly\
    \ different barks, we want to provide a default value for the sound argument of\
    \ their respective .speak() methods. To do this, we need to override the .speak()\
    \ method in the class definition for each breed. To override a method defined\
    \ on the parent class, you define a method with the same name on the child class.\n\
    \nLet's see what this looks like for the JackRussellTerrier class:\n\n```\nclass\
    \ JackRussellTerrier(Dog):\n    def speak(self, sound=\"Arf\"):\n        return\
    \ f\"{self.name} says {sound}\"\n```\n\nThe .speak() method is now defined on\
    \ the JackRussellTerrier class with the default argument for sound set to \"Arf\"\
    . Now you can call .speak() and a JackRussellTerrier instance without passing\
    \ an argument to sound:"
  - "[PAGE 298]\n\n```\n>>> miles = JackRussellTerrier(\"Miles\", 4)\n>>> miles.speak()\n\
    'Miles says Arf'\n```\n\nSometimes dogs make different barks, so if Miles gets\
    \ angry and growls, you can still call .speak() with a different sound:\n\n```\n\
    >>> miles.speak(\"Grrr\")\n'Miles says Grrr'\n```\n\nOne advantage of class inheritance\
    \ is that changes to the parent class will automatically propagate to their child\
    \ classes. This occurs as long as the attribute or method being changed isn't\
    \ overridden in the child class.\n\nFor example, let's say you decide to change\
    \ the string returned by .speak() in the Dog class:\n\n```\nclass Dog:\n    #\
    \ Other attributes and methods omitted...\n\n    def speak(self, sound):\n   \
    \     return f\"{self.name} barks: {sound}\"\n```\n\nNow, when you create a new\
    \ Bulldog instance named jim, the result of jim.speak(\"Woof\") will be 'Jim barks:\
    \ Woof' instead of 'Jim says Woof':\n\n```\n>>> jim = Bulldog(\"Jim\", 5)\n>>>\
    \ jim.speak(\"Woof\")\n'Jim barks: Woof'\n```\n\nHowever, calling .speak() on\
    \ a JackRussellTerrier instance won't show the new style of output:\n\n```\n>>>\
    \ miles = JackRussellTerrier(\"Miles\", 4)\n>>> miles.speak()\n'Miles says Arf'\n\
    ```\n\nSometimes it make sense to completely override a method from a par-"
  - "[PAGE 299]\n\nent class. But in this instance, we don't want the `JackRussellTerrier`\
    \ class to lose any changes that might be made to the formatting of the output\
    \ string of `Dog.speak()`.\n\nTo do this, you still need to define a `.speak()`\
    \ method on the `JackRussellTerrier` class. But instead of explicitly defining\
    \ the output string, you need to call the `Dog` class's `.speak()` method *inside*\
    \ of the child class's `.speak()` method and make sure to pass to it the whatever\
    \ is passed to `sound` argument of `JackRussellTerrier.speak()`.\n\nYou can access\
    \ the parent class from inside a method of a child class by using the `super()`\
    \ function. Here's how you could re-write the `JackRussellTerrier.speak()` method\
    \ using `super()`:\n\n```\nclass JackRussellTerrier(Dog):\n    def speak(self,\
    \ sound=\"Arf\"):\n        return super().speak(sound)\n```\n\nWhen you call `super().speak(sound)`\
    \ inside of `JackRussellTerrier`, Python searches the parent class, `Dog`, for\
    \ a `.speak()` method and calls it with the variable `sound`. Now, when you call\
    \ `miles.speak()`, you will see output reflecting the new formatting in the `Dog`\
    \ class:\n\n```\n>>> miles = JackRussellTerrier(\"Miles\", 4)\n>>> miles.speak()\n\
    'Miles barks: Arf'\n```"
- md: "## 10.4 Challenge: Model a Farm\n\nIn this assignment, you'll create a simplified\
    \ model of a farm. As you work through this assignment, keep in mind that there\
    \ are a number of correct answers.\n\nThe focus of this assignment is less about\
    \ the Python class syntax and more about software design in general, which is\
    \ highly subjective. This assignment is intentionally left open-ended to encourage\
    \ you to think about how you would organize your code into classes.\n\nBefore\
    \ you write any code, grab a pen and paper and sketch out a model of your farm,\
    \ identifying classes, attributes, and methods. Think about inheritance. How can\
    \ you prevent code duplication? Take the time to work through as many iterations\
    \ as you feel are necessary.\n\nThe actual requirements are open to interpretation,\
    \ but try to adhere to these guidelines:\n\n- 1. You should have at least four\
    \ classes: the parent `Animal` class, and then at least three child animal classes\
    \ that inherit from `Animal`.\n- 2. Each class should have a few attributes and\
    \ at least one method that models some behavior appropriate for a specific animal\
    \ or all animals—such as walking, running, eating, sleeping, and so on.\n- 3.\
    \ Keep it simple. Utilize inheritance. Make sure you output details about the\
    \ animals and their behaviors.\n\nYou can find the solutions to this code challenge\
    \ and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n[Leave feedback on this section »](https://realpython.com)\n\n## 10.5 Summary\
    \ and Additional Resources\n\nIn this chapter you learned about object-oriented\
    \ programming (OOP) in Python, which is a programming paradigm that is not specific\
    \ to Python. Most of the modern programming languages—such as Java, C#, and C++—follow\
    \ OOP principles.\n\nYou saw how to define a class, which is a sort of “blueprint”\
    \ for an object, and how to instantiate an object from a class. You also learned\
    \ about attributes, which correspond to properties of an object, and methods,\
    \ which correspond to behaviors and actions of an object.\n\nFinally, you learned\
    \ how inheritance works by creating child classes from a parent class. You saw\
    \ how to reference a method on a parent class using `super()`, and how to check\
    \ if an object inherits from some class using `isinstance()`.\n\nOOP is a big\
    \ and sometimes difficult topic. Some programmers consider OOP a foundational\
    \ part of modern programming, but this viewpoint isn’t without its [criticisms](https://realpython.com).\n\
    \n> **Interactive Quiz**\n\nThis chapter comes with a free online quiz to check\
    \ your learning progress. You can access the quiz using your phone or computer\
    \ at the following web address:\n\n[realpython.com/quizzes/python-basics-10](https://realpython.com/quizzes/python-basics-10)\n\
    \n## Additional Resources\n\nYou've seen the basics of OOP, but there is so much\
    \ more to learn! Continue your journey with the following resources:\n\n- 1. [Official\
    \ Python documentation](https://docs.python.org/3/)\n- 2. [OOP Articles on Real\
    \ Python](https://realpython.com/)\n- 3. [Recommended resources on realpython.com](https://realpython.com/)\n\
    \n[Leave feedback on this section »](https://realpython.com/)\n\n# Chapter 11\n\
    \n## Modules and Packages\n\nAs you gain experience writing code, you will eventually\
    \ work on projects that are so large that keeping all of the code in a single\
    \ file becomes cumbersome.\n\nInstead of writing a single file, you can put related\
    \ code into separate files called **modules**. Individual modules can be put together\
    \ like building blocks to create a larger application.\n\nThere are four main\
    \ advantages to breaking a program into modules:\n\n- 1. **Simplicity:** Modules\
    \ are focused on a single problem.\n- 2. **Maintainability:** Small files are\
    \ better than large files.\n- 3. **Reusability:** Modules reduce duplicate code.\n\
    - 4. **Scoping:** Modules have their own **namespaces**.\n\n**In this chapter,\
    \ you will learn how to:**\n\n- Create your own modules\n- Use modules in another\
    \ file via the **import** statement\n- Organize several modules into a **package**\n\
    \nLet's get started!\n\n[Leave feedback on this section »]\n\n## 11.1 Working\
    \ With Modules\n\nA **module** is a file containing Python code that can be re-used\
    \ in other Python code files.\n\nTechnically, every Python script file that you\
    \ have created while reading this book is a module, but you haven't seen how to\
    \ use code from one module inside of another.\n\nIn this section, you'll explore\
    \ modules in more detail. You'll learn how to create them with IDLE, how to import\
    \ one module into another, and understand how modules create namespaces.\n\n###\
    \ Creating Modules\n\nOpen IDLE and start a new script window by selecting `File`\
    \ > `New File` or by pressing `Ctrl` + `N`. In the script window, define a function\
    \ `add()` that returns the sum of its two parameters:\n\n```python\n# adder.py\n\
    \ndef add(x, y):\n    return x + y\n```\n\nSelect `File` > `Save` or press `Ctrl`\
    \ + `S` to save the file as `adder.py` in a new directory called `myproject/`\
    \ somewhere on your computer. `adder.py` is a Python module! It's not a complete\
    \ program, but not all modules need to be.\n\nNow open another new script window\
    \ by pressing `Ctrl` + `N` and type the following code:\n\n```python\n# main.py\n\
    \nvalue = add(2, 2)\nprint(value)\n```\n\nSave the file as `main.py` in the same\
    \ `myproject/` folder you just created. Then press `F5` to run the module.\n\n\
    When the module runs you'll see a `NameError` displayed in IDLE's interactive\
    \ window:\n\n```\nTraceback (most recent call last):\n  File \"//Documents/myproject/main.py\"\
    , line 1, in <module>\n    value = add(2, 2)\nNameError: name 'add' is not defined\n\
    ```\n\nIt makes sense that a `NameError` occurs because `add()` is defined in\
    \ `adder.py` and not in `main.py`. In order to use `add()` in `main.py`, you must\
    \ first import the `adder` module.\n\n### Importing One Module Into Another\n\n\
    In the script window for `main.py`, add the following line to the top of the file:\n\
    \n```python\n# main.py\n\nimport adder  # <-- Add this line\n\n# Leave the code\
    \ below unchanged\nvalue = add(2, 2)\nprint(value)\n```\n\nWhen you `import` one\
    \ module into another, the contents of the imported module become available in\
    \ the other. The module with the `import` statement is called the **calling module**.\
    \ In this example, `adder.py` is the imported module and `main.py` is the calling\
    \ module.\n\nPress `Ctrl` + `S` to save `main.py` and press `F5` to run the module.\
    \ The `NameError` exception is still raised. That's because `add()` can only be\
    \ accessed from the `adder` namespace."
  mdcn: "## 10.4 挑战：建模一个农场\n\n在本次作业中，你将创建一个简化的农场模型。在完成作业时，请记住，正确的答案不止一种。\n\n本次作业的重点不在于\
    \ Python 类语法，而更多地在于通用的软件设计，这具有高度的主观性。本作业特意设计为开放式，以鼓励你思考如何将代码组织成类。\n\n在编写任何代码之前，请先拿纸笔，勾勒出你的农场模型，识别出类、属性和方法。思考继承。如何避免代码重复？花时间进行你认为必要的迭代。\n\
    \n具体要求可以灵活解释，但请尽量遵循以下指导原则：\n\n- 1. 你应该至少有四个类：一个父类 `Animal`，以及至少三个继承自 `Animal`\
    \ 的子动物类。\n- 2. 每个类应该有几个属性和至少一个方法，该方法模拟特定动物或所有动物的适当行为——例如行走、奔跑、进食、睡觉等。\n- 3. 保持简单。利用继承。确保你输出关于动物及其行为的详细信息。\n\
    \n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到此代码挑战的解决方案和许多其他额外资源。\n\n[为此部分留下反馈 »](https://realpython.com)\n\n## 10.5 总结与附加资源\n\
    \n在本章中，你学习了 Python 中的面向对象编程（OOP），这是一种不特定于 Python 的编程范式。大多数现代编程语言——如 Java、C# 和\
    \ C++——都遵循 OOP 原则。\n\n你了解了如何定义一个类（它是对象的某种“蓝图”），以及如何从类实例化一个对象。你还学习了属性（对应于对象的属性）和方法（对应于对象的行为和动作）。\n\
    \n最后，你通过从父类创建子类，了解了继承的工作原理。你看到了如何使用 `super()` 引用父类上的方法，以及如何使用 `isinstance()` 检查一个对象是否继承自某个类。\n\
    \nOOP 是一个庞大且有时困难的主题。一些程序员认为 OOP 是现代编程的基础部分，但这种观点并非没有[批评](https://realpython.com)。\n\
    \n> **互动测验**\n\n本章附带一个免费的在线测验，以检查你的学习进度。你可以使用手机或电脑访问以下网址进行测验：\n\n[realpython.com/quizzes/python-basics-10](https://realpython.com/quizzes/python-basics-10)\n\
    \n## 附加资源\n\n你已经了解了 OOP 的基础知识，但还有更多内容需要学习！使用以下资源继续你的旅程：\n\n- 1. [官方 Python 文档](https://docs.python.org/3/)\n\
    - 2. [Real Python 上的 OOP 文章](https://realpython.com/)\n- 3. [realpython.com 上的推荐资源](https://realpython.com/)\n\
    \n[为此部分留下反馈 »](https://realpython.com/)\n\n# 第 11 章\n\n## 模块与包\n\n随着你编写代码的经验增长，你最终会处理非常大的项目，以至于将所有代码放在单个文件中会变得笨重。\n\
    \n你可以将相关代码放入称为**模块**的单独文件中，而不是编写单个文件。各个模块可以像积木一样组合在一起，创建更大的应用程序。\n\n将程序分解为模块有四个主要优点：\n\
    \n- 1. **简单性：** 模块专注于单一问题。\n- 2. **可维护性：** 小文件比大文件更好。\n- 3. **可重用性：** 模块减少重复代码。\n\
    - 4. **作用域：** 模块有自己的**命名空间**。\n\n**在本章中，你将学习如何：**\n\n- 创建你自己的模块\n- 通过 **import**\
    \ 语句在另一个文件中使用模块\n- 将几个模块组织成一个**包**\n\n让我们开始吧！\n\n[为此部分留下反馈 »]\n\n## 11.1 使用模块\n\
    \n**模块**是一个包含 Python 代码的文件，可以在其他 Python 代码文件中重复使用。\n\n从技术上讲，你在阅读本书时创建的每个 Python\
    \ 脚本文件都是一个模块，但你还没有看到如何在一个模块中使用另一个模块的代码。\n\n在本节中，你将更详细地探索模块。你将学习如何使用 IDLE 创建它们，如何将一个模块导入另一个模块，以及理解模块如何创建命名空间。\n\
    \n### 创建模块\n\n打开 IDLE，通过选择 `File` > `New File` 或按 `Ctrl` + `N` 开始一个新的脚本窗口。在脚本窗口中，定义一个函数\
    \ `add()`，该函数返回其两个参数的和：\n\n```python\n# adder.py\n\ndef add(x, y):\n    return\
    \ x + y\n```\n\n选择 `File` > `Save` 或按 `Ctrl` + `S` 将文件保存为 `adder.py`，放在你计算机上某个位置的新目录\
    \ `myproject/` 中。`adder.py` 是一个 Python 模块！它不是一个完整的程序，但并非所有模块都需要是完整的。\n\n现在按 `Ctrl`\
    \ + `N` 打开另一个新的脚本窗口，并输入以下代码：\n\n```python\n# main.py\n\nvalue = add(2, 2)\nprint(value)\n\
    ```\n\n将文件保存为 `main.py`，放在你刚刚创建的同一个 `myproject/` 文件夹中。然后按 `F5` 运行模块。\n\n当模块运行时，你会在\
    \ IDLE 的交互式窗口中看到一个 `NameError`：\n\n```\nTraceback (most recent call last):\n \
    \ File \"//Documents/myproject/main.py\", line 1, in <module>\n    value = add(2,\
    \ 2)\nNameError: name 'add' is not defined\n```\n\n发生 `NameError` 是有道理的，因为 `add()`\
    \ 是在 `adder.py` 中定义的，而不是在 `main.py` 中。为了在 `main.py` 中使用 `add()`，你必须首先导入 `adder`\
    \ 模块。\n\n### 将一个模块导入另一个模块\n\n在 `main.py` 的脚本窗口中，在文件顶部添加以下行：\n\n```python\n# main.py\n\
    \nimport adder  # <-- 添加这一行\n\n# 保持下面的代码不变\nvalue = add(2, 2)\nprint(value)\n\
    ```\n\n当你将一个模块 `import` 到另一个模块时，被导入模块的内容在另一个模块中变得可用。带有 `import` 语句的模块称为**调用模块**。在此示例中，`adder.py`\
