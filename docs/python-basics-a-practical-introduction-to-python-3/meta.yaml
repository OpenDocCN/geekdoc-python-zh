    # 18.8 Example App: Temperature Converter


    In this section, you''ll build a temperature converter that allows the user to
    input a temperature in degrees Fahrenheit and push a button to convert that temperature
    to degrees Celsius.


    We''ll walk through the code step by step. You can also find the full source code
    at the end of this section for your reference.


    To get the most out of this section, open up IDLE''s script window and follow
    along.


    Before we start coding, let''s design the app. We need three basic elements:


    +   1. An `Entry` widget called `ent_temperature` to enter the Fahrenheit value

    2. A `Label` widget called `lbl_result` to display the Celsius result

    3. A `Button` widget called `btn_convert` that reads the value from the `Entry`
    widget, converts it from Fahrenheit to Celsius, and sets the text of the `Label`
    widget to the result when clicked


    We can arrange these in a grid with a single row and one column for each widget.
    That get''s us a minimally working application, but it isn''t very user friendly.
    Everything needs to have some helpful labels.'
