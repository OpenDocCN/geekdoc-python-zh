    \ `len` 有一个字符串值，你可以用 `type()` 验证类型是 `str`：\n\n```\n>>> type(len)\n<class 'str'>\n\
    ```\n\n变量名 `len` 是 Python 中的一个关键字，尽管你可以更改它的值，但这样做通常是个坏主意。更改 `len` 的值可能会使你的代码混乱，因为很容易将新的\
    \ `len` 误认为是内置函数。\n\n> **重要提示**\n\n如果你输入了前面的代码示例，**你将无法在 IDLE 中访问内置的 `len` 函数。**\n\
