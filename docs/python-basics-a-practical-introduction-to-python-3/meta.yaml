    The list assigned to a slice does not need to have the same length as the slice.
    For instance, you can assign a list of three elements to a slice with two elements:


    ```

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> colors[1:3] = ["orange", "magenta", "aqua"]

    >>> colors

    [''red'', ''orange'', ''magenta'', ''aqua'', ''blue'']

    ```


    The values "orange" and "magenta" replace the original values "yellow" and "green"
    in `colors` at the indices 1 and 2. Then a new slot is created at index 4 and
    "blue" is assigned to this index. Finally, "aqua" is assigned to index 3.


    When the length of the list being assigned to the slice is less than the length
    of the slice, the overall length of the original list is reduced:


    ```

    >>> colors

    [''red'', ''orange'', ''magenta'', ''aqua'', ''blue'']

    >>> colors[1:4] = ["yellow", "green"]

    >>> colors

    [''red'', ''yellow'', ''green'', ''blue'']

    ```


    The values "yellow" and "green" replace the values "orange" and "magenta" in `colors`
    at the indices 1 and 2. Then the value at index 3 is replaced with the value "blue".
    Finally, the slot at index 4 is removed from `colors` entirely.


    The above examples show how to change, or **mutate**, lists using index and slice
    notation. There are also several list methods that you can use to mutate a list.


