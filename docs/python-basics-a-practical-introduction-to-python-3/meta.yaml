    You can access the HTML attributes of the Tag object by putting their name in-between
    square brackets, just as if the attributes were keys in a dictionary.


    For example, the <img src="/static/dionysus.jpg"/> tag has a single attribute
    src with the value dionysus.jpg. Likewise, and HTML tag such as the link <a href="https://realpython.com"
    target="_blank"> has two attributes, href and target.


    To get the source of the images in the Dionysus profile page, you access the src
    attribute using the dictionary notation mentioned above:


    ```

    >>> image1["src"]

    ''/static/dionysus.jpg''


    >>> image2["src"]

    ''/static/grapes.png''

    ```


    Certain tags in HTML documents can be accessed by properties of the Tag object.
    For example, to get the <title> tag in a document, you can use the .title property:


    ```

    >>> soup.title

    <title>Profile: Dionysus</title>

