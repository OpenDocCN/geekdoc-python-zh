    \ max((1, 2, 3, 4, 5))\n5\n```\n\n`sum()`、`min()` 和 `max()` 都是 Python 的内置函数，这一事实告诉你它们被频繁使用。很可能，你会发现自己在自己的程序中经常使用它们！\n\
    \n## 列表推导式\n\n从现有可迭代对象创建列表的另一种方式是使用**列表推导式**：\n\n```python\n>>> numbers = (1,\
    \ 2, 3, 4, 5)\n>>> squares = [num**2 for num in numbers]\n>>> squares\n[1, 4,\
    \ 9, 16, 25]\n```\n\n列表推导式是 `for` 循环的简写形式。在上面的例子中，创建了一个包含五个数字的元组字面量并赋值给 `numbers`\
    \ 变量。在第二行，一个列表推导式遍历 `numbers` 中的每个数字，对每个数字求平方，并将其添加到一个名为 `squares` 的新列表中。\n\n\
    使用传统的 `for` 循环创建 `squares` 列表需要首先创建一个空列表，遍历 `numbers` 中的数字，并将每个数字的平方追加到列表中：\n\n\
    ```python\n>>> squares = []\n>>> for num in numbers:\n...     squares.append(num**2)\n\
    ...\n>>> squares\n[1, 4, 9, 16, 25]\n```\n\n列表推导式通常用于将一个列表中的值转换为不同的类型。\n\n例如，假设你需要将一个包含浮点数值的字符串列表转换为\
    \ `float` 对象列表。以下列表推导式实现了这一点：\n\n```python\n>>> str_numbers = [\"1.5\", \"2.3\"\
    , \"5.25\"]\n>>> float_numbers = [float(value) for value in str_numbers]\n>>>\
    \ float_numbers\n[1.5, 2.3, 5.25]\n```\n\n列表推导式并非 Python 独有，但它是其众多备受喜爱的特性之一。如果你发现自己正在创建一个空列表，遍历某个其他可迭代对象，并将新项目追加到列表中，那么很可能你可以用列表推导式来替换你的代码！\n\
    \n## 9.2. 列表是可变序列"
