  mdcn: "## 6.2. 编写你自己的函数\n\n- 2. 函数名，`multiply`\n- 3. 参数列表，`(x, y)`\n- 4. 行末的冒号（`:`）\n\
    \n当 Python 读取以 `def` 关键字开头的行时，它会创建一个新函数。该函数被赋值给一个与函数名同名的变量。\n\n> **注意**\n\n由于函数名会成为变量，它们必须遵循你在第\
    \ 3 章学到的变量命名规则。\n\n因此，函数名只能包含数字、字母和下划线，并且不能以数字开头。\n\n参数列表是由圆括号括起来的参数名列表。它定义了函数预期的输入。`(x,\
    \ y)` 是 `multiply` 函数的参数列表。它创建了两个参数，`x` 和 `y`。\n\n**参数**有点像变量，只不过它没有值。它是一个占位符，用于在函数被调用并传入一个或多个实参时，接收实际的值。\n\
    \n函数体中的代码可以像使用具有真实值的变量一样使用参数。例如，函数体可能包含一行带有表达式 `x * y` 的代码。\n\n由于 `x` 和 `y` 没有值，`x\
    \ * y` 也没有值。Python 将该表达式保存为一个模板，并在函数执行时填入缺失的值。\n\n一个函数可以有任意数量的参数，包括完全没有参数！\n\n\
    ## 函数体\n\n**函数体**是在你的程序中每次使用该函数时运行的代码。以下是 `multiply` 函数的函数体：\n\n```\ndef multiply(x,\
    \ y):\n    # 函数体\n    product = x * y\n    return product\n```\n\n`multiply` 是一个相当简单的函数。它的函数体只有两行代码！\n\
    \n第一行创建了一个名为 `product` 的变量，并将 `x * y` 的值赋给它。由于 `x` 和 `y` 还没有值，这行代码实际上是函数执行时 `product`\
    \ 被赋值的模板。\n\n第二行代码被称为**返回语句**。它以 `return` 关键字开头，后面跟着变量 `product`。当 Python 执行到返回语句时，它会停止运行函数并返回\
    \ `product` 的值。\n\n注意，函数体中的两行代码都是缩进的。这至关重要！在函数签名下方缩进的每一行都被理解为函数体的一部分。\n\n例如，以下示例中的\
    \ `print()` 函数不是函数体的一部分，因为它没有缩进：\n\n```\ndef multiply(x, y):\n    product = x\
    \ * y\n    return product\n\nprint(\"Where am I?\")  # 不在函数体内。\n```\n\n如果 `print()`\
    \ 被缩进，那么即使 `print()` 和前一行之间有空行，它也会成为函数体的一部分：\n\n```\ndef multiply(x, y):\n   \
    \ product = x * y\n    return product\n\n    print(\"Where am I?\")  # 在函数体内。\n\
    ```\n\n在函数体中缩进代码时，你必须遵循一条规则：每一行必须缩进相同的空格数。\n\n尝试将以下代码保存到名为 `multiply.py` 的文件中，并从\
    \ IDLE 运行它：\n\n```\ndef multiply(x, y):\n    product = x * y\n    return product\
    \  # 多缩进了一个空格。\n```\n\nIDLE 不会运行代码！会出现一个对话框，显示错误“unexpected indent”。Python 没有预料到返回语句会比前一行缩进得不同。\n\
    \n当一行代码的缩进比上一行少，但缩进又不匹配任何之前的行时，会发生另一个错误。修改 `multiply.py` 文件如下：\n\n```\ndef multiply(x,\
    \ y):\n    product = x * y\n    return product  # 比前一行缩进少。\n```\n\n现在保存并运行文件。IDLE\
    \ 会停止并显示错误“unindent does not match any outer indentation level”。返回语句的缩进空格数与函数体中的任何其他行都不匹配。\n\
    \n> **注意**\n\n尽管 Python 对函数体中缩进代码使用的空格数没有规定，但 [PEP 8 建议使用四个空格进行缩进](https://peps.python.org/pep-0008/)。\n\
    \n我们在本书中遵循这一惯例。\n\n一旦 Python 执行了 `return` 语句，函数就会停止运行并返回值。如果在 `return` 语句下方有任何缩进为函数体一部分的代码，它将永远不会运行。\n\
    \n例如，在以下函数中，`print()` 函数将永远不会被执行：\n\n```\ndef multiply(x, y):\n    product = x\
    \ * y\n    return product\n    print(\"You can't see me!\")\n```\n\n如果你调用这个版本的\
    \ `multiply()`，你将永远不会看到字符串 \"You can't see me!\" 被显示。\n\n## 调用用户定义的函数\n\n你调用用户定义的函数就像调用任何其他函数一样。输入函数名，后跟括号内的参数列表。\n\
    \n例如，要使用参数 2 和 4 调用 `multiply()`，只需输入：\n\n```\nmultiply(2, 4)\n```\n\n与内置函数不同，用户定义的函数在使用\
    \ `def` 关键字定义之前是不可用的。你必须在调用函数之前定义它。\n\n尝试保存并运行以下脚本：\n\n```\nnum = multiply(2,\
    \ 4)\nprint(num)\n\ndef multiply(x, y):\n    product = x * y\n    return product\n\
    ```\n\n当 Python 读取 `num = multiply(2, 4)` 这一行时，它无法识别名称 `multiply` 并引发 `NameError`：\n\
    \n```\nTraceback (most recent call last):\n  File \"C:\\Users\\dave\\multiply.py\"\
    , line 1, in <module>\n    num = multiply(2, 4)\nNameError: name 'multiply' is\
    \ not defined\n```\n\n要修复此错误，请将函数定义移到文件顶部：\n\n```\ndef multiply(x, y):\n    product\
    \ = x * y\n    return product\n\nnum = multiply(2, 4)\nprint(num)\n```\n\n现在，当你保存并运行脚本时，交互式窗口中会显示值\
    \ 8。\n\n## 没有返回语句的函数\n\nPython 中的所有函数都返回一个值，即使该值是 `None`。然而，并非所有函数都需要 `return`\
    \ 语句。\n\n例如，以下函数是完全有效的：\n\n```\ndef greet(name):\n    print(f\"Hello, {name}!\"\
    )\n```\n\n`greet()` 没有返回语句，但工作正常：\n\n```\n>>> greet(\"Dave\")\nHello, Dave!\n\
    ```\n\n即使 greet() 没有返回语句，它仍然返回一个值：\n\n```\n>>> return_value = greet(\"Dave\")\n\
    Hello, Dave!\n>>> print(return_value)\nNone\n```\n\n还要注意，即使 greet(\"Dave\") 的结果被赋值给一个变量，字符串\
    \ \"Hello, Dave!\" 也会被打印。这是因为 greet() 函数体内部对 print() 的调用产生了始终打印到控制台的副作用。\n\n如果你不期望看到\
    \ \"Hello, Dave!\" 被打印，那么你刚刚体验到了副作用的问题之一。它们并不总是预期的！\n\n当你创建自己的函数时，你应该始终记录它们的功能。这样其他开发人员就可以阅读文档，了解如何使用该函数以及调用它时会发生什么。\n\
    \n## 记录你的函数\n\n要在 IDLE 的交互式窗口中获取函数的帮助，你可以使用 help() 函数：\n\n```\n>>> help(len)\n\
    Help on built-in function len in module builtins:\n\nlen(obj, /)\n    Return the\
    \ number of items in a container.\n```\n\n当你将变量名或函数名传递给 help() 时，它会显示一些关于它的有用信息。在这种情况下，help()\
    \ 告诉你 len 是一个内置函数，返回容器中的项目数。\n\n> **注意**\n\n**容器**是包含其他对象的对象的特殊名称。字符串是一个容器，因为它包含字符。\n\
    \n你将在第 9 章学习其他容器类型。\n\n让我们看看当你对 `multiply()` 函数调用 `help()` 时会发生什么：\n\n```\n>>>\
