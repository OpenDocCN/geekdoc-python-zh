    3.  识别错误并尝试修复\n4.  重复步骤 1-3，直到错误被修复\n\n调试既是一门艺术，也是一门科学。掌握调试的唯一方法就是大量练习！\n\n一种练习方式是打开调试控制窗口，在你完成本书后续章节的练习和挑战时，用它来逐步执行你的代码。\n\
    \n> **互动测验**\n\n本章附带一个免费的在线测验，用于检查你的学习进度。你可以使用手机或电脑通过以下网址访问测验：\n\n[realpython.com/quizzes/python-basics-7](https://realpython.com/quizzes/python-basics-7)\n\
    \n## 补充资源\n\n有关调试 Python 代码的更多信息，请查看以下资源：\n\n- [使用 Pdb 调试 Python](https://realpython.com/python-debugging-pdb/)\n\
    - [realpython.com 上的推荐资源](https://realpython.com)\n\n[对本节提供反馈 »](https://realpython.com)\n\
    \n## 第 8 章\n\n## 条件逻辑与控制流\n\n你在本书中看到的几乎所有代码都是**无条件的**。也就是说，代码不进行任何选择。每一行代码都按照书写顺序或函数调用顺序执行，循环内部可能存在重复。\n\
    \n在本章中，你将学习如何使用**条件逻辑**编写根据不同条件执行不同操作的程序。结合函数和循环，条件逻辑使你能够编写处理多种不同情况的复杂程序。\n\n\
    **在本章中，你将学习如何：**\n\n- 比较两个或多个变量的值\n- 编写 `if` 语句来控制程序的流程\n- 使用 `try` 和 `except`\
    \ 处理错误\n- 应用条件逻辑创建简单的模拟\n\n让我们开始吧！\n\n[对本节提供反馈 »](https://example.com)\n\n## 8.1\
    \ 比较值\n\n条件逻辑基于某个表达式（称为**条件**）的真假来执行不同的操作。这个概念并非计算机独有。人类在做决定时也一直在使用条件逻辑。\n\n例如，在美国，购买酒精饮料的法定年龄是\
    \ 21 岁。陈述“如果你至少 21 岁，那么你可以购买啤酒”就是条件逻辑的一个例子。短语“你至少 21 岁”是一个条件，因为它可能为真，也可能为假。\n\n\
    在计算机编程中，条件通常采用比较两个值的形式，例如确定一个值是否大于另一个值，或者两个值是否相等。一组称为**布尔比较符**的标准符号用于进行比较，其中大部分你可能已经熟悉。\n\
    \n下表描述了这些布尔比较符：\n\n| 布尔比较符 | 示例 | 含义 |\n| :--- | :--- | :--- |\n| > | a > b |\
    \ a 大于 b |\n| < | a < b | a 小于 b |\n| >= | a >= b | a 大于或等于 b |\n| <= | a <= b\
    \ | a 小于或等于 b |\n| != | a != b | a 不等于 b |\n| == | a == b | a 等于 b |\n\n术语**布尔**源自英国数学家乔治·布尔的姓氏，他的著作帮助奠定了现代计算的基础。为了纪念布尔，条件逻辑有时被称为**布尔逻辑**，条件有时被称为**布尔表达式**。\n\
    \n还有一种基本数据类型称为**布尔**，简称 **bool**，它只能有两个值之一。在 Python 中，这些值被方便地命名为 `True` 和 `False`：\n\
    \n```\n>>> type(True)\n<class 'bool'>\n\n>>> type(False)\n<class 'bool'>\n```\n\
    \n请注意，`True` 和 `False` 都以大写字母开头。\n\n计算条件的结果始终是一个布尔值：\n\n```\n>>> 1 == 1\nTrue\n\
    \n>>> 3 > 5\nFalse\n```\n\n在第一个例子中，因为 1 等于 1，所以 `1 == 1` 的结果是 `True`。在第二个例子中，3\
    \ 不大于 5，所以结果是 `False`。\n\n> **重要提示**\n\n编写条件时一个常见的错误是使用赋值运算符 `=` 而不是 `==` 来测试两个值是否相等。\n\
    \n幸运的是，如果遇到这个错误，Python 会引发 `SyntaxError`，这样你在运行程序之前就会知道。\n\n你可能会发现将布尔比较符视为对两个值提出问题会很有帮助。`a\
    \ == b` 询问 `a` 和 `b` 是否具有相同的值。同样，`a != b` 询问 `a` 和 `b` 是否具有不同的值。\n\n条件表达式不仅限于比较数字。你也可以比较字符串等值：\n\
    \n```\n>>> \"a\" == \"a\"\nTrue\n\n>>> \"a\" == \"b\"\nFalse\n\n>>> \"a\" < \"\
    b\"\nTrue\n\n>>> \"a\" > \"b\"\nFalse\n```\n\n上面最后两个例子对你来说可能看起来很奇怪。一个字符串怎么可能大于或小于另一个字符串？\n\
    \n比较符 < 和 > 在与数字一起使用时代表大于和小于的概念，但更普遍地说，它们代表顺序的概念。在这方面，\"a\" < \"b\" 检查字符串 \"a\"\
    \ 是否在字符串 \"b\" 之前。但字符串是如何排序的呢？\n\n在 Python 中，字符串是**按字典顺序**排序的，这是一种花哨的说法，表示它们按照在字典中出现的顺序排序。因此，你可以将\
    \ \"a\" < \"b\" 理解为询问字母 a 是否在字典中出现在字母 b 之前。\n\n字典顺序扩展到包含两个或更多字符的字符串，通过查看字符串的每个组成字母：\n\
    \n```\n>>> \"apple\" < \"astronaut\"\nTrue\n\n>>> \"beauty\" > \"truth\"\nFalse\n\
    ```\n\n由于字符串可以包含字母表以外的字符，排序也必须扩展到这些其他字符。\n\n我们不会深入探讨字母以外的字符如何排序的细节。在实践中，< 和 >\
    \ 比较符最常用于数字，而不是字符串。\n\n## 复习练习\n\n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到这些练习的解决方案和许多其他额外资源。\n\n1.  对于以下每个条件表达式，猜测它们的计算结果是 `True` 还是 `False`。然后将它们输入交互式窗口以检查你的答案：\n\
    \n    ```\n    1 <= 1\n    1 != 1\n    1 != 2\n    \"good\" != \"bad\"\n    \"\
    good\" != \"Good\"\n    123 == \"123\"\n    ```\n\n2.  对于以下每个表达式，在空白处（由 `__` 表示）填入适当的布尔比较符，使表达式计算结果为\
    \ `True`：\n\n    ```\n    3 __ 4\n    10 __ 5\n    \"jack\" __ \"jill\"\n    42\
    \ __ \"42\"\n    ```\n\n[对本节提供反馈 »](https://realpython.com/python-basics/resources)\n\
    \n## 8.2 添加一些逻辑\n\n除了布尔比较符，Python 还有称为**逻辑运算符**的特殊关键字，可用于组合布尔表达式。有三个逻辑运算符：`and`、`or`\
    \ 和 `not`。\n\n逻辑运算符用于构造复合逻辑表达式。在大多数情况下，它们的含义与英语中的含义相似，尽管它们在 Python 中使用的规则要精确得多。\n\
    \n### and 关键字\n\n考虑以下陈述：\n\n1.  猫有四条腿。\n2.  猫有尾巴。\n\n一般来说，这两个陈述都是真的。\n\n当我们使用\
    \ and 组合这两个陈述时，得到的句子“猫有四条腿并且猫有尾巴”也是一个真实的陈述。如果两个陈述都被否定，复合陈述“猫没有四条腿并且猫没有尾巴”就是假的。\n\
    \n即使我们混合真假陈述，复合陈述也是假的。“猫有四条腿并且猫没有尾巴”和“猫没有四条腿并且猫有尾巴”都是假的陈述。\n\n当两个陈述 P 和 Q 用 and\
    \ 组合时，复合陈述“P and Q”的**真值**为真当且仅当 P 和 Q 都为真。\n\nPython 的 and 运算符的工作方式完全相同。以下是四个使用\
    \ and 的复合语句示例：\n\n```\n>>> 1 < 2 and 3 < 4  # 两者都为 True\nTrue\n```\n\n两个陈述都为 True，所以组合也为\
    \ True。\n\n```\n>>> 2 < 1 and 4 < 3  # 两者都为 False\nFalse\n```\n\n两个陈述都为 False，所以它们的组合也为\
    \ False。\n\n```\n>>> 1 < 2 and 4 < 3  # 第二个陈述为 False\nFalse\n```\n\n1 < 2 为 True，但\
    \ 4 < 3 为 False，所以它们的组合为 False。"
