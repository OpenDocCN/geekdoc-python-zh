    \ works by splitting the Pride_and_Prejudice.pdf file in the Chapter 14 Practice\
    \ Files folder with the breakpoint at the 150th page.\n\nLeave feedback on this\
    \ section »\n\n## 14.4 Concatenating and Merging PDFs\n\nTwo common tasks when\
    \ working with PDF files are concatenating and merging several PDFs together into\
    \ a single file.\n\nWhen you concatenate two or more PDFs together, you join the\
    \ files into a single document one after another. For example, a company may concatenate\
    \ several daily reports into one monthly report at the end of a month.\n\nMerging\
    \ two PDFs together also joins two PDFs into a single file, but instead of joining\
    \ the second PDF at the end of the first, it can be inserted after a specific\
    \ page in the first PDF, pushing all following pages in the first PDF to the end\
    \ of the second one.\n\nIn this section, you'll learn how to concatenate and merge\
    \ PDFs using the `PyPDF2` package's `PdfFileMerger`.\n\n### The `PdfFileMerger`\
    \ Class\n\nThe `PdfFileMerger` class is a lot like the `PdfFileWriter` class you\
    \ learned about in the last section. Both classes are used to write PDF files.\
    \ In both cases, pages are added to instances of the class and then written to\
    \ a file.\n\nThe main differences is that `PdfFileWriter` can only append pages\
    \ to the end of the list of pages already contained in the writer, whereas `PdfFileMerger`\
    \ can insert pages at any location.\n\nLet's go ahead and create our first `PdfFileMerger`\
    \ instance. In IDLE's interactive window, type the following:\n\n```python\n>>>\
    \ from PyPDF2 import PdfFileMerger\n>>> pdf_merger = PdfFileMerger()\n```\n\n\
    First, import the `PdfFileMerger` class from the `PyPDF2` package. Then create\
    \ a new `PdfFileMerger` instance and assigns it to the `pdf_merger` variable.\
    \ `PdfFileMerger` objects are empty when they are first instantiated. We'll need\
    \ to add some pages to it before we can do anything.\n\nThere are a couple of\
    \ ways to add pages to the `pdf_merger` object, and how you do that depends on\
    \ what you need to accomplish:\n\n- `.append()` concatenates every page in an\
    \ existing PDF document to the end of the pages currently in the `PdfFileMerger`.\n\
    - `.merge()` is used to insert all of the pages in an existing PDF document after\
