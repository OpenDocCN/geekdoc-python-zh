    ```

    >>> 5 % -3

    -1


    >>> -5 % 3

    1


    >>> -5 % -3

    -2

    ```


    These potentially shocking results are really quite well defined. To calculate
    the remainder r of dividing a number x by a number y, Python uses the equation
    r = x - (y * (x // y)).


    For example, to find 5 % -3, first find (5 // -3). Since 5 / -3 is about -1.67,
    5 // -3 is -2. Now multiply that by -3 to get 6. Finally, subtract 6 from 5 to
    get -1.


    # Arithmetic Expressions


    You can combine operators to form complex expressions. An **expression** is a
    combination of numbers, operators, and parentheses that Python can compute, or
    **evaluate**, to return a value.


    Here are some examples of arithmetic expressions:


    ```

    >>> 2*3 - 1

    5


    >>> 4/2 + 2**3

    10.0


    >>> -1 + (-3*2 + 4)

    -3

    ```


    The rules for evaluating expressions work are the same as in everyday arithmetic.
    In school, you probably learned these rules under the name “order of operations.”'
  - '[PAGE 118]


    # 5.3. Challenge: Perform Calculations on User Input


    The *, /, //, and % operators all have equal **precedence**, or priority, in an
    expression, and each of these has a higher precedence than the + and - operators.
    This is why 2*3 - 1 returns 5 and not 4. 2*3 is evaluated first, because * has
    higher precedence than the - operator.


    You may notice that the expressions in the previous example do not follow the
    rule for putting a space on either side of all of the operators. PEP 8 says the
    following about whitespace in complex expressions:


    > “If operators with different priorities are used, consider adding whitespace
    around the operators with the lowest priority(ies). Use your own judgment; however,
    never use more than one space, and always have the same amount of whitespace on
    both sides of a binary operator.”


    — PEP 8, Other Recommendations


