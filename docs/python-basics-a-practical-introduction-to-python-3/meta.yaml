    None\n```\n\n当你调用 `print()` 时，显示的文本不是返回值。它是 `print()` 的副作用。\n\n现在你知道了函数是值，就像字符串和数字一样，并且已经了解了函数是如何被调用和执行的，让我们来看看如何创建你自己的用户定义函数。\n\
    \n## 6.2 编写你自己的函数\n\n随着你编写更长、更复杂的程序，你可能会发现你需要重复使用相同的几行代码。或者你可能需要在代码中多次用不同的值计算相同的公式。\n\
    \n你可能会忍不住将类似的代码复制粘贴到程序的其他部分，并根据需要进行修改，但这通常是个坏主意！\n\n重复的代码可能是一个维护的噩梦。如果你发现某个被复制粘贴到各处的代码中有错误，你最终将不得不在代码被复制的所有地方应用修复。这工作量很大，而且你可能会漏掉一个地方！\n\
    \n在本节中，你将学习如何定义自己的函数，以便在需要重用代码时避免重复自己。让我们开始吧！\n\n### 函数的结构\n\n每个函数都有两个部分：\n\n\
