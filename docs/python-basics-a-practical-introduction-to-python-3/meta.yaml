  md: '# # 9.1 Tuples Are Immutable Sequences


    Perhaps the simplest compound data structure is a sequence of items.


    A **sequence** is an ordered list of values. Each element in a sequence is assigned
    an integer, called an **index**, that determines the order in which the values
    appear. Just like strings, the index of the first value in a sequence is 0.


    For example, the letters of the English alphabet form a sequence whose first element
    is A and last element is Z. Strings are also sequences. The string "Python" has
    six elements, starting with "P" at index 0, and "n" at index 5.


    Some real-world examples of sequences include the values emitted by a sensor every
    second, the sequence of a student''s test scores, or the sequence of daily stock
    values for some company over a period of time.


    In this section, you''ll learn how to use Python''s built-in `tuple` data type
    to create sequences of values.


    # ## What is a Tuple?


    The word **tuple** comes from mathematics, where it is used to describe a finite
    ordered sequence of values.


    Usually, mathematicians write tuples by listing each element, separated by a comma,
    inside a pair of parentheses. (1, 2, 3) is a tuple containing three integers.


    Tuples are **ordered** because their elements appear in an ordered fashion. The
    first element of (1, 2, 3) is 1, the second element is 2, and the third is 3.


    Python borrows both the name and the notation for tuples from mathematics.'
