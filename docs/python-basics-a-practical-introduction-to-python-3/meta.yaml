- md: "## The `and` Keyword\n\n```python\n>>> 2 < 1 and 3 < 4  # First statement is\
    \ False\nFalse\n```\n\n2 < 1 is False, and 3 < 4 is True, so their combination\
    \ is False.\n\nThe following table summarizes the rules for the `and` operator:\n\
    \n| Combination using and | Result |\n|---|---|\n| True and True | True |\n| True\
    \ and False | False |\n| False and True | False |\n| False and False | False |\n\
    \nYou can test each of these rules in the interactive window:\n\n```python\n>>>\
    \ True and True\nTrue\n\n>>> True and False\nFalse\n\n>>> False and True\nFalse\n\
    \n>>> False and False\nFalse\n```\n\n## The `or` Keyword\n\nWhen we use the word\
    \ “or” in everyday conversation, sometimes we mean an **exclusive or**. That is,\
    \ only the first option or the second option can be true.\n\nFor example, the\
    \ phrase “I can stay or I can go” uses the exclusive or. I can’t both stay and\
    \ go. Only one of these options can be true.\n\nIn Python the `or` keyword is\
    \ inclusive. That is, if *P* and *Q* are two expressions, the statement “P or\
    \ Q” is true if any of the following are true:\n\n1. P is true\n2. Q is true\n\
    3. Both P and Q are true\n\nLet’s look at some examples using numerical comparisons:\n\
    \n```python\n>>> 1 < 2 or 3 < 4  # Both are True\nTrue\n\n>>> 2 < 1 or 4 < 3 \
    \ # Both are False\nFalse\n\n>>> 1 < 2 or 4 < 3  # Second statement is False\n\
    True\n\n>>> 2 < 1 or 3 < 4  # First statement is False\nTrue\n```\n\nNote that\
    \ if any part of a compound statement is True, even if the other part is False,\
    \ the result is always True. The following table summarizes these results:\n\n\
    | Combination using or | Result |\n|---|---|\n| True or True | True |\n| True\
    \ or False | True |\n| False or True | True |\n| False or False | False |\n\n\
    Again, you can verify all of this in the interactive window:\n\n```python\n>>>\
    \ True or True\nTrue\n\n>>> True or False\nTrue\n\n>>> False or True\nTrue\n\n\
    >>> False or False\nFalse\n```\n\n## The `not` Keyword\n\nThe `not` keyword reverses\
    \ the truth value of a single expression:\n\n| Use of not | Result |\n|---|---|\n\
    | not True | False |\n| not False | True |\n\nYou can verify this in the interactive\
    \ window:\n\n```python\n>>> not True\nFalse\n\n>>> not False\nTrue\n```\n\nOne\
    \ thing to keep in mind with `not`, though, is that it doesn't always behave the\
    \ way you might expect when combined with comparators like `==`. For example,\
    \ `not True == False` returns `True`, but `False == not True` will raise an error:\n\
    \n```python\n>>> not True == False\nTrue\n\n>>> False == not True\n  File \"<stdin>\"\
    , line 1\n    False == not True\n          ^\nSyntaxError: invalid syntax\n```\n\
    \nThis happens because Python parses logical operators according to an **operator\
    \ precedence**, just like arithmetic operators have an order of precedence in\
    \ everyday math.\n\nThe order of precedence for logical and boolean operators,\
    \ from highest to lowest, is described in the following table. Operators on the\
    \ same row have equal precedence.\n\n| Operator Order of Precedence (Highest to\
    \ Lowest) |\n|---|\n| `<, <=, ==, >=, >` |\n| `not` |\n| `and` |\n| `or` |\n\n\
    Looking again at the expression `False == not True`, `not` has a lower precedence\
    \ than `==` in the order of operations. This means that when Python evaluates\
    \ `False == not True`, it first tries to evaluate `False == not` which is syntactically\
    \ incorrect.\n\nYou can avoid the `SyntaxError` by surrounding `not True` with\
    \ parentheses:\n\n```python\n>>> False == (not True)\nTrue\n```\n\nGrouping expressions\
    \ with parentheses is a great way to clarify which operators belong to which part\
    \ of a compound expression.\n\n## Building Complex Expressions\n\nYou can combine\
    \ the `and`, `or` and `not` keywords with `True` and `False` to create more complex\
    \ expressions. Here's an example of a more complex expression:\n\n```python\n\
    True and not (1 != 1)\n```\n\nWhat do you think the value of this expression is?\n\
    \nTo find out, break the expression down by starting on the far right side. `1\
    \ != 1` is `False`, since 1 has the same value as itself. So you can simplify\
    \ the above expression as follows:\n\n```python\nTrue and not (False)\n```\n\n\
    Now, `not (False)` is the same as `not False`, which is `True`. So you can simplify\
    \ the expression once more:\n\n```python\nTrue and True\n```\n\nFinally, `True\
    \ and True` is just `True`. So, after a few steps, you can see that `True and\
    \ not (1 != 1)` evaluates to `True`.\n\nWhen working through complicated expressions,\
    \ the best strategy is to start with the most complicated part of the expression\
    \ and build outward from there.\n\nFor instance, try evaluating the following\
    \ expression:\n\n```python\n(\"A\" != \"A\") or not (2 >= 3)\n```\n\nStart by\
    \ evaluating the two expressions in parentheses. `\"A\" != \"A\"` is `False` because\
    \ \"A\" is equal to itself. `2 >= 3` is also `False` because 2 is smaller than\
    \ 3. This gives you the following equivalent, but simpler, expression:\n\n```python\n\
    (False) or not (False)\n```\n\nSince `not` has a higher precedence than `or`,\
    \ the above expression is equivalent to the following:\n\n```python\nFalse or\
    \ (not False)\n```\n\n`not False` is `True`, so you can simplify the expression\
    \ once more:\n\n```python\nFalse or True\n```\n\nFinally, since any compound expression\
    \ with `or` is `True` if any one of the expressions on the left or right of the\
    \ `or` is `True`, you can conclude that `(\"A\" != \"A\") or not (2 >= 3)` is\
    \ `True`.\n\nGrouping expressions in a compound conditional statement with parentheses\
    \ improves readability. Sometimes, though, parentheses are required to produce\
    \ the expected value.\n\nFor example, upon first inspection, you may expect the\
    \ following to output `True`, but it actually returns `False`:\n\n```python\n\
    >>> True and False == True and False\nFalse\n```\n\nThe reason this is `False`\
    \ is that the `==` operator has a higher precedence than `and`, so Python interprets\
    \ the expression as `True and (False == True) and False`. Since `False == True`\
    \ is `False`, this is equivalent to `True and False and False`, which evaluates\
    \ to `False`.\n\nThe following shows how to add parentheses so that the expression\
    \ evaluates to `True`:\n\n```python\n>>> (True and False) == (True and False)\n\
    True\n```\n\nLogical operators and boolean comparators can be confusing the first\
    \ time you encounter them, so if you don't feel like the material in this section\
    \ comes naturally, don't worry!\n\nWith a little bit of practice, you'll be able\
    \ to make sense of what's going on and build your own compound conditional statements\
    \ when you need them.\n\n## Review Exercises\n\nYou can find the solutions to\
    \ these exercises and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n## 8.3. Control the Flow of Your Program\n\n1. Figure out what the result will\
    \ be (True or False) when evaluating the following expressions, then type them\
    \ into the interactive window to check your answers:\n   - `(1 <= 1) and (1 !=\
    \ 1)`\n   - `not (1 != 2)`\n   - `(\"good\" != \"bad\") or False`\n   - `(\"good\"\
