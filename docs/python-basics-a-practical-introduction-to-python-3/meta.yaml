    \ a header and a body. The header always starts with the `with` keyword and ends\
    \ with a colon (:). The return value of `path.open()` is assigned to the variable\
    \ name after the `as` keyword.\n\nAfter the `with` statement header is an indented\
    \ block of code. When code execution leaves the indented block, the file object\
    \ assigned to `file` is closed automatically, even if any exception is raised\
    \ during execution of code inside of the block.\n\n`with` statements also work\
    \ with the `open()` built-in:\n\n```\npython\nwith open(file_path, mode=\"r\"\
    , encoding=\"utf-8\") as file:\n    # Do something with file\n```\n\nThere really\
    \ is no reason *not* to open files in a `with` statement. It is considered the\
    \ Pythonic way for working with files. For the rest of this book, we will use\
    \ this pattern whenever opening a file.\n\n# Reading Data From a File\n\nUsing\
