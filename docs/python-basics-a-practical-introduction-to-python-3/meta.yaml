    # String Methods and Immutability


    Recall from the previous section that strings are immutable—they can’t be changed
    once they have been created. Most string methods that alter a string, like `.upper()`
    and `.lower()`, actually return copies of the original string with the appropriate
    modifications.


    If you aren’t careful, this can introduce subtle bugs into your program. Try this
    out in IDLE’s interactive window:


    ```

    >>> name = "Picard"

    >>> name.upper()

    ''PICARD''

    >>> name

    ''Picard''

    ```


    When you call `name.upper()`, nothing about `name` actually changes. If you need
    to keep the result, you need to assign it to a variable:


    ```

    >>> name = "Picard"

    >>> name = name.upper()

    >>> name

    ''PICARD''

    ```


    `name.upper()` returns a new string "PICARD", which is re-assigned to the `name`
    variable. This **overrides** the original string "Picard" assigned to "name".


