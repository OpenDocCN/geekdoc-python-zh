    ## Final Thoughts and Next Steps


    Congratulations! You''ve made it to all the way to the end of this book. You already
    know enough to do a lot of amazing things with Python, but now the real fun starts:
    it''s time to explore on your own!


    The best way to learn is by solving real problems of your own. Sure, your code
    might not be very pretty or efficient when you''re just starting out, but it will
    be useful. If you don''t think you have any problems of the variety that Python
    could solve, pick a [popular module](https://realpython.com) that interests you
    and create your own project around it.


    Part of what makes Python so great is the community. Know someone learning Python?
    Help them out! The only way to know you''ve really mastered a concept is when
    you can explain it to someone else.


    Next up, dive into the more advanced material available at [realpython.com](https://realpython.com)
    or peruse the articles & tutorials featured in the [PyCoder''s Weekly newsletter](https://pycoders.com).


    When you feel ready, consider helping out with an open-source project on [GitHub](https://github.com).
    If puzzles are more your style, try working through some of the mathematical challenges
    on [Project Euler](https://projecteuler.net).


    If you get stuck somewhere along the way, it’s almost guaranteed that someone
    else has encountered (and potentially solved) the exact same problem before; search
    around for answers, particularly at [Stack Overflow](https://stackoverflow.com/),
    or find a [community](https://realpython.com/community/) of Pythonistas willing
    to help you out.


    If all else fails, `import this` and take a moment to meditate on that which is
    Python.


    P.S. Come visit us on the web and continue your Python journey on the [realpython.com](https://realpython.com/)
    website and the [@realpython](https://twitter.com/realpython) Twitter account.


    ### 19.1 Free Weekly Tips for Python Developers


    Are you looking for a weekly dose of Python development tips to improve your productivity
    and streamline your workflows? Good news—we’re running a free email newsletter
    for Python developers just like you.


    The newsletter emails we send out are not your typical “here’s a list of popular
    articles” flavor. Instead we aim for sharing at least one original thought per
    week in a (short) essay-style format.


    If you’d like to see what all the fuss is about, then head on over to [realpython.com/newsletter](https://realpython.com/newsletter/)
    and enter your email address in the signup form. We’re looking forward to meeting
    you!


    ### 19.2 Python Tricks: The Book


    Now that you’re familiar with the basics of Python, it’s time to dig in deeper
    and to round out your knowledge.


    With Real Python’s *Python Tricks* book you’ll discover Python’s best practices
    and the power of beautiful & Pythonic code with simple examples and a step-by-step
    narrative.


    You''ll get one step closer to mastering Python, so you can write beautiful and
    idiomatic code that comes to you naturally.


    Learning the ins and outs of Python is difficult—and with this book you''ll be
    able to focus on taking your core Python skills to the next level.


    Discover the “hidden gold” in Python''s standard library and start writing clean
    and Pythonic code today. Download a free sample chapter at [realpython.com/pytricks-book](https://realpython.com/pytricks-book)


    ### 19.3 Real Python Video Course Library


    Become a well-rounded Pythonista with Real Python''s large (and growing) collection
    of Python tutorials and in-depth training materials. With new content published
    weekly, you''ll always find something to boost your skills:


    **Master Practical, Real-World Python Skills:** Our tutorials are created, curated,
    and vetted by a community of expert Pythonistas. At Real Python you''ll get the
    trusted resources you need on your path to Python mastery.


    **Meet Other Pythonistas:** Join the Real Python Slack chat and meet the Real
    Python Team and other subscribers. Discuss your coding and career questions, vote
    on upcoming tutorial topics, or just hang out with us at this virtual water cooler.


    **Interactive Quizzes & Learning Paths:** See where you stand and practice what
    you learn with interactive quizzes, hands-on coding challenges, and skills-focused
    learning paths.


    **Track Your Learning Progress:** Mark lessons as completed or in-progress and
    learn at your own comfortable pace. Bookmark interesting lessons and review them
    later to boost long-term retention.


    **Completion Certificates:** For each course you complete you receive a shareable
    (and printable) Certificate of Completion, hosted privately on the Real Python
    website. Embed your certificates in your portfolio, LinkedIn resume, and other
    websites to show the world that you’re a dedicated Pythonista.


    **Regularly Updated:** Keep your skills fresh and keep up with technology. We’re
    constantly releasing new members-only tutorials and update our content regularly.


    See what’s available at [realpython.com/courses](https://realpython.com/courses)


    ### 19.4 PythonistaCafe: A Community for Python Developers


    Mastering Python is *not* just about getting the books and courses to study. To
    be successful you also need a way to stay motivated and to grow your abilities
    in the long run.


    Many Pythonistas we know are struggling with this. It’s simply a lot less fun
    to build your Python skills completely alone.


    If you’re a self-taught developer with a non-technical day job, it’s hard to grow
    your skills all by yourself. And with no coders in your personal peer group, there’s
    nobody to encourage or support you in your endeavor of becoming a better developer.


    Maybe you’re already working as a developer, but no one else at your company shares
    your love for Python. It’s frustrating when you can’t share your learning progress
    with anyone or ask for advice when you feel stuck.


    From personal experience, we know that existing online communities and social
    media don’t do a great job at providing that support network either. Here are
    a few of the best, but they still leave a lot to be desired:


    - *Stack Overflow* is for asking focused, one-off questions. It’s hard to make
    a human connection with fellow commenters on the platform. Everything is about
    the facts, not the people. For example, moderators will freely edit other people’s
    questions, answers, and comments. It feels more like a wiki than a forum.

    - *Twitter* is like a virtual water cooler and great for “hanging out” but it’s
    limited to messages that can only be a few sentences long at a time—not great
    for discussing anything substantial. Also, if you’re not constantly online, you’ll
    miss out on most of the conversations. And if you *are* constantly online, your
    productivity takes a hit from the never-ending stream of interruptions and notifications.
    Slack chat groups suffer from the same flaws.

    - *Hacker News* is for discussing and commenting on tech news. It doesn’t foster
    long-term relationships between commenters. It’s also one of the most aggressive
    communities in tech right now with little moderation and a borderline toxic culture.

    - *Reddit* takes a broader stance and encourages more “human” discussions than
    Stack Overflow’s one-off Q&A format. But it’s a huge public forum with millions
    of users and has all of the associated problems: toxic behavior, overbearing negativity,
    people lashing out at each other, jealousy, ... In short, all the “best” parts
    of the human behavior spectrum.


    Eventually I realized that what holds so many developers back is their limited
    access to the global Python coding community. That’s why I founded [PythonistaCafe](https://www.pythonistacafe.com/),
    a peer-to-peer learning community for Python developers.


    A good way to think of PythonistaCafe is to see it as a club of mutual improvement
    for Python enthusiasts:


    Inside PythonistaCafe you’ll interact with professional developers and hobbyists
    from all over the world who will share their experiences in a safe setting—so
    you can learn from them and avoid the same mistakes they’ve made.


    Ask anything you want and it will remain private. You must have an active membership
    to read and write comments and as a paid community, trolling and offensive behavior
    are virtually nonexistent.


    The people you meet on the inside are actively committed to improving their Python
    skills because membership in PythonistaCafe is invite-only. All prospective members
    are required to submit an application to make sure they’re a good fit for the
    community.


    You’ll be involved in a community that understands you, and the skills and career
    you’re building, and what you’re trying to achieve. If you’re trying to grow your
    Python skills but haven’t found the support system you need, we’re right there
    for you.


    PythonistaCafe is built on a private forum platform where you can ask questions,
    get answers, and share your progress. We have members located all over the world
    and with a wide range of proficiency levels.


    You can learn more about PythonistaCafe, our community values, and what we’re
    all about at [www.pythonistacafe.com](http://www.pythonistacafe.com).


    ### 19.5 Acknowledgements


    This book would not have been possible without the help and support of so many
    friends and colleagues. We would like to thank many people for their assistance
    in making this book possible:


    - **Our Families:** For bearing with us through “crunch mode” as we worked night
    and day to get this book into your hands.

    - **The CPython Team:** For producing the amazing programming language and tools
    that we love and work with every day.

    - **The Python Community:** For all the people who are working'
  mdcn: '## 第19章


    ## 最终思考与后续步骤


    恭喜！你已经一路读到了本书的结尾。你已经掌握了足够的知识，可以用Python完成许多令人惊叹的事情，但现在真正的乐趣才刚刚开始：是时候开始自主探索了！


    学习的最佳方式是解决你自己的实际问题。当然，刚开始时你的代码可能不够漂亮或高效，但它会是有用的。如果你认为自己没有Python可以解决的这类问题，那就选择一个你感兴趣的[流行模块](https://realpython.com)，并围绕它创建你自己的项目。


    Python如此出色的部分原因在于其社区。认识正在学习Python的人吗？帮助他们！真正掌握一个概念的唯一方式，就是你能向别人解释清楚。


    接下来，深入探索[realpython.com](https://realpython.com)上更高级的材料，或浏览[PyCoder''s Weekly通讯](https://pycoders.com)中的文章和教程。


    当你感觉准备好了，可以考虑在[GitHub](https://github.com)上参与一个开源项目。如果你更喜欢解谜，可以尝试解决[Project Euler](https://projecteuler.net)上的一些数学挑战。


    如果在某个地方卡住了，几乎可以肯定其他人也遇到过（并且可能已经解决了）完全相同的问题；搜索答案，特别是在[Stack Overflow](https://stackoverflow.com/)上，或者找到一个愿意帮助你的Python开发者[社区](https://realpython.com/community/)。


    如果所有方法都失败了，`import this`，花点时间思考一下Python的真谛。


    附言：请访问我们的网站，在[realpython.com](https://realpython.com/)网站和[@realpython](https://twitter.com/realpython)
    Twitter账号上继续你的Python之旅。


    ### 19.1 免费的Python开发者每周技巧


    你是否在寻找每周的Python开发技巧，以提高你的生产力并简化你的工作流程？好消息——我们正在为像你这样的Python开发者运营一个免费的电子邮件通讯。


    我们发送的通讯邮件并非典型的“这里有一份热门文章列表”风格。相反，我们的目标是每周至少分享一篇原创想法，采用（简短的）文章形式。


    如果你想看看这一切是怎么回事，那就前往[realpython.com/newsletter](https://realpython.com/newsletter/)，在注册表单中输入你的电子邮件地址。我们期待与你见面！


    ### 19.2 Python技巧：这本书


    既然你已经熟悉了Python的基础知识，是时候深入挖掘并完善你的知识了。


    通过Real Python的*Python技巧*这本书，你将通过简单的例子和循序渐进的叙述，发现Python的最佳实践以及优雅且符合Python风格的代码的力量。


    你将离精通Python更近一步，从而能够编写出自然流畅、优雅且符合习惯用法的代码。


    学习Python的方方面面是困难的——有了这本书，你将能够专注于将你的核心Python技能提升到一个新的水平。


    发现Python标准库中的“隐藏宝藏”，并开始编写干净且符合Python风格的代码。在[realpython.com/pytricks-book](https://realpython.com/pytricks-book)下载免费的样章。


    ### 19.3 Real Python视频课程库


    通过Real Python庞大（且不断增长）的Python教程和深度培训材料合集，成为一名全面的Python开发者。每周发布新内容，你总能找到提升技能的东西：


    **掌握实用、真实的Python技能：** 我们的教程由专家Python开发者社区创建、策划和审核。在Real Python，你将获得在Python精通之路上所需的可信资源。


    **结识其他Python开发者：** 加入Real Python Slack聊天，结识Real Python团队和其他订阅者。讨论你的编码和职业问题，投票决定未来的教程主题，或者只是在这个虚拟的茶水间与我们闲聊。


    **互动测验和学习路径：** 通过互动测验、实践编码挑战和以技能为中心的学习路径，了解你的水平并练习所学内容。


    **跟踪你的学习进度：** 将课程标记为已完成或进行中，并按照自己舒适的节奏学习。收藏有趣的课程，稍后复习以增强长期记忆。


    **完成证书：** 每完成一门课程，你都会获得一份可分享（且可打印）的完成证书，托管在Real Python网站上。将你的证书嵌入你的作品集、LinkedIn简历和其他网站，向世界展示你是一位专注的Python开发者。


    **定期更新：** 保持你的技能新鲜并跟上技术发展。我们不断发布新的会员专属教程，并定期更新我们的内容。


    在[realpython.com/courses](https://realpython.com/courses)查看可用内容。


    ### 19.4 PythonistaCafe：一个Python开发者的社区


    精通Python*不仅仅*是购买书籍和课程来学习。要取得成功，你还需要一种方法来保持动力，并长期发展你的能力。


    我们认识的许多Python开发者都在为此挣扎。完全独自构建Python技能要无趣得多。


    如果你是一个自学成才的开发者，白天有一份非技术性的工作，那么独自提升技能是很困难的。而且你的个人同行群体中没有程序员，就没有人在你努力成为更好的开发者的道路上鼓励或支持你。


    也许你已经是一名开发者，但你公司里没有其他人分享你对Python的热爱。当你无法与任何人分享你的学习进度，或者在感到困惑时无法寻求建议时，这令人沮丧。


    根据个人经验，我们知道现有的在线社区和社交媒体在提供这种支持网络方面做得也不够好。以下是一些最好的，但它们仍然有很多不足之处：


    - *Stack Overflow* 用于提出专注的、一次性的提问。很难在这个平台上与评论者建立人际联系。一切都关乎事实，而不是人。例如，版主会随意编辑其他人的问题、答案和评论。它感觉更像是一个维基，而不是一个论坛。

    - *Twitter* 就像一个虚拟的茶水间，非常适合“闲逛”，但它仅限于每次只能发送几句话的消息——不适合讨论任何实质性内容。此外，如果你不经常在线，你会错过大部分对话。而如果你*确实*经常在线，你的生产力会因为永无止境的干扰和通知而受到影响。Slack聊天群组也存在同样的缺陷。

    - *Hacker News* 用于讨论和评论科技新闻。它不促进评论者之间的长期关系。它也是目前科技界最激进的社区之一，管理松散，文化近乎有毒。

    - *Reddit* 采取更广泛的立场，鼓励比Stack Overflow的一次性问答格式更“人性化”的讨论。但它是一个拥有数百万用户的大型公共论坛，存在所有相关问题：有毒行为、压倒性的消极情绪、人们互相攻击、嫉妒……简而言之，人类行为光谱中所有“最糟糕”的部分。


    最终我意识到，阻碍许多开发者的，是他们接触全球Python编码社区的渠道有限。这就是我创立[PythonistaCafe](https://www.pythonistacafe.com/)的原因，这是一个面向Python开发者的点对点学习社区。


    理解PythonistaCafe的一个好方法，是将其视为一个Python爱好者的互助提升俱乐部：


    在PythonistaCafe内部，你将与来自世界各地的专业开发者和爱好者互动，他们将在一个安全的环境中分享他们的经验——这样你就可以向他们学习，并避免犯同样的错误。


    问任何你想问的问题，它都会保持私密。你必须拥有活跃的会员资格才能阅读和撰写评论，作为一个付费社区，恶意挑衅和冒犯行为几乎不存在。


    你在里面遇到的人都积极致力于提高他们的Python技能，因为PythonistaCafe的会员资格是仅限邀请的。所有潜在会员都必须提交申请，以确保他们适合这个社区。


    你将参与一个理解你、理解你正在构建的技能和职业、以及你试图实现的目标的社区。如果你试图提升你的Python技能，但还没有找到你需要的支持系统，我们就在你身边。


    PythonistaCafe建立在一个私有论坛平台上，你可以在那里提问、获得答案并分享你的进度。我们的会员遍布世界各地，技能水平各异。


    你可以在[www.pythonistacafe.com](http://www.pythonistacafe.com)了解更多关于PythonistaCafe、我们的社区价值观以及我们的一切。


    ### 19.5 致谢


    没有众多朋友和同事的帮助和支持，这本书是不可能完成的。我们要感谢许多人为使这本书成为可能所提供的帮助：


    - **我们的家人：** 感谢他们在我们日夜工作，努力将这本书送到你手中时，忍受我们的“冲刺模式”。

    - **CPython团队：** 感谢他们创造了我们每天热爱和使用的惊人编程语言和工具。

    - **Python社区：** 感谢所有正在工作的人'
