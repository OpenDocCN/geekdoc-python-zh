    What the above example illustrates is that the `.grid()` geometry manager''s `sticky`
    parameter can be used to achieve the same effects as the `.pack()` geometry manager''s
    `fill` parameter.


    The correspondence between the `sticky` and `fill` parameters is summarized in
    the following table:


    | .grid() | .pack() |

    |---|---|

    | sticky="ns" | fill=tk.Y |

    | sticky="ew" | fill=tk.X |

    | sticky="nsew" | fill=tk.BOTH |


    .grid() is a powerful geometry manager. It is often easier to understand than
    .pack() and is much more flexible than .place(). When creating new Tkinter applications,
    consider using .grid() as your primary geometry manager.'
