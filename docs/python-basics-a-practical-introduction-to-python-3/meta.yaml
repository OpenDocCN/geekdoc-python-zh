    # 4.4. Interact With User Input


    The text you entered is repeated on a new line with single quotes. That''s because
    `input()` returns any text entered by the user as a string.


    To make `input()` a bit more user friendly, you can give it a **prompt** to display
    to the user. The prompt is just a string that you put in between the parentheses
    of `input()`. It can be anything you want: a word, a symbol, a phrase—anything
    that is a valid Python string.


    The `input()` function displays the prompt and waits for the user to type something
    on their keyboard. When the user hits Enter, `input()` returns their input as
    a string that can be assigned to a variable and used to do something in your program.


    To see how `input()` works, save and run the following script:


    ```

    prompt = "Hey, what''s up? "

    user_input = input(prompt)

    print("You said:", user_input)

    ```


    When you run this script, you''ll see `Hey, what''s up?` displayed in the interactive
    window with a blinking cursor.


    The single space at the end of the string "Hey, what''s up? " makes sure that
    when the user starts to type, the text is separated from the prompt with a space.
    When you type a response and press Enter, your response is assigned to the `user_input`
    variable.


    Here''s a sample run of the program:


    ```

    Hey, what''s up? Mind your own business.


    You said: Mind your own business.

    ```


    Once you have input from a user, you can do something with it. For example, the
    following script takes user input and converts it to uppercase with `.upper()`
    and prints the result:'
