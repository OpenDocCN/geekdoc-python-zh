- img_proc: true
  md: 'tion 1/10 in binary.


    The binary representation of 1/10 is the following infinitely repeating fraction:


    ```

    0.00011001100110011001100110011...

    ```


    Computers have finite memory, so the number 0.1 must be stored as an approximation
    and not as its true value. The approximation that gets stored is slightly higher
    than the actual value, and looks like this:


    ```

    0.1000000000000000055511151231257827021181583404541015625

    ```


    You may have noticed, however, that when asked to print 0.1, Python prints 0.1
    and not the approximated value above:


    ```

    >>> 0.1

    0.1

    ```


    Python doesn''t just chop off the digits in the binary representation for 0.1.
    What actually happens is a little more subtle.


    Because the approximation of 0.1 in binary is just that—an approximation—it is
    entirely possible that more than one decimal number have the same binary approximation.


    For example, the numbers 0.1 and 0.10000000000000001 both have the same binary
    approximation. Python prints out the shortest decimal number that shares the approximation.


    This explains why, in the first example of this section, 0.1 + 0.2 does not equal
    0.3. Python adds together the binary approximations for 0.1 and 0.2, which gives
    a number which is *not* the binary approximation for 0.3.


    If all this is starting to make your head spin, don''t worry! Unless you are writing
    programs for finance or scientific computing, you don''t need to worry about the
    imprecision of floating-point arithmetic.


