    \n>>> type(phrase)\n<class 'str'>\n```\n\n字符串有三个属性，你将在接下来的章节中探索：\n\n1.  字符串包含\
    \ **字符**，即单个字母或符号。\n2.  字符串有一个 **长度**，即字符串中包含的字符数。\n3.  字符串中的字符按 **顺序** 出现，意味着每个字符在字符串中都有一个编号的位置。\n\
    \n让我们更仔细地看看字符串是如何创建的。\n\n### 字符串字面量\n\n正如你已经看到的，你可以通过将一些文本用引号括起来来创建字符串：\n\n```\n\
