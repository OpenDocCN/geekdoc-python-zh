  md: '# 13.1. Installing Third-Party Packages With Pip


    sion 2.0.


    The symbol <= is called a **version specifier** because it specifies which version
    of the package should be installed. There are several different version specifiers
    that you can use. Here are the most widely used ones:


    | Version Specifier | Description |

    | :--- | :--- |

    | <=, >= | Inclusive less than and greater than specifiers |

    | <, > | Exclusive less than and greater than specifiers |

    | == | Exactly equal to specifier |


    Let''s look at some examples.


    To install the latest version that is less than or equal to some number, use the
    <= version specifier:


    ```

    $ python3 -m pip install requests<=3.0

    ```


    This will install the latest version of `requests` that is less than or equal
    to version 3.0.


    The <= and >= version specifiers are **inclusive** because the include the version
    number that follows the specifier. **Exclusive** versions, < and >, exist as well.


    For instance, the following command installs the latest version of requests that
    is strictly less than version 3.0:


    ```

    $ python3 -m pip install requests<3.0

    ```


    You can combine version specifiers to ensure `pip` installs the latest version
    within a specified version range. For example, the following command installs
    the latest version of `requests` in the 1.0 series:


    ```

    $ python3 -m pip install requests>=1.0,<2.0

    ```


    You would use something like the above command if your project was'
  merge: -1
