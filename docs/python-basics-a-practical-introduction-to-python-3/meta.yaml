    >>> file.close()\n```\n\nInstead of returning each row as a list, `DictReader`\
    \ objects return each row as a dictionary. The dictionary's keys are the field\
    \ names, and the values are the field values from each row in the csv file.\n\n\
    Notice that the `salary` field gets read as a string. Since csv files are plain\
    \ text files, the values are always read as strings. You'll need to convert the\
    \ strings to different data types as needed.\n\nFor example, you can process each\
    \ row with a function that converts keys to the correct data types:\n\n```python\n\
    >>> def process_row(row):\n...     row[\"salary\"] = float(row[\"salary\"])\n\
    ...     return row\n...\n>>> with file_path.open(mode=\"r\", encoding=\"utf-8\"\
    ) as file:\n...     reader = csv.DictReader(file)\n...     for row in reader:\n\
    ...         print(process_row(row))\n...\n{'name': 'Lee', 'department': 'Operations',\
    \ 'salary': 75000.0}\n{'name': 'Jane', 'department': 'Engineering', 'salary':\
    \ 85000.0}\n{'name': 'Diego', 'department': 'Sales', 'salary': 80000.0}\n```\n\
    \nThe `process_row()` function takes a row dictionary read from the csv file and\
    \ returns a new dictionary with the \"salary\" key converted to a floating point\
    \ number.\n\nYou can write csv files with headers using the `csv.DictWriter` class,\
    \ which writes dictionaries with shared keys to rows in a csv file.\n\nThe following\
    \ list of dictionaries represents a small database of people and their ages:\n\
    \n```python\n>>> people = [\n...     {\"name\": \"Veronica\", \"age\": 29},\n\
    ...     {\"name\": \"Audrey\", \"age\": 32},\n...     {\"name\": \"Sam\", \"age\"\
    : 24},\n... ]\n```\n\nTo store the data in the `people` list to a csv file, open\
    \ a new file called `people.csv` in write mode and create a new `csv.DictWriter`\
    \ object from the file object:\n\n```python\n>>> file_path = Path.home() / \"\
    people.csv\"\n>>> file = file_path.open(mode=\"w\", encoding=\"utf-8\")\n>>> writer\
    \ = csv.DictWriter(file, fieldnames=[\"name\", \"age\"])\n```\n\nWhen you instantiate\
    \ a new `DictWriter` object, the first parameter is the file object for writing\
    \ the csv data. The `fieldnames` parameter, which is required, is a list of strings\
    \ of the field names.\n\n> **Note**\n>\n> In the example above, the string literal\
    \ `[\"name\", \"age\"]` is passed to the `fieldnames` parameter, but you don't\
    \ have to use a string literal. For example, you could also set the `fieldnames`\
    \ parameter to `people[0].keys()`.\n>\n> This can be useful if the field names\
    \ are not known when writing the program, or if there are so many fields that\
    \ a list literal is impractical.\n\nJust like `csv.writer` objects, `DictWriter`\
    \ objects have a `.writerow()` method for writing a single row to the csv file\
    \ and a `.writerows()` method for writing several rows at once. But `DictWriter`\
    \ objects have a third method called `.writeheader()` that writes the header row\
    \ to the csv file:\n\n```python\n>>> writer.writeheader()\n10\n```\n\n`.writeheader()`\
    \ returns the number of characters written to the file, which is 10 in this case.\
    \ Writing the header row is optional, but is recommended because it helps define\
    \ what the data contained in the csv file represents. It also makes it easy to\
    \ read the rows from the csv file as dictionaries using the `DictReader` class.\n\
    \nWith the header written, you can write the data in the `people` list to the\
    \ csv file using `.writerows()`:\n\n```python\n>>> writer.writerows(people)\n\
    >>> file.close()\n```\n\nYou now have a file in your home directory called `people.csv`\
    \ containing the following data:\n\n```\nname,age\nVeronica,29\nAudrey,32\nSam,24\n\
