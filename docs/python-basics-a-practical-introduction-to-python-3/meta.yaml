    \ control the flow of execution through a loop.\n\n# ## if Statements and for\
    \ Loops\n\nThe block of code in a `for` loop is just like any other block of code.\
    \ That means you can nest an `if` statement in a `for` loop just like you can\
    \ anywhere else in your code.\n\nThe following example uses a `for` loop with\
    \ an `if` statement to compute and display the sum of all even integers less than\
    \ 100:\n\n```\npython\nsum_of_evens = 0\n\nfor n in range(1, 100):\n    if n %\
    \ 2 == 0:\n        sum_of_evens = sum_of_evens + n\n\nprint(sum_of_evens)\n```\n\
    \nFirst, the `sum_of_evens` variable is initialized to 0. Then the program loops\
    \ over the numbers 1 to 99 and adds the even values to `sum_of_evens`. The final\
