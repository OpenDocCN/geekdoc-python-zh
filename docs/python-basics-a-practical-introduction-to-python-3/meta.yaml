    \ attributes**, that all `Dog` objects must have, you need to define a special\
    \ method called `__init__()`. This method is run every time a new `Dog` object\
    \ is created and tells Python what the initial **state**—that is, the initial\
    \ values of the object's properties—of the object should be.\n\nThe first positional\
    \ argument of `__init__()` is always a variable that references the class instance.\
    \ This variable is almost universally named `self`. After the `self` argument,\
    \ you can specify any other arguments required to create an instance of the class.\n\
    \nThe following updated definition of the `Dog` class shows how to write an `__init__()`\
    \ method that creates two instance attributes: `.name` and `.age`:\n\n```\npython\n\
    class Dog:\n    def __init__(self, name, age):\n        self.name = name\n   \
    \     self.age = age\n```\n\nNotice that the function signature—the part that\
    \ starts with the `def` keyword—is indented four spaces. The body of the function\
    \ is indented by eight spaces. This indentation is vitally important. It tells\
