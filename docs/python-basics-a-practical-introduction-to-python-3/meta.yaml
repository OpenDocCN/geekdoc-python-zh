    \ as the American standard letter page size.\n2. The font defaults to Helvetica\
    \ with a default font size of 12 points.\n\nYou are not stuck with these settings.\n\
    \n## Setting The Page Size\n\nYou can change the page size when you instantiate\
    \ a `Canvas` object with the optional `pagesize` parameter. This parameter accepts\
    \ a tuple of floating point values representing the width and height of the page\
