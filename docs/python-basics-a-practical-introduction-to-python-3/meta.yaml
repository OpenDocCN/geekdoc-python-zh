  md: 'Python, on the other hand, is special. It is a full-spectrum language. We often
    judge the simplicity of a language based on the “hello world” test. That is, what
    syntax and actions are necessary to get that language to output “hello world”
    to the user? In Python, it couldn’t be simpler:


    ```

    print("Hello world")

    ```


    That’s it. However, I find this an unsatisfying test.


    The “hello world” test is useful but really not enough to show the power or complexity
    of a language. Let’s try another example. Not everything here needs to make total
    sense, just follow along to get the Zen of it. The book covers these concepts
    and more as you go through. The next example is certainly something you could
    write near the end.


    Here’s the new test: What would it take to write a program that accesses an external
    website, downloads the content to your app in memory, then displays a subsection
    of that content to the user? Let’s try that experiment with Python 3 with the
    help of the requests package (which needs to be installed—more on that in chapter
    12):


    ```

    import requests

    resp = requests.get("https://realpython.com")

    html = resp.text

    print(html[205:294])

    ```


    Incredibly, that’s it. When run, the output is (something like):


    ```

    <title>Python Tutorials - Real Python</title>

    <meta name="author" content="Real Python">

    ```


    This is the easy, getting started side of the spectrum of Python. A few trivial
    lines and incredible power is unleashed. Because Python has access to so many
    powerful but well-packaged libraries, such as requests, it is often described
    as *having batteries included*.


    So there you have a simple powerful starter example. On the real apps'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'side of things, we have many incredible applications written in Python as well.


    YouTube, the world''s most popular video streaming site, is written in Python
    and processes more than 1,000,000 requests per second. Instagram is another example
    of a Python application. More close to home, we even have realpython.com and my
    sites such as talkpython.fm.


    This full-spectrum aspect of Python means you can start easy and adopt more advanced
    features as you need them when your application demands grow.


    # Python Is Popular


    You might have heard that Python is popular. On one hand, it may seem that it
    doesn''t really matter how popular a language is if you can build the app you
    want to build with it.


    For better or worse, in software development popularity is a strong indicator
    of the quality of libraries you will have available as well the number of job
    openings there are. In short, you should tend to gravitate towards more popular
    technologies as there will be more choices and integrations available.


    So, is Python actually that popular? Yes it is. You''ll of course find a lot of
    hype and hyperbole. But there are plenty of stats to back this one. Let''s look
    at some analytics available and presented by StackOverflow.com.


    They run a site called **StackOverflow Trends**. Here you can look at the trends
    for various technologies by tag. When we compare Python to the other likely candidates
    you could pick to learn programming, you''ll see one is unlike the others:'
