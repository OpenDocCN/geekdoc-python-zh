- md: "## 8.7. Simulate Events and Calculate Probabilities\n\nIn this section, we’ll\
    \ apply some of the concepts we’ve learned about loops and conditional logic to\
    \ a real world problem: simulating events and calculating probabilities.\n\nWe’ll\
    \ be running a simple simulation known as a [Monte Carlo](https://en.wikipedia.org/wiki/Monte_Carlo_method)\
    \ experiment. Each experiment consists of a **trial**, which is just some process\
    \ that can be repeated — such as flipping a coin – that generated some outcome\
    \ — such as landing on heads or tails. The trial is repeated over and over again\
    \ in order to calculate the probability that some outcome occurs.\n\nIn order\
    \ to do this, we need to add some randomness to our code.\n\n### The random module\n\
    \nPython provides several functions for generating random numbers in the `random`\
    \ module. A **module** is a collection of related code. Python's **standard library**\
    \ is an organized collection of modules that you can **import** into your own\
    \ code in order to solve various problems.\n\nTo import the `random` module, type\
    \ the following into IDLE's interactive window:\n\n```\n>>> import random\n```\n\
    \nNow we can use functions from the random module in our code. For example, the\
    \ `randint()` has two required parameters called `a` and `b` and returns a random\
    \ integer that is greater than or equal to `a` and less than or equal to `b`.\
    \ Both `a` and `b` must be integers.\n\nFor example, the following code produces\
    \ a random integer between 1 and 10:\n\n```\n>>> random.randint(1, 10)\n9\n```\n\
    \nSince the result is random, your output will probably be different than 9. If\
    \ you type the same code in again, you will likely get a different number.\n\n\
    Since `randint()` is located in the `random` module, you must type `random` followed\
    \ by a dot (.) and then the function name in order to use it.\n\nIt is important\
    \ to remember that when using `randint()`, the two parameters `a` and `b` must\
    \ both be integers, and the output might be equal to one of `a` and `b`, or any\
    \ number in-between. For instance, `random.randint(0, 1)` randomly returns either\
    \ a 0 or a 1.\n\nFurthermore, each integer between a and b is equally likely to\
    \ be returned by `randint()`. So, for `randint(1, 10)`, each integer between 1\
    \ and 10 has a 10% chance of being returned. For `randint(0, 1)`, there is a 50%\
    \ chance a 0 is returned.\n\n### Flipping Fair Coins\n\nLet's see how to use `randint()`\
    \ to simulate flipping a fair coin. By a fair coin, we mean a coin that, when\
    \ flipped, has an equal chance of landing on heads or tails.\n\nOne trial for\
    \ our experiment will be flipping the coin. The outcome is either a heads or a\
    \ tails. The question is: in general, over many coin flips, what is the ratio\
    \ of heads to tails?\n\nLet's think about how to solve this problem. We'll need\
    \ to keep track of how many times we get a heads or tails, so we need a heads\
    \ tally and a tails tally. Each trial has two steps:\n\n- 1. Flip the coin.\n\
    - 2. If the coin lands on heads, update the heads tally. Otherwise, the coin lands\
    \ on tails so update the tails tally.\n\nWe need to repeat the trial many times,\
    \ say 10,000. A `for` loop over `range(10_000)` is a good choice for doing something\
    \ like that.\n\nNow that we have a plan, let's start by writing a function called\
    \ `coin_flip()` that randomly returns the string \"heads\" or the string \"tails\"\
    . We can do this using `random.randint(0, 1)`. We'll use 0 to represent heads\
    \ and 1 for tails.\n\nHere's the code for the `coin_flip()` function:\n\n```\n\
    import random\n\ndef coin_flip():\n    \"\"\"Randomly return 'heads' or 'tails'.\"\
    \"\"\n    if random.randint(0, 1) == 0:\n        return \"heads\"\n    else:\n\
    \        return \"tails\"\n```\n\nIf `random.randint(0, 1)` returns a 0, then\
    \ `coin_flip()` returns \"heads\". Otherwise, `coin_flip()` returns \"tails\"\
    .\n\nNow we can write a `for` loop that flips the coin 10,000 times and updates\
    \ a heads or tails tally accordingly:\n\n```\n# First initialize the tallies to\
    \ 0\nheads_tally = 0\ntails_tally = 0\n\nfor trial in range(10_000):\n    if coin_flip()\
    \ == \"heads\":\n        heads_tally = heads_tally + 1\n    else:\n        tails_tally\
    \ = tails_tally + 1\n```\n\nFirst, two variables `heads_tally` and `tails_tally`\
    \ are created and both are initialized to the integer 0.\n\nThen the `for` loop\
    \ runs 10,000 times. Each time, the `coin_flip()` function is called. If it returns\
    \ the string \"heads\", then the `heads_tally` variable is incremented by 1. Otherwise\
    \ `tails_tally` is incremented by 1.\n\nFinally, we can print the ratio of heads\
    \ and tails:\n\n```\nratio = heads_tally / tails_tally\nprint(f\"The ratio of\
    \ heads to tails is {ratio}\")\n```\n\nIf you save the above code to a script\
    \ and run it a few times, you will see that the result is usually between .98\
    \ and 1.02. If you increase the `range(10_000)` in the `for` loop to, say, `range(50_000)`,\
    \ the results should get closer to 1.0.\n\nThis behavior makes sense. Since the\
    \ coin is fair, we should expect that after many flips, the number of heads is\
    \ roughly equal to the number of tails.\n\nIn life, things aren't always fair.\
    \ A coin may have a slight tendency to land on heads instead of tails, or vice\
    \ versa. So, how do you simulate something like an unfair coin?\n\n### Tossing\
    \ Unfair Coins\n\n`randint()` returns a 0 or a 1 with equal probability. If 0\
    \ represents tails and 1 represents heads, then to simulate an unfair coin we\
    \ need a way to return one of 0 or 1 with a higher probability.\n\nThe `random()`\
    \ function can be called without any arguments and returns a floating-point number\
    \ greater than or equal to 0.0 but less than 1.0. Each possible return value is\
    \ equally likely. In probability theory, this is known as a [uniform probability\
    \ distribution](https://en.wikipedia.org/wiki/Uniform_distribution_(continuous)).\n\
    \nOne consequence of this is that, given a number n between 0 and 1, the probability\
    \ that `random()` returns a number less than n is just n itself. For example,\
    \ the probability that `random()` is less than .8 is .8 and the probability that\
    \ `random()` is less than .25 is .25.\n\nUsing this fact, we can write a function\
    \ that simulates a coin flip, but returns tails with a specified probability:\n\
    \n```\nimport random\n\ndef unfair_coin_flip(probability_of_tails):\n    if random.random()\
    \ < probability_of_tails:\n        return \"tails\"\n    else:\n        return\
    \ \"heads\"\n```\n\nFor example, `unfair_coin_flip(.7)` has a 70% chance of returning\
    \ \"tails\".\n\nLet's re-write the coin flip experiment from earlier using `unfair_coin_flip`:\n\
    \nIn this example, the `ValueError` and `ZeroDivisionError` are handled separately.\
    \ This way, a more descriptive message is displayed if something goes wrong.\n\
    \nIf one of `num1` or `num2` is not a number, then a `TypeError` is raised and\
    \ the message \"Both arguments must be numbers\" is displayed. If `num2` is 0,\
    \ then a `ZeroDivisionError` is raised and the message \"num2 must not be 0\"\
    \ is displayed.\n\n### The “Bare” except Clause\n\nYou can use the `except` keyword\
    \ by itself without naming specific exceptions:\n\n```\ntry:\n    # Do lots of\
    \ hazardous things that might break\nexcept:\n    print(\"Something bad happened!\"\
    )\n```\n\nIf any exception is raised while executing the code in the `try` block,\
    \ the `except` block will run and the message \"Something bad happened!\" will\
    \ be displayed.\n\nThis might sound like a great way to ensure your program never\
    \ crashes, **but this is actually bad idea and the pattern is generally frowned\
    \ upon!**\n\nThere are a couple of reasons for this, but the most important reason\
    \ for new programmers is that catching every exception could hide bugs in your\
    \ code, giving you a false sense of confidence that your code works as expected.\n\
    \nIf you only catch specific exceptions, then when unexpected errors are encountered,\
    \ Python will print the traceback and error information giving you more information\
    \ to work with when debugging your code.\n\n### Review Exercises\n\nYou can find\
    \ the solutions to these exercises and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n- 1. Write a script that repeatedly asks the user to input an integer, displaying\
    \ a message to “try again” by catching the `ValueError` that is raised if the\
    \ user did not enter an integer. Once the user enters an integer, the program\
    \ should display the number back to the user and end without crashing.\n- 2. Write\
    \ a program that asks the user to input a string and an integer $n$. Then display\
    \ the character at index $n$ in the string. Use error handling to make sure the\
    \ program doesn’t crash if the user does not enter an integer or the index is\
    \ out of bounds. The program should display a different message depending on what\
    \ error occurs.\n\n[Leave feedback on this section »](https://realpython.com/python-basics/resources)"
  mdcn: "## 8.7. 模拟事件与计算概率\n\n在本节中，我们将把之前学到的关于循环和条件逻辑的一些概念应用到一个实际问题中：模拟事件并计算概率。\n\n\
    我们将进行一个简单的模拟，称为[蒙特卡洛](https://en.wikipedia.org/wiki/Monte_Carlo_method)实验。每个实验由一个**试验**组成，试验就是某个可以重复的过程——比如抛硬币——它会产生某种结果——比如正面或反面。试验会一遍又一遍地重复，以计算某个结果发生的概率。\n\
    \n为了做到这一点，我们需要在代码中加入一些随机性。\n\n### random 模块\n\nPython 在 `random` 模块中提供了几个生成随机数的函数。**模块**是一组相关代码的集合。Python\
    \ 的**标准库**是一个有组织的模块集合，你可以将它们**导入**到自己的代码中，以解决各种问题。\n\n要导入 `random` 模块，请在 IDLE\
    \ 的交互窗口中输入以下内容：\n\n```\n>>> import random\n```\n\n现在我们可以在代码中使用 random 模块中的函数了。例如，`randint()`\
    \ 有两个必需的参数，分别称为 `a` 和 `b`，它返回一个大于或等于 `a` 且小于或等于 `b` 的随机整数。`a` 和 `b` 都必须是整数。\n\n\
    例如，以下代码生成一个 1 到 10 之间的随机整数：\n\n```\n>>> random.randint(1, 10)\n9\n```\n\n由于结果是随机的，你的输出可能与\
    \ 9 不同。如果你再次输入相同的代码，很可能会得到一个不同的数字。\n\n由于 `randint()` 位于 `random` 模块中，你必须输入 `random`\
    \ 后跟一个点（.），然后是函数名才能使用它。\n\n重要的是要记住，使用 `randint()` 时，两个参数 `a` 和 `b` 都必须是整数，输出可能等于\
    \ `a` 或 `b`，或者是它们之间的任何数字。例如，`random.randint(0, 1)` 随机返回 0 或 1。\n\n此外，`randint()`\
    \ 返回 a 和 b 之间每个整数的概率是相等的。所以，对于 `randint(1, 10)`，1 到 10 之间的每个整数都有 10% 的概率被返回。对于\
    \ `randint(0, 1)`，返回 0 的概率是 50%。\n\n### 抛掷公平硬币\n\n让我们看看如何使用 `randint()` 来模拟抛掷一枚公平硬币。所谓公平硬币，是指抛掷时正面和反面出现机会均等的硬币。\n\
    \n我们实验的一次试验就是抛硬币。结果要么是正面，要么是反面。问题是：总的来说，在多次抛硬币中，正面与反面的比例是多少？\n\n让我们思考一下如何解决这个问题。我们需要跟踪得到正面或反面的次数，因此我们需要一个正面计数器和一个反面计数器。每次试验有两个步骤：\n\
    \n- 1. 抛硬币。\n- 2. 如果硬币正面朝上，更新正面计数器。否则，硬币反面朝上，更新反面计数器。\n\n我们需要重复试验很多次，比如 10,000\
    \ 次。使用 `for` 循环遍历 `range(10_000)` 是执行此类操作的好选择。\n\n既然我们有了计划，让我们从编写一个名为 `coin_flip()`\
    \ 的函数开始，该函数随机返回字符串 \"heads\" 或字符串 \"tails\"。我们可以使用 `random.randint(0, 1)` 来实现。我们将用\
    \ 0 表示正面，1 表示反面。\n\n以下是 `coin_flip()` 函数的代码：\n\n```\nimport random\n\ndef coin_flip():\n\
    \    \"\"\"Randomly return 'heads' or 'tails'.\"\"\"\n    if random.randint(0,\
    \ 1) == 0:\n        return \"heads\"\n    else:\n        return \"tails\"\n```\n\
    \n如果 `random.randint(0, 1)` 返回 0，则 `coin_flip()` 返回 \"heads\"。否则，`coin_flip()`\
    \ 返回 \"tails\"。\n\n现在我们可以编写一个 `for` 循环，抛硬币 10,000 次，并相应地更新正面或反面计数器：\n\n```\n#\
    \ First initialize the tallies to 0\nheads_tally = 0\ntails_tally = 0\n\nfor trial\
    \ in range(10_000):\n    if coin_flip() == \"heads\":\n        heads_tally = heads_tally\
    \ + 1\n    else:\n        tails_tally = tails_tally + 1\n```\n\n首先，创建两个变量 `heads_tally`\
    \ 和 `tails_tally`，并将它们都初始化为整数 0。\n\n然后 `for` 循环运行 10,000 次。每次调用 `coin_flip()`\
    \ 函数。如果它返回字符串 \"heads\"，则 `heads_tally` 变量增加 1。否则 `tails_tally` 增加 1。\n\n最后，我们可以打印正面和反面的比例：\n\
    \n```\nratio = heads_tally / tails_tally\nprint(f\"The ratio of heads to tails\
    \ is {ratio}\")\n```\n\n如果你将上述代码保存到一个脚本中并运行几次，你会看到结果通常在 .98 到 1.02 之间。如果你将 `for`\
    \ 循环中的 `range(10_000)` 增加到，比如 `range(50_000)`，结果应该会更接近 1.0。\n\n这种行为是合理的。由于硬币是公平的，我们预期在多次抛掷后，正面的数量大致等于反面的数量。\n\
    \n在生活中，事情并不总是公平的。一枚硬币可能有轻微的倾向，更容易正面朝上而不是反面朝上，反之亦然。那么，如何模拟像不公平硬币这样的东西呢？\n\n###\
    \ 抛掷不公平硬币\n\n`randint()` 以相等的概率返回 0 或 1。如果 0 代表反面，1 代表正面，那么要模拟一枚不公平的硬币，我们需要一种方法，以更高的概率返回\
    \ 0 或 1 中的一个。\n\n`random()` 函数可以在不带任何参数的情况下调用，它返回一个大于或等于 0.0 但小于 1.0 的浮点数。每个可能的返回值都是等可能的。在概率论中，这被称为[均匀概率分布](https://en.wikipedia.org/wiki/Uniform_distribution_(continuous))。\n\
    \n由此得出的一个结论是，给定一个介于 0 和 1 之间的数字 n，`random()` 返回小于 n 的数字的概率就是 n 本身。例如，`random()`\
    \ 小于 .8 的概率是 .8，`random()` 小于 .25 的概率是 .25。\n\n利用这个事实，我们可以编写一个模拟抛硬币的函数，但以指定的概率返回反面：\n\
    \n```\nimport random\n\ndef unfair_coin_flip(probability_of_tails):\n    if random.random()\
    \ < probability_of_tails:\n        return \"tails\"\n    else:\n        return\
    \ \"heads\"\n```\n\n例如，`unfair_coin_flip(.7)` 有 70% 的概率返回 \"tails\"。\n\n让我们使用\
    \ `unfair_coin_flip` 重写之前的抛硬币实验：\n\n在这个例子中，`ValueError` 和 `ZeroDivisionError`\
    \ 被分别处理。这样，如果出现问题，会显示更具描述性的消息。\n\n如果 `num1` 或 `num2` 中有一个不是数字，则会引发 `TypeError`\
    \ 并显示消息 \"Both arguments must be numbers\"。如果 `num2` 为 0，则会引发 `ZeroDivisionError`\
    \ 并显示消息 \"num2 must not be 0\"。\n\n### “裸” except 子句\n\n你可以单独使用 `except` 关键字，而不指定具体的异常：\n\
    \n```\ntry:\n    # Do lots of hazardous things that might break\nexcept:\n   \
    \ print(\"Something bad happened!\")\n```\n\n如果在执行 `try` 块中的代码时引发任何异常，`except`\
    \ 块将运行，并显示消息 \"Something bad happened!\"。\n\n这听起来像是确保程序永不崩溃的好方法，**但实际上这是个坏主意，这种模式通常不被推荐！**\n\
    \n有几个原因，但对于新程序员来说，最重要的原因是捕获每个异常可能会隐藏代码中的错误，让你产生代码按预期工作的虚假信心。\n\n如果你只捕获特定的异常，那么当遇到意外错误时，Python\
    \ 将打印回溯和错误信息，为你调试代码提供更多有用的信息。\n\n### 复习练习\n\n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到这些练习的解决方案和许多其他额外资源。\n\n- 1. 编写一个脚本，反复要求用户输入一个整数，通过捕获用户未输入整数时引发的 `ValueError`\
    \ 来显示“请重试”的消息。一旦用户输入一个整数，程序应向用户显示该数字并结束，而不会崩溃。\n- 2. 编写一个程序，要求用户输入一个字符串和一个整数 $n$。然后显示字符串中索引为\
    \ $n$ 的字符。使用错误处理来确保如果用户未输入整数或索引超出范围，程序不会崩溃。程序应根据发生的错误显示不同的消息。\n\n[为此部分提供反馈 »](https://realpython.com/python-basics/resources)"
