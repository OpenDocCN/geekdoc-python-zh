    \ of the outer for loop. You could explicitly configure each column and row outside\
    \ of the for loop, but that would require writing an additional six lines of code.\n\
    \nOn each iteration of the loop, the i-th column and row are configured to have\
    \ a weight of 1. This ensures that each row and column expands at the same rate\
    \ whenever the window is resized."
- md: "## 18.6. Controlling Layout With Geometry Managers\n\nThe `minsize` argument\
    \ is set to 75 for each column and 50 for each row. This makes sure the `Label`\
    \ widget always displays its text without chopping off any characters, even if\
    \ the window size is extremely small.\n\nTry running the script to get a feel\
    \ for how it works! Play around with the `weight` and `minsize` parameters to\
    \ see how they affect the grid.\n\nBy default, widgets are centered in their grid\
    \ cells. For example, the following code creates two `Label` widgets and places\
    \ them in a grid with one column and two rows:\n\n```python\nimport tkinter as\
    \ tk\n\nwindow = tk.Tk()\nwindow.columnconfigure(0, minsize=250)\nwindow.rowconfigure([0,\
    \ 1], minsize=100)\n\nlabel1 = tk.Label(text=\"A\")\nlabel1.grid(row=0, column=0)\n\
    \nlabel2 = tk.Label(text=\"B\")\nlabel2.grid(row=1, column=0)\n\nwindow.mainloop()\n\
    ```\n\nEach grid cell is 250 pixels wide and 100 pixels tall. The labels are placed\
    \ in the center of each cell, as you can see in the following figure:\n\n![](img/4efa9a991b645f75be61871447c559ca_602_0.png)\n\
    \nYou can change the location of each label inside of the grid cell using the\
    \ `.grid()` method's `sticky` parameter. `sticky` accepts a string containing\
    \ one or more of the following letters:\n\n- \"n\" or \"N\" to align to the top\
    \ center of the cell\n- \"e\" or \"E\" to align to the right center side of the\
    \ cell\n- \"s\" or \"S\" to align to the bottom center of the cell\n- \"w\" or\
    \ \"W\" to align to the left center side of the cell\n\nThe letters \"n\", \"\
    e\", \"s\", and \"w\" come from the cardinal directions, north, south, east, and\
    \ west.\n\nFor example, setting `sticky` to \"n\" on both `Label`s in the previous\
    \ code positions each `Label` at the top center of its grid cell:\n\n```python\n\
    import tkinter as tk\n\nwindow = tk.Tk()\nwindow.columnconfigure(0, minsize=250)\n\
    window.rowconfigure([0, 1], minsize=100)\n\nlabel1 = tk.Label(text=\"A\")\nlabel1.grid(row=0,\
    \ column=0, sticky=\"n\")\n\nlabel2 = tk.Label(text=\"B\")\nlabel2.grid(row=1,\
    \ column=0, sticky=\"n\")\n\nwindow.mainloop()\n```\n\nHere's the output:\n\n\
    ![](img/4efa9a991b645f75be61871447c559ca_603_0.png)\n\nYou can combine multiple\
    \ letters in a single string to position each Label in a corner of its grid cell:\n\
    \n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\nwindow.columnconfigure(0,\
    \ minsize=250)\nwindow.rowconfigure([0, 1], minsize=100)\n\nlabel1 = tk.Label(text=\"\
    A\")\nlabel1.grid(row=0, column=0, sticky=\"ne\")\n\nlabel2 = tk.Label(text=\"\
    B\")\nlabel2.grid(row=1, column=0, sticky=\"sw\")\n\nwindow.mainloop()\n```\n\n\
    In this example, the `sticky` parameter of `label1` is set to \"ne\", which places\
    \ the label at the top right corner of its grid cell. `label2` is positioned in\
    \ the bottom left corner by passing \"sw\" to `sticky`.\n\nHere's what that looks\
    \ like in the window:\n\n![](img/4efa9a991b645f75be61871447c559ca_604_0.png)\n\
    \nWhen a widget is positioned with `sticky`, the size of the widget itself is\
    \ just big enough to contain any text and other contents inside of it. It won't\
    \ fill the entire grid cell.\n\nIn order to fill the grid, you can specify \"\
    ns\", which forces the widget to fill the cell in the vertical direction, or \"\
    ew\" to fill the cell in the horizontal direction. To fill the entire cell, set\
    \ `sticky` to \"nsew\".\n\nThe following example illustrates each of these options:\n\
    \n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\n\nwindow.rowconfigure(0,\
    \ minsize=50)\nwindow.columnconfigure([0, 1, 2, 3], minsize=50)\n\nlabel1 = tk.Label(text=\"\
    1\", bg=\"black\", fg=\"white\")\nlabel2 = tk.Label(text=\"2\", bg=\"black\",\
    \ fg=\"white\")\nlabel3 = tk.Label(text=\"3\", bg=\"black\", fg=\"white\")\nlabel4\
    \ = tk.Label(text=\"4\", bg=\"black\", fg=\"white\")\n\nlabel1.grid(row=0, column=0)\n\
    label2.grid(row=0, column=1, sticky=\"ew\")\nlabel3.grid(row=0, column=2, sticky=\"\
    ns\")\nlabel4.grid(row=0, column=3, sticky=\"nsew\")\n\nwindow.mainloop()\n```\n\
    \nHere's what the output looks like:\n\n![](img/4efa9a991b645f75be61871447c559ca_605_0.png)\n\
    \nWhat the above example illustrates is that the `.grid()` geometry manager's\
    \ `sticky` parameter can be used to achieve the same effects as the `.pack()`\
    \ geometry manager's `fill` parameter.\n\nThe correspondence between the `sticky`\
    \ and `fill` parameters is summarized in the following table:\n\n| .grid() | .pack()\
    \ |\n|---|---|\n| sticky=\"ns\" | fill=tk.Y |\n| sticky=\"ew\" | fill=tk.X |\n\
    | sticky=\"nsew\" | fill=tk.BOTH |\n\n`.grid()` is a powerful geometry manager.\
    \ It is often easier to understand than `.pack()` and is much more flexible than\
    \ `.place()`. When creating new Tkinter applications, consider using `.grid()`\
    \ as your primary geometry manager.\n\n> **Note**\n\n`.grid()` offers much more\
    \ flexibility than you have seen here. For example, you can configure cells to\
    \ span multiple rows and columns.\n\nFor more information, check out the [Grid\
    \ Geometry Manager](https://tkdocs.com/tutorial/grid.html) section of the [TkDocs\
    \ tutorial](https://tkdocs.com/tutorial/index.html).\n\nNow that you've got the\
    \ basics of Tkinter's geometry managers down, the next step is to assign actions\
    \ to buttons to bring your applications to life.\n\n## Review Exercises\n\n*You\
    \ can find the solutions to these exercises and many other bonus resources online\
    \ at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).*\n\
    \n1.  Re-create all of the screenshots in this section without looking at the\
    \ source code. If you get stuck, check the code and finish your re-creation. Then\
    \ wait for 10–15 minutes and try again. Repeat this until you can produce all\
    \ of the screenshots on your own.\n\n    Focus on the output. It's okay if your\
    \ own code is slightly different from the code in the book.\n\n2.  Below is an\
    \ image of a window made with Tkinter. Try and re-create the window using the\
    \ techniques you have learned thus far. You may use any geometry manager you like.\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_607_0.png)\n\nLeave feedback on this\
    \ section »\n\n## 18.7 Making Your Applications Interactive\n\nBy now, you have\
    \ a pretty good idea how to create a window with Tkinter, add some widgets, and\
    \ control the application layout. That's great! But applications shouldn't just\
    \ look good. They need to actually do something!\n\nIn this section, you'll learn\
    \ how to bring your applications to life by performing actions whenever certain\
    \ events occur.\n\n### Events and Event Handlers\n\nWhen you create a Tkinter\
    \ application, you must call the `window.mainloop()` method to start the **event\
    \ loop**. During the event loop, your application checks if an event has occurred.\
    \ If so, then some code can be executed in response.\n\nThe event loop is provided\
    \ for you with Tkinter, so you do not have to write any code that checks for event\
    \ yourself. However, you do have to write the code that is executed in response\
    \ to an event. In Tkinter, you write functions called **event handlers** for the\
    \ events that you use in your application.\n\nSo what is an event, and what happens\
    \ when one occurs? An **event** is any action that occurs during the event loop\
    \ that might trigger some behavior in the application, such as when a key or mouse\
    \ button is pressed.\n\nWhen an event occurs, an **event object** is emitted,\
    \ which means that an instance of a class representing the event is instantiated.\
    \ You don't need to worry about creating these classes yourself. Tkinter will\
    \ create instances of event classes for you automatically.\n\nLet's write our\
    \ own event loop in order to better understand how Tkinter's event loop works.\
    \ That way you can see how Tkinter's event loop fits into your application, and\
    \ which parts you need to write yourself.\n\nAssume there's a list called `events_list`\
    \ that contains event objects. A new event object is automatically appended to\
    \ `events_list` every time an event occurs in your program. We don't need to implement\
    \ this updating mechanism. It just magically happens for us in this make-believe\
    \ example.\n\nUsing an infinite loop, we can continually check if there are any\
    \ event objects in `events_list`:\n\n```python\n# Assume that this list gets updated\
    \ automatically\nevents_list = []\n\n# Run the event loop\nwhile True:\n    #\
    \ If events_list is empty, the no events have occurred and we\n    # can skip\
    \ to the next iteration of the loop\n    if events_list == []:\n```"
  mdcn: "## 18.6. 使用几何管理器控制布局\n\n`minsize` 参数为每列设置为 75，每行设置为 50。这确保了 `Label` 控件始终能完整显示其文本，即使窗口尺寸非常小，也不会截断任何字符。\n\
    \n尝试运行脚本，感受一下它的工作原理！调整 `weight` 和 `minsize` 参数，看看它们如何影响网格。\n\n默认情况下，控件在其网格单元格中居中显示。例如，以下代码创建了两个\
    \ `Label` 控件，并将它们放置在一个包含一列两行的网格中：\n\n```python\nimport tkinter as tk\n\nwindow\
    \ = tk.Tk()\nwindow.columnconfigure(0, minsize=250)\nwindow.rowconfigure([0, 1],\
    \ minsize=100)\n\nlabel1 = tk.Label(text=\"A\")\nlabel1.grid(row=0, column=0)\n\
    \nlabel2 = tk.Label(text=\"B\")\nlabel2.grid(row=1, column=0)\n\nwindow.mainloop()\n\
    ```\n\n每个网格单元格宽 250 像素，高 100 像素。标签放置在每个单元格的中心，如下图所示：\n\n![](img/4efa9a991b645f75be61871447c559ca_602_0.png)\n\
    \n你可以使用 `.grid()` 方法的 `sticky` 参数来更改每个标签在网格单元格内的位置。`sticky` 接受一个包含以下一个或多个字母的字符串：\n\
    \n- \"n\" 或 \"N\" 对齐到单元格的顶部中心\n- \"e\" 或 \"E\" 对齐到单元格的右侧中心\n- \"s\" 或 \"S\" 对齐到单元格的底部中心\n\
    - \"w\" 或 \"W\" 对齐到单元格的左侧中心\n\n字母 \"n\"、\"e\"、\"s\" 和 \"w\" 分别代表北、南、东、西四个基本方向。\n\
    \n例如，在前面的代码中，将两个 `Label` 的 `sticky` 设置为 \"n\"，会将每个 `Label` 定位在其网格单元格的顶部中心：\n\n\
    ```python\nimport tkinter as tk\n\nwindow = tk.Tk()\nwindow.columnconfigure(0,\
    \ minsize=250)\nwindow.rowconfigure([0, 1], minsize=100)\n\nlabel1 = tk.Label(text=\"\
    A\")\nlabel1.grid(row=0, column=0, sticky=\"n\")\n\nlabel2 = tk.Label(text=\"\
    B\")\nlabel2.grid(row=1, column=0, sticky=\"n\")\n\nwindow.mainloop()\n```\n\n\
    输出结果如下：\n\n![](img/4efa9a991b645f75be61871447c559ca_603_0.png)\n\n你可以在单个字符串中组合多个字母，将每个标签定位在其网格单元格的角落：\n\
    \n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\nwindow.columnconfigure(0,\
    \ minsize=250)\nwindow.rowconfigure([0, 1], minsize=100)\n\nlabel1 = tk.Label(text=\"\
    A\")\nlabel1.grid(row=0, column=0, sticky=\"ne\")\n\nlabel2 = tk.Label(text=\"\
    B\")\nlabel2.grid(row=1, column=0, sticky=\"sw\")\n\nwindow.mainloop()\n```\n\n\
    在此示例中，`label1` 的 `sticky` 参数设置为 \"ne\"，这会将标签放置在其网格单元格的右上角。`label2` 通过将 \"sw\"\
    \ 传递给 `sticky` 来定位在左下角。\n\n窗口中的显示效果如下：\n\n![](img/4efa9a991b645f75be61871447c559ca_604_0.png)\n\
    \n当使用 `sticky` 定位控件时，控件本身的大小仅足以容纳其内部的文本和其他内容。它不会填满整个网格单元格。\n\n为了填充网格，你可以指定 \"\
    ns\"，这会强制控件在垂直方向上填充单元格，或者指定 \"ew\" 在水平方向上填充单元格。要填充整个单元格，请将 `sticky` 设置为 \"nsew\"\
    。\n\n以下示例说明了每种选项：\n\n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\n\nwindow.rowconfigure(0,\
    \ minsize=50)\nwindow.columnconfigure([0, 1, 2, 3], minsize=50)\n\nlabel1 = tk.Label(text=\"\
    1\", bg=\"black\", fg=\"white\")\nlabel2 = tk.Label(text=\"2\", bg=\"black\",\
    \ fg=\"white\")\nlabel3 = tk.Label(text=\"3\", bg=\"black\", fg=\"white\")\nlabel4\
    \ = tk.Label(text=\"4\", bg=\"black\", fg=\"white\")\n\nlabel1.grid(row=0, column=0)\n\
    label2.grid(row=0, column=1, sticky=\"ew\")\nlabel3.grid(row=0, column=2, sticky=\"\
    ns\")\nlabel4.grid(row=0, column=3, sticky=\"nsew\")\n\nwindow.mainloop()\n```\n\
    \n输出结果如下：\n\n![](img/4efa9a991b645f75be61871447c559ca_605_0.png)\n\n上述示例说明，`.grid()`\
    \ 几何管理器的 `sticky` 参数可以用来实现与 `.pack()` 几何管理器的 `fill` 参数相同的效果。\n\n`sticky` 和 `fill`\
    \ 参数之间的对应关系总结在下表中：\n\n| .grid() | .pack() |\n|---|---|\n| sticky=\"ns\" | fill=tk.Y\
    \ |\n| sticky=\"ew\" | fill=tk.X |\n| sticky=\"nsew\" | fill=tk.BOTH |\n\n`.grid()`\
    \ 是一个强大的几何管理器。它通常比 `.pack()` 更容易理解，并且比 `.place()` 灵活得多。在创建新的 Tkinter 应用程序时，考虑使用\
    \ `.grid()` 作为你的主要几何管理器。\n\n> **注意**\n\n`.grid()` 提供的灵活性远不止你在此看到的。例如，你可以配置单元格以跨越多行和多列。\n\
    \n更多信息，请查看 [TkDocs 教程](https://tkdocs.com/tutorial/index.html) 中的 [Grid 几何管理器](https://tkdocs.com/tutorial/grid.html)\
    \ 部分。\n\n现在你已经掌握了 Tkinter 几何管理器的基础知识，下一步是为按钮分配操作，让你的应用程序变得生动起来。\n\n## 复习练习\n\n\
    *你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到这些练习的解答和许多其他额外资源。*\n\n1.  不看源代码，重新创建本节中的所有截图。如果遇到困难，请查看代码并完成你的重新创建。然后等待 10-15\
    \ 分钟，再试一次。重复此过程，直到你能独立完成所有截图。\n\n    关注输出结果。你自己的代码与书中的代码略有不同也没关系。\n\n2.  下面是一个用\
    \ Tkinter 制作的窗口图像。尝试使用你迄今为止学到的技术重新创建这个窗口。你可以使用任何你喜欢的几何管理器。\n\n![](img/4efa9a991b645f75be61871447c559ca_607_0.png)\n\
    \n对此部分提供反馈 »\n\n## 18.7 使你的应用程序具有交互性\n\n到现在为止，你已经对如何使用 Tkinter 创建窗口、添加一些控件以及控制应用程序布局有了很好的了解。这很棒！但应用程序不应该只是看起来不错。它们需要实际做一些事情！\n\
    \n在本节中，你将学习如何通过在特定事件发生时执行操作来使你的应用程序变得生动起来。\n\n### 事件和事件处理程序\n\n当你创建一个 Tkinter\
    \ 应用程序时，你必须调用 `window.mainloop()` 方法来启动**事件循环**。在事件循环期间，你的应用程序会检查是否发生了事件。如果是，则可以执行一些代码作为响应。\n\
    \n事件循环由 Tkinter 为你提供，因此你不必自己编写任何检查事件的代码。但是，你必须编写响应事件而执行的代码。在 Tkinter 中，你为应用程序中使用的事件编写称为**事件处理程序**的函数。\n\
    \n那么什么是事件，当事件发生时会发生什么？**事件**是在事件循环期间发生的任何可能触发应用程序中某些行为的操作，例如按下键或鼠标按钮时。\n\n当事件发生时，会发出一个**事件对象**，这意味着一个表示该事件的类的实例被实例化。你不需要担心自己创建这些类。Tkinter\
    \ 会自动为你创建事件类的实例。\n\n让我们编写自己的事件循环，以便更好地理解 Tkinter 的事件循环是如何工作的。这样你就可以看到 Tkinter\
    \ 的事件循环如何融入你的应用程序，以及你需要自己编写哪些部分。\n\n假设有一个名为 `events_list` 的列表，其中包含事件对象。每次你的程序中发生事件时，一个新的事件对象会自动附加到\
    \ `events_list`。我们不需要实现这个更新机制。在这个虚构的例子中，它只是神奇地发生了。\n\n使用无限循环，我们可以持续检查 `events_list`\
    \ 中是否有任何事件对象：\n\n```python\n# 假设这个列表会自动更新\nevents_list = []\n\n# 运行事件循环\nwhile\
    \ True:\n    # 如果 events_list 为空，则没有事件发生，我们可以\n    # 跳到循环的下一次迭代\n    if events_list\
    \ == []:\n```"
