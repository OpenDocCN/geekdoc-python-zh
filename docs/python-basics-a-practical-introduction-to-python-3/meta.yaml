    - [@realpython on Twitter](https://twitter.com/realpython)\n- [The Real Python\
    \ Email Newsletter](https://realpython.com/newsletters/)\n\n### 1.3 How to Use\
    \ This Book\n\nThe first half of this book is a quick but thorough overview of\
    \ all the Python fundamentals. You do not need any prior experience with programming\
    \ to get started. The second half is focused on finding practical solutions to\
