    \n如果用户确实选择了一个文件路径，那么将创建一个新文件。使用 `.get()` 方法从 `txt_edit` 中提取文本，并将其赋值给变量 `text`，然后写入输出文件（#3）。\n\
    \n最后，更新窗口的标题，以便在窗口标题中显示新的文件路径（#4）。\n\n现在你可以更新程序，使 `btn_save` 在被点击时调用 `save_file()`。为了更新程序，你需要做三件事：\n\
