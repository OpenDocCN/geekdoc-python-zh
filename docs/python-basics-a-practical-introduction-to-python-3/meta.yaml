  md: "Frame widgets are great for organizing other widgets in a logical manner. Related\
    \ widgets can be assigned to the same frame so that if the frame is ever moved\
    \ in the window, the related widgets stay together.\n\nIn addition to grouping\
    \ your widgets logically, Frame widgets can add a little flare to the visual presentation\
    \ of your application. Read on to see how to create various borders for Frame\
    \ widgets.\n\n# Adjusting Frame Appearance With Reliefs\n\nFrame widgets can be\
    \ configured with a relief attribute that creates a border around the frame. You\
    \ can set relief to be any of the following values:\n\n+   - tk.FLAT, no border\
    \ effect (this is the default value).\n- tk.SUNKEN, which creates a sunken effect.\n\
    - tk.RAISED, which creates a raised effect.\n- tk.GROOVE, which creates a grooved\
    \ border effect.\n- tk.RIDGE, which creates a ridged effect.\n\nTo apply the border\
    \ effect, you must set the borderwidth attribute to a value greater than 1. This\
    \ attribute adjusts the width of the border, in pixels.\n\nThe best way to get\
    \ a feel for what each effect looks like is to see them for yourself. Here is\
    \ a script that packs five Frame widgets into a window, each with a different\
    \ value for the relief argument.\n\n```\nimport tkinter as tk\n\n# 1\nborder_effects\
    \ = {\n    \"flat\": tk.FLAT,\n    \"sunken\": tk.SUNKEN,\n    \"raised\": tk.RAISED,\n\
    \    \"groove\": tk.GROOVE,\n}\n```"
  merge: -1
  pgno: 584
- img_proc: true
  md: "```\n\"ridge\": tk.RIDGE,\n}\n\nwindow = tk.Tk()\n\nfor relief_name, relief\
    \ in border_effects.items():\n    # 2\n    frame = tk.Frame(master=window, relief=relief,\
    \ borderwidth=5)\n    # 3\n    frame.pack(side=tk.LEFT)\n    # 4\n    label =\
    \ tk.Label(master=frame, text=relief_name)\n    label.pack()\n\nwindow.mainloop()\n\
    ```\n\nLet's break that script down some.\n\nFirst, a dictionary is created whose\
    \ keys are the names of the different relief effects available in Tkinter, and\
    \ whose values are the corresponding Tkinter objects. This dictionary is assigned\
    \ to the `border_effects` variable (#1).\n\nAfter creating the window, object,\
    \ a `for` loop is used to loop over each item in the `border_effects` dictionary.\
    \ At each step in the loop:\n\n+   - A new `Frame` widget is created and assigned\
    \ to the `window` object (#2). The `relief` attribute is set to the corresponding\
    \ relief in the `border_effects` dictionary, and the `border` attribute is set\
    \ to 5 so that the effect is visible.\n- The `Frame` is then packed into the window\
    \ using the `.pack()` method (#3). The `side` keyword argument you see is telling\
    \ Tkinter which direction to pack the `frame` objects. You'll see more on how\
    \ this works in the next section.\n- A `Label` widget is created to display the\
    \ name of the relief and is packed into the `frame` object just created (#4)."
