- md: "## 7.1 Use the Debug Control Window\n\nThe main interface to IDLE’s debugger\
    \ is through the Debug Control Window, which we’ll refer to as the Debug window\
    \ for short. You can open the Debug window by selecting `Debug` > `Debugger` from\
    \ the menu in the interactive window. Go ahead and open the Debug window.\n\n\
    > **Note**\n>\n> If the `Debug` menu is missing from your menu bar, make sure\
    \ the interactive window is in focus by clicking that window.\n\nOpen a new script\
    \ window and arrange the three windows on your screen so that you can see all\
    \ of them simultaneously. Here’s one way you could rearrange the windows:\n\n\
    ![](img/4efa9a991b645f75be61871447c559ca_169_0.png)\n\n> **Note**\n>\n> Whenever\
    \ the Debug window is open, the prompt in the interactive window has [DEBUG ON]\
    \ next to it to indicate that the debugger is open.\n\nIn this section you'll\
    \ learn how the Debug window is organized, how to step through your code with\
    \ the debugger one line at a time, and how to set breakpoints to help speed up\
    \ the debugging process.\n\n## The Debug Control Window: An Overview\n\nTo see\
    \ how the debugger works, let's start by writing a simple program without any\
    \ bugs. Type the following into the script window:\n\n```\nfor i in range(1, 4):\n\
    \    j = i * 2\n    print(f\"i is {i} and j is {j}\")\n```\n\nWhen you save and\
    \ run this script with the Debug window open, you'll notice that execution doesn't\
    \ get very far. The Debug Control window will look like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_171_0.png)\n\
    \nNotice that the *Stack* panel at the top of the window contains the following\
    \ message:\n\n```\n> '__main__'.<module>(), line 1: for i in range(1, 4):\n```\n\
    \nThis tells you that line 1 (which contains the code `for i in range(1, 4):`)\
    \ is *about* to be run but has not started yet. The `'__main__'.module()` part\
    \ of the message in the debugger refers to the fact that we're currently in the\
    \ “main” section of the script, as opposed to being, for example, in a function\
    \ definition before the main block of code has been reached.\n\nBelow the *Stack*\
    \ panel, there is a *Locals* panel that lists some strange looking stuff like\
    \ `__annotations__`, `__builtins__`, `__doc__`, and so on. These are some internal\
    \ system variables that you can ignore for now. As your program runs, you will\
    \ see variables declared in the code displayed in this window so that you can\
    \ keep track of their value.\n\nThere are five buttons located at the top left-hand\
    \ corner of the Debug window: `Go`, `Step`, `Over`, `Out`, and `Quit`. These buttons\
    \ control how the debugger moves through your code.\n\nIn the following sections,\
    \ we'll explore what each of these buttons does, starting with the `Step` button.\n\
    \n## The `Step` Button\n\nGo ahead and click the `Step` button at the top left-hand\
    \ corner of the Debug window. The Debug window changes a bit to look like this:\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_172_0.png)\n\nThere are two differences\
    \ to pay attention to here. First, the message in the *Stack* window changes to:\n\
    \n```\n> '__main__'.<module>(), line 2: j = i * 2:\n```\n\nAt this point, line\
    \ 1 of your code was run, and the debugger has stopped just before executing line\
    \ 2.\n\nThe second change to notice is the new variable `i` that is assigned the\
    \ value 1 in the *Locals* panel. That's because the `for` loop in the first line\
    \ of code created the variable `i` and assigned it the value 1.\n\nContinue hitting\
    \ the `Step` button to walk through your code line by line, watching what happens\
    \ in the debugger window. When you arrive at the line `print(f\"i is {i} and j\
    \ is {j}\")`, you can see the output displayed in the interactive window one piece\
    \ at a time.\n\nMore importantly, you can track the growing values of `i` and\
    \ `j` as you step through the `for` loop. You can probably imagine how beneficial\
    \ this feature is when trying to locate the source of bugs in your programs. Knowing\
    \ each variable's value at each line of code can help you pinpoint where things\
    \ go wrong.\n\n## Breakpoints and the “Go” Button\n\nOften, you may know that\
    \ the bug must be in a particular section of your code, but you may not know precisely\
    \ where. Rather than clicking the `Step` button all day long, you can set a **breakpoint**\
    \ that tells the debugger to run all code before the breakpoint continuously until\
    \ the breakpoint is reached.\n\nBreakpoints tell the debugger when to pause code\
    \ execution so that you can take a look at the current state of the program. They\
    \ don’t actually break anything.\n\nTo set a breakpoint, right-click (Mac: `Ctrl`\
    \ + `Click`) on the line of code in your script window you would like to pause\
    \ at and select `Set Breakpoint`. IDLE highlights the line in yellow to indicate\
    \ that your breakpoint has been set. You can remove a breakpoint at any time by\
    \ right-clicking on the line with a breakpoint and selecting `Clear Breakpoint`.\n\
    \nGo ahead and press the `Quit` button at the top of the Debug Control Window\
    \ to turn off the debugger for now. This won’t close the window, and you’ll want\
    \ to keep it open because you’ll be using it again in just a moment.\n\nSet a\
    \ breakpoint on the line of code with the `print()` statement. The script window\
    \ should now look like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_174_0.png)\n\
    \nNow run the script by pressing F5. Just like before, the *Stack* panel of the\
    \ Debug Control Window indicates that debugger has started and is waiting to execute\
    \ line 1. This time, instead of clicking on the Step button, click on the Go button\
    \ and watch what happens to the Debug window:\n\n![](img/4efa9a991b645f75be61871447c559ca_174_1.png)\n\
    \nThe *Stack* panel now shows the following message indicating that it is waiting\
    \ to execute line 3:\n\n```\n> '__main__'.<module>(), line 3: print(f\"i is {i}\
    \ and j is {j}\")\n```\n\nIf you look at the *Locals* panel, you will see that\
    \ both variable i and j have the values 1 and 2, respectively. By clicking on\
    \ Go, you told the debugger to run your code continuously until reaching either\
    \ a breakpoint or the end of the program. Now press “Go” again. The Debug window\
    \ now looks like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_175_0.png)\n\
    \nDo you see what changed? The same message as before is displayed in the *Stack*\
    \ panel, indicating the debugger is waiting to execute line 3 again. However,\
    \ now the values of the variables i and j are 2 and 4. The interactive window\
    \ also displays the output from running the line with print() in it the first\
    \ time.\n\nEach time you press the Go button, the debugger runs the code continuously\
    \ until the next breakpoint is reached. Since you set the breakpoint on line 3,\
    \ which is inside of the for loop, the debugger stops on this line each time it\
    \ goes through the loop.\n\nPress Go a third time. Now i and j have the values\
    \ 3 and 6. What do you think happens when you press Go one more time? Since the\
    \ for loop only iterates 3 times, when you press Go this time, the program finishes\
    \ running.\n\n## “Over” and “Out”\n\nThe Over button works as sort of a combination\
    \ of Step and Go. It steps over a function or loop. In other words, if you’re\
    \ about to Step into a function with the debugger, you can still run that function’s\
    \ code without having to Step all the way through each line of it. The Over button\
    \ takes you directly to the result of running that function.\n\nLikewise, if you’re\
    \ already inside of a function or loop, the Out button executes the remaining\
    \ code inside the function or loop body and then pauses.\n\nIn the next section,\
    \ you’ll look at some buggy code and learn how to fix it with IDLE.\n\nLeave feedback\
    \ on this section »\n\n## 7.2 Squash Some Bugs\n\nNow that you’ve gotten comfortable\
    \ using the Debug Control Window let’s take a look at a buggy program.\n\nThe\
    \ following code defines a function add_underscores() that takes a single string\
    \ object word as an argument and returns a new string containing a copy of word\
    \ with each character surrounded by underscores. For example, add_underscores(\"\
    python\") should return \"_p_y_t_h_o_n_\".\n\nHere’s the buggy code:\n\n```\n\
    def add_underscores(word):\n    new_word = \"_\"\n    for i in range(0, len(word)):\n\
    ```"
  mdcn: "## 7.1 使用调试控制窗口\n\nIDLE 调试器的主要界面是通过调试控制窗口，我们简称其为调试窗口。你可以通过在交互式窗口的菜单中选择 `Debug`\
    \ > `Debugger` 来打开调试窗口。现在就打开调试窗口吧。\n\n> **注意**\n>\n> 如果你的菜单栏中缺少 `Debug` 菜单，请确保通过点击该窗口使交互式窗口处于焦点状态。\n\
    \n打开一个新的脚本窗口，并将三个窗口在屏幕上排列好，以便你能同时看到它们。以下是一种排列窗口的方式：\n\n![](img/4efa9a991b645f75be61871447c559ca_169_0.png)\n\
    \n> **注意**\n>\n> 只要调试窗口是打开的，交互式窗口中的提示符旁边就会显示 [DEBUG ON]，以指示调试器已打开。\n\n在本节中，你将学习调试窗口的组织方式，如何使用调试器逐行单步执行代码，以及如何设置断点以帮助加快调试过程。\n\
    \n## 调试控制窗口：概述\n\n为了了解调试器的工作原理，让我们首先编写一个没有任何错误的简单程序。在脚本窗口中输入以下内容：\n\n```\nfor\
    \ i in range(1, 4):\n    j = i * 2\n    print(f\"i is {i} and j is {j}\")\n```\n\
    \n当你在调试窗口打开的情况下保存并运行此脚本时，你会注意到执行并没有走得很远。调试控制窗口将如下所示：\n\n![](img/4efa9a991b645f75be61871447c559ca_171_0.png)\n\
    \n请注意，窗口顶部的 *Stack* 面板包含以下消息：\n\n```\n> '__main__'.<module>(), line 1: for i in\
    \ range(1, 4):\n```\n\n这告诉你第 1 行（包含代码 `for i in range(1, 4):`）*即将*运行但尚未开始。调试器消息中的\
    \ `'__main__'.module()` 部分指的是我们当前处于脚本的“主”部分，而不是，例如，在到达主代码块之前处于函数定义中。\n\n在 *Stack*\
    \ 面板下方，有一个 *Locals* 面板，列出了一些看起来奇怪的内容，如 `__annotations__`、`__builtins__`、`__doc__`\
    \ 等。这些是一些内部系统变量，你现在可以忽略它们。随着程序的运行，你会看到代码中声明的变量显示在此窗口中，以便你可以跟踪它们的值。\n\n调试窗口的左上角有五个按钮：`Go`、`Step`、`Over`、`Out`\
    \ 和 `Quit`。这些按钮控制调试器如何遍历你的代码。\n\n在接下来的部分中，我们将从 `Step` 按钮开始，探讨每个按钮的功能。\n\n## `Step`\
    \ 按钮\n\n现在点击调试窗口左上角的 `Step` 按钮。调试窗口会稍微变化，如下所示：\n\n![](img/4efa9a991b645f75be61871447c559ca_172_0.png)\n\
    \n这里有两个需要注意的区别。首先，*Stack* 窗口中的消息变为：\n\n```\n> '__main__'.<module>(), line 2: j\
    \ = i * 2:\n```\n\n此时，你的代码第 1 行已经运行，调试器在执行第 2 行之前停止。\n\n第二个需要注意的变化是 *Locals* 面板中出现了一个新变量\
    \ `i`，其值为 1。这是因为代码第一行中的 `for` 循环创建了变量 `i` 并为其赋值为 1。\n\n继续点击 `Step` 按钮，逐行遍历你的代码，观察调试器窗口中发生的情况。当你到达\
    \ `print(f\"i is {i} and j is {j}\")` 这一行时，你可以看到输出在交互式窗口中一次显示一部分。\n\n更重要的是，你可以在单步执行\
    \ `for` 循环时跟踪 `i` 和 `j` 的值增长。你可能可以想象这个功能在尝试定位程序中错误来源时是多么有益。知道每一行代码中每个变量的值可以帮助你准确定位问题所在。\n\
    \n## 断点和“Go”按钮\n\n通常，你可能知道错误一定在代码的某个特定部分，但可能不知道具体位置。与其整天点击 `Step` 按钮，你可以设置一个**断点**，告诉调试器连续运行断点之前的所有代码，直到到达断点。\n\
    \n断点告诉调试器何时暂停代码执行，以便你可以查看程序的当前状态。它们实际上不会破坏任何东西。\n\n要设置断点，请在脚本窗口中你想要暂停的代码行上右键单击（Mac：`Ctrl`\
    \ + 点击）并选择 `Set Breakpoint`。IDLE 会将该行高亮显示为黄色，以指示你的断点已设置。你可以随时通过右键单击带有断点的行并选择 `Clear\
    \ Breakpoint` 来移除断点。\n\n现在按下调试控制窗口顶部的 `Quit` 按钮，暂时关闭调试器。这不会关闭窗口，你会希望保持它打开，因为你稍后会再次使用它。\n\
    \n在包含 `print()` 语句的代码行上设置一个断点。脚本窗口现在应该如下所示：\n\n![](img/4efa9a991b645f75be61871447c559ca_174_0.png)\n\
    \n现在按 F5 运行脚本。就像之前一样，调试控制窗口的 *Stack* 面板指示调试器已启动并等待执行第 1 行。这次，不是点击 Step 按钮，而是点击\
    \ Go 按钮，观察调试窗口的变化：\n\n![](img/4efa9a991b645f75be61871447c559ca_174_1.png)\n\n\
    *Stack* 面板现在显示以下消息，指示它正在等待执行第 3 行：\n\n```\n> '__main__'.<module>(), line 3: print(f\"\
    i is {i} and j is {j}\")\n```\n\n如果你查看 *Locals* 面板，你会看到变量 i 和 j 的值分别为 1 和 2。通过点击\
    \ Go，你告诉调试器连续运行你的代码，直到到达断点或程序结束。现在再次按下“Go”。调试窗口现在如下所示：\n\n![](img/4efa9a991b645f75be61871447c559ca_175_0.png)\n\
    \n你看到变化了吗？*Stack* 面板中显示了与之前相同的消息，指示调试器再次等待执行第 3 行。然而，现在变量 i 和 j 的值是 2 和 4。交互式窗口也显示了第一次运行包含\
    \ print() 的行时的输出。\n\n每次你按下 Go 按钮，调试器都会连续运行代码，直到到达下一个断点。由于你在第 3 行设置了断点，该行位于 for\
    \ 循环内部，调试器每次循环都会在此行停止。\n\n第三次按下 Go。现在 i 和 j 的值是 3 和 6。你认为再按一次 Go 会发生什么？由于 for\
