    # 18.7 Making Your Applications Interactive


    By now, you have a pretty good idea how to create a window with Tkinter, add some
    widgets, and control the application layout. That''s great! But applications shouldn''t
    just look good. They need to actually do something!


    In this section, you''ll learn how to bring your applications to life by performing
    actions whenever certain events occur.


    # Events and Event Handlers


    When you create a Tkinter application, you must call the `window.mainloop()` method
    to start the **event loop**. During the event loop, your application checks if
    an event has occurred. If so, then some code can be executed in response.'
  - "[PAGE 608]\n\n# 18.7. Making Your Applications Interactive\n\nThe event loop\
    \ is provided for you with Tkinter, so you do not have to write any code that\
    \ checks for event yourself. However, you do have to write the code that is executed\
    \ in response to an event. In Tkinter, you write functions called **event handlers**\
    \ for the events that you use in your application.\n\nSo what is an event, and\
    \ what happens when one occurs? An **event** is any action that occurs during\
    \ the event loop that might trigger some behavior in the application, such as\
    \ when a key or mouse button is pressed.\n\nWhen an event occurs, an **event object**\
    \ is emitted, which means that an instance of a class representing the event is\
    \ instantiated. You don't need to worry about creating these classes yourself.\
    \ Tkinter will create instances of event classes for you automatically.\n\nLet's\
    \ write our own event loop in order to better understand how Tkinter's event loop\
    \ works. That way you can see how Tkinter's event loop fits into your application,\
    \ and which parts you need to write yourself.\n\nAssume there's a list called\
    \ `events_list` that contains event objects. A new event object is automatically\
    \ appended to `events_list` every time an event occurs in your program. We don't\
    \ need to implement this updating mechanism. It just magically happens for us\
    \ in this make-believe example.\n\nUsing an infinite loop, we can continually\
    \ check if there are any event objects in `events_list`:\n\n```\n# Assume that\
    \ this list gets updated automatically\nevents_list = []\n\n# Run the event loop\n\
    while True:\n    # If events_list is empty, the no events have occurred and we\n\
    \    # can skip to the next iteration of the loop\n    if events_list == []:\n\
    ```"
- md: "## 18.7. Making Your Applications Interactive\n\n```python\ncontinue\n\n# If\
    \ execution reaches this point, then there is at least one\n# event object in\
    \ events_list\nevent = events_list[0]\n```\n\nRight now, the event loop we have\
    \ created doesn't do anything with event. Let's change that.\n\nSuppose our application\
    \ needs to respond to key presses. We need to check that `event` was generated\
    \ by a user pressing a key on their keyboard, and, if so, pass `event` to an event\
    \ handler function for key presses.\n\nWe'll assume that `event` has a `.type`\
    \ attribute set to the string \"keypress\" if the event is a keypress event object,\
    \ and a `.char` attribute containing the character of the key that was pressed.\n\
    \n> Note\n\nLet's add a `handle_keypress()` function and update our event loop\
    \ code:\n\n```python\nevents_list = []\n\n# Create an event handler\ndef handle_keypress(event):\n\
    \    \"\"\"Print the character associated to the key pressed\"\"\"\n    print(event.char)\n\
    \nwhile True:\n    if events_list == []:\n        continue\n    event = events_list[0]\n\
    \n    # If event is a keypress event object\n    if event.type == \"keypress\"\
    :\n        # Call the keypress event handler\n        handle_keypress(event)\n\
    ```\n\nWhen you call Tkinter’s `window.mainloop()` method, something like the\
    \ above loop is run for you! `.mainloop()` takes care of two parts of the loop\
    \ for you: it maintains a list of events that have occurred, and it runs an event\
    \ handler any time a new event is added to that list.\n\nLet’s update our event\
    \ loop to use `window.mainloop()` instead of our own event loop:\n\n```python\n\
    import tkinter as tk\n\n# Create a window object\nwindow = tk.Tk()\n\n# Create\
    \ an event handler\ndef handle_keypress(event):\n    \"\"\"Print the character\
    \ associated to the key pressed\"\"\"\n    print(event.char)\n\n# Run the event\
    \ loop\nwindow.mainloop()\n```\n\n`.mainloop()` takes care of a lot for us, but\
    \ there’s something missing from the above code. How does Tkinter know when to\
    \ use `handle_keypress()`? Tkinter widgets have a `.bind()` method to do just\
    \ this.\n\n## The .bind() Method\n\nTo call an event handler whenever an event\
    \ occurs on a widgets, use the widget’s `.bind()` method. The event handler is\
    \ said to be **bound** to the event, because it is called every time the event\
    \ occurs.\n\nContinuing with the keypress example from the previous section, let’s\
    \ use `.bind()` to bind `handle_keypress()` to the keypress event:\n\n```python\n\
    import tkinter as tk\n\nwindow = tk.Tk()\n\ndef handle_keypress(event):\n    \"\
    \"\"Print the character associated to the key pressed\"\"\"\n    print(event.char)\n\
    \n# Bind keypress event to handle_keypress()\nwindow.bind(\"<Key>\", handle_keypress)\n\
    \nwindow.mainloop()\n```\n\nHere, the `handle_keypress()` event handler is bound\
    \ to a \"<Key>\" event using the `window.bind()` method. Whenever a key is pressed\
    \ while the application is running, the character of the key pressed will be printed.\n\
    \n`.bind()` always takes two arguments:\n\n1.  An event, which is represent with\
    \ a string of the form \"<event_name>\", where event_name can be any of Tkinter's\
    \ events.\n2.  An event handler, which is the name of the function to be called\
    \ whenever the event occurs.\n\nThe event handler is bound to the widget on which\
    \ `.bind()` is called. When the event handler is called, the event object is passed\
    \ to the event handler function.\n\nIn the example above, the event handler is\
    \ bound to the window itself, but you can bind an event handler to any widget\
    \ in your application.\n\nFor example, you can bind an event handler to a `Button`\
    \ widget that will perform some action whenever the button is pressed:\n\n```python\n\
    def handle_click(event):\n    print(\"The button was clicked!\")\n\nbutton = tk.Button(text=\"\
    Click me!\")\n\nbutton.bind(\"<Button-1>\", handle_click)\n```\n\nIn this example,\
    \ the \"<Button-1>\" event on the `button` widget is bound to the `handle_click`\
    \ event handler. The \"<Button-1>\" event occurs whenever the left mouse button\
    \ is pressed while the mouse is over the widget.\n\nThere are other events for\
    \ mouse button clicks including \"<Button-2>\" for the middle mouse button, if\
    \ one exists, and \"<Button-3>\" for the right mouse button.\n\n> **Note**\n\n\
    For a list of commonly used events, see the [Event types](https://docs.python.org/3/library/tkinter.html#event-types)\
    \ section of the Tkinter 8.5 reference.\n\nYou can bind any event handler to any\
    \ kind of widget with `.bind()`, but there is an easier way to bind event handlers\
    \ to button clicks using the `Button` widget's `command` attribute.\n\n## The\
    \ `command` Attribute\n\nEvery `Button` widget has a `command` attribute that\
    \ you can assign to a function. Whenever the button is pressed, the function is\
    \ executed.\n\nLet's look at an example. First, we'll create a window with a `Label`\
    \ widget that holds a numerical value. We'll put two buttons on the left and right\
    \ of the label. The left button will be used to decrease the value in the `Label`,\
    \ and the right one will increase the value.\n\nHere's the code for the window:\n\
    \n```python\nimport tkinter as tk\n\nwindow = tk.Tk()\n\nwindow.rowconfigure(0,\
    \ minsize=50, weight=1)\nwindow.columnconfigure([0, 1, 2], minsize=50, weight=1)\n\
    \nbtn_decrease = tk.Button(master=window, text=\"-\")\nbtn_decrease.grid(row=0,\
    \ column=0, sticky=\"nsew\")\n\nlbl_value = tk.Label(master=window, text=\"0\"\
    )\nlbl_value.grid(row=0, column=1)\n\nbtn_increase = tk.Button(master=window,\
    \ text=\"+\")\nbtn_increase.grid(row=0, column=2, sticky=\"nsew\")\n\nwindow.mainloop()\n\
    ```\n\nThe window looks like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_613_0.png)\n\
    \nWith the app layout defined, let's bring it to life by giving the buttons some\
    \ commands.\n\nLet's start with the left button. When this button is pressed it\
    \ should decrease the value in the label by 1. There are two things we need to\
    \ know how to do in order to do this: how to get the text in a Label, and how\
    \ to update the text in a Label.\n\nLabel widgets don't have a `.get()` method\
    \ like Entry and Text widgets do. However, you can retrieve the text from the\
    \ label by accessing the `text` attribute with dictionary-style subscript notation:\n\
    \n```python\nlabel = tk.Label(text=\"Hello\")\n\n# Retrieve a Label's text\ntext\
    \ = label[\"text\"]\n\n# Set new text for the label\nlabel[\"text\"] = \"Good\
    \ bye\"\n```\n\nNow that we know how to get and set a label’s text, let’s write\
    \ a function `increase()` that increases the value in the `lbl_value` by 1:\n\n\
    ```python\ndef increase():\n    value = int(lbl_value[\"text\"])\n    lbl_value[\"\
    text\"] = f\"{value + 1}\"\n```\n\n`increase()` gets the text from `lbl_value`\
    \ and converts it to an integer with `int()`. Then it increases this value by\
    \ 1 and sets the label’s `text` attribute to this new value.\n\nWe also need a\
    \ `decrease()` function that decreases the value in `lbl_value` by 1:\n\n```python\n\
    def decrease():\n    value = int(lbl_value[\"text\"])\n    lbl_value[\"text\"\
    ] = f\"{value - 1}\"\n```\n\nPut the `increase()` and `decrease()` functions in\
    \ your code just after the import statement.\n\nTo connect the buttons to the\
    \ functions, assign the function to the button’s `command` attribute. You can\
    \ do this when you instantiate the button. For example, to assign the `increase()`\
    \ function to the `btn_increase`, update the line that instantiates the button\
    \ to the following:\n\n```python\nbtn_increase = tk.Button(master=window, text=\"\
    +\", command=increase)\n```\n\nNow assign the `decrease()` function to `btn_decrease`:\n\
    \n```python\nbtn_decrease = tk.Button(master=window, text=\"-\", command=decrease)\n\
    ```\n\nThat's all you need to do to bind the buttons to the increase() and decrease()\
    \ functions and make the program functional. Try saving your changes and running\
    \ the application!\n\nHere's the full application code for your reference:\n\n\
    ```python\nimport tkinter as tk\n\ndef increase():\n    value = int(lbl_value[\"\
    text\"])\n    lbl_value[\"text\"] = f\"{value + 1}\"\n\ndef decrease():\n    value\
    \ = int(lbl_value[\"text\"])\n    lbl_value[\"text\"] = f\"{value - 1}\"\n\nwindow\
    \ = tk.Tk()\n\nwindow.rowconfigure(0, minsize=50, weight=1)\nwindow.columnconfigure([0,\
    \ 1, 2], minsize=50, weight=1)\n\nbtn_decrease = tk.Button(master=window, text=\"\
    -\", command=decrease)\nbtn_decrease.grid(row=0, column=0, sticky=\"nsew\")\n\n\
    lbl_value = tk.Label(master=window, text=\"0\")\nlbl_value.grid(row=0, column=1)\n\
    \nbtn_increase = tk.Button(master=window, text=\"+\", command=increase)\nbtn_increase.grid(row=0,\
    \ column=2, sticky=\"nsew\")\n\nwindow.mainloop()\n```\n\nThis app is not particularly\
    \ useful, but the skills you learned here apply to every app you'll make:"
  mdcn: "## 18.7. 让你的应用程序变得可交互\n\n```python\ncontinue\n\n# 如果执行到达此处，则 events_list\
