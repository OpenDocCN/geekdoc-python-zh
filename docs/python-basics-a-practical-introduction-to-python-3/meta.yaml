    \ following `import` statement to the top of your `main.py` file:\n\n```python\n\
    # main.py\n\nimport mypackage.module1\nimport mypackage.module2  # <-- Add this\
    \ line\n\n# Leave the below code unchanged\nmypackage.module1.greet(\"Pythonista\"\
    )\nmypackage.module2.depart(\"Pythonista\")\n```\n\nNow when you save and run\
    \ `main.py`, both `greet()` and `depart()` get called:\n\n```\nHello, Pythonista!\n\
    Goodbye, Pythonista!\n```\n\nIn general, modules are imported from packages using\
    \ **dotted module names** with the following format:\n\n```python\nimport <package_name>.<module_name>\n\
    ```\n\nFirst type the name of the package followed by a dot (`.`) and the name\
    \ of the module you want to import.\n\n> **Important**\n>\n> Just like module\
    \ file names, package folder names must be valid Python identifiers. They may\
    \ only contain upper and lower case letters, numbers, and underscores (`_`), and\
    \ they may not start with a digit.\n\nAs with modules, there are several variations\
    \ on the `import` statement that you can use when importing packages.\n\n### Import\
    \ Statement Variations For Packages\n\nThere are three variations of the `import`\
    \ statement that you learned for importing names from modules. These three variations\
    \ translate to the following four variations for importing modules from packages:\n\
    \n1.  `import <package>`\n2.  `import <package> as <other_name>`\n3.  `from <package>\
