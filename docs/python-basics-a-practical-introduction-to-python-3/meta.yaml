- md: "## 8.3. Control the Flow of Your Program\n\n```python\nprint(\"Thank you for\
    \ attending.\")\n```\n\nThe output looks like this:\n\n```\nYou passed the class!\n\
    Thank you for attending.\n```\n\nSince grade is 95, the test condition `grade\
    \ >= 70` is `True` and the string \"You passed the class!\" is printed. Then the\
    \ rest of the code is executed and \"Thank you for attending.\" is printed.\n\n\
    If you change the value of grade to 40, the output looks like this:\n\n```\nThank\
    \ you for attending.\n```\n\nThe line `print(\"Thank you for attending.\")` is\
    \ executed whether or not grade is greater than or equal to 70 because it is after\
    \ the indented code block in the `if` statement.\n\nA failing student will not\
    \ know that they failed if all they see from your code is the text \"Thank you\
    \ for attending.\".\n\nLet's add another `if` statement to tell the student they\
    \ did not pass if their grade is less than 70:\n\n```python\ngrade = 40\n\nif\
    \ grade >= 70:\n    print(\"You passed the class!\")\n\nif grade < 70:\n    print(\"\
    You did not pass the class :(\")\n\nprint(\"Thank you for attending.\")\n```\n\
    \nThe output now looks like this:\n\n```\nYou did not pass the class :(\nThank\
    \ you for attending.\n```\n\nIn English, we can describe an alternate case with\
    \ the word “otherwise.” For instance, “If your grade is 70 or above, you pass\
    \ the class. Otherwise, you do not pass the class.”\n\nFortunately, there is a\
    \ keyword that does for Python what the word “otherwise” does in English.\n\n\
    ## The else Keyword\n\nThe `else` keyword is used after an `if` statement in order\
    \ to execute some code only if the `if` statement’s test condition is `False`.\n\
    \nThe following script uses `else` to shorten the code in the previous script\
    \ for displaying whether or not a student passed a class:\n\n```python\ngrade\
    \ = 40\n\nif grade >= 70:\n    print(\"You passed the class!\")\nelse:\n    print(\"\
    You did not pass the class :(\")\n\nprint(\"Thank you for attending.\")\n```\n\
    \nIn English, the `if` and `else` statements together read as \"If the grade is\
    \ at least 70, then print the string \"You passed the class!\"; otherwise, print\
    \ the string \"You did not pass the class :(\".\n\nNotice that the `else` keyword\
    \ has no test condition, and is followed by a colon. No condition is needed, because\
    \ it executes for any condition that fails the `if` statement’s test condition.\n\
    \n> **Important**\n\nLeaving off the colon (`:`) from the `else` keyword will\
    \ raise a `SyntaxError`:\n\n```python\n>>> if 2 + 2 == 5:\n...     print(\"Who\
    \ broke my math?\")\n... else\nSyntaxError: invalid syntax\n```\n\nThe output\
    \ from the above script is:\n\n```\nYou did not pass the class :(\nThank you for\
    \ attending.\n```\n\nThe line that prints \"Thank you for attending.\" still runs,\
    \ even if the indented block of code after `else` is executed.\n\nThe `if` and\
    \ `else` keywords work together nicely if you only need to test a condition with\
    \ exactly two states.\n\nSometimes, you need to check three or more conditions.\
    \ For that, you use `elif`.\n\n## The `elif` Keyword\n\nThe `elif` keyword is\
    \ short for \"else if\" and can be used to add additional conditions after an\
    \ `if` statement.\n\nJust like `if` statements, `elif` statements have three parts:\n\
    \n1. The `elif` keyword\n2. A test condition, followed by a colon\n3. An indented\
    \ code block that is executed if the test condition evaluates to `True`\n\n> **Important**\n\
    \nLeaving off the colon (`:`) at the end of an `elif` statement raises a `SyntaxError`:\n\
    \n```python\n>>> if 2 + 2 == 5:\n...     print(\"Who broke my math?\")\n... elif\
    \ 2 + 2 == 4\nSyntaxError: invalid syntax\n```\n\nThe following script combines\
    \ `if`, `elif`, and `else` to print the letter grade a student earned in a class:\n\
    \n```python\ngrade = 85  # 1\n\nif grade >= 90:  # 2\n    print(\"You passed the\
    \ class with a A.\")\nelif grade >= 80:  # 3\n    print(\"You passed the class\
    \ with a B.\")\nelif grade >= 70:  # 4\n    print(\"You passed the class with\
    \ a C.\")\nelse:  # 5\n    print(\"You did not pass the class :(\")\n\nprint(\"\
    Thanks for attending.\")  # 6\n```\n\nBoth `grade >= 80` and `grade >= 70` are\
    \ `True` when `grade` is 85, so you might expect both `elif` blocks on lines 3\
    \ and 4 to be executed.\n\nHowever, only the first block for which the test condition\
    \ is `True` is executed. All remaining `elif` and `else` blocks are skipped, so\
    \ executing the script has the following output:\n\n```\nYou passed the class\
    \ with a B.\nThanks for attending.\n```\n\nLet's break down the execution of the\
    \ script step-by-step:\n\n1. `grade` is assigned the value 85 in the line marked\
    \ 1.\n2. `grade >= 90` is `False`, so the `if` statement marked 2 is skipped.\n\
    3. `grade >= 80` is `True`, so the block under the `elif` statement in line 3\
    \ is executed, and \"You passed the class with a B.\" is printed.\n4. The `elif`\
    \ and `else` statements in lines 4 and 5 are skipped, since the condition for\
    \ the `elif` statement on line 3 was met.\n5. Finally, line 6 is executed and\
    \ \"Thanks for attending.\" is printed.\n\nThe `if`, `elif`, and `else` keywords\
    \ are some of the most commonly used keywords in the Python language. They allow\
    \ you to write code that responds to different conditions with different behavior.\n\
    \nThe `if` statement allows you to solve more complex problems than code without\
    \ any conditional logic. You can even nest an `if` statement inside another one\
    \ to write code that handles tremendously complex logic!\n\n## Nested if Statements\n\
    \nJust like `for` and `while` loops can be nested within one another, you nest\
    \ an `if` statement inside another to create complicated decision making structures.\n\
    \nConsider the following scenario. Two people play a one-on-one sport against\
    \ one another. You must decide which of two players wins depending on the players'\
    \ scores and the sport they are playing:\n\n- If the two players are playing basketball,\
    \ the player with the greatest score wins.\n- If the two players are playing golf,\
    \ then the player with the lowest score wins.\n- In either sport, if the two scores\
    \ are equal, the game is a draw.\n\nThe following program solves this using nested\
    \ `if` statements:\n\n```python\nsport = input(\"Enter a sport: \")\np1_score\
    \ = int(input(\"Enter player 1 score: \"))\np2_score = int(input(\"Enter player\
    \ 2 score: \"))\n\n# 1\nif sport.lower() == \"basketball\":\n    if p1_score ==\
    \ p2_score:\n        print(\"The game is a draw.\")\n    elif p1_score > p2_score:\n\
    \        print(\"Player 1 wins.\")\n    else:\n        print(\"Player 2 wins.\"\
    )\n# 2\nelif sport.lower() == \"golf\":\n    if p1_score == p2_score:\n      \
    \  print(\"The game is a draw.\")\n    elif p1_score < p2_score:\n        print(\"\
    Player 1 wins.\")\n    else:\n        print(\"Player 2 wins.\")\n# 3\nelse:\n\
    \    print(\"Unknown sport\")\n```\n\nThis program first asks the user to input\
    \ a sport and the scores for two players.\n\nIn (#1), the string assigned to `sport`\
    \ is converted to lowercase using `.lower()` and is compared it to the string\
    \ \"basketball\". This ensures that user input such as \"Basketball\" or \"BasketBall\"\
    \ all get interpreted as the same sport.\n\nThen the players scores are compared.\
    \ If they are equal, the game is a draw. If player 1's score is larger than player\
    \ 2's score, then player 1 wins the basketball game. Otherwise, player 2 wins\
    \ the basketball game.\n\nIn (#2), the string assigned to `sport` is converted\
    \ to lowercase gain and compared to the string \"golf\". Then the players scores\
    \ are checked again. If the two scores are equal, the game is a draw. If player\
    \ 1's score is less than player 2's score, then player 1 wins. Otherwise, player\
    \ 2 wins.\n\nFinally, in (#3), if the `sport` variable is assigned to a string\
    \ other than \"basketball\" or \"golf\", the message \"Unknown sport\" is displayed.\n\
    \nThe output of the script depends on the input value. Here's a sample execution\
    \ using \"basketball\" as the sport:\n\n```\nEnter a sport: basketball\nPlayer\
    \ 1 score: 75\nPlayer 2 score: 64\nPlayer 1 wins.\n```\n\nHere's the output with\
    \ the same player scores and the sport changed to \"golf\":\n\n```\nEnter a sport:\
    \ golf\nPlayer 1 score: 75\nPlayer 2 score: 64\nPlayer 2 wins.\n```\n\nIf you\
    \ enter anything besides `basketball` or `golf` for the sport, the program displays\
    \ `Unknown sport`.\n\nAll together, there are seven possible ways that the program\
    \ can run, which are described in the following table:\n\n| Sport | Score values\
    \ |\n|---|---|\n| \"basketball\" | p1_score == p2_score |\n| \"basketball\" |\
    \ p1_score > p2_score |\n| \"basketball\" | p1_score < p2_score |\n| \"golf\"\
    \ | p1_score == p2_score |\n| \"golf\" | p1_score > p2_score |\n| \"golf\" | p1_score\
    \ < p2_score |"
