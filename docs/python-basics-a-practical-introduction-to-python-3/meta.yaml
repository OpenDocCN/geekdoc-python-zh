    # 12.1 Files and the File System


    You have likely been working with computer files for a long time. Even so, there
    are some things that programmers need to know about files that the general user
    does not.


    In this section, you’ll learn the concepts necessary to get started working with
    files in Python.


    > **Note**


    If you are familiar with concepts like the file system and file paths, may wish
    to read the *Working With File Paths in Python* and *File Metadata* sections before
    skipping to the next section.


    Let’s start by exploring what a file is and how computers interact with them.


    # The Anatomy of a File


    There are a multitude of types of files out there: text files, image files, audio
    files, and PDF files, just to name a few. Ultimately, though, a file is just a
    sequence of **bytes** called the **contents** of the file.


    Each byte in a file can be thought of as an integer with a value between 0 and
    255, including both endpoints. The bytes are the values that are stored on a physical
    storage device when a file is saved.


    When you access a file on a computer, the contents of the file are read from the
    disk in the correct sequence of bytes. The important thing to know here is that
    there is nothing intrinsic to the file itself that dictates how to interpret the
    contents.


    As a programmer, it’s your job to properly interpret the contents when you open
    a file. This might sound difficult, but Python does a lot of the hard work for
    you.'
- md: "For example, when you open a text file, Python can convert the numerical bytes\
    \ of the file into text characters for you. You do not need to know the specifics\
    \ of how this conversion happens. There are tools in the standard library for\
    \ working with all sorts of file types, including images and audio files.\n\n\
    In order to access a file from a storage device, a whole host of things need to\
    \ happen. You need to know on which device the file is stored, how to interact\
    \ with that device, and where exactly on the device the file is located.\n\nThis\
    \ monumental task is managed by a file system. Python interacts with the file\
    \ system on your computer in order to read, write, and manipulate files.\n\n##\
    \ The File System\n\nThe file system on a computer does two things:\n\n1. It provides\
    \ an abstract representation of the files stored on your computer and devices\
    \ connected to it.\n2. It interfaces with devices to control storage and retrieval\
    \ of file data.\n\nPython interacts with the file system on your computer, so\
    \ you can only do in Python whatever your file system allows.\n\n> **Important**\n\
    \nDifferent operating systems use different file systems. This is very important\
    \ to keep in mind when writing code that will be run on different operating systems.\n\
    \nThe file system itself manages communication between the computer and the physical\
    \ storage device, so the only part of the file system you need to understand as\
    \ a programmer is how it represents files.\n\n## The File System Hierarchy\n\n\
    File systems organize files in a hierarchy of **directories**, which are also\
    \ known as **folders**. At the top of the hierarchy is a directory called the\
    \ **root directory**. All other files and directories in the file system are contained\
    \ in the root directory.\n\nEach file in a directory has a **file name** that\
    \ must be unique from any other file in the same directory. Directories can also\
    \ contain other directories, called **subdirectories** or **subfolders**.\n\n\
    The following **directory tree** visualizes the hierarchy of files and directories\
    \ in an example file system:\n\n```\nroot/\n├── app/\n│   ├── program.py\n│  \
    \ └── data.txt\n└── photos/\n    ├── cats/\n    │   ├── lion.jpg\n    │   └──\
    \ siamese.png\n    └── dogs/\n        ├── dachshound.jpg\n        └── jack_russel.gif\n\
    ```\n\nIn this file system, the root folder is called `root/`. It has two subdirectories:\
    \ `app/` and `photos/`. The `app/` subdirectory contains a `program.py` file and\
    \ a `data.txt` file. The `photos/` directory also has two subdirectories, `cats/`\
    \ and `dogs/`, that both contain two image files.\n\n## File Paths\n\nTo locate\
    \ a file in a file system, you can list the directories in order, starting with\
    \ the root directory, followed by the name of the file. A string with the file\
    \ location represented in this manner is called a **file path**.\n\nFor example,\
    \ the file path for the `jack_russel.gif` file in the above file system is `root/photos/dogs/jack_russel.gif`.\n\
    \nHow you write file paths depends on your operating system. Here are three examples\
    \ of file paths on Windows, macOS, and Linux:\n\n1. **Windows:** `C:\\Users\\\
    David\\Documents\\hello.txt`\n2. **macOS:** `/Users/David/Documents/hello.txt`\n\
    3. **Ubuntu Linux:** `/home/David/Documents/hello.txt`\n\nAll three of these file\
    \ paths locate a text file named `hello.txt` that is stored in the `Documents`\
    \ subfolder of the user directory for a user named David. As you can see, there\
    \ are some pretty big differences between file paths from one operating system\
    \ to another.\n\nOn macOS and Ubuntu Linux, the operating system uses a **virtual\
    \ file system** that organizes all files and directories for all devices on the\
    \ system under a single root directory, usually represented by a forward slash\
    \ symbol (`/`). Files and folders from external storage devices are usually located\
    \ in a subdirectory called `media/`.\n\nIn Windows, there is no universal root\
    \ directory. Each device has a separate file system with a unique root directory\
    \ that is named with a **drive letter** followed by a colon (`:`) and a backslash\
    \ symbol (`\\`). Typically, the hard drive where the operating system is installed\
    \ is assigned the letter c, so the root directory of the file system for that\
    \ drive is `c:`.\n\nThe other major difference between Windows, macOS, and Ubuntu\
    \ file paths is that directories in a Windows file path are separated by backslashes\
    \ (`\\`), whereas directories in macOS and Ubuntu file paths are separated by\
    \ forward slashes (`/`).\n\nWhen you write programs that need to run on multiple\
    \ operating systems, it is critical that you handle the differences in file paths\
    \ appropriately. In versions of Python greater than 3.4, the standard library\
    \ contains a module called `pathlib` that helps take the pain out of handling\
    \ file paths across operating systems.\n\nRead on to learn how to use `pathlib`\
    \ to work with file paths in Python.\n\nLeave feedback on this section »\n\n##\
    \ 12.2 Working With File Paths in Python\n\nTo work with file paths in Python,\
    \ use the standard library's `pathlib` module. You'll need to import the module\
    \ before you can do anything with it.\n\nOpen IDLE's interactive window and type\
    \ the following to import the `pathlib` module:\n\n```\n>>> import pathlib\n```\n\
    \nThe `pathlib` module contains a class called `Path` that is used to represent\
    \ a file path.\n\n### Creating `Path` Objects\n\nThere are several ways to create\
    \ a new `Path` object:\n\n1. From a string\n2. With `Path.home()` and `Path.cwd()`\
    \ class methods\n3. With the `/` operator\n\nThe most straightforward way to create\
    \ a `Path` object is from a string.\n\n### Creating `Path` Objects from Strings\n\
    \nFor instance, the following creates a `Path` object representing the macOS file\
    \ path \"/Users/David/Documents/hello.txt\":\n\n```\n>>> path = pathlib.Path(\"\
    /Users/David/Documents/hello.txt\")\n```\n\nThere's a problem, though, with Windows\
    \ paths. On Windows, directories are separated by backslashes `\\`. Python interprets\
    \ backslashes as the start of an **escape sequence** that represents a special\
    \ character in the string, such as the newline character (`\\n`).\n\nAttempting\
    \ to create a `Path` object with the Windows file path \"C:\\Users\\David\\Desktop\\\
    hello.txt\" raises an exception:\n\n```\n>>> path = pathlib.Path(\"C:\\Users\\\
    David\\Desktop\\hello.txt\")\nSyntaxError: (unicode error) 'unicodeescape' codec\
    \ can't decode bytes\nin position 2-3: truncated \\UXXXXXXXX escape\n```\n\nThere\
    \ are two ways to get around this problem:\n\nYou can use a forward slash (`/`)\
    \ instead of a backslash (`\\`) in your Windows file paths:\n\n```\n>>> path =\
    \ pathlib.Path(\"C:/Users/David/Desktop/hello.txt\")\n```\n\nPython can interpret\
    \ this just fine and will translate the path appropriately and automatically when\
    \ interfacing with the Windows operating system.\n\nYou can also turn the string\
    \ into a `raw` string by prefixing it with an `r`:\n\n```\n>>> path = pathlib.Path(r\"\
    C:\\Users\\David\\Desktop\\hello.txt\")\n```\n\nThis tells Python to ignore any\
    \ escape sequences and just read the string as-is.\n\n### `Path.home()` and `Path.cwd()`\n\
    \nBesides creating a `Path` object from a string, the `Path` class has class methods\
    \ that return `Path` objects of special directories. Two of the most useful class\
    \ methods are `Path.home()` and `Path.cwd()`.\n\nEvery operating system has a\
    \ special directory for storing data for the currently logged in user. This directory\
    \ is called the user's **home directory**. The location of this directory depends\
    \ on the operating system:\n\n- **Windows:** `C:\\Users\\<username>`\n- **macOS:**\
    \ `/Users/<username>`\n- **Ubuntu Linux:** `/home/<username>`\n\nThe `Path.home()`\
    \ class method creates a `Path` object representing the home directory regardless\
    \ of which operating system the code runs on:\n\n```\n>>> home = pathlib.Path.home()\n\
    ```\n\nWhen you inspect the `home` variable on Windows, you will see something\
    \ like this:\n\n```\n>>> home\nWindowsPath(\"C:\\Users\\David\")\n```\n\nThe `Path`\
    \ object created is a subclass of `Path` called `WindowsPath`. On other operating\
    \ systems, the `Path` object returned is a subclass called `PosixPath`.\n\nFor\
    \ example, on macOS, inspecting `home` will display something like the following:\n\
    \n```\n>>> home\nPosixPath(\"/Users/David\")\n```\n\nFor the rest of this section,\
    \ `WindowsPath` objects will be shown in the example output. However, all of the\
    \ examples will work with `PosixPath` objects."
  mdcn: "例如，当你打开一个文本文件时，Python可以将文件的数字字节转换为文本字符。你不需要知道这种转换具体是如何发生的。标准库中有处理各种文件类型的工具，包括图像和音频文件。\n\
    \n为了从存储设备访问文件，需要发生一系列事情。你需要知道文件存储在哪个设备上，如何与该设备交互，以及文件在设备上的确切位置。\n\n这个庞大的任务由文件系统管理。Python与计算机上的文件系统交互，以读取、写入和操作文件。\n\
    \n## 文件系统\n\n计算机上的文件系统做两件事：\n\n1.  它提供存储在计算机及其连接设备上的文件的抽象表示。\n2.  它与设备交互，控制文件数据的存储和检索。\n\
    \nPython与计算机上的文件系统交互，因此你只能在Python中执行文件系统允许的操作。\n\n> **重要提示**\n\n不同的操作系统使用不同的文件系统。在编写将在不同操作系统上运行的代码时，记住这一点非常重要。\n\
    \n文件系统本身管理计算机与物理存储设备之间的通信，因此作为程序员，你需要理解的文件系统部分只是它如何表示文件。\n\n## 文件系统层次结构\n\n文件系统将文件组织在**目录**的层次结构中，目录也称为**文件夹**。层次结构的顶部是一个称为**根目录**的目录。文件系统中的所有其他文件和目录都包含在根目录中。\n\
    \n目录中的每个文件都有一个**文件名**，该文件名必须与同一目录中的任何其他文件不同。目录还可以包含其他目录，称为**子目录**或**子文件夹**。\n\n\
    以下**目录树**可视化了示例文件系统中文件和目录的层次结构：\n\n```\nroot/\n├── app/\n│   ├── program.py\n\
    │   └── data.txt\n└── photos/\n    ├── cats/\n    │   ├── lion.jpg\n    │   └──\
    \ siamese.png\n    └── dogs/\n        ├── dachshound.jpg\n        └── jack_russel.gif\n\
    ```\n\n在这个文件系统中，根文件夹名为`root/`。它有两个子目录：`app/`和`photos/`。`app/`子目录包含一个`program.py`文件和一个`data.txt`文件。`photos/`目录也有两个子目录`cats/`和`dogs/`，每个子目录都包含两个图像文件。\n\
    \n## 文件路径\n\n要在文件系统中定位文件，你可以按顺序列出目录，从根目录开始，后跟文件名。以这种方式表示文件位置的字符串称为**文件路径**。\n\n\
    例如，上述文件系统中`jack_russel.gif`文件的文件路径是`root/photos/dogs/jack_russel.gif`。\n\n如何编写文件路径取决于你的操作系统。以下是Windows、macOS和Linux上文件路径的三个示例：\n\
    \n1.  **Windows:** `C:\\Users\\David\\Documents\\hello.txt`\n2.  **macOS:** `/Users/David/Documents/hello.txt`\n\
    3.  **Ubuntu Linux:** `/home/David/Documents/hello.txt`\n\n所有这三个文件路径都定位了一个名为`hello.txt`的文本文件，该文件存储在名为David的用户目录的`Documents`子文件夹中。如你所见，不同操作系统之间的文件路径存在相当大的差异。\n\
    \n在macOS和Ubuntu Linux上，操作系统使用**虚拟文件系统**，将系统上所有设备的所有文件和目录组织在一个根目录下，通常用正斜杠符号（`/`）表示。来自外部存储设备的文件和文件夹通常位于名为`media/`的子目录中。\n\
    \n在Windows中，没有通用的根目录。每个设备都有一个单独的文件系统，具有唯一的根目录，该目录以**驱动器号**后跟冒号（`:`）和反斜杠符号（`\\\
    `）命名。通常，安装操作系统的硬盘驱动器被分配字母c，因此该驱动器的文件系统根目录是`c:`。\n\nWindows、macOS和Ubuntu文件路径之间的另一个主要区别是，Windows文件路径中的目录用反斜杠（`\\\
    `）分隔，而macOS和Ubuntu文件路径中的目录用正斜杠（`/`）分隔。\n\n当你编写需要在多个操作系统上运行的程序时，正确处理文件路径的差异至关重要。在Python\
    \ 3.4及更高版本中，标准库包含一个名为`pathlib`的模块，该模块有助于简化跨操作系统处理文件路径的痛苦。\n\n继续阅读以了解如何在Python中使用`pathlib`处理文件路径。\n\
    \n对此部分提供反馈 »\n\n## 12.2 在Python中处理文件路径\n\n要在Python中处理文件路径，请使用标准库的`pathlib`模块。在使用它之前，你需要导入该模块。\n\
    \n打开IDLE的交互式窗口并键入以下内容以导入`pathlib`模块：\n\n```\n>>> import pathlib\n```\n\n`pathlib`模块包含一个名为`Path`的类，用于表示文件路径。\n\
    \n### 创建`Path`对象\n\n有几种方法可以创建新的`Path`对象：\n\n1.  从字符串创建\n2.  使用`Path.home()`和`Path.cwd()`类方法\n\
    3.  使用`/`运算符\n\n创建`Path`对象最直接的方法是从字符串创建。\n\n### 从字符串创建`Path`对象\n\n例如，以下代码创建一个表示macOS文件路径\"\
    /Users/David/Documents/hello.txt\"的`Path`对象：\n\n```\n>>> path = pathlib.Path(\"\
    /Users/David/Documents/hello.txt\")\n```\n\n但是，Windows路径存在问题。在Windows上，目录用反斜杠`\\\
    `分隔。Python将反斜杠解释为**转义序列**的开始，该转义序列表示字符串中的特殊字符，例如换行符（`\\n`）。\n\n尝试使用Windows文件路径\"\
    C:\\Users\\David\\Desktop\\hello.txt\"创建`Path`对象会引发异常：\n\n```\n>>> path = pathlib.Path(\"\
    C:\\Users\\David\\Desktop\\hello.txt\")\nSyntaxError: (unicode error) 'unicodeescape'\
    \ codec can't decode bytes\nin position 2-3: truncated \\UXXXXXXXX escape\n```\n\
    \n有两种方法可以解决这个问题：\n\n你可以在Windows文件路径中使用正斜杠（`/`）代替反斜杠（`\\`）：\n\n```\n>>> path =\
    \ pathlib.Path(\"C:/Users/David/Desktop/hello.txt\")\n```\n\nPython可以很好地解释这一点，并在与Windows操作系统交互时自动适当地转换路径。\n\
    \n你也可以通过在字符串前加上`r`将其转换为`raw`字符串：\n\n```\n>>> path = pathlib.Path(r\"C:\\Users\\\
    David\\Desktop\\hello.txt\")\n```\n\n这告诉Python忽略任何转义序列，只按原样读取字符串。\n\n### `Path.home()`和`Path.cwd()`\n\
    \n除了从字符串创建`Path`对象外，`Path`类还有返回特殊目录的`Path`对象的类方法。两个最有用的类方法是`Path.home()`和`Path.cwd()`。\n\
    \n每个操作系统都有一个特殊目录，用于存储当前登录用户的数据。此目录称为用户的**主目录**。此目录的位置取决于操作系统：\n\n-   **Windows:**\
    \ `C:\\Users\\<username>`\n-   **macOS:** `/Users/<username>`\n-   **Ubuntu Linux:**\
    \ `/home/<username>`\n\n`Path.home()`类方法创建一个表示主目录的`Path`对象，无论代码在哪个操作系统上运行：\n\n\
    ```\n>>> home = pathlib.Path.home()\n```\n\n当你在Windows上检查`home`变量时，你会看到类似这样的内容：\n\
    \n```\n>>> home\nWindowsPath(\"C:\\Users\\David\")\n```\n\n创建的`Path`对象是`Path`的一个子类，称为`WindowsPath`。在其他操作系统上，返回的`Path`对象是一个名为`PosixPath`的子类。\n\
    \n例如，在macOS上，检查`home`将显示类似以下内容：\n\n```\n>>> home\nPosixPath(\"/Users/David\")\n\
    ```\n\n在本节的其余部分，示例输出中将显示`WindowsPath`对象。但是，所有示例都适用于`PosixPath`对象。"
