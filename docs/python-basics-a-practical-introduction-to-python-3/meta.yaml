    \nLeave feedback on this section »\n\n## 12.5 Reading and Writing Files\n\nFiles\
    \ are abundant in the modern world. They are the medium through which data is\
    \ digitally stored and transferred. Chances are, you've opened dozens, if not\
    \ hundreds, of files just today.\n\nIn this section, you'll learn how to read\
    \ and write files with Python.\n\n### What Is a File?\n\nA **file** is a sequence\
    \ of bytes and a **byte** is a number between 0 and 255. That is, a file is a\
    \ sequence of integer values.\n\nThe bytes in a file must be **decoded** into\
    \ something meaningful in order to understand the contents of the file.\n\nPython\
    \ has standard library modules for working with text, csv, and audio files. There\
    \ are a number of third-party packages available for working with other file types.\n\
    \nYou'll learn how to install third-party packages in Chapter 13: *Installing\
    \ Packages with Pip*. You'll also see how to work with PDF files in Chapter 14:\
    \ *Creating and Modifying PDF Files*.\n\nIn this section, you'll learn how to\
    \ work with plain text files.\n\n### Understanding Text Files\n\nText files are\
    \ files that contain only text. They are perhaps the easiest files to work with.\
    \ There are two issues, though, that can be frustrating when working with text\
    \ files:\n\n1. Character encoding\n2. Line endings\n\nBefore jumping into reading\
    \ and writing text files, let's look at what these issues are so that you know\
    \ how to deal with them effectively.\n\n### Character Encoding\n\nText files are\
    \ stored on disk as a sequence of bytes. Each byte, or group of bytes in some\
    \ cases, represents a different character in the file.\n\nWhen text files are\
    \ written, characters typed on the keyboard are converted to bytes in a process\
    \ called **encoding**. When a text file is read, the bytes are **decoded** back\
    \ into text.\n\nThe integer a character is associated to is determined by the\
    \ file's **character encoding**. There are many character encodings. Four of the\
    \ most widely used character encodings are:\n\n1. ASCII\n2. UTF-8\n3. UTF-16\n\
    4. UTF-32\n\nSome character encodings, such as ASCII and UTF-8, encode characters\
    \ the same way. For example, numbers and English letters are encoded the same\
    \ way in both ASCII and UTF-8.\n\nThe difference between ASCII and UTF-8 is that\
    \ UTF-8 can encode more characters than ASCII. ASCII can't encode characters like\
    \ ñ or ü, but UTF-8 can. This means you can decode ASCII encoded text with UTF-8,\
    \ but you can't always decode UTF-8 encoded text with ASCII."
