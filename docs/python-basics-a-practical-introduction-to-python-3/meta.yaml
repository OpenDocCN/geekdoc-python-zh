  md: '# Checking Whether Or Not a File Path Exists


    You can create a `Path` object for a file path even if that path doesn''t actually
    exist. Of course, file paths that don''t represent actual files or directories
    aren''t very useful, unless you plan on creating them at some point.


    Path objects have an `.exists()` method that returns `True` or `False` depending
    on whether or not the file path exists on the machine executing the program.


    For instance, if you don''t have a `hello.txt` file in your home directory, then
    the `.exists()` method on the `Path` object representing that file path returns
    `False`:


    ```

    >>> path = pathlib.Path.home() / "hello.txt"

    >>> path.exists()

    False

    ```


    Using a text editor, or some other means, create a blank text file called `hello.txt`
    in your home directory. Then re-run the code from above, making sure `path.exists`
    returns `True`.


    You can check whether or not a file path refers to a file or a directory. To check
    if the path is a file, use the `.is_file()` method:


    ```

    >>> path.is_file()

    True

    ```


    Note that if the file path refers to a file, but doesn''t exist, then `.is_file()`
    returns `False`.


    Use the `.is_dir()` method to check if the file path refers to a directory


    ```

    >>> # The path to "hello.txt" is not a directory

    >>> path.is_dir()

    False


    >>> # The path to the home directory is a directory

    ```'
