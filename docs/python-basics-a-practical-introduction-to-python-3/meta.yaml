  md: '# # 10.1 Define a Class


    Primitive data structures—like numbers, strings, and lists—are designed to represent
    simple things, such as the cost of something, the name of a poem, and your favorite
    colors, respectively. What if you want to represent something much more complicated?


    For example, let’s say you wanted to track employees in an organization. You need
    to store some basic information about each employee, such as their name, age,
    position, and the year they started working.


    One way to do this is to represent each employee as a list:


    ```

    python

    kirk = ["James Kirk", 34, "Captain", 2265]

    spock = ["Spock", 35, "Science Officer", 2254]

    mccoy = ["Leonard McCoy", "Chief Medical Officer", 2266]

    ```


    There are a number of issues with this approach.


    First, when you reference `kirk[0]` several lines away from where the `kirk` list
    is declared, will you remember that the 0th element of the list is the employee’s
    name? What if not every employee has the same number of elements in the list?


    Second, in the `mccoy` list above, the age is missing, so `mccoy[1]` will return
    "Chief Medical Officer" instead of Dr. McCoy’s age.


    A great way to make this type of code more manageable and more maintainable is
    to use **classes**.


    # ## Classes vs Instances


    Classes are used to create user-defined data structures. Classes also have special
    functions, called **methods**, that define behaviors and actions that an object
    created from the class can perform with its data.


    In this chapter you’ll create a `Dog` class that stores some basic information
    about a dog.'
