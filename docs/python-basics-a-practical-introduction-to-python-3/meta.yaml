  md: '# EasyGUI''s Ensemble of GUI Elements


    Besides `msgbox()`, EasyGUI has several other functions for displaying different
    kinds of dialog boxes. The following table summarizes some of the available functions:


    | Function | Description |

    | :--- | :--- |

    | `msgbox()` | A dialog box for displaying a message with a single button. It
    returns the label of the button. |

    | `buttonbox()` | A dialog box with several buttons. It returns the label of the
    selected button. |

    | `indexbox()` | A dialog box with several buttons. It returns the index of the
    selected button. |

    | `enterbox()` | A dialog box with a text entry box. It returns the text entered.
    |

    | `fileopenbox()` | A dialog box for selecting a file to be opened. It returns
    the absolute path to the selected file. |

    | `diropenbox()` | A dialog box for selecting a directory to be opened. It returns
    the absolute path to the selected directory. |

    | `filesavebox()` | A dialog box for saving a file. It returns the absolute path
    to the location for saving the file. |


    Let''s look at each one of these individually.


    # buttonbox()


    EasyGUI''s `buttonbox()` displays a dialog box with a message and several buttons
    that the user can click. The label of the clicked button is returned to your program.


    Just like `msgbox()`, the `buttonbox()` function has `msg` and `title` parameters
    for setting the message to be displayed and the title of the dialog box. `buttonbox()`
    has a third parameter called `choices` that is used to set up the buttons.'
