    **indexbox()**


    indexbox() displays a dialog box that looks identical to the dialog box displayed
    by buttonbox(). In fact, you create an indexbox() the same way as you do a buttonbox():


    ```

    >>> gui.indexbox(

    ...     msg="What''s your favorite color?",

    ...     title="Choose wisely...",

