    \ 找到此代码挑战的解决方案和许多其他额外资源。\n\n[为此部分提供反馈 »](https://realpython.com)\n\n## 9.6 在字典中存储关系\n\
    \nPython 中最有用的数据结构之一是**字典**。\n\n在本节中，你将学习什么是字典，字典与列表和元组有何不同，以及如何在自己的代码中定义和使用字典。\n\
    \n### 什么是字典？\n\n用简单的英语来说，字典是一本包含单词定义的书。字典中的每个条目都有两个部分：被定义的单词及其定义。\n\nPython 字典与列表和元组一样，存储对象的集合。然而，字典不是按顺序存储对象，而是将信息存储在称为**键值对**的数据对中。也就是说，字典中的每个对象都有两个部分：一个**键**和一个**值**。\n\
    \n键值对中的**键**是标识该对**值**部分的唯一名称。将其与英语字典进行比较，键就像被定义的单词，值就像该单词的定义。\n\n例如，你可以使用字典来存储州名及其首府：\n\
    \n| 键 | 值 |\n|---|---|\n| \"California\" | \"Sacramento\" |\n| \"New York\" |\
