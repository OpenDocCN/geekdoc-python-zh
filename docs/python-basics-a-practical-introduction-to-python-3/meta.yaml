    # Tuple Packing and Unpacking


    There is a third, although less common, way of creating a tuple. You can type
    out a comma-separated list of values and leave off the parentheses:


    ```

    >>> coordinates = 4.21, 9.29

    >>> type(coordinates)

    <class ''tuple''>

    ```


    It looks like two values are being assigned to the single variable coordinates.
    In a sense, they are, although the result is that both values are **packed** into
    a single tuple. You can verify that coordinates is indeed a tuple with type().


    If you can pack values into a tuple, it only makes sense that you can unpack them
    as well:


    ```

    >>> x, y = coordinates

    >>> x

    4.21

    >>> y

    9.29

    ```


    Here the values contained in the single tuple coordinates are **unpacked** into
    two distinct variables x and y.


    By combining tuple packing and unpacking, you can make multiple variable assignments
    in a single line:


    ```

    >>> name, age, occupation = "David", 34, "programmer"

    >>> name

    ''David''

    ```'
