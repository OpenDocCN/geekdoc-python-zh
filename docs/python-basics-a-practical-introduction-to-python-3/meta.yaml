    building GUI applications in Python, especially for applications where a modern
    sheen is unnecessary and quickly building something that is functional and cross-platform
    is the top priority.


    > **Note**


    As was mentioned in the last section, IDLE is built with Tkinter. You may encounter
    difficulties when running your own GUI programs within IDLE.


    If you find that the GUI window you are trying to create is unexpectedly freezing
    or appears to be making IDLE misbehave in some unexpected way, try running your
    script from the a command prompt or terminal.


    Let''s dive right in and see how you build an application with Tkinter.


    # Your First Tkinter Application


    The foundational element of a Tkinter GUI is the **window**. Windows are the containers
    in which all other GUI elements live. Other GUI elements, such as text boxes,
    labels, and buttons, are known as **widgets**. Widgets are contained inside of
    windows.


    Let''s create a window that contains a single widget. Start by opening a new interactive
    window in IDLE.


    The first thing you need to do is import the Tkinter module:


    ```

    >>> import tkinter as tk

    ```


    A window is an instance of Tkinter''s Tk class. Go ahead and create a new window
    and assign it to the variable window:


    ```

    >>> window = tk.Tk()

    ```


    When you execute the above code, a new window pops up on your screen. How it looks
    depends on your operating system:'
