    The result of evaluating a conditional is always a boolean value:


    ```

    >>> 1 == 1

    True


    >>> 3 > 5

    False

    ```


    In the first example, since 1 is equal to 1, the result of `1 == 1` is `True`.
    In the second example, 3 is not greater than 5, so the result is `False`.


