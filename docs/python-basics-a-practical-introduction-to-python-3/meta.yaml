- img_proc: true
  md: '# The while Loop


    while loops repeat a section of code while some condition is true. There are two
    parts to every while loop:


    +   1. The while **statement** starts with the while keyword, followed by a **test
    condition**, and ends with a colon (:).

    2. The **loop body** contains the code that gets repeated at each step of the
    loop. Each line is indented four spaces.


    When a while loop is executed, Python evaluates the test condition and determines
    if it is true or false. If the test condition is true, then the code in the loop
    body is executed. Otherwise, the code in the body is skipped and the rest of the
    program is executed.


    If the test condition is true and the body of the loop is executed, then once
    Python reaches the end of the body, it returns to the while statement and re-evaluates
    the test condition. If the test condition is still true, the body is executed
    again. If it is false, the body is skipped.


    This process repeats over and over until the test condition fails, causing Python
    to loop over the code in the body of the while loop.


    Let''s look at an example. Type the following code into the interactive window:


    ```

    >>> n = 1

    >>> while n < 5:

    ...     print(n)

    ...     n = n + 1

    ...

    1

    2

    3

    4

    ```


    First, the integer 1 is assigned to the variable n. Then a while loop is created
    with the test condition n < 5, which checks whether or not the value of n is less
    than 5.'
  merge: -1
  pgno: 151
- img_proc: true
  md: 'If n is less than 5, the body of the loop is executed. There are two lines
    of code in the loop body. In the first line, the value of n is printed on the
    screen, and then n is **incremented** by 1 in the second line.


    The loop execution takes place in five steps, described in the following table:


    | Step # | Value of n | Test Condition | What Happens |

    | :--- | :--- | :--- | :--- |

    | 1 | 1 | 1 < 5 (true) | 1 printed; n incremented to 2 |

    | 2 | 2 | 2 < 5 (true) | 2 printed; n incremented to 3 |

    | 3 | 3 | 3 < 5 (true) | 3 printed; n incremented to 4 |

    | 4 | 4 | 4 < 5 (true) | 4 printed; n incremented to 5 |

    | 5 | 5 | 5 < 5 (false) | Nothing printed; loop ends. |


    If you aren''t careful, you can create an **infinite loop**. This happens when
    the test condition is always true. An infinite loop never terminates. The loop
    body keeps repeating forever.


    Here''s an example of an infinite loop:


    ```

    >>> n = 1

    >>> while n < 5:

    ...     print(n)

    ...

    ```


    The only difference between this `while` loop and the previous one is that n is
    never incremented in the loop body. At each step of the loop, n is equal to 1.
    That means the test condition n < 5 is always true, and the number 1 is printed
    over and over again forever.'
