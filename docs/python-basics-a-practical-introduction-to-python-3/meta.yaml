    The last two examples above may look funny to you. How could one string be greater
    than or less than another?


    The comparators < and > represent the notions of greater than and less than when
    used with numbers, but more generally they represent the notion of order. In this
    regard, "a" < "b" checks if the string "a" comes before the string "b". But how
    are string ordered?


    In Python, strings are ordered **lexicographically**, which is a fancy way to
    say they are ordered as they would appear in a dictionary. So you can think of
    "a" < "b" as asking whether or not the letter a comes before the letter b in the
    dictionary.


    Lexicographic ordering extends to strings with two or more characters by looking
    at each component letter of the string:


    ```

    >>> "apple" < "astronaut"

    True


    >>> "beauty" > "truth"

    False

    ```


    Since strings can contain characters other than letters of the alphabet, the ordering
    must extend to those other characters as well.


