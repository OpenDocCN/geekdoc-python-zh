    \ Python 字典的区别在于，键与其值之间的关系是完全任意的。任何键都可以分配给任何值。\n\n例如，以下键值对表是有效的：\n\n| 键 | 值 |\n\
    |---|---|\n| 1 | \"Sunday\" |\n| \"red\" | 12:45pm |\n| 17 | True |\n\n此表中的键似乎与值完全无关。唯一的关系是每个键都由字典分配给其对应的值。\n\
    \n从这个意义上说，Python 字典更像一个**映射**，而不是英语字典。这里的术语“映射”来自数学。它用于描述两组值之间的关系，而不是地理地图。\n\n\
    实际上，将字典视为映射的这个概念特别有用。在这个视角下，英语字典是将单词与其定义相关联的映射的一个特例。\n\n所以总结一下，Python 字典是一种将一组键与一组值相关联的数据结构。每个键被分配一个单一的值，这定义了两组之间的关系。\n\
    \n现在你已经了解了什么是字典，让我们看看如何在 Python 代码中创建字典。\n\n### 创建字典\n\n以下代码创建了一个包含州名及其首府的**字典字面量**：\n\
    \n```\n>>> capitals = {\n    \"California\": \"Sacramento\",\n    \"New York\"\
    : \"Albany\",\n    \"Texas\": \"Austin\",\n}\n```\n\n请注意，每个键与其值之间用冒号 (`:`) 分隔，每个键值对之间用逗号\
    \ (`,`) 分隔，整个字典用花括号 (`{` 和 `}`) 括起来。\n\n你也可以使用 `dict()` 内置函数从元组序列创建字典：\n\n```\n\
    >>> key_value_pairs = (\n...     (\"California\", \"Sacramento\"),\n...     (\"\
    New York\", \"Albany\"),\n...     (\"Texas\", \"Austin\"),\n)\n>>> capitals =\
    \ dict(key_value_pairs)\n```\n\n当你检查一个字典时，它会以字典字面量的形式显示，无论它是如何创建的：\n\n```\n>>>\
    \ capitals\n{'California': 'Sacramento', 'New York': 'Albany', 'Texas': 'Austin'}\n\
    ```\n\n> **注意**\n\n如果你碰巧使用的是早于 3.6 的 Python 版本，那么你会注意到交互式窗口中输出的字典顺序与这些示例中出现的顺序不同。\n\
    \n在 Python 3.6 之前，Python 字典中键值对的顺序是随机的。在更高版本中，键值对的顺序保证与它们被插入的顺序匹配。\n\n你可以使用字面量或\
    \ `dict()` 创建一个空字典：\n\n```\n>>> {}\n{}\n>>> dict()\n{}\n```\n\n现在我们已经创建了一个字典，让我们看看如何访问它的值。\n\
    \n### 访问字典值\n\n要访问字典中的值，请在字典或分配给字典的变量名末尾将相应的键括在方括号 (`[` 和 `]`) 中：\n\n```\n>>>\
    \ capitals[\"Texas\"]\n'Austin'\n```\n\n用于访问字典值的括号表示法看起来类似于用于从字符串、列表和元组获取值的索引表示法。然而，字典与列表和元组等序列类型是根本不同的数据结构。\n\
    \n要看到区别，让我们退后一步，注意到我们同样可以将 `capitals` 字典定义为一个列表："
