    \nLeave feedback on this section »\n\n## 8.3 Control the Flow of Your Program\n\
    \nNow that we can compare values to one other with boolean comparators and build\
    \ complex conditional statements with logical operators, we can add some logic\
    \ to our code so that it performs different actions for different conditions.\n\
    \n## The `if` Statement\n\nAn `if` statement tells Python to only execute a portion\
    \ of code if a condition is met.\n\nFor example, the following `if` statement\
    \ will print \"2 and 2 is 4\" if the conditional `2 + 2 == 4` is `True`:\n\n```python\n\
    if 2 + 2 == 4:\n    print(\"2 and 2 is 4\")\n```\n\nIn English, you can read this\
    \ as “if 2 + 2 is 4, then print the string '2 and 2 is 4'.”\n\nJust like `while`\
    \ loops, an `if` statement has three parts:\n\n1. The `if` keyword\n2. A test\
    \ condition, followed by a colon\n3. An indented block of code that is executed\
    \ if the test condition is `True`\n\nIn the above example, the test condition\
    \ is `2 + 2 == 4`. Since this expression is `True`, executing the `if` statement\
    \ in IDLE displays the text `2 and 2 is 4`.\n\nIf the test condition is `False`\
    \ (for instance, `2 + 2 == 5`), Python skips over the indented block of code and\
    \ continues execution on the next non-indented line.\n\nFor example, the following\
    \ `if` statement does not print anything:\n\n```python\nif 2 + 2 == 5:\n    print(\"\
    Is this the mirror universe?\")\n```\n\nA universe where `2 + 2 == 5` is `True`\
