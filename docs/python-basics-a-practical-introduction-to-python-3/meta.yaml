  md: '# 17.2. Use matplotlib for Plotting Graphs


    There''s only one problem. It''s not clear which graph represents Real Python
    and which one represents the other website.


    To clarify which graph is which, you can add a legend with the `plt.legend()`
    function. The primary argument of the `legend()` function is a list of strings
    identifying each graph in the plot. These strings must be ordered in the same
    order the graphs were added to the plot:


    ```

    from matplotlib import pyplot as plt

    import numpy as np


    days = np.arange(0, 21)

    other_site = np.arange(0, 21)

    real_python = other_site ** 2


    plt.plot(days, other_site)

    plt.plot(days, real_python)

    plt.xticks([0, 5, 10, 15, 20])

    plt.xlabel("Days of Reading")

    plt.ylabel("Amount of Python Learned")

    plt.title("Python Learned Reading Real Python vs Other Site")

    plt.legend(["Other Site", "Real Python"])

    plt.show()

    ```'
