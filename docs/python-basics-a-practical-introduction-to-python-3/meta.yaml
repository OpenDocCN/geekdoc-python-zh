  md: '# Using with to Manage Your Database Connection


    Recall from Chapter 12 that you can use a `with` statement with the `open()` function
    to open the file and then automatically close the file once the `with` block has
    executed. The same pattern applies to SQLite database connections and is the recommended
    way to open a database connection.


    Here''s the `datetime` example from above using a `with` statement to manage the
    database connection:


    ```

    >>> with sqlite3.connect("test_database.db") as connection:

    ...     cursor = connection.cursor()

    ...     query = "SELECT datetime(''now'', ''localtime'');"

    ...     time = cursor.execute(query).fetchone()[0]

    ...

    >>> time

    ''2018-11-20 23:14:37''

    ```


    In this example, the `connection` variable is assigned to the `Connection` object
    returned by `sqlite3.connect()` in the `with` statement. The code in the `with`
    block gets a new `Cursor` object using `connection.cursor()`, and then gets the
    current time with the `Cursor` object''s `.execute()` and `.fetchone()` methods.


    Managing your database connections in a `with` statement has many advantages.
    The resulting code is often cleaner and shorter than code written without a `with`
    statement. Moreover, any changes made to the database are saved automatically,
    as you''ll see in the next example.


    # Working With Database Tables


    You don''t usually want to create a whole database just to get the current time.
    Databases are used to store and retrieve information. To store data in a database,
    you need to create a table and write some values to it.


    Let''s create a table called `People` with three columns: `FirstName`,'
