    \ a number by 0:\n\n```python\n>>> 1 / 0\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nZeroDivisionError: division by zero\n\
    ```\n\nPython gives you a `ZeroDivisionError`, letting you know that you just\
    \ tried to break a fundamental rule of the universe.\n\n## Exponents\n\nYou can\
    \ raise a number to a power using the `**` operator:\n\n```python\n>>> 2 ** 2\n\
    4\n\n>>> 2 ** 3\n8\n\n>>> 2 ** 4\n16\n```\n\nExponents don't have to be integers.\
    \ They can also be floats:\n\n```python\n>>> 3 ** 1.5\n5.196152422706632\n\n>>>\
    \ 9 ** 0.5\n3.0\n```\n\nRaising a number to the power of `0.5` is the same as\
    \ taking the square root, but notice that even though the square root of `9` is\
    \ an integer, Python returns the float `3.0`.\n\nFor positive operands, the `**`\
    \ operator returns an integer if both operands are integers, and a float if any\
    \ one of the operands is a floating-point number.\n\nYou can also raise numbers\
    \ to negative powers:\n\n```python\n>>> 2 ** -1\n0.5\n\n>>> 2 ** -2\n0.25\n```\n\
    \nRaising a number to a negative power is the same as dividing `1` by the number\
    \ raised to the positive power. So, `2 ** -1` is the same as `1 / (2 ** 1)`, which\
    \ is the same as `1 / 2`, or `0.5`. Similarly `2 ** -2` is the same as `1 / (2\
    \ ** 2)`, which is the same as `1 / 4`, or `0.25`.\n\n## The Modulus Operator\n\
    \nThe `%` operator, or the **modulus**, returns the remainder of dividing the\
    \ left operand by the right operand:\n\n```python\n>>> 5 % 3\n2\n\n>>> 20 % 7\n\
    6\n\n>>> 16 % 8\n0\n```\n\n`3` divides `5` once with a remainder of `2`, so `5\
    \ % 3` is `2`. Similarly, `7` divides `20` twice with a remainder of `6`.\n\n\
    In the last example, `16` is divisible by `8`, so `16 % 8` is `0`. Any time the\
    \ number to the left of `%` is divisible by the number to the right, the result\
    \ is `0`.\n\nOne of the most common uses of `%` is to determine whether or not\
    \ one number is divisible by another. For example, a number `n` is even if and\
    \ only if `n % 2` is `0`.\n\nWhat do you think `1 % 0` returns? Let's try it out:\n\
    \n```python\n>>> 1 % 0\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nZeroDivisionError: integer division or modulo by zero\n\
    ```\n\nThis makes sense because `1 % 0` is the remainder of dividing `1` by `0`.\
    \ But you can't divide `1` by `0`, so Python raises a `ZeroDivisionError`.\n\n\
    > **Note**\n>\n> When you work in IDLE's interactive window, errors like `ZeroDivisionError`\
    \ don't cause much of a problem. The error is displayed and a new prompt pops\
    \ up allowing you to continue writing code.\n>\n> However, whenever Python encounters\
    \ an error while running a script, execution stops. The program is said to have\
    \ **crashed**. In Chapter 8, you'll learn how to handle errors so that your programs\
    \ don't crash unexpectedly.\n\nThings get a little tricky when you use the `%`\
    \ operator with negative numbers:\n\n```python\n>>> 5 % -3\n-1\n\n>>> -5 % 3\n\
    1\n\n>>> -5 % -3\n-2\n```\n\nThese potentially shocking results are really quite\
    \ well defined. To calculate the remainder `r` of dividing a number `x` by a number\
    \ `y`, Python uses the equation `r = x - (y * (x // y))`.\n\nFor example, to find\
    \ `5 % -3`, first find `(5 // -3)`. Since `5 / -3` is about `-1.67`, `5 // -3`\
    \ is `-2`. Now multiply that by `-3` to get `6`. Finally, subtract `6` from `5`\
    \ to get `-1`.\n\n## Arithmetic Expressions\n\nYou can combine operators to form\
    \ complex expressions. An **expression** is a combination of numbers, operators,\
    \ and parentheses that Python can compute, or **evaluate**, to return a value.\n\
    \nHere are some examples of arithmetic expressions:\n\n```python\n>>> 2*3 - 1\n\
    5\n\n>>> 4/2 + 2**3\n10.0\n\n>>> -1 + (-3*2 + 4)\n-3\n```\n\nThe rules for evaluating\
    \ expressions work are the same as in everyday arithmetic. In school, you probably\
    \ learned these rules under the name “order of operations.”\n\nThe `*`, `/`, `//`,\
    \ and `%` operators all have equal **precedence**, or priority, in an expression,\
    \ and each of these has a higher precedence than the `+` and `-` operators. This\
    \ is why `2*3 - 1` returns `5` and not `4`. `2*3` is evaluated first, because\
    \ `*` has higher precedence than the `-` operator.\n\nYou may notice that the\
    \ expressions in the previous example do not follow the rule for putting a space\
    \ on either side of all of the operators. PEP 8 says the following about whitespace\
    \ in complex expressions:\n\n> “If operators with different priorities are used,\
    \ consider adding whitespace around the operators with the lowest priority(ies).\
    \ Use your own judgment; however, never use more than one space, and always have\
    \ the same amount of whitespace on both sides of a binary operator.”\n>\n> — PEP\
    \ 8, Other Recommendations\n\n## 5.3 Challenge: Perform Calculations on User Input\n\
    \nWrite a script called `exponent.py` that receives two numbers from the user\
    \ and displays the first number raised to the power of the second number.\n\n\
    A sample run of the program should look like this (with example input that has\
    \ been provided by the user included below):\n\n```\nEnter a base: 1.2\nEnter\
    \ an exponent: 3\n1.2 to the power of 3 = 1.7279999999999998\n```\n\n**Keep the\
    \ following in mind:**\n\n1. Before you can do anything with the user’s input,\
    \ you will have to assign both calls to `input()` to new variables.\n2. The `input()`\
    \ function returns a string, so you’ll need to convert the user’s input into numbers\
    \ in order to do arithmetic.\n3. You can use an f-string to print the result.\n\
    4. You can assume that the user will enter actual numbers as input.\n\nYou can\
    \ find the solutions to this code challenge and many other bonus resources online\
    \ at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n## 5.4 Make Python Lie to You\n\nWhat do you think `0.1 + 0.2` is? The answer\
    \ is `0.3`, right? Let’s see what Python has to say about it. Try this out in\
    \ the interactive window:\n\n```python\n>>> 0.1 + 0.2\n0.30000000000000004\n```\n\
    \nWell, that’s… *almost* right! What in the heck is going on here? Is this a bug\
    \ in Python?\n\nNo, it isn’t a bug! It’s a **floating-point representation error**,\
    \ and it has nothing to do with Python. It’s related to the way floating-point\
    \ numbers are stored in a computer’s memory.\n\nThe number `0.1` can be represented\
    \ as the fraction `1/10`. Both the number `0.1` and its fraction `1/10` are **decimal\
    \ representations**, or **base 10 representations**. Computers, however, store\
    \ floating-point numbers in base 2 representation, more commonly called **binary\
    \ representation**.\n\nWhen represented in binary, something familiar yet possibly\
    \ unexpected happens to the decimal number `0.1`. The fraction `1/3` has no finite\
    \ decimal representation. That is, `1/3 = 0.3333…` with infinitely many `3`’s\
    \ after the decimal point. The same thing happens to the fraction `1/10` in binary.\n\
    \nThe binary representation of `1/10` is the following infinitely repeating fraction:\n\
    \n```\n0.00011001100110011001100110011...\n```\n\nComputers have finite memory,\
    \ so the number `0.1` must be stored as an approximation and not as its true value.\
    \ The approximation that gets stored is slightly higher than the actual value,\
    \ and looks like this:\n\n```\n0.1000000000000000055511151231257827021181583404541015625\n\
    ```\n\nYou may have noticed, however, that when asked to print `0.1`, Python prints\
    \ `0.1` and not the approximated value above:\n\n```python\n>>> 0.1\n0.1\n```\n\
    \nPython doesn't just chop off the digits in the binary representation for `0.1`.\
    \ What actually happens is a little more subtle.\n\nBecause the approximation\
    \ of `0.1` in binary is just that—an approximation—it is entirely possible that\
    \ more than one decimal number have the same binary approximation.\n\nFor example,\
    \ the numbers `0.1` and `0.10000000000000001` both have the same binary approximation.\
    \ Python prints out the shortest decimal number that shares the approximation.\n\
    \nThis explains why, in the first example of this section, `0.1 + 0.2` does not\
    \ equal `0.3`. Python adds together the binary approximations for `0.1` and `0.2`,\
    \ which gives a number which is *not* the binary approximation for `0.3`.\n\n\
    If all this is starting to make your head spin, don't worry! Unless you are writing\
    \ programs for finance or scientific computing, you don't need to worry about\
    \ the imprecision of floating-point arithmetic."
  mdcn: "## 5.2. 算术运算符与表达式\n\n```python\n>>> -3 // 2\n-2\n```\n\n`//` 运算符首先将左侧数字除以右侧数字，然后向下取整为整数。当其中一个数字为负数时，这可能不会得到你预期的值。\n\
    \n例如，`-3 // 2` 返回 `-2`。首先，`-3` 除以 `2` 得到 `-1.5`。然后 `-1.5` 向下取整为 `-2`。另一方面，`3 //\
    \ 2` 返回 `1`。\n\n上述示例还说明了另一点：如果其中一个操作数是浮点数，`//` 会返回一个浮点数。这就是为什么 `9 // 3` 返回整数 `3`，而\
    \ `5.0 // 2` 返回浮点数 `2.0`。\n\n让我们看看尝试将一个数除以 0 会发生什么：\n\n```python\n>>> 1 / 0\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    ZeroDivisionError: division by zero\n```\n\nPython 会给你一个 `ZeroDivisionError`，让你知道你刚刚试图打破宇宙的一条基本规则。\n\
    \n## 指数运算\n\n你可以使用 `**` 运算符将一个数提升到某个幂次：\n\n```python\n>>> 2 ** 2\n4\n\n>>> 2 **\
    \ 3\n8\n\n>>> 2 ** 4\n16\n```\n\n指数不一定是整数，也可以是浮点数：\n\n```python\n>>> 3 ** 1.5\n\
    5.196152422706632\n\n>>> 9 ** 0.5\n3.0\n```\n\n将一个数提升到 `0.5` 次幂等同于取其平方根，但请注意，即使\
    \ `9` 的平方根是整数，Python 也返回浮点数 `3.0`。\n\n对于正操作数，如果两个操作数都是整数，`**` 运算符返回整数；如果任一操作数是浮点数，则返回浮点数。\n\
    \n你也可以将数字提升到负幂次：\n\n```python\n>>> 2 ** -1\n0.5\n\n>>> 2 ** -2\n0.25\n```\n\n\
    将一个数提升到负幂次等同于将 `1` 除以该数提升到正幂次的结果。因此，`2 ** -1` 等同于 `1 / (2 ** 1)`，也就是 `1 / 2`，即\
    \ `0.5`。类似地，`2 ** -2` 等同于 `1 / (2 ** 2)`，也就是 `1 / 4`，即 `0.25`。\n\n## 取模运算符\n\n\
    `%` 运算符，或称**取模**，返回左操作数除以右操作数的余数：\n\n```python\n>>> 5 % 3\n2\n\n>>> 20 % 7\n6\n\
    \n>>> 16 % 8\n0\n```\n\n`3` 除 `5` 一次，余数为 `2`，所以 `5 % 3` 是 `2`。类似地，`7` 除 `20` 两次，余数为\
    \ `6`。\n\n在最后一个例子中，`16` 能被 `8` 整除，所以 `16 % 8` 是 `0`。任何时候，`%` 左边的数能被右边的数整除，结果就是\
    \ `0`。\n\n`%` 最常见的用途之一是判断一个数是否能被另一个数整除。例如，一个数 `n` 是偶数当且仅当 `n % 2` 是 `0`。\n\n你认为\
    \ `1 % 0` 会返回什么？让我们试试看：\n\n```python\n>>> 1 % 0\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nZeroDivisionError: integer division\
    \ or modulo by zero\n```\n\n这是有道理的，因为 `1 % 0` 是 `1` 除以 `0` 的余数。但你不能将 `1` 除以 `0`，所以\
    \ Python 会引发一个 `ZeroDivisionError`。\n\n> **注意**\n>\n> 当你在 IDLE 的交互式窗口中工作时，像 `ZeroDivisionError`\
    \ 这样的错误不会造成太大问题。错误会显示出来，并弹出一个新的提示符，允许你继续编写代码。\n>\n> 然而，每当 Python 在运行脚本时遇到错误，执行就会停止。程序被认为已经**崩溃**。在第\
    \ 8 章，你将学习如何处理错误，以便你的程序不会意外崩溃。\n\n当使用 `%` 运算符处理负数时，情况会变得有点棘手：\n\n```python\n>>>\
    \ 5 % -3\n-1\n\n>>> -5 % 3\n1\n\n>>> -5 % -3\n-2\n```\n\n这些可能令人震惊的结果实际上定义得非常明确。为了计算一个数\
    \ `x` 除以一个数 `y` 的余数 `r`，Python 使用公式 `r = x - (y * (x // y))`。\n\n例如，要找到 `5 % -3`，首先找到\
    \ `(5 // -3)`。由于 `5 / -3` 大约是 `-1.67`，`5 // -3` 是 `-2`。现在将其乘以 `-3` 得到 `6`。最后，从\
    \ `5` 中减去 `6` 得到 `-1`。\n\n## 算术表达式\n\n你可以组合运算符来形成复杂的表达式。**表达式**是数字、运算符和括号的组合，Python\
    \ 可以对其进行计算或**求值**以返回一个值。\n\n以下是一些算术表达式的例子：\n\n```python\n>>> 2*3 - 1\n5\n\n>>>\
    \ 4/2 + 2**3\n10.0\n\n>>> -1 + (-3*2 + 4)\n-3\n```\n\n表达式求值的规则与日常算术相同。在学校里，你可能在“运算顺序”的名称下学过这些规则。\n\
    \n`*`、`/`、`//` 和 `%` 运算符在表达式中具有相同的**优先级**或优先级，并且每个运算符的优先级都高于 `+` 和 `-` 运算符。这就是为什么\
    \ `2*3 - 1` 返回 `5` 而不是 `4`。`2*3` 首先被计算，因为 `*` 的优先级高于 `-` 运算符。\n\n你可能注意到，前面例子中的表达式没有遵循在所有运算符两侧都加空格的规则。PEP\
    \ 8 对复杂表达式中的空格有如下规定：\n\n> “如果使用了具有不同优先级的运算符，请考虑在优先级最低的运算符周围添加空格。请自行判断；但是，永远不要使用超过一个空格，并且二元运算符两侧的空格量始终相同。”\n\
    >\n> — PEP 8，其他建议\n\n## 5.3 挑战：对用户输入执行计算\n\n编写一个名为 `exponent.py` 的脚本，该脚本从用户那里接收两个数字，并显示第一个数字提升到第二个数字的幂次的结果。\n\
    \n程序的示例运行应如下所示（下面包含了用户提供的示例输入）：\n\n```\nEnter a base: 1.2\nEnter an exponent:\
    \ 3\n1.2 to the power of 3 = 1.7279999999999998\n```\n\n**请记住以下几点：**\n\n1. 在对用户输入执行任何操作之前，你需要将两次\
    \ `input()` 调用赋值给新的变量。\n2. `input()` 函数返回一个字符串，因此你需要将用户的输入转换为数字才能进行算术运算。\n3. 你可以使用\
    \ f-string 来打印结果。\n4. 你可以假设用户输入的是实际的数字。\n\n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到此代码挑战的解决方案和许多其他奖励资源。\n\n## 5.4 让 Python 对你撒谎\n\n你认为 `0.1 + 0.2` 是多少？答案是 `0.3`，对吧？让我们看看\
    \ Python 怎么说。在交互式窗口中试试这个：\n\n```python\n>>> 0.1 + 0.2\n0.30000000000000004\n```\n\
    \n嗯，这……*几乎*正确！这到底是怎么回事？这是 Python 中的一个 bug 吗？\n\n不，这不是一个 bug！这是一个**浮点数表示错误**，它与\
    \ Python 无关。它与浮点数在计算机内存中的存储方式有关。\n\n数字 `0.1` 可以表示为分数 `1/10`。数字 `0.1` 及其分数 `1/10`\
    \ 都是**十进制表示**，或**基数为 10 的表示**。然而，计算机以基数为 2 的表示形式存储浮点数，通常称为**二进制表示**。\n\n当以二进制表示时，十进制数字\
    \ `0.1` 会发生一些熟悉但可能意想不到的事情。分数 `1/3` 没有有限的十进制表示。也就是说，`1/3 = 0.3333…`，小数点后有无限多个 `3`。分数\
    \ `1/10` 在二进制中也会发生同样的事情。\n\n`1/10` 的二进制表示是以下无限循环小数：\n\n```\n0.00011001100110011001100110011...\n\
    ```\n\n计算机的内存是有限的，因此数字 `0.1` 必须作为近似值存储，而不是其真实值。存储的近似值略高于实际值，如下所示：\n\n```\n0.1000000000000000055511151231257827021181583404541015625\n\
    ```\n\n然而，你可能已经注意到，当要求打印 `0.1` 时，Python 打印的是 `0.1`，而不是上面的近似值：\n\n```python\n>>>\
    \ 0.1\n0.1\n```\n\nPython 并不是简单地截断 `0.1` 的二进制表示中的数字。实际发生的事情更为微妙。\n\n因为 `0.1` 的二进制近似值只是一个近似值——完全有可能有多个十进制数字具有相同的二进制近似值。\n\
    \n例如，数字 `0.1` 和 `0.10000000000000001` 具有相同的二进制近似值。Python 会打印出共享该近似值的最短十进制数字。\n\
    \n这就解释了为什么在本节的第一个例子中，`0.1 + 0.2` 不等于 `0.3`。Python 将 `0.1` 和 `0.2` 的二进制近似值相加，得到的结果*不是*\
    \ `0.3` 的二进制近似值。\n\n如果这一切开始让你头晕，别担心！除非你正在编写金融或科学计算程序，否则你不需要担心浮点数算术的不精确性。"
