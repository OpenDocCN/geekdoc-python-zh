    ```

    >>> pdf.documentInfo.title

    ''Pride and Prejudice, by Jane Austen''

    ```


    The .documentInfo object contains the PDF **metadata** which is set when a PDF
    is created.


    The `PdfFileReader` class is the gateway to working with PDF files in Python.
    It provides all the necessary methods and attributes needed to access data in
    a PDF file.


    Let''s explore what you can do with a PDF file and how you do it!


    # Extract Text From a Page


    PDF pages are represented in PyPDF2 with the `PageObject` class. You use `PageObject`
    instances to interact with pages in a PDF file.


    You don''t need to create your own `PageObject` instances. Instead, you access
    them through a `PdfFileReader` object. Let''s see how this is done by extracting
    the text from the first page of the `Pride_and_Prejudice.pdf` file.


    There are two steps to extracting text from a single PDF page:


    +   1. Get a `PageObject` with `PdfFileReader.getPage()`

    2. Extract the text as a string with the `PageObject` instance''s `.extractText()`
    method.


    `Pride_and_Prejudice.pdf` has 243 pages. Each page has an index between 0 and
    242. You can get an object representing a specific page by passing the page''s
    index to the `PdfFileReader.getPage()` method:


    ```

    >>> first_page = pdf.getPage(0)

    ```


    .getPage() returns a `PageObject`:


    ```

    >>> type(first_page)

    <class ''PyPDF2.pdf.PageObject''>

    ```'
