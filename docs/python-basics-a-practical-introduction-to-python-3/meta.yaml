- md: "# Foreword\n\nHello and welcome to **Python Basics: A Practical Introduction\
    \ to Python 3**. I hope you are ready to learn why so many professional and hobbyist\
    \ developers are drawn to Python and how you can begin using it on your projects,\
    \ small and large, right away.\n\nThis book is targeted at beginners who either\
    \ know a little programming but not the Python language and ecosystem, as well\
    \ as complete beginners.\n\nIf you don’t have a Computer Science degree, don’t\
    \ worry. Fletcher, David, Dan, and Joanna will guide you through the important\
    \ computing concepts while teaching you the Python basics, and just as importantly,\
    \ skipping the unnecessary details at first.\n\n## Python Is a Full-Spectrum Language\n\
    \nWhen learning a new programming language, you don’t yet have the experience\
    \ to judge how well it will serve you in the long run. If you are considering\
    \ Python, let me assure you that this is a good choice. One key reason is that\
    \ Python is a **full-spectrum** language.\n\nWhat do I mean by this? Some languages\
    \ are very good for beginners. They hold your hand and make programming super\
    \ easy. We can go to the extreme and look at visual languages such as Scratch.\n\
    \nHere you get blocks that represent programming concepts, like variables, loops,\
    \ method calls, and so on, and you drag and drop them on a visual surface. Scratch\
    \ may be easy to get started with for simple programs. But you cannot build professional\
    \ applications with it. Name one Fortune 500 company that powers its core business\
    \ logic with Scratch.\n\nCame up empty? Me too—because that would be insanity.\n\
    \nOther languages are incredibly powerful for expert developers. The most popular\
    \ one in this category is likely C++ and its close relative C. Whatever web browser\
    \ you used today was likely written in C or C++. Your operating system running\
    \ that browser was also very likely built with C/C++. Your favorite first-person\
    \ shooter or strategy video game? You nailed it: C/C++.\n\nYou can do amazing\
    \ things with these languages. But they are wholly unwelcoming to newcomers looking\
    \ for a gentle introduction.\n\nYou might not have read a lot of C++ code. It\
    \ can almost make your eyes burn. Here’s an example, a real albeit complex one:\n\
    \n```\ntemplate <typename T>\n_Defer<void(*)(PID<T>, void (T::*)(void))>\n   \
    \ (const PID<T>&, void (T::*)(void))>\ndefer(const PID<T>& pid, void (T::*method)(void))\n\
    {\n    void (*dispatch)(const PID<T>&, void (T::*)(void)) =\n        &process::template\
    \ dispatch<T>;\n    return std::tr1::bind(dispatch, pid, method);\n}\n```\n\n\
    Please, just no.\n\nBoth Scratch and C++ are decidedly not what I would call full-spectrum\
    \ languages. In the Scratch level, it’s easy to start but you have to switch to\
    \ a “real” language to build real applications. Conversely, you can build real\
    \ apps with C++, yet there is no gentle on-ramp. You dive head first into all\
    \ the complexity of that language which exists to support these rich applications.\n\
    \nPython, on the other hand, is special. It is a full-spectrum language. We often\
    \ judge the simplicity of a language based on the “hello world” test. That is,\
    \ what syntax and actions are necessary to get that language to output “hello\
    \ world” to the user? In Python, it couldn’t be simpler:\n\n```\nprint(\"Hello\
    \ world\")\n```\n\nThat’s it. However, I find this an unsatisfying test.\n\nThe\
    \ “hello world” test is useful but really not enough to show the power or complexity\
    \ of a language. Let’s try another example. Not everything here needs to make\
    \ total sense, just follow along to get the Zen of it. The book covers these concepts\
    \ and more as you go through. The next example is certainly something you could\
    \ write near the end.\n\nHere’s the new test: What would it take to write a program\
    \ that accesses an external website, downloads the content to your app in memory,\
    \ then displays a subsection of that content to the user? Let’s try that experiment\
    \ with Python 3 with the help of the requests package (which needs to be installed—more\
    \ on that in chapter 12):\n\n```\nimport requests\nresp = requests.get(\"https://realpython.com\"\
    )\nhtml = resp.text\nprint(html[205:294])\n```\n\nIncredibly, that’s it. When\
    \ run, the output is (something like):\n\n```\n<title>Python Tutorials - Real\
    \ Python</title>\n<meta name=\"author\" content=\"Real Python\">\n```\n\nThis\
    \ is the easy, getting started side of the spectrum of Python. A few trivial lines\
    \ and incredible power is unleashed. Because Python has access to so many powerful\
    \ but well-packaged libraries, such as requests, it is often described as *having\
    \ batteries included*.\n\nSo there you have a simple powerful starter example.\
    \ On the real apps side of things, we have many incredible applications written\
    \ in Python as well.\n\nYouTube, the world's most popular video streaming site,\
    \ is written in Python and processes more than 1,000,000 requests per second.\
    \ Instagram is another example of a Python application. More close to home, we\
    \ even have realpython.com and my sites such as talkpython.fm.\n\nThis full-spectrum\
    \ aspect of Python means you can start easy and adopt more advanced features as\
    \ you need them when your application demands grow.\n\n## Python Is Popular\n\n\
    You might have heard that Python is popular. On one hand, it may seem that it\
    \ doesn't really matter how popular a language is if you can build the app you\
    \ want to build with it.\n\nFor better or worse, in software development popularity\
    \ is a strong indicator of the quality of libraries you will have available as\
    \ well the number of job openings there are. In short, you should tend to gravitate\
    \ towards more popular technologies as there will be more choices and integrations\
    \ available.\n\nSo, is Python actually that popular? Yes it is. You'll of course\
    \ find a lot of hype and hyperbole. But there are plenty of stats to back this\
    \ one. Let's look at some analytics available and presented by StackOverflow.com.\n\
    \nThey run a site called **StackOverflow Trends**. Here you can look at the trends\
    \ for various technologies by tag. When we compare Python to the other likely\
    \ candidates you could pick to learn programming, you'll see one is unlike the\
    \ others:\n\n![](img/4efa9a991b645f75be61871447c559ca_19_0.png)\n\nYou can explore\
    \ this chart and create similar charts to this one over at [insights.stackoverflow.com/trends](https://insights.stackoverflow.com/trends).\n\
    \nNotice the incredible growth of Python compared to the flatline or even downward\
    \ trend of the other usual candidates! If you are betting your future on the success\
    \ of a given technology, which one would you choose from this list?\n\nThat’s\
    \ just one chart, what does it really tell us? Well, let’s look at another. StackOverflow\
    \ does a yearly survey of developers. It’s comprehensive and very well done. You\
