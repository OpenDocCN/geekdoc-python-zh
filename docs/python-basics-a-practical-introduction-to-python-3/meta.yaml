  md: 'The next two widgets we''ll see are used to collect text input from a user.


    # Entry Widgets


    When you need to get a little bit of text from a user, like a name or an email
    address, use an `Entry` widget. They display a small text box that the user can
    type some text into.


    Creating and styling an `Entry` widget works pretty much exactly like `Label`
    and `Button` widgets. For example, the following creates a widget with a blue
    background, yellow text, and a width of 50 text units:


    ```

    entry = tk.Entry(fg="yellow", bg="blue", width=50)

    ```


    The interesting bit about `Entry` widgets isn''t how to style them, though. It''s
    how to use them get input from a user. There are three main operations that you
    can perform with `Entry` widgets:


    +   1. Retrieving text with the `.get()` method

    2. Deleting text with the `.delete()` method

    3. Inserting text with the `.insert()` method


    The best way to get a grip on `Entry` widgets is to create one and interact with
    it. Go ahead and open IDLE''s interactive window and follow along with the examples
    in this section.


    First, import `tkinter` and create a new window:


    ```

    >>> import tkinter as tk

    >>> window = tk.Tk()

    ```


    Now create a `Label` and an `Entry` widget:


    ```

    >>> label = tk.Label(text="Name")

    >>> entry = tk.Entry()

    ```


    The `Label` describes what sort of text should go in the `Entry` widget. It'
  merge: -1
  pgno: 565
- img_proc: true
  md: 'doesn''t enforce any sort of requirements on the `Entry`, but it tells the
    user what our program expects them to put there.


    We need to `.pack()` the widgets into the window so that they are visible:


    ```

    >>> label.pack()

    >>> entry.pack()

    ```


    Here''s what that looks like:


    ![](img/4efa9a991b645f75be61871447c559ca_566_0.png)


    Notice that Tkinter automatically centers the `Label` above the `Entry` widget
    in the window. This is a feature of the `.pack()` method, which you''ll learn
    more about in later sections.


    Click inside the `Entry` widget with your mouse and type "Real Python":


    ![](img/4efa9a991b645f75be61871447c559ca_566_1.png)


    Now you''ve got some text entered into the `Entry` widget, but that text hasn''t
    been sent to your program yet.


    Use the `Entry` widget''s `.get()` method to retrieve the text and assign it to
    a variable called `name`:'
