  md: '```

    frame = tk.Frame()

    label = tk.Label(master=frame)

    ```


    To get a feel for how this works, let''s write a script that creates two Frame
    widgets called `frame_a` and `frame_b`. `frame_a` contains a label with the text
    "I''m in Frame A", and `frame_b` contains the label "I''m in Frame B". Here''s
    one way to do that:


    ```

    import tkinter as tk


    window = tk.Tk()


    frame_a = tk.Frame()

    frame_b = tk.Frame()


    label_a = tk.Label(master=frame_a, text="I''m in Frame A")

    label_a.pack()


    label_b = tk.Label(master=frame_b, text="I''m in Frame B")

    label_b.pack()


    frame_a.pack()

    frame_b.pack()


    window.mainloop()

    ```


    Notice that `frame_a` is packed into the window before `frame_b`. The window that
    opens shows the label in `frame_a` above the label in `frame_b`:


    ![](img/4efa9a991b645f75be61871447c559ca_582_0.png)


    Now let''s see what happens when you swap the order of `frame_a.pack()`'
