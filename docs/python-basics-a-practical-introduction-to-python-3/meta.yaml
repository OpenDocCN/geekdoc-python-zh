  md: '# The and Keyword


    Consider the following statements:


    +   1. Cats have four legs.

    2. Cats have tails.


    In general, both of these statements are true.


    When we combine these two statements using and, the resulting sentence “cats have
    four legs and cats have tails” is also a true statement. If both statements are
    negated, the compound statement “cats do not have four legs and cats do not have
    tails” is false.


    Even when we mix and match false and true statements, the compound statement is
    false. “Cats have four legs and cats do not have tails” and “cats do not have
    four legs and cats have tails” are both false statements.


    When two statements P and Q are combined with and, the **truth value** of the
    compound statement “P and Q” is true if and only if both P and Q are true.


    Python’s and operator works exactly the same way. Here are four example of compound
    statements with and:


    ```

    >>> 1 < 2 and 3 < 4  # Both are True

    True

    ```


    Both statements are True, so the combination is also True.


    ```

    >>> 2 < 1 and 4 < 3  # Both are False

    False

    ```


    Both statements are False, so their combination is also False.


    ```

    >>> 1 < 2 and 4 < 3  # Second statement is False

    False

    ```


    1 < 2 is True, but 4 < 3 is False, so their combination is False.'
