  md: '# Chapter 10


    # Object-Oriented Programming (OOP)


    **OOP**, or **Object-Oriented Programming**, is a method of structuring a program
    by bundling related properties and behaviors into individual **objects**.


    Conceptually, objects are like components of a system. Think of a program as a
    factory assembly line of sorts. A system component at each step of the assembly
    line processes some material a little bit, ultimately transforming raw material
    into a finished product.


    An object contains data, like the raw or pre-processed materials at each step
    on an assembly line, and behavior, like the action each assembly line component
    performs.


    **In this chapter, you will learn how to:**


    +   - Create a class, which is like a blueprint for creating an object

    - Use classes to create new objects

    - Model systems with class inheritance


    Let’s get started!


    [Leave feedback on this section »](Leave feedback on this section »)'
