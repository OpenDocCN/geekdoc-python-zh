    \n> **注意**\n>\n> 并非每个字符串都是字符串字面量。例如，作为用户输入捕获的字符串不是字符串字面量，因为它没有在程序代码中明确写出。\n>\n\
    > 你将在本章第 4 节学习如何处理用户输入。\n\n字符串周围的引号称为 **分隔符**，因为它们告诉 Python 字符串从哪里开始以及在哪里结束。当一种类型的引号用作分隔符时，另一种类型的引号可以在字符串内部使用：\n\
