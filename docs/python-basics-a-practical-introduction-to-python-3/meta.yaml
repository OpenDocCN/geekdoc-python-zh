    \ box:\n\n```\nimport easygui as gui\n\npath = gui.fileopenbox(title=\"Select\
    \ a file\")\n\nif path is None:\n    exit()\n```\n\nIf the user closes the file\
    \ open dialog box without pressing `OK`, then `path` is `None` and the program\
