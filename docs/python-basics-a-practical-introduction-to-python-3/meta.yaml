    # Determine if a String Starts or Ends With a Particular String


    When you work with text, sometimes you need to determine if a given string starts
    with or ends with certain characters. You can use two string methods to solve
    this problem: .startswith() and .endswith().


    Let''s look at an example. Consider the string "Enterprise". Here''s how you use
    .startswith() to determine if the string starts with the letters e and n:


    ```

    >>> starship = "Enterprise"

    >>> starship.startswith("en")

    False

    ```


    You must tell .startswith() what characters to search for by providing a string
    containing those characters. So, to determine if "Enterprise" starts with the
    letters e and n, you call .startswith("en"). This returns False. Why do you think
    that is?


    If you guessed that .startswith("en") returns False because "Enterprise" starts
    with a capital E, you''re absolutely right! The .startswith() method is **case-sensitive**.
    To get .startswith() to return True, you need to provide it with the string "En":


    ```

    >>> starship.startswith("En")

    True

    ```


    The .endswith() method is used to determine if a string ends with certain characters:


    ```

    >>> starship.endswith("rise")

    True

    ```


    Just like .startswith(), the .endswith() method is case-sensitive:


    ```

    >>> starship.endswith("risE")

    False

    ```'
