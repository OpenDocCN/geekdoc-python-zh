    \n有关如何使用Jupyter Notebooks的交互式教程，请查看Jupyter的[IPython In Depth](https://jupyter.org/learn/notebooks.html)教程。\n\
    \n## 复习练习\n\n你可以在[realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)在线找到这些练习的解决方案和许多其他额外资源。\n\
    \n1.  尽可能多地通过编写自己的脚本（不参考提供的代码）来重新创建本节中显示的图表。\n2.  一个[有充分文献记载的事实](https://www.tylervigen.com/spurious-correlations)是，世界上的海盗数量与全球气温上升相关。编写一个脚本`pirates.py`来直观地检查这种关系：\n\
    \    - 从第17章练习文件文件夹中读取文件`pirates.csv`。\n    - 创建一个折线图，显示全球平均温度（摄氏度）作为世界海盗数量的函数——即，将海盗数量绘制在x轴上，温度绘制在y轴上。\n\
    \    - 添加图表标题并为图表的轴添加标签。\n    - 将生成的图表保存为PNG图像文件。\n    - 附加题：在图表上为每个点标注相应的年份。你应该通过循环遍历实际数据点来编程实现，而不是指定每个注释的单独位置。\n\
    \n[为此部分提供反馈 »](https://realpython.com/python-basics/resources)\n\n## 17.3 总结与附加资源\n\
    \n在本章中，你学习了Python科学计算栈中常用的两个包。\n\n在第一部分“使用NumPy进行矩阵操作”中，你学习了NumPy包。NumPy用于处理多维数据数组。它引入了`ndarray`对象，通常使用`array`别名创建。\n\
    \nNumPy的`array`是同构数据类型，这意味着它只能存储单一类型的数据。例如，NumPy的`array`可以包含所有整数，或所有浮点数，但不能同时包含整数*和*浮点数。你还看到了一些用于操作NumPy\
    \ `array`对象的有用函数和方法。最后，你了解了NumPy的`arange()`函数，它的工作方式与Python自身的`range()`函数非常相似，只是它返回一个一维的NumPy\
    \ `array`对象。\n\n在第二部分“使用`matplotlib`绘制图表”中，你学习了如何使用`matplotlib`包通过`pyplot`接口创建简单的图表。你使用`plot()`、`bar()`和`hist()`函数，从纯Python列表和NumPy数组构建了折线图、条形图和直方图。你学习了如何通过添加图表和轴标题、刻度标记和图例来设置图表的样式和布局。\n\
    \n> **互动测验**\n\n本章附带一个免费的在线测验，以检查你的学习进度。你可以使用手机或电脑通过以下网址访问测验：\n\n[realpython.com/quizzes/python-basics-16](https://realpython.com/quizzes/python-basics-16)\n\
    \n## 附加资源\n\n掌握了本章的知识，你应该能够处理基本的数据数组并生成一些简单的图表。如果你的目标是使用Python进行数据科学或科学计算，你现在拥有了一些基础知识。为了进一步学习，你可能需要查看以下资源：\n\
    \n- Real Python数据科学教程\n- realpython.com上的推荐资源\n\n[为此部分提供反馈 »](Leave feedback on\
    \ this section »)\n\n# 第18章\n\n## 图形用户界面\n\n在整本书中，你一直在创建**命令行应用程序**，这些程序从终端窗口启动并在其中产生输出。\n\
    \n命令行应用程序对于制作你或其他开发者可能使用的工具来说很好，但绝大多数软件用户从不想打开终端！\n\n**图形用户界面**，简称**GUI**，发音为“gooey”，具有带有按钮和文本字段等组件的窗口。它们为用户提供了一种熟悉且直观的方式来与程序交互。\n\
    \n**在本章中，你将学习如何：**\n\n- 使用EasyGUI为命令行应用程序添加一个简单的GUI\n- 使用Tkinter创建功能齐全的GUI应用程序\n\
    \n让我们开始吧！\n\n[为此部分提供反馈 »](Leave feedback on this section »)"
