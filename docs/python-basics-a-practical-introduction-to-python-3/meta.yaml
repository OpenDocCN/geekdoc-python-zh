    a portion of Hans Christian Andersen''s *The Little Mermaid*.


    Each page in this PDF has two columns. Let''s split each page of this PDF into
    two pages, one for each column.


    To get started, import the `PdfFileReader` and `PdfFileWriter` classes from `PyPDF2`,
    and the `Path` class from the `pathlib` module:'
  - '[PAGE 433]


    # 14.5. Rotating and Cropping PDF Pages


    ```

    >>> from pathlib import Path

    >>> from PyPDF2 import PdfFileReader, PdfFileWriter

    ```


    Now create a `Path` object for the `half_and_half.pdf` file:


    ```

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "half_and_half.pdf"

    ... )

    ```


    Next, create a new `PdfFileReader` object and get the first page of the PDF:


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    >>> first_page = pdf_reader.getPage(0)

    ```


    In order to crop the page, you need to know a little bit more about how pages
    are structured. `PageObject` instances like `first_page` have an attribute `.mediaBox`
    that represents a rectangular area that defines the boundaries of a page.


    Let''s use IDLE''s interactive window to explore the `.mediaBox` before using
    it crop the page:


    ```

    >>> first_page.mediaBox

    RectangleObject([0, 0, 792, 612])

    ```


    Notice that the `.mediaBox` attribute returns a `RectangleObject`. This is an
    object defined in the `PyPDF2` package and represents a rectangular area on the
    page.


    You''ll notice the list `[0, 0, 792, 612]` of four numbers in the output. The
    first two numbers are the x- and y-coordinates of the lower left corner of the
    rectangle. The third number is the width of the rectangle, and the fourth number
    represents the height of the rectangle.'
- md: '## 14.5. Rotating and Cropping PDF Pages


    > **Note**

    > The width and height of a `RectangleObject` are defined in **points**. One point
    is equal to 1/72 inches.


    So `RectangleObject([0, 0, 792, 612])` represents a rectangular region with the
    lower left corner at the origin with a height of 792 points, or 11 inches, and
    a height of 612 points, or 8.5 inches. Those are the dimensions of a standard
    letter sized page.


    A `RectangleObject` has four attributes that return the coordinates of the rectangle''s
    corners: `.lowerLeft`, `.lowerRight`, `.upperLeft`, and `.upperRight`. Just like
    the width and height values, coordinates are also given in points.


    You can use these four properties to get the coordinates of each corner of the
    `RectangleObject`:


    ```

    >>> first_page.mediaBox.lowerLeft

    (0, 0)

    >>> first_page.mediaBox.lowerRight

    (792, 0)

    >>> first_page.mediaBox.upperLeft

    (0, 612)

    >>> first_page.mediaBox.upperRight

    (792, 612)

    ```


    Each property returns a `tuple` containing the coordinates of the specified corner.
    You can access individual coordinates with square brackets, just like you would
    any other Python tuple:


    ```

    >>> first_page.mediaBox.upperRight[0]

    792

    >>> first_page.mediaBox.upperRight[1]

    612

    ```


    You can alter the coordinates of a `mediaBox` by assigning a new tuple to one
    of its properties:


    ```

    >>> first_page.mediaBox.upperLeft = (0, 480)

    >>> first_page.mediaBox.upperLeft

    (0, 480)

    ```


    When you change the .upperLeft coordinates, the .upperRight attribute adjusts
    automatically so that a rectangular shape is preserved:


    ```

    >>> first_page.mediaBox.upperRight

    (792, 480)

    ```


    When you alter the coordinates of the RectangleObject returned by .mediaBox, you
    effectively crop the page. The first_page object now contains only the information
    present within the boundaries of the new RectangleObject.


    Go ahead and write the cropped page to a new PDF file:


    ```

    >>> pdf_writer = PdfFileWriter()

    >>> pdf_writer.addPage(first_page)

    >>> with Path("cropped_page.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    If you open the cropped_page.pdf file in your current working directory, you''ll
    see that the top portion of the page has been removed.


    How would you crop the page so that just the text on the left side of the page
    is visible? You need to cut the horizontal dimensions of the page in half. You
    can achieve this by altering the .upperRight coordinates of the .mediaBox object.
    Let''s see how that works.


    First you need to get new PdfFileReader and PdfFileWriter objects since we''ve
    just altered the first page in pdf_reader added it to pdf_writer:


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    >>> pdf_writer = PdfFileWriter()

    ```


    Now get the first page of the PDF:


    ```

    >>> first_page = pdf_reader.getPage(0)

    ```


    This time, let’s work with a copy of the first page so that the page you just
    extracted stays intact. You can do that by importing the `copy` module from Python’s
    standard library and using the `deepcopy()` function to make a copy of the page:


    ```

    >>> import copy

    >>> left_side = copy.deepcopy(first_page)

    ```


    Now we can alter `left_side` without changing the properties of `first_page`.
    That way we can use `first_page` later to extract the text on the right hand side
    of the page.


    Now you need to do a little bit of math. We already worked out that we need to
    move the upper right hand corner of the `.mediaBox` to the top center of the page.
    To do that, you’ll create a new `tuple` with the first component equal to half
    of the original value and assign it to the `.upperRight` property.


    First, get the current coordinates of the upper right corner of the `.mediaBox`.


    ```

    >>> current_coords = left_side.mediaBox.upperRight

    ```


    Then create a new `tuple` whose first coordinate is half the value of the current
    coordinate, and second coordinate is the same as the original:


    ```

    >>> new_coords = (current_coords[0] / 2, current_coords[1])

    ```


    Finally, assign the new coordinates to the `.upperRight` property:


    ```

    >>> left_side.mediaBox.upperRight = new_coords

    ```


    You’ve now cropped the original page to contain only the text on the left side!
    Let’s extract the right-hand side of the page next.


    First get a new copy of `first_page`:


    ```

    >>> right_side = copy.deepcopy(first_page)

    ```


    To crop the page to just the right-hand side, move the `.upperLeft` corner instead
    of the `.upperRight` corner:


    ```

    >>> right_side.mediaBox.upperLeft = new_coords

    ```


    This sets the upper left corner to the same coordinates that you moved the upper
    right corner to when extracting the left-hand side of the page. So, `right_side.mediaBox`
    is now a rectangle whose upper left corner is at the top center of the page, and
    upper right corner is at the top right of the page.


    Finally, add the `left_side` and `right_side` pages to `pdf_writer` and write
    them to a new PDF file:


    ```

    >>> pdf_writer.addPage(left_side)

    >>> pdf_writer.addPage(right_side)

    >>> with Path("cropped_pages.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    Now open the `cropped_pages.pdf` file with a PDF reader. You should see a file
    with two pages, the first containing the text from the left-hand side of the original
    first page, and the second containing the text from the original right-hand side.


    ## Review Exercises


    You can find the solutions to these exercises and many other bonus resources online
    at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).


    1.  In the Chapter 14 Practice Files folder there is a PDF called `split_and_rotate.pdf`.
    Create a new PDF called `rotated.pdf` in your home directory containing the pages
    of `split_and_rotate.pdf` rotated counterclockwise 90 degrees.

    2.  Using the `rotated.pdf` file you created in exercise 1, split each page of
    the PDF vertically in the middle. Create a new PDF called split.pdf in your home
    directory containing all of the split pages.


    split.pdf should have four pages with the numbers 1, 2, 3, and 4, in order.


    Leave feedback on this section »


    ## 14.6. Encrypting and Decrypting PDFs


    Sometimes PDF files are password protected. With the PyPDF2 package, you can work
    with encrypted PDF files, as well as add password protection to existing PDFs.


    ### PDF Encryption


    The .encrypt() method of a PdfFileWriter() instance is used to add password protection
    to a PDF file. It has two main parameters:


    1.  user_pwd for setting the user password. This allows for opening and reading
    the PDF file.

    2.  owner_pwd for setting the owner password. This allows for opening the PDF
    without any restrictions, including editing.


    Let''s use .encrypt() to add a password to a PDF file. First, let''s open the
    newsletter.pdf file in the Chapter 14 Practice Files directory:


    ```

    >>> from pathlib import Path

    >>> from PyPDF2 import PdfFileReader, PdfFileWriter

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "newsletter.pdf"

    ... )

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    ```


    Now create a new PdfFileWriter instance and add the pages from pdf_reader to it:


    ```

    >>> pdf_writer = PdfFileWriter()

    >>> pdf_writer.appendPagesFromReader(pdf_reader)

    ```


    Now we''ll add the password "SuperSecret" with the pdf_writer.encrypt() method:


    ```

    >>> pdf_writer.encrypt(user_pwd="SuperSecret")

    ```


    When you set only user_pwd, the owner_pwd argument defaults to the same string,
    so the above line of code sets both the user and owner passwords.


    Finally write the encrypted PDF to an output file called newsletter_protected.pdf
    in your home directory:


    ```

    >>> output_path = Path.home() / "newsletter_protected.pdf"

    >>> with output_path.open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ```


    When you open the PDF with a PDF reader software you''ll be prompted to enter
    a password. Enter "SuperSecret" to open the PDF.


    If you need to set a separate owner password for the PDF, pass a second string
    to the owner_pwd parameter. For example, the following sets the user password
    to "SuperSecret" and the owner password to "ReallySuperSecret":


    ```

    >>> pdf_writer.encrypt(user_pwd="SuperSecret", owner_pwd="ReallySuperSecret")

    ```


    ### PDF Decryption


    When you work with password-protected files programmatically, you need to decrypt
    them before you can access any of the contents.'
  mdcn: '## 14.5. 旋转与裁剪PDF页面


    > **注意**

    > `RectangleObject`的宽度和高度以**点**为单位定义。1点等于1/72英寸。


    因此，`RectangleObject([0, 0, 792, 612])`表示一个矩形区域，其左下角位于原点，高度为792点（即11英寸），宽度为612点（即8.5英寸）。这些是标准信纸尺寸页面的尺寸。


    `RectangleObject`有四个属性，分别返回矩形四个角的坐标：`.lowerLeft`、`.lowerRight`、`.upperLeft`和`.upperRight`。与宽度和高度值一样，坐标也以点为单位给出。


    你可以使用这四个属性来获取`RectangleObject`每个角的坐标：


    ```

    >>> first_page.mediaBox.lowerLeft

    (0, 0)

    >>> first_page.mediaBox.lowerRight

    (792, 0)

    >>> first_page.mediaBox.upperLeft

    (0, 612)

    >>> first_page.mediaBox.upperRight

    (792, 612)

    ```


    每个属性返回一个包含指定角坐标的`元组`。你可以像访问任何其他Python元组一样，使用方括号访问单个坐标：


    ```

    >>> first_page.mediaBox.upperRight[0]

    792

    >>> first_page.mediaBox.upperRight[1]

    612

    ```


    你可以通过为`mediaBox`的某个属性分配一个新的元组来更改其坐标：


    ```

    >>> first_page.mediaBox.upperLeft = (0, 480)

    >>> first_page.mediaBox.upperLeft

    (0, 480)

    ```


    当你更改`.upperLeft`坐标时，`.upperRight`属性会自动调整，以保持矩形形状：


    ```

    >>> first_page.mediaBox.upperRight

    (792, 480)

    ```


    当你更改`.mediaBox`返回的`RectangleObject`的坐标时，实际上就是在裁剪页面。`first_page`对象现在只包含新`RectangleObject`边界内的信息。


    现在，将裁剪后的页面写入一个新的PDF文件：


    ```

    >>> pdf_writer = PdfFileWriter()

    >>> pdf_writer.addPage(first_page)

    >>> with Path("cropped_page.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    如果你在当前工作目录中打开`cropped_page.pdf`文件，你会看到页面的顶部部分已被移除。


    如何裁剪页面，使得只显示页面左侧的文本？你需要将页面的水平尺寸减半。这可以通过更改`.mediaBox`对象的`.upperRight`坐标来实现。让我们看看这是如何工作的。


    首先，你需要获取新的`PdfFileReader`和`PdfFileWriter`对象，因为我们刚刚更改了`pdf_reader`中的第一页并将其添加到了`pdf_writer`中：


    ```

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    >>> pdf_writer = PdfFileWriter()

    ```


    现在获取PDF的第一页：


    ```

    >>> first_page = pdf_reader.getPage(0)

    ```


    这一次，让我们处理第一页的副本，这样你刚刚提取的页面就能保持完整。你可以通过从Python标准库导入`copy`模块并使用`deepcopy()`函数来复制页面来实现：


    ```

    >>> import copy

    >>> left_side = copy.deepcopy(first_page)

    ```


    现在我们可以更改`left_side`而不改变`first_page`的属性。这样我们以后就可以使用`first_page`来提取页面右侧的文本。


    现在你需要做一点数学计算。我们已经算出需要将`.mediaBox`的右上角移动到页面的顶部中心。为此，你需要创建一个新的`元组`，其第一个分量等于原始值的一半，并将其分配给`.upperRight`属性。


    首先，获取`.mediaBox`右上角的当前坐标。


    ```

    >>> current_coords = left_side.mediaBox.upperRight

    ```


    然后创建一个新的`元组`，其第一个坐标是当前坐标值的一半，第二个坐标与原始值相同：


    ```

    >>> new_coords = (current_coords[0] / 2, current_coords[1])

    ```


    最后，将新坐标分配给`.upperRight`属性：


    ```

    >>> left_side.mediaBox.upperRight = new_coords

    ```


    你现在已将原始页面裁剪为只包含左侧的文本！接下来让我们提取页面的右侧部分。


    首先获取`first_page`的新副本：


    ```

    >>> right_side = copy.deepcopy(first_page)

    ```


    要将页面裁剪为仅包含右侧部分，请移动`.upperLeft`角而不是`.upperRight`角：


    ```

    >>> right_side.mediaBox.upperLeft = new_coords

    ```


    这会将左上角设置为与提取左侧部分时移动右上角相同的坐标。因此，`right_side.mediaBox`现在是一个矩形，其左上角位于页面顶部中心，右上角位于页面右上角。


    最后，将`left_side`和`right_side`页面添加到`pdf_writer`，并将它们写入一个新的PDF文件：


    ```

    >>> pdf_writer.addPage(left_side)

    >>> pdf_writer.addPage(right_side)

    >>> with Path("cropped_pages.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    现在用PDF阅读器打开`cropped_pages.pdf`文件。你应该会看到一个包含两页的文件，第一页包含原始第一页左侧的文本，第二页包含原始右侧的文本。


    ## 复习练习


    你可以在[realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)在线找到这些练习的解答和许多其他额外资源。


    1.  在第14章练习文件文件夹中，有一个名为`split_and_rotate.pdf`的PDF文件。在你的主目录中创建一个名为`rotated.pdf`的新PDF文件，其中包含`split_and_rotate.pdf`的页面逆时针旋转90度。

    2.  使用你在练习1中创建的`rotated.pdf`文件，将PDF的每一页垂直从中间分割。在你的主目录中创建一个名为`split.pdf`的新PDF文件，其中包含所有分割后的页面。


    `split.pdf`应该有四页，按顺序包含数字1、2、3和4。


    对此部分提供反馈 »


    ## 14.6. 加密与解密PDF


    有时PDF文件是受密码保护的。使用PyPDF2包，你可以处理加密的PDF文件，也可以为现有的PDF添加密码保护。


    ### PDF加密


    `PdfFileWriter()`实例的`.encrypt()`方法用于为PDF文件添加密码保护。它有两个主要参数：


    1.  `user_pwd`用于设置用户密码。这允许打开和读取PDF文件。

    2.  `owner_pwd`用于设置所有者密码。这允许在没有任何限制的情况下打开PDF，包括编辑。


    让我们使用`.encrypt()`为PDF文件添加密码。首先，让我们打开第14章练习文件目录中的`newsletter.pdf`文件：


    ```

    >>> from pathlib import Path

    >>> from PyPDF2 import PdfFileReader, PdfFileWriter

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "newsletter.pdf"

    ... )

    >>> pdf_reader = PdfFileReader(str(pdf_path))

    ```


    现在创建一个新的`PdfFileWriter`实例，并将`pdf_reader`中的页面添加到其中：


    ```

    >>> pdf_writer = PdfFileWriter()

    >>> pdf_writer.appendPagesFromReader(pdf_reader)

    ```


    现在我们将使用`pdf_writer.encrypt()`方法添加密码"SuperSecret"：


    ```

    >>> pdf_writer.encrypt(user_pwd="SuperSecret")

    ```


    当你只设置`user_pwd`时，`owner_pwd`参数默认为相同的字符串，因此上面的代码行同时设置了用户密码和所有者密码。


    最后，将加密的PDF写入主目录中名为`newsletter_protected.pdf`的输出文件：


    ```

    >>> output_path = Path.home() / "newsletter_protected.pdf"

    >>> with output_path.open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ```


    当你用PDF阅读器软件打开PDF时，系统会提示你输入密码。输入"SuperSecret"以打开PDF。


    如果你需要为PDF设置单独的所有者密码，请向`owner_pwd`参数传递第二个字符串。例如，以下代码将用户密码设置为"SuperSecret"，所有者密码设置为"ReallySuperSecret"：


    ```

    >>> pdf_writer.encrypt(user_pwd="SuperSecret", owner_pwd="ReallySuperSecret")

    ```


    ### PDF解密


    当你以编程方式处理受密码保护的文件时，你需要先解密它们才能访问任何内容。'
