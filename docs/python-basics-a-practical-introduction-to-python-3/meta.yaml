    One of the more useful features of Beautiful Soup is the ability to search for
    specific kinds of tags whose attributes match certain values. For example, if
    we want to find all of the <img> tags that have a src attribute equal to the value
    /static/dionysus.jpg, you can provide the following additional argument to the
    .find_all() method:


