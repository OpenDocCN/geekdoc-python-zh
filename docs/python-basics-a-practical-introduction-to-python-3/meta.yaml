    You can delete text using the `Entry` widget''s `.delete()` method. `.delete()`
    takes an integer argument that tells it which character to remove. For example,
    `.delete(0)` deletes the first character from the `Entry`:


    ```

    >>> entry.delete(0)

    ```


    The text remaining in the widget is now "eal Python":


    ![](img/4efa9a991b645f75be61871447c559ca_567_0.png)


    > **Note**


    Just like Python string objects, text in an `Entry` widget is indexed starting
    with 0.


    If you need to remove several characters from an `Entry`, pass a second integer
    argument to `.delete()` indicating the index of the character where deletion should
    stop.


    For example, the following deletes the first four letters in the `Entry`:


    ```

    >>> entry.delete(0, 4)

    ```


    The remaining text now reads "Python":'
