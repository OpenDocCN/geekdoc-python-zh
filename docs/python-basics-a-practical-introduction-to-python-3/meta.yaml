  - '[PAGE 531]


    More often than not, you probably don''t want to have to sit at your computer
    and click on the save button for each plot you want to export. Fortunately, `matplotlib`
    makes it easy to save your plots programmatically.


    To save your plot, use the `plt.savefig()` function. Pass the path to where you
    would like to save your plot as a string. The example below saves a simple bar
    chart as `bar.png` to the current working directory. If you would like to save
    to somewhere else, you must provide an absolute path.


    ```

    from matplotlib import pyplot as plt

    import numpy as np


    xs = np.arange(1, 6)

    tops = np.arange(2, 12, 2)


    plt.bar(xs, tops)

    plt.savefig("bar.png")

    ```


    > **Note**


    If you want to both save a figure and display it on the screen, make sure that
    you save it first before displaying it!


    The `show()` function pauses execution of your code and closing the display window
    destroys the graph, so trying to save the figure after calling `show()` results
    in an empty file.


