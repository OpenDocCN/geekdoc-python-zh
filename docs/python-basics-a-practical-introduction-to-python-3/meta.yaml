    > **Note**


    WindowsPath and PosixPath objects share the same methods and attributes. From
    a programming standpoint, there is no difference between the two types of Path
    objects.


    The `Path.cwd()` class method returns a `Path` object representing the **current
    working directory**, or **CWD**. The current working directory is a dynamic reference
    to a directory that depends on where a process on the computer is currently working.


    When you run IDLE, the current working directory is usually set to the `Documents`
    directory in the current user''s home directory:


    ```

    >>> pathlib.Path.cwd()

    WindowsPath(r"C:\Users\David\Documents")

    ```


    This is not always the case, though. Moreover, the current working directory may
    change during the lifetime of a program.


    `Path.cwd()` is useful, but be careful when you use it. When you do, make sure
    you know that the current working directory refers the directory that you expect
    it to.


    # Using the / Operator


    If you have an existing `Path` object, you can use the `/` operator to extend
    the path with subdirectories or file names.


    For example, the following creates a `Path` object representing a file named `hello.txt`
    in the `Documents` subdirectory of the current user''s home directory:


    ```

    >>> home / "Desktop" / "hello.txt"

    WindowsPath(''C:/Users/David/Desktop/hello.txt'')

    ```


    The `/` operator must always have a `Path` object on the left hand side. The right
    hand side can have either string representing a single file or directory, or a
    string representing a path, or another `Path` object.'
