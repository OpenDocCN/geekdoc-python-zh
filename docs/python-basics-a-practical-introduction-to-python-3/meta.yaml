    # Widget Naming Conventions


    When you create a widget you can give it any name you like as long as it is a
    valid Python identifier. It is usually a good idea, though, to include the name
    of the widget class in the variable name you assign to the widget instance.


    For example, if a `Label` widget is used to display a user''s name, you might
    name the widget `label_user_name`. An `Entry` widget used to collect a user''s
    age might be called `entry_age`.


    When you include the widget class name in the variable name, you help yourself
    and anyone else that needs to read your code understand what type of widget to
    which the variable name refers.'
