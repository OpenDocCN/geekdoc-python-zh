  md: '# Reading csv Files With csv.reader


    To read a csv file with the csv module, use the csv.reader class. Like csv.writer
    objects, csv.reader objects are instantiated from a file object:


    ```

    >>> file = file_path.open(mode="r", encoding="utf-8")

    >>> reader = csv.reader(file)

    ```


    csv.reader() returns a csv reader object that can be used to iterate over the
    rows of the csv file:


    ```

    >>> for row in reader:

    ...     print(row)

    ...

    [''68'', ''65'', ''68'', ''70'', ''74'', ''72'']

    [''67'', ''67'', ''70'', ''72'', ''72'', ''70'']

    [''68'', ''70'', ''74'', ''76'', ''74'', ''73'']

    >>> file.close()

    ```


    Each row of the csv file is returned as a list of strings. To recover the daily_temperatures
    list of lists, you''ll need to convert each list of strings to a list of integers
    using a list comprehension.


    Here''s a full example using that open the csv file in a with statement, reads
    each row in the csv file, converts the list of strings to a list of integers,
    and stores each list of integers in a list of lists called daily_temperatures:


    ```

    >>> # Create an empty list

    >>> daily_tempraturees = []

    >>> with file_path.open(mode="r", encoding="utf-8") as file:

    ...     reader = csv.reader(file)

    ...     for row in reader:

    ...         # Convert row to list of integers

    ...         int_row = [int(value) for value in row]

    ...         # Append the list of integers to daily_temperatures list

    ...         daily_temperatures.append(int_row)

    ```'
