    \ contains a `program.py` file and a `data.txt` file. The `photos/` directory\
    \ also has two subdirectories, `cats/` and `dogs/`, that both contains two image\
    \ files.\n\n# File Paths\n\nTo locate a file in a file system, you can list the\
    \ directories in order, starting with the root directory, followed by the name\
    \ of the file. A"
