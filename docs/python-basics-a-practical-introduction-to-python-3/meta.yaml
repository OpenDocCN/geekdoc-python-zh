    The string "#result" passed to `.select()` uses the CSS ID selector `#` to indicate
    result is an id value.


    To periodically get a new result, you''ll need to create a loop that loads the
    page at each step of the loop. So everything below the line `browser = mechanicalsoup.Browser()`
    in the above script needs to go in the body of the loop.


