    # 4.6 Working With Strings and Numbers


    When you get user input using the `input()` function, the result is always a string.
    There are many other times when input is given to a program as a string. Sometimes
    those strings contain numbers that need to be fed into calculations.


    In this section you will learn how to deal with strings of numbers. You will see
    how arithmetic operations work on strings, and how they often lead to surprising
    results. You will also learn how to convert between strings and number types.


    # Strings and Arithmetic Operators


    You''ve seen that string objects can hold many types of characters, including
    numbers. However, don''t confuse numerals in a string with actual numbers. For
    instance, try this bit of code out in IDLE''s interactive window:


    ```

    >>> num = "2"

    >>> num + num

    ''22''

    ```


    The `+` operator concatenates two string together. So, the result of `"2" + "2"`
    is `"22"`, not `"4"`.


    Strings can be "multiplied" by a number as long as that number is an integer,
    or whole number. Type the following into the interactive window:


    ```

    >>> num = "12"

    >>> num * 3

    ```'
