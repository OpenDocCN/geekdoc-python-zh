    \ 文件：\n\n```python\n>>> writer.writerows(people)\n>>> file.close()\n```\n\n你现在在你的主目录中有一个名为\
    \ `people.csv` 的文件，包含以下数据：\n\n```\nname,age\nVeronica,29\nAudrey,32\nSam,24\n\
    ```\n\nCSV 文件是一种灵活且方便的数据存储方式。它们在全球商业中被频繁使用，知道如何处理它们是一项宝贵的技能！\n\n## 复习练习\n\n你可以在\
