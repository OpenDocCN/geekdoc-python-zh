- md: "Notice that not only is there no `connection.close()`, you also don't have\
    \ to type `connection.commit()`. That's because any changes made to the database\
    \ are automatically committed when the `with` block is done executing. This is\
    \ another advantage to using a `with` statement to manage your database connection.\n\
    \n## Executing Multiple SQL Statements\n\nIf you want to run more than one SQL\
    \ statement at a time, you have a couple of options. One simple option is to use\
    \ the `.executescript()` cursor method and give it a string that represents a\
    \ full SQL script. Although semicolons separate lines of SQL code, it's common\
    \ to pass a multiline string for readability. The following script does the same\
    \ thing as the script you wrote at the beginning of this section:\n\n```python\n\
    import sqlite3\n\nwith sqlite3.connect(\"test_database.db\") as connection:\n\
    \    cursor = connection.cursor()\n    cursor.executescript(\n        \"\"\"DROP\
    \ TABLE IF EXISTS People;\n        CREATE TABLE People(\n            FirstName\
    \ TEXT,\n            LastName TEXT,\n            Age INT\n        );\n       \
    \ INSERT INTO People VALUES(\n            'Ron',\n            'Obvious',\n   \
    \         '42'\n        );\"\"\"\n    )\n```\n\nYou can also execute many similar\
    \ statements by using the `.executemany()` method and supplying a tuple of tuples,\
    \ where each inner tuple supplies the information for a single command. For instance,\
    \ if you have a lot of people’s information to insert into our People table, you\
    \ can save this information in the following tuple of tuples:\n\n```python\npeople_values\
    \ = (\n    (\"Ron\", \"Obvious\", 42),\n    (\"Luigi\", \"Vercotti\", 43),\n \
    \   (\"Arthur\", \"Belling\", 28)\n)\n```\n\nYou can then insert all of these\
    \ people at once in a single line of code:\n\n```python\ncursor.executemany(\"\
    INSERT INTO People VALUES(?, ?, ?)\", people_values)\n```\n\nHere, the question\
    \ marks act as place-holders for the tuples in `people_values`. This is called\
    \ a **parameterized statement**. You may notice some similarity to this and formatting\
    \ strings with the `.format()` string method you learned about in Chapter 4.\n\
    \n## Avoid Security Issues With Parametrized Statements\n\nFor security reasons,\
    \ especially when you need to interact with a SQL table based on the user input,\
    \ you should *always* use parameterized SQL statements. This is because the user\
    \ could potentially supply a value that looks like SQL code and causes your SQL\
    \ statement to behave in unexpected ways. This is called a SQL injection attack\
    \ and, even if you aren’t dealing with a malicious user, it can happen entirely\
    \ by accident.\n\nFor instance, suppose you want to insert a person into the People\
    \ table based on user-supplied information. You might initially try something\
    \ like the following:\n\n```python\nimport sqlite3\n\n# Get person data from user\n\
    first_name = input(\"Enter your first name: \")\nlast_name = input(\"Enter your\
    \ last name: \")\nage = int(input(\"Enter your age: \"))\n\n# Execute insert statement\
    \ for supplied person data\nwith sqlite3.connect(\"test_database.db\") as connection:\n\
    \    cursor = connection.cursor()\n    cursor.execute(\n        f\"INSERT INTO\
    \ People Values('{first_name}', '{last_name}', {age});\"\n    )\n```\n\nWhat if\
    \ the user's name includes an apostrophe? Try adding Flannery O'Connor to the\
    \ table, and you'll see that she breaks the code. This is because the apostrophe\
    \ gets mixed up with the single quotes in the line, making it appear to the database\
    \ that the SQL code ends earlier than expected.\n\nIn this case, the code only\
    \ causes an error, which is bad enough. In some cases, though, bad input can corrupt\
    \ an entire table. Many other hard-to-predict cases can break SQL tables, and\
    \ even delete portions of your database. To avoid this, you should always use\
    \ parameterized statements.\n\nThe following script does the same thing as the\
    \ script above, but uses a parametrized statement to insert the user input into\
    \ the database:\n\n```python\nimport sqlite3\n\nfirst_name = input(\"Enter your\
    \ first name: \")\nlast_name = input(\"Enter your last name: \")\nage = int(input(\"\
    Enter your age: \"))\ndata = (first_name, last_name, age)\n\nwith sqlite3.connect(\"\
    test_database.db\") as connection:\n    cursor = connection.cursor()\n    cursor.execute(\"\
    INSERT INTO People VALUES(?, ?, ?);\", data)\n```\n\nYou can update the content\
    \ of a row by using a parametrized SQL UPDATE statement. For instance, if you\
    \ want to change the Age associated with someone already in our People table,\
    \ you could use the following:\n\n```python\ncursor.execute(\n    \"UPDATE People\
    \ SET Age=? WHERE FirstName=? AND LastName=?;\",\n    (45, 'Luigi', 'Vercotti')\n\
    )\n```\n\n## Retrieving Data\n\nOf course, inserting and updating information\
    \ in a database isn't all that helpful if you can't fetch that information from\
    \ the database. To fetch data from a database, you can use the `.fetchone()` and\
    \ `.fetchall()` cursor methods. These are similar to the `.readline()` and `.readlines()`\
    \ methods for reading lines from a file. `.fetchone()` returns a single row from\
    \ query results, while `.fetchall()` retrieves all of the results of a query at\
    \ once.\n\nThe following script illustrates how to use `.fetchall()`:\n\n```python\n\
    import sqlite3\n\nvalues = (\n    (\"Ron\", \"Obvious\", 42),\n    (\"Luigi\"\
    , \"Vercotti\", 43),\n    (\"Arthur\", \"Belling\", 28),\n)\n\nwith sqlite3.connect(\"\
    test_database.db\") as connection:\n    cursor = connection.cursor()\n    cursor.execute(\"\
    DROP TABLE IF EXISTS People\")\n    cursor.execute(\n        \"\"\"CREATE TABLE\
    \ People(\n            FirstName TEXT,\n            LastName TEXT,\n         \
    \   Age INT\n        )\"\"\"\n    )\n    cursor.executemany(\"INSERT INTO People\
    \ VALUES(?, ?, ?);\", values)\n\n    # Select all first and last names from people\
    \ over age 30\n    cursor.execute(\n        \"SELECT FirstName, LastName FROM\
    \ People WHERE Age > 30;\"\n    )\n    for row in cursor.fetchall():\n       \
    \ print(row)\n```\n\nIn the script above, you first drop the `People` table to\
    \ destroy the changes made in the previous examples in this section. Then you\
    \ create the `People` table and insert several values into it. Next, a SELECT\
    \ statement is executed that returns the first and last names of all people over\
    \ the age of 30.\n\nFinally, `.fetchall()` returns the results of a query as a\
    \ list of tuples, where each tuple contains the data from a single row in the\
    \ query results. The output of the script looks like this:\n\n```\n('Ron', 'Obvious')\n\
    ('Luigi', 'Vercotti')\n```\n\n## Review Exercises\n\nYou can find the solutions\
    \ to these exercises and many other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n1.  Create a new database with a table named `Roster` that has three fields:\
    \ `Name`, `Species` and `IQ`. The `Name` and `Species` columns should be text\
    \ fields, and the `IQ` column should be an integer field.\n2.  Populate your new\
    \ table with the following values:\n\n| Name | Species | IQ |\n| :--- | :--- |\
    \ :--- |\n| Jean-Baptiste Zorg | Human | 122 |\n| Korben Dallas | Meat Popsicle\
    \ | 100 |\n| Ak'not | Mangalore | -5 |\n\n3.  Update the Species of Korben Dallas\
    \ to be Human.\n4.  Display the names and IQs of everyone in the table classified\
    \ as Human.\n\nLeave feedback on this section »\n\n## 15.2 Libraries for Working\
    \ With Other SQL Databases\n\nIf you have a particular type of SQL database that\
    \ you'd like to access through Python, most of the basic syntax is likely to be\
    \ identical to what you just learned for SQLite. However, you'll need to install\
    \ an additional package to interact with your database since SQLite is the only\
    \ built-in option.\n\nThere are many SQL variants and corresponding Python packages\
    \ available. A few of the most commonly used and reliable open-source alternatives\
    \ to SQLite are:\n\n-   pyodbc, which connects to ODBC (Open Database Connection)\
    \ databases, such as Microsoft SQL Server\n-   psycopg2, which connects to the\
    \ PostgreSQL database\n-   PyMySQL, which connects to MySQL databases\n\nOne difference\
    \ between SQLite and other databases—besides the actual syntax of the SQL code,\
    \ which changes slightly with most flavors of SQL—is that most databases require\
    \ a username and password to connect. Check the documentation for the particular\
    \ package you want to use to for the syntax for making a database connection.\n\
    \nThe SQLAlchemy package is another popular option for working with databases.\
    \ SQLAlchemy is an object-relational mapping, or ORM,"
