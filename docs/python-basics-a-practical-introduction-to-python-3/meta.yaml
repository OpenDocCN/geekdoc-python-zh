    通常，你只需要从 HTML 文档中获取特定文本。使用 Beautiful Soup 先提取文本，然后使用 `.find()` 字符串方法，*有时*比使用正则表达式更容易。


    然而，有时 HTML 标签本身就是指向你要检索的数据的元素。例如，也许你想检索页面上所有图片的 URL。这些链接包含在 `<img>` HTML 标签的 `src`
    属性中。在这种情况下，你可以使用 `find_all()` 方法返回该特定标签的所有实例列表：


    ```python

    >>> soup.find_all("img")

    [<img src="/static/dionysus.jpg"/>, <img src="/static/grapes.png"/>]

    ```


    这将返回 HTML 文档中所有 `<img>` 标签的列表。列表中的对象看起来像是表示标签的字符串，但它们实际上是 Beautiful Soup 提供的 `Tag`
    对象的实例。`Tag` 对象提供了一个简单的接口来处理它们包含的信息。


    让我们通过首先从列表中解包 `Tag` 对象来进一步探索：


    ```python

    >>> image1, image2 = soup.find_all("img")

    ```


    每个 `Tag` 对象都有一个 `.name` 属性，返回包含 HTML 标签类型的字符串：


    ```python

    >>> image1.name

    ''img''

    ```


    你可以通过将属性名放在方括号之间来访问 `Tag` 对象的 HTML 属性，就像属性是字典中的键一样。


    例如，<img src="/static/dionysus.jpg"/> 标签有一个属性 `src`，其值为 `dionysus.jpg`。同样，像链接 <a
    href="https://realpython.com" target="_blank"> 这样的 HTML 标签有两个属性，`href` 和 `target`。


    要获取 Dionysus 个人资料页面中图片的源，你可以使用上面提到的字典表示法访问 `src` 属性：


    ```python

    >>> image1["src"]

    ''/static/dionysus.jpg''


    >>> image2["src"]

    ''/static/grapes.png''

    ```


    HTML 文档中的某些标签可以通过 `Tag` 对象的属性访问。例如，要获取文档中的 `<title>` 标签，你可以使用 `.title` 属性：


    ```python

    >>> soup.title

    <title>Profile: Dionysus</title>

    ```


    如果你通过导航到 URL http://olympus.realpython.org/profiles/dionysus，右键单击页面并选择“查看页面源代码”来查看
    Dionysus 个人资料的源代码，你会注意到文档中写的 `<title>` 标签如下所示：


    ```html

    <title >Profile: Dionysus<|title|>

    ```


    Beautiful Soup 会自动为你清理标签，移除开始标签中的多余空格和结束标签中多余的 `/`。


    你也可以使用 `Tag` 对象的 `.string` 属性仅检索标题标签中的字符串：


    ```python

    >>> soup.title.string

    ''Profile: Dionysus''

    ```


    Beautiful Soup 更有用的功能之一是能够搜索属性匹配特定值的特定类型的标签。例如，如果我们想找到所有 `src` 属性等于值 `/static/dionysus.jpg`
    的 `<img>` 标签，你可以向 `.find_all()` 方法提供以下附加参数：


    ```python

    >>> soup.find_all("img", src="/static/dionysus.jpg")

    [<img src="/static/dionysus.jpg"/>]

    ```


    这个例子有些随意，这项技术的有用性可能从这个例子中并不明显。如果你花些时间浏览各种网站并查看它们的页面源代码，你会注意到许多网站的 HTML 结构极其复杂。


    从网站抓取数据时，你通常对页面的特定部分感兴趣。通过花些时间浏览 HTML 文档，你可以识别具有唯一属性的标签，这些标签可用于提取你需要的数据。


    然后，与其依赖复杂的正则表达式或使用 `.find()` 在文档中搜索，不如直接访问你感兴趣的特定标签并提取你需要的数据。


    在某些情况下，你可能会发现 Beautiful Soup 没有提供你需要的功能。`lxml` 库入门稍微复杂一些，但在解析 HTML 文档方面比 Beautiful
    Soup 提供了更大的灵活性。一旦你熟悉了使用 Beautiful Soup，你可能想看看它。


    > **注意**


    像 Beautiful Soup 这样的 HTML 解析器可以在网页中定位特定数据时为你节省大量时间和精力。然而，有时 HTML 编写得非常糟糕且杂乱无章，即使是像
    Beautiful Soup 这样复杂的解析器也无法正确解释 HTML 标签。


    在这种情况下，你通常只能依靠自己（即 `.find()` 和正则表达式）来尝试解析出你需要的信息。


    ## 复习练习


    你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)
    找到这些练习的解决方案和许多其他额外资源。


    1.  编写一个脚本，从页面 [http://olympus.realpython.org/profiles](http://olympus.realpython.org/profiles)
    获取完整的 HTML。

    2.  使用 Beautiful Soup 通过查找名为 `a` 的 HTML 标签并检索每个标签的 `href` 属性值，解析出页面上所有链接的列表。

    3.  通过将完整路径添加到文件名，获取列表中每个页面的 HTML，并使用 Beautiful Soup 的 `.get_text()` 方法显示每个页面上的文本（不含
