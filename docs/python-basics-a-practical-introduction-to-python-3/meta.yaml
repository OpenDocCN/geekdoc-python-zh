  md: '# Similarities Between Tuples and Strings


    Tuples and strings have a lot in common. Both are sequence types with a finite
    length, support indexing and slicing, are immutable, and can be iterated over
    in a loop.


    The main difference between strings and tuples is that the elements of tuples
    can be any kind of value you like, whereas strings can only contain characters.


    Let''s look at some of the parallels between strings in tuples in more depth.


    # Tuples Have a Length


    Both strings and tuples have a **length**. The length of a string is the number
    of characters in it. The length of a tuple is the number of elements it contains.


    Just like strings, the `len()` function can be used to determine the length of
    a tuple:


    ```

    >>> numbers = (1, 2, 3)

    >>> len(numbers)

    3

    ```


    # Tuples Support Indexing and Slicing


    Recall from Chapter 4 that you can access a character in a string using index
    notation:


    ```

    >>> name = "David"

    >>> name[1]

    ''a''

    ```


    The index notation `[1]` after the variable `name` tells Python to get the character
    at index 1 in the string "David". Since counting starts at 0, the character at
    index 1 is the letter "a".


    Tuples also support index notation:'
