    \ accessed from the `adder` namespace."
- md: "## 11.1. Working With Modules\n\nA **namespace** is a collection of names,\
    \ such as variable names, function names, and class names. Every Python module\
    \ has its own namespace.\n\nVariables, functions, and classes in a module can\
    \ be accessed from within the same module by just typing their name. That's how\
    \ you've been doing it throughout this book so far. However, this doesn't work\
    \ for imported modules.\n\nTo access a name in an imported module from the calling\
    \ module, type the imported module's name followed by a dot (.) and the name you\
    \ want to use:\n\n```\n<module>.<name>\n```\n\nFor instance, to use the `add()`\
    \ function in the `adder` module, you need to type `adder.add()`.\n\n> **Important**\n\
    \nThe name used to import a module is the same as the module's file name.\n\n\
    For this reason, module file names must be valid Python identifiers. That means\
    \ they may only contain upper and lower case letters, numbers, and underscores\
    \ (_), and they may not start with a digit.\n\nNow update the code in `main.py`\
    \ as follows:\n\n```\n# main.py\n\nimport adder\n\nvalue = adder.add(2, 2)  #\
    \ <-- Change this line\nprint(value)\n```\n\nSave the file and run the module.\
    \ The value 4 is printed in the interactive window.\n\nWhen you type `import <module>`\
    \ at the beginning of a file, the module's entire namespace is imported. Any new\
    \ variables or functions added to `adder.py` will be accessible in `main.py` without\
    \ having to import anything new.\n\nOpen the script window for `adder.py` and\
    \ add the following function below `add()`:\n\n```\n# adder.py\n\n# Leave this\
    \ code unchanged\ndef add(x, y):\n    return x + y\n\ndef double(x):  # <-- Add\
    \ this function\n    return x + x\n```\n\nSave the file. Then open the script\
    \ window for `main.py` and add the following code:\n\n```\n# main.py\n\nimport\
    \ adder\n\nvalue = adder.add(2, 2)\ndouble_value = adder.double(value)  # <--\
    \ Add this line\nprint(double_value)  # <-- Change this line\n```\n\nNow save\
    \ and run `main.py`. When the module runs, the value 8 is displayed in the interactive\
    \ window. Since `double()` already exists in the adder namespace, no `NameError`\
    \ is raised.\n\n## Import Statement Variations\n\nThe `import` statement is flexible.\
    \ There are two variations that you should know about:\n\n1. `import <module>\
    \ as <other_name>`\n2. `from <module> import <name>`\n\nLet's look at each of\
    \ these variations in detail.\n\n### import <module> as <other_name>\n\nYou can\
    \ change the name of an import using the as keyword:\n\n```\nimport <module> as\
    \ <other_name>\n```\n\nWhen you import a module this way, the module's namespace\
    \ is accessed through `<other_name>` instead of `<module>`.\n\nFor example, change\
    \ the `import` statement in `main.py` to the following:\n\n```\nimport adder as\
    \ a  # <-- Change this line\n\n# Leave the code below unchanged\nvalue = adder.add(2,\
    \ 2)\ndouble_value = adder.double(value)\nprint(double_value)\n```\n\nSave the\
    \ file and press `F5`. A `NameError` is raised:\n\n```\nTraceback (most recent\
    \ call last):\n  File \"//Mac/Home/Documents/myproject/main.py\", line 3, in <module>\n\
    \    value = adder.add(2, 2)\nNameError: name 'adder' is not defined\n```\n\n\
    The `adder` name is no longer recognized because the module has been imported\
    \ with the name `a` instead of `adder`.\n\nTo make `main.py` work, you need to\
    \ replace `adder.add()` and `adder.double()` with `a.add()` and `a.double()`:\n\
    \n```\nimport adder as a\n\nvalue = a.add(2, 2)  # <-- Change this line\ndouble_value\
    \ = a.double(value)  # <-- Change this line, too\nprint(double_value)\n```\n\n\
    Now save the file and run the module. No NameError is raised and the value 8 is\
    \ displayed in the interactive window.\n\n### from <module> import <name>\n\n\
    Instead of importing the entire namespace, you can import only a specific name\
    \ from a module. To do this, replace the import statement with the following:\n\
    \n```\nfrom <module> import <name>\n```\n\nFor example, in main.py, change the\
    \ import statement to the following:\n\n```\nfrom adder import add  # <-- Change\
    \ this line\n\nvalue = adder.add(2, 2)\ndouble_value = adder.double(2, 2)\nprint(double_value)\n\
    ```\n\nSave the file and press F5. A NameError exception is raised:\n\n```\nTraceback\
    \ (most recent call last):\n  File \"//Documents/myproject/main.py\", line 3,\
    \ in <module>\n    value = adder.add(2, 2)\nNameError: name 'adder' is not defined\n\
    ```\n\nThe above traceback tells you that the name adder is undefined. Only the\
    \ name add is imported from adder.py and is placed in the main.py module's local\
    \ namespace. That means you can use add() without having to type adder.add().\n\
    \nReplace adder.add() and adder.double() in main.py with add() and double():\n\
    \n```\nfrom adder import add\n\nvalue = add(2, 2)  # <-- Change this line\ndouble_value\
    \ = double(value)  # <-- Change this line, too\nprint(double_value)\n```\n\nNow\
    \ save the file and run the module. What do you think happens?\n\nAnother NameError\
    \ is raised:\n\n```\nTraceback (most recent call last):\n  File \"//Documents/myproject/main.py\"\
    , line 4, in <module>\n    double_value = double(value)\nNameError: name 'double'\
    \ is not defined\n```\n\nThis time, the NameError tells you that the name double\
    \ isn't defined, which proves that only the add name was imported from the adder\
    \ module.\n\nYou can import the double name by adding it to the import statement\
    \ in main.py:\n\n```\nfrom adder import add, double  # <-- Change this line\n\n\
    # Leave the code below unchanged\nvalue = add(2, 2)\ndouble_value = double(value)\n\
    print(double_value)\n```\n\nSave and run the module. Now the module runs without\
    \ producing a NameError. The value 8 is displayed in the interactive window.\n\
    \n## Summary of Import Statements\n\nThe following table summarizes what you've\
    \ learned about importing modules:\n\n| Import Statement | Result |\n| :--- |\
    \ :--- |\n| `import <module>` | Import all of `<module>`'s namespace into the\
    \ name `<module>`. Imported module names can be accessed from the calling module\
    \ with `<module>.<name>`. |\n| `import <module> as <other_name>` | Import all\
    \ of `<module>`'s namespace into the name `<other_name>`. Imported module names\
    \ can be accessed from the calling module with `<other_name>.<name>`. |\n| `from\
    \ <module> import <name1>, <name2>, ...` | Import only the names `<name1>`, `<name2>`,\
    \ etc, from `<module>`. The names are added to the calling module's local namespace\
    \ and can be accessed directly. |\n\nSeparate namespaces are one of the great\
    \ advantages of dividing code into individual modules, so let's take some time\
    \ to explore why namespaces matter and why you should care about them.\n\n## Why\
    \ Use Namespaces?\n\nSuppose every person on the entire planet is given an ID\
    \ number. In order to distinguish one person from the next, each ID number needs\
    \ to be unique. We'll need a whole bunch of ID numbers to make that work!\n\n\
    The world is divided into countries, and we can group people by their country\
    \ of birth. If we assign each country a unique code, we can include that code\
    \ in a person's ID number. For example, a person from the United States might\
    \ have an ID of `US-357`, and a person from Great Britain might have an ID of\
    \ `GB-246`.\n\nTwo people from different countries can now have the same ID number.\
    \ We can distinguish them because their ID's begin with different country codes.\
    \ Every person from the same country must have a unique ID number, but we no longer\
    \ need globally unique ID numbers.\n\nThe country codes in this scenario are examples\
    \ of **namespaces**, and illustrate three of the main reasons namespaces are used:\n\
    \n1. They **group** names into logical containers\n2. They **prevent clashes**\
    \ between duplicate names\n3. They **provide context** to names\n\nNamespaces\
    \ in code provide the same advantages.\n\nYou have seen three different ways to\
    \ import a module into another one. Keeping in mind the advantages namespaces\
    \ give you can help you determine which kind of `import` statement makes the most\
    \ sense.\n\nIn general, `import <module>` is the preferred way to import a module\
    \ because it keeps the imported module's namespace completely separate from the\
    \ calling module's namespace. Moreover, every name from the imported module is\
    \ accessed from the calling module with the `<module>.<name>` format, which immediately\
    \ tells you which module the name originates in.\n\nThere are two reasons you\
    \ might use the `import <module> as <other_name>` format:\n\n1. The module name\
    \ is long and you wish to import an abbreviated version of it\n2. The module name\
    \ clashes with an existing name in the calling module\n\n`import <module> as <other_name>`\
    \ still keeps the imported module's namespace separate from the calling module's\
    \ namespace. The tradeoff is that the name you give the module might not be as\
    \ easily recognizable as the original module name.\n\nImporting specific names\
    \ from a module is generally the least preferred way to import code from a module.\
    \ The imported names are added directly to the calling module's namespace, completely\
    \ removing them from the context of the calling module."
  mdcn: "## 11.1. 使用模块\n\n**命名空间**是名称的集合，例如变量名、函数名和类名。每个 Python 模块都有自己的命名空间。\n\n模块中的变量、函数和类可以通过直接输入其名称从同一模块内部访问。到目前为止，你在本书中一直就是这样做的。然而，这对于导入的模块并不适用。\n\
