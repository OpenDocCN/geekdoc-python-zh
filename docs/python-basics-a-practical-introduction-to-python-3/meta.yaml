    # main.py\n```\n\nNow press `Ctrl` + `S` and save the file as `main.py` in the\
    \ `packages_example/` folder you created earlier.\n\nOpen another script window\
    \ by pressing `Ctrl` + `N`. Insert the following at the top of the file:\n\n```python\n\
    # __init__.py\n```\n\nThen save the file as `__init__.py` in the `mypackage/`\
    \ subfolder of your `packages_example` folder.\n\nFinally, create two more script\
    \ windows. Save these files as `module1.py` and `module2.py`, respectively, in\
    \ your `mypackage/` folder, and insert comments at the top of each file containing\
    \ the file name.\n\nWhen you are done, you should have five IDLE windows open:\
    \ the interactive window and four script windows. You can arrange your screen\
    \ to look something like this:\n\n![Package structure in IDLE](img/4efa9a991b645f75be61871447c559ca_318_0.png)\n\
    \nNow that we've created the package structure, let's add some code. In the `module1.py`\
    \ file, add the following function:\n\n```python\n# module1.py\n\ndef greet(name):\n\
    \    print(f\"Hello, {name}!\")\n```\n\nIn the `module2.py` file add the following:\n\
    \n```python\ndef depart(name):\n    print(f\"Goodbye, {name}!\")\n```\n\nMake\
    \ sure you save both of the `module1.py` and `module2.py` files! You're now ready\
    \ to import and use these modules in the `main.py` module.\n\n### Importing Modules\
    \ From Packages\n\nIn your `main.py` file, add the following code:\n\n```python\n\
    # main.py\n\nimport mypackage\n\nmypackage.module1.greet(\"Pythonista\")\nmypackage.module2.depart(\"\
    Pythonista\")\n```\n\nSave `main.py` and press `F5` to run the module. In the\
    \ interactive window, an `AttributeError` is raised:\n\n```\nTraceback (most recent\
    \ call last):\n  File \"\\MacHomeDocumentspackages_examplemain.py\", line 5, in\
    \ <module>\n    mypackage.module1.greet(\"Pythonista\")\nAttributeError: module\
    \ 'mypackage' has no attribute 'module1'\n```\n\nWhen you import the `mypackage`\
    \ module, the `module1` and `module2` namespaces are not imported automatically.\
    \ In order to use them, you need to import them as well.\n\nChange the import\
    \ statement at the top of the `main.py`:\n\n```python\n# main.py\n\nimport mypackage.module1\
    \  # <-- Change this line\n\n# Leave the below code unchanged\nmypackage.module1.greet(\"\
    Pythonista\")\nmypackage.module2.depart(\"Pythonista\")\n```\n\nNow save and run\
    \ the `main.py` module. You should see the following output in the interactive\
    \ window:\n\n```\nHello, Pythonista!\nTraceback (most recent call last):\n  File\
    \ \"\\MacHomeDocumentspackages_examplemain.py\", line 6, in <module>\n    mypackage.module2.depart(\"\
    Pythonista\")\nAttributeError: module 'mypackage' has no attribute 'module2'\n\
    ```\n\nYou can tell that `mypackage.module1.greet()` was called because `Hello,\
    \ Pythonista!` is displayed in the interactive window.\n\nHowever, `mypackage.module2.depart()`\
    \ was not called. That line raised an attribute error because the only module\
