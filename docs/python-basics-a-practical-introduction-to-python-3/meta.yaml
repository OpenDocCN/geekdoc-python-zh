- md: "## 12.6 Read and Write CSV Data\n\nSuppose you had a temperature sensor in\
    \ your house that records the temperature every four hours. Over the course of\
    \ a day, six temperature readings are taken.\n\nYou can store each temperature\
    \ reading in a list:\n\n```\n>>> temperature_readings = [68, 65, 68, 70, 74, 72]\n\
    ```\n\nEach day a new list of numbers is generated. To store these values to a\
    \ file, you can write the values from each day on a new line in a text file and\
    \ separate each value with a comma.\n\n```\n>>> from pathlib import Path\n>>>\
    \ file_path = Path.home() / \"temperatures.txt\"\n>>> with file_path.open(mode=\"\
    a\", encoding=\"utf-8\") as file:\n...     file.write(str(temperature_readings[0]))\n\
    ...     for temp in temperature_readings[1:]:\n...         file.write(f\",{temp}\"\
    )\n...\n```\n\nThis creates a file called `temperatures.csv` in your home directory\
    \ and opens it in append mode. On a new line at the end of the file, the first\
    \ value in the `temperature_readings` list is written to the file. Then each remaining\
    \ value in the list is written, preceded by a comma, to the same line.\n\nThe\
    \ final string of text written to the file is \"68,65,68,70,74,72\". You can verify\
    \ this by reading the text:\n\n```\n>>> with file_path.open(mode=\"r\", encoding=\"\
    utf-8\") as file:\n...     text = file.read()\n...\n>>> text\n'68,65,68,70,74,72'\n\
    ```\n\nThe format in which you have saved the values is called **comma-separated\
    \ value**, or **CSV** for short. The `temperatures.csv` file is called a csv file.\n\
    \ncsv files are a great way to store records of sequential data because you can\
    \ recover each row of the csv value as a list:\n\n```\n>>> temperatures = text.split(\"\
    ,\")\n>>> temperatures\n['68', '65', '68', '70', '74', '72']\n```\n\nIn Section\
    \ 9.2: *Lists Are Mutable Sequences*, you learned how to create a list from a\
    \ string using the `.split()` string method. In the example above, a new list\
    \ is created from the `text` read from the `temperatures.csv` file.\n\nThe values\
    \ in the `temperatures` list are strings, not integers like the values originally\
    \ written to the file. This is because values read from a text file are always\
    \ read as strings.\n\nYou can convert the strings to integers using a list comprehension:\n\
    \n```\n>>> int_temperatures = [int(temp) for temp in temperatures]\n>>> int_temperatures\n\
    [68, 65, 68, 70, 74, 72]\n```\n\nYou have now recovered the list that you originally\
    \ wrote to the `temperatures.csv` file!\n\nWhat these examples illustrate is that\
    \ a csv file is a plain text file. Using techniques from Section 11.4: Reading\
    \ and Writing Files, you can store sequences of values in the rows of the csv\
    \ file, and then read from the file to recover the data.\n\nReading and writing\
    \ csv files is so common that the Python standard library has a module called\
    \ `csv` to lessen the workload required for working with csv files. In the following\
    \ sections, you'll learn how to use the csv module to write to and read from csv\
    \ files.\n\n## The csv Module\n\nThe `csv` module can be used to read and write\
    \ csv files. We'll re-work the previous example using the `csv` module so that\
    \ you see how it works and what operations it takes care of for you.\n\nTo get\
    \ started, import the `csv` module in IDLE's interactive window:\n\n```\n>>> import\
    \ csv\n```\n\nLet's start by creating a new csv file containing several days worth\
    \ of temperature data.\n\n## Writing csv Files With csv.writer\n\nCreate a list\
    \ of lists containing temperature readings from three days:\n\n```\n>>> daily_temperatures\
    \ = [\n...     [68, 65, 68, 70, 74, 72],\n...     [67, 67, 70, 72, 72, 70],\n\
    ...     [68, 70, 74, 76, 74, 73],\n... ]\n```\n\nNow open the `temperatures.csv`\
    \ file in write mode:\n\n```\n>>> file_path = Path.home() / \"temperatures.csv\"\
    \n>>> file = file_path.open(mode=\"w\", encoding=\"utf-8\")\n```\n\nInstead of\
    \ using a `with` statement, a file object is created and assigned to the `file`\
    \ variable so that we can inspect each step of the writing process as we go.\n\
    \nNow create a new csv writer object by passing the file object `file` to `csv.writer()`:\n\
    \n```\n>>> writer = csv.writer(file)\n```\n\n`csv.writer()` returns a CSV writer\
    \ object with methods for writing data to the csv file.\n\nFor instance, you can\
    \ use the `writer.writerow()` method to write a list to a new row in the csv file:\n\
    \n```\n>>> for temp_list in daily_temperatures:\n...     writer.writerow(temp_list)\n\
    ...\n19\n19\n19\n```\n\nJust like a file object's `.write()` method, `.writerow()`\
    \ returns the number of characters written to the file. Each list in `daily_temperatures`\
    \ gets converted to a string containing the temperatures separated by commas,\
    \ and each of these strings has 19 characters.\n\nNow close the file:\n\n```\n\
    >>> file.close()\n```\n\nIf you open the `temperatures.csv` file in a text editor,\
    \ you will see the following text in the file:\n\n```\n68,65,68,70,74,72\n67,67,70,72,72,70\n\
    68,70,74,76,74,73\n```\n\nIn the examples above, you did not use a `with` statement\
    \ to write to the file so that you can inspect each operation in IDLE's interactive\
    \ window. You won't typically do this in practice, so here's what the code looks\
    \ like using the `with` statement:\n\n```\nwith file_path.open(mode=\"w\", encoding=\"\
    utf-8\") as file:\n    writer = csv.writer(file)\n    for temp_list in daily_temperatures:\n\
    \        writer.writerow(temp_list)\n```\n\nThe main advantage of using `csv.writer`\
    \ to write to a `csv` file is that you don't need to worry about converting values\
    \ to strings before writing them to the file. The `csv.writer` object handles\
    \ this for you, which results in shorter and cleaner code.\n\n`.writerow()` writes\
    \ a single row to the csv file, but you can write multiple rows at once using\
    \ the `.writerows()` method. This shortens the code even more when your data is\
    \ already in a list of lists:\n\n```\nwith file_path.open(mode=\"w\", encoding=\"\
    utf-8\") as file:\n    writer = csv.writer(file)\n    writer.writerows(daily_temperatures)\n\
    ```\n\nNow let's read from the `temperatures.csv` file to recover the `daily_temperatures`\
    \ list of lists that was used to create the file.\n\n## Reading csv Files With\
    \ csv.reader\n\nTo read a csv file with the csv module, use the csv.reader class.\
    \ Like csv.writer objects, csv.reader objects are instantiated from a file object:\n\
    \n```\n>>> file = file_path.open(mode=\"r\", encoding=\"utf-8\")\n>>> reader =\
    \ csv.reader(file)\n```\n\ncsv.reader() returns a csv reader object that can be\
    \ used to iterate over the rows of the csv file:\n\n```\n>>> for row in reader:\n\
