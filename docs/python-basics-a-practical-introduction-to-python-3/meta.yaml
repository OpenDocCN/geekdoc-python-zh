    You can change the name of an imported module using the `as` keyword:


    ```

    # main.py


    from mypackage import module1 as m1, module2 as m2


    m1.greet("Pythonista")

    m2.depart("Pythonista")

    ```


    You can also import individual names from a package module. For instance, you
    can rewrite your `main.py` to the following without changing what gets printed
    when you save and run the module:


    ```

    # main.py


    from mypackage.module1 import greet

    from mypackage.module2 import depart


    greet("Pythonista")

    depart("Pythonista")

    ```


    With so many ways to import packages, it''s natural to wonder which way is best.


    # Guidelines For Importing Packages


    The same guidelines for importing names from modules apply to importing modules
    form packages. You should prefer that imports be as explicit as possible, so that
    the modules and names imported from the package into the calling module have the
    appropriate context.'
