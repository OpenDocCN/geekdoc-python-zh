    forces the buttons to expand horizontally in both directions and fill the entire
    frame. This makes sure both buttons are the same size.


    5 pixels of padding is placed around each button with the by setting the `padx`
    and `pady` parameters to 5. Only `btn_open` has vertical padding. Since it is
    on top, the vertical padding offsets the button down from the top of the window
    a bit and makes sure that there is a small gap between it and `btn_save`.


    Now that `fr_buttons` is laid out and ready to go we can set up the grid layout
    for the rest of the window:


    ```

    fr_buttons.grid(row=0, column=0, sticky="ns")

    txt_edit.grid(row=0, column=1, sticky="nsew")

    ```


    These two lines of code create a grid with one row and two columns for `window`.
    `fr_buttons` is placed in the first column and `txt_edit` in the second column
    so that `fr_buttons` appears to the left of `txt_edit` in the window layout.


    The `sticky` parameter for `fr_buttons` is set to "ns", which forces the whole
    frame to expand vertically and fill the entire height of its column. `txt_edit`
    fills its entire grid cell because its `sticky` parameters is set to "nsew", which
    forces it to expand in every direction.


