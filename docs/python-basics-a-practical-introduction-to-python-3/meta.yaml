    ```\n\n`.mainloop()` takes care of a lot for us, but there’s something missing\
    \ from the above code. How does Tkinter know when to use `handle_keypress()`?\
    \ Tkinter widgets have a `.bind()` method to do just this.\n\n# The .bind() Method\n\
    \nTo call an event handler whenever an event occurs on a widgets, use the widget’s\
    \ `.bind()` method. The event handler is said to be **bound** to the event, because\
    \ it is called every time the event occurs.\n\nContinuing with the keypress example\
