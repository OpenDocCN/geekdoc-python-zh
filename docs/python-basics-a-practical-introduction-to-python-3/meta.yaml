    ## 15.1 SQLite 简介


    SQL 数据库有很多，其中一些比其他数据库更适合特定用途。最简单、最轻量级的 SQL 数据库之一是 SQLite，它直接在你的机器上运行，并且自动与 Python
    捆绑在一起。


    在本节中，你将学习如何使用 `sqlite3` 包来创建新数据库以及存储和检索数据。


    ## SQLite 基础


    使用 SQLite 有四个基本步骤：


    1. 导入 `sqlite3` 包

    2. 连接到现有数据库，或创建新数据库

    3. 在数据库上执行 SQL 语句

    4. 关闭数据库连接


