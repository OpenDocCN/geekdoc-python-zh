    # 16.1 Scrape and Parse Text From Websites


    Collecting data from websites using an automated process is known as web scraping.
    Some websites explicitly forbid users from scraping their data with automated
    tools like the ones you will create in this chapter. Websites do this for either
    of two possible reasons:


