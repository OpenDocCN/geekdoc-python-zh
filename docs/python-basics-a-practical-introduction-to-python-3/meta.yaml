    \ len() takes exactly one argument (0 given)\n```\n\n在这个例子中，当调用 `len()` 时，Python\
    \ 会引发 `TypeError`，因为 `len()` 期望一个参数。\n\n**参数**是作为输入**传递**给函数的值。有些函数可以在没有参数的情况下调用，有些可以接受任意数量的参数。`len()`\
    \ 恰好需要一个参数。\n\n当函数执行完毕时，它会**返回**一个值作为输出。返回值通常——但并非总是——取决于传递给函数的任何参数的值。\n\n执行函数的过程可以总结为三个步骤：\n\
    \n1. 函数被**调用**，任何参数作为输入传递给函数。\n2. 函数**执行**，并使用参数执行某些操作。\n3. 函数**返回**，原始的函数调用被返回值替换。\n\
    \n让我们在实践中看看这一点，看看 Python 如何执行以下代码行：\n\n```\n>>> num_letters = len(\"four\")\n\
    ```\n\n首先，使用参数 \"four\" 调用 `len()`。计算字符串 \"four\" 的长度，即数字 4。然后 `len()` 返回数字 4\
