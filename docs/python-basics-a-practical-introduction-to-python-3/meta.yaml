    # Extract Multiple Pages From a PDF File


    Using for loops, you can extract multiple pages from a PDF file and save them
    to a new PDF. Let''s extract the first chapter from Pride_and_Prejudice.pdf.


    If you open Pride_and_Prejudice.pdf with a PDF viewer, you can see that the first
    chapter is on the second, third, and fourth pages in the PDF. Since pages are
    indexed starting with 0, we''ll need to extract the pages at the indices 1, 2,
    and 3.


    Let''s set everything up by importing the classes we need and opening the PDF
    file:


    ```

    >>> from PyPDF2 import PdfFileReader, PdfFileWriter

    >>> from pathlib import Path

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "Pride_and_Prejudice.pdf"

    ... )

    ```'
- md: "## 14.2. Extract Pages From a PDF\n\n```python\n>>> input_pdf = PdfFileReader(str(pdf_path))\n\
    ```\n\nOur goal is to extract the pages at indices 1, 2, and 3, add these to a\
    \ new PdfFileWriter instance, and then write them to a new PDF file.\n\nOne way\
    \ to do this is to loop over the range of numbers starting at 1 and ending at\
    \ 3, extracting the page at each step of the loop and adding it to the PdfFileWriter\
    \ instance. Here's what that looks like in code:\n\n```python\n>>> pdf_writer\
    \ = PdfFileWriter()\n>>> for n in range(1, 4):\n...     page = input_pdf.getPage(n)\n\
    ...     pdf_writer.addPage(page)\n...\n>>>\n```\n\nNow pdf_writer has three pages\
    \ added to it, which you can check with the .getNumPages() method:\n\n```python\n\
    >>> pdf_writer.getNumPages()\n3\n```\n\nFinally, you can write the extracted pages\
    \ to a new PDF file:\n\n```python\n>>> with Path(\"chapter1.pdf\").open(mode=\"\
    wb\") as output_file:\n...     pdf_writer.write(output_file)\n...\n>>>\n```\n\n\
    Now you can open the chapter1.pdf file in your current working directory to read\
    \ just the first chapter of Pride and Prejudice.\n\nAnother way to extract multiple\
    \ pages from a PDF is to take advantage of the fact that the iterable returned\
    \ by PdfFileReader.pages supports slice notation.\n\nLet's redo the previous example\
    \ using .pages instead of looping over a range object. Since you've already imported\
    \ the necessary classes and set-up to file paths, start by initializing a new\
    \ PdfFileWriter object:\n\n```python\n>>> pdf_writer = PdfFileWriter()\n```\n\n\
    Now loop over a slice of the .pages iterable from indices starting at 1 and ending\
    \ at 3:\n\n```python\n>>> for page in input_pdf.pages[1:4]:\n...     pdf_writer.addPage(page)\n\
    ...\n>>>\n```\n\nRecall that the values in a slice range from the item at the\
    \ first index in the slice and up to, but not including, the item at the second\
    \ index in the slice. So .pages[1:4] returns an iterable of the pages with indices\
    \ 1, 2, and 3.\n\nFinally, write the contents of pdf_writer to the output file:\n\
    \n```python\n>>> with Path(\"chapter1_slice.pdf\").open(mode=\"wb\") as output_file:\n\
    ...     pdf_writer.write(output_file)\n...\n>>>\n```\n\nNow open the chapter1_slice.pdf\
    \ file in your current working directory and compare it to the chapter1.pdf file\
    \ you made by looping over the range object. They contain the same pages!\n\n\
    Sometimes you need to extract every page from a PDF. You can use the methods illustrated\
    \ above to do this, but PyPDF2 provides a shortcut. PdfFileWriter instances have\
    \ an .appendPagesFromReader() method that is used to append pages from a PdfFileReader\
    \ instance.\n\nTo use .appendPagesFromReader() pass a PdfFileReader instance to\
    \ its reader parameter. For example, the following copies every page from the\
    \ Pride and Prejudice PDF to a PdfFileWriter instance:\n\n```python\n>>> # Assume\
    \ pdf_reader contains the opened Pride_and_Prejudice.pdf\n>>> pdf_writer = PdfFileWriter()\n\
    >>> pdf_writer.appendPagesFromReader(pdf_reader)\n```\n\npdf_writer now contains\
    \ every page in pdf_reader!\n\n## Review Exercises\n\n- 1. Extract the last page\
