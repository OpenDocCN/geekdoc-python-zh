  - '[PAGE 595]


    # 18.6. Controlling Layout With Geometry Managers


    .place() is not used often. It has two main drawbacks:


    +   1. **Layout can be difficult to manage with** .place(), especially if your
    application has lots of widgets.

    2. **Layouts created with** .place() **are not responsive.** They do not change
    as the window is resized.


    One of the main challenges of cross-platform GUI development is making layouts
    that look good no matter which platform they are viewed on. .place() is a poor
    choice for making responsive and cross-platform layouts.


    That’s not to say .place() should never be used. It might be just what you need.
    For example, if you are creating a GUI interface for a map, then .place() might
    be the perfect choice to ensure widgets are placed at the correct distance from
    each other on the map.


    .pack() is usually a better choice than .place(), but even .pack() has some downsides.
    The placement of widgets depends on the order in which .pack() is called, so it
    can be difficult to modify existing applications without fully understanding the
    code controlling the layout.


    The .grid() geometry manager solves a lot of these issues, as you’ll see in the
    next section.


    # The .grid() Geometry Manager


    The geometry manager you will likely use most often is the .grid() geometry manager.
    .grid() provides all the power of .pack() in a format that is easier to understand
    and maintain.


    .grid() works by splitting a window or Frame into rows and columns. You specify
    the location of a widget by calling .grid() and passing the row and column indices
    to the row and column keyword argument, respectively. Both row and column indices
    start at 0, so a row index of 1 and a column index of 2 tells .grid() to place
    a widget in the third column of the second row.'
