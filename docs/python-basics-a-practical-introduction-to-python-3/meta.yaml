    | `*` | Any number of characters | `\"*b*\"` | b, ab, bc, abc | a, c, ac |\n|\
    \ `?` | A single character | `\"?bc\"` | abc, bbc, cbc | bc, aabc, abcd |\n| `[abc]`\
