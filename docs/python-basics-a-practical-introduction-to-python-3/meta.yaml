  md: '# 14.4. Concatenating and Merging PDFs


    The names of the three files are listed, but they aren''t in order. Furthermore,
    the order of the files you see in the output on your computer may not match the
    output shown here.


    In general, the order of paths returned by `.glob()` is not guaranteed, so you''ll
    need to order them yourself. You can do this by creating a list containing the
    three file paths, and then calling the `.sort()` method on that list:


    ```

    >>> expense_reports = list(reports_dir.glob("*.pdf"))

    >>> expense_reports.sort()

    ```


    Recall that `.sort()` sorts a list in place, so you don''t need to assign the
    return value to a variable. After calling `.sort()`, the `expense_reports` list
    is sorted by file name in alphabetical order.


    Let''s check that the sorting worked by looping over `expense_reports` again and
    printing out the file names:


    ```

    >>> for path in expense_reports:

    ...     print(path.name)

    ...

    Expense report 1.pdf

    Expense report 2.pdf

    Expense report 3.pdf

    ```


    That looks good!


    Now we can concatenate the three PDFs together. To do that, we''ll use the `PdfFileMerger.append()`
    method, which requires a single string argument representing the path to a PDF
    file. When you call `.append()`, all of the pages in the PDF file are appended
    to the set of pages in the `PdfFileMerger` object.


    Let''s see this in action. First import the `PdfFileMerger` class and create a
    new instance:'
