    # 5.7 Complex Numbers


    Python is one of the few programming languages that provides built-in support
    for complex numbers. While complex numbers do not come up often outside the domains
    of scientific computing and computer graphics, Python’s support for them is one
    of it’s strengths.


    > **Note**


    Complex numbers only come up in a few specific situations. Many programmers never
    need to use them.


    Feel free to skip this section all together if you have no interest in how to
    work with complex numbers in Python. No other part of the book depends on the
    information in this section.


    If you have ever taken a pre-calculus or higher level algebra math class, you
    may remember that a complex number is a number with two distinct components: a
    **real** component and an **imaginary** component.


    There are several ways to denote complex numbers, but a common method is to indicate
    the real component with the letter *i* and the imaginary component with the letter
    *j*. For example, 1*i* + 2*j* is the complex number with real part 1 and imaginary
    part 2.


    To create a complex number in Python, you simply write the real part, followed
    by a plus sign and the imaginary part with the letter *j* at the'
