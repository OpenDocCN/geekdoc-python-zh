    # 19.4 PythonistaCafe: A Community for Python Developers


    Mastering Python is *not* just about getting the books and courses to study. To
    be successful you also need a way to stay motivated and to grow your abilities
    in the long run.


    Many Pythonistas we know are struggling with this. It’s simply a lot less fun
    to build your Python skills completely alone.


    If you’re a self-taught developer with a non-technical day job, it’s hard to grow
    your skills all by yourself. And with no coders in your personal peer group, there’s
    nobody to encourage or support you in your endeavor of becoming a better developer.


    Maybe you’re already working as a developer, but no one else at your company shares
    your love for Python. It’s frustrating when you can’t share your learning progress
    with anyone or ask for advice when you feel stuck.


    From personal experience, we know that existing online communities and social
    media don’t do a great job at providing that support network either. Here are
    a few of the best, but they still leave a lot to be desired:


    +   - *Stack Overflow* is for asking focused, one-off questions. It’s hard to
    make a human connection with fellow commenters on the plat-'
