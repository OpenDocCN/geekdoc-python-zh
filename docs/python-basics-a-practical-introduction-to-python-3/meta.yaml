    2011]\n \n \nLanguage: Eng\nlish\n \n \nCharacter set encoding: ASCII\n \n \n***
    START OF THIS PROJECT GUTENBERG EBOOK PRIDE AND PREJUDICE ***\n \n \n \n \nProduced
    by Anonymous Volunteers, and David Widger\n \n \n \n \n \n \nPRIDE AND PREJUDICE
    \n \n \nBy Jane Austen \n \n\n \n \nContents\n \n''

    ```


    Note that the output displayed here has been formatted to fit better on this page.
    The output you see on your computer may be formatted differently.


    To extract all of the text from the entire PDF, you''ll need to away to iterate
    over all of the pages in the document.


    Every `PdfFileReader` object has a `.pages` attribute used to access an iterable
    of `PageObject` objects for each page in the PDF. This iterable is in order, so
    the first `PageObject` corresponds to the first page of the PDF, the second `PageObject`
    to the second page, and so on.


    Here''s how you use a `for` loop to loop over all the pages in the PDF and print
    their text:


    ```

    >>> for page in pdf.pages:

    ...     print(page.extractText())

    ...

    ```


