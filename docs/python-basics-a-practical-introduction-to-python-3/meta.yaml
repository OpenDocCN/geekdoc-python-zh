    \ that begins with the character whose index is the first number in the slice\
    \ and ends with the last character in the string:\n\n```python\n>>> flavor[5:]\n\
    ' pie'\n```\n\nFor \"apple pie\", the slice [5:] is equivalent to the slice [5:9].\
