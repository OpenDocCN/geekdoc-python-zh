  md: '# The Canvas Class


    The main interface for creating PDFs with ReportLab is the `Canvas` class, which
    is located in the `reportlab.pdfgen.canvas` module.


    Open a new IDLE interactive window and type the following to import the `Canvas`
    class:


    ```

    >>> from reportlab.pdfgen.canvas import Canvas

    ```


    When you make a new `Canvas` instance, you need to provide a string with the filename
    of the PDF you are creating. Let''s create a new `Canvas` instance for the file
    `hello.pdf`:


    ```

    >>> canvas = Canvas("hello.pdf")

    ```


    You now have a `Canvas` instance associated with a file called `hello.pdf` in
    your current working directory assigned to the variable name `canvas`. The file
    `hello.pdf` does not exist yet, though.


    Let''s add some text to the PDF. To do that, you use the `.drawString()` method:


    ```

    >>> canvas.drawString(72, 72, "Hello World")

    ```


    The first two arguments passed to `.drawString()` determine the location on the
    canvas that the text is written. The first specifies **points** from the left
    edge of the canvas, and the second specifies points from the bottom edge.


    A **point** is equal to 1/72 inches. So, 72 points is one inch, which means that
    the string "Hello World" is written one inch from the left and the bottom of the
    page.


    To save the PDF to a file, use the `Canvas` object''s `.save()` method:


    ```

    >>> canvas.save()

    ```


    You now have a PDF file called `hello.pdf` in your current working directory.
    You can open it with a PDF reader and see the text Hello World'
