    # 4.2. Concatenation, Indexing, and Slicing


    ```

    ''abracadabra''

    ```


    In this example, string concatenation occurs on the third line. `string1` and
    `string2` are concatenated using `+` and the result is assigned to the variable
    `magic_string`. Notice that the two strings are joined without any whitespace
    between them.


    You can use string concatenation to join two related strings, such as joining
    a first and last name into a full name:


    ```

    >>> first_name = "Arthur"

    >>> last_name = "Dent"

    >>> full_name = first_name + " " + last_name

    >>> full_name

    ''Arthur Dent''

    ```


    Here string concatenation occurs twice on the same line. `first_name` is concatenated
    with `" "`, resulting in the string `"Arthur "`. Then this result is concatenated
    with `last_name` to produce the full name `"Arthur Dent"`.


    # String Indexing


    Each character in a string has a numbered position called an **index**. You can
    access the character at the *Nth* position by putting the number *N* in between
    two square brackets (`[` and `]`) immediately after the string:


    ```

    >>> flavor = "apple pie"

    >>> flavor[1]

    ''p''

    ```


    `flavor[1]` returns the character at position 1 in `"apple pie"`, which is `p`.
    Wait, isn''t `a` the first character of `"apple pie"`?


    In Python—and most other programming languages—counting always starts at zero.
    To get the character at the beginning of a string, you need to access the character
    at position 0:'
