- md: '## About the Authors


    At [Real Python](https://realpython.com/) you’ll learn real-world programming
    skills from a community of professional Pythonistas from all around the world.


    The [realpython.com](https://realpython.com/) website launched in 2012 and currently
    helps more than two million Python developers each month with free programming
    tutorials and in-depth learning resources.


    Everyone who worked on this book is a *practitioner* with several years of professional
    experience in the software industry. Here are the members of the Real Python Tutorial
    Team who worked on *Python Basics*:


    **Fletcher Heisler** is the founder of Hunter2, where he teaches developers how
    to hack and secure modern web apps. As one of the founding members of Real Python,
    Fletcher wrote the original version of this book in 2012.


    **David Amos** is a mathematician by training, a data scientist/Python developer
    by profession, and a coffee junkie by choice. He is a member of the Real Python
    tutorial team and rewrote large parts of this book to update it to Python 3.


    **Dan Bader** is the owner and Editor in Chief of Real Python and a complete Python
    nut. When he’s not busy working on the Real Python learning platform he helps
    Python developers take their coding skills to the next level with tutorials, books,
    and online training.


    **Joanna Jablonski** is the Executive Editor of Real Python. She loves natural
    languages just as much as she loves programming languages. When she’s not producing
    educational materials to help Python developers level up, she’s finding new ways
    to optimize various aspects of her life.


