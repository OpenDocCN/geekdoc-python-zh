    # 9.6 Store Relationships in Dictionaries


    One of the most useful data structures in Python is the **dictionary**.


    In this section, you''ll learn what a dictionary is, how dictionaries differ from
    lists and tuples, and how to define and use dictionaries in your own code.


    # What is a Dictionary?


    In plain English, a dictionary is a book containing the definitions of words.
    Each entry in a dictionary has two parts: the word being defined, and its definition.


    Python dictionaries, like lists and tuples, store a collection of objects. However,
    instead of storing objects in a sequence, dictionaries hold information in pairs
    of data called **key-value pairs**. That is, each object in a dictionary has two
    parts: a **key** and a **value**.


    The **key** in a key-value pair is a unique name that identifies the **value**
    part of the pair. Comparing this to an English dictionary, the key is like the
    word being defined and the value is like the definition of the word.


    For example, you could use a dictionary to store names of states and their capitals:


    | Key | Value |

    |---|---|

    | "California" | "Sacramento" |

    | "New York" | "Albany" |'
  merge: -1
