- md: "## 4.8. Find a String in a String\n\n```python\n>>> phrase = \"the surprise\
    \ is in here somewhere\"\n>>> phrase.find(\"eyjafjallajökull\")\n-1\n```\n\nYou\
    \ can call string methods on a string literal directly, so in this case, you don't\
    \ need to create a new string:\n\n```python\n>>> \"the surprise is in here somewhere\"\
    .find(\"surprise\")\n4\n```\n\nKeep in mind that this matching is done exactly,\
    \ character by character, and is case-sensitive. For example, if you try to find\
    \ \"SURPRISE\", the `.find()` method returns -1:\n\n```python\n>>> \"the surprise\
    \ is in here somewhere\".find(\"SURPRISE\")\n-1\n```\n\nIf a substring appears\
    \ more than once in a string, `.find()` only returns the index of the first appearance,\
    \ starting from the beginning of the string:\n\n```python\n>>> \"I put a string\
    \ in your string\".find(\"string\")\n8\n```\n\nThere are two instances of the\
    \ \"string\" in \"I put a string in your string\". The first starts at index 8,\
    \ and the second at index 23. `.find()` returns 8, which is the index of the first\
    \ instance of \"string\".\n\nThe `.find()` method only accepts a string as its\
    \ input. If you want to find an integer in a string, you need to pass the integer\
    \ to `.find()` as a string. If you do pass something other than a string to `.find()`,\
    \ Python raises a `TypeError`:\n\n```python\n>>> \"My number is 555-555-5555\"\
    .find(5)\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: must be str, not int\n```\n\n```python\n>>> \"My number is 555-555-5555\"\
    .find(\"5\")\n13\n```\n\nSometimes you need to find all occurrences of a particular\
    \ substring and replace them with a different string. Since `.find()` only returns\
    \ the index of the first occurrence of a substring, you can't easily use it to\
    \ perform this operation. Fortunately, string objects have a `.replace()` method\
    \ that replaces each instance of a substring with another string.\n\nJust like\
    \ `.find()`, you tack `.replace()` on to the end of a variable or string literal.\
    \ In this case, though, you need to put two strings inside of the parentheses\
    \ in `.replace()` and separate them with a comma. The first string is the substring\
    \ to find, and the second string is the string to replace each occurrence of the\
    \ substring with.\n\nFor example, the following code shows how to replace each\
