    \nYou can find the solutions to these exercises and many other bonus resources\
    \ online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n1. Write a script that IDLE won't let you run because it has a syntax error.\n\
    2. Write a script that only crashes your program once it is already running because\
    \ it has a run-time error.\n\n[Leave feedback on this section »](https://realpython.com/python-basics/resources)\n\
    \n## 3.3 Create a Variable\n\nIn Python, **variables** are names that can be assigned\
    \ a value and used to reference that value throughout your code. Variables are\
    \ fundamental to programming for two reasons:\n\n1. **Variables keep values accessible:**\
    \ For example, the result of some time-consuming operation can be assigned to\
    \ a variable so that the operation does not need to be performed each time you\
    \ need to use the result.\n2. **Variables give values context:** The number 28\
    \ could mean lots of different things, such as the number of students in a class,\
    \ or the number of times a user has accessed a website, and so on. Naming the\
    \ value 28 something like `num_students` makes the meaning of the value clear.\n\
    \nIn this section, you'll learn how to use variables in your code, as well as\
    \ some of the conventions Python programmers follow when choosing names for variables.\n\
    \n## The Assignment Operator\n\nValues are assigned to a variable using a special\
    \ symbol = called the **assignment operator**. An **operator** is a symbol, like\
    \ = or +, that performs some operation on one or more values.\n\nFor example,\
    \ the + operator takes two numbers, one to the left of the operator and one to\
    \ the right, and adds them together. Likewise, the = operator takes a value to\
    \ the right of the operator and assigns it to the name on the left of the operator.\n\
    \nTo see the assignment operator in action, let's modify the \"Hello, world\"\
    \ program you saw in the last section. This time, we'll use a variable to store\
    \ some text before printing it to the screen:\n\n```\n>>> phrase = \"Hello, world\"\
    \n>>> print(phrase)\nHello, world\n```\n\nIn the first line, a variable named\
    \ `phrase` is created and assigned the value \"Hello, world\" using the = operator.\
    \ The string \"Hello, world\" that was originally used inside of the parentheses\
    \ in the `print()` function is replaced with the variable `phrase`.\n\nThe output\
    \ `Hello, world` is displayed when you execute `print(phrase)` because Python\
    \ looks up the name `phrase` and finds it has been assigned the value \"Hello,\
    \ world\".\n\nIf you hadn't executed `phrase = \"Hello, world\"` before executing\
    \ `print(phrase)`, you would have seen a `NameError` like you did when trying\
    \ to execute `print(Hello, world)` in the previous section.\n\n> **Note**\n\n\
    Although = looks like the equals sign from mathematics, it has a different meaning\
    \ in Python. Distinguishing the = operator from the equals sign is important,\
    \ and can be a source of frustration for beginner programmers.\n\nJust remember,\
    \ whenever you see the = operator, whatever is to the right of it is being assigned\
    \ to a variable on the left.\n\nVariable names are **case-sensitive**, so a variable\
    \ named `phrase` is distinct from a variable named `Phrase` (note the capital\
    \ P). For instance, the following code produces a `NameError`:\n\n```\n>>> phrase\
    \ = \"Hello, world\"\n>>> print(Phrase)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nNameError: name 'Phrase' is not defined\n\
    ```\n\nWhen you run into trouble with the code examples in this book, be sure\
