    ## 9.3 Nesting, Copying, and Sorting Tuples and Lists


    Now that you have learned what tuples and lists are, how to create them, and some
    basic operations with them, let’s look at three more concepts:


    - 1. Nesting

    - 2. Copying

    - 3. Sorting


    ### Nesting Lists and Tuples


    Lists and tuples can contain values of any type. That means lists and tuples can
    contain lists and tuples as values. A **nested list**, or **nested tuple**, is
    a list or tuple that is contained as a value in another list or tuple.


    For example, the following list has two values, both of which are other lists:


    ```

    >>> two_by_two = [[1, 2], [3, 4]]


    >>> # two_by_two has length 2

    >>> len(two_by_two)

    2


    >>> # Both elements of two_by_two are lists

    >>> two_by_two[0]

    [1, 2]

    >>> two_by_two[1]

    [3, 4]

    ```


    Since `two_by_two[1]` returns the list `[3, 4]`, you can use **double index notation**
    to access an element in the nested list:


    ```

    >>> two_by_two[1][0]

    3

    ```


    First, Python evaluates `two_by_two[1]` and returns `[3, 4]`. Then Python evaluates
    `[3, 4][0]` and returns the first element 3.


    In very loose terms, you can think of a list of lists or a tuple of tuples as
    a sort of table with rows and columns.


    The `two_by_two` list has two rows, `[1, 2]` and `[3, 4]`. The columns are made
    of the corresponding elements of each row, so the first column contains the elements
    1 and 3, and the second column contains the elements 2 and 4.


    This table analogy is only an informal way of thinking about a list of lists,
    though. For example, there is no requirement that all the lists in a list of lists
    have the same length, in which case this table analogy starts to break down.


    > **Note**


    Readers interested in data analysis or scientific computing may recognize lists
    of lists as a sort of matrix of values.


    While you can use the built-in `list` and `tuple` types for matrices, better alternatives
    exist. To learn how to work with matrices in Python, check out Chapter 17.


    ### Copying a List


    Sometimes you need to copy one list into another list. However, you can’t just
    reassign one list object to another list object, because you’ll get this (possibly
    surprising) result:


    ```

    >>> animals = ["lion", "tiger", "frumious Bandersnatch"]

    >>> large_cats = animals

    >>> large_cats.append("Tigger")

    >>> animals

    [''lion'', ''tiger'', ''frumious Bandersnatch'', ''Tigger'']

    ```


    In this example, you first assign the list stored in the `animals` variable to
    the variable `large_cats`, and then we add a new string to the `large_cats` list.
    But, when the contents of `animals` are displayed you can see that the original
    list has also been changed.


    This is a quirk of object-oriented programming, but it’s by design. When you say
    `large_cats = animals`, the `large_cats` and `animals` variables both refer to
    the same object.


    A variable name is really just a reference to a specific location in computer
    memory. Instead of copying all the contents of the list object and creating a
    new list, `large_cats = animals` assigns the memory location referenced by `animals`
    to `large_cats`. That is, both variables now refer to the same object in memory,
    and any changes made to one will affect the other.


    To get an independent copy of the `animals` list, you can use slicing notation
    to return a new list with the same values:


    ```

    >>> animals = ["lion", "tiger", "frumious Bandersnatch"]

    >>> large_cats = animals[:]

    >>> large_cats.append("leopard")

    >>> large_cats

    [''lion'', ''tiger'', ''frumious Bandersnatch'', ''leopard'']

    >>> animals

    ["lion", "tiger", "frumious Bandersnatch"]

    ```


    Since no index numbers are specified in the [:] slice, every element of the list
    is returned from beginning to end. The large_cats list now has the same elements
    as animals, and in the same order, but you can .append() items to it without changing
    the list assigned to animals.


    If you want to make a copy of a list of lists, you can do so using the [:] notation
    you saw earlier:


    ```

    >>> matrix1 = [[1, 2], [3, 4]]

    >>> matrix2 = matrix1[:]

    >>> matrix2[0] = [5, 6]

    >>> matrix2

    [[5, 6], [3, 4]]

    >>> matrix1

    [[1, 2], [3, 4]]

    ```


    Let’s see what happens when you change the first element of the second list in
    matrix2:


    ```

    >>> matrix2[1][0] = 1

    >>> matrix2

    [[5, 6], [1, 4]]

    >>> matrix1

    [[1, 2], [1, 4]]

    ```


    Notice that the second list in matrix1 was also altered!


    This happens because a list does not really contain objects themselves, but references
    to those objects in memory. When you make a copy of the list using the [:] notation,
    a new list is returned containing the same references as the original list. In
    programming jargon, this method of copying a list is called a **shallow copy**.


    To make a copy of both the list and all of the elements it contains, you must
    use what is known as a **deep copy**. This method of copying is beyond the scope
    of this course. For more information on shallow and deep copies, check out the
    [Shallow vs Deep Copying of Python Objects](https://realpython.com) article on
    realpython.com.


    ### Sorting Lists


    Lists have a .sort() method that sorts all of the items in ascending order. By
    default, the list is sorted in alphabetical or numerical order, depending on the
    type of elements in the list:


    ```

    >>> # Lists of strings are sorted alphabetically

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> colors.sort()

    >>> colors

    [''blue'', ''green'', ''red'', ''yellow'']


    >>> # Lists of numbers are sorted numerically

    >>> numbers = [1, 10, 5, 3]

    >>> numbers.sort()

    >>> numbers

    [1, 3, 5, 10]

    ```


    Notice that .sort() sorts the list in place, so you don''t need to assign its
    result to anything.


    .sort() has an option parameter called key that can be used to adjust how the
    list gets sorted. The key parameter accepts a function, and the list is sorted
    based on the return value of that function.


    For example, to sort a list of strings by the length of each string, you can pass
    the len function to key:


    ```

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> colors.sort(key=len)

    >>> colors

    [''red'', ''blue'', ''green'', ''yellow'']

    ```


    You don''t need to call the function when you pass it to `key`. Pass the name
    of the function without any parentheses. For instance, in the previous example
    the name `len` is passed to `key`, and not `len()`.


    The function that gets passed to `key` must only accept a single argument.


    You can also pass user defined functions to `key`. In the following example, a
    function called `get_second_element()` is used to sort a list of tuples by their
    second elements:


    ```

    >>> def get_second_element(item):

    ...     return item[1]

    ...

    >>> items = [(4, 1), (1, 2), (-9, 0)]

    >>> items.sort(key=get_second_element)

    >>> items

    [(-9, 0), (4, 1), (1, 2)]

    ```


    Keep in mind that any function that you pass to `key` must accept only a single
    argument.


