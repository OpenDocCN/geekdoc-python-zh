    \ with matplotlib\n\nLet's dive in!\n\n[Leave feedback on this section »](Leave\
    \ feedback on this section »)\n\n## 17.1 Use NumPy for Matrix Manipulation\n\n\
    In this section, you will learn how to store and manipulate matrices of data using\
    \ the NumPy package. Before getting to that, though, let’s take a look at the\
    \ problem NumPy solves.\n\nIf you have ever taken a course in linear algebra,\
    \ you may recall that a matrix is a rectangular array of numbers. You can easily\
    \ create a matrix in pure Python with a list of lists:\n\n```\n>>> matrix = [[1,\
