  md: "# 18.2. Example App: PDF Page Rotator\n\nThe third step is to ask the user\
    \ how much they would like to rotate the PDF pages. They can choose either 90,\
    \ 180, or 270 degrees. Let’s use a `buttonbox()` to collect this information:\n\
    \n```\n# 3. Let the user select one of `90`, `180` or `270` degrees to rotate\n\
    # the PDF pages.\nchoices = (\"90\", \"180\", \"270\")\ndegrees = gui.buttonbox(\n\
    \    msg=\"Rotate the PDF clockwise by how many degrees?\",\n    title=\"Choose\
    \ rotation...\",\n    choices=choices,\n)\n```\n\nThe dialog generated here has\
    \ three buttons with the labels \"90\", \"180\", and \"270\". When the user clicks\
    \ on one of these buttons, the label of the button is assigned to the `degrees`\
    \ variable as a string.\n\nIn order to rotate the pages in the PDF by the selected\
    \ angle, we’ll need the value to be an integer, not a string. Let’s go ahead and\
    \ convert it to an integer:\n\n```\ndegrees = int(degrees)\n```\n\nNext, get the\
    \ output file path from the user using `filesavebox()`:\n\n```\n# 4. Display a\
    \ file selection dialog for saving the rotated PDF.\nsave_title = \"Save the rotated\
    \ PDF as...\"\nfile_type = \"*.pdf\"\noutput_path = gui.filesavebox(title=save_title,\
    \ default=file_type)\n```\n\nJust like `fileopenbox()`, we’ve set the `default`\
    \ parameter to `*.pdf`. This ensures that the file automatically gets saved with\
    \ the `.pdf` extension.\n\nThe user shouldn’t be allowed to overwrite the original\
    \ file (Step 5). You can use a `while` loop to repeatedly show the user a warning\
    \ until they pick a path that is different from the input file path:"
