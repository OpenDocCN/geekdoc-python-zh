    ```\n\n现在保存文件并运行该模块。你认为会发生什么？\n\n又引发了一个 NameError：\n\n```\nTraceback (most recent\
    \ call last):\n  File \"//Documents/myproject/main.py\", line 4, in <module>\n\
    \    double_value = double(value)\nNameError: name 'double' is not defined\n```\n\
    \n这次，NameError 告诉你名称 double 未定义，这证明只有 add 名称是从 adder 模块导入的。\n\n你可以通过将 double 名称添加到\
    \ main.py 中的 import 语句来导入它：\n\n```\nfrom adder import add, double  # <-- 修改此行\n\
    \n# 保持下面的代码不变\nvalue = add(2, 2)\ndouble_value = double(value)\nprint(double_value)\n\
    ```\n\n保存并运行该模块。现在模块运行时不会产生 NameError。交互式窗口中会显示值 8。\n\n## 导入语句总结\n\n下表总结了你所学的关于导入模块的内容：\n\
    \n| 导入语句 | 结果 |\n| :--- | :--- |\n| `import <module>` | 将 `<module>` 的整个命名空间导入到名称\
    \ `<module>` 中。导入的模块名称可以通过 `<module>.<name>` 从调用模块访问。 |\n| `import <module> as\
    \ <other_name>` | 将 `<module>` 的整个命名空间导入到名称 `<other_name>` 中。导入的模块名称可以通过 `<other_name>.<name>`\
    \ 从调用模块访问。 |\n| `from <module> import <name1>, <name2>, ...` | 仅从 `<module>` 导入名称\
    \ `<name1>`、`<name2>` 等。这些名称被添加到调用模块的本地命名空间中，可以直接访问。 |\n\n独立的命名空间是将代码划分为单独模块的主要优势之一，因此让我们花些时间探讨为什么命名空间很重要以及为什么你应该关心它们。\n\
    \n## 为什么使用命名空间？\n\n假设地球上的每个人都被分配了一个 ID 号码。为了区分一个人与另一个人，每个 ID 号码都需要是唯一的。我们需要大量的\
    \ ID 号码才能实现这一点！\n\n世界被划分为国家，我们可以按出生国对人们进行分组。如果为每个国家分配一个唯一的代码，我们就可以将该代码包含在一个人的\
    \ ID 号码中。例如，来自美国的人可能有一个 ID 为 `US-357`，而来自英国的人可能有一个 ID 为 `GB-246`。\n\n来自不同国家的两个人现在可以拥有相同的\
    \ ID 号码。我们可以通过他们的 ID 以不同的国家代码开头来区分他们。来自同一国家的每个人都必须有一个唯一的 ID 号码，但我们不再需要全球唯一的 ID\
    \ 号码。\n\n此场景中的国家代码是**命名空间**的示例，并说明了使用命名空间的三个主要原因：\n\n1. 它们将名称**分组**到逻辑容器中\n2.\
    \ 它们**防止**重复名称之间的**冲突**\n3. 它们为名称**提供上下文**\n\n代码中的命名空间提供相同的优势。\n\n你已经看到了将模块导入到另一个模块的三种不同方式。记住命名空间给你带来的优势可以帮助你确定哪种\
    \ `import` 语句最有意义。\n\n通常，`import <module>` 是导入模块的首选方式，因为它使导入模块的命名空间与调用模块的命名空间完全分离。此外，导入模块中的每个名称都通过\
    \ `<module>.<name>` 格式从调用模块访问，这立即告诉你该名称源自哪个模块。\n\n你可能会使用 `import <module> as <other_name>`\
    \ 格式的两个原因：\n\n1. 模块名称很长，你希望导入其缩写版本\n2. 模块名称与调用模块中的现有名称冲突\n\n`import <module> as\
    \ <other_name>` 仍然保持导入模块的命名空间与调用模块的命名空间分离。权衡之处在于，你赋予模块的名称可能不如原始模块名称容易识别。\n\n从模块导入特定名称通常是从模块导入代码的最不推荐的方式。导入的名称直接添加到调用模块的命名空间中，完全脱离了调用模块的上下文。"
