    ''green''

    >>> colors

    [''red'', ''orange'', ''yellow'', ''blue'', ''indigo'', ''violet'']

    ```


    Here, the value "green" at index 3 is removed and and assigned to the variable
    color. When you inspect the colors list, you can see that the string "green" has
    indeed been removed.'
