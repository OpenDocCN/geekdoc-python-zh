  md: 'In this section, you''ll learn how to concatenate and merge PDFs using the
    `PyPDF2` package''s `PdfFileMerger`.


    # The `PdfFileMerger` Class


    The `PdfFileMerger` class is a lot like the `PdfFileWriter` class you learned
    about in the last section. Both classes are used to write PDF files. In both cases,
    pages are added to instances of the class and then written to a file.


    The main differences is that `PdfFileWriter` can only append pages to the end
    of the list of pages already contained in the writer, whereas `PdfFileMerge` can
    insert pages at any location.


    Let''s go ahead and create our first `PdfFileMerger` instance. In IDLE''s interactive
    window, type the following:


    ```

    >>> from PyPDF2 import PdfFilerMerger

    >>> pdf_merger = PdfFilerMerger()

    ```


    First, import the `PdfFileMerger` class from the `PyPDF2` package. Then create
    a new `PdfFileMerger` instance and assigns it to the `pdf_merger` variable. `PdfFileMerger`
    objects are empty when they are first instantiated. We''ll need to add some pages
    to it before we can do anything.


    There are a couple of ways to add pages to the `pdf_merger` object, and how you
    do that depends on what you need to accomplish:


    +   - `.append()` concatenates every page in an existing PDF document to the end
    of the pages currently in the `PdfFileMerger`.

    - `.merge()` is used to insert all of the pages in an existing PDF document after
    a specific page in the `PdfFileMerger`.


    We''ll look at both methods in this section, starting with `.append()`.'
