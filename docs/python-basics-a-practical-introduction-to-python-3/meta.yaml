    \ through Python programs that you create.\n\nBut what’s so great about Python\
    \ as a programming language? Python is open-source freeware, meaning you can download\
    \ it for free and use it for any purpose, commercial or not.\n\nPython also has\
    \ an amazing community that has built a number of additional useful tools you\
    \ can use in your own programs. Need to work with PDF documents? There’s a comprehensive\
    \ tool for that. Want to collect data from web pages? No need to start from scratch!\n\
    \nPython was built to be easier to use than other programming languages. It's\
    \ usually much easier to read Python code and much faster to write code in Python\
    \ than in other languages.\n\nFor instance, here's some simple code written in\
    \ C, another commonly used programming language:\n\n```\n#include <stdio.h>\n\n\
    int main(void)\n{\n    printf(\"Hello, world\\n\");\n}\n```\n\nAll the program\
    \ does is show the text `Hello, world` on the screen. That was a lot of work to\
    \ output one phrase! Here's the same program, written in Python:\n\n```\nprint(\"\
    Hello, world\")\n```\n\nThat's pretty simple, right? The Python code is faster\
    \ to write and easier to read. We find that it looks friendlier and more approachable,\
    \ too!\n\nAt the same time, Python has all the functionality of other languages\
    \ and more. You might be surprised how many professional products are built on\
    \ Python code: Instagram, YouTube, Reddit, Spotify, to name just a few.\n\nNot\
    \ only is Python a friendly and fun language to learn—it also powers the technology\
    \ behind multiple world-class companies and offers fantastic career opportunities\
    \ for any programmer who masters it.\n\n### 1.1 Why This Book?\n\nLet's face it,\
    \ there's an overwhelming amount of information about Python on the internet.\n\
    \nBut many beginners who are studying on their own have trouble figuring out *what*\
    \ to learn and *in what order* to learn it.\n\nYou may be asking yourself, “What\
    \ should I learn about Python in the beginning to get a strong foundation?” If\
    \ so, this book is for you—whether you’re a complete beginner or already dabbled\
    \ in Python or other languages before.\n\n*Python Basics* is written in plain\
    \ English and breaks down the core concepts you really need to know into bite-sized\
    \ chunks. This means you’ll know “enough to be dangerous” with Python, fast.\n\
    \nInstead of just going through a boring list of language features, you’ll see\
    \ exactly how the different building blocks fit together and what’s involved in\
    \ building real applications and scripts with Python.\n\nStep by step you’ll master\
    \ fundamental Python concepts that will help you get started on your journey to\
    \ learn Python.\n\nMany programming books try to cover every last possible variation\
    \ of every command which makes it easy for readers to get lost in the details.\
    \ This approach is great if you’re looking for a reference manual, but it’s a\
    \ horrible way to learn a programming language. Not only do you spend most of\
    \ your time cramming things into your head you’ll never use, it also isn’t any\
    \ fun!\n\nThis book is built on the 80/20 principle. We will cover the commands\
    \ and techniques used in the vast majority of cases and focus on how to program\
    \ real-world solutions to problems that will help make your life easier.\n\nThis\
    \ way, we guarantee that you will:\n\n- Learn useful programming techniques quickly\n\
    - Spend less time struggling with unimportant complications\n- Find more practical\
    \ uses for Python in your own life\n- Have more fun in the process\n\nOnce you’ve\
    \ mastered the material in this book, you will have gained a strong enough foundation\
    \ that venturing out into more advanced territory on your own will be a breeze.\n\
    \nSo dive in! Learn to program in a widely used, free language that can do more\
    \ than you ever thought was possible.\n\n### 1.2 About Real Python\n\nAt [Real\
    \ Python](https://realpython.com), you'll learn real-world programming skills\
    \ from a community of professional Pythonistas from all around the world.\n\n\
    The [realpython.com](https://realpython.com) website launched in 2012 and currently\
