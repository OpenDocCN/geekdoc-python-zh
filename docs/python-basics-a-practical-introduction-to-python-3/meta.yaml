    # 11.1. Working With Modules


    Sometimes, modules contain a single function or class that has the same name as
    the module. For example, there is a module in the Python standard library called
    `datetime` that contains a class called `datetime`.


    Suppose you add the following `import` statement to your code:


    ```

    import datetime

    ```


    This imports the `datetime` module into your code''s namespace, so in order to
    use the `datetime` class contained in the `datetime` module, you need to type
    the following:


    ```

    datetime.datetime(2020, 2, 2)

    ```


    Don''t worry about how the `datetime` class works right now. The important part
    of this example is that having to constantly type `datetime.datetime` anytime
    you want to use the `datetime` class is redundant and tiring.


    This is a great example of when it''s appropriate to use one of the variations
    of the `import` statement. To keep the context of the `datetime` package, it is
    common for Python programmers to import the package and rename it as `dt`:


    ```

    import datetime as dt

    ```


    Now, to use the `datetime` class, you only need to type `dt.datetime`:


    ```

    dt.datetime(2020, 2, 2)

    ```


    It is also common for Python programmers to import the `datetime` class directly
    into the calling module''s namespace:


    ```

    from datetime import datetime

    ```


    This is fine because the context isn''t really lost. The class and the module
    share the same name, after all.


    When imported directly, you no longer have to use dotted module'
