  md: 'Let''s use the SQLite datetime function to get the current local time:


    ```

    >>> query = "SELECT datetime(''now'', ''localtime'');"

    >>> cursor.execute(query)

    <sqlite3.Cursor object at 0x000001A27EB85E30>

    ```


    To get the current time, you first build a SQL statement with the correct syntax.
    In this case, "SELECT datetime(''now'', ''localtime'');" is the statement we need,
    and it is assigned to the query variable. This returns the current time using
    the local time zone settings on your machine. Then the query is executed using
    the cursor.execute() method.


    Note that .execute() returns a Cursor object, but we didn''t assign this to a
    new variable. That''s because .execute() alters the state of cursor and also returns
    the cursor object itself. This might look kind of strange, but it allows you to
    chain multiple Cursor methods together on a single line.


    You might be wondering where the time returned by the datetime function is. To
    get the query results, use the cursor.fetchone() method. .fetchone() returns a
    tuple containing the first row of results:


    ```

    >>> cursor.fetchone()

    (''2018-11-20 23:07:21'',)

    ```


    Since .fetchone() returns a tuple, you need to unpack the tuple elements to get
    the string containing the date and time information. Here''s how you can do this
    by chaining the .execute() and .fetchone() methods:


    ```

    >>> time = cursor.execute(query).fetchone()[0]

    >>> time

    ''2018-11-20 23:09:45''

    ```


    Finally, to close the database connection, use the connection.close() method:


    ```

    >>> connection.close()

    ```'
