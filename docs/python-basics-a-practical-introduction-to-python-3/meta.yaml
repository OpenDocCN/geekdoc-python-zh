    # Converting String Case


    To convert a string to all lower case letters, you use the string''s `.lower()`
    method. This is done by tacking `.lower()` on to the end of the string itself:


    ```

    >>> "Jean-luc Picard".lower()

    ''jean-luc picard''

    ```


    The dot (`.`) tells Python that what follows is the name of a method—the `lower()`
    method in this case.


    > **Note**


    We will refer to the names of string methods with a dot at the beginning of them.
    So, for example, the `.lower()` method is written with a dot, instead of `lower()`.


    The reason we do this is to make it easy to spot functions that are string methods,
    as opposed to built-in functions like `print()` and `type()`.


    String methods don''t just work on string literals. You can also use the `.lower()`
    method on a string assigned to a variable:


    ```

    >>> name = "Jean-luc Picard"

    >>> name.lower()

    ''jean-luc picard''

    ```


    The opposite of the `.lower()` method is the `.upper()` method, which converts
    every character in a string to upper case:'
