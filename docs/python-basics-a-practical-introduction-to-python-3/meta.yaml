    ### 17.2. 使用 matplotlib 绘制图表


    只有一个问题。不清楚哪个图表代表 Real Python，哪个代表另一个网站。


    为了澄清哪个图表是哪个，你可以使用 `plt.legend()` 函数添加图例。`legend()` 函数的主要参数是一个字符串列表，用于标识图表中的每个图形。这些字符串必须按照图形添加到图表的顺序排列：


    ```python

    from matplotlib import pyplot as plt

    import numpy as np


    days = np.arange(0, 21)

    other_site = np.arange(0, 21)

    real_python = other_site ** 2


    plt.plot(days, other_site)

    plt.plot(days, real_python)

    plt.xticks([0, 5, 10, 15, 20])

    plt.xlabel("Days of Reading")

    plt.ylabel("Amount of Python Learned")

    plt.title("Python Learned Reading Real Python vs Other Site")

    plt.legend(["Other Site", "Real Python"])

    plt.show()

    ```


    > **注意**


    自定义图例的方法有很多。更多信息，请查看 matplotlib 文档中的[图例指南](https://matplotlib.org/stable/api/_as_gen/matplotlib.pyplot.legend.html)。


    ## 其他类型的图表


    除了到目前为止你只看到的折线图之外，matplotlib 还提供了创建其他类型图表的简单方法。


    在基础数据可视化中经常使用的一种图表类型是条形图。你可以使用 `plt.bar()` 函数轻松创建条形图。你必须至少提供两个参数给 `bar()`。第一个是每个条形中心点的
    x 值列表，第二个是每个条形顶部的值：'
