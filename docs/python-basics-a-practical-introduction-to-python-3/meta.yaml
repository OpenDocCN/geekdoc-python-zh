    # Chapter 7


    # Finding and Fixing Code Bugs


    Everyone makes mistakes—even seasoned professional developers!


    IDLE is pretty good at catching mistakes like syntax and run-time errors, but
    there’s a third type of error that you may have already experienced. **Logic errors**
    occur when an otherwise valid program doesn’t do what was intended.


    Logic errors cause unexpected behaviors called **bugs**. Removing bugs is called
    **debugging**, and a **debugger** is a tool that helps you hunt down bugs and
    understand why they are happening.


    Knowing how to find and fix bugs in your code is a skill that you will use for
    your entire coding career!


    **In this chapter, you will:**


    +   - Learn how to use IDLE’s Debug Control Window

    - Practice debugging on a buggy function


    Let’s go!


