    \n## 8.6 Recover From Errors\n\nEncountering errors in your code might be frustrating,\
    \ but it's totally normal! It happens to even the best programmers.\n\nProgrammers\
    \ often refer to run-time errors as **exceptions**. So, when you encounter an\
    \ error, congratulate yourself! You've just made the code do something exceptional!\n\
    \nErrors aren't always a bad thing. That is, they don't always mean you made a\
    \ mistake. For example, trying to divide the 1 by 0 results in a `ZeroDivisionError`.\
    \ If the divisor is entered by a user, you have no way of knowing ahead of time\
    \ whether or not the user will enter a 0!\n\nIn order to create robust programs,\
    \ you need to be able to handle errors caused by invalid user input — or any other\
    \ unpredictable source. In this section you'll learn how.\n\n### A Zoo of Exceptions\n\
    \nWhen you encounter an exception, it's useful to know what went wrong. Python\
    \ has a number of built-in exception types that describe different kinds of errors.\n\
    \nThroughout this book you have seen several different errors. Let's collect them\
    \ here and add a few new ones to the list.\n\n### ValueError\n\nA `ValueError`\
    \ occurs when an operation encounters an invalid value. For example, trying to\
    \ convert the string `\"not a number\"` to an integer results in a `ValueError`:\n\
    \n```python\n>>> int(\"not a number\")\nTraceback (most recent call last):\n \
    \ File \"<pyshell#1>\", line 1, in <module>\n    int(\"not a number\")\nValueError:\
    \ invalid literal for int() with base 10: 'not a number'\n```\n\nThe name of the\
    \ exception is displayed on the last line, followed by a description of the specific\
    \ problem that occurred. This is the general format for all Python exceptions.\n\
    \n### TypeError\n\nA `TypeError` occurs when an operation is performed on a value\
    \ of the wrong type. For example, trying to add a string and an integer will result\
    \ in a `TypeError`:\n\n```python\n>>> \"1\" + 2\nTraceback (most recent call last):\n\
    \  File \"<pyshell#1>\", line 1, in <module>\n    \"1\" + 2\nTypeError: can only\
    \ concatenate str (not \"int\") to str\n```\n\n### NameError\n\nA `NameError`\
    \ occurs when you try to use a variable name that hasn't been defined yet:\n\n\
    ```python\n>>> print(does_not_exist)\nTraceback (most recent call last):\n  File\
    \ \"<pyshell#3>\", line 1, in <module>\n    print(does_not_exist)\nNameError:\
    \ name 'does_not_exist' is not defined\n```\n\n### ZeroDivisionError\n\nA `ZeroDivisionError`\
    \ occurs when the divisor in a division operation is 0:\n\n```python\n>>> 1 /\
    \ 0\nTraceback (most recent call last):\n  File \"<pyshell#4>\", line 1, in <module>\n\
    \    1 / 0\nZeroDivisionError: division by zero\n```\n\n### OverflowError\n\n\
    An `OverflowError` occurs when the result of an arithmetic operation is too large.\
    \ For example, trying to raise the value 2.0 to the power 1_000_000 results in\
    \ an `OverflowError`:\n\n```python\n>>> pow(2.0, 1_000_000)\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#6>\", line 1, in <module>\n    pow(2.0, 1_000_000)\n\
    OverflowError: (34, 'Result too large')\n```\n\nYou may recall from Chapter 5\
    \ that integers in Python have unlimited precision. This means that `OverflowError`s\
    \ can only occur with floating-point numbers.\n\nRaising the *integer* 2 to the\
    \ value 1_000_000 will not raise an `OverflowError`!\n\nA list of Python's built-in\
    \ exceptions can be found [in the docs](https://docs.python.org/3/library/exceptions.html).\n\
    \n### The try and except Keywords\n\nSometimes you can predict that a certain\
    \ exception might occur. Instead of letting the program crash, you can catch the\
    \ error if it occurs and do something else instead.\n\nFor example, you might\
    \ need to ask the user to input an integer. If the user enters a non-integer value,\
    \ such as the string `\"a\"`, you need to let them know that they entered an invalid\
    \ value.\n\nTo prevent the program from crashing you can use the `try` and `except`\
    \ keywords. Let's look at an example:\n\n```python\ntry:\n    number = int(input(\"\
    Enter an integer: \"))\nexcept ValueError:\n    print(\"That was not an integer\"\
    )\n```\n\nThe `try` keyword is used to indicate a `try` block and is followed\
    \ by a colon. The code indented after `try` is executed. In this case, the user\
    \ is asked to input an integer. Since `input()` returns a string, the user input\
    \ is converted to an integer with `int()` and the result is assigned to the variable\
    \ `number`.\n\nIf the user inputs a non-integer value, the `int()` operation will\
    \ raise a `ValueError`. If that happens, the code indented below the line `except\
    \ ValueError` is executed. So, instead of the program crashing, the string `\"\
    That was not an integer\"` is displayed.\n\nIf the user does input a valid integer\
    \ value, then the code in the `except ValueError` block is never executed.\n\n\
    On the other hand, if a different kind of exception had occurred, such as a `TypeError`,\
    \ then the program will crash. The above example only handles one type of exception\
    \ — a `ValueError`.\n\nYou can handle multiple exception types by separating the\
    \ exception names with commas and putting the list of names in parentheses:\n\n\
    ```python\ndef divide(num1, num2):\n    try:\n        print(num1 / num2)\n   \
    \ except (TypeError, ZeroDivisionError):\n        print(\"encountered a problem\"\
    )\n```\n\nIn this example, the function `divide()` takes two parameters `num1`\
    \ and `num2` and prints the result of dividing `num1` by `num2`.\n\nIf `divide()`\
    \ is called with an argument that is a string, then the division operation will\
    \ raise a `TypeError`. Additionally, if `num2` is 0, then a `ZeroDivisionError`\
