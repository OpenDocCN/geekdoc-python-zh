    assign other widgets to them.


    # Assigning Widgets to Frames


    The following script creates a blank Frame widget and assigns it to the main application
    window:


    ```

    import tkinter as tk


    window = tk.Tk()

    frame = tk.Frame()

    frame.pack()


    window.mainloop()

    ```


    The `frame.pack()` method packs the frame into the window so that the window sizes
    itself as small as possible to encompass the frame.


    When you run the above script, you get some seriously uninteresting output:


    ![](img/4efa9a991b645f75be61871447c559ca_581_0.png)


    An empty Frame widget is practically invisible. Frames are best thought of as
    containers for other widgets. You can assign a widget to a frame by setting the
    widget''s `master` attribute:'
  merge: -1
