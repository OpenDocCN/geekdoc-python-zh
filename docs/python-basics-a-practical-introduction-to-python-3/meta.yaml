    \ »](https://realpython.com/python-basics/resources)\n\n## 11.2 使用包\n\n模块允许你将程序划分为单个文件，这些文件可以根据需要重复使用。相关代码可以组织到一个单独的模块中，并与其他代码保持分离。\n\
    \n包将这种组织结构更进一步，允许你将相关模块分组到一个命名空间下。\n\n在本节中，你将学习如何创建自己的 Python 包，并将该包中的代码导入到另一个模块中。\n\
    \n### 创建包\n\n**包**是一个包含一个或多个 Python 模块的文件夹。它还必须包含一个名为 `__init__.py` 的特殊模块。这里有一个包的示例，以便你可以看到这种结构：\n\
    \n```\nmypackage/\n├── __init__.py\n├── module1.py\n└── module2.py\n```\n\n`__init__.py`\
