    \ `.speak()` 方法的 `sound` 参数提供一个默认值。为此，我们需要在每个品种的类定义中重写 `.speak()` 方法。要重写在父类上定义的方法，你需要在子类上定义一个同名的方法。\n\
    \n让我们看看 `JackRussellTerrier` 类是什么样子的：\n\n```python\nclass JackRussellTerrier(Dog):\n\
    \    def speak(self, sound=\"Arf\"):\n        return f\"{self.name} says {sound}\"\
    \n```\n\n`.speak()` 方法现在在 `JackRussellTerrier` 类上定义，`sound` 的默认参数设置为 `\"Arf\"\
    `。现在你可以在 `JackRussellTerrier` 实例上调用 `.speak()` 而无需向 `sound` 传递参数：\n\n```python\n\
    >>> miles = JackRussellTerrier(\"Miles\", 4)\n>>> miles.speak()\n'Miles says Arf'\n\
    ```\n\n有时狗会发出不同的吠叫声，所以如果迈尔斯生气并咆哮，你仍然可以使用不同的声音调用 `.speak()`：\n\n```python\n>>>\
    \ miles.speak(\"Grrr\")\n'Miles says Grrr'\n```\n\n类继承的一个优点是，对父类的更改将自动传播到其子类。只要被更改的属性或方法没有在子类中被重写，就会发生这种情况。\n\
    \n例如，假设你决定更改 `Dog` 类中 `.speak()` 返回的字符串：\n\n```python\nclass Dog:\n    # 其他属性和方法省略...\n\
    \n    def speak(self, sound):\n        return f\"{self.name} barks: {sound}\"\n\
    ```\n\n现在，当你创建一个名为 `jim` 的新 `Bulldog` 实例时，`jim.speak(\"Woof\")` 的结果将是 `'Jim barks:\
    \ Woof'` 而不是 `'Jim says Woof'`：\n\n```python\n>>> jim = Bulldog(\"Jim\", 5)\n\
    >>> jim.speak(\"Woof\")\n'Jim barks: Woof'\n```\n\n然而，在 `JackRussellTerrier` 实例上调用\
    \ `.speak()` 不会显示新样式的输出：\n\n```python\n>>> miles = JackRussellTerrier(\"Miles\"\
    , 4)\n>>> miles.speak()\n'Miles says Arf'\n```\n\n有时完全重写父类的方法是有意义的。但在这个例子中，我们不希望\
    \ `JackRussellTerrier` 类丢失对 `Dog.speak()` 输出字符串格式所做的任何更改。\n\n为此，你仍然需要在 `JackRussellTerrier`\
    \ 类上定义一个 `.speak()` 方法。但与其显式定义输出字符串，你需要在子类的 `.speak()` 方法*内部*调用 `Dog` 类的 `.speak()`\
    \ 方法，并确保将传递给 `JackRussellTerrier.speak()` 的 `sound` 参数的任何内容传递给它。\n\n你可以通过使用 `super()`\
    \ 函数从子类的方法内部访问父类。以下是你可以如何使用 `super()` 重写 `JackRussellTerrier.speak()` 方法：\n\n\
    ```python\nclass JackRussellTerrier(Dog):\n    def speak(self, sound=\"Arf\"):\n\
    \        return super().speak(sound)\n```\n\n当你在 `JackRussellTerrier` 内部调用 `super().speak(sound)`\
    \ 时，Python 会在父类 `Dog` 中搜索 `.speak()` 方法，并使用变量 `sound` 调用它。现在，当你调用 `miles.speak()`\
    \ 时，你将看到反映 `Dog` 类中新格式的输出：\n\n```python\n>>> miles = JackRussellTerrier(\"Miles\"\
    , 4)\n>>> miles.speak()\n'Miles barks: Arf'\n```"
