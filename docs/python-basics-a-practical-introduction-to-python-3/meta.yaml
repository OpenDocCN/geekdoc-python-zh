    # Python Variable Naming Conventions


    In many programming languages, it is common to write variable names in **camelCase**
    like `numStudents` and `listOfNames`. The first letter of every word, except the
    first, is capitalized, and all other letters are lowercase. The juxtaposition
    of lower-case and upper-case letters look like humps on a camel.


    In Python, however, it is more common to write variable names in **snake case**
    like `num_students` and `list_of_names`. Every letter is lowercase, and each word
    is separated by an underscore.


    While there is no hard-and-fast rule mandating that you write your variable names
    in snake case, the practice is codified in a document called [PEP 8](https://peps.python.org/pep-0008/),
