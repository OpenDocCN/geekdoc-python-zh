  md: '# 4.7 Streamline Your Print Statements


    Suppose you have a string `name = "Zaphod"` and two integers `heads = 2` and `arms
    = 3`. You want to display them in the following line: `Zaphod has 2 heads and
    3 arms`. This is called **string interpolation**, which is just a fancy way of
    saying that you want to insert some variables into specific locations in a string.


    You''ve already seen two ways of doing this. The first involves using commas to
    insert spaces between each part of the string inside of a `print()` function:


    ```

    print(name, "has", str(heads), "heads and", str(arms), "arms")

    ```


    Another way to do this is by concatenating the strings with the `+` operator:


    ```

    print(name + " has " + str(heads) + " heads and " + str(arms) + " arms")

    ```


    Both techniques produce code that can be hard to read. Trying to keep track of
    what goes inside or outside of the quotes can be tough. Fortunately, there''s
    a third way of combining strings: [formatted string literals](https://docs.python.org/3/reference/lexical_analysis.html#f-strings),
    more commonly known as f-strings.


    The easiest way to understand f-strings is to see them in action. Here''s what
    the above string looks like when written as an f-string:


    ```

    >>> f"{name} has {heads} heads and {arms} arms"

    ''Zaphod has 2 heads and 3 arms''

    ```


    There are two important things to notice about the above examples:


    +   1. The string literal starts with the letter `f` before the opening quotation
    mark

    2. Variable names surrounded by curly braces (`{` and `}`) are replaced with their
    corresponding values without using `str()`


    You can also insert Python expressions in between the curly braces. The expressions
    are replaced with their result in the string:'
  merge: -1
