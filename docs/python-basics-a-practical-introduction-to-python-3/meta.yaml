    \n你可以使用 `.bind()` 将任何事件处理函数绑定到任何类型的控件，但使用 `Button` 控件的 `command` 属性将事件处理函数绑定到按钮点击是一种更简单的方法。\n\
    \n## `command` 属性\n\n每个 `Button` 控件都有一个 `command` 属性，你可以将其赋值给一个函数。每当按钮被按下时，该函数就会被执行。\n\
    \n让我们看一个例子。首先，我们将创建一个包含一个 `Label` 控件的窗口，该控件显示一个数值。我们将在标签的左右两侧放置两个按钮。左侧按钮用于减少 `Label`\
    \ 中的值，右侧按钮用于增加该值。\n\n以下是窗口的代码：\n\n```python\nimport tkinter as tk\n\nwindow =\
    \ tk.Tk()\n\nwindow.rowconfigure(0, minsize=50, weight=1)\nwindow.columnconfigure([0,\
    \ 1, 2], minsize=50, weight=1)\n\nbtn_decrease = tk.Button(master=window, text=\"\
    -\")\nbtn_decrease.grid(row=0, column=0, sticky=\"nsew\")\n\nlbl_value = tk.Label(master=window,\
    \ text=\"0\")\nlbl_value.grid(row=0, column=1)\n\nbtn_increase = tk.Button(master=window,\
    \ text=\"+\")\nbtn_increase.grid(row=0, column=2, sticky=\"nsew\")\n\nwindow.mainloop()\n\
    ```\n\n窗口看起来像这样：\n\n![](img/4efa9a991b645f75be61871447c559ca_613_0.png)\n\n定义了应用程序布局后，让我们通过给按钮添加一些命令来让它变得生动起来。\n\
    \n让我们从左边的按钮开始。当按下此按钮时，它应该将标签中的值减少 1。为了做到这一点，我们需要知道两件事：如何获取 Label 中的文本，以及如何更新 Label\
    \ 中的文本。\n\nLabel 控件没有像 Entry 和 Text 控件那样的 `.get()` 方法。但是，你可以通过使用字典风格的下标表示法访问 `text`\
    \ 属性来检索标签中的文本：\n\n```python\nlabel = tk.Label(text=\"Hello\")\n\n# 检索 Label 的文本\n\
    text = label[\"text\"]\n\n# 为标签设置新文本\nlabel[\"text\"] = \"Good bye\"\n```\n\n\
    现在我们知道如何获取和设置标签的文本了，让我们编写一个函数 `increase()`，将 `lbl_value` 中的值增加 1：\n\n```python\n\
    def increase():\n    value = int(lbl_value[\"text\"])\n    lbl_value[\"text\"\
    ] = f\"{value + 1}\"\n```\n\n`increase()` 从 `lbl_value` 获取文本并使用 `int()` 将其转换为整数。然后它将该值增加\
    \ 1，并将标签的 `text` 属性设置为这个新值。\n\n我们还需要一个 `decrease()` 函数，将 `lbl_value` 中的值减少 1：\n\
    \n```python\ndef decrease():\n    value = int(lbl_value[\"text\"])\n    lbl_value[\"\
    text\"] = f\"{value - 1}\"\n```\n\n将 `increase()` 和 `decrease()` 函数放在代码中 import\
    \ 语句之后。\n\n要将按钮连接到函数，请将函数赋值给按钮的 `command` 属性。你可以在实例化按钮时执行此操作。例如，要将 `increase()`\
    \ 函数赋值给 `btn_increase`，请将实例化按钮的行更新为以下内容：\n\n```python\nbtn_increase = tk.Button(master=window,\
    \ text=\"+\", command=increase)\n```\n\n现在将 `decrease()` 函数赋值给 `btn_decrease`：\n\
    \n```python\nbtn_decrease = tk.Button(master=window, text=\"-\", command=decrease)\n\
    ```\n\n这就是将按钮绑定到 increase() 和 decrease() 函数并使程序运行所需做的全部工作。尝试保存你的更改并运行应用程序！\n\n\
    以下是完整的应用程序代码供你参考：\n\n```python\nimport tkinter as tk\n\ndef increase():\n    value\
    \ = int(lbl_value[\"text\"])\n    lbl_value[\"text\"] = f\"{value + 1}\"\n\ndef\
