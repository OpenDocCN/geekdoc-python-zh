    # 15.1 An Introduction to SQLite


    There are numerous SQL databases, and some are better suited to particular purposes
    than others. One of the simplest, most lightweight SQL databases is SQLite, which
    runs directly on your machine and comes bundled with Python automatically.


    In this section, you will learn how to use the `sqlite3` package to create a new
    database and store and retrieve data.


    # SQLite Basics


    There are four basic steps to working with SQLite:


    +   1. Import the `sqlite3` package

    2. Connect to an existing database, or create a new database

    3. Execute SQL statements on the database

    4. Close the database connection


    Let’s get started by exploring these four steps in IDLEs interactive window. Open
    IDLE and type the following:


    ```

    >>> import sqlite3

    >>> connection = sqlite3.connect("test_database.db")

    ```


    The `sqlite3.connect()` function is used to connect to, or create, a database.
    When you execute `.connect("test_database.db")`, Python searches for an existing
    database called "test_database.db". If no database with that name is found, a
    new one is created in the current working directory. To create a database in a
    different directory, you must specify the full path in the argument to `.connect()`.'
