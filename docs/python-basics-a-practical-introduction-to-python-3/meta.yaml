  md: '# What Pythonistas Say About *Python Basics: A Practical Introduction to Python
    3*


    > “I love [the book]! The wording is casual, easy to understand, and makes the
    information flow well. I never feel lost in the material, and it’s not too dense
    so it’s easy for me to review older chapters over and over.


    I’ve looked at over 10 different Python tutorials/books/online courses, and I’ve
    probably learned the most from Real Python!”


    — **Thomas Wong**


    > “Three years later and I still return to my Real Python books when I need a
    quick refresher on usage of vital Python commands.”


    — **Rob Fowler**


    > “I floundered for a long time trying to teach myself. I slogged through dozens
    of incomplete online tutorials. I snoozed through hours of boring screencasts.
    I gave up on countless crufty books from big-time publishers. And then I found
    Real Python.


    The easy-to-follow, step-by-step instructions break the big concepts down into
    bite-sized chunks written in plain English. The authors never forget their audience
    and are consistently thorough and detailed in their explanations. I’m up and running
    now, but I constantly refer to the material for guidance.”


    — **Jared Nielsen**'
  merge: -1
  pgno: 6
- img_proc: true
  md: '> “I love the book because at the end of each particular lesson there are real
    world and interesting challenges. I just built a savings estimator that actually
    reflects my savings account – neat!”


    — Drew Prescott


    > “As a practice of what you taught I started building simple scripts for people
    on my team to help them in their everyday duties. When my managers noticed that,
    I was offered a new position as a developer.


    I know there is heaps of things to learn and there will be huge challenges, but
    I finally started doing what I really came to like.


    Once again: MANY THANKS!”


    — Kamil


    > “What I found great about the Real Python courses compared to others is how
    they explain things in the simplest way possible.


    A lot of courses, in any discipline really, require the learning of a lot of jargon
    when in fact what is being taught could be taught quickly and succinctly without
    too much of it. The courses do a very good job of keeping the examples interesting.”


    — Stephen Grady


    > “After reading the first Real Python course I wrote a script to automate a mundane
    task at work. What used to take me three to five hours now takes less than ten
    minutes!”


    — Brandon Youngdale'
  merge: -1
  pgno: 7
- img_proc: true
  md: '> “Honestly, throughout this whole process what I found was just me looking
    really hard for things that could maybe be added or improved, but this tutorial
    is amazing! You do a wonderful job of explaining and teaching Python in a way
    that people like me, a complete novice, could really grasp.


    The flow of the lessons works perfectly throughout. The exercises truly helped
    along the way and you feel very accomplished when you finish up the book. I think
    you have a gift for making Python seem more attainable to people outside the programming
    world.


    This is something I never thought I would be doing or learning and with a little
    push from you I am learning it and I can see that it will be nothing but beneficial
    to me in the future!”


    — Shea Klusewicz


    > “The authors of the courses have NOT forgotten what it is like to be a beginner
    – something that many authors do – and assume nothing about their readers, which
    makes the courses fantastic reads. The courses are also accompanied by some great
    videos as well as plenty of references for extra learning, homework assignments
    and example code that you can experiment with and extend.


    I really liked that there was always full code examples and each line of code
    had good comments so you can see what is doing what.


    I now have a number of books on Python and the Real Python ones are the only ones
    I have actually finished cover to cover, and they are hands down the best on the
    market. If like me, you’re not a programmer (I work in online marketing) you’ll
    find these courses to be like a mentor due to the clear, fluff-free explanations!
    Highly recommended!”


    — Craig Addyman'
