    # 18.6. Controlling Layout With Geometry Managers


    Each `Frame` is placed at the top-most available position. The red `Frame` is
    placed at the top of the window. Then the yellow `Frame` is placed just below
    the red one, and the blue `Frame` just below the yellow one.


    There are three invisible parcels containing each of the three `Frame` widgets.
    Each parcel is as wide as the window and as tall as the `Frame` that it contains.
    Since no anchor point was specified when `.pack()` was called for each `Frame`,
    they are all centered inside of their parcels. That''s why each `Frame` is centered
    in the window.


    `.pack()` accepts some keyword arguments for more precisely configuring widget
    placement. For example, you can set the `fill` keyword argument to specify which
    direction the frames should fill. The options are `tk.X` to fill in the horizontal
    direction, `tk.Y` to fill vertically, and `tk.BOTH` to fill in both directions.


    Here''s how you would stack the three frames so that each one fills the whole
    window horizontally:


    ```

    import tkinter as tk


    window = tk.Tk()


    frame1 = tk.Frame(master=window, height=100, bg="red")

    frame1.pack(fill=tk.X)


    frame2 = tk.Frame(master=window, height=50, bg="yellow")

    frame2.pack(fill=tk.X)


    frame3 = tk.Frame(master=window, height=25, bg="blue")

    frame3.pack(fill=tk.X)


    window.mainloop()

    ```


    Notice that the `width` is not set on any of the `Frame` widgets. `width` is no
    longer necessary because the `.pack()` method on each frame is set to fill horizontally,
    overriding any width you may set.'
