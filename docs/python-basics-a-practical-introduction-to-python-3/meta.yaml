    [Leave feedback on this section »](https://realpython.com/python-basics/resources)\n\
    \n## 4.8 Find a String in a String\n\nOne of the most useful string methods is\
    \ `.find()`. As its name implies, you can use this method to find the location\
    \ of one string in another string—commonly referred to as a **substring**.\n\n\
    To use `.find()`, tack it to the end of a variable or a string literal and pass\
    \ the string you want to find in between the parentheses:\n\n```python\n>>> phrase\
    \ = \"the surprise is in here somewhere\"\n>>> phrase.find(\"surprise\")\n4\n\
    ```\n\nThe value that `.find()` returns is the index of the first occurrence of\
    \ the string you pass to it. In this case, \"surprise\" starts at the fifth character\
    \ of the string \"the surprise is in here somewhere\" which has index 4 because\
    \ counting starts at 0.\n\nIf `.find()` doesn't find the desired substring, it\
    \ will return -1 instead:"
