- md: '## 16.2. Use an HTML Parser to Scrape Websites


    ```python

    page = urlopen(url)

    html = page.read().decode("utf-8")

    soup = BeautifulSoup(html, "html.parser")

    ```


    This script does three things:


    1.  The URL http://olympus.realpython.org/profiles/dionysus is opened using the
    urlopen() function from the urllib.request module.

    2.  The HTML from the page is read as a string and assigned to the html variable.

    3.  A BeautifulSoup object is created and assigned to the soup variable.


    The BeautifulSoup object assigned to soup is created with two arguments. The first
    argument is the HTML to be parsed and the second argument, the string "html.parser",
    tells the object which parser to use behind the scenes. "html.parser" represents
    Python''s built-in HTML parser.


    Save and run the above script in IDLE. When it is finished running, you can use
    the soup variable in the interactive window to parse the content of html in various
    ways.


    For example, BeautifulSoup objects have a .get_text() method that can be used
    to extract all of the text from the document and remove any HTML tags automatically.


    Type the following code into IDLE''s interactive window:


    ```python

    >>> print(soup.get_text())


    Profile: Dionysus

    Name: Dionysus

    Hometown: Mount Olympus

    Favorite animal: Leopard

    Favorite Color: Wine

    ```


    There are a lot of blank lines in this output. These are the result of newline
    characters in the HTML document’s text. You can remove these with the string `.replace()`
    method, if you need to.


    Often, you only need to get specific text from an HTML document. Using Beautiful
    Soup to extract the text first and then using the `.find()` string method is *sometimes*
    easier than working with regular expressions.


    However, sometimes the HTML tags themselves are the elements that point out the
    data you want to retrieve. For instance, perhaps you want to retrieve the URLs
    for all the images on the page. These links are contained in the `src` attribute
    of `<img>` HTML tags. In this case, you can use the `find_all()` method to return
    a list of all instances of that particular tag:


    ```python

    >>> soup.find_all("img")

    [<img src="/static/dionysus.jpg"/>, <img src="/static/grapes.png"/>]

    ```


    This returns a list of all `<img>` tags in the HTML document. The objects in the
    list look like they might be strings representing the tags, but they are actually
    instances of the `Tag` object provided by Beautiful Soup. `Tag` objects provide
    a simple interface for working with the information they contain.


    Let’s explore this a little by first unpacking the `Tag` objects from the list:


    ```python

    >>> image1, image2 = soup.find_all("img")

    ```


    Each Tag object has a .name property that returns a string containing the HTML
    tag type:


    ```python

    >>> image1.name

    ''img''

    ```


    You can access the HTML attributes of the Tag object by putting their name in-between
    square brackets, just as if the attributes were keys in a dictionary.


    For example, the <img src="/static/dionysus.jpg"/> tag has a single attribute
    src with the value dionysus.jpg. Likewise, an HTML tag such as the link <a href="https://realpython.com"
    target="_blank"> has two attributes, href and target.


    To get the source of the images in the Dionysus profile page, you access the src
    attribute using the dictionary notation mentioned above:


    ```python

    >>> image1["src"]

    ''/static/dionysus.jpg''


    >>> image2["src"]

    ''/static/grapes.png''

    ```


    Certain tags in HTML documents can be accessed by properties of the Tag object.
    For example, to get the <title> tag in a document, you can use the .title property:


    ```python

    >>> soup.title

    <title>Profile: Dionysus</title>

    ```


    If you look at the source of the Dionysus profile by navigating to the URL http://olympus.realpython.org/profiles/dionysus,
    right-clicking on the page, and selecting “View Page Source,” you will notice
    that the <title> tag as written in the document looks like this:


    ```html

    <title >Profile: Dionysus<|title|>

    ```


    Beautiful Soup automatically cleans up the tags for you by removing the extra
    space in the opening tag and the extraneous / in the closing tag.


    You can also retrieve just the string in the title tag with the .string property
    of the Tag object:


    ```python

    >>> soup.title.string

    ''Profile: Dionysus''

    ```


    One of the more useful features of Beautiful Soup is the ability to search for
    specific kinds of tags whose attributes match certain values. For example, if
    we want to find all of the <img> tags that have a src attribute equal to the value
    /static/dionysus.jpg, you can provide the following additional argument to the
    .find_all() method:


    ```python

    >>> soup.find_all("img", src="/static/dionysus.jpg")

    [<img src="/static/dionysus.jpg"/>]

    ```


    This example is somewhat arbitrary, and the usefulness of this technique may not
    be apparent from the example. If you spend some time browsing various websites
    and viewing their page source, you''ll notice that many websites have extremely
    complicated HTML structure.


    When scraping data from websites, you are often interested in particular parts
    of the page. By spending some time looking through the HTML document, you can
    identify tags with unique attributes that can be used to extract the data you
    need.


    Then, instead of relying on complicated regular expressions or using .find() to
    search through the document, you can directly access the particular tag you are
    interested in and extract the data you need.


    In some cases, you may find that Beautiful Soup does not offer the functionality
    you need. The lxml library is somewhat trickier to get started with but offers
    far more flexibility than Beautiful Soup for parsing HTML documents. You may want
    to check it out once you are comfortable with using Beautiful Soup.


    > **Note**


    HTML parsers like Beautiful Soup can save you a lot of time and effort when it
    comes to locating specific data in webpages. However, sometimes HTML is so poorly
    written and disorganized that even a sophisticated parser like Beautiful Soup
    can''t interpret the HTML tags properly.


    In this case, you''re often left to your own devices (namely, .find() and regex)
    to try to parse out the information you need.


