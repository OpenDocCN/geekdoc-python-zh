- md: '## 16.1. Scrape and Parse Text From Websites


    that matches a given regular expression. The first argument of `re.findall()`
    is the regular expression that you want to match, and the second argument is the
    string to test:


    ```python

    >>> import re


    >>> re.findall("ab*c", "ac")

    [''ac'']


    >>> re.findall("ab*c", "abcd")

    [''abc'']


    >>> re.findall("ab*c", "acc")

    [''ac'']


    >>> re.findall("ab*c", "abcac")

    [''abc'', ''ac'']


    >>> re.findall("ab*c", "abdc")

    []

    ```


    Our regular expression, `ab*c`, matches any part of the string that begins with
    an “a,” ends with a “c,” and has zero or more of “b” in between the two. The `re.findall()`
    function returns a list of all matches. If no matches are found, an empty list
    is returned.


    Note that the matching is case-sensitive. If you want to match this pattern regardless
    of upper-case or lower-case differences, you can pass a third argument with the
    value `re.IGNORECASE`, which is a specific variable stored in the `re` module:


    ```python

    >>> re.findall("ab*c", "ABC")

    []


    >>> re.findall("ab*c", "ABC", re.IGNORECASE)

    [''ABC'']

    ```


    You can use a period `.` to stand for any single character in a regular expression.
    For instance, we could find all the strings that contain the letters “a” and “c”
    separated by a single character as follows:


    ```python

    >>> re.findall("a.c", "abc")

    [''abc'']


    >>> re.findall("a.c", "abbc")

    []


    >>> re.findall("a.c", "ac")

    []


    >>> re.findall("a.c", "acc")

    [''acc'']

    ```


    Putting the term `.*` inside of a regular expression stands for any character
    repeated any number of times. For instance, “a.*c” can be used to find every substring
    that starts with “a” and ends with “c”, regardless of which letter—or letters—are
    in-between:


    ```python

    >>> re.findall("a.*c", "abc")

    [''abc'']


    >>> re.findall("a.*c", "abbc")

    [''abbc'']


    >>> re.findall("a.*c", "ac")

    [''ac'']


    >>> re.findall("a.*c", "acc")

    [''acc'']

    ```


    Often, you use the `re.search()` function to search for a particular pattern inside
    a string. This function is somewhat more complicated than `re.findall()` because
    it returns an object called a `MatchObject` that stores different “groups” of
    data. This is because there might be matches inside of other matches, and `re.search()`
    returns every possible result.


    The details of the `MatchObject` object are irrelevant here. For now, just know
    that calling the `.group()` method on a `MatchObject` will return the first and
    most inclusive result, which in most instances is just what you want. For instance:


    ```python

    >>> match_results = re.search("ab*c", "ABC", re.IGNORECASE)

    >>> match_results.group()

    ''ABC''

    ```


    There is one more function in the `re` module that is useful for parsing out text.
    The `re.sub()` function, which is short for “substitute,” allows you to replace
    text in a string that matches a regular expression with new text (sort of like
    the `.replace()` method). The arguments passed to `re.sub()` are the regular expression,
    followed by the replacement text, followed by the string. For example:


    ```python

    >>> string = "Everything is <replaced> if it''s in <tags>."

    >>> string = re.sub("<.*>", "ELEPHANTS", string)

    >>> string

    ''Everything is ELEPHANTS.''

    ```


    Perhaps that wasn''t quite what you expected to happen.


    The `re.sub()` function uses the regular expression `"<.*>"` to find and replace
    everything in between the first `<` and last `>`, which is most of the string.
    This is because Python''s regular expressions are **greedy**, meaning that they
    try to find the longest possible match when characters like `*` are used.


    Alternatively, you can use the non-greedy matching pattern `*?`, which works the
    same way as `*` except that it matches the shortest possible string of text:


    ```python

    >>> string = "Everything is <replaced> if it''s in <tags>."

    >>> string = re.sub("<.*?>", "ELEPHANTS", string)

    >>> string

    "Everything is ELEPHANTS if it''s in ELEPHANTS."

    ```


    ## 16.1. Scrape and Parse Text From Websites


    Armed with all this knowledge, let’s now try to parse out the title from `http://olympus.realpython.org/profiles/dionysus`,
    which includes this rather carelessly written line of HTML:


    ```html

    <TITLE >Profile: Dionysus</title / >

    ```


    The `.find()` method would have a difficult time dealing with the inconsistencies
    here, but with the clever use of regular expressions, you can handle this code
    easily:


    ```python

    import re

    from urllib.request import urlopen


    url = "http://olympus.realpython.org/profiles/dionysus"

    page = urlopen(url)

    html = page.read().decode("utf-8")


    pattern = "<title.*?>.*?</title.*?>"

    match_results = re.search(pattern, html, re.IGNORECASE)

    title = match_results.group()

    title = re.sub("<.*?>", "", title) # Remove HTML tags


    print(title)

    ```


    Let’s take a closer look at the first regular expression in the pattern string
    by breaking it down into three parts—`<title.*?>`, `.*?`, and `</title.*?>`.


    1. `<title.*?>`—This pattern matches the opening `<TITLE >` tag in `html`. The
    `<title` part of the pattern matches with `<TITLE` because `re.search()` is called
    with `re.IGNORECASE`, and `.*?>` matches any text after `<TITLE` up to the first
    instance of `>`.

    2. `.*?`—This pattern matches all text after the opening `<TITLE >` non-greedily,
    stopping at the first match for `</title.*?>`.

    3. `</title.*?>`—The only difference between this pattern and the first one is
    the `/` character, so this matches the closing `</title / >` tag in `html`.


    The second regular expression, the string `"<.*?>"` also uses the non-greedy `.*?`
    to match all the HTML tags in the `title` string. By replacing any matches with
    `""`, the `re.sub()` function removes all of the tags returns only the text.


    Regular expressions are a powerful tool when used correctly. This introduction
    barely scratches the surface. You can learn more about regular expressions and
    how to use them in the [Python Regular Expression HOWTO](https://docs.python.org/3/howto/regex.html)
    section of the Python documentation.


    > **Note**

    >

    > Web scraping can be tedious. No two websites are organized the same way, and
    HTML is often messy. Moreover, websites change over time. Web scrapers that work
    today are not guaranteed to work next year—or next week, for that matter!


    ## Review Exercises


    *You can find the solutions to these exercises and many other bonus resources
    online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources/).*


    1. Write a script that grabs the full HTML from the page `http://olympus.realpython.org/profiles/dionysus`

    2. Use the string `.find()` method to display the text following "Name:" and "Favorite
    Color:" (not including any leading spaces or trailing HTML tags that might appear
    on the same line).

    3. Repeat the previous exercise using regular expressions. The end of each pattern
    should be a "<" (the start of an HTML tag) or a newline character, and you should
    remove any extra spaces or newline characters from the resulting text using the
    string `.strip()` method.


    [Leave feedback on this section »](https://realpython.com/python-basics/resources/)


    ## 16.2 Use an HTML Parser to Scrape Websites


    Although regular expressions are great for pattern matching in general, sometimes
    it''s easier to use an HTML parser that is explicitly designed for parsing out
    HTML pages. There are many Python tools written for this purpose, but the [Beautiful
    Soup](http://www.crummy.com/software/BeautifulSoup/) library is a good one to
    start with.


    To install Beautiful Soup, you can run the following in your terminal:


    ```

    $ pip3 install beautifulsoup4

    ```


    Run `pip show` to see the details of the package you just installed:


    ```

    $ pip3 show beautifulsoup4

    Name: beautifulsoup4

    Version: 4.6.3

    Summary: Screen-scraping library

    Home-page: http://www.crummy.com/software/BeautifulSoup/bs4/

    Author: Leonard Richardson

    Author-email: leonardr@segfault.org

    License: MIT

    Location: c:\realpython\venv\lib\site-packages

    Requires:

    Required-by:

    ```


    In particular, notice that the latest version at the time of writing in 4.6.3.


    Once you have Beautiful Soup installed, you can now import the `bs4` module and
    pass a string of HTML to `BeautifulSoup` to begin parsing:


    ```python

    from bs4 import BeautifulSoup

    from urllib.request import urlopen


    url = "http://olympus.realpython.org/profiles/dionysus"

    ```'
