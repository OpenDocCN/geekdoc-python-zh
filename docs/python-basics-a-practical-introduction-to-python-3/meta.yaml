    \ but the truth\" with the string \"lies\":\n\n```python\n>>> my_story = \"I'm\
    \ telling you the truth; nothing but the truth!\"\n>>> my_story.replace(\"the\
    \ truth\", \"lies\")\n\"I'm telling you lies; nothing but lies!\"\n```\n\nSince\
    \ strings are immutable objects, `.replace()` doesn't alter `my_story`. If you\
    \ immediately type `my_story` into the interactive window after running the above\
    \ example, you'll see the original string, unaltered:\n\n```python\n>>> my_story\n\
    \"I'm telling you the truth; nothing but the truth!\"\n```\n\nTo change the value\
    \ of `my_story`, you need to reassign to it the new value returned by `.replace()`:\n\
    \n```python\n>>> my_story = my_story.replace(\"the truth\", \"lies\")\n>>> my_story\n\
    \"I'm telling you lies; nothing but lies!\"\n```\n\n`.replace()` can only replace\
