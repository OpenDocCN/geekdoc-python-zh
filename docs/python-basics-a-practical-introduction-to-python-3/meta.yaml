    # # 5.5 Math Functions and Number Methods


    Python has a few built-in functions you can use to work with numbers. In this
    section, you''ll learn about three of the most common ones:


    +   1. `round()`, for rounding numbers to some number of decimal places

    2. `abs()`, for getting the absolute value of a number

    3. `pow()`, for raising a number to some power


    You''ll also learn about a method that floating-point numbers have to check whether
    or not they have an integer value.


    Let''s go!


    # ## The round() function


    You can use `round()` to round a number to the nearest integer:


    ```

    >>> round(2.3)

    2


    >>> round(2.7)

    3

    ```


    `round()` has some unexpected behavior when the number ends in .5:


    ```

    >>> round(2.5)

    2


    >>> round(3.5)

    4

    ```


    2.5 gets rounded down to 2 and 3.5 is rounded up to 4. Most people expect a number
    that ends in .5 to get rounded up, so let''s take a closer look at what''s going
    on here.


    Python 3 rounds numbers according to a strategy called **rounding**'
  - "[PAGE 122]\n\n# 5.5. Math Functions and Number Methods\n\n**ties to even.** A\
    \ **tie** is any number whose last digit is a five. 2.5 and 3.1415 are ties, but\
    \ 1.37 is not.\n\nWhen you round ties to even, you first look at the digit one\
    \ decimal place to the left of the last digit in the tie. If that digit is even,\
    \ you round down. If the digit is odd, you round up. That's why 2.5 rounds down\
    \ to 2 and 3.5 round up to 4.\n\n> **Note**\n\nRounding ties to even is the rounding\
    \ strategy recommended for floating-point numbers by the [IEEE](https://en.wikipedia.org/wiki/IEEE)\
    \ (Institute of Electrical and Electronics Engineers) because it helps limit the\
    \ impact rounding has on operations involving lots of numbers.\n\nThe IEEE maintains\
    \ a standard called [IEEE 754](https://en.wikipedia.org/wiki/IEEE_754) for how\
    \ floating-point numbers are dealt with on a computer. It was published in 1985\
    \ and is still commonly used by hardware manufacturers today.\n\nYou can round\
    \ a number to a given number of decimal places by passing a second argument to\
    \ `round()`:\n\n```\n>>> round(3.14159, 3)\n3.142\n\n>>> round(2.71828, 2)\n2.72\n\
    ```\n\nThe number 3.14159 is rounded to 3 decimal places to get 3.142, and the\
    \ number 2.71828 is rounded to 2 decimal places to get 2.72.\n\nThe second argument\
    \ of `round()` must be an integer. If it isn't, Python raises a TypeError:\n\n\
    ```\n>>> round(2.65, 1.4)\nTraceback (most recent call last):\n  File \"<pyshell#0>\"\
    , line 1, in <module>\n```"
