    \n## 18.2. Example App: PDF Page Rotator\n\n1. Create the following dialog box:\n\
    \n2. Create the following dialog box:\n\nLeave feedback on this section »\n\n\
    ## 18.2 Example App: PDF Page Rotator\n\nEasyGUI is a great choice for utility\
    \ applications that automate simple yet repetitive tasks. If you work in an office,\
    \ you can really boost your productivity by creating tools with EasyGUI that take\
    \ the pain out of everyday TODO items.\n\nIn this section, you'll use some of\
    \ the EasyGUI dialog boxes you learned about in the last section to create an\
    \ application for rotating PDF pages.\n\nIn doing so, you'll bring together a\
    \ lot of the concepts you've learned about thus far, including for loops (Chapter\
    \ 6), conditional logic (Chapter 8), reading and writing files (Chapter 12), and\
    \ working with PDF files (Chapter 14).\n\n## The Application Design\n\nBefore\
    \ we dive into the code, let’s put some thought into how the program should work.\n\
    \nThe program needs to ask the user which PDF file to open, by how many degrees\
    \ they want to rotate each page, and where the user would like to save the new\
    \ PDF. Then the program needs to open the file, rotate the pages, and save the\
    \ new file.\n\nLet’s map this out into explicit steps that we can more easily\
    \ translate into code:\n\n- 1. Display a file selection dialog for opening a PDF\
    \ file.\n- 2. If the user cancels the dialog, then exit the program.\n- 3. Let\
    \ the user select one of 90, 180 or 270 degrees to rotate the PDF pages.\n- 4.\
    \ Display a file selection dialog for saving the rotated PDF.\n- 5. If the user\
    \ tries to save a file with the same name as the input file:\n    - Alert the\
    \ user with a message box that this is not allowed.\n    - Return to step 4.\n\
    - 6. If the user cancels the file save dialog, then exit the program.\n- 7. Perform\
    \ the page rotation:\n    - Open the selected PDF.\n    - Rotate all of the pages.\n\
    \    - Save the rotated PDF to the selected file.\n\n> **Note**\n\nWhen you are\
    \ designing an application, it helps to plan out each step before you start coding.\
    \ For large applications, drawing diagrams describing the program flow can help\
    \ keep everything organized.\n\n## Implementing the Design\n\nNow that we have\
    \ a plan, let's tackle each step one at a time. Open a new script window in IDLE\
    \ to follow along.\n\nFirst, import EasyGUI and PyPDF2:\n\n```\nimport easygui\
    \ as gui\nfrom PyPDF2 import PdfFileReader, PdfFileWriter\n```\n\nStep 1 in our\
    \ plan is to display a file selection dialog for opening a PDF file. We can do\
    \ this with `fileopenbox()`:\n\n```\n# 1. Display a file selection dialog for\
    \ opening a PDF file.\ninput_path = gui.fileopenbox(\n    title=\"Select a PDF\
    \ to rotate...\",\n    default=\"*.pdf\"\n)\n```\n\nHere we've set the `default`\
    \ parameter to `\"*.pdf\"`, which configures the dialog to only display files\
    \ with the `.pdf` extension. This helps prevent the user from accidentally selecting\
    \ a file that isn't a PDF.\n\nThe file path selected by the user is assigned to\
    \ the `input_path` variable. If the user closed the dialog without selecting a\
    \ file path (Step 2), then `input_path` is `None`. In this case, we need to exit\
    \ the program:\n\n```\n# 2. If the user cancels the dialog, then exit the program.\n\
    if input_path is None:\n    exit()\n```\n\nThe third step is to ask the user how\
    \ much they would like to rotate the PDF pages. They can choose either 90, 180,\
