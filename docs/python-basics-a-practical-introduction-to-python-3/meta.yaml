    # # Chapter 18


    # # Graphical User Interfaces


    Throughout this book, you have been creating **command-line applications**, which
    are programs that are started from and produce output in a terminal window.


    Command-line apps are fine for making tools that you or other developers might
    use, but the vast majority of software users never want to open a terminal!


    **Graphical User Interfaces**, called **GUIs** for short and pronounced “gooey”,
    have windows with components like buttons and text fields. They provide users
    with a familiar and visual way to interact with a program.


    **In this chapter, you’ll learn how to:**


    +   - Add a simple GUI to a command line application with EasyGUI

    - Create full-featured GUI applications with Tkinter


    Let’s get started!


    [Leave feedback on this section »](Leave feedback on this section »)'
- md: "## 18.1 Add GUI Elements With EasyGUI\n\nYou can use the EasyGUI library to\
    \ quickly add a graphical user interface to your program. EasyGUI is somewhat\
    \ limited, but works well for simple tools that just needs a little bit of input\
    \ from the user.\n\nIn this section, you'll use EasyGUI to create a short GUI\
    \ program that allows a user to pick a PDF file from their hard drive and rotate\
    \ its pages by a selected amount.\n\n## Installing EasyGUI\n\nTo get started,\
    \ you need to install EasyGUI with `pip3`:\n\n```\n$ pip3 install easygui\n```\n\
    \nOnce EasyGUI is installed, you can check out some details of the package with\
    \ `pip3 show`:\n\n```\n$ pip3 show easygui\nName: easygui\nVersion: 0.98.1\nSummary:\
    \ EasyGUI is a module for very simple, very easy GUI\n         programming in\
    \ Python.  EasyGUI is different from other\n         GUI generators in that EasyGUI\
    \ is NOT event-driven.\n         Instead, all GUI interactions are invoked by\
    \ simple\n         function calls.\nHome-page: https://github.com/robertlugg/easygui\n\
    Author: easygui developers and Stephen Ferg\nAuthor-email: robert.lugg@gmail.com\n\
    License: BSD\nLocation: c:\\realpython\\venv\\lib\\site-packages\nRequires:\n\
    Required-by:\n```\n\nThe code in this chapter is written using EasyGUI version\
    \ 0.98.1, the same version you see in the information shown above.\n\n## Your\
    \ First EasyGUI Application\n\nEasyGUI is great for displaying **dialog boxes**\
    \ to collect user input and display output. It is not particularly great for creating\
    \ a large application with several windows, menus, and toolbars.\n\nYou can think\
    \ of EasyGUI as a sort of replacement for the `input()` and `print()` functions\
    \ that you have been using for input and output.\n\nProgram flow with EasyGUI\
    \ typically works like this:\n\n1. At some point in the code, a visual element\
    \ is displayed on the user's screen.\n2. Execution of the code pauses until the\
    \ user provides input with the visual element.\n3. The user's input is returned\
    \ as an object and execution of the code is resumed.\n\nTo get a feel for how\
    \ EasyGUI works, open a new interactive window in IDLE and execute the following\
    \ lines of code:\n\n```\n>>> import easygui as gui\n>>> gui.msgbox(msg=\"Hello!\"\
    , title=\"My first message box\")\n```\n\nIf you run the code on Windows, you\
    \ will see a window like the following displayed on your screen:\n\n![](img/4efa9a991b645f75be61871447c559ca_537_0.png)\n\
    \nThe window’s appearance depends on the operating system on which the code is\
    \ executed. On macOS, the window looks like this one:\n\n![](img/4efa9a991b645f75be61871447c559ca_538_0.png)\n\
    \nHere’s what the window looks like on Ubuntu:\n\n![](img/4efa9a991b645f75be61871447c559ca_538_1.png)\n\
    \nFor the rest of this section, Windows screenshots will be shown.\nBoth EasyGUI\
    \ and IDLE are written using the Tkinter library, which you’ll learn about in\
    \ the next section. This overlap sometimes causes issues with execution, such\
    \ as dialog boxes getting frozen or stuck.\n\nIf you think this might be happening\
    \ to you, try running your code from a terminal. You can start an interactive\
    \ Python session from a terminal with the `python` command on Windows and `python3`\
    \ on macOS/Ubuntu.\n\nLet's break down what you see in the dialog box you generated\
    \ with the code above:\n\n1. The string \"Hello!\" passed to the `msg` parameter\
    \ of `msgbox()` is displayed as the message in the message box.\n2. The string\
    \ \"My first message box\" passed to the `title` parameter is displayed as the\
    \ title of the message box.\n3. There is one button in the message box labelled\
    \ OK.\n\nPress the OK button to close the dialog box and look at IDLE's interactive\
    \ window. The string 'OK' is displayed below the last line of code you typed:\n\
    \n```\n>>> gui.msgbox(msg=\"Hello, EasyGUI!\", title=\"My first message box\"\
    )\n'OK'\n```\n\n`msgbox()` returns the button label when the dialog box is closed.\
    \ If the dialog box is closed without pressing the OK button, then the value `None`\
    \ is returned.\n\nYou can customize the button label by setting a third optional\
    \ parameter called `ok_button`. For example, the following creates a message box\
    \ with a button labeled *Click me*:\n\n```\n>>> gui.msgbox(msg=\"Hello!\", title=\"\
    Greeting\", ok_button=\"Click me\")\n```\n\n`msgbox()` is great for displaying\
    \ a message, but it doesn't provide the user with many options for interacting\
    \ with your program. EasyGUI has several functions that display various types\
    \ of dialog boxes. Let's explore some of these now!\n\n## EasyGUI's Ensemble of\
    \ GUI Elements\n\nBesides `msgbox()`, EasyGUI has several other functions for\
    \ displaying different kinds of dialog boxes. The following table summarizes some\
    \ of the available functions:\n\n| Function | Description |\n| :--- | :--- |\n\
    | `msgbox()` | A dialog box for displaying a message with a single button. It\
    \ returns the label of the button. |\n| `buttonbox()` | A dialog box with several\
    \ buttons. It returns the label of the selected button. |\n| `indexbox()` | A\
    \ dialog box with several buttons. It returns the index of the selected button.\
    \ |\n| `enterbox()` | A dialog box with a text entry box. It returns the text\
    \ entered. |\n| `fileopenbox()` | A dialog box for selecting a file to be opened.\
    \ It returns the absolute path to the selected file. |\n| `diropenbox()` | A dialog\
    \ box for selecting a directory to be opened. It returns the absolute path to\
    \ the selected directory. |\n| `filesavebox()` | A dialog box for saving a file.\
    \ It returns the absolute path to the location for saving the file. |\n\nLet's\
    \ look at each one of these individually.\n\n## buttonbox()\n\nEasyGUI's `buttonbox()`\
    \ displays a dialog box with a message and several buttons that the user can click.\
    \ The label of the clicked button is returned to your program.\n\nJust like `msgbox()`,\
    \ the `buttonbox()` function has `msg` and `title` parameters for setting the\
    \ message to be displayed and the title of the dialog box. `buttonbox()` has a\
    \ third parameter called `choices` that is used to set up the buttons.\n\nFor\
    \ example, the following code produces a dialog box with three buttons labelled\
    \ \"Red\", \"Yellow\", and \"Blue\":\n\n```\n>>> gui.buttonbox(\n...     msg=\"\
    What is your favorite color?\",\n...     title=\"Choose wisely...\",\n...    \
    \ choices=(\"Red\", \"Yellow\", \"Blue\"),\n... )\n```\n\nHere's what the dialog\
    \ box looks like:\n\n![](img/4efa9a991b645f75be61871447c559ca_541_0.png)\n\nWhen\
    \ you press one of the buttons, the button label is returned as a string. For\
    \ example, if you press the `Yellow` button, you'll see the string 'Yellow' displayed\
    \ in the output of the interactive window just below the `buttonbox()` function:\n\
    \n```\n>>> gui.buttonbox(\n...     msg=\"What is your favorite color?\",\n...\
    \     title=\"Choose wisely...\",\n...     choices=(\"Red\", \"Yellow\", \"Blue\"\
    ),\n... )\n'Yellow'\n```\n\nJust like `msgbox()`, the value `None` is returned\
    \ if the dialog box is closed without pressing one of the buttons.\n\n## indexbox()\n\
    \n`indexbox()` displays a dialog box that looks identical to the dialog box displayed\
    \ by `buttonbox()`. In fact, you create an `indexbox()` the same way as you do\
    \ a `buttonbox()`:\n\n```\n>>> gui.indexbox(\n...     msg=\"What's your favorite\
    \ color?\",\n...     title=\"Choose wisely...\",\n...     choices=(\"Red\", \"\
    Yellow\", \"Blue\"),\n... )\n```\n\nHere's what the dialog box looks like:\n\n\
    ![](img/4efa9a991b645f75be61871447c559ca_542_0.png)\n\nThe difference between\
    \ `indexbox()` and `buttonbox()` is that `indexbox()` returns the index of the\
    \ button label in the list or tuple passed to `choices`, instead of the label\
    \ itself.\n\nFor example, if you click on the `Yellow` button, the integer 1 is\
    \ returned:\n\n```\n>>> gui.indexbox(\n...     msg=\"What's your favorite color?\"\
    ,\n...     title=\"Favorite color\",\n...     choices=(\"Red\", \"Yellow\", \"\
    Blue\"),\n... )\n```\n\nBecause `indexbox()` returns an index and not a string,\
    \ it is a good idea to define the tuple for `choices` outside of the function\
    \ so that you can reference the label by index later in your code:\n\n```\n>>>\
    \ colors = (\"Red\", \"Yellow\", \"Blue\")\n>>> choice = gui.indexbox(\n    msg=\"\
    What's your favorite color?\",\n    title=\"Favorite color\",\n    choices=colors,\n\
    )\n>>> choice\n1\n>>> colors[choice]\n'Yellow'\n```\n\n`buttonbox()` and `indexbox()`\
    \ are great for getting input from a user when they need to choose from a pre-determined\
    \ set of choices. These functions are not well suited to getting information such\
    \ as a user's name or email address. For that, you can use the `enterbox()`.\n\
    \n## enterbox()\n\n`enterbox()` is used to collect text input from a user:\n\n\
    ```\n>>> gui.enterbox(\n...     msg=\"What is your favorite color?\",\n...   \
    \  title=\"Favorite color\",\n... )\n```\n\nThe dialog box produced by `enterbox()`\
    \ has an input box where the user can type in their own answer:"
