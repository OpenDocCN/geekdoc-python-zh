- md: "## Chapter 13\n\n## Installing Packages With Pip\n\nUp to this point, you have\
    \ been working within the bounds of the **Python standard library**. In the remaining\
    \ half of this course, you will work with various **packages** that are not included\
    \ with Python by default.\n\nMany programming languages offer a **package manager**\
    \ that automates the process of installing, upgrading, and removing third-party\
    \ packages. Python is no exception.\n\nThe *de facto* package manager for Python\
    \ is called `pip`. Historically, `pip` had to be downloaded and installed separately\
    \ from Python. As of Python 3.4, it is now included with most distributions of\
    \ the language.\n\n**In this chapter, you will learn:**\n\n- How to install and\
    \ manage third-party packages with `pip`\n- What the benefits and risks of third-party\
    \ packages are\n\nLet's go!\n\n## 13.1 Installing Third-Party Packages With Pip\n\
    \nPython's package manager `pip` is used to install and manage third party packages.\
    \ It is a separate program from Python, although it's likely that `pip` was installed\
    \ on your computer whenever you downloaded and installed Python.\n\n`pip` is a\
    \ **command line tool**. That means you must run it from a command line or terminal\
    \ program. How you open a terminal program depends on your operating system.\n\
    \n### Windows\n\nPress the Windows key and type `cmd` and press `Enter` to open\
    \ the Command Prompt application. This opens a window that looks like this:\n\n\
    ![](img/4efa9a991b645f75be61871447c559ca_389_0.png)\n\nAlternatively, you may\
    \ use the Powershell application by pressing the Windows key, typing `powershell`\
    \ and pressing `Enter`. The Powershell window looks like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_390_0.png)\n\
    \n### macOS\n\nPress `Cmd` + `Spacebar` to open the Spotlight search window. Type\
    \ terminal and press `Enter` to open the Terminal app. The window that opens look\
    \ like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_390_1.png)\n\n### Ubuntu\
    \ Linux\n\nClick on the `Show Applications` button at the bottom of your toolbar\
    \ and search for `terminal`. Then click on the *Terminal* application icon to\
    \ open the terminal. The window that opens looks something like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_391_0.png)\n\
    \nWith your terminal program open, type in the following command to check whether\
    \ or not `pip` is installed on your system:\n\n```\n$ python3 -m pip --version\n\
    ```\n\nIf `pip` is installed, you should see something like the following output\
    \ displayed in your terminal:\n\n```\npip 19.3.1 from c:\\users\\David\\appdata\\\
    local\\programs\\python\\npython38-32\\lib\\site-packages\\pip (python 3.8)\n\
    ```\n\nThis output indicates that version 19.3.1 of `pip` is currently installed\
    \ and is linked to the Python 3.8 installation.\n\n> **Important**\n\nOn macOS\
    \ and Ubuntu Linux, it is important to run `pip` commands using the `python3`\
    \ command and not `python`. This ensures that the `pip` installation for Python\
    \ 3 is used, instead of the Python 2 version of `pip` that may have come pre-installed\
    \ on your machine.\n\nOn Windows, the `python3` command may not work. If you do\
    \ not see any output, or encounter an error, try the command with `python` instead:\n\
    \n```\n$ python -m pip --version\n```\n\nIf that works for you, replace all the\
    \ `python3` commands in this chapter with `python`.\n\nNote that the version you\
    \ see displayed on your computer may be different, and that it might be linked\
    \ to a different Python installation. This is just fine, as long as the version\
    \ of Python you see displayed is any version of Python 3.\n\nIf your operating\
    \ system tells you that `pip3` is an unrecognized command, then `pip` was not\
    \ installed with your Python distribution. In that case, you may want to review\
    \ the instructions for installing Python in Chapter 2.\n\n### Upgrading `pip`\
    \ to the Latest Version\n\nBefore we go any further, let's make sure that you\
    \ have the latest version of `pip` installed. To upgrade `pip`, run type the following\
    \ into your terminal and press `Enter`:\n\n```\n$ python3 -m pip install --upgrade\
    \ pip\n```\n\nIf a newer version of `pip` is available, it will be downloaded\
    \ and installed. Otherwise, you will see a message indicating that the latest\
    \ version is already installed. This message usually says something like:\n\n\
    Requirement already satisfied.\n\nNow that you have `pip` upgraded to the latest\
    \ version, let's see what we can do with it!\n\n### Listing All Installed Packages\n\
    \nYou can use `pip` to list all of the packages you have installed. Let's take\
    \ a peek at what is currently available. Type the following into your terminal:\n\
    \n```\n$ python3 -m pip list\n```\n\nIf you haven't already installed any packages,\
    \ which should be the case if you started this course with a fresh Python 3.8\
    \ installation, you should see something like the following:\n\n```\nPackage \
    \   Version\n---------- -------\npip        19.3.1\nsetuptools 41.2.0\n```\n\n\
    As you can see, there isn't much here. You see `pip` itself listed, because `pip`\
    \ is a package. You may also see `setuptools`. This is a package used by `pip`\
    \ to setup and install other packages.\n\nWhen you install a package with `pip`,\
    \ it will show up in this list. You can always use `pip list` to see which packages,\
    \ and which version of each package, you currently have installed.\n\n### Installing\
    \ a Package\n\nLet's install your first Python package! For this exercise, you\
    \ will install the `requests` package, which is one of the most popular Python\
    \ packages ever created. In your terminal, type the following:\n\n```\n$ python3\
    \ -m pip install requests\n```\n\nWhile `pip` is installing the `requests` package,\
    \ you will see a bunch of output:\n\n```\nCollecting requests\n  Downloading https://.../requests-2.22.0-py2.py3-none-any.whl\
    \ (57kB)\n    |...| 61kB 2.0MB/s\nCollecting urllib3!=1.25.0,!=1.25.1,<1.26,>=1.21.1\n\
    \  Downloading https://...urllib3-1.25.7-py2.py3-none-any.whl (125kB)\n    |...|\
    \ 133kB 3.3MB/s\nCollecting certifi>=2017.4.17\n  Downloading https://...certifi-2019.11.28.py3-none-any.whl\
    \ (156kB)\n    |...| 163kB ...\nCollecting chardet<3.1.0,>=3.0.2\n  Downloading\
    \ https://...chardet-3.0.4-py2.py3-none-any.whl (133kB)\n    |...| 143kB 6.8MB/s\n\
    Collecting idna<2.9,>=2.5\n  Downloading https://...idna-2.8-py2.py3-none-any.whl\
    \ (58kB)\n    |...| 61kB 3.8MB/s\nInstalling collected packages: urllib3, certifi,\
    \ chardet, idna,\n  requests\nSuccessfully installed certifi-2019.11.28 chardet-3.0.4\
    \ idna-2.8\n  requests-2.22.0 urllib3-1.25.7\n```\n\n> **Note**\n\nThe formatting\
    \ of the above output has been altered so that it fits nicely on the page. The\
    \ output that you see on your computer may look different.\n\nNotice that `pip`\
    \ first tells you that it is “Collecting requests.” You will see the URL that\
    \ `pip` is using to install the package from, as well as a progress bar indicating\
    \ the progress of the download.\n\nAfter that, you will see that `pip` installs\
    \ four more packages: `chardet`, `certifi`, `idna` and `urllib3`. These packages\
    \ are **dependencies** of `requests`. That means that `requests` requires these\
    \ packages to be installed in order for it to work properly.\n\nOnce `pip` is\
    \ done installing `requests` and its dependencies, run `pip3 list` in your terminal\
    \ again. You should now see the following list:\n\n```\n$ python3 -m pip list\n\
    Package    Version\n---------- ----------\ncertifi    2019.11.28\nchardet    3.0.4\n\
    idna       2.8\npip        19.3.1\nrequests   2.22.0\nsetuptools 41.2.0\nurllib3\
    \    1.25.7\n```\n\nYou can see that version 2.22.0 of `requests` was installed,\
    \ as well as the `chardet`, `certifi`, `idna`, and `urllib3` dependencies.\n\n\
    By default, `pip` installs the latest version of a package. You can control which\
    \ version of a package gets installed with some optional version specifiers.\n\
    \n### Installing Specific Package Versions With Version Specifiers\n\nThere are\
    \ several ways to control which version of a package gets installed. For example,\
    \ you can:\n\n1. Install the latest version greater than some version number\n\
    2. Install the latest version less than some version number\n3. Install a specific\
    \ version number\n\nTo install the latest version of `requests` whose version\
    \ number is 2 or greater, you can execute the following:\n\n```\n$ python3 -m\
    \ pip install requests>=2.0\n```\n\nNotice the `>=2.0` after the package name\
    \ `requests`. This tells `pip` to install the latest version of `requests` that\
    \ is greater than or equal to version 2.0."
  mdcn: "## 第13章\n\n## 使用Pip安装软件包\n\n到目前为止，你一直在**Python标准库**的范围内进行操作。在本课程的剩余部分，你将使用各种**软件包**，这些软件包并非Python默认包含。\n\
    \n许多编程语言都提供**包管理器**，用于自动化安装、升级和卸载第三方软件包的过程。Python也不例外。\n\nPython事实上的包管理器名为`pip`。历史上，`pip`需要从Python单独下载和安装。从Python\
    \ 3.4开始，它现在已包含在大多数Python发行版中。\n\n**在本章中，你将学习：**\n\n- 如何使用`pip`安装和管理第三方软件包\n- 第三方软件包的益处和风险\n\
    \n让我们开始吧！\n\n## 13.1 使用Pip安装第三方软件包\n\nPython的包管理器`pip`用于安装和管理第三方软件包。它是一个独立于Python的程序，尽管当你下载并安装Python时，`pip`很可能已经安装在你的计算机上了。\n\
    \n`pip`是一个**命令行工具**。这意味着你必须从命令行或终端程序运行它。如何打开终端程序取决于你的操作系统。\n\n### Windows\n\n\
    按下Windows键，输入`cmd`并按`Enter`键打开命令提示符应用程序。这将打开一个如下所示的窗口：\n\n![](img/4efa9a991b645f75be61871447c559ca_389_0.png)\n\
    \n或者，你可以使用Powershell应用程序，按下Windows键，输入`powershell`并按`Enter`键。Powershell窗口如下所示：\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_390_0.png)\n\n### macOS\n\n按下`Cmd`\
    \ + `空格键`打开Spotlight搜索窗口。输入`terminal`并按`Enter`键打开终端应用程序。打开的窗口如下所示：\n\n![](img/4efa9a991b645f75be61871447c559ca_390_1.png)\n\
    \n### Ubuntu Linux\n\n点击工具栏底部的`显示应用程序`按钮，搜索`terminal`。然后点击*终端*应用程序图标打开终端。打开的窗口大致如下：\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_391_0.png)\n\n打开终端程序后，输入以下命令以检查你的系统是否安装了`pip`：\n\
    \n```\n$ python3 -m pip --version\n```\n\n如果`pip`已安装，你应该会在终端中看到类似以下的输出：\n\n```\n\
    pip 19.3.1 from c:\\users\\David\\appdata\\local\\programs\\python\\npython38-32\\\
    lib\\site-packages\\pip (python 3.8)\n```\n\n此输出表明当前安装了`pip`版本19.3.1，并且链接到Python\
    \ 3.8安装。\n\n> **重要提示**\n\n在macOS和Ubuntu Linux上，使用`python3`命令而不是`python`来运行`pip`命令非常重要。这确保使用的是Python\
    \ 3的`pip`安装，而不是可能预装在你机器上的Python 2版本的`pip`。\n\n在Windows上，`python3`命令可能不起作用。如果你没有看到任何输出或遇到错误，请尝试使用`python`命令：\n\
    \n```\n$ python -m pip --version\n```\n\n如果这对你有效，请将本章中所有`python3`命令替换为`python`。\n\
    \n请注意，你计算机上显示的版本可能不同，并且可能链接到不同的Python安装。只要你看到的Python版本是Python 3的任何版本，这都没问题。\n\n\
    如果你的操作系统提示`pip3`是无法识别的命令，那么`pip`没有随你的Python发行版一起安装。在这种情况下，你可能需要回顾第2章中安装Python的说明。\n\
    \n### 将`pip`升级到最新版本\n\n在继续之前，让我们确保你安装了最新版本的`pip`。要升级`pip`，请在终端中输入以下内容并按`Enter`键：\n\
    \n```\n$ python3 -m pip install --upgrade pip\n```\n\n如果有更新版本的`pip`可用，它将被下载并安装。否则，你将看到一条消息，表明最新版本已安装。此消息通常如下所示：\n\
    \nRequirement already satisfied.\n\n现在你已经将`pip`升级到最新版本，让我们看看可以用它做什么！\n\n### 列出所有已安装的软件包\n\
    \n你可以使用`pip`列出你已安装的所有软件包。让我们看看当前有哪些可用。在终端中输入以下内容：\n\n```\n$ python3 -m pip list\n\
    ```\n\n如果你还没有安装任何软件包（如果你从全新的Python 3.8安装开始本课程，情况应该如此），你应该会看到类似以下的内容：\n\n```\n\
    Package    Version\n---------- -------\npip        19.3.1\nsetuptools 41.2.0\n\
    ```\n\n如你所见，这里内容不多。你看到`pip`本身被列出，因为`pip`本身就是一个软件包。你可能还会看到`setuptools`。这是`pip`用于设置和安装其他软件包的一个软件包。\n\
    \n当你使用`pip`安装软件包时，它将显示在此列表中。你始终可以使用`pip list`查看你当前安装了哪些软件包以及每个软件包的版本。\n\n### 安装软件包\n\
    \n让我们安装你的第一个Python软件包！在本练习中，你将安装`requests`软件包，这是有史以来最受欢迎的Python软件包之一。在终端中，输入以下内容：\n\
    \n```\n$ python3 -m pip install requests\n```\n\n当`pip`安装`requests`软件包时，你会看到一堆输出：\n\
    \n```\nCollecting requests\n  Downloading https://.../requests-2.22.0-py2.py3-none-any.whl\
    \ (57kB)\n    |...| 61kB 2.0MB/s\nCollecting urllib3!=1.25.0,!=1.25.1,<1.26,>=1.21.1\n\
    \  Downloading https://...urllib3-1.25.7-py2.py3-none-any.whl (125kB)\n    |...|\
    \ 133kB 3.3MB/s\nCollecting certifi>=2017.4.17\n  Downloading https://...certifi-2019.11.28.py3-none-any.whl\
    \ (156kB)\n    |...| 163kB ...\nCollecting chardet<3.1.0,>=3.0.2\n  Downloading\
    \ https://...chardet-3.0.4-py2.py3-none-any.whl (133kB)\n    |...| 143kB 6.8MB/s\n\
    Collecting idna<2.9,>=2.5\n  Downloading https://...idna-2.8-py2.py3-none-any.whl\
    \ (58kB)\n    |...| 61kB 3.8MB/s\nInstalling collected packages: urllib3, certifi,\
    \ chardet, idna,\n  requests\nSuccessfully installed certifi-2019.11.28 chardet-3.0.4\
    \ idna-2.8\n  requests-2.22.0 urllib3-1.25.7\n```\n\n> **注意**\n\n上述输出的格式已调整，以便在页面上更好地显示。你在计算机上看到的输出可能有所不同。\n\
    \n请注意，`pip`首先告诉你它正在“收集请求”。你会看到`pip`用于安装软件包的URL，以及一个指示下载进度的进度条。\n\n之后，你会看到`pip`又安装了四个软件包：`chardet`、`certifi`、`idna`和`urllib3`。这些软件包是`requests`的**依赖项**。这意味着`requests`需要安装这些软件包才能正常工作。\n\
    \n一旦`pip`完成安装`requests`及其依赖项，请在终端中再次运行`pip3 list`。你现在应该会看到以下列表：\n\n```\n$ python3\
    \ -m pip list\nPackage    Version\n---------- ----------\ncertifi    2019.11.28\n\
    chardet    3.0.4\nidna       2.8\npip        19.3.1\nrequests   2.22.0\nsetuptools\
    \ 41.2.0\nurllib3    1.25.7\n```\n\n你可以看到安装了`requests`版本2.22.0，以及`chardet`、`certifi`、`idna`和`urllib3`依赖项。\n\
    \n默认情况下，`pip`安装软件包的最新版本。你可以使用一些可选的版本说明符来控制安装哪个版本的软件包。\n\n### 使用版本说明符安装特定版本的软件包\n\
    \n有几种方法可以控制安装哪个版本的软件包。例如，你可以：\n\n1. 安装大于某个版本号的最新版本\n2. 安装小于某个版本号的最新版本\n3. 安装特定的版本号\n\
    \n要安装版本号为2或更高的`requests`最新版本，你可以执行以下操作：\n\n```\n$ python3 -m pip install requests>=2.0\n\
    ```\n\n注意软件包名称`requests`后面的`>=2.0`。这告诉`pip`安装大于或等于版本2.0的`requests`最新版本。"
