    # 3. Let the user select one of `90`, `180` or `270` degrees to rotate\n# the\
    \ PDF pages.\nchoices = (\"90\", \"180\", \"270\")\ndegrees = gui.buttonbox(\n\
    \    msg=\"Rotate the PDF clockwise by how many degrees?\",\n    title=\"Choose\
