  md: '# 17.3 Summary and Additional Resources


    In this chapter, you learned about two packages commonly used in the Python scientific
    computing stack.


    In the first section, “Use NumPy for Matrix Manipulation,” you learned about the
    NumPy package. NumPy is used for working with multi-dimensional arrays of data.
    It introduces the `ndarray` object, which is commonly created using the `array`
    alias.


    A NumPy `array` is a homogenous data type, meaning it can only store a single
    type of data. For example, a NumPy `array` can contain all integers, or all floats,
    but cannot contain both integers *and* floats. You also saw some useful functions
    and methods for manipulating NumPy `array` objects. Finally, you were introduced
    to the NumPy `arange()` function, which works a lot like Python’s very own `range()`
    function, except that returns a one-dimensions NumPy `array` object.


    In the second section, “Use `matplotlib` for Plotting Graphs,” you learned how
    to use the `matplotlib` package to create simple plots using the `pyplot` interface.
    You built line charts, bar charts and histograms from pure Python lists and NumPy
    arrays using the `plot()`, `bar()` and `hist()` functions. You learned how to
    style and layout your plots by adding plot and axis titles, tick markers and legends.


