- md: "Use widgets to create the components of the user interface.\n- Use geometry\
    \ managers to control the layout of the application.\n- Write functions that interact\
    \ with various components to capture and transform user input.\n\nIn the next\
    \ two sections, you'll build apps that do something useful. First, you'll build\
    \ a temperature converter that converts a temperature input as Fahrenheit to Celsius.\
    \ After that, you'll build a text editor that can open, edit and save text files!\n\
    \n## Review Exercises\n\nYou can find the solutions to these exercises and many\
    \ other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n1. Write a program that displays a single button with the default background\
    \ color and black text that reads \"Click me\".\n\n   When the user clicks on\
    \ the button, the button background should change to a color randomly selected\
    \ from the following list:\n\n   `[\"red\", \"orange\", \"yellow\", \"blue\",\
    \ \"green\", \"indigo\", \"violet\"]`\n\n2. Write a program that simulates rolling\
    \ a six-sided die. There should be one button with the text \"Roll\". When the\
    \ user clicks the button, a random integer from 1 to 6 should be displayed.\n\n\
    \   The application window should look something like this:\n\n   ![](img/4efa9a991b645f75be61871447c559ca_617_0.png)\n\
    \nLeave feedback on this section »\n\n## 18.8 Example App: Temperature Converter\n\
    \nIn this section, you'll build a temperature converter that allows the user to\
    \ input a temperature in degrees Fahrenheit and push a button to convert that\
    \ temperature to degrees Celsius.\n\nWe'll walk through the code step by step.\
    \ You can also find the full source code at the end of this section for your reference.\n\
    \nTo get the most out of this section, open up IDLE's script window and follow\
    \ along.\n\nBefore we start coding, let's design the app. We need three basic\
    \ elements:\n\n1. An `Entry` widget called `ent_temperature` to enter the Fahrenheit\
    \ value\n2. A `Label` widget called `lbl_result` to display the Celsius result\n\
    3. A `Button` widget called `btn_convert` that reads the value from the `Entry`\
    \ widget, converts it from Fahrenheit to Celsius, and sets the text of the `Label`\
    \ widget to the result when clicked\n\nWe can arrange these in a grid with a single\
    \ row and one column for each widget. That gets us a minimally working application,\
    \ but it isn't very user friendly. Everything needs to have some helpful labels.\n\
    \nLet's put a label directly to the right of the `ent_temperature` widget containing\
    \ the °F symbol so that the user knows that the value `ent_temperature` should\
    \ be in degrees Fahrenheit. To do this, we'll set the label text to \"\\N{DEGREES\
    \ FAHRENHEIT}\", which uses Python's named Unicode character support to display\
    \ the °F symbol.\n\nWe can give `btn_convert` a little flair by setting its text\
    \ to the value \"\\N{RIGHTWARDS BLACK ARROW}\", which displays a black arrow pointing\
    \ to the right. We will also make sure that `lbl_result` always has the °C symbol\
    \ \"\\N{DEGREES CELSIUS}\" at the end to indicate that result is in degrees Celsius.\n\
    \nHere's what the final window will look like:\n\n![](img/4efa9a991b645f75be61871447c559ca_618_0.png)\n\
    \nNow that we know what widgets we need and what the window is going to look like,\
    \ let's start coding it up! First, import tkinter and create a new window:\n\n\
    ```python\nimport tkinter as tk\n\nwindow = tk.Tk()\nwindow.title(\"Temperature\
    \ Converter\")\n```\n\n`window.title()` sets the title of an existing window.\
    \ When you finally run this application, the window will have the text *Temperature\
    \ Converter* in its title bar.\n\nNext, we'll create the `ent_temperature` widget\
    \ with a label called `lbl_temp` and assign both of them to a Frame widget called\
    \ `frm_entry`:\n\n```python\nfrm_entry = tk.Frame(master=window)\nent_temperature\
    \ = tk.Entry(master=frm_entry, width=10)\nlbl_temp = tk.Label(master=frm_entry,\
    \ text=\"\\N{DEGREE FAHRENHEIT}\")\n```\n\n`ent_temperature` is where the user\
    \ will enter the Fahrenheit value, and `lbl_temp` is used to label `ent_temperature`\
    \ with the °F symbol. `frm_entry` is just a container that groups `ent_temperature`\
    \ and `lbl_temp` together.\n\nWe want `lbl_temp` to be placed directly to the\
    \ right of `ent_temperature`, so we can lay them out in the `frm_entry` using\
    \ the `.grid()` geometry manager with one row and two columns:\n\n```python\n\
    ent_temperature.grid(row=0, column=0, sticky=\"e\")\nlbl_temp.grid(row=0, column=1,\
    \ sticky=\"w\")\n```\n\nWe've set the `sticky` parameter to `\"e\"` for `ent_temperature`\
    \ so that it always sticks to the right-most edge of its grid cell. Setting `sticky`\
    \ to `\"w\"` for `lbl_temp` will keep it stuck to the left-most edge of its grid\
    \ cell. This ensures that `lbl_temp` is always located immediately to the right\
    \ of `ent_temperature`.\n\nNow let's make the `btn_convert` and the `lbl_result`\
    \ for converting the temperature entered into `ent_temperature` and displaying\
    \ the results:\n\n```python\nbtn_convert = tk.Button(\n    master=window,\n  \
    \  text=\"\\N{RIGHTWARDS BLACK ARROW}\"\n)\nlbl_result = tk.Label(master=window,\
    \ text=\"\\N{DEGREE CELSIUS}\")\n```\n\nLike `frm_entry`, both `btn_convert` and\
    \ `lbl_result` are assigned to `window`. Together, these three widgets make up\
    \ the three cells in the main application grid. Let's use `.grid()` to go ahead\
    \ and lay them out now:\n\n```python\nfrm_entry.grid(row=0, column=0, padx=10)\n\
    btn_convert.grid(row=0, column=1, pady=10)\nlbl_result.grid(row=0, column=2, padx=10)\n\
    ```\n\nFinally, run the application:\n\n```python\nwindow.mainloop()\n```\n\n\
    That looks great, but the button doesn't do anything yet. At the top of your script\
    \ file, just below the `import` line, add a function called `fahrenheit_to_celsius()`.\
    \ This function reads the value from `ent_temperature`, converts it from Fahrenheit\
    \ to Celsius, and then displays the result in `lbl_result`:\n\n```python\ndef\
    \ fahrenheit_to_celsius():\n    \"\"\"Convert the value for Fahrenheit to Celsius\
    \ and insert the\n    result into lbl_result.\n    \"\"\"\n    fahrenheit = ent_temperature.get()\n\
    \    celsius = (5/9) * (float(fahrenheit) - 32)\n    lbl_result[\"text\"] = f\"\
    {round(celsius, 2)} \\N{DEGREE CELSIUS}\"\n```\n\nNow go down to the line where\
    \ you define `btn_convert` and set its `command` parameter to `fahrenheit_to_celsius`:\n\
    \n```python\nbtn_convert = tk.Button(\n    master=window,\n    text=\"\\N{RIGHTWARDS\
    \ BLACK ARROW}\",\n    command=fahrenheit_to_celsius  # <--- Add this line\n)\n\
    ```\n\nThat's it! You've created a fully functional temperature converter app\
    \ in just 26 lines of code! Pretty cool, right?\n\nHere's the full script for\
    \ your reference:\n\n```python\nimport tkinter as tk\n\ndef fahrenheit_to_celsius():\n\
    \    \"\"\"Convert the value for Fahrenheit to Celsius and insert the\n    result\
    \ into lbl_result.\n    \"\"\"\n    fahrenheit = ent_temperature.get()\n    celsius\
    \ = (5/9) * (float(fahrenheit) - 32)\n    lbl_result[\"text\"] = f\"{round(celsius,\
    \ 2)} \\N{DEGREE CELSIUS}\"\n\n# Set-up the window\nwindow = tk.Tk()\nwindow.title(\"\
    Temperature Converter\")\nwindow.resizable(width=False, height=False)\n\n# Create\
    \ the Fahrenheit entry frame with an Entry\n# widget and label in it\nfrm_entry\
    \ = tk.Frame(master=window)\nent_temperature = tk.Entry(master=frm_entry, width=10)\n\
    lbl_temp = tk.Label(master=frm_entry, text=\"\\N{DEGREE FAHRENHEIT}\")\n\n# Layout\
    \ the temperature Entry and Label in frm_entry\n# using the .grid() geometry manager\n\
    ent_temperature.grid(row=0, column=0, sticky=\"e\")\nlbl_temp.grid(row=0, column=1,\
    \ sticky=\"w\")\n\n# Create the conversion Button and result display Label\nbtn_convert\
    \ = tk.Button(\n    master=window,\n    text=\"\\N{RIGHTWARDS BLACK ARROW}\",\n\
    \    command=fahrenheit_to_celsius\n)\nlbl_result = tk.Label(master=window, text=\"\
    \\N{DEGREE CELSIUS}\")\n\n# Set-up the layout using the .grid() geometry manager\n\
    frm_entry.grid(row=0, column=0, padx=10)\nbtn_convert.grid(row=0, column=1, pady=10)\n\
    lbl_result.grid(row=0, column=2, padx=10)\n\n# Run the application\nwindow.mainloop()\n\
    ```\n\nLet's take things up a notch. Read on to build a simple text editor."
  mdcn: "使用小部件来创建用户界面的组件。\n- 使用几何布局管理器来控制应用程序的布局。\n- 编写与各种组件交互的函数，以捕获和转换用户输入。\n\n\
    在接下来的两个部分中，你将构建一些实用的应用程序。首先，你将构建一个温度转换器，将输入的华氏温度转换为摄氏温度。之后，你将构建一个可以打开、编辑和保存文本文件的文本编辑器！\n\
    \n## 复习练习\n\n你可以在 [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources)\
    \ 找到这些练习的解决方案以及许多其他额外资源。\n\n1.  编写一个程序，显示一个带有默认背景颜色和黑色文本的按钮，文本内容为“Click me”。\n\
    \n    当用户点击按钮时，按钮背景应从以下列表中随机选择一种颜色进行更改：\n\n    `[\"red\", \"orange\", \"yellow\"\
    , \"blue\", \"green\", \"indigo\", \"violet\"]`\n\n2.  编写一个模拟掷六面骰子的程序。应有一个文本为“Roll”的按钮。当用户点击按钮时，应显示一个1到6之间的随机整数。\n\
    \n    应用程序窗口应如下所示：\n\n    ![](img/4efa9a991b645f75be61871447c559ca_617_0.png)\n\
    \n对本节内容提出反馈 »\n\n## 18.8 示例应用：温度转换器\n\n在本节中，你将构建一个温度转换器，允许用户输入华氏温度，然后点击按钮将该温度转换为摄氏温度。\n\
    \n我们将逐步讲解代码。你也可以在本节末尾找到完整的源代码以供参考。\n\n为了充分利用本节内容，请打开IDLE的脚本窗口并跟随操作。\n\n在开始编码之前，让我们先设计一下这个应用。我们需要三个基本元素：\n\
    \n1.  一个名为 `ent_temperature` 的 `Entry` 小部件，用于输入华氏温度值。\n2.  一个名为 `lbl_result` 的\
    \ `Label` 小部件，用于显示摄氏温度结果。\n3.  一个名为 `btn_convert` 的 `Button` 小部件，点击时从 `ent_temperature`\
    \ 小部件读取值，将其从华氏温度转换为摄氏温度，并将 `Label` 小部件的文本设置为结果。\n\n我们可以将它们排列在一个网格中，每个小部件占一行一列。这能让我们得到一个最小化可工作的应用程序，但用户友好性不足。所有内容都需要一些有用的标签。\n\
    \n让我们在 `ent_temperature` 小部件的正右方放置一个包含 °F 符号的标签，这样用户就知道 `ent_temperature` 中的值应该是华氏温度。为此，我们将标签文本设置为\
    \ \"\\N{DEGREES FAHRENHEIT}\"，这使用了Python的命名Unicode字符支持来显示 °F 符号。\n\n我们可以通过将 `btn_convert`\
    \ 的文本设置为 \"\\N{RIGHTWARDS BLACK ARROW}\" 来给它增添一点特色，这会显示一个指向右边的黑色箭头。我们还将确保 `lbl_result`\
    \ 始终以 °C 符号 \"\\N{DEGREES CELSIUS}\" 结尾，以表明结果是摄氏温度。\n\n最终窗口将如下所示：\n\n![](img/4efa9a991b645f75be61871447c559ca_618_0.png)\n\
    \n现在我们知道了需要哪些小部件以及窗口的样子，让我们开始编码吧！首先，导入tkinter并创建一个新窗口：\n\n```python\nimport tkinter\
    \ as tk\n\nwindow = tk.Tk()\nwindow.title(\"Temperature Converter\")\n```\n\n\
    `window.title()` 设置现有窗口的标题。当你最终运行此应用程序时，窗口标题栏中将显示文本 *Temperature Converter*。\n\
    \n接下来，我们将创建 `ent_temperature` 小部件和一个名为 `lbl_temp` 的标签，并将它们都分配给一个名为 `frm_entry`\
    \ 的Frame小部件：\n\n```python\nfrm_entry = tk.Frame(master=window)\nent_temperature\
    \ = tk.Entry(master=frm_entry, width=10)\nlbl_temp = tk.Label(master=frm_entry,\
    \ text=\"\\N{DEGREE FAHRENHEIT}\")\n```\n\n`ent_temperature` 是用户输入华氏温度值的地方，`lbl_temp`\
    \ 用于以 °F 符号标记 `ent_temperature`。`frm_entry` 只是一个将 `ent_temperature` 和 `lbl_temp`\
    \ 组合在一起的容器。\n\n我们希望 `lbl_temp` 直接放置在 `ent_temperature` 的右侧，因此我们可以在 `frm_entry`\
    \ 中使用 `.grid()` 几何布局管理器，设置一行两列来布局它们：\n\n```python\nent_temperature.grid(row=0,\
    \ column=0, sticky=\"e\")\nlbl_temp.grid(row=0, column=1, sticky=\"w\")\n```\n\
    \n我们为 `ent_temperature` 设置了 `sticky` 参数为 `\"e\"`，使其始终粘附在其网格单元格的最右边缘。为 `lbl_temp`\
    \ 设置 `sticky` 为 `\"w\"` 将使其粘附在其网格单元格的最左边缘。这确保了 `lbl_result` 始终位于 `ent_temperature`\
    \ 的正右方。\n\n现在让我们创建 `btn_convert` 和 `lbl_result`，用于转换输入到 `ent_temperature` 中的温度并显示结果：\n\
    \n```python\nbtn_convert = tk.Button(\n    master=window,\n    text=\"\\N{RIGHTWARDS\
    \ BLACK ARROW}\"\n)\nlbl_result = tk.Label(master=window, text=\"\\N{DEGREE CELSIUS}\"\
    )\n```\n\n与 `frm_entry` 类似，`btn_convert` 和 `lbl_result` 都被分配给了 `window`。这三个小部件共同构成了主应用程序网格中的三个单元格。让我们现在就使用\
    \ `.grid()` 来布局它们：\n\n```python\nfrm_entry.grid(row=0, column=0, padx=10)\nbtn_convert.grid(row=0,\
    \ column=1, pady=10)\nlbl_result.grid(row=0, column=2, padx=10)\n```\n\n最后，运行应用程序：\n\
    \n```python\nwindow.mainloop()\n```\n\n看起来不错，但按钮还没有任何功能。在你的脚本文件顶部，就在 `import`\
    \ 语句下方，添加一个名为 `fahrenheit_to_celsius()` 的函数。这个函数从 `ent_temperature` 读取值，将其从华氏温度转换为摄氏温度，然后在\
    \ `lbl_result` 中显示结果：\n\n```python\ndef fahrenheit_to_celsius():\n    \"\"\"Convert\
    \ the value for Fahrenheit to Celsius and insert the\n    result into lbl_result.\n\
    \    \"\"\"\n    fahrenheit = ent_temperature.get()\n    celsius = (5/9) * (float(fahrenheit)\
    \ - 32)\n    lbl_result[\"text\"] = f\"{round(celsius, 2)} \\N{DEGREE CELSIUS}\"\
    \n```\n\n现在，向下找到定义 `btn_convert` 的行，并将其 `command` 参数设置为 `fahrenheit_to_celsius`：\n\
    \n```python\nbtn_convert = tk.Button(\n    master=window,\n    text=\"\\N{RIGHTWARDS\
    \ BLACK ARROW}\",\n    command=fahrenheit_to_celsius  # <--- 添加这一行\n)\n```\n\n\
    就是这样！你仅用26行代码就创建了一个功能齐全的温度转换器应用！很酷，对吧？\n\n以下是完整的脚本供你参考：\n\n```python\nimport tkinter\
    \ as tk\n\ndef fahrenheit_to_celsius():\n    \"\"\"Convert the value for Fahrenheit\
    \ to Celsius and insert the\n    result into lbl_result.\n    \"\"\"\n    fahrenheit\
    \ = ent_temperature.get()\n    celsius = (5/9) * (float(fahrenheit) - 32)\n  \
    \  lbl_result[\"text\"] = f\"{round(celsius, 2)} \\N{DEGREE CELSIUS}\"\n\n# Set-up\
    \ the window\nwindow = tk.Tk()\nwindow.title(\"Temperature Converter\")\nwindow.resizable(width=False,\
    \ height=False)\n\n# Create the Fahrenheit entry frame with an Entry\n# widget\
    \ and label in it\nfrm_entry = tk.Frame(master=window)\nent_temperature = tk.Entry(master=frm_entry,\
    \ width=10)\nlbl_temp = tk.Label(master=frm_entry, text=\"\\N{DEGREE FAHRENHEIT}\"\
    )\n\n# Layout the temperature Entry and Label in frm_entry\n# using the .grid()\
    \ geometry manager\nent_temperature.grid(row=0, column=0, sticky=\"e\")\nlbl_temp.grid(row=0,\
    \ column=1, sticky=\"w\")\n\n# Create the conversion Button and result display\
    \ Label\nbtn_convert = tk.Button(\n    master=window,\n    text=\"\\N{RIGHTWARDS\
    \ BLACK ARROW}\",\n    command=fahrenheit_to_celsius\n)\nlbl_result = tk.Label(master=window,\
    \ text=\"\\N{DEGREE CELSIUS}\")\n\n# Set-up the layout using the .grid() geometry\
    \ manager\nfrm_entry.grid(row=0, column=0, padx=10)\nbtn_convert.grid(row=0, column=1,\
    \ pady=10)\nlbl_result.grid(row=0, column=2, padx=10)\n\n# Run the application\n\
    window.mainloop()\n```\n\n让我们更进一步。继续阅读以构建一个简单的文本编辑器。"
