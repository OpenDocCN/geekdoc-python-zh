    Now pdf_writer has three pages added to it, which you can check with the .getNumPages()
    method:


    ```

    >>> pdf_writer.getNumPages()

    3

    ```


    Finally, you can write the extracted pages to a new PDF file:


    ```

    >>> with Path("chapter1.pdf").open(mode="wb") as output_file:

    ...     pdf_writer.write(output_file)

    ...

    >>>

    ```


    Now you can open the chapter1.pdf file in your current working directory to read
    just the first chapter of Pride and Prejudice.


    Another way to extract multiple pages from a PDF is to take advantage of the fact
    that the iterable returned by PdfFileReader.pages supports slice notation.


    Let''s redo the previous example using .pages instead of looping over a range
    object. Since you''ve already imported the necessary classes and set-up to file
    paths, start by initializing a new PdfFileWriter object:'
