    # We Don’t Need You to Be a Computer Scientist


    One other point I do want to emphasis as you start this journey of learning Python
    is that we don’t need you to be a computer scientist. If that’s your goal, great.
    Learning Python is a powerful step in that direction. But learning programming
    is often framed in the shape of “we have all these developer jobs going unfilled,
    we need software developers!”


    That may or may not be true. But more importantly for you, programming (even a
    little programming) can be a superpower for you personally.'
  merge: -1
  pgno: 20
