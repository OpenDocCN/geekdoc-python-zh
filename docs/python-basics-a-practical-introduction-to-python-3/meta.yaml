    # 10.5 Summary and Additional Resources


    In this chapter you learned about object-oriented programming (OOP) in Python,
    which is a programing paradigm that is not specific to Python. Most of the modern
    programming languages—such as Java, C#, and C++—follow OOP principles.


    You saw how to define a class, which is a sort of “blueprint” for an object, and
    how to instantiate an object from a class. You also learned about attributes,
    which correspond to properties of an object, and methods, which correspond to
    behaviors and actions of an object.


    Finally, you learned how inheritance works by creating child classes from a parent
    class. You saw how to reference a method on a parent class using `super()`, and
    how to check if an object inherits from some class using `isinstance()`.


    OOP is a big and sometimes difficult topic. Some programmers consider OOP a foundational
    part of modern programming, but this viewpoint isn’t without its [criticisms](https://realpython.com).'
