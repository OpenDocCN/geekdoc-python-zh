    ## 3.5 Leave Yourself Helpful Notes


    Programmers often read code they wrote several months ago and wonder “What the
    heck does this do?” Even with descriptive variable names, it can be difficult
    to remember why you wrote something the way you did when you haven’t looked at
    it for a long time.


    To help avoid this problem, you can leave comments in your code. **Comments**
    are lines of text that don’t affect the way the script runs. They help to document
    what’s supposed to be happening.


    In this section, you will learn three ways to leave comments in your code. You
    will also learn some conventions for formatting comments, as well as some pet
    peeves regarding their over-use.


    ### How to Write a Comment


    The most common way to write a comment is to begin a new line in your code with
    the # character. When your code is run, any lines starting with # are ignored.
    Comments that start on a new line are called **block comments**.


    You can also write **in-line comments**, which are comments that appear on the
    same line as some code. Just put a # at the end of the line of code, followed
    by the text in your comment.


    Here is an example of the `hello_world.py` script with both kinds of comments
    added in:


    ```

    # This is a block comment.


    phrase = "Hello, world."

    print(phrase)  # This is an in-line comment.

    ```


    The first line doesn''t do anything, because it starts with a #. Likewise, `print(phrase)`
    is executed on the last line, but everything after the # is ignored.


    Of course, you can still use the # symbol inside of a string. For instance, Python
    won''t mistake the following for the start of a comment:


    ```

    print("#1")

    ```


    In general, it''s a good idea to keep comments as short as possible, but sometimes
    you need to write more than will reasonably fit on a single line. In that case,
    you can continue your comment on a new line that also begins with a # symbol:


    ```

    # This is my first script.

    # It prints the phrase "Hello, world."

    # The comments are longer than the script!


    phrase = "Hello, world."

    print(phrase)

    ```


    Besides leaving yourself notes, comments can also be used to **comment out** code
    while you''re testing a program. In other words, adding a # at the beginning of
    a line of code lets you run your program as if that line of code didn''t exist
    without having to delete any code.


