- md: "> **Note**\n\nFor this example, you can easily check that there is only one\
    \ element on the page with id=\"result\". Although the id attribute is supposed\
    \ to be unique, in practice you should always check that the element you are interested\
    \ in is uniquely identified. If not, you need to be creative with how you select\
    \ that element in your code.\n\nLet's start by writing a simple script that opens\
    \ the /dice page, scrapes the result, and prints it to the console:\n\n```\nimport\
    \ mechanicalsoup\n\nbrowser = mechanicalsoup.Browser()\npage = browser.get(\"\
    http://olympus.realpython.org/dice\")\ntag = page.soup.select(\"#result\")[0]\n\
    result = tag.text\n\nprint(f\"The result of your dice roll is: {result}\")\n```\n\
    \nThis example uses the BeautifulSoup `.select()` to find the element with id=result.\
    \ The string \"#result\" passed to `.select()` uses the CSS ID selector `#` to\
    \ indicate result is an id value.\n\nTo periodically get a new result, you'll\
    \ need to create a loop that loads the page at each step of the loop. So everything\
    \ below the line `browser = mechanicalsoup.Browser()` in the above script needs\
    \ to go in the body of the loop.\n\nFor this example, let's get 4 rolls of the\
    \ dice at 30-second intervals. To do that, the last line of your code needs to\
    \ tell Python to pause running for 30 seconds. You can do this with the `sleep()`\
    \ function from Python's `time` module. The `sleep()` function takes a single\
    \ argument that represents the time to sleep in seconds. Here's a simple example\
    \ to illustrate how the `sleep()` function works:\n\n```\nimport time\n\nprint(\"\
    I'm about to wait for five seconds...\")\ntime.sleep(5)\nprint(\"Done waiting!\"\
    )\n```\n\nIf you run the above example, you see that the \"Done waiting!\" message\
    \ isn't displayed until 5 seconds have passed since the first print() function\
    \ is executed.\n\nFor the die roll example, you'll need to pass the number 30\
    \ to sleep(). Here's the updated script:\n\n```\nimport time\nimport mechanicalsoup\n\
    \nbrowser = mechanicalsoup.Browser()\n\nfor i in range(4):\n    page = browser.get(\"\
    http://olympus.realpython.org/dice\")\n    tag = page.soup.select(\"#result\"\
    )[0]\n    result = tag.text\n    print(f\"The result of your dice roll is: {result}\"\
    )\n    time.sleep(30)\n```\n\nWhen you run the script, you will immediately see\
    \ the first result printed to the console. After 30 seconds, the second result\
    \ is displayed, then the third and finally the fourth. What happens after the\
    \ fourth result is printed?\n\nThe script continues running for another 30 seconds\
    \ before it finally stops!\n\nWell, of course it does! That's what you told it\
    \ to do! But it's kind of a waste of time. You can stop it from doing this by\
    \ using an if statement to run the time.sleep() function only for the first three\
    \ requests:\n\n```\nimport time\nimport mechanicalsoup\n\nbrowser = mechanicalsoup.Browser()\n\
    \nfor i in range(4):\n    page = browser.get(\"http://olympus.realpython.org/dice\"\
    )\n    tag = page.soup.select(\"#result\")[0]\n    result = tag.text\n    print(f\"\
    The result of your dice roll is: {result}\")\n\n    # Wait 30 seconds if this\
    \ isn't the last request\n    if i < 3:\n        time.sleep(30)\n```\n\n> **Note**\n\
    \nWith techniques like this, you can scrape data from websites that periodically\
