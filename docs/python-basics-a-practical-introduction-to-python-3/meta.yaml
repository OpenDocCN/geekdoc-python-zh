  md: '# 14.5. Rotating and Cropping PDF Pages


    We''ll discuss two different ways of doing it. Both of them rely on the `.rotateClockwise()`
    method, but they take different approaches determining which pages get rotated.


    The first method is to loop over the indices of the pages in the PDF. During each
    iteration, check if the index corresponds to a page that needs to be rotated and
    call `.rotateClockwise()` to rotate the page if needed. Then add the page `pdf_writer`.


    Here''s what that looks like:


    ```

    >>> for n in range(pdf_reader.getNumPages()):

    ...     page = pdf_reader.getPage(n)

    ...     if n % 2 == 0:

    ...         page.rotateClockwise(90)

    ...     pdf_writer.addPage(page)

    ...

    >>>

    ```


    Notice that the page gets rotated if the index is even. That might seem odd because
    it''s the odd pages in the PDF that are rotated incorrectly. However, page numbers
    in the PDF start with 1, while page indices start with 0. That means odd PDF pages
    have even indices.


    If that makes your head spin, don''t worry! After years of dealing with stuff
    like this, even professional programmers get tripped up by these sorts of things!


    > **Note**


    When you execute the `for` loop above, you''ll see a bunch of output in IDLE''s
    interactive window. That''s because `.rotateClockwise()` returns a `PageObject`
    instance.


