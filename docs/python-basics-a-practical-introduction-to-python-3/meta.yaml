- md: "## 7.3 Summary and Additional Resources\n\nIn this chapter, you learned about\
    \ IDLE’s Debug window. You saw how to inspect the values of variables, insert\
    \ breakpoints, and use the `Step`, `Go`, `Over` and `Out` buttons. You also got\
    \ some practice debugging a function that didn’t work correctly using a four-step\
    \ process for identifying and removing bugs:\n\n1.  Guess where the bug is located\n\
    2.  Set a breakpoint and inspect the code\n3.  Identify the error and attempt\
    \ to fix it\n4.  Repeat steps 1–3 until the error is fixed\n\nDebugging is as\
    \ much an art as it is a science. The only way to master debugging is to get a\
    \ lot of practice with it!\n\nOne way to get some practice is to open the Debug\
    \ Control Window and use it to step through your code as you work on the exercises\
    \ and challenges throughout the rest of this book.\n\n> **Interactive Quiz**\n\
    \nThis chapter comes with a free online quiz to check your learning progress.\
    \ You can access the quiz using your phone or computer at the following web address:\n\
    \n[realpython.com/quizzes/python-basics-7](https://realpython.com/quizzes/python-basics-7)\n\
    \n## Additional Resources\n\nFor more information on debugging Python code, check\
    \ out the following resources:\n\n- [Python Debugging With Pdb](https://realpython.com/python-debugging-pdb/)\n\
    - [Recommended resources on realpython.com](https://realpython.com)\n\n[Leave\
    \ feedback on this section »](https://realpython.com)\n\n## Chapter 8\n\n## Conditional\
    \ Logic and Control Flow\n\nNearly all of the code you have seen in this book\
    \ is **unconditional**. That is, the code does not make any choices. Every line\
    \ of code is executed in the order that is written or that functions are called,\
    \ with possible repetitions inside of loops.\n\nIn this chapter, you will learn\
    \ how to write programs that perform different actions based on different conditions\
    \ using **conditional logic**. Paired with functions and loops, conditional logic\
    \ allows you to write complex programs that handle many different situations.\n\
    \n**In this chapter, you will learn how to:**\n\n- Compare the values of two or\
    \ more variables\n- Write `if` statements to control the flow of your programs\n\
    - Handle errors with `try` and `except`\n- Apply conditional logic to create simple\
    \ simulations\n\nLet's get started!\n\n[Leave feedback on this section »](https://example.com)\n\
    \n## 8.1 Compare Values\n\nConditional logic is based on performing different\
    \ actions depending on whether or not some expression, called a **conditional**,\
    \ is true or false. This idea is not specific to computers. Humans use conditional\
    \ logic all the time to make decisions.\n\nFor example, the legal age for purchasing\
    \ alcoholic beverages in the United States is 21. The statement “If you are at\
    \ least 21 years old, then you may purchase a beer” is an example of conditional\
    \ logic. The phrase “you are at least 21 years old” is a conditional because it\
    \ may be either true or false.\n\nIn computer programming, conditionals often\
    \ take the form of comparing two values, such as determining if one value is greater\
    \ than another, or whether or not two values are equal to each other. A standard\
    \ set of symbols called **boolean comparators** are used to make comparisons,\
    \ and most of them may already be familiar to you.\n\nThe following table describes\
    \ these boolean comparators:\n\n| Boolean Comparator | Example | Meaning |\n|\
    \ :--- | :--- | :--- |\n| > | a > b | a greater than b |\n| < | a < b | a less\
    \ than b |\n| >= | a >= b | a greater than or equal to b |\n| <= | a <= b | a\
    \ less than or equal to b |\n| != | a != b | a not equal to b |\n| == | a == b\
    \ | a equal to b |\n\nThe term **boolean** is derived from the last name of the\
    \ English mathematician George Boole, whose works helped lay the foundations of\
    \ modern computing. In Boole’s honor, conditional logic is sometimes called **boolean\
    \ logic**, and conditionals are sometimes called **boolean expressions**.\n\n\
    There is also a fundamental data type called the **boolean**, or **bool** for\
    \ short, which can have only one of two values. In Python, these values are conveniently\
    \ named `True` and `False`:\n\n```\n>>> type(True)\n<class 'bool'>\n\n>>> type(False)\n\
    <class 'bool'>\n```\n\nNote that `True` and `False` both start with capital letters.\n\
    \nThe result of evaluating a conditional is always a boolean value:\n\n```\n>>>\
    \ 1 == 1\nTrue\n\n>>> 3 > 5\nFalse\n```\n\nIn the first example, since 1 is equal\
    \ to 1, the result of `1 == 1` is `True`. In the second example, 3 is not greater\
    \ than 5, so the result is `False`.\n\n> **Important**\n\nA common mistake when\
    \ writing conditionals is to use the assignment operator `=`, instead of `==`,\
    \ to test whether or not two values are equal.\n\nFortunately, Python will raise\
    \ a `SyntaxError` if this mistake is encountered, so you'll know about it before\
    \ you run your program.\n\nYou may find it helpful to think of boolean comparators\
    \ as asking a question about two values. `a == b` asks whether or not `a` and\
    \ `b` have the same value. Likewise, `a != b` asks whether or not `a` and `b`\
    \ have different values.\n\nConditional expressions are not limited to comparing\
    \ numbers. You may also compare values such as strings:\n\n```\n>>> \"a\" == \"\
    a\"\nTrue\n\n>>> \"a\" == \"b\"\nFalse\n\n>>> \"a\" < \"b\"\nTrue\n\n>>> \"a\"\
    \ > \"b\"\nFalse\n```\n\nThe last two examples above may look funny to you. How\
    \ could one string be greater than or less than another?\n\nThe comparators <\
    \ and > represent the notions of greater than and less than when used with numbers,\
    \ but more generally they represent the notion of order. In this regard, \"a\"\
    \ < \"b\" checks if the string \"a\" comes before the string \"b\". But how are\
    \ strings ordered?\n\nIn Python, strings are ordered **lexicographically**, which\
    \ is a fancy way to say they are ordered as they would appear in a dictionary.\
    \ So you can think of \"a\" < \"b\" as asking whether or not the letter a comes\
    \ before the letter b in the dictionary.\n\nLexicographic ordering extends to\
    \ strings with two or more characters by looking at each component letter of the\
    \ string:\n\n```\n>>> \"apple\" < \"astronaut\"\nTrue\n\n>>> \"beauty\" > \"truth\"\
    \nFalse\n```\n\nSince strings can contain characters other than letters of the\
    \ alphabet, the ordering must extend to those other characters as well.\n\nWe\
    \ won't go into the details of how characters other than letters are ordered.\
    \ In practice, the < and > comparators are most often used with numbers, not strings.\n\
    \n## Review Exercises\n\nYou can find the solutions to these exercises and many\
    \ other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n1.  For each of the following conditional expressions, guess whether they evaluate\
    \ to `True` or `False`. Then type them into the interactive window to check your\
    \ answers:\n\n    ```\n    1 <= 1\n    1 != 1\n    1 != 2\n    \"good\" != \"\
    bad\"\n    \"good\" != \"Good\"\n    123 == \"123\"\n    ```\n\n2.  For each of\
    \ the following expressions, fill in the blank (indicated by `__`) with an appropriate\
    \ boolean comparator so that the expression evaluates to `True`:\n\n    ```\n\
    \    3 __ 4\n    10 __ 5\n    \"jack\" __ \"jill\"\n    42 __ \"42\"\n    ```\n\
    \n[Leave feedback on this section »](https://realpython.com/python-basics/resources)\n\
    \n## 8.2 Add Some Logic\n\nIn addition to boolean comparators, Python has special\
    \ keywords called **logical operators** that can be used to combine boolean expressions.\
    \ There are three logical operators: `and`, `or`, and `not`.\n\nLogical operators\
    \ are used to construct compound logical expressions. For the most part, these\
    \ have meanings similar to their meaning in the English language, although the\
    \ rules regarding their use in Python are much more precise.\n\n### The and Keyword\n\
    \nConsider the following statements:\n\n1.  Cats have four legs.\n2.  Cats have\
    \ tails.\n\nIn general, both of these statements are true.\n\nWhen we combine\
    \ these two statements using and, the resulting sentence “cats have four legs\
    \ and cats have tails” is also a true statement. If both statements are negated,\
    \ the compound statement “cats do not have four legs and cats do not have tails”\
    \ is false.\n\nEven when we mix and match false and true statements, the compound\
    \ statement is false. “Cats have four legs and cats do not have tails” and “cats\
    \ do not have four legs and cats have tails” are both false statements.\n\nWhen\
    \ two statements P and Q are combined with and, the **truth value** of the compound\
