- md: "## Review Exercises\n\nYou can find the solutions to these exercises and many\
    \ other bonus resources online at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).\n\
    \n- 1. Try to re-create the temperature converter app without looking at the source\
    \ code. If you get stuck, check the code and finish your re-creation. Then wait\
    \ for 10–15 minutes and try again.\n\nRepeat this until you can build the app\
    \ from scratch on your own. Focus on the output. It’s okay if your own code is\
    \ slightly different from the code in the book.\n\n[Leave feedback on this section\
    \ »](https://realpython.com/python-basics/resources)\n\n## 18.9 Example App: Text\
    \ Editor\n\nIn this section, you’ll build a text editor app that can create, open,\
    \ edit, and save text files.\n\nThere are three essential elements in the application:\n\
    \n- 1. A `Button` widget called `btn_open` for opening a file for editing\n- 2.\
    \ A `Button` widget called `btn_save` for saving a file\n- 3. A `TextBox` widget\
    \ called `txt_edit` for creating and editing the text file\n\nThe three widgets\
    \ will be arranged so that the two buttons are on the left-hand side of the window,\
    \ and the text box is on the right-hand side.\n\nThe whole window should have\
    \ a minimum height of 800 pixels, and `txt_edit` should have a minimum width of\
    \ 800 pixels. The whole layout should be responsive so that if the window is resized\
    \ then `txt_edit` is resized as well. The width of the `Frame` holding the buttons\
    \ should not change, however.\n\nHere’s a sketch of how the window will look:\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_623_0.png)\n\nWe can achieve the desired\
    \ layout using the `.grid()` geometry manager. The layout contains a single row\
    \ and two columns: a narrow column on the left for the buttons, and a wider column\
    \ on the right for the text box.\n\nTo set the minimum sizes for the window and\
    \ `txt_edit`, we can use the `minsize` parameters of the `.rowconfigure()` and\
    \ `.columnconfigure()` window methods to 800. To handle resizing, we can set the\
    \ `weight` parameters of these methods to 1.\n\nIn order to get both buttons into\
    \ the same column, we'll need to create a `Frame` widget. Let's call that `Frame`\
    \ widget `fr_buttons`. According to the sketch, the two buttons should be stacked\
    \ vertically inside of this frame, with `btn_open` on top. We can do that with\
    \ either the `.grid()` or `.pack()` geometry managers, but let's stick with `.grid()`\
    \ since it is a little easier to work with.\n\nNow that we have a plan, let's\
    \ start coding the application. The first step is to create all of the widgets\
    \ that we need:\n\n```python\nimport tkinter as tk\n\n# 1\nwindow = tk.Tk()\n\
    window.title(\"Simple Text Editor\")\n\n# 2\nwindow.rowconfigure(0, minsize=800,\
    \ weight=1)\nwindow.columnconfigure(1, minsize=800, weight=1)\n\n# 3\ntxt_edit\
    \ = tk.Text(window)\nfr_buttons = tk.Frame(window)\nbtn_open = tk.Button(fr_buttons,\
    \ text=\"Open\")\nbtn_save = tk.Button(fr_buttons, text=\"Save As...\")\n```\n\
    \nFirst we import tkinter and create a new window with the title \"Simple Text\
    \ Editor\" (#1). Then the row and column configurations are set (#2). Finally,\
    \ four widgets are created: the txt_edit text box, the fr_buttons frame, and the\
    \ btn_open and btn_save buttons (#3).\n\nLet's look at (#2) more closely. The\
    \ minsize parameter of .rowconfigure() is set to 800 and weight is set to 1. The\
    \ first argument is 0, so this sets the height of the first row to 800 pixels\
    \ and makes sure that the height of the row grows proportionally to the height\
    \ of the window. There is only one row in the application layout, so these settings\
    \ apply to the entire window.\n\nOn the next line, .columnconfigure() is used\
    \ to set the width and weight attributes of the column with index 1 to 800 and\
    \ 1, respectively. Remember, row and column indices are zero based, so these settings\
    \ apply only to the second column.\n\nBy configuring just the second column, the\
    \ text box will expand and contract naturally when the window is resized while\
    \ the column containing the buttons will remain at a fixed width.\n\nNow we can\
    \ work on the application layout. First, we'll assign the two buttons to the fr_buttons\
    \ frame using the .grid() geometry manager:\n\n```python\nbtn_open.grid(row=0,\
    \ column=0, sticky=\"ew\", padx=5, pady=5)\nbtn_save.grid(row=1, column=0, sticky=\"\
    ew\", padx=5)\n```\n\nThese two lines of code create a grid with two rows and\
    \ one column in the `fr_buttons` frame, since both `btn_open` and `btn_save` have\
    \ their `master` attribute set to `fr_buttons`. `btn_open` is put in the first\
    \ row and `btn_save` in the second row so that `btn_open` appears above `btn_save`\
    \ in the layout, just as we planned in our sketch.\n\nBoth `btn_open` and `btn_save`\
    \ have their `sticky` attributes set to \"ew\", which forces the buttons to expand\
    \ horizontally in both directions and fill the entire frame. This makes sure both\
    \ buttons are the same size.\n\n5 pixels of padding is placed around each button\
    \ by setting the `padx` and `pady` parameters to 5. Only `btn_open` has vertical\
    \ padding. Since it is on top, the vertical padding offsets the button down from\
    \ the top of the window a bit and makes sure that there is a small gap between\
    \ it and `btn_save`.\n\nNow that `fr_buttons` is laid out and ready to go we can\
    \ set up the grid layout for the rest of the window:\n\n```python\nfr_buttons.grid(row=0,\
    \ column=0, sticky=\"ns\")\ntxt_edit.grid(row=0, column=1, sticky=\"nsew\")\n\
    ```\n\nThese two lines of code create a grid with one row and two columns for\
    \ `window`. `fr_buttons` is placed in the first column and `txt_edit` in the second\
    \ column so that `fr_buttons` appears to the left of `txt_edit` in the window\
    \ layout.\n\nThe `sticky` parameter for `fr_buttons` is set to \"ns\", which forces\
    \ the whole frame to expand vertically and fill the entire height of its column.\
    \ `txt_edit` fills its entire grid cell because its `sticky` parameter is set\
    \ to \"nsew\", which forces it to expand in every direction.\n\nNow that the application\
    \ layout is complete, add `window.mainloop()` to the bottom of the program and\
    \ save and run the file. The following window is displayed:\n\n![](img/4efa9a991b645f75be61871447c559ca_626_0.png)\n\
    \nThat looks great! But it doesn't do anything yet, so let's start writing the\
    \ commands for the buttons.\n\nThe `btn_open` button needs to show a file open\
    \ dialog and allow the user to select a file. Then it needs to open that file\
    \ and set the text of `txt_edit` to the contents of the file.\n\nHere's a function\
    \ `open_file()` that does just this:\n\n```python\ndef open_file():\n    \"\"\"\
    Open a file for editing.\"\"\"\n    # 1\n    filepath = askopenfilename(\n   \
    \     filetypes=[(\"Text Files\", \"*.txt\"), (\"All Files\", \"*.*\")]\n    )\n\
    \n    # 2\n    if not filepath:\n        return\n\n    # 3\n    txt_edit.delete(\"\
    1.0\", tk.END)\n\n    # 4\n    with open(filepath, \"r\") as input_file:\n   \
    \     text = input_file.read()\n        txt_edit.insert(tk.END, text)\n\n    #\
    \ 5\n    window.title(f\"Simple Text Editor - {filepath}\")\n```\n\nThe `askopenfilename`\
    \ dialog from the `tkinter.filedialog` module is used to display a file open dialog\
    \ and store the selected file path to the `filepath` variable (#1). If the user\
    \ closes the dialog box or clicks the `Cancel` button, then `filepath` will be\
    \ `None` and the function will `return` without executing any of the code to read\
    \ the file and set the text of `txt_edit` (#2).\n\nIf the user does choose a file,\
    \ though, then the current contents of `txt_edit` are cleared using the `.delete()`\
    \ method (#3). Then the selected file is opened and the contents of the file are\
    \ read using the `.read()` method and stored as a string in the `text` variable.\
    \ The string `text` is assigned to `txt_edit` using `.insert()` (#4).\n\nFinally,\
    \ the title of the window is set so that it contains the path of the open file\
    \ (#5).\n\nNow you can update the program so that `btn_open` calls `open_file()`\
    \ whenever it is clicked. There are three things you need to do to update the\
    \ program:\n\n- 1. Import the `askopenfilename()` function from `tkinter.filedialog`\
    \ by adding the following import to the top of your program:\n\n```python\nfrom\
    \ tkinter.filedialog import askopenfilename\n```\n\n- 2. Add the definition of\
    \ `open_file()` just below the import statements.\n\n- 3. Set the `command` attribute\
    \ of `btn_open` to `open_file`:"
