    # 13.3 Summary and Additional Resources


    In this chapter, you learned how to install third-party packages using Python’s
    package manager `pip`. You saw several useful `pip` commands, including `pip install`,
    `pip list`, `pip show` and `pip uninstall`.


    You also learned about some of the pitfalls associated with third party packages.
    Not every package that is downloadable with `pip` is a good choice for your project.
    Since you do not have control over the code in the package you install, you must
    trust that the package is safe and will work well for the users of your program.'
