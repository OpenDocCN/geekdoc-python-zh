  - "[PAGE 292]\n\n**classes**, and the classes that child classes are derived from\
    \ are called **parent classes**.\n\nChild classes can override and extend the\
    \ attributes and methods of parent classes. In other words, child classes inherit\
    \ all of the parent’s attributes and methods but can also specify different attributes\
    \ and methods that are unique to themselves, or even redefine methods from their\
    \ parent class.\n\nThe concept of object inheritance can be thought of sort of\
    \ like genetic inheritance, even though the analogy isn’t perfect.\n\nFor example,\
    \ you may have inherited your hair color from your mother. It’s an attribute you\
    \ were born with. You may decide that you want to color your hair purple. Assuming\
    \ your mother doesn’t have purple hair, you have just **overridden** the hair\
    \ color attribute you inherited from your mom.\n\nYou also inherit, in a sense,\
    \ your language from your parents. If your parents speak English, then you will\
    \ also speak English. One day, you may decide to learn a second language, like\
    \ German. In this case you are **extending** attributes, because you have added\
    \ an attribute that your parents do not have.\n\n# The object Class\n\nThe most\
    \ basic type of class is an `object`, which generally all other classes inherit\
    \ from as their parent. When you define a new class, Python 3 implicitly uses\
    \ `object` as the parent class, so the following two definitions are equivalent:\n\
    \n```\nclass Dog(object):\n    pass\n\n# In Python 3, this is the same as:\n\n\
    class Dog:\n```"
- md: "## Dog Park Example\n\nPretend for a moment that you are at a dog park. There\
    \ are many dogs of different breeds at the park, all engaging in various dog behaviors.\n\
    \nSuppose now that you want to model the dog park with Python classes. The `Dog`\
    \ class you wrote in the previous section can distinguish dogs by name and age,\
    \ but not by breed.\n\nYou could modify the `Dog` class by adding a `.breed` attribute:\n\
    \n```python\nclass Dog:\n    species = \"Canis familiaris\"\n\n    def __init__(self,\
    \ name, age, breed):\n        self.name = name\n        self.age = age\n     \
    \   self.breed = breed\n```\n\nThe instance methods defined earlier are omitted\
    \ here because they aren't important for this discussion.\n\nNow, to model the\
    \ dog park, you could instantiate a bunch of different dogs:\n\n```python\n>>>\
    \ miles = Dog(\"Miles\", 4, \"Jack Russell Terrier\")\n>>> buddy = Dog(\"Buddy\"\
    , 9, \"Dachshund\")\n>>> jack = Dog(\"Jack\", 3, \"Bulldog\")\n>>> jim = Dog(\"\
    Jim\", 5, \"Bulldog\")\n```\n\nEach breed of dog has slightly different behaviors.\
    \ For example, bulldogs have a low bark that sounds like “woof” but dachshunds\
    \ have a higher pitched bark that sounds more like “yap”.\n\nUsing just the `Dog`\
    \ class, you must supply a string for the `sound` argument of the `.speak()` method\
    \ every time you call it on a `Dog` instance:\n\n```python\n>>> buddy.speak(\"\
    Yap\")\n'Buddy says Yap'\n\n>>> jim.speak(\"Woof\")\n'Jim says Woof'\n\n>>> jack.speak(\"\
    Woof\")\n'Jack says Woof'\n```\n\nPassing a string to every call to `.speak()`\
    \ is repetitive and inconvenient. What’s worse, the string representing the sound\
    \ each `Dog` instance makes depends on the `.breed` attribute, but there is nothing\
    \ stopping you, or someone using the `Dog` class you have created, from passing\
    \ any string they wish.\n\nYou can simplify the experience of working with the\
    \ `Dog` class by creating a child class for each breed of dog. This allows you\
    \ to extend the functionality each child class inherits, including specifying\
    \ a default argument for `.speak()`.\n\n## Parent Classes vs Child Classes\n\n\
    Let’s create a child class for each of the three breeds mentioned above: Jack\
    \ Russell Terrier, Dachshund, and Bulldog.\n\nFor reference, here is the full\
    \ definition of the `Dog` class:\n\n```python\nclass Dog:\n    species = \"Canis\
    \ familiaris\"\n\n    def __init__(self, name, age):\n        self.name = name\n\
    \        self.age = age\n\n    def __str__(self):\n        return f\"{self.name}\
    \ is {self.age} years old\"\n\n    def speak(self, sound):\n        return f\"\
    {self.name} says {sound}\"\n```\n\nRemember, to create a child class, you create\
    \ new class with its own name and then put the name of the parent class in parentheses.\
    \ The following creates three new child classes of the `Dog` class:\n\n```python\n\
    class JackRussellTerrier(Dog):\n    pass\n\nclass Dachshund(Dog):\n    pass\n\n\
    class Bulldog(Dog):\n    pass\n```\n\nWith the child classes defined, you can\
    \ now instantiate some dogs of specific breeds:\n\n```python\n>>> miles = JackRussellTerrier(\"\
    Miles\", 4)\n>>> buddy = Dachshund(\"Buddy\", 9)\n>>> jack = Bulldog(\"Jack\"\
    , 3)\n>>> jim = Bulldog(\"Jim\", 5)\n```\n\nInstances of child classes inherit\
    \ all of the attributes and methods of the parent class:\n\n```python\n>>> miles.species\n\
    'Canis familiaris'\n\n>>> buddy.name\n'Buddy'\n\n>>> print(jack)\nJack is 3 years\
    \ old\n\n>>> jim.speak(\"Woof\")\n'Jim says Woof'\n```\n\nTo determine which class\
    \ a given object belongs to, you can use the built-in `type()` function:\n\n```python\n\
    >>> type(miles)\n<class '__main__.JackRussellTerrier'>\n```\n\nWhat if you wanted\
    \ to determine if `miles` is also an instance of the `Dog` class? You can do this\
    \ with the built-in `isinstance()` function:\n\n```python\n>>> isinstance(miles,\
    \ Dog)\nTrue\n```\n\nNotice that `isinstance()` takes two arguments, an object\
    \ and a class. In the example above, `isinstance()` checks if `miles` is an instance\
    \ of the `Dog` class and returns `True`.\n\nAll of the `miles`, `buddy`, `jack`\
    \ and `jim` objects are instances of the `Dog` class, but `miles` is not an instance\
    \ of the `Bulldog` class, and `jack` is not an instance of the `Dachshund` class:\n\
    \n```python\n>>> isinstance(miles, Bulldog)\nFalse\n\n>>> isinstance(jack, Dachshund)\n\
    False\n```\n\nMore generally, all objects created from a child class are instances\
    \ of the parent class, although they may not be instances of other child classes.\n\
    \nNow that you've got some child classes created for some different breeds of\
    \ dogs, let's give each breed its own sound.\n\n## Extending the Functionality\
    \ of a Parent Class\n\nAt this point, we have four classes floating around: a\
    \ parent class—`Dog`—and three child classes—`JackRussellTerrier`, `Dachshund`\
    \ and `Bulldog`. All three child classes inherit every attribute and method from\
    \ the parent class, including the `.speak()` method.\n\nSince different breeds\
    \ of dogs have slightly different barks, we want to provide a default value for\
    \ the `sound` argument of their respective `.speak()` methods. To do this, we\
    \ need to override the `.speak()` method in the class definition for each breed.\
    \ To override a method defined on the parent class, you define a method with the\
    \ same name on the child class.\n\nLet's see what this looks like for the `JackRussellTerrier`\
    \ class:\n\n```python\nclass JackRussellTerrier(Dog):\n    def speak(self, sound=\"\
    Arf\"):\n        return f\"{self.name} says {sound}\"\n```\n\nThe `.speak()` method\
    \ is now defined on the `JackRussellTerrier` class with the default argument for\
    \ `sound` set to `\"Arf\"`. Now you can call `.speak()` on a `JackRussellTerrier`\
    \ instance without passing an argument to `sound`:\n\n```python\n>>> miles = JackRussellTerrier(\"\
    Miles\", 4)\n>>> miles.speak()\n'Miles says Arf'\n```\n\nSometimes dogs make different\
    \ barks, so if Miles gets angry and growls, you can still call `.speak()` with\
    \ a different sound:\n\n```python\n>>> miles.speak(\"Grrr\")\n'Miles says Grrr'\n\
    ```\n\nOne advantage of class inheritance is that changes to the parent class\
    \ will automatically propagate to their child classes. This occurs as long as\
    \ the attribute or method being changed isn't overridden in the child class.\n\
    \nFor example, let's say you decide to change the string returned by `.speak()`\
    \ in the `Dog` class:\n\n```python\nclass Dog:\n    # Other attributes and methods\
    \ omitted...\n\n    def speak(self, sound):\n        return f\"{self.name} barks:\
    \ {sound}\"\n```\n\nNow, when you create a new `Bulldog` instance named `jim`,\
    \ the result of `jim.speak(\"Woof\")` will be `'Jim barks: Woof'` instead of `'Jim\
    \ says Woof'`:\n\n```python\n>>> jim = Bulldog(\"Jim\", 5)\n>>> jim.speak(\"Woof\"\
    )\n'Jim barks: Woof'\n```\n\nHowever, calling `.speak()` on a `JackRussellTerrier`\
    \ instance won't show the new style of output:\n\n```python\n>>> miles = JackRussellTerrier(\"\
    Miles\", 4)\n>>> miles.speak()\n'Miles says Arf'\n```\n\nSometimes it makes sense\
    \ to completely override a method from a parent class. But in this instance, we\
    \ don't want the `JackRussellTerrier` class to lose any changes that might be\
    \ made to the formatting of the output string of `Dog.speak()`.\n\nTo do this,\
    \ you still need to define a `.speak()` method on the `JackRussellTerrier` class.\
    \ But instead of explicitly defining the output string, you need to call the `Dog`\
    \ class's `.speak()` method *inside* of the child class's `.speak()` method and\
    \ make sure to pass to it whatever is passed to the `sound` argument of `JackRussellTerrier.speak()`.\n\
    \nYou can access the parent class from inside a method of a child class by using\
    \ the `super()` function. Here's how you could re-write the `JackRussellTerrier.speak()`\
    \ method using `super()`:\n\n```python\nclass JackRussellTerrier(Dog):\n    def\
    \ speak(self, sound=\"Arf\"):\n        return super().speak(sound)\n```\n\nWhen\
    \ you call `super().speak(sound)` inside of `JackRussellTerrier`, Python searches\
    \ the parent class, `Dog`, for a `.speak()` method and calls it with the variable\
    \ `sound`. Now, when you call `miles.speak()`, you will see output reflecting\
    \ the new formatting in the `Dog` class:\n\n```python\n>>> miles = JackRussellTerrier(\"\
    Miles\", 4)\n>>> miles.speak()\n'Miles barks: Arf'\n```"
