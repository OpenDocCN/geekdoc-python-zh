    You may find it helpful to think of boolean comparators as asking a question about
    two values. `a == b` asks whether or not `a` and `b` have the same value. Likewise,
    `a != b` asks whether or not `a` and `b` have different values.


    Conditional expressions are not limited to comparing numbers. You may also compare
    values such as strings:'
