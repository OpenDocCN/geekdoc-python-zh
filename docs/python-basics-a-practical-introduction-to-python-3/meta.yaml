    By passing a tuple to `pagesize`, you can create any size page that you want.
    However, the `reportlab` package has some standard page sizes built-in that are
    easier to work with.


    The page sizes are located in the `reportlab.lib.pagesizes` module. For example,
    to set the page size to letter you can import the `LETTER` object from the `pagesizes`
    module and pass it to the `pagesize` parameter when instantiating your `Canvas`:


    ```python

    >>> from reportlab.lib.pagesizes import LETTER

    >>> canvas = Canvas("hello.pdf", pagesize=LETTER)

    ```


    If you inspect the `LETTER` object, you''ll see that it''s a tuple of floats:


    ```python

    >>> LETTER

    (612.0, 792.0)

    ```


    The `reportlab.lib.pagesize` module contains many standard page sizes. Here are
    some of them and their dimensions:


    | Page Size | Dimensions |

    | :--- | :--- |

    | A4 | 210 mm x 297 mm |

    | LETTER | 8.5 in x 11 in |

    | LEGAL | 8.5 in x 14 in |

    | TABLOID | 11 in by 17 in |


    In addition to these, the module contains definitions for all of the [ISO 216
    standard paper sizes](https://en.wikipedia.org/wiki/ISO_216).


    ## Setting Font Properties


    You can also change the font, font size, and font color when you write text to
    the canvas.


    To change the font and font size, use the `Canvas.setFont()` method. First, create
    a new `Canvas` instance with file name `font-example.pdf` and a letter page size:


    ```python

    >>> canvas = Canvas("font-example.pdf", pagesize=LETTER)

    ```


    Then set the font to Times New Roman with a size of 18 points:


    ```python

    >>> canvas.setFont("Times-Roman", 18)

    ```


    Finally, write the string "Times New Roman (18 pt)" to the canvas and save it:


    ```python

    >>> canvas.drawString(1 * inch, 10 * inch, "Times New Roman (18 pt)")

    >>> canvas.save()

    ```


    The text is written one inch from the left side of the page, and ten inches from
    the bottom. Open up the `font-example.pdf` file in your current working directory
    and check it out!


    There are three fonts available by default:


    - "Courier"

    - "Helvetica"

    - "Times-Roman"


    Each font has bold and italicized variants. Here''s a list containing all of the
    font variations available in reportlab:


    - "Courier"

    - "Courier-Bold"

    - "Courier-BoldOblique"

    - "Courier-Oblique"

    - "Helvetica"

    - "Helvetica-Bold"

    - "Helvetica-BoldOblique"

    - "Helvetica-Oblique"

    - "Times-Bold"

    - "Times-BoldItalic"

    - "Times-Italic"

    - "Times-Roman"


    You can also set the font color using the `Canvas.setFillColor()` method. In the
    following example, a PDF file named `font-colors.pdf` with blue text is created:


    ```python

    from reportlab.lib.colors import blue

    from reportlab.lib.pagesizes import LETTER

    from reportlab.lib.units import inch

    from reportlab.pdfgen.canvas import Canvas


    canvas = Canvas("font-colors.pdf", pagesize=LETTER)


    # Set font to Times New Roman with 12 point size

    canvas.setFont("Times-Roman", 12)


    # Draw blue text one inch from the left and ten

    # inches from the bottom

    canvas.setFillColor("blue")

    canvas.drawString(1*inch, 10*inch, "Black text")


    # Save the PDF file

    canvas.save()

    ```


    Notice that the color blue is an object imported from the reportlab.lib.colors
    module. This module contains several common named colors. A full list of colors
    can be found in the reportlab source code.


    The examples in this section highlight the basics of working with ReportLab''s
    Canvas object. But you''ve only scratched the surface. With ReportLab you can
    create tables, forms, and even high-quality graphics from scratch!


    The ReportLab User Guide contains a plethora of examples of how to generate PDF
    documents from scratch. It''s a great place to start if you''re interested in
    learning more about creating PDFs with Python.


