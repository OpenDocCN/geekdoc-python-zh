    # 15.2 Libraries for Working With Other SQL Databases


    If you have a particular type of SQL database that you''d like to access through
    Python, most of the basic syntax is likely to be identical to what you just learned
    for SQLite. However, you''ll need to install an additional package to interact
    with your database since SQLite is the only built-in option.


    There are many SQL variants and corresponding Python packages available. A few
    of the most commonly used and reliable open-source alternatives to SQLite are:


    +   - pyodbc, which connects to ODBC (Open Database Connection) databases, such
    as Microsoft SQL Server

    - psycopg2, which connects to the PostgreSQL database

    - PyMySQL, which connects to MySQL databases


    One difference between SQLite and other databases—besides the actual syntax of
    the SQL code, which changes slightly with most flavors of SQL—is that most databases
    require a username and password to connect. Check the documentation for the particular
    package you want to use to for the syntax for making a database connection.


    The SQLAlchemy package is another popular option for working with databases. SQLAlchemy
    is an object-relational mapping, or ORM,'
- md: 'that uses an object-oriented paradigm to build database queries. It can be
    configured to connect to a variety of databases. The object-oriented approach
    allows you to make queries without writing raw SQL statements.


    ## 15.3 Summary and Additional Resources


    In this chapter, you learned how to interact with the SQLite database that comes
    with Python. SQLite is a small and light SQL database that can be used to store
    and retrieve data in your Python programs. To interact with SQLite in Python,
    you must import the `sqlite3` module.


    To work with an SQLite database, you first need to connect to an existing database,
    or create a new database, with the `sqlite3.connect()` function, which returns
    a `Connection` object. Then you can use the `Connection.cursor()` method to get
    a new `Cursor` object.


    `Cursor` objects are used to execute SQL statements and retrieve query results.
    For example, `Cursor.execute()` and `Cursor.executescript()` are used to execute
    SQL queries. You can retrieve query results using the `Cursor.fetchone()` and
    `Cursor.fetchall()` methods.


    Finally, you learned about several third-party packages that you can use to connect
    to other SQL databases, including `psycopg2`, which is used to connect to PostgreSQL
    databases, and `pyodbc` for Microsoft SQL Server. You also learned about the SQLAlchemy
    library, which provides a standard interface for connecting to a variety of SQL
    databases.


