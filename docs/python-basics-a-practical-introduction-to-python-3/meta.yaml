    # Sorting Lists


    Lists have a .sort() method that sorts all of the items in ascending order. By
    default, the list is sorted in alphabetical or numerical order, depending on the
    type of elements in the list:


    ```

    >>> # Lists of strings are sorted alphabetically

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> colors.sort()

    >>> colors

    [''blue'', ''green'', ''red'', ''yellow'']


    >>> # Lists of numbers are sorted numerically

    >>> numbers = [1, 10, 5, 3]

    >>> numbers.sort()

    >>> numbers

    [1, 3, 5, 10]

    ```


    Notice that .sort() sorts the list in place, so you don''t need to assign it''s
    result to anything.


    .sort() has an option parameter called key that can be used to adjust how the
    list gets sorted. The key parameter accepts a function, and the list is sorted
    based on the return value of that function.


    For example, to sort a list of strings by the length of each string, you can pass
    the len function to key:'
  - '[PAGE 259]


    # 9.3. Nesting, Copying, and Sorting Tuples and Lists


    ```

    >>> colors = ["red", "yellow", "green", "blue"]

    >>> colors.sort(key=len)

    >>> colors

    [''red'', ''blue'', ''green'', ''yellow'']

    ```


    You don''t need to call the function when you pass it to `key`. Pass the name
    of the function without any parentheses. For instance, in the previous example
    the name `len` is passed to `key`, and not `len()`.


    The function that gets passed to `key` must only accept a single argument.


    You can also pass user defined functions to `key`. In the following example, a
    function called `get_second_element()` is used to sort a list of tuples by their
    second elements:


    ```

    >>> def get_second_element(item):

    ...     return item[1]

    ...

    >>> items = [(4, 1), (1, 2), (-9, 0)]

    >>> items.sort(key=get_second_element)

    >>> items

    [(-9, 0), (4, 1), (1, 2)]

    ```


    Keep in mind that any function that you pass to `key` must accept only a single
    argument.


