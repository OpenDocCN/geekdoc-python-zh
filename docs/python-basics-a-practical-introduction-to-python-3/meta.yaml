- md: "## Step 1: Make a Guess About Where the Bug Is Located\n\nThe first step is\
    \ to identify the section of code that likely contains the bug. You may not be\
    \ able to identify exactly where the bug is at first, but you can usually make\
    \ a reasonable guess about which section of your code has an error.\n\nNotice\
    \ that the script is split into two distinct sections: a function definition (where\
    \ `add_underscores()` is defined), and a “main” code block that defines a variable\
    \ `phrase` with the value \"hello\" and then prints the result of calling `add_underscores(phrase)`.\n\
    \nLook at the “main” section:\n\n```\nphrase = \"hello\"\nprint(add_underscores(phrase))\n\
    ```\n\nDo you think the problem could be here? It doesn’t look like it, right?\
    \ Everything about those two lines of code looks good. So, the problem must be\
    \ in the function definition:\n\n```\ndef add_underscores(word):\n    new_word\
    \ = \"_\"\n    for i in range(0, len(word)):\n        new_word = word[i] + \"\
    _\"\n    return new_word\n```\n\nThe first line of code inside the function creates\
    \ a variable `new_word` with the value \"_\". All good there, so we can conclude\
    \ that the problem is somewhere in the body of the `for` loop.\n\n## Step 2: Set\
    \ a Breakpoint and Inspect the Code\n\nNow that you’ve identified where the bug\
    \ must be, set a breakpoint at the start of the `for` loop so that you can trace\
    \ out exactly what’s happening inside with the Debug Control Window:\n\n![](img/4efa9a991b645f75be61871447c559ca_179_0.png)\n\
    \nNow open the Debug Control Window and run the script. Execution still pauses\
    \ on the very first line it sees (which is defining the function). Press the “Go”\
    \ button to run through the code until the breakpoint is encountered. The Debug\
    \ window will now look like this:\n\n![](img/4efa9a991b645f75be61871447c559ca_179_1.png)\n\
    \nAt this point, the code is paused just before entering the for loop in the add_underscores()\
    \ function. Notice that two local variables, word and new_word are displayed in\
    \ the Locals panel. Currently, word has the value \"hello\" and new_word has the\
    \ value \"_\", as expected.\n\nClick the `Step` button once to enter the `for`\
    \ loop. The Debug window changes and a new variable `i` with the value 0 is displayed\
    \ in the “Locals” panel. `i` is the counter used in the `for` loop, and you can\
    \ use it to keep track of which iteration of the `for` loop you are currently\
    \ looking at:\n\n![](img/4efa9a991b645f75be61871447c559ca_180_0.png)\n\nClick\
    \ `Step` one more time. If you look at the *Locals* panel, you’ll see that the\
    \ variable `new_word` has taken on the value \"h_\":\n\n## 7.2. Squash Some Bugs\n\
    \n![](img/4efa9a991b645f75be61871447c559ca_181_0.png)\n\nThis isn't right. Originally,\
    \ `new_word` had the value \"_\" and on the second iteration of the `for` loop\
    \ it should now have the value \"_h_\". If you click `Step` a few more times,\
    \ you'll see that `new_word` gets set to `e_`, then `l_`, and so on.\n\n## Step\
    \ 3: Identify the Error and Attempt to Fix It\n\nThe conclusion you can make at\
    \ this point is that `new_word` is overwritten at each iteration of the `for`\
    \ loop with the next character in the string \"hello\" and a trailing underscore.\
    \ Since there is only one line of code inside the `for` loop, you know that the\
    \ problem must be with the following code:\n\n```\nnew_word = word[i] + \"_\"\n\
    ```\n\nLook at that closely. This line tells Python to get the next character\
    \ of `word`, tack an underscore to the end of it, and assign this new string to\
    \ the variable `new_word`. This is exactly the behavior you've witnessed by stepping\
    \ through the `for` loop!\n\nTo fix the problem, you need to tell Python to concatenate\
    \ the string `word[i] + \"_\"` to the existing value of `new_word`. Press the\
    \ \"Quit\" button in the Debug Control Window, but don't close that window just\
    \ yet. Open the script window and change the line inside the for loop to:\n\n\
    ```\nnew_word = new_word + word[i] + \"_\"\n```\n\n## Step 4: Repeat Steps 1–3\
    \ Until the Bug is Gone\n\nSave the new changes to your script and run it again.\
    \ In the Debug window, press the `Go` button to execute the code up until the\
    \ break-point.\n\n> **Note**\n\nIf you closed the debugger in the previous step\
    \ without clicking on `Quit`, you may see the following error when re-opening\
    \ the Debug Control Window:\n\nYou can only toggle the debugger when idle\n\n\
    Always be sure to click `Go` or `Quit` when you're finished with a debugging session\
    \ instead of just closing the debugger, or you might have trouble reopening it.\
    \ To get rid of this error, you'll have to close IDLE and re-open it.\n\nJust\
    \ like before, your script is now paused just before entering the for loop in\
    \ the `add_underscores()` function. Press the `Step` button repeatedly and watch\
    \ what happens to the `new_word` variable at each iteration. What do you see now?\
    \ Success! Everything is working as expected!\n\nIn this example, your first attempt\
    \ at fixing the bug worked, so you don't need to repeat steps 1–3 anymore. However,\
    \ this won't always be the case. Sometimes you'll have to repeat the process several\
    \ times before you've fixed a bug.\n\nIt's also important to keep in mind that\
    \ tools like debuggers don't tell you how to fix a bug. They only help you identify\
    \ where exactly a problem occurs in your code.\n\n## Alternative Ways to Find\
    \ Mistakes in Your Code\n\nDebugging can be tricky and time-consuming, but sometimes\
    \ it's the most reliable way to find errors that you've overlooked. However, before\
    \ you open a debugger, it is sometimes simpler to locate errors using well placed\
    \ `print()` functions to display the values of your variables.\n\nFor example,\
    \ instead of debugging the previous script with the Debug Control Window, you\
    \ could add the following line to the end of the `for` loop in the `add_underscores()`\
    \ function:\n\n```\nprint(f\"i = {i}; new_word = {new_word}\")\n```\n\nThe altered\
    \ script would then look like this:\n\n```\ndef add_underscores(word):\n    new_word\
    \ = \"_\"\n    for i in range(0, len(word)):\n        new_word = word[i] + \"\
    _\"\n        print(f\"i = {i}; new_word = {new_word}\")\n    return new_word\n\
    \nphrase = \"hello\"\nprint(add_underscores(phrase))\n```\n\nWhen you run the\
    \ script, the interactive window displays the following output:\n\n```\ni = 0;\
    \ new_word = h_\ni = 1; new_word = e_\ni = 2; new_word = l_\ni = 3; new_word =\
    \ l_\ni = 4; new_word = o_\no_\n```\n\nThis shows you what the value of `new_word`\
    \ is at each iteration of the `for` loop. The final line containing just a single\
    \ underscore is the result of running `print(add_underscore(phrase))` at the end\
    \ of the script.\n\n## 7.2. Squash Some Bugs\n\nBy looking at the above output,\
    \ you could come to the same conclusion you did while debugging with the Debug\
    \ Control Window. That is, the problem is that `new_word` is overwritten at each\
    \ iteration.\n\nMany Python programmers prefer this simple method for some quick\
    \ and dirty debugging on the fly. It is a handy technique but has some disadvantages\
    \ when compared to IDLE’s debugger.\n\nThe most significant disadvantage is that\
    \ debugging with the `print()` function requires you to run your entire script\
    \ each time you want to inspect the values of your variables. For long scripts,\
    \ this can be an enormous waste of time compared to setting breakpoints and using\
    \ the “Go” button in the Debug Control Window.\n\nAnother disadvantage is that\
    \ you’ll have to remember to remove those `print()` function calls from your code\
    \ when you are done debugging it. Otherwise, users may see unnecessary and potentially\
    \ confusing output when they run your program.\n\nThe example loop in this section\
    \ may be a good example for illustrating the process of debugging, but it is not\
    \ the best example of Pythonic code. The use of the index `i` is a giveaway that\
    \ there might be a better way to write the loop.\n\nOne way to improve this loop\
    \ is to iterate over the characters in the string `word` directly. Here’s one\
    \ way to do that:\n\n```\ndef add_underscores(word):\n    new_word = \"_\"\n \
    \   for char in word:\n        new_word = new_word + char + \"_\"\n    return\
    \ new_word\n```\n\nThe process of re-writing existing code to be cleaner, easier\
    \ to read and understand, or adhere to code standards set by a team is called\
    \ **refactoring**. We won’t discuss refactoring much in this course, but it is\
    \ an essential part of writing professional quality code.\n\nLeave feedback on\
    \ this section »"
