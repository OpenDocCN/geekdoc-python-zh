    > This section is not meant to be an exhaustive introduction to ReportLab, but\
    \ rather a sample of what is possible.\n>\n> For more examples, checkout the ReportLab's\
    \ [code snippet page](http://www.reportlab.com/).\n\nLet's start by setting up\
    \ your environment to work with ReportLab.\n\n## Install reportlab\n\nTo get started,\
    \ you need to install ReportLab with `pip`:\n\n```bash\n$ python3 -m pip install\
    \ reportlab\n```\n\nYou can verify the installation with `pip show`:\n\n```bash\n\
    $ python3 -m pip show reportlab\nName: reportlab\nVersion: 3.5.34\nSummary: The\
