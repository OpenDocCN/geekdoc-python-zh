    \ \"abc\"\n>>> num_letters = len(letters)\n>>> num_letters\n3\n```\n\nFirst, the\
    \ string \"abc\" is assigned to the variable `letters`. Then `len()` is used to\
    \ get the length of `letters` and this value is assigned to the `num_letters`\
    \ variable. Finally, the value of `num_letters`, which is 3, is displayed.\n\n\
    ## Multiline Strings\n\nThe PEP 8 style guide recommends that each line of Python\
    \ code contain no more than 79 characters—including spaces.\n\n> **Note**\n\n\
    PEP 8’s 79-character line-length is recommended because, among other things, it\
    \ makes it easier to read two files side-by-side. However, many Python programmers\
    \ believe forcing each line to be at most 79 characters sometimes makes code harder\
    \ to read.\n\nIn this book we will strictly follow PEP 8’s recommended line-length.\
    \ Just know that you will encounter lots of code in the real world with longer\
    \ lines.\n\nWhether you decide to follow PEP 8, or choose a larger number of characters\
    \ for your line-length, you will sometimes need to create string literals with\
    \ more characters than your chosen limit.\n\nTo deal with long strings, you can\
    \ break the string up across multiple lines into a **multiline string**. For example,\
    \ suppose you need to fit the following text into a string literal:\n\n> “This\
    \ planet has—or rather had—a problem, which was this: most of the people living\
    \ on it were unhappy for pretty much of the time. Many solutions were suggested\
    \ for this problem, but most of these were largely concerned with the movements\
    \ of small green pieces of paper, which is odd because on the whole it wasn’t\
    \ the small green pieces of paper that were unhappy.”\n\n— Douglas Adams, *The\
    \ Hitchhiker’s Guide to the Galaxy*\n\n### 4.1. What is a String?\n\nThis paragraph\
    \ contains far more than 79 characters, so any line of code containing the paragraph\
    \ as a string literal violates PEP 8. So, what do you do?\n\nThere are a couple\
    \ of ways to tackle this. One way is to break the string up across multiple lines\
    \ and put a backslash (\\) at the end of all but the last line. To be PEP 8 compliant,\
    \ the total length of the line, including the backslash, must be 79 characters\
    \ or less.\n\nHere's how you could write the paragraph as a multiline string using\
    \ the backslash method:\n\n```\nparagraph = \"This planet has - or rather had\
    \ - a problem, which was \\nthis: most of the people living on it were unhappy\
    \ for pretty much \\nof the time. Many solutions were suggested for this problem,\
    \ but \\nmost of these were largely concerned with the movements of small \\ngreen\
    \ pieces of paper, which is odd because on the whole it wasn't \\nthe small green\
    \ pieces of paper that were unhappy.\"\n```\n\nNotice that you don't have to close\
    \ each line with a quotation mark. Normally, Python would get to the end of the\
    \ first line and complain that you didn't close the string with a matching double\
    \ quote. With a backslash at the end, however, you can keep writing the same string\
    \ on the next line.\n\nWhen you `print()` a multiline string that is broken up\
    \ by backslashes, the output displayed on a single line:\n\n```\n>>> long_string\
    \ = \"This multiline string is \\ndisplayed on one line\"\n>>> print(long_string)\n\
    This multiline string is displayed on one line\n```\n\nMultiline strings can also\
    \ be created using triple quotes as delimiters (\"\"\" or '''). Here is how you\
    \ might write a long paragraph using this approach:\n\n```\nparagraph = \"\"\"\
    This planet has - or rather had - a problem, which was\nthis: most of the people\
    \ living on it were unhappy for pretty much\nof the time. Many solutions were\
    \ suggested for this problem, but\nmost of these were largely concerned with the\
    \ movements of small\ngreen pieces of paper, which is odd because on the whole\
    \ it wasn't\nthe small green pieces of paper that were unhappy.\"\"\"\n```\n\n\
    Triple-quoted strings preserve whitespace. This means that running print(paragraph)\
    \ displays the string on multiple lines just like it is in the string literal,\
    \ including newlines. This may or may not be what you want, so you'll need to\
    \ think about the desired output before you choose how to write a multiline string.\n\
    \nTo see how whitespace is preserved in a triple-quoted string, type the following\
    \ into IDLE's interactive window:\n\n```\n>>> print(\"\"\"An example of a\n...\
    \     string that spans across multiple lines\n...         that also preserves\
    \ whitespace.\"\"\")\nAn example of a\n    string that spans across multiple lines\n\
    \        that also preserves whitespace.\n```\n\nNotice how the second and third\
    \ lines in the output are indented exactly the same way they are in the string\
    \ literal.\n\n> **Note**\n\nTriple-quoted strings have a special purpose in Python.\
    \ They are used to document code. You'll often find them at the top of a .py with\
    \ a description of the code's purpose. They are also used to document custom functions.\n\
    \nWhen used to document code, triple-quoted strings are called **docstrings**.\
    \ You'll learn more about docstrings in Chapter 6.\n\n## Review Exercises\n\n\
    You can find the solutions to these exercises and many other bonus resources online\
