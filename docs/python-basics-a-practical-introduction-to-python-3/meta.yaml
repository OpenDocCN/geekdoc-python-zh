    Python, you may encounter problems when running the code examples.


    ### Install Python


    There is a good chance your Ubuntu distribution has Python installed already,
    but it probably won''t be the latest version, and it may be Python 2 instead of
    Python 3.


    To find out what version(s) you have, open a terminal window and try the following
    commands:


    ```

    $ python --version

    $ python3 --version

    ```


    One or more of these commands should respond with a version, as below (your version
    number may vary):


    ```

    $ python3 --version

    Python 3.8.1

    ```


    If the version shown is Python 2.x or a version of Python 3 that is less than
    3.8, then you want to install the latest version. How you install Python on Ubuntu
    depends on which version of Ubuntu you are running. You can determine your local
    Ubuntu version by running the following command:


    ```

    $ lsb_release -a

    No LSB modules are available.

    Distributor ID: Ubuntu

    Description:    Ubuntu 18.04.1 LTS

    Release:        18.04

    Codename:       bionic

    ```


    Look at the version number next to Release in the console output, and follow the
    corresponding instructions below.


    ### Ubuntu 18.04+


    Ubuntu version 18.04 does not come with Python 3.8 by default, but it is in the
    Universe repository. You can install it with the following commands in the Terminal
    application:


    ```

    $ sudo apt-get update

    $ sudo apt-get install python3.8 idle-python3.8

    ```


    ### Ubuntu 17 and lower


    For Ubuntu versions 17 and lower, Python 3.8 is not in the Universe repository.
    You need to get it from a Personal Package Archive (PPA). To install Python from
    the “deadsnakes” PPA, run the following commands in the Terminal application:


    ```

    $ sudo add-apt-repository ppa:deadsnakes/ppa

    $ sudo apt-get update

    $ sudo apt-get install python3.8 idle-python3.8

    ```


    You can check that the correct version of Python was installed by running `python3
    --version`. If you see a version number less than 3.7, you may need to type `python3.8
    --version`. Now you are ready to open IDLE and get ready to write your first Python
    program.


    ### Open IDLE


    You can open IDLE from the command line by typing the following:


    ```

    $ idle-python3.8

    ```


    On some Linux installations, you can open IDLE with the following shortened command:


    ```

    $ idle3

    ```


    > **Note**


    We recommend using IDLE to follow along with this book.


    You may use a different code editor if you prefer. However, some chapters, such
    as Chapter 7: *Finding And Fixing Code Bugs*, contain material specific to IDLE.


    IDLE opens a **Python shell** in a new window. The Python shell is an interactive
    environment that allows you to type in some Python code and execute it immediately.
    It is a great way to get started with Python!


    The Python shell window looks like this:


    ![](img/4efa9a991b645f75be61871447c559ca_41_0.png)


    At the top of the window, you can see the version of Python that is running and
    some information about the operating system. If you see a version less than 3.8,
    you may need to revisit the installation instructions in the previous section.


    > **Important**


    If you opened IDLE with the `idle3` command and see a version less than 3.7 displayed
    in the Python shell window, then you will need to open IDLE with the `idle-python3.8`
    command.


    The `>>>` symbol that you see in the IDLE window is called a **prompt**. Whenever
    you see this, it means that Python is waiting for you to give it some instructions.


    > **Interactive Quiz**


    This chapter comes with a free online quiz to check your learning progress. You
    can access the quiz using your phone or computer at the following web address:


    [realpython.com/quizzes/python-basics-2](https://realpython.com/quizzes/python-basics-2)


    Now that you have Python installed, let''s get straight into writing your first
    Python program! Go ahead and move on to Chapter 3.


