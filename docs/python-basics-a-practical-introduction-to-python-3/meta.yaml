    \ the technology behind multiple world-class companies and offers fantastic career\
    \ opportunities for any programmer who masters it.\n\n# 1.1 Why This Book?\n\n\
    Let's face it, there's an overwhelming amount of information about Python on the\
    \ internet.\n\nBut many beginners who are studying on their own have trouble fig-"
