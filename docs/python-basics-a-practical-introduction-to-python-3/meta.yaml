    Of course, even though both `a` and `b` are distinct `Dog` instances, they have
    the same type:


    ```

    >>> type(a) == type(b)

    True

    ```


    # Class and Instance Attributes


    Let''s look at a slightly more complex example using the `Dog` class we defined
    with `.name` and `.age` instance attributes:


    ```

    >>> class Dog:

    ...     species = "Canis familiaris"

    ...     def __init__(self, name, age):

    ...         self.name = name

    ...         self.age = age

    ...

    >>> buddy = Dog("Buddy", 9)

    >>> miles = Dog("Miles", 4)

    ```


    After declaring the new `Dog` class, two new instances are created—one `Dog` whose
    name is Buddy and is nine years old, and another named Miles who is four years
    old.


    Does anything look a little strange about how the `Dog` objects are instantiated?
    The `.__init__()` method has three parameters, so why are only two arguments passed
    to it in the example?


    When you instantiate a `Dog` object, Python creates a new instance and passes
    it to the first parameter of `.__init__()`. This essentially removes the `self`
    parameter, so you only need to worry about the `name` and `age` parameters.


    After the `Dog` instances are created, you can access their instance attributes
    by using **dot notation**:


    ```

    >>> buddy.name

    ''Buddy''

    ```'
