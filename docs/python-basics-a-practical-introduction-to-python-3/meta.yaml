    >>>

    ```


    This creates a file called `temperatures.csv` in your home directory and opens
    it in append mode. On a new line at the end of the file, the first value in the
    `temperature_readings` list is written to the file. Then each remaining value
    in the list is written, preceded by a comma, to the same line.


    The final string of text written to the file "68,65,68,70,74,72". You can verify
    this by reading the to text:


    ```

    >>> with file_path.open(mode="r", encoding="utf-8") as file:

    ...     text = file.read()

    ...

    >>> text

    ''68,65,68,70,74,72''

    ```


    The format that in which you have saved the values is called **comma-separated
    value**, or **CSV** for short. The `temperatures.csv` file is called a csv file.


    csv files are a great way to store records of sequential data because you can
    recover each row of the csv value as a list:


    ```

    >>> temperatures = text.split(",")

    >>> temperatures

    [''68'', ''65'', ''68'', ''70'', ''74'', ''72'']

    ```


    In Section 9.2: *Lists Are Mutable Sequences*, you learned how to create a list
    from a string using the `.split()` string method. In the example above, a new
    list is created from the `text` read from the `temperatures.csv` file.'
