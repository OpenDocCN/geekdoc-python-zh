    \ 和 `.grid()` 管理器创建响应式布局。\n\n最后，你将所有这些技能结合在一起，创建了两个完整的 GUI 应用程序：一个温度转换器和一个简单的文本编辑器。\n\
    \n> **互动测验**\n\n本章附带一个免费的在线测验，以检查你的学习进度。你可以使用手机或电脑通过以下网址访问测验：\n\n[realpython.com/quizzes/python-basics-17](https://realpython.com/quizzes/python-basics-17)\n\
    \n## 附加资源\n\n要了解更多关于 Python 中 GUI 编程的信息，请查看以下资源：\n\n- [Tkinter 教程](https://realpython.com/python-gui-tkinter/)\n\
    - [realpython.com 上的推荐资源](https://realpython.com/python-gui-tkinter/)\n\n[对此部分提供反馈\
