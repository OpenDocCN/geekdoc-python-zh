    \ 270 degrees to rotate the PDF pages.\n4. Display a file selection dialog for\
    \ saving the rotated PDF.\n5. If the user tries to save a file with the same name\
    \ as the input file:\n   - Alert the user with a message box that this is not\
    \ allowed.\n   - Return to step 4.\n6. If the user cancels the file save dialog,\
