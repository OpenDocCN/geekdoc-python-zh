    # 14.4 Concatenating and Merging PDFs


    Two common tasks when working with PDF files are concatenating and merging several
    PDFs together into a single file.


    When you concatenate two or more PDFs together, you join the files into a single
    document one after another. For example, a company may concatenate several daily
    reports into one monthly report at the end of a month.


    Merging two PDFs together also joins two PDFs into a single file, but instead
    of joining the second PDF at the end of the first, it can be inserted after a
    specific page in the first PDF, pushing all following pages in the first PDF to
    the end of the second one.'
