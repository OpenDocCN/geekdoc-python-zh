    # 12.6. Read and Write CSV Data


    The values in the `temperatures` list are strings, not integers like the values
    originally written to the file. This is because values read from a text file are
    always read as strings.


    You can change convert the strings to integers using a list comprehension:


    ```

    >>> int_temperatures = [int(temp) for temp in temperatures]

    >>> int_temperatures

    [68, 65, 68, 70, 74, 72]

    ```


    You have now recovered the list that you originally wrote to the `temperatures.csv`
    file!


    What these examples illustrate is that a csv file is a plan text file. Using techniques
    from (Section 11.4: Reading and Writing Files)[#read-write-files], you can store
    sequences of values in the rows of the csv file, and then read from the file to
    recover the data.


    Reading and writing csv files is so common that the Python standard library has
    a module called `csv` to lessen to workload required for working with csv files.
    In the following sections, you''ll learn how to use the csv module to write to
    and read from csv files.


