    \n## 17.2 使用 matplotlib 绘制图形\n\n在上一节中，你学习了如何使用 NumPy 包处理数据数组。虽然 NumPy 使数据处理和操作变得简单，但它并未提供供人类消费数据的手段。为此，你需要可视化你的数据。\n\
    \n数据可视化是一个广泛的主题，拥有自己的理论以及众多用于显示和交互可视化的工具。在本节中，你将了解 matplotlib 包的入门知识，它是用于快速创建二维图形的较受欢迎的包之一。matplotlib\
    \ 最初于 2003 年发布，是目前可用的最古老的 Python 绘图库之一。它至今仍然流行，并且仍在积极开发中。\n\n如果你曾经在 MATLAB 中创建过图形，你会发现\
    \ matplotlib 在许多方面直接模拟了这种体验。MATLAB 和 matplotlib 之间的相似之处是有意为之的。MATLAB 的绘图接口是 matplotlib\
    \ 的直接灵感来源。即使你没有使用过 MATLAB，你也可能会发现使用 matplotlib 创建绘图简单而直接。\n\n让我们开始吧！\n\n# 安装 matplotlib\n\
    \n你可以使用 `pip3` 从终端安装 matplotlib：\n\n```\npip3 install matplotlib\n```\n\n然后你可以使用\
    \ `pip3 show` 查看有关该包的一些详细信息：\n\n```\n$ pip3 show matplotlib\nName: matplotlib\n\
    Version: 2.2.3\nSummary: Python plotting package\nHome-page: http://matplotlib.org\n\
    Author: John D. Hunter, Michael Droettboom\nAuthor-email: matplotlib-users@python.org\n\
    License: BSD\nLocation: c:\\realpython\\venv\\lib\\site-packages\nRequires: python-dateutil,\
    \ pytz, kiwisolver, numpy,\n          cycler, six, pyparsing\nRequired-by:\n```\n\
    \n特别要注意的是，撰写本文时的最新版本是 2.2.3。\n\n# 使用 pyplot 进行基本绘图\n\nmatplotlib 包提供了两种不同的创建绘图的方法。第一种，也是最简单的方法是通过\
    \ pyplot 接口。这是 MATLAB 用户会觉得最熟悉的接口。\n\n在 `matplotlib` 中绘图的第二种方法是通过所谓的[面向对象 API](https://realpython.com/python-matplotlib-guide/)。面向对象的方法比\
    \ `pyplot` 接口提供了更多对绘图的控制。然而，这些概念通常更加抽象。\n\n在本节中，你将学习如何开始使用 `pyplot` 接口。你很快就能制作出一些漂亮的绘图！\n\
    \n> **注意**\n\n`matplotlib` 的开发人员建议你尝试使用面向对象 API 而不是 `pyplot` 接口。实际上，如果 `pyplot`\
    \ 接口提供了你需要的一切，那么不要羞于坚持使用它！\n\n话虽如此，如果你有兴趣了解更多关于面向对象方法的信息，请查看 Real Python 的 [Python\
    \ Plotting With Matplotlib (Guide)](https://realpython.com/python-matplotlib-guide/)。\n\
    \n让我们从创建一个简单的绘图开始。打开 IDLE 并运行以下脚本：\n\n```python\nfrom matplotlib import pyplot\
    \ as plt\n\nplt.plot([1, 2, 3, 4, 5])\nplt.show()\n```\n\n一个新窗口出现，显示以下绘图：\n\n\
    ![](img/4efa9a991b645f75be61871447c559ca_510_0.png)\n\n在这个简单的脚本中，你只用一行代码就创建了一个绘图。`plt.plot([1,\
    \ 2, 3, 4, 5])` 这行代码创建了一个通过点 (0, 1), (1, 2), (2, 3), (3, 4) 和 (4, 5) 的线的绘图。你传递给\
    \ `plt.plot()` 函数的列表 [1, 2, 3, 4, 5] 代表了绘图中点的 y 值。由于你没有指定任何 x 值，matplotlib 自动使用列表元素的索引，由于\
    \ Python 从 0 开始计数，因此索引为 0, 1, 2, 3 和 4。\n\n`plt.plot()` 函数创建了一个绘图，但它不显示任何内容。必须调用\
    \ `plt.show()` 函数才能显示绘图。\n\n> **注意**\n\n如果你在 Windows 上工作，你应该能够毫无问题地从 IDLE 的交互式窗口重新创建上面的绘图。但是，某些操作系统在从交互式窗口调用\
    \ `plt.show()` 时显示绘图会遇到问题。我们建议在新脚本中完成每个示例。\n\n如果 `plt.show()` 在你的机器上可以从交互式窗口正常工作，并且你决定以这种方式继续，请注意，一旦图形显示在新窗口中，控制权就不会返回到交互式窗口，直到你关闭图形的窗口。也就是说，在图形窗口关闭之前，你不会看到新的\
    \ `>>>` 提示符。\n\n你可以通过向 `plt.plot()` 函数传递两个列表来指定绘图中点的 x 值。当向 `plt.plot()` 提供两个参数时，第一个列表指定\
    \ x 值，第二个列表指定 y 值：\n\n```python\nfrom matplotlib import pyplot as plt\n\nxs =\
    \ [1, 2, 3, 4, 5]\nys = [2, 4, 6, 8, 10]\n\nplt.plot(xs, ys)\nplt.show()\n```\n\
    \n运行上面的脚本会产生以下绘图：\n\n![](img/4efa9a991b645f75be61871447c559ca_512_0.png)\n\n乍一看，这个图形可能看起来与第一个完全相同。但是，轴上的标签现在反映了点的新\
    \ x 和 y 坐标。\n\n你可以使用 `plot()` 来绘制不仅仅是线。在上面的图形中，被绘制的点恰好都落在同一条线上。默认情况下，当使用 `.plot()`\
    \ 绘制点时，每对连续的点都用一条线段连接。\n\n以下绘图显示了一些不落在一条线上的数据：\n\n```python\nfrom matplotlib import\
