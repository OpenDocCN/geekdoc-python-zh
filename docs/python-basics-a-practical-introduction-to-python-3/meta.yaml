    \ or higher level algebra math class, you may remember that a complex number is\
    \ a number with two distinct components: a **real** component and an **imaginary**\
    \ component.\n\nThere are several ways to denote complex numbers, but a common\
    \ method is to indicate the real component with the letter *i* and the imaginary\
    \ component with the letter *j*. For example, `1i + 2j` is the complex number\
    \ with real part 1 and imaginary part 2.\n\nTo create a complex number in Python,\
    \ you simply write the real part, followed by a plus sign and the imaginary part\
    \ with the letter `j` at the end:\n\n```python\n>>> n = 1 + 2j\n```\n\nWhen you\
    \ inspect the value of `n`, you'll notice that Python wraps the number with parentheses:\n\
    \n```python\n>>> n\n(1+2j)\n```\n\nThis convention helps eliminate any confusion\
    \ that the displayed output may represent a string or a mathematical expression.\n\
    \nImaginary numbers come with two properties, `.real` and `.imag`, that return\
    \ the real and imaginary component of the number, respectively:\n\n```python\n\
    >>> n.real\n1.0\n\n>>> n.imag\n2.0\n```\n\nNotice that Python returns both the\
    \ real and imaginary components as floats, even though they were specified as\
    \ integers.\n\nComplex numbers also have a `.conjugate()` method that returns\
    \ the complex conjugate of the number:\n\n```python\n>>> n.conjugate()\n(1-2j)\n\
    ```\n\nFor any complex number, its **conjugate** is the complex number with the\
    \ same real part and an imaginary part that is the same in absolute value but\
    \ with the opposite sign. So in this case, the complex conjugate of `1 + 2j` is\
    \ `1 - 2j`.\n\n> **Note**\n>\n> The `.real` and `.imag` properties don't need\
    \ parentheses after them like the method `.conjugate()` does.\n>\n> The `.conjugate()`\
    \ method is a function that performs an action on the complex number. `.real`\
    \ and `.imag` don't perform any action, they just return some information about\
    \ the number.\n>\n> The distinction between methods and properties is a part of\
    \ **object oriented programming**, which you will learn about in Chapter 10.\n\
    \nAll of the arithmetic operators that work with floats and integers work with\
    \ complex numbers also, except for the floor division (`//`) operator. Since this\
    \ isn't a math book, we won't discuss the mechanics of [complex arithmetic](complex\
    \ arithmetic). Instead, here are some examples of using complex numbers with arithmetic\
    \ operators:\n\n```python\n>>> a = 1 + 2j\n>>> b = 3 - 4j\n\n>>> a + b\n(4-2j)\n\
    \n>>> a - b\n(-2+6j)\n\n>>> a * b\n(11+2j)\n\n>>> a ** b\n(932.1391946432212+95.9465336603419j)\n\
    \n>>> a / b\n(-0.2+0.4j)\n\n>>> a // b\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\nTypeError: can't take floor of complex\
    \ number.\n```\n\nInterestingly, although not surprising from a mathematical point\
    \ of view, `int` and `float` objects also have the `.real` and `.imag` properties,\
    \ as well as the `.conjugate()` method:\n\n```python\n>>> x = 42\n>>> x.real\n\
    42\n>>> x.imag\n0\n>>> x.conjugate()\n42\n\n>>> y = 3.14\n>>> y.real\n3.14\n>>>\
    \ y.imag\n0.0\n>>> y.conjugate()\n3.14\n```\n\nFor floats and integers, `.real`\
    \ and `.conjugate()` always return the number itself, and `.imag` always returns\
    \ 0. One thing to notice, however, is that `n.real` and `n.imag` return an integer\
    \ if `n` is an integer, and a float if `n` is a float.\n\nNow that you have seen\
    \ the basics of complex numbers, you might be wondering when you would ever need\
    \ to use them. If you are learning Python for web development or automation, the\
    \ truth is you may never need to use complex numbers.\n\nOn the other hand, complex\
