  mdcn: "为了阐明这个观点，假设你是一名生物学家。你应该放弃生物学，去从事前端网页开发工作吗？可能不应该。但是，掌握我在这篇前言开头提到的技能，比如使用`requests`从网络获取数据，将对你的生物学研究工作产生难以置信的强大助力。\n\
    \n与其手动从网络或电子表格中导出和抓取数据，使用Python，你可以在手动完成一项任务的时间内，抓取成千上万的数据源或电子表格。Python技能能够将你的*生物学能力*放大，使其远超你的同事，并成为你的*超能力*。\n\
    \n## Dan 与 Real Python\n\n最后，让我对本书的作者们做个介绍。Dan Bader 与其他 Real Python 的作者们日复一日地通过\
    \ realpython.com 为我们所有人带来清晰而有力的 Python 概念讲解。\n\n他们对 Python 生态系统有着独特的见解，并且深知初学者需要了解什么。\n\
    \n我放心地将你们在这段 Python 学习之旅中托付给他们。请使用这本优秀的书籍，去学习这门令人惊叹的语言吧。最重要的是，记住要享受其中的乐趣！\n\n\
    — **Michael Kennedy**，Talk Python 创始人 (@mkennedy)\n\n## 第 1 章\n\n## 引言\n\n欢迎阅读\
    \ Real Python 的 *Python 基础* 一书，本书已针对 Python 3.8 全面更新！在本书中，你将学习实用的 Python 编程技术，并通过有用且有趣的示例进行说明。\n\
    \n无论你是编程新手，还是希望深入学习一门新语言的专业软件开发者，本书都将教你所有实用的 Python 知识，帮助你独立开始项目。\n\n无论你的最终目标是什么，只要你使用计算机，你很快就会发现无数种方法，通过创建\
    \ Python 程序来自动化任务和解决问题，从而改善你的生活。\n\n但是，Python 作为一门编程语言，究竟有什么特别之处呢？Python 是开源的免费软件，这意味着你可以免费下载它，并用于任何目的，无论是商业还是非商业用途。\n\
    \nPython 还拥有一个令人惊叹的社区，他们构建了许多额外的有用工具，你可以在自己的程序中使用。需要处理 PDF 文档？有一个全面的工具可以做到。想从网页收集数据？无需从头开始！\n\
    \nPython 的设计初衷就是比其他编程语言更易于使用。通常，阅读 Python 代码比阅读其他语言的代码容易得多，编写 Python 代码也比用其他语言编写快得多。\n\
    \n例如，这里有一段用 C 语言（另一种常用编程语言）编写的简单代码：\n\n```\n#include <stdio.h>\n\nint main(void)\n\
    {\n    printf(\"Hello, world\\n\");\n}\n```\n\n这个程序所做的只是在屏幕上显示文本 `Hello, world`。输出一个短语竟然需要这么多工作！下面是用\
    \ Python 编写的同一个程序：\n\n```\nprint(\"Hello, world\")\n```\n\n这非常简单，对吧？Python 代码编写更快，也更容易阅读。我们发现它看起来也更友好、更平易近人！\n\
    \n同时，Python 拥有其他语言的所有功能，甚至更多。你可能会惊讶于有多少专业产品是基于 Python 代码构建的：Instagram、YouTube、Reddit、Spotify，仅举几例。\n\
    \nPython 不仅是一门友好且有趣的编程语言——它还为多家世界级公司背后的技术提供动力，并为任何掌握它的程序员提供了绝佳的职业机会。\n\n### 1.1\
    \ 为什么选择这本书？\n\n让我们面对现实，互联网上关于 Python 的信息多得令人应接不暇。\n\n但许多自学的初学者很难弄清楚*学什么*以及*按什么顺序*学习。\n\
    \n你可能在问自己：“为了打下坚实的基础，我一开始应该学习 Python 的哪些内容？”如果是这样，那么这本书就是为你准备的——无论你是完全的初学者，还是之前已经涉猎过\
    \ Python 或其他语言。\n\n*Python 基础* 用通俗易懂的英语编写，并将你真正需要知道的核心概念分解成易于消化的小块。这意味着你将很快掌握“足以应付危险”的\
    \ Python 知识。\n\n本书不会仅仅罗列枯燥的语言特性列表，而是会向你展示不同的构建模块如何组合在一起，以及使用 Python 构建真实应用程序和脚本涉及哪些内容。\n\
    \n你将循序渐进地掌握 Python 的基本概念，这些概念将帮助你开启学习 Python 的旅程。\n\n许多编程书试图涵盖每个命令的每一种可能变体，这很容易让读者迷失在细节中。如果你在寻找参考手册，这种方法很棒，但它是学习编程语言的糟糕方式。你不仅会把大部分时间花在死记硬背那些你永远不会用到的东西上，而且这也不有趣！\n\
    \n本书基于 80/20 法则构建。我们将涵盖绝大多数情况下使用的命令和技术，并专注于如何编程解决现实世界中的问题，从而让你的生活更轻松。\n\n这样，我们保证你将：\n\
    \n- 快速学习有用的编程技术\n- 花更少的时间在无关紧要的复杂问题上挣扎\n- 在自己的生活中发现更多 Python 的实际用途\n- 在这个过程中获得更多乐趣\n\
    \n一旦你掌握了本书的内容，你将获得足够坚实的基础，独自探索更高级的领域将变得轻而易举。\n\n所以，开始吧！学习用一门广泛使用、免费的语言编程，它能做的事情远超你的想象。\n\
    \n### 1.2 关于 Real Python\n\n在 [Real Python](https://realpython.com)，你将从来自世界各地的专业\
    \ Python 开发者社区学习真实的编程技能。\n\n[realpython.com](https://realpython.com) 网站于 2012\
    \ 年上线，目前每月通过书籍、编程教程和其他深入的学习资源帮助超过两百万 Python 开发者。\n\n参与本书编写的每个人都是从 Real Python\
    \ 团队中招募的 *Python 实践者*，在软件行业拥有多年专业经验。\n\n你可以在以下网址找到 Real Python：\n\n- [realpython.com](https://realpython.com)\n\
    - [@realpython on Twitter](https://twitter.com/realpython)\n- [The Real Python\
    \ Email Newsletter](https://realpython.com/newsletters/)\n\n### 1.3 如何使用本书\n\n\
    本书的前半部分是对所有 Python 基础知识的快速而全面的概述。你不需要任何编程经验即可开始。后半部分则专注于为有趣、真实的编码问题寻找实用的解决方案。\n\
    \n作为初学者，我们建议你从头到尾通读本书的前半部分。后半部分涵盖的主题重叠较少，因此你可以更轻松地跳着阅读，但随着阅读的深入，章节难度会逐渐增加。\n\n\
    如果你是经验更丰富的程序员，那么你可能会发现自己直接跳到本书的第二部分。但不要忽视首先打好坚实的基础，并确保在过程中填补任何知识空白。\n\n大多数章节后面都附有**复习练习**，以帮助你确保掌握了所有涵盖的主题。还有一些**代码挑战**，这些更具挑战性，通常需要你将前面章节的多个不同概念结合起来。\n\
    \n本书附带的练习文件也包括了挑战以及一些较难练习的完整解答。但为了最大限度地利用这些材料，你应该在查看示例解答之前，尽力自己解决挑战问题。\n\n如果你是编程完全新手，你可能需要通过额外的练习来补充前几章的内容。我们建议你完成\
    \ [realpython.com](https://realpython.com) 上免费提供的 *Python 基础* 教程，以确保你打下坚实的基础。\n\
    \n如果你对本书有任何问题或反馈，欢迎随时[联系我们](https://realpython.com/contact)。\n\n## 在实践中学习\n\n\
    本书的核心是“在实践中学习”，因此请务必*亲自输入*你在书中遇到的代码片段。为了获得最佳效果，我们建议你避免复制粘贴代码示例。\n\n如果你自己输入每一行代码，你将更好地理解概念，并更快地掌握语法。此外，如果你搞砸了——这完全正常，所有开发者每天都会发生——纠正拼写错误这个简单的动作将帮助你学习如何调试代码。\n\
    \n在寻求外部资源帮助之前，尝试自己完成复习练习和代码挑战。通过足够的练习，你将掌握这些材料——并在此过程中获得乐趣！"
