    Passing a string to every call to `.speak()` is repetitive and inconvenient. What’s
    worse, the string representing the sound each `Dog` instance makes depends on
    the `.breed` attribute, but there is nothing stopping you, or someone using the
    `Dog` class you have created, from passing any string they wish.


    You can simplify the experience of working with the `Dog` class by creating a
