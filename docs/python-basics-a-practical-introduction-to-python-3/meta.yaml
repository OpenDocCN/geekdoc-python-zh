    ```


    This example is somewhat arbitrary, and the usefulness of this technique may not
    be apparent from the example. If you spend some time browsing various websites
    and viewing their page source, you''ll notice that many websites have extremely
    complicated HTML structure.


    When scraping data from websites, you are often interested in particular parts
    of the page. By spending some time looking through the HTML document, you can
    identify tags with unique attributes that can be used to extract the data you
