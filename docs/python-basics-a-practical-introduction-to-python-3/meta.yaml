    # 13.2 The Pitfalls of Third-Party Packages


    The beauty of third-party packages is that they give you the ability to add functionality
    to your project without having to implement everything from scratch. This offers
    massive boosts in productivity.


    But with great power comes great responsibility. As soon as you include someone
    else''s package in your project, you are placing an enormous amount of trust in
    those responsible for developing and maintaining the package.


    By using a package you did not develop, you lose control over certain aspects
    of your project. In particular, the maintainers of a package may release a new
    version that introduces changes that are incompatible with the version you use
    in your project.


    By default, `pip` installs the latest release of a package, so if you distribute
    your code to someone else and they install a newer version of a package required
    by your project, they may not be able to run your code.


    This presents a significant challenge, for both the end user and yourself. Fortunately,
    Python comes with a fix for this all-to-common problem: virtual environments.


    A virtual environment creates an isolated and, most importantly, reproducible
    environment that you can use to develop a project. The environment can contain
    a specific version of Python, as well as specific versions of your project''s
    dependencies.


    When you distribute your code to someone else, they can reproduce this environment
    and be confident that they can run your code without error.'
