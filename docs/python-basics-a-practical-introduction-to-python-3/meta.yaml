    \ names can only contain uppercase and lowercase letters (A-Z, a-z), digits (0-9),\
    \ and underscores (_). However, variable names cannot begin with a digit.\n\n\
    For example, `phrase`, `string1`, `_a1p4a`, and `list_of_names` are all valid\
    \ variable names, but `91lives` is not.\n\n> **Note**\n\nPython variable names\
    \ can contain many different valid Unicode characters. **Unicode** is a standard\
    \ for digitally representing text used in most of the world’s writing systems.\n\
    \nThat means variable names can contain letters from non-English alphabets, such\
    \ as decorated letters like é and ü, and even Chinese, Japanese, and Arabic symbols.\n\
    \nHowever, not every system can display decorated characters, so it is a good\
