    \ Python 中创建字符串的各种方式。\n\n### 字符串数据类型\n\n字符串是 Python 的基本数据类型之一。术语 **数据类型** 指的是一个值所代表的数据种类。字符串用于表示文本。\n\
    \n> **注意**\n>\n> Python 还内置了其他几种数据类型。例如，你将在第 5 章学习数值数据类型，在第 8 章学习布尔类型。\n\n我们说字符串是一种\
    \ **基本** 数据类型，因为它们不能被分解为更小的、不同类型的值。并非所有数据类型都是基本的。你将在第 9 章学习复合数据类型，也称为 **数据结构**。\n\
    \n字符串数据类型在 Python 中有一个特殊的缩写名称：`str`。你可以通过使用 `type()` 函数来查看这一点，该函数用于确定给定值的数据类型。\n\
    \n在 IDLE 的交互式窗口中输入以下内容：\n\n```\n>>> type(\"Hello, world\")\n<class 'str'>\n```\n\
    \n输出 `<class 'str'>` 表明值 \"Hello, world\" 是 `str` 数据类型的一个实例。也就是说，\"Hello, world\"\
    \ 是一个字符串。\n\n> **注意**\n>\n> 目前，你可以将“class”一词视为“数据类型”的同义词，尽管它实际上指的是更具体的东西。你将在第\
