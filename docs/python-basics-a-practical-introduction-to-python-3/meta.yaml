    # 12.6 Read and Write CSV Data


    Suppose you had a temperature sensor in your house that records the temperature
    every four hours. Over the course of a day, six temperature readings are taken.


    You can store each temperature reading in a list:


    ```

    >>> temperature_readings = [68, 65, 68, 70, 74, 72]

    ```


    Each day a new list of numbers is generated. To store these values to a file,
    you can write the values from each day on a new line in a text file and separate
    each value with a comma.


    ```

    >>> from pathlib import Path

    >>> file_path = Path.home() / "temperatures.txt"

    >>> with file_path.open(mode="a", encoding="utf-8") as file:

    ...     file.write(str(temperature_readings[0]))

    ...     for temp in temperature_readings[1:]:

    ...         file.write(f",{temp}")

    ...

    ```'
  merge: -1
