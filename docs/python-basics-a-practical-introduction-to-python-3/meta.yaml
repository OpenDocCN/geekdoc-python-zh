    \n## 18.9 示例应用：文本编辑器\n\n在本节中，你将构建一个文本编辑器应用，它可以创建、打开、编辑和保存文本文件。\n\n该应用程序有三个基本元素：\n\
    \n- 1. 一个名为 `btn_open` 的 `Button` 小部件，用于打开文件进行编辑\n- 2. 一个名为 `btn_save` 的 `Button`\
    \ 小部件，用于保存文件\n- 3. 一个名为 `txt_edit` 的 `TextBox` 小部件，用于创建和编辑文本文件\n\n这三个小部件将被安排成两个按钮位于窗口左侧，文本框位于右侧。\n\
    \n整个窗口的最小高度应为800像素，`txt_edit` 的最小宽度应为800像素。整个布局应具有响应性，以便在调整窗口大小时，`txt_edit` 也随之调整大小。然而，包含按钮的\
    \ `Frame` 的宽度不应改变。\n\n以下是窗口外观的草图：\n\n![](img/4efa9a991b645f75be61871447c559ca_623_0.png)\n\
    \n我们可以使用 `.grid()` 几何管理器来实现所需的布局。布局包含单行两列：左侧窄列用于按钮，右侧宽列用于文本框。\n\n为了设置窗口和 `txt_edit`\
    \ 的最小尺寸，我们可以使用 `.rowconfigure()` 和 `.columnconfigure()` 窗口方法的 `minsize` 参数设置为800。为了处理调整大小，我们可以将这些方法的\
    \ `weight` 参数设置为1。\n\n为了将两个按钮放入同一列，我们需要创建一个 `Frame` 小部件。我们将该 `Frame` 小部件称为 `fr_buttons`。根据草图，两个按钮应垂直堆叠在此框架内，`btn_open`\
    \ 在顶部。我们可以使用 `.grid()` 或 `.pack()` 几何管理器来实现，但让我们坚持使用 `.grid()`，因为它稍微容易处理一些。\n\n\
    现在我们有了计划，让我们开始编写应用程序代码。第一步是创建我们需要的所有小部件：\n\n```python\nimport tkinter as tk\n\n\
    # 1\nwindow = tk.Tk()\nwindow.title(\"Simple Text Editor\")\n\n# 2\nwindow.rowconfigure(0,\
    \ minsize=800, weight=1)\nwindow.columnconfigure(1, minsize=800, weight=1)\n\n\
    # 3\ntxt_edit = tk.Text(window)\nfr_buttons = tk.Frame(window)\nbtn_open = tk.Button(fr_buttons,\
    \ text=\"Open\")\nbtn_save = tk.Button(fr_buttons, text=\"Save As...\")\n```\n\
    \n首先我们导入 tkinter 并创建一个标题为 \"Simple Text Editor\" 的新窗口（#1）。然后设置行和列配置（#2）。最后，创建四个小部件：txt_edit\
    \ 文本框、fr_buttons 框架以及 btn_open 和 btn_save 按钮（#3）。\n\n让我们更仔细地看看（#2）。`.rowconfigure()`\
    \ 的 `minsize` 参数设置为800，`weight` 设置为1。第一个参数是0，因此这将第一行的高度设置为800像素，并确保行的高度与窗口的高度成比例增长。应用程序布局中只有一行，因此这些设置适用于整个窗口。\n\
    \n在下一行，`.columnconfigure()` 用于将索引为1的列的宽度和权重属性分别设置为800和1。记住，行和列索引从零开始，因此这些设置仅适用于第二列。\n\
    \n通过仅配置第二列，当窗口调整大小时，文本框将自然地扩展和收缩，而包含按钮的列将保持固定宽度。\n\n现在我们可以处理应用程序布局了。首先，我们将使用 `.grid()`\
    \ 几何管理器将两个按钮分配给 `fr_buttons` 框架：\n\n```python\nbtn_open.grid(row=0, column=0,\
    \ sticky=\"ew\", padx=5, pady=5)\nbtn_save.grid(row=1, column=0, sticky=\"ew\"\
    , padx=5)\n```\n\n这两行代码在 `fr_buttons` 框架中创建了一个两行一列的网格，因为 `btn_open` 和 `btn_save`\
    \ 的 `master` 属性都设置为 `fr_buttons`。`btn_open` 放在第一行，`btn_save` 放在第二行，这样在布局中 `btn_open`\
    \ 就会出现在 `btn_save` 上方，正如我们在草图中计划的那样。\n\n`btn_open` 和 `btn_save` 的 `sticky` 属性都设置为\
    \ \"ew\"，这迫使按钮在水平方向上双向扩展并填满整个框架。这确保了两个按钮大小相同。\n\n通过将 `padx` 和 `pady` 参数设置为5，在每个按钮周围放置了5像素的内边距。只有\
    \ `btn_open` 有垂直内边距。由于它在顶部，垂直内边距将其从窗口顶部稍微向下偏移，并确保它与 `btn_save` 之间有一个小间隙。\n\n现在\
    \ `fr_buttons` 已经布局完毕并准备就绪，我们可以为窗口的其余部分设置网格布局：\n\n```python\nfr_buttons.grid(row=0,\
    \ column=0, sticky=\"ns\")\ntxt_edit.grid(row=0, column=1, sticky=\"nsew\")\n\
    ```\n\n这两行代码为 `window` 创建了一个一行两列的网格。`fr_buttons` 放在第一列，`txt_edit` 放在第二列，这样在窗口布局中\
    \ `fr_buttons` 就会出现在 `txt_edit` 的左侧。\n\n`fr_buttons` 的 `sticky` 参数设置为 \"ns\"，这迫使整个框架垂直扩展并填满其列的整个高度。`txt_edit`\
    \ 填满其整个网格单元格，因为其 `sticky` 参数设置为 \"nsew\"，这迫使它在每个方向上扩展。\n\n现在应用程序布局已完成，在程序底部添加\
    \ `window.mainloop()`，然后保存并运行文件。将显示以下窗口：\n\n![](img/4efa9a991b645f75be61871447c559ca_626_0.png)\n\
    \n看起来很棒！但它还不能做任何事情，所以让我们开始为按钮编写命令。\n\n`btn_open` 按钮需要显示一个文件打开对话框，并允许用户选择一个文件。然后它需要打开该文件，并将\
    \ `txt_edit` 的文本设置为文件的内容。\n\n以下是一个执行此操作的 `open_file()` 函数：\n\n```python\ndef open_file():\n\
    \    \"\"\"Open a file for editing.\"\"\"\n    # 1\n    filepath = askopenfilename(\n\
    \        filetypes=[(\"Text Files\", \"*.txt\"), (\"All Files\", \"*.*\")]\n \
    \   )\n\n    # 2\n    if not filepath:\n        return\n\n    # 3\n    txt_edit.delete(\"\
    1.0\", tk.END)\n\n    # 4\n    with open(filepath, \"r\") as input_file:\n   \
    \     text = input_file.read()\n        txt_edit.insert(tk.END, text)\n\n    #\
    \ 5\n    window.title(f\"Simple Text Editor - {filepath}\")\n```\n\n来自 `tkinter.filedialog`\
    \ 模块的 `askopenfilename` 对话框用于显示文件打开对话框，并将选定的文件路径存储到 `filepath` 变量中（#1）。如果用户关闭对话框或单击\
    \ `Cancel` 按钮，则 `filepath` 将为 `None`，函数将 `return` 而不执行任何读取文件和设置 `txt_edit` 文本的代码（#2）。\n\
    \n但是，如果用户确实选择了一个文件，则使用 `.delete()` 方法清除 `txt_edit` 的当前内容（#3）。然后打开选定的文件，并使用 `.read()`\
    \ 方法读取文件内容，并将其作为字符串存储在 `text` 变量中。使用 `.insert()` 将字符串 `text` 分配给 `txt_edit`（#4）。\n\
    \n最后，设置窗口的标题，使其包含打开文件的路径（#5）。\n\n现在你可以更新程序，使 `btn_open` 在每次被点击时调用 `open_file()`。你需要做三件事来更新程序：\n\
    \n- 1. 通过在程序顶部添加以下导入，从 `tkinter.filedialog` 导入 `askopenfilename()` 函数：\n\n```python\n\
