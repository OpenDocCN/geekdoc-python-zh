    ## Chapter 14


    ## Creating and Modifying PDF Files


    The **PDF**, or **p**ortable **d**ocument **f**ormat, is one of the most common
    formats for sharing documents over the internet. PDF files can contain text, images,
    tables, forms, and even rich media like videos and animations, all in a single
    file.


    The abundance of content types PDFs may contain can make working with them somewhat
    difficult. There''s a lot of data to decode when opening a PDF file! Fortunately,
    the Python ecosystem has some great packages for reading, manipulating, and creating
    PDF files!


    **In this chapter, you will learn how to:**


    - Read text from a PDF

    - Extract pages and split a PDF into multiple files

    - Concatenate and Merge PDF files

    - Rotate and crop pages in a PDF file

    - Encrypt and Decrypt PDF files with passwords

    - Create a PDF file from scratch


    Let''s get started!


    ## 14.1 Extract Text From a PDF


    In this section, you''ll learn how to read a PDF file and extract the text using
    the PyPDF2 package. Before you can do that, though, you need to install PyPDF2
    with pip:


    ```

    $ python3 -m pip install PyPDF2

    ```


    Verify the installation by running the following in your terminal:


    ```

    $ python3 -m pip show PyPDF2

    Name: PyPDF2

    Version: 1.26.0

    Summary: PDF toolkit

    Home-page: http://mstamy2.github.com/PyPDF2

    Author: Mathieu Fenniak

    Author-email: biziqe@mathieu.fenniak.net

    License: UNKNOWN

    Location: c:\users\david\python38-32\lib\site-packages

    Requires:

    Required-by:

    ```


    Pay particular attention to the version information. At the time of writing, the
    latest version of PyPDF2 is 1.26.0. You''ll need to restart IDLE if you have it
    open in order to use the PyPDF2 package.


    Now that you have PyPDF2 installed let''s start working with some PDF files!


    ### Open a PDF File


    Let''s get started by opening a PDF and reading some information about it. We''ll
    use the Pride_and_Prejudice.pdf file located in the Chapter 14 Practice Files
    folder.


    > **Note**


    If you haven''t already, you can download the exercise solutions and practice
    files [here](https://nostarch.com/pythonbasics2).


    Open IDLE''s interactive window and import the `PdfFileReader` class from the
    `PyPDF2` package:


    ```

    >>> from PyPDF2 import PdfFileReader

    ```


    To create a new instance of the `PdfFileReader` class, you''ll need to path to
    the PDF file that you want to open. Let''s get that now using the `pathlib` module:


    ```

    >>> from pathlib import Path

    >>> pdf_path = (

    ...     Path.home() /

    ...     "python-basics-exercises" /

    ...     "ch13-interact-with-pdf-files" /

    ...     "practice_files" /

    ...     "Pride_and_Prejudice.pdf"

    ... )

    ```


    The `pdf_file` path variable now contains the path to a PDF version of Jane Austen''s
    *Pride and Prejudice*.


    > **Note**


    You may need to change `pdf_path` so that it corresponds to the location of the
    `python-basics-exercises/` folder on your computer.


    Now create the `PdfFileReader` instance:


    ```

    >>> pdf = PdfFileReader(str(pdf_path))

    ```


    `pdf_path` is converted to a string because `PdfFileReader` doesn''t know how
    to read from a `pathlib.Path` object.


    Recall from *Chapter 12: File Input and Output* that all open files should be
    closed before a program terminates. The PdfFileReader object does all of this
    for you, so you don''t need to worry about opening or closing the PDF file!


    Now that you''ve created a PdfFileReader instance, you can use it to gather information
    about the PDF. For instance, the .getNumPages() method returns the number of pages
    contained in the PDF file:


    ```

    >>> pdf.getNumPages()

    234

    ```


    The Pride_and_Prejudice.pdf file has 234 pages!


    Notice that .getNumPages() is written in camelCase and not snake_case, as recommend
    in PEP 8. Remember, PEP 8 is a set of guidelines, not rules. As far as Python
    is concerned, camelCase is perfectly acceptable.


    > **Note**


    PyPDF2 is adapted from the PyPDF package. PyPDF was written in 2005, only four
    years after PEP 8 was published. At that time, many Python programmers were migrating
    from languages where camelCase is more common.


    You can also access some document information using the .documentInfo attribute:


    ```

    >>> pdf.documentInfo

    {''/Title'': ''Pride and Prejudice, by Jane Austen'', ''/Author'': ''Chuck'',
    ''/Creator'':

    ```


    The object returned by .documentInfo looks like a dictionary, but it''s not really
    the same thing. You can access each item in .documentInfo as an attribute.


    For example, to get the title, use the .title attribute:


    ```

    >>> pdf.documentInfo.title

    ''Pride and Prejudice, by Jane Austen''

    ```


    The .documentInfo object contains the PDF **metadata** which is set when a PDF
    is created.


    The `PdfFileReader` class is the gateway to working with PDF files in Python.
    It provides all the necessary methods and attributes needed to access data in
    a PDF file.


    Let''s explore what you can do with a PDF file and how you do it!


    ### Extract Text From a Page


    PDF pages are represented in PyPDF2 with the `PageObject` class. You use `PageObject`
    instances to interact with pages in a PDF file.


    You don''t need to create your own `PageObject` instances. Instead, you access
    them through a `PdfFileReader` object. Let''s see how this is done by extracting
    the text from the first page of the `Pride_and_Prejudice.pdf` file.


    There are two steps to extracting text from a single PDF page:


    1. Get a `PageObject` with `PdfFileReader.getPage()`

    2. Extract the text as a string with the `PageObject` instance''s `.extractText()`
    method.


    `Pride_and_Prejudice.pdf` has 243 pages. Each page has an index between 0 and
    242. You can get an object representing a specific page by passing the page''s
    index to the `PdfFileReader.getPage()` method:


    ```

    >>> first_page = pdf.getPage(0)

    ```


    .getPage() returns a `PageObject`:


    ```

    >>> type(first_page)

    <class ''PyPDF2.pdf.PageObject''>

    ```


    You can extract the page''s text with the `PageObject.extractText()` method:


    ```

    >>> first_page.extractText()

    ''\n \nThe Project Gutenberg EBook of Pride and Prejudice, by Jane Austen\n \n\nThis
    eBook is for the use of anyone anywhere at no cost and with\n \nalmost no restrictions
    whatsoever.  You may copy it, give it away or\n \nre\u200b-\nuse it under the
    terms of the Project Gutenberg License included\n \nwith this eBook or online
    at www.gutenberg.org\n \n \nTitle: Pride and Prejudice\n \n \nAuthor: Jane Austen\n
    \n \nRelease Date: August 26, 2008 [EBook #1342]\n\n[Last updated: August 11,
    2011]\n \n \nLanguage: English\n \n \nCharacter set encoding: ASCII\n \n \n***
    START OF THIS PROJECT GUTENBERG EBOOK PRIDE AND PREJUDICE ***\n \n \n \n \nProduced
    by Anonymous Volunteers, and David Widger\n \n \n \n \n \n \nPRIDE AND PREJUDICE
    \n \n \nBy Jane Austen \n \n\n \n \nContents\n \n''

    ```


    Note that the output displayed here has been formatted to fit better on this page.
    The output you see on your computer may be formatted differently.


    To extract all of the text from the entire PDF, you''ll need a way to iterate
    over all of the pages in the document.


    Every `PdfFileReader` object has a `.pages` attribute used to access an iterable
    of `PageObject` objects for each page in the PDF. This iterable is in order, so
    the first `PageObject` corresponds to the first page of the PDF, the second `PageObject`
    to the second page, and so on.


    Here''s how you use a `for` loop to loop over all the pages in the PDF and print
    their text:


    ```

    >>> for page in pdf.pages:

    ...     print(page.extractText())

    ...

    ```


