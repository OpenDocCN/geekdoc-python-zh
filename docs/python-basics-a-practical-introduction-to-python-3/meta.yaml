    Now execute the following:


    ```

    >>> window.mainloop()

    ```


    Nothing seems to happen, but notice that a new prompt does not appear in the shell.


    `window.mainloop()` tells Python to run the Tkinter application and **blocks**
    any code that comes after it from running until the window it''s called on is
    closed. Go ahead and close the window you''ve created and you''ll see a new prompt
    displayed in the shell.


    > **Important**


    When you work with Tkinter from a REPL like IDLE''s interactive window, updates
    to windows are applied as each line is executed.


    This is not the case when a Tkinter program is executed from a Python file.


    If you do not include `window.mainloop()` at the end of a program in a Python
    file, the Tkinter application will never run, and nothing will be displayed.


    Creating a window with Tkinter only takes a couple of lines of code. But blank
    windows aren''t very useful! In the next section, you''ll learn about some of
    the widgets available in Tkinter, and how you can customize them to meet your
