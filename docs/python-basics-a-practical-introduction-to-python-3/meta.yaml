    \ return std::tr1::bind(dispatch, pid, method);\n}\n```\n\nPlease, just no.\n\n\
    Both Scratch and C++ are decidedly not what I would call full-spectrum languages.\
    \ In the Scratch level, it’s easy to start but you have to switch to a “real”\
