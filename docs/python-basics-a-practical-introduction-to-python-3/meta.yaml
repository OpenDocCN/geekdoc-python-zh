    \ contained in a string, including spaces, is called the **length** of the string.\
    \ For example, the string \"abc\" has a length of 3, and the string \"Don't Panic\"\
    \ has a length of 11.\n\nTo determine a string's length, you use Python's built-in\
    \ `len()` function. To see how it works, type the following into IDLE's interactive\
