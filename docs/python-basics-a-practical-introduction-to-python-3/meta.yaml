    \nThe variable `z` is in the local scope of `inner_func()`. When Python executes\
    \ the line `z = x + y`, it looks for the variables `x` and `y` in the local scope.\
    \ However, neither of them exist there, so it moves up to the scope of the `outer_func()`\
    \ function.\n\nThe scope for `outer_func()` is an **enclosing** scope of `inner_func()`.\
    \ It is not quite the global scope, and is not the local scope for `inner_func()`.\
    \ It lies in between those two.\n\nThe variable `y` is defined in the scope for\
    \ `outer_func()` and is assigned the value 3. However, `x` does not exist in this\
    \ scope, so Python moves up once again to the global scope. There it finds the\
    \ name `x`, which has the value 5. Now that the names `x` and `y` are resolved,\
    \ Python can execute the line `z = x + y`, which assigns to `z` the value of 8.\n\
    \n# The LEGB Rule\n\nA useful way to remember how Python resolves scope is with\
    \ the **LEGB** rule. This rule is an acronym for **L**ocal, **E**nclosing, **G**lobal,\
    \ **B**uilt-in."
  - "[PAGE 164]\n\n# 6.6. Understand Scope in Python\n\nPython resolves scope in the\
    \ order in which each scope appears in the list LEGB. Here is a quick overview\
    \ to help you remember how all of this works:\n\n**Local (L):** The local, or\
    \ current, scope. This could be the body of a function or the top-level scope\
    \ of a script. It always represents the scope that the Python interpreter is currently\
    \ working in.\n\n**Enclosing (E):** The enclosing scope. This is the scope one\
    \ level up from the local scope. If the local scope is an inner function, the\
    \ enclosing scope is the scope of the outer function. If the scope is a top-level\
    \ function, the enclosing scope is the same as the global scope.\n\n**Global (G):**\
    \ The global scope, which is the top-most scope in the script. This contains all\
    \ of the names defined in the script that are not contained in a function body.\n\
    \n**Built-in (B):** The built-in scope contains all of the names, such as keywords,\
    \ that are built-in to Python. Functions such as `round()` and `abs()` are in\
    \ the built-in scope. Anything that you can use without first defining yourself\
    \ is contained in the built-in scope.\n\n# Break the Rules\n\nConsider the following\
    \ script. What do you think the output is?\n\n```\npython\ntotal = 0\n\ndef add_to_total(n):\n\
    \    total = total + n\n\nadd_to_total(5)\nprint(total)\n```\n\nYou would think\
    \ that script outputs the value 5, right? Try running it to see what happens.\n\
    \nSomething unexpected occurs. You get an error!"
  - "[PAGE 165]\n\n# 6.6. Understand Scope in Python\n\n```\nTraceback (most recent\
    \ call last):\n  File \"C:/Users/davea/stuff/python/scope.py\", line 6, in <module>\n\
    \    add_to_total(5)\n  File \"C:/Users/davea/stuff/python/scope.py\", line 4,\
    \ in add_to_total\n    total = total + n\nUnboundLocalError: local variable 'total'\
    \ referenced before assignment\n```\n\nWait a minute! According to the LEGB rule,\
    \ Python should have recognized that the name `total` doesn't exist in the `add_to_total()`\
    \ function's local scope and moved up to the global scope to resolve the name,\
    \ right?\n\nThe problem here is that the script attempts to make an assignment\
    \ to the variable `total`, which creates a new name in the local scope. Then,\
    \ when Python executes the right-hand side of the assignment it finds the name\
    \ `total` in the local scope with nothing assigned to it yet.\n\nThese kinds of\
    \ errors are tricky and are one of the reasons it is best to use unique variable\
    \ and function names no matter what scope you are in.\n\nYou can get around this\
    \ issue with the `global` keyword. Try running the following altered script:\n\
    \n```\ntotal = 0\n\ndef add_to_total(n):\n    global total\n    total = total\
    \ + n\n\nadd_to_total(5)\nprint(total)\n```\n\nThis time, you get the expected\
    \ output 5. Why's that?\n\nThe line `global total` tells Python to look in the\
    \ global scope for the name `total`. That way, the line `total = total + n` does\
    \ not create a new local variable."
