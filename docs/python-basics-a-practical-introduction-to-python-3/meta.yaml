  md: '# 17.1 Use NumPy for Matrix Manipulation


    In this section, you will learn how to store and manipulate matrices of data using
    the NumPy package. Before getting to that, though, let’s take a look at the problem
    NumPy solves.


    If you have ever taken a course in linear algebra, you may recall that a matrix
    is a rectangular array of numbers. You can easily create a matrix in pure Python
    with a list of lists:


    ```

    >>> matrix = [[1, 2, 3], [4, 5, 6], [7, 8, 9]]

    ```


    This seemingly works well. You can access individual elements of the matrix using
    their indices. For example, to access the second element of the first row of the
    matrix, you would type:


    ```

    >>> matrix[0][1]

    2

    ```


