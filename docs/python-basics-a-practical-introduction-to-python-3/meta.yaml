- img_proc: true
  md: '> **Note**


    If you want to create a one-time-use database while you''re testing code or playing
    around with table structures, you can use the special name ":memory:" to create
    the database in temporary memory, like so:


    python

    connection = sqlite3.connect(":memory:")


    The .connect() function returns a sqlite3.Connection object, which you can verify
    with the type() function:


    ```

    >>> type(connection)

    <class ''sqlite3.Connection''>

    ```


    Connection objects represent the connection between your program and the database.
    They have several attributes and methods that can be used to interact with the
    database. To store and retrieve data, you need a Cursor object, which can be obtained
    with the Connection.cursor() function:


    ```

    >>> cursor = connection.cursor()

    >>> type(cursor)

    <class ''sqlite3.Cursor''>

    ```


    The sqlite3.Cursor object is your gateway to interacting with the database. Using
    a Cursor, you can create database tables, execute SQL statements, and fetch query
    results.


    > **Note**


    The term **cursor** in database jargon usually refers to an object that is used
    to fetch results from a database query one row at a time. Although sqlite3.Cursor
    objects are used for this operation, they also do much more than is typically
    expected from a cursor. This is one important distinction to keep in mind when
    you use other databases besides SQLite.'
