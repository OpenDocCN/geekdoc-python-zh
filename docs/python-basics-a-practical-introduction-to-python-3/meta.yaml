    # 3.5 Leave Yourself Helpful Notes


    Programmers often read code they wrote several months ago and wonder “What the
    heck does this do?” Even with descriptive variable names, it can be difficult
    to remember why you wrote something the way you did when you haven’t looked at
    it for a long time.


    To help avoid this problem, you can leave comments in your code. **Comments**
    are lines of text that don’t affect the way the script runs. They help to document
    what’s supposed to be happening.


    In this section, you will learn three ways to leave comments in your code. You
    will also learn some conventions for formatting comments, as well as some pet
    peeves regarding their over-use.


    # How to Write a Comment


    The most common way to write a comment is to begin a new line in your code with
    the # character. When your code is run, any lines starting with # are ignored.
    Comments that start on a new line are called **block comments**.'
