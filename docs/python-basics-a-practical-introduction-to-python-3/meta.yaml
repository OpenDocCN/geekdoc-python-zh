    # 9.1. Tuples Are Immutable Sequences


    For example, suppose you are asked to provide a tuple containing all the integers
    that are both even and odd. No such integer exists, but the empty tuple allows
    you to provide the requested tuple.


    How do you think you create a tuple with exactly one element? Try out the following
    in IDLE:


    ```

    >>> x = (1)

    >>> type(x)

    <class ''int''>

    ```


    When you surround a value with parentheses, but don''t include any commas, Python
    interprets the value not as a tuple but as the type of value inside the parentheses.
    So, in this case, (1) is a just a weird way of writing the integer 1.


    To create the tuple containing the single value 1, you need to include a comma
    after the 1:


    ```

    >>> x = (1,)

    >>> type(x)

    <class ''tuple''>

    ```


    A tuple containing a single element might seem as a strange as the empty tuple.
    Couldn''t you just drop all this tuple business and just use the value itself?


    It all depends on the problem you are solving.


    If you are asked to provide a tuple containing all prime numbers that are also
    even, you must provide the tuple (2,) since 2 is the only even prime number. The
    value 2 isn''t a good solution because it isn''t a tuple.


    This might seem overly pedantic, but programming often involves a certain amount
    of pedantry. Computers are, after all, the ultimate pedants.'
