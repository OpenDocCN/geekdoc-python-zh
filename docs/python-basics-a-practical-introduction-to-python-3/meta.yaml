    You might have heard that Python is popular. On one hand, it may seem that it
    doesn''t really matter how popular a language is if you can build the app you
    want to build with it.


    For better or worse, in software development popularity is a strong indicator
    of the quality of libraries you will have available as well the number of job
    openings there are. In short, you should tend to gravitate towards more popular
    technologies as there will be more choices and integrations available.


    So, is Python actually that popular? Yes it is. You''ll of course find a lot of
