    \ tells Python to literally break out of a loop. That is, the loop stops completely\
    \ and any code after the loop is executed.\n\nFor example, the following code\
    \ loops over the numbers 0 to 3, but stops the loop when the number 2 is encountered:\n\
    \n```\nfor n in range(0, 4):\n    if n == 2:\n        break\n    print(n)\n\n\
    print(f\"Finished with n = {n}\")\n```\n\nOnly the first two numbers are printed\
    \ in the output:\n\n```\n0\n1\nFinished with n = 2\n```\n\n# continue\n\nThe `continue`\
    \ keyword is used to skip any remaining code in the loop body and continue on\
    \ to the next iteration.\n\nFor example, the following code loops over the numbers\
    \ 0 to 3, printing each number as is goes, but skips the number 2:\n\n```\nfor\
    \ i in range(0, 4):\n    if i == 2:\n        continue\n    print(i)\n\nprint(f\"\
    Finished with i = {i}\")\n```\n\nAll the numbers except for 2 are printed in the\
    \ output:"
