    \ is coded on multiple lines but displays on a single line.\n\n[Leave feedback\
    \ on this section »](https://realpython.com/python-basics/resources)\n\n## 4.2\
    \ Concatenation, Indexing, and Slicing\n\nNow that you know what a string is and\
