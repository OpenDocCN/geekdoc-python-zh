    \ you go through the first half of this book from start to end. The second half\
    \ covers topics that don't overlap as much so you can jump around more easily,\
    \ but the chapters do increase in difficulty as you go along.\n\nIf you are a\
    \ more experienced programmer, then you may find yourself heading toward the second\
    \ part of the book right away. But don’t neglect getting a strong foundation in\
    \ the basics first and be sure to fill in any knowledge gaps along the way.\n\n\
    Most sections within a chapter are followed by **review exercises** to help you\
    \ make sure that you’ve mastered all the topics covered. There are also a number\
    \ of **code challenges**, which are more involved and usually require you to tie\
    \ together a number of different concepts from previous chapters.\n\nThe practice\
    \ files that accompany this book also include full solutions to the challenges\
    \ as well as some of the trickier exercises. But to get the most out of the material,\
    \ you should try your best to solve the challenge problems on your own before\
    \ looking at the example solutions.\n\nIf you’re completely new to programming,\
    \ you may want to supplement the first few chapters with additional practice.\
    \ We recommend working through the *Python Fundamentals* tutorials available for\
    \ free at [realpython.com](https://realpython.com) to make sure you are on solid\
    \ footing.\n\nIf you have any questions or feedback about the book, you’re always\
    \ welcome to [contact us](https://realpython.com/contact) directly.\n\n## Learning\
    \ by Doing\n\nThis book is all about learning by doing, so be sure to *actually\
