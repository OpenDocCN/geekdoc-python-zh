  - '[PAGE 158]


    After executing the `print()` function, Python returns to the *inner* for loop,
    assigns to `j` the value of 5, and then prints `n = 1` and `j = 5`. Python doesn''t
    return the outer for loop because the inner for loop, which is inside the body
    of the outer for loop, isn''t done executing.


    Next, `j` is assigned the value 6 and Python prints `n = 1` and `j = 6`. At this
    point, the inner for loop is done executing, so control returns to the outer for
    loop.


    The variable `n` gets assigned the value 2, and the inner for loop executes a
    second time. That is, `j` is assigned the value 4 and `n = 2` and `j = 4` is printed
    to the console.


    The two loops continue to execute in this fashion, and the final output looks
    like this:


    ```

    n = 1 and j = 4

    n = 1 and j = 5

    n = 1 and j = 6

    n = 2 and j = 4

    n = 2 and j = 5

    n = 2 and j = 6

    n = 3 and j = 4

    n = 3 and j = 5

    n = 3 and j = 6

    ```


    A loop inside of another loop is called a **nested loop**, and they come up more
    often than you might expect. You can nest while loops inside of for loops, and
    vice versa, and even nest loops more than two levels deep!'
