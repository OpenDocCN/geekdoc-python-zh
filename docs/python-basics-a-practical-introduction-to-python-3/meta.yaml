    # 16.5 Summary and Additional Resources


    Working with data from the Internet can be complicated. The structure of websites
    varies significantly from one site to the next, and even a single website can
    change often. Although it is possible to parse data from the web using tools in
    Python’s standard library, there are many tools on PyPI that can help simplify
    the process.


    In this chapter, you learned about Beautiful Soup and Mechanical Soup, two tools
    that help you write Python programs to automate website interactions. Beautiful
    Soup is used to parse HTML data collected from a website. Mechanical Soup is used
    to interact with website components, such as clicking on links and submitting
    forms. With tools like Beautiful Soup and Mechanical Soup, you can open up your
    programs to the world.


    Web scraping techniques are used in many real-world disciplines. For example,
    investigative journalists rely on information collected from vast numbers of resources.
    Programmers have developed several tools for scraping, parsing, and processing
    data from websites to help journalists gather data and understand connections
    between people, places, and events.'
