    ## Checking Existence of Values With in


    You can check whether or not a value is contained in a tuple with the in keyword.


    ```

    >>> vowels = ("a", "e", "i", "o", "u")

    >>> "o" in vowels

    True

    >>> "x" in vowels

    False

    ```


    If the value to the left of in is contained in the tuple to the right of in, the
    result is True. Otherwise, the result is False.


    ## Returning Multiple Values From a Function


    One common use of tuples is to return multiple values from a single function.


    ```

    >>> def adder_subtractor(num1, num2):

    ...     return (num1 + num2, num1 - num2)

    ...

    >>> adder_subtractor(3, 2)

    (5, 1)

    ```


    The function adder_subtractor() has two parameters, num1 and num2, and returns
    a tuple whose first element is the sum of the two numbers, and whose second element
    is the difference.


    Strings and tuples are just two of Python''s built-in sequence types. Both are
    immutable and iterable and can be used with index and slicing notation.


    In the next section, you''ll learn about a third sequence type with one very big
    difference from strings and tuples: mutability.


