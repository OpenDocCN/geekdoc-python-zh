    \ pillow\nRequired-by:\n```\n\nNotice that the latest version of `reportlab` at\
    \ the time of writing is 3.5.34. You'll need to restart IDLE if you have it open\
    \ in order to use the `reportlab` package.\n\n## The Canvas Class\n\nThe main\
    \ interface for creating PDFs with ReportLab is the `Canvas` class, which is located\
    \ in the `reportlab.pdfgen.canvas` module.\n\nOpen a new IDLE interactive window\
    \ and type the following to import the `Canvas` class:\n\n```python\n>>> from\
    \ reportlab.pdfgen.canvas import Canvas\n```\n\nWhen you make a new `Canvas` instance,\
    \ you need to provide a string with the filename of the PDF you are creating.\
    \ Let's create a new `Canvas` instance for the file `hello.pdf`:\n\n```python\n\
    >>> canvas = Canvas(\"hello.pdf\")\n```\n\nYou now have a `Canvas` instance associated\
    \ with a file called `hello.pdf` in your current working directory assigned to\
    \ the variable name `canvas`. The file `hello.pdf` does not exist yet, though.\n\
    \nLet's add some text to the PDF. To do that, you use the `.drawString()` method:\n\
    \n```python\n>>> canvas.drawString(72, 72, \"Hello World\")\n```\n\nThe first\
    \ two arguments passed to `.drawString()` determine the location on the canvas\
    \ that the text is written. The first specifies **points** from the left edge\
    \ of the canvas, and the second specifies points from the bottom edge.\n\nA **point**\
    \ is equal to 1/72 inches. So, 72 points is one inch, which means that the string\
    \ \"Hello World\" is written one inch from the left and the bottom of the page.\n\
    \nTo save the PDF to a file, use the `Canvas` object's `.save()` method:\n\n```python\n\
    >>> canvas.save()\n```\n\nYou now have a PDF file called `hello.pdf` in your current\
    \ working directory. You can open it with a PDF reader and see the text Hello\
    \ World at the bottom of the page!\n\nThere are a few things to notice about the\
