    \n这里有一种简化方法。如果运动项目是篮球且玩家1的得分大于玩家2的得分，或者运动项目是高尔夫且玩家1的得分小于玩家2的得分，那么玩家1获胜。\n\n我们可以用复合条件表达式来描述这一点：\n\
