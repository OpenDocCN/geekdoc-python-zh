    ```\n\n`.mainloop()` 为我们处理了很多事情，但上面的代码中缺少一些东西。Tkinter 如何知道何时使用 `handle_keypress()`？Tkinter\
    \ 控件有一个 `.bind()` 方法正是用来做这件事的。\n\n## .bind() 方法\n\n要在控件上发生事件时调用事件处理函数，请使用该控件的\
    \ `.bind()` 方法。该事件处理函数被称为**绑定**到该事件，因为每次事件发生时它都会被调用。\n\n继续上一节的按键示例，让我们使用 `.bind()`\
    \ 将 `handle_keypress()` 绑定到按键事件：\n\n```python\nimport tkinter as tk\n\nwindow\
    \ = tk.Tk()\n\ndef handle_keypress(event):\n    \"\"\"打印与按键关联的字符\"\"\"\n    print(event.char)\n\
    \n# 将按键事件绑定到 handle_keypress()\nwindow.bind(\"<Key>\", handle_keypress)\n\nwindow.mainloop()\n\
    ```\n\n这里，`handle_keypress()` 事件处理函数通过 `window.bind()` 方法绑定到 \"<Key>\" 事件。每当应用程序运行时按下某个键，所按键的字符就会被打印出来。\n\
    \n`.bind()` 总是接受两个参数：\n\n1.  一个事件，用形如 \"<event_name>\" 的字符串表示，其中 event_name 可以是\
    \ Tkinter 的任何事件。\n2.  一个事件处理函数，即每当事件发生时要调用的函数名。\n\n事件处理函数绑定到调用 `.bind()` 的控件上。当事件处理函数被调用时，事件对象会传递给该事件处理函数。\n\
    \n在上面的例子中，事件处理函数绑定到了窗口本身，但你可以将事件处理函数绑定到应用程序中的任何控件。\n\n例如，你可以将一个事件处理函数绑定到一个 `Button`\
    \ 控件，使得每次按下按钮时执行某些操作：\n\n```python\ndef handle_click(event):\n    print(\"按钮被点击了！\"\
