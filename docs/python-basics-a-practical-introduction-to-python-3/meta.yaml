    \n# 4.8 Find a String in a String\n\nOne of the most useful string methods is\
    \ `.find()`. As its name implies, you can use this method to find the location\
    \ of one string in another string—commonly referred to as a **substring**.\n\n\
    To use `.find()`, tack it to the end of a variable or a string literal and pass\
    \ the string you want to find in between the parentheses:\n\n```\n>>> phrase =\
    \ \"the surprise is in here somewhere\"\n>>> phrase.find(\"surprise\")\n4\n```\n\
    \nThe value that `.find()` returns is the index of the first occurrence of the\
