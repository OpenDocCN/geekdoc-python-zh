  - '[PAGE 26]


    # 1.3. How to Use This Book


    If you are a more experienced programmer, then you may find yourself heading toward
    the second part of the book right away. But don’t neglect getting a strong foundation
    in the basics first and be sure to fill in any knowledge gaps along the way.


    Most sections within a chapter are followed by **review exercises** to help you
    make sure that you’ve mastered all the topics covered. There are also a number
    of **code challenges**, which are more involved and usually require you to tie
    together a number of different concepts from previous chapters.


    The practice files that accompany this book also include full solutions to the
    challenges as well as some of the trickier exercises. But to get the most out
    of the material, you should try your best to solve the challenge problems on your
    own before looking at the example solutions.


    If you’re completely new to programming, you may want to supplement the first
    few chapters with additional practice. We recommend working through the *Python
    Fundamentals* tutorials available for free at [realpython.com](https://realpython.com)
    to make sure you are on solid footing.


    If you have any questions or feedback about the book, you’re always welcome to
    [contact us](https://realpython.com/contact) directly.


    # Learning by Doing


    This book is all about learning by doing, so be sure to *actually type in* the
    code snippets you encounter in the book. For best results, we recommend that you
    avoid copying and pasting the code examples.


    You will learn the concepts better and pick up the syntax faster if you type out
    each line of code yourself. Plus, if you screw up—which is totally normal and
    happens to all developers on a daily basis—the simple act of correcting typos
    will help you learn how to debug your code.


    Try to complete the review exercises and code challenges on your own before getting
    help from outside resources. With enough practice, you will master this material—and
    have fun along the way!'
- md: '## How Long Will It Take to Finish This Book?


    If you’re already familiar with a programming language you could finish the book
    in as little as 35 to 40 hours. If you’re new to programming you may need to spend
    up to 100 hours or more. Take your time and don’t feel like you have to rush.
    Programming is a super rewarding, but complex skill to learn. Good luck on your
    Python journey, we’re rooting for you!


    ## 1.4 Bonus Material & Learning Resources


    ### Online Resources


    This book comes with a number of free bonus resources that you can access at [realpython.com/python-basics/resources](https://realpython.com/python-basics/resources).
    On this web page you can also find an errata list with corrections maintained
    by the Real Python team.


    ### Interactive Quizzes


    Most chapters in this book come with a free online quiz to check your learning
    progress. You can access the quizzes using the links provided at the end of the
    chapter. The quizzes are hosted on the Real Python website and can be viewed on
    your phone or computer.


    Each quiz takes you through a series of questions related to a particular chapter
    in the book. Some of them are multiple choice, some will ask you to type in an
    answer, and some will require you to write actual Python code. As you make your
    way through each quiz, it keeps score of which questions you answered correctly.


    At the end of the quiz you receive a grade based on your result. If you don’t
    score 100% on your first try—don’t fret! These quizzes are meant to challenge
    you and it’s expected that you go through them several times, improving your score
    with each run.


    ### Exercises Code Repository


    This book has an accompanying [code repository on the web](https://realpython.com/python-basics/exercises)
    containing example source code as well as the answers to exercises and code challenges.
    The repository is broken up by chapter so you can check your code against the
    solutions provided by us after you finish each chapter. Here’s the link:


    [realpython.com/python-basics/exercises](https://realpython.com/python-basics/exercises)


    ### Example Code License


    The example Python scripts associated with this book are licensed under a [Creative
    Commons Public Domain (CC0) License](https://creativecommons.org/publicdomain/zero/1.0/).
    This means that you’re welcome to use any portion of the code for any purpose
    in your own programs.


    > **Note**


    The code found in this book has been tested with Python 3.8 on Windows, macOS,
    and Linux.


    ### Formatting Conventions


    Code blocks will be used to present example code:


    ```

    # This is Python code:

    print("Hello world!")

    ```


    Terminal commands follow the Unix format:


    ```

    $ # This is a terminal command:

    $ python hello-world.py

    ```


    (Dollar signs are not part of the command.)


    *Italic text* will be used to denote a file name: *hello-world.py*.


    **Bold text** will be used to denote a new or important term.


    Keyboard shortcuts will be formatted as follows: `Ctrl` + `S`.


    Menu shortcuts will be formatted as follows: `File` > `New File`


    Notes and Warning boxes appear as follows:


    > **Note**


    This is a note filled in with placeholder text. The quick brown fox jumps over
    the lazy dog. The quick brown Python slithers over the lazy hog.


    > **Important**


    This is a warning also filled in with placeholder text. The quick brown fox jumps
    over the lazy dog. The quick brown Python slithers over the lazy hog.


    ### Feedback & Errata


    We welcome ideas, suggestions, feedback, and the occasional rant. Did you find
    a topic confusing? Did you find an error in the text or code? Did we leave out
    a topic you would love to know more about?


    We’re always looking to improve our teaching materials. Whatever the reason, please
    send in your feedback at the link below:


    [realpython.com/python-basics/feedback](https://realpython.com/python-basics/feedback)


    [Leave feedback on this section »](https://realpython.com/python-basics/feedback)


    ## Chapter 2


    ## Setting Up Python


    This book is about programming computers with Python. You could read this book
    cover-to-cover and absorb the information without ever touching a keyboard, but
    you’d miss out on the fun part—coding.


    To get the most out of this book, you need to have a computer with Python installed
    on it and a way to create, edit, and save Python code files.


    **In this chapter, you will learn how to:**


    - Install the latest version of Python 3 on your computer

    - Open **IDLE**, Python’s built-in **Integrated Development and Learning Environment**


    Let’s get started!


    [Leave feedback on this section »](https://realpython.com/python-basics/feedback)


    ### 2.1 A Note On Python Versions


    Many operating systems, such as macOS and Linux, come with Python pre-installed.
    The version of Python that comes with your operating system is called your **system
    Python**.


    The system Python is almost always out-of-date and may not even be a full Python
    installation. It''s essential that you have the most recent version of Python
    so that you can follow along successfully with the examples in this book.


    It''s possible to have multiple versions of Python installed on your computer.
    In this chapter, you''ll install the latest version of Python 3 alongside any
    system Python that may already exist on your machine.


    > **Note**


    Even if you already have Python 3.8 installed, it is still a good idea to skim
    this chapter to double check that your environment is set-up for following along
    with this book.


    This chapter is split into three sections: Windows, macOS, and Ubuntu Linux. Find
    the section for your operating system and follow the steps to get set-up, then
    skip ahead to the next chapter.


    If you have a different operating system, check out Real Python''s [Python 3 Installation
    & Setup Guide](https://realpython.com/python-3-installation-setup-guide/) to see
    if your OS is covered.


    [Leave feedback on this section »](https://realpython.com/python-basics/feedback)


    ### 2.2 Windows


    Follow these steps to install Python 3 and open IDLE on Windows.


    > **Important**


    The code in this book is only tested against Python installed as described in
    this section.


    Be aware that if you have installed Python through some other means, such as Anaconda
    Python, you may encounter problems when running the code examples.


    #### Install Python


    Windows systems do not typically ship with Python pre-installed. Fortunately,
    installation does not involve much more than downloading the Python installer
    from the [python.org website](http://python.org) and running it.


    #### Step 1: Download the Python 3 Installer


    Open a browser window and navigate to the [download page for Windows](http://python.org)
    at python.org.


    Underneath the heading at the top that says *Python Releases for Windows*, click
    on the link for the *Latest Python 3 Release - Python 3.x.x*. As of this writing,
    the latest version is Python 3.8. Then scroll to the bottom and select *Windows
    x86-64 executable installer*.


    > **Note**


    If your system has a 32-bit processor, then you should choose the 32-bit installer.
    If you aren''t sure if your computer is 32-bit or 64-bit, stick with the 64-bit
    installer mentioned above.


    #### Step 2: Run the Installer


    Run the installer by double-clicking on the downloaded file. You should see the
    following window:


    ![](img/4efa9a991b645f75be61871447c559ca_33_0.png)


    > **Important**


    Make sure you check the box that says *Add Python 3.x to PATH* as shown to ensure
    that the install places the interpreter in your execution path.


    If you install Python without checking this box, you can run the installer again
    and select it.


    Click `Install Now` to install Python 3. Wait for the installation to finish,
    and then continue to open IDLE.


    #### Open IDLE


    You can open IDLE in two steps:


    1. Click on the start menu and locate the *Python 3.8* folder.

    2. Open the folder and select *IDLE (Python 3.8)*.


    > **Note**


    We recommend using IDLE to follow along with this book.


    You may use a different code editor if you prefer. However, some chapters, such
    as Chapter 7: *Finding And Fixing Code Bugs*, contain material specific to IDLE.


    IDLE opens a **Python shell** in a new window. The Python shell is an interactive
    environment that allows you to type in some Python code and execute it immediately.
    It is a great way to get started with Python!


    The Python shell window looks like this:


    ![](img/4efa9a991b645f75be61871447c559ca_34_0.png)


    At the top of the window, you can see the version of Python that is running and
    some information about the operating system. If you see a version less than 3.7,
    you may need to revisit the installation instructions in the previous section.


    The `>>>` symbol that you see is called a **prompt**. Whenever you see this, it
    means that Python is waiting for you to give it some instructions.'
  mdcn: '## 读完这本书需要多长时间？


