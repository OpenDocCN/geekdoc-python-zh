- md: '## Chapter 3


    ## Your First Python Program


    Now that you have the latest version of Python installed on your computer, it’s
    time to start coding!


    **In this chapter, you will:**


    - Write your first Python script

    - Learn what happens when you run a script with an error

    - Learn how to declare a variable and inspect its value

    - Learn how to write comments


    Ready to begin your Python journey? Let’s go!


    ### 3.1 Write a Python Script


    If you don’t have IDLE open already, go ahead and open it. There are two main
    windows that you will work with in IDLE: the **interactive window**, which is
    the one that opens when you start IDLE, and the **script window**.


    You can type code into both the interactive and script windows. The difference
    between the two is how the code is executed. In this section, you will write your
    first Python program and learn how to run it in both windows.


    ## The Interactive Window


    The interactive window contains a **Python shell**, which is a textual user interface
    used to interact with the Python language. Hence the name “interactive window.”


    When you first open IDLE, the text displayed looks something like this:


    ```

    Python 3.8.1 (tags/v3.8.1:1b293b6, Dec 18 2019, 22:39:24)

    [MSC v.1916 32 bit (Intel)] on win32

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    The first line tells you what version of Python is running. In this case, IDLE
    is running Python 3.8.1. The second and third lines give some information about
    the operating system and some commands you can use to get more information about
    Python.


    The `>>>` symbol in the last line is called the **prompt**. This is where you
    will type in your code. Go ahead and type `1 + 1` at the prompt and press Enter.


    When you hit Enter, Python evaluates the expression, displays the result `2`,
    and then prompts you for more input:


    ```

    >>> 1 + 1

    2

    >>>

    ```


    Notice that the Python prompt `>>>` appears again after your result. Python is
    ready for more instructions! Every time you run some code, a new prompt appears
    directly below the output.


    The sequence of events in the interactive window can be described as a loop with
    three steps:


    1. First, Python reads the code entered at the prompt.

    2. Then the code is evaluated.

    3. Finally, the output is printed in the window and a new prompt is displayed.


    This loop is commonly referred to as a **Read-Evaluate-Print Loop**, or **REPL**.
    Python programmers sometimes refer the Python shell as a “Python REPL”, or just
    “the REPL” for short.


    > **Note**


    From this point on, the final `>>>` prompt displayed after executing code in the
    interactive window is excluded from code examples.


    Let’s try something a little more interesting than adding two numbers. A rite
    of passage for every programmer is writing their first “Hello, world” program
    that prints the phrase “Hello, world” on the screen.


    To print text to the screen in Python, you use the `print()` function. A **function**
    is a bit of code that typically takes some input, called an **argument**, does
    something with that input, and produces some output, called the **return value**.


    Loosely speaking, functions in code work like mathematical functions. For example,
    the mathematical function $A(r)=\pi r^2$ takes the radius r of a circle as input
    and produces the area of the circle as output.


    > **Important**


    The analogy to mathematical functions has some problems, though, because code
    functions can have **side effects**. A side effect occurs anytime a function performs
    some operation that changes something about the program or the computer running
    the program.


    For example, you can write a function in Python that takes someone’s name as input,
    stores the name in a file on the computer, and then outputs the path to the file
    with the name in it. The operation of saving the name to a file is a side effect
    of the function.


    You’ll learn more about functions, including how to write your own, in Chapter
    6.


    Python’s `print()` function takes some text as input and then displays that text
    on the screen. To use `print()`, type the word `print` at the prompt in the interactive
    window, followed by the text "Hello, world" inside of parentheses:


    ```

    >>> print("Hello, world")

    Hello, world

    ```


    Here "Hello, world" is the argument that is being **passed** to `print()`. "Hello,
    world" must be written with quotation marks so that Python interprets it as text
    and not something else.


    > **Note**


    As you type code into the interactive window, you may notice that the font color
    changes for certain parts of the code. IDLE **highlights** parts of your code
    in different colors to help make it easier for you to identify what the different
    parts are.


    By default, built-in functions, such as `print()` are displayed in purple, and
    text is displayed in green.


    The interactive window can execute only a single line of code at a time. This
    is useful for trying out small code examples and exploring the Python language,
    but it has a major limitation. Code must be entered in by a person one line at
    a time!


    Alternatively, you can store some Python code in a text file and then execute
    all of the code in the file with a single command. The code in the file is called
    a **script**, and files containing Python scripts are called **script files**.


    Script files are nice not only because they make it easier to run a program, but
    also because they can be shared with other people so that they can run your program,
    too.


    ## The Script Window


    Scripts are written using IDLE''s script window. You can open the script window
    by selecting File > New File from the menu at the top of the interactive window.


    Notice that when the script window opens, the interactive window stays open. Any
    output generated by code run in the script window is displayed in the interactive
    window, so you may want to rearrange the two windows so that you can see both
    of them at the same time.


    In the script window, type in the same code you used to print "Hello, world" in
    the interactive window:


    ```

    print("Hello, world")

    ```


    Just like the interactive window, code typed into the script window is highlighted.


    > **Important**


    When you write code in a script, you do not need to include the `>>>` prompt that
    you see in IDLE’s interactive window. Keep this in mind if you copy and paste
    code from examples that show the REPL prompt.


    Remember, though, that it’s not recommended that you copy and paste examples from
    the book. Typing each example in yourself really pays off!


    Before you can run your script, you must save it. From the menu at the top of
    the window, select File > Save and save the script as `hello_world.py`. The `.py`
    file extension is the conventional extension used to indicate that a file contains
    Python code.


    In fact, if you save your script with any extension other than `.py`, the code
    highlighting will disappear and all the text in the file will be displayed in
    black. IDLE will only highlight Python code when it is stored in a `.py` file.


    Once the script is saved, all you have to do to run the program is select Run
    > Run Module from the script window and you’ll see `Hello, world` appear in the
    interactive window:


    ```

    Hello, world

    ```


    > **Note**


    You can also press F5 to run a script from the script window.


    Every time you run a script you will see something like the following output in
    the interactive window:


    ```

    >>> ======================== RESTART ========================

    ```


    This is IDLE’s way of separating output from distinct runs of a script. Otherwise,
    if you run one script after another, it may not be clear what output belongs to
    which script.


    To open an existing script in IDLE, select File > Open... from the menu in either
    the script window or the interactive window. Then browse for and select the script
    file you want to open. IDLE opens scripts in a new script window, so you can have
    several scripts open at a time.


    > **Note**


    Double-clicking on a `.py` file from a file manager, such as Windows Explorer,
    does execute the script in a new window. However, the window is closed immediately
    when the script is done running—often before you can even see what happened.


    To open the file in IDLE so that you can run it and see the output, you can right-click
    on the file icon (Ctrl + Click on macOS) and choose to Edit with IDLE.


    ### 3.2 Mess Things Up


    Everybody makes mistakes—especially while programming! In case you haven’t made
    any mistakes yet, let’s get a head start on that and mess something up on purpose
    to see what happens.


    Mistakes made in a program are called **errors**, and there are two main types
    of errors you’ll experience:


    1. Syntax errors

    2. Run-time errors


    In this section you’ll see some examples of code errors and learn how to use the
    output Python displays when an error occurs to understand what error occurred
    and which piece of code caused it.'
  mdcn: '## 第三章


    ## 你的第一个 Python 程序


    既然你已经在电脑上安装了最新版本的 Python，是时候开始编程了！


    **在本章中，你将：**


    - 编写你的第一个 Python 脚本

    - 了解运行包含错误的脚本时会发生什么

    - 学习如何声明变量并检查其值

    - 学习如何编写注释


    准备好开始你的 Python 之旅了吗？我们出发吧！


    ### 3.1 编写一个 Python 脚本


    如果你还没有打开 IDLE，请现在打开它。在 IDLE 中，你将主要使用两个窗口：**交互式窗口**（启动 IDLE 时打开的那个）和**脚本窗口**。


    你可以在交互式窗口和脚本窗口中输入代码。两者的区别在于代码的执行方式。在本节中，你将编写你的第一个 Python 程序，并学习如何在两个窗口中运行它。


    ## 交互式窗口


    交互式窗口包含一个 **Python shell**，这是一个用于与 Python 语言交互的文本用户界面。因此得名“交互式窗口”。


    当你第一次打开 IDLE 时，显示的文本看起来像这样：


    ```

    Python 3.8.1 (tags/v3.8.1:1b293b6, Dec 18 2019, 22:39:24)

    [MSC v.1916 32 bit (Intel)] on win32

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    第一行告诉你正在运行的 Python 版本。在这个例子中，IDLE 运行的是 Python 3.8.1。第二行和第三行提供了一些关于操作系统的信息，以及一些你可以用来获取更多
    Python 信息的命令。


    最后一行中的 `>>>` 符号被称为**提示符**。这是你输入代码的地方。请在提示符处输入 `1 + 1` 并按回车键。


    当你按下回车键时，Python 会计算表达式，显示结果 `2`，然后提示你输入更多内容：


    ```

    >>> 1 + 1

    2

    >>>

    ```


    注意，在你的结果之后，Python 提示符 `>>>` 再次出现。Python 已准备好接收更多指令！每次你运行一些代码，一个新的提示符就会直接出现在输出下方。


    交互式窗口中的事件序列可以描述为一个包含三个步骤的循环：


    1. 首先，Python 读取在提示符处输入的代码。

    2. 然后代码被计算。

    3. 最后，输出被打印在窗口中，并显示一个新的提示符。


    这个循环通常被称为**读取-计算-打印循环**，或简称 **REPL**。Python 程序员有时将 Python shell 称为“Python REPL”，或简称为“REPL”。


    > **注意**


    从现在开始，代码示例中不再包含在交互式窗口中执行代码后显示的最后一个 `>>>` 提示符。


    让我们尝试一些比两个数字相加更有趣的事情。每个程序员的必经之路是编写他们的第一个“Hello, world”程序，在屏幕上打印短语“Hello, world”。


    要在 Python 中将文本打印到屏幕，你需要使用 `print()` 函数。**函数**是一段代码，它通常接受一些输入（称为**参数**），对输入进行处理，然后产生一些输出（称为**返回值**）。


    粗略地说，代码中的函数就像数学函数一样工作。例如，数学函数 $A(r)=\pi r^2$ 以圆的半径 r 作为输入，并产生圆的面积作为输出。


    > **重要**


    然而，与数学函数的类比存在一些问题，因为代码函数可能有**副作用**。副作用发生在函数执行某些操作，改变了程序或运行程序的计算机的某些状态时。


    例如，你可以用 Python 编写一个函数，它接受某人的名字作为输入，将名字存储在计算机上的一个文件中，然后输出包含该名字的文件路径。将名字保存到文件的操作就是该函数的副作用。


    你将在第 6 章学习更多关于函数的知识，包括如何编写自己的函数。


    Python 的 `print()` 函数接受一些文本作为输入，然后在屏幕上显示该文本。要使用 `print()`，请在交互式窗口的提示符处输入单词 `print`，后跟括号内的文本
    "Hello, world"：


    ```

    >>> print("Hello, world")

    Hello, world

    ```


    这里的 "Hello, world" 是**传递**给 `print()` 的参数。"Hello, world" 必须用引号括起来，这样 Python 才会将其解释为文本，而不是其他东西。


    > **注意**


    当你在交互式窗口中输入代码时，你可能会注意到代码的某些部分的字体颜色发生了变化。IDLE 以不同的颜色**高亮显示**代码的不同部分，以帮助你更容易地识别它们。


    默认情况下，内置函数（如 `print()`）显示为紫色，文本显示为绿色。


    交互式窗口一次只能执行一行代码。这对于尝试小的代码示例和探索 Python 语言很有用，但它有一个主要的限制：代码必须由人一行一行地输入！


    或者，你可以将一些 Python 代码存储在一个文本文件中，然后用单个命令执行文件中的所有代码。文件中的代码称为**脚本**，包含 Python 脚本的文件称为**脚本文件**。


    脚本文件不仅使运行程序更容易，而且可以与其他人共享，以便他们也能运行你的程序。


    ## 脚本窗口


    脚本是使用 IDLE 的脚本窗口编写的。你可以通过从交互式窗口顶部的菜单中选择“文件” > “新建文件”来打开脚本窗口。


    注意，当脚本窗口打开时，交互式窗口保持打开状态。在脚本窗口中运行的代码生成的任何输出都会显示在交互式窗口中，因此你可能需要重新排列这两个窗口，以便同时看到它们。


    在脚本窗口中，输入你在交互式窗口中用于打印 "Hello, world" 的相同代码：


    ```

    print("Hello, world")

    ```


    就像交互式窗口一样，输入到脚本窗口中的代码也会被高亮显示。


    > **重要**


    当你在脚本中编写代码时，你不需要包含在 IDLE 交互式窗口中看到的 `>>>` 提示符。如果你从显示 REPL 提示符的示例中复制和粘贴代码，请记住这一点。


    不过，请记住，不建议你从书中复制和粘贴示例。自己输入每个示例真的很有收获！


    在运行脚本之前，你必须保存它。从窗口顶部的菜单中，选择“文件” > “保存”，并将脚本保存为 `hello_world.py`。`.py` 文件扩展名是用于表示文件包含
    Python 代码的约定扩展名。


    事实上，如果你将脚本保存为除 `.py` 以外的任何扩展名，代码高亮显示将消失，文件中的所有文本都将显示为黑色。IDLE 只有在 Python 代码存储在
    `.py` 文件中时才会高亮显示。


    脚本保存后，运行程序只需从脚本窗口中选择“运行” > “运行模块”，你就会在交互式窗口中看到 `Hello, world` 出现：


    ```

    Hello, world

    ```


    > **注意**


    你也可以按 F5 从脚本窗口运行脚本。


    每次运行脚本时，你都会在交互式窗口中看到类似以下的输出：


    ```

    >>> ======================== RESTART ========================

    ```


    这是 IDLE 用来分隔不同脚本运行输出的方式。否则，如果你连续运行一个脚本，可能不清楚哪个输出属于哪个脚本。


    要在 IDLE 中打开现有脚本，请从脚本窗口或交互式窗口的菜单中选择“文件” > “打开...”。然后浏览并选择要打开的脚本文件。IDLE 会在新的脚本窗口中打开脚本，因此你可以同时打开多个脚本。


    > **注意**


    从文件管理器（如 Windows 资源管理器）双击 `.py` 文件确实会在新窗口中执行脚本。但是，脚本运行完毕后窗口会立即关闭——通常在你甚至能看到发生了什么之前。


    要在 IDLE 中打开文件以便运行并查看输出，你可以右键单击文件图标（在 macOS 上为 Ctrl + 单击），然后选择“使用 IDLE 编辑”。


    ### 3.2 搞砸事情


    每个人都会犯错——尤其是在编程时！如果你还没有犯任何错误，让我们先发制人，故意搞砸一些事情，看看会发生什么。


    程序中犯的错误称为**错误**，你将遇到两种主要类型的错误：


    1. 语法错误

    2. 运行时错误


    在本节中，你将看到一些代码错误的示例，并学习如何使用 Python 在发生错误时显示的输出来理解发生了什么错误以及是哪段代码导致的。'
