  md: "# 8.6. Recover From Errors\n\nProgrammers often refer to run-time errors as\
    \ **exceptions**. So, when you encounter an error, congratulate yourself! You've\
    \ just made the code do something exceptional!\n\nErrors aren't always a bad thing.\
    \ That is, they don't always mean you made a mistake. For example, trying to divide\
    \ the 1 by 0 results in a `ZeroDivisionError`. If the divisor is entered by a\
    \ user, you have no way of knowing ahead of time whether or not the user will\
    \ enter a 0!\n\nIn order to create robust programs, you need to be able to handle\
    \ errors caused by invalid user input — or any other unpredictable source. In\
    \ this section you'll learn how.\n\n# A Zoo of Exceptions\n\nWhen you encounter\
    \ an exception, it's useful to know what went wrong. Python has a number of built-in\
    \ exception types that describe different kinds of errors.\n\nThroughout this\
    \ book you have seen several different errors. Let's collect them here and add\
    \ a few new ones to the list.\n\n# ValueError\n\nA `ValueError` occurs when an\
    \ operation encounters an invalid value. For example, trying to convert the string\
    \ \"not a number\" to an integer results in a `ValueError`:\n\n```\n>>> int(\"\
    not a number\")\nTraceback (most recent call last):\n  File \"<pyshell#1>\", line\
    \ 1, in <module>\n    int(\"not a number\")\nValueError: invalid literal for int()\
    \ with base 10: 'not a number'\n```\n\nThe name of the exception is displayed\
    \ on the last line, followed by a description of the specific problem that occurred.\
    \ This is the general format for all Python exceptions."
