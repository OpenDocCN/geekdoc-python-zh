  md: '# 16.1. Scrape and Parse Text From Websites


    Armed with all this knowledge, let’s now try to parse out the title from http://olympus.realpython.org/profiles/dionysus,
    which includes this rather carelessly written line of HTML:


    ```

    <TITLE >Profile: Dionysus</title / >

    ```


    The .find() method would have a difficult time dealing with the inconsistencies
    here, but with the clever use of regular expressions, you can handle this code
    easily:


    ```

    import re

    from urllib.request import urlopen


    url = "http://olympus.realpython.org/profiles/dionysus"

    page = urlopen(url)

    html = page.read().decode("utf-8")


    pattern = "<title.*?>.*?</title.*?>"

    match_results = re.search(pattern, html, re.IGNORECASE)

    title = match_results.group()

    title = re.sub("<.*?>", "", title) # Remove HTML tags


    print(title)

    ```


    Let’s take a closer look at the first regular expression in the pattern string
    by breaking it down into three parts—<title.*?>, .*?, and </title.*?>.


    +   1. <title.*?>—This pattern matches the opening <TITLE > tag in html. The <title
    part of the pattern matches with <TITLE because re.search() is called with re.IGNORECASE,
    and .*?> matches any text after <TITLE up to the first instance of >.

    2. .*?—This pattern matches all text after the opening <TITLE > non-greedily,
    stopping at the first match for </title.*?>.

    3. </title.*?>—The only difference between this pattern and the first one is the
    / character, so this matches the closing </title / > tag in html.'
