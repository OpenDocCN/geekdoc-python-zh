    In the following example, the value 3600 is assigned to the variable s:\n\n```\n\
    s = 3600\n```\n\nThe name s is totally ambiguous. Using a full word makes it a\
    \ lot easier to understand what the code means:\n\n```\nseconds = 3600\n```\n\n\
    seconds is a better name than s because it provides more context. But"
  mdcn: "## 语法错误\n\n通俗地说，当你编写的代码在 Python 语言中不被允许时，就会发生**语法错误**。你可以通过将上一节 `hello_world.py`\
