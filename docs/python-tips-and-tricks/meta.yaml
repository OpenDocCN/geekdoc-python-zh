    \ of s')\nelse:\n    print('Like is not a substring of s')\n# 输出：\n# Like is a\
    \ substring of s\n```\n\n我们也可以使用 **\"not in\"** 运算符。**\"not in\"** 运算符与 in 运算符相反。\n\
    \n```python\ns = 'Please find something you like'\n\nif 'like' not in s:\n   \
    \ print('Like is not a substring of s')\nelse:\n    print('Like is a substring\
    \ of s')\n# 输出：\n# Like is a substring of s\n```\n\nPython 建议仅使用 **find()** 方法来获取子串的位置。如果我们想找到\
    \ \"something\" 在字符串中的位置，可以这样使用 **find()** 方法：find 方法返回子串开始的索引。\n\n```python\n\
    s = 'Please find something you like'\n\nprint(s.find('something'))\n# 输出：\n# 12\n\
    ```\n\n## 64 | 两个列表的差集\n\n如果你有两个列表，并且想找出它们的差集，即存在于 **列表 a** 中但不在 **列表 b** 中的元素，请使用\
    \ **set().difference(set())** 方法。\n\n```python\na = [9, 3, 6, 7, 8, 4]\nb = [9,\
    \ 3, 7, 5, 2, 1]\n\ndifference = set(a).difference(set(b))\nprint(list(difference))\n\
    # 输出：\n# [8, 4, 6]\n```\n\n另一种简单的方法是使用 *for 循环*。请看下面：\n\n```python\na = [9, 3,\
    \ 6, 7, 8, 4]\nb = [9, 3, 7, 5, 2, 1]\n\ndifference = []\nfor number in a:\n \
    \   if number not in b:\n        difference.append(number)\nprint(difference)\n\
    # 输出：\n# [6, 8, 4]\n```\n\n你也可以将上述代码转换为列表推导式。\n\n```python\na = [9, 3, 6, 7, 8,\
