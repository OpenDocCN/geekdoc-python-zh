    \nThe condition returns a Boolean value of either True or False. The error message\
    \ is the message we want to be displayed if the condition is False.\n\nBelow,\
    \ we insert an assert statement in the code. This code takes a list of names and\
    \ returns all the names in lowercase letters. We expect all the items in the list\
