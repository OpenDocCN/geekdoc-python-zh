    # 49 | Convert Picture to Grey Scale


    Do you want to convert a color image into grayscale? Use Python’s cv2 module.


    First install cv2 using > **pip install opencv-python** <


    Below we are converting a color book image to grayscale. You can replace that
    with your own image. You must know where the image is stored.


    When you want to view an image using CV2, a window will open. The *waitkey* indicates
    how long we expect the display window to be open. If a key is pressed before the
    display time is over, the window will be destroyed or closed.


    ```

    import cv2 as cv


    img = cv.imread(''book.jpg'')


    # show the original image

    img1 = cv.imshow(''Original'', img)

    cv.waitKey(5)


    # Converting image to Gray

    grayed_img = cv.cvtColor(img, cv.COLOR_BGR2GRAY)


    # Show grayed-out image

    img2 = cv.imshow(''grayed_image'', grayed_img)

    cv.waitKey(5000)


    #Save image

    cv.imwrite(''grayed.jpg'', grayed_img)

    ```'
  - "[PAGE 62]\n\n# 50 | Time it with timeit\n\nIf you want to know the execution\
    \ time of a given code, you can use the *timeit()* module. Below, we create a\
    \ function called timer that uses *timeit()* from the *timeit* module. We're basically\
    \ using **timeit** to determine how long it takes to run **sum(num**2 for num\
    \ in range(10000))**. The first parameter of the timeit function in the code below\
    \ is *stmt*. This is where we pass the Python code that we want to measure. This\
    \ parameter only takes a string as an argument, so we have to ensure that we convert\
    \ our code to a string format. The *number* parameter is basically the number\
    \ of executions we want to run on this code.\n\n```\nimport timeit\n\ndef timer(code):\n\
    \    tm = timeit.timeit(code,number=1000)\n    return f'Execution time is {tm:.2f}\
    \ secs.'\n\nif __name__ == \"__main__\":\n    print(timer('sum(num**2 for num\
    \ in range(10000))'))\n\nOutput:\nExecution time is 5.05 secs.\n```\n\nIt's not\
    \ necessary to create a function like we did above. You can also use *timeit*\
    \ without creating a function. Let's simplify the above code by writing it without\
    \ a function. Remember that the *stmt* parameter only takes a string as an argument;\
    \ that is why the *test* variable below, which is the code that we pass to the\
    \ *timeit()* function, is a string.\n\n```\nimport timeit\n\ntest = \"sum(num\
    \ ** 2 for num in range(10000))\"\ntm = timeit.timeit(stmt=test,number=1000)\n\
    print(f'{tm:.2f} secs')\nOutput\n2.20 secs\n```"
