    numbers1 = [1, 2, 3]\nnumbers2 = [4, 5, 6]\n\n# using append method\nnumbers1.append(numbers2)\n\
    print(numbers1)\n# Output:\n# [1, 2, 3, [4, 5, 6]]\n```\n\n当我们使用 *extend()* 方法时，请注意与上面\
    \ *append()* 方法的区别。*extend()* 方法获取 *numbers2* 中的元素，并将它们逐个追加到 *numbers1* 中，而不是作为一个整体列表。请看下面：\n\
    \n```python\nnumbers1 = [1, 2, 3]\nnumbers2 = [4, 5, 6]\n\n# using extend method\n\
    numbers1.extend(numbers2)\nprint(numbers1)\n# Output:\n# [1, 2, 3, 4, 5, 6]\n\
    ```\n\n## 84 | 内存与 __slots__\n\n什么是 __slots__？Slots用于类中。它们基本上是实例对象将具有的属性。以下是slots的实际使用示例：\n\
    \n```python\nclass Cars:\n    __slots__ = [\"make\", 'brand']\n```\n\n我们期望Cars类中的每个对象都具有这些属性——make和brand。\n\
    \n那么为什么要使用slots呢？我们使用slots是因为它们有助于节省内存空间。当我们使用slots时，类对象占用的空间更少。请看以下示例中对象大小的差异：\n\
    \n```python\nimport sys\n\nclass Cars:\n    def __init__(self, make, brand):\n\
    \        self.make = make\n        self.brand = brand\n\nprint(f'The memory size\
    \ is {sys.getsizeof(Cars)}')\n# Output:\n# The memory size is 1072\n```\n\n###\
    \ 示例 2\n\n```python\nclass Cars:\n    __slots__ = [\"make\", 'brand']\n\n    def\
    \ __init__(self, make, brand):\n        self.make = make\n        self.brand =\
    \ brand\n\nprint(f'The memory size is {sys.getsizeof(Cars)}')\n# Output:\n# The\
    \ memory size is 904\n```\n\n从上面的输出中你可以看到，使用slots节省了内存空间。\n\n## 85 | 使用Python为图片添加水印\n\
    \n只需几行代码，我们就可以使用Python为图片添加水印。我们将使用pillow库来完成此任务。使用以下命令安装pillow模块：\n\n```\npip\
    \ install pillow\n```\n\n从这个库中，我们将导入 **ImageDraw**、**ImageFont** 和 **Image**。\n\
    \n下面是我们将用于演示的图片，来自 https://www.worldwildlife.org/\n\n![](img/18cae09c3dc47caa2996fe5aa9c10ef1_98_0.png)\n\
    \n现在让我们从pillow模块导入类，并编写为这张图片添加水印所需的代码。\n\n```python\nfrom PIL import ImageDraw\n\
    from PIL import Image\nfrom PIL import ImageFont\n\n# Pass link to your image\
    \ location\npic = Image.open('lion.jpeg')\n# make a copy of the pic\ndrawing =\
    \ ImageDraw.Draw(pic)\n# fill color for the font\nfill_color = (255, 250, 250)\n\
    # watermark font\nfont = ImageFont.truetype(\"arial.ttf\", 60)\n# watermark position\n\
    position = (0, 0)\n# Writing text to picture\ndrawing.text(position, text='Lion\
    \ is King',\n             fill=fill_color, font=font)\npic.show()\n# saving image\n\
    pic.save('watermarkedimg.jpg')\n```\n\n运行此代码后，我们得到下面这张带水印的图片：\n\n![](img/18cae09c3dc47caa2996fe5aa9c10ef1_99_0.png)\n\
    \n## 86 | 解压Zip文件\n\nPython有一个模块可以用来解压zip文件。这是一个内置模块，所以我们不需要安装它。如果文件与Python脚本在同一目录中，我们只需将文件名传递给代码。我们使用\
    \ *with* 语句打开文件。这将确保文件在操作结束时自动关闭。我们以读模式打开文件，因为我们只想读取文件的内容。*printdir()* 方法返回我们正在解压的文件的所有内容。*extractall()*\
    \ 方法解压zip文件中的所有文件。\n\n```python\nfrom zipfile import ZipFile\n\n# open file in\
    \ read mode\nwith ZipFile('file.zip', 'r') as zipFile:\n    print('printing the\
    \ contents of the zip file')\n    zipFile.printdir()\n    # Extracting zip files\n\
    \    zipFile.extractall()\n```\n\n使用这段简单的代码来解压你的zip文件。\n\n## 87 | 生成模拟数据\n\n你可以使用Python生成假数据。Python有一个名为Faker的库，可以生成不同类型的数据。使用以下命令安装Faker：\n\
    \n```\npip install Faker\n```\n\n假设我们想生成一个包含十个国家的随机列表，以下是操作方法：\n\n```python\n\
    from faker import Faker\n\nfake = Faker()\n\nfor i in range(20):\n    print(fake.country())\n\
    ```\n\n```\n# output:\n# Cameroon\n# Tajikistan\n# Ethiopia\n# Liechtenstein\n\
    # Netherlands\n# Grenada\n# Switzerland\n# Singapore\n# Estonia\n# San Marino\n\
    # Malaysia\n# New Zealand\n# Azerbaijan\n# Monaco\n# British Indian Ocean Territory\
    \ (Chagos Archipelago)\n# Brazil\n# Austria\n# Saint Barthelemy\n# Zimbabwe\n\
    # Korea\n```\n\n由于这是随机的，每次运行它都会生成不同的国家列表。"
