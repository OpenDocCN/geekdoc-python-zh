    \nword = Word('Buy potatoe').pluralize()\nprint(word)\n```\n\nOutput:\n```\nBuy\
    \ potatoes\n```\n\n## 97 | List Elements Identical?\n\nGiven a list, how do you\
    \ check if all the elements in the list are identical. We can use the Python *all()*\
    \ function. This function takes an iterable as an argument and returns True if\
    \ all the elements are true. We can use it to check if all elements in a list\
    \ are identical. If they are, it will return True.\n\n```python\ndef check_list(arr:\
    \ list):\n    return all(arr[0] == arr[i] for i in arr)\n\nprint(check_list([1,1,1]))\n\
    ```\n\nOutput:\n```\nTrue\n```\n\nSo, the code above returns True because all\
    \ the elements in the list [1, 1, 1] are identical. What if the elements are not\
    \ identical? Let's see what happens.\n\n```python\ndef check_list(arr: list):\n\
    \    return all(arr[0] == arr[i] for i in arr)\n\nprint(check_list([1,1,2,3]))\n\
    ```\n\nOutput:\n```\nFalse\n```\n\nThe function returns False because elements\
    \ in [1, 1, 2, 3] are not identical.\n\n## 98 | Censor Profanity with Python\n\
    \nIf you have bad words in your text that you want to censor, you can use the\
    \ Python profanity module. Install using pip:\n\n```\npip install better_profanity\n\
    ```\n\nFirst thing, import profanity from *better_profanity*. Below, we have a\
    \ string that has a bad word; we are going to pass the string to the module to\
    \ have the bad word censored.\n\n```python\nfrom better_profanity import profanity\n\
    \ntext = ' I hate this shit'\ncensored_text = profanity.censor(text)\nprint(censored_text)\n\
    ```\n\nOutput:\n```\nI hate this ****\n```\n\nBy default, it uses the asterisk\
    \ (*) to censor bad words. However, you can also set your own censor character.\
    \ See the example below. We set $ as the set character.\n\n```python\ntext = 'I\
    \ hate this shit so much'\n\n# Setting the censor character.\ncensored_text =\
    \ profanity.censor(text, censor_char='$')\nprint(censored_text)\n```\n\nOutput:\n\
    ```\nI hate this $$$$ so much\n```\n\nIf you just want to check if a string contains\
    \ a bad word, you can use the *contains_profanity()* method, which will return\
    \ a Boolean value of True if it contains profanity and False if it has no profanity.\n\
