  md: "# 84 | Memory and __slots__\n\nWhat are __slots__? Slots are used in classes.\
    \ They are basically attributes that an instance object will have. Here is an\
    \ example of slots in action:\n\n```\nclass Cars:\n    __slots__ = [\"make\",\
    \ 'brand']\n```\n\nWe expect every object in the Cars class to have these attributes\
    \ – make and brand.\n\nSo why use slots? We use slots because they help save memory\
    \ space. Class objects take up less space when we use slots. See the difference\
    \ in object size in the following examples:\n\n```\nimport sys\n\nclass Cars:\n\
    \    def __init__(self, make, brand):\n        self.make = make\n        self.brand\
    \ = brand\n\nprint(f'The memory size is {sys.getsizeof(Cars)}')\nOutput:\nThe\
    \ memory size is 1072\n```\n\n# Example 2\n\n```\nclass Cars:\n    __slots__ =\
    \ [\"make\", 'brand']\n\n    def __init__(self, make, brand):\n        self.make\
    \ = make\n        self.brand = brand\n\nprint(f'The memory size is {sys.getsizeof(Cars)}')\n\
