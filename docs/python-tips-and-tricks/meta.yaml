    \ else:\n                prime_num.append(i)\n\n    return prime_num\n\nprint(prime_numbers())\n\
    ```\n\n## 91 | RAM & CPU Usage\n\nDo you want to know the resources your machine\
    \ is using? Python has a library called **psutil** that calculates the resource\
    \ usage of a computer. You can find out how much RAM and CPU your computer is\
