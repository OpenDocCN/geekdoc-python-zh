    ```\nimport sys\n\na = ['Love', 'Cold', 'Hot', 'Python']\nb = {'Love', 'Cold',\
    \ 'Hot', 'Python'}\nc = ('Love', 'Cold', 'Hot', 'Python')\n\nprint(f'The memory\
