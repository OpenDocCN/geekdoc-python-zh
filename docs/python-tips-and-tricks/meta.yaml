    # 98 | Censor Profanity with Python


    If you have bad words in your text that you want to censor, you can use the Python
    profanity module. Install using pip:


    ```

    pip install better_profanity

    ```


    First thing, import profanity from *better_profanity*. Below, we have a string
    that has a bad word; we are going to pass the string to the module to have the
    bad word censored.


    ```

    from better_profanity import profanity


    text = '' I hate this shit''

    censored_text = profanity.censor(text)

    print(censored_text)

    Output:

    I hate this ****

    ```


    By default, it uses the asterisk (*) to censor bad words. However, you can also
    set your own censor character. See the example below. We set $ as the set character.


    ```

    text = ''I hate this shit so much''


    # Setting the censor character.

    censored_text = profanity.censor(text, censor_char=''$'')

    print(censored_text)

    Output:

    I hate this $$$$ so much

    ```


    If you just want to check if a string contains a bad word, you can use the *contains_profanity()*
    method, which will return a Boolean value of True if it contains profanity and
    False if it has no profanity.


    ```

    text = ''I hate this shit so much''


    # Checking if text contains profanity

    print(profanity.contains_profanity(text))

    Output:

    True

    ```'
