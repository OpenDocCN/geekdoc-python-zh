    # 24 | Sort List with Sorted & Lambda


    The *sorted()* function is a high-order function because it takes another function
    as a parameter. Here, we create a *lambda* function that is then passed as an
    argument to the *sorted()* function key parameter. By using a negative index [-1],
    we are telling the *sorted()* function to sort the list in descending order.


    ```

    list1 = [''Mary'', ''Peter'', ''Kelly'']


    a = lambda x: x[-1]

    y = sorted(list1, key=a)

    print(y)

    Output:

    [''Peter'', ''Mary'', ''Kelly'']

    ```


    To sort the list in ascending order, we can just change the index to [:1]. See
    below:


    ```

    list1 = [''Mary'', ''Peter'', ''Kelly'']


    a = lambda x: x[:1]

    y = sorted(list1, key=a)

    print(y)

    Output:

    [''Kelly'', ''Mary'', ''Peter'']

    ```


    Another easy way to sort the list in ascending order would be to use just the
    *sorted()* function. By default, it sorts an iterable in ascending order. Since
    the key parameter is optional, we just leave it out.


    ```

    list1 = [''Mary'', ''Peter'', ''Kelly'']


    list2 = sorted(list1)

    print(list2)

    Output

    [''Kelly'', ''Mary'', ''Peter'']

    ```'
