    \ (2)，它将返回出现次数最多的两个元素。\n\n```\nimport collections\n\na = 'fecklessness'\n\nprint(collections.Counter(a).most_common(1))\n\
    Output:\n[('s', 4)]\n```\n\n## 20 | 内存大小检查\n\n你想知道 Python 中一个对象占用了多少内存吗？\n\n*sys*\
