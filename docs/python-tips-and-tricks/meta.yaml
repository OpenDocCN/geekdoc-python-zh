  md: "# 68 | The _iter_() Function\n\nIf you want to create an iterator for an object,\
    \ use the *iter()* function. Once the iterator object is created, the elements\
    \ can be accessed one at a time. To access the elements in the iterator, you will\
    \ have to use the *next()* function. Here is an example to demonstrate this:\n\
    \n```\nnames = ['jake', \"Mpho\", 'Peter']\n# Creating an iterator\niter_object\
    \ = iter(names)\n# Accessing items using next function\nname1 = next(iter_object)\n\
    print('First name is', name1)\nname2 = next(iter_object)\nprint('Second name is',\
    \ name2)\nname3 = next(iter_object)\nprint('Third name is', name3)\nOutput:\n\
    First name is jake\nSecond name is Mpho\nThird name is Peter\n```\n\nBecause the\
    \ list only has three elements, attempting to print the fourth element in the\
    \ iterable will result in a *StopIteration* error.\n\nWe can also elegantly put\
    \ the *next()* function in a loop. See below:\n\n```\nnames = ['Jake', \"Mpho\"\
    , 'Peter']\niter_object = iter(names)\nwhile True:\n    # accessing the items\
    \ in object using next func\n    try:\n        print(next(iter_object))\n    except:\n\
    \        break\nOutput:\nJake\nMpho\nPeter\n```\n\nWhy use iterators? Iterators\
    \ have better memory efficiency."
