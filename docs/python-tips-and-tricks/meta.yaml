    \ 函数接受两个参数：一个函数和一个可迭代对象。下面，列表是一个可迭代对象，*str()* 是函数。然后我们使用 *list()* 函数返回一个列表。*split()*\
    \ 方法在空白字符处分割或拆分字符串。\n\n```python\ns = \"I love Python\"\nstr1 = list(map(str,\
    \ s.split()))\nprint(str1)\n# Output:\n# ['I', 'love', 'Python']\n```\n\n你可以使用\
    \ *map()* 函数结合 *join()* 方法将字符串列表转换回字符串。让我们使用 *map()* 和 *join()* 方法将上面代码的输出转换回字符串。\n\
    \n```python\nlist1 = ['I', 'love', 'Python']\nstr1 = ' '.join(map(str, list1))\n\
    print(str1)\n# Output:\n# I love Python\n```\n\n## 82 | 同时遍历多个序列\n\n如果你有两个序列，并且想同时遍历它们，该怎么办？在Python中如何实现？这时zip()函数就派上用场了。zip()函数将序列中的项目配对。序列一中索引为1的元素与序列二中索引为1的元素配对。这个过程会重复用于所有其他索引。让我们演示如何同时遍历两个序列。\n\
    \n```python\n# list one\nfirst_names = ['George', 'Keith', 'Art']\n# list two\n\
    last_names = ['Luke', 'Sweat', 'Funnel']\n\nfor first, last in zip(first_names,\
    \ last_names):\n    print(first, last)\n\n# output:\n# George Luke\n# Keith Sweat\n\
    # Art Funnel\n```\n\n从输出中你可以看到，我们使用zip()函数组合了两个列表。我们将名字和姓氏配对了。\n\n## 83 | Extend\
