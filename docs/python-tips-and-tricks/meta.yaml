    \n## 12 | Startswith 和 Endswith 方法\n\n*startswith()* 和 *endswith()* 是字符串方法，如果指定的字符串以指定的值开头或结尾，则返回\
    \ True。\n假设你想返回列表中所有以 \"a.\" 开头的名字；以下是你如何使用 *startswith()* 来实现这一点。\n\n### 使用 startswith()\n\
    \n```python\nlist1 = ['lemon','Orange',\n         'apple', 'apricot']\n\nnew_list\
