    \ percentage for each CPU on the machine. If I run this on the machine I am using\
    \ now, here is what I get:\n\n```python\nimport psutil\n\ncpu_core = psutil.cpu_percent(percpu=True)\n\
    \nfor cpu, usage in enumerate(cpu_core):\n    print(f\"# {cpu+1} CPU: {usage}%\"\
    )\n```\n\n```\nOutput:\n# 1 CPU: 8.8%\n# 2 CPU: 6.2%\n# 3 CPU: 7.4%\n# 4 CPU:\
    \ 6.2%\n```\n\nRun this on your machine to see what you get.\n\n## 92 | Concatenation\
    \ vs. Join\n\nThere are two ways you can join strings in Python. The first way\
    \ is by using concatenation (basically joining strings using the + operator).\
    \ The second way is to use the string method, join(). Let’s find out which one\
    \ is faster. We are going to use perf_counter from the time module to time the\
    \ runtime of our codes.\n\n```python\na = 'Hello'\nb = 'Python'\nc = 'world'\n\
    f = 'People'\n# Using concatenation\nstart = time.perf_counter()\nfor _ in range(10000):\n\
    \    d = a + b + c + f\nend = time.perf_counter()\nprint(f'concatenation time\
    \ is {end - start:.5f}')\nOutput:\nconcatenation time is 0.00311\n```\n\n### Using\
    \ the Join method\n\n```python\na = 'Hello'\nb = 'Python'\nc = 'world'\nf = 'People'\n\
    # using the join method\nstart = time.perf_counter()\nfor _ in range(10000):\n\
    \    d = ''.join([a, b, c, f])\nend = time.perf_counter()\nprint(f'joining time\
    \ is {end - start:.5f}')\nOutput:\njoining time is 0.00290\n```\n\nYou can see\
    \ from the outputs that the join() method is faster than concatenation. If you\
    \ want faster code, use the join() method. However, you should note that the join()\
    \ method executes faster when you have more strings to join (more than 3 strings,\
    \ at least). The concatenation method executes slower because for every concatenation,\
    \ Python has to create a string and allocate memory. This slows down the process.\
    \ But by using the `join()` method, Python only creates one string. This makes\
    \ the process much faster. Try running the code and documenting your findings.\
