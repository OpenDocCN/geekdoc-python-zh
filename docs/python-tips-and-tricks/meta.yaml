    print(days_tuples)\nOutput:\n[(1, 'Sunday'), (2, 'Monday'), (3, 'Tuesday'), (4,\
    \ 'wednesday'), (5, 'Thursday'), (6, 'Friday'), (7, 'Saturday')]\n```\n\nIt is\
