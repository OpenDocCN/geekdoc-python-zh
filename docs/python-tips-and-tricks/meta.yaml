    Output:\n```\n5040\n```\n\nYou can change the *num* variable to any integer number\
    \ and it will still spit out a factorial of that number. Only one line of code—how\
    \ cool is that? Let’s try 10.\n\n```python\nfrom functools import reduce\n\nnum\
    \ = 10\n\nf = reduce(lambda a, b: a * b, range(1, num+1))\nprint(f)\n```\n\nOutput:\n\
    ```\n3628800\n```\n\n## 96 | Spelling Errors\n\nDid you know that you can correct\
    \ spelling errors in text using Python? Python has a library called *textblob*\
