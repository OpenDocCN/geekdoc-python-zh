    \ tuple is '\n      f'{sys.getsizeof(c)} ')\n\nOutput:\nThe memory size of a list\
    \ is 88\nThe memory size of a set is 216\nThe memory size of a tuple is 72\n```\n\
    \n如你所见，列表和元组比集合更节省空间。\n\n## 21 | 访问字典键\n\n如何访问字典中的键？以下是你可以访问字典键的三种不同方式。\n\n1.\
    \ 使用集合推导式\n\n集合推导式类似于列表推导式。区别在于它返回一个集合。\n\n```\ndict1 = {'name': 'Mary', 'age':\
    \ 22, 'student':True, 'Country': 'UAE'}\nprint({key for key in dict1.keys()})\n\
    Output:\n{'age', 'student', 'Country', 'name'}\n```\n\n2. 使用 set() 函数\n\n```\n\
    dict1 = {'name': 'Mary', 'age': 22, 'student':True, 'Country': 'UAE'}\nprint(set(dict1))\n\
    Output:\n{'name', 'Country', 'student', 'age'}\n```\n\n3. 使用 sorted() 函数\n\n```\n\
    dict1 = {'name': 'Mary', 'age': 22, 'student':True, 'Country': 'UAE'}\nprint(sorted(dict1))\n\
    Output:\n['Country', 'age', 'name', 'student']\n```\n\n## 22 | 是否可迭代\n\n问题：如何使用代码确认一个对象是否可迭代？\n\
    \n这就是你可以使用代码检查一个项目是否 *可迭代* 的方法。我们使用 *iter()* 函数。当你将一个不可迭代的项目作为参数传递给 *iter()* 函数时，它会返回一个\
    \ TypeError。下面，我们编写一个简短的脚本来检查给定的对象是否可迭代。\n\n```\narr = ['i', 'love', 'working',\
    \ 'with', 'Python']\n\ntry:\n    iter_check = iter(arr)\nexcept TypeError:\n \
    \   print('Object a not iterable')\nelse:\n    print('Object a is iterable')\n\
    \n# 检查第二个对象\nb = 45.7\n\ntry:\n    iter_check = iter(b)\nexcept TypeError:\n \
    \   print('Object b is not iterable')\nelse:\n    print('Object b is iterable')\n\
    ```\n\noutput:\nObject a is iterable\nObject b is not iterable\n\n## 23 | 对元组列表进行排序\n\
    \n你可以使用 operator 模块的 *itemgetter()* 类对元组列表进行排序。*itemgetter()* 函数作为 key 传递给 *sorted()*\
