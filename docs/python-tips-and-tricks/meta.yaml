    # 6 | Swapping Variables


    In Python, you can swap variables once they have been assigned to objects. Below,
    we initially assign 20 to $x$ and 30 to $y$, but then we swap them: $x$ becomes
    30 and $y$ becomes 20.


    ```

    x, y = 20, 30

    x, y = y, x


    print(''x is'', x)

    print(''y is'', y)

    Output:

    x is 30

    y is 20

    ```


    In Python, we can also use the XOR (exclusive or) operator to swap variables.
    This is a three-step method. In the example below, we are swapping the values
    of $x$ and $y$.


    ```

    x = 20

    y = 30


    # step one

    x ^= y

    # step two

    y ^= x

    # step three

    x ^= y


    print(f''x is: {x}'')

    print(f''y is: {y}'')

    Output:

    x is: 30

    y is: 20

    ```'
