    ```\n\nOutput:\n```\n  Brands  Age\n1  Tesla    2\n2   Ford    4\n3   Fiat   \
    \ 3\n```\n\n## 40 | Timer Decorator\n\nBelow, I created a timer function that\
    \ uses the *perf_counter* class of the time module. Notice that the *inner()*\
    \ function is inside the *timer()* function; this is because we are creating a\
    \ decorator. Inside the *inner()* function is where the \"decorated\" function\
    \ will run. Basically, the \"decorated\" function is passed as an argument to\
    \ the decorator. The decorator then runs this function inside the *inner()* function.\n\
    \nThe @timer right before the *range_tracker* function means that the function\
    \ is being decorated by another function. **To \"decorate\" a function is to improve\
    \ or add extra functionality to that function without changing it.** By using\
    \ a decorator, we are able to add a timer to the *range_tracker* function. We\
    \ are using this timer to check how long it takes to create a list from a range.\n\
    \n```python\nimport time\n\ndef timer(func):\n    def inner():\n        start\
    \ = time.perf_counter()\n        func()\n        end = time.perf_counter()\n \
    \       print(f'Run time is {end-start:.2f} secs')\n    return inner\n\n@timer\n\
    def range_tracker():\n    lst = []\n    for i in range(10000000):\n        lst.append(i**2)\n\
    \nrange_tracker()\n```\n\nOutput:\n```\nRun time is 10.25 secs\n```\n\n## 41 |\
    \ List Comprehension vs Generators\n\nA generator is similar to a list comprehension,\
    \ but instead of square brackets, you use parenthesis. Generators yield one item\
