  - "[PAGE 56]\n\n# 44 | Return vs Yield\n\nDo you understand the distinction between\
    \ a return statement and a yield statement in a function? The return statement\
    \ returns one element and ends the function. The yield statement returns a \"\
    package\" of elements called a generator. You have to \"unpack\" the package to\
    \ get the elements. You can use a for loop or the *next()* function to unpack\
    \ the generator.\n\n**Example 1: Using return statement**\n\n```\ndef num (n:\
    \ int) -> int:\n    for i in range(n):\n        return i\n\nprint(num(5))\noutput:\n\
    0\n```\n\nYou can see from the output that once the function returns **0**, it\
    \ stops. It does not return all the numbers in the range.\n\n**Example 2: Using\
    \ yield**\n\n```\ndef num (n: int):\n    for i in range(n):\n        yield i\n\
    \n# creating a generator\ngen = num(5)\n\n#unpacking generator\nfor i in gen:\n\
    \    print(i, end = ' ')\noutput:\n0 1 2 3 4\n```\n\nThe yield function returns\
    \ a \"package\" of all the numbers in the range. We use a *for loop* to access\
    \ the items in the range."
  - "[PAGE 57]\n\n# 45 | High Order Functions\n\nA high-order function is a function\
    \ that takes another function as an argument or returns another function. The\
    \ code below demonstrates how we can create a function and use it inside a high-order\
    \ function. We create a function called `sort_names`, and we use it as a key inside\
    \ the `sorted()` function. By using index[0], we are basically telling the sorted\
    \ function to sort names by their first name. If we use [1], then the names would\
    \ be sorted by the last name.\n\n```\ndef sort_names(x):\n    return x[0]\n\n\
    names = [('John','Kelly'),('Chris','Rock'),\n         ('will','Smith')]\n\nsorted_names\
    \ = sorted(names, key= sort_names)\nprint(sorted_names)\nOutput:\n[('Chris', 'Rock'),\
    \ ('John', 'Kelly'), ('will', 'Smith')]\n```\n\nIf we don't want to write a function\
    \ as above, we can also use the `lambda` function. See below:\n\n```\nnames =\
    \ [('John','Kelly'),('Chris','Rock'),\n         ('will','Smith')]\n\nsorted_names\
    \ = sorted(names, key= lambda x: x[0])\nprint(sorted_names)\nOutput:\n[('Chris',\
    \ 'Rock'), ('John', 'Kelly'), ('will', 'Smith')]\n```"
- md: "## 46 | Grammar Errors\n\nDid you know that you can correct grammar errors\
    \ in text using Python? You can use an open-source framework called Gramformer.\
    \ Gramformer (created by Prithviraj Damodaran) is a framework for highlighting\
    \ and correcting grammar errors in natural-language text. Here is a simple code\
    \ that demonstrates how you can use Gramformer to correct errors in a text.\n\n\
    First, you need to install it. Run this below:\n\n```\n!pip3 install torch==1.8.2+cu111\
    \ torchvision==0.9.2+cu111 torchaudio==0.8.2 -f https://download.pytorch.org/whl/lts/1.8/torch_lts.html\n\
    \n!pip3 install -U git+https://github.com/PrithvirajDamodaran/Gramformer.git\n\
    ```\n\n```\nfrom gramformer import Gramformer\n\n# instantiate the model\ngf =\
    \ Gramformer(models=1, use_gpu=False)\n\nsentences = [\n    'I hates walking night',\n\
    \    'The city is were I work',\n    'I has two children'\n]\n\nfor sentence in\
    \ sentences:\n    correct_sentences = gf.correct(sentence)\n    print('[Original\
    \ Sentence]', sentence)\n    for correct_sentence in correct_sentences:\n    \
    \    print('[Corrected sentence]', correct_sentence)\n```\n\noutput:\n\n```\n\
    [Original Sentence] I hates walking night\n[Corrected sentence] I hate walking\
    \ at night.\n[Original Sentence] The city is were I work\n[Corrected sentence]\
    \ The city where I work.\n[Original Sentence] I has two children\n[Corrected sentence]\
    \ I have two children.\n```\n\n## 47 | Zen of Python\n\nThe Zen of Python is a\
    \ list of 19 guiding principles for writing beautiful code. The Zen of Python\
    \ was written by Tim Peters and later added to Python.\n\nHere is how you can\
    \ access the Zen of Python.\n\n```\nimport this\nprint(this)\n```\n\noutput:\n\
    ```\nThe Zen of Python, by Tim Peters\n\nBeautiful is better than ugly.\nExplicit\
    \ is better than implicit.\nSimple is better than complex.\nComplex is better\
    \ than complicated.\nFlat is better than nested.\nSparse is better than dense.\n\
    Readability counts.\nSpecial cases aren't special enough to break the rules.\n\
    Although practicality beats purity.\nErrors should never pass silently.\nUnless\
    \ explicitly silenced.\nIn the face of ambiguity, refuse the temptation to guess.\n\
    There should be one-- and preferably only one --obvious way to do it.\nAlthough\
    \ that way may not be obvious at first unless you're Dutch.\nNow is better than\
    \ never.\nAlthough never is often better than *right* now.\nIf the implementation\
    \ is hard to explain, it's a bad idea.\nIf the implementation is easy to explain,\
    \ it may be a good idea.\nNamespaces are one honking great idea -- let's do more\
    \ of those!\n```\n\n## 48 | Sorted by Pprint\n\nDid you know that you can print\
    \ out a sorted dictionary using the pprint module? Below, we use the module to\
    \ print out a dictionary in ascending order. The dictionary is sorted by key.\n\
    \n```\nimport pprint\n\na = {'c': 2, 'b': 3, 'y': 5, 'x': 10}\n\npp = pprint.PrettyPrinter(sort_dicts=True)\n\
    pp.pprint(a)\n```\n\nOutput:\n```\n{'b': 3, 'c': 2, 'x': 10, 'y': 5}\n```\n\n\
    Please note that pprint does not change the order of the actual dictionary; it\
    \ just changes the printout order.\n\n### Insert underscore\n\nPprint can also\
    \ be used to insert a thousand separator into numbers. Pprint will insert an underscore\
    \ as a thousand separator. It has a parameter called underscore_numbers. All we\
    \ have to do is set it to True. See the code below:\n\n```\nimport pprint\n\n\
    arr = [1034567, 1234567, 1246789, 12345679, 987654367]\n\npp = pprint.PrettyPrinter(underscore_numbers=True)\n\
    pp.pprint(arr)\n```\n\nOutput:\n```\n[1_034_567, 1_234_567, 1_246_789, 12_345_679,\
    \ 987_654_367]\n```\n\n## 49 | Convert Picture to Grey Scale\n\nDo you want to\
    \ convert a color image into grayscale? Use Python’s cv2 module.\n\nFirst install\
    \ cv2 using `pip install opencv-python`.\n\nBelow we are converting a color book\
    \ image to grayscale. You can replace that with your own image. You must know\
    \ where the image is stored.\n\nWhen you want to view an image using CV2, a window\
    \ will open. The *waitkey* indicates how long we expect the display window to\
    \ be open. If a key is pressed before the display time is over, the window will\
    \ be destroyed or closed.\n\n```\nimport cv2 as cv\n\nimg = cv.imread('book.jpg')\n\
    \n# show the original image\nimg1 = cv.imshow('Original', img)\ncv.waitKey(5)\n\
    \n# Converting image to Gray\ngrayed_img = cv.cvtColor(img, cv.COLOR_BGR2GRAY)\n\
    \n# Show grayed-out image\nimg2 = cv.imshow('grayed_image', grayed_img)\ncv.waitKey(5000)\n\
    \n# Save image\ncv.imwrite('grayed.jpg', grayed_img)\n```\n\n## 50 | Time it with\
    \ timeit\n\nIf you want to know the execution time of a given code, you can use\
    \ the *timeit()* module. Below, we create a function called timer that uses *timeit()*\
    \ from the *timeit* module. We're basically using **timeit** to determine how\
    \ long it takes to run **sum(num**2 for num in range(10000))**. The first parameter\
    \ of the timeit function in the code below is *stmt*. This is where we pass the\
    \ Python code that we want to measure. This parameter only takes a string as an\
    \ argument, so we have to ensure that we convert our code to a string format.\
    \ The *number* parameter is basically the number of executions we want to run\
    \ on this code.\n\n```\nimport timeit\n\ndef timer(code):\n    tm = timeit.timeit(code,\
    \ number=1000)\n    return f'Execution time is {tm:.2f} secs.'\n\nif __name__\
    \ == \"__main__\":\n    print(timer('sum(num**2 for num in range(10000))'))\n\
    ```\n\nOutput:\n```\nExecution time is 5.05 secs.\n```\n\nIt's not necessary to\
    \ create a function like we did above. You can also use *timeit* without creating\
    \ a function. Let's simplify the above code by writing it without a function.\
    \ Remember that the *stmt* parameter only takes a string as an argument; that\
    \ is why the *test* variable below, which is the code that we pass to the *timeit()*\
    \ function, is a string.\n\n```\nimport timeit\n\ntest = \"sum(num ** 2 for num\
    \ in range(10000))\"\ntm = timeit.timeit(stmt=test, number=1000)\nprint(f'{tm:.2f}\
    \ secs')\n```\n\nOutput:\n```\n2.20 secs\n```\n\n## 51 | Shortening URL with Python\n\
    \nMost of us have used programs that generate short URLs. Python has a library\
    \ called **pyshorteners** used to shorten a URL. First install it using pip:\n\
    \n```\npip install pyshorteners\n```\n\nOnce you install it, you can import it\
    \ into your script. The function below demonstrates how we can use pyshorteners.\
    \ We pass a very long URL to the function, and it returns a short URL.\n\n```\n\
    import pyshorteners\n\ndef shorter_url(s: str):\n    # initialize the shortener\n\
    \    pys = pyshorteners.Shortener()\n    # Using the tinyurl to shorten\n    short_url\
    \ = pys.tinyurl.short(s)\n    return 'Short url is', short_url\n\nprint(shorter_url(\n\
    \"https://www.google.com/search?q=python+documentation&newwindow=1&sxsrf=ALiCzsYze-\"\
    \n\"G2AArM2tCrJfyfVcqq6z8Rwg%3A1662044120968&ei=2McQY4PaOp68xc8Pyp-qIA&qq=python+do&s_gs_lcp=\"\
    \n\"Cgdnd3Mtd2l6EAEYATIFCAAQgAQyBQgAEIAEMgUIABCABDIFCAAQgAQyBQgAEIAEMgUIABCABDIFCAAQ\"\
    \n\"AQyBQgAEIAEMgUIABCABDIFCAAQgAQ6BwgAEEcQsAM6DQguEMcBENEDELADEEM6BwgAELADEEM6BAgj\"\
    \n\"ECc6BAgAEEM6BAguECdKBAhBGABKBAhGGABQ1xBY70JgxlVoAXABeACAAYgBiAGWCJIBAzAUOZgBA\"\
    \n\"KABAcgBCsABAQ&sclient=gws-wiz\"))\n```\n\nOutput:\n```\n('Short url is', 'https://tinyurl.com/2n2zpl8d')\n\
    ```\n\n## 52 | The Round Function\n\nHow do you easily round off a number in Python?\
    \ Python has a built-in round function that handles such tasks. The syntax is:\n\
    \n**round(number, number of digits)**\n\nThe first parameter is the number to\
    \ be rounded, and the second parameter is the number of digits a given number\
    \ will be rounded to. That is the number of digits after the point. The second\
    \ parameter is optional. Here is an example:\n\n```\nnum = 23.4567\nprint(round(num,\
    \ 2))\n```\n\nOutput:\n```\n23.46\n```\n\nYou can see that we have two digits\
    \ after the decimal point. If we didn't pass the second parameter (2), the number\
    \ would be rounded to 23.\n\nTo round up or down a number, use the *ceil* and\
    \ *floor* methods from the math module. The *ceil* rounds up a number to the nearest\
    \ integer greater than the given number. The *floor* method rounds down a number\
    \ to the nearest integer that is less than the given number.\n\n```\nimport math\n\
    \na = 23.4567\n# rounding up\nprint(math.ceil(a))\n# rounding down\nprint(math.floor(a))\n\
    ```\n\nOutput:\n```\n24\n23\n```"
