- md: "## 32 | Flatten Nested List\n\nWhat is a nested list? A nested list is a list\
    \ that has another list as an element (a list inside a list). You can flatten\
    \ a nested list using the `sum()` function. Note that this will work on a two-dimensional\
    \ nested list.\n\n```python\nnested_list = [[2, 4, 6],[8, 10, 12]]\n\nnew_list\
    \ = sum(nested_list,[])\nprint(new_list)\nOutput:\n[2, 4, 6, 8, 10, 12]\n```\n\
    \nPlease note that this is not the most efficient way to flatten a list. It is\
    \ not easy to read. But it's still pretty cool to know, right? \U0001F609\n\n\
    ## Using reduce function\n\nHere is another cool trick you can use to flatten\
    \ a two-dimensional list. This time we use `reduce` from functools module. This\
    \ is another high order function in Python.\n\n```python\nfrom functools import\
    \ reduce\n\nnested_list = [[2, 4, 6], [8, 10, 12]]\n\nnew_list = reduce(lambda\
    \ x, y: x+y, nested_list)\nprint(new_list)\nOutput:\n[2, 4, 6, 8, 10, 12]\n```\n\
    \n## 33 | Checking if a File Exists\n\nUsing the OS module, you can check if a\
    \ file exists. The os module has an *exists()* function from the path() class\
    \ that returns a Boolean value. If a file exists, it will return True; if not,\
    \ it will return False. When working with files, it is important to check if a\
    \ file exists before trying to run it to avoid generating errors. Let's say you\
    \ want to delete or remove a file with Python; if the file does not exist, your\
    \ code will generate an error. See the following example:\n\n```python\nimport\
    \ os\n\nos.remove(\"thisfile.txt\")\nOutput:\nFileNotFoundError: [WinError 2]\
    \ The system cannot find the file specified: 'thisfile.txt'\n```\n\nTo avoid this\
    \ error, we have to check if the file exists before removing it. We will pass\
    \ the file path or file name as an argument to os.path.exists(). If the file is\
    \ in the same folder as your Python file, we can pass the file name as an argument.\n\
    \nIn the code below, we use the file name as an argument because we assume the\
    \ file is in the same folder as the Python file. You can see from the output that\
    \ even though the file does not exist, our code does not generate an error.\n\n\
    ```python\nimport os.path\n\nfile = os.path.exists('thisfile.txt')\n\nif file:\n\
    \    os.remove(\"thisfile.txt\")\nelse:\n    print('This file does Not exist')\n\
    Output:\nThis file does Not exist\n```\n\n## 34 | Set Comprehension\n\nSet comprehension\
    \ is similar to list comprehension; the only difference is that it returns a set\
    \ and not a list. Instead of square brackets, set comprehension uses curly brackets.\
    \ This is because sets are enclosed in curly brackets. You can use set comprehension\
    \ on an iterable (list, tuple, set, etc.).\n\nLet's say we have a list of uppercase\
    \ strings and we want to convert them into lowercase strings and remove duplicates;\
    \ we can use set comprehension. Since sets are not ordered, the order of the items\
    \ in the iterable will be changed. Sets do not allow duplicates, so only one \"\
    PEACE\" will be in the output set.\n\n```python\nlist1 = ['LOVE', 'HATE', 'WAR',\
    \ 'PEACE', 'PEACE']\nset1 = {word.lower() for word in list1}\nprint(set1)\nOutput:\n\
    {'love', 'peace', 'war', 'hate'}\n```\n\nHere is another way we can use set comprehension.\
    \ Let's say we have a list of numbers and we want to return all the numbers from\
    \ the list that are divisible by 2 and remove duplicates at the same time. Here\
    \ is the code below: Remember, sets do not allow duplicates, so it will remove\
    \ all the numbers that appear more than once.\n\n```python\narr = [10, 23, 30,\
    \ 30, 40, 45, 50]\nnew_set = {num for num in arr if num % 2 == 0}\nprint(new_set)\n\
    Output:\n{40, 10, 50, 30}\n```\n\n## 35 | Python *args and **Kwargs\n\nWhen you\
    \ are not sure how many arguments you will need for your function, you can pass\
    \ *args (non-keyword arguments) as a parameter. The * notation tells Python that\
    \ you are not sure how many arguments you need, and Python allows you to pass\
    \ in as many arguments as you want. Below, we calculate the average with different\
    \ numbers of arguments. First, we pass three (3) numbers as arguments. Then we\
    \ pass six numbers as arguments. The *args make functions more flexible when it\
    \ comes to arguments.\n\n```python\ndef avg(*args):\n    avg1 = sum(args)/len(args)\n\
    \    return f'The average is {avg1:.2f}'\n\nprint(avg(12, 34, 56))\nprint(avg(23,45,36,41,25,25))\n\
    Output:\nThe average is 34.00\nThe average is 32.50\n```\n\nWhen you see **kwargs\
    \ (keyword arguments) as a parameter, it means the function can accept any number\
    \ of arguments as a dictionary (arguments must be in key-value pairs). See the\
    \ example below:\n\n```python\ndef myFunc(**kwargs):\n    for key, value in kwargs.items():\n\
    \        print(f'{key} = {value}')\n    print('\\n')\n\nmyFunc(Name = 'Ben',Age\
    \ = 80, Occupation ='Engineer')\nOutput:\nName = Ben\nAge = 80\nOccupation = Engineer\n\
    ```\n\n## 36 | The Filter Function\n\nWe can use the *filter()* function as an\
    \ alternative to the *for loop*. If you want to return items from an iterable\
    \ that match certain criteria, you can use the Python *filter()* function.\n\n\
    Let's say we have a list of names and we want to return a list of names that are\
    \ lowercase; here is how you can do it using the *filter()* function.\n\nThe first\
    \ example uses a for loop for comparison purposes.\n\n### Example 1: Using a for\
    \ loop\n\n```python\nnames = ['Derick', 'John', 'moses', 'linda']\n\nfor name\
    \ in names:\n    if name.islower():\n        lower_case.append(name)\nprint(lower_case)\n\
    Output:\n['moses', 'linda']\n```\n\n### Example 2: Using filter function with\
    \ lambda function\n\nThe *filter()* function is a higher-order function. The filter\
    \ function takes two arguments: a function and a sequence. It uses the function\
    \ to filter the sequence. In the code below, the filter function uses the lambda\
    \ function to check for names in the list that are lowercase.\n\n```python\nnames\
    \ = ['Derick', 'John', 'moses', 'linda']\n\nlower_case = list(filter(lambda x:x.islower(),\
    \ names))\nprint(lower_case)\nOutput:\n['moses', 'linda']\n```\n\n### Example\
    \ 3: Using filter function with a function\n\nIf we do not want to use a *lambda*\
    \ function, we can write a function and pass it as an argument to the filter function.\
    \ See the code below:\n\n```python\nnames = ['Derick', 'John', 'moses', 'linda']\n\
    \n# Creating a function\ndef lower_names(n:str):\n    return n.islower()\n\n#\
    \ passing the function as argument of the filter function\nlower_case = list(filter(lower_names,\
