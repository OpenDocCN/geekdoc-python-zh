  md: "# 74 | Python Deque\n\nIf you want to add and pop elements from both sides\
    \ of a list, you can use deque (double-ended queue). Unlike a normal list that\
    \ lets you add and remove elements from one end, deque allows you to add and remove\
    \ elements from both the left and right sides of the list. This makes it quite\
    \ handy if one has a big stack. Deque is found in the *collections* module. In\
    \ the example below, see how we are able to append elements at both ends of the\
    \ list.\n\n```\nfrom collections import deque\n\narr = deque([1, 3])\n# appending\
    \ on the left end of the list\narr.appendleft(5)\n# appending on the right end\
    \ of the list\narr.append(7)\nprint(arr)\noutput:\n deque([5, 1, 3, 7])\n```\n\
    \nDeque also makes it easy to pop (remove) elements on both ends of the list.\
    \ See the example below:\n\n```\nfrom collections import deque\n\narr = deque([1,\
    \ 3, 9, 6])\n# pop element on the left end of the list\narr.popleft() # pops 6\n\
    # pop element on the right end of the list\narr.pop() # pops 1\nprint(arr)\noutput:\n\
    deque([3, 9])\n```\n\nYou can see from the output that we have popped elements\
    \ from both ends of the list."
