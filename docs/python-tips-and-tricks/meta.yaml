    if sorted(a)== sorted(b):\n    print('Anagrams')\nelse:\n    print(\"Not anagrams\"\
    )\noutput:\nAnagrams\n```\n\n## 15 | 检查网速\n\n你知道你可以用 Python 检查网速吗？\n有一个叫做 *speedtest*\
