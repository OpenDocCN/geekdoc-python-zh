  mdcn: "## 25 | 使用 Python 获取新闻\n\n你可以用 Python 做很多事情，甚至阅读新闻。你可以使用 Python 的 `newspapers`\
    \ 模块来获取新闻。你可以使用这个模块来抓取新闻文章。首先，安装该模块。\n\n```\npip install newspaper3k\n```\n\n\
    下面我们获取文章的标题。我们只需要文章的 URL。\n\n```\nfrom newspaper import Article\n\nnews = Article(\"\
    https://indianexpress.com/article/\"\n              \"technology/gadgets/\"\n\
    \              \"apple-discontinues-its-last-ipod-model-7910720/\")\n\nnews.download()\n\
    news.parse()\nprint(news.title)\nOutput\nEnd of an Era: Apple discontinues its\
    \ last iPod model\n```\n\n我们也可以使用 `text` 方法获取文章正文。\n\n```\nnews = Article(\"https://indianexpress.com/article/\"\
    \n              \"technology/gadgets/\"\n              \"apple-discontinues-its-last-ipod-model-7910720/\"\
    )\n\nnews.download()\nnews.parse()\nprint(news.text)\nOutput:\nApple Inc.'s iPod,\
    \ a groundbreaking device that upended the\nmusic and electronics industries more\
    \ than two decades ago...\n```\n\n我们还可以获取文章的发布日期。\n\n```\nnews = Article(\"https://indianexpress.com/article/\"\
    \n              \"technology/gadgets/\"\n              \"apple-discontinues-its-last-ipod-model-7910720/\"\
    )\n\nnews.download()\nnews.parse()\nprint(news.publish_date)\nOutput:\n2022-05-11\
    \ 09:29:17+05:30\n```\n\n## 26 | 使用 Enumerate 创建元组列表\n\n由于 `enumerate` 会对其遍历的项目进行计数（添加一个计数器），你可以用它来创建一个元组列表。下面，我们从一个日期列表中创建一个包含一周各天的元组列表。`enumerate`\
    \ 有一个名为 `start` 的参数。`start` 是你希望计数开始的索引。默认情况下，`start` 为零（0）。\n\n下面，我们将 `start`\
    \ 参数设置为一（1）。你可以从任何你想要的数字开始。\n\n```\ndays = [\"Sunday\", \"Monday\", \"Tuesday\"\
    , \"wednesday\",\n        \"Thursday\", \"Friday\", \"Saturday\"]\n\ndays_tuples\
    \ = list(enumerate(days, start=1))\nprint(days_tuples)\nOutput:\n[(1, 'Sunday'),\
    \ (2, 'Monday'), (3, 'Tuesday'), (4, 'wednesday'), (5, 'Thursday'), (6, 'Friday'),\
    \ (7, 'Saturday')]\n```\n\n也可以使用 *for 循环* 创建相同的输出。让我们创建一个函数来演示这一点。\n\n```\ndef\
    \ enumerate(days, start= 1):\n    n = start\n    for day in days:\n        yield\
    \ n, day\n        n += 1\n\ndays = [\"Sunday\", \"Monday\", \"Tuesday\", \"wednesday\"\
    ,\n        \"Thursday\", \"Friday\", \"Saturday\"]\n\nprint(list(enumerate(days)))\n\
    Output:\n[(1, 'Sunday'), (2, 'Monday'), (3, 'Tuesday'), (4, 'wednesday'), (5,\
    \ 'Thursday'), (6, 'Friday'), (7, 'Saturday')]\n```\n\n## 27 | 断言\n\n我们可以使用 `assert`\
    \ 语句来检查或调试你的代码。`assert` 语句会尽早捕获代码中的错误。`assert` 语句接受两个参数：一个条件和一个可选的错误消息。语法如下：\n\
    \n```\nassert <condition>, [error message]\n```\n\n条件返回一个布尔值，为 `True` 或 `False`。错误消息是当条件为\
    \ `False` 时我们希望显示的消息。\n\n下面，我们在代码中插入一个 `assert` 语句。这段代码接收一个名称列表，并返回所有小写字母的名称。我们期望列表中的所有项目都是字符串，因此我们使用\
    \ `insert` 语句来调试非字符串条目。`insert` 语句将检查列表中的所有项目是否都是 *str* 类型。如果其中一个项目不是字符串，它将评估为\
    \ `False`。它将停止程序并抛出一个 *AssertionError*。它将显示错误消息 \"**non-string items are in the\
    \ list.**\"。如果所有项目都是字符串，它将评估为 `True` 并运行其余代码。由于名称列表中的第四个名称不是字符串，代码返回错误。\n\n```\n\
    name = [\"Jon\",\"kelly\", \"kess\", \"PETR\", 4]\n\nlower_names = []\nfor item\
    \ in name:\n    assert type(item) == str, 'non-string items in the list'\n   \
    \ if item.islower():\n        lower_names.append(item)\n\nprint(lower_names)\n\
    Output:\nAssertionError: non-string items in the list\n```\n\n如果我们从列表中移除非字符串项目，其余代码将运行。\n\
    \n```\nname = [\"Jon\", \"kelly\", \"kess\", \"PETR\"]\n\nlower_names = []\nfor\
    \ item in name:\n    assert type(item) == str, 'non-string items in the list'\n\
    \    if item.islower():\n        lower_names.append(item)\n\nprint(lower_names)\n\
    Output:\n['kelly', 'kess']\n```\n\n## 28 | 打印彩色文本\n\n你知道吗，你可以使用 Python 和 ANSI\
    \ 转义码为你的代码添加颜色？下面，我创建了一个代码类，并将其应用到我打印的代码中。\n\n```\nclass Colors():\n    Black\
    \ = '\\033[30m'\n    Green = '\\033[32m'\n    Blue = '\\033[34m'\n    Magenta\
    \ = '\\033[35m'\n    Red = '\\033[31m'\n    Cyan = '\\033[36m'\n    White = '\\\
    033[37m'\n    Yellow = '\\033[33m'\n\nprint(f'{Colors.Red} Warning: {Colors.Green}\
    \ '\n      f'Love Don\\'t live here anymore')\n```\n\nOutput:\n**Warning:** Love\
    \ Don't live here anymore\n\n## 29 | 使用 Enumerate 查找索引\n\n访问可迭代对象中项目索引的最简单方法是使用\
    \ `enumerate()` 函数。默认情况下，`enumerate` 函数返回元素及其索引。我们基本上可以用它来遍历一个可迭代对象，它将返回可迭代对象中所有元素的计数器。\n\
    \n假设我们想在下面的 `str1` 中找到字母 \"n\" 的索引。以下是我们如何使用 `enumerate` 函数来实现这一点：\n\n```\nstr1\
    \ = 'string'\n\nfor index, value in enumerate(str1):\n    if value == 'n':\n \
    \       print(f\"The index of n is {index}\")\n\nOutput\nThe index of 'n' is 4\n\
    ```\n\n如果我们想打印字符串中的所有元素及其索引，可以这样使用 `enumerate`。\n\n```\nstr1 = 'string'\nfor i,\
    \ j in enumerate(str1):\n    print(f\"Index: {i}, Value: {j}\")\n\nOutput:\nIndex:\
    \ 0, value: s\nIndex: 1, value: t\nIndex: 2, value: r\nIndex: 3, value: i\nIndex:\
    \ 4, value: n\nIndex: 5, value: g\n```\n\n如果你不想使用 `for` 循环，可以将 `enumerate` 与 `list`\
    \ 函数一起使用，它将返回一个元组列表。每个元组将包含一个值及其索引。\n\n```\nstr1 = 'string'\nstr_counta = list(enumerate(str1))\n\
    print(str_counta)\n\nOutput:\n[(0, 's'), (1, 't'), (2, 'r'), (3, 'i'), (4, 'n'),\
    \ (5, 'g')]\n```\n\n## 30 | 使用 Type 函数创建类\n\n`type()` 函数通常用于检查对象的类型。然而，它也可以用于在\
    \ Python 中动态创建类。\n\n下面我创建了两个类，第一个使用 `class` 关键字，第二个使用 `type()` 函数。你可以看到两种方法都达到了相同的结果。\n\
    \n```\n# Creating dynamic class using the class keyword\nclass Car:\n    def __init__(self,\
    \ name, color):\n        self.name = name\n        self.color = color\n\n    def\
    \ print_car(self):\n        return f'The car is {self.name} ' \\\n           \
    \    f'and its {self.color} in color'\n\ncar1 = Car('BMW', 'Green')\nprint(car1.print_car())\n\
    \n# Creating dynamic class using the type keyword\ndef cars_init(self, name ,color):\n\
    \    self.name = name\n    self.color = color\n\nCars = type(\"Car\",(),\n   \
    \        {'__init__': cars_init,\n            'print_car':lambda self:\n     \
    \       f'The car is {self.name} ',\n            f'and its {self.color} in color'})\n\
    \ncar1 = Cars(\"BMW\", \"Green\")\nprint(car1.print_car())\nOutput:\nThe car is\
    \ BMW and its Green in color\nThe car is BMW and its Green in color\n```\n\n##\
    \ 31 | 检查字符串是否为空\n\n检查给定字符串是否为空的简单方法是使用 *if 语句* 和 **not** 运算符，它将返回一个布尔值。Python\
    \ 中的空字符串评估为 `False`，非空字符串评估为 `True`。**not** 运算符在某些东西为 `False` 时返回 `True`，在某些东西为\
    \ `True` 时返回 `False`。由于空字符串评估为 `False`，**not** 运算符将返回 `True`。下面，如果字符串为空，*if 语句*\
    \ 将评估为 `True`，因此该部分代码将运行。如果字符串不为空，*else* 语句将运行。\n\n```\n# Empty string\nstr1 =\
    \ ''\n\nif not str1:\n    print('This string is empty')\nelse:\n    print('This\
    \ string is NOT empty')\nOutput:\nThis string is empty\n```\n\n### 示例 2\n\n现在让我们尝试在字符串中插入一些内容。\n\
    \n```\n# Not empty string\nstr2 = 'string'\n\nif not str1:\n    print('This string\
    \ is empty')\nelse:\n    print('This string is NOT empty')\nOutput:\nThis string\
    \ is NOT empty\n```"
