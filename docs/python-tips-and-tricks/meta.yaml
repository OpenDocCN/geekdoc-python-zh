  md: '# 93 | Recursion Limit


    Do you want to know the recursion limit in Python? You can use the **sys** module.
    Here is the code below:


    ```

    import sys

    print(sys.getrecursionlimit())

    Output:

    1000

    ```


    1000 is the default recursion limit in Python. Python sets this limit to prevent
    stack overflows. However, Python also provides a method to change the recursion
    limit to suit your needs. Here is how you can adjust the limit.


    ```

    import sys

    sys.setrecursionlimit(1200)

    print(sys.getrecursionlimit())

    Output:

    1200

    ```


    You can see that the limit has changed from 1000 to 1200. So, if you ever get
    a maximum recursion depth error, just make the adjustment.'
