    \ reverse=True)\nprint(sorted_list)\n# 输出：\n# [{'school': 'yale', 'city': 'Beijing'},\
    \ {'school': 'Cat', 'city': 'Cairo'}]\n```\n\n## 66 | 字节转换为字符串\n\n有两种方法可以将字节转换为字符串。第一种方法是使用\
    \ `str()` 函数。第二种方法是使用 decode 方法。首先，这是一个字节数据类型：\n\n```python\ns = b'Love for life'\n\
    print(type(s))\n# 输出：\n# <class 'bytes'>\n```\n\n现在让我们将其转换为字符串。\n\n### 方法 1：使用\
    \ str 函数\n\n```python\ns = b'Love for life'\nstr1 = str(s, \"UTF-8\")\nprint(type(str1))\n\
    print(str1)\n# 输出：\n# <class 'str'>\n# Love for life\n```\n\n### 方法 2：使用 decode\
    \ 方法\n\n```python\ns = b'Love for life'\n\nstr1 = s.decode()\nprint(type(str1))\n\
    print(str1)\n# 输出：\n# <class 'str'>\n# Love for life\n```\n\n## 67 | 从用户获取多个输入\n\
    \n如果你想从用户那里获取多个输入，该怎么办？在 Python 中如何实现？Python 使用 *input()* 函数从用户那里获取输入。*input()*\
    \ 函数一次只接受一个输入；这是默认设置。我们如何修改 input 函数使其一次接受多个输入呢？我们可以将 *input()* 函数与字符串方法 *split()*\
    \ 一起使用。语法如下：\n\n```python\ninput().split()\n```\n\n借助 *split()* 函数，*input()* 函数可以同时接受多个输入。*split()*\
    \ 方法将输入分隔开。默认情况下，split 方法在空白处进行分隔。但是，你也可以指定一个分隔符。下面，我们要求用户输入三个（3）个数字。我们使用 *split()*\
    \ 方法指定分隔符。在这种情况下，我们用逗号（,）分隔输入。然后我们计算这三个数字的平均值。如果输入是 12、13 和 14，我们将得到以下输出：\n\n\
    ```python\na, b, c = input(\"Please input 3 numbers: \").split(sep=',')\naverage\
    \ = (int(a) + int(b) + int(c))/3\nprint(average)\n# 输出：\n# 13\n```\n\n我们也可以从用户那里获取多个值。下面，我们使用列表推导式要求用户输入多个名字。如果用户输入\
    \ Kelly、John、Trey 和 Steven，输出将是：\n\n```python\n# 使用列表推导式获取多个值\nn = [nam for nam\
    \ in input(\"Enter multiple names: \").split(sep=',')]\n\nprint(n)\n# 输出：\n# ['Kelly',\
    \ ' John', ' Trey', ' Steven']\n```\n\n## 68 | iter() 函数\n\n如果你想为一个对象创建一个迭代器，请使用\
    \ *iter()* 函数。一旦迭代器对象被创建，就可以逐个访问元素。要访问迭代器中的元素，你需要使用 *next()* 函数。下面是一个示例：\n\n```python\n\
    names = ['jake', \"Mpho\", 'Peter']\n# 创建迭代器\niter_object = iter(names)\n# 使用\
    \ next 函数访问项目\nname1 = next(iter_object)\nprint('First name is', name1)\nname2\
    \ = next(iter_object)\nprint('Second name is', name2)\nname3 = next(iter_object)\n\
    print('Third name is', name3)\n# 输出：\n# First name is jake\n# Second name is Mpho\n\
    # Third name is Peter\n```\n\n因为列表只有三个元素，尝试打印可迭代对象中的第四个元素将导致 *StopIteration* 错误。\n\
    \n我们也可以优雅地将 *next()* 函数放在循环中。请看下面：\n\n```python\nnames = ['Jake', \"Mpho\", 'Peter']\n\
    iter_object = iter(names)\nwhile True:\n    # 使用 next 函数访问对象中的项目\n    try:\n \
    \       print(next(iter_object))\n    except:\n        break\n# 输出：\n# Jake\n\
    # Mpho\n# Peter\n```\n\n为什么要使用迭代器？迭代器具有更好的内存效率。\n\n## 69 | 将两个列表合并为字典\n\n有时，在处理列表时，你可能想将数据类型更改为字典。也就是说，你可能想将列表合并成一个字典。为此，你可能需要使用\
    \ `zip()` 函数和 `dict()` 函数。`zip()` 函数接受两个可迭代对象并将元素配对。第一个可迭代对象中的第一个元素与第二个可迭代对象中的第一个元素配对，第二个元素与另一个第二个元素配对，依此类推。`zip()`\
    \ 函数返回一个元组的迭代器。`dict()` 函数会将配对的元素转换为键值组合，从而创建一个字典。\n\n```python\nlist1 = ['name',\
    \ 'age', 'country']\nlist2 = ['Yoko', 60, 'Angola']\n\ndict1 = dict(zip(list1,list2))\n\
    print(dict1)\n# 输出：\n# {'name': 'Yoko', 'age': 60, 'country': 'Angola'}\n```\n\
    \n如果列表中的一个元素无法与另一个元素配对，那么它将被忽略。假设 **list1** 有四个元素，**list2** 有五个；list2 中的第五个项目将被忽略。你可以看到下面的\
    \ \"Luanda\" 已被忽略。\n\n```python\nlist1 = ['name', 'age', 'country']\nlist2 = ['Yoko',\
    \ 60, 'Angola', \"Luanda\"]\n\ndict1 = dict(zip(list1,list2))\nprint(dict1)\n\
    # 输出：\n# {'name': 'Yoko', 'age': 60, 'country': 'Angola'}\n```"
