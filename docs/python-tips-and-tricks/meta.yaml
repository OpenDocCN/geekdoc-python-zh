    \ frequent letter is, '\n      f'{most_frequent}')\n\noutput\nThe most frequent\
    \ letter is, s\n```\n\nNow, if there is more than one most frequent item in the\
    \ string, the max() function will return the element that comes first alphabetically.\
    \ For example, if the string above had 4 Fs and 4 Ss, the max function would return\
    \ \"f\" instead of \"s\" as the most frequent element because \"f\" comes first\
    \ alphabetically.\n\nWe can also use the **Counter** class from the collections\
    \ module. The `most_common()` method of this class will count how many times each\
