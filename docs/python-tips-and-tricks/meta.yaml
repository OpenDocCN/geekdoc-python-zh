  md: "# 70 | Finding Permutations of a string\n\nPermutations of a string are different\
    \ orders in which we can arrange the elements of the string. For example, given\
    \ an \"ABC\" string, we can rearrange it into [\"ABC,\" \"ACB,\" \"BAC,\" \"BCA,\"\
    \ \"CAB,\" \"CBA.\"]. In Python, the easiest way to find permutations of a string\
    \ is to use *itertools*. Itertools has a permutation class. Here is how we can\
    \ do it, using itertools.\n\n```\nfrom itertools import permutations\n\ndef get_permutations(s:\
    \ str):\n    arr = []\n    for i in permutations(s):\n        arr.append(''.join(i))\n\
    \    return a\n\nprint(get_permutations('ABC'))\n```\n\nOutput:\n['ABC', 'ACB',\
    \ 'BAC', 'BCA', 'CAB', 'CBA']\n\nAnother way to do it.\n\n```\ndef find_permute(string,\
    \ j ):\n    if len(string) == 0:\n        print(j, end=\" \")\n\n    for i in\
    \ range(len(string)):\n        char = string[i]\n        s = string[0:i] + string[i\
    \ + 1:]\n        find_permute(s, j + char)\n    return j\n\nprint(find_permute('ABC',\
    \ ''))\n```\n\nOutput:\nABC ACB BAC BCA CAB CBA"
