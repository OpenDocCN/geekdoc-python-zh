    True\n```\n\nYou can also create a custom list of words you want to censor. If\
    \ a text contains a word from your list, then it will be censored.\n\n```python\n\
    bad_words = [ 'Hate', 'War', 'evil']\n\n# Create a custom list of words to censor\n\
    profanity.load_censor_words(bad_words)\n\ntext = 'People that love war are evil'\n\
    \ncensored_text = profanity.censor(text)\nprint(censored_text)\n```\n\nOutput:\n\
    ```\nPeople that love **** are ****\n```\n\n## 99 | Monotonic or Not?\n\nHow do\
    \ you check if an array is monotonic? An array is monotonic if the elements are\
    \ sorted either in descending order or ascending order. For example, [4, 5, 5,\
    \ 7] is monotonic. [4, 10, 2, 5] is not monotonic. We use the all() function to\
    \ check if the numbers in the array are ascending or descending. If they are ascending\
    \ or descending, it will return True. If they are not, it will return False.\n\
    \n```python\ndef check_monotonic(arr: list):\n    if all(arr[i] >= arr[i + 1]\
    \ for i in range(len(arr)-1)):\n        return True\n    elif all(arr[i] <= arr[i\
    \ + 1] for i in range(len(arr)-1)):\n        return True\n    else:\n        return\
    \ False\n```\n\n```python\nlist1 = [4, 5, 5, 7]\nprint(check_monotonic(list1))\n\
    ```\n\nOutput:\n```\nTrue\n```\n\nThe code returns True because [4, 5, 5, 7] is\
    \ monotonic. If we try [4, 10, 2, 5], here is what we get:\n\n```python\ndef check_monotonic(arr:\
    \ list):\n    if all(arr[i] >= arr[i + 1] for i in range(len(arr)-1)):\n     \
    \   return True\n    elif all(arr[i] <= arr[i + 1] for i in range(len(arr)-1)):\n\
    \        return True\n    else:\n        return False\n```\n\n```python\nlist1\
    \ = [4, 10, 2, 5]\nprint(check_monotonic(list1))\n```\n\nOutput:\n```\nFalse\n\
    ```\n\n## 100 | Find Factors of a Number\n\nFactors of a number are all the numbers\
