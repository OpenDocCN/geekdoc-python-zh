    \   return True\n    elif all(arr[i] <= arr[i + 1] for i in range(len(arr)-1)):\n\
    \        return True\n    else:\n        return False\n```\n\n```\nlist1 = [4,\
    \ 5, 5, 7]\nprint(check_monotonic(list1))\nOutput:\nTrue\n```\n\nThe code returns\
    \ True because [4, 5, 5, 7] is monotonic. If we try [4, 10, 2, 5], here is what\
    \ we get:\n\n```\ndef check_monotonic(arr: list):\n    if all(arr[i] >= arr[i\
