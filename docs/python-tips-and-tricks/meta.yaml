    \ list comprehension to a generator in two categories:\n\n- 1. Speed of execution.\n\
    - 2. Memory allocation.\n\n## Conclusion\n\nList comprehension executes much faster\
    \ but takes up more memory. Generators execute a bit slower, but they take up\
    \ less memory since they only yield one item at a time.\n\n```python\nimport timeit\n\
    import sys\n\n# function to check time execution\ndef timer(_, code):\n    exc_time\
