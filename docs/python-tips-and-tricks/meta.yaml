    # 52 | The Round Function


    How do you easily round off a number in Python? Python has a built-in round function
    that handles such tasks. The syntax is:


    **round (number, number of digits)**


    The first parameter is the number to be rounded, and the second parameter is the
    number of digits a given number will be rounded to. That is the number of digits
    after the point. The second parameter is optional. Here is an example:


    ```

    num = 23.4567

    print(round(num, 2))

    Output:

    23.46

    ```


    You can see that we have two digits after the decimal point. If we didn''t pass
    the second parameter (2), the number would be rounded to 23.

    To round up or down a number, use the *ceil* and *floor* methods from the math
    module. The *ceil* rounds up a number to the nearest integer greater than the
    given number. The *floor* method rounds down a number to the nearest integer that
    is less than the given number.


    ```

    import math


    a = 23.4567

    # rounding up

    print(math.ceil(a))

    # rounding down

    print(math.floor(a))

    Output:

    24

    23

    ```'
