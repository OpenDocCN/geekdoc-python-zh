    ## 99 | 是否单调？\n\n如何检查一个数组是否是单调的？如果数组的元素按降序或升序排列，则该数组是单调的。例如，[4, 5, 5, 7] 是单调的。[4,\
    \ 10, 2, 5] 不是单调的。我们使用 all() 函数来检查数组中的数字是升序还是降序。如果它们是升序或降序，它将返回 True。如果不是，它将返回\
    \ False。\n\n```python\ndef check_monotonic(arr: list):\n    if all(arr[i] >= arr[i\
