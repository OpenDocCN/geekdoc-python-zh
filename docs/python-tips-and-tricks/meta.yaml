    # 95 | Factorial Using One Line


    We saw earlier how we can calculate the factorial of a number using a function.
    Do you know that you can write a one-line function that calculates the factorial
    of a number? To make this work, we are going to need the reduce function from
    *itertools* and the *lambda* function.


    ```

    from functools import reduce


    num = 7


    f = reduce(lambda a, b: a * b, range(1, num+1))

    print(f)

    Output:

    5040

    ```


    You can change the *num* variable to any integer number and it will still spit
    out a factorial of that number. Only one line of code—how cool is that? Let’s
    try 10.


    ```

    from functools import reduce


    num = 10


    f = reduce(lambda a, b: a * b, range(1, num+1))

    print(f)

    Output:

    3628800

    ```'
