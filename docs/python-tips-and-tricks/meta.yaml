    [2, 4, 6, 8, 10, 12]

    ```


    Please note that this is not the most efficient way to flatten a list. It is not
    easy to read. But it''s still pretty cool to know, right? 😉


    # Using reduce function


    Here is another cool trick you can use to flatten a two-dimensional list. This
    time we use `reduce` from functools module. This is another high order function
    in Python.


    ```

    from functools import reduce


    nested_list = [[2, 4, 6], [8, 10, 12]]


    new_list = reduce(lambda x, y: x+y, nested_list)

    print(new_list)

    Output:

    [2, 4, 6, 8, 10, 12]

    ```'
