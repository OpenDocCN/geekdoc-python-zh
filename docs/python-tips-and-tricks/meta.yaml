    \ a = sorted(arr, reverse=True)\n    return a[:5]\n\nresults = [12, 34, 67, 98,\
    \ 90, 68, 55, 54, 64, 35]\n\nprint(sort_list(results))\nOutput:\n[98, 90, 68,\
    \ 67, 64]\n```\n\n这很酷，但切片并不能使代码可读。有一个 Python 内置模块可以使用，它会让你的生活更轻松。它叫做 *heapq*。使用这个模块，我们可以轻松地使用\
    \ *nlargest* 方法返回 5 个最大的数字。该方法接受两个参数：可迭代对象和我们想要返回的数字个数。下面，我们传递 5，因为我们想从列表中返回五个最大的数字。\n\
    \n### 使用 nlargest\n\n```python\nimport heapq\n\nresults = [12, 34, 67, 98, 90,\
    \ 68, 55, 54, 64, 35]\nprint(heapq.nlargest(5, results))\nOutput:\n[98, 90, 68,\
    \ 67, 64]\n```\n\n### 使用 nsmallest\n\n```python\nimport heapq\n\nresults = [12,\
    \ 34, 67, 98, 90, 68, 55, 54, 64, 35]\nprint(heapq.nsmallest(5, results))\nOutput:\n\
    [12, 34, 35, 54, 55]\n```\n\n## 14 | 检查变位词\n\n你有两个字符串；你将如何检查它们是否是变位词？\n\n如果你想检查两个字符串是否是变位词，你可以使用\
    \ *collections* 模块中的 *counter()*。*counter()* 支持相等性测试。我们基本上可以用它来检查给定的对象是否相等。在下面的代码中，我们正在检查\
    \ *a* 和 *b* 是否是变位词。\n\n```python\nfrom collections import Counter\n\na = 'lost'\n\
    b = 'stol'\nprint(Counter(a)==Counter(b))\nOutput:\nTrue\n```\n\n我们也可以使用 *sorted()*\
    \ 函数来检查两个字符串是否是变位词。默认情况下，*sorted()* 函数会按升序对给定的字符串进行排序。因此，当我们传递字符串作为参数给 sorted\
