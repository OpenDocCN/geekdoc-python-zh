- md: "## 79 | Return Multiple Function Values\n\nBy default, a function returns one\
    \ value, and it stops. Below, we have 3 values in the *return* statement. When\
    \ we call the function, it returns a tuple of all three items.\n\n```python\n\
    def values():\n    return 1, 2, 3\n\nprint(values())\n# Output:\n# (1, 2, 3)\n\
    ```\n\nWhat if we want to return three separate values? How do we do it in Python?\
    \ We create a variable for each value we want to return. This makes it possible\
    \ to access each value separately. See the code below:\n\n```python\ndef values():\n\
    \    return 1, 2, 3\n\nx, y, z = values()\n\nprint(x)\nprint(y)\nprint(z)\n# Output:\n\
    # 1\n# 2\n# 3\n```\n\n## 80 | Download YouTube Videos\n\nPython makes it super\
    \ easy to download YouTube videos. With just a few lines of code, you will have\
    \ your favorite videos saved on your computer. The Python library that you need\
    \ to download videos is **pytube**. Install it with:\n\n```\npip install pytube\n\
    ```\n\nFirst, we import the module into our script. We then get the link to the\
    \ video we are trying to download.\n\n```python\nfrom pytube import YouTube\n\
    yt_video = YouTube(\"<video link>\")\n```\n\nNext, we set the type of file or\
    \ extension that we want to download and the resolution of the video.\n\n```python\n\
    v_file = yt_video.streams.filter(file_extension=\"mp4\")\\\n    .get_by_resolution(\"\
    360p\")\n```\n\nWe then download the file. You can also input the path where you\
    \ want the file to be saved.\n\n```python\nv_file.download(\"path to save file.\"\
    )\n```\n\n## 81 | Convert a String to a List\n\nIn Python, we can easily convert\
    \ a string to a list of strings. We can combine the *list()* function with the\
    \ *map()* function. The map function returns a map object, which is an iterator.\
    \ The *map()* function takes two arguments: a function and an iterable. Below,\
    \ the list is an iterable, and *str()* is the function. We then use the *list()*\
    \ function to return a list. The *split()* method divides or splits a string at\
    \ whitespaces.\n\n```python\ns = \"I love Python\"\nstr1 = list(map(str, s.split()))\n\
    print(str1)\n# Output:\n# ['I', 'love', 'Python']\n```\n\nYou can convert a list\
    \ of strings back to a string using the *map()* function in conjunction with the\
    \ *join()* method. Let's convert the output of the above code back to a string\
    \ using the *map()* and *join()* methods.\n\n```python\nlist1 = ['I', 'love',\
    \ 'Python']\nstr1 = ' '.join(map(str, list1))\nprint(str1)\n# Output:\n# I love\
    \ Python\n```\n\n## 82 | Loop Over Multiple Sequences\n\nWhat if you have two\
    \ sequences and you want to loop over them at the same time? How can you go about\
    \ it in Python? This is when the zip() function comes in handy. The zip() function\
    \ creates pairs of items in the sequences. The element at index one in sequence\
    \ one is paired with the element at index one in sequence two. This process repeats\
    \ for all the other indexes. Let's demonstrate how we can loop over two sequences\
    \ at the same time.\n\n```python\n# list one\nfirst_names = ['George', 'Keith',\
    \ 'Art']\n# list two\nlast_names = ['Luke', 'Sweat', 'Funnel']\n\nfor first, last\
    \ in zip(first_names, last_names):\n    print(first, last)\n\n# output:\n# George\
    \ Luke\n# Keith Sweat\n# Art Funnel\n```\n\nYou can see from the output that we\
    \ have combined the two lists using the zip() function. We have paired the first\
    \ names with the last names.\n\n## 83 | Extend vs. Append\n\nExtend and append\
    \ are both list methods. They both add elements to an existing list. The *append()*\
    \ method adds one (1) item to the end of the list, whereas the *extend()* method\
    \ does not. The *extend()* method adds multiple items to the end of the list.\
    \ Below, we use the *append()* method to append *numbers2* to *numbers1*. You\
    \ can see that the whole list of *numbers2* has been appended to numbers1 as one\
    \ (1) item.\n\n```python\nnumbers1 = [1, 2, 3]\nnumbers2 = [4, 5, 6]\n\n# using\
    \ append method\nnumbers1.append(numbers2)\nprint(numbers1)\n# Output:\n# [1,\
    \ 2, 3, [4, 5, 6]]\n```\n\nWhen we use the *extend()* method, notice the difference\
    \ from the *append()* method above. The *extend()* method takes the elements in\
    \ *numbers2*, and appends them to *numbers1*, one item at a time, not as a whole\
    \ list. See below:\n\n```python\nnumbers1 = [1, 2, 3]\nnumbers2 = [4, 5, 6]\n\n\
    # using extend method\nnumbers1.extend(numbers2)\nprint(numbers1)\n# Output:\n\
    # [1, 2, 3, 4, 5, 6]\n```\n\n## 84 | Memory and __slots__\n\nWhat are __slots__?\
    \ Slots are used in classes. They are basically attributes that an instance object\
    \ will have. Here is an example of slots in action:\n\n```python\nclass Cars:\n\
    \    __slots__ = [\"make\", 'brand']\n```\n\nWe expect every object in the Cars\
    \ class to have these attributes – make and brand.\n\nSo why use slots? We use\
    \ slots because they help save memory space. Class objects take up less space\
    \ when we use slots. See the difference in object size in the following examples:\n\
    \n```python\nimport sys\n\nclass Cars:\n    def __init__(self, make, brand):\n\
    \        self.make = make\n        self.brand = brand\n\nprint(f'The memory size\
    \ is {sys.getsizeof(Cars)}')\n# Output:\n# The memory size is 1072\n```\n\n###\
    \ Example 2\n\n```python\nclass Cars:\n    __slots__ = [\"make\", 'brand']\n\n\
    \    def __init__(self, make, brand):\n        self.make = make\n        self.brand\
    \ = brand\n\nprint(f'The memory size is {sys.getsizeof(Cars)}')\n# Output:\n#\
    \ The memory size is 904\n```\n\nYou can see from the outputs above that using\
    \ slots saves memory space.\n\n## 85 | Watermark Image with Python\n\nWith just\
    \ a few lines of code, we can watermark our images using Python. We are going\
    \ to use the pillow library for this task. Install the pillow module using:\n\n\
    ```\npip install pillow\n```\n\nFrom this library, we are going to import **ImageDraw**,\
    \ **ImageFont**, and **Image**.\n\nBelow is the image we are going to use for\
    \ demonstration from https://www.worldwildlife.org/\n\n![](img/18cae09c3dc47caa2996fe5aa9c10ef1_98_0.png)\n\
    \nLet’s now import the classes from the pillow module and write the code that\
    \ we need to watermark this image.\n\n```python\nfrom PIL import ImageDraw\nfrom\
    \ PIL import Image\nfrom PIL import ImageFont\n\n# Pass link to your image location\n\
    pic = Image.open('lion.jpeg')\n# make a copy of the pic\ndrawing = ImageDraw.Draw(pic)\n\
    # fill color for the font\nfill_color = (255, 250, 250)\n# watermark font\nfont\
    \ = ImageFont.truetype(\"arial.ttf\", 60)\n# watermark position\nposition = (0,\
    \ 0)\n# Writing text to picture\ndrawing.text(position, text='Lion is King',\n\
    \             fill=fill_color, font=font)\npic.show()\n# saving image\npic.save('watermarkedimg.jpg')\n\
    ```\n\nAfter running this code, we get a watermarked image below:\n\n![](img/18cae09c3dc47caa2996fe5aa9c10ef1_99_0.png)\n\
    \n## 86 | Extracting Zip Files\n\nPython has a module that you can use to extract\
    \ zip files. This is an in-built module, so we do not have to install it. If the\
    \ file is in the same directory as the Python script, we just pass the file name\
    \ to the code. We use the *with* statement to open the file. This will ensure\
    \ that the file is automatically closed at the end of the operation. We open the\
    \ file in read mode because we just want to read the contents of the file. The\
    \ *printdir()* method returns all the content of the file we are extracting. The\
    \ *extractall()* method extracts all the files in the zip file.\n\n```python\n\
    from zipfile import ZipFile\n\n# open file in read mode\nwith ZipFile('file.zip',\
    \ 'r') as zipFile:\n    print('printing the contents of the zip file')\n    zipFile.printdir()\n\
    \    # Extracting zip files\n    zipFile.extractall()\n```\n\nUse this simple\
    \ code to extract your zip files.\n\n## 87 | Generate Dummy Data\n\nYou can generate\
    \ fake data using Python. Python has a library called Faker that generates different\
    \ types of data. Install Faker by:\n\n```\npip install Faker\n```\n\nLet's say\
    \ we want to generate a random list of Ten countries, here is how we do it:\n\n\
    ```python\nfrom faker import Faker\n\nfake = Faker()\n\nfor i in range(20):\n\
    \    print(fake.country())\n```\n\n```\n# output:\n# Cameroon\n# Tajikistan\n\
    # Ethiopia\n# Liechtenstein\n# Netherlands\n# Grenada\n# Switzerland\n# Singapore\n\
    # Estonia\n# San Marino\n# Malaysia\n# New Zealand\n# Azerbaijan\n# Monaco\n#\
    \ British Indian Ocean Territory (Chagos Archipelago)\n# Brazil\n# Austria\n#\
    \ Saint Barthelemy\n# Zimbabwe\n# Korea\n```\n\nSince this is random, every time\
    \ you run it, it will generate a different list of countries."
