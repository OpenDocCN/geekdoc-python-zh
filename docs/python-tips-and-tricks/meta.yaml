    \ flatten a list. The first method employs a *for* loop, the second employs the\
    \ *itertools* module, and the third employs *list comprehension*.\n\n```python\n\
    list1 = [[1, 2, 3],[4, 5, 6]]\n\nnewlist = []\nfor list2 in list1:\n    for j\
    \ in list2:\n        newlist.append(j)\nprint(newlist)\nOutput:\n[1, 2, 3, 4,\
    \ 5, 6]\n```\n\n### Using itertools\n\n```python\nimport itertools\n\nlist1 =\
    \ [[1, 2, 3],[4, 5, 6]]\n\nflat_list = list(itertools.chain.from_iterable(list1))\n\
    print(flat_list)\nOutput:\n[1, 2, 3, 4, 5, 6]\n```\n\n### Using list comprehension\n\
    \nIf you do not want to import *itertools* or the normal for loop, you can just\
    \ use list comprehension.\n\n```python\nlist1 = [[1, 2, 3], [4, 5, 6]]\n\nflat_list=\
    \ [i for j in list1 for i in j]\nprint(flat_list)\nOutput:\n[1, 2, 3, 4, 5, 6]\n\
    ```\n\n## 9 | Index of the Biggest Number\n\nUsing the *enumerate()*, *max()*,\
    \ and *min()* functions, we can find the index of the biggest and the smallest\
    \ number in a list. The max function is a high-order function; it takes another\
    \ function as an argument.\n\nIn the code below, the *max()* function takes the\
    \ list and the lambda function as arguments. We add the *enumerate()* function\
    \ to the list so it can return both the number in the list and its index (a tuple).\
    \ We set the count in the enumerate function to start at position zero (0). The\
    \ lambda function tells the function to return a tuple pair of the maximum number\
    \ and its index.\n\n### Find the index of the largest number\n\n```python\nx =\
    \ [12, 45, 67, 89, 34, 67, 13]\n\nmax_num = max(enumerate(x, start=0),\n     \
    \         key = lambda x: x[1])\nprint('The index of the largest number is',\n\
    \      max_num[0])\n```\n\nOutput:\nThe index of the biggest number is 3\n\n###\
    \ Finding the index of the smallest number\n\nThis is similar to the *max()* function,\
    \ only that we are now using the *min()* function.\n\n```python\nx = [12, 45,\
    \ 67, 89, 34, 67, 13]\n\nmin_num = min(enumerate(x, start=0),\n              key\
    \ = lambda x : x[1])\nprint('The index of the smallest number is',\n      min_num[0])\n\
    ```\n\nOutput:\nThe index of the smallest number is 0\n\n## 10 | Absolute Value\
    \ of a Number\n\nLet's say you have a negative number and you want to return the\
    \ absolute value of that number; you can use the `abs()` function. The Python\
    \ `abs()` function is used to return the absolute value of any number (positive,\
    \ negative, and complex numbers). Below, we demonstrate how we can return a list\
    \ of absolute numbers from a list of numbers that have negative and positive numbers.\
    \ We use list comprehension.\n\n```python\nlist1 = [-12, -45, -67, -89, -34, 67,\
    \ -13]\nprint([abs(num) for num in list1])\n\n**Output:**\n\n[12, 45, 67, 89,\
    \ 34, 67, 13]\n```\n\nYou can also use the `abs()` function on a floating number,\
    \ and it will return the absolute value. See below:\n\n```python\na = -23.12\n\
    print(abs(a))\n\n**Output:**\n\n23.12\n```\n\nWhen you use it on a complex number,\
    \ it returns the magnitude of that number. See below:\n\n```python\ncomplex_num\
    \ = 6 + 3j\nprint(abs(complex_num))\n\n**Output:**\n\n6.708203932499369\n```\n\
    \n## 11 | Adding a Thousand Separator\n\nIf you are working with large figures\
    \ and you want to add a separator to make them more readable, you can use the\
    \ *format()* function. See the example below:\n\n```python\na = [10989767, 9876780,\
    \ 9908763]\n\nnew_list =['{:,}'.format(num) for num in a]\nprint(new_list)\nOutput:\n\
    ['10,989,767', '9,876,780', '9,908,763']\n```\n\nWe can also use f-strings to\
    \ add a thousand separators. Notice below that instead of using a comma (,) as\
    \ a separator, we are using an underscore (_).\n\n```python\na = [10989767, 9876780,\
    \ 9908763]\n\nnew_list =[f\"{num:_}\" for num in a]\nprint(new_list)\nOutput:\n\
    ['10_989_767', '9_876_780', '9_908_763']\n```\n\nHave you noticed that we are\
    \ using list comprehension to add the separator on both occasions? Cool thing,\
    \ right? \U0001F60A.\n\nLater on, we'll look at another method for adding a thousand\
    \ separator.\n\n## 12 | Startswith and Endswith Methods\n\nThe *startswith()*\
    \ and *endswith()* are string methods that return True if a specified string starts\
    \ with or ends with a specified value.\nLet's say you want to return all the names\
    \ in a list that start with \"a.\"; here is how you would use *startswith()* to\
    \ accomplish that.\n\n### Using startswith()\n\n```python\nlist1 = ['lemon','Orange',\n\
    \         'apple', 'apricot']\n\nnew_list = [i for i in list1 if i.startswith('a')]\n\
    print(new_list)\nOutput:\n['apple', 'apricot']\n```\n\n### Using endswith()\n\n\
    ```python\nlist1 = ['lemon','orange',\n         'apple', 'apricot']\n\nnew_list\
    \ = [i for i in list1 if i.endswith('e')]\nprint(new_list)\nOutput:\n['Orange',\
    \ 'apple']\n```\n\nNotice that for both examples above, we are using list comprehension.\n\
    \n## 13 | Nlargest and Nsmallest\n\nLet's say you have a list of numbers and you\
    \ want to return the five largest numbers or the five smallest numbers from that\
    \ list. Normally, you can use the *sorted()* function and list slicing, but they\
    \ only return a single number.\n\n```python\ndef sort_list(arr: list):\n    a\
    \ = sorted(arr, reverse=True)\n    return a[:5]\n\nresults = [12, 34, 67, 98,\
    \ 90, 68, 55, 54, 64, 35]\n\nprint(sort_list(results))\nOutput:\n[98, 90, 68,\
    \ 67, 64]\n```\n\nThis is cool, but slicing does not make code readable. There\
    \ is a Python built-in module that you can use that will make your life easier.\
    \ It is called *heapq*. With this module, we can easily return the 5 largest numbers\
    \ using the *nlargest* method. The method takes two arguments: the iterable object\
    \ and the number of numbers we want to return. Below, we pass 5, because we want\
    \ to return the five largest numbers from the list.\n\n### Using nlargest\n\n\
    ```python\nimport heapq\n\nresults = [12, 34, 67, 98, 90, 68, 55, 54, 64, 35]\n\
    print(heapq.nlargest(5, results))\nOutput:\n[98, 90, 68, 67, 64]\n```\n\n### Using\
    \ nsmallest\n\n```python\nimport heapq\n\nresults = [12, 34, 67, 98, 90, 68, 55,\
    \ 54, 64, 35]\nprint(heapq.nsmallest(5, results))\nOutput:\n[12, 34, 35, 54, 55]\n\
    ```\n\n## 14 | Checking for Anagram\n\nYou have two strings; how would you go\
    \ about checking if they are anagrams?\n\nIf you want to check if two strings\
    \ are anagrams, you can use *counter()* from the *collections* module. The *counter()*\
    \ supports equality tests. We can basically use it to check if the given objects\
    \ are equal. In the code below, we are checking if *a* and *b* are anagrams.\n\
    \n```python\nfrom collections import Counter\n\na = 'lost'\nb = 'stol'\nprint(Counter(a)==Counter(b))\n\
    Output:\nTrue\n```\n\nWe can also use the *sorted()* function to check if two\
    \ strings are anagrams. By default, the *sorted()* function will sort a given\
    \ string in ascending order. So, when we pass strings as arguments to the sorted\
    \ function for equality tests, first the strings are sorted, then compared. See\
    \ the code below:\n\n```python\na = 'lost'\nb = 'stol'\n\nif sorted(a)== sorted(b):\n\
    \    print('Anagrams')\nelse:\n    print(\"Not anagrams\")\noutput:\nAnagrams\n\
    ```\n\n## 15 | Checking Internet Speed\n\nDid you know that you can check internet\
    \ speed with Python?\nThere is a module called *speedtest* that you can use to\
    \ check the speed of your internet. You will have to install it with pip.\n\n\
    ```\npip install speedtest-cli\n```\n\nSince the output of speedtest is in bits,\
    \ we divide it by 8000000 to get the results in mb. Go on, test your internet\
    \ speed using Python.\n\n### Checking download speed\n\n```python\nimport speedtest\n\
    \nd_speed = speedtest.Speedtest()\nprint(f'{d_speed.download()/8000000:.2f}mb')\n\
    Output:\n213.78mb\n```\n\n### Checking upload speed\n\n```python\nimport speedtest\n\
    \nup_speed = speedtest.Speedtest()\nprint(f'{up_speed.upload()/8000000:.2f}mb')\n\
    Output:\n85.31mb\n```\n\n## 16 | Python Reserved keywords\n\nIf you want to know\
    \ the reserved keywords in Python, you can use the *help()* function. **Remember,\
    \ you cannot use any of these words as variable names.** Your code will generate\
    \ an error.\n\n```python\nprint(help('keywords'))\n```\n\nOutput:\nHere is a list\
    \ of the Python keywords. Enter any keyword to get more help.\n\n```\nFalse  \
    \                 class                   from\n    or\nNone                 \
    \   continue                global\n    pass\nTrue                    def    \
    \                 if\n    raise\nand                     del                 \
    \    import\n    return\nas                      elif                    in\n\
    \    try\nassert                  else                    is\n    while\nasync\
    \                   except                  lambda\n    with\nawait          \
    \         finally                 nonlocal\n    yield\nbreak                 \
    \  for                     not\n\nNone\n```"
