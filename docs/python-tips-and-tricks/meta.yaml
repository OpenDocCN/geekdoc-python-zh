    # 69 | Two Lists into a Dict


    Sometimes, while working with lists, you may want to change the data type to a
    dictionary. That is, you may want to combine the lists into a dictionary. To do
    this, you may have to use the `zip()` function and the `dict()` function. The
    `zip()` function takes two iterables and pairs the elements. The first element
    in iterable one is paired with the first element in iterable two, and the second
    element with another second element, etc. The `zip()` function returns an iterator
    of tuples. The `dict()` function will convert the paired elements into a key-value
    combination, creating a dictionary.


    ```

    list1 = [''name'', ''age'', ''country'']

    list2 = [''Yoko'', 60, ''Angola'']


    dict1 = dict(zip(list1,list2))

    print(dict1)

    Output:

    {''name'': ''Yoko'', ''age'': 60, ''country'': ''Angola''}

    ```


    If an element in the list cannot be paired with another element, then it will
    be left out. Let''s say **list1** has four elements and **list2** has five; the
    fifth item in list2 will be left out. You can see below that "Luanda" has been
    left out.


    ```

    list1 = [''name'', ''age'', ''country'']

    list2 = [''Yoko'', 60, ''Angola'', "Luanda"]


    dict1 = dict(zip(list1,list2))

    print(dict1)

    Output:

    {''name'': ''Yoko'', ''age'': 60, ''country'': ''Angola''}

    ```'
- md: "## 70 | Finding Permutations of a string\n\nPermutations of a string are different\
    \ orders in which we can arrange the elements of the string. For example, given\
    \ an \"ABC\" string, we can rearrange it into [\"ABC\", \"ACB\", \"BAC\", \"BCA\"\
    , \"CAB\", \"CBA\"]. In Python, the easiest way to find permutations of a string\
    \ is to use *itertools*. Itertools has a permutation class. Here is how we can\
    \ do it, using itertools.\n\n```python\nfrom itertools import permutations\n\n\
    def get_permutations(s: str):\n    arr = []\n    for i in permutations(s):\n \
    \       arr.append(''.join(i))\n    return arr\n\nprint(get_permutations('ABC'))\n\
    ```\n\nOutput:\n['ABC', 'ACB', 'BAC', 'BCA', 'CAB', 'CBA']\n\nAnother way to do\
    \ it.\n\n```python\ndef find_permute(string, j):\n    if len(string) == 0:\n \
    \       print(j, end=\" \")\n\n    for i in range(len(string)):\n        char\
    \ = string[i]\n        s = string[0:i] + string[i + 1:]\n        find_permute(s,\
    \ j + char)\n    return j\n\nprint(find_permute('ABC', ''))\n```\n\nOutput:\n\
    ABC ACB BAC BCA CAB CBA\n\n## 71 | Unpacking a List\n\nSometimes you want to unpack\
    \ a list and assign the elements to different variables. Python has a method that\
    \ you can use to make your life easier. We can use the Python unpacking operator,\
    \ asterisk (*). Below is a list of names. We want to get the boy's name and assign\
    \ it to the variable \"boy_name.\" The rest of the names will be assigned to the\
    \ variable \"girls_name.\" So, we assign (unpack from the list) the first item\
    \ on the list to the boy variable. We then add \"*\" to the **girls_name** variable.\
    \ By adding * to the girl's name, we are basically telling Python that once it\
    \ unpacks the male name, all the other remaining names must be assigned to the\
    \ **girls_name** variable. See the output below:\n\n```python\nnames = ['John',\
    \ 'Mary', 'Lisa', 'Rose']\n\nboy_name, *girls_name = names\nprint(boy_name)\n\
    print(girls_name)\n```\n\nOutput:\nJohn\n['Mary', 'Lisa', 'Rose']\n\nIf the name\
    \ \"John\" was at the end of the list, we would put the name with the asterisk\
    \ at the beginning. See below:\n\n```python\nnames = ['Rose', 'Mary', 'Lisa',\
    \ 'John']\n\n*girls, boy = names\nprint(boy)\nprint(girls)\n```\n\nOutput:\nJohn\n\
    ['Rose', 'Mary', 'Lisa']\n\n## 72 | Type Hints\n\nPython provides a way to give\
    \ hints on what type of argument is expected in a function or what data type a\
    \ function should return. These are called \"type hints.\" Here is an example\
    \ of how typing hints are used.\n\n```python\ndef translate(s: str) -> bool:\n\
    \    if s:\n        return True\n```\n\nHere we have a simple function. Notice\
    \ that the function has one parameter, **s**. The \"str\" after the s parameter\
    \ is a typing hint. It simply means that the function expects (or hints) that\
    \ the argument that should be passed for parameter \"s\" must be a string. Notice\
    \ the \"-> bool\" at the end? This is another typing hint. It hints that it expects\
    \ the return value of the function to be a Boolean value. Now, hints are not enforced\
    \ at runtime by Python; that means that if a non-string argument is passed and\
    \ a non-Boolean value is returned by the function, the code will run just fine.\n\
    \nWhy type hints? Type hints simply help to make the code more readable and more\
    \ descriptive. By just looking at the hint annotations, a developer will know\
    \ what is expected of the function.\n\n## 73 | File Location\n\nDo you want to\
    \ know the directory of your Python file? Use the **os** module. The **os** module\
    \ has a **getcwd()** method that returns the location of the directory. Simply\
    \ type:\n\n```python\nimport os\ndirectory_path = os.getcwd()\nprint(directory_path)\n\
    ```\n\nThis code will return the location of the current working directory.\n\n\
    ## 74 | Python Deque\n\nIf you want to add and pop elements from both sides of\
    \ a list, you can use deque (double-ended queue). Unlike a normal list that lets\
    \ you add and remove elements from one end, deque allows you to add and remove\
    \ elements from both the left and right sides of the list. This makes it quite\
    \ handy if one has a big stack. Deque is found in the *collections* module. In\
    \ the example below, see how we are able to append elements at both ends of the\
    \ list.\n\n```python\nfrom collections import deque\n\narr = deque([1, 3])\n#\
    \ appending on the left end of the list\narr.appendleft(5)\n# appending on the\
