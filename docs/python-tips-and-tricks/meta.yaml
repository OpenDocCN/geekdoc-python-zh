    \ Below, I compare list comprehension to a generator in two categories:\n\n+ \
    \  1. Speed of execution.\n2. Memory allocation.\n\n# Conclusion\n\nList comprehension\
    \ executes much faster but takes up more memory. Generators execute a bit slower,\
    \ but they take up less memory since they only yield one item at a time.\n\n```\n\
    import timeit\nimport sys\n\n# function to check time execution\ndef timer(_,\
    \ code):\n    exc_time = timeit.timeit(code, number=1000)\n    return f'{_}: execution\
    \ time is {exc_time:.2f}'\n\n# function to check memory allocation\ndef memory_size(_,\
    \ code):\n    size = sys.getsizeof(code)\n    return f'{_}: allocated memory is\
    \ {size}'\n\none = 'Generator'\ntwo = 'list comprehension'\n\nprint(timer(one,\
    \ 'sum((num**2 for num in range(10000)))'))\nprint(timer(two, 'sum([num**2 for\
    \ num in range(10000)])'))\nprint(memory_size(one,(num**2 for num in range(10000))))\n\
    print(memory_size(two,[num**2 for num in range(10000)]))\nOutput:\nGenerator:\
    \ execution time is 5.06\nlist comprehension: execution time is 4.60\nGenerator:\
    \ allocated memory is 112\nlist comprehension: allocated memory is 85176\n```"
