  md: "# 92 | Concatenation vs. Join\n\nThere are two ways you can join strings in\
    \ Python. The first way is by using concatenation (basically joining strings using\
    \ the + operator). The second way is to use the string method, join(). Let’s find\
    \ out which one is faster. We are going to use perf_counter from the time module\
    \ to time the runtime of our codes.\n\n```\na = 'Hello'\nb = 'Python'\nc = 'world'\n\
    f = 'People'\n# Using concatenation\nstart = time.perf_counter()\nfor _ in range(10000):\n\
    \    d = a + b + c + f\nend = time.perf_counter()\nprint(f'concatenation time\
    \ is {end - start:.5f}')\nOutput:\nconcatenation time is 0.00311\n```\n\n# Using\
    \ the Join method\n\n```\na = 'Hello'\nb = 'Python'\nc = 'world'\nf = 'People'\n\
    # using the join method\nstart = time.perf_counter()\nfor _ in range(10000):\n\
    \    d = ''.join([a, b, c, f])\nend = time.perf_counter()\nprint(f'joining time\
    \ is {end - start:.5f}')\nOutput:\njoining time is 0.00290\n```\n\nYou can see\
    \ from the outputs that the join() method is faster than concatenation. If you\
    \ want faster code, use the join() method. However, you should note that the join()\
    \ method executes faster when you have more strings to join (more than 3 strings,\
    \ at least). The concatenation method executes slower"
