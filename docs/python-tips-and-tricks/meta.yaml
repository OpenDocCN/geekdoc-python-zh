    \ return f'The factorial of number is {f}'\n```\n\n```python\nprint(factorial_number(8))\n\
    ```\n\noutput:\nThe factorial of number is 40320\n\n## 90 | List of Prime Numbers\n\
    \nGiven a number, can you write a code that returns a list of all the prime numbers\
