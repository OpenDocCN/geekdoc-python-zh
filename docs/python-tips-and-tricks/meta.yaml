  md: '# 32 | Flatten Nested List


    What is a nested list? A nested list is a list that has another list as an element
    (a list inside a list). You can flatten a nested list using the `sum()` function.
    Note that this will work on a two-dimensional nested list.


    ```

    nested_list = [[2, 4, 6],[8, 10, 12]]


    new_list = sum(nested_list,[])

    print(new_list)

