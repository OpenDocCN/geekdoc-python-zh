    # 48 | Sorted by Pprint


    Did you know that you can print out a sorted dictionary using the pprint module?
    Below, we use the module to print out a dictionary in ascending order. The dictionary
    is sorted by key.


    ```

    import pprint


    a = {''c'': 2, ''b'': 3, ''y'': 5, ''x'': 10}


    pp = pprint.PrettyPrinter(sort_dicts=True)

    pp.pprint(a)

    Output:

    {''b'': 3, ''c'': 2, ''x'': 10, ''y'': 5}

    ```


    Please note that pprint does not change the order of the actual dictionary; it
    just changes the printout order.


    # Insert underscore


    Pprint can also be used to insert a thousand separator into numbers. Pprint will
    insert an underscore as a thousand separator. It has a parameter called underscore_numbers.
    All we have to do is set it to True. See the code below:


    ```

    import pprint


    arr = [1034567, 1234567, 1246789, 12345679, 987654367]


    pp = pprint.PrettyPrinter(underscore_numbers=True)

    pp.pprint(arr)

    Output:

    [1_034_567, 1_234_567, 1_246_789, 12_345_679, 987_654_367]

    ```'
