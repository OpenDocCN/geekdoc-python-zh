    ## 10 | 数的绝对值\n\n假设你有一个负数，你想返回该数的绝对值；你可以使用 `abs()` 函数。Python 的 `abs()` 函数用于返回任何数字（正数、负数和复数）的绝对值。下面，我们演示如何从一个包含正数和负数的数字列表中返回一个绝对值列表。我们使用列表推导式。\n\
    \n```python\nlist1 = [-12, -45, -67, -89, -34, 67, -13]\nprint([abs(num) for num\
