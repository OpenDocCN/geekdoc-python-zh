  md: "# # 1 | Printing Horizontally\n\nWhen looping over an iterable, the print function\
    \ prints each item on a new line. This is because the print function has a parameter\
    \ called end. By default, the end parameter has an escape character (end = \"\\\
    n\"). Now, to print horizontally, we need to remove the escape character and replace\
    \ it with an empty string (end = \"\"). In the code below, take note of the space\
    \ between the commas (\" \"); this is to ensure that the numbers are printed with\
    \ spaces between them. If we remove the space (\"\"), the numbers will be printed\
    \ like this: 1367. Here is the code to demonstrate that:\n\n```\npython\nlist1\
    \ = [1, 3, 6, 7]\n\nfor number in list1:\n    print(number, end= \" \")\n```\n\
    \noutput:\n1 3 6 7\n\nThe print function has another parameter called **sep**.\
    \ We use *sep* to specify how the output is separated. Here is an example:\n\n\
    ```\npython\nprint('12','12','1990', sep='/')\n```\n\nOutput:\n12/12/1990"
  merge: -1
  pgno: 10
- img_proc: true
  md: "# 2 | Merging Dictionaries\n\nIf you have two dictionaries that you want to\
    \ combine, you can do so using two easy methods. You can use the merge ( | ) operator\
    \ or the (**) operator. Below, we have two dictionaries, a and b. We are going\
    \ to use these two methods to combine the dictionaries. Here are the codes below:\n\
    \n# Method 1\n\nUsing the merge ( | ) operator.\n\n```\nname1 = {\"kelly\": 23,\n\
