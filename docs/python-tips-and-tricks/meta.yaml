    \ = max(a, key = a.count)\nprint(f'The most frequent letter is, '\n      f'{most_frequent}')\n\
    \noutput\nThe most frequent letter is, s\n```\n\n现在，如果字符串中有多个出现频率最高的项目，`max()`\
    \ 函数将返回按字母顺序排在最前面的元素。例如，如果上面的字符串有 4 个 F 和 4 个 S，`max` 函数将返回 \"f\" 而不是 \"s\" 作为出现频率最高的元素，因为\
