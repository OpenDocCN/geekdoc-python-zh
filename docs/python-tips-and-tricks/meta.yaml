    \ - start:.5f}')\n输出：\n连接时间是 0.00290\n```\n\n从输出中你可以看到，join() 方法比拼接更快。如果你想要更快的代码，请使用\
    \ join() 方法。但是，你应该注意，当你有更多字符串要连接时（至少超过 3 个字符串），join() 方法执行得更快。拼接方法执行较慢，因为每次拼接时，Python\
    \ 都必须创建一个字符串并分配内存。这会减慢过程。但通过使用 `join()` 方法，Python 只创建一个字符串。这使得过程快得多。尝试运行代码并记录你的发现。请注意，你的执行时间将与我的输出不同。\n\
    \n## 93 | 递归限制\n\n你想知道 Python 中的递归限制吗？你可以使用 **sys** 模块。以下是代码：\n\n```python\nimport\
    \ sys\nprint(sys.getrecursionlimit())\n输出：\n1000\n```\n\n1000 是 Python 中的默认递归限制。Python\
    \ 设置此限制是为了防止堆栈溢出。但是，Python 也提供了一种方法来更改递归限制以适应你的需求。以下是你如何调整限制。\n\n```python\nimport\
    \ sys\nsys.setrecursionlimit(1200)\nprint(sys.getrecursionlimit())\n输出：\n1200\n\
    ```\n\n你可以看到限制已从 1000 更改为 1200。所以，如果你遇到最大递归深度错误，只需进行调整即可。"
