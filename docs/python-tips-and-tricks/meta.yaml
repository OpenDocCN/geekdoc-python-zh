    print(str_counta)\n\nOutput:\n[(0, 's'), (1, 't'), (2, 'r'), (3, 'i'), (4, 'n'),\
    \ (5, 'g')]\n```\n\n## 30 | Create Class Using Type Function\n\nThe type() function\
