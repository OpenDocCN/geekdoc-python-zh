    \ import itemgetter\n\nd = [{\"school\":\"yale\", \"city\": \"Beijing\"},\n  \
    \   {\"school\":\"cat\", \"city\": \"Cairo\"}]\n\nsorted_list = sorted(d, key=itemgetter('school'))\n\
    print(sorted_list)\n# 输出：\n# [{'school': 'cat', 'city': 'Cairo'}, {'school': 'yale',\
    \ 'city': 'Beijing'}]\n```\n\n上面的示例按**升序**对列表进行排序。如果你想按**降序**对列表进行排序，则需要将 sorted\
