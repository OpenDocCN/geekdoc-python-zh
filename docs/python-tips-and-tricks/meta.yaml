  md: "# 9 | Index of the Biggest Number\n\nUsing the *enumerate()*, *max()*, and\
    \ *min()* functions, we can find the index of the biggest and the smallest number\
    \ in a list. The max function is a high-order function; it takes another function\
    \ as an argument.\n\nIn the code below, the *max()* function takes the list and\
    \ the lambda function as arguments. We add the *enumerate()* function to the list\
    \ so it can return both the number in the list and its index (a tuple). We set\
    \ the count in the enumerate function to start at position zero (0). The lambda\
    \ function tells the function to return a tuple pair of the maximum number and\
    \ its index.\n\n# Find the index of the largest number\n\n```\nx = [12, 45, 67,\
    \ 89, 34, 67, 13]\n\nmax_num = max(enumerate(x, start=0),\n              key =\
    \ lambda x: x[1])\nprint('The index of the largest number is',\n      max_num[0])\n\
    ```\n\nOutput:\nThe index of the biggest number is 3\n\n# Finding the index of\
    \ the smallest number\n\nThis is similar to the *max()* function, only that we\
    \ are now using the *min()* function.\n\n```\nx = [12, 45, 67, 89, 34, 67, 13]\n\
    \nmin_num = min(enumerate(x, start=0),\n              key = lambda x : x[1])\n\
    print('The index of the smallest number is',\n      min_num[0])\n```\n\nOutput:\n\
    The index of the smallest number is 0"
