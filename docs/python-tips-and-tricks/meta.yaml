    \ Return vs Yield\n\nDo you understand the distinction between a return statement\
    \ and a yield statement in a function? The return statement returns one element\
    \ and ends the function. The yield statement returns a \"package\" of elements\
    \ called a generator. You have to \"unpack\" the package to get the elements.\
    \ You can use a for loop or the *next()* function to unpack the generator.\n\n\
    **Example 1: Using return statement**\n\n```python\ndef num(n: int) -> int:\n\
    \    for i in range(n):\n        return i\n\nprint(num(5))\n```\n\nOutput:\n```\n\
    0\n```\n\nYou can see from the output that once the function returns **0**, it\
    \ stops. It does not return all the numbers in the range.\n\n**Example 2: Using\
    \ yield**\n\n```python\ndef num(n: int):\n    for i in range(n):\n        yield\
    \ i\n\n# creating a generator\ngen = num(5)\n\n# unpacking generator\nfor i in\
    \ gen:\n    print(i, end=' ')\n```\n\nOutput:\n```\n0 1 2 3 4\n```\n\nThe yield\
    \ function returns a \"package\" of all the numbers in the range. We use a *for\
