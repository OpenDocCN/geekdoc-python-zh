    \ shift_direction = ‘left’ ⇒ left direction shift |\n| [out] | state2 | It is\
    \ the translationally shifted quantum state of the state vec |\n\n### Implementation\n\
    \n```\ndef rstate_shift(self,vec,shift=1,shift_direction='right'):\n    \"\"\"\
    \n    Shifting of a real quantum state\n    Inputs:\n        vec: real quantum\
