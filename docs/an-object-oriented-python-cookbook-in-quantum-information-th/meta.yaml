    There is a term called participation ratio which is also related to purity of
    state and it is defined as,


    $$PR = \frac{1}{Tr(\rho^2)}.$$


    $PR$ is interpreted as the effective number of pure states entering to form the
    mixture. We have given an example of finding the participation ratio for $\mathbb{I}/2$.


    ```

    import numpy as np


    # Constructing the matrix, $\mathbb{I}/2$

    identity_matrix = np.zeros([2,2],dtype=''float64'')

    identity_matrix[0,0]=0.5

    identity_matrix[1,1]=0.5


    # Calculating the value $PR = \frac{1}{Tr(\rho^2)}$

    PR = 1/np.trace(np.matmul(identity_matrix,identity_matrix))


    print(f"The participation ratio is = {PR}")

