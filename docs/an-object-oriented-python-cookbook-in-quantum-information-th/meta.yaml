  md: '# An Object-Oriented Python Cookbook in Quantum Information Theory and Quantum
    Computing


    This first-of-a-kind textbook provides computational tools in state-of-the-art
    OOPs Python that are fundamental to quantum information, quantum computing, linear
    algebra and one-dimensional spin half condensed matter systems. Over 104 subroutines
    are included, and the codes are aided by mathematical comments to enhance clarity.
    Suitable for beginner and advanced readers alike, students and researchers will
    find this textbook to be a helpful guide and a compendium which they can readily
    use.


    **Features**


    +   - Includes over 104 codes in OOPs Python, all of which can be used either
    as a standalone program or integrated with any other main program without any
    issues.

    - Every parameter in the input, output and execution has been provided while keeping
    both beginner and advanced users in mind.

    - The output of every program is explained thoroughly with detailed examples.

    - Detailed mathematical commenting is done alongside the code which enhances clarity
    about the flow and working of the code.


    **Dr. M. S. Ramkarthik** works as an assistant professor at the Visvesvaraya National
    Institute of Technology, Nagpur. His interests are in the fields of theoretical
    physics, especially in quantum computing, quantum information and mathematical
    and numerical methods in physics. He likes teaching students at all levels. He
    is also interested in designing and implementing novel and conceptual methods
    of teaching physics, making it more palatable and interesting for students. He
    has also authored the book *Numerical Recipes in Quantum Information Theory and
    Quantum Computing: An Adventure in FORTRAN 90* published by CRC Press in September
    2021. He is a computer enthusiast and interested in solving mathematical and physics
    problems using various programming languages.


    **Dr. Pranay Barkataki** is currently a Research Analyst in Sony R&D, Bengaluru,
    where he is working as a data analyst. He has completed his Ph.D. under the supervision
    of Dr. M. S. Ramkarthik in the field of quantum entanglement and quantum many-body
    physics. His research interests are in theoretical physics as well as machine
    learning and AI.'
