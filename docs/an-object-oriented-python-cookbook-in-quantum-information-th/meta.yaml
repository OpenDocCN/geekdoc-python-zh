  mdcn: "## 5.2 部分转置\n\n部分转置 [88, 93] 是在检查给定密度矩阵可分性时一个非常重要的操作。有许多可分性测试使用部分转置来检查给定的量子态是可分的还是不可分的。最著名的可分性测试是佩雷斯-霍罗德斯基部分转置正性（PPT）判据\
    \ [88, 94]。根据该判据，如果一个态是可分的，那么部分转置后的密度矩阵是一个正矩阵。文献 [95] 中提出了另一个类似的判据，该判据指出，对于一个态是可分的，其部分转置密度矩阵的行列式应为正。上述讨论显示了部分转置在量子纠缠研究领域的重要性。让我们以希尔伯特空间\
    \ $H = H_A \\otimes H_B$ 中的双体复合系统为例，复合系统对应的密度矩阵为 $\\rho_{AB}$。我们可以将 $\\rho_{AB}$\
    \ 的矩阵元写为\n\n$$\\rho_{AB} = \\sum_{ijkl} r_{ik;jl} |i, j\\rangle\\langle k, l|\
    \ \\equiv \\sum_{ijkl} r_{ik;jl} (|i\\rangle\\langle k|)_A \\otimes (|j\\rangle\\\
    langle l|)_B. \\qquad (5.5)$$\n\n在上述方程中，指标 $i,k$ 是子系统 $A$ 的希尔伯特空间 $H_A$ 中的基态，$j,l$\
    \ 是子系统 $B$ 的希尔伯特空间 $H_B$ 中的基态。这里 $r_{ik;jl}$ 是矩阵元。$\\rho_{AB}$ 关于系统 $B$ 的部分转置由下式给出，\n\
    \n$$\\rho_{AB}^{T_B} = \\sum_{ijkl} r_{ik;jl} (|i\\rangle\\langle k|)_A \\otimes\
    \ (|l\\rangle\\langle j|)_B. \\tag{5.6}$$\n\n当然，$\\rho_{AB}^{T_A}$ 也可以使用上述方法轻松求得。为了更深入地理解部分转置的数学运算，我们定义了一个双量子比特密度矩阵\n\
    \n$$\\rho_{AB} = \\begin{pmatrix} a_{11} & a_{12} & a_{13} & a_{14} \\\\ a_{21}\
