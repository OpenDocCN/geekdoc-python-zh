    \n## 2.9 十进制转二进制\n\n要将整数 $n$ 转换为二进制字符串，我们采用以下算法：\n\n1.  将整数 $n$ 除以2。\n2.  将步骤1的余数存储为二进制字符串的最低有效位。\n\
    3.  将上一步得到的商除以2，将余数赋值为次低有效位。\n4.  重复此过程，直到商为零。\n\n最后的余数将是二进制字符串的最高有效位。\n\n```\n\
