    \  0.    0.57735027  0.    0.    0.]\n\n# 4.5 The Generalized $N$-qubit Werner\
    \ state\n\nThe two-qubit Werner states are special states in the Hilbert space\
    \ that are entangled but still admit the local hidden-variable model [58], and\
    \ they are local unitary invariant states. The density matrix of the two-qubit\
    \ Werner state is given below,\n\n$$\\rho' = p|b_3\\rangle\\langle b_3| + \\frac{1-p}{4}\\\
    mathbb{I}_2, \\quad (4.43)$$\n\nwhere $|b_3\\rangle = (|00\\rangle + |11\\rangle)/\\\
    sqrt{2}$, and $\\mathbb{I}_2$ is an identity matrix of dimension $2^2 \\times\
    \ 2^2$. The generalized $N$-qubit ($N \\geq 3$) Werner [49, 59] state can be written\
    \ in terms of the $N$-qubit GHZ state and a $N$-qubit maximally mixed state, which\
    \ are mixed suitably with probabilities $p$ and $1-p$, respectively,\n\n$$\\rho(p)\
    \ = p|GHZ\\rangle\\langle GHZ| + \\frac{1-p}{2^N}\\mathbb{I}_N, \\quad (4.44)$$\n\
    \nwhere $\\mathbb{I}_N$ is an identity matrix of dimension $2^N \\times 2^N$.\n\
    \n```\nnWerner(p,tot_spins=2)\n```"
