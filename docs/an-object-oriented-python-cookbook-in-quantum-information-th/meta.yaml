    \n$$\\tilde{\\rho}_{ij} = (\\sigma_y \\otimes \\sigma_y)\\rho_{ij}^*(\\sigma_y\
    \ \\otimes \\sigma_y).$$ (5.10)\n\n请注意，如果我们有任何 $N$ 量子比特的纯态或混合态，并且一旦我们得到任意两个量子比特\
