    \ 的数组，即所需的哈密顿量 |\n\n# 实现\n\n```\ndef dm_xham(self,N,nn=1,mode='homogeneous',dx=1.0,\
    \ condition='periodic'):\n    \"\"\"\n    构建 X 方向的 DM 哈密顿量\n    输入\n```"
