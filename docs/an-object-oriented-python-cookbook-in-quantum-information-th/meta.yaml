  md: "# 5.5 Renyi entropy\n\nIn classical information theory, the Renyi entropy [103,\
    \ 104] generalizes the following entropies: Shannon entropy [60], collision entropy\
    \ [105] and the min-entropy [106]. However, the quantum version of the Renyi entropy\
    \ ($S_\\alpha$) quantifies the quantum entanglement content of a quantum system.\
    \ It is defined using two quantities, the density matrix and Renyi index $\\alpha\
    \ \\ge 0$. Renyi entropy is defined as follows,\n\n$$S_\\alpha = \\frac{1}{1-\\\
    alpha} \\log Tr(\\rho^\\alpha).$$\n\nHere $\\alpha$ varies from 0 to $\\infty$\
    \ such that $\\alpha \\neq 1$, $\\rho$ is a density matrix or reduced density\
    \ matrix describing the state of the system. In the limit $\\alpha \\to 1$, the\
    \ Renyi entropy approaches the von Neumann entanglement entropy. Renyi entropy\
    \ is used in many areas of quantum information theory.\n\n# 5.5.1 For a real or\
    \ complex density matrix\n\n```\nrenyi_entropy(rho,alpha)\n```\n\n# Parameters\n\
    \n| In/Out | Argument | Description |\n|---|---|---|\n| [in] | rho | rho is a\
    \ real or complex array of dimension $(0:2^N-1, 0:2^N-1)$, which is the input\
    \ density matrix |\n| [in] | alpha | It is the value of Renyi index |\n| [out]\
    \ | renyi | It returns the value of Renyi entropy |\n\n# Implementation\n\n```\n\
    def renyi_entropy(self,rho,alpha):\n    \"\"\"\n    Calculation of Renyi entropy\n\
    \    Parameters\n        rho : Real or complex density matrix\n        alpha :\
    \ It is the value of Renyi index\n\n    Returns\n        renyi : Renyi Entropy\
    \ value\n    \"\"\"\n    # Checking whether $\\alpha \\neq 1$\n    assert alpha\
    \ != 1.0, \"alpha should not be equal to 1\"\n    # Storing the data type of input\
    \ density matrix $\\rho$\n    typerho=str(rho.dtype)\n    # Creating the object\
    \ of the LinearAlgebra class\n    laobj=LA()\n```"
