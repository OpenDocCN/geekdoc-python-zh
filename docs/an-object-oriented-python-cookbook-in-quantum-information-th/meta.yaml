    \ will be multiplied to this place values depending on whether the corresponding\
    \ coefficient sign is positive or negative, respectively. For the case under consideration,\
    \ the list which will be generated is $[0, -3, -12, 15]$.\n\n## 4.3 The $N$-qubit\
    \ Greenberger-Horne-Zeilinger (GHZ) state\n\nThe GHZ state was first studied by\
    \ Daniel Greenberger, Michael Horne and Anton Zeilinger [49]. The GHZ state is\
    \ an orthonormal entangled state of three qubits which is,\n\n$$|GHZ\\rangle =\
    \ \\frac{|000\\rangle + |111\\rangle}{\\sqrt{2}}. \\tag{4.39}$$\n\nA generalization\
    \ of it to $N$ qubits ($N \\geq 3$) gives us the $N$-qubit GHZ state which can\
    \ be defined as\n\n$$|GHZ\\rangle = \\frac{|0\\rangle^{\\otimes N} + |1\\rangle^{\\\
    otimes N}}{\\sqrt{2}} = \\frac{|00000\\cdots 0\\rangle_N + |11111\\cdots 1\\rangle_N}{\\\
    sqrt{2}}. \\tag{4.40}$$\n\nThese states are extensively used in quantum teleportation\
    \ [50, 51], quantum cryptography protocols [52-54] and quantum game theory [55].\
    \ It is in fact quite interesting to note that the $N$-qubit GHZ state is the\
    \ ground state of a ferromagnet [56]. Another interesting property of the three-qubit\
    \ GHZ state ($N=3$ case) is that all the three qubits are entangled but no two-qubits\
    \ are entangled.\n\n```\nnGHZ(tot_spins=3)\n```\n\n### Parameters\n\n| in/out\
    \ | Argument | Description |\n| :--- | :--- | :--- |\n| [in] | tot_spins | It\
    \ is the total number of qubits. Its default value is equal to 3 |\n| [out] |\
    \ state | It is a real array which stores the GHZ state |\n\n### Implementation\n\
    \n```\ndef nGHZ(self,tot_spins=3):\n    \"\"\"\n    Construct N-qubit GHZ state\n\
    \    Input:\n        tot_spins: it is the total number of spins, it should be\
    \ equal to\n                   or greater than 3.\n    Output:\n        state:\
    \ N-qubit GHZ state.\n    \"\"\"\n    # Checking number of spins N >= 3\n    assert\
    \ tot_spins >= 3, \"Total number of spins are less than 3\"\n    state=np.zeros([2**tot_spins])\n\
    \    # Constructing the |GHZ> state\n    state[0]=1/np.sqrt(2)\n    state[(2**tot_spins)-1]=1/np.sqrt(2)\n\
    \    return state\n```\n\n### Example\n\n```\nstate=gt_obj.nGHZ(tot_spins=3)\n\
    print(state)\n```\n\nThe above code prints the three qubit GHZ state.\n\n```\n\
    [0.70710678 0.         0.         0.         0.         0.         0.        \n\
    \ 0.70710678]\n```\n\n## 4.4 The N-qubit W state\n\nThe W state [57] is an entangled\
    \ quantum state of three qubits which can be written as\n\n$$|W\\rangle = \\frac{1}{\\\
    sqrt{3}} (|100\\rangle + |010\\rangle + |001\\rangle).$$\n\nIt is very different\
    \ from the three qubit GHZ state in terms of entanglement properties, that is,\
    \ all the three qubits are entangled and even the two-qubit subsystems are entangled.\
    \ It is also interesting to note that the three states making up the W state are\
    \ such that there is a shift of the qubit $|1\\rangle$, either to the right or\
    \ left with respect to the first state. A natural generalization of the W state\
    \ to the $N$ qubit case is as follows,\n\n$$|W\\rangle = \\frac{1}{\\sqrt{N}}\
    \ (|100\\cdots 0\\rangle + |010\\cdots 0\\rangle + \\cdots + |000\\cdots 1\\rangle).$$\n\
    \n```\nnW(tot_spins=3)\n```\n\n### Parameters\n\n| in/out | Argument | Description\
    \ |\n|---|---|---|\n| [in] | tot_spins | It is the number of qubits. Its default\
    \ value is equal to 3 |\n| [out] | state | It is a real array which stores the\
    \ W state |\n\n### Implementation\n\n```\ndef nW(self,tot_spins=3):\n    \"\"\"\
    \n    Construct N-qubit W state\n    Input:\n        tot_spins: it is the total\
    \ number of spins, it should be equal to\n                   or greater than 3.\n\
    \    Output:\n        state: N-qubit W state.\n    \"\"\"\n    # Checking number\
    \ of spins $N \\geq 3$\n    assert tot_spins >= 3, \"Total number of spins are\
    \ less than 3\"\n    # Constructing the $|W\\rangle$ state\n    state=np.zeros([2**tot_spins])\n\
    \    for i in range(0,tot_spins):\n        state[2**i]=1/np.sqrt(tot_spins)\n\
    \    return state\n```\n\n### Example\n\n```\nstate=gt_obj.nW(tot_spins=3)\nprint(state)\n\
    ```\n\nThe above code prints the three-qubit W state.\n\n```\n[0.    0.57735027\
    \  0.57735027  0.    0.57735027  0.    0.    0.]\n```\n\n## 4.5 The Generalized\
    \ $N$-qubit Werner state\n\nThe two-qubit Werner states are special states in\
    \ the Hilbert space that are entangled but still admit the local hidden-variable\
    \ model [58], and they are local unitary invariant states. The density matrix\
    \ of the two-qubit Werner state is given below,\n\n$$\\rho' = p|b_3\\rangle\\\
    langle b_3| + \\frac{1-p}{4}\\mathbb{I}_2, \\quad (4.43)$$\n\nwhere $|b_3\\rangle\
    \ = (|00\\rangle + |11\\rangle)/\\sqrt{2}$, and $\\mathbb{I}_2$ is an identity\
    \ matrix of dimension $2^2 \\times 2^2$. The generalized $N$-qubit ($N \\geq 3$)\
    \ Werner [49, 59] state can be written in terms of the $N$-qubit GHZ state and\
    \ a $N$-qubit maximally mixed state, which are mixed suitably with probabilities\
    \ $p$ and $1-p$, respectively,\n\n$$\\rho(p) = p|GHZ\\rangle\\langle GHZ| + \\\
    frac{1-p}{2^N}\\mathbb{I}_N, \\quad (4.44)$$\n\nwhere $\\mathbb{I}_N$ is an identity\
    \ matrix of dimension $2^N \\times 2^N$.\n\n```\nnWerner(p,tot_spins=2)\n```\n\
    \n### Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | p | It is the mixing probability |\n| [in] | tot_spins | tot_spins\
    \ stores the total number of qubits |\n| [out] | rho | It stores the density matrix\
    \ of the Werner state |\n\n### Implementation\n\n```\ndef nWerner(self,p,tot_spins=2):\n\
    \    \"\"\"\n    Construct N-qubit Werner state\n    Input:\n        tot_spins:\
    \ it is the total number of spins, it should be equal to\n                   or\
    \ greater than 2.\n        p: it is the mixing probability\n    Output:\n    \
    \    rho: N-qubit Werner state.\n    \"\"\"\n    # Checking total number of spins\
    \ $N \\geq 2$\n    assert tot_spins >= 2, \"Total number of spins are less than\
    \ 2\"\n    qobj=QM()\n    # If $N = 2$ then $|GHZ\\rangle = |b_3\\rangle$\n  \
    \  if tot_spins == 2:\n        state=self.bell3()\n    else:\n        state=self.nGHZ(tot_spins=tot_spins)\n\
    \    den=qobj.outer_product_rvec(state,state)\n    # Constructing the identity\
    \ matrix $\\mathbb{I}_N$\n    identity=np.identity(2**tot_spins, dtype = 'float64')\n\
    \    identity=identity*(1/(2**tot_spins))\n    # Finally constructing the N-qubit\
    \ Werner state $\\rho(p)$\n    rho=(p*den)+((1-p)*identity)\n    return rho\n\
    ```\n\n### Example\n\n```\nstate=gt_obj.nWerner(p=0.5,tot_spins=2)\nprint(state)\n\
    ```\n\nThe above code prints the two qubit generalized Werner state as given in\
    \ Eq. [4.43].\n\n```\n[[0.375 0.    0.    0.25 ]\n [0.    0.125 0.    0.   ]\n\
    \ [0.    0.    0.125 0.   ]\n [0.25  0.    0.    0.375]]\n```\n\n## 4.6 Shannon\
    \ entropy\n\nShannon entropy is the metric that is used to measure the information\
    \ entropy of a stream of data bits. The mathematical definition of Shannon entropy\
    \ is as follows, it quantifies how much information is required on an average\
    \ to identify random samples from the distribution. Given a discrete random variable\
    \ $X$, which has outcomes $\\{x_i; i = 1, \\cdots N\\}$ occurring with corresponding\
    \ probabilities $\\{p_i(x); i = 1, \\cdots N\\}$, respectively, then the Shannon\
    \ entropy [60] for the above discrete set of probabilities is given as,\n\n$$H(p)\
    \ = -\\sum_{i=1}^{N} p_i(x) \\log_2 p_i(x). \\tag{4.45}$$\n\nShannon entropy is\
    \ one of the most important information theoretic measures widely used. Note that\
    \ when $N = 2$, the corresponding entropy is called the binary entropy which is,\n\
    \n$$H_b(p) = -p \\log_2 p - (1 - p) \\log_2 (1 - p). \\tag{4.46}$$\n\nShannon\
    \ entropy is useful while computing quantities like mutual information, and conditional\
    \ entropies [61].\n\n**shannon_entropy(pvec)**\n\n### Parameters\n\n| in/out |\
    \ Argument | Description |\n| :--- | :--- | :--- |\n| [in] | pvec | It is a real\
    \ array which contains probabilities |\n| [out] | se | se is the value of Shannon\
    \ entropy |\n\n### Implementation\n\n```\ndef shannon_entropy(self,pvec):\n  \
    \  \"\"\"\n    Calculates the Shannon entropy\n    Input:\n        pvec: column\
    \ vector which contains probabilities\n    Output:\n        se: it returns the\
    \ Shannon entropy value\n    \"\"\"\n    size=pvec.shape[0]\n    se=0.0 # It stores\
    \ Shannon entropy value $H(p)$\n    for i in range(0,size):\n        # Checking\
    \ probability $p$ is bounded between $0 \\le p \\le 1$\n        assert pvec[i]<=1\
    \ and pvec[i] >=0, \"probability values are incorrect\"\n        se=se-(pvec[i]\
    \ *math.log2(pvec[i]))\n    return se\n```"
