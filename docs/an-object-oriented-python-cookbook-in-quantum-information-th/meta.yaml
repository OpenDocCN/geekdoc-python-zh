    \ as shown below,\n\n```\n>>> str3=\"She said, \"Whats up\" \"  # Not a valid\
    \ string type\nSyntaxError: invalid syntax\n>>> str3 =\"She said, \"Whats up\"\
    \ \"\"  # Valid string type\n>>> print(str3)\nShe said, \"Whats up\"\n>>> str4=\
    \ 'Space like \\t separated'  # \\t introduces a tab space\n>>> print(str4)\n\
    Space like     separated\n>>> str5= \"Hello \\n world\"  # \\n introduces a new\
    \ line\n>>> print(str5)\nHello\n world\n```\n\nOne may wonder why in Python the\
    \ concept of writing a string inside a triple quote is followed. The answer lies\
    \ in the fact that a triple quote can enclose strings of characters that contain\
    \ both single and double quotes such that no escaping is needed, and it also allows\
