    # 2.3 Normalization of a vector


    Once the norm is found using Eq. [2.4], we can proceed to normalize the $n$ dimensional
    vector $|v\rangle$ to obtain the normalized vector $|v''\rangle$ as


    $|v''\rangle = \frac{|v\rangle}{||v||}$. (2.5)


    Normalization is an important operation which is done on quantum states so as
    to make the length of the vector representing the state to have unit length, that
    is to say, even though $\langle v|v\rangle$ may not be unity in general, it is
    guaranteed that $\langle v''|v''\rangle$ is 1.


    # 2.3.1 For a real or complex vector


