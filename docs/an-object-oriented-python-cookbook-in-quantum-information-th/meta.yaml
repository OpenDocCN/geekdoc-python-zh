    \    condition='periodic')\nham=ham1+ham2\n```\n\n在上面的程序中，变量“ham”包含了 Majumdar-Ghosh\
    \ 模型所需的哈密顿量矩阵。\n\n## 6.4 Dzyaloshinskii-Moriya 相互作用\n\n固体中磁性离子之间的磁相互作用取决于许多因素，如邻近离子、温度、外部磁场等。在某些情况下，为了描述系统，人们也使用涉及多个自旋同时相互作用的哈密顿量。除了前面第\
    \ [6.3] 节讨论的哈密顿量中涉及最近邻自旋算符点积 $\\vec{\\sigma}_i.\\vec{\\sigma}_{i+1}$ 的弱直接交换耦合外，由于位点\
    \ $i$ 和 $i+1$ 处的自旋或离子之间的 $L-S$ 耦合，还存在一个小的反对称部分。这有利于自旋倾斜（在接近零温度时自旋之间的倾斜），我们称之为间接耦合。有趣的是，这存在于许多离子固体中，通过这种现象，两个非近邻磁性离子之间的短程交换相互作用由位于它们之间的非磁性离子介导，类似于安德森超交换\
    \ [134]。哈密顿量的这个间接耦合部分被称为 Dzyaloshinskii-Moriya (DM) 相互作用 [135, 136]。DM 相互作用的哈密顿量由下式给出，\n\
    \n$$H = \\sum_{i=1}^{N} \\vec{D}.\\vec{\\sigma}_i \\times \\vec{\\sigma}_{i+1},\
    \ \\quad (6.22)$$\n\n其中 $\\vec{D} = (D_x, D_y, D_z)$ 是 DM 矢量，其分量分别指定 DM 相互作用在\
    \ $X, Y, Z$ 方向上的耦合参数，$N$ 是自旋或量子比特的总数。注意，对于位点 $i$ 和 $i+1$ 处自旋之间的 DM 相互作用，矢量 $D$\
    \ 与两个自旋都正交。也就是说，如果两个相互作用的自旋位于本书的平面内，那么 DM 矢量沿着垂直于本书平面的方向。公式 [6.22] 中给出的这个叉积项也与所谓的海森堡自旋流\
    \ [137] 有关。由于相互作用是反对称的，上述哈密顿量涉及一个叉积。我们可以将公式 [6.22] 改写为，\n\n$$H = \\sum_{i=1}^{N}\
    \ \\begin{vmatrix} D_x & D_y & D_z \\\\ \\sigma_i^x & \\sigma_i^y & \\sigma_i^z\
    \ \\\\ \\sigma_{i+1}^x & \\sigma_{i+1}^y & \\sigma_{i+1}^z \\end{vmatrix}. \\\
    quad (6.23)$$\n\n通过展开公式 [6.23] 中的行列式，我们得到，\n\n$$H = \\sum_{i=1}^{N} [D_x(\\sigma_i^y\
    \ \\sigma_{i+1}^z - \\sigma_i^z \\sigma_{i+1}^y) + D_y(\\sigma_i^z \\sigma_{i+1}^x\
    \ - \\sigma_i^x \\sigma_{i+1}^z) + D_z(\\sigma_i^x \\sigma_{i+1}^y - \\sigma_i^y\
    \ \\sigma_{i+1}^x)]. \\quad (6.24)$$\n\n我们提供分别构建哈密顿量中这三个项的方法。上述反对称交换的形式可以忠实地推广到\
    \ $r$ 个最近邻，事实上我们给出的方法涉及位点 $i$ 处的自旋与位点 $i+r$ 处的自旋之间的 DM 相互作用，如下所示\n\n$$H = \\sum_{i=1}^{N}\
    \ [D_{rx}^i(\\sigma_i^y \\sigma_{i+r}^z - \\sigma_i^z \\sigma_{i+r}^y) + D_{ry}^i(\\\
    sigma_i^z \\sigma_{i+r}^x - \\sigma_i^x \\sigma_{i+r}^z) + D_{rz}^i(\\sigma_i^x\
    \ \\sigma_{i+r}^y - \\sigma_i^y \\sigma_{i+r}^x)]. \\quad (6.25)$$\n\n还要注意，为了适应\
    \ $i^{th}$ 和 $(i+r)^{th}$ 自旋之间的随机耦合，我们通过引入上标 $i$ 使 $\\vec{D}$ 的分量随机化。值得注意的是，通常在公式\
    \ [6.24] 中，矢量 $D$ 只有一个分量是非零的，这取决于矢量 $D$ 的取向方向。\n\n### 6.4.1 X 方向的 DM 矢量\n\n这对应于公式\
    \ [6.25] 中的第一项，即\n\n$$H = \\sum_{i=1}^{N} D_{rx}^{i}(\\sigma_{i}^{y}\\sigma_{i+r}^{z}\
    \ - \\sigma_{i}^{z}\\sigma_{i+r}^{y}).$$\n\n```\ndm_xham(N,nn=1,mode='homogeneous',dx=1.0,\
    \ condition='periodic')\n```\n\n# 参数\n\n| 输入/输出 | 参数 | 描述 |\n|---|---|---|\n|\
    \ [in] | N | 自旋总数 |\n| [in] | nn | nn 存储 $r$ 的值，描述哈密顿量的 $r^{th}$ 近邻相互作用。默认值等于\
    \ 1（最近邻相互作用） |\n| [in] | mode | 指定相互作用强度是均匀还是非均匀<br>如果 mode = 'homogeneous'，我们有均匀的相互作用（$D_{rx}^{i}\
    \ = D$）。这是默认值<br>如果 mode = 'inhomogeneous'，我们有非均匀的相互作用 |\n| [in] | dx | 如果 mode\
    \ = 'homogeneous'，dx 接收一个常数值，默认值为 1<br>如果 mode = 'inhomogeneous'，我们传递一个包含 $D_{rx}^{i}$\
    \ 值的列表给参数 dx。第 $i^{th}$ 个条目表示第 $i^{th}$ 和 $(i + r)^{th}$ 个自旋之间的相互作用强度 |\n| [in]\
    \ | condition | 定义边界条件的类型<br>如果 condition = 'periodic'，将考虑周期性边界条件。这是默认值<br>如果\
