  md: "# 5.9 Residual entanglement for three qubits\n\nResidual entanglement of a\
    \ three qubit pure state is also known as three tangle [113]. We define the three\
    \ tangle to be,\n\n$$\\tau_3 = \\tau_{1(23)} - \\tau_{12} - \\tau_{13}$$\n\nwhere\
    \ $\\tau$ can be defined as the square of concurrence. We can also define the\
    \ tangle between one qubit (say the $i^{th}$) and the rest of the qubits if the\
    \ total state is pure. This is because of Schmidt decomposition. The tangle between\
    \ qubit $i$ and the rest is the one-tangle, given by $\\tau_{i,(\\text{rest of\
    \ the spins})} = 4 \\det(\\rho_k)$, where $\\rho_k$ is the single qubit reduced\
    \ density matrix got by partial tracing all other qubits except the $k^{th}$ qubit.\
    \ This concept can be used to measure the entanglement in a three qubit system\
    \ like the famous GHZ state or the W state. We can rewrite Eq. [5.25] as follows,\n\
    \n$$\\tau_3 = 4 \\det(\\rho) - C_{12}^2 - C_{13}^2.$$\n\nFrom the structure of\
    \ the GHZ and W state, we see the contrasting behaviour of bipartite entanglement\
    \ in them, this three tangle will be useful in differentiating these entanglement\
    \ properties for such three qubit pure states.\n\n# 5.9.1 For a real or complex\
    \ state\n\n```\nresidual_entanglement_vec(state)\n```\n\n# Parameters\n\n| In/Out\
