    \ because of Schmidt decomposition [101], which states that non-zero eigenvalues\
    \ of the reduced density matrix $\\rho^A$ are equal to non-zero eigenvalues of\
    \ reduced density matrix $\\rho^B$, if the composite state of the bipartite split\
    \ is a pure state. Eq. [5.14] can also be written as,\n\n$$S\\left(\\rho^{AB}\\\
    right) = -\\sum_{i=1}^2 \\lambda_i \\log_2 (\\lambda_i),$$"
