  md: "# 7.7 Complex Ginibre matrix\n\nThe complex Ginibre matrix is a random matrix\
    \ with each of the real and imaginary elements individually chosen from an independent\
    \ and identically distributed random variables chosen from the normal distribution\
    \ $\\mathcal{N}(0, \\frac{1}{2})$.\n\n```\nrandom_complex_ginibre(N)\n```\n\n\
    # Parameters\n\n| In/Out | Argument | Description |\n|---|---|---|\n| [in] | N\
    \ | It is the dimension (N×N) of the output matrix |\n| [out] | cginibre | It\
    \ is the array holding the complex Ginibre matrix |\n\n# Implementation\n\n```\n\
    def random_complex_ginibre(self,N):\n    \"\"\"\n    Construct a complex Ginibre\
    \ matrix\n    Input:\n        N: dimension of the NxN complex Ginibre\n    Output:\n\
    \        cginibre: complex ginibre matrix\n    \"\"\"\n    cginibre=np.zeros([N,N],dtype=np.complex_)\n\
    \    for i in range(0,cginibre.shape[0]):\n        for j in range(0,cginibre.shape[1]):\n\
    \            cginibre[i,j]=complex(np.random.normal(0.0, 1.0, size= None),\\n\
    \                                 np.random.normal(0.0, 1.0, size= None))\n  \
    \  return cginibre\n```\n\n# Example\n\n```\nrandom_ginibre=qrobj.random_complex_ginibre(2)\n\
    ```\n\nIn the above example, random_ginibre is the $2 \\times 2$ required complex\
    \ Ginibre matrix.\n\n# 7.8 Wishart matrices\n\nWishart matrices are positive definite\
    \ matrices which can be constructed using the Ginibre matrix $G$ as follows.\n\
    \n$W = GG^\\dagger$"
