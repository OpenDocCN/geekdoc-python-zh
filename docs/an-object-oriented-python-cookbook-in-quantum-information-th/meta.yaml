    ```\nham_xx(N,nn=1,mode='homogeneous',jx=1,condition='periodic')\n```\n\n## 参数\n\
    \n| 输入/输出 | 参数 | 描述 |\n|---|---|---|\n| [in] | N | 自旋的总数 |\n| [in] | nn | nn 存储\
    \ $r$ 的值，描述哈密顿量的第 $r$ 个近邻相互作用。默认值等于 1（最近邻相互作用） |\n| [in] | mode | 指定相互作用强度是均匀的还是非均匀的<br>如果\
    \ mode = 'homogeneous'，则为均匀相互作用（$J_r^i = J$）。这是默认值<br>如果 mode = 'inhomogeneous'，则为非均匀相互作用\
