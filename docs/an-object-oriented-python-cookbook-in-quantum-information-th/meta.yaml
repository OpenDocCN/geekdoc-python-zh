    ## 1.8 Python 中的函数\n\n如果任何代码很大且跨越多行，调试将非常困难。在这些情况下，如果我们把程序分成几个部分，程序员的生活会相对轻松一些，因为程序看起来会更整洁。这项工作是通过在程序中定义函数来完成的。很多时候，程序中涉及特定操作的部分会重复多次，那么这些操作对整个程序来说是通用的，可以将其定义为一个函数，并在主程序中需要的地方调用它。在\
