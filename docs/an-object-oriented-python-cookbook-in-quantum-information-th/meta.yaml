    ## 5 量子纠缠的量化


    量子纠缠 [75–79] 是量子态的一种独有特性，这种现象在经典力学中并不存在。然而，提出一个经典版本的纠缠概念将有助于我们理解量子纠缠的特征。纠缠源于两个系统之间缺乏独立性。例如，考虑一个随机变量
    $X$，它有两个可能的结果：正面（$\mathbf{H}$）和反面（$\mathbf{T}$）。两次抛硬币的离散概率分布如下，其中每次抛掷的结果相互独立。


    | | 硬币 2 正面 | 硬币 2 反面 |

    |---|---|---|

    | 硬币 1 正面 | 0.25 | 0.25 |

    | 硬币 1 反面 | 0.25 | 0.25 |


    图 5.1：两次公平抛硬币的离散概率分布。


    从图 (5.1) 所示的概率分布可以清楚地看出，任何一枚硬币的结果都不会影响另一枚硬币的结果。如果第一枚硬币的结果是正面，那么第二枚硬币的结果是正面或反面的概率各为
    50%。现在考虑一种情况，我们有两枚特殊的硬币，其离散概率分布如图 (5.2) 所示。图 (5.2) 中的表格显示了极端的纠缠情况。


    | | 硬币 2 正面 | 硬币 2 反面 |

    |---|---|---|

    | 硬币 1 正面 | 0.5 | 0 |

    | 硬币 1 反面 | 0 | 0.5 |


    图 5.2：两次特殊抛硬币的离散概率分布。


    如果第一枚特殊硬币的结果是正面，那么我们可以百分之百确定第二枚特殊硬币的结果也会是正面。通过这个例子的讨论，我们现在引入一个更正式的量子纠缠定义。


    纠缠是存在于空间分离的系统之间的一种非局域关联。对其中一个子系统的任何测量都会影响另一个子系统的状态，这本质上意味着子系统不再独立 [58]。纠缠不仅在理解量子态的基本性质方面扮演着重要角色，而且在理解自旋链
    [80–82] 和量子相变 [83, 84] 等凝聚态系统方面也是不可或缺的。它也是量子计算 [85–87] 等领域不可或缺的一部分。


    纯态和混合态中纠缠的性质非常不同，随着我们的深入，我们将探讨检测和量化纠缠的方法。就纯态而言，如果我们有一个复合系统 $AB$，它处于由两个子系统 $A$
    和 $B$ 组成的态 $|\psi\rangle_{AB}$，如果复合系统的态可以写成各个子系统态的张量积，那么我们说 $|\psi\rangle_{AB}$
    是未纠缠的，否则它们是纠缠的。例如，考虑一个著名的双量子比特贝尔态：


    $$|b_1\rangle = \frac{1}{\sqrt{2}}(|00\rangle_{AB} + |11\rangle_{AB}) \neq |\text{系统
    A 的某个态}\rangle \otimes |\text{系统 B 的某个态}\rangle \quad (5.1)$$


    在上面的方程中，我们看到 $|b_1\rangle$ 是一个纠缠态。然而，同样地，很容易看出态 $|\phi\rangle = \frac{1}{\sqrt{2}}(|00\rangle_{AB}
    + |01\rangle_{AB}) = \frac{1}{\sqrt{2}}(|0\rangle_A \otimes (|0\rangle_B + |1\rangle_B))$
    是一个未纠缠态。在定义为 $|b_1\rangle$ 的态中，我们看到它是用泡利 Z 矩阵的本征向量定义的，但是，如果我们旋转基底，使得该态用泡利 X 矩阵的本征向量来表示，即使如此，非局域关联或纠缠也不会消失，因为新态在任意全局相位下保留了这些关联。用测量理论的语言来说，我们看到在态
    $|b_1\rangle$ 中，如果我们将第一个量子比特的自旋测量为处于态 $|0\rangle$，我们可以立即，甚至无需测量第二个量子比特，就以 100%
    的概率断定它将处于态 $|0\rangle$；然而，对于态 $|\phi\rangle$，测量第一个量子比特处于态 $|0\rangle$，会使第二个量子比特的状态坍缩到一个叠加态，即
    $\frac{1}{\sqrt{2}}(|0\rangle_B + |1\rangle_B)$，这是纠缠的一个标志。然而，进入密度矩阵的领域，一个密度矩阵
    $\rho$ 被称为可分离的 [88]，如果它可以写成直积态 $\rho^A$ 和 $\rho^B$ 的凸组合，即


    $$\rho = \sum_i p_i \rho_i^A \otimes \rho_i^B, \quad (5.2)$$


    这个定义，加上给定密度矩阵在纯态分解方面没有唯一性 [89] 的事实，导致了大量纠缠度量和相关纠缠检测技术的涌现。其中一些，如 PPT 和约化判据，是常用的，并且随着研究的深入，这些度量和检测方法的数量与日俱增，这实际上使得它们彼此之间或强或弱
    [90]。对于量子比特-量子比特和量子比特-量子三能级系统（分别为 $2\times2$ 和 $2\times3$），简单的 Peres-Horodecki
    判据或著名的正部分转置 PPT 判据 [88] 为可分离性提供了必要且充分的判据。这不能直接推广到更高维度的量子态，这直接导致了检测的非唯一性。


    为了研究纠缠含量 [91] 或检测量子系统两个子系统之间是否存在纠缠，我们对复合量子系统的量子态执行以下数学操作：偏迹和偏转置。关于偏迹和偏转置的更详细讨论分别在第
    5.1 节和第 5.2 节中给出。


    在本章中，我们将使用与第 4 章中相同的态和密度矩阵来演示我们的方法和输出。（在本章中）这里，名为“site”的数组存储了对应于量子比特位置的索引，这是通过从零开始的索引完成的，意味着
