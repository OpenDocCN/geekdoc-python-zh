    \ number of binary array vec\n    \"\"\"\n    dec=0\n    for i in range(0,vec.shape[0]):\n\
    \        dec=dec+int((2**(vec.shape[0]-1-i))*vec[i])\n    dec = int(dec)\n   \
    \ return dec\n```\n\n### 示例\n\n在此示例中，我们将二进制字符串1010转换为十进制数。\n\n```\nA=np.array([1,0,1,0])\n\
