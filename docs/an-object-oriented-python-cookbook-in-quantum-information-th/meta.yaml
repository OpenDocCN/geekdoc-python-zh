    \n```\n0.37696668017247514\n```\n\n## 5.6 Negativity and logarithmic negativity\n\
    \nNegativity [107] is an entanglement measure based on the partial transpose operation.\
    \ There is no operational interpretation of negativity. Negativity $\\mathcal{N}(\\\
    rho)$ for a given bipartite pure or mixed state density matrix $\\rho$ is defined\
    \ with respect to the partial transpose on one of its subsystems $A$ as,\n\n$$\\\
    mathcal{N}(\\rho) = \\frac{\\| \\rho^{T_A} \\| - 1}{2}.$$\n(5.22)\n\nThe mathematical\
    \ construction of Eq. [5.22] is such that for separable states, the negativity\
    \ value goes to zero, and in the case of maximally entangled states, its value\
    \ is equal to entanglement entropy. It measures the degree to which $\\rho^{T_A}$\
    \ fails to be positive, and therefore it can be regarded as a quantitative version\
    \ of Peres’ criterion for separability (PPT criteria). Associated with negativity,\
    \ we also define what is called the logarithmic negativity [108] which is $\\\
    mathcal{E}_N(\\rho) = \\log_2(\\| \\rho^{T_A} \\|)$, as expected of a log function,\
    \ logarithmic negativity has additive properties. Though logarithmic negativity\
    \ is not a convex function but its value never increases on average under any\
    \ general positive partial transpose preserving operation.\n\n### 5.6.1 For a\
    \ real or complex state\n\n```python\nnegativity_log_vec(state, sub_tr, eps=10**(-13))\n\
    ```\n\n## Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- | :---\
