    纠缠谱 [111, 112] 是约化密度矩阵特征值谱的负自然对数。Haldane在其开创性工作中指出，约化密度矩阵的谱包含了关于纠缠的更多信息，而不仅仅是用一个数（冯·诺依曼熵）来量化纠缠。当我们研究凝聚态系统，如拓扑材料、量子霍尔效应等时，这个量更为重要。如果复合系统\
    \ $AB$ 的约化密度矩阵为 $\\rho_A$，则纠缠谱定义为 $-ln(\\lambda_i)$，其中 $\\lambda_i$（$i = 1, \\\
    cdots, \\text{dim}(\\rho_A)$）是 $\\rho_A$ 的特征值。\n\n### 5.8.1 对于实数或复数密度矩阵\n\n`entanglement_spectrum(rho)`\n\
