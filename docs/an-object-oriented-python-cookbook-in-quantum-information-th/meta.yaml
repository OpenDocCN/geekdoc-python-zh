  md: "# 4.6 Shannon entropy\n\nShannon entropy is the metric that is used to measure\
    \ the information entropy of a stream of data bits. The mathematical definition\
    \ of Shannon entropy is as follows, it quantifies how much information is required\
    \ on an average to identify random samples from the distribution. Given a discrete\
    \ random variable $X$, which has outcomes $\\{x_i; i = 1, \\cdots N\\}$ occurring\
    \ with corresponding probabilities $\\{p_i(x); i = 1, \\cdots N\\}$, respectively,\
    \ then the Shannon entropy [60] for the above discrete set of probabilities is\
    \ given as,\n\n$$H(p) = -\\sum_{i=1}^{N} p_i(x) \\log_2 p_i(x). \\tag{4.45}$$\n\
    \nShannon entropy is one of the most important information theoretic measures\
    \ widely used. Note that when $N = 2$, the corresponding entropy is called the\
    \ binary entropy which is,\n\n$$H_b(p) = -p \\log_2 p - (1 - p) \\log_2 (1 - p).\
    \ \\tag{4.46}$$\n\nShannon entropy is useful while computing quantities like mutual\
    \ information, and conditional entropies [61].\n\n**shannon_entropy(pvec)**\n\n\
    # Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- | :--- |\n\
    | [in] | pvec | It is a real array which contains probabilities |\n| [out] | se\
    \ | se is the value of Shannon entropy |\n\n# Implementation\n\n```\ndef shannon_entropy(self,pvec):\n\
    \    \"\"\"\n    Calculates the Shannon entropy\n    Input:\n        pvec: column\
    \ vector which contains probabilities\n    Output:\n        se: it returns the\
    \ Shannon entropy value\n    \"\"\"\n    size=pvec.shape[0]\n    se=0.0 # It stores\
    \ Shannon entropy value $H(p)$\n    for i in range(0,size):\n        # Checking\
    \ probability $p$ is bounded between $0 \\le p \\le 1$\n        assert pvec[i]<=1\
    \ and pvec[i] >=0, \"probability values are incorrect\"\n        se=se-(pvec[i]\
    \ *math.log2(pvec[i]))\n    return se\n```"
