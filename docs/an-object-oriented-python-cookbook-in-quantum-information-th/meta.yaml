    ```\n\n## 3.3 矩阵的幂\n\n考虑一个方阵 $A$ 和一个正数 $k$，矩阵 $A$ 的 $k^{th}$ 次幂定义为 $A^k$。如果矩阵\
    \ $A$ 的逆存在，则可以计算 $A^{-k}$。方阵 $A$ 的幂可以使用谱定理如下求得。假设矩阵 $A$ 可对角化，矩阵 $D$ 的主对角线上包含 $A$\
    \ 的特征值，即 $D = P^{-1}AP$，这意味着 $A = PDP^{-1}$。将这些方程相乘 $k$ 次，并利用 $PP^{-1} = P^{-1}P\
    \ = \\mathbb{I}$ 的事实，我们可以看到，\n\n$$A^k = PD^kP^{-1}. \\tag{3.14}$$\n\n注意，在上述方程中，如果\
    \ $A$ 是厄米矩阵，则 $A^k = UD^kU^\\dagger$，其中 $U$ 是一个酉矩阵。使用公式 [3.14]，我们也可以计算矩阵 $A^{k'}$\
    \ 的幂，其中 $k'$ 是一个无理数。\n\n### 3.3.1 对于实对称矩阵\n\n```python\npower_smatrix(mat1, k,\
    \ precision=10**(-10))\n```\n\n### 参数\n\n| 输入/输出 | 参数 | 描述 |\n|---|---|---|\n\
    | [输入/输出] | mat1 | mat1 是一个维度为 (0:n-1,0:n-1) 的实数数组 |\n| [输入] | k | k 是矩阵 A 被提升到的幂次\
    \ |\n| [输入] | precision | 如果 mat1 的任何特征值的绝对值低于精度值，则将这些特定特征值视为零。默认值为 $10^{-10}$\
    \ |\n| [输出] | B | B 是一个维度为 (0:n-1,0:n-1) 的复数或实数数组，用于存储矩阵 mat1 的 $k^{th}$ 次幂 |\n\
    \n### 实现\n\n```python\ndef power_smatrix(self, mat1, k, precision=10**(-10)):\n\
    \    \"\"\"\n    计算实对称矩阵的幂。\n    属性:\n        mat1 : 要计算其幂的矩阵或数组。\n        k :\
    \ 幂的值\n        precision: 如果特征值的绝对值低于精度值，则将其视为零\n    返回: 对称矩阵 mat1 的 k 次幂\n  \
    \  \"\"\"\n    eigenvalues, eigenvectors, info = la.dsyev(mat1)\n    flag = 0\n\
    \    for i in eigenvalues:\n        # 检查是否有特征值为负\n        if i < 0.0:\n      \
    \      flag = 1\n    # 如果所有特征值都为正，则 D 为实数类型\n    if flag == 0:\n        diag =\
