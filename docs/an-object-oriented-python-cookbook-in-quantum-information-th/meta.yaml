    print(res_tang)\n```\n\nThe preceding code prints the required value of the residual\
    \ entanglement as,\n\n2.970954353025952e-17\n\n## 5.10 PPT criteria or the Peres\
    \ positive partial transpose criteria\n\nFor any bipartite separable state $\\\
    rho_{AB}$, if we perform a partial transpose on one of the subsystems, say $B$,\
    \ to obtain $\\rho^{T_B}$, then we say $\\rho$ is separable if all the eigenvalues\
    \ of $\\rho^{T_B}$ are non-negative. If $\\rho^{T_B}$ has even one negative eigenvalue,\
    \ then $\\rho_{AB}$ is entangled. In the $2 \\times 2$ and $2 \\times 3$ dimensions\
    \ the condition is both necessary and also sufficient [88, 94]. This method of\
    \ entanglement detection is very important, as for a mixed state, the absence\
    \ of Schmidt decomposition coupled with the non-uniqueness in the pure state decomposition\
    \ of the mixed state makes PPT a noteworthy criteria. In the recipes below, we\
    \ give the separability criteria for only $2 \\times 2$ systems. We have given\
    \ the example of PPT criteria using partial transpose routines as follows. In\
    \ what follows, we will detect entanglement in the two-qubit generalized Werner\
    \ state $\\rho(0.5)$. As we already know that for $p > 1/3$ the Werner state is\
    \ a non-separable state.\n\n```\nimport scipy.linalg.lapack as la\nfrom QuantumInformation\
    \ import PartialTr as PT\nfrom QuantumInformation import GatesTools as GT\nimport\
    \ numpy as np\n\npobj=PT()\ngtobj=GT()\n\n# Constructing the Werner state $\\\
    rho(0.5)$\nstate=gtobj.nWerner(0.5)\nsub_tr=[2]\n\n# Partial transpose the subsystem\
    \ 2\nptrans_state=pobj.ptranspose_den(state,sub_tr)\n\n# Calculating the eigenvalues\
    \ and eigenvectors of partial transposed state\neigenvalues, eigenvectors,info=la.dsyev(ptrans_state)\n\
    \n# flag=0 state not separable, and flag=1 state separable\nflag=0\nfor i in range(0,eigenvalues.shape[0]):\n\
    \    if eigenvalues[i] < 0.0:\n        flag=1\nif flag==1:\n    print(\"Not separable\"\
    )\nelif flag==0:\n    print(\"Separable\")\n```\n\nThe preceding code generates\
    \ the following output,\n\nNot separable\n\n## 5.11 Reduction criteria\n\nFor\
    \ any separable bipartite state $\\rho_{AB}$ such that $\\rho_{AB} \\in \\mathcal{H}_{N_A\
    \ \\times N_B}$, where $N_A$ and $N_B$ are the dimensions of the subsystem spaces\
