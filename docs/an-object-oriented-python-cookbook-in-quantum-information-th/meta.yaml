    # 2.12 Complete example


    In this section, we provide mathematical description of a quantum mechanical problem,
    thereafter we show the complete Python code for the benefit of the readers. We
    first create a two-qubit non-normalized quantum state as shown below.


    $|\psi_1\rangle = (1\ 2\ 3\ 4)^T$. (2.27)


    In order to normalize the state in Eq. [2.27], we will use the standard prescription,


    $|\widetilde{\psi_1}\rangle = \frac{|\psi_1\rangle}{\sqrt{\langle\psi_1|\psi_1\rangle}}$.
    (2.28)


    Thereafter, we form the outer product of the state $|\widetilde{\psi_1}\rangle$
    in order to create the pure state density matrix $\rho_1$ as shown below.


    $\rho_1 = |\widetilde{\psi_1}\rangle\langle\widetilde{\psi_1}|$. (2.29)


    As another example, we create a single qubit normalized quantum state shown below.


    $|\psi_2\rangle = \left(\frac{1}{\sqrt{2}}\ \frac{1}{\sqrt{2}}\right)^T$. (2.30)


    We now take the tensor product of the state $|\psi_2\rangle\langle\psi_2|$ with
    the density matrix in Eq. [2.29] to obtain another density matrix $\rho$ as,


    $\rho = \rho_1 \otimes \rho_2 = |\widetilde{\psi_1}\rangle\langle\widetilde{\psi_1}|
    \otimes |\psi_2\rangle\langle\psi_2|$. (2.31)


    The code for the above quantum task is shown below.


    ```

    import numpy as np

    from QuantumInformation import QuantumMechanics as QM


    quantum_obj=QM()


    # Constructing the state $|\psi_1\rangle$

    v1=np.array([1.0,2.0,3.0,4.0])

    # Normalizing the state $|\psi_1\rangle$

    v1=quantum_obj.normalization_vec(v1)

    # Creating the pure state density matrix $\rho_1$

    rho_1=quantum_obj.outer_product_rvec(v1,v1)

    # Constructing the state $|\psi_2\rangle$

    v2=np.array([1.0/np.sqrt(2),1/np.sqrt(2)])

    # Finally constructing the density matrix $\rho = \rho_1 \otimes \rho_2$

    rho=quantum_obj.tensor_product_matrix(rho_1,\n                                    quantum_obj.outer_product_rvec(v2,v2))


    print("Trace of the final density matrix =",np.matrix.trace(rho))

    ```


    The above code generate prints the following result


    Trace of the final density matrix = 0.9999999999999997'
- md: "## 3 Numerical Linear Algebra Operations\n\nHaving done with the basic recipes\
    \ involving vector and matrix elements in the previous chapter, here in this chapter\
    \ we will give the recipes for some major linear algebra operations [26, 29, 30].\
    \ These operations are very important from the point of view of many quantum information\
    \ tasks and also required in the solution of major problems in quantum mechanics\
    \ and elsewhere. To be more specific, this chapter broadly deals with matrix decompositions,\
    \ calculation of different matrix norms, functions of matrices and orthogonalization\
    \ procedures [25, 31]. However, in this chapter, we have purposely not included\
    \ a few numerical methods, which have been included in our earlier book. The reason\
    \ behind such a decision is because the NumPy library already included those methods,\
    \ and therefore it is redundant to include those methods in our **QuantumInformation**\
    \ library. The methods which are present in the NumPy library and not included\
    \ in our library are listed below.\n\n| Method | Description |\n| :--- | :---\
    \ |\n| **numpy.linalg.svd** | Computes singular value decomposition of a matrix.\
    \ |\n| **numpy.kron** | Performs Kronecker product of two arrays. |\n| **numpy.linalg.qr**\
    \ | Computes the QR decomposition of a matrix. |\n\nLinear algebra is a branch\
    \ of mathematics that deals with vectors, vector spaces, linear maps, and a system\
    \ of linear equations. However, we will be studying those topics which are pertaining\
    \ to quantum information theory. All the methods which will be discussed in this\
    \ chapter are written inside the class **LinearAlgebra** and this whole class\
    \ is written inside the Python module **chap3_linearalgebra.py**. The methods\
    \ inside the class **LinearAlgebra** also uses some functions from the NumPy,\
    \ Math, Cmath, and SciPy libraries. In the forthcoming sections, we will use the\
    \ following matrices for the purpose of illustration of how recipes work:\n\n\
    For a real symmetric matrix,\n\n$$A_1 = \\begin{pmatrix} 1 & -2 & 3 \\\\ -2 &\
    \ 3 & 4 \\\\ 3 & 4 & 5 \\end{pmatrix}.$$\n(3.1)\n\nFor a complex Hermitian matrix,\n\
    \n$$A_2 = \\begin{pmatrix} 2 & 1-3i \\\\ 1+3i & 4 \\end{pmatrix}.$$\n(3.2)\n\n\
    For a real non-symmetric matrix,\n\n$$A_3 = \\begin{pmatrix} 1 & -2 & 3 \\\\ 2\
    \ & 3 & 5 \\\\ -4 & 4 & 5 \\end{pmatrix}.$$\n\nFor a complex non-symmetric matrix,\n\
    \n$$A_4 = \\begin{pmatrix} 2 & 1-3i \\\\ 2+i & 4 \\end{pmatrix}.$$\n\nTo import\
    \ the class **LinearAlgebra** from the **QuantumInformation** library, and thereafter\
    \ we have to create an object of the class. The coding of the preceding statement\
    \ can be done as follows,\n\n```python\n# importing the class LinearAlgebra from\
    \ the QuantumInformation library\nfrom QuantumInformation import LinearAlgebra\
    \ as LA\n\n# creating the object of the class\nlinear_obj=LA()\n```\n\n## 3.1\
    \ Inverse of a matrix\n\nFor a square matrix, $A$ if there exists another matrix\
    \ $B$ such that $AB = BA = I$, then matrix $B$ is called the inverse of $A$. The\
    \ inverse of $A$ is defined as follows $A^{-1}$. For an inverse of a matrix $A$\
    \ to exist, it must satisfy the following conditions,\n\n- The determinant of\
    \ the matrix $A$ should be non-zero, i.e. $\\det(A) \\neq 0$.\n- The matrix $A$\
    \ must be square.\n\nThe inverse of the matrix $A$ can be obtained from the following\
    \ mathematical expression,\n\n$$A^{-1} = \\frac{adj(A)}{\\det(A)},$$\n\nwhere\
    \ $adj(A)$ is the transpose of its co-factor matrix.\n\n### 3.1.1 For a real or\
    \ complex matrix\n\n```python\nlinear_obj.inverse_matrix(A)\n```\n\n### Parameters\n\
    \n| in/out | Argument | Description |\n| :--- | :--- | :--- |\n| [in] | mat |\
    \ It is a real or complex array of dimension (0:n-1,0:n-1), which is the given\
    \ matrix |\n| [out] | B | B is an array of dimension (0:n-1,0:n-1), which is the\
    \ inverse of the matrix mat. |\n\n### Implementation\n\n```python\ndef inverse_matrix(self,mat):\n\
    \    \"\"\" Calculates the inverse of a matrix\n        Attributes:\n        \
    \    mat : Inverse of the array or matrix to be calculated.\n        Return: inverse\
    \ of matrix mat\n    \"\"\"\n    # Here we check the determinant of the matrix\
    \ $det(A) \\neq 0$\n    assert np.linalg.det(mat) != 0, \"Determinant of the matrix\
    \ is zero\"\n    return np.linalg.inv(mat)\n```\n\n### Example\n\nIn this example,\
    \ we will find the inverse of the real matrix given below:\n\n$$A = \\begin{pmatrix}\
    \ 1 & 2 & 3 \\\\ 3 & -2 & -5 \\\\ 7 & -2 & -3 \\end{pmatrix}$$\n\n```python\n\
    import numpy as np\nA=np.array([[1, 2, 3], [3, -2, -5], [7, -2, -3]])\nA_inv=linear_obj.inverse_matrix(A)\n\
    print(A_inv)\n```\n\nThe above code prints the following output,\n\n```\n[[ 0.125\
    \    0.       0.125 ]\n [ 0.8125   0.75    -0.4375]\n [-0.25    -0.5      0.25\
    \  ]]\n```\n\nSimilarly, we can find the inverse of a complex matrix given below:\n\
    \n$$A = \\begin{pmatrix} 1+i & 1+i \\\\ 3-3i & 4-i \\end{pmatrix}$$\n\n```python\n\
    A=np.array([[complex(1,1), complex(1,1)], [complex(3,-3), complex(4,-1)]])\nA_inv=linear_obj.inverse_matrix(A)\n\
    print(A_inv)\n```\n\nThe above code prints the following output,\n\n```\n[[-0.7-1.1j\
    \ -0.2+0.4j]\n [ 1.2+0.6j  0.2-0.4j]]\n```\n\n## 3.2 Function of a matrix\n\n\
    Given any square matrix $M$ of dimension $n \\times n$, we can ask the question,\
    \ what will be the sine of the matrix? [32] or what will be the power of the matrix?\
    \ It is known that any real continuous function $f(x)$ (or a complex analytic\
    \ function $f(z)$) has a Taylor series expansion around a point $a$ given by,\n\
    \n$$f(x) = \\sum_{n=0}^{\\infty} \\frac{f^{(n)}(a)}{n!} (x - a)^n, \\tag{3.8}$$\n\
    \nif the expansion is done around $a = 0$, it is called a Maclaurin expansion\
    \ which has the form,\n\n$$f(x) = \\sum_{n=0}^{\\infty} \\frac{f^{(n)}(0)}{n!}\
    \ x^n. \\tag{3.9}$$\n\nJust like any function above, any function of matrix $M$\
    \ also can be expanded using the Maclaurin expansion as follows,\n\n$$f(M) = \\\
    mathbb{I}f(0) + \\frac{f^1(0)}{1!} M + \\frac{f^2(0)}{2!} M^2 + \\frac{f^3(0)}{3!}\
    \ M^3 + \\cdots = \\sum_{n=0}^{\\infty} \\frac{f^n(0)}{n!} M^n. \\tag{3.10}$$\n\
    \nIf the matrix is diagonalizable, the above equation reduces to a matrix form\
    \ given as below,\n\n$$f(M) = P f(D) P^{-1}, \\tag{3.11}$$\n\nwhere $P$ is a matrix,\
    \ whose columns are made of the normalized eigenvectors of $M$ and $D$, is a diagonal\
    \ matrix which contains the eigenvalues of $M$ as diagonal elements. If $M$ is\
    \ a normal matrix, Eq. [3.10] is reduced to\n\n$$f(M) = U f(D) U^{\\dagger}, \\\
    tag{3.12}$$\n\nwhere $U$ is a unitary matrix. As we know almost all the problems\
    \ of physics and specially in quantum mechanics and quantum information theory\
    \ involves only Hermitian matrices, they are “compulsorily” diagonalizable, because\
    \ every Hermitian matrix is a normal matrix which can be diagonalized by a unitary\
    \ transform. Thus Eq. [3.12] can be used to find the function of matrices. We\
    \ require the exponential of a matrix when we study the time evolution of quantum\
    \ systems. In finding quantum entropies, we require the logarithm of a matrix\
    \ and in many other diverse areas of other functions of matrices like power and\
    \ trigonometric functions are used. Note that for matrices which are not diagonalizable,\
    \ these techniques can not be used and in such cases the power series with proper\
    \ truncation is used based on the accuracy of the results we require.\n\n### 3.2.1\
    \ For a real symmetric matrix\n\n```python\nfunction_smatrix(mat1,mode,log_base)\n\
    ```\n\n### Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- |\
    \ :--- |\n| [in] | mat1 | It is the symmetric matrix of dimension (0:n-1,0:n-1)\
    \ whose function of the matrix is to be calculated |\n| [in] | mode | It defines\
    \ the type of function of matrix. The allowed types of functions are shown below;\
    \ if mode='exp', it will compute exp(A). It is the default mode if mode='sin',\
    \ it will compute sin(A) if mode='cos', it will compute cos(A) if mode='tan',\
    \ it will compute tan(A) if mode='log', it will compute log(A) |\n| [in] | log_base\
    \ | It stores the base of the log function. The default value is equal to 2 |\n\
    | [out] | B | It is any array of dimension (0:n-1,0:n-1), which stores the function\
    \ of matrix mat1 |\n\n### Implementation\n\n```python\ndef function_smatrix(self,\
    \ mat1, mode=\"exp\",log_base=2):\n    \"\"\"\n    It calculates the function\
    \ of a real symmetric matrix.\n    Attributes:\n        mat1 : The symmetric matrix\
    \ of which function is to be calculated.\n        mode: Primarily calculates the\
    \ following,\n            mode='exp': Exponential of a matrix. It is the default\
    \ mode.\n            mode='sin': sine of a matrix.\n            mode='cos': cosine\
    \ of matrix.\n            mode='tan': tan of matrix.\n            mode='log':\
    \ Logarithm of a matrix, by default log base 2.\n        log_base: base of the\
    \ log function\n    Return: Function of symmetric matrix mat1\n    \"\"\"\n  \
    \  # Checking whether the matrix is symmetric or not, $M^T = M$\n    assert np.allclose(mat1,\
    \ np.matrix.transpose(mat1))==True, \\\n        \"The matrix entered is not a\
    \ symmetric matrix\"\n\n    # Checking whether the matrix is a square matrix or\
    \ not, $M_{n \\times n}$\n    assert mat1.shape[0] == mat1.shape[1], \\\n    \
    \    \"Entered matrix is not a square matrix\"\n\n    # Checking whether the entered\
    \ mode is valid or not\n    if mode not in [\"exp\",\"sin\",\"cos\",\"tan\",\"\
    log\"]:\n        raise Exception(f\"Sorry, the entered mode {mode} is not available\"\
    )\n```"
  mdcn: "## 3 数值线性代数运算\n\n在上一章完成了涉及向量和矩阵元素的基本操作后，本章我们将介绍一些主要线性代数运算的实现方法 [26, 29, 30]。从许多量子信息任务的角度来看，这些运算非常重要，并且在求解量子力学及其他领域的主要问题时也是必需的。更具体地说，本章广泛涉及矩阵分解、不同矩阵范数的计算、矩阵函数以及正交化过程\
    \ [25, 31]。然而，在本章中，我们特意没有包含一些在我们早期著作中已介绍的数值方法。做出这一决定的原因是，NumPy 库已经包含了这些方法，因此在我们的\
    \ **QuantumInformation** 库中再包含这些方法就显得多余了。NumPy 库中存在但未包含在我们库中的方法如下所列。\n\n| 方法 |\
    \ 描述 |\n| :--- | :--- |\n| **numpy.linalg.svd** | 计算矩阵的奇异值分解。 |\n| **numpy.kron**\
    \ | 执行两个数组的克罗内克积。 |\n| **numpy.linalg.qr** | 计算矩阵的 QR 分解。 |\n\n线性代数是数学的一个分支，研究向量、向量空间、线性映射以及线性方程组。然而，我们将研究那些与量子信息理论相关的主题。本章将讨论的所有方法都写在\
    \ **LinearAlgebra** 类中，而整个类都写在 Python 模块 **chap3_linearalgebra.py** 中。**LinearAlgebra**\
    \ 类中的方法也使用了来自 NumPy、Math、Cmath 和 SciPy 库的一些函数。在接下来的章节中，我们将使用以下矩阵来说明这些方法的工作原理：\n\
    \n对于一个实对称矩阵，\n\n$$A_1 = \\begin{pmatrix} 1 & -2 & 3 \\\\ -2 & 3 & 4 \\\\ 3 & 4\
    \ & 5 \\end{pmatrix}.$$\n(3.1)\n\n对于一个复厄米矩阵，\n\n$$A_2 = \\begin{pmatrix} 2 & 1-3i\
    \ \\\\ 1+3i & 4 \\end{pmatrix}.$$\n(3.2)\n\n对于一个实非对称矩阵，\n\n$$A_3 = \\begin{pmatrix}\
    \ 1 & -2 & 3 \\\\ 2 & 3 & 5 \\\\ -4 & 4 & 5 \\end{pmatrix}.$$\n\n对于一个复非对称矩阵，\n\
    \n$$A_4 = \\begin{pmatrix} 2 & 1-3i \\\\ 2+i & 4 \\end{pmatrix}.$$\n\n要从 **QuantumInformation**\
    \ 库中导入 **LinearAlgebra** 类，然后我们需要创建该类的一个对象。上述语句的编码可以如下完成：\n\n```python\n# 从 QuantumInformation\
    \ 库导入 LinearAlgebra 类\nfrom QuantumInformation import LinearAlgebra as LA\n\n\
    # 创建类的对象\nlinear_obj=LA()\n```\n\n## 3.1 矩阵的逆\n\n对于一个方阵 $A$，如果存在另一个矩阵 $B$ 使得 $AB\
    \ = BA = I$，则矩阵 $B$ 称为 $A$ 的逆。$A$ 的逆定义为 $A^{-1}$。矩阵 $A$ 的逆存在必须满足以下条件：\n\n- 矩阵\
    \ $A$ 的行列式必须非零，即 $\\det(A) \\neq 0$。\n- 矩阵 $A$ 必须是方阵。\n\n矩阵 $A$ 的逆可以通过以下数学表达式获得：\n\
    \n$$A^{-1} = \\frac{adj(A)}{\\det(A)},$$\n\n其中 $adj(A)$ 是其代数余子式矩阵的转置。\n\n### 3.1.1\
    \ 对于实矩阵或复矩阵\n\n```python\nlinear_obj.inverse_matrix(A)\n```\n\n### 参数\n\n| 输入/输出\
    \ | 参数 | 描述 |\n| :--- | :--- | :--- |\n| [in] | mat | 它是维度为 (0:n-1,0:n-1) 的实数或复数数组，即给定的矩阵\
    \ |\n| [out] | B | B 是维度为 (0:n-1,0:n-1) 的数组，即矩阵 mat 的逆。 |\n\n### 实现\n\n```python\n\
    def inverse_matrix(self,mat):\n    \"\"\" 计算矩阵的逆\n        属性:\n            mat\
    \ : 要计算逆的数组或矩阵。\n        返回: 矩阵 mat 的逆\n    \"\"\"\n    # 这里我们检查矩阵的行列式 $det(A)\
    \ \\neq 0$\n    assert np.linalg.det(mat) != 0, \"矩阵的行列式为零\"\n    return np.linalg.inv(mat)\n\
    ```\n\n### 示例\n\n在这个例子中，我们将找到下面给定实矩阵的逆：\n\n$$A = \\begin{pmatrix} 1 & 2 & 3 \\\
    \\ 3 & -2 & -5 \\\\ 7 & -2 & -3 \\end{pmatrix}$$\n\n```python\nimport numpy as\
    \ np\nA=np.array([[1, 2, 3], [3, -2, -5], [7, -2, -3]])\nA_inv=linear_obj.inverse_matrix(A)\n\
    print(A_inv)\n```\n\n上述代码打印以下输出：\n\n```\n[[ 0.125    0.       0.125 ]\n [ 0.8125\
    \   0.75    -0.4375]\n [-0.25    -0.5      0.25  ]]\n```\n\n类似地，我们可以找到下面给定复矩阵的逆：\n\
    \n$$A = \\begin{pmatrix} 1+i & 1+i \\\\ 3-3i & 4-i \\end{pmatrix}$$\n\n```python\n\
    A=np.array([[complex(1,1), complex(1,1)], [complex(3,-3), complex(4,-1)]])\nA_inv=linear_obj.inverse_matrix(A)\n\
    print(A_inv)\n```\n\n上述代码打印以下输出：\n\n```\n[[-0.7-1.1j -0.2+0.4j]\n [ 1.2+0.6j \
    \ 0.2-0.4j]]\n```\n\n## 3.2 矩阵函数\n\n给定任意 $n \\times n$ 维的方阵 $M$，我们可以问：矩阵的正弦是什么？[32]\
    \ 或者矩阵的幂是什么？已知任何实连续函数 $f(x)$（或复解析函数 $f(z)$）在点 $a$ 附近都有泰勒级数展开：\n\n$$f(x) = \\sum_{n=0}^{\\\
    infty} \\frac{f^{(n)}(a)}{n!} (x - a)^n, \\tag{3.8}$$\n\n如果展开是在 $a = 0$ 附近进行的，则称为麦克劳林展开，其形式为：\n\
    \n$$f(x) = \\sum_{n=0}^{\\infty} \\frac{f^{(n)}(0)}{n!} x^n. \\tag{3.9}$$\n\n\
    就像上面的任何函数一样，矩阵 $M$ 的任何函数也可以使用麦克劳林展开如下：\n\n$$f(M) = \\mathbb{I}f(0) + \\frac{f^1(0)}{1!}\
    \ M + \\frac{f^2(0)}{2!} M^2 + \\frac{f^3(0)}{3!} M^3 + \\cdots = \\sum_{n=0}^{\\\
    infty} \\frac{f^n(0)}{n!} M^n. \\tag{3.10}$$\n\n如果矩阵可对角化，上述方程简化为以下矩阵形式：\n\n$$f(M)\
    \ = P f(D) P^{-1}, \\tag{3.11}$$\n\n其中 $P$ 是一个矩阵，其列由 $M$ 的归一化特征向量组成，$D$ 是一个对角矩阵，其对角元素是\
    \ $M$ 的特征值。如果 $M$ 是正规矩阵，方程 [3.10] 简化为\n\n$$f(M) = U f(D) U^{\\dagger}, \\tag{3.12}$$\n\
    \n其中 $U$ 是一个酉矩阵。众所周知，几乎所有物理学问题，特别是量子力学和量子信息理论中的问题，只涉及厄米矩阵，它们是“强制”可对角化的，因为每个厄米矩阵都是正规矩阵，可以通过酉变换对角化。因此，方程\
    \ [3.12] 可用于求矩阵函数。当我们研究量子系统的时间演化时，我们需要矩阵的指数。在计算量子熵时，我们需要矩阵的对数，并且在许多其他不同领域中使用矩阵的其他函数，如幂函数和三角函数。注意，对于不可对角化的矩阵，这些技术不能使用，在这种情况下，根据我们所需的结果精度，使用适当截断的幂级数。\n\
    \n### 3.2.1 对于实对称矩阵\n\n```python\nfunction_smatrix(mat1,mode,log_base)\n```\n\n\
    ### 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :--- | :--- | :--- |\n| [in] | mat1 | 它是维度为 (0:n-1,0:n-1)\
    \ 的对称矩阵，要计算其矩阵函数 |\n| [in] | mode | 它定义矩阵函数的类型。允许的函数类型如下所示；如果 mode='exp'，它将计算\
    \ exp(A)。这是默认模式；如果 mode='sin'，它将计算 sin(A)；如果 mode='cos'，它将计算 cos(A)；如果 mode='tan'，它将计算\
    \ tan(A)；如果 mode='log'，它将计算 log(A) |\n| [in] | log_base | 它存储对数函数的底数。默认值等于 2 |\n\
    | [out] | B | 它是维度为 (0:n-1,0:n-1) 的任意数组，存储矩阵 mat1 的函数 |\n\n### 实现\n\n```python\n\
    def function_smatrix(self, mat1, mode=\"exp\",log_base=2):\n    \"\"\"\n    计算实对称矩阵的函数。\n\
    \    属性:\n        mat1 : 要计算函数的对称矩阵。\n        mode: 主要计算以下内容:\n            mode='exp':\
    \ 矩阵的指数。这是默认模式。\n            mode='sin': 矩阵的正弦。\n            mode='cos': 矩阵的余弦。\n\
    \            mode='tan': 矩阵的正切。\n            mode='log': 矩阵的对数，默认以 2 为底。\n   \
