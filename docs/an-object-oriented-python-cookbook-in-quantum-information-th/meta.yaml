    \ and $j$'th component of position and momentum respectively given by $[x_i, p_j]\
    \ = i\\hbar\\delta_{ij}$ from which the entire edifice of quantum mechanics is\
    \ built. It is also worth to mention here that if two physical observables do\
    \ not commute, then they cannot be diagonalized by a common set of eigenvectors,\
