    \  1.2644326 -0.59412461j]]\n```\n\n## 3.3 Power of a matrix\n\nConsider a square\
    \ matrix $A$ and positive number $k$, the $k^{th}$ power of the matrix $A$ is\
    \ defined as follows $A^k$. If the inverse of the matrix $A$ exist, then $A^{-k}$\
    \ can be calculated. The power of a square matrix $A$ can be found using the spectral\
    \ theorem as follows. Let us consider that the matrix $A$ is diagonalizable with\
    \ matrix $D$ containing the eigenvalues of $A$ along main diagonal, that is $D\
    \ = P^{-1}AP$, this implies $A = PDP^{-1}$. Multiplying these equations $k$ times\
    \ and using the fact that $PP^{-1} = P^{-1}P = \\mathbb{I}$, we can see that,\n\
    \n$$A^k = PD^kP^{-1}. \\tag{3.14}$$\n\nNote that in the above equations if $A$\
    \ is a Hermitian matrix, $A^k = UD^kU^\\dagger$, where $U$ is a unitary matrix.\
    \ Using Eq. [3.14], we can also calculate power of the matrix $A^{k'}$, where\
    \ $k'$ is a irrational number.\n\n### 3.3.1 For a real symmetric matrix\n\n```python\n\
    power_smatrix(mat1, k, precision=10**(-10))\n```\n\n### Parameters\n\n| in/out\
    \ | Argument | Description |\n|---|---|---|\n| [in/out] | mat1 | mat1 is a real\
    \ array of dimension (0:n-1,0:n-1) |\n| [in] | k | k is the power to which matrix\
    \ A is raised |\n| [in] | precision | If the absolute value of any eigenvalues\
    \ of mat1 is below precision, then it will consider those particular eigenvalues\
    \ to zero. The default value is $10^{-10}$ |\n| [out] | B | B is a complex or\
    \ real array of dimension (0:n-1,0:n-1), which will store the $k^{th}$ power of\
    \ matrix mat1 |\n\n### Implementation\n\n```python\ndef power_smatrix(self, mat1,\
    \ k, precision=10**(-10)):\n    \"\"\"\n    It calculates the power of a real\
    \ symmetric matrix.\n    Attributes:\n        mat1 : The matrix or array of which\
    \ power is to be calculated.\n        k : value of the power\n        precision:\
    \ if the absolute eigenvalues below the precision\n                   value will\
    \ be considered as zero\n    Return: k'th Power of symmetric matrix mat1\n   \
    \ \"\"\"\n    eigenvalues, eigenvectors, info = la.dsyev(mat1)\n    flag = 0\n\
    \    for i in eigenvalues:\n        # Checking any eigenvalues is negative\n \
    \       if i < 0.0:\n            flag = 1\n    # If all eigenvalues are +ve, then\
    \ D is real type\n    if flag == 0:\n        diag = np.zeros([eigenvectors.shape[0],\
    \ eigenvectors.shape[1]], dtype='float64')\n    # If any eigenvalues is -ve, then\
    \ D is complex type\n    else:\n        diag = np.zeros([eigenvectors.shape[0],\
    \ eigenvectors.shape[1]], dtype='complex_')\n    # Constructing D^k\n    for i\
    \ in range(0, eigenvectors.shape[0]):\n        if abs(eigenvalues[i]) <= precision:\n\
