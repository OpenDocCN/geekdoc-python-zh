    # 2.1 Inner product between two vectors


    Let there be two $n$ dimensional vectors $|v\rangle$ and $|w\rangle$ in a Hilbert
    space $\mathcal{H}$ of dimension $n$ defining a physical system, here $|v\rangle$
    and $|w\rangle$ are represented by $n \times 1$ column matrices. The inner product
    between these two vectors can be given in terms of matrix elements as


    $$c = \langle v|w\rangle = \sum_{i=1}^{n} v_i^* w_i, \quad (2.3)$$


    here, $v_i$ and $w_i$ are the $i^{th}$ entries or matrix elements of vectors $|v\rangle$
    and $|w\rangle$ respectively. The inner product is a very important operation
    in the space $\mathcal{H}$ as it is extensively used to understand properties
    such as orthogonality and normalization of vectors as these are ubiquitous in
    quantum mechanics.


