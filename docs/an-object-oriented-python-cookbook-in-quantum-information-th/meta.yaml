    \n$$S(\\rho_L) = \\sum_{i=1}^{d_L} \\lambda_i \\log_2 \\frac{1}{\\lambda_i}. \\\
    tag{5.17}$$\n\n利用凹函数的定义，上述方程转化为以下不等式，\n\n$$S(\\rho_L) = \\sum_{i=1}^{d_L} \\lambda_i\
    \ \\log_2 \\frac{1}{\\lambda_i} \\leq \\log_2 \\left( \\sum_{i=1}^{d_L} \\lambda_i\
    \ \\frac{1}{\\lambda_i} \\right), \\tag{5.18}$$\n$$S(\\rho_L) \\leq \\log_2(d_L).\
