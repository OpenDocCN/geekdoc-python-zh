    \ $\\rho_N$。此类系统的图示如图 (5.3) 所示。为了计算量子态中第 $i$ 个和第 $j$ 个量子比特之间的纠缠含量，我们首先计算双量子比特约化密度矩阵\
    \ $\\rho_{ij} = Tr_{ij^c}(\\rho_N)$。然后，使用约化密度矩阵 $\\rho_{ij}$，我们通过以下数学表达式计算并发度值（双量子比特纠缠含量）：\n\
