    equiv (1010)_2$、$(3)_{10} \\equiv (0011)_2$、$(12)_{10} \\equiv (1100)_2$ 和 $(5)_{10}\
    \ \\equiv (0101)_2$。这些位置由递归函数 **RecurChainRL4** 计算得出，其值将存储在列表中。此外，根据对应系数的符号是正还是负，这些位置值将分别乘以\
    \ $+1$ 或 $-1$ 的因子。对于所考虑的情况，生成的列表为 $[0, -3, -12, 15]$。\n\n## 4.3 $N$ 量子比特 Greenberger-Horne-Zeilinger\
    \ (GHZ) 态\n\nGHZ 态最初由 Daniel Greenberger、Michael Horne 和 Anton Zeilinger [49]\
    \ 研究。GHZ 态是三个量子比特的正交归一纠缠态，即\n\n$$|GHZ\\rangle = \\frac{|000\\rangle + |111\\rangle}{\\\
    sqrt{2}}. \\tag{4.39}$$\n\n将其推广到 $N$ 个量子比特（$N \\geq 3$）即得到 $N$ 量子比特 GHZ 态，可定义为\n\
    \n$$|GHZ\\rangle = \\frac{|0\\rangle^{\\otimes N} + |1\\rangle^{\\otimes N}}{\\\
    sqrt{2}} = \\frac{|00000\\cdots 0\\rangle_N + |11111\\cdots 1\\rangle_N}{\\sqrt{2}}.\
    \ \\tag{4.40}$$\n\n这些态被广泛应用于量子隐形传态 [50, 51]、量子密码协议 [52-54] 和量子博弈论 [55]。事实上，值得注意的是，$N$\
    \ 量子比特 GHZ 态是铁磁体的基态 [56]。三量子比特 GHZ 态（$N=3$ 的情况）的另一个有趣性质是，所有三个量子比特都是纠缠的，但没有任何两个量子比特是纠缠的。\n\
    \n```\nnGHZ(tot_spins=3)\n```\n\n### 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :--- | :---\
    \ | :--- |\n| [in] | tot_spins | 量子比特的总数。其默认值等于 3 |\n| [out] | state | 存储 GHZ\
    \ 态的实数数组 |\n\n### 实现\n\n```\ndef nGHZ(self,tot_spins=3):\n    \"\"\"\n    Construct\
    \ N-qubit GHZ state\n    Input:\n        tot_spins: it is the total number of\
    \ spins, it should be equal to\n                   or greater than 3.\n    Output:\n\
    \        state: N-qubit GHZ state.\n    \"\"\"\n    # Checking number of spins\
    \ N >= 3\n    assert tot_spins >= 3, \"Total number of spins are less than 3\"\
    \n    state=np.zeros([2**tot_spins])\n    # Constructing the |GHZ> state\n   \
    \ state[0]=1/np.sqrt(2)\n    state[(2**tot_spins)-1]=1/np.sqrt(2)\n    return\
    \ state\n```\n\n### 示例\n\n```\nstate=gt_obj.nGHZ(tot_spins=3)\nprint(state)\n\
    ```\n\n上述代码打印三量子比特 GHZ 态。\n\n```\n[0.70710678 0.         0.         0.       \
    \  0.         0.         0.        \n 0.70710678]\n```\n\n## 4.4 N 量子比特 W 态\n\n\
    W 态 [57] 是三个量子比特的纠缠量子态，可写为\n\n$$|W\\rangle = \\frac{1}{\\sqrt{3}} (|100\\rangle\
    \ + |010\\rangle + |001\\rangle).$$\n\n它在纠缠性质上与三量子比特 GHZ 态非常不同，即所有三个量子比特都是纠缠的，甚至两个量子比特的子系统也是纠缠的。同样有趣的是，构成\
    \ W 态的三个态中，量子比特 $|1\\rangle$ 相对于第一个态向右或向左移动了一位。将 W 态自然推广到 $N$ 量子比特的情况如下，\n\n$$|W\\\
    rangle = \\frac{1}{\\sqrt{N}} (|100\\cdots 0\\rangle + |010\\cdots 0\\rangle +\
    \ \\cdots + |000\\cdots 1\\rangle).$$\n\n```\nnW(tot_spins=3)\n```\n\n### 参数\n\
    \n| 输入/输出 | 参数 | 描述 |\n|---|---|---|\n| [in] | tot_spins | 量子比特的数量。其默认值等于 3 |\n\
    | [out] | state | 存储 W 态的实数数组 |\n\n### 实现\n\n```\ndef nW(self,tot_spins=3):\n\
    \    \"\"\"\n    Construct N-qubit W state\n    Input:\n        tot_spins: it\
    \ is the total number of spins, it should be equal to\n                   or greater\
    \ than 3.\n    Output:\n        state: N-qubit W state.\n    \"\"\"\n    # Checking\
    \ number of spins $N \\geq 3$\n    assert tot_spins >= 3, \"Total number of spins\
    \ are less than 3\"\n    # Constructing the $|W\\rangle$ state\n    state=np.zeros([2**tot_spins])\n\
    \    for i in range(0,tot_spins):\n        state[2**i]=1/np.sqrt(tot_spins)\n\
    \    return state\n```\n\n### 示例\n\n```\nstate=gt_obj.nW(tot_spins=3)\nprint(state)\n\
    ```\n\n上述代码打印三量子比特 W 态。\n\n```\n[0.    0.57735027  0.57735027  0.    0.57735027\
    \  0.    0.    0.]\n```\n\n## 4.5 广义 $N$ 量子比特 Werner 态\n\n两量子比特 Werner 态是希尔伯特空间中的特殊态，它们是纠缠的，但仍允许局域隐变量模型\
    \ [58]，并且是局域幺正不变态。两量子比特 Werner 态的密度矩阵如下所示，\n\n$$\\rho' = p|b_3\\rangle\\langle\
    \ b_3| + \\frac{1-p}{4}\\mathbb{I}_2, \\quad (4.43)$$\n\n其中 $|b_3\\rangle = (|00\\\
    rangle + |11\\rangle)/\\sqrt{2}$，$\\mathbb{I}_2$ 是维度为 $2^2 \\times 2^2$ 的单位矩阵。广义\
    \ $N$ 量子比特（$N \\geq 3$）Werner [49, 59] 态可以用 $N$ 量子比特 GHZ 态和 $N$ 量子比特最大混合态来表示，它们分别以概率\
    \ $p$ 和 $1-p$ 适当混合，\n\n$$\\rho(p) = p|GHZ\\rangle\\langle GHZ| + \\frac{1-p}{2^N}\\\
    mathbb{I}_N, \\quad (4.44)$$\n\n其中 $\\mathbb{I}_N$ 是维度为 $2^N \\times 2^N$ 的单位矩阵。\n\
    \n```\nnWerner(p,tot_spins=2)\n```\n\n### 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :--- |\
    \ :--- | :--- |\n| [in] | p | 混合概率 |\n| [in] | tot_spins | 存储量子比特的总数 |\n| [out]\
    \ | rho | 存储 Werner 态的密度矩阵 |\n\n### 实现\n\n```\ndef nWerner(self,p,tot_spins=2):\n\
    \    \"\"\"\n    Construct N-qubit Werner state\n    Input:\n        tot_spins:\
    \ it is the total number of spins, it should be equal to\n                   or\
    \ greater than 2.\n        p: it is the mixing probability\n    Output:\n    \
    \    rho: N-qubit Werner state.\n    \"\"\"\n    # Checking total number of spins\
    \ $N \\geq 2$\n    assert tot_spins >= 2, \"Total number of spins are less than\
    \ 2\"\n    qobj=QM()\n    # If $N = 2$ then $|GHZ\\rangle = |b_3\\rangle$\n  \
    \  if tot_spins == 2:\n        state=self.bell3()\n    else:\n        state=self.nGHZ(tot_spins=tot_spins)\n\
    \    den=qobj.outer_product_rvec(state,state)\n    # Constructing the identity\
    \ matrix $\\mathbb{I}_N$\n    identity=np.identity(2**tot_spins, dtype = 'float64')\n\
    \    identity=identity*(1/(2**tot_spins))\n    # Finally constructing the N-qubit\
    \ Werner state $\\rho(p)$\n    rho=(p*den)+((1-p)*identity)\n    return rho\n\
    ```\n\n### 示例\n\n```\nstate=gt_obj.nWerner(p=0.5,tot_spins=2)\nprint(state)\n\
    ```\n\n上述代码打印如公式 [4.43] 所示的两量子比特广义 Werner 态。\n\n```\n[[0.375 0.    0.    0.25\
    \ ]\n [0.    0.125 0.    0.   ]\n [0.    0.    0.125 0.   ]\n [0.25  0.    0.\
    \    0.375]]\n```\n\n## 4.6 香农熵\n\n香农熵是用于衡量数据比特流信息熵的度量标准。香农熵的数学定义如下，它量化了平均需要多少信息才能从分布中识别随机样本。给定一个离散随机变量\
    \ $X$，其结果 $\\{x_i; i = 1, \\cdots N\\}$ 分别以相应的概率 $\\{p_i(x); i = 1, \\cdots N\\\
    }$ 发生，则上述离散概率集的香农熵 [60] 为，\n\n$$H(p) = -\\sum_{i=1}^{N} p_i(x) \\log_2 p_i(x).\
    \ \\tag{4.45}$$\n\n香农熵是应用最广泛的信息论度量标准之一。注意，当 $N = 2$ 时，相应的熵称为二元熵，即\n\n$$H_b(p)\
    \ = -p \\log_2 p - (1 - p) \\log_2 (1 - p). \\tag{4.46}$$\n\n香农熵在计算互信息和条件熵 [61]\
    \ 等量时很有用。\n\n**shannon_entropy(pvec)**\n\n### 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :---\
    \ | :--- | :--- |\n| [in] | pvec | 包含概率的实数数组 |\n| [out] | se | 香农熵的值 |\n\n###\
    \ 实现\n\n```\ndef shannon_entropy(self,pvec):\n    \"\"\"\n    Calculates the Shannon\
    \ entropy\n    Input:\n        pvec: column vector which contains probabilities\n\
    \    Output:\n        se: it returns the Shannon entropy value\n    \"\"\"\n \
    \   size=pvec.shape[0]\n    se=0.0 # It stores Shannon entropy value $H(p)$\n\
    \    for i in range(0,size):\n        # Checking probability $p$ is bounded between\
    \ $0 \\le p \\le 1$\n        assert pvec[i]<=1 and pvec[i] >=0, \"probability\
    \ values are incorrect\"\n        se=se-(pvec[i] *math.log2(pvec[i]))\n    return\
    \ se\n```"
