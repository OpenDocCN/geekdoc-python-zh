    +   1. **Inheritance**: One class (child class) inherits the attributes and method
    of another class (parent class).

    2. **Encapsulation**: It deals with security, which means that it hides the data
    access to outsiders.

    3. **Polymorphism**: Poly means many and morph means form. It refers to functions
    or methods having the same name but different functionality.

    4. **Data abstraction**: It hides the internal details of a method or function.


    From the above discussion, it might seem that OOPs is a powerful style of coding,
    however, it has its pros and cons. The advantage of using the OOPs style of coding
    is given below.


    +   - **Improved software-development productivity**: Due to the modularity, extensibility
    and reusability of OOPs, it is best suited for software-development productivity
    over traditional procedure-based programming techniques.

    - **Faster development**: Due to reusability and a large number of libraries of
    OOPs which are already available for wider usage makes it easier to develop codes.

    - **Improved software maintainability**: It is easier to maintain because of the
    modular structure of coding. The part of the system which needs to be updated
    or modified can be achieved without modifying the entire system.


    There are a few disadvantages of using the OOPs style of coding, and there are
    listed below.


    +   - **Large program size**: Compared to procedural programming, the OOPs have
    extra lines of code.

    - **Slower programs**: Compared to procedural programming codes, the OOPs codes
