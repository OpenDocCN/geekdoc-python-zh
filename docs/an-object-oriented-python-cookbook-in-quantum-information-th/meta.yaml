  md: "The doubly degenerate ground states can be simply written as,\n\n$$|R_N\\rangle\
    \ = [1\\ 2] \\otimes [3\\ 4] \\otimes \\dots \\otimes [N-1\\ N], \\quad |L_N\\\
    rangle = [2\\ 3] \\otimes [4\\ 5] \\otimes \\dots \\otimes [N\\ 1], \\quad (4.20)$$\n\
    \nwhere each of the two-qubit elemental blocks are, $[i\\ i+1] = \\frac{1}{\\\
    sqrt{2}}(|01\\rangle_{ii+1} - |10\\rangle_{ii+1})$, and $N$ (even number) represents\
    \ the system size. From Eq. [4.20] we observe that the $|L_N\\rangle$ state can\
    \ be constructed by translationally shifting the $|R_N\\rangle$ state to the right.\
    \ Based on the above discussion, in our following methods, we provide the options\
    \ of constructing $N$ tensor product of any of the four Bell states and also its\
    \ translationally shifted state.\n\n# 4.2.1 $N/2$ tensor product of $|b_1\\rangle$\
    \ Bell state\n\nIn this method, we can construct any one of the two states,\n\n\
    $$|\\phi_1\\rangle = \\frac{1}{2^{N/4}} (|01\\rangle_{12} + |10\\rangle_{12})\
    \ \\otimes (|01\\rangle_{34} + |10\\rangle_{34}) \\otimes \\dots \\otimes (|01\\\
    rangle_{N-1N} + |10\\rangle_{N-1N}), \\quad (4.21)$$\n\nand\n\n$$|\\phi_2\\rangle\
    \ = \\frac{1}{2^{N/4}} (|01\\rangle_{23} + |10\\rangle_{23}) \\otimes (|01\\rangle_{45}\
    \ + |10\\rangle_{45}) \\otimes \\dots \\otimes (|01\\rangle_{N1} + |10\\rangle_{N1}),\
    \ \\quad (4.22)$$\n\nThe following method uses the function **RecurChainRL1**\
    \ from the module **RecurNum**, and the functionality of **RecurChainRL1** has\
    \ been explained at the end of this section.\n\n```\nbell1(tot_spins=2,shift=0)\n\
    ```\n\n# Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | tot_spins | It stores the total number of spins ($N$), and it must\
    \ be even number. The default value is 2 |\n| [in] | shift | It can take only\
    \ the following values,<br>- shift=0, generates the state $|\\phi_1\\rangle$.\
    \ It is the default value<br>- shift=1, generates the state $|\\phi_2\\rangle$\
    \ |\n| [out] | state | It is a real array which stores either the state $|\\phi_1\\\
    rangle$ or $|\\phi_2\\rangle$. |\n\n# Implementation\n\n```\ndef bell1(self,tot_spins=2,shift=0):\n\
    \    \"\"\"\n    Construct N tensor products of the |bell1> or T|bell1> Bell state\n\
    \    Input:\n        tot_spins: The total number of spins\n        shift: for\
    \ value 0 we get |bell1> and for value 1 T|bell1>.\n    Output:\n        state:\
    \ the result will be |bell1> or T|bell1> state.\n```"
