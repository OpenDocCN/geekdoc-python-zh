    \ ratio is = {PR}\")\n```\n\nThe preceding code generates the following output.\n\
    \n```\nThe participation ratio is = 2.0\n```\n\n## 4.8 Relative entropy\n\nThe\
    \ closeness between two probability distributions with respect to the quantum\
