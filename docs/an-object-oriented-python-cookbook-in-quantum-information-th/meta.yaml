    psi_R\\rangle = \\begin{pmatrix} 0 \\\\ c_2 \\\\ c_3 \\\\ 0 \\\\ c_1 \\\\ 0 \\\
    \\ 0 \\\\ 0 \\end{pmatrix}$。 (2.25)\n\n要将量子态左移或右移 $k$ 次，我们需要连续作用 $\\hat{T}_L$\
    \ 或 $\\hat{T}_R$ 共 $k$ 次。\n\n### 2.11.1 对于实态\n\n```\nrstate_shift(vec,shift=1,shift_direction='right')\n\
    ```\n\n### 参数\n\n| 输入/输出 | 参数 | 描述 |\n|---|---|---|\n| [in] | vec | vec 是一个实量子态\
