    there is a quantum mechanical spin half particle either pointing along “up ($|\uparrow\rangle$)”
    or “down ($|\downarrow\rangle$)” which are respectively denoted by $|0\rangle$
    and $|1\rangle$. Having the above discussed facts in mind, we can proceed further.
    All the recipes given below are for both PBC’s and OBC’s which can be chosen as
