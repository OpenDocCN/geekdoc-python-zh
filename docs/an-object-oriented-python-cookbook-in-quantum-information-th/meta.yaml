    \ (OOPs) [16] 的概念可以单独写一章，然而，在本书中，该主题被浓缩为一节。许多现实世界的问题可以使用 OOPs 进行建模。第 2 章到第 7 章开发的代码都是用\
    \ OOPs 编写的，并具有 Python 语言中最先进的数据结构特性。OOPs 的基本组成部分如下：\n\n- 对象\n- 类\n- 方法\n\nOOP\
