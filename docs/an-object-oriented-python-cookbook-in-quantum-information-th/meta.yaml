    [[ 1.+1.j 10.+0.j]\n [25.+0.j 31.-9.j]]\n```\n\n## 2.8 二进制转十进制\n\n在数学中，二进制数使用*二进制*（*base-2*）数系表示，该数系仅使用‘0’和‘1’来表示数字，这些数字被称为比特。任何二进制数都可以使用比特值轻松转换为十进制，方法如下。假设我们有一个二进制字符串\
    \ $[a_1a_2a_3 \\cdots a_n]_2$，其中每个 $a_i$ 的值只能是0或1。要将二进制字符串转换为等效的十进制数，我们有：\n\n\
    $$[a_1a_2a_3 \\cdots a_n]_2 = a_1 2^{n-1} + a_2 2^{n-2} + \\cdots + a_{n-1} 2^1\
    \ + a_n 2^0, \\tag{2.18}$$\n\n这里遵循从右到左的约定。二进制到十进制的转换在量子力学和量子信息理论中是一个非常重要的操作，因为量子系统的状态（指纯态）是由一串零和一来表示的。例如，两个电子的状态可以表示为\
    \ $|00\\rangle = |\\uparrow\\uparrow\\rangle$，$|01\\rangle = |\\uparrow\\downarrow\\\
    rangle$，$|10\\rangle = |\\downarrow\\uparrow\\rangle$ 和 $|11\\rangle = |\\downarrow\\\
    downarrow\\rangle$。当我们需要操作这些状态时，这种状态的比特表示及其对应的十进制等效值就变得非常方便。例如，上述状态的十进制等效值可以写为\
    \ $|00\\rangle = |0\\rangle$，$|01\\rangle = |1\\rangle$，$|10\\rangle = |2\\rangle$\
    \ 和 $|11\\rangle = |3\\rangle$。这种表示可以轻松扩展到多量子比特状态，例如，一个具有四个电子的状态可以是 $|1010\\rangle\
    \ = |\\downarrow\\uparrow\\downarrow\\uparrow\\rangle = |10\\rangle$ 所给状态之一。这种十进制表示的主要优点在于，我们不再处理可能令人疲惫的一串数字，而只处理一个数字。\n\
    \n```\nbinary_decimal(vec)\n```\n\n### 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :--- | :---\
    \ | :--- |\n| [in] | vec | vec 是一个包含二进制矩阵元素（即0或1）的NumPy数组 |\n| [out] | dec | dec\
