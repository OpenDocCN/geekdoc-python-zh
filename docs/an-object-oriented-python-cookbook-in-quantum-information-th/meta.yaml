    ```\nmylist=['quantum', 'mechanics', 1, complex(2,3), 3.8]\nfor i in mylist:\n\
    \    print(i)\n```\n\n这将输出：\n\n```\nquantum\nmechanics\n1\n(2+3j)\n3.8\n```\n\n\
