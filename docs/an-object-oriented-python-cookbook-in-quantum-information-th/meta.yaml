    \n| Input | Output |\n| :---: | :---: |\n| $|0\\rangle$ | $|1\\rangle$ |\n| $|1\\\
    rangle$ | $|0\\rangle$ |\n\nsx(N=1)\n\n### Parameters\n\n| in/out | Argument |\
    \ Description |\n| :--- | :--- | :--- |\n| [in] | N | It signifies the number\
    \ of qubits. Its default value is equal to 1 |\n| [out] | sigmax | sigmax is a\
    \ real array of dimension $(0:2^N-1, 0:2^N-1)$, which is the $N$-qubit Pauli-X\
