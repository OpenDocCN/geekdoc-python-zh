    \ real or complex chosen from any random distribution, here we use the uniform\
    \ and Gaussian distribution, such that $\\sum_{j=1}^{n} |c_j|^2 = 1$. Note that,\
    \ $|j\\rangle$ is the computational basis. Random quantum states are solely defined\
    \ analytically based on the normalization condition only which is identical to\
    \ the equation of a $n$-dimensional unit sphere. This probability distribution\
    \ is proportional to the Dirac delta function such that the $P(c_1, c_2, \\dots,\
    \ c_n) \\propto \\delta(\\sum_{j=1}^{n} |c_j|^2 - 1)$.\n\n# 7.10.1 Random real\
