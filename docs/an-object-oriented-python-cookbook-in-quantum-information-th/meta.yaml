    \n```python\ndef <function_name>(<argument1>, <argument2>, ....):\n    <body of\
    \ the function>\n<main body of the program>\n```\n\n请注意，函数可以是无参数的，这意味着函数不接受任何输入参数。下面展示了一些函数的示例。\n\
