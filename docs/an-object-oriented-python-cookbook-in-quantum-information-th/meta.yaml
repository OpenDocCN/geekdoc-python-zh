    # 1


    # Introduction to Python and Object-Oriented Programming


    In this chapter we give a standalone introduction to the Object-Oriented Python
    Programming language. Python name was conceived in the late 1980s by the Dutch
    programmer Guido van Rossum [1]. Since the first release of Python on February
    20, 1991, the Python programming community has grown at a rapid pace, and now
    a lot of people talk about the eminence of the Python programming language. Therefore,
    the question arises, what makes Python so much powerful? The answer to this question
    not only lies in the fact that Python is a general-purpose, dynamic, high-level
    language, simple and short coding style, but it also behaves like a glue-language,
    which can interact with other programming languages and their libraries [2], such
    as C [3], C++ [4] and FORTRAN [5, 6]. These are the reasons which makes Python
    as the favourite programming language in the field of science [7], engineering
    [8], data analysis [9], machine learning [10] etc.


    However, every strength comes with its weakness, and in this case, it is the execution
    speed. Python is an interpreted language in which source code does not get directly
    compiled into machine instructions, rather each statement is executed at run-time
    by sequentially feeding it into an interpreter loop. In short, the framework of
    source code implementation in Python is as follows,


    +   1. Translate the source code to an intermediate format known as *byte code*
    [11]. Byte code provides the advantage of portability, which means that it is
    a platform-independent format.

    2. In the following step, the interpreter interprets the *byte code*.


    All the above points convey that Python codes are not compiled directly into binary
    code like C++ or FORTRAN. Consequently, the codes written in Python are comparatively
    slower when compared to compiled languages, such as C, which converts the source
    code to binary code and then executes it. However, counter-arguments to Python
    being slow are given as follows, rewrite codes with better data structure and
    algorithms or write performance-intensive parts of the code in any compiled language,
    and then expose the functionality later in Python. Covering every aspect of Python
    in this book is impossible, and therefore, in this chapter, we introduce the basic
    syntax in Python. All codes written in this book run smoothly for Python version
    3.7.9 and higher. There are several ways by which we can run a Python program,
    but the simplest one is through a terminal (or command prompt in Windows). In
    a terminal, if you type Python at the command prompt, it will display some information
    about the installed Python version in your computer, for example,


    ```

    $ python

    Python 3.7.9 (default, Aug 31 2020, 12:42:55)

    [GCC 7.3.0] :: Anaconda, Inc. on linux

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```'
