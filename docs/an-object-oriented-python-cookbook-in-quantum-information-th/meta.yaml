- md: "## 7.11 Random density matrices\n\nA random density matrix [141, 142] $\\rho$\
    \ can be generated using a real or a complex Ginibre matrix $G$ as follows,\n\n\
    $$\\rho = \\frac{GG^\\dagger}{Tr(GG^\\dagger)}$$\n\nThe matrix $\\rho$ is by construction\
    \ Hermitian, positive definite and normalized. The ensemble so generated is called\
    \ the Hilbert–Schmidt ensemble.\n\n### 7.11.1 Random real density matrix\n\n```\n\
    subroutine RANDDMR(d,state)\n```\n\n# Parameters\n\n| In/Out | Argument | Description\
    \ |\n| :--- | :--- | :--- |\n| [in] | N | It is the number of qubits |\n| [out]\
    \ | rden | It is array of dimension (0:2^N-1,0:2^N-1) which is the random real\
    \ density matrix |\n\n# Implementation\n\n```\ndef random_rden(self,N):\n    \"\
    \"\"\n    Constructs a random real pure density matrix\n    Input:\n        N:\
    \ number of qubits\n    Output:\n        rden: real random density matrix\n  \
    \  \"\"\"\n    rden=self.random_real_wishart(2**N)\n    rden=rden/np.trace(rden)\n\
    \    return rden\n```\n\n# Example\n\n```\nrden=qobj.random_rden(4)\n```\n\nIn\
    \ the above example, the rden variable holds a 2^4 × 2^4 real density matrix.\n\
    \n### 7.11.2 Random complex density matrix\n\n```\nsubroutine RANDDMC(d,state)\n\
    ```\n\n# Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | N | It is the number of qubits |\n| [out] | cden | It is array of\
    \ dimension (0:2^N-1,0:2^N-1) which is the random complex density matrix |\n\n\
    # Implementation\n\n```\ndef random_cden(self,N):\n    \"\"\"\n    Constructs\
    \ a random complex pure density matrix\n    Input:\n        N: number of qubits\n\
