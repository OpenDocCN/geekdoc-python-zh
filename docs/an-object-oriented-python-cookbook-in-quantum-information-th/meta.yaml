  md: "![](img/399db50605732b77c027490148680903_168_0.png)\n\nFIGURE 5.3: $N$-qubit\
    \ quantum system, and the quantum state is denoted by $\\rho_N$.\n\nthe concurrence\
    \ value (two-qubit entanglement content) by the following mathematical expression:\n\
    \n$$C_{ij} = \\text{Max} \\left(0, \\sqrt{\\lambda_1} - \\sqrt{\\lambda_2} - \\\
    sqrt{\\lambda_3} - \\sqrt{\\lambda_4}\\right).$$ (5.9)\n\nHere $\\lambda_i$'s\
    \ are the eigenvalues of the matrix $\\rho_{ij}\\tilde{\\rho}_{ij}$ in the non-increasing\
    \ order. The matrix $\\tilde{\\rho}_{ij}$ is defined as,\n\n$$\\tilde{\\rho}_{ij}\
    \ = (\\sigma_y \\otimes \\sigma_y)\\rho_{ij}^*(\\sigma_y \\otimes \\sigma_y).$$\
    \ (5.10)\n\nNote carefully that if we have any pure or mixed state of $N$ qubits\
    \ and once we have the reduced density matrix between any two qubits $i$ and $j$\
    \ as $\\rho_{ij}$, we can directly use the above prescription to calculate concurrence.\
    \ It is worth mentioning that it is a measure of entanglement that has a closed-form\
    \ expression for two-qubit states and at the same time cannot be generalized easily\
    \ to higher dimensions. Note that in the recipes given, we can calculate the concurrence\
    \ of any pair $ij$ ($i < j$) of a $N$-qubit state or a density matrix.\n\n# 5.3.1\
    \ For a real or complex state\n\n```\nconcurrence_vec(state,i,j,eps=10**(-13))\n\
    ```\n\n# Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | state | It is a real or complex array of dimension ($0:2^N-1$),\
    \ which is the input state |\n| [in] | i, j | It stores the place values of the\
    \ qubits. Both of them can store any integer value between 1 and $N$ |\n| [in]\
    \ | eps | If the magnitude of any of the eigenvalues of $\\rho_{ij}\\tilde{\\\
    rho}_{ij}$ is less than eps, then that particular value will be considered equal\
    \ to zero. The default value is equal to $10^{-13}$ |\n| [out] | conc | It returns\
    \ the value of concurrence between qubits i and j specified above |\n\n# Implementation\n\
    \n```\ndef concurrence_vec(self,state,i,j,eps=10**(-13)):\n    \"\"\"\n    Calculation\
    \ of concurrence for a quantum state\n    Parameters\n```"
