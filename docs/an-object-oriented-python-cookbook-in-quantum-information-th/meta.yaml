    ```\n\n## 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :--- | :--- | :--- |\n| [in] | tup | 它保存输出矩阵维度的信息\
    \ |\n| [in] | low | 它是范围的最低值。其默认值为 0 |\n| [in] | high | 它是范围的最高值。其默认值等于 1 |\n\
    | [out] | uniform_state | 它是变量 tup 中指定维度的数组，是一个随机实矩阵 |\n\n## 实现\n\n```\ndef random_unifrom_rvec(self,tup,low=0.0,high=1.0):\n\
