    quantum mechanics is represented as a Hermitian operator and thereby it has a
    matrix representation in a given basis. Keeping these in mind, we have developed
    methods which involve vector-vector and matrix-matrix operations [25, 26]. Not
    only that since these multi-qubit quantum states can be represented as binary
    strings, much simplifications can be done in programming by a clever interconversion
    of binary and decimal entities. To elucidate more, any operation involving a product
    of $2^N \times 2^N$ matrix with a $2^N \times 1$ column vector, just boils down
    to an operation of the given operator on the bits rather than the whole $2^N$
    qubit state. The power of such a simplification can be realized when we construct
    the Hamiltonian matrix.


