    \ and Renyi index $\\alpha \\ge 0$. Renyi entropy is defined as follows,\n\n$$S_\\\
    alpha = \\frac{1}{1-\\alpha} \\log Tr(\\rho^\\alpha).$$\n\nHere $\\alpha$ varies\
    \ from 0 to $\\infty$ such that $\\alpha \\neq 1$, $\\rho$ is a density matrix\
    \ or reduced density matrix describing the state of the system. In the limit $\\\
    alpha \\to 1$, the Renyi entropy approaches the von Neumann entanglement entropy.\
    \ Renyi entropy is used in many areas of quantum information theory.\n\n# 5.5.1\
    \ For a real or complex density matrix\n\n```\nrenyi_entropy(rho,alpha)\n```\n\
