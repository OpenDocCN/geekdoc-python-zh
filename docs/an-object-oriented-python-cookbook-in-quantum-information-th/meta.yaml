    \    # Next for loop calculates, T_L|ψ⟩ or T_R|ψ⟩, as per choice\n    for i in\
    \ range(0,vec.shape[0]):\n        if vec[i] != 0.0:\n            basis=self.decimal_binary(i,N)\n\
    \            basis=self.binary_shift(basis,shift=shift,\n                    \
    \                shift_direction=shift_direction)\n            j=int(self.binary_decimal(basis))\n\
    \            state2[j]=vec[i]\n\n    return state2\n```\n\n### Example\n\nIn this\
    \ example, we left shift the following quantum state by 1 position to left\n\n\
    $|\\psi\\rangle = 0.218218|001\\rangle + 0.436436|010\\rangle + 0.872872|100\\\
    rangle$. (2.26)\n\n```\nA = np.array([0, 0.218218, 0.436436, 0, 0.872872, 0, 0,\
    \ 0])\nA=quantum_obj.normalization_vec(A)\nB=quantum_obj.rstate_shift(A,shift=1,shift_direction='left')\n\
    print(B)\n```\n\nThe above code prints the left shifted quantum state as shown\
    \ below:\n\n```\n[0. 0.87287156 0.21821789 0. 0.43643578 0. 0. 0.]\n```\n\n###\
    \ 2.11.2 For a complex state\n\n```\ncstate_shift(vec,shift=1,shift_direction='right')\n\
    ```\n\n### Parameters\n\n| in/out | Argument | Description |\n|---|---|---|\n\
    | [in] | vec | vec is a complex quantum state |\n| [in] | shift | It is the degree\
    \ of translational shift towards left or right direction. By default, the value\
    \ is 1 |\n| [in] | shift_direction | It can take only the following values, <br>\
    \ • shift_direction = ‘right’ ⇒ right direction shift, and it is the default value\
    \ <br> • shift_direction = ‘left’ ⇒ left direction shift |\n| [out] | state2 |\
    \ It is the translationally shifted quantum state of the state vec |\n\n### Implementation\n\
    \n```\ndef cstate_shift(self,vec,shift=1,shift_direction='right'):\n    \"\"\"\
    \n    Shifting of a complex quantum state\n    Inputs:\n        vec: complex quantum\
    \ state.\n        shift: degree of the state.\n        shift_direction: It shows\
    \ the direction of the shift, by default it is right\n    Return:\n        state2:\
    \ shifted state of vec\n    \"\"\"\n    # Checks whether entered state is written\
    \ in 2^N vector space\n    assert vec.shape[0]%2==0,\"Not a qubit quantum state\"\
    \n    # N stores the number of qubits\n    N=int(math.log(vec.shape[0],2))\n \
    \   # basis vector stores binary strings of any computational basis\n    basis=np.zeros([N],dtype=int)\n\
    \    # state2 will store the shifted quantum state\n    state2=np.zeros([2**N],dtype=np.complex_)\n\
    \    # Next for loop calculates, T_L|ψ⟩ or T_R|ψ⟩, as per choice\n    for i in\
    \ range(0,vec.shape[0]):\n        if vec[i] != complex(0.0,0.0):\n           \
    \ basis=self.decimal_binary(i,N)\n            basis=self.binary_shift(basis,shift=shift,\n\
    \                                    shift_direction=shift_direction)\n      \
    \      j=self.binary_decimal(basis)\n            state2[j]=vec[i]\n\n    return\
    \ state2\n```\n\n### Example\n\nIn this example, we right shift the following\
    \ quantum state by 1 position to the left\n\n$|\\psi\\rangle = (0.141776 + 0.212664i)|001\\\
    rangle + (0.283552 + 0.354441i)|010\\rangle + (0.567104 + 0.637993i)|100\\rangle$.\n\
    \n```\nA = np.array([0, complex(0.141776 , 0.212664), complex(0.283552 ,\n   \
    \         0.354441),0, complex(0.567104 , 0.637993), 0, 0, 0])\nB=quantum_obj.cstate_shift(A,shift=1,shift_direction='right')\n\
    f = open('shifted_state.txt','w')\nfor row in B:\n    f.write(str(row))\n    f.write('\\\
    n')\nf.close()\n```\n\nThe entries in the text file `shifted_state.txt` is shown\
    \ below:\n\n```\n0j\n(0.283552+0.354441j)\n(0.567104+0.637993j)\n0j\n(0.141776+0.212664j)\n\
    0j\n0j\n0j\n```\n\n## 2.12 Complete example\n\nIn this section, we provide mathematical\
    \ description of a quantum mechanical problem, thereafter we show the complete\
    \ Python code for the benefit of the readers. We first create a two-qubit non-normalized\
    \ quantum state as shown below.\n\n$|\\psi_1\\rangle = (1\\ 2\\ 3\\ 4)^T$. (2.27)\n\
    \nIn order to normalize the state in Eq. [2.27], we will use the standard prescription,\n\
    \n$|\\widetilde{\\psi_1}\\rangle = \\frac{|\\psi_1\\rangle}{\\sqrt{\\langle\\\
    psi_1|\\psi_1\\rangle}}$. (2.28)\n\nThereafter, we form the outer product of the\
    \ state $|\\widetilde{\\psi_1}\\rangle$ in order to create the pure state density\
    \ matrix $\\rho_1$ as shown below.\n\n$\\rho_1 = |\\widetilde{\\psi_1}\\rangle\\\
    langle\\widetilde{\\psi_1}|$. (2.29)\n\nAs another example, we create a single\
    \ qubit normalized quantum state shown below.\n\n$|\\psi_2\\rangle = \\left(\\\
    frac{1}{\\sqrt{2}}\\ \\frac{1}{\\sqrt{2}}\\right)^T$. (2.30)\n\nWe now take the\
    \ tensor product of the state $|\\psi_2\\rangle\\langle\\psi_2|$ with the density\
    \ matrix in Eq. [2.29] to obtain another density matrix $\\rho$ as,\n\n$\\rho\
    \ = \\rho_1 \\otimes \\rho_2 = |\\widetilde{\\psi_1}\\rangle\\langle\\widetilde{\\\
    psi_1}| \\otimes |\\psi_2\\rangle\\langle\\psi_2|$. (2.31)\n\nThe code for the\
    \ above quantum task is shown below.\n\n```\nimport numpy as np\nfrom QuantumInformation\
    \ import QuantumMechanics as QM\n\nquantum_obj=QM()\n\n# Constructing the state\
    \ $|\\psi_1\\rangle$\nv1=np.array([1.0,2.0,3.0,4.0])\n# Normalizing the state\
    \ $|\\psi_1\\rangle$\nv1=quantum_obj.normalization_vec(v1)\n# Creating the pure\
    \ state density matrix $\\rho_1$\nrho_1=quantum_obj.outer_product_rvec(v1,v1)\n\
    # Constructing the state $|\\psi_2\\rangle$\nv2=np.array([1.0/np.sqrt(2),1/np.sqrt(2)])\n\
    # Finally constructing the density matrix $\\rho = \\rho_1 \\otimes \\rho_2$\n\
    rho=quantum_obj.tensor_product_matrix(rho_1,\n                               \
    \     quantum_obj.outer_product_rvec(v2,v2))\n\nprint(\"Trace of the final density\
    \ matrix =\",np.matrix.trace(rho))\n```\n\nThe above code generate prints the\
    \ following result\n\nTrace of the final density matrix = 0.9999999999999997"
  mdcn: "## 2.11 量子态平移\n\n本节我们将开发一个数值函数，用于评估由计算基矢张成的量子态的平移。量子态平移的概念将通过一个例子来解释：考虑一个三量子比特态，其形式如下，\n\
