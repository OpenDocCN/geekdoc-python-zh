    \    # 如果有任何特征值为负，则 D 为复数类型\n    else:\n        diag = np.zeros([eigenvectors.shape[0],\
    \ eigenvectors.shape[1]], dtype='complex_')\n    # 构造 D^k\n    for i in range(0,\
    \ eigenvectors.shape[0]):\n        if abs(eigenvalues[i]) <= precision:\n    \
    \        diag[i, i] = 0.0\n            eigenvalues[i] = 0.0\n        if eigenvalues[i]\
    \ < 0.0:\n            diag[i, i] = pow(abs(eigenvalues.item(i)), k) * pow(complex(0,\
    \ 1), 2 * k)\n        else:\n            diag[i, i] = pow(eigenvalues.item(i),\
    \ k)\n    # 构造 OD^kO^T，其中 O 是正交矩阵\n    diag = np.matmul(np.matmul(eigenvectors,\
    \ diag), np.transpose(eigenvectors))\n    return diag\n```\n\n### 示例\n\n在此示例中，我们计算矩阵\
    \ $A_1^{2/3}$。\n\n```python\nA = np.array([[1, -2, 3], [-2, 3, 4], [3, 4, 5]])\n\
