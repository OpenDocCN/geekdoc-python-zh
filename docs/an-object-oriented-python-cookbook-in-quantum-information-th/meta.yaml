    \ < 0.0:\n            diag[i, i] = pow(abs(eigenvalues.item(i)), k) * pow(complex(0,\
    \ 1), 2 * k)\n        else:\n            diag[i, i] = pow(eigenvalues.item(i),\
    \ k)\n    # Constructing OD^kO^T, where O is orthogonal matrix\n    diag = np.matmul(np.matmul(eigenvectors,\
    \ diag), np.transpose(eigenvectors))\n    return diag\n```\n\n### Example\n\n\
    In this example, we are finding the matrix $A_1^{2/3}$.\n\n```python\nA = np.array([[1,\
