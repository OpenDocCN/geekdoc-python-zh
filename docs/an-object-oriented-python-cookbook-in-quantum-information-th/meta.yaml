  md: 'However, these are the PBCs and OBCs for nearest-neighbour interaction, if
    we have $r$ nearest neighbours interacting, there will be $r$ such end to end
    wrap up terms of the form $\sigma_{N+r} \equiv \sigma_r$ for $r = 1, 2, \ldots$
    It is also important to note that $\sigma_i^z = \mathbb{I}^{\otimes i-1} \otimes
    \sigma^z \otimes \mathbb{I}^{\otimes N-i}$, where $\mathbb{I}$ is the $2 \times
    2$ identity matrix. This is so because, the total Hamiltonian for $N$ spins will
    be a $2^N \times 2^N$ matrix in the $(\mathbb{C}^2)^{\otimes N}$ – dimensional
    Hilbert space. All this implies that the Pauli operator $z$ with a subscript $i$
    which is $\sigma_i^z$ will only act on the qubit at site $i$. At each site $i$,
    there is a quantum mechanical spin half particle either pointing along “up ($|\uparrow\rangle$)”
    or “down ($|\downarrow\rangle$)” which are respectively denoted by $|0\rangle$
    and $|1\rangle$. Having the above discussed facts in mind, we can proceed further.
    All the recipes given below are for both PBC’s and OBC’s which can be chosen as
    a user defined variable while execution. The user also can choose till how many
    neighbours he or she needs to build the spin chain. Also note that in this chapter
    we are using $\sigma$ matrices instead of the naive spin matrix $S$, bearing in
    mind the relationship between them as $S_i = \frac{1}{2}\sigma_i$ (with $\hbar
    = 1$), with $i = x, y, z$.


    Note that for all Hamiltonians from Section (6.1) to Section (6.3), the output
    of an example contains only the integer part of the matrix elements; this is done
    to accommodate the output in the given space. However, for the Section (6.4) which
    is the DM interaction, only integer part of the imaginary elements are displayed
    for the same reason. In this chapter, all examples are given for three spins.
    In the codes given in this chapter we have represented the interaction parameters
    like magnetic field, interaction strength (direct and anti symmetric) by an array
    of dimension equal to number of spins in the system.


    In the codes given for the interaction of the spins with magnetic field, we have
    considered $B$ to be an array of dimension equal to the number of spins in the
    system. This also gives us the freedom to choose an inhomogenous magnetic field
    at different sites, meaning, the $i^{th}$ entry of this array will be the magnitude
    of the applied magnetic field at the $i^{th}$ site. If the magnetic field is homogeneous,
    all entries of the array $B$ will be same. Similarly, for spin-spin interactions,
    we have chosen the interaction parameter to be an array of dimension equal to
    the number of spins in the system. The $i^{th}$ entry of this array will be the
    interaction strength between the $i^{th}$ and $(i+r)^{th}$ spin. If the interaction
    is homogeneous, all the entries of the corresponding interaction parameter will
    be same. However, if random interactions are present between the spins, the array
    will be filled with different numbers (drawn from any probability distribution)
    corresponding to each pair of spins. You can understand more about the usage as
    you see the examples given as we evolve through the chapter.


    To import the class **QuantumMechanics** from the **QuantumInformation** library,
    and creating the object of the class in your Python code can be done as follows,


    ```

    # Importing the class Hamiltonian from the QuantumInformation library

    from QuantumInformation import Hamiltonian as ham


    # creating the object of the class

    hamobj=ham()

    ```


    # 6.1 Hamiltonian of spins interacting with an external magnetic field


    The interaction Hamiltonian of a linear array of spin half electrons interacting
    with an external magnetic field of strength $B$ in general is given by,


    $$H = \sum_{i=1}^{N} B_i \sigma_i^j, \quad (6.7)$$'
