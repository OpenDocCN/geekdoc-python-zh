    ## 5 Quantification of Quantum Entanglement


    Quantum entanglement [75–79] is an exclusive property of quantum states, such
    a phenomenon is not there in classical mechanics. However, presenting a classical
    version of entanglement will enable us to understand the characteristic feature
    of quantum entanglement. Entanglement arises due to a lack of independence between
    two systems. For example, consider a random variable $X$, which has two possible
    outcomes, head ($\mathbf{H}$) and tail ($\mathbf{T}$). The discrete probability
    distribution of two-coin flips is given below, where the outcomes of each coin
    are independent of the other.


    | | Coin 2 H | Coin 2 T |

    |---|---|---|

    | Coin 1 H | 0.25 | 0.25 |

    | Coin 1 T | 0.25 | 0.25 |


    FIGURE 5.1: Discrete probability distribution of two unbiased coin flips.


    From the probability distribution shown in Fig. (5.1), it is clear that the outcome
    of any one of the coins does not influence the outcome of the other coin. If the
    outcome of the first coin is head, then with a 50% probability that the outcome
    of the second coin will be head or tail. Now consider a case where we have two
    special coins, which have discrete probability distributions as shown in Fig.
    (5.2). The table in Fig. (5.2) shows extreme entanglement.


    | | Coin 2 H | Coin 2 T |

    |---|---|---|

    | Coin 1 H | 0.5 | 0 |

    | Coin 1 T | 0 | 0.5 |


    FIGURE 5.2: Discrete probability distribution of two special coin flips.


    If the outcome of the first special coin is head, then with 100% surety, we know
    the outcome of the second special coin will be head. With this example discussed
    we now introduce a more formal definition of quantum entanglement.


    Entanglement is a non-local correlation which exists between systems that are
    separated in space. Any measurement in one of the subsystems will affect the state
    of the other subsystem, essentially it means that the subsystems are no longer
    independent [58]. Entanglement plays an important role in not only understanding
    the basic nature of quantum states but also indispensable in understanding condensed
    matter systems like spin chains [80–82], and quantum phase transitions [83, 84].
    It is also an integral part of quantum computation [85–87], etc.


    The nature of entanglement in pure and mixed states are very different from each
    other and, as we go along, we shall see the ways to detect and quantify entanglement.
    As far as pure states are concerned, if we have a composite system $AB$ which
    is in a state $|\psi\rangle_{AB}$ made of two subsystems $A$ and $B$, if the state
    of the composite system can be written as a tensor product of the individual subsystem
    states, then we say that $|\psi\rangle_{AB}$ unentangled, if not they are entangled.
    For example, consider one of the well known two-qubit Bell states which is,


    $$|b_1\rangle = \frac{1}{\sqrt{2}}(|00\rangle_{AB} + |11\rangle_{AB}) \neq |\text{some
    state of system A}\rangle \otimes |\text{some state of system B}\rangle \quad
    (5.1)$$


    In the above equation, we see that $|b_1\rangle$ is an entangled state. However,
    in the same token, it is easy to see that the state $|\phi\rangle = \frac{1}{\sqrt{2}}(|00\rangle_{AB}
    + |01\rangle_{AB}) = \frac{1}{\sqrt{2}}(|0\rangle_A \otimes (|0\rangle_B + |1\rangle_B))$
    is an unentangled state. In the state defined as $|b_1\rangle$, we see that it
    is defined in terms of the eigenvectors of the Pauli Z matrix, however, if we
    rotate the basis such that the state is written in terms of the eigen vectors
    of the Pauli X matrix, even then, the non-local correlations or entanglement does
    not die as the new state preserves these correlations up to an arbitrary global
    phase. In the language of measurement theory, we see that in the state $|b_1\rangle$,
    if we measure the spin in the first qubit to be in the state $|0\rangle$ we can
    immediately, without even measuring the second qubit say with 100 percent probability
    that it will be in the state $|0\rangle$, however, if we see the state $|\phi\rangle$,
    measuring the first qubit to be in state $|0\rangle$, will throw the state of
    the second qubit in a superposition namely $\frac{1}{\sqrt{2}}(|0\rangle_B + |1\rangle_B)$,
    which is a hallmark of entanglement. However, coming to the arena of density matrices,
    A density matrix $\rho$ is called separable [88] if it can be written as a convex
    sum of product states $\rho^A$ and $\rho^B$, as


    $$\rho = \sum_i p_i \rho_i^A \otimes \rho_i^B, \quad (5.2)$$


    This definition, coupled with the fact that there is no unique decomposition [89]
    for a given density matrix in terms of pure states, leads to a huge market of
    entanglement measures and associated entanglement detection techniques. Some of
    them like PPT and reduction are commonly used, and day by day, the research on
    these increase the number of such measures and detection methods which practically
    makes them weaker or stronger with respect to each other [90]. For qubit-qubit
    and qubit-qutrit systems ($2\times2$ and $2\times3$, respectively), the simple
    Peres-Horodecki criterion or the famous positive partial transpose PPT criteria
    [88] provides both a necessary and a sufficient criterion for separability. This
    cannot be generalized to higher-dimensional quantum states, directly makes detection
    non-unique.


    For studying the entanglement content [91] or detecting the presence of entanglement
    between two subsystems of a quantum system, we perform the following mathematical
    operations on the quantum state of the composite quantum system, partial trace
    and partial transpose. More detailed discussions regarding partial trace and partial
    transpose are given in Sections 5.1 and 5.2, respectively.


