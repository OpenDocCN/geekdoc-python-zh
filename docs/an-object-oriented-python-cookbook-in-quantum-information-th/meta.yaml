    \n## 5.8 Entanglement spectrum\n\nThe entanglement spectrum [111, 112] is the\
    \ negative natural logarithm of the eigenvalue spectrum of the reduced density\
    \ matrix. Instead of having a number (von Neumann entropy) for quantifying entanglement,\
    \ Haldane in his seminal work pointed out that the spectrum of the reduced density\
    \ matrix contains more information regarding the entanglement. This quantity is\
    \ more important when we study condensed matter systems like topological materials,\
    \ quantum Hall effect, etc. If we have a reduced density matrix of a composite\
    \ system $AB$ as $\\rho_A$, then the entanglement spectrum is defined as $-ln(\\\
    lambda_i)$, where $\\lambda_i$ with $i = 1, \\cdots, \\text{dim}(\\rho_A)$ are\
    \ the eigenvalues of $\\rho_A$.\n\n### 5.8.1 For a real or complex density matrix\n\
    \n`entanglement_spectrum(rho)`\n\n#### Parameters\n\n| In/Out | Argument | Description\
    \ |\n| :--- | :--- | :--- |\n| [in] | rho | It is a real or complex array of dimension\
    \ $(0:2^N - 1, 0:2^N - 1)$, which is the input density matrix $\\rho_A$ |\n| [out]\
    \ | eigenvalues | List containing the eigenvalues of rho |\n| [out] | logeigenvalues\
    \ | List containing the negative logarithmic eigenvalues of rho, i.e. $-ln(\\\
    lambda_i)$ values |\n\n## Implementation\n\n```python\ndef entanglement_spectrum(self,\
    \ rho):\n    \"\"\"\n    Calculation of entanglement spectrum of a density matrix\n\
    \    Parameters\n        rho :  Real or complex density matrix\n\n    Returns\n\
    \        eigenvalues : List containing the eigenvalues of rho\n        logeigenvalues\
    \ : List containing the negative logarithmic\n                        eigenvalues\
    \ of rho\n    \"\"\"\n    # Storing the data type of input state $|\\psi\\rangle$\n\
    \    typerho = str(rho.dtype)\n    # If $|\\psi\\rangle$ is complex then IF cond.\
    \ is true\n    if re.findall('^complex', typerho):\n        # Calculating eigenvalues\
    \ $\\lambda_i$ of $|\\psi\\rangle$\n        eigenvalues, eigenvectors, info =\
    \ la.zheev(rho)\n    # If $|\\psi\\rangle$ is real then ELSE cond. is true\n \
    \   else:\n        eigenvalues, eigenvectors, info = la.dsyev(rho)\n    # Calculating\
    \ $\\ln(\\lambda_i)$\n    logeigenvalues = np.zeros([eigenvalues.shape[0]], dtype='float64')\n\
