  md: "```\n[[2.+0.j 3.+1.j]\n [2.-2.j 4.-2.j]]\n```\n\n# 2.5 Tensor product between\
    \ two matrices\n\nTensor product is also known as direct product or Kronecker\
    \ product. Tensor products are not restricted to square matrices only, but valid\
    \ even for rectangular matrices equally. Let there be two matrices $A$ and $B$\
    \ of the dimensions $m \\times n$ and $p \\times q$ respectively. The Kronecker\
    \ product between these two matrices will be a matrix of dimension $mp \\times\
    \ nq$ can be represented as below,\n\n$$A \\otimes B = \\begin{pmatrix} A_{11}B\
    \ & A_{12}B & \\cdots & A_{1n}B \\ A_{21}B & A_{22}B & \\cdots & A_{2n}B \\ \\\
    vdots & \\vdots & \\ddots & \\vdots \\ A_{m1}B & A_{m2}B & \\cdots & A_{mn}B \\\
    end{pmatrix}_{mp \\times nq}.$$\n\nNote that each of the elements of the matrix\
    \ $A$ is algebraically multiplied by the total matrix $B$. Kronecker products\
    \ are very useful when we deal with several identical or non identical physical\
    \ systems, and to find the quantum states representing those systems. For example,\
    \ any general one-qubit system can be represented by the state $|\\phi\\rangle\
