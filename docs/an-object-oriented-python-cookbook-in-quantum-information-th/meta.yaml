    # 5.1 Partial trace


    Partial trace [24, 92] is a mathematical operation that is not only used to study
    the state of the subsystems of a composite quantum system but also used in the
    computation of a vast number of entanglement measures. Consider $H$ represents
    the Hilbert space of a composite quantum system that comprises two subsystems.
    The Hilbert spaces of the subsystems $A$ and $B$ are denoted by $H_A$ and $H_B$,
    respectively. The state of the composite quantum system is known, and it is represented
    by $\rho_{AB}$. On performing partial trace operation on the state $\rho_{AB}$,
    we can calculate the reduced density matrices of the subsystems $A$ and $B$ represented
    by $\rho_A$ and $\rho_B$, respectively. The mathematical expression to calculate
    the reduced density matrices $\rho_A$ and $\rho_B$ are shown below.


    $$\rho_A = Tr_B(\rho_{AB}).$$


    Similarly, state of the subsystem $B$ which is $\rho_B$ is given by,


    $$\rho_B = Tr_A(\rho_{AB}).$$


    It can be generalized to multi-qubit systems also in this way, if we have a $N$-qubit
    state $\rho_{123...N}$, and if we are interested to know the state of the even
    qubit subsystem, we can write $\rho_{246...} = Tr_{135...}(\rho_{123...N})$. This
    implies that partial tracing can be done over a random set of qubits. The partial
    trace operation is the faithful reflection of the marginal of a multivariate probability
    distribution in the quantum domain. Partial trace operation is practically used
    in calculating most of the entanglement measures as we will see further down.
    In the recipes which we have given, for a $N$-qubit state, we can calculate the
    partial trace over any random set of qubits as $\rho_{i_1i_2...i_N}$.


    The following two methods use the function **recur__comb__add** from the module
    **RecurNum** and two private methods **__dectobin**, **__bintodec**, which are
    present within the **PartialTr** class. The private methods are those methods
    which cannot be accessed outside of the class. The reason to develop private methods
    is explained as follows, the private method **__dectobin** (**__bintodec**) converts
    a decimal (binary) number to an equivalent binary (decimal) number. We have already
    developed methods that convert decimal to binary and vice versa, but the format
    of the input and output of these private methods are different. The algorithm
    for the partial tracing in the following two methods has been adopted from the
    ref. [92], and it is the fastest algorithm to calculate partial trace'
