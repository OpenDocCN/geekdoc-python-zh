    \ holds the dimension of the output matrix.\n        mu: it is the average value\
    \ of the gaussian distribution.\n        sigma: it is the standard deviation of\
    \ the gaussian distribution\n    Output:\n        gauss_state: it the gaussian\
    \ distributed real state\n    \"\"\"\n    gauss_state=np.random.normal(mu, sigma,\
    \ tup)\n    return gauss_state\n```\n\n# Example\n\n```\nstate_gauss=qrobj.random_gaussian_rvec((3,3))\n\
    ```\n\nIn the above example, **state_gauss** is a $3 \\times 3$ real matrix which\
    \ stores the random numbers from the Gaussian distribution with zero mean and\
    \ unit standard deviation.\n\n# 7.1.2 For a complex random matrix whose real and\
    \ imaginary parts are individually chosen from the Gaussian distribution\n\n```\n\
    random_gaussian_cvec(tup,mu=0,sigma=1)\n```"
