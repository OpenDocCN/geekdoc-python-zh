    ```\n\nThe output of the preceding code will print the *float* class as shown\
    \ below.\n\n```\n<class 'float'>\nMultiplying Planck constant by 10 = 6.626e-33\n\
    ```\n\n#### 1.2.3 Complex\n\nAny complex number has two parts, real and imaginary,\
