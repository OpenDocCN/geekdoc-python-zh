    # 6.3 The Heisenberg interaction


    The one-dimensional Heisenberg model [117, 128–130] is an important model in physics,
    The Hamiltonian for the nearest-neighbour one-dimensional Heisenberg model for
    the case of $N$ interacting spin half qubits is as follows


    $$H = J \sum_{i=1}^{N} \vec{\sigma}_i.\vec{\sigma}_{i+1} = J \sum_{i=1}^{N} (\sigma_i^x
    \sigma_{i+1}^x + \sigma_i^y \sigma_{i+1}^y + \sigma_i^z \sigma_{i+1}^z)$$


    Note the dot product in the above Hamiltonian. If $J < 0$, the ground state of
    the above Hamiltonian is ferromagnetic and If $J > 0$, the ground state is antiferromagnetic.
    It can be solved analytically for its ground states as well as the excited states
    by Bethe Ansatz [128] for the case when $J < 0$ and by Hulthen''s method [117]
    for the case when $J > 0$. We generalize the Heisenberg Hamiltonian to the $r^{th}$
    neighbour with random interaction strengths using Eq. [6.17] as,


    $$H = \sum_{i=1}^{N} J_r^i \vec{\sigma}_i.\vec{\sigma}_{i+r} = \sum_{i=1}^{N}
    J_r^i (\sigma_i^x \sigma_{i+r}^x + \sigma_i^y \sigma_{i+r}^y + \sigma_i^z \sigma_{i+r}^z),$$


    where $J_r^i$ is the interaction strength which is also called the coupling constant
    between the the $i^{th}$ and $(i + r)^{th}$ spin. $\vec{\sigma} = (\sigma^x, \sigma^y,
    \sigma^z)$ where $\sigma^j$ are the Pauli spin matrices, with $j = x, y, z$. Also
    note $\sigma_{i+r}$ denotes the Pauli spin matrices corresponding to the $r^{th}$
    neighbouring spin from $\sigma_i$. It is very easy to verify that


    $$\vec{\sigma}_i.\vec{\sigma}_{i+r} = 2P_{i,i+r} - 1$$'
