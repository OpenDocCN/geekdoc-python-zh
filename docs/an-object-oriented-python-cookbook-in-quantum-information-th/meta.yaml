    \ high=high, size=tup)\n    uniform_state=uniform_rpart+(complex(0,1)*uniform_cpart)\n\
    \    return uniform_state\n```\n\n## Example\n\n```\nstate_uniform=qrobj.random_unifrom_cvec((2,2),low=-1,high=1)\n\
    ```\n\nIn the above example, state_uniform is a $2 \\times 2$ complex matrix which\
    \ stores the random numbers chosen from a uniform distribution in the range $(-1,\
    \ 1)$.\n\n## 7.3 Random real symmetric matrices\n\nAny random real symmetric matrix\
    \ $B$ can be generated from any general matrix $A$ whose elements are from a Gaussian\
    \ or a uniform distribution as follows,\n\n$$B = \\frac{1}{2}(A + A^T)$$\n\n```\n\
    random_symmetric_matrix(size,distribution=\"gaussian\",mu=0,\\nsigma=1,low=0.0,high=1.0)\n\
    ```\n\n## Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | size | It holds the information of the dimension of the output matrix\
    \ |\n| [in] | distribution | It holds a string value defining the type of distribution.\
    \ if distribution = 'gaussian', Gaussian distribution will be chosen. It is the\
    \ default value ; if distribution = 'uniform', uniform distribution will be chosen\
    \ |\n| [in] | low | If distribution = 'uniform', low (integer) is the lowest value\
    \ of the range. The default value is 0 ; If distribution = 'gaussian', low is\
    \ not referenced |\n| [in] | high | If distribution = 'uniform', high (integer)\
    \ is the highest value of the range. The default value is 1; If distribution =\
    \ 'gaussian', b is not referenced |\n| [in] | mu | If dist = 'gaussian', mu is\
    \ the mean of the distribution; If distribution = 'uniform', mu is not referenced\
    \ |\n| [in] | sigma | If distribution = 'gaussian', sigma is the standard deviation\
    \ of the distribution; If distribution = 'uniform', sigma is not referenced |\n\
    | [out] | smatrix | It is the array of dimensions assigned in the variable size,\
    \ and it is a random real symmetric matrix |\n\n## Implementation\n\n```\ndef\
    \ random_symmetric_matrix(self,size,distribution=\"gaussian\",mu=0,\\nsigma=1,low=0.0,high=1.0):\n\
    \    \"\"\"\n    Construct a random symmetric matrix\n    Input:\n        size:\
    \ it is a tuple (a,b), where a in number of rows and b is\n              number\
    \ of columns of the symmetric matrix\n        distribution: it is the type of\
    \ distribution\n    Output:\n        smatrix: symmetric matrix\n    \"\"\"\n \
    \   # Checking whether entered mode for distribution is correct or not\n    assert\
    \ re.findall(\"^gaussian|^uniform\",distribution),\\\n        \"Invalid distribution\
    \ type\"\n    if distribution == 'gaussian':\n        smatrix=np.random.normal(mu,\
    \ sigma, size=size)\n    if distribution == 'uniform':\n        smatrix=np.random.uniform(low=low,\
    \ high=high, size=size)\n    smatrix=smatrix+np.matrix.transpose(smatrix)\n  \
    \  smatrix=0.5*smatrix\n    return smatrix\n```\n\n## Example\n\n```\nrandom_smatrix=qobj.random_symmetric_matrix(size=(3,3),\\\
    \n    distribution='gaussian',\\\n    mu=2,sigma=0.5)\n```\n\nIn the above example,\
    \ random_smatrix is a $3 \\times 3$ real symmetric matrix which stores the random\
    \ numbers selectively chosen from the Gaussian distribution with mean 2 and standard\
    \ deviation 0.5.\n\n## 7.4 Random complex Hermitian matrices\n\nAny random complex\
    \ Hermitian matrix $B$ can be generated from any complex general matrix $A$ whose\
    \ elements are from a Gaussian or a uniform distribution as follows,\n\n$$B =\
    \ \\frac{1}{2}(A + A^\\dagger)$$\n\n```\nrandom_hermitian_matrix(self,size,distribution=\"\
    gaussian\",mu=0,\\\n    sigma=1,low=0.0,high=1.0)\n```"
