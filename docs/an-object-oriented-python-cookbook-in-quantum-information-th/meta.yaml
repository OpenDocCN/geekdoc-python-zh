- md: "## 5.2 Partial transpose\n\nPartial transpose [88, 93] is a very important\
    \ operation in checking the separability of a given density matrix. There are\
    \ many separability tests that use partial transpose in order to check whether\
    \ a given quantum state is separable or inseparable. The most prominent separability\
    \ test is the Peres Horodecki Positivity of Partial Transpose (PPT) criterion\
    \ [88, 94]. According to this criterion, if a state is separable, then the partial\
    \ transposed density matrix is a positive matrix. Another similar criterion is\
    \ proposed in ref. [95], which states that for a state to be separable, the determinant\
    \ of the partial transposed density matrix should be positive. The above discussion\
    \ shows the importance of partial transpose in the field of quantum entanglement\
    \ studies. Let us take an example of a bipartite composite system in the Hilbert\
    \ space $H = H_A \\otimes H_B$ and the density matrix corresponding to the composite\
    \ system is $\\rho_{AB}$. We can write the matrix elements of $\\rho_{AB}$ as\n\
    \n$$\\rho_{AB} = \\sum_{ijkl} r_{ik;jl} |i, j\\rangle\\langle k, l| \\equiv \\\
    sum_{ijkl} r_{ik;jl} (|i\\rangle\\langle k|)_A \\otimes (|j\\rangle\\langle l|)_B.\
    \ \\qquad (5.5)$$\n\nIn the above equation, indices $i,k$ are basis states in\
    \ the Hilbert space $H_A$ of subsystem $A$ and $j,l$ are basis states in the Hilbert\
    \ space $H_B$ of subsystem $B$. Here $r_{ik;jl}$ are the matrix elements. The\
    \ partial transpose of $\\rho_{AB}$ with respect to the system $B$ is given by,\n\
    \n$$\\rho_{AB}^{T_B} = \\sum_{ijkl} r_{ik;jl} (|i\\rangle\\langle k|)_A \\otimes\
    \ (|l\\rangle\\langle j|)_B. \\tag{5.6}$$\n\nOf course, $\\rho_{AB}^{T_A}$ also\
    \ can be found easily using the above. For a more in-depth understanding regarding\
    \ the mathematical operation of partial transpose, we have defined a two-qubit\
    \ density matrix as\n\n$$\\rho_{AB} = \\begin{pmatrix} a_{11} & a_{12} & a_{13}\
    \ & a_{14} \\\\ a_{21} & a_{22} & a_{23} & a_{24} \\\\ a_{31} & a_{32} & a_{33}\
    \ & a_{34} \\\\ a_{41} & a_{42} & a_{43} & a_{44} \\end{pmatrix}. \\tag{5.7}$$\n\
    \nAfter partially transposing the subsystem $B$ of the density matrix in Eq. [5.7],\
    \ we finally obtain the following,\n\n$$\\rho_{AB}^{T_B} = \\begin{pmatrix} a_{11}\
    \ & a_{21} & a_{13} & a_{23} \\\\ a_{12} & a_{22} & a_{14} & a_{24} \\\\ a_{13}\
    \ & a_{41} & a_{33} & a_{43} \\\\ a_{32} & a_{42} & a_{34} & a_{44} \\end{pmatrix}.\
    \ \\tag{5.8}$$\n\nThe recipes we have given can do partial transpose for any random\
    \ partition of a bipartite multi-qubit system.\n\n### 5.2.1 For a real or complex\
    \ state\n\n```python\nptranspose_vec(state, sub_tr)\n```\n\n### Parameters\n\n\
