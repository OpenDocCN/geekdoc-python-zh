  md: '# 5 Quantification of Quantum Entanglement


    Quantum entanglement [75–79] is an exclusive property of quantum states, such
    a phenomenon is not there in classical mechanics. However, presenting a classical
    version of entanglement will enable us to understand the characteristic feature
    of quantum entanglement. Entanglement arises due to a lack of independence between
    two systems. For example, consider a random variable $X$, which has two possible
    outcomes, head ($\mathbf{H}$) and tail ($\mathbf{T}$). The discrete probability
    distribution of two-coin flips is given below, where the outcomes of each coin
    are independent of the other.


    | | Coin 2 H | Coin 2 T |

    |---|---|---|

    | Coin 1 H | 0.25 | 0.25 |

    | Coin 1 T | 0.25 | 0.25 |


    FIGURE 5.1: Discrete probability distribution of two unbiased coin flips.


    From the probability distribution shown in Fig. (5.1), it is clear that the outcome
    of any one of the coins does not influence the outcome of the other coin. If the
    outcome of the first coin is head, then with a 50% probability that the outcome
    of the second coin will be head or tail. Now consider a case where we have two
    special coins, which have discrete probability distributions as shown in Fig.
    (5.2). The table in Fig. (5.2) shows extreme entanglement.


    | | Coin 2 H | Coin 2 T |

    |---|---|---|

    | Coin 1 H | 0.5 | 0 |

    | Coin 1 T | 0 | 0.5 |


    FIGURE 5.2: Discrete probability distribution of two special coin flips.


    If the outcome of the first special coin is head, then with 100% surety, we know
    the outcome of the second special coin will be head. With this example discussed
    we now introduce a more formal definition of quantum entanglement.


    Entanglement is a non-local correlation which exists between systems that are
    separated in space. Any measurement in one of the subsystems will affect the state
    of the'
