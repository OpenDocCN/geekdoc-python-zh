    \ type\n>>> energy_transform = \"Convert joules to electron volt\"   # string\
    \ data type\n>>> Energy_ev = joules*(6.242e+18)   # float data type\n>>> probabilities3\
    \ = [0.3, 0.6, 0.1]   # List data type\n```\n\nAny statement written after # is\
