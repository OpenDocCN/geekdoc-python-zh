    \n## 5.4 块熵\n\n考虑一个双量子比特纯态密度矩阵$\\rho^{AB}$，其中$A$和$B$是两个子系统。纯态$\\rho^{AB}$的冯·诺依曼[24,\
    \ 100]熵定义如下，\n\n$$S\\left(\\rho^{AB}\\right) = -Tr\\left(\\rho^A \\log_2 \\rho^A\\\
    right) = -Tr\\left(\\rho^B \\log_2 \\rho^B\\right),$$\n\n其中$\\rho^A$和$\\rho^B$分别是子系统$A$和$B$的约化密度矩阵。等式[5.14]成立是由于施密特分解[101]，该分解指出，如果二分系统的复合态是纯态，则约化密度矩阵$\\\
    rho^A$的非零特征值等于约化密度矩阵$\\rho^B$的非零特征值。等式[5.14]也可以写成，\n\n$$S\\left(\\rho^{AB}\\right)\
    \ = -\\sum_{i=1}^2 \\lambda_i \\log_2 (\\lambda_i),$$\n\n其中$\\lambda_i$是约化密度矩阵$\\\
    rho^B$（或$\\rho^A$）的特征值，并且我们定义$0 \\log_2 0 \\equiv 0$。纯态的纠缠内容用子系统的约化密度矩阵来表示。即使整个系统可能完全已知，子系统状态的信息损失或无知程度也用熵来量化。\n\
    \n对于多量子比特纯态，两个自旋块之间的纠缠通过块熵[102]来计算。在图(5.4)中，我们有一个多量子比特纯态的$N$个自旋，并计算$L$（$L < N$）和$N\
    \ - L$自旋块之间的纠缠。块熵给出这两个自旋块之间的纠缠如下，\n\n$$S(\\rho_L) = -\\sum_{i=1}^{d_L} \\lambda_i\
    \ \\log_2 \\lambda_i. \\tag{5.16}$$\n\n其中$\\lambda_i$是约化密度矩阵$\\rho_L = tr_{L+1,\\\
