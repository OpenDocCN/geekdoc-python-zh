    Roots are real and equal\")\nelse:\n    print(\"Roots are complex\")\n```\n\n\
    Which will print the output as,\n\nRoots are complex\n\n## 1.5 Loops\n\nLoops\
    \ are useful for repeated execution of similar operations. The importance of looping\
    \ is so much that, without looping elements, any programming language will be\
    \ 99% incomplete. There are two types of loops and the syntax of both of them\
    \ are given below.\n\n### 1.5.1 The while loop\n\nThe generic syntax of the **while**\
    \ loop is written as,\n\n```\nwhile <test_expression>:\n    <Body of while>\n\
    ```\n\nThe body of the **while** loop (<Body of **while**>) gets executed till\
    \ the condition <test_expression> holds. An example of the above syntax is as\
    \ follows,\n\n```\n# Calculating the n! factorial\nn = 3\nfact=1\nwhile n > 0:\n\
    \    fact=fact*n\n    n=n-1\nprint(\"Factorial =\",fact)\n```\n\nWhich will print\
    \ the output as,\n\n```\nFactorial = 6\n```\n\nAs we have already discussed above,\
    \ the **while** loop gets executed till the test expression holds, however, the\
    \ **while** loop becomes ineffective when you have to iterate over the items of\
    \ the list or have to run the body of the loop for *n* times. The for loop fits\
    \ in this role perfectly as discussed in the next section.\n\n### 1.5.2 The for\
    \ loop\n\nThe generic syntax of the **for** loop is written as,\n\n```\nfor <variable>\
    \ in <iterable>:\n    <Body of for loop>\n```\n\nThe variable <variable> is assigned\
    \ the value of the new item present in the iterable <iterable> for each loop.\
    \ Few examples of the above syntax are shown below,\n\n```\nmylist=['quantum',\
    \ 'mechanics', 1, complex(2,3), 3.8]\nfor i in mylist:\n    print(i)\n```\n\n\
    Which will print output as,\n\n```\nquantum\nmechanics\n1\n(2+3j)\n3.8\n```\n\n\
    Now if you want to run the variable <variable> from integral number *n* to integral\
    \ number *m* in steps of *l* (integer number), then you have to use the **range()**\
    \ function. For the case under consideration, the parametric inputs to the function\
    \ is as follows, **range(n, m + 1, l)**. Default value of the step in the **range()**\
    \ function is 1. An example aforesaid case is shown below,\n\n```\n# Geometric\
    \ progression, $a, ar, ar^2, ar^3, ar^4, ..., ar^{n-1}$\na=2\nr=3\nn=5\nsum1=0.0\n\
    # Loops run from $a$ to $ar^{n-1}$\nfor i in range(0,n,1):\n    print(a*(r**i))\n\
    \    sum1=sum1+(a*(r**i))\nprint(\"Total sum of geometric progression =\",sum1)\n\
    ```\n\nWhich will print output as,\n\n```\n2\n6\n18\n54\n162\nTotal sum of geometric\
    \ progression = 242.0\n```\n\nWe provide another example below where we show one\
    \ way to use loops with arrays.\n\n```\n# Arithmetic progression, $a_1, a_1+d,\
    \ a_1+2d, ..., a_1+(n-1)d$\nimport numpy as np\na1=3\nd=0.3\nn=5\narr=np.zeros(n,dtype='float64')\n\
    for i in range(0,n,1):\n    arr[i]=a1+i*d\nprint(\"Printing the array holding\
    \ the arithmetic progression\")\nprint(arr)\n```\n\nThe above code gives the following\
    \ output on execution.\n\n```\nPrinting the array holding the arithmetic progression\n\
    [3. 3.3 3.6 3.9 4.2]\n```\n\n## 1.6 Python file handling\n\nThis section primarily\
    \ deals with the inbuilt functions of Python for creating, writing and reading\
    \ files. There other Python packages such as NumPy [12], PyTables [13], Pandas\
    \ [14] and Blaze [15], which are not only used for creating, writing and reading\
    \ files but also performing some advanced operations like cleaning, munging, analysis\
    \ and visualization. However, in this section, we will restrict the discussion\
    \ to the inbuilt functions of Python. In Python, two types of files are handled\
    \ and are text files and binary files. Three file operations take place in the\
    \ following order when handling a file,\n\n1. Open a file.\n2. Read or write (perform\
    \ the operation).\n3. Close the file.\n\nPython has a built-in **open()** function\
    \ to open a file. This function returns a file object, also called a handle. The\
    \ generic statement of the **open()** function is shown below,\n\n```\nfile_object\
    \ = open(r\"file_name\", \"access_mode\")\n```\n\nThe file should exist in the\
    \ same directory where the Python program file is saved. Otherwise, before the\
    \ filename, the full address or path has to be written. The different types of\
    \ available access modes available in Python are listed below,\n\n| Access mode\
    \ | Code | Description |\n| :--- | :--- | :--- |\n| Read Only | \"r\" | Open text\
    \ file for reading. The handle is positioned at the beginning of the file. If\
    \ the file does not exist, then it raises I/O error. This is also the default\
    \ mode in which file is opened |\n| Read and Write | \"r+\" | Open the file for\
    \ reading and writing. The handle is positioned at the beginning of the file.\
    \ Raises I/O error if the file does not exist |\n| Write Only | \"w\" | Open the\
    \ file for writing. For existing file, the data is truncated and over-written.\
    \ The handle is positioned at the beginning of the file. Creates the file, if\
    \ the file does not exists |\n| Write and Read | \"w+\" | Open the file for reading\
    \ and writing. For existing file, data is truncated and over-written. The handle\
    \ is positioned at the beginning of the file |\n| Append Only | \"a\" | Open the\
    \ file for writing. The file is created if it does not exist. The handle is positioned\
    \ at the end of the file. The data being written will be inserted at the end,\
    \ after the existing data meaning it will be appended |\n| Append and Read | \"\
    a+\" | Open the file for reading and writing. The file is created if it does not\
    \ exist. The handle is positioned at the end of the file. The data being written\
    \ will be inserted at the end, after the existing data |\n\nAn example of the\
    \ above discussion is shown below,\n\n```\nimport numpy as np\n# To read file\
    \ MyFile1.txt\" in D:\\Text in file2\nfile1 = open(r\"D:\\Text\\MyFile1.txt\"\
    , \"r\")\n```\n\n```\n# Writing file 'myfile.txt' in the same directory of the\
    \ python program\nfile2 = open('myfile.txt', 'w')\nL = [\"Quantum Information\"\
    , \"\\n\", \"and\", \"\\t\", \"Computation\"]\ns = \"Numerical recipes\\n\"\n\
    arr=np.array([[0,1],[1,0]])\n\n# Writing a string to file\nfile2.write(s)\n\n\
    # Writing multiple strings at a time\nfile2.writelines(L)\n\n# writing matrix\
    \ elements in the file\nfile2.write(\"\\nThe matrix is written as\\n\")\nfor i\
    \ in range(0,arr.shape[0]):\n    for j in range(0,arr.shape[1]):\n        file2.write(str(arr[i,j]))\n\
    \        # to add tab space length between row elements of matrix\n        file2.write('\\\
    t')\n    # each row is to be printed in the next line\n    file2.write('\\n')\n\
    \n# Closing file\nfile2.close()\n\n# Checking if the data is written to file or\
    \ not\nfile2 = open('myfile.txt', 'r')\nprint(file2.read())\nfile2.close()\n```\n\
    \nThe file **myfile.txt** stores the following data.\n\n```\nNumerical recipes\n\
    Quantum Information\nand     Computation\nThe matrix is written as\n0       1\n\
    1       0\n```\n\nThe best way to write and load numpy arrays is shown below.\n\
    \n```\nimport numpy as np\n\narr=np.array([[1,2],[3,4],[5,6]])\n\n# Saving the\
    \ array in a text file\nnp.savetxt(\"np_array.txt\", arr)\n\n# Displaying the\
    \ contents of the text file\ncontent = np.loadtxt('np_array.txt')\nprint(\"\\\
    nContent in np_array.txt:\\n\", content)\n```"
