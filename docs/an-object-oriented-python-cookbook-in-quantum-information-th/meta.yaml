    >>> str3=\"She said, \"Whats up\" \"  # Not a valid string type\nSyntaxError:\
    \ invalid syntax\n>>> str3 =\"She said, \"Whats up\" \"\"  # Valid string type\n\
    >>> print(str3)\nShe said, \"Whats up\"\n>>> str4= 'Space like \\t separated'\
    \  # \\t introduces a tab space\n>>> print(str4)\nSpace like     separated\n>>>\
    \ str5= \"Hello \\n world\"  # \\n introduces a new line\n>>> print(str5)\nHello\n\
    \ world\n```\n\nOne may wonder why in Python the concept of writing a string inside\
    \ a triple quote is followed. The answer lies in the fact that a triple quote\
    \ can enclose strings of characters that contain both single and double quotes\
    \ such that no escaping is needed, and it also allows multi-line strings. Few\
    \ examples of triple quote strings are shown below,\n\n```\n>>> print('''Einstein\
    \ said, \"Quantum mechanics is not correct.\"''')\nEinstein said, \"Quantum mechanics\
    \ is not correct.\"\n>>> print(\"\"\"Hello\n... World\"\"\")\nHello\nWorld\n```\n\
    \n# 1.2.5 Logical\n\nThere are only two logical values **True** and **False**\
    \ corresponding to the standard Boolean elements 1 and 0 respectively. The *bool*\
    \ class represents the Boolean type. An example is indicated as below,\n\n```\n\
    >>> print(type(True))\n<class 'bool'>\n```\n\n# 1.2.6 List\n\nLists are an ordered\
    \ collection of various types of data, and it has no fixed size. Lists need not\
    \ be homogeneous always, which makes it the most powerful feature of Python. Unlike\
    \ strings, lists are mutable by a variety of list method calls, and in this section,\
    \ we will discuss a few of the important ones. A list is created by writing the\
    \ comma-separated values (items) inside a square bracket, for example,\n\n```\n\
    >>> lst1 = [1, 'electron', 2, 'proton', 3, 'neutron']\n>>> print(type(lst1))\n\
    <class 'list'>\n```"
- md: "In a list, the indexing of the first element starts from zero. If you want\
    \ to access a particular element or elements in a list, you can do the following:\n\
    \n```\n>>> print(lst1[0]) # Indexing by position\n1\n>>> print(lst1[1:3]) # Slicing\
    \ a list\n['electron', 2]\n>>> length = len(lst1) # Calculates the length of the\
    \ list\n>>> print(length)\n6\n```\n\nTo add, remove or insert elements at a particular\
    \ position in a list can be done by the following list method calls:\n\n```\n\
    >>> lst1.append(6) # append element 6 into the list\n>>> print(lst1)\n[1, 'electron',\
    \ 2, 'proton', 3, 'neutron', 6]\n>>> lst1.remove(3) # remove the element 3\n>>>\
    \ print(lst1)\n[1, 'electron', 2, 'proton', 'neutron', 6]\n>>> lst1.insert(1,'atom')\
    \ #.insert(i,x), insert at i'th index the element x\n>>> print(lst1)\n[1, 'atom',\
    \ 'electron', 2, 'proton', 'neutron', 6]\n>>> lst1.pop(5) # .pop(i), it removes\
    \ the element in the i'th index\n'neutron'\n>>> print(lst1)\n[1, 'atom', 'electron',\
    \ 2, 'proton', 6]\n```\n\n## 1.2.7 Tuple\n\nA tuple is a collection of objects\
    \ which is ordered and immutable. Tuples are sequences, just like lists. The difference\
    \ between tuples and lists are as follows, tuples cannot be changed like lists,\
    \ and tuples use parentheses whereas lists use square brackets.\n\n```\n>>> tup1\
    \ = ('quantum', 'state', 0.75, 0.25) # valid tuple\n>>> print(type(tup1))\n<class\
    \ 'tuple'>\n>>> tup2 = (1, 2, 3 ) # valid tuple\n>>> print(tup2[0])\n1\n>>> print(tup2[1])\n\
    2\n```\n\n## 1.2.8 NumPy arrays\n\nIn the heart of any mathematical physics [2]\
    \ calculation lies an array and, more importantly, in quantum mechanics. For example,\
    \ arrays represent a quantum state or a density matrix, Hamiltonian of a quantum\
    \ many-body system, quantum measurement operator, etc. The array data language\
    \ in Python can be written using the help of NumPy [12], which stands for Numerical\
    \ Python. It is a library consisting of multidimensional array objects and a collection\
    \ of routines for processing those arrays. Large parts of NumPy are written in\
    \ C or C++ for faster computation purposes. NumPy also understands array data\
    \ format from languages like C and FORTRAN, which is an added advantage. In order\
    \ to create a NumPy array, we first have to import the library and then call the\
    \ **array()** method on the sequence of numbers as written below,\n\n```\n>>>\
    \ import numpy as np\n>>> array1 = np.array([1, 2, 3]) # 1D array\n>>> print(array1.shape)\
    \ # .shape, it returns the shape of the array\n(3,)\n>>> array2 = np.array([[1,0],[0,-1]])\
    \ # 2D array\n>>> print(array2.shape)\n(2, 2)\n>>> array3 = np.array([[[1,3,2.5],[4,8,-11]],[[3,22,-0.9],[2,3,4]]])\
    \ # 3D array\n>>> print(array3.shape)\n(2, 2, 3)\n```\n\nThere are other ways\
    \ to create NumPy arrays, and we will discuss a few of them in this section. Primarily\
    \ we will be discussing about the functions **empty()**, **zeros()**, **identity()**\
    \ and **ones()**. The **empty()** function takes in an integer or tuple of integer\
    \ defining the shape of an array and then allocates the memory without assigning\
    \ any values to the array. It means that random noise close to zero is initialized\
    \ in the array. The **ones()** and **zeros()** functions take in an integer or\
    \ tuple of integers defining the shape of an array and return an n-dimensional\
    \ array whose elements are one or zero, respectively. The **identity()** function\
    \ takes in an integer value defining the dimension of a square matrix, whose diagonal\
    \ elements are equal to one and off-diagonal elements are equal to zero. Few examples\
    \ of the above functions are given below,\n\n```\n>>> array3 = np.empty((2,3))\n\
    >>> print(type(array3))\n<class 'numpy.ndarray'>\n>>> array4 = np.zeros((2,3))\n\
    >>> print(array4)\n[[0. 0. 0.]\n [0. 0. 0.]]\n>>> array5 = np.ones((2,3))\n>>>\
    \ print(array5)\n[[1. 1. 1.]\n [1. 1. 1.]]\n>>> array6 = np.identity(3)\n>>> print(array6)\n\
    [[1. 0. 0.]\n [0. 1. 0.]\n [0. 0. 1.]]\n```\n\nThe default data types of outputs\
    \ of functions **empty()**, **zeros()** and **ones()** is *float64*. The default\
    \ data type output of **identity()** is *float*. If you want to change the data\
    \ type from *float* or *float64* to *int* of the above outputs, you can do the\
    \ following:\n\n```\n>>> array7 = np.zeros((2,3), dtype = 'int_') # dtype stands\
    \ for data type\n>>> print(array7)\n[[0 0 0]\n [0 0 0]]\n>>> array8 = np.ones((2,3),\
    \ dtype = 'int_')\n>>> print(array8)\n[[1 1 1]\n [1 1 1]]\n>>> array9 = np.identity(3,\
    \ dtype = 'int_')\n>>> print(array9)\n[[1 0 0]\n [0 1 0]\n [0 0 1]]\n```\n\nThere\
    \ are many varieties of dtypes or data types available in NumPy. The dtypes have\
    \ all string character codes and can be used in creating more complicated types.\
    \ Some dtypes are flexible (f), and in these dtypes the arrays must have fixed\
    \ size, but the dtypes length may be different for different arrays. Usually string\
    \ data types are flexible because one array may have strings of length 20 and\
    \ another array may have strings of length 40.\n\n| dtype | Byte | Description\
    \ |\n|---|---|---|\n| bool_ | 1 | Boolean data type |\n| bool8 | 1 | Alias to\
    \ bool_ |\n| int_ | | Default integer type. Normally either int64 or int32 |\n\
    | int0 | | Same as int_. |\n| int8 | 1 | Single-byte (8-bit) integer ranging from\
    \ -128 to 127 |\n| byte | 1 | Alias of int8 |\n| int16 | 2 | 16-bit integer ranging\
    \ from -32768 to 32767 |\n| int32 | 4 | 32-bit integer ranging from -2147483648\
    \ to 2147483647 |\n| int64 | 8 | 64-bit integer ranging from -9223372036854775808\
    \ to 9223372036854775807 |\n| uint_ | | Default unsigned integer type; alias to\
    \ either uint32 or uint64 |\n| uint0 | | Same as uint_ |\n| uint8 | 1 | Single-byte\
    \ (8-bit) unsigned integer ranging from 0 to 255 |\n| ubyte | 1 | Alias of uint8\
    \ |\n| uint16 | 2 | 16-bit unsigned integer ranging from 0 to 65535 |\n| uint32\
    \ | 4 | 32-bit unsigned integer ranging from 0 to 4294967295 |\n| uint64 | 8 |\
    \ 64-bit unsigned integer ranging from 0 to 18446744073709551615 |\n| float_ |\
    \ 8 | Alias to float64 |\n| float16 | 2 | 16-bit floating-point number |\n| float32\
    \ | 4 | 32-bit floating-point number |\n| float64 | 8 | 64-bit floating-point\
    \ number |\n| float96 | 12 | 96-bit floating-point number |\n| float128 | 16 |\
    \ 128-bit floating-point number |\n| complex_ | 16 | Alias to complex128 |\n|\
    \ complex64 | 8 | 64-bit complex floating-point number |\n| complex128 | 16 |\
    \ 128-bit complex floating-point number |\n| complex256 | 32 | 256-bit complex\
    \ floating-point number |\n| string_ | f | Bytes (or str in Python 2) data type.\
    \ This is a flexible dtype |\n| string0 | f | Alias of string_ |\n| str_ | f |\
    \ Alias of string_ |\n| unicode_ | f | String (or Unicode in Python 2) data type.\
    \ This is a flexible dtype |\n| unicode0 | f | Alias of unicode_ |\n\n## 1.3 Operators\n\
