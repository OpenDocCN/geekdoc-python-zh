    \ PBC and OBC\n    assert condition == 'periodic' or condition == 'open'\n   \
    \ # Number of interaction depending on the boundary condition\n    if condition\
    \ == 'periodic':\n        kn=N\n    else:\n        kn=N-nn\n    # Only two modes\
    \ are allowed, homogeneous and inhomogeneous\n    assert mode == 'homogeneous'\
    \ or mode == 'inhomogeneous',\\n\"Entered mode is invalid\"\n    # Checking number\
    \ of spins $N \\geq 1$\n    assert N >= 1, \"number of spins entered is not correct\"\
    \n    # Checking valid $r^{th}$ interaction\n    assert nn<=N-1 and nn>=1,\"Not\
    \ valid interaction\"\n    if mode == 'homogeneous':\n        ham=np.zeros([2**N,2**N],dtype='float64')\n\
    \        col2=np.zeros([N,1])\n        # Row index of matrix, $\\sum_{i=1}^N J_r\
    \ \\sigma_i^x \\sigma_{i+r}^x$\n        for i in range(0,2**N):\n            #\
    \ Column index of matrix, $\\sum_{i=1}^N J_r \\sigma_i^x \\sigma_{i+r}^x$\n  \
    \          for j in range(0,2**N):\n                col=qobj.decimal_binary(j,N)\n\
    \                for k in range(0,kn):\n                    k1=k+nn\n        \
    \            # For wrapping the Hamiltonian\n                    if k1>=N:\n \
    \                       k1=k1-N\n                    col2=col.copy()\n       \
    \             col2[k]=1-col2[k]\n                    col2[k1]=1-col2[k1]\n   \
    \                 dec=qobj.binary_decimal(col2)\n                    if dec==i:\n\
    \                        inn=1\n                    else:\n                  \
    \      inn=0\n                    ham[i,j]=ham[i,j]+(inn*jx)\n    else:\n    \
    \    # Checking number of $J_r^i$ interactions are valid according to BC\n   \
    \     if condition=='periodic':\n            assert len(jx)==N,\\n        \"The\
    \ entered values of magnetic strengths are not equal to number of spins\"\n  \
    \      else:\n            assert len(jx)==N-nn,\\n            \"The entered values\
    \ of magnetic strengths are not equal to number of spins\"\n        ham=np.zeros([2**N,2**N],dtype='float64')\n\
    \        col2=np.zeros([N,1])\n        # Row index of matrix, $\\sum_{i=1}^N J_r^i\
    \ \\sigma_i^x \\sigma_{i+r}^x$\n        for i in range(0,2**N):\n            #\
    \ Column index of matrix, $\\sum_{i=1}^N J_r^i \\sigma_i^x \\sigma_{i+r}^x$\n\
    \            for j in range(0,2**N):\n                col=qobj.decimal_binary(j,N)\n\
    \                for k in range(0,kn):\n                    k1=k+nn\n        \
