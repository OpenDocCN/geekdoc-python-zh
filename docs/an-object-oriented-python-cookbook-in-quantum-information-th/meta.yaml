    \ Majumdar-Ghosh 模型\n\nMajumdar-Ghosh 模型 [131–133] 的哈密顿量由下式给出，\n\n$$H = J_1 \\\
    sum_{i=1}^{N} \\vec{\\sigma}_i.\\vec{\\sigma}_{i+1} + J_2 \\sum_{i=1}^{N} \\vec{\\\
    sigma}_i.\\vec{\\sigma}_{i+2} \\quad (6.21)$$\n\n使用我们的方法，我们可以如下构建 Majumdar-Ghosh\
    \ 哈密顿量。我们以 $N = 6$，$J_1 = 1$，$J_2 = 0.5$ 和 $r = 1,2$ 在周期性边界条件下为例。注意 $J_1$ 和 $J_2$\
    \ 是均匀的。\n\n```\nham1=hamobj.heisenberg_hamiltonian(6,nn=1,mode='homogeneous',j=1.0,\n\
