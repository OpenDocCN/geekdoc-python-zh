    \ 4.65981204+0.j         ]]\n```\n\n## 3.7 The Hilbert-Schmidt inner product between\
    \ two matrices\n\nLet $A$ and $B$ be two $n \\times n$ matrices or operators,\
    \ the Hilbert-Schmidt inner product [35] between them can be defined as,\n\n$\\\
    langle A, B \\rangle_{HS} = Tr(A^\\dagger B)$\n\nIt is also defined as the Frobenius\
    \ inner product.\n\n### 3.7.1 For real or complex matrices\n\n```python\nhilbert_schmidt_inner_product(A,B)\n\
    ```\n\n## Parameters\n\n| in/out | Argument | Description |\n|---|---|---|\n|\
    \ [in] | A | A is a real or complex array of dimension (0:n-1,0:n-1) |\n| [in]\
    \ | B | B is a real or complex array of dimension (0:n-1,0:n-1) |\n| [out] | hs_innp\
    \ | It is the Hilbert-Schmidt inner product between matrices A and B |\n\n## Implementation\n\
    \n```python\ndef hilbert_schmidt_inner_product(self,A,B):\n    \"\"\"\n    Calculates\
    \ the Hilbert-Schmidt inner product between matrices.\n    Attributes:\n     \
    \   A: It is a complex or real input matrix.\n        B: It is a complex or real\
    \ input matrix.\n    Return: Hilbert-Schmidt inner product between A and B.\n\
    \    \"\"\"\n    # Calculating A†B\n    return np.trace(np.matmul(np.conjugate(np.transpose(A)),B))\n\
    ```\n\n## Example\n\nIn this example, we are finding the Hilbert-Schmidt inner\
    \ product between matrices $A_1$ and $A_3$.\n\n```python\nA=np.array([[1, -2,\
    \ 3], [-2, 3, 4], [3, 4, 5]])\nB=np.array([[1, -2, 3], [2, 3, 5],[-4, 4, 5]])\n\
    hs_innp=linear_obj.hilbert_schmidt_inner_product(A,B)\nprint(hs_innp)\n```\n\n\
    The above code prints the Hilbert-Schmidt inner product between matrices $A_1$\
    \ and $A_3$.\n68\n\nAnother example where we are finding the Hilbert-Schmidt inner\
    \ product between matrices $A_2$ and $A_4$.\n\n```python\nA=np.array([[2,complex(1,-3)],[complex(1,3),4]])\n\
    B=np.array([[2, complex(1,-3)],[complex(2,1),4]])\nhs_innp=linear_obj.hilbert_schmidt_inner_product(A,B)\n\
    print(hs_innp)\n```\n\nThe above prints the Hilbert-Schmidt inner product between\
    \ matrices $A_2$ and $A_4$.\n(35-5j)\n\n## 3.8 Gram-Schmidt orthogonalization\n\
    \nLet there be a linearly independent non-orthogonal basis set $|w\\rangle : \\\
    {|w_1\\rangle, |w_2\\rangle, \\cdots, |w_m\\rangle\\}$ (i.e. $\\langle w_i|w_j\\\
    rangle \\neq \\delta_{ij}$) in some vector space $V$ where an inner product is\
    \ defined. There is a useful method known as “Gram-Schmidt” procedure [24, 36,\
    \ 37], which can be used to generate a set of orthonormal vectors $|v\\rangle\
    \ : \\{|v_1\\rangle, |v_2\\rangle, \\cdots, |v_m\\rangle\\}$ from the non-orthonormal\
    \ set $|w\\rangle$. Define initially,\n\n$$|v_1\\rangle = \\frac{|w_1\\rangle}{||w_1\\\
    rangle||}. \\tag{3.19}$$\n\nFor $1 \\leq k \\leq m - 1$ define $|v_{k+1}\\rangle$\
    \ inductively by,\n\n$$|v_{k+1}\\rangle \\equiv \\frac{|w_{k+1}\\rangle - \\sum_{i=1}^k\
    \ \\langle v_i|w_{k+1}\\rangle|v_i\\rangle}{|||w_{k+1}\\rangle - \\sum_{i=1}^k\
    \ \\langle v_i|w_{k+1}\\rangle|v_i\\rangle||}. \\tag{3.20}$$\n\nThe Gram-Schmidt\
    \ orthogonalization procedure proves to be very helpful in context to quantum\
    \ mechanical observable (Hermitian operator), which contains degenerate eigenvalues.\
    \ The eigenvectors of the degenerate eigenvalues are not necessarily to be orthogonal\
    \ to each other. However, non-degenerate eigenvectors are orthogonal to each other.\
    \ To transform the complete eigenvectors into orthonormal eigenvectors, we perform\
    \ the Gram-Schmidt orthogonalization. This transformation is not a unitary transformation\
    \ of the eigenbasis.\n\n### 3.8.1 For real vectors\n\n```python\ngram_schmidt_ortho_rmatrix(vectors)\n\
    ```\n\n## Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | vectors | It is a real array of dimension (0:n-1,0:k-1), whose columns\
    \ are the linearly independent non-orthonormal set of vectors |\n| [out] | orthonormal_vec\
    \ | It is a real array of dimension (0:n-1,0:k-1), which stores the k vectors\
    \ as columns of dimension n which are the orthonormalized set of vectors |\n\n\
    ## Implementation\n\n```python\ndef gram_schmidt_ortho_rmatrix(self,vectors):\n\
    \    \"\"\"\n    Orthornormal set of real vectors are calculated\n    Attributes:\n\
    \        vectors: A matrix whose columns are non-orthogonal set real vectors\n\
    \    Return:\n        orthonormal_vec: A matrix whose columns are orthonormal\
    \ to each other\n    \"\"\"\n    orthonormal_vec=np.zeros((vectors.shape[0],vectors.shape[1]),\n\
    \                           dtype='float64')\n    for col in range(0,vectors.shape[1]):\n\
    \        if col != 0:\n            for col2 in range(0,col):\n               \
    \ tr=0.0\n                # Here we calculate $\\langle v_i|w_{k+1}\\rangle$\n\
    \                for row2 in range(0,vectors.shape[0]):\n                    tr=tr+(orthonormal_vec[row2,col2]*vectors[row2,col])\n\
    \                # Here we calculate $\\sum_{i=1}^k \\langle v_i|w_{k+1}\\rangle\
    \ |v_i\\rangle$\n                orthonormal_vec[:,col]=orthonormal_vec[:,col]+\n\
    \                                      (tr*orthonormal_vec[:,col2])\n        \
    \    # Here we calculate $|w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\\
    rangle |v_i\\rangle$\n            orthonormal_vec[:,col]=vectors[:,col]-orthonormal_vec[:,col]\n\
    \        if col == 0:\n            # Here calculate $|v_1\\rangle = |w_1\\rangle$\n\
    \            orthonormal_vec[:,col]=vectors[:,col]\n        tr=0.0\n        #\
    \ Finally we calculate $\\frac{|w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\\
    rangle |v_i\\rangle}{|||w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\\
    rangle |v_i\\rangle||}$\n        for row in range(0,vectors.shape[0]):\n     \
    \       tr=tr+(orthonormal_vec[row,col]*orthonormal_vec[row,col])\n        orthonormal_vec[:,col]=orthonormal_vec[:,col]/np.sqrt(tr)\n\
    \n    return orthonormal_vec\n```\n\n## Example\n\nIn this example, we are doing\
    \ the Gram-Schmidt orthogonalization of the matrix $A$ whose columns are the linearly\
    \ independent non-orthogonal vectors.\n\n$$A = \\begin{pmatrix} 1 & 2 & 3 & 4\
    \ \\\\ 2 & 33 & 4 & 5 \\\\ 3 & 4 & 53 & 6 \\\\ 4 & 5 & 6 & 73 \\end{pmatrix}.\
    \ \\tag{3.21}$$\n\n```python\nA=np.array([[1,2,3,4],[2, 33, 4, 5],[3,4,53,6],[4,5,6,73]])\n\
    B=linear_obj.gram_schmidt_ortho_rmatrix(A)\nprint(B)\n```\n\nThe above code prints\
    \ the orthogonal matrix whose columns are the orthonormal vectors.\n\n```\n[[\
    \ 0.18257419 -0.04712082 -0.10008963 -0.97694849]\n [ 0.36514837  0.93063624 -0.00416827\
    \  0.02377968]\n [ 0.54772256 -0.2120437   0.80879782  0.0297246 ]\n [ 0.73029674\
    \ -0.29450514 -0.57949183  0.21005383]]\n```"
