    # 4.1.1 The Pauli-X


    The Pauli-X gate acts on a single-qubit state. This is the quantum gate equivalent
    to the NOT gate. It is sometimes also known as a bit flip operator. It maps $|0\rangle$
    to $|1\rangle$ and $|1\rangle$ to $|0\rangle$. A generalized version of writing
    the Pauli-X acting on a qubit will be $X|a\rangle = |1-a\rangle$, where $a$ is
    either 1 or 0. The matrix representation of Pauli-X is given below:


    $$X = \begin{pmatrix} 0 & 1 \ 1 & 0 \end{pmatrix}.$$


    To flip a $N$-qubit computational basis, we have to operate $N$ tensor products
    of the Pauli-X matrix, and the mathematical operation is shown below,


    $$X^{\otimes N}|a_1 a_2 \dots a_N\rangle = |1-a_1\rangle \otimes |1-a_2\rangle
    \dots |1-a_N\rangle \quad (4.10)$$


