  md: "# 2.10 Binary digits shift\n\nThis algorithm is used in shifting the string\
    \ of binary digits to the left or right by $k$ place values. Let us define the\
    \ left and right shift operators as, $S_L$ and $S_R$. The operation of the left\
    \ shift operator is shown below,\n\n$S_L[a_1a_2a_3\\cdots a_n]_2 = [a_2a_3a_4\\\
    cdots a_na_1]_2$. (2.19)\n\nThe operation of the right shift operator is shown\
    \ below,\n\n$S_R[a_1a_2a_3\\cdots a_n]_2 = [a_na_1a_2a_3a_4\\cdots a_{n-1}]_2$.\
    \ (2.20)\n\nIn Eq. [2.19] and Eq. [2.20], the $a_i$'s takes value either zero\
    \ or one in the binary representation. For shifting left or right $k$ times we\
    \ have to operate $S_L$ or $S_R$, respectively, totally $k$ times in succession.\
    \ This routine is useful for studying quantum states which are shift symmetric\
    \ and it can be put to other generic uses depending on the problem under consideration.\n\
    \n```\nbinary_shift(vec,shift=1,shift_direction='right')\n```\n\n# Parameters\n\
    \n| in/out | Argument | Description |\n| :--- | :--- | :--- |\n| [in] | vec |\
    \ vec is an integer array of dimension (0:n−1) which is the given binary string\
    \ |\n| [in] | shift | It is degree of the shift towards left or right direction.\
    \ By default the value is 1 |\n| [in] | shift\\_direction | It can take only the\
    \ following values,<br>• shift\\_direction = ‘right’ ⇒ right direction shift,\
    \ and it is the default value.<br>• shift\\_direction = ‘left’ ⇒ left direction\
    \ shift. |\n| [out] | shift\\_vec | It is an integer array of dimension (0:n−1)\
    \ which is the shifted binary string of the array vec |\n\n# Implementation\n\n\
    ```\ndef binary_shift(self,vec,shift=1,shift_direction='right'):\n    \"\"\"\n\
    \    Shifting of string of binary number\n    Input:\n        vec: array containing\
    \ binary matrix elements i.e. 0 or 1\n        shift: degree of the shift\n   \
    \     shift_direction: its value is either left or right\n    Output:\n```"
