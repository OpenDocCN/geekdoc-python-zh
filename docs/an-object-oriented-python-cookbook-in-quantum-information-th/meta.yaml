    \ 等可以是对象，这些对象的属性是体重、身高等，这些对象的行为如下：吃饭、说话、走路等。类是对象的蓝图，例如，Ram、Matthew 和 Eric 是 Human\
    \ 类的对象。类定义了对象的共同属性和行为。方法是定义类中对象行为的函数。让我们尝试通过创建 Human 类来理解上述讨论。\n\n### 1.9.1 创建\
    \ Human 类\n\nHuman 类的对象属性是 **name**、**weight** 和 **height**。对象行为是 **walking**\
