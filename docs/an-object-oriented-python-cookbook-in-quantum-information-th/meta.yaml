  md: "# Implementation\n\n```\ndef power_smatrix(self,mat1,k,precision=10**(-10)):\n\
    \    \"\"\"\n    It calculates the power of a real symmetric matrix.\n    Attributes:\n\
    \        mat1 : The matrix or array of which power is  to be calculated.\n   \
    \     k : value of the power\n        precision: if the absolute eigenvalues below\
    \ the precision\n                   value will be considered as zero\n    Return:\
    \ k'th Power of symmetric matrix mat1\n    \"\"\"\n    eigenvalues,eigenvectors,info=la.dsyev(mat1)\n\
    \    flag=0\n    for i in eigenvalues:\n        # Checking any eigenvalues is\
    \ negative\n        if i < 0.0:\n            flag=1\n    # If all eigenvalues\
    \ are +ve, then D is real type\n    if flag==0:\n        diag=np.zeros([eigenvectors.shape[0],eigenvectors.shape[1]],\\\
    n                      dtype='float64')\n    # If any eigenvalues is -ve, then\
    \ D is complex type\n    else:\n        diag=np.zeros([eigenvectors.shape[0],eigenvectors.shape[1]],\\\
    n                      dtype='complex_')\n    # Constructing D^k\n    for i in\
    \ range(0,eigenvectors.shape[0]):\n        if abs(eigenvalues[i]) <= precision:\n\
    \            diag[i,i]=0.0\n            eigenvalues[i]=0.0\n        if eigenvalues[i]\
    \ < 0.0:\n            diag[i,i]=pow(abs(eigenvalues.item(i)),k)*pow(complex(0,1),2*k)\n\
    \        else:\n            diag[i,i]=pow(eigenvalues.item(i),k)\n    # Constructing\
    \ OD^kO^T, where O is orthogonal matrix\n    diag=np.matmul(np.matmul(eigenvectors,diag),np.transpose(eigenvectors))\n\
    \    return diag\n```\n\n# Example\n\nIn this example, we are finding the matrix\
    \ $A_1^{2/3}$.\n\n```\nA=np.array([[1, -2, 3], [-2, 3, 4], [3, 4, 5]])\nB=linear_obj.power_smatrix(A,2/3)\n\
    print(B)\n```\n\nThe above code prints $A_1^{2/3}$.\n\n```\n[[ 0.99390456+0.77939749j\
    \ -1.08157018+0.66289919j  1.42855357-0.61766176j]\n [-1.08157018+0.66289919j\
    \  1.84533521+0.56381414j  1.75131174-0.52533846j]\n [ 1.42855357-0.61766176j\
    \  1.75131174-0.52533846j  2.62409023+0.48948842j]]\n```"
