  md: '# 6


    # One-Dimensional Quantum Spin-1/2 Chain Models


    In this chapter we will give the numerical recipes for constructing the spin half
    Fermionic Hamiltonians in one dimension [115–118], basically a lattice of contiguous
    electrons along a line. Each electron at a given point on the one-dimensional
    lattice represents one qubit (here qubits are synonymous with spins) of information.
    Spin Hamiltonians or what is popularly called the spin chain models are prototypical
    in understanding the origin of magnetism and magnetic phases [119–121]. Not only
    that these spin chains at a temperature of zero Kelvin can be used to study and
    understand quantum phase transitions [80, 83], which unlike thermal phase transitions
    do not involve any thermal parameter. These Hamiltonians also prove as a fertile
    ground for testing various quantum information tasks not only theoretically but
    also experimentally [122–124]. We have given the numerical recipes for all possible
    interaction Hamiltonian’s, and as we progress through the chapter, we will give
    some examples on how to construct some famous spin chains using our numerical
    recipes for the sake of illustration.


    To understand further, we consider the simple but the well known Heisenberg spin
    chain model, a boon for people working in the area of magnetism. Using the Heisenberg
    model, the magnetic properties of many insulating crystals can be explained [125,
    126]. The Hamiltonian of the Heisenberg model can be written as,


    $$\hat{\mathcal{H}} = -J \sum_{i=1}^{N} \vec{\sigma}_i \cdot \vec{\sigma}_{i+1},
    \quad (6.1)$$


    where $J$ is the coupling constant and the periodic boundary condition is in effect,
    that is $\vec{\sigma}_{N+1} \equiv \vec{\sigma}_1$. Every spin is represented
    by a quantum operator acting upon the tensor product ($\mathbb{C}^2$)$^{\otimes
    N}$ as each site is associated with a complex two-dimensional Hilbert space. To
    make things more clear, let us take a 3 spin Heisenberg model, we can have two
    different types of boundary conditions, one is the periodic boundary condition
    (PBC) in which there is a wrapping up of the spins end-to-end and the other which
    is the open boundary condition (OBC) where there is no wrapping up and end spins
    are left free. Let us write the Hamiltonian for the model given in Eq. [6.1] as
    below, considering periodic boundary conditions with end to end wrap up of the
    form $\sigma_{N+1} \equiv \sigma_1$


    $$\mathcal{H} = -J \sum_{i=1}^{3} \vec{\sigma}_i \cdot \vec{\sigma}_{i+1} \quad
    (6.2)$$

    $$= -J( \vec{\sigma}_1 \cdot \vec{\sigma}_2 + \vec{\sigma}_2 \cdot \vec{\sigma}_3
    + \underbrace{\vec{\sigma}_3 \cdot \vec{\sigma}_1}_{\text{wrap up}} ), \quad (6.3)$$

    $$= -J(\sigma_1^x \sigma_2^x + \sigma_1^y \sigma_2^y + \sigma_1^z \sigma_2^z +
    \sigma_2^x \sigma_3^x + \sigma_2^y \sigma_3^y + \sigma_2^z \sigma_3^z + \sigma_3^x
    \sigma_1^x + \sigma_3^y \sigma_1^y + \sigma_3^z \sigma_1^z) \quad (6.4)$$


    Now for a model with open boundary conditions where there is no such condition
    of end to end wrap up like $\vec{\sigma}_{N+1} \equiv \vec{\sigma}_1$, we can
    write


    $$\mathcal{H} = -J( \vec{\sigma}_1 \cdot \vec{\sigma}_2 + \vec{\sigma}_2 \cdot
    \vec{\sigma}_3) \quad (6.5)$$

    $$= -J(\sigma_1^x \sigma_2^x + \sigma_1^y \sigma_2^y + \sigma_1^z \sigma_2^z +
    \sigma_2^x \sigma_3^x + \sigma_2^y \sigma_3^y + \sigma_2^z \sigma_3^z) \quad (6.6)$$'
