    # Preface


    Writing the preface is a ceremonial event for any author. When I wrote the book,
    *Numerical Recipes in Quantum Information Theory and Quantum Computing: An Adventure
    in FORTRAN 90*, published by CRC Press in the year 2021, the committee at CRC
    Press felt that a Python version of this also would be an interesting read and
    they encouraged me to undertake the project. With this motivation from CRC Press,
    and also driven by my own “computational” urges, I proceeded to author a book
    which incorporates a plethora of operations and tasks in quantum information,
    quantum entanglement and spin chain systems in the latest version of the Python
    programming language. This book was christened as *An Object-Oriented Python Cookbook
    for Quantum Information Theory and Quantum Computing*; it is a cookbook because
    it has a lot of recipes in the aforesaid fields. When I embarked to write this
    book and develop efficient Python codes, I thought, Why not incorporate the latest
    data structures in Python like OOPs (Object-Oriented Programming System)? This
    paved a way to develop codes which not only look clean but also work efficiently.


    Python is one of the major tools used by everyone, from software professionals
    and economists to physicists, chemists, and molecular biologists. The simplicity
    in syntax and the variety of in-built functions and libraries overshadow its speed
    compared to other languages. With such superior features and state-of-the-art
    data structures, OOPs Python was our choice to develop this library. These packages
    which we have developed can be installed on any computer using a PIP install command
    without much difficulty. Once it is installed, all the libraries will be in their
    correct locations (paths) and the users can use the libraries without any problems
    by following the instructions given in the book. Throughout the book, the SciPy
    and NumPy libraries are used for invoking certain in-built functions in Python.
    Another feature of the book is that, for each and every code, we have developed
    a mathematical way of writing the comments using sophisticated packages so that
    the user feels at home in every step of the code. This way of developing the comments
    along the code also has an advantage of establishing a one-to-one mapping between
    the mathematical nature of the operation and the algorithmic flow in the code
    as both are quite complementary aspects in solving any problem. At the end of
    every chapter, a complete example involving a mix of codes from that chapter is
    illustrated which enhances ones grasp on how to use these codes.


    This book contains more than 100 numerical routines in Python and it will be extremely
    useful for a practicing physicist, both theoretical and experimental, working
    in the areas of quantum information theory, quantum computing, quantum entanglement
    and also on condensed matter quantum many-body spin half chains. We also remark
    here that, there is a chapter devoted to numerical linear algebra procedures and
    a final chapter on random states and matrices too. We can safely and humbly say
    that the computational libraries cover a wide spectrum of topics.


    In a bird’s eye view we see about the chapters. Chapter 1 is a self contained
    introduction to the Python programming language and the nuances of OOPs programming.
    This chapter is written in such a way that anyone even without prior knowledge
    of programming can learn OOPs Python. Each and every syntax and structure of the
    language is explained with'
  - '[PAGE 14]


    carefully chosen examples for better clarity. Chapter 2 contains the basic tools
    of quantum mathematics, the mathematical operations which form the core of the
    theory. Chapter 3 is about numerical linear algebra and other linear algebra-based
    quantum mechanical operations. Chapter 4 contains those codes with which you can
    build quantum gates, states and a variety of important quantities involving the
    states such as fidelity, entropies, trace distance and so on. Chapter 5 deals
    with quantification of entanglement or entanglement measures. In this chapter,
    we have developed high-speed methods of computing partial trace and partial transpose
    of any arbitrary set of qubits from a given superset of qubits. Later, using these
    operations, we have developed codes for almost all frequently used entanglement
    measures for both pure and mixed states. Chapter 5 culminates with some illustrations
    of entanglement detection such as Peres PPT (Positive Partial Transpose) criteria
    and the Horodecki''s reduction criteria for separability. Chapter 6 deals with
    the construction of several one-dimensional spin half-chain Hamiltonians with
    and without random bond interactions and with and without homogeneous magnetic
    fields, including Heisenberg and Ising model and their variants, spin models with
    asymmetric interactions like the DM interactions. Important to note here is that
    the codes developed in this chapter will work for any $r^{th}$ neighbour exchange
    interaction; this enables us to construct any one-dimensional Hamiltonian with
    very much ease. Last but not least, a final chapter on construction of random
    states, density matrices and other pseudo random distributions is included for
    the sake of completeness and elegance.


    This book would not have been possible without the help of Ms. Carolina Antunes
    of CRC Press Taylor & Francis, Ms. Elizabeth (Betsy) Byers of CRC Press and Ms.
    Sumati Agarwal. All of them were very supportive right from the day the proposal
    was submitted till the end. I would like to thank CRC Press, Taylor & Francis
    for giving us this opportunity to write this book and make the codes available
    to all aspiring researchers in this area. Last but not least, the codes given
    in this book were verified several times with different physical systems and to
    the best of our knowledge gives accurate outputs. In spite of several rounds of
    careful editing and testing, there may always be errors for which the authors
    will feel grateful if the readers point out the same.


    M. S. Ramkarthik

