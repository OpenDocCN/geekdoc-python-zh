    ```\n\n### 示例\n\n在此示例中，我们计算以下两个实数矩阵之间的张量积：\n\n$$A = \\begin{pmatrix} 1 \\\\ 2\
    \ \\end{pmatrix}, \\quad B = \\begin{pmatrix} 1 & 2 \\\\ 3 & 1 \\end{pmatrix}$$\n\
    \n```python\nimport numpy as np\nA=np.array([1,2])\nB=np.array([[1,2],[3,1]])\n\
    C=quantum_obj.tensor_product_matrix(A,B)\nprint(C)\n```\n\n上述代码打印出矩阵 A 和 B 之间张量积的输出。\n\
    \n```\n[[1 2]\n [3 1]\n [2 4]\n [6 2]]\n```\n\n在此示例中，我们计算以下两个复数矩阵之间的张量积：\n\n$$A\
    \ = \\begin{pmatrix} 1 \\\\ 1-i \\end{pmatrix}, \\quad B = \\begin{pmatrix} 1+i\
    \ \\\\ 3-3i \\end{pmatrix}$$\n\n```python\nimport numpy as np\nA=np.array([1,complex(1,-1)])\n\
    B=np.array([complex(1,1),complex(3,-3)])\nC=quantum_obj.tensor_product_matrix(A,B)\n\
    print(C)\n```\n\n上述代码打印出矩阵 A 和 B 之间张量积的输出。\n\n```\n[[1.+1.j]\n [3.-3.j]\n [2.+0.j]\n\
    \ [0.-6.j]]\n```\n\n## 2.6 两个矩阵之间的对易子\n\n通常已知矩阵在乘法下不满足交换律，因此定义两个矩阵之间的对易子 $[A,\
    \ B]$ 是有用的，其定义如下：\n\n$$C = [A, B] = AB - BA, \\tag{2.12}$$\n\n如果 $[A, B] = 0 \\\
    Rightarrow AB = BA$，则称矩阵 $A$ 和 $B$ 彼此对易。对易子是量子力学中的一个基本原理，我们从位置和动量的第 $i$ 个和第 $j$\
    \ 个分量之间的正则对易关系 [27] 开始，即 $[x_i, p_j] = i\\hbar\\delta_{ij}$，整个量子力学大厦由此建立。同样值得一提的是，如果两个物理可观测量不对易，那么它们不能被一组共同的特征向量对角化，这对海森堡不确定性原理等有深远影响。\n\
    \n### 2.6.1 针对实数或复数矩阵\n\n`commutation(A,B)`\n\n### 参数\n\n| 输入/输出 | 参数 | 描述 |\n\
    |---|---|---|\n| [in] | A | A 是一个维度为 (0:n-1,0:n-1) 的 NumPy 数组 |\n| [in] | B |\
    \ B 是一个维度为 (0:n-1,0:n-1) 的 NumPy 数组 |\n| [out] | C | C 是一个维度为 (0:n-1,0:n-1) 的\
    \ NumPy 数组，是 A 和 B 之间的对易子 |\n\n### 实现\n\n```python\ndef commutation(self,A,B):\n\
    \    \"\"\"\n    Here we calculate commutation between matrices A and B\n    Attributes:\n\
    \        A: it is a matrix\n        B: it is another matrix\n    Returns: AB-BA\
    \ matrix\n    \"\"\"\n    # We directly return the commutation relation, $AB -\
    \ BA$\n    return np.matmul(A,B)-np.matmul(B,A)\n```\n\n### 示例\n\n在此示例中，我们计算以下两个实数矩阵之间的对易子：\n\
