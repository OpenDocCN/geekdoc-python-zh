    \ if you want to run the Python script *myfile.py* in the terminal then it can\
    \ be done as follows,\n\n```\n$ python myfile.py\n```\n\nUsually, most of the\
    \ Python libraries, including the quantum information library developed in this\
    \ book, are a collection of functions written in .py files. It is now the right\
    \ time to introduce the structural aspects of any Python code.\n\n### 1.1 Variables\n\
    \nVariables are reserved memory locations to store values [11]. The values assigned\
    \ to these variables can be from different data types. For example, it can be\
    \ number, string, list, tuple, dictionary, etc. Later in this chapter, we will\
