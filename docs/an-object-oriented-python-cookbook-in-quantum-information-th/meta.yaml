- md: "## 5.9 Residual entanglement for three qubits\n\nResidual entanglement of a\
    \ three qubit pure state is also known as three tangle [113]. We define the three\
    \ tangle to be,\n\n$$\\tau_3 = \\tau_{1(23)} - \\tau_{12} - \\tau_{13}$$\n\nwhere\
    \ $\\tau$ can be defined as the square of concurrence. We can also define the\
    \ tangle between one qubit (say the $i^{th}$) and the rest of the qubits if the\
    \ total state is pure. This is because of Schmidt decomposition. The tangle between\
    \ qubit $i$ and the rest is the one-tangle, given by $\\tau_{i,(\\text{rest of\
    \ the spins})} = 4 \\det(\\rho_k)$, where $\\rho_k$ is the single qubit reduced\
    \ density matrix got by partial tracing all other qubits except the $k^{th}$ qubit.\
    \ This concept can be used to measure the entanglement in a three qubit system\
    \ like the famous GHZ state or the W state. We can rewrite Eq. [5.25] as follows,\n\
    \n$$\\tau_3 = 4 \\det(\\rho) - C_{12}^2 - C_{13}^2.$$\n\nFrom the structure of\
    \ the GHZ and W state, we see the contrasting behaviour of bipartite entanglement\
    \ in them, this three tangle will be useful in differentiating these entanglement\
    \ properties for such three qubit pure states.\n\n### 5.9.1 For a real or complex\
    \ state\n\n```\nresidual_entanglement_vec(state)\n```\n\n### Parameters\n\n| In/Out\
    \ | Argument | Description |\n|---|---|---|\n| [in] | state | It is a real or\
    \ complex array of dimension (0:7), which is the input pure state |\n| [out] |\
    \ res_tang | It returns the value of the residual entanglement |\n\n### Implementation\n\
    \n```\ndef residual_entanglement_vec(self,state):\n    \"\"\"\n    Calculation\
    \ of residual entanglement for a three-qubit quantum state\n    Parameters\n \
    \       state : Real or complex 3-qubit state\n\n    Returns\n        res_tang\
    \ : Residual entanglement value\n\n    \"\"\"\n    # Checking whether entered\
    \ state is a 3 qubit system\n    assert state.shape[0]==8,\"It is not a three\
    \ qubit quantum system\"\n    # Calculating det(ρ)\n    det=np.linalg.det(self.partial_trace_vec(state,[1]))\n\
    \    # Calculating 4 det(ρ)\n    det=4*det\n    # Finally calculating, τ₃ = 4\
    \ det(ρ) - C²₁₂ - C²₁₃\n    res_tang=det-(self.concurrence_vec(state,1,2)**2)-\\\
    \n    (self.concurrence_vec(state,1,3)**2)\n    res_tang=abs(res_tang)\n    return\
    \ res_tang\n```\n\n### Example\n\nIn this example, we are finding the value of\
    \ the residual entanglement of the three-qubit real state |ψ₂⟩.\n\n```\nfrom QuantumInformation\
    \ import QuantumMechanics as QM\nqobj=QM()\n# state2 will store |ψ₂⟩\nstate2=np.zeros([2**3],dtype='float64')\n\
    for i in range(0,state2.shape[0]):\n    state2[i]=i+1\nstate2=qobj.normalization_vec(state2)\n\
    # Calculating τ₃\nres_tang=entobj.residual_entanglement_vec(state2)\nprint(res_tang)\n\
    ```\n\nThe preceding code prints the required value of the residual entanglement\
    \ as,\n\n1.8041124150158794e-16\n\nSimilarly, we calculate the value of the residual\
    \ entanglement of the three-qubit complex state |ψ₃⟩.\n\n```\nfrom QuantumInformation\
