    ```

    $ python <filename>.py

    ```


    For example, if you want to run the Python script *myfile.py* in the terminal
    then it can be done as follows,


    ```

    $ python myfile.py

    ```


    Usually, most of the Python libraries, including the quantum information library
    developed in this book, are a collection of functions written in .py files. It
    is now the right time to introduce the structural aspects of any Python code.


    # 1.1 Variables


    Variables are reserved memory locations to store values [11]. The values assigned
    to these variables can be from different data types. For example, it can be number,
    string, list, tuple, dictionary, etc. Later in this chapter, we will be discussing
    a few of these data types. A variable name may include the following, uppercase
    (A-Z) and lowercase (a-z) letters, digits (0-9) and underscore (_). However, a
    variable name can never start with a number, and we cannot include any of the
    special characters inside the variable name. Below we have shown few examples
    of proper variable names,


    ```

    >>> joules = 2   # integer data type

    >>> energy_transform = "Convert joules to electron volt"   # string data type

    >>> Energy_ev = joules*(6.242e+18)   # float data type

    >>> probabilities3 = [0.3, 0.6, 0.1]   # List data type

    ```


    Any statement written after # is considered as a comment by the Python interpreter,
    and this statement is never executed by the interpreter. Comments are written
    to add more clarity for the person who is trying to decode the program and for
    a better understanding of the code. Now we are ready to delve into the world of
    the most commonly used data types in Python.'
