    ## 4.2 贝尔态\n\n贝尔态是四个特定的最大纠缠双量子比特态 [24, 45]，如下所示。值得一提的是，除了标准双量子比特基之外，它们还在双量子比特希尔伯特空间中贡献了另一组正交归一基。从隐形传态\
    \ [46]、超密编码 [47] 以及产生 EPR 悖论简化版本 [48] 等操作的角度来看，贝尔态非常重要。\n\n$|b_1\\rangle = \\\
    frac{1}{\\sqrt{2}}(|01\\rangle + |10\\rangle)$, (4.16)\n\n$|b_2\\rangle = \\frac{1}{\\\
    sqrt{2}}(|01\\rangle - |10\\rangle)$, (4.17)\n\n$|b_3\\rangle = \\frac{1}{\\sqrt{2}}(|00\\\
    rangle + |11\\rangle)$, (4.18)\n\n$|b_4\\rangle = \\frac{1}{\\sqrt{2}}(|00\\rangle\
    \ - |11\\rangle)$. (4.19)\n\n态 $|b_1\\rangle$, $|b_2\\rangle$, $|b_3\\rangle$\
    \ 和 $|b_4\\rangle$ 共同构成了四维希尔伯特空间的最大纠缠双量子比特基，称为贝尔基。贝尔态在量子信息、量子计算领域以及主要在量子自旋链系统中具有许多应用。例如，在\
    \ Majumdar-Ghosh 模型中，模型在 MG 点的基态是双重简并的，它们是 $|b_2\\rangle$ 态的张量积。\n\n双重简并的基态可以简单地写为，\n\
    \n$$|R_N\\rangle = [1\\ 2] \\otimes [3\\ 4] \\otimes \\dots \\otimes [N-1\\ N],\
    \ \\quad |L_N\\rangle = [2\\ 3] \\otimes [4\\ 5] \\otimes \\dots \\otimes [N\\\
    \ 1], \\quad (4.20)$$\n\n其中每个双量子比特基本块为 $[i\\ i+1] = \\frac{1}{\\sqrt{2}}(|01\\\
    rangle_{ii+1} - |10\\rangle_{ii+1})$，$N$（偶数）表示系统大小。从方程 [4.20] 我们观察到，$|L_N\\rangle$\
    \ 态可以通过将 $|R_N\\rangle$ 态向右平移来构造。基于上述讨论，在我们接下来的方法中，我们提供了构造任意四个贝尔态的 $N$ 个张量积及其平移态的选项。\n\
    \n## 4.2.1 $|b_1\\rangle$ 贝尔态的 $N/2$ 张量积\n\n在此方法中，我们可以构造以下两个态中的任意一个，\n\n$$|\\\
    phi_1\\rangle = \\frac{1}{2^{N/4}} (|01\\rangle_{12} + |10\\rangle_{12}) \\otimes\
    \ (|01\\rangle_{34} + |10\\rangle_{34}) \\otimes \\dots \\otimes (|01\\rangle_{N-1N}\
    \ + |10\\rangle_{N-1N}), \\quad (4.21)$$\n\n和\n\n$$|\\phi_2\\rangle = \\frac{1}{2^{N/4}}\
    \ (|01\\rangle_{23} + |10\\rangle_{23}) \\otimes (|01\\rangle_{45} + |10\\rangle_{45})\
    \ \\otimes \\dots \\otimes (|01\\rangle_{N1} + |10\\rangle_{N1}), \\quad (4.22)$$\n\
    \n以下方法使用模块 **RecurNum** 中的函数 **RecurChainRL1**，**RecurChainRL1** 的功能将在本节末尾解释。\n\
    \n```\nbell1(tot_spins=2,shift=0)\n```\n\n## 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :---\
    \ | :--- | :--- |\n| [in] | tot_spins | 存储自旋总数 ($N$)，必须是偶数。默认值为 2 |\n| [in] |\
    \ shift | 只能取以下值，<br>- shift=0，生成态 $|\\phi_1\\rangle$。这是默认值<br>- shift=1，生成态 $|\\\
    phi_2\\rangle$ |\n| [out] | state | 一个实数数组，存储态 $|\\phi_1\\rangle$ 或 $|\\phi_2\\\
    rangle$。 |\n\n## 实现\n\n```python\ndef bell1(self,tot_spins=2,shift=0):\n    \"\
    \"\"\n    Construct N tensor products of the |bell1> or T|bell1> Bell state\n\
    \    Input:\n        tot_spins: The total number of spins\n        shift: for\
    \ value 0 we get |bell1> and for value 1 T|bell1>.\n    Output:\n        state:\
    \ the result will be |bell1> or T|bell1> state.\n    \"\"\"\n    # Checking the\
    \ number of qubits $N$ to be even\n    assert tot_spins%2==0,\"the total number\
    \ of spins is not an even number\"\n    # Checking the entered shift value is\
    \ correct or not\n    assert shift==0 or shift==1, \"Invalid entry of the shift\
    \ value\"\n    terms=int(tot_spins/2)\n    row=np.zeros([terms,1])\n    mylist=[]\n\
    \    icount=-1\n    RecurNum.RecurChainRL1(row,tot_spins,icount,mylist,shift)\n\
    \    mylist=np.array(mylist)\n    state=np.zeros([2**tot_spins])\n    factor=1/math.sqrt(2)\n\
    \    len_mylist=len(mylist)\n    # Constructing the state $|\\phi_1\\rangle$ or\
    \ $|\\phi_2\\rangle$\n    for x in range(0,len_mylist):\n        state[mylist.item(x)]=factor**terms\n\
    \    return(state)\n```\n\n## 示例\n\n在此示例中，我们生成方程 [4.22] 的态 $|\\phi_2\\rangle$，其中总自旋数\
    \ $N = 4$。\n\n$|\\phi_2\\rangle = \\frac{1}{2}(|0101\\rangle_{2341} + |0110\\\
    rangle_{2341} + |1001\\rangle_{2341} + |1010\\rangle_{2341})$ (4.23)\n\n$|\\phi_2\\\
    rangle = \\frac{1}{2}(|1010\\rangle_{1234} + |0011\\rangle_{1234} + |1100\\rangle_{1234}\
    \ + |0101\\rangle_{1234})$ (4.24)\n\n方程 [4.24] 中态 $|\\phi_2\\rangle$ 的矩阵表示可以写为，\n\
    \n$|\\phi_2\\rangle = [0\\ 0\\ 0\\ 0.5\\ 0\\ 0.5\\ 0\\ 0\\ 0\\ 0\\ 0.5\\ 0\\ 0.5\\\
    \ 0\\ 0\\ 0]^{1/T}$ (4.25)\n\n```python\nstate=gt_obj.bell1(4,shift=1)\nprint(state)\n\
    ```\n\n上述代码打印以下数组，\n\n$[0.\\ 0.\\ 0.\\ 0.5\\ 0.\\ 0.5\\ 0.\\ 0.\\ 0.\\ 0.\\ 0.5\\\
    \ 0.\\ 0.5\\ 0.\\ 0.\\ 0.]$\n\n如前所述，我们在当前方法中使用了递归函数 **RecurChainRL1**。为了理解这个递归函数，让我们考虑方程\
    \ [4.24] 中给出的示例。方程 [4.24] 的态 $|\\phi_2\\rangle$ 在以下位置具有非零项：$(10)_{10} \\equiv\
    \ (1010)_2$, $(3)_{10} \\equiv (0011)_2$, $(12)_{10} \\equiv (1100)_2$, 和 $(5)_{10}\
    \ \\equiv (0101)_2$。这些位置由递归函数 **RecurChainRL1** 计算，输出将存储在列表中，如 $[10, 3, 12, 5]$。\n\
    \n## 4.2.2 $|b_2\\rangle$ 贝尔态的 $N/2$ 张量积\n\n在此方法中，我们可以构造以下两个态中的任意一个，\n\n$|\\phi_3\\\
    rangle = \\frac{1}{2^{N/2}} (|01\\rangle_{12} - |10\\rangle_{12}) \\otimes (|01\\\
    rangle_{34} - |10\\rangle_{34}) \\otimes \\dots \\otimes (|01\\rangle_{N-1N} -\
    \ |10\\rangle_{N-1N})$, (4.26)"
