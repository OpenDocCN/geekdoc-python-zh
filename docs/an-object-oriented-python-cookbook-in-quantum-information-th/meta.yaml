  md: '# 7 Generating Random Matrices and Random Vectors


    In this chapter we give the numerical recipes to construct random numbers following
    a particular distribution and also construct random states and density matrices,
    here we have used the Gaussian and the uniform distribution. These are the most
    important distributions used in constructing random quantum states [138] as we
    progress through the chapter. Moreover, there are recipes to construct random
    matrices which occur in random matrix theory [139–141] and boderlining areas of
    quantum information. At the end of the chapter, recipes to construct the random
    density matrix are also given which will be very useful for people working on
    random quantum mixed states [142, 143]. The examples indicating the output using
    these recipes are not given for a specific reason that everytime the user prints
    an output, it will be different as they are from random processes. In this chapter
    we will be primarily discussing the class, **QRandom**. The class is written inside
    the Python module **chap7_randommatrix.py**. The class **QRandom** contains all
    the methods pertaining to generating random matrices from the uniform and Gaussian
    distribution. To import the class and create its objects, you have to write the
    following code,


    ```

    # Importing the QRandom class

    from QuantumInformation import QRandom


    # Instantiate the object of the QRandom class

    qrobj=QRandom()

    ```


    # 7.1 Random number generator for Gaussian distribution


    The probability density function for a Gaussian distribution is given by,


    $$f(x) = \frac{1}{\sigma\sqrt{2\pi}} e^{-\frac{1}{2}\left(\frac{x-\mu}{\sigma}\right)^2}
    = \mathcal{N}(\mu, \sigma^2),$$


    where $\mu$, $\sigma^2$ are the mean and variance of the probability distribution,
    respectively. In Python, we use Numpy’s random number routine to generate numbers
    from uniform or Gaussian distribution.


    # 7.1.1 For a real random matrix whose elements are chosen from the Gaussian distribution


    ```

    random_gaussian_rvec(tup,mu=0,sigma=1)

    ```'
