    Roots are complex\")\n```\n\n这将输出：\n\nRoots are complex\n\n## 1.5 循环\n\n循环对于重复执行类似操作非常有用。循环的重要性如此之大，以至于没有循环元素，任何编程语言都将完成99%。循环有两种类型，它们的语法如下所示。\n\
    \n### 1.5.1 while 循环\n\n**while** 循环的通用语法写法如下：\n\n```\nwhile <test_expression>:\n\
    \    <Body of while>\n```\n\n**while** 循环的主体（`<Body of **while**>`）会一直执行，直到条件\
    \ `<test_expression>` 成立。上述语法的一个示例如下：\n\n```\n# Calculating the n! factorial\n\
    n = 3\nfact=1\nwhile n > 0:\n    fact=fact*n\n    n=n-1\nprint(\"Factorial =\"\
    ,fact)\n```\n\n这将输出：\n\n```\nFactorial = 6\n```\n\n正如我们上面已经讨论过的，**while** 循环会一直执行直到测试表达式成立，然而，当你需要遍历列表的项目或必须将循环体运行\
    \ *n* 次时，**while** 循环就变得效率低下。for 循环完美地适合这个角色，正如下一节所讨论的。\n\n### 1.5.2 for 循环\n\n\
