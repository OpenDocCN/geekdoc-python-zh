    \ the question arises, what makes Python so much powerful? The answer to this\
    \ question not only lies in the fact that Python is a general-purpose, dynamic,\
    \ high-level language, simple and short coding style, but it also behaves like\
    \ a glue-language, which can interact with other programming languages and their\
    \ libraries [2], such as C [3], C++ [4] and FORTRAN [5, 6]. These are the reasons\
    \ which makes Python as the favourite programming language in the field of science\
    \ [7], engineering [8], data analysis [9], machine learning [10] etc.\n\nHowever,\
    \ every strength comes with its weakness, and in this case, it is the execution\
    \ speed. Python is an interpreted language in which source code does not get directly\
    \ compiled into machine instructions, rather each statement is executed at run-time\
    \ by sequentially feeding it into an interpreter loop. In short, the framework\
    \ of source code implementation in Python is as follows,\n\n1. Translate the source\
    \ code to an intermediate format known as *byte code* [11]. Byte code provides\
    \ the advantage of portability, which means that it is a platform-independent\
    \ format.\n2. In the following step, the interpreter interprets the *byte code*.\n\
    \nAll the above points convey that Python codes are not compiled directly into\
