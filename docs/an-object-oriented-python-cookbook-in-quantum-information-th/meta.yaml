    \ | 参数 | 描述 |\n| :--- | :--- | :--- |\n| [in] | vec | vec 是一个维度为 (0:n−1) 的整数数组，即给定的二进制字符串\
    \ |\n| [in] | shift | 向左或向右移动的度数。默认值为1 |\n| [in] | shift\\_direction | 只能取以下值：<br>•\
