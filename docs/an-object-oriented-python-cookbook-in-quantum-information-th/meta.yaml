    \ the list which will be generated is $[0, -3, -12, 15]$.\n\n# 4.3 The $N$-qubit\
    \ Greenberger-Horne-Zeilinger (GHZ) state\n\nThe GHZ state was first studied by\
    \ Daniel Greenberger, Michael Horne and Anton Zeilinger [49]. The GHZ state is\
    \ an orthonormal entangled state of three qubits which is,\n\n$$|GHZ\\rangle =\
    \ \\frac{|000\\rangle + |111\\rangle}{\\sqrt{2}}. \\tag{4.39}$$\n\nA generalization\
    \ of it to $N$ qubits ($N \\geq 3$) gives us the $N$-qubit GHZ state which can\
    \ be defined as\n\n$$|GHZ\\rangle = \\frac{|0\\rangle^{\\otimes N} + |1\\rangle^{\\\
    otimes N}}{\\sqrt{2}} = \\frac{|00000\\cdots 0\\rangle_N + |11111\\cdots 1\\rangle_N}{\\\
    sqrt{2}}. \\tag{4.40}$$\n\nThese states are extensively used in quantum teleportation\
    \ [50, 51], quantum cryptography protocols [52-54] and quantum game theory [55].\
    \ It is in fact quite interesting to note that the $N$-qubit GHZ state is the\
    \ ground state of a ferromagnet [56]. Another interesting property of the three-qubit\
    \ GHZ state ($N=3$ case) is that all the three qubits are entangled but no two-qubits\
    \ are entangled.\n\n```\nnGHZ(tot_spins=3)\n```\n\n# Parameters\n\n| in/out |\
    \ Argument | Description |\n| :--- | :--- | :--- |\n| [in] | tot_spins | It is\
    \ the total number of qubits. Its default value is equal to 3 |\n| [out] | state\
    \ | It is a real array which stores the GHZ state |\n\n# Implementation\n\n```\n\
    def nGHZ(self,tot_spins=3):\n    \"\"\"\n    Construct N-qubit GHZ state\n   \
    \ Input:\n        tot_spins: it is the total number of spins, it should be equal\
    \ to\n                   or greater than 3.\n    Output:\n        state: N-qubit\
    \ GHZ state.\n    \"\"\"\n```"
