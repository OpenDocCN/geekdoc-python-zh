    \ condition = 'open'，将考虑开放边界条件 |\n| [out] | ham | 这是一个维度为 $(0:2^{**}N-1, 0:2^{**}N-1)$\
    \ 的数组，即所需的哈密顿量 |\n\n## 实现\n\n```\ndef ham_xx(self,N,nn=1,mode='homogeneous',jx=1,condition='periodic'):\n\
    \    \"\"\"\n    Constructs Hamiltonian of spin-spin interaction in X direction\n\
