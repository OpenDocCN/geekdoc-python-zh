    \ 0 \\\\ c_1 \\\\ c_2 \\\\ 0 \\\\ c_3 \\\\ 0 \\\\ 0 \\\\ 0 \\end{pmatrix}$. (2.22)\n\
    \nThe left and right translation operators are defined as follows, $\\hat{T}_L$\
    \ and $\\hat{T}_R$, respectively. The result on operating $\\hat{T}_L$ on the\
    \ quantum state written in Eq. [2.21] is shown below,\n\n$\\hat{T}_L|\\psi\\rangle\
    \ = |\\psi_L\\rangle = c_1|010\\rangle + c_2|100\\rangle + c_3|001\\rangle$. (2.23)\n\
    \nSimilarly, on operating $\\hat{T}_R$ on the quantum state written in Eq. [2.21],\
    \ we obtain the following,\n\n$\\hat{T}_R|\\psi\\rangle = |\\psi_R\\rangle = c_1|100\\\
    rangle + c_2|001\\rangle + c_3|010\\rangle$. (2.24)\n\nThe matrix representation\
    \ of the states $|\\psi_L\\rangle$ and $|\\psi_R\\rangle$ are shown below,\n\n\
    $|\\psi_L\\rangle = \\begin{pmatrix} 0 \\\\ c_3 \\\\ c_1 \\\\ 0 \\\\ c_2 \\\\\
    \ 0 \\\\ 0 \\\\ 0 \\end{pmatrix}$, $|\\psi_R\\rangle = \\begin{pmatrix} 0 \\\\\
    \ c_2 \\\\ c_3 \\\\ 0 \\\\ c_1 \\\\ 0 \\\\ 0 \\\\ 0 \\end{pmatrix}$. (2.25)\n\n\
    For translating the quantum state left or right $k$ times, we have to operate\
    \ $\\hat{T}_L$ or $\\hat{T}_R$, respectively, totally $k$ times in succession.\n\
    \n### 2.11.1 For a real state\n\n```\nrstate_shift(vec,shift=1,shift_direction='right')\n\
    ```\n\n### Parameters\n\n| in/out | Argument | Description |\n|---|---|---|\n\
    | [in] | vec | vec is a real quantum state |\n| [in] | shift | It is the degree\
