    ```\n\n## 5.3 Concurrence\n\nConcurrence [96, 97] is a measure of entanglement\
    \ defined for both pure and mixed states of two-qubit. Consider a $N$-qubit quantum\
    \ system and the quantum state is $\\rho_N$. The pictorial presentation of such\
    \ a system is shown in Fig. (5.3). To calculate the entanglement content between\
    \ the $i^{th}$ and $j^{th}$ qubits of the quantum state, we first calculate the\
    \ two-qubit reduced density matrix $\\rho_{ij} = Tr_{ij^c}(\\rho_N)$. Thereafter\
    \ using the reduced density matrix $\\rho_{ij}$, we calculate the concurrence\
    \ value (two-qubit entanglement content) by the following mathematical expression:\n\
    \n$$C_{ij} = \\text{Max} \\left(0, \\sqrt{\\lambda_1} - \\sqrt{\\lambda_2} - \\\
    sqrt{\\lambda_3} - \\sqrt{\\lambda_4}\\right).$$ (5.9)\n\nHere $\\lambda_i$'s\
    \ are the eigenvalues of the matrix $\\rho_{ij}\\tilde{\\rho}_{ij}$ in the non-increasing\
    \ order. The matrix $\\tilde{\\rho}_{ij}$ is defined as,\n\n$$\\tilde{\\rho}_{ij}\
    \ = (\\sigma_y \\otimes \\sigma_y)\\rho_{ij}^*(\\sigma_y \\otimes \\sigma_y).$$\
    \ (5.10)\n\nNote carefully that if we have any pure or mixed state of $N$ qubits\
    \ and once we have the reduced density matrix between any two qubits $i$ and $j$\
    \ as $\\rho_{ij}$, we can directly use the above prescription to calculate concurrence.\
    \ It is worth mentioning that it is a measure of entanglement that has a closed-form\
    \ expression for two-qubit states and at the same time cannot be generalized easily\
