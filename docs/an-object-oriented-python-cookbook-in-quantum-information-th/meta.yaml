  md: "where $N$ is the total number of qubits present in the system and $\\sigma^j$\
    \ are the Pauli spin matrices, depending on which direction, the magnetic field\
    \ is oriented, $j$ can be accordingly labeled as $x$, $y$, $z$ as follows. Note\
    \ that $B_i$ is inside summation to accommodate a general inhomogeneous magnetic\
    \ field.\n\n# 6.1.1 Hamiltonian of spins interacting with an external magnetic\
    \ field in the $X$ direction\n\nIn this case we choose $j = x$ in Eq. [6.7] and\
    \ thereby, the interaction Hamiltonian of a linear array of spins interacting\
    \ with the external magnetic field in the $X$ direction is given by,\n\n$$H =\
    \ \\sum_{i=1}^{N} B_i \\sigma_i^x, \\quad (6.8)$$\n\n```\nfield_xham(N,mode='homogeneous',B=1)\n\
    ```\n\n# Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | N | It is the total number of spins |\n| [in] | mode | It specifies\
    \ whether the external magnetic field is homogeneous or inhomogeneous<br>If mode\
    \ = 'homogeneous', then we have homogeneous magnetic ($B_i = B$). It is the default\
    \ value<br>If mode = 'inhomogeneous', then we have inhomogeneous magnetic field\
    \ |\n| [in] | B | If the mode = 'homogeneous', B takes in a constant value, and\
    \ the default value is 1<br>If the mode = 'inhomogeneous', we pass a list holding\
    \ the $B_i$ value to parameter B. The $i^{th}$ entry of the list is the strength\
    \ of the applied magnetic field along X direction on the $i^{th}$ spin, therefore,\
