    \n# 5.7 Q measure or the Meyer-Wallach-Brennen measure\n\n$Q$ measure [109, 110]\
    \ is an entanglement measure for a multi-qubit pure state in the Hilbert space\
    \ of dimension $(\\mathbb{C}^2)^{\\otimes N}$; it is defined as,\n$$Q = 2 \\left(\
    \ 1 - \\frac{1}{N} \\sum_{i=1}^N Tr(\\rho_i^2) \\right) \\quad (5.24)$$\nwhere\
    \ $\\rho_i$ is a single qubit density matrix got by tracing all the other qubits\
    \ except the $i^{th}$ qubit, and $N$ is the total number of qubits. From the above\
    \ expression it is clear that the $Q$ measure is the average subsystem linear\
    \ entropy of the constituent qubits. The bound on $Q$ is such that, $0 \\le Q\
    \ \\le 1$.\n\n# 5.7.1 For a real or complex state\n\n```\nQMeasure_vec(state)\n\
    ```\n\nParameters\n\n| In/Out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | state | It is a real or complex array of dimension $(0:2^N - 1)$,\
