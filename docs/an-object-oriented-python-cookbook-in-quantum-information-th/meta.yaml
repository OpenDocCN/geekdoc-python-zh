  - "[PAGE 131]\n\n# 4.6 Shannon entropy\n\nShannon entropy is the metric that is\
    \ used to measure the information entropy of a stream of data bits. The mathematical\
    \ definition of Shannon entropy is as follows, it quantifies how much information\
    \ is required on an average to identify random samples from the distribution.\
    \ Given a discrete random variable $X$, which has outcomes $\\{x_i; i = 1, \\\
    cdots N\\}$ occurring with corresponding probabilities $\\{p_i(x); i = 1, \\cdots\
    \ N\\}$, respectively, then the Shannon entropy [60] for the above discrete set\
    \ of probabilities is given as,\n\n$$H(p) = -\\sum_{i=1}^{N} p_i(x) \\log_2 p_i(x).\
    \ \\tag{4.45}$$\n\nShannon entropy is one of the most important information theoretic\
    \ measures widely used. Note that when $N = 2$, the corresponding entropy is called\
    \ the binary entropy which is,\n\n$$H_b(p) = -p \\log_2 p - (1 - p) \\log_2 (1\
    \ - p). \\tag{4.46}$$\n\nShannon entropy is useful while computing quantities\
    \ like mutual information, and conditional entropies [61].\n\n**shannon_entropy(pvec)**\n\
    \n# Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- | :--- |\n\
    | [in] | pvec | It is a real array which contains probabilities |\n| [out] | se\
    \ | se is the value of Shannon entropy |\n\n# Implementation\n\n```\ndef shannon_entropy(self,pvec):\n\
    \    \"\"\"\n    Calculates the Shannon entropy\n    Input:\n        pvec: column\
    \ vector which contains probabilities\n    Output:\n        se: it returns the\
    \ Shannon entropy value\n    \"\"\"\n    size=pvec.shape[0]\n    se=0.0 # It stores\
    \ Shannon entropy value $H(p)$\n    for i in range(0,size):\n        # Checking\
    \ probability $p$ is bounded between $0 \\le p \\le 1$\n        assert pvec[i]<=1\
    \ and pvec[i] >=0, \"probability values are incorrect\"\n        se=se-(pvec[i]\
    \ *math.log2(pvec[i]))\n    return se\n```"
- md: "## Example\n\nIn this example, we are finding the Shannon entropy of the probability\
    \ vector $p = (0.3, 0.2, 0.5)$.\n\n```python\npvec=np.array([0.3, 0.2, 0.5])\n\
    se=gt_obj.shannon_entropy(pvec)\nprint(se)\n```\n\nThe above code prints the required\
    \ Shannon entropy.\n\n1.4854752972273344\n\n## 4.7 Linear entropy\n\nIn quantum\
    \ mechanics, linear entropy is the measure of the impurity or mixedness of state,\
    \ and it is defined as\n\n$S_L = 1 - Tr(\\rho^2)$. (4.47)\n\nFor any state $\\\
    rho$, we know that for pure state $Tr(\\rho^2) = 1$, and for a mixed state $Tr(\\\
    rho^2) < 1$. The linear entropy in this way is a measure of how much a given state\
    \ deviates from being a pure state.\n\n### 4.7.1 For a real or complex density\
    \ matrix\n\n```python\nlinear_entropy(rho)\n```\n\n### Parameters\n\n| in/out\
    \ | Argument | Description |\n|---|---|---|\n| [in] | rho | It is a real or complex\
    \ density matrix |\n| [out] | le | le is the linear entropy of rho |\n\n### Implementation\n\
    \n```python\ndef linear_entropy(self, rho):\n    \"\"\"\n    Calculates the Linear\
    \ entropy\n    Input:\n        rho: it is the density matrix\n    Output:\n  \
    \      le: linear entropy value\n    \"\"\"\n    tr=np.trace(rho)\n    # Checking\
    \ $Tr(\\rho) = 1$\n    assert np.allclose(abs(tr),1), \"density matrix is not\
    \ correct\"\n    # Calculating $Tr(\\rho^2)$\n    tr2=np.trace(np.matmul(rho,rho))\n\
    \    # Finally calculating, $S_L = 1 - Tr(\\rho^2)$\n    le=1.0-abs(tr2)\n   \
    \ return le\n```\n\n## Example\n\nIn this example, we are finding the linear entropy\
    \ of a two qubit generalized Werner state $\\rho(0)$.\n\n```python\nstate=gt_obj.nWerner(0.0)\n\
    le=gt_obj.linear_entropy(state)\nprint(le)\n```\n\nThe above code prints the required\
    \ linear entropy.\n\n0.75\n\nIn the following example, we are finding the linear\
    \ entropy of a complex density matrix defined below.\n\n$$\\rho' = \\begin{pmatrix}\
    \ 0.4 & -0.2 - i0.1 \\\\ -0.2 + i0.1 & 0.6 \\end{pmatrix}$$\n\n```python\nstate=np.array([[complex(0.4,0),complex(-0.2,-0.1)],\n\
    \                [complex(-0.2,0.1),complex(0.6,0.0)]])\nle=gt_obj.linear_entropy(state)\n\
    print(le)\n```\n\nThe above code prints the required linear entropy.\n\n0.38\n\
    \nThere is a term called participation ratio which is also related to purity of\
