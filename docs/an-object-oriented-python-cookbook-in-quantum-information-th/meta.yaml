    \  0.   0.   0.   0.  -0.3  0.   0. ]\n [ 0.  -0.1  0.   0.   0.3  0.   0.   0.\
    \ ]]\n```\n\n## 6.2.3 Spin–spin interaction in $Z$ direction\n\nThe Hamiltonian\
    \ for the spin-spin exchange interaction in the $Z$ direction is obtained by,\
    \ choosing $j = z$ in Eq. [6.11] as\n\n$$H = \\sum_{i=1}^{N} J_r^1 \\sigma_i^z\
    \ \\sigma_{i+r}^z.$$\n\n```\nham_zz(N,nn=1,mode='homogeneous',jz=1,condition='periodic')\n\
    ```\n\n### Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- |\
    \ :--- |\n| [in] | N | It is the total number of spins |\n| [in] | nn | nn stores\
    \ the value of r describing the r<sup>th</sup> neighbour interaction of the Hamiltonian.\
    \ The default value is equal to 1 (nearest neighbour interaction) |\n| [in] |\
    \ mode | It specifies whether the interaction strength is uniform or non-uniform<br>If\
    \ mode = 'homogeneous', we have an uniform interaction (J<sub>r</sub><sup>i</sup>\
    \ = J). It is the default value<br>If mode = 'inhomogeneous', we have non-uniform\
    \ interaction |\n| [in] | jz | If the mode = 'homogeneous', jz takes in a constant\
    \ value and the default value is 1.<br>If the mode = 'inhomogeneous', then we\
    \ pass a list holding the J<sub>r</sub><sup>i</sup> value to parameter jz. The\
    \ i<sup>th</sup> entry represents the interaction strength between the i<sup>th</sup>\
    \ and (i + r)<sup>th</sup> spin |\n| [in] | condition | It defines the type of\
    \ boundary condition<br>if condition = 'periodic', periodic boundary conditions\
    \ will be considered. It is the default value.<br>if condition = 'open', open\
    \ boundary conditions will be considered |\n| [out] | ham | It is an array of\
    \ dimension (0:2**N-1,0:2**N-1), which is the required Hamiltonian |\n\n### Implementation\n\
    \n```\ndef ham_zz(self,N,nn=1,mode='homogeneous',jz=1,condition='periodic'):\n\
    \    \"\"\"\n    Constructs Hamiltonian of spin-spin interaction in Z direction\n\
    \    Input\n        N: number of spins\n        nn: specifying rth interaction\n\
    \        mode: 'homogeneous' or 'inhomogeneous' magnetic field\n        jz: it\
    \ list of values if mode='inhomogeneous', and constant if mode='homogeneous'\n\
    \        condition: defining boundary conditions of the Hamiltonian\n    Output\n\
    \        ham: Hamiltonian\n    \"\"\"\n    # Checking entered boundary condition,\
    \ PBC and OBC\n    assert condition == 'periodic' or condition == 'open'\n   \
    \ # Number of interaction depending on the boundary condition\n    if condition\
    \ == 'periodic':\n        kn=N\n```"
