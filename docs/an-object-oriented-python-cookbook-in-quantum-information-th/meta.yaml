    \ $P$ such that $\\sum_{i=1}^n p_i = 1$.\n\n# Parameters\n\n```\nsubroutine RANDPVEC(d,state)\n\
    ```\n\n| In/Out | Argument | Description |\n| :--- | :--- | :--- |\n| [in] | N\
