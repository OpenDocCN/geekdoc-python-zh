    nature of quantum states but also indispensable in understanding condensed matter
    systems like spin chains [80–82], and quantum phase transitions [83, 84]. It is
    also an integral part of quantum computation [85–87], etc.


    The nature of entanglement in pure and mixed states are very different from each
