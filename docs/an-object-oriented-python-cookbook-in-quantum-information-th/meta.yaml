    $$\rho_{AB}^{T_B} = \sum_{ijkl} r_{ik;jl} (|i\rangle\langle k|)_A \otimes (|l\rangle\langle
    j|)_B. \tag{5.6}$$


    Of course, $\rho_{AB}^{T_A}$ also can be found easily using the above. For a more
    in-depth understanding regarding the mathematical operation of partial transpose,
    we have defined a two-qubit density matrix as


    $$\rho_{AB} = \begin{pmatrix} a_{11} & a_{12} & a_{13} & a_{14} \ a_{21} & a_{22}
    & a_{23} & a_{24} \ a_{31} & a_{32} & a_{33} & a_{34} \ a_{41} & a_{42} & a_{43}
    & a_{44} \end{pmatrix}. \tag{5.7}$$


    After partially transposing the subsystem $B$ of the density matrix in Eq. [5.7],
    we finally obtain the following,


    $$\rho_{AB}^{T_B} = \begin{pmatrix} a_{11} & a_{21} & a_{13} & a_{23} \ a_{12}
    & a_{22} & a_{14} & a_{24} \ a_{13} & a_{41} & a_{33} & a_{43} \ a_{32} & a_{42}
    & a_{34} & a_{44} \end{pmatrix}. \tag{5.8}$$


    The recipes we have given can do partial transpose for any random partition of
    a bipartite multi-qubit system.


    # 5.2.1 For a real or complex state


    ```

    ptranspose_vec(state,sub_tr)

    ```


    # Parameters


    | In/Out | Argument | Description |

    | :--- | :--- | :--- |

    | [in] | state | It is a real or complex array of dimension $(0:2^N-1)$, which
    is the input density matrix |

    | [in] | sub_tr | It is list of numbers designating the particular subsystems
    to be partially transposed. The list can store any natural number between 1 and
    $N$ |

    | [out] | denc2 | denc2 is a real or complex array of dimension $(0:2^N-1,0:2^N-1)$,
    which is the required partially transposed matrix |'
