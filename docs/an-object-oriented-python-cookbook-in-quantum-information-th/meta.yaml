  md: '+   1. Open a file.

    2. Read or write (perform the operation).

    3. Close the file.


    Python has a built-in **open()** function to open a file. This function returns
    a file object, also called a handle. The generic statement of the **open()** function
    is shown below,


    ```

    file_object = open(r"file_name", "access_mode")

    ```


    The file should exist in the same directory where the Python program file is saved.
    Otherwise, before the filename, the full address or path has to be written. The
    different types of available access modes available in Python are listed below,


    | Access mode | Code | Description |

    | :--- | :--- | :--- |

    | Read Only | "r" | Open text file for reading. The handle is positioned at the
    beginning of the file. If the file does not exist, then it raises I/O error. This
    is also the default mode in which file is opened |

    | Read and Write | "r+" | Open the file for reading and writing. The handle is
    positioned at the beginning of the file. Raises I/O error if the file does not
    exist |

    | Write Only | "w" | Open the file for writing. For existing file, the data is
    truncated and over-written. The handle is positioned at the beginning of the file.
    Creates the file, if the file does not exists |


    | Access mode | Code | Description |

    | :--- | :--- | :--- |

    | Write and Read | "w+" | Open the file for reading and writing. For existing
    file, data is truncated and over-written. The handle is positioned at the beginning
    of the file |

    | Append Only | "a" | Open the file for writing. The file is created if it does
    not exist. The handle is positioned at the end of the file. The data being written
    will be inserted at the end, after the existing data meaning it will be appended
    |

    | Append and Read | "a+" | Open the file for reading and writing. The file is
    created if it does not exist. The handle is positioned at the end of the file.
    The data being written will be inserted at the end, after the existing data |


    An example of the above discussion is shown below,


    ```

    import numpy as np

    # To read file MyFile1.txt" in D:\Text in file2

    file1 = open(r"D:\Text\MyFile1.txt", "r")

    ```'
