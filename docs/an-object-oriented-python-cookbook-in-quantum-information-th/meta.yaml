    | In/Out | Argument | Description |

    | :--- | :--- | :--- |

    | [in] | state | It is a real or complex array of dimension $(0:2^N-1)$, which
    is the input state |

    | [in] | sub_tr | It is a list of numbers designating the particular subsystems
    to be transposed. The list can store any natural number between 1 and $N$ |

    | [in] | eps | If the magnitude of any of the eigenvalues of $\rho^{T_A}$ is less
    than eps, then that particular value will be considered equal to zero. The default
    value is equal to $10^{-13}$ |

    | [out] | negv, lognegv | Returns the value of negativity and logarithmic negativity
    |'
