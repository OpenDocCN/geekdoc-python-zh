  md: "# 4.9 Trace distance\n\nThe trace distance [24, 63] is a metric on the space\
    \ of density matrices and gives a measure of the distinguishability between two\
    \ states. Trace distance between two density matrices $\\rho$ and $\\sigma$ is\
    \ defined as follows,\n\n$$T(\\rho, \\sigma) = \\frac{1}{2} \\| \\rho - \\sigma\
    \ \\|.$$\n(4.52)\n\nFrom the above, we see that the trace distance is directly\
    \ related to the trace norm of the difference between the states.\n\n# 4.9.1 Between\
    \ two real or complex density matrices\n\n```\ntrace_distance(rho,sigma)\n```\n\
    \n# Parameters\n\n| in/out | Argument | Description |\n|---|---|---|\n| [in] |\
    \ rho | It is a real or complex density matrix of dimension (0:n-1,0:n-1) |\n\
    | [in] | sigma | It is a real or complex density matrix of dimension (0:n-1,0:n-1)\
    \ |\n| [out] | trd | trd is the trace distance between states rho and sigma |\n\
    \n# Implementation\n\n```\ndef trace_distance(self,rho,sigma):\n    \"\"\"\n \
    \   Calculates trace distance between two density matrices\n    Input:\n     \
    \   rho: input density matrix\n        sigma: input density matrix\n    Output:\n\
    \        trd: it stores trace distance\n    \"\"\"\n    # Calculating $\\rho -\
    \ \\sigma$\n    res=rho-sigma\n    laobj=LA()\n    typeres=str(res.dtype)\n  \
    \  if re.findall('^float|^int',typeres):\n        trd=laobj.trace_norm_rmatrix(res)\n\
    \        trd=trd/2\n    elif re.findall(\"^complex\",typeres):\n        trd=laobj.trace_norm_cmatrix(res)\n\
    \        trd=trd/2\n    return trd\n```"
