  - "[PAGE 256]\n\n```\nInput:\n    N: number of qubits\n    distribution: it is the\
    \ type of distribution\nOutput:\n    qcstate: complex quantum state\n\"\"\"\n\
    assert re.findall(\"^gaussian|^uniform\",distribution),\\n\"Invalid distribution\
    \ type\"\nif distribution=='gaussian':\n    qcstate=self.random_gaussian_cvec(2**N,mu=0,sigma=1)\n\
    else:\n    qcstate=self.random_unifrom_cvec(2**N,low=0.0,high=1.0)\nnorm=abs(np.matmul(\\\
    n                np.matrix.conjugate(\\n                    np.matrix.transpose(qcstate)),\\\
    n                    qcstate))\nqcstate=qcstate/np.sqrt(norm)\nreturn qcstate\n\
    ```\n\n# Example\n\n```\ncstate=qrobj.random_qcstate(4,distribution='gaussian',\\\
    n                            mu=2,sigma=1)\n```\n\nIn the above example, cstate\
    \ is the $2^4 \\times 1$ complex random pure quantum state vector whose elements\
    \ are selectively chosen from the Gaussian distribution with mean equal to 2 and\
    \ standard deviation equal to 1.\n\n# 7.11 Random density matrices\n\nA random\
    \ density matrix [141, 142] $\\rho$ can be generated using a real or a complex\
    \ Ginibre matrix $G$ as follows,\n\n$$\\rho = \\frac{GG^\\dagger}{Tr(GG^\\dagger)}$$\n\
    \nThe matrix $\\rho$ is by construction Hermitian, positive definite and normalized.\
    \ The ensemble so generated is called the Hilbert–Schmidt ensemble.\n\n# 7.11.1\
    \ Random real density matrix\n\n```\nsubroutine RANDDMR(d,state)\n```"
