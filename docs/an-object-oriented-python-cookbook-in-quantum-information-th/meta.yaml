  md: "# Parameters\n\n| In/Out | Argument | Description |\n|---|---|---|\n| [in]\
    \ | tup | It holds the information of the dimension of the output matrix |\n|\
    \ [in] | mu | mu is the mean of the distribution |\n| [in] | sigma | sigma is\
    \ the standard deviation of the distribution |\n| [out] | state_gauss | It is\
    \ the array of dimensions assigned in the variable tup, and it is a random complex\
    \ matrix |\n\n# Implementation\n\n```\ndef random_gaussian_cvec(self,tup,mu=0,sigma=1):\n\
    \    \"\"\"\n    Construct a complex random state from a Gaussian distribution\n\
    \    Input:\n        tup: tuple holds the dimension of the output matrix.\n  \
    \      mu: it is the average value of the gaussian distribution.\n        sigma:\
    \ it is the standard deviation of the gaussian distribution\n    Output:\n   \
    \     gauss_state: it the gaussian distributed complex state\n    \"\"\"\n   \
    \ # Real part selected from Gaussian distribution\n    rpart=np.random.normal(mu,\
    \ sigma, tup)\n    # Complex part selected from Gaussian distribution\n    cpart=np.random.normal(mu,\
    \ sigma, tup)\n    state_gauss=np.zeros(tup,dtype=np.complex_)\n    state_gauss=rpart+(complex(0,1)*cpart)\n\
    \    return state_gauss\n```\n\n# Example\n\n```\nstate_gauss=qobj.random_gaussian_cvec((3,3))\n\
    ```\n\nIn the above example, state_gauss is a 3 × 3 complex matrix which stores\
    \ the random numbers from the Gaussian distribution with zero mean and unit standard\
    \ deviation.\n\n# 7.2 Random number generator for uniform distribution in the\
    \ range (a,b)\n\nThe uniform random number generator generates a random number\
    \ in the arbitrary range (a,b). The following method generates a matrix whose\
