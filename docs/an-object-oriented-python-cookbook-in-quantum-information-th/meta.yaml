    To import the class **LinearAlgebra** from the **QuantumInformation** library,
    and thereafter we have to create an object of the class. The coding of the preceding
    statement can be done as follows,


    ```

    # importing the class LinearAlgebra from the QuantumInformation library

    from QuantumInformation import LinearAlgebra as LA


    # creating the object of the class

    linear_obj=LA()

    ```


    # 3.1 Inverse of a matrix


    For a square matrix, $A$ if there exists another matrix $B$ such that $AB = BA
    = I$, then matrix $B$ is called the inverse of $A$. The inverse of $A$ is defined
    as follows $A^{-1}$. For an inverse of a matrix $A$ to exist, it must satisfy
    the following conditions,


    +   - The determinant of the matrix $A$ should be non-zero, i.e. $\det(A) \neq
    0$.

    - The matrix $A$ must be square.


    The inverse of the matrix $A$ can be obtained from the following mathematical
    expression,


    $$A^{-1} = \frac{adj(A)}{\det(A)},$$


    where $adj(A)$ is the transpose of its co-factor matrix.


    # 3.1.1 For a real or complex matrix


    ```

    linear_obj.inverse_matrix(A)

    ```'
