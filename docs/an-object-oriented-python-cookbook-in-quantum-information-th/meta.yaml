    \ 2.8 Binary to decimal conversion\n\nIn mathematics, binary numbers are expressed\
    \ in the *base-2* number system, which only uses ‘0’ and ‘1’ to represent them,\
    \ which are called bits. Any binary number can be easily converted to a decimal\
    \ using bit values as follows. Let us have a binary string $[a_1a_2a_3 \\cdots\
    \ a_n]_2$ where values $a_i$’s can be either 0 or 1 only. To convert a binary\
    \ string into the decimal equivalent we have,\n\n$$[a_1a_2a_3 \\cdots a_n]_2 =\
    \ a_1 2^{n-1} + a_2 2^{n-2} + \\cdots + a_{n-1} 2^1 + a_n 2^0, \\tag{2.18}$$\n\
    \nhere the right to left convention is followed. Binary to decimal conversion\
    \ is a very important operation in quantum mechanics and quantum information theory\
    \ because, the states of the quantum systems (meaning pure states) are represented\
    \ by a string of zeros and ones. For example, the state of two electrons can be\
    \ represented as $|00\\rangle = |\\uparrow\\uparrow\\rangle$, $|01\\rangle = |\\\
    uparrow\\downarrow\\rangle$, $|10\\rangle = |\\downarrow\\uparrow\\rangle$ and\
    \ $|11\\rangle = |\\downarrow\\downarrow\\rangle$. When we have to manipulate\
    \ such states, then the bit representation of such states and its corresponding\
    \ decimal equivalent becomes handy. For example, the decimal equivalent of the\
    \ above states can be written as $|00\\rangle = |0\\rangle$, $|01\\rangle = |1\\\
    rangle$, $|10\\rangle = |2\\rangle$ and $|11\\rangle = |3\\rangle$. Such representations\
    \ can be easily extended to multi-qubit states, for example, a state with four\
    \ electrons can be in one of the states given by $|1010\\rangle = |\\downarrow\\\
    uparrow\\downarrow\\uparrow\\rangle = |10\\rangle$. The main advantage of this\
    \ decimal representation is that, instead of dealing with a string of numbers\
    \ which may often be tiring, we deal only with one number.\n\n```\nbinary_decimal(vec)\n\
    ```\n\n# Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- | :---\
    \ |\n| [in] | vec | vec is a NumPy array containing binary matrix elements i.e.\
    \ 0 or 1 |\n| [out] | dec | dec is decimal equivalent of the NumPy array vec |"
