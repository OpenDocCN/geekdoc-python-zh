    \n## 1 Introduction to Python and Object-Oriented Programming\n\nIn this chapter\
    \ we give a standalone introduction to the Object-Oriented Python Programming\
    \ language. Python name was conceived in the late 1980s by the Dutch programmer\
    \ Guido van Rossum [1]. Since the first release of Python on February 20, 1991,\
    \ the Python programming community has grown at a rapid pace, and now a lot of\
