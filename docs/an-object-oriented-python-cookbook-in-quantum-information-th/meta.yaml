    \ [25.+0.j 31.-9.j]]\n```\n\n## 2.8 Binary to decimal conversion\n\nIn mathematics,\
    \ binary numbers are expressed in the *base-2* number system, which only uses\
    \ ‘0’ and ‘1’ to represent them, which are called bits. Any binary number can\
    \ be easily converted to a decimal using bit values as follows. Let us have a\
    \ binary string $[a_1a_2a_3 \\cdots a_n]_2$ where values $a_i$’s can be either\
    \ 0 or 1 only. To convert a binary string into the decimal equivalent we have,\n\
    \n$$[a_1a_2a_3 \\cdots a_n]_2 = a_1 2^{n-1} + a_2 2^{n-2} + \\cdots + a_{n-1}\
    \ 2^1 + a_n 2^0, \\tag{2.18}$$\n\nhere the right to left convention is followed.\
    \ Binary to decimal conversion is a very important operation in quantum mechanics\
    \ and quantum information theory because, the states of the quantum systems (meaning\
    \ pure states) are represented by a string of zeros and ones. For example, the\
    \ state of two electrons can be represented as $|00\\rangle = |\\uparrow\\uparrow\\\
    rangle$, $|01\\rangle = |\\uparrow\\downarrow\\rangle$, $|10\\rangle = |\\downarrow\\\
    uparrow\\rangle$ and $|11\\rangle = |\\downarrow\\downarrow\\rangle$. When we\
    \ have to manipulate such states, then the bit representation of such states and\
    \ its corresponding decimal equivalent becomes handy. For example, the decimal\
    \ equivalent of the above states can be written as $|00\\rangle = |0\\rangle$,\
    \ $|01\\rangle = |1\\rangle$, $|10\\rangle = |2\\rangle$ and $|11\\rangle = |3\\\
    rangle$. Such representations can be easily extended to multi-qubit states, for\
    \ example, a state with four electrons can be in one of the states given by $|1010\\\
    rangle = |\\downarrow\\uparrow\\downarrow\\uparrow\\rangle = |10\\rangle$. The\
    \ main advantage of this decimal representation is that, instead of dealing with\
    \ a string of numbers which may often be tiring, we deal only with one number.\n\
    \n```\nbinary_decimal(vec)\n```\n\n### Parameters\n\n| in/out | Argument | Description\
    \ |\n| :--- | :--- | :--- |\n| [in] | vec | vec is a NumPy array containing binary\
    \ matrix elements i.e. 0 or 1 |\n| [out] | dec | dec is decimal equivalent of\
    \ the NumPy array vec |\n\n### Implementation\n\n```\ndef binary_decimal(self,vec):\n\
    \    \"\"\"\n    Binary to decimal conversion\n    Input:\n        vec: array\
    \ containing binary matrix elements i.e. 0 or 1\n    Returns:\n        dec: decimal\
    \ equivalent number of binary array vec\n    \"\"\"\n    dec=0\n    for i in range(0,vec.shape[0]):\n\
    \        dec=dec+int((2**(vec.shape[0]-1-i))*vec[i])\n    dec = int(dec)\n   \
    \ return dec\n```\n\n### Example\n\nIn this example, we are converting binary\
    \ string of numbers 1010 into a decimal number.\n\n```\nA=np.array([1,0,1,0])\n\
    B=quantum_obj.binary_decimal(A)\nprint(B)\n```\n\nThe above code prints the output\
    \ of the decimal equivalent of 1010.\n\n10\n\n## 2.9 Decimal to binary conversion\n\
    \nTo convert an integer number $n$ into a binary string, we adopt the following\
    \ algorithm,\n\n1. Divide the integer $n$ by 2.\n2. Store the remainder from step\
    \ 1 as the least significant number of the binary string.\n3. Divide the quotient\
    \ (which we got from previous step) by 2, assign the remainder as the second least\
    \ significant number.\n4. Repeat the process till we get the quotient to be zero.\n\
    \nThe final remainder will be the most significant digit of the binary string.\n\
    \n```\ndecimal_binary(i,N)\n```\n\n### Parameters\n\n| in/out | Argument | Description\
    \ |\n| :--- | :--- | :--- |\n| [in] | i | decimal number for which binary equivalent\
    \ to be calculated |\n| [in] | N | number of the binary string |\n| [out] | vec\
    \ | binary equivalent of the decimal number i |\n\n### Implementation\n\n```\n\
    def decimal_binary(self,i,N):\n    \"\"\"\n    Decimal to binary conversion\n\
    \    Inputs:\n        i: decimal number for which binary equivalent to be calculated\n\
    \        N: length of the binary string\n    Returns:\n        bnum: binary number\
    \ equivalent to i, it is column matrix.\n    \"\"\"\n    bnum=np.zeros([N],dtype=int)\n\
    \    for j in range(0,N):\n        bnum[bnum.shape[0]-1-j]=i%2\n        i=int(i/2)\n\
    \    return bnum\n```\n\n### Example\n\nIn this example we are converting the\
    \ integer 10 into a binary string number.\n\n```\ndec=10\n# 4 string\nvec=quantum_obj.decimal_binary(dec,4)\n\
    print(\"The four binary string of 10\")\nprint(vec)\n# 6 string\nvec2=quantum_obj.decimal_binary(dec,6)\n\
    print(\"The six binary string of 10\")\nprint(vec2)\n```\n\nThe above code prints\
    \ the output of the binary equivalent of 10.\n\n```\nThe four binary string of\
    \ 10\n[1 0 1 0]\nThe six binary string of 10\n[0 0 1 0 1 0]\n```\n\n## 2.10 Binary\
    \ digits shift\n\nThis algorithm is used in shifting the string of binary digits\
    \ to the left or right by $k$ place values. Let us define the left and right shift\
    \ operators as, $S_L$ and $S_R$. The operation of the left shift operator is shown\
    \ below,\n\n$S_L[a_1a_2a_3\\cdots a_n]_2 = [a_2a_3a_4\\cdots a_na_1]_2$. (2.19)\n\
    \nThe operation of the right shift operator is shown below,\n\n$S_R[a_1a_2a_3\\\
    cdots a_n]_2 = [a_na_1a_2a_3a_4\\cdots a_{n-1}]_2$. (2.20)\n\nIn Eq. [2.19] and\
    \ Eq. [2.20], the $a_i$'s takes value either zero or one in the binary representation.\
    \ For shifting left or right $k$ times we have to operate $S_L$ or $S_R$, respectively,\
    \ totally $k$ times in succession. This routine is useful for studying quantum\
    \ states which are shift symmetric and it can be put to other generic uses depending\
    \ on the problem under consideration.\n\n```\nbinary_shift(vec,shift=1,shift_direction='right')\n\
    ```\n\n### Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- |\
    \ :--- |\n| [in] | vec | vec is an integer array of dimension (0:n−1) which is\
    \ the given binary string |\n| [in] | shift | It is degree of the shift towards\
    \ left or right direction. By default the value is 1 |\n| [in] | shift\\_direction\
    \ | It can take only the following values,<br>• shift\\_direction = ‘right’ ⇒\
    \ right direction shift, and it is the default value.<br>• shift\\_direction =\
    \ ‘left’ ⇒ left direction shift. |\n| [out] | shift\\_vec | It is an integer array\
    \ of dimension (0:n−1) which is the shifted binary string of the array vec |\n\
    \n### Implementation\n\n```\ndef binary_shift(self,vec,shift=1,shift_direction='right'):\n\
    \    \"\"\"\n    Shifting of string of binary number\n    Input:\n        vec:\
    \ array containing binary matrix elements i.e. 0 or 1\n        shift: degree of\
    \ the shift\n        shift_direction: its value is either left or right\n    Output:\n\
    \        shift_vec: Shifted vec\n    \"\"\"\n    # Following statement check whether\
    \ direction entered is left or right.\n    assert shift_direction == 'left' or\
    \ shift_direction == 'right', \\\n        'Not proper shift direction'\n    #\
    \ Following statement check that degree of shift is with [1,n-1]\n    assert shift\
    \ >= 1 and shift < vec.shape[0], \\\n        \"degree of shift is not proper\"\
    \n    # Following array will store the shifted binary number\n    shift_vec=np.zeros([vec.shape[0]],dtype='int_')\n\
    \    if shift_direction =='right':\n        # for loop calculates the right direction\
    \ shift\n        for i in range(0,vec.shape[0]):\n            ishift=i+shift\n\
    \            if ishift >= vec.shape[0]:\n                ishift=ishift-vec.shape[0]\n\
    \            shift_vec[ishift]=vec[i]\n    if shift_direction == 'left':\n   \
    \     # for loop calculates the left direction shift\n        for i in range(0,vec.shape[0]):\n\
    \            ishift=i-shift\n            if ishift < 0:\n                ishift=ishift+vec.shape[0]\n\
    \            shift_vec[ishift]=vec[i]\n    return shift_vec\n```\n\n### Example\n\
