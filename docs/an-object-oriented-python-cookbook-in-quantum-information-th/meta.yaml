    \ \\begin{pmatrix} 0 & 1 \\\\ 1 & 0 \\end{pmatrix}.$$\n\nTo flip a $N$-qubit computational\
    \ basis, we have to operate $N$ tensor products of the Pauli-X matrix, and the\
    \ mathematical operation is shown below,\n\n$$X^{\\otimes N}|a_1 a_2 \\dots a_N\\\
    rangle = |1-a_1\\rangle \\otimes |1-a_2\\rangle \\dots |1-a_N\\rangle \\quad (4.10)$$\n\
