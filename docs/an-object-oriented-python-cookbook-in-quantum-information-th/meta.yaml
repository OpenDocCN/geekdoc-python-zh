    | **ZUNGQR** | It generates $M \times N$ complex matrix $Q$ with orthonormal columns.
    **ZUNGQR** and **ZGEQRF** collectively being used for QR decomposition and the
    output of **ZGEQRF** will be fed into **ZUNGQR**, which will finally result in
    the unitary matrix $Q$ |

    | **DSYTRD** | It reduces a real symmetric matrix $A$ into a tridiagonal matrix
    $T$ by an orthogonal similarity transformation |

    | **DORGTR** | It generates a real orthogonal matrix which transforms the given
