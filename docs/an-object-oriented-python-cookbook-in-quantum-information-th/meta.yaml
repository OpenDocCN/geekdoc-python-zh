    ```\n>>> print('''Einstein said, \"Quantum mechanics is not correct.\"''')\nEinstein\
    \ said, \"Quantum mechanics is not correct.\"\n>>> print(\"\"\"Hello\n... World\"\
    \"\")\nHello\nWorld\n```\n\n#### 1.2.5 Logical\n\nThere are only two logical values\
    \ **True** and **False** corresponding to the standard Boolean elements 1 and\
