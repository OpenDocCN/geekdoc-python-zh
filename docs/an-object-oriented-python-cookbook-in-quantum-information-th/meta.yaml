    \ basis=self.decimal_binary(i,N)\n            basis=self.binary_shift(basis,shift=shift,\n\
    \                                    shift_direction=shift_direction)\n      \
    \      j=self.binary_decimal(basis)\n            state2[j]=vec[i]\n\n    return\
    \ state2\n```\n\n### 示例\n\n在此示例中，我们将以下量子态向右平移 1 个位置\n\n$|\\psi\\rangle = (0.141776\
