  md: "The above code prints the following output,\n\n```\n[[-0.7-1.1j -0.2+0.4j]\n\
    \ [ 1.2+0.6j  0.2-0.4j]]\n```\n\n# 3.2 Function of a matrix\n\nGiven any square\
    \ matrix $M$ of dimension $n \\times n$, we can ask the question, what will be\
    \ the sine of the matrix? [32] or what will be the power of the matrix? It is\
    \ known that any real continuous function $f(x)$ (or a complex analytic function\
    \ $f(z)$) has a Taylor series expansion around a point $a$ given by,\n\n$$f(x)\
    \ = \\sum_{n=0}^{\\infty} \\frac{f^{(n)}(a)}{n!} (x - a)^n, \\tag{3.8}$$\n\nif\
    \ the expansion is done around $a = 0$, it is called a Maclaurin expansion which\
    \ has the form,\n\n$$f(x) = \\sum_{n=0}^{\\infty} \\frac{f^{(n)}(0)}{n!} x^n.\
    \ \\tag{3.9}$$\n\nJust like any function above, any function of matrix $M$ also\
    \ can be expanded using the Maclaurin expansion as follows,\n\n$$f(M) = \\mathbb{I}f(0)\
    \ + \\frac{f^1(0)}{1!} M + \\frac{f^2(0)}{2!} M^2 + \\frac{f^3(0)}{3!} M^3 + \\\
    cdots = \\sum_{n=0}^{\\infty} \\frac{f^n(0)}{n!} M^n. \\tag{3.10}$$\n\nIf the\
    \ matrix is diagonalizable, the above equation reduces to a matrix form given\
    \ as below,\n\n$$f(M) = P f(D) P^{-1}, \\tag{3.11}$$\n\nwhere $P$ is a matrix,\
    \ whose columns are made of the normalized eigenvectors of $M$ and $D$, is a diagonal\
    \ matrix which contains the eigenvalues of $M$ as diagonal elements. If $M$ is\
    \ a normal matrix, Eq. [3.10] is reduced to\n\n$$f(M) = U f(D) U^{\\dagger}, \\\
    tag{3.12}$$\n\nwhere $U$ is a unitary matrix. As we know almost all the problems\
    \ of physics and specially in quantum mechanics and quantum information theory\
    \ involves only Hermitian matrices, they are “compulsorily” diagonalizable, because\
    \ every Hermitian matrix is a normal matrix which can be diagonalized by a unitary\
    \ transform. Thus Eq. [3.12] can be used to find the function of matrices. We\
    \ require the exponential of a matrix when we study the time evolution of quantum\
    \ systems. In finding quantum entropies, we require the logarithm of a matrix\
    \ and in many other diverse areas of other functions of matrices like power and\
    \ trigonometric functions are used. Note that for matrices which are not diagonalizable,\
    \ these techniques can not be used and in such cases the power series with proper\
    \ truncation is used based on the accuracy of the results we require.\n\n# 3.2.1\
    \ For a real symmetric matrix\n\n```\nfunction_smatrix(mat1,mode,log_base)\n```"
