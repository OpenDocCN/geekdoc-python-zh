    偏迹 [24, 92] 是一种数学操作，不仅用于研究复合量子系统子系统的状态，还用于计算大量的纠缠度量。考虑 $H$ 表示一个由两个子系统组成的复合量子系统的希尔伯特空间。子系统
    $A$ 和 $B$ 的希尔伯特空间分别用 $H_A$ 和 $H_B$ 表示。复合量子系统的状态是已知的，用 $\rho_{AB}$ 表示。对状态 $\rho_{AB}$
