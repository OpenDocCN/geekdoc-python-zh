  md: 'In a list, the indexing of the first element starts from zero. If you want
    to access a particular element or elements in a list, you can do the following:


    ```

    >>> print(lst1[0]) # Indexing by position

    1

    >>> print(lst1[1:3]) # Slicing a list

    [''electron'', 2]

    >>> length = len(lst1) # Calculates the length of the list

    >>> print(length)

    6

    ```


    To add, remove or insert elements at a particular position in a list can be done
    by the following list method calls:


    ```

    >>> lst1.append(6) # append element 6 into the list

    >>> print(lst1)

    [1, ''electron'', 2, ''proton'', 3, ''neutron'', 6]

    >>> lst1.remove(3) # remove the element 3

    >>> print(lst1)

    [1, ''electron'', 2, ''proton'', ''neutron'', 6]

    >>> lst1.insert(1,''atom'') #.insert(i,x), insert at i''th index the element x

    >>> print(lst1)

    [1, ''atom'', ''electron'', 2, ''proton'', ''neutron'', 6]

    >>> lst1.pop(5) # .pop(i), it removes the element in the i''th index

    ''neutron''

    >>> print(lst1)

    [1, ''atom'', ''electron'', 2, ''proton'', 6]

    ```


    # 1.2.7 Tuple


    A tuple is a collection of objects which is ordered and immutable. Tuples are
    sequences, just like lists. The difference between tuples and lists are as follows,
    tuples cannot be changed like lists, and tuples use parentheses whereas lists
    use square brackets.


    ```

    >>> tup1 = (''quantum'', ''state'', 0.75, 0.25) # valid tuple

    >>> print(type(tup1))

    <class ''tuple''>

    >>> tup2 = (1, 2, 3 ) # valid tuple

    >>> print(tup2[0])

    1

    >>> print(tup2[1])

    2

    ```


