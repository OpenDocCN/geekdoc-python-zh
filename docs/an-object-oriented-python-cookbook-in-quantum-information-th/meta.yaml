  md: "# Implementation\n\n```\ndef binary_decimal(self,vec):\n    \"\"\"\n    Binary\
    \ to decimal conversion\n    Input:\n        vec: array containing binary matrix\
    \ elements i.e. 0 or 1\n    Returns:\n        dec: decimal equivalent number of\
    \ binary array vec\n    \"\"\"\n    dec=0\n    for i in range(0,vec.shape[0]):\n\
    \        dec=dec+int((2**(vec.shape[0]-1-i))*vec[i])\n    dec = int(dec)\n   \
    \ return dec\n```\n\n# Example\n\nIn this example, we are converting binary string\
    \ of numbers 1010 into a decimal number.\n\n```\nA=np.array([1,0,1,0])\nB=quantum_obj.binary_decimal(A)\n\
    print(B)\n```\n\nThe above code prints the output of the decimal equivalent of\
    \ 1010.\n\n10\n\n# 2.9 Decimal to binary conversion\n\nTo convert an integer number\
    \ $n$ into a binary string, we adopt the following algorithm,\n\n+   1. Divide\
    \ the integer $n$ by 2.\n2. Store the remainder from step 1 as the least significant\
    \ number of the binary string.\n3. Divide the quotient (which we got from previous\
    \ step) by 2, assign the remainder as the second least significant number.\n4.\
    \ Repeat the process till we get the quotient to be zero.\n\nThe final remainder\
    \ will be the most significant digit of the binary string.\n\n```\ndecimal_binary(i,N)\n\
    ```"
