    \ The most prominent separability test is the Peres Horodecki Positivity of Partial\
    \ Transpose (PPT) criterion [88, 94]. According to this criterion, if a state\
    \ is separable, then the partial transposed density matrix is a positive matrix.\
    \ Another similar criterion is proposed in ref. [95], which states that for a\
    \ state to be separable, the determinant of the partial transposed density matrix\
    \ should be positive. The above discussion shows the importance of partial transpose\
    \ in the field of quantum entanglement studies. Let us take an example of a bipartite\
    \ composite system in the Hilbert space $H = H_A \\otimes H_B$ and the density\
    \ matrix corresponding to the composite system is $\\rho_{AB}$. We can write the\
    \ matrix elements of $\\rho_{AB}$ as\n\n$$\\rho_{AB} = \\sum_{ijkl} r_{ik;jl}\
    \ |i, j\\rangle\\langle k, l| \\equiv \\sum_{ijkl} r_{ik;jl} (|i\\rangle\\langle\
    \ k|)_A \\otimes (|j\\rangle\\langle l|)_B. \\qquad (5.5)$$\n\nIn the above equation,\
    \ indices $i,k$ are basis states in the Hilbert space $H_A$ of subsystem $A$ and\
    \ $j,l$ are basis states in the Hilbert space $H_B$ of subsystem $B$. Here $r_{ik;jl}$\
    \ are the matrix"
