    of the $XYZ$ model.


    # 6.3.1.3 The Majumdar-Ghosh model


    Hamiltonian of the Majumdar-Ghosh model [131–133] is given by,


    $$H = J_1 \sum_{i=1}^{N} \vec{\sigma}_i.\vec{\sigma}_{i+1} + J_2 \sum_{i=1}^{N}
    \vec{\sigma}_i.\vec{\sigma}_{i+2} \quad (6.21)$$


    Using our methods, we can construct the Majumdar-Ghosh Hamiltonian as follows.
    We have taken the example of $N = 6$, $J_1 = 1$, $J_2 = 0.5$ and $r = 1,2$ under
    PBC. Note that $J_1$ and $J_2$ are homogeneous.


    ```

    ham1=hamobj.heisenberg_hamiltonian(6,nn=1,mode=''homogeneous'',j=1.0,\n    condition=''periodic'')

    ham2=hamobj.heisenberg_hamiltonian(6,nn=2,mode=''homogeneous'',j=0.5,\n    condition=''periodic'')

    ham=ham1+ham2

    ```


    In the above program, the variable “ham” contains the required Hamiltonian matrix
    of the Majumdar-Ghosh model.'
