- md: "## 4.12 Bures distance\n\nBures distance [70–72] is defined as an infinitesimal\
    \ distance between density matrix operators defining quantum states. Bures distance\
    \ between two quantum states $\\rho$ and $\\sigma$ can be defined as,\n\n$$D =\
    \ \\sqrt{2(1 - \\sqrt{F(\\rho, \\sigma)})},$$\n\nwhere $F$ is the fidelity between\
    \ two quantum states $\\rho$ and $\\sigma$. In its own right Bures distance qualifies\
    \ to be an entanglement measure.\n\n### 4.12.1 Between two real or complex states\n\
    \n```\nbures_distance_vec(rho,sigma)\n```\n\n#### Parameters\n\n| in/out | Argument\
    \ | Description |\n|---|---|---|\n| [in] | rho | rho is a real or complex state\
    \ of dimension $(0:2^n-1)$, where $n$ is number of spins or qubits |\n| [in] |\
    \ sigma | sigma is a real or complex state of dimension $(0:2^n-1)$, where $n$\
    \ is number of spins or qubits |\n| [out] | bd | It is the Bures distance between\
    \ the states rho and sigma |\n\n#### Implementation\n\n```\ndef bures_distance_vec(self,rho,sigma):\n\
    \    \"\"\"\n    Calculates Bures distance between two quantum state\n    Input:\n\
    \        rho: input state vector\n        sigma: input state vector\n    Output:\n\
    \        bd: the value of the Bures distance\n    \"\"\"\n    # Calculating F(ρ,\
    \ σ)\n    fid=self.fidelity_vec2(rho,sigma)\n    # Finally we calculate Bures\
    \ distance D\n    bd=np.sqrt(2*(1-np.sqrt(fid)))\n\n    return bd\n```\n\n####\
    \ Example\n\nIn this example, we are finding the Bures distance between the two-qubit\
    \ states |ψ₁⟩ and |ψ₂⟩.\n\n```\nfrom QuantumInformation import GatesTools as GT\n\
    gt_obj=GT()\nstate1=np.zeros([4],dtype='float64')\nstate2=np.zeros([4],dtype='float64')\n\
    for i in range(0,4):\n    state1[i]=i+1\nstate1=qobj.normalization_vec(state1)\n\
    state2[0]=1/np.sqrt(2)\nstate2[3]=1/np.sqrt(2)\nBd=gt_obj.bures_distance_vec(state1,state2)\n\
    print(Bd)\n```\n\nThe preceding code prints the required Bures distance.\n\n0.8420246737858663\n\
    \nIn this example, we are finding the Bures distance between the two-qubit complex\
    \ states |ψ₃⟩ and |ψ₄⟩.\n\n```\nstate1=np.zeros([4],dtype=np.complex_)\nstate2=np.zeros([4],dtype=np.complex_)\n\
