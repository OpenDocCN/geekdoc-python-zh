    otimes N}}{\\sqrt{2}} = \\frac{|00000\\cdots 0\\rangle_N + |11111\\cdots 1\\rangle_N}{\\\
    sqrt{2}}. \\tag{4.40}$$\n\nThese states are extensively used in quantum teleportation\
    \ [50, 51], quantum cryptography protocols [52-54] and quantum game theory [55].\
    \ It is in fact quite interesting to note that the $N$-qubit GHZ state is the\
    \ ground state of a ferromagnet [56]. Another interesting property of the three-qubit\
    \ GHZ state ($N=3$ case) is that all the three qubits are entangled but no two-qubits\
    \ are entangled.\n\n```\nnGHZ(tot_spins=3)\n```\n\n# Parameters\n\n| in/out |\
