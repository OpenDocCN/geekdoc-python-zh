    \ value and the default value is 1.<br>If the mode = 'inhomogeneous', then we\
    \ pass a list holding the J<sub>r</sub><sup>i</sup> value to parameter jz. The\
    \ i<sup>th</sup> entry represents the interaction strength between the i<sup>th</sup>\
    \ and (i + r)<sup>th</sup> spin |\n| [in] | condition | It defines the type of\
    \ boundary condition<br>if condition = 'periodic', periodic boundary conditions\
    \ will be considered. It is the default value.<br>if condition = 'open', open\
    \ boundary conditions will be considered |\n| [out] | ham | It is an array of\
    \ dimension (0:2**N-1,0:2**N-1), which is the required Hamiltonian |\n\n# Implementation\n\
    \n```\ndef ham_zz(self,N,nn=1,mode='homogeneous',jz=1,condition='periodic'):\n\
    \    \"\"\"\n    Constructs Hamiltonian of spin-spin interaction in Z direction\n\
    \    Input\n        N: number of spins\n        nn: specifying rth interaction\n\
    \        mode: 'homogeneous' or 'inhomogeneous' magnetic field\n        jz: it\
    \ list of values if mode='inhomogeneous', and constant if mode='homogeneous'\n\
    \        condition: defining boundary conditions of the Hamiltonian\n    Output\n\
    \        ham: Hamiltonian\n    \"\"\"\n    # Checking entered boundary condition,\
    \ PBC and OBC\n    assert condition == 'periodic' or condition == 'open'\n   \
    \ # Number of interaction depending on the boundary condition\n    if condition\
    \ == 'periodic':\n        kn=N\n```"
- md: "## 6.2.4 Variants of the Ising model\n\nNow, we will see several variants of\
    \ the Ising model which is being used in condensed matter physics.\n\n### 6.2.4.1\
    \ The homogeneous Ising model in a non-zero uniform magnetic field\n\nThe Hamiltonian\
    \ of Ising model in a non-zero uniform magnetic field is given by,\n\n$$H = -J\
    \ \\sum_{i=1}^{N} \\sigma_i^z \\sigma_{i+1}^z - B \\sum_{i=1}^{N} \\sigma_i^z.\
    \ \\quad (6.15)$$\n\nUsing our recipes, we can construct the above Hamiltonian\
    \ as follows. We have taken the example of $N = 3$, $J = 1$, $B = 1$ and $r =\
    \ 1$ under PBC.\n\n```\nham_zz=hamobj.ham_zz(3,jz=1)\nham_z=hamobj.field_zham(3,mode='homogeneous',B=1)\n\
    ham=-ham_zz-ham_z\n```\n\nIn the above program, the variable “ham” contains the\
    \ required Hamiltonian matrix as shown in Eq. [6.15]\n\n### 6.2.4.2 The homogeneous\
    \ transverse Ising model in a non-zero uniform magnetic field\n\nThe Hamiltonian\
    \ of the transverse field Ising model [127] is given by,\n\n$$H = -J \\sum_{i=1}^{N}\
    \ \\sigma_i^z \\sigma_{i+1}^z - B \\sum_{i=1}^{N} \\sigma_i^x$$\n\nUsing our recipes,\
    \ we can construct the above Hamiltonian as follows. We have taken the example\
    \ of $N = 3$, $J = 1$, $B = 1$, and $r = 1$ under PBC.\n\n```\nham_zz=hamobj.ham_zz(3,jz=1)\n\
    ham_x=hamobj.field_xham(3,mode='homogeneous',B=1)\nham=-ham_zz-ham_x\n```\n\n\
    In the above program, the variable ham contains the required Hamiltonian matrix\
    \ as shown in Eq. [6.16]. The tilted field Ising model as well as other Ising\
    \ type models with any neighbour interaction can simply be constructed suitably\
    \ using similar prescriptions as given in Sections (6.2.4.1, 6.2.4.2).\n\n## 6.3\
    \ The Heisenberg interaction\n\nThe one-dimensional Heisenberg model [117, 128–130]\
    \ is an important model in physics, The Hamiltonian for the nearest-neighbour\
    \ one-dimensional Heisenberg model for the case of $N$ interacting spin half qubits\
    \ is as follows\n\n$$H = J \\sum_{i=1}^{N} \\vec{\\sigma}_i.\\vec{\\sigma}_{i+1}\
    \ = J \\sum_{i=1}^{N} (\\sigma_i^x \\sigma_{i+1}^x + \\sigma_i^y \\sigma_{i+1}^y\
    \ + \\sigma_i^z \\sigma_{i+1}^z)$$\n\nNote the dot product in the above Hamiltonian.\
    \ If $J < 0$, the ground state of the above Hamiltonian is ferromagnetic and If\
    \ $J > 0$, the ground state is antiferromagnetic. It can be solved analytically\
    \ for its ground states as well as the excited states by Bethe Ansatz [128] for\
    \ the case when $J < 0$ and by Hulthen's method [117] for the case when $J > 0$.\
    \ We generalize the Heisenberg Hamiltonian to the $r^{th}$ neighbour with random\
    \ interaction strengths using Eq. [6.17] as,\n\n$$H = \\sum_{i=1}^{N} J_r^i \\\
    vec{\\sigma}_i.\\vec{\\sigma}_{i+r} = \\sum_{i=1}^{N} J_r^i (\\sigma_i^x \\sigma_{i+r}^x\
    \ + \\sigma_i^y \\sigma_{i+r}^y + \\sigma_i^z \\sigma_{i+r}^z),$$\n\nwhere $J_r^i$\
    \ is the interaction strength which is also called the coupling constant between\
    \ the the $i^{th}$ and $(i + r)^{th}$ spin. $\\vec{\\sigma} = (\\sigma^x, \\sigma^y,\
    \ \\sigma^z)$ where $\\sigma^j$ are the Pauli spin matrices, with $j = x, y, z$.\
    \ Also note $\\sigma_{i+r}$ denotes the Pauli spin matrices corresponding to the\
    \ $r^{th}$ neighbouring spin from $\\sigma_i$. It is very easy to verify that\n\
    \n$$\\vec{\\sigma}_i.\\vec{\\sigma}_{i+r} = 2P_{i,i+r} - 1$$\n\nWhere $P_{i,i+r}$\
    \ is the permutation operator which swaps the $i^{th}$ and $(i+r)^{th}$ bit. We\
    \ use the permutation operator to construct the Hamiltonian instead of using the\
    \ naive form $\\vec{\\sigma}_i \\cdot \\vec{\\sigma}_{i+r}$.\n\n```\nheisenberg_hamiltonian(N,nn=1,mode='homogeneous',j=1.0,condition='periodic')\n\
    ```\n\n### Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- |\
    \ :--- |\n| [in] | N | It is the total number of spins |\n| [in] | nn | nn stores\
    \ the value of $r$ describing the $r^{th}$ neighbour interaction of the Hamiltonian.\
    \ The default value is equal to 1 (nearest neighbour interaction) |\n| [in] |\
    \ mode | It specifies whether the interaction strength is uniform or non-uniform<br>If\
    \ mode = 'homogeneous', then we have an uniform interaction ($J_r^i = J$). It\
    \ is the default value<br>If mode = 'inhomogeneous', then we have non-uniform\
    \ interaction |\n| [in] | j | If the mode = 'homogeneous', then j takes in a constant\
    \ value, and the default value is 1<br>If the mode = 'inhomogeneous', then we\
    \ pass a list holding the $J_r^i$ value to parameter j. The $i^{th}$ entry represents\
    \ the interaction strength between the $i^{th}$ and $(i+r)^{th}$ spin |\n| [in]\
    \ | condition | It defines the type of boundary condition<br>if condition = 'periodic',\
    \ periodic boundary conditions will be considered. It is the default value<br>if\
    \ condition = 'open', open boundary conditions will be considered |\n| [out] |\
    \ ham | It is an array of dimension $(0:2^{**}N-1, 0:2^{**}N-1)$, which is the\
    \ required Hamiltonian |\n\n### Implementation\n\n```\ndef heisenberg_hamiltonian(self,N,nn=1,mode='homogeneous',j=1.0,condition='periodic'):\n\
    \    \"\"\"\n    Construct Heisenberg interaction type Hamiltonian\n    Input\n\
    \        N: number of spins\n        nn: specifying rth interaction\n        mode:\
    \ 'homogeneous' or 'inhomogeneous' magnetic field\n        j: it list of values\
    \ if mode='inhomogeneous', and constant if\n            mode='homogeneous'\n \
    \       condition: defining boundary conditions of the Hamiltonian\n    Output\n\
    \        ham: Hamiltonian\n    \"\"\"\n    # Checking entered boundary condition,\
    \ PBC and OBC\n    assert condition == 'periodic' or condition == 'open'\n   \
    \ # Number of interaction depending on the boundary condition\n    if condition\
    \ == 'periodic':\n        kn=N\n    else:\n        kn=N-nn\n    # Only two modes\
    \ are allowed, homogeneous and inhomogeneous\n    assert mode == 'homogeneous'\
    \ or mode == 'inhomogeneous', \"Entered mode is invalid\"\n    # Checking number\
    \ of spins N >= 1\n    assert N >= 1, \"number of spins entered is not correct\"\
    \n    # Checking valid r^th interaction\n    assert nn<=N-1 and nn>=1,\"Not valid\
    \ interaction\"\n    ham=np.zeros([2**N,2**N],dtype='float64')\n    if mode ==\
    \ 'homogeneous':\n        # Row index of matrix, sum_{i=1}^N J_r sigma_i . sigma_{i+r}\n\
    \        for i in range(0,2**N):\n            # Column index of matrix, sum_{i=1}^N\
    \ J_r sigma_i . sigma_{i+r}\n            for jj in range(0,2**N):\n          \
    \      col=qobj.decimal_binary(jj,N)\n                for k in range(0,kn):\n\
    \                    k1=k+nn\n                    # For wrapping the Hamiltonian\n\
    \                    if k1>=N:\n                        k1=k1-N\n            \
    \        col2=col.copy()\n                    temp=col2[k]\n                 \
    \   col2[k]=col2[k1]\n                    col2[k1]=temp\n                    dec=qobj.binary_decimal(col2)\n\
    \                    if dec==i:\n                        inn=1\n             \
    \       else:\n                        inn=0\n                    ham[i,jj]=ham[i,jj]+(inn*j*2.0)\n\
    \                    if i==jj:\n                        ham[i,jj]=ham[i,jj]-j\n\
    \    else:\n        # Checking number of J_r^i interactions are valid according\
    \ to BC\n        if condition=='periodic':\n            assert len(j)==N, \"Entered\
    \ list of values j are not equal to number of interaction in PBC\"\n        else:\n\
    \            assert len(j)==N-nn, \"The entered values of magnetic strengths are\
    \ not equal to number of spins\"\n        # Row index of matrix, sum_{i=1}^N J_r^i\
    \ sigma_i . sigma_{i+r}\n        for i in range(0,2**N):\n            # Column\
    \ index of matrix, sum_{i=1}^N J_r^i sigma_i . sigma_{i+r}\n            for jj\
    \ in range(0,2**N):\n                col=qobj.decimal_binary(jj,N)\n         \
    \       for k in range(0,kn):\n                    k1=k+nn\n                 \
    \   # For wrapping the Hamiltonian\n                    if k1>=N:\n          \
    \              k1=k1-N\n                    col2=col.copy()\n                \
    \    temp=col2[k]\n                    col2[k]=col2[k1]\n                    col2[k1]=temp\n\
    \                    dec=qobj.binary_decimal(col2)\n                    if dec==i:\n\
    \                        inn=1\n                    else:\n                  \
    \      inn=0\n                    ham[i,jj]=ham[i,jj]+(inn*j[k]*2.0)\n       \
    \             if i==jj:\n                        ham[i,jj]=ham[i,jj]-j[k]\n  \
    \  return ham\n```"
  mdcn: "## 6.2.4 伊辛模型的变体\n\n现在，我们将看到凝聚态物理中使用的几种伊辛模型变体。\n\n### 6.2.4.1 非零均匀磁场中的均匀伊辛模型\n\
    \n非零均匀磁场中伊辛模型的哈密顿量由下式给出，\n\n$$H = -J \\sum_{i=1}^{N} \\sigma_i^z \\sigma_{i+1}^z\
    \ - B \\sum_{i=1}^{N} \\sigma_i^z. \\quad (6.15)$$\n\n使用我们的方法，我们可以如下构建上述哈密顿量。我们以\
    \ $N = 3$，$J = 1$，$B = 1$ 和 $r = 1$ 在周期性边界条件下为例。\n\n```\nham_zz=hamobj.ham_zz(3,jz=1)\n\
    ham_z=hamobj.field_zham(3,mode='homogeneous',B=1)\nham=-ham_zz-ham_z\n```\n\n\
    在上面的程序中，变量“ham”包含了如公式 [6.15] 所示的所需哈密顿量矩阵。\n\n### 6.2.4.2 非零均匀磁场中的均匀横向伊辛模型\n\n\
    横向场伊辛模型 [127] 的哈密顿量由下式给出，\n\n$$H = -J \\sum_{i=1}^{N} \\sigma_i^z \\sigma_{i+1}^z\
    \ - B \\sum_{i=1}^{N} \\sigma_i^x$$\n\n使用我们的方法，我们可以如下构建上述哈密顿量。我们以 $N = 3$，$J =\
    \ 1$，$B = 1$ 和 $r = 1$ 在周期性边界条件下为例。\n\n```\nham_zz=hamobj.ham_zz(3,jz=1)\nham_x=hamobj.field_xham(3,mode='homogeneous',B=1)\n\
    ham=-ham_zz-ham_x\n```\n\n在上面的程序中，变量 ham 包含了如公式 [6.16] 所示的所需哈密顿量矩阵。倾斜场伊辛模型以及其他具有任意近邻相互作用的伊辛类型模型，可以简单地使用第\
    \ (6.2.4.1, 6.2.4.2) 节中给出的类似方法来适当构建。\n\n## 6.3 海森堡相互作用\n\n一维海森堡模型 [117, 128–130]\
    \ 是物理学中的一个重要模型，对于 $N$ 个相互作用的自旋半量子比特情况，最近邻一维海森堡模型的哈密顿量如下\n\n$$H = J \\sum_{i=1}^{N}\
    \ \\vec{\\sigma}_i.\\vec{\\sigma}_{i+1} = J \\sum_{i=1}^{N} (\\sigma_i^x \\sigma_{i+1}^x\
    \ + \\sigma_i^y \\sigma_{i+1}^y + \\sigma_i^z \\sigma_{i+1}^z)$$\n\n注意上述哈密顿量中的点积。如果\
    \ $J < 0$，上述哈密顿量的基态是铁磁性的；如果 $J > 0$，基态是反铁磁性的。对于 $J < 0$ 的情况，可以通过 Bethe Ansatz\
    \ [128] 解析求解其基态和激发态；对于 $J > 0$ 的情况，可以通过 Hulthen 方法 [117] 求解。我们使用公式 [6.17] 将海森堡哈密顿量推广到具有随机相互作用强度的第\
    \ $r^{th}$ 近邻，\n\n$$H = \\sum_{i=1}^{N} J_r^i \\vec{\\sigma}_i.\\vec{\\sigma}_{i+r}\
    \ = \\sum_{i=1}^{N} J_r^i (\\sigma_i^x \\sigma_{i+r}^x + \\sigma_i^y \\sigma_{i+r}^y\
    \ + \\sigma_i^z \\sigma_{i+r}^z),$$\n\n其中 $J_r^i$ 是相互作用强度，也称为第 $i^{th}$ 个和第 $(i\
    \ + r)^{th}$ 个自旋之间的耦合常数。$\\vec{\\sigma} = (\\sigma^x, \\sigma^y, \\sigma^z)$，其中\
    \ $\\sigma^j$ 是泡利自旋矩阵，$j = x, y, z$。同时注意 $\\sigma_{i+r}$ 表示与 $\\sigma_i$ 相隔第 $r^{th}$\
    \ 个近邻自旋对应的泡利自旋矩阵。很容易验证\n\n$$\\vec{\\sigma}_i.\\vec{\\sigma}_{i+r} = 2P_{i,i+r}\
    \ - 1$$\n\n其中 $P_{i,i+r}$ 是置换算符，用于交换第 $i^{th}$ 位和第 $(i+r)^{th}$ 位。我们使用置换算符来构建哈密顿量，而不是使用朴素形式\
    \ $\\vec{\\sigma}_i \\cdot \\vec{\\sigma}_{i+r}$。\n\n```\nheisenberg_hamiltonian(N,nn=1,mode='homogeneous',j=1.0,condition='periodic')\n\
    ```\n\n### 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :--- | :--- | :--- |\n| [in] | N | 自旋总数\
    \ |\n| [in] | nn | nn 存储 $r$ 的值，描述哈密顿量的第 $r^{th}$ 近邻相互作用。默认值等于 1（最近邻相互作用） |\n\
    | [in] | mode | 指定相互作用强度是均匀还是非均匀<br>如果 mode = 'homogeneous'，则我们有均匀相互作用（$J_r^i\
    \ = J$）。这是默认值<br>如果 mode = 'inhomogeneous'，则我们有非均匀相互作用 |\n| [in] | j | 如果 mode\
    \ = 'homogeneous'，则 j 接收一个常数值，默认值为 1<br>如果 mode = 'inhomogeneous'，则我们将一个包含 $J_r^i$\
    \ 值的列表传递给参数 j。第 $i^{th}$ 个条目表示第 $i^{th}$ 个和第 $(i+r)^{th}$ 个自旋之间的相互作用强度 |\n| [in]\
    \ | condition | 定义边界条件的类型<br>如果 condition = 'periodic'，将考虑周期性边界条件。这是默认值<br>如果\
    \ condition = 'open'，将考虑开放边界条件 |\n| [out] | ham | 一个维度为 $(0:2^{**}N-1, 0:2^{**}N-1)$\
    \ 的数组，即所需的哈密顿量 |\n\n### 实现\n\n```\ndef heisenberg_hamiltonian(self,N,nn=1,mode='homogeneous',j=1.0,condition='periodic'):\n\
    \    \"\"\"\n    Construct Heisenberg interaction type Hamiltonian\n    Input\n\
    \        N: number of spins\n        nn: specifying rth interaction\n        mode:\
    \ 'homogeneous' or 'inhomogeneous' magnetic field\n        j: it list of values\
    \ if mode='inhomogeneous', and constant if\n            mode='homogeneous'\n \
    \       condition: defining boundary conditions of the Hamiltonian\n    Output\n\
    \        ham: Hamiltonian\n    \"\"\"\n    # Checking entered boundary condition,\
    \ PBC and OBC\n    assert condition == 'periodic' or condition == 'open'\n   \
    \ # Number of interaction depending on the boundary condition\n    if condition\
    \ == 'periodic':\n        kn=N\n    else:\n        kn=N-nn\n    # Only two modes\
    \ are allowed, homogeneous and inhomogeneous\n    assert mode == 'homogeneous'\
    \ or mode == 'inhomogeneous', \"Entered mode is invalid\"\n    # Checking number\
    \ of spins N >= 1\n    assert N >= 1, \"number of spins entered is not correct\"\
    \n    # Checking valid r^th interaction\n    assert nn<=N-1 and nn>=1,\"Not valid\
    \ interaction\"\n    ham=np.zeros([2**N,2**N],dtype='float64')\n    if mode ==\
    \ 'homogeneous':\n        # Row index of matrix, sum_{i=1}^N J_r sigma_i . sigma_{i+r}\n\
    \        for i in range(0,2**N):\n            # Column index of matrix, sum_{i=1}^N\
    \ J_r sigma_i . sigma_{i+r}\n            for jj in range(0,2**N):\n          \
    \      col=qobj.decimal_binary(jj,N)\n                for k in range(0,kn):\n\
    \                    k1=k+nn\n                    # For wrapping the Hamiltonian\n\
    \                    if k1>=N:\n                        k1=k1-N\n            \
    \        col2=col.copy()\n                    temp=col2[k]\n                 \
    \   col2[k]=col2[k1]\n                    col2[k1]=temp\n                    dec=qobj.binary_decimal(col2)\n\
    \                    if dec==i:\n                        inn=1\n             \
    \       else:\n                        inn=0\n                    ham[i,jj]=ham[i,jj]+(inn*j*2.0)\n\
    \                    if i==jj:\n                        ham[i,jj]=ham[i,jj]-j\n\
    \    else:\n        # Checking number of J_r^i interactions are valid according\
    \ to BC\n        if condition=='periodic':\n            assert len(j)==N, \"Entered\
    \ list of values j are not equal to number of interaction in PBC\"\n        else:\n\
    \            assert len(j)==N-nn, \"The entered values of magnetic strengths are\
    \ not equal to number of spins\"\n        # Row index of matrix, sum_{i=1}^N J_r^i\
    \ sigma_i . sigma_{i+r}\n        for i in range(0,2**N):\n            # Column\
    \ index of matrix, sum_{i=1}^N J_r^i sigma_i . sigma_{i+r}\n            for jj\
    \ in range(0,2**N):\n                col=qobj.decimal_binary(jj,N)\n         \
    \       for k in range(0,kn):\n                    k1=k+nn\n                 \
    \   # For wrapping the Hamiltonian\n                    if k1>=N:\n          \
    \              k1=k1-N\n                    col2=col.copy()\n                \
    \    temp=col2[k]\n                    col2[k]=col2[k1]\n                    col2[k1]=temp\n\
    \                    dec=qobj.binary_decimal(col2)\n                    if dec==i:\n\
    \                        inn=1\n                    else:\n                  \
    \      inn=0\n                    ham[i,jj]=ham[i,jj]+(inn*j[k]*2.0)\n       \
    \             if i==jj:\n                        ham[i,jj]=ham[i,jj]-j[k]\n  \
    \  return ham\n```"
