    # 3

    Numerical Linear Algebra Operations


    Having done with the basic recipes involving vector and matrix elements in the
    previous chapter, here in this chapter we will give the recipes for some major
    linear algebra operations [26, 29, 30]. These operations are very important from
    the point of view of many quantum information tasks and also required in the solution
    of major problems in quantum mechanics and elsewhere. To be more specific, this
    chapter broadly deals with matrix decompositions, calculation of different matrix
    norms, functions of matrices and orthogonalization procedures [25, 31]. However,
    in this chapter, we have purposely not included a few numerical methods, which
    have been included in our earlier book. The reason behind such a decision is because
    the NumPy library already included those methods, and therefore it is redundant
    to include those methods in our **QuantumInformation** library. The methods which
    are present in the NumPy library and not included in our library are listed below.


    | Method | Description |

    | :--- | :--- |

    | **numpy.linalg.svd** | Computes singular value decomposition of a matrix. |

    | **numpy.kron** | Performs Kronecker product of two arrays. |

    | **numpy.linalg.qr** | Computes the QR decomposition of a matrix. |


    Linear algebra is a branch of mathematics that deals with vectors, vector spaces,
    linear maps, and a system of linear equations. However, we will be studying those
    topics which are pertaining to quantum information theory. All the methods which
    will be discussed in this chapter are written inside the class **LinearAlgebra**
    and this whole class is written inside the Python module **chap3_linearalgebra.py**.
    The methods inside the the class **LinearAlgebra** also uses some functions from
    the NumPy, Math, Cmath, and SciPy libraries. In the forthcoming sections, we will
    use the following matrices for the purpose of illustration of how recipes work:

    For a real symmetric matrix,


    $$A_1 = \begin{pmatrix} 1 & -2 & 3 \ -2 & 3 & 4 \ 3 & 4 & 5 \end{pmatrix}.$$

    (3.1)


    For a complex Hermitian matrix,


    $$A_2 = \begin{pmatrix} 2 & 1-3i \ 1+3i & 4 \end{pmatrix}.$$

    (3.2)'
