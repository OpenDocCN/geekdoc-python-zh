    \ 0, 0])\nB=quantum_obj.cstate_shift(A,shift=1,shift_direction='right')\nf = open('shifted_state.txt','w')\n\
    for row in B:\n    f.write(str(row))\n    f.write('\\n')\nf.close()\n```\n\n文本文件\
    \ `shifted_state.txt` 中的内容如下所示：\n\n```\n0j\n(0.283552+0.354441j)\n(0.567104+0.637993j)\n\
    0j\n(0.141776+0.212664j)\n0j\n0j\n0j\n```\n\n## 2.12 完整示例\n\n本节我们将提供一个量子力学问题的数学描述，然后展示完整的\
    \ Python 代码以供读者参考。我们首先创建一个如下的两量子比特非归一化量子态。\n\n$|\\psi_1\\rangle = (1\\ 2\\ 3\\\
