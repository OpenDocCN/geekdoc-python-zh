    | [in] | N | It signifies the number of qubits. Its default value is equal to
    1 |

    | [out] | sigmax | sigmax is a real array of dimension $(0:2^N-1, 0:2^N-1)$, which
    is the $N$-qubit Pauli-X matrix |'
