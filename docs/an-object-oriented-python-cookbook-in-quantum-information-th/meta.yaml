    \ 0.  0.  0.3 0.  0.  0. ]]\n```\n\n## 6.2.2 $Y$方向的自旋-自旋相互作用\n\n$Y$方向自旋-自旋交换相互作用的哈密顿量通过在公式\
    \ [6.11] 中选择 $j = y$ 得到，即\n\n$$H = \\sum_{i=1}^{N} J_r^i \\sigma_i^y \\sigma_{i+r}^y.$$\n\
    \n```\nham_yy(N,nn=1,mode='homogeneous',jy=1,condition='periodic')\n```\n\n###\
    \ 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :--- | :--- | :--- |\n| [in] | N | 自旋的总数 |\n| [in]\
    \ | nn | nn 存储 $r$ 的值，描述哈密顿量的 $r^{th}$ 近邻相互作用。默认值为 1（最近邻相互作用） |\n| [in] | mode\
    \ | 指定相互作用强度是均匀还是非均匀<br>如果 mode = 'homogeneous'，则我们有均匀相互作用（$J_r^i = J$）。这是默认值<br>如果\
    \ mode = 'inhomogeneous'，则我们有非均匀相互作用 |\n| [in] | jy | 如果 mode = 'homogeneous'，jx\
    \ 接收一个常数值，默认值为 1。<br>如果 mode = 'inhomogeneous'，则我们将一个包含 $J_r^i$ 值的列表传递给参数 jx。第\
    \ $i^{th}$ 个条目表示第 $i^{th}$ 个和第 $(i+r)^{th}$ 个自旋之间的相互作用强度 |\n| [in] | condition\
    \ | 定义边界条件的类型<br>如果 condition = 'periodic'，将考虑周期性边界条件。这是默认值<br>如果 condition =\
    \ 'open'，将考虑开放边界条件 |\n| [out] | ham | 一个维度为 ($0:2^{**}N-1, 0:2^{**}N-1$) 的数组，即所需的哈密顿量\
    \ |\n\n### 实现\n\n```\ndef ham_yy(self,N,nn=1,mode='homogeneous',jy=1,condition='periodic'):\n\
    \    \"\"\"\n    构建Y方向自旋-自旋相互作用的哈密顿量\n    输入\n        N: 自旋数量\n        nn: 指定第r个相互作用\n\
    \        mode: 'homogeneous' 或 'inhomogeneous' 磁场\n        jy: 如果 mode='inhomogeneous'，则为值列表；如果\
    \ mode='homogeneous'，则为常数\n        condition: 定义哈密顿量的边界条件\n    输出\n        ham:\
    \ 哈密顿量\n\n    \"\"\"\n    # 检查输入的边界条件，PBC 和 OBC\n    assert condition == 'periodic'\
    \ or condition == 'open'\n    # 根据边界条件确定相互作用数量\n    if condition == 'periodic':\n\
    \        kn=N\n    else:\n        kn=N-nn\n    # 只允许两种模式，homogeneous 和 inhomogeneous\n\
    \    assert mode == 'homogeneous' or mode == 'inhomogeneous',\\n    \"输入的模式无效\"\
    \n    # 检查自旋数量 $N \\geq 1$\n    assert N >= 1, \"输入的自旋数量不正确\"\n    # 检查有效的 $r^{th}$\
    \ 相互作用\n    assert nn<=N-1 and nn>=1,\"无效的相互作用\"\n    ham=np.zeros([2**N,2**N],dtype='float64')\n\
    \    col2=np.zeros([N,1])\n    if mode == 'homogeneous':\n        # 矩阵的行索引，$\\\
    sum_{i=1}^N J_r \\sigma_i^y \\sigma_{i+r}^y$\n        for i in range(0,2**N):\n\
    \            # 矩阵的列索引，$\\sum_{i=1}^N J_r \\sigma_i^y \\sigma_{i+r}^y$\n      \
    \      for j in range(0,2**N):\n                col=qobj.decimal_binary(j,N)\n\
    \                for k in range(0,kn):\n                    k1=k+nn\n        \
    \            # 用于包装哈密顿量\n                    if k1>=N:\n                     \
    \   k1=k1-N\n                    col2=col.copy()\n                    col2[k]=1-col2[k]\n\
    \                    col2[k1]=1-col2[k1]\n                    if col2[k]==col2[k1]:\n\
    \                        ind=-1\n                    else:\n                 \
    \       ind=1\n                    dec=qobj.binary_decimal(col2)\n           \
    \         if dec==i:\n                        inn=1\n                    else:\n\
    \                        inn=0\n                    ham[i,j]=ham[i,j]+(inn*jy*ind)\n\
    \    else:\n        # 根据边界条件检查 $J_r^i$ 相互作用的数量是否有效\n        if condition=='periodic':\n\
    \            assert len(jy)==N,\\n        \"输入的磁强度值数量与自旋数量不相等\"\n        else:\n\
    \            assert len(jy)==N-nn,\\n        \"输入的磁强度值数量与自旋数量不相等\"\n        #\
    \ 矩阵的行索引，$\\sum_{i=1}^N J_r^i \\sigma_i^y \\sigma_{i+r}^y$\n        for i in range(0,2**N):\n\
    \            # 矩阵的列索引，$\\sum_{i=1}^N J_r^i \\sigma_i^y \\sigma_{i+r}^y$\n    \
    \        for j in range(0,2**N):\n                col=qobj.decimal_binary(j,N)\n\
    \                for k in range(0,kn):\n                    k1=k+nn\n        \
    \            # 用于包装哈密顿量\n                    if k1>=N:\n                     \
    \   k1=k1-N\n                    col2=col.copy()\n                    col2[k]=1-col2[k]\n\
    \                    col2[k1]=1-col2[k1]\n                    if col2[k]==col2[k1]:\n\
    \                        ind=-1\n                    else:\n                 \
    \       ind=1\n                    dec=qobj.binary_decimal(col2)\n           \
    \         if dec==i:\n                        inn=1\n                    else:\n\
    \                        inn=0\n                    ham[i,j]=ham[i,j]+(inn*jy[k]*ind)\n\
    \    return ham\n```\n\n### 示例\n\n在此示例中，我们寻找在$Y$方向具有开放边界条件和随机相互作用的三量子比特自旋-自旋相互作用的哈密顿量。该哈密顿量具有最近邻相互作用，随机相互作用的强度为\
    \ $J_1^1 = 0.1$ 和 $J_1^2 = -0.3$。\n\n```\nham_yy=hamobj.ham_yy(3,nn=1,mode='inhomogeneous',\\\
