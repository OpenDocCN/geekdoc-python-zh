    # 6 One-Dimensional Quantum Spin-1/2 Chain Models\n\nIn this chapter we will give\
    \ the numerical recipes for constructing the spin half Fermionic Hamiltonians\
    \ in one dimension [115–118], basically a lattice of contiguous electrons along\
    \ a line. Each electron at a given point on the one-dimensional lattice represents\
    \ one qubit (here qubits are synonymous with spins) of information. Spin Hamiltonians\
    \ or what is popularly called the spin chain models are prototypical in understanding\
    \ the origin of magnetism and magnetic phases [119–121]. Not only that these spin\
    \ chains at a temperature of zero Kelvin can be used to study and understand quantum\
    \ phase transitions [80, 83], which unlike thermal phase transitions do not involve\
    \ any thermal parameter. These Hamiltonians also prove as a fertile ground for\
    \ testing various quantum information tasks not only theoretically but also experimentally\
    \ [122–124]. We have given the numerical recipes for all possible interaction\
    \ Hamiltonian’s, and as we progress through the chapter, we will give some examples\
    \ on how to construct some famous spin chains using our numerical recipes for\
    \ the sake of illustration.\n\nTo understand further, we consider the simple but\
    \ the well known Heisenberg spin chain model, a boon for people working in the\
    \ area of magnetism. Using the Heisenberg model, the magnetic properties of many\
    \ insulating crystals can be explained [125, 126]. The Hamiltonian of the Heisenberg\
    \ model can be written as,\n\n$$\\hat{\\mathcal{H}} = -J \\sum_{i=1}^{N} \\vec{\\\
    sigma}_i \\cdot \\vec{\\sigma}_{i+1}, \\quad (6.1)$$\n\nwhere $J$ is the coupling\
    \ constant and the periodic boundary condition is in effect, that is $\\vec{\\\
    sigma}_{N+1} \\equiv \\vec{\\sigma}_1$. Every spin is represented by a quantum\
    \ operator acting upon the tensor product ($\\mathbb{C}^2$)$^{\\otimes N}$ as\
    \ each site is associated with a complex two-dimensional Hilbert space. To make\
    \ things more clear, let us take a 3 spin Heisenberg model, we can have two different\
    \ types of boundary conditions, one is the periodic boundary condition (PBC) in\
    \ which there is a wrapping up of the spins end-to-end and the other which is\
    \ the open boundary condition (OBC) where there is no wrapping up and end spins\
    \ are left free. Let us write the Hamiltonian for the model given in Eq. [6.1]\
    \ as below, considering periodic boundary conditions with end to end wrap up of\
    \ the form $\\sigma_{N+1} \\equiv \\sigma_1$\n\n$$\\mathcal{H} = -J \\sum_{i=1}^{3}\
    \ \\vec{\\sigma}_i \\cdot \\vec{\\sigma}_{i+1} \\quad (6.2)$$\n$$= -J( \\vec{\\\
    sigma}_1 \\cdot \\vec{\\sigma}_2 + \\vec{\\sigma}_2 \\cdot \\vec{\\sigma}_3 +\
    \ \\underbrace{\\vec{\\sigma}_3 \\cdot \\vec{\\sigma}_1}_{\\text{wrap up}} ),\
    \ \\quad (6.3)$$\n$$= -J(\\sigma_1^x \\sigma_2^x + \\sigma_1^y \\sigma_2^y + \\\
    sigma_1^z \\sigma_2^z + \\sigma_2^x \\sigma_3^x + \\sigma_2^y \\sigma_3^y + \\\
    sigma_2^z \\sigma_3^z + \\sigma_3^x \\sigma_1^x + \\sigma_3^y \\sigma_1^y + \\\
    sigma_3^z \\sigma_1^z) \\quad (6.4)$$\n\nNow for a model with open boundary conditions\
    \ where there is no such condition of end to end wrap up like $\\vec{\\sigma}_{N+1}\
    \ \\equiv \\vec{\\sigma}_1$, we can write\n\n$$\\mathcal{H} = -J( \\vec{\\sigma}_1\
    \ \\cdot \\vec{\\sigma}_2 + \\vec{\\sigma}_2 \\cdot \\vec{\\sigma}_3) \\quad (6.5)$$\n\
    $$= -J(\\sigma_1^x \\sigma_2^x + \\sigma_1^y \\sigma_2^y + \\sigma_1^z \\sigma_2^z\
    \ + \\sigma_2^x \\sigma_3^x + \\sigma_2^y \\sigma_3^y + \\sigma_2^z \\sigma_3^z)\
    \ \\quad (6.6)$$\n\nHowever, these are the PBCs and OBCs for nearest-neighbour\
    \ interaction, if we have $r$ nearest neighbours interacting, there will be $r$\
    \ such end to end wrap up terms of the form $\\sigma_{N+r} \\equiv \\sigma_r$\
    \ for $r = 1, 2, \\ldots$ It is also important to note that $\\sigma_i^z = \\\
    mathbb{I}^{\\otimes i-1} \\otimes \\sigma^z \\otimes \\mathbb{I}^{\\otimes N-i}$,\
    \ where $\\mathbb{I}$ is the $2 \\times 2$ identity matrix. This is so because,\
    \ the total Hamiltonian for $N$ spins will be a $2^N \\times 2^N$ matrix in the\
    \ $(\\mathbb{C}^2)^{\\otimes N}$ – dimensional Hilbert space. All this implies\
    \ that the Pauli operator $z$ with a subscript $i$ which is $\\sigma_i^z$ will\
    \ only act on the qubit at site $i$. At each site $i$, there is a quantum mechanical\
    \ spin half particle either pointing along “up ($|\\uparrow\\rangle$)” or “down\
    \ ($|\\downarrow\\rangle$)” which are respectively denoted by $|0\\rangle$ and\
    \ $|1\\rangle$. Having the above discussed facts in mind, we can proceed further.\
    \ All the recipes given below are for both PBC’s and OBC’s which can be chosen\
    \ as a user defined variable while execution. The user also can choose till how\
    \ many neighbours he or she needs to build the spin chain. Also note that in this\
    \ chapter we are using $\\sigma$ matrices instead of the naive spin matrix $S$,\
    \ bearing in mind the relationship between them as $S_i = \\frac{1}{2}\\sigma_i$\
    \ (with $\\hbar = 1$), with $i = x, y, z$.\n\nNote that for all Hamiltonians from\
    \ Section (6.1) to Section (6.3), the output of an example contains only the integer\
    \ part of the matrix elements; this is done to accommodate the output in the given\
    \ space. However, for the Section (6.4) which is the DM interaction, only integer\
    \ part of the imaginary elements are displayed for the same reason. In this chapter,\
    \ all examples are given for three spins. In the codes given in this chapter we\
    \ have represented the interaction parameters like magnetic field, interaction\
    \ strength (direct and anti symmetric) by an array of dimension equal to number\
    \ of spins in the system.\n\nIn the codes given for the interaction of the spins\
    \ with magnetic field, we have considered $B$ to be an array of dimension equal\
    \ to the number of spins in the system. This also gives us the freedom to choose\
    \ an inhomogenous magnetic field at different sites, meaning, the $i^{th}$ entry\
    \ of this array will be the magnitude of the applied magnetic field at the $i^{th}$\
    \ site. If the magnetic field is homogeneous, all entries of the array $B$ will\
    \ be same. Similarly, for spin-spin interactions, we have chosen the interaction\
    \ parameter to be an array of dimension equal to the number of spins in the system.\
    \ The $i^{th}$ entry of this array will be the interaction strength between the\
    \ $i^{th}$ and $(i+r)^{th}$ spin. If the interaction is homogeneous, all the entries\
    \ of the corresponding interaction parameter will be same. However, if random\
    \ interactions are present between the spins, the array will be filled with different\
    \ numbers (drawn from any probability distribution) corresponding to each pair\
    \ of spins. You can understand more about the usage as you see the examples given\
    \ as we evolve through the chapter.\n\nTo import the class **QuantumMechanics**\
    \ from the **QuantumInformation** library, and creating the object of the class\
    \ in your Python code can be done as follows,\n\n```python\n# Importing the class\
    \ Hamiltonian from the QuantumInformation library\nfrom QuantumInformation import\
    \ Hamiltonian as ham\n\n# creating the object of the class\nhamobj=ham()\n```\n\
    \n## 6.1 Hamiltonian of spins interacting with an external magnetic field\n\n\
    The interaction Hamiltonian of a linear array of spin half electrons interacting\
    \ with an external magnetic field of strength $B$ in general is given by,\n\n\
    $$H = \\sum_{i=1}^{N} B_i \\sigma_i^j, \\quad (6.7)$$"
