  md: "# Implementation\n\n```\ndef random_probability_vec(self,N):\n    \"\"\"\n\
    \    Constructs a random probability vector\n    Input:\n        N: dimension\
    \ of the probability vector.\n    Output:\n        prob_vec: The probability vector\n\
    \    \"\"\"\n    prob_vec=np.random.uniform(low=0,high=1.0,size=N)\n    norm=prob_vec.sum()\n\
    \    prob_vec=prob_vec/norm\n    return prob_vec\n```\n\n# Example\n\n```\npvec=qrobj.random_probability_vec(5)\n\
    ```\n\nIn the above example, pvec is the $5 \\times 1$ required probability vector\
    \ which is normalized.\n\n# 7.10 Random pure quantum state vector\n\nThe random\
    \ quantum state vector [138, 144] of dimension $n$ can be described as,\n\n$$|\\\
    psi\\rangle = \\sum_{j=1}^{n} c_j |j\\rangle, \\quad (7.6)$$\n\nwhere $c_j$'s\
    \ are the random numbers, either real or complex chosen from any random distribution,\
    \ here we use the uniform and Gaussian distribution, such that $\\sum_{j=1}^{n}\
    \ |c_j|^2 = 1$. Note that, $|j\\rangle$ is the computational basis. Random quantum\
    \ states are solely defined analytically based on the normalization condition\
    \ only which is identical to the equation of a $n$-dimensional unit sphere. This\
    \ probability distribution is proportional to the Dirac delta function such that\
    \ the $P(c_1, c_2, \\dots, c_n) \\propto \\delta(\\sum_{j=1}^{n} |c_j|^2 - 1)$.\n\
    \n# 7.10.1 Random real state vector\n\n```\nrandom_qrstate(N,distribution='gaussian',\\\
    n                mu=0,sigma=1,low=0.0,high=1.0)\n```"
