    ```\n\n## 2.5 两个矩阵之间的张量积\n\n张量积也称为直积或克罗内克积。张量积不仅限于方阵，对于矩形矩阵同样有效。设有两个矩阵 $A$ 和 $B$，维度分别为\
    \ $m \\times n$ 和 $p \\times q$。这两个矩阵之间的克罗内克积将是一个维度为 $mp \\times nq$ 的矩阵，可以表示如下：\n\
