    \ code prints the following standard output of outer product,\n\n```\n[[2.+0.j\
    \ 3.+1.j]\n [2.-2.j 4.-2.j]]\n```\n\n## 2.5 Tensor product between two matrices\n\
    \nTensor product is also known as direct product or Kronecker product. Tensor\
    \ products are not restricted to square matrices only, but valid even for rectangular\
    \ matrices equally. Let there be two matrices $A$ and $B$ of the dimensions $m\
    \ \\times n$ and $p \\times q$ respectively. The Kronecker product between these\
    \ two matrices will be a matrix of dimension $mp \\times nq$ can be represented\
    \ as below,\n\n$$A \\otimes B = \\begin{pmatrix} A_{11}B & A_{12}B & \\cdots &\
    \ A_{1n}B \\\\ A_{21}B & A_{22}B & \\cdots & A_{2n}B \\\\ \\vdots & \\vdots &\
    \ \\ddots & \\vdots \\\\ A_{m1}B & A_{m2}B & \\cdots & A_{mn}B \\end{pmatrix}_{mp\
    \ \\times nq}.$$\n\nNote that each of the elements of the matrix $A$ is algebraically\
    \ multiplied by the total matrix $B$. Kronecker products are very useful when\
    \ we deal with several identical or non identical physical systems, and to find\
    \ the quantum states representing those systems. For example, any general one-qubit\
    \ system can be represented by the state $|\\phi\\rangle = \\alpha|0\\rangle +\
    \ \\beta|1\\rangle$, now, if we have to find the two-qubit state $|\\xi\\rangle$\
    \ corresponding to two one-qubit states, then we can have\n\n$$|\\xi\\rangle =\
    \ (\\alpha_1|0\\rangle + \\beta_1|1\\rangle)_1 \\otimes (\\alpha_1|0\\rangle +\
    \ \\beta_1|1\\rangle)_2.$$\n\nThe subscripts in the above refer to systems 1 and\
    \ 2 respectively. Note that Eq.[2.9] can be extended to $N$ qubit states in a\
    \ straightforward manner. Not only that, the concept of tensor product can be\
    \ extended to operators, which represent physical observables in quantum mechanics\
    \ also.\n\n### 2.5.1 For real or complex matrices\n\n`tensor_product_matrix(A,B)`\n\
    \n### Parameters\n\n| in/out | Argument | Description |\n|---|---|---|\n| [in]\
    \ | A | A is a NumPy 1D or 2D array |\n| [in] | B | B is a NumPy 1D or 2D array\
    \ |\n| [out] | C | C is a NumPy array which is the tensor product of matrix A\
    \ and B |\n\n### Implementation\n\n```python\ndef tensor_product_matrix(self,A,B):\n\
    \    \"\"\"\n    Here we calculate the tensor product of two matrix A and B\n\
    \    Attributes:\n        A: it is either a 1D or 2D array\n        B: it is either\
    \ a 1D or 2D array\n    Returns: tensor product of A and B\n    \"\"\"\n    #\
    \ Reshaping if input vector is of shape $(n,)$ to $(n,1)$.\n    if len(A.shape)==1:\n\
    \        A=A.reshape(A.shape[0],1)\n    if len(B.shape)==1:\n        B=B.reshape(B.shape[0],1)\n\
    \    return np.kron(A,B)\n```\n\n### Example\n\nIn this example, we are finding\
    \ the tensor product between two real matrices as given below:\n\n$$A = \\begin{pmatrix}\
    \ 1 \\\\ 2 \\end{pmatrix}, \\quad B = \\begin{pmatrix} 1 & 2 \\\\ 3 & 1 \\end{pmatrix}$$\n\
    \n```python\nimport numpy as np\nA=np.array([1,2])\nB=np.array([[1,2],[3,1]])\n\
    C=quantum_obj.tensor_product_matrix(A,B)\nprint(C)\n```\n\nThe above code prints\
    \ the output of the tensor product between the matrix A and B.\n\n```\n[[1 2]\n\
    \ [3 1]\n [2 4]\n [6 2]]\n```\n\nIn this example, we are finding the tensor product\
    \ between two complex matrices as given below:\n\n$$A = \\begin{pmatrix} 1 \\\\\
    \ 1-i \\end{pmatrix}, \\quad B = \\begin{pmatrix} 1+i \\\\ 3-3i \\end{pmatrix}$$\n\
    \n```python\nimport numpy as np\nA=np.array([1,complex(1,-1)])\nB=np.array([complex(1,1),complex(3,-3)])\n\
    C=quantum_obj.tensor_product_matrix(A,B)\nprint(C)\n```\n\nThe above code prints\
    \ the output of the tensor product between the matrix A and B.\n\n```\n[[1.+1.j]\n\
    \ [3.-3.j]\n [2.+0.j]\n [0.-6.j]]\n```\n\n## 2.6 Commutator between two matrices\n\
    \nIn general it is known that matrices do not commute under multiplication, so\
    \ it is useful to define the quantity called commutator represented by $[A, B]$\
    \ between two matrices and is given by,\n\n$$C = [A, B] = AB - BA, \\tag{2.12}$$\n\
    \nif $[A, B] = 0 \\Rightarrow AB = BA$, then matrix $A$ and $B$ are said to commute\
    \ with each other. Commutator arises as a basic principle in quantum mechanics\
    \ where we start with the canonical commutation relation [27] between the $i$'th\
    \ and $j$'th component of position and momentum respectively given by $[x_i, p_j]\
    \ = i\\hbar\\delta_{ij}$ from which the entire edifice of quantum mechanics is\
    \ built. It is also worth to mention here that if two physical observables do\
    \ not commute, then they cannot be diagonalized by a common set of eigenvectors,\
    \ this has deep implications to Heisenberg uncertainty principle etc.\n\n### 2.6.1\
    \ For real or complex matrices\n\n`commutation(A,B)`\n\n### Parameters\n\n| in/out\
    \ | Argument | Description |\n|---|---|---|\n| [in] | A | A is a NumPy array of\
    \ dimension (0:n-1,0:n-1) |\n| [in] | B | B is a NumPy array of dimension (0:n-1,0:n-1)\
    \ |\n| [out] | C | C is a NumPy array of dimension (0:n-1,0:n-1) which is the\
    \ commutator between A and B |\n\n### Implementation\n\n```python\ndef commutation(self,A,B):\n\
    \    \"\"\"\n    Here we calculate commutation between matrices A and B\n    Attributes:\n\
    \        A: it is a matrix\n        B: it is another matrix\n    Returns: AB-BA\
    \ matrix\n    \"\"\"\n    # We directly return the commutation relation, $AB -\
    \ BA$\n    return np.matmul(A,B)-np.matmul(B,A)\n```\n\n### Example\n\nIn this\
    \ example, we are finding the commutator between two real matrices as given below:\n\
    \n$$A = \\begin{pmatrix} 1 & 2 \\\\ 2 & -1 \\end{pmatrix}, \\quad B = \\begin{pmatrix}\
    \ 1 & 2 \\\\ 3 & 1 \\end{pmatrix} \\tag{2.13}$$\n\n```python\nimport numpy as\
    \ np\nA=np.array([[1,2],[2,-1]])\nB=np.array([[1,2],[3,1]])\nC=quantum_obj.commutation(A,B)\n\
    print(C)\n```\n\nThe above code prints the output of the commutator between matrices\
    \ A and B.\n\n```\n[[ 2  4]\n [-6 -2]]\n```\n\nIn this example, we are finding\
    \ the commutator between two complex matrices as given below,\n\n$$A = \\begin{pmatrix}\
    \ 1 & 1-i \\\\ 2+3i & 4 \\end{pmatrix}, \\quad B = \\begin{pmatrix} 1+i & 1+i\
    \ \\\\ 3-3i & 4-i \\end{pmatrix} \\tag{2.14}$$\n\n```python\nimport numpy as np\n\
    A=np.array([[1,complex(1,-1)],[complex(2,3),4]])\nB=np.array([[complex(1,1),complex(1,1)],[complex(3,-3),complex(4,-1)]])\n\
    C=quantum_obj.commutation(A,B)\nprint(C)\n```\n\nThe above code prints the output\
    \ of the commutator between matrices A and B.\n\n```\n[[ 1.-11.j -2. -8.j]\n [-3.-14.j\
    \ -1.+11.j]]\n```\n\n## 2.7 Anticommutator between two matrices\n\nThe anticommutator\
    \ $\\{A, B\\}$ between two matrices $A$ and $B$ is defined as below,\n\n$$C =\
    \ \\{A, B\\} = AB + BA, \\tag{2.15}$$\n\nif $\\{A, B\\} = 0 \\Rightarrow AB =\
    \ -BA$, then matrix $A$ and $B$ are said to anti-commute with each other. Anticommutators\
    \ occur in the areas of second quantization involving Fermionic and Bosonic operators\
    \ [28].\n\n### 2.7.1 For real or complex matrices\n\n`anti_commutation(A,B)`\n\
    \n### Parameters\n\n| in/out | Argument | Description |\n|---|---|---|\n| [in]\
    \ | A | A is a NumPy array of dimension (0:n-1,0:n-1) |\n| [in] | B | B is a NumPy\
    \ array of dimension (0:n-1,0:n-1) |\n| [out] | C | C is a NumPy array of dimension\
    \ (0:n-1,0:n-1) which is the anticommutator between A and B |\n\n### Implementation\n\
    \n```python\ndef anti_commutation(self,A,B):\n    \"\"\"\n    Here we calculate\
    \ anti commutation between matrices A and B\n    Attributes:\n        A: input\
    \ a square matrix\n        B: input another square matrix\n    Returns: AB+BA\
    \ matrix\n    \"\"\"\n    # The following return statement calculates, {A,B} =\
    \ AB + BA\n    return np.matmul(A,B)+np.matmul(B,A)\n```\n\n### Example\n\nIn\
    \ this example, we are finding the anticommutator between two real matrices as\
    \ given below:\n\n$$A = \\begin{pmatrix} 1 & 2 \\\\ 2 & -1 \\end{pmatrix}, \\\
    quad B = \\begin{pmatrix} 1 & 2 \\\\ 3 & 1 \\end{pmatrix}$$\n\n```python\nimport\
    \ numpy as np\nA=np.array([[1,2],[2,-1]])\nB=np.array([[1,2],[3,1]])\nC=quantum_obj.anti_commutation(A,B)\n\
    print(C)\n```\n\nThe above code prints the output of the anticommutator between\
    \ matrices A and B.\n\n```\n[[12  4]\n [ 4  8]]\n```\n\nIn this example, we are\
    \ finding the anticommutator between two complex matrices as given below:\n\n\
    $$A = \\begin{pmatrix} 1 & 1-i \\\\ 2+3i & 4 \\end{pmatrix}, \\quad B = \\begin{pmatrix}\
    \ 1+i & 1+i \\\\ 3-3i & 4-i \\end{pmatrix}$$"
