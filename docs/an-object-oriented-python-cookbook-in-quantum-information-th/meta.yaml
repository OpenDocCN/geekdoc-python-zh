    # 4.10 Fidelity


    Fidelity [64, 65] is a measure of how close two quantum states are. It has a variety
    of applications such as in the field of quantum teleportation [66], quantum error
    correction [67], quantum spin chain system [68], etc. Fidelity between two density
    matrices $\rho$ and $\sigma$ can be found using the trace norm as


    $F = \| \sqrt{\rho} \sqrt{\sigma} \|^2$. (4.53)


    In the special case when $\rho$ and $\sigma$ are pure states, that is, $\rho =
    |\psi_{\rho}\rangle\langle\psi_{\rho}|$ and $\sigma = |\psi_{\sigma}\rangle\langle\psi_{\sigma}|$.
    Fidelity can be found as


    $F = |\langle\psi_{\rho}|\psi_{\sigma}\rangle|^2$. (4.54)


    Fidelity between a pure state $|\psi\rangle$ and a density matrix $\sigma$ can
    also be found as


    $F = \langle\psi|\sigma|\psi\rangle$. (4.55)


    Note that fidelity always lies between 0 and 1. In fact the fidelity for pure
    states is similar to the overlap between the states.


    # 4.10.1 Between two real or complex states


