  md: "# Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- | :--- |\n\
    | [in] | N | It is the number of qubits |\n| [out] | rden | It is array of dimension\
    \ (0:2^N-1,0:2^N-1) which is the random real density matrix |\n\n# Implementation\n\
    \n```\ndef random_rden(self,N):\n    \"\"\"\n    Constructs a random real pure\
    \ density matrix\n    Input:\n        N: number of qubits\n    Output:\n     \
