    \ indicated as below,\n\n```\n>>> print(type(True))\n<class 'bool'>\n```\n\n####\
    \ 1.2.6 List\n\nLists are an ordered collection of various types of data, and\
    \ it has no fixed size. Lists need not be homogeneous always, which makes it the\
    \ most powerful feature of Python. Unlike strings, lists are mutable by a variety\
    \ of list method calls, and in this section, we will discuss a few of the important\
    \ ones. A list is created by writing the comma-separated values (items) inside\
