    # 1.2 Data types


    # 1.2.1 Integer


    The *int* class represents integer values. The integer value contains positive
    or negative whole numbers. In Python, there is no limit to how long an integer
    value can be. The built-in **type()** function is used to find the data type of
    any variable, as shown below,


    ```

    >>> a=30

    >>> print(type(a))

    ```


    The output of the preceding code will print the *int* class as shown below,


    ```

    <class ''int''>

    ```


    # 1.2.2 Real


    The *float* class represents the real numbers. The real numbers are written in
    floating point representation. Optionally, the character **e** or **E** followed
    by a positive or negative integer may be appended to specify scientific notation.


    ```

    >>> b=30.5

    >>> print(type(b))

    >>> h=6.626E-34 # Planck constant

    >>> print("Multiplying Planck constant by 10 =",h*10)

    ```


    The output of the preceding code will print the *float* class as shown below.


    ```

    <class ''float''>

    Multiplying Planck constant by 10 = 6.626e-33

    ```


    # 1.2.3 Complex


    Any complex number has two parts, real and imaginary, and it is represented by
    *complex* class. For example, the complex number $3 + 2i$ in Python can be written
    as,


    ```

    >>> c = complex(3, 2)

    >>> print(type(c))

    ```


    The output of the preceding code will print the *complex* class as shown below,


    ```

    <class ''complex''>

    ```'
  - "[PAGE 22]\n\nHowever, when a string contains a special character like a quote,\
    \ then we need to escape them, otherwise it will lead to syntax error. Escaping\
