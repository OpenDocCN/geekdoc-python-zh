    print(hs_innp)\n```\n\n上述代码打印矩阵 $A_2$ 和 $A_4$ 之间的希尔伯特-施密特内积。\n(35-5j)\n\n## 3.8\
    \ 格拉姆-施密特正交化\n\n设在某个定义了内积的向量空间 $V$ 中，存在一个线性无关的非正交基集 $|w\\rangle : \\{|w_1\\rangle,\
    \ |w_2\\rangle, \\cdots, |w_m\\rangle\\}$（即 $\\langle w_i|w_j\\rangle \\neq \\\
    delta_{ij}$）。有一种有用的方法称为“格拉姆-施密特”过程 [24, 36, 37]，可用于从非正交归一化集 $|w\\rangle$ 生成一组正交归一化向量\
    \ $|v\\rangle : \\{|v_1\\rangle, |v_2\\rangle, \\cdots, |v_m\\rangle\\}$。最初定义，\n\
    \n$$|v_1\\rangle = \\frac{|w_1\\rangle}{||w_1\\rangle||}. \\tag{3.19}$$\n\n对于\
    \ $1 \\leq k \\leq m - 1$，通过归纳法定义 $|v_{k+1}\\rangle$，\n\n$$|v_{k+1}\\rangle \\\
    equiv \\frac{|w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\rangle|v_i\\\
    rangle}{|||w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\rangle|v_i\\\
    rangle||}. \\tag{3.20}$$\n\n格拉姆-施密特正交化过程在量子力学可观测量（厄米算子）的背景下被证明非常有用，该算子包含简并特征值。简并特征值的特征向量不一定彼此正交。然而，非简并特征向量是彼此正交的。为了将完整的特征向量转换为正交归一化特征向量，我们执行格拉姆-施密特正交化。这种变换不是特征基的幺正变换。\n\
    \n### 3.8.1 对于实向量\n\n```python\ngram_schmidt_ortho_rmatrix(vectors)\n```\n\n##\
    \ 参数\n\n| 输入/输出 | 参数 | 描述 |\n| :--- | :--- | :--- |\n| [in] | vectors | 一个维度为\
    \ (0:n-1,0:k-1) 的实数数组，其列是线性无关的非正交归一化向量集 |\n| [out] | orthonormal_vec | 一个维度为 (0:n-1,0:k-1)\
    \ 的实数数组，存储 k 个维度为 n 的向量作为列，这些是正交归一化后的向量集 |\n\n## 实现\n\n```python\ndef gram_schmidt_ortho_rmatrix(self,vectors):\n\
    \    \"\"\"\n    Orthornormal set of real vectors are calculated\n    Attributes:\n\
    \        vectors: A matrix whose columns are non-orthogonal set real vectors\n\
    \    Return:\n        orthonormal_vec: A matrix whose columns are orthonormal\
    \ to each other\n    \"\"\"\n    orthonormal_vec=np.zeros((vectors.shape[0],vectors.shape[1]),\n\
    \                           dtype='float64')\n    for col in range(0,vectors.shape[1]):\n\
    \        if col != 0:\n            for col2 in range(0,col):\n               \
    \ tr=0.0\n                # Here we calculate $\\langle v_i|w_{k+1}\\rangle$\n\
    \                for row2 in range(0,vectors.shape[0]):\n                    tr=tr+(orthonormal_vec[row2,col2]*vectors[row2,col])\n\
    \                # Here we calculate $\\sum_{i=1}^k \\langle v_i|w_{k+1}\\rangle\
    \ |v_i\\rangle$\n                orthonormal_vec[:,col]=orthonormal_vec[:,col]+\n\
    \                                      (tr*orthonormal_vec[:,col2])\n        \
    \    # Here we calculate $|w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\\
    rangle |v_i\\rangle$\n            orthonormal_vec[:,col]=vectors[:,col]-orthonormal_vec[:,col]\n\
    \        if col == 0:\n            # Here calculate $|v_1\\rangle = |w_1\\rangle$\n\
    \            orthonormal_vec[:,col]=vectors[:,col]\n        tr=0.0\n        #\
    \ Finally we calculate $\\frac{|w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\\
    rangle |v_i\\rangle}{|||w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\\
    rangle |v_i\\rangle||}$\n        for row in range(0,vectors.shape[0]):\n     \
    \       tr=tr+(orthonormal_vec[row,col]*orthonormal_vec[row,col])\n        orthonormal_vec[:,col]=orthonormal_vec[:,col]/np.sqrt(tr)\n\
    \n    return orthonormal_vec\n```\n\n## 示例\n\n在此示例中，我们对矩阵 $A$ 进行格拉姆-施密特正交化，其列是线性无关的非正交向量。\n\
    \n$$A = \\begin{pmatrix} 1 & 2 & 3 & 4 \\\\ 2 & 33 & 4 & 5 \\\\ 3 & 4 & 53 & 6\
    \ \\\\ 4 & 5 & 6 & 73 \\end{pmatrix}. \\tag{3.21}$$\n\n```python\nA=np.array([[1,2,3,4],[2,\
    \ 33, 4, 5],[3,4,53,6],[4,5,6,73]])\nB=linear_obj.gram_schmidt_ortho_rmatrix(A)\n\
    print(B)\n```\n\n上述代码打印正交矩阵，其列是正交归一化向量。\n\n```\n[[ 0.18257419 -0.04712082 -0.10008963\
