    # 2.11 Quantum state shift


    In this section, we develop a numerical function to evaluate the translational
    shift of a quantum state, spanned by the computational basis. The idea behind
    the translational shift of a quantum state is explained with the help of an example,
    consider a three-qubit quantum state which is written as follows,


    $|\psi\rangle = c_1|001\rangle + c_2|010\rangle + c_3|100\rangle$, (2.21)


    where $|c_1|^2 + |c_2|^2 + |c_3|^2 = 1$. The matrix representation of the above
    quantum state in the computational basis can be written as a $8 \times 1$ column
    vector as shown below.


    $|\psi\rangle = \begin{pmatrix} 0 \ c_1 \ c_2 \ 0 \ c_3 \ 0 \ 0 \ 0 \end{pmatrix}$.
    (2.22)


    The left and right translation operators are defined as follows, $\hat{T}_L$ and
    $\hat{T}_R$, respectively. The result on operating $\hat{T}_L$ on the quantum
    state written in Eq. [2.21] is shown below,


    $\hat{T}_L|\psi\rangle = |\psi_L\rangle = c_1|010\rangle + c_2|100\rangle + c_3|001\rangle$.
    (2.23)


    Similarly, on operating $\hat{T}_R$ on the quantum state written in Eq. [2.21],
    we obtain the following,


    $\hat{T}_R|\psi\rangle = |\psi_R\rangle = c_1|100\rangle + c_2|001\rangle + c_3|010\rangle$.
    (2.24)


    The matrix representation of the states $|\psi_L\rangle$ and $|\psi_R\rangle$
    are shown below,


    $|\psi_L\rangle = \begin{pmatrix} 0 \ c_3 \ c_1 \ 0 \ c_2 \ 0 \ 0 \ 0 \end{pmatrix}$,
    $|\psi_R\rangle = \begin{pmatrix} 0 \ c_2 \ c_3 \ 0 \ c_1 \ 0 \ 0 \ 0 \end{pmatrix}$.
    (2.25)


    For translating the quantum state left or right $k$ times, we have to operate
    $\hat{T}_L$ or $\hat{T}_R$, respectively, totally $k$ times in succession.'
