    \ | mu | 如果 dist = 'gaussian'，mu 是分布的均值；如果 distribution = 'uniform'，则不引用 mu |\n\
    | [in] | sigma | 如果 distribution = 'gaussian'，sigma 是分布的标准差；如果 distribution =\
    \ 'uniform'，则不引用 sigma |\n| [out] | smatrix | 它是变量 size 中指定维度的数组，是一个随机实对称矩阵 |\n\
    \n## 实现\n\n```\ndef random_symmetric_matrix(self,size,distribution=\"gaussian\"\
