- md: "## 5.3.3 Variants of concurrence\n\nThere are different variants of concurrence\
    \ in the entanglement literature as follows. $I$-concurrence [98] of any multi-qubit\
    \ pure state is defined as:\n\n$$C_I = \\sqrt{2(1 - Tr(\\rho_A^2))}, \\quad (5.12)$$\n\
    \nwhere $\\rho_A$ is the reduced density matrix of partition $A$. The example\
    \ of finding the $I$-concurrence for state $(|00\\rangle + |11\\rangle)/\\sqrt{2}$\
    \ is given below,\n\n```python\nimport numpy as np\nfrom QuantumInformation import\
    \ PartialTr as PT\nfrom QuantumInformation import GatesTools as GT\n\npobj=PT()\n\
    gtobj=GT()\n\n# Created the state, $(|00\\rangle + |11\\rangle)/\\sqrt{2}$\nstate=gtobj.bell3(2)\n\
    \n# Calculated the reduced density matrix, $\\rho_A$\nred_A=pobj.partial_trace_vec(state,[2])\n\
    \nI_conc=np.sqrt(2*(1-np.trace(np.matmul(red_A, red_A))))\n\n# Finally, calculating\
    \ $C_I = \\sqrt{2(1 - Tr(\\rho_A^2))}$\nprint(f\"The I-Concurrence value is =\
    \ {I_conc}\")\n```\n\nThe preceding code generates the following output.\n\nThe\
    \ I-Concurrence value is = 1.0000000000000002\n\nThere exists another type of\
    \ concurrence called the $N$-concurrence [99] which is defined as,\n\n$$C_N =\
    \ 2^{1-\\frac{N}{2}} \\sqrt{2^N - 2 - \\sum_i Tr(\\rho_i^2)}.$$\n\nThe example\
    \ of finding the $N$-concurrence for state $(|00\\rangle + |11\\rangle) / \\sqrt{2}$\
    \ is given below,\n\n```python\nimport numpy as np\nfrom QuantumInformation import\
    \ PartialTr as PT\nfrom QuantumInformation import GatesTools as GT\n\npobj=PT()\n\
    gtobj=GT()\n\nN=2\n# Created the state, $(|00\\rangle + |11\\rangle) / \\sqrt{2}$\n\
    state=gtobj.bell3(N)\n\nsumtr=0.0\n# Calculating the value, $\\sum_i Tr(\\rho_i^2)$\n\
    for i in range(1,N+1):\n    red_i = pobj.partial_trace_vec(state,[i])\n    sumtr\
    \ = sumtr+np.trace(np.matmul(red_i,red_i))\n\n# Finally, calculating the $C_N\
    \ = 2^{1-\\frac{N}{2}} \\sqrt{2^N - 2 - \\sum_i Tr(\\rho_i^2)}$.\nN_conc = 2**(1-(N/2))*np.sqrt(2**N-2-sumtr)\n\
    \nprint(f\"The N-Concurrence value is = {N_conc}\")\n```\n\nThe preceding code\
    \ generates the following output.\n\nThe N-Concurrence value is = 1.0000000000000002\n\
    \n## 5.4 Block entropy\n\nConsider a two-qubit pure state density matrix $\\rho^{AB}$,\
    \ where $A$ and $B$ are the two subsystems. The von Neumann [24, 100] entropy\
    \ for the pure state $\\rho^{AB}$ is defined as follows,\n\n$$S\\left(\\rho^{AB}\\\
    right) = -Tr\\left(\\rho^A \\log_2 \\rho^A\\right) = -Tr\\left(\\rho^B \\log_2\
    \ \\rho^B\\right),$$\n\nwhere $\\rho^A$ and $\\rho^B$ are the reduced density\
    \ matrices of the subsystems $A$ and $B$, respectively. Eq. [5.14] holds true\
    \ because of Schmidt decomposition [101], which states that non-zero eigenvalues\
    \ of the reduced density matrix $\\rho^A$ are equal to non-zero eigenvalues of\
    \ reduced density matrix $\\rho^B$, if the composite state of the bipartite split\
    \ is a pure state. Eq. [5.14] can also be written as,\n\n$$S\\left(\\rho^{AB}\\\
    right) = -\\sum_{i=1}^2 \\lambda_i \\log_2 (\\lambda_i),$$\n\nwhere $\\lambda_i$'s\
    \ are the eigenvalues of the reduced density matrix $\\rho^B$ (or $\\rho^A$),\
    \ and we define $0 \\log_2 0 \\equiv 0$. The entanglement content of a pure state\
    \ is expressed in terms of the reduced density matrices of the subsystems. The\
    \ loss of information or ignorance in the state of the subsystem even though the\
    \ whole system may be completely known is quantified in terms of entropy.\n\n\
    For a multi-qubit pure state, the entanglement between two blocks of spins is\
    \ calculated by block entropy [102]. In Fig. (5.4), we have $N$ spins of a multi-qubit\
    \ pure state and we calculate the entanglement between $L$ ($L < N$) and $N -\
    \ L$ block of spins. The block entropy gives the entanglement between these two\
    \ blocks of spins as follows,\n\n$$S(\\rho_L) = -\\sum_{i=1}^{d_L} \\lambda_i\
    \ \\log_2 \\lambda_i. \\tag{5.16}$$\n\nwhere $\\lambda_i$ are the eigenvalues\
    \ of the reduced density matrix $\\rho_L = tr_{L+1,\\dots,N}(\\rho)$, and $d_L$\
    \ is the Hilbert space dimension of the reduced density matrix $\\rho_L$. Note\
    \ that Eq. [5.16] is a concave function. Now we will find the upper bound of the\
    \ block entropy, and to this end, we rewrite the Eq. [5.16] as follows by absorbing\
    \ the negative sign inside,\n\n$$S(\\rho_L) = \\sum_{i=1}^{d_L} \\lambda_i \\\
    log_2 \\frac{1}{\\lambda_i}. \\tag{5.17}$$\n\nBy using the definition of concave\
    \ function, the above equation transform into the following inequality,\n\n$$S(\\\
    rho_L) = \\sum_{i=1}^{d_L} \\lambda_i \\log_2 \\frac{1}{\\lambda_i} \\leq \\log_2\
    \ \\left( \\sum_{i=1}^{d_L} \\lambda_i \\frac{1}{\\lambda_i} \\right), \\tag{5.18}$$\n\
    $$S(\\rho_L) \\leq \\log_2(d_L). \\tag{5.19}$$\n\nThe equality in Eq. [5.19] holds\
    \ true only in the case when all $\\lambda_i$'s are equal to $1/d_L$, and it is\
    \ only possible when the state is a maximally mixed state, $\\mathbb{I}/d_L$.\
    \ The upper and lower bound of block entropy can be simply written as,\n\n$$0\
    \ \\leq S(\\rho_L) \\leq \\log_2(d_L). \\tag{5.20}$$\n\n$S(\\rho_L)$ is equal\
    \ to zero when $\\rho_L$ is a pure state (where all the $\\lambda_i$'s are zero\
    \ except any one of the $\\lambda_i$ value which is equal to 1).\n\n### 5.4.1\
    \ For a real or complex state\n\n```python\nblock_entropy_vec(state, sub_tr, eps=10**(-13))\n\
    ```\n\n### Parameters\n\n| In/Out | Argument | Description |\n| :--- | :--- |\
    \ :--- |\n| [in] | state | It is a real or complex array of dimension (0:2^N-1),\
    \ which is the input state |\n| [in] | sub_tr | It is a list of numbers designating\
    \ the particular subsystems not to be traced out. The list can store any natural\
    \ number between 1 and N |\n| [in] | eps | If the magnitude of any of the eigenvalues\
    \ of ρ_A is less than eps, then that particular value will be considered equal\
    \ to zero. The default value is equal to 10^-13 |\n| [out] | Bent | It returns\
    \ the value of block entropy |\n\n### Implementation\n\n```python\ndef block_entropy_vec(self,state,sub_tr,eps=10**(-13)):\n\
    \    \"\"\"\n    Calculation of block entropy for a quantum state\n    Parameters\n\
    \        state : Real or complex state\n        sub_tr: List of numbers designating\
    \ the particular subsystems\n                not to be traced out.\n        eps\
    \ : Below the eps value the eigenvalues will be considered zero.\n           \
    \   The default is 10**(-13).\n\n    Returns\n        Bent: Block entropy value\n\
    \    \"\"\"\n    # Storing the data type of the state |ψ⟩\n    typestate=str(state.dtype)\n\
    \    # Calculating the reduced density matrix ρ_L\n    rdm= self.partial_trace_vec(state,sub_tr)\n\
    \    # If |ψ⟩ is complex then IF cond. is true\n    if re.findall(\"^complex\"\
    ,typestate):\n        # Diagonalizing ρ_L\n        w,v,info=la.zheev(rdm)\n  \
    \  # If |ψ⟩ is real then ELSE cond. is true\n    else:\n        # Diagonalizing\
    \ ρ_L\n        w,v,info=la.dsyev(rdm)\n    wlen=len(w)\n    Bent=0.0\n    # Finally\
    \ calculating S(ρ_L) = -∑_{i=1}^{d_L} λ_i log_2 λ_i\n    for x in range(0,wlen):\n\
    \        if abs(w.item(x))<eps:\n            w[x]=0.000000000000000\n        else:\n\
    \            assert w.item(x) > 0.0, \"The density matrix entered is not correct\
    \ as the eigenvalues are negative\"\n            Bent=Bent-(w.item(x)*math.log(w.item(x),2))\n\
    \    return(Bent)\n```\n\n### Example\n\nIn this example, we are finding the value\
    \ of the block entropy between the blocks 135 and 246 of the six-qubit real state\
    \ $|\\psi_2\\rangle$.\n\n```python\nfrom QuantumInformation import QuantumMechanics\
    \ as QM\nqobj=QM()\n# state2 will be storing $|\\psi_2\\rangle$\nstate2=np.zeros([2**6],dtype='float64')\n\
    for i in range(0,state2.shape[0]):\n    state2[i]=i+1\nstate2=qobj.normalization_vec(state2)\n\
    sub_tr=[1,3,5]\n# Calculating block entropy $S(\\rho_{135})$\nbent=entobj.block_entropy_vec(state2,sub_tr)\n\
    print(bent)\n```\n\nThe preceding code prints the required value of block entropy.\n\
    \n0.07835081818130613\n\nSimilarly, we find the value of block entropy between\
    \ the blocks 135 and 246 of the six-qubit complex state $|\\psi_3\\rangle$.\n\n\
    ```python\nfrom QuantumInformation import QuantumMechanics as QM\nqobj=QM()\n\
    # state2 will be storing $|\\psi_3\\rangle$\nstate2=np.zeros([2**6],dtype=np.complex_)\n\
    for i in range(0,state2.shape[0]):\n    state2[i]=complex(i,i+1)\nstate2=qobj.normalization_vec(state2)\n\
    sub_tr=[1,3,5]\n# Calculating block entropy $S(\\rho_{135})$\nbent=entobj.block_entropy_vec(state2,sub_tr)\n\
    print(bent)\n```\n\nThe preceding code prints the required value of block entropy.\n\
    \n0.08141948096557698\n\n### 5.4.2 For a real or complex density matrix\n\n```python\n\
    block_entropy_den(state,sub_tr,eps=10**(-13))\n```"
