    \ matrix is a random matrix with the elements chosen from an independent and identically\
    \ distributed random variables chosen from the normal distribution $\\mathcal{N}(0,\
    \ 1)$.\n\n```\nrandom_real_ginibre(N)\n```\n\n# Parameters\n\n| In/Out | Argument\
    \ | Description |\n| :--- | :--- | :--- |\n| [in] | N | It is the dimension (N×N)\
    \ of the output matrix |\n| [out] | state | It is the array holding the real Ginibre\
    \ matrix |\n\n# Implementation\n\n```\ndef random_real_ginibre(self,N):\n    \"\
    \"\"\n    Construct a real Ginibre matrix\n    Input:\n        N: dimension of\
    \ the NxN Ginibre matrix\n    Output:\n        real ginibre matrix\n    \"\"\"\
    \n    return np.random.normal(0.0, 1.0, size= (N,N))\n```\n\n# Example\n\n```\n\
    random_ginibre=qobj.random_real_ginibre(2)\n```\n\nIn the above example, random_ginibre\
    \ is the 2 × 2 required real Ginibre matrix."
