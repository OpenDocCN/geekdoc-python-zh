  md: '# 6.4 The Dzyaloshinskii-Moriya interaction


    The magnetic interactions between magnetic ions in a solid depend on numerous
    factors like neighbouring ions, temperature, external fields, etc. In some cases
    to describe the system one uses Hamiltonian involving simultaneous interaction
    between several spins also. Apart from the weak direct exchange coupling involving
    the dot product of the nearest neighbour spin operators $\vec{\sigma}_i.\vec{\sigma}_{i+1}$
    in the Hamiltonian as discussed earlier in Section [6.3], there is, however, a
    small antisymmetric part due to the $L-S$ coupling between the spins or ions at
    site $i$ and $i+1$. This favours spin canting (a tilt between the spins near to
    zero temperature), which we call an indirect coupling. It is interesting to note
    that this exists in a number of ionic solids, by which the short ranged exchange
    interaction between two non-neighbouring magnetic ions is mediated by a non-magnetic
    ion that resides between them in a phenomena similar to the Anderson super exchange
    [134]. This indirect coupling part of the Hamiltonian is called the Dzyaloshinskii-Moriya
    (DM) interaction [135, 136]. The Hamiltonian of the DM interaction is given by,


    $$H = \sum_{i=1}^{N} \vec{D}.\vec{\sigma}_i \times \vec{\sigma}_{i+1}, \quad (6.22)$$


    where $\vec{D} = (D_x, D_y, D_z)$ is the DM vector, whose components specify the
    coupling parameter of the DM interaction in the $X, Y, Z$ directions, respectively,
    $N$ is the total number of spins or qubits. Note that for the DM interaction between
    spins at sites $i$ and $i+1$, the vector $D$ is orthogonal to both the spins.
    That is, if the two interacting spins are lying in the plane of this book, then
    the DM vector is along the direction either into or out of the plane containing
    book. This cross product term as given in Eq. [6.22] is also related to what is
    known as the Heisenberg spin current [137]. Since the interaction is antisymmetric,
    the above Hamiltonian involves a cross product. We can recast Eq. [6.22] as,


    $$H = \sum_{i=1}^{N} \begin{vmatrix} D_x & D_y & D_z \ \sigma_i^x & \sigma_i^y
    & \sigma_i^z \ \sigma_{i+1}^x & \sigma_{i+1}^y & \sigma_{i+1}^z \end{vmatrix}.
    \quad (6.23)$$


    By expanding the determinant in equation Eq. [6.23] we get,


    $$H = \sum_{i=1}^{N} [D_x(\sigma_i^y \sigma_{i+1}^z - \sigma_i^z \sigma_{i+1}^y)
    + D_y(\sigma_i^z \sigma_{i+1}^x - \sigma_i^x \sigma_{i+1}^z) + D_z(\sigma_i^x
    \sigma_{i+1}^y - \sigma_i^y \sigma_{i+1}^x)]. \quad (6.24)$$


    We give the recipes for constructing these three terms in the Hamiltonian separately.
    The above formalism of antisymmetric exchange can be faithfully extended to $r$
    nearest neighbours also and in fact the recipes we give involve DM interaction
    between the spin at the site $i$ and the spin at site the $i+r$ as


    $$H = \sum_{i=1}^{N} [D_{rx}^i(\sigma_i^y \sigma_{i+r}^z - \sigma_i^z \sigma_{i+r}^y)
    + D_{ry}^i(\sigma_i^z \sigma_{i+r}^x - \sigma_i^x \sigma_{i+r}^z) + D_{rz}^i(\sigma_i^x
    \sigma_{i+r}^y - \sigma_i^y \sigma_{i+r}^x)]. \quad (6.25)$$


    Also note that to accommodate the random couplings between $i^{th}$ and $(i+r)^{th}$
    spins, we make the components of $\vec{D}$ random by introducing the superscript
    $i$. It is noteworthy to'
