  md: "# 3.8 Gram-Schmidt orthogonalization\n\nLet there be a linearly independent\
    \ non-orthogonal basis set $|w\\rangle : \\{|w_1\\rangle, |w_2\\rangle, \\cdots,\
    \ |w_m\\rangle\\}$ (i.e. $\\langle w_i|w_j\\rangle \\neq \\delta_{ij}$) in some\
    \ vector space $V$ where an inner product is defined. There is a useful method\
    \ known as “Gram-Schmidt” procedure [24, 36, 37], which can be used to generate\
    \ a set of orthonormal vectors $|v\\rangle : \\{|v_1\\rangle, |v_2\\rangle, \\\
    cdots, |v_m\\rangle\\}$ from the non-orthonormal set $|w\\rangle$. Define initially,\n\
    \n$$|v_1\\rangle = \\frac{|w_1\\rangle}{||w_1\\rangle||}. \\tag{3.19}$$\n\nFor\
    \ $1 \\leq k \\leq m - 1$ define $|v_{k+1}\\rangle$ inductively by,\n\n$$|v_{k+1}\\\
    rangle \\equiv \\frac{|w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\\
    rangle|v_i\\rangle}{|||w_{k+1}\\rangle - \\sum_{i=1}^k \\langle v_i|w_{k+1}\\\
    rangle|v_i\\rangle||}. \\tag{3.20}$$\n\nThe Gram-Schmidt orthogonalization procedure\
    \ proves to be very helpful in context to quantum mechanical observable (Hermitian\
    \ operator), which contains degenerate eigenvalues. The eigenvectors of the degenerate\
    \ eigenvalues are not necessarily to be orthogonal to each other. However, non-degenerate\
    \ eigenvectors are orthogonal to each other. To transform the complete eigenvectors\
    \ into orthonormal eigenvectors, we perform the Gram-Schmidt orthogonalization.\
    \ This transformation is not a unitary transformation of the eigenbasis.\n\n#\
    \ 3.8.1 For real vectors\n\n```\ngram_schmidt_ortho_rmatrix(vectors)\n```\n\n\
    # Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- | :--- |\n\
    | [in] | vectors | It is a real array of dimension (0:n-1,0:k-1), whose columns\
    \ are the linearly independent non-orthonormal set of vectors |\n| [out] | orthonormal_vec\
    \ | It is a real array of dimension (0:n-1,0:k-1), which stores the k vectors\
    \ as columns of dimension n which are the orthonormalized set of vectors |\n\n\
    # Implementation\n\n```\ndef gram_schmidt_ortho_rmatrix(self,vectors):\n    \"\
    \"\"\n    Orthornormal set of real vectors are calculated\n    Attributes:\n \
    \       vectors: A matrix whose columns are non-orthogonal set real vectors\n\
    \    Return:\n        orthonormal_vec: A matrix whose columns are orthonormal\
    \ to each other\n    \"\"\"\n```"
  merge: -1
