    \ 0 \\\\ 0 \\\\ 0 \\end{pmatrix}$。 (2.22)\n\n左移和右移算符分别定义为 $\\hat{T}_L$ 和 $\\hat{T}_R$。将\
    \ $\\hat{T}_L$ 作用于式 [2.21] 所写的量子态，结果如下，\n\n$\\hat{T}_L|\\psi\\rangle = |\\psi_L\\\
