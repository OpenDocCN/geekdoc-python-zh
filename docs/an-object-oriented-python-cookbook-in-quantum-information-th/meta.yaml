    \ for conditional statements are given below.\n\n# 1.4.1 The if statement\n\n\
    The body of the if statement starts with an indentation, and the first unindented\
    \ line marks the end. The generic if statement is written as,\n\n```\nif <test_expression>:\n\
    \    <body of if>\n```\n\nIf the condition <test_expression> holds true then the\
    \ body of the if statement (<body of if>) gets executed. An example of the above\
    \ syntax is given below:\n\n```\n# Coefficients of quadratic equation, $ax^2 +\
    \ bx + c = 0$\na=5\nb=6\nc=1\n# The discriminant is defined as, $b^2 - 4ac$\n\
    d=(b**2)-(4*a*c)\nif d > 0:\n    print(\"Roots are real and distinct\")\n```\n\
    \nWhich will print the output as,\n\n```\nRoots are real and distinct\n```\n\n\
    # 1.4.2 The if else statement\n\nThe generic if else statement is written as,\n\
    \n```\nif <test_expression>:\n    <body of if>\nelse:\n    <body of else>\nend\
    \ if\n```\n\nIf the condition <test_expression> holds true then the body of the\
    \ if statement (<body of if>) gets executed, otherwise the body of the else statement\
    \ (<body of else>) is executed. An example of the above syntax is given below,\n\
    \n```\n# Coefficients of quadratic equation, $ax^2 + bx + c = 0$\na=5\nb=2\nc=1\n\
    # The discriminant is defined as, $b^2 - 4ac$\nd=(b**2)-(4*a*c)\nif d > 0:\n```"
