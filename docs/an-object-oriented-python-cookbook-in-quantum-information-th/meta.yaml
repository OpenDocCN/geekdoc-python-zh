  md: '# 6.4.4 An Illustrative example of constructing a combination Hamiltonian


    Let us see how to construct a combination Hamiltonian which involves the Hamiltonian
    of the Heisenberg model with DM interaction. In the following example, we have
    chosen the direction of the DM vector to be along $Z$.


    $$H = J \sum_{i=1}^{N} \vec{\sigma}_i \cdot \vec{\sigma}_{i+1} + D_z \sum_{i=1}^{N}
    (\sigma_i^x \sigma_{i+1}^y - \sigma_i^y \sigma_{i+1}^x). \quad (6.29)$$


    Using our codes in this chapter, we can construct the above Hamiltonian as follows.
    We have taken the example of $N = 3$, $J = 1$, $D_z = 1$ and $r = 1$ under PBC.


    ```

    hamz=hamobj.dm_zham(3)

    ham_hie=hamobj.heisenberg_hamiltonian(3)

    ham=ham_hie+hamz

    ```


    In the above program, the variable ‘ham’ contains the required Hamiltonian matrix.'
