    \                       k1=k1-N\n                    col2=col.copy()\n       \
    \             col2[k]=1-col2[k]\n                    col2[k1]=1-col2[k1]\n   \
    \                 dec=qobj.binary_decimal(col2)\n                    if dec==i:\n\
    \                        inn=1\n                    else:\n                  \
    \      inn=0\n                    ham[i,j]=ham[i,j]+(inn*jx[k])\n    return ham\n\
    ```\n\n## 示例\n\n在此示例中，我们正在寻找在 $X$ 方向具有周期性边界条件的自旋-自旋均匀相互作用（$J_r=(1,1,1)$）的哈密顿量。\n\
