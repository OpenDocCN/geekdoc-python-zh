    vdots \\\\ A_{m1}B & A_{m2}B & \\cdots & A_{mn}B \\end{pmatrix}_{mp \\times nq}.$$\n\
    \n请注意，矩阵 $A$ 的每个元素都与整个矩阵 $B$ 进行代数乘法。当我们处理多个相同或不同的物理系统，并寻找表示这些系统的量子态时，克罗内克积非常有用。例如，任何通用的单量子比特系统都可以由状态\
    \ $|\\phi\\rangle = \\alpha|0\\rangle + \\beta|1\\rangle$ 表示，现在，如果我们需要找到对应于两个单量子比特状态的双量子比特状态\
