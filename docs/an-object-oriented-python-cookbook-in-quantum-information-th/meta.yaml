    \  1.2644326 -0.59412461j]]\n```\n\n# 3.3 Power of a matrix\n\nConsider a square\
    \ matrix $A$ and positive number $k$, the $k^{th}$ power of the matrix $A$ is\
    \ defined as follows $A^k$. If the inverse of the matrix $A$ exist, then $A^{-k}$\
    \ can be calculated. The power of a square matrix $A$ can be found using the spectral\
    \ theorem as follows. Let us consider that the matrix $A$ is diagonalizable with\
    \ matrix $D$ containing the eigenvalues of $A$ along main diagonal, that is $D\
    \ = P^{-1}AP$, this implies $A = PDP^{-1}$. Multiplying these equations $k$ times\
    \ and using the fact that $PP^{-1} = P^{-1}P = \\mathbb{I}$, we can see that,\n\
    \n$$A^k = PD^kP^{-1}. \\tag{3.14}$$\n\nNote that in the above equations if $A$\
    \ is a Hermitian matrix, $A^k = UD^kU^\\dagger$, where $U$ is a unitary matrix.\
    \ Using Eq. [3.14], we can also calculate power of the matrix $A^{k'}$, where\
    \ $k'$ is a irrational number.\n\n# 3.3.1 For a real symmetric matrix\n\n```\n\
    power_smatrix(mat1,k,precision=10**(-10))\n```\n\n# Parameters\n\n| in/out | Argument\
    \ | Description |\n|---|---|---|\n| [in/out] | mat1 | mat1 is a real array of\
    \ dimension (0:n-1,0:n-1) |\n| [in] | k | k is the power to which matrix A is\
    \ raised |\n| [in] | precision | If the absolute value of any eigenvalues of mat1\
    \ is below precision, then it will consider those particular eigenvalues to zero.\
    \ The default value is $10^{-10}$ |\n| [out] | B | B is a complex or real array\
    \ of dimension (0:n-1,0:n-1), which will store the $k^{th}$ power of matrix mat1\
    \ |"
