    # 4.1 Frequently used quantum gates


    Quantum gates are important elements in a quantum computing algorithm. In a quantum
    circuit, the quantum logic gate is a rudimentary part of the quantum circuit that
    performs operations on a finite number of qubits. In contrast to classical logic
    gates, the quantum logic gates are reversible. Quantum logic gates manifest themselves
    as unitary matrices and'
