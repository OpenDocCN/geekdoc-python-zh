    where $\lambda_i$''s are the eigenvalues of the reduced density matrix $\rho^B$
    (or $\rho^A$), and we define $0 \log_2 0 \equiv 0$. The entanglement content of
    a pure state is expressed in terms of the reduced density matrices of the subsystems.
    The loss of information or ignorance in the state of the subsystem even though
    the whole system may be completely known is quantified in terms of entropy.


    For a multi-qubit pure state, the entanglement between two blocks of spins is
    calculated by block entropy [102]. In Fig. (5.4), we have $N$ spins of a multi-qubit
    pure state and we calculate the entanglement between $L$ ($L < N$) and $N - L$
    block of spins. The block entropy gives the entanglement between these two blocks
    of spins as follows,


    $$S(\rho_L) = -\sum_{i=1}^{d_L} \lambda_i \log_2 \lambda_i. \tag{5.16}$$


    where $\lambda_i$ are the eigenvalues of the reduced density matrix $\rho_L =
    tr_{L+1,\dots,N}(\rho)$, and $d_L$ is the Hilbert space dimension of the reduced
    density matrix $\rho_L$. Note that Eq. [5.16] is a concave function. Now we will
    find the upper bound of the block entropy, and to this end, we rewrite the Eq.
    [5.16] as follows by absorbing the negative sign inside,


    $$S(\rho_L) = \sum_{i=1}^{d_L} \lambda_i \log_2 \frac{1}{\lambda_i}. \tag{5.17}$$


    By using the definition of concave function, the above equation transform into
    the following


    ![](img/399db50605732b77c027490148680903_176_0.png)


    inequality,


    $$S(\rho_L) = \sum_{i=1}^{d_L} \lambda_i \log_2 \frac{1}{\lambda_i} \leq \log_2
    \left( \sum_{i=1}^{d_L} \lambda_i \frac{1}{\lambda_i} \right), \tag{5.18}$$

    $$S(\rho_L) \leq \log_2(d_L). \tag{5.19}$$


    The equality in Eq. [5.19] holds true only in the case when all $\lambda_i$''s
    are equal to $1/d_L$, and it is only possible when the state is a maximally mixed
    state, $\mathbb{I}/d_L$. The upper and lower bound of block entropy can be simply
    written as,


    $$0 \leq S(\rho_L) \leq \log_2(d_L). \tag{5.20}$$


    $S(\rho_L)$ is equal to zero when $\rho_L$ is a pure state (where all the $\lambda_i$''s
    are zero except any one of the $\lambda_i$ value which is equal to 1).


