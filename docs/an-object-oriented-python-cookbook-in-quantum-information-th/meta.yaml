  md: "# Parameters\n\n| in/out | Argument | Description |\n| :--- | :--- | :--- |\n\
    | [in] | i | decimal number for which binary equivalent to be calculated |\n|\
    \ [in] | N | number of the binary string |\n| [out] | vec | binary equivalent\
    \ of the decimal number i |\n\n# Implementation\n\n```\ndef decimal_binary(self,i,N):\n\
    \    \"\"\"\n    Decimal to binary conversion\n    Inputs:\n        i: decimal\
    \ number for which binary equivalent to be calculated\n        N: length of the\
    \ binary string\n    Returns:\n        bnum: binary number equivalent to i, it\
    \ is column matrix.\n    \"\"\"\n    bnum=np.zeros([N],dtype=int)\n    for j in\
    \ range(0,N):\n        bnum[bnum.shape[0]-1-j]=i%2\n        i=int(i/2)\n    return\
    \ bnum\n```\n\n# Example\n\nIn this example we are converting the integer 10 into\
    \ a binary string number.\n\n```\ndec=10\n# 4 string\nvec=quantum_obj.decimal_binary(dec,4)\n\
    print(\"The four binary string of 10\")\nprint(vec)\n# 6 string\nvec2=quantum_obj.decimal_binary(dec,6)\n\
    print(\"The six binary string of 10\")\nprint(vec2)\n```\n\nThe above code prints\
    \ the output of the binary equivalent of 10.\n\n```\nThe four binary string of\
    \ 10\n[1 0 1 0]\nThe six binary string of 10\n[0 0 1 0 1 0]\n```"
