    \n```\n[0.25+0.j 0.25-0.25j 0.5 +0.75j]\n```\n\n## 2.4 Outer product of a vector\n\
    \nIf we have two vectors $|v\\rangle$ and $|w\\rangle$ of dimensions $n_1$ and\
