    ```\n\n## 6.4.4 An Illustrative example of constructing a combination Hamiltonian\n\
    \nLet us see how to construct a combination Hamiltonian which involves the Hamiltonian\
    \ of the Heisenberg model with DM interaction. In the following example, we have\
    \ chosen the direction of the DM vector to be along $Z$.\n\n$$H = J \\sum_{i=1}^{N}\
    \ \\vec{\\sigma}_i \\cdot \\vec{\\sigma}_{i+1} + D_z \\sum_{i=1}^{N} (\\sigma_i^x\
    \ \\sigma_{i+1}^y - \\sigma_i^y \\sigma_{i+1}^x). \\quad (6.29)$$\n\nUsing our\
    \ codes in this chapter, we can construct the above Hamiltonian as follows. We\
    \ have taken the example of $N = 3$, $J = 1$, $D_z = 1$ and $r = 1$ under PBC.\n\
    \n```\nhamz=hamobj.dm_zham(3)\nham_hie=hamobj.heisenberg_hamiltonian(3)\nham=ham_hie+hamz\n\
    ```\n\nIn the above program, the variable ‘ham’ contains the required Hamiltonian\
    \ matrix.\n\n![](img/399db50605732b77c027490148680903_236_0.png)\n\n# Taylor &\
    \ Francis\n\nTaylor & Francis Group\n\nhttp://taylorandfrancis.com\n\n## 7 Generating\
    \ Random Matrices and Random Vectors\n\nIn this chapter we give the numerical\
    \ recipes to construct random numbers following a particular distribution and\
    \ also construct random states and density matrices, here we have used the Gaussian\
    \ and the uniform distribution. These are the most important distributions used\
    \ in constructing random quantum states [138] as we progress through the chapter.\
    \ Moreover, there are recipes to construct random matrices which occur in random\
    \ matrix theory [139–141] and boderlining areas of quantum information. At the\
    \ end of the chapter, recipes to construct the random density matrix are also\
    \ given which will be very useful for people working on random quantum mixed states\
    \ [142, 143]. The examples indicating the output using these recipes are not given\
    \ for a specific reason that everytime the user prints an output, it will be different\
    \ as they are from random processes. In this chapter we will be primarily discussing\
    \ the class, **QRandom**. The class is written inside the Python module **chap7_randommatrix.py**.\
    \ The class **QRandom** contains all the methods pertaining to generating random\
    \ matrices from the uniform and Gaussian distribution. To import the class and\
    \ create its objects, you have to write the following code,\n\n```\n# Importing\
    \ the QRandom class\nfrom QuantumInformation import QRandom\n\n# Instantiate the\
    \ object of the QRandom class\nqrobj=QRandom()\n```\n\n### 7.1 Random number generator\
    \ for Gaussian distribution\n\nThe probability density function for a Gaussian\
    \ distribution is given by,\n\n$$f(x) = \\frac{1}{\\sigma\\sqrt{2\\pi}} e^{-\\\
    frac{1}{2}\\left(\\frac{x-\\mu}{\\sigma}\\right)^2} = \\mathcal{N}(\\mu, \\sigma^2),$$\n\
    \nwhere $\\mu$, $\\sigma^2$ are the mean and variance of the probability distribution,\
    \ respectively. In Python, we use Numpy’s random number routine to generate numbers\
    \ from uniform or Gaussian distribution.\n\n### 7.1.1 For a real random matrix\
    \ whose elements are chosen from the Gaussian distribution\n\n```\nrandom_gaussian_rvec(tup,mu=0,sigma=1)\n\
    ```"
