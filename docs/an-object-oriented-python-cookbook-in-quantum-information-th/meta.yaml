  md: "# Implementation\n\n```\ndef sx(self,N=1):\n    \"\"\"\n    Construct N-qubit\
    \ Pauli spin matrix sigma_x\n    Inputs:\n        N: number of spins\n    Output:\n\
    \        sigmax: It stores the Pauli spin matrix sx\n    \"\"\"\n    sigmax=np.zeros([2**N,2**N])\n\
    \    j=(2**N)-1\n    for i in range(0,2**N):\n        sigmax[i,j]=1\n        j=j-1\n\
    \    return sigmax\n```\n\n# Example\n\nIn the following example, we construct\
