    # Import, plot and show [On Interpreter]

    >>> **import matplotlib.pyplot as plt**

    # To create the plot >>> **plt.plot()**

    # For display >>> **plt.show()**

    # See Directory, ask for help # See the directory

    >>> **dir(plt)**

    # Help over plot() function >>> **help(plt.plot)**

    # Simple plot

    ```'
