    \ are taken from NumPy whereas the methods `type()`, `len()`, `sum()` are taken\
    \ from built-in module in core Python, all of these are basically functions.\n\
    \n### 8.1.3 Higher Dimensional Arrays\n\n#### 2D array\n\n```python\n>>> M = np.array([[1,\
    \ 2, 3], [4, 5, 6]])\n>>> M\narray([[1, 2, 3],\n       [4, 5, 6]])\n# [The display\
    \ is like a Matrix with 2 rows and 3 columns.]\n\n>>> M.ndim\n2\n\n>>> M.size\n\
    6\n\n>>> M.shape\n(2, 3)\n# [Shape of the 2D array as a tuple]\n```\n\n**Note:**\
    \ One could also write `np.array([(1, 2, 3),(4, 5, 6)])`, the argument as list\
    \ of tuples or `np.array(((1, 2, 3),(4, 5, 6)))`, the argument as tuple of tuples.\n\
    \n#### Axes\n\nOn a 2D array, we can go along rows and columns.\nIf we go through\
    \ different rows (up-down) it is\n\n![](img/a1e407e9a2dd6440cb0c413013408aa5_159_0.png)\n\
    \nalong **axis = 0** and that through different columns (left-right) is **axis\
    \ = 1**. We can refer elements or apply methods on higher dimensional NumPy arrays\
    \ through axes.\n\n#### 3D array\n\n```python\n>>> D = np.array([[[1, 2], [3,\
    \ 4]],\n                  [[5, 6], [7, 8]]])\n>>> D\narray([[[1, 2],\n       \
    \ [3, 4]],\n       [[5, 6],\n        [7, 8]]])\n# [Collection of two 2 × 2 arrays]\n\
    \n>>> D.ndim\n3\n\n>>> D.shape\n(2, 2, 2)\n```\n\n**Note:** A 3D array is like\
    \ a box (or container) which contains 2D arrays (or matrices). The axes of a 3D\
    \ array are shown in the adjacent\n\n![](img/a1e407e9a2dd6440cb0c413013408aa5_160_0.png)\n\
    \nfigure. The axis = 0, 1 are along two directions on the shaded plane (which\
    \ is a 2D array) and the axis = 2 is perpendicular to that plane.\n\n### 8.1.4\
    \ About Data Type\n\nData can be numbers or strings. The following data types\
    \ are used in arrays.\n\n- **int8** (1 byte = 8-bit: Integer -128 to 127), **int16**\
    \ (-32768 to 32767), **int32**, **int64**\n- **uint8** (unsigned integer: 0 to\
    \ 255), **uint16**, **uint32**, **uint64**\n- **float16** (half precision float:\
    \ sign bit, 5 bits exponent, 10 bits mantissa), **float32** (single precision:\
    \ sign bit, 8 bits exponent, 10 bits mantissa), **float64** (double precision:\
    \ sign bit, 11 bit exponent, 52 bits mantissa)\n- **complex64** (complex number,\
    \ represented by two 32-bit floats: real and imaginary components), **complex128**\
    \ (complex number, represented by two 64-bit floats: real and imaginary components)\n\
