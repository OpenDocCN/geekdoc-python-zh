- md: "## 5.1.5 List Creator\n\nIn Python 3, **range()** is a built-in object: range(start,\
    \ stop, step) creates integers from ‘start’ in step of ‘step’ and stops before\
    \ ‘stop’. The default start is 0 and default step size = 1. This object can be\
    \ converted into a list of integers.\n\n```python\n# Create list of integers\n\
    >>> x = range(2, 10, 3)\n>>> x\nrange(2, 10, 3)\n\n# Convert to list\n>>> list(x)\n\
    [2, 5, 8]\n>>> list(range(10, 0, -2))\n[10, 8, 6, 4, 2]\n\n# The step = 1 by default\n\
    >>> list(range(5, 10))\n[5, 6, 7, 8, 9]\n\n# Default start = 0 and step = 1\n\
    >>> list(range(5))\n[0, 1, 2, 3, 4]\n\n# Math operations inside\n>>> range(3*4\
    \ + 5)\nrange(0, 17)\n>>> range(10, 2)\nrange(10, 2)\n>>> list(range(10, 2))\n\
    []  # Empty list\n```\n\n**Note:** range() takes integer arguments only. To create\
    \ a list of floats or fractional numbers in core Python, we can take help of an\
    \ explicit for-loop or list comprehension method as described next.\n\n[In Python\
    \ 2, range() creates a list directly. But there is another object called xrange()\
    \ in Python 2 which is equivalent to range() in Python 3.]\n\n## 5.1.6 List Comprehension\n\
    \nVarious operations, applications of functions with loop and logical structures\
    \ can be embedded inside a list. One of the Python’s most distinctive features\
    \ is the **list comprehension**, which we can use to create powerful functionality\
    \ within a single line of code.\n\nExample # 1:\n\nSuppose, we have a list of\
    \ numbers and we are asked to generate another list from it where each item will\
    \ be the square of the corresponding items of the old list. How can we do that?\
    \ The usual way is to write a for-loop as follows.\n\n```python\nx = [1, 2, 3,\
    \ 4, 5]\ny = []  # Empty list to begin with\n\nfor i in x:\n    y.append(i**2)\
    \  # Appending\nprint(y)  # List of sq elements\n```\n\n```python\n# By List comprehension\n\
    >>> x = [1, 2, 3, 4, 5]\n\n# Loop inside List\n>>> y = [i**2 for i in x]\n>>>\
    \ y\n[1, 4, 9, 16, 25]\n```\n\n**Note:** The part of for-loop instruction: ‘**for\
    \ i in x**’ is now embedded in the list.\n\nExample # 2:\nFrom a list of positives\
    \ and negatives, create a list of absolute values of all the numbers.\n\n```python\n\
    >>> x = [-1, 2, -3, -4]\n>>> y = [abs(i) for i in x]\n>>> y\n[1, 2, 3, 4]\n```\n\
    \nExample #3:\n# List of θ-values (in radian)\n\n```python\n>>> from math import\
    \ sin, pi\n\n>>> theta = [i*pi/2 for i in range(4)]\n>>> theta\n[0.0, 1.5707963267948966,\
    \ 3.141592653589793, 4.71238898038469]\n```\n\n# List of sin θ-values from θ-list\n\
    \n```python\n>>> [sin(n) for n in theta]\n[0.0, 1.0, 1.2246467991473532e-16, -1.0]\n\
    ```\n\nExample #4:\nSeparate out positive numbers\n# With Logical if\n\n```python\n\
    >>> x = [-1, 0, 1, 2, -3, 5, -6]\n>>> [i for i in x if i > 0]\n[1, 2, 5]\n```\n\
    \nExample #5:\nSeparate out even numbers\n\n```python\n>>> L = [2, 9, 12, 23,\
    \ 46, 78, 45, 94]\n>>> [i for i in L if i%2 == 0]\n[2, 12, 46, 78, 94]\n```\n\n\
    Exercises:\n\n1. Create a list of 100 random numbers between -1 and +1 and then\
    \ create a list of only positive numbers out of it.\n2. Create a list of odd numbers\
    \ from the list of numbers: 12, 19, 91, 36, 39, 41, 11, 9, 103\n3. Create a list\
    \ of negative numbers from the list: -12, 91, -0.5, 0.9, 31, -102, 1.4, 23, 50,\n\
    \n## 5.1.7 Nested List\n\nThere can be lists inside a list. For example, consider\
    \ the following list: M = [[1, 2, 3], [4, 5, 6]], where M is a nested list. Now\
    \ M has two elements each of which is a list itself. But each of the elements\
    \ contain 3 elements in them. Let us try to check on interpreter.\n\n```python\n\
    >>> M = [[1, 2, 3], [4, 5, 6]]\n>>> len(M)\n2\n>>> M[0]  # Element with index\
    \ 0\n[1, 2, 3]\n>>> M[1]  # Element with index 1\n[4, 5, 6]\n>>> len(M[0])\n3\n\
    \n# Element with index 1 in M[0]\n>>> M[0][1]\n2\n\n# Element with index 2 in\
    \ M[1]\n>>> M[1][2]\n6\n```\n\nThe nested list **M** can be treated as a Matrix\
    \ with 2 rows and 3 columns.\n**M = [[1, 2, 3], [4, 5, 6]]**\n\n## 5.2 String\n\
    \nA string is anything (numbers, alphabets, symbols, spaces) that we put between\
    \ two quotes (single or double). The object string can be considered as a data\
    \ type. Note that in Python 3, any input that the computer takes through the input()\
    \ function is a string.\n\nA string, unlike a list, is **immutable**, *i.e.*,\
    \ we cannot alter it. We cannot add any element to a given string. We can slice\
    \ out a piece from a string but that is another string. The original string remains\
    \ unchanged.\n\n```python\n# String of digits\na = '123456'\n\n# String of letters,\
    \ with a space\nb = 'Python Program'\n\n# A string with mixed characters\nc =\
    \ 'A@23b%C08x'\n```\n\nIn the built-in module (__builtins__) there is an object\
    \ called str(). We may convert a collection of numbers or any other iterable into\
    \ a string by calling this function.\n\n```python\n>>> str(123)\n'123'\n>>> str([1,\
    \ 2, 3])\n'[1, 2, 3]'\n```\n\n# Iteration over a string\nString in Python is **iterable**\
    \ like a list. In the following, we run a for-loop over a string.\n\n```python\n\
    >>> for i in 'abc123': print(i, end = ' ')\na b c 1 2 3\n```\n\n## 5.2.1 Indexing\n\
    \nLet us consider the 'string'. Positions of the characters:\n**S t r i n g**\n\
    0 1 2 3 4 5\n-6 -5 -4 -3 -2 -1\n\n**Note:** The indexing or the positioning of\
    \ characters in a string is just like that of a list.\n\n```python\n>>> x = 'abcd1234'\n\
    \n# Character in position 2\n>>> x[2]\n'c'\n\n# Last character\n>>> x[-1]\n'4'\n\
    \n# Each character is a string itself\n>>> type(x[2])\n<class 'str'>\n```\n\n\
    ## 5.2.2 Slicing\n\n```python\n>>> x = 'abcd1234'\n\n>>> x[1:6:2]\n'bd2'\n[Start\
    \ = 1, Ends before 6, step = 2]\n\n>>> x[2: ]\n'cd1234'\n[From index position\
    \ 2 to end.]\n\n>>> x[ : 6]\n'abcd12'\n[0, 1, 2, 3, 4, 5 elements]\n\n>>> x[ :\
    \ -1]\n'abcd123'\n[From start, stops before end]\n\n>>> x[ : ]  # Complete string\n\
    'abcd1234'\n>>> x[: :]  # Complete string\n'abcd1234'\n>>> x[: : -1]\n'4321dcba'\n\
    [step = -1 makes it from right to left.]\n```\n\n**Note:** Slicing of a string\
    \ is also done in the same as with lists. In the last entry, the **step = -1**\
    \ is to reverse the string.\n\n# Application:\n\nGiven any string, find out if\
    \ it is *palindrome* or not. [A palindrome is a sequence which when reverted,\
    \ appears unchanged. For example, 123454321 is a palindrome number, and tattarrattattat\
    \ is a palindrome word.]\n\n```python\n# Python Script: Check palindrome\nx =\
    \ '62543253276277267235234526'\nif x == x[::-1]:\n    print('Palindrome')\nOutput:\
    \ Palindrome\n```\n\n## 5.2.3 Built-in Functions on string\n\n# Type\n\n```python\n\
    >>> x = 'abcd1234'\n>>> type(x)  # Type of the object\n<class 'str'>\n```\n\n\
    # Length (Size)\n\n```python\n>>> len(x)  # Length of the string\n8\n```\n\n#\
    \ Evaluate the string of digits\n\n```python\n>>> eval('234')\n234\n>>> eval('23.56')\n\
    23.56\n>>> eval('23 + 56')\n79\n[Evaluates the string of sum.]\n\n>>> int('234')\
    \  # For integer\n234\n>>> float('23.56')  # For float\n23.56\n```\n\n# Enumerate\n\
    \nThe built-in object **enumerate** works on an iterable (list, string or anything)\
    \ and returns an enumerate object, which is iterable. For a string, it creates\
    \ **index vs. string** characters."
  mdcn: "## 5.1.5 列表创建器\n\n在 Python 3 中，**range()** 是一个内置对象：`range(start, stop, step)`\
    \ 从 `start` 开始，以 `step` 为步长创建整数，并在 `stop` 之前停止。默认起始值为 0，默认步长为 1。该对象可以转换为整数列表。\n\
    \n```python\n# 创建整数列表\n>>> x = range(2, 10, 3)\n>>> x\nrange(2, 10, 3)\n\n# 转换为列表\n\
    >>> list(x)\n[2, 5, 8]\n>>> list(range(10, 0, -2))\n[10, 8, 6, 4, 2]\n\n# 默认步长\
    \ = 1\n>>> list(range(5, 10))\n[5, 6, 7, 8, 9]\n\n# 默认起始值 = 0，步长 = 1\n>>> list(range(5))\n\
    [0, 1, 2, 3, 4]\n\n# 内部可进行数学运算\n>>> range(3*4 + 5)\nrange(0, 17)\n>>> range(10,\
    \ 2)\nrange(10, 2)\n>>> list(range(10, 2))\n[]  # 空列表\n```\n\n**注意：** `range()`\
    \ 仅接受整数参数。要在核心 Python 中创建浮点数或分数列表，我们可以借助显式的 for 循环或接下来描述的列表推导式方法。\n\n[在 Python\
    \ 2 中，`range()` 直接创建一个列表。但 Python 2 中还有一个名为 `xrange()` 的对象，它等同于 Python 3 中的 `range()`。]\n\
    \n## 5.1.6 列表推导式\n\n各种操作、函数的应用以及循环和逻辑结构都可以嵌入到一个列表中。Python 最显著的特性之一就是**列表推导式**，我们可以用它在单行代码中创建强大的功能。\n\
    \n示例 # 1：\n\n假设我们有一个数字列表，需要从中生成另一个列表，其中每个元素是原列表对应元素的平方。我们该如何实现？通常的方法是编写一个 for\
    \ 循环，如下所示。\n\n```python\nx = [1, 2, 3, 4, 5]\ny = []  # 从一个空列表开始\n\nfor i in x:\n\
    \    y.append(i**2)  # 追加\nprint(y)  # 平方元素列表\n```\n\n```python\n# 使用列表推导式\n>>>\
    \ x = [1, 2, 3, 4, 5]\n\n# 循环嵌入列表中\n>>> y = [i**2 for i in x]\n>>> y\n[1, 4, 9,\
    \ 16, 25]\n```\n\n**注意：** for 循环指令的部分：‘**for i in x**’ 现在被嵌入到了列表中。\n\n示例 # 2：\n\
    从一个包含正数和负数的列表中，创建一个包含所有数字绝对值的列表。\n\n```python\n>>> x = [-1, 2, -3, -4]\n>>> y\
    \ = [abs(i) for i in x]\n>>> y\n[1, 2, 3, 4]\n```\n\n示例 #3：\n# θ 值列表（以弧度为单位）\n\
    \n```python\n>>> from math import sin, pi\n\n>>> theta = [i*pi/2 for i in range(4)]\n\
    >>> theta\n[0.0, 1.5707963267948966, 3.141592653589793, 4.71238898038469]\n```\n\
    \n# 根据 θ 列表生成 sin θ 值列表\n\n```python\n>>> [sin(n) for n in theta]\n[0.0, 1.0,\
    \ 1.2246467991473532e-16, -1.0]\n```\n\n示例 #4：\n分离出正数\n# 使用逻辑 if\n\n```python\n\
    >>> x = [-1, 0, 1, 2, -3, 5, -6]\n>>> [i for i in x if i > 0]\n[1, 2, 5]\n```\n\
    \n示例 #5：\n分离出偶数\n\n```python\n>>> L = [2, 9, 12, 23, 46, 78, 45, 94]\n>>> [i for\
    \ i in L if i%2 == 0]\n[2, 12, 46, 78, 94]\n```\n\n练习：\n\n1.  创建一个包含 100 个介于 -1\
    \ 和 +1 之间的随机数的列表，然后从中创建一个仅包含正数的列表。\n2.  从数字列表：12, 19, 91, 36, 39, 41, 11, 9, 103\
    \ 中创建一个奇数列表。\n3.  从列表：-12, 91, -0.5, 0.9, 31, -102, 1.4, 23, 50 中创建一个负数列表。\n\n\
    ## 5.1.7 嵌套列表\n\n列表内部可以包含列表。例如，考虑以下列表：`M = [[1, 2, 3], [4, 5, 6]]`，其中 `M` 是一个嵌套列表。现在\
    \ `M` 有两个元素，每个元素本身都是一个列表。但每个元素内部包含 3 个元素。让我们在解释器中尝试检查一下。\n\n```python\n>>> M =\
    \ [[1, 2, 3], [4, 5, 6]]\n>>> len(M)\n2\n>>> M[0]  # 索引为 0 的元素\n[1, 2, 3]\n>>>\
    \ M[1]  # 索引为 1 的元素\n[4, 5, 6]\n>>> len(M[0])\n3\n\n# M[0] 中索引为 1 的元素\n>>> M[0][1]\n\
    2\n\n# M[1] 中索引为 2 的元素\n>>> M[1][2]\n6\n```\n\n嵌套列表 **M** 可以被视为一个具有 2 行 3 列的矩阵。\n\
    **M = [[1, 2, 3], [4, 5, 6]]**\n\n## 5.2 字符串\n\n字符串是我们放在两个引号（单引号或双引号）之间的任何内容（数字、字母、符号、空格）。字符串对象可以被视为一种数据类型。请注意，在\
    \ Python 3 中，计算机通过 `input()` 函数接收的任何输入都是字符串。\n\n与列表不同，字符串是**不可变的**，*即*，我们无法修改它。我们不能向给定的字符串添加任何元素。我们可以从字符串中切片出一部分，但那是另一个字符串。原始字符串保持不变。\n\
    \n```python\n# 数字字符串\na = '123456'\n\n# 字母字符串，包含一个空格\nb = 'Python Program'\n\n\
