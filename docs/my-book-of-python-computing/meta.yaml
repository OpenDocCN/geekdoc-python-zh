    # 注意：np.sort(L) # 默认轴 = 1\n```\n\n在下面的例子中，三列（x, y, z）数据由一个二维数组表示。我们的任务是通过某一列对数据/数组进行排序，同时保持其他列中对应的条目相应地重新定位。这意味着，行将根据某一列的条目进行排序。NumPy\
