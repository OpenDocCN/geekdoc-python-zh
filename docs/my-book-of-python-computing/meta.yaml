    >>> random.choice(x)\n'Apple'\n```\n\nApplication:\nLet us imagine a **Random\
    \ Walk** on a plane.\n\nWe can consider a two-dimensional square grid or a graph\
    \ paper. Someone or some particle may move over the grid randomly from one node\
    \ to another. At one unit time step, the subject moves one-unit length in either\
    \ of the directions: East (positive x-axis), West (negative x-axis), North (positive\
    \ y-axis), South (negative y-axis). We can easily generate a sequence of moves\
    \ with the application of `random.choice()`.\n\nThe change in position coordinate\
    \ (x, y):\n$x \\rightarrow x + \\Delta x, y \\rightarrow y + \\Delta y$\nThe steps\
    \ along x-axis: $\\Delta x = 0, 1, -1$ and the same is true for y-axis.\n[$\\\
    Delta x = 0$ indicates no increment in x-direction, $\\Delta x = 1$ for the one-unit\
    \ increment in the positive x-direction and $\\Delta x = -1$ for one-unit increment\
    \ in the negative x-direction.]\n\nThe choice is out of the following 4 pairs:\
    \ $\\Delta x, \\Delta y = [(\\Delta x, \\Delta y)$,\n$(-1, 0), (1, 0), (0, 1),\
    \ (0, -1)]$\n\n```python\n# Python Script: Random Walk in 2D\n# Initial position\n\
