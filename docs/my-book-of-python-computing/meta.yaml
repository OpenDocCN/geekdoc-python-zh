    ### Second order: $\frac{d^2y}{dt^2} + \omega^2(y) = 0_{\omega=2}$


    ```python

    # Form the Equation

    >>> t = Symbol(''t'')

    >>> y = Function(''y'')

    >>> equation = Eq(y(t).diff(t,t) + y(t), 0)

    >>> equation

    $\frac{d^2y}{dt^2} + \omega^2$

    $\omega=2 \frac{d^2y}{dt^2} = 0$

    # Solve the Equation

    >>> sol = dsolve(equation, y(t))

    >>> sol

    $y(t) = C_1\sin(t) + C_2\cos(t)$

    # Find constants, $C_1$ and $C_2$ by initial conditions

    # Derivative of solution

    >>> y1 = sol.rhs.diff(t)

    >>> y1 # $y'' = \frac{dy}{dt} = C_1\cos(t) - C_2\sin(t)$

    >>> sol.rhs.subs(t, 0)

    >>> sol.rhs.diff(t).subs(t, 0) ??_1

    # Take the constants and put into solution.

    >>> C1, C2 = symbols(''C1, C2'')

    >>> s = solve((sol.rhs.subs(t, 0) - 0, sol.rhs.diff(t).subs(t, 0) - 1), C1, C2)

    >>> s # Returns as a Dictionary

    {??_1: 1, ??_2: 0}

    Note: ‘sol.rhs.subs(t, 0) – 0’ indicates ??(0)= 0 and ‘sol.rhs.diff(t).subs(t,
    0) – 1’ indicates ??’(0) = 1.

    # Unpack the constants, substitute into solution

    >>> C1_value, C2_value = s.values()

    >>> sol = sol.subs({C1:C1_value, C2:C2_value})

    >>> sol # Final solution ??(??)= sin (??)

    # Plot the solution

    >>> import numpy as np

    >>> import matplotlib.pyplot as plt

    >>> func = lambdify(t, sol.rhs)

    >>> x = np.arange(0, 10, 0.01)

    >>> y = func(x)

    >>> plt.plot(x, y)

    ```


