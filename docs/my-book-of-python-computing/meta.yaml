    \ is followed by an iterable.\n- In this case, range() is an iterable. The loop\
    \ iterates over it. This is followed by a colon (:) which is to connect the next\
    \ lines of instructions.\n- The instructions must be indented under the loop.\
    \ Also, all the indented instructions are to begin from the same column.\n\n![img/a1e407e9a2dd6440cb0c413013408aa5_54_0.png](img/a1e407e9a2dd6440cb0c413013408aa5_54_0.png)\n\
    \n**Fig. 1:** Concept of indentation: how the nested blocks are indented.\n\n\
    #### range()\n\nThe object range() is as an iterable. Some other iterables are:\
    \ string, list, tuple, set, dict.\n\nThe built-in function, range(start, stop,\
    \ step) creates a range of integers from a value ‘start’, in the steps of ‘step’\
    \ and stops before the ‘stop’ (Not to touch or cross the end point). The range\
    \ object can be converted into other kinds of iterable objects.\n\n```\n# Conversion\n\
    >>> range(1, 10, 2)\nrange(1, 10, 2)\n\n# Convert to a list\n>>> list(range(1,\
    \ 10, 2))\n[1, 3, 5, 7, 9]\n\n# stop = 5, start = 0, step = 1\n>>> range(5)\n\
    range(0, 5)\n\n# Default start = 0, step = 1\n>>> list(range(5))\n[0, 1, 2, 3,\
    \ 4]\n\n# Convert to a tuple\n>>> tuple(range(2, 10, 3))\n(2, 5, 8)\n```\n\n**Note:**\
    \ In Python 2, range() creates a list of integers directly and xrange() is equivalent\
    \ to range() in Python 3.\n\n> [In Python, an iterable is an object which can\
    \ be iterated. The basic mechanism is that it generates an iterator when passed\
    \ to iter() method. Iterator is an object, which is used to iterate over an iterable\
    \ object using __next__() method that returns the next item of the object. Whenever\
    \ we use a for-loop, the next method is called automatically to get each item\
    \ from the iterator thus going through the operation.]\n\n**Python code #1**\n\
    \n```\nfor n in range(1, 4):\n    print(‘Very good’)\n```\n\nOutput:\n\nVery good\n\
    Very good\nVery good\n\n**Note:** The function, **range(1, 4)** generates integers\
