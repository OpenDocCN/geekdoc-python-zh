    **Note:** Addition and Subtraction between two Tensors are done in the same way
    as that between two mathematical matrices (or 2D NumPy arrays). If there are two
    tensors A and B of same shape, the addition (or subtraction) is, C = A + B, where
    C is a new Tensor of the same shape.


    The element-wise product between two Tensors of the same dimension will result
    in a new Tensor with same dimension. Such product is called *Hadamard product*
    and it is symbolically written as C = A ∘ B. In NumPy, if A and B are arrays (3D
    arrays) then the Hadamard product is the usual elementwise product between two
    arrays, written as C = A * B [The same is true for Tensor divisions also.].


    # Tensor Product


    Tensor product is quite different than the Hadamard product. If two Tensors A
    and B have dimensions m and n then the resulting tensor product, C = A ⊗ B will
    have dimension (m + n). Note that the tensor product C will consist of the elements
    where each element of A will multiply the Tensor B. For example,


    ```

    A = (a_{11} a_{12}

    a_{21}

    a_{22}), B = (b^{11} b^{12}),

    ```'
