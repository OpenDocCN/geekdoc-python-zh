    \ 'sqrt', 'tan', 'tanh', 'tau']\n```\n\n**注意：** `cmath` 中数学函数的参数可以是实数或复数。但输出总是以复数形式返回。\n\
    \n```python\n>>> cmath.sqrt(-1)\n1j\n>>> cmath.sin(2)\n(0.9092974268256817-0j)\n\
