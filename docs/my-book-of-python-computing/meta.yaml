    # Simple plot\nx = [1, 2, 3, 4, 5]\ny = [1, 4, 9, 16, 25]\nplot(x, y)\nplt.show()\n\
    ```\n\n**Fig. 1** Simple x-y plot. [If nothing is mentioned, the plot is by default\
    \ with continuous line and green colour (not reproduced here).]\n\nThe x- and\
    \ y- data may be given as list, tuple, array *etc*. We can write,\n\n```python\n\
    # Data as tuples\nplt.plot((1, 2, 3, 4, 5), (1, 4, 9, 16, 25))\n# Plot y using\
