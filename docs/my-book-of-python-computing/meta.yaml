    \ positive integers by Euclid method. First, we divide the bigger number by the\
    \ smaller number and consider the residue. If the residue is zero, then the smaller\
    \ number is the GCD. If this is not the case, we take the nonzero residue as the\
    \ smaller number and previous smaller number to be the bigger number. This is\
    \ continued until we get a zero residue. Then at the last step, the divisor is\
    \ called the GCD. LCM is just obtained by dividing the product of two original\
    \ numbers by GCD.\n\nAlgorithm:"
