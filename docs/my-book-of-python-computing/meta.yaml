    一旦我们定义了一个符号并通过 lambdify() 创建了函数，我们就可以使用 matplotlib 库进行绘图。不过，SymPy 中有一个基于 Matplotlib
    的绘图模块，我们可以直接使用。


    ### 10.4.1 使用 Matplotlib 绘图


    ```

    x = Symbol(''x'')

    f = lambdify(x, sin(x**2), ''numpy'')

