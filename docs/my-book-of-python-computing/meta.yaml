    # 5.2 String


    A string is anything (numbers, alphabets, symbols, spaces) that we put between
    two quotes (single or double). The objectstring can be considered as a data type.
    Note that in Python 3, any input that the computer takes through the input() function
    is astring.


    A string, unlike a list, is **immutable**, *i.e.*, we cannot alter it. We cannot
    add any element to a given string. We can slice out a piece from a string but
    that is another string. The original string remains unchanged.


