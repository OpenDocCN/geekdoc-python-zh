  md: 'A string can be made with single, double, or triple quotes. On the interpreter,
    we need not always type print() function to print or write. We can directly type
    the string (or anything) and press Enter. However, for strings of various styles,
    we shall sometimes notice some differences. Let us write some texts as strings
    and check how they return.


    ```

    >>> print(''Hello World!'')

    Hello World! # Output: Not a string

    >>> ''Hello World!''

    ''HelloWorld!'' # Output: String

    # Strings of various styles


    # Double quotes

    >>> "I am a Pythonista." ''I am a Pythonista.''


    # Triple double quotes

    >>> """"I am learning Python."""" ''I am learning Python.''


    # Triple single quotes

    >>> ''''''I am writing codes in Python.'''''' ''I am writing codes in Python.''

    # When quotes clash

    >>> ''I a''m writing codes in Python'' SyntaxError: invalid syntax

    ```


    **Note:** The syntax error arises because Python treats ''I a'' as a string from
    the above statement and it does not understand the rest of the text. To include
    the apostrophe('') inside the single quoted string we need to use an escape character(\).


    ```

    # Correct way of writing

    >>> ''I a\''m writing codes in Python'' "I a''m writing codes in Python"

    # We can avoid this(\) symbol by typing two different kinds of quotes.

    >>> "I a''m writing codes in Python" "I a''m writing codes in Python"

    # Connecting multiple lines


    >>> ''I am a beginner. \nI wish to learn Python.''

    ''I am a beginner. I wish to learn Python.''

    ```'
