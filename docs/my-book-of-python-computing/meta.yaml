  md: '# 9


    # Matplotlib: Plotting Library


    > “It is a capital mistake to theorize before one has data.”- Arthur Conan Doyle


    **Matplotlib** is a comprehensive library for creating static, animated, and interactive
    visualizations in Python. Like any other (open source) Python packages, it can
    be installed in the Python directory and be imported to the namespace.


    **Anaconda , Python(x,y)** or some other scientific Python distributions come
    with packages like **NumPy, SciPy** and **Matplotlib**. In most of the latest
    versions of Linux Operating system, Python is preinstalled with the said packages.
    If not found already installed, Matplotlib can be installed over core Python in
    Windows by usual command:


    pip install matplotlib [See Appendix A]. On Linux, it is done through the command:
    sudo. For detailed procedure, documentation, and tutorials, one can look up the
    official Matplotlib webpage: **matplotlib.org**.


    # 9.1 Plotting in 2D


