    \nA regular fractal is a geometrical object which is self-similar. That means,\
    \ we see same pattern in all length scales. We make a regular geometrical fractal\
    \ by repeating the same rule repeatedly. For this we employ a recursive function.\
    \ # Example of a recursive function\n\n```\ndef fact(n):\n    if(n == 0): return\
    \ 1 return n * fact(n - 1)\n```\n\nNote: The function fact() is defined to compute\
    \ factorial of a number: n! = n × (n - 1)× ... × 2 × 1. It is a repetitive act.\
    \ In fact, we can think of n! = n × (n - 1)! = n × (n - 1)×(n - 2)!...and so on.\
    \ So, fact(n) = n × fact(n-1). The function fact() is a recursive function, as\
    \ it is itself called inside its definition. If we start from a number n, it is\
    \ reduced by 1 in every step until n = 0.\n\n# Koch Curve\n\nLet us create a fractal\
    \ by taking a line and applying some rule over it repeatedly. Let the line be\
    \ of length L. Divide it into 3 equal parts: L/3. Now take out the middle portion\
    \ and replace it with two such segments which are then joined to form an equilateral\
    \ triangle. This task is repeated on all segments through many generations. In\
    \ the following, we show two generations that evolved from a straight line on\
    \ the left. [Named after Swedish mathematician Helge von Koch.]"
