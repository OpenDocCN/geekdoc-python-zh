    # 2.6 Time, Date, Calendar


    In Python, time is measured in units of seconds (floating point numbers) and the
    clock ticks the number of seconds since 12.00 A.M., January 1, 1970. To know time,
    we need to import the **time** module. In the following, we used the **time()**
    function to know the present time.


    ```

    >>> import time >>> time.time() 1593926900.532799 >>> time.time() 1593926909.4718668
    >>> time.time() 1593926914.2176676

    ```


    Time is ever changing, as we can see from the above by repeatedly typing the same
    command on interpreter. Thus, we can calculate the difference in time between
    two instants. This is very useful for knowing the run time of a Python program.


    If we import the **time** module inside a python script and keep track of initial
    time (execution of first line of the program) and final time (when the program
    is over), we can know how long a program took to run. Typically,


    ```

    import time

    begin = time.time()

    Instruction Block

    end = time.time()

    run_time = end – begin

    # For local time and Date (in hours, min, sec etc.)

    ```


