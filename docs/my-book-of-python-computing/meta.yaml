    1 and the same number. For example, 3, 5, 7, 11, 13.... are prime numbers.


    By Primitive Algorithm


    Algorithm:


    +   1. Check if the number**n** is divisible by any integer between2 to n-1. If
    so, the number is not prime. Break away.

    2. Run a loop between **2** to **n-1** to test the step 1.'
