    8*. [You may copy this or note down.]


    **Step #2:** On the Window search (at the bottom left of screen) type ‘cmd’. A
    black DOS window appears. Now copy paste pathname or type ‘cd AppData\Local\Programs\Python\Python38’
    on the command line and press Enter [cd = change directory]. Now it shows the
    command line with full pathname:


    ```

    C:\Users\Abhijit Kar Gupta\nAppData\Local\Programs\Python\Python38>

    ```


    **Step #3:** You can now type ‘dir’ to check what are the files and sub-directories
    under the Python directory. Now go to the subdirectory ‘Scripts’ by typing:C:\...>
    **cd scripts**


    **Step #4:** Final step!

    To installNumPy, type:

    C:\...Scripts> **pip install numpy**


    Likewise, you can install any external package with ‘pip install’ command. You
    can install many packages together by typing pip install numpy scipy matplotlib.


    > [The machine should be connected to internet during this installation. To come
    out of black window: Type ‘exit’ or click the cross to dismiss.


    On Linux:


    On most of the Linux distributions, Python 2 is preinstalled. Python 3.8 does
    not come by default on Ubuntu or other Linux platforms. To install, open terminal
    application and type the following:


    ```

    $ sudo apt-get update

    $ sudo apt-get install python3.8 python3-pip

    ```


    On Android phone:


    There are several Python App’s available. Any App of your choice can be installed
    on mobile phone from Google play store. Some of the versions are lighter (takes
    less space on your phone and so quick). You may do most of the useful python calculations
    and testing over any kind of android phone. External packages can also be done
    from the App’s repository. Some useful App’s a re *QPython*, *Pydroid* etc.


    Python Distributions:


    There are various Python distributions that come with core Python along with some
    common external packages. For example, **Python(x, y)**, **Anaconda** *etc*. Google
    search and install any of them as you wish. Each of them contains various Python
    development environments: IPython Shells, Spyder, Jupyter Notebook *etc*.


    External Packages:


    - **NumPy** (Numerical Python) is for array manipulation and more.

    - **SciPy** (Scientific Python) contains various scientific modules

    - **Matplotlib** (Mathematical Plotting Library) is to draw graphs

    - **Pandas** is to deal with structured data. For Data Science and Machine Learning,
    we may install ‘**Scikit-learn**’ to access raw data and for testing, ‘**seaborn**’
    for data visualization and statistical graphics.


    Consult the following blog article for installation on Windows, Mac, and Linux:

    realpython.com/installing-python


    ## Python Versions


    Python has two parallel versions: **Python 3.x** and **Python 2.x**. This book
    is written with Python 3.x syntaxes.


    In Python 3.x, the strings are in unicode whereas in Python 2.x, the strings are
    stored as ASCII. At the user level, there are only a few differences between the
    two versions. The installation of either of the versions is not difficult. Also,
    two parallel versions can coexist on a same machine. One can work in any version
    and can switch over to another version with ease where only a few changes in syntaxes
    are to be made.


    ## Some user-level differences


    | Feature | Python 3.x | Python 2.x |

    | :--- | :--- | :--- |

    | **print** | print(‘Python String’) | print ‘Python String’ |

    | **print(x, y)** | print(x, y) | print x, y |

    | **input** | x = input() | x = input() |


    The input() returns a string.

    The input() returns the type as given.


    Another type, **raw_input()** returns a string.


    **division** 5/2 = 2.5 = 2 (quotient only)


    **range** The **range()** function creates a range of numbers.


    **5.0/2 = 2.5** [For result in fraction, At least one of numerator or denominator
    must be in float.]

    The **range()** function returns a list.


    The type is range. It can be converted to a list or tuple.


    Another kind, **xrange()** is equivalent to range() in Python 3.x.


    Most of the releases in Python 2.x are stable. The latest releases/ versions in
    Python 3.x are in developing stages. In short, Python 2.x is a legacy and Python
    3.x is the future.


    **input()** in Python 2.x and Python 3.x:


    ```

    # Python 2.x


    x, y, z = **input(''Enter values \n'')** Enter values

    2, -3, 4.5

    ```


    ```

    # Python 3.x


    x, y, z = **eval(input(''Enter val \n''))** Enter val

    2, -3, 4.5

    ```


    In Python 3.x, every input is treated as string. [The **raw_input()** function
    of Python 2.x is equivalent to **input()**in Python 3.x.]


    ```

    >>> a = **input(''Enter values \n'')** Enter values

    2, -3, 4.5

    >>> a # This is a string ''2, -3, 4.5''

    ```


    To get the numerical value of the input variable, we need to evaluate the input
    string through **eval()** function. Also, for multiple inputs, we need to split
    the string through **split()** or we apply**eval()** and then unpack.


    ```

    >>> x, y, z = **eval(a)** >>> x

    2

    >>> y

    -3

    >>> z

    4.5

    ```


    ## Bibliography


    1. Python Official Site:www.python.org

    2. NumPy, SciPy, Matplotlib: numpy.org, scipy.org, matplotlib.org

    3. For mathematics: mathworld.wolfram.com

    4. Official Python Blog: www.python.org/blogs/

    5. List of various Python Blogs: github.com/mikeyny/awesomepython-blogs

    6. Classified resources for Learning Python: docs.python guide.org/intro/learning/

    7. *Python Tutorial Release 3.2.3* – Guido van Rossum, Fred L. Drake, Jr., editor
    (Python Software Foundation)

    8. *Python Tutorial Release 2.4.2* – Guido van Rossum, Fred L. Drake, Jr., editor
    (Python Software Foundation)

    9. *Scientific Computing in Python (1st ed.)* – Abhijit Kar Gupta (Techno World,
    Kolkata)

    10. *Think Python*: How to Think like a Computer Scientist– Allen Downey (Green
    Tea Press)

    11. *Learn Python the Hard Way* – Zed Shaw (www.it-ebooks.info)

    12. *Computational Physics with Python* – Dr. Eric Ayars (California State University,
    Chico)

    13. *Computational Physics (Problem Solving with Python)*– Rubin H. Landau, Manuel
    J. Páez and Cristian C. Bordeianu (WileyVCH), 3rd completely revised edition.

    14. *Numerical Mathematical Analysis*– James B. Scarborough (Oxford University
    Press)

    15. *Introductory Methods of Numerical Analysis*– S.S. Sastry (Prentice Hall of
    India Pvt. Ltd., New Delhi)

    16. *Computational Mathematics* – B.P. Demidovich, I.A. Maron (MIR Publishers,
    Moscow)

    17. *Numerical Recipes: The Art of Scientific Computing* - W.H. Press, B.P. Flannery,
    S.A. Teukolsky, W.T. Vetterling (Cambridge University Press)

    18. *Numeric Computing in Fortran* – Sujit Kumar Bose (Narosa Publishing House,
    India)

    19. *Python Programming*– Ch Satyanarayana, M Radhika Mani, B N Jagadesh (Universities
    Press, India)

    20. *Data Science from Scratch* – Joel Grus (O’REILLY)

    21. *Numerical Methods in Engineering with Python 3* – Jaan Kiusalaas (CAMBRIDGE)'
