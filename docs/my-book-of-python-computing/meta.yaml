    \ **print()** function, “\\t” (creates one space by tab) is used to display the\
    \ output in the gap separated way.\n\n**Python code #3**\n\n```\n# Sum of integers\
    \ from 1 to 100\ns = 0  # Initial value\nfor n in range(1, 101):\n    s = s +\
    \ n  # Update the value\nprint(‘Sum = ‘, s)\n```\n\nOutput:\nSum = 5050\n\n```\n\
    # Sum in one step\n>>> sum(range(1, 101))\n5050\n```\n\n**Python code #4: Number\
    \ Table (Print with string formatting)**\n\n```\nfor index in range(1, 6):\n \
    \   print(\"{} times 5 is {}\".format(index, index*5))\n```\n\nOutput:\n\n1 times\
