    # 9.1.11 Contour Plot


    A contour plot is a 2D projection of a 3D plot. It can be created by **contour()**
    function. The 3 arguments of contour() function: a grid of x values, a grid of
    y-values and a grid of z-values. The x & y values represent position on the plot
    and z-value represent the contour level (height). One way to prepare the grid
    of x & y values is by using


    **meshgrid(x, y)** function taken from **Numpy** which prepares a 2D grid from
    one dimensional arrays.


    ```

    # Preparation of Grid

    x = np.linspace(0, 10, 10)

    y = np.linspace(0, 10, 10)

    X, Y = np.meshgrid(x, y)


    plt.plot(X, Y, ''.'', ms = 12, c = ''k'')

    plt.title(''X-Y Grid'', size = 20)

    plt.show()

    ```


    **Note:** The **meshgrid()** function prepares a 2D grid on the x-y plane. In
    this case, 10 discrete points each along x- and y-axes.'
