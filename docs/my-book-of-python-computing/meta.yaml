    # # 7 Correlation Coefficient


    Pearson’s Correlation coefficient formula between two sets of variables $(x_i,
    y_i)$ :


    $r_{xy} = \frac{\sum(x_i - \bar{x})(y_i - \bar{y})}{\sqrt{\sum(x_i - \bar{x})^2}\sqrt{\sum(y_i
    - \bar{y})^2}}$


    Where the variances, $\sigma_x^2=\frac{1}{n}\sum(x_i - \bar{x})^2$, $\sigma_y^2=\frac{1}{n}\sum(y_i
    - \bar{y})^2$ and the covariance, $\sigma_{xy}=\frac{1}{n}\sum(x_i - \bar{x})(y_i
    - \bar{y})$. With these, the correlation formula is


    $\sum(x_i - \bar{x})(y_i - \bar{y})\sigma_{xy} = \sqrt{\sum(x_i - \bar{x})^2}\sqrt{\sum(y_i
    - \bar{y})^2}$


    ```

    # Correlation Coefficient

