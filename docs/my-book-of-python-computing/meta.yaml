    # 4.9 Python filter Function


    The **filter()** function returns a filter object where the items from a list
    (or tuple *etc.*) are filtered through a function under some given condition.
    We can see the filtered object only when we convert it to a list or tuple *etc.*


    ```

    >>> L = [2, 0, 1.0, 10.2, 0.5, 3.4]

    >>> f = lambda x: x > 0.5

    >>> filter(f, L)

    <filter object at

    0x0000015A081953A0>

    >>> list(filter(f, L))

    [2, 1.0, 10.2]

    ```


    Note that the action of map() over such function will return in Booleans.


    ```

    >>> list(map(f, L))

    [True, False, True, True, False, False]

    ```


