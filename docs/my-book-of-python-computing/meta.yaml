  md: '[The copy y also changes.]


    The shallow copy poses a problem for objects like a nested list. It creates a
    new collection object but the nested elements (the child objects) are not actually
    copied (This is only one level deep.), they refer to the old. So, changing an
    element will also show up in the copy. However, if new elements are appended to
    x, the old elements are not altered. Then y remains unchanged.


    # Deep copy


    The real deep copy is made when a new collection object is created and it is recursively
    populated with the child objects taken from the original.


    ```

    >>> x = [[1, 2], [3, 4]]

    # Deep copy

    >>> y = copy.deepcopy(x)


    # One element in x changed

    >>> x[0][1] = 0 >>> x # New x [[1, 0], [3, 4]]

    >>> y [[1, 2], [3, 4]]

    ```


    [The copy y is unchanged.]


