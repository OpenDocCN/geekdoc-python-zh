    # Matrix Operations with NumPy


    Matrix operations can be greatly simplified and made faster with the help ofarrays
    in **NumPy**. NumPy is an external package developed for Python which consists
    of various useful modules, functions and other objects suited to do efficient
    numerical computations. We shall introduce NumPy in detail in the next chapter.

    In this chapter, we briefly demonstrate how we can do matrix operations witharray()
    function in NumPy package. Like nested lists, NumPy arrays can be of any dimension.
    A brief demonstration follows:


    ```

    >>> import numpy as np


    # One dimensional array

    >>> x = np.array([1, 2, 3])

    >>> x

    array([1, 2, 3])

    >>> type(x)

    <class ''numpy.ndarray''>

    >>> A = np.array([[1, 2, 3], [4, 5,

    6]]) >>> A array([[1, 2, 3],

    [4, 5, 6]])

    [Two-dimensional array]

    # Shape of array

    >>> x.shape

    (3, ) # Tuple of single element


    # 2D array, treated as 2 × 3 Matrix >>> A.shape

    (2, 3)

    ```'
