  md: '# Core Python


    # CHAPTER


    # 1


    # Fundamental Ideas


    > “The joy of coding Python should be in seeing short, concise, readable classes
    that expresses a lot of action in a small amount of clear code – not in terms
    of trivial code that bores the reader to death.” - Guido van Rossum


    This book follows **Python 3** syntaxes. Python is a high-level computer language
    which has now becomeone of World’s most popular programming languages. The syntaxes
    are very simple and minimal so that we can write clean and beautiful Python codes.
    There are several other advantages over the other existing high-level languages
    that we shall eventually know.


    Python has become exceptionally adaptable language of our time. Tremendous applications
    are found in Basic Science, Engineering, Data Science, Data Management, Machine
    learning (ML), Deep Learning, Networking, Web Applications *etc*. Enormous number
    of scientific modules have been developed. Python is an open-source programming
    language with huge community support.


    Unlike FORTRAN, C, C++, and other languages, it is an interpreter-based language.
    As we keep writing each line on the Python interpreter or Python shell, it is
    being executed (or interpreted) in contrast to most other languages where the
    entire program must be compiled first, at one go. Many often, of course, we need
    to write a standard program or code which is usually longer than a few lines.
    In that case, we write the programs (Python scripts) in a file and then execute
    (‘run’) it. Computing in Python works with both functional programming and Object-Oriented
    Programming (OOP) ways.


    Why Python? In short:'
  merge: -1
  pgno: 9
- img_proc: true
  md: '+   - Powerful programming language, easy to learn

    - Efficient high dimensional Data Structure

    - Clean Syntax, Code readability

    - Object Oriented, imperative, functional computation

    - Programs are portable.

    - Open Source

    - Great Community Support

    - Interpreter based language


    What is about the name Python?


    The name ‘Python’ is not from a snake (as the Python logo might suggest)! The
    name ‘Python’ originated from the famous BBC comedy serial ‘Monty Python’. *Guido
    van Rossum*, the originator of Python, is very fond of this popular comedy serial.
    So, Guido kept this name as he finished his project of writing a new computing
    language.


    How to install Python?


    Regarding installation and versions of Python, see Appendix. We can install any
    version. There are only a very few differences between the two versions (Python
    2.x and Python3.x) from user’s point of view. Some discussions in this regard
    are also made in Appendix A. In this edition of the book, we follow **Python 3.x**
    version (In the first edition, we followed Python 2.x.). One can install (and
    uninstall) any version easily on the machine and then can begin to type. In fact,
    the two versions may also coexist on the same machine.


    You may directly go to the official site of Python (www.python.org) and download
    any stable version. Later, you may decide to install external packages as and
    when required. Also, there are some distributions like Anaconda, Python (x, y)
    *etc.* which come with core Python along with some common external packages (*e.g.*,NumPy,
    SciPy, Matplotlib).


    Before we begin to write a Python code, we should be familiar with the essential
    tools– syntaxes, variables, numbers, operators, methods, logical and loop structures,
    data structures, and other ideas.


    # 1.1 Variables, Numbers, Operators'
