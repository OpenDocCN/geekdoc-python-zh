    \ 来获取 turtle 中各个函数的帮助信息。我们也可以参考 `Turtle()` 类并链接其中的函数。\n\n```\n>>> t = turtle.Turtle()\
    \ # Turtle() 类重命名为 t\n>>> t.forward(100)\n```\n\n# 前进100步的指令\n\n在接下来的演示中，我们将导入所有内容，因此不再进行引用。\n\
    \n# 导入并绘制\n\n```\n>>> from turtle import *\n>>> forward(100)\n# 海龟向前移动100像素。\n\
    ```\n\n假设这是一个画布（仅用于演示，并非实际）。海龟绘制了一条带有默认箭头的线，该箭头沿着x轴（从东到西）从左向右移动了100像素（箭头的长度）。[通常，起始位置在画布的中心\
    \ (0, 0)。]\n\n接下来，我们可以指示海龟向左转（箭头向左旋转）某个角度。同样，我们可以指示海龟向前移动若干步，然后向右转，如此反复。从而绘制出各种几何图形。\n\
    \n# 绘制正方形\n\n```\n>>> forward(100)\n>>> left(90) # 左转90度\n>>> forward(100)\n>>>\
    \ left(90)\n>>> forward(100)\n>>> left(90)\n>>> forward(100)\n>>> left(90)\n```\n\
    \n# Python脚本：绘制正方形\n\n```\nfor i in range(4):\n    fd(100)\n    lt(90)\n```\n\n\
    # Python函数：square\n\n```\ndef square(L):\n    for i in range(4):\n        fd(L)\n\
    \        lt(90)\n    return\n```\n\n# 一些函数\n\n- `fd()` # 前进：forward()\n- `bk()`\
    \ # 后退：backward()\n- `lt()` # 左转：left()\n- `rt()` # 右转：right()\n- `reset()` #\
