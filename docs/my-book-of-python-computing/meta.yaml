    ```python\ndef fractal_tree(L):\n    if L < 1:\n        return\n    else:\n  \
    \      fd(L)\n        lt(30)\n        draw(L*f) # 左侧分支\n        rt(60)\n     \
    \   draw(L*f) # 右侧分支\n        lt(30)\n```"
