    ## 8.1.6 数组的创建方法


    NumPy 中有多种方法来创建数字数组。


    ### 1 数字范围


    `np.arange(start, stop, step)`


    ```python

    >>> help(np.arange)

    ......

    arange(...)


    arange([start,] stop[, step,], dtype=None)

    Return evenly spaced values within a given interval.


    Values are generated within the half-open interval ``[start, stop)``

    ......

    ```


    **注意：** 数组从 `start` 开始，以 `step` 为步长递进，并在 `stop` 之前停止。我们可以阅读在线手册来理解它的工作原理。注意 `[start]`
    和 `[stop]` 写在方括号中，而 `stop` 没有。这意味着参数 `stop` 是必需的。如果未给出 `start` 和 `stop`，它们将采用默认值（`start
    = 0`, `step = 1`）。


    ```python

    >>> np.arange(2, 10, 3)

    array([2, 5, 8])

    ```


    ```python

    # 默认步长 = 1

    >>> np.arange(2, 10)

    array([2, 3, 4, 5, 6, 7, 8, 9])

    ```


    ```python

    # 默认起始值 = 0

    >>> np.arange(5)

    array([0, 1, 2, 3, 4])

    ```


    ```python

    >>> np.arange(0.2, 2, 0.4)

    array([0.2, 0.6, 1. , 1.4, 1.8])

    >>> np.arange(5, 10, 2, dtype= ''f'')

    array([5., 7., 9.], dtype=float32)

    ```


    **注意：** 与核心 Python 中的内置方法 `range()` 不同，这个 NumPy 方法 `arange()` 可以创建小数或浮点数。此外，我们可以通过关键字指定数据类型（默认数据类型为
    `None`）。


    ### 2 线性空间


