    [所有元素的和。]\n```\n\n**注意：** 对于任何应用于高维NumPy数组的NumPy方法，轴引用都很重要。\n\n### 均值、中位数\n\n\
    ```python\n>>> np.mean(y, axis = 0)\narray([40., 50., 60.])\n[同样，y.mean(0) 作为属性。]\n\
