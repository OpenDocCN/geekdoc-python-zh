    \ <module>\n    s.update([7, 9])\nAttributeError: 'frozenset' object has no attribute\
    \ 'update'\n```\n\n## 5.5 Dictionary\n\nA dictionary is a Python Object where\
    \ we have **key:value** pairs, separated by commas, placed inside a pair of curly\
    \ brackets { }. If we call through a **key**, it will return us the corresponding\
