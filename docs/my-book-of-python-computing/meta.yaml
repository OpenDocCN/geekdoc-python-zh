    ## Transpose


    ```

    >>> A.T

    [1 4 7]

    [2 5 8]

    [3 6 9]

    ```


    ## Power of Matrix


    ```

    >>> A**2

    [30 36 42]

    [66 81 96]

    [102 126 150]

    ```


    ## Determinant


    ```

    >>> A.det()

    0

    >>> B.det()

    4

    ```


    ## Eigenvalues, Eigenvectors

    >>> B.eigenvals() # Eigenvalues

    >>> B.eigenvects() # Eigenvectors

    ## Diagonalization of Matrix

    The method diagonalize() returns a tuple (P, D)

    where D is diagonal and D = P⁻¹BP.


    ```

    >>> P, D = B.diagonalize()

    >>> D

    [2 0 0]

    [0 5/2 - sqrt(17)/2 0]

    [0 0 sqrt(17)/2 + 5/2]

    >>> P

    [1 -sqrt(17)/4 - 3/4 -3/4 + sqrt(17)/4]

    [-5/3 4 + sqrt(17)/4 - sqrt(17)/4]₁₁₁

    ```


    ```

    # Special Matrices

    >>> diag(3, 4, 1) # Diagonal Matrix

    [3 0 0]

    [0 4 0]

    [0 0 1]

    ```


    ```

    >>> zeros(3) # Null Matrix

    [0 0 0]

    [0 0 0]

    [0 0 0]

    ```


    ```

    >>> ones(2, 3)

    [1 1 1]

    [1 1 1]

    ```


    ```

    >>> eye(3) # Identity Matrix

    [1 0 0]

    [0 1 0]

    [0 0 1]

    ```


    ## 10.3 Calculus


    ### 10.3.1 Limit


    ```

    >>> Limit(sin(x)/x, x, 0)

    lim(sin(x)/x)

    x→0+

    ```


    ```

    >>> f = Limit(sqrt(x**2+1)/x, x, oo) # oo is infinity.

    lim(√(x² + 1)/x)

    x → ∞

    ```


    ```

    # Evaluate the limit

    >>> f.doit()

    1

    ```


    ```

    # Direct evaluation

    >>> limit(sin(x)/x, x, 0)

    1

    ```


    ### 10.3.2 Differentiation


    ```

    >>> y = Function(''y'')

    >>> t = symbols(''t'')

    ```


    ```

    # Differentiate y w.r.t. t

    >>> y(t).diff(t)

    dy/dt

    ```


    ```

    # Substitute t = 0

    >>> y(t).diff(t).subs(t, 0)

    dy/dt|_{t=0}

    ```


    ```

    # Differentiate twice w.r.t. t

    >>> y(t).diff(t, t)

    d²y/dt²

    ```


    ```

    >>> y = t**3 + 2*t**2 + 4

    >>> y.diff(t)

    3t² + 4t

    ```


    ```

    >>> y.diff(t).subs(t, 1)

    7

    Also, one can write:

    >>> diff(y, t)

    3t² + 4t

    ```


    ```

    # Differentiate w.r.t. x

    >>> diff(sin(x)*exp(x), x)

    e^x sin(x) + e^x cos(x)

    ```


    ### 10.3.3 Integration


    ```

    # Indefinite Integration

    >>> integrate(exp(x)*sin(x))

    e^x sin(x)/2 - e^x cos(x)/2

    ```


    ```

    # Representation of definite Integral

    >>> Integral(sin(x)*exp(x), (x, 0, 1))

    ∫₀^1 e^x sin(x) dx

    ```


    ```

    # Evaluating a definite Integral

    >>> integrate(exp(x)*sin(x), (x, 0, 1))

    -½cos(1) + ½sin(1)


    >>> integrate(x**2*exp(-x**2), (x, 0, oo))

    √π/4


    # Double Integral

    >>> x, y = symbols(''x, y'')

    >>> Integral(exp(-x**2 - y**2), (x, 0, oo), (y, 0, oo))

    ∫∫ e^(-x² - y²) dx dy

    0 0


    >>> integrate(exp(-x**2 - y**2), (x, 0, oo), (y, 0, oo))

    π/4

    ```


    ## 10.4 Plotting a Function


    Once we define a symbol and make a function through lambdify(), we can use matplotlib
    library to plot. However, there are plotting module in SymPy based on Matplotlib
    which we can readily use.


    ### 10.4.1 Plot with Matplotlib


    ```

    x = Symbol(''x'')

    f = lambdify(x, sin(x**2), ''numpy'')

    import numpy as np

    import matplotlib.pyplot as plt

    xvals = np.arange(0, 10, 0.01)

    yvals = f(xvals)

    plt.plot(xvals, yvals)

    ```


    **Fig. 1:** Plotting function with lambdify and using Matplotlib library.

    **Note:** The function sin() was taken from NumPy.


    ### 10.4.2 Plot with SymPy Plotting Library


    The plotting module allows us to make 2-dimensional and 3-dimensional plots. Presently,
    the plots are rendered using Matplotlib as a backend.


    ```

    >>> x = Symbol(''x'')

    # Directly plots the expression

    >>> plot(x**2)

    ```'
