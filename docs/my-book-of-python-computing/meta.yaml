    \ 0): return 1 return n * fact(n - 1)\n```\n\nNote: The function fact() is defined\
    \ to compute factorial of a number: n! = n × (n - 1)× ... × 2 × 1. It is a repetitive\
    \ act. In fact, we can think of n! = n × (n - 1)! = n × (n - 1)×(n - 2)!...and\
    \ so on. So, fact(n) = n × fact(n-1). The function fact() is a recursive function,\
    \ as it is itself called inside its definition. If we start from a number n, it\
    \ is reduced by 1 in every step until n = 0.\n\n# Koch Curve\n\nLet us create\
