    \  # 角度（度）\n# 转换为弧度\ntheta = theta*180/math.pi\nprint(math.sin(theta))\n```\n\n\
    #### #3 用海伦公式计算三角形面积\n\n已知三角形的两条边：a 和 b，以及它们之间的夹角：θ，我们计算第三条边 c = √(a² + b² – 2ab\
    \ cos θ)。三角形的面积 A = √(s(s – a)(s – b)(s – c))，其中 s = (a + b + c)/2。\n\n**算法：**\n\
    1. 输入：a, b 和 θ（以度为单位）\n2. 将角度 θ 转换为弧度\n3. 根据公式求第三条边 c。\n4. 计算 s。\n5. 根据公式计算面积并打印输出。\n\
    \n```python\n# Python 脚本：用海伦公式计算三角形面积\nfrom math import pi, sqrt, cos\n\na, b,\
    \ theta = eval(input('输入 a, b, 角度（度）: \\n'))\n# 转换为弧度\ntheta = pi*theta/180\n\
    # 第三条边\nc = sqrt(a*a + b*b - 2*a*b*cos(theta))\n# 计算 s\ns = (a + b + c)*0.5\n\
    # 计算面积\narea = sqrt(s*(s - a)*(s - b)*(s - c))\nprint('面积 = ', area)\n```\n\n\
    **注意：** 函数和参数：**cos()**、**sqrt()**、**pi** 是从 **math** 模块导入的。\n\n## 2.4 复数数学模块\n\
    \n```python\n>>> import cmath\n>>> dir(cmath)\n['__doc__', '__loader__', '__name__',\
