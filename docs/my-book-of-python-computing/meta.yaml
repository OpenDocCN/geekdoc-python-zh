    If we now assign x to another number, the id(x) becomes new but the assumed copy,
    y retains the old value and identity.


    The same is not true for a mutable object like list, tuple *etc*. Let us create
    a listx, copy it to y and then alterx to see what happens.


    ```

    >>> x = [1, 2, 3] >>> y = x

    # Change one element in x

    >>> x[0] = 10


    # x changes

    >>> x [10, 2, 3]

    # y also changes

    >>> y [10, 2, 3]

    ```


    **Note:**y is not really a copy ofx. For real copy, we use built-in copy() or
    importcopy module.


    Shallow copy


    ```

    >>> import copy >>> x = [1, 2, 3]

    # Real copy y of x

    >>> y = copy.copy(x)

    ```


    We can now change any element of x or add new element to it, the copied listy
    remains unchanged. However, this is just a shallow copy. Let us check this for
    a nested list.


    ```

    >>> x = [[1, 2], [3, 4]] >>> y = copy.copy(x)

    # One element in x changed


    >>> x[0][1] = 0 >>> x # New x [[1, 0], [3, 4]]

    >>> y [[1, 0], [3, 4]]

    ```'
  - '[PAGE 116]


    [The copy y also changes.]


    The shallow copy poses a problem for objects like a nested list. It creates a
    new collection object but the nested elements (the child objects) are not actually
    copied (This is only one level deep.), they refer to the old. So, changing an
    element will also show up in the copy. However, if new elements are appended to
    x, the old elements are not altered. Then y remains unchanged.


    # Deep copy


    The real deep copy is made when a new collection object is created and it is recursively
    populated with the child objects taken from the original.


    ```

    >>> x = [[1, 2], [3, 4]]

    # Deep copy

    >>> y = copy.deepcopy(x)


    # One element in x changed

    >>> x[0][1] = 0 >>> x # New x [[1, 0], [3, 4]]

    >>> y [[1, 2], [3, 4]]

    ```


    [The copy y is unchanged.]


