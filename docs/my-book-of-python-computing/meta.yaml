    On Android phone:


    There are several Python App’s available. Any App of your choice can be installed
    on mobile phone from Google play store. Some of the versions are lighter (takes
    less space on your phone and so quick). You may do most of the useful python calculations
    and testing over any kind of android phone. External packages can also be done
    from the App’s repository. Some useful App’s a re *QPython*, *Pydroid* etc.


    Python Distributions:


    There are various Python distributions that come with core Python along with some
    common external packages. For example, **Python(x, y)**, **Anaconda** *etc*. Google
    search and install any of them as you wish. Each of them contains various Python
    development environments: IPython Shells, Spyder, Jupyter Notebook *etc*.


    External Packages:


    +   - **NumPy** (Numerical Python) is for array manipulation and more.

