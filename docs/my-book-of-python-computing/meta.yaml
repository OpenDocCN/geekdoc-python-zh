    \ be noted that the product of two 2D arrays is not a matrix product. Matrix product\
    \ is a special kind of operation where we take row elements of left matrix and\
    \ multiply with corresponding column elements of the right matrix. For matrix\
    \ product, there is a NumPy method called **dot()**.\n\n(1 2 3 1 2\nAB = 4 5 6)\
    \ (3 4)\n5 6\n\n```\n>>> A = np.array([[1, 2, 3], [4, 5, 6]])\n>>> B = np.array([[1,\
