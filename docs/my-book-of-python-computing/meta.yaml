    \ drawing background\n- edgecolor: color of edge around the drawing background\n\
    - frameon: drawing figure frame or not (default = True)\n\nThe keyword arguments\
    \ in `plt.figure()` that determine how a figure looks like.\n\n### Example: Plot\
    \ with styles\n\n```python\nplt.figure(figsize = (12, 8))\nplt.plot(x, y, color\
