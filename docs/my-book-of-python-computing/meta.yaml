    \n**注意：** 我们使用了 `square(L)` 函数，后面跟着 `circle(L, 90)` 来绘制一个带弧的正方形。当我们按照斐波那契数列的正方形尺寸重复绘制带弧的正方形时，就生成了斐波那契螺旋。这意味着，我们在一个遍历斐波那契数列的循环中迭代上述\
