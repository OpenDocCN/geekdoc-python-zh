    \ a string.\n- 2. Evaluate a string element, take factorial.\n- 3. Repeat step\
    \ 2 in list comprehension.\n- 4. Compute sum of the list.\n- 5. Compare the sum\
    \ with the original number.\n\n```python\n# Python Script: Strong Number\nfrom\
    \ math import factorial\nN = input('Enter number')\nx = sum([factorial(eval(i))\
    \ for i in N])\nif x == N: print('Strong')\n```\n\nExercise: Discover how many\
    \ strong numbers are there up to 1000000.\n\n## 3 Max, Min\n\nTake a list of numbers\
    \ as input [or accept numbers sequentially through input() function]. Check every\
    \ number if that is greater (or smaller) than the previously assumed max (or min)\
    \ number.\n\nAlgorithm:\n\n- 1. Input: list of numbers\n- 2. Assign first number\
    \ as max (or min)\n- 3. Go to the next number. If this is greater (or smaller)\
    \ than the previous number, call this maximum (minimum).\n- 4. Repeat the step\
    \ 3 in a loop for all the numbers in the list.\n\n```python\n# Python Script:\
    \ # To Find Max and Min\nL = [2, 6, 9, 0, -1]\nmax, min = L[0], L[0]\nfor i in\
    \ L[1:]:\n    if i >= max: max = i\n    if i <= min: min = i\nprint('Max = ',\
    \ max, 'Min = ', min)\n```\n\nNote: **L[0] = 2**, is the 0th element of the list.\
    \ **L[1:]** is the sliced list of elements from index 1 to the end.\n\nWritten\
    \ as Python function:\n\n```python\ndef maxi(L):\n    mx = L[0]\n    for i in\
    \ L[1:]:\n        if i >= mx: mx = i\n    return mx\n```\n\nLet us compare the\
    \ performance of our defined function **maxi()** with respect to the built-in\
    \ function **max()**. We find out maximum from a list (or tuple). We note the\
    \ execution time. For a small list, the difference may not be noticeable. But\
    \ for a very large list of numbers, the difference (in execution time by the two\
    \ ways) will be appreciable.\n\n```python\n# Python Function: To compute time\n\
    def test_time(L):\n    import time\n    # Initial time\n    t1 = time.time()\n\
    \    maximum = maxi(L)\n    # Final time\n    t2 = time.time()\n    return maximum,\
    \ t2 - t1\n```\n\n```python\n# Create a big list of random numbers and test\n\
