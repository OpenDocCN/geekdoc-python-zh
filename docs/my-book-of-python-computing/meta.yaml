    # 8.4 Broadcasting


    Broadcasting refers to the ability of NumPy to treat arrays of different shapes
    during arithmetic operations. Arithmetic operations on arrays are usually done
    between corresponding elements.


    If two arrays are of the same shape, then these operations are smoothly performed.
    But if the dimensions of two arrays are dissimilar, elementto-element operations
    are not possible. However, operations on arrays of dissimilar shapes are still
