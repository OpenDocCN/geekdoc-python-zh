    function which takes an iterable object as input and makes them immutable. The
    elements of the frozen set cannot be modified after creation. Due to this, **frozen
    sets** can be used as keys in Dictionary or as elements of another **set**.


    One can do all set theoretic operations over frozen sets and apply methods as
    are done with ordinary sets.


