    > “Number rules the universe”- Pythagoras


    NumPy is Numerical Python. It is an external package (or Module, mostly written
    in C) developed to work with core Python. NumPy consists of various modules consisting
    of various classes, functions, and parameters. In short, we make use of the NumPy
    library for our scientific and numerical computations. Precompiled mathematical
    and numerical functions and functionalities ensure great execution speed. Powerful
    data structures, multidimensional arrays and vectorized functions enrich Python
    as a great programming language.


    If you are working on Python IDLE interpreter, NumPy (and other external packages)
    needs to be installed over it. The procedure is discussed in Appendix. Various
    Python distributions like Anaconda, Python (x, y) *etc.* come with NumPyand some
    other common packages like SciPy and Matplotlib.


    Once NumPy is installed on the system, we import this on our namespace by the
    same way we do for any module:import numpy.


