    \n## 分形树\n\n取一条直线。将其分成两部分：一部分向左，另一部分向右。这些是分支。现在每个分支都类似地被分割以创建更多分支。这个过程持续到某个层级。我们创建一个递归函数来生成这样的结构。\n\
    \n**算法：**\n1. 向前移动长度：L\n2. 左转 30 度，向前移动 L 的一个固定比例。\n3. 右转 60（30 + 30）度，向前移动 L\
