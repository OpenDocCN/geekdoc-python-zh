    \ = B**, where\n\nA = [[1, 2, -1], [2, 1, 4], [3, 3, 4]], X = [[x₁], [x₂], [x₃]],\
    \ and B = [[1], [2], [1]]\n\nThus, we write, X = A⁻¹B\n\n```python\n# Python Script:\
    \ Solve\nimport numpy as np\n\nA = np.array([[1, 2, -1], [2, 1, 4], [3, 3, 4]])\n\
    B = np.array([1, 2, 1])\nAinv = np.linalg.inv(A)\nX = np.dot(Ainv, B)\nprint(X)\n\
    ```\n\nOutput:\narray([ 7., -4., -2.])\n\n```python\n# Direct Solve\n>>> np.linalg.solve(A,\
    \ B)\narray([ 7., -4., -2.])\n```\n\n```python\n# Eigenvalues, Eigenvectors\n\
    >>> A\narray([[1, 2],\n       [3, 4]])\n>>> np.linalg.eig(A)\n(array([-0.37228132,\
    \ 5.37228132]), array([[-0.82456484, -0.41597356],\n       [ 0.56576746, -0.90937671]]))\n\
    ```\n\n**Note:** The **eig()** function returns a tuple of arrays. The first array\
    \ is a collection of two **eigenvalues** and the second array is a collection\
    \ of two **eigenvectors**. The two columns of the second array are two eigenvectors.\n\
    \n```python\n# Eigenvalues and Eigenvectors unpacked\n>>> u, v = np.linalg.eig(A)\n\
    >>> u  # Eigenvalues\narray([-0.37228132, 5.37228132])\n\n>>> v  # Eigenvectors\n\
    array([[-0.82456484, -0.41597356],\n       [ 0.56576746, -0.90937671]])\n\n# Eigenvalues\n\
    >>> u1, u2 = u\n>>> u1  # Eigenvalue 1\n-0.3722813232690143\n>>> u2  # Eigenvalue\
    \ 2\n5.372281323269014\n\n# Form a diagonal matrix with eigenvalues\n>>> np.diag(u)\
    \  # Diagonal Matrix\narray([[-0.37228132, 0. ],\n       [ 0. , 5.37228132]])\n\
    \n# Eigenvectors\n>>> v[:, 0]  # Eigenvector 1\narray([-0.82456484, 0.56576746])\n\
    >>> v[:, 1]  # Eigenvector 2\narray([-0.41597356, -0.90937671])\n\n# For eigenvalues\
    \ only\n>>> np.linalg.eigvals(A)\narray([-0.37228132, 5.37228132])\n```\n\nFor\
    \ Complex Matrices\n\nThe function **eigh()** computes the eigenvalues and eigenvectors\
    \ of a complex Hermitian or a real symmetric matrix. [Hermitian is a complex square\
    \ matrix which is equal to its own conjugate transpose.]\n\n```python\n# Hermitian\
    \ matrix\n>>> M = np.array([[1, 1+1j, 2j], [1-1j, 4, 2-3j], [-2j, 2+3j, 7]])\n\
    >>> M\narray([[ 1.+0.j,  1.+1.j,  0.+2.j],\n       [ 1.-1.j,  4.+0.j,  2.-3.j],\n\
    \       [-0.-2.j,  2.+3.j,  7.+0.j]])\n\n# To test if Hermitian\n>>> M.conj().T\
    \ == M\narray([[ True,  True,  True],\n       [ True,  True,  True],\n       [\
    \ True,  True,  True]])\n\n# Eigenvalues and Eigenvectors of Hermitian Matrix\n\
    >>> np.linalg.eigh(M)\n(array([-0.66765836, 2.91919537, 9.74846299]), array([[\
    \ 0.78102045+0.j, 0.59215952+0.j, 0.19837883+0.j],\n       [-0.46839474+0.12569175j,\
    \ 0.6949742 -0.0055707j, 0.23041631+0.47822181j],\n       [ 0.1713515 +0.3541944j,\
    \ 0.34470175-0.21796245j, 0.35431906+0.74385218j]]))\n```\n\n**Note:** The function\
    \ **eigh()** returns eigenvalues as real and the eigenvectors as complex as it\
    \ should be the case for a Hermitian matrix.\n\n## Hermitian Conjugate\n\n```python\n\
    >>> M = np.matrix([[1, 1+1j, 2j], [1-1j, 4, 2-3j], [-2j, 2+3j, 7]])\n>>> M.H \
    \ # Hermitian Conjugate\nmatrix([[ 1.-0.j,  1.+1.j, -0.+2.j],\n        [ 1.-1.j,\
    \  4.-0.j,  2.-3.j],\n        [ 0.-2.j,  2.+3.j,  7.-0.j]])\n```\n\n**Note:**\
    \ To find Hermitian conjugate, the array must be in matrix type.\n\n## 8.13 Grid\
