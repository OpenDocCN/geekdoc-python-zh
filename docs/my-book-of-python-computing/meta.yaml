    \ 10}\n```\n\n### 5.4.4 Set Theoretic Operations\n\n```python\n>>> x = {1, 3,\
    \ 5, 7}\n>>> y = {2, 3, 5, 6, 8, 10}\n```\n\n# Union (Take common elements once)\n\
    \n```python\n>>> x|y # With operator\n{1, 2, 3, 5, 6, 7, 8, 10}\n>>> x.union(y)\
