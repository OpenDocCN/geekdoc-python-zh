    # 1.1.1 Variables


    Name of a variable (or any identifier such as class, function, module, or other
    object) can be anything combined with letters, numbers, and some symbols like
    underscore (_) in the keyboard. The special symbols @, $, %, * etc. and the mathematical
    symbols (+, -, / etc.) , cannot be used. Variables are to begin with a letter
    (the upper case or lowercase letters from A to Z) and the names cannot start with
    a number. The names of the variables are, of course, case sensitive. The variable
    names, ‘Xy’, ‘xy’, ‘xY’ are all different. But the names cannot be the words given
    in the following table which are used for system commands and functions. Those
    are Python keywords (in lower case letters) reserved for the use by the system.


    Reserved words:


    and, assert, break, class, continue, def, del, elif, else, except, exec, finally,
    for, from, global, if, import, in, is, lambda, not, or, pass, print, raise, return,
    try, while, with, yield


    # 1.1.2 Numbers


    There are three different kinds of numbers that a computer program usually handles:
    *integer*, *float* (real numbers with decimal part) and *complex* (◆◆ + ◆◆◆◆◆,
    ◆◆ =√−1). Python supports all three kinds.


    I ntegers in Python 3 are of unlimited size. In fact, any large integer of any
    length which may even occupy the entire memory space of the processor is possible.
    [Python 2 has two integer types: - **int** and**long**. There is no ''long integer''
    type in Python 3 anymore.] In addition, Booleans are a subtype of plain integers.


