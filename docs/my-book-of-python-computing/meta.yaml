    \n**math** 和 **cmath** 模块中一些常用于科学编程的数学*函数*，\n\n- **sqrt(x)** → √x\n  示例：`math.sqrt(5)`、`cmath.sqrt(1+2j)`\n\
    - **factorial(n)** → n! = n × (n - 1) × ... × 3 × 2 × 1\n- **ceil(x)** → 上取整：大于等于\
