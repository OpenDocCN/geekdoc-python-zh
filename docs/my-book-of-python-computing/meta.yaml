  md: "NumPy arrays are vectorized. This means, mathematical operations over an array\
    \ will mean the same over each element. The mathematical operations between two\
    \ arrays will correspond to the same between corresponding elements.\n\n# # Matrix\
    \ Addition with NumPy\n\n```\n>>> A = np.array([[1, 2, 3], [4, 5, 6]])\n>>> B\
    \ = np.array([[5, 6, 4], [3, 4, 2]])\n>>> A + B\narray([[6, 8, 7],\n       [7,\
    \ 9, 8]])\n```\n\n**Note:** The addition: A + B corresponds to the addition of\
    \ corresponding elements in them. The display of the resulting array (A + B) on\
    \ interpreter appears as a Matrix.\n\n# # Matrix product with NumPy\n\nIt should\
    \ be noted that the product of two 2D arrays is not a matrix product. Matrix product\
    \ is a special kind of operation where we take row elements of left matrix and\
    \ multiply with corresponding column elements of the right matrix. For matrix\
    \ product, there is a NumPy method called **dot()**.\n\n(1 2 3 1 2\nAB = 4 5 6)\
    \ (3 4)\n5 6\n\n```\n>>> A = np.array([[1, 2, 3], [4, 5, 6]])\n>>> B = np.array([[1,\
    \ 2], [3, 4], [5, 6]])\n>>> np.dot(A, B)\narray([[22, 28],\n       [49, 64]])\n\
    ```\n\nWe can also write,\n\n```\n>>> A.dot(B)\narray([[22, 28],\n       [49,\
    \ 64]])\n```"
