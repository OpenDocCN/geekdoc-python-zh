    \ 0] # 第一列\narray([1, 5, 3, 2, 4])\n# 索引的排序\n>>> ind = np.argsort(x[:, 0])\n>>>\
    \ ind\narray([0, 3, 2, 4, 1], dtype=int64)\n```\n\n```python\n# 通过第一列对行进行排序\n\
    >>> x[ind]\narray([[ 1, 5, 20],\n       [ 2, 4, 38],\n       [ 3, 9, 97],\n  \
    \     [ 4, 6, 90],\n       [ 5, 7, 64]])\n```\n\n```python\n# 通过第二列对行进行排序\n>>>\
