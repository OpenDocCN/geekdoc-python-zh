  mdcn: "# 我的Python计算手册\n\n**阿比吉特·卡尔·古普塔**\n\n版权所有 © 作者保留所有权利\n\n**书名：** 我的Python计算手册\
    \ **作者：** 阿比吉特·卡尔·古普塔博士 **封面设计：** 迪潘卡尔·戈什博士\n\n2021年4月，加尔各答\n\n## 前言\n\n每一段迷人的旅程都始于起点。本书为初学者提供了一段愉快而舒适的旅程。核心Python的概念以清晰明了的方式引入。各节和各章辅以数值示例和图形演示。介绍了一些有用的外部包。借助各种外部模块和包，用Python编写简洁、最小化的代码变得非常高效。数据处理的体验变得神奇，科学计算也大大简化。我希望学生、教师以及任何感兴趣的人都能从本书中受益。\n\
    \n在此，我衷心感谢我所有的学生、同事、朋友以及亲朋好友们对我撰写本书这一项目的支持。希望热切的读者们享受阅读的乐趣。\n\n谢谢。\n\n**阿比吉特·卡尔·古普塔**，加尔各答\n\
    \n## Python之禅\n\n优美胜于丑陋。\n明了胜于隐晦。\n简洁胜于复杂。\n复杂胜于繁琐。\n扁平胜于嵌套。\n稀疏胜于密集。\n可读性很重要。\n\
    特例不足以特殊到可以打破规则。\n尽管实用性胜于纯粹性。\n错误不应该被静默地传递。\n除非明确地被静默。\n面对歧义，拒绝猜测的诱惑。\n应该有一种——最好只有一种——显而易见的方法来做它。\n\
    尽管这种方法起初可能并不明显，除非你是荷兰人。\n现在做总比不做好。\n尽管不做好常常比*现在*做好要好。\n如果实现难以解释，那它就是个坏主意。\n如果实现容易解释，那它可能是个好主意。\n\
    命名空间是一个绝妙的主意——让我们多用用它们！\n\n版权\n\n本文档已置于公共领域。来源：https://github.com/python/peps/blob/master/pep-0020.txt\n\
