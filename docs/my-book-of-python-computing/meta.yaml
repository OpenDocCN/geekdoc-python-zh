- md: "# My Book of Python Computing\n\n**Abhijit Kar Gupta**\n\nCopyright © reserved\
    \ by the Author\n\n**Book:** My Book of Python Computing **Author:** Dr. Abhijit\
    \ Kar Gupta **Cover Design:** Dr. Dipankar Ghosh\n\nApril 2021, Kolkata\n\n##\
    \ Preface\n\nEvery enchanting journey begins from the beginning. This book offers\
    \ an enjoyable and comfortable journey to a beginner. The ideas of Core Python\
    \ are introduced in a lucid way. The sections and chapters are supplemented with\
    \ numerical examples and graphical demonstrations. Some useful external packages\
    \ are introduced. Writing clean and minimal codes in Python becomes highly effective\
    \ with various external modules and packages. The experience of data handling\
    \ turns magical, and doing scientific computation becomes greatly simplified.\
    \ I hope, the students, teachers and any interested person may be benefitted by\
    \ this book.\n\nLet me profusely thank all my students, colleagues, friends, and\
    \ near and dear ones for supporting me in this project of writing this book. Hope,\
    \ the keen readers enjoy reading.\n\nThank you.\n\n**Abhijit Kar Gupta**, Kolkata\n\
    \n## The Zen of Python\n\nBeautiful is better than ugly.\nExplicit is better than\
    \ implicit. Simple is better than complex.\nComplex is better than complicated.\
    \ Flat is better than nested.\nSparse is better than dense.\nReadability counts.\n\
    Special cases aren't special enough to break the rules.\nAlthough practicality\
    \ beats purity. Errors should never pass silently. Unless explicitly silenced.\n\
    In the face of ambiguity, refuse the temptation to guess.\nThere should be one--\
    \ and preferably only one --obvious way to do it.\nAlthough that way may not be\
    \ obvious at first unless you're Dutch.\nNow is better than never.\nAlthough never\
    \ is often better than *right* now.\nIf the implementation is hard to explain,\
    \ it's a bad idea.\nIf the implementation is easy to explain, it may be a good\
    \ idea.\nNamespaces are one honking great idea -let's do more of those!\n\nCopyright\n\
    \nThis document has been placed in the public domain. Source: https://github.com/python/peps/blob/master/pep-0020.txt\n\
