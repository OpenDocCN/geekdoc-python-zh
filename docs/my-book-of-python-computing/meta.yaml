    bullet\\bullet_{232}] ] \\bullet\\bullet_{312} \\bullet\\bullet_{322} \\bullet\\\
    bullet_{332} \\end{aligned}$$\n\n因此，我们可以将其表示为两个矩阵的数组，或者 NumPy 中的三维数组。例如，让我们创建一个张量\
