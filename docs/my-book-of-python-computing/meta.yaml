    \ and circle, c = color, 'k' = black, 'bo' = blue circle, 'r+' = red plus]\n```\n\
    \nWe can do much more. The plotting styles are almost self-explanatory as follows.\n\
    \n```python\n# Plot with various styles\nplt.plot(x, y, c = 'r', ls = '-', lw\
    \ = 3, m = 'o', ms = 16)\nplt.show()\n```\n\n**Fig. 3** Bullet points bigger,\
    \ line width increased [Color is not shown red in print.]\n\nThe abbreviations\
    \ in the plot:\n‘r’ = red, ls = linestyle, lw = linewidth, m = marker, ‘o’ = bullet\
    \ point, ms = markersize\n\n**Matplotlib functions**\n\n- `title()` # Add title\
    \ above the frame\n- `suptitle()` # Super title, add title further above\n- `text()`\
    \ # Add text at a given pos in figure\n- `figtext()` # Add text at a given pos\
    \ in relative coordinates\n- `annotate()` # Add annotation with optional arrow\n\
    - `xlabel()` # Label to x-axis\n- `ylabel()` # Label to y-axis\n- `xlim()` # x-axis\
    \ limits to show\n- `ylim()` # y-axis limits to show\n- `xticks()` # Tick marks\
    \ along x-axis\n- `yticks()` # Tick marks along y-axis\n- `grid()` # Plot with\
    \ grid\n\n```python\nplt.title('Given Title', size = ..)\nplt.text(x-pos, y-pos,\
    \ 'Text', size = ..)\nplt.xlim(min, max)\nplt.ylim(min, max)\nplt.grid()\n```\n\
    \n**Marker Colors**\n**b**(blue), **r**(red), **g**(green), **y**(yellow), **k**(black),\
    \ **m**(magenta), **c**(cyan), **w**(white)\n\nWe can create colors by mixing\
    \ three primary colors **RGB** (Red, Green, Blue). To customize, we need to give\
    \ (**r**, **g**, **b**) as tuple. Also, we can set **mec** = marker edge color.\n\
    \nTo use:\n- For **colors**: `r, g, b = (0.1, 0.3, 0.7)`, each value in tuple\
    \ is in range [0, 1].\n- For **monochrome**: Black (0), ...Grey (0.5),...White\
    \ (1), in this order. With a single number (between 0 to 1), we can create various\
    \ depths of monochrome: from black, to less black to grey...to white.\n\n**Marker\
    \ Styles**\n\nPoint ( .), Plus (+), Thick plus (**P**), Cross (**x**), Thick cross\
    \ (**X**), Star (*), Solid circle (**o**), Solid triangle up (^), Solid triangle\
    \ down (**v**), Solid triangle left (<), Solid triangle right (>), Solid square\
    \ (**s**), Solid pentagon (**p**), Solid hexagon (**h**), Solid hexagon of different\
    \ orientation (**H**), Solid Octagon (**8**), Solid diamond (**D**), Solid diamond\
