  mdcn: "## 5.4 集合\n\n集合是一个包含**无序**且唯一元素的对象。我们可以从其他可迭代对象（如列表或元组）创建一个元素集合。[在列表或元组中，同一个元素可以重复出现，但集合只返回唯一元素。]\n\
    \n**集合**是通过将唯一元素用逗号分隔，放在花括号或大括号 `{}` 中来构造的。使用集合的主要目的是消除重复条目。集合是**可变的**。我们可以更新一个集合以创建一个新的元素集合。\n\
    \n```python\n>>> s = {1, 2, 6, 9} # 一个集合\n>>> type(s)\n<class 'set'>\n\n# 将列表转换为集合\n\
    >>> set([1, 2, 4, 1, 2])\n{1, 2, 4}\n>>> t = (1, 2, 4, 1, 2) # 元组\n>>> set(t)\
    \ # 转换为集合\n{1, 2, 4}\n\n# 二进制字符串\n>>> b = '110011101001'\n\n# 元素集合\n>>> set(b)\n\
    set(['1', '0'])\n```\n\n**注意：** `{}` 不是空集合。它是一个不同的类，称为字典。由于集合是无序的，因此不能对集合进行索引和切片操作。\n\
    \n应用：\n# Python 脚本：一个骰子被投掷 100 次。创建一个结果集合。\n```python\nimport random\nx = [random.randint(1,\
    \ 6) for i in range(100)]\nprint(set(x))\n```\n输出：{1, 2, 3, 4, 5, 6}\n\n### 5.4.1\
    \ 集合的内置函数\n\n```python\n# 大小或长度\n>>> s = {1, 2, 6, 9}\n>>> len(s) # 长度\n4\n```\n\
    \n### 5.4.2 方法\n\n```python\n>>> dir(set)\n['__and__', '__class__', '__contains__',\
    \ '__delattr__', '__dir__', '__doc__',\n'__eq__', '__format__', '__ge__', '__getattribute__',\
    \ '__gt__', '__hash__',\n'__iand__', '__init__', '__init_subclass__', '__ior__',\
    \ '__isub__', '__iter__',\n'__ixor__', '__le__', '__len__', '__lt__', '__ne__',\
    \ '__new__', '__or__',\n'__rand__', '__reduce__', '__reduce_ex__', '__repr__',\
    \ '__ror__', '__rsub__',\n'__rxor__', '__setattr__', '__sizeof__', '__str__',\
    \ '__sub__', '__subclasshook__',\n'__xor__', 'add', 'clear', 'copy', 'difference',\
    \ 'difference_update',\n'discard', 'intersection', 'intersection_update', 'isdisjoint',\
    \ 'issubset',\n'issuperset', 'pop', 'remove', 'symmetric_difference',\n'symmetric_difference_update',\
    \ 'union', 'update']\n```\n\n# 更新\n\n我们可以用集合自身的并集或任何其他可迭代对象（元组、字符串、列表、字典）来更新一个集合。\n\
    \n```python\n>>> s = {1, 2, 6, 9}\n\n# 插入一个集合 {10}\n>>> s.update({10})\n>>> s\
    \ # 集合已更新\n{1, 2, 6, 9, 10}\n\n# 与另一个集合取并集\n>>> s.update({11, 21})\n>>> s\n{1,\
    \ 2, 21, 6, 9, 10, 11}\n\n# 与多种可迭代对象取并集\n>>> s.update([10, 11], {21, 31}, 'name')\n\
    >>> s\n{1, 2, 'e', 6, 9, 10, 11, 'n', 'a', 21, 'm', 31}\n\n# 弹出元素\n>>> s = {2,\
    \ 1, 6, 'x', '12', 0, 1}\n# 移除并返回一个任意元素\n>>> s.pop()\n0\n>>> s.pop()\n1\n\n# 移除一个元素\n\
    >>> s = {2, 1, 6, 'x', '12', 0, 1}\n# 要移除的元素 '6'\n>>> s.remove(6)\n>>> s # 返回无序集合\n\
    {0, 1, 2, 'x', '12', -1}\n\n# 移除元素 '12'\n>>> s.remove('12')\n>>> s\n{0, 1, 2,\
    \ 'x', -1}\n```\n\n### 5.4.3 两个集合相加\n\n加法通过运算符完成。[通过连接（如 x + y）来合并两个集合是不可能的。]\n\
    \n```python\n# 将 y 加到 x\n>>> x |= y\n>>> x\n{1, 2, 3, 5, 6, 7, 8, 10}\n\n# 将 x\
    \ 加到 y\n>>> y |= x\n>>> y\n{1, 2, 3, 5, 6, 7, 8, 10}\n```\n\n### 5.4.4 集合论运算\n\
    \n```python\n>>> x = {1, 3, 5, 7}\n>>> y = {2, 3, 5, 6, 8, 10}\n```\n\n# 并集（取所有唯一元素）\n\
    \n```python\n>>> x|y # 使用运算符\n{1, 2, 3, 5, 6, 7, 8, 10}\n>>> x.union(y) # 也可以使用方法\n\
    {1, 2, 3, 5, 6, 7, 8, 10}\n>>> y.union(x)\n{1, 2, 3, 5, 6, 7, 8, 10}\n```\n\n\
    # 交集（只取共同元素）\n\n```python\n>>> x & y # 使用运算符\n{3, 5}\n>>> x.intersection(y) #\
    \ 使用方法\n{3, 5}\n>>> y.intersection(x)\n{3, 5}\n```\n\n# 差集\n\n```python\n>>> x\
    \ - y\n{1, 7}\n>>> y - x\n{8, 2, 10, 6}\n```\n\n# 对称差集\n\n```python\n>>> x ^ y\n\
    {1, 2, 6, 7, 8, 10}\n>>> x.symmetric_difference(y)\n{1, 2, 6, 7, 8, 10}\n>>> y.symmetric_difference(x)\n\
    {1, 2, 6, 7, 8, 10}\n```\n\n### 5.4.5 子集\n\n```python\n>>> x <= y\nFalse  # x\
    \ 不是 y 的子集\n>>> a = {1, 2}\n>>> b = {1, 2, 5, 6}\n>>> a <= b\nTrue  # a 是 b 的子集\n\
    ```\n\n### 5.4.6 冻结集合\n\n冻结集合只是 Python 集合对象的**不可变**版本（集合是可变的，这意味着可以添加或删除元素）。`frozenset()`\
    \ 是一个内置函数，它接受一个可迭代对象作为输入并使其不可变。冻结集合的元素在创建后不能被修改。因此，**冻结集合**可以用作字典的键或另一个**集合**的元素。\n\
    \n可以对冻结集合执行所有集合论运算，并应用与普通集合相同的方法。\n\n```python\n>>> s = {1, 2, 5}\n\n# 普通集合的更新\n\
    >>> s.update([7, 9])\n>>> s\n{1, 2, 5, 7, 9}\n\n# 冻结集合\n>>> s = frozenset(s)\n\
