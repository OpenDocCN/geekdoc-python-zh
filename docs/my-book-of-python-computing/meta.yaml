    # 5.1 List


    A list is an iterable object. It is a collection of items (numbers, strings or
    any other iterable) separated by commas and put inside square brackets [ ]. List
    is **mutable**, that means we can alter a list. [Basically, a list is a data structure
    in Python that is an **ordered sequence** of items and is changeable.]


    ```

    # List of numbers

    >>> A = [3, 2.5, 4.0, -1, 5, 0] >>> type(A)

    <class ''list''>


    # List of names

    >>> B =

    [''Sima'', ''Zakir'', ''Alex'', ''Mita'']

    # Mixed list

    >>> C = [10, [1, 2], ''a2'', ''*@'']

    ```


    **Note:** Alphabetic element or anything that is not a pure number, is to be put
    inside two quotes. Such a thing is a string.


    ```

    # Print or display


    >>> print(A)

    [3, 2.5, 4.0, -1, 5, 0]

    >>> B

    [''Sima'', ''Zakir'', ''Alex'', ''Mita'']

    ```


    **Note:** To display on interpreter, we need not always useprint()function.


    Elements written between two square brackets separated by commas will be treated
    as an object called list. Any iterable (a collection of elements) can be converted
    into a list by the builtin function named **list()**.


    ```

    # List by list()function


    >>> x = ''abc123'' # String >>> list(x) # String to list [''a'', ''b'', ''c'',
    ''1'', ''2'', ''3'']

    ```'
