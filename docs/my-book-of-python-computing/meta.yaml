    ## 5.7 比较与搜索\n\n```python\n# 比较可迭代对象\n```\n\n当比较两个元组或列表时，它只检查每个的*第一个元素*。如果两者的第一个元素相等，则考虑*第二个元素*，依此类推。输出以布尔值\
    \ True 和 False 返回。\n\n```python\n>>> t1 = (2, 7, 1)  # 元组\n>>> t2 = (5, 0, 2)\n\
    >>> t1 > t2\nFalse\n>>> t1 < t2\nTrue\n\n>>> x1 = [2, 7, 1]  # 列表\n>>> x2 = [2,\
    \ 0, 2]\n>>> x1 > x2\nTrue\n>>> x1 < x2\nFalse\n```\n\n```python\n# 搜索\n```\n\n\
    通过成员运算符 'in' 进行搜索会返回布尔值 True 和 False。\n\n```python\n>>> 5 in x1\nFalse\n>>> 0\
    \ in t2\nTrue\n\n>>> D = {'a':2, 'b':4, 'c':6}\n>>> 2 in D\nFalse\n\n# 仅通过键搜索\n\
    >>> 'c' in D\nTrue\n```\n\n```python\n# 使用内置函数检查\n```\n\n有时检查一个可迭代对象是否包含元素 0，或者是否为空，是很有用的。\n\
    \n```python\nx = [1, 2, 0, 3]\n>>> all(x)\nFalse\n>>> any(x)\nTrue\n```\n\n**注意：**\n\
    \n- 如果所有元素的 bool() 值都为 True，则 all() 返回 True。\n- 如果至少有一个元素的 bool() 值为 True，则 any()\
    \ 返回 True。\n\n空对象（无参数）的 **bool()** 或 bool(0) 返回 False，否则返回 True。\n\n## 5.8 复制对象\n\
    \n无复制\n在 Python 中，我们经常如下复制一些对象。\n\n```python\n>>> x = 2\n>>> y = x\n>>> id(x)\n\
    140720007485120\n>>> id(y)\n140720007485120\n```\n\n然而，这不是真正的复制。我们为同一个对象创建了一个新的引用，这从两个名称具有相同的标识符可以看出，而我们并未意识到这一点。如果我们现在将\
    \ x 赋值为另一个数字，id(x) 会变成新的，但假定的副本 y 保留了旧的值和标识符。\n\n对于像列表、元组 *等等* 这样的可变对象，情况并非如此。让我们创建一个列表\
    \ x，将其复制到 y，然后修改 x 看看会发生什么。\n\n```python\n>>> x = [1, 2, 3]\n>>> y = x\n# 更改 x\
    \ 中的一个元素\n>>> x[0] = 10\n\n# x 发生了变化\n>>> x\n[10, 2, 3]\n# y 也发生了变化\n>>> y\n[10,\
    \ 2, 3]\n```\n\n**注意：** y 并不是 x 的真正副本。要进行真正的复制，我们使用内置的 copy() 或导入 copy 模块。\n\n\
    浅复制\n\n```python\n>>> import copy\n>>> x = [1, 2, 3]\n# x 的真正副本 y\n>>> y = copy.copy(x)\n\
    ```\n\n我们现在可以更改 x 的任何元素或向其添加新元素，复制的列表 y 保持不变。然而，这只是浅复制。让我们检查一个嵌套列表的情况。\n\n```python\n\
    >>> x = [[1, 2], [3, 4]]\n>>> y = copy.copy(x)\n# x 中的一个元素被更改\n>>> x[0][1] = 0\n\
    >>> x  # 新的 x\n[[1, 0], [3, 4]]\n>>> y\n[[1, 0], [3, 4]]\n```\n\n[副本 y 也发生了变化。]\n\
    \n浅复制对于像嵌套列表这样的对象存在问题。它创建了一个新的集合对象，但嵌套元素（子对象）实际上并未被复制（这只是一层深度），它们仍然引用旧的对象。因此，更改一个元素也会在副本中显示出来。但是，如果向\
    \ x 追加新元素，旧元素不会被更改。那么 y 保持不变。\n\n深复制\n\n真正的深复制是在创建一个新的集合对象时进行的，该对象递归地填充从原始对象中获取的子对象。\n\
    \n```python\n>>> x = [[1, 2], [3, 4]]\n# 深复制\n>>> y = copy.deepcopy(x)\n\n# x\
    \ 中的一个元素被更改\n>>> x[0][1] = 0\n>>> x  # 新的 x\n[[1, 0], [3, 4]]\n>>> y\n[[1, 2],\
    \ [3, 4]]\n```\n\n[副本 y 未改变。]\n\n练习：\n\n1.  编写一行 Python 指令，找出 1 到 1000 之间所有奇数的和。\n\
