    \n```\n# 海龟移动时不留下痕迹\n>>> penup()\n# 移动到位置 (0, -100)\n>>> goto(0, -100)\n# 放下画笔开始绘制\n\
    >>> pendown()\n# 向前移动200步。\n>>> fd(200)\n# 检查位置\n>>> pos()\n(200.00, -100.00)\n\
    # 移动到位置 (200, 300)\n>>> goto(200, 300)\n# 再次检查位置\n>>> pos()\n(200.00, 30.00)\n\
    # 返回原点\n>>> home()\n# 当前位置\n>>> pos()\n(0.00, 0.00)\n```\n\n# 海龟的形状\n\n```\n#\
    \ 指针看起来像一只海龟\nshape('turtle')\n# 方形头部\nshape('square')\n# 默认的箭头头部\nshape('classic')\n\
    ```\n\n# 速度（海龟绘制的快慢）\n\n```\nspeed('fastest')\nspeed('fast')\nspeed('normal')\n\
    speed('slow')\nspeed('slowest')\n```\n\n此外，也可以使用1到10的数字作为参数，来设置不同的绘制和转向动画速度。\n\
    \n# 可见性\n\n```\n# 可以让海龟不可见。\nhideturtle()\nshowturtle()\n```\n\n# 设置画布\n\n```\n\
    # 设置屏幕\nScreen()\n# 设置画布大小\nscreensize(800, 600)\n# 屏幕/画布大小\nsetup(width = 600,\
    \ height = 600)\n# 背景颜色\nbgcolor('green')\n```\n\n# Python脚本：绘制十字\n\n```\nspeed('slowest')\n\
    for i in range(4):\n    fd(100)\n    rt(90)\n    fd(100)\n    lt(90)\n    bk(100)\n\
    \    rt(90)\n```\n\n**注意：** 我们设置 `speed('slowest')` 是为了能清晰地观察绘制过程。\n\n# Python函数：等边三角形\n\
    \n```\ndef triangle(L):\n    for i in range(3):\n        fd(L)\n        lt(120)\n\
    \    return\n# 边长为100的等边三角形\n>>> triangle(100)\n```\n\n# Python函数：六边形\n\n```\n\
    def hexagon(L):\n    for i in range(6):\n        fd(L)\n        lt(60)\n    return\n\
    # 绘制边长为100的六边形\n>>> hexagon(100)\n```\n\n# 通用多边形\n\n```\ndef polygon(L, n):\n\
    \    angle = int(360/n)\n    for i in range(n):\n        fd(L)\n        lt(angle)\n\
    \    return\n```\n\n# 绘制多边形\n\n```\npolygon(100, 4) # 正方形\npolygon(100, 6) # 六边形\n\
    polygon(100, 8) # 八边形\n```\n\n我们可以用多边形创建图案。函数 `square()` 和 `polygon()` 可用于创建各种设计。我们可以创建背景颜色，用彩色画笔绘图等。\n\
    \n# 多边形图案\n\n```\nspeed(10)\nfor i in range(50):\n    polygon(100, 4)\n    lt(10)\
    \ # 多边形左转10度\n```\n\n![多边形图案](img/a1e407e9a2dd6440cb0c413013408aa5_139_0.png)\n\
    \n**图.** 多边形图案\n\n# Python脚本：绘制四个彩色方框。\n\n```\nbgcolor('black') # 背景黑色\nwidth(4)\
    \ # 线条宽度\npenup()\ngoto(-200, 0)\npendown()\ncolors = ['red', 'yellow', 'orange',\
    \ 'purple']\nfor i in range(4):\n    color(colors[i]) # 选择颜色\n    square(50) #\
    \ 绘制正方形\n    penup()\n    fd(100)\n    pendown()\n```\n\n# 用颜色填充正方形\n\n```\nbegin_fill()\n\
    # 用黄色填充\nfillcolor('yellow')\n# 边长为100的正方形\nsquare(100)\nend_fill()\n```\n\n#\
    \ Python脚本：绘制盒子\n\n```\nfrom turtle import *\nspeed('slowest')\nsquare(100)\n\
    lt(30)\nfd(100)\nrt(30)\nsquare(100)\nlt(90)\nfd(100)\nlt(90+30)\nfd(100)\nrt(30+180)\n\
    fd(100)\nlt(30)\nfd(100)\nrt(90+30)\nfd(100)\nrt(60)\n```\n\n![绘制盒子](img/a1e407e9a2dd6440cb0c413013408aa5_141_0.png)\n\
    \n```\nfd(100)\n```\n\n提示：放慢速度并跟随步骤，以了解立方体是如何被绘制出来的。\n\n# Python脚本：螺旋正方形\n\n```\n\
    bgcolor('black')\npencolor('yellow')\nwidth(3)\nfor n in range(200, 20, -20):\n\
