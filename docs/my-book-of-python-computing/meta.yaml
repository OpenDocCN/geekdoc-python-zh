    ```

    >>> a = **input(''Enter values \n'')** Enter values

    2, -3, 4.5

    >>> a # 这是一个字符串 ''2, -3, 4.5''

    ```


    要获取输入变量的数值，我们需要通过 **eval()** 函数对输入字符串进行求值。此外，对于多个输入，我们需要通过 **split()** 分割字符串，或者应用
    **eval()** 然后解包。


    ```

