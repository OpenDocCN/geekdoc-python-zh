    \ 分形\n\n规则分形是一种自相似的几何对象。这意味着，我们在所有尺度上都能看到相同的模式。我们通过重复相同的规则来创建规则的几何分形。为此，我们使用递归函数。\n\
    \n## 递归函数示例\n```python\ndef fact(n):\n    if(n == 0):\n        return 1\n    return\
    \ n * fact(n - 1)\n```\n\n**注意：** 函数 `fact()` 被定义为计算一个数的阶乘：n! = n × (n - 1)× ...\
