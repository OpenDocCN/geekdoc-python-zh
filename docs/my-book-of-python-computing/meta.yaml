- img_proc: true
  md: 'Python has two parallel versions: **Python 3.x** and **Python 2.x**. This book
    is written with Python 3.x syntaxes.


    In Python 3.x, the strings are in unicode whereas in Python 2.x, the strings are
    stored as ASCII. At the user level, there are only a few differences between the
    two versions. The installation of either of the versions is not difficult. Also,
    two parallel versions can coexist on a same machine. One can work in any version
    and can switch over to another version with ease where only a few changes in syntaxes
    are to be made.


    # Some user-level differences

    **Python 3.x Python 2.x**


    **print** print(‘Pyth on String’) print ‘Python String’


    **print(x, y) print x, y**

    **input x = input() x = input()**


    The input() returns a string.

    The input() returns the type as given.


    Another type, **raw_input()** returns a string.


    **division** 5/2 = 2.5 = 2 (quotient only)


    **range** The **range()** function creates a range of numbers.


    **5.0/2 = 2.5** [For result in fraction, At least one of numerator or denominator
    must be in float.]

    The **range()** function returns a list.


    The type is range. It can be converted to a list or tuple.


    Another kind, **xrange()** is equivalent to range() in Python 3.x.


    Most of the releases in Python 2.x are stable. The latest releases/ versions in'
  merge: -1
  pgno: 373
- img_proc: true
  md: 'Python 3.x are in developing stages. In short, Python 2.x is a legacy and Python
    3.x is the future.


    **input()** in Python 2.x and Python 3.x:


    ```

    # Python 2.x


    x, y, z = **input(''Enter values \n'')** Enter values

    2, -3, 4.5

    ```


    ```

    # Python 3.x


    x, y, z = **eval(input(''Enter val \n''))** Enter val

    2, -3, 4.5

    ```


    In Python 3.x, every input is treated as string. [The **raw_input()** function
    of Python 2.x is equivalent to **input()**in Python 3.x.]


    ```

    >>> a = **input(''Enter values \n'')** Enter values

    2, -3, 4.5

    >>> a # This is a string ''2, -3, 4.5''

    ```


    To get the numerical value of the input variable, we need to evaluate the input
    string through **eval()** function. Also, for multiple inputs, we need to split
    the string through **split()** or we apply**eval()** and then unpack.


    ```

    >>> x, y, z = **eval(a)** >>> x

    2

    >>> y

    -3

    >>> z

    4.5

    ```


