    \n```\n# 内积\n>>> u = np.array([1, 2, 3]) >>> v = np.array([-1, 0, 1]) >>> np.inner(u,\
    \ v)\n2\n```\n\n```\n# 叉积\n>>> np.cross(u, v) array([ 2, -4, 2])\n```\n\n**注意：**\
    \ 上述方法可以视为两个向量 u 和 v 之间的内积（标量积）和叉积（向量积）。\n\n内积：**u.v** = Σ u_i v_i = 1 ×(-1)+\
    \ 2 × 0 + 3 × 1 = 2\n叉积：\n**u×v** = | 1 2 3 | = i(2)+ j(-4)+ k(2) -1 0 1\n\n应用：\n\
    一个平行六面体的体积，其三条边由三个向量给出：\n**a** = 2i - 3j, **b** = i + j - k, **c** = 3i - k\n\
    体积 = **a**.(**b** × **c**) = 4（任意单位）\n\n```\n# Python 脚本\nimport numpy as np\n\
    A = np.array([2, -3, 0])\nB = np.array([1, 1, -1])\nC = np.array([3, 0, -1])\n\
    vol = np.inner(A, np.cross(B, C)) print(vol)\n```\n\n### 8.8.1 多维数组的乘积\n\n```\n\
    # 二维数组与标量之间的内积\n>>> np.inner(np.eye(3), 5)) array([[5., 0., 0.],\n[0., 5., 0.],\n\
