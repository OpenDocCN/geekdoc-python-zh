    \ 1，直到 n = 0。\n\n## 科赫曲线\n\n让我们通过取一条线并对其重复应用某些规则来创建一个分形。假设这条线的长度为 L。将其分成三个相等的部分：L/3。现在取出中间部分，并用两个这样的线段替换它们，这两个线段连接形成一个等边三角形。这个任务在所有线段上重复进行，经过多代演化。下面，我们展示了从左边一条直线演化而来的两代。[以瑞典数学家\
    \ Helge von Koch 命名。]\n\n![科赫曲线](img/a1e407e9a2dd6440cb0c413013408aa5_152_0.png)\n\
    \n**图.** 从左到右的图形可以称为阶数为 0、1、2 的科赫曲线。\n\n**算法：**\n1. 输入一条长度为 L 的线。\n2. 海龟向前移动 L/3。\n\
    3. 左转 60 度，向前移动 L/3。\n4. 右转 120 度，向前移动 L/3。\n5. 左转 60 度，向前移动 L/3。\n6. 重复步骤 2-5。\n\
    \n## Python 递归函数：科赫曲线\n```python\ndef koch(L, n):\n    \"\"\"\n    绘制科赫曲线。L =\
    \ 尺寸，n = 阶数\n    \"\"\"\n    if n == 0:\n        fd(L) # 直线\n    else:\n     \
    \   koch(L/3, n-1) # 前进 1/3\n        lt(60)\n        koch(L/3, n-1)\n        rt(120)\n\
    \        koch(L/3, n-1)\n        lt(60)\n        koch(L/3, n-1)\n```\n\n## Python\
    \ 脚本：绘制科赫曲线\n```python\npenup() # 抬起画笔\ngoto(-250, 0) # 将画笔移动到\npendown() # 放下画笔开始绘制\n\
    width(2) # 线宽\nkoch(500, 4) # 科赫曲线，阶数 4\nhideturtle() # 隐藏海龟/箭头\n```\n\n![4 阶科赫曲线](img/a1e407e9a2dd6440cb0c413013408aa5_153_0.png)\n\
