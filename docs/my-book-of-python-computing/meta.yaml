    # 2.5 Module for Random Numbers


    Random numbers are those which appear randomly and have no correlations among
    them. We come across random numbers in Nature. In electrical noise, in atomic
    vibrations or in Brownian motions of molecules, we get random variations in some
    quantities that we measure. They do not follow any definite pattern, or we can
    say, there is no mathematical law that can bind the sequence of numbers. The occurrences
    of random numbers may follow a certain distribution, but they appear randomly.
    In the study of many natural phenomena and in computer modeling of them, the random
    numbers play important roles. So, we need to access a set of random numbers for
    our study. Moreover, in the subject of Cryptography, random numbers play a big
    role.


