    \ abbreviations. Also, arguments can be put without keyword names when placed\
    \ at appropriate positions. For example,\n\n```python\n# line and circle, color\
    \ black\nplt.plot(x, y, '-o', c = 'k')\n# Plot with blue, circle markers\nplt.plot(x,\
