    Algorithm:\n\n1. Input: a positive integer\n2. Take an integer in the range [1,\
    \ (n - 1)]\n3. Find GCD between n and m\n4. Test if GCD = 1, calculate x, y, z\
    \ from the formulas.\n\n```python\n# Pythagorean Triplets by Euclid's formula\
    \ (m, n -> Coprime)\nn = eval(input('Give a number \\n'))\n\nfor m in range(1,\
    \ n):\n    if gcd(n, m) == 1:\n        x = n*n - m*m\n        y = 2*n*m\n    \
    \    z = n*n + m*m\n        print(x, y, z)\n```\n\nOutput:\n\n```\nGive a number\n\
    3\nPythagorean triplets 8 6 10\n5 12 13\n```\n\n## 14 Number Conversion\n\n###\
    \ Decimal Integer to Binary\n\nBase 10 system —> Base 2 system. To convert, we\
    \ divide the decimal number by 2 and continue downwards, divide each new quotient\
    \ by 2 and write the remainders to the right of each dividend. It is done when\
    \ the quotient is 1.\n\nFor example, for the decimal number 156₁₀ is converted\
    \ into a binary number 10011100₂.\n\nAlgorithm: (For Integer)\n\n1. Input number\
    \ as a string\n2. Divide the number by 2 (modulo 2), store the remainder.\n3.\
    \ Add remainder to string (concatenation)\n4. Take the quotient (integer) for\
    \ the next step.\n5. Repeat steps 3 - 5 while the quotient is greater than 0.\n\
    6. Invert the string to get the resulted binary number\n\n```python\nn = eval(input('Enter\
    \ the Decimal number \\n'))\ndef bin_int(n):\n    b = str() # Empty string\n \
    \   while n > 0:\n        res = n%2\n        # Added to the string\n        b\
    \ += str(res)\n        n = n//2 # floor division\n    return b[::-1] # reversed\n\
    print(bin_int(n))\n```\n\n### Decimal Fraction to Binary\n\nFor the conversion\
    \ of fractional part, we need to multiply by 2 and collect integer part (either\
    \ 0 or 1) of the product. Separate out the fractional part and do this repeatedly.\n\
    \n```python\n# Decimal Fraction to Binary\nfrom math import modf\nn = eval(input('Enter\
    \ fract \\n'))\n\ndef bin_frac(n):\n    b = str()\n    i = 1\n    while n > 0:\n\
    \        n = n*2\n        frac, intg = modf(n)\n        b += str(int(intg))\n\
    \        n = frac\n        i = i + 1\n        # Tried up to 6 digits\n       \
    \ if i > 6:\n            break\n    return b\n```\n\nNote: The **modf()** function\
    \ in **math** module splits the decimal and fractional part of a number.\n\n```python\n\
