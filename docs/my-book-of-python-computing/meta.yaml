    \n## 8.2.11 Trace\n\nTrace of a 2D array or matrix is the sum of its diagonal\
    \ elements. We can give offset reference to pick some diagonal (Main diagonal\
    \ or any off diagonal on the up and down directions).\n\n```python\n>>> A\narray([[-1,\
    \ -4, -2, 6],\n       [-8, 3, 6, -4],\n       [-6, -4, 4, -6],\n       [ 9, -1,\
    \ 3, -9]])\n```\n\n```python\n# Sum of elements on main diagonal\n>>> np.trace(A)\n\
    -3\n```\n\n```python\n# On 1st upper off-diagonal\n>>> np.trace(A, offset = 1)\n\
    -4\n```\n\n```python\n# On 2nd upper off-diagonal\n>>> np.trace(A, 2)\n-6\n```\n\
    \n```python\n# On 1st lower off-diagonal\n>>> np.trace(A, -1)\n-9\n```\n\n```python\n\
    # On 2nd lower off-diagonal\n>>> np.trace(A, -2)\n-7\n```\n\n## 8.2.12 Sorting\n\
    \n```python\n>>> x = [-2, 0, 3, 1, 10, 5, -7]\n```\n\n```python\n# Ascending order\n\
    >>> np.sort(x)\narray([-7, -2, 0, 1, 3, 5, 10])\n```\n\n```python\n# Descending\
    \ order\n>>> np.sort(x)[::-1]\narray([10, 5, 3, 1, 0, -2, -7])\n```\n\n**Note:**\
    \ The NumPy method **sort()** creates a new sorted list (or array) in ascending\
    \ order. Original list remains unchanged. To get a sorted list in descending order,\
    \ we used the NumPy slicing method to reverse the sorted list (which resulted\
    \ in ascending order).\n\n```python\n# For higher dimensional arrays\n>>> L\n\
    array([[-6, -4, 7, 5, 6],\n       [ 0, 9, 1, 4, -1],\n       [ 4, 8, 5, 0, 2],\n\
    \       [ 8, 1, -2, 3, 6]])\n```\n\n```python\n# Sorting columns, ascending\n\
    >>> np.sort(L, 0)\narray([[-6, -4, -2, 0, -1],\n       [ 0, 1, 1, 3, 2],\n   \
    \    [ 4, 8, 5, 4, 6],\n       [ 8, 9, 7, 5, 6]])\n```\n\n```python\n# Sorting\
    \ rows, ascending\n>>> np.sort(L, 1)\narray([[-6, -4, 5, 6, 7],\n       [-1, 0,\
    \ 1, 4, 9],\n       [ 0, 2, 4, 5, 8],\n       [-2, 1, 3, 6, 8]])\n```\n\n```python\n\
    # Note: np.sort(L) # Default axis = 1\n```\n\nIn the following, three columns\
    \ (x, y, z) data is represented by a 2D array. Our task is to sort the data/array\
    \ through a column while keeping the corresponding entries in the other columns\
    \ to reposition accordingly. This means, the rows will be sorted according to\
    \ a column entry. The NumPy method is **argsort()**.\n\n```python\n>>> x\narray([[\
    \ 1, 5, 20],\n       [ 5, 7, 64],\n       [ 3, 9, 97],\n       [ 2, 4, 38],\n\
    \       [ 4, 6, 90]])\n>>> x[:, 0] # First Column\narray([1, 5, 3, 2, 4])\n# Sorting\
    \ of indices\n>>> ind = np.argsort(x[:, 0])\n>>> ind\narray([0, 3, 2, 4, 1], dtype=int64)\n\
    ```\n\n```python\n# Sorting rows through 1st column\n>>> x[ind]\narray([[ 1, 5,\
    \ 20],\n       [ 2, 4, 38],\n       [ 3, 9, 97],\n       [ 4, 6, 90],\n      \
    \ [ 5, 7, 64]])\n```\n\n```python\n# Sorting rows through 2nd column\n>>> x[np.argsort(x[:,\
    \ 1])]\narray([[ 2, 4, 38],\n       [ 1, 5, 20],\n       [ 4, 6, 90],\n      \
    \ [ 5, 7, 64],\n       [ 3, 9, 97]])\n```\n\nThe method **argsort()** returns\
    \ the indices that would sort an array.\n\n```python\n>>> L = np.array([10, 8,\
    \ 12])\n# Position indices that would sort\n>>> ind = np.argsort(L)\n>>> ind\n\
    array([1, 0, 2], dtype=int64)\n```\n\n```python\n# Sorted through index positions\n\
    >>> L[ind]\narray([8, 10, 12])\n```\n\n## 8.3 Arithmetic Operations\n\nMathematical\
    \ operations between two arrays correspond to that between corresponding elements\
    \ of the arrays.\n\n```python\n>>> x = np.array([1, 2, 3, 4])\n>>> y = np.array([5,\
    \ 6, 7, 8])\n>>> x + y\narray([ 6, 8, 10, 12])\n>>> x - y\narray([-4, -4, -4,\
    \ -4])\n>>> x * y\narray([ 5, 12, 21, 32])\n>>> x/y\narray([0.2 , 0.33333333,\
    \ 0.42857143, 0.5 ])\n>>> x**y\narray([ 1, 64, 2187, 65536], dtype=int32)\n>>>\
    \ x**2 + y**3\narray([126, 220, 352, 528], dtype=int32)\n```\n\nThe operations\
    \ between higher dimensional arrays are carried out in the same way. Addition\
    \ of two 2D arrays can be considered as mathematical Matrix addition.\n\n```python\n\
    # Matrix Addition\n>>> A\narray([[1, 2],\n       [3, 4]])\n>>> B\narray([[5, 6],\n\
    \       [7, 8]])\n>>> A + B # Matrix Addition\narray([[ 6, 8],\n       [10, 12]])\n\
    >>> np.add(A, B) # By NumPy method\narray([[ 6, 8],\n       [10, 12]])\n```\n\n\
    **Note:** We can do operations between NumPy arrays and other iterables. The items\
    \ of the iterable will have operations with the corresponding elements of the\
    \ array. For example,\n\n```python\n# The list added with every row\n>>> A + [10,\
