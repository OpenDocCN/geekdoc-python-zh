    | **print(x, y)** | print(x, y) | print x, y |

    | **input** | x = input() | x = input() |


    input() 返回一个字符串。

    input() 返回给定的类型。


    另一种类型 **raw_input()** 返回一个字符串。


    **除法** 5/2 = 2.5 = 2（仅商）


    **range** **range()** 函数创建一个数字范围。


    **5.0/2 = 2.5** [要得到分数结果，分子或分母中至少有一个必须是浮点数。]

    **range()** 函数返回一个列表。


    类型是 range。它可以转换为列表或元组。


    另一种类型 **xrange()** 等同于 Python 3.x 中的 range()。


    Python 2.x 的大多数版本都是稳定的。Python 3.x 的最新版本/版本仍处于开发阶段。简而言之，Python 2.x 是遗留版本，而 Python
    3.x 是未来。


