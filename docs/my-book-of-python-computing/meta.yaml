    \ portion and replace it with two such segments which are then joined to form\
    \ an equilateral triangle. This task is repeated on all segments through many\
    \ generations. In the following, we show two generations that evolved from a straight\
    \ line on the left. [Named after Swedish mathematician Helge von Koch.]"
