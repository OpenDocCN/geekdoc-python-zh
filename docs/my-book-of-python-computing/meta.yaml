    \  print('Continue')\n```\n\n## 4 Sorting a List\n\n### Bubble Sort\n\nBubble\
    \ sort is the simplest sorting algorithm that works by repeatedly swapping the\
    \ neighboring elements if they are in wrong order. Let us look at the following\
    \ demonstrations for the list: **[6, 2, 9, 0, 1]**\n\n**First Pass**\n[**6, 2**,\
    \ 9, 0, 1] → [2, 6, 9, 0, 1] Swap\n[2, **6, 9**, 0, 1] → [2, 6, 9, 0, 1] No swap\n\
    [2, 6, **9, 0**, 1] → [2, 6, 0, 9, 1] Swap\n[2, 6, 0, **9, 1**] → [2, 6, 0, 1,\
    \ 9] Swap\n\n**Second Pass**\n[**2, 6**, 0, 1, 9] → [2, 6, 0, 1, 9] No swap\n\
    [2, **6, 0**, 1, 9] → [2, 0, 6, 1, 9] Swap\n[2, 0, **6, 1**, 9] → [2, 0, 1, 6,\
    \ 9] Swap\n\n**Third Pass**\n[**2, 0**, 1, 6, 9] → [0, 2, 1, 6, 9] Swap\n[0, **2,\
    \ 1**, 6, 9] → [0, 1, 2, 6, 9] Swap\n\n**Fourth Pass**\n[**0, 1**, 2, 6, 9] →\
    \ [0, 1, 2, 6, 9] No Swap\n\n```python\n# Bubble sort (ascending order)\nL = [6,\
    \ 2, 9, 0, 1]\n\ndef bubble(L):\n    n = len(L)\n    for i in range(n):\n    \
    \    for j in range(n-i-1):\n            if L[j] > L[j+1]:\n                #\
    \ Swap\n                L[j], L[j+1] = L[j+1], L[j]\n    return L\n\nprint('Sorted\
    \ list = ', bubble(L))\n```\n\nOutput:\nSorted list = [0, 1, 2, 6, 9]\n\n**Note:**\
