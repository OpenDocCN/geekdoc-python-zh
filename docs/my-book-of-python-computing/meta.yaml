    \ B\narray([[5, 6],\n[7, 8]])\n>>> np.inner(A, B)\narray([[17, 23],\n[39, 53]])\n\
    [各自元素之间的乘积]\n```\n\n**注意：** 高维数组之间的内积是各轴上对应元素乘积的和。例如，在上面的例子中，\n\n1 × 5 + 6 × 2\
    \ = 17, 1 × 7 + 2 × 8 = 23, 3 × 5 + 4 × 6 = 39, 3 × 7 + 4 × 8 = 53.\n\n### 8.8.2\
    \ 类矩阵乘积\n\n```\n>>> A = np.array([[1, 2], [3, 4]]) >>> B = np.array([[5, 6], [7,\
    \ 8]])\n\n# AB（实际的矩阵乘积） >>> np.dot(A, B)\narray([[19, 22],\n[43, 50]])\n>>> np.dot(B,\
    \ A) # BA array([[23, 34],\n[31, 46]])\n```\n\n**注意：** 我们也可以写成属性形式，A.dot(B), B.dot(A)。\n\
    \n```\n# 使用特殊符号的乘积 >>> A@B # 类矩阵乘积\narray([[19, 22], [43, 50]])\n```\n\n**注意：**\
    \ 对于两个向量（一维数组），np.inner() 的内积和 np.dot() 的矩阵乘积是相同的。\n\n```\n# 向量点积\n\n>>> u = np.array([1,\
    \ 2, 3]) >>> v = np.array([-1, 0, 1]) >>> np.vdot(u, v)\n2\n```\n\n**注意：** 向量点积是对应元素乘积的和。对于上面的例子，$1\
    \ \\times(-1)+ 2 \\times 0 + 3 \\times 1 = 2$。\n\n# 高维向量的点积\n\n```\n>>> A = np.array([[1,\
    \ 2], [3, 4]]) >>> B = np.array([[5, 6], [7, 8]]) >>> np.vdot(A, B)\n70\n```\n\
    \n**注意：** 方法 np.vdot() 总是返回一个标量。在高维情况下，首先将数组展平为一个向量，然后应用内积规则（或向量点积）。\n\n对于上面的例子，$1\
    \ \\times 5 + 2 \\times 6 + 3 \\times 7 + 4 \\times 8 = 70$（逐元素操作）。\n\n### 8.8.3\
