    I wish to learn Python."""

    ''I am a beginner.\nI wish to learn Python.''

    ```


    ```

    >>> print("""I am a beginner. I wish to learn Python.""") I am a beginner.

    I wish to learn Python.

    ```


    **注意：** 在三重引号下创建新行是可能的。当然，这次我们需要使用 `print()` 函数来正确写入，如下所示。当直接在解释器上写入时，它产生了一行中间带有
    \n 的内容。这意味着，它识别了一个新行，但没有 `print()` 就无法正确表示。


    在三重引号内，我们可以放置像 \t、\n 这样的转义字符来分别创建水平制表符和新行。


    ```

    >>> print("""\t I am a beginner. \n \t I wish to learn Python.""") I am a beginner.

    I wish to learn Python.

    ```


    练习：运用以上知识，以诗歌形式（带有适当的空格和行）写出 *The Zen of Python*。


