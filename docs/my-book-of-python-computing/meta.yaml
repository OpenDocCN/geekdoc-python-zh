    ### First order: dy/dx + P(x)y = Q(x)


    ```python

    >>> m, g, k = 1, 9.8, 1

    >>> t = Symbol(''t'')

    >>> v = Function(''v'')

    >>> sol = dsolve(Eq(m*v(t).diff(t) + k*v(t), m*g), v(t))

    >>> sol # Solution ??(??)= ??_1??^-1.0??+ 9.8

    >>> sol.lhs # Left hand side ??(??)

    >>> sol.rhs # Right hand side ??_1??^-1.0??+ 9.8

    # Apply initial condition, find ??_1

    # Let us substitute ??(0)= 0.

    >>> C1_value = solve(sol.rhs.subs(t, 0))[0]

    >>> C1_value # Value of ??_1

    -9.8

    # Substitute the value of ??_1, find solution

    >>> C1 = Symbol(''C1'')

    >>> sol = sol.subs(C1, C1_value)

    >>> sol

    ??(??)= 9.8 - ??_1??^-1.0??

    # Plot the solution

    >>> from matplotlib import pyplot as plt

