    ## 10 Check Leap Year\n\nEarth takes 365 days, 5 hours, 48 minutes, and 45 seconds\
    \ – to revolve once around the Sun. But our Gregorian calendar considers 365 days\
    \ in a year. So, a leap day is regularly added (to the shortest month February)\
    \ in every 4 years to bring it in sync with the Solar year. After 100 years our\
    \ calendar does have a round off by around 24 days.\n\nIn the Gregorian calendar\
    \ three criteria must be considered to identify leap years:\n\n- The year can\
    \ be evenly divided by 4;\n- If the year can be evenly divided by 100, it is NOT\
    \ a leap year, unless;\n- The year is also evenly divisible by 400. Then it is\
    \ a leap year.\n\nThis means that in the Gregorian calendar, the years 2000 and\
