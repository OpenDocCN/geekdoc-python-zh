- md: "## Core Python\n\n## CHAPTER 1\n\n## Fundamental Ideas\n\n> “The joy of coding\
    \ Python should be in seeing short, concise, readable classes that expresses a\
    \ lot of action in a small amount of clear code – not in terms of trivial code\
    \ that bores the reader to death.” - Guido van Rossum\n\nThis book follows **Python\
    \ 3** syntaxes. Python is a high-level computer language which has now become\
    \ one of World’s most popular programming languages. The syntaxes are very simple\
    \ and minimal so that we can write clean and beautiful Python codes. There are\
    \ several other advantages over the other existing high-level languages that we\
    \ shall eventually know.\n\nPython has become exceptionally adaptable language\
    \ of our time. Tremendous applications are found in Basic Science, Engineering,\
    \ Data Science, Data Management, Machine learning (ML), Deep Learning, Networking,\
    \ Web Applications *etc*. Enormous number of scientific modules have been developed.\
    \ Python is an open-source programming language with huge community support.\n\
    \nUnlike FORTRAN, C, C++, and other languages, it is an interpreter-based language.\
    \ As we keep writing each line on the Python interpreter or Python shell, it is\
    \ being executed (or interpreted) in contrast to most other languages where the\
    \ entire program must be compiled first, at one go. Many often, of course, we\
    \ need to write a standard program or code which is usually longer than a few\
    \ lines. In that case, we write the programs (Python scripts) in a file and then\
    \ execute (‘run’) it. Computing in Python works with both functional programming\
    \ and Object-Oriented Programming (OOP) ways.\n\nWhy Python? In short:\n\n- Powerful\
    \ programming language, easy to learn\n- Efficient high dimensional Data Structure\n\
    - Clean Syntax, Code readability\n- Object Oriented, imperative, functional computation\n\
    - Programs are portable.\n- Open Source\n- Great Community Support\n- Interpreter\
    \ based language\n\nWhat is about the name Python?\n\nThe name ‘Python’ is not\
    \ from a snake (as the Python logo might suggest)! The name ‘Python’ originated\
    \ from the famous BBC comedy serial ‘Monty Python’. *Guido van Rossum*, the originator\
    \ of Python, is very fond of this popular comedy serial. So, Guido kept this name\
    \ as he finished his project of writing a new computing language.\n\nHow to install\
    \ Python?\n\nRegarding installation and versions of Python, see Appendix. We can\
    \ install any version. There are only a very few differences between the two versions\
    \ (Python 2.x and Python 3.x) from user’s point of view. Some discussions in this\
    \ regard are also made in Appendix A. In this edition of the book, we follow **Python\
    \ 3.x** version (In the first edition, we followed Python 2.x.). One can install\
    \ (and uninstall) any version easily on the machine and then can begin to type.\
    \ In fact, the two versions may also coexist on the same machine.\n\nYou may directly\
    \ go to the official site of Python (www.python.org) and download any stable version.\
    \ Later, you may decide to install external packages as and when required. Also,\
    \ there are some distributions like Anaconda, Python (x, y) *etc.* which come\
    \ with core Python along with some common external packages (*e.g.*, NumPy, SciPy,\
    \ Matplotlib).\n\nBefore we begin to write a Python code, we should be familiar\
    \ with the essential tools– syntaxes, variables, numbers, operators, methods,\
    \ logical and loop structures, data structures, and other ideas.\n\n## 1.1 Variables,\
    \ Numbers, Operators\n\nWriting a Python program is easy. It is very close to\
    \ the human language and it follows the logic that we understand. Python comes\
    \ with minimal syntaxes. We shall try to write beautiful and clean codes with\
    \ Python.\n\n### 1.1.1 Variables\n\nName of a variable (or any identifier such\
    \ as class, function, module, or other object) can be anything combined with letters,\
    \ numbers, and some symbols like underscore (_) in the keyboard. The special symbols\
    \ @, $, %, * etc. and the mathematical symbols (+, -, / etc.) , cannot be used.\
    \ Variables are to begin with a letter (the upper case or lowercase letters from\
    \ A to Z) and the names cannot start with a number. The names of the variables\
    \ are, of course, case sensitive. The variable names, ‘Xy’, ‘xy’, ‘xY’ are all\
    \ different. But the names cannot be the words given in the following table which\
    \ are used for system commands and functions. Those are Python keywords (in lower\
    \ case letters) reserved for the use by the system.\n\nReserved words:\n\nand,\
    \ assert, break, class, continue, def, del, elif, else, except, exec, finally,\
    \ for, from, global, if, import, in, is, lambda, not, or, pass, print, raise,\
    \ return, try, while, with, yield\n\n### 1.1.2 Numbers\n\nThere are three different\
    \ kinds of numbers that a computer program usually handles: *integer*, *float*\
    \ (real numbers with decimal part) and *complex* (◆◆ + ◆◆◆◆◆, ◆◆ =√−1). Python\
    \ supports all three kinds.\n\nIntegers in Python 3 are of unlimited size. In\
    \ fact, any large integer of any length which may even occupy the entire memory\
    \ space of the processor is possible. [Python 2 has two integer types: - **int**\
    \ and **long**. There is no 'long integer' type in Python 3 anymore.] In addition,\
    \ Booleans are a subtype of plain integers.\n\n- **Integer**\n  [Examples: 236,\
    \ -123]\n- **Float** (or floating point numbers)\n  [Examples: 13.25, 0.0, -13.23,\
    \ 1.2e-10, 3.85e12 ]\n- **Complex**\n  [Examples: 5j, 9.8j, 3+2j, 1.2e-10j]\n\
    - **Long**\n  [Examples: Any integer that ends with ‘l’ or ‘L’. 123L will be treated\
    \ as long in Python 2.]\n- **Boolean**\n  True, False\n\n**Note:**\n\nThe integers\
    \ are positive or negative whole numbers. Long integers are integers of unlimited\
    \ size (written as integers followed by upper- or lower-case L). The Max value\
    \ of the default int in Python 2 is 65535, anything above that will be a long.\n\
    \nIn the calculations, as it often happens that there are all kinds of numbers\
    \ mixed up. The system will understand in what number the result will be delivered,\
    \ in a clever way. If all the numbers are integers, the result is an integer.\
    \ If at least one is real in the mixture of real and integer, the result will\
    \ be in real. If there is a presence of a complex number, the result will be in\
    \ complex. Of course, we can explicitly set the type of a variable to ‘integer’,\
    \ ‘real’ or ‘complex’.\n\n### 1.1.3 Operators\n\nMathematical Operators\nConsider\
    \ two variables ‘x’ and ‘y’. The following operations are with x = 10, y = 2\n\
    \n**Addition (+):** x + y = 12\n**Subtraction (-):** x – y = 8\n**Multiplication\
    \ (*):** x * y = 20\n**Division(/):** x/y = 5.0\n**Modulo (%):** x%y = 0 [Remainder:\
    \ when x is divided by y]\n**Power or Exponent (**):** x ** y = 100\n**Floor Division\
    \ (//):**\nExample, 7.5//2 = 3.0, where 7.5/2 = 3.75\n\nApart from mathematical\
    \ operators we encounter other kinds of operators too.\n\nComparison Operators\n\
    \n- == Equal to\n- != Not equal to\n- <> Less than and Greater than\n- < Less\
    \ than\n- > Greater than\n- >= Greater than equal to\n- <= Less than equal to\n\
    \nMembership Operators in, not, as\n\n## 1.2 Typing on Python Interpreter Hello\
    \ World!\n\nLet us begin to type on Python IDLE **interpreter (>>>)** or command\
    \ line [IDLE = Integrated Development and Learning Environment]. We type some\
    \ line or some instruction on the interpreter and then ‘Enter’ key to execute.\
    \ The line that appears below is the output or some message that it returns. [Sometimes,\
    \ nothing returns as output which indicates that the instruction is accepted without\
    \ error. Else, we may get an error message.]\n\nWe must type anything from the\
    \ start (from the first column) on interpreter or inside any Python shell. We\
    \ are not allowed to press ‘space bar’ before we write. In the latter case, it\
    \ will raise error.\n\nEach line is an instruction. A set of Python instructions\
    \ will form a Python code. We can write the lines in a file which is usually called\
    \ *Python script*. Python scripts (programs or codes) are automatically saved\
    \ with extension .py. Example: somefile.py\n\nLearning of every Computer language\
    \ begins with typing **‘Hello World’**! Let us also type:\n>>> **print(‘Hello\
    \ World!’)**\nHello World!\n\n**Note:** print() is a function (a built-in function),\
    \ in which we give the string, ‘Hello World!’ as argument. We get ‘Hello World!’\
    \ in return, as output.\n\n### 1.2.1 Writing a Single Line"
  mdcn: "## 核心Python\n\n## 第一章\n\n## 基本概念\n\n> “编写Python的乐趣在于看到简短、简洁、可读性强的类，它们用少量清晰的代码表达出丰富的功能——而不是用那些让读者感到乏味的琐碎代码。”\
    \ - 吉多·范罗苏姆\n\n本书遵循**Python 3**语法。Python是一种高级计算机语言，如今已成为世界上最流行的编程语言之一。其语法非常简单且精炼，使我们能够编写出清晰优美的Python代码。相较于其他现有的高级语言，它还有许多其他优势，我们最终会了解到。\n\
    \nPython已成为我们这个时代适应性极强的语言。在基础科学、工程、数据科学、数据管理、机器学习（ML）、深度学习、网络、Web应用*等*领域都有广泛的应用。已经开发了大量的科学模块。Python是一种开源编程语言，拥有庞大的社区支持。\n\
    \n与FORTRAN、C、C++和其他语言不同，它是一种基于解释器的语言。当我们逐行在Python解释器或Python shell上编写时，代码会被执行（或解释），而大多数其他语言则需要先一次性编译整个程序。当然，很多时候我们需要编写一个标准程序或代码，通常比几行要长。在这种情况下，我们将程序（Python脚本）写在一个文件中，然后执行（“运行”）它。Python计算同时支持函数式编程和面向对象编程（OOP）方式。\n\
    \n为什么选择Python？简而言之：\n\n- 强大的编程语言，易于学习\n- 高效的高维数据结构\n- 清晰的语法，代码可读性强\n- 面向对象、命令式、函数式计算\n\
    - 程序可移植。\n- 开源\n- 强大的社区支持\n- 基于解释器的语言\n\n关于Python这个名字？\n\n“Python”这个名字并非来自蛇（尽管Python的标志可能暗示如此）！“Python”这个名字源于著名的BBC喜剧连续剧《蒙提·派森》。Python的创始人*吉多·范罗苏姆*非常喜欢这部流行的喜剧连续剧。因此，吉多在完成编写新计算语言的项目时保留了这个名字。\n\
    \n如何安装Python？\n\n关于Python的安装和版本，请参阅附录。我们可以安装任何版本。从用户的角度来看，两个版本（Python 2.x和Python\
    \ 3.x）之间只有非常小的差异。附录A中也对此进行了一些讨论。在本书的这一版中，我们遵循**Python 3.x**版本（在第一版中，我们遵循Python\
    \ 2.x）。人们可以轻松地在机器上安装（和卸载）任何版本，然后开始输入。事实上，两个版本也可以在同一台机器上共存。\n\n您可以直接访问Python的官方网站（www.python.org）下载任何稳定版本。之后，您可以根据需要决定安装外部包。此外，还有一些发行版，如Anaconda、Python\
    \ (x, y) *等*，它们包含核心Python以及一些常见的外部包（*例如*，NumPy、SciPy、Matplotlib）。\n\n在我们开始编写Python代码之前，我们应该熟悉基本工具——语法、变量、数字、运算符、方法、逻辑和循环结构、数据结构以及其他概念。\n\
    \n## 1.1 变量、数字、运算符\n\n编写Python程序很容易。它非常接近人类语言，并遵循我们理解的逻辑。Python具有最简语法。我们将尝试用Python编写优美而清晰的代码。\n\
    \n### 1.1.1 变量\n\n变量（或任何标识符，如类、函数、模块或其他对象）的名称可以是键盘上字母、数字和一些符号（如下划线_）的任意组合。特殊符号@、$、%、*等以及数学符号（+、-、/等）不能使用。变量必须以字母（A到Z的大写或小写字母）开头，名称不能以数字开头。变量名当然是区分大小写的。变量名‘Xy’、‘xy’、‘xY’都是不同的。但名称不能是下表中给出的单词，这些单词用于系统命令和函数。它们是Python关键字（小写字母），保留供系统使用。\n\
