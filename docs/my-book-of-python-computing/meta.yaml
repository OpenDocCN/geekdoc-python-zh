    \ = 5\n- **exp(x)** → 指数函数：\n  示例：`math.exp(3)`、`cmath.exp(2+1j)`\n- **log(x)**、**log10(x)**\
    \ → 自然对数、以 10 为底的对数\n  示例：`math.log(2)`、`cmath.log(1+2j)`\n- **sin(x)**、**cos(x)**、**tan(x)**、**cot(x)**\
