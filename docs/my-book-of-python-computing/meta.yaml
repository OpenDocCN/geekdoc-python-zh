    # Scatter plot with other function\nplt.scatter(x, y)\n```\n\nWe can create any\
    \ matplotlib plot by creating a figure and axes.\n\n```python\n# Create new object\
    \ fig\nfig = plt.figure()\nax = plt.axes()\n```\n\nThe ‘figure’ can be thought\
    \ of as a single container and the ‘axes’ creates the frame of axes with ticks\
    \ etc. After this, we can refer ‘fig’ and ‘ax’ every time we add something. Most\
    \ plt functions translate directly to ax methods such as `plt.plot` —> `ax.plot()`,\
    \ `plt.xlabel()` —> `ax.xlabel()`, `plt.xlim()` —> `ax.set_xlim()`, `plt.title()`\
    \ —> `ax.set_title()`.\n\n**Style with keyword arguments**\n\nWe can format the\
    \ plot with various keywords (inside plot function) for line style, line width,\
    \ maker style, maker size etc.\n\n```python\n# Plot with line, marker, color\n\
    plt.plot(x, y, linestyle = '-', marker = 'o', color = 'black')\nplt.show()\n```\n\
    \n**Fig. 2** Modification over Fig.1. Plots are with bullet point markers and\
