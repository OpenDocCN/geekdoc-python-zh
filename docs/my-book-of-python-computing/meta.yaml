    \       [[3, 4],\n        [7, 8]]])\n```\n\n**注意：** **stack()** 的参数应该是元组或列表。结果数组会转换为更高维度。可以理解为我们堆叠二维平面来制作一个三维盒子。\n\
    \n```python\n>>> x.shape  # 二维 (2, 2)\n>>> y.shape  # 二维 (2, 2)\n>>> z.shape\n\
