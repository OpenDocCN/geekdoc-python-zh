    \ 20, 30])\n\n# Converted to a list\n>>> a.tolist()\n[10, 20, 30]\n```\n\n###\
    \ 8.1.1 Built-in Functions on Arrays\n\nFunctions and methods in `__builtins__`\
    \ in core Python apply on NumPy arrays.\n\n```python\n>>> type(x)  # Type of object\n\
    <class 'numpy.ndarray'>\n\n>>> len(x)   # Length: No. of elements\n3\n\n>>> sum(x)\
    \   # Sum of elements\n60\n```\n\n**Note:** The type ‘numpy.ndarray’ means n-dimensional\
    \ NumPy array. Arrays of higher dimensions can be dealt with this function.\n\n\
    ### 8.1.2 Methods and Attributes\n\n#### As method: Size of array\n\n```python\n\
    >>> np.size(x)\n3\n\n# As attribute\n>>> x.size\n3\n```\n\n```python\n# Dimension\
    \ of array\n>>> np.ndim(x)\n1\n\n>>> x.ndim\n1\n```\n\n```python\n# Shape of the\
    \ array\n>>> np.shape(x)\n(3,)  # a tuple (1D)\n\n>>> x.shape\n(3,)\n```\n\n```python\n\
    >>> x.dtype  # Data Type\ndtype('int32')\n```\n\n```python\n# Size of each item\
