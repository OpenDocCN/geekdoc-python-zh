    **Note:**


    The integers are positive or negative whole numbers. Long integers are integers
    of unlimited size (written as integers followed by upper- or lower-case L). The
    Max value of the default int in Python 2 is 65535, anything above that will be
    a long.


    In the calculations, as it often happens that there are all kinds of numbers mixed
    up. The system will understand in what number the result will be delivered, in
    a clever way. If all the numbers are integers, the result is an integer. If at
    least one is real in the mixture of real and integer, the result will be in real.
    If there is a presence of a complex number, the result will be in complex. Of
    course, we can explicitly set the type of a variable to ‘integer’, ‘real’ or ‘complex’.


    # 1.1.3 Operators


    Mathematical Operators

    Consider two variables ‘x’ and ‘y’. The following operations are with x = 10,
    y = 2


    **Addition (+):** x + y = 12 **Subtraction (-):** x – y = 8

    **Multiplication (*):** x * y = 20 **Division(/):** x/y = 5.0


    **Modulo (%):** x%y = 0 [Remainder: when x is divided by y]

    **Power or Exponent (**):** x ** y = 100

    **Floor Division (//):**

    Example,7.5//2 = 3.0, where 7.5/2 = 3.75'
