    **SymPy** is **Symbolic Python**. We do symbolic calculations (as are done with
    pen and paper) with this. The output symbols. [For is returned in mathematical'
- md: 'module references and documentation, consult:

    docs.sympy.org/latest/modules.]


    In this brief chapter on SymPy, we try to introduce some essential ideas and features.
    SymPy is a huge independent library. Many important mathematical projects are
    developed based on this. The readers may explore them as and when needed for their
    work. The following (inside the box) is from SymPy documentation in

    www.sympy.org/en/index.html.

    About


    > ‘SymPy is a Python Library for symbolic mathematics. It aims to become a full-featured
    computer algebra system (CAS) while keeping the code as simple as possible in
    order to be comprehensible and easily extensible. SymPy is written entirely in
    Python.’


    ```

    # Import everything from SymPy

    >>> from sympy import *

    # Check the directory

    >>> dir(sympy)

    # For fancy printing

    >>> init_printing()

    ```


    **Note:** It is not a good practice to import everything in namespace. But here
    we imported everything to make the next instructions appear minimal, for demonstration
    purpose.


    ## 10.1 Symbols, Expressions, Calculations


    ```

    # Symbolic representations

    >>> pi

    π

    >>> sqrt(3)

    √3

    >>> a = sqrt(3)


    # Evaluate in floating point number

    >>> a.evalf()

    1.73205080756888

    >>> cos(pi)

    -1

    >>> acos(-1)

    π

    ```


    ## Algebraic Expressions

    # Define symbols


    ```

    >>> x, y, z = symbols(''x, y, z'')

    >>> y*exp(x) + z**2

    y*e^x + z²

    ```


    ```

    >>> a, b = 19, 38

    >>> Rational(a, b) # Ratio

    1/2

    ```


    ```

    >>> x**Rational(2, 3)

    x^(2/3)

    ```


    ## Expressions with trigonometric functions, Greek symbols


    ```

    >>> a, b, c = symbols(''alpha, beta, gamma'')

    >>> sin(a) + log(b**c)/sqrt(b)

    sin(α) + log(β^γ)/√β

    ```


    ## Simplification of Mathematical expressions


    ```

    >>> x, y = symbols(''x, y'')

    >>> a = x**3 + 2*x**2 + 5*x

    >>> b = 2*x**3 - 2*x**2 + 4*x

    >>> c = simplify((b - a)/(b + a))

    >>> c

    (x² - 4x - 1)/(3(x² + 3))

    ```


    ## Evaluating expression

    # Substitute 1 in place of x


    ```

    >>> c.subs(x, 1)

    -1/3

    ```


    ## Multiple substitutions


    ## Many symbols


    ```

    >>> x, y, z = symbols(''x, y, z'')

    >>> a = x**2 + x*y + z

    >>> a.subs([(x, 2), (y, -1), (z, 1)])

    3

    ```


    ```

    # Numerical evaluation of a builtin function

    >>> x = Symbol(''x'')

    >>> f = lambdify(x, sin(x), ''math'')

    >>> f(0.5)

    0.479425538604

    ```


    **Note:** lambdify() converts the function sin() taken from math module.


    ```

    # Simplification of trigonometric and other expressions

    >>> simplify(sin(x)**2 + cos(x)**2)

    1

    >>> simplify(4*sin(x)*sin(pi/3 - x)*sin(pi/3 + x))

    sin(3x)

    ```


    ```

    # Trigonometric simplifications by trigsimp()

    >>> trigsimp(4*sin(x)*sin(pi/3 - x)*sin(pi/3 + x))

    sin(3x)

    ```


    ```

    # Factor cancellation

    >>> cancel((x**2 + 2*x + 1)/(x**2 + x))

    (x + 1)/x

    ```


    ```

    # Factorization

    >>> x = symbols(''x'')

    >>> f = x**2 - 5*x + 6

    >>> factor(f)

    (x - 3)(x - 2)

    ```


    ```

    # Expansion

    >>> expand(x*(2*x+3))

    2x² + 3x

    >>> expand((cos(x) + sin(x))**2)

    sin²(x) + 2sin(x)cos(x) + cos²(x)

    ```


    ## Trigonometric Expansion


    ```

    >>> expand_trig(sin(x+y))

    sin(x)cos(y) + sin(y)cos(x)

    >>> expand_trig(cot(x+y))

    (cot(x)cot(y) - 1)/(cot(x) + cot(y))

    ```


    ```

    # Rewriting Trigonometric expression

    # tan(x) written in terms of sin(x)

    >>> tan(x).rewrite(sin)

    2sin²(x)/sin(2x)

    ```


    ## Factorial, Binomial combination


    ```

    >>> n, k = symbols(''n, k'')

    >>> factorial(n)

    n!

    >>> binomial(n, k)

    (n, k)

    ```


    ## Simplification of combinatorial


    ```

    >>> combsimp(binomial(n, n-1)/binomial(n, n-2))

    2/(n - 1)

    ```


    ## Beta, Gamma function, Hypergeometric function


    ```

    >>> beta(x, y) # Beta function B(x, y)

    >>> beta(x, 1)

    1/x

    >>> gamma(z) # Gamma function Γ(z)

    # Hypergeometric function

    >>> hyper([1,2], [3], z)

    ₂F₁(1, 2; 3; z)

    >>> hyperexpand(hyper([1,2], [3], z))

    -2z - 2log(1 - z)

    ```


    **Note:** SymPy contains all kinds of special functions, Dirac Delta function,

    Heaviside function, class of Singularity functions, all kinds of Gamma functions
    (digamma, trigamma, polygama), error integral, Fresnel integral, Sine integral,
    logarithmic integral, elliptic integral and many more.


    ```

    # Infinite series: Taylor Series Expansion around x0 = 0

    >>> exp(x).series(x, x0 = 0)

    1 + x + x²/2 + x³/6 + x⁴/24 + x⁵/120 + O(x⁶)

    >>> log(x).series(x, x0 = 2)

    log(2) - 1 - (x - 2)²/2 + (x - 2)³/24 - (x - 2)⁴/192 + (x - 2)⁵/1600 + O((x -
    2)⁶; x -> 2)

    # Declare function and expand

    >>> f = Function(''f'')

    >>> f = sin(x)/x

    >>> f.series(x, x0 = 0)

    1 - x²/6 + x⁴/120 + O(x⁶)

    # Algebraic equation, solve

    >>> Eq(x**2 - 5*x + 3, 0)

    x² - 5x + 3 = 0

    >>> solve(x**2 - 5*x + 3) # Root finding

    [5/2 - sqrt(13)/2, 5/2 + sqrt(13)/2]

    # System of equations, Solve

    >>> x, y = symbols(''x, y'')

    >>> solve((x + y - 4, x - y - 2), x, y)

    {x: 3, y: 1}

    ```


    ## 10.2 Matrix


    ```

    # Column Matrix

    >>> Matrix([1, 2, 3])

    [1]

    [2]

    [3]

    >>> Matrix([[1, 2, 3], [4, 5, 6], [7, 8, 9]])

    [1 2 3]

    [4 5 6]

    [7 8 9]

    ```


    Matrix operations:


    ```

    >>> A = Matrix([[1, 2, 3], [4, 5, 6], [7, 8, 9]])

    >>> B = Matrix([[1, 0, 1], [1, 2, -1], [3, 1, 4]])

    ```


    ```

    # Shape, Rows, Columns

    >>> A.shape

    (3, 3)

    ```


    ```

    >>> A.row(1) # Row 1

    [4 5 6]

    >>> A.col(0) # Column 0

    [1]

    [4]

    [7]

    ```


    ```

    # Addition

    # Addition of two matrices

    >>> A + B

    [2 2 4]

    [5 7 5]

    [10 9 13]

    ```


    ```

    # Product

    >>> A * B

    [12 7 11]

    [27 16 23]

    [42 25 35]

    ```


    ```

    # Inverse of Matrix

    >>> B**-1

    [9/4 1/4 -1/4]

    [-7/4 1/4 1/2]

    [-5/4 -1/4 1/2]

    ```


    ```

    >>> B*B**-1 # To check

    [1 0 0]

    [0 1 0]

    [0 0 1]

