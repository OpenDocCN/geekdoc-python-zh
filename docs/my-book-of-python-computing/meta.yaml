- md: "## 5.5.3 Create a Dictionary\n\nA dictionary can be created by built-in object\
    \ **dict()** from a list of pairs(x, y). The pairs can be in the form of tuple\
    \ or list or set *etc*. Each pair is converted to a key:value item.\n\n```python\n\
    # items\n>>> a = [(1, 10), (2, 20), (3, 30), (4, 40)]\n>>> dict(a)\n{1: 10, 2:\
    \ 20, 3: 30, 4: 40}\n\n>>> x = [('a', 2), ('b', 4), ('c', 6)]\n>>> dict(x)\n{'a':\
    \ 2, 'b': 4, 'c': 6}\n\n>>> color = [['red', 2], ['green', 4], ['blue', 6]]\n\
    >>> dict(color)\n{'red': 2, 'green': 4, 'blue': 6}\n```\n\n## 5.5.4 Dictionary\
    \ Comprehension\n\nLike list comprehension, we can also make dictionary comprehension\
    \ [The for-loop or logical structures can be put inside curly brackets.].\n\n\
    Examples\n\n```python\n>>> X = {i: i+2 for i in range(5)}\n>>> X\n{0: 2, 1: 3,\
    \ 2: 4, 3: 5, 4: 6}\n\n>>> Y = {k: k**2 + k for k in range(1, 6)}\n>>> Y\n{1:\
    \ 2, 2: 6, 3: 12, 4: 20, 5: 30}\n\n>>> color = ['red', 'blue', 'green']\n>>> {c.upper():\
    \ c.lower() for c in color}\n{'RED': 'red', 'BLUE': 'blue', 'GREEN': 'green'}\n\
    ```\n\nApplication\n\nCreate a dictionary of sin(π) vs. π in the interval [-2π,\
    \ 2π].\n\n```python\nfrom math import pi, sin\nsint = {i*pi: sin(i*pi) for i in\
    \ range(-2, 3)}\nprint(sint)\n```\n\nOutput: (after round off)\n{-6.28: 0.0, -3.14:\
    \ -0.0, 0.0: 0.0, 3.14: 0.0, 6.28: -0.0}\n\n## 5.5.5 Nested Dictionary\n\nWe can\
    \ have dictionary inside a dictionary. The keys or values of a dictionary can\
    \ themselves be dictionaries. In fact, the keys and values can be anything.\n\n\
    ```python\n>>> X = {'A': {'a': 1, 'b': 2}, 'B': {'c': 3, 'd': 4}}\n>>> X.keys()\n\
    dict_keys(['A', 'B'])\n>>> X.values()\ndict_values([{'a': 1, 'b': 2}, {'c': 3,\
    \ 'd': 4}])\n>>> X['A']\n{'a': 1, 'b': 2}\n>>> X['B']\n{'c': 3, 'd': 4}\n>>> X['A']['a']\n\
    1\n>>> X['B'].values()\ndict_values([3, 4])\n```\n\nProblem: Given a nested Dictionary,\
    \ iterate over the items and show the keys and values.\n\n```python\npeople =\
    \ {101: {'Name': 'Bhola', 'Age': '21', 'Sex': 'Male'}, 102: {'Name': 'Puchi',\
    \ 'Age': '18', 'Sex': 'Female'}}\n\nfor identity, info in people.items():\n  \
    \  print('\\nId No.:', identity)\n    for key in info:\n        print(key + ':\
    \ ' + info[key])\n```\n\nOutput:\nId No.: 101\n\nName: Bhola\nAge: 21\nSex: Male\n\
    \nId No.: 102\nName: Puchi\nAge: 18\nSex: Female\n\n## 5.6 Packing, Unpacking\n\
    \nThis is a very useful python concept that we often use in our codes. Any iterable\
    \ (list, string, tuple, set or dict) can be thought of as **packing** of some\
    \ elements under a variable name.\n\nWe can **unpack** the elements by assigning\
    \ the variable name to equal number of variable names. So, the corresponding elements\
    \ will be assigned to the variables one-to-one.\n\n```python\n>>> x = '235'  #\
    \ Packing as string\n>>> a, b, c = x  # Unpacking\n>>> a\n'2'\n>>> b\n'3'\n>>>\
    \ c\n'5'\n\n>>> t = (2, 3, 5)  # Packing as tuple\n>>> a, b, c = t  # unpacking\n\
    \n>>> L = [2, 3, 5]  # Packing as list\n>>> a, b, c = L  # Unpacking\n\n# Packing\
    \ as dictionary\n>>> D = {'x':2, 'y':3, 'z':5}\n>>> a, b, c = D  # Unpacking\n\
    >>> a\n'x'\n>>> b\n'y'\n>>> c\n'z'\n```\n\n**Note:** For a dictionary, unpacking\
    \ returns the keys only.\n\n## 5.7 Compare and Search\n\n```python\n# Comparing\
    \ iterables\n```\n\nWhen two tuples or lists are compared, it checks the *first\
    \ elements* of each only. In case the first elements in both are equal then the\
    \ *second elements* are considered and so on. The output is returned in Boolean\
    \ True and False.\n\n```python\n>>> t1 = (2, 7, 1)  # tuple\n>>> t2 = (5, 0, 2)\n\
    >>> t1 > t2\nFalse\n>>> t1 < t2\nTrue\n\n>>> x1 = [2, 7, 1]  # list\n>>> x2 =\
    \ [2, 0, 2]\n>>> x1 > x2\nTrue\n>>> x1 < x2\nFalse\n```\n\n```python\n# Searching\n\
    ```\n\nSearching through membership operator ‘in’ returns Boolean True and False.\n\
    \n```python\n>>> 5 in x1\nFalse\n>>> 0 in t2\nTrue\n\n>>> D = {'a':2, 'b':4, 'c':6}\n\
    >>> 2 in D\nFalse\n\n# Searching through keys only\n>>> 'c' in D\nTrue\n```\n\n\
    ```python\n# Checking with built-ins\n```\n\nIt is sometimes useful to check an\
    \ iterable whether it contains element 0, or if it is empty.\n\n```python\nx =\
    \ [1, 2, 0, 3]\n>>> all(x)\nFalse\n>>> any(x)\nTrue\n```\n\n**Note:**\n\n- all()\
    \ returns True if bool() of all the elements are True.\n- any() returns True if\
    \ bool() of at least one element is True.\n\nThe **bool()** of empty object (no\
    \ argument) or bool(0) returns False, otherwise True.\n\n## 5.8 Copy Objects\n\
    \nNo copy\nIn Python, we often copy some object as follows.\n\n```python\n>>>\
    \ x = 2\n>>> y = x\n>>> id(x)\n140720007485120\n>>> id(y)\n140720007485120\n```\n\
    \nHowever, this is not a real copy. We created a new reference for the same object\
    \ which is evident from the same identity for two names which we do not realize.\
    \ If we now assign x to another number, the id(x) becomes new but the assumed\
    \ copy, y retains the old value and identity.\n\nThe same is not true for a mutable\
    \ object like list, tuple *etc*. Let us create a list x, copy it to y and then\
    \ alter x to see what happens.\n\n```python\n>>> x = [1, 2, 3]\n>>> y = x\n# Change\
    \ one element in x\n>>> x[0] = 10\n\n# x changes\n>>> x\n[10, 2, 3]\n# y also\
    \ changes\n>>> y\n[10, 2, 3]\n```\n\n**Note:** y is not really a copy of x. For\
    \ real copy, we use built-in copy() or import copy module.\n\nShallow copy\n\n\
    ```python\n>>> import copy\n>>> x = [1, 2, 3]\n# Real copy y of x\n>>> y = copy.copy(x)\n\
    ```\n\nWe can now change any element of x or add new element to it, the copied\
    \ list y remains unchanged. However, this is just a shallow copy. Let us check\
    \ this for a nested list.\n\n```python\n>>> x = [[1, 2], [3, 4]]\n>>> y = copy.copy(x)\n\
    # One element in x changed\n>>> x[0][1] = 0\n>>> x  # New x\n[[1, 0], [3, 4]]\n\
    >>> y\n[[1, 0], [3, 4]]\n```\n\n[The copy y also changes.]\n\nThe shallow copy\
    \ poses a problem for objects like a nested list. It creates a new collection\
    \ object but the nested elements (the child objects) are not actually copied (This\
    \ is only one level deep.), they refer to the old. So, changing an element will\
    \ also show up in the copy. However, if new elements are appended to x, the old\
    \ elements are not altered. Then y remains unchanged.\n\nDeep copy\n\nThe real\
    \ deep copy is made when a new collection object is created and it is recursively\
    \ populated with the child objects taken from the original.\n\n```python\n>>>\
    \ x = [[1, 2], [3, 4]]\n# Deep copy\n>>> y = copy.deepcopy(x)\n\n# One element\
    \ in x changed\n>>> x[0][1] = 0\n>>> x  # New x\n[[1, 0], [3, 4]]\n>>> y\n[[1,\
    \ 2], [3, 4]]\n```\n\n[The copy y is unchanged.]\n\nExercises:\n\n1. Write a one-line\
