    # Abhijit Kar Gupta


    Copyright ©reserved by the Author


    **Book:** My Book of Python Computing **Author:** Dr. Abhijit Kar Gupta **Cover
    Design:** Dr. Dipankar Ghosh


    April 2021, Kolkata


    # Preface


    Every enchanting journey begins from the beginning. This book offers an enjoyable
    and comfortable journey to a beginner. The ideas of Core Python are introduced
    in a lucid way. The sections and chapters are supplemented with numerical examples
    and graphical demonstrations. Some useful external packages are Writing clean
    and minimal codes introduced. in Python


    becomes highly effective with various external modules and packages. The experience
    of data handling turns magical, and doing scientific computation becomes greatly
    simplified. I hope, the students, teachers and any interested person may be benefitted
    by this book.


    Let me profusely thank all my students, colleagues, friends, and near and dear
    ones for supporting me in this project of writing this book. Hope, the keen readers
    enjoy reading.


    Thank you.'
