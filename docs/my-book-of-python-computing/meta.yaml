    else:\n    print('Not a Leap Year')\n```\n\n## 11 Collatz Sequence\n\nIt is a\
    \ simple but fascinating number sequence that follows simple rules. “The *Collatz\
    \ conjecture* is a conjecture in mathematics named after *Lothar Collatz*. It\
    \ concerns a sequence defined as follows: start with any positive integer *n*.\
    \ Then each term is obtained from the previous term as follows: if the previous\
    \ term is even, the next term is one half the previous term. Otherwise, the next\
    \ term is 3 times the previous term plus 1. The conjecture is that no matter what\
    \ value of $n$, the sequence will always reach 1.” – Wikipedia\n\nAlgorithm:\n\
    \n1. Enter the number.\n2. If it is even, divide by 2.\n3. If it is odd, multiply\
    \ by 3 and add 1.\n4. Follow the steps 2 and 3 until the number turns to 1.\n\n\
    ```python\n# Python Script: Collatz Sequence\nn = eval(input('Enter Number \\\
