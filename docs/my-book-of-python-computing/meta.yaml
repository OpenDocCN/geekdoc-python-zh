    在 Python 3.x 中，字符串采用 Unicode 编码，而在 Python 2.x 中，字符串以 ASCII 形式存储。在用户层面，这两个版本之间只有少数差异。安装任一版本都不困难。此外，两个并行版本可以在同一台机器上共存。您可以使用任一版本工作，并且可以轻松切换到另一个版本，只需对语法进行少量更改即可。


    ## 一些用户层面的差异


    | 特性 | Python 3.x | Python 2.x |

    | :--- | :--- | :--- |

