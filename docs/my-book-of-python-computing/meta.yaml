    \ - 阿尔伯特·爱因斯坦\n\n要编写遵循某种算法的长而有组织的代码，我们需要学习如何使用循环和逻辑结构来编写指令块。\n\n**注意：** 如果Python程序超过几行，将其写入文件并存储是有利的。我们称之为*Python脚本*。即使我们将代码写在文件中，命令行或解释器（>>>）也总是随时可用，我们可以快速测试每一行指令。\n\
    \n### 3.1 循环\n\n#### 3.1.1 For循环\n\n为了重复计算某些内容，我们将一条指令或一组指令放在循环中。在Python中，这是一个‘for循环’。循环遍历某个可迭代对象。这意味着，我们需要一个可迭代对象，循环将在其上重复运行。[我们可以将可迭代对象视为一个项目/元素的集合。]\n\
    \n#### for循环的结构\n\n```\nfor i in range(start, end, step):\n    instruction 1\n\
    \    instruction 2\n    ......\n    print(...)\n```\n\n#### 语法说明：\n\n- 循环以关键字‘for’开始，后跟一个虚拟索引（本例中为‘i’），然后是另一个关键字‘in’，其后跟一个可迭代对象。\n\
    - 在本例中，range()是一个可迭代对象。循环遍历它。其后跟一个冒号(:)，用于连接下一行指令。\n- 指令必须在循环下缩进。此外，所有缩进的指令必须从同一列开始。\n\
    \n![img/a1e407e9a2dd6440cb0c413013408aa5_54_0.png](img/a1e407e9a2dd6440cb0c413013408aa5_54_0.png)\n\
    \n**图 1：** 缩进的概念：嵌套块如何缩进。\n\n#### range()\n\n对象range()是一个可迭代对象。其他一些可迭代对象有：字符串、列表、元组、集合、字典。\n\
    \n内置函数range(start, stop, step)创建一个整数范围，从值‘start’开始，以‘step’为步长，并在‘stop’之前停止（不触及或越过终点）。range对象可以转换为其他类型的可迭代对象。\n\
    \n```\n# 转换\n>>> range(1, 10, 2)\nrange(1, 10, 2)\n\n# 转换为列表\n>>> list(range(1,\
    \ 10, 2))\n[1, 3, 5, 7, 9]\n\n# stop = 5, start = 0, step = 1\n>>> range(5)\n\
    range(0, 5)\n\n# 默认 start = 0, step = 1\n>>> list(range(5))\n[0, 1, 2, 3, 4]\n\
    \n# 转换为元组\n>>> tuple(range(2, 10, 3))\n(2, 5, 8)\n```\n\n**注意：** 在Python 2中，range()直接创建一个整数列表，而xrange()等同于Python\
    \ 3中的range()。\n\n> [在Python中，可迭代对象是一个可以被迭代的对象。其基本机制是，当传递给iter()方法时，它会生成一个迭代器。迭代器是一个对象，用于使用__next__()方法遍历可迭代对象，该方法返回对象的下一个项目。每当我们使用for循环时，next方法会自动被调用以从迭代器获取每个项目，从而完成操作。]\n\
    \n**Python代码 #1**\n\n```\nfor n in range(1, 4):\n    print(‘Very good’)\n```\n\
    \n输出：\n\nVery good\nVery good\nVery good\n\n**注意：** 函数**range(1, 4)**生成从1到3的整数。因此，for循环在n\
    \ = 1, 2, 3时运行[索引n是一个虚拟索引。我们可以写任何东西。]。\n\n**Python代码 #2**\n\n```\nfor x in [0,\
    \ 1, 2]:\n    print(x, \"\\t\", 2**x)\n```\n\n输出：\n0 1\n1 2\n2 4\n\n**注意：** 在**print()**函数中，“\\\
    t”（通过制表符创建一个空格）用于以空格分隔的方式显示输出。\n\n**Python代码 #3**\n\n```\n# 1到100的整数和\ns = 0 \
    \ # 初始值\nfor n in range(1, 101):\n    s = s + n  # 更新值\nprint(‘Sum = ‘, s)\n```\n\
    \n输出：\nSum = 5050\n\n```\n# 一步求和\n>>> sum(range(1, 101))\n5050\n```\n\n**Python代码\
    \ #4：数字表（使用字符串格式化打印）**\n\n```\nfor index in range(1, 6):\n    print(\"{} times\
    \ 5 is {}\".format(index, index*5))\n```\n\n输出：\n\n1 times 5 is 5\n2 times 5 is\
    \ 10\n3 times 5 is 15\n4 times 5 is 20\n5 times 5 is 25\n\n**注意：** 循环也可以用其他类型的可迭代对象（如元组、字符串*等*）以相同方式编写。例如，\n\
