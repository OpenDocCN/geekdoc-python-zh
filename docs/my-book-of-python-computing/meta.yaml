    (0.5, 12.0)\n```\n\n应用：斯特林公式用于求大数阶乘的对数的近似值：ln n! ≈ n ln n – n。为了数值验证这个公式，我们使用\
    \ ln n! = ∑ ln i=1。事实上，我们不需要为此问题计算阶乘！\n\n**Python 脚本：**\n\n```python\n# 测试斯特林近似\n\
    import math\nn = eval(input('输入数字 \\n'))\nlognfac = sum([math.log(i) for i in\
