    # 4.10 Python zip Function


    This built-in function creates an object where the corresponding items from two
    lists (or tuples *etc.*) are paired.


    ```

    >>> x = [''a'', ''b'', ''c'', ''d''] >>> y = [1, 2, 3, 4]

    >>> zip(x, y)

    <zip object at 0x0000015A07E955C0> [Zipped object created.]


    >>> list(zip(x, y))

    [(''a'', 1), (''b'', 2), (''c'', 3), (''d'', 4)]

    ```


    **Note:** The paired items in tuples are formed by corresponding items of the
    two lists (x, y).


