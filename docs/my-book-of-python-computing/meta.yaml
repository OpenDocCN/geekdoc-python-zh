    # 8.8 Products of Arrays


    ```

    # Inner product

    >>> u = np.array([1, 2, 3]) >>> v = np.array([-1, 0, 1]) >>> np.inner(u, v)

    2

    ```


    ```

    # Cross Product

    >>> np.cross(u, v) array([ 2, -4, 2])

    ```


    **Note:** The above methods can be treated as inner product (scalar product) and
    cross product (vector product) between two vectors u and v.


    Inner product: **u.v** = Σ u_i v_i = 1 ×(-1)+ 2 × 0 + 3 × 1 = 2

    Cross Product:

    **u×v** = | 1 2 3 | = i(2)+ j(-4)+ k(2) -1 0 1


    Application:

    Volume of a parallelepiped whose three sides are given by three vectors:

    **a** = 2i - 3j, **b** = i + j - k, **c** = 3i - k

    Volume = **a**.(**b** × **c**) = 4 (in arbitrary unit)


    ```

    # Python Script

    import numpy as np

    A = np.array([2, -3, 0])

    B = np.array([1, 1, -1])

    C = np.array([3, 0, -1])

    vol = np.inner(A, np.cross(B, C)) print(vol)

    ```


