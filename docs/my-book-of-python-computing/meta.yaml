    # CHAPTER 11


    # Pandas: Structured Data


    > “All good art is abstract in its structure.” – Paul Strand


    We often receive data as spread sheets or as various other tabular forms. The
    external module Pandas has mechanism to handle such structured data.


    Pandas deal with the following three data structures:


    - Series

    - DataFrame

    - Panel


    These data structures are built over NumPy arrays. We must install pandas over
    core Python before we import the module. The installation procedure is the same
    as that with other external packages like NumPy, SciPy *etc*.


    ```python

    >>> import pandas as pd

    >>> import numpy as np

    ```


    ## 11.1 Series


    ```python

    # Data

    >>> x = np.arange(10, 50, 10)

    >>> pd.Series(x)

    0 10

    1 20

    2 30

    3 40

    dtype: int32

    ```


    **Note:** The row indices: 0, 1, 2, 3 are automatically given. So, we form a structure
    out of the 1D array. The data-type is by default `int32`.


    ```python

    # Imposing index

    >>> index = [''a'', ''b'', ''c'', ''d'']

    >>> s = pd.Series(x, index)

    >>> s

    a 10

    b 20

    c 30

    d 40

    dtype: int32

    # Searching through index

    >>> s[0]

    10

    >>> s[''a'']

    10

    # Methods and attributes

    >>> s.axes

    [Index([''a'', ''b'', ''c'', ''d''], dtype = ''object'')]

    >>> s.values

    array([10, 20, 30, 40])

    >>> s.size

    4

    >>> s.shape

    (4,)

    >>> s.ndim

    1

    >>> s.dtype

    dtype(''int32'')

    # New row added with index ''e''

    >>> s[''e''] = 50

    >>> s

    a 10

    b 20

    c 30

    d 40

    e 50

    dtype: int64

    # Note: dtype changed

    # Data with strings

    >>> data = [''Raman'', ''Guido'', ''Ismail'', ''Apu'']

    >>> pd.Series(data)

    0 Raman

    1 Guido

    2 Ismail

    3 Apu

    dtype: object

    # Data as scalar (a single data)

    >>> index = [''a'', ''b'', ''c'', ''d'']

    >>> pd.Series(10, index, int)

    a 10

    b 10

    c 10

    d 10

    dtype: int32

    # Series from a dictionary

    >>> data = {''a'':10, ''b'':20, ''c'':30, ''d'':40}

    >>> pd.Series(data)

    a 10

    b 20

    c 30

    d 40

    dtype: int64

    # New index forced

    >>> index = [''a'', ''b'', ''c'', ''d'', ''e'']

    >>> pd.Series(data, index)

    a 10.0

    b 20.0

    c 30.0

    d 40.0

    e NaN

    # No data corresponding to this index

    dtype: float64

    ```


    **Note:** `NaN` = Not a Number. This is Python’s way of putting this object whenever
    there is a missing data or misunderstood data.


    Mathematical operators, built-in functions, and all NumPy methods can be applied
    over Series as that are done over NumPy arrays. Also, indexing, slicing and other
    mechanisms can be applied in the same way as those are done for NumPy arrays.
    This is possible because `Series()` in Pandas is built over `array()` in NumPy.
    For example, if `S` is the Series, we may check `S**2`, `sum(S)`, `max(S)`, `np.sqrt(S)`,
    `S.mean()`, `S[1]`, `S[::2]` *etc.* in the same way when we deal with a NumPy
    array.


    ## 11.2 DataFrame


    ```python

    # Argument is a 1D list/ array

    >>> x = [10, 20, 30, 40]

    >>> pd.DataFrame(x)

    0

    0 10

    1 20

    ```'
