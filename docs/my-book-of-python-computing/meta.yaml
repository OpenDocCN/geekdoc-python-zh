    # 导入特定名称\n>>> from math import sin, pi\n# 无需引用\n>>> sin(pi/4)\n0.7071067811865475\n\
    \n# 导入所有内容\n>>> from math import *\n# 无需引用\n>>> sin(pi/4)\n\n# 错误方式\n>>> import\
    \ os, sys, math\n```\n\n**注意：** 一行中不能调用多个模块。感兴趣的读者可以查阅 PEP 8 – Python 代码风格指南。\n\
    \n### 应用：\n\n#### #1 圆的面积\n\n```python\nimport math\nr = 5\narea = math.pi*r**2\n\
    print('面积 = ', area)\n```\n\n**注意：** 在 Python 3 中，通过 `input()` 获取的输入数据是字符串。因此，我们需要通过\
