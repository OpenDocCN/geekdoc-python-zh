    \ 'tanh',\n'tau', 'trunc']\n```\n\n```python\n# 关于 sin() 函数的在线帮助\n>>> help(math.sin)\n\
    # 来自 math 模块的一些函数\n>>> math.sqrt(100)\n10\n>>> math.pow(2, 4)  # 2^4\n16.0\n>>>\
