    # 一个数的阶乘\n>>> math.factorial(100)\n9332621544394415268169923885626670049071596826438162146859296389521759999322991560894146397615651828625369792082722375825118521091686400000000000000000000\n\
    ```\n\n**注意：** 之前我们使用了 `pow()` 函数，它来自内置模块（`__builtins__`）。在这种情况下，我们不需要引用模块名称，因为它是一个内置函数。我们直接写：`pow(2,\
    \ 4)`。\n\n```python\n# 来自 math 模块的更多函数\n# gcd = 最大公约数\n>>> math.gcd(18, 4)\n2\n\
    >>> math.log(e)\n1.0\n# 弧度转角度\n>>> math.degrees(pi)\n180.0\n>>> math.degrees(1.571)\n\
