    In Python, any object, which contains the two methods __iter__(), and next(),
    can act as an iterator.


    To Create an iterator Object:


    ```

    class Numbers:

    def __init__(self, n): self.i = 0

    self.n = n


    def __iter__(self): return self


    def next(self): if self.i < self.n:

    i = self.i

    self.i += 1

    return i


    else:

    raise StopIteration()

    ```'
