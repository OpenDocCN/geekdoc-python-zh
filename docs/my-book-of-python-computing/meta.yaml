    # 2.1 What is a Module?


    A module is a Python code consisting of functions, classes and data structures,
    statements *etc*. In short, a module is an organized python code. We can think
    of a module as a library from where we can import specific functions and classes
    for our work. In fact, a simple written code by us (may be with a user defined
    function in it) can be treated as a module.


    We can import a module on our namespace by executing import statement: ‘import
    module_name’, where the module is a python file:module_name.py. For every Python
    script or source file, the extension‘.py’ is a default one.


    Once we import a module on the interpreter (or Python shell), we can go on calling
    functions and other modules from it. Only when we come out of the interpreter
    (or shell) window and open a new session, we need to import again as the new namespace
    will be created.


    As it was mentioned earlier, core Python has several modules for various purposes
    apart from the built-in module (__buitins__) that we have already seen. Below,
    we will make use of **math** and **cmath** (mathematical modules for real and
    complex numbers) and other modules to write some simple codes.'
