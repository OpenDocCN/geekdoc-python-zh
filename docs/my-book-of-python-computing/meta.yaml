    \n一个**类**是由两个基本特征组成的代码块：\n- **属性**（变量、参数、字符串）\n- **方法**（用户定义的函数、其内部的其他类）\n\n类使用关键字\
    \ **class** 创建。我们可以给类起任何名字。为了更好地理解，我们以汽车为例。制造了成千上万种不同类型的汽车。每辆车都是根据同一套蓝图建造的。特定的汽车是**汽车**类的**实例（对象）**。\n\
    \n```python\n# 空类\nclass Car: pass\n>>> type(Car)\n<class 'type'>\n>>> Car\n<class\
