    \ 50 is not in list\n```\n\n## 17 矩阵运算\n\n二维列表（列表中的列表）和二维 NumPy 数组可以被视为矩阵。[NumPy\
    \ 数组将在第 7 章 NumPy 中详细介绍。]\n\n### 两个矩阵相加\n\n两个矩阵相加时，它们的行数和列数必须相等。矩阵的第 (i, j) 个元素与另一个矩阵的相同第\
    \ (i, j) 个元素相加，得到新矩阵的第 (i, j) 个元素：C[i][j] = A[i][j] + B[i][j]。\n\n算法：\n\n1.  输入：两个以列表形式表示的矩阵。\n\
    2.  循环遍历行和列 (i, j)\n3.  将两个列表的对应元素相加：C[i][j] = A[i][j] + B[i][j]\n\n```python\n\
    # Matrix addition (with Core Python)\nA = [[1, 2, 3], [4, 5, 6]]\nB = [[5, 6,\
    \ 4], [3, 4, 2]]\n# Initialization of matrix C\nC = [[0, 0, 0], [0, 0, 0]]\nrow\
    \ = len(A)\ncol = len(A[0])\nfor i in range(row):\n    for j in range(col):\n\
    \        C[i][j] = A[i][j] + B[i][j]\nprint('Matrix C')\n# To print in Matrix\
    \ form\nfor r in C:\n    print(r)\n```\n\n输出：\n\n```\nMatrix C\n[6, 8, 7]\n[7,\
    \ 9, 8]\n```\n\n**注意：** 每个二维列表都可以排列成看起来像数学矩阵的形式。例如，\nA = [[1, 2, 3],\n[4, 5, 6]]\n\
    \n列表 A 有两个元素，每个元素本身是一个列表。列表 A 的大小（元素数量）等于行数。一行的大小等于列数。\n\n嵌套的二维列表 A、B、C 被视为矩阵，它们具有相同的形状。"
