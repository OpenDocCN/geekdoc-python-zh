    # 1.2 Typing on Python Interpreter Hello World!


    Let us begin to type on Python IDLE **interpreter (>>>)** or command line [IDLE
    = Integrated Development and Learning Environment]. We type some line or some
    instruction on the interpreter and then‘Enter’ key to execute. The line that appears
    below is the output or some message that it returns. [Sometimes, nothing returns
    as output which indicates that the instruction is accepted without error. Else,
    we may get an error message.]


    We must type anything from the start (from the first column) on interpreter or
    inside any Python shell. We are not allowed to press ‘space bar’ before we write.
    In the latter case, it will raise error.


    Each line is an instruction. A set of Python instructions will form a Python code.
    We can write the lines in a file which is usually called *Python script*. Python
    scripts (programs or codes) are automatically saved with extension .py. Example:
    somefile.py


    Learning of every Computer language begins with typing **‘Hello World’**! Let
    us also type:

    >>> **print(‘Hello World!’)** Hello World!


    **Note:** print() is a function (a built-in function), in whichwe give the string,
    ‘Hello World!’ as argument. We get ‘Hello World!’ in return, as output.


