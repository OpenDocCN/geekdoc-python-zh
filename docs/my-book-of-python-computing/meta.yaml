- md: "## Inverse functions\n\n- **sinh(), tanh()** ← Hyperbolic functions\n- **pow(x,\
    \ y)** → ????\n\n## 2.5 Module for Random Numbers\n\nRandom numbers are those\
    \ which appear randomly and have no correlations among them. We come across random\
    \ numbers in Nature. In electrical noise, in atomic vibrations or in Brownian\
    \ motions of molecules, we get random variations in some quantities that we measure.\
    \ They do not follow any definite pattern, or we can say, there is no mathematical\
    \ law that can bind the sequence of numbers. The occurrences of random numbers\
    \ may follow a certain distribution, but they appear randomly. In the study of\
    \ many natural phenomena and in computer modeling of them, the random numbers\
    \ play important roles. So, we need to access a set of random numbers for our\
    \ study. Moreover, in the subject of Cryptography, random numbers play a big role.\n\
    \nHow to generate random numbers in Computer? In Computer, we generate pseudo\
    \ random numbers by employing the system’s inherent mechanism of number handling.\
    \ We call them pseudo random as the numbers are random in some range, a very long\
    \ range in fact, but out of the range they will repeat.\n\n### Import the Module\n\
    \n```python\n>>> import random\n>>> dir(random)\n['BPF', 'LOG4', 'RECIP_BPF',\
    \ 'SG_MAGICCONST', 'TWOPI', '_Sequence', '_Set', '__all__', '__builtins__', '__cached__',\
    \ '__doc__', '__file__', '__loader__', '__name__', '__package__', '__spec__',\
    \ '_accumulate', '_acos', '_bisect', '_ceil', '_cos', '_e', '_exp', '_inst', '_log',\
    \ '_os', '_pi', '_random', '_repeat', '_sha512', 'NV_MAGICCONST', 'Random', 'SystemRandom',\
    \ '_sin', '_sqrt', '_test', '_test_generator', '_urandom', '_warn', 'betavariate',\
    \ 'choice', 'choices', 'gammavariate', 'getrandbits', 'lognormvariate', 'paretovariate',\
    \ 'randint', 'random', 'randrange', 'sample', 'seed', 'setstate', 'shuffle', 'triangular',\
    \ 'uniform', 'vonmisesvariate', 'weibullvariate', 'expovariate', 'gauss', 'getstate',\
    \ 'normalvariate']\n```\n\nWe see a list of various random number generators or\
    \ functions. We can further check the online manual of each of the random number\
    \ generators as usual. For example,\n\n```python\n>>> help(random.random)\nHelp\
    \ on built-in function random:\n\nrandom() method of random.Random instance\n\
    \    random() -> x in the interval [0, 1).\n```\n\n### 2.5.1 Generate Random Numbers\n\
    \nThe function, `random()` in the module, `random` produces uniform random fraction\
    \ between 0 and 1 (the upper limit 1 not include). Note the interval: [0, 1)\n\
    \n```python\n>>> random.random()\n0.5273383762699028\n>>> random.random()\n0.10447680244370472\n\
    ```\n\n**Note:** Two different random numbers are generated by calling the same\
    \ function twice.\n\n```python\n# Create a list of 10 random numbers in [0, 1)\n\
    >>> [random.random() for i in range(10)]\n[0.5350878140843952,\n 0.43405195589115175,\n\
    \ 0.3065609996673083,\n 0.12325970038943124,\n 0.7195962696461913,\n 0.06200758778693172,\n\
    \ 0.6430032231626809,\n 0.4271828905197539,\n 0.26735110979806964,\n 0.41317992315825525]\n\
    ```\n\n**Note:** The way we generated a list of 10 random numbers, is called list\
    \ comprehension. We shall learn more about this later in Chapter 3.\n\n### Fix\
    \ a seed value, get a certain sequence\n\n```python\n# Seed value can be any integer.\n\
    >>> random.seed(234)\n>>> random.random()\n0.3418531586584459\n>>> random.random()\n\
    0.8655952517507371\n\n# Put the same seed, get the same sequence\n# Same Seed\n\
    >>> random.seed(234)\n\n# Same random number as before\n>>> random.random()\n\
    0.3418531586584459\n\n# Different seed, get different sequence\n# Different seed\n\
    >>> random.seed(547)\n\n# Different random number\n>>> random.random()\n0.04534988161204301\n\
    \n# Random integer between [a, b]\n# Includes both the limits\n>>> random.randint(2,\
    \ 10)\n6\n>>> random.randint(2, 10)\n9\n\n# Random integer between [a, b)\n# Excludes\
    \ upper limit\n>>> random.randrange(3, 25)\n9\n\n# Uniform random fraction between\
    \ limits\n>>> random.uniform(4, 10)\n6.539806620593668\n```\n\nNote: `uniform(a,\
    \ b)` generates random numbers in range [a, b) or [a, b] depending on rounding.\n\
    \n```python\n# Random number from Normal distribution\n>>> random.normalvariate(1,\
    \ 2)\n0.8681258604003476\n```\n\nNote: `normalvariate(mu, sigma)` generates random\
    \ number from Normal distribution with given **mu** (mean) and **sigma** (standard\
    \ deviation).\n\n### 2.5.2 Random Choice\n\nWe may have a predesigned collection\
    \ of numbers or items. It is sometimes necessary to choose random items from that.\n\
