    \ 'anu', 'raj', 'shyam', 'tapas']\n>>> M = {2:10, 5:12, 4:14, -1:6}\n>>> sorted(M)\n\
    [-1, 2, 4, 5]\n```\n\n### 5.5.2 Methods on Dictionary\n\n```python\n>>> dir(dict)\n\
