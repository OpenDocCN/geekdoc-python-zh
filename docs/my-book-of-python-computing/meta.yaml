    \ Puchi\nAge: 18\nSex: Female\n\n## 5.6 打包与解包\n\n这是一个非常有用的 Python 概念，我们经常在代码中使用。任何可迭代对象（列表、字符串、元组、集合或字典）都可以看作是某些元素在某个变量名下的**打包**。\n\
    \n我们可以通过将变量名赋值给数量相等的变量名来**解包**这些元素。这样，对应的元素将被一对一地分配给这些变量。\n\n```python\n>>> x\
    \ = '235'  # 打包为字符串\n>>> a, b, c = x  # 解包\n>>> a\n'2'\n>>> b\n'3'\n>>> c\n'5'\n\
    \n>>> t = (2, 3, 5)  # 打包为元组\n>>> a, b, c = t  # 解包\n\n>>> L = [2, 3, 5]  # 打包为列表\n\
    >>> a, b, c = L  # 解包\n\n# 打包为字典\n>>> D = {'x':2, 'y':3, 'z':5}\n>>> a, b, c =\
