    # 2.5.5 Cryptographically Secured Random Number


    There is system dependent (Machine specific) pseudo random number, used for data
    security. The generator returns in ASCII strings.


    ```

    >>> import os

    >>> r = os.urandom(4)

    >>> r

    b''\xef\xe2\x1fA''

    >>> len(r)

    4

    [ASCII code string of length 4]


    # To decode


    >>> import struct

    >>> struct.unpack(''i'', r) (1092608751,)

    [In integer]


    >>> struct.unpack(''f'', r) (9.992903709411621,) [In float]


    # Unpacking index for different lengths


    >>> struct.unpack(''d'',

    os.urandom(8))

    (7.233012407285722e-05,)


    >>> struct.unpack(''h'',

    os.urandom(2))

    ```'
