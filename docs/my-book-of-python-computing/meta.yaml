- md: "## 5.4 Set\n\nA set is an object with **unordered** collection of unique elements.\
    \ We can make a set of elements from other iterables like list or tuple. [In a\
    \ list or tuple, the same element can repeat but the set returns the unique elements.]\n\
    \nA **set** is constructed by putting unique elements, separated by commas, within\
    \ curly brackets or braces: {}. The primary objective to have a set is to eliminate\
    \ duplicate entries. A set is **mutable**. We can update a set to make a new set\
    \ of elements.\n\n```python\n>>> s = {1, 2, 6, 9} # A set\n>>> type(s)\n<class\
    \ 'set'>\n\n# A list is converted to set\n>>> set([1, 2, 4, 1, 2])\n{1, 2, 4}\n\
    >>> t = (1, 2, 4, 1, 2) # tuple\n>>> set(t) # Converted to set\n{1, 2, 4}\n\n\
    # Binary String\n>>> b = '110011101001'\n\n# Set of elements\n>>> set(b)\nset(['1',\
    \ '0'])\n```\n\n**Note:** The `{}` is not an empty set. It is a different class\
    \ called dictionary. As set is unordered, so indexing and slicing cannot be done\
    \ over a set.\n\nApplication:\n# Python Script: A die is thrown 100 times. Make\
    \ a set of outcomes.\n```python\nimport random\nx = [random.randint(1, 6) for\
    \ i in range(100)]\nprint(set(x))\n```\nOutput: {1, 2, 3, 4, 5, 6}\n\n### 5.4.1\
    \ Built-in Function on Set\n\n```python\n# Size or length\n>>> s = {1, 2, 6, 9}\n\
    >>> len(s) # Length\n4\n```\n\n### 5.4.2 Methods\n\n```python\n>>> dir(set)\n\
    ['__and__', '__class__', '__contains__', '__delattr__', '__dir__', '__doc__',\n\
    '__eq__', '__format__', '__ge__', '__getattribute__', '__gt__', '__hash__',\n\
    '__iand__', '__init__', '__init_subclass__', '__ior__', '__isub__', '__iter__',\n\
    '__ixor__', '__le__', '__len__', '__lt__', '__ne__', '__new__', '__or__',\n'__rand__',\
    \ '__reduce__', '__reduce_ex__', '__repr__', '__ror__', '__rsub__',\n'__rxor__',\
    \ '__setattr__', '__sizeof__', '__str__', '__sub__', '__subclasshook__',\n'__xor__',\
    \ 'add', 'clear', 'copy', 'difference', 'difference_update',\n'discard', 'intersection',\
    \ 'intersection_update', 'isdisjoint', 'issubset',\n'issuperset', 'pop', 'remove',\
    \ 'symmetric_difference',\n'symmetric_difference_update', 'union', 'update']\n\
    ```\n\n# Update\n\nWe can update a set with the union of itself or with any other\
    \ iterables (tuple, string, list, dictionary).\n\n```python\n>>> s = {1, 2, 6,\
    \ 9}\n\n# Inserting a set {10}\n>>> s.update({10})\n>>> s # The set is updated\n\
    {1, 2, 6, 9, 10}\n\n# Union with another set\n>>> s.update({11, 21})\n>>> s\n\
    {1, 2, 21, 6, 9, 10, 11}\n\n# Union with various iterables\n>>> s.update([10,\
    \ 11], {21, 31}, 'name')\n>>> s\n{1, 2, 'e', 6, 9, 10, 11, 'n', 'a', 21, 'm',\
    \ 31}\n\n# Pop out element\n>>> s = {2, 1, 6, 'x', '12', 0, 1}\n# Remove and return\
