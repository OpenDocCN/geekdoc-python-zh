  md: '# 5.5 Dictionary


    A dictionary is a Python Object where we have **key:value** pairs, separated by
    commas, placed inside a pair of curly brackets { }. If we call through a **key**,
    it will return us the corresponding **value**. Thus, we can store values against
    keys and later we can extract a value by giving a key. The built-in object**dict()**creates
    a dictionary. A dictionary is **mutable**.


    ```

    # Example

    >>> D = {''a'':2, ''b'':4, ''c'':6,

    ''x'':10 } >>> type(D)

    <class ''dict''>

    ```


    A dictionary is usually an unordered collection of key:value paired elements.
    In the above example, ‘a’, ‘b’, ‘c’, ‘x’ are keys, and 2, 4, 6, 10 are the corresponding
    values respectively. The elements are unordered, so it is not possible to do indexing
    and slicing over a dict object.


    ```

    # Iteration over dictionary >>> for i in D:

    print(i, end = '' '')

    a b c x

