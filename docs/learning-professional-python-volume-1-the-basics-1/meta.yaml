    # 5.10 INDEXING, SLICING


    A slice allows the Examplemer to make either a copy or part of the list.


    # Syntax


    ```

    List name [start end]

    List name [: end] ~ list name [0: end]

    ```


    A slice of the list makes a new list, taking elements from the source list and
    the elements of the indices from start to end-1.


    > Note: Can use the negative values for both start and the end limits.


    # Example: Slicing


    ```

    #whole list using slicing

    # Initialize list

    List = [1, 2, 3, 4, 5, 6, 7, 8, 9]


    # Show original list

    print("\nOriginal List:\n", List)


    print("\nSliced List: ")


    # Display sliced list

    print(List[3:9:2])


    # Display sliced list

    print(List[::2])

    ```'
