    .format(year))\n```\n\n## Output\n\n```\n2000 is a leap year\n```\n\nThe preceding\
    \ program checks whether a year is a leap year or not.\n\n## 3.5 ELIF STATEMENT\n\
    \n## Syntax\n\n```\nif condition 1:\n    Statements-1\nelif condition 2:\n   \
