    # 12.9 THE RE.ESCAPE () FUNCTION


    Python automatically escapes all the metacharacter by using the escape () function.


    # Example


    ```

    import re

    print(re.escape("this is to test"))

    print(re.escape("this is to test \t ^test"))

    ```


