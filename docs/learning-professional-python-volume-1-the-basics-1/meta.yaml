    ## Learning Professional Python


    **Volume 1 of Learning Professional Python** is a resource for students who want
    to learn Python even if they don''t have any programming knowledge and for teachers
    who want a comprehensive introduction to Python to use with their students. This
    book helps the students achieve their dream job in the IT Industry and teaches
    the students in an easy, understandable manner while strengthening coding skills.


    ## Learning Professional Python: Volume 1 Objectives


    - Become familiar with the features of Python programming language

    - Introduce the object-oriented programming concepts

    - Discover how to write Python code by following the object-oriented programming
    concepts

    - Become comfortable with concepts such as classes, objects, inheritance, dynamic
    dispatch, interfaces, and packages

    - Learn the Python generics and collections

    - Develop exception handling and the multithreaded applications

    - Design graphical user interface (GUI) applications


    ## CHAPMAN & HALL/CRC THE PYTHON SERIES


    ## About the Series


    Python has been ranked as the most popular programming language, and it is widely
    used in education and industry. This book series will offer a wide range of books
    on Python for students and professionals. Titles in the series will help users
    learn the language at an introductory and advanced level, and explore its many
    applications in data science, AI, and machine learning. Series titles can also
    be supplemented with Jupyter notebooks.


    ## Image Processing and Acquisition using Python, Second Edition


    Ravishankar Chityala, Sridevi Pudipeddi


    ## Python Packages


    Tomas Beuzen and Tiffany-Anne Timbers


    ## Statistics and Data Visualisation with Python


    Jes├║s Rogel-Salazar


    ## Introduction to Python for Humanists


    William J.B. Mattingly


    ## Python for Scientific Computation and Artificial Intelligence


    Stephen Lynch


