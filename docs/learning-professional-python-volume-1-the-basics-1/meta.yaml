    # 1.8 PRINT () FUNCTION


    The print () prints a message onto the screen or to the standard output.


    # Syntax


    ```

    print (object, sep=separator, end=end, file= file, flush=flush)

    ```


    +   - sep ŌĆō Specifies the separator between the outputted argument.

    - end ŌĆō Specifies what to print at the end of the print statement

    - flush ŌĆō Flushes the screen. Its default value is false

    - file ŌĆō Where to display the message object. The default out is to the console,
    that is, std.out. The programmers can output the message to the file also.


    The end and sep are the keyword arguments, and these parameters are used to format
    the output of the print () function. The programmers can enter more than one object
    separated by separator. An empty print () outputs an empty line to the screen.

    Your first python program:


    ```

    print ("this is to test")

    ```


    The previous line produces the output:


    ```

    this is to test

    ```'
