    1 Inner\n2 Inner\n2 Outer\n1 Inner\n2 Inner\n\nThe preceding program is about\
    \ continue statement in nested while loops.\n\n## 3.14 WHILE LOOP AND THE ELSE\
    \ BRANCH\n\nThe loops while and the for loop has an interesting feature in Python.\
    \ The else block is executed once regardless of whether the loop has entered its\
    \ loop body or not, but the else block of the while executes once.\n\n### Syntax\n\
    \n```\nwhile condition:\n    statements\nelse:\n    statements\n```\n\nIf the\
    \ condition becomes false at the very first iteration, then the while loop body\
    \ never executes.\n\n> Note: The else block executes after the loop finishes its\
    \ execution if it has not been terminated by the break statement.\n\n### Solved\
    \ examples\n\n### Program\n\n```\nfor i in \"test\":\n    if i == \"s\":\n   \
    \     break\n    print(i)\n```\n\n### Output\n\nt\ne\n\n### Program: The continue\
