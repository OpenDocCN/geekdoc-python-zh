    # Python Basics


    Python is a regular general-purpose, high-level, and object-oriented programming
    language. Python is an interpreted scripting language. Python is a simple-to-understand
    and multipurpose scripting language. Python is a multipurpose programming language.
    It can be used with web, enterprise applications. Python makes the development
    and the debugging fast.


    # 1.1 HISTORY OF PYTHON


    Python was created by Guido Van Rossum in the early nineteenth century at the
    national research institute for mathematics and computer science in the Netherlands.
    Python is obtained from several additional programming languages like ABC, Modula-3,
    C, CPP, Smalltalk, Unix, and scripting languages. Python is accessible under the
    GNU public license (GPU)


    # 1.2 ADVANTAGES OF PYTHON


    - 1. Python is interpreted ŌĆō There is no need to compile the python program before
    executing it.

    - 2. Python is interactive ŌĆō The developer can relate to the interpreter immediately
    to write the python programs.

    - 3. Python is object oriented ŌĆō Python maintains an object-oriented programming
    concept that encapsulates the code contained by objects.'
