    # 2.4 OPERATOR PRECEDENCE


    When more than one operator is there in the expression, to compute the expression
    operator precedence determines which operation to perform first. Operator associativity
    evaluates the operators in particular order when the operators have the same precedence.


    TABLE Operator Priority


    | Priority | Operator | Description |

    |---|---|---|

    | 1 | + - | Unary |

    | 2 | ** | Binary |

    | 3 | / // % * | Binary |

    | 4 | + - | Binary |

    | 5 | <<= >>= | Binary |

    | 6 | == != | Binary |'
