    print(s1)\n```\n\n### Output\n\n```\n{'test', 'is', 'to', 'this'}\n{'test', 'is',\
    \ 'to', 'this'}\n```\n\n### Program: creating set with multiple data types\n\n\
    ```\ns={\"this is to test\", (1,2,3), (\"pyhton\", \"set\",\n    \"example\"),\
    \ 10.34567}\nprint(s)\ns1=set((\"this is to test\", (1,2,3), (\"pyhton\", \"set\"\
    ,\n    \"example\"), 10.34567))\nprint(s1)\nprint(\"pyhton elements\")\nfor x\
    \ in s:\n    print(x)\n```\n\n### Output\n\n```\n{'this is to test', ('pyhton',\
    \ 'set', 'example'),\n    10.34567, (1, 2, 3)}\n{'this is to test', ('pyhton',\
    \ 'set', 'example'),\n    10.34567, (1, 2, 3)}\nPyhton elements\nthis is to test\n\
    ('pyhton', 'set', 'example')\n10.34567\n(1, 2, 3)\n```\n\n### Program: giving\
    \ duplicate values to the set\n\n```\ns={1,2,3,2, \"this\", \"is\", \"to\", \"\
    test\", \"test\"}\nprint(s)\ns1=set((1,2,3,2, \"this\", \"is\", \"to\", \"test\"\
    , \"test\"))\nprint(s1)\ns2={(1,2,3,2), (\"this\", \"is\", \"to\", \"test\", \"\
    test\")}\nPrint(s2)\n```\n\n### Output\n\n```\n{1, 2, 3, 'to', 'test', 'this',\
    \ 'is'}\n{1, 2, 3, 'to', 'test', 'this', 'is'}\n{('this', 'is', 'to', 'test',\
    \ 'test'), (1, 2, 3, 2)}\n```\n\n### 7.2 ACCESS SET ELEMENTS\n\nThe set items\
    \ cannot be accessed by referring the index or the key. The programmer has to\
    \ use the loop to access the set elements.\n\n**Program: Access set items**\n\n\
    ```\ns={\"this\", \"is\", \"to\", \"test\"}\nprint(s)\nfor x in s:\n    print(x)\n\
    ```\n\n**Output**\n\n```\n{'test', 'is', 'to', 'this'}\ntest\nis\nto\nthis\n```\n\
    \n### 7.3 ADDING ELEMENTS TO THE SET\n\nTo add the elements in the set, there\
    \ is a predefined method called the add (). To add multiple items to the set,\
    \ there is a predefined method called the update ().\n\n**Program: Adding elements\
    \ to the set**\n\n```\ns={\"this\",\"is\",\"to\",\"test\"}\nprint(s)\ns.add(\"\
    pyhton\")\nprint(s)\ns.add(\"set\")\nprint(s)\ns.add(\"example\")\nprint(s)\n\
    ```\n\n**Output**\n\n```\n{'test', 'is', 'to', 'this'}\n{'this', 'to', 'pyhton',\
    \ 'test', 'is'}\n{'this', 'to', 'pyhton', 'set', 'test', 'is'}\n{'this', 'example',\
    \ 'to', 'pyhton', 'set', 'test', 'is'}\n```\n\n### Program: adding multiple items\n\
    \n```\ns={\"this\",\"is\",\"to\",\"test\"}\nprint(s)\ns.update([\"python\",\"\
    set\",\"example\"])\nprint(s)\n```\n\n### Output\n\n```\n{`test`, `is`, `to`,\
    \ `this`}\n{`python`, `this`, `example`, `to`, `set`, `test`, `is`}\n```\n\n###\
    \ 7.4 REMOVE AN ELEMENT FROM THE SET\n\nTo remove an element from the set, there\
    \ are two predefined methods called the remove (), discard (). There is another\
    \ predefined method called the pop () to remove the topmost element from the set.\
    \ There is no guarantee that by using pop () which element from the set will be\
    \ removed.\n\n### Program: Remove an element from the set\n\n```\ns={\"this\"\
    ,\"is\",\"to\",\"test\"}\nprint(s)\ns.remove(\"test\")\nprint(s)\ns.discard(\"\
    this\")\nprint(s)\ns.pop()\nprint(s)\n```\n\n### Output\n\n```\n{`test`, `is`,\
    \ `to`, `this`}\n{`is`, `to`, `this`}\n{`is`, `to`}\n{`to`}\n```\n\n### 7.5 DELETE\
    \ THE SET\n\nThere are two predefined methods called the clear () and del to delete\
    \ the set elements. Clear only deletes the set elements and the empty set retains,\
    \ but the del keyword deletes the entire set.\n\n### Program: using del keyword\n\
    \n```\ns={\"this\",\"is\",\"to\",\"test\"}\nprint(s)\ns.clear()\nprint(s)\ndel\
    \ s\n```\n\n### Output\n\n```\n{'test', 'is', 'to', 'this'}\nSet()\n```\n\n###\
    \ 7.6 PYTHON SET OPERATIONS\n\nMost of the set operations works on two sets. Table\
    \ 7.1 tabulates the operations on sets.\n\n**TABLE 7.1 Python Set Operations**\n\
    \n| Operation | Symbol | Description |\n| :--- | :--- | :--- |\n| union | U |\
    \ Combines both sets |\n| intersection | Ōł® | Selects elements that are common\
    \ in both sets |\n| difference | - | The elements in first set but not in second\
    \ |\n\n### Program: Set operations\n\n```\ns={1,2,3,\"test\"}\ns1={\"this\",\"\
    is\",\"to\",\"test\",\"1\",1}\nprint(\"s:\",s)\nprint(\"s1:\",s1)\nprint(\"s|s1:\"\
    ,s|s1)\nprint(\"s&s1:\",s&s1)\nprint(\"s^s1:\",s^s1)\nprint(\"s-s1:\",s-s1)\n\
    print(\"s1-s:\",s1-s)\n```\n\n### Output\n\n```\ns: {1, 2, 3, 'test'}\ns1: {1,\
    \ 'this', '1', 'to', 'test', 'is'}\ns|s1: {1, 2, 3, 'this', '1', 'to', 'test',\
    \ 'is'}\ns&s1: {1, 'test'}\ns^s1: {2, 'is', 3, 'this', '1', 'to'}\ns-s1: {2, 3}\n\
    s1-s: {'1', 'is', 'to', 'this'}\n```\n\n### 7.7 SET MEMBERSHIP OPERATORS\n\nSet\
    \ membership operators in Python test for membership in set. Table 7.2 tabulates\
    \ the Python membership operations.\n\n**TABLE 7.2 Python Membership Operations**\n\
    \n| Operation | Description |\n| :--- | :--- |\n| in | Returns true if the element\
    \ is found in the set; otherwise false |\n| not in | Returns true if the element\
    \ is not found in the set; otherwise false |\n\n### Program: Set membership operators\n\
    \n```\ns={1,2,3,\"test\"}\nprint(\"s:\",s)\nprint(\"test in s:\",\"test\" in s)\n\
    print(\"1 in s:\"1 in s)\nprint(\"5 in s :\",5 in s)\nprint(\"5 not in s\",5 not\
    \ in s)\n```\n\n### Output\n\n```\ns: {1, 2, 3, 'test'}\ntest in s: True\n1 in\
    \ s: True\n5 in s: False\n5 not in s True\n```\n\n### Program: Sort the set\n\n\
    ```\ns={\"this\",\"is\",\"to\",\"test\"}\nprint(s)\nprint(sorted(s))\nprint(sorted(s,reverse=True))\n\
    ```\n\n### Output\n\n```\n{'test', 'is', 'to', 'this'}\n['is', 'test', 'this',\
    \ 'to']\n['to', 'this', 'test', 'is']\n```\n\n### 7.8 SET PREDEFINED METHODS\n\
    \nTable 7.3 tabulates the set predefined methods in Python.\n\n**TABLE 7.3 Predefined\
    \ Set Methods**\n\n| Method | Description |\n| :--- | :--- |\n| add() | Adds an\
    \ element to the set. Set maintains only unique elements; if the newly added element\
    \ already exists in the set, then it does not add that element. |\n| clear() |\
    \ Removes all elements from the set. |\n| copy() | Copies the set. |\n| difference()\
    \ | Returns the first set elements only that were not exist in the second set.\
    \ |\n| intersection() | Returns the elements that were common in the given sets.\
    \ |\n| pop() | Removes the random element from the set. |\n| symmetric difference()\
    \ | Returns the distinct elements that were found in the given sets. |\n| union()\
    \ | Combines the given sets. |\n| update() | Updates the set by adding distinct\
    \ elements from the passed ones. |\n\n### Program: Set predefined functions\n\n\
    ```\ns={\"this\", \"is\", \"to\", \"test\"}\ns1={\"this\", \"is\", \"to\", \"\
    test\", \"1\",1}\nprint(\"s:\",s)\nprint(\"s1:\",s1)\nprint(\"union:\",s.union(s1))\n\
    print(\"intersection:\",s.intersection(s1))\nprint(\"difference s-s1:\",s.difference(s1))\n\
    print(\"difference s1-s:\",s1.difference(s))\nprint(\"symmetric_difference s-s1:\"\
    ,\n      s.symmetric_difference(s1))\nprint(\"symmetric_difference s1-s:\",\n\
    \      s1.symmetric_difference(s))\n```\n\n### Output\n\n```\ns: {'test', 'is',\
    \ 'to', 'this'}\ns1: {1, 'this', '1', 'to', 'test', 'is'}\nunion: {1, 'this',\
    \ '1', 'to', 'test', 'is'}\nintersection: {'this', 'is', 'to', 'test'}\ndifference\
    \ s-s1: set()\ndifference s1-s: {'1', 1}\nsymmetric_difference s-s1: {1, '1'}\n\
    symmetric_difference s1-s: {1, '1'}\n```\n\n### Program: operation on 3 sets\n\
    \n```\ns={\"this\",\"is\",\"to\",\"test\"}\ns1={\"this\",\"is\",\"to\",\"test\"\
    ,\"1\",1}\ns2={1,2,3,2,\"this\",\"is\",\"to\",\"test\",\"test\"}\nprint(\"s:\"\
    ,s)\nprint(\"s1:\",s1)\nprint(\"s2:\",s2)\nprint(\"union:\",s.union(s1,s2))\n\
    print(\"intersection:\",s.intersection(s1,s2))\nprint(\"difference s-s1:\",s.difference(s1,s2))\n\
    print(\"difference s1-s:\",s1.difference(s,s2))\n```\n\n### Output\n\n```\ns:\
    \ {'test', 'is', 'to', 'this'}\ns1: {1, 'this', '1', 'to', 'test', 'is'}\ns2:\
    \ {('this', 'is', 'to', 'test', 'test'), (1, 2, 3, 2)}\nunion: {1, 'this', '1',\
    \ 'to', ('this', 'is', 'to', 'test', 'test'), 'test', (1, 2, 3, 2), 'is'}\nintersection:\
    \ set()\ndifference s-s1: set()\ndifference s1-s: {'1', 1}\n```\n\n### Program:\
    \ Operations on four sets\n\n```\ns={\"this\",\"is\",\"to\",\"test\"}\ns1={\"\
    this\",\"is\",\"to\",\"test\",\"1\",1}\ns2={1,2,3,2,\"this\",\"is\",\"to\",\"\
    test\",\"test\"}\ns3={\"this is to test\",(1,2,3),(\"pyhton\",\"set\",\"example\"\
    ),10.34567}\nprint(\"s:\",s)\nprint(\"s1:\",s1)\nprint(\"s2:\",s2)\nprint(\"s3:\"\
