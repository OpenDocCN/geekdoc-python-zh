    # CHAPTER 1


    # Python Basics


    Python is a regular general-purpose, high-level, and object-oriented programming
    language. Python is an interpreted scripting language. Python is a simple-to-understand
    and multipurpose scripting language. Python is a multipurpose programming language.
    It can be used with web, enterprise applications. Python makes the development
    and the debugging fast.


    # 1.1 HISTORY OF PYTHON


    Python was created by Guido Van Rossum in the early nineteenth century at the
    national research institute for mathematics and computer science in the Netherlands.
    Python is obtained from several additional programming languages like ABC, Modula-3,
    C, CPP, Smalltalk, Unix, and scripting languages. Python is accessible under the
    GNU public license (GPU)


    # 1.2 ADVANTAGES OF PYTHON


    +   1. Python is interpreted ŌĆō There is no need to compile the python program
    before executing it.

    2. Python is interactive ŌĆō The developer can relate to the interpreter immediately
    to write the python programs.

    3. Python is object oriented ŌĆō Python maintains an object-oriented programming
    concept that encapsulates the code contained by objects.'
- md: "## 1.3 CHARACTERISTICS OF PYTHON\n\nThe important characteristics of Python\
    \ programming:\n\n- 1. Python provides a high-level dynamic data type and strengthens\
    \ dynamic type checking.\n- 2. Python is open source; it can contribute to the\
    \ development code.\n- 3. Python is as understandable as plain English.\n- 4.\
    \ Python supports functional, structure, as well as object-oriented programming\
    \ methods.\n- 5. Python supports automatic garbage collection.\n- 6. Python source\
    \ code can be converted to the byte code.\n- 7. Easy to learn ŌĆō Python has a straightforward\
    \ structure and obviously defined syntax. It is simple to read, easy to provide,\
    \ and cross-platform compatible.\n- 8. Easy to teach ŌĆō Workload is smaller when\
    \ compared to other programming languages techniques.\n- 9. Easy to use ŌĆō Python\
    \ code is faster than other programming languages.\n- 10. Easy to understand ŌĆō\
    \ Easier to understand than other programming languages.\n- 11. Easy to obtain\
    \ ŌĆō Python is free, open source, and multiplatform.\n\n## 1.4 APPLICATIONS OF\
    \ PYTHON\n\n- 1. Portable ŌĆō Python can run on all platforms, like Unix, Windows,\
    \ and Macintosh.\n- 2. Extendable ŌĆō The developer can combine low-level modules\
    \ to the Python interpreter. These modules allow the programmers to modify their\
    \ tools useful database.\n- 3. Python offers interface to the commercial databases.\n\
    - 4. GUI programming ŌĆō Python encourages graphical user interface applications\
    \ by system calls, libraries, and Windows systems such as Windows MFC Macintosh\
    \ and the X Windows system of Unix.\n- 5. Scalable ŌĆō Python offers systematic\
    \ structure and assist shell scripting.\n\n## 1.5 PYTHON VERSIONS\n\n- 1. CPython\n\
    - 2. Cython\n- 3. Jython\n- 4. PyPy\n- 5. RPython\n\n## 1.6 PYTHON IDENTIFIERS\n\
    \nA Python identifier is their name used to recognize a variable, function, module,\
    \ class, or an object. An identifier begins with the letter, or an underscore\
    \ followed by digits. Python does not permit punctuation marks such as @, $, ^.\
    \ Python is a case-sensitive programming language. For example, Test and test\
    \ are two unique identifiers in Python.\n\nNaming rules for Python identifiers:\n\
    \n- 1. Class names begin with an uppercase letter. All additional identifiers\
    \ beginning with a lowercase letter.\n- 2. If the identifier closes with two trailing\
    \ underscores, the identifier is the language specified special name.\n- 3. Beginning\
    \ with an identifier with a particular leading underscore signifies that the identifier\
    \ is private.\n- 4. Beginning an identifier with the two prominent underscores\
    \ indicates it is an intensely private identifier.\n\n## 1.7 RESERVED WORDS\n\n\
    Table 1.1 shows the Python keywords. These keywords cannot be used as a constant\
    \ or variable or any other identifier names.\n\n### TABLE 1.1 Reserve Words\n\n\
    | | | |\n|---|---|---|\n| and | exec | not |\n| assert | finally | or |\n| break\
    \ | for | pass |\n| class | from | print |\n| continue | global | raise |\n| def\
    \ | if | return |\n| del | import | try |\n| elif | in | while |\n| else | is\
    \ | with |\n| except | lambda | yield |\n\n## 1.8 PRINT () FUNCTION\n\nThe print\
    \ () prints a message onto the screen or to the standard output.\n\n### Syntax\n\
    \n```\nprint (object, sep=separator, end=end, file= file, flush=flush)\n```\n\n\
    - sep ŌĆō Specifies the separator between the outputted argument.\n- end ŌĆō Specifies\
    \ what to print at the end of the print statement.\n- flush ŌĆō Flushes the screen.\
    \ Its default value is false.\n- file ŌĆō Where to display the message object. The\
    \ default out is to the console, that is, std.out. The programmers can output\
    \ the message to the file also.\n\nThe end and sep are the keyword arguments,\
    \ and these parameters are used to format the output of the print () function.\
    \ The programmers can enter more than one object separated by separator. An empty\
    \ print () outputs an empty line to the screen.\n\nYour first python program:\n\
    \n```\nprint (\"this is to test\")\n```\n\nThe previous line produces the output:\n\
    \n```\nthis is to test\n```\n\nIf we remove double quotes in the print statement:\n\
    \n```\nprint(this is to test)\n```\n\n### Output\n\n```\nFile \"<ipython-input-86-c0dae74495e9>\"\
    , line 1\nprint(this is to test)\n      ^\nSyntaxError: invalid syntax\n```\n\n\
    print () can operate with all types of data provided by Python. The data type\
    \ data strings, numbers, characters, objects, logical values can be successfully\
    \ passed to print ().\n\n> NOTE: print () does not evaluate anything.\n\n### Program\n\
    \n```\nprint(\"this is to test\")\nprint(\"this is the second line in python program\"\
    )\n```\n\n### Output\n\n```\nthis is to test\nthis is the second line in python\
    \ program\n```\n\nThe preceding program invokes the print () twice. The print\
    \ () begins its output from a fresh new line each time it starts its execution.\
    \ The output of the code is produced in the same order in which they have been\
    \ placed in the source file. The first line in the preceding program produces\
    \ the output [this is to test], and the second line produces the output [this\
    \ is the second line in python program]. The empty print () with without any arguments\
    \ produces the empty line, that is, just a new empty line.\n\n### Program\n\n\
    ```\nprint(\"this is to test\")\nprint()\nprint(\"this is the second line in python\
    \ program\")\n```\n\n### Output\n\n```\nthis is to test\n\nthis is the second\
    \ line in python program\n```\n\nIn the preceding program, the second line print\
    \ statement introduces the empty line.\n\nThe following programs illustrate the\
    \ separator and end argument:\n\n### Program\n\n```\nprint(\"this\", \"is\", \"\
    to\", \"test\", end=\"@\")\n```\n\n### Output\n\n```\nthis is to test@\n```\n\n\
    In the preceding program, end separator is used, so after printing the string,\
    \ the separator has been added.\n\n### Program\n\n```\nprint(\"this is\", \" to\
    \ test\", sep=\"---\", end=\"#\")\nprint(\"this is an experiment\")\n```\n\n###\
    \ Output\n\n```\nthis is--- to test#this is an experiment\n```\n\nThe string assigned\
    \ to the end keyword argument can be any length. The sep arguments value may be\
    \ an empty string. In the previous example, the separator is specified as ŌĆō. The\
    \ first and the second argument is separated by the separator. In the preceding\
    \ program the separator is ŌĆō. So the output is [this is ŌĆō to test]. In the first\
    \ the print statement, the end argument specified is ŌĆ£#ŌĆØ. So after printing the\
