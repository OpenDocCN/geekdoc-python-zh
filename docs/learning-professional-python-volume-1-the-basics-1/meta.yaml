    # # Lists


    # ## 5.1 INTRODUCTION


    List is a collection of elements, but each element may be a different type. List
    is a data type in Python programming language, which can be written as a list
    of commas separated values between square brackets. Creating a list is putting
    different comma separated values between square brackets. The list is a type in
    python used to store multiple objects. It is an ordered and mutable collection
    of elements.


    The value inside the bracket that selects one element of the list is called an
