    # 1.11 QUOTATION IN PYTHON


    Python allows single, double, and triple quotes to signify string literals. The
    triple quotes are applied to spend the string within multiple lines. For example,
    the following are legal:


    ```

    S="test"

    S=''test''

    S=""" This is to test a multiple lines and sentence """

    ```


    # 1.12 COMMENTS IN PYTHON


    A hash sign (#) is the starting of the comment. All characters after the hash
    and up to the end of the line are part of the comment, and the Python interpreter
    ignores that line. For example:

    print (ŌĆ£this is to testŌĆØ) # Python comment

    The Python developer can comment multiple lines as follows:


    ```

    #This is the first comment

    #this is the second line comment

    #This is the third line comment

    #this is also a comment

    ```


    > Note: Comments omitted at runtime and these comments leave additional information
    in code.


    > Note: The triple quoted string is also ignored by Python interpreter and can
    be used as a multiline comment.


    ```

    ''''''this is the

    test the

    multiline comment '''''',

    ```


