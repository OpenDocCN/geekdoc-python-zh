    TABLE 10.1 Predefined Attributes in Python Time Module


    | Attribute | Description |

    | :--- | :--- |

    | time.timezone | It is the offset of the local time zone from UTC in seconds.
    |

    | Time.tzname | It is the pair of local dependent string. |


    TABLE 10.2 Methods in Time Module


    | Function | Description |

    | :--- | :--- |

    | time.altzone | It is the offset of local time zone to UTC in seconds. |

    | time.asctime([tupletime]) | Returns the date in a readable 24-character string.
    |

    | time.clock() | Returns the current CPU time. |

    | time.ctime() | Returns the date in a readable 24-character string in terms of
    seconds. |

    | time.gmtime([secs]) | Returns a time tuple of UTC time. |

    | time.localtime([secs]) | Returns the local time. |

    | time.mktime(tupletime) | Returns the time since the epoch. |

    | time.sleep(secs) | Suspends the calling thread for the specified time in terms
    of seconds. |

    | time.strftime(fmt[,tupletime]) | Returns the string format of time. |

    | time.strptime(str,fmt=''%a %b %d %H: %M:%S %Y'') | Returns the time in the time
    tuple format. |

    | time.time() | Returns the current time. |

    | time.tzset() | Resets the time conversion rules. |


    # 11.4 CALENDAR MODULE


    The calendar module has predefined methods to retrieve and process the year and
    month. By default, calendar considers the first day of the week as the Monday
    and last day of the week as Sunday. Calendar module provides the following list
    of functions.


    The predefined methods in the calendar module are tabulated in Table 10.3. The
    date format codes are tabulated in Table 10.4.


    TABLE 10.3 Predefined Methods in the Calendar Modules


    | Function | Description |

    | :--- | :--- |

    | calendar.calendar(year,w=2,l=1,c=6) | Returns calendar for year and formatted
    by the specified c, w and l. |

    | calendar.firstweekday() | Returns the starting day of each week. |

    | calendar.leapdays(y1,y2) | Returns the number of leap days between the given
    specified years. |


    (Continued)'
