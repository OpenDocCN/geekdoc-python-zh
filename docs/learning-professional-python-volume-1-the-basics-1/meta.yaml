    | Operator Precedence Order | Meaning | Associativity |

    | :--- | :--- | :--- |

    | () | Parentheses | left-to-right |

    | ** | Exponent | right-to-left |

    | +, -, ~ | Unary addition, Unary subtraction, and unary bitwise not | left-to-right
    |

