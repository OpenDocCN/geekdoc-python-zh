    \ program prints the multiplication table using while loop.\n\n## 3.7 FOR LOOP\n\
    \nThe for loop is used to iterate a sequence range of the items of different data\
    \ structures like list, tuple, string, etc.\n\n## Syntax\n\n```\nfor value in\
    \ sequence-range:\n    loop body\n```\n\nExplanation about the for syntax is discussed\
    \ in the next section:\n\n- For keyword.\n- The variable after the for keyword\
