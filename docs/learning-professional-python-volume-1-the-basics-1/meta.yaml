  md: 'TABLE 12.4 Regular Expression Patterns w.r.t Escape Sequence


    | Pattern | Description |

    | :--- | :--- |

    | \w | Searches to match for word |

    | \W | Searches to match for non-word |

    | \s | Searches for the white space |

    | \S | Searches for the non-white space |

    | \d | Searches for the digits |

    | \D | Searches for the non-digits |

    | \A | Returns match pattern if the corresponding characters are at the beginning
    of the string. |

    | \Z | Search at the end of the string |

    | \z | Search at the end of the string |

    | \G | Returns at the last match found |

    | \b | Returns match pattern if the corresponding characters are at the beginning
    of the string or at the end of the string |

    | \B | Returns match pattern if the corresponding characters are present in the
    string but not at the beginning of the string |

    | \1 . . . \9 | Returns a match for any digit between 0 and 9 |


    # 12.2 PYTHON MATCH FUNCTION


    The match is the predefined method in the re module, and this method matches the
    pattern with the string by using the optional flags.


    # Syntax


    ```

    re.match(pattern, string, flags=0)

    ```


    The parameters for the match function are as follows:


    +   - **Pattern** ŌĆō This sequence is the regular expression to be equated.

    - **String** ŌĆō This would be examined to match the pattern at the beginning of
    string.

    - **Flags** ŌĆō These are modifiers, and different modifiers are separated using
    bitwise or (|).


    The match function yields match object on equal, otherwise none.


    The group function () of match object


    group(num=0) ŌĆō returns complete match


    groups () ŌĆō returns all similar subgroups in a tuple'
