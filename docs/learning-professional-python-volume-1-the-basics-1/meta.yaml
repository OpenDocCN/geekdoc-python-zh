    # 7.4 REMOVE AN ELEMENT FROM THE SET


    To remove an element from the set, there are two predefined methods called the
    remove (), discard (). There is another predefined method called the pop () to
    remove the topmost element from the set. There is no guarantee that by using pop
    () which element from the set will be removed.


    # Program: Remove an element from the set


    ```

    s={"this","is","to","test"}

    print(s)

    s.remove("test")

    print(s)

    s.discard("this")

    print(s)

    s.pop()

    print(s)

    ```


