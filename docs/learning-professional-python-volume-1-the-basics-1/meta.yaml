  md: '# CHAPTER 9


    # Modules and Packages


    A module cab defines functions, classes, and variables. A module is a container
    that consists of functions. When a module is imported, its content is implicitly
    executed by Python. The initialization takes place only once, when the first import
    occurs on the assignments done by the module arenŌĆÖt repeated unnecessarily.


    # 9.1 PYTHON IMPORT STATEMENT


    The user can use any python source file as a module by implementing an import
    statement in some other python source file.


    **Syntax: Import module name**


    If there is a need to import more than one module, instead of using more than
    one import statement, list all the modules in a single import statement, and all
    the modules are separated by commas.


    ```

    import module1[, module2[, module3 . . . module N]]

    ```


    # 9.2 PYTHON FROM . . . IMPORT STATEMENT


    Pythons from statement lets the programmer import particular attributes from a
    module into the existing namespace. The statement from import does not import
    all the complete module in the current namespace.'
