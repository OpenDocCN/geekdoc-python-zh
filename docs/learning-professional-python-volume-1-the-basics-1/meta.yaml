  md: '5. The statements in the function are indented.


    6. The last statement of the function is the return statement. This statement
    exists the function and this statement is the optional.


    7. Function ends where the nesting or indent ends.


    # Syntax of Function


    ```

    def function name([parameters]):

    #Doc string

    Statement-1

    Statement-2

    Statement-3

    return[expression]

    ```


    # Example Program


    ```

    def test ():

    print ("this is inside the function")

    print ("this is the second statement inside the function")

    test()

