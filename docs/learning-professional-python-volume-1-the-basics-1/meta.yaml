    The important characteristics of Python programming:


    +   1. Python provides a high-level dynamic data type and strengthens dynamic
    type checking.

    2. Python is opensource; it can contribute to the development code.

    3. Python is as understandable as plain English.

    4. Python supports functional, structure, as well as object-oriented programming
    methods.

    5. Python supports automatic garbage collection.

    6. Python source code can be converted to the byte code.

    7. Easy to learn ŌĆō Python has a straightforward structure and obviously defined
    syntax. It is simple to read, easy to provide, and cross-platform compatible.

    8. Easy to teach ŌĆō Workload is smaller when compared to other programming languages
    techniques.

    9. Easy to use ŌĆō Python code is faster than other programming languages.

    10. Easy to understand ŌĆō Easier to understand than other programming languages.

    11. Easy to obtain ŌĆō Python is free, open source, and multiplatform.


    # 1.4 APPLICATIONS OF PYTHON


    +   1. Portable ŌĆō Python can run on all platforms, like Unix, Windows, and Macintosh.

    2. Extendable ŌĆō The developer can combine low-level modules to the Python interpreter.
    These modules allow the programmers to modify their tools useful database.

    3. Python offers interface to the commercial databases.

    4. GUI programming ŌĆō Python encourages graphical user interface applications by
    system calls, libraries, and Windows systems such as Windows MFC Macintosh and
    the X Windows system of Unix.'
