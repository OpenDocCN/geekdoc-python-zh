    \     10\nSmallest Tuple Item index Position  =       5\n```\n\n## 6.6 UNPACKING\
    \ OF TUPLES\n\nIn Python packing means placing a value in a new tuple, and unpacking\
    \ means extracting the tuple values back to the variables.\n\nPacking:\n\n```python\n\
    T=('this','is','to','test') # packing\n```\n\nUnpacking:\n\nMapping the right-hand\
    \ arguments to the left-hand arguments. The total number of variables on the left-hand\
    \ side should be equal to the total number of values in the tuple. For arbitrary\
    \ length, use the * arguments.\n\n```python\ne.g.: (a,b,c,d)=T # unpacking\n```\n\
