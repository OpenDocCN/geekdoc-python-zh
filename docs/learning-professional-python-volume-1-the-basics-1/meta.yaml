  md: "# Syntax\n\n```\nfrom module-name import attribute2[, attribute2 . . . attribute\
    \ n]]\n```\n\nTo import all names from a module into the current name space, use\
    \ import *.\n\n# Syntax\n\n```\nfrom module import *\n```\n\n# Namespace\n\nA\
    \ namespace is a space.\n\n> Note: The names in a single namespace should be unique.\n\
    \nA package in Python is a directory structure, and it consists of modules, sub-packages,\
    \ and sub-sub-packages. Modules are files containing Python statements and definitions\
    \ like functions and class definitions. Module\n\n# Program: Invoking parameter\
    \ less function using module\n\n```\nŌ£ō [54] %%writefile sample1.py\ndef fun1():\n\
    \    print(\"this is to test module\")\n\nWriting sample1.py\n\nŌ£ō [55] import\
    \ sample1\nsample1.fun1()\n\nthis is to test module\n```\n\nIn the preceding program,\
    \ fun1() exists in module sample1.py. In the main program, the first line is the\
    \ import sample1, that is, we are importing the module sample1, and after importing\
    \ the module, we can use all the variables and the functions from the imported\
    \ module. The second line of the main program is the sample1.fun1(). This is a\
    \ valid statement because we have imported the module sample1, and we are invoking\
    \ the function fun1() from the module sample1. The output for this program is\
    \ this is to test module."
