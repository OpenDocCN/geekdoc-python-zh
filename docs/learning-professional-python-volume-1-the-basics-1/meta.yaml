  md: '# 10.4 ANONYMOUS FUNCTIONS


    The anonymous functions are not stated in the normal approach by using the def
    keyword. For the anonymous functions, the programmer must use the lambda keyword.


    # Syntax


    ```

    lambda [arg1[, arg2[, arg3 . . . argn]]]: expression

    lambda arguments: expression

    ```


    # Program


    ```

    t=lambda: None

    print(t)

    ```


    # Output


    ```

    <function <lambda> at 0x7f301ff33d40>

    ```


    The preceding program is for lambda statement.


    # Program


    ```

    j = lambda i : i + 5

    print(j(3))

    ```


    # Output


    ```

    8

    ```


    The preceding program is for lambda statement with one parameter.


    # Program


    ```

    m = lambda i,j : i+j

    print(m(3,4))

    ```


    # Output


    ```

    7

    ```


    The preceding program is for lambda statement with two parameters.'
