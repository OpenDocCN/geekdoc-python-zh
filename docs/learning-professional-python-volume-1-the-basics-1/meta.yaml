    **Usharani Bhimavarapu** is working as an assistant professor in the Computer
    Science and Engineering Department at Koneru Lakshmaiah Education Foundation at
    Vaddeswaram, Andhra Pradesh, India. She has been teaching for the last 14 years
    with emphasis on data mining, machine learning, and data structure. She communicated
    more than 40 research papers in SCI, SCIE, and Scopus indexed journals. She has
    authored 12 books in programming languages like CPP, Java, Python, HTML, CSS,
    and so on.


    ![](img/ab76159771f69a3e80958ced9c4a987e_13_1.png)


    **Dr. Jude D. Hemanth** received his BE degree in ECE from Bharathiar University
    in 2002, ME degree in communication systems from Anna University in 2006, and
    PhD from Karunya University in 2013. His research areas include computational
    intelligence and image processing. He has authored more than 230 research papers
    in reputed SCIE indexed international journals and Scopus indexed international
    conferences. His cumulative impact factor is more than 350. He has published 37
    edited books with reputed publishers such as Elsevier, Springer, and IET.


    He has been serving as an associate editor of SCIE indexed international journals
    such as *IEEE Journal of Biomedical and Health Informatics* (IEEE-JBHI), *IEEE
    Transactions on Intelligent Transportation Systems*, *Soft Computing* (Springer),
    *Earth Science Informatics* (Springer), *IET Image Processing*, *Heliyon* (Elsevier),
    *Mathematical Problems in Engineering*, *PeerJ Computer Science*, *PLOS One*,
