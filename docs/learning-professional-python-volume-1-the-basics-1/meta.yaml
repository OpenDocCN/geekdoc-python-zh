  md: '# CHAPTER 12


    # Regular Expression


    A regex, or regular expression, is a sequence of characters that forms a search
    pattern. Regular expression can be used to check if a string contains the specified
    search pattern. Python has a built-in package called re, which can be used to
    work with the regular expressions. When the users import the re module, they can
    start using regular expressions. In Python re module supports regular expressions.
    The raw strings can be expressed as r''expression.


    # 12.1 THE RE MODULE


    Python supports the python regular expression functionality, and this functionality
    is supported using the re module. This module consists of the predefined attributes
    and the methods to perform the regular pattern matching and searching.


    # Syntax


    ```

    import re

    ```


    The different meta characters and different patterns are tabulated in Tables 12.1,
    12.2, 12.3, and 12.4.'
