    ```

    2021-10-29 04:29:08.289926

    2021-11-05 04:29:08.289926

    2021-11-05 17:29:08.289926

    ```


    The cited example computes the relative dates for next week or next month.


    # Example


    ```

    import calendar as c

    print(c.month(2020,11))

    ```'
