    print(re.split(''[a-f]+'', ''This IS To Test''))

    ```


    # 12.8 THE SUB () FUNCTION


    The Python re.sub () function replaces the occurrences of the specified pattern
    with the target pattern in the given string.


    # Syntax


    ```

    re.sub(pattern, repl, string, count=0, flags=0)

    ```


    The parameters for the match function are as follows:


    +   - **Pattern** ŌĆō This sequence is the regular expression to be equated.

    - **Repl** ŌĆō Replace string.

    - **String** ŌĆō This would be examined to match the pattern at the beginning of
    string.

    - **Count** ŌĆō Number of replacements.'
  - '[PAGE 267]


    +   - **Flags** ŌĆō These are modifiers, and different modifiers are separated using
    bitwise or (|).


    # Example


    ```

    import re

    s = ''this is to test''

    p = ''\s+''

    r=''''

    s1 = re.sub(p, r, s)

    print(s1)

    ```


    # Output


    ```

    thisistotest

    ```


    # Example


    ```

    import re

    s = ''this is to test''

    r=''''

    s1 = re.sub(r''\s+'', r, s, 1)

    print(s1)

    ```


    # Output


    ```

    thisis to test

    ```


    # Example


    ```

