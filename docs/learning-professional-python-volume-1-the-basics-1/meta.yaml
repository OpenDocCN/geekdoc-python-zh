- md: "The programmer can call a function by applying the following types of formal\
    \ arguments:\n\n- 1. Required arguments\n- 2. Keyword arguments\n- 3. Default\
    \ arguments\n- 4. Variable arguments\n\n## 10.3.1 Required Arguments\n\nThe required\
    \ arguments are also called the positional arguments. The number of the arguments\
    \ in the function call would match accurately with the function definition. Required\
    \ arguments are the arguments passed to a function in correct positional order,\
    \ that is, the i<sup>th</sup> argument is copied to the i<sup>th</sup> parameter.\n\
    \n### Program\n\n```python\ndef test(i,j):\n    print(\"i=\",i,\"j=\",j)\ntest(10,20)\n\
    test(20,10)\n```\n\n### Output\n\n```\ni= 10 j= 20\ni= 20 j= 10\n```\n\nThe preceding\
    \ program is about positional arguments. At line 3 when function is called, the\
    \ value 10 is passed to i, while calling second time test function, the value\
    \ 20 is copied to the variable i.\n\n## 10.3.2 Keyword Arguments\n\nKeyword arguments\
    \ are associated with the function calls. When the programmer uses the keyword\
    \ arguments in a function call, the function definition recognizes the arguments\
    \ by the parameter name. The programmer can skip the arguments or place them out\
    \ of order as the python interpreter is able to utilize the keywords required\
    \ to match the values with parameters. The position doesn't matter, that is, each\
    \ arguments value knows its destination based on the name (key) used.\n\n### Program\n\
    \n```python\ndef test(name,surname):\n    print(\"name:\",name,\"surname:\",surname)\n\
    test(name=\"usharani\",surname=\"bhimavarapu\")\ntest(surname=\"bhimavarapu\"\
    ,name=\"usharani\")\n```\n\n### Output\n\n```\nname: usharani surname: bhimavarapu\n\
    name: usharani surname: bhimavarapu\n```\n\n> Note: When mixing both the keyword\
    \ and the positional parameters, the positional parameters should be before the\
    \ keyword parameters.\n\n### Program\n\n```python\ndef add(a,b,c):\n    print(\"\
    add=\", (a+b+c))\nadd(10,c=20,b=30)\n```\n\n### Output\n\n```\nadd= 60\n```\n\n\
    The preceding program is about mix of both the positional and the keyword arguments.\n\
    \n### Program\n\n```python\ndef add(a,b,c):\n    print(\"add=\", (a+b+c))\nadd(c=10,20,b=30)\n\
    ```\n\n### Output\n\n```\nFile \"<ipython-input-110-f7d678c0b9db>\", line 3\n\
    add(c=10,20,b=30)\n    ^\nSyntaxError: positional argument follows keyword argument\n\
    ```\n\nIn the preceding program, an error has occurred because the first argument\
    \ is the keyword argument, but the second argument is the positional argument,\
    \ so syntax error has occurred. The positional arguments should be before the\
    \ keyword arguments. Replace line 3 with add (c=20, a=20,b=30) and given in the\
    \ next example.\n\n### Program\n\n```python\ndef add(a,b,c):\n    print(\"add=\"\
    , (a+b+c))\nadd(c=10,a=20,b=30)\n```\n\n### Output\n\n```\nadd= 60\n```\n\n###\
    \ Program\n\n```python\ndef add(a,b,c):\n    print(\"add=\", (a+b+c))\nadd(10,a=20,b=30)\n\
    ```\n\n### Output\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    <ipython-input-112-d05b0f077928> in <module>()\n      1 def add(a,b,c):\n    \
    \  2     print(\"add=\", (a+b+c))\n----> 3 add(10,a=20,b=30)\n\nTypeError: add()\
    \ got multiple values for argument 'a'\n```\n\nIn the preceding program, in function\
    \ call add (), the first argument is positional argument, and it is copied to\
    \ the parameter a. The second argument is the keyword argument and trying to copy\
    \ the value 20 again to the parameter a. The error has occurred at this point\
    \ because of trying to pass multiple values to the same parameter a. When using\
    \ keyword arguments, avoid passing more than one value to one parameter.\n\n##\
    \ 10.3.3 Default Arguments\n\nA default argument is an argument that supposes\
    \ a default value if a value is not given in the function call for that argument.\n\
    \n### Program\n\n```python\ndef add(a=1,b=5,c=8):\n    print(\"add=\", (a+b+c))\n\
    add(10)\n```\n\n### Output\n\n```\nadd= 23\n```\n\n### Program\n\n```python\n\
    def add(a=1,b=5,c=8):\n    print(\"add=\", (a+b+c))\nadd(10,20,30)\n```\n\n###\
    \ Output\n\n```\nadd= 60\n```\n\n### Program\n\n```python\ndef add(a=1,b=5,c=8):\n\
    \    print(\"add=\", (a+b+c))\nadd()\n```\n\n### Output\n\n```\nadd= 14\n```\n\
    \n### Program\n\n```python\ndef add(a=1,b=5,c=8):\n    print(\"add=\", (a+b+c))\n\
    add(b=10)\n```\n\n### Output\n\n```\nadd= 19\n```\n\n### Program\n\n```python\n\
    def add(a=1,b=5,c=8):\n    print(\"add=\", (a+b+c))\nadd(a=10,c=20)\n```\n\n###\
    \ Output\n\n```\nadd= 35\n```\n\n### Program\n\n```python\ndef add(a,b=5,c):\n\
    \    print(\"add=\", (a+b+c))\nadd(a=10,c=20)\n```\n\n### Output\n\n```\nFile\
    \ \"<ipython-input-118-957033311ea7>\", line 1\ndef add(a,b=5,c):\n      ^\nSyntaxError:\
    \ non-default argument follows default argument\n```\n\nWhen the user specifies\
    \ the default arguments before the non-default argument, an error will arise.\n\
    \n> Note: The default arguments come after non-default arguments.\n\n## 10.3.4\
    \ Variable Length Arguments\n\nAn asterisk (*) is arranged prior to the variable\
    \ name that retains the values of all non-keyword arguments.\n\n### Program\n\n\
    ```python\ndef test(*args):\n    n = args[0]\n    for i in args:\n        if i\
    \ < n:\n            n = i\n    return n\n\ntest(4,1,2,3,4)\n```\n\n## 10.4 ANONYMOUS\
    \ FUNCTIONS\n\nThe anonymous functions are not stated in the normal approach by\
    \ using the def keyword. For the anonymous functions, the programmer must use\
    \ the lambda keyword.\n\n### Syntax\n\n```python\nlambda [arg1[, arg2[, arg3 .\
    \ . . argn]]]: expression\nlambda arguments: expression\n```\n\n### Program\n\n\
    ```python\nt=lambda: None\nprint(t)\n```\n\n### Output\n\n```\n<function <lambda>\
    \ at 0x7f301ff33d40>\n```\n\nThe preceding program is for lambda statement.\n\n\
    ### Program\n\n```python\nj = lambda i : i + 5\nprint(j(3))\n```\n\n### Output\n\
    \n```\n8\n```\n\nThe preceding program is for lambda statement with one parameter.\n\
    \n### Program\n\n```python\nm = lambda i,j : i+j\nprint(m(3,4))\n```\n\n### Output\n\
    \n```\n7\n```\n\nThe preceding program is for lambda statement with two parameters.\n\
    \n### Program\n\n```python\ns = [1,2,3,4,5,6,7]\nm = list(map(lambda i: i + 2,\
    \ s))\nprint(m)\n```\n\n### Output\n\n```\n[3, 4, 5, 6, 7, 8, 9]\n```\n\nThe preceding\
    \ program is for lambda and the map ().\n\n### Program\n\n```python\ns = [1,2,3,4,5,6,7]\n\
    m = list(filter(lambda i: i%2==0, s))\nprint(m)\n```\n\n### Output\n\n```\n[2,\
    \ 4, 6]\n```\n\nThe preceding program is for lambda and the filter ().\n\n## 10.5\
    \ RETURN STATEMENT\n\nReturn is a keyword in Python. The return statement is the\
    \ last statement, and the return statement exists the function. The return statement\
    \ is the optional statement. It may or may not contain the arguments. There are\
    \ two variants for return statement.\n\n### Syntax\n\n```python\nreturn\nreturn(expression)\n\
    ```\n\nThe return statement stops the function execution and goes back to the\
    \ point of the function invocation. When the programmer wants to return to point\
    \ of function invocation despite reaching the end of the program, they can use\
    \ the variants of the return statement.\n\n### Program\n\n```python\ndef test():\n\
    \    print(\"inside function\")\n    return;\n    print(\"end of functions\")\n\
    print(\"in main\")\ntest()\nprint(\"end of main\")\n```\n\n### Output\n\n```\n\
    in main\ninside function\nend of main\n```\n\nIn the preceding program, despite\
    \ reaching the end of the program, return to main program ŌĆō unconditional return.\n\
    \n### Program\n\n```python\ndef test():\n    return None\ntest()\nprint(\"end\
    \ of main\")\n```\n\n### Output\n\n```\nend of main\n```\n\nThe preceding program\
    \ explicitly returning none in the user-defined function test.\n\n> Note: Return\
    \ implicitly means return None.\n\n### Program\n\n```python\ndef test(i):\n  \
    \  if(i<10):\n        print(\" should be >10\")\n        return\ntest(5)\nprint(\"\
    end of main\")\n```\n\n### Output\n\n```\nshould be >10\nend of main\n```\n\n\
    In the preceding program, the return is used in the conditional statement if.s.\n\
    \n### Program\n\n```python\ndef test(i,j):\n    return(i+j)\nprint(\"add\",test(5,10))\n\
    print(\"end of main\")\n```\n\n### Output\n\n```\nadd 15\nend of main\n```\n\n\
    The preceding program result returns from the function.\n\n### Program\n\n```python\n\
    def test(i):\n    if(i<10):\n        return True\nprint(test(5))\n```\n\n### Output\n\
    \n```\nTrue\n```\n\nThe preceding program returns boolean values. If the value\
    \ of variable(i) is less than value 10, then the program returns boolean value\
    \ True.\n\n## 10.6 FUNCTION VARIABLE SCOPE\n\nVariables that are specified within\
    \ a function body have a local extent, and the variables defined outside have\
    \ a global scope. The variables declared inside the function body can be retrieved\
