    # 4.7 TRIPLE QUOTES


    Triple quotes permit the string to span multiple lines.


    Program


    ```

    s="""this is

    to test"""

    print(s)

    ```


    Output


    ```

    this is

    to test

    ```


    # 4.8 UNICODE STRINGS


    In Python the normal strings are accumulated as the 8-bit ASCII, whereas the unicode
    strings are saved as the 16-bit values.


    Note: Unicode strings apply the prefix u; raw strings use the prefix r.


    Program


    ```

    print(u''test'')

    ```


    Output


    ```

    test

    ```


