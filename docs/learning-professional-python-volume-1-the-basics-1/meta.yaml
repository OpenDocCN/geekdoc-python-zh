    # 7.4 REMOVE AN ELEMENT FROM THE SET


    To remove an element from the set, there are two predefined methods called the
    remove (), discard (). There is another predefined method called the pop () to
    remove the topmost element from the set. There is no guarantee that by using pop
    () which element from the set will be removed.


    # Program: Remove an element from the set


    ```

    s={"this","is","to","test"}

    print(s)

    s.remove("test")

    print(s)

    s.discard("this")

    print(s)

    s.pop()

    print(s)

    ```


    # Output


    ```

    {`test`, `is`, `to`, `this`}

    {`is`, `to`, `this`}

    {`is`, `to`}

    {`to`}

    ```


    # 7.5 DELETE THE SET


    There are two predefined methods called the clear () and del to delete the set
    elements. Clear only deletes the set elements and the empty set retains, but the
    del keyword deletes the entire set.


    # Program: using del keyword


    ```

    s={"this","is","to","test"}

    ```'
