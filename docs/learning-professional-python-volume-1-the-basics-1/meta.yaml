    # 2.5 EXPRESSION EVALUATION


    An expression is a combination of operands and operators. In Python, eval() evaluates
    the expression dynamically.


    Syntax:


    ```

    eval(expression[,globals[,locals]])

    E.g.: eval("123+123")

    246

    E.g.: eval("sum[10,10,10])", {})

    30

    E.g.: x=100,y=100

    eval("x+y")

    200

    In the given example both x and y are global variables.

    E.g.: eval("x+50", {}, {"x":50})

    100

    ```


    In the cited example x is the local variable because it is defined inside the
    eval function.'
