    many Scopus journals. He has been serving as the series editor of Biomedical Engineering
    series (Elsevier), editorial board member of ASTI series (Springer), and Robotics
    and Healthcare series (CRC Press).


    He has received a project grant of 35,000 UK pounds from the UK government (GCRF
    scheme) with collaborators from the University of Westminster, UK. He has also
