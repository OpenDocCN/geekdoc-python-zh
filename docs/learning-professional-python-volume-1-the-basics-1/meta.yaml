    # 2.3 STRING OPERATORS


    The string operators in Python are + (concatenation) and * (replication). Concatenation
    operator concatenates more than one string into one. The concatenation operator
    is not commutative, for example, ab is not equal to ba. When * sign is applied
    to string and a number, it replicates the string the same number of times specified
    by the number.'
