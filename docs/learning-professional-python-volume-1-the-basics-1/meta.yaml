    \    print(i)\n```\n\n### Output\n\nt\ne\nt\n\n### Program\n\n```\n#Amstrong number\n\
    n=int(input(\"enter number\"))\nsum=0\nt=n\nC=0\nwhile t>0:\n    c = c+1\n   \
    \ t=t//10\nt=n\nwhile t>0:\n    r=t%10\n    sum+=(r**c)\n    t//=10\nif n==sum:\n\
    \    print(n,\"is amstrong number\")\nelse:\n    print(n,\"is not amstrong number\"\
    )\n```\n\n### Output\n\n```\nenter number5\n5 is amstrong number\n```\n\nThe preceding\
