    # 12.7 THE SPLIT () FUNCTION


    The Python re.split () function splits the given string based on the given specific
    pattern. This function returns the list, which consists of the resultant substring
    of the given string.


    # Syntax


    ```

    re.split(pattern, string, maxsplit=0, flags=0)

    ```


    The parameters for the match function are as follows:


    +   - **Pattern** ŌĆō This sequence is the regular expression to be equated.

    - **String** ŌĆō This would be examined to match the pattern at the beginning of
    string.

    - **Maxsplit** ŌĆō The maximum number of splits that the user wants to perform.

    - **Flags** ŌĆō These are modifiers, and different modifiers are separated using
    bitwise or (|).


    # Example


    ```

    import re

    s = ''five:5 twenty one:21 ten:10''

    p = ''\d+''

    r=re.split(p, s, 1)

    print(r)

    ```'
