    # Preface


    Python is a general-purpose interpreted programming language used for deep learning,
    machine learning, and complex data analysis. Python is a perfect language for
    beginners as it is easy to learn and understand. This book is intended to teach
    the reader how to program in Python. The book aims to get you up to speed fast
    enough and have you writing real Python programs in no time at all. It assumes
    no previous exposure to the Python language and is suited to both beginners and
    experienced programmers. This book gives a comprehensive, in-depth introduction
    to the core Python language.


    This book helps you in gaining a quick grasp of the fundamentals of Python programming
    and working with built-in functions. The book then moves to help you in exception
    handling, data wrangling, databases with Python, regular expressions, NumPy arrays,
    data frames and plotting. The Python Programming culminates with how you can continue
    learning Python after reading this book and leaves you with a problem to solve,
    testing your skills even at the last step.


    The book contains approximately 500 tested programs, and all these programs have
    been tested using the IDE Anaconda, Google colaboratory, and Python online compilers
    compatible to the Windows operating system and discussed the appropriate nature
    of the output. The book further mentions a summary of the technical aspects of
    interviewing tips on negotiating the best offer and guiding the best way.


    This book is for data analysts, IT developers, and anyone looking to get started
    with or transition to the field of software or refresh their knowledge of Python
    programming. This book will also be useful for students planning to build a career
    in data engineering or IT professionals preparing for a transition. No previous
    knowledge of data engineering is required. The book aims to get you up to speed
    fast enough and have you writing real Python programs in no time at all.


    It contains 12 chapters, and at the end of every chapter, practice exercises are
    given to enable the learners to review the knowledge gained. Each chapter starts
    with a brief introduction, top tips, and a review of the essential library methods,
    finally followed by broad and thought-provoking problems.


    We are thankful to Taylor and Francis Publications for undertaking the publication
    of this book and supporting us in this endeavor. Any suggestions for the improvement
    of the book will be thankfully acknowledged and incorporated in the next edition.


    Dr. Usharani Bhimavarapu

    Dr. Jude D. Hemanth


    # Author Biographies


