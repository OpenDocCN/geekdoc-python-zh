    # CHAPTER 10


    # Functions


    A function is a part of reusable code and provides a better modularity. Functions
    can have parameters and return values. The functions in Python are of four types:


    +   - Built-in functions ŌĆō Python language supports predefined functions like
    print (), input ().

    - Predefined functions ŌĆō The programmers can create their own functions.

    - Modules

    - Lambda functions


    # 10.1 DEFINING A FUNCTION


    Guidelines to define a function in Python:


    +   1. Function blocks start with the keyword **def** followed by the user-defined
    function name and parentheses.

    2. The input parameters or arguments should be put within these parentheses.

    3. The parentheses are followed by the colon (:).

    4. The initial statement of a function is the documentation string or doc string
    of the function, and this statement is the optional.'
