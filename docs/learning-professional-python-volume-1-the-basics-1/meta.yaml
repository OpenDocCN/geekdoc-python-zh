    An operator is a symbol that can operate on the operands. The operators can be
    classified as follows:


    +   1. Unary Operator

    2. Binary Operator

    3. Ternary Operator


    # 2.1.1 Unary Operators


    It works on single variable. The unary operators in python are the following:


    +, -,


    # 2.1.2 Binary Operator


    It works on single variables. For binary operators, refer to section 2.2.


    # 2.1.3 Ternary Operator


    It works on three variables. Ternary operator evaluates the expression based on
    the condition being true or false. Ternary operator allows the testing condition
    in a single line instead of the multiline if else code.'
