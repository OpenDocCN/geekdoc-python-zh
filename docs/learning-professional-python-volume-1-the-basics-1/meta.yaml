    # 6.7 INDEXING, SLICING ON TUPLES


    The [] operator is used to index or slice the tuple in Python. Indexing the tuple
    uses either the positive or the negative value. The positive index fetches the
    index from the tuple left, whereas the negative index fetches from the tuple right.
    Tuple slicing uses the slicing operator (:) to retrieve a range of items.


    # Syntax for tuple index


    ```

    Tuplename[index]

    Syntax for tuple slicing

    Tuplename[start:stop:step]

    ```


    # Program


    ```

    t = (''a'', ''b'', ''c'', ''d'')

    print(t[1])

    print(t[-1])

    print(t[:2])

    print(t[1:3])

    print(t[::2])

    ```


    # Output


    ```

    b

    d

    (''a'', ''b'')

    (''b'', ''c'')

    (''a'', ''c'')

    ```'
