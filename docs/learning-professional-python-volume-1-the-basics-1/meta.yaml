  md: '# Tuple


    A tuple is a collection of objects in sequence that is ordered and immutable.
    The main difference between list and the tuple is the tuples use the parentheses,
    whereas the list uses the square brackets. The tuples cannot be changed unlike
    lists. The tuple elements are separated by the comma operator. Tuple index starts
    with 0. The example for the tuple is as follows:


    ```

    T1= (''this'', ''is'', ''to'', ''test'')

    T2= ("this", "is", "to", "test")

    T3= (1,2,3,4,5)

    T4= (1.1,2.2,3.3,4.4)

    ```


    # 6.1 TUPLE CREATION


    The empty tuple is written as two parentheses with nothing:


    ```

    T1= ()

    ```


    If the tuple contains a single element, the programmer must include the comma
    operator even if the tuple contains a single element. For example:


    ```

    T1= (1,)

    ```


    # Program


    ```

    t=tuple((1,2,3))

    print(t)

    t1=tuple(("this","is","to","test"))

    ```'
