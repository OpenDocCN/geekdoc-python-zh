    # 1.6 PYTHON IDENTIFIERS


    A Python identifier is their name used to recognize a variable, function, module,
    class, or an object. An identifier begins with the letter, or an underscore followed
    by digits. Python does not permit punctuation marks such as @, $, ^. Python is
    a case-sensitive programming language. For example, Test and test are two unique
    identifiers in Python.

    Naming rules for Python identifiers:


    +   1. Class names begin with an uppercase letter. All additional identifiers
    beginning with a lowercase letter.

    2. If the identifier closes with two trailing underscores, the identifier is the
    language specified special name.

    3. Beginning with an identifier with a particular leading _underscore signifies
    that the identifier is private.

    4. Beginning an identifier with the two prominent underscores indicates it is
    an intensely private identifier.


    # 1.7 RESERVED WORDS


    Table 1.1 shows the Python keywords. These keywords cannot be used as a constant
    or variable or any other identifier names.'
