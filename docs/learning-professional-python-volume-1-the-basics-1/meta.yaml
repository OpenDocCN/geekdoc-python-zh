  md: '# 7.7 SET MEMBERSHIP OPERATORS


    Set membership operators in Python test for membership in set. Table 7.2 tabulates
    the Python membership operations.


    TABLE 7.2 Python Membership Operations


    | Operation | Description |

    | :--- | :--- |

    | in | Returns true if the element is found in the set; otherwise false |

    | not in | Returns true if the element is not found in the set; otherwise false
    |


