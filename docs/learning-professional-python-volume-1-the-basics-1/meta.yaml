    # 2.6 INPUT () FUNCTION


    The input () function can read the data entered by the programmer. The input ()
    prompts the programmer to input some data from the console (default from keyboard).
    When the input () function is invoked without arguments, the function will switch
    the console to the input mode. The cursor blinks, and the programmer can input
    some keys. By pressing the enter key, the inputted data will be sent to the source
    code through the input functions result. The programmers must catch what the input
    function returns otherwise the entered data will be lost.


    > Note: The default return type of the input () function is the string.


    > Note: The input () function is invoked with one argument.


    E.g.: i=input ()


    # Program


    ```

    print("enter 2 integers")

    a=int(input())

    b=int(input())

    print(a+b)

    ```


    # Output


    ```

    enter 2 integers

    10

    30

    40

    ```


    The preceding program uses the input () function without arguments.


    # Program


    ```

    a=int(input("enter integer:"))

    b=int(input("enter integer:"))

    c=a+b

    print("sum=",c)

    ```


    # Output


    ```

    enter integer:1

    enter integer:3

    sum= 4

    ```'
