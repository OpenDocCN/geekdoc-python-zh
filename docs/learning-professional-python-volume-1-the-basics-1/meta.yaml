    We can use the different operators to perform some operations in the dictionary.
    Some examples are listed here.


    Program


    ```

    d={1:"this",2:"is",3:"to",4:"test"}

    print(d)

    print("1 in d:",1 in d)

    print ("test in d:","test" in d.values())

    print("5 not in d:",5 not in d)

