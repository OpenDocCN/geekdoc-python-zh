    \ elif.\n\n## 3.6 WHILE\n\nWhile loop repeats the execution if the condition evaluates\
    \ to true. If the condition is false for the first time, the while loop body is\
    \ not executed even once. The loop body should be able to change the condition\
    \ value because if the condition is true at the beginning, the loop body may run\
    \ continuously to infinity.\n\n## Syntax\n\n```\nwhile condition:\n    # Indent\
    \ block is executed if the condition evaluates to true\n    statement 1\n    statement\
    \ 2\n    statement 3\n    statement 4\n```\n\n## Program\n\n```\n# Python3 program\
    \ to find Smallest of\n# three integers without comparison operators\ndef smallest(x,\
    \ y, z):\n    c = 0\n    while (x and y and z):\n        x = x - 1\n        y\
    \ = y - 1\n        z = z - 1\n        c = c + 1\n    return c\n\n# Driver Code\n\
    x = 12\ny = 15\nz = 5\nprint(\"Minimum of 3 numbers is\", smallest(x, y, z))\n\
