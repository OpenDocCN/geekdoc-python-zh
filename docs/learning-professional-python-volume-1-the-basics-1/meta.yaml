    \ a Python program to print the five-column calendar of the specified year.\n\
    - 10. Write a Python program to find whether the current year is a leap year or\
    \ not.\n\n## CHAPTER 12\n\n## Regular Expression\n\nA regex, or regular expression,\
    \ is a sequence of characters that forms a search pattern. Regular expression\
    \ can be used to check if a string contains the specified search pattern. Python\
    \ has a built-in package called re, which can be used to work with the regular\
    \ expressions. When the users import the re module, they can start using regular\
    \ expressions. In Python re module supports regular expressions. The raw strings\
    \ can be expressed as r'expression.\n\n## 12.1 THE RE MODULE\n\nPython supports\
    \ the python regular expression functionality, and this functionality is supported\
    \ using the re module. This module consists of the predefined attributes and the\
    \ methods to perform the regular pattern matching and searching.\n\n### Syntax\n\
    \n```python\nimport re\n```\n\nThe different meta characters and different patterns\
    \ are tabulated in Tables 12.1, 12.2, 12.3, and 12.4.\n\n### TABLE 12.1 Regular\
    \ Expression Modifiers\n\n| Modifier | Description |\n| :--- | :--- |\n| re.I\
    \ | Case-insensitive matching |\n| re.L | By following the current system locale,\
    \ interpretation of the words using the alphabetic group |\n| re.M | Do search\
    \ at the end of the line and at the beginning of the line |\n| re.S | Checking\
    \ for period match including the new line |\n| re.U | Interprets the letters as\
    \ per the Unicode letters |\n| re.X | Ignores white space |\n\n### TABLE 12.2\
    \ Regular Expression Patterns w.r.t Control Characters\n\n| Pattern | Description\
    \ |\n| :--- | :--- |\n| ^ | Searches at the beginning of the line |\n| $ | Searches\
    \ at the end of the line |\n| . | checks the single character |\n| [...] | Searches\
    \ for the characters within the brackets |\n| [^...] | Searches for the characters\
    \ not with in the brackets |\n\n### TABLE 12.3 Regular Expression Patterns w.r.t\
    \ Pattern Matching\n\n| Pattern | Description |\n| :--- | :--- |\n| re* | Searches\
    \ for the zero or more occurrences of the specified pattern |\n| re+ | Searches\
    \ for the one or more occurrences of the specified pattern |\n| re? | Searches\
    \ for the zero or one occurrences of the specified pattern |\n| re{n} | Searches\
    \ for the n number of occurrences of the specified pattern |\n| re{n,} | Searches\
    \ for the n or more occurrences of the specified pattern |\n| re{n,m} | Searches\
    \ at least n and at most m occurrences of the specified pattern |\n| a\\|b | Searcher\
    \ either for a or b |\n| (re) | Remember the matched pattern |\n| (?:re) | Does\
    \ not remember the matched pattern |\n| (?# ...) | Comment |\n| (?=re) | Specifies\
    \ the position using the pattern |\n| (?!re) | Specifies the position using the\
    \ negation |\n| (?>re) | Searches for the independent pattern |\n\n### TABLE 12.4\
    \ Regular Expression Patterns w.r.t Escape Sequence\n\n| Pattern | Description\
    \ |\n| :--- | :--- |\n| \\w | Searches to match for word |\n| \\W | Searches to\
    \ match for non-word |\n| \\s | Searches for the white space |\n| \\S | Searches\
    \ for the non-white space |\n| \\d | Searches for the digits |\n| \\D | Searches\
    \ for the non-digits |\n| \\A | Returns match pattern if the corresponding characters\
    \ are at the beginning of the string. |\n| \\Z | Search at the end of the string\
    \ |\n| \\z | Search at the end of the string |\n| \\G | Returns at the last match\
    \ found |\n| \\b | Returns match pattern if the corresponding characters are at\
    \ the beginning of the string or at the end of the string |\n| \\B | Returns match\
    \ pattern if the corresponding characters are present in the string but not at\
    \ the beginning of the string |\n| \\1 . . . \\9 | Returns a match for any digit\
    \ between 0 and 9 |\n\n## 12.2 PYTHON MATCH FUNCTION\n\nThe match is the predefined\
    \ method in the re module, and this method matches the pattern with the string\
    \ by using the optional flags.\n\n### Syntax\n\n```python\nre.match(pattern, string,\
    \ flags=0)\n```\n\nThe parameters for the match function are as follows:\n\n-\
    \ **Pattern** ŌĆō This sequence is the regular expression to be equated.\n- **String**\
    \ ŌĆō This would be examined to match the pattern at the beginning of string.\n\
    - **Flags** ŌĆō These are modifiers, and different modifiers are separated using\
    \ bitwise or (|).\n\nThe match function yields match object on equal, otherwise\
    \ none.\n\nThe group function () of match object\n\ngroup(num=0) ŌĆō returns complete\
    \ match\n\ngroups () ŌĆō returns all similar subgroups in a tuple\n\n## Example\n\
    \n```python\nimport re\ns = \"this is to test the python regular expressions\"\
    \nm = re.match(r'(.*?)are(.*?) .*', s, re.M)\nprint(m)\nif m:\n    print(m.group())\n\
    \    print(m.group(1))\n    print(m.group(2))\n```\n\n## Output\n\n```\nNone\n\
    ```\n\n## Example\n\n```python\nimport re\ns = \"this is to test\"\nx = re.match(\"\
    ^t . . .\", s)\nif x:\n    print(\"found\")\nelse:\n    print(\"not found\")\n\
    ```\n\n## Output\n\n```\nfound\n```\n\nThe preceding program searches whether\
    \ any word starts with ŌĆśtŌĆÖ and word length is four.\n\n## 12.3 THE SEARCH FUNCTIONS\n\
    \nThe search function explores for first existence of re sequence within string.\n\
    \n### Syntax\n\n```python\nre.search(pattern, string, flags=0)\n```\n\nThe parameters\
    \ for the search function are as follows:\n\n- Pattern ŌĆō This pattern is to be\
    \ matched.\n- String ŌĆō Searched at the beginning of string.\n- Flags ŌĆō These are\
    \ modifiers, and different modifiers are separated using bitwise or (|). The flags\
    \ in the search function are optional\n\nThe search function sends match object\
    \ on success, otherwise none\n\nThe group function () of match object\n\ngroup(num=0)\
    \ ŌĆō returns complete match\n\ngroups () ŌĆō returns all similar subgroups in a tuple\n\
    \n## Example: Search function\n\n```python\nimport re\ntxt = \"It is still raining\"\
