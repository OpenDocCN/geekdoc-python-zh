    # 7.6 PYTHON SET OPERATIONS


    Most of the set operations works on two sets. Table 7.1 tabulates the operations
    on sets.


    TABLE 7.1 Python Set Operations


    | Operation | Symbol | Description |

    | :--- | :--- | :--- |

    | union | U | Combines both sets |

    | intersection | Ōł® | Selects elements that are common in both sets |

    | difference | - | The elements in first set but not in second |


    # Program: Set operations


    ```

    s={1,2,3,"test"}

