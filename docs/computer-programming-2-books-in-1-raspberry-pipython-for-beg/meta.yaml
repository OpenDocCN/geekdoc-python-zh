- md: "## Applications\n\nHowever, none of these files create a functional website.\
    \ For that, we need applications. Applications are where the code that makes the\
    \ website work is written, but before we take a look at them, we need to get a\
    \ little understanding of Django's design principles.\n\nFirst, Django is an MVC\
    \ framework, which stands for Model View Controller. Django refers to itself as\
    \ an MTV framework, which stands for Model Template View. It is a slightly different\
    \ approach than MVC, but fundamentally, they are quite similar. MVC is an architectural\
    \ pattern that provides a method to structure your projects. Separates the code\
    \ that is used to process data from the code that manages the user interface.\n\
    \nSecond, Django subscribes to the DRY, or Don't Repeat Yourself philosophy, which\
    \ means you should never write code that performs a certain task more than once.\
    \ For example, on our Blog, if we wrote a function that picked a random article\
    \ from the archive and implemented this function on multiple pages, we would not\
    \ re-code it every time it was needed. We code it once and then use it on every\
    \ page.\n\nSo how does this relate to apps? Well, the applications allow you to\
    \ write your website in a DRY style. Each project, like the one we have here,\
    \ can contain multiple applications. Rather, each application can be part of multiple\
    \ projects. Using the example from before, this means that if we created another\
    \ site in the future that also needed a random page function, we wouldn't have\
    \ to rewrite it. We could just import the application from this project. Because\
    \ of this, it is important that each application has a different purpose. If you\
    \ write all the functionality of your site inside one app, and then you need to\
    \ use part of it again later, you have to import it all. If you were creating\
    \ an e-commerce website, for example, you wouldn't want to import all the blog\
    \ features. However, if you create an app for the shuffle function and an app\
    \ for the blog publishing system, you can choose the bits you need.\n\nThis also\
    \ means that within site, the code is well organized. If you want to modify a\
    \ feature, you don't have to search a massive archive; instead, you can navigate\
    \ to the corresponding app and change it without worrying about interfering with\
    \ anything else.\n\n```\npython manage.py startapp blog\ncd blog\nls\n```\n\n\
    Again, we have a file `__init__.py` to convert it into a package and three other\
    \ files: models, tests, and views. We don't need to worry about testing for now,\
    \ but the other two are important. Models and Views are the parts M and V by MVC.\n\
    \nWhen you want to access that data, go through these models by calling the method\
    \ on them, rather than running raw queries. This is very useful because Django\
    \ can use multiple database programs. We are going to use MySQL today because\
    \ it is the most powerful, and it is what most hosts offer. However, if we need\
    \ to switch to a different database in the future, all the code will still be\
    \ valid! In other languages, if you wanted to switch to SQLite or something similar,\
    \ you would need to rewrite the code that accesses your database. In the views\
    \ file, we write the code that generates the web pages. This ties all the other\
    \ parts together. When typing a URL, it is sent through the script urls that we\
    \ saw before the script of views, which then obtains relevant data from the models,\
    \ processes it, and passes it to a template, which is finally served as the page\
    \ the user sees. We'll take a look at those templates shortly. They are the easiest\
    \ part, mainly HTML.\n\nFor a blog, we will need a table of posts, with various\
    \ fields for the title, body text, author, time of writing, etc. An actual blog\
    \ demo.\n\n```python\nfrom django.db import models\n\nclass posts(models.Model):\n\
    \    author = models.CharField(max_length=30)\n    title = models.CharField(max_length=100)\n\
    \    bodytext = models.TextField()\n    timestamp = models.DateTimeField()\n```\n\
    \n## MySQL\n\nThese models are only a description. We need to make a real database\
    \ of them. First, however, we need MySQL to run on our system. On a real webserver,\
    \ this wouldn't be a problem as they usually have it pre-installed. Fortunately,\
    \ with a package manager, it is easy to install. First, you need to install Homebrew\
    \ and Easy installation.\n\n```\nbrew install MySQL\neasy_install MySQL-python\n\
    mysqld_safe --skip-grant-tables # let anyone have full permissions\nmysql -u root\n\
    ```\n\n```sql\nUPDATE mysql.user SET Password = PASSWORD('nettuts') WHERE User\
    \ = 'root';\n# give the user 'root' a password\nFLUSH PRIVILEGES;\nmysql -u root\
    \ -p # log in with our password 'nettuts'\nCREATE DATABASE firstblog;\nquit\n\
    ```\n\n```\npython2.6 manage.py runserver\n```\n\nWhen you reboot, MySQL won't\
    \ run, so whenever you need to do this in the future, run MySQL to start the server.\
    \ You can then run `python2.6 manage.py runserver` in a new tab to start the development\
    \ server.\n\nThis command will not run the server yet. It will just return an\
    \ error. That's because we have to adjust our settings. Let's take a look at `settings.py`.\n\
    \nYou must first change the database configuration. These start in line twelve.\n\
    \n```python\nDATABASES = {\n    'default': {\n        'ENGINE': 'django.db.backends.mysql',\
    \ # Add 'postgresql_psycopg2', 'postgresql', 'mysql', 'sqlite3' or 'oracle'.\n\
    \        'NAME': 'firstblog', # Or path to database file if using sqlite3.\n \
    \       'USER': 'root', # Not used with sqlite3.\n        'PASSWORD': 'nettuts',\
    \ # Not used with sqlite3.\n        'HOST': '', # Set to empty string for localhost.\
    \ Not used with sqlite3.\n        'PORT': '', # Set to empty string for default.\
    \ Not used with sqlite3.\n    }\n}\n```\n\nIf you try to run the server again,\
    \ it should work, provided you have installed MySQL correctly. If you visit `127.0.0.1:8000`\
    \ in your web browser, you should see the default Django page. Now let's turn\
    \ our Django site into a blog. First, we need to use our Models to create tables\
    \ in the database by running the following command:\n\n```\npython2.6 manage.py\
    \ syncdb\n```\n\nEvery time you change your models, you must run this command\
    \ to update the database. Note that this cannot alter existing fields; you can\
    \ only add new ones. So if you want to remove fields, you will have to do it manually\
    \ with something like PhpMyAdmin. Since this is our first time running the command,\
    \ Django will configure all the built-in default tables for things like the admin\
    \ system. Just write \"yes\" and then fill in your details. Now let's configure\
    \ the file `urls.py`. Write the line:\n\n```python\nurl(r'^$', 'FirstBlog.blog.views.home',\
    \ name='home')\n```\n\nNow, we create the views file to respond to these requests.\n\
    \n```python\nfrom django.shortcuts import render_to_response\nfrom Blog.models\
    \ import posts\n\ndef home(request):\n    return render_to_response('index.html')\n\
    ```\n\n## Templates\n\nThis `index.html` file doesn't exist yet, so let's do it.\
    \ Create a folder called `templates` in your application `Blog` and save a file\
    \ called `index.html`, which can simply contain \"Hello World\" for now. Next,\
    \ we need to edit the config file, so Django knows where this template is located.\n\
    \nLine 105 is where the section for declaring template folders begins; so adjust\
    \ it like this:\n\n```python\nTEMPLATE_DIRS = (\n    \"blog/templates\",\n   \
    \ # Put strings here, like \"/home/html/django_templates\" or \"C:/www/django/templates\"\
    .\n    # Always use forward slashes, even on Windows.\n    # Don't forget to use\
    \ absolute paths, not relative paths.\n)\n```\n\nIf you run the server again and\
    \ refresh the page in your browser, you should see a \"Hello world\" message.\
    \ Now we can start designing our blog. We will add some boilerplate HTML for the\
    \ home page.\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta\
    \ charset=\"utf-8\" />\n    <link rel=\"stylesheet\" href=\"css/style.css\">\n\
    \    <link href=\"images/favicon.ico\" rel=\"shortcut icon\">\n    <title>First\
    \ Blog</title>\n</head>\n<body>\n    <div class=\"container\">\n        <h1>First\
    \ Blog</h1>\n        <h2>Title</h2>\n        <h3>Posted on date by author</h3>\n\
    \        <p>Body Text</p>\n    </div>\n</body>\n</html>\n```"
  mdcn: "## 应用\n\n然而，这些文件本身并不能创建一个功能完整的网站。为此，我们需要应用程序。应用程序是编写使网站运行的代码的地方，但在我们深入了解它们之前，我们需要对\
    \ Django 的设计原则有一个基本的了解。\n\n首先，Django 是一个 MVC 框架，即模型-视图-控制器。Django 自称为 MTV 框架，即模型-模板-视图。这是一种与\
    \ MVC 略有不同的方法，但从根本上说，它们非常相似。MVC 是一种架构模式，它提供了一种构建项目结构的方法。它将用于处理数据的代码与管理用户界面的代码分离开来。\n\
    \n其次，Django 遵循 DRY（Don't Repeat Yourself，不要重复自己）原则，这意味着你不应该编写执行同一任务超过一次的代码。例如，在我们的博客中，如果我们编写了一个从归档中随机选取文章的函数，并在多个页面上实现这个函数，我们不会在每次需要时都重新编写它。我们只编写一次，然后在每个页面上使用它。\n\
    \n那么这与应用程序有什么关系呢？嗯，应用程序允许你以 DRY 风格编写你的网站。每个项目，比如我们这里的这个，可以包含多个应用程序。或者更准确地说，每个应用程序可以成为多个项目的一部分。以前面的例子为例，这意味着如果我们将来创建另一个也需要随机页面功能的站点，我们就不必重写它。我们可以直接从这个项目中导入该应用程序。因此，每个应用程序具有不同的目的非常重要。如果你将网站的所有功能都写在一个应用程序中，然后以后需要再次使用其中的一部分，你就必须导入整个应用程序。例如，如果你正在创建一个电子商务网站，你不会想导入所有的博客功能。但是，如果你为随机功能创建一个应用程序，为博客发布系统创建另一个应用程序，你就可以选择你需要的部分。\n\
    \n这也意味着在网站内部，代码组织良好。如果你想修改某个功能，你不必在庞大的归档中搜索；相反，你可以导航到相应的应用程序并进行更改，而不用担心干扰其他任何内容。\n\
    \n```\npython manage.py startapp blog\ncd blog\nls\n```\n\n同样，我们有一个 `__init__.py`\
    \ 文件将其转换为一个包，以及另外三个文件：models、tests 和 views。我们现在不需要担心测试，但另外两个很重要。Models 和 Views\
    \ 是 MVC 中的 M 和 V 部分。\n\n当你想要访问那些数据时，通过调用这些模型上的方法来访问，而不是运行原始查询。这非常有用，因为 Django\
    \ 可以使用多种数据库程序。我们今天将使用 MySQL，因为它是最强大的，并且是大多数主机提供商提供的。但是，如果我们将来需要切换到不同的数据库，所有代码仍然有效！在其他语言中，如果你想切换到\
    \ SQLite 或类似的东西，你需要重写访问数据库的代码。在 views 文件中，我们编写生成网页的代码。这将所有其他部分联系在一起。当输入一个 URL\
    \ 时，它会通过我们之前看到的 urls 脚本发送到 views 脚本，然后 views 从 models 获取相关数据，处理它，并将其传递给一个模板，最终作为用户看到的页面提供。我们稍后会看看那些模板。它们是最简单的部分，主要是\
    \ HTML。\n\n对于一个博客，我们需要一个文章表，包含标题、正文、作者、写作时间等字段。一个实际的博客示例。\n\n```python\nfrom django.db\
    \ import models\n\nclass posts(models.Model):\n    author = models.CharField(max_length=30)\n\
    \    title = models.CharField(max_length=100)\n    bodytext = models.TextField()\n\
    \    timestamp = models.DateTimeField()\n```\n\n## MySQL\n\n这些模型只是描述。我们需要根据它们创建一个真实的数据库。然而，首先，我们需要\
    \ MySQL 在我们的系统上运行。在真实的 Web 服务器上，这不会是个问题，因为它们通常预装了 MySQL。幸运的是，使用包管理器，安装很容易。首先，你需要安装\
    \ Homebrew 和 Easy installation。\n\n```\nbrew install MySQL\neasy_install MySQL-python\n\
    mysqld_safe --skip-grant-tables # 让任何人拥有完全权限\nmysql -u root\n```\n\n```sql\nUPDATE\
    \ mysql.user SET Password = PASSWORD('nettuts') WHERE User = 'root';\n# 给用户 'root'\
    \ 设置密码\nFLUSH PRIVILEGES;\nmysql -u root -p # 使用我们的密码 'nettuts' 登录\nCREATE DATABASE\
    \ firstblog;\nquit\n```\n\n```\npython2.6 manage.py runserver\n```\n\n当你重启后，MySQL\
    \ 不会运行，所以将来任何时候你需要这样做时，运行 MySQL 来启动服务器。然后你可以在一个新标签页中运行 `python2.6 manage.py runserver`\
    \ 来启动开发服务器。\n\n这个命令还不会运行服务器。它只会返回一个错误。那是因为我们必须调整我们的设置。让我们看看 `settings.py`。\n\n\
    你必须首先更改数据库配置。这些从第十二行开始。\n\n```python\nDATABASES = {\n    'default': {\n      \
    \  'ENGINE': 'django.db.backends.mysql', # 添加 'postgresql_psycopg2', 'postgresql',\
    \ 'mysql', 'sqlite3' 或 'oracle'。\n        'NAME': 'firstblog', # 或者如果使用 sqlite3，则是数据库文件的路径。\n\
    \        'USER': 'root', # sqlite3 不使用。\n        'PASSWORD': 'nettuts', # sqlite3\
    \ 不使用。\n        'HOST': '', # 设置为空字符串表示 localhost。sqlite3 不使用。\n        'PORT':\
    \ '', # 设置为空字符串表示默认值。sqlite3 不使用。\n    }\n}\n```\n\n如果你再次尝试运行服务器，它应该可以工作，前提是你已正确安装了\
    \ MySQL。如果你在 Web 浏览器中访问 `127.0.0.1:8000`，你应该会看到默认的 Django 页面。现在让我们把我们的 Django\
    \ 站点变成一个博客。首先，我们需要使用我们的 Models 通过运行以下命令在数据库中创建表：\n\n```\npython2.6 manage.py syncdb\n\
    ```\n\n每次更改模型时，你都必须运行此命令来更新数据库。请注意，这不能更改现有字段；你只能添加新字段。所以如果你想删除字段，你必须使用像 PhpMyAdmin\
    \ 这样的工具手动操作。由于这是我们第一次运行该命令，Django 将为管理员系统等内置默认表进行配置。只需输入“yes”，然后填写你的详细信息。现在让我们配置\
    \ `urls.py` 文件。写入这一行：\n\n```python\nurl(r'^$', 'FirstBlog.blog.views.home', name='home')\n\
    ```\n\n现在，我们创建 views 文件来响应这些请求。\n\n```python\nfrom django.shortcuts import render_to_response\n\
    from Blog.models import posts\n\ndef home(request):\n    return render_to_response('index.html')\n\
    ```\n\n## 模板\n\n这个 `index.html` 文件还不存在，所以我们来创建它。在你的应用程序 `Blog` 中创建一个名为 `templates`\
    \ 的文件夹，并保存一个名为 `index.html` 的文件，目前可以简单地包含“Hello World”。接下来，我们需要编辑配置文件，以便 Django\
    \ 知道这个模板的位置。\n\n第 105 行是声明模板文件夹部分的开始；所以像这样调整它：\n\n```python\nTEMPLATE_DIRS = (\n\
    \    \"blog/templates\",\n    # 在这里放置字符串，比如 \"/home/html/django_templates\" 或\
    \ \"C:/www/django/templates\"。\n    # 即使在 Windows 上也要始终使用正斜杠。\n    # 不要忘记使用绝对路径，而不是相对路径。\n\
    )\n```\n\n如果你再次运行服务器并在浏览器中刷新页面，你应该会看到一条“Hello world”消息。现在我们可以开始设计我们的博客了。我们将为首页添加一些样板\
    \ HTML。\n\n```html\n<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"\
    utf-8\" />\n    <link rel=\"stylesheet\" href=\"css/style.css\">\n    <link href=\"\
    images/favicon.ico\" rel=\"shortcut icon\">\n    <title>First Blog</title>\n</head>\n\
    <body>\n    <div class=\"container\">\n        <h1>First Blog</h1>\n        <h2>Title</h2>\n\
    \        <h3>Posted on date by author</h3>\n        <p>Body Text</p>\n    </div>\n\
    </body>\n</html>\n```"
