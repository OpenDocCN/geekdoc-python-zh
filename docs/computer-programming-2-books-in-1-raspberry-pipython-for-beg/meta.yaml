    ```\n\nLet's compare it to the previous version:\n\n```python\ndef is_pair(n):\n\
    \    return (n % 2 == 0)\n\nl = [1, 2, 3]\nl2 = filter(is_pair, l)\n```\n\nLambda\
    \ functions are restricted by syntax to a single expression.\n\n## Text Files\n\
    \n### About Files\n\nPython makes working with files and text very easy. Let's\
