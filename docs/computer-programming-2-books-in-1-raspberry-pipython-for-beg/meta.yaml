    - 文档型：允许保存全文，并通常能进行更强大的搜索。用于存储大量历史背景信息。与关系型数据库一起，它们是网络开发中最常用的类型。

    - 面向对象型：这种模型相对较新，是面向对象计算机模型的典型代表，旨在将完整对象存储在数据库中。未来它可能会变得更加重要。

    - 推理型：允许进行推理的数据库。主要基于存储在数据库中的规则和事实，因此相对复杂。


