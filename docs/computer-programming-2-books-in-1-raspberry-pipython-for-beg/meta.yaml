    \nc = Crocodile()\nc.move()\n```\n\n## Polymorphism\n\nIt means the ability to\
    \ take more than one form. An operation can exhibit different behaviors in different\
    \ instances. The behavior depends on the data types used in the operation. Polymorphism\
    \ is widely used in the application of inheritance since an object of a derived\
    \ class is at the same time an object of the parent class, so where an object\
    \ of the parent class is required, one of the child class can also be used.\n\n\
    In Python, since it is not necessary to explicitly specify the type of the parameters\
    \ that a function receives, functions are naturally polymorphic. A block of code\
    \ will be polymorphic when within that code, calls are made to methods that can\
    \ be redefined in different classes.\n\nUsing polymorphism, we can invoke the\
    \ same method of different objects and obtain different results according to their\
    \ class. This means that we can call a method exactly the same as another, and\
    \ the interpreter will automatically detect which of them we refer to according\
    \ to various parameters, for example, the type of data we pass as an argument\
    \ when calling it, the class to which it belongs, or we can even specify which\
    \ method we mean. Polymorphism is a matter of organization and good practice for\
    \ the programmer who works with many objects and methods.\n\nAllowing the developer\
    \ not to write, think, and remember many different method names, but instead can\
    \ call the appropriate object's method with the same name that it would call others.\n\
    \nPolymorphism is used very often, more than we are aware of. Remember that in\
    \ Python, everything is an object, which makes it very likely that even without\
    \ resorting to classes, we will use polymorphism. For example, only the print()\
    \ function prints various types of objects without the need for us to specify\
    \ anything, and this is also possible thanks to one of Python's properties called\
    \ \"dynamic typing.\"\n\n## Method overload\n\nIn Python, method overloading as\
    \ such does not exist. Those who come from other languages such as Java find some\
    \ confusion since it is something very common in that language. In Python, overloading\
    \ is absurd, although there are those who have written about it claiming that\
    \ it is \"good practice in any language.\"\n\nMethod overloading refers to the\
    \ practice of having different methods with the same name in the same class. In\
    \ this way, the interpreter or compiler will be able to differentiate them by\
    \ the types of data that are sent as arguments in the parameters.\n\nIn Python,\
    \ the dynamism that characterizes this programming language causes a conflict\
    \ by not knowing what type of variables we are referring to. Although it is possible\
    \ to emulate overloading, we will skip this practice since, although it works\
    \ well, it is absurd and unnecessary. In Python, you should not have two methods\
    \ with the same name or call the same method with different types of parameters.\n\
    \n## Encapsulation\n\nEncapsulation in programming is a concept related to object-oriented\
    \ programming and refers to the hiding of a class’s internal state from the outside.\
    \ In other words, encapsulation consists of making the attributes or methods internal\
    \ to a class not accessible or modified from the outside, but only the object\
    \ itself can access them.\n\nIn Python, there are no access modifiers, and what\
    \ is usually done is that access to a variable or function is determined by its\
    \ name: if the name begins with two underscores (and does not also end with two\
    \ underscores), it is of a private variable or function; otherwise it is public.\
    \ Methods whose names begin and end with two underscores are special methods that\
    \ Python calls automatically under certain circumstances:\n\n```\nclass Student():\n\
