    they applied the concept of: "divide and conquer." And functional programming
    uses this strategy for just about everything.

    - First-class features: Functions are treated as one more variable. They can even
    be returned.

    - Pure functions: Fully predictive, the same input data will produce the same
    output data. You can override the input parameter without disturbing the flow
    of the program.

    - Recursion: Functions can call themselves, simplifying tasks such as traversing
    data trees or managing controlled loops.

    - Immutability: There are no variables, only constants. Personally understanding
