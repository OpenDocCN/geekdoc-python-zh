    So far, we have been using the structured query language in our Python examples
    and have covered many of the basics of SQL commands. In this section, we discuss
    the SQL language in particular and provide an overview of SQL syntax. Since there
    are so many different database vendors, Structured Query Language (SQL) was standardized
    so that we could easily communicate with multi-vendor database systems. A relational
    database is made up of tables, rows, and columns. Columns generally have a type
    such as text, numeric, or date data. When we create a table, we indicate the names
    and types of the columns:


    ```

    CREATE TABLE Tracks (title TEXT, plays INTEGER)

    ```


    To insert a row in a table, we use the SQL commandINSERT:


    ```

    INSERT INTO Tracks (title, plays) VALUES (''My Way'', 15)

    ```


    When using the declaration insert, specify the table name, then a list of the
    fields/columns you would like to set in the new row, and then the keyword VALUES
    and a list of corresponding values for each of the fields. The SQL command SELECT
    used to retrieve rows and columns from a database. The declaration SELECT allows
    you to specify which columns you want to retrieve, as well as a clause WHERE to
    select which rows you want to see. It also allows an optional clause order BY
    to control the sorting of the returned rows.'
  - '[PAGE 98]


    ```

    SELECT * FROM Tracks WHERE title = ''My Way''

    ```


    Using * indicates that you want the database to return all columns for each row
    that matches the clause WHERE. Note that unlike Python, in an SQL clause WHERE,
    we use a single equals sign to indicate a test of equality instead of a double
    equals sign. Other logical operations allowed in a clause WHERE include <,>, <=,>=,
    =,!=, as well as AND / OR and parentheses to build your logical expressions. You
    can request that the returned rows be ordered by one of the fields as follows:


    ```

    SELECT title, plays FROM Tracks ORDER BY title

    ```


    To delete a row, you need a clause WHERE in an SQL statement DELETE. The clause
    WHERE determines which rows are to be removed:


    ```

    DELETE FROM Tracks WHERE title = ''My Way''

    ```


    It''s possible UPDATE a column or columns within one or more rows in a table using
    SQL statement UPDATE as follows:


    ```

    UPDATE Tracks SET plays = 16 WHERE title = ''My Way''

    ```


    The declaration UPDATE specifies a table and then a list of fields and values
    to change after the keyword SET and then an optional clause WHERE to select the
    rows to update. Single instruction UPDATE will change all rows that match the
    clause WHERE. If no clause is specified WHERE, perform the UPDATE in all rows
    of the table. These four basic SQL commands (INSERT, SELECT, UPDATE, and DELETE)
    enable the four basic operations required to create and maintain data.'
- md: "## Error Handling in Python\n\nIn software development, different types of\
    \ errors can occur. These could be syntax errors, logic errors, or runtime errors.\
    \ Syntax errors are more likely to occur during the initial development phase\
    \ and are the result of incorrect syntax. Syntax errors can easily be caught when\
    \ compiling the program for execution. Logical errors, on the other hand, are\
    \ the result of incorrect logic implementation. An example would be a program\
    \ accessing an unordered list assuming it was ordered. Logical errors are the\
    \ hardest to track down. Runtime errors are the most interesting errors that occur\
    \ if we don't consider all possible cases. An example would be trying to access\
    \ a non-existent file.\n\nIn this section, we will learn how to handle errors\
    \ in Python and how to log errors for a better understanding of what happened\
    \ within the application.\n\n### Syntax errors\n\nSyntax errors, also known as\
    \ misinterpretations, are perhaps the most common type of complaint you get when\
    \ you're still learning Python:\n\n```\nwhile True print 'Hello world'\n\nTraceback\
    \ (most recent call last):\n  ...\n    while True print 'Hello world'\n      \
    \    ^\nSyntaxError: invalid syntax\n```\n\nThe interpreter repeats the faulty\
    \ line and displays a small 'arrow' pointing to the first place where the error\
    \ was detected. This is caused by (or at least detected in) the symbol that precedes\
    \ the arrow: in the example, the error is detected in the print statement since\
    \ there is a missing colon (':') before it. The file name and line number are\
    \ displayed, so you know where to look if the input is coming from a program.\n\
    \n### Exceptions\n\nEven if the statement or expression is syntactically correct,\
    \ it can generate an error when you try to execute it. Errors caught during execution\
    \ are called exceptions, and they are not unconditionally fatal: you will soon\
    \ learn how to handle them in Python programs. Let's start with a simple program\
    \ to add two numbers in Python. Our program takes two parameters as input and\
    \ prints the sum. Here is a Python program for adding two numbers:\n\n```\ndef\
    \ addnumbers (a, b):\n\nprint a + b\n\naddNumbers (5, 10)\n```\n\nWhen writing\
    \ the above program, we didn't really consider the fact that something could go\
    \ wrong. What if one of the parameters passed is not a number?\n\n```\naddNumbers\
    \ (\", 10)\n```\n\nWe have not handled that case; therefore, our program will\
    \ break with the following error message:\n\n```\nTraceback (most recent call\
    \ last):\nFile \"addNumber.py\", line 4, in <module>\naddNumbers (\", 10)\nFile\
    \ \"addNumber.py\", line 2, in addNumbers\nprint a + b\nTypeError: cannot concatenate\
    \ 'str' and 'int' objects\n```\n\nWe can handle the above question by checking\
    \ if the parameters passed are integers. But that does not solve the problem.\
    \ What if the code breaks for some other reason and causes the program to crash?\
    \ Working with a program that breaks when encountering an error is not a good\
    \ sight. Even if an unknown error has occurred, the code must be robust enough\
    \ to handle the break gracefully and let the user know that something is wrong.\n\
    \nIn Python, we use the declarations try-except to handle exceptions. When code\
    \ breaks, an exception is thrown without crashing the program. We are going to\
    \ modify the program that adds numbers to include the declarations try-except.\n\
    \n```\ndef addNumbers (a, b):\n\ntry:\n\nreturn a + b\n\nexcept exception as e:\n\
    \nreturn 'Error occurred:' + str (e)\n\nprint addNumbers ('', 10)\n```\n\nPython\
    \ would process all the code inside the statements try and except. When it encounters\
    \ an error, control is passed to the block except, skipping the code in the middle.\
    \ As seen in the above code, we have moved our code within a statement try and\
    \ except. You try to run the program, and it should throw an error message instead\
    \ of the program crashing. Also, the reason for the exception is returned as an\
    \ exception message. The above method handles unexpected exceptions. Let's take\
    \ a look at how to handle an expected exception. It assumes that we are trying\
    \ to read a file with our Python program, but the file does not exist. In this\
    \ case, we will handle the exception and let the user know that the file does\
    \ not exist when it occurs. Take a look at the file reading code:\n\n```\ntry:\n\
    \ntry:\n\nwith open ('fname') as f:\ncontent = f.readlines()\nexcept IOError as\
    \ e:\n    print str(e)\nexcept exception as e:\n    print str(e)\n```\n\nIn the\
    \ above code, we have handled the file reading inside an exception handler IOError.\
    \ If the code breaks due to the unavailability of the file name, the error would\
    \ be handled within the controller IO Error. Similar to the exception IO Error,\
    \ there are many more standard exceptions like Arithmetic, Overflow Error, and\
    \ Import Error, to name a few.\n\nWe can handle multiple exceptions at once by\
    \ putting together the standard exceptions as shown:\n\n```\ntry:\n    with open('fname')\
    \ as f:\n        content = f.readlines()\n        printb\nexcept (IOError, NameError)\
    \ as e:\n    print str(e)\n```\n\nThe above code would show the exceptions IOError\
    \ and NameError when the program runs.\n\nSuppose we are using certain resources\
    \ in our Python program. During the execution of the program, an error was encountered,\
    \ and it was only half executed. In this case, the resource will be kept unnecessarily.\
    \ We can clean up such resources using the clause finally. Take a look at the\
    \ following code:\n\n```\ntry:\n    filePointer = open('fname', 'r')\n    try:\n\
    \        content = filePointer.readline()\n    finally:\n        filePointer.close()\n\
    except IOError as e:\n    print str(e)\n```\n\nIf, during the execution of the\
    \ above code, an exception occurs while reading the file, the file Pointer would\
    \ be closed on the block finally.\n\n### Records\n\nWhen something goes wrong\
    \ within an application, it is easier to debug if we know the source of the error.\
    \ When an exception occurs, we can record the information necessary to locate\
    \ the problem. Python provides a simple and powerful registry library. Let's take\
    \ a look at how to use registers in Python.\n\n```\nimport logging\n\n# initialize\
    \ the log settings\nlogging.basicConfig(filename = 'app.log', level = logging.INFO)\n\
    \ntry:\n    logging.info('Trying to open the file')\n    filePointer = open('appFile',\
    \ 'r')\n    try:\n        logging.info('Trying to read the file content')\n  \
    \      content = filePointer.readline()\n    finally:\n        filePointer.close()\n\
    except IOError as e:\n    logging.error('Error occurred' + str(e))\n```\n\nAs\
    \ seen in the above code, we first have to import the Python log library and then\
    \ initialize the logger with the log file name and log level. There are five log\
    \ levels: DEBUG, INFO, WARNING, ERROR, and CRITICAL. Here we have to set the log\
    \ level to INFO; therefore, INFO and the previous logs will be logged.\n\nIn the\
    \ above code, we had a program file, so it was easier to figure out where the\
    \ error had occurred. But what do we do when it comes to multiple program files?\
    \ In such a case, getting the error stack helps in finding the source of the error.\
    \ The exception stack trace may have been logged as shown:\n\n```\nimport logging\n\
    \n# initialize the log settings\nlogging.basicConfig(filename = 'app.log', level\
    \ = logging.INFO)\n\ntry:\n    filePointer = open ('appFile', 'r')\n    try:\n\
    \        content = filePointer.readline ()\n    finally:\n        filePointer.close\
    \ ()\nexcept IOError as e:\n    logging.exception (str (e))\n```\n\nIf you try\
    \ to run the above program when an exception occurs, the following error is logged\
    \ in the log file:\n\n```\nERROR: root: [Errno 2] No such file or directory: 'appFile'\n\
    \nTraceback (most recent call last):\n  File \"readFile.py\", line 7, in <module>\n\
    \    filePointer = open ('appFile', 'r')\nIOError: [Errno 2] No such file or directory:\
    \ 'appFile'\n```\n\n## Python Web Development\n\n### Contributions of Python to\
    \ Web Development\n\nPython is a programming language that can also be used to\
    \ create personal and business web pages. Knowing how to program websites and\
    \ applications is synonymous with success and a job gap. The future is in the\
    \ network, and professionals capable of placing companies in this new medium of\
    \ commerce are needed. It is because of the above that many programmers have chosen\
    \ to specialize in this category.\n\nPython webs are chosen every day by high-level\
    \ companies, a sign of the quality and good usability offered by webs created\
    \ with this code. Thus, programming in Python is one of the skills most sought\
    \ after by the headhunters of companies such as Netflix, Spotify, and Pixar. Choosing\
    \ Python web ensures you are not pigeonholed into a single type of web development.\
    \ It is an open source whose creation possibilities are endless, as well as its\
    \ direct applications. With a good study on Python, you will learn to make websites\
    \ from scratch with all its functionalities, from ecommerce to a platform with\
    \ products on consumer demand like Netflix.\n\nPython code has numerous [advantages](advantages)\
    \ at the time of sitting down to create webs. We detail some of them below:"
  mdcn: "## Python 中的错误处理\n\n在软件开发过程中，可能会发生不同类型的错误。这些错误可能是语法错误、逻辑错误或运行时错误。语法错误更可能出现在初始开发阶段，是语法不正确的结果。在编译程序执行时，语法错误很容易被捕获。另一方面，逻辑错误是逻辑实现不正确的结果。例如，一个程序在假设列表有序的情况下访问了一个无序列表。逻辑错误是最难追踪的。运行时错误是最有趣的错误，它们发生在我们没有考虑所有可能情况的时候。例如，尝试访问一个不存在的文件。\n\
    \n在本节中，我们将学习如何在 Python 中处理错误，以及如何记录错误，以便更好地理解应用程序内部发生了什么。\n\n### 语法错误\n\n语法错误，也称为解析错误，可能是你在学习\
    \ Python 时最常遇到的错误类型：\n\n```\nwhile True print 'Hello world'\n\nTraceback (most\
    \ recent call last):\n  ...\n    while True print 'Hello world'\n          ^\n\
    SyntaxError: invalid syntax\n```\n\n解释器会重复出错的行，并显示一个小的“箭头”，指向错误被检测到的第一个位置。这是由箭头前面的符号引起的（或至少是在该符号处检测到的）：在示例中，错误是在\
    \ `print` 语句中检测到的，因为其前面缺少一个冒号（`:`）。文件名和行号会被显示出来，因此如果输入来自程序，你就知道该去哪里查找。\n\n###\
    \ 异常\n\n即使语句或表达式在语法上是正确的，当你尝试执行它时也可能产生错误。在执行期间捕获的错误称为异常，它们并非无条件致命：你很快就会学习如何在 Python\
    \ 程序中处理它们。让我们从一个简单的 Python 程序开始，该程序用于将两个数字相加。我们的程序接受两个参数作为输入并打印它们的和。这是一个用于将两个数字相加的\
    \ Python 程序：\n\n```\ndef addnumbers (a, b):\n\nprint a + b\n\naddNumbers (5, 10)\n\
    ```\n\n在编写上述程序时，我们并没有真正考虑可能出现问题的情况。如果传递的参数之一不是数字怎么办？\n\n```\naddNumbers (\", 10)\n\
    ```\n\n我们没有处理这种情况；因此，我们的程序将因以下错误消息而中断：\n\n```\nTraceback (most recent call last):\n\
    File \"addNumber.py\", line 4, in <module>\naddNumbers (\", 10)\nFile \"addNumber.py\"\
    , line 2, in addNumbers\nprint a + b\nTypeError: cannot concatenate 'str' and\
    \ 'int' objects\n```\n\n我们可以通过检查传递的参数是否为整数来处理上述问题。但这并不能解决问题。如果代码因其他原因中断并导致程序崩溃怎么办？使用一个在遇到错误时就中断的程序并不是一个好的体验。即使发生了未知错误，代码也必须足够健壮，能够优雅地处理中断，并让用户知道出了问题。\n\
    \n在 Python 中，我们使用 `try-except` 声明来处理异常。当代码中断时，会抛出一个异常，而不会使程序崩溃。我们将修改这个加法程序，加入\
    \ `try-except` 声明。\n\n```\ndef addNumbers (a, b):\n\ntry:\n\nreturn a + b\n\n\
    except exception as e:\n\nreturn 'Error occurred:' + str (e)\n\nprint addNumbers\
    \ ('', 10)\n```\n\nPython 会处理 `try` 和 `except` 语句中的所有代码。当遇到错误时，控制权会传递给 `except`\
    \ 块，跳过中间的代码。如上面的代码所示，我们已经将代码移到了 `try` 和 `except` 语句中。你尝试运行程序，它应该会抛出错误消息，而不是程序崩溃。此外，异常的原因会作为异常消息返回。上述方法处理了意外的异常。让我们看看如何处理预期的异常。假设我们正尝试用\
    \ Python 程序读取一个文件，但该文件不存在。在这种情况下，我们将处理异常，并在发生时告知用户文件不存在。看看文件读取代码：\n\n```\ntry:\n\
    \ntry:\n\nwith open ('fname') as f:\ncontent = f.readlines()\nexcept IOError as\
    \ e:\n    print str(e)\nexcept exception as e:\n    print str(e)\n```\n\n在上面的代码中，我们在异常处理程序\
    \ `IOError` 中处理了文件读取。如果代码因文件名不可用而中断，错误将在 `IOError` 控制器内处理。类似于 `IOError` 异常，还有许多其他标准异常，例如\
    \ `ArithmeticError`、`OverflowError` 和 `ImportError` 等。\n\n我们可以通过将标准异常组合在一起来同时处理多个异常，如下所示：\n\
    \n```\ntry:\n    with open('fname') as f:\n        content = f.readlines()\n \
    \       printb\nexcept (IOError, NameError) as e:\n    print str(e)\n```\n\n上述代码在程序运行时会显示\
    \ `IOError` 和 `NameError` 异常。\n\n假设我们正在 Python 程序中使用某些资源。在程序执行期间，遇到了错误，程序只执行了一半。在这种情况下，资源将被不必要地保留。我们可以使用\
    \ `finally` 子句来清理这些资源。看看下面的代码：\n\n```\ntry:\n    filePointer = open('fname', 'r')\n\
    \    try:\n        content = filePointer.readline()\n    finally:\n        filePointer.close()\n\
    except IOError as e:\n    print str(e)\n```\n\n如果在执行上述代码期间，在读取文件时发生异常，文件指针将在 `finally`\
    \ 块中被关闭。\n\n### 记录\n\n当应用程序内部出现问题时，如果我们知道错误的来源，调试会更容易。当异常发生时，我们可以记录定位问题所需的信息。Python\
    \ 提供了一个简单而强大的日志记录库。让我们看看如何在 Python 中使用日志记录。\n\n```\nimport logging\n\n# initialize\
    \ the log settings\nlogging.basicConfig(filename = 'app.log', level = logging.INFO)\n\
    \ntry:\n    logging.info('Trying to open the file')\n    filePointer = open('appFile',\
    \ 'r')\n    try:\n        logging.info('Trying to read the file content')\n  \
    \      content = filePointer.readline()\n    finally:\n        filePointer.close()\n\
    except IOError as e:\n    logging.error('Error occurred' + str(e))\n```\n\n如上面的代码所示，我们首先必须导入\
    \ Python 日志库，然后使用日志文件名和日志级别初始化日志记录器。有五个日志级别：`DEBUG`、`INFO`、`WARNING`、`ERROR` 和\
    \ `CRITICAL`。这里我们必须将日志级别设置为 `INFO`；因此，`INFO` 及之前的日志将被记录。\n\n在上面的代码中，我们有一个程序文件，因此更容易找出错误发生的位置。但是当涉及到多个程序文件时，我们该怎么办呢？在这种情况下，获取错误堆栈有助于找到错误的来源。异常堆栈跟踪可能已被记录，如下所示：\n\
    \n```\nimport logging\n\n# initialize the log settings\nlogging.basicConfig(filename\
    \ = 'app.log', level = logging.INFO)\n\ntry:\n    filePointer = open ('appFile',\
    \ 'r')\n    try:\n        content = filePointer.readline ()\n    finally:\n  \
    \      filePointer.close ()\nexcept IOError as e:\n    logging.exception (str\
    \ (e))\n```\n\n如果你在发生异常时尝试运行上述程序，以下错误将被记录在日志文件中：\n\n```\nERROR: root: [Errno 2]\
    \ No such file or directory: 'appFile'\n\nTraceback (most recent call last):\n\
    \  File \"readFile.py\", line 7, in <module>\n    filePointer = open ('appFile',\
    \ 'r')\nIOError: [Errno 2] No such file or directory: 'appFile'\n```\n\n## Python\
    \ Web 开发\n\n### Python 对 Web 开发的贡献\n\nPython 是一种编程语言，也可用于创建个人和商业网页。懂得如何编程网站和应用程序等同于成功和就业机会。未来在于网络，需要能够将公司置于这一新商业媒介中的专业人士。正是由于上述原因，许多程序员选择专攻这一领域。\n\
    \nPython 网站每天都被高级公司选用，这表明使用这种代码创建的网站具有高质量和良好的可用性。因此，Python 编程是 Netflix、Spotify\
    \ 和 Pixar 等公司猎头最看重的技能之一。选择 Python Web 可以确保你不会被局限于单一类型的 Web 开发。它是一个开源项目，其创建的可能性是无限的，其直接应用也是如此。通过对\
    \ Python 的良好学习，你将学会从零开始制作具有所有功能的网站，从电子商务到像 Netflix 这样的按需产品平台。\n\nPython 代码在着手创建网站时具有众多[优势](advantages)。我们将在下面详细介绍其中一些："
