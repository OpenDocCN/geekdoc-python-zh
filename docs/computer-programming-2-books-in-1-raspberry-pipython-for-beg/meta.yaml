    In addition, before you perform any work, it is important to know the core fundamentals
    of how to solder safely. There are different aspects to safe soldering for beginners
    that you need to be aware of in order to solder properly while posing a minimal
    risk to yourself, your instruments, and your environment.


    The soldering iron edge, which needs to get extremely hot in order to perform
    its primary purpose, is the most obvious threat. Also, simple models that plug
    directly into a wall socket and provide no manual temperature control (typically
    a soldering station feature that enables iron performance to be fine-tuned) will
    normally very quickly heat up to about 400 degrees Celsius. This is easily hot
    enough when treated improperly to cause serious burns.


    A variety of reassuring built-in safety features can be offered by more advanced
    models and varied add-on accessories. Models purchased as part of a comprehensive
    soldering iron kit can, however, hold plenty of potential if used carelessly to
    cause serious and permanent injury.


    There are also other possible hazards to watch out for when soldering, in addition
    to the intense heat involved. In particular, due to air pockets or impurities,
    it is important to be aware that solder'
- md: 'material itself can occasionally ''spit'' when overheated. This implies, especially
    for beginners, that protective eyewear is a must.


    In addition, most solder pastes and compounds contain hazardous elements such
    as lead and rosin—when handling soldering tools and materials, it is always sensible
    to wear gloves, and before starting a job, to ensure adequate ventilation of your
    workspace is possible.


    ## Protection Checklist for Soldering


    Prior to Soldering:


    - Read carefully all product directions and safety recommendations and make sure
    you are aware of the common risks.

    - Carefully read the solder ingredient lists and documentation. Check directly
    with suppliers or distributors if the label contains inadequate details about
    possible toxicity.

    - Make sure the work area is safe, clean, stable and free from ignition sources.

    - Check that you are operating in a well-ventilated environment with sufficient
    fume extraction available.

    - Wear protective glasses at all times and use heatproof gloves to treat materials.

    - Check that you have the correct product form for the job at hand—soldering irons
    are available in various sizes and wattages, mostly intended for particular types
    of applications.

    - Do not use any soldering iron or other electrical device that shows noticeable
    damage to the body of the instrument, wiring or socket.

    - Always know where the nearest fire extinguisher and escape paths are.


    ## During Soldering:


    - Never try to solder live / powered circuits, terminals, ties or parts.

    - Keep soldering iron cleaning accessories near at hand, such as wire pads and
    damp solder sponges, to ensure that the tip of the iron is kept as free as possible
    from material build-up during use.

    - Never contact anything but the insulated handle (sometimes referred to as the
    ''wand'') with the soldering iron.

    - Use tweezers and/or gloves to hold surfaces and parts that are (or have been)
    welded recently.

    - Be careful of possible molten alloy spitting and wear safety glasses at all
    times while melting solder.

    - When not in use, always return the iron to its cradle or stand—never directly
    lay it on a work surface, table, or bench.

    - If you inadvertently grab a cable, check that the stand is properly weighted
    or sturdy enough not to easily collapse—if this happens, don''t try to catch the
    iron mid-fall.

    - If you experience a burn, keep it immediately under cold running water for a
    minimum of 10-15 minutes until the required first aid measures are followed.

    - If you need to leave it unattended at any point, always turn the soldering iron
    or station off at the plug socket.


    ## Chapter Fourteen


    ## The GPIO Port


    The row of GPIO (general-purpose input / output) pins along the top edge of the
    board is a powerful function of the Raspberry Pi. A 40-pin GPIO header (unpopulated
    on Pi Zero and Pi Zero W) is found on all existing Raspberry Pi boards. A shorter
    26-pin header was composed of boards prior to the Pi 1 Model B+ (2014).


    ## Pins from GPIO


    Any of the GPIO pins may be marked as an input or output pin (in software) and
    used for a wide variety of purposes.


    ## Layout of GPIO


    Note: GPIO pins are not numbered in numerical order; GPIO pins 0 and 1 are present
    on the panel (physical pins 27 and 28), but are for advanced use only.


    ## The Voltages


    On the frame, two 5V pins and two 3V3 pins are present, as well as many unconfigurable
    ground pins (0V). Both general purpose 3V3 pins are the remaining pins, meaning
    outputs are set to 3V3 and inputs are 3V3-tolerant.


    ## Outputs


    It is possible to set a GPIO pin designated as an output pin to high (3V3) or
    low (0V).


    ## Inputs


    It is possible to read a GPIO pin designated as an input pin as high (3V3) or
    low (0V). With the use of internal pull-up or pull-down resistors, this is facilitated.
    The GPIO2 and GPIO3 pins have fixed pull-up resistors, but this can be set up
    in software for other pins.


    ## More


    The GPIO pins can be used with several alternative functions as well as simple
    input and output devices, some of which are available on all pins, others on particular
    pins:


    - PWM (modulation of pulse-width)

    - Open PWM applications on all pins

    - PWM hardware for GPIO12, GPIO13, GPIO18, GPIO19

    - SPI

    - MISO (GPIO9); SCLK (GPIO11); CE0 (GPIO8), CE1 (GPIO7); SPI0: MOSI (GPIO10)

    - MISO (GPIO19); SCLK (GPIO21); CE0 (GPIO18); CE1 (GPIO17); CE2 (GPIO16); SPI1:
    MOSI (GPIO20)

    - The I2C

    - Data: (GPIO2); Clock: (GPIO3)

    - EEPROM Data: (GPIO0); Clock EEPROM: (GPIO1)

    - Serial Sequence

    - TX (GPIO14); RX (GPIO15)


    ## Pinout for GPIO


    It''s important to be mindful of which pin is which. Some people (like the RasPiO
    Portsplus PCB, or the Raspberry Leaf printable) use pin labels.


    On the Raspberry Pi, a helpful reference can be accessed by opening the terminal
    window and running the pinout command. The GPIO Zero Python library, which is
    installed by default on the desktop image of the Raspberry Pi OS, but not on Raspberry
    Pi OS Lite, provides this method.


    ## Chapter Fifteen


    ## The Raspberry Pi (Camera Module)


    To take advantage of the MMAL API running over OpenMAX, all the applications are
    powered from the command line and written. The MMAL API offers a framework that
    is simpler to use than that provided by OpenMAX. Note that MMAL is an API unique
    to Broadcom that is used only on VideoCore 4 systems.


    Up to four OpenMAX (MMAL) components are used in the applications: camera, preview,
    encoder, and null sink. Both applications use the component of the camera; raspistill
    uses the Image Encode’s component; raspivid uses the Video Encode’s component;
    and raspiyuv and raspividuv do not use an encoder, and send their YUV or RGB output
    directly to the file from the component of the camera.


    The preview screen is optional, but it can be used full-screen or redirected to
    a particular rectangular region of the screen. The null sink component is used
    to ''absorb'' the preview frames if the preview is disabled. Even if these are
    not needed for display, the camera must generate preview frames, as they are used
    for measuring exposure and white balance settings.


    In addition, the filename option can be skipped (in which case the preview is
    shown but no file is written), or all output can be redirected to stdout.


    Command line support is accessible by entering only the name of the program on
    the command line.


    Setting Up > See Setup for Camera > Troubleshooting here.


    There are a range of items to try if the camera module is not working correctly:


    - Is the ribbon cord, not the Monitor Serial Interface (DSI), connected to the
    Camera Serial Interface (CSI)? In either port, the ribbon connector will suit.
    The camera port is near the HDMI connector.

    - Are all the ribbon connectors securely seated, and are they round in the right
    way? They must be straight in their holes.

    - Is the Camera Module connector securely connected between the smaller black
    Camera Module itself and the PCB? This connection can come loose during transit
    or when placing the Camera Module in a case. Flip up the connector on the PCB
    using a fingernail, then reconnect it with gentle pressure. It engages with a
    very slight click. Don''t push it; it''s possibly slightly misaligned if it does
    not engage.

    - Have sudo apt and sudo apt full-upgrade been upgraded?

    - Has raspi-config been executed and allowed the Camera Module?

    - Is your power supply adequate? The Camera Module adds between 200-250mA to your
    Raspberry Pi''s power requirements.


    Try the following if things are still not working:


    - Error: the command raspistill / raspivid is not found. This possibly means that
    somehow your update / upgrade failed. Again, try it.

    - Error: ENOMEM. The Camera Module does not start. Re-check all the links.

    - Mistake: ENOSPC. It is possible that the Camera Module will run out of GPU memory.
    In the /boot/ folder, search config.txt. The choice for gpu mem should be at least
    128. Alternatively, in the Advanced section of raspi-config, use the Memory Split
    option to describe this.


    If you''ve tested all the above problems and the Camera Module still doesn''t
    fit, try posting for more support on our forums.


