    学习并未在此结束。实际上，它才刚刚开始。本书是一个工具，旨在从零开始，在你作为程序员的旅程中牵着你的手。我们希望它能成为一个清晰、坚实且持久的知识基础，在你遇到编程世界中的任何挑战时，随时可以查阅。记住，你总可以再次查阅这些信息，而且有一个庞大的、与你志同道合的社区正等着与你见面，帮助你学习和协作。


    ## 树莓派


    学习基础并解锁使用树莓派的强大技巧


    ## 简介


    树莓派是一种低成本、信用卡大小的设备，它使用普通的键盘和鼠标，并连接到计算机显示器或电视。它是一台轻便、功能强大的计算机，允许所有年龄段的人探索编程，并学习如何使用Scratch和Python等语言进行编程。从上网冲浪和观看高清视频，到制作电子表格、文字处理和玩游戏，它能完成你期望台式计算机完成的所有事情。


    此外，树莓派具有与外部世界连接的潜力，并已被广泛用于各种交互式开发项目，包括音乐机器、父母检测器、气象站以及会发推文的鸟屋红外摄像头。我们希望看到世界各地的孩子们使用树莓派来学习编程并理解计算机的工作原理。


    树莓派是由英国慈善机构树莓派基金会创建的单板计算机系列的名称，该基金会旨在教育孩子们计算机科学，并使他们更容易获得计算机教育。


    树莓派于2012年推出，此后已发布多个版本和变体。最初的Pi拥有单核700MHz CPU和仅256MB RAM，而新版本则提供了四核1.4GHz CPU和1GB
    RAM。对于树莓派来说，主要价格点一直是35美元，所有型号的价格都在35美元或以下，包括仅售5美元的Pi Zero。


    为了学习编程技能、创建硬件项目、进行家庭自动化，甚至在工业应用中使用它们，世界各地的人们都在使用树莓派。


    树莓派是一台运行Linux的非常便宜的机器，但它还提供了一组GPIO（通用输入/输出）引脚，允许你操作物理计算电子元件并探索物联网（IoT）。


    ## 你会用树莓派做什么？


    为了学习编码，有些人购买了树莓派，而已经能够编码的人则使用Pi来学习为物理项目编码电子设备。树莓派将为你提供构建自己的家庭自动化项目的机会，而不是使用专有的封闭系统，这在开源社区中很常见，因为它让你掌握主动权。


    ## 最佳树莓派和树莓派Zero项目推荐


    我们建议那些想了解更多关于计算机、软件创建和创建微型机器的人购买一个树莓派，让想象力自由驰骋。


    考虑到你能用它做什么，这是一个相当物有所值的产品。它可以帮助教授编码，也可以作为更复杂编程的基础。因此，从学龄儿童到成熟的开发者，许多人都使用该设备创建了各种机器和功能。


    根据树莓派基金会的数据，到2015年，已售出超过五百万台设备，使其成为最畅销的英国计算机之一。在孩子们或年长学生可以学习计算机技能的学校里，它极其常见。


    不幸的是，它对于黑客来说也是一个相当精巧的小工具，部分原因是其尺寸、便携性和性能。但这确实证明了它有多好。对于道德更健全的消费者来说，它是进入机器人技术、软件创建和一系列技术技能的途径，否则这些技能的学费将高达数千英镑。


    如果你正在寻找灵感来启动自己的树莓派项目，那么你来对地方了。为了给你一些想法，我们收集了一些最佳用例。


    ## 构建一个便携式安全箱


    Pi的便携性和可负担性使其成为红队成员、渗透测试人员和其他安全人员（付费入侵安全系统的人）的常用工具。它非常适合偷偷集成到目标网络中，因为它具有内置以太网端口、最低功耗要求以及运行任何Linux程序的能力。


    Kali是一个专门为黑客活动设计的Linux发行版，是安全操作人员尝试以这种方式使用Pi的首选程序。对于树莓派，有一个专门构建的Kali版本，安装起来相当容易。


    一旦启用了Kali，你不仅可以将其用于安全操作，还可以将其作为一个安全空间来尝试新工具，而不会对你的主计算机造成损害。然而，一如既往，你只应该攻击那些明确授权给你的目标。


    ## 为Wordpress搭建一个树莓派平台


    为了熟悉树莓派，托管你自己的网站是一个很棒的项目。通过运行Wordpress服务器，你可以学习如何使用MySQL、PHP和Apache应用程序，以及操作Linux的实际操作。


    不仅如此，你最终还会拥有一个功能正常的Wordpress网站，你可以用它来托管你自己的内容！如果你想让它成为一个正式的网站，你需要注册一个域名，但这是一个很好的地方来展示诸如简历、艺术作品集或像个人博客这样基础的东西。


    ## 在树莓派3上完整安装Windows 10


    要在树莓派3 Model B或B+板上安装微软的操作系统，你可以使用GitHub上提供的Windows on ARM（WoA）安装程序。以前，在树莓派计算机上，只有精简版的Windows
    IoT Core操作系统可用，但这个新软件包提供了完整的Windows 10操作系统功能。


    该安装程序可在GitHub上访问，针对易用性和便利性进行了优化，需要捆绑的二进制文件和WoA核心套件。'
