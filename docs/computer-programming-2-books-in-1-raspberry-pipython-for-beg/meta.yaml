  md: '# # Chapter Nine


    # ## The Pi as A Productivity Machine


    The Raspberry Pi’s versatility as a low-power, general-purpose desktop computer
    makes it a good choice. While it can never produce the same output level as a
    typical desktop or laptop, its low cost and environmentally friendly power usage
    helps to compensate for any issues with slower performance.


    The Raspbian operating system includes the popular Libre Office productivity suite
    as a standard, available from the Raspberry Pi website. This equals all the resources
    that you would expect to find in a commercial product such as Microsoft Office:
    word processor, spreadsheet, database, presentation tool, and even diagram or
    mathematical formula development applications. Alternatively, via the web browser,
    you will use much of the same cloud-based applications as you can use on any other
    device.


    The Pi can be used as a day-to-day computer for office and school work, using
    any of the methods mentioned in this chapter, locally installed applications or
    cloud-based services, while not damaging its usability as a forum for programming
    and experimentation.


    *A tip*


    It is a smart idea to use more of the memory for general-purpose use and less
    for the graphics processor if you intend to use the Pi as a pure productivity
    computer. Refer to Chapter 6, ''The Raspberry Pi Configuration Tool,'' to find
    out how to modify this division.


    A broad range of options are now provided by cloud computing services, from the
    basics of storage, networking, and processing capacity to natural language processing
    and artificial intelligence and traditional office applications. The cloud can
    now provide almost any'
  merge: -1
  pgno: 202
- img_proc: true
  md: 'service that doesn''t need you to be physically close to the computer hardware
    you are using.


    # Cloud-Based Applications Use


    What are some cloud computing examples?


    A large range of services are underpinned by cloud computing. This includes customer
    services such as Gmail or the cloud backup of images on your mobile, but also
    services that allow large corporations to host all their data and operate all
    their cloud apps. To run its video streaming service and its other business systems,
    Netflix depends on cloud storage resources, as well as a variety of other organizations.


    For many applications, cloud computing is becoming the default option: software
    vendors are gradually selling their apps over the internet as services rather
    than standalone products as they attempt to move to a subscription model. Cloud
    computing, however, has a possible drawback, in that it may also add additional
    costs and new risks for businesses using it.


    Why is it called computing in the cloud?


    A fundamental idea behind cloud computing is that the position of the service
    is completely irrelevant to the customer and many of the specifics, such as the
    hardware or operating system on which it runs. With this in mind, the metaphor
    of the cloud was taken from the old schematics of the telecommunications network,
    in which the public telephone network (and later the internet) was often depicted
    as a cloud to suggest that it didn''t matter — it was just a cloud of stuff. This,
    of course, is an over-simplification; the position of their facilities and data
    remains a key problem for many consumers.


    What is the history of computing on the cloud?


    Since the early 2000s, cloud computing as a word has been around, but the idea
    of computing-as-a-service has been around for much, much longer—as far back as
    the 1960s, when computer offices would enable businesses to rent time on a mainframe
    instead of purchasing one themselves.'
  merge: -1
  pgno: 203
- img_proc: true
  md: 'These ''time-sharing'' services were largely overtaken by the advent of the
    PC, which made it much more accessible to own a computer, and then in turn by
    the rise of corporate data centers where massive quantities of data can be processed
    by businesses.


    But again and again, in the application service providers, utility computing,
    and grid computing of the late 1990s and early 2000s, the idea of renting access
    to computing power has resurfaced. Cloud computing preceded this, which really
    took hold with the advent of applications such as Amazon Web Services as a service
    and hyperscale cloud computing providers.


    # How critical is the cloud?


    According to research from IDC, building the infrastructure to sustain cloud computing
    now accounts for more than a third of all IT spending worldwide. Meanwhile, as
    computing workloads continue to migrate to the cloud, spending on conventional,
    in-house IT continues to slide, whether that be public cloud services provided
    by providers or private clouds created by companies themselves.'
  merge: -1
