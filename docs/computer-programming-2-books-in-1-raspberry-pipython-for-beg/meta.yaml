    # Configuring the Raspberry Pi 4


    What you''re going to need


    A power supply: Included in the device is a USB Type-C port. With at least 3.0
    A of electricity, you need a power supply.


    Micro-SD card: You will need this to store your files and the Raspbian OS. The
