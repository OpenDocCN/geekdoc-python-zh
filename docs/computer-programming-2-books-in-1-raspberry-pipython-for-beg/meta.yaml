    \ Tracks')\n```\n\n第二个命令创建一个名为 Tracks 的表，其中包含一个名为 title 的文本列和一个名为 plays 的整数列。\n\
    \n```\ncur.execute('CREATE TABLE Tracks (title TEXT, plays INTEGER)')\n```\n\n\
    现在我们已经创建了一个名为 Tracks 的表，我们可以使用 SQL INSERT 操作向该表中放入一些数据。同样，我们首先建立与数据库的连接并获取游标。然后我们可以使用游标执行\
    \ SQL 命令。SQL INSERT 命令指定了我们正在使用的表，然后通过列出我们要包含的字段（title, plays）来定义一个新行，后跟我们要放入新行的\
    \ VALUES。我们将值指定为问号（??），以表示实际值作为元组（'My Way', 15）作为第二个参数传递给 execute() 调用。\n\n```\n\
    import sqlite3\n\nconn = sqlite3.connect('music.sqlite')\ncur = conn.cursor()\n\
    \ncur.execute('DROP TABLE IF EXISTS Tracks')\ncur.execute('CREATE TABLE Tracks\
    \ (title TEXT, plays INTEGER)')\ncur.execute('INSERT INTO Tracks (title, plays)\
    \ VALUES (?,?)',\n    ('Thunderstruck', 20))\ncur.execute('INSERT INTO Tracks\
    \ (title, plays) VALUES (?,?)',\n    ('My Way', 15))\nconn.commit()\nprint('Tracks:')\n\
    cur.execute('SELECT title, plays FROM Tracks')\nfor row in cur:\n    print(row)\n\
    ```\n\n首先，我们向表中插入两行，并使用 commit() 强制将数据写入数据库文件。\n\n| title | plays |\n| :--- |\
    \ :--- |\n| Thunderstruck | 20 |\n| My Way | 15 |\n\n然后我们使用 SELECT 命令从表中检索我们刚刚插入的行。在\
    \ SELECT 命令中，我们指定了要提取的列（title, plays），并指定了要从哪个表中检索数据。执行 SELECT 语句后，游标是我们可以在 for\
    \ 循环指令中遍历的东西。为了提高效率，游标在执行 SELECT 语句时不会从数据库中读取所有数据。相反，数据是在我们遍历 for 声明中的行时读取的。程序的输出如下：\n\
    \nTracks:\n('Thunderstruck', 20)\n('My Way', 15)\n\n我们的 for 循环找到两行，每一行都是一个 Python\
    \ 元组，第一个值是 title，第二个值是播放次数。\n\n在程序结束时，我们运行一个 SQL 命令来“清除”我们刚刚创建的行，以便我们可以一遍又一遍地运行程序。DELETE\
    \ 命令展示了 WHERE 子句的用法，它允许我们表达选择标准，以便我们可以要求数据库仅将命令应用于匹配标准的行。在这个例子中，标准现在适用于所有行，所以我们清空表以便可以重复运行程序。DELETE\
    \ 之后，我们还调用 commit() 强制将数据从数据库中移除。"
