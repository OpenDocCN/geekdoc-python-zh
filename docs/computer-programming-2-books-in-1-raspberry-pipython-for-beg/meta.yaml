    \ to get feedback from other people and improve your project. Meet this community\
    \ on the page: [https://python-forum.io](https://python-forum.io)"
  mdcn: "Python有多种不同的实现：CPython、Jython、IronPython、PyPy等。CPython是使用最广泛、速度最快且最成熟的实现。当人们谈论Python时，通常指的就是这种实现。在这种情况下，解释器和模块都是用C语言编写的。Jython是Python的Java实现，而IronPython则是其C#（.NET）对应版本。通过使用这些实现，可以利用Java和.NET程序员可用的所有库。最后，PyPy是用Python实现的Python。\n\
    \n安装Python非常简单。如果你无法使用它，又怎能学习一门编程语言呢？Python 2通常预装在大多数苹果电脑上，但你最好使用Python 3。许多公司仍在使用Python\
    \ 2，原因很简单：他们多年前用Python 2构建了网站，尚未升级到Python 3。Python 3是该语言的一次重大更新，有显著的变化，使得从2到3的过渡非常复杂。这就是为什么许多用Python\
    \ 2构建页面的公司选择继续使用它。要么这样，要么重建整个页面。新网站几乎总是使用Python 3构建。在未来几年，坚持使用Python 2的公司将转向Python\
    \ 3，因为每个人都在向Python 3迁移。\n\n## 在Mac OS X上安装Python\n\n要在Mac上开始使用Python，我们将首先使用命令行。要访问此终端，我们可以遵循两种路径：\n\
    \n- 点击Spotlight并输入“Terminal”。\n- 或者，打开“Applications”文件夹，然后是“Utilities”文件夹，最后是“Terminal”。\n\
    \n终端打开后，尝试输入以下命令并按回车键：\n\n```\njot - 125\n```\n\n这应该会打开并打印从1到25的所有数字列表。通过这个，我们练习了如何使用终端。\n\
    \n现在我们将获取Homebrew，一个包管理器，它将允许我们安装和管理用Python编写的软件包。\n\n为了获取并使其正常工作，我们将遵循以下步骤：\n\
    \n1. 访问页面[https://brew.sh](https://brew.sh)\n2. 将页面上指示的安装命令复制到你的终端中。它应该看起来像这样：\n\
    \   `/bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)\"\
    `。\n3. 一个新的文本将为你打开。发生这种情况后，按“Enter”键。这将提示你输入密码，输入你的计算机密码，然后再次按“Enter”。\n4. 一个新的文本将为你打开。转到最后几行，如果你读到文本“Installation\
    \ successful”，则表示过程已成功。\n\n现在我们将继续安装Python；步骤如下：\n\n1. 在你的终端中输入以下内容：\n   `brew\
    \ install python3`\n2. 在将打开的新文本中，“Summary”行将指示你已完成，并且成功了。\n\n为了检查一切确实正常，我们将进行如下测试：\n\
    \n1. 打开你的终端并写入以下行以检查你正在使用的版本：\n   `python3 --version`\n2. 你发布上述命令后应该看到的文本如下：\n\
    \   `Python 3.xx`\n3. 如果出现上述文本，则表示Python 3最终已安装并可供使用。\n\n## 在Windows上安装Python\n\
    \n为了准备一切，我们将进行三个过程。第一个对应于Python的安装。为此，我们将遵循以下步骤序列：\n\n1. 访问页面[https://www.python.org/downloads/](https://www.python.org/downloads/)以安装Python\
    \ 3.5.2。\n2. 单击安装程序开始下载。\n3. 安装开始后，务必单击ADD Python to 3.5 paths。\n4. 单击立即安装。如果安装成功，安装程序中将显示此短语。\n\
    \n以下过程对应于安装一个更适合我们编程的终端。该终端将是Git Bash：\n\n1. 通过页面[https://git-scm.com/download/win](https://git-scm.com/download/win)下载Git\
    \ & Git Bash\n2. 接受许可。\n3. 允许将其安装在默认文件夹中，不要对配置进行任何更改。\n4. 将出现一个屏幕，指示安装已完成。\n\n\
    要执行测试并验证一切正常，你必须执行以下操作：\n\n1. 转到开始菜单并打开Git Bash。\n2. 通过输入以下内容确认Python可用：`python\
    \ --version`并按回车键。\n3. 你应该看到文本Python 3.xx。如果没有，则表示你安装了Python 2.7。\n4. 如果你安装了旧版本的Python，请卸载它并重新启动Git\
    \ Bash。这样，你应该能够查看前面提到的文本。\n\n现在你必须安装Pip，一个包管理器，它将允许我们安装和管理用Python编写的软件包：\n\n1.\
    \ 在你的终端中，运行以下命令：\n   `curl https://bootstrap.pypa.io/get-pip.py > get-pip.py`\n\
    2. 完成后，写入另一行，这将安装Pip：\n   `python get-pip.py`\n\n准备好了！现在我们已经安装了Python、一个终端和一个管理器。\n\
    \n## 如何获取Python支持\n\n经过20年的支持，Python结束了对Python 2的支持。2020年1月1日，Python编程语言2.7版本的支持正式结束。由该语言创建者Guido\
    \ van Rossum领导的Python软件基金会宣布，未来将不再接收安全更新和错误修复。这并不是太严重的事情，因为其继任者Python 3的发布早在2006年，距今已有14年之久。事实上，对Python\
    \ 2.7的支持本应在2015年结束。然而，该版本的巨大受欢迎程度（它仍然是许多Linux发行版上的默认Python版本）说服了基金会需要支持两个开发分支，并推迟了Python\
    \ 2.7的“死亡”日期。\n\n上述内容是我们建议你从头开始学习Python 3的又一个原因。然而，无论使用Python 2还是Python 3，你永远不会孤单，因为开发者社区庞大而团结。优秀的软件由优秀的人支持。用户群体充满热情，致力于鼓励语言的使用，并致力于使其多样化和友好。\n\
    \n官方Python页面是[https://www.python.org](https://www.python.org)，它提供了与此编程语言相关的所有信息；在其主要内容中，你可以找到：\n\
    \n- 初学者指南：既适用于那些想从头开始编程的人（像你一样！），也适用于希望复习或更新此主题的老手。\n- 下载：尽管我们为你提供了一个非常具体的入门指南，但你也可以在官方页面上探索Python读物及其相应文件。\n\
    - 文档：在这里，你将找到标准库，以及额外的教程和指南。知识就是力量！\n- 社区：Python页面上的短语是，“Python社区庞大；多样化并旨在增长；Python是开放的。”这公正地反映了现实情况。在同一个官方页面上，可以访问社区，在那里你可以访问常见问题解答、会议和支持小组，以解决你在学习过程和编程生涯中可能出现的所有疑问。一些你可以与社区联系的突出页面包括：\n\
    \    - PYSACKERS：这是Python为编程爱好者开放的社区。它包含学习资源、库和资源、规则以及社区本身共享的代码。在此页面了解此社区：[https://pyslackers.com/web](https://pyslackers.com/web)。\n\
    \    - Python Discord：通过活动和挑战（有奖品！）组织社区的地方。与其他开发者更直接互动、学习、获取资源、协作和解决问题的理想场所，你永远不会陷入困境。在此页面了解此社区：[https://pythondiscord.com](https://pythondiscord.com)。\n\
    \    - Python论坛：在这个地方，讨论各种主题：新信息、提示和建议、各种项目（游戏开发、网络开发……）、任务（针对正在学习的人），你甚至可以分享你自己的开发成果以获得其他人的反馈并改进你的项目。在此页面了解此社区：[https://python-forum.io](https://python-forum.io)"
