    without previously loading them.


    To make Python treat a directory as a package, you need to create a file __init__.py
    in that folder. This way, we get Python to understand that it is a package and
    not a simple folder. In this way, we can access some of the modules of the package.
    Like modules, import and from-import are also used to import packages to separate
    packages, sub-packages, and modules:


    ```

    import package subpackage module


    package.subpack.modulo.func ()

    ```'
