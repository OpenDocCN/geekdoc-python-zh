  md: '# # Chapter One


    # ## The Raspberry Pi


    # ### The Raspberry Pi Components


    The Raspberry Pi is a series of small single-board computers developed by the
    Raspberry Pi Foundation in the United Kingdom to promote fundamental computer
    science teaching in schools and developing countries. The original model became
    much more popular than expected, selling for uses such as robotics outside its
    target market. Peripherals (such as keyboards and mice) and cases are not included
    here. However, in several official and unofficial bundles, several accessories
    are packed.


    Two arms comprise the company behind the Raspberry Pi. The first two versions
    were produced by the Raspberry Pi Foundation. The Foundation founded Raspberry
    Pi Trading after the launch of the Pi Model B. Eben Upton was the CEO at the time.
    The third model, the B+, was further developed by the Foundation. Raspberry Pi
    Trading is responsible for technology growth, while the Foundation is an educational
    charity in schools and developing countries that supports the teaching of basic
    computer science.


    *What''s fresh about the Raspberry Pi 4?*


    Support for dual display (4 K): You can now attach two displays to this desktop
    computer with this feature, and that feature is also available in 4K.


