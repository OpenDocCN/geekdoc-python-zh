    \ within another. In this case, the inner function definition is not executed\
    \ until the outer function is called.\n\nFunction calls are like a detour in the\
    \ flow of execution. Instead of going to the next statement, the flow jumps to\
    \ the first line of the called function, executes all the statements it finds\
    \ there and"
