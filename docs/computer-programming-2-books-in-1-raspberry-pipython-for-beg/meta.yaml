    # Applications of Raspberry Pi


    In many applications such as video streamers, arcade machines, tablet computers,
    home automation, car computer, internet radio, robot power, cosmic computers,
    meteorite hunting, coffee, Raspberry Pi boards are used.


    # Motor Speed Control depending on Raspberry Pi


    The main goal of this project is to use the Raspberry Pi to regulate the speed
    of a DC motor.


    # Hardware and software Requirements


    DC Engine, Raspberry Pi model, TV or PC display, IC Engine Driver, LED, Resistors,
    Capacitors, Diode, Transformer, Voltage Regulator and PHP program / cable pi.


    # Motor Speed Control Block Diagram Based on Raspberry Pi


    To monitor the DC motor velocity, this project uses a Raspberry Pi board. A DC
    motor''s speed is directly proportional to the voltage applied across its terminals.
    When the voltage varies across the motor terminal, the speed varies accordingly
    as well. To run the engine at different speeds by pressing the key, a keyboard
    must be linked to the Raspberry Pi board.


    The PWM (pulse width modulation) is activated at the output according to the software,
    and it can be programmed using PHP / wiring pi. The average current and voltage
    change according to the service cycle, so the DC motor speed will also change.
    For receiving PWM signals and sending the desired O / P to the DC engine, a motor
    driver IC is connected to the board.


    # Using Raspberry Pi, Auto Intensity monitoring of streetlights'
  - '[PAGE 162]


    The main objective of this project is to use Raspberry Pi to monitor the automatic
    strength of streetlights.


    Requirements for Hardware and Applications:


    The transformer, the diodes, the capacitors, the resistors, the LEDs, the Raspberry
    Pi frame, the TV or PC display, the White LEDs, the MOSFET, the Crystal, the PHP
    or the Wiring Pi software.


    This project uses many LEDs as streetlights that use less electricity. When compared
    to the HID lamps, the lifespan of the LEDs is also greater. To regulate the intensity,
    a Raspberry Pi is used by generating pulse width modulation signals that drive
    a MOSFET to turn the LEDs to achieve the desired operation.


    The intensity of LEDs gradually varies from evening to the next day, particularly
    during peak hours, with maximum light intensity and then slowly decreasing the
    intensity of the decreasing lights. In the Raspberry Pi software, MOSFET switching
    by pulse width modulation technique is implemented to provide variable voltage
    across the LEDs


