- md: '## Appendix C: HDMI Display Modes


    ### Options on composite video mode


    #### Sdtv mode for sdtv


    A TV standard used for composite video output is specified by the `sdtv_mode`
    command. On the original Raspberry Pi, the RCA socket produces composite video.
    Composite video is output along with sound on the 4-pole TRRS (headphone) socket
    on other Raspberry Pis, except for Pi Zero and Compute Module. There is an unpopulated
    header called ''TV'' on the Pi Zero that outputs composite video. Composite video
    is accessible via the TVDAC pin on the Compute Module. The default `sdtv_mode`
    value is 0.


    #### Outcome of sdtv mode


    - 0: NTSC NORMAL

    - 1: NTSC Japanese edition - no pedestal

    - 2: Regular Friend

    - 3: Brazilian PAL version - 525/60 rather than 625/50, various subcarriers

    - 16: NTSC Progressive Scan

    - 18: PAL Progressive Scan


    #### Sdtv aspect


    The `sdtv_aspect` command determines the composite video output aspect ratio.
    The value is 1 by default.


    #### Product of sdtv aspect


    - 1: 4:3

    - 2: 14:9

    - 3: 16:9


    ### Sdtv-disable-colourburst


    Setting `sdtv_disable_colourburst` to 1 on composite video output disables colourburst.
    The image will be shown in monochrome but may be clearer in appearance.


    ### Enable tvout (only Pi 4B)


    Composite performance is disabled on the Raspberry Pi 4 by default because of
    the way the internal clocks are interrelated and allocated. Since composite video
    requires a very specific clock, setting the clock on the Pi 4 to the necessary
    speed means that other clocks linked to it are adversely affected, slowing down
    the entire device slightly. Since composite video is a less widely used feature,
    to avoid this device slowdown, we decided to disable it by design.


    Use the `enable_tvout=1` option to allow composite output. This will detrimentally
    affect performance to a limited degree, as mentioned above.


    The composite behavior stays the same on older Pi models.


    ### Options for HDMI mode


    Note for Raspberry Pi 4B users: Since there are two HDMI ports on the Raspberry
    Pi 4B, some HDMI commands can be applied to either port. You may use the `<command>:<port>`
    notation, where the port is 0 or 1, to define the port to which the setting should
    be applied. If no port is defined, 0 is the default. If a port number is defined
    for a command that does not need a port number, the port will be ignored. For
    more information on the syntax and alternative mechanisms, please refer to the
    HDMI section on the Documentation Conditionals tab.


    The Raspberry Pi 4 has upgraded video hardware to accommodate dual 4k displays,
    which imposes slight limitations on the modes supported. For more info, please
    see here.


    ### Secure hdmi safe


    To try to boot with full HDMI compatibility, setting `hdmi_safe` to 1 would lead
    to "safe mode" settings being used. This is the same as setting the parameters
    that follow:


    ```

    hdmi_force_hotplug=1

    hdmi_ignore_edid=0xa5000080

    config_hdmi_boost=4

    hdmi_group=2

    hdmi_mode=4

    disable_overscan=0

    overscan_left=24

    overscan_right=24

    overscan_top=24

    overscan_bottom=24

    ```


    ### Hdmi ignore edid


    If your display does not have an accurate EDID, setting `hdmi_ignore_edid` to
    0xa5000080 allows the ignoring of EDID/display data. To ensure that it is not
    activated inadvertently, it needs this unusual value.


    ### Hdmi edid file


    Instead of reading it from the display, setting `hdmi_edid_file` to 1 would cause
    the GPU to read EDID data from the `edid.dat` file stored in the boot partition.
    There''s more stuff available here.


    ### Hdmi edid filename


    You may use the `hdmi_edid_filename` command on the Raspberry Pi 4B to define
    the filename of the EDID file to be used, as well as which port to apply the file
    to. To allow EDID files, it also needs `hdmi_edid_file=1`.


    For instance:


    ```

    hdmi_edid_file=1

    hdmi_edid_filename:0=FileForPortZero.edid

    hdmi_edid_filename:1=FileForPortOne.edid

    ```


    ### Hdmi force edid audio


    Setting `hdmi_force_edid_audio` to 1 pretends that the monitor supports all audio
    formats, allowing DTS/AC3 passthrough even when this is not recorded as supported.


    ### Hdmi ignore edid audio


    Setting `hdmi_ignore_edid_audio` to 1 pretends that the monitor does not accept
    all audio formats. This means the analog audio (headphone) jack will switch to
    ALSA.


    ### Hdmi force edid 3d


    Even though the EDID does not imply support for this, setting `hdmi_force_edid_3d`
    to 1 pretends that all CEA modes support 3D.


    ### Init hdmi ignore cec init


    During bootup, setting `hdmi_ignore_cec_init` to 1 will avoid the initial active
    source message being sent. This prevents your Raspberry Pi from coming out of
    standby and channel-switching when you reboot a CEC-enabled TV.


    ### Hdmi ignore cec


    Setting `hdmi_ignore_cec` to 1 pretends that the TV does not at all support CEC.
    There will be no CEC functions supported.


    ### Name of cec osd name


    The `cec_osd_name` command sets the device''s initial CEC name. The Raspberry
    Pi is the norm.


    ### Encoding hdmi pixel


    The command `hdmi_pixel_encoding` forces the mode for pixel encoding. By default,
    the mode requested by the EDID will be used, so you do not need to change it.


    #### Outcome of hdmi pixel encoding


    - 0: Default (RGB for CEA minimal, RGB for DMT full)

    - 1: Minimal RGB (16-235)

    - 2: Total RGB (0-255)

    - 3: Minimal YCbCr (16-235)

    - 4: Absolute YCbCr (0-255)


    ### Hdmi blanking


    The `hdmi_blanking` command controls what happens when, using DPMS, the operating
    system demands that the monitor be put into standby mode to conserve power. The
    HDMI output is blanked but not turned off if this option is not set or set to
    0. You can also set the HDMI output to shut off by setting this option to 1 to
    imitate the actions of other computers: the attached monitor will go into a low-power
    standby mode.


    Setting `hdmi_blanking=1` will not cause the HDMI output to be turned off on the
    Raspberry Pi 4, as this function has not yet been implemented.


    Note: When using applications that do not use the framebuffer, such as omxplayer,
    this feature may cause problems.


    #### Outcome of hdmi blanking


    - 0: The HDMI output is blanked out

    - 1: You can turn off and blank the HDMI output


    ### The hdmi drive


    The `hdmi_drive` command allows you to choose between performance modes for HDMI
    and DVI.


    #### Outcome of hdmi drive


    - 1: Normal mode for DVI (no sound)

    - 2: Normal HDMI mode (if supported and allowed, sound will be sent)


    ### Configuration hdmi boost


    Configures the HDMI interface signal power. There is a minimum value of 0 and
    a maximum value of 11. For the original Model B and A, the default value is 2.
    For Model B+ and all later versions, the default value is 5.


    If HDMI problems (speckling, interference) are seen, then try 7. Up to 11 can
    require very long HDMI cables, but values this high should not be used unless
    absolutely necessary.


    On the Raspberry Pi 4, this option is ignored.


    ### The hdmi group


    The `hdmi_group` command identifies either CEA (Consumer Electronics Association,
    the norm typically used by TVs) or DMT (Display Monitor Timings, the norm typically
    used by monitors) as the HDMI output group. You can use this setting in conjunction
    with `hdmi_mode`.'
