- md: "## Window of Preview\n\n- **Window of Preview:** `--preview`, `-p` Settings\
    \ for the preview window `< 'x,y,w,h' >`\n  Allows the user to specify the size\
    \ and screen position of the preview window. Note that this will be superimposed\
    \ on all other windows / graphics at the end.\n- **Fullscreen Preview:** `--fullscreen`,\
    \ `-f`\n  Forces the whole screen to use the preview window. Notice that it will\
    \ retain the aspect ratio of the incoming image, so there may be bars on some\
    \ edges.\n- **Preview Window does not Appear:** `--nopreview`, `-n`\n  It totally\
    \ disables the preview window. Notice that, while the preview is disabled, frames\
    \ will still be generated by the camera, so power will be used.\n- **Preview Window\
    \ Opacity:** `--opacity`, `-op`\n  Configures the opacity of the preview windows.\
    \ 0 = translucent, 255 = opaque completely.\n\n## Choices for Camera Control\n\
    \n- **Set Image Sharpness:** `--Sharpness`, `-sh` (-100-100)\n  Configures the\
    \ sharpness of the frame. 0 is the default.\n- **Set Image Contrast:** `--contrast`,\
    \ `-co` (-100-100)\n  Set the picture contrast. 0 is the default.\n- **Set Image\
    \ Brightness:** `--brightness`, `-br` (0-100)\n  Configures the image's brightness.\
    \ 50 is the default option. 0 is black, 100 is white.\n- **Set Image Saturation:**\
    \ `--saturation`, `-sa` (-100-100)\n  Sets the image's colour saturation. 0 is\
    \ the default.\n- **Set ISO Capture:** `--ISO`, `-ISO` (100-800)\n  Sets the ISO\
    \ to be used for screenshots.\n- **Turn on the Stabilization Video:** `--vstab`,\
    \ `-vs`\n  Switch on video stabilization in video mode only.\n- **Set EV Compensation:**\
    \ `--ev`, `-ev` (-10-10)\n  Sets the image's EV compensation. The default setting\
    \ is 0.\n- **Set Exposure Mode:** `--exposure`, `-ex`\n  Possible scenarios are:\n\
    \  - Auto: using automatic exposure mode\n  - Night: pick a setting for shooting\
    \ at night\n  - Backlight: pick the backlit subject setting\n  - Flashlight\n\
    \  - Spotlight\n  - Sports: select sports settings (fast shutter, etc.)\n  - Snow:\
    \ pick an optimal setting for snowy scenery\n  - Beach: pick beach-optimized settings\n\
    \  - Very long: pick a long exposure setting\n  - Fixedfps: restrict fps to a\
    \ fixed value\n  - Antishake: mode antishake\n  - Fireworks: pick the optimized\
    \ setting for fireworks\n\n  Note that, depending on the camera tuning, not all\
    \ of these settings can be applied.\n\n- **Set Avoidance Mode for Flicker:** `--flicker`,\
    \ `-fli`\n  Set a mode to compensate for lights that flicker at the frequency\
    \ of the mains, which can be seen through a picture as a dark horizontal band.\
    \ Flicker avoidance locks the exposure time (8.33ms for 60Hz, or 10ms for 50Hz)\
    \ to a multiple of the mains flicker frequency. This implies that photos can be\
    \ noisier since the control algorithm needs to increase the gain if it requires\
    \ an intermediate exposure value instead of exposure time. Auto may be confused\
    \ by external variables, so unless actually needed, it is preferable to leave\
    \ this setting off.\n\n  Possible scenarios are:\n  - Off: turn off flicker prevention\n\
    \  - Auto: Detect mains frequency automatically\n  - 50hz: avoidance set at 50Hz\n\
    \  - 60hz: avoidance set at 60Hz\n\n- **Set White Balance Automatic (AWB) Mode:**\
    \ `--awb`, `-awb`\n  These settings are set in brackets for the modes for which\
    \ color temperature ranges (K) are available.\n  - Off: switching off the measurement\
    \ of white balance\n  - Auto: automatic (default) mode\n  - Sun: sunny (between\
    \ 5000 K and 6500 K) mode\n  - Cloud: gloomy (between 6500 K and 12000 K) mode\n\
    \  - Shade: mode of shade\n  - Tungsten: mode of tungsten illumination (between\
    \ 2500 K and 3500 K)\n  - Fluorescent: fluorescent (between 2500 K and 4500 K)\
    \ lighting mode\n  - Incandescent: mode of incandescent lighting\n  - Flash: flash\
    \ mode\n  - Horizon: form of horizon\n  - Greyworld: Use this on the NoIR camera\
    \ due to the absence of the IR filter to repair incorrect AWB results.\n\n  Notice\
    \ that, depending on the type of camera, not all of these settings can be applied.\n\
    \n- **Set Image Effect Environment:** `--imxfx`, `-ifx`\n  Set the effect to apply\
    \ to a picture:\n  - None: no impact (default)\n  - Negative: inverting the colors\
    \ of the picture\n  - Solarize: solarization of the image\n  - Posterisation:\
    \ posterisation of the picture\n  - Whiteboard: impact whiteboard\n  - Blackboard:\
    \ impact blackboard\n  - Drawing: sketch impact\n  - Denoise: denoise the photo\n\
    \  - Emboss: emboss the photo\n  - Oil paint: oil paint effect\n  - Hatch: hatch\
    \ sketch effects\n  - Gpen: impact of graphite sketch\n  - Pastel: pastel impact\n\
    \  - Aquarell effect: watercolour effect\n  - Movie: film grain impact\n  - Blur:\
    \ the picture gets blurred\n  - Saturation: saturate image’s color\n  - Colourswap:\
    \ not completely enforced\n  - Washedout: not completely introduced\n  - Colourpoint:\
    \ not completely introduced\n  - Colourbalance: not completely applied\n  - Cartoon:\
    \ not completely launched\n\n  Note that, in all cases, not all these settings\
    \ can be available.\n\n- **Color Effect Package:** `--colfx`, `-cfx`\n  The U\
    \ and V parameters supplied (range 0-255) are added to the image's U and Y channels.\
    \ For example, a monochrome image should result in `--colfx 128:128`.\n\n- **Set\
    \ Metering Mode:** `--metering`, `-mm`\n  Enter the metering mode that is used\
    \ to preview and capture:\n  - Average: the whole frame average for metering\n\
    \  - Spot: spot metering\n  - Backlit: Suppose a backlit picture\n  - Matrix:\
    \ metering matrix\n\n## Time-Lapse Photography command-line\n\nYou simply configure\
    \ the Raspberry Pi to take a picture at a regular interval to produce a time-lapse\
    \ video, such as once a minute, then use an application to stitch the pictures\
    \ together into a video. There are a few ways to do this.\n\n## Using the integrated\
    \ time-lapse mode of Rasipstill\n\nRasipstill has a built-in time-lapse mode program\
    \ that uses the command line switch `--timelapse` (or `-tl`). The time between\
    \ shots in milliseconds is the value which follows the switch:\n\n```\nraspistill\
    \ -t 30000 -tl 2000 -o image%04d.jpg\n```\n\nNote in the output filename the `%04d`:\
    \ this indicates the point in the filename where you want the amount of the frame\
    \ count to appear. The above instruction, for example, produces a capture every\
    \ two seconds (2000ms), over a total duration of 30 seconds (30000ms), called\
    \ image0001.jpg, image0002.jpg, and so on, through to image0015.jpg.\n\nThe `%04d`\
    \ indicates a four-digit number, with added leading zeros to make up the number\
    \ of digits needed. For instance, a `%08d` will lead to an eight-digit number.\
    \ If you don't want leading zeros, you might skip `0`, too.\n\nIf a timelapse\
    \ value of 0 is entered, photographs will be taken as quickly as possible by the\
    \ application. To ensure that exposure measurements can be made, remember that\
    \ there is a minimum enforced delay of approximately 30 milliseconds between captures.\n\
    \n## Cron Use\n\nCron is a good way to automate the taking of an image at a regular\
    \ interval. Open the Cron edit table to edit:\n\n```\ncrontab -e\n```\n\nThis\
    \ either asks the editor you want to use or opens it in your default editor. If\
    \ the file is opened in an editor, add the following line to schedule each minute\
    \ to take an image.\nSave and exit and the message should be seen:\n`crontab:\
    \ new crontab installed:`\n\nMake sure that you use e.g. `%04d` to output each\
    \ image to a new file with raspistill: if you don't, then raspistill will overwrite\
    \ the same file every time you write an image.\n\n## Stitching together photos\n\
    \nYou're going to need to stitch the images together into a video now. Using mencoder,\
    \ you can do this on the Pi, but processing will be slow. You may prefer to move\
    \ the image files to your laptop or desktop computer and create the video there.\n\
    Navigate to a folder that contains your photos and list the file names in a text\
    \ file. For instance:\n\n```\nls *.jpg > stills.txt\n```\n\n## On the Pi Raspberry\n\
    \nAlthough it will be sluggish (due to software encoding rather than using the\
    \ Raspberry Pi hardware acceleration), using various available tools, you can\
    \ stitch your JPEG images together. Avconv, which must be mounted, will be included\
    \ in this documentation.\n\n```\nsudo apt install libav-tools\n```\n\nYou can\
    \ now use these tools to convert your JPEG files to H264 video files:\n\n```\n\
    avconv -r 10 -i image%04d.jpg -r 10 -vcodec libx264 -vf scale=1280:720 timelapse.mp4\n\
    ```\n\nThis can encode a little more than a frame per second on a Raspberry Pi\
    \ 3. Other Pi models' efficiency can vary. The parameters used are:\n- `-r 10`\
    \ For input and output files, presume ten frames per second.\n- `-i image%04d.jpg`\
    \ Specification of the input file (to fit the files produced during the capture).\n\
    - `-vcodec libx264` Use the x264 encoder software.\n- `-vf scale=1280:720` 720p\
    \ scale. Depending on the specifications, you can also use 1920:1080, or lower\
    \ resolutions. Notice that the Pi can only play back up to 1080p video, but you\
    \ might set it here if you intend to play back at 4K, for instance.\n- `timelapse.mp4`\
    \ The output file's name.\n\nAvconv has a detailed set of parameters for different\
    \ choices for encoding and other settings. It is possible to list these using\
    \ `avconv --support`.\n\n## On another machine with Linux\n\nYou may use the same\
    \ Raspberry Pi instructions, or an alternative set such as the mencoder:\n\n```\n\
    sudo apt install mencoder\n```\n\nNow run the command below:\nYou should have\
    \ a video file called timelapse.avi containing a time-lapse of your photos until\
    \ that's done."
  mdcn: "## 预览窗口\n\n- **预览窗口：** `--preview`, `-p` 预览窗口设置 `< 'x,y,w,h' >`\n  允许用户指定预览窗口的大小和屏幕位置。请注意，此窗口最终会叠加在所有其他窗口/图形之上。\n\
    - **全屏预览：** `--fullscreen`, `-f`\n  强制整个屏幕使用预览窗口。请注意，它将保持输入图像的纵横比，因此某些边缘可能会出现黑边。\n\
    - **预览窗口不显示：** `--nopreview`, `-n`\n  完全禁用预览窗口。请注意，虽然预览被禁用，但摄像头仍会生成帧，因此会消耗电力。\n\
    - **预览窗口不透明度：** `--opacity`, `-op`\n  配置预览窗口的不透明度。0 = 半透明，255 = 完全不透明。\n\n## 摄像头控制选项\n\
    \n- **设置图像锐度：** `--Sharpness`, `-sh` (-100-100)\n  配置帧的锐度。0 为默认值。\n- **设置图像对比度：**\
    \ `--contrast`, `-co` (-100-100)\n  设置图像对比度。0 为默认值。\n- **设置图像亮度：** `--brightness`,\
    \ `-br` (0-100)\n  配置图像的亮度。50 为默认选项。0 为黑色，100 为白色。\n- **设置图像饱和度：** `--saturation`,\
    \ `-sa` (-100-100)\n  设置图像的色彩饱和度。0 为默认值。\n- **设置 ISO 拍摄：** `--ISO`, `-ISO` (100-800)\n\
    \  设置用于截图的 ISO 值。\n- **开启视频防抖：** `--vstab`, `-vs`\n  仅在视频模式下开启视频防抖功能。\n- **设置曝光补偿：**\
    \ `--ev`, `-ev` (-10-10)\n  设置图像的曝光补偿。默认设置为 0。\n- **设置曝光模式：** `--exposure`, `-ex`\n\
    \  可选场景如下：\n  - Auto：使用自动曝光模式\n  - Night：选择夜间拍摄设置\n  - Backlight：选择逆光主体设置\n  -\
    \ Flashlight：手电筒模式\n  - Spotlight：聚光灯模式\n  - Sports：选择运动设置（快速快门等）\n  - Snow：选择雪景的最佳设置\n\
    \  - Beach：选择海滩优化设置\n  - Very long：选择长曝光设置\n  - Fixedfps：将帧率限制为固定值\n  - Antishake：防抖模式\n\
    \  - Fireworks：选择烟花的优化设置\n\n  请注意，根据摄像头的调校，并非所有这些设置都能应用。\n\n- **设置闪烁规避模式：** `--flicker`,\
    \ `-fli`\n  设置一种模式，以补偿以市电频率闪烁的灯光，这种灯光在画面中可能表现为暗色水平条纹。闪烁规避会将曝光时间（60Hz 时为 8.33ms，50Hz\
    \ 时为 10ms）锁定为市电闪烁频率的倍数。这意味着照片可能会产生更多噪点，因为控制算法需要在需要中间曝光值而非曝光时间时增加增益。自动模式可能会被外部变量干扰，因此除非实际需要，否则最好关闭此设置。\n\
    \n  可选场景如下：\n  - Off：关闭闪烁预防\n  - Auto：自动检测市电频率\n  - 50hz：规避设置为 50Hz\n  - 60hz：规避设置为\
    \ 60Hz\n\n- **设置自动白平衡（AWB）模式：** `--awb`, `-awb`\n  这些设置在括号中列出了可用色温范围（K）的模式。\n\
    \  - Off：关闭白平衡测量\n  - Auto：自动（默认）模式\n  - Sun：晴朗（介于 5000 K 和 6500 K 之间）模式\n  -\
    \ Cloud：阴天（介于 6500 K 和 12000 K 之间）模式\n  - Shade：阴影模式\n  - Tungsten：钨丝灯照明（介于 2500\
    \ K 和 3500 K 之间）模式\n  - Fluorescent：荧光灯（介于 2500 K 和 4500 K 之间）照明模式\n  - Incandescent：白炽灯照明模式\n\
    \  - Flash：闪光灯模式\n  - Horizon：地平线模式\n  - Greyworld：在 NoIR 摄像头上使用此模式，由于缺少红外滤光片，可用于修复不正确的\
    \ AWB 结果。\n\n  请注意，根据摄像头的类型，并非所有这些设置都能应用。\n\n- **设置图像效果环境：** `--imxfx`, `-ifx`\n\
    \  设置应用于图像的效果：\n  - None：无影响（默认）\n  - Negative：反转图像颜色\n  - Solarize：图像曝光过度效果\n\
    \  - Posterisation：图像色调分离效果\n  - Whiteboard：白板效果\n  - Blackboard：黑板效果\n  - Drawing：素描效果\n\
    \  - Denoise：图像降噪\n  - Emboss：图像浮雕效果\n  - Oil paint：油画效果\n  - Hatch：交叉线素描效果\n\
    \  - Gpen：石墨素描效果\n  - Pastel：粉彩效果\n  - Aquarell effect：水彩效果\n  - Movie：胶片颗粒效果\n\
    \  - Blur：图像模糊\n  - Saturation：图像颜色饱和\n  - Colourswap：未完全实现\n  - Washedout：未完全引入\n\
    \  - Colourpoint：未完全引入\n  - Colourbalance：未完全应用\n  - Cartoon：未完全启动\n\n  请注意，在所有情况下，并非所有这些设置都可用。\n\
    \n- **色彩效果包：** `--colfx`, `-cfx`\n  提供的 U 和 V 参数（范围 0-255）会添加到图像的 U 和 V 通道。例如，单色图像应使用\
    \ `--colfx 128:128`。\n\n- **设置测光模式：** `--metering`, `-mm`\n  输入用于预览和拍摄的测光模式：\n\
    \  - Average：整个画面平均测光\n  - Spot：点测光\n  - Backlit：假设为逆光图片\n  - Matrix：矩阵测光\n\n\
    ## 延时摄影命令行\n\n你只需将树莓派配置为以固定间隔拍摄照片，以生成延时视频，例如每分钟一次，然后使用应用程序将这些图片拼接成视频。有几种方法可以实现。\n\
    \n## 使用 Rasipstill 的集成延时模式\n\nRasipstill 有一个内置的延时模式程序，使用命令行开关 `--timelapse`（或\
    \ `-tl`）。两次拍摄之间的间隔时间（以毫秒为单位）是该开关后面的值：\n\n```\nraspistill -t 30000 -tl 2000 -o\
    \ image%04d.jpg\n```\n\n请注意输出文件名中的 `%04d`：这表示你希望帧计数出现在文件名中的位置。例如，上述指令每两秒（2000ms）拍摄一次，总持续时间为\
    \ 30 秒（30000ms），生成的文件名为 image0001.jpg、image0002.jpg，依此类推，直到 image0015.jpg。\n\n\
    `%04d` 表示一个四位数，通过添加前导零来达到所需的位数。例如，`%08d` 将生成一个八位数。如果你不想要前导零，也可以省略 `0`。\n\n如果输入的延时值为\
    \ 0，应用程序将尽可能快地拍摄照片。为确保能够进行曝光测量，请记住，两次拍摄之间有大约 30 毫秒的最小强制延迟。\n\n## Cron 使用\n\nCron\
    \ 是自动化定期拍摄图像的好方法。打开 Cron 编辑表进行编辑：\n\n```\ncrontab -e\n```\n\n这会询问你要使用的编辑器，或在默认编辑器中打开。如果文件在编辑器中打开，请添加以下行以安排每分钟拍摄一张图像。\n\
    保存并退出，应该会看到消息：\n`crontab: new crontab installed:`\n\n确保你使用例如 `%04d` 将每张图像输出到新文件（使用\
    \ raspistill）：否则，raspistill 每次写入图像时都会覆盖同一个文件。\n\n## 拼接照片\n\n现在你需要将图像拼接成视频。使用 mencoder，你可以在树莓派上完成此操作，但处理速度会很慢。你可能更喜欢将图像文件移动到你的笔记本电脑或台式计算机上，并在那里创建视频。\n\
    导航到包含照片的文件夹，并将文件名列表保存到文本文件中。例如：\n\n```\nls *.jpg > stills.txt\n```\n\n## 在树莓派上\n\
    \n虽然速度会较慢（由于使用软件编码而非树莓派硬件加速），但使用各种可用工具，你可以将 JPEG 图像拼接在一起。本文档将包含必须安装的 Avconv。\n\
    \n```\nsudo apt install libav-tools\n```\n\n现在你可以使用这些工具将 JPEG 文件转换为 H264 视频文件：\n\
    \n```\navconv -r 10 -i image%04d.jpg -r 10 -vcodec libx264 -vf scale=1280:720\
    \ timelapse.mp4\n```\n\n在树莓派 3 上，这可以编码略高于每秒一帧的速度。其他树莓派型号的效率可能有所不同。使用的参数如下：\n-\
    \ `-r 10` 对于输入和输出文件，假定为每秒十帧。\n- `-i image%04d.jpg` 指定输入文件（以匹配拍摄期间生成的文件）。\n- `-vcodec\
    \ libx264` 使用 x264 编码器软件。\n- `-vf scale=1280:720` 720p 缩放。根据规格，你也可以使用 1920:1080\
    \ 或更低的分辨率。请注意，树莓派只能播放最高 1080p 的视频，但如果你打算在 4K 设备上播放，可以在此处设置。\n- `timelapse.mp4`\
    \ 输出文件的名称。\n\nAvconv 有一套详细的参数，用于不同的编码选择和其他设置。可以使用 `avconv --support` 列出这些参数。\n\
    \n## 在另一台 Linux 机器上\n\n你可以使用与树莓派相同的指令，或者使用另一组工具，例如 mencoder：\n\n```\nsudo apt\
    \ install mencoder\n```\n\n现在运行以下命令：\n你应该会得到一个名为 timelapse.avi 的视频文件，其中包含你的照片的延时摄影，直到完成。"
