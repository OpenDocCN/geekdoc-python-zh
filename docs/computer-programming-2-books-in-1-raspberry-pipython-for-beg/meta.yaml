    # Introducing Raspbian


    Raspbian is a free Debian-based operating system designed for the Raspberry Pi
    hardware. The collection of basic programs and utilities which make your Raspberry
    Pi run is an operating system. Raspbian, however, offers more than just a pure
    OS: it comes with more than 35,000 packages of pre-compiled software packed nicely
    for quick installation on your Raspberry Pi.


    In June 2012, the initial construction of more than 35,000 Raspbian packages designed
    for the best results on the Raspberry Pi was completed. Raspbian, however, is
    still being actively developed with a focus on enhancing the reliability and performance
    of as many Debian packages as possible.


    Note: Raspbian is not affiliated with the Base of Raspberry Pi. A small, dedicated
    team of developers who are fans of the Raspberry Pi hardware, the Raspberry Pi
    Foundation ''s educational objectives and, of course, the Debian Project, developed
    Raspbian.


    # Use external computers for storage


    A device that holds all the addressable data storage that is not within the main
    storage or memory of a computer is an external storage device, is often referred
    to as auxiliary storage and secondary storage. Removable or non-removable, temporary
    or permanent, and available over a wired or wireless network may be an external
    storage unit.'
- md: "External storage allows users to store data independently at a comparatively\
    \ low cost from the main or primary storage and memory of a device. It increases\
    \ storage space without having to open up a device.\n\nExternal storage is mostly\
    \ used to store information that programs running on a desktop, laptop, server,\
    \ or mobile device, such as an Android or iOS smartphone or tablet, have less\
    \ regular access to.\n\nAn external storage device for PCs mostly consists of\
    \ stationary or portable hard drives (HDDs) or solid-state drives (SSDs) connected\
    \ to or wirelessly through a USB or FireWire link.\n\nAn external storage device\
    \ can serve as primary storage linked to servers via Ethernet or Fibre Channel\
    \ switches for businesses, or as secondary storage for backup and archiving purposes.\
    \ External storage provides block-based, file-based or object storage HDD, all-flash\
    \ and hybrid storage arrays, or a combination of these three protocols known as\
    \ unified storage. Examples of external storage are storage area networks (SANs)\
    \ for block-level storage and network-attached storage (NAS) systems for file-based\
    \ storage.\n\nThe transport of data between on-site and off-site computer systems\
    \ is another common case for an external storage unit.\n\nWhen transferring vast\
    \ volumes of data to the cloud, providers will also use external storage devices\
    \ in a practice known as cloud seeding. Since it can take hours or days to transfer\
    \ tens of terabytes of data over a network, clients put their data on an external\
    \ storage device and send the device to their preferred provider for copying locally.\
    \ Only modified data will travel through the network to the cloud for backup,\
    \ archiving or disaster recovery (DR) purposes after the initial seeding.\n\n\
    ## New User Account Formation\n\nYou were given the opportunity to build one or\
    \ more user accounts using the Setup Agent when you first started using your Red\
    \ Hat Enterprise Linux framework after installation. You can now do so if you\
    \ have not built at least one account (not including the root account). For everyday\
    \ activities, you can avoid working in the root account.\n\nThere are two ways\
    \ to build new and/or additional user accounts: from a shell prompt or using the\
    \ graphical User Manager program.\n\nTo use the User Manager to graphically build\
    \ a user account:\n\n1. Pick Applications => Device Settings => Users & Groups\
    \ from the panel (the main menu on the panel). By typing redhat-config-users at\
    \ the shell prompt, you can also start the User Manager.\n2. If you are not signed\
    \ in as a root, your root password will be prompted.\n3. The window should be\
    \ visible. Click User Connect.\n\n## Software Install and Uninstall\n\nUsers are\
    \ accounts that can be used in a system to login. Each consumer is recognized\
    \ by the system through a unique identification number or UID. All device user\
    \ information is stored in the /etc/passwd file. Users' hashed passwords are stored\
    \ in the /etc/shadow format.\n\nOn the basis of the degree of access, users can\
    \ be divided into two categories:\n\n1. Superuser / root / administrator: All\
    \ the files on the server can be accessed.\n2. Standard users: Access limited.\n\
    \nWhen a new user is created, the system takes the following actions by default:\n\
    \n- Assigns the user a UID.\n- Establishes the /home/ home directory.\n- Sets\
    \ the user's default shell as /bin/sh.\n- Build a private community of users named\
    \ after the username itself.\n- Contents of /etc/skel are copied to the current\
    \ user's home directory.\n- .bashrc, .bash_profile, and .bash_logout are copied\
    \ to the new user's home directory. These files contain the user's session environment\
    \ variables.\n\n## Definition of /etc/passwd File Contents\n\nAny user can read\
    \ this file, but only root has read and write permission for it. This file is\
    \ composed of the following colon-separated device user information:\n\n1. Field\
    \ Username\n2. Field of Password\n   - In this sector, a 'x' indicates that the\
    \ encrypted password is stored in the file /etc/shadow.\n3. Amount of User ID\
    \ (UID)\n4. Community ID number of the user (GID)\n5. Fields of additional details,\
    \ such as the full user or comment name (GECOS)\n6. Absolute direction of the\
    \ home directory of users\n7. The user's login shell\n\n## Pi Safe Shutdown\n\n\
    Pulling your Raspberry Pi’s power will lead to picture corruption and other problems\
    \ that can damage your Pi! We will build a small push button in this article that\
    \ will act as an option for 'Safe-Shutdown'. Using the GPIO pins and some jumper\
    \ wires, we will link it to our Raspberry Pi, and with a few lines of code, we\
    \ will have our own power switch!\n\nNext, we're going to look at how to wire\
    \ a button to the Pi GPIO connector in an easy way. Then we are going to write\
    \ a python script that will securely shut down the Pi. Setting up the Pi so that\
    \ the button will work all the time will be the final step. Let's get rolling!\n\
    \nYou will need:\n\n- Raspberry Pi B+ (Any Pi will work, just make sure the GPIO\
    \ pins are checked)\n- Tactile switches\n- Jumper Wire Packs for Female / Male\
    \ Extensions\n- Solderless Boards of Bread\n\n### The Circuit\n\nWe're going to\
    \ wire the button to GPIO Pin 26 (yellow wire) and ground (green wire) to do this.\
    \ This configuration is called an Active Low button, which means that it will\
    \ have no voltage or low logic when the button is pressed. On its GPIO pins, the\
    \ Pi has pull-up resistors, so active low wiring means we do not need to install\
    \ an external resistor.\n\nWith the wiring here, make sure you are extremely careful,\
    \ as shortening the wrong pins together will destroy your Pi. This is why I've\
    \ got a Pi-shaped coaster now.\n\nThe three external libraries we will use:\n\n\
    The gpiozero library button module offers quick access to the programming of the\
    \ GPIO on the Pi. It is the library of time, so we can wait in human time.\n\n\
    The OS library gives us the power to shut down the Pi (you can also run any terminal\
    \ commands using this library!).\n\nWe first build an object with a button that\
    \ enables us to interact with the button. In our case, we'll give this feature\
    \ the GPIO number input that we connected the button to 26. This feature assumes\
    \ active low buttons by nature, so we do not need to alter anything else.\n\n\
    We want this software to run all the time, so that it will still work when we\
    \ click the button after a week-long retro gaming session. To do this, we build\
    \ a true loop that will run indefinitely.\n\nInside the loop, *if* statements\
    \ first detect a button (we have two), then activate the code to wait for a second,\
    \ then check to see if the button is still holding down.\n\nThe last line tells\
    \ the loop to wait a second until the button is tested again, so we're not in\
    \ a hurry, so we can wait for the buttons. Make sure that you include this wait\
    \ without python running this script as quickly as possible and putting an unwanted\
    \ load on the CPU.\n\n## Chapter Four\n\n### Setting Up the Troubleshooting\n\n\
    From experience, each model of the Raspberry PI (and operating system) has its\
    \ own peculiar problems and corrections, so I will presume that you are using\
    \ a Raspberry Pi 3 and running the latest version of the Raspbian stretch OS to\
    \ keep things reasonably normal for this chapter.\n\n**All set? Let's dive inside!**\n\
    \n1. Issues with Boot\n\nThis may be attributed to quite a variety of variables.\
    \ The Red LED (power LED) is usually indicated by \"ON\" while the green (activity\
    \ LED) is either \"OFF\" or permanently \"on.\"\n\n*The Solution:*\n\nComputer\
    \ operation is reflected by the green light on the Raspberry Pi, so when it is\
    \ blinking at intervals, it indicates the Pi is running. Therefore, the first\
    \ place you can search whether it's off or not flickering is where the Pi's program\
    \ is housed: the slot for the SD card. Ensure the proper insertion of the SD card.\
    \ If things don't improve, search the SD card to make sure the OS has flashed\
    \ correctly and the files on it aren't corrupted.\n\nI typically just format the\
    \ SD card in situations like this, and flash it with the OS again. Upload it into\
    \ a PC and copy it out before formatting if you have data that you would like\
    \ to retain on the SD card.\n\n2. NOOBS OS Stuck on the splash show"
  mdcn: "外部存储允许用户以相对较低的成本，独立于设备的主存储或主内存来存储数据。它无需拆解设备即可扩展存储空间。\n\n外部存储主要用于存储那些在台式机、笔记本电脑、服务器或移动设备（如Android或iOS智能手机或平板电脑）上运行的程序访问频率较低的信息。\n\
    \n用于个人电脑的外部存储设备通常由通过USB或FireWire连接或无线连接的固定式或便携式硬盘驱动器（HDD）或固态驱动器（SSD）组成。\n\n外部存储设备可以作为通过以太网或光纤通道交换机连接到服务器的主存储，用于企业环境；也可以作为用于备份和归档目的的辅助存储。外部存储提供基于块、基于文件或基于对象的存储HDD、全闪存和混合存储阵列，或这三种协议的组合，称为统一存储。外部存储的示例包括用于块级存储的存储区域网络（SAN）和用于基于文件存储的网络附加存储（NAS）系统。\n\
    \n在本地和异地计算机系统之间传输数据是外部存储单元的另一个常见用途。\n\n当向云端传输海量数据时，提供商也会使用外部存储设备，这种做法称为云播种。由于通过网络传输数十太字节的数据可能需要数小时或数天，客户会将数据放在外部存储设备上，并将设备发送给他们首选的提供商进行本地复制。在初始播种之后，只有修改过的数据才会通过网络传输到云端，用于备份、归档或灾难恢复（DR）目的。\n\
    \n## 新用户账户创建\n\n在安装后首次使用您的Red Hat Enterprise Linux框架时，您有机会使用设置代理创建一个或多个用户账户。如果您尚未创建至少一个账户（不包括root账户），现在可以这样做。为了避免在root账户中进行日常活动，您可以创建普通账户。\n\
    \n创建新的和/或附加用户账户有两种方式：从shell提示符或使用图形用户管理器程序。\n\n要使用用户管理器以图形方式创建用户账户：\n\n1. 从面板（面板上的主菜单）中选择应用程序\
    \ => 设备设置 => 用户和组。您也可以通过在shell提示符下输入`redhat-config-users`来启动用户管理器。\n2. 如果您未以root身份登录，系统将提示您输入root密码。\n\
    3. 窗口应该可见。点击用户连接。\n\n## 软件安装与卸载\n\n用户是可以在系统中用于登录的账户。每个用户通过唯一的标识号或UID被系统识别。所有设备用户信息都存储在`/etc/passwd`文件中。用户的哈希密码存储在`/etc/shadow`文件中。\n\
    \n根据访问权限的程度，用户可以分为两类：\n\n1. 超级用户/root/管理员：可以访问服务器上的所有文件。\n2. 普通用户：访问权限受限。\n\n\
    创建新用户时，系统默认执行以下操作：\n\n- 为用户分配一个UID。\n- 创建`/home/`主目录。\n- 将用户的默认shell设置为`/bin/sh`。\n\
    - 创建一个以用户名本身命名的私有用户组。\n- 将`/etc/skel`的内容复制到当前用户的主目录。\n- 将`.bashrc`、`.bash_profile`和`.bash_logout`复制到新用户的主目录。这些文件包含用户的会话环境变量。\n\
    \n## /etc/passwd文件内容定义\n\n任何用户都可以读取此文件，但只有root具有读写权限。此文件由以下冒号分隔的设备用户信息组成：\n\n\
    1. 用户名字段\n2. 密码字段\n   - 在此字段中，'x'表示加密密码存储在`/etc/shadow`文件中。\n3. 用户ID（UID）数量\n\
    4. 用户的组ID号（GID）\n5. 附加详细信息字段，例如全名或注释名（GECOS）\n6. 用户主目录的绝对路径\n7. 用户的登录shell\n\n\
    ## 树莓派安全关机\n\n直接拔掉树莓派的电源会导致图像损坏和其他可能损坏您的树莓派的问题！在本文中，我们将构建一个小型按钮，作为“安全关机”的选项。我们将使用GPIO引脚和一些跳线将其连接到我们的树莓派，并通过几行代码，我们将拥有自己的电源开关！\n\
    \n接下来，我们将研究如何以简单的方式将按钮连接到树莓派GPIO连接器。然后，我们将编写一个python脚本来安全地关闭树莓派。最后一步是设置树莓派，使按钮始终有效。让我们开始吧！\n\
    \n您将需要：\n\n- 树莓派B+（任何型号都可以，只需确保检查GPIO引脚）\n- 触觉开关\n- 公/母延长线跳线包\n- 无焊面包板\n\n###\
    \ 电路\n\n为此，我们将把按钮连接到GPIO引脚26（黄线）和地线（绿线）。这种配置称为低电平有效按钮，这意味着当按钮被按下时，它将没有电压或低逻辑电平。树莓派在其GPIO引脚上有上拉电阻，因此低电平有效布线意味着我们不需要安装外部电阻。\n\
    \n在进行此处的布线时，请务必极其小心，因为错误地短接引脚会损坏您的树莓派。这就是为什么我现在有一个树莓派形状的杯垫。\n\n我们将使用的三个外部库：\n\n\
    `gpiozero`库的按钮模块提供了对树莓派GPIO编程的快速访问。它是`time`库，因此我们可以按人类时间等待。\n\n`os`库赋予我们关闭树莓派的能力（您也可以使用此库运行任何终端命令！）。\n\
    \n我们首先创建一个带有按钮的对象，使我们能够与按钮交互。在我们的例子中，我们将把这个功能的GPIO编号输入设置为我们连接按钮的26号引脚。此功能默认假设为低电平有效按钮，因此我们不需要更改其他任何内容。\n\
    \n我们希望这个软件始终运行，这样即使在一周的复古游戏会话后点击按钮，它仍然有效。为此，我们创建一个无限循环。\n\n在循环内部，*if*语句首先检测按钮（我们有两个），然后激活代码等待一秒钟，然后检查按钮是否仍然被按住。\n\
    \n最后一行告诉循环在再次测试按钮之前等待一秒钟，这样我们就不会匆忙，可以等待按钮。确保包含此等待，以免python尽可能快地运行此脚本并给CPU带来不必要的负载。\n\
