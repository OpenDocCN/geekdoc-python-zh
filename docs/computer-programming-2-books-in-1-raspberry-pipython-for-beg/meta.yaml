    As you have seen in these examples, the parentheses () are also a metacharacter
    and are used to group terms and specify the order of operations. The expression
    “(01) * 0” is not the same as the expression “01 * 0”. The first corresponds to
    the words 0, 010, 01010, 0101010 and others while the second corresponds to the
    words 00, 010, 0110, 01110 ...


    These are the most common metacharacters that you will find when working with
    regular expressions, although there are more. It is important to note that the
    syntax may vary a bit depending on the language and the context in which they
    are applied. Metacharacters can be combined to form more complex expressions.
