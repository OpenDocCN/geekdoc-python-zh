    - 存储板上的SD、MMC、SDIO卡槽

    - Linux操作系统

    - 全高清Broadcom BCM2835 SoC多媒体处理器

    - 尺寸8.6cm*5.4cm*1.5 cm


    ## 树莓派B型板


    树莓派是Broadcom BCM2835 SOC（片上系统板）。包括700 MHz、512 MB SDRAM和ARM1176JZF-S核心CPU。树莓派板的USB
    2.0端口仅使用外部数据访问选项。树莓派B型中的以太网是与其他设备和互联网互连的主要网关。它从微型USB适配器获取电源，最小范围为2.5瓦（500 mA）。高级图形芯片旨在加速图像计算的处理。它设计有Broadcom视频核心IV线缆，如果您想让树莓派运行游戏和视频，这很有帮助。


    ## 设置并启动您的树莓派


    树莓派板随附SD卡。此插槽允许我们插入SD卡，我们的计算机可以使用它。SD卡是树莓派板的关键存储单元，就像个人计算机的硬盘一样。您打算使用的可启动Linux操作系统被加载到卡中。树莓派支持Linux、Qtonpi、ARM和Mac操作系统。可以选择一个ISO；您需要使用程序磁盘管理器将其写入SD卡。也可以使用其他存储机制，例如外部USB硬盘或USB驱动器。市场上有多种品牌的SD卡，有各种尺寸。树莓派支持最大64
    GB的SD卡。


    在启动树莓派之前，您需要像PC一样连接显示器、键盘、鼠标。它支持三种不同的输出，例如HDMI视频、复合视频和DSI视频，其中DSI视频需要一些特殊硬件。购买树莓派板时，可以附带或不附带SD卡出售。这是树莓派板非常重要的规格。因为它保留了操作系统、记录和服务。如果SD卡没有随您的树莓派一起提供，那么您可以获得的最小尺寸是4
    GB。


    树莓派的好处是它体积小，并且可以在低成本服务器上像普通机器一样管理网络流量。


    ## 树莓派的应用


    在许多应用中，例如视频流媒体、街机机器、平板电脑、家庭自动化、汽车计算机、互联网广播、机器人动力、宇宙计算机、陨石猎人、咖啡，都使用了树莓派板。


    ## 基于树莓派的电机速度控制


    该项目的主要目标是使用树莓派来调节直流电机的速度。


    ## 硬件和软件要求


    直流发动机、树莓派型号、电视或PC显示器、IC发动机驱动器、LED、电阻器、电容器、二极管、变压器、稳压器和PHP程序/线缆pi。


    ## 基于树莓派的电机速度控制框图


    为了监控直流电机速度，该项目使用树莓派板。直流电机的速度与其端子上施加的电压成正比。当电机端子上的电压变化时，速度也会相应变化。为了通过按键以不同速度运行发动机，必须将键盘连接到树莓派板。


    根据软件，PWM（脉宽调制）在输出处激活，并且可以使用PHP/wiring pi进行编程。平均电流和电压根据占空比变化，因此直流电机速度也会变化。为了接收PWM信号并将所需的输出发送到直流发动机，将电机驱动器IC连接到板上。


    ## 使用树莓派，路灯的自动强度监控


    该项目的主要目标是使用树莓派来监控路灯的自动强度。


    ### 硬件和应用要求：


    变压器、二极管、电容器、电阻器、LED、树莓派框架、电视或PC显示器、白色LED、MOSFET、晶体、PHP或Wiring Pi软件。


    该项目使用许多LED作为路灯，耗电较少。与HID灯相比，LED的寿命也更长。为了调节强度，使用树莓派生成脉宽调制信号，驱动MOSFET以开启LED，从而实现所需的操作。


    LED的强度从晚上到第二天逐渐变化，特别是在高峰时段，光强度最大，然后逐渐降低灯光强度。在树莓派软件中，通过脉宽调制技术实现MOSFET开关，以在LED上提供可变电压。


    ## 以树莓派为重点的项目列表


    - 树莓派可编程顺序切换

    - 基于树莓派的太阳能路灯

    - 同步和圣诞灯音乐

    - 树莓派可穿戴供电设备

    - 树莓派家庭自动化

    - 平板电脑触摸屏

    - 使用Zigbee通信的以树莓派为重点的工业自动化

    - 乐高树莓派外壳

    - 树莓派作为FM发射器

    - 基于树莓派的蓝牙控制自主机器人臂控制'
