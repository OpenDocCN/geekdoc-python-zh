    to review each variable in different values until we find the culprit. I make
    a reflection: What if those variables were never modified? Or, being more practical,
    what if we create a new constant for each modification? What if... I tell you
    that at the performance level... it is more efficient? It is a very interesting
    concept to apply.

    - Lazy evaluation (not strict): In functional programming, we can work with expressions
    that have not been evaluated, or in other words, we can have variables with operations
    whose result is not yet known. This is called loose screening. One side effect
    is increased performance, and another is that we can do crazy things like doing
    calculations with very complex operations or infinite lists without doing calculations.
