  md: '# # Welcome to Python


    Hi! This book is made for all those people who like to work with computers and
    who want to enter this world at a deeper level through the programming language,
    which is the means of communication between us and the technology that we use.
    allows to eliminate the barriers between the digital world and ours, taking control
    through orders, consecutive actions, data and algorithms that control the physical
    and logical behavior of a machine. Programming possibilities are unlimited. We
    can observe it from something as every day as the apps on our cell phone to incredible
    creations in robotics and artificial intelligence. If you are reading this, it
    is because you have discovered the potential that programming has as a professional
    career in a world that, due to various circumstances.


    # ## Advantages of Becoming a Programmer


    If you are here out of curiosity, because you have already found some information
