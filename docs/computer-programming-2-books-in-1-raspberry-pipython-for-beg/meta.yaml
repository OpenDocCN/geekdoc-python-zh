    \ 'Student' object has no attribute '_secret'\n```\n\n## Functional Programming\n\
    \nFor a few years, it has become fashionable to work with functional programming\
    \ as if the new generations had re-discovered the advantages over object-oriented\
    \ programming or began to become aware of the limitations in their way of working.\n\
    The principles of functional programming are as follows:\n\n-   **Using functions**:\
    \ As the name suggests, everything is built through functions. This way of working\
    \ is not only simple, orderly, clear, easy to test, but it is also a practice\
    \ that great military figures such as Julius Caesar and Napoleon have used. No,\
    \ they did not use Python (at least there is no record of it), but they applied\
    \ the concept of: \"divide and conquer.\" And functional programming uses this\
    \ strategy for just about everything.\n-   **First-class features**: Functions\
    \ are treated as one more variable. They can even be returned.\n-   **Pure functions**:\
    \ Fully predictive, the same input data will produce the same output data. You\
    \ can override the input parameter without disturbing the flow of the program.\n\
    -   **Recursion**: Functions can call themselves, simplifying tasks such as traversing\
    \ data trees or managing controlled loops.\n-   **Immutability**: There are no\
    \ variables, only constants. Personally understanding its potential and putting\
    \ it into practice was like resetting my brain; I had to re-learn how to use a\
    \ variable. Anecdote aside; Where does software usually fail? In the vast majority\
    \ of cases, it comes from a variable that has been changed. This causes a block\
    \ of code to be executed with conditions unforeseen. It is necessary to review\
    \ each variable in different values until we find the culprit. I make a reflection:\
    \ What if those variables were never modified? Or, being more practical, what\
    \ if we create a new constant for each modification? What if... I tell you that\
    \ at the performance level... it is more efficient? It is a very interesting concept\
    \ to apply.\n-   **Lazy evaluation (not strict)**: In functional programming,\
    \ we can work with expressions that have not been evaluated, or in other words,\
    \ we can have variables with operations whose result is not yet known. This is\
    \ called loose screening. One side effect is increased performance, and another\
    \ is that we can do crazy things like doing calculations with very complex operations\
    \ or infinite lists without doing calculations. How is this possible? Because\
    \ you work with mathematical expressions, the value is only calculated when you\
    \ need it, for example, when performing a print.\n\nWhy use functional programming?\
    \ Functional techniques facilitate the creation of concurrences, help us to reduce\
    \ problems since the variables are constant and immutable so that we will not\
    \ observe the programming error derived from the \"Mutable global state.\" Likewise,\
    \ testing is a faster process because by knowing what parameters to give to a\
    \ function, we can know what results to expect. Functional programming is not\
    \ exclusive. It is combined in an excellent way with imperative and object-oriented\
    \ programming. Since version 3 of Python, this language has adopted native tools.\
    \ Finally, we will obtain a compliant code that is easy to assimilate and read\
    \ since it is more comfortable to understand a function than the structuring of\
    \ an object.\n\nBefore starting with examples, it is worth knowing some of the\
    \ modules that facilitate functional programming in Python. Among them, we can\
    \ find the following:\n\n-   **Intertools**: This module comes already installed\
    \ with the official distribution of python; it provides us with a large number\
    \ of tools to facilitate the creation of iterators.\n-   **Operator**: We will\
    \ also find this module already installed with Python, in which we will be able\
    \ to find the main operators of Python turned into functions.\n-   **Functools**:\
    \ Also already included within Python, this module helps us create Higher-order\
    \ functions, that is, functions that act on or return other functions.\n-   **Fn**:\
    \ This module, created by Alexey Kachayev, gives Python additional \"batteries\"\
    \ to make the functional style of programming much easier.\n-   **Cytoolz**: This\
    \ module, created by Erik Welch, also provides several tools for Functional programming,\
    \ specially oriented to data analysis operations.\n-   **Macropy**: This module,\
    \ created by Li Haoyi brings to Python characteristics of purely functional languages,\
    \ such as pattern matching, tail call optimization, Y case classes.\n\nPython,\
    \ without being a purely functional language, includes several characteristics\
    \ taken from functional languages such as higher-order functions or lambda functions\
    \ (anonymous functions)."
  mdcn: "如果任何父类中存在同名且参数数量相同的方法，那么这些类会覆盖其右侧类中方法的实现。在下面的例子中，由于 `Terrestrial` 类更靠左，因此该类的\
    \ `displacement` 定义将优先，所以如果我们调用 `Crocodile` 类型对象的 `displace` 方法，打印出的将是“The animal\
    \ walks”：\n\n```\nclass Ground:\n    def move(self):\n        print(\"The animal\
    \ walks\")\n\nclass Aquatic:\n    def move(self):\n        print(\"The animal\
    \ swims\")\n\nclass Crocodile(Ground, Aquatic):\n    pass\n\nc = Crocodile()\n\
    c.move()\n```\n\n## 多态\n\n它意味着具有多种形式的能力。一个操作可以在不同的实例中表现出不同的行为。行为取决于操作中使用的数据类型。多态在继承的应用中被广泛使用，因为派生类的对象同时也是父类的对象，因此在需要父类对象的地方，也可以使用子类的对象。\n\
    \n在 Python 中，由于不需要显式指定函数接收的参数类型，函数天然就是多态的。当一段代码中调用了可以在不同类中重新定义的方法时，这段代码就是多态的。\n\
    \n使用多态，我们可以调用不同对象的相同方法，并根据它们的类获得不同的结果。这意味着我们可以调用一个与另一个完全相同的方法，解释器会自动根据各种参数检测我们指的是哪一个，例如，调用时作为参数传递的数据类型、它所属的类，或者我们甚至可以指定我们指的是哪个方法。多态是程序员在处理许多对象和方法时的一种组织和良好实践。\n\
    \n它允许开发者不必编写、思考和记住许多不同的方法名称，而是可以调用与其他方法同名的适当对象的方法。\n\n多态使用非常频繁，甚至超出了我们的意识。请记住，在\
    \ Python 中，一切都是对象，这使得即使不借助类，我们也极有可能使用多态。例如，仅 `print()` 函数就能打印各种类型的对象，而无需我们指定任何内容，这同样得益于\
    \ Python 的一个称为“动态类型”的特性。\n\n## 方法重载\n\n在 Python 中，方法重载本身并不存在。那些来自 Java 等其他语言的人可能会感到困惑，因为这在该语言中非常常见。在\
    \ Python 中，重载是荒谬的，尽管有人写过文章声称它是“任何语言中的良好实践”。\n\n方法重载指的是在同一类中拥有多个同名不同方法的做法。这样，解释器或编译器就能通过作为参数传递的数据类型来区分它们。\n\
    \n在 Python 中，这种编程语言特有的动态性导致了冲突，因为我们不知道我们指的是哪种类型的变量。虽然可以模拟重载，但我们将跳过这种做法，因为它虽然有效，但却是荒谬且不必要的。在\
    \ Python 中，不应该有两个同名的方法，也不应该用不同类型的参数调用同一个方法。\n\n## 封装\n\n编程中的封装是与面向对象编程相关的概念，指的是将类的内部状态隐藏起来，不对外暴露。换句话说，封装就是使类的属性或方法对外部不可访问或修改，只有对象本身才能访问它们。\n\
    \n在 Python 中，没有访问修饰符，通常的做法是通过名称来确定对变量或函数的访问权限：如果名称以两个下划线开头（并且不以两个下划线结尾），则它是私有变量或函数；否则就是公共的。名称以两个下划线开头和结尾的方法是特殊方法，Python\
    \ 会在某些情况下自动调用它们：\n\n```\nclass Student():\n    def __init__(self, name=\"\"):\n\
    \        self.name = name\n        self._secret = \"asdasd\"\n\na1 = Student(\"\
    Josheph\")\na1._secret\n```\n\n```\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nAttributeError: 'Student' object has no attribute\
    \ '_secret'\n```\n\n## 函数式编程\n\n近年来，函数式编程变得流行起来，仿佛新一代人重新发现了它相对于面向对象编程的优势，或者开始意识到其工作方式的局限性。\n\
    函数式编程的原则如下：\n\n-   **使用函数**：顾名思义，一切都是通过函数构建的。这种工作方式不仅简单、有序、清晰、易于测试，而且也是像尤利乌斯·凯撒和拿破仑这样的伟大军事人物所使用的实践。不，他们没有使用\
    \ Python（至少没有记录），但他们应用了“分而治之”的概念。而函数式编程几乎将这种策略用于所有事情。\n-   **一等公民特性**：函数被视为另一个变量。它们甚至可以被返回。\n\
    -   **纯函数**：完全可预测，相同的输入数据将产生相同的输出数据。你可以覆盖输入参数而不干扰程序的流程。\n-   **递归**：函数可以调用自身，从而简化诸如遍历数据树或管理受控循环等任务。\n\
    -   **不可变性**：没有变量，只有常量。就个人而言，理解其潜力并付诸实践就像重置了我的大脑；我不得不重新学习如何使用变量。题外话；软件通常在哪里出错？在绝大多数情况下，它源于一个被改变的变量。这导致代码块在未预见的条件下执行。需要检查每个变量的不同值，直到找到罪魁祸首。我反思：如果这些变量从未被修改过会怎样？或者，更实际一点，如果我们为每次修改创建一个新的常量会怎样？如果……我告诉你，在性能层面……它更高效？这是一个非常有趣的概念，值得应用。\n\
    -   **惰性求值（非严格）**：在函数式编程中，我们可以处理尚未求值的表达式，换句话说，我们可以拥有结果尚未可知的运算的变量。这称为宽松筛选。一个副作用是提高了性能，另一个是我们可以做一些疯狂的事情，比如用非常复杂的操作或无限列表进行计算而不进行实际计算。这怎么可能？因为你处理的是数学表达式，值只在你需要时才计算，例如，在执行打印时。\n\
    \n为什么使用函数式编程？函数式技术有助于创建并发，帮助我们减少问题，因为变量是常量且不可变的，因此我们不会观察到源于“可变全局状态”的编程错误。同样，测试是一个更快的过程，因为通过知道给函数什么参数，我们可以知道期望什么结果。函数式编程不是排他的。它与命令式和面向对象编程结合得非常好。自\
    \ Python 3 版本以来，该语言已经采用了原生工具。最后，我们将获得一个易于理解和阅读的规范代码，因为理解一个函数比理解一个对象的结构更舒适。\n\n\
    在开始示例之前，值得了解一些有助于 Python 中函数式编程的模块。其中包括：\n\n-   **Intertools**：此模块已随 Python 官方发行版安装；它为我们提供了大量工具来简化迭代器的创建。\n\
    -   **Operator**：我们也会发现此模块已随 Python 安装，其中我们可以找到 Python 的主要运算符转换为函数。\n-   **Functools**：同样已包含在\
    \ Python 中，此模块帮助我们创建高阶函数，即作用于或返回其他函数的函数。\n-   **Fn**：此模块由 Alexey Kachayev 创建，为\
    \ Python 提供了额外的“电池”，使函数式编程风格变得容易得多。\n-   **Cytoolz**：此模块由 Erik Welch 创建，也为函数式编程提供了几个工具，特别面向数据分析操作。\n\
    -   **Macropy**：此模块由 Li Haoyi 创建，为 Python 带来了纯函数式语言的特性，例如模式匹配、尾调用优化、Y case 类。\n\
    \nPython 虽然不是纯粹的函数式语言，但包含了从函数式语言中借鉴的几个特性，例如高阶函数或 lambda 函数（匿名函数）。"
