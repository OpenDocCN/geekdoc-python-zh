    # Why Choose Python?


    Let''s start by understanding why we choose the programming language that we will
    be learning. Python 32 is a high-level, clean, elegant, agile, and simple programming
    language. Unlike many of the great successes that exist in the market, Python
    was created by Guido Van Rossum, who developed all the components of this language
    but does not alone receive the merit of what we have today, as thousands of programmers
    and other anonymous professionals have contributed to its improvement and expansion.
    The creation of Python occurred under these circumstances according to the words
    of the creator himself:'
