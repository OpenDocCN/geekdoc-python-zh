  - '[PAGE 141]


    # Finishing the configuration


    You will see the Welcome to Raspberry Pi pop-up when you launch your Raspberry
    Pi 4 for the first time. This will lead you into the initial configuration.


    To start the setup, click ''Next,'' then set the country, language, and time zone.
    Once again, press ''Next.'' Insert a new password. Connect to a WiFi network by
    choosing its name and entering a password. Allow the wizard to search for and
    install updates. This can take a little while. To complete the setup, press Done
    or Restart.


    # The Apps


    I hope you''ve grasped the setup of the Raspberry Pi 4 by now. Now let us take
    a look at some of this device''s cool uses.


    +   1. Motion Camera Stop


    You know everyone''s in love with stop motion. A Raspberry Pi 4 and a dedicated
    camera module will be needed to build your digital stop motion camera.


    The creation process of a camera is time-consuming. You''ll need a Python, a tripod
    camera, and a well-lit area. It will need time and practice for satisfactory performance.


    To mount a button, you will need a breadboard (unless you already have an appropriate
    plunger button that can be attached to the GPIO of the Raspberry Pi), and a Python
    script to snap each file.


    +   2. Server on the Internet


    Yeah, your Raspberry Pi 4 can now be configured to host a website. It can also
    host your blog.


    There are two ways for this to be done. Install both Apache and its related libraries.
    Or create a full LAMP stack, alongside Apache, with PHP and MySQL. It is recommended
    to set up an FTP.


    You can add the HTML files to the \www\ directory once these steps are completed,
    and your web server is ready. Or a particular website like WordPress can be installed.'
  - '[PAGE 142]


    # 3. Monitoring platform for networks


    Do you want the devices on your network to be monitored? Are you thinking about
    connectivity shortages?


    The best approach for you, then, is to develop a tool for network monitoring.
    On the internet, there are many instruments available. One of the best software
    is the Nagios tool, which is simple to install and run. You can easily monitor
    the uptime and display the visualization of the connected devices with the Nagios
    tool. Simply flash your disk image onto the SD card mounted on your Raspberry
    Pi 4 to use it.


    # 4. Live YouTube video streaming


    Live streaming on YouTube is another way to take advantage of a Raspberry Pi 4.


    A compatible USB camera is required for live streaming.


    Get ready with your YouTube channel built with the libav-tools kit. There is a
    comprehensive tutorial available on the Raspberry Pi 4 for streaming a video live
    on YouTube. You can visit it for specific directions.


    # 5. Learn how to code


    One of its main motivations was to teach kids to code when this device was initiated
    in 2012. It is not just youngsters, however, who can learn to code. The in-built
    coding tools available on the Raspberry Pi 4 can also be used by adults and seniors.


    In Raspbian, there are many pieces of software available which provide fundamental
    programming skills. The most important, however, is Scratch.


    Scratch is a block-based programming tool designed to accommodate all levels,
    which avoids the complexities of code line input. You simply drag the commands
    into place, instead. In the code view, you can see the impact of your commands
    and export the code as a program to be run.'
  - '[PAGE 143]


    Scratch is sufficiently easy to control the lights mounted in the GPIO of the
    Pi and sufficiently complex to program basic games.


    The Raspberry Pi system looks like a motherboard, exposed to the installed chips
    and ports (something you would expect to see if you opened your computer and looked
    at its internal boards), but it has all the components you need to connect and
    start computing input, output, and storage devices.


    # The different components on the Raspberry Pi board:


    ARM CPU / GPU — This is a SoC (Broadcom BCM2835 System on a Chip) consisting of
    a central processing unit (CPU) for ARM and a graphics processing unit (GPU) for
    Videocore 4. All computations that make a machine work (taking input, doing calculations,
    and generating output) are done by the CPU and the GPU handles the output of graphics.


    +   - GPIO — These are general-purpose input / output link points that allow the
    opportunity for real hardware hobbyists to tinker.

    - RCA — An RCA jack enables analog TVs and other similar output devices to be
    paired.

    - Audio output — For connecting audio output devices such as headphones or speakers,
    this is a regular 3.55-millimetre jack. There''s no audio going in.

    - LEDs — Light-emitting diodes for all the light requirements of your indicator.

    - USB — This is a standard peripheral computer communication port of all types
    (including your mouse and keyboard). Model A has one, and there are two for Model
    B. If it has its own USB port, you can use a USB hub to extend the number of ports
    or plug your mouse into your keyboard.

    - HDMI — This connector allows you to use an HDMI cable to link up a high definition
    television or other compatible unit.

    - Power — This is a 5v Micro USB power supply connector that can be attached to
    your compatible power supply.'
  - '[PAGE 144]


    +   - SD Cardslot — This is a full-sized slot for your SD card. You need an SD
    card with an operating system (OS) to boot the device. They are available from
    the manufacturers for purchase, but if you have a Linux machine and the wherewithal,
    you can also download an OS and save it to the card yourself.

    - Ethernet — This adapter allows access to the wired network and is available
    on Model B only.


    Many of the missing features, such as WiFi and audio, can be added as required
    by using the USB port(s) or a USB hub.


    # The computer itself and its operating systems


    The Raspberry Pi measures approximately 3.4 inches by 2.1 inches (8.6 centimeters
    by 5.3 centimeters), but for such a tiny unit, it''s very strong. The ready availability
    of cheap and compact processors for mobile devices, which need to cram a reasonable
    amount of processing and multimedia capacity into a small shell with the ability
    to remain relatively cool and not suck power too quickly, made this possible.


    For this purpose, the foundation selected a chip with an ARM architecture (a processor
    architecture widely used for cell phones and similar devices). The chip has a
    RAM of 256 MB, runs at 700 MHz and includes a GPU that is 1080p capable. Although
    there are other ARM chips available, in part because of Eben Upton''s relationship
    with the business (he works for them), the group preferred a Broadcom chip. The
    ability of Broadcom to offer a bulk rate for small orders enables the foundation
    to get a much better price on this chip than on the processor of any comparable
    competitor.


    The unit comes without peripherals or internal storage space, like many of the
    earliest home computers, and the user will have to connect peripherals for input,
    output, and storage. You''ll need at least an output TV or display, an input keyboard
    (and probably a mouse), an SD card to hold the OS and store data, a power supply,
    and any necessary cables. For extra storage, you can connect an external hard
    drive, but it will also require an SD card, as the OS will boot from SD by default.'
  - '[PAGE 145]


    The device''s compatible operating systems are all Linux distributions. For its
    low memory overhead, Linux was chosen at least partially, making it possible to
    run a fully functioning OS on such a simple computer that is devoid of permanent
    storage built-in. As a CS learning tool, Linux is also usually free and has great
    potential, because its releases come with some already installed programming languages.


    As developers hop on the bandwagon to provide material, the open-source nature
    of Linux will help in the proliferation of applications. The Raspberry Pi Foundation’s
    original goal was to build both the system and the learning curriculum around
    it, but the organization chose to scale its scope down, focus on developing the
    machine and let software be developed by an enthusiastic and willing open-source
    programming community.


    The programmability and simplicity of the Raspberry Pi make it similar to the
    computers of yesteryear that spawned so many programmers and machine hobbyists.
    But this system can be used for Web browsing, unlike these computers. The Internet
    makes it easier to find things to do with the computer than back in the day. On
    the Raspberry Pi web, there is an online user forum, and tutorials and other materials
    are easily accessible. Of course, to enable network connectivity, you will need
    either a Model B Ethernet Connector or an external WiFi system connected via USB.


    # Distributions of Linux for Raspberry Pi


    With the Debian Squeeze, Arch Linux ARM and Fedora 14 Remix distributions, the
    Linux OSs available for the Raspberry Pi are continuously developing. But the
    four versions of Linux available for download from the Raspberry Pi site as of
    August 2012 are:


    +   - Raspbian Wheezy — Debian Wheezy is an unofficial port. This is the preferred
    operating system for Linux beginners. It has a graphical GUI for the LXDE GUI,
    a Web browsing Midori browser, various programming tools, and source code examples.

    - Debian Wheezy soft-float — Almost similar to Raspbian Wheezy, this version uses
    a binary interface (ABI) soft-float application rather than Raspbian hard-float,
    slowing performance, but enabling'
- md: '## Why choose the Raspberry Pi and not anything else?


    The Raspberry Pi has a few competitors, but the foundation encourages individuals
    to clone the concept, so competitor might not be the right word. BeagleBoard and
    PandaBoard (which are both the companies'' names and their key devices) are included.
    They are also non-profit organizations, but with aims somewhat different from
    the Raspberry Pi Foundation. BeagleBoard targets adult hardware tinkerers, and
    PandaBoard aims to provide a moderately priced mobile software-programming platform.


    Like Raspberry Pi, ARM processors are both exposed boards and capable of HD video.
    But there are more connectors and link headers (board bits that can be used by
    soldering additional hardware) on BeagleBoards and PandaBoards than on the Raspberry
    Pi, and both devices are bigger. The following are not comprehensive part lists,
    but here are some characteristics that vary from Pi:


    ### BeagleBoard and BeagleBoard-xM


    - Texas Instruments Cortex A8-based processor, running on the BeagleBoard from
    600 MHz to 720 MHz (depending on version) and 1 GHz on the xM.

    - 128 MB RAM on the original BeagleBoard, but on the newer boards, 256 MB and
    512 MB RAM, respectively.

    - Connector DVI-D display

    - S-video adapter

    - Audio (not all audio out) in and out

    - One BeagleBoard USB port and four xM USB ports are included.

    - Power from USB and DC

    - No RCA or HDMI connector


    ### PandaBoard & PandaBoard ES


    - Dual-core ARM Cortex A9 MPCore processor, also manufactured by Texas Instruments,
    on the PandaBoard at 1GHz and on the ES at 1.2 GHz

    - 1 GB of RAM

    - Connector DVI-D display

    - Header for LCD expansion

    - One on-the-go USB port and two regular USB connections

    - Connectivity with WiFi and Bluetooth

    - Power from USB and DC

    - No RCA connector


    The Raspberry Pi has two advantages over the others for their intended educational
    purposes. First, it was conceived to be a full machine that functions. Insert
    an OS-containing SD card, attach the power and peripherals, and it''s ready to
    go. For initial setup, BeagleBoards and PandaBoards need to connect to a host
    device, and while they have similar processing capabilities, they need a little
    more know-how to get them fully operating.


    Secondly, the other appliances are a lot more costly than the Raspberry Pi. In
    April 2012, the two main BeagleBoard models were $125 to $149, and $174 to $182
    for the two PandaBoard models. These prices are a far cry from the Raspberry Pi''s
    $25 and $35 base prices. That''s not to suggest the other gadgets aren''t for
    you. Review the specifications and decide which computer fits your requirements
    best. The Raspberry Pi seems best placed to get computing power to the masses,
    given its functionality and price.


    Hardware aside, for those wishing to learn programming on current computers, software-based
    educational tools are available.


    ## OLPC, Sweets from Cotton, and Arduino


    Some other computers, including OLPC laptops, the Cotton Candy stick machine and
    Arduino boards, merit mention here. One Laptop Per Child (OLPC) is a charitable
    organization that seeks to provide children in developing nations with complete,
    durable, WiFi-enabled laptops. Running at 1 GHz, the XO-1.5 model has 1 GB of
    RAM and 4-32 GB of internal flash memory. It runs a specially designed Linux distribution,
    much like the Raspberry Pi.


    The Cotton Candy is a thumb-drive-sized gadget that can transform a monitor into
    your TV, like the Pi. It has a 1.2 GHz ARM Cortex-A9 processor, a high-def GPU
    ARM Mali-400MP, 1 GB of RAM, a slot for SD cards, WiFi, an HDMI port, and USB
    connectors. It runs Linux and virtualization clients for Android or Ubuntu for
    other OSs. It is intended for accessing Web or media content rather than programming
    education, unlike the Pi.


    Arduino boards are microcontroller boards with smaller quantities of memory and
    speed built in. They can be used to construct simple computers with components
    such as motors or blinking lights to operate physical devices, and can be used
    in combination with computers such as the Pi. Will anybody want to create a robot?


    ## What are the Raspberry Pi 3''s specs?


    - Chipset: Broadcom BCM2837

    - 1.2 GHz quad-core 64-bit ARM Cortex A53

    - Ethernet: 10/100 (100Mbps max throughput)

    - USB: Four USB 2.0 with data transfer of 480Mbps

    - Storage: MicroSD card or storage attached via USB

    - Wireless: 802.11n Wireless LAN (150Mbps peak transmission / receive throughput),
    Bluetooth 4.1

    - Graphics: 400MHz multimedia from VideoCore IV

    - Memory: 1 GB SDRAM LPDDR2-900

    - Expandability: 40 input-output pins for general purposes

    - Complete HDMI port

    - Audio: 3.5 mm audio output jack and composite video jack combined

    - Interface with a Camera (CSI)

    - Interface view (DSI)


    ## How can I use my Raspberry Pi 3 to get the most?


    It''s good advice to get a case to protect the Pi from harm, particularly if you''re
    going to bring the Pi elsewhere. You may also invest in a high-speed micro SD
    card, as illustrated below, if efficiency is important to you.


    Although the Pi can run a number of different operating systems, the official
    Raspbian operating system is a good option if you''re after reliability and performance,
    having been tuned to get the most out of the Pi, bundling a fast web browser and
    a decent range of office and programming applications.


    You can also go to the terminal and type ''sudo raspi-config'' if you have not
    installed the Raspbian OS using the Noobs installer and are running out of space,
    and then select the option ''Expand root partition to fill the SD card'' to ensure
    that you are using all available space on the card.


    # Chapter Two


    ## Getting Started with The Raspberry Pi


    ### Pi Drawbacks


    Whether you want to learn the Raspberry Pi''s capabilities or are a seasoned veteran,
    here are some projects that you might want to consider pitting your wits against.


    ### 1. Building a basic buggy robot


    A perfect introduction project to the Raspberry Pi world is this buggy robot.
    This project will help any amateur Pi user learn how to create a small robot with
    simple python commands that can be managed.


    You will learn:


    - How to set up an engine controller board with two engines

    - How motors can be managed using Python

    - How to make a chassis for a robot


    You will need:


    - Raspberry Pi 3

    - Board of motor controllers

    - 2 x 3V-6V DC engines

    - 2 wheels

    - Batteries and battery holders

    - Ball caster

    - Leads from the cable or jumper

    - A USB pack of batteries

    - Equipment for simple electronics


    ### 2. See like a bat


    For anyone who loves bats and Raspberry Pi, here''s yet another fun project. In
    this project, you will learn how to construct a wearable echolocation device to
    help you "see like a bat."


    You will learn:


    - How to create a potential divider

    - How to set up an ultrasonic distance sensor

    - How to calculate the range of ultrasonic pulses

    - How to power a small motor using Pulse Width Modulation (PWM)

    - Why functions can be used to overcome abstract mathematical problems


    You will need:


    - Raspberry Pi 3

    - Ultrasonic sensor of distance

    - Vibration engine

    - 1 x 1.2k (or other-see worksheet) resistor

    - 1 x Resistor of 2.2k (or other-see worksheet)

    - 1 x Breadboard Solderless

    - 6 x Leads male-to-female jumper

    - 2 x Leads from male-to-male jumper

    - 6 x jumper for female-to-female leads


    ### 3. Create a smart mirror


    You will get the opportunity to create your very own smart mirror in this project.
    When done, applications and details related to items such as the weather, local
    news, or anything you like can be shown in your new mirror.


    The project is also modular and can be moved around or hung on a wall with ease.


    You will need:


    - 1 x Raspberry Pi 3

    - 1 x Low-profile monitor (or old display)

    - 1 x 12 ft-1x2, 1 x 12 ft-1x3 Glue Wood

    - 1 x HDMI cable with low profile

    - 1 x 18-24" See-Through Acrylic Mirror, 1 mm


    ### 4. Creating an automatic gardener


    Why not get a Raspberry Pi to garden for you if you’re fed up with tending to
    your indoor plants with your precious time? You will get to do just that in this
    project.


    On completion, this project will teach you how to water and light your plants
    by creating a portable automated Raspberry Pi-powered gardener. You''ll never
    have to remember watering your domestic plants again.


    You will need:


    - 1 x Raspberry Pi Zero

    - 1 x Peristaltic 12v pump

    - White Silicone Tubing, 1/8-inch ID, 3/16-inch OD

    - 1 x 5v Grow Light

    - 2 x IRLB8721PBF MOSFET N-Channel

    - Jumper wires (generic)'
  mdcn: '## 为什么选择树莓派而不是其他产品？


    树莓派有一些竞争对手，但该基金会鼓励个人克隆这一概念，因此“竞争对手”可能不是恰当的词。BeagleBoard 和 PandaBoard（既是公司名称也是其关键设备）也包括在内。它们也是非营利组织，但其目标与树莓派基金会略有不同。BeagleBoard
    面向成年硬件爱好者，而 PandaBoard 旨在提供一个价格适中的移动软件编程平台。


    与树莓派一样，ARM 处理器都是裸露的电路板，并且能够处理高清视频。但 BeagleBoard 和 PandaBoard 上的连接器和排针（可通过焊接额外硬件使用的板载部件）比树莓派更多，而且这两种设备也更大。以下并非完整的部件列表，但列出了一些与树莓派不同的特性：


    ### BeagleBoard 和 BeagleBoard-xM


    - 德州仪器 Cortex A8 处理器，在 BeagleBoard 上运行频率为 600 MHz 至 720 MHz（取决于版本），在 xM 上为 1 GHz。

    - 原版 BeagleBoard 为 128 MB RAM，而较新的板子分别为 256 MB 和 512 MB RAM。

    - DVI-D 显示器连接器

    - S-video 适配器

    - 音频输入和输出（并非所有音频输出）

    - 包含一个 BeagleBoard USB 端口和四个 xM USB 端口。

    - 通过 USB 和直流电源供电

    - 无 RCA 或 HDMI 连接器


    ### PandaBoard 和 PandaBoard ES


    - 双核 ARM Cortex A9 MPCore 处理器，同样由德州仪器制造，在 PandaBoard 上为 1GHz，在 ES 上为 1.2 GHz

    - 1 GB RAM

    - DVI-D 显示器连接器

    - LCD 扩展排针

    - 一个 OTG USB 端口和两个常规 USB 连接

    - 支持 WiFi 和蓝牙连接

    - 通过 USB 和直流电源供电

    - 无 RCA 连接器


    对于其预期的教育用途，树莓派相比其他产品有两个优势。首先，它被设计成一台功能完整的机器。插入包含操作系统的 SD 卡，连接电源和外围设备，即可开始使用。而
    BeagleBoard 和 PandaBoard 在初始设置时需要连接到主机设备，尽管它们具有相似的处理能力，但要让它们完全运行起来需要多一点专业知识。


    其次，其他设备的成本比树莓派高得多。2012 年 4 月，两款主要的 BeagleBoard 型号价格为 125 美元至 149 美元，两款 PandaBoard
    型号价格为 174 美元至 182 美元。这些价格与树莓派 25 美元和 35 美元的基础价格相去甚远。这并不是说其他小工具不适合你。请查看规格并决定哪款计算机最适合你的需求。考虑到其功能和价格，树莓派似乎最适合将计算能力普及到大众。


    除了硬件，对于那些希望在现有计算机上学习编程的人，也有基于软件的教育工具可用。


    ## OLPC、Cotton Candy 和 Arduino


    这里还值得一提其他一些计算机，包括 OLPC 笔记本电脑、Cotton Candy 棒状设备和 Arduino 开发板。每个孩子一台笔记本电脑（OLPC）是一个慈善组织，旨在为发展中国家的儿童提供完整、耐用、支持
    WiFi 的笔记本电脑。XO-1.5 型号运行频率为 1 GHz，拥有 1 GB RAM 和 4-32 GB 内部闪存。它运行一个专门设计的 Linux 发行版，与树莓派非常相似。


    Cotton Candy 是一个拇指大小的设备，可以像树莓派一样将显示器变成你的电视。它拥有 1.2 GHz ARM Cortex-A9 处理器、高清 GPU
    ARM Mali-400MP、1 GB RAM、SD 卡插槽、WiFi、HDMI 端口和 USB 连接器。它运行 Linux 以及用于 Android 或
    Ubuntu 等其他操作系统的虚拟化客户端。与树莓派不同，它旨在访问网络或媒体内容，而非编程教育。


    Arduino 开发板是内置了较少内存和速度的微控制器板。它们可用于构建简单的计算机，使用电机或闪烁灯等组件来操作物理设备，并且可以与树莓派等计算机结合使用。有人想创造一个机器人吗？


    ## 树莓派 3 的规格是什么？


    - 芯片组：Broadcom BCM2837

    - 1.2 GHz 四核 64 位 ARM Cortex A53

    - 以太网：10/100（最大吞吐量 100Mbps）

    - USB：四个 USB 2.0，数据传输速率 480Mbps

    - 存储：MicroSD 卡或通过 USB 连接的存储设备

    - 无线：802.11n 无线局域网（峰值传输/接收吞吐量 150Mbps），蓝牙 4.1

    - 图形：来自 VideoCore IV 的 400MHz 多媒体处理

    - 内存：1 GB SDRAM LPDDR2-900

    - 可扩展性：40 个通用输入输出引脚

    - 完整的 HDMI 端口

    - 音频：3.5 毫米音频输出插孔和复合视频插孔组合

    - 摄像头接口（CSI）

    - 显示接口（DSI）


    ## 如何充分利用我的树莓派 3？


    建议购买一个保护壳来保护树莓派免受损坏，特别是如果你打算将树莓派带到其他地方。如果你注重效率，也可以考虑购买高速 Micro SD 卡，如下图所示。


    尽管树莓派可以运行多种不同的操作系统，但如果你追求可靠性和性能，官方的 Raspbian 操作系统是一个不错的选择，它经过调优以充分发挥树莓派的性能，并捆绑了快速的网页浏览器和一系列不错的办公及编程应用程序。


    如果你没有使用 Noobs 安装程序安装 Raspbian 操作系统并且空间不足，你也可以进入终端并输入 ''sudo raspi-config''，然后选择选项
    ''Expand root partition to fill the SD card''，以确保你使用了卡上的所有可用空间。


    # 第二章


    ## 树莓派入门


    ### 树莓派的缺点


    无论你是想了解树莓派的功能，还是经验丰富的老手，这里有一些你可能想挑战一下的项目。


    ### 1. 构建基础的小车机器人


    这个小车机器人是进入树莓派世界的完美入门项目。这个项目将帮助任何业余树莓派用户学习如何使用简单的 Python 命令创建一个可管理的小型机器人。


    你将学到：


    - 如何设置带有两个电机的电机控制器板

    - 如何使用 Python 控制电机

    - 如何为机器人制作底盘


    你需要：


    - 树莓派 3

    - 电机控制器板

    - 2 个 3V-6V 直流电机

    - 2 个轮子

    - 电池和电池盒

    - 万向轮

    - 电缆或跳线

    - USB 电池组

    - 简单的电子设备


    ### 2. 像蝙蝠一样看


