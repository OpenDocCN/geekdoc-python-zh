    # How to Properly Solder


    As for all DIY operations involving potentially dangerous instruments or environments,
    safety awareness in planning for soldering work should always be a top priority.
    As ever, before beginning the work, this involves ensuring that you have the correct
    PPE equipment in place. It also means ensuring that the entire environment is
