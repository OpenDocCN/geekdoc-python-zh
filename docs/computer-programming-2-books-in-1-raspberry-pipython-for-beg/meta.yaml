- md: "There are several different implementations of Python: CPython, Jython, IronPython,\
    \ PyPy, etc. CPython is the most used, the fastest, and the most mature. When\
    \ people talk about Python, they usually mean this implementation. In this case,\
    \ both the interpreter and the modules are written in C. Jython is the Java implementation\
    \ of Python, while IronPython is its C# (.NET) counterpart. By using these implementations,\
    \ it is possible to use all the libraries available to Java and .NET programmers.\
    \ PyPy, lastly, is a Python implementation of Python.\n\nInstalling Python is\
    \ very simple. How can you learn a programming language if you don't have access\
    \ to it? Python 2 tends to come pre-installed on most Apple computers, but you're\
    \ better off with Python 3. Python 2 is still used by many companies for one simple\
    \ reason: they built their websites with Python 2 years ago, and they haven't\
    \ yet updated to Python 3. Python 3 is a major update to the language, with significant\
    \ changes that make the transition from 2 to 3 very complicated. That's why many\
    \ companies that have made their page with Python 2 choose to stay with it. The\
    \ option is that, or rebuild the entire page. New websites are almost always made\
    \ with Python 3. In the next few years, companies that have stuck with Python\
    \ 2 will make the switch to Python 3, since everyone is moving to Python 3.\n\n\
    ## Installing Python on Mac OS X\n\nTo start using Python on Mac, we will first\
    \ resort to the command line. To access this terminal, we can follow two routes:\n\
    \n- Click on Spotlight and type \"Terminal.\"\n- Or, open the \"Applications\"\
    \ folder, then the \"Utilities\" folder, and finally \"Terminal.\"\n\nOnce the\
    \ terminal is open, try typing the following command and hitting the Enter key:\n\
    \n```\njot - 125\n```\n\nThis should open and print a list of all the numbers\
    \ from 1 to 25. With this, we have practiced how to use a terminal.\n\nNow we\
    \ will acquire Homebrew, a manager of packages that will allow us to install and\
    \ manage software packages written in Python.\n\nTo obtain it and leave it functional,\
    \ we will follow the steps below:\n\n1. View the page [https://brew.sh](https://brew.sh)\n\
    2. Copy the installation command indicated on the page into your terminal. It\
    \ should look something like this:\n   `/bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/master/install.sh)\"\
    `.\n3. A new text will open for you. Once this happens, press the \"Enter\" key.\
    \ This will prompt you for a password, type in your computer's password, and press\
    \ \"Enter\" again.\n4. A new text will open for you. Go to the final lines, and\
    \ if you read the text “Installation successful,” the process has been a success.\n\
    \nNow we will proceed to install Python; the steps for this will be as follows:\n\
    \n1. Type the following in your terminal:\n   `brew install python3`\n2. In the\
    \ new text that will open, the \"Summary\" line will indicate that you have finished,\
    \ and it worked.\n\nTo check that everything is indeed in order, we will carry\
    \ out a test as follows:\n\n1. Open your terminal and write the following line\
    \ to check which version you are working with:\n   `python3 --version`\n2. The\
    \ text you should see after you post the above command is as follows:\n   `Python\
    \ 3.xx`\n3. If the above text appears, it means that Python 3 is finally installed\
    \ and available to be used.\n\n## Installing Python on Windows\n\nTo get everything\
    \ ready, we will carry out three processes. The first corresponds to the Python\
    \ installation. To achieve this, we will follow the following sequence of steps:\n\
    \n1. Visit the page [https://www.python.org/downloads/](https://www.python.org/downloads/)\
    \ to install Python 3.5.2.\n2. Click on the installer to start the download.\n\
    3. Once the installation starts, be sure to click ADD Python to 3.5 paths.\n4.\
    \ Click install now. If the installation was successful, it will indicate this\
    \ phrase in the installer.\n\nThe following process corresponds to the installation\
    \ of a more suitable terminal so that we can program. Said terminal would be Git\
    \ Bash:\n\n1. Download Git & Git Bash through the page [https://git-scm.com/download/win](https://git-scm.com/download/win)\n\
    2. Accept the license.\n3. Allow it to be installed in the default folder and\
    \ do not make any changes to the configuration.\n4. A screen will appear, indicating\
    \ that the installation is complete.\n\nTo perform a test and verify that everything\
    \ is in order, you must do the following:\n\n1. Go to the start menu and open\
    \ Git Bash.\n2. Confirm that Python is available by typing: `python --version`\
    \ and hitting the Enter key.\n3. You should see the text Python 3.xx. If not,\
    \ it means you have Python 2.7 installed.\n4. If you have an older Python installed,\
    \ uninstall it and restart Git Bash. This way, you should be able to view the\
    \ previously mentioned text.\n\nNow you must install Pip, a package manager that\
    \ will allow us to install and manage software packages written in Python:\n\n\
    1. In your terminal, run the following:\n   `curl https://bootstrap.pypa.io/get-pip.py\
    \ > get-pip.py`\n2. Once done, write this other line, which will install Pip:\n\
    \   `python get-pip.py`\n\nReady! Now we have Python, a terminal, and a manager\
    \ installed.\n\n## How to Get Python Support\n\nAfter 20 years of support, Python\
    \ ended support for Python 2. On January 1, 2020, support for version 2.7 of the\
    \ Python programming language officially ended. The Python Software Foundation,\
    \ led by the language's creator, Guido van Rossum, announced that it would no\
    \ longer receive security updates and bug fixes in the future. This is not something\
    \ too serious, since the launch of its successor, Python 3, took place no less\
    \ than 14 years ago, in 2006. In fact, support for Python 2.7 should have ended\
    \ in 2015. However, the huge popularity of this version (it is still the default\
    \ version of Python on many Linux distributions) convinced the foundation of the\
    \ need to support both branches of development and to postpone the \"death\" date\
    \ of Python 2.7.\n\nThe aforementioned is yet another reason why we suggest you\
    \ learn Python 3 from scratch. However, you are never alone with either Python\
    \ 2 or Python 3 since the developer community is large and united. Great software\
    \ is supported by great people. The user base is enthusiastic, dedicated to encouraging\
    \ the language’s use, and committed to making it diverse and friendly.\n\nThe\
    \ official Python page is [https://www.python.org](https://www.python.org), which\
    \ provides all the information related to this programming language; among its\
    \ main contents, you can find:\n\n- Beginners Guide: Which is available both for\
    \ those who want to start programming from scratch (like you!), to veterans who\
    \ wish to review or update themselves on this topic.\n- Downloads: Even though\
    \ we have provided you with a very specific guide to get started, you can also\
    \ explore the Python reads and their corresponding files on the official page.\n\
    - Documentation: Here, you will find the standard library, along with additional\
    \ tutorials and guides. Knowledge is power!\n- Community: The phrase on the Python\
    \ page is, “Python community is vast; diverse & aims to grow; Python is Open.\"\
    \ It does justice to what is observed in reality. On the same official page, it\
    \ is possible to have access to the community, where you can have access to FAQs,\
    \ conferences, and support groups to solve all the doubts that may arise both\
    \ in your learning process and in your programming career. Some prominent pages\
