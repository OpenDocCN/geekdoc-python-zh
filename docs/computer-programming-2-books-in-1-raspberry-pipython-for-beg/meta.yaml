    This can be solved by formatting the SD card and ensuring that it is copied to
    the right Noob files. Try another SD card or the same SD card on a different Raspberry
    Pi if this doesn''t work. If the problem persists, installing Raspbian stretch
    or some other distro might save you more time.


    3. Could not access the Pi over SSH


    This is more of a safety feature, rather than a mistake, built into the Raspberry
    Pi stretch OS. For a Raspberry Pi running a new install of the Raspbian stretch,
    contact over SSH is disabled.


    *The Solution:*


    Under the Raspberry Pi settings, you need to enable SSH communication with the
    PI connected to the monitor, go to preferences, and then select Raspberry Pi settings.


    Select the radio button named Activated in front of SSH when the configuration
    window opens.


    If you''re running a Pi in headless mode, you''ll need to delete the SD card,
    insert it into your PC, then build an empty file called SSH, copy it to your SD
    card, and then insert the SD card back into your Raspberry Pi. You should be able
    to access your PI via SSH now.


    4. The board departs intermittently.


    This includes the rebooting of the Raspberry Pi itself at random intervals and
    often the power LED is off while the board is on.


    *The Solution:*


    This is basically a problem of control. For example, the Raspberry Pi 3 needs
    a 5V, 2.5A power supply to work properly, so anything short of that is likely
    to affect its efficiency. While I worked on the PI with 5V 1.5A, output depends
    on the task that the Pi is set to perform.'
  - '[PAGE 181]


    Essentially, check to make sure you give the Pi enough juice to remain awesome
    when this happens.


    # 5. USB Not Working


    This error describes situations where USB devices attached to the Raspberry Pi
    are either not recognized or not functioning properly by the Pi, as the tag implies.


    *The Solution:*


    There could be a bunch of stuff wrong here:


    +   1. The Raspberry Pi cannot get enough power and the USB system is therefore
    unable to power it. Ensure that your Pi is powered properly.

    2. The USB interface may be defective. To make sure it works right, test it with
    your PC or some other device.

    3. Before turning it on, attach your computer to the Pi. Although this probably
    shouldn''t be a problem, the Pi will need to do some initialization for USB devices
    such as your keyboard and mouse, particularly if you are connecting it to the
    Pi for the first time. Weird solution, but occasionally works.

    4. There are occasions when the system connects very well to your Pi, but for
    the specific activity you are trying to use it for, it is simply not usable. To
    confirm if this is the case, execute the order from the terminal;


    ```

    LSUSB-T-t

    ```


    This should send you a list of your pi-connected USB devices.


    +   5. Issues with drivers. Ensure that the USB interface is compatible with the
    operating system running on the Raspberry Pi based on Linux. Here, Elinux.org
    has several USB devices that are Raspberry Pi compatible. The list is well ordered,
    and it should help you decide whether your computer is compatible.

    6. Update the Pi. Before starting any new project on the Raspberry Pi, it is necessary
