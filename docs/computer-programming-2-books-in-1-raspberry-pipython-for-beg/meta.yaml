    # Conditional Control Structures


    If a program were nothing more than a list of commands to be executed sequentially,
    one by one, it would not be very useful. Conditionals allow us to check conditions
    and make our program behave in one way or another, to execute a piece of code
    or another, depending on this condition.


    Conditional control structures are those that allow us to evaluate if one or more
    conditions are met, to say what action we are going to execute. The condition
    evaluation can only return 1 of 2 results: true or false.


    In daily life, we act according to the evaluation of conditions, much more frequently
    than we really think: If the traffic light is green, cross the street. If not,
    wait for the traffic light to turn green. Sometimes, we also evaluate more than
    one condition to execute a certain action: If the electricity bill arrives and
    I have money, pay the bill.


