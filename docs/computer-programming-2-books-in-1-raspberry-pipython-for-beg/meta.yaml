    A collection of data in programming stores two or more elements in an array with
    different index numbers, so it helps us to group elements that have something
    to do with each other. There are four types of data collections in the Python
    language:


    +   - List: it is an ordered and modifiable collection. Allow duplicate data.

    - Tuple: it is an ordered and immutable collection. Allow duplicate data.

    - Set: it is a collection that does not have an order or an index. There are no
    duplicate data.

    - Dictionary: it is a collection without order, modifiable, and indexed. It does
    not allow duplicate data.


    When choosing an arrangement type, it is helpful to understand the properties
    each one possesses. Choosing the right type for a particular data set could mean
    retention of meaning and increase the efficiency or safety of the program.


    # ## Lists


    The lists can contain any type of data: numbers, strings, Booleans, and also lists.
    It is an ordered and modifiable collection. In Python, these are declared in brackets:


    ```

    Fruits list = ["Strawberry", "grape", "cherry"]


    Print (fruits_list)

    ```


    If we want to gain access to any element in the list, we will use the following
    indication, placing the index number (remember that in programming, these start
    at 0) that we want to print between the brackets.'
