- md: "## Regular Expressions\n\nOne of the most frequent operations that you have\
    \ come across is looking for a certain pattern/substring in a list, table, or\
    \ text file.\n\nThis is not difficult if the pattern you are looking for is static,\
    \ and you know it precisely. For example, if you want to find a certain name in\
    \ a contact list, just use functions like `find()`, which are already included\
    \ in Python.\n\nBut what happens when the substring you are trying to find has\
    \ variants in its writing? For example, suppose that in a certain text, you want\
    \ to find how many times the name \"Händel\" appears. Being a Germanic name, in\
    \ our language, it can be written as \"Händel,\" \"Handel\" or \"Haendel\". If\
    \ you only use functions like `find()`, you will have to find each variant of\
    \ the name separately. What if in a binary sequence you want to find all the subsequences\
    \ of the form 010, 0110, 01110, 011110, and others? Now you can no longer use\
    \ the `find()` method once for each case since there are infinite ones. Another\
    \ way is needed.\n\nThis is where regular expressions come into the picture, a\
    \ very powerful tool that makes it easy to find patterns in text. Regular expressions\
    \ come from the world of theoretical mathematics, specifically the Theory of Formal\
    \ Languages, but they are widely used in programming. Without going into mathematical\
    \ definitions, a regular expression can be thought of as a word, made up of special\
    \ characters, that serves to identify a set of other words.\n\nI will illustrate\
    \ it with an example. Let's go back to the beginning when we wanted to find the\
    \ word Händel in a text. You could search for the three variants (\"Handel,\"\
    \ \"Händel\" and \"Haendel\") separately, or you could find another word that\
    \ \"encodes\" these three variants. In this case, the word that is needed would\
    \ be \"$H(a|ä|ae)ndel$\". The vertical bar is a type of metacharacter used to\
    \ separate the possible variants for the expression in parentheses. This word\
    \ is a regular expression, as it identifies a set of other words.\n\n## Metacharacters\n\
    \nA regular expression can contain metacharacters, which are symbols that have\
    \ special meaning when placed inside a regular expression. In the previous section,\
    \ you have seen the metacharacter `|`, which is equivalent to the Boolean expression\
    \ OR and is used to separate the alternatives of a word. However, there are many\
    \ more metacharacters. Before we start with the Python examples, I'm going to\
    \ show you some of the most common ones.\n\n- The metacharacter `?` indicates\
    \ \"at most one match\" of the character that comes immediately before. Thus,\
    \ the expression \"obscure?\" corresponds to the words \"obscur\" and \"obscure.\"\
    \ The expression \"(re)?place\" would correspond to \"place\" and \"reposition.\"\
    \n- The metacharacter `*` indicates \"zero or more matches\" of the character\
    \ that comes immediately before. Thus, the expression \"01*0\" would correspond\
    \ to the words 0, 010, 0110, 01110, 011110, etc.\n- The metacharacter `+` works\
    \ similar to the previous one, but indicates \"at least one match\". The expression\
    \ \"01+o\" would now correspond to the words 010, 0110, 01110, 011110, etc.\n\
    - The metacharacter `{n}` indicates \"exactly n matches\" of the previous character.\
    \ For example, the expression \"ab{3}a\" would correspond to the word \"abbbba\"\
    .\n- The metacharacter `{n, m}` indicates \"between n and m matches\". If the\
    \ second space is blank, it means \"at least n matches\". Therefore, the expression\
    \ \"01{2,4}o\" would correspond to 0110, 01110, 011110, while the expression \"\
    01{2,}o\" would accept the words 0110, 01110, 011110, 0111110, ...\n- The metacharacter\
    \ `.` is a wildcard that can be used in place of any other character. Thus, in\
    \ a binary alphabet, the regular expression \"01.0\" would correspond to the words\
    \ 0100 and 0110.\n\nAs you have seen in these examples, the parentheses `()` are\
    \ also a metacharacter and are used to group terms and specify the order of operations.\
    \ The expression \"(01)*0\" is not the same as the expression \"01*0\". The first\
    \ corresponds to the words 0, 010, 01010, 0101010 and others while the second\
    \ corresponds to the words 00, 010, 0110, 01110 ...\n\nThese are the most common\
    \ metacharacters that you will find when working with regular expressions, although\
    \ there are more. It is important to note that the syntax may vary a bit depending\
    \ on the language and the context in which they are applied. Metacharacters can\
    \ be combined to form more complex expressions. For example, the expression \"\
    fi.*(A|o)\" would correspond to the words that begin with \"fi\" and end with\
    \ the letter a/o: finite, philosophy, finalize, fixed, physical.\n\n## Sets\n\n\
    A set is a set of characters enclosed in square brackets `[]` with a special meaning.\
    \ Some of the most frequent are:\n\n- `[abc]` - searches for a match with any\
    \ of the characters in parentheses. The regular expression \"[abc]aa\" corresponds\
    \ to the words aaa, baa, caa. It also works with numeric characters.\n- `[ak]`\
    \ - searches for a match with any of the alphabetic characters between the first\
    \ (a) and the last (k). The regular expression \"[be]a\" corresponds to the words\
    \ ba, ca, da, ea, while an expression like \"[az.]aa\" would correspond to words\
    \ that begin with any letter of the alphabet and end in \"aa\".\n- `[1-9]` - is\
    \ identical to the previous case, but with numeric characters.\n- `[^abc]` - matches\
    \ all characters that are NOT inside the brackets. Thus, the regular expression\
    \ \".*[^A]\" would correspond to any word that does NOT end with the letter \"\
    a\".\n\n## Regex module\n\nTo work with regular expressions in Python, you need\
    \ the `re` module. In the following examples, you will see some of its most basic\
    \ methods.\n\nTo find a pattern in a string, we can use the method `search()`.\n\
    \n```python\nimport re\n\ntext = \"Lorem ipsum pain sit amet, consectetur adipiscing\
    \ elit\"\n\npattern = \"Lorem\"\n\nx = re.search(pattern, text)  # Searches the\
    \ pattern inside the text\n\nprint(x.span())  # Writes the initial position and\
    \ the end of the occurrence\n```\n\nYou can also use the method `match()`, but\
    \ this only returns a position if the occurrence is at the beginning of the text.\
    \ This second code will give an error when trying to do the `print()` of the second\
    \ match since the \"ipsum\" pattern is not at the beginning of the text, and therefore,\
    \ the method `match()` brings back `None`:\n\n```python\nimport re\n\ntext = \"\
    Lorem ipsum pain sit amet, consectetur adipiscing elit door\"\n\npattern1 = \"\
    Lorem\"\n\npattern2 = \"ipsum\"\n\nx = re.match(pattern1, text)  # Searches the\
    \ pattern inside the text\n\nprint(x.span())  # Writes the initial position and\
    \ the end of the occurrence\n\ny = re.match(pattern2, text)  # Return None\n\n\
    print(y.span())  # ERROR!\n```\n\nSo much `match()` as `search()` they only keep\
    \ the first occurrence found. If you think there may be more than one, you can\
    \ use the function `finditer()` to search them all. This code looks for the pattern\
    \ \"pain\" in a long text and writes its positions:\n\n```python\nimport re\n\n\
    text = \"\"\"Lorem ipsum pain sit amet, consectetur adipiscing elit,\nsed do eiusmod\
    \ tempor incididunt ut labor et pain magna aliqua.\nDuis aute irure dolor in reprehenderit\
    \ in voluptate velit esse cillum\ndolore eu fugiat nulla pariatur.\"\"\"\n\npattern\
    \ = \"pain\"\n\nx = re.finditer(pattern, text)  # Returns a vector with the occurrences\
    \ positions\n\nfor i in x:\n    print(i.span())\n```\n\nIn the previous example,\
    \ we have limited ourselves to searching for a static word in the text, but metacharacters\
    \ can be used within the pattern to create regular expressions. I will put some\
    \ examples.\n\nIn this first code, the regular expression \"01+0\" is used to\
    \ find in a binary sequence all the sub-sequences that start and end with zero\
    \ and only have ones in the middle: 010, 0110, 01110, etc.\n\n```python\nimport\
    \ re\n\ntext = \"010001000100111001\"\n\npattern = \"01+0\"\n\nx = re.finditer(pattern,\
    \ text)\n\nfor i in x:\n    print(i.span())\n```\n\nOf course, metacharacters\
    \ can be combined to create more complex regular expressions. This code asks the\
    \ user for a binary sequence and checks if it is a palindrome. The regular expression\
    \ `(0.{3}0)|(1.{3}1)`"
  mdcn: "## 正则表达式\n\n你最常遇到的操作之一，就是在列表、表格或文本文件中查找特定的模式/子字符串。\n\n如果你要查找的模式是静态的，并且你确切知道它是什么，这并不困难。例如，如果你想在联系人列表中查找某个名字，只需使用\
    \ Python 中已包含的 `find()` 等函数即可。\n\n但是，当你试图查找的子字符串在书写上有变体时，会发生什么呢？例如，假设在某个文本中，你想找出名字\
    \ \"Händel\" 出现了多少次。作为一个日耳曼名字，在我们的语言中，它可以写成 \"Händel\"、\"Handel\" 或 \"Haendel\"\
    。如果你只使用 `find()` 这样的函数，你就必须分别查找名字的每个变体。如果你想在一个二进制序列中查找所有形如 010、0110、01110、011110\
    \ 等的子序列呢？现在你不能再为每种情况使用一次 `find()` 方法了，因为有无限种情况。需要另一种方法。\n\n这就是正则表达式登场的地方，它是一个非常强大的工具，可以轻松地在文本中查找模式。正则表达式源于理论数学世界，特别是形式语言理论，但它们在编程中被广泛使用。无需深入数学定义，正则表达式可以被看作是一个由特殊字符组成的词，用于识别一组其他的词。\n\
    \n我将用一个例子来说明。让我们回到开头，我们想在文本中查找 \"Händel\" 这个词。你可以分别搜索这三个变体（\"Handel\"、\"Händel\"\
    \ 和 \"Haendel\"），或者你可以找到另一个“编码”了这三个变体的词。在这种情况下，需要的词是 \"$H(a|ä|ae)ndel$\"。竖线是一种元字符，用于分隔括号内表达式的可能变体。这个词就是一个正则表达式，因为它识别了一组其他的词。\n\
    \n## 元字符\n\n正则表达式可以包含元字符，这些是放在正则表达式内部时具有特殊含义的符号。在上一节中，你已经看到了元字符 `|`，它等价于布尔表达式\
    \ OR，用于分隔一个词的备选项。然而，还有更多的元字符。在我们开始 Python 示例之前，我将向你展示一些最常见的元字符。\n\n- 元字符 `?` 表示其前面的字符“最多匹配一次”。因此，表达式\
    \ \"obscure?\" 对应于单词 \"obscur\" 和 \"obscure\"。表达式 \"(re)?place\" 将对应于 \"place\"\
    \ 和 \"reposition\"。\n- 元字符 `*` 表示其前面的字符“匹配零次或多次”。因此，表达式 \"01*0\" 将对应于单词 0、010、0110、01110、011110\
    \ 等。\n- 元字符 `+` 的工作方式与前一个类似，但表示“至少匹配一次”。表达式 \"01+o\" 现在将对应于单词 010、0110、01110、011110\
    \ 等。\n- 元字符 `{n}` 表示前一个字符“恰好匹配 n 次”。例如，表达式 \"ab{3}a\" 将对应于单词 \"abbbba\"。\n- 元字符\
    \ `{n, m}` 表示“匹配 n 到 m 次”。如果第二个空格为空，则表示“至少匹配 n 次”。因此，表达式 \"01{2,4}o\" 将对应于 0110、01110、011110，而表达式\
    \ \"01{2,}o\" 将接受单词 0110、01110、011110、0111110、...\n- 元字符 `.` 是一个通配符，可以用来代替任何其他字符。因此，在二进制字母表中，正则表达式\
    \ \"01.0\" 将对应于单词 0100 和 0110。\n\n正如你在这些示例中看到的，括号 `()` 也是一个元字符，用于对项进行分组并指定操作顺序。表达式\
    \ \"(01)*0\" 与表达式 \"01*0\" 不同。第一个对应于单词 0、010、01010、0101010 等，而第二个对应于单词 00、010、0110、01110\
    \ ...\n\n这些是使用正则表达式时最常见的元字符，尽管还有更多。需要注意的是，语法可能会根据应用的语言和上下文而略有不同。元字符可以组合形成更复杂的表达式。例如，表达式\
    \ \"fi.*(A|o)\" 将对应于以 \"fi\" 开头并以字母 a/o 结尾的单词：finite、philosophy、finalize、fixed、physical。\n\
    \n## 集合\n\n集合是用方括号 `[]` 括起来的一组字符，具有特殊含义。一些最常见的集合是：\n\n- `[abc]` - 搜索与括号中任何字符匹配的内容。正则表达式\
    \ \"[abc]aa\" 对应于单词 aaa、baa、caa。它也适用于数字字符。\n- `[ak]` - 搜索与第一个 (a) 和最后一个 (k) 之间的任何字母字符匹配的内容。正则表达式\
    \ \"[be]a\" 对应于单词 ba、ca、da、ea，而像 \"[az.]aa\" 这样的表达式将对应于以字母表中任何字母开头并以 \"aa\" 结尾的单词。\n\
    - `[1-9]` - 与前一种情况相同，但使用数字字符。\n- `[^abc]` - 匹配所有不在括号内的字符。因此，正则表达式 \".*[^A]\" 将对应于任何不以字母\
    \ \"a\" 结尾的单词。\n\n## 正则表达式模块\n\n要在 Python 中使用正则表达式，你需要 `re` 模块。在接下来的示例中，你将看到它的一些最基本的方法。\n\
    \n要在字符串中查找模式，我们可以使用 `search()` 方法。\n\n```python\nimport re\n\ntext = \"Lorem ipsum\
    \ pain sit amet, consectetur adipiscing elit\"\n\npattern = \"Lorem\"\n\nx = re.search(pattern,\
    \ text)  # 在文本中搜索模式\n\nprint(x.span())  # 输出匹配项的起始位置和结束位置\n```\n\n你也可以使用 `match()`\
    \ 方法，但这仅在匹配项位于文本开头时才返回位置。第二段代码在尝试打印第二个匹配项时会出错，因为 \"ipsum\" 模式不在文本开头，因此 `match()`\
    \ 方法返回 `None`：\n\n```python\nimport re\n\ntext = \"Lorem ipsum pain sit amet,\
    \ consectetur adipiscing elit door\"\n\npattern1 = \"Lorem\"\n\npattern2 = \"\
    ipsum\"\n\nx = re.match(pattern1, text)  # 在文本中搜索模式\n\nprint(x.span())  # 输出匹配项的起始位置和结束位置\n\
    \ny = re.match(pattern2, text)  # 返回 None\n\nprint(y.span())  # 错误！\n```\n\n`match()`\
    \ 和 `search()` 都只保留找到的第一个匹配项。如果你认为可能有多个匹配项，可以使用 `finditer()` 函数来搜索所有匹配项。这段代码在一个长文本中查找模式\
    \ \"pain\" 并输出其位置：\n\n```python\nimport re\n\ntext = \"\"\"Lorem ipsum pain sit\
    \ amet, consectetur adipiscing elit,\nsed do eiusmod tempor incididunt ut labor\
    \ et pain magna aliqua.\nDuis aute irure dolor in reprehenderit in voluptate velit\
    \ esse cillum\ndolore eu fugiat nulla pariatur.\"\"\"\n\npattern = \"pain\"\n\n\
