    \ = (name, company)\n    cur.execute(query, values)\n```\n\n## 第十二章\n\n### Minecraft\
    \ Pi 版\n\n在你的 Raspberry Pi 上安装 Raspbian 后，你可以在游戏部分找到 Minecraft Pi。Minecraft Pi\
    \ 是流行生存游戏的一个精简版，旨在向用户教授不同的编程语言。\n\n当然，这很有趣，但它并不是我们所熟知和喜爱的 Minecraft 游戏。就像所有 Raspberry\
