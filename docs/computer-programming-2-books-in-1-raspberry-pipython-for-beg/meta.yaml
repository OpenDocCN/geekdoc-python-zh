    # # Text Files


    # ## About Files


    Python makes working with files and text very easy. Let''s start with the files.


    Let''s start with a short discussion about terminology. In a previous lesson,
    depending on the operating system of your computer, Mac or Windows, you saw how
    information is sent to the "exit command" window in your text editor by using
    the command print Python:


    ```

    print (Hello world)

    ```


    The Python programming language is of the object-oriented type. This means that
    it is built around a special type of entity, an object, which contains both data
    as well as a series of methods for accessing and altering the data. Once an object
    is created, it can interact with other objects.


    In the example above, we saw one type of object, the string "Hello world." The
    string is the sequence of a series of characters enclosed in quotation marks.
    You can write a string in three different ways:


    ```

    Message1 = ''Hello world''


    Message2 = "Hello world"


    Message3: "" "Hello


    Hello


    Hello world "" "

    ```


    What is important here is to note that, as seen in the first two examples, you
    can use single or double quotes, but you should never mix the two types in the
    same string. In the third message, double'
