    applications.


    *The Solution:*


    You''ll have to change the setup to that of your own keyboard or language to correct
    this. This can be accomplished by going to the configuration menu of the Raspberry
    pi, selecting the keyboard setup menu under the Internationalization menu, and
    scrolling down to pick the keyboard layout that suits your keyboard''s country
    of origin / language.


    Go to Preferences and choose the mouse and keyboard settings if you are operating
    with a display.


    Select a keyboard layout and then select your keyboard layout from the new window.


    6. Not working with HDMI-based monitor, Raspberry Pi


    So you could link via ssh to your Pi, but you can''t seem to get it to function
    with an HDMI display? There are two things you can do:


    +   - Do an inspection of your HDMI cable

    - Attach the display to the Pi and, before powering up your Raspberry Pi, select
    the correct mode (HDMI or VGA) on the monitor. Ensure your screen is switched
    on before powering the Pi.


    7. Raspberry Pi Non-working camera


    Most people expect the Raspberry Pi camera to function right out of the box, and
    I have had to suggest this easy solution so much that it probably deserves a spot
    on this list.


    It must be allowed on the Pi to be able to use the Pi camera. However, this should
    be accomplished after updating and upgrading'
  - '[PAGE 183]


    the Pi.


    To do this, start by running the commands to update and upgrade:


    ```

    Apt-get Sudo update

    Sudo apt-get Update Upgrade

    ```


    Pursued by:


    ```

    Sudo raspi-config settings

    ```


    This will open the configuration window for the Raspberry Pi shown below. Scroll
    down, pick your camera, and then choose Allow. Go to Preferences and choose Raspberry
    Pi Configuration if you are operating with a monitor. Check the Activated Radio
    Button in front of the camera when the configuration window opens. Reboot the
    Pi with it done. You should be able to receive your feeds and images now. If you
    are still unable to access the camera, try a different connector strip and camera.


    Read more on how to use the Raspberry Pi Pi Camera and the Raspberry Pi USB Camera.


    # 8. Blank or Black Capture with Raspberry Pi Camera


    This describes a situation where a photo will appear to have been taken by the
    Raspberry Pi but the image appears blacked out.


    *The Solution:*


    As described above, due to the software update, several errors on the Raspberry
    Pi will be due and this error is not different. The first fix you can attempt
    is to download and upgrade your Raspberry Pi to get the new updates and improvements.
    After updating to effect improvements, reboot.


    # 9. Ethernet Off on WiFi


    For example, Wi-Fi access is disabled when an Ethernet cable is linked to the
    Raspberry Pi. This was presumably introduced to disable routing between the Wi-Fi
    and the Ethernet port as a security feature for Pi. A config file called ifplugd,
    which must be disabled if'
  - '[PAGE 184]


    you want to use Wi-Fi and Ethernet at the same time, handles this operation.


    To do this, run:


    ```

    Sudo Update-Disable RC Networking

    ```


    Or


    ```

    Sudo apt-get purge, ifplugdd-get purge

    ```


    You should be able to use both network options at the same time now, but do not
    overlook the security vulnerability this might make, as the Pi would behave like
    a router in this mode.


    # 10. Hangs the Pi Attempting to Change Password


    This applies to a situation where the Pi is either hanging or rejected (i.e. new
    password not registered) by an attempt to alter the password of the Raspberry
    Pi.


    *The Solution:*


    This is one of the indications suggesting that the Raspberry Pi may not get enough
    juice from the attached power supply or that the power supply performance fluctuates
    much. It''s as easy to fix this as switching the power supply to your Raspberry
    Pi or plugging it to another port on your PC.


    This is obviously not an exhaustive list of mistakes that one could find when
    working with the Raspberry Pi. This might give you a head start on the shared
    unique mistake and even related mistakes. Check our Raspberry Pi Projects section
    to get started using Raspberry Pi with cool applications.


    Have you faced a mistake that has taken days to resolve? Feel free to share them
    via the comment section.'
- md: '## Chapter Five


    ## Configuring The Network


    This book will demonstrate how to easily configure a static IP address for the
    Raspberry Pi Ethernet port. This makes it far easier to remotely log into it because
    you will already know what your Pi''s IP address is. For PC / Windows users, or
    anyone not familiar with Linux, these are really simple instructions.


    The new PIXEL edition of Raspbian has been revised (3/3/2017) by this Instructable.
    The configuration of the network has been changed to use the dhcpcd.conf vs interfaces
    file.


    **Hardware:**


    - Raspberry Pi

    - Network switch

    - Ethernet cables

    - Optional: Wireless USB dongle for Wi-Fi


    Step 1: Check the existing network configuration. Click settings for Pi Network.
    From the prompt or LXTerminal: instruction, form the ''ifconfig'' command. The
    current network settings will be shown with this instruction.


    Step 2: Existing Network Configuration Backup. If you are new to Linux, it is
    a good idea to back up the dhcpcd.conf file:


    ```

    sudo cp /etc/dhcpcd.conf /etc/dhcpcd.backup

    ```


    This will allow you to roll back any modifications you make.


    Step 3: Change Network Configuration


    ## Modify Settings for Network


    You must edit the dhcpcd.conf file to set up a static IP address in order to edit
    the network settings. You may use the following command to load the file into
    the file update editor:


    ```

    sudo nano /etc/dhcpcd.conf

    ```


    To set an Ethernet port (eth0) to a static IP address, place these lines at the
    top of the file:


    The eth0 interface


    ```

    interface eth0

    static ip_address=10.11.44.124/24

    static routers=10.11.44.1

    static domain_name_server=172.16.33.85

    ```


    Set the address (IP address) to the IP address that you want the Raspberry Pi
    to carry. Configure the value of the router to the gateway address. If available,
    set your name servers to domain name servers. Use ctrl x once the file has been
    changed to save and exit.


    Step 4: Launch the Raspberry Pi again. Restart the Raspberry Pi. Once you have
    modified the dhcpcd file, you must restart the Raspberry Pi to make the changes
    successful.


    Step 5: Verify the Configuration of the New Network. Perform a Network Configuration
    Test. Use the "ping" command to check that the Raspberry Pi is on the network
    and that the network is still talking to another device.


    If you find it difficult to ping other machines on the network, try the following:


    1. Confirm that the Raspberry Pi and the network switch are securely linked to
    the Ethernet cable.

    2. Confirm the correctness of the IP address, mask, and gateway.

    3. If a Windows machine is pinged, often the security setting prevents a ping
    request from responding.


    ## Networking (Wired)


    You must spend less time on social media if you want to write code, and spend
    more time breaking things or leaving your comfort zone. Here''s a quick shopping
    list to get connected to your laptop with your Raspberry Pi:


    - Two 1 foot Ethernet link cables. (These are called "repair cables." If one splits,
    always buy them in pairs.)

    - A Crossover Converter. (In this shot, I don''t know why it is red. The one I
    got was black. You will find it in that color, I''m sure.)

    - USB / Ethernet Realtek adapter. (CableMatters sells this, but it appears in
    ipconfig as "Realtek USB GbE Family Controller." Plus, if you need to plug in
    your cursor, there are several additional USB ports.)


    Since Medium has difficulty embedding images into lists, after this numbered list,
    I''ll need to post my screenshots.


    1. Using a straight Ethernet Cable, link your Raspberry Pi using the PC Ethernet
    Port. It ought to be fairly obvious. Connect the USB-Ethernet Adapter to the Crossover
    Adapter, then connect the adapter''s Ethernet port to the one on the Pi. To make
    sure things are related, make sure you hear the "click".

    2. Open Settings for Windows. Click the Windows menu as we''re using Windows 10,
    and then pick the Settings gear icon.

    3. Open Sharing Center and Network. To get there, click on "Network & Internet"
    in Settings. You can see the "Ethernet" tab on the left side if you have your
    Ethernet plugged in. Click on it. There should be a section on the right side
    called "Connected Settings" with a link that says "Network and Sharing Hub." Click
    it.

    4. Modify the settings for sharing Wi-Fi. Wait, why am I playing with the Wi-Fi
    settings? (Seriously.) I don''t want to touch it, I might break it! That''s what
    I do, but, contrary to what it sounds, for Internet Link Sharing (ICS) to work,
    you need to change your Wi-Fi sharing settings. I ran into all kinds of things
    online where people were moaning about how their Ethernet settings had changed,
    but nothing happened. This is because our Wi-Fi sharing settings need to be modified
    so that it shares its Internet connection with Ethernet. As terrifying as that
    sounds, that''s how it is done. Click the blue text on the "Network and Sharing
    Hub" where you see the Connections field for "Wi-Fi". (It may have an attachment
    to what network you are linked to.) This should open the "Wi-Fi Status" window.

    5. Wi-Fi Properties Available. Click the ''Properties'' button in the ''Wi-Fi
    Status'' window. This should open the window for "Wi-Fi Assets."

    6. Modify the settings for the ICS. (Note: Just to reiterate what I said in step
    4, if you did something mentioned in that step to your Ethernet settings, undo
    it.) Against common wisdom, we''re going to have to click on a few items that
    should be even more frightening. Click the "Sharing" tab in the "Wi-Fi Properties"
    window. Check the box for "Allow other network users to connect via the Internet
    link of this device." Pick the Ethernet link from the drop-down menu underneath
    it. You can call your Ethernet link something else, as is the case where mine
    is called "Ethernet 2." Alternatively, check the "Allow other network users to
    monitor or disable a shared Internet link" box. To close the ''Wi-Fi Assets''
    window, press ''OK.'' Click "Close" in the "Wi-Fi Status" window.

    7. Check your link properties on Ethernet. In the "Network and Sharing Center"
    window, select "Ethernet" as the value this time is on the Connections field.
    (Again, it could be called something else, but it should be below the "Wi-Fi"
    connections we messed with earlier.) This should open a window called "Ethernet
    Status" or something similar. Click the button for Properties. “Ethernet Properties"
    (or anything similar) should open this up.

    8. Test your Settings for IPv4. With this move, Cisco geeks might feel comfortable
    knowing what it does. Find "Internet Protocol Version 4 (TCP / IPv4)" in the "Ethernet
    Resources" window in the "This link uses the following things" section. If not,
    you will need to restart your machine to activate it. Make sure it is tested.
    Double-click on it or pick it and click the "Properties" button to open the "Internet
    Protocol Version 4 (TCP / IPv4) Properties" window. (I hope you don''t need to
    do that.) If we had not done either of the previous measures, the radio button
    "Automatically get an IP address" would have been tested, as would the option
    "Automatically get a DNS server address". Nevertheless, we now see that "Use the
    following IP address" is selected, and all the "IP address", "Subnet Mask", and
    "Normal Gateway" fields are allowed, while "Get automatic DNS server address"
    is disabled in the DNS settings, and "Use the following DNS server addresses"
    is selected. The field "IP Address" should contain 192.168.137.1 and the field
    "Subnet Mask" should contain 255.255.255.0. The “default portal” ought to be blank.
    Meanwhile, unless you want to change this to 1.1.1.1 (Cloudflare''s public DNS
    server) and 8.8.8.8 (Google''s public DNS server), DNS address fields will remain
    null. We can click ''OK'' in the ''Ethernet Properties'' window and then click
    “Close” in the “Ethernet Status” window. Alternatively, we could open the Command
    Prompt (cmd) and type ipconfig / all to check the details. We can also ping our
    link through ping 192.168.137.1 or ping the Pi via its hostname, such as ping
    raspberrypi.local, assuming raspberrypi is the hostname of your Pi (found using
    sudo hostname).

    9. Into your Pi with SSH. This is usually achieved using PuTTY. I''m a fan of
    using Chocolatey to install software that is open source on Windows, though. Install
    Chocolatey, and then use Chocolatey in Powershell to install Putty. I was actually
    hoping to write about how to use SSH later this week in a post. I''ll post a connection
    to that later when that''s done. You should be able to SSH into your Pi (ssh pi@raspberry.local),
    then do stuff like ping google (ping google.com). It''s more complex than that,
    but this is something I want to tie up.


    ## Wireless Networking


    For setting up wireless connections with the Raspberry Pi Desktop on Raspberry
    Pi OS, a GUI is given. You can set up wireless networks from the command line
    if you do not use the Raspberry Pi Desktop.


    Wireless connections can be made at the right-hand end of the menu bar via the
    network icon. If you use a Pi with built-in wireless networking, or if a wireless
    dongle is plugged in, a list of available wireless networks will be shown by left-clicking
    this icon, as shown below. The message ''No APs detected-scanning ...'' will be
    shown if no networks are found. Keep the menu open, wait a few seconds, and your
    network should be found.'
  mdcn: '## 第五章


    ## 配置网络


    本书将演示如何轻松地为树莓派以太网端口配置静态IP地址。这将使远程登录变得容易得多，因为你已经知道你的树莓派的IP地址。对于PC/Windows用户，或者任何不熟悉Linux的人，这些说明都非常简单。


    Raspbian的新PIXEL版本已由本指南修订（2017年3月3日）。网络配置已更改为使用`dhcpcd.conf`文件而非`interfaces`文件。


    **硬件：**


    - 树莓派

    - 网络交换机

    - 以太网线

    - 可选：用于Wi-Fi的无线USB适配器


    步骤1：检查现有网络配置。点击树莓派网络设置。从提示符或LXTerminal：输入`ifconfig`命令。当前网络设置将通过此命令显示。


    步骤2：备份现有网络配置。如果你是Linux新手，最好备份`dhcpcd.conf`文件：


    ```

    sudo cp /etc/dhcpcd.conf /etc/dhcpcd.backup

    ```


    这将允许你回滚所做的任何修改。


    步骤3：更改网络配置


    ## 修改网络设置


    你必须编辑`dhcpcd.conf`文件来设置静态IP地址，以便编辑网络设置。你可以使用以下命令将文件加载到文件编辑器中：


    ```

    sudo nano /etc/dhcpcd.conf

    ```


    要将以太网端口（eth0）设置为静态IP地址，请将以下几行放在文件顶部：


    eth0接口


    ```

    interface eth0

    static ip_address=10.11.44.124/24

    static routers=10.11.44.1

    static domain_name_server=172.16.33.85

    ```


    将地址（IP地址）设置为你希望树莓派使用的IP地址。将路由器的值配置为网关地址。如果可用，请将你的名称服务器设置为域名服务器。文件修改完成后，使用`ctrl
    x`保存并退出。


    步骤4：重新启动树莓派。重启树莓派。修改`dhcpcd`文件后，你必须重启树莓派才能使更改生效。


    步骤5：验证新网络配置。执行网络配置测试。使用`ping`命令检查树莓派是否在网络上，以及网络是否仍在与其他设备通信。


    如果你发现难以ping通网络上的其他机器，请尝试以下操作：


    1. 确认树莓派和网络交换机已牢固连接到以太网线。

    2. 确认IP地址、子网掩码和网关的正确性。

    3. 如果ping的是Windows机器，通常安全设置会阻止ping请求响应。


    ## 网络（有线）


    如果你想写代码，就必须减少在社交媒体上花费的时间，花更多时间去尝试新事物或走出舒适区。以下是一个快速购物清单，用于将你的树莓派与笔记本电脑连接起来：


    - 两根1英尺长的以太网连接线。（这些被称为“修复线”。如果一根坏了，务必成对购买。）

    - 一个交叉转换器。（在这张照片中，我不知道为什么它是红色的。我买到的是黑色的。我相信你会找到那种颜色的。）

    - USB/以太网Realtek适配器。（CableMatters有售，但在`ipconfig`中显示为“Realtek USB GbE Family Controller”。此外，如果你需要插入鼠标，它还有几个额外的USB端口。）


    由于Medium难以在列表中嵌入图片，在这个编号列表之后，我将发布我的截图。


    1. 使用直通以太网线，通过PC以太网端口连接你的树莓派。这应该相当明显。将USB-以太网适配器连接到交叉适配器，然后将适配器的以太网端口连接到树莓派的端口。为确保连接正确，请确保听到“咔哒”声。

    2. 打开Windows设置。由于我们使用的是Windows 10，点击Windows菜单，然后选择设置齿轮图标。

    3. 打开网络和共享中心。要到达那里，请在设置中点击“网络和Internet”。如果你已插入以太网，可以在左侧看到“以太网”选项卡。点击它。右侧应该有一个名为“连接设置”的部分，其中有一个链接写着“网络和共享中心”。点击它。

    4. 修改Wi-Fi共享设置。等等，为什么我要动Wi-Fi设置？（说真的。）我不想碰它，我可能会弄坏它！我就是这么做的，但与听起来相反，要使Internet连接共享（ICS）工作，你需要更改你的Wi-Fi共享设置。我在网上遇到各种各样的情况，人们抱怨他们的以太网设置已经更改，但什么也没发生。这是因为我们需要修改Wi-Fi共享设置，以便它将其Internet连接与以太网共享。尽管听起来很可怕，但这就是它的做法。点击“网络和共享中心”中的蓝色文本，你会看到“Wi-Fi”的连接字段。（它可能附加了你连接到的网络信息。）这应该会打开“Wi-Fi状态”窗口。

    5. 可用的Wi-Fi属性。在“Wi-Fi状态”窗口中点击“属性”按钮。这应该会打开“Wi-Fi属性”窗口。

    6. 修改ICS设置。（注意：重申一下我在步骤4中所说的，如果你对以太网设置做了该步骤中提到的操作，请撤销它。）与常识相反，我们将不得不点击一些可能更令人害怕的项目。在“Wi-Fi属性”窗口中点击“共享”选项卡。勾选“允许其他网络用户通过此设备的Internet连接进行连接”框。从下面的下拉菜单中选择以太网连接。你可以将你的以太网连接命名为其他名称，例如我的叫“以太网2”。或者，勾选“允许其他网络用户控制或禁用共享的Internet连接”框。要关闭“Wi-Fi属性”窗口，请点击“确定”。在“Wi-Fi状态”窗口中点击“关闭”。

    7. 检查你的以太网连接属性。在“网络和共享中心”窗口中，这次在连接字段中选择“以太网”。（同样，它可能叫其他名字，但它应该在我们之前操作的“Wi-Fi”连接下方。）这应该会打开一个名为“以太网状态”或类似名称的窗口。点击属性按钮。“以太网属性”（或类似名称）应该会打开。

    8. 测试你的IPv4设置。对于这一步，Cisco爱好者可能会觉得知道它做什么很舒服。在“以太网属性”窗口的“此连接使用下列项目”部分找到“Internet协议版本4
    (TCP/IPv4)”。如果没有，你可能需要重启计算机来激活它。确保它被选中。双击它或选中它并点击“属性”按钮，打开“Internet协议版本4 (TCP/IPv4)属性”窗口。（我希望你不需要这样做。）如果我们没有执行之前的任何步骤，单选按钮“自动获得IP地址”和“自动获得DNS服务器地址”选项本应被选中。然而，我们现在看到“使用下面的IP地址”被选中，并且“IP地址”、“子网掩码”和“默认网关”字段都被启用，而在DNS设置中，“自动获得DNS服务器地址”被禁用，“使用下面的DNS服务器地址”被选中。“IP地址”字段应包含192.168.137.1，“子网掩码”字段应包含255.255.255.0。“默认网关”应该是空的。同时，除非你想将其更改为1.1.1.1（Cloudflare的公共DNS服务器）和8.8.8.8（Google的公共DNS服务器），否则DNS地址字段将保持为空。我们可以在“以太网属性”窗口中点击“确定”，然后在“以太网状态”窗口中点击“关闭”。或者，我们可以打开命令提示符（cmd）并输入`ipconfig
    / all`来检查详细信息。我们也可以通过`ping 192.168.137.1`来ping我们的连接，或者通过其主机名ping树莓派，例如`ping raspberrypi.local`，假设`raspberrypi`是你的树莓派的主机名（使用`sudo
    hostname`查找）。

    9. 通过SSH连接到你的树莓派。这通常使用PuTTY来完成。不过，我是使用Chocolatey在Windows上安装开源软件的粉丝。安装Chocolatey，然后在Powershell中使用Chocolatey安装Putty。我实际上希望在本周晚些时候的一篇文章中写关于如何使用SSH的内容。完成后我会发布相关链接。你应该能够通过SSH连接到你的树莓派（`ssh
    pi@raspberry.local`），然后做一些事情，比如ping google（`ping google.com`）。这比那更复杂，但这是我想完成的事情。


    ## 无线网络


    在Raspberry Pi OS上，为树莓派桌面设置无线连接提供了一个图形用户界面。如果你不使用树莓派桌面，可以从命令行设置无线网络。


    可以通过菜单栏右端的网络图标进行无线连接。如果你使用内置无线网络的树莓派，或者插入了无线适配器，左键单击此图标将显示可用无线网络列表，如下所示。如果未找到网络，将显示消息“未检测到AP-正在扫描...”。保持菜单打开，等待几秒钟，应该会找到你的网络。'
