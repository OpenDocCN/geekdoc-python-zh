    # # Python Web Development


    # ## Contributions of Python to Web Development


    Python is a programming language that can also be used to create personal and
    business web pages. Knowing how to program websites and applications is synonymous
    with success and a job gap. The future is in the network, and professionals capable
    of placing companies in this new medium of commerce are needed. It is because
    of the above that many programmers have chosen to specialize in this category.


    Python webs are chosen every day by high-level companies, a sign of the quality
    and good usability offered by webs created with this code. Thus, programming in
    Python is one of the skills most sought after by the headhunters of companies
    such as Netflix, Spotify, and Pixar. Choosing Python web ensures you are not pigeonholed
    into a single type of web development. It is an open source whose creation possibilities
    are endless, as well as its direct applications. With a good study on Python,
    you will learn to make websites from scratch with all its functionalities, from
    ecommerce to a platform with products on consumer demand like Netflix.


    Python code has numerous [advantages](advantages) at the time of sitting down
    to create webs. We detail some of them below:'
- md: '- It is an open-source language, which means that it is free software. You
    can use it for free at all times.

    - It is multiplatform, valid for all types of systems and devices.

    - It is understandable to all programmers. The way of writing Python code is neat
    and clean, so anyone will know how to understand and work on your created structure.

    - It has a flexible style. With Python web, you can create a multitude of elements,
    from lists to more complex functions.

    - It has a healthy programming style. Python web is designed to work according
    to specific rules so that everyone follows the same guidelines.


    ## Web Frameworks for Python


    A web framework is a set of components that help you develop websites easier and
    faster. When you build a website, you always need a set of similar components:
    a way to handle user authentication (register, login, logout), an administration
    panel for your website, forms, a way to upload files, etc. Luckily for us, other
    developers realized long ago that they always faced the same problems when building
    websites, so they came together and built frameworks (such as Django) with out-of-the-box
    components. The frameworks serve so that we do not have to reinvent the wheel
    each time and that we can move faster when building a new site.


    To understand what frameworks are really for, we need to look at how servers work.
    The first thing is that the server needs to know that you want a web page to serve
    you. Imagine a mailbox (port) in which someone is constantly looking for incoming
    letters (requests). This is what a web server does. The web server reads the letter
    and sends a response to the web page. But to send something, we have to have some
    content. And frameworks help us create that content. When a request arrives at
    a web server, it is passed to the framework, which tries to find out what is actually
    requested. Take a website address first and try to figure out what to do with
    it. This part is done by the URL resolver of our framework (note that a website
    address is called URL - Uniform Resource Locator, so the name URL resolver makes
    sense). This one isn''t very smart - it takes a list of patterns and tries to
    match the URL. The framework checks the patterns from top to bottom, and if something
    matches, it passes the request to the associated function (which is called view).
    Imagine a postman carrying a letter. He walks down the street and checks each
    house number with the one on the letter. If it matches, he leaves the letter there.


    All the cool things are done in the view function: we can look at a database to
    find some information. Maybe the user asked to change something in the data, like
    a letter saying, "Please change my job description." The view can check if you
    have permission to do so, update your job description, and return a message: "Done!"
    The view then generates a response, and Django can send it to the user''s browser.
    This description is a bit simplistic, but at the moment, you don''t need to know
    all the technical details. Just having a general idea is more than enough.


    There are quite a few Python web frameworks out there, but here are some of the
    best:


    - Django: Django is a high-level web framework that enables rapid development
    of safe and maintainable websites. Developed by seasoned programmers, Django takes
    care of much of the complications of web development, so you can focus on writing
    your application without reinventing the wheel. It''s free and open-source, has
    a thriving and active community, great documentation, and many free and paid support
    options.

    - Grok: Grok, defined by its authors, is a framework for web applications made
    for Python developers. It is aimed at beginners and experts. Grok is intended
    for agile development. This framework comes from the well-known [Zope](https://www.zope.dev/),
    a complete dean in the world of application servers in web environments, of which
    the Zope Toolkit is used, a set of object-oriented libraries specially oriented
    to the reuse of components in web environments.

    - Webpy: This is the software written by Aaron Swartz for creating dynamic websites
    with Python. It was officially posted while I was working on reddit.com (which
    was later rewritten using other tools). "Simple as powerful", "It is the anti-framework
    framework. web.py doesn''t get in your way"; some of the characteristics and opinions
    for which it is made known on the official website webpy.org. It is in the public
    domain, so it can be applied for the development of any type of project.

    - Turbogears: TurboGears is a Python web application framework that consists of
    various WSGI components such as WebOb, SQLAlchemy, Genshi, and Repoze. TurboGears
    is designed around the model-view-controller (MVC) architecture, very similar
    to Struts or Ruby on Rails, designed to make rapid web application development
    in Python easier and easier to maintain. Since version 2.3, the framework has
    also provided a "minimal mode" that allows it to act as a microframe for use in
    environments where the full stack is not required or desired.


    ## Using Django


    We will focus on introducing ourselves to web development in Python in the Django
    framework because this helps you write software that is:


    - Full: Django follows the "Batteries Included" philosophy and provides almost
    everything developers would like it to have "out of the box". All you need is
    part of a single "product," everything works perfectly, follows consistent design
    principles, and has a wide and [updated documentation](https://docs.djangoproject.com/).

    - Versatile: Django can be (and has been) used to build almost any type of website
    - from content management systems and wikis to social media and news sites. It
    can work with any framework on the client-side, and it can return content in almost
    any format (including HTML, RSS feeds, JSON, XML, etc.). The site you are currently
    reading is based on Django! While it offers options for almost any functionality
    you want (different database engines, template engines, etc.), it can be extended
    to use other components if necessary.

    - Insurance: Django helps developers avoid several common security mistakes by
    providing a framework that is designed to "do the right thing" to protect the
    website automatically. For example, Django provides a secure way to manage user
    accounts and passwords, thus avoiding common mistakes such as placing session
    information in cookies where it is vulnerable (instead, cookies only contain a
    key and the data is stored in the database data) or passwords are stored directly
    in a password hash. Django allows protection against some vulnerabilities by default,
    including SQL injection, cross-site scripting, cross-site request spoofing, and
    clickjacking.

    - Scalable: Django uses a component based on the architecture "shared-nothing"
    (Each part of the architecture is independent of the others, and therefore can
    be replaced or changed if necessary). Taking into account a clear separation between
    the different parts means that you can scale to increase traffic by adding hardware
    at any level: cache servers, database servers, or application servers. Some of
    the busiest sites have scaled Django to meet their demands (for example, Instagram
    and Disqus, to name just two).

    - Maintainable: Django code is written using design principles and patterns to
    encourage the creation of maintainable and reusable code. It uses the "Don''t
    Repeat Yourself" (DRY) principle so there is no unnecessary duplication, reducing
    the amount of code. Django also encourages grouping related functionality into
    reusable "applications" and, at a lower level, groups related code into modules
    (following the pattern model View Controller (MVC)).

    - Portable: Django is written in Python, which runs on many platforms. This means
    you are not tied to any particular platform and can run your applications on Linux,
    Windows, and Mac OS X distributions. Additionally, Django is supported by many
    web-hosting providers, and they often provide specific infrastructure and documentation
    for hosting Django sites.


    ## Django Origins


    Django was initially developed between 2003 and 2005 by a team that was responsible
    for creating and maintaining newspaper'
