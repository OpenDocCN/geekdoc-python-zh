    # # Chapter Four


    # ## Setting Up the Troubleshooting


    From experience, each model of the Raspberry PI (and operating system) has its
    own peculiar problems and corrections, so I will presume that you are using a
    Raspberry Pi 3 and running the latest version of the Raspbian stretch OS to keep
    things reasonably normal for this chapter.


    **All set? Let''s dive inside!**


    +   1. Issues with Boot


    This may be attributed to quite a variety of variables. The Red LED (power LED)
    is usually indicated by "ON" while the green (activity LED) is either "OFF" or
    permanently "on."


    *The Solution:*


    Computer operation is reflected by the green light on the Raspberry Pi, so when
    it is blinking at intervals, it indicates the Pi is running. Therefore, the first
    place you can search whether it''s off or not flickering is where the Pi''s program
    is housed: the slot for the SD card. Ensure the proper insertion of the SD card.
    If things don''t improve, search the SD card to make sure the OS has flashed correctly
    and the files on it aren''t corrupted.


    I typically just format the SD card in situations like this, and flash it with
    the OS again. Upload it into a PC and copy it out before formatting if you have
    data that you would like to retain on the SD card.


    +   2. NOOBS OS Stuck on the splash show'
- md: 'This is one of the key reasons why I am not a huge fan of the NOOBS app for
    Raspberry Pi. The Raspberry Pi''s boot operation gets stuck on the splash screen
    when this error occurs.


    *The Solution:*


    This can be solved by formatting the SD card and ensuring that it is copied to
    the right Noob files. Try another SD card or the same SD card on a different Raspberry
    Pi if this doesn''t work. If the problem persists, installing Raspbian stretch
    or some other distro might save you more time.


    3. Could not access the Pi over SSH


    This is more of a safety feature, rather than a mistake, built into the Raspberry
    Pi stretch OS. For a Raspberry Pi running a new install of the Raspbian stretch,
    contact over SSH is disabled.


    *The Solution:*


    Under the Raspberry Pi settings, you need to enable SSH communication with the
    PI connected to the monitor, go to preferences, and then select Raspberry Pi settings.


    Select the radio button named Activated in front of SSH when the configuration
    window opens.


    If you''re running a Pi in headless mode, you''ll need to delete the SD card,
    insert it into your PC, then build an empty file called SSH, copy it to your SD
    card, and then insert the SD card back into your Raspberry Pi. You should be able
    to access your PI via SSH now.


    4. The board departs intermittently.


    This includes the rebooting of the Raspberry Pi itself at random intervals and
    often the power LED is off while the board is on.


    *The Solution:*


    This is basically a problem of control. For example, the Raspberry Pi 3 needs
    a 5V, 2.5A power supply to work properly, so anything short of that is likely
    to affect its efficiency. While I worked on the PI with 5V 1.5A, output depends
    on the task that the Pi is set to perform.


    Essentially, check to make sure you give the Pi enough juice to remain awesome
    when this happens.


    ## 5. USB Not Working


    This error describes situations where USB devices attached to the Raspberry Pi
    are either not recognized or not functioning properly by the Pi, as the tag implies.


    *The Solution:*


    There could be a bunch of stuff wrong here:


    - 1. The Raspberry Pi cannot get enough power and the USB system is therefore
    unable to power it. Ensure that your Pi is powered properly.

    - 2. The USB interface may be defective. To make sure it works right, test it
    with your PC or some other device.

    - 3. Before turning it on, attach your computer to the Pi. Although this probably
    shouldn''t be a problem, the Pi will need to do some initialization for USB devices
    such as your keyboard and mouse, particularly if you are connecting it to the
    Pi for the first time. Weird solution, but occasionally works.

    - 4. There are occasions when the system connects very well to your Pi, but for
    the specific activity you are trying to use it for, it is simply not usable. To
    confirm if this is the case, execute the order from the terminal;


    ```

    lsusb -t

    ```


    This should send you a list of your pi-connected USB devices.


    - 5. Issues with drivers. Ensure that the USB interface is compatible with the
    operating system running on the Raspberry Pi based on Linux. Here, Elinux.org
    has several USB devices that are Raspberry Pi compatible. The list is well ordered,
    and it should help you decide whether your computer is compatible.

    - 6. Update the Pi. Before starting any new project on the Raspberry Pi, it is
    necessary to run an update or upgrade. The justification for this is to guarantee
    that you have compatible and new apps running on your Pi. At times, this may be
    an explanation for hardware not responding as it should to specific commands.


    7. Keyboard Show Character Errors. When the key shown on the screen varies from
    the key pressed on the keyboard, the # key in particular. This error happens most
    of the time due to the default UK keyboard configuration of the NOOBS and Raspbian
    applications.


    *The Solution:*


    You''ll have to change the setup to that of your own keyboard or language to correct
    this. This can be accomplished by going to the configuration menu of the Raspberry
    pi, selecting the keyboard setup menu under the Internationalization menu, and
    scrolling down to pick the keyboard layout that suits your keyboard''s country
    of origin / language.


    Go to Preferences and choose the mouse and keyboard settings if you are operating
    with a display.


    Select a keyboard layout and then select your keyboard layout from the new window.


    6. Not working with HDMI-based monitor, Raspberry Pi


    So you could link via ssh to your Pi, but you can''t seem to get it to function
    with an HDMI display? There are two things you can do:


    - Do an inspection of your HDMI cable

    - Attach the display to the Pi and, before powering up your Raspberry Pi, select
    the correct mode (HDMI or VGA) on the monitor. Ensure your screen is switched
    on before powering the Pi.


    7. Raspberry Pi Non-working camera


    Most people expect the Raspberry Pi camera to function right out of the box, and
    I have had to suggest this easy solution so much that it probably deserves a spot
    on this list.


    It must be allowed on the Pi to be able to use the Pi camera. However, this should
    be accomplished after updating and upgrading the Pi.


    To do this, start by running the commands to update and upgrade:


    ```

    sudo apt-get update

    sudo apt-get upgrade

    ```


    Followed by:


    ```

    sudo raspi-config

    ```


    This will open the configuration window for the Raspberry Pi shown below. Scroll
    down, pick your camera, and then choose Allow. Go to Preferences and choose Raspberry
    Pi Configuration if you are operating with a monitor. Check the Activated Radio
    Button in front of the camera when the configuration window opens. Reboot the
    Pi with it done. You should be able to receive your feeds and images now. If you
    are still unable to access the camera, try a different connector strip and camera.


    Read more on how to use the Raspberry Pi Pi Camera and the Raspberry Pi USB Camera.


    ## 8. Blank or Black Capture with Raspberry Pi Camera


    This describes a situation where a photo will appear to have been taken by the
    Raspberry Pi but the image appears blacked out.


    *The Solution:*


    As described above, due to the software update, several errors on the Raspberry
    Pi will be due and this error is not different. The first fix you can attempt
    is to download and upgrade your Raspberry Pi to get the new updates and improvements.
    After updating to effect improvements, reboot.


    ## 9. Ethernet Off on WiFi


    For example, Wi-Fi access is disabled when an Ethernet cable is linked to the
    Raspberry Pi. This was presumably introduced to disable routing between the Wi-Fi
    and the Ethernet port as a security feature for Pi. A config file called ifplugd,
    which must be disabled if you want to use Wi-Fi and Ethernet at the same time,
    handles this operation.


    To do this, run:


    ```

    sudo update-rc.d networking disable

    ```


    Or


    ```

    sudo apt-get purge ifplugd

    ```


    You should be able to use both network options at the same time now, but do not
    overlook the security vulnerability this might make, as the Pi would behave like
    a router in this mode.


    ## 10. Hangs the Pi Attempting to Change Password


    This applies to a situation where the Pi is either hanging or rejected (i.e. new
    password not registered) by an attempt to alter the password of the Raspberry
    Pi.


    *The Solution:*


    This is one of the indications suggesting that the Raspberry Pi may not get enough
    juice from the attached power supply or that the power supply performance fluctuates
    much. It''s as easy to fix this as switching the power supply to your Raspberry
    Pi or plugging it to another port on your PC.


    This is obviously not an exhaustive list of mistakes that one could find when
    working with the Raspberry Pi. This might give you a head start on the shared
    unique mistake and even related mistakes. Check our Raspberry Pi Projects section
    to get started using Raspberry Pi with cool applications.


    Have you faced a mistake that has taken days to resolve? Feel free to share them
    via the comment section.'
