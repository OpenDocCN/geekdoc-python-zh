    # Functions


    Creating functions is inevitable in any type of application. A function is a block
    of code with an associated name, which receives zero or more arguments as input,
    follows a sequence of statements which executes the desired operation and returns
    a value, and/or performs a task. This block can be called when it is needed. Python
    is a language that gives us a lot of flexibility when creating functions. The
    use of functions is a very important component of the programming paradigm called
    [structured](https://en.wikipedia.org/wiki/Structured_programming), and it has
    several advantages:


    +   - Modularization: allows segmenting a complex program into a series of simpler
    parts or modules, thus facilitating programming and debugging.

    - Reuse: allows the same function to be reused in different programs.


    Python already defines by default a set of functions that we can use directly
    in our applications. You have seen some of them in previous tutorials. For example,
    the function len (), which gets the number of elements in a container object such
    as a list, tuple, dictionary, or set. We have also seen the function print (),
    which displays text on the console.


    However, as a programmer, you can define your own functions to structure the code
    in a way that is more readable and to reuse those parts that are repeated throughout
    an application. This is a critical task as the number of lines in a program grows.


    In principle, a program is an ordered sequence of instructions that are executed
    one after the other. However, when using functions, you can group parts of those
    instructions as a smaller unit that executes those instructions and usually returns
    a result.


    # How to define a function in Python'
- md: "In Python, functions are declared by typing the keyword `def` followed by the\
    \ name of the function and in parentheses, the arguments separated by the commas.\
    \ The `def` statement is a function definition used to create user-defined function\
    \ objects. Next, in another line, indented and after the colon, we would have\
    \ the lines of code that make up the code to be executed by the function:\n\n\
    ```python\ndef my_function(param1, param2):\n    print param1\n    print param2\n\
    ```\n\nWe can also find a text string as the first line of the body of the function.\
    \ These chains are known by the name of docstring (documentation string) and serve,\
    \ as the name suggests, as function documentation.\n\n```python\ndef my_function(param1,\
    \ param2):\n    \"\"\"This function prints the two previous values as parameters.\"\
    \"\"\n    print param1\n    print param2\n```\n\nIt is important to clarify that\
    \ when declaring the function, all we do is associate a name to the code fragment\
    \ that makes up the function so that we can execute said code later by referencing\
    \ it by name. That is, at the time of writing these lines, the function is not\
    \ executed. To call the function (execute your code), you would write:\n\n```python\n\
    my_function(\"hello\", 2)\n```\n\nThe association of the parameters and the values\
    \ passed to the function is normally done from left to right: as we have given\
    \ `param1` a `\"hello\"` value and `param2` is `2`, `my_function` would print\
    \ `hello` on one line, and then `2`. However, it is possible to modify the order\
    \ of the parameters if we indicate the name of the parameter to associate the\
    \ value to when calling the function:\n\n```python\nmy_function(param2=2, param1=\"\
    hello\")\n```\n\nThe number of values that are passed as a parameter when calling\
    \ the function has to match the number of parameters that the function accepts\
    \ according to the declaration of the function. Otherwise, Python will complain:\n\
    \n```python\n>>> my_function(\"hello\")\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: my_function() takes exactly\
    \ 2 arguments (1 given)\n```\n\nTo define functions with a variable number of\
    \ arguments, we put the last parameter for the function whose name must be preceded\
    \ by a `*` sign:\n\n```python\ndef various(param1, param2, *others):\n    for\
    \ val in others:\n        print val\n\nvarious(1, 2)\nvarious(1, 2, 3)\nvarious(1,\
    \ 2, 3, 4)\n```\n\nThis syntax works by creating a tuple (named `others` in the\
    \ example) in which the values of all the extra parameters passed as arguments\
    \ are stored. For the first call, `various(1, 2)`, the `others` tuple would be\
    \ empty since no more parameters than the two defined by default have been passed;\
    \ therefore, nothing would be printed. In the second call, `others` would be `(3,)`,\
    \ and in the third `(3, 4)`.\n\nYou can also precede the name of the last parameter\
    \ with `**`, in which case a dictionary would be used instead of a tuple. The\
    \ keys of this dictionary would be the names of the parameters indicated when\
    \ calling the function and the values of the dictionary, the values associated\
    \ with these parameters. The following example uses the dictionary `items()` function,\
    \ which returns a list of its elements, to print the parameters that the dictionary\
    \ contains.\n\n```python\ndef various(param1, param2, **others):\n    for i in\
    \ others.items():\n        print i\n\nvarious(1, 2, third=3)\n```\n\nIt is important\
    \ to emphasize that defining is not invoking. Let's look at this program:\n\n\
    ```python\ndef square(x):\n    return x ** 2\n```\n\nIf we try to run it, nothing\
    \ will happen at all; well, at least nothing that appears on the screen. Defining\
    \ a function just makes Python silently \"learn\" a calculation method associated\
    \ with the identifier `square`. Nothing else. Let's do the test by running the\
    \ program:\n\n```bash\n$ python square.py\n```\n\nNothing has been printed on\
    \ the screen. It is not that there is no `print`, but that defining a function\
    \ is a process that does not echo on the screen. We repeat: defining a function\
    \ only associates a calculation method with an identifier and does not imply executing\
    \ said calculation method.\n\n## Control Flow\n\nTo ensure that a function is\
    \ defined before its first use, you need to know the order in which the statements\
    \ are executed; this is called the control flow or flow of execution. Execution\
    \ always begins with the first statement in the program. Statements are executed\
    \ one at a time, in order, until a function call is reached. Function definitions\
    \ do not alter the flow of program execution but remember that the statements\
    \ within the function are not executed until the function call is made. Although\
    \ not common, you can define one function within another. In this case, the inner\
    \ function definition is not executed until the outer function is called.\n\n\
    Function calls are like a detour in the flow of execution. Instead of going to\
    \ the next statement, the flow jumps to the first line of the called function,\
    \ executes all the statements it finds there and resumes execution from where\
    \ it left off. This sounds pretty simple ... until you remember that one function\
    \ can call another. While we are in the middle of a function, we might be forced\
    \ to abandon it and go to execute statements in yet another function. But while\
    \ we're in this new role, we might as well go out and run yet another role!\n\n\
    Fortunately, Python is good at taking note of where it is so that every time a\
    \ function completes, the program picks up where it left off in the calling function.\
    \ When it reaches the end of the program, it ends. What is the moral of this whole\
    \ story? When you're reading a program, don't read it from top to bottom. Instead,\
    \ follow the flow of execution.\n\n## Arguments and Parameters\n\nWhen defining\
    \ a function, the values which are received are called parameters, but during\
    \ the call, the values that are sent are called arguments. Some of the internal\
    \ functions require arguments, the values that control how the function performs\
    \ its task. For example, if you want to find the sine of a number, you have to\
    \ indicate what number it is. Thus, `sin()` takes a numeric value as an argument.\
    \ Some functions take more than one argument, such as `pow()`, which takes two\
    \ arguments: the base and the exponent. Inside the function, the values passed\
    \ to it are assigned to variables called parameters. Here's an example of a user-defined\
    \ function, which takes a parameter:\n\n```python\ndef printDouble(step):\n  \
    \  print step, step\n```\n\nThis function takes a single argument and assigns\
    \ it to a parameter called `step`. The parameter value (at this point, we still\
    \ have no idea what it will be) is printed twice, followed by a newline character.\
    \ The name `step` was chosen to suggest that the name you give to a parameter\
    \ is up to you, but in general, it is better to choose a more illustrative name\
    \ than `step`.\n\nThe `printDouble` function works with any type (of data) that\
    \ can be printed:\n\n```python\nprintDouble(\"Ham\")\n```\n\n```\nHam Ham\n```\n\
    \n```python\nprintDouble(5)\n```\n\n```\n5 5\n```\n\n```python\nprintDouble(3.14159)\n\
    ```\n\n```\n3.14159 3.14159\n```\n\nIn the first call to the function, the argument\
    \ is a string; in the second, it is an integer, and in the third, it is a floating-point\
    \ number.\n\nThe same composition rules that apply to internal functions also\
    \ apply to user-defined functions, so you can use any type of expression as an\
    \ argument to `printDouble`.\n\n```python\nprintDouble(\"Ham\" * 4)\n```\n\n```\n\
    Ham Ham Ham Ham Ham Ham Ham Ham\n```\n\n```python\nprintDouble(math.cos(math.pi))\n\
    ```\n\n```\n-1.0 -1.0\n```\n\nAs usual, the expression is evaluated before executing\
    \ the function, so `printDouble` returns `Ham Ham Ham Ham Ham Ham Ham Ham` instead\
    \ of `'Ham' * 4 'Ham' * 4`.\n\nWe can also use a variable as an argument:\n\n\
    ```python\n>>> latoya = 'Dafne, half laurel half nymph'\n>>> printDouble(latoya)\n\
    ```\n\n```\nDafne, half laurel half nymph. Dafne, half laurel half nymph.\n```\n\
    \nNotice an important aspect in this case: the name of the variable that we pass\
    \ as an argument (`latoya`) has nothing to do with the name of the parameter (`step`).\
    \ It doesn't matter what the value was called in its original place (the place\
    \ it was invoked from); here at `printDouble` we call everyone `step`.\n\n## Modules\
    \ and Packages\n\n### Modules\n\nA module allows you to logically organize your\
    \ Python code. Grouping related code within a module makes the code easier to\
    \ understand and use. A module is a Python object with arbitrary named attributes\
    \ that you can bind and reference. Simply, a module is nothing but a file with\
    \ a `.py` extension. A module can define functions, classes, and variables. It\
    \ can also include executable code. Files are their physical counterpart: each\
    \ Python file stored on disk is equivalent to one module. We are going to create\
    \ our first module, then creating a small `module.py` file with the following\
    \ content:\n\n```python\ndef my_function():\n    print \"a function\"\n\nclass\
    \ MyClass:\n    def __init__(self):\n        print \"a class\"\n\nprint \"a module\"\
    \n```\n\nIf we wanted to use the functionality defined in this module in our program,\
    \ we would have to import it. To import a module, use the keyword `import` followed\
    \ by the module name, which consists of the file name minus the extension. You\
    \ can use any Python code file as a module by executing this statement in another\
    \ Python code file. The `import` statement has the following syntax:"
  mdcn: "在Python中，函数通过输入关键字`def`，后跟函数名称，以及括号内用逗号分隔的参数来声明。`def`语句是一个函数定义，用于创建用户定义的函数对象。接下来，在另一行中，缩进并在冒号之后，我们将看到构成函数要执行的代码的代码行：\n\
    \n```python\ndef my_function(param1, param2):\n    print param1\n    print param2\n\
    ```\n\n我们还可以在函数体的第一行找到一个文本字符串。这些字符串被称为文档字符串（docstring），顾名思义，用作文档。\n\n```python\n\
    def my_function(param1, param2):\n    \"\"\"This function prints the two previous\
    \ values as parameters.\"\"\"\n    print param1\n    print param2\n```\n\n需要明确的是，当声明函数时，我们所做的只是将一个名称与构成函数的代码片段关联起来，以便我们可以通过引用该名称来稍后执行该代码。也就是说，在编写这些行时，函数并未执行。要调用函数（执行其代码），你需要编写：\n\
    \n```python\nmy_function(\"hello\", 2)\n```\n\n参数与传递给函数的值的关联通常是从左到右进行的：由于我们给`param1`赋值`\"\
    hello\"`，而`param2`是`2`，`my_function`将在一行打印`hello`，然后在下一行打印`2`。但是，如果我们在调用函数时指定了参数的名称来关联值，则可以修改参数的顺序：\n\
    \n```python\nmy_function(param2=2, param1=\"hello\")\n```\n\n调用函数时作为参数传递的值的数量必须与函数根据其声明所接受的参数数量相匹配。否则，Python会报错：\n\
    \n```python\n>>> my_function(\"hello\")\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: my_function() takes exactly\
    \ 2 arguments (1 given)\n```\n\n要定义具有可变数量参数的函数，我们将函数的最后一个参数的名称前加上`*`符号：\n\n```python\n\
    def various(param1, param2, *others):\n    for val in others:\n        print val\n\
    \nvarious(1, 2)\nvarious(1, 2, 3)\nvarious(1, 2, 3, 4)\n```\n\n这种语法通过创建一个元组（在示例中命名为`others`）来工作，该元组存储所有作为参数传递的额外参数的值。对于第一次调用`various(1,\
    \ 2)`，`others`元组将为空，因为没有传递比默认定义的两个更多的参数；因此，不会打印任何内容。在第二次调用中，`others`将是`(3,)`，在第三次调用中是`(3,\
    \ 4)`。\n\n你也可以在最后一个参数的名称前加上`**`，在这种情况下，将使用字典而不是元组。该字典的键将是调用函数时指定的参数名称，字典的值是与这些参数关联的值。以下示例使用字典的`items()`函数（该函数返回其元素的列表）来打印字典包含的参数。\n\
    \n```python\ndef various(param1, param2, **others):\n    for i in others.items():\n\
    \        print i\n\nvarious(1, 2, third=3)\n```\n\n需要强调的是，定义不等于调用。让我们看看这个程序：\n\
    \n```python\ndef square(x):\n    return x ** 2\n```\n\n如果我们尝试运行它，什么也不会发生；嗯，至少屏幕上不会出现任何内容。定义函数只是让Python默默地“学习”一种与标识符`square`关联的计算方法。仅此而已。让我们通过运行程序来测试一下：\n\
    \n```bash\n$ python square.py\n```\n\n屏幕上没有打印任何内容。并不是没有`print`，而是定义函数是一个不会在屏幕上产生回显的过程。我们重申：定义函数只是将一种计算方法与一个标识符关联起来，并不意味着执行该计算方法。\n\
    \n## 控制流\n\n为了确保函数在第一次使用之前已定义，你需要知道语句执行的顺序；这被称为控制流或执行流程。执行总是从程序中的第一条语句开始。语句按顺序一次执行一条，直到遇到函数调用。函数定义不会改变程序的执行流程，但请记住，函数内的语句在函数被调用之前不会执行。虽然不常见，但你可以在一个函数内部定义另一个函数。在这种情况下，内部函数的定义在外部函数被调用之前不会执行。\n\
    \n函数调用就像是执行流程中的一个绕行。流程不是执行下一条语句，而是跳转到被调用函数的第一行，执行在那里找到的所有语句，然后从离开的地方恢复执行。这听起来很简单……直到你想起一个函数可以调用另一个函数。当我们正在执行一个函数时，我们可能被迫放弃它，转而执行另一个函数中的语句。但当我们在这个新角色中时，我们可能还会出去运行另一个角色！\n\
    \n幸运的是，Python擅长记录它所在的位置，以便每次函数完成时，程序都能在调用函数中从它离开的地方继续。当它到达程序末尾时，它就结束了。整个故事的寓意是什么？当你阅读程序时，不要从上到下阅读。相反，要遵循执行流程。\n\
    \n## 参数与实参\n\n定义函数时，接收到的值称为参数，但在调用期间，发送的值称为实参。一些内置函数需要实参，这些值控制函数如何执行其任务。例如，如果你想求一个数的正弦值，你必须指明是哪个数。因此，`sin()`接受一个数值作为实参。有些函数接受多个实参，例如`pow()`，它接受两个实参：底数和指数。在函数内部，传递给它的值被赋给称为参数的变量。这是一个用户定义函数的示例，它接受一个参数：\n\
    \n```python\ndef printDouble(step):\n    print step, step\n```\n\n这个函数接受一个实参并将其赋给名为`step`的参数。参数值（此时，我们仍然不知道它会是什么）被打印两次，后跟一个换行符。选择名称`step`是为了表明你给参数起什么名字由你决定，但通常来说，选择一个比`step`更具说明性的名称更好。\n\
    \n`printDouble`函数适用于任何可以打印的（数据）类型：\n\n```python\nprintDouble(\"Ham\")\n```\n\n\
    ```\nHam Ham\n```\n\n```python\nprintDouble(5)\n```\n\n```\n5 5\n```\n\n```python\n\
    printDouble(3.14159)\n```\n\n```\n3.14159 3.14159\n```\n\n在第一次调用函数时，实参是一个字符串；在第二次调用时，它是一个整数；在第三次调用时，它是一个浮点数。\n\
    \n适用于内置函数的相同组合规则也适用于用户定义函数，因此你可以使用任何类型的表达式作为`printDouble`的实参。\n\n```python\nprintDouble(\"\
    Ham\" * 4)\n```\n\n```\nHam Ham Ham Ham Ham Ham Ham Ham\n```\n\n```python\nprintDouble(math.cos(math.pi))\n\
    ```\n\n```\n-1.0 -1.0\n```\n\n像往常一样，表达式在执行函数之前被求值，因此`printDouble`返回`Ham Ham Ham\
    \ Ham Ham Ham Ham Ham`而不是`'Ham' * 4 'Ham' * 4`。\n\n我们也可以使用变量作为实参：\n\n```python\n\
    >>> latoya = 'Dafne, half laurel half nymph'\n>>> printDouble(latoya)\n```\n\n\
    ```\nDafne, half laurel half nymph. Dafne, half laurel half nymph.\n```\n\n注意这里的一个重要方面：我们作为实参传递的变量名称（`latoya`）与参数的名称（`step`）无关。它在其原始位置（被调用的位置）叫什么名字并不重要；在这里的`printDouble`中，我们称所有参数为`step`。\n\
    \n## 模块与包\n\n### 模块\n\n模块允许你逻辑地组织你的Python代码。将相关代码分组在一个模块中使代码更易于理解和使用。模块是一个具有任意命名属性的Python对象，你可以绑定和引用这些属性。简单来说，模块不过是一个扩展名为`.py`的文件。模块可以定义函数、类和变量。它也可以包含可执行代码。文件是它们的物理对应物：存储在磁盘上的每个Python文件都等同于一个模块。我们将创建我们的第一个模块，然后创建一个包含以下内容的小型`module.py`文件：\n\
    \n```python\ndef my_function():\n    print \"a function\"\n\nclass MyClass:\n\
    \    def __init__(self):\n        print \"a class\"\n\nprint \"a module\"\n```\n\
    \n如果我们想在程序中使用此模块中定义的功能，我们必须导入它。要导入模块，请使用关键字`import`，后跟模块名称，该名称由文件名减去扩展名组成。你可以通过在另一个Python代码文件中执行此语句，将任何Python代码文件用作模块。`import`语句具有以下语法："
