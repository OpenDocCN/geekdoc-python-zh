    # # RASPBERRY PI


    Learn Fundamentals and Unlock Powerful Hacks of Using Raspberry Pi'
  - '[PAGE 131]


    # # Introduction


    The Raspberry Pi is a low-cost, credit card-sized device that uses a regular keyboard
    and mouse and attaches to a computer monitor or TV. It is a lightweight, capable
    computer that allows individuals of all ages to explore programming and learn
    how to program in languages such as Scratch and Python. From surfing the internet
    and watching high-definition video, to making spreadsheets, word-processing, and
    playing sports, it can do everything you ''d expect a desktop computer to do.


    In addition, the Raspberry Pi has the potential to connect with the outside world
    and has been used in a broad variety of interactive developer ventures, including
    music machines and parent detectors to weather stations and infra-red cameras
    tweeting birdhouses. We want to see children all over the world use the Raspberry
    Pi to learn to program and understand how computers work.


    Raspberry Pi is the name of a collection of single-board computers created by
    the UK charity Raspberry Pi Foundation, which aims to educate kids in computer
    science and make it easier for them to access computer education.


    The Raspberry Pi was introduced in 2012, and several versions and variants have
    since been released. The original Pi had a single-core 700MHz CPU and just 256
    MB RAM, and a quad-core 1.4GHz CPU with 1 GB RAM is available for the new edition.
    For Raspberry Pi, the main price point has always been $35 and all models have
    been $35 or less, including the Pi Zero, which is just $5.


    In order to learn programming skills, create hardware projects, do home automation
    and even use them in industrial applications, people all over the world use Raspberry
    Pi.


    The Raspberry Pi is a very inexpensive machine running Linux, but it also provides
    a set of GPIO (input / output general purpose) pins'
  - '[PAGE 132]


    that allow you to manipulate physical computing electronic components and explore
    the Internet of Things (IoT).


    # What would you do with a Raspberry Pi?


    To learn to code, some people buy a Raspberry Pi, and people who are already able
    to code use the Pi to learn to code electronics for physical projects. Instead
    of using a proprietary closed system, the Raspberry Pi will open up opportunities
    for you to build your own home automation projects, which is common with people
    in the open source community because it puts you in charge.


    # The best Raspberry Pi and Raspberry Pi Zero projects to try


    We recommend buying a Raspberry Pi and letting imagination run wild for those
    wanting to learn more about computers, software creation and creating tiny machines.


    Given what you can do with it, it''s a fairly well-priced product. It can help
    teach coding or be a base for more complex programming. As such, several individuals
    have used the device to create a range of machines and functions, from school
    kids to fully-fledged developers.


    By 2015, more than five million machines had been sold, according to the Raspberry
    Pi foundation, making it one of the best-selling British computers. In schools
    where kids, or older students, can learn computer skills, it is extremely common.


    Unfortunately, it''s also a pretty nifty little package for hackers, partly due
    to its size, portability and strength. But really, it only goes to show how good
    it is. It''s a path into robotics, software creation and a whole range of technological
    skills for the more morally sound consumers, which would otherwise cost thousands
    of pounds in tuition fees.


    If you are looking for inspiration to start your own Raspberry Pi project, then
    you have come to the right spot. To give you some ideas, we have gathered some
    of the best use cases around.


    # Build a portable security box'
  - '[PAGE 133]


    The Pi''s portability and affordability has made it a common instrument for red-teamers,
    penetration testers and other security personnel (people paying to hack into safety
    systems). It''s perfect for sneakily integrating with target networks because
    it has a built-in Ethernet port, minimal power requirements, and the ability to
    run any Linux program.


    Kali, a Linux distribution that is explicitly designed for hacking activities,
    is the program of choice for security operators trying to use Pi in this way.
    For the Raspberry Pi, there''s a purpose-built version of Kali, and installing
    it is pretty easy.


    Not only can you use it in your security operations once you have Kali enabled,
    you can also use it as a safe space to play around with new tools without causing
    harm to your primary computer. However, as always, you should only be hacking
    targets that have given you express authorization.


    # Host a Raspberry Pi platform for Wordpress


    To familiarize yourself with the Raspberry Pi, hosting your own website is a great
    project. You can learn how to work with MySQL, PHP, and Apache applications, as
    well as the practicalities of operating with Linux, by running a Wordpress server.


    Not just that, but you''ll also have a functioning Wordpress website at the end
    of it, which you can use to host your own content! If you want it to be a proper
    website, you will need to register a domain name, but it''s a great place to view
    stuff such as CVs, artistic portfolios or something as basic as a personal blog.


    # Install Windows 10 in full on Raspberry Pi 3


    For installing Microsoft''s operating system on Raspberry Pi 3 Model B or B+ boards,
    you can use the Windows on ARM (WoA) installer, available on GitHub. Previously,
    on Raspberry Pi computers, only stripped-down Windows IoT Core operating systems
    were available, but this new bundle provides complete Windows 10 OS functionality.


    Accessible on GitHub, the installer is optimized for ease of use and convenience,
    requiring bundled binaries and the WoA core kit.'
- md: '## Run IoT Core for Windows 10 on Raspberry Pi


    Would you like to run the Windows 10 Internet of Things version on your Raspberry
    Pi? With Windows 10 IoT Core, the microcomputer will run a stripped back version
    of the operating system.


    While running the full version of the operating system on the Raspberry Pi Model
    B+ would be fantastic, with only 1 GB of RAM and a 1.4 GHz ARM-based processor,
    it doesn''t have the processing power.


    Enter Windows 10 IoT Core, a basic version of the Microsoft OS designed to run
    on less powerful platforms. It''s a lightweight IoT app that enables a single
    UWP app to be run at a time. If you want to commercialize your creations and little
    equipment is required, you don''t need a license.


    First of all, you''ll need a Raspberry Pi 3 and a spare microSD card, plus a separate
    microSD card reader on your Windows device. Visual Studio, text editor, SDKs,
    add-ons, and certificates are also required. This may seem like a lot, but you''re
    not going to have to spend too much money to start running Windows 10 IoT Core.


    Next, you''ll need to set up the Raspberry Pi memory card that you''re using.
    With the Latest Out of Box Program (NOOBS) installer, you can make this simpler.
    Build a bootable card using Microsoft''s IoT Dashboard software from a Windows
    PC or laptop.


    You can now use the Broadcom Raspberry Pi 2 & 3 and OS build options (Windows
    10 IoT Core) to set up the computer, then enter a password, pick a Wi-Fi network,
    and install the OS on the Raspberry Pi-compatible memory card.


    Install this into your Raspberry Pi and then you''re ready to boot the new version
    of Windows IoT Core on your computer.


    ## Set up Raspberry Pi as a server for VPN


    A VPN enables you to disguise your online identity so that when you search the
    internet, download content, or engage in conversations, your actions can not be
    monitored. VPNs can also be used on standard machines, and when using a micro-computer
    such as Raspberry Pi, the procedure is quite the same. There are plenty of Raspberry
    Pi VPN programs available, including Express VPN, HideMy Butt, IPVanish, and SaferVPN.


    But what brings this to the next stage is using your Raspberry Pi as a VPN server
    to create a personal VPN hotspot to prevent any website used on your network from
    transmitting information about your identity. Link it to your router by downloading
    a client on the Raspberry Pi, and your identity will be scrambled until it reaches
    the external network.


    To set up your Raspberry Pi as a VPN server, install Raspbian to access the command
    line first, and then you can install a VPN client using the PiVPN script to secure
    your communications. As your VPN client, we suggest using OpenVPN, although it
    can also be used with lots of others.


    # PART I: THE BOARD


    ## Chapter One


    ### The Raspberry Pi


    #### The Raspberry Pi Components


    The Raspberry Pi is a series of small single-board computers developed by the
    Raspberry Pi Foundation in the United Kingdom to promote fundamental computer
    science teaching in schools and developing countries. The original model became
    much more popular than expected, selling for uses such as robotics outside its
    target market. Peripherals (such as keyboards and mice) and cases are not included
    here. However, in several official and unofficial bundles, several accessories
    are packed.


    Two arms comprise the company behind the Raspberry Pi. The first two versions
    were produced by the Raspberry Pi Foundation. The Foundation founded Raspberry
    Pi Trading after the launch of the Pi Model B. Eben Upton was the CEO at the time.
    The third model, the B+, was further developed by the Foundation. Raspberry Pi
    Trading is responsible for technology growth, while the Foundation is an educational
    charity in schools and developing countries that supports the teaching of basic
    computer science.


    *What''s fresh about the Raspberry Pi 4?*


    - Support for dual display (4K): You can now attach two displays to this desktop
    computer with this feature, and that feature is also available in 4K.

    - Better performance: A new, revamped processor and RAM comes with the new Raspberry
    Pi 4, which guarantees you a new desktop experience.

    - Fast networking: Gigabit Ethernet, along with on-board wireless networking and
    Bluetooth, comes with the Pi 4.

    - RAM: The Raspberry Pi 4 comes in 3 RAM-based variants: 1 GB, 2 GB, and 4 GB.

    - USB 3: The latest Raspberry Pi 4 has improved USB capabilities. You can find
    two USB 3 ports along with two USB 2 ports, which can transfer data up to ten
    times faster.


    ### Technical criteria


    - Broadcom BCM2711, 64-bit SoC @ 1.5GHz Quad-core Cortex-A72 (ARM v8)

    - 1 GB, 2 GB or 4 GB LPDDR4-2400 SDRAM (model dependent)

    - 2.4 GHz and 5.0 GHz

    - Normal 40 pin GPIO header Raspberry Pi (fully backward compatible with previous
    boards)

    - 2 ports for micro-HDMI (up to 4kp60 supported)

    - MIPI DSI 2-lane display port

    - MIPI CSI 2-lane camera port

    - Stereo audio and composite video connector 4-pole

    - H.265 (Decode 4kp60), H264 (Decode 1080p60, Encode 1080p30)

    - Graphics from OpenGL ES 3.0

    - Micro-SD card slot for operating system loading and data storage

    - 5V DC via USB-C connector (minimum 3A *)

    - 5V DC via header GPIO (minimum 3A *)

    - Power over Ethernet (PoE) enabled (separate PoE HAT required)

    - Operating temperature: ambient temperature of 0 to 50 degrees C


    * If downstream USB peripherals consume less than 500mA in total, a good quality
    2.5A power supply can be used.


    ### Configuring the Raspberry Pi 4


    **What you''re going to need**


    - A power supply: Included in the device is a USB Type-C port. With at least 3.0
    A of electricity, you need a power supply.

    - Micro-SD card: You will need this to store your files and the Raspbian OS. The
    minimum storage requirement is 8 GB. Several sellers have micro-SD cards with
    the Raspbian OS pre-installed, so you''re ready to go.

    - Keyboard and Mouse: You need a USB keyboard and a USB mouse to use the Raspberry
    Pi 4. Both are mandatory for the first installation. You can also use the Bluetooth
    keyboard and mouse after setting it up.

    - TV / Computer screen: You need a TV or computer screen and a cable to connect
    the Raspberry and the monitor to display the content within the computer. Pi 4
    can use it if your display has speakers mounted inside it. A micro-HDMI port is
    the port needed here. You will need their respective micro-HDMI converters if
    you have a particular cable, such as regular HDMI, DVI, and VGA cables. If your
    monitor supports VGA, for instance, then use a VGA-to-micro-HDMI adapter with
    it. You will be able to use your VGA cable this way.


    Before setting up the Raspberry Pi 4, these are the basic specifications needed.
    Add-ons including a protective shell, headphones / speakers, and Ethernet cable
    can also be added.


    **Configuring the SD card**


    You should do it yourself if your SD card does not have the Raspbian operating
    system. Using a laptop with an SD card slot mounted is everything you need to
    do. Many of the newest laptops have this feature.


    The best way is by using NOOBS to install the Raspbian operating system.


    ## Why pick a Raspberry Pi?


    Virtually anything can be a Raspberry Pi. What can it be for you?


    That''s the beauty of it: there''s a Raspberry Pi project that is great for you,
    whether you''re a complete novice or a die-hard tech-savvy DIYer. A media center
    software like Kodi or Plex can be put on your smartphone with a few easy clicks
    and a microSD card. The Raspberry Pi can be an arcade with only a little more
    know-how. Get very intense, and link to smart devices, home monitoring equipment,
    LED strips, and more with the Raspberry Pi. It''s truly up to you!


    ## Link to the Pi 4 Raspberry


    Install in the mini system all the necessary components. To ensure that the components
    are safe, the set-up must be performed in a specific order.


    First, insert the micro-SD card into the underside of the Raspberry Pi 4 slot.
    Take your mouse cable''s USB port and attach it to the Raspberry Pi 4 USB port.
    Connect the keyboard in the same way. Make sure that your screen is plugged into
    a socket and switched ON. Use a micro-HDMI cable to connect the TV / computer
    monitor to your laptop, or an adapter if necessary. Insert a female micro-HDMI
    component into the Raspberry Pi port called HDMI0. Attach an Ethernet cable connected
    to a WiFi router or a broadband network to connect Raspberry Pi 4 to the Internet
    via Ethernet. If your screen has speakers embedded in it, the Raspberry Pi will
    use it. You can use external audio devices such as headphones and speakers by
    connecting them through a headphone jack if you do not want to use those speakers
    or there are no speakers on your monitor.


    ## Booting the Raspberry Pi 4


    This machine does not have a power button, so it boots up as soon as you plug
    in the power supply and turn it on.


    You will see the red LED light in the unit glowing. This is a sign that power
    is linked to Raspberry. You will soon be seeing raspberries on the left of your
    screen as it boots up.


    The Raspbian desktop will appear after a couple of seconds.'
  mdcn: '## 在树莓派上运行 Windows 10 IoT Core


    你想在你的树莓派上运行 Windows 10 物联网版本吗？借助 Windows 10 IoT Core，这台微型计算机将运行一个精简版的操作系统。


    虽然在树莓派 Model B+ 上运行完整版操作系统会非常棒，但由于它只有 1 GB 内存和 1.4 GHz 的 ARM 处理器，其处理能力并不足够。


    这时就需要 Windows 10 IoT Core，这是微软操作系统的一个基础版本，专为在性能较低的平台上运行而设计。它是一个轻量级的物联网应用，一次只能运行一个
    UWP 应用。如果你想将你的创作商业化，并且所需设备很少，你不需要许可证。


    首先，你需要一个树莓派 3 和一张备用的 microSD 卡，以及一个连接到你 Windows 设备的独立 microSD 卡读卡器。还需要 Visual
    Studio、文本编辑器、SDK、插件和证书。这看起来可能很多，但你不需要花太多钱就可以开始运行 Windows 10 IoT Core。


    接下来，你需要设置你正在使用的树莓派内存卡。使用最新开箱即用程序（NOOBS）安装程序，你可以简化这个过程。使用微软的 IoT Dashboard 软件从
    Windows PC 或笔记本电脑创建一个可启动卡。


    现在你可以使用博通树莓派 2 & 3 和操作系统构建选项（Windows 10 IoT Core）来设置计算机，然后输入密码，选择 Wi-Fi 网络，并将操作系统安装到树莓派兼容的内存卡上。


    将其安装到你的树莓派中，然后你就可以在你的计算机上启动新的 Windows IoT Core 版本了。


    ## 将树莓派设置为 VPN 服务器


    VPN 使你能够伪装你的在线身份，这样当你搜索互联网、下载内容或进行对话时，你的行为不会被监控。VPN 也可以在标准机器上使用，当使用像树莓派这样的微型计算机时，过程也相当类似。有许多树莓派
    VPN 程序可用，包括 Express VPN、HideMy Butt、IPVanish 和 SaferVPN。


    但将其提升到下一阶段的是将你的树莓派用作 VPN 服务器，以创建一个个人 VPN 热点，防止你网络上使用的任何网站传输有关你身份的信息。通过在树莓派上下载客户端将其连接到你的路由器，你的身份将被混淆，直到它到达外部网络。


    要将你的树莓派设置为 VPN 服务器，首先安装 Raspbian 以访问命令行，然后你可以使用 PiVPN 脚本安装 VPN 客户端来保护你的通信。作为你的
    VPN 客户端，我们建议使用 OpenVPN，尽管它也可以与许多其他客户端一起使用。


    # 第一部分：开发板


    ## 第一章


    ### 树莓派


    #### 树莓派组件


    树莓派是由英国的树莓派基金会开发的一系列小型单板计算机，旨在促进学校和发展中国家的基础计算机科学教学。最初的型号比预期更受欢迎，被用于机器人等超出其目标市场的用途。外设（如键盘和鼠标）和外壳不包括在内。然而，在一些官方和非官方的捆绑包中，会打包一些配件。


    树莓派背后的公司由两个实体组成。前两个版本由树莓派基金会生产。基金会在 Pi Model B 发布后创立了树莓派贸易公司。Eben Upton 当时是首席执行官。第三个型号
    B+ 由基金会进一步开发。树莓派贸易公司负责技术发展，而基金会则是一个在发展中国家学校支持基础计算机科学教学的教育慈善机构。


    *树莓派 4 有什么新特性？*


    - 支持双显示器（4K）：你现在可以将两台显示器连接到这台桌面计算机，并且该功能也支持 4K。

    - 更好的性能：新的树莓派 4 配备了全新的、改进的处理器和内存，为你保证全新的桌面体验。

    - 快速网络：Pi 4 配备了千兆以太网，以及板载无线网络和蓝牙。

    - 内存：树莓派 4 有三种基于内存的版本：1 GB、2 GB 和 4 GB。

    - USB 3：最新的树莓派 4 改进了 USB 功能。你可以找到两个 USB 3 端口和两个 USB 2 端口，数据传输速度最高可快十倍。


    ### 技术规格


    - 博通 BCM2711，64 位 SoC @ 1.5GHz 四核 Cortex-A72 (ARM v8)

    - 1 GB、2 GB 或 4 GB LPDDR4-2400 SDRAM（取决于型号）

    - 2.4 GHz 和 5.0 GHz

    - 标准 40 引脚 GPIO 接头（完全向后兼容以前的板子）

    - 2 个 micro-HDMI 端口（支持高达 4kp60）

    - MIPI DSI 2 通道显示端口

    - MIPI CSI 2 通道摄像头端口

    - 立体声音频和复合视频 4 极连接器

    - H.265（解码 4kp60），H264（解码 1080p60，编码 1080p30）

    - OpenGL ES 3.0 图形

    - 用于操作系统加载和数据存储的 Micro-SD 卡插槽

    - 通过 USB-C 连接器提供 5V DC（最小 3A *）

    - 通过 GPIO 接头提供 5V DC（最小 3A *）

    - 支持以太网供电（PoE）（需要单独的 PoE HAT）

    - 工作温度：环境温度 0 至 50 摄氏度


    * 如果下游 USB 外设总消耗小于 500mA，可以使用质量良好的 2.5A 电源。


    ### 配置树莓派 4


    **你需要准备什么**


    - 电源：设备包含一个 USB Type-C 端口。你需要一个至少提供 3.0 A 电流的电源。

    - Micro-SD 卡：你需要这个来存储你的文件和 Raspbian 操作系统。最低存储要求是 8 GB。一些卖家提供预装了 Raspbian 操作系统的
    micro-SD 卡，这样你就可以直接使用了。

    - 键盘和鼠标：你需要一个 USB 键盘和一个 USB 鼠标来使用树莓派 4。首次安装时两者都是必需的。设置完成后，你也可以使用蓝牙键盘和鼠标。

    - 电视/电脑屏幕：你需要一台电视或电脑屏幕以及一根连接树莓派和显示器的线缆来显示计算机内的内容。Pi 4 可以使用它，如果你的显示器内置扬声器。这里需要的是
    micro-HDMI 端口。如果你有特定的线缆，例如普通 HDMI、DVI 和 VGA 线缆，你需要它们各自的 micro-HDMI 转换器。例如，如果你的显示器支持
    VGA，那么使用一个 VGA 转 micro-HDMI 适配器。这样你就可以使用你的 VGA 线缆了。


    在设置树莓派 4 之前，这些是所需的基本规格。还可以添加保护壳、耳机/扬声器和以太网线等附加组件。


    **配置 SD 卡**


    如果你的 SD 卡没有 Raspbian 操作系统，你应该自己安装。你需要做的就是使用一台带有 SD 卡槽的笔记本电脑。许多最新的笔记本电脑都有这个功能。


    最好的方法是使用 NOOBS 来安装 Raspbian 操作系统。


    ## 为什么选择树莓派？


    几乎任何东西都可以成为树莓派。它对你来说可以是什么？


    这就是它的美妙之处：无论你是一个完全的新手还是一个铁杆的技术爱好者 DIY 爱好者，都有一个适合你的树莓派项目。只需几次简单的点击和一张 microSD 卡，就可以将
    Kodi 或 Plex 等媒体中心软件放在你的智能手机上。只需多一点知识，树莓派就可以成为一个街机。变得非常投入，并将树莓派与智能设备、家庭监控设备、LED
    灯带等连接起来。这完全取决于你！


    ## 连接到树莓派 4


    在迷你系统中安装所有必要的组件。为确保组件安全，必须按特定顺序执行设置。


    首先，将 micro-SD 卡插入树莓派 4 底部的插槽。取出鼠标线的 USB 端口并将其连接到树莓派 4 USB 端口。以同样的方式连接键盘。确保你的屏幕已插入插座并打开。使用
    micro-HDMI 线将电视/电脑显示器连接到你的笔记本电脑，或在必要时使用适配器。将一个母头 micro-HDMI 组件插入树莓派上名为 HDMI0 的端口。将连接到
    WiFi 路由器或宽带网络的以太网线连接到树莓派 4，通过以太网连接到互联网。如果你的屏幕内置扬声器，树莓派将使用它。如果你不想使用这些扬声器或显示器上没有扬声器，你可以通过耳机插孔连接耳机和扬声器等外部音频设备。


    ## 启动树莓派 4


    这台机器没有电源按钮，所以当你插入电源并打开它时，它就会启动。


    你会看到设备中的红色 LED 灯亮起。这是电源已连接到树莓派的标志。你很快就会在屏幕左侧看到树莓派标志。


    几秒钟后，Raspbian 桌面将会出现。'
