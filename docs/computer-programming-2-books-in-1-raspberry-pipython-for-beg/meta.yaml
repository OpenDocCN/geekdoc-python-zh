  md: '# # Chapter Sixteen


    # ## Add-On Hardware


    **The add-on can apply to:**


    +   1. Any third-party software application or script that is applied to a program
    to give it additional functionality and abilities is a software add-on or extension.


    For instance, an excellent example of a software add-on is Adobe Flash, which
    allows users to watch videos or play games on an Internet browser.


    Add-ons are often produced using a software option or via a third-party platform
    by individuals or organizations not associated with the original developer and
    added.


    Note: An add-on is referred to by browsers such as Google Chrome as an extension.


    Tip: An add-in ("in" not "on") refers to additional software giving additional
    features to a software program. For describing a car, an add-in can also be used.


    2. When referring to hardware, any component that improves your computer''s functionality
    or performance is an add-on. Additional RAM, a new CPU, or a faster video card,
    for instance, could all be called add-ons.


