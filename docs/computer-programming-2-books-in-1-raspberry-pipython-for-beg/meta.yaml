    ### 接口选项\n\n此选项允许以不同方式启用或禁用树莓派上可用的接口功能数量。\n\n-   **启用摄像头：** 如果你想使用树莓派摄像头模块，你需要激活它。进入并选择选项以触发它。如果你打算按照我的树莓派延时摄影教程操作，你需要激活摄像头模块。\n\
