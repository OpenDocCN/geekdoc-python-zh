    # Executing the change


    We can really dig in and start changing stuff now that we know what needs to be
    replaced and what to replace it with.


    We need 6 components to be removed: the 3 LEDs and the 3 resistors (R9-R11). Using
    a soldering iron and a pair of needle-nose pliers, they can be removed reasonably
    quickly. These are steps I prefer to follow:


    +   - Apply lead solder to the target modules’ pins. Doing so will clean the joint
    and the melting temperature will usually decrease.

    - Grip the pliers with a goal part.

    - Melt one of the target part’s joints with the soldering iron.

    - Bend the part gently away from the joint when applying heat to the joint. This
    can allow a small bit of the component’s pin in the heated joint to pull out.

    - On the other pad, repeat, going in the opposite direction.

    - Continue back and forth to force out the part.

    - Optionally, to remove excess solder, use a desoldering pump or wick.


    We will insert our new ones once the old components have been removed. I tend
    to work in a sort of "batch" phase with through-hole components:


    +   - Insert a section, being aware of the polarity criteria.

    - Bend the component’s leads at a 45-ish degree angle so that the component without
    solder remains in place. Note: In the future, this will make desoldering this
    part more difficult.

    - Repeat for all components or sizable community.'
