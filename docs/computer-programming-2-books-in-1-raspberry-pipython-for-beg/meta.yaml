    # Time-Lapse Photography command-line


    You simply configure the Raspberry Pi to take a picture at a regular interval
    to produce a time-lapse video, such as once a minute, then use an application
    to stitch the pictures together into a video. There are a few ways to do this.


    # Using the integrated time-lapse mode of Rasipstill


    Rasipstill has a built-in time-lapse mode program that uses the command line switch
    —timelapse (or -tl). The time between shots in milliseconds is the value which
    follows the switch:


    ```

    Rasipstill -t 30000 -tl 2000 -o percentage of images 04d.jpgg

    ```


    Note in the output filename the percentage of 04d: this indicates the point in
    the filename where you want the amount of the frame count to appear. The above
    instruction, for example, produces a capture every two seconds (2000ms), over
    a total duration of 30 seconds (30000ms), called image0001.jpg, image0002.jpg,
    and so on, through to image0015.jpg.


    The percentage of 04d indicates a four-digit number, with added leading zeros
    to make up the number of digits needed. For instance,'
  merge: -1
  pgno: 239
- img_proc: true
  md: 'a percentage of o8d will lead to an eight-digit number. If you don''t want
    leading zeros, you might skip o, too.

    If a timelapse value of o is entered, photographs will be taken as quickly as
    possible by the application. To ensure that exposure measurements can be made,
    remember that there is a minimum enforced delay of approximately 30 milliseconds
    between captures.


    # Cron Use


    Cron is a good way to automate the taking of an image at a regular interval. Open
    the Cron edit table to edit:


    ```

    Crontab -e — e

    ```


    This either asks the editor you want to use or opens it in your default editor.
    If the file is opened in an editor, add the following line to schedule each minute
    to take an image.

    Save and exit and the message should be seen:

    Crontab: new crontab installed:

    Make sure that you use e.g. percent o4d to output each image to a new file with
    raspistill: if you don''t, then raspistill will overwrite the same file every
    time you write an image.


