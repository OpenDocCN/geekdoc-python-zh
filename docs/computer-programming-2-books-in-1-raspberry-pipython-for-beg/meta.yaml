    \ Enter 键，你的 Pi 就会处理剩下的事情。\n\n### 保持流程顺畅的技巧\n\n以下是一些让过程尽可能快的技巧：\n\n-   第 1 步不适用于\
    \ Raspberry Pi 3 用户。目前你无法超频 Pi 3。此外，Pi 3 的开箱即用速度实际上比 Pi 2 建议的超频速度更快。\n-   在输入第\
    \ 4 步命令后，使用键盘上的方向键高亮显示“Advanced Options”并按 Enter。接下来，高亮显示“GL Options”，并选择“Allow”。\n\
    -   在指南的第 7 步中，它说要点击“edit profile”，你实际上需要点击“Profile Editor”，然后双击第一个（也是唯一的）列表项。在“Version\
