    # Chapter Eleven


    ## An Introduction to Python


    What is Python? Python is a popular programming language. It was created by Guido
    van Rossum in 1991. It is used for:


    - Web (server-side) growth

    - App production

    - Mathematics

    - Scripting methods


    What is Python capable of doing?


    - Python can be used to build web applications on a server.

    - Python can be used alongside apps to build workflows.

    - Python can connect to systems in databases. It can read and edit files as well.

    - Python can handle big data and perform complex mathematics.

    - Python can be used for rapid prototyping, or for production-ready software creation.


    And why Python?


    - Python works with Windows, Mac, Linux, Raspberry Pi, etc.

    - Python has a plain syntax equivalent to the language of English.

    - Python has a syntax that enables developers to write fewer lines of programs
    than any other programming languages.

    - Python runs on an interpreter system, meaning that as soon as it is written,
    code can be executed. It ensures that prototyping can be very rapid.

    - Python can be handled in a procedural way, an object-oriented way or a functional
    way.


    ### Great to know


    The most recent big release of Python is Python 3, which we are going to use in
    this tutorial. Python 2, however, is still very popular, despite not being updated
    with anything other than security updates.


    Python will be written as a text editor in this tutorial. In an integrated development
    environment, such as Thonny, Pycharm, Netbeans, or Eclipse, it is possible to
    write Python, which is particularly useful when handling larger Python file collections.


    ### Python Syntax Compared to other programming languages


    Python was developed to be understandable and has some similarities to the mathematically
    inspired English language. As compared to other programming languages that often
    use semicolons or parentheses, Python uses new lines to complete a command.


    Using whitespace, Python relies on indentation to describe scope, such as the
    scope of loops, functions, and classes. For this reason, other programming languages
    also use curly-brackets.


    ### Features of Python programming language


    1. Readable: Python is a very readable language.

    2. Simple to learn: Python is easy to learn because it is an intuitive and high-level
    programming language, which means that the language is easy to understand and
    thus easy to learn.

    3. Cross-platform: Python is open and can be run on different operating systems,
    such as Mac, Windows, Linux, Unix, etc. This makes it a language that is cross-platform
    and portable.'
