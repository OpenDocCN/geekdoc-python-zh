    # # Regular Expressions


    One of the most frequent operations that you have come across is looking for a
    certain pattern/substring in a list, table, or text file.


    This is not difficult if the pattern you are looking for is static, and you know
    it precisely. For example, if you want to find a certain name in a contact list,
    just use functions like `find ()` , which are already included in Python.


    But what happens when the substring you are trying to find has variants in its
    writing? For example, suppose that in a certain text, you want to find how many
    times the name “Händel” appears. Being a Germanic name, in our language, it can
    be written as "Händel," "Handel" or "Haendel". If you only use functions like
    find (), you will have to find each variant of the name separately. What if in
    a binary sequence you want to find all the subsequences of the form 010, 0110,
    01110, 011110, and others? Now you can no longer use the find () method once for
    each case since there are infinite ones. Another way is needed.


    This is where regular expressions come into the picture, a very powerful tool
    that makes it easy to find patterns in text. Regular expressions come from the
    world of theoretical mathematics, specifically the Theory of Formal Languages,
    but they are widely used in programming. Without going into mathematical definitions,
    a regular expression can be thought of as a word, made up of special characters,
    that serves to identify a set of other words.


    I will illustrate it with an example. Let''s go back to the beginning when we
    wanted to find the word Händel in a text. You could search for the three variants
    ("Handel," "Händel" and "Haendel") separately, or you could find another word
    that "encodes" these three variants. In this case, the word that is needed would
    be "$H (a | ä | ae) ndel$" . The vertical bar is a type of metacharacter used
    to separate'
  - '[PAGE 84]


    the possible variants for the expression in parentheses. This word is a regular
    expression, as it identifies a set of other words.


    # Metacharacters


    A regular expression can contain metacharacters, which are symbols that have special
    meaning when placed inside a regular expression. In the previous section, you
    have seen the metacharacter |, which is equivalent to the Boolean expression or
    and is used to separate the alternatives of a word. However, there are many more
    metacharacters. Before we start with the Python examples, I''m going to show you
    some of the most common ones.


    +   - The metacharacter ''?'' indicates "at most one match" of the character that
    comes immediately before. Thus, the expression "obscure" corresponds to the words
    "dark" and "obscure." The expression “(re)? Place” would correspond to “place”
    and “reposition.”

    - The metacharacter ''*'' indicates "zero or more matches" of the character that
    comes immediately before. Thus, the expression "01 * 0" would correspond to the
    words o, 010, 0110, 01110, 011110, etc.

    - The metacharacter ''+'' works similar to the previous one, but indicates "at
    least one match". The expression "01 + o" would now correspond to the words 010,
    0110, 01110, 011110, etc.

    - The metacharacter ''{n}'' indicates "exactly n matches" of the previous character.
    For example, the expression “ab {3} a” would correspond to the word “abba”.

    - The metacharacter ''{n, m}'' indicates “between n and m matches”. If the second
    space is blank, it means "at least n matches". Therefore, the expression "01 {2,4}
    o" would correspond to 0110, 01110, 011110, while the expression "01 {2,} o" would
    accept the words 0110, 01110, 011110, 0111110, ...

    - The metacharacter ''.'' is a wildcard that can be used in place of any other
    character. Thus, in a binary alphabet, the regular'
  - '[PAGE 85]


    expression “01.0” would correspond to the words 0100 and 0110.


    As you have seen in these examples, the parentheses () are also a metacharacter
    and are used to group terms and specify the order of operations. The expression
    “(01) * 0” is not the same as the expression “01 * 0”. The first corresponds to
    the words 0, 010, 01010, 0101010 and others while the second corresponds to the
    words 00, 010, 0110, 01110 ...


    These are the most common metacharacters that you will find when working with
    regular expressions, although there are more. It is important to note that the
    syntax may vary a bit depending on the language and the context in which they
    are applied. Metacharacters can be combined to form more complex expressions.
    For example, the expression “fi. * (A | o)” would correspond to the words that
    begin with “fi” and end with the letter a / o: finite, philosophy, finalize, fixed,
    physical


    # Sets


    A set is a set of characters enclosed in square brackets [] with a special meaning.
    Some of the most frequent are:


    +   - [abc]- searches for a match with any of the characters in parentheses. The
    regular expression "[abc] aa" corresponds to the words aaa, baa, caa. It also
    works with numeric characters.

    - [ak]- searches for a match with any of the alphabetic characters between the
    first (a) and the last (k). The regular expression "[be] a" corresponds to the
    words ba, ca, da, ea, while an expression like "[az.] aa" would correspond to
    words that begin with any letter of the alphabet and end in "aa ".

    - [1-9]- is identical to the previous case, but with numeric characters.

    - [^ abc]- matches all characters that are NOT inside the brackets. Thus, the
    regular expression “. * [^ A]” would correspond to any word that does NOT end
    with the letter “a”.'
