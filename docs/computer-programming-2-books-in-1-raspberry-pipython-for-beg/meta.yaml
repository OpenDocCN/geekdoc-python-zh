  mdcn: "材料本身在过热时偶尔会“飞溅”。这意味着，尤其是对于初学者来说，佩戴防护眼镜是必须的。\n\n此外，大多数焊膏和焊料化合物含有铅和松香等有害元素——在处理焊接工具和材料时，始终明智的做法是佩戴手套，并在开始工作前确保工作区有足够的通风。\n\
    \n## 焊接防护清单\n\n焊接前：\n\n-   仔细阅读所有产品说明和安全建议，确保了解常见风险。\n-   仔细阅读焊料成分列表和文档。如果标签对可能的毒性描述不足，请直接咨询供应商或分销商。\n\
    -   确保工作区域安全、清洁、稳定且远离火源。\n-   检查是否在通风良好、有足够烟雾抽排设备的环境中操作。\n-   始终佩戴防护眼镜，并使用隔热手套处理材料。\n\
    -   检查是否为手头的工作选择了正确的产品形式——烙铁有各种尺寸和功率，大多针对特定类型的应用。\n-   不要使用任何机身、接线或插座有明显损坏的烙铁或其他电气设备。\n\
    -   始终知道最近的灭火器和逃生路线在哪里。\n\n## 焊接过程中：\n\n-   切勿尝试焊接带电/通电的电路、端子、连接点或部件。\n-   将烙铁清洁配件放在手边，例如钢丝球和湿焊海绵，以确保在使用过程中烙铁头尽可能保持无材料堆积。\n\
    -   除了绝缘手柄（有时称为“烙铁杆”）外，切勿用烙铁接触任何东西。\n-   使用镊子和/或手套来固定最近焊接过或正在焊接的表面和部件。\n-   小心可能的熔融合金飞溅，并在熔化焊料时始终佩戴安全眼镜。\n\
    -   不使用时，务必将烙铁放回其支架或底座——切勿直接将其放在工作台面、桌子或工作台上。\n-   如果不小心拉到电缆，请检查支架是否配重合适或足够稳固，不易倾倒——如果发生这种情况，不要试图在烙铁掉落时接住它。\n\
    -   如果被烫伤，立即将烫伤部位放在流动的冷水下冲洗至少10-15分钟，直到采取了必要的急救措施。\n-   如果需要在任何时候无人看管，务必关闭烙铁或焊台的电源插头。\n\
    \n## 第十四章\n\n## GPIO 端口\n\n沿电路板顶边排列的 GPIO（通用输入/输出）引脚是树莓派的一项强大功能。所有现有的树莓派板上都有一个\
    \ 40 引脚的 GPIO 排针（在 Pi Zero 和 Pi Zero W 上未焊接）。在 Pi 1 Model B+（2014年）之前的板子上使用的是较短的\
    \ 26 引脚排针。\n\n## GPIO 引脚\n\n任何 GPIO 引脚都可以在软件中被标记为输入或输出引脚，并用于各种目的。\n\n## GPIO 布局\n\
    \n注意：GPIO 引脚并非按数字顺序编号；GPIO 引脚 0 和 1 存在于面板上（物理引脚 27 和 28），但仅供高级使用。\n\n## 电压\n\n\
    在排针上，有两个 5V 引脚和两个 3V3 引脚，以及许多不可配置的接地引脚（0V）。所有通用的 3V3 引脚都是剩余的引脚，这意味着输出设置为 3V3，输入可承受\
    \ 3V3 电压。\n\n## 输出\n\n可以将指定为输出引脚的 GPIO 引脚设置为高电平（3V3）或低电平（0V）。\n\n## 输入\n\n可以将指定为输入引脚的\
    \ GPIO 引脚读取为高电平（3V3）或低电平（0V）。通过使用内部上拉或下拉电阻，这得以实现。GPIO2 和 GPIO3 引脚具有固定的上拉电阻，但其他引脚可以在软件中设置。\n\
    \n## 更多\n\nGPIO 引脚除了用于简单的输入和输出设备外，还可以用于多种替代功能，其中一些功能在所有引脚上可用，另一些则在特定引脚上可用：\n\n\
    -   PWM（脉宽调制）\n    -   所有引脚上开放 PWM 应用\n    -   GPIO12、GPIO13、GPIO18、GPIO19 的 PWM\
    \ 硬件\n-   SPI\n    -   MISO (GPIO9); SCLK (GPIO11); CE0 (GPIO8), CE1 (GPIO7);\
    \ SPI0: MOSI (GPIO10)\n    -   MISO (GPIO19); SCLK (GPIO21); CE0 (GPIO18); CE1\
    \ (GPIO17); CE2 (GPIO16); SPI1: MOSI (GPIO20)\n-   I2C\n    -   数据: (GPIO2); 时钟:\
    \ (GPIO3)\n    -   EEPROM 数据: (GPIO0); EEPROM 时钟: (GPIO1)\n-   串行通信\n    -   TX\
    \ (GPIO14); RX (GPIO15)\n\n## GPIO 引脚图\n\n重要的是要清楚哪个引脚是哪个。有些人使用引脚标签（例如 RasPiO Portsplus\
    \ PCB 或 Raspberry Leaf 可打印标签）。\n\n在树莓派上，可以通过打开终端窗口并运行 `pinout` 命令来获取有用的参考信息。GPIO\
    \ Zero Python 库提供了此方法，该库默认安装在树莓派 OS 的桌面镜像上，但未安装在 Raspberry Pi OS Lite 上。\n\n##\
    \ 第十五章\n\n## 树莓派（摄像头模块）\n\n为了利用运行在 OpenMAX 之上的 MMAL API，所有应用程序都是从命令行驱动和编写的。MMAL\
    \ API 提供了一个比 OpenMAX 提供的更易于使用的框架。请注意，MMAL 是 Broadcom 独有的 API，仅在 VideoCore 4 系统上使用。\n\
    \n应用程序中最多使用四个 OpenMAX (MMAL) 组件：摄像头、预览、编码器和空接收器。两个应用程序都使用摄像头组件；`raspistill` 使用图像编码器组件；`raspivid`\
    \ 使用视频编码器组件；而 `raspiyuv` 和 `raspividuv` 不使用编码器，直接将它们的 YUV 或 RGB 输出从摄像头组件发送到文件。\n\
    \n预览屏幕是可选的，但可以全屏使用或重定向到屏幕的特定矩形区域。如果禁用预览，空接收器组件用于“吸收”预览帧。即使这些帧不需要显示，摄像头也必须生成预览帧，因为它们用于测量曝光和白平衡设置。\n\
    \n此外，可以跳过文件名选项（在这种情况下会显示预览但不写入文件），或者所有输出都可以重定向到标准输出。\n\n通过在命令行上仅输入程序名称即可访问命令行支持。\n\
    \n设置 > 参见摄像头设置 > 故障排除在此处。\n\n如果摄像头模块工作不正常，可以尝试一系列操作：\n\n-   带状电缆是否连接到摄像头串行接口（CSI），而不是显示器串行接口（DSI）？在任一端口中，带状连接器都适用。摄像头端口靠近\
    \ HDMI 连接器。\n-   所有带状连接器是否牢固就位，并且方向是否正确？它们必须笔直插入孔中。\n-   摄像头模块连接器是否在较小的黑色摄像头模块本身和\
    \ PCB 之间牢固连接？此连接在运输过程中或放置摄像头模块到外壳中时可能会松动。用指甲撬起 PCB 上的连接器，然后轻轻按压重新连接。它会发出非常轻微的咔嗒声。不要用力推；如果无法接合，可能是稍微错位了。\n\
    -   是否已执行 `sudo apt` 和 `sudo apt full-upgrade` 进行升级？\n-   是否已执行 `raspi-config`\
    \ 并允许摄像头模块？\n-   您的电源是否充足？摄像头模块为您的树莓派电源需求增加了 200-250mA。\n\n如果问题仍然存在，请尝试以下操作：\n\
    \n-   错误：找不到命令 `raspistill` / `raspivid`。这可能意味着您的更新/升级以某种方式失败了。再次尝试。\n-   错误：ENOMEM。摄像头模块无法启动。重新检查所有连接。\n\
    -   错误：ENOSPC。摄像头模块可能耗尽了 GPU 内存。在 `/boot/` 文件夹中，搜索 `config.txt`。`gpu_mem` 的选项应至少为\
    \ 128。或者，在 `raspi-config` 的高级部分中，使用内存分配选项进行描述。\n\n如果您已测试了所有上述问题，但摄像头模块仍然无法正常工作，请尝试在我们的论坛上发帖以获取更多支持。\n\
    \n## 命令行常用选项"
