  md: '# Databases


    A database is a file that is organized to store data. Most databases are organized
    like a dictionary in that they are mapped from keys to values. The biggest difference
    is that the database is on disk (or other permanent storage), so it persists after
    the program ends. Because a database is stored in permanent storage, it can store
    much more data than a dictionary, which is limited to the size of memory on the
    computer.


    Like a dictionary, database software is designed to keep data entry and access
    very fast, even for large amounts of data. The database software maintains its
    performance by creating indexes as data is added to allow the computer to quickly
    jump to a particular entry.


    # Database Peculiarities


    However, the types of data and the way they are stored can differ greatly depending
    on the context exactly, and that is why, over time, a number of different models
    have been developed to manage databases.'
