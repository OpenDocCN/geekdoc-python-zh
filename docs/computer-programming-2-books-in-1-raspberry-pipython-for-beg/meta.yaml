    # User List of IRC


    In a network with hundreds of chat rooms, the /list command helps you to find
    only channels with a certain number of participants, a very useful function.


    There are several different channels sponsored by each IRC network. Once you are
    linked, a list of channels on that network can be obtained with the /list command:


    ```

    /listing

    ```


    The listing report shows the name of the site, the number of individuals linked
    to each channel, and often a channel-related statement or explanation. There are
    also thousands of different channels on various topics on larger networks, which
    are also too many to learn, so you can use the following tricks to get listings
    that are actually usable:


    +   - List of sites. By typing /set hold mode on before entering the list command,
    you can get a page by page list. A listing consisting of one screen at a time
    will be given by this option. To switch the page function off, you can type /set
    hold mode off.

    - Min or max. Since there are only one or two people on the vast majority of channels,
    and you typically want to find rooms with a lot of people in them and a lively
    discussion, one of the most helpful things you can do is get a list of channels
    with the "min" option with a minimum number of users. You can limit the listing
    to those with a maximum number of users with the ''max'' option if you want to
    find only sparser spaces.


    ```

    /list -min 30 -min 30

    ```


    ```

    /list -max 5 Max 5

