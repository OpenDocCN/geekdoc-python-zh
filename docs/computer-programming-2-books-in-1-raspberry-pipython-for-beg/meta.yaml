    # # Chapter Five


    # ## Configuring The Network


    This book will demonstrate how to easily configure a static IP address for the
    Raspberry Pi Ethernet port. This makes it far easier to remotely log into it because
    you will already know what your Pi''s IP address is. For PC / Windows users, or
    anyone not familiar with Linux, these are really simple instructions.


    The new PIXEL edition of Raspian has been revised (3/3/2017) by this Instructable.
    The configuration of the network has been changed to use the dhcpcd.config vs
    interfaces file.


    **Hardware:**


    +   - Pi Raspberry

    - Switch network

    - Cables from Ethernet

    - Optional: Wireless USB dongle for Wi-Pi WiFi


    Step 1: Check the existing network configuration. Click settings for Pi Network.
    From the prompt or LXTerminal: instruction, form the ''ifconfig'' command. The
    current network settings will be shown with this instruction.


    Step 2: Existing Network Configuration Backup. If you are new to Linux, it is
    a good idea to back up the dhcpdc.conf file:


    ```

    /etc / dhcpcd.conf sudo cp /etc / dhcdcp.backup

    ```


    This will allow you to roll back any modifications you make.


    Step 3: Change Network Configuration'
  - '[PAGE 186]


    # Modify Settings for Network


    You must edit the dhcpcd.conf file to set up a static IP address in order to edit
    the network settings. You may use the following command to load the file into
    the file update editor:


    ```

    Nano /etc / dhcpcd.conf sudo

    ```


    To set an Ethernet port (etho) to a static IP address, place these lines at the
    top of the file:


    The etho interface


    ```

    Static IP address=10.11.44.124/244=10.11.44.124/244

    10.11.44.14.14 static routers= static routers

    Static server domain name=172.16.33.855

    ```


    Set the address (IP address) to the IP address that you want the Raspberry Pi
    to carry. Configure the value of the router to the gateway address. If available,
    set your name servers to domain name servers. Use ctrl x once the file has been
    changed to save and exit.


    Step 4: Launch the Raspberry Pi again. Restart the Raspberry Pi. Once you have
    modified the dhcpcd file, you must restart the Raspberry Pi to make the changes
    successful.


    Step 5: Verify the Configuration of the New Network. Perform a Network Configuration
    Test. Use the "ping" command to check that the Raspberry Pi is on the network
    and that the network is still talking to another device.


    If you find it difficult to ping other machines on the network, try the following:


    +   1. Confirm that the Raspberry Pi and the network switch are securely linked
    to the Ethernet cable.

    2. Confirm the correctness of the IP address, mask, and gateway.

    3. If a Windows machine is pinged, often the security setting prevents a ping
    request from responding.'
  - '[PAGE 187]


    # Networking (Wired)


    You must spend less time on social media if you want to write code, and spend
    more time breaking things or leaving your comfort zone. Here''s a quick shopping
    list to get connected to your laptop with your Raspberry Pi:


    +   - Two 1 foot Ethernet link cables. (These are called "repair cables." If one
    splits, always buy them in pairs.)

    - A Crossover Converter. (In this shot, I don''t know why it is red. The one I
    got was black. You will find it in that color, I''m sure.)

    - USB / Ethernet Realtek adapter. (CableMatters sells this, but it appears in
    ipconfig as "Realtek USB GbE Family Controller." Plus, if you need to plug in
    your cursor, there are several additional USB ports.)


    Since Medium has difficulty embedding images into lists, after this numbered list,
    I''ll need to post my screenshots.


    +   1. Using a straight Ethernet Cable, link your Raspberry Pi using the PC Ethernet
    Port. It ought to be fairly obvious. Connect the USB-Ethernet Adapter to the Crossover
    Adapter, then connect the adapter''s Ethernet port to the one on the Pi. To make
    sure things are related, make sure you hear the "click".

    2. Open Settings for Windows. Click the Windows menu as we''re using Windows 10,
    and then pick the Settings gear icon.

    3. Open Sharing Center and Network. To get there, click on "Network & Internet"
    in Settings. You can see the "Ethernet" tab on the left side if you have your
    Ethernet plugged in. Click on it. There should be a section on the right side
    called "Connected Settings" with a link that says "Network and Sharing Hub." Click
    it.

    4. Modify the settings for sharing Wi-Fi. Wait, why am I playing with the Wi-Fi
    settings? (Seriously.) I don''t want to touch it, I might break it! That''s what
    I do, but, contrary to what it sounds, for Internet Link Sharing (ICS) to work,
    you need to change your Wi-Fi sharing settings. I ran into all kinds of things
    online where people were moaning about how their Ethernet settings had changed,
    but nothing'
