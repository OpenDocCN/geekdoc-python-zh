    ## 数据库的特殊性


    然而，数据的类型及其存储方式会因具体应用场景而有很大差异，这就是为什么随着时间的推移，人们开发了多种不同的模型来管理数据库。


    - 层次型：数据以倒置树的形式组织，采用父节点可以拥有多个子节点的模型。

    - 网状型：层次模型的改进版，允许子节点拥有多个父节点。

