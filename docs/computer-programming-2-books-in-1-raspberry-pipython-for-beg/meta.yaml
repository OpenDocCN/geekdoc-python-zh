    # # Chapter Seven


    # ## Advanced Raspberry Pi Configuration


    When you install Raspbian, the ''RasPi Config'' tool is the first thing you''ll
    see. It allows the device to be configured, which would otherwise be trickier
    in the Linux world.


    *Why does the tool ''RasPi Config'' come first?*


    Tasks such as setting the date and time or regional settings for your keyboard
    are frequently performed without dialogs in a command-line interface, no extra
    support for a demanding novice.


    For the Pi and Raspbian itself, there are several other details, such as: the
    ability to easily activate over-scan for your TV; change the memory split to the
    computer / graphics card or even overclock your device to make it a little faster;
    allow remote SSH access to the system; among other things, avoid booting the system
    into the desktop environment.


    *Mastering the tool for configuration*


    +   1. Open the tool with raspi-config


    Double-click your desktop''s LXTerminal icon. This will open the prompt command,
    where you can run the configuration tool. You will need to execute an order to
    do this:


    ```

    Raspi-config sudo

    ```


    You can not necessarily see it being typed when asked for your password. If you
    have entered a password and pressed Enter to submit it, you will be shown the
    configuration page.'
