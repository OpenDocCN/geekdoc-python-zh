  mdcn: '语言）到机器语言本身。汇编语言仍然接近机器语言，尽管它们大大简化了编程过程，但仍保留了其两个主要缺点。


    这就是为什么人们尝试创建一种新的语言，这种语言不是直接基于机器自身的指令（不依赖于特定的机器），而是基于这些指令的抽象，并且对程序员来说更舒适。同样，物理设备（寄存器、内存单元等）不会被直接使用，而是使用它们的抽象（变量）。这样，一种新的编程语言概念就出现了，每种语言都有一个与之关联的抽象机器，你的代码可以在其上运行。


    如果我们想在特定计算机上运行用高级语言编写的程序，我们必须将它们翻译成特定机器代码的等效形式（手动或通过称为编译的过程），或者拥有一个读取程序并逐步解释程序中每个句子含义的工具（解释过程）。沿着这个方向，在1954年至1958年间，约翰·巴库斯领导了一个工作组，旨在实现一个数学公式的机器代码翻译器，以表达计算。结果既是高级语言Fortran的规范，也是实现了一个将该语言翻译成特定计算机（IBM
    704）机器代码的编译器。


    大约在1960年，三种决定性的语言被创造出来：Algol 60、Cobol和Lisp。1958年，由约翰·麦卡锡设计的Lisp是一种非常创新的语言，因为它远离了冯·诺依曼的机器概念。它几乎完全基于函数和lambda演算的使用，其主要目的是符号演算。它是所谓的函数式语言的先驱。这种语言在人工智能领域得到了广泛应用。1959年，美国国防部委托开发了Cobol。其目标显然是实用性的，尽管它在开发时没有考虑到当时编程语言设计的一些进展，但在数据处理方面具有创新性。它也是第一种标准化语言，这有利于其后来的使用。1960年，Algol
    60主要是一种学术语言，引入了许多创新概念，并被许多后来的语言所采用。该语言完全用BNF表示法规范，这是一种等同于上下文无关文法的形式主义。早在1964年，Basic诞生了。这种语言是从用户的角度设计的。也就是说，该语言旨在易于学习和使用。这种语言在教学中非常成功，尤其是在早期微型计算机的编程中，但在专业环境中很少使用。鉴于上述情况，Simula于1967年在Algol
    60的基础上开发出来。


    Pascal诞生于1970年左右，是在软件危机之后。尼克劳斯·维尔特创造了一种简单明了的语言，使我们能够应对当时日益复杂的程序。它是第一种完全基于结构化编程的语言，由于其简单性，它已成为开发语言语义和形式验证的理想语言，其起源也可以追溯到这些年。此外，Pascal是后来语言的良好先驱。在这个意义上，维尔特后来设计了Modula-2语言，它建立在Pascal引入的许多概念之上，尽管他强调将程序理解为一组独立模块的构建。在Pascal之后，开发了多种语言，包括C，它以较低的抽象级别为代价，提供了对机器资源的巨大灵活性和控制。并发编程的概念也大约在这个时候出现。第一种逻辑编程语言Prolog于1975年由Kowalski和Colmerauer小组开发。然而，与其他语言不同的是，它的孕育期相当长。可以认为Prolog的起源是在1960年。像Lisp一样，Prolog远离冯·诺依曼机器的概念，它几乎完全基于一阶逻辑。Prolog相对于其他语言有一个重要优势，即由于其逻辑基础，程序的验证几乎是即时的；然而，它的缺点是通常效率相当低。


    1983年，Ada诞生了，这是一种在美国国防部支持下开发的语言。它在很大程度上基于Pascal，尽管它更复杂。它使我们能够恰当地处理并发编程和异常处理，并引入了重载的概念。


    目前，有大量的新语言（C++、Java、Modula-3、Oberon、Delphi、Eiffel...）。大多数是这里介绍的语言的演变，并添加了上述一些概念，如面向对象、异常处理、重载、模块化等。


    Python是当今使用最广泛的编程语言之一，并且趋势持续上升。它拥有一切：它是开源的，语法简单易懂，从而节省了时间和资源。它是编程世界中入门的最佳语言之一。Python是一种通用语言，可以有多种应用，例如人工智能，这要归功于Keras或TensorFlow等库。它也可以用于大数据应用，这要归功于数据处理库。这种编程语言也用于Web开发，特别是由于其Django或Flask框架。举几个例子，SemRush或Reddit网站就是用Python开发的。


    ## Python语言


    它是一种高级编程语言（远离机器语言）。它是一种平台无关的面向对象的脚本语言，旨在执行任何类型的程序，从Windows应用程序到网络服务器甚至网页。它是一种解释型语言，这意味着不需要编译源代码即可执行，这提供了开发速度快等优点，但也存在速度较慢等缺点。


    该语言的创造者是一位名叫Guido Van Rossum的欧洲人。Van Rossum的目标是满足对一种用户友好的面向对象语言的需求，这种语言可用于处理通常在Unix中使用C进行的编程中的各种任务。Python的开发持续了几年，在此期间他为多家美国公司工作。到2000年，它已经是一个相当完整的产品，并且有一个开发团队，他甚至与之在商业项目上合作。他目前在Zope工作，这是一个内容管理平台和Web应用程序服务器，当然，完全用Python编程。


    它的总体目的是创建各种程序。它不是专门为Web创建的语言，尽管其功能包括开发页面。Python版本可在许多不同的计算机系统上使用。它最初是为Unix开发的，但只要为该系统编程了解释器，任何系统都与该语言兼容。它是一种解释型语言，这意味着代码在执行前不需要编译。当进行编译时，它是以对程序员透明的方式进行的。在某些情况下，当代码首次执行时，会产生一些字节码并保存在系统中，用于加速解释器每次执行相同代码时进行的隐式编译。Python有一个命令行解释器，你可以在其中输入语句。每条语句都会执行并产生可见的结果，这可以帮助我们更好地理解语言并快速测试执行代码片段的结果。


    Python支持面向对象编程；在许多情况下，这是一种创建具有可重用组件的程序的简单方法。它本身包含许多函数，用于处理字符串、数字、文件等。此外，还有许多库可以导入到程序中，以处理特定主题，如窗口编程或网络系统，或者像创建.zip压缩文件这样有趣的事情。值得注意的是，Python具有非常直观的语法，这要归功于强制性的缩进表示法（带边距）。在许多语言中，使用花括号或begin和end关键字等元素来分隔代码部分。在Python中分隔代码部分，必须向内制表，为将进入函数或循环的代码设置边距。这有助于所有程序员采用相同的表示法，并确保每个人的程序看起来非常相似。


