    # # Chapter Nine


    # ## The Pi as A Productivity Machine


    The Raspberry Pi’s versatility as a low-power, general-purpose desktop computer
    makes it a good choice. While it can never produce the same output level as a
    typical desktop or laptop, its low cost and environmentally friendly power usage
    helps to compensate for any issues with slower performance.


    The Raspbian operating system includes the popular Libre Office productivity suite
    as a standard, available from the Raspberry Pi website. This equals all the resources
    that you would expect to find in a commercial product such as Microsoft Office:
    word processor, spreadsheet, database, presentation tool, and even diagram or
    mathematical formula development applications. Alternatively, via the web browser,
    you will use much of the same cloud-based applications as you can use on any other
    device.


    The Pi can be used as a day-to-day computer for office and school work, using
    any of the methods mentioned in this chapter, locally installed applications or
    cloud-based services, while not damaging its usability as a forum for programming
    and experimentation.


    *A tip*


    It is a smart idea to use more of the memory for general-purpose use and less
    for the graphics processor if you intend to use the Pi as a pure productivity
    computer. Refer to Chapter 6, ''The Raspberry Pi Configuration Tool,'' to find
    out how to modify this division.


    A broad range of options are now provided by cloud computing services, from the
    basics of storage, networking, and processing capacity to natural language processing
    and artificial intelligence and traditional office applications. The cloud can
    now provide almost any'
  - '[PAGE 203]


    service that doesn''t need you to be physically close to the computer hardware
    you are using.


    # Cloud-Based Applications Use


    What are some cloud computing examples?


    A large range of services are underpinned by cloud computing. This includes customer
    services such as Gmail or the cloud backup of images on your mobile, but also
    services that allow large corporations to host all their data and operate all
    their cloud apps. To run its video streaming service and its other business systems,
    Netflix depends on cloud storage resources, as well as a variety of other organizations.


    For many applications, cloud computing is becoming the default option: software
    vendors are gradually selling their apps over the internet as services rather
    than standalone products as they attempt to move to a subscription model. Cloud
    computing, however, has a possible drawback, in that it may also add additional
    costs and new risks for businesses using it.


    Why is it called computing in the cloud?


    A fundamental idea behind cloud computing is that the position of the service
    is completely irrelevant to the customer and many of the specifics, such as the
    hardware or operating system on which it runs. With this in mind, the metaphor
    of the cloud was taken from the old schematics of the telecommunications network,
    in which the public telephone network (and later the internet) was often depicted
    as a cloud to suggest that it didn''t matter — it was just a cloud of stuff. This,
    of course, is an over-simplification; the position of their facilities and data
    remains a key problem for many consumers.


    What is the history of computing on the cloud?


    Since the early 2000s, cloud computing as a word has been around, but the idea
    of computing-as-a-service has been around for much, much longer—as far back as
    the 1960s, when computer offices would enable businesses to rent time on a mainframe
    instead of purchasing one themselves.'
- md: 'These ''time-sharing'' services were largely overtaken by the advent of the
    PC, which made it much more accessible to own a computer, and then in turn by
    the rise of corporate data centers where massive quantities of data can be processed
    by businesses.


    But again and again, in the application service providers, utility computing,
    and grid computing of the late 1990s and early 2000s, the idea of renting access
    to computing power has resurfaced. Cloud computing preceded this, which really
    took hold with the advent of applications such as Amazon Web Services as a service
    and hyperscale cloud computing providers.


    ## How critical is the cloud?


    According to research from IDC, building the infrastructure to sustain cloud computing
    now accounts for more than a third of all IT spending worldwide. Meanwhile, as
    computing workloads continue to migrate to the cloud, spending on conventional,
    in-house IT continues to slide, whether that be public cloud services provided
    by providers or private clouds created by companies themselves.


    # PART III: PROGRAMMING THE PI


    ## Chapter Ten: An Introduction to Scratch


    Scratch is based on a graphical user interface that makes it unnecessary for complex
    language syntax or general code-typing. The ability to help provide beginners
    with their first programming experience is first and foremost. This is why providing
    a range of functions still takes precedence over the factor of simple usability.
    However, despite these limitations, as the following list indicates, Scratch has
    some of the essential properties of conventional programming paradigms. There
    are:


    - *Visual:* All Scratch elements are represented, for example, by an understandable
    graphical representation of program commands via image blocks. In addition, they
    can be inserted and placed together conveniently via drag-and-drop.

    - *Object-orientated:* There are neither classes nor an inheritance scheme for
    Scratch programming. However, Scratch shows characteristics of the object-oriented
    programming concept with elements such as data encapsulation (controlled access
    to data through specified interfaces) or polymorphism (objects may assume different
    data types).

    - *Imperative:* The imperative programming paradigm is accompanied by some of
    the scripts that are made available to you to program from Scratch. Instruction
    sequences, therefore, determine in which series what acts are to be performed.

    - *Event-oriented:* As soon as the event specified in its header block occurs,
    any script that you use in a Scratch project begins. The loading of a project
    can also be postponed until the occurrence of a particular event by using a "Wait
    Until" block.

    - *Parallelism-supporting:* From the beginning, Scratch advocates the distribution
    of computer programs into individual sub-components that separate the concept
    of parallel programming.


    There are the following characteristics concealed behind other available menu
    items:


    - *Develop:* The core component of the Scratch web project is the graphical development
    environment that you launch via the "Development" tab. You program all of your
    Scratch applications directly into the browser with the help of this web editor.

    - *Explore:* In this folder, you can call up other users'' projects. You can not
    only replay but also display all of the Scratch programming by doing so. In a
    "Studio", designs of a similar nature merge.

    - *Ideas:* The ''Ideas'' section gives you access to numerous tutorials and guides
    that help you create your own projects, particularly when it comes to brainstorming.
    A redirect link for downloading the Scratch software (Windows 10, macOS, ChromeOS,
    Android) can also be found here, enabling you to program without needing an active
    Internet connection.

    - *About Scratch:* If you click on the ''About Scratch'' menu item, you will be
    led to the general Scratch project details tab. You can find links to help information
    materials for parents and teachers, as well as tips and a FAQ section, among other
    items.


    ## Understanding the Scratch Editor: Scratch coding functions like this


    Scratch''s development environment is reminiscent of a building block for the
    homepage, which is not so surprising given the block-nature of the script available.
    You can also add costumes and sounds to a project in addition to these scripts,
    which make up most of the functional components, which you can then manage or
    execute via script. The range of scripts can be expanded by clicking on "Add Extension"
    with, for example, a pencil, video recording code or a text-to-speech feature.


    ### Tip


    Scratch gives you a range of costumes, sounds, and scripts that you can instantly
    implement into your projects. Alternatively, if the required element is not included
    in the available content, you can also import or record your own images or sounds.
    Your own scripts can be produced as well.


    ## Costumes: Bring figures and objects to life


    A game, video or animation, or maybe even a basic comic, whatever you would like
    to program from Scratch: figures and other items are the central building blocks
    for your plot. You can pick and incorporate any number of graphics into your project
    under the ''Costumes'' tab. Choose from the image options available, draw objects
    by hand, or import graphics stored locally. If your computer has a camera, you
    also have the option of taking a picture.


    ### Scratch: Menu for Costume Collection


    Later, objects or figures in various poses give you the option of creating sequences
    of motion.


    You can then customize it if you have chosen a costume. To do this, select the
    desired object (where you can delete it at any time by clicking the Recycle Bin
    icon) in the left-hand menu and use the available editor tools to change colors,
    delete unique information with an eraser, add text or warp the object. It is also
    possible to transform the graphic to a raster or vector graphic. You can name
    the costume in the ''Costume'' sector, which the respective scripts later need
    as reference values.


    ### Scratch: Editor for costumes


    We have changed the appearance of the figure in this example Scratch tutorial
    through its fill color.


    Notice the "Choose a Background" button on the lower right edge of the display.
    With this choice, you decide the background picture of your project. Scratch has
    their own selection of stock images, or you can import your own images, or even
    paint your own background.


    ### Scratch-Tutorial: Background picture figure


    You can shift or change the context in Scratch coding using scripts, just as with
    objects and figures.


    ## Sounds and songs in the background


    The right soundtrack is just as important as objects and figures for many artistic
    ventures. You introduce and control all sounds through the menu of the same name
    while programming with Scratch. On the one side, as with the graphic elements,
    you have a variety of pre-created Scratch sounds available to you for this purpose,
    which you can access through "Choose Sound." On the other hand, there is an opportunity
    to import or record sounds, provided you have a microphone attached.


    ### Menu to record sounds using Scratch


    As soon as you press the record button, the recording of a new Scratch sound begins.


    In the left-side menu, inserted sounds can be picked by clicking on the corresponding
    thumbnail and then modified in different ways. You may, for example, cut out selected
    sequences, change the volume, or increase or decrease the play speed, among other
    things. Since sounds are inserted through scripts into the Scratch project, each
    sound often needs a unique name that you can assign in the "Sound" area.


    ### Scratch-Tutorial: Window to edit a sample sound


    Pick these by keeping the left mouse button from the desired starting point and
    dragging the selection screen to the desired endpoint if you want to take out
    sequences or just edit selected pieces.


    ## Scripts: the nature of coding with Scratch


    It is important to practice handling the Scratch scripts in order to program with
    Scratch successfully. The actual code behind these scripts is created automatically,
    regardless of whether it''s an event, method, operator or a variable, as soon
    as you drag the available blocks into your project. You should concentrate on
    integrating individual values and the respective graphic and sound components
    into the respective scripts.'
  mdcn: '这些“分时”服务很大程度上被个人电脑的出现所取代，个人电脑使得拥有计算机变得更加普及，随后又被企业数据中心的兴起所取代，企业数据中心可以处理海量数据。


    但一次又一次，在20世纪90年代末和21世纪初的应用服务提供商、效用计算和网格计算中，租用计算能力的想法再次浮现。云计算早于此，它真正兴起于诸如亚马逊网络服务（Amazon
    Web Services）等服务以及超大规模云计算提供商的出现。


    ## 云计算有多关键？


    根据IDC的研究，构建支撑云计算的基础设施目前占全球所有IT支出的三分之一以上。与此同时，随着计算工作负载持续向云迁移，传统的、内部部署的IT支出持续下滑，无论是由提供商提供的公共云服务，还是企业自己创建的私有云。


    # 第三部分：为树莓派编程


    ## 第十章：Scratch入门


    Scratch基于图形用户界面，使得复杂的语言语法或通用的代码输入变得不必要。首要的是帮助初学者获得他们的第一次编程体验。这就是为什么提供一系列功能仍然优先于简单易用性的因素。然而，尽管存在这些限制，如下列表所示，Scratch具备传统编程范式的一些基本属性。它们是：


    - *可视化：* 所有Scratch元素都通过图像块以易于理解的图形表示来呈现，例如程序命令。此外，它们可以通过拖放方便地插入和组合在一起。

    - *面向对象：* Scratch编程既没有类也没有继承方案。然而，Scratch通过诸如数据封装（通过指定接口控制对数据的访问）或多态性（对象可以呈现不同的数据类型）等元素，展示了面向对象编程概念的特征。

    - *命令式：* 命令式编程范式伴随着一些可供你从Scratch开始编程的脚本。因此，指令序列决定了在哪个系列中执行什么操作。

    - *事件导向：* 一旦其头部块中指定的事件发生，你在Scratch项目中使用的任何脚本都会开始。通过使用“等待直到”块，也可以将项目的加载推迟到特定事件发生时。

    - *支持并行：* 从一开始，Scratch就倡导将计算机程序分解为单独的子组件，这体现了并行编程的概念。


    其他可用菜单项背后隐藏着以下特性：


    - *开发：* Scratch网络项目的核心组件是通过“开发”选项卡启动的图形开发环境。借助这个网络编辑器，你可以直接在浏览器中编写所有的Scratch应用程序。

    - *探索：* 在此文件夹中，你可以调用其他用户的项目。你不仅可以重放，还可以通过这样做显示所有的Scratch编程。在“工作室”中，类似性质的设计会合并在一起。

    - *创意：* “创意”部分为你提供了大量教程和指南，帮助你创建自己的项目，特别是在头脑风暴方面。这里还可以找到下载Scratch软件（Windows 10、macOS、ChromeOS、Android）的重定向链接，使你无需活动互联网连接即可编程。

    - *关于Scratch：* 如果你点击“关于Scratch”菜单项，你将被引导至Scratch项目详情的通用选项卡。你可以找到指向家长和教师帮助信息材料的链接，以及提示和常见问题解答部分等。


    ## 理解Scratch编辑器：Scratch编码的工作原理


    Scratch的开发环境让人联想到主页的构建块，考虑到可用脚本的块状特性，这并不奇怪。除了这些构成大部分功能组件的脚本外，你还可以为项目添加造型和声音，然后你可以通过脚本管理或执行它们。通过点击“添加扩展”，可以扩展脚本的范围，例如添加铅笔、视频录制代码或文本转语音功能。


    ### 提示


    Scratch为你提供了一系列造型、声音和脚本，你可以立即将它们应用到你的项目中。或者，如果所需元素不包含在可用内容中，你也可以导入或录制自己的图像或声音。你也可以制作自己的脚本。


    ## 造型：让角色和对象活起来


    游戏、视频或动画，或者可能只是一个基础漫画，无论你想从Scratch开始编程什么：角色和其他物品是你情节的核心构建块。你可以在“造型”选项卡下选择并添加任意数量的图形到你的项目中。从可用的图像选项中选择，手绘对象，或者导入本地存储的图形。如果你的电脑有摄像头，你还可以选择拍照。


    ### Scratch：造型集合菜单


    稍后，各种姿势的对象或角色为你提供了创建动作序列的选项。


    如果你选择了一个造型，然后可以对其进行自定义。为此，在左侧菜单中选择所需的对象（你可以随时点击回收站图标删除它），并使用可用的编辑器工具更改颜色、用橡皮擦删除特定信息、添加文本或扭曲对象。也可以将图形转换为栅格或矢量图形。你可以在“造型”区域为造型命名，相应的脚本稍后需要这些名称作为参考值。


    ### Scratch：造型编辑器


    在这个示例Scratch教程中，我们通过填充颜色改变了角色的外观。


    注意显示屏右下角的“选择背景”按钮。通过这个选择，你决定了项目的背景图片。Scratch有自己的库存图片选择，或者你可以导入自己的图片，甚至绘制自己的背景。


    ### Scratch教程：背景图片角色


    你可以使用脚本在Scratch编码中移动或更改上下文，就像处理对象和角色一样。


    ## 背景中的声音和歌曲


    对于许多艺术创作来说，合适的配乐与对象和角色同样重要。在使用Scratch编程时，你通过同名菜单引入和控制所有声音。一方面，与图形元素一样，你有各种预先创建的Scratch声音可供使用，你可以通过“选择声音”访问它们。另一方面，如果你连接了麦克风，就有机会导入或录制声音。


    ### 使用Scratch录制声音的菜单


    一旦你按下录制按钮，新的Scratch声音录制就开始了。


    在左侧菜单中，插入的声音可以通过点击相应的缩略图来选择，然后以不同的方式进行修改。例如，你可以剪切选定的序列、更改音量或增加或减少播放速度等。由于声音是通过脚本插入到Scratch项目中的，因此每个声音通常需要一个唯一的名称，你可以在“声音”区域分配。


    ### Scratch教程：编辑示例声音的窗口


    如果你想剪切序列或只是编辑选定的部分，请从所需起点按住鼠标左键并将选择屏幕拖动到所需终点来选择它们。


    ## 脚本：Scratch编码的本质


    为了成功使用Scratch编程，练习处理Scratch脚本非常重要。无论它是事件、方法、运算符还是变量，一旦你将可用的块拖入项目中，这些脚本背后的实际代码就会自动创建。你应该专注于将各个值以及相应的图形和声音组件集成到相应的脚本中。'
