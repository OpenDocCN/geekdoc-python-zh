    Therefore the following messages contain errors:


    ```

    Message1 = "Hello world"

    Message2 = ''Hello, world''

    Message3 = ''His name is John O\''Connor''

    ```


    Counts the number of single quotes in the message 3. For this to work correctly,
    we will have to save the apostrophe. Or rewrite the phrase as:


    ```

    Message3 = ''His name is John O ` Connor''

    ```


    Print is a command that prints objects in textual form. Combining the print command
    with a text string produces a statement.


    You will use the print command in this way in cases where you want to generate
    information that needs to be manipulated immediately. Sometimes, however, you
    will create information that needs to be saved, sent to someone else, or used
    as input for further processing by another program or set of programs. In these
    cases, we will want to send information to files on the hard drive instead of
    sending it to the output command panel. Write the following program in your text
    editor and save it as file-output.py


    ```

    f = open(''helloworld.txt'', ''wb'')

    f.write(''Hello, world'')

    f.close()

    ```


    In Python, any line that starts with a pound sign or pound sign (#) is called
    *commentary* and is ignored by the Python interpreter. Comments are intended to
    allow programmers to communicate with each other (or to remind themselves of what
    the code is doing when they sit in front of it a few months later). In a broad
    sense, programs are written and formed in a way that makes it easier for programmers
    to work collectively. The code that is closest to the requirements of the machine
    is called a *low level*, while the code that is closest to the language of human
    beings is called *high level*.


    One of the benefits of using a programming language like Python is that it is
    of a higher level, which makes it easier for us to communicate with you (of course,
    at a certain cost in terms of computing efficiency).


    In this show, f is an *object* while *open*, *write*, and *close* are *methods*.
    In other words, *open*, *write*, and *close* act on the object *f*, which, in
    this case, is defined as a .txt text file. This is probably a use of the term
    "method" that you might expect, and from time to time, you will find that words
    used in the context of programming have slightly (or completely) different meanings
    than everyday speech. In this case, remember that "method" means code snippets
    that perform actions. They run something on one thing and return a result. You
    can try to imagine this using some real-world referent, such as giving orders
    to your dog that has been trained previously. Your pet (the object) understands
    commands (i.e., it has "methods") like "bark," "sit," "lie down," and so on. We
    will discuss and learn how to use many other methods as we progress.


    The name of a variable that we have chosen is f. We could have called him anything.
    In Python, variable names can be constructed with uppercase letters, lowercase
    letters, or numbers. But we cannot use the names of the language commands as variables.
    For example, if we try to name a variable "print," the program will not respond
    because that is a reserved word that is part of the programming language. Variable
    names in Python are also case-sensitive, which means that trap, Trap, or TRAP
    would be representations of different variables.


    When you run the program we wrote, the method open tells your computer to produce
    a new text file called helloworld.txt in the same folder that we created the file-output.py
    program in. The *parameter w* indicates that we intend to write content to this
    new file using Python. Keep in mind that both the file name and the parameter
    are enclosed in single quotes, so you know that it will be data stored as strings.
    If you forget to include the quotes, the program will crash. In the next line,
    your program writes the message "Hello world" (which is another string) in the
    file and then closes it. Run Python. And although nothing will be written in the
    output command panel, you will see a status message that will say something like
    this on Mac:

    ''/usr/bin/python file-output.py'' returned 0.

    While in Windows, you will see:

    ''C:\Python27\Python.exe file-output.py'' returned 0.

    Since plain text files include minimal information, they tend to be small in volume,
    easy to exchange between different platforms (for example, from Windows to Linux
    or Mac or vice versa), and easy to send from one computer program to another.
    They can also be read in all text editors.


    ## Read From a Text File


    Python also has methods that allow us to get information from files. Write the
    following program in the text editor and save it as input-file.py. When you click
    "Run Python," the program will open the text file you just created, read the one-line
    text it contains, and print the information in the "output command" panel.


    ```

    f = open(''helloworld.txt'', ''r'')


    message = f.read()


    print(message)


    f.close()

    ```


    In this case, the parameter r is used to indicate that you are opening a file
    to read the information it contains. Parameters allow you to choose from a number
    of different options that a particular method allows. Going back to the pet example,
    the dog can be trained to bark once if it receives a beef-flavored treat and twice
    if it receives a chicken-flavored treat. The taste of the prize cookie is the
    parameter. Each method is different in terms of what parameters it will accept.
    For example, you can''t ask the dog to sing an Italian opera—unless your dog is
    particularly talented. You can find the possibility of parameters for each particular
    method on the Python website, or you can even discover them yourself in any search
    engine by typing the specific method accompanied by the word "Python."


    Read is another file method. The content of the file (the single-line message)
    is copied to the message, which is how we decide to call that text string, and
    the print command is used to send the content collected in the message to the
    output command panel.


    ## Append Text to an Existing Text File


    A third option is to open an existing file and add more information to it. Note
    that if you open a file using open and you use the method write, the program will
    overwrite whatever the file contains. Of course, this is not a problem when creating
    a new file or when you want to overwrite the contents of an existing file, but
    it is totally undesirable when you are creating a long list of events or are compiling
    a large amount of data into an archive. So instead of write, we are going to use
    the method append, which is designated with an ''a''.


    Write the following program in the text editor and save it as file-append.py.
    When you run it, this program will open the same helloworld.txt text file that
    you created earlier and add a second "Hello world" to the file. The syntax ''\n''
    represents a new line of text in the file.


    ```

    f = open(''helloworld.txt'', ''a'')

    f.write(''\n'' + ''Hello world'')

    f.close()

    ```


    After you''ve run the program, go to the helloworld.txt file, and open it to see
    what happened. Close the text file and rerun the file-append.py program as many
    times as you like. When you open the helloworld.txt file again, you will see that
    there will be a series of lines with the message "Hello World" repeated as many
    times as you run the program.


    ## Binary Files


    Not all files are text files, and therefore not all files can be line processed.
    There are files in which each byte has a particular meaning, and it is necessary
    to manipulate them knowing the format in which the data is in order to process
    that information.


    To open a file and handle it in the binary form, it is necessary to add a b to
    the mode parameter.


    To process the file bytes instead of lines, use the function content = file.read(n)
    to read n bytes and file.write(content) to write content to the current position
    of the file.


    The b in the opening mode comes from binary, due to the binary numbering system,
    since in the computer processor, the information is handled only by zeros or ones
    (bits) that make up binary numbers.


    Although it is not necessary for all systems (in general, the same system detects
    that it is a binary file without our asking), it is a good habit to use it, even
    though it serves mainly as documentation.


    When handling a binary file, it is necessary to be able to know the current position
    in the file and to be able to modify it. To obtain the current position, use file.tell(),
    which indicates the number of bytes since the beginning of the file.


    To modify the current position, use file.seek(start, from), which allows moving
    a starting amount of bytes in the file, counting from the beginning of the file,
    from the current position, or from the end.'
