    \ have to do. You just created a fully functional yet simple blog. To finish this\
    \ lesson, we are going to see how to install Django on a web server.\n\n## Installation\
    \ on a Web Server\n\nMost web servers run scripts in various languages using CGI.\
    \ Django can run on FastCGI and also theoretically CGI, but this is not officially\
