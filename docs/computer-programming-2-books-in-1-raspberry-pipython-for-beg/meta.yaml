    # Set


    The set type in Python is the class used by the language to represent sets. A
    set is a messy collection of unique elements. That is, they do not repeat themselves.
    The main characteristic of this data type is that it is a collection whose elements
    do not keep any order and are also unique. These characteristics mean that the
    main uses of this class are to know if an element belongs to a collection and
    to eliminate duplicates of a sequential type (list, tuple, or str).


    To create a set, enclose a series of elements in braces {}, or use the class constructor
    set() and pass it as an argument an iterable object (like a list, a tuple, a string
    ...).


    ```

    S = {1,2,3,4}

    ```


    Python distinguishes this type of operation from creating a dictionary by not
    including a colon. However, a set cannot include mutable objects such as lists,
    dictionaries, and even other sets.


    # Dictionaries


    A dictionary is a collection without order, modifiable, and indexed. In Python,
    these are enclosed in braces and have keys and values. This means that there will
    be different types of values within the same category. For example, let''s look
    at a dictionary of movies and directors:


    ```

    d = {"Love Actually": "Richard Curtis", "Kill Bill": "Tarantino", "Amélie": "Jean-Pierre
    Jeunet"}

    ```


    The first value is the key, and the second is the value associated with the key.
    As a key, we can use any immutable value: we could use numbers, strings, Booleans,
    tuples ... but not lists or dictionaries since they are mutable. This is because
    dictionaries are implemented as hash tables, and when entering a new key-value
    pair in the dictionary, the hash of the key is calculated so that the corresponding
    entry can be quickly found later. If the key object were modified after it was
    entered in the dictionary, obviously, its hash would also change and could not
    be found.'
