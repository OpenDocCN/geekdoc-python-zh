    External storage allows users to store data independently at a comparatively low
    cost from the main or primary storage and memory of a device. It increases storage
    space without having to open up a device.


    External storage is mostly used to store information that programs running on
    a desktop, laptop, server, or mobile device, such as an Android or iOS smartphone
    or tablet, have less regular access to.


    An external storage device for PCs mostly consists of stationary or portable hard
    drives (HDDs) or solid-state drives (SSDs) connected to or wirelessly through
    a USB or FireWire link.


    An external storage device can serve as primary storage linked to servers via
    Ethernet or Fibre Channel switches for businesses, or as secondary storage for
    backup and archiving purposes. External storage provides block-based, file-based
    or object storage HDD, all-flash and hybrid storage arrays, or a combination of
    these three protocols known as unified storage. Examples of external storage are
    storage area networks (SANs) for block-level storage and network-attached storage
    (NAS) systems for file-based storage.


    The transport of data between on-site and off-site computer systems is another
    common case for an external storage unit.


    When transferring vast volumes of data to the cloud, providers will also use external
    storage devices in a practice known as cloud seeding. Since it can take hours
    or days to transfer tens of terabytes of data over a network, clients put their
    data on an external storage device and send the device to their preferred provider
    for copying locally. Only modified data will travel through the network to the
    cloud for backup, archiving or disaster recovery (DR) purposes after the initial
    seeding.


