    interpreter performs each time the same code is executed. Python has a command-line
    interpreter where you can enter statements. Each statement is executed and produces
    a visible result, which can help us understand the language better and test the
    results of executing portions of code quickly.


    Object-oriented programming is supported in Python; in many cases, it is an easy
    way to create programs with reusable components. It has many functions incorporated
    in the language itself, for the treatment of strings, numbers, files, etc. In
    addition, there are many libraries that we can import into programs to deal with
