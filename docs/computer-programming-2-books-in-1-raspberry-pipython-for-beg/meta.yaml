    : greet_es,\n                 \"en\": greet_en,\n                 \"fr\": greet_fr}\n\
    \    return lang_func[lang]\n\nf = greet(\"es\")\nf()\n```\n\nAs we can see, the\
    \ first thing we do in our little program is call the greet function with a parameter\
    \ \"es\". In the greet function, several functions are defined: greet_es, greet_en,\
    \ and greet_fr, and then a dictionary is created that has as keys text strings\
