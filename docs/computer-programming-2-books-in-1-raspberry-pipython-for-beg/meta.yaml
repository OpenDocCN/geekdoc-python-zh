    \ million inhabitants.\n\nIndia: 1364 million inhabitants.\n\nUnited States: 327\
    \ million inhabitants.\n\nIndonesia: 264 million inhabitants.\n\n## Lambda Functions\n\
    \nThe lambda operator is used to create anonymous functions online. As they are\
