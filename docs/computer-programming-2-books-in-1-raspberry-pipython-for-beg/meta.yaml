    *Great responsibility requires great strength:*


    +   - A power source that provides the voltage of the source we measured earlier
    (Vs = 5v).

    - A resistor limiting current (R1 = x).

    - A diode that causes the forward voltage voltage to fall (LED1 = 2.0v for orange).

    - A land link.


    What we want to do is restrict the amount of current that flows through the circuit
    (I). Approximately 5mA (1/4th the maximum LED rating) should be ideal. Know the
    rule of Ohm? Huh? V = IR? We can use R = V / I to calculate the necessary resistance
    because we have a known voltage and amperage. For voltage, after the fall caused
    by the diode, we need the voltage, so our equation will look something like R=(Vs-Vf)/I
    where:


    +   - Vs = voltage supply (5v)

    - Vf = LED forward voltage (2v)

    - I = current needed (0.005A)

    - R = resistance required (x)


    Plugging all of that in, we get the following: (5v-2v)/0.005A=600


    However, at the precise value we like and might need to round up or down, we will
    not always find a resistor. I rounded down to the nearest value I had on-hand
