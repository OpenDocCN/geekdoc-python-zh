    ## Raspberry Pi Benefits


    The Raspberry Pi has made its way into the computing hobby market, but it is still
    very capable for other business and personal uses. For a compact and lightweight
    server, an incredibly low power draw, small form factor, no noise, solid state
    storage, and other characteristics make it an appealing solution.


    I have been playing with a Raspberry Pi (revision B) running various GNU / Linux
    distributions recently. I wanted to take it for a spin and see what I could throw
    at it, because the Pi is essentially a mini-computer. I was pleasantly surprised.
    In reality, it''s been so good that I decided to try setting it up with different
    services as a mini server. In doing so, I have come up with a list of benefits
    that I believe are very persuasive.


    1. *Power consumption.* The Pi draws about five to seven watts of energy. This
    is around one tenth of what could be found in a similar full-size box. Since servers
    operate night and day on an ongoing basis, the electrical savings can really add
    up. I have estimated that the simple Pi package (Pi board, case, and power supply)
    would pay for itself if it is left to run 24/7/365, with around one year''s worth
    of electricity savings. I ended up with a very cheap and high quality CanaKit
    Basic Kit (ASIN # BooDG9D6IK).


    2. *No moving parts.* The Pi uses an SD card for storage that is fast and has
    no moving parts. There are no supporters or other things to think about as well.
    Compared to lower level cards, a Class 10 SD card is typically the highest performing,
    but this will primarily only impact boot time where there is the most I / O. There
    is a compatibility chart for SD cards here, the results can differ, but overall,
    Transcend cards have a good value. I have had very good luck.


    3. *Small form factor*. You can hold the Pi (with a case) in your hand. It is
    unlikely for a similar full-size box. This implies that the Pi can also be incorporated
    into devices.


    4. *No noise at all*. The Pi is absolutely quiet.


    5. *Status lights*. On the Pi''s motherboard, there are multiple status lights.
    You can see NIC operation, disk I / O, power status, etc., with a simple event.


    6. *Expansion capabilities*. Several devices are available for the Pi, all at
    very affordable prices. From an I / O board (GPIO) to a camera, everything. There
    are two USB ports in the Pi, but more devices can be added by hooking up a powered
    USB hub.


    7. *Built-in graphics capable of HDMI*. The display port on the Pi is HDMI and
    can accommodate resolutions up to 1920, which is useful for, for example, turning
    the Pi into a video player box. For backwards compatibility, there are several
    converters that can convert to VGA. It is possible to find a list of HDMI to VGA
    converters here. I ended up using the VGA (ASIN # Boo88K7QUQ) Sanoxy HDMI cable
    that has so far performed well.


    8. *Affordable*. The Pi (revision B) provides the best specs for the price, at
    least I''ve noticed, compared to other similar alternatives. It is one of the
    few devices which offers 512 MB of RAM in its class. Since it first arrived, the
    Pi has come down in price, and is ultimately affordable as a hobby, business use,
    or whatever necessity there is.


    9. *Massive support for the community*. The Pi has phenomenal community support.
    Help can be obtained very easily for hardware and/or GNU / Linux software that,
    depending on the GNU / Linux distribution used, runs primarily on Pi in user forums.
    It is possible to find a good list of distributions here.


    10. *Overclocking functionality*. If there are performance issues with the program
    used, the Pi may be overclocked, but this is at the cost of the user doing so.


    11. *Multiple uses.* The storage on an SD card makes it easy to switch between
    other SD cards running other GNU / Linux distributions to adjust the Pi features
    quickly and easily. If you want to set up the Pi to test it as a server, then
    try something else later, just swap the SD card and you''re done. A backup of
    the SD card can be generated using the ''dd'' command on a GNU / Linux machine
    and restored later if needed.


    With all the good stuff about the Pi, there are a few minor disadvantages:


    1. *ARM architecture.* While ARM is a highly efficient and low-powered architecture,
    it is not x86 and therefore it is not possible for any binaries compiled to run
    on x86 to run on Pi. The good news is that for the ARM architecture, complete
    GNU / Linux distributions have been compiled and new ones are emerging all the
    time. There are very few applications where x86 is completely necessary. Wine,
    which runs Windows programs, is the only one that I have found so far to be a
    concern. Wine, unfortunately, doesn''t work on the Pi.


    2. *Non-upgradable RAM.* The main Pi components are soldered to the motherboard,
    including 512 MB of RAM. However, this is not a concern, as GNU / Linux can easily
    run on it. I''ve found that when operating a small server, the Pi uses around
    100 MB of RAM (without X11 running).


    ## The Pi software


    The Pi runs GNU / Linux and similar operating systems. Windows running is not
    such a success story; there are so many technical issues with running Windows
    on the Pi, so Windows was considered impractical.


    The Raspberry Pi is a single credit card-sized computer board that can be used
    for several computer tasks, such as sports, word processing, spreadsheets, and
    even HD video playback. It was established in the UK by the Raspberry Pi Foundation.
    Since 2012, it has been prepared for public consumption with the idea of giving
    students and children a low-cost educational microcomputer. The Raspberry Pi board
    design’s main aim is to promote learning, experimentation, and innovation for
    students at the school level. The compact and low cost of the raspberry pi board.
    The maximum number of Raspberry Pi computers in cell phones is used. The growth
    of mobile computing technology in its 2nd century is very high, a significant
    segment of which is powered by the mobile industries. ARM technology is used by
    98% of all cell phones.


    ## Raspberry Pi Tech


    The Raspberry Pi is available in two versions, model A and model B. The primary
    distinction between model A and model B is the USB port. The Model A board uses
    less power and an Ethernet port is not included. The Model B board, however, contains
    an Ethernet port developed in China. In 2014, the foundation of the Raspberry
    Pi board released the computer module, which packs a model B Raspberry Pi board
    into a module for use as part of embedded systems, to promote its use. The Raspberry
    Pi comes with a range of open source technologies, i.e. communication and multimedia
    web technologies.


    ## Specifications of the Raspberry Pi Hardware


    A program memory (RAM), processor and graphics chip, CPU, GPU, Ethernet port,
    GPIO pins, Xbee socket, UART, and power source connector are included in the Raspberry
    Pi board. And separate interfaces for other devices that are external. It also
    requires mass storage, so we use an SD flash memory card for that. Similarly,
    the Raspberry Pi board can boot from this SD card like a PC boots from its hard
    disk.


    SD cards containing Linux OS, US keyboard, display, power supply, and video cable
    are mainly important hardware specifications of the Raspberry Pi board. USB mouse,
    powered USB hub, case, internet link, and Model A or B are optional hardware specifications:
    a USB WiFi adaptor is used and LAN cable is used for internet connection to Model
    B.


    ## About memory


    Aboard''s Raspberry Pi model is equipped with 256 MB of SDRAM and 51 MB is designed
    for model B. Compared to other PCs, Raspberry Pi is a small size PC. Gigabytes
    of standard PC RAM'
