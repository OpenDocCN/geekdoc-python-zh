    ## SHARED OPTIONS


    Samba is an SMB/CIFS networking protocol implementation that Windows devices use
    to provide mutual access to files, printers, serial ports, etc. A detailed Wikipedia
    page on Samba and its capabilities is open.


    This page will describe how to install a shared folder on a Windows computer so
    that it appears on your Raspberry Pi, or to share a folder on your Raspberry Pi
    so that it can be accessed by a Windows client, using a subset of the Samba method.


    ### Installing support for CIFS/Samba


    Raspberry Pi OS does not provide CIFS/Samba support by default, but this can be
    added easily. All the necessary components to use Samba as a server or client
    are installed with the following commands.


    ```

    sudo apt install samba samba-common-bin smbclient cifs-utils

    ```


    ### Using a Windows folder that is shared


    Firstly, on your Windows system, you need to share a folder. This method is very
    convoluted!


    Switch sharing:


    1.  By right-clicking on the device tray and choosing it, open the Networking
    and Sharing Centre.

    2.  Click Change Advanced Settings for Sharing.

    3.  Pick Turn on exploration of networks.

    4.  Pick Switching on File Sharing and Print Share.

    5.  Save Modifications.


    Share a folder:


    You can share any folder you like, but simply create a folder called share for
    this case.


    1.  Creating a share folder on your desktop.

    2.  Right-click and pick Properties in the new folder.

    3.  Click the Sharing tab and then click the Sharing Advanced button.

    4.  Select Share this folder; the name of the shared folder is the name of the
    folder by default.

    5.  Click on the button for Permissions.

    6.  Select Anyone and Full Control for this example (you can restrict access to
    particular users if required); click OK when done, then OK again to exit the Advanced
    Sharing tab.

    7.  Click the Protection tab because we need to configure the same privileges
    now.

    8.  Select the same settings as the Permissions tab and, if necessary, add the
    chosen user.

    9.  Click on OK.


    Now the folder should be shared.


    ### Windows 10 Wizard for sharing


    There is a Sharing Wizard on Windows 10 that assists with some of these moves.


    1.  Run the application for Device Management from the Start Bar.

    2.  Choose Shared Directories, then Share Shares.

    3.  Right-click and choose New Share to start the Sharing Assistant; click Next.

    4.  Choose a folder that you want to post, and then press Next.

    5.  To use all the defaults for sharing, press Next.

    6.  Select Custom and set the permissions required, and then click OK, then click
    Finish.


    ### Install the folder on the Raspberry Pi


    In Linux, mounting is the process of adding a folder to a location, so we need
    that location first:


    ```

    mkdir windowshare

    ```


    Now, we need the remote folder to be installed to that spot. The remote folder
    is the Windows PC host name or IP address and the share name used when it is shared.
    The Windows username that will be used to access the remote machine needs to be
    given as well.


    ```

    sudo mount.cifs //<hostname or IP address>/share /home/pi/windowshare -o user=<name>

    ```


    You should now be able to access the content of your Raspberry Pi''s Windows share:


    ```

    cd windowshare

    ls

    ```


    ### Sharing a folder for Windows use


    First, create a sharing folder. This example creates a folder called shared in
    the current user''s home folder, and assumes pi is the current user.


    ```

    cd ~

    mkdir shared

    ```


    We need to tell Samba to share this folder now, using the configuration file for
    Samba.


    ```

    sudo nano /etc/samba/smb.conf

    ```


    Add the following at the end of the file to share the archive, granting the remote
    user permission to read/write:


    ```

    [share]

    path = /home/pi/shared

    read only = no

    public = yes

    writable = yes

    ```


    Locate the workgroup line in the same file and change it to the workgroup name
    of your local Windows network if necessary.


    ```

    workgroup = <the name of your workgroup here>

    ```


    That should be enough to share the folder. On your Windows system, the folder
    should appear when you browse the network and you should be able to connect to
    it.


    ### Options for Raspistill


    Raspistill is a command line tool with a Raspberry Pi camera module to take still
    photographs.


    ### Basic Application of Raspistill


    Enter the following command from the terminal to take a picture when the camera
    module is attached and enabled:


    ```

    raspistill -o image.jpg

    ```


    The camera was placed upside-down in this example. If the camera is positioned
    in this location, it is important to flip the picture to appear in the correct
    way.


    ### Flip vertical and flip horizontal


    The picture must be rotated 180° to view correctly with the camera positioned
    upside-down. By passing the -vf and -hf flags, the way to correct this is to add
    both a vertical and a horizontal flip:


    ```

    raspistill -o image.jpg -vf -hf

    ```


    Now the photo has been properly recorded.


    ### The Resolution


    At a resolution of 2592 x 1944, which is 5,038,848 pixels or 5 megapixels, the
    camera module takes photographs.


    ### Width of File


    There will be about 2.4 MB for a picture taken with the camera module. This is
    around 425 per GB of images.


    It will take up to 1 GB in about 7 hours to take 1 photo per minute. This is a
    pace of around 3.3 GB per day or 144 MB per hour.


    ### Script from Bash


    You can build a Bash script which uses the camera to take an image. Open your
    editor of choice to construct a script and write the following sample code:


    ```

    #!/bin/bash

    DATE=$(date +"%Y-%m-%d %H:%M")

    ```


    This script will take an image and use a timestamp to name the file. By building
    the camera folder, you''ll also need to make sure the route exists:


    ```

    mkdir camera

    ```


    Say we saved it as camera.sh, so we''d make the file executable first:


    ```

    chmod +x camera.sh

    ```


    Run then with:


    ```

    ./camera.sh

    ```


    ### More choices


    For a complete list of choices, run raspistill without any arguments. Retransfer
    stderr to stdout to scroll and pipe the output to less:


    ```

    raspistill 2>&1 | less

    ```


    ### RASPIVID OPTIONS


    Raspivid is a video capture command line tool with a Raspberry Pi camera module.


    ### Raspivid Simple Use


    Record a video using the following command when the camera module is attached
    and enabled:


    ```

    raspivid -o vid.h264

    ```


    Remember to use -hf and -vf, such as raspistill, to flip the image if necessary.


    This will save a video file of 5 seconds to the path provided here as vid.h264
    (default time length).


    ### Specify video length


    Pass the -t flag with a number of milliseconds to determine the length of the
    video taken. For instance:


    ```

    raspivid -o video.h264 -t 10000

    ```


    It will record a video for 10 seconds.


    ### More choices


    Run raspivid with no reasons for a complete list of potential choices, or pipe
    this command with less and scroll through:


    ```

    raspivid 2>&1 | less

    ```


    Scroll and type q to exit using the arrow keys.


    ### Image Format for MP4


    As a raw H264 video stream, the Pi captures video. Unless it is "wrapped" in an
    appropriate container format like MP4, many media players may fail to play it,
    or play it at an incorrect pace. Using MP4Box is the best way to get an MP4 file
    from the Raspivid button.


    Download the MP4Box using the following command:


    ```

    sudo apt -y install gpac

    ```'
