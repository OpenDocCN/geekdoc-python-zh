    \ world\")\n```\n\nThe Python programming language is of the object-oriented type.\
    \ This means that it is built around a special type of entity, an object, which\
    \ contains both data as well as a series of methods for accessing and altering\
    \ the data. Once an object is created, it can interact with other objects.\n\n\
    In the example above, we saw one type of object, the string \"Hello world.\" The\
    \ string is the sequence of a series of characters enclosed in quotation marks.\
    \ You can write a string in three different ways:\n\n```python\nmessage1 = 'Hello\
    \ world'\nmessage2 = \"Hello world\"\nmessage3 = \"\"\"Hello\nHello\nHello world\"\
    \"\"\n```\n\nWhat is important here is to note that, as seen in the first two\
    \ examples, you can use single or double quotes, but you should never mix the\
    \ two types in the same string. In the third message, double"
