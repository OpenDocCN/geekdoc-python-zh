- md: "## Conditional Control Structures\n\nIf a program were nothing more than a\
    \ list of commands to be executed sequentially, one by one, it would not be very\
    \ useful. Conditionals allow us to check conditions and make our program behave\
    \ in one way or another, to execute a piece of code or another, depending on this\
    \ condition.\n\nConditional control structures are those that allow us to evaluate\
    \ if one or more conditions are met, to say what action we are going to execute.\
    \ The condition evaluation can only return 1 of 2 results: true or false.\n\n\
    In daily life, we act according to the evaluation of conditions, much more frequently\
    \ than we really think: If the traffic light is green, cross the street. If not,\
    \ wait for the traffic light to turn green. Sometimes, we also evaluate more than\
    \ one condition to execute a certain action: If the electricity bill arrives and\
    \ I have money, pay the bill.\n\nTo describe the evaluation to be performed on\
    \ a condition, relational (or comparison) operators are used:\n\n| Symbol | Meaning\
    \ | Example | Outcome |\n| :--- | :--- | :--- | :--- |\n| == | Like | 5 == 7 |\
    \ False |\n| != | Other than | Red != Green | True |\n| < | Smaller than | 8 <\
    \ 12 | True |\n| > | Greater than | 12 > 7 | True |\n| <= | Less than or equal\
    \ to | 12 <= 12 | True |\n| >= | Greater than or equal | 4 >= 5 | False |\n\n\
    And to evaluate more than one condition simultaneously, logical operators are\
    \ used:\n\n| Operator | Example | Explanation | Outcome |\n| :--- | :--- | :---\
    \ | :--- |\n| and | 5 == 7 and 7 < 12 | False and False | False |\n| and | 9 <\
    \ 12 and 12 > 7 | True and true | True |\n| and | 9 < 12 and 12 > 15 | True and\
    \ false | False |\n| or | 12 == 12 or 15 < 7 | True or false | True |\n| or |\
    \ 7 > 5 or 9 < 12 | True or true | True |\n| xor | 4 == 4 xor 9 > 13 | True or\
    \ true | False |\n| xor | 4 == 4 xor 9 < 3 | True or false | True |\n\nConditional\
    \ flow control structures are defined through the use of three reserved keywords\
    \ from the language: if, elif and else.\n\n## If\n\nThe simplest form of a conditional\
    \ statement is an if followed by the condition to evaluate, a colon (:), and in\
    \ the next line and indented, the code to be executed in case this condition is\
    \ met.\n\n```python\nfav = \"geekworld.net\"\n# si (if) fav is equal to \"geekworld.net\"\
    \nif fav == \"geekworld.net\":\n    print \"You have great taste!\"\n    print\
    \ \"Thank you\"\n```\n\n## If-else\n\nWe are now going to see a somewhat more\
    \ complicated conditional. What would we do if we wanted certain orders to be\
    \ executed if the condition was not fulfilled? We could certainly add another\
    \ if that had the negation of the first as a condition:\n\n```python\nif fav ==\
    \ \"geekworld.net\":\n    print \"You have great taste!\"\n    print \"Thank you\"\
    \nif fav != \"geekworld.net\":\n    print \"Wow, it's a pity\"\n```\n\nBut the\
    \ conditional has a much more useful second construction. We see in the following\
    \ example that the second condition can be replaced with an else. If we read the\
    \ code, we see that it makes a lot of sense: \"if fav is equal to geekworld.net,\
    \ print this and this; if not, print this other.\"\n\n```python\nif fav == \"\
    geekworld.net\":\n    print \"You have great taste!\"\n    print \"Thank you\"\
    \nelse:\n    print \"Wow, it's a pity\"\n```\n\n## Elif\n\nThere is still one\
    \ more construction to see, which is the one that makes use of the elif. Our last\
    \ conditional construction to see is the one that makes use of the elif. Unlike\
    \ the conditional control structures, the iterative ones (also called cyclical\
    \ or loops) allow us to execute the same code repeatedly, as long as a condition\
    \ is met.\n\n```python\nif number < 0:\n    print \"Negative\"\nelif number >\
    \ 0:\n    print \"Positive\"\nelse:\n    print \"zero\"\n```\n\nThere is also\
    \ a construction similar to the operator ?. From other languages, which is nothing\
    \ more than a compact way of expressing an if-else. In this construction, the\
    \ predicate C is evaluated, and A is returned if it is true or B if it is not\
    \ true: A if C else B. Let's see an example:\n\n```python\nvar = \"pair\" if (num\
    \ % 2 == 0) else \"odd\"\n```\n\n## Iterative control structures\n\nIn Python,\
    \ there are two cyclic structures:\n\n- Loop while\n- Loop for\n\n## While\n\n\
    The while loop executes a code snippet as long as a condition is met. Let's look\
    \ at the following example:\n\n```python\nage = 0\nwhile age < 18:\n    age =\
    \ age + 1\n    print \"Congratulations, you have\" + str(age)\n```\n\nWhat we\
    \ observed previously is that the age variable begins with 0. Since the condition\
    \ that age is less than 18 is true (0 is less than 18), we enter the loop. Age\
    \ is increased by one, and the message is printed, informing that the user has\
    \ reached one year.\n\nNow the condition is reevaluated, and one is still less\
    \ than 18, so the code that increases the age by one year is rerun and prints\
    \ the age to the screen. The loop will continue executing until age equals 18,\
    \ at which point the condition will no longer be met, and the program will continue\
    \ executing the instructions following the loop.\n\nNow let's imagine that we\
    \ forgot to write the instruction that increases age. In that case, the condition\
    \ would never be reached that age was equal to or greater than 18, it would always\
    \ be 0, and the loop would continue indefinitely writing on the screen. You have\
    \ reached 0. This is what is known as an infinite loop. However, there are situations\
    \ where an infinite loop is useful. For example, let's look at a little program\
    \ that repeats everything the user says until they write goodbye.\n\n```python\n\
    while True:\n    entry = raw_input(\">\")\n    if entry == \"bye\":\n        break\n\
    \    else:\n        print entry\n```\n\nTo obtain what the user writes on the\
    \ screen, we use the function raw_input. You don't need to know what a function\
    \ is or how it works exactly. Just accept for now that in each iteration of the\
    \ loop, the input variable will contain what the user typed until hitting Enter.\
    \ We then check if what the user wrote was goodbye, in which case the break command\
    \ is executed or if it was something else, in which case what the user wrote is\
    \ printed on the screen. The break keyword exits the loop we are in.\n\nAnother\
    \ keyword that we can find inside the loops is continue. As you may have guessed,\
    \ it does nothing but goes directly to the next iteration of the loop:\n\n```python\n\
    age = 0\nwhile age < 18:\n    age = age + 1\n    if age % 2 == 0:\n        continue\n\
    \    print \"Congratulations, you have\" + str(age)\n```\n\nAs you can see, this\
    \ is a small modification of our congratulations program. This time we have added\
    \ an if that checks if the age is even, we jump to the next iteration instead\
    \ of printing the message. In other words, with this modification, the program\
    \ would only print congratulations when the age was odd.\n\n## For\n\nIn Python\
    \ for is used as a generic way to iterate over a sequence. And as such, it tries\
    \ to facilitate its use for this purpose. This is what a for loop looks like in\
    \ Python:\n\n```python\nsequence = [\"one\", \"two\", \"three\"]\nfor element\
    \ in sequence:\n    print element\n```\n\nLet's look at the following example:\n\
    \n```python\nmy_list = ['John', 'Anthony', 'Peter', 'Herbert']\nfor name in my_list:\n\
    \    print name\n```\n\nAnother iteration with the loop for can emulate while.\
    \ In the following example, for each year in the range 2001 to 2013, print the\
    \ phrase \"Year reports\":\n\n```python\n# -*- coding: utf-8 -*-\nfor year in\
    \ range(2001, 2013):\n    print \"Year reports\", str(year)\n```\n\n## Functions\n\
    \nCreating functions is inevitable in any type of application. A function is a\
    \ block of code with an associated name, which receives zero or more arguments\
    \ as input, follows a sequence of statements which executes the desired operation\
    \ and returns a value, and/or performs a task. This block can be called when it\
    \ is needed. Python is a language that gives us a lot of flexibility when creating\
    \ functions. The use of functions is a very important component of the programming\
    \ paradigm called [structured](https://en.wikipedia.org/wiki/Structured_programming),\
    \ and it has several advantages:\n\n- Modularization: allows segmenting a complex\
    \ program into a series of simpler parts or modules, thus facilitating programming\
    \ and debugging.\n- Reuse: allows the same function to be reused in different\
    \ programs.\n\nPython already defines by default a set of functions that we can\
    \ use directly in our applications. You have seen some of them in previous tutorials.\
    \ For example, the function len(), which gets the number of elements in a container\
    \ object such as a list, tuple, dictionary, or set. We have also seen the function\
    \ print(), which displays text on the console.\n\nHowever, as a programmer, you\
    \ can define your own functions to structure the code in a way that is more readable\
    \ and to reuse those parts that are repeated throughout an application. This is\
    \ a critical task as the number of lines in a program grows.\n\nIn principle,\
    \ a program is an ordered sequence of instructions that are executed one after\
    \ the other. However, when using functions, you can group parts of those instructions\
    \ as a smaller unit that executes those instructions and usually returns a result.\n\
    \n## How to define a function in Python"
