    # Pi Safe Shutdown


    Pulling your Raspberry Pi’s power will lead to picture corruption and other problems
    that can damage your Pi! We will build a small push button in this article that
    will act as an option for ''Safe-Shutdown''. Using the GPIO pins and some jumper
    wires, we will link it to our Raspberry Pi, and with a few lines of code, we will
    have our own power switch!


    Next, we''re going to look at how to wire a button to the Pi GPIO connector in
    a easy way. Then we are going to write a python script that will securely shut
    down the Pi. Setting up the Pi so that the button will work all the time will
    be the final step. Let''s get rolling!'
  - '[PAGE 177]


    You will need:


    +   - Raspberry Pi B+ (Any Pi will work, just make sure the GPIO pins are checked)

    - Tactile switches

    - Jumper Wire Packs for Female / Male Extensions

    - Solderless Boards of Bread


    The Circuit


    We''re going to wire the button to GPIO Pin 26 (yellow wire) and ground (green
    wire) to do this. This configuration is called an Active Low button, which means
    that it will have no voltage or low logic when the button is pressed. On its GPIO
    pins, the Pi has pull-up resistors, so active low wiring means we do not need
    to install an external resistor.


    With the wiring here, make sure you are extremely careful, as shortening the wrong
    pins together will destroy your Pi. This is why I''ve got a Pi-shaped coaster
    now.


    The three external libraries we will use:


    The gpiozero library button module offers quick access to the programming of the
    GPIO on the Pi. It is the library of time, so we can wait in human time.


    The OS library gives us the power to shut down the Pi (you can also run any terminal
    commands using this library!).


    We first build an object with a button that enables us to interact with the button.
    In our case, we''ll give this feature the GPIO number input that we connected
    the button to 26. This feature assumes active low buttons by nature, so we do
    not need to alter anything else.


    We want this software to run all the time, so that it will still work when we
    click the button after a week-long retro gaming session. To do this, we build
    a true loop that will run indefinitely.


    Inside the loop, *if* statements first detect a button (we have two), then activate
    the code to wait for a second, then check to see if the'
  - '[PAGE 178]


    button is still holding down.


    The last line tells the loop to wait a second until the button is tested again,
    so we''re not in a hurry, so we can wait for the buttons. Make sure that you include
    this wait without python running this script as quickly as possible and putting
    an unwanted load on the CPU.'
