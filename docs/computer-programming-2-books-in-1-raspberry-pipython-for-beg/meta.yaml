    ## RASPBERRY PI


    Learn Fundamentals and Unlock Powerful Hacks of Using Raspberry Pi


    ## Introduction


    The Raspberry Pi is a low-cost, credit card-sized device that uses a regular keyboard
    and mouse and attaches to a computer monitor or TV. It is a lightweight, capable
    computer that allows individuals of all ages to explore programming and learn
    how to program in languages such as Scratch and Python. From surfing the internet
    and watching high-definition video, to making spreadsheets, word-processing, and
    playing sports, it can do everything you''d expect a desktop computer to do.


    In addition, the Raspberry Pi has the potential to connect with the outside world
    and has been used in a broad variety of interactive developer ventures, including
    music machines and parent detectors to weather stations and infra-red cameras
    tweeting birdhouses. We want to see children all over the world use the Raspberry
    Pi to learn to program and understand how computers work.


    Raspberry Pi is the name of a collection of single-board computers created by
    the UK charity Raspberry Pi Foundation, which aims to educate kids in computer
    science and make it easier for them to access computer education.


    The Raspberry Pi was introduced in 2012, and several versions and variants have
    since been released. The original Pi had a single-core 700MHz CPU and just 256
    MB RAM, and a quad-core 1.4GHz CPU with 1 GB RAM is available for the new edition.
    For Raspberry Pi, the main price point has always been $35 and all models have
    been $35 or less, including the Pi Zero, which is just $5.


    In order to learn programming skills, create hardware projects, do home automation
    and even use them in industrial applications, people all over the world use Raspberry
    Pi.


    The Raspberry Pi is a very inexpensive machine running Linux, but it also provides
    a set of GPIO (input / output general purpose) pins that allow you to manipulate
    physical computing electronic components and explore the Internet of Things (IoT).


    ## What would you do with a Raspberry Pi?


    To learn to code, some people buy a Raspberry Pi, and people who are already able
    to code use the Pi to learn to code electronics for physical projects. Instead
    of using a proprietary closed system, the Raspberry Pi will open up opportunities
    for you to build your own home automation projects, which is common with people
    in the open source community because it puts you in charge.


    ## The best Raspberry Pi and Raspberry Pi Zero projects to try


    We recommend buying a Raspberry Pi and letting imagination run wild for those
    wanting to learn more about computers, software creation and creating tiny machines.


    Given what you can do with it, it''s a fairly well-priced product. It can help
    teach coding or be a base for more complex programming. As such, several individuals
    have used the device to create a range of machines and functions, from school
    kids to fully-fledged developers.


    By 2015, more than five million machines had been sold, according to the Raspberry
    Pi foundation, making it one of the best-selling British computers. In schools
    where kids, or older students, can learn computer skills, it is extremely common.


    Unfortunately, it''s also a pretty nifty little package for hackers, partly due
    to its size, portability and strength. But really, it only goes to show how good
    it is. It''s a path into robotics, software creation and a whole range of technological
    skills for the more morally sound consumers, which would otherwise cost thousands
    of pounds in tuition fees.


    If you are looking for inspiration to start your own Raspberry Pi project, then
    you have come to the right spot. To give you some ideas, we have gathered some
    of the best use cases around.


    ## Build a portable security box


    The Pi''s portability and affordability has made it a common instrument for red-teamers,
    penetration testers and other security personnel (people paying to hack into safety
    systems). It''s perfect for sneakily integrating with target networks because
    it has a built-in Ethernet port, minimal power requirements, and the ability to
    run any Linux program.


    Kali, a Linux distribution that is explicitly designed for hacking activities,
    is the program of choice for security operators trying to use Pi in this way.
    For the Raspberry Pi, there''s a purpose-built version of Kali, and installing
    it is pretty easy.


    Not only can you use it in your security operations once you have Kali enabled,
    you can also use it as a safe space to play around with new tools without causing
    harm to your primary computer. However, as always, you should only be hacking
    targets that have given you express authorization.


    ## Host a Raspberry Pi platform for Wordpress


    To familiarize yourself with the Raspberry Pi, hosting your own website is a great
    project. You can learn how to work with MySQL, PHP, and Apache applications, as
    well as the practicalities of operating with Linux, by running a Wordpress server.


    Not just that, but you''ll also have a functioning Wordpress website at the end
    of it, which you can use to host your own content! If you want it to be a proper
    website, you will need to register a domain name, but it''s a great place to view
    stuff such as CVs, artistic portfolios or something as basic as a personal blog.


    ## Install Windows 10 in full on Raspberry Pi 3


    For installing Microsoft''s operating system on Raspberry Pi 3 Model B or B+ boards,
    you can use the Windows on ARM (WoA) installer, available on GitHub. Previously,
    on Raspberry Pi computers, only stripped-down Windows IoT Core operating systems
    were available, but this new bundle provides complete Windows 10 OS functionality.


    Accessible on GitHub, the installer is optimized for ease of use and convenience,
    requiring bundled binaries and the WoA core kit.'
