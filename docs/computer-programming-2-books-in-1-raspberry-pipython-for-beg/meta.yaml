    ## 编程语言


    ### 什么是编程语言？


    让我们从理解什么是语言开始。这是一种表达信息并随后创建执行任务所需动作序列的非常方便的方法。在我们的环境中，有两种类型的语言：


    - 自然语言：自然语言是我们日常生活中使用的语言。也就是说，它指的是我们所说的语言（英语、西班牙语、法语、中文……）。它的优势在于我们通过接触、观察和实践逐渐学习它，因此被称为自然语言。然而，它也有缺点，例如理解有限，因为当人们说不同的语言时，很难理解他们。有时存在歧义或不精确，因为在大多数语言中，存在同义词或单词根据其上下文改变其含义。


    - 符号语言：它是一组人工创建的符号，用于表达可以被普遍理解并避免歧义的特定含义。因此，这种语言可以在国际上被理解，并且无论在哪里使用，每个符号都将始终具有相同的含义。


    因此，编程语言是语言的一个明显例子，它占据着介于自然语言（特别是人类使用的语言）和精确的符号语言（允许我们与机器交互）之间的中间位置。在这方面，我们应该特别感谢翻译语言的渐进发展，它允许我们将编程语言的指令转换为机器语言，使我们今天进行的编程过程看起来越来越像自然语言，使任务变得更容易。'
