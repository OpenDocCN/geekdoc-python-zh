    Pi models'' efficiency can vary. The parameters used are:


    +   - -r 10 For input and output files, presume ten frames per second.

    - -i image percent 04.jpg Specification of the input file (to fit the files produced
    during the capture).

    - -vcodec libx264 Use the x264 encoder software.

    - -vf scale=1280:720 720p scale. Depending on the specifications, you can also
    use 1920: 1080, or lower resolutions. Notice that the Pi can only play back up
    to 1080p video, but you might set it here if you intend to play back at 4 K, for
    instance.

    - timelapse.mp4 The output file''s name.


    Avconv has a detailed set of parameters for different choices for encoding and
    other settings. It is possible to list these using avconv —support.


    On another machine with Linux


    You may use the same Raspberry Pi instructions, or an alternative set such as
    the mencoder:


    Mencoder sudo apt installation


    Now run the command below:


    You should have a video file called timelapse.avi containing a time-lapse of your
    photos until that''s done.'
