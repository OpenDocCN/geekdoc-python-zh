    # Linux Basics


    Basic Linux Commands:


    You need to open the command line first before we move on to the list of commands.
    Check out this CLI tutorial if you are still uncertain about the command-line
    interface. Although the steps can vary depending on the distribution that you''re
    using, the command line can typically be found in the Utilities section.


    Here is a list of the Linux basic commands:


    1. Command pwd


    To find out the direction of the current working directory (folder) you are in,
    use the pwd command. The command returns an utter (full) path, which is essentially
    a path that starts with a forward slash (/) for all the directories. /home / username
    is an instance of the absolute path.


    2. Command to cd


    Use the cd command to move through the Linux files and folders. Depending on the
    actual working directory you''re in, it includes either the full path or the name
    of the directory.


    Let''s presume you''re in the /home / username / Documents directory and you want
    to go to the Documents subdirectory Images. Simply type the following command
    in order to do so: cd Images.'
- md: '## 3. Control ls Command


    For displaying a directory’s contents, the ls command is used. By default, the
    contents of your current working directory will be shown with this instruction.
    Type ls, and then the directory route, if you want to see the content of other
    directories. To access the content of documents, for example, enter ls /home/username/Documents.


    With the ls command, there are variations you can use:


    - ls -R can list all sub-directory files as well as all sub-directory files.

    - ls -a reveals concealed directories.

    - ls -al lists files and directories containing detailed data such as permissions,
    size, owner, etc.


    ## 4. Cat command


    One of Linux''s most commonly used commands is cat (short for concatenate). It
    is used in the standard output (stdout) to list the contents of a file. In order
    to run this command, type cat, followed by the name and extension of the file.
    For example: cat file.txt.


    Here are other ways for the cat command to be used:


    - cat > filename generates a new file.

    - cat filename1 filename2 > filename3 joins and stores the output of two files
    (1 and 2) in a new file (3).

    - cat filename | tr a-z A-Z > output.txt to convert a file to upper- or lower-case
    use.


    ## 5. The cp command


    Copy files from the current directory to a separate directory using the cp command.
    For example, the cp scenery.jpg /home/username/Pictures command generates a copy
    of scenery.jpg in the Pictures directory (from your current directory).


    ## 6. MV command


    The mv command''s primary use is to transfer files, although it can be used to
    rename files as well. In mv, the arguments are identical to the command cp. You
    need to type mv, a name for the file, and a directory for the destination. mv
    file.txt /home/username/Documents, for example.


    The Linux command to rename files is: mv oldname.ext newname.ext.


    ## 7. The MKDIR command


    Use the mkdir command to create a new directory, and if you type mkdir Music,
    a directory called Music will be created.


    There are additional mkdir commands also:


    - Use this Linux simple command, mkdir Music/Newfile, to create a new directory
    within another directory.

    - To create a directory between two existing directories, use the -p (parents)
    option. For example, mkdir -p Music/2020/Newfile creates a new file called ''2020.''


    ## 8. Order to rmdir


    Use the rmdir command if you need to delete a directory. However, rmdir only allows
    empty folders to be removed.


    ## 9. The rm command


    To delete directories and the contents inside them, the rm command is used. Using
    rm -r if you only want to uninstall the directory as an alternative to rmdir.


    Note: With this command, be very cautious and double-check which directory you
    are in. This will erase it all, and there is no undoing.


    ## 10. Touch Command


    The touch command allows you to use the Linux command line to build a new, blank
    file. For example, to build an HTML file entitled Web under the Documents directory,
    enter touch /home/username/Documents/Web.html.


    ## 11. Locate command


    You can use this command, much like the search command in Windows, to find a file.
    What''s more, it will make it case-insensitive by using the -i argument along
    with this button, so you can scan for a file even if you don''t know its exact
    name.


    Use an asterisk (*) to scan for a file that includes two or more words. For instance,
    the locate -i school*note command will search for any file containing the words
    "school" and "note" in upper or lower case.


    ## 12. Find Command


    Similar to the locate command, scan for files and directories by using find as
    well. The difference is, to locate files in a given directory, you use the find
    command.


    For example, the find /home/ -name notes.txt command will search the home directory
    and its subdirectories for a file called notes.txt.


    By using the find command, other variants are:


    - To search files using the current directory, find . -name notes.txt.

    - find / -type d -name notes to check for directories to use.


    ## 13. The Grep command


    Grep is another simple Linux command that is unquestionably helpful for daily
    use. It helps you to browse through all the text in a specific file. For example,
    grep blue notepad.txt looks for the word blue in the notepad file. There will
    be completely displayed lines containing the searched term.


    ## 14. Command sudo


    This instruction, short for SuperUser Do, allows you to perform tasks that require
    administrative or root privileges. Using this command for everyday use, however,
    is not recommended because if you did anything wrong, it would be easy for an
    error to occur.


    ## 15. The df command


    Using df to get a report of the disk space consumption of the device, shown in
    percentages and KBs. Type df -m if you want to see the report in megabytes.


    ## 16. Du command


    The du (Disk Usage) command is the answer if you want to check how much space
    a file or a directory takes. However, instead of the normal size format, the disk
    use overview will include disk block numbers. Add the -h argument to the command
    line if you want to see it in bytes, kilobytes, and megabytes.


    ## 17. Head command


    To access the first lines of any text file, the head command is used. It shows
    the first ten lines by default, but you can change this number to your taste.
    Type head -n 5 filename.ext, for example, if you just want to view the first five
    lines.


    ## 18. Tail command


    This one has a feature similar to the head command, except the tail command would
    view the last ten lines of a text file instead of displaying the first lines.
    tail -n filename.ext, for example.


    ## 19. Diff command


    The diff command, short for difference, compares the contents of two files line-by-line.
    It will output the lines that do not fit after evaluating the files. Programmers
    also use this command instead of rewriting the entire source code when they need
    to make program alterations.


    diff file1.ext file2.ext is the simplest form of this command.


    ## 20. The tar command


    The tar command is a popular Linux file format that is identical to the zip format,
    with compression being optional, and is the most used command to archive several
    files into a tarball.


    With a long list of functions, such as adding new files to an existing archive,
    listing the content of an archive, removing content from an archive, and many
    more, this command is very complex.


    ## Introducing Raspbian


    Raspbian is a free Debian-based operating system designed for the Raspberry Pi
    hardware. The collection of basic programs and utilities which make your Raspberry
    Pi run is an operating system. Raspbian, however, offers more than just a pure
    OS: it comes with more than 35,000 packages of pre-compiled software packed nicely
    for quick installation on your Raspberry Pi.


    In June 2012, the initial construction of more than 35,000 Raspbian packages designed
    for the best results on the Raspberry Pi was completed. Raspbian, however, is
    still being actively developed with a focus on enhancing the reliability and performance
    of as many Debian packages as possible.


    Note: Raspbian is not affiliated with the Raspberry Pi Foundation. A small, dedicated
    team of developers who are fans of the Raspberry Pi hardware, the Raspberry Pi
    Foundation''s educational objectives and, of course, the Debian Project, developed
    Raspbian.


    ## Use external computers for storage


    A device that holds all the addressable data storage that is not within the main
    storage or memory of a computer is an external storage device, is often referred
    to as auxiliary storage and secondary storage. Removable or non-removable, temporary
    or permanent, and available over a wired or wireless network may be an external
    storage unit.'
  mdcn: '## 3. 控制 ls 命令


    要显示目录内容，可以使用 `ls` 命令。默认情况下，此命令会显示当前工作目录的内容。如果想查看其他目录的内容，请输入 `ls`，然后输入目录路径。例如，要访问文档内容，请输入
    `ls /home/username/Documents`。


    使用 `ls` 命令时，有以下几种变体可用：


    - `ls -R` 可以列出所有子目录文件以及所有子目录文件。

    - `ls -a` 会显示隐藏的目录。

    - `ls -al` 会列出文件和目录，并包含详细数据，如权限、大小、所有者等。


    ## 4. Cat 命令


    `cat`（concatenate 的缩写）是 Linux 中最常用的命令之一。它用于在标准输出（stdout）中列出文件的内容。要运行此命令，请输入 `cat`，后跟文件的名称和扩展名。例如：`cat
    file.txt`。


    以下是 `cat` 命令的其他使用方式：


    - `cat > filename` 会生成一个新文件。

    - `cat filename1 filename2 > filename3` 会将两个文件（1 和 2）的输出合并并存储到一个新文件（3）中。

    - `cat filename | tr a-z A-Z > output.txt` 用于将文件转换为大写或小写。


    ## 5. cp 命令


    使用 `cp` 命令可以将文件从当前目录复制到另一个目录。例如，`cp scenery.jpg /home/username/Pictures` 命令会在
    Pictures 目录中（从当前目录）创建 `scenery.jpg` 的副本。


    ## 6. MV 命令


    `mv` 命令的主要用途是移动文件，但它也可以用于重命名文件。在 `mv` 中，参数与 `cp` 命令相同。你需要输入 `mv`、文件名和目标目录。例如，`mv
    file.txt /home/username/Documents`。


    Linux 中重命名文件的命令是：`mv oldname.ext newname.ext`。


    ## 7. MKDIR 命令


    使用 `mkdir` 命令可以创建一个新目录。如果你输入 `mkdir Music`，将会创建一个名为 Music 的目录。


    还有其他 `mkdir` 命令：


    - 使用这个简单的 Linux 命令 `mkdir Music/Newfile`，可以在另一个目录中创建一个新目录。

    - 要在两个现有目录之间创建一个目录，请使用 `-p`（parents）选项。例如，`mkdir -p Music/2020/Newfile` 会创建一个名为
    ''2020'' 的新文件。


    ## 8. rmdir 命令


    如果需要删除一个目录，请使用 `rmdir` 命令。但是，`rmdir` 只允许删除空文件夹。


    ## 9. rm 命令


    要删除目录及其内部内容，请使用 `rm` 命令。如果你只想删除目录（作为 `rmdir` 的替代方案），请使用 `rm -r`。


    注意：使用此命令时，请务必小心，并仔细检查你所在的目录。这将删除所有内容，且无法撤销。


    ## 10. Touch 命令


    `touch` 命令允许你使用 Linux 命令行创建一个新的空白文件。例如，要在 Documents 目录下创建一个名为 Web 的 HTML 文件，请输入
    `touch /home/username/Documents/Web.html`。


    ## 11. Locate 命令


    你可以使用此命令（类似于 Windows 中的搜索命令）来查找文件。此外，通过使用 `-i` 参数，它将使搜索不区分大小写，因此即使你不知道文件的确切名称，也可以扫描文件。


    使用星号（*）来扫描包含两个或多个单词的文件。例如，`locate -i school*note` 命令将搜索任何包含 "school" 和 "note"
    这两个词（不区分大小写）的文件。


    ## 12. Find 命令


    与 `locate` 命令类似，也可以使用 `find` 来扫描文件和目录。不同之处在于，要在给定目录中定位文件，请使用 `find` 命令。


    例如，`find /home/ -name notes.txt` 命令将在主目录及其子目录中搜索名为 `notes.txt` 的文件。


    使用 `find` 命令时，还有其他变体：


    - 要在当前目录中搜索文件，请使用 `find . -name notes.txt`。

    - `find / -type d -name notes` 用于检查要使用的目录。


    ## 13. Grep 命令


    `Grep` 是另一个简单的 Linux 命令，对于日常使用无疑非常有帮助。它帮助你浏览特定文件中的所有文本。例如，`grep blue notepad.txt`
    会在记事本文件中查找 "blue" 这个词。包含搜索词的行将被完全显示出来。


    ## 14. sudo 命令


    此指令是 SuperUser Do 的缩写，允许你执行需要管理员或 root 权限的任务。但是，不建议日常使用此命令，因为如果你做错了任何事情，很容易发生错误。


    ## 15. df 命令


    使用 `df` 可以获取设备磁盘空间消耗的报告，以百分比和 KB 显示。如果你想以兆字节查看报告，请输入 `df -m`。


    ## 16. Du 命令


    如果你想检查文件或目录占用了多少空间，`du`（Disk Usage）命令就是答案。但是，磁盘使用概览将包含磁盘块号，而不是正常的大小格式。如果你想以字节、千字节和兆字节查看，请在命令行中添加
    `-h` 参数。


    ## 17. Head 命令


    要访问任何文本文件的前几行，请使用 `head` 命令。默认情况下，它显示前 10 行，但你可以根据自己的喜好更改此数字。例如，如果你只想查看前 5 行，请输入
    `head -n 5 filename.ext`。


    ## 18. Tail 命令


    此命令具有与 `head` 命令类似的功能，不同之处在于 `tail` 命令将查看文本文件的最后 10 行，而不是显示前几行。例如，`tail -n filename.ext`。


    ## 19. Diff 命令


    `diff` 命令（difference 的缩写）逐行比较两个文件的内容。在评估文件后，它将输出不匹配的行。程序员在需要进行程序修改时，也会使用此命令，而不是重写整个源代码。


    `diff file1.ext file2.ext` 是此命令的最简单形式。


    ## 20. tar 命令


    `tar` 命令是一种流行的 Linux 文件格式，与 zip 格式相同，压缩是可选的，并且是将多个文件归档到 tarball 中最常用的命令。


    此命令功能非常复杂，具有很长的功能列表，例如将新文件添加到现有归档中、列出归档内容、从归档中删除内容等等。


    ## 介绍 Raspbian


    Raspbian 是一个基于 Debian 的免费操作系统，专为 Raspberry Pi 硬件设计。使你的 Raspberry Pi 运行的基本程序和实用程序集合就是一个操作系统。然而，Raspbian
    提供的不仅仅是一个纯粹的操作系统：它附带了超过 35,000 个预编译软件包，这些软件包被很好地打包，以便在你的 Raspberry Pi 上快速安装。


    2012 年 6 月，为 Raspberry Pi 实现最佳效果而设计的超过 35,000 个 Raspbian 软件包的初始构建完成。然而，Raspbian
    仍在积极开发中，重点是尽可能提高尽可能多的 Debian 软件包的可靠性和性能。


    注意：Raspbian 与 Raspberry Pi 基金会没有关联。Raspbian 是由一小群专门的开发人员开发的，他们是 Raspberry Pi 硬件的粉丝、Raspberry
    Pi 基金会的教育目标，当然还有 Debian 项目。


    ## 使用外部计算机进行存储


    外部存储设备是指保存所有可寻址数据存储的设备，这些数据不在计算机的主存储或内存中，通常被称为辅助存储和二级存储。外部存储单元可以是可移动或不可移动的、临时或永久的，并且可以通过有线或无线网络访问。'
