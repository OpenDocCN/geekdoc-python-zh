    a tool with every intention of taking you by the hand on your journey as a programmer
    from day zero. We hope to be a clear, solid, and lasting base of knowledge that
    will be kept in your collection whenever it is necessary in any challenge encountered
    in the world of programming. Remember that you can always consult this information
    again and that a large community of people with the same interests as you is waiting
    to meet you to help you learn and collaborate.'
