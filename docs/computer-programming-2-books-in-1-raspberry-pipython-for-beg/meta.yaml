    # Software Install and Uninstall


    Users are accounts that can be used in a system to login. Each consumer is recognized
    by the system through a unique identification number or UID. All device user information
    is stored in the /etc / passwd file. Users'' hashed passwords are stored in the
    /etc / shadow format.


    On the basis of the degree of access, users can be divided into two categories:


    +   1. Superuser / root / administrator: All the files on the server can be accessed.

    2. Standard users: Access limited.


    When a new user is created, the system takes the following actions by default:


    +   • Assigns the user a UID.

    • Establishes the /home/ home directory.

    • Sets the user''s default shell as /bin / sh.

    • Build a private community of users named after the username itself.'
