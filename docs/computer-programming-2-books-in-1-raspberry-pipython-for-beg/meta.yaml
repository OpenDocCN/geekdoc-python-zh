    ## CPU (Central Unit of Processing)


    The Central Processing Unit is the brain of the Raspberry Pi Board and is responsible
    for carrying out logical and mathematical operations of the computer''s instructions.
    The Raspberry Pi uses the ARM11 processor series, which has entered the Samsung
    Galaxy phone ranks.


    ## GPU (Unit for Graphics Processing)


    The GPU in the Raspberry Pi board is a specialized chip designed to speed up the
    image calculations process. This board is designed to support OpenGL with a Broadcom
    video core IV.


    ## Port of Ethernet


    The Raspberry Pi Ethernet port is the primary gateway for communicating with additional
    computers. The Raspberry Pi Ethernet port is used to plug your home router to
    access the internet.


    ## Pins from GPIO


    In the Raspberry Pi, the general purpose input & output pins are used to communicate
    with the other electronic boards. These pins can accept input & output commands
    based on Raspberry Pi programming. The Raspberry Pi offers GPIO digital pins.
    These pins are used to connect other electronic components. For instance, to transfer
    digital data, you can link it to the temperature sensor.


    ## XBee Socket


    The XBee socket is used for wireless networking purposes on the Raspberry Pi board.


    ## Connector to Power Source


    A small switch is a power source cable that is positioned on the side of the shield.
    Enabling an external power source is the main purpose of the power source connector.


    ## UART


    A serial input & output port is a Universal Asynchronous Receiver/Transmitter.
    This can be used in the form of text to transfer serial data and is helpful for
    converting the debugging code.


    ## Displays


    The Raspberry Pi board''s link options are two styles, HDMI and Composite. Several
    LCD and HD TV monitors can be paired with an HDMI male cable and a low-cost adaptor.
    HDMI versions 1.3 and 1.4 are supported, and a cable version of 1.4 is suggested.
    The Raspberry Pi audio and video O/Ps are supported by HDMI but do not support
    HDMI I/P. Older TVs can be linked using composite video. Audio is accessible from
    the 3.5 mm jack socket when using a composite video link and can be sent to your
    television. You need a cable which adjusts from 3.5 mm to double RCA connectors
    to send audio to your TV.


    ## Raspberry Pi Board Model A


    A Broadcom (BCM2835) SOC (system on chip) board is the Raspberry Pi board. It
    is available fitted with an ARM1176JZF-S core CPU, 256 MB SDRAM and 700 MHz. Raspberry
    Pi USB 2.0 ports only use external options for data access. The micro USB adapter
    draws its power from the board, with a minimum range of 2 (500 mA) watts. The
    advanced graphics chip is designed to accelerate the process of image calculations.
    This is designed with the Broadcom video core IV cable, which is helpful if you
    want your Raspberry Pi to run a game and video.


    ## Raspberry Pi Model A Features


    The Raspberry Pi features of model A primarily include:


    - 256 MB of memory SDRAM

    - Single USB 2.0 connector

    - Coprocessor for Dual Core Video Core IV Multimedia

    - Composite RCA (PAL and NTSC) Video Out (HDMI) (rev 1.3 & 1.4)

    - Jack 3.5 MM, HDMI, Audio Out

    - SD, MMC, SDIO Card slot on the storage board

    - Operating System for Linux

    - Total HD Broadcom BCM2835 SoC Multimedia Processor

    - Scale 8.6cm*5.4cm*1.5 cm


    ## Raspberry Pi Model B Board


    A Broadcom BCM2835 SOC (system on chip board) is the Raspberry Pi. A 700 MHz,
    512 MB SDRAM and ARM1176JZF-S core CPU are included. Only external data access
    options are used for the USB 2.0 port of the Raspberry Pi Board. The Ethernet
    in the Raspberry Pi in model B is the primary gateway for interconnecting with
    other devices and the internet. This draws its power, with a minimum range of
    2.5 watts (500 mA), from a micro USB adapter. The advanced chip for graphics is
    designed to accelerate the manipulation of image calculations. This is designed
    with the Broadcom video core IV cable, which is helpful if you want your Raspberry
    Pi to run a game and video.


    ## Set up & launch your Raspberry Pi


    With an SD card, the Raspberry Pi board comes packed. This slot allows us to insert
    an SD card and our computers can use it. The SD card is a key Raspberry Pi board
    storage unit like a personal computer''s hard disk. The bootable Linux operating
    system you are intending to use is loaded into the card. Raspberry Pi supports
    operating systems for Linux, Qtonpi, ARM, and Mac. One ISO can be selected; you
    will need to write it to an SD card using the program Disk Manager. Other storage
    mechanisms, such as an external USB hard disk or a USB drive, may also be used.
    There are several brands of SD cards that are available in various sizes on the
    market. The Raspberry Pi supports a maximum SD card of 64 GB.


    You''re going to need to connect a monitor, keyboard, mouse like a PC before you
    start your Raspberry Pi. It supports three different O/Ps, such as HDMI video,
    composite video, and DSI video, where some special hardware is required for the
    DSI video. It can be sold with or without an SD card when you purchase a Raspberry
    Pi board. It is a very important Raspberry Pi board specification. Since it retains
    the operating system, records and services. If the SD card didn''t come with your
    Raspberry Pi, then the minimum size you could get is 4 GB.


    The benefits of the Raspberry Pi are that it is small in size and operates to
    manage web traffic like a regular machine on a low cost server.


    ## Applications of Raspberry Pi


    In many applications such as video streamers, arcade machines, tablet computers,
    home automation, car computer, internet radio, robot power, cosmic computers,
    meteorite hunting, coffee, Raspberry Pi boards are used.


    ## Motor Speed Control depending on Raspberry Pi


    The main goal of this project is to use the Raspberry Pi to regulate the speed
    of a DC motor.


    ## Hardware and software Requirements


    DC Engine, Raspberry Pi model, TV or PC display, IC Engine Driver, LED, Resistors,
    Capacitors, Diode, Transformer, Voltage Regulator and PHP program / cable pi.


    ## Motor Speed Control Block Diagram Based on Raspberry Pi


    To monitor the DC motor velocity, this project uses a Raspberry Pi board. A DC
    motor''s speed is directly proportional to the voltage applied across its terminals.
    When the voltage varies across the motor terminal, the speed varies accordingly
    as well. To run the engine at different speeds by pressing the key, a keyboard
    must be linked to the Raspberry Pi board.


    The PWM (pulse width modulation) is activated at the output according to the software,
    and it can be programmed using PHP / wiring pi. The average current and voltage
    change according to the service cycle, so the DC motor speed will also change.
    For receiving PWM signals and sending the desired O/P to the DC engine, a motor
    driver IC is connected to the board.


    ## Using Raspberry Pi, Auto Intensity monitoring of streetlights


    The main objective of this project is to use Raspberry Pi to monitor the automatic
    strength of streetlights.


    ### Requirements for Hardware and Applications:


    The transformer, the diodes, the capacitors, the resistors, the LEDs, the Raspberry
    Pi frame, the TV or PC display, the White LEDs, the MOSFET, the Crystal, the PHP
    or the Wiring Pi software.


    This project uses many LEDs as streetlights that use less electricity. When compared
    to the HID lamps, the lifespan of the LEDs is also greater. To regulate the intensity,
    a Raspberry Pi is used by generating pulse width modulation signals that drive
    a MOSFET to turn the LEDs to achieve the desired operation.


    The intensity of LEDs gradually varies from evening to the next day, particularly
    during peak hours, with maximum light intensity and then slowly decreasing the
    intensity of the decreasing lights. In the Raspberry Pi software, MOSFET switching
    by pulse width modulation technique is implemented to provide variable voltage
    across the LEDs.


