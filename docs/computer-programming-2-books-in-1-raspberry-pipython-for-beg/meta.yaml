- md: "## Console Retro Gaming\n\nNostalgia for technology is true, and this latest\
    \ (or old) trend has been at the forefront of retro gaming consoles. When they\
    \ were first rereleased, the classic Nintendo systems sold out. SEGA and Atari\
    \ both capitalized on the craze and issued their own. One can simulate over 40\
    \ retro gaming systems, over 30,000 games, customize your game lists, and play\
    \ with up to 5 players with a Raspberry Pi. You can build your own arcade full\
    \ of your favorite games from the past, using Recalbox or RetroPie.\n\nIn order\
    \ to create a cluster (known as a \"bramble\"), some individuals also combine\
    \ several Raspberry Pi. It is possible to use the Raspberry Pi 3 cluster as an\
    \ efficient computing system. The largest bramble ever built was a GCHQ-built\
    \ 96 Raspberry Pi computer.\n\n## How the Mini PC Craze was brought on by Raspberry\
    \ Pi\n\nOne of the key reasons for its success is the small, compact size and\
    \ low cost of a Raspberry Pi. This takes me to another compact and strong piece\
    \ of technology that all of us should consider adding mini PCs to our lives.\n\
    \nThe Raspberry Pi's rise in popularity helped customers see the many advantages\
    \ of a portable machine. In the mini PC craze, the concept of a powerful, compact,\
    \ and well-priced machine helped bring in. A mini PC in a miniature compact case\
    \ is a desktop computer. This takes up considerably less space than a typical\
    \ CPU desktop tower. There are various mini Windows and Linux PCs, and either\
    \ a Ready-to-Go setup or a version of Barebones can be selected. A Barebones package\
    \ contains a shell, motherboard, and processor, meaning a hard drive, operating\
    \ system, and RAM must be added. All you need to get started includes a Ready-to-Go\
    \ pack.\n\nThe benefits of a mini PC are its size, usability (easy to change components\
    \ and easy to switch from one screen to another), cost (you can find one for about\
    \ $300), and low energy consumption.\n\nThe go-to set-up for a portable computer\
    \ has been laptops and tablets, but there is so much that these machines can do.\
    \ As a mix of both a laptop and a desktop, you can create a mini PC. One can have\
    \ the comfort of a laptop, but a desktop's capacity and upgrade capabilities.\n\
    \nFor work and business use, home entertainment purposes, gaming, video conferencing,\
    \ and media creation, many individuals use mini-PCs. Incorporating the best of\
    \ all worlds provides mini PCs with several benefits.\n\n# Chapter Three\n\n##\
    \ Linux System Administration\n\n### An Overview\n\nLinux is an open-source Unix\
    \ culture, including the Linux Kernel-based operating systems. On September 17,\
    \ 1991, it was initially published by Linus Torvalds. It is a free and open-source\
    \ operating system, and under the GNU General Public License, the source code\
    \ can be updated and distributed to anyone commercially or non-commercially.\n\
    \nLinux was originally designed for personal computers and was eventually used\
    \ on other computers, such as servers, mainframe computers, supercomputers, etc.\
    \ Linux is also used today in embedded systems such as routers, controls for automation,\
    \ TVs, digital video recorders, video game consoles, smartwatches, etc. Linux's\
    \ greatest success is the Android operating system; it is based on the Linux kernel\
    \ that runs on smartphones and tablets. Linux has the highest user base of all\
    \ general-purpose operating systems because of Android. Generally, Linux is bundled\
    \ inside a Linux distribution.\n\n#### Distribution on Linux\n\nThe Linux distribution\
    \ is an operating system consisting of a series of Linux kernel-based applications,\
    \ or you might assume that the distribution includes the Linux kernel and supports\
    \ libraries and software. And by installing one of the Linux distributions, you\
    \ can get a Linux-based operating system and these distributions are available\
    \ for various types of devices, such as embedded devices, personal computers,\
    \ etc. There are around 600+ Linux distributions available, and some of the common\
    \ distributions for Linux are:\n\n- MX Linux\n- Manjaro\n- Mint Linux\n- Elementary\n\
    - Ubuntu\n- Debian\n- Solus\n- Fedora\n- OpenSuse\n- Deepin\n\n## Linux architecture\n\
    \nThe following components belong to the Linux architecture:\n\n1. *Kernel*: Kernel\
    \ is the foundation of the operating system that is based on Linux. To provide\
    \ each process with its virtual resources, it virtualizes the computer's common\
    \ hardware resources. This makes it look as if the method is the only process\
    \ operating on the computer. It is also the duty of the kernel to avoid and manage\
    \ conflicts between various processes. The different kernel forms are:\n   - Monolithic\
    \ Kernel\n   - Kernel hybrids\n   - Kernels of Exo\n   - Micro kernels\n2. *Device\
    \ Library*: Particular types of functions that are used to enforce operating system\
    \ features.\n3. *Shell*: This is a kernel interface that hides from users the\
    \ ambiguity of the kernel’s functions. It takes user commands and executes the\
    \ functions of the kernel.\n4. *Hardware Layer*: This layer consists of all RAM\
    \ / HDD / CPU peripheral modules, etc.\n5. *System Utility*: This provides the\
    \ user with the features of an operating system.\n\n## Linux Advantages\n\nLinux's\
    \ biggest benefit is that it is an operating system that is open source. This\
    \ ensures that the source code is freely accessible to anyone and you can contribute,\
    \ change and distribute the code to anyone without permission. Other advantages\
    \ include:\n\n- Linux is better than any other operating system in terms of stability.\
    \ This does not mean that Linux is 100% stable, but it is less vulnerable than\
    \ any other operating system, since it has some malware. So, anti-virus software\
    \ is not needed.\n- Linux software updates are quick and regular.\n- There are\
    \ various Linux distributions available to use according to your needs or your\
    \ taste.\n- Linux is freely accessible on the internet to use.\n- It has tremendous\
    \ community support.\n- It offers great stability. It seldom slows down or freezes\
    \ and, after a short time, there is no need to reboot it.\n- It protects the user's\
    \ privacy.\n- The Linux system's performance is much better than that of other\
    \ operating systems. This allows a large number of individuals to function at\
    \ the same time and it manages them effectively.\n- Network-friendly it is.\n\
    - Linux's versatility is strong. There is no need to install a full Linux suite;\
    \ only the necessary components need to be installed.\n- A large range of file\
    \ formats are compatible with Linux.\n- Installation from the web is simple and\
    \ convenient. It can also be mounted on any hardware, including your old operating\
    \ device.\n- Even if it has limited hard disk space, it performs all the tasks\
    \ properly.\n\n## Linux drawbacks\n\n- It is not particularly user-friendly. So,\
    \ for beginners, it can be frustrating.\n- Compared to Windows, it has limited\
    \ peripheral hardware drivers.\n\n## Linux Basics\n\nBasic Linux Commands:\n\n\
    You need to open the command line first before we move on to the list of commands.\
    \ Check out this CLI tutorial if you are still uncertain about the command-line\
    \ interface. Although the steps can vary depending on the distribution that you're\
    \ using, the command line can typically be found in the Utilities section.\n\n\
    Here is a list of the Linux basic commands:\n\n1. Command pwd\n\nTo find out the\
    \ direction of the current working directory (folder) you are in, use the pwd\
    \ command. The command returns an utter (full) path, which is essentially a path\
    \ that starts with a forward slash (/) for all the directories. /home/username\
    \ is an instance of the absolute path.\n\n2. Command to cd\n\nUse the cd command\
    \ to move through the Linux files and folders. Depending on the actual working\
    \ directory you're in, it includes either the full path or the name of the directory.\n\
    \nLet's presume you're in the /home/username/Documents directory and you want\
    \ to go to the Documents subdirectory Images. Simply type the following command\
    \ in order to do so: cd Images."
  mdcn: "## 主机复古游戏\n\n对科技的怀旧之情确实存在，而这股最新（或复古）潮流一直走在复古游戏主机的前沿。当经典任天堂系统首次重新发售时，便迅速售罄。世嘉和雅达利也抓住了这股热潮，推出了自己的产品。借助树莓派，你可以模拟超过40种复古游戏系统、超过30,000款游戏，自定义你的游戏列表，并最多支持5名玩家同时游玩。你可以使用Recalbox或RetroPie，打造一个充满过去经典游戏的专属街机。\n\
    \n为了创建一个集群（称为“树莓派群”），一些人还会将多个树莓派组合起来。可以将树莓派3集群用作一个高效的计算系统。有史以来最大的树莓派群是由英国政府通信总部（GCHQ）构建的，包含96台树莓派计算机。\n\
    \n## 树莓派如何引发迷你电脑热潮\n\n其成功的关键原因之一在于树莓派小巧紧凑的尺寸和低廉的成本。这让我想到了另一款紧凑而强大的技术产品，我们都应该考虑将迷你电脑加入我们的生活。\n\
    \n树莓派的普及帮助消费者认识到便携式设备的诸多优势。在迷你电脑热潮中，强大、紧凑且价格合理的机器概念得以流行。迷你电脑就是一台置于微型紧凑机箱中的台式电脑。它占用的空间比典型的CPU台式机塔要小得多。市面上有各种迷你Windows和Linux电脑，可以选择即开即用（Ready-to-Go）的配置或准系统（Barebones）版本。准系统套件包含机箱、主板和处理器，这意味着需要额外添加硬盘、操作系统和内存。而即开即用套件则包含了你开始使用所需的一切。\n\
    \n迷你电脑的优势在于其尺寸、易用性（易于更换组件，易于切换屏幕）、成本（大约300美元就能买到一台）以及低能耗。\n\n便携式电脑的主流配置一直是笔记本电脑和平板电脑，但这些设备能做的事情有限。作为笔记本电脑和台式电脑的结合体，迷你电脑应运而生。它既能提供笔记本电脑的舒适性，又具备台式电脑的容量和升级能力。\n\
    \n许多人使用迷你电脑用于工作和商务用途、家庭娱乐、游戏、视频会议和媒体创作。集各家之长，使迷你电脑具备了多项优势。\n\n# 第三章\n\n## Linux系统管理\n\
    \n### 概述\n\nLinux是一个开源的Unix文化，包括基于Linux内核的操作系统。它最初由林纳斯·托瓦兹于1991年9月17日发布。它是一个免费且开源的操作系统，在GNU通用公共许可证下，其源代码可以被任何人以商业或非商业方式更新和分发。\n\
    \nLinux最初是为个人电脑设计的，后来也用于其他计算机，如服务器、大型计算机、超级计算机等。如今，Linux也用于嵌入式系统，如路由器、自动化控制、电视、数字录像机、视频游戏机、智能手表等。Linux最大的成功是Android操作系统；它基于Linux内核，运行在智能手机和平板电脑上。由于Android，Linux在所有通用操作系统中拥有最高的用户基础。通常，Linux以Linux发行版的形式捆绑提供。\n\
    \n#### Linux发行版\n\nLinux发行版是一个由一系列基于Linux内核的应用程序组成的操作系统，或者你可以理解为发行版包含了Linux内核以及支持库和软件。通过安装其中一个Linux发行版，你就可以获得一个基于Linux的操作系统，这些发行版适用于各种类型的设备，如嵌入式设备、个人电脑等。目前大约有600多种Linux发行版可用，一些常见的Linux发行版包括：\n\
    \n- MX Linux\n- Manjaro\n- Mint Linux\n- Elementary\n- Ubuntu\n- Debian\n- Solus\n\
    - Fedora\n- OpenSuse\n- Deepin\n\n## Linux架构\n\n以下组件属于Linux架构：\n\n1. *内核*：内核是基于Linux的操作系统的基础。它通过虚拟化计算机的通用硬件资源，为每个进程提供其虚拟资源。这使得每个进程看起来都像是计算机上唯一运行的进程。内核还负责避免和管理不同进程之间的冲突。不同的内核形式包括：\n\
    \   - 宏内核\n   - 混合内核\n   - 外内核\n   - 微内核\n2. *设备库*：用于实现操作系统功能的特定类型函数。\n3. *Shell*：这是一个内核接口，它向用户隐藏了内核功能的复杂性。它接收用户命令并执行内核的功能。\n\
    4. *硬件层*：该层包括所有RAM / HDD / CPU等外围模块。\n5. *系统实用程序*：它为用户提供操作系统的功能。\n\n## Linux优势\n\
    \nLinux最大的好处在于它是一个开源操作系统。这意味着任何人都可以自由访问源代码，你可以在未经许可的情况下贡献、修改和分发代码。其他优势包括：\n\n\
    - Linux在稳定性方面优于任何其他操作系统。这并不意味着Linux是100%稳定的，但它比任何其他操作系统都更不容易受到恶意软件的攻击，因此不需要杀毒软件。\n\
    - Linux软件更新快速且定期。\n- 有各种Linux发行版可供选择，以满足你的需求或喜好。\n- Linux可以在互联网上免费获取和使用。\n- 它拥有庞大的社区支持。\n\
    - 它提供出色的稳定性。它很少变慢或死机，并且无需在短时间内重启。\n- 它保护用户的隐私。\n- Linux系统的性能远优于其他操作系统。这允许大量用户同时运行，并能有效管理他们。\n\
    - 它对网络友好。\n- Linux的多功能性很强。无需安装完整的Linux套件；只需安装必要的组件即可。\n- Linux兼容多种文件格式。\n- 从网络安装简单方便。它也可以安装在任何硬件上，包括你旧的操作设备。\n\
    - 即使硬盘空间有限，它也能正确执行所有任务。\n\n## Linux缺点\n\n- 它对用户不是特别友好。因此，对于初学者来说，可能会感到沮丧。\n- 与Windows相比，它的外围硬件驱动程序有限。\n\
    \n## Linux基础\n\n基本Linux命令：\n\n在我们继续命令列表之前，你需要先打开命令行。如果你仍然不确定命令行界面，请查看这个CLI教程。尽管步骤可能因你使用的发行版而异，但命令行通常可以在“实用程序”部分找到。\n\
    \n以下是Linux基本命令列表：\n\n1. pwd命令\n\n要找出你当前所在的当前工作目录（文件夹）的方向，请使用pwd命令。该命令返回一个完整路径，这本质上是一个以正斜杠（/）开头的路径，表示所有目录。/home/username就是一个绝对路径的例子。\n\
    \n2. cd命令\n\n使用cd命令在Linux文件和文件夹中移动。根据你当前所在的实际工作目录，它包含完整路径或目录名称。\n\n假设你位于/home/username/Documents目录，并且想要进入Documents子目录Images。只需输入以下命令即可：cd\
    \ Images。"
