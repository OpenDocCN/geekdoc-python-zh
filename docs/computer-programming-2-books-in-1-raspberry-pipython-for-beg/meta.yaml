    -   第 10 步告诉你，在没有进一步指导的情况下编辑文件“run.sh”。为此，打开你 Pi 目录中的 Minecraft 文件夹，右键单击 run.sh\
    \ 文件，然后选择“Text Editor”。\n\n你有两种不同的方式来启动 Minecraft。指南告诉你使用“./run.sh”在终端中启动 Minecraft。虽然这可行，但你需要在终端窗口中输入“cd\
    \ Minecraft”，然后再输入该命令。另一种选择是打开 Minecraft 文件夹，双击 run.sh 文件，然后选择“Run”。\n\n### 运行最新版本\n\
    \n好的，一旦你让它运行起来，你就可以开始调整安装了。你需要重新启动 Minecraft.jar 文件才能跳转到 Minecraft 的新版本。\n\n1.\
