  md: '# # Chapter Four


    # ## Setting Up the Troubleshooting


    From experience, each model of the Raspberry PI (and operating system) has its
    own peculiar problems and corrections, so I will presume that you are using a
    Raspberry Pi 3 and running the latest version of the Raspbian stretch OS to keep
    things reasonably normal for this chapter.


    **All set? Let''s dive inside!**


    +   1. Issues with Boot


    This may be attributed to quite a variety of variables. The Red LED (power LED)
    is usually indicated by "ON" while the green (activity LED) is either "OFF" or
    permanently "on."


    *The Solution:*


    Computer operation is reflected by the green light on the Raspberry Pi, so when
    it is blinking at intervals, it indicates the Pi is running. Therefore, the first
    place you can search whether it''s off or not flickering is where the Pi''s program
    is housed: the slot for the SD card. Ensure the proper insertion of the SD card.
    If things don''t improve, search the SD card to make sure the OS has flashed correctly
    and the files on it aren''t corrupted.


    I typically just format the SD card in situations like this, and flash it with
    the OS again. Upload it into a PC and copy it out before formatting if you have
    data that you would like to retain on the SD card.


    +   2. NOOBS OS Stuck on the splash show'
