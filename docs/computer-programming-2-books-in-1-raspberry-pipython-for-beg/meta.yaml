    # Raspberry Pi Benefits


    The Raspberry Pi has made its way into the computing hobby market, but it is still
    very capable for other business and personal uses. For a compact and lightweight
    server, an incredibly low power draw, small form factor, no noise, solid state
    storage, and other characteristics make it an appealing solution.


    I have been playing with a Raspberry Pi (revision B) running various GNU / Linux
    distributions recently. I wanted to take it for a spin and see what I could throw
    at it, because the Pi is essentially a mini-computer. I was pleasantly surprised.
    In reality, it''s been so good that I decided to try setting it up with different
    services as a mini server. In doing so, I have come up with a list of benefits
    that I believe are very persuasive.


    +   1. *Power consumption.* The Pi draws about five to seven watts of energy.
    This is around one tenth of what could be found in a similar full-size box. Since
    servers operate night and day on an ongoing basis, the electrical savings can
    really add up. I have estimated that the simple Pi package (Pi board, case, and
    power supply) would pay for itself if it is left to run 24/7/365, with around
    one year''s worth of electricity savings. I ended up with a very cheap and high
    quality CanaKit Basic Kit (ASIN # BooDG9D6IK).

    2. *No moving parts.* The Pi uses an SD card for storage that is fast and has
    no moving parts. There are no supporters or other things to think about as well.
    Compared to lower level cards, a Class 10 SD card is typically the highest performing,
    but this will primarily only impact boot time where there is the most I / O. There
