  mdcn: "## 第十六章\n\n## 附加硬件\n\n**附加组件可应用于：**\n\n1.  任何应用于程序以赋予其额外功能和能力的第三方软件应用程序或脚本，都是软件附加组件或扩展。\n\
    \n    例如，Adobe Flash 就是一个优秀的软件附加组件示例，它允许用户在互联网浏览器中观看视频或玩游戏。\n\n    附加组件通常由与原始开发者无关的个人或组织使用软件选项或通过第三方平台制作并添加。\n\
    \n    注意：浏览器（如 Google Chrome）将附加组件称为扩展。\n\n    提示：加载项（“in”而非“on”）指的是为软件程序提供额外功能的附加软件。在描述汽车时，也可以使用加载项。\n\
    \n2.  当指硬件时，任何能提升计算机功能或性能的组件都是附加组件。例如，额外的内存、新的 CPU 或更快的显卡都可以称为附加组件。\n\n**树莓派官方外壳**\n\
    \n树莓派基金会的官方树莓派 Zero 外壳包含三个可互换的盖子：摄像头盖、GPIO 盖和普通盖。它还需要一根来自 Pi Zero 摄像头的短线缆。\n\n\
    兼容树莓派 Zero 和无线树莓派 Zero。\n\n## 树莓派 7 英寸触摸屏显示器\n\n这款 7 英寸树莓派触摸屏显示器让用户有机会构建一体化、集成的项目，如平板电脑、信息娱乐系统和嵌入式项目。800\
    \ x 480 的显示屏通过一个处理电源和信号转换的适配器板连接。只需两个 Pi 连接：来自 Pi GPIO 端口的电源和连接到当前 DSI 端口的排线。\n\
    \n将你的树莓派变成手机、信息娱乐系统或带触摸屏的独立电脑。\n\n真正的交互性：虚拟的“屏幕”键盘将支持新的设备驱动程序，因此无需插入键盘和鼠标。\n\n\
    为你自己的物联网设备制作可视化显示。只需连接你的树莓派，编写一个与显示屏通信的 Python 脚本，你就可以安装自己的触摸屏家庭自动化设备了。\n\n树莓派上提供的许多教育应用程序和程序都将支持触摸功能，使树莓派更易于学习和编程。\n\
    \n## HAT 的含义\n\nSense HAT 是一款树莓派附加板，专为 Astro Pi 任务（于 2015 年 12 月在国际空间站启动）而创建，现在可供购买。\n\
    \nSense HAT 有一个 8 x 8 RGB LED 矩阵、一个五向摇杆，并包含以下传感器：\n\n- 陀螺仪\n- 加速度计\n- 磁力计\n- 温度\n\
    - 气压\n- 湿度\n\n# 第五部分：\n附录\n\n## 附录 A：Python 食谱\n\n贪吃蛇树莓派\n\n愤怒的小鸟，让开！Pokémon Go！一边去！在手机游戏的精英中，贪吃蛇占据着榜首位置。\n\
    \n*诺基亚贪吃蛇游戏*\n\n那个因为里面的东西卡在奇怪角度而无法完全打开的抽屉深处，可能还藏着一部旧的诺基亚 3310。所以，拿起你的 Pi 和 Sense\
    \ HAT，或者免费的 Sense HAT 模拟器（在线或在 Raspbian 上），你自己编写贪吃蛇 SLUG 代码会简单得多。这样做，你可以向家里年幼的成员介绍有史以来最好的以爬行动物为主题的游戏……现在还增加了贝类。\n\
    \n*解决方案*\n\n访问我们的资源页面，亲自查看这款游戏，你可以在那里找到嵌入并准备就绪的在线 Sense HAT 模拟器。\n\n*树莓派 Sense\
    \ HAT Slug 免费资源*\n\n它看起来就像这样，你可以使用机器的方向键引导你的蛞蝓走向美味的食物。\n\n从那里开始，当你用 Python 编写自己的游戏版本时，你将经历从零到\
    \ SLUG 荣耀的逐步旅程。在此过程中，你将学习处理二维列表，并使用 Sense HAT 的像素显示和摇杆反馈。并且，与我们的数字制造计划一致，通过完成该资源，你可以扩展对应用抽象和分解来解决更复杂问题的理解。\n\
    \n*HAT 的含义*\n\n作为 2015 年 12 月 Astro Pi 任务的一部分，树莓派 Sense HAT 最初被开发和制造。它是你数字制造工具包的完美附加组件，拥有\
    \ 8x8 RGB LED 矩阵、一个摇杆以及大量板载传感器，包括加速度计、陀螺仪和磁力计，非常适合数据收集和评估项目。\n\n## IRC 用户列表\n\n\
    在一个拥有数百个聊天室的网络中，/list 命令可帮助你仅查找具有特定参与人数的频道，这是一个非常有用的功能。\n\n每个 IRC 网络都有几个不同的频道。一旦连接，你可以使用\
    \ /list 命令获取该网络上的频道列表：\n\n```\n/list\n```\n\n列表报告显示站点名称、连接到每个频道的个人数量，通常还有与频道相关的声明或说明。在较大的网络上，还有数千个不同主题的频道，数量太多无法一一了解，因此你可以使用以下技巧来获取实际可用的列表：\n\
    \n- 站点列表。通过在输入列表命令之前键入 /set hold mode on，你可以获得逐页列表。此选项将提供一次显示一屏的列表。要关闭分页功能，你可以键入\
    \ /set hold mode off。\n- 最小或最大。由于绝大多数频道只有一两个人，而你通常想找到有很多人且讨论活跃的房间，你能做的最有帮助的事情之一就是使用“min”选项获取具有最小用户数的频道列表。如果你想只找更稀疏的空间，可以使用“max”选项将列表限制为具有最大用户数的频道。\n\
    \n```\n/list -min 30\n```\n\n```\n/list -max 5\n```\n\n- 最小和限制。为了更大的灵活性，你可以组合“min”和“max”选项，仅列出人数在你感兴趣范围内的特定平台。\n\
    \n```\n/list -min 25 -max 30\n```\n\n```\n/list -min 40 -max 50\n```\n\n## GPIO\
    \ 输入和输出\n\nGPIO 引脚是一个通用引脚，其值由两种（高或低）电压设置之一组成，其操作可通过软件编程。GPIO 端口是平台定义的 GPIO 引脚组（通常为\
    \ 4 个或更多引脚）。但是，作为 GPIO 端口一部分的 GPIO 引脚不能作为单个 GPIO 引脚被检索或操作。\n\n为了使用特定的引脚或端口，应用程序应首先使用其数字\
    \ ID、名称、类型（接口）或属性，打开并获取要使用的引脚或端口的 GPIOPin 或 GPIOPort 实例。\n\n以下是使用其 ID 获取 GPIOPin\
    \ 和 GPIOPort 的示例：\n\n```\nGPIOPin pin = (GPIOPin) PeripheralManager.open(1);\n\
    GPIOPort port = (GPIOPort) PeripheralManager.open(0);\n```\n\n以下是使用其名称和接口的示例：\n\
    \n```\nGPIOPin pin = (GPIOPin) PeripheralManager.open(\"LED PIN\", GPIOPin.class,\
    \ null);\nGPIOPort port = (GPIOPort) PeripheralManager.open(\"LCD DATA PORT\"\
    , null, GPIOPort.class);\n```\n\n一旦引脚被打开，应用程序可以通过调用 GPIOPin.getValue() 方法获取 GPIO\
    \ 引脚的当前值，并通过调用 GPIOPin.setValue(boolean) 方法设置其值。类似地，一旦端口被打开，应用程序可以通过调用 GPIOPort.getValue()\
    \ 方法获取 GPIO 端口的当前值，并通过调用 GPIOPort.setValue(int) 方法设置其值。\n\n```\npin.setValue(true);\n\
    ```\n\n```\nport.setValue(0xFF);\n```\n\n完成后，应用程序应调用 GPIOPin.close() 或 GPIOPort.close()\
    \ 分别释放引脚或端口。\n\n```\npin.close();\n```\n\n```\nport.close();\n```\n\n示例 7-1 给出了使用\
    \ GPIO API 的示例。首先，它为连接了开关按钮的 GPIO 输入引脚记录一个引脚监听器。当按钮被按下时，监听器会收到警报。然后，通过相应地设置连接了\
    \ LED 的 GPIO 输出引脚，监听器打开或关闭 LED。\n\n## 示例 7-1 GPIO API 的使用\n\n```java\nimport com.oracle.deviceaccess.PeripheralManager;\n\
    import com.oracle.deviceaccess.PeripheralNotAvailableException;\nimport com.oracle.deviceaccess.PeripheralNotFoundException;\n\
    import com.oracle.deviceaccess.gpio.GPIOPin;\nimport com.oracle.deviceaccess.gpio.PinEvent;\n\
    import com.oracle.deviceaccess.gpio.PinListener;\nimport java.io.IOException;\n\
    \npublic class GPIODemo {\n    GPIOPin switchPin = null;\n    GPIOPin ledPin =\
