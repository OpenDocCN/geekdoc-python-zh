    # # Functional Programming


    For a few years, it has become fashionable to work with functional programming
    as if the new generations had re-discovered the advantages over object-oriented
    programming or began to become aware of the limitations in their way of working.

    The principles of functional programming are as follows:'
  - '[PAGE 69]


    +   - Using functions: As the name suggests, everything is built through functions.
    This way of working is not only simple, orderly, clear, easy to test, but it is
    also a practice that great military figures such as Julius Caesar and Napoleon
    have used. No, they did not use Python (at least there is no record of it), but
    they applied the concept of: "divide and conquer." And functional programming
    uses this strategy for just about everything.

    - First-class features: Functions are treated as one more variable. They can even
    be returned.

    - Pure functions: Fully predictive, the same input data will produce the same
    output data. You can override the input parameter without disturbing the flow
    of the program.

    - Recursion: Functions can call themselves, simplifying tasks such as traversing
    data trees or managing controlled loops.

    - Immutability: There are no variables, only constants. Personally understanding
    its potential and putting it into practice was like resetting my brain; I had
    to re-learn how to use a variable. Anecdote aside; Where does software usually
    fail? In the vast majority of cases, it comes from a variable that has been changed.
    This causes a block of code to be executed with conditions unforeseen. It is necessary
    to review each variable in different values until we find the culprit. I make
    a reflection: What if those variables were never modified? Or, being more practical,
    what if we create a new constant for each modification? What if... I tell you
    that at the performance level... it is more efficient? It is a very interesting
    concept to apply.

    - Lazy evaluation (not strict): In functional programming, we can work with expressions
    that have not been evaluated, or in other words, we can have variables with operations
    whose result is not yet known. This is called loose screening. One side effect
    is increased performance, and another is that we can do crazy things like doing
    calculations with very complex operations or infinite lists without doing calculations.
    How is this possible? Because you work with mathematical expressions, the value
    is only calculated when you need it, for example, when performing a print.'
  - '[PAGE 70]


    Why use functional programming? Functional techniques facilitate the creation
    of concurrences, help us to reduce problems since the variables are constant and
    immutable so that we will not observe the programming error derived from the "Mutable
    global state." Likewise, testing is a faster process because by knowing what parameters
    to give to a function, we can know what results to expect. Functional programming
    is not exclusive. It is combined in an excellent way with imperative and object-oriented
    programming. Since version 3 of Python, this language has adopted native tools.
    Finally, we will obtain a compliant code that is easy to assimilate and read since
    it is more comfortable to understand a function than the structuring of an object.


    Before starting with examples, it is worth knowing some of the modules that facilitate
    functional programming in Python. Among them, we can find the following:


    +   - Intertools: This module comes already installed with the official distribution
    of python; it provides us with a large number of tools to facilitate the creation
    of iterators.

    - Operator: We will also find this module already installed with Python, in which
    we will be able to find the main operators of Python turned into functions.

    - Functools: Also already included within Python, this module helps us créate
    Higherorder functions, that is, functions that act on or return other functions.

    - Fn: This module, created by Alexey Kachayev, gives Python additional "batteries"
    to make the functional style of programming much easier.

    - Cytoolz: This module, created by Erik Welch, also provides several tools for
    Functional programming, specially oriented to data analysis operations.

    - Macropy: This module, created by Li Haoyi brings to Python characteristics of
    purely functional languages, such as pattern matching, tail call optimization,
    Y case classes.


    Python, without being a purely functional language, includes several characteristics
    taken from functional languages such as higher-order functions or lambda functions
    (anonymous functions).'
- md: "## Higher-Order Functions\n\nThe concept of higher-order functions refers to\
