- md: '# PART IV: HARDWARE HACKING


    ## Chapter Thirteen


    ### Learning to Hack Hardware


    As is with the word hacker, the "hacker ethic" has morphed over time. Hacking
    was initially motivated by a thirst to learn how things work and was carried out
    on networks that the hackers were entitled to access. Mix a touch of chaos with
    the values of hacking and you end up with hackers who enjoy ideas and exploration
    of personal property rights.


    Mass media have concentrated on this notion and do not understand that much of
    today''s hacking is by people who believe in property rights and use their hacking
    skills to protect others who are unable to defend themselves.


    Clifford Stoll meets a new machine administrator who adheres to the anarchistic
    interpretation of the hacker ethic in the non-fiction novel "The Cuckoo''s Egg".
    During his experiences chronicled in the novel, Clifford experienced a shift in
    his thinking and knew the ideology of the systems administrator was incorrect
    but could not express it.


    Land ownership is a pillar of civilization and is created using a fabric of confidence.
    This confidence is an unspoken understanding in many cases and the trust is codified
    in statute in others. More often than not, the trust is not enforced until after
    the event.


    The dashed white line on the highway reminds the drivers of that confidence, but
    at 80 miles per hour, it does not keep another driver from turning his left hand
    in front of me. Similarly, I''m sure that when I get a drink from the vending
    machine, it won''t kill me. If it does, after the litigation, my family will be
    wealthy, but I will still be dead.


    In any case, if we cannot trust each other, then the fabric of trust unravels
    and individuals stop constructing the very structures we want to explore. You
    can''t have your cake and you can''t eat it, either.


    As hackers, we have an option that we can pursue without regard to property rights
    and break the fabric of trust or restore and improve the fabric of trust and property
    rights.


    *Great responsibility requires great strength:*


    - A power source that provides the voltage of the source we measured earlier (Vs
    = 5v).

    - A resistor limiting current (R1 = x).

    - A diode that causes the forward voltage to fall (LED1 = 2.0v for orange).

    - A land link.


    What we want to do is restrict the amount of current that flows through the circuit
    (I). Approximately 5mA (1/4th the maximum LED rating) should be ideal. Know the
    rule of Ohm? Huh? V = IR? We can use R = V / I to calculate the necessary resistance
    because we have a known voltage and amperage. For voltage, after the fall caused
    by the diode, we need the voltage, so our equation will look something like R=(Vs-Vf)/I
    where:


    - Vs = voltage supply (5v)

    - Vf = LED forward voltage (2v)

    - I = current needed (0.005A)

    - R = resistance required (x)


    Plugging all of that in, we get the following: (5v-2v)/0.005A=600


    However, at the precise value we like and might need to round up or down, we will
    not always find a resistor. I rounded down to the nearest value I had on-hand
    because I wanted to round in the direction of more sun, 510.


    The rainbow LED results in the following application of the same process: (5v-3.2v)/0.005A=360

    I rounded down again for more amperage and more luminosity and went with 220.


    ## Executing the change


    We can really dig in and start changing stuff now that we know what needs to be
    replaced and what to replace it with.


    We need 6 components to be removed: the 3 LEDs and the 3 resistors (R9-R11). Using
    a soldering iron and a pair of needle-nose pliers, they can be removed reasonably
    quickly. These are steps I prefer to follow:


    - Apply lead solder to the target modules’ pins. Doing so will clean the joint
    and the melting temperature will usually decrease.

    - Grip the pliers with a goal part.

    - Melt one of the target part’s joints with the soldering iron.

    - Bend the part gently away from the joint when applying heat to the joint. This
    can allow a small bit of the component’s pin in the heated joint to pull out.

    - On the other pad, repeat, going in the opposite direction.

    - Continue back and forth to force out the part.

    - Optionally, to remove excess solder, use a desoldering pump or wick.


    We will insert our new ones once the old components have been removed. I tend
    to work in a sort of "batch" phase with through-hole components:


    - Insert a section, being aware of the polarity criteria.

    - Bend the component’s leads at a 45-ish degree angle so that the component without
    solder remains in place. Note: In the future, this will make desoldering this
    part more difficult.

    - Repeat for all components or sizable community.

    - Flip the board over and weld each part into place.

    - Trim part excess leads.

    - Remember to reference the polarity we recorded at the beginning when adding
    the LEDs. It is possible to put the LED in backwards—even if it is backwards,
    it won’t light up.


    ## A Short Soldering Guide


    The great thing about soldering is that you don''t need a lot to get started.
    For most of your welding projects, we will outline the basic equipment and supplies
    you will need below.


    ### Welding Iron


    To melt solder around electrical links, a soldering iron is a hand tool that plugs
    into a regular 120v AC outlet and heats up. This is one of the most important
    soldering instruments used, and it may come in a few variants, such as the shape
    of a pen or pistol. It''s recommended that you use the pen style soldering iron
    in the 15W to 30W range for beginners. The majority of soldering irons have interchangeable
    tips that can be used for various applications of soldering. When using any form
    of soldering iron, be very careful because it can heat up to 896°F, which is extremely
    hot.


    In short, soldering is a common and fairly easy way for different kinds of materials
    and components to be affixed or bonded to each other. Using a small amount of
    metal alloy, known as solder, and a heated handheld tool called a soldering iron,
    the procedure is carried out. You''ll usually use the hot metal tip of the iron
    when you solder things together to melt a small amount of solder alloy around
    and between the components or surfaces being connected.


    The resulting soldered bond or joint, once cooled and hardened, will be permanent.
    It will provide a safe connection between discrete parts, electrically conductive
    (for circuitry), and watertight (for plumbing applications). It is worth noting,
    however, that hardened solders can typically be remelted and removed reasonably
    easily by reapplying adequate heat. This also makes it possible to separate or
    rework parts that have previously been welded together as required. This approach
    is known as desoldering, which we will return to.


    We will include a brief overview of appropriate soldering techniques for a few
    different situations and part types in this beginners'' guide, while offering
    helpful tips on how to safely and reliably use soldering iron and other main tools.
    We will also address the types of items, kits and soldering iron accessories could
