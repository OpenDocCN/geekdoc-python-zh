- md: '## 6. Modify boot actions


    The Raspbian distro will boot into a command line interface by default, where
    you must first log in as ''pi''. You must give the machine a command to let it
    know that that''s what you want to do if you want to run a window manager.


    This is not suitable for a lot of people, because command lines scare them. There''s
    an option to start the window manager automatically on boot, because of this.
    To allow this behaviour by default, set this choice to ''Yes''. Obviously, this
    can be reversed at any time to return to a text-based login where you have to
    manually start:


    ```

    Startxx

    ```


    ## 7. Update raspi-config


    From time to time, the raspi-config tool receives updates. Generally speaking,
    this is either to add more functionality or patch minor bugs. Until you start
    adjusting some device settings, it''s not a bad idea to run the updater while
    using the tool. Although it is much more likely that it will be modified to look
    better or do more stuff, it is not unlikely that there may be miscellaneous bug
    fixes hidden inside that might cause you to worry otherwise.


    Note, though, you''ll need an active internet connection while you''re trying
    to update your copy of the raspi-config tool. Often, always try to make sure that
    the new update is available to you.


    # PART II: BUILDING A MEDIA CENTRE OR PRODUCTIVITY MACHINE


    # Chapter Eight


    ## The Pi: A Home Theatre PC


    We love Raspberry Pi because of how it helps a new generation of kids learn to
    code, how it has contributed to an influx of new manufacturers of all ages, and
    how easy it is to turn any TV into a smart TV.


    Though we still have a few Raspberry Pi computers at hand to make robots and cooking
    devices, or just to code a Scratch game, a TV is always powered by at least one
    in the building. It''s time to totally update our media centre to become a 4K-playing
    powerhouse with the arrival of the super-powered Raspberry Pi 4.


    ### Get the relevant hardware


    Only Raspberry Pi 4 can perform at 4K, so when deciding which Raspberry Pi to
    select, it is important to note this.


    Since it was published in 2012, Raspberry Pi has been a great option for home
    media centers because it is affordable and backed by an active community. Now
    that 4K content is quickly becoming the latest digital media standard, the demand
    for 4K streaming supporting devices is increasing, and luckily, Raspberry Pi 4
    can handle this easily! Three Raspberry Pi 4 models are available, distinguished
    by the amount of RAM they have: 1 GB, 2 GB, or 4 GB. So, which should go for?
    Both versions performed just fine in our tests, so go for the one you can afford.


    ### Cases with Raspberry Pi


    *Pi 4 Flirc Raspberry case*


    The Flirc case for Raspberry Pi 4 is a fantastic option and looks great as part
    of any home media entertainment system, made of aluminum and intended to be its
    own heatsink. In every house entertainment device, this will look at home.


    *Raspberry Pi 4 official case (in black and grey)*


    The official Raspberry Pi 4 case, particularly the black and grey version, is
    always a good choice as it blends well into any home entertainment setup. You
    can also hack the case to hold a tiny fan for extra cooling if you''re feeling
    adventurous.


    *Raspberry Pi 4 Aluminium Heatsink Case*


    This is a giant heatsink, another case made of aluminum, which helps keep your
    Raspberry Pi 4 cool while in use. It has a choice of three colors: black, gold,
    and gunmetal grey, so if you want something a little different, it''s a great
    option.


    ### Raspberry Pi add-ons (optional)


    #### External Maxtor 2 TB USB 3.0 HDD


    4K content can be very large and, if you have a large set, your storage will run
    out quickly. It would be extremely convenient to have an external hard drive linked
    directly to your Raspberry Pi using the faster USB 3.0 link to prevent any streaming
    lag.


    #### The SHIM Raspberry Pi Fan


    The added power of Raspberry Pi 4 means things can get very hot, particularly
    when 4K media files are decoded, so getting a fan can really help keep things
    cool. Due to its size and noise (no excessive humming here), Pimoroni''s Fan SHIM
    is perfect. A Python script is open, but with the power supplied by Raspberry
    Pi''s GPIO pins, it also "only works."


    #### HAT Raspberry Pi TV


    To allow the DVR feature in Kodi to watch live TV, you can add a Raspberry Pi
    TV HAT to your 4K media center if you feel adventurous. For the best reception,
    you may want to attach your principal aerial. This will give your 4K media centre
    a great finishing touch.


    #### Rii i8+ Wireless Mini Keyboard


    If your TV does not support HDMI-CEC, which allows you to monitor Kodi by using
    your TV remote, then this nifty wireless keyboard is extremely helpful. Plug in
    your Raspberry Pi with the USB dongle, switch on the keyboard, and that is it.
    You''ve got to navigate with a mini keyboard and mouse now.


    # Chapter Nine


    ## The Pi as A Productivity Machine


    The Raspberry Pi’s versatility as a low-power, general-purpose desktop computer
    makes it a good choice. While it can never produce the same output level as a
    typical desktop or laptop, its low cost and environmentally friendly power usage
    helps to compensate for any issues with slower performance.


    The Raspbian operating system includes the popular Libre Office productivity suite
    as a standard, available from the Raspberry Pi website. This equals all the resources
    that you would expect to find in a commercial product such as Microsoft Office:
    word processor, spreadsheet, database, presentation tool, and even diagram or
    mathematical formula development applications. Alternatively, via the web browser,
    you will use much of the same cloud-based applications as you can use on any other
    device.


    The Pi can be used as a day-to-day computer for office and school work, using
    any of the methods mentioned in this chapter, locally installed applications or
    cloud-based services, while not damaging its usability as a forum for programming
    and experimentation.


    *A tip*


    It is a smart idea to use more of the memory for general-purpose use and less
    for the graphics processor if you intend to use the Pi as a pure productivity
    computer. Refer to Chapter 6, ''The Raspberry Pi Configuration Tool,'' to find
    out how to modify this division.


    A broad range of options are now provided by cloud computing services, from the
    basics of storage, networking, and processing capacity to natural language processing
    and artificial intelligence and traditional office applications. The cloud can
    now provide almost any service that doesn''t need you to be physically close to
    the computer hardware you are using.


    ### Cloud-Based Applications Use


    What are some cloud computing examples?


    A large range of services are underpinned by cloud computing. This includes customer
    services such as Gmail or the cloud backup of images on your mobile, but also
    services that allow large corporations to host all their data and operate all
    their cloud apps. To run its video streaming service and its other business systems,
    Netflix depends on cloud storage resources, as well as a variety of other organizations.


    For many applications, cloud computing is becoming the default option: software
    vendors are gradually selling their apps over the internet as services rather
    than standalone products as they attempt to move to a subscription model. Cloud
    computing, however, has a possible drawback, in that it may also add additional
    costs and new risks for businesses using it.


    Why is it called computing in the cloud?


    A fundamental idea behind cloud computing is that the position of the service
    is completely irrelevant to the customer and many of the specifics, such as the
    hardware or operating system on which it runs. With this in mind, the metaphor
    of the cloud was taken from the old schematics of the telecommunications network,
    in which the public telephone network (and later the internet) was often depicted
    as a cloud to suggest that it didn''t matter — it was just a cloud of stuff. This,
    of course, is an over-simplification; the position of their facilities and data
    remains a key problem for many consumers.


    What is the history of computing on the cloud?


    Since the early 2000s, cloud computing as a word has been around, but the idea
    of computing-as-a-service has been around for much, much longer—as far back as
    the 1960s, when computer offices would enable businesses to rent time on a mainframe
    instead of purchasing one themselves.'
  mdcn: '## 6. 修改启动操作


    Raspbian 发行版默认会启动到命令行界面，你必须首先以 ''pi'' 用户身份登录。如果你想运行窗口管理器，必须向机器发出命令以告知它你的意图。


    这对许多人来说并不合适，因为命令行会让他们感到害怕。因此，有一个选项可以在启动时自动启动窗口管理器。要默认启用此行为，请将此选项设置为 ''Yes''。显然，这可以随时更改，以返回到基于文本的登录界面，你需要手动启动：


    ```

    Startxx

    ```


    ## 7. 更新 raspi-config


    raspi-config 工具会不时收到更新。一般来说，这些更新要么是为了添加更多功能，要么是为了修补小错误。在开始调整一些设备设置之前，在使用该工具时运行更新程序并不是一个坏主意。虽然更有可能的是它会被修改得更好看或增加更多功能，但也不能排除其中可能隐藏着一些杂项错误修复，否则可能会让你担心。


    不过请注意，在尝试更新你的 raspi-config 工具副本时，你需要一个活跃的互联网连接。通常，请始终确保新的更新对你可用。


    # 第二部分：构建媒体中心或生产力机器


    # 第八章


    ## 树莓派：家庭影院电脑


    我们热爱树莓派，因为它帮助新一代孩子学习编程，因为它促进了各年龄段新制造商的涌入，以及因为它能轻松地将任何电视变成智能电视。


    虽然我们手头仍有一些树莓派电脑用于制作机器人和烹饪设备，或者只是编写 Scratch 游戏，但大楼里总有一台电视至少由一台树莓派驱动。随着超级强大的树莓派
    4 的到来，是时候彻底更新我们的媒体中心，使其成为能够播放 4K 内容的强大设备了。


    ### 获取相关硬件


    只有树莓派 4 能够以 4K 分辨率运行，因此在决定选择哪款树莓派时，这一点很重要。


    自 2012 年发布以来，树莓派一直是家庭媒体中心的绝佳选择，因为它价格实惠且拥有活跃的社区支持。现在，4K 内容正迅速成为最新的数字媒体标准，对支持 4K
    流媒体的设备的需求正在增加，幸运的是，树莓派 4 可以轻松应对！有三种树莓派 4 型号可供选择，区别在于它们拥有的内存容量：1 GB、2 GB 或 4 GB。那么，应该选择哪一种呢？两个版本在我们的测试中都表现良好，所以选择你能负担得起的那个。


    ### 树莓派的外壳


    *Pi 4 Flirc 树莓派外壳*


    适用于树莓派 4 的 Flirc 外壳是一个极好的选择，作为任何家庭媒体娱乐系统的一部分看起来很棒，由铝制成，旨在作为自身的散热器。在每个家庭娱乐设备中，它都会显得很合适。


    *树莓派 4 官方外壳（黑色和灰色）*


    树莓派 4 的官方外壳，特别是黑色和灰色版本，始终是一个不错的选择，因为它能很好地融入任何家庭娱乐设置。如果你有冒险精神，你也可以改装外壳以容纳一个小风扇来增强散热。


    *树莓派 4 铝制散热器外壳*


    这是一个巨大的散热器，另一个由铝制成的外壳，有助于在使用时保持树莓派 4 的凉爽。它有三种颜色可供选择：黑色、金色和枪灰色，所以如果你想要一些与众不同的东西，这是一个很好的选择。


    ### 树莓派附加组件（可选）


    #### 外置 Maxtor 2 TB USB 3.0 硬盘


    4K 内容可能非常庞大，如果你有一个大型片库，你的存储空间很快就会用完。使用更快的 USB 3.0 链接将外置硬盘直接连接到你的树莓派，以防止任何流媒体延迟，这将极其方便。


    #### SHIM 树莓派风扇


    树莓派 4 增加的功率意味着设备可能会变得非常热，特别是在解码 4K 媒体文件时，因此安装一个风扇确实有助于保持凉爽。由于其尺寸和噪音（没有过度的嗡嗡声），Pimoroni
    的 Fan SHIM 是完美的选择。有一个 Python 脚本是开放的，但由树莓派 GPIO 引脚供电，它也“仅此而已”。


    #### HAT 树莓派电视


    为了在 Kodi 中启用 DVR 功能以观看直播电视，如果你有冒险精神，可以为你的 4K 媒体中心添加一个树莓派电视 HAT。为了获得最佳接收效果，你可能需要连接你的主天线。这将为你的
    4K 媒体中心提供一个完美的收尾。


    #### Rii i8+ 无线迷你键盘


    如果你的电视不支持 HDMI-CEC（允许你使用电视遥控器控制 Kodi），那么这个小巧的无线键盘会非常有用。将 USB 加密狗插入你的树莓派，打开键盘，就这样。你现在可以用迷你键盘和鼠标进行导航了。


    # 第九章


    ## 树莓派作为生产力机器


    树莓派作为低功耗、通用桌面电脑的多功能性使其成为一个不错的选择。虽然它永远无法产生与典型台式机或笔记本电脑相同的输出水平，但其低成本和环保的功耗有助于弥补性能较慢带来的任何问题。


    Raspbian 操作系统默认包含流行的 Libre Office 生产力套件，可从树莓派网站获取。这相当于你在 Microsoft Office 等商业产品中期望找到的所有资源：文字处理器、电子表格、数据库、演示工具，甚至图表或数学公式开发应用程序。或者，通过网络浏览器，你可以使用许多与其他设备上相同的基于云的应用程序。


    树莓派可以用作日常办公和学校工作的电脑，使用本章中提到的任何方法，本地安装的应用程序或基于云的服务，同时不会损害其作为编程和实验平台的可用性。


    *一个小提示*


    如果你打算将树莓派用作纯粹的生产力电脑，将更多内存用于通用用途而减少用于图形处理器是一个明智的做法。请参阅第 6 章“树莓派配置工具”，了解如何修改此分配。


    云计算服务现在提供了广泛的选择，从存储、网络和处理能力的基础，到自然语言处理和人工智能以及传统的办公应用程序。云现在可以提供几乎任何不需要你物理上靠近所使用计算机硬件的服务。


    ### 基于云的应用程序使用


    云计算有哪些例子？


    大量服务由云计算支撑。这包括客户服务，如 Gmail 或你手机上图像的云备份，但也包括允许大型公司托管其所有数据并运行其所有云应用程序的服务。Netflix
    依赖云存储资源来运行其视频流服务和其他业务系统，许多其他组织也是如此。


    对于许多应用程序，云计算正在成为默认选项：软件供应商正逐渐通过互联网将其应用程序作为服务而非独立产品出售，因为他们试图转向订阅模式。然而，云计算有一个可能的缺点，即它也可能为使用它的企业增加额外成本和新的风险。


    为什么它被称为云计算？


    云计算背后的一个基本理念是，服务的位置对客户来说完全无关紧要，许多细节，如运行它的硬件或操作系统也是如此。考虑到这一点，“云”的比喻取自电信网络的旧示意图，其中公共电话网络（以及后来的互联网）经常被描绘成一朵云，以表明它无关紧要——它只是一堆东西的云。当然，这是一种过度简化；其设施和数据的位置对许多消费者来说仍然是一个关键问题。


    云计算的历史是什么？


    自 2000 年代初以来，“云计算”这个词就一直存在，但“计算即服务”的想法已经存在了更久——可以追溯到 1960 年代，当时计算机办公室允许企业租用大型机的时间，而不是自己购买一台。'
