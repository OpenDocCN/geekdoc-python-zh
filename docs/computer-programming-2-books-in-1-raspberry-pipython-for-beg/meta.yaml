    # Sets


    A set is a set of characters enclosed in square brackets [] with a special meaning.
    Some of the most frequent are:


    +   - [abc]- searches for a match with any of the characters in parentheses. The
    regular expression "[abc] aa" corresponds to the words aaa, baa, caa. It also
    works with numeric characters.

    - [ak]- searches for a match with any of the alphabetic characters between the
    first (a) and the last (k). The regular expression "[be] a" corresponds to the
    words ba, ca, da, ea, while an expression like "[az.] aa" would correspond to
    words that begin with any letter of the alphabet and end in "aa ".

    - [1-9]- is identical to the previous case, but with numeric characters.

    - [^ abc]- matches all characters that are NOT inside the brackets. Thus, the
    regular expression “. * [^ A]” would correspond to any word that does NOT end
    with the letter “a”.'
