- md: "## SQL Basics\n\nSo far, we have been using the structured query language in\
    \ our Python examples and have covered many of the basics of SQL commands. In\
    \ this section, we discuss the SQL language in particular and provide an overview\
    \ of SQL syntax. Since there are so many different database vendors, Structured\
    \ Query Language (SQL) was standardized so that we could easily communicate with\
    \ multi-vendor database systems. A relational database is made up of tables, rows,\
    \ and columns. Columns generally have a type such as text, numeric, or date data.\
    \ When we create a table, we indicate the names and types of the columns:\n\n\
    ```\nCREATE TABLE Tracks (title TEXT, plays INTEGER)\n```\n\nTo insert a row in\
    \ a table, we use the SQL command INSERT:\n\n```\nINSERT INTO Tracks (title, plays)\
    \ VALUES ('My Way', 15)\n```\n\nWhen using the declaration INSERT, specify the\
    \ table name, then a list of the fields/columns you would like to set in the new\
    \ row, and then the keyword VALUES and a list of corresponding values for each\
    \ of the fields. The SQL command SELECT is used to retrieve rows and columns from\
    \ a database. The declaration SELECT allows you to specify which columns you want\
    \ to retrieve, as well as a clause WHERE to select which rows you want to see.\
    \ It also allows an optional clause ORDER BY to control the sorting of the returned\
    \ rows.\n\n```\nSELECT * FROM Tracks WHERE title = 'My Way'\n```\n\nUsing * indicates\
    \ that you want the database to return all columns for each row that matches the\
    \ clause WHERE. Note that unlike Python, in an SQL clause WHERE, we use a single\
    \ equals sign to indicate a test of equality instead of a double equals sign.\
    \ Other logical operations allowed in a clause WHERE include <, >, <=, >=, =,\
    \ !=, as well as AND/OR and parentheses to build your logical expressions. You\
    \ can request that the returned rows be ordered by one of the fields as follows:\n\
    \n```\nSELECT title, plays FROM Tracks ORDER BY title\n```\n\nTo delete a row,\
    \ you need a clause WHERE in an SQL statement DELETE. The clause WHERE determines\
    \ which rows are to be removed:\n\n```\nDELETE FROM Tracks WHERE title = 'My Way'\n\
    ```\n\nIt's possible to UPDATE a column or columns within one or more rows in\
    \ a table using SQL statement UPDATE as follows:\n\n```\nUPDATE Tracks SET plays\
    \ = 16 WHERE title = 'My Way'\n```\n\nThe declaration UPDATE specifies a table\
    \ and then a list of fields and values to change after the keyword SET and then\
    \ an optional clause WHERE to select the rows to update. A single instruction\
    \ UPDATE will change all rows that match the clause WHERE. If no clause is specified\
    \ WHERE, perform the UPDATE in all rows of the table. These four basic SQL commands\
    \ (INSERT, SELECT, UPDATE, and DELETE) enable the four basic operations required\
    \ to create and maintain data.\n\n---\n\nDefining the structure of your data in\
    \ advance may seem inconvenient at first, but the payoff is quick access to your\
    \ data, even when the database contains large amounts of data. The code to create\
    \ a database file and a table called Tracks with two columns in the database is\
    \ the following:\n\n```\nimport sqlite3\n\nconn = sqlite3.connect('music.sqlite')\n\
    \ncur = conn.cursor()\n\ncur.execute('DROP TABLE IF EXISTS Tracks')\n\ncur.execute('CREATE\
    \ TABLE Tracks (title TEXT, plays INTEGER)')\n\nconn.close()\n```\n\nCode: [http://www.py4e.com/code3/db1.py](http://www.py4e.com/code3/db1.py)\n\
    \nOr select Download from this trinket's left-hand menu.\n\nThe operation connect\
    \ makes a \"connection\" to the database stored in the file music.sqlite3 in the\
    \ current directory. If the file does not exist, it will be created. The reason\
    \ this is called a \"connection\" is that sometimes the database is stored on\
    \ a \"database server\" separate from the server on which we run our application.\
    \ In our simple examples, the database will just be a local file in the same directory\
    \ as the Python code we are running. A cursor is like a filehandle that we can\
    \ use to perform operations on the data stored in the database. Call to cursor()\
    \ is conceptually very similar to calling open() when dealing with text files.\n\
    \nOnce we have the cursor, we can start executing commands on the content of the\
    \ database using the method execute(). The database commands are expressed in\
    \ a special language that has been standardized across many database vendors to\
    \ allow us to learn a single database language. The database language is called\
    \ Structured Query Language or SQL.\n\n[http://en.wikipedia.org/wiki/SQL](http://en.wikipedia.org/wiki/SQL)\n\
    \nIn our example, we are running two SQL commands against our database. As a convention,\
    \ we will display SQL keywords in uppercase, and the parts of the command that\
    \ we are adding (such as table and column names) will be displayed in lowercase.\
    \ The first SQL command drops the table Tracks from the database if it exists.\
    \ This pattern is simply to allow us to run the same program to create the table\
    \ Tracks over and over without causing an error. Note that the command DROP TABLE\
    \ removes the table and all its contents from the database (that is, there is\
    \ no \"undo\").\n\n```\ncur.execute('DROP TABLE IF EXISTS Tracks')\n```\n\nThe\
    \ second command creates a table called Tracks with a column of text called title\
    \ and an integer column called plays.\n\n```\ncur.execute('CREATE TABLE Tracks\
    \ (title TEXT, plays INTEGER)')\n```\n\nNow that we have created a table called\
    \ Tracks, we can put some data in that table using SQL INSERT operation. Again,\
    \ we start by making a connection to the database and getting the cursor. Then\
    \ we can execute SQL commands using the cursor. The SQL INSERT command indicates\
    \ which table we are using and then defines a new row by listing the fields we\
    \ want to include (title, plays) followed by the VALUES we want to place in the\
    \ new row. We specify the values as question marks (??) to indicate that the actual\
    \ values are passed as a tuple ('My Way', 15) as the second parameter to the call\
    \ execute().\n\n```\nimport sqlite3\n\nconn = sqlite3.connect('music.sqlite')\n\
    cur = conn.cursor()\n\ncur.execute('DROP TABLE IF EXISTS Tracks')\ncur.execute('CREATE\
    \ TABLE Tracks (title TEXT, plays INTEGER)')\ncur.execute('INSERT INTO Tracks\
    \ (title, plays) VALUES (?,?)',\n    ('Thunderstruck', 20))\ncur.execute('INSERT\
    \ INTO Tracks (title, plays) VALUES (?,?)',\n    ('My Way', 15))\nconn.commit()\n\
    print('Tracks:')\ncur.execute('SELECT title, plays FROM Tracks')\nfor row in cur:\n\
    \    print(row)\n```\n\nFirst, we insert two rows into our table and use commit()\
    \ to force the data to be written to the database file.\n\n| title | plays |\n\
    | :--- | :--- |\n| Thunderstruck | 20 |\n| My Way | 15 |\n\nThen we use the command\
    \ SELECT to retrieve the rows we just inserted from the table. In command SELECT,\
    \ we indicate which columns we would like to extract (title, plays), and we indicate\
    \ from which table we want to retrieve the data. After executing the statement\
    \ SELECT, the cursor is something we can loop through in an instruction for. For\
    \ efficiency, the cursor does not read all the data from the database when we\
    \ execute the statement SELECT. Instead, the data is read as we walk through the\
    \ rows in the declaration for. The output of the program is as follows:\n\nTracks:\n\
    ('Thunderstruck', 20)\n('My Way', 15)\n\nOur loop for finds two rows, and each\
    \ row is a Python tuple with the first value as title and the second value as\
    \ the number of plays.\n\nAt the end of the program, we run an SQL command to\
    \ 'CLEAR' the rows we just created so that we can run the program over and over\
    \ again. The command DELETE shows the use of a clause WHERE which allows us to\
    \ express a selection criteria so that we can ask the database to apply the command\
    \ only to the rows that match the criteria. In this example, the criteria now\
    \ apply to all rows, so we empty the table so we can run the program repeatedly.\
    \ After the DELETE, we also call commit() to force the data to be removed from\
    \ the database."
  mdcn: "## SQL 基础\n\n到目前为止，我们一直在 Python 示例中使用结构化查询语言，并涵盖了 SQL 命令的许多基础知识。在本节中，我们将专门讨论\
    \ SQL 语言，并概述 SQL 语法。由于存在许多不同的数据库供应商，结构化查询语言（SQL）被标准化，以便我们可以轻松地与多供应商数据库系统进行通信。关系数据库由表、行和列组成。列通常具有类型，例如文本、数字或日期数据。当我们创建一个表时，我们指定了列的名称和类型：\n\
    \n```\nCREATE TABLE Tracks (title TEXT, plays INTEGER)\n```\n\n要在表中插入一行，我们使用 SQL\
    \ 命令 INSERT：\n\n```\nINSERT INTO Tracks (title, plays) VALUES ('My Way', 15)\n\
    ```\n\n使用 INSERT 声明时，指定表名，然后是要在新行中设置的字段/列的列表，接着是关键字 VALUES 和每个字段对应的值列表。SQL 命令\
    \ SELECT 用于从数据库中检索行和列。SELECT 声明允许你指定要检索的列，以及一个 WHERE 子句来选择要查看的行。它还允许一个可选的 ORDER\
    \ BY 子句来控制返回行的排序。\n\n```\nSELECT * FROM Tracks WHERE title = 'My Way'\n```\n\n\
    使用 * 表示你希望数据库返回匹配 WHERE 子句的每一行的所有列。请注意，与 Python 不同，在 SQL 的 WHERE 子句中，我们使用单个等号表示相等测试，而不是双等号。WHERE\
    \ 子句中允许的其他逻辑操作包括 <、>、<=、>=、=、!=，以及 AND/OR 和括号来构建你的逻辑表达式。你可以请求返回的行按其中一个字段排序，如下所示：\n\
    \n```\nSELECT title, plays FROM Tracks ORDER BY title\n```\n\n要删除一行，你需要在 DELETE\
    \ 语句中使用 WHERE 子句。WHERE 子句决定了要删除哪些行：\n\n```\nDELETE FROM Tracks WHERE title = 'My\
    \ Way'\n```\n\n可以使用 UPDATE 语句更新表中一行或多行中的一个或多个列，如下所示：\n\n```\nUPDATE Tracks SET\
    \ plays = 16 WHERE title = 'My Way'\n```\n\nUPDATE 声明指定一个表，然后是关键字 SET 之后要更改的字段和值的列表，接着是一个可选的\
    \ WHERE 子句来选择要更新的行。单个 UPDATE 指令将更改所有匹配 WHERE 子句的行。如果未指定 WHERE 子句，则对表中的所有行执行更新。这四个基本的\
    \ SQL 命令（INSERT、SELECT、UPDATE 和 DELETE）实现了创建和维护数据所需的四个基本操作。\n\n---\n\n预先定义数据结构起初可能看起来不方便，但回报是即使数据库包含大量数据，也能快速访问你的数据。创建数据库文件和一个名为\
    \ Tracks 的表（包含两列）的代码如下：\n\n```\nimport sqlite3\n\nconn = sqlite3.connect('music.sqlite')\n\
    \ncur = conn.cursor()\n\ncur.execute('DROP TABLE IF EXISTS Tracks')\n\ncur.execute('CREATE\
    \ TABLE Tracks (title TEXT, plays INTEGER)')\n\nconn.close()\n```\n\n代码：[http://www.py4e.com/code3/db1.py](http://www.py4e.com/code3/db1.py)\n\
    \n或者从这个 trinket 的左侧菜单中选择下载。\n\nconnect 操作与存储在当前目录中名为 music.sqlite3 的文件中的数据库建立“连接”。如果文件不存在，它将被创建。之所以称之为“连接”，是因为有时数据库存储在与运行我们应用程序的服务器分开的“数据库服务器”上。在我们的简单示例中，数据库只是与我们运行的\
    \ Python 代码在同一目录中的本地文件。游标类似于文件句柄，我们可以用它来对存储在数据库中的数据执行操作。调用 cursor() 在概念上与处理文本文件时调用\
    \ open() 非常相似。\n\n一旦我们有了游标，我们就可以开始使用 execute() 方法对数据库内容执行命令。数据库命令以一种特殊的语言表达，这种语言在许多数据库供应商之间是标准化的，允许我们学习一种单一的数据库语言。这种数据库语言被称为结构化查询语言或\
    \ SQL。\n\n[http://en.wikipedia.org/wiki/SQL](http://en.wikipedia.org/wiki/SQL)\n\
    \n在我们的示例中，我们对数据库运行了两个 SQL 命令。按照惯例，我们将 SQL 关键字显示为大写，而我们添加的命令部分（如表和列名）将显示为小写。第一个\
    \ SQL 命令从数据库中删除 Tracks 表（如果存在）。这种模式只是为了让我们能够一遍又一遍地运行相同的程序来创建 Tracks 表，而不会导致错误。请注意，DROP\
