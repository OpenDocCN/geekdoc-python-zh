    framework because this helps you write software that is:


    +   - Full: Django follows the "Batteries Included" philosophy and provides almost
    everything developers would like it to have "out of the box". All you need is
    part of a single "product," everything works perfectly, follows consistent design
    principles, and has a wide and [updated documentation](https://docs.djangoproject.com/).

    - Versatile: Django can be (and has been) used to build almost any type of website
    - from content management systems and wikis to social media and news sites. It
    can work with any framework on the client-side, and it can return content in almost
    any format (including HTML, RSS feeds, JSON, XML, etc.). The site you are currently
    reading is based on Django! While it offers options for almost any functionality
    you want (different database engines, template engines, etc.), it can be extended
    to use other components if necessary.'
  - '[PAGE 109]


    +   - Insurance: Django helps developers avoid several common security mistakes
    by providing a framework that is designed to "do the right thing" to protect the
    website automatically. For example, Django provides a secure way to manage user
    accounts and passwords, thus avoiding common mistakes such as placing session
    information in cookies where it is vulnerable (instead, cookies only contain a
    key and the data is stored in the database data) or passwords are stored directly
    in a password hash. Django allows protection against some vulnerabilities by default,
    including SQL injection, cross-site scripting, cross-site request spoofing, and
    clickjacking.

    - Scalable: Django uses a component based on the architecture "shared-nothing"
    (Each part of the architecture is independent of the others, and therefore can
    be replaced or changed if necessary). Taking into account a clear separation between
    the different parts means that you can scale to increase traffic by adding hardware
    at any level: cache servers, database servers, or application servers. Some of
    the busiest sites have scaled Django to meet their demands (for example, Instagram
    and Disqus, to name just two).

    - Maintainable: Django code is written using design principles and patterns to
    encourage the creation of maintainable and reusable code. It uses the "Don''t
    Repeat Yourself" (DRY) principle so there is no unnecessary duplication, reducing
    the amount of code. Django also encourages grouping related functionality into
    reusable "applications" and, at a lower level, groups related code into modules
    (following the pattern model View Controller (MVC)).

    - Portable: Django is written in Python, which runs on many platforms. This means
    you are not tied to any particular platform and can run your applications on Linux,
    Windows, and Mac OS X distributions. Additionally, Django is supported by many
    web-hosting providers, and they often provide specific infrastructure and documentation
    for hosting Django sites.


    # Django Origins


    Django was initially developed between 2003 and 2005 by a team that was responsible
    for creating and maintaining newspaper'
- md: 'websites. After creating several sites, the team began to consider and reuse
    many common design codes and patterns. This common code became a generic web framework,
    which was open source, known as the "Django" project in July 2005.


    Django continues to grow and improve from its first milestone, the release of
    version (1.0) in 2008, to the recent release of version 1.11 (2017). Each release
    has added new functionality and bug fixes, ranging from support for new database
    types, template engines, caching to the addition of generic functions, and display
    classes (which reduce the amount of code developers have to write).


    Django is now a thriving collaborative open source project, with thousands of
    users and contributors. While it still has some features that reflect its origin,
    Django has evolved into a versatile framework that is capable of developing any
    type of website.


    ## Django Possibilities


    The preceding sections show the main features that in almost all web applications:
    URL mapping, views, models, and templates. Just a few other things that Django
    provides, including:


    - Forms: HTML forms are used to collect user data for processing on the server.
    Django simplifies the creation, validation, and processing of forms.

    - User authentication and permissions: Django includes a robust authentication
    and permission system that has been built with security in mind.

    - Search: Dynamic content creation is much more computationally intensive (and
    slow) than a static content service. Django provides flexible caching so that
    you can store all or part of a rendered page so that it is not re-rendered only
    when necessary.

    - Administration site: The Django admin site is included by default when you create
    an app using the basic skeleton. This makes it trivially easy to provide an administration
    page for administrators to create, edit, and view any of their site''s data models.

    - Data serialization: Django makes it easy to serialize and serve your data as
    XML or JSON. This can be useful when creating a web service (a website that only
    serves data to be consumed by other applications or sites and does not display
    anything on its own) or when creating a website where the client-side code handles
    all the rendering of the data.


    ## Virtual Environment


    Django makes it easy to set up your computer so you can start developing web applications.
    This section explains what you get out of the development environment and provides
    an overview of some of your startup and configuration options. It explains the
    recommended method of installing the Django development environment on Mac OS
    X and Windows and how you can test it.


    The development environment is an installation of Django on your local computer
    that you can use to develop and test Django apps before deploying them to the
    production environment. The main tools that Django provides are a set of Python
    scripts for creating and working with Django projects, along with a simple development
    web server that you can use to test locally (i.e., on your computer, not on a
    server. external web) Django web applications with your computer''s web browser.


    When you install Python3, you get a single global environment that is shared with
    all Python3 code, while you can install the packages you like in your environment.
    You can only install one particular version of each package at a time. If you
    install Django in the default / global environment, you will only be able to target
    a single version of Django on the computer. This can be a problem if you want
    to create new sites using the latest version of Django but keep websites that
    depend on older versions. Experienced Python / Django developers run Python applications
    within separate Python virtual environments. This enables multiple different Django
    environments on the same computer. The same Django development team recommends
    that you use virtual Python environments!


    The libraries that we will use to create our virtual environments are in virtualenvwrapper
    (Mac OS X) and virtualenvwrapper-win (Windows), which in turn use the tool virtualenv.
    The toolswrapper creates a consistent interface for managing interfaces on all
    platforms.


    ### Mac OS X


    Install virtualenvwrapper (virtualenv included in the package) using pip3 shown
    in the following.


    ```

    sudo pip3 install virtualenvwrapper

    ```


    Then add the following lines to the end of the start file of your shell. The startup
    file is called differently .bash_profile and it''s hidden in your home directory.


    ```

    export WORKON_HOME=$HOME/.virtualenvs

    export VIRTUALENVWRAPPER_PYTHON=/usr/bin/python3

    export PROJECT_HOME=$HOME/Devel

    source /usr/local/bin/virtualenvwrapper.sh

    ```


    Then reload the startup file by making the following call in the terminal:


    ```

    source ~/.bash_profile

    ```


    At this point, you should see a handful of scripts starting to run. You should
    now be able to create a new virtual environment with the command mkvirtualenv.


    ### Windows


    Installing virtualenvwrapper-win is even simpler than starting virtualenvwrapper
    because you don''t need to configure where the tool stores the environment information
    (there is a default value). All you need to do is run the following command in
    the online command console:


    ```

    pip3 install virtualenvwrapper-win

    ```


    And then you can create a new virtual environment with mkvirtualenv


    ### Taking Advantage of Virtual Environments


    Once you have installed virtualenvwrapper or virtualenvwrapper-win, working with
    virtual environments is similar on all platforms. Now you can create a new virtual
    environment with the command mkvirtualenv. As this command is executed, you will
    see that the environment starts up (what you will see is slightly platform-specific).
    When the command is completed, the new virtual environment will be active - you
    can check it because the beginning of the prompt will be the name of the environment
    in parentheses (as shown below).


    ```

    $ mkvirtualenv my_django_environment

    Running virtualenv with interpreter /usr/bin/python3

    ...

    virtualenvwrapper.user_scripts creating

    /home/ubuntu/.virtualenvs/t_env7/bin/get_env_details

    (my_django_environment) ubuntu@ubuntu:~$

    ```


    Once you are inside the virtual environment, you can install Django and start
    development. There are just a few other useful commands you should know about
    (there are more in the tool''s documentation, but these are the ones you will
    use regularly:


    - deactivate - Exit the current Python virtual environment

    - workon - List the virtual environments available

    - workon name_of_environment - Activate the specified Python virtual environment

    - rmvirtualenv name_of_environment - Delete the specified environment.


    ## Django Installation


    Once you have created the virtual environment and made the call workon to get
    into it, you can use pip3 to install Django.


    ```

    pip3 install Django

    ```


    You can check that Django is installed by running the following command (this
    checks that Python can find the Django module):


    ```

    # Mac OS X

    python3 -m Django --version

    1.11.7


    # Windows

    py -3 -m Django --version

    1.11.7

    ```


    The above test works, but it''s not very fun. A more interesting check is to create
    a project skeleton and see if it works. To do this, navigate in your command console/terminal
    to where you want to store your Django applications. Create a folder for your
    site verification and navigate to it.


    ```

    mkdir django_test

    cd django_test

    ```


    You can then create a new site skeleton called "mytestsite" using the tool Django-admin
    as it''s shown in the following. After creating the site, you can navigate to
    the folder where you will find the main script for project management, called
    manage.py.


    ```

    Django-admin startproject mytestsite

    cd mytestsite

    ```


    We can start the development web server from this folder using manage.py and the
    command `runserver`, as shown.


    ```

    $ python3 manage.py runserver

    ```


    ```

    Performing system checks ...


    System check identified no issues (0 silenced).


    You have 13 unapplied migration (s). Your project may not work properly until
    you apply the migrations for app (s): admin, auth, contenttypes, sessions.


    Run ''python manage.py migrate'' to apply them.


    September 19, 2016 - 23:31:14


    Django version 1.10.1, using settings ''mysite.settings''


    Starting development server at http://127.0.0.1:8000/


    Quit the server with CONTROL-C.

    ```


    Once you have the server running, you can view the site by navigating to the following
    URL in your local web browser: http://127.0.0.1:8000/.


    ## Website Project: Blog


    We will build a blog system today to learn the basics. First, we will create a
    Django project.'
  mdcn: '网站。在创建了几个网站后，团队开始考虑并重用许多通用的设计代码和模式。这些通用代码成为了一个通用的Web框架，它是开源的，于2005年7月以"Django"项目的名字为人所知。


    Django从其第一个里程碑——2008年发布的版本（1.0）——开始，持续发展和改进，直到最近发布的版本1.11（2017）。每个版本都增加了新的功能和错误修复，范围从支持新的数据库类型、模板引擎、缓存，到添加通用函数和显示类（这些减少了开发者需要编写的代码量）。


    Django现在是一个蓬勃发展的协作开源项目，拥有成千上万的用户和贡献者。虽然它仍然保留了一些反映其起源的特性，但Django已经演变成一个多功能的框架，能够开发任何类型的网站。


    ## Django的可能性


    前面的章节展示了几乎所有Web应用程序的主要功能：URL映射、视图、模型和模板。Django还提供了其他一些东西，包括：


    - 表单：HTML表单用于收集用户数据以在服务器上处理。Django简化了表单的创建、验证和处理。

    - 用户认证和权限：Django包含一个强大的认证和权限系统，其构建时考虑了安全性。

    - 搜索：动态内容的创建比静态内容服务在计算上更密集（也更慢）。Django提供了灵活的缓存，因此你可以存储整个或部分渲染的页面，以便仅在必要时重新渲染。

    - 管理站点：当你使用基本骨架创建一个应用时，Django管理站点默认包含在内。这使得为管理员提供一个管理页面变得极其容易，管理员可以在其中创建、编辑和查看其网站的任何数据模型。

    - 数据序列化：Django使得将你的数据序列化并作为XML或JSON提供变得容易。这在创建Web服务（一个只提供数据供其他应用程序或网站使用，本身不显示任何内容的网站）或创建客户端代码处理所有数据渲染的网站时非常有用。


    ## 虚拟环境


    Django使得设置你的计算机变得容易，这样你就可以开始开发Web应用程序。本节解释了你从开发环境中获得的好处，并概述了你的一些启动和配置选项。它解释了在Mac
    OS X和Windows上安装Django开发环境的推荐方法，以及你如何测试它。


    开发环境是在你的本地计算机上安装的Django，你可以在将其部署到生产环境之前，使用它来开发和测试Django应用程序。Django提供的主要工具是一组用于创建和处理Django项目的Python脚本，以及一个简单的开发Web服务器，你可以使用它在本地（即在你的计算机上，而不是在外部Web服务器上）使用你的计算机的Web浏览器测试Django
    Web应用程序。


    当你安装Python3时，你会得到一个与所有Python3代码共享的单一全局环境，同时你可以在你的环境中安装你喜欢的包。你一次只能安装每个包的一个特定版本。如果你在默认/全局环境中安装Django，你将只能在计算机上针对单个版本的Django。如果你想使用最新版本的Django创建新网站，但同时保留依赖于旧版本的网站，这可能会成为一个问题。经验丰富的Python/Django开发者在单独的Python虚拟环境中运行Python应用程序。这使得在同一台计算机上可以有多个不同的Django环境。同一个Django开发团队建议你使用Python虚拟环境！


    我们将用于创建虚拟环境的库是virtualenvwrapper（Mac OS X）和virtualenvwrapper-win（Windows），它们又使用了virtualenv工具。wrapper工具为在所有平台上管理环境创建了一致的接口。


    ### Mac OS X


    使用pip3安装virtualenvwrapper（virtualenv包含在包中），如下所示。


    ```

    sudo pip3 install virtualenvwrapper

    ```


    然后将以下几行添加到你的shell启动文件的末尾。启动文件在你的主目录中是隐藏的，名为.bash_profile。


    ```

    export WORKON_HOME=$HOME/.virtualenvs

    export VIRTUALENVWRAPPER_PYTHON=/usr/bin/python3

    export PROJECT_HOME=$HOME/Devel

    source /usr/local/bin/virtualenvwrapper.sh

    ```


    然后通过在终端中执行以下调用来重新加载启动文件：


    ```

    source ~/.bash_profile

    ```


    此时，你应该会看到一些脚本开始运行。现在你应该能够使用命令mkvirtualenv创建一个新的虚拟环境。


    ### Windows


    安装virtualenvwrapper-win比启动virtualenvwrapper更简单，因为你不需要配置工具存储环境信息的位置（有一个默认值）。你所要做的就是在在线命令控制台中运行以下命令：


    ```

    pip3 install virtualenvwrapper-win

    ```


    然后你就可以用mkvirtualenv创建一个新的虚拟环境了。


    ### 利用虚拟环境


    一旦你安装了virtualenvwrapper或virtualenvwrapper-win，在所有平台上使用虚拟环境都是类似的。现在你可以用命令mkvirtualenv创建一个新的虚拟环境。当这个命令执行时，你会看到环境启动了（你看到的内容会因平台略有不同）。当命令完成时，新的虚拟环境将处于活动状态——你可以通过提示符开头括号中的环境名称来检查它（如下所示）。


    ```

    $ mkvirtualenv my_django_environment

    Running virtualenv with interpreter /usr/bin/python3

    ...

    virtualenvwrapper.user_scripts creating

    /home/ubuntu/.virtualenvs/t_env7/bin/get_env_details

    (my_django_environment) ubuntu@ubuntu:~$

    ```


    一旦你进入虚拟环境，你就可以安装Django并开始开发。还有其他一些有用的命令你应该知道（工具文档中有更多，但这些是你将经常使用的：


    - deactivate - 退出当前的Python虚拟环境

    - workon - 列出可用的虚拟环境

    - workon name_of_environment - 激活指定的Python虚拟环境

    - rmvirtualenv name_of_environment - 删除指定的环境。


    ## Django安装


    一旦你创建了虚拟环境并调用了workon进入其中，你就可以使用pip3来安装Django。


    ```

    pip3 install Django

    ```


    你可以通过运行以下命令来检查Django是否已安装（这检查Python是否能找到Django模块）：


    ```

    # Mac OS X

    python3 -m Django --version

    1.11.7


    # Windows

    py -3 -m Django --version

    1.11.7

    ```


    上述测试有效，但不是很有趣。一个更有趣的检查是创建一个项目骨架并看看它是否有效。为此，请在你的命令控制台/终端中导航到你想要存储Django应用程序的位置。为你的网站验证创建一个文件夹并导航到它。


    ```

    mkdir django_test

    cd django_test

    ```


    然后你可以使用Django-admin工具创建一个名为"mytestsite"的新网站骨架，如下所示。创建网站后，你可以导航到该文件夹，你会找到名为manage.py的项目管理主脚本。


    ```

    Django-admin startproject mytestsite

    cd mytestsite

    ```


    我们可以使用manage.py和命令`runserver`从这个文件夹启动开发Web服务器，如下所示。


    ```

    $ python3 manage.py runserver

    ```


