    competitor of Oracle, MySQL, and PostgreSQL.

    - Oracle: This database is a proprietary object-relational type database management
    system, developed by Oracle Corporation, considered one of the most complete systems.
    Its dominance in the enterprise server market was almost total until the appearance
    of the competition. It is multiplatform, and also the latest versions of Oracle
    have been certified to work under GNU / Linux.

    - MySQL: It is a relational database management system developed under dual GPL
    / Commercial license by Oracle Corporation and is considered the most popular
    open-source database in the world, and one of the most popular in general together
    with Oracle and Microsoft SQL Server, especially for web development environments.

    - PostgreSQL: It is a free object-oriented relational database management system.
    Like many other open-source projects, PostgreSQL development is not managed by
    one company or person but is led by a community of developers who work selflessly,
    altruistically, freely, or supported by commercial organizations.

    - SQLite: It is a relational database management system contained in a small library
    written in C. It is a public domain project, and unlike the other systems that
    use the client-server architecture, its engine is not an independent process,
    but rather it links with the program by becoming an integral part of it. However,
    do not be fooled, because although it seems like the simple solution, SQLite in
    its third version allows databases of up to 2 Terabytes in size and many other
    functionalities. In short, its configuration is very simple, so simple that it
    does not exist, so it will not cause problems, and it is the best solution for
    this course.


    As you can see, we find many Relational DBMS. In Python, each of them have free
    modules and connector programs to communicate the databases and the programming
    language. Even though they are different systems, the query language does not
