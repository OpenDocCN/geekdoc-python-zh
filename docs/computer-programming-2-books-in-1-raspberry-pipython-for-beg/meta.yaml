- md: "Your learning will not end with this book; being a programmer is a continuous\
    \ learning process that each of the projects that you will carry out in the future\
    \ has its own peculiarities, but you will never be alone or adrift. Python puts\
    \ at your disposal all the tools you could need along the way. Your community\
    \ will always offer help to those who have less knowledge or are facing too great\
    \ a challenge. So if you ever encounter difficulties, don't be discouraged and\
    \ visit the pages shared here, as they will surely be something of value in your\
    \ new career as a programmer.\n\n## Project: Hello World\n\nAt last, the time\
    \ you have been waiting for has arrived. The first program that we are going to\
    \ write in Python is the classic \"Hello, world!\" And in this language, it is\
    \ as simple as:\n\n```python\nprint(\"Hello world\")\n```\n\nRun Python and type\
    \ the above line, and hit Enter. The response you should receive in the console\
    \ is the text:\n\n```\nHello world\n```\n\nWhat we have done here is use the function\
    \ built-in `print()` to print the string `Hello, world!` on our screen. A string\
    \ is a sequence of characters. In Python, these are enclosed inside quotes, double\
    \ quotes, or triple quotes.\n\nNext, we will proceed to create a text file with\
    \ the previous code so that we can distribute our great little program among our\
    \ friends. Open your preferred text editor and copy the previous line. Save it\
    \ as \"hello.py,\" for example.\n\nRunning this program is as simple as telling\
    \ Python the name of the file to run:\n\n```bash\npython hello.py\n```\n\nIf you\
    \ use Windows, the `.py` files will already be associated with the Python interpreter,\
    \ so double-click on the file to run the program. However, as this program does\
    \ nothing more than print a text on the console, the execution is too fast to\
    \ be seen. To remedy this, we are going to add a new line that waits for the user\
    \ to enter data. This way, a console will display the text \"Hello, world!\" until\
    \ we press Enter.\n\n```python\nprint(\"Hello world\")\nraw_input()\n```\n\nWe\
    \ could also run the program from the console as if it were executable in all\
    \ operating systems: `./hello.py`\n\n## Basic Types\n\nData types are handled\
    \ in any high-level programming language. Data types define a set of values that\
    \ have certain characteristics and properties. Let's think for a moment when we\
    \ were in math class. Surely you had a class in which they taught you the different\
    \ sets of numbers. The natural ones (1, 2, 3, 4...), the integers (..., -2, -1,\
    \ 0, 1, 2...), the real ones (... -1.1, -0.3, 2.1...), etc. Well, in programming\
    \ (and of course in Python), each of those sets would be what we call a data type.\n\
    \nIn Python, every value that can be assigned to a variable has a data type associated\
    \ with it. In Python, everything is an object. So the data types would be the\
    \ classes (where the properties are defined and what can be done with them), and\
    \ the variables would be the instances (objects) of the data types. In short,\
    \ a data type establishes what values a variable can take and what operations\
    \ can be performed on them.\n\nThe basic Python data types are numeric (integer,\
    \ floating-point, and complex), Booleans, and strings.\n\n## Numeric types\n\n\
    Python defines three basic numeric data types: integers, reals, and complex numbers.\n\
    \n### Integer numbers\n\nWhole numbers are those positive or negative numbers\
    \ that do not have decimals (other than zero). In Python, they can be represented\
    \ by the type `int` or the type `long`. Python's `int` type is implemented low-level\
    \ by a `long` type of C. And since Python uses underneath C, like C, and unlike\
    \ Java, the range of values it can represent is platform dependent.\n\nIn most\
    \ machines, the `long` of C is stored using 32 bits; that is, by using a Python\
    \ `int` type variable, we can store numbers from -2^31 to 2^31 - 1, or what is\
    \ the same, from -2,147,483,648 to 2,147,483,647. On 64-bit platforms, the range\
    \ is -9,223,372,036,854,775,808 to 9,223,372,036,854,775,807. Python's `long`\
    \ type allows you to store numbers of any precision, being limited only by the\
    \ memory available on the machine.\n\nWhen assigning a number to a variable, it\
    \ will become `int` unless the number is so large as to require the use of the\
    \ `long` type. We can also tell Python that a number is stored using `long` by\
    \ adding an `L` at the end:\n\n```python\n# type (whole) return whole\nlong =\
    \ 23L\n```\n\nWe can also represent whole numbers in the binary format, *octal*\
    \ or *hexadecimal*.\n\nThe numbers *octal* are created by prepending \"0o\" to\
    \ a sequence of octal digits (from 0 to 7):\n\n```python\nten_octal = 0o12\nprint(ten_octal)\n\
    ```\n\nTo create an integer in *hexadecimal*, \"0x\" must be prepended to a sequence\
    \ of hexadecimal digits (from 0 to 9 and from A to F).\n\n```python\nten_hex =\
    \ 0xa\nprint(ten_hex)\n```\n\nLooking at the numbers in *binary*, \"0b\" is prepended\
    \ to a sequence of binary digits (0 and 1).\n\n```python\nten_binary = 0b1010\n\
    print(ten_binary)\n```\n\n### Real Numbers\n\nReal numbers are those with decimals.\
    \ In Python, they are expressed by the type `float`. In other programming languages,\
    \ like C, we also have the type `double`, similar to `float` but with higher precision\
    \ (double = double precision). Python, however, implements its `float` type at\
    \ a low level by means of a `double` type variable of C, that is, using 64 bits,\
    \ then in Python double precision is always used, and specifically, the IEEE 754:\
    \ 1-bit standard is followed for the sign, 11 for the exponent, and 52 for the\
    \ mantissa. This means that the values that we can represent range from ± 2.2250738585072020\
    \ x 10^-308 to ± 1.7976931348623157 × 10^308. To represent a real number in Python,\
    \ the integer part is written first, followed by a period and finally the decimal\
    \ part:\n\n```python\ndecimal = 0.2703\n```\n\nYou can also use scientific notation\
    \ and add an `e` (for exponent) to indicate an exponent in base 10. For example:\
    \ `decimal = 0.1e-3` It would be equivalent to 0.1 x 10^-3 = 0.1 x 0.001 = 0.0001\n\
    \n### Complex Numbers\n\nComplex numbers are those that have an imaginary part.\
    \ If you did not know of its existence, it is more than likely that you will never\
    \ need it, so you can safely skip this section. In fact, most programming languages\
    \ lack this type, although it is widely used by engineers and scientists in general.\n\
    \nIn case you need to use complex numbers, or you are just curious, I will tell\
    \ you that this type, called `complex` in Python, is also stored using floating-point\
    \ because these numbers are an extension of the real numbers. Specifically, it\
    \ is stored in a C structure, composed of two variables of type `double`, one\
    \ of them serving to store the real part and the other for the imaginary part.\
    \ Complex numbers in Python are represented as follows:\n\n```python\ncomplex\
    \ = 2.1 + 7.8j\n```\n\n## Boolean Types\n\nIn Python, the class that represents\
    \ boolean values is `bool`. A Boolean variable can only have two values: `True`\
    \ or `False`. These values are especially important for conditional expressions\
    \ and loops.\n\nThese are the different types of operators with which we can work\
    \ with Boolean values, the so-called logical or conditional operators: Boolean\
    \ values are also the result of expressions that use relational operators (comparisons\
    \ between values):\n\n| Operator | Description | Example |\n| :--- | :--- | :---\
