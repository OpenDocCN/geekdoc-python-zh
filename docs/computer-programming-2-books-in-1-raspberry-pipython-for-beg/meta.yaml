  md: 'In any case, if we cannot trust each other, then the fabric of trust unravels
    and individuals stop constructing the very structures we want to explore. You
    can''t have your cake and you can''t eat it, either.


    As hackers, we have an option that we can pursue without regard to property rights
    and break the fabric of trust or restore and improve the fabric of trust and property
