  md: '# # Regular Expressions


    One of the most frequent operations that you have come across is looking for a
    certain pattern/substring in a list, table, or text file.


    This is not difficult if the pattern you are looking for is static, and you know
    it precisely. For example, if you want to find a certain name in a contact list,
    just use functions like `find ()` , which are already included in Python.


    But what happens when the substring you are trying to find has variants in its
    writing? For example, suppose that in a certain text, you want to find how many
    times the name “Händel” appears. Being a Germanic name, in our language, it can
    be written as "Händel," "Handel" or "Haendel". If you only use functions like
    find (), you will have to find each variant of the name separately. What if in
    a binary sequence you want to find all the subsequences of the form 010, 0110,
    01110, 011110, and others? Now you can no longer use the find () method once for
    each case since there are infinite ones. Another way is needed.


    This is where regular expressions come into the picture, a very powerful tool
    that makes it easy to find patterns in text. Regular expressions come from the
    world of theoretical mathematics, specifically the Theory of Formal Languages,
    but they are widely used in programming. Without going into mathematical definitions,
    a regular expression can be thought of as a word, made up of special characters,
    that serves to identify a set of other words.


    I will illustrate it with an example. Let''s go back to the beginning when we
    wanted to find the word Händel in a text. You could search for the three variants
    ("Handel," "Händel" and "Haendel") separately, or you could find another word
    that "encodes" these three variants. In this case, the word that is needed would
    be "$H (a | ä | ae) ndel$" . The vertical bar is a type of metacharacter used
    to separate'
