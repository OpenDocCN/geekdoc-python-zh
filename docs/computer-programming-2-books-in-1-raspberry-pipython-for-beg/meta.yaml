    # Packages


    A package is a folder that contains several modules. If modules are used to organize
    code, packages are used to organize modules. Packages are special types of modules
    (both are a type of module) that allow grouping related modules. While modules
    correspond on a physical level to files, packages are represented by directories.
    Using packages offers us several advantages. First of all, it allows us to unify
    different modules under the same package name, being able to create hierarchies
    of modules and sub-modules, or sub-packages. On the other hand, they allow us
    to easily distribute and handle our code as if they were installable Python libraries.
    In this way, they can be used as standard modules from the interpreter or scripts
    without previously loading them.


    To make Python treat a directory as a package, you need to create a file __init__.py
    in that folder. This way, we get Python to understand that it is a package and
    not a simple folder. In this way, we can access some of the modules of the package.
    Like modules, import and from-import are also used to import packages to separate
    packages, sub-packages, and modules:


    ```

    import package subpackage module


    package.subpack.modulo.func ()

    ```'
