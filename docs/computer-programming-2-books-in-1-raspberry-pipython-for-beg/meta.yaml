    That is why an attempt was made to create a new language that was not based directly
    on the machine''s own instructions (that did not depend on the specific machine)
    but rather on an abstraction of these, and that was more comfortable for the programmer.
    In the same way, physical devices (registers, memory cells, etc.) would not be
    used directly, but abstractions of these (variables). In this way, a new concept
    of programming language arose, where each language has an abstract machine associated
    with which your code can be run.


    If we want to run programs written in a high-level language on a specific computer,
    we must translate them into other equivalents in a specific machine code (manually
    or through a process called compilation) or have a tool that reads the program
    and interprets it step by step the meaning of each sentence in the program (interpretation
    process). Working in this direction, between 1954 and 1958, John Backus led a
    working group that aimed to carry out a machine code translator of mathematical
    formulas that would express calculations. The result was both the specification
    of a high-level language, Fortran, and the realization of a compiler that translated
    said language into the machine code of a specific computer (IBM 704).


    Around 1960, three decisive languages were created: Algol 60, Cobol, and Lisp.
    In 1958, Lisp, designed by John McCarthy, was a very innovative language in the
    sense that it is far removed from the Von Neumann concept of the machine. It is
    based almost exclusively on the use of functions and lambda calculus, and its
    main purpose was symbolic calculus. It was the precursor of so-called functional
    languages. This language has been widely used in the field of artificial intelligence.
    In 1959, the US Department of Defense commissioned the Cobol. Its objective was
    clearly practical, and although it was carried out without taking into account
    some of the advances made at the time in the design of programming languages,
    it was innovative in the treatment of data. It was also the first standardized
    language, which favored its later use. In 1960, Algol 60 was primarily an academic
    language where numerous innovative concepts were introduced and adopted by many
    later languages. The language was fully specified with the BNF notation, a formalism
    equivalent to non-contextual grammars. Already in 1964, the Basic was born. This
    language was designed from the user''s point of view. That is, the language was
    intended to be easy to learn and use. This language was quite successful in teaching
    and especially in the programming of the first microcomputers, but it was hardly
    used in the professional environment. Given the above, Simula was developed in
    1967, based on the Algol 60.


    Pascal was born around 1970 after the software crisis. Niklaus Wirth created a
    simple and clear language that allowed us to face the increasing complexity of
    the programs of the time. It is the first language based exclusively on structured
    programming, and thanks to its simplicity, it has been the ideal language on which
    to develop the semantics of languages and formal verification, whose beginnings
    also date back to these years. In addition, Pascal has been a good progenitor
    of later languages. In this sense, Wirth later designed the Modula-2 language
    built on many concepts introduced in Pascal, although he emphasizes the construction
    of the program understood as a set of independent modules. After Pascal, a multitude
    of languages were developed, including C, which at the cost of a lower level of
    abstraction, provided great flexibility and control over the machine’s resources.
    The concept of concurrent programming also appeared around this time. The first
    logic programming language, Prolog, was developed in 1975 by the Kowalski and
    Colmerauer groups. However, unlike what happened with other languages, its gestation
    was quite long. It can be considered that the beginnings of Prolog are from 1960.
    Like Lisp, Prolog is far from the Von Neumann machine’s concept, and it is based
    almost entirely on first-order logic. Prolog has an important advantage over other
    languages that the verification of programs is almost immediate due to its logical
    base; however, it has the counterpart that it is usually quite inefficient.


    In 1983, Ada was created, a language developed under the US Department of Defense’s
    auspices. It is largely based on Pascal, although it is more complex. It allows
    us to adequately address concurrent programming and exception handling and introduces
    the concept of overload.


    Currently, there are a large number of new languages (C++, Java, Modula-3, Oberon,
    Delphi, Eiffel...). Most of the evolutions of those presented here, to which some
    of the concepts discussed above have been added such as object orientation, exception
    handling, overload, modularity, etc.


    Python is one of the most widely used programming languages today, and the trend
    continues to rise. It has it all: it is open-source, simple, and easy to understand
    syntax, thus saving time and resources. It is one of the best to start with in
    the world of programming. Python is a versatile language that can have multiple
    applications such as Artificial Intelligence, thanks to libraries like Keras or
    TensorFlow. It can also be useful for Big Data applications, due to data processing
    libraries. This programming language is also used in web development, especially
    thanks to its Django or Flask frameworks. To give a few examples, the SemRush
    or Reddit websites are developed with Python.


    ## The Python Language


    It is a high-level programming language (far removed from machine language). It
    is a platform independent and object-oriented scripting language prepared to carry
    out any type of program, from Windows applications to network servers or even
    web pages. It is an interpreted language, which means that it is not necessary
    to compile the source code to execute it, which offers advantages such as the
    speed of development and disadvantages such as lower speed.


    The creator of the language is a European named Guido Van Rossum. Van Rossum''s
    goal was to cover the need for a user-friendly object-oriented language that could
    be used to deal with various tasks within the programming that is usually done
    in Unix using C. Python’s development lasted several years, during which he worked
    for various United States companies. By 2000, it already had a fairly complete
    product and a development team with which it had even partnered on business projects.
    He currently works at Zope, a content management platform and application server
    for the web, of course, completely programmed in Python.


    Its general purpose is to create all kinds of programs. It is not a language created
    specifically for the web, although among its possibilities is the development
    of pages. Python versions are available on many different computer systems. It
    was originally developed for Unix, although any system is compatible with the
