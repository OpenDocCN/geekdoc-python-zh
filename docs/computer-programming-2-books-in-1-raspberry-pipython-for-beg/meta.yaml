- md: "## Chapter Six\n\n## Tool for Raspberry Pi Configuration\n\nWhen it comes to\
    \ having access to the configuration tool, these few steps are straightforward\
    \ and the most important part of this tutorial:\n\n1. There is an icon in the\
    \ menu bar for either SSH on the Raspberry Pi or accessing the terminal from inside\
    \ the Raspbian desktop.\n2. Type the command that follows:\n   ```\n   sudo raspi-config\n\
    \   ```\n\nYou will now have access to the Raspi Config tool, so let's go through\
    \ each item's functionality now.\n\n### User Account Update\n\nIt is very easy\
    \ to find out about the Raspberry Pi default login through a Google search. You\
    \ will probably only guess the username and password, so if you don't want anyone\
    \ to access your Pi, it's necessary to change the password.\n\nUse this method\
    \ to change the password for the user pi, and I highly recommend that you do so.\
    \ Raspberry is the default pi user password, so it's pretty easy to guess. Using\
    \ this app, you can not alter any other user's passwords.\n\n### Options for the\
    \ Network\n\nThis menu includes options relevant to the Raspberry Pi's network\
    \ capabilities.\n\n- **Hostname:** This option allows the network name of the\
    \ Raspberry Pi to be set. It’s convenient if you have several Raspberry Pis and\
    \ want to make a distinction between them.\n- **Wi-Fi:** You can use this method\
    \ to set the Wifi SSID and passphrase. If you have found setting up WiFi manually\
    \ a little frustrating from the command line, this option is super handy.\n- **Names\
    \ of the network interface:** This option enables predictable network interface\
    \ names to be allowed or disabled. By default, this option is off and should be\
    \ turned on only if you need it. In our WiFi guide, there is more information\
    \ about this alternative.\n\n### Options for Booting\n\nIn the Raspi configuration\
    \ tool, the third item specifies how your Pi will boot. The option is to boot\
    \ the Pi, which is not suitable for most users, into the desktop. (Command line\
    \ defaults to Raspbian lite)\n\n- **Desktop / CLI:** This choice enables you to\
    \ choose whether to boot the Raspberry Pi or the command line on your desktop.\n\
    - **Wait for a network connection at boot:** If you want your Pi to wait for a\
    \ network connection at boot, turn on this function.\n- **Splash Screen:** Choose\
    \ whether to view a graphical splash screen or to boot text by default. If you're\
    \ searching for mistakes, text can be helpful, or you can link to the error log.\n\
    \n### Choices for Internationalisation\n\nIf you need to change the settings of\
    \ your Raspberry Pi keyboard layout, such as your locale, time zone or update.\n\
    \n- **Change Locale:** For example, en_AU.UTF-8 or en_GB.UTF-8 will change your\
    \ locale here.\n- **Change Time zone:** If you wish to set a Raspberry Pi time\
    \ zone, use this option. This will allow you to update the time zone and set it\
    \ so that it is the right time for your place. To change your time zone correctly,\
    \ simply follow the prompts.\n- **Change Keyboard Layout:** It can take a while\
    \ for this one to load all the available keyboard layouts. You can pick the correct\
    \ keyboard layout once it's loaded. Bear in mind that the UK keyboard is a different\
    \ style from the US layout.\n- **WiFi Country Change:** You can update this, so\
    \ it's the same as the country in which you actually live. Most nations have numerous\
    \ legal networks that you can use for WiFi.\n\n### Options for Interfacing\n\n\
    This choice allows the number of interface functions available on the Raspberry\
    \ Pi to be disabled or enabled differently.\n\n- **Enable Camera:** If you want\
    \ to use the Raspberry Pi camera module, you will need to activate it. Go in and\
    \ pick the option to trigger it. If you're planning on following my Raspberry\
    \ Pi Time-Lapse tutorial, you'll need the camera module activated.\n- **SSH:**\
    \ This choice allows SSH access to your PI to be disabled or activated. Enabling\
    \ this would allow you to access your Pi from a remote location, so it is best\
    \ to keep it disabled if you don't intend on ever using SSH. If you intend to\
    \ use the Raspberry Pi on a public network, make sure that you have changed the\
    \ pi user's password so that it is not *raspberry*.\n- **VNC:** Later versions\
    \ of Raspbian have VNC preinstalled, so if you want to use RealVNC to connect\
    \ to the Raspberry Pi, make sure that you switch it on.\n- **SPI:** It allows\
    \ you to disable or activate the kernel module SPI (Serial Peripheral Interface)\
    \ required by PiFace. This allows a four-wire serial connection to be connected,\
    \ so you have sensors, memory, and peripherals.\n- **The I2C:** Allows the I2C\
    \ kernel module to be disabled or enabled, so that I2C devices can be attached.\n\
    - **Serial Sequence:** You can disable or allow shell and kernel messages from\
    \ the serial link with this option.\n- **1-The Cable:** If you plan on using something\
    \ like the DS18B20 temperature sensor or other devices that make use of the 1-wire\
    \ protocol, switch on the 1-wire interface.\n- **GPIO Remote:** This choice allows\
    \ you to control the GPIO pins remotely and should only be turned on if you know\
    \ that it needs to be switched on.\n\n### Overclocking\n\nTo get more strength\
    \ out of it, you can overclock your Raspberry Pi. The default settings for the\
    \ Raspberry Pi overclock are set to off, and the CPU sits at 700 MHz. You can,\
    \ however, overclock it up to 1000 MHz by using this gadget. Depending on the\
    \ Raspberry Pi version you have, these values can differ.\n\nYou should also remember\
    \ that overclocking will cause greater instability and shorten your Pi's lifespan\
    \ as well. Later models of the Raspberry Pi, such as the Raspberry Pi 3, also\
    \ have it disabled.\n\n### Advanced Options Section\n\nThe last batch of options\
    \ in the Raspi-Config tool are advanced options, and these are a little more active.\
    \ If you do more beyond the fundamentals of the Pi, you probably don't need to\
    \ change these.\n\n- **Expand Filesystem to expand**\n\n## Chapter Seven\n\n##\
    \ Advanced Raspberry Pi Configuration\n\nWhen you install Raspbian, the 'RasPi\
    \ Config' tool is the first thing you'll see. It allows the device to be configured,\
    \ which would otherwise be trickier in the Linux world.\n\n*Why does the tool\
    \ 'RasPi Config' come first?*\n\nTasks such as setting the date and time or regional\
    \ settings for your keyboard are frequently performed without dialogs in a command-line\
    \ interface, no extra support for a demanding novice.\n\nFor the Pi and Raspbian\
    \ itself, there are several other details, such as: the ability to easily activate\
    \ over-scan for your TV; change the memory split to the computer / graphics card\
    \ or even overclock your device to make it a little faster; allow remote SSH access\
    \ to the system; among other things, avoid booting the system into the desktop\
    \ environment.\n\n*Mastering the tool for configuration*\n\n1. Open the tool with\
    \ raspi-config\n\nDouble-click your desktop's LXTerminal icon. This will open\
    \ the prompt command, where you can run the configuration tool. You will need\
    \ to execute an order to do this:\n\n```\nsudo raspi-config\n```\n\nYou can not\
    \ necessarily see it being typed when asked for your password. If you have entered\
    \ a password and pressed Enter to submit it, you will be shown the configuration\
    \ page.\n\n2. Expand the framework for root files\n\nBy default, the Raspbian\
    \ root file system will be 2 GB, so that as many different SD cards as possible\
    \ can match the image provided for it.\n\nThe 'expand roots' option would allow\
    \ the operating system to use all available space if your card is larger. Upon\
    \ using this option, the command will immediately be executed. It can take some\
    \ time to run. To see the modifications, reboot your machine.\n\n3. Configure\
    \ the location\n\nLocale is the language and regional settings used by your Pi,\
    \ but this normally has little influence on what you see. It is also responsible\
    \ for any default currency settings, etc., so if incorrect at a later time, it\
    \ may be irritating. You will be taken over by a wizard after selecting the option.\
    \ Until building more, use the arrow keys to check the constructed locale. You\
    \ will be taken to the tzdata screen by the time zone where you can change it.\n\
    \n4. Overclock your Pi\n\nYou can adjust your Pi's clock velocity and voltage\
    \ to many different presets. It can cause instability to set the clock speed and\
    \ voltage at higher rates than the specification, so do it in small increments\
    \ and ensure good airflow around your Pi.\n\nRun this wizard again if you see\
    \ any apparent instability and set the clock speed back down to something slightly\
    \ lower—repeat until your device is fully stable. After making this adjustment,\
    \ it is also recommended to reboot your system. Keep the Shift key to disable\
    \ overclocking temporarily.\n\n5. Modify the split memory\n\nChanging the Pi's\
    \ memory split enables you to assign a greater amount of memory to either the\
    \ device or the graphics processor. It must have either 16/32/64/128/256 as the\
    \ value you give it.\n\n*Suggested Recommendations:*"
  mdcn: "## 第六章\n\n## 树莓派配置工具\n\n要访问配置工具，以下几步非常简单，也是本教程最重要的部分：\n\n1.  菜单栏中有一个图标，用于在树莓派上启用\
    \ SSH 或从 Raspbian 桌面内访问终端。\n2.  输入以下命令：\n    ```\n    sudo raspi-config\n    ```\n\
    \n现在你就可以访问 Raspi Config 工具了，接下来我们逐一介绍每个项目的功能。\n\n### 用户账户更新\n\n通过谷歌搜索可以很容易地找到树莓派的默认登录信息。你可能只需要猜用户名和密码，因此，如果你不想让任何人访问你的树莓派，就有必要更改密码。\n\
    \n使用此方法更改用户 `pi` 的密码，我强烈建议你这样做。`raspberry` 是默认的 `pi` 用户密码，因此很容易被猜到。使用此应用，你无法更改任何其他用户的密码。\n\
    \n### 网络选项\n\n此菜单包含与树莓派网络功能相关的选项。\n\n-   **主机名：** 此选项允许设置树莓派的网络名称。如果你有多个树莓派并想区分它们，这会很方便。\n\
    -   **Wi-Fi：** 你可以使用此方法设置 Wifi SSID 和密码。如果你觉得从命令行手动设置 Wifi 有点麻烦，这个选项会非常方便。\n-\
    \   **网络接口名称：** 此选项允许启用或禁用可预测的网络接口名称。默认情况下，此选项是关闭的，只有在需要时才应开启。在我们的 Wifi 指南中，有关于此选项的更多信息。\n\
