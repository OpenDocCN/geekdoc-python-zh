    \ 3，也默认禁用了超频。\n\n### 高级选项部分\n\nRaspi-Config 工具中的最后一批选项是高级选项，这些选项稍微更活跃一些。如果你做的不仅仅是树莓派的基础操作，你可能不需要更改这些。\n\
