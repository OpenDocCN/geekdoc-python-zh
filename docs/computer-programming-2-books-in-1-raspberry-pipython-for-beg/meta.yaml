  md: '# # Chapter Seven


    # ## Advanced Raspberry Pi Configuration


    When you install Raspbian, the ''RasPi Config'' tool is the first thing you''ll
    see. It allows the device to be configured, which would otherwise be trickier
    in the Linux world.


    *Why does the tool ''RasPi Config'' come first?*


    Tasks such as setting the date and time or regional settings for your keyboard
    are frequently performed without dialogs in a command-line interface, no extra
    support for a demanding novice.


    For the Pi and Raspbian itself, there are several other details, such as: the
    ability to easily activate over-scan for your TV; change the memory split to the
    computer / graphics card or even overclock your device to make it a little faster;
    allow remote SSH access to the system; among other things, avoid booting the system
    into the desktop environment.


    *Mastering the tool for configuration*


    +   1. Open the tool with raspi-config


    Double-click your desktop''s LXTerminal icon. This will open the prompt command,
    where you can run the configuration tool. You will need to execute an order to
    do this:


    ```

    Raspi-config sudo

    ```


    You can not necessarily see it being typed when asked for your password. If you
    have entered a password and pressed Enter to submit it, you will be shown the
    configuration page.'
  merge: -1
  pgno: 195
- img_proc: true
  md: '# 2. Expand the framework for root files


    By default, the Raspbian root file system will be 2 GB, so that as many different
    SD cards as possible can match the image provided for it.


    The ''expand roots'' option would allow the operating system to use all available
    space if your card is larger. Upon using this option, the command will immediately
    be executed. It can take some time to run. To see the modifications, reboot your
    machine.


    # 3. Configure the location


    Locale is the language and regional settings used by your Pi, but this normally
    has little influence on what you see. It is also responsible for any default currency
    settings, etc., so if incorrect at a later time, it may be irritating. You will
    be taken over by a wizard after selecting the option. Until building more, use
    the arrow keys to check the constructed locale. You will be taken to the tzdata
    screen by the time zone where you can change it.


    # 4. Overclock your Pi


    You can adjust your Pi''s clock velocity and voltage to many different presets.
    It can cause instability to set the clock speed and voltage at higher rates than
    the specification, so do it in small increments and ensure good airflow around
    your Pi.


    Run this wizard again if you see any apparent instability and set the clock speed
    back down to something slightly lower—repeat until your device is fully stable.
    After making this adjustment, it is also recommended to reboot your system. Keep
    the Shift key to disable overclocking temporarily.


    # 5. Modify the split memory


    Changing the Pi ''s memory split enables you to assign a greater amount of memory
    to either the device or the graphics processor. It must have either 16/32/64/128/256
    as the value you give it.


    *Suggested Recommendations:*'
  merge: -1
