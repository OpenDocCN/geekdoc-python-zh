    Keyboard and Mouse: You need a USB keyboard and a USB mouse to use the Raspberry
    Pi 4. Both are mandatory for the first installation. You can also use the Bluetooth
    keyboard and mouse after setting it up.


    TV / Computer screen: You need a TV or computer screen and a cable to connect
    the Raspberry and the monitor to display the content within the computer. Pi 4
    can use it if your display has speakers mounted inside it. A micro-HDMI port is
    the port needed here. You will need their respective micro-HDMI converters if
    you have a particular cable, such as regular HDMI, DVI, and VGA cables. If your
