  md: '+   - Flip the board over and weld each part into place.

    - Trim part excess leads.

    - Remember to reference the polarity we recorded at the beginning when adding
    the LEDs. It is possible to put the LED in backwards—even if it is backwards,
    it won’t light up.


    # A Short Soldering Guide


    The great thing about soldering is that you don''t need a lot to get started.
    For most of your welding projects, we will outline the basic equipment and supplies
    you will need below.


    # Welding Iron


    To melt solder around electrical links, a soldering iron is a hand tool that plugs
    into a regular 120v AC outlet and heats up. This is one of the most important
    soldering instruments used, and it may come in a few variants, such as the shape
    of a pen or pistol. It''s recommended that you use the pen style soldering iron
    in the 15W to 30W range for beginners. The majority of soldering irons have interchangeable
    tips that can be used for various applications of soldering. When using any form
    of soldering iron, be very careful because it can heat up to 896’ F, which is
    extremely hot.


    In short, soldering is a common and fairly easy way for different kinds of materials
    and components to be affixed or bonded to each other. Using a small amount of
    metal alloy, known as solder, and a heated handheld tool called a soldering iron,
    the procedure is carried out. You''ll usually use the hot metal tip of the iron
    when you solder things together to melt a small amount of solder alloy around
    and between the components or surfaces being connected.


    The resulting soldered bond or joint, once cooled and hardened, will be permanent.
    It will provide a safe connection between discrete parts, electrically conductive
    (for circuitry), and watertight (for plumbing applications). It is worth noting,
    however, that hardened solders can typically be remelted and removed reasonably
    easily by reapplying adequate heat. This also makes it possible to separate or
    rework parts that have previously been welded together as required. This approach
    is known as desoldering, which we will return to.'
