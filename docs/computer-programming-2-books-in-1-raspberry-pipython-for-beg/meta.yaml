  md: '# Basic Types


    Data types are handled in any high-level programming language. Data types define
    a set of values that have certain characteristics and properties. Let''s think
    for a moment when we were in math class. Surely you had a class in which they
    taught you the different sets of numbers. The natural ones (1, 2, 3, 4...), the
    integers (..., -2, -1, 0, 1, 2...), the real ones (... -1.1, -0.3, 2.1...), etc.
    Well, in programming (and of course in Python), each of those sets would be what
    we call a data type.


    In Python, every value that can be assigned to a variable has a data type associated
    with it. In Python, everything is an object. So the data types would be the classes
    (where the properties are defined and what can be done with them), and the variables
    would be the instances (objects) of the data types. In short, a data type establishes
    what values a variable can take and what operations can be performed on them.


    The basic Python data types are numeric (integer, floating-point, and complex),
    Booleans, and strings.


