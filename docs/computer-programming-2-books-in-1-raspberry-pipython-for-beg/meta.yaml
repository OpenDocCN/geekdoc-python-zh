- img_proc: true
  md: '# # Programming Languages


    # ## What is a Programming Language?


    Let''s start by understanding what a language is. This is a very convenient method
    to express information and later create sequences of actions necessary to perform
    a task. In our environment, there are two types of language:


    +   - Natural language: Natural language is what we use in our daily lives. That
    is, it refers to the language we speak (English, Spanish, French, Chinese ...).
    It has the advantage that we learn it gradually thanks to exposure, observation,
    and practice, for which it is given the name of natural. However, it has disadvantages,
    such as limited comprehension since it is difficult to understand people when
    they speak a different language. There is sometimes ambiguity or imprecision because,
    in most languages, there are synonyms or the words change their meaning according
    to their context.

    - Symbolic language: It is a set of artificially created symbols to express specific
    meanings that can be universally understood and avoid ambiguities. Therefore,
    this type of language can be understood internationally, and each symbol will
    always have the same meaning regardless of where it is used.


    Therefore, a programming language is a clear example of a language that occupies
    an intermediate position between natural language, used particularly by humans,
    and the precise symbolic languages that allow us to interact with a machine. In
    this regard, we should be particularly grateful to the progressive evolution of
    translation languages that allow us to convert instructions from a programming
    language to a machine language, making the programming process that we carry out
    today look the same every time more to natural languages, making the task easier.'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'Programming languages use Western alphabet characters and numbers as symbols.
    This set or sets of characters are programmed by the user and interpreted by the
    computer. Nowadays, we can distinguish between codes due to their use and popularity:
    ASCII (American Standard Code for Information Interchange) and EBCDIC (Extended
    Binary Coded Decimal Interchange Code). The first uses 7 bits for each character
    to represent, which translates into a total of 27 different characters to represent.
    In its extended version, it uses 8 bits, making it consist of 256 characters.
    This code is the standard on all personal computers. On the other hand, the second
    code always uses 8 bits per character, making it 256 in total. This type of code
    is used primarily in mainframe computers (commonly used to process data for corporate
    and scientific research functions) and mid-range computers (business-oriented).


    # Programming Languages Structure


    A language is made up of a set of symbols and words (vocabulary and lexicon) and
    a set of rules (syntax and semantics) that allow symbols to be grouped to form
    the language''s sentences. The programming language has a set of special rules
    that allow it to build a program. We will understand by a program, a set of commands
    or instructions based on a programming language that a computer interprets to
    solve a problem or execute a specific function.


    Although the terms "programming language" and "computer language" are often used
    as if they were synonyms, it does not have to be that way, since computer languages
    encompass programming languages and others, such as HTML (language for the markup
    of web pages that is not properly a programming language).


    A programming language allows one or more programmers to specify precisely what
    data a computer should operate on, how this data should be stored or transmitted,
    and what actions it should take under a wide range of circumstances. All this,
    through a language that tries to be relatively close to human or natural language.
    A relevant characteristic of programming languages is that more than one programmer
    can have a common set of instructions that can be understood among them to carry
    out the construction of the program in a collaborative way.'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'The basic elements of language are the lexicon, syntax, and semantics. Within
    the lexicon, we can distinguish the following components:


    +   - Identifiers: symbolic names that will be given to certain programming elements
    (e.g., names of variables, types, modules, etc.).

    - Constants: data that will not change its value throughout the program.

    - Operators: symbols that will represent operations between variables and constants.

    - Instructions: special symbols that will represent processing structures and
    the definition of programming elements.

    - Comments: text that will be used to document the programs.


    The rules (syntax) or productions specify the symbol sequence that make up a sentence
    in the language.


    Finally, semantics defines the meaning of the syntactic constructions of the language
    and of the expressions and data types used.


    # Low and High-Level Languages


    Programming languages can be classified into low-level and high-level languages
    depending on how close or far they are from the architecture of the machine on
    which they will operate.


    Low-level languages take their fundamentals from the Von Neumann machine, so they
    are at a level very close to the machine. The instructions are different in each
    computer, so they are difficult to program and are costly. They are classified
    into machine language and assembly language.


    In contrast, high-level languages are based on abstract machines, and that makes
    it easier for people to understand them. Their instructions are more flexible
    and have greater power than the previous language types, but a translator is necessary
    to convert the program to machine language. Even so, as it does not depend on
    the processor, the same program works for different computers.'
  merge: -1
  pgno: 19
- img_proc: true
  md: 'High-level languages have several philosophies for programming, also called
    paradigms, of which we can highlight the following:


    +   - Imperatives: they are languages controlled by commands or instructions.
    It is created through statements that, when executed, make the interpreter change
    the value of one location or more in its memory; in other words, it causes a change
    of state. The successive change of states is what causes the achievement towards
    the goal or the creation of a solution. Examples of languages of this type are
    C, C ++, FORTRAN, ALGOL, PL / I, Pascal, Ada, Smalltalk, and COBOL.

    - Applications: Also known as functional, these look at the desired result instead
    of the available data. This means that the states through which the machine must
    go to obtain a response are not examined. Rather, the function that must be applied
    to the state of the machine is identified through access to the set of variables
    and the creation of combinations in specific forms to get an answer.

    - Rule-based languages: They are executed by verifying the presence of a condition
    that enables the execution of appropriate action. It is similar to an imperative
    language, with the difference that the sentences are not sequential. Conditions
    are made with logical expressions. Therefore, they are also known as logical programming
    languages. Among these languages, Prolog is the main representative.

    - Object-oriented programming: Complex data objects are created, and then a limited
    set of functions are designated to operate on that data. Complex objects are designated
    as an extension of other simpler objects, inheriting their properties. The programs
    created with these languages are as efficient as those created with imperatives
    and are as flexible and reliable as those created with application languages.


    Whenever a high-level language is being used, an interpretation or translation
    process will be necessary, which helps to convert the programming language to
    machine language so that it can be executed. The process of translating and converting
    into a program is different depending on the compiler or interpreter used. A compiler
    is a program that is only responsible for carrying out a'
  merge: -1
  pgno: 20
- img_proc: true
  md: 'translation, not the program, while an interpreter is designed to both translate
    and execute.


    This gives rise to two types of errors. Compilation errors are produced in the
    compilation or interpretation phase of a program, when the syntactic or semantic
    rules are not met. Execution errors are produced during the program’s execution.
    These error messages are not produced by the compiler, but by a piece of code
    that the compiler adds to the program. The third type of error can occur when
    no reference is made to either of these two. This problem can be observed when
    the program does not give any error, but the results are not as expected. It may
    be because the algorithm has been incorrectly implemented or because the algorithm
    was poorly made.


    In short, when we refer to a programming language, we are talking specifically
