    - Oracle：这个数据库是由甲骨文公司开发的专有对象关系型数据库管理系统，被认为是最完整的系统之一。在竞争对手出现之前，它在企业服务器市场几乎占据主导地位。它是跨平台的，而且最新版本的Oracle已通过认证可以在GNU/Linux下运行。

    - MySQL：这是由甲骨文公司基于双重GPL/商业许可开发的关系数据库管理系统，被认为是世界上最流行的开源数据库，与Oracle和Microsoft SQL
    Server一起，也是总体上最受欢迎的数据库之一，尤其适用于网络开发环境。

    - PostgreSQL：这是一个免费的面向对象关系数据库管理系统。与许多其他开源项目一样，PostgreSQL的开发不是由一家公司或一个人管理，而是由一群无私、利他、自由工作或得到商业组织支持的开发者社区领导。

    - SQLite：这是一个包含在用C语言编写的小型库中的关系数据库管理系统。它是一个公共领域项目，与其他使用客户端-服务器架构的系统不同，它的引擎不是一个独立的进程，而是通过与程序链接成为其组成部分。然而，不要被其表象迷惑，因为尽管它看起来像是一个简单的解决方案，但SQLite的第三个版本允许数据库大小达到2太字节，并具有许多其他功能。简而言之，它的配置非常简单，简单到几乎不存在，因此不会引起问题，并且是本课程的最佳解决方案。


    如你所见，我们找到了许多关系型DBMS。在Python中，每种DBMS都有免费的模块和连接器程序，用于在数据库和编程语言之间进行通信。尽管它们是不同的系统，但查询语言差异不大。否则，从一个系统迁移到另一个系统将会很困难，DBMS之间也无法相互竞争。


    除了像Python这样专注于创建程序的编程语言外，DBMS还实现了自己的语法或语言，用于对其记录进行查询和修改。关系型数据库中最常用的语言是SQL（结构化查询语言），如果我们想在程序中使用这类数据库，就必须学习它。显然，这门语言涵盖的内容很多，因此在本单元中，我们将只学习一些基本查询，以便在Python脚本中与SQLite结合使用。虽然本章将重点介绍如何使用Python处理SQLite数据库文件中的数据，但许多操作使用名为“Database
