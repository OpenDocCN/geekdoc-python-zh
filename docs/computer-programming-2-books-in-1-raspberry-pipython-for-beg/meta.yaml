- md: '## Databases


    A database is a file that is organized to store data. Most databases are organized
    like a dictionary in that they are mapped from keys to values. The biggest difference
    is that the database is on disk (or other permanent storage), so it persists after
    the program ends. Because a database is stored in permanent storage, it can store
    much more data than a dictionary, which is limited to the size of memory on the
    computer.


    Like a dictionary, database software is designed to keep data entry and access
    very fast, even for large amounts of data. The database software maintains its
    performance by creating indexes as data is added to allow the computer to quickly
    jump to a particular entry.


    ## Database Peculiarities


    However, the types of data and the way they are stored can differ greatly depending
    on the context exactly, and that is why, over time, a number of different models
    have been developed to manage databases.


    - Hierarchical: The data that is organized in the form of an inverted tree uses
    a model where a parent node of information can have several children.

    - Network: An improvement of the hierarchical model that allows a child to have
    multiple parents.

    - Transactional: Whose sole purpose is the sending and receiving of data at high
    speeds. These bases are very rare.

    - Relational: This is the model used today to represent real problems and manage
    data dynamically. It''s the one we''re going to focus on, but there are others.

    - Documentaries: They allow us to save full text, and in general, to carry out
    more powerful searches. They serve to store large volumes of historical background
    information. Together with the relational ones, they are the most used in web
    development.

    - Object-oriented: This model is quite recent and typical of object-oriented computer
    models, where it is about storing complete objects in the database. It is possible
    that it will take on more importance in the future.

    - Deductives: They are databases that allow deductions. They are mainly based
    on rules and facts that are stored in the database, so they are somewhat complex.


    Relational databases are widely used today because it is easy to represent and
    manage real-world problems. They are based on the idea of creating relationships
    between data sets, in which each relationship is also a table. Each table consists
    of records, made up of rows and columns, also known as tuples and fields. Obviously,
    within relational databases, there are many DBMS. Most are also compatible with
    Python. Some are paid, others free, some are simple, and others are very advanced.
    Let''s do a review:


    - SQL Server: It is a relational model database management system developed by
    Microsoft and only available for Windows systems. It is proprietary and a direct
    competitor of Oracle, MySQL, and PostgreSQL.

    - Oracle: This database is a proprietary object-relational type database management
    system, developed by Oracle Corporation, considered one of the most complete systems.
    Its dominance in the enterprise server market was almost total until the appearance
    of the competition. It is multiplatform, and also the latest versions of Oracle
    have been certified to work under GNU/Linux.

    - MySQL: It is a relational database management system developed under dual GPL/Commercial
    license by Oracle Corporation and is considered the most popular open-source database
    in the world, and one of the most popular in general together with Oracle and
    Microsoft SQL Server, especially for web development environments.

    - PostgreSQL: It is a free object-oriented relational database management system.
    Like many other open-source projects, PostgreSQL development is not managed by
    one company or person but is led by a community of developers who work selflessly,
    altruistically, freely, or supported by commercial organizations.

    - SQLite: It is a relational database management system contained in a small library
    written in C. It is a public domain project, and unlike the other systems that
    use the client-server architecture, its engine is not an independent process,
    but rather it links with the program by becoming an integral part of it. However,
    do not be fooled, because although it seems like the simple solution, SQLite in
    its third version allows databases of up to 2 Terabytes in size and many other
    functionalities. In short, its configuration is very simple, so simple that it
    does not exist, so it will not cause problems, and it is the best solution for
    this course.


    As you can see, we find many Relational DBMS. In Python, each of them have free
    modules and connector programs to communicate the databases and the programming
    language. Even though they are different systems, the query language does not
    vary much. Otherwise, it would be difficult to go from one system to another,
    and the DBMS could not compete with each other.


    Apart from programming languages such as Python, focused on the creation of programs,
    DBMS implement their own syntax or language to make queries and modifications
    to their registers. The most used language in relational databases is SQL (Structured
    Query Language), and it is necessary to learn it if we want to use this type of
    database in our programs. Obviously, this language covers a lot, so in this unit,
    we will only see some basic queries to use in conjunction with SQLite in our Python
    scripts. While this chapter will focus on using Python to work with data in SQLite
    database files, many operations can be more conveniently performed using the software
    called Database Browser for SQLite, which is freely available at:

    http://sqlitebrowser.org/


    With the browser, you can easily create tables, insert data, edit data, or run
    simple SQL queries. In a sense, the database browser is similar to a text editor
    when working with text files. When you want to perform one or very few operations
    on a text file, you can open it in a text editor and make the changes you want.
    When you have many changes to make to, you will often write a simple Python program.
    You will find the same pattern when working with databases. You will do simple
    operations in the database manager, and more complex operations will be performed
    more conveniently in Python.


    ## Creating a Database Table


    When you first look at a database, it looks like a spreadsheet with multiple sheets.
    The main data structures in a database are tables, rows, and columns. In technical
    descriptions of relational databases, the concepts of the table, row, and column
    are more formally called relation, tuple, and attribute, respectively. We will
    use less formal terms in this chapter.


    Databases require a more defined structure than Python lists or dictionaries.
    When we create a table in the database, we must tell the database in advance the
    names of each of the columns in the table and the data type for each column.'
