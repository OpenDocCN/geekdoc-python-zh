    \ don't have Python, you can install it with a package manager. Your system can\
    \ even come with Django.\n\n```\nssh root@example.com\nwget http://www.djangoproject.com/download/1.3.1/tarball/\n\
    tar xzvf Django-1.3.1.tar.gz\ncd Django-1.3.1\npython setup.py install\n```\n\n\
    Once you have Django installed on your server, upload the site you just created\
