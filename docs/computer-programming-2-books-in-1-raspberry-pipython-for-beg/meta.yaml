    - 它是多平台的，适用于所有类型的系统和设备。

    - 它对所有程序员来说都易于理解。编写Python代码的方式整洁干净，因此任何人都能理解并处理你创建的结构。

    - 它具有灵活的风格。使用Python Web，你可以创建多种元素，从列表到更复杂的功能。

    - 它拥有健康的编程风格。Python Web的设计遵循特定规则，以确保每个人都遵循相同的准则。


    ## Python的Web框架


    Web框架是一组组件，能帮助你更轻松、更快速地开发网站。当你构建一个网站时，你总是需要一组类似的组件：一种处理用户认证（注册、登录、注销）的方式、一个网站管理面板、表单、一种文件上传方式等等。幸运的是，其他开发者很久以前就意识到，在构建网站时他们总是面临相同的问题，因此他们联合起来，构建了带有现成组件的框架（例如Django）。这些框架的作用在于，我们不必每次都重新发明轮子，并且在构建新网站时可以更快地推进。


    要理解框架的真正用途，我们需要了解服务器的工作原理。首先，服务器需要知道你想要一个网页来为你服务。想象一个邮箱（端口），有人不断地在里面寻找来信（请求）。这就是Web服务器的工作。Web服务器读取信件并向网页发送响应。但要发送内容，我们必须有一些内容。而框架帮助我们创建这些内容。当一个请求到达Web服务器时，它会被传递给框架，框架会尝试弄清楚实际请求的是什么。首先获取一个网站地址，并尝试弄清楚如何处理它。这部分由我们框架的URL解析器完成（注意，网站地址被称为URL
    - 统一资源定位符，所以URL解析器这个名字很合理）。这个解析器并不十分智能——它接收一个模式列表并尝试匹配URL。框架从上到下检查这些模式，如果匹配成功，它会将请求传递给关联的函数（称为视图）。想象一个邮递员拿着一封信。他沿着街道走，检查每个门牌号是否与信上的地址匹配。如果匹配，他就把信留在那里。


    所有酷炫的功能都在视图函数中完成：我们可以查询数据库以查找某些信息。也许用户要求更改数据中的某些内容，比如一封信说：“请更改我的工作描述。”视图可以检查你是否有权限执行此操作，更新你的工作描述，并返回一条消息：“完成！”然后视图生成一个响应，Django可以将其发送到用户的浏览器。这个描述有点简单化，但目前，你不需要了解所有技术细节。有一个大致的概念就足够了。


    市面上有不少Python Web框架，但以下是一些最好的：


    - Django：Django是一个高级Web框架，能够快速开发安全且可维护的网站。由经验丰富的程序员开发，Django处理了Web开发中的许多复杂问题，因此你可以专注于编写应用程序，而无需重新发明轮子。它是免费且开源的，拥有一个活跃且繁荣的社区、优秀的文档以及许多免费和付费的支持选项。

    - Grok：Grok，其作者定义为一个为Python开发者打造的Web应用程序框架。它面向初学者和专家。Grok旨在用于敏捷开发。这个框架源自著名的[Zope](https://www.zope.dev/)，它是Web环境中应用服务器领域的资深成员，其中使用了Zope
    Toolkit，这是一组专门面向Web环境中组件重用的面向对象库。

    - Webpy：这是由Aaron Swartz编写的软件，用于使用Python创建动态网站。它是在我参与reddit.com工作期间正式发布的（后来使用其他工具重写）。“简单而强大”，“它是反框架的框架。web.py不会妨碍你”；这是其官方网站webpy.org上宣传的一些特点和观点。它属于公共领域，因此可以应用于任何类型的项目开发。

    - Turbogears：TurboGears是一个Python Web应用程序框架，由各种WSGI组件组成，如WebOb、SQLAlchemy、Genshi和Repoze。TurboGears围绕模型-视图-控制器（MVC）架构设计，与Struts或Ruby
    on Rails非常相似，旨在使Python中的快速Web应用程序开发更容易且更易于维护。自2.3版本以来，该框架还提供了“最小模式”，使其可以作为微框架用于不需要或不希望使用完整栈的环境。


    ## 使用Django


    我们将重点介绍在Django框架中进行Python Web开发，因为这有助于你编写以下特点的软件：


    - 功能齐全：Django遵循“开箱即用”的理念，提供了开发者希望它“开箱即用”的几乎所有功能。你只需要一个单一“产品”的一部分，所有东西都能完美运行，遵循一致的设计原则，并拥有广泛且[更新的文档](https://docs.djangoproject.com/)。

    - 用途广泛：Django可以（并且已经被）用于构建几乎任何类型的网站——从内容管理系统和维基到社交媒体和新闻网站。它可以与客户端的任何框架配合使用，并且可以以几乎任何格式（包括HTML、RSS订阅源、JSON、XML等）返回内容。你当前阅读的网站就是基于Django构建的！虽然它提供了几乎任何你想要的功能选项（不同的数据库引擎、模板引擎等），但如果需要，它可以扩展以使用其他组件。

    - 安全可靠：Django通过提供一个旨在“做正确的事”以自动保护网站的框架，帮助开发者避免一些常见的安全错误。例如，Django提供了一种安全的方式来管理用户账户和密码，从而避免了将会话信息放在容易受到攻击的cookie中的常见错误（相反，cookie只包含一个密钥，数据存储在数据库中）或密码直接以密码哈希形式存储。Django默认允许防范一些漏洞，包括SQL注入、跨站脚本攻击、跨站请求伪造和点击劫持。

    - 可扩展：Django使用基于“无共享”架构的组件（架构的每个部分都独立于其他部分，因此可以在必要时进行替换或更改）。考虑到不同部分之间的清晰分离，意味着你可以通过在任何级别添加硬件来扩展以增加流量：缓存服务器、数据库服务器或应用程序服务器。一些最繁忙的网站已经扩展了Django以满足他们的需求（例如，Instagram和Disqus，仅举两例）。

    - 易于维护：Django代码使用设计原则和模式编写，以鼓励创建可维护和可重用的代码。它使用“不要重复自己”（DRY）原则，因此没有不必要的重复，减少了代码量。Django还鼓励将相关功能分组到可重用的“应用程序”中，并在较低级别将相关代码分组到模块中（遵循模型视图控制器（MVC）模式）。

    - 可移植：Django用Python编写，Python可以在许多平台上运行。这意味着你不受任何特定平台的束缚，可以在Linux、Windows和Mac OS
    X发行版上运行你的应用程序。此外，Django受到许多网络托管提供商的支持，他们通常提供特定的基础设施和文档来托管Django网站。


    ## Django的起源


    Django最初是在2003年至2005年间由一个负责创建和维护报纸的团队开发的'
