  mdcn: "如果你保存并刷新页面，应该会看到页面已更新为这个新内容。下一步是从数据库添加动态内容。为此，Django 提供了一种模板语言，允许你使用花括号插入变量。将页面的中间部分修改如下：\n\
    \n```html\n<div class=\"container\">\n    <h1>First Blog</h1>\n    <h2>{{title}}</h2>\n\
    \    <h3>Posted on {{date}} by {{author}}</h3>\n    <p>{{body}}</p>\n</div>\n\
    ```\n\n然后，我们可以从 `views.py` 文件向这些变量占位符传递值，创建一个值字典。\n\n```python\nfrom django.shortcuts\
    \ import render_to_response\nfrom Blog.models import posts\n\ndef home(request):\n\
    \    content = {\n        'title': 'My First Post',\n        'author': 'Giles',\n\
    \        'date': '18th September 2011',\n        'body': 'Lorem ipsum dolor sit\
    \ amet, consectetur adipiscing elit. Etiam cursus tempus dui, ut vulputate nisl\
    \ eleifend eget. Aenean justo felis, dapibus quis vulputate at, porta et pain.\
    \ Praesent enim libero, malesuada nec vestibulum vitae, fermentum nec ligula.\
    \ Etiam eget convallis turpis. Donec non sem fair.',\n    }\n    return render_to_response('index.html',\
    \ content)\n```\n\n保存并更新，你应该会看到你现在正在从视图文件向模板传递内容。最后一步是从我们的数据库获取数据并传递过来。幸运的是，我们可以使用\
    \ Django 的模型来完成所有这些操作，而无需编写 SQL 查询。我们需要将我们的 Blog 应用添加到 First Blog 项目中，并更改其他设置。转到第\
    \ 112 行的 `INSTALLED_APPS`，在列表中添加 `'FirstBlog.blog'`，然后修改 `views.py` 以从数据库添加数据。\n\
    \n```python\nfrom django.shortcuts import render_to_response\nfrom Blog.models\
    \ import posts\n\ndef home(request):\n    entries = posts.objects.all()[:10]\n\
    \    return render_to_response('index.html', {'posts': entries})\n```\n\n然后更新模板以访问这些信息。\n\
    \n```html\n<div class=\"container\">\n    <h1>First Blog</h1>\n    <hr />\n  \
    \  {% for post in posts %}\n    <div class=\"post\">\n        <h2>{{post.title}}</h2>\n\
    \        <h3>Posted on {{post.timestamp}} by {{post.author}}</h3>\n        <p>{{post.bodytext}}</p>\n\
    \    </div>\n    <hr />\n    {% endfor %}\n</div>\n```\n\n在这里，我们可以在 `views.py`\
    \ 文件中访问表中的所有数据，然后只选择前十个条目。我们将这些数据传递给模板，遍历输入项，并使用我们网站的 HTML 显示数据。这还不会生效，因为数据库中没有任何内容。停止服务器并运行：\n\
    \n```\npython2.6 manage.py syncdb\n```\n\n这将为我们的文章在数据库中添加新表。然后打开一个新标签页并输入：\n\n\
    ```\nMySQL -u root –p\n```\n\n输入你的密码，按回车键，然后运行：\n\n```sql\nINSERT INTO blog_posts\
    \ (author, title, bodytext) values ('Bob', 'Hello World', 'Lorem Ipsum');\n```\n\
    \n返回之前的标签页并再次运行服务器。刷新页面，你应该会看到一篇包含你刚刚添加的虚构内容的博客文章。如果你再运行几次 MySQL 命令，刷新页面时应该会看到更多文章出现。\n\
    \n## Django 管理系统\n\n我们需要做的最后一件事是查看 Django 管理系统。这是 Django 中一个强大的功能，允许你无需编写更多代码即可管理你的网站，就像从头开始构建网站一样。要启用它，我们需要更改一些设置。首先，在\
    \ `urls.py` 中取消第 4、5、13 和 16 行的注释，以便你可以访问管理页面。\n\n然后转到 `settings.py` 中的 `INSTALLED_APPS`\
    \ 部分，删除 `'django.contrib.admin'` 和 `'django.contrib.admindocs'` 的注释。为了允许管理员控制他的发布表，在\
    \ Blog 文件夹中创建一个名为 `admin.py` 的新文件，并添加以下几行：\n\n```python\nfrom django.contrib import\
    \ admin\nfrom Blog.models import posts\n\nadmin.site.register(posts)\n```\n\n\
    再次运行 `python2.6 manage.py syncdb` 以添加管理部分的表并重启服务器。如果你现在在浏览器中访问 `127.0.0.1:8000/admin`，你应该会看到一个登录页面。\n\
    \n使用你之前运行 `syncdb` 命令时选择的详细信息登录。你应该会看到一个名为 Blog 的部分，其中有一个发布表的标题。你可以使用这个简单的界面来创建、编辑和删除博客文章。这就是你需要做的全部。你刚刚创建了一个功能齐全但简单的博客。为了结束本课，我们将看看如何在\
    \ Web 服务器上安装 Django。\n\n## 在 Web 服务器上安装\n\n大多数 Web 服务器使用 CGI 运行各种语言的脚本。Django\
    \ 可以在 FastCGI 上运行，理论上也可以在 CGI 上运行，但这不是官方支持的，并且对于真正的生产网站来说速度太慢。你需要检查它们是否已安装。它们通常位于诸如“CGI\
    \ 和脚本语言支持”之类的标题下。\n\n如果你有 VPS 托管，或者幸运地拥有专用服务器，你的生活会轻松得多。这些通常预装了 Python，从那里，你只需要遵循我们之前在本地运行\
    \ Django 副本的相同步骤。如果你没有 Python，你可以使用包管理器安装它。你的系统甚至可能自带 Django。\n\n```\nssh root@example.com\n\
    wget http://www.djangoproject.com/download/1.3.1/tarball/\ntar xzvf Django-1.3.1.tar.gz\n\
    cd Django-1.3.1\npython setup.py install\n```\n\n一旦你在服务器上安装了 Django，使用任何文件传输客户端上传你刚刚创建的网站。你可以将文件放在任何地方，但要将它们放在\
    \ `public` 文件夹之外，否则任何人都可以查看你网站的源代码。我将所有项目放在 `/home` 目录下。\n\n接下来，在你的服务器上创建一个名为\
    \ `'firstblog'` 的 MySQL 数据库，并再次运行 `syncdb`。你需要为管理控制面板重新创建你的账户，但这是一次性的操作。如果你尝试运行此操作，可能会收到错误，这是因为服务器的设置与你的本地计算机不同。你可能需要在\
    \ `settings.py` 中更改数据库密码，但根据你的服务器配置，你可能还会遇到其他问题。Google 是你的朋友！\n\n这次运行服务器的命令略有不同。你必须指定一个\
    \ IP 地址和一个端口，以便你可以通过互联网访问该网站。\n\n```\npython manage.py runserver 0.0.0.0:8000\n\
    ```\n\n如果你在 Web 浏览器中访问你的网站，端口为 8000，你应该会看到你的网站！\n\n## 结语\n\n在计算机行业中，一种被称为自由软件的现象正在获得影响力。这是一场宣称访问程序源代码的运动，该程序承认可以自由使用、执行、分发和修改。换句话说，在此概念下创建的新软件可用于任何目的，在任何环境中运行，由用户自行决定分发，并在必要时进行修改。编程语言是构建程序的基本工具，就像农民的砍刀和锄头，建筑工人的镐和铲子一样。Python\
    \ 由于其简单性和专注于当前问题的能力，在自由软件、科学软件和教育软件等社区中赢得了追随者。\n\n虽然本书并非面向专业程序员，但专业水平的编程可以带来回报，无论是经济上还是个人方面。为他人创建有用、优雅且智能的程序是一项非常有创造性的活动。你的计算机或个人数字助理通常包含许多属于不同程序员群体的不同程序，他们都在争夺你的注意力和兴趣。他们都尽力适应你的需求，并为你提供满意的用户体验。有时当你选择某个软件时，其程序员会因你的选择而直接获得回报。\n\
    \n同样，编写程序是一项富有创造性和回报的活动。你可以出于多种原因编写程序，从积极参与解决复杂的数据分析问题，到为了乐趣而帮助他人解决难题。本书假设每个人都需要知道如何编程，并且一旦你学会编程，你就会发现你想用这些新获得的技能做什么。Python\
    \ 是每个人都应该知道的语言。它直接明了，简单的语法，动态"
