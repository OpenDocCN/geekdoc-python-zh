- md: '## 《卷五》

    ### 財運篇


    亂了，過去的原則到此全部推翻，偶爾也會异想天開，出奇致勝。外境對忌的作用是間接的，因為只是斜照進入事業、人際關係、財宮諸宮，或多或少的沖激，仍然存在。


    二


    □庚午年走的是大限合伙位，太陽祿從子女照田宅，這個田宅也是大限的財官；流祿在流年福德宫，因此流年事業宫為雙祿（太陽、太陰）夾輔。應可從事長期性的生產事業。惟流年天同忌進入大限命宫，引動大限忌星（巨門），雙羊雙陀照射，看來凶多吉少。此外，還表示什麼？


    從籌思這個計劃以來，事情總是一波三折，歷經數次折騰，對方好不容易才答應簽約，我回美后再度檢討計劃，做了一些可行的研究，自我質疑，也自我釋疑，始終未能接到他們
    ok, go ahead 的 sign，大限命宫坐歲運雙忌、會雙羊雙陀，不過遷移宫見雙祿馬交馳，往外發展應該可行，此說是否可信？


    □過分執着歲運祿忌和歲运宫位的關系，事情的真相反而變得模糊不清，大大减低斗數推論的功能。譬如太陽祿（庚午年化出）跑到酉宫與太陰祿（大限化出）夾輔庚午年的事業宫（在戌），以及歲運雙忌同宫，其實是可以不必如此大費周章的。


    此年的吉凶消長，不妨分兩個方面來說。


    （一）祿在卯、忌在丑，均與流年無關，而與大限有關，吉凶顯然只凸顯在五十五歲以后的延續行業，新業做起來就比較力不從心。


    ### （二）天同忌所在正好是大限命宫，合伙宫化出一个表示阻碍、干扰的星曜进入命宫，不就暗示对方把烫手山芋丢过来给我吗～在这种状况之下，所有的计划就不能太一厢情愿了。卯宫是大限的福德位，若能真诚合作，他们助我取财，利润还是有的；合作不成，其他免谈。


    理論上說，庚午年的環境十分壯觀，諸事可以一蹴而就，但別忘了與人磋商，至少還有一個別人，不能堅持我的運好，萬事如意，因為對方一個猶豫，就會泡湯。這類牽涉外境的推論，往往只能推到一個約略的程度，然後看對方如何反應，再來調整自己的步伐；無法斬釘截鐵，完全肯定，我們實在無法完全掌握所有的外境。


    □辛未年祿權照耀，大限命宫也就是流年遷移宫终于見祿權與流年祿存，福德兼大限財官也有祿存在焉，形成雙祿交馳并引動火陀吉格；此外，大限巨門由忌轉祿并照入天同權，呈現一片喜氣洋洋的美麗景象。只不過流年三方偏逢空劫，乃吉處藏凶之局；文昌化忌進入流年田宅并照射大限田宅，如此歲运田宅交叉見忌的情形，是否表示嚴重的破財現象～或只是住所異動（我必須前往印尼主持公司，似已預知此事）或者賺到的錢留不住（我要繼續擴張投資）～這點我一直耿耿于懷。


    □辛未年祿星在丑，這個丑是大限命宫、流年遷移宮的重叠，大小環境見吉，不再是去年那般模樣了，新業舊業到此年終於有了生機。大限命宫見祿穩定，舊業可行；流年見祿外出得利。


    忌星不入歲运宮位，壞事與我無關，但是忌入歲运的田宅看來仍然有關，也許經常出門，四海為家。行運中的田宅宮又稱財庫，藉以觀察庫存（財務結構）的虛實，歲运均算，只不過流年一縱即逝，原則應以大限為準。商人庫破，資金不足，不宜進行大型投資，以免周轉不靈，導致長牢，血本無歸。


    三


    □丙子大限天同這個祿進入了丁丑大限的命宮，顯示舊業仍然大有可為，是否如此？


    不過廉貞忌進入本限正好官，這也是先天事業宫，妻與事業遭沖，各有哪些作用？


    因此限量多且雜，廉貞忌牽動事業，一步動运，歸隱林泉，頤養天年的美夢不易成真。


    動运的吉凶仍要斟酌祿忌牽引的所在，此去見忌而不見祿，凶多吉少，不言可喻。祿星在丑，這是父母宫，意義不大；照入健康宮位，體能增強，氣勢仍然如虹，老而彌堅。這個丑宫正是前進的命宫，延續行業越來越篤定。廉貞忌對誰發揮破壞的作用？答案是這步大限新創的事業。顯而易見，趨吉避凶的不二法門無非是延續舊業而不要新創。


    忌星進入先天宮位，干擾的層面不大，最多是內心徬徨，眼前的事拿不定主意，忌從妻官沖擊事業，破壞事業的均勢，這才是重點。


    □在我的意識里，若無法在丁丑大限內解決分割的問題，利字所在，处理起来，千头万绪，非外人所能想象。我认为能在印尼投资，就是解决此一问题的最佳办法，不知能否顺利完成。


    屆時只好高唱『歸去來辭』，這是我對晚景的看法。我有不得已的苦衷，非得在最近兩年內解決臺灣的事業不可，這其間還牽涉兄弟財產。


    □丁丑和丙寅，甚至乙亥、甲戌这些大限都是动运，命理环境跟现实环境内外呼应，故动者恒动、静者恒静。刚才说过，随遁的机率不高，结果竟然隐遁，或受迫于某些情境，不得不为之，当然是可能的，但是内心澎湃，懊恼兼鬱卒，无日无之，日子必不好过。


    丁丑大限的事业受祿牵动，成功率高，可以创新；此路不通，不妨另辟蹊径。也许有人会问：『祿遇空劫』乃祿逢冲破也，吉处藏凶，还指望马到成功吗？『祿遇空劫』吉意打个折扣是免不了的，但毕竟仍有祿的内涵在，不一定藏凶；因为其中缺乏凶的诱因，这跟祿忌交替的情况不同。所以宁愿见祿逢空而不愿见忌逢空，盖空劫对忌的破坏不可能负负得正。前面提到事业『祿马空劫』传统也认为这样的结构必须波动，主动出击，动才有利。不动则什么都不发生，不一定肇凶。


    就流年而言，历庚午、辛未到壬申这些年份的祿星都跟大限宫位有关，投资案可能着手进行。套句术语，这是一个『好的开始』。


    后记：李先生印尼的投资案最后未成，黯然返美。


    ### 花開并蒂


    □紫貪坐命主有雙重性格，古籍的說法是因爲貪狼不克紫微土，五行相克，天人交戰；內心不安，思想矛盾，該說頗爲可信，我確有這種情形。但是火星照入之后，一來火貪自成一格，一來木生火，火生土，木貪生忘克，從此得以化解，此說是否可信？


    □斗數星曜有無五行屬性？許多學者堅持有，我尊重他們的看法。我們一直不用五行生克制化，因爲那是八字的理論，斗數何干：我們不太了解諸星的屬性，推算時根本不考慮五行的生克制化。


    □算命先生看出我有兩個母親（母親是父親前偶后再娶的對象），實在有夠厲害，簡直嚇死人了。我問他是怎么看的，是否跟巨門坐父母宮刑克重有點關系，他說最大的關鍵是會到忌星，看到你的書（《斗數疑難一百問答》）才覺得他是猜的，問題是爲什么猜得那么準？


    我再強調他是猜到的，難免有人我嫉妒人，才說風凉話。此事事實不難辦證；如果他依據的不過是斗數命盤，那么依照邏輯推理，同命者一律擁有有兩個媽媽，你相信嗎？類似的際遇經常發生，恍惚之間，還以爲碰到了一個地仙。現代人不再像古人那樣不求甚解的，凡事都要追根究底，再玄再妙，一旦無法自圓其說，想讓人相信也難。


    | 己巳 | 庚午 | 辛未 | 壬申 |

    | :--- | :--- | :--- | :--- |

    | 武曲、破軍、火星 | 太陰、昌業、文曲 | 天鉞、天府、天鈴 | 文曲 |

    | 戊辰 | 甲午<br>一九五四年12月×日辰時 | 癸酉命宮 | 丁卯 |

    | 廉貞、七殺、羅魁、陀羅 | 天食 | 丙子 | 乙亥 |


    命宫强旺，承担力强，虽然比柔弱的人多一分达的条件，时来运转，功成名就，不在话下：命理调这种观念，系站在务实的角度，希望所有的推论够密切契合现实的社會。


    祿在事业，明示一生奋斗的重心在此，暗示他野心旺盛（煞星多照也有关系），不太可能就此耽于逸，过好日子。


    「我是五專電機科畢業，退伍后換了兩三個工作，待最久的是一家電腦裝配廠，四廠，戊辰年才出來創業。請問：我這個命究竟適合任職還是自創」


    「結構強旺的人得以承擔重任，『君臣慶會』是錦上添花，讓老兄擁有領導統御的能力，可成大事，榮華富貴，比一般升斗小民容易獲得。


    羊、火陀『威權出衆』，迅速出頭。君臣慶會則能掌握權柄，進入權力的核心。這些格局仍以專業技術或特殊技藝為適性，若無專長，成就仍不會太高。


    「廉貞祿進入事業宮，該星原爲官祿主，是否暗示我可能獲得一官半職」


    「祿星有穩定的作用，並成爲一生努力的重心，祿在事業，企圖心強，希望經營事業，科班出身，顯然擁有專長，成就必高，可以從事制造、加工等業，只要適性。


    可——上班可以不必要負擔成敗，自營則要。


    二


    「戊辰年中跟幾個朋友合開了一家公司，我出資最多，也最內行，所以被舉爲董事長，我們專替一家外銷公司做配件組合，營運狀況不錯，這兩年想擴充營業，生怕景氣不好，賺來的錢被吃掉，十分擔心，股東之間意見紛紜，無所適從，我的運程軌跡看，該不該做」若要擴充，何時進行較吉


    「丙子大限是一步極佳的運程，事業見祿（天同），俗稱走事業運，此去十年當可盡情揮灑，從事重大的開創與革新。其中丁卯年、庚午年、辛未年和壬申都是吉年，多一分冲刺，多一分收穫，癸酉年以后運勢轉下，最好量入為出。


    廉貞忌在戌，乃大限父母宮，與本人無關而與合伙人有關，因為正好是他們的財宮，表示投資別人（純投資），可能遭到拖累。原則上說，祿在三方，自己做才能獲利。


    □壬申年事業宮的關係密不密切～就事業而言，堪稱花開并蒂。


