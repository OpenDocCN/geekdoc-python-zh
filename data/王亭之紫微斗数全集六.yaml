    □放心，正統斗數没有那種說法。


    事業宮逢忌，事業的經營有一種不安定感，老是揮不去，先天所成，非人力可回天；只有從事本質波動、越動越有利的行業，才能免灾，譬如工程設計、藝術創作，個性發揮，可望轉敗為勝，一般行政業務與命理性格嚴重冲突，不做得怨天尤人者幾希。


