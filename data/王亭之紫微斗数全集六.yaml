    # 三、斗數中的五行生克：


    在一般門類的術數中，『五行生克』這一概念不可忽視。往往起着主導性的作用。而獨有紫微斗數于五行生克不大重視。即不以五行生克作為主要依據。但也並不是一點作用也沒有。如


    圖二在某些反格的成格條件里，五行生克起着畫龍點睛的作用。當然，這些情況不常碰到，下面舉例說明：


