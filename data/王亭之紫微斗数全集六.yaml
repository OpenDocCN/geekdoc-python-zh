    \ 庚申 |\n| 贪狼忌 | 癸卯八月×日辰时一九六三年 | 辛酉天同 |\n| 地劫右弼太阴 | 乙卯武曲 |\n| 铃星紫微天府 | 擎羊火星天机 |\
    \ 破军禄 | 太阳左辅陀罗 |\n| 甲寅 | 乙丑 | 甲子 | 癸亥 |\n\n> 巨日加煞本来就十分突出，其中的煞星可能构成异格，倾向异路功名，意思是运用超人的智慧，过人的毅力，迂回以进，仍能致富致贵。这种人通常也自信可以不依循正常管道，达到追逐名利的目的。\n\
    > \n> 如果聪明过度，就会异想天开，旁门左道，不择手段，事态变得疑重。大事业家如果作奸犯科，危害社会，无疑也将是一流的，俗话说“贼仔状元才”，就是这个意思。\n\
    \n从事的行业若像造型设计（包括所有的艺术创作）、电脑程式设计、新闻采访、律师、外科医生，都算适性，服装设计当然也算在内，在波动、不安定中安身立命，比较笃定。自行创业仍以上述行业为准，武市比门市吉，不妨多角化经营，门市兼武市；技术服务业由于具有独占性，比较不受经济景气影响。\n\
    \n□古今中外的命学无不强调必须走到佳运，才能发达，那么我的事业佳运约在何时？\n人在逆境中也能发达，只不过做得比较艰辛罢了。最佳事业运在丁巳、戊午两限，缘于禄星分别照入事业宫，有关的事业、学业发展，一帆风顺；只是当时年纪小，好运的实质效果不显，最多庇荫读书顺利，名列前茅。往后不再走到类似的好运，遇到的只是次好运，那是四十五岁起的辛酉大限，巨门禄斜照进入事业，仍会开花结果，把握良机，前途一片亮丽。这个命难得的是，一生不见破事业之运，事业发展不虞受阻，在执掌与经营上，可以高枕无忧。\n\
    \n□这步己未大限煞星照入很多，诸煞将形成一种怎样的恶性环境，带来怎样的灾难。\n己未大限机月同梁，安定中进步；煞星多照，环境驳杂。有关的吉凶分布，仍要斟酌禄与忌牵引的方向。\n\
    \n# (一) 武曲禄在戌，乃大限田宅，财库充实，赚进来的钱存起来；九只牛都拉不出；该禄冲照子女宫，亲子感情已增。生意人财库兴旺，可望累积大笔财富。\n#\
    \ (二) 文曲忌在申，父母宫也，与长亲的感情时逢低潮，并生龃龉；另冲健康宫位，体能起伏大，常感心力绌。\n\n□我虽有扩充甚至改变经营方式的打算，但并非迫切，也许一两年后，请帮我看看哪年的运气较佳，让我心里有个谱。\n\
    □癸酉年：破军禄在子，大限合伙宫也是流年田宅宫，禄在别人处，图利他人而已。贪狼忌在辰，大限子女宫，亲子感情忽然有了阻隔，不知何故。岁运宫位未受牵引，是个静年，没什么重大事项发生。\n\
    甲戌年：廉贞禄在午，大限兄弟宫兼流年财宫，可能在别人无意的指点下得财，而临时的求财行为也能获财；太阳忌在亥，乃大限事业宫，延续行业不佳，在今年可能被强迫做一些改变。\n\
    乙亥年：天机禄在丑，大限迁移宫也是流年福德宫，并照入后者的财宫，外缘大好，出外得利。太阴忌在卯，大限的财宫，旧业此年进帐不顺，有浪费、损财（亏本）等象；这也是流年事业宫，此年新创，是个『坏的开始』，大忌。\n\
    丙子年：天同禄在酉，大限福德宫并照财宫，是二十五岁以来财源最好的一年，旧业得财，亲子感情今年增长不少；惟廉贞忌在午，大限兄弟宫也，有兄弟败财的不祥徵兆。\n\
    \n二\n□这辈子哪个运的财势最好？是庚申事业见禄，还是辛酉禄进财宫？\n□庚申大限事业宫的禄只是先天禄，在后天的运程中不用——改用大限化出的太阳禄。庚申大限的禄（太阳）忌（天同）均未牵引财福二宫，静运一个，意思是说，此去的财物支配只维持一个平常的状态。辛酉大限禄（巨门）在财宫，就是世俗盛赞的财运，进财顺畅，也能享受财福，这是此生所能遇到的最佳财运。\n\
    \n□遇到破财运时，可不可能顷刻间败得一无所有？\n□这种命受到先天结构的限制，不会横发，发得跟环亚财团总裁郑绵绵平起平坐，当然也不会横败，败得倾家荡产，必须托钵维生。惊天动地的破财运没有，微破却是存在的，那是五十五岁以后的壬戌大限，武曲忌自坐，然后斜照进入财宫，造成财物微损，生意人受创大，即使不刻意求财，也会因为开支略大，手头时常拮据。\n\
    \n□算命的目的不外趋吉避凶，找出灾难发生的位置和年限，早做预防，可免到时手忙脚乱，依命盘显示，我什么时候会见血光？\n□血光之灾大概包括车祸、开刀、身体残伤等等，遗憾的是这些属于个人的独立事项，非共盘所能窥破，因此答案是『不知道』。在此，只能隐约掌握到一点健康方面的信息，那就是从戊午到庚申的三十年内，忌星都在干扰健康宫位，多少影响体能的正常发展。\n\
    （一）戊午大限：天机化忌在丑，这个丑正是健康之宫。\n\n|  | 天钺 | 天梁 | 七杀 | 左辅 |\n|---|---|---|---|---|\n\
    | 乙巳 | 丙午 | 丁未 命宮 | 戊申 |\n| 巨门 | 壬辰 五月×日亥時 | 一九五二年 | 铃星 |\n| 甲辰 | 癸卯 | 天文贪狼 紫微曲魁\
    \ | 地劫陀罗同 |\n| 庚戌 32-41 |  |  |  |\n| 太阴 | 天机 | 天府 | 太阳 | 擎羊 |\n| 壬寅 | 癸丑 | 壬子\
    \ | 辛亥 |\n| 文昌破军武曲忌 |\n\n之所以要惨淡经营，关键不在杀破狼加煞，也不在紫府朝垣辅弼不照（君臣废会不至太艰辛），而在于事业宫见忌，造成事业心浮动，无法久居一位，久做一事：这是事业经营上的大忌。命中虽只遇一颗煞星，作用却大哉，有画龙点睛之效——不但增强命格气势，而且形成特别格局，若无此星，名利追求，都将事倍功半。\n\
    \n(二) 己未大限：文曲化忌在申，并冲射健康之宫寅。\n(三) 庚申大限：天同化忌在酉，并冲射健康之宫卯。\n\n忌星侵入健康宫不必然表示患病、恶疾或其他损及健康的现象，所以不必紧张；但因体能呈不稳定状态，一旦生病，比较难以医治，却是事实。\n\
    \n□过去有个算命先生说我这人巨门坐命，伶牙利嘴，尖酸刻薄，是非不断，靠口舌吃饭\n前面那些对极了，最后一项则有点偏差，准确率算是蛮高的，有时候观察自己的命盘，看那些星宫穿梭转移，真会怀疑我为什么会是这样一个人。\n\
    \n回巨日组合本来就充满光热，热情洋溢，煞星照入，挫败意识显现，内忙外乱，脑筋不停思索，由于攻击力强，致力于一事，无坚不摧；缺点是欠缺手段和耐力，如果无法坚持到最后五分钟，一切努力可能付诸东流。无论男女，性喜标新立异，做一些出人意表的选择，成败功过，颇难断论，必须等到最后一刻，也就是古人说的『盖棺始能论定』。导统御的本事，喜欢单打独斗，自我肯定。\n\
    \n□禄在兄弟宫，是我去帮兄弟，还是兄弟来帮我。\n图当然是你去帮人，且是纯情付出，即使对方有负于你，也会一笑置之。\n\n二\n□我在庚戌大限从事国际贸易，做皮衣、时装加工外销，我只是其中一个小股东，负责产品拓展和海外市场开发，你看我合适吗？\n\
    \n## □事业遭忌（武曲忌居中），并受羊陀夹制（该宫前有擎羊、后有陀罗），顿成『羊陀夹力』。这是一个败局，事业承担力弱，有优柔寡断的倾向，执行业务常受外境操控，时感心余力绌。\n\
    与，唯有如此，方能避免被套牢，导致血本无归。\n\n## □如果好运仅指事业运而言，那么一生几乎走不到这样的好运。\n禄星不入事业宫，无法获得运助，想建立彪炳业绩，比登天还难；如果退而求其次，帮别人发财发事业也算好运，那就稳当了，因为禄星不照命，必照别人的宫位，他们获利，然后分我一杯羹，未尝不是可行之道。\n\
    \n## □庚戌大限破军化禄照入事业宫，算是一步好运吗？\n□算。不但癸丑算，壬寅也算，遗憾的是此时已届古稀，不知还能发挥什么效果。\n□此限制财不利事业，太阳化禄在子，福德宫也，财源吉祥，随便做便赚进银子；禄星引动财官，进财容易，物质条件十分良好。但忽略天同化忌照入事业可能带来的灾害，靠经营事业赚钱，特别像买空卖空的贩卖业首当其冲，挫折、不顺必不能免。\n\
    \n是坐先天忌星（武曲），二是坐大限忌星（文昌），忌忌相激，破坏力增强，岂是好运。\n□武曲忌是先天忌，此时可以弃之，改用大限禄忌，才免迷惑。禄星巨门在星，这是大限的合伙宫，暗示图利他人，忌星文昌在亥自坐，坐宫不稳，内心彷徨，该忌照入事业，影响事经营的一贯性。这种运势不利新创，所有的新业都是坏的开始，往后可要惨淡经营，巨门禄进入上运的迁移位，旧业继续开拓，大吉大利。壬申年是此限最后一年，若想延续旧业，那么应在年底之前完成创新。\n\
    \n□我想到欧美先进国家发展服装业，你看前途如何？\n回辛亥大限不是一个什么了不起的运程，在这种环境中开创（重新站立），成功率不高，出国是改变环境，风险更高。往后发展的方向可以有二：\n\
    （一）先别忙着创新，旧业仍然可做，不妨依循着一个地区的需求，局部修正。\n（二）放弃自我开创，改与他人合伙，藉别人的力量完成我的志愿，只是不能做老板。出国发展服装业属于旧业延续，应属可行。因为照煞不多，竞争力弱，不宜从事投机业、必须拚得你死我活的行业。此外对新的环境不会很快适应，出国就业时，这点也要考虑在内。\n\
    \n□过去有知命者告诉我，壬申年因为武曲化忌进入财库（在亥），主破大财，可能破得什么都不剩，着实让我恐慌，是否如此。\n□此年宫无主星，自主性弱，发生在身边的挫折，恐怕无力扭转。外在三方是巨日兼机月同梁，按部就班，无法蹿等，若有什么冲击，不会大到让人措手不及。天梁禄在午，这是大限的财宫，旧业可以得财；也是流年的妻宫，照射事业，新业大吉，是个『好的开始』。武曲化忌在亥，这个亥只是大限的父母宫，作用不大；照射流年田宅宫，时常外出，甚至出远门。流年库破，财进财出，不会破到脱底。\n\
    \n□癸酉年起交入新限，那位先生又说，在新旧交接的时刻，最容易发生意外，危机自外而来，旧贪狼化忌从迁移宫射入，我做的正是国际贸易，受创必大，有什么方法可以防止。\n\
    □所有的意外都是特性，依理无法推测，这是一程式的不可能。此年的命宫仍无主星，跟去年一样，自主力弱，必须努力祈祷别发生灾难，否则不知该怎么善后才好。其中破军化禄在亥，这是大限的命宫，自信心增强，想到什么会付诸实现，也是今年福德宫，旧业挫折不免；这也是流年的迁移位，人际关系很差，容易跟人脸红脖子粗限的事业宫，旧业挫折不免；这也是流年的迁移位，人际关系很差，容易跟人脸红脖子粗。这是近年来少见的比较波动的年份，一年到头，内心浮动，惶惶然不可终日。\n\
    \n□甲戌流年太阳化忌冲破财宫，显然又遇到一个破，廉贞化禄进入大限财宫，则主成，如此一成一破，究竟怎么一回事？最后是得是失。\n□此年廉贞化禄在未，乃大限的财宫，旧业可望得财；惟太阳化忌在子，流年福德也，财福相对，因此该忌自然冲击了财宫，与人金钱来往、借贷与人等行为必破，当然还包括开销特大在内。\n\
    \n□乙亥年天机禄、太阴忌都在田宅宫，这种情形是吉兆还是凶兆？\n□此年岁运重叠，天机禄、太阴忌都在演，岁运田宅也，由于不照命宫及其三方，难得一个没什么大事的静年，可以喘一口气矣；其他是经常外出，家庭生活比较无味吧。"
  mdcn: "## 顷刻间倾倒，失去一切——起落频仍，突然变成亿万富婆，瞬间又是一文莫名。\n\n有个客户邀我合伙开一家专卖生鲜蔬果鱼类的超商，由我全权处理，可望赚钱吗？\n\
    \n此命逆行，到七十四岁癸卯大限止，一直未能走到旺财运，自然丧失了骤发的良机。如果顺行，四十五岁起连走两运二十年财运，富贵可期；造化弄人，唯有自求多福。如果从事以事业带动钱财的行业，把赚钱摆在后面，大概所有的技术服务业都算，那么目前的丙午大限勉强算是一步好运，偶发一点小财，应该不算意外。禄在迁移，往外发展，才能获利。\n\
    \n- 如果可能，嫁给哪种类型的人才能偕老？\n- □跟紫府廉武相这种组合订盟，无论个性、生活习惯、思考方式或者人生观，都十分接近；婚后保证某种程度的稳定；杀破狼也不错，相亲相爱，爱河永浴。但最好别去惹机月同梁或巨日这两种人，很快就会同床异梦。\n\
    - 命宫的星曜比六宫旺\n    - 掌握、支配一切，多少有牝鸡司晨的徵兆。\n\n## 如果我是老板\n\n一\n\n□我研究自己的命盘时发现，这个命一无是处，命弱，事业也弱，欲望不高，创业艰难，忌星照命，简直落井下石。我不知道还能做什么事。\n\
    □事业遭忌只是一个因素，重要的是该宫无星，承担力弱，也会拒绝承担，这种人会有哪些心态呢？\n\n(一) 只要找到一个理想的工作就心满意足。\n(二) 无法久做一事、久居一位。\n\
    \n当然，要不要创业是一种意愿，也是一种选择，事业宫再弱再破的人都可能因为环境的因素，譬如继承父母的遗志、朋友促成而独立经营事业。\n\n□事业见昌曲，还有一颗擎羊、昌曲主艺术文学，是否要从事这方面的行业才能发达？\n\
    擎羊象征刀笔，更主毅力，发挥得宜，成就卓越，不言可喻，不过对我能否发挥潜能仍无十分的把握，为什么会这样这样？\n\n圈刚才的叙述都算精确，六吉没有绝对的吉祥，六煞也没有绝对的凶祸，我们还要考虑呼应，以及是否将吉煞的潜力激发出来。忌主干扰，波动是无可避免的，只要顺其自然，从事本质上不受限制、没有固定规格的行业，全力以赴，可望转化为生命的原创力和爆发力，摧枯拉朽，无坚不摧，就是凶也会变吉。\n\
    \n所谓的转化，指透过事业知识或技术的锻炼、雕琢而言。\n\n若无专长，忌星将尽情破坏事业的经营、执掌，常有一种不安定感，危机意识强烈，当思变动，一年换二十四个头家。\n\
    \n□我是外文系毕业的，还懂一点国际贸易的实务，这算不算专业技术？\n□当然算。\n□那么我何时走到事业佳运，可以趁势再起？\n回最好的事业运在乙亥和甲戌这两十年，又以甲戌殊胜，因为此限杀破狼结构，环境强势，见禄不见忌。\n\
    \n(一) 乙亥大限是机月同梁，安定中求进步，财宫无星，略现弱势，天机禄在卯，乃大限事业宫，事业好运无疑；太阴忌从丑射未，财宫遭到破坏，明显的是一步破财运。\n\
    (二) 甲戌大限廉贞禄在申，照财入寅，这个寅就是事业宫，必为事业经营与执掌带来开花结果的契机。\n\n□二十年好运能替我带来什么样的事业成就？\n圈这就很难说了。命理不是无奈的宿命论——不是走到什么运就铁定获得什么成就，履试不爽。我想普天之下，尚无一种禄命术能够达到这种效果。其中的道理不难明白，命运虽同，每个人的家世、成长环境、参与的社會和努力的程度则千差万别，二十年下来，有人开着宾士轿车嘟嘟来，有人却骑着破摩托车输输去，在知命者看来，一点都不觉得奇怪。\n\
    \n## 我在哪个阶段可能遭遇破事业的运程\n□先天事业波动难安，但是上帝关了一扇门，一定会再开另一扇门，七十五岁之前，完全遇不到破事业运（忌星坐照事业宫），因此不虞遭到溃败的命运。微破仍然是有的，丙子大限廉贞忌在申，那是财宫，斜照入辰，这个辰就是事业宫，财运不佳，累及事业，恐怕是跑不掉的。\n\
    \n## 二\n□过去有好几个算命先生交代我不能跟别人合伙，因为奴仆宫的星曜强过我的命宫不知几倍，跟他们合作，肯定被吃得死死的，你的看法呢？\n□我甚不以以为然。经验法则指出，禄在命宫及三方诸宫，自己动手，才能获利；禄在别人的宫位，特别是忌星进命，则要托别之福，先帮别人成事，他们自会分我一杯羹。日前的丁丑大限禄忌均在命宫三方显现，好坏吉凶，自己通吃，合伙事业普通而已。我要提醒阁下的是，丁丑的事业好运只是斜照，吉力略减，但忌星侵袭财源却是直接的，因此不宜过度扩充或膨胀，以免资金被卡死，弄得全盘皆输。\n\
    \n□我们几个朋友在己巳年开创了一家投资顾问公司，老板不是我，而是一个学长，他的脑筋一流，我的工作是策划，兼办一点业务，从我的命盘可以看出公司营运的成败吗？\n\
    □似乎不能，你想想看，利用员工或部属的命盘推敲老板的命运，有没有道理？\n□如果我做老板呢？己巳年创新的事业开始时并不怎样，预料要过了此年才会逐渐起色，然后历经庚午、辛未到壬申，成效都算不错；癸酉年以后停顿，甲戌年大破。\n\
    \n□确实如此。看来他们不让我当老板，绝对是个错误的抉择。那么，我个人的成就要到何年何月才得以达到颠峰？\n回显然要到乙亥和甲戌两限，成就才会拉到最高点。\n\
    （一）从丁丑到乙亥这段历程，足足还有十余年，这是一段漫长的岁月，还有得等。\n（二）中间隔着丙子大限，禄星（天同）不照忌星（廉贞）进入财宫，破财运也。若让丁丑大限的行业延续到丙子大限，也许可以不必等那么久，好运就翩然莅临，并且一直发到乙亥，前后共计二十年。若非延续，也就是丙子大限中新创了行业，这种新业想要赚钱，将比登天还难。\n\
    \n□我的先天财宫主星坐守，无冲无破，可能发财吗？\n回机月同梁原本就主按部就班，在财物的追求上，保守有余，冲劲不足，既不会横发，也不会横败。财源来自三个方向：薪水、工资、佣金，属于积富之人，也就是靠储蓄和节俭达到小康。在后天行运中出现两个奇特的现象，不能不交代：\n\
    (一) 事业始终旺于财物，故宜从事服务业，用事业带动钱财，才能顺遂。\n(二) 连走了三十年破财运：丁丑、丙子和乙亥，其中丙子冲击最强，受创程度最烈，盖忌星挟煞冲射财宫。\n\
    \n这种运程对商人杀伤力大到无穷，此外贩卖业者买空卖空，货物滞销，成本增加，常为钱财支配伤透了脑筋，在准备跳出来自我开创时，不妨三思而后行。\n\n## 关门开门\n\
    一\n□我这个命适合自行创业，还是继续跟人家合作？\n□机月同梁兼巨日的组合，前者只见一半，故后者为主导，你们这种人开朗爽快、恩怨分明，有点叛逆，但重视公义与道德情操，富同情心；火星与羊陀诸煞照入，上述性格更显。吉星二见，吉祥温馨，其中左辅富手段、有谋略，处事待人，极其圆满；贵人星带来贵气，外观气宇轩昂，并成为别人的贵人。\n\
    □煞星见那么多，吓死人了，可能带来什么灾难？\n图三遇煞星（火羊陀），略见冲激，故精神肉体都会饱受煎熬与折磨，始终处于紧绷状态中。煞星因为相互牵制、冲击而形成特殊格局，其中火星与擎羊构成火羊格，与陀罗构成火陀格，主『威权出众』，迅速出头，但也形成『巨火羊』，这是一个恶格，古书说这种人『终究继死』，有点宿命论兼危言耸听，广泛解释为脾气欠佳，刚愎自用，导致常遭意外，险象环生。所有潜能都必须适时释放，导向专业知识或技术，才能转化，进而成就事业。\n\
    □我现在从事服装设计，兼营门市贩卖，你看适性吗？\n图不论杀破狼或机月同梁，只要煞星多照，心性就不会太安逸，选择上班过了这一生，不会适性；除非该项职务本身具有专业性，可以补其不足。\n\
    \n| 天巨钺门 | 文廉昌相贞 | 地天空梁 | 七曲杀 |\n|---|---|---|---|\n| 丁巳命宫 | 戊午 | 己未二十五 -三十四 |\
    \ 庚申 |\n| 贪狼忌 | 癸卯八月×日辰时一九六三年 | 辛酉天同 |\n| 地劫右弼太阴 | 乙卯武曲 |\n| 铃星紫微天府 | 擎羊火星天机 |\
    \ 破军禄 | 太阳左辅陀罗 |\n| 甲寅 | 乙丑 | 甲子 | 癸亥 |\n\n> 巨日加煞本来就十分突出，其中的煞星可能构成异格，倾向异路功名，意思是运用超人的智慧，过人的毅力，迂回以进，仍能致富致贵。这种人通常也自信可以不依循正常管道，达到追逐名利的目的。\n\
    > \n> 如果聪明过度，就会异想天开，旁门左道，不择手段，事态变得疑重。大事业家如果作奸犯科，危害社会，无疑也将是一流的，俗话说“贼仔状元才”，就是这个意思。\n\
    \n从事的行业若像造型设计（包括所有的艺术创作）、电脑程式设计、新闻采访、律师、外科医生，都算适性，服装设计当然也算在内，在波动、不安定中安身立命，比较笃定。自行创业仍以上述行业为准，武市比门市吉，不妨多角化经营，门市兼武市；技术服务业由于具有独占性，比较不受经济景气影响。\n\
    \n□古今中外的命学无不强调必须走到佳运，才能发达，那么我的事业佳运约在何时？\n人在逆境中也能发达，只不过做得比较艰辛罢了。最佳事业运在丁巳、戊午两限，缘于禄星分别照入事业宫，有关的事业、学业发展，一帆风顺；只是当时年纪小，好运的实质效果不显，最多庇荫读书顺利，名列前茅。往后不再走到类似的好运，遇到的只是次好运，那是四十五岁起的辛酉大限，巨门禄斜照进入事业，仍会开花结果，把握良机，前途一片亮丽。这个命难得的是，一生不见破事业之运，事业发展不虞受阻，在执掌与经营上，可以高枕无忧。\n\
    \n□这步己未大限煞星照入很多，诸煞将形成一种怎样的恶性环境，带来怎样的灾难。\n己未大限机月同梁，安定中进步；煞星多照，环境驳杂。有关的吉凶分布，仍要斟酌禄与忌牵引的方向。\n\
    \n# (一) 武曲禄在戌，乃大限田宅，财库充实，赚进来的钱存起来；九只牛都拉不出；该禄冲照子女宫，亲子感情已增。生意人财库兴旺，可望累积大笔财富。\n#\
    \ (二) 文曲忌在申，父母宫也，与长亲的感情时逢低潮，并生龃龉；另冲健康宫位，体能起伏大，常感心力绌。\n\n□我虽有扩充甚至改变经营方式的打算，但并非迫切，也许一两年后，请帮我看看哪年的运气较佳，让我心里有个谱。\n\
    □癸酉年：破军禄在子，大限合伙宫也是流年田宅宫，禄在别人处，图利他人而已。贪狼忌在辰，大限子女宫，亲子感情忽然有了阻隔，不知何故。岁运宫位未受牵引，是个静年，没什么重大事项发生。\n\
    甲戌年：廉贞禄在午，大限兄弟宫兼流年财宫，可能在别人无意的指点下得财，而临时的求财行为也能获财；太阳忌在亥，乃大限事业宫，延续行业不佳，在今年可能被强迫做一些改变。\n\
    乙亥年：天机禄在丑，大限迁移宫也是流年福德宫，并照入后者的财宫，外缘大好，出外得利。太阴忌在卯，大限的财宫，旧业此年进帐不顺，有浪费、损财（亏本）等象；这也是流年事业宫，此年新创，是个『坏的开始』，大忌。\n\
    丙子年：天同禄在酉，大限福德宫并照财宫，是二十五岁以来财源最好的一年，旧业得财，亲子感情今年增长不少；惟廉贞忌在午，大限兄弟宫也，有兄弟败财的不祥徵兆。\n\
    \n二\n□这辈子哪个运的财势最好？是庚申事业见禄，还是辛酉禄进财宫？\n□庚申大限事业宫的禄只是先天禄，在后天的运程中不用——改用大限化出的太阳禄。庚申大限的禄（太阳）忌（天同）均未牵引财福二宫，静运一个，意思是说，此去的财物支配只维持一个平常的状态。辛酉大限禄（巨门）在财宫，就是世俗盛赞的财运，进财顺畅，也能享受财福，这是此生所能遇到的最佳财运。\n\
    \n□遇到破财运时，可不可能顷刻间败得一无所有？\n□这种命受到先天结构的限制，不会横发，发得跟环亚财团总裁郑绵绵平起平坐，当然也不会横败，败得倾家荡产，必须托钵维生。惊天动地的破财运没有，微破却是存在的，那是五十五岁以后的壬戌大限，武曲忌自坐，然后斜照进入财宫，造成财物微损，生意人受创大，即使不刻意求财，也会因为开支略大，手头时常拮据。\n\
    \n□算命的目的不外趋吉避凶，找出灾难发生的位置和年限，早做预防，可免到时手忙脚乱，依命盘显示，我什么时候会见血光？\n□血光之灾大概包括车祸、开刀、身体残伤等等，遗憾的是这些属于个人的独立事项，非共盘所能窥破，因此答案是『不知道』。在此，只能隐约掌握到一点健康方面的信息，那就是从戊午到庚申的三十年内，忌星都在干扰健康宫位，多少影响体能的正常发展。\n\
    （一）戊午大限：天机化忌在丑，这个丑正是健康之宫。\n\n|  | 天钺 | 天梁 | 七杀 | 左辅 |\n|---|---|---|---|---|\n\
    | 乙巳 | 丙午 | 丁未 命宮 | 戊申 |\n| 巨门 | 壬辰 五月×日亥時 | 一九五二年 | 铃星 |\n| 甲辰 | 癸卯 | 天文贪狼 紫微曲魁\
    \ | 地劫陀罗同 |\n| 庚戌 32-41 |  |  |  |\n| 太阴 | 天机 | 天府 | 太阳 | 擎羊 |\n| 壬寅 | 癸丑 | 壬子\
    \ | 辛亥 |\n| 文昌破军武曲忌 |\n\n之所以要惨淡经营，关键不在杀破狼加煞，也不在紫府朝垣辅弼不照（君臣废会不至太艰辛），而在于事业宫见忌，造成事业心浮动，无法久居一位，久做一事：这是事业经营上的大忌。命中虽只遇一颗煞星，作用却大哉，有画龙点睛之效——不但增强命格气势，而且形成特别格局，若无此星，名利追求，都将事倍功半。\n\
    \n(二) 己未大限：文曲化忌在申，并冲射健康之宫寅。\n(三) 庚申大限：天同化忌在酉，并冲射健康之宫卯。\n\n忌星侵入健康宫不必然表示患病、恶疾或其他损及健康的现象，所以不必紧张；但因体能呈不稳定状态，一旦生病，比较难以医治，却是事实。\n\
    \n□过去有个算命先生说我这人巨门坐命，伶牙利嘴，尖酸刻薄，是非不断，靠口舌吃饭\n前面那些对极了，最后一项则有点偏差，准确率算是蛮高的，有时候观察自己的命盘，看那些星宫穿梭转移，真会怀疑我为什么会是这样一个人。\n\
    \n回巨日组合本来就充满光热，热情洋溢，煞星照入，挫败意识显现，内忙外乱，脑筋不停思索，由于攻击力强，致力于一事，无坚不摧；缺点是欠缺手段和耐力，如果无法坚持到最后五分钟，一切努力可能付诸东流。无论男女，性喜标新立异，做一些出人意表的选择，成败功过，颇难断论，必须等到最后一刻，也就是古人说的『盖棺始能论定』。导统御的本事，喜欢单打独斗，自我肯定。\n\
    \n□禄在兄弟宫，是我去帮兄弟，还是兄弟来帮我。\n图当然是你去帮人，且是纯情付出，即使对方有负于你，也会一笑置之。\n\n二\n□我在庚戌大限从事国际贸易，做皮衣、时装加工外销，我只是其中一个小股东，负责产品拓展和海外市场开发，你看我合适吗？\n\
    \n## □事业遭忌（武曲忌居中），并受羊陀夹制（该宫前有擎羊、后有陀罗），顿成『羊陀夹力』。这是一个败局，事业承担力弱，有优柔寡断的倾向，执行业务常受外境操控，时感心余力绌。\n\
    与，唯有如此，方能避免被套牢，导致血本无归。\n\n## □如果好运仅指事业运而言，那么一生几乎走不到这样的好运。\n禄星不入事业宫，无法获得运助，想建立彪炳业绩，比登天还难；如果退而求其次，帮别人发财发事业也算好运，那就稳当了，因为禄星不照命，必照别人的宫位，他们获利，然后分我一杯羹，未尝不是可行之道。\n\
    \n## □庚戌大限破军化禄照入事业宫，算是一步好运吗？\n□算。不但癸丑算，壬寅也算，遗憾的是此时已届古稀，不知还能发挥什么效果。\n□此限制财不利事业，太阳化禄在子，福德宫也，财源吉祥，随便做便赚进银子；禄星引动财官，进财容易，物质条件十分良好。但忽略天同化忌照入事业可能带来的灾害，靠经营事业赚钱，特别像买空卖空的贩卖业首当其冲，挫折、不顺必不能免。\n\
    \n是坐先天忌星（武曲），二是坐大限忌星（文昌），忌忌相激，破坏力增强，岂是好运。\n□武曲忌是先天忌，此时可以弃之，改用大限禄忌，才免迷惑。禄星巨门在星，这是大限的合伙宫，暗示图利他人，忌星文昌在亥自坐，坐宫不稳，内心彷徨，该忌照入事业，影响事经营的一贯性。这种运势不利新创，所有的新业都是坏的开始，往后可要惨淡经营，巨门禄进入上运的迁移位，旧业继续开拓，大吉大利。壬申年是此限最后一年，若想延续旧业，那么应在年底之前完成创新。\n\
    \n□我想到欧美先进国家发展服装业，你看前途如何？\n回辛亥大限不是一个什么了不起的运程，在这种环境中开创（重新站立），成功率不高，出国是改变环境，风险更高。往后发展的方向可以有二：\n\
    （一）先别忙着创新，旧业仍然可做，不妨依循着一个地区的需求，局部修正。\n（二）放弃自我开创，改与他人合伙，藉别人的力量完成我的志愿，只是不能做老板。出国发展服装业属于旧业延续，应属可行。因为照煞不多，竞争力弱，不宜从事投机业、必须拚得你死我活的行业。此外对新的环境不会很快适应，出国就业时，这点也要考虑在内。\n\
    \n□过去有知命者告诉我，壬申年因为武曲化忌进入财库（在亥），主破大财，可能破得什么都不剩，着实让我恐慌，是否如此。\n□此年宫无主星，自主性弱，发生在身边的挫折，恐怕无力扭转。外在三方是巨日兼机月同梁，按部就班，无法蹿等，若有什么冲击，不会大到让人措手不及。天梁禄在午，这是大限的财宫，旧业可以得财；也是流年的妻宫，照射事业，新业大吉，是个『好的开始』。武曲化忌在亥，这个亥只是大限的父母宫，作用不大；照射流年田宅宫，时常外出，甚至出远门。流年库破，财进财出，不会破到脱底。\n\
    \n□癸酉年起交入新限，那位先生又说，在新旧交接的时刻，最容易发生意外，危机自外而来，旧贪狼化忌从迁移宫射入，我做的正是国际贸易，受创必大，有什么方法可以防止。\n\
    □所有的意外都是特性，依理无法推测，这是一程式的不可能。此年的命宫仍无主星，跟去年一样，自主力弱，必须努力祈祷别发生灾难，否则不知该怎么善后才好。其中破军化禄在亥，这是大限的命宫，自信心增强，想到什么会付诸实现，也是今年福德宫，旧业挫折不免；这也是流年的迁移位，人际关系很差，容易跟人脸红脖子粗限的事业宫，旧业挫折不免；这也是流年的迁移位，人际关系很差，容易跟人脸红脖子粗。这是近年来少见的比较波动的年份，一年到头，内心浮动，惶惶然不可终日。\n\
    \n□甲戌流年太阳化忌冲破财宫，显然又遇到一个破，廉贞化禄进入大限财宫，则主成，如此一成一破，究竟怎么一回事？最后是得是失。\n□此年廉贞化禄在未，乃大限的财宫，旧业可望得财；惟太阳化忌在子，流年福德也，财福相对，因此该忌自然冲击了财宫，与人金钱来往、借贷与人等行为必破，当然还包括开销特大在内。\n\
    \n□乙亥年天机禄、太阴忌都在田宅宫，这种情形是吉兆还是凶兆？\n□此年岁运重叠，天机禄、太阴忌都在演，岁运田宅也，由于不照命宫及其三方，难得一个没什么大事的静年，可以喘一口气矣；其他是经常外出，家庭生活比较无味吧。"
