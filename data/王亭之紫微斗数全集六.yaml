    又一例男命戊生人，曾一度車禍，撞歪了鼻子，住院一次。随后找另一家整容外科做糾正手術。割過包皮，二造完全巧合。


    梁會擎羊、六親緣薄、常有孤獨感、不是没有親人，而是親人疏遠，各自為政。除武貪會擎羊可威鎮邊疆外，同陰在午會擎羊，天馬在巳，叫『馬頭帶箭格』，主可以在外地發迹，出國最好，但六親刑克、破相不免。


