    # 自序


    這本書的理念源自《紫微論命不求人》，兩書堪稱姐妹之作，後者屬於共盤推論，只要時間條件相同，結論並無差別，此書提供的則是技術分析，利用輸入法和定宮原理，分別人事物的差異，堂而皇之進入論命的深層結構。我們首度有系統的披露現代方法學的成果，希望藉此把斗數的推算提升到咨商的層次，足以公開討論，甚至公開辯論。


    八十一年的五月下旬出版《紫微論命不求人》，二十天之後再版，這是一件令人振奮的事，算是命理叢書一項新的記錄，一些朋友告訴我他們是看了此書才恍然大悟原來斗數算命是那種模樣，效法天臺宗智者大師拜經，期待技術分析早日公開，使斗數論命臻于完備。


    去年夏天我忙碌異常，除了趕熱鬧寫了《立委選戰，鹿死誰手》外，選評注清朝八字學者沈孝瞻的《子平真詮》，時間有限，在酷暑中揮汗，頭昏腦漲，慘不忍睹，直到秋涼之後，才動手書寫，其間數易其稿，最後再利用校對重讀一遍，發覺還算差強人意，敬請大家指正。


    傳統習慣中，算命先生是一個介乎于天人之間不世出的人物，只有他們才配泄漏天機、透露求教者的生命痕跡，這種人不是神仙之流又是什么，翻開八字和斗數古籍，神仙論斷、神仙事迹，到處充斥，暗示后代習命者如法炮制，才能修成正果。我曾經多次遇到一些鏡頭，迄今印象深刻。命盤排好（現在是電腦打出），我清清喉嚨曰：『請問，想知道什么？』


    大部分人會這樣回答：『把你知道的通通告訴我。』一部分則說：『把我過去發生的事情敘述一遍。』他們認爲這是驗證學者或算命先生功力的不二法門，過往事迹，娓娓道來，高手無疑。但是他們碰到的是我，我通常會答曰：『坦白說，我什么都不知道。』


    反應倒是可以預知的，他們先是大吃一驚，然後喃喃道：『爲什么跟傳聞的不同……』


    有些人立刻露出鄙夷的神情說：『別假仙啦，誰不知道你段數最高，知道過去未來。』我趕緊聲明沒有那么厲害，否則早已隨美國總統之邀，擔任白宮軍師了。有些朋友約我談命，在電話那頭交代說：『我先把生辰給你，有空幫我仔細瞧瞧。』我說來了再排，命盤的主人不在，那只是一張白紙黑字，没什么用處。他們偶爾還會這樣親切：『給你充分的時間觀察、思考，斷得更準。』『我只好向他們道謝。我不好意思說我對各種命理結構已經了如指掌，只一眼，就能推斷，那樣有點自傲，讓人反感。』


    神仙論斷的存在已是老太婆的棉被——蓋有年矣，那種觀念根深蒂固，任憑九牛二虎之力都動不了它一根寒毛，我何德何能，憑幾本薄書就想撥亂反正，簡直蜉蝣撼大樹嘛。


    技術分析是條件式的，你必須告知某事，然後依照定宮原理進入系統，在命盤一個個的特定宮位中搜玄尋秘，依稀發現一些共盤無法推知的蛛絲馬迹，換句話說，如果閣下三緘其口，或者生怕因爲漏了口風，被猜出內心的事，那么只好繼續共盤侍候，所有的分析和結論必然符合所有同命者，在臺灣，他們共有七十七人之多（平均人口數）。


    技術分析跟鐵口直斷正好背道而馳，由于違反慣例，被江湖術士嗤之以鼻，毫不意外，我們認為算命跟醫生診斷有異曲同工之妙，如果拒絕向醫生陳訴病情，不是被下逐客令，就是引來獸醫，只有後者的患者是不必說話的。就重要性而言，命運分析何其嚴肅，影響層面何其廣闊，顧客卻不屑合作，豈有此理。


    進行技術分析之前，有個重要觀念必須確實體認——定宮，癸酉年開創的新業，必以西宮及三方宮位為起始點，缺乏定宮的概念，或者不知定宮為何物，便無法欣賞現代命理學者的神乎其技，而任何習命者、算命先生縱有通天本領，論命造詣已臻化境，假相而已。


    有些算命館門庭若市，術士月入數十萬甚至百萬，論命方式不過是十二宮從頭到尾講解一遍就拉倒，偶爾觸及一些玄機，也是瞎貓剛好碰到死老鼠，臺北好幾位大師算一個命三十


    分鐘，收費新臺幣三千元，時間一到，端茶送客，他一律講解共盤，技術分析是啥，可能茫然，生意却好得不得了。


    《斗數疑難一百問答現代篇》記載，輸入法處理的事項必須是可算的，否則即使條件齊全，也是老虎吃天，不知該從何處下手，譬如我們輸入父母的條件，仍然不知父母自己發生了什麼大事，輸入子女的條件，仍然不知親子關系如何演變，可見科技再發達，對造物者


    内在世界的了解仍是一片混沌，此時頗能體會德國科物理學家海森堡提出『測不準原理』


    的心境。他說，『被觀察的現象始終是不可分割的，一個孤立自主的世界永遠不可能存在。』


    我答應另外寫的一本書，過去像《現代紫微》、《紫微之路》，我曾試圖在推論中演示類似的斗數論命的最高境界，那些論式一來未臻完善，二來有了選擇性（選擇取樣），不如本書客觀且有系統。這些年來，我思辨斗數祿命的歷程，跟唐朝禪師青原惟信頗有幾分神似。

    他說：『老僧未參禪時，見山是山，見水是水，既參禪后，見山不是山，見水不是水，等到了歇腳處，見山仍是山，見水仍是水。』山水本無不同，所以不同者僅是修行者心境的改變。

    當然也有不少人認爲我強調科學方法學，未免陳義過高，是不解東方玄學的特殊結構所致，現在的『悟境』不是進步，而是退步，似被層層魔障束縛着，不能動彈，無法看清事物的真相。偶爾反身觀照，好像有那么一回事，希望讀者也能思辨，讓我牽着鼻子走。

    我近來常扮演着『命理終結者』的角色，許多人希望我評論其他命理學者的談論，或者解釋某算命先生為什麼要那樣說，以及看過的書又如何讓他們迷惑。多數情況，聆聽我的解析后，滿懷欣喜，點頭離去或掛斷電話，更多的時候仍要舌焦唇敝，大戰三百回合。我從不指望我的意見被遵奉如儀，西諺說得好，『一個人的美食是另一個人的毒藥』。（One''s
    meal is another''s poison），在閣下進行實驗（付諸實現）之前，不應貿然肯定該方法或演算是確實無誤的，那可能是害你的，這點務必記住。


    # 《卷一》

    ## 事業篇


    . 9 .


    # 神明聞香烟


    一


    □我念的是企管，這種學科適格嗎。

    □好像不太適格。


    □大學畢業后原想參加高考，因為收到入伍令只好打消，退伍前夕忽然接到朋友推薦

    進入這家公司，近來生活安定，想重拾書本，不知考運如何。

    壬申年準備一拚，萬一落榜，

    癸酉年卷土重來，你看這兩年的運勢如何。


    □目前大限在寅，環境相當強勢，却是一步静運，什么事都是緩慢的，不急不徐的，不

    吉不凶的，雖不利積極準取，却利坐下來讀書研究學問。


    (一)壬申年天梁禄在丑，大限兄弟宮、流年合伙宮，所有好事，與我無關，武曲忌在辰，

    大限福德位、流年開宮也，歲運對錢財大支顯然產生壞的作用。該忌照入流年事業宮，干

    擾了考運，要加倍努力。


    (二)癸酉年破軍禄進入大限事業宮，這是二十五歲以后遇到的最好的流年之一 (另一

    個是甲戌年)，舊業 (幾年苦讀下來，可算舊業) 大吉大利。忌星貪狼不照流年，不再受到干

    擾，吉祥如意，明年甲戌年也是。


    考運吉凶跟中榜與否，没有絕對的關係，仍是實力要緊，這跟古人說的「先盡人事，再


    這種結構允文允武，看來精神充沛，只要運程不悖，發運是意料中事，没什么好懷疑的。依照傳統，坐忌是冲破，可能造成哪些不適，遭遇哪些災難？倒是值得研究，并成為析命的重點。


    理論上說，坐忌既不肯定吉祥，也不必然兆禍，只是在朝垣的組合中頭得有點奇异而已。朝垣格朝向帝座，成為幕僚，自己發揮不如為人作嫁；忌星感應后，一切價值都受到扭曲，變得有點愛昧莫明。


    # 「聽天命」的道理是相通的。


    □若能順利考上公務員，以後仕途吉凶如何


    ■大限的祿星（先天的不算）照進事業，才算一步事業吉運，可為事業經營推波助瀾。


    雖然先天波動頻仍，起儲存不免，后天行運卻是靜運、動運交替——每隔十年就遇一次靜


    運，似乎一緩一急，一躍一頓，無法永遠保持静止或波動狀態。


    事業不逢吉運，完全靠運，借運使力，難免有些失落感。此生只有一個次吉運，那是辛


    卯大限，巨門祿從亥照未，這個未就是十年事業宮，雖是斜照，仍然帶來一些吉意，助你老


    兄攻城掠陣。


    庚寅大限與辛卯大限之間似乎存着一道無形的鴻溝，因為庚寅的事業到了辛卯之後，


    忽然中斷，換句話說，三十五歲以後不再延續以前的舊業，不知怎么一回事。所幸庚寅以


    后的諸限不逢破事業的壞運（忌星侵入事業），可保平安無事。當然，次壞運仍是有的，壬


    辰大限武曲忌斜照事業，凶力略遜，造成小小的破耗。


    □家里的人好像幫我算過命，那是很久以前的往事了，我自己從未試過，因為不相信


    命運的軌跡那么容易被掌握進而觀察出來，而相士騙財騙色的消息時有所聞，多少產生一


    些厭惡感，最近流行紫微斗數，每天午休時間，辦公室內三五成群，展讀命盤，成爲一種休


    閑活動，我因爲好奇，就請他們幫我排一張命盤，其中一位同事告訴我說，我不會久做一事


    、久居一位，預言在不久的將來一定要離開目前的工不知根據什么理由？坦白說，我是有點


    **野心**，也許真的會卷起袖子跳出來開創，現在這種沖動并不大。請問，同事說的那種機率究竟多高？


    □命理有個經驗法則是這樣說的：『影響事情成敗的外因愈多，命理所能掌握、理解的就相對愈小』。一不是什麼事都能推論，所有的推論也非客觀到不能質疑。


    此命格成**君臣慶會**，雖是朝垣，仍有領導統御的能力，群策群力，締創偉業。**羊陀照耀后增强波動**，生長周期的曲線起伏大，歷程中充滿變數與挫敗意識。這種人明顯的充滿干勁，積極進取，富於冒險犯難，不易被環境打倒。輔弼照入，足智多謀，樂與人爲善，昌曲有文學藝術方面的修養，都將是豐富生命的動力。


    忌星自坐，內心則始終不能平衡，要求甚高，近乎自我折磨。**羊陀照命的人**，多半有筆如刀，有舌如劍，往專技方面發展，成就非凡。


    □有朝一日水到渠成，非跳出不可，我該往哪個方向發展，才算適性，并且較無得失心？


    忌星牽引煞星襲擊命宮，這種人心性浮動，內外相應，從事波動、更換率或淘汰率高**的行業**，才能無咎。這些行業的活動力都很強，充滿投機，大起大落，成敗迅速，包括推銷、中盤批發，以及所有的技術行業都算適性。**羊陀昌曲聯結**，有藝文的內涵，潛能釋放，轉化爲生命力，成就將更驚人。


    **二**


    · **13** ·


    同事說我的財宮紫微、天府加弼曲，構成一個巨大的命格，乃是天生的富命，但我迄今上班聽差，領的是死薪水，臺灣俗話叫「死豬仔價」，何以致富？


    那些同事的論斷有誤，正統命理可沒那種說法。


    □ 那么我何時走到財運，可以發點小財過過癮？


    □ 辛卯大限巨門祿守財宮，進財順暢，是一步不錯的財運，從事買賣，將本求利，當有可觀的錢財進帳。四十五歲以後的諸運都非財運，無法靠運獲財，其中壬胡大限武曲忌斜照進入財宮，有點小破。繼續任職，再好的財運都不過是神明聞香、欣賞鮮美供果，看得到享受不到。


    □ 文昌忌進入田宅宮，庫破，還指望發財嗎？


    □ 忌在大限田宅，主三種徵兆：一是經常搬家，居無定所；二是經常出差、遠赴外埠；三是庫破，無法囤積。應在何者，或以何者為重，幷無定論，端視呼應的方向而定，其中輕者是出差頻仍，四海爲家；對生意人來說，庫破主財務結構脆弱，可能周轉不靈，萬一營運失策，將導致破產跑路。


    □ 既然無法累積，這樣的富庶豈非只是建築在沙灘上的閣樓？


    □ 那也不見得。


    財宮興旺，錢財流通順利，從事商賣，利潤可觀；既然如此，財爲什麼還會流失？答案也許是擴弃營業、添購設備或轉投資。


    # 三

    □如果三十歲之前成家，是否仍會二婚？

    □誰說會有二婚


    之法就是我不必須拖到辛卯大限才能成家，此說是否可信？

    □好確實是個有趣的推論。


    庚寅大限是旺限，環境壯闊，禄忌未動，婚姻静止，若想成親，還須別人幫忙。辛卯大

    限巨門化祿在亥，這個亥只是財官，利財，但仍未照妻宮，情況跟前運略同。但是討論婚姻

    不能只看一個人的命盤，萬一配偶的星曜已動，還是結得成婚的（我被動而對方主動）。

    此命運婚吉祥的理由是事業心盛，太早成家，婚姻容易成爲絆脚石，最好等到奮斗完

    成，進入辛卯大限，就更理想。


    □妻宮强旺，太太凶悍，可能娶到一只河東獅，那豈不是慘兮兮？

    □社會科學探討的是人和社會的關係，因爲無法重新來過（重復制作），因此只能假設

    然後上窮碧落下黄泉找尋證據，說明該假設確實無誤。假設必須合理，否則一定找不到

    支持的證據。就命理而言，夫妻宮的作用不在于預測對象的家世、長相、健康以及各種相

    關狀況，因此斷言會嫁娶怎樣的對象，只是猜測，没有認知的意義。

    妻宫殺破狼加煞，冲激甚大，對方也有强烈的副業企圖，希望擁有自己的一片天空，三


    十歲以後才會逐漸穩定，並考慮婚姻。我們的假設是，在她奋斗告一段落之前就急着迎娶進門，她必心有未甘，婚后問題層出不窮。我們曾經多次發現類似的結構大學一畢業就迫

    不及待走進廚房，生兒育女，並不十分稱職，后悔早婚，但為時已晚。


    □當兵期間認識一個女孩，她是我妹妹的同班同學，屬牛，大概是一九七三吧，你看她適不適合我。


    團缺乏命盤，只能就刑克的部分加以探討。癸丑年是對你老兄個吉凶參半的年次。


    ｜她也許會盡情愛護、照顧你老兄，滿足你的大男人主義，可是一旦發生糾紛而無法解決，說離就離，毫不留情。


    □我現在又有個對象，一九六九年生，在生意場合認識，約會過幾次，雙方的感覺都還算滿意，如果跟她成親，成敗如何？


