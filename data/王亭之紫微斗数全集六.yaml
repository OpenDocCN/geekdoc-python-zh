  md: '# # 大只鷄慢啼


    □火在外、貪在內，可能成格嗎？


    □此二星只要在三方四正內會照，即可成格。火星照入，增強殺破狼的沖勁與積極性，并形成火貪，古籍對此格評價甚高（譽為「威鎮諸邦」），武職顯貴，從事侵略性、波動性的行業，如魚得水，成就卓着。


    □昌貪是個惡格，將帶來哪些災難？


