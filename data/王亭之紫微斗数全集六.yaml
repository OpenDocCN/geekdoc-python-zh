    許多大學同學在私人機構任職，也有人開公司做老板，他們在校成績并不怎樣，却拜臺灣經濟起飛之賜，分别有了極好的發揮機會，紛紛當上董事長、總經理、業務經理，最起碼也是業務經理，只有我還在中間地帶力争上游，每次開同學會，相形見絀，覺得很没面子。


