    大运顺行，二十一、三十一岁大限走到甲子位，为原命的福宫，有贪狼化禄坐守，与大限迁移宫的火星构成火贪格；同时，大限的廉贞化禄与天府同坐原盘命宫，也为大限的夫妻宫，拱照大限的官禄宫，天府得禄非同小可。所以这步大限内必然大发。一九七七年命主三十岁。流年走到大限的奴仆宫。坐原命的天机化忌和禄存，这年开始有了自己的事业，但为搭架子耗资不少。一九七八年戊午。与大限天干重合，变成了贪狼叠禄坐大限的命宫。同时冲照流年的命宫。经营投资必获大利。一九七八年己未，武曲化禄在寅，加大限贪狼化禄在子，使流年迁移宫变成『双禄夹辅』，是在地经商得大利之兆。实际情况是，陈先生在这两年赚钱近两千万台币。


