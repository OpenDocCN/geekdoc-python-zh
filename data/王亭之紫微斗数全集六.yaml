    三十八、破軍在戌宮田宅，更爲化祿，很多是會有祖業的，若不化祿，則要看父母宮星曜如何，若父母宮三方四正有吉星拱照，同樣會有祖業。即使父母宮不吉，仍可得遺產，惟可能來自上一代長輩，如姨媽和叔父等，準確度奇高。


    三十九、疾厄宮祿星太多或疊祿，很多時也表示有病。只是化忌在疾厄，未必能治癒，加上夫妻、田宅不吉，情況更惡劣。而化祿每多是可以治癒的。


    四十、『月朗天門』格局中，太陰在亥化忌，遷移宮便有天機化忌正照，官祿宮則有天梁化科與祿存。反而比太陰化祿而使福德宮巨門化忌爲佳。


    四十一、天機雙化忌守奴僕宮，易被朋友出賣。


    四十二、太陽會巨門于遷移宮，見煞忌，主客死他鄉。


    四十三、太陽坐命的人，運限行至貴顯星曜坐守的宮垣，便須特別注意，可能爲開運的年限。所謂貴顯星曜，即紫微、天府、天梁、太陰等。


    四十四、大限疾厄爲破軍，見武曲化祿，三煞會照而火星同度，主十年牙病。


    四十五、天同與火星在流日的田宅宮主換燈。'
