    # # 《教程》疑難四十問


    自《教程》寄出后，陸續收到了廣大讀者的來信，從來信的內容看，大家的學習進度很快，部分學員已經將整個教材仔細閱讀了一遍，開始轉向記憶和實踐。能夠這樣當然很好，不過需要提醒大家的是：紫微斗數以星情和格局為體，四化及流曜爲用，所以星情是斗數的基礎，務必下大力氣去推演、比較并記憶。如果一開始就去飛四化，則有舍本逐末之嫌。

    可能會『欲速反不達』。各星的賦性有其共性，有其變性，一些書中稱之爲『本易』和『變易』，所謂的共性指的是同一性質不論所處的地支宮位如何，都具有有一些共同的性質。而變性則指同一星曜所處宮位不同，由于同度的星曜或者廟旺利陷的差別而帶來星曜賦性的變化。這些內容在《紫微星情詳述》的第三章講得比較清楚，是必須熟練掌握的基礎內容，一般國內出版的書籍中幾乎沒有提到。

    另外，《紫微星情詳述》的前兩章內容不是曹硯明先生所著，是函授前夕由學會兩名會員參考有關書籍編寫的，由于時間倉促，參考書較亂，編后審定也不嚴格，所以在一些地方不是很明了，部分來信中提出了一些問題，在下面的答問中會陸續予以說明。

    對於有些關於四化追蹤方面的內容以及由于篇幅限制在本期未能解答的問題，留待下期集中解答。


