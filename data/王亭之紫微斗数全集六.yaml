    結構越大，附帶的条件就越多且越苛，尤需一個特大號舞臺供他踢騰，如果找不到這樣的舞臺，他将失落，挫折感隨時腐蝕他的意志。忌冲事業，事業不安，充滿危機意識，逼得他經常更換工作，也間接影響婚姻的穩定。


    成格命不必然發运，這是一個事實；但是只要他活得够老，總有一天會发，也是一個事實。看來发與不发的關鍵，即在行運，逢運則发，不逢则困頓，如此而已。


    「這是我的孩子，家里只有他是男孩，三方宮位六顆主星本來已足，偏偏會照一堆煞忌，顯然太過，過猶不及，據說剛烈的人終生勞碌，六親無緣，他確實從小就若是生非，讓家人生氣。這種命將來可能獲得什么成就？


    「此命由兩種星群組合構成，一是紫府廉武相，一是殺破狼，前者不照輔弼，孤君而已，性格冷峻，擅於單打獨鬥，自我肯定。後者加一兩點煞之後，頓成殺破狼加煞，冲擊力强，積極進取，是非池中之物。


    成就的高低，當然是無法預料的，因為還要看他做哪一行，以及是否盡力，類此之命，能否將火貪的潛能釋出，也是關鍵，釋出者高，潜藏者低。命理不是宿命論，關鍵在此。


    「未來走武職的路大概没什么問題，這個孩子從小就不喜歡藝文，像繪畫、音樂，幾乎都在及格邊緣徘徊。他十分好奇，喜歡動手實驗，經常把收音機、舊電視拆開再組合，弄得房間、客廳到處都是零件，凌亂不堪，數學物理成績都在八十分以上，走向自然學科也許是他的宿命，你們的看法呢？


    「煞忌互見，破壞性强，遇到阻礙，慣采強勢手段予以摧毀，火貪成格，更是無堅不摧，聲勢如破竹，是個研究學問不可多得的高手。


    「昌食」這個惡格在學習過程中表示分心、不專心，心有旁鶩，無法貫徹，必須改善，成就才會高，因為成大事業者哪個不是獨沽一味，數十年於一業。


    □事業宮見廉貞，書上說廉貞是官禄主，化忌後不得做官（從事公職），它的五行屬火，不能做跟火有關的行業，才能逢凶化吉。做不做官是以后的事，但是理化實驗都要用到火，該如何調適，才能逢凶化吉。


    □放心，正統斗數没有那種說法。事業宮逢忌，事業的经营有一種不安定感，老是揮不去，先天所成，非人力可回天；只有從事本質波動、越動越有利的行業，才能免灾，譬如工程設計、藝術創作，個性發揮，可望轉敗為勝，一般行政業務與命理性格嚴重冲突，不做得怨天尤人者幾希。


    昌貪被忌星催化，即使換業，通常無法延續舊业，浪費許多寶貴的經驗。


    □祿在疾厄宮，主哪些作用？


    □禄在疾厄，作用最不明顯，因為該宫不能直接探討健康的消長。祿照父母，暗示對父母百般考順，言聽計從吧。


    二

    □癸酉年他将上高一，依照慣例，今年也要選科，我們決定依照他的興趣讓他念自然組（第一類組），不知是否適性？


    □除了事業表現有點不穩之外，其他方面還算平順。如果數理化成績不錯，選擇理化醫無疑是一條正確之路，未來前途一片亮麗，可以預料。'
