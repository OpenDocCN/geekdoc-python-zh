    發力，摧枯拉朽，無堅不摧，就是凶也會變吉。


    所謂的轉化，指透過事業知識或技術的鍛煉、雕琢而言。


    若無專長，忌星將盡情破壞事業的經營、執掌，常有一種不安定感，危機意識強烈，當思變動，一年換二十四個頭家。


    □我是外文系畢業的，還懂一點國際貿易的實務，這算不算專業技術？


    □當然算。


    □那么我何時走到事業佳運，可以趁勢再起？


