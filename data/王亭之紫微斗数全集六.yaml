  md: '□妻宫星曜旺于命宫，妻比夫强，暗示『妻夺夫权』，我如果跟她争权，结果会怎样？记得以前有个算命先生铁口直断说，我跟元配的缘分极低，几年而已，反而跟第二次婚姻的对象才能终老，没想到竟被他说中。


    □那个算命先生的说法没什么参考的价值，即使推中（如果使用共盘，猜到罢了），多是提早得知结果，不能改变宿命的轨迹。


    从妻宫的结构依稀看出，阁下喜欢追求拥有强烈事业企图心的女孩，但是她们先天都有迟婚的倾向，也就是说在满足事业的意愿之前，不会考虑踏上红毯的，而在婚后，她们通常会继续做职业妇女。你老兄后来有没有找到这样的对象，以及让不让太太继续经营事业，都是造成婚姻成败的重要因素。


    □老实说，我找的是一个老实上班族，跟我一样。据说婚姻成败还跟结构年龄有密切的关系，我是庚申年三十一岁那年成亲的，太阳禄坐命，天同化忌冲破妻宫，似乎我吉祥她遭难，确实是我的坚持才嫁给我的，是否因此而埋下了离异的恶因？


    □结婚年限的吉凶当然影响往后婚姻的稳定，但那只是一个因素，而非唯一的因素。


    □庚申年种下的因又跟我们戊辰年协议离婚的果有关吗？


    □以前提过，结婚之年的忌星所在宫位，等于一个恶因（陷阱），任何人行运至此，都要小心翼翼，如履薄冰，才能免灾。天同所在的午宫，正好是离婚之年，当然很巧，但是若无


