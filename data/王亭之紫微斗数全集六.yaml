    個『惡性的網』有沒有關？


    □忌動妻宮，通往婚姻的大門已開，俗稱紅鸞星動，他會積極追求异性，只不過忌主失衡，理想對象模糊，一見鐘情，后然閃電結婚，可能埋下苦難的種子。


    □以前我們鄉下的算命先生都說，對象的八字合某種生肖者大吉、冲某種生肖則大凶，斗數是否也有此一說？


    □江湖算命術利用八字的年支（生肖）跟對象的年支比對，判別吉凶，合者吉、冲者凶，故三合六合大吉，六冲三刑大凶。譬如這個丙辰年男孩，辰為龍，與酉（雞）六合，與申（猴）子（鼠）三合，因此配到辛酉年、庚申年或甲子年的女孩大吉大利；相反的跟壬戌年（狗）六冲，娶到己未年（羊）或乙丑年（牛）三刑，大凶大敗。其實那種合婚見樹不見杯，完全没有意義。


