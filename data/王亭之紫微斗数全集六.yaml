  md: '# # 禄逢空劫


    李先生在丙寅大限将工厂交给兄弟后，举家迁移美国，迄今已有十来年，其间除了做顾问性质的参与外（家人仍称他为总董），并未实际担任事务，不过近几年来也曾帮忙一些国外业务，替工厂赚了不少钱，但是他个人做的一些投资反而赔了不少钱，以目前呈半退休状态。


    鉴于周遭的经济环境尤其台湾的景气低迷，若不迅速处理厂房，就会越拖越不利，恐有被淘汰之虞，这两三年内屡走东南亚，大陆各地，寻找生存之路，最后仍然决定在印尼——十八年前，他在那里曾经有过辉煌的战绩，因此想将台南的工厂部分机器迁移过去，跟当地人合资投厂。


    李先生曾习斗数近十年，就业余水准来说，段数算是很高了，此次行动，我们曾有如下讨论：


    一


    实质上的困难；万一发生困难，也比较无法妥善处理。禄忌牵引，大环境主动，什么事都不做（退隐，优游林泉），可能性不高。


    禄星太阴在亥，这是大限的妻宫，婚姻基础牢固，晚年走这种好运，作用不显，但该禄照射事业，对事业的执掌、开创、经营都有助力，不妨藉题发挥一下，成功率还是蛮高的。


    不过，忌星巨门自坐，心理受到干扰，常思变动，换一个角度说，内心的统一性被打'
