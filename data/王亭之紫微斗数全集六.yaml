- md: '## 福不全


    忌星進入夫宮，破壞婚姻，是否如同古籍所載，生離死別，一婚無法到底。


    忌星具有干擾、破壞，使之失衡的作用，忌星侵入夫宮，多少扭曲正常的婚姻觀念，進而破壞婚姻的穩定性，但不必然生離死別或幾度婚姻，因為婚姻的成敗，還須輸入配偶的條件，也就是看你嫁給誰，而死別是特性，不可推算。


    古代命理家不了解其間的關係，以為婚姻成敗完全取決于一個人，我們也從此隱約看出，封建時代男人至上的觀念深深影響命理的推論。


    古書還說『女命昌曲福不全』，見《清朝木刻陳希夷紫微斗數全集》（女命賦），我自覺福氣還蠻厚的，除了婚姻略有瑕疵之外，其他該有的都有。


    這個賦文缺乏客觀性，丟進垃圾筒可也。


    所謂『女命昌曲』可以是昌曲居命，那非卯酉時生不可，否則免除『福不全』的厄運，顯然缺乏普遍性。若只是會照，範圍就廣泛多了。


    『福不全』的福，應指福氣、福澤、福份等等，理論上是看不出的，因為命理無法推測或掌握那些抽象又具有個別差異的事項——福澤或福報都是佛教探討的主題。


    我在庚子大限中，憑媒灼之言，跟認識不到半年的鄰村男人結婚，這段婚姻也許從癸巳年開始就是錯誤的，我們仍然維持了十四年，到三十八歲那年才簽字離婚，如果忌星冲破夫宫造成离婚的作用是假的，那么问题的症结究竟在哪？


