    波動性強的命難耐枯燥煩瑣的行政業務，多半在任職一段時日后跳出來自我開創，如此而已。好運來得很早，初出茅廬就是一步佳運，蓋甲辰大限結構壯觀，廉貞祿在事業宮內坐守，事業環境十分良好，無論上班、換業或者創業，都會順利成功。乙巳大限是壯年期，天機祿從卯沖酉，這個酉也是大限的事業官，繼續挺進，二十年事業吉運下來，必有彪炳業績。乙巳大限忌星太陰進入丑宮，乃大限財官也利事業經營而不利進財。


    命理學有個經驗法則——「發過不再發」，經歷一個高峰后，不可能再遇另一個高峰，此命早發，丙午以后便無運可走了。


    說法相差未免過於懸殊。


    「爵祿榮昌」只是一種假相，不要受惑。此限財源盡破，會忌不會祿，見凶不見吉，只能墨守成規，貿然擴充，焉有不敗者。


    （一）祿星天同在亥，乃大限的合伙宮，圖利他人、照顧他人，幫別人發財而已。

    （二）忌星廉貞在申，這是大限的福德宮，此宮被沖，財源中斷，不再是什么錢都賺得到的情況必不能免。


    福德與財官對照，自然也破壞了錢財支配的穩定性，此去十年浪費、損財以及開銷大的情況必不能免。


    若要新創，堅持不做老板（讓賢），只站在協助的立場，把決策權交出，即可無咎。


    丙午大限是七殺朝斗，主「爵祿榮昌」，應該與發駿業，为什么反而變成劣運？兩種


    ### □我們的企業預定壬申年出走，轉進大陸，此時做此事，吉凶如何？


    □大型、長期的投資多屬緩慢成長的行業，大環境必須佳美，才能維持，并立于不敗之地；遺憾的是整個大環境竟然不利從事這樣的轉變。

    流年宮位在申，三方結構強勢，所以想做就會着手進行，但宮內的忌星（廉貞）是大限所化，信心不是很多，其他有關祿忌牽引的吉凶分布如下：

    （一）祿星天梁在巳，大限的兄弟宮兼流年的子女宮，均與事業無關，不會帶來助力。

    （二）忌星武曲在子，大限的遷移宮，也是流年的事業宮，歲運相加，不就是一幅『出外做事不吉』的景象嗎？

    如果事業非由本人親自掌權，或者分幾個階段完成（今年之內不會全部完成），也許會出現緩衝的機會——不會一下子就兵敗如山倒。其實，甲戌年才是投資甚至進行各種改變的吉年。


    ### □未來的丁未大限命宮無星，顯系弱運，處在那種環境中，我還能做怎樣的踢騰？


    團保平安可能，添福壽則有困難。

    祿星太陰在丑，遷移宮也，人際關係不錯，從事推銷、中盤批發、國際貿易、業務代表等往外發展的行業，多有斬獲。忌星巨門在卯，大限的財宮，與上一運略似，財官受到干擾，賺錢不易，破財、損財以及被客戶倒債的情形，層出不窮，必須特別留神。


    ### □有些命書指出，田宅宫强旺、見禄，可以投資房地產，并可能獲得祖產，我有這方面的機會嗎？如果可以投資，何時適宜？


    □那種說法，不可盡信。

    先天田宅宫雖然可以類化爲祖居，却不在可算的範圍之内，因爲祖居由親族所共有，分家之后，本人能分到幾甲或幾坪地，必須輸入别的條件，并非每個人都無例外。

    一個人能不能投資房地產，那是后天行運遭遇的事，宜觀察大限田宅宫的旺弱，大致上說，此宫見忌，財物結構脆弱，從事巨額投資，極易因爲周轉不靈而弄得血本無歸。

    財源被破，大環境時時刻刻籠罩着損財的陰影，有動輒得咎之象，臺灣房地產的投資充滿投機，這種運程易被套牢，不然就是該賺的没賺到，不該賠的却賠了。


    ### □那么投資股票又如何？我指的是短期投資，搶帽子那一種。


    回炒作短期股票不但需要技術，而且需要運氣，技術可以學習，運氣目前没有。由于影響股市漲跌的因素實在太多，實非單純的命理所能掌握，完全交給命運，好像没什么道理。

    財源弱勢，不是隨便投資都能賺的錢，最好守己守分。若真的對股票買賣感興趣，不妨利用中綫做短綫，不然干脆放長綫釣大魚，可保無咎。'
