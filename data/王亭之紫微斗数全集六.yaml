    这种命这辈子若说有什么值得探讨的，将不在成不成格，拥有什么样特殊潜能；也不在于是否照入辅弼，懂不懂得左右逢源；而在于禄忌交驰，吉凶并见，纠缠不清，无法确切判断人性的善恶优劣。


    禄星产生的稳定，自信和忌星产生的干扰、破坏力量，将同时出现在生命历程中，能否抵消？答案当然是否定的——两事同时存在：将造成什么影响，端视它进入哪个宫位而定。


    夫宫无星，看来婚姻基础也不好。


    回夫宫无星只是小事，严重的是再遭忌冲，无星的宫位本弱，忌冲是破坏该宫的均势，弱宫好像本来体弱多病，再患重疾，就有活不下去的感觉，有俗话说的『屋漏偏逢连夜雨』那么凄惨，必须随时避免发生问题，否则只能流泪看它落花流水。


    该忌从事业射入，暗示要先料理事业，等事业稳定，再谈婚姻，甚至于可以这样说，不管婚姻的结果如何，事业不能放弃，也就是不能做全职的家庭主妇。


    我现在南部某县政府地政单位上班，似乎注定要过安定日子，空闲时间喜欢谈玄搜秘，研究人生哲学，对命理、宗教、冥想音乐都有很高的兴趣，忘记哪本书说过，天机星照命的人有研习五术的倾向——此说是否为真。


    台湾坊间可以买到一本斗数专书，作者说故事一流，他认为所有星曜都是周朝伐商将士的化身，破军是纣王，天机是周朝三军总司令姜子牙，因此天机坐命，乃姜子牙再世，谈玄学仙，修习五术，卓然有成，天机不坐不照，想学好斗数，门都没有。


    其实机月同梁加吉，安分守己，选择上班将是此生所愿，能拥有一份不错的工作，就心满意足。闲暇研究佛道命理，也许兴趣使然，不必跟星辰扯在一起，这些事谁都可以做，正如同谁都可以吃牛排、意大利披萨一样。


    ### 二


    人生苦短，生命历程充满不可知的变数，据我观察，我的生长周期一定坎坷崎岖，否则福报不会这么差，日子过得这么辛苦。依我自己的浅见，必须进入甲申大限后才算否极泰来，盖廉贞禄在迁移，命局洋溢着一片祥和，但好运来得太晚，有用吗？


    确如所论。除甲申大运外，辛巳大限也是不错，甚至比甲申殊胜，详情分析如下：


    (一) 辛巳大限是机月同梁组合，财宫最弱，对上班族来说，无关紧要。巨门化禄在西，乃大限事业之宫，初出茅庐，即可获得赏识。文昌忌在子，体能略差，但无大碍。


    (二) 甲申大限是杀破狼，强限无疑，冲击起来，力劲更猛。廉贞化禄在寅，这是迁移位外出发展大吉，从事武市行业像国贸、批发、业务代表，均属吉祥，吃头路做内勤，作用不显。俗话说，迟来的好运不算好，盖已无福消受也。


    一生的最劣运在午，那是个强限，属于弱命走强运，环境壮观，行运至此，大概都想借着运势的冲力做些转变，不知你有没有那种冲动。武曲化忌自坐，破坏均势，内心浮躁，无日无之。癸未大限是个静运，表示壮年以后有一个平稳的历程等着。


    壬午大限很破，会不会犯过而被解职，导致换业？


    可能会也可能不会，因为此事牵涉的外境很多，非命理所能完全掌握。如果把去职、降调、扣薪等等当做一种灾难，这种事显然无法从命盘或八字中预知。


    曾想出国念书，学些手艺，在不久的将来可望如愿吗？


    这是一个现实问题，宜从现实环境中考量。依目前的制度，想赴欧美留学，须先通过托福考试，申请学校，然后才能成行，这两个阶段均非命理（而是现实）。短期习艺不必这么麻烦，只要有钱有闲，即可成行。在庚辰、辛巳两限中出国深造，吉祥如意，一定可以顺利学成。


    ### 三


    命夫二宫无一主星，到底暗示我或对方迟婚较吉～有没有记载说我要嫁一个年纪较大的人～过去有人说，照见太阴月亮这类星辰，婚配对象宜长不宜少。


    命夫之宫无星跟早婚晚婚并无直接的关系，而跟个人对婚姻所持的心态有关。日月只是十四主星之一，本质是中性的，不会去管人家对象的年岁，不必怀疑。


    看得出我的婚讯约在何时吗？


    这种类型向往安定，适合在第二运，也就是辛巳大限出阁，二十五岁以后对象出现，即可踏上红毯，共组家庭。


    夫宫无星又遭忌冲，婚姻前途难称稳当，充满变数，必须深思熟虑，考验真实的感情，才能确保无碍，相反的经常意气用事，缺点一一暴露，必遭不幸。迟婚也许可以改善，因此辛巳比庚辰吉祥，拖到辛巳大限，算是改善了一大半。此限巨门禄照入先后天命夫二宫，形成一个有利的环境，择偶成亲，喜气洋洋。


    辛未年认识一男孩，能看出他是否为我命中所爱？


    曾跟他花前月下，卿卿我我，谈过恋爱吗？


    为什么要这样问？


    非最好的一半 (the best half)，因为你永远不可能知道谁才是最好的，以及何时出现的才是最好的。有些演艺人员坚持没有最好的不娶不嫁，结果青春蹉跎，那是不解婚姻的本质，咎由自取。


    他大我两岁，好像是甲申年生（属猴），看得出他的职业、钱财和其他有关的事项吗？


    如果我们终能结合，会不会产生刑克现象？


    **□ 职业**可以选择，其他事项属于私事，命理推测不出。


    至于刑克之事，不如想像中那么严重。他将巩固你的婚姻，让你觉得跟他在一起（或嫁给他），安全可靠。唯一的缺点是跟你的子女感情不融洽，这点也要仔细考虑。


    有些情侣平常在一起没事，一旦踏上红毯，就会发生意外，导致生离死别，从命盘上看，我们有无那种现象？


    **□ 不知道**。


    为什么铁板神数能明确告知一个人『夫长四春』属牛，姻缘而未曾付诸行动，不过萍水相逢，只能运用迁移宫来观察了。但是此年认识一大堆人想从中筛捡这样的人，恐怕也是困难重重。


    遗憾的是，没有付诸行动。不知何故，对于走进婚姻，我内心隐然有种不安定感，现在的心境虽已逐渐稳定，仍不想被婚姻套牢，因此辛巳大限后期甚至拖到壬午结婚的可能性很高，婚姻专家说，姻缘（感情之事）十分微妙，该来的不请自来，说不定明年就发生了，一点办法都没有。当然，若能预知他是谁，不是可以避免浪费时间和感情吗？


    婚姻的本质存在着太大的变数，没有人能够确切知道那个人是谁，何时现身。英文『the better half』翻成中文是较好的一半而天成。


    其实铁板神数只是一种江湖算命式，利用文字魔术套出有关的六亲生肖和他们各自的消长，那些事实坦白说都是顾客自己说出来，并无参考的价值。譬如你被批出『一夫又一夫，移栖三枝，数中注定』，看谁还敢惹你？


    夫宫见煞忌，婚姻有破，一婚不能到底，该如何趋吉避凶？我可能出家礼佛吗？


    千万记住，婚姻的成败必与配偶的良窳有关，依例须输入配偶的条件，才能推论，这是一个定则。古人和一些当代命理家完全不考虑这样的规则，客观度当然值得怀疑。忌冲之宫所象征的人事物往往成为生最弱、最无力克服的一环，必须小心维护，像保护一个价值连城的古董一样，才能和谐圆满。


    至于要不要出家，那是一种选择，自己决定。


    那么你看我嫁给哪种对象，才可能白首。


    婚姻成败的检讨，自从两个部分进行，一是相契，一是刑克，前者必须出示对象的命盘，若无对象，只能退而求其次，观察刑克，这个部分所占比例不高，不必疑虑。最好的对象要数辛丑、庚子这两种年次，其中辛丑年会付出他们最诚挚的关怀，庚子年则巩固了婚姻


