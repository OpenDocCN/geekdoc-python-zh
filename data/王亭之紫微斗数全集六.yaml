    我们不排禄存，因为那是八字的概念，斗数主要星曜除十四主星、六吉六煞外，并无一颗禄存。命坐禄存，前后必是羊陀，正确的说法是『羊陀夹命』，终生难逃受人牵制的命运，何人制你？父母和兄弟姊妹也。生命历程中，总觉得有种无形的压迫，必须戒慎戒惧，委屈求全，包括待人接物、自由思考，老觉得施展不开。


    禄忌交会于命宫，好坏吉凶，不能十全——好不能好到底，坏也不会坏到底，总是一山穷水尽疑无路，柳暗花明又一村。


