  md: '# # 紫微批命法提示


    一、紫微斗数推命的运作步骤：


    如果时间出现误差，则推出的结果必然与实际情况风马牛不相及，所以这一必要的步聚不可忽视。一般的定时方法，主要根据命宫的星曜对照来人的长相和性格来定。达到一定的水平后，还可以推两件以往发生的事来验证命盘。但这需要对星曜附性了如指掌，对各种格局和多星组合所克应的事情，以及各种斗数理则有准确的把握。对于初学者来说，一时还很难做到这一点。需要不断学习和反复实践。如果发现推论的结果与求测者的经历不符，则可用所报时间的前一时辰和后一时辰再分别排盘以作校正。


    二、命盘确定后，再根据命宫的三方四正星曜组合，定出命主的格局，并根据吉凶星和四化星曜的会照情况。确定格局的成败及高低程度。这样，根据这个格局的性质就可确定命主的发展方向职业，大致是哪个层次的人，即社会地位的高下等。如果没有明显的格，就参看官禄，财帛和迁移宫星曜组合强弱程度，以确定命主的贫富贵贱。


    三、格局已定，再分析命主的六亲情况和一生各方面的得失。大致包括以下内容：如父母有无刑克。自己有无离宗庶出，过房改继，兄弟人数多寡，贫富如何。以及对本人有'
  merge: -1
  pgno: 250
- img_proc: true
  md: '無助力；愛人的性格如何，有無刑克，能否白頭偕老，岳家家庭狀況如何；子女人數多寡，有無成就，帶刑克否；再看奴僕宮星曜組合，以斷定命主的人際社會關係，同事朋友間能否對自己有所幫助等等。另外，福德宮、遷移宮、財帛宮、官祿宮、田宅宮、疾厄宮也要一一詳查，以明被測者各方面的得失。


    # 四、接下來再看運程的起伏。


    在看運程之前，可先不理會原命盤上各宮所代表的具體意義，只看哪些宮位的三方四正能構成格局，哪些星曜組合，會呈現出某些吉凶顯象。如提升，出名以及各種凶傷疾病等等。儘管這些顯象在原命盤中與命宮無關。但在大限流年走到這些宮位時，則必然會出現與此相吻合的克應。但必須注意的是，大限的成就又受原盤命宮格局的制約，假如一個命宮格局不高的人，即使行到大紅大紫的大限。也決不會陡然成爲國家要員或者名商巨賈，只是相對本身來說，社會地位得到很大提高，或者個人財富的積累得到增加。另外還要細審大限的四化星以及各種吉凶星對這種格局或各種吉凶組合的發揮或損抑程度。以確定出一個大致定量的結果。


    # 六、在大限的總趨勢下，去看大限所轄的哪一個流年會發生大限所顯象的各種事類。


    以及流年，小限本身又會受四化及流曜的影響而出現哪些吉凶組合。如羊陀疊并、七殺重逢、雙祿夾輔、雙忌夾忌、合祿拱祿等具體情況（這些名詞的定義請參看后面的答疑內容）。這樣，對一個命盤的運程起伏就有了一個清楚的認識，達到一定的水平之后，還可斷出'
  merge: -1
  pgno: 251
- img_proc: true
  md: '各種顯象究竟發生在某一流年的什麼時候，或者哪一個具體的月份。


    。以上詳細介紹了紫微斗數推命的實作步驟。如果能夠大致達到上述每一個步驟所要求的標準，并且準確率超過百分之八十以上。那么，您無疑已經成為一名具有高段水平的斗數專家。當然，這絕非數日之功，所需要的時間長短需視個人的悟性和努力程度而定。紫微斗數的獨特之處即在于無論指哪一大限和流年，都可以根據一定的原則去推算它的吉凶休咎，給出定性乃至定量的準確斷語。功夫高者當然語驚四座，即使稍有基礎者，也可就各宮的星曜組合作出一定層次的論斷，其準確性決非一般江湖術士可比。


    # ### 二、借星安宮原理:


    在紫微斗數的諸般法則中，有一個極為重要的內容，即借星安宮。在斗數十四大主星所構成的基本命盤中，除紫府同宮的組合之外。每一個命盤都有兩個到四個空缺的宮位。那么，這些宮位的性質究竟應該根據哪顆主星去確定呢？答案是：借對宮的星曜來評判


    ![](img/ba71cd450f8ceda4f93ce5470e449489_252_0.png)


    • 252 •'
