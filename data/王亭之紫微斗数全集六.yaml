    二十五、三十四岁大限走到戊戌。为贪狼入庙坐守的宫位。因有『贪武同行』的大格在，以大限宫干使贪狼化禄在大限的命宫。主这步大限飞黄腾达，非同小可。二十八岁戊戌年，流年走到大限命宫坐守的宫位，年干又与大限宫干相成大限和流年的命宫贪狼叠禄。使『贪武同行』格的威力发挥到极致。主该年平步青云。锦上添花。事实上命主于该年『成进士改翰林院庶吉士。』而三十三岁癸卯年『以侍讲充四川乡试正主考』，乃因流圻三合方会大限的巨门化权，太阴化科冲起原命的『文曲化科』，所以主文书之喜。


    ![img/ba71cd450f8ceda4f93ce5470e449489_229_0.png](img/ba71cd450f8ceda4f93ce5470e449489_229_0.png)


    三十五、四十四大限行抵酉宫。为大限主星太阴庙旺之地，得三方辅弼，权科拱照。

    大限太阴化禄与原命禄存同坐命宫。大限禄存又在财帛宫照入。赋云『合禄拱禄。定为巨擘之臣』。因有原命的上佳格局在。必主功成名就。蟾宫折桂。至于福巨门化忌，乃因重任在户，自然殚精竭虑，不得安宁。四十五、五十四岁大限行抵申宫。为『紫府同宫』格，集南北斗主星于一宫。所以贵为三军统帅，战功显赫。至于官禄宫廉贞化忌，乃吉中藏凶之象，有血光病变之兆，万事宜小心谨慎，不宜倨功自傲，更不宜侥幸弄险。观曾国藩一生名利之关键。全在这两步大限之中，自四十二岁奉旨办团练。直至日后因攻克金陵，生擒太平天国忠王李秀成，赏太子少保衔。锡封一等侯。位极人臣。无不可从命盘上一寻其轨迹。至于其中也有惊险反复之事。乃流年运使然，但因大限的吉化力，而终于有惊无险。学者可对照其履历。一一细研，当不难发现个中机关。


    五十五、六十四岁大限行抵原命疾厄宫。乃落陷的天机坐守的宫位。三方四正的四化星呈吉凶交身之状。虽有本宫天机化禄与天梁化权的禄权佳会的辅助，但福德宫的太阴化忌及官禄宫的文昌化忌对落陷的天机构成的凶象也不可忽视。大凡主星庙旺者虽见煞星也足可抵挡。而天机星本就不是一颗星力强旺的星曜。又加上居落陷的宫位。所以难免吉凶不定。有运程回落之兆。主要表现为精神上的意志消沉和行动上的奔波劳碌。而官禄宫的文昌化忌明白地显示这步大限中有文书上的失误。这就是后来因教案一事，与外夷签订条约而致威名重挫的命理依据。六十二岁壬申年，福德宫武曲化忌。加上小限疾厄宫坐大限的太阴化忌。又受流羊流陀交相冲照。该年疾病身亡。


    从以上的推理过程可以看出：紫微批命法即先从原命盘所形成的格局来推断命主一生的社会地位和所从事的行业状况，并可以从原盘对六亲作一个大致的推断。然而再由大限所形成的格局以及四化的牵引来断命主一生运程的概况。从而在大限的既定前提下去细推流年。就可对命主的人生历程有一个清楚的把握。


