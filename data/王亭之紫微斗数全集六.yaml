    |己巳命宮|庚午|辛未36-45|壬申|

    |戊辰|武曲化祿|己丑月×日午時|癸酉

    |丁卯|天同| |甲戌命宮

    |丙寅|七殺|丁丑|丙子|乙亥|

    | |廉貞|天相|天魁|天鉞|


    殺破狼加煞沒錯，但是加吉更多，看來氣勢仍嫌不足，傾向柔和安逸，一點都不覺得意外。


    里外祿忌交替，吉凶並見，樂極生悲，悲極生樂好像光影那樣，在眼前虛晃著，說好也好不到底，說壞也壞不到哪里去，只怕內外交戰的結果，內心敵不過現實環境的壓力，要是續堅持真善美的信念，那就是自討若吃。


    • 140 •'
  merge: -1
  pgno: 140
- img_proc: true
  md: '一下，才能達到趨吉避凶的效果。


    此限是機月同梁組合，環境柔和，在安定中求進步，按步就班，逐步擴充，是此去十年的特色。祿星巨門在亥，大陰事業宮也，顯示此刻正在走事業好運，成功率高，可以創業或從事各種興革。


    忌星在辰，乃大限子女官，親子關係溝通不良，常見齟齬；對生意人來說，田宅就是財庫，庫破則庫存少、財務結構不佳，從事長期投資和回收慢的行業要小心，以免弄得血本無歸。


    ■這是哪門子的算命法？千萬記住：吉就是吉，凶就是凶，吉凶各有宮位，找出來確認


    □甲戌年后交入庚午大限，是否仍有上運的吉祥？


    恐怕沒有。


    辛未是個動運，動則有利；庚午是個平運，蟄伏狀態，一動不如一靜。庚午大限殺破狼結構不弱，但祿（太陽）忌（天同）均不照命，事業、錢財和人際關係這些方面沒有大起大落之象。


    此限受羊陀夾制，冥冥之中，好像被人和被環境強力掣肘着，外境壓力甚大，無法想到做到，跟四十五歲以前那種情況相比，差別很大，準備大顯身手時（通常是擴充營業、別創新業、感應較強），要多加一層的考慮。如果延續舊業，未來這個十年仍算好運，業績可觀。'
  merge: -1
  pgno: 141
- img_proc: true
  md: '# # □己巳大限呢？


    □情况与庚午大限略似，禄忌未动，静运一个，没有大事，宁静度日而已。


    □是否表示二十年内，什么事也不发生？


    回我想，处在这样一个多元又急骤变化的社会里，不可能什么事都不发生；偶遇流年禄忌牵动（进入大限命宫及其三方），就会蠢蠢欲动，只不过大环境支配的力量大，流年瞬间即逝，想做重大变革，必须通盘考量，才能无咎。


    # ## 二


    □如果我利用别人的力量成就我的事，可行吗？他们会不会认为我只是『死道友不死贫道』不够意思？


    回禄在别人的宫位，图利他人，明矣，因此主动帮别人忙，他们感恩图报，你自己也能接受好处，这种互蒙其利的行为何乐不为。当然仍要分辨吉凶分布的状况，探知何者可行、何者不可行，而不能含混带过。


    （一）庚午大限的合伙宫在亥，太阳化禄在兄弟宫并照入合伙宫，直接图利个人，譬如借钱给人、帮他们拉生意；天同化忌在卯，合伙人的事业宫，显示他们的事业目前颠沛流离，跟他们合作事业易遭连累。


    （二）己巳大限的合伙宫在戌，忌星居中，跟上运相反，合伙存有戒心；他们的迁移宫（在辰）有禄照入，最后还是会帮他们忙的。这等于说，禄忌交替，吉凶参半，有好也有坏。'
  merge: -1
  pgno: 142
- img_proc: true
  md: '要不要合作，應就現實的需要來決定——合伙的對象屬於不確定，最好輸入他們個別的條件，才能客觀，此處僅作概念性提示。


    □我一直幫太太照顧她的美容院，因為女性普遍愛美，這個店經營得還算興隆，最近準備再開兩到三家連鎖店，其中一家跟別人聯盟，未知是否可行。


    □如果只是純投資而不參與業務（由別人全權經營），那么那家店面的興衰，無法使用你老兄的命盤進行推敲。


    事業宮見吉，自己動手，凸顯吉祥，進而獲福；交給別人，或者自己没什么興趣，經常不來店里走動，那么該店的命運就由那個替你跑腿的人決定。假如迫于情勢必須選擇后者，不妨找個目前運勢不錯的人，給他一些股份，他會幫你擺平一切，包括賺錢。問題是文昌化忌在辰，那是合伙宮（在子）的事業宮，想找這樣的助手還真不容易呢，看來仍然迫切需要老爺親自出馬。


    □明年想赴國外（法國或美國）深造，你知道我們這行追求時髦，時時刻刻自我充實，否則有被三振出局之虞，我想了解的是，我去好，還是太太去好？


    □辛未大限的田宅宮受到忌星干擾，可能應驗喬遷，居無定所，自然也意味着離鄉背井，到處奔波。至于外出的目的，必須經營事業（求學也算），才能得利；若是求財，顯然弱勢。


    · 143 ·'
  merge: -1
  pgno: 143
- img_proc: true
  md: '□在經營行業方面，我也許還會做些調整，壬申、癸酉這種年份，哪個較吉。


    □壬申環境強大，紫府右弼，君臣慶會，可以號召一些朋友共襄盛舉。天梁化祿在丑，大限遷移位，舊業此年聲名大噪，并可獲利。新業因爲武曲化忌進入流年財宮，則賺不到錢；臨時起意的求財行業不僅無法得財，還有破耗之象，套句俗話，就是偷雞不着反蝕把米。


    癸酉年是辛未大限最后一年，意外平靜，没什么重大事項臨身，可以舒一口氣。破軍祿在午，大限的兄弟宮，也是流年的子女宮，均與歲運三方無涉，貪狼忌在戌，乃大限田宅、流年的父母宮，也都無涉。


    □有人告訴我，甲戌年才是理想的年，大吉大利，有橫財進帳，可信嗎？


    □略爲可信。


    此年起大限進入庚午，大環境因爲不受祿忌牽引，依舊靜止，但一交運就出現一些變動，只是情況烈。


    廉貞祿在子，乃大限遷移宮，外出得利；也是流年福德位，照射財宮，財勢佳美，任任何求財行爲都可獲利。歲運相加，今年出外賺錢，可以如願。


    太陽忌在巳，大限的兄弟宮，没什么意義。'
