- md: '## 一文桂文華，九重顯貴、一朝斗仰斗，爵祿榮昌，現代人隨便瞧一眼就能判斷那根本是不可能的。


    ### □『君臣慶會』既然都不足以言貴，該怎樣的結構才能顯達


    襄理已是高級主管，說是「君臣慶會」之福，一點都不為過。有吉而無煞，傾向文職顯貴，在事業上力求表現，締創彪炳業顯，較無意外。由于具備了發達的條件，當比一般命格容易貴顯，追求社會地位，建立個人聲望，宛如桌上拿柑。煞星遁形，優點是可以免除肉體與精神上的煎熬（通常也會拒絕接受煎熬），一般世俗所盛贊的「好命人」或「有福氣的人」但缺點更多，冒險犯難、怒犯天條等霸氣，將一無所有；相對的只能蕭規曹隨、「歌德派大將」。缺乏煞星也無法學習專業技術和特殊技術，只能從事一般行業。


    ### □我辦理的業務大部分是放款，工作煩瑣，没什么成就感，將來可能轉業嗎


    紫府都是帝座，坐南帶會北帶的人極易幻想他就是皇帝，無論存乎于心或是形之于外，都給人一種高高在上、君臨天下的感覺，故性格難免桀傲，手段難免高壓，不管任職自創，都會取法乎上，律己苛人。


    **不過**，這樣的結構仍以任職為佳，在大衙門奉公，循序漸進，多能發揮所長，升到一個不錯的職位，自創力量有限，格局太小，浪費生命而已。


    ### □如果不靠算命，我們憑什么方法可以獲知運勢的強弱？


    其實每個人都有預知的本能，只不過受到欲望、貪念和各種現實環境的污染、覆蓋。


    才慢慢消失。舉個例說：幫別人猜六合彩號碼，一定中獎，可是自己簽注，一定不中。


    那是因爲有了欲望（得失心）后，預知能力跟着消失。


    佛教的天人跟道教的神仙類似，他們因爲修福而生在諸天，等到福報結果，仍會依照個人原有的業緣，天人福報將盡，會出現這五種衰相。


    （一）頭上花萎。

    （二）腋下出汗。

    （三）衣裳垢膩。

    （四）身失威光。

    （五）不樂本座。


    十幾年前自殺身亡的日本作家三島由紀夫生前出過一書叫《豐饒的海》，其中收有《天人五衰》一文，描述的就是上述情況。一個人的旺運已盡，衰運即將到來，也會逐漸發生天人一樣的衰相，稍微留意，定能發現。


    ### □我們又不是天人。


    不必如此妄自菲薄。在佛陀的心目中，每個人都是一個尊貴的佛。


    三


    （幾天以后，我們又有機會討論他的命運，仍是他問我答。）


    ### □戊甲大限諸星吉祥，算不算一步好運？


    斗數的吉運泛指祿星（大限化出）進入大限三方諸宮，尤其事財二宮，因為那是一般人奮鬥的目標。從整個運程的消長看，好運來得極早，辛亥大限就遇上事業吉運，巨門祿在事業宮盤踞，讀書考試，順利無比；過此，則有連續二十年的平運，一切呈靜止狀態，即令有什么重大事項發生，也是別人的牽連。


    戊甲大限是個動運，后勁很足，可望發揮所長。


    ### □戊甲大限臺狼祿在遷移位，古書只說『化祿遷移位，發財于遠郡』就拉倒，我一直做內勤業務，呼應不到祿的吉祥，還算不算好運？


    當然算好運。此限結構甚旺，沖激力大，貪狼祿在遷移位引動，外緣佳美，往外發展的行業多能順利開展，只不過門市與內勤未能充分呼應，好運像是飄在天空的雲彩。


    天機忌侵入健康宮，體能受到干擾，還望善自珍惜。


    ### □丁未大限太陰祿仍在遷移，與目前的這步大運有什么異同？


    圖其异有二，一是命無主星，自主性弱，外境的作用力大，常受環境的影響而改變初衷吉祥，人緣大好。

    一是巨門化忌進財，有損財、無端破財等情。其同只有一，祿在遷移，外出獲利，人際關係為什么還會升官？不該升而升，是否暗示以后還會再動。此外，你看我何時升上經理？跟總經理寶座有緣嗎？


    升官的事跟个人的命运有关，但并非必然有关，此事尚牵涉许多外境——老板，（包括各单位主管）的支持、个人的努力，都足以左右，显非个人微薄的力量所能承担，因此命盘上不一定显示升官、贬谪的各种轨迹。


    ### □壬申年政府开放银行民营，有个熟人想拉我到一家新银行，条件是给我当业务经理，那是一个肥缺，但压力很大，我胆子小，几度细思量后，终于放弃，还被同事冷嘲热讽一番呢。


    ### □从本命看，这种人冲劲不是很足，新开的银行急需冲刺，冲起来会倍感艰辛，容易产生水土不服。


    从运势看，目前的运程很强，可以考虑。不过，壬申年武曲忌就在流年的事宫，此年进行的任何一项新的转变就是我们常说的『坏的开始』，未来的日子就不会太顺畅，若真的有此意图，不妨等一两年后再说。


    ## 過不再發


    ### □殺破狼因為動蕩，所以晚發，例外的情況仍時常發生，譬如我這個命，甲辰大限廉貞祿在申，二十四歲起就走了好運，這種例外究竟是吉是凶。可以視爲不吉，但不必然是凶。


    關鍵在于殺破狼加煞需要現實環境的磨礪，一個人處在順境中，諸事順遂，談不上什

    么歷練——只有在逆境中，到處碰壁才會反省，早遇吉運，顯然找不到歷練的環境。從另

    一個角度說，早發的人必受「發過不再發」的自然律所規範，中年以後無運可走，此后想要

    登峰造極，奈何時不我予。


    ### □不加煞的話，早發可望順理成章嗎？


    原則上可以，殺破狼無煞（尤其還加吉），有如機月同契，耽于安逸，生命歷程欠缺冲

    激，早發晚發，便無差別。


    ### □我擁有那么多异格，它們之間會不會相互抵消？因為我曾經看過有些專家主張「祿多不吉」、「忌多不凶」。


    貪狼跟火鈴陀分別構成的特別格局，那將產生無窮的潛能，開發出來，必能創造彪

    炳業勳。其中火鈴與貪狼會照，構成「火貪」、「鈴貪」武格，得以「威鎮諸邦」，從事專業


    殺破狼加煞（必須加煞，越多越顯），需要現實的磨練，所以“不發少年人”，這一結論已成爲一個通例；但并非毫無例外，不能發現有人例外就咬定統計出了問題而加以全盤否定。


    不發而發是逆自然，我們主張打破傳統能發就好的觀念，還逆要看發的時間對不對。“發過不再發”則是自然法則，極少例外，人不太可能超越自然，除非他已名列仙班，不食人間烟火。


    ## 過眼雲烟


    - 我的事業宮是廉貞、天府和擎羊，從這些星辰中，能斷我從事哪種行業。

    - 圖行業可以自由選擇，也可以隨時更換。我不知道你願意做哪一行。就命理而言，事業宮的作用不是拿來推斷一個人該從事或曾從事哪種行業，而是診斷他做的行業是否適性，這是后斷；若是先斷，則提供一些適性的行業，以免走了冤枉路。

    - □其實我沒有別的意思，我既非沒有工作，也不是想改業；我只是想了解我這樣的命該做哪種行業才算適性，是否發揮了我的潛能。我一陣子像發了瘋似的到處算命，有人指出我這個命應該是個女強人，擁有事業，但為夫操勞，福澤有損；也有人堅持這是一個破格，勞碌而終無所得，最後連我都懷疑我為什麼五十幾歲了竟然越活越倒退。

    - 不知哪根筋出了問題

    - 圖不知該如何描述的性格、根據命盤顯示，坐紫會府，結構壯觀，輔弼照入，格成『君臣慶會』，雖是女流之輩，仍具有領導統御的潛能；雄才大略，得以號召百萬雄兵（她突然笑着打岔說：「我連領導十個人都覺得困難重重。」），成就一番事業，絕不是蓋的。

    - 擎羊、火星會合，增強積極性和沖擊力，並與諸星構成兩個特別格局：


    1. （一）火貪格。古書譽此能『威鎮諸邦』，是個戰將格，獨當一面，開疆辟地。

    2. （二）火羊格。古書譽此能『威權出衆』，意指任何行業，都能出類拔萃，峥嵘頭角。


    煞星畢竟煞星，蘊含着強烈的挫折與挫敗意識，這種人一輩子不得安寧，鞠躬盡瘁，死而后已，不過也從中磨練了積極與韌性。若將煞星的本質誘發出來，也就是學習專業技術，并從事專業行業，將可一發如雷。若無技術，或只是一個全職的家庭主婦，那么內心波動，懷才不遇。


    ### □吉煞混雜，有什么特別的作用。


    ### □五吉二煞，文武皆備，文的成分多些，所以學習技術，多傾向于文，其他像詩詞歌賦，多少涉獵一些：文昌與貪狼形成惡格，有用非所學、不務正業的傾向，做事不專心，時時想改弦易轍，恐怕也是一生無法改善的缺點。


    ### □忌星坐命，有什么現象。


    忌星有干擾、破壞，使之失衡的作用，忌在任何一宮，往往也是一生最無法克服、無法妥善處理的致命傷。忌在命宮，影響的是正常運作的心理狀態，始終有種與衆不同、標新立異的想法，他可能在參與的社會中稱霸，甚至征服了世界，可是唯一無法克服的頑敵，竟是自己。


    ### □禄在疾厄宮，并照入父母宮，此二宮遥遥相對，相互感應，到底是健康的問題多，還是親情緣份的問題多。


    □禄則有穩定、自信、享受的作用，禄在健康宮位，涵義最爲模糊，因爲健康具有相當大的個別差異性，換句話說，只要時辰相同，命盤便無不同，可是他們的禀賦却千差萬別，因此禄在健康的官位究指何義，實在不知。


    ### □性格剛烈的人牝雞司晨，為夫勞累，福澤不厚，是否有此一說？


    □星曜過旺，性格剛烈，易碎易折，不知妥協，進而與人為善，所幸煞不多，不會損人利己。

    命宫旺于夫官（仍須三方結構一齊斟酌），確實有點牝雞司晨，妻奪夫權，為夫爲家操勞，是跑不了的。


    ## 二


