    # # 利陷


    答：各星的廟旺利陷無規律可循，但如果熟練掌握了各星隨宮位的附性差異則廟旺利

    陷自在其中。八吉星及六凶星的廟旺利陷請看《詳述》第三章的內容。對於其中没提到廟

    旺利陷的星曜以及四化星則無廟旺利陷可言，則隨主星的廟旺利陷來決定其作用力的大小

    程度，主星廟旺則吉，落陷則凶。


