  md: '師承門派的專家都自有一套確定時辰的秘法，而且是決不輕易泄漏的。有人根據一顆痣


    的颜色、位置和大小即可斷定來人所報時間的正誤，令人驚异。在《紫微星情詳述》中，曹


    先生没有公開本門的斷時方法，爲此特在書后附录了摘自王亭之先生著作中的《形性賦》


    詮釋，初學者再對照《斗數宣微》一百八十一——一百八十六頁的内容就可根據被測者的


    面部長相及性格特征大致判定該人的命盤正誤。水平到一定程度后還可根據流年發生的


    具體事項來進一步鑒别。總之，在實際推演之前，以先確定命盤的正誤爲前提條件，對於


    初學的讀者來說，也可暫不理會這些内容，如果有出生的準確鐘點。即以北京時間來起盤


    ，一般没有誤差。


    在古賦中有『不準但用三時推』的說法，即如果根據被測者報所的時間起盤推出的結


    果如果與實際不符，便用前后各一個時辰分别再别起一盤，從而根據三個命盤的情況再校


    對時辰的正誤。由于上述的原因，所以紫微斗數的預測一般都是面對面地進行。


    在这里必須強調的是，術數是一門實證科學，任何理論都必須經得住實踐的反復檢驗


    。從以上對時辰的判定即可看出，命盤的推演必須與命主本人的以往經歷相符。其它關


    于排盤中有歧异的問題也應遵循這一原則，初學者必須樹立這一正確的理念，才可深入學


    習，而不致被一些『振振有辭』的理論迷惑，也可避開那些無休止的理論争論的怪圈。另


    外《斗數宣微》中對閏月的處理不是說『上半月上月，下半月按下—個月處理』，而是一律


    按下一個月份處理，請看〇十六『安身命例』和〇二十五頁問答二十四條之第三問和第四問


