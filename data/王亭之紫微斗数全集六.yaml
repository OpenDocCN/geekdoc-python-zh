- md: '答：夾局的確是斗數中的一個重要概念，許多格局均與夾有關，如前面晚清名臣曾國藩的命例中提到的『財蔭夾印』，它的反面則是『刑囚夾印』。是指丁年出生的人立命午宮，值天相廉貞坐守，則爲巳宮的巨門化忌和未宮的擎羊所夾，一生是非口舌纏身，歲運再遇凶星便有牢獄之災，此即《太微賦》中所言『刑囚夾印、刑杖唯司』。也有的認爲是天相廉貞與羊刃同官方爲『刑辦夾印』。本派認爲，二者均是。


    一般情況下，斗數最重對星所夾，所謂對星即指成對的星曜。斗數中比較重要的對星有左輔右弼、文昌文曲、天魁天鉞、關刃陀羅、火星鈴星、地空地劫等。另外還有雙化祿夾、祿權科夾、雙化忌夾。凡吉曜夾即爲吉星夾輔，會極大地增強所夾宮位的吉性；凶曜夾即爲煞星夾制，會引發所夾位的凶性。即以左右夾輔而言。凡三、五、九、十一月生人，左輔右弼必夾未或丑宮。若二宮紫微、天府等主星坐守的命宮，則主命主本人得部下擁戴，再加吉星會照可成就一番大業。


    是指二星坐丑未無吉星會照而言。因爲破軍的不滿足現狀加上紫微無吉加煞的剛愎自用便形成一組不佳組合，但若得到左右的夾輔，則能增強其穩定性而轉凶爲吉。倘若二星得左右夾、三方四正再有昌曲吉供照，則成爲『君臣的格局』，從政必有聲名。


    （問題十四）：權空與地空的作用力有哪些不同？


    答：斗數中的空曜計有地空、地劫、截路空亡、旬中空亡、天空七顆，其中又以地空地劫力量最强，其它空曜则力量要小得多，而旬中空亡一般不用。凡某宫得空星坐守或照会，则该宫所显示的吉凶作用大减（但并非完全无用），特别对四化星和禄存的影响较大。对其它四煞和六吉星的影响则相对较小。凡命宫得空曜重重会照，则功名财利难求。但空曜又主气度玄思，与宗教及哲学有缘，故若不以富贵为念，则反而吉祥。


    生时安，请校正说明。


    答：《全书》p 八十四页的天空星实为地空星，而《详述》p 二十五页的则为乙级星中的天空星，其作用力大小有区别。而《全书》中无乙级天空星，反以叫地空为天空。至于二星的作用分别，请参照前面「问题十四」的解答部分。


    「问题十六」：《详述》中的「庙旺利陷」表与《紫微预测学》中的出入较大，未知朱本宗何法，以何为凭？另外，《指南》中的实用排法又不同，为什么？


    答：对于「庙旺利陷」的排法有许多种，《全集》和《全书》中的大致相同，为第一种；后来清朝道人铁卜子（即《铁版神数》的修订者）又提出一种，现今通行的「庙旺利陷」表，即《详述》中所列出的又为第三种。而实际上，许多高手自己使用的「庙旺利陷」表又有差别，不尽一致。《学习指南》中所列出的一种为我会所使用的排法，其中有两处印刷错误，即图一中紫微在子时申宫的武曲为平，戌宫的七杀为庙，请更正。那么，在以上这几种不同的排法之中，到底以哪种为准呢？答案是：大家可自行选择，而且只須記住各星在何宮入廟，在何宮落陷即可。這部分內容沒有太大歧異。廟旺利陷的概念是為了說明各星隨坐宮的不同而顯現的星性強弱變化。如果熟悉了各星所在不同宮位的特點，那麼廟旺利陷自在其中。


    # 「問題十七」：如何比較兩個宮位的強弱？


    答：紫微斗數中的十四顆主星根據會照的情形可分為兩組，即紫、武、廉、殺、破、狼、府、相為一組，巨、日、機、月、梁為一組。前一組的星曜決不可能在三方四正中會照到另一組，反之亦然。相對而言，第一組星曜坐守的宮位為強、第二組坐守的宮位為弱。其中又以紫武廉與殺破狼的雙星組合為最強，以命無正曜的宮位為最弱，機月同梁坐守的宮位次弱。


    在定盤十二宮中，以命宮為第一宮逆數，則奇數宮為陽宮，偶數宮為陰宮。凡陽宮的星曜強過陰宮則為我強他弱，反之則為他強我弱。例如條文中有「紫微居奴、為逢迎之人」，其原因何在？即是因為紫微為帝星乃是最強最尊的星曜，如果居奴僕宮，那麼我的社交關係中都是一些層次較高的人，和這些人能夠周旋在一起，那麼當然本身就成了逢迎之人了。再者，如機月同梁格的人宜從事輔助性的工作也是同樣的道理。兄友綸的星曜組合強過命宮，而本身又缺乏擔當責任的魄力，雖足智多謀也只能為他人之輔佐，人榮與榮、人辰與辱，至于其層次則看吉凶星的會照，加吉無煞也能富貴齊來。


    # 「問題十八」：斗數中的冲是個什麼概念？是否某宮的三方四正中只要有七煞任何一星就算本宫逢冲，逢冲会发生什么后果？某宫逢冲，那么这个宫组成的格局是否就破了？


    答：斗数中，任何宫位的三方四正中只要有七煞中的任何一星就算逢冲，但对本宫的影响程度不同，以本宫和对宫力量最强，三合方次之。逢煞星冲照产生的后果是使该宫位所代表的意义呈现挫败之情形，其与吉星混合时的情形很复杂，就一般而言可以这样理解：即比较某宫所会照到的吉星和凶星的力量强弱来判定辅助星对主星的吉凶作用，例如某宫的三方四正中吉星的力量大于凶星的力量，则仍呈现出吉的性质，反之则凶。


    至于逢冲之后是否会破格，应该说一般不会，大凡各种格局均有各自成格和破格的必要条件，并非一见煞星即破格。但煞星冲照对格局有减损作用则是必然的，即使原格局的发挥程度减弱，或者增加成功的挫折和危难。


    【问题十九】：星宿组合很复杂，某宫破不破由哪些条件确定？比如日、月夹命、而太阳所在宫位的三方四正中有煞星或化忌，是否就认为被冲破，日月夹的作用就没有了，或反而变凶了？


    答：这个问题前面说了，需具体问题具体分析。即以问题中所提到的日月夹命而言，只有天府在丑未被机阴和太阳所夹，和武贪在丑未为正格，因为日月不反背（即不失陷）。而在这些条件达到后，一旦逢太阳化忌或太阴化忌即以破格论之。但太阳或太阴所在宫位的三方四正逢煞星或其它星化忌则仍不为破格，只对格局有所减损而已。


