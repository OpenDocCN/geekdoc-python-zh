    有些命造確實平凡得像一杯白開水，怎么找都找不到優點，做命理分析時，該實話實說呢？還是隱瞞缺點而膨脹某些優點（該優點一定微不足道）？恐怕人言人殊。這個命因為有了下列兩項的不圓滿，才顯得平淡無奇：


    (一) 該成格者未成——朝垣而不逢輔弼，一副孤伶伶的樣子。


    (二) 缺乏精神——不照一點煞生，全無殺氣。


    開始就是錯誤的，我們仍然維持了十四年，到三十八歲那年才簽字離婚，如果忌星冲破夫宫造成离婚的作用是假的，那么问题的症结究竟在哪？


    庚子大限太阳禄照入夫宫，二十四岁之前，情窦已开，红鸾星已动，若有对象，当然可以出阁。拖到己亥大限，也行，武曲禄仍然牵引夫宫，带来喜讯。有人问道：『庚子大限结婚，己亥大限夫宫再逢冲动，会有外遇吗？』确实有这样的征兆，但并非必然。外遇是第三者介入，本人不给他机会，婚外情就燃烧不起来。


    探讨问题，光用一个人的命盘根本看不出错误的症结，盖婚姻成败必与配偶有关，这是双胞胎整个系统相同，却一个离异一个鹣鲽情深的关键所在。使用一个命盘推论两个人的事，结论必符合所有同一生辰的人，不可能通得过逻辑的验证。


    ## 二


    我可能再婚吗？约在何时？


    一个人愿不愿意结婚（包括再婚），应凭自己的意志加以决定，询问别人，那些意见再好再妙，最后仍要自己决断；只有深信命中注定的人，才会交给神明或命理来处理。如果你有这个意愿的话，首先是积极寻觅一个对象，等此人出现了，再来研究何时结婚不迟。


    命理提示的婚讯并非到了某个年限，肯定找到对象，然后牵手走进洞房；命理可以帮忙规划一个理想对象，按图索骥，在茫茫人海中寻寻觅觅，『得之，我幸，不得，我命』，如此而已。许多人要求先定吉时良辰再来找对象，那是本末倒置，没有意义。


    当然啦，较好的一半一旦现身，何时结婚可能变得不重要了，因为你们爱什么时候结婚就什么时候结婚，连玉皇大帝都管不着。


    在丁酉大限中再嫁，大环境对这种行为有助吗？


    此限三方结构甚旺，环境会让一个人武装起来，野心旺盛起来，想要做点什么的欲望积极而又热切。由于禄（太阴）忌（巨门）均未牵引，静运而已，包括婚姻在内的所有情况都呈静止状态，若想找伴，还须别人推你一把。


    ## 三


    （不知是不想跟我噜嗦，还是被我的博学所慑服，她于是叹了一口气。）


    坦白告诉你好了，我在戊戌大限认识一人，他跟我一样，婚姻也是坎坷，家里找不到一点温暖，但太太坚持不离，十几年来就这样摆着，你看何时才能脱离苦海？


    抱歉之至，此事从老大姊的命盘上，完全判断不出。


    也许性相近之故，我们颇为投缘，彼此之间有一种默契，也许将来有一天可能结婚。不过我对婚姻的事已不再坚持非有法律名分不可，只希望不再铸下错误，结不结婚倒无所谓。你的看法呢？


    我一向尊重别人的选择。


    婚姻的基本要件是两情相悦，希望有情人终成眷属，因为曾经发生种种问题，为了保护双方的权益，才制定了法律。如果不想麻烦法律，事情当然就好办了，不是吗？


    他大我两岁，好像是甲申年生（属猴），看得出他的职业、钱财和其他有关的事项吗？


    如果我们终能结合，会不会产生刑克现象？


    职业可以选择，其他事项属于私事，命理推测不出。


    至于刑克之事，不如想像中那么严重。他将巩固你的婚姻，让你觉得跟他在一起（或嫁给他），安全可靠。唯一的缺点是跟你的子女感情不融洽，这点也要仔细考虑。


    有些情侣平常在一起没事，一旦踏上红毯，就会发生意外，导致生离死别，从命盘上看，我们有无那种现象？


    不知道。


    看，我们有无那种现象？


    不知道。


    ## 得之我幸


    ### 一


    你看我这个命是好命还是坏命？


    判断一个命好坏，一定主观，盖其中并无一个标准，因此正统的命理分析不做这种结论；我们只要把命理结构、运程消长充分描述，供当事人参考，就算功德圆满；若说有什么好坏，应由自己判断。


    就命理结构而言，三方照见吉煞、禄忌，强弱平均，文武相称，没有特别凸显的事项；社会地位和个人声望适度，可以成为一个称职的幕僚人材。


    禄存据说有逢凶化吉、遇难呈祥的功效，它跟迁移宫的化禄形成『双禄交驰』，锦上添花，照劫竟成『禄逢弼』，乃吉处藏凶，这种凶指的是什么？


    我们不排禄存，因为那是八字的概念，斗数主要星曜除十四主星、六吉六煞外，并无一颗禄存。命坐禄存，前后必是羊陀，正确的说法是『羊陀夹命』，终生难逃受人牵制的命运，何人制你？父母和兄弟姊妹也。生命历程中，总觉得有种无形的压迫，必须戒慎戒惧，委屈求全，包括待人接物、自由思考，老觉得施展不开。


    禄忌交会于命宫，好坏吉凶，不能十全——好不能好到底，坏也不会坏到底，总是一山穷水尽疑无路，柳暗花明又一村。


