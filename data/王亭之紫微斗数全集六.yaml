  md: '同事說我的財宮紫微、天府加弼曲，構成一個巨大的命格，乃是天生的富命，但我迄今上班聽差，領的是死薪水，臺灣俗話叫「死豬仔價」，何以致富？


    那些同事的論斷有誤，正統命理可沒那種說法。


    □ 那么我何時走到財運，可以發點小財過過癮？


