  md: '# # 破身。


    廉殺的組合會擎羊在丑未，流年走到對宮，更有流羊加會，血光逃不過，很凶。有官訟是非。


    擎羊會火星同宮在卯午。是領袖格，有相當之統御能力，會得力之主星更驗。苦所會主是為惡星、則主血光、破相。


    擎羊會左右昌曲于身。命宮有暗痣、斑痕。


    擎羊會鈴星爲下格。若在命遷綫且無吉會，一生無發展。替人幫工。


    總之命主若出現了擎羊。要考慮所會主星是什么，是否具殺傷力，例如武、破、廉、殺、機、相會擎羊在命遷綫，就是一生會破相、破敗、無大發展。且是經常性的，不幸的遭遇會一再重負。若爲紫府這種吉星。表一生中會一度破敗或外來的創傷。


    擎羊入夫妻、争吵不免。入子女、女命流產、墮胎。入財帛橫發橫破、發不耐久。入疾厄、屬外來之創傷，鐵石等之傷害。呼吸器官及消化系統不良之疾患。


    擎羊入遷移冲命、求謀不遂。入官禄會動星，常常換工作。入田宅會惡星，家中人口刑傷，惡如巨、破、廉、殺、若爲日、月表不利父母。


    流年有擎羊，破軍入田宅，表住家附近有人修建房屋，地劫在流田也是，入福德一生操勞煩心。入父母主破相。限年逢羊刃，求謀不遂，事多反復。（下轉第二期）


