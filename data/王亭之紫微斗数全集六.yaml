    「既是意外，表示那是一個特性，共盤當然無力探測，即使事後檢討，也一定檢討不出什么名堂，不必麻煩。經驗法則指出，凡是意外（各種重大災難，accident），必屬個人獨有，使用共盤推敲，簡直瞎猜。」


    ### 天羅地網


    □根據《清朝木刻陳希夷紫微斗數全集》（了無居士現代評注）記載，火貪是吉格，主武職顯貴，我却始終體驗不到『將相之名』、『威鎮諸邦』那種榮耀，因為迄今仍然籍籍無名，毫無權威感，有的只是一股不得志的怨氣。細數一下，進入社會也有十五年以上，轉眼就要四十了，卻是一個小得不能再小的職員，我一直想不通問題的症結出在哪里。


    圖老兄在哪里發達


    □我在屏東縣某鄉公所擔任課員。那是我的故鄉，當兵到過金門之外，我未曾離開故鄉一步，這跟殺破狼必須離鄉才能發達，是否違背？


    圖據我所知，在那種工作環境中循序漸進、逐步升遷機會可說非常渺茫，鄉下地方派系殺破狼加煞因為結構強旺，多半顯彰下列這些現象：


    （一）生命周期的起伏大，難以安定。


    （二）離鄉背井發展的機會才大，鄉下地方是龍困淺灘。


    （三）要奮斗到三十歲，才會逐漸安定。


    當然，要不要外出是一種選擇，我們只能這樣說，此命離鄉背井比留在故鄉有前途，你老兄選擇后者，一切趨于一緩，有等于無，命理無過。


