- md: '## 斗數直斷一百五十條


    書摘錄出來的精華部分集結而成，準確度較高，供大家在實踐中參考。


    一、擎羊落本宮，有時不但不甚怕，甚至還代表權力，最怕落遷移宮正照。遇火星鈴星則另當別論。


    二、天同或太陰守命漂亮。而天府在卯或巳守命，前者父母宮太陰獨守，後者同陰共守父母宮且均爲太陰陷宮。因父母宮又爲相貌宮。


    三、空劫進福德宮，視錢財如糞土，甚難有所積蓄。


    四、天馬與空劫同守財帛宮，主貧，有錢不花心不甘。


    五、巨門在子午宮爲石中隱玉格，強出頭必禍，隱安其位，爲福不薄。


    六、機梁同度或會照到財帛宮，謀財多巧取，但未必定富。


    七、貪狼守命者，擅長交際應酬，也善知人意，在好的宮度且有化敵爲友的力量。


    八、天梁有慧根，天機多學多能，貪狼愛好神仙修煉術，都能學好術數。


    九、女命苦命宮，福德宮或夫妻宮有紅鸞高照，多是漂亮而具魅力的人，但易招狂蜂浪蝶。但加上天刑星則有敦促自律及克制任性的作用。


    十、火星守命多性急，有突发性脾气，进入中年火气仍盛。


    十一、女命武曲守命，一般都是能干，有丈夫志和妻夺夫权的。


    十二、天机守命，必有浓厚兴趣去学一门与本业完全无关的东西，如会吉星，身兼数职。若四煞会照，则有夭寿之险。


    十三、天同在午宫立命与羊刃同度，为马头带箭格，大将之命。


    十四、天府守兄弟宫，不遇六凶，兄弟众多，在五人以上。


    十五、天相守命，天梁与化禄夹拱称『财荫夹印』，福厚；化忌及羊刃夹拱，为『刑忌夹印』，有牢狱之灾。


    十六、破军守夫妻宫者，又加左辅、右弼会照，婚姻不利。


    十七、疾厄宫有落陷的擎羊和天刑，多经过大手术者。


    十八、天梁或天同在庙宫守命不遇煞曜者，多主寿。


    十九、破军会合化忌有水险，尤以文曲化忌为验。


    二十、天梁最怕照到羊、陀、天刑三星，一生必有一次九死一生的危险。


    二十一、夫妻宫太阳在庙宫与巨门同守，极可能与异族通婚。


    二十二、武曲在卯宫守命，身材矮小，说话还带点沙音。


    二十三、夫妻宫有寡宿星，若三方四正会星再不吉，极可能离婚。


    二十四、如果大限及流年子女宫为太阳，定生男；若为太阴定生女。


    二十五、斗数对正财分三种：禄存之财是积聚而来的财；武曲之财是做生意或凭某种机会得来之财；太阴是薪金或酬金之类的财。


    二十六、至于横财，贪狼化禄会火铃，必有意外之财，包括生意或意外收获。破军化禄之财，更属意外中意外之财。


    二十七、天梁守命的人都有极强的预感，尤以在陷宫为然。但也并非一生始终都有风水对其也有一家的左右力。


    二十八、天机守子女遇煞星，子息必然稀少，同时也来得很迟。


    二十九、事业宫会照到天巫星与封诰星可主升职；命宫文曲化科，同样获极快升级。


    三十、紫破同守官禄宫，多主事业变动，此时兼看奴仆可获很大启示。


    三十一、天相守夫妻宫有「亲上加亲」之说，配偶可能是同事或旧同学或以前的邻居。


    三十二、武曲守兄弟宫，兄弟不和，再化忌，关系更是恶劣。


    三十三、贪狼守命戌宫遇乙级「天空」星，不会有不良嗜好，只是对神秘及宿命之事更具兴趣。亦多变爲矮小。


    三十四、在桃花太旺的命盘中，如遇天空守命，不但不怕桃花烦扰，相反的更显得清白贞节。


    三十五、化禄、权、科会照父母宫于外圈，父母不一定富有，但多长寿，若再见空劫，可能還要供養父母一段很長時間。


    三十六、天梁化禄易招人批評爭議，故天梁不太宜化祿。


    三十七、太陽在某些宮度也不太宜化祿，如太陽在午化祿既損其質，更使得天同夫妻宮化忌。太陽化祿在戌宮守子女，反無子。


    三十八、破軍在戌宮田宅，更爲化祿，很多是會有祖業的，若不化祿，則要看父母宮星曜如何，若父母宮三方四正有吉星拱照，同樣會有祖業。即使父母宮不吉，仍可得遺產，惟可能來自上一代長輩，如姨媽和叔父等，準確度奇高。


    三十九、疾厄宮祿星太多或疊祿，很多時也表示有病。只是化忌在疾厄，未必能治癒，加上夫妻、田宅不吉，情況更惡劣。而化祿每多是可以治癒的。


    四十、『月朗天門』格局中，太陰在亥化忌，遷移宮便有天機化忌正照，官祿宮則有天梁化科與祿存。反而比太陰化祿而使福德宮巨門化忌爲佳。


    四十一、天機雙化忌守奴僕宮，易被朋友出賣。


    四十二、太陽會巨門于遷移宮，見煞忌，主客死他鄉。


    四十三、太陽坐命的人，運限行至貴顯星曜坐守的宮垣，便須特別注意，可能爲開運的年限。所謂貴顯星曜，即紫微、天府、天梁、太陰等。


    四十四、大限疾厄爲破軍，見武曲化祿，三煞會照而火星同度，主十年牙病。


    四十五、天同與火星在流日的田宅宮主換燈。


    四十六、天同在田宅宫，见化禄及吉曜主有庆典。


    四十七、天同在田宅宫见文曜主重修。


    四十八、天同见火星在田宅宫而天梁同度或会照则主火烛虚惊。


    四十九、武曲化忌居卯宫，在现代，可能变成生死关头。


    五十、大限太阳化禄与巨门同度，主受异国人或异乡人提拔。


    五十一、『太阳怕逢囚暗破军』系指原来太阳坐命的人，在有些情形下，不喜大限或流年命宫行经廉、破、巨等宫位。


    五十二、原来的宫垣是北斗星坐守，则再逢北斗坐守的宫垣，吉凶便比较紧要；若逢南斗坐守的宫垣，吉凶则轻缓。如最嫌『文武二曲双化忌』即是此意。


    五十三、天同双化忌守田宅宫时，须看命宫三方四正是何星曜，如果遇到不吉的星曜，或迁移宫遇廉贞化忌与七杀同宫的话，则会有颇大的灾难，特别以远行为然。


    五十四、天盘寡宿守夫妻宫的人，再遇到煞星拱照夫妻的话，很多是很难成婚或者很迟才绍婚者。


    五十五、如果已婚的人，在大限遇到寡宿守夫妻宫时，同样遇到煞星拱照的话，则在那个 大限之内很容易离婚。流年遇到则不一定离婚，可能发生一些『寡宿』的事。


    五十六、同巨同宫，因不能会照太阳，纵不化忌亦不美妙，除非其中有一星化禄，或者有吉星拱照，方可消除不良影响。


    五十七、天盤武曲化忌守疾厄，但大運順行，一生也遇不到武曲化忌守夫妻宮，則要注意流年遇武曲雙化忌守夫妻宮。


    五十八、昌曲在原盤夾福德宮，多是特殊聰明和喜讀書之人。


    五十九、武曲化忌守田宅：一、不宜置產業；二、慎防公司、家宅被人打劫。


    六十、紫貪轉入福德宮遇煞冲，色欲傷身之事難免。


    六十一、女性如果天同忌守命，再加上夫妻宮十分熱鬧，極可能淪落風塵。


    六十二、同梁守命，有『高個子』傾向。


    六十三、夫妻宮勢鬧，而命宮有天刑或天空的，反主清白。


    六十四、天同化忌守田宅，子女宮又多煞星會照，該年添丁會因而帶來極大的煩惱，即母子均有問題，為難產。


    六十五、一般人遇官符，會有官非之事發生。但若兼會龍德及奏書，縱有官非，亦會大事化小，小事化無。


    六十六、破軍化祿時每有新機會和意外之財，只是此時事業宮必是貪狼化忌，表示新機會到來時，馬上有人企圖分一懷糞，自然有爭奪之風。


    六十七、破軍的作風，每在不知不覺中會做些刻薄寡恩之事，被人認為無情無義，難以得到別人的一致欣賞。


    六十八、地空地劫與天馬，火星等同守命宮的人，一般除了極爲好動外，每多有浮躁不安的缺點。這種人可能十分聰明，舉一反三，只是思路欠深遠和計劃欠周祥，易功虧一簣。


    六十九、武曲守奴僕宮，偏多賣友之客。另外如空劫，化忌等星進入奴僕宮，也多是不妙的。


    七十、紫微星若無吉星朝拱，尤其又落辰戌，一生災遇比別人多。


    七十一、紫微遇空劫且無百官朝拱，很多時會有出家的思想。


    七十二、紫微守命者多心高氣傲及易信人言。若無吉星拱照，則性情每多孤僻或專橫；若再加煞星拱照，則失意時易自暴自棄。


    七十三、貪狼在身宮者，最怕遇到天機化忌，是為多變或多憂多慮，奔波勞碌或嗜酒嗜賭。


    七十四、羊、陀、火鈴四煞并照，于天機則有天壽之險。


    七十五、武曲不宜守六親的宮度，守你母宮易見刑克，除非有天府、天壽化解；兄弟宮無緣及不睦，有吉星拱照及入廟者可免。


    七十六、武曲守子女宮則子女遲得，有遲至四十歲后得子者，子女個性剛強，遇化忌及四煞，則無子。


    七十七、天同在亥宮化忌，兼會四煞空劫天刑等星，則刑克孤單或極爲勞碌或破相或有病災等事情。


    七十八、天同戍宮守命，對宮有化忌正照，但兼會祿存與化祿，是為否極泰來，屬能貴之上格。


    七十九、天同易情緒化，守夫妻宮時須遲婚方能白頭偕老。


    八十、廉貞星怕落陷及化忌，此時易沉迷酒色而致禍。


    八十一、天府坐辰戌若會照到六吉星，無論從商或從政，都能出人頭地。


    八十二、天府守命之人亦擅于排難解紛。


    八十三、太陰與天機同度守父母宮雖無刑克，但易早離父母。


    八十四、貪狼在辰戌，對宮武曲會照，有先貧后富之說，要三十歲后方能發達。


    八十五、貪狼守命之人毛發多屬濃者。在辰宮必身材高大。


    八十六、貪狼守命好施小惠予人，能化敵為友。


    八十七、貪狼守命寅宮，最怕四煞拱照，易有牢獄之災。


    八十八、貪狼守命午宮爲木火通明，主人多計謀。


    八十九、貪守兄弟宮會照吉星，兄弟和睦，反之則不和，與廉貞同宮，則孤單或不和。


    九十、貪狼守夫妻宮以遲婚或婚前曾遇波折為佳。


    九十一、貪狼守子女宮會照吉星者三人以上，與紫微同度則極遲才有子女，化忌則子女多病災。


    九十二、貪狼化忌守父母宮，兼會紅鸞、天喜、廉貞、咸池、天刑等星則每多為庶出。'
  mdcn: '## 斗數直斷一百五十條


    書摘錄出來的精華部分集結而成，準確度較高，供大家在實踐中參考。


    一、擎羊落本宮，有時不但不甚怕，甚至還代表權力，最怕落遷移宮正照。遇火星鈴星則另當別論。


    二、天同或太陰守命漂亮。而天府在卯或巳守命，前者父母宮太陰獨守，後者同陰共守父母宮且均爲太陰陷宮。因父母宮又爲相貌宮。


    三、空劫進福德宮，視錢財如糞土，甚難有所積蓄。


    四、天馬與空劫同守財帛宮，主貧，有錢不花心不甘。


    五、巨門在子午宮爲石中隱玉格，強出頭必禍，隱安其位，爲福不薄。


    六、機梁同度或會照到財帛宮，謀財多巧取，但未必定富。


    七、貪狼守命者，擅長交際應酬，也善知人意，在好的宮度且有化敵爲友的力量。


    八、天梁有慧根，天機多學多能，貪狼愛好神仙修煉術，都能學好術數。


    九、女命苦命宮，福德宮或夫妻宮有紅鸞高照，多是漂亮而具魅力的人，但易招狂蜂浪蝶。但加上天刑星則有敦促自律及克制任性的作用。


    十、火星守命多性急，有突发性脾气，进入中年火气仍盛。


    十一、女命武曲守命，一般都是能干，有丈夫志和妻夺夫权的。


    十二、天机守命，必有浓厚兴趣去学一门与本业完全无关的东西，如会吉星，身兼数职。若四煞会照，则有夭寿之险。


    十三、天同在午宫立命与羊刃同度，为马头带箭格，大将之命。


