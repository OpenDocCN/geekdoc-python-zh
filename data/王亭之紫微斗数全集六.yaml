    □我們的企業預定壬申年出走，轉進大陸，此時做此事，吉凶如何？

    □大型、長期的投資多屬緩慢成長的行業，大環境必須佳美，才能維持，并立于不敗之地；遺憾的是整個大環境竟然不利從事這樣的轉變。

    流年宮位在申，三方結構強勢，所以想做就會着手進行，但宮內的忌星（廉貞）是大限所化，信心不是很多，其他有關祿忌牽引的吉凶分布如下：

    （一）祿星天梁在巳，大限的兄弟宮兼流年的子女宮，均與事業無關，不會帶來助力。

    （二）忌星武曲在子，大限的遷移宮，也是流年的事業宮，歲運相加，不就是一幅『出外做事不吉』的景象嗎？

    如果事業非由本人親自掌權，或者分幾個階段完成（今年之內不會全部完成），也許會出現緩衝的機會——不會一下子就兵敗如山倒。其實，甲戌年才是投資甚至進行各種改變的吉年。

