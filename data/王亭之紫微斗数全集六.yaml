    **此命之强，從下列三事獲知：一是七星會聚，二是吉煞遍照，三是形成格局，條件俱足，獲取榮華富貴，將宛如桌上拿柑，十拿九穩。**


    **禄忌牽動，命盤一時活絡起來，精神旺盛，生命軌迹明顯，常處於主動狀態中，對他們這種人來說，這個世界没有辦不成的事，開創改變，改變開創，有如爲老者折枝，又像吃蚵仔煎那樣輕松愉快。**


    乙卯大限：太陰忌的所在是大限合伙宫，若有什么壞的影響，必在合作事業方面。

    乙寅大限：太陽忌的所在是大限事業宫，事業的開創、經營與執掌，均呈不穩定狀態；該忌冲射妻宫，則危及婚姻。

    乙丑大限：太陰忌的所在是大限健康宫，由于禄（天機）忌同宫，吉凶交錯，體能狀態起伏大，時好時壞；該忌冲父母宫，與尊親感情不睦，父母若已過世，則不呼應。


    甲子大限：太陽忌的所在是大限遷移宮，外緣極差，外出不利，容易招來物議。

    比較而言，兩個乙運因為忌星未照命宮，不虞直接帶來禍害；兩個甲運就不同了，忌星進入三方，殺傷力不輕，凶運無疑。


    二


    □貪狼忌在事業宮，事業的敗著早現，還能獨立經營事業嗎？據說連開個店做做小生意都不容易做得好，是否如此？

    □老兄擁有如此強勢的結構，當然可以獨立經營事業，并且不鳴則已，一鳴驚人呢！朝垣是朝向帝座，而非自己就是皇帝，因此無論任職或是自創，最好能借別人的力量成就自己的事業，臺灣俗話叫『提別人的拳頭母掙石獅』，有點損人利己的意味，但此處僅做形容。若能如此，將比單獨一個人在那里三更燈火五更鷄地辛勤耕耘，輕鬆得多。

    □適合從事哪種行業？煞星多照，利武不利文，舉凡專業的、波動性大的行業，均能駕輕就熟。鈴星與羊陀形成的异格最利專業技術，而空劫富于聯想、虛構與模仿，有豐富的原創力和爆發力。不適性行業包括內勤、一般行政業務，毫無成就可言，一定做得天怒人怨。

    □大學畢業后在臺北市政府地政單位工作了一年多，想要突破，才毅然辭職返鄉，此時父親也着手處理一批祖產，陸續蓋了一些房子，獲利不菲。一九八三年跟一個親戚合購地建屋出售，當時房地產的景氣尚未復蘇，我們的運氣不錯，銷售一空，得潤可觀。一九八八年初，因為觀念分歧不得不拆伙。請問：我適不適于合伙？跟内弟（太太的兄弟）一起經營算不算合伙。

    □合伙的形式有两种：一是我做老板，别人合我；二是别人做老板，我去合他；其中又各自细分两种，前者包括别人参与（占一个职位）以及纯投资，后者包括我去参与（实际操作业务）以及纯投资。大致上说，禄在命宫及三方诸宫，自己经营，可望获利，禄在别人的宫位，乃是图利他人，托人之福。

    正统命理认为，只要投入资金就算合伙人，内弟、表弟、堂弟、换贴兄弟，无一不是。老板可能是直接经营者，也可能不是，无论何者，如果经营权在你老兄手上，职位可能只是工友，这个公司的业绩仍然会跟着你的命运走，丝毫不爽。

    从基本结构看，此命想做经营者，尚须考虑一些条件：

    （一）命格强旺，适合做老板，也可与人合伙（纯投资或参一脚）。

    （二）事业见忌，用心不专，常存五日京兆，经营任何事业通常都需要一个稳定的心，确实缺乏耐性，还是合伙和纯投资保险。

    目前的甲寅大限事业逢忌，禄在别人怀中，宜帮别人成事，故合伙强于自创。


    三


    （第一次讨论，是一个私人的宴会上。）

    □岳家的人目前都移民美国，我一个弟弟也在美国经商，我们每隔一两年就去美国一次，對那邊的投資環境略有心得，因此計劃在短期間內移過臺灣省，我要問的是：像我這樣的命適合遷居國外嗎？

    「移民這種事既是能不能也是要不要，『能不能』是能力問題，『要不要』則是意願問題，無論何者，均非命理，應由閣下自己決定。這類現實環境中的遭遇，必須考量兩地之間接差異，包括文化的隔閡、生活的調適、事業的延續等等，多與命理無涉，最好別從命理的方向找尋答案，因為答案必不在其中。

    □辛未或壬申這些年份若有機會，可能在美國進行投資，此時的投資可能獲利嗎？

    □命理不管地域，根據往例，只要斟酌現在的運勢消長，也就是推敲事業、財運是否吉祥。

    先說大限：

    （一）甲寅大限命無主星，星曜都在外頭，普受外境的影響，往外發展自屬可行。

    （二）廉貞祿在丑，兄弟宮也，幫別人發財比自己埋頭苦干要順利得多。

    （三）太陽忌在事業宮盤踞，事業經營的成功率不是很高，但并不意味着什么事都不能做或者都做不好，而是必須戰戰兢兢，如履薄冰，伺機而動，見好就收。

    就流年而言，辛未年祿忌均未牽引，利静不利動，若要改變，行動是遲緩的、遲疑的；祿忌牽引大限財福二宮，影響的只是舊業，錢財出入頻繁。

    壬申年的天梁祿在流年事業宮，并引動大限事業宮，武曲忌則未照，吉祥無比。比較上說，壬申年諸事大吉，才是理想的年份。


    □我做房地產時，占股只有四分之一，雖然策劃、執行都是我一個人在做，但賺來的錢全讓父親給取走了，我每個月固定領一點錢生活（不多，約等於一個公務員的薪水），目前的家計都靠房租和存款利息收入，前年買賣股票賺了一點小錢，去年卻套牢了，賺的都賠進去，等于白白做憨工。我最好的財運約在何時？

    我大略檢視了一下財運消長時才發現，后天行運中，一步也没走到旺財運，因此藉着運程的烘托，助老兄發財，希望將要落空。

    但是，雖無旺財運却有破財運，所幸只是微破，就是現在正在運行的甲寅大限，太陽忌從午照戌，這個戌就是十年財官，財宮有了瑕疵，財進財出，商人受創較大，有被人倒債、破大財的疑慮，一般人則開支特大，手頭拮據，時常寅吃卯糧。


    ## 無魚蝦也好

    □我看紫雲先生、慧心幫主和了無居士的書學了兩年多的斗數，大概悟性較低，始終迷迷糊糊，有時候真搞不懂那些星曜到底蘊藏了什么天大的玄機，譬如我這個命究竟紫相朝垣或者火貪～兩者之間的差別何在～我雖涉獵過無數書籍，就沒有一本書提過，你說奇怪不奇怪。

    □命無主星，三方諸星會照后是紫府廉武相的組合，又稱府相朝垣，左輔照入，格成『君臣慶會』，這是一個文格，具備領導統御的能力，得以群策群力，成就事業。天魁照耀，得貴人濟助，乃錦上添花也。

    命宮的火星與遷移宮的貪狼格成火貪，這是一個武格，得以揚名异域，鳴聲在外（『威鎮諸邦』）而火星與事業宮的擎羊格成火羊，這是一個异格，主异路功名，得以鶴立鷄群，出類拔萃（『威權出衆』）：迅速格局大多在外面宫位形成，顯非與生俱來，而是后天努力學習獲致，因此是否學習專業知識或技術，將成為衡斷成就高低的一個標準——有者高、無者低。三種格局等于具備三種特殊潛能，一旦充分發揮，功名富貴，順手拈來。

    □三個格局究以何者為優～

    □在封建時代，君臣慶會優先，不言可喻，現代社會多元化，平均發展，端視各人喜好。


