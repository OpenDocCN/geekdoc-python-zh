    就斗數而言，這個命由紫府廉武相（或紫相朝垣）與殺破狼組成，前者遇右弼，構成一君臣慶會，這是文格，具有領導統御的潜能，得以群策群力，成就大業；后者見火鈴則爲武格，利于武職顯貴，堪稱文武雙全，這種人天生的有點霸氣，做事積極有干劲，富于冒險犯難，與傳統的官僚系統有悖，在公家機構任職，層層受制，潜能發揮不出，只好困頓。


