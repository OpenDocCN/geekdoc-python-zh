    命無主星，看來力虛勢弱，忌星例外（釗定是遷移宮）射入，人緣不佳，外出膽怯，還可能帶來哪些傷害？想到這個問題没有。

    命局太弱，許多事情最后都變成霧里看花，迷迷蒙蒙，有一種朦朧的凄美，劫非真實，蓋仔細一瞧，不過南柯一夢，唐朝永嘉禪師描述的“命里明明有六趣，醒來空空無大千”大概就是這般模樣。


    □事業宮同陰居子為『水澄桂萼格』（見《清朝木刻陳希夷紫微斗數全集現代評注》）理應文職顯貴，這跟機月同梁原本利文不利武是否重復？

    □『水澄桂萼』主貴是古籍的說法，現代人認為同陰居子只是排列的必然性——同陰在子午二宮必然同宮，不能視為格局，當然也就沒有『必貴』這種結論。

    □這張命盤有四個宮位無星，所幸順行，歷程中只遇一個空宮，在后天行運中，甲戌大限事業宮『羊陀夾忌』敗局也，當有哪些壞的作用？

    □無星的宮位顯呈弱勢，承擔力弱，見祿或祿忌均不見還可以有點作爲，一旦受到外力干擾（太陽化忌，頓成羊陀夾忌或忌挾煞侵襲），顯然無法自恃，手忙腳亂，內心徬徨，處處挨打，有冤無處伸。當然還要看它是什么宮，譬如甲戌大限命財二宮無星，是心里狀態和錢財支配弱勢的問題，羊陀夾忌則是事業經營上的敗局；乙亥大財宮無星，是錢財支配的問題；丙子大限遷移與財宮無星，是人際關係和錢財支配的問題。丙寅大限至弱，外在三宮均無主星，但此時已是晚景，只要不見忌，一切可以無慮。

    初運的空宮也是，當時年紀小，在父母呵護下，什么事都不發生既使遭遇困難看父母處理，顯不出空宮的作用。敞着《斗數疑難一百問答現代篇》對此有詳細的討論，敬請參閱。


    二

    □我念外文，畢業后連換好幾個工作，包括做過汽車推銷員、出版社編輯，目前在這家廣告公司做文案兼辦一點業務，尚能發揮，偶爾也想自立門戶，你看我適合自行創業嗎～

    □乙亥大限坐府會紫，環境略強，輔弼來照，格成『君臣慶會』，是出道以來最扎實的運程；但那只是靜運，祿忌不照，穩定有余，沖勁不足，想要立竿見影，一定不會如願。丙子大限祿星自坐，財遷二宮無星，均呈弱勢，創業之事我看還是免了。

    此限天機祿在辰，大限合伙宮也，一看即知是圖利他人的運，凡事不能太顧自己，老實跟人合作才能蒙其利。

    古賦說天梁化祿『抱私財益與他人』，實指該星在合伙宮位而言（只要不在命宮及其三方就算）。太陰化忌在父母宮，親緣冷淡。

    □靜運中是否意味着什么事都不會發生？

    □十年歲月，說長不長，說短不短，尤其處在這樣一個龐雜擾攘、日新月異的多社會，當然不可能像老僧入定那樣，一念不生，一念不起，而是隨時都可能遭到一些人事物的干擾。由于大勢主靜，偶爾受到波及，多層『茶杯中的風暴』。己巳、辛未、癸酉以及甲戌這些年份，都有沖動的跡象，被動去做一些改變。

    □職務或職位的異動，算不算得出來？

    回命理不是預知學，無法預測特定的事，它只是一種分析的工具——輸入一個事實（條件），然後分析、評估它的得失。

    任何職務（職位）的變更都含有許多不確定性，必須配合環境，才能決定，單位越大，外'
