- md: '## 三

    □我這個命何時走到財運～


    □目前的戊戌大限就是一步如假包換的財運。

    這無疑的是一步強運，三方星曜甚旺，最重要的還是祿星貪狼從福德射入財宮，福德為財源，此去十年，發財終於找到一個萬紫千紅的春天，經營商賈，將本求利，十年下來，腰纏萬貫，儼然一個小富婆。繼續從公，這樣的好運一點作用也沒有。

    祿在財而不在事業，仍感受一些吉力，護理長的寶座也許就在四十四歲以后才坐上。

    □忌星天機在巳，這是大限的健康宮，體能受到干擾，極易疲勞，甚至感染疾病，我們一天到晚跟病患在一起，感染的機率更高，因此很怕受到波及，你看有此可能嗎～

    □命理對這類災難始終無法找到答案，因此只能自求多福。

    忌星所在也是合伙人的福德位（合伙宮在卯，巳宮便成他們的福德宮，并射財帛宮），一時與人合伙（純投資），多遭損財惡報。因此很多人說，這是『朋友敗財之運』。

    □可以看出壽元具短嗎～

