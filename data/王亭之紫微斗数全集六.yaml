- md: '「運程確實有點背。關鍵是連走兩個戊運、兩個己運，其中戊運武曲化祿、己運貪狼化祿，都在未宮（己的忌星文曲也在未，屬於吉凶參半），但是行運到戊子、戊寅二宮，貪狼祿未遇，遇到的是天機忌大減。這些情形都算遺憾。」


    「我是天生的上班族，丁亥大限當完兵回來，進入一家民營企業，然後歷戊子到己丑，從未想要更換行業，有的只是職務變更，這樣勉強算吉嗎？」


    「若是如此，那就吉祥如意。我們預測，往後每個運都將是好運，四十歲也就是戊子大限結束前，升到經理甚至總經理這些高位，一點都不覺得意外。」


    「我現在只是副總，想爬到老決的寶座，也許還要三四年，或者更久。你看我可能擁有自己的事業嗎？」


    「臺灣人喜歡做老板，然後開著進口轎車，吃昂貴名菜，在聲色犬馬場所被公主少爺叫一聲（張爺）（麻總）過癮，其實不是所有人都能創業，獨立作戰尤需運動，你老兄最佳運程還要等十幾年，實在不必多此一舉。」


    「我將豈非毫無成就可言？」


    「也不見得。現在的副總，未來的老總，甚至可能成為股東，進而高升董事長，這就是成就，在我們這些只會搖筆杆的人看來，你們是坐在雲端。」


    □妻宮星曜旺於命宮，妻比夫強，暗示『妻奪夫權』，我如果跟她爭權，結果會怎樣？記得以前有個算命先生鐵口直斷說，我跟元配的緣分極低，幾年而已，反而跟第二次婚姻的对象才能終老，沒想到竟被他說中。


    □那個算命先生的說法沒什麼參考的價值，即使推中（如果使用共盤，猜到罷了），多是提早得知結果，不能改變宿命的軌跡。


    從妻宮的結構依稀看出，閣下喜歡追求擁有強烈事業企圖心的女孩，但是她們先天都有遲婚的傾向，也就是說在滿足事業的意願之前，不會考慮踏上紅毯的，而在婚後，她們通常會繼續做職業婦女。你老兄後來有沒有找到這樣的對象，以及讓不讓太太繼續經營事業，都是造成婚姻成敗的重要因素。


    □老實說，我找的是個老實上班族，跟我一樣。據說婚姻成敗還跟結構年齡有密切的關係，我是庚申年三十一歲那年成親的，太陽祿坐命，天同化忌衝破妻宮，似乎我吉祥她遭難，確實是我的堅持才嫁給我的，是否因此而埋下了離異的惡因？


    □結婚年限的吉凶當然影響往後婚姻的稳定，但那只是一個因素，而非唯一的因素。


    □庚申年種下的因又跟我們戊辰年協議離婚的果有關嗎？


    □以前提過，結婚之年的忌星所在宮位，等於一個惡因（陷阱），任何人行運至此，都要小心翼翼，如履薄冰，才能免災。天同所在的午宮，正好是離婚之年，當然很巧，但是若無大機化忌從辰沖戌，讓流年的妻宮破碎，遠因近因齊來，還是無法協議離婚。


    □離婚牽涉的人境極多，依理是不可推算的，上述情況只能當做其中一個因素處理，不能鐵口直斷必然這樣，必然那樣，否則絕對通不過邏輯的檢證。


    ### 三


    □我在庚午年認識一女，能否從命盤上看出她的婚姻關係？


    □原則上是不能的；討論她的命運消長，請直接出示她的命盤。


    - 若要勉強推測，也就是利用定宮原理，輸入她的個別資料，隱約發現這個女孩也有一次不幸的婚姻，可能在庚午年才脫離苦海；是否如此？


    - □確實如此。能夠如此洩露天機，中國命理確是世界上最奇妙的玄術，令人嘆為觀止。


    - □此事實非命理探討的範圍，而是個現實問題，宜從現實環境加以考量——你老兄對於有了瑕疵的婚姻宿命，有什么改善之道，讓它付諸實現。


    - 就運程而言，己丑大限起連續二十年的忌星只是斜照進入妻宮，干擾的情況不嚴重，只要有心維護，再度勞燕分飛的機率極小。


    - 俗話說，『一朝遭蛇咬，十年怕草繩』，我目前結識的這個對象能否到老？


    - □此事實非命理探討的範圍，而是個現實問題，宜從現實環境加以考量——你老兄對於有了瑕疵的婚姻宿命，有什么改善之道，讓它付諸實現。


