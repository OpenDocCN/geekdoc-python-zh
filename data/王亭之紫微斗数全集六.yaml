    □我想到欧美先进国家发展服装业，你看前途如何？


    回辛亥大限不是一个什么了不起的运程，在这种环境中开创（重新站立），成功率不高，出国是改变环境，风险更高。往后发展的方向可以有二：


    （一）先别忙着创新，旧业仍然可做，不妨依循着一个地区的需求，局部修正。


    （二）放弃自我开创，改与他人合伙，藉别人的力量完成我的志愿，只是不能做老板。


    出国发展服装业属于旧业延续，应属可行。


    因为照煞不多，竞争力弱，不宜从事投机业、必须拚得你死我活的行业。此外对新的环境不会很快适应，出国就业时，这点也要考虑在内。'
  - '[PAGE 137]


    □過去有知命者告訴我，壬申年因為武曲化忌進入財庫（在亥），主破大財，可能破得什么都不剩，着實讓我恐慌，是否如此。


    □此年宮無主星，自主性弱，發生在身邊的挫折，恐怕無力扭轉。外在三方是巨日兼機月同梁，按部就班，無法躥等，若有什么沖擊，不會大到讓人措手不及。


    天梁祿在午，這是大限的財宮，舊業可以得財；也是流年的妻宮，照射事業，新業大吉，是個『好的開始』。武曲化忌在亥，這個亥只是大限的父母宮，作用不大；照射流年田宅宮，時常外出，甚至出遠門。流年庫破，財進財出，不會破到脫底。


    □癸酉年起交入新限，那位先生又說，在新舊交接的時刻，最容易發生意外，危機自外而來，舊貪狼化忌從遷移宮射入，我做的正是國際貿易，受創必大，有什么方法可以防止。


    □所有的意外都是特性，依理無法推測，這是一程式的不可能。


    此年的命宮仍無主星，跟去年一樣，自主力弱，必須努力祈禱別發生災難，否則不知該怎麼善后才好。其中破軍化祿在亥，這是大限的命宮，自信心增強，想到什么會付諸實現，也是今年福德宮，舊業挫折不免；這也是流年的遷移位，人際關係很差，容易跟人臉紅脖子粗限的事業宮，舊業挫折不免；這也是流年的遷移位，人際關係很差，容易跟人臉紅脖子粗。


    這是近年來少見的比較波動的年份，一年到頭，內心浮動，惶惶然不可終日。


    □甲戌流年太陽化忌沖破財宮，顯然又遇到一個破，廉貞化祿進入大限財宮，則主成，如此一成一破，究竟怎么一回事？最后是得是失。'
  - '[PAGE 138]


    □此年廉貞化祿在未，乃大限的財宮，舊業可望得財；惟太陽化忌在子，流年福德也，財福相對，因此該忌自然沖擊了財宮，與人金錢來往、借貸與人等行爲必破，當然還包括開銷特大在內。


    □乙亥年天機祿、太陰忌都在田宅宮，這種情形是吉兆還是凶兆？


    □此年歲運重疊，天機祿、太陰忌都在演，歲運田宅也，由于不照命宮及其三方，難得一個没什么大事的静年，可以喘一口氣矣；其他是經常外出，家庭生活比較無味吧。'
- md: '## 成人之美


    □我命宫坐忌，這顆文曲忌主哪些凶象？


    □文曲不必然象征文學藝術，化忌后該星原有的性質也不會隨之消聲匿迹；它只是一顆輔星（助星），己年生人藉着這顆星把忌帶到其中一個宮位，若有什么凶象，應以所在宮位的人事物為準而加以論述。


    忌星干擾內外環境的安寧，在命主內心澎湃，難以調伏，行運主偶遇，則見异思遷，更換行業或執掌的業務，無法一業到底。


    □遷移宮火星照入，格成火貪，理論上說是可以『威鎮諸邦』的，古書也記載我這種命有出將入相一將相之名』的迹象，我是離鄉往外發展的人，為將爲相完全不敢想，唯一的希望是從此化險爲夷，可能嗎？


    □命中星强，能够承擔重任，被畀以重責，優點是攻擊火力强旺，開疆辟地，揚名异域；用在原本就變化莫測的工作，譬如程式設計、藝術創作這些項目，潜能發揮，如魚得水，否則就會朝三暮四，勞心勞力而無所得。


    □辛未大限巨門化禄進入事業宮，事業前途一片大好；文昌化忌冲財庫，財藏不住，如此一吉一凶，請評估一下，到底是幾分吉又幾分凶？


    | |太陰|破軍|天機|天府|

    |---|---|---|---|---|

    |己巳命宮|庚午|辛未36-45|壬申|

    |戊辰|武曲化祿|己丑月×日午時|癸酉

    |丁卯|天同| |甲戌命宮

    |丙寅|七殺|丁丑|丙子|乙亥|

    | |廉貞|天相|天魁|天鉞|


    殺破狼加煞沒錯，但是加吉更多，看來氣勢仍嫌不足，傾向柔和安逸，一點都不覺得意外。


    里外祿忌交替，吉凶並見，樂極生悲，悲極生樂好像光影那樣，在眼前虛晃著，說好也好不到底，說壞也壞不到哪里去，只怕內外交戰的結果，內心敵不過現實環境的壓力，要是續堅持真善美的信念，那就是自討若吃。


    • 140 •


    一下，才能達到趨吉避凶的效果。


    此限是機月同梁組合，環境柔和，在安定中求進步，按步就班，逐步擴充，是此去十年的特色。祿星巨門在亥，大陰事業宮也，顯示此刻正在走事業好運，成功率高，可以創業或從事各種興革。


    忌星在辰，乃大限子女官，親子關係溝通不良，常見齟齬；對生意人來說，田宅就是財庫，庫破則庫存少、財務結構不佳，從事長期投資和回收慢的行業要小心，以免弄得血本無歸。


    ■這是哪門子的算命法？千萬記住：吉就是吉，凶就是凶，吉凶各有宮位，找出來確認


    □甲戌年后交入庚午大限，是否仍有上運的吉祥？


    恐怕沒有。


    辛未是個動運，動則有利；庚午是個平運，蟄伏狀態，一動不如一靜。庚午大限殺破狼結構不弱，但祿（太陽）忌（天同）均不照命，事業、錢財和人際關係這些方面沒有大起大落之象。


    此限受羊陀夾制，冥冥之中，好像被人和被環境強力掣肘着，外境壓力甚大，無法想到做到，跟四十五歲以前那種情況相比，差別很大，準備大顯身手時（通常是擴充營業、別創新業、感應較強），要多加一層的考慮。如果延續舊業，未來這個十年仍算好運，業績可觀。


    # ## □己巳大限呢？


    □情况与庚午大限略似，禄忌未动，静运一个，没有大事，宁静度日而已。


    □是否表示二十年内，什么事也不发生？


    回我想，处在这样一个多元又急骤变化的社会里，不可能什么事都不发生；偶遇流年禄忌牵动（进入大限命宫及其三方），就会蠢蠢欲动，只不过大环境支配的力量大，流年瞬间即逝，想做重大变革，必须通盘考量，才能无咎。


    # ## 二


    □如果我利用别人的力量成就我的事，可行吗？他们会不会认为我只是『死道友不死贫道』不够意思？


    回禄在别人的宫位，图利他人，明矣，因此主动帮别人忙，他们感恩图报，你自己也能接受好处，这种互蒙其利的行为何乐不为。当然仍要分辨吉凶分布的状况，探知何者可行、何者不可行，而不能含混带过。


    （一）庚午大限的合伙宫在亥，太阳化禄在兄弟宫并照入合伙宫，直接图利个人，譬如借钱给人、帮他们拉生意；天同化忌在卯，合伙人的事业宫，显示他们的事业目前颠沛流离，跟他们合作事业易遭连累。


    （二）己巳大限的合伙宫在戌，忌星居中，跟上运相反，合伙存有戒心；他们的迁移宫（在辰）有禄照入，最后还是会帮他们忙的。这等于说，禄忌交替，吉凶参半，有好也有坏。


    要不要合作，應就現實的需要來決定——合伙的對象屬於不確定，最好輸入他們個別的條件，才能客觀，此處僅作概念性提示。


    □我一直幫太太照顧她的美容院，因為女性普遍愛美，這個店經營得還算興隆，最近準備再開兩到三家連鎖店，其中一家跟別人聯盟，未知是否可行。


    □如果只是純投資而不參與業務（由別人全權經營），那么那家店面的興衰，無法使用你老兄的命盤進行推敲。


    事業宮見吉，自己動手，凸顯吉祥，進而獲福；交給別人，或者自己没什么興趣，經常不來店里走動，那么該店的命運就由那個替你跑腿的人決定。假如迫于情勢必須選擇后者，不妨找個目前運勢不錯的人，給他一些股份，他會幫你擺平一切，包括賺錢。問題是文昌化忌在辰，那是合伙宮（在子）的事業宮，想找這樣的助手還真不容易呢，看來仍然迫切需要老爺親自出馬。


    □明年想赴國外（法國或美國）深造，你知道我們這行追求時髦，時時刻刻自我充實，否則有被三振出局之虞，我想了解的是，我去好，還是太太去好？


    □辛未大限的田宅宮受到忌星干擾，可能應驗喬遷，居無定所，自然也意味着離鄉背井，到處奔波。至于外出的目的，必須經營事業（求學也算），才能得利；若是求財，顯然弱勢。


    · 143 ·


    □在經營行業方面，我也許還會做些調整，壬申、癸酉這種年份，哪個較吉。


    □壬申環境強大，紫府右弼，君臣慶會，可以號召一些朋友共襄盛舉。天梁化祿在丑，大限遷移位，舊業此年聲名大噪，并可獲利。新業因爲武曲化忌進入流年財宮，則賺不到錢；臨時起意的求財行業不僅無法得財，還有破耗之象，套句俗話，就是偷雞不着反蝕把米。


    癸酉年是辛未大限最后一年，意外平靜，没什么重大事項臨身，可以舒一口氣。破軍祿在午，大限的兄弟宮，也是流年的子女宮，均與歲運三方無涉，貪狼忌在戌，乃大限田宅、流年的父母宮，也都無涉。


    □有人告訴我，甲戌年才是理想的年，大吉大利，有橫財進帳，可信嗎？


    □略爲可信。


    此年起大限進入庚午，大環境因爲不受祿忌牽引，依舊靜止，但一交運就出現一些變動，只是情況烈。


    廉貞祿在子，乃大限遷移宮，外出得利；也是流年福德位，照射財宮，財勢佳美，任任何求財行爲都可獲利。歲運相加，今年出外賺錢，可以如願。


    太陽忌在巳，大限的兄弟宮，没什么意義。


    # # 禄逢空劫


    李先生在丙寅大限将工厂交给兄弟后，举家迁移美国，迄今已有十来年，其间除了做顾问性质的参与外（家人仍称他为总董），并未实际担任事务，不过近几年来也曾帮忙一些国外业务，替工厂赚了不少钱，但是他个人做的一些投资反而赔了不少钱，以目前呈半退休状态。


    鉴于周遭的经济环境尤其台湾的景气低迷，若不迅速处理厂房，就会越拖越不利，恐有被淘汰之虞，这两三年内屡走东南亚，大陆各地，寻找生存之路，最后仍然决定在印尼——十八年前，他在那里曾经有过辉煌的战绩，因此想将台南的工厂部分机器迁移过去，跟当地人合资投厂。


    李先生曾习斗数近十年，就业余水准来说，段数算是很高了，此次行动，我们曾有如下讨论：


    一


    实质上的困难；万一发生困难，也比较无法妥善处理。禄忌牵引，大环境主动，什么事都不做（退隐，优游林泉），可能性不高。


    禄星太阴在亥，这是大限的妻宫，婚姻基础牢固，晚年走这种好运，作用不显，但该禄照射事业，对事业的执掌、开创、经营都有助力，不妨藉题发挥一下，成功率还是蛮高的。


    不过，忌星巨门自坐，心理受到干扰，常思变动，换一个角度说，内心的统一性被打


    | |陀羅天機 | 紫微右弼 | 擎羊 |

    |---|---|---|---|'
