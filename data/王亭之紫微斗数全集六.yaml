    忌冲妻宫，婚姻基石不稳，事业未成，经济基础薄弱，此时成家，失败率高，不在话下。就因果关系而言，忌从事事业宫射出，其病在事业，当先料理事业，等事业有成或奋斗告一段落，才考虑筹组家庭，将可弥寂先天的破绽。


    适婚年龄应在己亥而非戊戌，而戊戌的后五年（31~35）又比前五年吉祥。


    □娶哪种女孩最吉？


    □命理无法提供最吉的对象，最多只能告诉你较吉或次吉；这是一个重要观念。命盘上有些轨迹可循，可供参考。


    妻宫及其三方是紫府廉武相的组合，自寻找同一组合的对象为妻，退而求其次，杀破狼也不错，两人在个性、生活习惯、思考方式、人生观这些方面都可望接近，鹣鲽情深，白首可期。如果娶到机月同梁或巨日那些组合，就达不到相契的效果。


    □忌星冲入妻宫，究竟离婚或者克妻？


    □不知道。


    □为什么不知道？


    □克不克妻是不可推算的，而离不离婚则要看他娶到谁，以及他们有没有离婚的意愿。


    命理（斗数、八字）有一条经验法则指出，“婚姻的成败必与配偶有关”，令郎目前尚无对象，想推算婚姻成败，就像老虎想吃天，不知该从何处下口。


    □戊戌大限不宜成家的理由除了天机化忌在妻宫外，与三方照到的诸多煞星，形成一'
