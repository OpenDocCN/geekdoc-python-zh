    ## 鞠躬盡瘁

    一


    （第一次討論，某日午后，在我的工作室内。）


    [ ] 這種命可能發達嗎？

    [ ] 具備了發達的條件，時機成熟，就可能發達。

    傳統命理主張擁有發達的命就注定發達，已被后代學者修正，認為還要許多外在因素的配合，這些因素或多或少，與發達的程度成正比——越在高峰，困難度越高，成功的條件也越苛。此外，還要走到強而有力的運程，趁勢鵠起。


    [ ] 就結構而言，老兄這個命紫相朝垣，輔弼相加，格成「君臣慶會」，擁有領導統御的能力，得以群策群力，成就就不小。這也是殺破狼加煞，沖勁極強，尤其鈴貪、鈴羊、鈴陀分別成格，前為武將，得以威鎮諸邦，鳴聲在外，后爲异路功名，在世間百業中鶴立鷄群。


    [ ] 命宮諸煞會聚，幾呈六煞全彰的地步，主哪些凶兆？

    [ ] 毫無疑問的，煞星將帶來沖擊、煎熬與強烈的挫敗意識。煞星會照越多，那些現象就越顯著。但這種人干劲十足，勇于開創，敢于冒險犯難，多能异軍突起，只不過勞心勞力，難享清福，諸葛亮說的「鞠躬盡瘁，死而后已」庶幾近之。


    小時候不懂得保護自己，常遭外傷，長大后則脾氣暴躁，精神苦悶，神經過敏。此外，還可能導致下列諸項事實：


    （一）積極性和韌度均强，在高度競爭的社會立足，如魚得水。

