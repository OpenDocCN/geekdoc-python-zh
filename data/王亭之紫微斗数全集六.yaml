    三、运程分析：


    五、二十四岁行第二步大限戊戌，财帛宫天机化忌，原盘巨门化忌均照入大限命，父母宫又凶星会聚，家庭条件差自不待言。


    十五、二十四岁行第二步大限丁未，与原命四化重叠。命宫无主星，借对宫星曜安星，武曲贪狼为用。武曲主参军、从商、手艺、利器等等，一九五五年流年又行抵未宫。又形成流年迁移宫坐武曲的情形，该年命主本人年满十八周岁。正与当时参军的条件符合，所以有参军的机遇，但因为有地空星坐守，表示想干的事受到阻碍，加上主星不力，便表示不能成功，于是去不成。事实上，据命主本人讲，已经填了表格，直等体检过后便可入伍，但遭到家里人的强烈反对，遂撤去了申请。同时，这步大限巨门叠忌在疾厄宫，表示该大限内必有一场大病。那么为什么发生在一九五九年己亥呢？因为己亥年羊陀叠并，而小限的命宫又坐在陀罗叠并的宫位，且主星为七杀，虽不是标准的七杀重逢，也极为凶险。而流年天干使文曲化忌坐守流年的疾厄宫又与巨门叠忌相会照从而引发了大限疾厄宫的凶性，主疾病缠身难免。命造本人实际于该年大病缠身卧床达半年之久。


    二十五、三十四岁大限行抵午宫，对宫天同化禄与原命太阴化禄会合本宫的禄存，应是一步好运，事业上有进展。但官禄宫与大限命宫会原命的巨门化忌，有冲破之虞。表示官非口舌之事难免，但不致构成大凶。一九六三年癸卯，流年擎羊冲起原命的擎羊会照流年的命宫，而流年命宫为巨门化忌和天梁所夹，形成类似『刑忌夹印』的格局，通常情况下，天梁为荫星，但也带有刑杀之性，尤其在不能得到入库的太阳照会时较为严重。同时，流年贪狼化忌与大限田宅宫的廉贞化忌、破军化禄交冲，形成禄逢冲破的凶格，而这种田宅宫被严重冲破的凶象除了表示住房、田产遭劫难或家中老人有大灾之外，也主有发生牢狱之灾的可能性（事实上坐牢必然田宅即住所动荡），实际情况是：命主在这年成为被改造的对象，连家也不让回，差点入狱。另外，在这步大限中还有一次官司缠身的情况。即一九六八年戊申，流年命宫被天机化忌和巨门化忌所冲，小限命宫又坐巨门化忌的宫位，巨门化忌本身就主官司口舌，显象极明。


    三十五、四十四岁行抵巳宫，为紫微七杀坐守的宫位。为『弱命走强运』，命造本人干劲猛增，似被一种巨大的动力所驱使，工作特别卖力。但因紫微无辅助又三方四正禄权不照，所以尽管他本人自我感觉良好，但并无实质性的进展，是一步平运。须流年来定其吉凶，起伏不会很大。


    # 四十五、五十四岁大限甲辰，机梁坐守，大限的禄权科在三方四正不照，仅太阳化忌落在夫妻宫与巨门化忌同守。因巨门为暗曜，主口舌，所以四十五岁以后夫妻经常闹矛盾，吵个不停。而且，两颗忌星还冲对宫的官禄宫，会导致工作职务上的不利变动。太阳巨门为外乡人的组合，表示外地调来的干部对自己不利。一九八二年壬戌当流年走到太阳化忌和巨门化忌两颗忌星坐流官禄宫时，命主正式离职，结束了近三十年的会计工作。而他本人接着说，『一九八三年癸亥，他本人又被请回大队。但已不再做会计。而是干一些后勤方面的杂务。』


    从命盘上如何验证呢？癸亥年破军化禄在夫妻宫冲流年的官禄宫，表示工作上的喜庆，而流星的格局决定了所干工作的性质依然是辅助性的工作，正与命造所言相符。


    预测到此为止。张先生甚感满意。觉得这套『算命术』确实非同小可。事后，张先生又主动提出帮我收集几个典型命例。并亲自领我一道去走访那些具有典型事例的一个个村民，收集了许多宝贵的特例命盘。


    （例三）：四川万县张先生，研究八字命理多年，颇有心得，经常游历川鄂湘等地，寻师访友。一九九五年春，张先生来到我会，命出一人的八字共同探讨，其八字为辛未、己亥丙辰、己亥，问其人格局高下如何，我便问其人生于何月何日，以便紫微排盘，张先生说是十月十一日生人。据其生时排出命盘如图二：


    命宫在子、天相廉贞坐守。本无太大奇特之处。但辛年生人，巨门化禄，与父母宫构成『财荫夹印』大格，且无破。我便说到：『此人大富大贵无疑，而且六亲之中，父母均寿高；兄弟中虽略见刑克，但应各有功名前程。对其本人助益良多。』张先生听罢，惊讶中带有疑惑，又问道：『您看此人是干什么的？』我低头再看命盘，『财荫夹印』主富贵双全，但地空坐命，恐富字要差些。身宫在戌夫妻宫，为贪狼入庙坐守。会火星、擎羊、『火贪格』与『羊火格』分别成格。加上辰宫的武曲对照，可视为『贪武同行』格的一种。古赋中有云『羊刃火星，威权出众；同行贪武，威压边夷』、『贪狼火星逢庙旺，名镇诸邦』，官禄宫又是『武曲庙旺，威名赫奕』。很显然，此人必是军政要人。张先生惊讶之余，从包中拿出一本书本。原来命造本人竟是清末有『中兴第一臣』之称的名将曾国藩。接下来再照书中履历，细推大限流年的运程。竟能一一吻合，丝毫不爽。下面作一简要批断：


    # 一、文昌化忌为何冲不破巨门化禄？


    在紫微斗数中，辅佐二曜共计八颗星，即天魁天钺、左辅右弼、文昌文曲，禄存天马。其中前四颗为辅曜，表示他人的助力；后四颗为佐曜，表示以自力为主，包括本身的学问能力等。辅曜中，魁钺表示贵人的提拔。辅弼表示亲朋好友及同僚的帮助。乃至部下的效命。佐曜中，昌曲代表自身的学识修养。禄马表示自身能力及自己所付出的努力。


    **二、财帛宫紫府同宫。** 为何命主一生生活简朴。


    **说到对于财富的看法，一般书中认为，紫微也是一颗财星，主财丰盈。但严格说起来，这种观点不尽正确，通常情况下，紫微主贵不主富，而且以化权或得辅佐为佳。至于说紫微也主富，是指在紫微得用后即构成贵格）。因为有了权力，当然不至于财富平平。**


    **紫微斗数十四主星中，财星计有三颗，即天府、武曲、太阴，且有各自得用的条件。天府虽大凡紫微批命，对于格局的高低以命身宫为主，至于命造的发展方向和行业断定以二雄心壮志。至于迁移宫的『英星入库』和财帛宫的『紫府同宫』与本人格局关系不大，而且也缺少一些成格的必要条件。须要岁运的引化方能起作用。**


    **者再参官禄宫。**另外，本例中福德宫『七杀朝斗』成格。表示命造本人确有成就大功业的。


    **以在图二所示的命盘中，文昌化忌对『财荫夹印』的格局不构成冲破。但在大限上的三合方遇到，会出现文书方面的失误。**


    **但逢辛生人巨门化禄，再文昌化忌同宫，反成为一大格局，主历尽艰辛而终友能富贵。所如『骨髓赋』中所说『巨门辰戌为陷地，辛入化吉祿峥嵘』乃是指巨门在辰戌二官落陷。**


    **曲化忌对『机阴同梁』这组星系的影响又小些，特别对于巨门而言。影响又至为轻微。**例紫、武、廉及杀、破、狼二组星系怕昌曲化忌。武曲尤怕文曲化忌，贪狼尤怕文昌化忌；昌曲二星还能化忌。根据紫微斗数各主星的特星。昌曲化忌的影响也不尽相同，其中尤以这八颗星中，又只有辅弼昌曲四颗星参与四化，且均不能化禄、化极、而只能化科，其中昌**


    为财帛田宅主，但必须得禄才主富裕，禄指禄存或化禄必须同宫或在三方四正会合，否则也要大限或流年的禄存或化禄在三方四正会合或同宫。术语叫做冲起。才主财源广进。

    至于术例中，命造一生生活简朴，除了天府不得禄之外，还有一个原因就是命宫地空星坐守；另外，财帛宫还阴一颗陀罗星，主财源散失。所以曾国藩寄回家老家的俸银，还要周济亲友。除此之外。命身宫的地空地劫除了耗财之外。对其人面貌的影响还为脸型尖小、呈核状、查曾文正公的像谱正是如此。


    三、六亲宫位的看法：


    父母宫天梁坐守在未。与辅弼同宫。三方四正会齐天机、太阴、禄存、太阳化权、天马。

    天梁本来就有长寿的星性。又加上三方四正全无半点煞星。又有禄权拱照，当然更是『福如东海，寿比南山』。至于说辅弼二星不宜坐守六亲宫，是指单星而言，同宫则不在此论。


    兄弟宫巨门化禄。文昌化忌与铃星坐守。对宫太阳化权与天马，三合天机。天同及文曲化科。四化星会齐。所以兄弟里面，大多有自己的功名前程。因为巨门化禄是本人成『财荫夹印』格的必要条件。所以兄弟中必有对命造本人有特别助力者。看曾国藩一生履历。兄弟众多，且有不少在帐下效力，老九曾国荃更是其一生的得力助手。而同时兄弟宫有化忌。铃星同守。表示兄弟中有刑克，而事实上，其弟中有随军阵亡者。


    子女宫太阳居酉为庙旺之地。又有禄存同守，三方四正无杀星会照，对宫又有文曲化科，表示子女为才华横溢，身怀特殊技艺之人，且在本行业中声名显赫。


    夫妻宫独立成格。在现代，因妇女地位的提高，表示妻子有自己的事业。本命盘夫妻宫成『贪武同行』的大格。在现代应该是不小的事业，但由于时代的不同，仅表示娶名门望族之女，老丈人在当地有权有势而已，这是古今看法的不同。


    # 四、一生运程概略：


    大运逆行，十五｜二十四岁大限走到兄弟宫，前面讲到，昌曲化忌对原命巨门化禄无大碍。因原命盘的禄权科三奇嘉会，所以这步大限利科名。二十三岁癸巳流年禄忌不照，但流年命宫坐原盘太阳化权的宫位，加上流年巨门化权，太阴化科分别从对宫及官禄官照入，该年有科举成名之象，所以入『县学』。二十四岁甲午年，流年命宫坐午位，值破军坐守，魁钺佳会，官禄宫因为火贪格突发的性质，加上流禄在寅，对宫廉贞化禄，本宫破军化权，官禄宫会武曲化科而化忌三方不照，所以『举乡试』。


    二十五、三十四岁大限走到戊戌。为贪狼入庙坐守的宫位。因有『贪武同行』的大格在，以大限宫干使贪狼化禄在大限的命宫。主这步大限飞黄腾达，非同小可。二十八岁戊戌年，流年走到大限命宫坐守的宫位，年干又与大限宫干相成大限和流年的命宫贪狼叠禄。使『贪武同行』格的威力发挥到极致。主该年平步青云。锦上添花。事实上命主于该年『成进士改翰林院庶吉士。』而三十三岁癸卯年『以侍讲充四川乡试正主考』，乃因流圻三合方会大限的巨门化权，太阴化科冲起原命的『文曲化科』，所以主文书之喜。


    ![img/ba71cd450f8ceda4f93ce5470e449489_229_0.png](img/ba71cd450f8ceda4f93ce5470e449489_229_0.png)


    三十五、四十四大限行抵酉宫。为大限主星太阴庙旺之地，得三方辅弼，权科拱照。

    大限太阴化禄与原命禄存同坐命宫。大限禄存又在财帛宫照入。赋云『合禄拱禄。定为巨擘之臣』。因有原命的上佳格局在。必主功成名就。蟾宫折桂。至于福巨门化忌，乃因重任在户，自然殚精竭虑，不得安宁。四十五、五十四岁大限行抵申宫。为『紫府同宫』格，集南北斗主星于一宫。所以贵为三军统帅，战功显赫。至于官禄宫廉贞化忌，乃吉中藏凶之象，有血光病变之兆，万事宜小心谨慎，不宜倨功自傲，更不宜侥幸弄险。观曾国藩一生名利之关键。全在这两步大限之中，自四十二岁奉旨办团练。直至日后因攻克金陵，生擒太平天国忠王李秀成，赏太子少保衔。锡封一等侯。位极人臣。无不可从命盘上一寻其轨迹。至于其中也有惊险反复之事。乃流年运使然，但因大限的吉化力，而终于有惊无险。学者可对照其履历。一一细研，当不难发现个中机关。


    五十五、六十四岁大限行抵原命疾厄宫。乃落陷的天机坐守的宫位。三方四正的四化星呈吉凶交身之状。虽有本宫天机化禄与天梁化权的禄权佳会的辅助，但福德宫的太阴化忌及官禄宫的文昌化忌对落陷的天机构成的凶象也不可忽视。大凡主星庙旺者虽见煞星也足可抵挡。而天机星本就不是一颗星力强旺的星曜。又加上居落陷的宫位。所以难免吉凶不定。有运程回落之兆。主要表现为精神上的意志消沉和行动上的奔波劳碌。而官禄宫的文昌化忌明白地显示这步大限中有文书上的失误。这就是后来因教案一事，与外夷签订条约而致威名重挫的命理依据。六十二岁壬申年，福德宫武曲化忌。加上小限疾厄宫坐大限的太阴化忌。又受流羊流陀交相冲照。该年疾病身亡。


    从以上的推理过程可以看出：紫微批命法即先从原命盘所形成的格局来推断命主一生的社会地位和所从事的行业状况，并可以从原盘对六亲作一个大致的推断。然而再由大限所形成的格局以及四化的牵引来断命主一生运程的概况。从而在大限的既定前提下去细推流年。就可对命主的人生历程有一个清楚的把握。


    张先生听完以上这番论述，说他原先只是因为从该八字中找不到判断命造大贵的充足理由，所以想试一下别的预测方法，不想论断竟如此神奇。他觉得紫微斗数这套预测体系实用价值极高。很有研究的必要。请我给他推荐几本入门的书以便自行研习。过一些时日再登门请教。


    [后记]：一年以后，收到张先生的来信，信中说他自己『将紫微斗数与八字命理结合』在给人预测时准度和精度迅速提高。现在当地已很有名气了……并随信附寄了几份实际推演的例子，当真进步很快，令人欣慰。


    通过以上的几个例子，相信读者对于紫微斗数的预测方法已经有了一个大致的认识。事实上，对于每一流年的十二宫所代表的事类都可用类似的方法来作一个准确的批断。但这种不着重点的方法既浪费时间又不裨实用。所以一般不予采用。而在实际推演中，这种逐年流水帐似的推算方法也没有必要。通常只须抓住命造一生中比较突出的方面来加以阐述。再加以限运流年中点出几个关键的时间段即可。如排出这条主线逐层深入找出其克应的时间及原因。其它方面简要提及即可。这种提纲破挈领式的『重点论命法』，对于针对性地验证斗数理论十分必要，是提高预测水平的捷径。下面的几例即是按照这一思路来批判。


    【例四】这是几年前一位海外同行提供的命例，命盘如图8。


    命宫在戌、天府、廉贞坐守，皮肤粗黑。性格方面天府可制廉贞之恶。又见左辅右弼对照、性格温良。还有，对官七杀陀罗冲照，有破相之虞、面带疤痕。


    从格局上来分析，天府廉贞坐守得辅弼、身宫紫微、羊刃、火星、文昌得对照福德宫的贪狼化禄拱照、官禄宫武曲天相坐守，综合起来。大致可确定命造本人是经商的。格局中上。


    财帛得禄星拱照。一生财源丰裕，但三合方吉凶互见，有起伏。所以分析这个命造的重点可放在财帛的消长方面。


