  md: '以后就要走这条路。


    □甲戌年将参加大考联考，不知考运如何？可能考上第几志愿。


    □丙戌大限是巨日兼日月拱照的结构，煞星照入，有点浮动，却是一步精采的事业好运。盖天同禄从申照寅，在安定中进步，考运不错。


    廉贞忌在巳，大限健康宫也。对读书考试本无作用，但体能受到干扰，面对各种挑战，总有一种心余力绌的感觉。这个命从初限起，连续三十年健康宫位遭到忌星侵袭，书固然要念好，身体更需锻炼，才可无疑。


    考运好坏与中不中榜以及考上第几志愿，没有直接的关系——考运坏中榜的很多，考运吉落榜的更多。可见实力最重要，考运不过推波助澜而已。


    二

    □如果考不上大学，相信很快就要就业，也立刻面临择业的困境。丁亥大限命无主星，我会受到怎样的遭遇？

    □此限有两事比较凸出：一是命宫无星；二是禄忌不照。前者普受外境的作用，会跟着社会的脉动或父母师长的意见走，后者因为是静运，显示经历的是个静态的社会，一切按部就班，平稳安祥。

    三十二岁以后的戊子大限是机月同梁组合，命宫有星，但运程仍旧十分柔弱。贪狼禄仍不照命，相反的天机忌在命宫坐守，故心浮气燥，颇不安定，若有什么改变，想必是内心


