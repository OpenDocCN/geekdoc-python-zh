  md: '□有些命書指出，田宅宫强旺、見禄，可以投資房地產，并可能獲得祖產，我有這方面的機會嗎？如果可以投資，何時適宜？


    □那種說法，不可盡信。


    先天田宅宫雖然可以類化爲祖居，却不在可算的範圍之内，因爲祖居由親族所共有，分家之后，本人能分到幾甲或幾坪地，必須輸入别的條件，并非每個人都無例外。


    一個人能不能投資房地產，那是后天行運遭遇的事，宜觀察大限田宅宫的旺弱，大致上說，此宫見忌，財物結構脆弱，從事巨額投資，極易因爲周轉不靈而弄得血本無歸。


    財源被破，大環境時時刻刻籠罩着損財的陰影，有動輒得咎之象，臺灣房地產的投資充滿投機，這種運程易被套牢，不然就是該賺的没賺到，不該賠的却賠了。


    □那么投資股票又如何？我指的是短期投資，搶帽子那一種。


    回炒作短期股票不但需要技術，而且需要運氣，技術可以學習，運氣目前没有。由于影響股市漲跌的因素實在太多，實非單純的命理所能掌握，完全交給命運，好像没什么道理。


    財源弱勢，不是隨便投資都能賺的錢，最好守己守分。若真的對股票買賣感興趣，不妨利用中綫做短綫，不然干脆放長綫釣大魚，可保無咎。'
