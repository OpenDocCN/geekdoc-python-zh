    婚姻的先決條件是兩情相悅，如果覺得對方可以托負終身，嫁給牠就是正確的選擇，不必理會它人的胡言亂語。


    □算命先生說他庚午年有姻緣，遇到我之後反而無疾而終，也參考知他果。我想知道的是，辛未年天梁居命，受廉貞祿與流年祿存夾輔，妻宮巨門化祿，吉祥如意兼喜氣洋洋，小登科應無問題。倒是我的流年夫宮坐着文昌雙忌，雖也感受祿星（巨門照入），畢竟凶多吉少，算命先生卻斷我此年將因男友或丈夫破財，你認為如何？


