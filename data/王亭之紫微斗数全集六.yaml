  md: '**一文桂文華，九重顯貴**、一朝斗仰斗，爵禄榮昌，現代人隨便瞧一眼就能判斷那根本是不可能的。


    **□『君臣慶會』既然都不足以言貴，該怎樣的結構才能顯達**


    襄理已是高級主管，說是「君臣慶會」之福，一點都不為過。有吉而無煞，傾向文職顯貴，在事業上力求表現，締創彪炳業顯，較無意外。由于具備了發達的條件，當比一般命格容易貴顯，追求社會地位，建立個人聲望，宛如桌上拿柑。煞星遁形，優點是可以免除肉體與精神上的煎熬（通常也會拒絕接受煎熬），一般世俗所盛贊的「好命人一或一有福氣的人」但缺點更多，冒險犯難、怒犯天條等霸氣，將一無所有；相對的只能蕭規曹隨、「歌德派大將」。缺乏煞星也無法學習專業技術和特殊技術，只能從事一般行業。


    **□我辦理的業務大部分是放款，工作煩瑣，没什么成就感，將來可能轉業嗎**


    紫府都是帝座，坐南帶會北帶的人極易幻想他就是皇帝，無論存乎于心或是形之于外，都給人一種高高在上、君臨天下的感覺，故性格難免桀傲，手段難免高壓，不管任職自創，都會取法乎上，律己苛人。


    **不過**，這樣的結構仍以任職為佳，在大衙門奉公，循序漸進，多能發揮所長，升到一個不錯的職位，自創力量有限，格局太小，浪費生命而已。


    **□如果不靠算命**，我們憑什么方法可以獲知運勢的強弱？


    其實每個人都有預知的本能，只不過受到欲望、貪念和各種現實環境的污染、覆蓋。'
