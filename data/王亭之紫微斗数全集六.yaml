  md: '「運程確實有點背。關鍵是連走兩個戊運、兩個己運，其中運武曲化祿、戊運貪狼化祿，都在未宮（己的忌星文曲也在未，屬於吉凶參半），但是行運到戊子、戊寅二宮，貪狼祿未遇，遇到的是天機忌大減。這些情形都算遺憾。」


    「我是天生的上班族，丁亥大限當完兵回來，進入一家民營企業，然後歷戊子到己丑，從未想要更換行業，有的只是職務變更，這樣勉強算吉嗎？」


    「若是如此，那就吉祥如意。我們預測，往后每個運都將是好運，四十歲也就是戊子大限結束前，升到經理甚至總經理這些高位，一點都不覺得意外。」


    「我現在只是副總，想爬到老決的寶座，也許還要三四年，或者更久。你看我可能擁有自己的事業嗎？」


    「臺灣人喜歡做老板，然後開着進口轎車，吃昂貴名菜，在聲色犬馬場所被公主少爺叫一聲（張爺）（麻總）過癮，其實不是所有人都能創業，獨立作戰尤需運動，你老兄最佳運程還要等十幾年，實在不必多此一舉。」


    「我將豈非毫無成就可言？」


    「也不見得。現在的副總，未來的老總，甚至可能成為股東，進而高升董事長，這就是成就，在我們這些只會搖筆杆的人看來，你們是坐在雲端。」'
