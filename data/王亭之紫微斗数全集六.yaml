    两种组合的命多具双重性格，一隐一显，深藏于中、呈现于外，但多半要到独立自主的时候（壮年以后）才会逐渐显露。铃贪成格而紫府朝垣不成，故武略文胜一筹，从事略带武职性质的行业，成就高些，日后无论行业的选择抑或人际关系的运用，宜以此为准绳。命宫星曜旺，承担力强，可以被畀以重责；煞星多半在六亲宫位，阻隔了亲情缘份，这方面难免有所不足。


    □我原想念自然学科，妈妈说女孩子念理工太辛苦，于是改弦易辙念起商学，不知这种改变是吉是凶。会不会跟我的基本命格起冲突？


    □冲击力虽强，却非十分突出，盖六煞只见其一，仍然表现婉约纤细的一面，求学期间可以学习专业技术，但不宜过度冷僻，一般技艺如雕刻、烹饪、编织都适合发展，学习这些持艺的目标是激发铃贪的潜能；如果数学不错，当然可念自然类组，否则还是选文法商比较保险而且轻松。


    □进入社会之后，从事哪种类型的行业才算适性？


    先上班一阵子，再伺机跳出创业；由于欠缺辅佐人材，校长兼打钟也，每事躬亲，必须任劳任怨，方能有成。铃贪不一定专指技术，学有专精，潜能充分发挥，优点凸现出，成就必高，'
