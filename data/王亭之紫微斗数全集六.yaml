    ## 太歲入卦


    我在辛未年认识了那个女孩，因而动起了结婚的强烈念头，她也已有肯首，壬申年中托人向女家提亲，说巧不巧，刚好碰到她的祖父仙逝，过程于是有了波折，双方几乎弄得不欢而散，我一气之下，干脆打消念头，不过两人仍旧暗中密切往来。她小我二十岁，懂事、体贴，真诚待我，甚合我心。


    我现在面临结婚的压力，过完年想去再提一次亲，想象中阻力一定还在，成功机率不高，因此有等后年她满二十岁后再办的打算，届时会不会变生肘腋，谁都不敢确定。我有一友略识命理，他运用紫云先生『太岁入卦法』算出跟她缘分不厚，日后互动不良，快者后年就现出劣迹，似乎恶缘一椿。你认为鄙友的论断如何？若真的是一段恶缘，不如早做了断，另起炉灶，这是我的想法。


    这个部分属于合婚的范畴，斗数古籍不谈，现在人自己摸索，使用的方法都很怪，缺乏现实的验证，无法让人置信。我们认为，合婚宜分两个步骤进行，一是相契，一是刑克，命盘摊开，比对一番，优劣立见，骗不了内行人。


    先看相契与否。


