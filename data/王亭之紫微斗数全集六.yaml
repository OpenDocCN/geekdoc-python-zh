    昌貪被忌星催化，即使換業，通常無法延續舊业，浪費許多寶貴的經驗。


    □祿在疾厄宮，主哪些作用？


    □禄在疾厄，作用最不明顯，因為該宫不能直接探討健康的消長。祿照父母，暗示對父母百般考順，言聽計從吧。


