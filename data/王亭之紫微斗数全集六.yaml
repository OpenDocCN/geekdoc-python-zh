  md: '變成因學問精湛、口才出眾而得財得權、反不以凶論。


    【問題十】：請重點說明『殺破狼』格局，特別是位于命宮、夫妻宮時的情形。


    答：『殺破狼』即指七殺、破軍、貪狼三星而言，此三星永遠在三合方會照，若七殺坐命宮，則財帛宮必有貪狼，官祿宮必有破軍，其它亦可類推。『殺破狼』主開創，凡大限行至『破狼』坐守的宮位，均主人生大幅度的變化。其中七殺指以往在這方面沒用任何基礎的開創；破軍主去舊更新；貪狼多指表面風光，而無開創的實質。若能自成大格，富貴不小。如『七殺朝斗』、『英星入廟』、『貪狼多指表面風光，而無開創的實質。若能自成大格，富貴不小。如『七殺朝斗』、『英星入廟』、『貪武同行』等均是大格。一般情況下，開創的結果要視同宮和會照的星曜吉凶而定雲熬星多則主艱難險阻重重。會吉星多則主功成名就。其中尤以化祿和祿存為佳，最忌破狼分布三方，為全盤關鍵』，就是因為這場大幅度變動的結果直接關系到后半生的命運。


    開創成功，則半世無憂，開創失敗，則苦不堪言。


    凡原盤命官為『殺破狼』格局，則人生起伏極大，小小機緣即可導致大起大落。若三方四正吉星會照，則主歷盡艱險而終能功成名就；若凶星冲破，則人生災難挫折極大，甚至生來即帶殘疾，或日后喪于刀兵之灾等等，尤以七殺、破軍坐命宮為然，貪狼在此列。至于『殺破狼』坐夫妻宮，因夫妻是兩人的事，喜穩定而不喜開創，否則即指提婚姻不穩，逢歲運角發易引起離婚，喪偶等情形，但若不會熬星及化忌則不在此論，若破軍化祿反主婚


    《斗數宣微認為『殺七殺化忌，廉貞化忌來冲。


