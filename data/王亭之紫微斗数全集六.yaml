    # # 副星星情補述


    > 《學習指南》中提到《方術異聞》中的星情論斷很有特色，下面將其副星的星情補述如下：


    ### 一、文昌文曲


    卯酉時生人昌曲在丑未同宮，若與日月魁鉞交會，一生必然很有發展、聲名極佳。加化科更好；昌曲會破軍在丑未，若為命遷線表示有水災。去世必與水有關，如死在洗澡間，天雨路滑發生意外等。


    #### 昌曲會破軍在疾厄：脾濕、吃生冷的食物，皮膚易發癢、搔破皮淌水（非血）。


    大限的田宅破軍會昌曲、屋頂再怎么修，總是會漏雨。


    昌曲入命或官祿、從事的事業和文教有關，與紡織品有關，因文昌為經，文曲爲緯，文昌爲直爲原料，文曲爲橫爲加工。


    文昌爲文書星，會天刑與法律有關。


    文昌化忌逢官符，有官訟是非。


    文昌在命，格局差也會當文書。


    文昌在父疾線，命財官三方，逢生年干辛，或三合方有辛使文昌化忌，學業易受阻。父疾綫有文昌，大限的官祿逢辛使文昌化忌，此限必然文書麻煩多。'
