    回斗數並無地域的劃分，譬如歸納出一個人生在三界十方哪個方位必然富貴，哪個方位則是貧賤；同樣生于臺灣，只能到南部工作、北部求學、歐洲留學、美國經商等等，因此判斷庚午年大破，與流年、大限錢財支配的消長有關，而與對象是日本或日本人無關。


