    - 左右入兄弟，“真情”，善待兄弟、朋友。\n- 入子女，对子女宠家。\n- 入疾厄，有宿疾，小毛病多。\n- 左右在迁移，经常往外跑，好交际。\n- 入福德：可能恋爱两次，也很喜欢交朋友。\n\
