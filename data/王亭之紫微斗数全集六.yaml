  md: '開始就是錯誤的，我們仍然維持了十四年，到三十八歲那年才簽字離婚，如果忌星冲破夫宫造成离婚的作用是假的，那么问题的症结究竟在哪？


    □庚子大限太阳禄照入夫宫，二十四岁之前，情窦已开，红鸾星已动，若有对象，当然可以出阁。拖到己亥大限，也行，武曲禄仍然牵引夫宫，带来喜讯。有人问道：『庚子大限结婚，己亥大限夫宫再逢冲动，会有外遇吗？』确实有这样的征兆，但并非必然。外遇是第三者介入，本人不给他机会，婚外情就燃烧不起来。


    探讨问题，光用一个人的命盘根本看不出错误的症结，盖婚姻成败必与配偶有关，这是双胞胎整个系统相同，却一个离异一个鹣鲽情深的关键所在。使用一个命盘推论两个人的事，结论必符合所有同一生辰的人，不可能通得过逻辑的验证。


    二


    □我可能再婚吗？约在何时？


    □一个人愿不愿意结婚（包括再婚），应凭自己的意志加以决定，询问别人，那些意见再好再妙，最后仍要自己决断；只有深信命中注定的人，才会交给神明或命理来处理。如果你有这个意愿的话，首先是积极寻觅一个对象，等此人出现了，再来研究何时结婚不迟。


