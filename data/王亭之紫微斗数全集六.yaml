    | 己卯 | 武曲殺弼七右地 | 丙戌 | 太陰 |

    | 戊寅 | 天同梁天 | 天相魁天天 | 巨門 | 廉貞狼貪左輔食左 |


    許多人發現命宮無一主星，甚至連輔星也悉數遁形，就大驚失色，完啦完啦，這輩子別說飛黃騰達，就是混日子也難，其實命宮有星無星只是內心虛實的問題，而非外在環境真的問題，追求名利，時機成熟，照樣成功名就。

    此命的點是火貪、火羊、君臣慶會相續成格，自主性雖弱，只要潛能釋放出來，努力精進，屆時要什么有什么，不是蓋的。


    没有定则。理论上说，火贪与君臣庆会较强，因为此二者由主辅两种星曜合照，而火羊都是辅星，故势力略逊。

    □形成特别格局后，是否铁定发达？

    ■成格命具备了发达的条件，但并非保证发达——既做高官，又掌大权，更是多金。发达是要许多外境配合的，职位越高，条件相对越苛，奋斗时间越长，这是古今中外的成名就始终只有少数的主因。

    古代命理对许多推论过分简单，限于逻辑和方法学的知识不足，无可厚非，现代人头脑清楚，观念清晰，已能发觉各种错误的主张，并加以排除，不再受惑。

    □女人毕竟是女人，命局太大，反而是一种负担。这些负重已到身心俱疲的地步，究其原因，一部分出在潜能未得充分发挥，想得到做不到，一部分跟家庭因素有关，我该如何调适，才免被击倒？

    □学习专技，并从事相关的业务，得失心减弱，是调适的方法之一。

    事业不顺遂是后天行运的遭遇。戊寅大限天机忌入午，这个午就是事业宫，有执掌、经营失去均衡，事倍功半，偶遇挫折，就会痛不欲生。

    □何时才能否极泰来？

    □此命逆行，走不到事业旺运——丙戌大限终于走到，此时已年高七十有四，迟来的好运不算好。但无鱼虾也好，次旺运还是有的，二十四岁起的己卯大限武曲禄星自坐，斜照事業宮（在未），初出茅廬，諸事如意。

    戊寅大限以后不再改業，也就是延續己卯大限的舊業，那么足有三十年的好運可走，因為兩個己的祿星武曲在卯，而兩個戊的祿星貪狼在亥，均與舊業有關，只有延續，才能繼續呈祥而不受忌星的感應。如果戊寅改變行業，那么將受天機忌強烈的感應，所做所為，多遭橫逆。


    二

    □我在三十六歲（乙丑年）那年獲資開了一家服飾專賣店，并接受客户委托裁制，近年來因為歐風強勢，許多人喜歡法國貨的品味，加上顧客的習慣重大改變，生意每況愈下，幾度準備弃守，但總覺得可惜，從運勢軌跡看，我繼續經營好還是改行好？

    □目前大限在寅，癸酉年起進入另一步嶄新的運程——己丑，運程消長，分析如下：

    （一）戊寅大限見忌不見祿，挫敗困頓，不言可喻，己丑大限正好相反，見祿不見忌，故宜收拾戊寅的舊業在己丑從頭開始。

    （二）己丑的祿生（武曲）居福德位，乃財源之宮，財源廣招，想賺的錢多能到手；忌星文曲在甲，健康宮也，與事業無涉。

    □有人說我這個命承擔力不強，不會發達，偶爾小發，也是虛發，想想也就死心了，己丑大限的財源雖佳，不知有没有實質的效果？

    □天相居財官，這顆星就是財星，但不能進而推論天相主衣祿，可保一生衣食無缺：我們仍須參加此宮的三方，才能決定旺弱，進而推敲進財方式和享受的程度。三方諸星果然突出，形成好幾個格局：火羊、火陀、鈴羊和鈴陀，確實具備了橫發的條件，從事商賣，將本求利，配合運助，自然發財無數。

    即使未能走到强而有力的財運，這種人謀財手段極高，可以不虞匱乏。煞星主技術生財，間接進帳，經由服務業、生產或加工獲得，偶爾買空賣空也可，但火中取栗，風險較大。

    從行運看，己卯、己丑兩運利財，戊寅大限剛好相反，破財損財。

    兩步己限的忌星文曲都在申宫——一是己卯大限的合伙宫，一是己丑大限的健康宫，均與財物支配無涉。戊寅大限天機化忌從午照入戌，這個戌宫正是財宫，终于嘗到賺錢不易、破財却易的滋味。


    三

    □夫宫武曲七殺坐守，結構甚强，煞星照入，更形剛烈，依古籍記載，我們這種人此生為夫操勞、被子拖累是跑不了的，據說第二次婚姻才可能白首，是否有此一說？

    □并无此說。

    婚姻成敗必與配偶的良窳有關，二婚（包括多次婚在内）都是特性（少數人所獨有），使用共盤推測，必無可信度可言。

    命宫欠安，夫宫更形駁雜，盖主星多達七顆，且構成君臣慶會、鈴貪、鈴羊等格，顯然過剛，剛則易折，婚姻基礎十分脆危，必須小心維護，才能安度。夫宫成格，思春時期，希望嫁個有勢力、有地位的丈夫，但此事可遇不可求，應放棄少女的矜持，主動尋覓，表明心迹，但自我實現能力較弱的人無法如願，挫折意識强，經常高不成低不就，不然就是「巧婦常伴拙夫眠」，喟嘆造化弄人。

    「我先生是個公職人員，勉強說是個專業人員，擁有相當的知識（碩士學歷）、地位（總工程師），若說有什么成就，大概就是這些」，這樣的條件符合我命中的需求嗎？他重視專業，依你們觀察，他未來能升到怎樣的職位？

    「第一個問題的答案」是」，第二個則不知該怎麼回答，因為丈夫的事宜最好用他自己的命盤推敲——從配偶的命盤上即使顯示一些蛛絲馬迹，跟猜測没什么兩樣。


    ## 霧里觀花

    一

    □命無主星的人因為自主性弱，易為環境所迫，必須往外發展，才能發達，可是遷移宮被忌占據，依照『化祿遷移位，發迹于遠郡』的反面說法，外緣不佳，外出受阻，無利可圖，那麼我該如何自處

    □命無主星，諸星都在外面三方，故主觀意識淡薄，容易向環境妥協，改變初衷，甚至隨波逐流：一生行事普受外境作用，思想游移，看人臉色吃飯。

    □禄在父母宫，孝顺父母，尊敬长亲，把最好的东西给他们，这是一辈子的事。做得怨天尤人。

    □现在的乙亥大限太阴化忌进入父母宫，变成先天见禄、后天遇忌的局面，如此禄忌交替，表示什么吉凶

    □大限忌星进入父母宫，阻隔了亲情的表达，亲子感情滞于低潮，为人子女者必须体谅父母的唠叨，才无遗憾，这只是行运中偶遇，过了此限，一切恢复正常。


