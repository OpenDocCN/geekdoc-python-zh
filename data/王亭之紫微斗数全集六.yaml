  md: '# # 得之我幸


    # 一


    □你看我這個命是好命還是壞命？


    □判斷一個命好壞，一定主觀，蓋其中並無一個標準，因此正統的命理分析不做這種結論；我們只要把命理結構、運程消長充分描述，供當事者參考，就算功德圓滿；若說有什么好壞，應由自己判斷。


    就命理結構而言，三方照見吉煞、祿忌，强弱平均，文武相稱，没有特别凸顯的事項；社會地位和個人聲望適度，可以成爲一個稱職的幕僚人材。


    □祿存據說有逢凶化吉、遇難呈祥的功效，它跟遷移宫的化祿形成『雙祿交馳』，錦上添花，照忌劫竟成『祿逢皮』，乃吉處藏凶，這種凶指的是什么？


    □我們不排祿存，因爲那是八字的概念，斗數主要星曜除十四主星、六吉六煞外，并无一顆祿存。命坐祿存，前后必是羊陀，正確的說法是『羊陀夾命』，終生難逃受人牽制的命運，何人制你？父母和兄弟姊妹也。生命歷程中，總覺得有種無形的壓迫，必須戒慎戒懼，委屈求全，包括待人接物、自由思考，老覺得施展不開。


    祿忌交會于命宫，好壞吉凶，不能十全——好不能好到底，壞也不會壞到底，總是一山窮水盡疑無路，柳暗花明又一村。


