  md: '議，可在實踐中去鑒別取舍，不强求一致。


    【問題六】：《詳述》中安身主，生年支爲子千時，身主爲天府、七殺、而《全書》中的身主安法是目前所通行的方法，所以大家也可參考。至于其作用各派也有一些不同的見解，民間有些門派用它來推『竹蘿三限』。而本派中，據曹硯明先生講：命主，身主是結合奇門和廿八宿來定方位，再配合法術施用來爲人趨吉避凶的，它不屬於預測學的範疇，所以并未深入介紹。而通常的斗數書籍中。都只是將命身主簡單地羅列在命盤上，實際推演中則不予理睬，殊無必要。


    【問題七】：書中對小限的安法說得不清楚，請作詳細說明。怎么數，數什么？從哪一年開始？


    答：請看《詳述》中『三十九頁的安小限訣』，以出生年支的三合局墓地所對冲的宮位作爲出生之年即虛歲爲一歲的小限宮。即巳酉丑年生人從未數。申子辰年生人從戌數，寅午戌年出生人從辰數，亥卯未年生人丑數，然後按照『男一律順行，女一律逆行』的原則去看二歲、三歲……時小限宮位。舉例如：丁巳年生人，地支三合局爲巳酉丑，該局墓地爲丑，丑對冲的宮位爲未，那么它出生那年的小限就安在未宮，然后再逐年流轉去推以后每一年的小限。即以上例中，若爲男命則二歲戊年圻小限就轉到申宮；女命則轉到午宮，其它依此類推。小限與流年的宮位合參，是判斷流年運程的方法之一。


