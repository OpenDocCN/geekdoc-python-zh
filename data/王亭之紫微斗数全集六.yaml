  md: '答：夾局的確是斗數中的一個重要概念，許多格局均與夾有關，如前面晚清名臣曾國藩的命例中提到的『財蔭夾印』，它的反面則是『刑囚夾印』爲指丁年出生的人立命午宮，值天相廉貞坐守，則爲巳宮的巨門化忌和未宮的擎羊所夾，一生是非口舌纏身，歲運再遇凶星便有牢獄之災，此即《太微賦》中所言『刑囚夾印、刑杖唯司』，也有的認爲是天相廉貞與羊刃同官方爲『刑辦夾印』本派認爲，二者均是。


    一般情況下，斗數最重對星所夾，所謂對星即指成對的星曜。斗數中比較重要的對星有左輔右弼、文昌文曲、天魁天鉞、關刃陀羅、火星鈴星、地空地劫等。另外還有雙化祿夾、祿權科夾、雙化忌夾凡吉曜夾即爲吉星夾鋪，會極大地增強所夾宮位的吉性；凶曜夾即爲煞星夾制，會引發所夾位的凶性。即以左右夾輔而言。凡三、五、九、十一月生人，左輔右弼必夾未或丑宮、若二宮紫微，天府等主星坐守的命宮，則主命主本人得部下擁戴，再加吉星會照可成就一番大業。


    是指二星坐丑未無吉星會照而言。因爲破軍的不滿足現狀加上紫微無吉加煞的剛愎自用便形成一組不佳組合，但若得到左右的夾輔，則能增強其穩定性而轉凶爲吉。倘若二星得左右夾三方四正再有昌曲吉供照，則成爲『君臣的格局』，從政必有聲名。


