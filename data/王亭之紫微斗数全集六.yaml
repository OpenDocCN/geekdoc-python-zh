    她年小纯情，我不忍心伤她，因此以何种方式、何时分手才是良机？


    分手的方式，我没什么经验，问我等于问道于盲。我有一友是佛学专家，有人向他请教婚姻维系之道，他大摇其头曰：「不行，我结婚次数太少，还不够成为专家。」其实他有过三次婚姻的經驗，老练之人也。我的意思不是要大家都去请教伊丽莎白泰勒（她嫁过八次），而是说这种事最好找经验丰富的人商量，若无商量的对象，那么在不太伤害对方的前提下，自己想办法。


    癸酉年以后我的妻缘如何？有无良缘？要如何判定？


