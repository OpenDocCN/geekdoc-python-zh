    ### 三


    □財官成格，應主橫發，遺憾的是我迄今仍無發財的感覺，是時機未到，還是盡信書不如無書。


    回財官成格是從財宮的位置看，火貪、火陀甚至君臣慶會相繼成立。這種巨構對一個人拚命賺錢、累積財富來改善生活的願望，可說相當殷切。中國古人說過，大富由命，小富由儉，所謂命，除了先天結構佳美之外，走到旺財運并從事可以發財的行業，都是一充分條件——有了那些條件不一定富庶，沒有那些條件，肯定富庶不了。


    行运中，早年的甲戌大限太陽在午化忌，正是大限的財宮，顯示這種物質條件十分拙劣。目前的丙子大限祿在事業，照入財宮，財官雙美，佳運無疑；未來的丙寅祿從福德照財，堪稱此生唯一且最受用的財運，把握良機，努力經營，當可獲財。其他各限的財宮不受祿忌照射，財运平平，預料不會有什么事。


    □諸运中未見祿星進入田宅，故財庫不實，倉廩空虛，如果我要累積財富，以防晚年饑荒，豈非希望渺茫。


    「財庫是藏財之所，財旺庫旺，頃刻間富甲一方，但是祿不可能同時進入兩個官位，因此祿在財庫，財宮穩定（未照忌星），就算吉祥。祿不入財庫而入財官，則錢財流通順利，也算不錯。」一般而言，財庫充實不易，弄壞却十分簡單，只要忌星照會田宅就行了，丁丑大限巨門化忌沖庫，庫存虛弱，不知節制，胡亂投資，就會周轉不靈，嚴重的話還會跑路呢。


