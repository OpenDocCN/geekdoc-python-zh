    成格命不必然發运，這是一個事實；但是只要他活得够老，總有一天會发，也是一個事實。看來发與不发的關鍵，即在行運，逢運則发，不逢则困頓，如此而已。


    「這是我的孩子，家里只有他是男孩，三方宮位六顆主星本來已足，偏偏會照一堆煞忌，顯然太過，過猶不及，據說剛烈的人終生勞碌，六親無緣，他確實從小就若是生非，讓家人生氣。這種命將來可能獲得什么成就？


