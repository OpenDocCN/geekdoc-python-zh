    丁丑大限的事业受祿牵动，成功率高，可以创新；此路不通，不妨另辟蹊径。也许有人会问：『祿遇空劫』乃祿逢冲破也，吉处藏凶，还指望马到成功吗？『祿遇空劫』吉意打个折扣是免不了的，但毕竟仍有祿的内涵在，不一定藏凶；因为其中缺乏凶的诱因，这跟祿忌交替的情况不同。所以宁愿见祿逢空而不愿见忌逢空，盖空劫对忌的破坏不可能负负得正。前面提到事业『祿马空劫』传统也认为这样的结构必须波动，主动出击，动才有利。不动则什么都不发生，不一定肇凶。


    就流年而言，历庚午、辛未到壬申这些年份的祿星都跟大限宫位有关，投资案可能着手进行。套句术语，这是一个『好的开始』。


    后记：李先生印尼的投资案最后未成，黯然返美。


    ### 花開并蒂


    □紫貪坐命主有雙重性格，古籍的說法是因爲貪狼不克紫微土，五行相克，天人交戰；內心不安，思想矛盾，該說頗爲可信，我確有這種情形。但是火星照入之后，一來火貪自成一格，一來木生火，火生土，木貪生忘克，從此得以化解，此說是否可信？


    □斗數星曜有無五行屬性？許多學者堅持有，我尊重他們的看法。我們一直不用五行生克制化，因爲那是八字的理論，斗數何干：我們不太了解諸星的屬性，推算時根本不考慮五行的生克制化。


    □算命先生看出我有兩個母親（母親是父親前偶后再娶的對象），實在有夠厲害，簡直嚇死人了。我問他是怎么看的，是否跟巨門坐父母宮刑克重有點關系，他說最大的關鍵是會到忌星，看到你的書（《斗數疑難一百問答》）才覺得他是猜的，問題是爲什么猜得那么準？


    我再強調他是猜到的，難免有人我嫉妒人，才說風凉話。此事事實不難辦證；如果他依據的不過是斗數命盤，那么依照邏輯推理，同命者一律擁有有兩個媽媽，你相信嗎？類似的際遇經常發生，恍惚之間，還以爲碰到了一個地仙。現代人不再像古人那樣不求甚解的，凡事都要追根究底，再玄再妙，一旦無法自圓其說，想讓人相信也難。


