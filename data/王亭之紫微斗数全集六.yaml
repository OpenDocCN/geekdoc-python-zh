  md: '有君子來求，自己也會主動去愛去欣賞一個人。不過，若想升學，此時的桃花開得再艷麗，必然無法結果，反而干擾讀書考試的意願。進入丁亥大限之後，夫宮未動，環境靜止，對擇偶無助也無阻，想要出閣，還須別人的協助，例如透過介紹、相親等方式，才能達到目的。


    □静運中找不到理想的對象，會不會青春蹉跎，最好干脆出家禮佛？


    □婚姻可以自由選擇，包括對象的選擇、何時踏上紅毯、要不要做單身貴族等等；出家當然也是一種選擇，不宜視為命中注定。


    □我可能出現兩次或兩次以上的婚姻嗎？據說武曲、七殺坐命，刑克極重，斷無良緣。


