  md: '外傷，長大后則脾氣暴躁，精神苦悶，神經過敏。此外，還可能導致下列諸項事實：


    （一）積極性和韌度均强，在高度競爭的社會立足，如魚得水。


    （二）煞星隔絕六親的親情表達，故親緣不厚。


    （三）學習專業技術或特殊技藝，潛能釋出，成就卓越。


    在田宅宮，日月雙忌各在不同的宮位，請問它們各有什么作用？


    回先天是先天，后天是后天，基本結構屬於先天，行運則是后天的事，兩者的關係似即


