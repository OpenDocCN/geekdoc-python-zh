    九十二、貪狼化忌'
- md: '九十三、巨門化忌之後會照四煞等凶星而無吉星化解，則有投河服毒輕生的情況發生。


    九十四、天梁與天機同度，很多時會有出世之想。


    九十五、天梁不宜與財星同度，會照則可。尤其午宮為然，易遭人怨，少人緣。


    九十六、天梁在落陷的巳宮守命者，每多負有特殊任務，或身兼數職，例如身爲間諜者。


    九十七、天梁落夫妻宮者，每多長配，如配偶比自己年長者。


    九十八、七殺守兄弟宮會照左輔右弼，必然兄弟衆多。


    九十九、七殺守夫妻則配偶有獨立處事的能力，能獨當一面。


    一百、七殺守子女則遲得，在卯酉二宮更遲，同樣不宜會煞忌。


    一百○一、七殺守父母有早年棄祖離家之象，亦主刑克，有紫微或吉星同度或會照可免。


    一百○二、破軍最怕落辰，一生風浪極大自有不尋常的災遇或有拖延時間甚長的疾病；又可為聲望極高之儒將。


    一百○三、破軍最宜子午立命，有祿權科而無惡煞會照者，福澤甚厚，既爲國家之棟梁。


    一百○四、武破同宮在巳化祿者，爲威震邊疆之將領，在亥則次之。


    一百〇五、破軍在寅申立命，多屬性情倔强，幼年即弃祖離家者。而且寅申宫守命，必是紫微守夫妻宮，須察其會遇吉凶星，因既有終身不婚，亦有兩度花燭者。


    一百〇六、破軍守兄弟宮，主兄弟志向不同或分居等。


    一百〇七、破軍守子女宮，則長子易有破相等情況。


    一百〇八、破軍臨父母最怕有武曲或廉貞同度，均主刑傷，與紫微同宫及吉曜拱照，可免刑克。


    一百〇九、太陽守命，不拘小節，個性豪爽，但易招怨。


    一百一十、太陽守命在廟宮，大多面色紅潤；在陷宫大多面色青白，身體多有异痣。


    一百一十一、太陽在陷宫化忌守官禄，事業必見動蕩，改行之象。


    一百一十二、女命太陽化忌守夫妻宫于子，既難得滿意的對象，也極易爲男人所累。


    一百一十三、大限太陽化忌在事業宫，流年又遇天盤的天機化忌在財帛，事業必會遇到很大波折，經濟上亦會周轉困難。


    一百一十四、太陰化忌守兄弟宫者，每多兄弟情長者，因其爲你擔心。


    一百一十五、流年太陰雙化忌在本宫表示有憂心的東西或失眠，睡得不穩，易醒。


    一百一十六、太陽雙化忌到遷移宫，該年不宜遠行，在外并不稱心，一定無法如期歸來。但却絕對不會遇到意外或不能回來等事情。


    一百一十七、廉貞雙化忌落在疾厄宫，會有疾病。包括嚴重的意外傷亡、癌症、腎病、膿瘡，甚至性病。


    一百一十八、廉貞雙化忌守田宅宮，很多時是應在家中老人身上有災。但若家中有人生產，可解去此劫。


    一百一十九、廉貞怕與七殺同宮兼遇化忌及四煞會照，有戰死沙場之險或刑戮之災。


    一百二十、流年遇廉貞、七殺，極不宜遠行，防意外及血光之災。


    一百二十一、流年走到廉貞忌會武曲，有木壓雷驚之險，今日以車禍為主或被獸類咬傷。


    一百二十二、流年廉貞化忌入子女宮，子女有災（血光）謹防發生意外。


    一百二十三、田宅宮遇廉貞會照武曲同時化忌，若再有孤辰，寡宿同宮，當年家中必有老人亡故。嚴重的可導致與朋友極大的衝突。因其屬桃花星，故對異性朋友應十分注意。


    一百二十五、巨門化忌守父母宮，父母經常爭吵。


    一百二十六、巨門守財帛與官祿，若雙化忌無吉可解，不單只破財，更要防官非。


    一百二十七、大限走到巨門化忌守夫妻宮，且有煞星拱照，若未婚，而紅鸞星又適好在進入夫妻宮，他在此大限內結婚，但會迅即離婚。


    一百二十八、凡看孝服須先看田宅宮，若田宅吉，本身大限亦吉，天機化忌守父母就主早離父母，并不可認為父母壽短。


    一百二十九、天機化忌守夫妻宮，小則自己有病，使配偶擔心，大則可致身亡，使配偶萬念俱灰。


    一百三十、天機守兄弟宮主兄弟分離，或同胞兄弟少或無。


    一百三十一、見天機化忌守兄弟宮并會照左輔右弼，必要同時參照父母宮，因這時極可能有異母兄弟。


    一百三十二、子女宮天機化忌，再見煞星會照難有子，但可能會有女兒。


    一百三十三、流年天機化忌或太陰化忌守田宅，又或紫破合守田宅，都有搬家之象。


    一百三十四、天同若雙化忌守疾厄宮，那人的脚部必有問題，可能膿瘡或動手術。


    一百三十五、天同雙化忌守田宅宮，家庭内有愁雲氣氛，若吉星會照，居家會大肆裝修或更換許多東西。


    一百三十六、天同雙化忌守夫妻宮則顯示感情上的困擾，大多屬情緒化的，并非第三者介入，已婚者會弄得分居甚至離婚。


    一百三十七、天同化忌與巨門同地丑未，若為夫妻宮，非吵個天翻地覆不同。


    一百三十八、天同化忌守命，對男人而言是不滿現實的人，而且十分感情用事。


    一百三十九、昌曲化忌守命宮，爲人作事多疏忽大意，亦主善忘。


    一百四十、昌曲化忌守官祿宮，易發生綴學或留級，也易遇到一些輕信寡諾之事，使你大感失望，亦防文件上的失誤。


    一百四十一、文昌化忌守父母宮：①與父母無法溝通。②會合天機與煞星則主早歲與父母分離。


    一百四十二、文昌雙化忌落在奴僕宮，流年財帛宮再遇天同化忌，當年會受到朋友或手下人之牽連而破財。


    一百四十三、武曲化忌守疾厄宮，病有輕重之分，輕如牙患，重如腫瘤或結石等。主要看煞星的會照，若羊、陀、鈴一同拱照，而以三星均不進入本宮時情況最輕；最嚴重的是雙星入官，一星會照。


    一百四十四、武曲雙化忌守財帛宮，有破產的危險。


    一百四十五、武曲在卯宮立命會照化忌及煞星，有木壓雷驚之險。酉宫立命也有意外之灾；如再遇化忌及煞星，會有牢獄之灾。


    一百四十六、武曲化忌守田宅宮，購置房產時，很多時會發生糾紛或一些意料不到的麻煩。


    一百四十七、貪狼守寅宮化忌，流年走到變為田宅官雙化忌；若再遇到火星，須十分注意火灾。


    一百四十八、貪狼化祿可從交際應酬中取財或得到好機會，若遇火鈴，有意外橫發之財。


    一百四十九、貪狼化忌遷移宮，出外旅行應小心失竊。


    一百五十、貪狼守夫妻宮，第一次雙方認識時，根本没注意對方，相隔一段時間后，偶然再相遇，才開始有約會，直到結婚。


