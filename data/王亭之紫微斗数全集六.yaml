  md: '「問題八」：許多讀者已經注意到《流年凶災詳斷》一書中的小限安法與《詳述》中所說的完全不符，下面作一說明。


    《流年凶災詳斷》一書是因紫微斗數有卦位、卦象之說，即有些書中所言之「奇門紫微」所以引進別派的觀點以給讀者一個全面的認識，對於書中的例子也大部分照搬原書。書中不僅提出了「中限」的概念，而且小限的安法也與通常的觀點不同。其具體方法是以命主五行局的長生宮位為「歲時的小限」，隨後則不分男女，陰陽一律順時針運行（書中四十六頁的『小限』應為「中限」。大家在實踐中請仍以《詳述》的安法為準。


    對於小限，各個不同的派別存在幾種不同的觀點：一種是不論順排運逆排運均按《詳述》的方法看小限；另一種則根本不看小限。本派依第二種方法，《全書》依第一種。


    《流年凶災詳斷》旨在讓學者明白一個卦位和取象的概念，所謂卦位，即各個地支的後天八卦方位，即子屬坎卦，丑寅屬艮卦之類。所謂取象則如《詳述》第三章所說，頗類似《梅花易數》中的『萬物類象』。舉例如天機可取象樹木、森林、木棚、樓窗……如天機在乾宮（戌亥）則象意為西北方的樹木……等等。


    「問題九」：隔角煞何解？起什麼作用，有何影響？請說明。


    答：隔角煞即巨門星、主口舌、官非、吵架等。凡巨門星落在六親的宮位均不吉，輕則吵架爭競、重則刑克重重、尤以巨門化忌為然。巨門最喜化祿、化權或入廟、則轉凶為吉。


    ·264·'
