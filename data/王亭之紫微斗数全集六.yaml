- md: "## 顷刻间倾倒，失去一切——起落频仍，突然变成亿万富婆，瞬间又是一文莫名。\n\n有个客户邀我合伙开一家专卖生鲜蔬果鱼类的超商，由我全权处理，可望赚钱吗？\n\
    \n此命逆行，到七十四岁癸卯大限止，一直未能走到旺财运，自然丧失了骤发的良机。如果顺行，四十五岁起连走两运二十年财运，富贵可期；造化弄人，唯有自求多福。如果从事以事业带动钱财的行业，把赚钱摆在后面，大概所有的技术服务业都算，那么目前的丙午大限勉强算是一步好运，偶发一点小财，应该不算意外。禄在迁移，往外发展，才能获利。\n\
    \n- 如果可能，嫁给哪种类型的人才能偕老？\n- □跟紫府廉武相这种组合订盟，无论个性、生活习惯、思考方式或者人生观，都十分接近；婚后保证某种程度的稳定；杀破狼也不错，相亲相爱，爱河永浴。但最好别去惹机月同梁或巨日这两种人，很快就会同床异梦。\n\
    - 命宫的星曜比六宫旺\n    - 掌握、支配一切，多少有牝鸡司晨的徵兆。\n\n## 如果我是老板\n\n一\n\n□我研究自己的命盘时发现，这个命一无是处，命弱，事业也弱，欲望不高，创业艰难，忌星照命，简直落井下石。我不知道还能做什么事。\n\
    □事业遭忌只是一个因素，重要的是该宫无星，承担力弱，也会拒绝承担，这种人会有哪些心态呢？\n\n(一) 只要找到一个理想的工作就心满意足。\n(二) 无法久做一事、久居一位。\n\
    \n当然，要不要创业是一种意愿，也是一种选择，事业宫再弱再破的人都可能因为环境的因素，譬如继承父母的遗志、朋友促成而独立经营事业。\n\n□事业见昌曲，还有一颗擎羊、昌曲主艺术文学，是否要从事这方面的行业才能发达？\n\
    擎羊象征刀笔，更主毅力，发挥得宜，成就卓越，不言可喻，不过对我能否发挥潜能仍无十分的把握，为什么会这样这样？\n\n圈刚才的叙述都算精确，六吉没有绝对的吉祥，六煞也没有绝对的凶祸，我们还要考虑呼应，以及是否将吉煞的潜力激发出来。忌主干扰，波动是无可避免的，只要顺其自然，从事本质上不受限制、没有固定规格的行业，全力以赴，可望转化为生命的原创力和爆发力，摧枯拉朽，无坚不摧，就是凶也会变吉。\n\
    \n所谓的转化，指透过事业知识或技术的锻炼、雕琢而言。\n\n若无专长，忌星将尽情破坏事业的经营、执掌，常有一种不安定感，危机意识强烈，当思变动，一年换二十四个头家。\n\
    \n□我是外文系毕业的，还懂一点国际贸易的实务，这算不算专业技术？\n□当然算。\n□那么我何时走到事业佳运，可以趁势再起？\n回最好的事业运在乙亥和甲戌这两十年，又以甲戌殊胜，因为此限杀破狼结构，环境强势，见禄不见忌。\n\
    \n(一) 乙亥大限是机月同梁，安定中求进步，财宫无星，略现弱势，天机禄在卯，乃大限事业宫，事业好运无疑；太阴忌从丑射未，财宫遭到破坏，明显的是一步破财运。\n\
    (二) 甲戌大限廉贞禄在申，照财入寅，这个寅就是事业宫，必为事业经营与执掌带来开花结果的契机。\n\n□二十年好运能替我带来什么样的事业成就？\n圈这就很难说了。命理不是无奈的宿命论——不是走到什么运就铁定获得什么成就，履试不爽。我想普天之下，尚无一种禄命术能够达到这种效果。其中的道理不难明白，命运虽同，每个人的家世、成长环境、参与的社會和努力的程度则千差万别，二十年下来，有人开着宾士轿车嘟嘟来，有人却骑着破摩托车输输去，在知命者看来，一点都不觉得奇怪。\n\
    \n## 我在哪个阶段可能遭遇破事业的运程\n□先天事业波动难安，但是上帝关了一扇门，一定会再开另一扇门，七十五岁之前，完全遇不到破事业运（忌星坐照事业宫），因此不虞遭到溃败的命运。微破仍然是有的，丙子大限廉贞忌在申，那是财宫，斜照入辰，这个辰就是事业宫，财运不佳，累及事业，恐怕是跑不掉的。\n\
    \n## 二\n□过去有好几个算命先生交代我不能跟别人合伙，因为奴仆宫的星曜强过我的命宫不知几倍，跟他们合作，肯定被吃得死死的，你的看法呢？\n□我甚不以以为然。经验法则指出，禄在命宫及三方诸宫，自己动手，才能获利；禄在别人的宫位，特别是忌星进命，则要托别之福，先帮别人成事，他们自会分我一杯羹。日前的丁丑大限禄忌均在命宫三方显现，好坏吉凶，自己通吃，合伙事业普通而已。我要提醒阁下的是，丁丑的事业好运只是斜照，吉力略减，但忌星侵袭财源却是直接的，因此不宜过度扩充或膨胀，以免资金被卡死，弄得全盘皆输。\n\
    \n□我们几个朋友在己巳年开创了一家投资顾问公司，老板不是我，而是一个学长，他的脑筋一流，我的工作是策划，兼办一点业务，从我的命盘可以看出公司营运的成败吗？\n\
    □似乎不能，你想想看，利用员工或部属的命盘推敲老板的命运，有没有道理？\n□如果我做老板呢？己巳年创新的事业开始时并不怎样，预料要过了此年才会逐渐起色，然后历经庚午、辛未到壬申，成效都算不错；癸酉年以后停顿，甲戌年大破。\n\
    \n□确实如此。看来他们不让我当老板，绝对是个错误的抉择。那么，我个人的成就要到何年何月才得以达到颠峰？\n回显然要到乙亥和甲戌两限，成就才会拉到最高点。\n\
    （一）从丁丑到乙亥这段历程，足足还有十余年，这是一段漫长的岁月，还有得等。\n（二）中间隔着丙子大限，禄星（天同）不照忌星（廉贞）进入财宫，破财运也。若让丁丑大限的行业延续到丙子大限，也许可以不必等那么久，好运就翩然莅临，并且一直发到乙亥，前后共计二十年。若非延续，也就是丙子大限中新创了行业，这种新业想要赚钱，将比登天还难。\n\
    \n□我的先天财宫主星坐守，无冲无破，可能发财吗？\n回机月同梁原本就主按部就班，在财物的追求上，保守有余，冲劲不足，既不会横发，也不会横败。财源来自三个方向：薪水、工资、佣金，属于积富之人，也就是靠储蓄和节俭达到小康。在后天行运中出现两个奇特的现象，不能不交代：\n\
    (一) 事业始终旺于财物，故宜从事服务业，用事业带动钱财，才能顺遂。\n(二) 连走了三十年破财运：丁丑、丙子和乙亥，其中丙子冲击最强，受创程度最烈，盖忌星挟煞冲射财宫。\n\
    \n这种运程对商人杀伤力大到无穷，此外贩卖业者买空卖空，货物滞销，成本增加，常为钱财支配伤透了脑筋，在准备跳出来自我开创时，不妨三思而后行。\n\n## 关门开门\n\
    一\n□我这个命适合自行创业，还是继续跟人家合作？\n□机月同梁兼巨日的组合，前者只见一半，故后者为主导，你们这种人开朗爽快、恩怨分明，有点叛逆，但重视公义与道德情操，富同情心；火星与羊陀诸煞照入，上述性格更显。吉星二见，吉祥温馨，其中左辅富手段、有谋略，处事待人，极其圆满；贵人星带来贵气，外观气宇轩昂，并成为别人的贵人。\n\
    □煞星见那么多，吓死人了，可能带来什么灾难？\n图三遇煞星（火羊陀），略见冲激，故精神肉体都会饱受煎熬与折磨，始终处于紧绷状态中。煞星因为相互牵制、冲击而形成特殊格局，其中火星与擎羊构成火羊格，与陀罗构成火陀格，主『威权出众』，迅速出头，但也形成『巨火羊』，这是一个恶格，古书说这种人『终究继死』，有点宿命论兼危言耸听，广泛解释为脾气欠佳，刚愎自用，导致常遭意外，险象环生。所有潜能都必须适时释放，导向专业知识或技术，才能转化，进而成就事业。\n\
    □我现在从事服装设计，兼营门市贩卖，你看适性吗？\n图不论杀破狼或机月同梁，只要煞星多照，心性就不会太安逸，选择上班过了这一生，不会适性；除非该项职务本身具有专业性，可以补其不足。\n\
