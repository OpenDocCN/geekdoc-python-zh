    (一) 破军禄自坐，神有稳定的作用，此去十年，自信满满，许多事情从此已经知道怎么高。事业一旦有败（基础不稳），势将波及婚姻，釜底抽薪之法不外乎先料理事业，等事业安定，再来考虑成家，也就是先立业再成家。


