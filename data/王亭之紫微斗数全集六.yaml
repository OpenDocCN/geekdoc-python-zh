- md: "## 《教程》疑难四十问\n\n自《教程》寄出后，陆续收到了广大读者的来信，从来信的内容看，大家的学习进度很快，部分学员已经将整个教材仔细阅读了一遍，开始转向记忆和实践。能够这样当然很好，不过需要提醒大家的是：紫微斗数以星情和格局为体，四化及流曜为用，所以星情是斗数的基础，务必下大力气去推演、比较并记忆。如果一开始就去飞四化，则有舍本逐末之嫌。可能会“欲速反不达”。各星的赋性有其共性，有其变性，一些书中称之为“本易”和“变易”，所谓的共性指的是同一性质不论所处的地支宫位如何，都具有有一些共同的性质。而变性则指同一星曜所处宫位不同，由于同度的星曜或者庙旺利陷的差别而带来星曜赋性的变化。这些内容在《紫微星情详述》的第三章讲得比较清楚，是必须熟练掌握的基础内容，一般国内出版的书籍中几乎没有提到。\n\
    \n另外，《紫微星情详述》的前两章内容不是曹砚明先生所著，是函授前夕由学会两名会员参考有关书籍编写的，由于时间仓促，参考书较乱，编后审定也不严格，所以在一些地方不是很明了，部分来信中提出了一些问题，在下面的答问中会陆续予以说明。\n\
    \n对于有些关于四化追踪方面的内容以及由于篇幅限制在本期未能解答的问题，留待下期集中解答。\n\n> [问题一]：就书中一些术语和方言作一些说明。\n\n\
    同度、同躔、同行——都是同宫的意思。\n铁齿——指坚决否认命运的存在，无论怎么说也不相信。\n猪哥性——指好为女人献殷勤，在女人面前百依百顺。\n背书——与“作保”的意义相近，指有关财务方面的书面保证。\n\
    低级桃花——指肉欲桃花，只追求肉欲上的享受而不管是否会建立感情。如贪狼桃花多属此类。昌再遇桃花星则表现为此类。\n高级桃花——指以精神上的享受为主，类似古时“才子佳人”之类的桃花。如文曲文昌等。\n\
    业力——源于宗教中“因果报应”的说法，不必深究。\n\n【问题二】：《教程》中对星曜赋性并没说某宫，如《直断一百五十条》之八“天梁有慧根……\"又如《详述》四十八页，“紫微会羊陀，为人恶质”等。是否不论在哪一宫，只要命盘中有即如此断。\n\
    \n答：对《教程》中的这些条文、如果没加特别说明均指在命宫而言，因为条文太多，如果每条前均加上“落命宫”等字样，既占篇幅，又没有必要。由于国内斗数书籍太少，所以大部分学员对此不了解，特此说明。\n\
    \n至于提到的《直断一百五十条》中说天梁、贪狼、天机三星适合学术数，其实太阴、文昌、华盖等星也有学术数的倾向。至于紫微星，有些派别也认为与术数有缘，其实紫微若不会吉星则为人邪僻，喜学一些偏门的学问，但因耳根软，主见不强，缺乏深入钻研的精神，所以多学少精。而紫微若会吉星则宜向政治方向发展，又不会去钻研这些“小学问”，故严格来说，紫微应该不算“紫微会羊陀”为人恶质（是指紫微与羊刃或陀罗同宫，又无其他吉星同宫或会照，则为人既无才能，事业上不能发展。又要维持其权威的形象，所以变得喜怒无常，素质较差）。\n\
    \n**四、《详述》三十八页安天德、月德、解神诀与第一章的安法不同，请按第二章专著介绍。**\n\n> > **问题三**：对书中一些内容的说明及更正：\n\
    > \n> > <u>**一、《详述》二十二页倒数第四行及二十四页图三中文昌、文曲的安放位置有误，正确的安法是文曲在子、文昌在寅。</u>**\n> \n\
    > > <u>**二、《详述》三十三页最下面一段有误。应为：如紫在午，则府在戌；反之若紫在戌，府必在午。即完全按照上面的图中斜线所示的规律去一一对应。</u>**\n\
    > \n> > <u>**三、生年博士星（流年岁前星），流年将前星是推流月的三个不同体系，其中出现了名称相同的星曜，一些派别将其中的岁前诸星中的小耗、大耗、病符等曜部署起别的称来替代。</u>**\n\
    > \n> > <u>**而本派在实作中只以博士十二星为主（对后两种体系只重其中，少数几颗星），所以在编写前两章时，只是照书罗列，并未作其它处理。至于这些丁至戌级星的使用方法，并未作详细说明，乃因不是本书重点。而且在推命中所占比重很轻。</u>**\n\
    > \n> > <u>**今后若有机会，我会将另撰。</u>**\n\n十六页表中的安法。至于“三十八页的方法摘自《全书》，是三颗星在流年的安法，其中的解神亦应以流年地支为准而不是以本生年支为准、否则即与安凤阁星方法一样，显然有误。三星在流年中，主要有减轻凶危、解厄制化的功用。\n\
    \n五、《详述》“七十七页十五条『丁子』为『丁年生人”，“一百〇六页二十八条中的人命入命和身宫；“一百七十七页第五行『三寅』为在寅。\n\n六、《详述》“十三页表二中左边的竖行代表出生的时辰。\n\
    \n[问题四]：什么叫斗数？『斗』指什么、『数』又指什么。\n\n答：『斗』的意思即星斗，指紫微排盘的全部星曜。\n\n『数』即指一种推理方法，不是通常意义上『数』的概念。\n\
    \n所以斗数即指依据人的生辰将各种星曜按一定规则排入命盘，从而依据星曜赋性和一定的推理法则来预测人生命运和世事变迁的一种术数。\n\n[问题五]：紫微斗数中时辰的确定到底是用北京时间还是应该用地方时？\n\
    \n答：这个问题在港台命理界（包括斗数和四术）曾引起过激烈的争论，这也是斗数学习过程中必须解决的问题，因为斗数和四术也有不同之处，在四术预测中即使时辰稍有误差，也不是说就什么也算不出来，而是根据情况还可略作一番推理。而斗数则不同，时辰一错之后，再推出的结论便是与命主本人完全无关的第三者的命运，所以确定时辰的准确性是紫微斗数预测学的必要条件。那么如何确定时辰的正确与否呢？其实，在斗数界凡在师承门派的专家都自有一套确定时辰的秘法，而且是决不轻易泄漏的。有人根据一颗痣的颜色、位置和大小即可断定来人所报时间的正误，令人惊异。在《紫微星情详述》中，曹先生没有公开本门的断时方法，为此特在书后附录了摘自王亭之先生著作中的《形性赋》诠释，初学者再对照《斗数宣微》一百八十一——一百八十六页的内容就可根据被测者的面部长相及性格特征大致判定该人的命盘正误。水平到一定程度后可根据流年发生的具体事项来进一步鉴别。总之，在实际推演之前，以先确定命盘的正误为前提条件，对于初学的读者来说，也可暂不理会这些内容，如果有出生的准确钟点，即以北京时间来起盘，一般没有误差。\n\
    \n在古赋中有“不准但用三时推”的说法，即如果根据被测者报所的时间起盘推出的结果如果与实际不符，便用前后各一个时辰分别再起一盘，从而根据三个命盘的情况再校对时辰的正误。由于上述的原因，所以紫微斗数的预测一般都是面对面地进行。\n\
    \n在这里必须强调的是，术数是一门实证科学，任何理论都必须经得起实践的反复检验。从以上对时辰的判定即可看出，命盘的推演必须与命主本人的以往经历相符。其它关于排盘中有歧义的问题也应遵循这一原则，初学者必须树立这一正确的理念，才可深入学习，而不致被一些“振振有辞”的理论迷惑，也可避开那些无休止的理论争论的怪圈。另外《斗数宣微》中对闰月的处理不是说“上半月上月，下半月下一个月处理”，而是一律按下一个月处理，请看〇十六『安身命例』和〇二十五页问答二十四条之第三问和第四问，可在实践中去鉴别取舍，不强求一致。\n\
    \n【问题六】：《详述》中安身主，生年支为子千时，身主为天府、七杀，而《全书》中的身主安法是目前所通行的方法，所以大家也可参考。至于其作用各派也有一些不同的见解，民间有些门派用它来推“竹萝三限”。而本派中，据曹砚明先生讲：命主、身主是结合奇门和廿八宿来定方位，再配合法术施用来为人趋吉避凶的，它不属于预测学的范畴，所以并未深入介绍。而通常的斗数书籍中，都只是将命身主简单地罗列在命盘上，实际推演中则不予理睬，殊无必要。\n\
    \n【问题七】：书中对小限的安法说不清楚，请作详细说明。怎么数，数什么？从哪一年开始？\n\n答：请看《详述》中“三十九页的安小限诀”，以出生年支的三合局墓地所对冲的宫位作为出生之年即虚岁为一岁的小限宫。即巳酉丑年生人从未数，申子辰年生人从戌数，寅午戌年出生人从辰数，亥卯未年生人从丑数，然后按照“男一律顺行，女一律逆行”的原则去看二岁、三岁……时小限宫位。举例如：丁巳年生人，地支三合局为巳酉丑，该局墓地为己，己对冲的宫位为未，那么它出生那年的小限就安在未宫，然后再逐年流转去推以后每一年的小限。即以上例中，若为男命则二岁戊年小限就转到申宫；女命则转到午宫，其它依此类推。小限与流年的宫位合参，是判断流年运程的方法之一。\n\
    \n【问题八】：许多读者已经注意到《流年凶灾详断》一书中的小限安法与《详述》中所说的完全不符，下面作一说明。\n\n《流年凶灾详断》一书是因紫微斗数有卦位、卦象之说，即有些书中所言之“奇门紫微”所以引进别派的观点以给读者一个全面的认识，对于书中的例子也大部分照搬原书。书中不仅提出了“中限”的概念，而且小限的安法也与通常的观点不同。其具体方法是以命主五行局的长生宫位为“岁时的小限”，随后则不分男女，阴阳一律顺时针运行（书中四十六页的『小限』应为“中限”。大家在实践中请仍以《详述》的安法为准）。\n\
    \n对于小限，各个不同的派别存在几种不同的观点：一种是不论顺排运逆排运均按《详述》的方法看小限；另一种则根本不看小限。本派依第二种方法，《全书》依第一种。\n\
    \n《流年凶灾详断》旨在让学者明白一个卦位和取象的概念，所谓卦位，即各个地支的后天八卦方位，即子属坎卦，丑寅属艮卦之类。所谓取象则如《详述》第三章所说，颇类似《梅花易数》中的“万物类象”。举例如天机可取象树木、森林、木棚、楼窗……如天机在乾宫（戌亥）则象意为西北方的树木……等等。\n\
    \n【问题九】：隔角煞何解？起什么作用，有何影响？请说明。\n\n答：隔角煞即巨门星，主口舌、官非、吵架等。凡巨门星落在六亲的宫位均不吉，轻则吵架争竞、重则刑克重重、尤以巨门化忌为然。巨门最喜化禄、化权或入庙，则转凶为吉。变成因学问精湛、口才出众而得财得权、反不以凶论。\n\
    \n【问题十】：请重点说明“杀破狼”格局，特别是位于命宫、夫妻宫时的情形。\n\n答：“杀破狼”即指七杀、破军、贪狼三星而言，此三星永远在三合方会照，若七杀坐命宫，则财帛宫必有贪狼，官禄宫必有破军，其它亦可类推。“杀破狼”主开创，凡大限行至“破狼”坐守的宫位，均主人生大幅度的变化。其中七杀指以往在这方面没用任何基础的开创；破军主去旧更新；贪狼多指表面风光，而无开创的实质。若能自成大格，富贵不小。如“七杀朝斗”、“英星入庙”、“贪武同行”等均是大格。一般情况下，开创的结果要视同宫和会照的星曜吉凶而定，煞星多则主艰难险阻重重。会吉星多则主功成名就。其中尤以化禄和禄存为佳，最忌破狼分布三方，为全盘关键”，就是因为这场大幅度变动的结果直接关系到后半生的命运。\n\
    \n开创成功，则半世无忧，开创失败，则苦不堪言。\n\n凡原盘命宫为“杀破狼”格局，则人生起伏极大，小小机缘即可导致大起大落。若三方四正吉星会照，则主历尽艰险而终能功成名就；若凶星冲破，则人生灾难挫折极大，甚至生来即带残疾，或日后丧于刀兵之灾等等，尤以七杀、破军坐命宫为然，贪狼在此列。至于“杀破狼”坐夫妻宫，因夫妻是两人的事，喜稳定而不喜开创，否则即指婚姻不稳，逢岁运角发易引起离婚，丧偶等情形，但若不会煞星及化忌则不在此论，若破军化禄反主婚姻美满（须不见煞忌）。\n\
    \n《斗数宣微认为“杀七杀化忌，廉贞化忌来冲。\n\n【问题十一】：能否以主星说明六亲的成就、性格外貌，特别是兄、父、奴的成就？\n\n答：凡任何一个命盘之中，均有禄权科忌及八吉六凶诸般星曜，可先不以命宫为主，而一一观察各宫的喜忌及所成的格局。若六亲所在的宫位得吉星重重拱照，则该宫位所代表的六亲必然吉庆贵显，反之则平平庸庸，甚或带刑克。比如父母宫得三奇嘉会，则多为官宦子弟、家庭富足；父母宫煞星层层会集，则刑克难免，甚或离宗庶出。\n\
    \n《教程》由于篇幅所限，并未对各宫位坐何星会对该宫位所表示的事类产生的影响作出详尽分析，大家可参照《全书》一百〇五——一百八十页的内容研究。这个过程实际上就是将《详述》中的客星赋性拆开来一一组装到命宫、兄弟宫、夫妻宫……第十二个宫位中，以对命盘的实际推演作模拟练习。\n\
    \n【问题十二】：竹萝三限中，三星逢煞星是指三星的哪几颗相逢，相逢又有何熬？\n\n答：这个问题可参照【问题十】的解答部分，对于竹萝三限的使用方法，许多门派均有不同的推理方法，如流身主等。而《全书》九下一页的意思是说，在大限凶的情形之下，当流年走到七杀、破军坐守的宫位，再逢三方四正煞忌重重会照，须特别注意预防凶灾，其实书中反言【若在小一限相遇，作死限断】，颇言过其实，未必如此之凶。\n\
    \n【问题十三】：请介绍一下夹局的意義，如吉星夹辅、煞星夹制、双禄夹辅、双煞夹制等都是基础知识，请详细说明。"
  mdcn: "## 《教程》疑难四十问\n\n自《教程》寄出后，陆续收到了广大读者的来信，从来信的内容看，大家的学习进度很快，部分学员已经将整个教材仔细阅读了一遍，开始转向记忆和实践。能够这样当然很好，不过需要提醒大家的是：紫微斗数以星情和格局为体，四化及流曜为用，所以星情是斗数的基础，务必下大力气去推演、比较并记忆。如果一开始就去飞四化，则有舍本逐末之嫌。可能会“欲速反不达”。各星的赋性有其共性，有其变性，一些书中称之为“本易”和“变易”，所谓的共性指的是同一性质不论所处的地支宫位如何，都具有有一些共同的性质。而变性则指同一星曜所处宫位不同，由于同度的星曜或者庙旺利陷的差别而带来星曜赋性的变化。这些内容在《紫微星情详述》的第三章讲得比较清楚，是必须熟练掌握的基础内容，一般国内出版的书籍中几乎没有提到。\n\
    \n另外，《紫微星情详述》的前两章内容不是曹砚明先生所著，是函授前夕由学会两名会员参考有关书籍编写的，由于时间仓促，参考书较乱，编后审定也不严格，所以在一些地方不是很明了，部分来信中提出了一些问题，在下面的答问中会陆续予以说明。\n\
    \n对于有些关于四化追踪方面的内容以及由于篇幅限制在本期未能解答的问题，留待下期集中解答。\n\n> [问题一]：就书中一些术语和方言作一些说明。\n\n\
    同度、同躔、同行——都是同宫的意思。\n铁齿——指坚决否认命运的存在，无论怎么说也不相信。\n猪哥性——指好为女人献殷勤，在女人面前百依百顺。\n背书——与“作保”的意义相近，指有关财务方面的书面保证。\n\
    低级桃花——指肉欲桃花，只追求肉欲上的享受而不管是否会建立感情。如贪狼桃花多属此类。昌再遇桃花星则表现为此类。\n高级桃花——指以精神上的享受为主，类似古时“才子佳人”之类的桃花。如文曲文昌等。\n\
    业力——源于宗教中“因果报应”的说法，不必深究。\n\n【问题二】：《教程》中对星曜赋性并没说某宫，如《直断一百五十条》之八“天梁有慧根……\"又如《详述》四十八页，“紫微会羊陀，为人恶质”等。是否不论在哪一宫，只要命盘中有即如此断。\n\
    \n答：对《教程》中的这些条文、如果没加特别说明均指在命宫而言，因为条文太多，如果每条前均加上“落命宫”等字样，既占篇幅，又没有必要。由于国内斗数书籍太少，所以大部分学员对此不了解，特此说明。\n\
    \n至于提到的《直断一百五十条》中说天梁、贪狼、天机三星适合学术数，其实太阴、文昌、华盖等星也有学术数的倾向。至于紫微星，有些派别也认为与术数有缘，其实紫微若不会吉星则为人邪僻，喜学一些偏门的学问，但因耳根软，主见不强，缺乏深入钻研的精神，所以多学少精。而紫微若会吉星则宜向政治方向发展，又不会去钻研这些“小学问”，故严格来说，紫微应该不算“紫微会羊陀”为人恶质（是指紫微与羊刃或陀罗同宫，又无其他吉星同宫或会照，则为人既无才能，事业上不能发展。又要维持其权威的形象，所以变得喜怒无常，素质较差）。\n\
    \n**四、《详述》三十八页安天德、月德、解神诀与第一章的安法不同，请按第二章专著介绍。**\n\n> > **问题三**：对书中一些内容的说明及更正：\n\
    > \n> > <u>**一、《详述》二十二页倒数第四行及二十四页图三中文昌、文曲的安放位置有误，正确的安法是文曲在子、文昌在寅。</u>**\n> \n\
    > > <u>**二、《详述》三十三页最下面一段有误。应为：如紫在午，则府在戌；反之若紫在戌，府必在午。即完全按照上面的图中斜线所示的规律去一一对应。</u>**\n\
    > \n> > <u>**三、生年博士星（流年岁前星），流年将前星是推流月的三个不同体系，其中出现了名称相同的星曜，一些派别将其中的岁前诸星中的小耗、大耗、病符等曜部署起别的称来替代。</u>**\n\
    > \n> > <u>**而本派在实作中只以博士十二星为主（对后两种体系只重其中，少数几颗星），所以在编写前两章时，只是照书罗列，并未作其它处理。至于这些丁至戌级星的使用方法，并未作详细说明，乃因不是本书重点。而且在推命中所占比重很轻。</u>**\n\
    > \n> > <u>**今后若有机会，我会将另撰。</u>**\n\n十六页表中的安法。至于“三十八页的方法摘自《全书》，是三颗星在流年的安法，其中的解神亦应以流年地支为准而不是以本生年支为准、否则即与安凤阁星方法一样，显然有误。三星在流年中，主要有减轻凶危、解厄制化的功用。\n\
    \n五、《详述》“七十七页十五条『丁子』为『丁年生人”，“一百〇六页二十八条中的人命入命和身宫；“一百七十七页第五行『三寅』为在寅。\n\n六、《详述》“十三页表二中左边的竖行代表出生的时辰。\n\
    \n[问题四]：什么叫斗数？『斗』指什么、『数』又指什么。\n\n答：『斗』的意思即星斗，指紫微排盘的全部星曜。\n\n『数』即指一种推理方法，不是通常意义上『数』的概念。\n\
    \n所以斗数即指依据人的生辰将各种星曜按一定规则排入命盘，从而依据星曜赋性和一定的推理法则来预测人生命运和世事变迁的一种术数。\n\n[问题五]：紫微斗数中时辰的确定到底是用北京时间还是应该用地方时？\n\
    \n答：这个问题在港台命理界（包括斗数和四术）曾引起过激烈的争论，这也是斗数学习过程中必须解决的问题，因为斗数和四术也有不同之处，在四术预测中即使时辰稍有误差，也不是说就什么也算不出来，而是根据情况还可略作一番推理。而斗数则不同，时辰一错之后，再推出的结论便是与命主本人完全无关的第三者的命运，所以确定时辰的准确性是紫微斗数预测学的必要条件。那么如何确定时辰的正确与否呢？其实，在斗数界凡在师承门派的专家都自有一套确定时辰的秘法，而且是决不轻易泄漏的。有人根据一颗痣的颜色、位置和大小即可断定来人所报时间的正误，令人惊异。在《紫微星情详述》中，曹先生没有公开本门的断时方法，为此特在书后附录了摘自王亭之先生著作中的《形性赋》诠释，初学者再对照《斗数宣微》一百八十一——一百八十六页的内容就可根据被测者的面部长相及性格特征大致判定该人的命盘正误。水平到一定程度后可根据流年发生的具体事项来进一步鉴别。总之，在实际推演之前，以先确定命盘的正误为前提条件，对于初学的读者来说，也可暂不理会这些内容，如果有出生的准确钟点，即以北京时间来起盘，一般没有误差。\n\
    \n在古赋中有“不准但用三时推”的说法，即如果根据被测者报所的时间起盘推出的结果如果与实际不符，便用前后各一个时辰分别再起一盘，从而根据三个命盘的情况再校对时辰的正误。由于上述的原因，所以紫微斗数的预测一般都是面对面地进行。\n\
    \n在这里必须强调的是，术数是一门实证科学，任何理论都必须经得起实践的反复检验。从以上对时辰的判定即可看出，命盘的推演必须与命主本人的以往经历相符。其它关于排盘中有歧义的问题也应遵循这一原则，初学者必须树立这一正确的理念，才可深入学习，而不致被一些“振振有辞”的理论迷惑，也可避开那些无休止的理论争论的怪圈。另外《斗数宣微》中对闰月的处理不是说“上半月上月，下半月下一个月处理”，而是一律按下一个月处理，请看〇十六『安身命例』和〇二十五页问答二十四条之第三问和第四问，可在实践中去鉴别取舍，不强求一致。\n\
    \n【问题六】：《详述》中安身主，生年支为子千时，身主为天府、七杀，而《全书》中的身主安法是目前所通行的方法，所以大家也可参考。至于其作用各派也有一些不同的见解，民间有些门派用它来推“竹萝三限”。而本派中，据曹砚明先生讲：命主、身主是结合奇门和廿八宿来定方位，再配合法术施用来为人趋吉避凶的，它不属于预测学的范畴，所以并未深入介绍。而通常的斗数书籍中，都只是将命身主简单地罗列在命盘上，实际推演中则不予理睬，殊无必要。\n\
    \n【问题七】：书中对小限的安法说不清楚，请作详细说明。怎么数，数什么？从哪一年开始？\n\n答：请看《详述》中“三十九页的安小限诀”，以出生年支的三合局墓地所对冲的宫位作为出生之年即虚岁为一岁的小限宫。即巳酉丑年生人从未数，申子辰年生人从戌数，寅午戌年出生人从辰数，亥卯未年生人从丑数，然后按照“男一律顺行，女一律逆行”的原则去看二岁、三岁……时小限宫位。举例如：丁巳年生人，地支三合局为巳酉丑，该局墓地为己，己对冲的宫位为未，那么它出生那年的小限就安在未宫，然后再逐年流转去推以后每一年的小限。即以上例中，若为男命则二岁戊年小限就转到申宫；女命则转到午宫，其它依此类推。小限与流年的宫位合参，是判断流年运程的方法之一。\n\
    \n【问题八】：许多读者已经注意到《流年凶灾详断》一书中的小限安法与《详述》中所说的完全不符，下面作一说明。\n\n《流年凶灾详断》一书是因紫微斗数有卦位、卦象之说，即有些书中所言之“奇门紫微”所以引进别派的观点以给读者一个全面的认识，对于书中的例子也大部分照搬原书。书中不仅提出了“中限”的概念，而且小限的安法也与通常的观点不同。其具体方法是以命主五行局的长生宫位为“岁时的小限”，随后则不分男女，阴阳一律顺时针运行（书中四十六页的『小限』应为“中限”。大家在实践中请仍以《详述》的安法为准）。\n\
    \n对于小限，各个不同的派别存在几种不同的观点：一种是不论顺排运逆排运均按《详述》的方法看小限；另一种则根本不看小限。本派依第二种方法，《全书》依第一种。\n\
    \n《流年凶灾详断》旨在让学者明白一个卦位和取象的概念，所谓卦位，即各个地支的后天八卦方位，即子属坎卦，丑寅属艮卦之类。所谓取象则如《详述》第三章所说，颇类似《梅花易数》中的“万物类象”。举例如天机可取象树木、森林、木棚、楼窗……如天机在乾宫（戌亥）则象意为西北方的树木……等等。\n\
    \n【问题九】：隔角煞何解？起什么作用，有何影响？请说明。\n\n答：隔角煞即巨门星，主口舌、官非、吵架等。凡巨门星落在六亲的宫位均不吉，轻则吵架争竞、重则刑克重重、尤以巨门化忌为然。巨门最喜化禄、化权或入庙，则转凶为吉。变成因学问精湛、口才出众而得财得权、反不以凶论。\n\
    \n【问题十】：请重点说明“杀破狼”格局，特别是位于命宫、夫妻宫时的情形。\n\n答：“杀破狼”即指七杀、破军、贪狼三星而言，此三星永远在三合方会照，若七杀坐命宫，则财帛宫必有贪狼，官禄宫必有破军，其它亦可类推。“杀破狼”主开创，凡大限行至“破狼”坐守的宫位，均主人生大幅度的变化。其中七杀指以往在这方面没用任何基础的开创；破军主去旧更新；贪狼多指表面风光，而无开创的实质。若能自成大格，富贵不小。如“七杀朝斗”、“英星入庙”、“贪武同行”等均是大格。一般情况下，开创的结果要视同宫和会照的星曜吉凶而定，煞星多则主艰难险阻重重。会吉星多则主功成名就。其中尤以化禄和禄存为佳，最忌破狼分布三方，为全盘关键”，就是因为这场大幅度变动的结果直接关系到后半生的命运。\n\
    \n开创成功，则半世无忧，开创失败，则苦不堪言。\n\n凡原盘命宫为“杀破狼”格局，则人生起伏极大，小小机缘即可导致大起大落。若三方四正吉星会照，则主历尽艰险而终能功成名就；若凶星冲破，则人生灾难挫折极大，甚至生来即带残疾，或日后丧于刀兵之灾等等，尤以七杀、破军坐命宫为然，贪狼在此列。至于“杀破狼”坐夫妻宫，因夫妻是两人的事，喜稳定而不喜开创，否则即指婚姻不稳，逢岁运角发易引起离婚，丧偶等情形，但若不会煞星及化忌则不在此论，若破军化禄反主婚姻美满（须不见煞忌）。\n\
    \n《斗数宣微认为“杀七杀化忌，廉贞化忌来冲。\n\n【问题十一】：能否以主星说明六亲的成就、性格外貌，特别是兄、父、奴的成就？\n\n答：凡任何一个命盘之中，均有禄权科忌及八吉六凶诸般星曜，可先不以命宫为主，而一一观察各宫的喜忌及所成的格局。若六亲所在的宫位得吉星重重拱照，则该宫位所代表的六亲必然吉庆贵显，反之则平平庸庸，甚或带刑克。比如父母宫得三奇嘉会，则多为官宦子弟、家庭富足；父母宫煞星层层会集，则刑克难免，甚或离宗庶出。\n\
    \n《教程》由于篇幅所限，并未对各宫位坐何星会对该宫位所表示的事类产生的影响作出详尽分析，大家可参照《全书》一百〇五——一百八十页的内容研究。这个过程实际上就是将《详述》中的客星赋性拆开来一一组装到命宫、兄弟宫、夫妻宫……第十二个宫位中，以对命盘的实际推演作模拟练习。\n\
    \n【问题十二】：竹萝三限中，三星逢煞星是指三星的哪几颗相逢，相逢又有何熬？\n\n答：这个问题可参照【问题十】的解答部分，对于竹萝三限的使用方法，许多门派均有不同的推理方法，如流身主等。而《全书》九下一页的意思是说，在大限凶的情形之下，当流年走到七杀、破军坐守的宫位，再逢三方四正煞忌重重会照，须特别注意预防凶灾，其实书中反言【若在小一限相遇，作死限断】，颇言过其实，未必如此之凶。\n\
    \n【问题十三】：请介绍一下夹局的意義，如吉星夹辅、煞星夹制、双禄夹辅、双煞夹制等都是基础知识，请详细说明。"
