    同事說我的財宮紫微、天府加弼曲，構成一個巨大的命格，乃是天生的富命，但我迄今上班聽差，領的是死薪水，臺灣俗話叫「死豬仔價」，何以致富？


    那些同事的論斷有誤，正統命理可沒那種說法。


    □ 那么我何時走到財運，可以發點小財過過癮？


    □ 辛卯大限巨門祿守財宮，進財順暢，是一步不錯的財運，從事買賣，將本求利，當有可觀的錢財進帳。四十五歲以後的諸運都非財運，無法靠運獲財，其中壬胡大限武曲忌斜照進入財宮，有點小破。繼續任職，再好的財運都不過是神明聞香、欣賞鮮美供果，看得到享受不到。


    □ 文昌忌進入田宅宮，庫破，還指望發財嗎？


    □ 忌在大限田宅，主三種徵兆：一是經常搬家，居無定所；二是經常出差、遠赴外埠；三是庫破，無法囤積。應在何者，或以何者為重，幷無定論，端視呼應的方向而定，其中輕者是出差頻仍，四海爲家；對生意人來說，庫破主財務結構脆弱，可能周轉不靈，萬一營運失策，將導致破產跑路。


    □ 既然無法累積，這樣的富庶豈非只是建築在沙灘上的閣樓？


    □ 那也不見得。


    財宮興旺，錢財流通順利，從事商賣，利潤可觀；既然如此，財爲什麼還會流失？答案也許是擴弃營業、添購設備或轉投資。


