    # 妻奪夫權


    一


    □婚姻不美滿，可能導致事業失敗嗎？

    □可能，就命理而言，事業與夫妻相對，具有因果的關係，這種精神跟古人強調的『齊家、治國、平天下』的道理是相通的。老兄的事業無星本弱，因此該宮的三方諸宮（己酉未）的星曜（主副都算）就會無情影響事業的經營、執行，其中最強勢的，要數夫妻宮。


    □有什么特别的作用没有？

    □約有兩個，一是結婚之后才能安定，或開始建立事業；一是事業跟太太有關，例如太太出資（夫唱婦隨、榮辱與共，或跟岳家關係密切）。當然，此事在共盤中仍然只能抽象描述，而無法肯定屬於哪種作用、哪種現象。


    □這樣的命婚姻不圓融，先天的因素多，抑或后天的因素多？

    □兩者相互牽連，但很難判别何者較多。


    先天是觀念性的，影響一個人的思維與判斷，后天則是遭遇和選擇，難免受到當時社會環境和家庭因素的作用。


    □行運好像不怎么理想，似未走到精采的事業佳運，必須遲至晚年，也就是己卯大限武曲禄進入事業宮后，才能發揮，但此時已六十二歲，不知還能執掌事業否？'
  mdcn: '旺財運已過，破財運卻在未來歲月中虎視眈眈——辛巳大限文昌忌侵入財宮，破壞錢財支配的穩定性，顯示晚年致力求財，不會順遂。祿在遷移宮，人際關係大吉，外出有利，如果從事波動行業，鳴聲在外，可以獲得一些報酬。


    □這幾年內有異動的跡象嗎？

    □看不出來。


    三


    （隔天，他打電話到我的工作室。）

    □前年卡拉 OK 倒店，我們每人多少背了一點債，我平常就没什么儲蓄，全靠太太跟了一個會挹注，請問什麼時候可以還清？

    □不走財運，進帳困難，欠的債只能靠省吃儉用慢慢償還；財庫見忌（貪狼忌在焉），入不敷出，而壬申、癸酉這種年份的忌星又去沖擊財庫，屋漏偏逢連夜雨，凄慘可知，看來只有忍耐，期待意外之財，譬如中了統一發票兩百萬元。


    □有個朋友邀我投資釣蝦場，資本少、回收快，你看能做嗎？

    □癸酉年祿忌均未前來感應，是個穩定平靜的年份，嘴里能淡出鳥來。唯一的災難可能出現在健康上，一旦生病，比較難治，還宜善自珍攝。此年的忌星（貪狼）再度對大限財庫施虐，只出不進，何況庫存已空，這次想再投資，恐怕不是老婆標會了，而是典當祖產。


    # 火中取栗


    一


    □六吉無一照命，會不會影響到福澤的厚薄？

    斗數的吉星有六，本質各自不同，但隱約傾向文職，最好照進幾個，才不致偏頗。


    吉星不照，會不會影響福澤？不知該怎麼答覆才好，蓋『福澤』的涵義十分模糊，從命理的層次恐怕無法掌握，也就是說福氣、福澤這些指謂，都是宗教的而非命理的，包括斗數、八字在內，所有的共盤都無法推敲這類抽象問題。


    □我這個命可以構成哪些格局？

    □紫相朝垣，七星照會，壯闊異常，輔弼不見，孤君而已，缺乏領導統御的潛能，性格冷峻，喜歡單打獨斗而不太願意與人共事，一切唯靠自己。


    鈴在事業，有畫龍點睛之效，若無此煞，不僅殺破狼失色，陀羅也得不到轉化。古籍說鈴貪武職，得以『威鎮諸邦』，異域；鈴與陀形成異格，得以『威權出衆』。


    在各種行業中出類拔萃，並往專業知識或技術方面發展，可望一發如雷；欠缺專長，內心波動，經常換業，還要怨天尤人。


    □事業宮被忌挾煞侵襲，并形成『鈴昌陀武』惡格，看起來既凶暴又恐怖，是否意味著這輩子事業起倒頻仍，顛沛流離？事實上我雖然念商，對一般行業的經營、管理並無多大的興趣，獨對現在熱鬧的理財投資，以及各種投機行業興趣盎然（研究斗數之前即有這種傾向），問題是，沒有事業的人可不可能因為走財運而獲財？


    回經驗法則指出，祿在事業，奮斗的重心必在事業的開創、經營上因此宜用正常的事業來肯定自己，否則縱能發財，也會有憾。認清其間的關係，重視事業發展，不過分依賴錢財（物質），便能輕安。當然，在錢淹腳目的臺灣，這種事易說不易做。


    『鈴昌陀武』會讓人從高處跌到谷底，永劫不復。這個惡格不遇忌。我們檢視諸運的牽引關系后發現，從出生到現在，癸酉大限貪狼化忌、壬申大限武曲化忌和辛未大限文昌化忌，惡格的雷管一一點燃，焉能不粉身碎骨？為什麼還活得輕鬆愉快，理由無他，那些運程雖劣，都有父母在呵護，只要不是重大災難（非命理所能偵測），活下去是没什么問題的。


    □事業宮不就是『武貪不發少年人』嗎？鈴貪成格，祿星催化，却可能早發，其他還有哪些現象發生？

    □『武貪不發少年人』是一種統計，誤差率蠻高的，因為早發大有人在；我們認為還須配合運程的消長看，說不定第三大限就走到好運，成為英年早達呢。此命與其說是武貪，不如說是殺破狼加煞，這種結構尤須后天環境的歷練，早逢佳運，將失去歷練的機會。


    我目前從事外匯、黃金和股票的買賣，買空賣空，典型的投機分子，迄今已有十年的炒作歷史，你不能不佩服我。勉強算來，還是學以致用呢，因此尚無改行的念頭。目前雖然衣食無缺，仍舊十分關心何時致富，你看我像個富庶之人嗎？


    四從財宮位置看，鈴貪、鈴陀各自成格，祿星引動，確實可以發財，且是驟發，頃刻間進財無數。但別忘驟發與橫破好像硬帶一體兩面，驟發的背后自然沉潛着橫破的誘因——驀然成為億萬富翁，瞬間變得一文莫名。


    結構強旺，呼應在事業或理財的獨特性格上，就是喜歡投機，敢于冒險犯難，火中取栗，熱切希望短期間內致富，而對於必須長期經營、穩定成長的行業往往不屑一顧。至于會不會富，必須下列兩個必要條件俱足：


    （一）走到強力的財運，也就是大限祿星進入財福二宮，由環境烘托，順利獲財。

    （二）從事得以發財的行業，老實上班族保證與富庶無緣。


    □庚午、己巳兩限的祿星一前一後進入財宮，這算不算強勢的財運？遺憾的是忌星也來湊熱鬧，吹皺一湖春水，如此一祿一忌，究竟有什么特殊涵義？

    圖不但庚年、己巳兩限走了財運，前面壬申大限天梁祿進入財宮，十四歲起的這步運程也是財運，惟當時年紀小，只花錢不賺錢，所以沒有意義。


    庚午太陽祿進財宮，從事商賣，日進斗金，并不意外；天同忌在遷移位，外緣欠佳，發展有限，如果從事推銷、中盤批發、國際貿易等武市行業，呼應到缺點，賺不到却虧得到，減弱禄星带来的吉祥。


    己巳大限情况与庚午略同，也略有不同；这是一步旺限，尤其两个吉格分别牵动，骤发起来比庚午丰厚。文曲忌在未，与庚午不碍财宫的情形不同，这个未是财源，财源受挫，不再是什么钱都赚得到，胡乱投资，易遭不测。


    □目前的庚午大限命宫无星，且受羊陀夹制，会影响进财的顺畅吗？

    □行运中遇到夹制，此时环境十分狭隘，远大的抱负无法施展，总有一种受制于人、被逼上梁山的遗憾。该宫是个空宫，内心空虚、徬徨，再遭夹制，几乎没有自我发挥的余地。


    我们的看法是，被夹的宫位若是命宫，心理状态受到掣肘；若是财宫，受制的才是钱财支配，这步大限的缺点在于内在的心而非外在的财。


    三


    □妻宫昌曲羊铃会照，尤其忌星居中，以冲破论，照理说感情的败着已现，只是不了解到底是怎样的败而已？

    □此宫无星本弱，忌入于此，乃冰上加霜，却非败局，而是显示两种另外的意义：


    （一）此生最无法克服的致命伤即在婚姻，万一（只能假设，还要看娶谁）婚姻有了破绽，势将无法以平常心态处置，不是眼巴巴看着它一泻千里，就是越弄越糟，以致无法收拾。

    （二）铃贪、铃羊成禄忌交替，有吉有凶，显示婚姻过程复杂尖锐，富于变化，其成其败，都在瞬間決定，難以有效控制。


    # □行運中再遇忌星干擾，發生婚變的機率有多高？

    先天結構的問題在后天行運中可望獲得修正，就是利用人生經驗、社會條件等有利因素，加以鞏固。行運偶逢忌入妻宮（大限忌星在事妻二宮牽引），婚姻前途就要受到嚴重考驗，婚變的機率高得可怕。不過，我們不能肯定必然怎樣，因為還有對象的意願必須考慮，而對象是誰，尚不得而知。


    上帝垂鑒，並無這樣的運程出現：庚午大限天同化忌斜照妻宮，只有這個十年的外境對婚姻破壞較多。


    # □有人告訴我說，我的事業會被女人拖累，有沒有這樣的暗示？

    就因果關係而言，忌從妻宮射入事業宮，暗示事業的挫折、不穩，一部分源自婚姻錯誤或家庭缺憾（婚后籌組的家庭），釜底抽薪之法無非是先料理婚姻，別讓它成為事業的絆腳石。


    # 奴欺生


    □我遇過一個算命先生，初中有沒有畢業不得而知，學問并不怎樣通，却天賦異稟，能在顧客報出生辰之後，屈指一算，清楚斷出來此之前做過什么事，譬如到政府機構洽公、中途車子拋錨、路上跟女朋友吵架，讓人拍案叫絕，以爲遇到了神仙。我想了解的是，算命真的可以算準這些雞毛蒜皮瑣事嗎？

    □這類個案我也經常碰到，有時候懷疑科學昌明的時代確實有這種『異類』存在，在倪匡的科幻小說中，他們也許就是外星人。


    其實命理的功能并在此，它有更恢宏的作用——觀察、推測或評估生命歷程中一些重大改變的得失，那些生活細節并无舉足輕重，得過且過可也。


    □他斷準我丁卯年發生的許多大事，包括祖母過世、兒子車禍斷腿，我自己也因爲財務糾紛跟朋友打了一場官司，里里外外，弄得焦頭爛額，爲什么能在驚鴻一瞥之間，泄漏各種天機？

    □真的完全斷準？

    □部分而已啦。但他說我那年的家運很壞，有重大災難降臨，則是千真萬確。

    □若是如此，就不能算是斷準，而是包山包海包到的，也可以說是你老兄順着他的話。


    | 己巳 | 紫微殺七 | 庚午 | 文曲 | 辛未 | 天鉞 | 壬申 | 文昌 |

    |---|---|---|---|---|---|---|---|

    | 戊辰 | 天機梁天火 | 甲申六月×日寅時 | 一九四四年 | 癸酉命宮 | 廉貞破地軍空祿 |

    | 丁卯 | 天相羊擎 | | 甲戌命宮 | |

    | 丙寅 | 太陽忌巨門太 | 武曲貪狼輔弼右魁天陀羅劫地丑44-53 | 同陰星鈴子丙 | 己亥 | 天府 |


    **命宮三方星曜如此強旺，別人的官位如此柔弱，何來奴欺莊？他不欺負奴僕就已功德無量了。傳統所謂的奴欺主泛指得不到職員或下人的信任，現代說法是合影事業有不適性的現象，能避則避。**


    也有人認為上述現象其實系指“犯小人”而事業、錢財上遭到肆意破壞，此語來自江湖算命，現代命理從不做這種主張，因為不知該如何定位——不是外出才遇到小人，小人遍布所有官位，十二人事宮都能藏身。


    祖母仙逝和兒子車禍都是別人的事，當然可以泛稱『家運不濟』，卻無論如何都不能叫做『斷準』。我認識一人，他從鄰居一個太太的命盤上竟然看出丈夫某年某月拿刀子要殺媽媽（丈母娘），你說神不神～所謂家運，其實是很抽象的，抽象到只要家里的事，阿狗阿貓，張家長李家短的瑣事都算，我才不相信命盤上會寫着死亡和斷腿這種事，宮位在哪里～星曜又在哪里～


    □那么你看我庚午年有什么破財迹象没有～

    □此年太陽禄進入流年財宮，臨時起意的求財行爲，可望順利進財。

    □不對不對：老實告訴你好了，太太用我的名義跟了一個會，結果會首跑路，害我們平白損失了二十幾萬元，差點就鬧離婚。

    □這筆帳既然記在太太的頭上，最好從她的命盤上推敲。

    □爲什么有人硬是在事發的前一年就泄漏這項天機～有個大師從我的妻宮結構，斷準太太破財不免，難道他們都是猜的～

    □猜中的機率很高。


    我當然也可以猜，并且證據確實——閣下庚午年的妻宮在辰，天同忌在子，這個子就是妻宮的財官，太太敗財，豈非既清楚又明顯。問題是算命真的這麼簡單嗎～此論若真，你們那些同命者的配偶都將在庚午年以丈夫的名義參加互助會，并一一被倒掉。


    # (一起来的朋友突然问话：)

    □辛未年命无主星，外在三方诸星强旺，早在一年前就有人预言他会升官，且是外放，果然如响斯应，命盘上完全没有迹象，为什么推得这么准？

    □命无主星，心是空虚的，容易受到外境影响，处事待人，先观察外境，然后才下决定。


    庚午、壬申以及甲戌诸年，情况都同，其中辛未年巨门禄在寅，乃大限父母宫兼流年健康宫；文昌忌在甲，大限健康宫兼流年父母宫，禄忌均在父母、健康宫位交替，若有什么吉凶必在这方面，而非事业。


    □你给我刷刷去简直胡扯，事业不动，却会升官，哪有这回事？

    □升官之事，八成跟大限（延续事业）有关，这点千万要弄清楚。根据定宫原理，这位仁兄事业的起始点既不在丁丑运，也不在辛未年，而在丙子大限，究竟哪年，当事人不主动提示，就不得而知了。


    □好吧，照你的说法，此年的自主性弱极，升迁的理由会是什么？

    □自主性弱是你家的事，要不要给你升官是老板或你的顶头上司的事。不是所有的升迁都在好的、吉祥的年份才发生，换句话说，凶年劣年也可能升迁，只不过凶年、劣年的异勖可能同时埋下去职的恶因，搞得人生历程乱七八糟。


    二


    □大约八年前，我因为好玩而涉猎斗数，开始读一些古书，后来跟两位名师学习，并请他們算過命，迄今疑惑滿腹，他們無一人斷出我丁卯年發生家變，其中有個老師比較厲害，它肯定我辛未年文昌化忌進入父母宮，不開刀則要受傷，結果得急性盲腸炎，害我在醫院足足躺了一個禮拜。也有人斷我壬申年武曲化忌在奴僕宮，是典型的『奴欺主』，定遭朋友陷害，最好用錢解決，故破財不免，結果却什么也不會發生。爲什么有些事後來竟不發生，是否我特別注意了，狀況終於有了改變？

    □老兄思辨能力這麼差，難怪學不好命理。壬申年命無主星，外境的作用力大，容易被人牽着鼻子走，也許是這個因素，才寧願相信別人的論斷，而拒絕使用學理推論。


    武曲忌在丑，大限父母宮兼流年合伙宮，與己無涉，吃頭路人相安無事。


    □我發現你很會轉話，大概是你們這個行業的習性吧！他們斷我得財，這件事就準了，這一年之中，我陸陸續續不知中了多少次統一發票，數目不大就是了，公司周年慶中摸彩，也摸到一臺二十九寸彩色電視機。

    □學理推論只要方法正確，多少會有些準確率，這點不必懷疑。


    □癸酉年破軍祿在流年命宮坐守，貪狼忌在大限命宮坐守，依我自己的推論，守成可以獲利，動輒得咎，事業動蕩難安，內心掙扎，無日無之。這種現象到底什么吉凶？

    □此年的環境很强，自己可以作主，與去年以前正好相反，蛰伏一陣子之后，立刻想要付諸行動；這是一個十分波動的年份，三百六十五天，每天操勞，食不知味。祿在大限財宮，舊業得財，閣下不做老板，花花綠綠的鈔票雖然引人垂涎，却是天邊飄過的彩雲；貪狼忌在丑，大限命宫也，新业旧业都有动象，譬如职务调整，甚至跳出来自创。由于坐禄稳定性强，也许在关键时刻悬崖勒马。


    三


    □甲戌流年恢复无主星的状态，甚至每况愈下，这回运财宫也无主星，三方势弱，只有事业与迁移略好，廉贞禄呈现的吉祥面没我的份，太阳忌显示的坏事却隆重莅临，该宫本来就是『羊陀夹忌』败局，倾圮颓废，如今败局重逢，太阳二度化忌，灾难一定不小，只是不知道是什么灾难罢了。

    □现代命理有个重要观念，就是呼应——不是命盘上显示什么，现实生活就表示什么；若不呼应，什么事都不发生。


    甲戌年个人的心里状态极弱，若遇重大的变异，自己会沉不住气，自寻烦恼，但是该忌只入流年宫位而不入大限，表示那是偶发事件，跟四十四岁以来延续的旧业无关。


    廉贞禄在西，与去年一样，禄在大限财宫，旧业进帐，上班族财运再好，全无作用，就流年而言，酉乃兄弟宫，合作事业将互蒙其利。


    □乙亥年忌星侵入父母宫，不记得谁告诉我，此年家有重孝，某个长亲将魂归离恨天，我父母迄今健在，问他到底是谁，他说『天机不可泄漏，修德积阴，就能化解』，你的看法呢？

    □乙亥年对新业旧业、对己对人，都是平静之年，也是一个可以好好喘一口气的年份。


    忌星進入大限或流年父母宮，別的事我不敢確定，沒有重孝則是千真萬確。我為什麼膽敢如此鐵口直斷？說給你聽也無妨；假設閣下有三個兄弟，難道指望他們的命盤上忌星一律侵入父母宮？否則為什麼只用你的而不用別人的？除此之外，此事若真，同命者的尊親都將在乙亥年蒙閻羅寵召。你相信嗎？

    □希望如此。


