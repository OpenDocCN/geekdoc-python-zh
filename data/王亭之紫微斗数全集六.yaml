- md: '## 命理不是宿命論


    ### 理由之一是任何一個命造（命理結構，像斗數命盤、八字格式）都非由一個人獨自占有，而是許多人共用，故稱「共盤」（共同命運或命運共同體）。目前臺灣的平均人口數是七十七強（兩千萬除排列組合得2500），想教它宿命也難。


    ### 命理的功能不是泄漏天機


    譬如肯定你老兄做官可成連戰，經商不輸王永慶，也非鐵口直斷一個災難，屆時果驗，譬如預言明年中秋節前三天發生車禍，果然隆重撞斷大腿，而在于分析基本結構，描繪生長周期，提供當事人另一種思考層次的資訊。


    ## 地上神仙


    ### 一


    □我這個命適不適合在適婚年齡中出嫁？請問：婚期約在何時？

    □此命事業野心不大，適婚年齡中遇到對象，即可出閣。但是忌星坐命，心性難安，影響外境，調適之法不外乎先讓自己定下來，太早嫁人，婚姻難保。


    經驗法則指出，大限夫宮斯感應祿星（大限宮干化出才算），俗稱紅鸞星動，理想對象現身，兩情相悅，即可吹吹打打，送入洞房，可是從乙卯丁巳的三十年間，祿不照而忌照，覓到佳偶的機率不高，不信的話，有盤為證。


    （一）乙卯大限：太陰忌在丑，正是夫宮。

    （二）丙辰大限：廉貞忌從申沖照寅，這個寅也是夫宮。

    （三）丁巳大限：巨門忌在卯，也是夫宮。


    丙辰大限雖是沖射，感受卻最強，因為其他兩限分別見祿（乙卯的祿星天機在大限命宮，丁巳的祿星太陰在財宮）；丙辰正好又是適婚年齡，窈窕淑女，君子好逑，但思想觀念受到扭曲，對象的好壞，難以有效判斷，多方尋尋覓覓，望盡千帆皆不是，如果一見鐘情，然後閃電結婚，肇禍率將高得出奇。


    □高中時代曾認識一男友，他在大學聯考落榜后當大頭兵去也，我考上中部一所教會大學，從此過我另一種層次的生涯，這段期間認識不少男友，比較深刻的是一個同系學長，結果兩年後分手，他負笈赴美，為什麼以前的交友都無法善終。


    □乙卯大限忌星在夫宮坐守，擇偶心態受到干擾，戀愛不易開花結果，惟同一生辰諸人有人高中畢業不再升學，可能二十一歲之前就出閣，但是這樣的結局可能不好。


    這種事要持續三十年，到四十歲乃止，想一想，難免要怨嘆造化弄人。


    ### 二


    □辛未年中我在朋友的喜宴上邂逅了一個帥哥，長得一表人材，能說善道，讓我心頭小鹿亂撞，我們相互吸引，交換名片，相互邀約吃過幾次飯，半年后才發現不妙，趕緊煞車，回首前塵，仍有些許惆悵，據說從命盤上可以解我心中之惑，請問我們是什么分手的原因嗎？


    □你們老是把命理學者當做神仙，這樣會阻礙命理學的進步。坦白說，我們若是神仙，絕對不會研究命理，每天埋首故紙堆，煮字療饑，而是去關懷國民生計，廣度無邊衆生了。


    如果推測不錯，此年遇到的那個男孩可能是個有婦之夫，跟他談戀愛，等于公然介入他們的婚姻，一輩子不得超生。


    （她於是嘆了一口氣。）


    □看來命運之事絕對不假，人受命運擺布、愚弄，一點都不假。是怎么看出來的？


    □不神奇，江湖一點訣而已。


    你注意這個官位（我指給她看），禄星牽動，如此這般，于是天雷勾動地火。但千萬留意，并非光有這樣的牽引，就鐵定在那個年份遇到那樣的對象，命理絕對推算不出某人在某年某月會遇到一個怎樣的對象；那是鐵口直斷，也是宿命論。


    此事需要提示——告知交往的年限，才能論斷。


    隔年見面，那個人仍是已婚嗎～


    □這個問題顯然已超出學理以及我們的認知之外，無法答覆。


    依我們的經驗，此事純屬后天環境的遭遇，丙辰大限因為忌冲夫宮，遇到的對象多半鴉鴉鳥，出狀況的機率高，不過這個部分命理是掌握不到的，尤其現在社交頻仍，誰遇到誰，都在不確定中。


    ### 三


    □據說，高明的算命先生經由夫妻宮的結構可以隱約透析未來對象一些特殊狀況，譬如家世、學歷、身高體重，此事令人生疑，但也許只是我的疑慮，事實又如何？


    □不必懷疑，那是不可能的。


    夫官坐府會紫，輔弼不見，孤君也；這種對象將是一個怎樣的人～相信即使把陳希夷從墳墓里叫醒，仍要望盤興嘆：夫妻宮的作用不在于推看配偶的長相，也不在于泄漏祖宗八代的秘密，而是觀察一下喜歡哪種類型的對象。所謂的類型，多半是抽象的、概括的，才能涵蓋許多不同形式的人，也符合理（夫妻宮）一個，事（同一生辰的人却有千千萬萬這一不變事實。


    大致說來，此命喜歡工作穩定，略帶專長的公務員或私人機構的職員。孤君是這種對象的通性，他們通常是只身出外奮斗，擅長單打獨斗，校長兼打鐘也。


    婚配對象的命理組合當以『紫府廉武相』為佳，其次同爲『殺破狼』則氣味相投，可以夫唱婦隨；嫁給『機月同梁』或『巨日』的男孩，性向背離，難免同床异夢。


    □我命宮的貪狼強過他的府武嗎？換句話說，婚后是我駕馭他還是他駕馭我？


    □這種事很重要嗎？


    □不重要。聽說從命中可以隱約發現夫妻相處的關係，不是嗎？


    □命宮與夫宮堪稱勢均力敵，難分軒輊，相敬如賓也——當然還要看嫁給誰。


    □萬一我嫁一個機月同梁或巨日的對象，結構如何？


    □那就不相契了——無論個性、生活習慣、思考方式，甚至人生觀，都有顯著的不同，必須學會寬容，互相遷就，才能白首。


    ### 四


    （她從皮包內掏出一張預先排好的命盤。）


    □壬申年初我又認識一男友，就是這張命盤這個人，目前已經論及婚嫁，去年年中他的母親拿我們的八字請人合,算命先生說我們兩人犯冲,打了回票,男友不吃那一套,堅持要娶我,但我心里怕怕,怕因此引起夫家上下的煩感,下半輩子的日子不知要怎么過,迄今仍舉棋不定,不知能否出現轉折。


    □所謂犯冲,其實就是生肖相冲,江湖相士認為兔與雞冲,因為八字的地支卯酉六冲,冲則散則凶,這種合婚法流傳很久,并載于農民歷中,鄉下人早已根深蒂固,想要扭轉乾坤，將比登天還難。


    正統的合婚絕不會那么草率,此地我只能提供一些簡單的資訊 (命盤并未載出):


    (一)女方的夫宮天府、武曲坐守,三方所見,乃紫府廉武相的組合,最好嫁給同一類組的男孩,才算相契。

    (二)這個男方的妻宮天府坐守,三方聽見,就是紫府廉武相,他娶到同一類組的女孩,就是相契。

    (三)男女雙方的命星都見殺破狼,性格相近,可以携手打拚。


    □男友家族聽到的是一套,你講的又是一套,我們到底該聽誰的?


    □這種事就要你們自己去判斷了。


    ## 姻緣前定


    □己巳年中，經朋友介紹認識了四十九年次的林先生，半個月不到，他就迫不及待央媒到我家來提親，嚇了我一大跳。而在認識之前沒幾天，意外地跟一個朋友到臺南讓人算過八字，算命先生告訴我三十歲以後結婚較能白首，以致不敢貿然答應他的求婚；此時，林先生也表示他願意等我到三十歲以後。


