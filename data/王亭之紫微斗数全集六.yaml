    ![](img/ba71cd450f8ceda4f93ce5470e449489_254_0.png)


    ![](img/ba71cd450f8ceda4f93ce5470e449489_254_1.png)'
  - '[PAGE 255]


    《全書》認為：『貞居未、殺居午、身命遇之、反為積福』，這裡實際上指的是廉貞七殺居未同宮和七殺居午，廉貞居申兩種情形，以下分別說明：


    如圖三所示，屬老一種情況。廉貞火克七殺金，能解七殺之剛戾、化殺為權、屬貴格。


    那么二星居丑如何？答案是：不能成格。因丑為金庫，能邦七殺金而不利廉貞火，不比未為木庫、能生廉貞之火。增其克制之力，屬雄宿朝元格中的一局，多主武職顯貴。


    第二種情形即如圖四所示：七殺在午坐命宮，福德宫必為入廟的廉貞獨坐申宮，得火克金的制化，也為積福之人。那么七殺坐子，廉貞居寅為什麼不能成格呢？因為七殺坐子宫為水之旺鄉，廉貞火不能施其威權。所以這一格局僅僅包括上述兩種情形。


    五行生克還體現在其它一些少數格局中，起着點綴的作用。如火貪格最喜見武曲，因武曲為金，又是大財星、火星屬火、當武貪互見時必在四墓之地、有火生土、土生金的吉化作用，能够增强火貪格的吉象。所以火貪格以在丑未為正格，辰戌次之。當然，除此之外還有另一個原因即武貪二星在辰戌丑未入庫。當貪狼火星在其它的宫位


    圖 4


    金，又是大財星、火星屬火、當武貪互見時必在四墓之地、有火生土、土生金的吉化作用，能够增强火貪格的吉象。所以火貪格以在丑未為正格，辰戌次之。當然，除此之外還有另一個原因即武貪二星在辰戌丑未入庫。當貪狼火星在其它的宫位


    | 廉貞 | 七殺 | 福德 | 天機 |

    | --- | --- | --- | --- |

    | 巳 | 午命宮 | 未 | 申 |

    | 辰 |  | 西 |  |

    | 卯 |  | 戌 |  |

    | 寅 | 丑 | 紫微破軍化權 | 子命宮 | 亥 |'
  - '[PAGE 256]


    同度時，也可稱為火貪格，只是力量小些。即使

    火貪二星只在三方會照也在三方會照也能呈現

    火貪格的性質，這就是格局的層次差異。

    四、論疾厄宮：

    疾厄宮的含義是包括內在的疾病和外來的

    傷害。因此，既不宜煞忌會照，也不宜主星太旺

    。一般以天府、天相、天同、天梁等代表安閑、福

    壽的星坐守爲宜，故有府相同梁入廟于疾厄之說

    ，主人一生少病痛而心境愉悅。

    至于疾厄宮逢不同的主星坐守所主的疾病，

    須詳察各星的賦性而定。《教程》老一冊及《斗

    數宣微》中『疾厄之判定』均有論述。另外，如限運流年之疾厄宮，命宮被羊刃、天刑冲破

    再煞忌，則有開刀動手術的徵兆，七殺破軍逢煞也有類似的情況，均不可等等閑視之。

    原命疾厄宮不見凶星同遍和會照。但在所行大限的宮干使該星化忌時，逢流年殺曜

    及化忌再冲時，也會同現病痛之症。所以對於疾厄宮的看法。除了流年命宮，疾厄宮之外

    ，還要特別注意原命和大限的疾厄宮，綜合評判，方無疏漏。疾厄爲一生之至關重要的環

    節，盡管對升官發財没有絕對的妨礙。但設若人生身體健康。無病痛凶灾，盡管與財官無


