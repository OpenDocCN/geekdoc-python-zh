    ■天羅地網是八字的概念，辰為天羅、戌為地網，都是陰陽滅絕之地，貴人星不臨（十二地支中唯辰戌不排貴人星，斗數八字相同）。不過，斗數沒有羅網這種星曜，也沒有羅網這種宮位；若有，不過是像桃花、祿存、驛馬一樣，從八字或其他術數中移植過來。


