    作用大哉，不但增強抵抗力，而且構成鈴貪格，得以『威鎮諸邦』，從事武職行業，潛能釋放出來，有了開創的契機。兩種組合的命多具双重性格，一隱一顯，深藏於中、呈現於外，但多半要到獨立自主的時候（壯年以后）才會逐漸显露。鈴貪成格而紫府朝垣不成，故武略文勝一籌，從事略带武職性質的行业，成就高些，日後無論行業的選擇抑或人際關係的運用，宜以此為準繩。命宮星曜旺，承擔力强，可以被畀以重責；煞星多半在六親宫位，阻隔了亲情緣份，這方面難免有所不足。


    □我原想念自然學科，媽媽說女孩子念理工太辛苦，於是改弦易轍念起商學，不知這種改變是吉是凶。會不會跟我的基本命格起衝突？


    □衝擊力雖強，卻非十分突出，蓋六煞只見其一，仍然表現婉約纖細的一面，求學期間可以學習專業技術，但不宜過度冷僻，一般技藝如雕刻、烹飪、編織都適合發展，學習這些持藝的目標是激發鈴貪的潛能；如果數學不錯，當然可念自然類組，否則還是選文法商比較保險而且輕鬆。


    □進入社會之後，從事哪種類型的行業才算適性？先上班一陣子，再伺機跳出創業；由於欠缺輔佐人材，校長兼打鐘也，每事躬親，必須任怨勞怨，方能有成。鈴貪不一定專指技術，學有專精，潛能充分發揮，優點凸現出，成就必高，以後就要走這條路。


    □甲戌年将參加大考聯考，不知考運如何？可能考上第几志愿。


    □丙戌大限是巨日兼日月拱照的結構，煞星照入，有點浮動，卻是一步精采的事業好運。蓋天同祿從申照寅，在安定中進步，考運不錯。廉貞忌在巳，大限健康宫也。對讀書考試本無作用，但體能受到干擾，面對各種挑戰，總有一種心餘力絀的感覺。這個命從初限起，連續三十年健康宮位遭到忌星侵襲，書固然要念好，身體更需鍛鍊，才可無疑。


    考運好坏與中不中榜以及考上第几志愿，没有直接的关系——考运坏中榜的很多，考运吉落榜的更多。可見實力最重要，考运不过推波助澜而已。


    □如果考不上大學，相信很快就要就業，也立刻面臨擇業的困境。丁亥大限命無主星，我會受到怎样的遭遇？


    □此限有两事比較凸出：一是命宫无星；二是祿忌不照。前者普受外境的作用，會跟着社會的脈動或父母師長的意見走，後者因為是靜運，顯示經歷的是個静态的社会，一切按部就班，平稳安祥。


    三十二歲以後的戊子大限是機月同梁組合，命宫有星，但运程仍旧十分柔弱。貪狼祿仍不照命，相反的天机忌在命宮坐守，故心浮氣燥，頗不安定，若有什么改變，想必是内心挣扎在那里起仗，冲激造成的。


    □見忌不見祿，該如何趨吉避凶才能無咎？


    □方法有二：

    （一）隨著忌星起舞，也就是參與波動行業，而不接觸静态行业。

    （二）甘心為别人作嫁衣裳。


    □何時才走到好運？


    □其實好运来得很早，就是現在的丙戌大限，再來是己丑大限，間隔二十年，前者利事業，後者利財。比較而言，己丑的結構較旺，冲激力强，一生最好的运程必在此。丙戌為求學階段，走了好運，對升学有助，努力加上毅力，念個博士回來當嫁妝，不是什么难事。


    □己丑大限走了财运，真的可以發財嗎？可能发到什么程度？


    □當然不會這麼簡單。

    發财，尤其发大财通常要三事搭配，天衣無縫後方以致之，哪三件？

    （一）先天擁有发财的条件（至少财宫成格），不具备的人免谈。

    （二）走到财运，环境烘托，不走财运的人只能看人吃香喝辣。

    （三）从事求财的行业，若是上班族，仍然不发。


    先天財宮鈴貪成格是發财的主要条件，己丑大限遇到发财的环境，這是後天的际遇；但是仍欠東風，該東風是你必須經商，用錢滾錢，當能累積無窮的财物，朝九晚五的上班族和全職的家庭主婦，再好的财运，仍然无用，這點跟傳統的說法迥异。


    □上班族走了財运，手頭會不會寬裕一些？


    □古代命書主張會，我們認為作用仍然不大，因為财无源，不會突然從天上落下黃金。


    □有發財運必有破財運，該运約在何時？戊子大限還是戊寅大限？


    □這個命得天獨厚，一輩子走不到破财运，财物可免被人劫奪，不過略破还是存在的，那是戊子大限，天机化忌照入财宫，由於只是斜照，杀伤力不强，可以無懼，只要不做生意，不與人金錢來往就行了。


    三

    □書上說，殺破狼的人早婚不利，為什麼不利？這跟孤辰寡宿入命有沒有關係？


    □殺破狼加煞波動大，野心強，想要獨自創業或成就一番志業，通常要等奮斗告一段落後才會考慮結婚，故宜遲婚不宜早，此命只見一煞，冲激不大，丁亥大限遇到理想的對象，即可携手，籌組家庭。


    □那麼你看我什麼時候可以遇到『較好的一半』？


    □此事無法預測。大致上說，二十一歲以前的丙戌大限就有良窳，因為天同祿進入夫宮，紅鸞星已動，自有君子來求，自己也會主動去愛去欣賞一個人。不過，若想升学，此時的桃花開得再艷麗，必然無法結果，反而干擾讀書考試的意願。進入丁亥大限之後，夫宫未動，環境靜止，對擇偶無助也无阻，想要出閣，還須别人的協助，例如透過介紹、相親等方式，才能達到目的。


    □静運中找不到理想的對象，會不會青春蹉跎，最好干脆出家禮佛？


    □婚姻可以自由選擇，包括對象的選擇、何時踏上紅毯、要不要做單身貴族等等；出家當然也是一種選擇，不宜視為命中注定。


    □我可能出現兩次或兩次以上的婚姻嗎？據說武曲、七殺坐命，刑克極重，斷無良緣。


    □如果從原始命盤上推知，宿命論者無疑。


    ## 大只鷄慢啼


    □火在外、貪在內，可能成格嗎？


    □此二星只要在三方四正内會照，即可成格。火星照入，增強殺破狼的冲勁與積極性，并形成火貪，古籍對此格評價甚高（譽為「威鎮諸邦」），武職顯貴，從事侵略性、波動性的行業，如魚得水，成就卓着。


    □昌貪是個惡格，將帶來哪些災難？


    □昌貪之所以形成惡格，是會讓人『顛三倒四』、『旁門左道』和『學非所用』，向為古典命理所排斥，現在社會多元化，思想開明，旁門左道没什么不好，不務正業則讓人接觸不同型態的事物，成為一個博學的人。


    □吉格與惡格同時入命，是相互抵消呢？還是吉凶參半呢？回吉凶分別存在。火貪雖是佳構，仍以專業為適性，若無技術，成就不會太高。至于有人認爲克親、六親不靠，那是江湖相士的危言聳聽，不必理會。長大后要接受現實環境的煉獄，孟子說得好，「天降大任於斯人也，必先苦其心志，餓其體膚，勞其筋骨：」經驗法則指出，這種人的成就與早年的磨練成正比，而與家庭环境成反比，不可不知。


