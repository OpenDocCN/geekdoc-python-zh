    □庚午年跟几个朋友合伙开了一家卡拉OK，光是装潢就投下三百多万，我的股份八十万，你知道臺灣社會沒有三年的好光景，不到半年就支持不住，廉讓給人，有人說我這種人只能獨資而不宜合伙，一合即破，你認為呢？


