- md: '## 卷四 流年篇


    ### 武貪晚發


    張先生從事玩具生產兼販賣生意多年，業績尚稱良好，壬申年申請了一個專利，由於樣式新穎，成本極低，市場遠景看俏。過去因為工資昂貴，人手難找，難與外國產品競爭，生意做得不是很順，這類新產品的推出如箭在弦，勢在必行，他打算癸酉年投入資金，大力生產，希望了解一下命理方面的看法。


    □我是命身同坐七殺廉貞，三方會紫府貪武破，其中廉貞化祿、破軍化權、武曲化科，似乎花團錦簇；吉有魁鉞，煞遇陀羅，因此性格剛烈無比，沖勁更是十足；固執而不服輸，絲毫不理會別人的意見，實應肇于紫府朝垣輔弼不照，性格桀傲不馴。十五歲以后脾氣忽然收斂不少，在地方廣結善緣，頗孚衆望。


    了無先生說殺破狼加煞，沖勁強，最利開創，但有晚發的傾向，這方面確實符合，蓋四十五前顛沛流離，起起伏伏，居無定所，惶惶然不可終日。己巳大限見祿不見忌，生活趨于穩定，轉業投資玩具生意，着實發了一筆小財，才有現在的房子可住；此后無論個性、生活方式或人際關系都步入人生最佳之境。我想了解的是，所謂『晚發』，大約能發到什么程度或什麼時候？


    □顾名思义，晚发指发得较迟、发得较晚，迄今尚无一条确切的界线可循；依照经验，大约往前或往后第四步大限之前发达，属于早发，之后才叫晚发，水二局跟火六局的误差达到四年之多，蛮大的。


    古籍指『武贪不发少年人』，正确的说法是『杀破狼不发少年人』，这种统计仍不够周延，若能扩充为『杀破狼加煞不发少年人』，那就更适当了；无煞则响往安定，缺乏冲激则不致颠沛流离，早发的机率反而很高。近来我们实验发现，仍要做一些修正：


    （一）杀破狼加煞（三颗以上），早遇吉运，仍会早发。


    （二）机月同梁或巨日加煞（三颗以上），需要磨练，也有晚发的倾向。


    晚发的人因为前半段接受历练，人生经验丰富，发起来将比早发的人壮观而且耐久，大约都能维持到晚年，然后安然交棒。


    □坐贵向贵，了无先生解释为有贵人拔刀相助且为别人的贵人，确是至论。生命历程中，我不知多少次在最迫切最需要协助的时候，无意中获得别人无条件的提携，可贵的是，我多半不知他们是谁，即使后来得知道，对方也一笑置之，别人投我以桃李，我报之以琼瑶，我自然帮过无数的人；除此之外，还有其他的涵义吗？


    □两贵的作用在斗数诸星中属于比较隐晦的一个，我想也许跟时代背景有关，现代社交频仍，人与人之间的关系是开放的、互助的，不像过去是闭塞的、互不侵犯的，贵人星黯淡，良有以也。依我們的觀察，此星也主貴氣，隱然有種氣宇軒昂的架勢。


    □禄星自坐，權科來照，形成『三奇嘉會』，對一個生意人來說，這種貴格是吉是凶，或者還蘊含了其他什么特殊的意義。


    □方法學的假設必須根據『二元對立』精神來建立，天地事物，有吉必有凶、有黑必有白、有好必有壞、有善必有惡，反之亦是。斗數若是一門學問，任何一種假設都必須合乎『二元對立』，才有認知的意義，我們不排權科，就是基于這樣的理由。古籍所謂『三奇嘉會』、『明禄暗禄』、『科權禄拱』等統計，必通不過科學的檢證，弃之可也。禄星具有穩定、自信、享受等作用，禄坐命宮，言行舉止，充滿自信，在事業經營、錢財支配，甚至客户往來上，堅持『寧人負我，我不負人』的信念，守己守分，但難免有律己苛人的傾向。


    #### 一


    □己巳大限是先天事業宮，武曲禄自坐，三方紫相朝垣、輔弼加會，成就『君臣慶會』，禄來牽引，命限雙禄交馳，煞星遁形，依理只肇吉而不肇凶，確屬一生罕見的佳運，事業經營與錢財支配，究竟呈現何種局面。


    □剛才說過，禄有穩定等作用，禄在大限命宮坐守，十年之内，心境坦然，得享財福；該禄分别照入事業、人際關係、錢財等宮，帶來吉祥，提升了成功機率，跟前面戊辰大限相較，判若雲泥。


    戊辰大限是機月同梁的組合，等于强在事業宮，常想換業，每個行業都做得牢騷滿腹。


    己巳大限文曲忌進入兄弟宮并冲射合伙宮，壞事與我無關，保平安兼添福壽；禄星對外境尤其事業與錢財的吉意只是斜照，力道略減，無法發得驚天動地，必須了解這層關系，小心翼翼，惜緣惜福，才不致發過即敗。


    □我們預定癸酉年推出新產品，依我自己推論，此年既是『君臣慶會』，必屬佳運，流年坐大限事業宮，貪狼由化權轉爲化忌，吉變成凶；而大限禄（武曲）與流年禄（破車）均在流年財宮已，這個已恰巧也是大限命宮，這種關系錯綜複雜，該如何辨識？


    □長期發展的行業不能只看流年，而應仔細考量大限，蓋流年主一年的得失，很快就成爲過去——長期投資觀察流年不過是推敲以此年爲起始，究竟『好的開始』或者『壞的開始』，前者具有心理學所說的增強作用（鼓舞作用），對一個初出茅廬或試圖東山再起的**人，『好的開始』具有激勵的意義。


    就流年而言，癸酉年是個吉年，蓋破軍禄化進財宮，進帳順利，做了之后立刻見財；破軍禄、貪狼忌照入丑，對事業而言是禄忌交替，好壞齊來，吉凶并見。


    此外，酉是大限的事業宮，忌星居中，混亂可知，因此癸酉年發展任何一項長遠性事業藏着，隨時爆發，形成阻礙，不能等閑置之。明年甲戌，廉貞禄在丑，這是大限的財宮，也是癸酉年開始的這個行業的事業宮，禄星居間，收成有望，預料越做越好，越做越順手。但乙亥到丙子這些年份將每況愈下（最多維持一個平順的局面），可能的話，應趕在乙亥年到來之前讓所有資金回收，甚至把該賺的都賺回來，拖延越久，時局對你老兄越不利。


    #### 二


    □癸酉年有財可得嗎？需不需要另用其他方式求財？


    □此年的財運極好，短期性的、偶然性的求財行為，可望獲財。


    但是外銷生意不能只看財宮的消長，而應參照事業甚至遷移方面的吉凶，因為市場遠在海外，遷移位置不能受阻（忌星盤踞），不然往外求財的目的就達不到——古籍說的「化祿遷移位，發財於遠郡」；如此一來，得失牽一發而動全身，還有討論的余地。


    （一）大限事業宮在西，貪狼化忌在焉，顯示這是四十二歲以來事業最動蕩的一年，此年開展任何一種行業都是「壞的開始」，做起來備感艱辛；流年事業宮在丑，從丑的位置看，破軍祿和貪狼忌均入此宮，故吉凶參半。


    （二）大限遷移宮在亥，只見破軍祿而不見貪狼忌，遇吉而不遇凶，外銷應該有利；流年遷移宮在卯，只見貪狼忌不見破軍祿，凶多吉少。


    準此而言，我們認為必須過了癸酉年才能順利拓展。


    □庚午大限太陽祿自坐，天同忌在妻宮，此去需要注意什麼？我個人的淺見是，祿星自坐而財宮無星，財呈弱勢；事業遭忌反射而有所變動，乃吉凶參半之年，在事業與錢財支配方面將出現怎么樣的局面？需要防範什麼？


    忌星所在，将是命盘中最难以有效掌握的一环，忌在妻宫，若说有什么缺点，必在婚姻幸福与家庭和谐的维护上。此外，该忌冲射事业，有关事业执掌、经营多少也会遭遇一些横逆。但这种情形并非必然发生，通常还需呼应，譬如夫妻鹣鲽情深，婚姻固若金汤，什么事都不发生，跟传统命理的主张明显不同。


    有关事业的成败，分析如下：


    （一）忌星只对庚午大限以后新创的行业施虐，只要不再创新，受创的程度将减到最低，甚至根本没有感应。


    （二）延续己已大限的旧业，可以无咎，虽然这项旧业进入庚午大限后并未出现佳绩，预计只能维持现状。


    ### 牝雞司晨


    #### 一


    - 我目前在一家電器量販店擔任經理，這種工作適合我嗎？

    - 忌煞沖激，命局呈現動性，行業選擇自以波動、技術為適性，譬如行銷、中盤、業務代表以及各種產品加工、販賣等，當然也包括所有的專技在內。果能如此，火貪格的潛能充分釋出，成就卓越。

    - 一般行政業務容易倦怠，毫無成就可以言，能不做就不做。


    □命理學家總是強調，不走運而想發達，門都沒有，據你的看法，我何時才逢好運？丙午大限或乙巳大限。


    - □這個命在很早的時刻就走過事業好運，初運己酉，祿在事業，為事業（學業課業）帶來佳績；此時年紀尚小，意義不大。往后諸運，不再走事業運，經營事業全靠運助，就會感到力不從心。


    上帝不會趕盡殺絕，除了已成過眼雲烟的戊申大限之外，這輩子也不曾走到破事業的運程，因此事業始終在平靜無波中安度，不算太好，但也不算太壞。這個部分似乎有點運與願違的樣子。


    #### 二


    □目前的丙午大限命與事業不見主星，一切欲望似乎都是望眼欲穿，我該如何自處，行事。事業宮的陀羅、地空都是輔星，有點駁雜，也有點混亂，這是旺命走弱運，整個氣勢弱了下來；不僅此運如此，前兩運也有同樣的現象。


    □命宮無星，內心空虛，易被外境牽着鼻子走，處事待人，缺乏自信，全看現實的臉色。這步大限有那些吉凶被凸顯出來，請看我們的分析：


    (一)天同祿在子、大限遷移宮也，祿遷移位，發迹于遠郡」的經驗，外緣佳美，出外得利，適合從事推銷、業務代表這樣的波動行業。


    (二)廉貞忌在西，乃大限田宅宮，并未作用不大；田宅為住所，也是財庫，庫破則不易聚財，不宜從事長期投資、回收慢的行業，以免失血過多，導致短期內無法翻身。


    □我可能在未來幾年內出來處創，請幫我找個吉祥的年份。


    □不確定的事最難下手，因此只能依據祿忌牽引的位置，隱約找出吉凶的方向，敬請參考辦理。不過，后天行運所有的祿忌牽引，無一不需呼應，缺乏呼應，船過水無痕，好像什么都不會發生一樣。


    癸酉年：破軍祿在西，大限田宅宮兼流年命宮，穩定性强，但没有重大事項凸顯。貪狼忌在丑，乃大限健康宮，今年是二十五歲以來體能最弱的一年；該忌進入流年事業宮，容易發生思辨上的錯誤，遭到老板斥責。


    甲戌年：命宮無星，內心虛弱，廉貞祿在西，大限田宅宮兼流年兄弟宮，好事都在別人身上。太陰忌在寅，大限財官也，延續性行業財運很差，吃頭路可免；該忌所在也是流年事業宮，歲運的事財全部遭忌，新舊業大凶，最好以不變應萬變。


    丙子年：財與遷移弱勢，天同祿在子，為大限遷移宮，是近來外緣最好的一年，適于主動出擊；廉貞忌沖流年住所，應驗在搬家及經常出差、旅游上。祿星在流年命宮坐守，任何一種行為舉止，內心都是篤定的。


    □哪年最佳？


    □看來是乙亥年最佳，而癸酉年最劣。


    □如果繼續任職，流年的好壞是否就此不發生作用？


    □確實如此。


    □曾經讓人看過面相，看相先生說我鼻子有肉，可能致富，努力經營，有朝一日成爲富婆，富是不敢奢望啦，只要生活無慮就好，我有這個命嗎？


    □財宮形成异格，可以驟發，短期間內進財無數。發財還須運勢烘托，幷從事可能發財的行業；如果繼續上班，仍然不發，這個觀念千萬記住。忌挾煞沖財，走到壞運時，則會'
