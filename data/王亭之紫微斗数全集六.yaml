    **一冬换二十四个头家**的感觉。太阳禄在迁移宫，出外有利，从事推销、中盘批发、业务代表之类，呼应优点，好运无疑。


    □辛丑大限坐先天忌星，坐宫不稳，波折难安，不知会遭遇哪些挫折？


    后天行驼中业已消失，可以置之不理，此时只要注意辛干化出的巨门禄和文昌忌就行。巨门禄不入大限，相反的文昌忌却在财官盘踞，财物支配终于出现破绽，商人破财，上班族则没什么损失，若有，不过是开销大罢了。


    □人生最辉煌的三十年都在跟命运搏斗，成就必受影响，是否意味着没有重大成就？


    大致上是，但有例外：社会上许多大成就者并非走到好运才建立庞大的事业。


    禄忌牵动而见忌较多，利破不利立，己亥、庚子都是禄忌交替，有吉也有凶；辛丑只忌不禄，比较无所得。若非完全为了求名求利，这样的运势算是差强人意，没什么不好。


    □晚年这步庚寅大限有哪些特色？


    固庚寅禄忌进命，显示仍然会有一些波动，无法坐享清福。


    禄在事业宫，事业大吉，忌入财官、钱财大碍。晚年才走事业运，乃大器晚成，台湾俗话称做『大只鸡慢啼』，虽已垂垂老矣，总算走到了，可以无憾。


    四


    □这样的命适合在适婚年龄中成亲吗？所谓适婚年龄，约在何时？'
