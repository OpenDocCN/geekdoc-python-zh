    两种组合的命多具双重性格，一隐一显，深藏于中、呈现于外，但多半要到独立自主的时候（壮年以后）才会逐渐显露。铃贪成格而紫府朝垣不成，故武略文胜一筹，从事略带武职性质的行业，成就高些，日后无论行业的选择抑或人际关系的运用，宜以此为准绳。命宫星曜旺，承担力强，可以被畀以重责；煞星多半在六亲宫位，阻隔了亲情缘份，这方面难免有所不足。


