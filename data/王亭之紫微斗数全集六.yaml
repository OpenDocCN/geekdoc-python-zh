    **【问题十一】**：能否以主星说明六亲的成就、性格外貌，特别是兄、父、奴的成就？


    答：凡任何一个命盘之中，均有禄权科忌及八吉六凶诸般星曜，可先不以命宫为主，而一一观察各宫的喜忌及所成的格局。若六亲所在的宫位得吉星重重拱照，则该宫位所代表的六亲必然吉庆贵显，反之则平平庸庸，甚或带刑克。比如父母宫得三奇嘉会，则多为官宦子弟、家庭富足；父母宫煞星层层会集，则刑克难免，甚或离宗庶出。


