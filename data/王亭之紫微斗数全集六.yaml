    [問題四]:什么叫斗數?『斗』指什么、[數』又指什么。


    答:『斗』的意思即星斗,指紫微排盤的全部星曜。


    [數』即指一種推理方法,不是通常意義上『數』的概念。


    所以斗數即指依據人的生辰將各種星曜按一定規則排入命盤,從而依據星曜附性和

    一定的推理法則來預測人生命運和世事變遷的一種術數。


