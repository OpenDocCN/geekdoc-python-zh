- md: "## 紫微斗数辅导与答疑\n\n### 一、紫微批命法提示\n\n#### 1. 紫微斗数推命的运作步骤：\n\n如果时间出现误差，则推出的结果必然与实际情况风马牛不相及，所以这一必要的步聚不可忽视。一般的定时方法，主要根据命宫的星曜对照来人的长相和性格来定。达到一定的水平后，还可以推两件以往发生的事来验证命盘。但这需要对星曜附性了如指掌，对各种格局和多星组合所克应的事情，以及各种斗数理则有准确的把握。对于初学者来说，一时还很难做到这一点。需要不断学习和反复实践。如果发现推论的结果与求测者的经历不符，则可用所报时间的前一时辰和后一时辰再分别排盘以作校正。\n\
    \n#### 2. 命盘确定后：\n命盘确定后，再根据命宫的三方四正星曜组合，定出命主的格局，并根据吉凶星和四化星曜的会照情况，确定格局的成败及高低程度。这样，根据这个格局的性质就可确定命主的发展方向职业，大致是哪个层次的人，即社会地位的高下等。如果没有明显的格，就参看官禄、财帛和迁移宫星曜组合强弱程度，以确定命主的贫富贵贱。\n\
    \n#### 3. 六亲与得失分析：\n格局已定，再分析命主的六亲情况和一生各方面的得失。大致包括以下内容：如父母有无刑克；自己有无离宗庶出，过房改继，兄弟人数多寡，贫富如何；以及对本人有无助力；爱人的性格如何，有无刑克，能否白头偕老，岳家家庭状况如何；子女人数多寡，有无成就，带刑克否；再看奴仆宫星曜组合，以断定命主的人际关系，同事朋友间能否对自己有所帮助等等。另外，福德宫、迁移宫、财帛宫、官禄宫、田宅宫、疾厄宫也要一一详查，以明被测者各方面的得失。\n\
    \n#### 4. 运程起伏分析：\n接下来再看运程的起伏。在看运程之前，可先不理原命盘上各宫所代表的具体意义，只看哪些宫位的三方四正能构成格局，哪些星曜组合，会呈现出某些吉凶显象。如提升、出名以及各种凶伤疾病等等。尽管这些显象在原命盘中与命宫无关，但在大限流年走到这些宫位时，则必然会出现与此相吻合的克应。但必须注意的是，大限的成就又受原盘命宫格局的制约，假如一个命宫格局不高的人，即使行到大红大紫的大限，也决不会陡然成为国家要员或者名商巨贾，只是相对本身来说，社会地位得到很大提高，或者个人财富的积累得到增加。另外还要细审大限的四化星以及各种吉凶星对这种格局或各种吉凶组合的发挥或损抑程度，以确定出一个大致定量的结果。\n\
    \n#### 5. 流年与大限结合：\n在大限的总趋势下，去看大限所辖的哪一个流年会发生大限所显象的各种事类；以及流年、小限本身又会受四化及流曜的影响而出现哪些吉凶组合。如羊陀叠并、七杀重逢、双禄夹辅、双忌夹忌、合禄拱祿等具体情况（这些名词的定义请参看后面的答疑内容）。这样，对一个命盘的运程起伏就有了一个清楚的認識，达到一定的水平之后，还可断出……\n\
    \n---\n\n## 案例解析：唐先生排盘分析\n\n到底怎么样』便报出一个人的出生时间，排出命盘如图四。\n\n我在手上排出命盘，稍后便对他说：『这个人面目清秀，身材瘦小，性格文静，不爱说话、象个大姑娘似的。有一门手艺，从事和异性接触多的行业。母亲操劳家务，很能干，命造本人也很辛苦。』说到这儿，唐先生听完这句话，呆了片刻，便又环顾左右而言他去了。\n\
    \n后来，旁边的人告诉我说，这可能是他儿子的生辰，他儿子跟您说的很相符，是个美容师，今年患肺结核，十分严重，经常咯血，已花去近万元医药费，正在好转。\n\n\
    下面简要分析：\n\n### 一、命宫坐太阴化忌与文曲\n太阴坐命者眉清目秀，举止斯文，有女子之性格。且多从事与女性接触的行业。太阴与文曲同宫，是一个偏门手艺的组合，美容师这一职业正好与上述相符，可见时间是没有问题的。另外太阴被化忌，驿马的性质很明显。所以奔波劳碌难免。\n\
    \n### 二、关于“太阴化忌为何不克母”的分析\n那么太阴化忌为什么不克母呢？太阴在申酉戌亥子丑宫位均为庙旺之地，对化忌有一定的抵抗力。何况对宫又坐禄存与天同、三合文、太阳、天梁化权。所以虽有刑克，不致大凶，所以断他母亲『操持家务，很能干』。\n\
    \n### 三、一九九九年丙子年分析\n1999年丙子，大限在午宫，天干壬使武曲在大限的夫妻宫化忌，表示这一大限家庭问题很突出，兼之武曲为寡宿之星，所以十分严重。另外，武曲所在的宫位又为原命的疾厄宫，逢流年引发也有发生疾病的危险。丙子年流年命宫在子，为廉贞天相坐守的宫位，年干丙使廉忌化忌，与流年收禄宫的武曲化忌相会冲，这种组合主有血光之灾。因为廉贞化忌坐流年的命宫，所以对武曲而言，血光既不应在妻子，也不应在官禄，而是应在疾病。\n\
    \n武曲为金，主肺部疾病，所以断为『肺部病变而引起吐血』。\n\n以上的思路希望大家能够仔细领悟。因为一颗星曜在命盘里加上活盘的作用，往往会表现在不同的宫位，如上述武曲化忌所在的宫位既是原命的疾厄宫，又是大限的夫妻宫，还是流年的官禄宫，如果不仔细分析，很容易张冠李戴。\n\
    \n---\n\n## 副星星情补述\n\n《学习指南》中提到《方术异闻》中的星情论断很有特色，下面将其副星的星情补述如下：\n\n### 一、文昌文曲\n\
    \n卯酉时生人昌曲在丑未同宫，若与日月魁钺交会，一生必然很有发展、声名极佳。加化科更好；昌曲会破军在丑未，若为命迁线表示有水灾。去世必与水有关，如死在洗澡间，天雨路滑发生意外等。\n\
    \n#### 昌曲会破军在疾厄：\n脾湿、吃生冷的食物，皮肤易发痒、搔破皮淌水（非血）。大限的田宅破军会昌曲、屋顶再怎么修，总是会漏雨。\n\n昌曲入命或官禄、从事的事业和文教有关，与纺织品有关，因文昌为经，文曲为纬，文昌为直为原料，文曲为横为加工。\n\
    \n- 文昌为文书星，会天刑与法律有关。\n- 文昌化忌逢官符，有官讼是非。\n- 文昌在命，格局差也会当文书。\n- 文昌在父疾线，命财官三方，逢生年干辛，或三合方有辛使文昌化忌，学业易受阻。父疾线有文昌，大限的官禄逢辛使文昌化忌，此限必然文书麻烦多。\n\
    \n#### 其他星情：\n- 命宫在子午线，卯酉时生人，昌曲同度在丑未视为吉利，有知名度，有社会地位。\n- 昌曲在田宅、表此人家里多藏书，但不爱读书。\n\
    - 昌曲会六煞，巧艺之人，且带疾延生。\n- 文昌在命、礼数特别多，说话喜夸大。\n- 文曲化科没学位、文昌化科主知名度。\n- 女命廉贞会昌曲、擎羊、火星易为娼。\n\
    - 昌曲入命神经衰弱、会煞精神病、入疾厄同论。\n- 巨门会昌曲易消沉、昌曲会左右有领导能力。\n- 紫府同梁禄存魁钺与昌曲交会，主享有盛名，富贵不小。\n\
    - 昌曲会禄存、鬼才；会廉杀羊陀，则虚伪奸诈。\n- 昌曲与贪狼同度、服公职、凡事不计较，不记仇、外华内虚。\n- 文昌化忌在财帛、不可用支票、作保，或与人作银钱之合约。\n\
    - 昌曲的职业宜文教，如出版业、图书公司、编辑、摄影、文告社、海产业、食品、纺织。昌曲入命多才艺、小生意人；因昌曲为时系星、善变、多不能成大企业家。\n-\
    \ 文昌化忌入田宅、会有房地产的纠纷。文昌在疾厄，主肺疾、咳嗽、心脏病、会四煞或化忌更验。\n- 昌曲化忌、主神经过敏、悲观、神经病、失眠、钻牛角尖、空头支票、文书困扰、是非多争、犯官司、破财、生病。\n\
    \n#### 时系星特性：\n文昌为时系星，故代表分期、断断续续、细水长流；入财帛宫，因文书、契约而得财；化忌则因文书票据而破财，资金冻结。或放款，期票不能收回。官禄宫怕化忌，化忌表冲动。故文昌化忌在官禄，只是文书手续延误，仍可成事。惟会四煞则不能成事。文昌化忌在官禄会天刑，因文书事而引起官讼是非。\n\
    \n#### 文曲特性：\n- 文曲主名望、有技艺专长、又称魁星、主文墨；异路出仕，于身命为滚浪桃花。学习能力强，能举一反三，闻一知十，喜金石书画，头脑冷静，善推理分析，能大胆设想，细心求证。不信邪，有愚公移山之志，反应快，有创造能力，喜舌辩，言语幽默、便佞，假惺惺；会擎羊则说话很倔，常与人吵架。\n\
    - 文曲化忌木讷，不能把握机会；廉贞会文曲，服公职或与公务机构有关，或与车有关的生產工厂加工厂。\n- 太阴庙旺会文曲，富而多艳福，书念得不错；太阴在陷宫会文曲，九流术士。\n\
    - 巨门会文曲在命宫，没有恒心，经不起考验；入官禄常换工作，入财帛发也虚获；破军会文曲，不安定，劳碌命、有水厄；在财帛主破耗；天同会文曲在命、没恒心耐力、没干劲，做事半途而废；贪狼会文曲做反复无常、不爱计较；文曲见陀罗有异痣斑痕。\n\
    - 文曲入命为桃花，女命会太阴、天同、天姚、主多犯桃花，幻想多，不切实际，有禄存可解。倘福德宫的组合再差，落风尘或为妾。\n\n#### 疾厄与煞星：\n\
    - 文曲化忌加煞在疾厄有中风之可能。\n- 昌曲落陷带煞一样很有名，是恶名上报那一種。\n- 斌云：“科星居于陷地，灯火辛勤”，昌曲魁钺本身就具有科星的性质，化科更好。“所谓灯火辛勤”是指虽然勤奋好学，珍惜每一分可以利用的时间，但总是考场不如意。例如官禄丙使文昌化忌入疾厄（文书线），但未之本气为己土、文昌属金，金克木为囚；未为燥土不能生金，故未宫的文昌只有聪明，肯上进、很博学、但不容易拿到学位，一生很难当大官。\n\
    - 昌曲出现在三合方、命迁线为格调高，虽聪明，但求学的态度并不很具备，只是很幸运考场如意；出现在父疾、兄友线为智商高，较可能成为读书人（一生以作学问为乐趣者）。\n\
    - 魁钺左右为『攀龙附凤』，并不是去摇尾乞怜，而是本身条件不错，自然往来无不是些权贵的朋友。\n- 昌曲巳亥会廉贞，会有车祸、很严重；大限流年逢之，皆宜特别注意。\n\
    - 昌曲会吉星、若不少年得志，亦大器晚成。守田宅、中晚年有自己名下的房地产；凡田宅有昌曲，表分期付款买来的；大限流圻同论。\n- 赋云：“女命昌曲，富贵多淫。偏房填房侍婢。”今日指从事服务于男性或其工作环境男性居多，一生恋爱多次。或人长得甜、是异性注目的对象；昌曲坐命的女性较易闹三角恋爱；面临抉择时每多犹豫。\n\
    \n#### 职业区分：\n- 昌曲均代表才华。唯两星所主有别：文昌为歌星、演员；文曲为词曲、导播。\n- 文昌为正规教育，代表学术、学历；文曲为课外之技能、技艺。\n\
    - 文曲会同、梁、贪、阴，容易接近宗教、玄学。\n\n### 二、左辅右弼\n\n此二星为“多”的意思：在官禄为事业多，有关系企业；同时做两种以上的工作；在财帛为钞票多；在夫妻为配偶多；在子女为儿女多；凡左右在六亲宫加化科，“多”的意味更验。\n\
    \n- 立年在丑、二、六月生人，左右必出现在财官拱命；九、十一月生人，左右夹命，不逢煞冲破均为贵格，会紫府更好。\n- 左辅右弼又称善星，秉性宽厚，好施舍；以会吉星为条件，若会廉囚反成奸恶之徒；女命家庭不美满。\n\
    - 立命在未、三、五月生人形成左右夹命；八、十二月生人，左右出现在财官位，与立命在丑同。\n- 左右同宫或分守命身宫，不犯煞冲，一生福泽绵长。\n- 命宫无主星，左右之一单守离宗或偏房庶出，或入赘妻家。\n\
    \n#### 六亲影响：\n- 凡命身会左右、魁钺或出现在三合方、对宫，一生多贵人，无风险；若三方成格更主高寿，多福；女命得之旺夫益子。\n- 入财帛为间接之财，亦主银钱出入流动性大；不重视钱财（不是破财）。\n\
    - 少年行限逢右弼，主单恋，“爱你在心口难开”。\n- 左辅天府同、有地位、很神气。\n- 右弼天相同，真福气。\n- 左右入父母，有过继或认干爹；对父母至为孝顺。\n\
    - 左右入兄弟，“真情”，善待兄弟、朋友。\n- 入子女，对子女宠家。\n- 入疾厄，有宿疾，小毛病多。\n- 左右在迁移，经常往外跑，好交际。\n- 入福德：可能恋爱两次，也很喜欢交朋友。\n\
    - 入官禄宜公职；若为私人机构亦主文书、秘书、档案处理；会兼职、工作负责。\n- 左右入身命者，为人厚道，可以作朋友；会兼职、工作负责。\n\n#### 性格与职业倾向：\n\
    - 左辅较有干劲，大多当司机或司轮（与方向盘有关），要不然也对驾驶很感兴趣，刚满法定年龄就急着学开车。\n- 右弼较保守、厚道，也会开车。\n- 左右一生做事持续有恒、少变动；昌曲则适得其反，没定性，任何事皆反复无常。\n\
    - 左右入田宅对家庭有责任感的若同会之主星化忌，或加煞易遭窃。\n\n#### 贵人性质：\n- 左右为平辈之贵人多，其人又憨厚，故虽交游多，但多主精神方面；为公事，而非桃花、儿女私情。\n\
    - 左右又为传令之宿：格局高人家替我传令；格局低为替人家传令。合同一生衣食无缺，为人机要秘书，是为替人传令；会紫府贪狼一呼百诺，手有人为我传令。\n\n####\
    \ 煞星影响：\n- 左右会七杀、破军短寿，命疾同论。\n\n### 三、天魁天钺\n\n天魁分阳贵、阴贵：\n- **天魁**（阳贵人）：日生人（卯至酉时）喜；入阳极（子至午宫）为正位。\n\
    - **天钺**（阴贵人）：夜生人（酉至卯时）喜；入阴极（午至子宫）为正位。\n\n#### 星性描述：\n- 天魁入命身者很随和，虽喜出风头，但不争好胜，凡事自己躬亲，不假手他人。甲戌庚生人，立命丑未叫“坐贵向贵”，主外出多贵人助，交游广、能得长辈、上司的提拔。\n\
    - 天魁在五十岁以前管用；五十岁后叫“贵人变鬼”。所谓“变鬼”是把权柄交给别人，并非一定逢小人。\n- 天魁逢日月昌曲同会，在生活圈子里非泛泛之辈；青少年利于考试，壮年名声好。\n\
    - 天钺性不如魁星积极，但较为和善；体态优雅，含蓄清秀；女命病态美，很讨人喜爱、罪人（应为“惹人喜爱”）；心地慈善好施舍，有认养的情形；乐观进取，有责任感的处事有条理有谋略，学习能力强，博古通今；有威仪，有雅量；用心时设想周到，心思细密，但也有小迷糊的时候；对戏剧、音乐、艺术、哲学方面有兴趣。\n\
    - 性格文静善良，诚实正直；好济人之困，有慈悲心；由于本性不积极，故常有被逼急了才去做；不太会拒绝人；因此恐有私情；女命相当女性化、容易被感动、吃亏上当；有天分，达观而爱笑。\n\
    \n#### 六宫应用：\n- **官禄**：宜公教、文书工作；会武曲贪狼（应为“武贪”），宜经纪人、中间商、从事公共关系性质的工作；有很多在保险公司服务的例子。\n\
    - **疾厄**：天魁主皮肤过敏、搔痒、火毒、肝火旺，故急燥易怒；天钺主心脏、消化系统、泌尿系统方面的疾病；女命生理病（妇女病）。\n- **田宅**：天魁表附近有学校或公务机关；天钺表纯住宅群，有林园、空气清新；格局高为洋房别墅。\n\
    - **夫妻**：配偶家世不错，书香人家，或其父为公教人员。\n- **子女**：儿女中必有成名之人。\n- **财帛**：贷款容易；流年的财帛有天钺，好调钱、借钱没问题。\n\
    - **迁移**：外出逢贵。\n- **奴仆**：朋友、同事很得力。\n- **福德**：一生有贵人照顾（女命不宜）。\n- **父母**：会吉星主父母长寿享福。\n\
    \n#### 六吉星比较：\n六吉星均表示好学；左辅右弼、昌曲魁钺较优，右弼天钺稍差。\n\n### 四、禄存天马\n\n- **禄存是钞票**，**天马是运钞车**。禄马最喜出现在三合方或对宫；若再会财星更好；有禄无马，有马无禄都是美中不足。\n\
    - **禄马会齐叫折鞭马**：左右逢源，动得越勤利越大。\n- **禄存优点**是厚重、持家勤俭、认真储蓄；且禄存有解厄、延寿、逢吉星锦上添花的功能。**忌逢空亡**。\n\
    - **天马入命身**为驿马星，主一生好动，不安于现实，劳碌奔波，活动力强，从事旅游业很合适。\n- **天马逢劫空、旬空**为死马，没有用处；逢陀罗叫折足马，每想出门总被琐事所误，所以折足马不太管用。\n\
    \n### 五、擎羊陀罗\n\n#### 禄存与羊陀：\n有人将羊陀成为受雇佣的看守。**羊陀永远夹禄存**：**禄存是钞票**；若禄存与庙旺的主星同宫（财星更好）表示钞票有所来源。比如武贪财星在辰戌丑未，会羊、火，赋云：“威权出众”、“威压边夷”。有很多命例是高中毕业，以商人的姿态从事文教工作：如大型文理补习班的创办人，招生的手法一流，但自己不善授课；老师是重金礼聘的。是相当杰出的生意人；晚发，出远门谋求发展成就较大。\n\
    \n**禄存单守**：**羊陀即成小人**。故禄存在十二宫之任何之一宫单守，皆可判定此造“钱四脚”——与钱财无缘；或与会之主星落陷，也表示无助（例如太阴在巳与禄存同宫，大限逢有倒债九千万的命例）。\n\
    \n**羊陀禄存除本生年者外**：尚有限年之流、流年禄羊陀。\n\n#### 擎羊星详解：\n- **擎羊是尖尖的东西**：如注射针、针灸的针、细细长长的东西，与意外有关；会于命迁线，一生多流血，事故常是被尖细之物体所伤。\n\
    \    - *命例1*：某造女命，戊子年生人命宫在子，迁移在午，天机化忌会擎羊；午为离火、轻清在上，故主头部；曾做过两次隆鼻手术。若以命官为头，迁移即成生殖器，做过结扎手术（二造完全巧合）。\n\
    \    - *命例2*：又一例男命戊生人，曾一度车祸撞歪了鼻子住院一次；随后找另一家整容外科做纠正手术、割过包皮。\n\n- **梁会擎羊**：六亲缘薄、常有孤独感；不是没有亲人，而是亲人疏远各自为政。**除武贪会擎羊可威镇边疆外**：**同阴在午会擎羊，天马在巳**叫“马头带箭格”，主可以在外地发迹出国最好，但六亲刑克破相不免。（注意：六亲刑克可能是缘薄不常相聚而已，未必指克死）。\n\
    - **日月会擎羊在辰戌丑未**也是六亲寡合、有视力障碍、不利于财；在田宅表父母早丧。行限逢主破耗。\n\n#### 机巨与七杀：\n- **机巨在子午卯酉**：**命坐擎羊，夫妻官必有陀罗**，六亲刑克极重，一生带疾延年，配偶相当不利；若更会化忌，官讼是非不免。\n\
    - **七杀中破军与擎羊同宫**：早年即有破相的事发生；限逢主破败；入身宫很凶、会破面破身（廉杀的组合同擎羊在丑未，流年走到对宫更有流羊加会，血光逃不过，很凶；有官讼是非）。\n\
    \n#### 其他组合：\n- **擎羊会火星同宫**在卯午是领袖格，有相当之统御能力；会得力之主星更验；苦所（应为“若”）会主是为恶星则主血光破相。\n\
    - **擎羊会左右昌曲于身命宫**：有暗痣、斑痕。\n- **擎羊会铃星为下格**。若在命迁线且无吉会，一生无发展；替人帮工。\n\n#### 总结与十二宫影响：\n\
    总之命主若出现了擎羊，要考虑所会主星是什么，是否具杀伤力：**例如武破廉杀机相会擎羊在命迁线**就是一生会破相、破败、无大发展且是经常性的；不幸的遭遇会一再重负。若为紫府这种吉星表一生中会一度破败或外来的创伤。\n\
    \n- **入夫妻**：争吵不免。\n- **入子女**：女命流产堕胎。\n- **入财帛**：横发横破、发不耐久。\n- **入疾厄**：属外来之创伤，铁石等之伤害；呼吸器官及消化系统不良之疾患。\n\
    - **入迁移冲命**：求谋不遂。\n- **入官禄会动星**：常常换工作。\n- **入田宅会恶星**（如巨破廉杀）家中人口刑伤；若为日月表不利父母。\n\
