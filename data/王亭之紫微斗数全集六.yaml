  md: '但是仍欠東風，該東風是你必須經商，用錢滾錢，當能累積無窮的財物，朝九晚五的上班族和全職的家庭主婦，再好的財運，仍然無用，這點跟傳統的說法迥异。


    □上班族走了財運，手頭會不會寬裕一些？


    □古代命書主張會，我們認為作用仍然不大，因為財無源，不會突然從天上落下黃金。


    □有發財運必有破財運，該運約在何時？戊子大限還是戊寅大限？


    □這個命得天獨厚，一輩子走不到破財運，財物可免被人劫奪，不過略破還是存在的，那是戊子大限，天機化忌照入財宮，由于只是斜照，殺傷力不强，可以無懼，只要不做生意，不與人金錢來往就行了。


    三


