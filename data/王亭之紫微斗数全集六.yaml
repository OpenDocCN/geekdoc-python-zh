  md: '# # 大家的美食


    # ## 自序


    這本書的理念源自《紫微論命不求人》，兩書堪稱姐妹之作，後者屬於共盤推論，只要時間條件相同，結論並無差別，此書提供的則是技術分析，利用輸入法和定宮原理，分別人事物的差異，堂而皇之進入論命的深層結構。我們首度有系統的披露現代方法學的成果，希望藉此把斗數的推算提升到咨商的層次，足以公開討論，甚至公開辯論。


    八十一年的五月下旬出版《紫微論命不求人》，二十天之後再版，這是一件令人振奮的事，算是命理叢書一項新的記錄，一些朋友告訴我他們是看了此書才恍然大悟原來斗數算命是那種模樣，效法天臺宗智者大師拜經，期待技術分析早日公開，使斗數論命臻于完備。


    去年夏天我忙碌異常，除了趕熱鬧寫了《立委選戰，鹿死誰手》外，選評注清朝八字學者沈孝瞻的《子平真詮》，時間有限，在酷暑中揮汗，頭昏腦漲，慘不忍睹，直到秋涼之後，才動手書寫，其間數易其稿，最後再利用校對重讀一遍，發覺還算差強人意，敬請大家指正。


    傳統習慣中，算命先生是一個介乎于天人之間不世出的人物，只有他們才配泄漏天機、透露求教者的生命痕跡，這種人不是神仙之流又是什么，翻開八字和斗數古籍，神仙論斷、神仙事迹，到處充斥，暗示后代習命者如法炮制，才能修成正果。我曾經多次遇到一些鏡頭，迄今印象深刻。命盤排好（現在是電腦打出），我清清喉嚨曰：『請問，想知道什么？』'
  merge: -1
  pgno: 5
- img_proc: true
  md: '大部分人會這樣回答：『把你知道的通通告訴我。』一部分則說：『把我過去發生的事情敘述一遍。』他們認爲這是驗證學者或算命先生功力的不二法門，過往事迹，娓娓道來，高手無疑。但是他們碰到的是我，我通常會答曰：『坦白說，我什么都不知道。』


    反應倒是可以預知的，他們先是大吃一驚，然後喃喃道：『爲什么跟傳聞的不同……』


    有些人立刻露出鄙夷的神情說：『別假仙啦，誰不知道你段數最高，知道過去未來。』我趕緊聲明沒有那么厲害，否則早已隨美國總統之邀，擔任白宮軍師了。有些朋友約我談命，在電話那頭交代說：『我先把生辰給你，有空幫我仔細瞧瞧。』我說來了再排，命盤的主人不在，那只是一張白紙黑字，没什么用處。他們偶爾還會這樣親切：『給你充分的時間觀察、思考，斷得更準。』『我只好向他們道謝。我不好意思說我對各種命理結構已經了如指掌，只一眼，就能推斷，那樣有點自傲，讓人反感。』


    神仙論斷的存在已是老太婆的棉被——蓋有年矣，那種觀念根深蒂固，任憑九牛二虎之力都動不了它一根寒毛，我何德何能，憑幾本薄書就想撥亂反正，簡直蜉蝣撼大樹嘛。


    技術分析是條件式的，你必須告知某事，然後依照定宮原理進入系統，在命盤一個個的特定宮位中搜玄尋秘，依稀發現一些共盤無法推知的蛛絲馬迹，換句話說，如果閣下三緘其口，或者生怕因爲漏了口風，被猜出內心的事，那么只好繼續共盤侍候，所有的分析和結論必然符合所有同命者，在臺灣，他們共有七十七人之多（平均人口數）。'
  merge: -1
  pgno: 6
- img_proc: true
  md: '技術分析跟鐵口直斷正好背道而馳，由于違反慣例，被江湖術士嗤之以鼻，毫不意外，我們認為算命跟醫生診斷有異曲同工之妙，如果拒絕向醫生陳訴病情，不是被下逐客令，就是引來獸醫，只有後者的患者是不必說話的。就重要性而言，命運分析何其嚴肅，影響層面何其廣闊，顧客卻不屑合作，豈有此理。


    進行技術分析之前，有個重要觀念必須確實體認——定宮，癸酉年開創的新業，必以西宮及三方宮位為起始點，缺乏定宮的概念，或者不知定宮為何物，便無法欣賞現代命理學者的神乎其技，而任何習命者、算命先生縱有通天本領，論命造詣已臻化境，假相而已。


    有些算命館門庭若市，術士月入數十萬甚至百萬，論命方式不過是十二宮從頭到尾講解一遍就拉倒，偶爾觸及一些玄機，也是瞎貓剛好碰到死老鼠，臺北好幾位大師算一個命三十


    分鐘，收費新臺幣三千元，時間一到，端茶送客，他一律講解共盤，技術分析是啥，可能茫然，生意却好得不得了。


    《斗數疑難一百問答現代篇》記載，輸入法處理的事項必須是可算的，否則即使條件齊全，也是老虎吃天，不知該從何處下手，譬如我們輸入父母的條件，仍然不知父母自己發生了什麼大事，輸入子女的條件，仍然不知親子關系如何演變，可見科技再發達，對造物者


    内在世界的了解仍是一片混沌，此時頗能體會德國科物理學家海森堡提出『測不準原理』


    的心境。他說，『被觀察的現象始終是不可分割的，一個孤立自主的世界永遠不可能存在。』'
