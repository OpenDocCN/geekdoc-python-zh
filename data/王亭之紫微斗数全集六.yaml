    # 「问题二十三」：《斗数宣微》卅三十二页说『太阳守命者……因夺父星』，太阳不是父星吗？为什么太阳守命还夺父星～？


    答：太阳为父为夫为男，最宜守父母宫和女命的夫妻宫，且不宜落陷，落陷则带刑克，所以《女命骨髓赋》中说：『端正紫微太阳星，早适贤夫信可凭』，即指一星庙旺坐女命的夫妻宫能因夫而贵。


    既然太阳为父星、则以守父母宫为正。如果命宫坐太阳，则称为『夺父星』，其意为『把守父母宫的主星夺到了自己宫里来』。凡太阳守命者，庙旺尚佳，倘落陷则克父克子，女命还克夫，而且一生奔波劳碌难免，多从事竞争性强的职业。如果三方会吉，也可事业有成，只是人生未免太过孤克，不为佳命。


    # 「问题二十四」：请详述由流年太岁安流年陀流禄的方法。


    流年星曜中除流年四化之外，流禄流羊流陀流马也十分重要。其安法为：以流年天干安流年禄存即流禄，方法见《详述》卅二十一页表九。然后流禄前一宫安流羊，后一宫安流陀，流馬即按照《詳述》〇三十五頁的「安天馬訣」，用流年的地支來安，例如甲子流年則流祿在寅，流羊在卯，流陀在丑，流馬也在寅。


    至于《全書》中〇九十二頁那段話的意思：甲子年出生命宮在巳的人值天府坐守，遷移官七殺對照。原盤擎羊在卯、陀羅在丑。當他二十六歲時（如下圖所示）。正值己丑流年。小限必在亥、流羊在未、流陀在巳。小限亥宮七殺坐守，三方又見擎羊、流羊、流陀、原命坐流陀會原局陀羅；太歲命宮坐陀羅會流羊流陀；小限宮又七殺重逢（因原命會七殺）。因以上原命太歲、小限均遇層層凶煞，所以必遭毒禍。


