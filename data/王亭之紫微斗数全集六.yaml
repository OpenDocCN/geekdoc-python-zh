    # # 紫微批命法提示


    一、紫微斗数推命的运作步骤：


    如果时间出现误差，则推出的结果必然与实际情况风马牛不相及，所以这一必要的步聚不可忽视。一般的定时方法，主要根据命宫的星曜对照来人的长相和性格来定。达到一定的水平后，还可以推两件以往发生的事来验证命盘。但这需要对星曜附性了如指掌，对各种格局和多星组合所克应的事情，以及各种斗数理则有准确的把握。对于初学者来说，一时还很难做到这一点。需要不断学习和反复实践。如果发现推论的结果与求测者的经历不符，则可用所报时间的前一时辰和后一时辰再分别排盘以作校正。


    二、命盘确定后，再根据命宫的三方四正星曜组合，定出命主的格局，并根据吉凶星和四化星曜的会照情况。确定格局的成败及高低程度。这样，根据这个格局的性质就可确定命主的发展方向职业，大致是哪个层次的人，即社会地位的高下等。如果没有明显的格，就参看官禄，财帛和迁移宫星曜组合强弱程度，以确定命主的贫富贵贱。


