    **[問題二十二]**：《詳述》二一九十二頁提到的動星和宫動星动的概念，請解釋。


    紫微斗數中，動星即驛馬星不僅指天馬星，其它帶动荡性質的星也稱為動星。主要有天機、天梁、化忌、地劫、落陷的太陽太陰等。假如限運年遇到這些動星，則奔波勞碌難免。而發生該和局所顯示的事情。这里的『太歲冲動』即指流年走到『天馬逢地劫地空』所在宫位。凡有動星坐守的宫位，即稱為動宮，一般而言、命宫、田宅宫、夫妻宫、福德宫等宫位不宜动，动则有搬家、劳碌、婚姻不稳，忧心等现象。


