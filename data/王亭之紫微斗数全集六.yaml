    有人问道，这个命昌贪和火贪，铃贪混离，会不会像化学无素那样抵消、质变？我们的看法是，星曜结构是物理变化而非化学变化，不会产生变化，至于该如何分辨吉凶，以及贪狼见火铃后，能否免除昌贪的恶性？请大家思考。


    此外，紫相朝垣辅弼不照所形成的孤君状态在火贪，铃贪成格后，究竟增强还是减弱？颇似的疑难，须先弄清，研究命理，才可望修成正果。


    （一）『火贪』、『铃贪』武格，得以『威镇诸邦』，开疆辟地，扬名异域。


    （二）『火陀』、『铃陀』异格，得以『威权出众』，在各行各业中出类拔萃。


    （三）『昌贪』恶格，暗示学非所用，不务正业，喜欢旁门左道。


    □铃昌陀武算不算？


    □在命宫、事业、迁移这三宫中都是『三缺一』，所以构不成，财官则会齐，因此有关的钱财支配、物资享受、理财手段，都有暴起暴落的現象。


    □我算不算是个心性复杂的人？


    □算。


    二


    □像我这样的命若不跳出来自创，实在愧对天生如此一个大格局。但是我上班时间超过二十年，职业几乎定型，要我卷起袖子跳出来，我还有些彷徨呢？有朝一日心一横，说不定会一头栽下去，那么我该往何处去？


    □朝垣是朝向帝座，仰望帝座，无论上班或是任职，最好找个直属长官、上级单位，成为他们的心腹『智囊团、下游公司』，从此扶摇直上。还有一点，若是任职，在大衙门内奉公，循序渐进，多能发挥，小机构则宛如龙困浅滩，盖命越壮观，越需一个大舞台供他驱驰，才能奔腾翻跃。


    □我现在的工作稳定有余，冲动不足，距飞黄腾达尚有一段路程，我该怎样调适？人嘛对未来总有一分憧憬，我仍要问：何时才走到好运？


    □好运不是没有，不是来得太早，就是来得太晚，所以感觉不出它的存在。


    (一)太早是第二运就走到了，辛亥大限巨禄就在事业宫坐守，读书考试，一帆风顺；文昌化忌在田宅宫，离乡背井，负笈远游。


    (二)太晚是必须等到甲辰大限才又再遭逢姹紫嫣红的春天，廉贞禄在事业，经营吉祥此时已六十开外，不知还要不要为事业操心？迟来的好运不算好运，盖无福消受。


    □我这个命很怪，一生经历了两个壬运、两个癸运，壬的忌星武曲，在先天福德位，癸的忌星贪狼在事业宫，究竟有什么坏的作用？


    □行运是后天的事，须从后天宫位着手，才能看清运势转移的轨迹，四十年间一共经历两壬两癸，其中癸丑、癸卯的禄忌均未牵引大限命宫及其三方，乃静运一个，也就是没什么特好特坏的事情临身。壬子、壬寅就不同了，忌星武曲照会，禄星天梁则过其门而不入，故感受到的只是凶运带来的诸多不顺、运势阻滞和强烈的挫败意识。


    壬子大限坐忌，内心浮动，不安现状，难免影响事业一贯的运作。壬寅的忌在妻，婚姻前途备受考验，感情沟通不良，常起勃谷，该忌冲击事业，自然而然破坏了事业的稳定，重大抉择或改变宜深思熟虑，才不致铸成错误。


    三


    □财宫『七杀朝斗』古籍指此格为『爵禄荣昌』，主横发资财，我始终只是一个老实上班族，领的是死薪水，想发点小财都觉得困难重重，为什么理论与实际相差这么大？


    □『七杀朝斗』只是星曜排列的必然性，不能列入特别格局；若要论格，财宫在午，它的三方是寅午戌子，照到火铃与贪狼、火铃与羊陀这些四处飞窜的星曜才叫格局；此外君臣庆会也算。财宫结构既壮观且复杂，既见吉格（火贪、铃贪、火羊、铃羊、铃羊及铃陀），又逢恶格（昌贪、铃贪、铃昌陀武），表示既可横发，也会横败。这种情形反映到现实人生就是一旦求财，获得运助，多能顷刻致富，富可敌国，然后遇凶，一夕之间暴败，败得一文莫名。


    这个命不发达的原因有二：


    （一）走不到旺财运（大限禄星进入大限财福二宫），无运推波助澜，想要获取巨财，当然枉费心思。


    （二）光拿薪水，不会发财。


    □跟铃昌陀武有没有关系？


    □略有关系。


    从壬子到壬寅的四十年间，忌星（壬武曲、癸贪狼）只有武曲入限，但不直接入财，破坏力不是很大；壬子限忌星牵动三分，稍微严重一点。


    □不走财运，当然不可能发财，如此一来，岂非跟拥有如此一个巨命的初衷违背。


    □很明显的，这又是一个命与运相互冲突的结构，必须认清命运，知所进退，才能无憾。


    终生为人作嫁，虽然无法开拓人生，却可保证无虑，不受命运愚弄。


    ### 我能参加投资吗？


    ### 投资分好几种，我不知道你选哪一种？


    ### 纯投资，因为我还要上班。


    癸丑大限禄忌均未牵引，吉凶显然都发生在别人身上，但此中仍有些许差异。


    合伙宫在午，他们的事业宫在戌，破军禄坐守，财宫在寅，贪狼忌坐守，由此推知，由合伙人全权经营的事业只能得名而无法获利。问题是开公司做事业，谁不想赚钱，因此投资下去的资金连回收都有困难，还指望他们赚钱分你老兄一杯羹吗？


    □壬申年初我投下了一百多万在小舅子经营的一家玩具公司，专门外销，看来是凶多吉少。


    ### 那么今年投资的环境是否好转？


    □癸酉年破军禄与贪狼忌均未照入岁运，静年而已。这样的吉凶分布，显又与合伙人有关，若不到，相反的武曲忌在子，这是合伙人的迁移宫，外出宫位受阻，外销生意发生什么困难，不卜而知。癸酉年贪狼忌照入他的财宫，冰上加霜，不知能不能拖到那个时候。


    我使用阁下的命盘讨论别人的事，不够客观，也许小舅子正在走好运，财源滚滚，发得惊天动地，这种事是可能的。


    ### 此年天梁禄在巳，这个巳正是你老兄的大限事业宫，量是这样的吉祥合伙人却感受说有什么事件发生，八成在他们身上。


    ## 生死事大


    一九九一年四月中旬，我们几个朋友到日本看庙，在东京偶遇台湾去的陈小姐，她在那里念书并且就业，当天晚上，我们坐地下铁到横滨中华街吃料理，从车站出来，天空飘着蒙蒙细雨，突然想起『长崎今夜又下雨』那首日本演歌。任凭雨点打在头上，在昏暗的街道上踽踽而行，灯火也朦胧，雨花也朦胧，那种凄美，颇难描绘。我一边款步，一边跟陈小姐讨论命运，在异国的雨夜里，另有一番风味。


    一


    □我念药学，获得硕士学位，目前在日本一家规模不小的药品公司上班，迄今还在怀疑是否适性，你看哪种职业比较适合我？


    □天府朝垣，辅弼照耀，格成『君臣庆会』，大格局也，这种人即使身为女性，仍然得以群策群力，成就事业。六煞只见其一，六吉却见其三，性格从此倾向温文，文职显贵也，适于追求社会地位和个人声望，往这种方向发展，前程无限，故做个朝九晚五的命中有一种奇异的意识沉潜着，暗示两事不能避免。


    （一）学的是一套，用的又是一套。


    （二）每一次变换行业，无法衔接——无法延续从前的经验，造成经验的浪费。


    □文职行业包括艺术性工作吗？譬如艺术创作、美术设计，或专指文学、文书而言。


    术工作若是类此，文职何疑，不过设计、施工之类必须敲敲打打，则是文武兼备。


    班而专职学术研究，是否可行？


    □在公司机关层层节制下任职较能发展，还是独立自主较能发展？如果我不到公司上


    □这个命拥有领导统御的潜能，需要一个巨大宽广的舞台，大公司空间大，如鱼得水，小公司则宛如龙困浅滩。一般而言，外境的组织越健全，越能凸显自己高超的能力，自寻发展，应大处着眼，接受较高的层次或艰巨的题材挑战，学术研究本身就是一件苦差事，须有殉道的精神，全心投入，方以致之。


    □未来二十年的事业必然有强有弱，有起有落，我该如何面对？


    □无论吉凶，任何人对于他的困境都要勇敢接受，逃避一辈子，终究不是办法。有关运程的得失消长，预推于下：


    （一）癸酉年起转入乙丑大限，这是一步弱运，盖财宫、迁移均无主星，这两方面比较无力承担。禄星（天机）在事业，忌星（太阴）在夫宫，遥遥相对，事业见禄，经营执行，通畅无阻。忌星出现，定性动摇，偶尔会出现错误，因而想要换业。该忌从夫宫射出，专业的挫折八成与婚姻有关。


    （二）甲子大限是旺运，也是此生最佳事业运，廉贞禄从夫宫照耀事业宫，眼前运大昇其趣，这是婚姻造就了事业，若无婚姻，则只应验在单纯的事业经营上，庇荫吉祥顺利，吉力略逊。


    太阴忌冲破田宅宫，居无定所，不是经常乔迁，就是不时出差、出远门。


    二


    □我是迟婚的人，是否命中注定迟婚或失婚？不然，要到何年何月才遇到红鸾星动。


    □婚姻是一种选择——每个人可以自由选择对象，当然也可以选择要不要结婚。婚姻绝非命定，否则双胞胎将同时成亲，而其中一人离异，同命者将无一幸免，天下不大乱才怪。


    这个命的夫宫结构佳美，紫府朝垣、右弼照入，格成『君臣庆会』，同样具有领导统御的能力，机缘成熟，往往成为栋梁（公司里面的中上干部，未来的领导阶层等等）。但这种类型多半愿意做个上班族，响往安定的生活，有幸配到这样的男人，鹊鰈情深，白首偕老，应无问题。


    □所谓『紫府朝垣』，系指对象而言，或是我自己？


    □批对象而言。


    夫宫只能描述或描绘配偶类型，后者譬如具有哪种性格？对婚姻（家庭观念、两性关系）抱持着怎样的观念～婚后会不会受到风吹雨打而影响到稳定等等。但描述是一回事，事实又是一回事，因为对象可以自由选择，选不选得到描述的那种类型，谁都没有把握。


    所以古人说『得之，我幸；不得，我命』，不是没有道理。


    三


    □一九九二年外出不利，那么往后延一年，是否吉祥？


    □壬申年武曲化忌入寅，流年迁移宫也，外出官位见忌，俗称冲破，肇凶不肇吉，旅游、迁移难称理想。到美国念书将是一个『坏的开始』，有许多预想不到的难题出现。癸酉年不再逢忌，而流年田宅逢破，外出是顺理成章的事。


    □未来若改行潜心研究佛学，可算我的事业吗？我能倚此维生吗？


    □修行是一种工作，也是一种适合投注毕生精力的事业。


    修行的目的在于解脱，佛陀说『生死事大』，人间一切有形的成就（富贵功名）很快就成为过眼云烟，《金刚经》也说，『凡所有相，皆是虚妄』，随时抛弃可也。修行不一定要出家，因为解脱（证得涅槃）不是出家人的专利，在佛陀住世的时代，维摩诘的境界与佛同，他只是一个在家居士。


    历史上有两个人值得佩服，一是释迦牟尼，一是弘一和尚。前者曾经是个太子，拥有享受不尽的荣华富贵，却毅然弃世，寻找另一种层次的生活方式，终于悟道创教；后者是留日艺术家兼文学家，在三十九岁声望如日中天之时，放弃财富，从事南山律宗的研究。


    人总要放弃一些世俗的东西，才能追求灵性的觉悟，好像杯子，必须空着，才能再倒进净水。


    工作与修行鱼与熊掌不能兼得，实在让人困惑，此事最后仍须抉择，一些朋友的看法仅供参考。


    （一）蓝吉富老师和李元松大师的意见是你不宜再过一般人的生活，包括上班、结婚在内，那只会徒增痛苦；换句话说，最好能够追求大家不能追求或难以追求的事物，譬如从事学术研究、佛道灵修等等。除非经济条件不允许，必须努力赚钱，以便买米下锅。


    （二）我虽推算了婚姻的得失，在现实环境的考量下，仍要建议你从婚姻的枷锁中解脱出来，尤其目前的心境无法正常面对婚姻；内心彷徨疑惑，始终有股化不开的悲愤，选择错误的机率将高得出奇。'
  mdcn: '## 爵禄荣昌


    力相对越多。


    □静运中该如何调适，才符趋吉避凶的道理？


    □调适的方式有二：


    （一）承认此后可以喘一口气，然后准备韬光养晦。


    （二）若有什么欲望，只好托别人的福，譬如投资行业、购买长期股票等。


    □丙子大限坐禄，忌星不照，好运何疑，该是怎么一个好法：


    显，不会让人如堕云雾中，大打迷糊仗，天同禄自坐，信心增强，想要做什么，比较得心应手。


    廉贞忌在西，乃大限子女宫，亲子感情有了阻隔，可能工作忙碌的关系，疏忽了沟通的机会。这颗忌星也冲击财库，造成库破，对商人来说，财务结构脆弱，长期投资时，宜三思而后行。


    □看过一本斗数古籍，里面指出财宫的机梁主『好说』，暗示我当以口舌赚取生活之资，跟现在的职业性质不很符合，将来可能改行吗？


    □机梁是否表示『好说』（喜欢说话、好商量），我不清楚，清楚的是，财宫不是观察将以哪种特定方式求财，而是研究此人的钱财观念、享受程度、理财手段等等。像阁下这种命做个愉快的上班族最为笃定（如果环境许可，当然可以创业），财源来自下列几个方向：


    - 薪水、佣金，并可能兼及一些不特定的外快，看起来不会横发，当然也不会横败，属于积富之人，也就是靠储蓄和节俭致富。


    □乙亥大限天机化禄进入财宫，算不算一步财运？


    天机所在位置是先天财宫，该星化禄，希望发财并藉以改善物质环境的念头很强，但是会不会发财，纯属后天行运的事，须从大限结构加以斟酌，此时的禄星所在变成大限的合伙宫，禄在别人的宫位，帮别人发财而已。


    此生最好的财运业已走过，就是童年的壬申，当时年纪小，作用不显。往后因为未再逢旺财运，进财不会太多，也备极辛劳。还好有个次佳财运，那是丙子大限，如果经商或来点求财行为，可望获财，由于只是斜照，吉力略减。


    三


    □辛未年命宫无星，羊陀来照，其凶无比，这年的年底我遭遇了一件刻骨铭心的大事，推得出是什么吗？


    前面说过，命理的功能不在预言，而在分析——对一个决定或选择的成败进行分析。


    一般所谓的大事不外乎个人无意中的遭遇，特性无疑，使用共盘推论特性即使矢矢中的，却无一不是瞎猫想碰死老鼠。


    □不是灾难，刚好相反，是喜事。年中，有个研究八字的朋友只瞧了一眼，立刻断定我中六合彩，发了一笔横财，但我福薄，旋即失去；还倒贴两百多万，差点永劫不复。


    □那人显已名列仙班，我们这些凡夫俗子所能及。


    □依正常的推论，此年在钱财方面有什么得失。


    □命无主星，个己的意识薄弱，欠缺自主力，易受环境诱惑，被人牵着鼻子走，最好每天祷告别发生事故，否则只能坐视（坐以待毙）；庚午、壬申和甲戌这年份的情况类同。


    巨门禄在寅，大限田宅宫，也是流年健康宫，好事与岁运无涉，也就是与我无涉：这是古人说的「命里无时」，最好别作非分之想，否则结局必是挖东墙补西墙。


    文昌忌在西，大限妻宫并射事业，干扰旧业的稳定，如果主管一项业务，业绩多半时好时坏，起伏不定。该忌也进入流年福德位，冲照财宫，形成流年破财、大限破事业的恶性现象，这也是「命里无时」，仍不宜强求。


    □此年公司改组，董事长连任，我的顶头上司换了人，老板命宫在丑（大限迁移宫），文昌忌在西，正是他的财官，斜照入巳，这个巳则是他的事业宫，斜照的破坏力略逊，所以只是改组，这样推论正确吗？


    □这类事件的踪迹不太可能在一个外人命盘上显示，道理其实不难，因为公司还有其他的职员，我就不信他们的命盘上刚好都显示同样的效果。退一万步说，若要追踪，也不必然是从辛未年的三方宫位来看，应从你老兄进入公司那年的三方。


    □曾经有人断我癸酉年破军禄自坐，贪狼忌在事业官，可能升官，但到翌年就会因为不克胜任而遭到调职，他们说因为甲戌年太阳忌侵入事业宫，那种论法可信吗？


    □显然不可信。我问你一事：你是老板吗？


    □当然不是。


    □只有老板才能对员工的调动为所欲为，这是常识。


    破军不是「先立后破」，而只是一颗不带任何吉凶成分的主星，不少习命者坚认该星主先立后破，那是望文生义。破军禄进酉，这是大限妻宫，冲照事业，旧业今年大吉，若有异动，八成是好的动，或者动后必好。不过，动或不动的权力操在老板手中（即使自己积极争取，决定权仍在老板），他点头，事乃能成。此宫也是流年的命宫，对于各种现象，自信满。


    贪狼化忌在丑，不能不注意。这个丑是大限福德，与财宫互通有无，钱财支配遭到破坏，跟人金钱来往，多遭损失，此年起始的事业有败，是个「坏的开始」


    ## 生死事大


    我是闰五月生的人，对于该以五月排盘抑或六月，一直很迷惑，最近翻书还发现有些人指十五日以前用五月，以后用六月，你说何者为确？


    □答案是五月。


    老实说，此事已成定论而不必再争论了，如果还有疑问，不妨各排一张比对一番。


    □我们那个时候还有夏令时间（日光节约时间），那么我应生于申时还是酉时？


    □这就要诉诸实际的印证了。


    □如何印证法？我性格急躁，做事欠缺耐性，大学念的是机械，毕业后学非所用，在一定私人公司担任业务与行销；除此之外，事业心蛮强的……。


    □破军坐命会煞是典型的杀破狼加煞，并构成异俗，才有这种效果。酉时（请读者自己排盘）生人命无主星，三方不见一煞，断无如此现象。


    □古书说破军主先立后破，我迄今仍无那种徵兆，是古人说的不尽然可信，还是时机未到？


    □破军主先立后破或先破后立，都是望文生义，缺乏实证的基礎，可以不必理会。


    此命的特别格局还真不少，格局均蕴藏着无限的潜能，开发出来，成就卓然，作用如下：


    | | 天钺梁天禄 | 铃右七弼杀星 | 地劫 | 左廉辅贞 |

    |---|---|---|---|---|

    | 乙巳 | 丙午 | 丁未 | 戊申 | |

    | 甲辰 | 天紫相微 | 一九五二年五月×时申时壬辰 | 己酉 | |

    | 癸卯 | 地天巨天空魁门机 | | 庚戌命宫 | 陀火破罗星军 |

    | 壬寅 | 文贪昌狼 | 太阴太阳癸丑三十四-四十三 | 擎文天武羊曲府忌癸子三十四-四十三 | 天同辛亥 |


    有人问道，这个命昌贪和火贪，铃贪混离，会不会像化学无素那样抵消、质变？我们的看法是，星曜结构是物理变化而非化学变化，不会产生变化，至于该如何分辨吉凶，以及贪狼见火铃后，能否免除昌贪的恶性？请大家思考。


    此外，紫相朝垣辅弼不照所形成的孤君状态在火贪，铃贪成格后，究竟增强还是减弱？颇似的疑难，须先弄清，研究命理，才可望修成正果。


    （一）『火贪』、『铃贪』武格，得以『威镇诸邦』，开疆辟地，扬名异域。


    （二）『火陀』、『铃陀』异格，得以『威权出众』，在各行各业中出类拔萃。


    （三）『昌贪』恶格，暗示学非所用，不务正业，喜欢旁门左道。


    □铃昌陀武算不算？


    □在命宫、事业、迁移这三宫中都是『三缺一』，所以构不成，财官则会齐，因此有关的钱财支配、物资享受、理财手段，都有暴起暴落的現象。


    □我算不算是个心性复杂的人？


    □算。


    二


    □像我这样的命若不跳出来自创，实在愧对天生如此一个大格局。但是我上班时间超过二十年，职业几乎定型，要我卷起袖子跳出来，我还有些彷徨呢？有朝一日心一横，说不定会一头栽下去，那么我该往何处去？


    □朝垣是朝向帝座，仰望帝座，无论上班或是任职，最好找个直属长官、上级单位，成为他们的心腹『智囊团、下游公司』，从此扶摇直上。还有一点，若是任职，在大衙门内奉公，循序渐进，多能发挥，小机构则宛如龙困浅滩，盖命越壮观，越需一个大舞台供他驱驰，才能奔腾翻跃。


    □我现在的工作稳定有余，冲动不足，距飞黄腾达尚有一段路程，我该怎样调适？人嘛对未来总有一分憧憬，我仍要问：何时才走到好运？


    □好运不是没有，不是来得太早，就是来得太晚，所以感觉不出它的存在。


    (一)太早是第二运就走到了，辛亥大限巨禄就在事业宫坐守，读书考试，一帆风顺；文昌化忌在田宅宫，离乡背井，负笈远游。


    (二)太晚是必须等到甲辰大限才又再遭逢姹紫嫣红的春天，廉贞禄在事业，经营吉祥此时已六十开外，不知还要不要为事业操心？迟来的好运不算好运，盖无福消受。


    □我这个命很怪，一生经历了两个壬运、两个癸运，壬的忌星武曲，在先天福德位，癸的忌星贪狼在事业宫，究竟有什么坏的作用？


    □行运是后天的事，须从后天宫位着手，才能看清运势转移的轨迹，四十年间一共经历两壬两癸，其中癸丑、癸卯的禄忌均未牵引大限命宫及其三方，乃静运一个，也就是没什么特好特坏的事情临身。壬子、壬寅就不同了，忌星武曲照会，禄星天梁则过其门而不入，故感受到的只是凶运带来的诸多不顺、运势阻滞和强烈的挫败意识。


    壬子大限坐忌，内心浮动，不安现状，难免影响事业一贯的运作。壬寅的忌在妻，婚姻前途备受考验，感情沟通不良，常起勃谷，该忌冲击事业，自然而然破坏了事业的稳定，重大抉择或改变宜深思熟虑，才不致铸成错误。


    三


    □财宫『七杀朝斗』古籍指此格为『爵禄荣昌』，主横发资财，我始终只是一个老实上班族，领的是死薪水，想发点小财都觉得困难重重，为什么理论与实际相差这么大？


    □『七杀朝斗』只是星曜排列的必然性，不能列入特别格局；若要论格，财宫在午，它的三方是寅午戌子，照到火铃与贪狼、火铃与羊陀这些四处飞窜的星曜才叫格局；此外君臣庆会也算。财宫结构既壮观且复杂，既见吉格（火贪、铃贪、火羊、铃羊、铃羊及铃陀），又逢恶格（昌贪、铃贪、铃昌陀武），表示既可横发，也会横败。这种情形反映到现实人生就是一旦求财，获得运助，多能顷刻致富，富可敌国，然后遇凶，一夕之间暴败，败得一文莫名。


    这个命不发达的原因有二：


    （一）走不到旺财运（大限禄星进入大限财福二宫），无运推波助澜，想要获取巨财，当然枉费心思。


    （二）光拿薪水，不会发财。


    □跟铃昌陀武有没有关系？


    □略有关系。


    从壬子到壬寅的四十年间，忌星（壬武曲、癸贪狼）只有武曲入限，但不直接入财，破坏力不是很大；壬子限忌星牵动三分，稍微严重一点。


    □不走财运，当然不可能发财，如此一来，岂非跟拥有如此一个巨命的初衷违背。


    □很明显的，这又是一个命与运相互冲突的结构，必须认清命运，知所进退，才能无憾。


    终生为人作嫁，虽然无法开拓人生，却可保证无虑，不受命运愚弄。


    ### 我能参加投资吗？


    ### 投资分好几种，我不知道你选哪一种？


    ### 纯投资，因为我还要上班。


    癸丑大限禄忌均未牵引，吉凶显然都发生在别人身上，但此中仍有些许差异。


    合伙宫在午，他们的事业宫在戌，破军禄坐守，财宫在寅，贪狼忌坐守，由此推知，由合伙人全权经营的事业只能得名而无法获利。问题是开公司做事业，谁不想赚钱，因此投资下去的资金连回收都有困难，还指望他们赚钱分你老兄一杯羹吗？


    □壬申年初我投下了一百多万在小舅子经营的一家玩具公司，专门外销，看来是凶多吉少。


    ### 那么今年投资的环境是否好转？


    □癸酉年破军禄与贪狼忌均未照入岁运，静年而已。这样的吉凶分布，显又与合伙人有关，若不到，相反的武曲忌在子，这是合伙人的迁移宫，外出宫位受阻，外销生意发生什么困难，不卜而知。癸酉年贪狼忌照入他的财宫，冰上加霜，不知能不能拖到那个时候。


    我使用阁下的命盘讨论别人的事，不够客观，也许小舅子正在走好运，财源滚滚，发得惊天动地，这种事是可能的。


    ### 此年天梁禄在巳，这个巳正是你老兄的大限事业宫，量是这样的吉祥合伙人却感受说有什么事件发生，八成在他们身上。


    ## 生死事大


    一九九一年四月中旬，我们几个朋友到日本看庙，在东京偶遇台湾去的陈小姐，她在那里念书并且就业，当天晚上，我们坐地下铁到横滨中华街吃料理，从车站出来，天空飘着蒙蒙细雨，突然想起『长崎今夜又下雨』那首日本演歌。任凭雨点打在头上，在昏暗的街道上踽踽而行，灯火也朦胧，雨花也朦胧，那种凄美，颇难描绘。我一边款步，一边跟陈小姐讨论命运，在异国的雨夜里，另有一番风味。


    一


    □我念药学，获得硕士学位，目前在日本一家规模不小的药品公司上班，迄今还在怀疑是否适性，你看哪种职业比较适合我？


    □天府朝垣，辅弼照耀，格成『君臣庆会』，大格局也，这种人即使身为女性，仍然得以群策群力，成就事业。六煞只见其一，六吉却见其三，性格从此倾向温文，文职显贵也，适于追求社会地位和个人声望，往这种方向发展，前程无限，故做个朝九晚五的命中有一种奇异的意识沉潜着，暗示两事不能避免。


    （一）学的是一套，用的又是一套。


    （二）每一次变换行业，无法衔接——无法延续从前的经验，造成经验的浪费。


    □文职行业包括艺术性工作吗？譬如艺术创作、美术设计，或专指文学、文书而言。


    术工作若是类此，文职何疑，不过设计、施工之类必须敲敲打打，则是文武兼备。


    班而专职学术研究，是否可行？


    □在公司机关层层节制下任职较能发展，还是独立自主较能发展？如果我不到公司上


    □这个命拥有领导统御的潜能，需要一个巨大宽广的舞台，大公司空间大，如鱼得水，小公司则宛如龙困浅滩。一般而言，外境的组织越健全，越能凸显自己高超的能力，自寻发展，应大处着眼，接受较高的层次或艰巨的题材挑战，学术研究本身就是一件苦差事，须有殉道的精神，全心投入，方以致之。


    □未来二十年的事业必然有强有弱，有起有落，我该如何面对？


    □无论吉凶，任何人对于他的困境都要勇敢接受，逃避一辈子，终究不是办法。有关运程的得失消长，预推于下：


    （一）癸酉年起转入乙丑大限，这是一步弱运，盖财宫、迁移均无主星，这两方面比较无力承担。禄星（天机）在事业，忌星（太阴）在夫宫，遥遥相对，事业见禄，经营执行，通畅无阻。忌星出现，定性动摇，偶尔会出现错误，因而想要换业。该忌从夫宫射出，专业的挫折八成与婚姻有关。


    （二）甲子大限是旺运，也是此生最佳事业运，廉贞禄从夫宫照耀事业宫，眼前运大昇其趣，这是婚姻造就了事业，若无婚姻，则只应验在单纯的事业经营上，庇荫吉祥顺利，吉力略逊。


    太阴忌冲破田宅宫，居无定所，不是经常乔迁，就是不时出差、出远门。


    二


    □我是迟婚的人，是否命中注定迟婚或失婚？不然，要到何年何月才遇到红鸾星动。


    □婚姻是一种选择——每个人可以自由选择对象，当然也可以选择要不要结婚。婚姻绝非命定，否则双胞胎将同时成亲，而其中一人离异，同命者将无一幸免，天下不大乱才怪。


    这个命的夫宫结构佳美，紫府朝垣、右弼照入，格成『君臣庆会』，同样具有领导统御的能力，机缘成熟，往往成为栋梁（公司里面的中上干部，未来的领导阶层等等）。但这种类型多半愿意做个上班族，响往安定的生活，有幸配到这样的男人，鹊鰈情深，白首偕老，应无问题。


    □所谓『紫府朝垣』，系指对象而言，或是我自己？


    □批对象而言。


    夫宫只能描述或描绘配偶类型，后者譬如具有哪种性格？对婚姻（家庭观念、两性关系）抱持着怎样的观念～婚后会不会受到风吹雨打而影响到稳定等等。但描述是一回事，事实又是一回事，因为对象可以自由选择，选不选得到描述的那种类型，谁都没有把握。


    所以古人说『得之，我幸；不得，我命』，不是没有道理。


    三


    □一九九二年外出不利，那么往后延一年，是否吉祥？


    □壬申年武曲化忌入寅，流年迁移宫也，外出官位见忌，俗称冲破，肇凶不肇吉，旅游、迁移难称理想。到美国念书将是一个『坏的开始』，有许多预想不到的难题出现。癸酉年不再逢忌，而流年田宅逢破，外出是顺理成章的事。


    □未来若改行潜心研究佛学，可算我的事业吗？我能倚此维生吗？


    □修行是一种工作，也是一种适合投注毕生精力的事业。


    修行的目的在于解脱，佛陀说『生死事大』，人间一切有形的成就（富贵功名）很快就成为过眼云烟，《金刚经》也说，『凡所有相，皆是虚妄』，随时抛弃可也。修行不一定要出家，因为解脱（证得涅槃）不是出家人的专利，在佛陀住世的时代，维摩诘的境界与佛同，他只是一个在家居士。


    历史上有两个人值得佩服，一是释迦牟尼，一是弘一和尚。前者曾经是个太子，拥有享受不尽的荣华富贵，却毅然弃世，寻找另一种层次的生活方式，终于悟道创教；后者是留日艺术家兼文学家，在三十九岁声望如日中天之时，放弃财富，从事南山律宗的研究。


    人总要放弃一些世俗的东西，才能追求灵性的觉悟，好像杯子，必须空着，才能再倒进净水。


    工作与修行鱼与熊掌不能兼得，实在让人困惑，此事最后仍须抉择，一些朋友的看法仅供参考。


    （一）蓝吉富老师和李元松大师的意见是你不宜再过一般人的生活，包括上班、结婚在内，那只会徒增痛苦；换句话说，最好能够追求大家不能追求或难以追求的事物，譬如从事学术研究、佛道灵修等等。除非经济条件不允许，必须努力赚钱，以便买米下锅。


    （二）我虽推算了婚姻的得失，在现实环境的考量下，仍要建议你从婚姻的枷锁中解脱出来，尤其目前的心境无法正常面对婚姻；内心彷徨疑惑，始终有股化不开的悲愤，选择错误的机率将高得出奇。'
