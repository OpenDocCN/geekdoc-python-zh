    \n#### 时系星特性：\n文昌为时系星，故代表分期、断断续续、细水长流；入财帛宫，因文书、契约而得财；化忌则因文书票据而破财，资金冻结。或放款，期票不能收回。官禄宫怕化忌，化忌表冲动。故文昌化忌在官禄，只是文书手续延误，仍可成事。惟会四煞则不能成事。文昌化忌在官禄会天刑，因文书事而引起官讼是非。\n\
