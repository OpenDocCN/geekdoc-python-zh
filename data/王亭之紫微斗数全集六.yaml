    # # 姻緣前定


    □己巳年中，經朋友介紹認識了四十九年次的林先生，半個月不到，他就迫不及待央媒到我家來提親，嚇了我一大跳。而在認識之前沒幾天，意外地跟一個朋友到臺南讓人算過八字，算命先生告訴我三十歲以後結婚較能白首，以致不敢貿然答應他的求婚；此時，


    林先生也表示他願意等我到三十歲以後。


    認識之初，林先生表現得非常積極，從年初到五月，幾乎天天到我家報到，他住高雄而我家在屏東，往返要花一個多鐘頭，居然風雨無阻，因此頗獲家人良好的印象。最近不知何故，突然一個禮拜不曾連絡，我的心中于是有了疑問。由於我個性內斂又害羞，跟他交往的五個多月中一直未曾去過他家，連電話也未打過一通，就寫了一封信去問詢，才知道他跟朋友合伙開電腦公司虧了兩百多萬元，投資股票也被套牢，一時無法承受，干脆閉門思過；在此之前，他做日本進口生產賺了一些錢，今年竟然大破，難道人合伙會因為地域對象不同而有吉凶嗎？


    回斗數並無地域的劃分，譬如歸納出一個人生在三界十方哪個方位必然富貴，哪個方位則是貧賤；同樣生于臺灣，只能到南部工作、北部求學、歐洲留學、美國經商等等，因此判斷庚午年大破，與流年、大限錢財支配的消長有關，而與對象是日本或日本人無關。


