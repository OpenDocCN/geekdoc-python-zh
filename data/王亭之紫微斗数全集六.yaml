  md: '□當然是民意代表，縣議員、省議員或立法委員之類。


    □性格尖銳的人做民意代表，爲民喉舌，監督施政，必屬一流，肯定把政府官員罵得血壓升高，宿疾復發。煞星是致命武器，煞星多見，攻擊火力強盛，做在野黨的議員比執政黨要適格得多，因爲執政黨員有護航政策的責任，不若在野黨那樣肆無忌憚。


