    □ 文昌忌進入田宅宮，庫破，還指望發財嗎？


    □ 忌在大限田宅，主三種徵兆：一是經常搬家，居無定所；二是經常出差、遠赴外埠；三是庫破，無法囤積。應在何者，或以何者為重，幷無定論，端視呼應的方向而定，其中輕者是出差頻仍，四海爲家；對生意人來說，庫破主財務結構脆弱，可能周轉不靈，萬一營運失策，將導致破產跑路。


