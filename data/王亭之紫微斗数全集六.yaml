    □由于忌星牽引煞星，整個命局呈現動性，從事的行業自以波動、技術性、不逆命格爲主，也就是活動力較強俗稱的『武職行業』，一般行業像行銷、批發、業務代表和工程設計、施工等，一定可以發揮潛能，如果只是煩瑣的行政業務，極易産生倦怠感，也無成就感可言。


    缺乏專長的人大抵只能做服務業，甚至爲人做嫁衣裳，并可能經常換業，而任何一種行業都很難做過五年。


