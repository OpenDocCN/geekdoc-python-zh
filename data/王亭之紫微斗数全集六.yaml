    「問題二十五」：《形性賦》詮釋中的說法是以命宮為主嗎？還要三方四正否？

    答：《詳述》後面附錄的《形性賦》詮釋以命宮為主，兼看身宮，不看三方四正，如果

    命宮無主星則借對宮的星曜論形性。其廟旺利隱亦以對宮的地支來論。這部分內容可與

    《斗數宣微》〇一百八十一—一百八十六頁合參。


    「問題二十六」：各星的廟旺利陷有無規律性？另外八吉星六凶星及四化如何分廟旺


