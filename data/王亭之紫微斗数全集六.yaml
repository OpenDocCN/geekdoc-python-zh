  md: '命宮、在被流年引動時，常有開刀動手術的情形發生。


    # 「問題三十五」：什么叫生年禄自化權、生年科自化忌等等。


    答：生年禄自化權是指生年禄坐落的宫位，其宫干又使该星化权。生年科自化忌是指生年化科坐落宫位的宫干又使该星化忌，其它照此推理。另外，还有一些术语，如科忌是指化科和化忌同宫（未必指同一星曜），简称科忌。禄权、权忌等等均与此相类似。


