    (一) 財宮、遷移無主星，往這些方向發揮，困難度增加。


    (二) 三方只見祿吉不見忌煞，穩定力强，信心十足，守株即可待兔，堅守陣地，以不變應萬變，動則難免會碰到許多心力無法解決的難題。


    廉貞忌在子女宮，冲射田宅，若有什么事項發生，必在這這些方面。對生意人來說，田宅宮的另一層意義就是財庫，庫破則財務結構不佳，從事長期投資或回收慢的行業，可能虧到脫底：不能不防。


    □我這幾年內有沒有升遷的機會？


    □人事异動普受各種外境作用，不是個人的意志所能左右的，因此從命盤上無法確實掌握升遷的軌迹，這是事實，與功力無關。此限坐祿，穩定自信，其中壬申、乙亥這些年份


    都有動象，是否升遷，不得而知。


    ## 三

    □未來十年環境的吉凶如何？這輩子事業運約在何時？


    □丁丑大限是先夭事業宮，結構強旺，環境仍然壯闊，祿（太陰）忌（巨門）均未牽動，靜運而已，適合定下來養精蓄銳。 祿忌進入別人的宮位（合伙宮在午，忌在他們的財宮、祿在他們的遷移宮），好事壞事似乎全與我無關。


    在本人方向，事業宮紫殺坐守，財宮廉破居中，都没什么破綻；弱勢的是人際關系，外緣不佳，出外發展事業，無法得心應手。


    丙寅大限才是事業佳運，天同祿從妻宮照射進來，為事業帶來了花繁葉茂春天，表示老而彌堅，晚年仍然大有可爲，坐享清福，還不到那個時機。 廉貞忌在西，健康之位也，體能必多起伏，應善自珍攝。


    □到這麼晚才走好運，廉頗已老，不知尚能飯否？


    □許多人在晚年才建立彪炳業勳，然后一直掌權，直到駕鶴歸西，備極哀榮，所以不必妄自菲薄——有人埋怨没有好鞋子穿，有人却連脚都没有，這個世界始終無法圓滿。每步大運都有一個緣，不可能六十年內完全照命，也不可能完全不照命，因此没有一個人一輩子走不到好運的，只是早走晚走而已


    ## 神仙論斷

    一

    □書上指出，忌在父母，定克尊親，對沖疾厄，則健康不佳，是否因此讓我成爲標準的藥罐子？


    □克親雲雲，只是古代命理家、江湖術士的誤解，以爲親情緣份可從命運中窺破，并能設法預防，譬如只要過房、當螟蛉子（童養媳）等等，注生娘娘就放你一馬。其實那些不幸事件只是特性：少數一兩個人所獨有，不能從共盤（或八字共程式）中推論，否則保證天下大亂，因爲只要生辰條件相同，便無例外。


    至于忌冲疾厄是否危及健康，我們認爲未必。


    (一) 斗數所有的星曜（包括大大小小一百多顆全部排上），仍無法涵蓋所有的疾病，譬如古代就沒有癌症、SOS、多氯聯苯毒害。


    (二) 一個人的健康顯與父母、祖代的遺傳有關，但命理無法掌握這方面的資料，即使掌握，也不知道該如何處理或分辨。


    □小時候我們住在鄉下，媽媽找附近村子里一個瞎子算命先生批過我的八字，他說我的命太硬，不好養育，我確實體弱多病，父母曾懷疑我養不養得大，鄉下醫療設備極差，也缺乏醫護觀念，有事就拜神求佛，光是香灰、符水，不知吃了多少斤，高中畢業前后因爲運


    動量增加，才逐漸健壯起來。從命中透析一個人的健康，確實了不起，請問什麼樣的命才叫太硬？是否跟坐天府會紫微這些南北帝星有關。


    > 此命坐府會紫，三方宮位都見星曜，結構強旺，得以承擔重任，開創事業。煞星照入增強波動，也增強沖勁，多一點男兒豪邁之氣，便少一點女性的纖柔之情。


    輔弼不照，《狐君》而已，性格孤獨冷峻，親情緣份不厚；內心孤獨，不喜熱鬧喧嘩，慣于單打獨斗，自我肯定，適于獨自從事學術研究。


    根據簡單的命理結構就泄漏了一些獨立事件，該算命先生雖是瞎子，必是大羅金仙下凡，非我們這些凡夫俗子所能及。


    八字祿命認為五行集中并構成特別格局者，比較容易沖發，但是這種命屬於偏枯，五倫有缺，無緣享福，成長期間，多災多難，也就是臺灣俗話說的『歹腰飼』（不易養）。


    不過，命理只能隱約看出一個輪廓，而無法一一指出哪些事項——太過具體，便成特性，有宿命論之嫌。


    > 從算命先生的口中隱約發覺，我的福澤相當薄弱，勞碌終生，到老仍無法享福，這又跟見煞太多或孤君有關。


    > 福澤一事極其抽象，其中的厚薄、有無，自然無法從共盤中窺知，我們偶爾提出，不過從衆隨緣，當做一種話題，并非我們獲得宿命通，足以觀察任何人的前世因緣。這類現象具有個別差異，常令科學方法學頭大，卻是宗教（尤其佛教）研究的主題。從命盤上我們


    只能隱約看出，煞星多見，耐力、韌性和攻擊力均強，禁得住無情命運的沖擊，也能學習專業技術，成為科技文明時代的寵兒。


    二


    □我念會統，目前在一家私人公司擔任進口汽車推銷，業績平平，却深獲老板器重，不知是我能力不錯，還是外緣特佳的關系，即使如此，仍然覺得有股無形的力量在面前橫阻着，無法全力施展，關鍵也許在于我不適合做推銷業上。


    耐煩燥，一般行政業務難稱適性。


    結構大的人本質上可以發展大事業，有朝一日卷起袖子跳出來獨立經營，是順理成章的事。當然啦，此時仍須運助，否則很難達到顛峰。


    □我對雕刻、陶瓷（手拉胚）很感興趣，大學時代住在一個寺廟雕刻師家里，耳濡目染，學會一些技巧，老先生曾經表示要收我為徒，并傾囊相授，但我的父母不同意，我也因為玩心未泯，不想沉耽于此，于是就放棄了，如今細思，覺得有點可惜，希望今后能騰出時間磨練，但推銷業務繁忙，占去太多的時間，不知何年何月才能走這條路？


    □技術分好幾種類型，可依個人的興趣選擇學習，讓潛能充分釋出，轉化獲福。大致上說，年輕時期不妨廣泛學習，三十五到四十之間以后才要求定於。


    □我的好運來得遲或速


    从运势转移的轨迹看，辛丑大限好运何疑；但终其一生仍以辛卯大限坐禄，做事笃定最为最佳，只是事业遭到忌冲，常思变动，故吉凶互见。来得早，作用不大，过度动荡则会疲于奔命，都是美中不足。


    当然不是走不到好运就肯定庸庸碌碌，没没无闻，而是说在一般的运程中经营运作，艰辛备尝，只能一点一滴累积。


    □庚寅大限很快就走完了，剩下这几年还有开创的契机吗？


    □庚寅是个静运，整个命理环境呈现静止状态，一切缓慢进行，诸事安祥，若想改变甚至开创，一时间内动不起来，即使勉强动得，进度上也是拖拖拉拉的，需要时间的配合，壬申、癸酉都非吉年，甲戌可行，但立刻就要改限了，这点应该心里有数。


    大限禄星太阳在兄弟之言，为人作嫁，保证无虑，但不能跟他们合作，尤其纯投资或主权由对方操控，因为合伙人的事业宫被破，事业做不起来。


    三

    □辛卯大限命宫坐禄，好运无疑，个己的意志足堪左右十年的局势。但是忌星从夫宫冲射事业宫，尤其后者无星，此番受创，败绩显露，一发不可收拾。如此一禄一忌，何者为强？可能带来什么灾难？


    □坐禄稳定，守株即可待兔，故一动不如一静；事业遭忌，事业动荡，常想换业。何者为重为强以及吉凶大小，端视呼应的范围或项目而定，如果致力于事业，显然呼应了忌星的缺點，可能吃不完兜着走。


    □壬辰大限天梁禄在父母宫，应该没有作用，但武曲忌进入财宫，势将大破其财，中年以后经济情况如此之差，岂非注定要一辈子困顿？


    □那倒不一定。


    天梁禄在合伙人（酉宫）的财宫（巳宫），自己做破财，帮别人忙反而得利，记住这点就行了。如果延续旧业，不但不败，反而更上层楼，其中的差别，判若云泥。


    □记得有人告诉我，我的财宫被陀罗、地劫占据，此二星对钱财的破坏力量最大，不发财的命理因素即在此，此说是否可信？


    □我想跟那些星曜无关，而与行运不遇旺财运，无法顺利获财有关。


    地劫居财宫，影响最大的就是个人的物欲观念，再来是求财的手段，也许不想花太多时间去追求物质享受，不会精打细算，这些现象正是生意人的致命伤。


    最好的财运应在辛丑大限，巨门禄进入福德位，财源广招，照入财宫，顺利来财，只是当时年纪小，作用不大。以后只有辛卯大限的禄星斜照财宫，其余都跟财运无关，想要发财，就会大叹时不我予。


    □我在壬申年跟了几个会，有同事的，也有邻居的，还买了一些股票，其中一个已经标来用掉了，剩下的比较稳当，等需要时才标，你看会不会被倒掉？


    □此事牵涉其他诸多外境，还要讨论。我们对外境了解不多，现在只就个人的命盘加以探索，海底捞针一番。


    （一）庚寅大限在钱财支配方面只是平运，没什么重大灾难临身，可以放一百个心。民间互助会的重头戏在会头，只要他稳得住阵脚，大概可以收到钱。


    （二）天同忌冲破财库，财库是藏财之所，财库有损，不易聚财，辛苦聚集的一点小财，容易在顷刻间化为乌有，从事大型投资或回收慢的行业失策的机率高，一般小投资则没什么影响。'
