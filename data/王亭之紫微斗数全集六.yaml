    始于庚午年，那么在命盘上就以做下列的解析：


    （一）甲申大限的合伙宫在丑，他们的事業宫在巳、迁移宫在未、财宫在西。


    （二）庚午年太阳禄在亥，这是合伙人的妻宫并照入事业宫，事业运势不错，天同忌在西，却是他们的财宫，进财显有困难。


    由（二）得知，此年合伙人口利事业而不利时，如果做的是一般贩卖业，那么业绩尽管如日中天，结算后才发现反而亏掉老本。


    # 二


    □当时我还出示过林先生的八字，算命先生断言（庚午年）上半年是『比肩劫财』被人劫夺财物，劫数难逃，为什么斗数就算不出，还说今年的财运不错？我还听人家说，约可赚八十到一百万元，从他的命格看，似乎夸大其词，何况他有吝啬的倾向。


    □『比肩劫财』是八字的术语，意指庚午年的天干庚或地支午，跟八字的元神相同（术语比肩或劫财），不过我翻出他的八字（庚字、丙戌、癸未、丙辰），发现流年的庚干只是印而午支则是财，无一是比劫。


    至于斗数论者指出此年财运不错，恐怕也是假相，因为禄星（太阳）并未照入财福，何来财运？


    甲申大限结构壮观，生意好时，偶尔一个月或一次进货赚个百万银子，不足为奇，但不会是每次都会如此，否则赚他三年，腰缠万贯，还要费心去投资别的行业吗？


