    成就的高低，當然是無法預料的，因為還要看他做哪一行，以及是否盡力，類此之命，能否將火貪的潛能釋出，也是關鍵，釋出者高，潜藏者低。命理不是宿命論，關鍵在此。


    「未來走武職的路大概没什么問題，這個孩子從小就不喜歡藝文，像繪畫、音樂，幾乎都在及格邊緣徘徊。他十分好奇，喜歡動手實驗，經常把收音機、舊電視拆開再組合，弄得房間、客廳到處都是零件，凌亂不堪，數學物理成績都在八十分以上，走向自然學科也許是他的宿命，你們的看法呢？


