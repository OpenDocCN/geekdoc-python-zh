    「問題二十五」：《形性賦》詮釋中的說法是以命宮為主嗎？還要三方四正否？

    答：《詳述》後面附錄的《形性賦》詮釋以命宮為主，兼看身宮，不看三方四正，如果

    命宮無主星則借對宮的星曜論形性。其廟旺利隱亦以對宮的地支來論。這部分內容可與

    《斗數宣微》〇一百八十一—一百八十六頁合參。


    「問題二十六」：各星的廟旺利陷有無規律性？另外八吉星六凶星及四化如何分廟旺


    ![](img/ba71cd450f8ceda4f93ce5470e449489_273_0.png)


    # # 利陷


    答：各星的廟旺利陷無規律可循，但如果熟練掌握了各星隨宮位的附性差異則廟旺利

    陷自在其中。八吉星及六凶星的廟旺利陷請看《詳述》第三章的內容。對於其中没提到廟

    旺利陷的星曜以及四化星則無廟旺利陷可言，則隨主星的廟旺利陷來決定其作用力的大小

    程度，主星廟旺則吉，落陷則凶。


    「問題二十七」：《紫微星情詳述》p 二百頁某丁命盤圖如下：


    以上命盤為乙×年三月×日寅時生人，大限甲申使廉貞化祿、破軍化權、武曲化科、太

    陽；流年四化為巨門化祿、太陽化權、文曲化科、文昌化忌。


    「問題二十八」：請詳述斗君的安法，另外，流月的好壞是否由每個宮

    星情表示。

    流月的四化及本宮如何看？


    答：《詳述》p 百○二頁斗君口訣的如下：從流年地支的宮位起正月。逆數到出生的

    月份止，再從這一宮位起子時，順時針數到出生的時辰，該宮位即這一流年的斗君宮位，即

    正月宮位，往下再順時針排二月、三月……例：八月寅時生人，一九八七年丁丑斗群及流月

    宮位如何排？首先以丑宮為正月，逆時針數到八月，即午宮；從午宮起子時，順時針數到寅

    時，即申宮。那么申宮即丑年斗君，也就是丁丑年正月份的宮位，然后再順時針下數，酉為

    二月宮位，戌為三月宮位……未為臘月宮位。


    以上定出的各月宮位即流月的命宮，至于各月的四化星定法，則以流年去循流月的天


    [PAGE 275]


    干，用这个天干去安流月的四化星。也有的书上观点与本派不同，认为应该以流月地支的宫位为流月命宫，用原盘宫干去四化，在此也给大家讲清，请自行在实践中去鉴别取舍。


    本派论流月的星情以博士十二星为主，再参以将前，岁前星中的少数几颗，再看流月的四化星、几者综合起来推判，主要用来推演流月发生的琐事，以及流年显象的事发生在哪个具体的月份。


    （问题二十九）：众多星入命或入其他十二宫，其吉凶以甲级、乙级星推排即可吗？丙丁、戊级星的影响程度如何？


    答：对于各宫的吉凶判定，主要用甲级、乙级星所构成的格局或星曜组合来推演，而丙、丁、戊级星几乎对其没有影响；就是推大限、流年的吉凶也是如此，一般不涉及丙至戊级星。丙、丁、戊级星主要用来推流月和流日。


    （问题三十）：没有格局的命如何论高低？


    答：这里的格局指的大概是狭义的格局，即古籍中明白标出的如：日月夹财、府相朝垣等等，如果命宫不能形成此类格局，则以命宫的雙星组合以及，三方四正的吉凶星照会情况来推论，也可分看财帛宫、官禄宫、迁移宫等来综合评定，六亲宫中，以父母宫看其出身，以夫妻宫看其助力等。然后再随着大限的推移来看运程的起伏，即可大致明了此人大概干何职业，贫富贵贱如何等等。这些东西很难靠理论去讲清楚。有一个长期实践，熟能生巧的过程。


    • 275 •


    [PAGE 276]


    「問題三十一」：何為法律之星和桃花之星的組合。


    紫微斗數的星曜中，屬於法律方面的星大致有巨門、擎羊、天刑、官符等；屬於桃花方面的星主要有貪狼、廉貞、咸池、大耗、天姚、紅鸞、天喜、文昌、文曲等等。兩類星曜同宮即為法律之星和桃花之星的組合，至于書中有關這方面的斷訣，須具體情況具體分析。


    「問題三十二」：如果廉貞化忌入父母宮，而父母宮有文昌星是否也有被化忌之說？


    答：這種說法不成立，四化星是依附主星而顯示主星不同性質的一種標誌，不能脫離主星而獨立存在，因此某星化忌不能說與它同宫的星都被化忌。對於化禄、化權、化科也遵循同樣的原則，只不過化禄主要指財禄喜慶，化權主要指地位的提升，化科主文章與聲名，化忌則主破耗與挫敗。


    「問題三十三」：生年化禄入官禄宮，但被冲破，是否表示事業没有成就？


    答：化禄被冲破一指會合化忌而言，而六煞星只減損其程度，不能算冲破。并且癸干的破軍化禄會合貪狼化忌屬特殊情況，也不能算冲破。凡官禄宮化禄被化忌冲破則指事業起伏大，但并非没有成就，其具體情况要配合限運流年的作用力來把握。另外，這種格局的命盤也指一生常有改變工作，甚至改行的情形發生。


    「問題三十四」：天刑為何又為醫療星？


    答：一般而言，開刑為法律星，也為宗教星的一顆，但其取象也為刀子、手術刀等鋒利的器具，所以也是醫療星，主要指外科中的動手術而言。凡天刑在原命或大限的疾厄宮、


    [PAGE 277]


    命宮、在被流年引動時，常有開刀動手術的情形發生。


    # 「問題三十五」：什么叫生年禄自化權、生年科自化忌等等。


    答：生年禄自化權是指生年禄坐落的宫位，其宫干又使该星化权。生年科自化忌是指生年化科坐落宫位的宫干又使该星化忌，其它照此推理。另外，还有一些术语，如科忌是指化科和化忌同宫（未必指同一星曜），简称科忌。禄权、权忌等等均与此相类似。


    # 「問題三十六」：《全書》p 三百四十四頁以后的附录中提到的「虚、贵、印、寿、异、天杖、异、毛、刃」等星是怎么回事？为什么《教程》中没有提到。


    答：上述部分讲的是与紫微斗数无关的另一种预测方法。即《详述》前言中所提到的「十八飞星」预测法，其自成一体系，所用也是虚星，但其排宫和推论方法完全不同。


    大家如有兴趣，可参有关书籍，兹不赘述。


    # 「問題三十一」：《斗数四化断诀》一百一十五頁『股票看天梁』，p 一百六十九頁又有『文曲——股票』之说，为何。


    答：现代斗数界以文曜和科星看股票，认为凡财帛宫三方四正见昌曲化科及其它化及科星属文书，与财结合起来则象意为靠文书有关的行为了求财，如出版发行、投稿、证券投资等，又须不见煞忌，方可凭此发财，否则则主文书面的失误或与文书有关的破财，尤以会合化忌为最凶。


    [PAGE 278]


    [注]: 天梁縱不化科也具科星的性質，因于梁代表風度、修養，外表文静、斯文、說話條條有理，天梁化科則其吉性更顯。


    [問題三十八]: 關於用紫微斗數預測期貨、股票、房地產的具體方法講一下。


    答：用斗數測期貨、股票，目前尚無定論，其關鍵在于起盤的方法問題。目前常用的起盤法有以下幾種：一、以每年股市開市的時間起盤；二、用《斗數宣微》中的拆字起盤占課法排盤；三、根據買入時間或問事時間隨機起盤。在排好命盤之后，根據財帛宮的强弱來分析其漲落趨勢。如果是長期投資，可用斗君法來按流月、流日推算。由于這方面的資料和經驗不多，所以請大家自己去探索總結。香港斗數界有人曾在幾年前用第一種方法在報紙上公開預測股市，但遭失敗。因此，讀者如果想把它作爲課題來研究未嘗不可，如果涉及的責任很大，則奉勸大家最好用其它占卜方法如六爻、大六壬等來預測，后者已有前人和今人總結出來的行之有效的成法可借鑒，準確率很高，可參考有關書籍。


    至于預測房地產，則以自己本身的命盤爲主，看大限及流年的田宅宮，兼看財帛宮。如果大限逢財星如天府、太陰、武曲等坐田宅宮又遇禄存和化禄拱照，則做房地產必可升值，具體的時間又須看流年田宅宮的引情況如何。


    [問題三十九]: 禄存在命宮有錢，但財帛宮逢空劫如何看呢？


    答：禄存在命宮主一生衣禄不缺。但禄存在命宮必爲羊陀所夾，要想富裕還須有其它條件的配合，首先必須命宮的主星廟旺，才主吉利，尤以主財的星爲佳。此時如果財帛


