  md: '波動性強的命難耐枯燥煩瑣的行政業務，多半在任職一段時日后跳出來自我開創，如此而已。好運來得很早，初出茅廬就是一步佳運，蓋甲辰大限結構壯觀，廉貞祿在事業宮內坐守，事業環境十分良好，無論上班、換業或者創業，都會順利成功。乙巳大限是壯年期，天機祿從卯沖酉，這個酉也是大限的事業官，繼續挺進，二十年事業吉運下來，必有彪炳業績。乙巳大限忌星太陰進入丑宮，乃大限財官也利事業經營而不利進財。


    命理學有個經驗法則——「發過不再發」，經歷一個高峰后，不可能再遇另一個高峰，此命早發，丙午以后便無運可走了。


