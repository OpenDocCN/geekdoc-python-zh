    # 「問題十七」：如何比較兩個宮位的強弱？


    答：紫微斗數中的十四顆主星根據會照的情形可分為兩組，即紫、武、廉、殺、破、狼、

    府、相為一組，巨、日、機、月、梁為一組。前一組的星曜決不可能在三方四正中會照到另一

    組，反之亦然。相對而言，第一組星曜坐守的宮位為強、第二組坐守的宮位為弱。其中又

    以紫武廉與殺破狼的雙星組合為最強，以命無正曜的宮位為最弱，機月同梁坐守的宮位次

    弱。


    在定盤十二宮中，以命宮為第一宮逆數，則奇數宮為陽宮，偶數宮為陰宮。凡陽宮的

    星曜強過陰宮則為我強他弱，反之則為他強我弱。例如條文中有「紫微居奴、為逢迎之

    人」，其原因何在？即是因為紫微為帝星乃是最強最尊的星曜，如果居奴僕宮，那麼我的社

    交關係中都是一些層次較高的人，和這些人能夠周旋在一起，那麼當然本身就成了逢迎之

    人了。再者，如機月同梁格的人宜從事輔助性的工作也是同樣的道理。兄友綸的星曜組

    合強過命宮，而本身又缺乏擔當責任的魄力，雖足智多謀也只能為他人之輔佐，人榮與榮、

    人辰與辱，至于其層次則看吉凶星的會照，加吉無煞也能富貴齊來。


