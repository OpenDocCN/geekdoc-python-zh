    在田宅宮，日月雙忌各在不同的宮位，請問它們各有什么作用？


    回先天是先天，后天是后天，基本結構屬於先天，行運則是后天的事，兩者的關係似即似離，又即又離，常會混淆。如何界定，端視作用而定，一般而言，后天脫離先天是自然而然的事，包括禄忌在内，譬如如此命，不再管破軍禄、貪狼忌，因此日月在甲乙四個運程中化忌，我們只考慮當時的宮位關係即可，不必理會那是先天何宫，不然問題會變得很復雜；唯有如此，才能看清運勢轉移的軌迹，斷出吉凶榮枯。


