    古籍指『武贪不发少年人』，正确的说法是『杀破狼不发少年人』，这种统计仍不够周延，若能扩充为『杀破狼加煞不发少年人』，那就更适当了；无煞则响往安定，缺乏冲激则不致颠沛流离，早发的机率反而很高。近来我们实验发现，仍要做一些修正：


    （一）杀破狼加煞（三颗以上），早遇吉运，仍会早发。


