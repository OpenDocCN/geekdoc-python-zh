    無助力；愛人的性格如何，有無刑克，能否白頭偕老，岳家家庭狀況如何；子女人數多寡，有無成就，帶刑克否；再看奴僕宮星曜組合，以斷定命主的人際社會關係，同事朋友間能否對自己有所幫助等等。另外，福德宮、遷移宮、財帛宮、官祿宮、田宅宮、疾厄宮也要一一詳查，以明被測者各方面的得失。


    # 四、接下來再看運程的起伏。


    在看運程之前，可先不理會原命盤上各宮所代表的具體意義，只看哪些宮位的三方四正能構成格局，哪些星曜組合，會呈現出某些吉凶顯象。如提升，出名以及各種凶傷疾病等等。儘管這些顯象在原命盤中與命宮無關。但在大限流年走到這些宮位時，則必然會出現與此相吻合的克應。但必須注意的是，大限的成就又受原盤命宮格局的制約，假如一個命宮格局不高的人，即使行到大紅大紫的大限。也決不會陡然成爲國家要員或者名商巨賈，只是相對本身來說，社會地位得到很大提高，或者個人財富的積累得到增加。另外還要細審大限的四化星以及各種吉凶星對這種格局或各種吉凶組合的發揮或損抑程度。以確定出一個大致定量的結果。


    # 六、在大限的總趨勢下，去看大限所轄的哪一個流年會發生大限所顯象的各種事類。


    以及流年，小限本身又會受四化及流曜的影響而出現哪些吉凶組合。如羊陀疊并、七殺重逢、雙祿夾輔、雙忌夾忌、合祿拱祿等具體情況（這些名詞的定義請參看后面的答疑內容）。這樣，對一個命盤的運程起伏就有了一個清楚的認識，達到一定的水平之后，還可斷出'
- md: '## 二、借星安宮原理：


    在紫微斗數的諸般法則中，有一個極為重要的內容，即借星安宮。在斗數十四大主星所構成的基本命盤中，除紫府同宮的組合之外，每一個命盤都有兩個到四個空缺的宮位。那么，這些宮位的性質究竟應該根據哪顆主星去確定呢？答案是：借對宮的星曜來評判。


    這時候這個宮位的吉凶就要依照借來的星曜再結合三方的情形來下斷語。如下圖所示即是紫貪星系中，申宮無主星坐守，借對宮機陰安命的情况。

    那么，這個宮位就與對宮的性質完全等同嗎？其差別主要表現在如下兩個方面：


    一、凡原盤命宮無正曜，均主其人行事不主動，易受處界環境的左右而隨波逐流，即通常所說的『沒有主見』。但并非說不能富貴，在有些情況下，也會構成三奇喜會等上乘格局，但其成功并非自成自立，多因人成事，當大限行抵這一宮位，謂之走弱運，多主意志消沉，上進心不强，若三方四正曜組合強勁，再得吉星照會，也可以有所作為，需視具體情况而定。


    二、原命盤如果命宮無正曜，還主六親中有一二缺陷。古人認為『命無正曜，二姓延生』指過房改姓，隨母繼拜或庶母所生等。但經實踐驗證，未必盡是如此。也有的只是父子分離，夫妻不能團圓等。總之，多少帶點孤克的味道。


    除了在原命盤和大限中命宮無正曜時，可借星安宮之外，凡在命盤中的任何一個宮位，如果碰到沒有主星坐守，都可以用這一法則。此外，利用借星安宮原理，還可以形成各種格局，如夾局等。

    例如：在《全書》對『夾貴夾祿少人知』的注解中有這樣一段話：『此格如甲生人，安命在子。廉貞化祿居亥，破軍化權居丑，是科、權、祿夾命、定主富貴。』這裡指的是如圖二所示的紫破星系中，天機在子宮命宮，亥宮無正曜，借巳宮廉貞貪狼安宮。甲年生人，得破軍化權、廉貞化祿分別在丑、亥夾命宮，即構成祿權夾命的貴格。


    ## 三、斗數中的五行生克：


    在一般門類的術數中，『五行生克』這一概念不可忽視，往往起着主導性的作用。而獨有紫微斗數于五行生克不大重視，即不以五行生克作為主要依據。但也並不是一點作用也沒有。如圖二在某些反格的成格條件里，五行生克起着畫龍點睛的作用。當然，這些情況不常碰到，下面舉例說明：


    例：《骨髓賦》中有一句賦文叫做『廉貞七殺，反為積福之人』，即是因為廉貞為火，七殺為金，得火制金，在有些官度能夠起到『化殺為權』的作用。


    《全書》認為：『貞居未、殺居午、身命遇之、反為積福』，這裡實際上指的是廉貞七殺居未同宮和七殺居午，廉貞居申兩種情形，以下分別說明：


    如圖三所示，屬老一種情況。廉貞火克七殺金，能解七殺之剛戾、化殺為權、屬貴格。

    那么二星居丑如何？答案是：不能成格。因丑為金庫，能邦七殺金而不利廉貞火，不比未為木庫、能生廉貞之火。增其克制之力，屬雄宿朝元格中的一局，多主武職顯貴。


    第二種情形即如圖四所示：七殺在午坐命宮，福德宫必為入廟的廉貞獨坐申宮，得火克金的制化，也為積福之人。那么七殺坐子，廉貞居寅為什麼不能成格呢？因為七殺坐子宫為水之旺鄉，廉貞火不能施其威權。所以這一格局僅僅包括上述兩種情形。


    五行生克還體現在其它一些少數格局中，起着點綴的作用。如火貪格最喜見武曲，因武曲為金，又是大財星、火星屬火、當武貪互見時必在四墓之地、有火生土、土生金的吉化作用，能够增强火貪格的吉象。所以火貪格以在丑未為正格，辰戌次之。當然，除此之外還有另一個原因即武貪二星在辰戌丑未入庫。當貪狼火星在其它的宫位同度時，也可稱為火貪格，只是力量小些。即使火貪二星只在三方會照也能呈現火貪格的性質，這就是格局的層次差異。


    ## 四、論疾厄宮：


    疾厄宮的含義是包括內在的疾病和外來的傷害。因此，既不宜煞忌會照，也不宜主星太旺。一般以天府、天相、天同、天梁等代表安閑、福壽的星坐守爲宜，故有府相同梁入廟于疾厄之說，主人一生少病痛而心境愉悅。

    至于疾厄宮逢不同的主星坐守所主的疾病，須詳察各星的賦性而定。《教程》老一冊及《斗數宣微》中『疾厄之判定』均有論述。另外，如限運流年之疾厄宮，命宮被羊刃、天刑冲破再煞忌，則有開刀動手術的徵兆，七殺破軍逢煞也有類似的情況，均不可等等閑視之。

    原命疾厄宮不見凶星同遍和會照。但在所行大限的宮干使該星化忌時，逢流年殺曜及化忌再冲時，也會同現病痛之症。所以對於疾厄宮的看法，除了流年命宮，疾厄宮之外，還要特別注意原命和大限的疾厄宮，綜合評判，方無疏漏。疾厄爲一生之至關重要的環節，盡管對升官發財没有絕對的妨礙。但設若人生身體健康，無病痛凶灾，盡管與財官無'
