    「昌食」這個惡格在學習過程中表示分心、不專心，心有旁鶩，無法貫徹，必須改善，成就才會高，因為成大事業者哪個不是獨沽一味，數十年於一業。


    □事業宮見廉貞，書上說廉貞是官禄主，化忌後不得做官（從事公職），它的五行屬火，不能做跟火有關的行業，才能逢凶化吉。做不做官是以后的事，但是理化實驗都要用到火，該如何調適，才能逢凶化吉。


