    # 七甲水田


    禄在父母宫可得祖产，田宅宫却被忌破，则是无祖产可得，这种主张岂非自相矛盾？


    其实命理没有那种推论法，不要误会。


    忌星侵入先天田宅，断定祖基无靠是可能的，这种人多半弃祖离家，往外发展，但是问题好像不会这么简单，因为一个人要不要外出，是可以选择的事，这里只隐约透露像你老兄这种人留在故乡宛如虎落平阳。


    就亲情缘分而言，煞星不入命宫三方，阻隔其间的关系，所以这是一个十分孤高而冷峻的命格。即使如此，禄在父母，暗示将把一生中最好的东西献给尊亲，考道是无穷尽的，即使早年因为家境穷困而疏于照顾，长大后也愿意赚钱奉养他们，善尽人子之实。


    □我到底能不能获得祖产？


    不知道。


    □为什么不知道？


    先天田宅象征祖居和祖基，前者具体，后者抽象，不论前后，都由许多人（所有的亲戚）共用，因此无法确切指出有无或多寡，其理甚明。


