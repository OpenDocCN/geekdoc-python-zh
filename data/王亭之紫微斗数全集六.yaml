    一九八四年甲子，流年命宫坐贪狼化禄的宫位，有火贪格的显象，但同时太阳化忌冲大限无主星坐守的财帛宫。该年眼看着做了几笔生意，满以为要『收复失地』，不料又在年底被人倒帐近千万元。这是因为大限的凶象牵制了流年的发展，纵会吉也无大发展，反时时倾败的危机。以后的年限因为没了有了命造本人的生活履历来对照，推论从略。


