- img_proc: true
  md: '過氣。雖然我想要往前走去，最後還是留在鞦韆上，輕緩地前後擺盪著。

    那道光穿透屋頂，彷彿也把整棟屋子給裹覆起來。接著，房子的外牆似乎消失了，我看見愛麗絲的爸爸躺在床上，妻子正試圖搖醒他。他的身體躺在那裏，事實上已魂不附體，他的神魂站在床尾，有兩個靈體陪伴著，他似乎認得他們。我並不認得那些靈體，但他們與愛麗絲爸爸的樣貌相似，所以我猜那是要來幫助他步上旅途的家人，此外還有許多天使在場。

    愛麗絲的爸爸在靈體和天使輕柔攙扶下，進入光中，他們在光內的天使圍繞下逐漸上升，天堂般的音樂和歌聲始終不曾間斷。她爸爸和兩個靈體停頓下來，他回頭朝下望了望。

    時間似乎為我停止。突然間，房子又重新回到我視野中，階梯也消失。愛麗絲的母親站在門口呼喊孩子。她的子女都在前院玩耍，我獨自一人坐在後院的鞦韆上。她朝著我的方向看來，但彷彿沒有看見我似的，轉身走出側門到前院去。我坐在那裏，知道愛麗絲和她的兄弟姊妹即將聽到一件噩耗。我感到孤獨悲傷，詢問了陪在我身旁的天使：「他會回來安慰他們嗎？就算只是一下下也好？尤其是愛麗絲，因為她那麼愛他，在他離家時那麼想念他。」「天使回答：「會的，他很快就會回來，陪他們一段時間。」這讓我安心些。我深吸一口氣，跳下鞦韆，跟天使說：「我現在要回家了。」

    離開時，我聽見窗裏傳來哭泣的聲音。我從側門離開，回家去。家裏沒有人，媽媽已經到對街去安慰愛麗絲的母親。

    那是年紀小小的我最傷心的一天，因為我一直以爲所有的爸爸媽媽會永遠活在世界上。'
