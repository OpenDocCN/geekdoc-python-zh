    「我很擔心讓你們看見屋內狀況有多差。這裏已經閒置很久，原本的屋主柯斯特洛老太太很久以前過世了。」她說。


    「沒關係的，伊麗莎白。」我說。我們一起察看各個房間。


    「我們很快就會把屋子整理好，努力洗刷、撕下壁紙、換掉地毯、清除舊家具，」喬四處張望著，「也許還能留下某些舊家具，餐桌看起來還堪用，那些手扶椅和斗櫃也還好。」


    事實上我們沒有家具，而且沒什麼錢可花，所以打算能留就留，也接收別人給我們的舊家具。


    「那些洗乾淨後就跟新的一樣了。」伊麗莎白說：「對了，我先生還能幫你們做些粗重的工作。」


    我們還來不及回應，她就衝出門去找她丈夫。我們笑了，因為伊麗莎白是位令人愉快的女士，我覺得她圓圓胖胖的模樣很可愛，而且有個美麗的笑容。她周圍的能量充滿許多愛與關心，是個高尚的人。


    她很快就跟一位高高瘦瘦的男人回來，他膚色蒼白，臉上有很深的皺紋，是一張充滿個性的臉。「哈囉，你好嗎？」他說。


    「這是我先生，約翰。」伊麗莎白將我們介紹給他認識，解釋我們不久將會結婚，並且搬進來。


    「喬，這裏要做的事可多了。有一大堆呢！」約翰說。


