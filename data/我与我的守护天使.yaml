    對，因此處在極大的壓力之中。上帝正在對你說，你不需要感到羞愧，站出來跟祂說話；要有信心，並且祈禱一切安然度過。


    我說完後，沒有人再發言。


    祈禱會中某些人有時會把手放在他人身上，和他們一起祈福，有時則是大聲禱告。強尼會詢問是否有人想接受他人的祈福，然後召喚願意為他人禱告者的名字。


    我並不是其中一員，始終不曾加入過，但那天情況有了變化，上帝另有打算。


    大家在室內四處走動談天喝茶時，有個修女朝我走來，我笑著對她打招呼。當時我並沒有想到她想找我一起禱告，但她開口了。


    「羅娜，妳願意和我一起禱告嗎？妳剛才所提的人是我，我需要透過妳和上帝說話。」


    我差點說不出話來。「好的，那當然，」我說，「不過不要在這裏，人太多，可以找其他地方獨處嗎？」


    「當然。」她說。我們來到走廊上，在隔三道門處找到一間空房。我們在裏面一起坐下，就只有我們兩人。她根本不知道我緊張得直發抖。「喔，天啊，妳在做什麼？」我不斷祈禱著。


    天使出現在我們四周，在我耳邊輕聲說：「上帝守護著妳，羅娜。」


    我為修女祈福，為所有能改變她生命的美好事物而感謝上帝。接著我對她說：「是妳和上帝談話的時候了。」


    她開始說話，而且持續一個小時，最後我們一起禱告。這期間，天使不時要我張開眼睛'
