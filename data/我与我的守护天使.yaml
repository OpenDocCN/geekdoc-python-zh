  md: '便消失；可是看著撒旦時，恐懼再度升起，甚至更爲強烈。

    我察覺到這是上帝對我的測試，要我展現出自己無畏於撒旦，展現出我比撒旦更堅強，而且能夠將他推離。上帝的存在碰了我的手，給予我推開撒旦所需的力量。於是我連續三次大聲說：「撒旦，走開，我選擇上帝而非你，我比你更堅強！」

    我每說一次，他就往後退一些，第三次時，他已經退到臥房外。接著，上帝把他推離到屋外、推到整個地區之外，彷彿推入一個漫長而黑暗的隧道，進入虛空。那一天，我向上帝證明我具有將撒旦推開的信心。

    撒旦確實存在，我對此毫無疑問。一旦允許撒旦進入我們的生活，他一定會出現。他會像「神」一樣，讓生命中出現許多極棒的事情，也許是財富，也許是外在的成功，但代價卻深刻無比。撒旦不希望我們的靈性持續成長，因此會妨礙所有願意幫助他人打開心胸、以不同角度看待世界的人。

    人類的靈性正在演化之中。這是人類演化的一部分，使身體和靈魂能夠結合，到最後達到身靈合一的境界。我看見人越來越不受制約，充滿疑問，而且更有探索靈性本質議題的意願。我們在生命中將面對上帝給予的測試，這是靈性成長的一部分。我們全都擁有將撒旦推開的能力，這是絕對不可忘記的事情。只要把撒旦推開，他就會往後退一步，別無選擇。不幸的是，他仍將存在，不過力量將會衰退。我們隨時能召喚上帝和天使來強健我們的手，強化我們的信念和信心。'
