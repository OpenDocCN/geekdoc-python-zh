  md: '開通往臥室的房門，喬隨即開口說小女孩又來了，喊他爸爸，要他陪她玩。


    這回我告訴喬上帝要為我們送來另一個女兒。喬難以置信。「上帝必須在我身上灌注許多生命力，才能讓我再生個孩子。這真的需要奇蹟！」


    但是不久之後，我發現自己懷孕了。


    一天我站在鏡子前，天使以一道金黃色光芒出現在我四周。接著，我看見自己腹中的生命能量旋轉著，散發出各種光芒，有翡翠藍、翡翠綠、翡翠紅和翡翠紫，光的漩渦張開時，我看見小寶寶像個發光的塵粒。這個景象使我對未出世的寶寶充滿愛與感動。


    自從生下露絲已經過了十二年，所以我得花些時間重新適應妊娠狀態。我早已把小寶寶需要的東西送人，天使得花很大功夫來幫忙，去對許多人耳語。小寶寶梅根出世時，我已經有了新生寶寶所需要的一切物品。我非常感謝天使的協助，也感謝所有傾聽天使說話的人。


    有時候，我能清楚感受到天使究竟有多努力。那年聖誕節，我們又非常拮据。聖誕節前的某一晚，我們坐在廚房吃晚餐，門口傳來敲門聲。克里斯多夫去開門，然後幫一位奇怪的人搬進一個大箱子。


    克里斯多夫介紹客人是學校的神父湯姆。神父說：「希望我沒有打擾到你們。學校家政課同意我把他們今年所有的聖誕節烘焙成品，送給梅努斯的某個家庭，我聽說你們應該用得上這些東西。聖誕節前夕，我還會送來一隻烤火雞和火腿。別擔心，課堂的學生沒人知道東西送到哪裏。這就是我隻身前來的原因。我早就希望克里斯多夫會在家，能幫我把箱子搬進來。」


