  md: '# 04

    為何躲著我？


    有一天，爸爸開了一輛美麗且閃閃發亮的紅色汽車回家，它看起來龐大無比，不過那可能是因為我還很小的關係。爸爸向朋友借了這輛車，因為我們要去度假，我生平的第一次假期！堆好行李後，爸媽和我們七個孩子全爬進車裏，要去拜訪位在一百九十公里外的克來爾郡蒙夏南（Mountshannon,
    County Clare）鄉下的祖母家。那段旅程似乎花了一整天時間，可是我每分每秒樂在其中，因為我好喜歡看著窗外的風景。爸爸偶爾停車讓大家下來透透氣，運氣好的話，我們還能吃到冰淇淋。


    這是我第一次見到祖父母，他們住在一家青年旅社裏，奶奶是管理員。至今我還記得抵達時的情景：爸爸駛進一座雄偉的大柵門，來到庭院後再穿越一個古老拱門，最後又經過另一個小拱門來到另一個庭院後，眼前隨即出現一棟龐大的老房子，四周還有許多由大石頭蓋成，模樣和房子一樣的車庫。奶奶後來告訴我那些是馬車房，很久以前用來安置馬匹和馬車。


    車停好後，我們跌跌撞撞下了車。我驚訝地看著老房子。爺爺的腿裝了一隻木製義肢，聽說那條腿是年輕時為愛爾蘭的自由而戰時失去的。爺爺奶奶並沒有錢，但是爺爺有一輛很'
