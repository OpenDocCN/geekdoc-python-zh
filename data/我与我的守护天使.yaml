- md: '從她的中心點散發出來。這股能量和那位女士本身的能量不同，令我十分著迷。多日後，媽媽提起那位女士就要生寶寶，我聽了露出笑容。


    同樣的，我也能看出人們是否生病，即使我不懂自己看見的是什麼。一道深色陰影環繞著人們的身體，就表示他們的血液出了問題。有時候某根骨頭會發出閃光，讓我看見骨頭有所損傷或變了形。儘管我無法用言語來解釋，卻本能知道他們的身體有狀況。


    一天，我跪坐在窗前，一個男人騎著黑色大腳踏車經過，後面載著他的小女兒。天使要我在父女通過面前時，緊盯著他們不放，不可把眼神移開。我沒問為什麼。還是孩子的我，天使說什麼我就做什麼，不曾質疑。但我知道他們要我幫助這對父女，所以他們行經窗前時，我已經在祈禱。我不知道會發生什麼事情，只是請求讓情況別太嚴重。


    父女通過屋前時，一切似乎慢了下來，就像影片的慢動作。他們騎在一輛要超車的雙層巴士旁，忽然間，小女孩發出驚叫，男人開始傾倒。但小女孩並未跌落腳踏車下，因為她的腳卡在輪輻之間。父親用顫抖的手，小心翼翼把女孩的腳從折彎的輪子裏抽出來，並把正在哭泣的女孩抱到我窗下的人行道上。女孩此時只是輕聲嗚咽，沒有尖聲驚叫。大人都跑去幫忙，媽媽也去了。我也飛奔下樓，到屋外去探視她的狀況。一如往常，誰也沒注意到我。小女孩的鞋掉了，腳底的皮掀開來，挫傷流血，但並沒有骨折。儘管如此，我還是請求上帝和天使來幫助她。


    即使才五、六歲，我就已經知道自己要扮演助人的角色，並且相信在父女通過時，因為自己不斷觀看和祈禱，才沒發生更悲慘的事情。她也可能摔到巴士底下，或在跌落時撞到頭部，幸好最後只是腳底受傷，其他一切安然，感謝上帝。在那之後，有許多時候我覺得自己被派去阻止事情發生，就算無法完全遏止，也要使情況不那麼悲慘。這是天使給我的訓練之一。我或許沒能好好學習學校的課程，跟天使學習卻毫無困難。


    有一回，我就用這份天賦幫助朋友的父親。住在街頭不遠處的喬西是我最好的朋友，我很喜歡她。她也與眾不同，她說話會結巴。事實上，她結巴得很厲害，不過我們一起玩時，結巴會完全消失，然而只要有人加入，就會再度出現。喬西有一頭又長又直的紅髮，一雙綠色眼睛，個子比我高，但非常纖瘦。她爸爸在街尾開了一家汽車修理廠，那可不是一般附帶加油站或現代的修車廠，而是在一個大院子裏堆滿撞毀的車子和零件，他總是告訴我們不能在那裏玩。不過走入柵欄的右邊有個小空地，後來他准許我們在那兒遊戲，但規定不可以進入院子其他地方。


    在一個陽光普照的星期天，我們穿上乾淨的衣服，一邊盡量別把衣服弄得太髒，一邊有說有笑在小空地上玩娃娃。我感覺天使一直跟我說話，要我注意聽，我以爲那是要我聽他們說話。但他們並非這個意思。最後，他們觸摸我，吸引我的注意。我靜下來聽，好像聽見了什麼，但又不確定，問喬西是否聽見，卻什麼也沒有，於是我們繼續玩。天使再度開口說：「注意聽！」我又聽了一次，接著有種奇怪的感覺，很難描述，彷彿自己進入另一個時空，頓失方向。我聽見喬西的父親從遠處傳來的細微求救聲，可是喬西什麼也沒聽到。


    大人嚴禁我們走近疊得高高的毀損車體堆，但我還是決定去看看，喬西跟在我身後。我跟著天使穿越車陣，還記得自己一路不斷說著：「請求上帝、請求天使，請讓她的爸爸平安無事！」


    我們找到了喬西的父親，一輛車子壓倒在他身上，到處血跡斑斑，不過他還活著。我記得自己跑去求救，喬西應該是留在原地。我不確定去了她家還是我家。大家都跑來幫忙，我們則被帶開，因為把車子抬起來時，我們不可以在現場，但我記得救護車來了，聖詹姆斯醫院就在同一條路上。後來他沒事，也康復了。


    我感謝上帝和天使讓他平安無事。天使又再度幫助我去救助了別人。


    如我所說，天使正在身旁幫助你，一旦你認知到他們的存在，將能感覺他們對你生命的影響。事實上，天使一直接觸你，想讓你察覺到他們，希望你知道生命不僅只是眼前所見的一切。我們在生命中並非孤軍奮戰。我們或許活在肉體內，但每個人都擁有能和上帝連結的靈魂。天使也和上帝有所連結，當我們呼叫上帝的名，就等於賦予天使力量。


    換句話說，我們透過賦予天使力量，給自己力量。上帝讓我們擁有自由意識，天使也不會逾矩。假使我們要他們走開，表明不需要幫忙，上帝和天使都會讓開，但他們不會撒手就走，而是在一旁等待。


    你是否有過這樣的經驗：打算去某個地方，然後直直往前走並沒有計畫左轉，可是內心深處卻覺得要左轉，結果沒做而事後懊悔不已？內心的聲音很可能是天使正在耳語，告訴你應該左轉。我們四周充滿未被看見且等著伸出援手的天使，但是他們需要我們開口請求，才能提供協助。透過請求，我們允許天使協助，也藉此更加強化我們和他們之間的連結。


    多年後的現在，我才察覺自己是天使和人類之間的通譯員，因此經常被召喚去說情。我雖扮演著特定的角色，不過每個人自己也擁有隨時請求天使協助的力量。


    我經常請求天使協助家人。成長過程中，我們家境並不好，我六歲時，媽媽已經生了三個孩子，兩個妹妹海倫和愛歐菲，還有弟弟巴利，家裏有五個孩子。媽媽常常生病住院，那個時候，兄弟姊妹就被分送到親戚家。


    四歲時，愛美爾和我第一次被送到瑪麗阿姨家。她和姨丈及三個孩子住在不遠處，雖然距離可能只有幾公里，對我而言卻像隔了一個世界。第一次見到他們的房子時，我以爲那是皇宮，跟我家比起來顯得龐大無比。屋內的一切是如此豪華、美麗，而且很溫暖，不像家裏那般潮濕冰冷，我還可以打赤腳在地毯上跑來跑去。用餐時間更是不可思議，美麗的桌上擺滿整組杯盤裝盛的食物。有太多食物可以選擇了，每一餐都是一場饗宴。有一天，他們問我是否想要一頓熱的早餐，有香腸、煎蛋、燻肉片、黑布丁、番茄和烤麵包，全都是給我一個人，我簡直不敢相信！不用像在家裏那樣分一半或大家一起吃。最棒的是浴室，我泡了一次水滿到澡盆邊的熱水澡，覺得自己真像個公主。


    這趟旅程讓我首度理解到家裏有多窮。


    還住在瑪麗阿姨家時，外公外婆來訪，我穿上最好的衣服，一件前面有刺繡的灰藍色洋裝，面對他們時我還是很羞怯。他們兩人很高大，猶如巨人一般。外婆還很胖，走路時得拄著柺杖，因為她幾年前曾經中風。


    媽媽精神不錯，天氣也晴朗時，我們會到鳳凰公園野餐，那是位於都柏林郊區很大一片的開放空間，裏面有鹿，還有各種奇妙的東西。公園離家大約三公里，走路就可以到達。七歲那年，某個星期天我們出發去野餐。爸爸推著腳踏車，後面載著野餐盒。媽媽推著娃娃車，裏面坐著弟弟巴利，愛美爾和我走路，妹妹海倫和愛歐菲時而走路，時而坐在娃娃車裏。


    我們的野餐是番茄、果醬麵包和鄰居庭院種的蘋果，爸爸還燒了水，泡熱甜茶給大家喝，那是一頓很棒的野餐。吃完午餐，我和姊妹們踢了一會兒足球後，就一個人跑到大樹那邊。我很喜歡在大樹間玩耍，有些樹（不見得是全部）的能量會把我拉向它們。那種癢癢的、神奇的感覺，像磁鐵一樣把我拉過去，感覺很美妙。我常跟樹群玩一個遊戲：我在樹群間跑來跑去，以防某棵樹的能量抓到我，如果被抓到，就得設法逃離。我可以一個人玩上好幾個小時。這天下午，姊妹們跑來問我在做什麼，我只是簡單回答說在玩。我懶得解釋，反正她們不會懂。


    大家到處跑，到傍晚也玩累了，迫不及待想回家吃晚餐。但是在轉進舊克爾麥罕路的轉角前，我就知道出事了。兩個非常大的天使朝我走來，從他們走路的姿態，可以看出發生了可怕的事情。他們走到我身邊，各伸出一隻手環抱著我，然後邊陪我們走回家，邊說我家的屋頂崩塌了。我震驚不已。


    到家時，看見一大片屋頂坍塌下來，簡直讓我嚇壞了，久久無法移開目光。爸爸企圖開門，可是打不開，他用肩膀去撞，落下許多塵土。屋內面目全非，只剩一片瓦礫殘骸。屋頂塌陷時，把天花板也給壓落。在我童稚的眼裏，屋子已經完全破碎，我不禁心想之後要睡在哪裏？我們爬過瓦礫堆，對小小的我來說，破碎的水泥和石塊實在是巨大無比。四處塵土飛揚，家具、玩具和媽媽的寶貝全成了碎片。我訝然看著爸媽從地上撿拾東西，企圖挽救物品。媽媽拾起一個有乳白色條紋的深色小牛奶罐說：「這是唯一還完整的東西。」


    牛奶罐是她結婚禮物中僅存的東西，她原本擁有的就不多，現在更是一無所有。至今我還記得她眼中的淚珠，我那時也跟著哭了，大家全部落淚，只有爸爸沒哭。他要我們別哭，一切都會沒事。爸媽設法清理一些東西。爸爸還把屋頂的一角撐起來，好讓我們能夠度過那一夜，可是屋裏還是很危險。我邊睡邊想我們的房子倒了，接下來該怎麼辦，要去哪裏呢？


    現在我們不僅無家可歸，爸爸也失去了維生的工具。


    ## 通往天堂的階梯


    謝天謝地，表姊娜蒂解救了我們。一、兩年前，才十六歲的她因為父母雙亡，繼承了一棟屋子，她自己也只是個大小孩，卻獨自一人住在大房子裏。我不清楚那是怎樣的安排，或者是否有付房租，總之我們搬到她坐落於都柏林北端巴里曼（Ballymun）的房子，那裏離舊克爾麥罕有好幾公里遠。


    剛開始，搬家讓我很沮喪，因爲我熱愛舊克爾麥罕區，可是抵達巴里曼，看見大庭院和大房間時，我就開心了起來。最重要的是房子很牢固，絕對不會倒塌。房子二樓有三個房間，還有室內廁所和澡盆，奢華極了。一樓後方有個面對庭院的美麗長形廚房，以及起居室和娜蒂的房間，那個房間原本可能是飯廳。


    這棟房子還有個神奇的庭院，我之後見到的其他庭院沒有一個比得上它，我們在此度過許多探險時光。院裏有一堆乾草，舉辦生日派對時，大人會把糖果藏在裏面。爸爸有時間就栽種各式各樣想像得到的蔬菜，包括我們最喜歡玩爆開遊戲的豌豆，他甚至還鋪設了一大片的草莓床。


    那時家中有五個小孩，弟弟巴利還是個嬰兒，在他和我之間還有兩個妹妹海倫和愛歐菲，當然還有姊姊愛美麗。我並不常和他們玩耍，大都只在生日派對或特殊活動時才一起遊戲，或許是興趣不同的關係，因為我用不同的眼光看世界。


    最初的生活有點寂寞，但我很快又交到朋友，認識了小女孩羅薩琳，她住在連接各家庭院的後圍牆另一側。那道牆和馬路一樣長，又寬又大，走在上面也很安全。爸爸搭了一座梯子讓我們能爬上牆，才不會磨損鞋子，我們就這樣從一家走到另一家，或者走到盡頭的田野裏。我非常喜歡那道牆，以及站在上面看到的一切事物。


    羅薩琳成了我的好朋友，她住在牆另一側隔了六家的一棟漂亮的大房子裏，我們利用那道牆往來拜訪彼此，很少繞道走大馬路。她也來自一個大家庭，不過兄弟姊妹有些已經長大離開家。我認識她的妹妹卡洛琳和大她八歲的哥哥麥克。羅薩琳又高又瘦，有一頭長直髮，是個非常有趣又很愛笑的女孩。我很喜歡跟她和她的家人在一起，事實上，我和他們相處的時間比和自己家人還長。


    印象中，羅薩琳的父親是德國人，非常壯碩，有一頭逐漸變灰的黑髮。他經常出門做生意，但在家的時候，對羅薩琳、她哥哥和妹妹，還有我都非常好。星期天他會給小孩買一口袋糖果，我也被算在裏面，我既高興又驕傲，因爲每件事都有我的份。儘管糖果袋裏也許只有七、八顆糖果，但每顆都好漂亮，所以我總是盡量慢慢吃，越慢越好。


    羅薩琳家每到星期天還有一個我很喜歡的活動，就是聽她媽媽念故事書。我們全部聚集到羅薩琳的房間，坐在床上，有時候只有羅薩琳、卡洛琳和我，有時候麥克或我的姊妹也會加入。羅薩琳的媽媽很會念故事書，全神貫注聽上一小時後，她便解散我們。有時候書太厚，故事太長，就得分成幾週來念。我最喜歡的故事之一是法蘭西斯·霍森·柏納（Frances
    Hodgson Burnett）所寫的《祕密花園》（A Secret Garden）。


    我們的庭院裏有個很大的木造鞦韆，爸爸修理過後能盪得很高，每次我都玩上好幾個小時。坐在鞦韆上時，天使教了我許多關於生活與生命的簡單課程。事實上，我人雖然在鞦韆上，神魂卻早已去了另一個世界，在那裏，天使們爲我展現各種美好而神奇的事物。


    當我獨自盪鞦韆時，天使有時會說：「羅娜，伸出妳的手，有東西給妳。」然後在我手上放一個微小的東西，小東西一觸碰到我的手掌，天使就把手收回去，掌心上於是出現一團光。光時而像個小星星，時而像朵小雛菊，沒多久即開始長大，發出亮黃色的光芒。接著，從掌心飄起，越升越高，越來越亮，把太陽也給半遮蔽了，讓我不眨眼睛直視太陽，也不覺得刺眼。最後我看見一幅極度美麗的景象反射回來，就像一面鏡子一樣，影像裏出現一張像人類的漂亮臉龐對著我微笑。


    第一次經歷這個景象時，天使告訴我那是天使皇后。他們用小朋友能懂的語言對我說話，讓我想起精靈的故事，知道皇后如同母親，就像媽媽是我家的皇后一樣。天使解釋說，這個人是天使皇后，是宇宙之母、萬物之母，是所有天使之母。突然間，環繞著這張臉的黃色光環爆炸成數不盡的小碎片，感覺像從太陽中散發出來的金黃色極光。


    多年來，天使經常爲我帶來這份禮物，我成年後亦然，尤其是在我需要信心的的時候。


    當然，搬到巴里曼也表示得去就讀新學校。我和三個姊妹念同一所男女合校的小型國民小學，走路要花半個多小時。姊姊和妹妹都搭公車，而我大部分時間寧願走路。上學途中，我必須走得很快、很急，否則遲到麻煩就大了，但放學路上我總是慢慢走。


    和學校同在一處的，還有位在中間的教堂，以及位於另一側的教會活動中心。學校只有三間教室，當然不夠用，所以教會活動中心也被用來當作兩間教室。第一年我就在活動中心上課，但兩間教室其實就在活動中心的兩端，中間並沒有隔牆。瓊斯先生是我的老師，他對我很不好，覺得我只是個笨蛋，班上有這樣的學生讓他很難受。


    有天早上，天使說學校將發生一件很特別的事，會讓我非常開心。一如往常，天使又說對了，那天發生的事情不僅當時令我十分開心，現在想起來也一樣愉快。那時我們正在學愛爾蘭語，瓊斯先生宣布要臨時小考，答對的人可以得到半克朗。題目是愛爾蘭語的「克蘭」（Crann）轉換成英語是什麼意思。他從教室右邊開始逐一問學生，我被安排獨自坐在教室左邊。他一個接一個問遍全班同學，就是沒有人知道答案。和平常一樣，他並沒有問我。我一個人坐在位置上，興奮到沒法乖乖坐好，因為我知道答案，好想跳起來對著他大聲喊出。天使費了很大力氣才讓我安坐在位置上，我興奮地懇求天使：「天使，要他看我這邊，拜託，請他問我。」


    「別擔心，羅娜，」他們說，「他會問妳的。」


    瓊斯先生對全班同學的表現感到震驚，不停呼喊：「快呀，你們是怎麼回事？這很簡單的！」每回想起他當時的表情，我都會笑出來，他的眼睛越睜越大，臉也越來越紅，整個人瞠目結舌。他問完最後一個孩子，仍然沒有問我就宣布：「看來沒有人贏得這半克朗。」


    荷賽司始終站在瓊斯先生的右邊，指著我的方向，不過瓊斯先生當然看不到他。我好想對荷賽司大喊，要他把瓊斯先生拉到我這邊來。這時全班同學鴉雀無聲。儘管有天使的保證，看來瓊斯先生最後還是不會來問我。他走向自己的桌子，全班仍然一片寂靜。突然間，荷賽司和瓊斯先生的守護天使一邊輕柔地挽起他的手臂，讓他轉身朝我的方向走來，一邊在他耳邊耳語。「我知道這根本是白費功夫，不過我還是問一下好了。」瓊斯先生說。


    他果真問了我，我則充滿自信，開心答道：「那是『樹』的意思。」


    瓊斯先生的臉當場垮下來，因為我說的是正確答案，全班同學全笑開了，並且大聲鼓掌，非常開心。現在他必須把那半克朗送給我，我永遠記得他把錢放到我手上，我對他說謝謝的那一刻。


    我之前從來不曾擁有過那麼多錢，整整半克朗！


    多數孩子一放學就衝回家，但我喜歡慢慢走，一邊跟天使玩耍。我可以花上幾個小時，沿著路旁的大堤岸走回家，這樣才能看著樹籬另一側的田野，還有路上大房子所在的土地。有時候，則是沿著堤岸和天使邊走邊跳，互開玩笑，暢懷大笑；有時候，他們會爲我展現各種東西，譬如往後撥開蔓生的草叢，讓我看見堤岸上黃蜂築巢的洞。由於拉開屏障的是天使，不會干擾到黃蜂，所以我站在那裏看上好長一段時間，也不用擔心被螫到。記得我後來再回去看黃蜂巢，卻發現大人已找到黃蜂，把牠們給毒死了，心裏很悲傷。


    天使也經常爲我展現堤岸外田野裏的牛群。他們教我以不同的方式觀看事物，所以我會看見牠所有一切，包括身上的每根線條和每個起伏。天使讓細節發光或比平常更顯眼，這樣我才能真正注意到。他們還讓我看進牛的眼底，即使牠們在遙遠的另一端，我也能夠深入牠們的眼底。他們讓我看見一般人永遠看不見的事物，那一切真的非常迷人。進出牛體內和環繞其身邊的光和能量，有時宛如光球在牛的四周跳動，有時又忽隱忽現。我看得見母牛肚子裏的小牛，但有時很難辨認，這時天使便會說再看仔細一點，我就看出來了。老實說，小牛有時候就像一團黏呼呼的東西，還會動，有點像媽媽以前常做的果醬。


    我非常著迷於天使在課外時間展現給我看的東西，難怪沒時間理睬課堂上的事。天使對仍是孩子的我解釋事物時，我總認爲自己懂了他們的意思，但隨著年紀增長，我才進一步真正領會到他們要表達的含意。


    在學校，我有個名叫瑪麗安的朋友，我從未和她在校外私下見面。每當我們離開活動中心，走路到校舍或教堂時，她都堅持走在我身邊，就算老師把她和別的女孩排在一起，她還是設法溜回來，而且總有問題要問我。她很好奇我怎麼懂得那麼多，但我不能告訴她我有天使老師。有一天，我們穿越遊樂場走向教堂時，她要告訴我她關於上帝的事情，我驚訝得差點喘不過氣來。我看著她，不知該說些什麼，最後說：「老師和神父都教過我們上帝的事，妳爲什麼還要問我？」我只想要躲避問題，但她堅持說：「我就是想要妳告訴我。」


    於是我告訴她關於上帝的事。「妳看見那隻雀鳥了嗎？那隻全身金、黃、藍的漂亮雀鳥嗎？那隻鳥就像上帝一樣。仔細看那隻鳥，多麼漂亮而完美。妳就像那隻鳥，非常美麗，因為妳就像上帝一樣。假使那隻鳥掉下來摔傷了，也不會感受到所有的痛，因為上帝替牠承受百分之九十九的痛。上帝感受到發生在每隻鳥身上的一切，對我們也是一樣。當我們受到傷害，感受到的痛只是極小部分，上帝為我們承受了其餘部分，並且把疼痛帶走。」


    我知道這些並非我的言語，我還太小，沒法說出這麼有智慧的話。話是上帝或天使讓我說的，幫助我為瑪麗安解釋關於上帝的事。


    我非常熱愛教堂，偶爾上學遲到就是因為先溜到教堂去了。我喜歡溜進教堂，雖然裏面經常空蕩蕩沒有人影，卻充滿天使。有時或許只有幾個人，天使們卻總是鬧哄哄，一片忙碌景象。人們並不知道教堂裏究竟有多少天使。天使在那裏讚美上帝，等待神的人民前來加入他們，可惜往往空等。星期天望彌撒時，教堂裏更是擠滿天使，有每個人的守護天使，和神父一起站在聖壇上的天使，還有更多是上帝派遣來的。教堂是個非常有力量的地方，有時我能看見教堂裏的人身邊圍滿天使和光芒，就會為他們祈禱：「願那人今天能夠聽見天使的話，能夠與他的天使接觸，並透過天使和上帝接觸。」


    世界上並非只有基督教堂才有天使，猶太教堂、回教清真寺和所有神聖的地方都有天使的存在。不論你信仰什麼，對天使來說都一樣。他們告訴我所有的神聖殿堂應該處在同一屋簷下，回教、猶太教、新教、印度教、天主教和其他各種宗教信仰都是萬教同源。或許我們看起來不一樣，或許我們擁有不同的信念，但是我們都有靈魂，回教徒的靈魂和基督教徒的靈魂並無不同。假使能看見彼此的靈魂，就不會因為對上帝的詮釋不同而相互殘害。


    有一天，我和阿姨經過她家附近一間教堂，教堂門口站著兩位非常美麗的天使，阿姨轉身對我說：「眼睛不要掃視那間教堂。」我驚訝地望著她，阿姨繼續說：「那是新教的教堂，妳禁止走進任何新教教堂的門。」我回頭看了看進入教堂的人，覺得他們和我們沒有兩樣。下次我又經過那間教堂時，對門口的天使笑了笑。雖然我不可以進入那間教堂，但我知道裏面充滿了天使。


    鄰居莫塔太太是個容貌姣好、身材曼妙的女士，卻經常對走在圍牆上的我們破口大罵。偶爾，她會請我當她孩子的臨時保母。八歲那年，有個午後，她想到我家和媽媽喝杯茶，所以請我去看著她的孩子。就在我走進她家時，有位天使出現在我面前說：「妳到那裏後，要非常小心。」


    我立刻害怕起來，但還是走進她家廚房，只是腳步躊躇。莫塔太太正準備離開，爐子上有個鍋子煮得沸騰。我問她：「要讓它繼續煮嗎？」


    「是的，這會非常美味。」


    「妳不打算熄火嗎？」


    她根本聽不進去，她是那種若不照著她的話做，就會大發雷霆的女人。廚房裏有兩個孩子，一個才剛學會走路，一個是還躺在大娃娃車內的嬰兒。她一離開，我就開始觀察廚房，'
  mdcn: '從她的中心點散發出來。這股能量和那位女士本身的能量不同，令我十分著迷。多日後，媽媽提起那位女士就要生寶寶，我聽了露出笑容。


    同樣的，我也能看出人們是否生病，即使我不懂自己看見的是什麼。一道深色陰影環繞著人們的身體，就表示他們的血液出了問題。有時候某根骨頭會發出閃光，讓我看見骨頭有所損傷或變了形。儘管我無法用言語來解釋，卻本能知道他們的身體有狀況。


    一天，我跪坐在窗前，一個男人騎著黑色大腳踏車經過，後面載著他的小女兒。天使要我在父女通過面前時，緊盯著他們不放，不可把眼神移開。我沒問為什麼。還是孩子的我，天使說什麼我就做什麼，不曾質疑。但我知道他們要我幫助這對父女，所以他們行經窗前時，我已經在祈禱。我不知道會發生什麼事情，只是請求讓情況別太嚴重。


    父女通過屋前時，一切似乎慢了下來，就像影片的慢動作。他們騎在一輛要超車的雙層巴士旁，忽然間，小女孩發出驚叫，男人開始傾倒。但小女孩並未跌落腳踏車下，因為她的腳卡在輪輻之間。父親用顫抖的手，小心翼翼把女孩的腳從折彎的輪子裏抽出來，並把正在哭泣的女孩抱到我窗下的人行道上。女孩此時只是輕聲嗚咽，沒有尖聲驚叫。大人都跑去幫忙，媽媽也去了。我也飛奔下樓，到屋外去探視她的狀況。一如往常，誰也沒注意到我。小女孩的鞋掉了，腳底的皮掀開來，挫傷流血，但並沒有骨折。儘管如此，我還是請求上帝和天使來幫助她。


    即使才五、六歲，我就已經知道自己要扮演助人的角色，並且相信在父女通過時，因為自己不斷觀看和祈禱，才沒發生更悲慘的事情。她也可能摔到巴士底下，或在跌落時撞到頭部，幸好最後只是腳底受傷，其他一切安然，感謝上帝。在那之後，有許多時候我覺得自己被派去阻止事情發生，就算無法完全遏止，也要使情況不那麼悲慘。這是天使給我的訓練之一。我或許沒能好好學習學校的課程，跟天使學習卻毫無困難。


    有一回，我就用這份天賦幫助朋友的父親。住在街頭不遠處的喬西是我最好的朋友，我很喜歡她。她也與眾不同，她說話會結巴。事實上，她結巴得很厲害，不過我們一起玩時，結巴會完全消失，然而只要有人加入，就會再度出現。喬西有一頭又長又直的紅髮，一雙綠色眼睛，個子比我高，但非常纖瘦。她爸爸在街尾開了一家汽車修理廠，那可不是一般附帶加油站或現代的修車廠，而是在一個大院子裏堆滿撞毀的車子和零件，他總是告訴我們不能在那裏玩。不過走入柵欄的右邊有個小空地，後來他准許我們在那兒遊戲，但規定不可以進入院子其他地方。


    在一個陽光普照的星期天，我們穿上乾淨的衣服，一邊盡量別把衣服弄得太髒，一邊有說有笑在小空地上玩娃娃。我感覺天使一直跟我說話，要我注意聽，我以爲那是要我聽他們說話。但他們並非這個意思。最後，他們觸摸我，吸引我的注意。我靜下來聽，好像聽見了什麼，但又不確定，問喬西是否聽見，卻什麼也沒有，於是我們繼續玩。天使再度開口說：「注意聽！」我又聽了一次，接著有種奇怪的感覺，很難描述，彷彿自己進入另一個時空，頓失方向。我聽見喬西的父親從遠處傳來的細微求救聲，可是喬西什麼也沒聽到。


    大人嚴禁我們走近疊得高高的毀損車體堆，但我還是決定去看看，喬西跟在我身後。我跟著天使穿越車陣，還記得自己一路不斷說著：「請求上帝、請求天使，請讓她的爸爸平安無事！」


    我們找到了喬西的父親，一輛車子壓倒在他身上，到處血跡斑斑，不過他還活著。我記得自己跑去求救，喬西應該是留在原地。我不確定去了她家還是我家。大家都跑來幫忙，我們則被帶開，因為把車子抬起來時，我們不可以在現場，但我記得救護車來了，聖詹姆斯醫院就在同一條路上。後來他沒事，也康復了。


    我感謝上帝和天使讓他平安無事。天使又再度幫助我去救助了別人。


    如我所說，天使正在身旁幫助你，一旦你認知到他們的存在，將能感覺他們對你生命的影響。事實上，天使一直接觸你，想讓你察覺到他們，希望你知道生命不僅只是眼前所見的一切。我們在生命中並非孤軍奮戰。我們或許活在肉體內，但每個人都擁有能和上帝連結的靈魂。天使也和上帝有所連結，當我們呼叫上帝的名，就等於賦予天使力量。


    換句話說，我們透過賦予天使力量，給自己力量。上帝讓我們擁有自由意識，天使也不會逾矩。假使我們要他們走開，表明不需要幫忙，上帝和天使都會讓開，但他們不會撒手就走，而是在一旁等待。


    你是否有過這樣的經驗：打算去某個地方，然後直直往前走並沒有計畫左轉，可是內心深處卻覺得要左轉，結果沒做而事後懊悔不已？內心的聲音很可能是天使正在耳語，告訴你應該左轉。我們四周充滿未被看見且等著伸出援手的天使，但是他們需要我們開口請求，才能提供協助。透過請求，我們允許天使協助，也藉此更加強化我們和他們之間的連結。


    多年後的現在，我才察覺自己是天使和人類之間的通譯員，因此經常被召喚去說情。我雖扮演著特定的角色，不過每個人自己也擁有隨時請求天使協助的力量。


    我經常請求天使協助家人。成長過程中，我們家境並不好，我六歲時，媽媽已經生了三個孩子，兩個妹妹海倫和愛歐菲，還有弟弟巴利，家裏有五個孩子。媽媽常常生病住院，那個時候，兄弟姊妹就被分送到親戚家。


    四歲時，愛美爾和我第一次被送到瑪麗阿姨家。她和姨丈及三個孩子住在不遠處，雖然距離可能只有幾公里，對我而言卻像隔了一個世界。第一次見到他們的房子時，我以爲那是皇宮，跟我家比起來顯得龐大無比。屋內的一切是如此豪華、美麗，而且很溫暖，不像家裏那般潮濕冰冷，我還可以打赤腳在地毯上跑來跑去。用餐時間更是不可思議，美麗的桌上擺滿整組杯盤裝盛的食物。有太多食物可以選擇了，每一餐都是一場饗宴。有一天，他們問我是否想要一頓熱的早餐，有香腸、煎蛋、燻肉片、黑布丁、番茄和烤麵包，全都是給我一個人，我簡直不敢相信！不用像在家裏那樣分一半或大家一起吃。最棒的是浴室，我泡了一次水滿到澡盆邊的熱水澡，覺得自己真像個公主。


    這趟旅程讓我首度理解到家裏有多窮。


    還住在瑪麗阿姨家時，外公外婆來訪，我穿上最好的衣服，一件前面有刺繡的灰藍色洋裝，面對他們時我還是很羞怯。他們兩人很高大，猶如巨人一般。外婆還很胖，走路時得拄著柺杖，因為她幾年前曾經中風。


    媽媽精神不錯，天氣也晴朗時，我們會到鳳凰公園野餐，那是位於都柏林郊區很大一片的開放空間，裏面有鹿，還有各種奇妙的東西。公園離家大約三公里，走路就可以到達。七歲那年，某個星期天我們出發去野餐。爸爸推著腳踏車，後面載著野餐盒。媽媽推著娃娃車，裏面坐著弟弟巴利，愛美爾和我走路，妹妹海倫和愛歐菲時而走路，時而坐在娃娃車裏。


    我們的野餐是番茄、果醬麵包和鄰居庭院種的蘋果，爸爸還燒了水，泡熱甜茶給大家喝，那是一頓很棒的野餐。吃完午餐，我和姊妹們踢了一會兒足球後，就一個人跑到大樹那邊。我很喜歡在大樹間玩耍，有些樹（不見得是全部）的能量會把我拉向它們。那種癢癢的、神奇的感覺，像磁鐵一樣把我拉過去，感覺很美妙。我常跟樹群玩一個遊戲：我在樹群間跑來跑去，以防某棵樹的能量抓到我，如果被抓到，就得設法逃離。我可以一個人玩上好幾個小時。這天下午，姊妹們跑來問我在做什麼，我只是簡單回答說在玩。我懶得解釋，反正她們不會懂。


    大家到處跑，到傍晚也玩累了，迫不及待想回家吃晚餐。但是在轉進舊克爾麥罕路的轉角前，我就知道出事了。兩個非常大的天使朝我走來，從他們走路的姿態，可以看出發生了可怕的事情。他們走到我身邊，各伸出一隻手環抱著我，然後邊陪我們走回家，邊說我家的屋頂崩塌了。我震驚不已。


    到家時，看見一大片屋頂坍塌下來，簡直讓我嚇壞了，久久無法移開目光。爸爸企圖開門，可是打不開，他用肩膀去撞，落下許多塵土。屋內面目全非，只剩一片瓦礫殘骸。屋頂塌陷時，把天花板也給壓落。在我童稚的眼裏，屋子已經完全破碎，我不禁心想之後要睡在哪裏？我們爬過瓦礫堆，對小小的我來說，破碎的水泥和石塊實在是巨大無比。四處塵土飛揚，家具、玩具和媽媽的寶貝全成了碎片。我訝然看著爸媽從地上撿拾東西，企圖挽救物品。媽媽拾起一個有乳白色條紋的深色小牛奶罐說：「這是唯一還完整的東西。」


    牛奶罐是她結婚禮物中僅存的東西，她原本擁有的就不多，現在更是一無所有。至今我還記得她眼中的淚珠，我那時也跟著哭了，大家全部落淚，只有爸爸沒哭。他要我們別哭，一切都會沒事。爸媽設法清理一些東西。爸爸還把屋頂的一角撐起來，好讓我們能夠度過那一夜，可是屋裏還是很危險。我邊睡邊想我們的房子倒了，接下來該怎麼辦，要去哪裏呢？


    現在我們不僅無家可歸，爸爸也失去了維生的工具。


    ## 通往天堂的階梯


    謝天謝地，表姊娜蒂解救了我們。一、兩年前，才十六歲的她因為父母雙亡，繼承了一棟屋子，她自己也只是個大小孩，卻獨自一人住在大房子裏。我不清楚那是怎樣的安排，或者是否有付房租，總之我們搬到她坐落於都柏林北端巴里曼（Ballymun）的房子，那裏離舊克爾麥罕有好幾公里遠。


    剛開始，搬家讓我很沮喪，因爲我熱愛舊克爾麥罕區，可是抵達巴里曼，看見大庭院和大房間時，我就開心了起來。最重要的是房子很牢固，絕對不會倒塌。房子二樓有三個房間，還有室內廁所和澡盆，奢華極了。一樓後方有個面對庭院的美麗長形廚房，以及起居室和娜蒂的房間，那個房間原本可能是飯廳。


    這棟房子還有個神奇的庭院，我之後見到的其他庭院沒有一個比得上它，我們在此度過許多探險時光。院裏有一堆乾草，舉辦生日派對時，大人會把糖果藏在裏面。爸爸有時間就栽種各式各樣想像得到的蔬菜，包括我們最喜歡玩爆開遊戲的豌豆，他甚至還鋪設了一大片的草莓床。


    那時家中有五個小孩，弟弟巴利還是個嬰兒，在他和我之間還有兩個妹妹海倫和愛歐菲，當然還有姊姊愛美麗。我並不常和他們玩耍，大都只在生日派對或特殊活動時才一起遊戲，或許是興趣不同的關係，因為我用不同的眼光看世界。


    最初的生活有點寂寞，但我很快又交到朋友，認識了小女孩羅薩琳，她住在連接各家庭院的後圍牆另一側。那道牆和馬路一樣長，又寬又大，走在上面也很安全。爸爸搭了一座梯子讓我們能爬上牆，才不會磨損鞋子，我們就這樣從一家走到另一家，或者走到盡頭的田野裏。我非常喜歡那道牆，以及站在上面看到的一切事物。


    羅薩琳成了我的好朋友，她住在牆另一側隔了六家的一棟漂亮的大房子裏，我們利用那道牆往來拜訪彼此，很少繞道走大馬路。她也來自一個大家庭，不過兄弟姊妹有些已經長大離開家。我認識她的妹妹卡洛琳和大她八歲的哥哥麥克。羅薩琳又高又瘦，有一頭長直髮，是個非常有趣又很愛笑的女孩。我很喜歡跟她和她的家人在一起，事實上，我和他們相處的時間比和自己家人還長。


    印象中，羅薩琳的父親是德國人，非常壯碩，有一頭逐漸變灰的黑髮。他經常出門做生意，但在家的時候，對羅薩琳、她哥哥和妹妹，還有我都非常好。星期天他會給小孩買一口袋糖果，我也被算在裏面，我既高興又驕傲，因爲每件事都有我的份。儘管糖果袋裏也許只有七、八顆糖果，但每顆都好漂亮，所以我總是盡量慢慢吃，越慢越好。


    羅薩琳家每到星期天還有一個我很喜歡的活動，就是聽她媽媽念故事書。我們全部聚集到羅薩琳的房間，坐在床上，有時候只有羅薩琳、卡洛琳和我，有時候麥克或我的姊妹也會加入。羅薩琳的媽媽很會念故事書，全神貫注聽上一小時後，她便解散我們。有時候書太厚，故事太長，就得分成幾週來念。我最喜歡的故事之一是法蘭西斯·霍森·柏納（Frances
    Hodgson Burnett）所寫的《祕密花園》（A Secret Garden）。


    我們的庭院裏有個很大的木造鞦韆，爸爸修理過後能盪得很高，每次我都玩上好幾個小時。坐在鞦韆上時，天使教了我許多關於生活與生命的簡單課程。事實上，我人雖然在鞦韆上，神魂卻早已去了另一個世界，在那裏，天使們爲我展現各種美好而神奇的事物。


    當我獨自盪鞦韆時，天使有時會說：「羅娜，伸出妳的手，有東西給妳。」然後在我手上放一個微小的東西，小東西一觸碰到我的手掌，天使就把手收回去，掌心上於是出現一團光。光時而像個小星星，時而像朵小雛菊，沒多久即開始長大，發出亮黃色的光芒。接著，從掌心飄起，越升越高，越來越亮，把太陽也給半遮蔽了，讓我不眨眼睛直視太陽，也不覺得刺眼。最後我看見一幅極度美麗的景象反射回來，就像一面鏡子一樣，影像裏出現一張像人類的漂亮臉龐對著我微笑。


    第一次經歷這個景象時，天使告訴我那是天使皇后。他們用小朋友能懂的語言對我說話，讓我想起精靈的故事，知道皇后如同母親，就像媽媽是我家的皇后一樣。天使解釋說，這個人是天使皇后，是宇宙之母、萬物之母，是所有天使之母。突然間，環繞著這張臉的黃色光環爆炸成數不盡的小碎片，感覺像從太陽中散發出來的金黃色極光。


    多年來，天使經常爲我帶來這份禮物，我成年後亦然，尤其是在我需要信心的的時候。


    當然，搬到巴里曼也表示得去就讀新學校。我和三個姊妹念同一所男女合校的小型國民小學，走路要花半個多小時。姊姊和妹妹都搭公車，而我大部分時間寧願走路。上學途中，我必須走得很快、很急，否則遲到麻煩就大了，但放學路上我總是慢慢走。


    和學校同在一處的，還有位在中間的教堂，以及位於另一側的教會活動中心。學校只有三間教室，當然不夠用，所以教會活動中心也被用來當作兩間教室。第一年我就在活動中心上課，但兩間教室其實就在活動中心的兩端，中間並沒有隔牆。瓊斯先生是我的老師，他對我很不好，覺得我只是個笨蛋，班上有這樣的學生讓他很難受。


    有天早上，天使說學校將發生一件很特別的事，會讓我非常開心。一如往常，天使又說對了，那天發生的事情不僅當時令我十分開心，現在想起來也一樣愉快。那時我們正在學愛爾蘭語，瓊斯先生宣布要臨時小考，答對的人可以得到半克朗。題目是愛爾蘭語的「克蘭」（Crann）轉換成英語是什麼意思。他從教室右邊開始逐一問學生，我被安排獨自坐在教室左邊。他一個接一個問遍全班同學，就是沒有人知道答案。和平常一樣，他並沒有問我。我一個人坐在位置上，興奮到沒法乖乖坐好，因為我知道答案，好想跳起來對著他大聲喊出。天使費了很大力氣才讓我安坐在位置上，我興奮地懇求天使：「天使，要他看我這邊，拜託，請他問我。」


    「別擔心，羅娜，」他們說，「他會問妳的。」


    瓊斯先生對全班同學的表現感到震驚，不停呼喊：「快呀，你們是怎麼回事？這很簡單的！」每回想起他當時的表情，我都會笑出來，他的眼睛越睜越大，臉也越來越紅，整個人瞠目結舌。他問完最後一個孩子，仍然沒有問我就宣布：「看來沒有人贏得這半克朗。」


    荷賽司始終站在瓊斯先生的右邊，指著我的方向，不過瓊斯先生當然看不到他。我好想對荷賽司大喊，要他把瓊斯先生拉到我這邊來。這時全班同學鴉雀無聲。儘管有天使的保證，看來瓊斯先生最後還是不會來問我。他走向自己的桌子，全班仍然一片寂靜。突然間，荷賽司和瓊斯先生的守護天使一邊輕柔地挽起他的手臂，讓他轉身朝我的方向走來，一邊在他耳邊耳語。「我知道這根本是白費功夫，不過我還是問一下好了。」瓊斯先生說。


    他果真問了我，我則充滿自信，開心答道：「那是『樹』的意思。」


    瓊斯先生的臉當場垮下來，因為我說的是正確答案，全班同學全笑開了，並且大聲鼓掌，非常開心。現在他必須把那半克朗送給我，我永遠記得他把錢放到我手上，我對他說謝謝的那一刻。


    我之前從來不曾擁有過那麼多錢，整整半克朗！


    多數孩子一放學就衝回家，但我喜歡慢慢走，一邊跟天使玩耍。我可以花上幾個小時，沿著路旁的大堤岸走回家，這樣才能看著樹籬另一側的田野，還有路上大房子所在的土地。有時候，則是沿著堤岸和天使邊走邊跳，互開玩笑，暢懷大笑；有時候，他們會爲我展現各種東西，譬如往後撥開蔓生的草叢，讓我看見堤岸上黃蜂築巢的洞。由於拉開屏障的是天使，不會干擾到黃蜂，所以我站在那裏看上好長一段時間，也不用擔心被螫到。記得我後來再回去看黃蜂巢，卻發現大人已找到黃蜂，把牠們給毒死了，心裏很悲傷。


    天使也經常爲我展現堤岸外田野裏的牛群。他們教我以不同的方式觀看事物，所以我會看見牠所有一切，包括身上的每根線條和每個起伏。天使讓細節發光或比平常更顯眼，這樣我才能真正注意到。他們還讓我看進牛的眼底，即使牠們在遙遠的另一端，我也能夠深入牠們的眼底。他們讓我看見一般人永遠看不見的事物，那一切真的非常迷人。進出牛體內和環繞其身邊的光和能量，有時宛如光球在牛的四周跳動，有時又忽隱忽現。我看得見母牛肚子裏的小牛，但有時很難辨認，這時天使便會說再看仔細一點，我就看出來了。老實說，小牛有時候就像一團黏呼呼的東西，還會動，有點像媽媽以前常做的果醬。


    我非常著迷於天使在課外時間展現給我看的東西，難怪沒時間理睬課堂上的事。天使對仍是孩子的我解釋事物時，我總認爲自己懂了他們的意思，但隨著年紀增長，我才進一步真正領會到他們要表達的含意。


    在學校，我有個名叫瑪麗安的朋友，我從未和她在校外私下見面。每當我們離開活動中心，走路到校舍或教堂時，她都堅持走在我身邊，就算老師把她和別的女孩排在一起，她還是設法溜回來，而且總有問題要問我。她很好奇我怎麼懂得那麼多，但我不能告訴她我有天使老師。有一天，我們穿越遊樂場走向教堂時，她要告訴我她關於上帝的事情，我驚訝得差點喘不過氣來。我看著她，不知該說些什麼，最後說：「老師和神父都教過我們上帝的事，妳爲什麼還要問我？」我只想要躲避問題，但她堅持說：「我就是想要妳告訴我。」


    於是我告訴她關於上帝的事。「妳看見那隻雀鳥了嗎？那隻全身金、黃、藍的漂亮雀鳥嗎？那隻鳥就像上帝一樣。仔細看那隻鳥，多麼漂亮而完美。妳就像那隻鳥，非常美麗，因為妳就像上帝一樣。假使那隻鳥掉下來摔傷了，也不會感受到所有的痛，因為上帝替牠承受百分之九十九的痛。上帝感受到發生在每隻鳥身上的一切，對我們也是一樣。當我們受到傷害，感受到的痛只是極小部分，上帝為我們承受了其餘部分，並且把疼痛帶走。」


    我知道這些並非我的言語，我還太小，沒法說出這麼有智慧的話。話是上帝或天使讓我說的，幫助我為瑪麗安解釋關於上帝的事。


    我非常熱愛教堂，偶爾上學遲到就是因為先溜到教堂去了。我喜歡溜進教堂，雖然裏面經常空蕩蕩沒有人影，卻充滿天使。有時或許只有幾個人，天使們卻總是鬧哄哄，一片忙碌景象。人們並不知道教堂裏究竟有多少天使。天使在那裏讚美上帝，等待神的人民前來加入他們，可惜往往空等。星期天望彌撒時，教堂裏更是擠滿天使，有每個人的守護天使，和神父一起站在聖壇上的天使，還有更多是上帝派遣來的。教堂是個非常有力量的地方，有時我能看見教堂裏的人身邊圍滿天使和光芒，就會為他們祈禱：「願那人今天能夠聽見天使的話，能夠與他的天使接觸，並透過天使和上帝接觸。」


    世界上並非只有基督教堂才有天使，猶太教堂、回教清真寺和所有神聖的地方都有天使的存在。不論你信仰什麼，對天使來說都一樣。他們告訴我所有的神聖殿堂應該處在同一屋簷下，回教、猶太教、新教、印度教、天主教和其他各種宗教信仰都是萬教同源。或許我們看起來不一樣，或許我們擁有不同的信念，但是我們都有靈魂，回教徒的靈魂和基督教徒的靈魂並無不同。假使能看見彼此的靈魂，就不會因為對上帝的詮釋不同而相互殘害。


    有一天，我和阿姨經過她家附近一間教堂，教堂門口站著兩位非常美麗的天使，阿姨轉身對我說：「眼睛不要掃視那間教堂。」我驚訝地望著她，阿姨繼續說：「那是新教的教堂，妳禁止走進任何新教教堂的門。」我回頭看了看進入教堂的人，覺得他們和我們沒有兩樣。下次我又經過那間教堂時，對門口的天使笑了笑。雖然我不可以進入那間教堂，但我知道裏面充滿了天使。


    鄰居莫塔太太是個容貌姣好、身材曼妙的女士，卻經常對走在圍牆上的我們破口大罵。偶爾，她會請我當她孩子的臨時保母。八歲那年，有個午後，她想到我家和媽媽喝杯茶，所以請我去看著她的孩子。就在我走進她家時，有位天使出現在我面前說：「妳到那裏後，要非常小心。」


    我立刻害怕起來，但還是走進她家廚房，只是腳步躊躇。莫塔太太正準備離開，爐子上有個鍋子煮得沸騰。我問她：「要讓它繼續煮嗎？」


    「是的，這會非常美味。」


    「妳不打算熄火嗎？」


    她根本聽不進去，她是那種若不照著她的話做，就會大發雷霆的女人。廚房裏有兩個孩子，一個才剛學會走路，一個是還躺在大娃娃車內的嬰兒。她一離開，我就開始觀察廚房，'
  merge: 1
  raw:
  - '[PAGE 25]


    從她的中心點散發出來。這股能量和那位女士本身的能量不同，令我十分著迷。多日後，媽媽提起那位女士就要生寶寶，我聽了露出笑容。

    同樣的，我也能看出人們是否生病，即使我不懂自己看見的是什麼。一道深色陰影環繞著人們的身體，就表示他們的血液出了問題。有時候某根骨頭會發出閃光，讓我看見骨頭有所損傷或變了形。儘管我無法用言語來解釋，卻本能知道他們的身體有狀況。


    一天，我跪坐在窗前，一個男人騎著黑色大腳踏車經過，後面載著他的小女兒。天使要我在父女通過面前時，緊盯著他們不放，不可把眼神移開。我沒問為什麼。還是孩子的我，天使說什麼我就做什麼，不曾質疑。但我知道他們要我幫助這對父女，所以他們行經窗前時，我已經在祈禱。我不知道會發生什麼事情，只是請求讓情況別太嚴重。

    父女通過屋前時，一切似乎慢了下來，就像影片的慢動作。他們騎在一輛要超車的雙層巴士旁，忽然間，小女孩發出驚叫，男人開始傾倒。但小女孩並未跌落腳踏車下，因為她的腳卡在輪輻之間。父親用顫抖的手，小心翼翼把女孩的腳從折彎的輪子裏抽出來，並把正在哭泣的女孩抱到我窗下的人行道上。女孩此時只是輕聲嗚咽，沒有尖聲驚叫。大人都跑去幫忙，媽媽也去了。我也飛奔下樓，到屋外去探視她的狀況。一如往常，誰也沒注意到我。小女孩的鞋掉了，腳底的皮掀開來，挫傷流血，但並沒有骨折。儘管如此，我還是請求上帝和天使來幫助她。'
  - '[PAGE 26]


    即使才五、六歲，我就已經知道自己要扮演助人的角色，並且相信在父女通過時，因為自己不斷觀看和祈禱，才沒發生更悲慘的事情。她也可能摔到巴士底下，或在跌落時撞到頭部，幸好最後只是腳底受傷，其他一切安然，感謝上帝。在那之後，有許多時候我覺得自己被派去阻止事情發生，就算無法完全遏止，也要使情況不那麼悲慘。這是天使給我的訓練之一。我或許沒能好好學習學校的課程，跟天使學習卻毫無困難。


    有一回，我就用這份天賦幫助朋友的父親。住在街頭不遠處的喬西是我最好的朋友，我很喜歡她。她也與眾不同，她說話會結巴。事實上，她結巴得很厲害，不過我們一起玩時，結巴會完全消失，然而只要有人加入，就會再度出現。喬西有一頭又長又直的紅髮，一雙綠色眼睛，個子比我高，但非常纖瘦。她爸爸在街尾開了一家汽車修理廠，那可不是一般附帶加油站或現代的修車廠，而是在一個大院子裏堆滿撞毀的車子和零件，他總是告訴我們不能在那裏玩。不過走入柵門的右邊有個小空地，後來他准許我們在那兒遊戲，但規定不可以進入院子其他地方。


    在一個陽光普照的星期天，我們穿上乾淨的衣服，一邊盡量別把衣服弄得太髒，一邊有說有笑在小空地上玩娃娃。我感覺天使一直跟我說話，要我注意聽，我以爲那是要我聽他們說話。但他們並非這個意思。最後，他們觸摸我，吸引我的注意。我靜下來聽，好像聽見了什麼，但又不確定，問喬西是否聽見，卻什麼也沒有，於是我們繼續玩。天使再度開口說：「注意聽！」我又聽了一次，接著有種奇怪的感覺，很難描述，彷彿自己進入另一個時空，頓失方向。我聽見喬西的父親從遠處傳來的細微求救聲，可是喬西什麼也沒聽到。'
  - '[PAGE 27]


    大人嚴禁我們走近疊得高高的毀損車體堆，但我還是決定去看看，喬西跟在我身後。我

    跟著天使穿越車陣，還記得自己一路不斷說著：「請求上帝、請求天使，請讓她的爸爸平安

    無事！」


    我們找到了喬西的父親，一輛車子壓倒在他身上，到處血跡斑斑，不過他還活著。我記

    得自己跑去求救，喬西應該是留在原地。我不確定去了她家還是我家。大家都跑來幫忙，我

    們則被帶開，因為把車子抬起來時，我們不可以在現場，但我記得救護車來了，聖詹姆斯醫

    院就在同一條路上。後來他沒事，也康復了。


    我感謝上帝和天使讓他平安無事。天使又再度幫助我去救助了別人。


    如我所說，天使正在身旁幫助你，一旦你認知到他們的存在，將能感覺他們對你生命的

    影響。事實上，天使一直接觸你，想讓你察覺到他們，希望你知道生命不僅只是眼前所見的

    一切。我們在生命中並非孤軍奮戰。我們或許活在肉體內，但每個人都擁有能和上帝連結的

    靈魂。天使也和上帝有所連結，當我們呼叫上帝的名，就等於賦予天使力量。


    換句話說，我們透過賦予天使力量，給自己力量。上帝讓我們擁有自由意識，天使也不

    會逾矩。假使我們要他們走開，表明不需要幫忙，上帝和天使都會讓開，但他們不會撒手就

    走，而是在一旁等待。


    你是否有過這樣的經驗：打算去某個地方，然後直直往前走並沒有計畫左轉，可是內心'
  - '[PAGE 28]


    深處卻覺得要左轉，結果沒做而事後懊悔不已？內心的聲音很可能是天使正在耳語，告訴你應該左轉。我們四周充滿未被看見且等著伸出援手的天使，但是他們需要我們開口請求，才能提供協助。透過請求，我們允許天使協助，也藉此更加強化我們和他們之間的連結。


    多年後的現在，我才察覺自己是天使和人類之間的通譯員，因此經常被召喚去說情。我雖扮演著特定的角色，不過每個人自己也擁有隨時請求天使協助的力量。


    我經常請求天使協助家人。成長過程中，我們家境並不好，我六歲時，媽媽已經生了三個孩子，兩個妹妹海倫和愛歐菲，還有弟弟巴利，家裏有五個孩子。媽媽常常生病住院，那個時候，兄弟姊妹就被分送到親戚家。


    四歲時，愛美爾和我第一次被送到瑪麗阿姨家。她和姨丈及三個孩子住在不遠處，雖然距離可能只有幾公里，對我而言卻像隔了一個世界。第一次見到他們的房子時，我以爲那是皇宮，跟我家比起來顯得龐大無比。屋內的一切是如此豪華、美麗，而且很溫暖，不像家裏那般潮濕冰冷，我還可以打赤腳在地毯上跑來跑去。用餐時間更是不可思議，美麗的桌上擺滿整組杯盤裝盛的食物。有太多食物可以選擇了，每一餐都是一場饗宴。有一天，他們問我是否想要一頓熱的早餐，有香腸、煎蛋、燻肉片、黑布丁、番茄和烤麵包，全都是給我一個人，我簡直不敢相信！不用像在家裏那樣分一半或大家一起吃。最棒的是浴室，我泡了一次水滿到澡盆邊的熱水澡，覺得自己真像個公主。


    這趟旅程讓我首度理解到家裏有多窮。


    還住在瑪麗阿姨家時，外公外婆來訪，我穿上最好的衣服，一件前面有刺繡的灰藍色洋'
  - '[PAGE 29]


    著枴杖，因為她幾年前曾經中風。


    次，面對他們時我還是很羞怯。他們兩人很高大，猶如巨人一般。外婆還很胖，走路時得拄著柺杖，因為她幾年前曾經中風。


    媽媽精神不錯，天氣也晴朗時，我們會到鳳凰公園野餐，那是位於都柏林郊區很大一片的開放空間，裏面有鹿，還有各種奇妙的東西。公園離家大約三公里，走路就可以到達。七歲那年，某個星期天我們出發去野餐。爸爸推著腳踏車，後面載著野餐盒。媽媽推著娃娃車，裏面坐著弟弟巴利，愛美爾和我走路，妹妹海倫和愛歐菲時而走路，時而坐在娃娃車裏。


    我們的野餐是番茄、果醬麵包和隔壁鄰居庭院種的蘋果，爸爸還燒了水，泡熱甜茶給大家喝，那是一頓很棒的野餐。吃完午餐，我和姊妹們踢了一會兒足球後，就一個人跑到大樹那邊。我很喜歡在大樹間玩耍，有些樹（不見得是全部）的能量會把我拉向它們。那種癢癢的、神奇的感覺，像磁鐵一樣把我拉過去，感覺很美妙。我常跟樹群玩一個遊戲：我在樹群間跑來跑去，以防某棵樹的能量抓到我，如果被抓到，就得設法逃離。我可以一個人玩上好幾個小時。這天下午，姊妹們跑來問我在做什麼，我只是簡單回答說在玩。我懶得解釋，反正她們不會懂。


    大家到處跑，到傍晚也玩累了，迫不及待想回家吃晚餐。但是在轉進舊克爾麥罕路的轉'
  - '[PAGE 30]


    角前，我就知道出事了。兩個非常大的天使朝我走來，從他們走路的姿態，可以看出發生了可怕的事情。他們走到我身邊，各伸出一隻手環抱著我，然後邊陪我們走回家，邊說我家的屋頂崩塌了。我震驚不已。


    到家時，看見一大片屋頂坍塌下來，簡直讓我嚇壞了，久久無法移開目光。爸爸企圖開門，可是打不開，他用肩膀去撞，落下許多塵土。屋內面目全非，只剩一片瓦礫殘骸。屋頂塌陷時，把天花板也給壓落。在我童稚的眼裏，屋子已經完全破碎，我不禁心想之後要睡在哪裏？我們爬過瓦礫堆，對小小的我來說，破碎的水泥和石塊實在是巨大無比。四處塵土飛揚，家具、玩具和媽媽的寶貝全成了碎片。我訝然看著爸媽從地上撿拾東西，企圖挽救物品。媽媽拾起一個有乳白色條紋的深色小牛奶罐說：「這是唯一還完整的東西。」


    牛奶罐是她結婚禮物中僅存的東西，她原本擁有的就不多，現在更是一無所有。至今我還記得她眼中的淚珠，我那時也跟著哭了，大家全部落淚，只有爸爸沒哭。他要我們別哭，一切都會沒事。爸媽設法清理一些東西。爸爸還把屋頂的一角撐起來，好讓我們能夠度過那一夜，可是屋裏還是很危險。我邊睡邊想我們的房子倒了，接下來該怎麼辦，要去哪裏呢？


    現在我們不僅無家可歸，爸爸也失去了維生的工具。'
  - '[PAGE 31]


    # 03

    通往天堂的階梯


    謝天謝地,表姊娜蒂解救了我們。一、兩年前,才十六歲的她因為父母雙亡,繼承了一棟屋子,她自己也只是個大小孩,卻獨自一人住在大房子裏。我不清楚那是怎樣的安排,或者是否有付房租,總之我們搬到她坐落於都柏林北端巴里曼(Ballymun)的房子,那裏離舊克爾麥罕有好幾公里遠。


    剛開始,搬家讓我很沮喪,因爲我熱愛舊克爾麥罕區,可是抵達巴里曼,看見大庭院和大房間時,我就開心了起來。最重要的是房子很牢固,絕對不會倒塌。房子二樓有三個房間,還有室內廁所和澡盆,奢華極了。一樓後方有個面對庭院的美麗長形廚房,以及起居室和娜蒂的房間,那個房間原本可能是飯廳。


    這棟房子還有個神奇的庭院,我之後見到的其他庭院沒有一個比得上它,我們在此度過許多探險時光。院裏有一堆乾草,舉辦生日派對時,大人會把糖果藏在裏面。爸爸有時間就栽種各式各樣想像得到的蔬菜,包括我們最喜歡玩爆開遊戲的豌豆,他甚至還鋪設了一大片的草莓床。


    那時家中有五個小孩,弟弟巴利還是個嬰兒,在他和我之間還有兩個妹妹海倫和愛歐'
  - '[PAGE 32]


    菲，當然還有姊姊愛美麗。我並不常和他們玩耍，大都只在生日派對或特殊活動時才一起遊戲，或許是興趣不同的關係，因為我用不同的眼光看世界。


    最初的生活有點寂寞，但我很快又交到朋友，認識了小女孩羅薩琳，她住在連接各家庭院的後圍牆另一側。那道牆和馬路一樣長，又寬又大，走在上面也很安全。爸爸搭了一座梯子讓我們能爬上牆，才不會磨損鞋子，我們就這樣從一家走到另一家，或者走到盡頭的田野裏。我非常喜歡那道牆，以及站在上面看到的一切事物。


    羅薩琳成了我的好朋友，她住在牆另一側隔了六家的一棟漂亮的大房子裏，我們利用那道牆往來拜訪彼此，很少繞道走大馬路。她也來自一個大家庭，不過兄弟姊妹有些已經長大離開家。我認識她的妹妹卡洛琳和大她八歲的哥哥麥克。羅薩琳又高又瘦，有一頭長直髮，是個非常有趣又很愛笑的女孩。我很喜歡跟她和她的家人在一起，事實上，我和他們相處的時間比和自己家人還長。


    印象中，羅薩琳的父親是德國人，非常壯碩，有一頭逐漸變灰的黑髮。他經常出門做生意，但在家的時候，對羅薩琳、她哥哥和妹妹，還有我都非常好。星期天他會給小孩買一口袋糖果，我也被算在裏面，我既高興又驕傲，因爲每件事都有我的份。儘管糖果袋裏也許只有七、八顆糖果，但每顆都好漂亮，所以我總是盡量慢慢吃，越慢越好。


    羅薩琳家每到星期天還有一個我很喜歡的活動，就是聽她媽媽念故事書。我們全部聚集到羅薩琳的房間，坐在床上，有時候只有羅薩琳、卡洛琳和我，有時候麥克或我的姊妹也會加入。羅薩琳的媽媽很會念故事書，全神貫注聽上一小時後，她便解散我們。有時候書太'
  - '[PAGE 33]


    厚，故事太長，就得分成幾週來念。我最喜歡的故事之一是法蘭西斯·霍森·柏納（Frances Hodgson Burnett）所寫的《祕密花園》（A Secret
    Garden）。


    我們的庭院裏有個很大的木造鞦韆，爸爸修理過後能盪得很高，每次我都玩上好幾個小時。坐在鞦韆上時，天使教了我許多關於生活與生命的簡單課程。事實上，我人雖然在鞦韆上，神魂卻早已去了另一個世界，在那裏，天使們爲我展現各種美好而神奇的事物。


    當我獨自盪鞦韆時，天使有時會說：「羅娜，伸出妳的手，有東西給妳。」然後在我手上放一個微小的東西，小東西一觸碰到我的手掌，天使就把手收回去，掌心上於是出現一團光。光時而像個小星星，時而像朵小雛菊，沒多久即開始長大，發出亮黃色的光芒。接著，從掌心飄起，越升越高，越來越亮，把太陽也給半遮蔽了，讓我不眨眼睛直視太陽，也不覺得刺眼。最後我看見一幅極度美麗的景象反射回來，就像一面鏡子一樣，影像裏出現一張像人類的漂亮臉龐對著我微笑。


    第一次經歷這個景象時，天使告訴我那是天使皇后。他們用小朋友能懂的語言對我說話，讓我想起精靈的故事，知道皇后如同母親，就像媽媽是我家的皇后一樣。天使解釋說，這個人是天使皇后，是宇宙之母、萬物之母，是所有天使之母。突然間，環繞著這張臉的黃色光環爆炸成數不盡的小碎片，感覺像從太陽中散發出來的金黃色極光。


    多年來，天使經常爲我帶來這份禮物，我成年後亦然，尤其是在我需要信心的時候。'
  - '[PAGE 34]


    當然，搬到巴里曼也表示得去就讀新學校。我和三個姊妹念同一所男女合校的小型國民小學，走路要花半個多小時。姊姊和妹妹都搭公車，而我大部分時間寧願走路。上學途中，我必須走得很快、很急，否則遲到麻煩就大了，但放學路上我總是慢慢走。


    和學校同在一處的，還有位在中間的教堂，以及位於另一側的教會活動中心。學校只有三間教室，當然不夠用，所以教會活動中心也被用來當作兩間教室。第一年我就在活動中心上課，但兩間教室其實就在活動中心的兩端，中間並沒有隔牆。瓊斯先生是我的老師，他對我很不好，覺得我只是個笨蛋，班上有這樣的學生讓他很難受。


    有天早上，天使說學校將發生一件很特別的事，會讓我非常開心。一如往常，天使又說對了，那天發生的事情不僅當時令我十分開心，現在想起來也一樣愉快。那時我們正在學愛爾蘭語，瓊斯先生宣布要臨時小考，答對的人可以得到半克朗。題目是愛爾蘭語的「克蘭」（Crann）轉換成英語是什麼意思。他從教室右邊開始逐一問學生，我被安排獨自坐在教室左邊。他一個接一個問遍全班同學，就是沒有人知道答案。和平常一樣，他並沒有問我。我一個人坐在位置上，興奮到沒法乖乖坐好，因為我知道答案，好想跳起來對著他大聲喊出。天使費了很大力氣才讓我安坐在位置上，我興奮地懇求天使：「天使，要他看我這邊，拜託，請他問我。」


    「別擔心，羅娜，」他們說，「他會問妳的。」


    瓊斯先生對全班同學的表現感到震驚，不停呼喊：「快呀，你們是怎麼回事？這很簡單的！」每回想起他當時的表情，我都會笑出來，他的眼睛越睜越大，臉也越來越紅，整個人'
  - '[PAGE 35]


    瞠目結舌。他問完最後一個孩子，仍然沒有問我就宣布：「看來沒有人贏得這半克朗。」

    荷賽司始終站在瓊斯先生的右邊，指著我的方向，不過瓊斯先生當然看不到他。我好想

    對荷賽司大喊，要他把瓊斯先生拉到我這邊來。這時全班同學鴉雀無聲。儘管有天使的保

    證，看來瓊斯先生最後還是不會來問我。他走向自己的桌子，全班仍然一片寂靜。突然間，

    荷賽司和瓊斯先生的守護天使一邊輕柔地挽起他的手臂，讓他轉身朝我的方向走來，一邊在

    他耳邊耳語。「我知道這根本是白費功夫，不過我還是問一下好了。」瓊斯先生說。

    他果真問了我，我則充滿自信，開心答道：「那是『樹』的意思。」

    瓊斯先生的臉當場垮下來，因為我說的是正確答案，全班同學全笑開了，並且大聲鼓

    掌，非常開心。現在他必須把那半克朗送給我，我永遠記得他把錢放到我手上，我對他說謝

    謝的那一刻。

    我之前從來不曾擁有過那麼多錢，整整半克朗！


    多數孩子一放學就衝回家，但我喜歡慢慢走，一邊跟天使玩耍。我可以花上幾個小時，

    沿著路旁的大堤岸走回家，這樣才能看著樹籬另一側的田野，還有路上大房子所在的土地。

    有時候，則是沿著堤岸和天使邊走邊跳，互開玩笑，暢懷大笑；有時候，他們會爲我展現各

    種東西，譬如往後撥開蔓生的草叢，讓我看見堤岸上黃蜂築巢的洞。由於拉開屏障的是天

    使，不會干擾到黃蜂，所以我站在那裏看上好長一段時間，也不用擔心被螫到。記得我後來'
  - '[PAGE 36]


    再回去看黃蜂巢，卻發現大人已找到黃蜂，把牠們給毒死了，我心裏很悲傷。

    天使也經常爲我展現堤岸外田野裏的牛群。他們教我以不同的方式觀看事物，所以我不

    會只是迅速瞥一眼牛，而是看見牠所有一切，包括身上的每根線條和每個起伏。天使讓細節

    發光或比平常更顯眼，這樣我才能真正注意到。他們還讓我看進牛的眼底，即使牠們在遙遠

    的另一端，我也能夠深入牠們的眼底。他們讓我看見一般人永遠看不見的事物，那一切真的

    非常迷人。進出牛體內和環繞其身邊的光和能量，有時宛如光球在牛的四周跳動，有時又忽

    隱忽現。我看得見母牛肚子裏的小牛，但有時很難辨認，這時天使便會說再看仔細一點，我

    就看出來了。老實說，小牛有時候就像一團黏呼呼的東西，還會動，有點像媽媽以前常做的

