    守護天使的外觀也是形形色色，有時是星星之火，然後漸漸變大，最後成為熊熊烈火；有時候又龐大無比，比他們守護的人還大上許多。守護天使散發出光芒，經常穿著純金、純銀或純藍色衣服，或者彩色的。

    偶爾我也看見靈體，就像看見哥哥克里斯多夫一樣。以前有個住在坡頂上的鄰居，推著娃娃車走過我的窗前，車裏有個嬰兒和一個幼兒，身旁跟著兩個比娃娃大不了多少的小朋友，一旁還伴著一位老人家。有一天，鄰居和媽媽在店鋪裏談話，我聽見她說很想念剛往生父親，才知道那位老人家是她的父親，也就是孩子們的外公。我笑了，雖然她很想念父親，父親其實仍在身旁，只是她看不見而已。父親那麼愛她，乃致靈魂仍然與她同在，想幫助她、安慰她。除非她願意讓他離開，否則他會永遠陪在她身邊。

