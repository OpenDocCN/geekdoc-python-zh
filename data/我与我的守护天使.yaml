    我非常熱愛教堂，偶爾上學遲到就是因為先溜到教堂去了。我喜歡溜進教堂，雖然裏面經常空蕩蕩沒有人影，卻充滿天使。有時或許只有幾個人，天使們卻總是鬧哄哄，一片忙碌景象。人們並不知道教堂裏究竟有多少天使。天使在那裏讚美上帝，等待神的人民前來加入他們，可惜往往空等。星期天望彌撒時，教堂裏更是擠滿天使，有每個人的守護天使，和神父一起站在聖壇上的天使，還有更多是上帝派遣來的。教堂是個非常有力量的地方，有時我能看見教堂裏的人身邊圍滿天使和光芒，就會為他們祈禱：「願那人今天能夠聽見天使的話，能夠與他的天使接觸，並透過天使和上帝接觸。」


    世界上並非只有基督教堂才有天使，猶太教堂、回教清真寺和所有神聖的地方都有天使的存在。不論你信仰什麼，對天使來說都一樣。他們告訴我所有的神聖殿堂應該處在同一屋簷下，回教、猶太教、新教、印度教、天主教和其他各種宗教信仰都是萬教同源。或許我們看起來不一樣，或許我們擁有不同的信念，但是我們都有靈魂，回教徒的靈魂和基督教徒的'
