  md: '天使為了讓我有心理準備面對某些事情，偶爾會事先為我展現預言景象，那當下，我周遭的一切消失無蹤，感覺像是被傳送到另一個時空之中，彷彿看著閃爍不定的電視螢幕，或者又像看快轉的影片。有時候我因為看不懂發生什麼事而困擾，「影片」便停格一、兩秒鐘，我就能看見某個人，或某個場景。預言景象有各式各樣的呈現方式。


