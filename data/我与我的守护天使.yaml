    # 17

    在窗上敲三下


    出院沒幾天，天氣開始變得非常寒冷。喬回到郡議會工作，雖然那只是個短期約聘工作。我正在棚子裏取泥炭要回屋子生火，有人叫了我的名字，轉身看，卻毫無人影。我把裝滿泥炭的桶子提回屋內，壁爐旁的椅子上坐著一位天使。


    他著實嚇了我一跳，因為他的外形非常特別，和我看過的天使完全不同，全身彷彿是以大小一致且完美切割的鋸齒狀玻璃片組合而成，每片玻璃都反射著光芒。他的臉部輪廓非常鮮明，站起來時，約有三公尺半高，頭幾乎要頂到天花板。非常特殊的是，他身體的每一部分似乎傳送出音樂，一種輕柔迷人的音樂，是我以前完全不曾聽過的聲音，那不像人間的音樂，倒像是我想像中天堂會有的樂聲。


    「哈囉，羅娜，」他以非常柔和的聲音對我說話，「我的名字叫做卡法斯（Kaphas）。一件特殊的事情將發生在妳和喬身上，但主角主要是喬。


    「卡法斯天使，你能告訴我何時嗎？」我問道。


    「不久之後，羅娜，當天使開始從屋頂降臨，妳就知道時間到了。」天使卡法斯站起身後便消失無蹤。'
- md: '又過了幾個星期，我不確定是多久，天氣越來越冷。喬對於失去孩子一事仍然非常傷心，雖然我也一樣，但是因爲事先知道，所以有更多時間來面對。天氣變得很差，戶外一片冰天雪地，大雪紛飛，真的非常冷。喬下班後，決定多買些食品雜貨回家，我永遠記得他到家時，雙手抱滿購物袋的模樣。喬一走進屋就喊著：「天（上帝）啊，真是冷透了⋯⋯」他一開口說「天（上帝）」，天使們立即降臨到我們小小的家裏。


    感覺上，天使好像是從屋子每個角落，包括屋頂、牆壁，乃至從地板浮現。構成小屋的所有原子似乎都充滿了天使。我以前曾目睹過這個現象，現在也仍會發生，通常是在特殊事件即將展開之前。我知道這就是天使卡法斯所說的，爲喬而生的特殊事件。


    喬繼續說：「雪再這樣繼續下，天曉得明天早上是否開得了大門。」積雪已經堆得老高，廣報導許多道路已經阻斷。因爲路上積滿冰雪，前往來錫利普的交通也中斷了。


    那一晚，我們讓壁爐的火持續燃燒，由於電力中斷，所以火成爲室內唯一的光源，能這樣窩在小屋裏，我覺得很舒服。孩子們已經上床睡覺，屋裏有足夠的燃料和食物，一切都令人感到舒適、安全。十點左右，喬和我坐在壁爐旁享用茶點和三明治，談著失去的寶寶，最後我們爲他取了名字。


    屋內充滿了閃閃發亮的天使，我注意到有些天使走進臥房，他們回到小前廳時，我聽見他們提到克里斯多夫和歐文：「他們就像小天使般，睡得非常祥和。」


    突然，一切變得寂靜無比，毫無聲響。我起身離開椅子，走到窗邊往外瞧，外面除了白雪，一片漆黑，黑暗中泛著雪光。我有種按捺不住的興奮感，雖然不知道天使要讓什麼事情發生，但我知道將是非常特殊的事情。


    接著，窗上突然傳來三聲敲窗聲，喬和我差點嚇得魂飛魄散。他說：「喔，天啊，外面一定有人。」


    他正從椅子站起來時，門上又傳來三聲敲門聲。我說：「他們一定凍壞了，也許是爸媽，也許他們有什麼事情得來一趟。」


    「他們八成瘋了才會在這種夜晚出門，」喬說。


    喬身邊圍滿了天使，他對此當然是一無所知。突然間，我明白是怎麼回事，便笑了起來。喬說：「妳在笑什麼？」


    「門外沒有人，」我說，「我知道是誰在敲門窗。」


    「是誰？」「是我們的寶寶，他來說再見。他只是透過敲門給你一個實質的訊息，幫助你相信一切。


    「少來，別胡說八道了。」喬說。


    「那就開門瞧一瞧啊，雪地上不會有任何腳印的。」


    喬臉上的表情使我忍不住又笑了。客廳裏充滿天使，我知道天使帶著寶寶的靈魂來敲窗，現在他們已經回到天堂。我並不需要看見我們的小兒子，他這麼做是爲了幫助他的父親相信一切。


    喬打開大門，門前堆滿近三十公分深的雪，雪滑落到屋內的腳踏墊，冷冽的寒風也吹進屋裏。喬朝屋外看，無法置信，因為雪地上並沒有足跡。他看了又看，想在雪地上尋找蛛絲馬跡，不論是動物或小鳥，什麼都好，最後甚至踏進雪地。他不可置信地看著我，搖著頭，臉色蒼白說：「上帝啊，這實在是太過分了。」


    最後，他終於走回來，關上大門。我說：「別擔心，來坐在火堆旁暖暖身子。那是你的兒子，我們的寶寶來道別，他正和天使離開，前往應該要去的天堂。現在，你可以放手讓他走了。」


    喬在火邊落淚，我們彼此相擁，兩人都哭了，但內心非常平靜。


    「小寶寶為我們做了一件很美好的事情，不是嗎？」我對他說，「天使顯現這類事情，我們才會知道寶寶很好，一切安然無恙。孩子來謝謝我們當了他的父母親。」


    爸爸常突然來造訪我們，而且經常在晚上出現。我很喜歡他這樣給我們驚喜。有一天，我在庭園裏除草，在兩排馬鈴薯之間鬆土。此時我們已經有能力種植所需的蔬菜水果，克里斯多夫也會幫我，他雖然只有五歲，卻總是熱切想幫忙。


    聽到爸爸的車聲來到柵門外，我轉身看去，兩個孩子大喊著：「阿公！」克里斯多夫穿越馬鈴薯田，想要打開柵門，歐文則搖搖晃晃跟在後面。柵門被繩子綁住，我抱起歐文，走去幫克里斯多夫。柵門打開後，歐文在我懷裏扭動著要下去。克里斯多夫則跑去跟剛下車的外公打招呼。他一身釣魚裝扮，戴著最心愛的帽子，那是一頂花呢帽，上面別滿各種色彩的毛鉤假餌。他擁有那頂帽子許多年了,不但一有機會就戴,還一直小心呵護。


    爸爸拍了拍孩子的頭,他總是這樣和他們打招呼,我有時候會跟他說:「爸!他們又不是小狗。」他則是對我一笑置之。


    「庭院看起來很棒。」爸爸說,克里斯多夫一邊拉著他往馬鈴薯田走去。


    「孩子們帶你參觀完我們種的蔬菜後,進屋來,我會把茶準備好,」我說。


    歐文當時已經三歲,他步伐踉蹌最先回到廚房。歐文是個早產兒,還沒發育完全就誕生,這使得他臀部的旋轉幅度比正常人大。他走路的速度快到讓我看著他時會不知不覺屏住氣。有時他雖跌在地上滾個三、四圈,最後雙腳仍然站得穩穩的,彷彿腰部以下有雙關節似的。歐文跌滾在地時,常有許多天使的光影環繞在他身邊保護。看他滾動的樣子,想必會折斷不少骨頭,神奇的是他從未摔斷骨頭。醫生說歐文的臀部要到七歲後才發育正常,我經常對喬說我等不及歐文趕快長到七歲,這樣才能輕鬆呼吸。


    「羅娜,」爸爸問道,「夏天時,你們要不要跟妳媽和我一起去度假,到墨林加(Mullingar)的小屋去?」


    我很開心,因為喬和我還不曾度過假,也沒有去蜜月旅行。想到能休息一下,我非常興奮。


    「太棒了,」我說,「我們當然很樂意,只希望喬能請假。」


    喬的盲腸炎已經復原,但在他盲腸四周我仍然看見一團紅色能量,明白病況還會再發生。他最近在附近地毯工廠找到一份工作,必須在不舒適的環境中勞動,清洗並烘乾羊毛,而且大多上夜班。這份工作對他的健康沒好處,但我們需要這筆收入。


    除了穩定的小收入之外,這份工作的好處之一是喬能拿到未染色的便宜羊毛。小時候我曾經編織過一些東西,現在能取得羊毛,我更是開始積極編織。不過,我織的毛衣只有一種顏色,就是羊的顏色。我為孩子們、喬和爸爸織了粗羊毛毛衣,爸爸非常喜歡,經常在不上班的日子穿。


    這天爸爸和我坐著喝茶,聊了一會兒。孩子們也很開心,問了外公許多問題,小屋在哪裡、是什麼模樣、庭院裏有沒有樹等等。


    「庭院非常茂密,不但樹很多,連草都長得跟你們一樣高,裏面還有一條小徑,兩旁像叢林一樣,植物蔓生。你們會玩得很開心。」


    「我們什麼時候能去?」他們不斷提出問題,我告訴孩子們:「要等到外公和爸爸能放假時才去。」


    爸爸喝完茶,跟孩子們在外面玩了一會兒。「我要走了,再見,羅娜。」他在外面喊道。


    出發度假前一天,天氣非常暖和,是個無風的大晴天,我正在晾曬洗好的衣物,突然吹起一陣強風。我知道這不是一般的風,便笑了起來。


    「我打賭一定是你,荷賽司。為什麼要把我晾好的衣服吹走,你在搞什麼鬼?」


    接著他突然現身。和往常一樣,他只是在搗蛋,想逗我笑,然後又像光一般在空氣中蒸發。他是個很棒的天使。那一天,我發現克里斯多夫站在那裏,睜大眼睛跟我看著同一個方向，從他的眼神裏，我知道他看見我所看見的影像。但他在當時，乃至今日，都不曾提起此事，也許他忘了，也許讀到這本書時會想起來，我不知道，只是靜觀其變。


    出發度假那一天，我很擔心車子載不下全部的人，因爲爸爸的車不大，我們又有許多行李，也許他忘了，也許讀到這本書時會想起來，我不知道，只是靜觀其變。


    李和孩子們的換洗衣物。孩子們在庭院裏急切等待著外公、外婆，車子一到門前，立刻發出興奮的叫喊聲。


    克里斯多夫和歐文馬上帶著玩具爬進車裏，爸爸和喬把行李全部塞進後車廂，就出發前往距離梅努斯八十公里，位於威斯米斯郡（Westmeath）的墨林加。一路上，喬說了不少話，我則保持安靜，一邊和孩子們玩著。


    抵達小屋時天色幾乎要黑了，不過天空掛著一輪明月，清澈的夜空滿是星星。那棟小屋非常可愛，溫暖舒適，讓我滿心歡喜。爸媽睡在一樓，我們一家全睡在二樓，第一晚我睡得非常香甜。


    度假期間，爸爸和喬到附近許多湖泊釣魚。他也帶著孩子和我去划船，儘管我們只駛離岸邊沒多遠又折返，孩子們一到水上還是非常興奮，惹得船身上下搖晃。


    幾年前，爸爸曾在加油站發生過一次意外，之後無法做粗重的工作。雖然喬自己不是很健康，但那次假期，他在小屋做了許多爸爸沒法做的粗重工作，我也一起幫忙。我們為所有牆面鋪上一層石膏板，保護牆壁不受潮，這工作不輕鬆，因爲有一面牆非常高，石膏板很重。有幾天我們甚至從早到晚不停工作，不過，我們終於在假期接近尾聲時完成。


    有些晚上喬和爸爸會去飛蠅釣。有一晚我請喬照顧孩子，因爲我想獨處一下，跟天使好好說說話，而不是在腦海裏安靜和他們對話。我八點左右出門，那個時間湖邊很少有人，我越過大馬路，打算左轉朝一條往湖邊的小徑走去。當我應該左轉走向湖邊時，卻決定要往前直走。我一邊走著，一邊對天使說：「現在你們可以走在我身邊了。我知道你們以靈的方式圍繞在我四周，可是我需要你們現身，才能好好談話。」


    米迦勒天使出現在我身邊一起齊步並行，手搭在我的肩膀上，我覺得很舒服。走在路邊時，米迦勒天使說：「前面不遠處的右邊有座森林，羅娜，我們到那邊散步吧。」


    抵達那片森林時，林子看起來濃密黑暗。「我沒法在那樣的林子裏散步。」我說。米迦勒於是牽起我的手前進，黑莓叢自動往兩側分開，讓出一條小徑。我們沿著小徑來到森林裏一處能鳥瞰田野和湖泊的空地。有時候，知道天使就在身邊，散步時不用擔心害怕，是件美好的事情。但那一晚，我和米迦勒穿越森林，隱約有種被注視的感覺。但我並沒有對此多想，也沒多問米迦勒些什麼。


    隔天早上吃過早餐後，爸爸又邀喬去釣魚，他們帶著釣具出門，我在後面喊要他們帶魚回來當茶點。爸爸說他盡量，但無法保證，兩人就往湖邊走去。媽媽在庭院裏忙來忙去，照顧盆栽，我把屋子打掃乾淨後，便跟孩子們到樹木叢生的小徑散步，他們非常喜歡那片荒野之地。


    稍後，媽媽和我又帶著孩子到湖邊享受假期最後一天，也和路上遇到的人聊天。有些人跟我們一樣來度假，有些則是媽媽在這裏認識的當地人。我們抵達湖邊，看到許多家庭出遊。孩子和我在湖裏玩水，他們很喜歡撿石頭朝水裏丟去，觀看濺起的水花，感受腳邊迴盪的漣漪。該回小屋時，孩子因為捨不得，眼睛都紅了。


    沒多久，喬和爸爸帶著鱒魚回來。爸爸把鱒魚拿到外面，教孩子們如何砍掉魚頭和魚尾，清洗魚身。兩個孩子齊說：「噁。」


    「這並不難，」我告訴他們，「我小時候就學會怎麼清理魚。學會以後，就能在營火邊烤魚來吃了，很棒喔。」


    我才說完，克里斯多夫就嚷著要搭營火烤魚，可惜我們得拒絕，因為當晚就要回梅努斯了。不過我們還是在廚房裏把魚煮熟，吃掉美味的鱒魚。吃完茶點後，我們開始清理，把行李裝上車。我們回到梅努斯，媽和爸也回家去。假期結束了。


    家裏一直很清貧。以前我常問上帝：「我們該怎麼活下去？」但我們確實活了下來，雖然是勉強維持。我們靠著口袋裏的零錢和自己種的蔬菜節儉度日，更別說是買新衣了。媽媽偶爾給我們一袋衣服，我不知道她從哪兒拿到這些衣服，不過它們從來不合我的身，不是太大，就是穿起來像個老太婆。偶爾袋子裏有喬能穿的褲子或毛衣，我們總是笑說：「乞丐沒得挑。」


    有好幾次，我的訂婚戒指成了天賜之物。就跟當時愛爾蘭的許多家庭一樣，經常大排長龍的當鋪成了我們的救命恩人。我們好幾次走進當鋪，出來時手中握著錢，覺得自己像個百萬富翁。只要連買麵包、奶油來餵孩子的錢都沒了，喬就到路上舉起拇指搭便車到都柏林，口袋裏帶著我的訂婚戒指直奔當鋪，一次可以典當十英鎊左右。隔一段時間，等我們存夠錢，再把它贖回來。戒指就這樣變成了救命之物。


    隔壁一位老人家拜託喬幫忙清理房子和庭院，最後把自己的舊腳踏車送給喬當作謝禮。那輛車只需要稍加清理，修幾個小地方就能使用，我感謝上帝和天使讓我們得到這份禮物，也感謝老人能傾聽他的天使說話。也因此，喬能騎腳踏車到地毯工廠上班。


    雖然我們很缺錢，那幾年時光卻很快樂。在那些美好的日子裏，我看著孩子開心大笑，看著喬享受人生一段時間，不禁覺得活著真好。


    我流產那年的夏天，喬想到一個好主意。他跑到賽爾布里齊一家自行車店，談定每晚去幫忙清理店鋪，整理院子裏的腳踏車和零件，兩星期後，就能得到兩輛腳踏車作為報酬，成人、兒童用車各一輛。這樣一來，我們只要把歐文放在喬的自行車後面，就能全家一起出遊了。


    喬下班後接著到腳踏車店工作，回到家已經午夜時分。但一切是值得的。在第一週結束，他帶回一輛兒童腳踏車，雖然車看起來簡直像堆廢鐵，需要大幅整修。第二週過了一半，店家又給了他一輛成人用車，這一輛狀況就好多了。


    克里斯多夫非常興奮，希望盡快騎上腳踏車。在他的幫忙下，我們很快就把腳踏車整理好。當時的克里斯多夫還是個身形瘦弱的小孩，他在外面幫著父親，一邊學習為車鍊上油，修理輪輻等等各種工作，也一邊學騎腳踏車。


    我永遠記得第一次決定騎車到九公里外的多納迪亞（Donadea）野餐的那一天。喬說九公里對五歲的孩子來說不算短,所以得看克里斯多夫累壞之前能騎多遠。喬在他的車後為歐文放了椅子,我的車後則載著裝有野餐的袋子。


    我很擔心克里斯多夫,不過那實在多餘,因為他有足夠的能力騎車。我們一路上停了幾回,稍作休息,偶爾也邊走邊推車。


    之後,我們有時間就到多納迪亞野餐,度過許多美好時光。那裏有一股寧靜、祥和的氣氛,尤其是所有人都回家後的夜晚。還有一個大家稱之為湖,我卻稱爲池塘的水塘,裏面有鴨子,以及一座連接到水中小島的小橋,小島上有四棵樹和幾張野餐桌,但地面光禿禿的沒有草。


    到達小島後,我們生起小營火,然後泡茶。孩子們最喜歡坐在小島上的營火旁,四周都是水,還有鴨子在身邊走來走去討麵包吃。我們一邊喝茶吃三明治,一邊看著天上的星星。我知道不該在那裏生營火,因為附近有森林,不過我們非常小心火燭。小時候,爸爸教了我許多關於營火和在大自然中活動該注意的事情,他教我如何生火,如何安全走在河岸邊,如何游泳,還有關於水流的知識。他告訴我萬物皆有規矩。


    有一晚,我們又到多納迪亞野餐,夜空星光閃亮,高掛一輪明月,所以四周還算明亮。當時四下無人,除了我們只有鴨子。我們生起小營火,孩子一邊吃三明治,一邊玩著小男孩玩的各種遊戲。我告訴喬想獨處一下,請他看著孩子。過去這段時間,我一直感覺到有什麽東西在遙遠他方注視著我,我想要和天使談談此事。


    喬說天色太暗了,不同意我去。我回道:「我會帶著手電筒。」


    我走過小木橋，踏上前往老城堡的小徑，然後右轉到一片有許多樹木環繞的草地。我故意走入大橡樹林，這樣喬就看不見我了。我真的很想獨處，也知道他會看著我。


    天使以萊亞現身，他像一道來自樹叢間的光亮，走到草地上，呼喚我的名字。以萊亞向我伸出手，我的雙手也向他的方向舉起，他用雙手包覆了我的手。


    我們開始溝通，卻沒有說話，以萊亞傳遞著：「羅娜，他走在黑暗之中。妳不用害怕，沒有上帝的允許，他無法更靠近。妳知道我說的是誰嗎？」


    「知道，天使以萊亞，」我說，「是撒旦。他就是在黑暗中一直注視著我的人嗎？我察覺到有人，或有某種東西存在於我的生活圈外圍，存在於環繞著我的光環之外，藏身在幾百里外的另一個黑暗之圓內。過去六個月來，我一直很害怕，雖然我知道上帝和天使們會保護我。」「羅娜，妳之所以面對這些狀況，是因為有一天上帝將會讓妳在撒旦面前接受試驗。」天使以萊亞說。


    「這件事發生時，上帝會在哪裏呢？」我問道。


    「上帝將在妳的右邊，撒旦在妳的左邊。」以萊亞說。


    「上帝會在身邊給我力量，這樣就夠了。」但我內心充滿無盡的擔憂與害怕。天使以萊亞放開我的手，當我的手臂又落回身體兩側時，心底已充滿平靜與愛。以萊亞笑著指示我回頭看，然後消失無蹤。


    喬帶著孩子從我身後走來。克里斯多夫牽著他的腳踏車，喬牽著兩輛車，還帶著歐文。'
  mdcn: '又過了幾個星期，我不確定是多久，天氣越來越冷。喬對於失去孩子一事仍然非常傷心，雖然我也一樣，但是因爲事先知道，所以有更多時間來面對。天氣變得很差，戶外一片冰天雪地，大雪紛飛，真的非常冷。喬下班後，決定多買些食品雜貨回家，我永遠記得他到家時，雙手抱滿購物袋的模樣。喬一走進屋就喊著：「天（上帝）啊，真是冷透了⋯⋯」他一開口說「天（上帝）」，天使們立即降臨到我們小小的家裏。


    感覺上，天使好像是從屋子每個角落，包括屋頂、牆壁，乃至從地板浮現。構成小屋的所有原子似乎都充滿了天使。我以前曾目睹過這個現象，現在也仍會發生，通常是在特殊事件即將展開之前。我知道這就是天使卡法斯所說的，爲喬而生的特殊事件。


    喬繼續說：「雪再這樣繼續下，天曉得明天早上是否開得了大門。」積雪已經堆得老高，廣報導許多道路已經阻斷。因爲路上積滿冰雪，前往來錫利普的交通也中斷了。


    那一晚，我們讓壁爐的火持續燃燒，由於電力中斷，所以火成爲室內唯一的光源，能這樣窩在小屋裏，我覺得很舒服。孩子們已經上床睡覺，屋裏有足夠的燃料和食物，一切都令人感到舒適、安全。十點左右，喬和我坐在壁爐旁享用茶點和三明治，談著失去的寶寶，最後我們爲他取了名字。


    屋內充滿了閃閃發亮的天使，我注意到有些天使走進臥房，他們回到小前廳時，我聽見他們提到克里斯多夫和歐文：「他們就像小天使般，睡得非常祥和。」


    突然，一切變得寂靜無比，毫無聲響。我起身離開椅子，走到窗邊往外瞧，外面除了白雪，一片漆黑，黑暗中泛著雪光。我有種按捺不住的興奮感，雖然不知道天使要讓什麼事情發生，但我知道將是非常特殊的事情。


    接著，窗上突然傳來三聲敲窗聲，喬和我差點嚇得魂飛魄散。他說：「喔，天啊，外面一定有人。」


    他正從椅子站起來時，門上又傳來三聲敲門聲。我說：「他們一定凍壞了，也許是爸媽，也許他們有什麼事情得來一趟。」


    「他們八成瘋了才會在這種夜晚出門，」喬說。


    喬身邊圍滿了天使，他對此當然是一無所知。突然間，我明白是怎麼回事，便笑了起來。喬說：「妳在笑什麼？」


    「門外沒有人，」我說，「我知道是誰在敲門窗。」


    「是誰？」「是我們的寶寶，他來說再見。他只是透過敲門給你一個實質的訊息，幫助你相信一切。


    「少來，別胡說八道了。」喬說。


    「那就開門瞧一瞧啊，雪地上不會有任何腳印的。」


    喬臉上的表情使我忍不住又笑了。客廳裏充滿天使，我知道天使帶著寶寶的靈魂來敲窗，現在他們已經回到天堂。我並不需要看見我們的小兒子，他這麼做是爲了幫助他的父親相信一切。


    喬打開大門，門前堆滿近三十公分深的雪，雪滑落到屋內的腳踏墊，冷冽的寒風也吹進屋裏。喬朝屋外看，無法置信，因為雪地上並沒有足跡。他看了又看，想在雪地上尋找蛛絲馬跡，不論是動物或小鳥，什麼都好，最後甚至踏進雪地。他不可置信地看著我，搖著頭，臉色蒼白說：「上帝啊，這實在是太過分了。」


    最後，他終於走回來，關上大門。我說：「別擔心，來坐在火堆旁暖暖身子。那是你的兒子，我們的寶寶來道別，他正和天使離開，前往應該要去的天堂。現在，你可以放手讓他走了。」


    喬在火邊落淚，我們彼此相擁，兩人都哭了，但內心非常平靜。


    「小寶寶為我們做了一件很美好的事情，不是嗎？」我對他說，「天使顯現這類事情，我們才會知道寶寶很好，一切安然無恙。孩子來謝謝我們當了他的父母親。」


    爸爸常突然來造訪我們，而且經常在晚上出現。我很喜歡他這樣給我們驚喜。有一天，我在庭園裏除草，在兩排馬鈴薯之間鬆土。此時我們已經有能力種植所需的蔬菜水果，克里斯多夫也會幫我，他雖然只有五歲，卻總是熱切想幫忙。


    聽到爸爸的車聲來到柵門外，我轉身看去，兩個孩子大喊著：「阿公！」克里斯多夫穿越馬鈴薯田，想要打開柵門，歐文則搖搖晃晃跟在後面。柵門被繩子綁住，我抱起歐文，走去幫克里斯多夫。柵門打開後，歐文在我懷裏扭動著要下去。克里斯多夫則跑去跟剛下車的外公打招呼。他一身釣魚裝扮，戴著最心愛的帽子，那是一頂花呢帽，上面別滿各種色彩的毛鉤假餌。他擁有那頂帽子許多年了,不但一有機會就戴,還一直小心呵護。


    爸爸拍了拍孩子的頭,他總是這樣和他們打招呼,我有時候會跟他說:「爸!他們又不是小狗。」他則是對我一笑置之。


    「庭院看起來很棒。」爸爸說,克里斯多夫一邊拉著他往馬鈴薯田走去。


    「孩子們帶你參觀完我們種的蔬菜後,進屋來,我會把茶準備好,」我說。


    歐文當時已經三歲,他步伐踉蹌最先回到廚房。歐文是個早產兒,還沒發育完全就誕生,這使得他臀部的旋轉幅度比正常人大。他走路的速度快到讓我看著他時會不知不覺屏住氣。有時他雖跌在地上滾個三、四圈,最後雙腳仍然站得穩穩的,彷彿腰部以下有雙關節似的。歐文跌滾在地時,常有許多天使的光影環繞在他身邊保護。看他滾動的樣子,想必會折斷不少骨頭,神奇的是他從未摔斷骨頭。醫生說歐文的臀部要到七歲後才發育正常,我經常對喬說我等不及歐文趕快長到七歲,這樣才能輕鬆呼吸。


    「羅娜,」爸爸問道,「夏天時,你們要不要跟妳媽和我一起去度假,到墨林加(Mullingar)的小屋去?」


    我很開心,因為喬和我還不曾度過假,也沒有去蜜月旅行。想到能休息一下,我非常興奮。


    「太棒了,」我說,「我們當然很樂意,只希望喬能請假。」


    喬的盲腸炎已經復原,但在他盲腸四周我仍然看見一團紅色能量,明白病況還會再發生。他最近在附近地毯工廠找到一份工作,必須在不舒適的環境中勞動,清洗並烘乾羊毛,而且大多上夜班。這份工作對他的健康沒好處,但我們需要這筆收入。


    除了穩定的小收入之外,這份工作的好處之一是喬能拿到未染色的便宜羊毛。小時候我曾經編織過一些東西,現在能取得羊毛,我更是開始積極編織。不過,我織的毛衣只有一種顏色,就是羊的顏色。我為孩子們、喬和爸爸織了粗羊毛毛衣,爸爸非常喜歡,經常在不上班的日子穿。


    這天爸爸和我坐著喝茶,聊了一會兒。孩子們也很開心,問了外公許多問題,小屋在哪裡、是什麼模樣、庭院裏有沒有樹等等。


    「庭院非常茂密,不但樹很多,連草都長得跟你們一樣高,裏面還有一條小徑,兩旁像叢林一樣,植物蔓生。你們會玩得很開心。」


    「我們什麼時候能去?」他們不斷提出問題,我告訴孩子們:「要等到外公和爸爸能放假時才去。」


    爸爸喝完茶,跟孩子們在外面玩了一會兒。「我要走了,再見,羅娜。」他在外面喊道。


    出發度假前一天,天氣非常暖和,是個無風的大晴天,我正在晾曬洗好的衣物,突然吹起一陣強風。我知道這不是一般的風,便笑了起來。


    「我打賭一定是你,荷賽司。為什麼要把我晾好的衣服吹走,你在搞什麼鬼?」


    接著他突然現身。和往常一樣,他只是在搗蛋,想逗我笑,然後又像光一般在空氣中蒸發。他是個很棒的天使。那一天,我發現克里斯多夫站在那裏,睜大眼睛跟我看著同一個方向，從他的眼神裏，我知道他看見我所看見的影像。但他在當時，乃至今日，都不曾提起此事，也許他忘了，也許讀到這本書時會想起來，我不知道，只是靜觀其變。


    出發度假那一天，我很擔心車子載不下全部的人，因爲爸爸的車不大，我們又有許多行李，也許他忘了，也許讀到這本書時會想起來，我不知道，只是靜觀其變。


    李和孩子們的換洗衣物。孩子們在庭院裏急切等待著外公、外婆，車子一到門前，立刻發出興奮的叫喊聲。


    克里斯多夫和歐文馬上帶著玩具爬進車裏，爸爸和喬把行李全部塞進後車廂，就出發前往距離梅努斯八十公里，位於威斯米斯郡（Westmeath）的墨林加。一路上，喬說了不少話，我則保持安靜，一邊和孩子們玩著。


    抵達小屋時天色幾乎要黑了，不過天空掛著一輪明月，清澈的夜空滿是星星。那棟小屋非常可愛，溫暖舒適，讓我滿心歡喜。爸媽睡在一樓，我們一家全睡在二樓，第一晚我睡得非常香甜。


    度假期間，爸爸和喬到附近許多湖泊釣魚。他也帶著孩子和我去划船，儘管我們只駛離岸邊沒多遠又折返，孩子們一到水上還是非常興奮，惹得船身上下搖晃。


    幾年前，爸爸曾在加油站發生過一次意外，之後無法做粗重的工作。雖然喬自己不是很健康，但那次假期，他在小屋做了許多爸爸沒法做的粗重工作，我也一起幫忙。我們為所有牆面鋪上一層石膏板，保護牆壁不受潮，這工作不輕鬆，因爲有一面牆非常高，石膏板很重。有幾天我們甚至從早到晚不停工作，不過，我們終於在假期接近尾聲時完成。


    有些晚上喬和爸爸會去飛蠅釣。有一晚我請喬照顧孩子，因爲我想獨處一下，跟天使好好說說話，而不是在腦海裏安靜和他們對話。我八點左右出門，那個時間湖邊很少有人，我越過大馬路，打算左轉朝一條往湖邊的小徑走去。當我應該左轉走向湖邊時，卻決定要往前直走。我一邊走著，一邊對天使說：「現在你們可以走在我身邊了。我知道你們以靈的方式圍繞在我四周，可是我需要你們現身，才能好好談話。」


    米迦勒天使出現在我身邊一起齊步並行，手搭在我的肩膀上，我覺得很舒服。走在路邊時，米迦勒天使說：「前面不遠處的右邊有座森林，羅娜，我們到那邊散步吧。」


    抵達那片森林時，林子看起來濃密黑暗。「我沒法在那樣的林子裏散步。」我說。米迦勒於是牽起我的手前進，黑莓叢自動往兩側分開，讓出一條小徑。我們沿著小徑來到森林裏一處能鳥瞰田野和湖泊的空地。有時候，知道天使就在身邊，散步時不用擔心害怕，是件美好的事情。但那一晚，我和米迦勒穿越森林，隱約有種被注視的感覺。但我並沒有對此多想，也沒多問米迦勒些什麼。


    隔天早上吃過早餐後，爸爸又邀喬去釣魚，他們帶著釣具出門，我在後面喊要他們帶魚回來當茶點。爸爸說他盡量，但無法保證，兩人就往湖邊走去。媽媽在庭院裏忙來忙去，照顧盆栽，我把屋子打掃乾淨後，便跟孩子們到樹木叢生的小徑散步，他們非常喜歡那片荒野之地。


    稍後，媽媽和我又帶著孩子到湖邊享受假期最後一天，也和路上遇到的人聊天。有些人跟我們一樣來度假，有些則是媽媽在這裏認識的當地人。我們抵達湖邊，看到許多家庭出遊。孩子和我在湖裏玩水，他們很喜歡撿石頭朝水裏丟去，觀看濺起的水花，感受腳邊迴盪的漣漪。該回小屋時，孩子因為捨不得，眼睛都紅了。


    沒多久，喬和爸爸帶著鱒魚回來。爸爸把鱒魚拿到外面，教孩子們如何砍掉魚頭和魚尾，清洗魚身。兩個孩子齊說：「噁。」


    「這並不難，」我告訴他們，「我小時候就學會怎麼清理魚。學會以後，就能在營火邊烤魚來吃了，很棒喔。」


    我才說完，克里斯多夫就嚷著要搭營火烤魚，可惜我們得拒絕，因為當晚就要回梅努斯了。不過我們還是在廚房裏把魚煮熟，吃掉美味的鱒魚。吃完茶點後，我們開始清理，把行李裝上車。我們回到梅努斯，媽和爸也回家去。假期結束了。


    家裏一直很清貧。以前我常問上帝：「我們該怎麼活下去？」但我們確實活了下來，雖然是勉強維持。我們靠著口袋裏的零錢和自己種的蔬菜節儉度日，更別說是買新衣了。媽媽偶爾給我們一袋衣服，我不知道她從哪兒拿到這些衣服，不過它們從來不合我的身，不是太大，就是穿起來像個老太婆。偶爾袋子裏有喬能穿的褲子或毛衣，我們總是笑說：「乞丐沒得挑。」


    有好幾次，我的訂婚戒指成了天賜之物。就跟當時愛爾蘭的許多家庭一樣，經常大排長龍的當鋪成了我們的救命恩人。我們好幾次走進當鋪，出來時手中握著錢，覺得自己像個百萬富翁。只要連買麵包、奶油來餵孩子的錢都沒了，喬就到路上舉起拇指搭便車到都柏林，口袋裏帶著我的訂婚戒指直奔當鋪，一次可以典當十英鎊左右。隔一段時間，等我們存夠錢，再把它贖回來。戒指就這樣變成了救命之物。


    隔壁一位老人家拜託喬幫忙清理房子和庭院，最後把自己的舊腳踏車送給喬當作謝禮。那輛車只需要稍加清理，修幾個小地方就能使用，我感謝上帝和天使讓我們得到這份禮物，也感謝老人能傾聽他的天使說話。也因此，喬能騎腳踏車到地毯工廠上班。


    雖然我們很缺錢，那幾年時光卻很快樂。在那些美好的日子裏，我看著孩子開心大笑，看著喬享受人生一段時間，不禁覺得活著真好。


    我流產那年的夏天，喬想到一個好主意。他跑到賽爾布里齊一家自行車店，談定每晚去幫忙清理店鋪，整理院子裏的腳踏車和零件，兩星期後，就能得到兩輛腳踏車作為報酬，成人、兒童用車各一輛。這樣一來，我們只要把歐文放在喬的自行車後面，就能全家一起出遊了。


    喬下班後接著到腳踏車店工作，回到家已經午夜時分。但一切是值得的。在第一週結束，他帶回一輛兒童腳踏車，雖然車看起來簡直像堆廢鐵，需要大幅整修。第二週過了一半，店家又給了他一輛成人用車，這一輛狀況就好多了。


    克里斯多夫非常興奮，希望盡快騎上腳踏車。在他的幫忙下，我們很快就把腳踏車整理好。當時的克里斯多夫還是個身形瘦弱的小孩，他在外面幫著父親，一邊學習為車鍊上油，修理輪輻等等各種工作，也一邊學騎腳踏車。


    我永遠記得第一次決定騎車到九公里外的多納迪亞（Donadea）野餐的那一天。喬說九公里對五歲的孩子來說不算短,所以得看克里斯多夫累壞之前能騎多遠。喬在他的車後為歐文放了椅子,我的車後則載著裝有野餐的袋子。


    我很擔心克里斯多夫,不過那實在多餘,因為他有足夠的能力騎車。我們一路上停了幾回,稍作休息,偶爾也邊走邊推車。


    之後,我們有時間就到多納迪亞野餐,度過許多美好時光。那裏有一股寧靜、祥和的氣氛,尤其是所有人都回家後的夜晚。還有一個大家稱之為湖,我卻稱爲池塘的水塘,裏面有鴨子,以及一座連接到水中小島的小橋,小島上有四棵樹和幾張野餐桌,但地面光禿禿的沒有草。


    到達小島後,我們生起小營火,然後泡茶。孩子們最喜歡坐在小島上的營火旁,四周都是水,還有鴨子在身邊走來走去討麵包吃。我們一邊喝茶吃三明治,一邊看著天上的星星。我知道不該在那裏生營火,因為附近有森林,不過我們非常小心火燭。小時候,爸爸教了我許多關於營火和在大自然中活動該注意的事情,他教我如何生火,如何安全走在河岸邊,如何游泳,還有關於水流的知識。他告訴我萬物皆有規矩。


    有一晚,我們又到多納迪亞野餐,夜空星光閃亮,高掛一輪明月,所以四周還算明亮。當時四下無人,除了我們只有鴨子。我們生起小營火,孩子一邊吃三明治,一邊玩著小男孩玩的各種遊戲。我告訴喬想獨處一下,請他看著孩子。過去這段時間,我一直感覺到有什麽東西在遙遠他方注視著我,我想要和天使談談此事。


    喬說天色太暗了,不同意我去。我回道:「我會帶著手電筒。」


    我走過小木橋，踏上前往老城堡的小徑，然後右轉到一片有許多樹木環繞的草地。我故意走入大橡樹林，這樣喬就看不見我了。我真的很想獨處，也知道他會看著我。


    天使以萊亞現身，他像一道來自樹叢間的光亮，走到草地上，呼喚我的名字。以萊亞向我伸出手，我的雙手也向他的方向舉起，他用雙手包覆了我的手。


    我們開始溝通，卻沒有說話，以萊亞傳遞著：「羅娜，他走在黑暗之中。妳不用害怕，沒有上帝的允許，他無法更靠近。妳知道我說的是誰嗎？」


    「知道，天使以萊亞，」我說，「是撒旦。他就是在黑暗中一直注視著我的人嗎？我察覺到有人，或有某種東西存在於我的生活圈外圍，存在於環繞著我的光環之外，藏身在幾百里外的另一個黑暗之圓內。過去六個月來，我一直很害怕，雖然我知道上帝和天使們會保護我。」「羅娜，妳之所以面對這些狀況，是因為有一天上帝將會讓妳在撒旦面前接受試驗。」天使以萊亞說。


    「這件事發生時，上帝會在哪裏呢？」我問道。


    「上帝將在妳的右邊，撒旦在妳的左邊。」以萊亞說。


    「上帝會在身邊給我力量，這樣就夠了。」但我內心充滿無盡的擔憂與害怕。天使以萊亞放開我的手，當我的手臂又落回身體兩側時，心底已充滿平靜與愛。以萊亞笑著指示我回頭看，然後消失無蹤。


    喬帶著孩子從我身後走來。克里斯多夫牽著他的腳踏車，喬牽著兩輛車，還帶著歐文。'
