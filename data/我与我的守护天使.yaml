  md: '「我從沒離開過妳，」祂說，「我一直和妳在一起，妳難道不知道嗎？妳感覺不到我嗎？我經常撥弄妳的頭髮呀。妳為何躲著我？」


    祂說得沒錯，有時候我會躲著祂。即使至今，我偶爾也這樣做，因為祂是那麼龐大而有力量。我轉身，感覺祂那存在於我左邊，和我一起移動的強大原力。我回道：「因為你那麼龐大，而我那麼渺小。」


    祂笑著說：「羅娜，別再躲了。走吧，我們散步去，我會為妳去除恐懼，協助妳為我完成妳今生必須做的事情。」


    我們朝著樹林走去，來到一處俯瞰湖泊的空地上，那裏有個木造農舍，我們坐在那邊的陽光下談話。


    「你知道我很害怕。」我對祂說。


    「沒什麼好害怕的，羅娜，我不會讓妳受到任何傷害。」祂說，「人們需要妳，他們的靈魂亦然，就跟我需要他們一樣需要妳。」


    「為什麼是我呢？」我熱淚盈眶問道。


    「為什麼不是妳呢？」祂回道，「妳或許只是個孩子，但妳知道的比世界上多數人更多。妳是我的人類天使，在這裏幫助眾人和他們的靈魂。盡情哭吧，我的小寶貝，我的愛之鳥。」


    我看著祂。「為什麼叫我『愛之鳥』？」


    「因為妳和妳的小鳥一樣帶著愛，妳的靈魂純淨無瑕。妳是我的愛之鳥，而我需要妳，別人也是。」'
  merge: -1
