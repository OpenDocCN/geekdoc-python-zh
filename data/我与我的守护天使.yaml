    # 好蘋果塔。


    我們進入廚房，喬的母親開始燒水，桌上已經擺好杯盤、牛奶、糖和蘋果塔。茶準備好後，我們三人坐在廚房桌邊，喬的母親迫不及待想知道每個細節。屋子裏很熱鬧，喬的家人進進出出，都想知道小屋的消息。有人說：「梅努斯還挺遠的，一想到你們要搬到鄉下，我們永遠沒法習慣。」我笑著說：「你們大概以爲我們是搬到千里之外，而非只有四十公里遠。」


    喬的母親問道：「什麼時候可以去幫你們打掃屋子？」


    喬看了我一眼，我說：「下個週末我休長週末。」喬說他也休假，所以我們決定週六上午在小屋會面。稍晚，喬送我回家，這天發生的一切讓我們很興奮。


    幾天後，喬和我決定從來錫利普走路到梅努斯，展開打掃工作。我們心情相當激奮。抵達時，柵門開著，我們四處尋找鑰匙，花了一些時間，最後喬在小屋遠端的石頭下找到。


    隔壁鄰居可能聽到我們的聲音，一位女士來到柵門前喊道：「哈囉，我是隔壁鄰居。」「哈囉，」我朝柵門處喊去，「我是羅娜。我們在六個月內結婚後，將要搬進來。」「那真是太棒了。」她開懷笑著說，「能有鄰居真是太好了，我是伊麗莎白。」


    我邀請伊麗莎白進來，我們走過雜草叢生的車道，轉向右邊沿著小屋外牆來到大門口。喬站在那裏，我介紹他是我的未婚夫。她很開心能認識他。


    「你們真是可愛的一對。」她說。


    我邀請伊麗莎白到屋裏，喬用鑰匙開了門，我們邊談邊走進屋內。'
