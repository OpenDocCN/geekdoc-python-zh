    星期一早上我走進百貨公司，儘管賣場裏有許多東西，仍然覺得裏面空空蕩蕩。經理就在賣場裏，我隨即朝她走去。她要我跟她到衣帽間，雖然我非常緊張害怕，仍然跟著去。她為我介紹法藍西絲，她負責女性流行服飾部中的裙裝部門，我將是法藍西絲的新助理。


    上班第一天我過得戰戰兢兢，尤其擔心午餐休息時間，但其實根本不需要擔心。一位在同部門工作，約莫和我同年，名叫寶琳的女孩對我說我們倆的午餐休息時間一樣，邀我和她一起吃午餐。她教我認識服裝，我們也變成了好朋友。


    從一開始，我就非常喜歡在那裏工作，喜歡面對人們，喜歡店內的氣氛。管理部門很優秀，也很有人性。在流行部門工作讓我感到如魚得水，很快地，我已經學會關於裙裝的一切。偶爾裙裝部不忙時，我也會到其他女性部門幫忙。'
