  md: '# 03

    通往天堂的階梯


    謝天謝地,表姊娜蒂解救了我們。一、兩年前,才十六歲的她因為父母雙亡,繼承了一棟屋子,她自己也只是個大小孩,卻獨自一人住在大房子裏。我不清楚那是怎樣的安排,或者是否有付房租,總之我們搬到她坐落於都柏林北端巴里曼(Ballymun)的房子,那裏離舊克爾麥罕有好幾公里遠。


    剛開始,搬家讓我很沮喪,因爲我熱愛舊克爾麥罕區,可是抵達巴里曼,看見大庭院和大房間時,我就開心了起來。最重要的是房子很牢固,絕對不會倒塌。房子二樓有三個房間,還有室內廁所和澡盆,奢華極了。一樓後方有個面對庭院的美麗長形廚房,以及起居室和娜蒂的房間,那個房間原本可能是飯廳。


    這棟房子還有個神奇的庭院,我之後見到的其他庭院沒有一個比得上它,我們在此度過許多探險時光。院裏有一堆乾草,舉辦生日派對時,大人會把糖果藏在裏面。爸爸有時間就栽種各式各樣想像得到的蔬菜,包括我們最喜歡玩爆開遊戲的豌豆,他甚至還鋪設了一大片的草莓床。


    那時家中有五個小孩,弟弟巴利還是個嬰兒,在他和我之間還有兩個妹妹海倫和愛歐'
