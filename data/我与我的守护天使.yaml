  md: '乎被巨大的冰塊或水晶塊包圍住。這個立方塊的中央是中空的，非常冰冷，我看得見自己呼出的氣息，但同時又覺得很暖和。喬沒有氣息，呼吸停止，而且嘴唇變紫。我哭求著：「天使，我還沒準備好啊！」


