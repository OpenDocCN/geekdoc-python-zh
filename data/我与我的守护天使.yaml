    金鍊子


    有個寒冷的冬天早上，喬結束夜班工作回到家，上床休息前，他先跟孩子們說讓媽媽休息一下，打算帶他們到運河去看鴨子。我從來沒見過兩個男孩和他們的小妹妹準備的動作如此迅速，他們穿上外套、戴好帽子就出門去了。


    他們一出門，我眼前忽然閃現一段關於我父母的靈視影像。我看見他們站著談話，四周似乎吹著強風，兩人很像是站在一起，但爸爸又不像真的存在，看起來像個靈體。靈視影像來得突然，去得也快。我被告知爸爸的生命即將終了，當下彷彿遭到雷擊。


    我哭了，哀求著上帝和天使，因為我深愛父親。感覺上，喬和孩子們才離開沒幾分鐘，就又回到家了。孩子們非常興奮，告訴我他們在運河看見的事物。我去泡茶時，喬對我說：


    > 「出了什麼事嗎？妳看起來非常蒼白，而且哭過。」「我看見一個靈視影像，」我對喬說，「我爸就要往生了！」「也許妳誤解了。天使怎麼說？」「他們什麼也沒說，我只是看見了影像。我哀求上帝和天使，難過到無法理解他們要說什麼。然後你和孩子們回來了。感覺上，你們好像才離開幾分鐘。」'
  - '[PAGE 212]


    喬給我一個擁抱，我覺得好過一點，試著讓自己忘記影像。雖然當下很想立刻去看看父親，卻無法成行，因為還要照顧三個孩子，而且我們也沒車。幸運的是，隔天爸爸就來探望我們。看見他，我非常開心，卻不能告訴他為什麼。


    我通常能夠看見人體內的病痛，有時候看見骨頭發出亮光，有時候心臟會跳到某人的胸前，有時候器官的周圍環繞著黑影。我仔細觀察爸爸，卻看不出哪裏有異樣，讓我感到很困惑。


    幾星期後，天氣好轉，喬在家帶孩子，我前往梅努斯學院的校園散步。我走在蘋果園和樹林間，讚美並感恩上帝，享受著散步時光，感受清新的冷風吹在臉上。我看著鳥兒和松鼠，看著一切生物，不禁笑了，因為我不僅看見牠們平常的模樣，也看見環繞著牠們的能量光芒。


    我和路上遇見的人問好，包括一位神父和一位推著娃娃車的母親。突然間，天使米迦勒出現在身邊和我並肩而行。他把手搭在我的肩上，隨後又觸碰了我的手，我的內心立即充滿平靜。「謝謝你，米迦勒，」我說，「這讓我感到很舒服。」


    米迦勒以人形模樣走在我身邊，和平常一樣，他身材高大，一頭深色頭髮，不過這回是短髮。他穿著黑色套裝、黑色外套，很容易被誤以爲神父。我看著他笑說：「我很欣賞你這神父般的模樣！」


    他假裝打了個顫，翻起外套的領子說：「這樣看起來如何？」我們都笑了。


    幾位神父手上拿著祈禱書，經過時打了聲招呼，米迦勒點頭予以回應。還有個鄰居走'
  - '[PAGE 213]


    過，我和她並不熟，她說又看見我和朋友一起散步。想到此，我不禁笑了。除了家人之外，我從未和其他人一起散步，所以她看見的是米迦勒。（我想大概有三次別人說看見我和某人走在一起，但實際上我是獨自一人。後來才明白他們看見的是化爲人形的天使。不過，這種情形或許比我所知的更爲頻繁，只是我沒察覺而已。）


    米迦勒天使說：「趁四下無人，我們到那棵大橡樹下，我來解釋妳父親的靈視影像。」「在你開始解釋前，我要先讓你知道，我很生氣。」


    米迦勒笑著：「羅娜，妳真有個性。」


    我說：「有時候上帝和你們這些天使似乎忘記了我只是個人。我怎麼會想要知道關於父親的死訊？米迦勒，我寧願什麼都不知道！」


    米迦勒以悲傷的神情看著我，握著我的手說：「妳父親需要妳的幫助來穿越死亡。」


    我深呼吸了一口氣。「我愛我爸。」


    米迦勒天使說：「我們走走吧。」他握著我的手散步，一邊繼續說。


    「還記得看見妳爸爸影像的那天，喬帶孩子到運河去嗎？上帝就是在當時把妳父親和妳的靈魂連結在一起。你們的靈魂現在已經相互交纏。幾天內，妳將會看見他從受精那一刻起的每一個生命片段，影像就像電視螢幕般在妳眼前和腦海中不斷播放。當影片停止，妳會突然感受到一股震撼，因爲他的靈魂正與妳的靈魂分離，也同時從他的身體抽離，由天使們領著到上帝身邊。」


    我走在米迦勒身邊，哭得傷心欲絕。'
  - '[PAGE 214]


    「羅娜,讓我拭去那些淚水。」天使米迦勒雙手舉到我的眼前,我才察覺我們已不再走動,而是站在光圈之中。我抽抽噎噎說:「這真的很難面對。」


    「羅娜,記得,上帝和我們這些天使將會幫助妳一起度過。」天使米迦勒手伸入我的口袋,觸碰了我的手。「我會陪妳走到小徑盡頭,然後必須離開。」


    我們沉默走著。雖然只是一小段路,我已能感受到米迦勒給我的力量,他捏緊我的手,放鬆時,他也消失了。我繼續走回家,並未告訴喬我和米迦勒天使的會面。


    一如米迦勒所預言,在幾天內,爸爸的生命史開始在我眼前和腦海裏持續不斷上演,影像時而快速時而緩慢,但始終不曾停止。我一遍又一遍看著影像,看見爸爸小時候和另一個孩子在泥巴裏玩耍;他骨瘦如柴的身形坐在書桌前的模樣;他長成青年,擁有一頭黑髮,和一位美麗的年輕女孩坐在河邊,我知道那女孩就是媽媽;也看見爸爸在舊克爾麥罕昏暗的店鋪裏修理腳踏車,還有他看見我們居住的小屋倒塌時,臉上絕望的表情,以及他搭船前往英格蘭工作時的寂寞……


    爸爸來探望我們的次數越來越頻繁,有時候甚至一大早就來了,說他只是想來看一下,喝杯茶、聊個天,停留幾分鐘就好。我好想告訴他一切,但怎麼說得出口?你無法對認識的人說他即將離開這個世界,而且你們的靈魂相連在一起,這樣你才能幫助他走過死亡。這些話太嚇人了,我們的靈性還未發展到這個程度。


    爸爸才逐漸開始認識上帝,最近這些年,他的靈性成長許多。我記得幾年前他曾對我說:「我怎麼會花這麼久的時間才發現上帝呢?」能看到爸爸的靈魂成長,是一件很美好的'
- md: '事情。他展開走向上帝的旅程，也就是從人類世界進入靈性世界的過渡期。不論宗教信仰為何，不論是否相信上帝，每個人終將走上這個旅程。對某些人來說，這是個短暫的旅程，對其他人來說，則是個長途旅行，要花上好幾年，甚至一輩子來完成。


    有一回爸爸邀請我們全家星期天一起去都柏林參加重生基督徒家庭祈禱會。喬和我異口同聲說好。


    當天稍晚，我到運河邊散步，孩子們跑在我前面玩耍，因此我有點獨處的時間可以和天使談話。我說：「哈囉，天使們。」卻邊說邊笑了起來，因為他們搔我癢，輕扯我的頭髮，我全身一陣酥麻。我請天使告訴我，爲何要花這麼久的時間才能參加這個祈禱會。自從那位來自都柏林重生基督徒祈禱會的傳教士，在媽媽家建議她帶我們參加星期天的聚會至今，已經過了好幾年。


    天使們齊聲回答：「要記得，羅娜，妳正和父親分享非常靈性的層次，也就是靈魂的夥伴關係。妳父親內心感受到想要和妳分享這個祈禱會的需求。時機成熟了。」


    歐文喊道：「媽咪！」天使像一道閃光般消失無蹤。


    我朝他們走去，兩個男孩站在一起，面帶微笑，露絲在娃娃車裏熟睡著。從他們的表情看來，我知道他們看見了某些東西。


    「什麼都不要說。」我說。


    「我不會的。」克里斯多夫回道。


    那天我們玩得很開心，餵過鴨子後就回家。


    星期天上午，爸媽在十一點四十五分來到小屋，我們全部上車。前往都柏林的路上，我坐在後座看著爸爸的身影，實在心碎。不過，一路上我也看見環繞在他四周的金色光芒。


    我記得那座禮拜堂大得像一座主教座堂，但除此之外，實在沒什麼印象。那天有許多家庭一起出席，孩子們四處跑，禮拜堂裏還擺放了食物。我整個人輕飄飄，宛如進入恍惚的神入狀態，天使扶著我走。爸爸過來說：「來吧，祈禱會就要開始了。」


    爸爸走在我前面，在前方第二排坐下，旁邊有個空位。我知道他要我跟過去，但天使另有安排。在他身後三排處，有個人移動了位置，邀我坐在他身邊，我接受了。這張椅子並未和其他排的椅子對齊，突出約三十公分，讓我能清楚看著爸爸。


    祈禱會一開始，大家先一起祈禱，然後唱頌聖歌。爸爸跟大家一樣站在椅子前面，當他站起來的那一刻，我隨即知道這就是他要和我分享的事情──看著祈禱中的他。我能感覺到周圍天使的力量。


    我不知道該如何描述眼前具體成形的影像，非常美麗純淨。我再也聽不見人們的歌聲。爸爸變得越來越明亮，最後散發出金色光芒，光芒四射。爸爸站在教堂前方，守護天使就漂浮在他上方約一公尺處。


    爸爸的靈魂從體內升起，此景讓我驚訝不已，雖然我以前也看過靈魂離開，但眼前站的不是別人，而是我的父親。爸爸的靈魂具有人形的模樣，卻是由光所組成，彷彿被包裹在一層層金色光芒之中。靈魂往上升起，不斷變大，最後形成人體四倍大的巨大光芒，不時發出閃光且輕柔擺動，他的守護天使也伴隨在旁。


    接著，爸爸的靈魂轉過身，微笑看著我，我感受到他的愛。就在此時，我發現一條在我看來如金鍊子的東西掛在爸爸的靈魂上。金鍊子從上方進入爸爸的頭頂，然後纏繞他整個軀體。出乎意料的是，金鍊子的一部分從父親的軀體延伸而出，又慢慢從空中朝我的方向移動，天使使我把頭低壓時，我看見金鍊子進入我的胸膛，將爸爸的靈魂和我的靈魂連結在一起。


    天使又抬起我的頭，我看著爸爸的靈魂小心下降，進入他的身體。人的靈魂通常完全存在於身體內，但爸爸的靈魂並沒有完全進入身體，一部分仍分離在外，略微高於他的頭部，因為他在世的日子所剩無幾。我看見爸爸的靈魂對於他身爲人的生命，具有極大的熱情與悲憫之心。


    有人在我肩膀拍了一下，請我坐下，我才發覺大家已就坐，爸爸也是，只有我還站著。我恢復神智，深吸了一口氣。突然間，我感受到天使的觸摸，默默感謝了他們。我覺得悲傷，同時又充滿喜悅。


    每當上帝或天使告訴我有人即將進入生死轉換期，我總是對生命經由死亡進入人類所謂超自然世界的過程感到驚奇。那些人或許是我多年前經常見面的人，或只是透過別人聽過的人，又或是世界上某個名人。


    看著另一個人改變生活和信仰，總會讓我不禁微笑。人們似乎無法了解自己開始改變生命時，同時也走上了重生之路。我將永遠記得爸爸的問題：爲什麼會花那麼久的時間來認識上帝？


    三月的某天早上，送兒子們上學後，我推著露絲走在回家的路上，我轉入小屋柵門，看見天使米迦勒就坐在前門階梯上。打開柵門，我開心喊著：「天使米迦勒，你閃亮得像太陽。」話才說完，米迦勒已經站在我身邊。


    「哈囉，羅娜。」他說。


    露絲醒過來，米迦勒把手指放在唇上，露出燦爛的笑容。他右手指尖觸碰露絲的臉頰，散發出光芒，露絲的眼睛又緩緩閉上，再度睡著。米迦勒把手指移開，我看見露絲的能量和他的能量交纏在一起，然後又輕緩地分開來。米迦勒天使說：「羅娜，妳知道妳父親離開人世的時間就要到了。」


    「是的，米迦勒，我知道。」我說，「看見你出現在門口，我既開心又難過，因為我明白你這回的目的。」


    我看著熟睡的露絲。米迦勒笑了：「她在我離開前不會醒來。」米迦勒握起我的手，我則落下淚來。他緊握我的手，我抬頭看著他。米迦勒光芒四射，那美麗的光芒包圍著、保護著我，一陣祥和之氣籠罩我。


    米迦勒說：「羅娜，現在妳必須用妳對父親的愛來幫助自己。接下來的兩個星期，你們的靈魂會輕輕地、慢慢地分離，連結你們靈魂的金鍊子將越來越脆弱，最後終將斷裂。」


    我仍不停哭著，但同時也仔細聽米迦勒天使所說的話。


    「米迦勒，金鍊子已經開始變得脆弱了，我感覺得到。」


    「羅娜，妳必須了解，分離的時刻來臨時，妳不可以緊握著不放。」米迦勒說。


    「我知道，米迦勒，我不會的。」「要記得，羅娜，妳所有的天使都在身邊，一刻不分離，即使當妳看不見或聽不見我們時也一樣。」


    米迦勒手舉到我的眼前又說：「讓我擦掉那些眼淚，不要再哭了！要為妳的父親感到快樂。」


    「米迦勒，」我說，「你離開之前我想問個問題。」「什麼問題，羅娜？」「我看著爸從受精到目前為止的一生，感受他所有的情感和痛苦，看見他所看見的一切，這樣做，是不是在淨化他的靈魂？那是不是我的工作？」「是的。」米迦勒回答。「不要再問了，我必須離開了，羅娜。」


    米迦勒消失的同時，露絲也醒來了。「兩星期，」我對自己說，「時間不多了。」然後深呼吸了一口氣。


    爸爸的生命影像一刻也沒停過。對我來說，那些影像沒完沒了，持續不斷，令人心碎。爸爸每天都來訪，喝杯茶，聊聊天，我則靜靜聽著，臉上帶著笑容。他談的大都是過去的回憶，有時候說說年輕時的生活，有時談著他的父母，或幾年前往生的好友亞瑟梅森。偶爾，他也會說說他和媽媽還沒結婚前的日子。


    日子一天天過去，我越來越痛苦，知道爸爸只剩下幾天就要離開這個世間，讓我非常悲痛。一天下午，接孩子們放學前，我召喚出天使，我在深層的絕望中向他們哭求，天使米迦勒、荷賽司、以萊亞和以莉莎立即出現在我面前，他們身後還跟著一群其他天使。我被包圍在他們的愛之中，給我力量與勇氣放手讓爸爸的靈魂離去，不再緊握。


    他們溫柔地說：「妳並不孤單，羅娜，現在到學校去接孩子。」喬那一天不用上班，正在庭院工作。他恰巧走進屋內：「羅娜，妳看起來非常蒼白。」我告訴他沒事，但喬說他要到學校接孩子們，好讓我休息。


    「不，」我說，「我真的很好，我們一起去接孩子。」我既疲憊又傷心，但我記得天使要我去學校接孩子。回家途中，走過梅努斯的大街時，我遇到一個大驚喜，我們遇見了爸爸！


    這是我第一次在梅努斯的街上遇見他，我知道這是天使所為。爸爸穿著我織的那件他最喜歡的粗羊毛衣，戴著那頂掛滿毛鉤的心愛釣魚帽，看起來有些迷失方向的感覺，似乎不知道自己要去哪裏，那模樣比他實際年齡五十六歲還要老。但他看見我們時很開心，我則給了他一個大擁抱。


    爸爸建議我們到附近的茶店坐坐。我坐下來看著他，發現他周圍的光芒幾乎褪盡，只剩下一點點閃光，像是一條由光組成，但又斷了無數處的線。我看見比他高許多的守護天使就站在他身後，支持著他，為他撐起軀體，讓他的身體和靈魂能守在一起。


    喝過茶後，爸爸說他不太舒服，呼吸困難。這是他第一次向我透露出生理上的不適。現在能和爸爸相處的每一刻都相當寶貴。我們陪他走回他的車，給他一個大擁抱。我以爲這將是我最後一次看見他在世的模樣。


    隔天，我在廚房水槽清洗蔬菜，天使對我耳語說：「妳爸要來見妳最後一面。」我還沒來得及召喚天使，就聽到柵門旁傳來的汽車喇叭聲。一切都以慢動作緩慢進行，我很驚訝看見爸爸已經下車，站在柵門前，看起來不想要打開柵門，不想走進來。


    我心跳非常快。他喚我到外面，說他很累，可是有強烈的慾望要把吸塵器拿給我。我要去打開柵門請他進來，但爸爸說：「不了，羅娜，我的肺很沉重，我得回家了。」他站在柵門外邊，我站在裏邊。我沒有開門。守護天使把他抱在懷裏，他周身的光芒已經非常微弱。


    我知道你會問我為何沒有打開柵門，但我只是尊重爸爸不想那麼做的意願。我們靈魂之間的連結必須打破，這就是為何爸爸不願讓我開門，他知道我們必須停留在相異的兩端。在靈性層次上，爸爸明白那道柵門不能開，但他當時還了解多少，我並不知道。我對著爸爸微笑著，伸手握住他的手，互道再見後，他就回家了。那天晚上，我告訴喬，爸爸正逐漸死去，他沒多說什麼，只是把我抱在懷裏。


    兩天後，我們的靈魂完全分離了。那天是三月十七日，聖派翠克日（St. Patrick''s Day）的早晨。喬覺得身體不適，我告訴他留在床上，不用跟孩子們和我出門去看遊行。我們吃過早餐，幫孩子準備東西去梅努斯參加遊行。到鎮上時，遊行正盛大展開，孩子們拿到了糖果，又和小丑握手，大家都非常開心。我也努力微笑，露出開心的模樣，因為我不想破壞孩子們愉快的心情。但有好幾次，我都以爲遊行漫長到永遠不會結束。


    當我終於能帶孩子們回家時，鬆了口一氣，天使米迦勒出現在我身旁。我感覺到他把手放在我的肩上。「妳並不孤單，羅娜。」他在我耳邊低語。我努力忍住不哭，因為我知道孩子們若看到我哭，也會很悲傷。


    「我覺得好空洞。」我悄悄告訴米迦勒，「爸爸已經離去了！我無法感覺到和他之間的連結，他走了。」


    「妳父親將來會以靈的模樣回來看妳。」米迦勒輕聲說：「不過那是很久以後的事了。記得你們之間所分享的連結，你們靈魂間的夥伴關係。」


    「我知道，米迦勒，只是我的人性部分覺得好悲痛。」


    天使米迦勒安靜地走在我身旁，兩個男孩在前面跑著，露絲的小腳走累了，所以坐在娃娃車裏。走到小屋柵門前不久，米迦勒把手伸入我的手中說：「羅娜，妳知道妳和上帝及天使之間的連結永遠不會斷。」


    我停下腳步看著我的天使。「米迦勒，謝謝你，我很需要聽到這些話。」


    路上有輛車開了過來，米迦勒隨即消失。我們到家後約半小時，弟弟柯爾馬克就開車抵達。我看著窗外，看見他站在柵門外，我笑了，因為他也沒有打開柵門，而是站在那裏等到我開門爲止。弟弟並不知道自己在父親的靈性祝福中也扮演了一個角色，當他走過柵門的那一刻，替代了我們父親的位置。一道光芒一閃即逝，我知道那是爸爸在說謝謝。


    「我知道，柯爾馬克，」我說，「我們的父親走了。」


    柯爾馬克說：「我是來告訴你，爸爸往生了。」


    「進來喝杯茶吧。」我說。一小時後，我們去探望媽媽。


    ## 21

    ### 給我奇蹟


    就算是有工作，錢仍然不夠用。好幾次，我們因為無法付帳單，電力被切斷。而且克里斯多夫需要吃無麩質飲食，這表示我不能買便宜品牌的食物。我經常感謝天使讓我們擁有庭院，因為能自己種菜對我們幫助極大。在我腦海深處，那種遭人注視的模糊感覺一直存在著，有時候一想到以萊亞在多納迪亞湖畔野餐那晚提到撒旦即將測試我一事，就感到害怕。我盡量不去想，希望事情不會發生，但內心深處知道那是遲早的事。


    喬終於遭到地毯工廠解雇，廠方說他們也解雇其他人，但我相信喬是因為健康狀況和長期缺席而遭到解雇。他在愛爾蘭大眾運輸公司找到臨時工作。通常他得走到主要幹道搭便車去上班，有時候運氣好，有時候則要花好幾小時才能抵達公司，所以他總是提早出門。


    有天早上他搭便車，結果出了車禍，司機沒事，但喬嚴重腦震盪。他在醫院住了幾天，被診斷出患有糖尿病。以萊亞曾經展現給我看的靈視影像正逐一實現。喬再也不曾回到運輸公司上班。


    十一月底，聖誕節越來越近，我們幾乎沒有錢可以在餐桌擺上食物，或讓柴火繼續燃燒。有一天我在大雨中到庭院採甘藍菜芽，一個個放到袋子裏。我全身濕答答，覺得自己很悲慘，也很氣天使。「我們沒法只靠著蔬菜生活！」我淚流滿面對他們大叫。突然間，我看見一隻發光的手伸入袋子，一抬頭，是天使荷賽司，他看起來跟我一樣濕淋淋，我不禁笑了，覺得好多了。


    「荷賽司，你知道情況有多糟嗎？我們沒有東西可以讓孩子們過聖誕節。我需要奇蹟，除了蔬菜，我們沒有其他食物，而且電力又被切斷。我甚至沒法拿訂婚戒指去當鋪，因為已經當掉，我和喬大概再也無法籌到足夠的錢把戒指贖回來。」


    荷賽司伸手捧著我的臉。我看著他的眼睛，感覺就像看著天堂。


    「羅娜，我們一直在人們耳邊細語，可是有時候要他們聽進去很困難。」「為什麼別人沒法像我這樣聽見天使的聲音，荷賽司？」我問道。


    「羅娜，他們事實上有聽見天使說話，但往往覺得那是個傻想法，所以對這些請求置若罔聞。如果發現有人對我們請求協助他人的耳邊細語有點反應，我們就會加以鼓勵，使他們內心產生信心。人們總是怕自己鬧笑話，可是幫助別人不會讓他們鬧出任何笑話。」


    「荷賽司，我要祈禱人們能夠聽見天使的聲音。」


    荷賽司消失後，我回到小屋。過了幾天，距聖誕節只剩兩星期，我下坡去學校接孩子們，一輛車經過我身邊又停了下來。車裏有一男一女，男人搖下窗戶打招呼。最初我以爲他們要問方向，但是當我往車裏看時，隱約看見他們的守護天使。


    「我們知道妳有兩個男孩。」男人說。


    這時候，他的妻子下車，打開行李箱，拿出一個白色的大袋子說：「這些是聖誕老公公'
  mdcn: '事情。他展開走向上帝的旅程，也就是從人類世界進入靈性世界的過渡期。不論宗教信仰為何，不論是否相信上帝，每個人終將走上這個旅程。對某些人來說，這是個短暫的旅程，對其他人來說，則是個長途旅行，要花上好幾年，甚至一輩子來完成。


    有一回爸爸邀請我們全家星期天一起去都柏林參加重生基督徒家庭祈禱會。喬和我異口同聲說好。


    當天稍晚，我到運河邊散步，孩子們跑在我前面玩耍，因此我有點獨處的時間可以和天使談話。我說：「哈囉，天使們。」卻邊說邊笑了起來，因為他們搔我癢，輕扯我的頭髮，我全身一陣酥麻。我請天使告訴我，爲何要花這麼久的時間才能參加這個祈禱會。自從那位來自都柏林重生基督徒祈禱會的傳教士，在媽媽家建議她帶我們參加星期天的聚會至今，已經過了好幾年。


    天使們齊聲回答：「要記得，羅娜，妳正和父親分享非常靈性的層次，也就是靈魂的夥伴關係。妳父親內心感受到想要和妳分享這個祈禱會的需求。時機成熟了。」


    歐文喊道：「媽咪！」天使像一道閃光般消失無蹤。


    我朝他們走去，兩個男孩站在一起，面帶微笑，露絲在娃娃車裏熟睡著。從他們的表情看來，我知道他們看見了某些東西。


    「什麼都不要說。」我說。


    「我不會的。」克里斯多夫回道。


    那天我們玩得很開心，餵過鴨子後就回家。


    星期天上午，爸媽在十一點四十五分來到小屋，我們全部上車。前往都柏林的路上，我坐在後座看著爸爸的身影，實在心碎。不過，一路上我也看見環繞在他四周的金色光芒。


    我記得那座禮拜堂大得像一座主教座堂，但除此之外，實在沒什麼印象。那天有許多家庭一起出席，孩子們四處跑，禮拜堂裏還擺放了食物。我整個人輕飄飄，宛如進入恍惚的神入狀態，天使扶著我走。爸爸過來說：「來吧，祈禱會就要開始了。」


    爸爸走在我前面，在前方第二排坐下，旁邊有個空位。我知道他要我跟過去，但天使另有安排。在他身後三排處，有個人移動了位置，邀我坐在他身邊，我接受了。這張椅子並未和其他排的椅子對齊，突出約三十公分，讓我能清楚看著爸爸。


    祈禱會一開始，大家先一起祈禱，然後唱頌聖歌。爸爸跟大家一樣站在椅子前面，當他站起來的那一刻，我隨即知道這就是他要和我分享的事情──看著祈禱中的他。我能感覺到周圍天使的力量。


    我不知道該如何描述眼前具體成形的影像，非常美麗純淨。我再也聽不見人們的歌聲。爸爸變得越來越明亮，最後散發出金色光芒，光芒四射。爸爸站在教堂前方，守護天使就漂浮在他上方約一公尺處。


    爸爸的靈魂從體內升起，此景讓我驚訝不已，雖然我以前也看過靈魂離開，但眼前站的不是別人，而是我的父親。爸爸的靈魂具有人形的模樣，卻是由光所組成，彷彿被包裹在一層層金色光芒之中。靈魂往上升起，不斷變大，最後形成人體四倍大的巨大光芒，不時發出閃光且輕柔擺動，他的守護天使也伴隨在旁。


    接著，爸爸的靈魂轉過身，微笑看著我，我感受到他的愛。就在此時，我發現一條在我看來如金鍊子的東西掛在爸爸的靈魂上。金鍊子從上方進入爸爸的頭頂，然後纏繞他整個軀體。出乎意料的是，金鍊子的一部分從父親的軀體延伸而出，又慢慢從空中朝我的方向移動，天使使我把頭低壓時，我看見金鍊子進入我的胸膛，將爸爸的靈魂和我的靈魂連結在一起。


    天使又抬起我的頭，我看著爸爸的靈魂小心下降，進入他的身體。人的靈魂通常完全存在於身體內，但爸爸的靈魂並沒有完全進入身體，一部分仍分離在外，略微高於他的頭部，因為他在世的日子所剩無幾。我看見爸爸的靈魂對於他身爲人的生命，具有極大的熱情與悲憫之心。


    有人在我肩膀拍了一下，請我坐下，我才發覺大家已就坐，爸爸也是，只有我還站著。我恢復神智，深吸了一口氣。突然間，我感受到天使的觸摸，默默感謝了他們。我覺得悲傷，同時又充滿喜悅。


    每當上帝或天使告訴我有人即將進入生死轉換期，我總是對生命經由死亡進入人類所謂超自然世界的過程感到驚奇。那些人或許是我多年前經常見面的人，或只是透過別人聽過的人，又或是世界上某個名人。


    看著另一個人改變生活和信仰，總會讓我不禁微笑。人們似乎無法了解自己開始改變生命時，同時也走上了重生之路。我將永遠記得爸爸的問題：爲什麼會花那麼久的時間來認識上帝？


    三月的某天早上，送兒子們上學後，我推著露絲走在回家的路上，我轉入小屋柵門，看見天使米迦勒就坐在前門階梯上。打開柵門，我開心喊著：「天使米迦勒，你閃亮得像太陽。」話才說完，米迦勒已經站在我身邊。


    「哈囉，羅娜。」他說。


    露絲醒過來，米迦勒把手指放在唇上，露出燦爛的笑容。他右手指尖觸碰露絲的臉頰，散發出光芒，露絲的眼睛又緩緩閉上，再度睡著。米迦勒把手指移開，我看見露絲的能量和他的能量交纏在一起，然後又輕緩地分開來。米迦勒天使說：「羅娜，妳知道妳父親離開人世的時間就要到了。」


    「是的，米迦勒，我知道。」我說，「看見你出現在門口，我既開心又難過，因為我明白你這回的目的。」


    我看著熟睡的露絲。米迦勒笑了：「她在我離開前不會醒來。」米迦勒握起我的手，我則落下淚來。他緊握我的手，我抬頭看著他。米迦勒光芒四射，那美麗的光芒包圍著、保護著我，一陣祥和之氣籠罩我。


    米迦勒說：「羅娜，現在妳必須用妳對父親的愛來幫助自己。接下來的兩個星期，你們的靈魂會輕輕地、慢慢地分離，連結你們靈魂的金鍊子將越來越脆弱，最後終將斷裂。」


    我仍不停哭著，但同時也仔細聽米迦勒天使所說的話。


    「米迦勒，金鍊子已經開始變得脆弱了，我感覺得到。」


    「羅娜，妳必須了解，分離的時刻來臨時，妳不可以緊握著不放。」米迦勒說。


    「我知道，米迦勒，我不會的。」「要記得，羅娜，妳所有的天使都在身邊，一刻不分離，即使當妳看不見或聽不見我們時也一樣。」


    米迦勒手舉到我的眼前又說：「讓我擦掉那些眼淚，不要再哭了！要為妳的父親感到快樂。」


    「米迦勒，」我說，「你離開之前我想問個問題。」「什麼問題，羅娜？」「我看著爸從受精到目前為止的一生，感受他所有的情感和痛苦，看見他所看見的一切，這樣做，是不是在淨化他的靈魂？那是不是我的工作？」「是的。」米迦勒回答。「不要再問了，我必須離開了，羅娜。」


    米迦勒消失的同時，露絲也醒來了。「兩星期，」我對自己說，「時間不多了。」然後深呼吸了一口氣。


    爸爸的生命影像一刻也沒停過。對我來說，那些影像沒完沒了，持續不斷，令人心碎。爸爸每天都來訪，喝杯茶，聊聊天，我則靜靜聽著，臉上帶著笑容。他談的大都是過去的回憶，有時候說說年輕時的生活，有時談著他的父母，或幾年前往生的好友亞瑟梅森。偶爾，他也會說說他和媽媽還沒結婚前的日子。


    日子一天天過去，我越來越痛苦，知道爸爸只剩下幾天就要離開這個世間，讓我非常悲痛。一天下午，接孩子們放學前，我召喚出天使，我在深層的絕望中向他們哭求，天使米迦勒、荷賽司、以萊亞和以莉莎立即出現在我面前，他們身後還跟著一群其他天使。我被包圍在他們的愛之中，給我力量與勇氣放手讓爸爸的靈魂離去，不再緊握。


    他們溫柔地說：「妳並不孤單，羅娜，現在到學校去接孩子。」喬那一天不用上班，正在庭院工作。他恰巧走進屋內：「羅娜，妳看起來非常蒼白。」我告訴他沒事，但喬說他要到學校接孩子們，好讓我休息。


    「不，」我說，「我真的很好，我們一起去接孩子。」我既疲憊又傷心，但我記得天使要我去學校接孩子。回家途中，走過梅努斯的大街時，我遇到一個大驚喜，我們遇見了爸爸！


    這是我第一次在梅努斯的街上遇見他，我知道這是天使所為。爸爸穿著我織的那件他最喜歡的粗羊毛衣，戴著那頂掛滿毛鉤的心愛釣魚帽，看起來有些迷失方向的感覺，似乎不知道自己要去哪裏，那模樣比他實際年齡五十六歲還要老。但他看見我們時很開心，我則給了他一個大擁抱。


    爸爸建議我們到附近的茶店坐坐。我坐下來看著他，發現他周圍的光芒幾乎褪盡，只剩下一點點閃光，像是一條由光組成，但又斷了無數處的線。我看見比他高許多的守護天使就站在他身後，支持著他，為他撐起軀體，讓他的身體和靈魂能守在一起。


    喝過茶後，爸爸說他不太舒服，呼吸困難。這是他第一次向我透露出生理上的不適。現在能和爸爸相處的每一刻都相當寶貴。我們陪他走回他的車，給他一個大擁抱。我以爲這將是我最後一次看見他在世的模樣。


    隔天，我在廚房水槽清洗蔬菜，天使對我耳語說：「妳爸要來見妳最後一面。」我還沒來得及召喚天使，就聽到柵門旁傳來的汽車喇叭聲。一切都以慢動作緩慢進行，我很驚訝看見爸爸已經下車，站在柵門前，看起來不想要打開柵門，不想走進來。


    我心跳非常快。他喚我到外面，說他很累，可是有強烈的慾望要把吸塵器拿給我。我要去打開柵門請他進來，但爸爸說：「不了，羅娜，我的肺很沉重，我得回家了。」他站在柵門外邊，我站在裏邊。我沒有開門。守護天使把他抱在懷裏，他周身的光芒已經非常微弱。


    我知道你會問我為何沒有打開柵門，但我只是尊重爸爸不想那麼做的意願。我們靈魂之間的連結必須打破，這就是為何爸爸不願讓我開門，他知道我們必須停留在相異的兩端。在靈性層次上，爸爸明白那道柵門不能開，但他當時還了解多少，我並不知道。我對著爸爸微笑著，伸手握住他的手，互道再見後，他就回家了。那天晚上，我告訴喬，爸爸正逐漸死去，他沒多說什麼，只是把我抱在懷裏。


    兩天後，我們的靈魂完全分離了。那天是三月十七日，聖派翠克日（St. Patrick''s Day）的早晨。喬覺得身體不適，我告訴他留在床上，不用跟孩子們和我出門去看遊行。我們吃過早餐，幫孩子準備東西去梅努斯參加遊行。到鎮上時，遊行正盛大展開，孩子們拿到了糖果，又和小丑握手，大家都非常開心。我也努力微笑，露出開心的模樣，因為我不想破壞孩子們愉快的心情。但有好幾次，我都以爲遊行漫長到永遠不會結束。


    當我終於能帶孩子們回家時，鬆了口一氣，天使米迦勒出現在我身旁。我感覺到他把手放在我的肩上。「妳並不孤單，羅娜。」他在我耳邊低語。我努力忍住不哭，因為我知道孩子們若看到我哭，也會很悲傷。


    「我覺得好空洞。」我悄悄告訴米迦勒，「爸爸已經離去了！我無法感覺到和他之間的連結，他走了。」


    「妳父親將來會以靈的模樣回來看妳。」米迦勒輕聲說：「不過那是很久以後的事了。記得你們之間所分享的連結，你們靈魂間的夥伴關係。」


    「我知道，米迦勒，只是我的人性部分覺得好悲痛。」


    天使米迦勒安靜地走在我身旁，兩個男孩在前面跑著，露絲的小腳走累了，所以坐在娃娃車裏。走到小屋柵門前不久，米迦勒把手伸入我的手中說：「羅娜，妳知道妳和上帝及天使之間的連結永遠不會斷。」


    我停下腳步看著我的天使。「米迦勒，謝謝你，我很需要聽到這些話。」


    路上有輛車開了過來，米迦勒隨即消失。我們到家後約半小時，弟弟柯爾馬克就開車抵達。我看著窗外，看見他站在柵門外，我笑了，因為他也沒有打開柵門，而是站在那裏等到我開門爲止。弟弟並不知道自己在父親的靈性祝福中也扮演了一個角色，當他走過柵門的那一刻，替代了我們父親的位置。一道光芒一閃即逝，我知道那是爸爸在說謝謝。


    「我知道，柯爾馬克，」我說，「我們的父親走了。」


    柯爾馬克說：「我是來告訴你，爸爸往生了。」


    「進來喝杯茶吧。」我說。一小時後，我們去探望媽媽。


    ## 21

    ### 給我奇蹟


    就算是有工作，錢仍然不夠用。好幾次，我們因為無法付帳單，電力被切斷。而且克里斯多夫需要吃無麩質飲食，這表示我不能買便宜品牌的食物。我經常感謝天使讓我們擁有庭院，因為能自己種菜對我們幫助極大。在我腦海深處，那種遭人注視的模糊感覺一直存在著，有時候一想到以萊亞在多納迪亞湖畔野餐那晚提到撒旦即將測試我一事，就感到害怕。我盡量不去想，希望事情不會發生，但內心深處知道那是遲早的事。


    喬終於遭到地毯工廠解雇，廠方說他們也解雇其他人，但我相信喬是因為健康狀況和長期缺席而遭到解雇。他在愛爾蘭大眾運輸公司找到臨時工作。通常他得走到主要幹道搭便車去上班，有時候運氣好，有時候則要花好幾小時才能抵達公司，所以他總是提早出門。


    有天早上他搭便車，結果出了車禍，司機沒事，但喬嚴重腦震盪。他在醫院住了幾天，被診斷出患有糖尿病。以萊亞曾經展現給我看的靈視影像正逐一實現。喬再也不曾回到運輸公司上班。


    十一月底，聖誕節越來越近，我們幾乎沒有錢可以在餐桌擺上食物，或讓柴火繼續燃燒。有一天我在大雨中到庭院採甘藍菜芽，一個個放到袋子裏。我全身濕答答，覺得自己很悲慘，也很氣天使。「我們沒法只靠著蔬菜生活！」我淚流滿面對他們大叫。突然間，我看見一隻發光的手伸入袋子，一抬頭，是天使荷賽司，他看起來跟我一樣濕淋淋，我不禁笑了，覺得好多了。


    「荷賽司，你知道情況有多糟嗎？我們沒有東西可以讓孩子們過聖誕節。我需要奇蹟，除了蔬菜，我們沒有其他食物，而且電力又被切斷。我甚至沒法拿訂婚戒指去當鋪，因為已經當掉，我和喬大概再也無法籌到足夠的錢把戒指贖回來。」


    荷賽司伸手捧著我的臉。我看著他的眼睛，感覺就像看著天堂。


    「羅娜，我們一直在人們耳邊細語，可是有時候要他們聽進去很困難。」「為什麼別人沒法像我這樣聽見天使的聲音，荷賽司？」我問道。


    「羅娜，他們事實上有聽見天使說話，但往往覺得那是個傻想法，所以對這些請求置若罔聞。如果發現有人對我們請求協助他人的耳邊細語有點反應，我們就會加以鼓勵，使他們內心產生信心。人們總是怕自己鬧笑話，可是幫助別人不會讓他們鬧出任何笑話。」


    「荷賽司，我要祈禱人們能夠聽見天使的聲音。」


    荷賽司消失後，我回到小屋。過了幾天，距聖誕節只剩兩星期，我下坡去學校接孩子們，一輛車經過我身邊又停了下來。車裏有一男一女，男人搖下窗戶打招呼。最初我以爲他們要問方向，但是當我往車裏看時，隱約看見他們的守護天使。


    「我們知道妳有兩個男孩。」男人說。


    這時候，他的妻子下車，打開行李箱，拿出一個白色的大袋子說：「這些是聖誕老公公'
