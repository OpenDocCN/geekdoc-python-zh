  raw:
  - '[PAGE 120]


    子，也就是馬克遭槍殺的地方。


    一下班，我衝到衣帽間拿了外套，就上樓跑到停車場。喬已經坐在車裏等我。看到他，我非常開心。我們開車到鳳凰公園，停好車後，喬說，如果我願意，可以週末去看戒指。我說那樣不錯，不過只是去看看，不要買。天使已經告訴過我，喬會幫我找到戒指，但並非透過一般管道。


    喬問我是否要告訴他母親訂婚的消息。我說不要，我寧願等到有訂婚戒指後再說。我們倆都同意這麼做。喬說：「當她看見妳戴著戒指走進屋裏，一定會為我們感到高興。」


    雖然我們計畫一年後才結婚，不過已決定要開始尋找住的地方。


    車子才開到家門前，大門便打開，爸爸走出來對我們揮揮手，又走回屋裏，而且把門開著。這讓喬感到舒服些，覺得自己多少受到歡迎。我們直接走進廚房，媽媽就在那裏。喬向她問候，我則開始泡茶。


    「有什麼事嗎？」媽媽問道。


    「喬想跟爸爸談談。」我回答。


    「我早就等著這一天。」媽媽臉上的表情明顯不贊同這門親事。「妳爸在餐廳看報紙，我去告訴他。」她帶著不屑一顧的口吻說，然後走進餐廳，把門也順便帶上，這讓喬更加緊張。「為什麼事情不能單純點？」他問道。


    媽媽很快回來，告訴喬可以去跟爸爸談。我沖了茶，在麵包上塗奶油和果醬。媽媽留在廚房裏，不發一語，隨後又離開廚房，走進餐廳。


    母愛天使 120'
  - '[PAGE 121]


    五分鐘後，我準備好餐盤，把食物端到餐廳。我覺得喬需要我的支持，所以沒有等到他

    出來，反正我也迫不及待想知道爸爸的反应。


    我開門走進餐廳，爸爸和喬坐在沙發上，媽媽站在一旁，還是沒有坐下。我看見喬和爸

    爸坐在一起時，不禁笑了，因為他們看起來很開心。爸爸站起身，笑容滿面恭喜我，還給我

    一個擁抱。我終於不再擔心，非常快樂，連媽媽的反應也不足以減損那一刻的分毫喜悅。


    爸爸很高興我將結婚，而且是嫁給一個值得信賴的好青年。某種程度上，他或許因為不

    需要再為我負責而感到寬慰，我覺得媽媽也放心了，雖然她很難將此表達出來。那晚，爸爸

    說了這麼一句話：「沒想到我能活著見到這一天。」


    儘管我已經訂婚，而且即將結婚，但從他們看我的眼神中，我明白他們仍然有些憂慮。

    爸爸問起喬和我許多關於未來的問題。在此之前一言不語的媽媽，則問我們是否選定了結婚

    的日子，我們不約而同回答：「還沒。」


    「也許明年八月。」喬提議。

    「我們就在家裏接待客人。」媽媽說。


    我沒答話，但是這樣的提議讓我驚恐不已。爸爸說：「這事稍後再說。」

    不過我們沒再提起請客的事。喝完茶，喬跟爸媽道別後，我們走到車邊。喬說：「別擔

    心，如果妳不想在家裏接待客人，我們就去找飯店。」


    那個週末，喬和我開始尋找訂婚戒指，但我在珠寶店內都沒看到喜歡的款式。我告訴

    喬：「我想要找個與眾不同的戒指。可是不論哪家珠寶店，訂婚戒指的款式全大同小異。我'
  - '[PAGE 122]


    願意等，直到找到我想要的戒指為止。」「妳確定嗎？」他問道。


    六個星期後，我某天晚上加班，當晚喬也要在加油站盤點，所以我沒有打算和喬見面，但是下班後趕搭八點鐘的公車時，卻喜見喬就站在停車場的車子旁。「走吧，我們去吃冰淇淋。」他說。


    「真愛開玩笑，」我對他說，「我還穿著制服，怎麼能去吃冰淇淋？」「沒關係的，妳看起來很漂亮。走吧，去吃冰淇淋。」


    我們手牽手走到冰淇淋店，面對面坐在最愛的座位上，我點了香蕉船，喬點聖代。吃到一半時，喬手伸入夾克口袋，一邊說：「我有個大驚喜要送妳。」他拿出一個小盒子，打開之後，我簡直不敢相信！那是一個非常漂亮的訂婚戒指，有金黃色的玫瑰花瓣，中間還鑲了一顆鑽石，跟我見過的戒指完全不同。喬握著我的手，把戒指戴上，說：「我愛妳，我想娶妳，和妳一起到老。」


    聽到喬說這些話，我淚水盈眶，非常開心，但又想起多年前天使以萊亞說過的話：我們會結婚，喬會生病，我必須照顧他，我們無法一起到老。「別哭。」喬親吻我的手。我看著他的眼睛，看見了他的快樂，也忘記了未來。我傾身越過桌面，親吻了喬，問他是在哪裏找到戒指。「妳一定不會相信，」他說，「在加油站找到的。今天我們很忙，我在外面幫忙加油，一輛車開進來要修理爆胎。我換了輪胎，把車胎拿到後面去修。我站在他的車旁告訴他輪胎二'
  - '[PAGE 123]


    十分鐘就會修好時，注意到他後座堆滿小抽屜式的盒子。」

    喬問他那些奇怪的盒子是什麼，那人說他是個珠寶商。喬繼續說：「我告訴他，我正在找一只訂婚戒指，要不同於普通款式。那人說他有一小盒新設計款珠寶，其中有些是戒指。他打開盒子，我一看見這只戒指，就知道妳一定會喜歡。我問他能否賣給我，他無法作主。我們到辦公室裏打電話給他老闆時，我讓妳爸爸看了戒指。他說我做得很好，這只戒指很漂亮，會讓妳很開心。那人講完電話，告訴我沒問題。」

    我開心地笑了。「不要告訴我你花了多少錢，我不想知道。謝謝你爲我找到這麼美麗的訂婚戒指。」


    我非常興奮，走回停車場的路上，整個人輕飄飄的。「我等不及要讓媽和家人看到我的戒指。」我不記得回家的路程，只記得喬跟在我後面，從後門走進廚房。廚房裏沒有人，我打開往餐廳的門。爸爸說：「怎麼這麼久才到家？」

    「我不用讓你看我的訂婚戒指了，因爲你已經看過。」爸爸笑了，走過來給我一個大擁抱。我把戒指給媽媽看，請她許個願望。媽媽也擁抱我說：「真是精美。」

    喬喝了杯茶才啓程回家，我告訴他：「明天下班前，先別告訴你媽我們訂婚的消息，就跟平常一起到你家吃飯，再給她一個驚喜。看看她是否注意到我手上的戒指。」

    隔天一切照計畫進行。我們在餐桌前坐下，喬的母親爲我端來晚餐時，發出一聲尖叫：「羅娜，妳戴上了訂婚戒指！站起來讓我抱抱未來的媳婦兒。」喬的母親總是讓我感到備受歡迎。'
  - '[PAGE 124]


    沒想到幾分鐘內，住在附近的親友開始打電話來道賀；一小時內，住在遠一點的親戚也陸續抵達。很少事情是因為我而引發騷動，我喜歡這種興奮的騷動感。


    十一點左右，我告訴喬該載我回家了，明天早上還要上班。跟喬的母親道別時，她緊緊擁抱我。我感受到她內心的喜悅和快樂，現在小兒子訂婚了，她的夢想實現，因此內心平靜許多。她把我抱得好緊，我不僅看到也感受到她的天使同時擁抱著我。車子發動後，喬的母親仍在門口揮手，她的守護天使也在一旁揮手，閃爍著光芒。


    車開上路後，我在座位上轉身往後看，不願失去喬的母親和她守護天使的身影，但其實我只看得見天使的光芒。喬笑我說：「妳想做什麼？把整張椅子翻轉過來嗎？」


    「我想看著你母親對我們揮手，直到她身影消失。」


    車子行進間，喬說：「妳有點安靜。」


    「我只是在想，明天戴著訂婚戒指上班時，如果像在你家那樣引起騷動，我會覺得很困窘。我既害羞又緊張，卻又迫不及待想讓那些女孩看見戒指。」


    我很快就到家，正要下車，喬說：「回來，給我一個吻。明天好好享受工作，讓大家看妳的戒指。下班後見。」道別後，我走進一片漆黑的屋內，躡手躡腳走上樓，安靜無聲地進房，上了床。但那晚我太興奮，所以沒睡好，覺得天亮遙遙無期。


    我比平日更早起床，好搭早一班公車，希望同部門其他女孩還沒抵達前，薇樂莉已經先到，這樣就能讓她看戒指，跟她分享我的喜悅。但我還是非常害羞，走到百貨公司後門，先深呼吸了一口氣才進去。'
  - '[PAGE 125]


    我下樓到衣帽間更衣，打卡上班。衣帽間是個正方形空間，四周和中間有很多排置物櫃把空間隔開。我繞著置物櫃走，找到了薇樂莉。她一看見我就從椅子上跳起來說：「妳臉上的表情已經告訴我了，快讓我看看妳的訂婚戒指。」


    「我答應過先讓妳看戒指，我做到我的承諾，妳也信守承諾沒告訴別人。」我對她說，「妳可以許下第一個願望。」


    薇樂莉從我手上輕柔地摘下戒指，戴在自己手上，然後閉起眼睛，把戒指朝自己轉三圈，嘴唇無聲喃喃。我清楚看見她的天使，還有我的天使的一部分，因為他站在我的身後。我抬頭向上看，兩位天使頭部相觸；往下看去，他們的腳也互相碰觸，彼此開始纏繞。我守護天使的翅膀朝薇樂莉守護天使的翅膀張開，交纏成橢圓形，我們腳下的地板消失了。薇樂莉張開雙眼，我感受到一股美好的寧靜氣息，不知道她是否也感受到了。她深吸一口氣，露出美麗的笑容對我說：「謝謝妳，羅娜。」


    更多女孩進來上班。我被恭喜的人群包圍，她們紛紛伸出手來想看戒指，並且許下願望。寶琳特別興奮，她是個浪漫的女孩，喜歡聽美好的愛情故事。她曾短暫見過喬，認為喬很英俊，也爲我感到高興。


    得到這麼多注意，讓我很激動。我請求天使盡可能讓願望成真，尤其是朋友們的願望，因為我知道她們有許多願望，她們不只爲自己許願，也爲家人朋友許願。


    主管走進衣帽間說：「這騷動是怎麼回事？也讓我看看。」


    她擠過還在許願的女孩，問道：「是誰訂婚了？」'
  - '[PAGE 126]


    「羅娜。」大家異口同聲。

    「下一個換我許願，小姐們。」說完，她從另一位女孩手中拿到戒指，不管前面還有很多人在排隊，把戒指戴上後許了一個願望。

    「恭喜妳，羅娜。各位小姐們，上樓工作去了。」

    她們也取笑她一番，她笑了起來。「羅娜，這只戒指真漂亮，」她對我說，「他叫什麼名字。」「喬。」我說。

    「祝妳和喬擁有全世界的幸福快樂。婚期訂在何時呢？」「我們計畫或許在明年八月，還沒決定好。」我答道。

    「我的忠告是不要草率決定，要給自己足夠時間思考。現在，該去上班了。」「那天稍後，我在販賣部排隊等茶時，櫃台後的女孩們也對我說：「羅娜，聽說妳訂婚了，恭喜。」


    販賣部主管建議大家休息時間，都到我那一桌去看戒指和許願。接下來整個星期情況大致如此。大家為我和喬感到高興，這讓我很開心。那天下班時，連停車場的保全人員都在喬來接我時恭喜他。這一輩子我第一次感覺自己是焦點中心。但爸媽一直沒有跟我們好好討論婚禮的計畫。事實上，他們似乎一點也不感興趣。

    和喬討論過之後，我決定邀請寶琳當伴娘。我知道她會非常開心，也能在那一天給我支持。寶琳和我有點像，一樣安靜。流行服飾部門的女孩下班後，通常會一起上酒吧，寶琳和'
  - '[PAGE 127]


    我對此不感興趣。


    隔天我告訴媽媽，想邀請寶琳擔任伴娘，雖然我還沒問過寶琳。媽媽似乎很驚訝，還建議讓我弟弟巴利當伴郎。當晚喬和我談論婚禮的事情。喬知道家人的反應讓我不太開心，他想跟爸媽談一談，但是我說：「不用了，可能的話，我不希望他們為婚禮花太多錢。」我們自己也在努力省錢想買房子，所以也不想花太多錢在婚禮上。


    喬給我一個大擁抱，並說：「我們約教區神父見面，把婚禮日期訂下來。」


    對於我們的婚禮，喬的家人反應完全不同。他母親問我要邀請哪些朋友，我告訴她我想邀請寶琳、薇樂莉和瑪麗，但不知道她們若發現我們是在家裏請客，會作何感想。我告訴她：「我在百貨公司工作之後，也有幾個女孩結婚，不過婚宴全在飯店舉行。我母親打算在家裏舉辦，我不想告訴她我覺得很失望，因為不希望她傷心。喬和我決定，可以的話，不要讓我父母在婚禮上花太多錢。」


    喬的母親回說：「別擔心，我們會幫忙分擔。」


    接著，事情似乎逐步成形。幾星期後某天，我在公司販賣部和薇樂莉及瑪麗一起用餐，她們問我婚期是否決定了。「是的，八月十八日，我想邀請妳們。」


    她們開心詢問婚宴地點，我回說尚未決定，因為我不想讓她們知道婚宴將在家裏舉行。


    那天稍後，我詢問寶琳是否願意當伴娘，她說很榮幸。我告訴她喬的姊姊芭芭拉會幫她製作禮服。'
  - '[PAGE 128]


    # 12


    ### 鄉間小屋


    我開始鼓勵喬到外面找工作，這樣才能獨立。我們需要自力更生。「去跟爸談談，他會給你不錯的建議。」


    喬毫無困難就找到新工作，在愛爾蘭大眾運輸公司。新工作使喬下班後無法常來接我，所以我大都搭公車回家。有一晚，我穿過後門要進屋時，感覺到有事要發生。


    我注意到爸爸的《愛爾蘭時報》（Irish Times）放在餐桌上。天使要我翻開報紙，我很遲疑，最後還是拉出椅子坐下來。我的手在抖，自己的行動宛如慢動作放映。我很害怕天使要看報紙上某則災難消息。


    「羅娜，不用害怕，」天使說，「妳只要翻閱報紙，我們會告訴妳什麼時候停。」


    我一頁一頁慢慢翻過報紙，感覺到天使荷賽司的手就放在我肩上。


    「這裏，」他在我耳邊細語，「看看那些三要賣的房子。」


    我看著幾百筆房屋銷售訊息，不懂這一頁對我有什麼意義，一切都亂七八糟、毫無章法。我抬起頭，桌邊竟圍了一圈天使。真是奇特的景象！我不禁笑了。


    「哈囉。」天使以萊亞就坐在我對面。他手伸到報紙上，指尖觸碰頁面，一切馬上變得清'
  - '[PAGE 129]


    晰明瞭。「現在妳看看，羅娜。」他說。我看見了這行字：「梅努斯（Maynooth）小屋出售」。

    「羅娜，一棟有大庭院的小屋子，」以萊亞說，「對妳和喬來說太完美了！往下看。」

    小廣告只有三行字，我繼續讀著：「出售、拍賣，還有電話號碼。」

    「羅娜，把廣告圈起來，撕下這一頁。」我把剪下來的廣告放在口袋裏。「等你準備好，就把廣告給妳爸爸看，他會幫忙的。」以萊亞說。

    我好高興，淚水在眼眶裏打轉。天使以萊亞站起身，伸出手，指尖輕觸我的淚水。「喜悅的眼淚。」他說。接著，天使一一消失不見。

    隔天在運河邊散步時，我把梅努斯小屋出售的廣告拿給喬看。

    「等爸爸今天釣魚回來，我來跟他說。」我說。

    我把報紙摺好，放回袋子裏。那天晚上喬回去後，爸爸釣完魚回來。他把釣具放在地上，驕傲地抓出兩尾新鮮的粉紅色鱒魚，一尾一尾擺在廚房桌上。媽媽非常開心。爸爸整理好所有釣具後，在他的老位置坐下。

    「爸，」我說，「我在報紙上看見梅努斯有間小屋出售的廣告，它要拍賣。這種事該怎麼進行？」

    他驚訝地看著我，可能以爲我從沒想過要找房子。我不知該對爸爸的表情作何感想，不過他毫不猶豫說：「報紙讓我看看。」

    我從袋子裏拿出報紙，張開來放在他面前的小桌子上。爸爸問我廣告在哪裏。


    129'
  - '[PAGE 130]


    「我用黑筆圈起來了，在那裏，爸，在頁面的右下角。」

    爸再度帶著驚訝的表情抬頭看著我，這時我站著，他坐著。在開口說話前，他仔細讀了廣告，然後面帶微笑說：「做得好。喬知道這則小屋的廣告嗎？」

    「知道，」我說，「今天和喬見面時給他看過，我們很興奮，可是不知道該如何進行。」「首先，你們得去申請貸款。」「喬和我在銀行有存款，我們該去銀行嗎？」我問道。

    「是的，」他回答，「你們也可以去別的地方申請房屋貸款，譬如議會，那裏可能比銀行便宜。拍賣的事交給我，我來打電話詢問。」「謝謝爸。」我很高興爸爸要幫我們，也對可能買下小屋一事感到很興奮。


    隔天我休假，便到電話亭打電話給地區議會，詢問關於新婚夫妻申請貸款的事宜。我說明我們還沒結婚，但即將結婚。接聽的小姐會把表格寄給我，我謝過她之後，掛上電話，接著又打給爸。他詢問過拍賣的事，日子在兩天後，所以建議我們若有興趣，應該盡快先去小屋看看。他提議當晚就過去。

    我又留言請喬下班後直接到來錫利普。我興奮地跑回家告訴媽媽這一切。「不要期望太高，申請貸款並不容易，況且妳和喬沒有多少錢。」「傍晚，喬和爸爸在五分鐘內先後到家。爸爸說我們沒時間吃晚餐，因為小屋目前沒電力，得趁天還亮著趕過去看。

    我們搭爸爸的車，媽媽也一起去，開車約十五分鐘就抵達小屋。'
  - '[PAGE 131]


    車開到小屋旁時，幾乎看不見屋子，因為樹籬長得非常高。柵門鎖著，爸爸依拍賣者的指示，找到隔壁鄰居拿鑰匙，然後打開柵門，把鑰匙交給喬。我們沿著小徑走到小屋前。喬把鑰匙插入門孔，打開門時，屋內傳來一陣可怕的濁味，屋裏不僅霉味沉重，而且潮濕，顯然很久沒人住。小屋很小，但我和喬並不在意，只希望能夠買下它。


    在小屋裏四處走動時，喬和我告訴爸爸我們很擔心拍賣的事，萬一標到小屋，拍賣者是否會要訂金？因為我們沒支票，所以是否該先領出現金預備著？爸爸說如果一切順利，會先幫忙付訂金，我們日後再還他即可。我不時獨自走進某個小房間，以便在腦海中和天使對話，說一說我想到的一切。


    和爸媽及喬在房子裏走動時，天使不停拉著我的頭髮。媽媽問我為什麼一直把手放在頭上，是不是在檢查頭髮有沒有沾到蜘蛛網？這個問題不禁讓我發笑。


    我們只在小屋裏停留了幾分鐘，離開時，喬關好門，把鑰匙放在鄰居的信箱中。開車回家的路上，媽媽說：「那房子屋況非常差。」


    爸爸看了媽一眼，然後問我們是否仍然對小屋感興趣，我們異口同聲回答：「是的。」


    星期三早上九點左右，我和爸媽一起出門去接喬。爸爸把車停在喬家門前，然後對我說：「妳去敲門。」喬開了門，來到車前詢問爸媽是否願意進屋見見他的母親。他們拒絕了。儘管如此，我還是去看了她。她祝我們好運，並且說：「下回我會見到妳母親，找個星'
  - '[PAGE 132]


    期天我們邀請他們過來用餐。」喬的媽媽很想見我的父母。車子開動時，她站在門口揮手道別。

    在車上，我緊握著喬的手，一句話也沒說，我們非常緊張，我還不停祈禱。不一會兒，爸爸已經在停車了。

    拍賣會在一家老旅館舉行。我們早到，先坐在旅館交誼廳喝茶休息。我認出坐在交誼廳裡的一群人是加油站的顧客，他們的公司叫莫菲（Murphy），是建築商。爸爸起身走去，跟他們握手談話。他們請他喝了一杯，席間似乎相談甚歡，笑聲不斷。爸爸轉過頭對我笑了笑，從他的表情看來，我知道一切很順利。

    我問喬時間，已經十點四十五分，拍賣會十一點開始。這時候，爸爸回到我們這一桌，我們迫不及待想知道他談得如何。爸爸問我們要先聽好消息還是壞消息。

    「好消息，拜託！」我說。

    「幾年前發生過一次石油罷工，當時我曾設法讓莫菲公司不會因此短少柴油或汽油，」爸爸說，「現在是他們還我人情的時候了。我跟他們談得很愉快，並透露你們一心想要買下小屋。」

    我們不知道除了小屋外，還有一片土地要賣。莫菲公司來拍賣會的主要目的是那片土地，但也想買那棟小屋，因為就在同一條路上，可以用來當辦公室和卡車停車場。不過跟爸爸談過後，他們同意不競標小屋，甚至會盡力幫助我們得標。

