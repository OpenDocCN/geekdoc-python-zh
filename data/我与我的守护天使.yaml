  md: '角前，我就知道出事了。兩個非常大的天使朝我走來，從他們走路的姿態，可以看出發生了可怕的事情。他們走到我身邊，各伸出一隻手環抱著我，然後邊陪我們走回家，邊說我家的屋頂崩塌了。我震驚不已。


    到家時，看見一大片屋頂坍塌下來，簡直讓我嚇壞了，久久無法移開目光。爸爸企圖開門，可是打不開，他用肩膀去撞，落下許多塵土。屋內面目全非，只剩一片瓦礫殘骸。屋頂塌陷時，把天花板也給壓落。在我童稚的眼裏，屋子已經完全破碎，我不禁心想之後要睡在哪裏？我們爬過瓦礫堆，對小小的我來說，破碎的水泥和石塊實在是巨大無比。四處塵土飛揚，家具、玩具和媽媽的寶貝全成了碎片。我訝然看著爸媽從地上撿拾東西，企圖挽救物品。媽媽拾起一個有乳白色條紋的深色小牛奶罐說：「這是唯一還完整的東西。」


