    我笑而不答，再一次放棄讓喬知道一些我看見的事物。他是我生命中唯一可以分享一切的人，但我卻不敢告訴他關於天使的事，就怕他以爲我精神異常。


    > 「我們順著河岸走遠點吧。」喬說。


    他起身走在我前面。一位天使在我耳邊細語，告訴我天使如何幫助我們在生命中運作一切。每一步路、每一口氣、每句話、每聲嘻笑，他們幫助我們運作人體生理上的一舉一動，也幫助我們釐清腦海中的困擾和疑惑。他們不停對我們說話，在腦海和思緒裏給我們答案，但多數人忙到無法停下思緒來傾聽。這時我聽見喬喊著「快來」，就跑去追上他。


    走在賽爾布里齊的河邊時，我們認識了一對老夫妻約翰和瑪麗，他們經常帶著可愛的雜種狗托比散步。他們一輩子住在賽爾布里齊，才剛歡度結婚三十週年慶，孩子們已長大離家，現在很珍惜和彼此相處的時間。


    有一晚我們遇見他們，便停下腳步聊天。在道別前，約翰淘氣地問喬：「你什麼時候要跟小姐求婚啊？」


    我臉紅了,害羞得不知眼睛該看向何處,也不敢看著喬,所以不知道他如何反應。


    瑪麗說:「別讓年輕人害羞難爲了!」她牽起約翰的手,繼續往前走。


    喬和我沿著河岸走到更遠處,坐在石頭上。我脫掉運動鞋和襪子,把腳泡在水裏。喬突然從石頭上站起來,衣容整齊地走進水中,單腳跪下。河水約有三十公分深,喬單腳跪在強勁的水流中,弄得一身濕,我則咯咯笑了起來。


    「我是很認真的,」他說,「我想跟妳求婚!」他一隻手搭在我的膝蓋上,設法保持平衡。「羅娜,妳願意嫁給我嗎?」


    我什麼也說不出來,只是使勁兒笑,笑到整個人從石頭上摔到水裏。喬伸手抱住我,兩個人全都濕透,但也開懷大笑著。喬拉起我時,我說:「願意。」我實在笑得太厲害,所以也說不出別的話來。


    我們爬回河岸上,仍一邊笑著,一邊擰著衣服的水,幸虧那一晚並不冷。


    沿著河岸往回走的路上,喬停下腳步說:「我得去請求妳爸把妳嫁給我。萬一他說『不』,該怎麼辦?」


    我想了一下,記得天使總是說喬和我會結婚,於是說:「別擔心,爸不會反對。我知道他會爲我們高興。」


    走在河岸,路人用奇怪的眼神看著我們,有個孩子對他的母親說：「媽咪,他們一定是掉到水裏去,因爲他們的衣服都濕了。」


    一群釣魚的人大喊著：「穿著衣服游泳去了嗎?」我們看起來八成像是摔落水中的老鼠。我們只是笑著揮揮手，就在那時候，我突然想到一件事。「希望車鑰匙還在你的口袋，沒掉進河裏！」喬把手伸到口袋裏，然後搖搖頭。鑰匙一定掉在他跟求婚的那個地方。


    「好，跟你賽跑，看誰先到，先找到鑰匙。」我邊說邊開跑。


    喬叫住了我，我停下腳步回頭看。他站在那兒拿著鑰匙笑我。我跑回去抓住鑰匙說：「跟你賽跑到車子那裏。」喬比我先到。不過他的腿是我的兩倍長，先到是應該的。


    開車回家的路上，我們討論了婚禮的事，決定在喬向爸提親前，不對任何人透露口風。


    到家時，喬說不好意思讓家人看見他一身濕，所以不進門。我們親吻道晚安後，他便開車回家。


    隔天上班時，嬸嬸莎拉在午休前來找我，問我當晚能否幫她照顧孩子。她不常這樣到賣場來找我，顯然他們夫妻很想出門。雖然當晚喬要向爸提親，我還是答應了嬸嬸。


    嬸嬸開心告訴我，她和叔叔期待晚上外出用餐，然後再去看一場表演。我答應她儘早前往她家。道別後，我看著嬸嬸離開百貨公司，她正散發出明亮的光芒，我知道她很快樂。


    爸，可以跟喬說話嗎？」


    爸發出笑聲，對我說：「喬來了。」


    「喬在外面，我去叫他。」我在爸的聲音中聽到些許興奮的語氣，於是對他說：「你今天聽起來很快樂。」


    我告訴喬，嬸嬸需要我今晚去當保母，也問他是否已經跟爸爸提過結婚的事。


    「沒有，」他說，「我會等到明天再說。下班後我去接妳，我們先談過，然後約九點到妳家，我再跟妳爸談，請他答應把妳嫁給我。」

    「喬，我跟爸說話時，他聽起來很興奮，你確定他不知道嗎？」「確定，我還沒跟他或任何人提起此事。不過你爸今天心情很好，或許他也有好消息。」「希望爸現在聽不到你在說什麼。」我說。

    「不會的，他去外面找技師了。」

    這時有人進入辦公室，我們道別後掛上電話。


    我決定利用這一小時午休時間到外面享受美麗的阳光。我正要轉身走開，卻一頭撞上一位天使，還踩進她的身體，因為她把我整個包住。這位天使非常龐大、美麗，令人不禁想要擁抱她，她就是母愛天使。小時候，她曾經多次擁抱我，而這一次的感受比以前更爲強烈。


    母愛天使像太陽一樣圓，體積非常大，她的翅膀披過身體，向前張開，模樣有些像母雞，而雙手隨時準備給你一個大擁抱。她身上的顏色原本只有乳白與純白交錯，但這一天還帶了點粉紅光影。雖然明亮的光芒從她半透明的體內散發出來，卻無法看透她。


    母愛天使的臉散發著愛，雙眼大又圓，閃耀著母愛的光芒，還有一頭柔軟的乳白色捲髮。她不斷散發出愛的擁抱感，令人非常喜愛，想要倒在她的懷裏擁抱她，同時也被她擁抱。不論自己從母親身上得到多少愛，她總能強化那份愛。

    那一天，我正擔心媽媽對喬和我要結婚的反應，母愛天使知道我當時需要感受到母親的愛，感受到比媽媽或許能給我的更多的愛。


    我因為訂婚而興奮無比，臉上一直掛著笑容。薇樂莉問我：「發生什麼事？妳看起來好快樂。」她整天不停糾纏我，想要我把祕密供出來。快下班前，我們正在整理吊桿上的女用襯衫，她忽然脫口喊出：


    「我知道了！妳和喬訂婚了！就是這樣！」


    我漲紅了臉。「噓，這是個祕密，」我對她說，「別告訴別人。」在我戴上戒指之前，我不想讓任何人知道，不過我還是很高興有機會把這消息告訴某人。


    「妳的戒指呢？」她問道。


    「還沒買，我就是想告訴妳這事。喬和我尚未去找戒指，可能再過幾星期吧，我也不知道。我們還有很多事情要討論，喬得先跟我爸談過。答應我，先不告訴其他女孩，我會先讓妳看到戒指，許個願望。」


    薇樂莉答應了。我們邊聊邊整理衣服，一會兒後她去結帳，仍不時臉帶笑意看著我，不過她並沒有對任何人說什麼。


    下班後我搭公車到嬸嬸家去當保母。在路上，我請求天使別讓我流露出興奮的神情，因為我不希望莎拉嬸嬸和派帝叔叔問東問西。天使幫我保持鎮定，所以他們沒有察覺到任何異樣。隔天早上我又搭公車去上班。那天上午過得好漫長，午休時間，我走到百貨公司後面的巷弄。


    我一直把這些後巷當作沙漠中的綠洲，因為那是個能讓我清理思緒，做回自己，暫時躲開天使交付任務的地方。我通常坐在矮牆、箱子甚至是門檻上。不過我總會避開其中一條巷'
  mdcn: '她把我握得好緊，我別無選擇，只能更堅定立場說：「放開我的手臂，妳抓痛我了。我不想錯過這班公車，妳必須接受我和喬交往的事實。」


    美麗的天使屈身整個抱住媽媽。這時，她鬆開了手。

    我抽出手臂，對她說：「媽，我愛妳。」


    我走下樓，出了家門，朝公車站跑去。搭上公車後，我一直想著媽媽和她的天使。

    喬在都柏林的公車站等著我。看到他，我開心得給他一個大擁抱，但沒讓他知道我心裏有多難過，也始終不曾告訴他我媽說的話，因為我知道他會傷心。


    我們去附近一家名叫麥奎爾的酒吧，那晚是音樂之夜，我非常喜歡聽音樂。喬點了一杯健力士黑啤酒，我很少喝酒，所以點了七喜汽水。我在音樂聲中和喬的懷抱裏逐漸平靜下來，幾乎忘了媽媽的事。


    幾天後，爸爸對我說：「妳媽告訴我妳和喬在交往。」

    他說以前注意過我們之間似乎有什麼，但並不知道我們真的在交往。「天啊，你們真會保密。」


    爸爸認爲我很快樂對他來說是最重要的事。後來，爸爸爲喬做了許多事情，教他如何經營事業，鼓勵他要向前邁進，這對我們很有幫助。媽媽則不曾再對我提起那天的事情，彷彿一切不曾發生。


    天使為了讓我有心理準備面對某些事情，偶爾會事先為我展現預言景象，那當下，我周遭的一切消失無蹤，感覺像是被傳送到另一個時空之中，彷彿看著閃爍不定的電視螢幕，或者又像看快轉的影片。有時候我因為看不懂發生什麼事而困擾，「影片」便停格一、兩秒鐘，我就能看見某個人，或某個場景。預言景象有各式各樣的呈現方式。


    某個天氣應該越來越晴朗的春天早晨，我起床更衣準備上班，拉開窗簾向窗外看去，竟發現外面的景物全呈現灰色光澤，彷彿空氣被噴上灰色顏料，把景物和人影抹上一層灰彩。我看見鄰居在門口跟妻子道別，走出家門，朝他的車走去。他的人、車和周遭的一切都染著灰色。另一輛車經過，也罩在同樣的灰中。一個年輕人從屋前跑過，雖然他周遭的空氣跳動著，卻也呈現出一片灰暗。


    我下樓爲自己泡了茶，餵貓咪老虎喝牛奶，然後對樓上的家人喊再見，便出門上班。朝公車站牌走去時，我呼喚了天使，他們沒有現身，但我知道他們仍在身邊。我問天使：「爲什麼一切看起來這麼奇怪？」


    「別擔心，我們保護著妳。」他們對我耳語。


    走向大馬路時，公車來了，我趕緊追上去。車上很擁擠，不過我找到位置坐下。一股靜止與沉寂的感覺正悄悄籠罩我的身體，感覺非常奇怪。我看著公車上的乘客，所有人也是一層灰彩，連公車本身都不太對勁，一切看起來好不真實。公車抵達利菲河站，我再度呼喚天使，這一次他們沒有給我回應。


    我從後門進入賣場上班，覺得身體好輕，一切都以慢動作進行。有些工作人員和經理已經上班，我這才注意到大家身邊都沒有天使，也才想起連公車上的人也沒有！我震驚無比，甚至顫抖了起來。

    百貨公司看起來也一樣灰撲撲。我下樓到衣帽間，滿心期待能看見一起工作的女孩們有天使陪伴，可是女孩們的天使也同樣無影無蹤，儘管我知道他們一定在。

    我不斷呼叫我的天使，他們卻毫無回應。我離開衣帽間，上樓到賣場，站在流行服飾部的吊桿旁往大門看，公司經理和警衛正打開大門，顧客魚貫走進賣場。慢慢地，人們身邊終於跟著守護天使，但他們也和往常不同，周身的「光芒」消失不見，變得黯淡，彷彿也染上空氣中的灰彩。

    我感覺肩膀被拍一下，米迦勒天使帶著微笑出現在我身旁。他看起來依然明亮耀眼，我問他出了什麼事。

    「嚇死我了，從未看過天使變成這樣。為什麼到處都灰濛濛的？這片灰簡直無所不在。」

    「羅娜，這個情況會持續一段時間。」米迦勒天使說，「我們要把妳維持在出神狀態，好保護妳。妳照常工作、回家，進行平日活動，不過，妳會覺得一切都不太真實。」

    「米迦勒，現在的一切看起來已經不真實了，我身體出現變化，覺得好輕，內在好靜止、好沉寂，而且感覺越來越強烈。一切都變成一片灰，街上看起來也很可怕。」我轉身看著他。

    「米迦勒，難道你和其他天使沒法像保護我這樣，保護每個人嗎？」

    「不，羅娜，」米迦勒回道，「有時候妳受到不同層次的保護。這麼做的原因，得等到我們帶妳的靈魂回去時才會揭曉，在此之前，它將是個謎。不要再多問了，羅娜。妳聽清楚，從現在起，上班時絕對不能離開百貨公司，下班時間到了才能出去，而且要直接去搭公車，聽懂了嗎？」


    薇樂莉在叫我，米迦勒隨即消失無蹤。我走向收銀台，薇樂莉和寶琳及另外兩個女孩也在，我們討論有哪些事情要做。這時，賣場經理對我們走來。


    「早安，各位，」他說，「我不想嚇妳們，不過管理部通知我們注意可疑包裹，譬如紙袋或是香菸盒等。昨晚另一家店的清潔工人發現一個看似香菸盒的包裹，結果是個炸彈。今晚打烊後，我要大家把衣服吊桿和更衣室搜查一遍，檢查有無可疑物件。有任何發現，立刻通知我。別忘了檢查衣服的口袋，我們不希望整家店被燒得精光，讓大家失去工作。」


    經理一走開，我自言自語：「原來是這麼回事。」我走進顧客更衣室裏呼喚米迦勒，他再度現身。


    「為什麼你沒告訴我炸彈的事？」我問道。


    米迦勒沒有回答我的問題，只是伸出手放在我的頭上，我的關切和憂慮就這樣被帶走。接下來幾星期發生的事，我真的不太記得，感覺恍若作夢，像是身處另一個時間與空間。


    喬非常擔心。他說：「妳變了，什麼話都不說，心思好像飄到別處去。」或者問：「我做錯了什麼？妳不愛我了嗎？」


    「我只是累了，過一陣子就會沒事，別擔心。」


    不能跟喬分享事實真相，對我們倆而言都很痛苦。可是接著，炸彈爆炸了。我那個星期過得毫無感知，時間沒有先後順序可言。一天傍晚，我站在店內的一組吊桿旁，被附近一陣模糊聲響嚇了一大跳。

    就在寫書的此刻，我重新經歷了那天發生的一切。


    我在一輛公車旁，懷裏抱著一個男人，看著他斷氣。天使聚集正要離開人體的靈魂，我和小靈魂們談著話，假裝什麼也沒發生。

    天使跪在人們身邊，抱著他們，在他們耳邊輕語，告訴他們一切都會沒事。

    人從店鋪裏跑出來，天使大聲求助，設法吸引過往人群的注意。

    景況很悽慘。


    我感覺不到自己的身體，彷彿我同時存在於兩個地方，在這一切發生的同時，我在都柏林的街上，也在百貨公司裏，站在一桿子衣服旁。我在街上走動，腳卻不曾觸碰到地面。殘骸四處飛散，玻璃破碎了，人尖叫哭泣，靈魂正在離開人體。我邊走邊對人們伸出手，撫摸他們，觸碰他們。


    那一天，我的靈魂離開了身體，存在於一個不同的世界，在街上和受苦的人在一起。漸漸地，我回到在店裏的自己，察覺到自己的手正緊緊握住衣服吊桿，雙手已經變紅。賣場一片寂靜。

    接著，一個處在恐懼狀態的女孩尖叫著衝入店內，在店裏四處奔跑，大喊炸彈爆炸了，到處都是屍體。她在尋找和我一起在賣場工作的姊姊，兩人相會後，女孩才開始平靜下來。

    一位主管到辦公室廣播，宣布所有工作人員五分鐘內到後門集合，我們將被送回家。

    我知道事情結束了，那一天都柏林不會再有炸彈爆炸。我要下樓到衣帽間時，天使對我耳語，要我用員工出入口旁的電話打電話給媽媽。於是我轉身走回去，撥了電話向她報平安。掛上電話後，我又跑下樓抓了外套，跑向賣場後門。


    送貨卡車排了一排，每位司機喊著車子要前往的方向。

    我坐上前往喬母親家的車，被送到她門口。屋子裏的人正在看新聞。喬的母親看見我來，緊緊擁抱我，說她好擔心。喝過茶後，我感到舒服多了。他們又端出晚餐，我覺得好餓，彷彿好幾星期沒吃過東西。


    喬回到家後，也把我緊緊抱住，每個人都在流淚，感受所有罹難者和受害者家屬的痛苦。那一场发生於一九七四年五月十七日的炸彈攻擊事件，共有二十六人罹難，還有一個胎兒死於腹中，數百人受傷。


    生活在愛爾蘭共和國的我們在那一天之前，對戰爭的恐怖毫無經驗，但在距離僅三二〇公里遠的北愛爾蘭，從一九六九年到二〇〇〇年間，共有三千人罹難。在這之前，我們完全不知道那些生活在北愛爾蘭或世界任何角落，不知炸彈何時要爆炸的人來說，日子是多麼難過。


    > 以萊亞天使曾對我說過：「製造戰爭很容易，維持和平才是難事。你以爲戰爭能讓你掌控一切，卻忘記最初是誰給你力量，而他隨時都能收回那控制權。」


    炸彈攻擊事件發生後，我的身體和靈魂受到震撼波的衝擊，在精神上、身體上和情緒上都一樣。我能感受到傷者和亡者的恐懼，感受到親人朋友的震驚，還能聽見他們的聲音和哭泣。一連好幾個月，許多臉龐在我腦海不斷出現，不僅有亡者的面容，還有那些受到重傷正努力活下來的人，以及其家人心碎的臉龐。


    那一天的恐怖活動使我飽受折磨。


    天使盡可能在我遭受震撼波衝擊時保護我。他們用一層毯子般的能量把我包裹起來，毯子就像雪白的羽毛一樣柔軟，還有不停閃爍發亮的電流。毯子非常巨大，讓我嘆為觀止。


    以萊亞天使雙手捧著我的頭說：「羅娜，我們知道這一切讓妳受到傷害。我們為妳包裹一層毯子，讓痛苦好受些，毯子能連結妳的身體和靈魂。」


    接著以萊亞在我的臉上吹了一口氣，然後消失無蹤，我也覺得強壯了許多。


    日子一天天過去，又一週週流逝，我卻仍然需要找地方躲起來哭。有時候在午餐時間跑到停車場哭；廁所沒人時，我就躲到廁所去；偶爾我會走到後巷找個角落，或者找一面可以坐下的老牆。我還經常請求天使別理我，讓我獨處。


    有一回以萊亞天使出現，他不肯留我一個人，再度伸手捧起我的臉。那一刻，以萊亞天使彷彿和我融為一體，我似乎透過他的眼睛，看見世界上各種恐怖景象，包括戰爭、饑荒，以及人類彼此互虐。我的靈魂因而痛苦得大叫。


    接著以萊亞天使又讓我看見另一面，美好的愛、歡笑和喜悅，人性良善的一面。我笑了，喜悅的淚珠滾落臉頰。當以萊亞天使消失時，我仍不斷流著喜悅的淚水。


    那天走回工作崗位時，我心底已明白，每個男人、女人和孩子的內心都擁有那份良善、愛和喜樂。我相信有一天良善的一面將征服所有的惡，人類將能成功演化，使身體與靈魂合而為一。


    ## 11 母愛天使


    以前我隔週就會替叔叔派帝和嬸嬸莎拉當一次保母。他們住在都柏林郊區的瓦金斯頓（Walkinstown），有三個小女兒。我下班後搭公車前往他們家過一夜，隔天早上直接去上班。孩子們非常美麗可愛，我一點也不介意照顧她們，這樣叔叔和嬸嬸才有機會獨處，就算只是看一場電影也好。


    這一晚，在搭公車前往叔叔家的路上，我陷入沉思，一位老太太拍了拍我的膝蓋，打斷我的思緒。


    > 「小姐，」她說，「妳的笑容讓我快樂。」


    這時候乘客都起身了，公車在瓦金斯頓進站，我也向老太太告別。


    當晚我正在看顧孩子時，門鈴響了，可是我並沒有在等人，因此心底一邊祈禱鈴聲沒有吵醒孩子們，一邊開門，沒想到喬就站在門前。


    > 「閉上眼睛，不可以偷看！」說完，他領著我走過庭院來到柵門邊，「好，張開眼睛，妳看！」


    眼前停放了一輛漂亮的深綠色福特雅士。喬非常開心，因為這是他的第一輛車！


    「喬，你在哪裏買到這輛車？」我問道。

    「二位常到妳爸加油站的汽車經銷商。」喬說，「兩星期前我告訴他想買一輛車，今天早上他就把車開來。妳爸和技師跟我一起檢查過車況，他說這是一筆好交易。」

    我好興奮，給了喬一個大擁抱。他打開車門讓我坐進車內，感覺真是棒極了。接著我對喬說：「你該走了，明天下班開你的新車來接我。」

    我向他揮手道別，然後把門關上。


    有車使我們更自由。我很喜歡夏天天光漫長的夜間時分，在這種長夜裏，喬和我最喜歡流連的地方之一是賽爾布里齊（Celbridge House）。我們沿著河岸散步，看著男人釣魚、孩子們游泳，還有父母牽著小娃兒在淺水區玩水。

    我也看見天使從水中升起，飛入天空又降落到在水中玩耍的孩子身邊，身上水珠滑落。有些天使有翅膀，有些沒有，而那些繞著孩子們玩耍的天使，不管有無翅膀，玩得一樣開心。


    我看見孩子朝天使潑水，水飛濺到天使身上又潑灑回來。天使的笑聲混雜在孩子的笑聲之中，孩子潛入水中的同時，天使也做著同樣的動作，這些美好的景象，讓我看得好開心。

    有一回，天使在一群孩子四周圍了個圈，金色、銀色、白色等各種色彩的光芒從天使身上反射出來，化成各種大小的球，在水面、水底和天空中跳躍飛舞。有位天使還乘坐在其中一顆球上，他的翅膀美得驚人，水珠從羽毛上滑落，金黃色的頭髮也被水浸得濕透。又一回，天使左右甩著頭，同時揮動著翅膀，灑落了無數閃耀著金銀光芒的水珠。


    有一天，坐在河邊時，我目睹天使完美示範了對我們的愛。有位母親帶著約一歲半的幼兒來到河邊，她雙手抱著孩子的腰，想讓孩子學會在水中站穩，孩子興奮地感受河水流過雙腳的感覺。偶爾母親會放開雙手，看孩子能否自己站穩不跌倒。我看見孩子的守護天使在水中坐在孩子下面。孩子的腿開始抖動，隨即摔入水裏，媽媽來不及抱住孩子，但天使抱住了他！孩子跌入水裏時，直接跌坐在天使的腿上，他不但沒有哭，還潑起水，開心笑了起來。


    我也跟著笑了。喬問我：「什麼事讓妳笑得這樣開心？」


    我笑而不答，再一次放棄讓喬知道一些我看見的事物。他是我生命中唯一可以分享一切的人，但我卻不敢告訴他關於天使的事，就怕他以爲我精神異常。


    > 「我們順著河岸走遠點吧。」喬說。


    他起身走在我前面。一位天使在我耳邊細語，告訴我天使如何幫助我們在生命中運作一切。每一步路、每一口氣、每句話、每聲嘻笑，他們幫助我們運作人體生理上的一舉一動，也幫助我們釐清腦海中的困擾和疑惑。他們不停對我們說話，在腦海和思緒裏給我們答案，但多數人忙到無法停下思緒來傾聽。這時我聽見喬喊著「快來」，就跑去追上他。


    走在賽爾布里齊的河邊時，我們認識了一對老夫妻約翰和瑪麗，他們經常帶著可愛的雜種狗托比散步。他們一輩子住在賽爾布里齊，才剛歡度結婚三十週年慶，孩子們已長大離家，現在很珍惜和彼此相處的時間。


    有一晚我們遇見他們，便停下腳步聊天。在道別前，約翰淘氣地問喬：「你什麼時候要跟小姐求婚啊？」


    我臉紅了,害羞得不知眼睛該看向何處,也不敢看著喬,所以不知道他如何反應。


    瑪麗說:「別讓年輕人害羞難爲了!」她牽起約翰的手,繼續往前走。


    喬和我沿著河岸走到更遠處,坐在石頭上。我脫掉運動鞋和襪子,把腳泡在水裏。喬突然從石頭上站起來,衣容整齊地走進水中,單腳跪下。河水約有三十公分深,喬單腳跪在強勁的水流中,弄得一身濕,我則咯咯笑了起來。


    「我是很認真的,」他說,「我想跟妳求婚!」他一隻手搭在我的膝蓋上,設法保持平衡。「羅娜,妳願意嫁給我嗎?」


    我什麼也說不出來,只是使勁兒笑,笑到整個人從石頭上摔到水裏。喬伸手抱住我,兩個人全都濕透,但也開懷大笑著。喬拉起我時,我說:「願意。」我實在笑得太厲害,所以也說不出別的話來。


    我們爬回河岸上,仍一邊笑著,一邊擰著衣服的水,幸虧那一晚並不冷。


    沿著河岸往回走的路上,喬停下腳步說:「我得去請求妳爸把妳嫁給我。萬一他說『不』,該怎麼辦?」


    我想了一下,記得天使總是說喬和我會結婚,於是說:「別擔心,爸不會反對。我知道他會爲我們高興。」


    走在河岸,路人用奇怪的眼神看著我們,有個孩子對他的母親說：「媽咪,他們一定是掉到水裏去,因爲他們的衣服都濕了。」


    一群釣魚的人大喊著：「穿著衣服游泳去了嗎?」我們看起來八成像是摔落水中的老鼠。我們只是笑著揮揮手，就在那時候，我突然想到一件事。「希望車鑰匙還在你的口袋，沒掉進河裏！」喬把手伸到口袋裏，然後搖搖頭。鑰匙一定掉在他跟求婚的那個地方。


    「好，跟你賽跑，看誰先到，先找到鑰匙。」我邊說邊開跑。


    喬叫住了我，我停下腳步回頭看。他站在那兒拿著鑰匙笑我。我跑回去抓住鑰匙說：「跟你賽跑到車子那裏。」喬比我先到。不過他的腿是我的兩倍長，先到是應該的。


    開車回家的路上，我們討論了婚禮的事，決定在喬向爸提親前，不對任何人透露口風。


    到家時，喬說不好意思讓家人看見他一身濕，所以不進門。我們親吻道晚安後，他便開車回家。


    隔天上班時，嬸嬸莎拉在午休前來找我，問我當晚能否幫她照顧孩子。她不常這樣到賣場來找我，顯然他們夫妻很想出門。雖然當晚喬要向爸提親，我還是答應了嬸嬸。


    嬸嬸開心告訴我，她和叔叔期待晚上外出用餐，然後再去看一場表演。我答應她儘早前往她家。道別後，我看著嬸嬸離開百貨公司，她正散發出明亮的光芒，我知道她很快樂。


    爸，可以跟喬說話嗎？」


    爸發出笑聲，對我說：「喬來了。」


    「喬在外面，我去叫他。」我在爸的聲音中聽到些許興奮的語氣，於是對他說：「你今天聽起來很快樂。」


    我告訴喬，嬸嬸需要我今晚去當保母，也問他是否已經跟爸爸提過結婚的事。


    「沒有，」他說，「我會等到明天再說。下班後我去接妳，我們先談過，然後約九點到妳家，我再跟妳爸談，請他答應把妳嫁給我。」

    「喬，我跟爸說話時，他聽起來很興奮，你確定他不知道嗎？」「確定，我還沒跟他或任何人提起此事。不過你爸今天心情很好，或許他也有好消息。」「希望爸現在聽不到你在說什麼。」我說。

    「不會的，他去外面找技師了。」

    這時有人進入辦公室，我們道別後掛上電話。


    我決定利用這一小時午休時間到外面享受美麗的阳光。我正要轉身走開，卻一頭撞上一位天使，還踩進她的身體，因為她把我整個包住。這位天使非常龐大、美麗，令人不禁想要擁抱她，她就是母愛天使。小時候，她曾經多次擁抱我，而這一次的感受比以前更爲強烈。


    母愛天使像太陽一樣圓，體積非常大，她的翅膀披過身體，向前張開，模樣有些像母雞，而雙手隨時準備給你一個大擁抱。她身上的顏色原本只有乳白與純白交錯，但這一天還帶了點粉紅光影。雖然明亮的光芒從她半透明的體內散發出來，卻無法看透她。


    母愛天使的臉散發著愛，雙眼大又圓，閃耀著母愛的光芒，還有一頭柔軟的乳白色捲髮。她不斷散發出愛的擁抱感，令人非常喜愛，想要倒在她的懷裏擁抱她，同時也被她擁抱。不論自己從母親身上得到多少愛，她總能強化那份愛。

    那一天，我正擔心媽媽對喬和我要結婚的反應，母愛天使知道我當時需要感受到母親的愛，感受到比媽媽或許能給我的更多的愛。


    我因為訂婚而興奮無比，臉上一直掛著笑容。薇樂莉問我：「發生什麼事？妳看起來好快樂。」她整天不停糾纏我，想要我把祕密供出來。快下班前，我們正在整理吊桿上的女用襯衫，她忽然脫口喊出：


    「我知道了！妳和喬訂婚了！就是這樣！」


    我漲紅了臉。「噓，這是個祕密，」我對她說，「別告訴別人。」在我戴上戒指之前，我不想讓任何人知道，不過我還是很高興有機會把這消息告訴某人。


    「妳的戒指呢？」她問道。


    「還沒買，我就是想告訴妳這事。喬和我尚未去找戒指，可能再過幾星期吧，我也不知道。我們還有很多事情要討論，喬得先跟我爸談過。答應我，先不告訴其他女孩，我會先讓妳看到戒指，許個願望。」


    薇樂莉答應了。我們邊聊邊整理衣服，一會兒後她去結帳，仍不時臉帶笑意看著我，不過她並沒有對任何人說什麼。


    下班後我搭公車到嬸嬸家去當保母。在路上，我請求天使別讓我流露出興奮的神情，因為我不希望莎拉嬸嬸和派帝叔叔問東問西。天使幫我保持鎮定，所以他們沒有察覺到任何異樣。隔天早上我又搭公車去上班。那天上午過得好漫長，午休時間，我走到百貨公司後面的巷弄。


    我一直把這些後巷當作沙漠中的綠洲，因為那是個能讓我清理思緒，做回自己，暫時躲開天使交付任務的地方。我通常坐在矮牆、箱子甚至是門檻上。不過我總會避開其中一條巷'
