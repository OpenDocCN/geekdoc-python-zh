    我要付錢的時候，媽媽說她想為我支付婚紗材料的費用，我很高興她想這麼做，但仍說：「不用了，媽，這太貴了。」可是媽媽很堅持，我也就順了她的意。她付錢給店員時，看起來既快樂又驕傲。我們謝過店員，要離開店鋪時，有位天使站在門口，我輕聲向天使道謝，然後上路回家。我們走向公車站，我拿著袋子，跟媽媽道謝。


