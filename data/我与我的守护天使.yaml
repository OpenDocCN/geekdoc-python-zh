    # # 09 死亡天使


    新工作開始後沒幾週，天使就讓我注意到一位在提袋部門工作的年輕人馬克。他的身材高瘦，有一頭棕色捲髮，棕色雙眼，而且似乎總是穿著棕色西裝。我若仔細看著他，便能看見他四周有一層溫和隱約的光芒。


    一天下午，賣場很安靜，我站在一旁看著馬克穿越賣場。接著，一位天使出現在他的身後，不過並非守護天使，因為他所散發出來的能量與光芒，和守護天使截然不同。那是一位優雅、纖細而且非常高挑的天使。


    我知道眼前的景象有些不尋常。那位天使轉身看我，臉上充滿慈悲。他站在馬克身後，傾身向年輕人的肩膀，手伸入他的身體，觸碰他的靈魂。他溫柔地抬起馬克的靈魂，像對待新生兒一般，在馬克的身體裏前後搖動他的靈魂，動作溫柔慈愛。年輕人就站在那裏，完全靜止不動，彷彿處於出神狀態，完全沒察覺正在發生的事情。


    不知道為什麼，我竟哭了起來，內心非常激動，卻不知這些情緒為何而來。有人在我肩上拍了一下，是天使荷賽司。我轉身向他，他伸手擦去我滿眶的淚水，要我找個藉口到儲藏室去，他在那裏等我。'
  - '[PAGE 92]


    我四處張望，尋找經理，他就站在賣場後門邊和警衛談話，我鬆了一口氣，隨即告訴他

    要到儲藏室去。


    我穿過兩扇沉重的大門，那是一推就往兩旁開啓，通過後又會隨之關上的門，來到儲藏

    室。每個儲藏室裏全堆滿紙箱，來到一座螺旋石梯。流行服飾部的儲藏室位

    在三樓頂層，我飛也似的跑上樓梯，推開一扇小門，室內相當昏暗，到處是放衣服的吊桿和

    箱子。


    吊桿高到天花板上，我沿著吊桿四處尋找，卻不見荷賽司，知道這裏沒有別人，我便喊

    著他的名字。來到最後一排吊桿時，才看見他坐在角落的箱子上等著我。看見他時，我的心

    開朗了起來。


    「荷賽司天使，」我坐下來對他說，「我需要知道剛剛看見的天使是誰，那年輕人會發生

    什麼事？」


    荷賽司握住我的手。

    「我不能告訴妳太多。妳看見的那位天使與眾不同，他是死亡天使，有人要在特殊情況下

    死去時，他才會出現。死亡天使會竭盡所能阻止事情發生，而有許多天使與他一起工作。譬

    如，某個單位計畫發動會傷及無辜的殘暴活動時，妳可以確定死亡天使將會設法說服參與其

    中的人，企圖讓他們明白上帝不希望暴力發生。世界上不該有戰爭，而是只有和平。死亡天

    使的工作無所不在——甚至也說服政府的最高層——他試圖預防生命無辜死去，尤其是戰爭

    期間。死亡天使竭盡心力，設法說服人們，但是他們願意傾聽天使的聲音嗎？或許偶爾，但'
- md: '不常發生！」


    在這之前，假使我知道有所謂的死亡天使，我會把他想像成四處散布災難、痛苦和悲慘，然而這位天使卻充滿了愛與慈悲。


    我謝過荷賽司，回到工作崗位。我早已學會有些時候不必問太多。


    我們在養成過程中，學會恐懼死亡天使。可是，死亡天使卻是熱愛生命的好天使，為了活著的人以及良善的事物而戰。


    從那時候起，我更加注意馬克，每次看到他，就會看見死亡天使。我知道他也有個守護天使，但這位天使從未在我面前現身。我每天密切關注馬克，感覺像是在看護他，像是在為他求情，希望事情能有所變化，讓他聽見天使的聲音。


    通常手提袋部門還有兩位女孩和馬克一起工作，不過有一天，我訝然發現他察覺到我在看他，因為他稍後到我們部門，詢問賣場經理是否能借用我去幫忙手提袋的櫃台工作。我明白這不是馬克的意思，而是天使在運作，他們在馬克耳邊說話，馬克也聽見了。這麼做是為了讓馬克有時間和我相處。


    幾個月過去，我的心越發沉重。我從其他女孩口中得知馬克在北愛爾蘭有個女朋友，他每週末搭公車和火車去看她。我不斷期盼一切平安無事，但天使還是持續要我幫助他，所以我知道他心中和靈魂深處並不平安。


    賣場總是非常忙碌，尤其是週末和每年幾次的特賣會。每次特賣會總擠滿人，大多是女性，有些婦女會帶著幼兒或推娃娃車來。拍賣會期間，工作人員整天撿起掉到地上的衣服，那是客人瘋狂尋找、搶奪便宜貨時丟落的。要維持地板乾淨沒衣服，不是容易的事情，整家店一片混亂，收銀台也總是大排長龍。不過我挺喜歡拍賣會，因為忙個不停，時間也就過得特別快，而且我也喜歡幫助別人。


    某個星期六，我擠在光臨拍賣會的客人之間，設法把裙子掛回吊桿上，這時感覺制服被人拉了一下，低頭一看，驚詫發現是兩個小天使。他們的外表像個孩子，約六○公分高，還有翅膀，渾身散發美麗明亮的光芒及一股喜悅的氣息，充滿生氣，甚至閃閃發光。以前我也見過這樣的天使，每回見到他們，就覺得自己又像個孩子一般。這些小天使觸動了我心中的小孩，讓我充滿喜樂、幸福和歡笑。


    一位小天使說：「快來，羅娜！妳得跟我們來。」


    他們引導我穿越人群，來到流行服飾部的另一端。小天使消失在人群中，但我仍然能夠聽見他們呼喚我。


    「在那個襯衫吊桿下方，羅娜，快看那個襯衫吊桿下方。」他們說。


    我抵達襯衫吊桿那兒，一群女人正翻著襯衫，發狂似的找著她們要的東西，簡直是在打架中搶奪商品。我沒想到她們會如此暴力。小天使告訴我「在吊桿下」，所以我知道要往哪裏找，也清楚那下面一定有個年幼的孩子。


    我推開那些女人，一邊道歉，一邊假裝要整理衣服，突然感覺到有一隻小手摸我的腳踝。


    我彎下身推開一些女人，抱起孩子，一走出人群，上有個母親出現，說我抱的是她的孩子。我告訴她孩子放在這裡很危險，但她不理不睬，抱了孩子就走開。


    兩位小天使看起來很傷心，我對他們說：「那位媽媽聽不進去。」


    小天使要求我跟者母女，注意她們，她們也跟在身邊，我還看見那位母親的守護天使在她的耳邊細語。


    儘管我試圖守護她們，但顧客不斷請我幫忙，四處一團混亂，情況很困難。一有機會，我就尋找那位母親和孩子的蹤影，小天使也向上投射出一道亮光來幫助我。每當我看見那道亮光，就會鬆一口氣。突然間，小天使又來拉我的衣服。


    「快點來！要出事了，那母親再不聽我們說，事情就無法阻止了。」


    我盡快跟著小天使去。讓我驚訝的是，她們即使消失在人群中，仍在身後留下一道發光的軌跡，而且還讓人群的腰際以下變得透明，使我能看穿過去。在人群中我看見孩子站在那裡，我一邊向她前進，一邊喊著：「小心那孩子！」


    圍在吊桿的婦女全神貫注在翻找便宜貨，完全沒聽見我的話。我知道將會發生什麼事，有女人意外把衣架扯過孩子的臉龐，竟把她的眼睛勾了出來。


    我看見一位小天使用手護住孩子的眼睛，所以眼睛雖然被扯出眼窩，但天使的手使它沒有整個被扯掉。孩子驚聲尖叫，母親看見此景也叫了出來，把孩子抱在懷裡。我來到母親的身邊，伸手觸碰女孩，請求上帝介入，拯救她的眼睛。


    有人大叫：「快叫救護車來！」


    孩子的模樣慘不忍睹，眼睛掛在眼窩外，小天使握著眼睛，以防僅存的連結斷了。看見那樣的關懷和溫柔，我知道我們被愛包圍著。即使在最困難的時期，當你以爲自己沒人在乎、沒人愛的時候，天使一直在身邊。要永遠記得：天使的愛沒有條件。


    孩子不斷尖叫，經理也衝過來把母女帶到辦公室。


    後來我聽說孩子的眼睛挽救了回來。


    喬和我陷入熱戀，感情越來越濃烈。我開始在下班後到他母親家，她總是熱情歡迎我，把我當做家中的一分子。她個子高，體格健壯，滿頭捲髮，臉上掛著笑容，我們能談上很多話。她在廚房忙著時，我便坐在餐桌邊，她從不讓我動手幫忙。我很喜歡和她說話，有一回的對話尤其讓我開心。她告訴我，她很高興喬能遇上我這樣美好的女孩，她一直爲喬如此祈禱，也很希望看見我們結婚生子。她說，只要看見小兒子和妻子安定下來，便無須再憂心。


    不過，她並不想讓喬知道這些事情，這是我和她之間的祕密。


    喬大約在我到他母親家後一小時回到家，我們一起吃晚餐。喬的母親很會做菜，我最愛她做的培根、高麗菜和蘋果塔。吃過晚餐後，喬和我走到公車站等十點鐘往市區的公車，然後再搭車到我住的來錫利普。現在想一想，我們實在花了不少時間搭公車。


    雖然我和喬交往已經一年多了，我仍然沒有告訴父母關於喬的事情。奇怪的是，媽媽也從來沒問我晚上都去了哪裏，或許她以爲我總是在加班。我有點擔心爸爸會怎麼想，他是否會同意？不過我知道爸爸很喜歡喬。我最大的擔憂是媽媽。


    一星期加班一、兩次，補貨上架是正常的程序，我們每兩星期輪流加班，我通常排在週四和週五，因爲有些女孩不想在星期五加班，但我不介意，因爲我晚上常和喬見面，而他週五往往也要加班。偶爾，我也會視賣場是否忙碌，而在週三晚上留下來幫忙。我發現馬克加班的時間也常和我重疊。


    我總是看見死亡天使一直握著馬克的靈魂。馬克是那麼開心，精神奕奕。然而在和天使的對話中，我得知他們輸了這場戰役。


    有一天，我和朋友薇樂莉在收銀台把衣服摺好、放入袋子時，馬克做了一件以前沒做過的事，他走過來和我們說話，告訴我們關於他那個北愛爾蘭女友的事，說他週末要去見她；而且他爲她瘋狂，她是他這輩子得到最珍貴的禮物，希望將來能結婚。


    我看見那美麗的天使抱著他，彷彿他是世間最珍貴的人，這讓我顫抖不已。死亡天使並不想帶走馬克，卻毫無選擇，因爲人們不肯傾聽天使說話。我能清楚聽見天使對我說話，也能和馬克一樣，伸手觸碰死亡天使，不過我被告知不要那麼做。後來，馬克說他得走了。


    我轉身告訴薇樂莉要去上廁所。我從後門跑到外面的廁所，坐在裏面哭了起來。最後，我還是鼓起勇氣回去工作，但不斷對天使說我有多麼悲傷，有多麼無助。


    在賣場工作約一年後，主管請我加班，我同意了。其實我已經知道我必須留下來，因爲馬克也要加班。工作時，我看著馬克和他的天使，心裏一邊祈禱著。我能感覺到馬克的喜悅和快樂，以及他對女友的深情愛意。我很肯定他已經和女友訂婚，正在想像兩人的未來，而那是他生活的目標。


    其他工作人員都下班了，只剩下賣場經理、馬克和我。經理問我是否完成工作，我說還要五分鐘。補完貨後我走向衣帽間，一邊回頭看在手提袋櫃台工作的馬克。我急忙下樓到衣帽間拿了外套，便趕緊跑回去，希望還能再看馬克一眼。我趕上了，馬克正在和經理談話。我知道這是最後一面。


    身後的店門關閉後，我穿越停車場和百貨公司後方的小巷子，一邊對天使抒發情緒，因為我感到好無助。突然間，出現一道亮光，裡頭有許多天使，他們包圍著我，把我的靈魂帶離身體。那一刻起，我什麼也不記得，不記得怎麼回家，也不記得那晚所發生的事。隔天早上醒來，我知道天使帶走我的靈魂，它與馬克同在。我的身體和靈魂靠著一絲細線連結著。


    早上起床時，我覺得身體好輕，幾乎感覺不到腳下的地板，但內在是那麼靜止、寧靜。我慢慢更衣、下樓，整個人很虛弱，彷彿生病了。在廚房裏，媽媽問我是否要緊，說我看起來很蒼白。


    我倒了一杯茶，拿了一片土司，便到後院去看我的兔子。這當然只是藉口，因為我不想讓媽媽擔心。和她道別後，我出門搭公車，發現兩邊各有一位天使扶著我走路。


    我露出微笑說：「謝謝你們，天使，請幫助讓我的身體好一些，否則我撐不了今天。」


    我聽見天使的耳語：「別擔心，羅娜，我們會照顧妳。」


    穿越馬路前往公車站時，已經有十多人在等公車，我對天使說：「請讓我有座位可坐，我沒法站著。」


    公車幾分鐘就來了，雖然很擠，但我在最後面找到座位，沒多久就睡著。一陣沙沙聲吵醒我，正前方有個男人正在讀早報，頭條新聞寫著：「年輕人在都柏林遭槍殺。」我閉上眼睛，內心絕望無比。


    公車到站後，我跟著人群下車，走過通往瑪麗街的橋，途經一家名叫海特葛雷（Hector Grey''s）的店鋪，店內傳來廣播的聲音，新聞播報員說：「有位年輕人遭到槍殺。」


    我拔腿飛奔，跑到百貨公司旁的小巷時，已經滿臉淚水。四下無人。讓我震驚的是，地面上有粉筆的痕跡，以及扯開的黃色警示帶，這裏就是馬克遭到謀殺、被槍決的地方。這裏沒有人影，沒有警察，誰也沒有！好像沒有人在乎似的。我覺得好冷，完全不知所措。


    賣場的工作人員議論紛紛，我盡量避開所有人，以免聽見談話內容。不過實在是避不開。大家認爲這是一場派別謀殺，或許是因爲他的女友在北愛爾蘭。


    當時是一九七〇年代初期，北愛爾蘭地區充滿暴力，天主教徒和新教徒爲了宗教而彼此殺害。馬克是天主教徒，他在北愛爾蘭的女友是新教徒。偶爾這樣的暴力也會波及愛爾蘭共和國。


    有一件事是肯定的，那就是馬克直接上了天堂。我曾在天使傾身觸碰他的靈魂時，看見他擁有一個美麗如水晶般澄澈無瑕的藍色靈魂。他死去時，天使都圍繞他身邊，尤其是死亡天使，他之前往生的親人也在場，他們一起溫柔地將馬克帶往天堂。


    那天我在午餐休息時間打電話給喬，請他下班後到公司後門來接我。我告訴他隔天我休假，當晚可以出去走走。我覺得很哀痛，需要他的臂膀來安慰我；也覺得自己好虛弱，甚至無法走到公車站。我始終不曾忘記馬克。


    # 10 炸彈客


    喬和我非常喜歡週末時光。我每四個星期休一次長週末，喬也盡可能跟爸爸協調，好在同一週末休假。我常戲說他能為爸爸工作真是幸運。我們總是提前安排週末活動，最喜歡去的地方包括都柏林山、威克羅山和位於都柏林南邊海岸美麗的布里塔灣（Brittas
    Bay）。


    一晚搭公車回家時，喬問說：「這個週末到威克羅山區的莎麗峽谷（Sally Gap）如何？」那個週日早上，喬九點整來接我，我們在對街轉角處碰面，以防被家人撞見。我準備了野餐的火腿和起司三明治，還有蘋果和巧克力。他給我一個大大的吻，然後說：「出發吧。」我們馬上前往公車站，剛好趕上正要進站的公車。


    公車抵達威克羅山區，乘客全部下車，大家前進的方向都一樣。我很訝異竟有許多情侶和帶著孩子出遊的家庭，於是對喬說沒想到這裏這麼受歡迎。走了約一點六公里路後，我們來到一處滿布巨石的高地，群山圍繞，景色優美，空氣清涼又新鮮。接著，我們爬過大石頭。我很喜歡爬石頭，不過我身材嬌小，石頭又非常巨大，但對喬來說不是問題，所以偶爾得靠他幫忙。一路上我們玩得很開心。


    我們坐在一塊巨石上野餐，聊了好幾個小時，坐在那裏享受陽光，景仰山勢的美麗。最後，打包完吃剩的食物，喬接過袋子，手臂摟著我的肩膀。就在要爬下石頭時，發生一件令我驚訝的事——喬的天使出現在他右邊身後約一步的距離。我對天使笑了笑，天使對我說：「羅娜，看到陽光照耀在那座小湖上嗎？到那裏去。」


    喬問道：「為什麼笑得這樣燦爛？」


    我不能告訴他是因為對他的天使笑。我仍然沒有勇氣讓喬知道我能看見天使和其他事物，我不知道他會做何反應。


    「看那邊，」我說，「那片小樹林和石頭堆反射陽光的地方，是不是有個小湖泊？」


    「我們剛才為何沒看見呢？」喬問道。


    我們朝小湖的方向前進，抵達時遇見一對正在野餐的情侶，並且受邀跟他們一起喝茶，坐在湖畔談天說笑。


    那天，天使讓我看見許多美麗的景物。若是能與喬分享祕密，或者天使也能讓他看見靜謐幽雅的畫面，該有多好？可惜不行。


    湖宛如一面玻璃，映照出樹林與一隻飛越湖面的翠鳥倒影。我還看見一隻翠鳥在水底移動，也看見牠從水底升起、飛入天空時的倒影閃耀著彩虹光輝。牠輕點水面，劃破寧靜的湖面，激起一波漣漪，餘波幾乎觸碰另一隻鳥的尾羽。水波盪漾，湖面上飛翔的鳥影看起來不只一隻，彷彿還跟了許許多多的翠鳥。


    後來，天使說：「羅娜，該回家了。」


    我對喬說天色即將轉暗，該動身回家。那對情侶說他們有指北針，知道另一條回去的路，建議我們一起走。


    我們接受建議。我不知道究竟花了多少時間才回到公車站，但是抵達時我已筋疲力竭。喬仍然貼心地一路陪我回到家門口，在我臉頰上親吻道別，然後跑去趕搭幽靈公車回市區。我請求天使保護喬平安到家，也請求天使讓他身體保持健康，因為雖然喬看起來精神飽滿，充滿活力，但我能看見他體內的器官開始生病，不僅體積縮小，而且呈現灰色光澤。儘管那是極微小的變化，在我眼底卻是一清二楚。我擔心這是以萊亞所預言的病徵的開始。


    我永遠忘不了媽媽發現我和喬交往的那一天。那天我休假，在家幫媽媽做些家事，也和我的兔子依莎貝爾玩了一會兒，下午姊姊愛美爾也在家，所以和平常一樣，媽媽並沒有注意到我。從小到大，我總察覺到姊妹或弟弟在家跟媽媽說話時，只要我一進門，他們就停止對話。我若待在同一間房裏，或坐下來加入他們，對話就會完全停止。我偶爾會難過家人不願與我分享事物。


    喬和我六點半有約會，我從庭院回到屋內，準備晚上出門。媽媽在廚房問我要去哪裏，我說要去趕五點的公車，就繼續通過走道上樓。


    在臥室時，我聽見媽媽和姊姊上樓的聲音。我和姊姊共用一個房間，以爲她要進來，卻沒有，而是去了媽媽房間。雖然聽得到她們在談話，但我因爲晚上要和喬約會而興奮不已，所以沒注意聽。現在我知道當時媽媽正在審問愛美爾。我走出房門時，她們倆就站在樓梯口，愛美爾愧疚地看著我。


    「怎麼了？」我問道。


    媽媽對我大叫：「妳以爲妳要去哪裏？」


    我愣住了！我從未見過她這副模樣。我回答要去都柏林。媽媽卻對我大吼，要知道我是否真的和爸爸的加油站員工交往？媽媽失去理智大喊：「妳要去跟喬約會！這事已經多久了？我現在就要知道，我要你們現在就結束！」


    媽媽非常生氣。我看著她，口齒清晰對她說：「我和喬已經交往好幾個月，而且會繼續交往下去。我現在就要去見他。」


    我轉身就要下樓，媽媽立刻緊抓住我的手臂，一邊拉住我，一邊繼續大吼：「妳膽敢跟低階層的人交往，讓我們蒙羞！」


    我非常震驚於她的憤怒，她展現出我從未見過的一面，對她而言，喬的階級竟比我們低。我看了看她，繼續走下樓。她仍緊緊抓住我的手臂，拉著我說：「不准妳搭公車去會見那個年輕人喬。」


    我看見媽媽的守護天使站在她的身後，熱淚盈眶，幾滴淚水滑落在媽媽的頭上。如今爸爸的經濟狀況好轉，有一棟自己的房子了，媽媽就忘記我們也曾無家可歸，忘記當時能配給到議會房子時，我們覺得自己有多幸運。我們也貧窮過，就和當時許多愛爾蘭家庭一樣。也許是因爲媽媽來自一個富裕家庭，她的家人覺得她下嫁到低階級人家，所以我們的交往對她來說特別難以面對。'
  mdcn: '不常發生！」


    在這之前，假使我知道有所謂的死亡天使，我會把他想像成四處散布災難、痛苦和悲慘，然而這位天使卻充滿了愛與慈悲。


    我謝過荷賽司，回到工作崗位。我早已學會有些時候不必問太多。


    我們在養成過程中，學會恐懼死亡天使。可是，死亡天使卻是熱愛生命的好天使，為了活著的人以及良善的事物而戰。


    從那時候起，我更加注意馬克，每次看到他，就會看見死亡天使。我知道他也有個守護天使，但這位天使從未在我面前現身。我每天密切關注馬克，感覺像是在看護他，像是在為他求情，希望事情能有所變化，讓他聽見天使的聲音。


    通常手提袋部門還有兩位女孩和馬克一起工作，不過有一天，我訝然發現他察覺到我在看他，因為他稍後到我們部門，詢問賣場經理是否能借用我去幫忙手提袋的櫃台工作。我明白這不是馬克的意思，而是天使在運作，他們在馬克耳邊說話，馬克也聽見了。這麼做是為了讓馬克有時間和我相處。


    幾個月過去，我的心越發沉重。我從其他女孩口中得知馬克在北愛爾蘭有個女朋友，他每週末搭公車和火車去看她。我不斷期盼一切平安無事，但天使還是持續要我幫助他，所以我知道他心中和靈魂深處並不平安。


    賣場總是非常忙碌，尤其是週末和每年幾次的特賣會。每次特賣會總擠滿人，大多是女性，有些婦女會帶著幼兒或推娃娃車來。拍賣會期間，工作人員整天撿起掉到地上的衣服，那是客人瘋狂尋找、搶奪便宜貨時丟落的。要維持地板乾淨沒衣服，不是容易的事情，整家店一片混亂，收銀台也總是大排長龍。不過我挺喜歡拍賣會，因為忙個不停，時間也就過得特別快，而且我也喜歡幫助別人。


    某個星期六，我擠在光臨拍賣會的客人之間，設法把裙子掛回吊桿上，這時感覺制服被人拉了一下，低頭一看，驚詫發現是兩個小天使。他們的外表像個孩子，約六○公分高，還有翅膀，渾身散發美麗明亮的光芒及一股喜悅的氣息，充滿生氣，甚至閃閃發光。以前我也見過這樣的天使，每回見到他們，就覺得自己又像個孩子一般。這些小天使觸動了我心中的小孩，讓我充滿喜樂、幸福和歡笑。


    一位小天使說：「快來，羅娜！妳得跟我們來。」


    他們引導我穿越人群，來到流行服飾部的另一端。小天使消失在人群中，但我仍然能夠聽見他們呼喚我。


    「在那個襯衫吊桿下方，羅娜，快看那個襯衫吊桿下方。」他們說。


    我抵達襯衫吊桿那兒，一群女人正翻著襯衫，發狂似的找著她們要的東西，簡直是在打架中搶奪商品。我沒想到她們會如此暴力。小天使告訴我「在吊桿下」，所以我知道要往哪裏找，也清楚那下面一定有個年幼的孩子。


    我推開那些女人，一邊道歉，一邊假裝要整理衣服，突然感覺到有一隻小手摸我的腳踝。


    我彎下身推開一些女人，抱起孩子，一走出人群，上有個母親出現，說我抱的是她的孩子。我告訴她孩子放在這裡很危險，但她不理不睬，抱了孩子就走開。


    兩位小天使看起來很傷心，我對他們說：「那位媽媽聽不進去。」


    小天使要求我跟者母女，注意她們，她們也跟在身邊，我還看見那位母親的守護天使在她的耳邊細語。


    儘管我試圖守護她們，但顧客不斷請我幫忙，四處一團混亂，情況很困難。一有機會，我就尋找那位母親和孩子的蹤影，小天使也向上投射出一道亮光來幫助我。每當我看見那道亮光，就會鬆一口氣。突然間，小天使又來拉我的衣服。


    「快點來！要出事了，那母親再不聽我們說，事情就無法阻止了。」


    我盡快跟著小天使去。讓我驚訝的是，她們即使消失在人群中，仍在身後留下一道發光的軌跡，而且還讓人群的腰際以下變得透明，使我能看穿過去。在人群中我看見孩子站在那裡，我一邊向她前進，一邊喊著：「小心那孩子！」


    圍在吊桿的婦女全神貫注在翻找便宜貨，完全沒聽見我的話。我知道將會發生什麼事，有女人意外把衣架扯過孩子的臉龐，竟把她的眼睛勾了出來。


    我看見一位小天使用手護住孩子的眼睛，所以眼睛雖然被扯出眼窩，但天使的手使它沒有整個被扯掉。孩子驚聲尖叫，母親看見此景也叫了出來，把孩子抱在懷裡。我來到母親的身邊，伸手觸碰女孩，請求上帝介入，拯救她的眼睛。


    有人大叫：「快叫救護車來！」


    孩子的模樣慘不忍睹，眼睛掛在眼窩外，小天使握著眼睛，以防僅存的連結斷了。看見那樣的關懷和溫柔，我知道我們被愛包圍著。即使在最困難的時期，當你以爲自己沒人在乎、沒人愛的時候，天使一直在身邊。要永遠記得：天使的愛沒有條件。


    孩子不斷尖叫，經理也衝過來把母女帶到辦公室。


    後來我聽說孩子的眼睛挽救了回來。


    喬和我陷入熱戀，感情越來越濃烈。我開始在下班後到他母親家，她總是熱情歡迎我，把我當做家中的一分子。她個子高，體格健壯，滿頭捲髮，臉上掛著笑容，我們能談上很多話。她在廚房忙著時，我便坐在餐桌邊，她從不讓我動手幫忙。我很喜歡和她說話，有一回的對話尤其讓我開心。她告訴我，她很高興喬能遇上我這樣美好的女孩，她一直爲喬如此祈禱，也很希望看見我們結婚生子。她說，只要看見小兒子和妻子安定下來，便無須再憂心。


    不過，她並不想讓喬知道這些事情，這是我和她之間的祕密。


    喬大約在我到他母親家後一小時回到家，我們一起吃晚餐。喬的母親很會做菜，我最愛她做的培根、高麗菜和蘋果塔。吃過晚餐後，喬和我走到公車站等十點鐘往市區的公車，然後再搭車到我住的來錫利普。現在想一想，我們實在花了不少時間搭公車。


    雖然我和喬交往已經一年多了，我仍然沒有告訴父母關於喬的事情。奇怪的是，媽媽也從來沒問我晚上都去了哪裏，或許她以爲我總是在加班。我有點擔心爸爸會怎麼想，他是否會同意？不過我知道爸爸很喜歡喬。我最大的擔憂是媽媽。


    一星期加班一、兩次，補貨上架是正常的程序，我們每兩星期輪流加班，我通常排在週四和週五，因爲有些女孩不想在星期五加班，但我不介意，因爲我晚上常和喬見面，而他週五往往也要加班。偶爾，我也會視賣場是否忙碌，而在週三晚上留下來幫忙。我發現馬克加班的時間也常和我重疊。


    我總是看見死亡天使一直握著馬克的靈魂。馬克是那麼開心，精神奕奕。然而在和天使的對話中，我得知他們輸了這場戰役。


    有一天，我和朋友薇樂莉在收銀台把衣服摺好、放入袋子時，馬克做了一件以前沒做過的事，他走過來和我們說話，告訴我們關於他那個北愛爾蘭女友的事，說他週末要去見她；而且他爲她瘋狂，她是他這輩子得到最珍貴的禮物，希望將來能結婚。


    我看見那美麗的天使抱著他，彷彿他是世間最珍貴的人，這讓我顫抖不已。死亡天使並不想帶走馬克，卻毫無選擇，因爲人們不肯傾聽天使說話。我能清楚聽見天使對我說話，也能和馬克一樣，伸手觸碰死亡天使，不過我被告知不要那麼做。後來，馬克說他得走了。


    我轉身告訴薇樂莉要去上廁所。我從後門跑到外面的廁所，坐在裏面哭了起來。最後，我還是鼓起勇氣回去工作，但不斷對天使說我有多麼悲傷，有多麼無助。


    在賣場工作約一年後，主管請我加班，我同意了。其實我已經知道我必須留下來，因爲馬克也要加班。工作時，我看著馬克和他的天使，心裏一邊祈禱著。我能感覺到馬克的喜悅和快樂，以及他對女友的深情愛意。我很肯定他已經和女友訂婚，正在想像兩人的未來，而那是他生活的目標。


    其他工作人員都下班了，只剩下賣場經理、馬克和我。經理問我是否完成工作，我說還要五分鐘。補完貨後我走向衣帽間，一邊回頭看在手提袋櫃台工作的馬克。我急忙下樓到衣帽間拿了外套，便趕緊跑回去，希望還能再看馬克一眼。我趕上了，馬克正在和經理談話。我知道這是最後一面。


    身後的店門關閉後，我穿越停車場和百貨公司後方的小巷子，一邊對天使抒發情緒，因為我感到好無助。突然間，出現一道亮光，裡頭有許多天使，他們包圍著我，把我的靈魂帶離身體。那一刻起，我什麼也不記得，不記得怎麼回家，也不記得那晚所發生的事。隔天早上醒來，我知道天使帶走我的靈魂，它與馬克同在。我的身體和靈魂靠著一絲細線連結著。


    早上起床時，我覺得身體好輕，幾乎感覺不到腳下的地板，但內在是那麼靜止、寧靜。我慢慢更衣、下樓，整個人很虛弱，彷彿生病了。在廚房裏，媽媽問我是否要緊，說我看起來很蒼白。


    我倒了一杯茶，拿了一片土司，便到後院去看我的兔子。這當然只是藉口，因為我不想讓媽媽擔心。和她道別後，我出門搭公車，發現兩邊各有一位天使扶著我走路。


    我露出微笑說：「謝謝你們，天使，請幫助讓我的身體好一些，否則我撐不了今天。」


    我聽見天使的耳語：「別擔心，羅娜，我們會照顧妳。」


    穿越馬路前往公車站時，已經有十多人在等公車，我對天使說：「請讓我有座位可坐，我沒法站著。」


    公車幾分鐘就來了，雖然很擠，但我在最後面找到座位，沒多久就睡著。一陣沙沙聲吵醒我，正前方有個男人正在讀早報，頭條新聞寫著：「年輕人在都柏林遭槍殺。」我閉上眼睛，內心絕望無比。


    公車到站後，我跟著人群下車，走過通往瑪麗街的橋，途經一家名叫海特葛雷（Hector Grey''s）的店鋪，店內傳來廣播的聲音，新聞播報員說：「有位年輕人遭到槍殺。」


    我拔腿飛奔，跑到百貨公司旁的小巷時，已經滿臉淚水。四下無人。讓我震驚的是，地面上有粉筆的痕跡，以及扯開的黃色警示帶，這裏就是馬克遭到謀殺、被槍決的地方。這裏沒有人影，沒有警察，誰也沒有！好像沒有人在乎似的。我覺得好冷，完全不知所措。


    賣場的工作人員議論紛紛，我盡量避開所有人，以免聽見談話內容。不過實在是避不開。大家認爲這是一場派別謀殺，或許是因爲他的女友在北愛爾蘭。


    當時是一九七〇年代初期，北愛爾蘭地區充滿暴力，天主教徒和新教徒爲了宗教而彼此殺害。馬克是天主教徒，他在北愛爾蘭的女友是新教徒。偶爾這樣的暴力也會波及愛爾蘭共和國。


    有一件事是肯定的，那就是馬克直接上了天堂。我曾在天使傾身觸碰他的靈魂時，看見他擁有一個美麗如水晶般澄澈無瑕的藍色靈魂。他死去時，天使都圍繞他身邊，尤其是死亡天使，他之前往生的親人也在場，他們一起溫柔地將馬克帶往天堂。


    那天我在午餐休息時間打電話給喬，請他下班後到公司後門來接我。我告訴他隔天我休假，當晚可以出去走走。我覺得很哀痛，需要他的臂膀來安慰我；也覺得自己好虛弱，甚至無法走到公車站。我始終不曾忘記馬克。


    # 10 炸彈客


    喬和我非常喜歡週末時光。我每四個星期休一次長週末，喬也盡可能跟爸爸協調，好在同一週末休假。我常戲說他能為爸爸工作真是幸運。我們總是提前安排週末活動，最喜歡去的地方包括都柏林山、威克羅山和位於都柏林南邊海岸美麗的布里塔灣（Brittas
    Bay）。


    一晚搭公車回家時，喬問說：「這個週末到威克羅山區的莎麗峽谷（Sally Gap）如何？」那個週日早上，喬九點整來接我，我們在對街轉角處碰面，以防被家人撞見。我準備了野餐的火腿和起司三明治，還有蘋果和巧克力。他給我一個大大的吻，然後說：「出發吧。」我們馬上前往公車站，剛好趕上正要進站的公車。


    公車抵達威克羅山區，乘客全部下車，大家前進的方向都一樣。我很訝異竟有許多情侶和帶著孩子出遊的家庭，於是對喬說沒想到這裏這麼受歡迎。走了約一點六公里路後，我們來到一處滿布巨石的高地，群山圍繞，景色優美，空氣清涼又新鮮。接著，我們爬過大石頭。我很喜歡爬石頭，不過我身材嬌小，石頭又非常巨大，但對喬來說不是問題，所以偶爾得靠他幫忙。一路上我們玩得很開心。


    我們坐在一塊巨石上野餐，聊了好幾個小時，坐在那裏享受陽光，景仰山勢的美麗。最後，打包完吃剩的食物，喬接過袋子，手臂摟著我的肩膀。就在要爬下石頭時，發生一件令我驚訝的事——喬的天使出現在他右邊身後約一步的距離。我對天使笑了笑，天使對我說：「羅娜，看到陽光照耀在那座小湖上嗎？到那裏去。」


    喬問道：「為什麼笑得這樣燦爛？」


    我不能告訴他是因為對他的天使笑。我仍然沒有勇氣讓喬知道我能看見天使和其他事物，我不知道他會做何反應。


    「看那邊，」我說，「那片小樹林和石頭堆反射陽光的地方，是不是有個小湖泊？」


    「我們剛才為何沒看見呢？」喬問道。


    我們朝小湖的方向前進，抵達時遇見一對正在野餐的情侶，並且受邀跟他們一起喝茶，坐在湖畔談天說笑。


    那天，天使讓我看見許多美麗的景物。若是能與喬分享祕密，或者天使也能讓他看見靜謐幽雅的畫面，該有多好？可惜不行。


    湖宛如一面玻璃，映照出樹林與一隻飛越湖面的翠鳥倒影。我還看見一隻翠鳥在水底移動，也看見牠從水底升起、飛入天空時的倒影閃耀著彩虹光輝。牠輕點水面，劃破寧靜的湖面，激起一波漣漪，餘波幾乎觸碰另一隻鳥的尾羽。水波盪漾，湖面上飛翔的鳥影看起來不只一隻，彷彿還跟了許許多多的翠鳥。


    後來，天使說：「羅娜，該回家了。」


    我對喬說天色即將轉暗，該動身回家。那對情侶說他們有指北針，知道另一條回去的路，建議我們一起走。


    我們接受建議。我不知道究竟花了多少時間才回到公車站，但是抵達時我已筋疲力竭。喬仍然貼心地一路陪我回到家門口，在我臉頰上親吻道別，然後跑去趕搭幽靈公車回市區。我請求天使保護喬平安到家，也請求天使讓他身體保持健康，因為雖然喬看起來精神飽滿，充滿活力，但我能看見他體內的器官開始生病，不僅體積縮小，而且呈現灰色光澤。儘管那是極微小的變化，在我眼底卻是一清二楚。我擔心這是以萊亞所預言的病徵的開始。


    我永遠忘不了媽媽發現我和喬交往的那一天。那天我休假，在家幫媽媽做些家事，也和我的兔子依莎貝爾玩了一會兒，下午姊姊愛美爾也在家，所以和平常一樣，媽媽並沒有注意到我。從小到大，我總察覺到姊妹或弟弟在家跟媽媽說話時，只要我一進門，他們就停止對話。我若待在同一間房裏，或坐下來加入他們，對話就會完全停止。我偶爾會難過家人不願與我分享事物。


    喬和我六點半有約會，我從庭院回到屋內，準備晚上出門。媽媽在廚房問我要去哪裏，我說要去趕五點的公車，就繼續通過走道上樓。


    在臥室時，我聽見媽媽和姊姊上樓的聲音。我和姊姊共用一個房間，以爲她要進來，卻沒有，而是去了媽媽房間。雖然聽得到她們在談話，但我因爲晚上要和喬約會而興奮不已，所以沒注意聽。現在我知道當時媽媽正在審問愛美爾。我走出房門時，她們倆就站在樓梯口，愛美爾愧疚地看著我。


    「怎麼了？」我問道。


    媽媽對我大叫：「妳以爲妳要去哪裏？」


    我愣住了！我從未見過她這副模樣。我回答要去都柏林。媽媽卻對我大吼，要知道我是否真的和爸爸的加油站員工交往？媽媽失去理智大喊：「妳要去跟喬約會！這事已經多久了？我現在就要知道，我要你們現在就結束！」


    媽媽非常生氣。我看著她，口齒清晰對她說：「我和喬已經交往好幾個月，而且會繼續交往下去。我現在就要去見他。」


    我轉身就要下樓，媽媽立刻緊抓住我的手臂，一邊拉住我，一邊繼續大吼：「妳膽敢跟低階層的人交往，讓我們蒙羞！」


    我非常震驚於她的憤怒，她展現出我從未見過的一面，對她而言，喬的階級竟比我們低。我看了看她，繼續走下樓。她仍緊緊抓住我的手臂，拉著我說：「不准妳搭公車去會見那個年輕人喬。」


    我看見媽媽的守護天使站在她的身後，熱淚盈眶，幾滴淚水滑落在媽媽的頭上。如今爸爸的經濟狀況好轉，有一棟自己的房子了，媽媽就忘記我們也曾無家可歸，忘記當時能配給到議會房子時，我們覺得自己有多幸運。我們也貧窮過，就和當時許多愛爾蘭家庭一樣。也許是因爲媽媽來自一個富裕家庭，她的家人覺得她下嫁到低階級人家，所以我們的交往對她來說特別難以面對。'
