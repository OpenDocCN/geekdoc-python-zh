  md: '有個天使說：「看看樹下那片光亮處，就在刺金雀花叢下。」

    我果然找到牠。那是一隻鳥，但不是普通的鳥，而是一隻猛禽。後來我得知那是松雀鷹。牠可能是我見過最乾瘦孱弱、模樣最醜陋的小東西，但對我來說，卻是美麗極了。我把牠拾起來，抬頭看著牠掉下來的大樹梢，我根本爬不上去，更別說把牠放回鳥巢。牠在我手上移動時，我發覺牠受了傷，兩隻腳扭曲變形，脖子也割破，或許是摔落時受的傷。天使告訴我，牠的父母不要牠，所以把牠丟出巢外。

    「這是上帝送給妳的禮物，讓妳在這個暑假和明年夏天照顧牠。但在那之後，牠無法跟你一起回家。」


    有時候天使會說些我聽不懂的話，不過我通常就當成既定事實，接受一切。於是我帶著小鷹穿越樹林和草原回到家，找了個舊帽子和盒子給牠當窩。

    小雛鷹日漸茁壯，不過仍無法正常走路，所以我得帶著牠到處去。牠也無法正常飛行，因為沒辦法雙腳著地。爸爸和我把牠往空中拋向彼此，藉此教牠伸展翅膀，短暫飛翔。

    餵食也是一大難題，牠需要的是血淋淋的生肉，而我無法捕殺獵物來餵牠。我知道肉必須是新鮮的，但牠每次只吃一丁點兒，讓事情更難為。爸媽沒法給我一分半角去買生肉給牠吃，所以我對天使說：「你們讓我很為難。」記得和家人到幾哩外的齊拉雷歐（Killaleo）時，我帶著小鷹到一間肉鋪，跟肉販說我需要生肉來養牠，可是我沒錢。我憎恨自己必須乞討。但肉販人很好，告訴我放假的時候隨時去找他，他會給我生肉。這聽起來很簡單，事實上並非如此，因為爸媽並沒有多餘油錢往來齊拉雷歐和蒙夏南。'
