  md: '喬給我一個擁抱，我覺得好過一點，試著讓自己忘記影像。雖然當下很想立刻去看看父親，卻無法成行，因為還要照顧三個孩子，而且我們也沒車。幸運的是，隔天爸爸就來探望我們。看見他，我非常開心，卻不能告訴他為什麼。


    我通常能夠看見人體內的病痛，有時候看見骨頭發出亮光，有時候心臟會跳到某人的胸前，有時候器官的周圍環繞著黑影。我仔細觀察爸爸，卻看不出哪裏有異樣，讓我感到很困惑。


    幾星期後，天氣好轉，喬在家帶孩子，我前往梅努斯學院的校園散步。我走在蘋果園和樹林間，讚美並感恩上帝，享受著散步時光，感受清新的冷風吹在臉上。我看著鳥兒和松鼠，看著一切生物，不禁笑了，因為我不僅看見牠們平常的模樣，也看見環繞著牠們的能量光芒。


    我和路上遇見的人問好，包括一位神父和一位推著娃娃車的母親。突然間，天使米迦勒出現在身邊和我並肩而行。他把手搭在我的肩上，隨後又觸碰了我的手，我的內心立即充滿平靜。「謝謝你，米迦勒，」我說，「這讓我感到很舒服。」


    米迦勒以人形模樣走在我身邊，和平常一樣，他身材高大，一頭深色頭髮，不過這回是短髮。他穿著黑色套裝、黑色外套，很容易被誤以爲神父。我看著他笑說：「我很欣賞你這神父般的模樣！」


    他假裝打了個顫，翻起外套的領子說：「這樣看起來如何？」我們都笑了。


    幾位神父手上拿著祈禱書，經過時打了聲招呼，米迦勒點頭予以回應。還有個鄰居走'
