  md: '菲，當然還有姊姊愛美麗。我並不常和他們玩耍，大都只在生日派對或特殊活動時才一起遊戲，或許是興趣不同的關係，因為我用不同的眼光看世界。


    最初的生活有點寂寞，但我很快又交到朋友，認識了小女孩羅薩琳，她住在連接各家庭院的後圍牆另一側。那道牆和馬路一樣長，又寬又大，走在上面也很安全。爸爸搭了一座梯子讓我們能爬上牆，才不會磨損鞋子，我們就這樣從一家走到另一家，或者走到盡頭的田野裏。我非常喜歡那道牆，以及站在上面看到的一切事物。


    羅薩琳成了我的好朋友，她住在牆另一側隔了六家的一棟漂亮的大房子裏，我們利用那道牆往來拜訪彼此，很少繞道走大馬路。她也來自一個大家庭，不過兄弟姊妹有些已經長大離開家。我認識她的妹妹卡洛琳和大她八歲的哥哥麥克。羅薩琳又高又瘦，有一頭長直髮，是個非常有趣又很愛笑的女孩。我很喜歡跟她和她的家人在一起，事實上，我和他們相處的時間比和自己家人還長。


    印象中，羅薩琳的父親是德國人，非常壯碩，有一頭逐漸變灰的黑髮。他經常出門做生意，但在家的時候，對羅薩琳、她哥哥和妹妹，還有我都非常好。星期天他會給小孩買一口袋糖果，我也被算在裏面，我既高興又驕傲，因爲每件事都有我的份。儘管糖果袋裏也許只有七、八顆糖果，但每顆都好漂亮，所以我總是盡量慢慢吃，越慢越好。


    羅薩琳家每到星期天還有一個我很喜歡的活動，就是聽她媽媽念故事書。我們全部聚集到羅薩琳的房間，坐在床上，有時候只有羅薩琳、卡洛琳和我，有時候麥克或我的姊妹也會加入。羅薩琳的媽媽很會念故事書，全神貫注聽上一小時後，她便解散我們。有時候書太'
