    媽媽很會做衣服，只要閱讀說明就知道兩件禮服需要多少布料。她算好所需的布料後，我們便到櫃台去請人幫助。店員把兩捲布擺在櫃台上，一尺一尺量好，布越堆越高。店員把布料摺得漂漂亮亮，然後放進袋子裏，同時也把樣版和收邊的材料包好。


