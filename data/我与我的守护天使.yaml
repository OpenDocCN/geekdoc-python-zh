    開。'
- md: '摸，妳們之間強而有力的精神連結，將會為她帶來力量，幫助她度過疾病。從現在起直到她痊癒為止，妳會不斷看見小女孩的臉龐出現在面前。」


    接下來幾個月，我經常看見小女孩的笑臉出現在我眼前，感受到她的病痛和恐懼。每次我都為她祈禱，請求上帝和她的守護天使幫助她好轉。我知道小女孩病危，而我是她的生命線。不知怎麼的，在精神上，我讓她能夠活下去。只要有需要，我的精神就與她同在，而且不讓她的靈魂離開身體。我感覺到她生理上的疼痛，一如我能感受到其他人的病痛一樣。


    突然間，我不再看見小女孩的臉龐，於是知道她已經痊癒。我感謝上帝和天使之後，便不再多想。多年以後，我看見那位母親和女孩走在梅努斯的大街上，她們的守護天使也手牽手走在一起。小女孩已經是個健壯的青少女。我笑了，心底感謝上帝與天使們。


    夏天來臨，露絲已經幾個月大。某天我推著娃娃車帶她散步曬太陽，突然間四周氛圍改變，極端安靜無聲，空氣停止流動，同時越來越明亮。我知道有個天使要來了，雖然我步伐未停，卻覺得兩腳沒有觸及地面，周圍也沒有東西在動。我感覺到身後有個存在，停下腳步轉身，卻誰也沒看到。我繼續向前走，但才踏出一步，就再度感覺到那個存在。


    「不管是誰走在我後面，請你現身。」我說。


    沒有回應。


    「不要這樣，我討厭這樣。」


    我以極緩慢的速度繼續往前走，接著似乎有人在我肩膀上拍了一下，轉過身去，一位天使就在那裏，但他像一道光，有星星的光芒，不停閃爍，只是比星星還亮許多。我道了聲：「哈囉。」沒有回應。有時候，我會羞於對天使說話，我覺得他們有時也羞於跟我說話。對靈性的世界而言，溝通也跟物質世界一樣重要，有時候也一樣困難，所以我告訴這位天使，他若能以近似人類的模樣現身，有助於我輕鬆跟他對話。


    當他以人形現身，我才察覺到是天使米迦勒。他把自己變成非常英俊的男人，年約四十歲，一百八十公分高，又或更高些，深藍的眼睛，深色及肩的頭髮。


    「這回你真的把自己變得非常俊美。」我們倆都笑了。


    我推著娃娃車，寶寶在車裏熟睡著，我們沿著馬路往前走。米迦勒說他來是爲了告訴我關於一本天使要我撰寫的書，希望我寫下特定事物。我回答說，我內心深處早已知道自己必須寫一本書，但也承認我對此相當害怕，害怕遭到嘲笑。


    「羅娜，妳必須爲我們做這件事的日子終將來臨。」米迦勒天使答道。這一天在許多年後才發生，但終於到來，而這是我的第一本書。


    自從我嬰兒時在臥房裏第一次見到美麗的米迦勒天使，他便經常來找我，在我的生命中来来去去，有時和我散步，或陪我坐在廚房裏，有時在火爐邊陪伴我，說他需要讓自己暖起來，我總笑著告訴他天使感受不到寒冷，但他說自己能想像寒冷的感覺，因爲他陪伴過太多人類了。


    我們就像人類朋友般彼此對談，有時談的是家常瑣事，有時是重要的大事。米迦勒說越來越少人請求天使的協助，所以我們也會談到數百萬天使失業這樣的大事。


    而這就是撰寫本書的原因，如此大家才能了解天使就在我們身邊，始終不曾離去，我們要做的只是請求協助，允許他們伸出援手。就這麼簡單。我聽著米迦勒的敘述，他告訴我該寫些什麼，告訴我要述說發自內心的言語。


    上帝派遣這些美麗的天使來到世間幫助我們，但多數人忽視他們的存在。我們要做的只是發出請求，請求他們協助。就是這麼簡單。


    ## 19

    「我在這裏,我在這裏——在這裏啊!」


    露絲只有幾個月大的某天早上,我帶她到衛生所做檢查。回到家餵她奶時,我感覺到有個靈體逐漸接近小屋,那是個鬼魂。我低頭祈禱,不作多想。


    日子一天天過去,靈體造訪的次數越來越密集,我的身體彷彿被拖著,有種被往下拉的感覺,好像要把我拉到地上,有時候力量非常強大。我祈禱了許多次,請求上帝將靈體送往天堂。有一天,我站在廚房的水槽邊,小屋大門開著,我就這樣看著靈體走入大門。他的存在非常模糊,我看不清楚他的模樣,只能感覺到那是個男性,身材比我高,但完全無法得知他的長相。我停下手邊的工作,在確確實實感覺到他的存在前,我已開口問道:「有什麼問題嗎?我能幫你什麼?」


    靈體糾纏著我,不斷反覆說:「我在這裏,我在這裏——在這裏啊!」他一而再、再而三說著這些話,但我不懂為什麼。雖然明白他無意傷害我,可是他那極端的絕望,對我的身體造成實質的拉力,強烈把我往下拉,使我頓時失去知覺。等我清醒過來,發現自己緊抓著水槽邊緣,設法撐高。靈體則和出現時一樣突然消失。我召喚天使,同時進行禱告。雖然門仍開著,但我聽到敲門聲,轉身一看,門口站著我的三位天使,米迦勒、荷賽司和以萊亞。


    荷賽司模仿著小丑的模樣朝我走來，逗得我笑出聲來。我謝了他，因為我需要笑一下。


    「那靈體有什麼問題？」我問道。


    米迦勒天使走到我面前，握住我的雙手，荷賽司走到我的左邊，以萊亞走到右邊。


    「米迦勒，那個靈體差點把我拉到地板上！」我說。


    「羅娜，」米迦勒回道，「我們會為妳及靈體注入身體和心理所需的能量，但我們無法多說什麼，至少現在不行。要記得，我們一直在妳身旁，妳永遠不會是孤單一人。」


    「米迦勒，我不喜歡你們這種方式，難道不能讓事情簡單點嗎？」


    「抱歉，羅娜，我們不能給妳更多訊息，否則妳無法幫助靈體。」米迦勒天使說完後，將他的手收回。


    靈體每天來報到，但我永遠不知道他會在早上或晚上出現，每一次他把我往下拉時，總是發出同樣絕望的聲音：「我在這裏，我在這裏——在這裏啊！」


    幾個月過去，我逐漸筋疲力竭，但喬從羊毛工廠下班回來，甚至不曾注意到我看起來有多疲倦。這段時間他的身體狀況還不錯，但我仍然看見灰色的腐敗能量。


    到最後，我從各種靈視影像中慢慢得知靈體是個年輕人，大約十七到二十歲，名字叫彼得，被困在水中，努力想掙脫出來。他似乎無法使用雙手，抓不住任何東西。有時候水看起來很混濁，他似乎被一層土石壓著。年輕人的靈體不斷拉扯、掙扎。他試了又試，不停地喊著：「我在這裏，我在這裏——在這裏啊！」不知怎麼的，我的身體和他的靈體開始交纏在一起，感受到他為求生而做的種種掙扎；同時也感受到他的情緒，他想要被找到，想要回家，想讓父母家人知道他在哪裏。我對上帝祈禱，希望他能被發現。


    我問天使能否告訴喬這件事，他們允許了。有一晚，喬從庭院進屋，看著我說：「怎麼回事？妳看起來糟透了，生病了嗎？」


    「沒有，喬，我需要跟你分享一件事情。」當時我還未讓喬知道太多我靈性層面的事物，但這一回天使說我真的需要他的協助。


    我們坐下來後，我繼續說：「有個年輕人的靈體來找我，他需要協助，但這已經對我的身體和精神造成耗損，我需要你的支持和幫助。請你在必要時候照顧我，有時候，我需要你把我摟在懷裏。」


    喬把我抱在臂彎裏，看著我。他不了解究竟發生什麼事，他當然無法理解。


    「我會盡力而為。」他說。


    有一回靈體造訪時，我看見了一個靈視影像，感覺像是透過他的雙眼，透過水而呈現的影像。我似乎從水底看見了他的遭遇。當時他正走在河岸上，一旁有一條小徑，他的身邊有兩、三個人拉扯著他。年輕人很害怕，因為他們指責他做了一件他沒做的事情，而他根本不知道他們在說什麼。他設法說服他們，告訴對方弄錯了。其中一人卻大聲回道：「我們沒弄錯。」


    他們揍他，把他踢倒在地，狠狠大打出手。他為了別人做的事而受到懲罰。突然間，影像消失，什麼也看不見。


    一切仍持續發生。大約在露絲八個月大的某個星期天下午，我聽到敲門聲，來訪的是弟弟柯爾馬克的新婚妻子莎麗。我還沒正式見過她，因為不久前他們結婚時，我正在住院，喬單獨帶著孩子們去參加婚禮。問候過後，我請她在火爐邊坐下來取暖。「柯爾馬克沒跟妳來嗎？」我問她。


    「沒有。」她回答，並且爲自己無法久留而道歉。「我只是想來拜訪一下，把婚禮的照片帶來給妳。」


    我們在火爐邊談話，喬爲她泡了一杯茶，她很高興能見到我們和新生寶寶。莎麗走到門口打算離開，卻又停下腳步告訴我們她的弟弟失蹤了。她很驚訝我們還不知道這個消息，竟然沒有人提起。他已經失蹤一段時間。有一晚他出門見女朋友，卻始終沒有抵達女友家。莎麗說她的父母非常擔憂，以爲他跑到英格蘭去，所以正在接觸救世軍，聯絡英格蘭各地的青年旅社。他目前名列失蹤人口名單上，可是沒有人知道他爲何不告而別。


    「我相信他很快就會回家。」道別時我對她說，「莎麗，不要客氣，歡迎妳隨時過來坐坐。」


    有時候我實在很遲鈍。好一陣子之後，我才察覺自己和那年輕人幾年前曾經因爲一連串奇怪的巧合，而有過一面之緣。有個下午，我們到妹妹愛歐菲和她丈夫的新家去拜訪，房子在市中心，有個小前院，院子周圍有銀色欄杆。喬打開柵門，還把克里斯多夫抱高，讓他能夠搆到敲門的門環。愛歐菲開門後，開心歡迎我們。


    我們進入餐廳，認識了愛歐菲的婆婆，親切的老人家張開雙臂歡迎我們。那棟房子感覺很小，也許是因爲屋內有許多美麗的家具，所以幾乎沒有活動的空間。餐廳一角的壁爐前有兩張椅子，一張在右邊，另一張在壁爐前方。室內因爐火而舒服溫暖。一條走道從大門穿過家具，延伸到壁爐，再接到後面的小廚房。


    我坐在火爐前，把歐文放在膝蓋上餵奶。唯一坐著的人只有我，其他人全都站著。狹小的餐廳和廚房一共擠了七個人，之後又有人敲門，擠進來更多人。我沒看見是誰進來，只是坐著繼續餵歐文。進來的是弟弟柯爾馬克和莎麗，不過那時大家忙著說話，所以我沒看見他們。突然，一道光閃現，我試著尋找光的來源。天使並未現身，我也沒有看見任何異常現象。光閃現得非常快。室內談笑聲不斷，我無法公開和天使談話，只能默默與他們溝通，但他們沒有回應。


    我再度抬頭看，在站著的人群縫隙中，又看見了那道光，似乎是室內某個在我視線之外的人散發出來的光芒。人群身影似乎變得透明，大家也彷彿把頭稍微朝左或朝右移動，讓出一道空間讓我能看到屋子的另一端。我看見一位陌生年輕人的臉部側寫，他轉頭朝我望來，臉上散發出柔和的光芒，對我微微笑了一下。我也對他微笑，他的眼睛發出亮光。我只在那瞬間看見他，大家又開始移動，把他擋在我的視線之外。


    接著一切迅速恢復正常，稍後我問了妹妹愛歐菲那個年輕人是誰。她說是莎麗的弟弟彼得。之後我也沒把這件事放在心上。


    喬也沒有聯想到此事，沒有想到那靈體就是莎麗失蹤的弟弟。或許我們本來就不該聯想到他。事實上喬的好奇心很重，在正常狀況下，莎麗一離開，他就會告訴我那鬼魂是她的弟弟。但這並非上帝的計畫。他被找到的時機未到。


    年輕人的靈體持續在水底驚恐掙扎著，不知道自己身處何處。他掙扎著想要吸一口氣，卻吸入更多水，而且摸不清頭上方那一片黑暗、詭異的昏暗光芒究竟是什麼。他急切渴望被找到，想要讓家人知道他愛他們。他不斷拜訪我，一次又一次說：「我在這裏，我在這裏——在這裏啊！」許多次我呼喚天使和上帝，請求他們給我力量。我不斷努力祈禱，希望年輕人能被尋獲，讓靈體得到自由與平靜。我祈禱他的家人能將屍體帶回家，為其哀悼，並且明白他沒有逃家，而且深愛著他們。


    有一晚，我坐在火爐邊，整個人筋疲力竭，喬看著我說：「天啊，妳好蒼白！那年輕人的鬼魂又來了。這實在耗損妳太多精力，看起來簡直快掛了，跟那個年輕人一樣。不可以再這樣，停下來！」喬大發脾氣，非常氣憤上帝。


    「喬，不要發怒，」我說，「這樣發怒，讓我無法和你相處，請你支持我、安慰我就好。上帝，請讓年輕人盡快被找到。」


    喬把我抱在懷裏。我一定睡著了，醒來時我仍然坐在火爐旁的椅子，身上蓋著毯子。孩子們已經上床睡覺，喬對我微笑，然後起身去泡茶。


    我坐在火爐旁，手裏握著一杯茶，對喬說：「你不可以再那樣發怒，喬。我需要你的支持與安慰，尤其當上帝和天使允許我跟你分享發生在我生命裏的種種超自然現象時，更是需要你的支持。喬，在我筋疲力竭的時候，最需要的是你的幫助。」


    喬抱住我，親吻了我，我們在火爐前握著手，一起為年輕人的靈魂祈禱，希望他很快就能被尋獲，以還他自由，也還我自由。喬跪在我的椅子前，雙手捧著我的臉說：「如果上帝要求我來做他要求妳做的事，我可能得拒絕，因為我沒有妳的勇氣，也沒有妳的力量或強烈的信心。」


    生活如常進行，但突然間，我自由了。別問我那是哪一天或什麼時間，我不知道，只是突然間覺得一切恢復正常，覺得自己又是個人了。我非常開心，甚至高興得跳起來。我知道年輕人的屍體一定被找到，於是趕緊告訴喬這個消息。「他被找到了！我知道他們已經找到他的屍體，因為他離開我了。」我在小屋裏手舞足蹈，一邊讚美感謝上帝。喬給我一個擁抱。當天稍晚，我們到教堂裏點了一根蠟燭，感謝上帝讓彼得的靈魂得到自由，回歸上帝。


    上帝允許彼得的靈體停留在世間，直到屍體被找到為止，而我則是超自然世界與物質世界間的連結。少了這個連結，我相信他永遠不會被找到。許多年前，在我妹妹位於都柏林市區的小屋裏，一切尚未發生之前，連結就已建立。


    奇蹟隨時發生。當奇蹟發生時，平常所謂的因果關係就不再重要。有時候奇蹟在許多年前便已注定要發生。這次就是上帝和天使事先安排的奇蹟。我知道彼得的守護天使，以及與他死亡有關的人的守護天使，一定非常努力阻止無辜的年輕生命枉死於一場錯誤的復仇中，但殺害彼得的人沒有傾聽他們天使的聲音，我感到悲傷。


    彼得是個非常美麗的靈體。屍體被尋獲時，他的靈體也上了天堂。不過，他為我做了一件意料之外的事情，他派姊姊來知會我。


    在我感覺彼得已經離開的幾天後，莎麗來到小屋。她看起來像一路跑來似的，一臉興奮難安。她覺得需要讓我們知道已經在運河找到她弟弟的屍體，他被壓在河岸下，雙手被繩子綁住。


    「我在這裏，我在這裏——在這裏啊！」


    直到此時我才發現，原來那美麗的靈體竟是莎麗的弟弟，也就是多年前曾有過一面之緣的男孩。莎麗很悲傷，但又很高興搜尋的過程已經結束。當莎麗站在我面前述說一切時，我看著她的臉龐，也看見了彼得的靈魂。他請毫不知情的姊姊急急忙忙來拜訪我們，告訴我們他已經被找到。彼得藉此來感謝我，而莎麗是彼得與我之間的靈性使者。至今，莎麗不曾再來拜訪過我。


    ## 20

    金鍊子


    有個寒冷的冬天早上，喬結束夜班工作回到家，上床休息前，他先跟孩子們說讓媽媽休息一下，打算帶他們到運河去看鴨子。我從來沒見過兩個男孩和他們的小妹妹準備的動作如此迅速，他們穿上外套、戴好帽子就出門去了。


    他們一出門，我眼前忽然閃現一段關於我父母的靈視影像。我看見他們站著談話，四周似乎吹著強風，兩人很像是站在一起，但爸爸又不像真的存在，看起來像個靈體。靈視影像來得突然，去得也快。我被告知爸爸的生命即將終了，當下彷彿遭到雷擊。


    我哭了，哀求著上帝和天使，因為我深愛父親。感覺上，喬和孩子們才離開沒幾分鐘，就又回到家了。孩子們非常興奮，告訴我他們在運河看見的事物。我去泡茶時，喬對我說：


    > 「出了什麼事嗎？妳看起來非常蒼白，而且哭過。」

    > 「我看見一個靈視影像，」我對喬說，「我爸就要往生了！」

    > 「也許妳誤解了。天使怎麼說？」

    > 「他們什麼也沒說，我只是看見了影像。我哀求上帝和天使，難過到無法理解他們要說什麼。然後你和孩子們回來了。感覺上，你們好像才離開幾分鐘。」


    喬給我一個擁抱，我覺得好過一點，試著讓自己忘記影像。雖然當下很想立刻去看看父親，卻無法成行，因為還要照顧三個孩子，而且我們也沒車。幸運的是，隔天爸爸就來探望我們。看見他，我非常開心，卻不能告訴他為什麼。


    我通常能夠看見人體內的病痛，有時候看見骨頭發出亮光，有時候心臟會跳到某人的胸前，有時候器官的周圍環繞著黑影。我仔細觀察爸爸，卻看不出哪裏有異樣，讓我感到很困惑。


    幾星期後，天氣好轉，喬在家帶孩子，我前往梅努斯學院的校園散步。我走在蘋果園和樹林間，讚美並感恩上帝，享受著散步時光，感受清新的冷風吹在臉上。我看著鳥兒和松鼠，看著一切生物，不禁笑了，因為我不僅看見牠們平常的模樣，也看見環繞著牠們的能量光芒。


    我和路上遇見的人問好，包括一位神父和一位推著娃娃車的母親。突然間，天使米迦勒出現在身邊和我並肩而行。他把手搭在我的肩上，隨後又觸碰了我的手，我的內心立即充滿平靜。「謝謝你，米迦勒，」我說，「這讓我感到很舒服。」


    米迦勒以人形模樣走在我身邊，和平常一樣，他身材高大，一頭深色頭髮，不過這回是短髮。他穿著黑色套裝、黑色外套，很容易被誤以爲神父。我看著他笑說：「我很欣賞你這神父般的模樣！」


    他假裝打了個顫，翻起外套的領子說：「這樣看起來如何？」我們都笑了。


    幾位神父手上拿著祈禱書，經過時打了聲招呼，米迦勒點頭予以回應。還有個鄰居走過，我和她並不熟，她說又看見我和朋友一起散步。想到此，我不禁笑了。除了家人之外，我從未和其他人一起散步，所以她看見的是米迦勒。（我想大概有三次別人說看見我和某人走在一起，但實際上我是獨自一人。後來才明白他們看見的是化爲人形的天使。不過，這種情形或許比我所知的更爲頻繁，只是我沒察覺而已。）


    米迦勒天使說：「趁四下無人，我們到那棵大橡樹下，我來解釋妳父親的靈視影像。」「在你開始解釋前，我要先讓你知道，我很生氣。」


    米迦勒笑著：「羅娜，妳真有個性。」


    我說：「有時候上帝和你們這些天使似乎忘記了我只是個人。我怎麼會想要知道關於父親的死訊？米迦勒，我寧願什麼都不知道！」


    米迦勒以悲傷的神情看著我，握著我的手說：「妳父親需要妳的幫助來穿越死亡。」


    我深呼吸了一口氣。「我愛我爸。」


    米迦勒天使說：「我們走走吧。」他握著我的手散步，一邊繼續說。


    「還記得看見妳爸爸影像的那天，喬帶孩子到運河去嗎？上帝就是在當時把妳父親和妳的靈魂連結在一起。你們的靈魂現在已經相互交纏。幾天內，妳將會看見他從受精那一刻起的每一個生命片段，影像就像電視螢幕般在妳眼前和腦海中不斷播放。當影片停止，妳會突然感受到一股震撼，因爲他的靈魂正與妳的靈魂分離，也同時從他的身體抽離，由天使們領著到上帝身邊。」


    我走在米迦勒身邊，哭得傷心欲絕。


    「羅娜,讓我拭去那些淚水。」天使米迦勒雙手舉到我的眼前,我才察覺我們已不再走動,而是站在光圈之中。我抽抽噎噎說:「這真的很難面對。」


    「羅娜,記得,上帝和我們這些天使將會幫助妳一起度過。」天使米迦勒手伸入我的口袋,觸碰了我的手。「我會陪妳走到小徑盡頭,然後必須離開。」


    我們沉默走著。雖然只是一小段路,我已能感受到米迦勒給我的力量,他捏緊我的手,放鬆時,他也消失了。我繼續走回家,並未告訴喬我和米迦勒天使的會面。


    一如米迦勒所預言,在幾天內,爸爸的生命史開始在我眼前和腦海裏持續不斷上演,影像時而快速時而緩慢,但始終不曾停止。我一遍又一遍看著影像,看見爸爸小時候和另一個孩子在泥巴裏玩耍;他骨瘦如柴的身形坐在書桌前的模樣;他長成青年,擁有一頭黑髮,和一位美麗的年輕女孩坐在河邊,我知道那女孩就是媽媽;也看見爸爸在舊克爾麥罕昏暗的店鋪裏修理腳踏車,還有他看見我們居住的小屋倒塌時,臉上絕望的表情,以及他搭船前往英格蘭工作時的寂寞……


    爸爸來探望我們的次數越來越頻繁,有時候甚至一大早就來了,說他只是想來看一下,喝杯茶、聊個天,停留幾分鐘就好。我好想告訴他一切,但怎麼說得出口?你無法對認識的人說他即將離開這個世界,而且你們的靈魂相連在一起,這樣你才能幫助他走過死亡。這些話太嚇人了,我們的靈性還未發展到這個程度。


    爸爸才逐漸開始認識上帝,最近這些年,他的靈性成長許多。我記得幾年前他曾對我說:「我怎麼會花這麼久的時間才發現上帝呢?」能看到爸爸的靈魂成長,是一件很美好的'
  mdcn: '摸，妳們之間強而有力的精神連結，將會為她帶來力量，幫助她度過疾病。從現在起直到她痊癒為止，妳會不斷看見小女孩的臉龐出現在面前。」


    接下來幾個月，我經常看見小女孩的笑臉出現在我眼前，感受到她的病痛和恐懼。每次我都為她祈禱，請求上帝和她的守護天使幫助她好轉。我知道小女孩病危，而我是她的生命線。不知怎麼的，在精神上，我讓她能夠活下去。只要有需要，我的精神就與她同在，而且不讓她的靈魂離開身體。我感覺到她生理上的疼痛，一如我能感受到其他人的病痛一樣。


    突然間，我不再看見小女孩的臉龐，於是知道她已經痊癒。我感謝上帝和天使之後，便不再多想。多年以後，我看見那位母親和女孩走在梅努斯的大街上，她們的守護天使也手牽手走在一起。小女孩已經是個健壯的青少女。我笑了，心底感謝上帝與天使們。


    夏天來臨，露絲已經幾個月大。某天我推著娃娃車帶她散步曬太陽，突然間四周氛圍改變，極端安靜無聲，空氣停止流動，同時越來越明亮。我知道有個天使要來了，雖然我步伐未停，卻覺得兩腳沒有觸及地面，周圍也沒有東西在動。我感覺到身後有個存在，停下腳步轉身，卻誰也沒看到。我繼續向前走，但才踏出一步，就再度感覺到那個存在。


    「不管是誰走在我後面，請你現身。」我說。


    沒有回應。


    「不要這樣，我討厭這樣。」


    我以極緩慢的速度繼續往前走，接著似乎有人在我肩膀上拍了一下，轉過身去，一位天使就在那裏，但他像一道光，有星星的光芒，不停閃爍，只是比星星還亮許多。我道了聲：「哈囉。」沒有回應。有時候，我會羞於對天使說話，我覺得他們有時也羞於跟我說話。對靈性的世界而言，溝通也跟物質世界一樣重要，有時候也一樣困難，所以我告訴這位天使，他若能以近似人類的模樣現身，有助於我輕鬆跟他對話。


    當他以人形現身，我才察覺到是天使米迦勒。他把自己變成非常英俊的男人，年約四十歲，一百八十公分高，又或更高些，深藍的眼睛，深色及肩的頭髮。


    「這回你真的把自己變得非常俊美。」我們倆都笑了。


    我推著娃娃車，寶寶在車裏熟睡著，我們沿著馬路往前走。米迦勒說他來是爲了告訴我關於一本天使要我撰寫的書，希望我寫下特定事物。我回答說，我內心深處早已知道自己必須寫一本書，但也承認我對此相當害怕，害怕遭到嘲笑。


    「羅娜，妳必須爲我們做這件事的日子終將來臨。」米迦勒天使答道。這一天在許多年後才發生，但終於到來，而這是我的第一本書。


    自從我嬰兒時在臥房裏第一次見到美麗的米迦勒天使，他便經常來找我，在我的生命中来来去去，有時和我散步，或陪我坐在廚房裏，有時在火爐邊陪伴我，說他需要讓自己暖起來，我總笑著告訴他天使感受不到寒冷，但他說自己能想像寒冷的感覺，因爲他陪伴過太多人類了。


    我們就像人類朋友般彼此對談，有時談的是家常瑣事，有時是重要的大事。米迦勒說越來越少人請求天使的協助，所以我們也會談到數百萬天使失業這樣的大事。


    而這就是撰寫本書的原因，如此大家才能了解天使就在我們身邊，始終不曾離去，我們要做的只是請求協助，允許他們伸出援手。就這麼簡單。我聽著米迦勒的敘述，他告訴我該寫些什麼，告訴我要述說發自內心的言語。


    上帝派遣這些美麗的天使來到世間幫助我們，但多數人忽視他們的存在。我們要做的只是發出請求，請求他們協助。就是這麼簡單。


    ## 19

    「我在這裏,我在這裏——在這裏啊!」


    露絲只有幾個月大的某天早上,我帶她到衛生所做檢查。回到家餵她奶時,我感覺到有個靈體逐漸接近小屋,那是個鬼魂。我低頭祈禱,不作多想。


    日子一天天過去,靈體造訪的次數越來越密集,我的身體彷彿被拖著,有種被往下拉的感覺,好像要把我拉到地上,有時候力量非常強大。我祈禱了許多次,請求上帝將靈體送往天堂。有一天,我站在廚房的水槽邊,小屋大門開著,我就這樣看著靈體走入大門。他的存在非常模糊,我看不清楚他的模樣,只能感覺到那是個男性,身材比我高,但完全無法得知他的長相。我停下手邊的工作,在確確實實感覺到他的存在前,我已開口問道:「有什麼問題嗎?我能幫你什麼?」


    靈體糾纏著我,不斷反覆說:「我在這裏,我在這裏——在這裏啊!」他一而再、再而三說著這些話,但我不懂為什麼。雖然明白他無意傷害我,可是他那極端的絕望,對我的身體造成實質的拉力,強烈把我往下拉,使我頓時失去知覺。等我清醒過來,發現自己緊抓著水槽邊緣,設法撐高。靈體則和出現時一樣突然消失。我召喚天使,同時進行禱告。雖然門仍開著,但我聽到敲門聲,轉身一看,門口站著我的三位天使,米迦勒、荷賽司和以萊亞。


    荷賽司模仿著小丑的模樣朝我走來，逗得我笑出聲來。我謝了他，因為我需要笑一下。


    「那靈體有什麼問題？」我問道。


    米迦勒天使走到我面前，握住我的雙手，荷賽司走到我的左邊，以萊亞走到右邊。


    「米迦勒，那個靈體差點把我拉到地板上！」我說。


    「羅娜，」米迦勒回道，「我們會為妳及靈體注入身體和心理所需的能量，但我們無法多說什麼，至少現在不行。要記得，我們一直在妳身旁，妳永遠不會是孤單一人。」


    「米迦勒，我不喜歡你們這種方式，難道不能讓事情簡單點嗎？」


    「抱歉，羅娜，我們不能給妳更多訊息，否則妳無法幫助靈體。」米迦勒天使說完後，將他的手收回。


    靈體每天來報到，但我永遠不知道他會在早上或晚上出現，每一次他把我往下拉時，總是發出同樣絕望的聲音：「我在這裏，我在這裏——在這裏啊！」


    幾個月過去，我逐漸筋疲力竭，但喬從羊毛工廠下班回來，甚至不曾注意到我看起來有多疲倦。這段時間他的身體狀況還不錯，但我仍然看見灰色的腐敗能量。


    到最後，我從各種靈視影像中慢慢得知靈體是個年輕人，大約十七到二十歲，名字叫彼得，被困在水中，努力想掙脫出來。他似乎無法使用雙手，抓不住任何東西。有時候水看起來很混濁，他似乎被一層土石壓著。年輕人的靈體不斷拉扯、掙扎。他試了又試，不停地喊著：「我在這裏，我在這裏——在這裏啊！」不知怎麼的，我的身體和他的靈體開始交纏在一起，感受到他為求生而做的種種掙扎；同時也感受到他的情緒，他想要被找到，想要回家，想讓父母家人知道他在哪裏。我對上帝祈禱，希望他能被發現。


    我問天使能否告訴喬這件事，他們允許了。有一晚，喬從庭院進屋，看著我說：「怎麼回事？妳看起來糟透了，生病了嗎？」


    「沒有，喬，我需要跟你分享一件事情。」當時我還未讓喬知道太多我靈性層面的事物，但這一回天使說我真的需要他的協助。


    我們坐下來後，我繼續說：「有個年輕人的靈體來找我，他需要協助，但這已經對我的身體和精神造成耗損，我需要你的支持和幫助。請你在必要時候照顧我，有時候，我需要你把我摟在懷裏。」


    喬把我抱在臂彎裏，看著我。他不了解究竟發生什麼事，他當然無法理解。


    「我會盡力而為。」他說。


    有一回靈體造訪時，我看見了一個靈視影像，感覺像是透過他的雙眼，透過水而呈現的影像。我似乎從水底看見了他的遭遇。當時他正走在河岸上，一旁有一條小徑，他的身邊有兩、三個人拉扯著他。年輕人很害怕，因為他們指責他做了一件他沒做的事情，而他根本不知道他們在說什麼。他設法說服他們，告訴對方弄錯了。其中一人卻大聲回道：「我們沒弄錯。」


    他們揍他，把他踢倒在地，狠狠大打出手。他為了別人做的事而受到懲罰。突然間，影像消失，什麼也看不見。


    一切仍持續發生。大約在露絲八個月大的某個星期天下午，我聽到敲門聲，來訪的是弟弟柯爾馬克的新婚妻子莎麗。我還沒正式見過她，因為不久前他們結婚時，我正在住院，喬單獨帶著孩子們去參加婚禮。問候過後，我請她在火爐邊坐下來取暖。「柯爾馬克沒跟妳來嗎？」我問她。


    「沒有。」她回答，並且爲自己無法久留而道歉。「我只是想來拜訪一下，把婚禮的照片帶來給妳。」


    我們在火爐邊談話，喬爲她泡了一杯茶，她很高興能見到我們和新生寶寶。莎麗走到門口打算離開，卻又停下腳步告訴我們她的弟弟失蹤了。她很驚訝我們還不知道這個消息，竟然沒有人提起。他已經失蹤一段時間。有一晚他出門見女朋友，卻始終沒有抵達女友家。莎麗說她的父母非常擔憂，以爲他跑到英格蘭去，所以正在接觸救世軍，聯絡英格蘭各地的青年旅社。他目前名列失蹤人口名單上，可是沒有人知道他爲何不告而別。


    「我相信他很快就會回家。」道別時我對她說，「莎麗，不要客氣，歡迎妳隨時過來坐坐。」


    有時候我實在很遲鈍。好一陣子之後，我才察覺自己和那年輕人幾年前曾經因爲一連串奇怪的巧合，而有過一面之緣。有個下午，我們到妹妹愛歐菲和她丈夫的新家去拜訪，房子在市中心，有個小前院，院子周圍有銀色欄杆。喬打開柵門，還把克里斯多夫抱高，讓他能夠搆到敲門的門環。愛歐菲開門後，開心歡迎我們。


    我們進入餐廳，認識了愛歐菲的婆婆，親切的老人家張開雙臂歡迎我們。那棟房子感覺很小，也許是因爲屋內有許多美麗的家具，所以幾乎沒有活動的空間。餐廳一角的壁爐前有兩張椅子，一張在右邊，另一張在壁爐前方。室內因爐火而舒服溫暖。一條走道從大門穿過家具，延伸到壁爐，再接到後面的小廚房。


    我坐在火爐前，把歐文放在膝蓋上餵奶。唯一坐著的人只有我，其他人全都站著。狹小的餐廳和廚房一共擠了七個人，之後又有人敲門，擠進來更多人。我沒看見是誰進來，只是坐著繼續餵歐文。進來的是弟弟柯爾馬克和莎麗，不過那時大家忙著說話，所以我沒看見他們。突然，一道光閃現，我試著尋找光的來源。天使並未現身，我也沒有看見任何異常現象。光閃現得非常快。室內談笑聲不斷，我無法公開和天使談話，只能默默與他們溝通，但他們沒有回應。


    我再度抬頭看，在站著的人群縫隙中，又看見了那道光，似乎是室內某個在我視線之外的人散發出來的光芒。人群身影似乎變得透明，大家也彷彿把頭稍微朝左或朝右移動，讓出一道空間讓我能看到屋子的另一端。我看見一位陌生年輕人的臉部側寫，他轉頭朝我望來，臉上散發出柔和的光芒，對我微微笑了一下。我也對他微笑，他的眼睛發出亮光。我只在那瞬間看見他，大家又開始移動，把他擋在我的視線之外。


    接著一切迅速恢復正常，稍後我問了妹妹愛歐菲那個年輕人是誰。她說是莎麗的弟弟彼得。之後我也沒把這件事放在心上。


    喬也沒有聯想到此事，沒有想到那靈體就是莎麗失蹤的弟弟。或許我們本來就不該聯想到他。事實上喬的好奇心很重，在正常狀況下，莎麗一離開，他就會告訴我那鬼魂是她的弟弟。但這並非上帝的計畫。他被找到的時機未到。


    年輕人的靈體持續在水底驚恐掙扎著，不知道自己身處何處。他掙扎著想要吸一口氣，卻吸入更多水，而且摸不清頭上方那一片黑暗、詭異的昏暗光芒究竟是什麼。他急切渴望被找到，想要讓家人知道他愛他們。他不斷拜訪我，一次又一次說：「我在這裏，我在這裏——在這裏啊！」許多次我呼喚天使和上帝，請求他們給我力量。我不斷努力祈禱，希望年輕人能被尋獲，讓靈體得到自由與平靜。我祈禱他的家人能將屍體帶回家，為其哀悼，並且明白他沒有逃家，而且深愛著他們。


    有一晚，我坐在火爐邊，整個人筋疲力竭，喬看著我說：「天啊，妳好蒼白！那年輕人的鬼魂又來了。這實在耗損妳太多精力，看起來簡直快掛了，跟那個年輕人一樣。不可以再這樣，停下來！」喬大發脾氣，非常氣憤上帝。


    「喬，不要發怒，」我說，「這樣發怒，讓我無法和你相處，請你支持我、安慰我就好。上帝，請讓年輕人盡快被找到。」


    喬把我抱在懷裏。我一定睡著了，醒來時我仍然坐在火爐旁的椅子，身上蓋著毯子。孩子們已經上床睡覺，喬對我微笑，然後起身去泡茶。


    我坐在火爐旁，手裏握著一杯茶，對喬說：「你不可以再那樣發怒，喬。我需要你的支持與安慰，尤其當上帝和天使允許我跟你分享發生在我生命裏的種種超自然現象時，更是需要你的支持。喬，在我筋疲力竭的時候，最需要的是你的幫助。」


    喬抱住我，親吻了我，我們在火爐前握著手，一起為年輕人的靈魂祈禱，希望他很快就能被尋獲，以還他自由，也還我自由。喬跪在我的椅子前，雙手捧著我的臉說：「如果上帝要求我來做他要求妳做的事，我可能得拒絕，因為我沒有妳的勇氣，也沒有妳的力量或強烈的信心。」


    生活如常進行，但突然間，我自由了。別問我那是哪一天或什麼時間，我不知道，只是突然間覺得一切恢復正常，覺得自己又是個人了。我非常開心，甚至高興得跳起來。我知道年輕人的屍體一定被找到，於是趕緊告訴喬這個消息。「他被找到了！我知道他們已經找到他的屍體，因為他離開我了。」我在小屋裏手舞足蹈，一邊讚美感謝上帝。喬給我一個擁抱。當天稍晚，我們到教堂裏點了一根蠟燭，感謝上帝讓彼得的靈魂得到自由，回歸上帝。


    上帝允許彼得的靈體停留在世間，直到屍體被找到為止，而我則是超自然世界與物質世界間的連結。少了這個連結，我相信他永遠不會被找到。許多年前，在我妹妹位於都柏林市區的小屋裏，一切尚未發生之前，連結就已建立。


    奇蹟隨時發生。當奇蹟發生時，平常所謂的因果關係就不再重要。有時候奇蹟在許多年前便已注定要發生。這次就是上帝和天使事先安排的奇蹟。我知道彼得的守護天使，以及與他死亡有關的人的守護天使，一定非常努力阻止無辜的年輕生命枉死於一場錯誤的復仇中，但殺害彼得的人沒有傾聽他們天使的聲音，我感到悲傷。


    彼得是個非常美麗的靈體。屍體被尋獲時，他的靈體也上了天堂。不過，他為我做了一件意料之外的事情，他派姊姊來知會我。


    在我感覺彼得已經離開的幾天後，莎麗來到小屋。她看起來像一路跑來似的，一臉興奮難安。她覺得需要讓我們知道已經在運河找到她弟弟的屍體，他被壓在河岸下，雙手被繩子綁住。


    「我在這裏，我在這裏——在這裏啊！」


    直到此時我才發現，原來那美麗的靈體竟是莎麗的弟弟，也就是多年前曾有過一面之緣的男孩。莎麗很悲傷，但又很高興搜尋的過程已經結束。當莎麗站在我面前述說一切時，我看著她的臉龐，也看見了彼得的靈魂。他請毫不知情的姊姊急急忙忙來拜訪我們，告訴我們他已經被找到。彼得藉此來感謝我，而莎麗是彼得與我之間的靈性使者。至今，莎麗不曾再來拜訪過我。


    ## 20

    金鍊子


    有個寒冷的冬天早上，喬結束夜班工作回到家，上床休息前，他先跟孩子們說讓媽媽休息一下，打算帶他們到運河去看鴨子。我從來沒見過兩個男孩和他們的小妹妹準備的動作如此迅速，他們穿上外套、戴好帽子就出門去了。


    他們一出門，我眼前忽然閃現一段關於我父母的靈視影像。我看見他們站著談話，四周似乎吹著強風，兩人很像是站在一起，但爸爸又不像真的存在，看起來像個靈體。靈視影像來得突然，去得也快。我被告知爸爸的生命即將終了，當下彷彿遭到雷擊。


    我哭了，哀求著上帝和天使，因為我深愛父親。感覺上，喬和孩子們才離開沒幾分鐘，就又回到家了。孩子們非常興奮，告訴我他們在運河看見的事物。我去泡茶時，喬對我說：


    > 「出了什麼事嗎？妳看起來非常蒼白，而且哭過。」

    > 「我看見一個靈視影像，」我對喬說，「我爸就要往生了！」

    > 「也許妳誤解了。天使怎麼說？」

    > 「他們什麼也沒說，我只是看見了影像。我哀求上帝和天使，難過到無法理解他們要說什麼。然後你和孩子們回來了。感覺上，你們好像才離開幾分鐘。」


    喬給我一個擁抱，我覺得好過一點，試著讓自己忘記影像。雖然當下很想立刻去看看父親，卻無法成行，因為還要照顧三個孩子，而且我們也沒車。幸運的是，隔天爸爸就來探望我們。看見他，我非常開心，卻不能告訴他為什麼。


    我通常能夠看見人體內的病痛，有時候看見骨頭發出亮光，有時候心臟會跳到某人的胸前，有時候器官的周圍環繞著黑影。我仔細觀察爸爸，卻看不出哪裏有異樣，讓我感到很困惑。


    幾星期後，天氣好轉，喬在家帶孩子，我前往梅努斯學院的校園散步。我走在蘋果園和樹林間，讚美並感恩上帝，享受著散步時光，感受清新的冷風吹在臉上。我看著鳥兒和松鼠，看著一切生物，不禁笑了，因為我不僅看見牠們平常的模樣，也看見環繞著牠們的能量光芒。


    我和路上遇見的人問好，包括一位神父和一位推著娃娃車的母親。突然間，天使米迦勒出現在身邊和我並肩而行。他把手搭在我的肩上，隨後又觸碰了我的手，我的內心立即充滿平靜。「謝謝你，米迦勒，」我說，「這讓我感到很舒服。」


    米迦勒以人形模樣走在我身邊，和平常一樣，他身材高大，一頭深色頭髮，不過這回是短髮。他穿著黑色套裝、黑色外套，很容易被誤以爲神父。我看著他笑說：「我很欣賞你這神父般的模樣！」


    他假裝打了個顫，翻起外套的領子說：「這樣看起來如何？」我們都笑了。


    幾位神父手上拿著祈禱書，經過時打了聲招呼，米迦勒點頭予以回應。還有個鄰居走過，我和她並不熟，她說又看見我和朋友一起散步。想到此，我不禁笑了。除了家人之外，我從未和其他人一起散步，所以她看見的是米迦勒。（我想大概有三次別人說看見我和某人走在一起，但實際上我是獨自一人。後來才明白他們看見的是化爲人形的天使。不過，這種情形或許比我所知的更爲頻繁，只是我沒察覺而已。）


    米迦勒天使說：「趁四下無人，我們到那棵大橡樹下，我來解釋妳父親的靈視影像。」「在你開始解釋前，我要先讓你知道，我很生氣。」


    米迦勒笑著：「羅娜，妳真有個性。」


    我說：「有時候上帝和你們這些天使似乎忘記了我只是個人。我怎麼會想要知道關於父親的死訊？米迦勒，我寧願什麼都不知道！」


    米迦勒以悲傷的神情看著我，握著我的手說：「妳父親需要妳的幫助來穿越死亡。」


    我深呼吸了一口氣。「我愛我爸。」


    米迦勒天使說：「我們走走吧。」他握著我的手散步，一邊繼續說。


    「還記得看見妳爸爸影像的那天，喬帶孩子到運河去嗎？上帝就是在當時把妳父親和妳的靈魂連結在一起。你們的靈魂現在已經相互交纏。幾天內，妳將會看見他從受精那一刻起的每一個生命片段，影像就像電視螢幕般在妳眼前和腦海中不斷播放。當影片停止，妳會突然感受到一股震撼，因爲他的靈魂正與妳的靈魂分離，也同時從他的身體抽離，由天使們領著到上帝身邊。」


    我走在米迦勒身邊，哭得傷心欲絕。


    「羅娜,讓我拭去那些淚水。」天使米迦勒雙手舉到我的眼前,我才察覺我們已不再走動,而是站在光圈之中。我抽抽噎噎說:「這真的很難面對。」


    「羅娜,記得,上帝和我們這些天使將會幫助妳一起度過。」天使米迦勒手伸入我的口袋,觸碰了我的手。「我會陪妳走到小徑盡頭,然後必須離開。」


    我們沉默走著。雖然只是一小段路,我已能感受到米迦勒給我的力量,他捏緊我的手,放鬆時,他也消失了。我繼續走回家,並未告訴喬我和米迦勒天使的會面。


    一如米迦勒所預言,在幾天內,爸爸的生命史開始在我眼前和腦海裏持續不斷上演,影像時而快速時而緩慢,但始終不曾停止。我一遍又一遍看著影像,看見爸爸小時候和另一個孩子在泥巴裏玩耍;他骨瘦如柴的身形坐在書桌前的模樣;他長成青年,擁有一頭黑髮,和一位美麗的年輕女孩坐在河邊,我知道那女孩就是媽媽;也看見爸爸在舊克爾麥罕昏暗的店鋪裏修理腳踏車,還有他看見我們居住的小屋倒塌時,臉上絕望的表情,以及他搭船前往英格蘭工作時的寂寞……


    爸爸來探望我們的次數越來越頻繁,有時候甚至一大早就來了,說他只是想來看一下,喝杯茶、聊個天,停留幾分鐘就好。我好想告訴他一切,但怎麼說得出口?你無法對認識的人說他即將離開這個世界,而且你們的靈魂相連在一起,這樣你才能幫助他走過死亡。這些話太嚇人了,我們的靈性還未發展到這個程度。


    爸爸才逐漸開始認識上帝,最近這些年,他的靈性成長許多。我記得幾年前他曾對我說:「我怎麼會花這麼久的時間才發現上帝呢?」能看到爸爸的靈魂成長,是一件很美好的'
