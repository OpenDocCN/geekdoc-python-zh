    從未到過這樣的餐廳,便告訴我這種桌位叫做包廂。這時候,服務生帶著紙筆來點菜,我們點了茶和三明治。


    我們談了彼此的父母——他的父親已經往生;談了兄弟姊妹——喬是家中的老么,我是家中的老三。喬問道:「如果妳父親知道我們在約會,妳想他會怎麼說?」


    我回道:「不確定爸爸會怎麼反應,不過我知道媽媽可能會反對。」


    於是我們同意這件事情要保密。


    離開餐廳後,我們在街上走了一會兒,觀賞商店櫥窗,最後沿著碼頭走到公車總站。喬住的方向和我不同,得要搭另一班公車,我的公車剛進站,還有幾分鐘才要出發,所以我們開心坐在車上等了一會兒。我跟喬說:「你最好趕快去搭你的班車。」


    他起身後,卻說他馬上回來。他跟車掌說了幾句話,就回來坐在我身邊說:「我跟妳一起搭公車回家,陪妳走到家。」


    車掌告訴他有一班沒有列在行車表上的非正式營運公車,俗稱「幽靈公車」。那班公車從市中心開往我家的路程有列在行車表上,但回市中心車場的路上,照理並不搭載乘客,但實際上還是會。從此我們約完會後,喬總是先送我,再搭幽靈公車回到市區,然後走路回家。


