- img_proc: true
  md: '「可是我不喜歡和別人不一樣啊。」我淚流滿面。

    祂為我擦拭眼淚。「羅娜，妳知道我永遠在妳身旁。」祂伸手環繞我的肩膀，把我緊緊抱住。


    我們倆走出森林，穿越草原，前往奶奶的房子。突然間，祂消失無蹤。我繼續朝奶奶的房子走去，媽媽正在那裏幫奶奶烤蘋果塔，煮晚餐。我看著他們，聽他們說話，我經常做這樣的事——觀看別人。我總是讓別人說話，但仔細傾聽，所以能聽見沒有說出口的話，那些他們想說卻藏在心底的話，包括喜悅、快樂和痛苦。


    我們在蒙夏南度過四、五個愉快的夏日時光，約莫十一、二歲時，奶奶心臟病發，無法繼續工作，必須離開那棟房子。我們從此再也不曾回到蒙夏南度假。


    我也沒再見到莎麗。多年後我聽說她孤獨地死在山上的小屋裏，但我知道她並不孤單，天使陪伴著她。父親往生後，誰也找不到父親擁有那塊土地的證明，所以我們無法實現他的夢想，在上面蓋一棟房子。'
