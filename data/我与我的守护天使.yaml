  md: '我告訴克里斯多夫要記得，當他需要保羅的保護時，他永遠會在身旁。多年來，我多次想起保羅，感謝他為我保護克里斯多夫，感謝他記得我請求他保護克里斯多夫的安全。


    我每天買完東西回家後，都會端一杯茶給喬，在他身邊坐下聊天。有一天，喬有件事要告訴我。喬的守護天使就坐在他身邊，床上還有許多天使，全都看向喬，等他說話。

    「羅娜，妳一定不會相信，」他說，「今天妳出門後，有個小孩子靈體蹦蹦跳跳來到房裡，模樣大約三歲，一頭蓬蓬的棕色長髮，身上看起來很髒，像是在泥巴裏玩耍過，兩手還沾著泥塊。她就站在妳坐的位置說：『爸，跟我玩。』然後又轉身蹦蹦跳跳離開房間。」

    我聽了既高興又驚訝！我知道這意味將要有另一個孩子了。我們一直很想再有孩子，但是露絲已經十二歲，加上喬的健康狀況，我根本不敢奢望。這是個奇蹟。我感謝了上帝和天使。

    喬過去不曾見過靈體，這次彷彿是上帝和天使們特意允許喬能看見，幫助他了解自己不僅只是個軀體。

    我並未立即告訴喬那表示我們即將生個小女兒，只是讓他沉浸在看見美麗小靈體的喜悅之中。「她為什麼叫我爸爸呢？」他好奇地問。

