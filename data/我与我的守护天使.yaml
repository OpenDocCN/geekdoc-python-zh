    # 26

    邪靈現身


    人有時候會透過刻意的、惡意的意圖，或因為嫉妒、憤怒等情感，或以為生命對自己不公平等觀感，而讓撒旦進入生命。舉個例子，撒旦往往在發生土地或遺囑糾紛時，入侵到個人心中。撒旦使靈魂變得晦暗的程度不一，能提供個人炫麗奢華的表面生活，卻摧毀周遭人的生活，最後，若是不做任何挽救，也將摧毀主事者的靈魂。


    在靈性上持續成長，重新與上帝和天使們連結，讓上帝的愛和慈悲重回心中，是唯一驅逐撒旦的方法。只要提出請求，天使就會伸手協助。尋求協助的人甚至不需要是本人，家人或朋友都能祈求協助，我看過許多成功的案例。特別記住的是，一個人在生命中遭遇到邪惡之事時，來自任何人、任何信仰或背景的祈禱，都能產生重大的影響與變化。


    人能在不自知的情況下獲得靈性成長，或許是因為某人為他們祈禱，又或許他們還是孩子的時候，曾經請求過，然後在多年後，他們在靈性上覺醒了。


    多年來，許多在某種程度上受到撒旦影響的人曾經來拜訪過我。我能看見撒旦的影響，因為他總是忍不住想炫耀自己的存在。


    有一回，一位事業成功的愛爾蘭商人來找我。他不確定自己為何會來，但他的朋友說服'
  - '[PAGE 279]


    了他，不過他也承認朋友花了兩年時間。他說自己做過一些可惡的事情，從未考慮過自己的舉動會影響到他人。對他而言，世界上只有一個人重要，那就是他自己；世界上只有一樣東西重要，那就是錢。


    不過，他的生命產生了變化。他告訴我朋友不再喜歡他，家人也不願意和他有任何關係。但我知道有人正在為他祈禱，否則他不會來找我。他問我為何自己不會羞愧自責，他知道自己曾經在某處做過錯事，應該要覺得愧疚，可是他不清楚如何才會產生那樣的感覺。他希望有自責感，也想要贏回朋友和家人。


    男人坐在我廚房餐桌旁，雙手交叉在胸前，說他想要改變，不想再這樣下去。他低著頭，但我看見淚水在他的眼眶打轉。接著，撒旦的邪靈出現在我面前。


    男人交叉雙手，身體前傾靠在餐桌上，頭低垂著，但我看見一張扭曲的臉從他的胸部升起，從他存在的最深處浮現，並且把頭轉向側邊。男人靜止不動坐著，彷彿不知道發生的一切。那張扭曲的、邪惡的臉看著我竊笑。這一回，一如我看過的其他人的內在邪靈一樣，邪靈似乎說著：「這回我差點就騙過妳，妳差點就錯過我了！」邪靈原本一直躲著，卻決定在我面前現身。


    基於我無法理解的奇特理由，邪靈總是忍不住要在我面前展現自己。不過，只要他們這麼做，我就知道撒旦再度失敗，而上帝和天使再度獲勝。


    我為男人祈福，為他向上帝祈求，然後給他療癒祈禱文，他把祈禱文放進皮夾。接下來的幾個月，我持續為他祈禱。'
  - '[PAGE 280]


    # 邪靈現身 280


    大約一年後,我接到他的來電,他的生命已經有所改變,事實上,從他離開我家那一刻起就開始變化,只是他不敢承認。他設法補償過去自己曾經傷害過的人,他的生意很順利,而且是以誠實的方式經營。他希望現在感謝我和上帝及天使還不會太遲。我提醒他要經常請求天使協助,而且不論是多麼微不足道的小事,也不要忘記感謝他們。至今我仍然爲他祈禱著。


    有一天,我橫越馬路要去梅努斯購物,耳邊傳來一個聲音:「慢一點,羅娜。」我身邊除了一點光芒,什麼也沒有,但我知道那是米迦勒的聲音。「我們轉進這條小巷子,安靜談一下。」我右轉進入一條小巷子,確定馬路上的人看不見後,便停下來。接著,米迦勒以人類模樣現身(我早已猜到)。確實是人模人樣,只是看起來有點太完美。不過,我看著他的眼睛時,仍然看見那個天使的他。


    「前往梅努斯的路上,妳要慢慢地走過運河橋(Canal Bridge),然後朝運河看去,越遠越好。」


    「有什麼問題嗎?」我問道,「在我過橋前告訴我。」


    「羅娜;」米迦勒說,「有個小寶寶的靈魂,目前妳還沒察覺到,小寶寶已經受精,尚未誕生。過橋時,你們兩人的靈魂將會連結在一起。妳也能感覺到母親的存在,但她對妳來說比較像個鬼魂,非常模糊。」'
  - '[PAGE 281]


    我覺得他好像把我當作小孩般說話，彷彿我聽不懂似的。

    「米迦勒，我是個生過孩子的成熟女人。」我回答，「我不知道究竟是怎麼回事，不過我願意接受小靈魂和我連結。你會陪我走到橋邊嗎？」

    「不，羅娜，妳必須自己過去。慢慢走，橋上有另一位天使等著。寶寶在母親的子宮成長之際，那位天使會幫助妳了解並熟悉他的靈魂。照著天使的要求做。每回妳過橋，他將在那裏等妳，陪妳走一段路。妳和寶寶靈魂間的連結未來幾個月會越來越堅韌。」

    我們轉身走出小巷，接近大馬路時，天使米迦勒消失了。我朝運河橋的方向看去，果然有位天使在等我。他非常纖細高挑，模樣優雅，全身雪白，光芒四射。我遵守米迦勒的囑咐，慢慢地走，當腳一踩到橋上，隨即感覺到自己與小靈魂間的連結。

    天使站在橋中央，我走到他身邊站著。他看看我，以充滿愛與溫柔的聲音說：「我是天使阿拉比亞（Arabia）。」天使阿拉比亞碰碰我的手，我轉身朝運河下看去。水面平靜如玻璃，沒有一絲動靜，彷彿一幅畫。我被允許去感覺那位母親，以及她對腹中胎兒的愛。我感受到她的淚水，許多的淚水。站在橋上時，有人經過，對我打了聲招呼，我下意識回覆對方。

    我走過橋，下坡朝鎮上走去。一路上天使始終陪在一旁。人車雜沓，然後我低聲說：「再見，天使阿拉比亞。」

    我繼續去購物，繼續過著母親和妻子該有的日常生活，同時持續為天使工作。

    時光流逝，寶寶在母親的子宮裏不斷成長，我也開始認識這小靈魂，感覺到他正把愛傳


    281'
- md: '送給母親，而母親也深深愛著未出世的孩子。雖然我始終看不清母親的面貌，因為她總是像個幽魂般，但我知道她在那裏，而且內心正在掙扎。


    我每天至少過橋一次，有時候更頻繁。我經常詢問身邊如慢動作般和我並行的天使阿拉比亞：「為什麼我往下坡走時，連結不如在橋上強烈？」


    天使阿拉比亞從不回答我。有一天我對他說：「有時候我覺得那母親和孩子就在牆那邊的田野裏，很想爬過去找他們。不過我知道他們不在那裏，也不在運河邊。你不能多透露一些嗎？」


    但是天使阿拉比亞只回道：「必要的時候。」


    多年來，在面對天使時，我已經了解一個問題不論問幾次，他們從不偏離第一次給你的答案，有時候甚至根本不回答。我跟天使阿拉比亞一起過橋不下數百次，經常向他詢問資訊，但答案始終不離：「必要時，或時間成熟時。」


    一天早上，孩子上學後，我告訴喬要到鎮上買些雜貨，並去藥房幫他拿藥，會盡快回來。我走出小屋，注意到有些異常。天使阿拉比亞不在平常的地方等候，而是站在我家巷口的大馬路上，離橋有一段距離。我往橋看去，橋右側有一層薄霧，但橋上並沒有。


    我走到阿拉比亞身邊，兩人繼續往前走，我感覺到一陣安靜、未說出口的字語。我想要說話，但知道不該開口。我到達橋面，看見覆蓋在運河水面及河岸上的薄霧並非真是霧氣，而是天使！從運河兩岸延伸到橋下的乳白色薄霧裏，充滿了天使，雪白美麗的天使們，明亮如光。


    我站在那裏，被眼前美麗與詭異的景象給震撼住，天使阿拉比亞摸了我的手。天使齊聲吟誦，不斷在運河兩岸間的薄霧裏緩慢來回移動。有些天使轉身朝我望來，認可我在場。天使阿拉比亞告訴我，天使正在進行準備。我流下淚，阿拉比亞在此同時把手收回。


    我們往下坡走，離開橋面。我感覺不到雙腳與地面的接觸，低頭一看，腳踝邊環繞著滿天使的薄霧。抵達山坡下，我看著身旁的天使阿拉比亞。「時間快到了。」他說。


    我繼續朝鎮上走去，以最快速度採買完畢。我看不見身邊的天使，但很清楚他們始終存在。我對他們說：「我有問題想要請教。」沒有得到回應。我心想，或許應該走另一條路回家，不要行經運河。可是一走到鎮中心卻被往左邊推去，於是我明白必須循著原路回家。


    天使阿拉比亞在前往運河橋的山坡前等候，散發著明亮耀眼的光芒。我們一起上坡朝橋邊走去。我順著運河往下看，知道如果摔落到薄霧中，不會碰觸到地面，而將如摔在坐墊般受到保護。


    坐墊般的保護也是為了寶寶的到來而準備，不過當時我完全不明白其中道理。幾天後，喬說我變得很安靜，彷彿神魂出竅。我看著喬說：「就算告訴你，我想你也不會懂。」


    「試試看。」喬回答。


    我試了，告訴他橋上天使的事情，還有寶寶靈魂及母親。他仔細聆聽，最後告訴我他無法理解，不過他也不會再有質疑。我謝謝他，給他一個大擁抱。


    我不知道寶寶在哪裏出生，不知道那母親是獨自生產或有人陪伴，也不知道孩子是足月出生或是早產，在三月的某一天，我就是知道孩子出生了。


    從那一天起，我完全失去時間感，不論在哪裏，總不斷感覺天使阿拉比亞的手撫摸著我。那感覺非常強烈，甚至讓我沒看見眼前走來的人，而一頭撞上對方。天使阿拉比亞依然在運河橋中央，如一股強大的力量在空中盤旋。當我靠近橋，他會降下身來與我會合，但同時又仍然在空中盤旋。這時我才明白，那道由天使鋪設而成的薄霧小徑，是為小寶寶的靈魂而準備，阿拉比亞正在等待他。


    每次接近運河橋就能看見薄霧，不知怎麼的，我開始意識到天使正在迎接寶寶的靈魂。


    有一天我要到學校接露絲回家，走入回到小屋的巷子時，天使阿拉比亞站在巷尾。他什麼也沒說，只是指示我過馬路。我所看見的影像令人屏息！美麗的嬰兒靈魂爬在天使製造的柔軟平滑的小徑上。她看起來像自己手腳並行爬著，但事實上是由天使抬著，因為我看見天使使用翅膀支撐著她，幫助她，和她玩耍。小寶寶的靈魂看起來非常快樂，我能聽見她的笑聲，心裏因而充滿喜悅，但同時熱淚盈眶。突然間，我察覺到小寶寶的靈魂正朝著我家而來！


    至今我仍然不明白為何上帝和天使選擇讓我看見這小奇蹟，以及小寶寶的靈魂為何朝我家而來。但事情就是這樣。她不斷接近。我不知道天使花了多少時間帶著寶寶的靈魂前進這段距離，但有一天，天使告訴我他們已經快到了。那一晚我上床睡覺，如往常一樣在早上六點醒來，起床到廚房。一道閃亮的光芒從窗外照射進來。我倒了杯水，一轉身，天使阿拉比亞就站在廚房門口。照理我應該習慣了，卻還是嚇了一跳，因為天使總是美得讓我吃驚。


    邪靈現身 284


    「回到床上去，」天使阿拉比亞說，「靠喬近一點，挪出空間給另一人。」


    我照著吩咐做了，而且感覺得到小寶寶的靈體正在進入屋內。我躺在床上，聽見走道上有動靜。我不斷祈禱，請求讓小寶寶的靈體一切順利。臥房裏充滿了薄霧，天使湧入房裏。他們已經抵達。我看不見寶寶的靈體，但知道她在地板上，被天使環繞著。


    「天使，我可以在床上坐著嗎？」我問道。


    「不行，妳還不能看。轉身再靠近喬一點，多讓出一些空間。」


    我吵到喬，他昏沉沉問我是否會冷。我要他放心。我很緊張，怕喬在關鍵時刻醒來，儘管我也知道天使是不會讓他甦醒。


    天使移動了床單，床上有動靜，接著，我感覺到寶寶的靈體在身旁躺下。我面對著喬，仍然看不見寶寶的靈體，不過她就躺在我的背後。我動也不敢動，就怕壓到她或傷到她。最後，我感覺寶寶的手觸摸了我的背。


    「現在可以轉身了嗎？」我問道。


    「可以，」天使回答，「慢慢轉身，要小心，小寶寶的靈體就躺在妳身邊。」


    我轉了身，非常擔心壓到她。「喔，天啊。」我驚呼一聲，忘記喬就在身邊。我趕緊用手摀著嘴巴，所幸喬並沒有動靜。就在我身邊，躺著一個非常漂亮且全身赤裸的新生女娃兒。她揮舞著小手小腳，模樣非常健康、強壯、美麗又完美，有血有肉，看起來完全是個人，而且是我見過最漂亮的嬰兒。她光芒四射，內在的靈體讓眼前的小身體從內部亮了起來。兩位華貴的白色天使就站在床邊，低頭看著她。他們身穿完美飄垂著的白色長袍，面容美妙有如瓷器一般，五官清晰，身體則像太陽般發光，雪白的雙眼也閃耀著光亮。羽毛翅膀彷彿向上旋轉，並且觸碰到上方的一道光。


    「可以摸摸她嗎？」我問道。


    「不，妳不可以摸她，但可以把手放在她的上方。」天使對我說。


    我把手伸到她的上方。當我伸出手，她轉頭看著我，眼中充滿生命力，並且散發比天上星星更燦爛的光芒。她微笑，在那一刻我聽見她說：「告訴媽咪我愛她，也愛爸爸。」


    兩位天使彎腰把她抱了起來，他們的翅膀交纏環繞著她。他們向上升起，天空輕柔開啟，他們如光般一閃即逝，房裏的一切恢復正常。


    我知道一切都結束了。我讚美並感謝著上帝。


    那天上午稍後我到吉姆肉鋪，聽到大家議論紛紛。有人問我是否聽見了消息？有個新生兒的屍體在運河橋畔被人發現。沒有人知道誰是母親，或者發生了什麼事情。有個男人在清晨溜狗時發現了她。這時我才明白，小寶寶被發現的那一刻，就是天使們從臥室消失的時候。我非常開心，但無法描述感受到的快樂，因為那是一股了解寶寶的靈體已經去了天堂，而我的任務已經完成後，所感受到的喜悅和寬慰。


    當地社區對此事非常難過，過去不曾發生過這樣的事情。某個年輕的母親，或許是學院的學生，認為懷孕一事必須保密。想到此，就讓人震驚。


    警察進行了調查，但就我所知，他們未能找到母親。或許有一天她會讀到這個訊息，了解不論寶寶在何種情況下死去，都一樣愛她，也從來不曾感到孤獨，因為天使一直陪著她。


    所有寶寶都一樣，不論是生是死，不論在何種情況下，天使總是陪在一旁。


    社區被寶寶的死觸動了心弦，大家捐款爲她購買一個墳墓，讓她妥善埋葬。在埋葬之前，小寶寶有了名字。如今，布麗姬（Bridget，譯註：與英文「橋」字近音）就埋葬在梅努斯的墓園中。


    喬的病情越來越惡化，陸陸續續小中風，喬非常害怕。有時候他會失明幾分鐘或身體完全癱瘓，走路對他來說越來越困難，還經常跌倒。雖然我盡全力看護他、扶住他，他還是全身瘀青。醫生也無能爲力。


    天使努力鼓勵著我。有一天我到附近散步，享受溫暖的陽光，觀賞周圍景物，最後來到一處綠地。孩子們在那兒踢足球，許多人也輕鬆躺在草地，享受美好的天氣。我注意到有個孩子坐在輪椅上，蜷曲著身子睡著。她的身體似乎扭曲得厲害，而且非常消瘦，很難看出年紀大小，很可能是七歲左右。她的母親坐在不遠處的一面矮牆上，和鄰居談著話。


    我慢慢靠近，那孩子變得越來越明亮，輪椅也一樣。一切事物似乎靜止下來，我簡直不敢相信眼前所見。她的靈魂離開了身體，留下輪椅上熟睡的身形。靈魂散發著光芒，模樣就像小女孩若上了天堂時會有的樣子，全然完美無缺，美麗無比。


    兩位年紀和她相仿，也是女孩的天使出現，牽起她的手。接著又來了三位天使，也都是小女孩，一身白色，明亮到近乎帶著藍色光彩。我站在原地，動彈不得，完全被眼前景象震懾。小女孩的靈魂離開身體，跟天使玩耍。他們彼此追逐，也手牽手繞著圈圈唱著歌，但始終不曾遠離輪椅。我能聽見他們的笑聲，小女孩的靈魂是那麼自在、快樂。我試圖向前移動，想要把一隻腳移到另一隻腳前面，但是不論多麼努力，天使就是不讓我走動。


    小天使們和小女孩的靈魂圍成一圈，坐在輪椅旁邊的草地上。我入迷地看著她們，對於即將發生的事情一無所知。突然間，一位天使的手觸摸了一片草葉，隨即出現一朵雛菊。其天使也移動她們的手，用指尖觸摸草葉，草葉一一變成美麗的雛菊。就在草地中央，出現了一圈白色小雛菊，圓圈裏坐著開心大笑的天使和一個光芒四射的小靈魂。那母親持續在一旁聊著天，完全不知道發生什麼事。


    「雛菊鍊。」小靈魂大喊，於是她們開始製作雛菊鍊。天使用雛菊項鍊妝點小女孩的頸部，也套在手臂和腳踝上，還在她頭頂放上公主的頭冠。她們教她在花莖上劃出一道小裂縫來製作鍊子，她也坐在那裏開始動手。如此豐富的愛與溫柔，使我不禁充滿喜悅與幸福感，也因此淚流滿面。我看著小女孩，欣賞著她的雛菊鍊。她的臉龐如太陽一般煥發著光芒。


    最後天使把手臂環繞在她身旁，把她抱起來，帶回輪椅上。她似乎並不介意。小靈魂輕輕躺下，蜷縮回自己沉睡的軀體中。


    天使也如來時那般突然消失無蹤，光芒也不復存在。小女孩在輪椅裏動了動。我被鬆開而能自由移動時，差點絆倒自己。周圍的一切又恢復正常模樣。我聽見鳥叫，感覺微風吹拂，看見了人群。我離開坐在輪椅上的小女孩時，朝她母親看去，心想她是多麼有福氣，能在家中擁有如此純淨的靈魂。'
  mdcn: '送給母親，而母親也深深愛著未出世的孩子。雖然我始終看不清母親的面貌，因為她總是像個幽魂般，但我知道她在那裏，而且內心正在掙扎。


    我每天至少過橋一次，有時候更頻繁。我經常詢問身邊如慢動作般和我並行的天使阿拉比亞：「為什麼我往下坡走時，連結不如在橋上強烈？」


    天使阿拉比亞從不回答我。有一天我對他說：「有時候我覺得那母親和孩子就在牆那邊的田野裏，很想爬過去找他們。不過我知道他們不在那裏，也不在運河邊。你不能多透露一些嗎？」


    但是天使阿拉比亞只回道：「必要的時候。」


    多年來，在面對天使時，我已經了解一個問題不論問幾次，他們從不偏離第一次給你的答案，有時候甚至根本不回答。我跟天使阿拉比亞一起過橋不下數百次，經常向他詢問資訊，但答案始終不離：「必要時，或時間成熟時。」


    一天早上，孩子上學後，我告訴喬要到鎮上買些雜貨，並去藥房幫他拿藥，會盡快回來。我走出小屋，注意到有些異常。天使阿拉比亞不在平常的地方等候，而是站在我家巷口的大馬路上，離橋有一段距離。我往橋看去，橋右側有一層薄霧，但橋上並沒有。


    我走到阿拉比亞身邊，兩人繼續往前走，我感覺到一陣安靜、未說出口的字語。我想要說話，但知道不該開口。我到達橋面，看見覆蓋在運河水面及河岸上的薄霧並非真是霧氣，而是天使！從運河兩岸延伸到橋下的乳白色薄霧裏，充滿了天使，雪白美麗的天使們，明亮如光。


    我站在那裏，被眼前美麗與詭異的景象給震撼住，天使阿拉比亞摸了我的手。天使齊聲吟誦，不斷在運河兩岸間的薄霧裏緩慢來回移動。有些天使轉身朝我望來，認可我在場。天使阿拉比亞告訴我，天使正在進行準備。我流下淚，阿拉比亞在此同時把手收回。


    我們往下坡走，離開橋面。我感覺不到雙腳與地面的接觸，低頭一看，腳踝邊環繞著滿天使的薄霧。抵達山坡下，我看著身旁的天使阿拉比亞。「時間快到了。」他說。


    我繼續朝鎮上走去，以最快速度採買完畢。我看不見身邊的天使，但很清楚他們始終存在。我對他們說：「我有問題想要請教。」沒有得到回應。我心想，或許應該走另一條路回家，不要行經運河。可是一走到鎮中心卻被往左邊推去，於是我明白必須循著原路回家。


    天使阿拉比亞在前往運河橋的山坡前等候，散發著明亮耀眼的光芒。我們一起上坡朝橋邊走去。我順著運河往下看，知道如果摔落到薄霧中，不會碰觸到地面，而將如摔在坐墊般受到保護。


    坐墊般的保護也是為了寶寶的到來而準備，不過當時我完全不明白其中道理。幾天後，喬說我變得很安靜，彷彿神魂出竅。我看著喬說：「就算告訴你，我想你也不會懂。」


    「試試看。」喬回答。


    我試了，告訴他橋上天使的事情，還有寶寶靈魂及母親。他仔細聆聽，最後告訴我他無法理解，不過他也不會再有質疑。我謝謝他，給他一個大擁抱。


    我不知道寶寶在哪裏出生，不知道那母親是獨自生產或有人陪伴，也不知道孩子是足月出生或是早產，在三月的某一天，我就是知道孩子出生了。


    從那一天起，我完全失去時間感，不論在哪裏，總不斷感覺天使阿拉比亞的手撫摸著我。那感覺非常強烈，甚至讓我沒看見眼前走來的人，而一頭撞上對方。天使阿拉比亞依然在運河橋中央，如一股強大的力量在空中盤旋。當我靠近橋，他會降下身來與我會合，但同時又仍然在空中盤旋。這時我才明白，那道由天使鋪設而成的薄霧小徑，是為小寶寶的靈魂而準備，阿拉比亞正在等待他。


    每次接近運河橋就能看見薄霧，不知怎麼的，我開始意識到天使正在迎接寶寶的靈魂。


    有一天我要到學校接露絲回家，走入回到小屋的巷子時，天使阿拉比亞站在巷尾。他什麼也沒說，只是指示我過馬路。我所看見的影像令人屏息！美麗的嬰兒靈魂爬在天使製造的柔軟平滑的小徑上。她看起來像自己手腳並行爬著，但事實上是由天使抬著，因為我看見天使使用翅膀支撐著她，幫助她，和她玩耍。小寶寶的靈魂看起來非常快樂，我能聽見她的笑聲，心裏因而充滿喜悅，但同時熱淚盈眶。突然間，我察覺到小寶寶的靈魂正朝著我家而來！


    至今我仍然不明白為何上帝和天使選擇讓我看見這小奇蹟，以及小寶寶的靈魂為何朝我家而來。但事情就是這樣。她不斷接近。我不知道天使花了多少時間帶著寶寶的靈魂前進這段距離，但有一天，天使告訴我他們已經快到了。那一晚我上床睡覺，如往常一樣在早上六點醒來，起床到廚房。一道閃亮的光芒從窗外照射進來。我倒了杯水，一轉身，天使阿拉比亞就站在廚房門口。照理我應該習慣了，卻還是嚇了一跳，因為天使總是美得讓我吃驚。


