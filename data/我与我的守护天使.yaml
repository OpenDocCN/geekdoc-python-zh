    一位民眾約翰起身歡迎大家加入祈禱會，接著每個人用自己的方式大聲讚美上帝。（人們用各自希望且對他們來說最有意義的方法祈禱。）室內的氣氛非常活躍有力，而且隨著天使揮動翅膀，光線變得明亮無比。我投注整個靈魂全心全意讚美上帝，沉浸在喜悅中，我想閉上眼睛，但天使不允許。他們為我遮住光線，手扶著我的下巴，把我的頭抬高。我開始進入狂喜。周圍的人低頭祈禱讚美著，每個人前後左右都有天使在一旁閃閃發亮。整間教室從天花板到地面被天使緊緊包圍，沒有一絲空隙。


    一位天使在我耳邊說：「羅娜，傾聽每個人的祈禱。」


    我開始傾聽，竟不可思議聽見每個人的祈禱，有人用口語祈禱，有人不斷複誦禱詞，也有人唱著聖歌，自靈魂深處由衷讚美上帝。


    天使慢慢讓我稍微低下頭，我不再感受到椅子的存在。我請求天使在我讚美與感謝上帝時，不要讓我把眼睛閉起來。但天使輕聲說必須讓我的眼睛暫閉一下。接著，室內安靜無聲，天使也保持沉默。


    一團充滿生命的耀眼白光逐漸吞噬教室，環繞住每一個人，包覆室內的一切。光芒所到之處，一切被洗滌淨化。在光芒之中，上帝以青年的模樣逐漸現身，清晰而具體。我認得這個非常強而有力的存在感，就和當年還是孩子的我，在蒙夏南朝奶奶家走時所遇見一樣。上帝以年輕人的模樣，穿著白袍站在那裏。我瞧見祂呈現金黃色光芒的腳趾；手臂垂在身體兩旁，手掌張開，指尖朝下，手指散發一道道金光；臉龐耀眼透亮，明亮的雙眼充滿色彩，從中投射出生命的永恆；古銅色的捲髮長及肩膀。但我該如何描述一道充滿愛、慈悲和希望，同時充滿生命的明亮耀眼光芒？


    上帝緩緩轉身面對大家，以我們無法理解的動態在橢圓形座位內側移動。所有人在沉靜之中、在靜思之中、在祈禱之中讚美與感恩上帝，卻對祂的存在毫無知覺。上帝在我身後的民眾間移動時，我感受到祂強而有力的存在感，祂內在的寧靜也填滿了我。我於是祈禱上帝能永遠如此停留與行走於我們之中。


    禱告完時，我感覺到祂用手觸碰我的肩膀。上帝在這明亮的光耀之中切實觸碰了我的靈魂。該如何描述我的靈魂所目睹的景象？那是在永恆無盡之中的純淨，全然的清晰。


    接著，上帝化為一道閃光，消失無蹤，教室又恢復正常。我的眼睛完全張開，那一團美麗煥發的生命，上帝於我們之間行走時所散發的光輝已不復存在。我帶著微笑，熱淚盈眶。


    又過一會兒，大家停止禱告，抬起了頭。有人開口說在大團體中祈禱與冥想，讓他們感受到一股難以置信的喜悅與平靜。這時候，一位年輕神父（我不知道他是否已經是位神父，也可能還是個神職學生）說話了。他坐在最內圈裏，有一頭棕髮，個子不高，留了點鬍子，又或者只是有鬍渣？我並不確定。


    「有人感覺到了嗎？」他問道。


    我知道他要說什麼，我詢問天使：「我可不可以告訴大家我也感受到了，這樣才能幫助他？」但天使回答不可以。


    「我感覺到上帝在我們之間行走。」他說，「而且我感覺到祂觸碰了我。祂是否也觸碰了其他人？」


    我多麼想說：「是的，祂觸碰了你，也觸碰了我。」但我被告誡必須保持安靜。令人難過的是沒有人有勇氣說：「是的，上帝觸碰了我。」沒有人有勇氣承認上帝。而上帝確實觸碰了他們！我們是那麼害怕說出上帝就在我們的生命之中，害怕公開坦承上帝的存在。


    我不知道上帝還觸碰了哪些人，但我至今仍然記得那個年輕人，並且希望不論他在做什麼，都能持續承認那美麗的經驗。


    祈禱會結束後，我們照常喝茶、吃點心。大家喝茶時，我端著杯子溜到外面停車場，我走在小樹之間，整個人依然興奮地顫抖著，天使也陪著我穿梭在樹林間。


    「我知道那個年輕人非常渴望得到認可。」我對身邊的天使說著，但並沒特定訴說的對象。我請求天使和年輕人的守護天使協助他保有信念，不論將來是否成為神父，都要幫助他相信上帝。我也詢問天使：「我可以只跟喬分享上帝在我們之間行走，而且還碰了我們嗎？」


    「不，羅娜，這超乎喬的理解能力。」天使答道，「有一天妳將能和喬分享更多祕密。但妳必須記得不能分享所有祕密，而這是其中一件。」


    我感到些許悲傷。走回入口處時，天使以莉莎出現了，她為我開門，笑著對我說：「不要傷心。」她這麼一說，我的悲傷就消失了。


    我在迴廊上遇見爸爸，他正準備要離開。我告訴他我去找喬，然後在停車場跟他會合。我們不一會兒就回到家，爸爸和喬對那一晚的祈禱會沒多說什麼，我想他們什麼也沒看見。


    ## 16 隧道


    住在小屋第四年時，庭院已經有模有樣，我們種了許多蔬菜，還養了母雞，只不過總是找不到母雞下蛋的地方！後來我們把部分庭園圍起來，並搭蓋棚子給母雞當窩後，才把問題解決。喬還拉了很長的晾衣繩來解決曬衣服的問題，我仍記得那天的情景，他站在梯子上，手裏拿著大榔頭，我則握著繩子。那天我們過得好開心。


    一天下午，克里斯多夫和歐文用竿子、毯子和繩子搭了一座帳棚，在裏面玩得很開心，我在院子裏曬衣服。一道光芒突然出現，像撼了一巴掌般向我突襲而來，我差點摔倒。是荷賽司天使在搗蛋，還會有誰！我笑了，知道荷賽司只是好玩而已。


    「羅娜，有件事要告訴妳，是一件苦樂參半的事情。上帝將送來一個寶寶的靈魂。新年時，妳會再度懷孕，不過寶寶無法留下來陪妳，而是返回上帝身邊。」


    「我現在就很悲傷了。天使荷賽司，為何要告訴我此事？為何不讓事情直接發生，什麼也不說呢？如果我不知道的話，日子會好過得多。」


    「喬會很高興妳又懷孕了，羅娜，」荷賽司說，「寶寶回到上帝身邊後，喬將分享部分祕密，這也有助他了解妳的天賦。」


    「你想他會了解嗎？」我問道。


    「他會的。雖然在某種程度上，他會覺得一切難以置信，但隨著時間過去，將因為妳生命中發生的事件，而開始相信一切都是真的。現在，再和喬談一談的時間到了。」


    「好的，」我說，「也許晚一點跟他去散步。」


    喬傍晚下班回家，克里斯多夫和歐文仍在帳棚裏玩耍，在庭院跑來跑去，喬一打開柵門，兩人馬上朝他跑去。他抱起他們，走進屋裏。稍晚，喬和我去散步前，我請伊麗莎白幫忙照顧孩子。


    走在運河邊，我們聊了各種事情，接著我說：「我想跟你分享一些天使展現給我看的事物。」


    我對喬解釋生長在運河兩岸的野花等植物四周所環繞的能量。


    「握住我的手，也許這樣天使能幫助你看見花朵周圍的能量。」我邊說邊緊握他的手。


    「看看那朵花，看見能量球從花上面浮現而出嗎？這朵花正在拋出它的能量。你有沒有看見不同的顏色，有黃色、白色和藍色？」


    我轉過身，仍然握著喬的手，而且不停請求天使幫助喬看見一切。


    「那朵紅色罌粟花，有沒有看見螺旋狀的能量從植物底部往空中噴射三十公分高？就像煙火一樣，接二連三噴了幾秒鐘？」


    喬看了，可是臉上表情清楚說明什麼也沒看見，甚至懷疑真的有東西可看。我的心一沉。


    「走吧，回家吧。」喬說。


    天使彷彿從運河上空走出來般突然出現，輕輕朝花朵的方向吹氣。喬正要走開，我拉住他的手說：「看見風吹動野花了嗎？現在你看見了嗎？」


    喬的雙腳彷彿黏在地面般，驚訝地定在原地。「我從來沒見過這樣的景象。」


    他爲我描述眼前所見，我開心地笑了，因爲這是我有史以來，第一次確定別人和我看見一樣的事物。


    喬訝異地站在那裏對著我笑。「有些事情真的令人難以相信。不過我知道不該懷疑妳。」


    他轉身再看一次，發現花朵四周的能量卻消失不見，感到些許失望。


    「我也從來弄不懂。」我對喬說，「能量就像有開關似的，會開啓又關閉，肉眼只有在特定時間才看得見。」


    我們滿足地手牽手散步回家，哄孩子上床睡覺後，又談了許多。他問我一大堆問題，有些問題我無法給他答案。


    隨著時間流逝，爸爸在都柏林和住家附近參與諸多不同的祈禱會，其中也包括「重生基督徒」團體。偶爾，我帶著孩子們去看爸媽時，會遇到正要離開的祈禱會成員。一天，我們剛抵達爸媽家的柵門，前門恰好打開，有個男人走了出來。


    他看看我們，回頭問媽：「這是誰呢？」


    媽媽回答是女兒與孫子。他提議她帶我們一起參加星期天的祈禱會。我打了聲招呼，腳下沒停，帶著孩子們從後門進屋。我問媽媽那男人是誰，她說是都柏林重生基督徒祈禱會的傳教士。我沒再多問，媽媽也沒多說。


    稍後，我帶著孩子們坐公車回到梅努斯。我在廚房裏一邊洗碗，一邊注意在飯廳地板上玩玩具的克里斯多夫，歐文則在毯子上睡著了。我腦海裏想著一家受邀到都柏林參加祈禱會的事情，這時廚房的門發出一聲輕微的嘎吱聲，門開了，我立刻知道那是天使米迦勒。


    天使通常不會介入世間的物質事物，但不知爲何，他們卻經常幫助我，通常是一些小事，譬如米迦勒會幫我抬起重物，或荷賽司幫忙吹乾晾曬的衣物。我也聽過一些故事，知道天使可以在特殊狀況下有實質的介入。有位女士說她曾經無法轉動門的鑰匙，但屋內的老母親需要她的協助。她試了好一段時間始終無法開啓，緊張絕望之際，向上帝祈禱，請求天使的幫助。突然間，她碰也沒碰，門就開啓了。我們稱之爲奇蹟，那是無法解釋、但也明白自己無法辦到卻實際發生的事情。這種現象很罕見，不過，一個人在靈性上越投入，越常請求天使的協助，奇蹟發生的機率越高。


    「是你嗎，米迦勒？」我沒有將視線轉離水槽。他走進廚房，觸碰我的肩膀。


    「羅娜，妳召喚了我！」米迦勒天使說。


    「我不知道我召喚了你，米迦勒。」


    「羅娜，妳還沒察覺。不過，很久以來，妳想要我們來時，並不曾需要呼喚我們的名字。上帝所有的天使隨時在妳身旁。」


    「米迦勒天使，那你又是如何知道我呼喚的是你？」我問道。


    「羅娜，妳的心緒和靈魂相互連結。」米迦勒解釋，「靈魂早在意識之前，已知道妳人性的層次需要和我對話。」


    想到我的靈魂比我還早知道，我不禁笑了出來，這時克里斯多夫喊著：「媽咪，妳在笑什麼？」他起身走到廚房，把手遮在眼前說：「媽咪，那團亮光是打哪裏來的？」


    我搔了他癢，並沒有回答問題，只是要他回去玩。


    「米迦勒，你知道我最喜歡做的事情之一，就是參加梅努斯的祈禱會。我在那裏遇見了美好的人。」


    天使米迦勒微笑對我說：「告訴我，妳在想什麼？」


    我深吸了一口氣，告訴米迦勒回來錫利普的家時，一位正要離開的男士邀請我們參加都柏林重生基督徒的祈禱會。「你知道的，每到一個新地方，我總是很緊張。」我說。米迦勒笑我，並伸手握著我的手。


    「羅娜，妳並不用去做什麼高難度動作，別擔心。」我們倆都笑了，米迦勒繼續說：「只要記得，參加梅努斯的祈禱會時，妳應該要祈禱與讚美上帝。自在說出妳的祈禱和讚美就可以了。那裏有很多家庭，這跟梅努斯有所不同。時機成熟，你們一家人將會和妳父母一起去參加，不過那是很久以後的事情。」


    米迦勒理所當然又說對了。我們一家人在許多年後才一起參加那個祈禱會，參加時，正值我生命中重要的轉捩點，而這也使得我和父親更加親近。


    克里斯多夫在廚房門口偷窺著。「我又看見那團光芒了，媽咪。」


    米迦勒消失了。我抱起克里斯多夫，一起玩了一會兒手推車的遊戲。


    一如天使所說，我在新年時懷孕了，喬和我都很開心，儘管我知道寶寶將不會留在我們身邊而心情有些沉重。


    女人懷孕時，寶寶的靈魂早已知道他的母親是否會流產，不管是因為墮胎，還是成為死胎或畸形。不論發生什麼事，孩子的靈魂仍然愛著父母，而且會永遠待在他們身旁，協助他們度過一生。假使你曾經失去過孩子，不要忘記，那小胎兒的靈魂選擇你作為他的母親或父親，在受精之前就已經選擇了你。那小靈魂不僅愛你，對於你能夠受孕更是充滿喜悅。


    在聖經裏偶爾可以讀到：上帝在你受精之前，就已認識你。這是因為我們早已是天堂裏的靈性存在，排著隊，等著從天堂誕生到人世。


    這世間有太多墮胎事件，但我們必須記得，即使一位母親選擇墮胎，寶寶的小靈魂也早知道母親可能會這麼做，而且在知道後，仍然選擇她作為母親，就算這意味他只能受精成形，不會被生下來。小靈魂選擇了她，而且無論如何永遠愛著她，那是一種無條件的愛。我希望每位母親都能記得此事，尤其是曾經墮胎的女性。一位年輕女孩會墮胎，或許是因為她害怕生命，害怕外面的世界，或者害怕自己的父母，又或者她沒有人可以信賴。要記得，寶寶的靈魂愛著妳，而且沒有一刻曾經責備妳未把他生下來，他早已知道會發生什麼事，仍把他的愛灌注在妳的身上。


    多年之後，人們開始上門找我時，一位女性前來尋求我的指引。在某個階段，她對我說：「我曾經流產過幾次。」


    「是的，」我說，「天使正在告訴我此事。」記得當時我轉過頭，朝廚房門口看去，地板上坐了五個幼兒，五個由光包圍著的小靈魂，他們非常美麗，是美麗的靈魂，美麗的孩子。他們轉身對母親笑著，她看不見他們，但我告訴她我眼中所見，她充滿了喜悅。我告訴她男孩也有女孩，也告訴她孩子的模樣，這使她快樂無比。小靈魂要我告訴母親，他們一直在身旁陪伴著她。


    「過去我一直覺得他們就在我身邊，」這位母親對我說，「有時候甚至能感覺到他們的小手摸著我的腿，甚至連現在也感覺到他們正在觸摸我。」


    我不禁笑了，因為那一刻他們全圍繞在她身邊，而且正在觸摸她。


    「沒錯，他們正在觸摸妳。」我帶著微笑說，「妳是受到祝福的，因為妳能感受到上帝派來造訪妳的孩子們的觸摸。要記得，妳離開人世的時間來臨時，這五個小靈魂也會伸出手來，領妳到天堂。」


    「謝謝妳。我從未告訴過別人關於寶寶們環繞在我身邊的存在感，也不曾讓人知道我感受到他們的觸摸。我不敢說，怕被認為是瘋子。」


    有一件事我們必須牢記在心，那就是世界上有千萬人確實經歷過靈性經驗，卻不敢說出口。許多人相信天使正在幫助他們，甚至能感受到天使的存在，卻又經常對自己說：或許我沒有看見天使，或許那只是我的想像。能夠承認他們的存在，能夠說出：「是的，我相信天使。是的，我相信上帝。」是一件很美好的事情。但我們通常不敢這樣做，甚至只在喪親、重病或絕望的時候，才會承認他們的存在。只有在這樣的時刻，才轉而向上帝祈禱、求助，平常反而不敢承認上帝和天使們的存在。不過一旦靈性開始成長，你將不再害怕承認上帝、他所派遣的天使，以及來自天堂的靈體。


    我懷孕的前幾個月，喬也開始感到不舒服，經常抱怨腹部疼痛。醫生將他轉到醫院做檢查，說是慢性盲腸炎，但沒嚴重到需要開刀，開了藥就讓他回家。喬不斷感到疼痛，而且無法消化食物，消瘦的他體重持續減輕。


    我看見喬體內器官的退化。結婚前他呈現灰色的器官部位，現在顏色更深了，盲腸周圍也出現紅腫現象。


    我對天使哭訴喬這樣日復一日、月復一月受折磨，真是不公平，同時也乞求他們協助。然而醫生無能為力，他向喬道歉說除非他病入膏肓，否則醫院無法為他切除盲腸。


    懷孕三個月時，我流產了。在寶寶離開的前一週，天使不斷觸碰我的肚子，許多光芒立即從中散發出來。好幾次我問道：「寶寶不能留下來嗎？」但得到的答案總是不行。偶爾，喬會問我為什麼看起來那麼悲傷，我從未告訴他天使所說的話，只說是荷爾蒙作祟，不用擔心。


    不論喬的病況多嚴重，他總會設法幫忙家務。天使預言的那一天到來時，我正在協助喬把泥炭塊堆到棚子裏，我告訴他我覺得很累，想躺在沙發上休息。我睡了一會兒，喬進屋告訴我泥炭已全堆進棚子。孩子們在庭院玩耍，我打算起身泡茶，喬說他去就好。


    喬走進廚房沒多久，一陣可怕的疼痛襲來，我感覺到生命正從身體抽離。我疾呼喬，他'
  mdcn: '准許我移動，我看見喬身邊的空位，但要走過去並不容易。有些人得起身拉開自己的椅子讓我通過，最後我終於到達，在喬的身邊坐下。


    一位民眾約翰起身歡迎大家加入祈禱會，接著每個人用自己的方式大聲讚美上帝。（人們用各自希望且對他們來說最有意義的方法祈禱。）室內的氣氛非常活躍有力，而且隨著天使揮動翅膀，光線變得明亮無比。我投注整個靈魂全心全意讚美上帝，沉浸在喜悅中，我想閉上眼睛，但天使不允許。他們為我遮住光線，手扶著我的下巴，把我的頭抬高。我開始進入狂喜。周圍的人低頭祈禱讚美著，每個人前後左右都有天使在一旁閃閃發亮。整間教室從天花板到地面被天使緊緊包圍，沒有一絲空隙。


    一位天使在我耳邊說：「羅娜，傾聽每個人的祈禱。」


    我開始傾聽，竟不可思議聽見每個人的祈禱，有人用口語祈禱，有人不斷複誦禱詞，也有人唱著聖歌，自靈魂深處由衷讚美上帝。


    天使慢慢讓我稍微低下頭，我不再感受到椅子的存在。我請求天使在我讚美與感謝上帝時，不要讓我把眼睛閉起來。但天使輕聲說必須讓我的眼睛暫閉一下。接著，室內安靜無聲，天使也保持沉默。


    一團充滿生命的耀眼白光逐漸吞噬教室，環繞住每一個人，包覆室內的一切。光芒所到之處，一切被洗滌淨化。在光芒之中，上帝以青年的模樣逐漸現身，清晰而具體。我認得這個非常強而有力的存在感，就和當年還是孩子的我，在蒙夏南朝奶奶家走時所遇見一樣。上帝以年輕人的模樣，穿著白袍站在那裏。我瞧見祂呈現金黃色光芒的腳趾；手臂垂在身體兩旁，手掌張開，指尖朝下，手指散發一道道金光；臉龐耀眼透亮，明亮的雙眼充滿色彩，從中投射出生命的永恆；古銅色的捲髮長及肩膀。但我該如何描述一道充滿愛、慈悲和希望，同時充滿生命的明亮耀眼光芒？


    上帝緩緩轉身面對大家，以我們無法理解的動態在橢圓形座位內側移動。所有人在沉靜之中、在靜思之中、在祈禱之中讚美與感恩上帝，卻對祂的存在毫無知覺。上帝在我身後的民眾間移動時，我感受到祂強而有力的存在感，祂內在的寧靜也填滿了我。我於是祈禱上帝能永遠如此停留與行走於我們之中。


    禱告完時，我感覺到祂用手觸碰我的肩膀。上帝在這明亮的光耀之中切實觸碰了我的靈魂。該如何描述我的靈魂所目睹的景象？那是在永恆無盡之中的純淨，全然的清晰。


    接著，上帝化為一道閃光，消失無蹤，教室又恢復正常。我的眼睛完全張開，那一團美麗煥發的生命，上帝於我們之間行走時所散發的光輝已不復存在。我帶著微笑，熱淚盈眶。


    又過一會兒，大家停止禱告，抬起了頭。有人開口說在大團體中祈禱與冥想，讓他們感受到一股難以置信的喜悅與平靜。這時候，一位年輕神父（我不知道他是否已經是位神父，也可能還是個神職學生）說話了。他坐在最內圈裏，有一頭棕髮，個子不高，留了點鬍子，又或者只是有鬍渣？我並不確定。


    「有人感覺到了嗎？」他問道。


    我知道他要說什麼，我詢問天使：「我可不可以告訴大家我也感受到了，這樣才能幫助他？」但天使回答不可以。


    「我感覺到上帝在我們之間行走。」他說，「而且我感覺到祂觸碰了我。祂是否也觸碰了其他人？」


    我多麼想說：「是的，祂觸碰了你，也觸碰了我。」但我被告誡必須保持安靜。令人難過的是沒有人有勇氣說：「是的，上帝觸碰了我。」沒有人有勇氣承認上帝。而上帝確實觸碰了他們！我們是那麼害怕說出上帝就在我們的生命之中，害怕公開坦承上帝的存在。


    我不知道上帝還觸碰了哪些人，但我至今仍然記得那個年輕人，並且希望不論他在做什麼，都能持續承認那美麗的經驗。


    祈禱會結束後，我們照常喝茶、吃點心。大家喝茶時，我端著杯子溜到外面停車場，我走在小樹之間，整個人依然興奮地顫抖著，天使也陪著我穿梭在樹林間。


    「我知道那個年輕人非常渴望得到認可。」我對身邊的天使說著，但並沒特定訴說的對象。我請求天使和年輕人的守護天使協助他保有信念，不論將來是否成為神父，都要幫助他相信上帝。我也詢問天使：「我可以只跟喬分享上帝在我們之間行走，而且還碰了我們嗎？」


    「不，羅娜，這超乎喬的理解能力。」天使答道，「有一天妳將能和喬分享更多祕密。但妳必須記得不能分享所有祕密，而這是其中一件。」


    我感到些許悲傷。走回入口處時，天使以莉莎出現了，她為我開門，笑著對我說：「不要傷心。」她這麼一說，我的悲傷就消失了。


    我在迴廊上遇見爸爸，他正準備要離開。我告訴他我去找喬，然後在停車場跟他會合。我們不一會兒就回到家，爸爸和喬對那一晚的祈禱會沒多說什麼，我想他們什麼也沒看見。


    ## 16 隧道


    住在小屋第四年時，庭院已經有模有樣，我們種了許多蔬菜，還養了母雞，只不過總是找不到母雞下蛋的地方！後來我們把部分庭園圍起來，並搭蓋棚子給母雞當窩後，才把問題解決。喬還拉了很長的晾衣繩來解決曬衣服的問題，我仍記得那天的情景，他站在梯子上，手裏拿著大榔頭，我則握著繩子。那天我們過得好開心。


    一天下午，克里斯多夫和歐文用竿子、毯子和繩子搭了一座帳棚，在裏面玩得很開心，我在院子裏曬衣服。一道光芒突然出現，像撼了一巴掌般向我突襲而來，我差點摔倒。是荷賽司天使在搗蛋，還會有誰！我笑了，知道荷賽司只是好玩而已。


    「羅娜，有件事要告訴妳，是一件苦樂參半的事情。上帝將送來一個寶寶的靈魂。新年時，妳會再度懷孕，不過寶寶無法留下來陪妳，而是返回上帝身邊。」


    「我現在就很悲傷了。天使荷賽司，為何要告訴我此事？為何不讓事情直接發生，什麼也不說呢？如果我不知道的話，日子會好過得多。」


    「喬會很高興妳又懷孕了，羅娜，」荷賽司說，「寶寶回到上帝身邊後，喬將分享部分祕密，這也有助他了解妳的天賦。」


    「你想他會了解嗎？」我問道。


    「他會的。雖然在某種程度上，他會覺得一切難以置信，但隨著時間過去，將因為妳生命中發生的事件，而開始相信一切都是真的。現在，再和喬談一談的時間到了。」


    「好的，」我說，「也許晚一點跟他去散步。」


    喬傍晚下班回家，克里斯多夫和歐文仍在帳棚裏玩耍，在庭院跑來跑去，喬一打開柵門，兩人馬上朝他跑去。他抱起他們，走進屋裏。稍晚，喬和我去散步前，我請伊麗莎白幫忙照顧孩子。


    走在運河邊，我們聊了各種事情，接著我說：「我想跟你分享一些天使展現給我看的事物。」


    我對喬解釋生長在運河兩岸的野花等植物四周所環繞的能量。


    「握住我的手，也許這樣天使能幫助你看見花朵周圍的能量。」我邊說邊緊握他的手。


    「看看那朵花，看見能量球從花上面浮現而出嗎？這朵花正在拋出它的能量。你有沒有看見不同的顏色，有黃色、白色和藍色？」


    我轉過身，仍然握著喬的手，而且不停請求天使幫助喬看見一切。


    「那朵紅色罌粟花，有沒有看見螺旋狀的能量從植物底部往空中噴射三十公分高？就像煙火一樣，接二連三噴了幾秒鐘？」


    喬看了，可是臉上表情清楚說明什麼也沒看見，甚至懷疑真的有東西可看。我的心一沉。


    「走吧，回家吧。」喬說。


    天使彷彿從運河上空走出來般突然出現，輕輕朝花朵的方向吹氣。喬正要走開，我拉住他的手說：「看見風吹動野花了嗎？現在你看見了嗎？」


    喬的雙腳彷彿黏在地面般，驚訝地定在原地。「我從來沒見過這樣的景象。」


    他爲我描述眼前所見，我開心地笑了，因爲這是我有史以來，第一次確定別人和我看見一樣的事物。


    喬訝異地站在那裏對著我笑。「有些事情真的令人難以相信。不過我知道不該懷疑妳。」


    他轉身再看一次，發現花朵四周的能量卻消失不見，感到些許失望。


    「我也從來弄不懂。」我對喬說，「能量就像有開關似的，會開啓又關閉，肉眼只有在特定時間才看得見。」


    我們滿足地手牽手散步回家，哄孩子上床睡覺後，又談了許多。他問我一大堆問題，有些問題我無法給他答案。


    隨著時間流逝，爸爸在都柏林和住家附近參與諸多不同的祈禱會，其中也包括「重生基督徒」團體。偶爾，我帶著孩子們去看爸媽時，會遇到正要離開的祈禱會成員。一天，我們剛抵達爸媽家的柵門，前門恰好打開，有個男人走了出來。


    他看看我們，回頭問媽：「這是誰呢？」


    媽媽回答是女兒與孫子。他提議她帶我們一起參加星期天的祈禱會。我打了聲招呼，腳下沒停，帶著孩子們從後門進屋。我問媽媽那男人是誰，她說是都柏林重生基督徒祈禱會的傳教士。我沒再多問，媽媽也沒多說。


    稍後，我帶著孩子們坐公車回到梅努斯。我在廚房裏一邊洗碗，一邊注意在飯廳地板上玩玩具的克里斯多夫，歐文則在毯子上睡著了。我腦海裏想著一家受邀到都柏林參加祈禱會的事情，這時廚房的門發出一聲輕微的嘎吱聲，門開了，我立刻知道那是天使米迦勒。


    天使通常不會介入世間的物質事物，但不知爲何，他們卻經常幫助我，通常是一些小事，譬如米迦勒會幫我抬起重物，或荷賽司幫忙吹乾晾曬的衣物。我也聽過一些故事，知道天使可以在特殊狀況下有實質的介入。有位女士說她曾經無法轉動門的鑰匙，但屋內的老母親需要她的協助。她試了好一段時間始終無法開啓，緊張絕望之際，向上帝祈禱，請求天使的幫助。突然間，她碰也沒碰，門就開啓了。我們稱之爲奇蹟，那是無法解釋、但也明白自己無法辦到卻實際發生的事情。這種現象很罕見，不過，一個人在靈性上越投入，越常請求天使的協助，奇蹟發生的機率越高。


    「是你嗎，米迦勒？」我沒有將視線轉離水槽。他走進廚房，觸碰我的肩膀。


    「羅娜，妳召喚了我！」米迦勒天使說。


    「我不知道我召喚了你，米迦勒。」


    「羅娜，妳還沒察覺。不過，很久以來，妳想要我們來時，並不曾需要呼喚我們的名字。上帝所有的天使隨時在妳身旁。」


    「米迦勒天使，那你又是如何知道我呼喚的是你？」我問道。


    「羅娜，妳的心緒和靈魂相互連結。」米迦勒解釋，「靈魂早在意識之前，已知道妳人性的層次需要和我對話。」


    想到我的靈魂比我還早知道，我不禁笑了出來，這時克里斯多夫喊著：「媽咪，妳在笑什麼？」他起身走到廚房，把手遮在眼前說：「媽咪，那團亮光是打哪裏來的？」


    我搔了他癢，並沒有回答問題，只是要他回去玩。


    「米迦勒，你知道我最喜歡做的事情之一，就是參加梅努斯的祈禱會。我在那裏遇見了美好的人。」


    天使米迦勒微笑對我說：「告訴我，妳在想什麼？」


    我深吸了一口氣，告訴米迦勒回來錫利普的家時，一位正要離開的男士邀請我們參加都柏林重生基督徒的祈禱會。「你知道的，每到一個新地方，我總是很緊張。」我說。米迦勒笑我，並伸手握著我的手。


    「羅娜，妳並不用去做什麼高難度動作，別擔心。」我們倆都笑了，米迦勒繼續說：「只要記得，參加梅努斯的祈禱會時，妳應該要祈禱與讚美上帝。自在說出妳的祈禱和讚美就可以了。那裏有很多家庭，這跟梅努斯有所不同。時機成熟，你們一家人將會和妳父母一起去參加，不過那是很久以後的事情。」


    米迦勒理所當然又說對了。我們一家人在許多年後才一起參加那個祈禱會，參加時，正值我生命中重要的轉捩點，而這也使得我和父親更加親近。


    克里斯多夫在廚房門口偷窺著。「我又看見那團光芒了，媽咪。」


    米迦勒消失了。我抱起克里斯多夫，一起玩了一會兒手推車的遊戲。


    一如天使所說，我在新年時懷孕了，喬和我都很開心，儘管我知道寶寶將不會留在我們身邊而心情有些沉重。


    女人懷孕時，寶寶的靈魂早已知道他的母親是否會流產，不管是因為墮胎，還是成為死胎或畸形。不論發生什麼事，孩子的靈魂仍然愛著父母，而且會永遠待在他們身旁，協助他們度過一生。假使你曾經失去過孩子，不要忘記，那小胎兒的靈魂選擇你作為他的母親或父親，在受精之前就已經選擇了你。那小靈魂不僅愛你，對於你能夠受孕更是充滿喜悅。


    在聖經裏偶爾可以讀到：上帝在你受精之前，就已認識你。這是因為我們早已是天堂裏的靈性存在，排著隊，等著從天堂誕生到人世。


    這世間有太多墮胎事件，但我們必須記得，即使一位母親選擇墮胎，寶寶的小靈魂也早知道母親可能會這麼做，而且在知道後，仍然選擇她作為母親，就算這意味他只能受精成形，不會被生下來。小靈魂選擇了她，而且無論如何永遠愛著她，那是一種無條件的愛。我希望每位母親都能記得此事，尤其是曾經墮胎的女性。一位年輕女孩會墮胎，或許是因為她害怕生命，害怕外面的世界，或者害怕自己的父母，又或者她沒有人可以信賴。要記得，寶寶的靈魂愛著妳，而且沒有一刻曾經責備妳未把他生下來，他早已知道會發生什麼事，仍把他的愛灌注在妳的身上。


    多年之後，人們開始上門找我時，一位女性前來尋求我的指引。在某個階段，她對我說：「我曾經流產過幾次。」


    「是的，」我說，「天使正在告訴我此事。」記得當時我轉過頭，朝廚房門口看去，地板上坐了五個幼兒，五個由光包圍著的小靈魂，他們非常美麗，是美麗的靈魂，美麗的孩子。他們轉身對母親笑著，她看不見他們，但我告訴她我眼中所見，她充滿了喜悅。我告訴她男孩也有女孩，也告訴她孩子的模樣，這使她快樂無比。小靈魂要我告訴母親，他們一直在身旁陪伴著她。


    「過去我一直覺得他們就在我身邊，」這位母親對我說，「有時候甚至能感覺到他們的小手摸著我的腿，甚至連現在也感覺到他們正在觸摸我。」


    我不禁笑了，因為那一刻他們全圍繞在她身邊，而且正在觸摸她。


    「沒錯，他們正在觸摸妳。」我帶著微笑說，「妳是受到祝福的，因為妳能感受到上帝派來造訪妳的孩子們的觸摸。要記得，妳離開人世的時間來臨時，這五個小靈魂也會伸出手來，領妳到天堂。」


    「謝謝妳。我從未告訴過別人關於寶寶們環繞在我身邊的存在感，也不曾讓人知道我感受到他們的觸摸。我不敢說，怕被認為是瘋子。」


    有一件事我們必須牢記在心，那就是世界上有千萬人確實經歷過靈性經驗，卻不敢說出口。許多人相信天使正在幫助他們，甚至能感受到天使的存在，卻又經常對自己說：或許我沒有看見天使，或許那只是我的想像。能夠承認他們的存在，能夠說出：「是的，我相信天使。是的，我相信上帝。」是一件很美好的事情。但我們通常不敢這樣做，甚至只在喪親、重病或絕望的時候，才會承認他們的存在。只有在這樣的時刻，才轉而向上帝祈禱、求助，平常反而不敢承認上帝和天使們的存在。不過一旦靈性開始成長，你將不再害怕承認上帝、他所派遣的天使，以及來自天堂的靈體。


    我懷孕的前幾個月，喬也開始感到不舒服，經常抱怨腹部疼痛。醫生將他轉到醫院做檢查，說是慢性盲腸炎，但沒嚴重到需要開刀，開了藥就讓他回家。喬不斷感到疼痛，而且無法消化食物，消瘦的他體重持續減輕。


    我看見喬體內器官的退化。結婚前他呈現灰色的器官部位，現在顏色更深了，盲腸周圍也出現紅腫現象。


    我對天使哭訴喬這樣日復一日、月復一月受折磨，真是不公平，同時也乞求他們協助。然而醫生無能為力，他向喬道歉說除非他病入膏肓，否則醫院無法為他切除盲腸。


    懷孕三個月時，我流產了。在寶寶離開的前一週，天使不斷觸碰我的肚子，許多光芒立即從中散發出來。好幾次我問道：「寶寶不能留下來嗎？」但得到的答案總是不行。偶爾，喬會問我為什麼看起來那麼悲傷，我從未告訴他天使所說的話，只說是荷爾蒙作祟，不用擔心。


    不論喬的病況多嚴重，他總會設法幫忙家務。天使預言的那一天到來時，我正在協助喬把泥炭塊堆到棚子裏，我告訴他我覺得很累，想躺在沙發上休息。我睡了一會兒，喬進屋告訴我泥炭已全堆進棚子。孩子們在庭院玩耍，我打算起身泡茶，喬說他去就好。


    喬走進廚房沒多久，一陣可怕的疼痛襲來，我感覺到生命正從身體抽離。我疾呼喬，他'
