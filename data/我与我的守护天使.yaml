  md: '這時天使對我耳語：「這是個祕密。」

    我告訴爺爺：「我不會告訴任何人。」我從來沒說過，直到此刻。

    爺爺對我說話時，他身邊的光芒變得越來越亮，就像其他人的亮光一樣。我於是明白，

    因兩個孩子死亡而產生的痛苦與憤怒，使他內心充滿辛酸，吞噬掉他對生命的喜悅。爺爺起

    身走回馬車房，繼續打理車，彷彿從未對我說過話似的，又恢復成平常的他，周身的光芒也

    黯淡下來。而我再也不曾看見他的光再度明亮。

    當時我年紀太小，並不適合被告知這個故事，但我知道自己只是在為天使工作，而這次

    是協助他們幫助我的爺爺。


    我在蒙夏南度過了愉快的夏天，所以很希望來年也能再去度假。隔年那一年過得很快，

    當白晝開始變長，我也期待起假期的來臨，迫不及待想回到蒙夏南。

    不過，這一回我們沒有待在奶奶家，而是經過她家，繼續往蒙夏南的村子前進，最後停

    在村子外緣一棟有個荒廢庭院的大房子。房子幾乎空蕩蕩的，我想裏面只有一張桌子，幾張

    椅子和一個爐子，其他房間既沒有床也沒有任何東西。但我們完全不在乎，還覺得那是很棒

    的探險活動，全家都睡在地板上的睡袋裏。

    待在空蕩老房子的那個夏天，一位好心的老太太莎麗送給爸爸一小塊鄰近蒙夏南的土

    地。那塊地位在山上，要辛苦爬一段山路才能到達，但我非常喜愛那個地方，它緊鄰莎麗住'
  merge: -1
