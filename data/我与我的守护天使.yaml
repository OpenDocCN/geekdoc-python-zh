  md: '「羅娜，上帝聽得見妳的聲音。」米迦勒回答，「他知道妳的心意，羅娜。看著我，看著我的眼睛，妳看見了什麼？」


    當我看進米迦勒天使的眼睛，一切都消失了，連米迦勒天使也不見。他的眼睛變成一道充滿光與生命的道路，兩旁站著雪白的天使，喬就走在路上，年輕又健壯。他和天使走在一起，朝著已往生的家人走去。喬正走在前往天堂的道路上。看見喬健康快樂的模樣，我內心也充滿喜悅。


