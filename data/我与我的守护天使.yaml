    的白袍，臉上散發著光芒，深色頭髮長及肩膀。他站在我的右邊，伸出手臂握住我的手。


    有上帝的存在站在右邊，我得到了力量。我知道上帝讓撒旦不敢逾矩，阻止他進一步靠


    近，但是我仍然驚恐不已。這一生中，我不曾如此驚恐害怕，全身顫抖不停。


    我坐在床上，撒旦在我的左邊，那是一片巨大的黑暗，巨大的邪惡，而上帝就在我的右


