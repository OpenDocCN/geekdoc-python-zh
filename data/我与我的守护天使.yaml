  md: '我以極緩慢的速度繼續往前走，接著似乎有人在我肩膀上拍了一下，轉過身去，一位天使就在那裏，但他像一道光，有星星的光芒，不停閃爍，只是比星星還亮許多。我道了聲：「哈囉。」沒有回應。有時候，我會羞於對天使說話，我覺得他們有時也羞於跟我說話。對靈性的世界而言，溝通也跟物質世界一樣重要，有時候也一樣困難，所以我告訴這位天使，他若能以近似人類的模樣現身，有助於我輕鬆跟他對話。


