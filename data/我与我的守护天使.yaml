    我挑的電影片名叫做〈處女和吉普賽人〉。戲院裏擠滿了人，大多數是特地去看這部影片，所以我們不得不坐在前排座位。開演十分鐘後，我開始坐立難安，因為我並不想看這種電影，尤其是和喬的第一次約會，片中的性愛畫面鉅細靡遺，讓我震驚不已。這類型電影在七〇年代的愛爾蘭很罕見，或許是因為這樣，才會湧入大批觀眾！


    又過了幾分鐘，我告訴喬想離開，喬一點也不在意，我想他和我一樣覺得尷尬。我們走出戲院，在歐康諾街上朝尼爾森柱（Nelson''s pillar）走去。我很高興能離開戲院，因為那是個非常美麗的夜晚。和喬牽手散步，這樣的第一次約會我喜歡多了。我們邊走邊聊天，而喬說的第一件事是，他很慶幸挑那部電影的人不是他！我們都笑了。


    我們走過郵政總局，我一直很喜歡那棟灰色石材建築。我們對站崗的警察點頭示意，也注意到一對相擁親吻的情侶，他們高大的天使就緊緊站在身邊，彷彿要協助兩人結合在一起。我笑著走過他們身邊。喬摟著我的肩膀，感覺很舒服，有他的陪伴我感到很安全。


    我們過了紅綠燈，走進一家餐廳。我從未在晚上到餐廳吃飯。餐廳格局狹長，地板是大理石材磚，桌子固定在地面上，桌面塗了瓷釉，兩側有木製高腳長椅，椅背有一點二公尺高，坐下的時候，完全看不見其他桌的客人。我們面對面坐在長椅上。喬從我臉上的表情看出我從未到過這樣的餐廳，便告訴我這種桌位叫做包廂。這時候，服務生帶著紙筆來點菜，我們點了茶和三明治。


    我們談了彼此的父母——他的父親已經往生；談了兄弟姊妹——喬是家中的老么，我是家中的老三。喬問道：「如果妳父親知道我們在約會，妳想他會怎麼說？」


    我回道：「不確定爸爸會怎麼反應，不過我知道媽媽可能會反對。」


    於是我們同意這件事情要保密。


    離開餐廳後，我們在街上走了一會兒，觀賞商店櫥窗，最後沿著碼頭走到公車總站。喬住的方向和我不同，得要搭另一班公車，我的公車剛進站，還有幾分鐘才要出發，所以我們開心坐在車上等了一會兒。我跟喬說：「你最好趕快去搭你的班車。」


    他起身後，卻說他馬上回來。他跟車掌說了幾句話，就回來坐在我身邊說：「我跟妳一起搭公車回家，陪妳走到家。」


    車掌告訴他有一班沒有列在行車表上的非正式營運公車，俗稱「幽靈公車」。那班公車從市中心開往我家的路程有列在行車表上，但回市中心車場的路上，照理並不搭載乘客，但實際上還是會。從此我們約完會後，喬總是先送我，再搭幽靈公車回到市區，然後走路回家。


    喬和我沒告訴別人我們在交往。和我同齡的其他女孩或許會跟好朋友分享這種事，但並沒有能傾訴心事的朋友。反正，天使告訴我，對此事保密很重要。即使是現在，當他們這麼說，我仍會照著做。我不知道喬是否對別人說過，我從未問他，但我認為沒有。


    我們小心翼翼地保守秘密，不過喬總是忍不住要趁機戲弄我，相當淘氣。他喜歡叫我「藍波」，當我設法把修好的輪胎扛進顧客的後車箱時（我才一五二公分高），他也會陶侃我，說我的制服迷你裙實在太短了。（他說的或許沒錯！）


    一有機會，我喜歡跟爸爸去釣魚，從我小時候我們就經常這麼做，而且一直延續到我在加油站工作，以及和喬交往的那段時間。雖然我不是每次都帶上釣竿，但我熱愛在河邊靜靜度過時光，也喜歡花時間和爸相處。有次我們前往威克羅山區釣魚。那天一早，我們照常帶著野餐，早早開車出發。我們還帶了小鍋子，讓爸爸可以生火泡茶。


    那天很寒涼，一、兩個小時後，爸爸釣到一尾鱒魚，天空下起雨。河岸附近有個樹林，裏面有棟荒廢的屋子。爸爸建議到那裏去避雨，順便生火泡茶。爸爸走在我前面，接近樹林時，我注意到樹木沒有散發出能量光芒，整個地區看起來毫無生氣。


    天使米迦勒拍拍我的肩膀。「這個地方也許會嚇到妳。我們將讓妳看見不好的東西，但它不會傷害妳。妳一走進小屋，它就會對妳發怒，不過它不會碰妳。」


    在這之前，我一直受到保護，免於見到邪惡的事物。


    「是鬼魂嗎？」


    「不，羅娜，這個東西不一樣。」米迦勒回道。


    爸爸要我加快腳步，我向前望去，他已經走到遠方，朝房子所在的斜坡往上爬。我回頭想再和米迦勒說話，他已經消失無蹤。


    我追上爸爸，穿越環繞著小屋的樹林。在我眼底，屋子四周的一切像死去一般，樹木光禿禿，附近完全沒有綠草鮮花。小屋的門半掩，門板少了幾片，門只是掛在門軸上，部分的屋頂和窗戶也消失無蹤。爸爸進到屋內，裏頭有一張老舊的破木桌和幾張椅子。我覺得屋內非常冰冷，但爸爸似乎沒有注意到，直接走向火爐。


    我站在門口，動也不能動，只能不斷對自己說：「喔，上帝啊，天使啊！」我看見火爐的右側附近有個東西。我在這之前、從此之後，從未見過這樣東西，看起來像是融化的蠟，約九〇公分長，有胸膛那麼厚，模樣非常恐怖可怕，甚至看不出它是否有嘴巴和眼睛。


    我知道爸爸什麼也看不見、感覺不到。他收集地板上殘破的木材，堆到火爐裏，擦亮一根火柴。火堆立即爆發出來，力道非常強烈，聲音很大，火焰甚至衝進室內。那個東西具有強大的能量，而且正在使壞！它非常生氣，因爲它一直獨占此處，不想讓我們進來。對它而言，我們入侵它的地盤。


    火堆爆發後，一張椅子飛過室內，摔碎在對面牆壁上。


    爸爸跳了起來，衝過來抓住我，同時拿起袋子往外跑。他拉著我衝出門，我們盡全力跑出林子，沿著河岸奔馳，兩人都嚇傻了，這輩子沒跑這麼快過。爸爸跑得比我快，所以一路拖著後面的我。最後，兩人終於喘不過氣，才逐漸慢下腳步。雨已經停了，太陽重新露臉，我的臉上感受到陽光的溫暖。


    在沉默中，爸爸試圖生起營火，他雙手顫抖，幾乎無法生火。我看著爸爸，等著他說些什麼。我在腦海裏對天使說話，請求他們協助爸爸鎮定下來。過了幾分鐘，他終於把火生起來。鍋子裏的水滾後，他沖了茶，我們安安靜靜吃完三明治。


    最後，爸爸聲音顫抖地說：「很抱歉，讓妳嚇到了，羅娜。我也嚇壞了。不知道那是什麼東西，我只聽過喧鬧靈（poltergeist）會移動椅子，但從沒聽過什麼東西能夠讓火焰這樣爆發開來。」


    爸爸很懂火，處理火時總是很小心，所以我覺得火的爆發比移動的椅子更讓他驚怕。


    我什麼也沒說，繼續喝著茶，不想讓爸爸知道我到底有多恐懼。雖然我內心深處明白有天使在一旁守護，我們很安全，但我是真的嚇壞了。


    我坐在營火旁，米迦勒拍了我的肩膀，但並沒有現身。米迦勒告訴我，爸爸說的沒錯，我看見的東西是個喧鬧靈。他說喧鬧靈是撒旦創造出來的一種沒有靈魂的東西，有時候人們透過黑魔法或碟仙等實驗性活動，把它給請來。米迦勒說，喧鬧靈非常狡猾，只要有機會就會偷偷溜進來，還會大幅進行破壞。


    爸爸和我默默吃完午餐，用完餐整理好後，他建議我們到河的另一段繼續釣魚。我同意了，兩人都想離這個地方越遠越好。我們在幾公里外繼續釣魚，心情也因此平靜下來，釣到的魚足夠一家人的晚餐。


    那晚，我們在家開心享用釣到的魚，絕口不提白天發生的事。爸爸和我也不曾再談起。


    ## 08 媒介


    一天下午，我在加油站廁所水槽洗手，抬頭看著鏡子時，裏面突然出現一位天使的臉龐。最初只有她的臉出現，所以我被嚇得跳起來，往後退一步，這時安裝鏡子的牆面彷彿消失了般，天使現出全身，臉龐散發明亮的光芒。


    天使在我之前先開口，直呼我的名字。

    「羅娜，叫我天使以莉莎（Elisha）。」

    她邊說邊握住我的手。她的手具有羽毛的質感，我低頭看時，發現那雙手的外觀也像羽毛，但仍具有人類手掌的形狀。


    我說以莉莎是個「她」，因爲她在我看來像個女性，不過事實上天使沒有性別之分，他們是無性的存在，以人類型態出現是爲了讓我們不會害怕，容易接受他們；轉變成男性或女性外觀，也是爲了讓我們覺得自在，幫助我們更清楚了解他們所要傳達的訊息。


    之前我曾說過在寫這本書時，天使曾經告訴我以萊亞的故事。那時候，他們也告訴我，先知以萊亞在乘雙輪戰車上升到天堂之前不久，把衣鉢傳給了先知以利沙，但以利沙在舊約聖經裏是男人。


    「以莉莎天使，妳為什麼在這裏？我的生命又要有重大變化了嗎？」我問道。

    「是的，羅娜，妳將得到一份新的工作。我要幫助妳媽和一位老朋友重逢，讓妳可以在都柏林一家百貨公司獲得新工作。」她說。

    正當我要詢問她這將在何時發生時，有人敲了廁所門。我大喊：「一會兒就好。」

    以莉莎天使把羽毛指頭舉在嘴脣上，隨即消失無蹤。


    能有新的工作讓我很興奮，雖然這意味我將無法每天和喬見面。但我覺得新工作將讓我從父母身邊獨立，幫助他們看見我也能自己過生活。我在父親羽翼下工作時，他們看不見這一點。


    幾星期後，我在後院餵兔子，媽媽要我跟爸爸請一天假。

    「我們好久沒有一起逛街了，」她說，「我們可以四處逛逛，之後或許在阿納茲百貨公司吃午餐。」

    「我喜歡這個主意。」我說。

    隔天我跟爸爸說想在星期四請假，他說媽媽已經問過他，所以沒問題。


    天使經常讓我很開心。我知道這一切跟以莉莎天使有關，是她操控局面，讓媽媽有這個想法。我看著計畫逐步成形，對於結果也毫不存疑。我也很高興知道媽媽能聽見天使對她說話。


    期待讓我焦急難耐，因為我知道和媽媽到都柏林的逛街之旅將會帶來什麼結果。星期四我們搭公車到達市區，市區非常繁忙，到處是熙來攘往的景象。媽媽和我沿著歐康諾街、亨利街和瑪麗街逛了許多百貨公司，瀏覽美麗的物品。媽媽最喜歡流連在陶瓷區，這時候我就會假裝去看其他東西，好從她身邊溜開一會兒。


    接著，我聽見以莉莎說：「看著妳媽，羅娜。」


    我順著走道往前看，媽媽站在觀賞瓷器的位置，身邊有兩個閃亮的靈體，一位是她的守護天使，而令人驚訝的是，另一個是哥哥克里斯多夫的靈魂！我已經許多年沒有看見他，非常高興再度見到他。我想要朝他跑去，像小時候在舊克爾麥罕時一樣牽起他的手，但是守護天使把我的腳牢牢釘在地上。（當他知道我的情緒激動難以壓抑，又不希望我亂跑時，就會那樣做。）


    克里斯多夫轉身對我露出微笑，又轉頭回去看著媽媽，在她的耳邊耳語。這時我才知道媽媽是如何能聽見天使的聲音，原來是克里斯多夫扮演了媒介的角色。


    「以莉莎天使，我好想讓媽媽知道克里斯多夫正站在她身旁。」


    「不可以的，羅娜。」她回答。


    「可是他是那麼華貴、美麗。」我懇求著。突然間，克里斯多夫被光芒完全包圍，那是媽媽的守護天使所散發的光芒。那景象讓我深受感動，是至今我見過最莊嚴的景象。


    媽媽轉過身來呼喚我，我朝她走去。她四周的光芒越來越明亮。突然間，天使全消失無蹤，但我知道他們依然在身旁。


    「我們到阿納茲百貨公司去吃午餐吧。」媽媽說。我們抵達的時候，餐廳如往常一樣大排長龍。我們點了午餐，找到一張桌子坐下。媽媽談著今天看到的各種美麗的東西，她買了一些湯匙和一塊有點小瑕疵的盤子。她說：「我們搭兩點的公車回家，所以還有時間到瑪麗街上多逛一家百貨公司。」


    吃完午餐，我們隨即走到瑪麗街。我打開百貨公司大門的時候，看見以莉莎天使就站在門裏。這家百貨公司感覺非常活躍，我感受到能量的流動，知道在這裏將發生好事，媽媽將會遇見一份驚喜。


    媽媽轉身走向針織部的櫃台時，有個男人走向她。他的個子瘦小，穿著西裝。媽媽似乎不認得他，但他喊出了她的名字。他自我介紹後，媽媽臉上露出驚訝的表情。


    「妳一定記得我，我就住在同一條街上，離妳家沒幾戶，我們還一起出去玩過幾次呢。」他對我媽說。


    媽媽的臉龐突然亮了起來，因為她認出他。兩人談笑一會兒，媽媽似乎完全忘記我站在她的身旁。這時男人問媽媽：「蘿絲，妳身邊這位小女士是誰？妳的女兒嗎？」


    「是的，這是羅娜。」媽回答。


    這時候克里斯多夫對著媽媽耳語了一陣，媽媽口中毫不猶豫吐出這番話：「羅娜正在找工作，她已經有工作經驗了。」


    男人轉身對我說：「羅娜，看見那座樓梯了嗎？上樓到服務台要一份申請書，填好後拿到辦公室找菲利絲。」


    我敲了辦公室的門，請求會見菲利絲。我覺得好緊張，所以請天使緊跟著我。辦公室裏的女士要求看我的申請書，然後告訴我經理不在，叫我到樓下去找。她要我左轉，經過一道小長廊後，會看到左邊有一扇門。謝過她之後，我走下樓梯，左轉經過長廊，敲了那扇微開的門。我喊著：「哈囉？」


    「進來，門沒關。」一個女人的聲音傳來。


    我打開門，走進稍微昏暗的辦公室，裏面有位身材嬌小的中年婦女坐在辦公桌旁，我注意到辦公室前端有一面玻璃，可以看透整個賣場。以莉莎天使就站在那位女士身邊，這讓我安心多了。她自我介紹，說她是百貨公司的經理。


    「有什麼我能為妳效勞的嗎？」她問道。


    我告訴她賣場裏的經理叫我下樓去找她。她看過我的申請書後，問我除了爸爸之外，是否為別人工作過。


    「沒有，這將是我在加油站外的第一份工作。」我回答。


    她說我很幸運，因為百貨公司有幾個職缺，我星期一就可以開始上班。她要我在星期一早上九點鐘直接到她的辦公室報到，如果她不在辦公室，就在賣場裏。她會帶我去熟悉要工作的部門，並且讓其中一位店員教我認識服裝。握手後，我和她道別。


    我高興得手舞足蹈下樓。一份在流行服飾部門的新工作！我興奮不已，於是唱歌讚美與感謝我所有的天使。我回到媽媽那兒，她仍和朋友在談話。男人的模樣比媽媽蒼老許多，他轉身問我和菲利絲會面的結果。


    「我星期一開始上班。」我答道。


    「太好了。」他說。和媽媽又談了幾分鐘後，他就告辭離開。


    隔天晚上我和喬會面，告訴他新工作的事。他說雖然他每天工作時會想念我，但是仍為我感到高興，還說我「一人不在會讓他的心更加深情」，同時也覺得不為爸爸工作，能使我更獨立。此時，喬和我已經非常親近，所以是否在同一個地方工作已沒什麼差別。我們花了很多時間相處，但依然保守交往的祕密。


    星期一早上我走進百貨公司，儘管賣場裏有許多東西，仍然覺得裏面空空蕩蕩。經理就在賣場裏，我隨即朝她走去。她要我跟她到衣帽間，雖然我非常緊張害怕，仍然跟著去。她為我介紹法藍西絲，她負責女性流行服飾部中的裙裝部門，我將是法藍西絲的新助理。


    上班第一天我過得戰戰兢兢，尤其擔心午餐休息時間，但其實根本不需要擔心。一位在同部門工作，約莫和我同年，名叫寶琳的女孩對我說我們倆的午餐休息時間一樣，邀我和她一起吃午餐。她教我認識服裝，我們也變成了好朋友。


    從一開始，我就非常喜歡在那裏工作，喜歡面對人們，喜歡店內的氣氛。管理部門很優秀，也很有人性。在流行部門工作讓我感到如魚得水，很快地，我已經學會關於裙裝的一切。偶爾裙裝部不忙時，我也會到其他女性部門幫忙。


    ## 09 死亡天使


    新工作開始後沒幾週，天使就讓我注意到一位在提袋部門工作的年輕人馬克。他的身材高瘦，有一頭棕色捲髮，棕色雙眼，而且似乎總是穿著棕色西裝。我若仔細看著他，便能看見他四周有一層溫和隱約的光芒。


    一天下午，賣場很安靜，我站在一旁看著馬克穿越賣場。接著，一位天使出現在他的身後，不過並非守護天使，因為他所散發出來的能量與光芒，和守護天使截然不同。那是一位優雅、纖細而且非常高挑的天使。


    我知道眼前的景象有些不尋常。那位天使轉身看我，臉上充滿慈悲。他站在馬克身後，傾身向年輕人的肩膀，手伸入他的身體，觸碰他的靈魂。他溫柔地抬起馬克的靈魂，像對待新生兒一般，在馬克的身體裏前後搖動他的靈魂，動作溫柔慈愛。年輕人就站在那裏，完全靜止不動，彷彿處於出神狀態，完全沒察覺正在發生的事情。


    不知道為什麼，我竟哭了起來，內心非常激動，卻不知這些情緒為何而來。有人在我肩上拍了一下，是天使荷賽司。我轉身向他，他伸手擦去我滿眶的淚水，要我找個藉口到儲藏室去，他在那裏等我。


    我四處張望，尋找經理，他就站在賣場後門邊和警衛談話，我鬆了一口氣，隨即告訴他要到儲藏室去。


    我穿過兩扇沉重的大門，那是一推就往兩旁開啓，通過後又會隨之關上的門，來到儲藏室。每個儲藏室裏全堆滿紙箱，來到一座螺旋石梯。流行服飾部的儲藏室位在三樓頂層，我飛也似的跑上樓梯，推開一扇小門，室內相當昏暗，到處是放衣服的吊桿和箱子。


    吊桿高到天花板上，我沿著吊桿四處尋找，卻不見荷賽司，知道這裏沒有別人，我便喊著他的名字。來到最後一排吊桿時，才看見他坐在角落的箱子上等著我。看見他時，我的心開朗了起來。


    「荷賽司天使，」我坐下來對他說，「我需要知道剛剛看見的天使是誰，那年輕人會發生什麼事？」


    荷賽司握住我的手。

    「我不能告訴妳太多。妳看見的那位天使與眾不同，他是死亡天使，有人要在特殊情況下死去時，他才會出現。死亡天使會竭盡所能阻止事情發生，而有許多天使與他一起工作。譬如，某個單位計畫發動會傷及無辜的殘暴活動時，妳可以確定死亡天使將會設法說服參與其中的人，企圖讓他們明白上帝不希望暴力發生。世界上不該有戰爭，而是只有和平。死亡天使的工作無所不在——甚至也說服政府的最高層——他試圖預防生命無辜死去，尤其是戰爭期間。死亡天使竭盡心力，設法說服人們，但是他們願意傾聽天使的聲音嗎？或許偶爾，但'
  mdcn: '鐘，等他的時候，我站在橋上看著周遭一切。有個媽媽帶著孩子坐在地上向下班急著回家的路人乞討；有個女人叫賣著玫瑰，但沒人有空閒停下來買花。我從人身上所散發的能量光芒，就能知道他們正處於什麼心情。喬從背後走來，在我的肩膀上拍了一下，我嚇了一跳，轉過身，他開心笑著。看到他，我好開心。他牽起我的手，朝戲院走去。


    我挑的電影片名叫做〈處女和吉普賽人〉。戲院裏擠滿了人，大多數是特地去看這部影片，所以我們不得不坐在前排座位。開演十分鐘後，我開始坐立難安，因為我並不想看這種電影，尤其是和喬的第一次約會，片中的性愛畫面鉅細靡遺，讓我震驚不已。這類型電影在七〇年代的愛爾蘭很罕見，或許是因為這樣，才會湧入大批觀眾！


    又過了幾分鐘，我告訴喬想離開，喬一點也不在意，我想他和我一樣覺得尷尬。我們走出戲院，在歐康諾街上朝尼爾森柱（Nelson''s pillar）走去。我很高興能離開戲院，因為那是個非常美麗的夜晚。和喬牽手散步，這樣的第一次約會我喜歡多了。我們邊走邊聊天，而喬說的第一件事是，他很慶幸挑那部電影的人不是他！我們都笑了。


    我們走過郵政總局，我一直很喜歡那棟灰色石材建築。我們對站崗的警察點頭示意，也注意到一對相擁親吻的情侶，他們高大的天使就緊緊站在身邊，彷彿要協助兩人結合在一起。我笑著走過他們身邊。喬摟著我的肩膀，感覺很舒服，有他的陪伴我感到很安全。


    我們過了紅綠燈，走進一家餐廳。我從未在晚上到餐廳吃飯。餐廳格局狹長，地板是大理石材磚，桌子固定在地面上，桌面塗了瓷釉，兩側有木製高腳長椅，椅背有一點二公尺高，坐下的時候，完全看不見其他桌的客人。我們面對面坐在長椅上。喬從我臉上的表情看出我從未到過這樣的餐廳，便告訴我這種桌位叫做包廂。這時候，服務生帶著紙筆來點菜，我們點了茶和三明治。


    我們談了彼此的父母——他的父親已經往生；談了兄弟姊妹——喬是家中的老么，我是家中的老三。喬問道：「如果妳父親知道我們在約會，妳想他會怎麼說？」


    我回道：「不確定爸爸會怎麼反應，不過我知道媽媽可能會反對。」


    於是我們同意這件事情要保密。


    離開餐廳後，我們在街上走了一會兒，觀賞商店櫥窗，最後沿著碼頭走到公車總站。喬住的方向和我不同，得要搭另一班公車，我的公車剛進站，還有幾分鐘才要出發，所以我們開心坐在車上等了一會兒。我跟喬說：「你最好趕快去搭你的班車。」


    他起身後，卻說他馬上回來。他跟車掌說了幾句話，就回來坐在我身邊說：「我跟妳一起搭公車回家，陪妳走到家。」


    車掌告訴他有一班沒有列在行車表上的非正式營運公車，俗稱「幽靈公車」。那班公車從市中心開往我家的路程有列在行車表上，但回市中心車場的路上，照理並不搭載乘客，但實際上還是會。從此我們約完會後，喬總是先送我，再搭幽靈公車回到市區，然後走路回家。


    喬和我沒告訴別人我們在交往。和我同齡的其他女孩或許會跟好朋友分享這種事，但並沒有能傾訴心事的朋友。反正，天使告訴我，對此事保密很重要。即使是現在，當他們這麼說，我仍會照著做。我不知道喬是否對別人說過，我從未問他，但我認為沒有。


    我們小心翼翼地保守秘密，不過喬總是忍不住要趁機戲弄我，相當淘氣。他喜歡叫我「藍波」，當我設法把修好的輪胎扛進顧客的後車箱時（我才一五二公分高），他也會陶侃我，說我的制服迷你裙實在太短了。（他說的或許沒錯！）


    一有機會，我喜歡跟爸爸去釣魚，從我小時候我們就經常這麼做，而且一直延續到我在加油站工作，以及和喬交往的那段時間。雖然我不是每次都帶上釣竿，但我熱愛在河邊靜靜度過時光，也喜歡花時間和爸相處。有次我們前往威克羅山區釣魚。那天一早，我們照常帶著野餐，早早開車出發。我們還帶了小鍋子，讓爸爸可以生火泡茶。


    那天很寒涼，一、兩個小時後，爸爸釣到一尾鱒魚，天空下起雨。河岸附近有個樹林，裏面有棟荒廢的屋子。爸爸建議到那裏去避雨，順便生火泡茶。爸爸走在我前面，接近樹林時，我注意到樹木沒有散發出能量光芒，整個地區看起來毫無生氣。


    天使米迦勒拍拍我的肩膀。「這個地方也許會嚇到妳。我們將讓妳看見不好的東西，但它不會傷害妳。妳一走進小屋，它就會對妳發怒，不過它不會碰妳。」


    在這之前，我一直受到保護，免於見到邪惡的事物。


    「是鬼魂嗎？」


    「不，羅娜，這個東西不一樣。」米迦勒回道。


    爸爸要我加快腳步，我向前望去，他已經走到遠方，朝房子所在的斜坡往上爬。我回頭想再和米迦勒說話，他已經消失無蹤。


    我追上爸爸，穿越環繞著小屋的樹林。在我眼底，屋子四周的一切像死去一般，樹木光禿禿，附近完全沒有綠草鮮花。小屋的門半掩，門板少了幾片，門只是掛在門軸上，部分的屋頂和窗戶也消失無蹤。爸爸進到屋內，裏頭有一張老舊的破木桌和幾張椅子。我覺得屋內非常冰冷，但爸爸似乎沒有注意到，直接走向火爐。


    我站在門口，動也不能動，只能不斷對自己說：「喔，上帝啊，天使啊！」我看見火爐的右側附近有個東西。我在這之前、從此之後，從未見過這樣東西，看起來像是融化的蠟，約九〇公分長，有胸膛那麼厚，模樣非常恐怖可怕，甚至看不出它是否有嘴巴和眼睛。


    我知道爸爸什麼也看不見、感覺不到。他收集地板上殘破的木材，堆到火爐裏，擦亮一根火柴。火堆立即爆發出來，力道非常強烈，聲音很大，火焰甚至衝進室內。那個東西具有強大的能量，而且正在使壞！它非常生氣，因爲它一直獨占此處，不想讓我們進來。對它而言，我們入侵它的地盤。


    火堆爆發後，一張椅子飛過室內，摔碎在對面牆壁上。


    爸爸跳了起來，衝過來抓住我，同時拿起袋子往外跑。他拉著我衝出門，我們盡全力跑出林子，沿著河岸奔馳，兩人都嚇傻了，這輩子沒跑這麼快過。爸爸跑得比我快，所以一路拖著後面的我。最後，兩人終於喘不過氣，才逐漸慢下腳步。雨已經停了，太陽重新露臉，我的臉上感受到陽光的溫暖。


    在沉默中，爸爸試圖生起營火，他雙手顫抖，幾乎無法生火。我看著爸爸，等著他說些什麼。我在腦海裏對天使說話，請求他們協助爸爸鎮定下來。過了幾分鐘，他終於把火生起來。鍋子裏的水滾後，他沖了茶，我們安安靜靜吃完三明治。


    最後，爸爸聲音顫抖地說：「很抱歉，讓妳嚇到了，羅娜。我也嚇壞了。不知道那是什麼東西，我只聽過喧鬧靈（poltergeist）會移動椅子，但從沒聽過什麼東西能夠讓火焰這樣爆發開來。」


    爸爸很懂火，處理火時總是很小心，所以我覺得火的爆發比移動的椅子更讓他驚怕。


    我什麼也沒說，繼續喝著茶，不想讓爸爸知道我到底有多恐懼。雖然我內心深處明白有天使在一旁守護，我們很安全，但我是真的嚇壞了。


    我坐在營火旁，米迦勒拍了我的肩膀，但並沒有現身。米迦勒告訴我，爸爸說的沒錯，我看見的東西是個喧鬧靈。他說喧鬧靈是撒旦創造出來的一種沒有靈魂的東西，有時候人們透過黑魔法或碟仙等實驗性活動，把它給請來。米迦勒說，喧鬧靈非常狡猾，只要有機會就會偷偷溜進來，還會大幅進行破壞。


    爸爸和我默默吃完午餐，用完餐整理好後，他建議我們到河的另一段繼續釣魚。我同意了，兩人都想離這個地方越遠越好。我們在幾公里外繼續釣魚，心情也因此平靜下來，釣到的魚足夠一家人的晚餐。


    那晚，我們在家開心享用釣到的魚，絕口不提白天發生的事。爸爸和我也不曾再談起。


    ## 08 媒介


    一天下午，我在加油站廁所水槽洗手，抬頭看著鏡子時，裏面突然出現一位天使的臉龐。最初只有她的臉出現，所以我被嚇得跳起來，往後退一步，這時安裝鏡子的牆面彷彿消失了般，天使現出全身，臉龐散發明亮的光芒。


    天使在我之前先開口，直呼我的名字。

    「羅娜，叫我天使以莉莎（Elisha）。」

    她邊說邊握住我的手。她的手具有羽毛的質感，我低頭看時，發現那雙手的外觀也像羽毛，但仍具有人類手掌的形狀。


    我說以莉莎是個「她」，因爲她在我看來像個女性，不過事實上天使沒有性別之分，他們是無性的存在，以人類型態出現是爲了讓我們不會害怕，容易接受他們；轉變成男性或女性外觀，也是爲了讓我們覺得自在，幫助我們更清楚了解他們所要傳達的訊息。


    之前我曾說過在寫這本書時，天使曾經告訴我以萊亞的故事。那時候，他們也告訴我，先知以萊亞在乘雙輪戰車上升到天堂之前不久，把衣鉢傳給了先知以利沙，但以利沙在舊約聖經裏是男人。


    「以莉莎天使，妳為什麼在這裏？我的生命又要有重大變化了嗎？」我問道。

    「是的，羅娜，妳將得到一份新的工作。我要幫助妳媽和一位老朋友重逢，讓妳可以在都柏林一家百貨公司獲得新工作。」她說。

    正當我要詢問她這將在何時發生時，有人敲了廁所門。我大喊：「一會兒就好。」

    以莉莎天使把羽毛指頭舉在嘴脣上，隨即消失無蹤。


    能有新的工作讓我很興奮，雖然這意味我將無法每天和喬見面。但我覺得新工作將讓我從父母身邊獨立，幫助他們看見我也能自己過生活。我在父親羽翼下工作時，他們看不見這一點。


    幾星期後，我在後院餵兔子，媽媽要我跟爸爸請一天假。

    「我們好久沒有一起逛街了，」她說，「我們可以四處逛逛，之後或許在阿納茲百貨公司吃午餐。」

    「我喜歡這個主意。」我說。

    隔天我跟爸爸說想在星期四請假，他說媽媽已經問過他，所以沒問題。


    天使經常讓我很開心。我知道這一切跟以莉莎天使有關，是她操控局面，讓媽媽有這個想法。我看著計畫逐步成形，對於結果也毫不存疑。我也很高興知道媽媽能聽見天使對她說話。


    期待讓我焦急難耐，因為我知道和媽媽到都柏林的逛街之旅將會帶來什麼結果。星期四我們搭公車到達市區，市區非常繁忙，到處是熙來攘往的景象。媽媽和我沿著歐康諾街、亨利街和瑪麗街逛了許多百貨公司，瀏覽美麗的物品。媽媽最喜歡流連在陶瓷區，這時候我就會假裝去看其他東西，好從她身邊溜開一會兒。


    接著，我聽見以莉莎說：「看著妳媽，羅娜。」


    我順著走道往前看，媽媽站在觀賞瓷器的位置，身邊有兩個閃亮的靈體，一位是她的守護天使，而令人驚訝的是，另一個是哥哥克里斯多夫的靈魂！我已經許多年沒有看見他，非常高興再度見到他。我想要朝他跑去，像小時候在舊克爾麥罕時一樣牽起他的手，但是守護天使把我的腳牢牢釘在地上。（當他知道我的情緒激動難以壓抑，又不希望我亂跑時，就會那樣做。）


    克里斯多夫轉身對我露出微笑，又轉頭回去看著媽媽，在她的耳邊耳語。這時我才知道媽媽是如何能聽見天使的聲音，原來是克里斯多夫扮演了媒介的角色。


    「以莉莎天使，我好想讓媽媽知道克里斯多夫正站在她身旁。」


    「不可以的，羅娜。」她回答。


    「可是他是那麼華貴、美麗。」我懇求著。突然間，克里斯多夫被光芒完全包圍，那是媽媽的守護天使所散發的光芒。那景象讓我深受感動，是至今我見過最莊嚴的景象。


    媽媽轉過身來呼喚我，我朝她走去。她四周的光芒越來越明亮。突然間，天使全消失無蹤，但我知道他們依然在身旁。


    「我們到阿納茲百貨公司去吃午餐吧。」媽媽說。我們抵達的時候，餐廳如往常一樣大排長龍。我們點了午餐，找到一張桌子坐下。媽媽談著今天看到的各種美麗的東西，她買了一些湯匙和一塊有點小瑕疵的盤子。她說：「我們搭兩點的公車回家，所以還有時間到瑪麗街上多逛一家百貨公司。」


    吃完午餐，我們隨即走到瑪麗街。我打開百貨公司大門的時候，看見以莉莎天使就站在門裏。這家百貨公司感覺非常活躍，我感受到能量的流動，知道在這裏將發生好事，媽媽將會遇見一份驚喜。


    媽媽轉身走向針織部的櫃台時，有個男人走向她。他的個子瘦小，穿著西裝。媽媽似乎不認得他，但他喊出了她的名字。他自我介紹後，媽媽臉上露出驚訝的表情。


    「妳一定記得我，我就住在同一條街上，離妳家沒幾戶，我們還一起出去玩過幾次呢。」他對我媽說。


    媽媽的臉龐突然亮了起來，因為她認出他。兩人談笑一會兒，媽媽似乎完全忘記我站在她的身旁。這時男人問媽媽：「蘿絲，妳身邊這位小女士是誰？妳的女兒嗎？」


    「是的，這是羅娜。」媽回答。


    這時候克里斯多夫對著媽媽耳語了一陣，媽媽口中毫不猶豫吐出這番話：「羅娜正在找工作，她已經有工作經驗了。」


    男人轉身對我說：「羅娜，看見那座樓梯了嗎？上樓到服務台要一份申請書，填好後拿到辦公室找菲利絲。」


    我敲了辦公室的門，請求會見菲利絲。我覺得好緊張，所以請天使緊跟著我。辦公室裏的女士要求看我的申請書，然後告訴我經理不在，叫我到樓下去找。她要我左轉，經過一道小長廊後，會看到左邊有一扇門。謝過她之後，我走下樓梯，左轉經過長廊，敲了那扇微開的門。我喊著：「哈囉？」


    「進來，門沒關。」一個女人的聲音傳來。


    我打開門，走進稍微昏暗的辦公室，裏面有位身材嬌小的中年婦女坐在辦公桌旁，我注意到辦公室前端有一面玻璃，可以看透整個賣場。以莉莎天使就站在那位女士身邊，這讓我安心多了。她自我介紹，說她是百貨公司的經理。


    「有什麼我能為妳效勞的嗎？」她問道。


    我告訴她賣場裏的經理叫我下樓去找她。她看過我的申請書後，問我除了爸爸之外，是否為別人工作過。


    「沒有，這將是我在加油站外的第一份工作。」我回答。


    她說我很幸運，因為百貨公司有幾個職缺，我星期一就可以開始上班。她要我在星期一早上九點鐘直接到她的辦公室報到，如果她不在辦公室，就在賣場裏。她會帶我去熟悉要工作的部門，並且讓其中一位店員教我認識服裝。握手後，我和她道別。


    我高興得手舞足蹈下樓。一份在流行服飾部門的新工作！我興奮不已，於是唱歌讚美與感謝我所有的天使。我回到媽媽那兒，她仍和朋友在談話。男人的模樣比媽媽蒼老許多，他轉身問我和菲利絲會面的結果。


    「我星期一開始上班。」我答道。


    「太好了。」他說。和媽媽又談了幾分鐘後，他就告辭離開。


    隔天晚上我和喬會面，告訴他新工作的事。他說雖然他每天工作時會想念我，但是仍為我感到高興，還說我「一人不在會讓他的心更加深情」，同時也覺得不為爸爸工作，能使我更獨立。此時，喬和我已經非常親近，所以是否在同一個地方工作已沒什麼差別。我們花了很多時間相處，但依然保守交往的祕密。


    星期一早上我走進百貨公司，儘管賣場裏有許多東西，仍然覺得裏面空空蕩蕩。經理就在賣場裏，我隨即朝她走去。她要我跟她到衣帽間，雖然我非常緊張害怕，仍然跟著去。她為我介紹法藍西絲，她負責女性流行服飾部中的裙裝部門，我將是法藍西絲的新助理。


    上班第一天我過得戰戰兢兢，尤其擔心午餐休息時間，但其實根本不需要擔心。一位在同部門工作，約莫和我同年，名叫寶琳的女孩對我說我們倆的午餐休息時間一樣，邀我和她一起吃午餐。她教我認識服裝，我們也變成了好朋友。


    從一開始，我就非常喜歡在那裏工作，喜歡面對人們，喜歡店內的氣氛。管理部門很優秀，也很有人性。在流行部門工作讓我感到如魚得水，很快地，我已經學會關於裙裝的一切。偶爾裙裝部不忙時，我也會到其他女性部門幫忙。


    ## 09 死亡天使


    新工作開始後沒幾週，天使就讓我注意到一位在提袋部門工作的年輕人馬克。他的身材高瘦，有一頭棕色捲髮，棕色雙眼，而且似乎總是穿著棕色西裝。我若仔細看著他，便能看見他四周有一層溫和隱約的光芒。


    一天下午，賣場很安靜，我站在一旁看著馬克穿越賣場。接著，一位天使出現在他的身後，不過並非守護天使，因為他所散發出來的能量與光芒，和守護天使截然不同。那是一位優雅、纖細而且非常高挑的天使。


    我知道眼前的景象有些不尋常。那位天使轉身看我，臉上充滿慈悲。他站在馬克身後，傾身向年輕人的肩膀，手伸入他的身體，觸碰他的靈魂。他溫柔地抬起馬克的靈魂，像對待新生兒一般，在馬克的身體裏前後搖動他的靈魂，動作溫柔慈愛。年輕人就站在那裏，完全靜止不動，彷彿處於出神狀態，完全沒察覺正在發生的事情。


    不知道為什麼，我竟哭了起來，內心非常激動，卻不知這些情緒為何而來。有人在我肩上拍了一下，是天使荷賽司。我轉身向他，他伸手擦去我滿眶的淚水，要我找個藉口到儲藏室去，他在那裏等我。


    我四處張望，尋找經理，他就站在賣場後門邊和警衛談話，我鬆了一口氣，隨即告訴他要到儲藏室去。


    我穿過兩扇沉重的大門，那是一推就往兩旁開啓，通過後又會隨之關上的門，來到儲藏室。每個儲藏室裏全堆滿紙箱，來到一座螺旋石梯。流行服飾部的儲藏室位在三樓頂層，我飛也似的跑上樓梯，推開一扇小門，室內相當昏暗，到處是放衣服的吊桿和箱子。


    吊桿高到天花板上，我沿著吊桿四處尋找，卻不見荷賽司，知道這裏沒有別人，我便喊著他的名字。來到最後一排吊桿時，才看見他坐在角落的箱子上等著我。看見他時，我的心開朗了起來。


    「荷賽司天使，」我坐下來對他說，「我需要知道剛剛看見的天使是誰，那年輕人會發生什麼事？」


    荷賽司握住我的手。

    「我不能告訴妳太多。妳看見的那位天使與眾不同，他是死亡天使，有人要在特殊情況下死去時，他才會出現。死亡天使會竭盡所能阻止事情發生，而有許多天使與他一起工作。譬如，某個單位計畫發動會傷及無辜的殘暴活動時，妳可以確定死亡天使將會設法說服參與其中的人，企圖讓他們明白上帝不希望暴力發生。世界上不該有戰爭，而是只有和平。死亡天使的工作無所不在——甚至也說服政府的最高層——他試圖預防生命無辜死去，尤其是戰爭期間。死亡天使竭盡心力，設法說服人們，但是他們願意傾聽天使的聲音嗎？或許偶爾，但'
