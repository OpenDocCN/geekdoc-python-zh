  md: '過，我和她並不熟，她說又看見我和朋友一起散步。想到此，我不禁笑了。除了家人之外，我從未和其他人一起散步，所以她看見的是米迦勒。（我想大概有三次別人說看見我和某人走在一起，但實際上我是獨自一人。後來才明白他們看見的是化爲人形的天使。不過，這種情形或許比我所知的更爲頻繁，只是我沒察覺而已。）


    米迦勒天使說：「趁四下無人，我們到那棵大橡樹下，我來解釋妳父親的靈視影像。」「在你開始解釋前，我要先讓你知道，我很生氣。」


    米迦勒笑著：「羅娜，妳真有個性。」


