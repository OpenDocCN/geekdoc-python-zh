    我們聽見喬和約翰的聲音。「別往那棚子裏面瞧。」喬說。這當然無法阻止我的好奇心。「喔,既然你那樣說,我偷看一眼就好。」我看了一眼,裏面堆滿各式各樣的雜物。「另一間棚子又是怎樣呢?」我問道。


    「最好也別看。那邊有個更大一點的棚子,下面有個豬舍,那是個有外牆的小棚子。還有一道門,通往一個小院子,是個養雞的理想場所。裏面當然也堆滿垃圾,下回喬來的時候,我會幫忙一起清理出來燒掉。」約翰說。


    「天啊,約翰,你真是太好的幫手了。」我說。


    約翰轉身說:「伊麗莎白,我們該離開了,讓他們有自己的空間。」


    伊麗莎白離開時,又轉身對我們說:「回家前,要不要來喝杯茶?歡迎你們來。」


    「你想去嗎?」我問喬,他點了點頭。「好的,五到十分鐘後過去,我們還要再四處看,整理出一些頭緒。」我真的很開心,喬也一樣。「這房子屬於我們了,太棒了,不是嗎?雖然有很多事情要做,但我知道我們辦得到。」


    我們回到屋內,喬動手拉下牆上的壁紙,想了解清理起來有多困難。情況不太差。地板上的地毯已經嚴重磨損,我們合力拉起來,結果發現每拉起一層,下面還有一層,而最底層竟然還有一層厚厚的報紙,數百張報紙黏在一起。我們四目相對,不知所措。


    「去找個工具來試試能否移開這些東西。」喬提出建議。


    我們找到一根木棒,撬開一層又一層的地毯和報紙後,出現了稻草和黏土。最後,在那之下,雖然難以置信,但是木材地板終於現身,而且狀況還不錯。隨後我們從伊麗莎白那邊'
