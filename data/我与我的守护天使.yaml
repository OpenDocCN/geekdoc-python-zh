    「再見了，羅娜。」以莉莎說完便消失。


    安妮越來越常出現，幾乎天天報到。有一天她叫了我的名字。


    「羅娜，」她說，「妳知道我死於火災。那時我找不到別人，放聲大喊，可是沒有人聽到。我爸爸媽媽到哪裏去了？他們不在乎我、不愛我。我記得我哭著躺下，醒來時已經在天'
