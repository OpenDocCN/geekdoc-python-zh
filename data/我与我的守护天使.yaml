  - "[PAGE 8]\n\n# \n\n我誠心感謝珍·卡拉南（Jean Callanan），謝謝她的支持、奉獻與勇氣。第一次遇見她時，天使們告訴我，她將在協助我撰寫與出版這本書的工作上扮演重要角色。當時她一點也不知道這件工程要耗費她多少時間、精力和努力。我感謝她的幽默感、熱情、耐心、慷慨和友誼，也感謝天使們帶來一位能提供寶貴商業經驗的人來協助我。天使們說，我不需要經紀人，因為珍比任何一位經紀人更能幫助我。\n\
    \n馬克·布斯（Mark Booth）是位不可多得的編輯，他對這本書的信任、信心和信念，帶來了極大的改變，而且所擔負的責任，甚至超出了一般編輯。我要向這位美好而獨特，且成為好友的男士致上深深的謝意，還要感謝天使們把他送來給我。\n\
    \n感謝所有「世紀」（Century）工作團隊，尤其是夏綠蒂·海寇克（Charlotte Haycock），謝謝她的好脾氣和效率，以及莉娜·吉爾（Rina\
    \ Gill）所帶來的熱情、"
  - '[PAGE 9]


    創造力以及歡樂時光。


    還有許多對本書提供協助，而我很高興能稱之為朋友的人士，包括史蒂芬·馬拉罕（Stephen Mallaghan），感謝他的慷慨、熱誠和溫馨以及美好的友誼；謝謝丹尼爾·歐唐納爾（Daniel
    O''Donnell）的鼓勵，並爲我開啓第一扇門；感謝吉姆·可兒（Jim Corr）的支持、慷慨和好奇心；感謝愛歐恩·麥克哈爾（Eoin MacHale）所建立的美麗網站；以及派翠夏·史坎蘭（Patricia
    Scanlan）的鼓勵。


    也感謝我以下的朋友：在盛衰起伏之時提供無限支持的凱特琳和約翰·卡力根（Catherine and John Kerrigan）；讓我開心大笑的莎麗·懷特（Sally
    White）；約翰·卡爾西（John Carthy）的陪伴；布來恩·凱利（Brian Kelly）的支持與慷慨；以及在所有母親都會面對的特定議題上給予支持的吉格利家族（Quigley）。


    最後，感謝我的孩子們，他們讓我隨時記得要腳踏實地！特別感謝他們的陪伴，尤其是我的老么，因爲她的生活被這本書攪得天翻地覆。'
