    最後，我終於聽見喬的聲音。「羅娜，感謝上帝，妳還活著。我以爲妳死了。」


    我勉強擠出一絲虛弱的笑容。


    我在原地躺了幾個小時，天使抱著我，我也緊握著喬，甚至不肯讓他離開去打電話叫醫生或救護車，因為我心底明白自己會活下去，死亡的時間還未到。我沒有告訴喬自己曾經死亡的事情，他不需要知道，實情只會加深他已有的恐懼。最後，喬還是到公共電話亭打電話給我父母，他們立刻來到家裏看我。


    我請喬對事情經過保持緘默，也只告訴爸媽我整天覺得不舒服，然後便開始流血。喬和爸爸立刻送我到醫院，媽媽則留下來照顧克里斯多夫和歐文。


    到醫院時，我虛弱的模樣使醫護人員非常擔憂，我當然也沒告訴他們稍早的經過。掃描後，他們什麼也沒看見，沒有寶寶活著的跡象。醫生來看我，握著我的手表達遺憾。


    「妳失去孩子了，一定是在還沒到醫院前就發生的事。」


    醫生離開，爸爸獨自走進來，熱淚盈眶對我說：「我很難過妳失去孩子，我知道這個寶寶對妳很重要。」在此之前，我從未見過爸爸為我的事情如此傷心。


    醫生要我住院觀察幾天，我轉移到病房後，喬和爸爸便回家去。幾天之後，醫生爲我進行子宮頸管擴張與內膜刮除手術。


    喬每晚都來看我，一邊擔心我，一邊爲失去孩子感到悲傷。兩星期後，醫生讓我回家，但我仍然非常虛弱，不時躺在床上。我很開心能夠回家，把孩子抱在懷中，親吻他們。


    多年以後，我才告訴喬那天發生的事情，告訴他我在那天曾經死去，走上前往天堂的路，又回來了。我在他生命最後幾個月告訴他此事，藉此安慰他。


    許多人對死亡感到恐懼，其實不必要。死亡那一刻並沒有痛苦，沒有不安。有些人會一直痛苦到死亡那刻，但在那之後痛苦隨即消失無蹤。你將毫無恐懼與焦慮，全然自在走上那條路。死亡就是誕生。這聽起來或許很奇怪，但你正要誕生到一個新生命中，你其實不會「死去」，只是離開了身體這個軀殼，就像留下空蛋殼那樣。


    我知道還有個叫做地獄的地方，它確實存在，但上帝不曾向我展現過誰被送進地獄。我只能傳達自己看過的事情，而從我的經驗得知，不論人們曾經做過什麼事，上帝原諒了每個人。這實在難以理解，因為我們總是不斷追求正義，而且意圖復仇。但是當人死後靈魂站在上帝面前時，將感受到上帝無比的愛和與他同在的渴望，那渴望如此深切，讓靈魂不禁以極真誠與深刻的方式請求原諒，原諒他因為人天生的缺陷，而在人世間犯下的作為。


    上帝以浩瀚無盡的慈愛原諒祂的孩子。在上帝面前，我們只是孩子，祂是我們的天父。


    你的靈魂是完美的，一旦它不受身體羈絆，將得以在宇宙中遊走到超乎想像的世界。我該如何幫助你明白那是多麼美妙的感覺？那實在是難以筆墨形容，除非你親身體驗，否則根本無可言喻。而大部分的人都得等到死後，才有機會。


    死亡的時候，你並不孤單，身邊隨時有天使和前人的靈魂陪伴。你將不想重返人世，因為當你可以不再痛苦、不再流淚、也不再悲傷時，怎會想要重回人類的身體？這就是為何當人死去後，就不想再回來的原因。靈魂回到身體的唯一理由，是被上帝送回來的，因為你死亡的時間未到。


    人類社會非常物質化，因此面對死亡時我們經常說：「就這樣嗎？我就這樣腐爛消逝，之後什麼也沒有了嗎？」我跟你保證，死後還有更多，還有太多太多。我希望能透過書本，把訊息傳達出去，幫助人們了解、相信我所言所語，相信一切並不僅止於此，往生後還有更多更豐富的世界。我現在或許無法證明，但每個人死後都將得到證明。有人會說等到死後才能得到證明已經太遲了。事實上，你在人世時早已得到證明，可是有時候得非常努力傾聽，才認得出來。


