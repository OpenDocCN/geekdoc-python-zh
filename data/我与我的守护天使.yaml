  md: '接著，天使以萊亞消失無蹤。當然，那個靈視影像確實在多年後出現了。在寫這本書的過程中，我問了天使關於以萊亞的事蹟，天使說以萊亞是聖經舊約裏的先知，是一個擁有天使靈魂的人。


    我們家名列都柏林議會住宅計畫名單上，等待房屋配給。雖然那是個艱難的力爭過程，但經過非常漫長的等待後，我們終於得到一棟位於伊登摩爾（Edenmore）由議會出租的房子。這是一棟很可愛的房子，坐落在一處擁有數百戶全新住宅的新開發案中，這裏的房屋大同小異：半獨立式，有三個房間，以及小型的前庭和後院。旁邊還有另一個土地開發案，不過房子尚未蓋滿，所以周圍有許多田野、草原和開放空間。此處的居民全是新來的，大多數人過去可能和父母同住，或者居住在都柏林市中心的廉價老公寓裏，因此是第一次擁有自己的房子。這是個很友善的地方，我一到就喜歡上它。


    雖然我們並不擁有房子，但終於有落腳的地方。不過，即使生活逐漸改善，但對媽媽來說，日子仍然很艱苦。爸爸在一家石油公司擔任送貨員，工作時間長，付出很多勞力；媽媽則在附近的巧克力工廠上夜班。每天傍晚放學後，媽媽張羅我們吃過晚餐，就會讓年紀大的孩子照顧年幼的，一直到爸爸回家，不過那通常都很晚了。


    伊登摩爾距離巴里曼很遠，搬家也就意味着我們全部要轉學，交新的朋友。由於附近並沒有學校，早上我們必須走很遠的路去上學，一路上穿越住宅區，進入老村落，再經過教堂來'
  merge: -1
  pgno: 61
- img_proc: true
  md: '到主要幹道上。學校就在這條繁忙道路的對面。我們在組合屋裏上課，所以非常擁擠，桌子排得很緊密，必須用力擠進去，甚至要從同學身上爬過，才能坐到自己的座位上。


    我在伊登摩爾過得很快樂，雖然沒有什麼特別的朋友，但我花了很多時間和鄰居歐布來恩一家在一起。但我真正喜歡的是歐布來恩家的狼犬夏恩。我一週帶夏恩散步三次，就在某次溜狗途中，我遇見了另一位特別的天使。


    我稱這位天使為「樹天使」，因為她總是出現在樹裏面。在那之後，我又見過她幾次，至今也仍會看到她。她全身呈現出各種不同的翠綠、黃綠和綠橘色調，顏色非常美麗動人。她似乎是活生生存在於樹的每個部位，而我又能清楚看見她的形影。她有一頭波浪般的捲髮，移動時全身每個部位彷彿也隨之而動，雙眼如金沙般閃閃發亮。她朝我伸出雙手時，樹也跟著她移動。我經常和她說話，她的聲音就像哨音一般，而且彷彿和樹葉一起沙沙作響。


    記得那一天和夏恩散步，我們穿越田野，正打算走回住宅區，夏恩突然停下來，對著左邊一棵大樹狂吠不停。我看著那棵樹，什麼也沒有，於是對夏恩笑問：「你在吠什麼啊？」


    就在那時候，我看見了她。樹裏有個樹天使，夏恩在我之前先看見了她。每憶及此事，我不禁要笑，因為動物總是那麼輕易就能看見天使，真令人驚奇。


    放學回家的路上，我偶爾會和其他孩子到採石場玩耍。有一天，我沒和他們一起，而是跑去打開採石場旁的僧院柵門。我們並不被允許進入僧院，但我拉起門閂探頭窺視時，看見'
  merge: -1
  pgno: 62
- img_proc: true
  md: '了一庭院的蔬菜水果，感覺非常平和，因此一點也不害怕。我四處走動，看著穿棕色長袍的修士，忙著整理庭院。他們對我毫不理睬，彷彿沒看見我。我在一棵老樹幹上坐下，靜靜看著一切。


    僧院確實是個神聖的地方，一個擁有許多祈禱的地方。修士散發出明亮的光芒，非常潔淨，而且不只是身體潔淨，靈魂也是如此。修士一邊工作，一邊祈禱，我注意到天使也跟著他們一起祈禱。我感到非常平靜，很想一直待著，可是最後天使把我拉了回去。他們不停告訴我該回家了，說媽媽會擔心，我只好遵照他們的意思。天色逐漸昏暗，天使為我點亮街道。到家時，媽媽已經出門上班，所以我沒有惹上麻煩。


    那一年，我約莫去了僧院十幾次。只有一次，也就是最後一次，有個修士對我說了話。那時他正在採收醋栗，我朝他走去，站在他的身邊。他散發出非常明亮的光芒，站在他身邊的天使，穿著跟他一模一樣。他抬頭看著我，那是一張非常年輕的臉，他說：「哈囉。」


    我問了他的名字，他說是保羅。他聲音很輕柔，回問了我的名字，我也回答了。


    他請我吃醋栗，問我為什麼經常去那裏。我回道：「只是來看你們祈禱，我需要你們的祈禱。」


    「我會永遠為妳祈禱，羅娜。」他說。


    我向他道別，心底明白我將不會再去拜訪那座僧院。'
