  md: '星期六早上我最喜歡的外出活動是跟媽媽去買菜，這表示我們要到摩爾街，那是位於都柏林市中心的繁忙街道，兩邊設滿有隔間的攤位，婦女們拉開嗓門，用濃濃的都柏林口音叫賣貨物。我則拉著菜籃車跟在媽媽後面，等著她選購最適合的蔬果。


    有個星期六，我們一轉進摩爾街，有位天使就拉了我的肩膀，對我耳語：「讓媽媽走在前面，她不會注意到的。」我退後兩步，媽媽繼續向前走，看著正在叫賣販售的蔬果。突然間，整條摩爾街彷彿變成一座黃金宮殿，一切全染上金黃色，連人群也不例外。接著，顏色又產生了變化，其他顏色再度浮現，卻是活躍鮮亮的色彩，比平常更爲鮮明亮麗。這些顏色開始從水果、蔬菜和花朵中流竄出來，像是充滿能量的波浪，波浪隨後變成了色彩球，從街道的一邊彈跳到另一邊，又彈到攤位上，甚至彈到人們身上，但似乎沒有人注意到它們。


    街道上不僅到處是人，天使也比平常多。有些天使的穿著打扮就和賣蔬果的婦人一樣，而且也忙著幫忙。看天使模仿婦人的每個動作，實在很有趣，他們真是擅長模仿。天使還唱著歌，彷彿是為了配合四周的街道生活而唱。


    之前我去過摩爾街很多次，卻從未見過如此景象，或許這是為了讓我開心而發生，又或許每天都有，不過我是第一次看見。熙熙攘攘的繁忙景象讓我非常興奮。


    忽然間，走在三個攤位前的媽媽發現我沒跟在身邊。


    > 「羅娜，清醒些，快把菜籃車拉過來。」


    我以爲一切會隨即恢復正常模樣，但是沒有。我站在媽媽身邊，天使又在我耳邊細語：


    > 「看著賣水果的女士。」'
  merge: -1
  pgno: 64
- img_proc: true
  md: '賣水果婦人的守護天使就站在她身後，彼此非常相像，連穿著也一樣。那天使充滿光亮，綻放美好的笑容，還對我眨了眨眼。媽媽向那婦人買了些蘋果、梨子和香蕉。當婦人把水果放進棕色紙袋時，她的天使的舉動吸引了我的注意，因為他正在搖動手指頭。


    我察覺到婦人把爛蘋果放進媽媽的購物袋，她的天使正在對她說話，可是婦人聽不見。天使持續搖動指頭，我因為沒法繼續裝個撲克臉，於是笑了出來。婦人用銳利的眼光看了我一眼，從她的眼神中，我知道她明白我看見她的舉動。這時袋子突然裂開，水果掉落一地。婦人趕緊撿拾水果，而且撿到一顆爛蘋果！我知道這並不是巧合，而是她的天使和我的天使讓事情發生，我笑得更厲害了。


    媽媽注意到那顆爛蘋果說：「希望妳不是要給我爛水果啊。」


    婦人邊否認，邊拿新袋子裝水果，同時用愧疚的眼神瞄了我一眼。媽媽付過錢後，我把水果袋放進菜籃車裏。要離開時，婦人用她那宏亮的都柏林口音大喊：「嘿，太太！」


    媽媽轉了身，婦人遞出一個袋子。「太太，這個送給妳的孩子們！」她的天使站在她的身後微笑著，婦人終於聽見了他的話語。


    之後，我又去了摩爾街許多次，但街道再也不曾像那次如此活躍鮮明。我很清楚雖然自己看不見某些東西，但不表示沒有發生。天使知道他們不能一直讓我看見所有事物，我會無法承受，也會因此分心而無法正常生活。


    天使還教了我許多關於選擇的觀念。有個午後，他們幫助我了解：改變想法，做出正確選擇，永遠不嫌晚；也讓我知道只要願意傾聽，天使便能幫助我們做出許多正確的選擇。'
  merge: -1
  pgno: 65
- img_proc: true
  md: '我很喜歡幫媽媽跑腿辦事，這樣就可以和天使自在說話。我喜歡和他們一起在街上跳著走，欣賞鳥兒和樹木。這天午後，在前往店鋪的途上，天使告訴我：「停下來，羅娜！走到另一條街上去，我們等下會解釋給妳聽。走到大街後，不要左轉到商店，過馬路，然後右轉直走。」


    我確實照做了，抵達目的地後，看見人行道上堆滿了家具，還有一輛警車和一群圍觀的人。有個老人正從大門拄著柺杖走出來，他所有的財產和家具都堆在街上。那個景象使我非常震驚，終生留在我的腦海裏。


    「天使，」我說，「那個可憐人發生了什麼事？」


    我站在對街人行道上，看著一切。


    「羅娜，那老人一輩子都住在那間房子裏。那是他的房子，但是他越老越頑固，甚至拒絕繳稅。他曾經有過選擇，可以選擇繳稅，也有錢繳，這一切原本不必發生。假使他現在還願意和家人溝通，他們會幫助他做出正確的選擇，可是因為固執，他不願意和家人說話。現在他只有自己能依靠，至少目前是這樣。」


    我問天使在一旁試圖和他說話的女人是誰，如果是他的女兒，他會不會聽她的話？天使回答：「羅娜，妳難道沒看見天使在他的耳邊細語？要知道，他聽得見他們的！妳看，他哭了，願意讓女兒挽起他的手臂，他終於做出正確的選擇。只要我們願意傾聽，做出正確的選擇的時機永遠不嫌晚。」


    「我懂了，」我說，「天使也永遠會幫助我做出正確的選擇嗎？」'
  merge: -1
