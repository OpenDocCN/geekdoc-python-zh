  md: '接著，爸爸的靈魂轉過身，微笑看著我，我感受到他的愛。就在此時，我發現一條在我看來如金鍊子的東西掛在爸爸的靈魂上。金鍊子從上方進入爸爸的頭頂，然後纏繞他整個軀體。出乎意料的是，金鍊子的一部分從父親的軀體延伸而出，又慢慢從空中朝我的方向移動，天使使我把頭低壓時，我看見金鍊子進入我的胸膛，將爸爸的靈魂和我的靈魂連結在一起。


    天使又抬起我的頭，我看著爸爸的靈魂小心下降，進入他的身體。人的靈魂通常完全存在於身體內，但爸爸的靈魂並沒有完全進入身體，一部分仍分離在外，略微高於他的頭部，因為他在世的日子所剩無幾。我看見爸爸的靈魂對於他身爲人的生命，具有極大的熱情與悲憫之心。


    有人在我肩膀拍了一下，請我坐下，我才發覺大家已就坐，爸爸也是，只有我還站著。我恢復神智，深吸了一口氣。突然間，我感受到天使的觸摸，默默感謝了他們。我覺得悲傷，同時又充滿喜悅。


    每當上帝或天使告訴我有人即將進入生死轉換期，我總是對生命經由死亡進入人類所謂超自然世界的過程感到驚奇。那些人或許是我多年前經常見面的人，或只是透過別人聽過的人，又或是世界上某個名人。


    看著另一個人改變生活和信仰，總會讓我不禁微笑。人們似乎無法了解自己開始改變生命時，同時也走上了重生之路。我將永遠記得爸爸的問題：爲什麼會花那麼久的時間來認識上帝？'
