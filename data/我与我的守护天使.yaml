    # 18

    「羅娜真好運……」


    某個冬夜，喬和我來到梅努斯的祈禱會，當時約有二十五人到場，許多是年輕人。一位虔誠的年輕人強尼歡迎大家之後，便一起祈禱、歌頌，我一直很喜歡這樣的活動。之後，包括我在內，每個人開始默禱，現場安靜到連一根針掉落的聲音都能聽見。一位天使在我耳邊細語：「羅娜，張開眼睛，抬起頭。看見右邊那位年輕人了嗎？」

    「看見了。」我輕聲回答。

    「羅娜，妳將看見那年輕人的靈視影像，現在低下頭，閉上眼睛。」


    我立即進入他的靈視影像，我在年輕人身邊和他一起走在一條塵土飛揚、充滿坑洞且蜿蜒曲折的道路上，我無法看得很遠，因為道路曲曲折折。他走了好一段時間，一路上避開石頭和坑洞，看起來像是迷失，事實不然，因為在下個轉彎處，出現了一棟建築，左邊有一道階梯。年輕人開始費力往上爬，彷彿每踏出一步，階梯就變得更陡峭難爬，最後他終於來到門前。

    在他的靈視影像中，那建築似乎不斷擴大，此時已經變得巨大無比，原本在路邊看去時，只是一棟普通建築，此時卻變成了龐然大物。年輕人驚訝地往後退了一步。眼前的門是'
  - '[PAGE 191]


    如此巨大而沉重,相較之下,他卻是渺小而微不足道。他想要走進門內,但那必須付出很大的氣力。在用盡全身力量後,他終於成功推開大門,擠過門板,進入一間明亮且空曠的巨大廳堂。他在地板上坐下,開始祈禱,進入冥想,成為浩瀚空間中的一個小點。


    天使在我頭上摸了一下,我和年輕人之間的連結隨即中斷。


    「分享的時候到了。」強尼說。


    大家一個接著一個開始分享,最後輪到那位看見靈視預言的年輕人。他如實描述自己所經歷的靈視影像,就和我所看見的一模一樣。我是第一次以這種方式分享他人的靈視影像,因此興奮無比。年輕人描述完之後,最後又說他不懂這靈視影像的意義。


    天使要我開口說話,說我必須讓年輕人了解靈視影像的重要性,鼓勵他繼續走在這條道路上。


    我非常緊張,甚至是到了害怕的程度!


    「我辦不到,」我對天使說,「他們聽不進去的,我只是個平凡人。」


    年輕人停止說話,天使則不停告訴我該怎麼做,我又不斷藉口推託。這時,另一位年輕人開口說話了,天使要我注意聽他所說的話。


    「祈禱會現場有個人聽見了上帝的話,這個人非常緊張、害怕。」他只說了這些。


    上帝要我停止躲藏。


    正當我深呼吸準備說話時,強尼先開口說:「如果大家的分享到此為止,我們就一起進行禱告。」'
