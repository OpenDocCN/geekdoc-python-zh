  md: '屋裏。喬朝屋外看，無法置信，因為雪地上並沒有足跡。他看了又看，想在雪地上尋找蛛絲馬跡，不論是動物或小鳥，什麼都好，最後甚至踏進雪地。他不可置信地看著我，搖著頭，臉色蒼白說：「上帝啊，這實在是太過分了。」


    最後，他終於走回來，關上大門。我說：「別擔心，來坐在火堆旁暖暖身子。那是你的兒子，我們的寶寶來道別，他正和天使離開，前往應該要去的天堂。現在，你可以放手讓他走了。」


    喬在火邊落淚，我們彼此相擁，兩人都哭了，但內心非常平靜。


    「小寶寶為我們做了一件很美好的事情，不是嗎？」我對他說，「天使顯現這類事情，我們才會知道寶寶很好，一切安然無恙。孩子來謝謝我們當了他的父母親。」


    爸爸常突然來造訪我們，而且經常在晚上出現。我很喜歡他這樣給我們驚喜。有一天，我在庭園裏除草，在兩排馬鈴薯之間鬆土。此時我們已經有能力種植所需的蔬菜水果，克里斯多夫也會幫我，他雖然只有五歲，卻總是熱切想幫忙。


    聽到爸爸的車聲來到柵門外，我轉身看去，兩個孩子大喊著：「阿公！」克里斯多夫穿越馬鈴薯田，想要打開柵門，歐文則搖搖晃晃跟在後面。柵門被繩子綁住，我抱起歐文，走去幫克里斯多夫。柵門打開後，歐文在我懷裏扭動著要下去。克里斯多夫則跑去跟剛下車的外公打招呼。他一身釣魚裝扮，戴著最心愛的帽子，那是一頂花呢帽，上面別滿各種色彩的'
  merge: -1
  pgno: 180
- img_proc: true
  md: '毛鉤假餌。他擁有那頂帽子許多年了,不但一有機會就戴,還一直小心呵護。

    爸爸拍了拍孩子的頭,他總是這樣和他們打招呼,我有時候會跟他說:「爸!他們又不是小狗。」他則是對我一笑置之。

    「庭院看起來很棒。」爸爸說,克里斯多夫一邊拉著他往馬鈴薯田走去。

    「孩子們帶你參觀完我們種的蔬菜後,進屋來,我會把茶準備好,」我說。

    歐文當時已經三歲,他步伐踉蹌最先回到廚房。歐文是個早產兒,還沒發育完全就誕生,這使得他臀部的旋轉幅度比正常人大。他走路的速度快到讓我看著他時會不知不覺屏住氣。有時他雖跌在地上滾個三、四圈,最後雙腳仍然站得穩穩的,彷彿腰部以下有雙關節似的。歐文跌滾在地時,常有許多天使的光影環繞在他身邊保護。看他滾動的樣子,想必會折斷不少骨頭,神奇的是他從未摔斷骨頭。醫生說歐文的臀部要到七歲後才發育正常,我經常對喬說我等不及歐文趕快長到七歲,這樣才能輕鬆呼吸。

    「羅娜,」爸爸問道,「夏天時,你們要不要跟妳媽和我一起去度假,到墨林加(Mullingar)的小屋去?」

    我很開心,因為喬和我還不曾度過假,也沒有去蜜月旅行。想到能休息一下,我非常興奮。

    「太棒了,」我說,「我們當然很樂意,只希望喬能請假。」

    喬的盲腸炎已經復原,但在他盲腸四周我仍然看見一團紅色能量,明白病況還會再發生。他最近在附近地毯工廠找到一份工作,必須在不舒適的環境中勞動,清洗並烘乾羊毛,


    生。他最近在附近地毯工廠找到一份工作,必須在不舒適的環境中勞動,清洗並烘乾羊毛,'
  merge: -1
