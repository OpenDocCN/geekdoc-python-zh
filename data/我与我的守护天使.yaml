  md: '他的光芒更強烈，具有居高臨下、威風凜凜的氣勢，一股強勢的陽剛力量。打從第一次見到他，我就覺得他會像一層防護罩那樣隨時保護我。後來他經常出現，我漸漸和他成了朋友。他的名字叫米迦勒（Michael）。


    上學讀書對我而言是件苦差事，因為老師們大都把我當作遲緩兒。我的第一次聖餐禮（First Holy Communion）是六歲那年在學校領受的，對多數愛爾蘭的小朋友來說，那是個非常特殊的日子，可是我那陣子卻過得糟透了。典禮前在教室練習領聖餐時，老師們會問孩子問題，確認大家都能順利回答教義，但他們對我卻不理不睬，因為他們認爲問了也沒有用！當所有孩子排成一排，一起複誦關於聖餐的內容時，我原本也坐在其中，隨後卻總被拉到一旁去坐著。這舉動傷害了我的小小心靈。所以當我坐在教室後面或角落的板凳上時，我問天使：「他們不知道我也能回答教義問題嗎？爲什麼連一次機會也不給我？」


    到了聖餐禮那天，我終於也在教堂裏排隊。但眼看就要踏上聖餐台了，突然又被拉出隊伍，因爲老師覺得那些較優秀的女孩應該排在我前面。


    當然，也有人對我很慈愛。四歲時，有位我印象中稱之爲莫德理妮的修女，雖然也被告知我是個遲緩的智障兒，不過我能感覺到她明白事實並非如此。在課堂上，她會走到我身邊，問一些我能夠回答的小問題，然後笑一笑，摸摸我的頭。


