    「我真正的願望是您，上帝之母能顯現給全世界。」我開始哭泣。「讓所有的怨恨和戰爭停止，讓所有的痛苦、飢餓停止，讓為了爭奪物質、土地和權力所引發的戰爭而造成的破壞能夠終止。」我以乞求的眼神看著她，淚流滿面。「這個世界需要奇蹟。」

    「羅娜，我將觸及人們的心。有一天，我將現身，讓全世界的人都能像妳一樣看見我。」天使之后給我一個微笑，雙眼散發著愛，環繞在她四周的明亮光芒，像熊熊烈焰般向外延展，觸碰了我，也帶走所有悲傷。'
