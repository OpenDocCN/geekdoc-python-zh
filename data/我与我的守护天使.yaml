  md: '傳統醫藥對那位女士逐漸失效，只能控制疼痛，因此她也和許多人一樣，轉而尋求心靈上的協助。在醫生的協助下，她前往巴西旅行。我知道那是她最後的旅程，而且將對身體造成極大耗損，但對心靈來說卻是非常重要的。有時候，明白自己即將死去的人，會想學習更多關於靈魂之旅的事情，因為這能幫助他們更了解死亡。


    她在巴西的時間非常短暫，卻極為重要。她回來後，儘管體力非常虛弱，卻第一時間來找我，告訴我旅程上發生的種種，並為心靈之旅尋求更進一步的學習。她丈夫也坐在廚房裡，在她說話時幫腔。有一度，她要求丈夫閉嘴，不要插話，她非常渴望親自告訴我一切，如此才能得到療癒，最後在平靜中死去。她要離開時，我給她一個擁抱，明白這是最後一次見面。她走下階梯，我看見一道光芒，她的靈魂回頭看我，一個完美的靈魂。她回到家，上了床，從此不曾下床。


    天使一直告訴我喬的時間不多了，我經常因為他們說我不想聽的話而哭泣。有一天我去商店購物出來，一位天使站在我面前，四周圍繞著小鳥。「走開！」我說。


    天使隨之消失，可是小鳥依然存在，各式各樣的小鳥，包括麻雀、椋鳥、黑鶇、寒鴉及烏鴉等較大型的鳥。牠們繞著我飛，翅膀幾乎要碰到我。我伸手驅開小鳥，最後牠們終於飛離。現在我稱那位天使為「鳥天使」。


    鳥天使非常美麗，身材高挑優雅，身穿白色長袖袍子，袖子有特殊剪裁，腰間繫著金色'
