- md: '我向他道謝，並邀請他喝杯茶。泡茶時，湯姆神父、喬和孩子們把食物搬出箱子。箱子裏應有盡有，不僅有許多食物，而且都是手工料理的，我簡直不敢相信。我泡了茶，也感謝了上帝和天使。我把茶端給神父，並切開其中一塊蘋果塔，我看了孩子們一眼，他們眼中閃著光芒。我轉身詢問湯姆神父：「你怎麼會知道？」


    湯姆神父說他只是聽說我們有些困難，除此之外一無所知。我看著桌子另一端的喬，他搖著頭。我知道他不想告訴湯姆神父他病情嚴重的程度。「感謝你傾聽天使的聲音。也替我們謝謝家政課的學生，謝謝他們為我們家帶來如此豐盛的食物。」


    聖誕節前夕，湯姆神父帶著我所見過最大的火雞和一塊美味的火腿來到家裏。那個聖誕節，喬坐在火堆前轉身對我說他很羞愧，因為他無法妥善照顧我和孩子們。「這些年來你會生病，並不是你的錯。」我設法安慰他，「你並未故意讓自己生病，所以沒有必要這樣說。」


    同樣的話喬也曾說過許多次，這也是多年來，我經常聽到生病的人掛在口邊的話。雖然這不是他們的錯，卻仍感到愧疚，覺得自己是家裏的麻煩和負擔。有時候我會問喬：「你今天為何如此生氣？」他則會說：「我不是生妳或孩子們的氣，而是惱怒自己生病，因為我無法好好照顧妳和孩子們。我一無是處。」


    那個聖誕節，我們坐在火爐邊，我堅定地告訴喬：「你只要覺得身體狀況好一點，就到庭院努力做事；有能力，就會打掃廚房，我買完菜回來，看到乾淨的廚房，心情總是很好。你已經盡力而為。孩子們和我都很愛你。」


    ## 25 米迦勒


    一天晚上，我感到心情沉重、充滿壓力。我不斷祈禱，請求上帝為來尋求協助的人展現奇蹟。那時候已經很晚，孩子們都睡了，我也準備上床去，只剩下喬坐在火爐邊喝茶。我點亮喬那側的床邊小燈，然後坐在床上，背後墊著枕頭，膝蓋屈起，臉埋雙手中祈禱著。


    我不知道祈禱了多久，忽然聽見有人喊我的名字。就在床另一側的小燈旁，站著天使米迦勒。他和往常一樣光芒四射，可是模樣大不相同。


    米迦勒天使的穿著，適切地輔助他所要表達的事物，也讓我更深入了解他的訊息。這一晚，他看起來像個王子，頭戴金冠，一身白色與金色長袍，腰間繫著金色與黑色相間的腰帶，腰帶寬鬆往下垂掛到膝蓋上方。他手中拿著一卷捲軸，頭髮長及肩膀，輕柔得如微風一般。湛藍的眼睛一如往常光芒四射，臉上帶著天堂般的笑容。雙腳穿著荊棘涼鞋，鞋帶交錯往上延伸到腿部，雙腳上方各有一個金色十字架。米迦勒天使散發著驚人的明亮光芒。


    > 「羅娜，上帝聽見妳所有的祈禱。」米迦勒說，「從抽屜裏拿出筆和紙，我有訊息要傳遞給妳，這是來自上帝的祈禱文。」


    我遵照米迦勒的吩咐，拿著紙筆坐在床上，米迦勒打開捲軸，讀著：


    ### 米迦勒 268


    汝療癒天使的祈禱，

    由天使長米迦勒為上帝所帶來。

    傾注，汝療癒天使，

    汝天堂之主降臨於我，

    於我所愛的人們，

    使我感受汝。

    療癒天使之光於我身上，

    你療癒之手的光芒。

    我將令汝的療癒開始，

    以上帝所賜之道，

    阿們。


    米迦勒讀完捲軸，我請求他再讀一遍，而且要慢一點，因為我無法順利寫下內容，那用詞很奇怪，不是我慣用的言語，但這就是我所接收到的文字。米迦勒天使對我笑著，然後用一根指頭觸碰我的額頭。「現在寫吧，羅娜。」


    米迦勒天使再度讀出捲軸上的祈禱文時，我毫無困難寫下了每一個字。上面所寫的正是我被給予的文字，雖然這些字在我聽來頗為奇怪。米迦勒說：「把這祈禱文給予每位來尋求協助的人。這是上帝送給妳的祈禱文。」


    我爲自己，也爲所有將從祈禱文中獲益的人感謝米迦勒和上帝。


    米迦勒鞠躬後便消失了。


    打從多年前在舊克爾麥罕的臥室裏第一次見到米迦勒，我就知道他不同於其他天使，因為他具有強大的力量，比其他天使更有威力。十四歲左右，他曾經告訴我他是天使長，但我不得向任何人揭露這個訊息。這一晚，他帶來這份來自上帝的祈禱文，要我與他人分享，也才叫我寫下「由天使長米迦勒爲上帝所帶來」的字眼，於是我知道現在起可以透過祈禱文來提及他。


    有時候天使長米迦勒出現時，會散發出如陽光一般的光芒，彷彿他就站在太陽之中。但這樣的光芒幾乎讓我失明，我只得請求他把光芒調暗。明亮的光芒顯示米迦勒也和太陽一樣，是個超乎我們理解之外的強大力量，而且他也和太陽一樣，爲地球帶來生命。


    米迦勒告訴我天使長就像是天使的將軍，統領許多天使和靈魂，所有天使都遵從他們。天使長派遣天使到宇宙各地執行上帝的意旨，傳遞祂的訊息。


    天使長爲數不少，比傳統上曾提及的數量還多，而米迦勒是其中力量最強大的天使長之一。他是太陽天使長，加百利（Gabriel）則是月亮天使長。所有天使長彼此諧和，圍繞坐在寶座上的上帝身邊。他們是非常強大的力量，守護著天堂，並維護持續不斷的造物過程。


    隔天我告訴喬天使長米迦勒給我一份來自上帝的祈禱文後，他便把祈禱文寫在紙張上，讓我送給前來尋求協助的人。後來有位朋友說要幫我印刷複製。直到今日，我仍然將祈禱文送給每位來尋求協助的人，許多人告訴我「療癒天使」回應了祈禱文，協助他們。


    所有的天使都能進行療癒工作，但有一群天使稱為「療癒天使」，需要療癒時，可由守護天使召喚而來。療癒天使為數好幾百萬，形形色色，而且上帝隨時為世界注入更多的療癒天使。我們所要做的，只是請求他們的協助。


    我們必須時時記得，上帝會給予我們最適合的療癒。有時候我們察覺不到療癒已經發生，因為那或許不是我們尋求的方式。我們得注意並且認得療癒的發生，因為徵兆往往非常微小，例如某個長期憂鬱的人微笑或大笑，或者是某人在承受許多生理疼痛後覺得舒服多了，又或者是一位壓力過大、無法應對的母親突然間覺得幸福喜樂。


    有時候療癒天使會透過兒童進行溝通。孩子可能說出對母親或大人來說很重要的事情，因而幫助他們了解事情發生的原由，並協助如何改善。


    隔年夏天的某日上午，一位母親帶著女兒來找我。女兒蘇菲約二十歲出頭，發生一場車禍後，手臂持續疼痛，痛還延伸到體內。醫生已經盡力，無法再有進展。蘇菲受痛苦折磨多年，母親非常擔憂。蘇菲堅持我先與母親單獨會談，她則坐在小前廳裏看雜誌等待。


    我和母親談了約半小時，最後我為她祈禱，向上帝祈求，請求療癒天使在她生活的各個層面施展療癒。我陪母親走到前廳去會見女兒，一進去，我隨即知道天使們已經來過，因為這裏非常明亮溫暖，空氣裏環繞著我所謂的療癒天使的微風。由於我明白發生什麼事情，所以不禁笑了。


    蘇菲在椅子上睡著。母親溫柔將她喚醒，她茫然看著我們。突然間，蘇菲笑了，並且說：「我不痛了，所有的疼痛都消失了！」


    蘇菲邊說邊站了起來，自在地移動身體，屈曲手腳，發現疼痛全部消失。她像個孩子跳來跳去，因為可以再度擁有一個沒有疼痛的身體而開心笑著。


    「我覺得好極了，羅娜。我做了一個夢，夢中妳讓我睡著，然後出現許多天使，環繞在我身邊，觸摸我。他們讓我痊癒了。」


    我把她帶到小房間裏為她祈福，感謝上帝和天使療癒了她。我連祈禱文都還沒給她，療癒天使已經前去做工。


    有時候人們對我說，他們相信我和上帝及天使有特殊的連結，假使能透過我請求，願望就能達成。大家對我有太多信心，有時讓我感到害怕。我怕上帝不一定准許他們所祈求的療癒，因為事情本不該如此。我知道上帝永遠會給予某種療癒，但有時候人看不見，因為那與他們想像的不同。


    我會接到某位曾經帶孩子來找我的母親或父親的電話，請求我在手術進行的當天祈禱。他們每天在醫院裏以療癒祈禱文為孩子祈福，又或者孩子會自己念誦祈禱文。我知道有個孩子隨時把祈禱文放在醫院的枕頭下。我也會接到電話感謝我和天使們，因為療癒發生了。


    某個星期天上午，我剛和孩子們望彌撒回到家，就傳來敲門聲。開門時，我很驚訝看見一位老太太站在門前。她滿臉淚水，很抱歉在星期天來找我。我看了很不忍心，便請她進門。她年紀相當大，身體也不好，正逐漸邁向死亡。她很害怕在痛苦中死去，所以想向上帝祈求奇蹟。我為她祈禱、祝福，並給她療癒祈禱文。離開時，她開心許多。約六星期後，她突然再度來訪，道歉說只耽擱我一分鐘。


    「上帝施展了奇蹟。」她說，「我坐在廚房沙發上，覺得非常不舒服，但突然間感覺到室內充滿寧靜的氣息。一抬頭，看見房間中央站著一位天使。天使全身雪白，像是盤旋在空中，同時散發出明亮的光芒，並且對我笑著。下一分鐘，天使就消失無蹤。」


    這對於她來說已然足夠，她經歷自己所需的奇蹟。透過看見天使，上帝送她的禮物就是平靜的心靈，使她免於死亡的恐懼。她知道自己即將死於現有疾病，但在死亡來臨前，她要全然活在生命之中，享受生命，並且讓家人知道她多麼愛他們。「現在我知道有個地方叫做天堂，羅娜，因為我看見了天使。我再也不怕死亡，我知道那裏有天使等著我，當時間來臨，天使會帶走我的靈魂，留下這個皺巴巴，對誰也沒好處的無用老軀殼。所以我不再害怕死亡了，這是個奇蹟！」看著她說出這些話的模樣，我微笑了。


    她也笑了，心底不再恐懼。而最棒的是，就某個層面而言，她甚至期待身體死亡的那一天，期待天使來帶走她的靈魂。


    「假使有一天時機成熟，」她說，「我自己也變成天使，回來帶領我深愛的家人的靈魂前往天堂，這不是很美好嗎？」


    老太太宛如一團光芒，閃亮耀眼，臉上帶著美麗的笑容。我們一同念了一段祈禱文後，她就離開了。我不曾再見過她。


    我們還必須記得，上帝自天堂派來的天使只有在我們願意打開心房，允許天使進入生命時，才能真正幫助我們。我們無須害怕，也沒有理由害怕。我們之所以感到恐懼，是因為我們不了解天使。要記得，天使永遠不會傷害你。從來沒有天使傷害過我，而我可以向您擔保也沒有天使會傷害你。


    梅根大約兩歲大時，我們前往莎麗峽谷附近的都柏林山區。我們離開馬路，來到無人居住之地，那裏一片平坦，長滿綠草，四處散布著零零落落的小石頭。我們朝一片和緩的坡地往下走，石頭越來越多，越往下走石頭越大，坡度也越陡，近乎像懸崖一般，但有些樹木生長其間。從斜坡邊緣看去，有座漂亮的湖泊坐落在群山之間，湖畔有一棟大房子，山的另一邊還有鹿在吃草。


    在山坡上走了一會兒後，我坐在一塊石頭上，喬和露絲帶著梅根下坡，我看著他們手牽手，梅根走在中間。我躺在石頭上，閉上眼睛幾分鐘，享受著陽光。雖然天氣有點涼，仍能感受到陽光的溫暖，石塊也很暖和。一會兒後，我聽見喬、露絲和梅根回來的聲音，便張開眼睛，坐起身來。我望向小徑，但他們人還在視線範圍外。他們逐漸靠近，梅根走在中間，喬在右邊，露絲在左邊，他們把她高高抬起，在空中盪著。梅根開懷大笑，玩得非常開心，在爸爸和姊姊的幫忙下蹦蹦跳跳走著。


    接下來發生的事情讓我非常欣喜，因為梅根的守護天使現身，跟在梅根後面蹦蹦跳跳走來。她看起來像是直接穿透了梅根，然後在她前方一公尺處舞蹈著。梅根的守護天使以年輕少女的模樣出現，有一雙棕色的大眼睛，非常明亮美麗，雙腳打著赤腳，當然也沒有觸碰到地面。她看起來大約八歲，黑長的髮辮中，也編入一條呈橘色、紅色和綠色的荊棘。頭髮上還插了一根紅羽毛，額頭中央閃著星形的光芒。有那麼一瞬間，我覺得自己看見了她的翅膀。她穿著一件淡金色的無袖束腰外衣，那衣服並無特殊設計。梅根的守護天使光芒四射，動作如羽毛般輕柔優雅。


    接著，這位美麗的守護天使又跳回梅根的體內，消失無蹤，沒有人注意到她的存在。他們繼續往上朝我走來。


    梅根的守護天使和我其他孩子的守護天使非常不同，其他守護天使沒有孩子的模樣。我相信梅根的守護天使將跟她一起長大。回想起來，我記得梅根開口說出的第一個字，既非媽媽也非爸爸，而是一個不曾聽過的字。我告訴喬，天使正在告訴我梅根守護天使的名字。我請天使拼出她的名字，我好寫下來，等梅根長大一點，再告訴她。


    在屋子裏打掃，或在庭院工作，或前往店鋪的路上，我總是安靜祈禱著。一天晚上，我像所有母親一樣，在家裏努力幹活。整個屋子幾乎屬於我一人，喬和梅根正熟睡著，露絲去朋友家當保母，歐文在外面運動，克里斯多夫到鎮上另一端的朋友家去。天色已暗，透過窗戶，我能看到街角的路燈，享受著單獨又不孤獨的平靜時光。這時我注意到空氣似乎靜止，時間也靜止了，四下安靜無聲。我低頭看著自己的雙手，注意到周圍的能量閃爍著光芒。能量永遠存在，可是有時天使現身前，能量會變得更強烈而明亮。我知道有位天使隨時就要現身。但天使不總是如此行事，有時候不知不覺中他們就出現了。


    我拿著毛巾朝廚房走去，在走道上撞見一位天使，她要我到前廳去，接著就消失。我打開通往前廳的門，窗邊站著另一位力量更強大，而且異常美麗的天使正對著我微笑。她和我曾見過以及日後見到的天使截然不同。她身穿火焰般的紅、金色服裝，令我驚豔，我從未見過這樣的服裝。她的頭上帶著一頂精美的頭冠，數百萬根如絲般編織成辮的細線，從頭冠中央像水流般浮現，布滿她全身。每根辮子上又編入鑽石和各種色澤的藍寶石。這位美麗的天使擁有一對令人目眩的翅膀，羽毛間閃亮的珠寶，猶如搖曳不止的熊熊火焰。她非常獨特，絕對完美，而且處處顯得生動活躍，如此耀眼燦爛。我不得不把目光移開片刻，因為我無法承受她全部的美麗。


    完美的她，臉上散發出生命的光輝，藍色的雙眼如太陽般明亮，但光芒又超越太陽十億倍。有什麼字眼能夠形容呢？我只能說，看進她的眼睛時，我看見溫柔、慈悲、平靜與愛從中發散而出。我知道面前這位華麗堂皇的天使能夠看盡一切，彷彿認得宇宙中每一顆微粒，那是一種超乎人類想像的能力。


    我顫抖著，因為我存在於這般力量之中，獲准去感受並認識這樣的力量。另一位天使站在我的右後方，但我一直沒察覺到他的存在，直到他開口說：「羅娜，再往房間走進來一些。」


    我又走了幾步，眼睛無法離開面前這位美麗天使。我感覺到身後的門關了起來。莊嚴華貴的天使朝我走來，帶著微笑說：「羅娜，不要害怕。」


    就在那一瞬間，我內心充滿寧靜和喜悅。天使繼續說：「妳知道我是誰嗎，羅娜？」「不知道。」我回答。


    「我是天使之後。」


    「您是說您是上帝之母？」我很震驚，但就另一個層次來說，我早知道她是誰。我的靈魂知道，但是我的人性依然震驚。


    「是的，羅娜，」她回答，「我是天堂之后，眾天使之后，眾靈魂之后。羅娜，不要害怕，把妳心中的請求說出來吧。」


    「天使之后，我見過您許多次了，您是我在天空裏看見的帶著孩子的母親。」現在我想起童年在巴里曼的鞦韆上，天使曾經讓我看見她的臉龐。


    「是的，羅娜，妳說對了。」她說。


    「我真正的願望是您，上帝之母能顯現給全世界。」我開始哭泣。「讓所有的怨恨和戰爭停止，讓所有的痛苦、飢餓停止，讓為了爭奪物質、土地和權力所引發的戰爭而造成的破壞能夠終止。」我以乞求的眼神看著她，淚流滿面。「這個世界需要奇蹟。」


    「羅娜，我將觸及人們的心。有一天，我將現身，讓全世界的人都能像妳一樣看見我。」天使之后給我一個微笑，雙眼散發著愛，環繞在她四周的明亮光芒，像熊熊烈焰般向外延展，觸碰了我，也帶走所有悲傷。


    我問能否再見到她，答案是肯定的。然後她就消失了。


    我相信有一天這將會發生。天使之后曾經也顯現於人們面前，並且持續出現在世界各地，直到今日。不過目前仍只出現在一小群人前。我相信天使之后終有一天將出現在所有人面前，並且不是短暫逗留，而是停留好一段時間，讓全世界看見她、接受她。她將為魯鈍的人類帶來所需的證據，而這將是人類產生重大改變的開始。


    ## 26 邪靈現身


    人有時候會透過刻意的、惡意的意圖，或因為嫉妒、憤怒等情感，或以為生命對自己不公平等觀感，而讓撒旦進入生命。舉個例子，撒旦往往在發生土地或遺囑糾紛時，入侵到個人心中。撒旦使靈魂變得晦暗的程度不一，能提供個人炫麗奢華的表面生活，卻摧毀周遭人的生活，最後，若是不做任何挽救，也將摧毀主事者的靈魂。


    在靈性上持續成長，重新與上帝和天使們連結，讓上帝的愛和慈悲重回心中，是唯一驅逐撒旦的方法。只要提出請求，天使就會伸手協助。尋求協助的人甚至不需要是本人，家人或朋友都能祈求協助，我看過許多成功的案例。特別記住的是，一個人在生命中遭遇到邪惡之事時，來自任何人、任何信仰或背景的祈禱，都能產生重大的影響與變化。


    人能在不自知的情況下獲得靈性成長，或許是因為某人為他們祈禱，又或許他們還是孩子的時候，曾經請求過，然後在多年後，他們在靈性上覺醒了。


    多年來，許多在某種程度上受到撒旦影響的人曾經來拜訪過我。我能看見撒旦的影響，因為他總是忍不住想炫耀自己的存在。


    有一回，一位事業成功的愛爾蘭商人來找我。他不確定自己為何會來，但他的朋友說服了他，不過他也承認朋友花了兩年時間。他說自己做過一些可惡的事情，從未考慮過自己的舉動會影響到他人。對他而言，世界上只有一個人重要，那就是他自己；世界上只有一樣東西重要，那就是錢。


    不過，他的生命產生了變化。他告訴我朋友不再喜歡他，家人也不願意和他有任何關係。但我知道有人正在為他祈禱，否則他不會來找我。他問我為何自己不會羞愧自責，他知道自己曾經在某處做過錯事，應該要覺得愧疚，可是他不清楚如何才會產生那樣的感覺。他希望有自責感，也想要贏回朋友和家人。


    男人坐在我廚房餐桌旁，雙手交叉在胸前，說他想要改變，不想再這樣下去。他低著頭，但我看見淚水在他的眼眶打轉。接著，撒旦的邪靈出現在我面前。


    男人交叉雙手，身體前傾靠在餐桌上，頭低垂著，但我看見一張扭曲的臉從他的胸部升起，從他存在的最深處浮現，並且把頭轉向側邊。男人靜止不動坐著，彷彿不知道發生的一切。那張扭曲的、邪惡的臉看著我竊笑。這一回，一如我看過的其他人的內在邪靈一樣，邪靈似乎說著：「這回我差點就騙過妳，妳差點就錯過我了！」邪靈原本一直躲著，卻決定在我面前現身。


    基於我無法理解的奇特理由，邪靈總是忍不住要在我面前展現自己。不過，只要他們這麼做，我就知道撒旦再度失敗，而上帝和天使再度獲勝。


    我為男人祈福，為他向上帝祈求，然後給他療癒祈禱文，他把祈禱文放進皮夾。接下來的幾個月，我持續為他祈禱。


    ### 邪靈現身 280


    大約一年後，我接到他的來電，他的生命已經有所改變，事實上，從他離開我家那一刻起就開始變化，只是他不敢承認。他設法補償過去自己曾經傷害過的人，他的生意很順利，而且是以誠實的方式經營。他希望現在感謝我和上帝及天使還不會太遲。我提醒他要經常請求天使協助，而且不論是多麼微不足道的小事，也不要忘記感謝他們。至今我仍然爲他祈禱著。


    有一天，我橫越馬路要去梅努斯購物，耳邊傳來一個聲音：「慢一點，羅娜。」我身邊除了一點光芒，什麼也沒有，但我知道那是米迦勒的聲音。「我們轉進這條小巷子，安靜談一下。」我右轉進入一條小巷子，確定馬路上的人看不見後，便停下來。接著，米迦勒以人類模樣現身（我早已猜到）。確實是人模人樣，只是看起來有點太完美。不過，我看著他的眼睛時，仍然看見那個天使的他。


    「前往梅努斯的路上，妳要慢慢地走過運河橋（Canal Bridge），然後朝運河看去，越遠越好。」


    「有什麼問題嗎？」我問道，「在我過橋前告訴我。」


    「羅娜，」米迦勒說，「有個小寶寶的靈魂，目前妳還沒察覺到，小寶寶已經受精，尚未誕生。過橋時，你們兩人的靈魂將會連結在一起。妳也能感覺到母親的存在，但她對妳來說比較像個鬼魂，非常模糊。」


    我覺得他好像把我當作小孩般說話，彷彿我聽不懂似的。


    「米迦勒，我是個生過孩子的成熟女人。」我回答，「我不知道究竟是怎麼回事，不過我願意接受小靈魂和我連結。你會陪我走到橋邊嗎？」


    「不，羅娜，妳必須自己過去。慢慢走，橋上有另一位天使等著。寶寶在母親的子宮成長之際，那位天使會幫助妳了解並熟悉他的靈魂。照著天使的要求做。每回妳過橋，他將在那裏等妳，陪妳走一段路。妳和寶寶靈魂間的連結未來幾個月會越來越堅韌。」


    我們轉身走出小巷，接近大馬路時，天使米迦勒消失了。我朝運河橋的方向看去，果然有位天使在等我。他非常纖細高挑，模樣優雅，全身雪白，光芒四射。我遵守米迦勒的囑咐，慢慢地走，當腳一踩到橋上，隨即感覺到自己與小靈魂間的連結。


    天使站在橋中央，我走到他身邊站著。他看看我，以充滿愛與溫柔的聲音說：「我是天使阿拉比亞（Arabia）。」天使阿拉比亞碰碰我的手，我轉身朝運河下看去。水面平靜如玻璃，沒有一絲動靜，彷彿一幅畫。我被允許去感覺那位母親，以及她對腹中胎兒的愛。我感受到她的淚水，許多的淚水。站在橋上時，有人經過，對我打了聲招呼，我下意識回覆對方。


    我走過橋，下坡朝鎮上走去。一路上天使始終陪在一旁。人車雜沓，然後我低聲說：「再見，天使阿拉比亞。」


    我繼續去購物，繼續過著母親和妻子該有的日常生活，同時持續為天使工作。


    時光流逝，寶寶在母親的子宮裏不斷成長，我也開始認識這小靈魂，感覺到他正把愛傳'
  mdcn: '我向他道謝，並邀請他喝杯茶。泡茶時，湯姆神父、喬和孩子們把食物搬出箱子。箱子裏應有盡有，不僅有許多食物，而且都是手工料理的，我簡直不敢相信。我泡了茶，也感謝了上帝和天使。我把茶端給神父，並切開其中一塊蘋果塔，我看了孩子們一眼，他們眼中閃著光芒。我轉身詢問湯姆神父：「你怎麼會知道？」


    湯姆神父說他只是聽說我們有些困難，除此之外一無所知。我看著桌子另一端的喬，他搖著頭。我知道他不想告訴湯姆神父他病情嚴重的程度。「感謝你傾聽天使的聲音。也替我們謝謝家政課的學生，謝謝他們為我們家帶來如此豐盛的食物。」


    聖誕節前夕，湯姆神父帶著我所見過最大的火雞和一塊美味的火腿來到家裏。那個聖誕節，喬坐在火堆前轉身對我說他很羞愧，因為他無法妥善照顧我和孩子們。「這些年來你會生病，並不是你的錯。」我設法安慰他，「你並未故意讓自己生病，所以沒有必要這樣說。」


    同樣的話喬也曾說過許多次，這也是多年來，我經常聽到生病的人掛在口邊的話。雖然這不是他們的錯，卻仍感到愧疚，覺得自己是家裏的麻煩和負擔。有時候我會問喬：「你今天為何如此生氣？」他則會說：「我不是生妳或孩子們的氣，而是惱怒自己生病，因為我無法好好照顧妳和孩子們。我一無是處。」


    那個聖誕節，我們坐在火爐邊，我堅定地告訴喬：「你只要覺得身體狀況好一點，就到庭院努力做事；有能力，就會打掃廚房，我買完菜回來，看到乾淨的廚房，心情總是很好。你已經盡力而為。孩子們和我都很愛你。」


    ## 25 米迦勒


    一天晚上，我感到心情沉重、充滿壓力。我不斷祈禱，請求上帝為來尋求協助的人展現奇蹟。那時候已經很晚，孩子們都睡了，我也準備上床去，只剩下喬坐在火爐邊喝茶。我點亮喬那側的床邊小燈，然後坐在床上，背後墊著枕頭，膝蓋屈起，臉埋雙手中祈禱著。


    我不知道祈禱了多久，忽然聽見有人喊我的名字。就在床另一側的小燈旁，站著天使米迦勒。他和往常一樣光芒四射，可是模樣大不相同。


    米迦勒天使的穿著，適切地輔助他所要表達的事物，也讓我更深入了解他的訊息。這一晚，他看起來像個王子，頭戴金冠，一身白色與金色長袍，腰間繫著金色與黑色相間的腰帶，腰帶寬鬆往下垂掛到膝蓋上方。他手中拿著一卷捲軸，頭髮長及肩膀，輕柔得如微風一般。湛藍的眼睛一如往常光芒四射，臉上帶著天堂般的笑容。雙腳穿著荊棘涼鞋，鞋帶交錯往上延伸到腿部，雙腳上方各有一個金色十字架。米迦勒天使散發著驚人的明亮光芒。


    > 「羅娜，上帝聽見妳所有的祈禱。」米迦勒說，「從抽屜裏拿出筆和紙，我有訊息要傳遞給妳，這是來自上帝的祈禱文。」


    我遵照米迦勒的吩咐，拿著紙筆坐在床上，米迦勒打開捲軸，讀著：


    ### 米迦勒 268


    汝療癒天使的祈禱，

    由天使長米迦勒為上帝所帶來。

    傾注，汝療癒天使，

    汝天堂之主降臨於我，

    於我所愛的人們，

    使我感受汝。

    療癒天使之光於我身上，

    你療癒之手的光芒。

    我將令汝的療癒開始，

    以上帝所賜之道，

    阿們。


    米迦勒讀完捲軸，我請求他再讀一遍，而且要慢一點，因為我無法順利寫下內容，那用詞很奇怪，不是我慣用的言語，但這就是我所接收到的文字。米迦勒天使對我笑著，然後用一根指頭觸碰我的額頭。「現在寫吧，羅娜。」


    米迦勒天使再度讀出捲軸上的祈禱文時，我毫無困難寫下了每一個字。上面所寫的正是我被給予的文字，雖然這些字在我聽來頗為奇怪。米迦勒說：「把這祈禱文給予每位來尋求協助的人。這是上帝送給妳的祈禱文。」


    我爲自己，也爲所有將從祈禱文中獲益的人感謝米迦勒和上帝。


    米迦勒鞠躬後便消失了。


    打從多年前在舊克爾麥罕的臥室裏第一次見到米迦勒，我就知道他不同於其他天使，因為他具有強大的力量，比其他天使更有威力。十四歲左右，他曾經告訴我他是天使長，但我不得向任何人揭露這個訊息。這一晚，他帶來這份來自上帝的祈禱文，要我與他人分享，也才叫我寫下「由天使長米迦勒爲上帝所帶來」的字眼，於是我知道現在起可以透過祈禱文來提及他。


    有時候天使長米迦勒出現時，會散發出如陽光一般的光芒，彷彿他就站在太陽之中。但這樣的光芒幾乎讓我失明，我只得請求他把光芒調暗。明亮的光芒顯示米迦勒也和太陽一樣，是個超乎我們理解之外的強大力量，而且他也和太陽一樣，爲地球帶來生命。


    米迦勒告訴我天使長就像是天使的將軍，統領許多天使和靈魂，所有天使都遵從他們。天使長派遣天使到宇宙各地執行上帝的意旨，傳遞祂的訊息。


    天使長爲數不少，比傳統上曾提及的數量還多，而米迦勒是其中力量最強大的天使長之一。他是太陽天使長，加百利（Gabriel）則是月亮天使長。所有天使長彼此諧和，圍繞坐在寶座上的上帝身邊。他們是非常強大的力量，守護著天堂，並維護持續不斷的造物過程。


    隔天我告訴喬天使長米迦勒給我一份來自上帝的祈禱文後，他便把祈禱文寫在紙張上，讓我送給前來尋求協助的人。後來有位朋友說要幫我印刷複製。直到今日，我仍然將祈禱文送給每位來尋求協助的人，許多人告訴我「療癒天使」回應了祈禱文，協助他們。


    所有的天使都能進行療癒工作，但有一群天使稱為「療癒天使」，需要療癒時，可由守護天使召喚而來。療癒天使為數好幾百萬，形形色色，而且上帝隨時為世界注入更多的療癒天使。我們所要做的，只是請求他們的協助。


    我們必須時時記得，上帝會給予我們最適合的療癒。有時候我們察覺不到療癒已經發生，因為那或許不是我們尋求的方式。我們得注意並且認得療癒的發生，因為徵兆往往非常微小，例如某個長期憂鬱的人微笑或大笑，或者是某人在承受許多生理疼痛後覺得舒服多了，又或者是一位壓力過大、無法應對的母親突然間覺得幸福喜樂。


    有時候療癒天使會透過兒童進行溝通。孩子可能說出對母親或大人來說很重要的事情，因而幫助他們了解事情發生的原由，並協助如何改善。


    隔年夏天的某日上午，一位母親帶著女兒來找我。女兒蘇菲約二十歲出頭，發生一場車禍後，手臂持續疼痛，痛還延伸到體內。醫生已經盡力，無法再有進展。蘇菲受痛苦折磨多年，母親非常擔憂。蘇菲堅持我先與母親單獨會談，她則坐在小前廳裏看雜誌等待。


    我和母親談了約半小時，最後我為她祈禱，向上帝祈求，請求療癒天使在她生活的各個層面施展療癒。我陪母親走到前廳去會見女兒，一進去，我隨即知道天使們已經來過，因為這裏非常明亮溫暖，空氣裏環繞著我所謂的療癒天使的微風。由於我明白發生什麼事情，所以不禁笑了。


    蘇菲在椅子上睡著。母親溫柔將她喚醒，她茫然看著我們。突然間，蘇菲笑了，並且說：「我不痛了，所有的疼痛都消失了！」


    蘇菲邊說邊站了起來，自在地移動身體，屈曲手腳，發現疼痛全部消失。她像個孩子跳來跳去，因為可以再度擁有一個沒有疼痛的身體而開心笑著。


    「我覺得好極了，羅娜。我做了一個夢，夢中妳讓我睡著，然後出現許多天使，環繞在我身邊，觸摸我。他們讓我痊癒了。」


    我把她帶到小房間裏為她祈福，感謝上帝和天使療癒了她。我連祈禱文都還沒給她，療癒天使已經前去做工。


    有時候人們對我說，他們相信我和上帝及天使有特殊的連結，假使能透過我請求，願望就能達成。大家對我有太多信心，有時讓我感到害怕。我怕上帝不一定准許他們所祈求的療癒，因為事情本不該如此。我知道上帝永遠會給予某種療癒，但有時候人看不見，因為那與他們想像的不同。


    我會接到某位曾經帶孩子來找我的母親或父親的電話，請求我在手術進行的當天祈禱。他們每天在醫院裏以療癒祈禱文為孩子祈福，又或者孩子會自己念誦祈禱文。我知道有個孩子隨時把祈禱文放在醫院的枕頭下。我也會接到電話感謝我和天使們，因為療癒發生了。


    某個星期天上午，我剛和孩子們望彌撒回到家，就傳來敲門聲。開門時，我很驚訝看見一位老太太站在門前。她滿臉淚水，很抱歉在星期天來找我。我看了很不忍心，便請她進門。她年紀相當大，身體也不好，正逐漸邁向死亡。她很害怕在痛苦中死去，所以想向上帝祈求奇蹟。我為她祈禱、祝福，並給她療癒祈禱文。離開時，她開心許多。約六星期後，她突然再度來訪，道歉說只耽擱我一分鐘。


    「上帝施展了奇蹟。」她說，「我坐在廚房沙發上，覺得非常不舒服，但突然間感覺到室內充滿寧靜的氣息。一抬頭，看見房間中央站著一位天使。天使全身雪白，像是盤旋在空中，同時散發出明亮的光芒，並且對我笑著。下一分鐘，天使就消失無蹤。」


    這對於她來說已然足夠，她經歷自己所需的奇蹟。透過看見天使，上帝送她的禮物就是平靜的心靈，使她免於死亡的恐懼。她知道自己即將死於現有疾病，但在死亡來臨前，她要全然活在生命之中，享受生命，並且讓家人知道她多麼愛他們。「現在我知道有個地方叫做天堂，羅娜，因為我看見了天使。我再也不怕死亡，我知道那裏有天使等著我，當時間來臨，天使會帶走我的靈魂，留下這個皺巴巴，對誰也沒好處的無用老軀殼。所以我不再害怕死亡了，這是個奇蹟！」看著她說出這些話的模樣，我微笑了。


    她也笑了，心底不再恐懼。而最棒的是，就某個層面而言，她甚至期待身體死亡的那一天，期待天使來帶走她的靈魂。


    「假使有一天時機成熟，」她說，「我自己也變成天使，回來帶領我深愛的家人的靈魂前往天堂，這不是很美好嗎？」


    老太太宛如一團光芒，閃亮耀眼，臉上帶著美麗的笑容。我們一同念了一段祈禱文後，她就離開了。我不曾再見過她。


    我們還必須記得，上帝自天堂派來的天使只有在我們願意打開心房，允許天使進入生命時，才能真正幫助我們。我們無須害怕，也沒有理由害怕。我們之所以感到恐懼，是因為我們不了解天使。要記得，天使永遠不會傷害你。從來沒有天使傷害過我，而我可以向您擔保也沒有天使會傷害你。


    梅根大約兩歲大時，我們前往莎麗峽谷附近的都柏林山區。我們離開馬路，來到無人居住之地，那裏一片平坦，長滿綠草，四處散布著零零落落的小石頭。我們朝一片和緩的坡地往下走，石頭越來越多，越往下走石頭越大，坡度也越陡，近乎像懸崖一般，但有些樹木生長其間。從斜坡邊緣看去，有座漂亮的湖泊坐落在群山之間，湖畔有一棟大房子，山的另一邊還有鹿在吃草。


    在山坡上走了一會兒後，我坐在一塊石頭上，喬和露絲帶著梅根下坡，我看著他們手牽手，梅根走在中間。我躺在石頭上，閉上眼睛幾分鐘，享受著陽光。雖然天氣有點涼，仍能感受到陽光的溫暖，石塊也很暖和。一會兒後，我聽見喬、露絲和梅根回來的聲音，便張開眼睛，坐起身來。我望向小徑，但他們人還在視線範圍外。他們逐漸靠近，梅根走在中間，喬在右邊，露絲在左邊，他們把她高高抬起，在空中盪著。梅根開懷大笑，玩得非常開心，在爸爸和姊姊的幫忙下蹦蹦跳跳走著。


    接下來發生的事情讓我非常欣喜，因為梅根的守護天使現身，跟在梅根後面蹦蹦跳跳走來。她看起來像是直接穿透了梅根，然後在她前方一公尺處舞蹈著。梅根的守護天使以年輕少女的模樣出現，有一雙棕色的大眼睛，非常明亮美麗，雙腳打著赤腳，當然也沒有觸碰到地面。她看起來大約八歲，黑長的髮辮中，也編入一條呈橘色、紅色和綠色的荊棘。頭髮上還插了一根紅羽毛，額頭中央閃著星形的光芒。有那麼一瞬間，我覺得自己看見了她的翅膀。她穿著一件淡金色的無袖束腰外衣，那衣服並無特殊設計。梅根的守護天使光芒四射，動作如羽毛般輕柔優雅。


    接著，這位美麗的守護天使又跳回梅根的體內，消失無蹤，沒有人注意到她的存在。他們繼續往上朝我走來。


    梅根的守護天使和我其他孩子的守護天使非常不同，其他守護天使沒有孩子的模樣。我相信梅根的守護天使將跟她一起長大。回想起來，我記得梅根開口說出的第一個字，既非媽媽也非爸爸，而是一個不曾聽過的字。我告訴喬，天使正在告訴我梅根守護天使的名字。我請天使拼出她的名字，我好寫下來，等梅根長大一點，再告訴她。


    在屋子裏打掃，或在庭院工作，或前往店鋪的路上，我總是安靜祈禱著。一天晚上，我像所有母親一樣，在家裏努力幹活。整個屋子幾乎屬於我一人，喬和梅根正熟睡著，露絲去朋友家當保母，歐文在外面運動，克里斯多夫到鎮上另一端的朋友家去。天色已暗，透過窗戶，我能看到街角的路燈，享受著單獨又不孤獨的平靜時光。這時我注意到空氣似乎靜止，時間也靜止了，四下安靜無聲。我低頭看著自己的雙手，注意到周圍的能量閃爍著光芒。能量永遠存在，可是有時天使現身前，能量會變得更強烈而明亮。我知道有位天使隨時就要現身。但天使不總是如此行事，有時候不知不覺中他們就出現了。


    我拿著毛巾朝廚房走去，在走道上撞見一位天使，她要我到前廳去，接著就消失。我打開通往前廳的門，窗邊站著另一位力量更強大，而且異常美麗的天使正對著我微笑。她和我曾見過以及日後見到的天使截然不同。她身穿火焰般的紅、金色服裝，令我驚豔，我從未見過這樣的服裝。她的頭上帶著一頂精美的頭冠，數百萬根如絲般編織成辮的細線，從頭冠中央像水流般浮現，布滿她全身。每根辮子上又編入鑽石和各種色澤的藍寶石。這位美麗的天使擁有一對令人目眩的翅膀，羽毛間閃亮的珠寶，猶如搖曳不止的熊熊火焰。她非常獨特，絕對完美，而且處處顯得生動活躍，如此耀眼燦爛。我不得不把目光移開片刻，因為我無法承受她全部的美麗。


    完美的她，臉上散發出生命的光輝，藍色的雙眼如太陽般明亮，但光芒又超越太陽十億倍。有什麼字眼能夠形容呢？我只能說，看進她的眼睛時，我看見溫柔、慈悲、平靜與愛從中發散而出。我知道面前這位華麗堂皇的天使能夠看盡一切，彷彿認得宇宙中每一顆微粒，那是一種超乎人類想像的能力。


    我顫抖著，因為我存在於這般力量之中，獲准去感受並認識這樣的力量。另一位天使站在我的右後方，但我一直沒察覺到他的存在，直到他開口說：「羅娜，再往房間走進來一些。」


    我又走了幾步，眼睛無法離開面前這位美麗天使。我感覺到身後的門關了起來。莊嚴華貴的天使朝我走來，帶著微笑說：「羅娜，不要害怕。」


    就在那一瞬間，我內心充滿寧靜和喜悅。天使繼續說：「妳知道我是誰嗎，羅娜？」「不知道。」我回答。


    「我是天使之後。」


    「您是說您是上帝之母？」我很震驚，但就另一個層次來說，我早知道她是誰。我的靈魂知道，但是我的人性依然震驚。


    「是的，羅娜，」她回答，「我是天堂之后，眾天使之后，眾靈魂之后。羅娜，不要害怕，把妳心中的請求說出來吧。」


    「天使之后，我見過您許多次了，您是我在天空裏看見的帶著孩子的母親。」現在我想起童年在巴里曼的鞦韆上，天使曾經讓我看見她的臉龐。


    「是的，羅娜，妳說對了。」她說。


    「我真正的願望是您，上帝之母能顯現給全世界。」我開始哭泣。「讓所有的怨恨和戰爭停止，讓所有的痛苦、飢餓停止，讓為了爭奪物質、土地和權力所引發的戰爭而造成的破壞能夠終止。」我以乞求的眼神看著她，淚流滿面。「這個世界需要奇蹟。」


    「羅娜，我將觸及人們的心。有一天，我將現身，讓全世界的人都能像妳一樣看見我。」天使之后給我一個微笑，雙眼散發著愛，環繞在她四周的明亮光芒，像熊熊烈焰般向外延展，觸碰了我，也帶走所有悲傷。


    我問能否再見到她，答案是肯定的。然後她就消失了。


    我相信有一天這將會發生。天使之后曾經也顯現於人們面前，並且持續出現在世界各地，直到今日。不過目前仍只出現在一小群人前。我相信天使之后終有一天將出現在所有人面前，並且不是短暫逗留，而是停留好一段時間，讓全世界看見她、接受她。她將為魯鈍的人類帶來所需的證據，而這將是人類產生重大改變的開始。


    ## 26 邪靈現身


    人有時候會透過刻意的、惡意的意圖，或因為嫉妒、憤怒等情感，或以為生命對自己不公平等觀感，而讓撒旦進入生命。舉個例子，撒旦往往在發生土地或遺囑糾紛時，入侵到個人心中。撒旦使靈魂變得晦暗的程度不一，能提供個人炫麗奢華的表面生活，卻摧毀周遭人的生活，最後，若是不做任何挽救，也將摧毀主事者的靈魂。


    在靈性上持續成長，重新與上帝和天使們連結，讓上帝的愛和慈悲重回心中，是唯一驅逐撒旦的方法。只要提出請求，天使就會伸手協助。尋求協助的人甚至不需要是本人，家人或朋友都能祈求協助，我看過許多成功的案例。特別記住的是，一個人在生命中遭遇到邪惡之事時，來自任何人、任何信仰或背景的祈禱，都能產生重大的影響與變化。


    人能在不自知的情況下獲得靈性成長，或許是因為某人為他們祈禱，又或許他們還是孩子的時候，曾經請求過，然後在多年後，他們在靈性上覺醒了。


    多年來，許多在某種程度上受到撒旦影響的人曾經來拜訪過我。我能看見撒旦的影響，因為他總是忍不住想炫耀自己的存在。


    有一回，一位事業成功的愛爾蘭商人來找我。他不確定自己為何會來，但他的朋友說服了他，不過他也承認朋友花了兩年時間。他說自己做過一些可惡的事情，從未考慮過自己的舉動會影響到他人。對他而言，世界上只有一個人重要，那就是他自己；世界上只有一樣東西重要，那就是錢。


    不過，他的生命產生了變化。他告訴我朋友不再喜歡他，家人也不願意和他有任何關係。但我知道有人正在為他祈禱，否則他不會來找我。他問我為何自己不會羞愧自責，他知道自己曾經在某處做過錯事，應該要覺得愧疚，可是他不清楚如何才會產生那樣的感覺。他希望有自責感，也想要贏回朋友和家人。


    男人坐在我廚房餐桌旁，雙手交叉在胸前，說他想要改變，不想再這樣下去。他低著頭，但我看見淚水在他的眼眶打轉。接著，撒旦的邪靈出現在我面前。


    男人交叉雙手，身體前傾靠在餐桌上，頭低垂著，但我看見一張扭曲的臉從他的胸部升起，從他存在的最深處浮現，並且把頭轉向側邊。男人靜止不動坐著，彷彿不知道發生的一切。那張扭曲的、邪惡的臉看著我竊笑。這一回，一如我看過的其他人的內在邪靈一樣，邪靈似乎說著：「這回我差點就騙過妳，妳差點就錯過我了！」邪靈原本一直躲著，卻決定在我面前現身。


    基於我無法理解的奇特理由，邪靈總是忍不住要在我面前展現自己。不過，只要他們這麼做，我就知道撒旦再度失敗，而上帝和天使再度獲勝。


    我為男人祈福，為他向上帝祈求，然後給他療癒祈禱文，他把祈禱文放進皮夾。接下來的幾個月，我持續為他祈禱。


    ### 邪靈現身 280


    大約一年後，我接到他的來電，他的生命已經有所改變，事實上，從他離開我家那一刻起就開始變化，只是他不敢承認。他設法補償過去自己曾經傷害過的人，他的生意很順利，而且是以誠實的方式經營。他希望現在感謝我和上帝及天使還不會太遲。我提醒他要經常請求天使協助，而且不論是多麼微不足道的小事，也不要忘記感謝他們。至今我仍然爲他祈禱著。


    有一天，我橫越馬路要去梅努斯購物，耳邊傳來一個聲音：「慢一點，羅娜。」我身邊除了一點光芒，什麼也沒有，但我知道那是米迦勒的聲音。「我們轉進這條小巷子，安靜談一下。」我右轉進入一條小巷子，確定馬路上的人看不見後，便停下來。接著，米迦勒以人類模樣現身（我早已猜到）。確實是人模人樣，只是看起來有點太完美。不過，我看著他的眼睛時，仍然看見那個天使的他。


    「前往梅努斯的路上，妳要慢慢地走過運河橋（Canal Bridge），然後朝運河看去，越遠越好。」


    「有什麼問題嗎？」我問道，「在我過橋前告訴我。」


    「羅娜，」米迦勒說，「有個小寶寶的靈魂，目前妳還沒察覺到，小寶寶已經受精，尚未誕生。過橋時，你們兩人的靈魂將會連結在一起。妳也能感覺到母親的存在，但她對妳來說比較像個鬼魂，非常模糊。」


    我覺得他好像把我當作小孩般說話，彷彿我聽不懂似的。


    「米迦勒，我是個生過孩子的成熟女人。」我回答，「我不知道究竟是怎麼回事，不過我願意接受小靈魂和我連結。你會陪我走到橋邊嗎？」


    「不，羅娜，妳必須自己過去。慢慢走，橋上有另一位天使等著。寶寶在母親的子宮成長之際，那位天使會幫助妳了解並熟悉他的靈魂。照著天使的要求做。每回妳過橋，他將在那裏等妳，陪妳走一段路。妳和寶寶靈魂間的連結未來幾個月會越來越堅韌。」


    我們轉身走出小巷，接近大馬路時，天使米迦勒消失了。我朝運河橋的方向看去，果然有位天使在等我。他非常纖細高挑，模樣優雅，全身雪白，光芒四射。我遵守米迦勒的囑咐，慢慢地走，當腳一踩到橋上，隨即感覺到自己與小靈魂間的連結。


    天使站在橋中央，我走到他身邊站著。他看看我，以充滿愛與溫柔的聲音說：「我是天使阿拉比亞（Arabia）。」天使阿拉比亞碰碰我的手，我轉身朝運河下看去。水面平靜如玻璃，沒有一絲動靜，彷彿一幅畫。我被允許去感覺那位母親，以及她對腹中胎兒的愛。我感受到她的淚水，許多的淚水。站在橋上時，有人經過，對我打了聲招呼，我下意識回覆對方。


    我走過橋，下坡朝鎮上走去。一路上天使始終陪在一旁。人車雜沓，然後我低聲說：「再見，天使阿拉比亞。」


    我繼續去購物，繼續過著母親和妻子該有的日常生活，同時持續為天使工作。


    時光流逝，寶寶在母親的子宮裏不斷成長，我也開始認識這小靈魂，感覺到他正把愛傳'
