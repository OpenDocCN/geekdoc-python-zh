  md: '我走過小木橋，踏上前往老城堡的小徑，然後右轉到一片有許多樹木環繞的草地。我故意走入大橡樹林，這樣喬就看不見我了。我真的很想獨處，也知道他會看著我。

    天使以萊亞現身，他像一道來自樹叢間的光亮，走到草地上，呼喚我的名字。以萊亞向我伸出手，我的雙手也向他的方向舉起，他用雙手包覆了我的手。

