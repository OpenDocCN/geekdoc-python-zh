  md: '期間，我沒有遭遇到什麼困難，也爲此感謝上帝。


    聖誕節後我們決定爲即將問世的寶寶取名。喬說這回不需要挑個男孩的名字，他非常肯定是個女孩。我們決定爲寶寶取名爲露絲。預產期前十天，我開始陣痛，馬上被送往醫院。可是陣痛後來停了一陣子，那時候，爸媽帶著水果來醫院探望我，爸爸說他期待有另一個孫子，喬則告訴他：「這次不會是男孩，你等著看，絕對是個女孩。」


    爸媽要離開醫院時，我也決定和喬到醫院大門口走走。爸媽走在我們前面，外公外婆剛好走入醫院大門。爸媽停下來和他們說話，喬和我也打了聲招呼。我們站在離爸媽不遠處，聽見外婆對父母說：「羅娜真好運，兒子們沒有跟她一樣是智障，或者更慘！不過我們覺得這個寶寶會是個智障。」


    她的守護天使出現在她的身後，眼中充滿淚水，他伸出手來撫摸我，給我力量。可是我非常悲傷，並且看到喬不小心聽見這段話時震驚的模樣。外公外婆對我父母說話時，根本無視於我們的存在。喬摟著我離開。


    「別在意，」喬說，「他們是無知的人。」


    他陪我回到病房，知道他們的想法，使我不禁落下淚來。天使圍繞在病床四周，爲我和喬注入平靜與愛的力量。我請求喬不要對我父母提起無意間聽到那段話的事。


    但那一天最令我傷心的，是爸爸未挺身捍衛我。對於他沒能指責外祖父母的看法，我感到非常難過，儘管我心底明白爲什麼。爸爸知道外祖父母未全然認可他，儘管爸爸已越來越有成就，他們仍然覺得媽媽委屈下嫁了。爸爸深愛著媽媽，但又覺得自己讓她和父母產生嫌'
