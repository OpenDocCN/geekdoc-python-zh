    堂了。」「安妮，妳回到天堂後，將會見到爸爸媽媽，也會知道他們很愛妳。」我說話的同時，安妮伸手觸碰了我。在她的擁抱中，我感覺到她真實的身體。「這就夠了，我只是需要知道在人間有人愛過我。」她說完便轉身和守護天使一起跑出了門。


