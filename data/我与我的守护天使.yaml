    # ## 22 撒旦在門口


    多年前,在湖畔野餐時,天使以萊亞曾經說過,上帝要在撒旦面前測試我。有一天,以萊亞再度來訪,告訴我撒旦就快來到我身邊。


    > 「我感覺得到他越來越接近。」我非常驚恐,也為自己和孩子擔憂。

    「不要害怕,」以萊亞對我說,「證明妳對上帝的信心。」


    自從和以萊亞在湖畔對話後,我一直覺得撒旦向我行來,具體情況不容易說明。想想看,他距離我幾百萬公里時,我就能感覺到他的存在,然後越來越接近,只剩下幾千公里、幾百公里。自從以萊亞說撒旦將走近我身邊,至今已經過了許多年,但我能感受到他持續不斷靠近。如今以萊亞已證實撒旦就快抵達。


    隨著撒旦越來越接近,有天大約正午左右,天使米迦勒、荷賽司和我所有的天使全都出現,在我面前圍成半圓,要幫助我阻擋來自撒旦的巨大邪惡感。接著,天使消失,再也看不見他們。我走回小屋,把前門關上時,心裏知道撒旦已經站在柵門前。我感到非常寒冷,幾乎要凍僵,生命的元氣彷彿正從體內流失。那感覺就像是站在鐵軌上,面對一輛迎面飛快駛來的火車,卻被告知只要有足夠的信心,火車就會在面前及時煞車。我不斷想起以萊亞的'
  - '[PAGE 232]


    話：證明妳對上帝的信心。


    撒旦肯定在柵門前站了好幾個星期，我則持續進入恍惚狀態，迷失在時間之流中。有一


    晚上床睡覺時，我知道他已經來到前門。撒旦的力量強大到難以置信。我召喚天使，可是他


    們沒有回應。喬和孩子們在臥室裏熟睡著，一定是上帝和天使讓他們進入深層睡眠。


