    媽沒什麼反應，但爸爸說：「我們一定到。告訴喬的媽媽我們星期天五點到。」我聽了很開心，問他們要不要喝杯茶，爸爸婉拒了，並說：「上床睡覺去。」我便道了晚安。


    隔天下班後，我搭公車到喬他家，告訴他母親我的父母星期日會過來。她很高興，也有'
