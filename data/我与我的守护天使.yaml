    「羅娜，我們該走了，真的很晚了。」他以一種極安靜的語調說著，彷彿不想吵醒森林裏的生物。

    「我沒注意到時間已經晚了。」我說。

    接過腳踏車後，我們沿著小徑走到馬路上。我覺得自己非常沉靜，距離人類世界和家人相當遙遠。從那一刻起，我感覺到撒旦正朝我走來，他也許要花幾個月，甚至幾年的時間才能來到我面前，但我很肯定，我們即將正面遭遇。'
