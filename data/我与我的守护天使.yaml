  md: '「以莉莎天使，妳為什麼在這裏？我的生命又要有重大變化了嗎？」我問道。

    「是的，羅娜，妳將得到一份新的工作。我要幫助妳媽和一位老朋友重逢，讓妳可以在都柏林一家百貨公司獲得新工作。」她說。

    正當我要詢問她這將在何時發生時，有人敲了廁所門。我大喊：「一會兒就好。」

    以莉莎天使把羽毛指頭舉在嘴脣上，隨即消失無蹤。

    能有新的工作讓我很興奮，雖然這意味我將無法每天和喬見面。但我覺得新工作將讓我從父母身邊獨立，幫助他們看見我也能自己過生活。我在父親羽翼下工作時，他們看不見這一點。

    幾星期後，我在後院餵兔子，媽媽要我跟爸爸請一天假。

    「我們好久沒有一起逛街了，」她說，「我們可以四處逛逛，之後或許在阿納茲百貨公司吃午餐。」「我喜歡這個主意。」我說。

