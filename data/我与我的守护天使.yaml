- md: '賣水果婦人的守護天使就站在她身後，彼此非常相像，連穿著也一樣。那天使充滿光亮，綻放美好的笑容，還對我眨了眨眼。媽媽向那婦人買了些蘋果、梨子和香蕉。當婦人把水果放進棕色紙袋時，她的天使的舉動吸引了我的注意，因為他正在搖動手指頭。


    我察覺到婦人把爛蘋果放進媽媽的購物袋，她的天使正在對她說話，可是婦人聽不見。天使持續搖動指頭，我因為沒法繼續裝個撲克臉，於是笑了出來。婦人用銳利的眼光看了我一眼，從她的眼神中，我知道她明白我看見她的舉動。這時袋子突然裂開，水果掉落一地。婦人趕緊撿拾水果，而且撿到一顆爛蘋果！我知道這並不是巧合，而是她的天使和我的天使讓事情發生，我笑得更厲害了。


