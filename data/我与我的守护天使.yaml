  md: '我們的靈魂伴侶。現在許多年輕人, 或者不太年輕的人會說: 「等我遇見靈魂伴侶後, 就會安頓下來。」這話讓我悲傷, 因爲一旦這樣說, 就會阻礙他們找到一位能帶來無限快樂,
    卻不一定是靈魂伴侶的人。你不需要搜尋那個特定的人, 假使靈魂伴侶注定要在此生和你相遇, 不論那相遇是瞬間的或長久的, 他們都會出現。


    記得有一晚和喬看新聞時, 看到一則發生在英國的火車對撞慘案。那天稍早我已經注意

