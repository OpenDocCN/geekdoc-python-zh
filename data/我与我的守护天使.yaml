    米迦勒以悲傷的神情看著我，握著我的手說：「妳父親需要妳的幫助來穿越死亡。」


    我深呼吸了一口氣。「我愛我爸。」


    米迦勒天使說：「我們走走吧。」他握著我的手散步，一邊繼續說。


    「還記得看見妳爸爸影像的那天，喬帶孩子到運河去嗎？上帝就是在當時把妳父親和妳的靈魂連結在一起。你們的靈魂現在已經相互交纏。幾天內，妳將會看見他從受精那一刻起的每一個生命片段，影像就像電視螢幕般在妳眼前和腦海中不斷播放。當影片停止，妳會突然感受到一股震撼，因爲他的靈魂正與妳的靈魂分離，也同時從他的身體抽離，由天使們領著到上帝身邊。」


    我走在米迦勒身邊，哭得傷心欲絕。'
