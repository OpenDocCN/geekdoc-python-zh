  md: '同，就是不明白我怎麼回事。我生命的這個層面一直很艱難，至今依舊如此。大家說我對世界太信任、太坦率，但我無法不如此！奇怪的是，要對一切真誠，包括所思所言，並對周遭的人坦率，真的是件難事，而且經常會被孤立。

    時至今日，別人怎麼想我、看我，對我仍有極大影響。即使他們不認識我，不了解我在做什麼，還是知道在某種程度上，我就是不一樣。譬如和朋友出門去認識新朋友，就算那些人對我一無所知，事後也說不出個所以然，還是會對我的朋友說，他們覺得我異於常人。要面對這一切並不容易。


    不過，有位天使讓我在學校的日子變得好過許多，他的名字叫做荷賽司（Hosus）。一天清晨，我往學校跑去，想追上原本一起走著的大女孩們，突然間，有個漂亮的天使躲在燈柱後方，對我做了個鬼臉。那天起，荷賽司幾乎每天早上都會出現在我上學途中。至今我仍然經常看見他。


    當時荷賽司看起來像個舊時的老師，現在也沒變。他總是披纏著一件長袍，通常是藍色，偶爾會變換顏色；頭上戴一頂奇形怪狀的帽子，手裏拿著捲軸，眼睛像星星一樣閃閃發亮；外表則像個年輕教授，充滿能量、權威和智慧。荷賽司一直是那個樣兒，不像其他天使經常變換形狀。譬如米迦勒，他通常以人形出現，有時候是受我之請，因為那樣我比較容易適應。不過他也隨著我們所在的場所，以及要傳遞給我的訊息而改變形態。

    對我而言，荷賽司是知識的代表。他外表嚴肅，也可以真的很嚴肅，不過他總能在我低潮時爲我打氣。我在學校受到嘲笑，或大人聚在一起聊天，然後轉身看我的時候，荷賽司會'
  merge: -1
  pgno: 18
- img_proc: true
  md: '安慰我，要我別理那些人：「他們什麼也不知道。」

    一開始我並不知道荷賽司這個天使的名字，他也沒有真的和我談話。他只是出現在教室裡，模仿老師或其他孩子，或玩遊戲、做各種事情來逗我笑。有時回家路上，他會在校門口或對街等我。還記得第一次和他說話那天，姊姊去跳舞，提早離開，所以我獨自回家。我慢慢離開學校，穿越遊樂場，朝大門走去，同時希望能看見荷賽司，和他說話。看見他在柱子旁偷看時，我開心極了。不過他敦促我要加快腳步：「妳得趕在下雨前回到家。」

    我在校門口停下來四處張望，確定四下無人後，詢問他的名字。

    「荷賽司。」他回道。我咯咯笑了，蹦蹦跳跳從學校回到家，他也跟著我邊跳邊走。我只記得自己一路上笑個不停。'
  merge: -1
  pgno: 19
- img_proc: true
  md: '# 02

    守門員


    爸爸靠著修理自行車沒賺到多少錢。事實上，住在那個地區的人都沒什麼錢，大家總是會拜託他幫忙，說「下一次」再付清。爸爸是個好心人，結果我們常常餓肚子，以麵包抹乳瑪林或塗果醬過一餐。我知道爸媽的壓力很大，所以從來沒抱怨過肚子痛，結果出現潰瘍，不得不就醫。醫生告訴爸媽我營養不良，需要每天攝取新鮮蔬果。但是我們實在沒錢，很少有那種機會，只當隔壁擁有大菜園的鄰居送我們蔬果時才有得吃。衣服是仰賴美國親戚寄來的，每有包裹寄達，我們總是覺得非常神奇。我們的生活很艱辛，跟當時許多人一樣。


    爸爸的店鋪是個黑壓壓的小地方，後面有個屋頂用鐵皮搭蓋的工作室，裏面有各式各樣的工作台和工具，充滿了油漬味。爸爸進屋喝茶前有時候會把我喚到工作室，要我幫他拿著裝有潤滑脂的鐵罐，他才好洗手。那東西又黑又黏，味道很難聞，但是效果很好。爸爸手沾油脂，先搓個幾分鐘，再用舊髒布使力把油脂擦掉，最後到廚房裏用冷水洗手（要有熱水，就得拿水壺在火爐上燒水），這樣折騰一番後，他的手就乾淨了。我很喜歡幫爸爸，就算只是幫忙拿著鐵罐也好。偶爾他跟媽媽在後面喝茶時，還會讓我看顧一下店鋪，以防有客人進來。'
  merge: -1
  pgno: 20
- img_proc: true
  md: '老師若是不在座位上，荷賽司偶爾就會跑去坐在他的桌子上。第一次在教室看到荷賽司時，我驚訝得眼睛快掉出來，還大聲問他：「你在這裏做什麼？」老師一聽到，隨即回頭朝我的方向怒視，害我趕緊用手摀住嘴巴，才不會笑出聲來。


    我之所以那麼驚訝，是因為教室裏雖然有守護天使，但荷賽司就是不一樣，他並非守護天使。孩子們的守護天使外表耀眼明亮，就像一道亮光。荷賽司則截然不同，不僅人模人樣，長袍還會掃過桌邊。荷賽司以不同於其他天使的樣貌出現，是爲了幫助我辨認守護天使和特別派遣到我身邊的天使之間的差異。我還是孩子時，就得學習辨別各種類型的天使。


    不同的天使有不同的技能。如同孩子必須學會辨別老師和醫生的差別，我也得學會辨別不同類型的天使，才能知道他們將如何幫助我和其他人。


    荷賽司經常逗我笑。有一回我問他：「你想別人會不會看見我經常笑，但是看不見我在笑什麼，而覺得我很單純？或者以爲我是他們經常說的『智障』？假如他們知道你坐在老師桌上，打扮得跟老師一樣，又會怎麼想呢？」


    荷賽司笑了笑：「他們會尖聲驚叫，衝出去大喊有鬼。」


    「難道他們不知道你是天使？」


    「不，他們無法像妳這樣看待事物。」


    我說過，我一直以爲其他孩子也看得見天使，一樣會跟天使說話，但我到六歲才發現並'
  merge: -1
  pgno: 21
- img_proc: true
  md: '非如此。

    「荷賽司，我知道有些孩子也看得見天使。」

    他回答：「是啊，他們當然看得到，只不過是在很小的時候。等他們長到跟妳一樣年紀，大部分已經看不到天使。有些甚至三歲就看不到我們了。」


    事實上，嬰兒都能看見天使和靈體，但是大約在學說話的年紀，就會被告知什麼是真實、什麼是虛假，或者事物若非像手上的玩具那樣的具體時，就是想像而來的。幼小的孩子於是受到制約，失去觀看和體驗的能力。如今孩子接受教育的年紀越來越早，越來越少人能與天使對話，這也是天使要我寫書的原因之一。其實，我很怕寫這本書，因為我不想被嘲笑，但也知道自己毫無選擇，因為到最後我總會完成天使要我做的事⋯⋯


    世間有千百萬個天使，像雪花一樣多到數不盡，但許多天使都失了業。雖然他們盡全力助人，卻不一定能把訊息傳達出去。想像一下，有幾百萬個待業的天使在天上飛來飛去喲！他們之所以無所事事，是因為大多數人都埋頭工作，只顧過生活，並沒有察覺身旁有天使隨時準備伸出援手。


    上帝希望人類能快樂過生活，所以派天使來幫助我們。有許多靈性的支援等待我們去掌握，有些人能夠伸手求助，但更多人對此一無所知。天使走在我們身邊，訴說他們的存在，可是我們聽不見，也不想聽。我們相信自己萬能，忘記我們擁有靈魂，以爲自己只是血肉之軀，除此之外，什麼也沒有，沒有來生，沒有上帝，也沒有天使。難怪我們會變成唯物主義者，沉溺於自我之中。事實上，人類並非僅是血肉之軀，當你開始察覺到這一點，並且相信'
  merge: -1
  pgno: 22
- img_proc: true
  md: '自己擁有靈魂後，你和天使之間的連結將會綻放開來。

    閱讀這段文字的此刻，不管你信不信，你的身邊有位天使，那是你的守護天使，他從未離開過你。每個人都擁有一份禮物，一層由光的能量形成的防護罩。在我們周遭安置防護罩是天使的工作。對上帝和天使來說，人人平等，不論我們在別人眼中是好是壞，每個人都值得受到保護、照顧和愛。所以當我看著他人，能具體看見環繞在他們周身那一層近乎活躍的防護罩。

    守護天使是身體和靈魂的守門員，你尚未受精成形之前，他就被指派給你了。在母宮裏成長的每一刻，他始終伴著你、保護著你。你一出生，乃至整個成長過程，不論睡覺或洗澡，他無時無刻不在身邊。你沒有一刻是孤獨的。死亡時，守護天使也隨侍在旁，幫助你度過這個階段。守護天使也允許其他天使進入你的生命，協助你進行各種事務，這些我稱爲老師的天使們將在你的生命中來來去去。

    你或許覺得難以置信。若是不相信，要質疑的應該是你的懷疑態度；你若嘲笑此事，則應質疑你的諷刺心態。開啓靈性自我，學習認識自己的靈魂，敞開心胸去接受天使存在的可能性，會有什麼損失呢？現在就請天使協助你，他們是很棒的老師。

    小時候，天使經常在身旁教導我，爲我展現種種事物，讓我很樂意一獨處就好幾個小時。我最喜歡的地方是和姊姊愛美爾共用的小房間，溫暖的小房間有低矮的斜屋頂，窗戶也很低，可以讓我跪坐在窗邊看街上來往的人。我有時能看見鄰人身旁的守護天使，就像有個美麗明亮的人走在他們身邊。有時守護天使似乎飄浮著，有時又像在走路，或者會成爲受守


