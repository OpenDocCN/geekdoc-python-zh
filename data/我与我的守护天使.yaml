  md: '勒、荷賽司、以萊亞和以莉莎立即出現在我面前，他們身後還跟著一群其他天使。我被包圍在他們的愛之中，給我力量與勇氣放手讓爸爸的靈魂離去，不再緊握。

    他們溫柔地說：「妳並不孤單，羅娜，現在到學校去接孩子。」喬那一天不用上班，正在庭院工作。他恰巧走進屋內：「羅娜，妳看起來非常蒼白。」我告訴他沒事，但喬說他要到學校接孩子們，好讓我休息。

    「不，」我說，「我真的很好，我們一起去接孩子。」我既疲憊又傷心，但我記得天使要我去學校接孩子。回家途中，走過梅努斯的大街時，我遇到一個大驚喜，我們遇見了爸爸！

    這是我第一次在梅努斯的街上遇見他，我知道這是天使所為。爸爸穿著我織的那件他最喜歡的粗羊毛衣，戴著那頂掛滿毛鉤的心愛釣魚帽，看起來有些迷失方向的感覺，似乎不知道自己要去哪裏，那模樣比他實際年齡五十六歲還要老。但他看見我們時很開心，我則給了他一個大擁抱。

    爸爸建議我們到附近的茶店坐坐。我坐下來看著他，發現他周圍的光芒幾乎褪盡，只剩下一點點閃光，像是一條由光組成，但又斷了無數處的線。我看見比他高許多的守護天使就站在他身後，支持著他，為他撐起軀體，讓他的身體和靈魂能守在一起。

