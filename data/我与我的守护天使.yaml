    一放開寶寶，我的靈魂彷彿被上帝握住般，被溫柔地領過隧道，回到梅努斯家中，回到躺在沙發上的軀體內。


    靈魂開始緩慢回到身體時，一陣劇痛襲來，我身上每個毛細孔、每個器官、每根骨頭、每塊肌肉都疼痛無比，因為生命正重新傾注到曾經死亡片刻的軀體中。儘管那種疼痛可怕得難以言喻，不知為何，我竟完全發不出聲音，也哭不出來。


    最後，我終於聽見喬的聲音。「羅娜，感謝上帝，妳還活著。我以爲妳死了。」


    我勉強擠出一絲虛弱的笑容。


    我在原地躺了幾個小時，天使抱著我，我也緊握著喬，甚至不肯讓他離開去打電話叫醫'
  - '[PAGE 174]


    生或救護車，因為我心底明白自己會活下去，死亡的時間還未到。我沒有告訴喬自己曾經死亡的事情，他不需要知道，實情只會加深他已有的恐懼。最後，喬還是到公共電話亭打電話給我父母，他們立刻來到家裏看我。


    我請喬對事情經過保持緘默，也只告訴爸媽我整天覺得不舒服，然後便開始流血。喬和爸爸立刻送我到醫院，媽媽則留下來照顧克里斯多夫和歐文。


    到醫院時，我虛弱的模樣使醫護人員非常擔憂，我當然也沒告訴他們稍早的經過。掃描後，他們什麼也沒看見，沒有寶寶活著的跡象。醫生來看我，握著我的手表達遺憾。


    「妳失去孩子了，一定是在還沒到醫院前就發生的事。」


    醫生離開，爸爸獨自走進來，熱淚盈眶對我說：「我很難過妳失去孩子，我知道這個寶寶對妳很重要。」在此之前，我從未見過爸爸為我的事情如此傷心。


    醫生要我住院觀察幾天，我轉移到病房後，喬和爸爸便回家去。幾天之後，醫生爲我進行子宮頸管擴張與內膜刮除手術。


    喬每晚都來看我，一邊擔心我，一邊爲失去孩子感到悲傷。兩星期後，醫生讓我回家，但我仍然非常虛弱，不時躺在床上。我很開心能夠回家，把孩子抱在懷中，親吻他們。


    多年以後，我才告訴喬那天發生的事情，告訴他我在那天曾經死去，走上前往天堂的路，又回來了。我在他生命最後幾個月告訴他此事，藉此安慰他。


