    接下來幾個月，我經常看見小女孩的笑臉出現在我眼前，感受到她的病痛和恐懼。每次我都為她祈禱，請求上帝和她的守護天使幫助她好轉。我知道小女孩病危，而我是她的生命線。不知怎麼的，在精神上，我讓她能夠活下去。只要有需要，我的精神就與她同在，而且不讓她的靈魂離開身體。我感覺到她生理上的疼痛，一如我能感受到其他人的病痛一樣。

