    媽媽非常生氣。我看著她，口齒清晰對她說：「我和喬已經交往好幾個月，而且會繼續

    交往下去。我現在就要去見他。」

    我轉身就要下樓，媽媽立刻緊抓住我的手臂，一邊拉住我，一邊繼續大吼：「妳膽敢跟

