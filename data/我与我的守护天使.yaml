  md: '「我知道，米迦勒，我不會的。」「要記得，羅娜，妳所有的天使都在身邊，一刻不分離，即使當妳看不見或聽不見我們時也一樣。」


    米迦勒手舉到我的眼前又說：「讓我擦掉那些眼淚，不要再哭了！要為妳的父親感到快樂。」


    「米迦勒，」我說，「你離開之前我想問個問題。」「什麼問題，羅娜？」「我看著爸從受精到目前為止的一生，感受他所有的情感和痛苦，看見他所看見的一切，這樣做，是不是在淨化他的靈魂？那是不是我的工作？」「是的。」米迦勒回答。「不要再問了，我必須離開了，羅娜。」


    米迦勒消失的同時，露絲也醒來了。「兩星期，」我對自己說，「時間不多了。」然後深呼吸了一口氣。


    爸爸的生命影像一刻也沒停過。對我來說，那些影像沒完沒了，持續不斷，令人心碎。爸爸每天都來訪，喝杯茶，聊聊天，我則靜靜聽著，臉上帶著笑容。他談的大都是過去的回憶，有時候說說年輕時的生活，有時談著他的父母，或幾年前往生的好友亞瑟梅森。偶爾，他也會說說他和媽媽還沒結婚前的日子。


    日子一天天過去，我越來越痛苦，知道爸爸只剩下幾天就要離開這個世間，讓我非常悲痛。一天下午，接孩子們放學前，我召喚出天使，我在深層的絕望中向他們哭求，天使米迦'
