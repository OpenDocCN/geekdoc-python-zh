    「不,我有話要說。」我說。我轉向第一個年輕人,解釋他的靈視影像和他對成爲神職人員的恐懼有關。我說這一路上他將遭遇許多上帝爲他設置的障礙,但他會一一克服,並且發揮極大的影響力,影響層面不僅止於愛爾蘭,還會擴及世界其他地區。他必須對上帝和自己懷有信心和信念,而且他應該整理行囊,啓程展開這項旅程了。我解釋說,這是天使要我傳遞給他的訊息。


    接著,強尼開始禱告,我們一起唱起聖歌,讚美上帝。我非常喜愛這個時刻。天使說將來我在祈禱會還有很多工作,我則回說我對他們要求的事感到很焦慮。


    祈禱會結束了,吃過茶點後,喬跟我走路回家。喬對於我在祈禱會說話一事,並未多說什麼。


    幾個月後,在梅努斯的另一次祈禱會中,強尼說:「現在讓我們來祈禱,爲有所需要的家人、朋友,和在世界各地需要幫助的人請求療癒的力量。」


    大家開始輪流分享,有人是家人或朋友遭遇到困難,大家爲那些家人、朋友祈禱,希望他們一切安好;也爲女兒能通過考試而祈禱;爲一個亟需的假期而祈禱;爲買車的決定而祈禱。我們也祈禱奇蹟降臨,使世界和平,也爲政府、爲需要幫助的神父、修女和各個慈善團體請求奇蹟。需要請求神蹟的事情相當多。在這段時間裏,天使不斷拍著我的肩膀說:「羅娜,妳知道該說些什麼。」


    我深呼吸了一口氣,開始說:「這裏有個人需要爲她的家人祈禱。她有個兄弟結婚了,卻有酗酒的問題,也對妻女施虐。這個人深愛自己的兄弟,此外,她還有一些司法問題要面'
