  md: '爸爸衝了過來，他非常難過。「羅娜，很對不起，我知道妳並不想讓小鷹飛得更遠，妳還不認爲牠可以飛。」

    「沒關係的，不要緊。」我說。爸爸感到非常悲傷，既難過又愧疚，但我無法安慰他，因爲我不能告訴他事情的真相，這並非他的錯。

    米迦勒說得很清楚：「妳永遠不能告訴他。羅娜，妳是與眾不同的，他只能看見小鷹落到地上的屍體，他無法理解的。妳難道不知道要讓人明白上帝原本的樣貌有多麼困難嗎？」

    我乞求著：「可是我爸那麼痛苦，米迦勒。」

    「妳不能告訴他，」他說，「總有一天，妳可以告訴他妳知道的一些事物，但不是現在。別擔心，小寶貝。」每回米迦勒安慰我，就會叫我「小寶貝」。

    爸爸和我不再討論失去小鷹的事情，但我覺得他有很長一段時間始終耿耿於懷。

    有個星期天，我從老房子出來，沿著馬路朝奶奶家走去，邊走邊微笑，感到自己充滿力量與信心，因爲我知道有個特別的人就在附近。天使告訴我不要一直走在大路上，要穿越草原，我於是爬過柵門，穿越青草高長的草原，朝林子走去，牠撥弄了我的頭髮。

    牠具有一種非凡的存在感，力量強大到無法以物質型態來體現，因此牠出現時，彷彿有股強大的力量環繞著我。牠習慣撥弄我的頭髮，帶來刺刺癢癢的感覺。牠在身邊時，我會覺得自己非常特別，感覺很美好。

    還是個孩子的我不清楚牠是誰，只知道牠屬於完全不同層次的存在。

    「你在這裏！」我開心地說。'
