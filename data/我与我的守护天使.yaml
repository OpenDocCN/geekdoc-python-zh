  md: '救護車抵達，我們費了點力氣說服喬到醫院。最後他答應了，我則搭鄰居的車跟著去。幾小時後，醫生出來告訴我，喬很幸運，因為他到達醫院時已經呈現昏迷狀態。「一定有人守護著他。」醫生轉身離去時這麼說著。我笑了，因為我當然知道有人在守護他，那就是他的守護天使。而且上帝展現了奇蹟，把生命還給他。


