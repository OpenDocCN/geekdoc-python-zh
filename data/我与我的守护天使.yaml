  md: '# 05

    先知以萊亞


    我這一生經歷過許多預言的靈視影像。十歲的某一天，我在草原上沿著河岸走，天使對我說：「我們要在前面會見以萊亞。」


    「誰是以萊亞？」我問道，一邊發笑，之前我從未聽過這個名字，覺得它的發音真好聽。天使卻沒有笑。


    「以萊亞要為妳呈現一些事物，羅娜。妳一定要努力記住，因為這是妳未來的一部分。」


    一位天使從河對岸越過河面朝我走過來。他的模樣很難形容，一身鏽紅，宛如帶著微紅的琥珀色，散發著光芒，真是美麗極了。他穿著垂掛的長袍，袖子蓋過了手，當他舉起手，臂，長長的袖子又會優雅地回捲起來，彷彿袖子也是他身體的一部分。此外，他的臉龐似乎也呈現相同的琥珀紅。


    以萊亞走過河面的景象非常迷人，他朝著我走來，雙腳不曾觸碰到水面。


    「我也可以走在水面上嗎？」他只是對著我笑。


    河岸崎嶇不平，到處是隆起的草堆。以萊亞請我坐下，自己也在我身旁坐下，臉上帶著微笑。「很高興看到妳在見到我時並不緊張。」'
  merge: -1
