  md: '以相當隱微的方式來影響我們，譬如讓我們從應該進行的任務上分心。我知道這是為何在喬生病時，我們只能得到極少援助的原因之一，人們被邪惡的力量蒙蔽，無法看清眼前的真實情況。


    我不斷與邪惡對抗。當一個人信心堅強時，邪惡會讓一切變得更加困難，取得一時的成功。但我知道不論撒旦的邪惡力量多麼努力阻撓，上帝和天使終將獲得勝利。


    夏恩無法相信他未能幫助我們獲得協助。雖然他獲准送來食物兌換券，可是當他發現因為特殊的飲食需求，兌換券對我們毫無幫助時，非常懊惱。夏恩記錄了喬的詳細飲食清單，以及克里斯多夫可以吃的東西，之後就經常送來小袋食物。我相信這些費用完全出自他的荷包。


    隨著時間流逝，越來越多人聽說我，並前來尋求協助。


    有位女士在這時候來找我，當時她已經是位祖母，但年紀其實不大。她的名字叫做瑪麗。大約十年前，她的一位鄰居生下一對雙胞胎，但其中一個寶寶不久夭折。瑪麗告訴我，那位母親懷孕時，雖然她和對方不太熟悉，也非親戚，卻被她的寶寶深深吸引。她第一次見到躺在搖籃裏的喬西時，還沒伸手觸摸寶寶的小臉蛋，已經感受到兩人之間的連結。她完全不知道為什麼。


    許多人都聽過「靈魂伴侶」的說法，經常以爲那和愛情有關係，彷彿對方是完美的伴'
  merge: -1
