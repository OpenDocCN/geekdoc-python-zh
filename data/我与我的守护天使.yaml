  md: '有一天，坐在河邊時，我目睹天使完美示範了對我們的愛。有位母親帶著約一歲半的幼兒來到河邊，她雙手抱著孩子的腰，想讓孩子學會在水中站穩，孩子興奮地感受河水流過雙腳的感覺。偶爾母親會放開雙手，看孩子能否自己站穩不跌倒。我看見孩子的守護天使在水中坐在孩子下面。孩子的腿開始抖動，隨即摔入水裏，媽媽來不及抱住孩子，但天使抱住了他！孩子跌入水裏時，直接跌坐在天使的腿上，他不但沒有哭，還潑起水，開心笑了起來。


    我也跟著笑了。喬問我：「什麼事讓妳笑得這樣開心？」


    我笑而不答，再一次放棄讓喬知道一些我看見的事物。他是我生命中唯一可以分享一切的人，但我卻不敢告訴他關於天使的事，就怕他以爲我精神異常。


    > 「我們順著河岸走遠點吧。」喬說。


    他起身走在我前面。一位天使在我耳邊細語，告訴我天使如何幫助我們在生命中運作一切。每一步路、每一口氣、每句話、每聲嘻笑，他們幫助我們運作人體生理上的一舉一動，也幫助我們釐清腦海中的困擾和疑惑。他們不停對我們說話，在腦海和思緒裏給我們答案，但多數人忙到無法停下思緒來傾聽。這時我聽見喬喊著「快來」，就跑去追上他。


    走在賽爾布里齊的河邊時，我們認識了一對老夫妻約翰和瑪麗，他們經常帶著可愛的雜種狗托比散步。他們一輩子住在賽爾布里齊，才剛歡度結婚三十週年慶，孩子們已長大離家，現在很珍惜和彼此相處的時間。


    有一晚我們遇見他們，便停下腳步聊天。在道別前，約翰淘氣地問喬：「你什麼時候要跟小姐求婚啊？」'
