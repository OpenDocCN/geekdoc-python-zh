    「媽，妳覺得我週末出去有關係嗎？我真的很期待可以去，但也很擔心爸的狀況。」「去吧，度過一個愉快的週末。」我說，「不用跟妳爸說要出門，那只會讓他擔心、困惑。」「


    那天我們過得很開心。不過我很擔心喬，不斷停下來打電話回家，確定一切沒問題。幸好電話就在他的床邊。


    我們外出時，發生了一件美好的事情。當時四歲的梅根，那天又跟平常一樣跑去找她爸爸說話。她習慣坐到床上窩在喬身邊，聽他讀書，或者坐在一旁的地上畫圖。那一天她告訴喬「來跟我玩」，用的是還沒出生前在他面前現身時所說的話。她非常堅持喬來推鞦韆。喬不知從哪兒來的能量——只有上帝和天使才辦得到——起床，換衣服（他已經好幾星期不曾這麼做），到外面去幫梅根推鞦韆。克里斯多夫看著他們兩人，不敢相信自己的眼睛。梅根和喬開心笑著，整整盪了十分鐘的鞦韆，之後喬又回到床上。


    回到梅努斯後，我到吉姆肉鋪去取豬排，正要付錢時，吉姆卻說：「這是招待的！告訴喬我問候他。」我謝過他後，便和露絲趕回家。


    那晚小屋裏擠滿了天使。前廳裏火爐燃著火，我一邊烹調豬排、馬鈴薯、蔬菜和肉汁，'
