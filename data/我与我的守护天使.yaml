  md: '傳教士。我沒再多問，媽媽也沒多說。

    稍後，我帶著孩子們坐公車回到梅努斯。我在廚房裏一邊洗碗，一邊注意在飯廳地板上玩玩具的克里斯多夫，歐文則在毯子上睡著了。我腦海裏想著一家受邀到都柏林參加祈禱會的事情，這時廚房的門發出一聲輕微的嘎吱聲，門開了，我立刻知道那是天使米迦勒。

    天使通常不會介入世間的物質事物，但不知爲何，他們卻經常幫助我，通常是一些小事，譬如米迦勒會幫我抬起重物，或荷賽司幫忙吹乾晾曬的衣物。我也聽過一些故事，知道天使可以在特殊狀況下有實質的介入。有位女士說她曾經無法轉動門的鑰匙，但屋內的老母親需要她的協助。她試了好一段時間始終無法開啓，緊張絕望之際，向上帝祈禱，請求天使的幫助。突然間，她碰也沒碰，門就開啓了。我們稱之爲奇蹟，那是無法解釋、但也明白自己無法辦到卻實際發生的事情。這種現象很罕見，不過，一個人在靈性上越投入，越常請求天使的協助，奇蹟發生的機率越高。


    「是你嗎，米迦勒？」我沒有將視線轉離水槽。他走進廚房，觸碰我的肩膀。

    「羅娜，妳召喚了我！」米迦勒天使說。

    「我不知道我召喚了你，米迦勒。」

    「羅娜，妳還沒察覺。不過，很久以來，妳想要我們來時，並不曾需要呼喚我們的名字。

    上帝所有的天使隨時在妳身旁。」

    「米迦勒天使，那你又是如何知道我呼喚的是你？」我問道。

    「羅娜，妳的心緒和靈魂相互連結。」米迦勒解釋，「靈魂早在意識之前，已知道妳人性'
  merge: -1
  pgno: 167
