- md: '我給尼克一個擁抱，跟他說：「讓我為你祈禱，請上帝保佑你。我會請上帝和天使告訴我該如何跟你的父母說明，並請求他們的守護天使在時機成熟時，幫助他們放手讓你到天堂去。」


    我們一起祈禱，我為尼克請求上帝保佑，然後到外面車旁，請他的父母德蒙和蘇珊進屋。小狗海蒂生了寶寶，尼克開心地和露絲在庭院裏的樹下和小狗玩耍。看著他們，我不禁笑了。尼克要父母別管他，他們大驚小怪了一番。尼克說他想玩耍，要父母到屋裏聽聽他的守護天使有什麼話說。


    走進廚房，蘇珊露出憂慮的表情。我們坐在餐桌旁，我盡可能以最溫和的方式，說出他們兒子所說的話，提到尼克的守護天使再過不久就要帶他到天堂。我請他們為了兒子堅強起來，傾聽他的話，而且從現在開始，盡可能和他在一起。他們兩人相擁，嗚咽啜泣。那是一幅令人心碎的畫面。


    最後，這對父母親說話了。他們過去幾個月來，一直聽著尼克提及守護天使要帶他到天堂的事情，可是他們實在很難承受這個消息。他們覺得很慚愧，得讓尼克請求我來讓他們傾聽。我擁抱他們，為他們祝福後，他們便離開了。


    幾天之後，露絲走進廚房問道：「媽，妳記得那天跟我在庭院玩的男孩嗎？我喜歡他，他是個很好的男生。他叫什麼名字？」


    「尼克。」我回答。


    「我知道他生病了，媽。他會好轉嗎？」


    「不會，他要到天堂去了。」我告訴她。


    女兒熱淚盈眶說：「不公平！他是個很棒的男生！」


    我緊緊抱住女兒好一段時間後，她說：「我沒事了，媽。」就回去做功課。


    幾個月後，尼克病情加重，不斷進出醫院。我三不五時接到他父母的電話，說尼克請我幫忙消除痛苦。痛苦總會消失，我感謝上帝賜予的奇蹟。可是有一天，蘇珊來電，告訴我尼克前一晚平靜離去了。我告訴他的母親，要永遠記得尼克在天堂是個美麗的靈魂，只要她需要，兒子就會來到她身旁。


    要描述尼克對父母和兄弟姊妹的影響，並不容易。他們失去了一個兒子和兄弟，然而，這一家人又似乎被他的疾病和死亡所喚醒。尼克為他們展現無盡的愛和悲憫之心，彷彿是上帝透過這孩子，將愛照耀在他們身上。他相當與眾不同，就像個天使，為所有與他接觸的人散發光芒。在兒童醫院裏常能遇見重病的孩子，他們雖然病重，卻依然快樂，而且充滿愛，很少呈現悲痛或怨恨的情緒，彷彿來世間的目的就是要為我們展現光芒。孩子們的智慧總是讓我驚嘆。那些重病的兒童，就算只有四歲，也往往具有靈性，非常成熟，而且能不帶情緒就事論事，實在非常美麗，令人著迷。


    關於孩子們，還有一事值得一提。他們年紀還很小時，在靈性上就非常開放。畢竟他們才剛從天堂來到人間。許多孩子能看見天使，雖然不久之後大都會忘記此事。許多孩子也常看見靈體，尤其是前來保護他們的祖父母或親戚的靈體。我經常遇見年紀很小的幼童會說出類似「爺爺來跟我玩」的話。我也聽過父母親描述和孩子瀏覽家族照片時，孩子會說他認識某位在他出世前已經死去的往生者。那孩子或許有些訊息要傳遞給父母。


    孩子們是智慧的泉源，具有來自其他世界的智慧，我們應該經常傾聽他們的話語。


    來找我的人越來越多。這時候，喬的健康狀況每況愈下，幾乎足不出戶，有人來訪，就會躲起來。他是個自尊心很強的人，不想讓人知道他病了。來拜訪我的人不知道他生病，也不知道我的生命狀況，或者我要面對一位重病的丈夫，更不知道天使說他無法長久陪在我身邊時，我所要面對的困難。


    有位女士來拜訪我，希望天使能介入她的生活。那是一位醫學院的學生瑪麗安，她說自己壓力很大，無法應付考試。「我聽說妳能和天使對話。我相信上帝，我有信心，我也相信天使，但我現在真的非常需要幫忙，因為我面對的壓力極大，我怕自己會崩潰。」


    瑪麗安正在習醫，即將完成學業，但她極度害怕期末考失敗。她渴望成為一名醫生，而且知道自己會是個好醫生，但覺得養成過程非常難熬。我告訴她，她的信心與信念已經幫助她度過困難時期，上帝已經派遣天使來給她力量，幫助她突破困境。我們向上帝和天使祈禱，請他們派遣天使來教導她通過考試，引導她成為一位具有靈性、愛與關懷的醫生。


    我們都有守護天使隨侍在旁。身為你靈魂的守門員，守護天使可以允許其他天使來到你的生命中，幫助你面對各種困難。我稱這些天使為老師，他們來去頻繁，也跟守護天使不同。我們請求一群天使來擔任她的老師。在祈禱當下，我已經看見三位天使朝她大步走來，只是尚未抵達。


    「他們都是男性，」我說，「其中沒有女性，希望妳不介意。」


    瑪麗安寬慰得又笑又哭，請我拜託上帝讓天使在她離開我之前趕快抵達，因為她真的很需要他們。我為她祈求，請求上帝給她所需的信心、勇氣和能力。我也請求上帝給她希望，因為她需要在自己的生命中看見希望。我為她祈禱完之後，也詢問了被派遣來協助她的天使們的名字，被告知她可以稱他們為「三顆星」。天使們已經抵達，正在門外等著她走進全新的世界。


    最近，也就是她來找我的多年後，我接到瑪麗安的來電，她現在已是一名醫生，在海外工作，幫助許多人。她打電話給我，因為她想要感謝天使們。「我必須打電話給妳，請妳幫我謝謝他們，因為我覺得這樣做，訊息較能早點到達。」


    我忍不住笑了，告訴她透過這通電話，感謝之意已經傳達。我提醒她不要忘記在需要的時候，呼喚她的三位天使。「他們仍然在妳身邊，沒有離開。妳還有很長的路要走，很多工作要做。」


    瑪麗安有足夠的信念來尋求天使的幫助，她賦予天使們力量，相對的，天使們也賦予她力量。


    大部分時候是別人來找我，但是偶爾在特殊情況下，我會受託前往家中。通常若是這種情況，會有人來接我，開車送我去。有一天，我被帶到一棟老舊的大房子，探望一個重病的三歲小孩，他非常虛弱，幾乎無法呼吸，根本下不了床。


    屋裏有個老人，我以爲他是家庭的一員，直到他對我竊笑，才察覺到他是個鬼魂，一個靈體。他把自己的光調得很暗，所以看起來像個活生生的人。他知道自己讓我吃了一驚，沾沾自喜。


    看過孩子後，我跟孩子的祖母喝茶，她提到孫子跟她自己的祖父很相似，這位祖父在幾代前也住過這棟房子。她一連說了幾次相同的話。基於某些我無法理解的原因，祖母不斷提及孫子和她的祖父相似的言語，正是造成靈體滯留不前的原因。這個靈體是病童的曾曾祖父。


    我知道靈體對這個家庭並不健康，他帶有某種惡意的力量，他的存在就算不是唯一的原因，也是孩子生病的原因之一。停留在那棟屋子的期間，我不斷看著靈體，祈禱他能被愛和天使圍繞，幫助他起程前往天堂，讓小男孩擁有平靜的生活。


    幾星期後，我再度受邀去探望小男孩。孩子已經痊癒，充滿能量，於是我知道靈體已經離去。


    我很驚訝的是，房子看起來完全不同。幾星期前來拜訪時，房子又潮又暗，並不乾淨，有一座老舊的大樓梯，客廳裏還有一個華麗但骯髒的壁爐。如今我看見的卻是一棟修繕良好，而且沒有壁爐的老房子。


    我問老奶奶：「壁爐到哪裏去了？」


    她不解地看著我說，我上次來訪到現在，房子完全沒有改變過。不過對我來說，這裏改變過了。因為我不僅看到她祖父的靈體，也看見房子本身的鬼魂，也就是靈體很久以前還住在這裏時房子的模樣。


    ## 23

    ### 靈魂伴侶


    喬仍然無法工作，不過至少能在家照顧孩子，所以我偶爾可以找一份短期工作。我曾刷過學校的地板，也到鞋店工作過，只是在當時，我可以做的工作實在不多。


    克里斯多夫的消化道問題，使得家裏財務狀況更加吃緊，喬也需要特殊食品。我必須非常努力才能用極有限的錢餵飽全家，而且也只能算是餬口而已。現在女兒露絲常提到以前她唯一能吃到肉的時候，就是啃爸爸盤子裏的骨頭，每回想到就想笑。


    有些時候，喬的糖尿病獲得控制，身體狀況好一點，便能找些零工來做。有一回他去擔任駕駛教練，不過這個工作讓我很焦慮，擔心他的病情惡化。他狀況佳而能工作時，總是很開心，只是這種時候多半持續不久。


    我們在庭院裏養雞，喬經常到鎮上咖啡店去討剩下的麵包來餵雞。他沒有跟店家說明這些麵包也能幫他養活老婆和小孩，但也確實如此。我們會在他帶回來的袋子裏翻找還可以吃的麵包，把發霉的部分切掉。有時候，袋子裏會有一塊完美的奶油蛋糕或一條新鮮麵包。我始終相信是餐廳老闆猜到事情的真相，特地放進去的。


    有一度，我們積欠小屋貸款，快要失去房子。我只好前往社會福利部門，看看是否提供現有殘疾補助以外的協助。喬跟我一起去。然而儘管喬病得相當嚴重，對方卻不肯相信我們的困難，甚至質疑喬是否真的生病，儘管有醫生證明，他們依然認為喬如果真心想工作，還是沒有問題。喬往生後，在社會福利部工作的女士曾為此向我道歉。


    絕望中，只好把一部分庭院劃分出來變賣求現。回想起來，我當時太急切想使喬過得舒適些，因此售價遠比實際價值便宜太多。不過，這個舉動讓我能夠還掉一些債務。


    當人不得不向他人乞求時，往往會失去自尊，但是如果全家生計維繫在你身上，卻又別無選擇。喬的病症之一是他始終很冷，即使在夏天也一樣顫抖不停。我再度到社會福利部申請補助，想幫他買保暖內衣。他們還是認為喬沒什麼病，拒絕協助。最令我沮喪難過的是，有許多家庭都獲得了財務補助。我認為我們住的屋子小歸小，卻是自購而非議會住宅的事實，影響到他們的觀感。此外，由於喬的自尊心強，因此前往求助時，仍然努力讓自己看起來很健康且值得尊敬，這也是原因之一。


    天使不斷要我求助地區慈善機構，我強烈抗拒，因為我已厭倦沒有尊嚴的日子。他們怎麼可能相信社福機構無法接受的事情呢？但最後情況已經相當絕望，我只好打電話約他們見面。


    我到慈善機構解釋我們的情況，他們派人來訪視小屋，檢視一切。那人在小屋四周慢慢巡視，打開每個櫥櫃，檢查所有東西。最後他轉身對我說：「你家若還有一袋馬鈴薯和一罐豆子，就不會挨餓。你們不需要我們的協助。」


    我設法解釋腹腔疾病的特殊飲食需求，克里斯多夫需要特殊飲食才能成長，否則有可能造成永久性的發展遲緩（事實上，七歲的他只有十五公斤重，但正常小孩至少有二十五公斤）。我也解釋喬的疾病讓他無法消化許多食物。但那人的根本不願意聽，執意相信自己是對的。


    最後，慈善單位只給我們極微小的協助，但多半是無益的支援。他們送我們特定食物的免費兌換券，但往往是克里斯多夫和喬不能吃的東西。有個聖誕節，我們拿到一張火雞兌換券，非常開心，但是去兌換時的羞辱經驗，卻讓所有美好的感覺消失無蹤。委員叫著名字，等人們上前領取火雞。他們叫到我的名字時，卻說：「喔，是妳啊……」我覺得他們一直在談論我，認為我投機取巧，從真正需要的人口口中搶奪食物。他們根本一無所知！


    有一天，我巧遇多年前在梅努斯祈禱會認識的夏恩。由於喬的身體禁不起奔波，所以我們很久沒有出席。但是我很想念祈禱會，想念共同祈禱的經驗，也想念在那裏認識的夥伴。事實上，在這段時間，我極少出門，除了購物、接小孩放學、打幾小時零工之外，哪裏也沒去。喬的身體狀況很難預測，所以我不敢留他單獨一人太久。


    這時的夏恩是地區慈善機構委員會的一員，巧遇後不久，他說想來家裏喝杯茶。在廚房喝茶時，我告訴他實情。我只對他一人清楚說明我們的財務實際上到底有多困窘。夏恩非常震驚，並且承諾會為我們向慈善機構爭取更多協助。


    但這並不容易。夏恩向委員會提出我們的案例時，他們強烈反對提供協助，最後還是拒絕他的請求。我知道這是惡魔所為。撒旦有時候在我們步上該走的道路時，讓我們遭遇重重困難；有時候，邪惡力量讓我們在生命路程中受挫，使生命比應有的際遇更爲艱困；又或者以相當隱微的方式來影響我們，譬如讓我們從應該進行的任務上分心。我知道這是為何在喬生病時，我們只能得到極少援助的原因之一，人們被邪惡的力量蒙蔽，無法看清眼前的真實情況。


    我不斷與邪惡對抗。當一個人信心堅強時，邪惡會讓一切變得更加困難，取得一時的成功。但我知道不論撒旦的邪惡力量多麼努力阻撓，上帝和天使終將獲得勝利。


    夏恩無法相信他未能幫助我們獲得協助。雖然他獲准送來食物兌換券，可是當他發現因為特殊的飲食需求，兌換券對我們毫無幫助時，非常懊惱。夏恩記錄了喬的詳細飲食清單，以及克里斯多夫可以吃的東西，之後就經常送來小袋食物。我相信這些費用完全出自他的荷包。


    隨著時間流逝，越來越多人聽說我，並前來尋求協助。


    有位女士在這時候來找我，當時她已經是位祖母，但年紀其實不大。她的名字叫做瑪麗。大約十年前，她的一位鄰居生下一對雙胞胎，但其中一個寶寶不久夭折。瑪麗告訴我，那位母親懷孕時，雖然她和對方不太熟悉，也非親戚，卻被她的寶寶深深吸引。她第一次見到躺在搖籃裏的喬西時，還沒伸手觸摸寶寶的小臉蛋，已經感受到兩人之間的連結。她完全不知道為什麼。


    許多人都聽過「靈魂伴侶」的說法，經常以爲那和愛情有關係，彷彿對方是完美的伴侶,或許也是結婚的對象。但我們必須記得,靈魂伴侶可能是個成人,也可能是個孩子。人四處尋找自己的靈魂伴侶,而對方或許存在於世界的另一端,需要你送幾塊錢幫助他。他也可能坐在輪椅上,或者是你在街上擦身而過的那個患有唐氏症的孩子。任何人都可能是你的靈魂伴侶。


    喬西成長期間,瑪麗一直和她保持很親近的關係。那孩子生病或遇上麻煩,瑪麗總是本能就知道。喬西也是如此,有時候,她會告訴母親要去見瑪麗,媽媽若問為什麼,喬西總是同樣回答:「我知道瑪麗需要我。」媽媽並不一定會允許她去看瑪麗,因為有時候天色太晚,或者正在下大雨。但喬西總是不斷請求,直到母親答應爲止。喬西來到瑪麗家大門前,敲門喊著:「瑪麗,妳怎麼了?」而瑪麗總是看著小女孩,心底想著:「天啊,她竟然知道我今天很悲傷!」


    她們是靈魂伴侶,儘管年紀不同,性別相同,仍然是一對靈魂伴侶。靈魂伴侶彼此之間有非常特殊的連結,能夠知道對方此時此刻的感覺。


    如今瑪麗已經過世,往生前她曾經對我說:「喬西是我的靈魂伴侶,而我早知道我先生不是。」這是她在生命尾聲體會到的結論。


    日後我也認識了喬西。瑪麗的死對喬西造成很大的影響,她覺得心被挖走一大塊。


    喬西也可能在今生遇見另一個靈魂伴侶,人的一生可能擁有多位靈魂伴侶,但有時候會因為無法認出對方而錯過了,那是因爲我們太忙碌。不過這不表示對方認不出我們。


    我們也必須了解,我們能對某些人付出愛與生命,並且珍惜對方,卻不表示對方一定是我們的靈魂伴侶。現在許多年輕人, 或者不太年輕的人會說: 「等我遇見靈魂伴侶後,
    就會安頓下來。」這話讓我悲傷, 因爲一旦這樣說, 就會阻礙他們找到一位能帶來無限快樂, 卻不一定是靈魂伴侶的人。你不需要搜尋那個特定的人, 假使靈魂伴侶注定要在此生和你相遇,
    不論那相遇是瞬間的或長久的, 他們都會出現。


    記得有一晚和喬看新聞時, 看到一則發生在英國的火車對撞慘案。那天稍早我已經注意到報紙上的照片, 但避開了它。然而, 我知道那裏面有我必須知道的消息。我早該了解如果上帝和天使要我看見,
    我是避不開的。


    影片上有個男人躺在擔架上, 周圍全是救難人員。我不認識那男人, 只知道他是火車對撞災難的生還者, 但我也知道, 不論他是誰, 他才剛在火車上與他的靈魂伴侶相遇,
    而對方已經往生。我之所以知道, 是因為我看見兩人間的接觸。他躺在擔架上被抬起時, 我看見他向上伸出手, 知道他能看見靈魂伴侶的靈魂正在安慰他, 確保他能活下來。我看不見那靈魂伴侶的性別,
    不知道他是男是女、是老是少, 但我知道那是他的靈魂伴侶, 而且他們的相遇非常短暫。


    我記得自己非常難過, 心想：「天啊, 我討厭看到這種場景。」不過, 討厭是錯誤的字眼。我在觀看的同时, 感受到強烈的痛苦, 也非常同情躺在擔架上的男人所感受到的痛苦和失落。他伸出手時,
    曾短暫看見靈魂伴侶。不知道他是否會記得自己曾經與靈魂伴侶相遇。有時候, 靈魂事件發生在我們處於痛苦和震驚狀態時, 在那之後, 我們不禁猜疑, 事件真的發生過嗎？我們真的看見了什麼,
    或者那不過是一道閃光？


    大約在同一時期，我逐漸察覺到自己和一位謀殺妻子的男人之間的連結。不管到哪裏去，或做什麼事，連結總以某種方式出現在我面前。或許打開收音機，就會聽到謀殺案的消息；走在路上，就會看到報紙，而且是一張路過時掉落在地上的報紙。那則報導特別顯眼，彷彿要從報紙上跳出來似的，而我在報紙上，就只能看見恐怖的謀殺案。夜間新聞開始時，我想關掉電視，卻沒辦法！天使對我說：「羅娜，坐下來看這則報導。」


    我遲疑著，最後照做。新聞報導男人被判有罪，因為他以冷酷的預謀方式謀殺妻子。天使還讓我看見他對自己靈魂所做的事。他將自己的人性和靈魂分離，讓靈魂無法介入他的計畫之中，他的心因此變得寒冷如冰。這並不容易解釋，但男人把自己的靈魂推開，遠離了自己，並且用一條剪不斷的鍊子把靈魂拴住，像是拴在一面牆上那般。有時候，我們會因為想让贪婪主宰自己的生命，而对灵魂做出这类事情，自己也因此变得迷恋物质世界。男人灵魂的遭遇并非邪恶力量或他人所为，而是他自己所作所为。可以说，他变成了冷酷的人。


    这是他当时所处的状态。他被遣送到监牢的途中，我看见了他的灵魂。这并不表示他将来不会感到悔恨，也不表示他的灵魂能够脱离部分的枷锁。他永远无法使女孩复活，那个遭他谋杀的年轻妻子，他将在人道上为其所作所为付出代价。不过，最悲惨的是他对自己灵魂做出的事情。当他的灵魂挣脱枷锁（如果他允许的话），他将经历无比痛苦的折磨。他会设法逃避这些感受，但终将崩溃，而且感受到更深层可怕的痛苦。


    男人为了贪婪，蓄意出手谋杀他人，计划夺取别人体内的灵魂。他在时机未到之前，夺取他人的靈魂（我知道有人會說，你若遭到謀殺，那是因為你的時間已到，或者是前世作為帶來的復仇，但這並非定律），自己的靈魂同時也感到巨大的疼痛與傷害，因為他的靈魂無法阻止他進行如此駭人聽聞的舉動。


    遭到謀殺的年輕妻子的靈魂，因為知道男人的靈魂陷於囹圄，而感到悲傷，原諒了他。


    靈魂永遠會寬恕他人，永不放棄，就像天使一般。我們的靈魂永遠不會放棄彼此。


    ## 24

    ### 和平的愛爾蘭與聖誕節


    一天早上，喬看電視新聞時，喊我快點過去。電視上出現都柏林的那家當鋪。我簡直不敢相信耳朵所聞：那家當鋪週末遭人侵入，所有東西被一掃而空，竊案星期一早上才被發現。警察還未查到嫌犯，但肯定是件預謀的竊盜案。


    我回頭望著喬說：「那表示我的戒指也沒了。我美麗的戒指！」我哭得非常傷心，喬把我抱在懷裏。「再也不能用它來度過難關，太不公平了。」我說。


    沒了戒指，我感到很失落。老實說，它在當鋪的時間遠比戴在我手指上的時間多，儘管如此，那只戒指對我仍然意義深遠。我很期待警察能找回戒指，但是日子一天天過去，希望似乎越來越渺茫。


    幾星期後，我們收到當鋪寄來的一封信，喬至少念了四遍給我聽。信上知會我們：基於我們留下戒指時在當鋪所簽的收據，他們得以避免賠償責任。也就是戒指在他們手上遭竊一事，他們無須負責。這簡直把我們的心給掏空了，戒指沒了，也沒有遺失的賠償金。


    喬承諾有一天再爲我買只戒指，但我告訴他那不重要，因爲沒有其他戒指比得上那只戒指對我的意義。喬給了我一個擁抱，把那封信擺一邊。


    幾天後,我坐在小屋門檻上,天使米迦勒出現,看起來像是從小屋後方走來的。「我現在不想說話。」我對他說。米迦勒天使把手放在我的肩上說:「羅娜,戒指的事我感到很遺憾。我們無能為力。」我轉身面向米迦勒,他光芒四射的模樣讓我露出了些許微笑。


    「米迦勒,我只是希望你們能做些什麼。喬也很傷心,覺得自己讓我失望。幾天前他說,如果他能夠好好養家,戒指就不會流落到當鋪去。」


    「羅娜,要記得那不過是只戒指,是物質的東西。」米迦勒說,「只要記得喬的愛就夠了。」米迦勒的話讓我沉思了好一會兒,當然,他說的一點也沒錯。我覺得好多了。我轉身對米迦勒笑了笑,接著他消失不見。在那之後,我不再將戒指的事放在心上。


    我對政治不感興趣,但很在乎和平。這時是一九九○年代中期,許多與北愛爾蘭建立和平關係的言論正在蔓延。有一回,米迦勒天使和我坐在一起,我問了他關於北愛爾蘭的事情。他說有人會設法阻礙和談過程。儘管破壞者成功的機率很低,但和平仍然要很久以後才會到來。我們還需要約二十年時間,才能釐清一切。


    從那時候起,我就不斷觀察著。最近我注意到有些人變得更加開放與寬容,也被迫收回過去的立場,朝和平方向前進。米迦勒告訴我北愛爾蘭的和平不僅對愛爾蘭和大英帝國非常重要,也能為其他國家的恐怖組織帶來示範,顯示除了暴力之外,還有其他途徑能取得和平。我被告知愛爾蘭可以成爲世界和平的關鍵,雖然邪惡力量不斷想移除這個關鍵,但情勢'
  mdcn: '我給尼克一個擁抱，跟他說：「讓我為你祈禱，請上帝保佑你。我會請上帝和天使告訴我該如何跟你的父母說明，並請求他們的守護天使在時機成熟時，幫助他們放手讓你到天堂去。」


    我們一起祈禱，我為尼克請求上帝保佑，然後到外面車旁，請他的父母德蒙和蘇珊進屋。小狗海蒂生了寶寶，尼克開心地和露絲在庭院裏的樹下和小狗玩耍。看著他們，我不禁笑了。尼克要父母別管他，他們大驚小怪了一番。尼克說他想玩耍，要父母到屋裏聽聽他的守護天使有什麼話說。


    走進廚房，蘇珊露出憂慮的表情。我們坐在餐桌旁，我盡可能以最溫和的方式，說出他們兒子所說的話，提到尼克的守護天使再過不久就要帶他到天堂。我請他們為了兒子堅強起來，傾聽他的話，而且從現在開始，盡可能和他在一起。他們兩人相擁，嗚咽啜泣。那是一幅令人心碎的畫面。


    最後，這對父母親說話了。他們過去幾個月來，一直聽著尼克提及守護天使要帶他到天堂的事情，可是他們實在很難承受這個消息。他們覺得很慚愧，得讓尼克請求我來讓他們傾聽。我擁抱他們，為他們祝福後，他們便離開了。


    幾天之後，露絲走進廚房問道：「媽，妳記得那天跟我在庭院玩的男孩嗎？我喜歡他，他是個很好的男生。他叫什麼名字？」


    「尼克。」我回答。


    「我知道他生病了，媽。他會好轉嗎？」


    「不會，他要到天堂去了。」我告訴她。


    女兒熱淚盈眶說：「不公平！他是個很棒的男生！」


    我緊緊抱住女兒好一段時間後，她說：「我沒事了，媽。」就回去做功課。


    幾個月後，尼克病情加重，不斷進出醫院。我三不五時接到他父母的電話，說尼克請我幫忙消除痛苦。痛苦總會消失，我感謝上帝賜予的奇蹟。可是有一天，蘇珊來電，告訴我尼克前一晚平靜離去了。我告訴他的母親，要永遠記得尼克在天堂是個美麗的靈魂，只要她需要，兒子就會來到她身旁。


    要描述尼克對父母和兄弟姊妹的影響，並不容易。他們失去了一個兒子和兄弟，然而，這一家人又似乎被他的疾病和死亡所喚醒。尼克為他們展現無盡的愛和悲憫之心，彷彿是上帝透過這孩子，將愛照耀在他們身上。他相當與眾不同，就像個天使，為所有與他接觸的人散發光芒。在兒童醫院裏常能遇見重病的孩子，他們雖然病重，卻依然快樂，而且充滿愛，很少呈現悲痛或怨恨的情緒，彷彿來世間的目的就是要為我們展現光芒。孩子們的智慧總是讓我驚嘆。那些重病的兒童，就算只有四歲，也往往具有靈性，非常成熟，而且能不帶情緒就事論事，實在非常美麗，令人著迷。


    關於孩子們，還有一事值得一提。他們年紀還很小時，在靈性上就非常開放。畢竟他們才剛從天堂來到人間。許多孩子能看見天使，雖然不久之後大都會忘記此事。許多孩子也常看見靈體，尤其是前來保護他們的祖父母或親戚的靈體。我經常遇見年紀很小的幼童會說出類似「爺爺來跟我玩」的話。我也聽過父母親描述和孩子瀏覽家族照片時，孩子會說他認識某位在他出世前已經死去的往生者。那孩子或許有些訊息要傳遞給父母。


    孩子們是智慧的泉源，具有來自其他世界的智慧，我們應該經常傾聽他們的話語。


    來找我的人越來越多。這時候，喬的健康狀況每況愈下，幾乎足不出戶，有人來訪，就會躲起來。他是個自尊心很強的人，不想讓人知道他病了。來拜訪我的人不知道他生病，也不知道我的生命狀況，或者我要面對一位重病的丈夫，更不知道天使說他無法長久陪在我身邊時，我所要面對的困難。


    有位女士來拜訪我，希望天使能介入她的生活。那是一位醫學院的學生瑪麗安，她說自己壓力很大，無法應付考試。「我聽說妳能和天使對話。我相信上帝，我有信心，我也相信天使，但我現在真的非常需要幫忙，因為我面對的壓力極大，我怕自己會崩潰。」


    瑪麗安正在習醫，即將完成學業，但她極度害怕期末考失敗。她渴望成為一名醫生，而且知道自己會是個好醫生，但覺得養成過程非常難熬。我告訴她，她的信心與信念已經幫助她度過困難時期，上帝已經派遣天使來給她力量，幫助她突破困境。我們向上帝和天使祈禱，請他們派遣天使來教導她通過考試，引導她成為一位具有靈性、愛與關懷的醫生。


    我們都有守護天使隨侍在旁。身為你靈魂的守門員，守護天使可以允許其他天使來到你的生命中，幫助你面對各種困難。我稱這些天使為老師，他們來去頻繁，也跟守護天使不同。我們請求一群天使來擔任她的老師。在祈禱當下，我已經看見三位天使朝她大步走來，只是尚未抵達。


    「他們都是男性，」我說，「其中沒有女性，希望妳不介意。」


    瑪麗安寬慰得又笑又哭，請我拜託上帝讓天使在她離開我之前趕快抵達，因為她真的很需要他們。我為她祈求，請求上帝給她所需的信心、勇氣和能力。我也請求上帝給她希望，因為她需要在自己的生命中看見希望。我為她祈禱完之後，也詢問了被派遣來協助她的天使們的名字，被告知她可以稱他們為「三顆星」。天使們已經抵達，正在門外等著她走進全新的世界。


    最近，也就是她來找我的多年後，我接到瑪麗安的來電，她現在已是一名醫生，在海外工作，幫助許多人。她打電話給我，因為她想要感謝天使們。「我必須打電話給妳，請妳幫我謝謝他們，因為我覺得這樣做，訊息較能早點到達。」


    我忍不住笑了，告訴她透過這通電話，感謝之意已經傳達。我提醒她不要忘記在需要的時候，呼喚她的三位天使。「他們仍然在妳身邊，沒有離開。妳還有很長的路要走，很多工作要做。」


    瑪麗安有足夠的信念來尋求天使的幫助，她賦予天使們力量，相對的，天使們也賦予她力量。


    大部分時候是別人來找我，但是偶爾在特殊情況下，我會受託前往家中。通常若是這種情況，會有人來接我，開車送我去。有一天，我被帶到一棟老舊的大房子，探望一個重病的三歲小孩，他非常虛弱，幾乎無法呼吸，根本下不了床。


    屋裏有個老人，我以爲他是家庭的一員，直到他對我竊笑，才察覺到他是個鬼魂，一個靈體。他把自己的光調得很暗，所以看起來像個活生生的人。他知道自己讓我吃了一驚，沾沾自喜。


    看過孩子後，我跟孩子的祖母喝茶，她提到孫子跟她自己的祖父很相似，這位祖父在幾代前也住過這棟房子。她一連說了幾次相同的話。基於某些我無法理解的原因，祖母不斷提及孫子和她的祖父相似的言語，正是造成靈體滯留不前的原因。這個靈體是病童的曾曾祖父。


    我知道靈體對這個家庭並不健康，他帶有某種惡意的力量，他的存在就算不是唯一的原因，也是孩子生病的原因之一。停留在那棟屋子的期間，我不斷看著靈體，祈禱他能被愛和天使圍繞，幫助他起程前往天堂，讓小男孩擁有平靜的生活。


    幾星期後，我再度受邀去探望小男孩。孩子已經痊癒，充滿能量，於是我知道靈體已經離去。


    我很驚訝的是，房子看起來完全不同。幾星期前來拜訪時，房子又潮又暗，並不乾淨，有一座老舊的大樓梯，客廳裏還有一個華麗但骯髒的壁爐。如今我看見的卻是一棟修繕良好，而且沒有壁爐的老房子。


    我問老奶奶：「壁爐到哪裏去了？」


    她不解地看著我說，我上次來訪到現在，房子完全沒有改變過。不過對我來說，這裏改變過了。因為我不僅看到她祖父的靈體，也看見房子本身的鬼魂，也就是靈體很久以前還住在這裏時房子的模樣。


    ## 23

    ### 靈魂伴侶


    喬仍然無法工作，不過至少能在家照顧孩子，所以我偶爾可以找一份短期工作。我曾刷過學校的地板，也到鞋店工作過，只是在當時，我可以做的工作實在不多。


    克里斯多夫的消化道問題，使得家裏財務狀況更加吃緊，喬也需要特殊食品。我必須非常努力才能用極有限的錢餵飽全家，而且也只能算是餬口而已。現在女兒露絲常提到以前她唯一能吃到肉的時候，就是啃爸爸盤子裏的骨頭，每回想到就想笑。


    有些時候，喬的糖尿病獲得控制，身體狀況好一點，便能找些零工來做。有一回他去擔任駕駛教練，不過這個工作讓我很焦慮，擔心他的病情惡化。他狀況佳而能工作時，總是很開心，只是這種時候多半持續不久。


    我們在庭院裏養雞，喬經常到鎮上咖啡店去討剩下的麵包來餵雞。他沒有跟店家說明這些麵包也能幫他養活老婆和小孩，但也確實如此。我們會在他帶回來的袋子裏翻找還可以吃的麵包，把發霉的部分切掉。有時候，袋子裏會有一塊完美的奶油蛋糕或一條新鮮麵包。我始終相信是餐廳老闆猜到事情的真相，特地放進去的。


    有一度，我們積欠小屋貸款，快要失去房子。我只好前往社會福利部門，看看是否提供現有殘疾補助以外的協助。喬跟我一起去。然而儘管喬病得相當嚴重，對方卻不肯相信我們的困難，甚至質疑喬是否真的生病，儘管有醫生證明，他們依然認為喬如果真心想工作，還是沒有問題。喬往生後，在社會福利部工作的女士曾為此向我道歉。


    絕望中，只好把一部分庭院劃分出來變賣求現。回想起來，我當時太急切想使喬過得舒適些，因此售價遠比實際價值便宜太多。不過，這個舉動讓我能夠還掉一些債務。


    當人不得不向他人乞求時，往往會失去自尊，但是如果全家生計維繫在你身上，卻又別無選擇。喬的病症之一是他始終很冷，即使在夏天也一樣顫抖不停。我再度到社會福利部申請補助，想幫他買保暖內衣。他們還是認為喬沒什麼病，拒絕協助。最令我沮喪難過的是，有許多家庭都獲得了財務補助。我認為我們住的屋子小歸小，卻是自購而非議會住宅的事實，影響到他們的觀感。此外，由於喬的自尊心強，因此前往求助時，仍然努力讓自己看起來很健康且值得尊敬，這也是原因之一。


    天使不斷要我求助地區慈善機構，我強烈抗拒，因為我已厭倦沒有尊嚴的日子。他們怎麼可能相信社福機構無法接受的事情呢？但最後情況已經相當絕望，我只好打電話約他們見面。


    我到慈善機構解釋我們的情況，他們派人來訪視小屋，檢視一切。那人在小屋四周慢慢巡視，打開每個櫥櫃，檢查所有東西。最後他轉身對我說：「你家若還有一袋馬鈴薯和一罐豆子，就不會挨餓。你們不需要我們的協助。」


    我設法解釋腹腔疾病的特殊飲食需求，克里斯多夫需要特殊飲食才能成長，否則有可能造成永久性的發展遲緩（事實上，七歲的他只有十五公斤重，但正常小孩至少有二十五公斤）。我也解釋喬的疾病讓他無法消化許多食物。但那人的根本不願意聽，執意相信自己是對的。


    最後，慈善單位只給我們極微小的協助，但多半是無益的支援。他們送我們特定食物的免費兌換券，但往往是克里斯多夫和喬不能吃的東西。有個聖誕節，我們拿到一張火雞兌換券，非常開心，但是去兌換時的羞辱經驗，卻讓所有美好的感覺消失無蹤。委員叫著名字，等人們上前領取火雞。他們叫到我的名字時，卻說：「喔，是妳啊……」我覺得他們一直在談論我，認為我投機取巧，從真正需要的人口口中搶奪食物。他們根本一無所知！


    有一天，我巧遇多年前在梅努斯祈禱會認識的夏恩。由於喬的身體禁不起奔波，所以我們很久沒有出席。但是我很想念祈禱會，想念共同祈禱的經驗，也想念在那裏認識的夥伴。事實上，在這段時間，我極少出門，除了購物、接小孩放學、打幾小時零工之外，哪裏也沒去。喬的身體狀況很難預測，所以我不敢留他單獨一人太久。


    這時的夏恩是地區慈善機構委員會的一員，巧遇後不久，他說想來家裏喝杯茶。在廚房喝茶時，我告訴他實情。我只對他一人清楚說明我們的財務實際上到底有多困窘。夏恩非常震驚，並且承諾會為我們向慈善機構爭取更多協助。


    但這並不容易。夏恩向委員會提出我們的案例時，他們強烈反對提供協助，最後還是拒絕他的請求。我知道這是惡魔所為。撒旦有時候在我們步上該走的道路時，讓我們遭遇重重困難；有時候，邪惡力量讓我們在生命路程中受挫，使生命比應有的際遇更爲艱困；又或者以相當隱微的方式來影響我們，譬如讓我們從應該進行的任務上分心。我知道這是為何在喬生病時，我們只能得到極少援助的原因之一，人們被邪惡的力量蒙蔽，無法看清眼前的真實情況。


    我不斷與邪惡對抗。當一個人信心堅強時，邪惡會讓一切變得更加困難，取得一時的成功。但我知道不論撒旦的邪惡力量多麼努力阻撓，上帝和天使終將獲得勝利。


    夏恩無法相信他未能幫助我們獲得協助。雖然他獲准送來食物兌換券，可是當他發現因為特殊的飲食需求，兌換券對我們毫無幫助時，非常懊惱。夏恩記錄了喬的詳細飲食清單，以及克里斯多夫可以吃的東西，之後就經常送來小袋食物。我相信這些費用完全出自他的荷包。


    隨著時間流逝，越來越多人聽說我，並前來尋求協助。


    有位女士在這時候來找我，當時她已經是位祖母，但年紀其實不大。她的名字叫做瑪麗。大約十年前，她的一位鄰居生下一對雙胞胎，但其中一個寶寶不久夭折。瑪麗告訴我，那位母親懷孕時，雖然她和對方不太熟悉，也非親戚，卻被她的寶寶深深吸引。她第一次見到躺在搖籃裏的喬西時，還沒伸手觸摸寶寶的小臉蛋，已經感受到兩人之間的連結。她完全不知道為什麼。


    許多人都聽過「靈魂伴侶」的說法，經常以爲那和愛情有關係，彷彿對方是完美的伴侶,或許也是結婚的對象。但我們必須記得,靈魂伴侶可能是個成人,也可能是個孩子。人四處尋找自己的靈魂伴侶,而對方或許存在於世界的另一端,需要你送幾塊錢幫助他。他也可能坐在輪椅上,或者是你在街上擦身而過的那個患有唐氏症的孩子。任何人都可能是你的靈魂伴侶。


    喬西成長期間,瑪麗一直和她保持很親近的關係。那孩子生病或遇上麻煩,瑪麗總是本能就知道。喬西也是如此,有時候,她會告訴母親要去見瑪麗,媽媽若問為什麼,喬西總是同樣回答:「我知道瑪麗需要我。」媽媽並不一定會允許她去看瑪麗,因為有時候天色太晚,或者正在下大雨。但喬西總是不斷請求,直到母親答應爲止。喬西來到瑪麗家大門前,敲門喊著:「瑪麗,妳怎麼了?」而瑪麗總是看著小女孩,心底想著:「天啊,她竟然知道我今天很悲傷!」


    她們是靈魂伴侶,儘管年紀不同,性別相同,仍然是一對靈魂伴侶。靈魂伴侶彼此之間有非常特殊的連結,能夠知道對方此時此刻的感覺。


    如今瑪麗已經過世,往生前她曾經對我說:「喬西是我的靈魂伴侶,而我早知道我先生不是。」這是她在生命尾聲體會到的結論。


    日後我也認識了喬西。瑪麗的死對喬西造成很大的影響,她覺得心被挖走一大塊。


    喬西也可能在今生遇見另一個靈魂伴侶,人的一生可能擁有多位靈魂伴侶,但有時候會因為無法認出對方而錯過了,那是因爲我們太忙碌。不過這不表示對方認不出我們。


    我們也必須了解,我們能對某些人付出愛與生命,並且珍惜對方,卻不表示對方一定是我們的靈魂伴侶。現在許多年輕人, 或者不太年輕的人會說: 「等我遇見靈魂伴侶後,
    就會安頓下來。」這話讓我悲傷, 因爲一旦這樣說, 就會阻礙他們找到一位能帶來無限快樂, 卻不一定是靈魂伴侶的人。你不需要搜尋那個特定的人, 假使靈魂伴侶注定要在此生和你相遇,
    不論那相遇是瞬間的或長久的, 他們都會出現。


    記得有一晚和喬看新聞時, 看到一則發生在英國的火車對撞慘案。那天稍早我已經注意到報紙上的照片, 但避開了它。然而, 我知道那裏面有我必須知道的消息。我早該了解如果上帝和天使要我看見,
    我是避不開的。


    影片上有個男人躺在擔架上, 周圍全是救難人員。我不認識那男人, 只知道他是火車對撞災難的生還者, 但我也知道, 不論他是誰, 他才剛在火車上與他的靈魂伴侶相遇,
    而對方已經往生。我之所以知道, 是因為我看見兩人間的接觸。他躺在擔架上被抬起時, 我看見他向上伸出手, 知道他能看見靈魂伴侶的靈魂正在安慰他, 確保他能活下來。我看不見那靈魂伴侶的性別,
    不知道他是男是女、是老是少, 但我知道那是他的靈魂伴侶, 而且他們的相遇非常短暫。


    我記得自己非常難過, 心想：「天啊, 我討厭看到這種場景。」不過, 討厭是錯誤的字眼。我在觀看的同时, 感受到強烈的痛苦, 也非常同情躺在擔架上的男人所感受到的痛苦和失落。他伸出手時,
    曾短暫看見靈魂伴侶。不知道他是否會記得自己曾經與靈魂伴侶相遇。有時候, 靈魂事件發生在我們處於痛苦和震驚狀態時, 在那之後, 我們不禁猜疑, 事件真的發生過嗎？我們真的看見了什麼,
    或者那不過是一道閃光？


    大約在同一時期，我逐漸察覺到自己和一位謀殺妻子的男人之間的連結。不管到哪裏去，或做什麼事，連結總以某種方式出現在我面前。或許打開收音機，就會聽到謀殺案的消息；走在路上，就會看到報紙，而且是一張路過時掉落在地上的報紙。那則報導特別顯眼，彷彿要從報紙上跳出來似的，而我在報紙上，就只能看見恐怖的謀殺案。夜間新聞開始時，我想關掉電視，卻沒辦法！天使對我說：「羅娜，坐下來看這則報導。」


    我遲疑著，最後照做。新聞報導男人被判有罪，因為他以冷酷的預謀方式謀殺妻子。天使還讓我看見他對自己靈魂所做的事。他將自己的人性和靈魂分離，讓靈魂無法介入他的計畫之中，他的心因此變得寒冷如冰。這並不容易解釋，但男人把自己的靈魂推開，遠離了自己，並且用一條剪不斷的鍊子把靈魂拴住，像是拴在一面牆上那般。有時候，我們會因為想让贪婪主宰自己的生命，而对灵魂做出这类事情，自己也因此变得迷恋物质世界。男人灵魂的遭遇并非邪恶力量或他人所为，而是他自己所作所为。可以说，他变成了冷酷的人。


    这是他当时所处的状态。他被遣送到监牢的途中，我看见了他的灵魂。这并不表示他将来不会感到悔恨，也不表示他的灵魂能够脱离部分的枷锁。他永远无法使女孩复活，那个遭他谋杀的年轻妻子，他将在人道上为其所作所为付出代价。不过，最悲惨的是他对自己灵魂做出的事情。当他的灵魂挣脱枷锁（如果他允许的话），他将经历无比痛苦的折磨。他会设法逃避这些感受，但终将崩溃，而且感受到更深层可怕的痛苦。


    男人为了贪婪，蓄意出手谋杀他人，计划夺取别人体内的灵魂。他在时机未到之前，夺取他人的靈魂（我知道有人會說，你若遭到謀殺，那是因為你的時間已到，或者是前世作為帶來的復仇，但這並非定律），自己的靈魂同時也感到巨大的疼痛與傷害，因為他的靈魂無法阻止他進行如此駭人聽聞的舉動。


    遭到謀殺的年輕妻子的靈魂，因為知道男人的靈魂陷於囹圄，而感到悲傷，原諒了他。


    靈魂永遠會寬恕他人，永不放棄，就像天使一般。我們的靈魂永遠不會放棄彼此。


    ## 24

    ### 和平的愛爾蘭與聖誕節


    一天早上，喬看電視新聞時，喊我快點過去。電視上出現都柏林的那家當鋪。我簡直不敢相信耳朵所聞：那家當鋪週末遭人侵入，所有東西被一掃而空，竊案星期一早上才被發現。警察還未查到嫌犯，但肯定是件預謀的竊盜案。


    我回頭望著喬說：「那表示我的戒指也沒了。我美麗的戒指！」我哭得非常傷心，喬把我抱在懷裏。「再也不能用它來度過難關，太不公平了。」我說。


    沒了戒指，我感到很失落。老實說，它在當鋪的時間遠比戴在我手指上的時間多，儘管如此，那只戒指對我仍然意義深遠。我很期待警察能找回戒指，但是日子一天天過去，希望似乎越來越渺茫。


    幾星期後，我們收到當鋪寄來的一封信，喬至少念了四遍給我聽。信上知會我們：基於我們留下戒指時在當鋪所簽的收據，他們得以避免賠償責任。也就是戒指在他們手上遭竊一事，他們無須負責。這簡直把我們的心給掏空了，戒指沒了，也沒有遺失的賠償金。


    喬承諾有一天再爲我買只戒指，但我告訴他那不重要，因爲沒有其他戒指比得上那只戒指對我的意義。喬給了我一個擁抱，把那封信擺一邊。


    幾天後,我坐在小屋門檻上,天使米迦勒出現,看起來像是從小屋後方走來的。「我現在不想說話。」我對他說。米迦勒天使把手放在我的肩上說:「羅娜,戒指的事我感到很遺憾。我們無能為力。」我轉身面向米迦勒,他光芒四射的模樣讓我露出了些許微笑。


    「米迦勒,我只是希望你們能做些什麼。喬也很傷心,覺得自己讓我失望。幾天前他說,如果他能夠好好養家,戒指就不會流落到當鋪去。」


    「羅娜,要記得那不過是只戒指,是物質的東西。」米迦勒說,「只要記得喬的愛就夠了。」米迦勒的話讓我沉思了好一會兒,當然,他說的一點也沒錯。我覺得好多了。我轉身對米迦勒笑了笑,接著他消失不見。在那之後,我不再將戒指的事放在心上。


    我對政治不感興趣,但很在乎和平。這時是一九九○年代中期,許多與北愛爾蘭建立和平關係的言論正在蔓延。有一回,米迦勒天使和我坐在一起,我問了他關於北愛爾蘭的事情。他說有人會設法阻礙和談過程。儘管破壞者成功的機率很低,但和平仍然要很久以後才會到來。我們還需要約二十年時間,才能釐清一切。


    從那時候起,我就不斷觀察著。最近我注意到有些人變得更加開放與寬容,也被迫收回過去的立場,朝和平方向前進。米迦勒告訴我北愛爾蘭的和平不僅對愛爾蘭和大英帝國非常重要,也能為其他國家的恐怖組織帶來示範,顯示除了暴力之外,還有其他途徑能取得和平。我被告知愛爾蘭可以成爲世界和平的關鍵,雖然邪惡力量不斷想移除這個關鍵,但情勢'
