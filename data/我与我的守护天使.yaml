  md: '「妳的小鷹長得又大又強壯了，妳卻還沒為牠取名字？」米迦勒問道。

    「牠不需要名字，」我說，「我的鷹就只是『愛』，就是這樣。」

    米迦勒看著我說：「有一天妳會明白妳為何叫牠『愛』。」

    我盯著米迦勒。他的眼睛非常明亮，彷彿可以從裏頭看到好幾里遠，像是進入一條綿延長路，甚至正在穿越時間本身。


    小鷹總是和我在一起，我去到哪兒都帶著牠，一刻也不曾忘記。假期的最後一天，我和爸爸到山上去。我們搭起帳棚，還生了一把火，雖然那是個晴空萬里的日子。我哀傷地看著小鷹，因為天使在我找到牠時曾經說過，牠在這個假期結束後並不會跟我回家。

    我抱著小鷹站在帳棚的後方，溫柔地對牠說話。

    「沒有你的日子我該怎麼過？我會非常想念你。」

    爸爸對著我喊說：「快呀，羅娜，小鷹需要再多練習揮動翅膀。」

    我悲傷地抱起牠，但牠愉快地揮動雙翅，發出響亮的叫聲。

    爸爸又喊了。我把小鷹朝空中推送出去，爸爸接到了牠，牠同樣在爸爸的手裏振動雙翅。爸爸又把小鷹推送過來，但大約在四分之三的距離，牠的身體摔落地面。我的小鷹離開了！牠的神魂飛走了，那張開的翅膀顯得龐大無比，全身閃耀著金黃色光芒。牠轉頭看著我，眼睛明亮到彷彿在對我微笑。牠不是一隻平凡的鳥，而是上帝和天使送來的禮物。

    那一刻我悲喜交加，既為小鷹感到高興，因為牠現在是完美的，能像老鷹那樣在空中翱翔，但也知道我將非常想念牠。'
