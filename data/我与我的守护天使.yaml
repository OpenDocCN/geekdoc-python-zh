  md: '套，雙手很冷，所以把手放在口袋裏，摸到裏頭的一本小祈禱書。走在學院後方曲折蜿蜒的步道上，不時得閃避路上的坑洞，因為裏面溢滿雨水和從樹上飄下的落葉。我看著人們走過，其中包括一位經常在此走動，口中念著祈禱文的神父。我對他笑了笑，繼續往前走。在另一條小徑上，我看見一位母親推著娃娃車跑著。她跑一下、停一下，然後快步走，最後又跑起來。


