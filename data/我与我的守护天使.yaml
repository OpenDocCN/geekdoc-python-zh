  md: '出援手。我學會做各種工作,包括加油和銷售商品,也開始學習行政事務。加油站約有九到十位工作人員,其中只有一位女性,可愛的安妮,她從我上工第一天,就一直保護著我。我們相處得很好,她還教了我許多東西。


    第一天上班很愉快,下班跟爸爸回家時,我對自己也很滿意。我倒是很好奇,不論是那天或其他時候,爸爸爲何不曾注意到不論加油或找錢,對我來說都不成問題,爲什麼他還是繼續把我當作智障的孩子?


    我開始工作後不久,公司決定拆掉老舊的加油站,重蓋一座新的。一個週末早晨,我跟爸爸坐在車裏,驚奇地看著工人用巨大的鐵球不停撞擊舊有建築,直到房子崩塌爲止。一段時間後,一棟新穎的現代加油站蓋好了,有新的店鋪、新的加油幫浦,還有一間明亮舒適的辦公室,從辦公室裏可以看到店鋪和加油幫浦。


    一如往常,天使讓我看見許多事物。有一天他們要我觀察一位老客戶,一名叫約翰的男人,我對他很熟悉。「看著他,他要偷妳爸的東西。」


    爸爸認爲約翰是個有錢人,也是個重要的顧客,所以聽到天使這麼說,我很震驚。我說:「走開,他才不會偷東西。」


    「他會的,」天使堅持說,「妳可以仔細觀察,他看不見妳的。」


    我還是不相信他們。我看著約翰和爸爸談話,聽見他稱讚這家新的店鋪和其中販賣的各種商品。爸爸邀請他四處看看,然後離開去做別的事情。我單獨和約翰一起留在店鋪裏,天使卻說約翰看不見我。我說:「他當然看得見我,我是個血肉之軀啊。」'
  merge: -1
