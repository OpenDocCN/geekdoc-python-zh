  md: '年輕人的靈體持續在水底驚恐掙扎著，不知道自己身處何處。他掙扎著想要吸一口氣，卻吸入更多水，而且摸不清頭上方那一片黑暗、詭異的昏暗光芒究竟是什麼。他急切渴望被找到，想要讓家人知道他愛他們。他不斷拜訪我，一次又一次說：「我在這裏，我在這裏——在這裏啊！」許多次我呼喚天使和上帝，請求他們給我力量。我不斷努力祈禱，希望年輕人能被尋獲，讓靈體得到自由與平靜。我祈禱他的家人能將屍體帶回家，為其哀悼，並且明白他沒有逃家，而且深愛著他們。


    有一晚，我坐在火爐邊，整個人筋疲力竭，喬看著我說：「天啊，妳好蒼白！那年輕人的鬼魂又來了。這實在耗損妳太多精力，看起來簡直快掛了，跟那個年輕人一樣。不可以再這樣，停下來！」喬大發脾氣，非常氣憤上帝。


    「喬，不要發怒，」我說，「這樣發怒，讓我無法和你相處，請你支持我、安慰我就好。上帝，請讓年輕人盡快被找到。」


    喬把我抱在懷裏。我一定睡著了，醒來時我仍然坐在火爐旁的椅子，身上蓋著毯子。孩子們已經上床睡覺，喬對我微笑，然後起身去泡茶。


