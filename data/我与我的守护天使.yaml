  md: '房間爸爸在哪裏。我解釋他去了醫院，等大家吃過早餐，就去打電話給醫生，詢問他的狀況。

    餵露絲吃奶時，爸爸來了。孩子們很高興見到他。我感謝他昨晚在醫院陪喬，也問他狀況如何，陪喬到幾點？爸爸一整晚都待在醫院裏，喬被緊急送進開刀房，他們一度害怕會失去他，不過現在已經沒事了。

    「我會每晚帶妳去看喬。」爸說。

    儘管我反對，認爲這樣太麻煩他，但他堅持如此，還說媽媽會幫忙照顧孩子。

    晚上去探望喬時，他的模樣很悲慘。他在醫院住了兩星期，出院幾星期後，又因爲感染，回到醫院再住了十天。之後，他有將近半年無法工作。

    有一天，我在超級市場走向結帳櫃台，一位女孩坐在推車上，她的守護天使召喚我。我認得那位母親，但不知道她的名字。

