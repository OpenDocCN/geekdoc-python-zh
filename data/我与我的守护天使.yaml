- img_proc: true
  md: '「羅娜，我們會的。」


    有時候，事情只是看起來像個悲劇，爸爸的意外就是這麼回事。他當時為一家大型石油公司工作，在運送煤油時出了意外。公司願意提出賠償，但爸爸不想要錢，只想有份長期工作。最後，公司提出一份合約，讓他擔任都柏林市內一家加油站的經理。爸爸的眼前出現了選擇的機會，毫無疑問，天使幫助他做出正確的決定。這份長期工作使父母在經濟上得以穩定，最後終於能夠負擔一棟屬於自己的房子所需的頭期款。父親的意外事件是個經過僞裝的幸福。有時候發生艱難的事件，是爲了讓人改變，讓生命中的事物得以改變。奇蹟隨時都在發生，只是大家沒看見。'
