  md: '喬的糖尿病變成慢性病。他經常昏倒或感到疲倦衰弱，有時候克里斯多夫會從庭院衝進屋裏，喊著「爸摔倒了」。這對喬、對我們都是一段困難的時光。多數的糖尿病患者對藥物治療都有反應，可惜喬的案例沒那麼簡單，儘管醫生已經盡力，還是無法控制病情，而且他的病情已影響到心臟。自從被診斷出糖尿病後，喬就不曾再出門工作，他曾經應徵梅努斯學院的守衛，如果能被錄取，對我們就相當方便，因為離家很近。可是他們在最後一刻卻基於體檢的結果，沒有錄用他。這使喬極度失望。


    喬經常進出醫院，有一回護士建議我們也許應該在小屋安裝電話。六個星期後，電話安裝好，這要感謝地區醫療當局的協助。不過我只用來打緊急電話和接聽，因為怕費用太貴。電話裝好後不久，孩子們在庭院裏玩耍，有輛車開了進來。當時我正在後院整理一個棚子。（我們花很多時間在庭院裏，養了幾隻雞，鄰居還送我們一隻小狗。）這一天，我聽見有個男人喊著：「哈囉！」我走出來打招呼，他正要下車，車裏還坐著一位女士和小孩。他問我他是否走對了地方。我笑著說：「我不知道，你要找誰呢？」


    「找療癒者，」他回答，「我太太人不舒服。」


    我面帶微笑，但是心中並無把握，雖然知道他找的人是我，可是在此之前，我不曾被這樣稱呼過。事實上，被稱爲療癒者，讓我侷促不安，我覺得自己不夠好。但我深呼吸一口氣後說：「是的，你走對了，請進。」


    我們走進廚房，他們介紹自己是芬頓、佩格和兒子艾蒙。小男孩在庭院裏和我的孩子'
  merge: -1
  pgno: 234
- img_proc: true
  md: '們、雞和小狗一起玩耍。這是第一次有人到小屋尋求我的協助，我始終不知道是誰把他們送來找我，或者告訴他們我是個靈療者。但他們是諸多求助者中的第一人。


    許多年後，我再度遇見芬頓，他說當初看見那棟有孩子、小狗和雞的小屋時，就知道自己來對地方。他同時也告訴我，會面之後，妻子的健康有了大幅改善。


    有一天我接到一通名爲喬西的女性來電，有人把我的號碼給了她。她的兒子被診斷出癌症，因此想尋求我的支持。她還請我看看另一個家庭，他們的兒子也得了癌症。我安排那個家庭在隔週星期一來見我。


    星期一上午，大約十點四十五分，一輛車開到柵門前。我打開大門，歡迎他們一家人進屋。握手後，我們走到廚房，父親介紹自己是德蒙，太太是蘇珊以及兒子尼克。我們在狹小廚房的桌邊坐下，尼克玩著母親帶來的玩具，我開始和父母談話。幾分鐘後，尼克給我一個大大的笑容說：「別說了，媽，讓羅娜請上帝保佑我，告訴我可以把病變好的天使名字，然後我就可以到院子去玩了。」


    父親訓誡他不可以沒耐心，要給我一個機會，但我告訴他們沒問題。「告訴你我們要怎麼做。」我說；「我先爲尼克請求上帝保佑，替他祈禱，詢問天使的名字。尼克，去坐在媽或爸爸的膝上。」尼克坐在爸爸膝上。「我不能保證守護天使會給我他的名字，尼克。所以你要跟我一起祈禱，請求守護天使打開你的心靈。做完之後，就可以到庭院玩，我再跟你的爸媽說話。」


    我看了他一眼，請求上帝爲我展現癌症部位。我看見了，但沒有說出癌症在哪裏，因爲'
  merge: -1
  pgno: 235
- img_proc: true
  md: '惡化很嚴重。我不禁心想：「喔，神啊，他真的需要奇蹟才能活下去。」突然我心底生出個想法，也許尼克的生命不該延續，也許他此生的目的就是要更靠近上帝，要認識他的天使。我知道這也是他們一家人的生命旅程之一。


    我為尼克祈禱，請求上帝賜予奇蹟使他好轉。尼克的守護天使現身片刻，對我說奇蹟不會發生，請尼克的父母盡量花時間和他相處，時間很寶貴。我不能明白告知尼克的父母真相，他們還無法接受這樣的訊息。此外，我應該告訴尼克天使的名字。


    我為尼克祈禱時，他靜靜坐在父親的膝上。祈禱完後，我給他祝福，他隨即跳下父親的膝蓋說：「告訴我天使的名字！」


    「坐回你父親的膝蓋，我才能告訴你天使的名字，還有他的模樣。尼克，你的天使非常華貴，身上穿著閃爍各種顏色的衣服，頭戴一頂不斷移動的帽子；還有一雙閃閃發亮的美麗綠靴子，那是我見過最美麗的綠色，靴筒有膝蓋那麼高，上面有大大的銀色方形扣環；腰間繫著一條金色腰帶，中央也有另一個銀色扣環。」


    尼克一動也不動坐在父親膝上，目不轉睛看著我。我描述天使模樣時，他的眼中充滿興奮。


    「他的頭髮如火焰般火紅。」我繼續說，「眼睛像星星。左手拿著劍一般的東西，不過那把劍其實是光之劍，會閃閃發亮。你的守護天使要我告訴你，覺得不舒服時，只要發出請求，他就會用光之劍碰你，你便會覺得舒服點。」


    尼克再度跳下父親的膝蓋，並且問道：「現在我可以出去玩了嗎？」'
