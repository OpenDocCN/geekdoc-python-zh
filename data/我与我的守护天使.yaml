    送給我的孩子們


    我誠心感謝珍·卡拉南（Jean Callanan），謝謝她的支持、奉獻與勇氣。第一次遇見她時，天使們告訴我，她將在協助我撰寫與出版這本書的工作上扮演重要角色。當時她一點也不知道這件工程要耗費她多少時間、精力和努力。我感謝她的幽默感、熱情、耐心、慷慨和友誼，也感謝天使們帶來一位能提供寶貴商業經驗的人來協助我。天使們說，我不需要經紀人，因為珍比任何一位經紀人更能幫助我。


    馬克·布斯（Mark Booth）是位不可多得的編輯，他對這本書的信任、信心和信念，帶來了極大的改變，而且所擔負的責任，甚至超出了一般編輯。我要向這位美好而獨特，且成為好友的男士致上深深的謝意，還要感謝天使們把他送來給我。


    感謝所有「世紀」（Century）工作團隊，尤其是夏綠蒂·海寇克（Charlotte Haycock），謝謝她的好脾氣和效率，以及莉娜·吉爾（Rina Gill）所帶來的熱情、創造力以及歡樂時光。


    還有許多對本書提供協助，而我很高興能稱之為朋友的人士，包括史蒂芬·馬拉罕（Stephen Mallaghan），感謝他的慷慨、熱誠和溫馨以及美好的友誼；謝謝丹尼爾·歐唐納爾（Daniel
    O''Donnell）的鼓勵，並為我開啓第一扇門；感謝吉姆·可兒（Jim Corr）的支持、慷慨和好奇心；感謝愛歐恩·麥克哈爾（Eoin MacHale）所建立的美麗網站；以及派翠夏·史坎蘭（Patricia
    Scanlan）的鼓勵。


    也感謝我以下的朋友：在盛衰起伏之時提供無限支持的凱特琳和約翰·卡力根（Catherine and John Kerrigan）；讓我開心大笑的莎麗·懷特（Sally
    White）；約翰·卡爾西（John Carthy）的陪伴；布來恩·凱利（Brian Kelly）的支持與慷慨；以及在所有母親都會面對的特定議題上給予支持的吉格利家族（Quigley）。


    最後，感謝我的孩子們，他們讓我隨時記得要腳踏實地！特別感謝他們的陪伴，尤其是我的老么，因爲她的生活被這本書攪得天翻地覆。


    # 01

    異樣的眼光


    兩歲時，醫生就告訴母親我是個智障。


    還在襁褓時期，媽媽就注意到我似乎總是處在自己的世界裏。至今我仍然記得躺在大籃子做成的搖籃裏，望著媽媽彎下腰來看我的景象。她四周圍繞著許多閃耀各種虹彩、明亮又神奇的人形，他們的體型比我大很多，但是又比媽媽小，約莫是三歲小孩的體型。人形如羽毛般在空中漂浮，我還記得自己伸出手想要觸摸他們，卻始終摸不到。我對這些閃爍著美麗光彩的生物非常著迷。不過在當時，我並不知道自己看到的世界和別人不一樣。很久之後，我才從人形的口中得知他們被稱爲天使。


    又過了幾個月，媽媽發現不論她如何努力吸引我的注意，我的眼睛總是盯著其他地方看。事實上，我確實去了其他地方，我跟著天使走了，看著他們做事，跟他們說話，和他們一起玩耍。我被迷走了。


    我很晚才學會真正開口說話，不過很早就開始和天使交談，有時候用的是你我都懂的語言，有時候一個字也不需要說，我們就能明白彼此的心思。當時我以爲所有人都看得見我看到的一切，可是後來天使要我對看見他們的事保持緘默，說那是我們之間的祕密。事實上，這麼多年來我一直聽從天使的指示，不曾說出祕密，直到寫書的此刻，才首度揭露出自己看見的許多事情。


    醫生在我兩歲時所下的論斷，為我的生命帶來深重的影響，也讓我了解到人有多殘酷！當時我們住在距離都柏林市中心不遠處的舊克爾麥罕（Old Kilmainham）地區。父親在那裏租了一間小小的自行車修理店，店鋪還附有一間小屋。只要穿越店鋪，繞到左邊，就能看到這間極小又荒廢的小屋。它是一排老式小屋和店鋪的一部分，不過大部分的小屋和店鋪不是空蕩蕩，就是已經廢棄，畢竟房屋實在太破爛。我們大部分時間待在小屋一樓唯一的小廳堂，在這裏煮飯、進食、談話、遊憩，甚至在火爐前用一個大鐵盆洗澡。雖然屋子裏沒有浴室，但後院小徑上有個小棚舍，裏面有廁所。小屋的二樓有兩間小臥室，最初是我和姊姊愛美爾共用一間臥室和一張床。


    其實，我不只看見天使（從我醒來到閉上眼睡著爲止，無時無刻不看見他們），也看得見往生者的靈魂。在我之前出生的哥哥克里斯多夫才十週大就夭折，雖然我從未見過他在世時的樣子，卻能清楚看見他的面貌：他有一頭深色頭髮，而我和姊姊都是淡髮。我還可以跟他的靈魂一起玩耍。


    當時我不覺得那有什麼好奇怪的，感覺上他只是另一個小孩，只不過外表上比較光亮而已。不過，最早讓我察覺到他和別人不同的是他的年紀會變化，有時候以嬰兒的形態出現，有時候又以和我同齡的模樣現身，陪我一起踉蹌走過地板。此外，他並非一直待在家裏，似乎總是來來去去。


    在某個寒冷的冬季午後，天色將暗，我獨自一人待在舊克爾麥罕的小廳堂裏，開放式的火爐燃著火，是室內唯一的光源。閃爍的火光照耀著地板，我坐在地板上玩父親做的小積木。克里斯多夫也來跟我玩。他坐在更靠近火堆的地方。他說那位置對我來說太熱，但是對他沒關係，他感受不到熱氣。我們堆起一座高塔，我搭上一塊積木，他就在上面再放一塊。塔愈堆愈高，突然間，我們的手相觸，克里斯多夫竟迸出了火花，彷彿有許多小星星同時飛了出來。我訝然發現他摸起來的感覺跟其他人不同。在那一刻，我進入了他之中（或者是他進入了我之中），我們彷彿融爲一體。我在驚嚇之餘打翻了積木塔樓。


    我爆出大笑，又摸了他一次。我想那是我真正了解到他並非血肉之軀。


    我從未把克里斯多夫誤認爲天使，雖然我看見的天使偶爾會以人的模樣現身，但是那個時候他們大多有翅膀，腳也不曾觸及地面，體內還會發出光芒。有時候他們則完全不是人的樣子，而是閃亮的光芒。


    克里斯多夫經常出現在媽媽身邊。媽媽偶爾在火堆旁的椅子裏睡著時，就會看見他蜷縮在她的懷裏。我不知道媽媽是否察覺到克里斯多夫的存在，所以問他：「我該告訴媽媽你在這裏嗎？」


    「不行，不能告訴她，」他回道，「她不會明白的。不過，有時候她能感覺到我的存在。」


    有個冬天的早晨，天使們在太陽升起時來到我的床邊。那時我整個人正縮在被窩裏，和我分享一張床的姊姊愛美爾已經起床活動去了，反倒是克里斯多夫窩在我身邊。他搔了搔我說：「快看，羅娜，看窗戶那邊。」


    我說過，天使會以不同的形態和大小出現，而這天清晨，他們看起來就像雪花一般！窗戶上的玻璃彷彿化成了氣體，片片雪花一接觸到窗戶，就變成嬰兒般大小的天使。天使又乘著陽光穿透窗戶，身上似乎披滿了閃亮潔白的雪花。天使一觸碰到我，身上的雪花就飄落到我身上，被雪花觸碰到的感覺癢癢的。讓我驚訝的是，雪花很溫暖，而非冰冷的。


    「如果大家都知道可以在口袋裏像裝滿雪花一樣裝上幾千個天使，還能隨身帶著走，永遠不會感到寂寞，那該有多好！」克里斯多夫說。


    我轉身問道：「萬一他們在口袋裏融化了怎麼辦？」


    克里斯多夫咯咯笑說：「天使永遠不會融化！」


    我有些感傷地回道：「克里斯多夫，希望你能像雪花一樣裝進媽媽的口袋裏，永遠跟她在一起。」


    這時我們依偎在床上，他轉身看著我說：「妳知道我已經在她的口袋裏了。」


    長大後媽媽才告訴我，在我出生前一年，她曾經有一個小兒子名叫克里斯多夫，不過他只活了十週就夭折。我微笑以對，還問她克里斯多夫埋葬在哪裏，她說在都柏林一個嬰兒墓園的無名墓中（這是當時的習俗）。


    我很難過不能去刻有他名字的墓地看他，但他並未就此遭人遺忘。即使是多年後的此刻，我仍然能感覺克里斯多夫的手在我的口袋裏裝作是雪花，藉此提醒我：我永遠不孤單。


    四、五歲時某一天，我對克里斯多夫和媽媽的關係有了更深層的認識。那時我坐在餐桌邊，盪著腳吃早餐，就在媽媽拿麵包進來時，我看見模樣大約十二歲的克里斯多夫穿越小廳堂，朝店鋪門口跑去。而媽媽臉上綻放燦爛的笑容說：「羅娜，爸爸工作室後方的工作檯下，有個驚喜等著妳喔！」


    我隨即跳起來，興奮地跟著克里斯多夫跑去。他直接穿越店鋪，進入昏暗的工作室，我則在門口停了一下，因為裏面實在太暗，得先讓眼睛適應昏暗的光線。不過，克里斯多夫就像一道光芒，溫柔地為我點亮前方通往凌亂工作室的通道。他大叫：「生下小貓了！」感謝克里斯多夫的光芒，我看見了四隻一丁點大的小貓咪，其中三隻純黑色，一隻黑白相間。貓仔的身體柔軟又光滑，真的好漂亮。母貓小黑走出箱子伸展一番之後，隨即從小窗戶跳到庭院。我跟著牠跑了出去，一邊叫克里斯多夫一起來，可是他不肯走進庭院。


    我走回屋裏問克里斯多夫：「為什麼你不肯到外面去？」


    他牽起我的手，像是在安慰我。我真的好喜歡觸摸他的手的感覺，我們的手再度融合成一體。這種感覺很神奇，讓我感到安全又快樂。


    > 「羅娜，嬰兒死亡後，靈魂會跟在母親的身邊，除非不再被需要。所以我留下跟著媽媽。一旦去到外面，就等於要毀壞那些記憶，我絕對不要這樣。」


    我懂他的意思。媽媽在他身上灌注了許多的愛，從她有了身孕、懷胎十月、生產、抱他回家，都是充滿喜悅與快樂的記憶——儘管那時候不論醫師說什麼，她已經覺得他的情況有異。媽媽在克里斯多夫死去之前，只跟他相處了珍貴的幾個星期。克里斯多夫說媽媽灌注許多愛給他，現在他要把那份愛灌注給媽媽。


    所以我的靈魂哥哥一直待在屋子裏，從來不出門，一直到我們準備好，要和舊克爾麥罕區小店鋪永遠道別的那一天爲止。那個時候，媽媽似乎覺得自己夠堅強，能夠離開那裏，也準備好要放手讓我的小哥哥離去了。


    看到天使，我總想要停下來凝視他們，而且覺得自己身處在一股強大的力量之中。小時候，天使通常以人形現身，讓我更容易接受他們，現在已經不需要了。我看見的天使不一定有翅膀。假如有翅膀，那模樣有時則讓我驚奇不已，有的翅膀像火焰，卻擁有具體的形狀；有些翅膀則有羽毛。有個天使的翅膀非常纖細修長，末端尖銳，教人難以置信，讓我很想請求他張開翅膀給我看看。


    以人形現身的天使，不管有沒有翅膀，眼睛是他們最令人著迷的地方。天使的眼睛與人類的大不相同，充滿了生命力、愛和光芒，眼神透出的充沛活力彷彿洋溢著生命的菁華，眼底的光芒讓人喜悅。


    我從未見過天使的腳觸碰地面。天使朝我走來時，腳和地面之間彷彿存在著一層能量的緩衝墊，這層墊子有時像一條細絲線，有時候又會膨脹起來，甚至陷到地底下。


    我還很小的時候，有個天使就經常出現在我面前。第一次他是出現在房間的角落，那時只是喊了一聲：「羅娜。」某種程度上，他看起來和其他天使一樣，但又擁有不同的氛圍，'
