    # 我與我的守護天使

    愛爾蘭天使夫人的生命視界


    Lorna Byrne 羅娜·拜恩 著 達娃 譯


    你知道嗎？每個人都有自己的守護天使

    在你身後三步遠的地方，看似一束光

    時溫柔地呵護你，陪你走完人生的旅程

    無論何時何地，只要你開口祈請，祂就會出手相助


    # 給在台灣的你們：


    非常高興這本書能譯成你們的語言，讓神與祂的天使們可以被閱讀。


    願你永遠記著，你的守護天使一直與你同在，你並不孤單。


    我會為你祈禱，願這書為你和你的家人帶來美好的改變。


    祝福你


    羅娜


    Blessing to you all in Taiwan.


    I am so pleased that this book is being translated into your language so as you
    can read about God and his angels.


    Always remember you have a guardian angel with you and it never leaves you for
    one moment so you are never alone.


    You are all in my prayers and I ask that this book will change you and your family''s
    lives for the better


    Blessing


    Lorna


