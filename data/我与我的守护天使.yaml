  md: '跟來，他們倆也還只是小寶寶而已。我從她手中抱過美莉，設法將她放在腳踏車的橫桿上，緊緊靠在我胸前，隨即踩著車上路。我甚至無法回頭跟她奶奶道別，因為抱著美莉，還要用我的木頭腿踩動車子，實在很困難，說是推著車而非騎車也不為過。我騎了很遠一段路，中間停下很多次，用手指餵水給美莉喝，她根本無法吃東西，甚至無法正常喝水。她若試著吃東西，可能會導致喉嚨裡的腫塊移動而死去。幾個小時後，應該差不多是午餐時間，我覺得好餓，停下來吃三明治，喝了點水。然後又騎了一段路，腳踏車卻爆胎，報銷了。我拋下車，抱著美莉步行。我緊緊抱著她，感覺到她的心跳與呼吸是那麼短淺。走到醫院時，天色已黑，他們似乎知道我們來了。我筋疲力竭走上醫院的階梯，就在幾乎無法再往前踏出一步時，一位護士走來，把美莉抱了去。並不想和她分開，可是只能坐在椅子上等待。一位醫生告訴我，他們隔天清晨就會為她開刀。


    他看著我，眼裡充滿淚水，說：「但還是太遲了！」


    美莉被帶往開刀房時，移動到喉嚨裡的腫塊，因此窒息而亡。爺爺轉身對我說：「失去湯米和美莉之後，我非常怨天尤人，再也無法相信上帝，也讓奶奶過得很辛苦。」


    我看著爺爺，淚水滑落他的臉頰，美莉和湯米站在他面前，伸手觸摸他的淚水。我告訴他我眼前所見：「爺爺，美莉和湯米正在你身邊，別哭了。」


    他給了我一個大大的擁抱，然後哽咽地說：「妳可別告訴別人爺爺哭了。」


    「別擔心。」我笑著對他說。'
