  md: '我追上爸爸，穿越環繞著小屋的樹林。在我眼底，屋子四周的一切像死去一般，樹木光禿禿，附近完全沒有綠草鮮花。小屋的門半掩，門板少了幾片，門只是掛在門軸上，部分的屋頂和窗戶也消失無蹤。爸爸進到屋內，裏頭有一張老舊的破木桌和幾張椅子。我覺得屋內非常冰冷，但爸爸似乎沒有注意到，直接走向火爐。


    我站在門口，動也不能動，只能不斷對自己說：「喔，上帝啊，天使啊！」我看見火爐的右側附近有個東西。我在這之前、從此之後，從未見過這樣東西，看起來像是融化的蠟，約九○公分長，有胸膛那麼厚，模樣非常恐怖可怕，甚至看不出它是否有嘴巴和眼睛。


    我知道爸爸什麼也看不見、感覺不到。他收集地板上殘破的木材，堆到火爐裏，擦亮一根火柴。火堆立即爆發出來，力道非常強烈，聲音很大，火焰甚至衝進室內。那個東西具有強大的能量，而且正在使壞！它非常生氣，因爲它一直獨占此處，不想讓我們進來。對它而言，我們入侵它的地盤。


    火堆爆發後，一張椅子飛過室內，摔碎在對面牆壁上。


    爸爸跳了起來，衝過來抓住我，同時拿起袋子往外跑。他拉著我衝出門，我們盡全力跑出林子，沿著河岸奔馳，兩人都嚇傻了，這輩子沒跑這麼快過。爸爸跑得比我快，所以一路拖著後面的我。最後，兩人終於喘不過氣，才逐漸慢下腳步。雨已經停了，太陽重新露臉，我的臉上感受到陽光的溫暖。


    在沉默中，爸爸試圖生起營火，他雙手顫抖，幾乎無法生火。我看著爸爸，等著他說些什麼。我在腦海裏對天使說話，請求他們協助爸爸鎮定下來。過了幾分鐘，他終於把火生起'
