    # 24

    和平的愛爾蘭與聖誕節


    一天早上，喬看電視新聞時，喊我快點過去。電視上出現都柏林的那家當鋪。我簡直不敢相信耳朵所聞：那家當鋪週末遭人侵入，所有東西被一掃而空，竊案星期一早上才被發現。警察還未查到嫌犯，但肯定是件預謀的竊盜案。


    我回頭望著喬說：「那表示我的戒指也沒了。我美麗的戒指！」我哭得非常傷心，喬把我抱在懷裏。「再也不能用它來度過難關，太不公平了。」我說。


    沒了戒指，我感到很失落。老實說，它在當鋪的時間遠比戴在我手指上的時間多，儘管如此，那只戒指對我仍然意義深遠。我很期待警察能找回戒指，但是日子一天天過去，希望似乎越來越渺茫。


    幾星期後，我們收到當鋪寄來的一封信，喬至少念了四遍給我聽。信上知會我們：基於我們留下戒指時在當鋪所簽的收據，他們得以避免賠償責任。也就是戒指在他們手上遭竊一事，他們無須負責。這簡直把我們的心給掏空了，戒指沒了，也沒有遺失的賠償金。


    喬承諾有一天再爲我買只戒指，但我告訴他那不重要，因爲沒有其他戒指比得上那只戒指對我的意義。喬給了我一個擁抱，把那封信擺一邊。'
  - '[PAGE 253]


    幾天後,我坐在小屋門檻上,天使米迦勒出現,看起來像是從小屋後方走來的。「我現在不想說話。」我對他說。米迦勒天使把手放在我的肩上說:「羅娜,戒指的事我感到很遺憾。我們無能為力。」我轉身面向米迦勒,他光芒四射的模樣讓我露出了些許微笑。

    「米迦勒,我只是希望你們能做些什麼。喬也很傷心,覺得自己讓我失望。幾天前他說,如果他能夠好好養家,戒指就不會流落到當鋪去。」

    「羅娜,要記得那不過是只戒指,是物質的東西。」米迦勒說,「只要記得喬的愛就夠了。」米迦勒的話讓我沉思了好一會兒,當然,他說的一點也沒錯。我覺得好多了。我轉身對米迦勒笑了笑,接著他消失不見。在那之後,我不再將戒指的事放在心上。


    我對政治不感興趣,但很在乎和平。這時是一九九○年代中期,許多與北愛爾蘭建立和平關係的言論正在蔓延。有一回,米迦勒天使和我坐在一起,我問了他關於北愛爾蘭的事情。他說有人會設法阻礙和談過程。儘管破壞者成功的機率很低,但和平仍然要很久以後才會到來。我們還需要約二十年時間,才能釐清一切。

    從那時候起,我就不斷觀察著。最近我注意到有些人變得更加開放與寬容,也被迫收回過去的立場,朝和平方向前進。米迦勒告訴我北愛爾蘭的和平不僅對愛爾蘭和大英帝國非常重要,也能為其他國家的恐怖組織帶來示範,顯示除了暴力之外,還有其他途徑能取得和平。我被告知愛爾蘭可以成爲世界和平的關鍵,雖然邪惡力量不斷想移除這個關鍵,但情勢'
- md: '一再反轉。愛爾蘭是個地區對抗地區，信仰對抗信仰的案例，假使愛爾蘭能達成和平，其他國家也可以。這甚至能對伊拉克、巴勒斯坦和以色列造成影響。


    我也曾看過未來世界的各種可能靈視影像，有時候看得我驚恐不已。那些我所見過的「可能未來」實在非常殘暴，假使其中一個世界真的來到，我並不希望活在世上。但我也看過許多美好世界的影像，在其中，每個人和諧平靜地生活。我相信未來的世界可以是個美好的地方，但我們每個人必須克盡己責。


    一般百姓都希望生活和平。有位住在北愛爾蘭的婦女來拜訪我，她的丈夫死於暴力，長子因為參與恐怖活動而遭到監禁。看到長子如此摧毀自己的生命，以及他為別人帶來的痛苦，讓她心碎。如今小兒子也步上長子的後塵，她很擔憂他最後也會喪命或被抓入監。她看不見這惡性循環終止的一天，所以每天到教堂為和平及正常的生活而祈禱，祈禱長子能回家，給他自己年幼的兒子作個好爸爸，也祈禱自己的小兒子能夠結婚生子。


    她說她受夠了參加不完的喪禮，也決心不把怨恨傳遞下去，可是她卻看見其他身為祖母的人積極傳遞怨恨。「那些身爲祖母的人如果能停止把怨恨灌注到孩子和孫子的身上，就能產生很大影響。」她說。她正朝這個方向努力，但不容易辦到。我全心祝福她。


    如我之前所說，天使們曾經告訴我，製造戰爭很容易，但創造並維持和平是件困難的事。


    最近幾個月來，我越來越焦慮喬的健康狀況，因為我看得見他的病情正在惡化。他越來越消瘦，胃部問題不斷，而且身體持續顫抖。我經常請醫生來，可是醫生似乎也無能為力。有一天喬在家躺在床上，病情嚴重，而且神智不清，不知道自己是誰，也不認得我。他非常痛苦，而我很害怕會失去他。他清醒時，竟發現自己左半邊身體動彈不得，語言模糊。


    # 喬中風了！


    喬在醫院裏待了好幾個月，進行密集的物理治療，學習如何再度走路和說話。在這之後，喬有好一段時間得拖著腳走路，而我也必須幫他切碎食物，因為他無法好好握住叉子。所幸經過一段時間後，他的說話能力恢復正常，從聲音裏已經聽不出中風的跡象。


    喬回家休養，我們總在天黑後出門散步，因為喬不想被人看見，怕人以爲他喝醉。我不斷告訴他，別人的想法不重要，而且散步時我會用手環抱著他（雖然他是個高大的男人，而我是個嬌小的女人）。由於我無法單獨撐住喬，所以天使們幫了我。喬會習慣性把我推到人行道外，幸好有天使的幫忙，否則我們一定跌倒。


    我經常為了喬向上帝和天使請求：「為什麼他要生病？為什麼你們不能讓他變好？為什麼不能讓生活如意些？」有一天，我到庭院裏哭泣，但假裝在做事，以免被人看見。米迦勒天使出現在我面前。我剛好伸手去摘李子葉，差點踩進他的身體裏。我對他哭訴：「米迦勒，我不願相信喬的生命即將結束，這太早了，請告訴上帝我承受不了，我不要喬死去。」


    「羅娜，上帝聽得見妳的聲音。」米迦勒回答，「他知道妳的心意，羅娜。看著我，看著我的眼睛，妳看見了什麼？」


    當我看進米迦勒天使的眼睛，一切都消失了，連米迦勒天使也不見。他的眼睛變成一道充滿光與生命的道路，兩旁站著雪白的天使，喬就走在路上，年輕又健壯。他和天使走在一起，朝著已往生的家人走去。喬正走在前往天堂的道路上。看見喬健康快樂的模樣，我內心也充滿喜悅。


    在這同時，我卻又哭求：「米迦勒天使，不要，不要！我不要喬死去。他太年輕了，才四十出頭而已，這不公平！」


    我站在李樹下哭得傷心欲絕，米迦勒安慰著我，用他的羽翅將我包起來，雙臂緊緊擁抱我。過了一會兒，米迦勒打開他的翅膀，並為我拭去淚水。


    「羅娜，妳要堅強，現在回去照顧家人和喬吧。」


    天使米迦勒摸了摸我的額頭後，就如一道閃光般消失無蹤。


    幾星期後，一位朋友請求我在隔天晚上會見一家人。基於喬的狀況，我有些遲疑，因為那個時候孩子已經放學回家，小小的屋子裏，又是晚餐、遊戲、回家作業等等，但最後我還是答應了。


    隔天晚上，喬意外地起床吃晚餐，並且決定和克里斯多夫去拜訪朋友。我不斷看著喬，他的靈魂似乎一直走在他前方一步的距離，我真的很害怕，請他不要出門，我可以在廚房會見那一家人。但喬覺得那家人來的時候，他不該在家，而且有克里斯多夫陪著，毋需擔心。


    敲門聲響起，那家人提早抵達。喬和克里斯多夫在走道上與客人擦肩而過。


    那家人離開時，喬也正好回來，彼此再度在走道上擦肩而過。我在前門和客人道別，回到廚房，喬看起來非常蒼白，而且抖個不停。我馬上燒水泡茶，並在茶水中放了四匙糖，要喬坐下來，立刻喝下甜茶。我做了三明治，再為他倒一杯茶，站在桌子的另一端看著他。我問他：「你確定你覺得還好嗎？」


    「我很好，」他答道，「不用大驚小怪。」


    他只吃得下兩口三明治，然後室內的氣氛突然改變了。那時候，露絲穿著睡衣打著赤腳，打開廚房的門問道：「媽，我可以打電話問朋友功課的事嗎？」


    我看著露絲，又看看喬，然後對露絲說：「好，不過要快。」接下來一切都在慢動作中發生，屋裏唯一的聲響是露絲撥的電話，接著傳來她的聲音：「哈囉。」


    然後事情發生了。喬的狀況嚴重惡化。我總是盡力不讓孩子們看到這一幕。但露絲在她爸爸抽搐時，開始歇斯底里驚叫。我得設法同時幫助丈夫和女兒。喬就要死去，我需要協助，只好在心底默默哭求：「天使們，快幫我！」並對露絲說：「去把克里斯多夫找來。」


    克里斯多夫剛好外出買東西，無法幫忙。我要露絲打九九九叫救護車，報上地址。露絲歇斯底里和電話線另一端的人說話。打完電話後，我要她快到鄰居家求助。露絲驚叫著跑出去，依然打著赤腳。


    我站在喬的身邊，抱著他，不斷祈禱，盡可能在生理上協助他，並在他倒坐餐桌邊時，緊緊抱著他。露絲才一出門，屋內就閃現一道光。此時喬和我坐在廚房中央的桌邊，周邊似乎被巨大的冰塊或水晶塊包圍住。這個立方塊的中央是中空的，非常冰冷，我看得見自己呼出的氣息，但同時又覺得很暖和。喬沒有氣息，呼吸停止，而且嘴唇變紫。我哭求著：「天使，我還沒準備好啊！」


    雪白的天使走入立方塊中，我尖聲哭求：「不要，上帝！你還不能帶走喬。請讓他在這個世界再待久一點。」


    我非常痛心地看著喬的靈魂完全離開了身體，米迦勒天使展現給我看過的道路出現在眼前。如先前的影像那樣，我看見喬的靈魂散發出光芒，美麗的天使和他走在一起，已經往生的家庭成員站在路的彼端歡迎他。他朝著他們走去，我仍然不斷祈求上帝讓喬在這個世界待久一點，還不要讓他死去，我仍需要他，孩子們也需要他。


    上帝的聲音傳來，我頓時感到一陣溫暖：「羅娜，我把他還給妳，但僅此一次，妳絕對不可以再度請求。」上帝的聲音非常堅定，我知道因為自己要求了那不可求的，所以他嚴厲待我，讓我覺得自己像個惹大人生氣的孩子。上帝以絕對的權威開口說話時，我便知道不該提出那樣的請求。從那時候起，上帝的話一直留在我的腦海裏警惕著我。


    突然間，喬坐了起來，嘴巴張開，彷彿要把生命吸回到他的人類軀體內。靈魂重回到他體內，那股生命力令人難以置信。這時候我才注意到是喬的守護天使讓他坐起身來。喬轉向我，聲音虛弱地說：「我想我剛剛朝天堂走去了。」然後就昏倒了。


    此時我才注意到露絲和鄰居急忙走入大門，同時聽見克里斯多夫和歐文邊跑上車道，邊喊著：「怎麼回事？」


    救護車抵達，我們費了點力氣說服喬到醫院。最後他答應了，我則搭鄰居的車跟著去。幾小時後，醫生出來告訴我，喬很幸運，因為他到達醫院時已經呈現昏迷狀態。「一定有人守護著他。」醫生轉身離去時這麼說著。我笑了，因為我當然知道有人在守護他，那就是他的守護天使。而且上帝展現了奇蹟，把生命還給他。


    喬在醫院住了兩星期。我不斷感謝上帝展現奇蹟，讓喬能回來再停留一段時間。我不知道我們還有多少時間可以在一起，是幾星期、幾個月還是一、兩年？我心中多麼期盼能有好幾年的時間，但我知道當時時間來臨，不能再度請求上帝讓喬活下去。


    儘管喬重回到我身邊，卻不曾恢復健康。他大多躺在床上，再也無法工作。生活對我們來說非常艱困，孩子也盡力幫忙，他們十二歲就開始打工，並且把部分收入給我。但喬和我決定不論經濟狀況多困難，都要讓孩子繼續讀書，接受良好的教育，因為我始終覺得自己十四歲就不再求學，讓我失去許多機會。


    我注意到柵門鏽得很厲害，需要重新油漆。一天早上我有點空，天氣清爽寒涼，我在棚子裏找到一支需要清洗的刷子和半罐黑色油漆，便開始動手粉刷柵門。這時候，一個孩子騎著腳踏車過來，停下來問候。那孩子是保羅，克里斯多夫學校裏的朋友，兩人年紀相仿，約莫十四歲。「你怎麼沒上學？」我問道。


    他說他生病請假，但覺得身體還好，能夠幫我一下。我給了他一把舊刀子，他一邊動手刮掉柵門上剝落的油漆，一邊聊著學校和釣魚，有說有笑。過了一會兒，我覺得做得差不多時，就謝謝保羅，跟他道別。他牽起腳踏車，繼續上路。他離去時，我看到他身邊跟著四位天使。


    四位天使似乎在保羅前面和兩側跑著，感覺像是要保護他，預防他從車上摔下來。我問道：「天使，你們在做什麼？」因為我看不出來他會摔倒，在我看來，他車子騎得很好。我沒看見他的守護天使。但當時我確實對保羅那時候來訪感到有些奇怪，因為他以前從未如此。


    但我對此事沒再多想。三天後，我又在外面油漆柵門，聽見有人走來，我停下手邊的工作走到路上，看見保羅牽著腳踏車朝我過來。他的守護天使跟在身後。我知道事有蹊蹺。保羅看起來身強體健，圍繞在他周圍的光應該是閃亮耀眼的，事實卻非如此。那光環相當微弱，使得他的生命之光看起來非常昏暗。我也無法理解他為何垂頭喪氣。


    我喊了他的名字，他抬頭看，給我一個大笑容，然後牽著腳踏車跑過來，把車子往地上一丟，問他是否能幫忙。「可以，你遲到了呢。」我笑著回答，然後轉身到小棚子裏去找另一支刷子，讓保羅在柵門邊等著。我走到小屋後方，問天使發生了什麼事。沒有天使現身，但多位天使異口同聲說：「羅娜，妳只要花時間和保羅相處，聽他說話即可。」「那不成問題，」我說，「希望能找到刷子給他用。」


    我找到了，我從小屋一側走回前門，保羅著急地在柵門邊等待。此時，他整個人發亮，閃耀明亮的光芒，我無法理解是什麼讓他散發出如此耀眼的光芒，而幾分鐘前光芒還是那麼微弱。看得出來他很快樂，這讓我也很高興。我們一起刷著柵門，保羅說說笑笑聊著天，並且提到兩週後就是他的生日。


    保羅該回去的時間到了，他騎著腳踏車離開，我再度看見四位天使在他身旁跑著，模樣非常滑稽，不禁笑了起來。四位天使衣著修長寬鬆，以優雅的姿勢跑著，像充滿熱氣的泡泡般輕輕彈跳，那泡泡閃耀著輕柔的水漾琥珀色澤，就像閃耀著光芒的水面一般。看著他們的模樣，眼睛相當舒服。保羅和天使們的身影消失後，我走過柵門，繞回小屋後方的棚子，然後呼喚自己的天使，詢問他們關於保羅的事情，但他們沒有回答。


    保羅的身影一直在我腦海裏揮之不去。隔天，我走到小屋附近的一條巷子，在一道通往田野的柵門前停下腳步，呼喚我的天使們。我以爲他們沒有在聽，打算轉身繼續朝小巷走去，天使以萊亞卻出現。他說：「羅娜，妳要去哪裏？快回來。」


    「也該是時候了，」我說，「你們都去了哪裏？」


    「羅娜，我們一直在妳身邊。」以萊亞回道。


    「天使以萊亞，我很擔心有個名叫保羅的男孩，我知道事情有些不對勁。」


    「羅娜，妳需要做的就是和保羅相處。」


    「以萊亞，我爲他擔憂。爲什麼我會爲他感到恐懼呢？他是那麼美麗的孩子。」


    「羅娜，有些時候，如果可以，天使的任務是設法改變特定的人或團體的未來。我們正在爲這孩子努力。我們對許多人耳語，請他們參與，但只有少數人願意傾聽，而這樣或許不夠。此時，妳是保羅的生命線，是他還活著的原因之一。妳總是願意傾聽，羅娜。現在，請妳回去繼續整理柵門，我們會讓保羅去找妳，跟妳開心聊天談笑。」「難道不能再多透露一些嗎，以萊亞？」我乞求。「不行，羅娜，妳一人無法改變他的未來，其他人也必須參與。」


    如我見過的許多事件一樣，這一回，一連串小事件也將累積成一件大事。這就是為什麼當天使鼓勵你去做些小事，例如對某人微笑，或告訴別人他表現很好，不論那件事在當時看起來多麼無關緊要，你都應該去做！因為很顯然的，再怎麼無關緊要的事情，最後也可能成爲重大事件的關鍵。


    每回我在屋外整理柵門，不論什麼時候，保羅都會出現，有時在早上，有時是傍晚，甚至晚上，他總會來幫忙。他問我能否邀請克里斯多夫在他生日那天一起去釣魚。我告訴他克里斯多夫一定很願意，不過只能星期天去，也就是保羅生日的隔天，因爲克里斯多夫星期六要在煤炭馬場工作。保羅說他們計畫全家一起去。他非常興奮，謝謝我讓克里斯多夫跟他一起去。我告訴他，我把克里斯多夫交給他照顧，請他確認克里斯多夫平安回家，並且要釣到很多魚，讓我在星期一能煮來當點心。保羅笑著說他會盡力而爲。


    那天克里斯多夫放學回家後，我告訴他關於保羅生日的邀請。克里斯多夫很高興，滿心期待把釣具準備好，放在門廳裏。我再度到外面油漆柵門，保羅仍舊來了。距離他的生日只剩幾天，他非常興奮。我們一起刷油漆，之後保羅開心回家。我看著他騎車上路，天使們依然緊跟在旁，保護著他，隨時準備接住他。


    從此我再也沒有見過保羅。一、兩天後，克里斯多夫用鑰匙打開大門，走進廚房，看起來非常悲傷。在他開口說話前，我已經知道事情跟保羅有關。「媽，保羅今天早上過世了，發生了悲慘的意外。我真不敢相信，我們原本要在他生日那天去釣魚。媽，我們現在去保羅家探望一下。」


    我非常震驚，這實在很不公平。我安慰克里斯多夫，給他一個擁抱，告訴他給保羅的母親一點時間再過去探望他們。


    隔天晚上克里斯多夫和我去了保羅家，他家裏許多人來來去去。喝過茶後，保羅的父親和克里斯多夫說了幾分鐘話，我們就道別，走路回家。在路上，克里斯多夫說：「媽，保羅不在的感覺好奇怪，那屋子顯得空空蕩蕩，我會很想念保羅。」


    保羅過世後約六個月，喬難得覺得身體好一點，想下床走動。當時十五歲的克里斯多夫陪著喬，一起到都柏林的酒吧去見一位老朋友。酒吧裏又暗又擠，非常吵雜，而且不斷湧進更多人，克里斯多夫緊緊跟在喬身邊。喬找到朋友後，三人朝門口走去。


    這時有人開始互相推擠，還打起架來。克里斯多夫說他嚇到了。有些男人跟在他們身後走到大街上，開始找碴想打架，其中一人手中還拿著打破的瓶子。喬告訴那些人他們不想打架惹麻煩，只是來找朋友，同時繼續往前走，但那些男人開始推他們。克里斯多夫說他真的非常害怕。突然間，他強烈感覺到保羅的存在。克里斯多夫告訴我：「媽，我很確定他就在那裏。他本人彷彿就在現場，就像你我一樣真實存在著。他把那些男人往後推，把我們往前推，我感覺得到保羅在保護我和爸。我這輩子不曾如此恐懼，但是當我感覺到保羅的存在，就知道我們會平安無事。」


    我告訴克里斯多夫要記得，當他需要保羅的保護時，他永遠會在身旁。多年來，我多次想起保羅，感謝他為我保護克里斯多夫，感謝他記得我請求他保護克里斯多夫的安全。


    我每天買完東西回家後，都會端一杯茶給喬，在他身邊坐下聊天。有一天，喬有件事要告訴我。喬的守護天使就坐在他身邊，床上還有許多天使，全都看向喬，等他說話。


    「羅娜，妳一定不會相信，」他說，「今天妳出門後，有個小孩子靈體蹦蹦跳跳來到房裡，模樣大約三歲，一頭蓬蓬的棕色長髮，身上看起來很髒，像是在泥巴裏玩耍過，兩手還沾著泥塊。她就站在妳坐的位置說：『爸，跟我玩。』然後又轉身蹦蹦跳跳離開房間。」


    我聽了既高興又驚訝！我知道這意味將要有另一個孩子了。我們一直很想再有孩子，但是露絲已經十二歲，加上喬的健康狀況，我根本不敢奢望。這是個奇蹟。我感謝了上帝和天使。


    喬過去不曾見過靈體，這次彷彿是上帝和天使們特意允許喬能看見，幫助他了解自己不僅只是個軀體。


    我並未立即告訴喬那表示我們即將生個小女兒，只是讓他沉浸在看見美麗小靈體的喜悅之中。「她為什麼叫我爸爸呢？」他好奇地問。


    我還沒懷孕前就看見了這個小靈體。她和喬描述的一模一樣。有一回，我為喬泡茶，端著茶盤要走出廚房時，小女孩從餐廳門口跳著出來，模樣非常美麗，很快又消失不見。我打開通往臥室的房門，喬隨即開口說小女孩又來了，喊他爸爸，要他陪她玩。


    這回我告訴喬上帝要為我們送來另一個女兒。喬難以置信。「上帝必須在我身上灌注許多生命力，才能讓我再生個孩子。這真的需要奇蹟！」


    但是不久之後，我發現自己懷孕了。


    一天我站在鏡子前，天使以一道金黃色光芒出現在我四周。接著，我看見自己腹中的生命能量旋轉著，散發出各種光芒，有翡翠藍、翡翠綠、翡翠紅和翡翠紫，光的漩渦張開時，我看見小寶寶像個發光的塵粒。這個景象使我對未出世的寶寶充滿愛與感動。


    自從生下露絲已經過了十二年，所以我得花些時間重新適應妊娠狀態。我早已把小寶寶需要的東西送人，天使得花很大功夫來幫忙，去對許多人耳語。小寶寶梅根出世時，我已經有了新生寶寶所需要的一切物品。我非常感謝天使的協助，也感謝所有傾聽天使說話的人。


    有時候，我能清楚感受到天使究竟有多努力。那年聖誕節，我們又非常拮据。聖誕節前的某一晚，我們坐在廚房吃晚餐，門口傳來敲門聲。克里斯多夫去開門，然後幫一位奇怪的人搬進一個大箱子。


    克里斯多夫介紹客人是學校的神父湯姆。神父說：「希望我沒有打擾到你們。學校家政課同意我把他們今年所有的聖誕節烘焙成品，送給梅努斯的某個家庭，我聽說你們應該用得上這些東西。聖誕節前夕，我還會送來一隻烤火雞和火腿。別擔心，課堂的學生沒人知道東西送到哪裏。這就是我隻身前來的原因。我早就希望克里斯多夫會在家，能幫我把箱子搬進來。」'
  mdcn: '一再反轉。愛爾蘭是個地區對抗地區，信仰對抗信仰的案例，假使愛爾蘭能達成和平，其他國家也可以。這甚至能對伊拉克、巴勒斯坦和以色列造成影響。


    我也曾看過未來世界的各種可能靈視影像，有時候看得我驚恐不已。那些我所見過的「可能未來」實在非常殘暴，假使其中一個世界真的來到，我並不希望活在世上。但我也看過許多美好世界的影像，在其中，每個人和諧平靜地生活。我相信未來的世界可以是個美好的地方，但我們每個人必須克盡己責。


    一般百姓都希望生活和平。有位住在北愛爾蘭的婦女來拜訪我，她的丈夫死於暴力，長子因為參與恐怖活動而遭到監禁。看到長子如此摧毀自己的生命，以及他為別人帶來的痛苦，讓她心碎。如今小兒子也步上長子的後塵，她很擔憂他最後也會喪命或被抓入監。她看不見這惡性循環終止的一天，所以每天到教堂為和平及正常的生活而祈禱，祈禱長子能回家，給他自己年幼的兒子作個好爸爸，也祈禱自己的小兒子能夠結婚生子。


    她說她受夠了參加不完的喪禮，也決心不把怨恨傳遞下去，可是她卻看見其他身為祖母的人積極傳遞怨恨。「那些身爲祖母的人如果能停止把怨恨灌注到孩子和孫子的身上，就能產生很大影響。」她說。她正朝這個方向努力，但不容易辦到。我全心祝福她。


    如我之前所說，天使們曾經告訴我，製造戰爭很容易，但創造並維持和平是件困難的事。


    最近幾個月來，我越來越焦慮喬的健康狀況，因為我看得見他的病情正在惡化。他越來越消瘦，胃部問題不斷，而且身體持續顫抖。我經常請醫生來，可是醫生似乎也無能為力。有一天喬在家躺在床上，病情嚴重，而且神智不清，不知道自己是誰，也不認得我。他非常痛苦，而我很害怕會失去他。他清醒時，竟發現自己左半邊身體動彈不得，語言模糊。


    # 喬中風了！


    喬在醫院裏待了好幾個月，進行密集的物理治療，學習如何再度走路和說話。在這之後，喬有好一段時間得拖著腳走路，而我也必須幫他切碎食物，因為他無法好好握住叉子。所幸經過一段時間後，他的說話能力恢復正常，從聲音裏已經聽不出中風的跡象。


    喬回家休養，我們總在天黑後出門散步，因為喬不想被人看見，怕人以爲他喝醉。我不斷告訴他，別人的想法不重要，而且散步時我會用手環抱著他（雖然他是個高大的男人，而我是個嬌小的女人）。由於我無法單獨撐住喬，所以天使們幫了我。喬會習慣性把我推到人行道外，幸好有天使的幫忙，否則我們一定跌倒。


    我經常為了喬向上帝和天使請求：「為什麼他要生病？為什麼你們不能讓他變好？為什麼不能讓生活如意些？」有一天，我到庭院裏哭泣，但假裝在做事，以免被人看見。米迦勒天使出現在我面前。我剛好伸手去摘李子葉，差點踩進他的身體裏。我對他哭訴：「米迦勒，我不願相信喬的生命即將結束，這太早了，請告訴上帝我承受不了，我不要喬死去。」


    「羅娜，上帝聽得見妳的聲音。」米迦勒回答，「他知道妳的心意，羅娜。看著我，看著我的眼睛，妳看見了什麼？」


    當我看進米迦勒天使的眼睛，一切都消失了，連米迦勒天使也不見。他的眼睛變成一道充滿光與生命的道路，兩旁站著雪白的天使，喬就走在路上，年輕又健壯。他和天使走在一起，朝著已往生的家人走去。喬正走在前往天堂的道路上。看見喬健康快樂的模樣，我內心也充滿喜悅。


    在這同時，我卻又哭求：「米迦勒天使，不要，不要！我不要喬死去。他太年輕了，才四十出頭而已，這不公平！」


    我站在李樹下哭得傷心欲絕，米迦勒安慰著我，用他的羽翅將我包起來，雙臂緊緊擁抱我。過了一會兒，米迦勒打開他的翅膀，並為我拭去淚水。


    「羅娜，妳要堅強，現在回去照顧家人和喬吧。」


    天使米迦勒摸了摸我的額頭後，就如一道閃光般消失無蹤。


    幾星期後，一位朋友請求我在隔天晚上會見一家人。基於喬的狀況，我有些遲疑，因為那個時候孩子已經放學回家，小小的屋子裏，又是晚餐、遊戲、回家作業等等，但最後我還是答應了。


    隔天晚上，喬意外地起床吃晚餐，並且決定和克里斯多夫去拜訪朋友。我不斷看著喬，他的靈魂似乎一直走在他前方一步的距離，我真的很害怕，請他不要出門，我可以在廚房會見那一家人。但喬覺得那家人來的時候，他不該在家，而且有克里斯多夫陪著，毋需擔心。


    敲門聲響起，那家人提早抵達。喬和克里斯多夫在走道上與客人擦肩而過。


    那家人離開時，喬也正好回來，彼此再度在走道上擦肩而過。我在前門和客人道別，回到廚房，喬看起來非常蒼白，而且抖個不停。我馬上燒水泡茶，並在茶水中放了四匙糖，要喬坐下來，立刻喝下甜茶。我做了三明治，再為他倒一杯茶，站在桌子的另一端看著他。我問他：「你確定你覺得還好嗎？」


    「我很好，」他答道，「不用大驚小怪。」


    他只吃得下兩口三明治，然後室內的氣氛突然改變了。那時候，露絲穿著睡衣打著赤腳，打開廚房的門問道：「媽，我可以打電話問朋友功課的事嗎？」


    我看著露絲，又看看喬，然後對露絲說：「好，不過要快。」接下來一切都在慢動作中發生，屋裏唯一的聲響是露絲撥的電話，接著傳來她的聲音：「哈囉。」


    然後事情發生了。喬的狀況嚴重惡化。我總是盡力不讓孩子們看到這一幕。但露絲在她爸爸抽搐時，開始歇斯底里驚叫。我得設法同時幫助丈夫和女兒。喬就要死去，我需要協助，只好在心底默默哭求：「天使們，快幫我！」並對露絲說：「去把克里斯多夫找來。」


    克里斯多夫剛好外出買東西，無法幫忙。我要露絲打九九九叫救護車，報上地址。露絲歇斯底里和電話線另一端的人說話。打完電話後，我要她快到鄰居家求助。露絲驚叫著跑出去，依然打著赤腳。


    我站在喬的身邊，抱著他，不斷祈禱，盡可能在生理上協助他，並在他倒坐餐桌邊時，緊緊抱著他。露絲才一出門，屋內就閃現一道光。此時喬和我坐在廚房中央的桌邊，周邊似乎被巨大的冰塊或水晶塊包圍住。這個立方塊的中央是中空的，非常冰冷，我看得見自己呼出的氣息，但同時又覺得很暖和。喬沒有氣息，呼吸停止，而且嘴唇變紫。我哭求著：「天使，我還沒準備好啊！」


    雪白的天使走入立方塊中，我尖聲哭求：「不要，上帝！你還不能帶走喬。請讓他在這個世界再待久一點。」


    我非常痛心地看著喬的靈魂完全離開了身體，米迦勒天使展現給我看過的道路出現在眼前。如先前的影像那樣，我看見喬的靈魂散發出光芒，美麗的天使和他走在一起，已經往生的家庭成員站在路的彼端歡迎他。他朝著他們走去，我仍然不斷祈求上帝讓喬在這個世界待久一點，還不要讓他死去，我仍需要他，孩子們也需要他。


    上帝的聲音傳來，我頓時感到一陣溫暖：「羅娜，我把他還給妳，但僅此一次，妳絕對不可以再度請求。」上帝的聲音非常堅定，我知道因為自己要求了那不可求的，所以他嚴厲待我，讓我覺得自己像個惹大人生氣的孩子。上帝以絕對的權威開口說話時，我便知道不該提出那樣的請求。從那時候起，上帝的話一直留在我的腦海裏警惕著我。


    突然間，喬坐了起來，嘴巴張開，彷彿要把生命吸回到他的人類軀體內。靈魂重回到他體內，那股生命力令人難以置信。這時候我才注意到是喬的守護天使讓他坐起身來。喬轉向我，聲音虛弱地說：「我想我剛剛朝天堂走去了。」然後就昏倒了。


    此時我才注意到露絲和鄰居急忙走入大門，同時聽見克里斯多夫和歐文邊跑上車道，邊喊著：「怎麼回事？」


    救護車抵達，我們費了點力氣說服喬到醫院。最後他答應了，我則搭鄰居的車跟著去。幾小時後，醫生出來告訴我，喬很幸運，因為他到達醫院時已經呈現昏迷狀態。「一定有人守護著他。」醫生轉身離去時這麼說著。我笑了，因為我當然知道有人在守護他，那就是他的守護天使。而且上帝展現了奇蹟，把生命還給他。


    喬在醫院住了兩星期。我不斷感謝上帝展現奇蹟，讓喬能回來再停留一段時間。我不知道我們還有多少時間可以在一起，是幾星期、幾個月還是一、兩年？我心中多麼期盼能有好幾年的時間，但我知道當時時間來臨，不能再度請求上帝讓喬活下去。


    儘管喬重回到我身邊，卻不曾恢復健康。他大多躺在床上，再也無法工作。生活對我們來說非常艱困，孩子也盡力幫忙，他們十二歲就開始打工，並且把部分收入給我。但喬和我決定不論經濟狀況多困難，都要讓孩子繼續讀書，接受良好的教育，因為我始終覺得自己十四歲就不再求學，讓我失去許多機會。


    我注意到柵門鏽得很厲害，需要重新油漆。一天早上我有點空，天氣清爽寒涼，我在棚子裏找到一支需要清洗的刷子和半罐黑色油漆，便開始動手粉刷柵門。這時候，一個孩子騎著腳踏車過來，停下來問候。那孩子是保羅，克里斯多夫學校裏的朋友，兩人年紀相仿，約莫十四歲。「你怎麼沒上學？」我問道。


    他說他生病請假，但覺得身體還好，能夠幫我一下。我給了他一把舊刀子，他一邊動手刮掉柵門上剝落的油漆，一邊聊著學校和釣魚，有說有笑。過了一會兒，我覺得做得差不多時，就謝謝保羅，跟他道別。他牽起腳踏車，繼續上路。他離去時，我看到他身邊跟著四位天使。


    四位天使似乎在保羅前面和兩側跑著，感覺像是要保護他，預防他從車上摔下來。我問道：「天使，你們在做什麼？」因為我看不出來他會摔倒，在我看來，他車子騎得很好。我沒看見他的守護天使。但當時我確實對保羅那時候來訪感到有些奇怪，因為他以前從未如此。


    但我對此事沒再多想。三天後，我又在外面油漆柵門，聽見有人走來，我停下手邊的工作走到路上，看見保羅牽著腳踏車朝我過來。他的守護天使跟在身後。我知道事有蹊蹺。保羅看起來身強體健，圍繞在他周圍的光應該是閃亮耀眼的，事實卻非如此。那光環相當微弱，使得他的生命之光看起來非常昏暗。我也無法理解他為何垂頭喪氣。


    我喊了他的名字，他抬頭看，給我一個大笑容，然後牽著腳踏車跑過來，把車子往地上一丟，問他是否能幫忙。「可以，你遲到了呢。」我笑著回答，然後轉身到小棚子裏去找另一支刷子，讓保羅在柵門邊等著。我走到小屋後方，問天使發生了什麼事。沒有天使現身，但多位天使異口同聲說：「羅娜，妳只要花時間和保羅相處，聽他說話即可。」「那不成問題，」我說，「希望能找到刷子給他用。」


    我找到了，我從小屋一側走回前門，保羅著急地在柵門邊等待。此時，他整個人發亮，閃耀明亮的光芒，我無法理解是什麼讓他散發出如此耀眼的光芒，而幾分鐘前光芒還是那麼微弱。看得出來他很快樂，這讓我也很高興。我們一起刷著柵門，保羅說說笑笑聊著天，並且提到兩週後就是他的生日。


    保羅該回去的時間到了，他騎著腳踏車離開，我再度看見四位天使在他身旁跑著，模樣非常滑稽，不禁笑了起來。四位天使衣著修長寬鬆，以優雅的姿勢跑著，像充滿熱氣的泡泡般輕輕彈跳，那泡泡閃耀著輕柔的水漾琥珀色澤，就像閃耀著光芒的水面一般。看著他們的模樣，眼睛相當舒服。保羅和天使們的身影消失後，我走過柵門，繞回小屋後方的棚子，然後呼喚自己的天使，詢問他們關於保羅的事情，但他們沒有回答。


    保羅的身影一直在我腦海裏揮之不去。隔天，我走到小屋附近的一條巷子，在一道通往田野的柵門前停下腳步，呼喚我的天使們。我以爲他們沒有在聽，打算轉身繼續朝小巷走去，天使以萊亞卻出現。他說：「羅娜，妳要去哪裏？快回來。」


    「也該是時候了，」我說，「你們都去了哪裏？」


    「羅娜，我們一直在妳身邊。」以萊亞回道。


    「天使以萊亞，我很擔心有個名叫保羅的男孩，我知道事情有些不對勁。」


    「羅娜，妳需要做的就是和保羅相處。」


    「以萊亞，我爲他擔憂。爲什麼我會爲他感到恐懼呢？他是那麼美麗的孩子。」


    「羅娜，有些時候，如果可以，天使的任務是設法改變特定的人或團體的未來。我們正在爲這孩子努力。我們對許多人耳語，請他們參與，但只有少數人願意傾聽，而這樣或許不夠。此時，妳是保羅的生命線，是他還活著的原因之一。妳總是願意傾聽，羅娜。現在，請妳回去繼續整理柵門，我們會讓保羅去找妳，跟妳開心聊天談笑。」「難道不能再多透露一些嗎，以萊亞？」我乞求。「不行，羅娜，妳一人無法改變他的未來，其他人也必須參與。」


    如我見過的許多事件一樣，這一回，一連串小事件也將累積成一件大事。這就是為什麼當天使鼓勵你去做些小事，例如對某人微笑，或告訴別人他表現很好，不論那件事在當時看起來多麼無關緊要，你都應該去做！因為很顯然的，再怎麼無關緊要的事情，最後也可能成爲重大事件的關鍵。


    每回我在屋外整理柵門，不論什麼時候，保羅都會出現，有時在早上，有時是傍晚，甚至晚上，他總會來幫忙。他問我能否邀請克里斯多夫在他生日那天一起去釣魚。我告訴他克里斯多夫一定很願意，不過只能星期天去，也就是保羅生日的隔天，因爲克里斯多夫星期六要在煤炭馬場工作。保羅說他們計畫全家一起去。他非常興奮，謝謝我讓克里斯多夫跟他一起去。我告訴他，我把克里斯多夫交給他照顧，請他確認克里斯多夫平安回家，並且要釣到很多魚，讓我在星期一能煮來當點心。保羅笑著說他會盡力而爲。


    那天克里斯多夫放學回家後，我告訴他關於保羅生日的邀請。克里斯多夫很高興，滿心期待把釣具準備好，放在門廳裏。我再度到外面油漆柵門，保羅仍舊來了。距離他的生日只剩幾天，他非常興奮。我們一起刷油漆，之後保羅開心回家。我看著他騎車上路，天使們依然緊跟在旁，保護著他，隨時準備接住他。


    從此我再也沒有見過保羅。一、兩天後，克里斯多夫用鑰匙打開大門，走進廚房，看起來非常悲傷。在他開口說話前，我已經知道事情跟保羅有關。「媽，保羅今天早上過世了，發生了悲慘的意外。我真不敢相信，我們原本要在他生日那天去釣魚。媽，我們現在去保羅家探望一下。」


    我非常震驚，這實在很不公平。我安慰克里斯多夫，給他一個擁抱，告訴他給保羅的母親一點時間再過去探望他們。


    隔天晚上克里斯多夫和我去了保羅家，他家裏許多人來來去去。喝過茶後，保羅的父親和克里斯多夫說了幾分鐘話，我們就道別，走路回家。在路上，克里斯多夫說：「媽，保羅不在的感覺好奇怪，那屋子顯得空空蕩蕩，我會很想念保羅。」


    保羅過世後約六個月，喬難得覺得身體好一點，想下床走動。當時十五歲的克里斯多夫陪著喬，一起到都柏林的酒吧去見一位老朋友。酒吧裏又暗又擠，非常吵雜，而且不斷湧進更多人，克里斯多夫緊緊跟在喬身邊。喬找到朋友後，三人朝門口走去。


    這時有人開始互相推擠，還打起架來。克里斯多夫說他嚇到了。有些男人跟在他們身後走到大街上，開始找碴想打架，其中一人手中還拿著打破的瓶子。喬告訴那些人他們不想打架惹麻煩，只是來找朋友，同時繼續往前走，但那些男人開始推他們。克里斯多夫說他真的非常害怕。突然間，他強烈感覺到保羅的存在。克里斯多夫告訴我：「媽，我很確定他就在那裏。他本人彷彿就在現場，就像你我一樣真實存在著。他把那些男人往後推，把我們往前推，我感覺得到保羅在保護我和爸。我這輩子不曾如此恐懼，但是當我感覺到保羅的存在，就知道我們會平安無事。」


    我告訴克里斯多夫要記得，當他需要保羅的保護時，他永遠會在身旁。多年來，我多次想起保羅，感謝他為我保護克里斯多夫，感謝他記得我請求他保護克里斯多夫的安全。


    我每天買完東西回家後，都會端一杯茶給喬，在他身邊坐下聊天。有一天，喬有件事要告訴我。喬的守護天使就坐在他身邊，床上還有許多天使，全都看向喬，等他說話。


    「羅娜，妳一定不會相信，」他說，「今天妳出門後，有個小孩子靈體蹦蹦跳跳來到房裡，模樣大約三歲，一頭蓬蓬的棕色長髮，身上看起來很髒，像是在泥巴裏玩耍過，兩手還沾著泥塊。她就站在妳坐的位置說：『爸，跟我玩。』然後又轉身蹦蹦跳跳離開房間。」


    我聽了既高興又驚訝！我知道這意味將要有另一個孩子了。我們一直很想再有孩子，但是露絲已經十二歲，加上喬的健康狀況，我根本不敢奢望。這是個奇蹟。我感謝了上帝和天使。


    喬過去不曾見過靈體，這次彷彿是上帝和天使們特意允許喬能看見，幫助他了解自己不僅只是個軀體。


    我並未立即告訴喬那表示我們即將生個小女兒，只是讓他沉浸在看見美麗小靈體的喜悅之中。「她為什麼叫我爸爸呢？」他好奇地問。


    我還沒懷孕前就看見了這個小靈體。她和喬描述的一模一樣。有一回，我為喬泡茶，端著茶盤要走出廚房時，小女孩從餐廳門口跳著出來，模樣非常美麗，很快又消失不見。我打開通往臥室的房門，喬隨即開口說小女孩又來了，喊他爸爸，要他陪她玩。


    這回我告訴喬上帝要為我們送來另一個女兒。喬難以置信。「上帝必須在我身上灌注許多生命力，才能讓我再生個孩子。這真的需要奇蹟！」


    但是不久之後，我發現自己懷孕了。


    一天我站在鏡子前，天使以一道金黃色光芒出現在我四周。接著，我看見自己腹中的生命能量旋轉著，散發出各種光芒，有翡翠藍、翡翠綠、翡翠紅和翡翠紫，光的漩渦張開時，我看見小寶寶像個發光的塵粒。這個景象使我對未出世的寶寶充滿愛與感動。


    自從生下露絲已經過了十二年，所以我得花些時間重新適應妊娠狀態。我早已把小寶寶需要的東西送人，天使得花很大功夫來幫忙，去對許多人耳語。小寶寶梅根出世時，我已經有了新生寶寶所需要的一切物品。我非常感謝天使的協助，也感謝所有傾聽天使說話的人。


    有時候，我能清楚感受到天使究竟有多努力。那年聖誕節，我們又非常拮据。聖誕節前的某一晚，我們坐在廚房吃晚餐，門口傳來敲門聲。克里斯多夫去開門，然後幫一位奇怪的人搬進一個大箱子。


    克里斯多夫介紹客人是學校的神父湯姆。神父說：「希望我沒有打擾到你們。學校家政課同意我把他們今年所有的聖誕節烘焙成品，送給梅努斯的某個家庭，我聽說你們應該用得上這些東西。聖誕節前夕，我還會送來一隻烤火雞和火腿。別擔心，課堂的學生沒人知道東西送到哪裏。這就是我隻身前來的原因。我早就希望克里斯多夫會在家，能幫我把箱子搬進來。」'
  merge: 1
  raw:
  - '[PAGE 254]


    一再反轉。

    愛爾蘭是個地區對抗地區，信仰對抗信仰的案例，假使愛爾蘭能達成和平，其他國家也可以。這甚至能對伊拉克、巴勒斯坦和以色列造成影響。

    我也曾看過未來世界的各種可能靈視影像，有時候看得我驚恐不已。那些我所見過的「可能未來」實在非常殘暴，假使其中一個世界真的來到，我並不希望活在世上。但我也看過許多美好世界的影像，在其中，每個人和諧平靜地生活。我相信未來的世界可以是個美好的地方，但我們每個人必須克盡己責。


    一般百姓都希望生活和平。有位住在北愛爾蘭的婦女來拜訪我，她的丈夫死於暴力，長子因為參與恐怖活動而遭到監禁。看到長子如此摧毀自己的生命，以及他為別人帶來的痛苦，讓她心碎。如今小兒子也步上長子的後塵，她很擔憂他最後也會喪命或被抓入監。她看不見這惡性循環終止的一天，所以每天到教堂為和平及正常的生活而祈禱，祈禱長子能回家，給他自己年幼的兒子作個好爸爸，也祈禱自己的小兒子能夠結婚生子。

    她說她受夠了參加不完的喪禮，也決心不把怨恨傳遞下去，可是她卻看見其他身為祖母的人積極傳遞怨恨。「那些身爲祖母的人如果能停止把怨恨灌注到孩子和孫子的身上，就能產生很大影響。」她說。她正朝這個方向努力，但不容易辦到。我全心祝福她。

    如我之前所說，天使們曾經告訴我，製造戰爭很容易，但創造並維持和平是件困難的事。'
  - '[PAGE 255]


    最近幾個月來，我越來越焦慮喬的健康狀況，因為我看得見他的病情正在惡化。他越來越消瘦，胃部問題不斷，而且身體持續顫抖。我經常請醫生來，可是醫生似乎也無能為力。有一天喬在家躺在床上，病情嚴重，而且神智不清，不知道自己是誰，也不認得我。他非常痛苦，而我很害怕會失去他。他清醒時，竟發現自己左半邊身體動彈不得，語言模糊。


    # 喬中風了！


    喬在醫院裏待了好幾個月，進行密集的物理治療，學習如何再度走路和說話。在這之後，喬有好一段時間得拖著腳走路，而我也必須幫他切碎食物，因為他無法好好握住叉子。所幸經過一段時間後，他的說話能力恢復正常，從聲音裏已經聽不出中風的跡象。


    喬回家休養，我們總在天黑後出門散步，因為喬不想被人看見，怕人以爲他喝醉。我不斷告訴他，別人的想法不重要，而且散步時我會用手環抱著他（雖然他是個高大的男人，而我是個嬌小的女人）。由於我無法單獨撐住喬，所以天使們幫了我。喬會習慣性把我推到人行道外，幸好有天使的幫忙，否則我們一定跌倒。


    我經常為了喬向上帝和天使請求：「為什麼他要生病？為什麼你們不能讓他變好？為什麼不能讓生活如意些？」有一天，我到庭院裏哭泣，但假裝在做事，以免被人看見。米迦勒天使出現在我面前。我剛好伸手去摘李子葉，差點踩進他的身體裏。我對他哭訴：「米迦勒，我不願相信喬的生命即將結束，這太早了，請告訴上帝我承受不了，我不要喬死去。」'
  - '[PAGE 256]


    「羅娜，上帝聽得見妳的聲音。」米迦勒回答，「他知道妳的心意，羅娜。看著我，看著我的眼睛，妳看見了什麼？」


    當我看進米迦勒天使的眼睛，一切都消失了，連米迦勒天使也不見。他的眼睛變成一道充滿光與生命的道路，兩旁站著雪白的天使，喬就走在路上，年輕又健壯。他和天使走在一起，朝著已往生的家人走去。喬正走在前往天堂的道路上。看見喬健康快樂的模樣，我內心也充滿喜悅。


    在這同時，我卻又哭求：「米迦勒天使，不要，不要！我不要喬死去。他太年輕了，才四十出頭而已，這不公平！」


    我站在李樹下哭得傷心欲絕，米迦勒安慰著我，用他的羽翅將我包起來，雙臂緊緊擁抱我。過了一會兒，米迦勒打開他的翅膀，並為我拭去淚水。


    「羅娜，妳要堅強，現在回去照顧家人和喬吧。」


    天使米迦勒摸了摸我的額頭後，就如一道閃光般消失無蹤。


    幾星期後，一位朋友請求我在隔天晚上會見一家人。基於喬的狀況，我有些遲疑，因為那個時候孩子已經放學回家，小小的屋子裏，又是晚餐、遊戲、回家作業等等，但最後我還是答應了。


    隔天晚上，喬意外地起床吃晚餐，並且決定和克里斯多夫去拜訪朋友。我不斷看著喬，他的靈魂似乎一直走在他前方一步的距離，我真的很害怕，請他不要出門，我可以在廚房會見那一家人。但喬覺得那家人來的時候，他不該在家，而且有克里斯多夫陪著，毋需擔心。'
  - '[PAGE 257]


    敲門聲響起，那家人提早抵達。喬和克里斯多夫在走道上與客人擦肩而過。

    那家人離開時，喬也正好回來，彼此再度在走道上擦肩而過。我在前門和客人道別，回到廚房，喬看起來非常蒼白，而且抖個不停。我馬上燒水泡茶，並在茶水中放了四匙糖，要喬坐下來，立刻喝下甜茶。我做了三明治，再為他倒一杯茶，站在桌子的另一端看著他。我問他：「你確定你覺得還好嗎？」

    「我很好，」他答道，「不用大驚小怪。」

    他只吃得下兩口三明治，然後室內的氣氛突然改變了。那時候，露絲穿著睡衣打著赤腳，打開廚房的門問道：「媽，我可以打電話問朋友功課的事嗎？」

    我看著露絲，又看看喬，然後對露絲說：「好，不過要快。」接下來一切都在慢動作中發生，屋裏唯一的聲響是露絲撥的電話，接著傳來她的聲音：「哈囉。」

    然後事情發生了。喬的狀況嚴重惡化。我總是盡力不讓孩子們看到這一幕。但露絲在她爸爸抽搐時，開始歇斯底里驚叫。我得設法同時幫助丈夫和女兒。喬就要死去，我需要協助，只好在心底默默哭求：「天使們，快幫我！」並對露絲說：「去把克里斯多夫找來。」

    克里斯多夫剛好外出買東西，無法幫忙。我要露絲打九九九叫救護車，報上地址。露絲歇斯底里和電話線另一端的人說話。打完電話後，我要她快到鄰居家求助。露絲驚叫著跑出去，依然打著赤腳。

    我站在喬的身邊，抱著他，不斷祈禱，盡可能在生理上協助他，並在他倒坐餐桌邊時，緊緊抱著他。露絲才一出門，屋內就閃現一道光。此時喬和我坐在廚房中央的桌邊，周邊似'
  - '[PAGE 258]


    乎被巨大的冰塊或水晶塊包圍住。這個立方塊的中央是中空的，非常冰冷，我看得見自己呼出的氣息，但同時又覺得很暖和。喬沒有氣息，呼吸停止，而且嘴唇變紫。我哭求著：「天使，我還沒準備好啊！」


    雪白的天使走入立方塊中，我尖聲哭求：「不要，上帝！你還不能帶走喬。請讓他在這個世界再待久一點。」


    我非常痛心地看著喬的靈魂完全離開了身體，米迦勒天使展現給我看過的道路出現在眼前。如先前的影像那樣，我看見喬的靈魂散發出光芒，美麗的天使和他走在一起，已經往生的家庭成員站在路的彼端歡迎他。他朝著他們走去，我仍然不斷祈求上帝讓喬在這個世界待久一點，還不要讓他死去，我仍需要他，孩子們也需要他。


    上帝的聲音傳來，我頓時感到一陣溫暖：「羅娜，我把他還給妳，但僅此一次，妳絕對不可以再度請求。」上帝的聲音非常堅定，我知道因為自己要求了那不可求的，所以他嚴厲待我，讓我覺得自己像個惹大人生氣的孩子。上帝以絕對的權威開口說話時，我便知道不該提出那樣的請求。從那時候起，上帝的話一直留在我的腦海裏警惕著我。


    突然間，喬坐了起來，嘴巴張開，彷彿要把生命吸回到他的人類軀體內。靈魂重回到他體內，那股生命力令人難以置信。這時候我才注意到是喬的守護天使讓他坐起身來。喬轉向我，聲音虛弱地說：「我想我剛剛朝天堂走去了。」然後就昏倒了。


    此時我才注意到露絲和鄰居急忙走入大門，同時聽見克里斯多夫和歐文邊跑上車道，邊喊著：「怎麼回事？」'
  - '[PAGE 259]


    救護車抵達，我們費了點力氣說服喬到醫院。最後他答應了，我則搭鄰居的車跟著去。幾小時後，醫生出來告訴我，喬很幸運，因為他到達醫院時已經呈現昏迷狀態。「一定有人守護著他。」醫生轉身離去時這麼說著。我笑了，因為我當然知道有人在守護他，那就是他的守護天使。而且上帝展現了奇蹟，把生命還給他。


    喬在醫院住了兩星期。我不斷感謝上帝展現奇蹟，讓喬能回來再停留一段時間。我不知道我們還有多少時間可以在一起，是幾星期、幾個月還是一、兩年？我心中多麼期盼能有好幾年的時間，但我知道當時時間來臨，不能再度請求上帝讓喬活下去。


    儘管喬重回到我身邊，卻不曾恢復健康。他大多躺在床上，再也無法工作。生活對我們來說非常艱困，孩子也盡力幫忙，他們十二歲就開始打工，並且把部分收入給我。但喬和我決定不論經濟狀況多困難，都要讓孩子繼續讀書，接受良好的教育，因為我始終覺得自己十四歲就不再求學，讓我失去許多機會。


    我注意到柵門鏽得很厲害，需要重新油漆。一天早上我有點空，天氣清爽寒涼，我在棚子裏找到一支需要清洗的刷子和半罐黑色油漆，便開始動手粉刷柵門。這時候，一個孩子騎著腳踏車過來，停下來問候。那孩子是保羅，克里斯多夫學校裏的朋友，兩人年紀相仿，約莫十四歲。「你怎麼沒上學？」我問道。


    他說他生病請假，但覺得身體還好，能夠幫我一下。我給了他一把舊刀子，他一邊動手'
  - '[PAGE 260]


    刮掉柵門上剝落的油漆，一邊聊著學校和釣魚，有說有笑。過了一會兒，我覺得做得差不多時，就謝謝保羅，跟他道別。他牽起腳踏車，繼續上路。他離去時，我看到他身邊跟著四位天使。


    四位天使似乎在保羅前面和兩側跑著，感覺像是要保護他，預防他從車上摔下來。我問道：「天使，你們在做什麼？」因為我看不出來他會摔倒，在我看來，他車子騎得很好。我沒看見他的守護天使。但當時我確實對保羅那時候來訪感到有些奇怪，因為他以前從未如此。


    但我對此事沒再多想。三天後，我又在外面油漆柵門，聽見有人走來，我停下手邊的工作走到路上，看見保羅牽著腳踏車朝我過來。他的守護天使跟在身後。我知道事有蹊蹺。保羅看起來身強體健，圍繞在他周圍的光應該是閃亮耀眼的，事實卻非如此。那光環相當微弱，使得他的生命之光看起來非常昏暗。我也無法理解他為何垂頭喪氣。


    我喊了他的名字，他抬頭看，給我一個大笑容，然後牽著腳踏車跑過來，把車子往地上一丟，問他是否能幫忙。「可以，你遲到了呢。」我笑著回答，然後轉身到小棚子裏去找另一支刷子，讓保羅在柵門邊等著。我走到小屋後方，問天使發生了什麼事。沒有天使現身，但多位天使異口同聲說：「羅娜，妳只要花時間和保羅相處，聽他說話即可。」「那不成問題，」我說，「希望能找到刷子給他用。」


    我找到了，我從小屋一側走回前門，保羅著急地在柵門邊等待。此時，他整個人發亮，閃耀明亮的光芒，我無法理解是什麼讓他散發出如此耀眼的光芒，而幾分鐘前光芒還是那麼'
  - '[PAGE 261]


    微弱。看得出來他很快樂，這讓我也很高興。我們一起刷著柵門，保羅說說笑笑聊著天，並且提到兩週後就是他的生日。

    保羅該回去的時間到了，他騎著腳踏車離開，我再度看見四位天使在他身旁跑著，模樣非常滑稽，不禁笑了起來。四位天使衣著修長寬鬆，以優雅的姿勢跑著，像充滿熱氣的泡泡般輕輕彈跳，那泡泡閃耀著輕柔的水漾琥珀色澤，就像閃耀著光芒的水面一般。看著他們的模樣，眼睛相當舒服。保羅和天使們的身影消失後，我走過柵門，繞回小屋後方的棚子，然後呼喚自己的天使，詢問他們關於保羅的事情，但他們沒有回答。

    保羅的身影一直在我腦海裏揮之不去。隔天，我走到小屋附近的一條巷子，在一道通往田野的柵門前停下腳步，呼喚我的天使們。我以爲他們沒有在聽，打算轉身繼續朝小巷走去，天使以萊亞卻出現。他說：「羅娜，妳要去哪裏？快回來。」

    「也該是時候了，」我說，「你們都去了哪裏？」

    「羅娜，我們一直在妳身邊。」以萊亞回道。

    「天使以萊亞，我很擔心有個名叫保羅的男孩，我知道事情有些不對勁。」

    「羅娜，妳需要做的就是和保羅相處。」

    「以萊亞，我爲他擔憂。爲什麼我會爲他感到恐懼呢？他是那麼美麗的孩子。」

    「羅娜，有些時候，如果可以，天使的任務是設法改變特定的人或團體的未來。我們正在爲這孩子努力。我們對許多人耳語，請他們參與，但只有少數人願意傾聽，而這樣或許不夠。此時，妳是保羅的生命線，是他還活著的原因之一。妳總是願意傾聽，羅娜。現在，請


    夠。此時，妳是保羅的生命線，是他還活著的原因之一。妳總是願意傾聽，羅娜。現在，請'
  - '[PAGE 262]


    妳回去繼續整理柵門，我們會讓保羅去找妳，跟妳開心聊天談笑。」「難道不能再多透露一些嗎，以萊亞？」我乞求。「不行，羅娜，妳一人無法改變他的未來，其他人也必須參與。」


    如我見過的許多事件一樣，這一回，一連串小事件也將累積成一件大事。這就是為什麼當天使鼓勵你去做些小事，例如對某人微笑，或告訴別人他表現很好，不論那件事在當時看起來多麼無關緊要，你都應該去做！因為很顯然的，再怎麼無關緊要的事情，最後也可能成爲重大事件的關鍵。


    每回我在屋外整理柵門，不論什麼時候，保羅都會出現，有時在早上，有時是傍晚，甚至晚上，他總會來幫忙。他問我能否邀請克里斯多夫在他生日那天一起去釣魚。我告訴他克里斯多夫一定很願意，不過只能星期天去，也就是保羅生日的隔天，因爲克里斯多夫星期六要在煤炭馬場工作。保羅說他們計畫全家一起去。他非常興奮，謝謝我讓克里斯多夫跟他一起去。我告訴他，我把克里斯多夫交給他照顧，請他確認克里斯多夫平安回家，並且要釣到很多魚，讓我在星期一能煮來當點心。保羅笑著說他會盡力而爲。


    那天克里斯多夫放學回家後，我告訴他關於保羅生日的邀請。克里斯多夫很高興，滿心期待把釣具準備好，放在門廳裏。我再度到外面油漆柵門，保羅仍舊來了。距離他的生日只剩幾天，他非常興奮。我們一起刷油漆，之後保羅開心回家。我看著他騎車上路，天使們依然緊跟在旁，保護著他，隨時準備接住他。


    從此我再也沒有見過保羅。一、兩天後，克里斯多夫用鑰匙打開大門，走進廚房，看起'
  - '[PAGE 263]


    來非常悲傷。在他開口說話前，我已經知道事情跟保羅有關。「媽，保羅今天早上過世了，發生了悲慘的意外。我真不敢相信，我們原本要在他生日那天去釣魚。媽，我們現在去保羅家探望一下。」


    我非常震驚，這實在很不公平。我安慰克里斯多夫，給他一個擁抱，告訴他給保羅的母親一點時間再過去探望他們。


    隔天晚上克里斯多夫和我去了保羅家，他家裏許多人來來去去。喝過茶後，保羅的父親和克里斯多夫說了幾分鐘話，我們就道別，走路回家。在路上，克里斯多夫說：「媽，保羅不在的感覺好奇怪，那屋子顯得空空蕩蕩，我會很想念保羅。」


    保羅過世後約六個月，喬難得覺得身體好一點，想下床走動。當時十五歲的克里斯多夫陪著喬，一起到都柏林的酒吧去見一位老朋友。酒吧裏又暗又擠，非常吵雜，而且不斷湧進更多人，克里斯多夫緊緊跟在喬身邊。喬找到朋友後，三人朝門口走去。


    這時有人開始互相推擠，還打起架來。克里斯多夫說他嚇到了。有些男人跟在他們身後走到大街上，開始找碴想打架，其中一人手中還拿著打破的瓶子。喬告訴那些人他們不想打架惹麻煩，只是來找朋友，同時繼續往前走，但那些男人開始推他們。克里斯多夫說他真的非常害怕。突然間，他強烈感覺到保羅的存在。克里斯多夫告訴我：「媽，我很確定他就在那裏。他本人彷彿就在現場，就像你我一樣真實存在著。他把那些男人往後推，把我們往前推，我感覺得到保羅在保護我和爸。我這輩子不曾如此恐懼，但是當我感覺到保羅的存在，就知道我們會平安無事。」'
  - '[PAGE 264]


    我告訴克里斯多夫要記得，當他需要保羅的保護時，他永遠會在身旁。多年來，我多次想起保羅，感謝他為我保護克里斯多夫，感謝他記得我請求他保護克里斯多夫的安全。


    我每天買完東西回家後，都會端一杯茶給喬，在他身邊坐下聊天。有一天，喬有件事要告訴我。喬的守護天使就坐在他身邊，床上還有許多天使，全都看向喬，等他說話。

    「羅娜，妳一定不會相信，」他說，「今天妳出門後，有個小孩子靈體蹦蹦跳跳來到房裡，模樣大約三歲，一頭蓬蓬的棕色長髮，身上看起來很髒，像是在泥巴裏玩耍過，兩手還沾著泥塊。她就站在妳坐的位置說：『爸，跟我玩。』然後又轉身蹦蹦跳跳離開房間。」

    我聽了既高興又驚訝！我知道這意味將要有另一個孩子了。我們一直很想再有孩子，但是露絲已經十二歲，加上喬的健康狀況，我根本不敢奢望。這是個奇蹟。我感謝了上帝和天使。

    喬過去不曾見過靈體，這次彷彿是上帝和天使們特意允許喬能看見，幫助他了解自己不僅只是個軀體。

    我並未立即告訴喬那表示我們即將生個小女兒，只是讓他沉浸在看見美麗小靈體的喜悅之中。「她為什麼叫我爸爸呢？」他好奇地問。

    我還沒懷孕前就看見了這個小靈體。她和喬描述的一模一樣。有一回，我為喬泡茶，端著茶盤要走出廚房時，小女孩從餐廳門口跳著出來，模樣非常美麗，很快又消失不見。我打'
  - '[PAGE 265]


    開通往臥室的房門，喬隨即開口說小女孩又來了，喊他爸爸，要他陪她玩。


    這回我告訴喬上帝要為我們送來另一個女兒。喬難以置信。「上帝必須在我身上灌注許多生命力，才能讓我再生個孩子。這真的需要奇蹟！」


    但是不久之後，我發現自己懷孕了。


    一天我站在鏡子前，天使以一道金黃色光芒出現在我四周。接著，我看見自己腹中的生命能量旋轉著，散發出各種光芒，有翡翠藍、翡翠綠、翡翠紅和翡翠紫，光的漩渦張開時，我看見小寶寶像個發光的塵粒。這個景象使我對未出世的寶寶充滿愛與感動。


    自從生下露絲已經過了十二年，所以我得花些時間重新適應妊娠狀態。我早已把小寶寶需要的東西送人，天使得花很大功夫來幫忙，去對許多人耳語。小寶寶梅根出世時，我已經有了新生寶寶所需要的一切物品。我非常感謝天使的協助，也感謝所有傾聽天使說話的人。


    有時候，我能清楚感受到天使究竟有多努力。那年聖誕節，我們又非常拮据。聖誕節前的某一晚，我們坐在廚房吃晚餐，門口傳來敲門聲。克里斯多夫去開門，然後幫一位奇怪的人搬進一個大箱子。


    克里斯多夫介紹客人是學校的神父湯姆。神父說：「希望我沒有打擾到你們。學校家政課同意我把他們今年所有的聖誕節烘焙成品，送給梅努斯的某個家庭，我聽說你們應該用得上這些東西。聖誕節前夕，我還會送來一隻烤火雞和火腿。別擔心，課堂的學生沒人知道東西送到哪裏。這就是我隻身前來的原因。我早就希望克里斯多夫會在家，能幫我把箱子搬進來。」


