    這時天使對我耳語：「這是個祕密。」

    我告訴爺爺：「我不會告訴任何人。」我從來沒說過，直到此刻。

    爺爺對我說話時，他身邊的光芒變得越來越亮，就像其他人的亮光一樣。我於是明白，

    因兩個孩子死亡而產生的痛苦與憤怒，使他內心充滿辛酸，吞噬掉他對生命的喜悅。爺爺起

    身走回馬車房，繼續打理車，彷彿從未對我說過話似的，又恢復成平常的他，周身的光芒也

    黯淡下來。而我再也不曾看見他的光再度明亮。

    當時我年紀太小，並不適合被告知這個故事，但我知道自己只是在為天使工作，而這次

    是協助他們幫助我的爺爺。


    我在蒙夏南度過了愉快的夏天，所以很希望來年也能再去度假。隔年那一年過得很快，

    當白晝開始變長，我也期待起假期的來臨，迫不及待想回到蒙夏南。

    不過，這一回我們沒有待在奶奶家，而是經過她家，繼續往蒙夏南的村子前進，最後停

    在村子外緣一棟有個荒廢庭院的大房子。房子幾乎空蕩蕩的，我想裏面只有一張桌子，幾張

    椅子和一個爐子，其他房間既沒有床也沒有任何東西。但我們完全不在乎，還覺得那是很棒

    的探險活動，全家都睡在地板上的睡袋裏。

    待在空蕩老房子的那個夏天，一位好心的老太太莎麗送給爸爸一小塊鄰近蒙夏南的土

    地。那塊地位在山上，要辛苦爬一段山路才能到達，但我非常喜愛那個地方，它緊鄰莎麗住'
  - '[PAGE 53]


    的小木屋。小木屋有傳統式大門，上半部總是開著，所以莎麗遠遠就能聽到我們來了，然後站在門口微笑等待，有時候手裏還抱著一隻貓。她會準備茶、小麵包或蘋果塔，讓我們覺得備受歡迎。我好愛和她坐在桌邊，聽她講述在克來爾郡長大的故事。她喜歡有人作伴，所以當我聽她說了幾小時的話，該回家時，她會請我隔天再來，或者鼓勵我帶著爸媽來拜訪她。


    莎麗獨自一人住在山上，很寂寞，所以送給爸爸緊鄰大門的那塊地，希望他能在那裏蓋一棟小屋子，這樣她就有伴了。她總是說或許將來我也可以帶著孩子住在那裏。對八歲的我來說，孩子還不在我的思考範圍內，所以她這麼說時，我只會咯咯笑。


    莎麗養了很多貓，而且到處有小貓咪，她說貓是她的伴。儘管小屋裏隨時有貓來去，卻保持得一塵不染；塞滿家具，卻不見灰塵，也沒有堆積如山的紙張，聞起來是那麼乾淨，充滿家的味道。


    我非常喜愛莎麗，喜愛那一段去拜訪她，在她的小屋度過的童年時光。我也熱愛那座山，還有那些睡在營火旁的帳棚裏，聽著附近貓頭鷹呼呼叫的夜晚。當然，我的小鷹也很喜歡那些在山上的時光，牠已經長得更大更健壯。奇怪的是，儘管牠有個大大的黑色鳥喙，卻一次也沒啄過我的手指，或抓傷過我。一天下午，我一如往常抱牠去散步，我們走了一里半的路到奶奶家，讓牠在庭院裏四處看看。


    天使米迦勒出現在我身旁，跟著我和小鷹一起走遍庭院。我們像隱形似的穿越奶奶的廚房和餐廳（有時候天使會做些事情，讓別人不會注意到我），最後進入那道有漂亮花朵和大窗戶的美麗長廊。'
  - '[PAGE 54]


    「妳的小鷹長得又大又強壯了，妳卻還沒為牠取名字？」米迦勒問道。

    「牠不需要名字，」我說，「我的鷹就只是『愛』，就是這樣。」

    米迦勒看著我說：「有一天妳會明白妳為何叫牠『愛』。」

    我盯著米迦勒。他的眼睛非常明亮，彷彿可以從裏頭看到好幾里遠，像是進入一條綿延長路，甚至正在穿越時間本身。


    小鷹總是和我在一起，我去到哪兒都帶著牠，一刻也不曾忘記。假期的最後一天，我和爸爸到山上去。我們搭起帳棚，還生了一把火，雖然那是個晴空萬里的日子。我哀傷地看著小鷹，因為天使在我找到牠時曾經說過，牠在這個假期結束後並不會跟我回家。

    我抱著小鷹站在帳棚的後方，溫柔地對牠說話。

    「沒有你的日子我該怎麼過？我會非常想念你。」

    爸爸對著我喊說：「快呀，羅娜，小鷹需要再多練習揮動翅膀。」

    我悲傷地抱起牠，但牠愉快地揮動雙翅，發出響亮的叫聲。

    爸爸又喊了。我把小鷹朝空中推送出去，爸爸接到了牠，牠同樣在爸爸的手裏振動雙翅。爸爸又把小鷹推送過來，但大約在四分之三的距離，牠的身體摔落地面。我的小鷹離開了！牠的神魂飛走了，那張開的翅膀顯得龐大無比，全身閃耀著金黃色光芒。牠轉頭看著我，眼睛明亮到彷彿在對我微笑。牠不是一隻平凡的鳥，而是上帝和天使送來的禮物。

    那一刻我悲喜交加，既為小鷹感到高興，因為牠現在是完美的，能像老鷹那樣在空中翱翔，但也知道我將非常想念牠。'
  - '[PAGE 55]


    爸爸衝了過來，他非常難過。「羅娜，很對不起，我知道妳並不想讓小鷹飛得更遠，妳還不認爲牠可以飛。」

    「沒關係的，不要緊。」我說。爸爸感到非常悲傷，既難過又愧疚，但我無法安慰他，因爲我不能告訴他事情的真相，這並非他的錯。

    米迦勒說得很清楚：「妳永遠不能告訴他。羅娜，妳是與眾不同的，他只能看見小鷹落到地上的屍體，他無法理解的。妳難道不知道要讓人明白上帝原本的樣貌有多麼困難嗎？」

    我乞求著：「可是我爸那麼痛苦，米迦勒。」

    「妳不能告訴他，」他說，「總有一天，妳可以告訴他妳知道的一些事物，但不是現在。別擔心，小寶貝。」每回米迦勒安慰我，就會叫我「小寶貝」。

    爸爸和我不再討論失去小鷹的事情，但我覺得他有很長一段時間始終耿耿於懷。

    有個星期天，我從老房子出來，沿著馬路朝奶奶家走去，邊走邊微笑，感到自己充滿力量與信心，因爲我知道有個特別的人就在附近。天使告訴我不要一直走在大路上，要穿越草原，我於是爬過柵門，穿越青草高長的草原，朝林子走去，牠撥弄了我的頭髮。

    牠具有一種非凡的存在感，力量強大到無法以物質型態來體現，因此牠出現時，彷彿有股強大的力量環繞著我。牠習慣撥弄我的頭髮，帶來刺刺癢癢的感覺。牠在身邊時，我會覺得自己非常特別，感覺很美好。

    還是個孩子的我不清楚牠是誰，只知道牠屬於完全不同層次的存在。

    「你在這裏！」我開心地說。'
  - '[PAGE 56]


    「我從沒離開過妳，」祂說，「我一直和妳在一起，妳難道不知道嗎？妳感覺不到我嗎？我經常撥弄妳的頭髮呀。妳為何躲著我？」


    祂說得沒錯，有時候我會躲著祂。即使至今，我偶爾也這樣做，因為祂是那麼龐大而有力量。我轉身，感覺祂那存在於我左邊，和我一起移動的強大原力。我回道：「因為你那麼龐大，而我那麼渺小。」


    祂笑著說：「羅娜，別再躲了。走吧，我們散步去，我會為妳去除恐懼，協助妳為我完成妳今生必須做的事情。」


    我們朝著樹林走去，來到一處俯瞰湖泊的空地上，那裏有個木造農舍，我們坐在那邊的陽光下談話。


    「你知道我很害怕。」我對祂說。


    「沒什麼好害怕的，羅娜，我不會讓妳受到任何傷害。」祂說，「人們需要妳，他們的靈魂亦然，就跟我需要他們一樣需要妳。」


    「為什麼是我呢？」我熱淚盈眶問道。


    「為什麼不是妳呢？」祂回道，「妳或許只是個孩子，但妳知道的比世界上多數人更多。妳是我的人類天使，在這裏幫助眾人和他們的靈魂。盡情哭吧，我的小寶貝，我的愛之鳥。」


    我看著祂。「為什麼叫我『愛之鳥』？」


    「因為妳和妳的小鳥一樣帶著愛，妳的靈魂純淨無瑕。妳是我的愛之鳥，而我需要妳，別人也是。」'
  - '[PAGE 57]


    「可是我不喜歡和別人不一樣啊。」我淚流滿面。

    祂為我擦拭眼淚。「羅娜，妳知道我永遠在妳身旁。」祂伸手環繞我的肩膀，把我緊緊抱住。


    我們倆走出森林，穿越草原，前往奶奶的房子。突然間，祂消失無蹤。我繼續朝奶奶的房子走去，媽媽正在那裏幫奶奶烤蘋果塔，煮晚餐。我看著他們，聽他們說話，我經常做這樣的事——觀看別人。我總是讓別人說話，但仔細傾聽，所以能聽見沒有說出口的話，那些他們想說卻藏在心底的話，包括喜悅、快樂和痛苦。


    我們在蒙夏南度過四、五個愉快的夏日時光，約莫十一、二歲時，奶奶心臟病發，無法繼續工作，必須離開那棟房子。我們從此再也不曾回到蒙夏南度假。


    我也沒再見到莎麗。多年後我聽說她孤獨地死在山上的小屋裏，但我知道她並不孤單，天使陪伴著她。父親往生後，誰也找不到父親擁有那塊土地的證明，所以我們無法實現他的夢想，在上面蓋一棟房子。'
  - '[PAGE 58]


    # 05

    先知以萊亞


    我這一生經歷過許多預言的靈視影像。十歲的某一天，我在草原上沿著河岸走，天使對我說：「我們要在前面會見以萊亞。」


    「誰是以萊亞？」我問道，一邊發笑，之前我從未聽過這個名字，覺得它的發音真好聽。天使卻沒有笑。


    「以萊亞要為妳呈現一些事物，羅娜。妳一定要努力記住，因為這是妳未來的一部分。」


    一位天使從河對岸越過河面朝我走過來。他的模樣很難形容，一身鏽紅，宛如帶著微紅的琥珀色，散發著光芒，真是美麗極了。他穿著垂掛的長袍，袖子蓋過了手，當他舉起手，臂，長長的袖子又會優雅地回捲起來，彷彿袖子也是他身體的一部分。此外，他的臉龐似乎也呈現相同的琥珀紅。


    以萊亞走過河面的景象非常迷人，他朝著我走來，雙腳不曾觸碰到水面。


    「我也可以走在水面上嗎？」他只是對著我笑。


    河岸崎嶇不平，到處是隆起的草堆。以萊亞請我坐下，自己也在我身旁坐下，臉上帶著微笑。「很高興看到妳在見到我時並不緊張。」'
  - '[PAGE 59]


    不會啊，他們說過你要來。」我回道。

    我四處張望，這才察覺到平常跟在身邊的天使都不見了，只剩下我自己的守護天使。

    「他們去哪裏了？」我問。

    「只是離開一下。」他說，「現在我要握著妳的手，羅娜。」他伸出手，我把手放在他的手上，感覺我的手好像要消失在他的手中，變成他手的一部分。「我不想讓妳感到害怕，」他說，「因為沒什麼好怕的，這是妳長大後可以期待的事情，將會發生在妳身上。」

    「為什麼我現在就需要知道呢？」我問。

    他並未回答我的問題，只是說：「妳將看見一個人，我們會告訴妳這個人的一切。」

    接著，前方河面中央彷彿有面布幕被拉開般，出現巨大的螢幕，我在上面的靈視影像中，看見一條兩側都是樹木的街道，而我似乎坐在路底。有個人影從遠方穿越樹木，沿著街道走來。我望向一旁的以萊亞說：「我看不清楚。」

    「繼續看！」他說。

    人影更靠近後，我看見有著一頭紅髮、身材高挑、面貌英俊的年輕人。以萊亞又開口說：「妳現在可以清楚看見他了。」

    我轉頭看著身旁這個天使，對他點點頭。

    「繼續看，記住他的模樣，因為我們不會讓妳再看一次。我要說的是，妳以後將和這個年輕人締結連理。當妳第一次看見他，就能因為目前這個影像而認出他，不過那是多年後的事了，妳得先長大才行！」'
  - '[PAGE 60]


    想到戀愛或結婚的事情，我不禁咯咯笑了。我問以萊亞：「他現在就這麼大了嗎？」

    「不，」以萊亞回答，「他現在也是個小孩，比妳大幾歲而已。」他繼續說：「妳和他在一起會過得很開心，他愛妳，妳也愛他。你們將一起度過盛衰沉浮的日子，有美好和不太美好的時光，還會擁有健康的孩子，每個孩子都非常獨特。但到最後，妳必須看護他，上帝不會讓他留在妳身邊一輩子，你們無法一起終老。」


    我轉身看著以萊亞，問道：「以萊亞，你說看護他，是什麼意思？」

    「他的健康狀況不是很好，」以萊亞回答，「有一天上帝會把他帶走，而那時候他還相當年輕。」


    「我並不想知道這件事。」我說。


    可是以萊亞繼續說：「羅娜，別生氣，我們只是想讓妳記住，讓妳變得堅強，以準備好面對未來。只要想想你們將會擁有愛和幸福的時光就好了。看看他有多帥氣，妳自己也這麼說。」


    我再看了一眼，而且看得很清楚。「是的，他長得很好看。」

    影像消失後，以萊亞問道：「妳能記住這一切嗎？」

    「可以。」我回答，「我會記住。我了解他無法永遠和我在一起，而我必須看護他。」


    雖然我的年紀還小，但我轉身對以萊亞說：「我會堅強的。」

    以萊亞牽著我的手，站起身。我們走了一段路，然後他停下來說道：「現在不用想太多，把這件事放在心底就好，發生的那一天，妳會認出他來。」'
  - '[PAGE 61]


    接著，天使以萊亞消失無蹤。當然，那個靈視影像確實在多年後出現了。在寫這本書的過程中，我問了天使關於以萊亞的事蹟，天使說以萊亞是聖經舊約裏的先知，是一個擁有天使靈魂的人。


    我們家名列都柏林議會住宅計畫名單上，等待房屋配給。雖然那是個艱難的力爭過程，但經過非常漫長的等待後，我們終於得到一棟位於伊登摩爾（Edenmore）由議會出租的房子。這是一棟很可愛的房子，坐落在一處擁有數百戶全新住宅的新開發案中，這裏的房屋大同小異：半獨立式，有三個房間，以及小型的前庭和後院。旁邊還有另一個土地開發案，不過房子尚未蓋滿，所以周圍有許多田野、草原和開放空間。此處的居民全是新來的，大多數人過去可能和父母同住，或者居住在都柏林市中心的廉價老公寓裏，因此是第一次擁有自己的房子。這是個很友善的地方，我一到就喜歡上它。


    雖然我們並不擁有房子，但終於有落腳的地方。不過，即使生活逐漸改善，但對媽媽來說，日子仍然很艱苦。爸爸在一家石油公司擔任送貨員，工作時間長，付出很多勞力；媽媽則在附近的巧克力工廠上夜班。每天傍晚放學後，媽媽張羅我們吃過晚餐，就會讓年紀大的孩子照顧年幼的，一直到爸爸回家，不過那通常都很晚了。


    伊登摩爾距離巴里曼很遠，搬家也就意味着我們全部要轉學，交新的朋友。由於附近並沒有學校，早上我們必須走很遠的路去上學，一路上穿越住宅區，進入老村落，再經過教堂來'
  - '[PAGE 62]


    到主要幹道上。學校就在這條繁忙道路的對面。我們在組合屋裏上課，所以非常擁擠，桌子排得很緊密，必須用力擠進去，甚至要從同學身上爬過，才能坐到自己的座位上。


    我在伊登摩爾過得很快樂，雖然沒有什麼特別的朋友，但我花了很多時間和鄰居歐布來恩一家在一起。但我真正喜歡的是歐布來恩家的狼犬夏恩。我一週帶夏恩散步三次，就在某次溜狗途中，我遇見了另一位特別的天使。


    我稱這位天使為「樹天使」，因為她總是出現在樹裏面。在那之後，我又見過她幾次，至今也仍會看到她。她全身呈現出各種不同的翠綠、黃綠和綠橘色調，顏色非常美麗動人。她似乎是活生生存在於樹的每個部位，而我又能清楚看見她的形影。她有一頭波浪般的捲髮，移動時全身每個部位彷彿也隨之而動，雙眼如金沙般閃閃發亮。她朝我伸出雙手時，樹也跟著她移動。我經常和她說話，她的聲音就像哨音一般，而且彷彿和樹葉一起沙沙作響。


    記得那一天和夏恩散步，我們穿越田野，正打算走回住宅區，夏恩突然停下來，對著左邊一棵大樹狂吠不停。我看著那棵樹，什麼也沒有，於是對夏恩笑問：「你在吠什麼啊？」


    就在那時候，我看見了她。樹裏有個樹天使，夏恩在我之前先看見了她。每憶及此事，我不禁要笑，因為動物總是那麼輕易就能看見天使，真令人驚奇。


    放學回家的路上，我偶爾會和其他孩子到採石場玩耍。有一天，我沒和他們一起，而是跑去打開採石場旁的僧院柵門。我們並不被允許進入僧院，但我拉起門閂探頭窺視時，看見'
  - '[PAGE 63]


    了一庭院的蔬菜水果，感覺非常平和，因此一點也不害怕。我四處走動，看著穿棕色長袍的修士，忙著整理庭院。他們對我毫不理睬，彷彿沒看見我。我在一棵老樹幹上坐下，靜靜看著一切。


    僧院確實是個神聖的地方，一個擁有許多祈禱的地方。修士散發出明亮的光芒，非常潔淨，而且不只是身體潔淨，靈魂也是如此。修士一邊工作，一邊祈禱，我注意到天使也跟著他們一起祈禱。我感到非常平靜，很想一直待著，可是最後天使把我拉了回去。他們不停告訴我該回家了，說媽媽會擔心，我只好遵照他們的意思。天色逐漸昏暗，天使為我點亮街道。到家時，媽媽已經出門上班，所以我沒有惹上麻煩。


    那一年，我約莫去了僧院十幾次。只有一次，也就是最後一次，有個修士對我說了話。那時他正在採收醋栗，我朝他走去，站在他的身邊。他散發出非常明亮的光芒，站在他身邊的天使，穿著跟他一模一樣。他抬頭看著我，那是一張非常年輕的臉，他說：「哈囉。」


    我問了他的名字，他說是保羅。他聲音很輕柔，回問了我的名字，我也回答了。


    他請我吃醋栗，問我為什麼經常去那裏。我回道：「只是來看你們祈禱，我需要你們的祈禱。」


    「我會永遠為妳祈禱，羅娜。」他說。


    我向他道別，心底明白我將不會再去拜訪那座僧院。'
