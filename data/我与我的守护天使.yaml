    婦人邊否認，邊拿新袋子裝水果，同時用愧疚的眼神瞄了我一眼。媽媽付過錢後，我把水果袋放進菜籃車裏。要離開時，婦人用她那宏亮的都柏林口音大喊：「嘿，太太！」


    媽媽轉了身，婦人遞出一個袋子。「太太，這個送給妳的孩子們！」她的天使站在她的身後微笑著，婦人終於聽見了他的話語。


    之後，我又去了摩爾街許多次，但街道再也不曾像那次如此活躍鮮明。我很清楚雖然自己看不見某些東西，但不表示沒有發生。天使知道他們不能一直讓我看見所有事物，我會無法承受，也會因此分心而無法正常生活。


    天使還教了我許多關於選擇的觀念。有個午後，他們幫助我了解：改變想法，做出正確選擇，永遠不嫌晚；也讓我知道只要願意傾聽，天使便能幫助我們做出許多正確的選擇。


    我很喜歡幫媽媽跑腿辦事，這樣就可以和天使自在說話。我喜歡和他們一起在街上跳著走，欣賞鳥兒和樹木。這天午後，在前往店鋪的途上，天使告訴我：「停下來，羅娜！走到另一條街上去，我們等下會解釋給妳聽。走到大街後，不要左轉到商店，過馬路，然後右轉直走。」


    我確實照做了，抵達目的地後，看見人行道上堆滿了家具，還有一輛警車和一群圍觀的人。有個老人正從大門拄著柺杖走出來，他所有的財產和家具都堆在街上。那個景象使我非常震驚，終生留在我的腦海裏。


    「天使，」我說，「那個可憐人發生了什麼事？」


    我站在對街人行道上，看著一切。


    「羅娜，那老人一輩子都住在那間房子裏。那是他的房子，但是他越老越頑固，甚至拒絕繳稅。他曾經有過選擇，可以選擇繳稅，也有錢繳，這一切原本不必發生。假使他現在還願意和家人溝通，他們會幫助他做出正確的選擇，可是因為固執，他不願意和家人說話。現在他只有自己能依靠，至少目前是這樣。」


    我問天使在一旁試圖和他說話的女人是誰，如果是他的女兒，他會不會聽她的話？天使回答：「羅娜，妳難道沒看見天使在他的耳邊細語？要知道，他聽得見他們的！妳看，他哭了，願意讓女兒挽起他的手臂，他終於做出正確的選擇。只要我們願意傾聽，做出正確的選擇的時機永遠不嫌晚。」


    「我懂了，」我說，「天使也永遠會幫助我做出正確的選擇嗎？」


    「羅娜，我們會的。」


    有時候，事情只是看起來像個悲劇，爸爸的意外就是這麼回事。他當時為一家大型石油公司工作，在運送煤油時出了意外。公司願意提出賠償，但爸爸不想要錢，只想有份長期工作。最後，公司提出一份合約，讓他擔任都柏林市內一家加油站的經理。爸爸的眼前出現了選擇的機會，毫無疑問，天使幫助他做出正確的決定。這份長期工作使父母在經濟上得以穩定，最後終於能夠負擔一棟屬於自己的房子所需的頭期款。父親的意外事件是個經過僞裝的幸福。有時候發生艱難的事件，是爲了讓人改變，讓生命中的事物得以改變。奇蹟隨時都在發生，只是大家沒看見。


    ## 06

    ### 吸收他人之苦


    沒有人能了解我的學習障礙究竟怎麼回事，父母於是決定在搬到來錫利普（Leixlip）的家後，不再讓我繼續就學。我很難過他們沒有跟我商量就做出這樣的決定。退學的決定是父母對我不公的另一例。他們或許沒有依照別人建議把我送走，但的確對我有不同待遇。


    我看見家裏的經濟環境好轉，而這對我的際遇似乎絲毫沒有影響。當時家裏有了電話，其他的兄弟姊妹隨時可以使用電話而不會被念，可是我想打電話時，就會被告知電話費有多貴，不准使用。想要泡澡，聽到的也是「不可以」，或者「只能用一點水」。事情經常這樣。我到後來根本不敢要求沐浴，只是在臉盆注滿水，用那一點水來洗澡，這樣才不會在提出請求後，又遭到拒絕。我從來不明白，至今也仍然不懂，為什麼我一直受到不同待遇，彷彿我的價值不如別人。


    在家裏幫媽媽打理屋子、整理花園時，我只能眼睜睜看著姊姊與弟妹們出發到新學校。某天晚上，媽媽和我們孩子用餐時，宣布要我隔天陪她去參加喪禮，有個親戚往生了，可是她不想獨自出席。大家想知道是誰往生，迪倫想知道她的名字。媽媽說是泰瑞莎，還讓我們看了照片。


    「我們得搭早班公車，」媽說，「因為我們要到市區另一端，到了之後還要走個十分鐘，才能到教堂。」


    隔天天氣很冷，媽媽要我穿暖和一點。我穿上外套，戴了帽子、手套，也披上圍巾，媽媽還帶了一把傘，以防下雨。在公車上，我看著窗外風景，腦海裏思緒不斷，很好奇喪禮是怎樣的場景，因為這是我第一次參加。


    過了一會兒，媽媽轉過身來對我說：「我們快到了，要記得喔，羅娜，妳要一直待在我身邊，不可以走開，否則會走丟。」


    公車到站後，我們下了車，前往教堂的那段路走起來很舒服。教堂裏已經擠滿人，每個人面容哀戚。神父在前主持彌撒，我則目不轉睛看著整個過程。


    儀式結束後，我們走一小段路抵達墓園。墓園裏有好多天使站在親戚之間，多到讓我嘆為觀止。大多數親戚對我來說很陌生。我看見一大群人，就往人群外圍走去，想把整個場景看得清楚些。媽媽忙著說話，沒有注意到我。一座墓碑旁的灌木叢裏站了一位穿著像人的美麗天使，散發出非常明亮的天藍色。我問她：「為什麼所有天使都在這裏？」


    我以前也常在墓園裏看見天使，但這一天的天使真的非常多。她笑著對我說：「羅娜，妳還有很多東西要學。這裏是天使會被召喚的地方之一，是人們在悲痛之中會呼喊『上帝啊，請幫幫我！我無法獨自面對此事』的地方，所以我們聚集在這裏。」


    美麗的藍色天使牽起我的手，領著我穿越聚集在喪禮的人群。在人群中穿梭時，人們好像自動分站兩側，讓出一條路。雖然大家肯定注意到我走過，卻沒有人阻止我。我們一直走到聚集在墓碑旁哀悼人群的另一端。


    在那群人的外側，就在墓碑旁，站著泰瑞莎的靈魂，也就是當天被埋葬的親人，前一晚媽媽給我們看的照片讓我認出她。泰瑞莎身邊圍了約莫十位天使，或者更多。她的模樣比照片上漂亮許多，就像一朵散發出明亮光芒的美麗黃水仙。這個美麗的靈體獲准觀看自己的葬禮。我走近的時候，她正請求身邊的天使們到所有來哀悼的親友身邊。「剛往生的靈魂可以請求天使們去安慰與幫助留在身後的親友。」


    泰瑞莎一說完，天使隨即飛到墓園裏每位朋友、熟人和親人的身邊。有些人身邊甚至不只一位天使，而是一群天使。天使非常溫柔、慈愛，他們把手搭在眾人的肩上，在他們耳邊輕聲細語，輕柔地撫摸他們的頭。我還看見一位天使像是伸出雙手般環抱了其中一人，天使說這人也失去了親友，心裏正同時為那位親友哀悼。


    我永遠記得藍色天使所展現的美麗，因為她散發出無限的慈悲與同情。不過，當我想到人們得等到有人死了才會請求天使協助的怪異景象，不禁想笑，因為我們並不需要等到絕望或極端痛苦時，才來請求協助，而是應該每天、每月或每年請求一次協助：「我希望天使能陪我一起度過我所經歷的一切。」這樣簡單的請求就能讓天使來協助我們。


    搬到新家幾個月後，爸爸下班回家為我帶來了好消息。當時是秋天，天色還很亮，大約七點，又或許更晚一些，因為爸爸的工作時數很長。他一如往常走進長形的大客廳，舒服地坐在沙發上，打開電視看新聞，在漫長的工作結束後放鬆自己。偶爾我會看著他，但從未告訴過他我能看見他身邊的天使，或環繞著他的能量場。有時候他的能量會嘆一口氣，然後往下沉（我只能這樣形容）。他坐在沙發上時，媽媽從廚房端來晚餐，放在小木桌上，讓爸爸邊吃邊看電視。這一晚，他開口問我：「妳想不想跟我一起到加油站工作？先試試看妳喜不喜歡，至少這是個開始。」


    我開心得想要親吻爸爸，不過，一如往常，我保留了我的心情。爸爸是個好人，在許多方面都接受了我，我也總覺得他早就知道某些事情，只是沒法說個清楚。不過從很小的時候天使就一直提醒我，我很有可能被當作有精神障礙而被關起來；他們一直告誡我，要是父母覺得我不對勁，就會把我送到精神病院。為此，我從來不敢對爸爸有過度的情緒表現，在他身邊時，舉止行爲總是特別小心。


    幾天後，我開始工作。上班的第一天，我吃過早餐，和媽媽道別後，就上車跟爸爸到加油站去。加油站叫做葛斯夫諾（Grosvenor），位於都柏林郊外的羅斯曼地區（Rathmines），坐落在繁忙的交叉路口上，左右各有一條主要道路，地點絕佳。加油站本身是一棟老舊的大房子，前面有四座汽油幫浦、一座柴油幫浦、一組打氣管和一個水龍頭。整個地方又臭又濕，簡直要四分五裂，讓我想起舊克爾麥罕的老房子。房子本身一部分做為辦公室，一部分用來銷售輪胎、爆胎維修組件、電池和其他重要的汽車零件，還有一間是用來修補爆胎的車庫。


    上班的第一天我非常興奮，也很緊張，害怕自己做了什麼蠢事或傻事而讓爸爸失望，我不想讓他失望。但我其實不用擔心，因爲每個人都很和善，也很熱心幫我，當然，天使也伸出援手。我學會做各種工作,包括加油和銷售商品,也開始學習行政事務。加油站約有九到十位工作人員,其中只有一位女性,可愛的安妮,她從我上工第一天,就一直保護著我。我們相處得很好,她還教了我許多東西。


    第一天上班很愉快,下班跟爸爸回家時,我對自己也很滿意。我倒是很好奇,不論是那天或其他時候,爸爸爲何不曾注意到不論加油或找錢,對我來說都不成問題,爲什麼他還是繼續把我當作智障的孩子?


    我開始工作後不久,公司決定拆掉老舊的加油站,重蓋一座新的。一個週末早晨,我跟爸爸坐在車裏,驚奇地看著工人用巨大的鐵球不停撞擊舊有建築,直到房子崩塌爲止。一段時間後,一棟新穎的現代加油站蓋好了,有新的店鋪、新的加油幫浦,還有一間明亮舒適的辦公室,從辦公室裏可以看到店鋪和加油幫浦。


    一如往常,天使讓我看見許多事物。有一天他們要我觀察一位老客戶,一名叫約翰的男人,我對他很熟悉。「看著他,他要偷妳爸的東西。」


    爸爸認爲約翰是個有錢人,也是個重要的顧客,所以聽到天使這麼說,我很震驚。我說:「走開,他才不會偷東西。」


    「他會的,」天使堅持說,「妳可以仔細觀察,他看不見妳的。」


    我還是不相信他們。我看著約翰和爸爸談話,聽見他稱讚這家新的店鋪和其中販賣的各種商品。爸爸邀請他四處看看,然後離開去做別的事情。我單獨和約翰一起留在店鋪裏,天使卻說約翰看不見我。我說:「他當然看得見我,我是個血肉之軀啊。」


    他們笑著對我說:「不,他看不見妳!」


    有時候天使會說些我無法全然明白的事情。但我突然間明白了,原來他看不見我是因為天使把我從他的眼底變不見。


    我看著約翰四處走動,觀察每樣東西,包括剛進貨的新音樂卡帶(當時卡帶很昂貴)。他拿起一片卡帶放進自己的口袋。我簡直不敢相信自己的眼睛。


    「為什麼?」我問天使。


    「他常做這種事,」他們回答,「偷竊讓他覺得自己比別人更勝一籌。」天使解釋說,當約翰看到某人很成功,或者做得很好的時候,總會心生嫉妒,而他的反應方式就是從那人身上偷取他認為有價值的東西。


    「我該告訴爸爸嗎?」


    猜猜他們怎麼回答的?我不敢相信他們竟然告訴我:「不!有一天這男人會對自己過去偷竊東西感到良心不安,但不是現在。此刻時機未到,任由他去吧。」


    我很難過,因為約翰和加油站往來許多年了。在那之後,只要他來到店裏,我就會跟在他身邊,假裝在打掃。


    有一天我和安妮在辦公室核算總帳的數字。安妮是很棒的祕書,教我許多東西,有時候我很訝異一切其實竟然如此簡單。那天我們做了很多事。然後,店鋪的門開了,一個男人走進來，我起身為他服務。在那當下，我察覺到他有一股沉靜的氣息，空氣裏也有種靜止的氛圍，他沒有多說什麼話。我把商品交給他，道別後，他就離開了。


    我走回辦公室的座位，四下寂靜無聲，安妮動也不動。我站在她的左後方，看著窗外，一位天使把手放在我的肩上。前庭看起來空空蕩蕩，只有一輛車停在汽油幫浦旁。我朝街道盡頭看去，原本看不見的街道轉角處，突然出現在我眼前，一群小男孩踩著自行車朝加油站的方向騎來。


    這群孩子非常快樂，彼此笑鬧，伸手互相觸碰，玩得很開心。我聽得見他們說話的聲音，但無法聽清楚內容。我把注意力集中在他們身上。一輛車從旁經過，一切彷彿以慢動作進行，周遭其他事物則完全靜止，又彷彿我也和孩子們一起騎著車前進。一輛聯結車從後方追上孩子們，我屏住呼吸，剎那間我已經知道下一刻會發生什麼事。前面那輛車已經離開了，卡車和孩子們成為唯一移動的物體。


    男孩們仍然開心騎著自行車，在路上追逐，放聲笑著。一切都是慢動作，聯結車通過之際，孩子們和聯結車全變成了發光體。他們如鬼影般穿越彼此。聯結車轉了彎，繼續往前開，駕駛對剛才發生的事渾然不知。時空的連結完全沒有中斷，一切繼續流動。男孩們對剛才發生的事也視若無睹，彷彿不曾摔落下來，一點也沒注意到發生什麼事，只是繼續跟著卡車前進，開心踩著車。聯結車繼續前進的同時，出現一團巨大的光芒，那光芒彷彿來自卡車末端。


    突然間，馬路上充滿天使。男孩們和自行車都在發光，並朝著光芒前進。我目睹自行車逐漸浮升到空中，街道也變成一道充滿天使的光芒。這是個非常輕柔和緩的轉換過程，從一個生命轉換到另一個新生的生命中，直接前往天堂。接著，男孩們消失，一切恢復正常。


    突然間，一輛車開進加油站，有個男人下車大喊：「你看見聯結車往哪個方向去了嗎？」


    在亭子裏工作的史蒂夫大喊：「發生什麼事？」


    那人說出車禍了。有人告訴他聯結車往右邊開，他立即上車追去。就在那時候，又一輛車高速行經加油站，在路上飛馳。我則呆站在原地。


    通往店鋪門被打開，我轉身看見爸爸走來，他說剛剛發生慘重的車禍，要我去泡一點茶。我很高興能離開辦公室，得到一點屬於自己的空間。前往茶水間的路上，我忍不住對天使大叫：「為什麼要發生這種事？」


    我得到的答案是：「羅娜，生命就是這樣。對多數人而言，死亡是讓生命持續流動到另一個生命的完美和諧過程。要記得，在死亡的剎那，那些男孩並沒有什麼感覺。同樣的，一個人即使因病所苦，死亡的剎那他們卻不會覺得痛苦。」


    在泡茶和工作當中，天使不斷安慰我，那天工作結束時，我很開心能回家享用媽媽的手藝。到家後，我給她一個大大的擁抱。那天起，我每天都刻意記得要給媽媽一個擁抱，因為那很重要。


    我知道自己遲早得走過意外發生的現場，所以約一週後的某天上午，我鼓起勇氣朝街上的商店走去。我並不是獨自一人，米迦勒牽著我的手。當我經過加油站的前庭，他對我耳語：「走向五金行，有個要到達的目的地，能幫助妳集中精神。」


    接近事故現場時，我看見路上有血漬，一時震驚不已。雖然事故發生已經一週，但我從沒想到路上還有血漬，我震驚得像被閃電擊中。但也許不是人人都看得見血漬，或許只有我看得見。


    通過事故現場時，我聽見了那些男孩的父母和家人哭泣哀嚎的聲音，心中升起難以抑制的悲傷情緒，眼淚奪眶而出。我向上帝請求：「求求祢，上帝，請幫助這些親人，盡量讓我接收他們的痛苦與哀傷。請讓這些父母知道他們的孩子已與祢同在天堂。」


    我失去了知覺，對周遭的一切毫無意識，天使帶著我的身體通過那個時空。有時候，我不解自己是如何從一個地點到達另一個地點。這是個難以理解的奧祢。突然間，我已經來到五金行門前，感覺到天使用天使把我從靈的空間攜出，讓我重新站穩腳步。「完成了，羅娜，」米迦勒說，「上帝聽見妳的祈禱了。」


    我進入五金行，四處逛了逛，好讓自己重回現實，恢復正常。然後我又走回加油站，中途再度經過事故現場。那時我知道自己已經吸收了那些家庭部分的傷痛。但我無法描述究竟是身體的痛比較難受，還是精神上的。但只要是上帝和天使要求，我都會做，即使是要我吸收別人的痛苦，我也願意。這是我的命運，是上帝給我的禮物，這份療癒的禮物就是去接收他人的痛苦與折磨。有人或許認為這是一種詛咒，而非禮物，但只要我願意接收，就能減緩他人的痛苦。我就像個媒介，接收痛苦，把它傳遞給上帝。有時候，痛苦實在是難以承受，甚至覺得自己就要死去似的。但我不會因此喪命，因為上帝接收走我的痛苦。我不知道上帝又是如何處理那些痛苦，對我來說那也是個謎。不過，我一再見證了一切。


    ## 07

    ### 沒有靈魂的東西


    十七歲那年，在加油站工作十八個月後，以萊亞的預言成真了。


    當時我和安妮及爸爸在辦公室裏，從我的位置，能透過大窗戶看到街道遠端和那兒的樹。遠方有個年輕人沿著街道走來，突然間，我認出了他。


    一看見那排樹和年輕人，儘管他的距離還很遙遠，我立即明白那就是我將要結婚的對象。我幾乎喘不過氣來。我知道他將要越過馬路，走進加油站來找工作。


    有人撫弄我的頭髮，我回頭看見守護天使站在一旁。我又朝窗外看去，男人穿越前庭時，我也模糊看見他的守護天使就在他的能量場之中。年輕人非常英俊，有著偏紅的金髮，身材很高，我喜歡高個子的男人。看著他，我無比興奮，因為我已經知道結果將如何發展。


    儘管如此，我還是轉身對安妮說：「有人要來應徵了，希望他不會被錄取！」這話我自己也覺得好笑，因為我對生命中的這個重大改變是那麼害怕，又那麼害羞。不過內心深處，我知道他將得到這份工作，一切已經注定好。


    年輕人走進店鋪，爸爸抬頭看見他，示意他一會兒就過去。爸爸走出去時，我坐在原地，幾乎動彈不得。我全身顫抖不停，根本不想待在那裏。以萊亞所說的一切湧入腦海：我將和這個男人結婚，我會愛他，他也愛我，我們在一起的大部分時光很愉快，但是到最後，我得看護他，而且無法一起終老。


    爸爸和年輕人站在店鋪裏談了許久。後來，我終於起身收拾用過的杯子，拿到茶水間清洗。我從仍在談話的兩人身邊走過，偷偷看了他一眼。我好喜歡他的模樣！我花了很久的時間洗杯子，泡新茶，茶端出來時，他仍在和爸爸說話。我不知如何是好，店裏剛好來了一個顧客，便趕緊去招呼客人。我非常緊張，只得努力忽視那年輕人。


    當然，父親雇用了他，隔天就開始工作。經過介紹，我得知他的名字是喬。我從遠處看著他學習一切如何運作，如何加油，如何修理爆胎。喬結束第一天的工作後，在回家的路上，爸爸告訴我他覺得喬很聰明，學習力很強。


    我試圖避開喬，但總會忍不住偷看他，深受他的吸引。我好奇喬是否注意到我，是否感覺到我們之間的連結。每次我去茶水間泡茶洗杯子時，天使似乎故意讓喬也出現。他總是對我露出燦爛的笑容，於是我心裏知道他也感受到什麼。我也回以微笑，但不會多說話，而且是盡快衝出茶水間。


    喬上班約莫六個月後，他邀我出去。那天我又到茶水間泡茶，在注水入茶壺，清洗杯子時，喬走了進來，說要幫我清洗。我笑著說不需要，因為才三個杯子而已！正當我拿著茶盤端茶壺和杯子要離開時，喬問道：「羅娜，我可以跟妳約會嗎？妳覺得如何？」


    我對喬笑著說：「當然，我很樂意跟你約會。」


    喬希望我們當晚就出去，但我說不行，得等到星期五下班後。


    「好，太好了。」喬爲我開門時回道。


    「我們晚點再決定星期五晚上要做什麼。」說著，我走出了門。


    我整個人開心得飄飄然。那個星期似乎過得特別快，不知不覺到了星期五。那天早上我走進茶水間，喬已經等在那裏，他露出燦爛的微笑問道：「羅娜，今晚妳想要去哪裏？」


    「我想去看電影，」我回答，「我們約六點半在歐康諾橋（O''Connell Bridge）上見。」


    喬要我挑一部片子，這時另一個員工走了進來，之後一整天我們沒再多說一句話。我問爸爸是否可以提早下班，我不要等到六點，想在四點先離開。爸爸什麼也沒問，就答應了。天使早已警告我這事要保密。


    四點鐘一到，我就搭公車回家，走到家門之前，我一直對天使說話。「我好興奮，不過我完全不清楚都柏林上映哪些電影，上次看電影已經是很久以前的事，大約有兩年了。我根本不在乎我們看什麼電影，我只想和喬在一起。」天使笑了。對天使說話的同時，我想起來天使以萊亞告訴我的一切。


    到家時，我告訴媽媽要和朋友到都柏林看電影，她只說：「不要錯過最後一班公車。」再也沒有多問，我猜想天使正在使勁兒幫忙。


    餐廳桌上有份報紙，我立刻翻到影視版，有許多電影正在上映，我隨便挑了一部，雖然對那電影一無所知，但我一點也不在乎，而且天使也沒說什麼，我便覺得一切應該沒問題。現在想起來，覺得很好笑。


    那是個美麗的夏夜，歐康諾橋在街燈和大型盆花的妝點下顯得非常美麗。喬遲到了幾分'
  mdcn: '賣水果婦人的守護天使就站在她身後，彼此非常相像，連穿著也一樣。那天使充滿光亮，綻放美好的笑容，還對我眨了眨眼。媽媽向那婦人買了些蘋果、梨子和香蕉。當婦人把水果放進棕色紙袋時，她的天使的舉動吸引了我的注意，因為他正在搖動手指頭。


    我察覺到婦人把爛蘋果放進媽媽的購物袋，她的天使正在對她說話，可是婦人聽不見。天使持續搖動指頭，我因為沒法繼續裝個撲克臉，於是笑了出來。婦人用銳利的眼光看了我一眼，從她的眼神中，我知道她明白我看見她的舉動。這時袋子突然裂開，水果掉落一地。婦人趕緊撿拾水果，而且撿到一顆爛蘋果！我知道這並不是巧合，而是她的天使和我的天使讓事情發生，我笑得更厲害了。


    媽媽注意到那顆爛蘋果說：「希望妳不是要給我爛水果啊。」


    婦人邊否認，邊拿新袋子裝水果，同時用愧疚的眼神瞄了我一眼。媽媽付過錢後，我把水果袋放進菜籃車裏。要離開時，婦人用她那宏亮的都柏林口音大喊：「嘿，太太！」


    媽媽轉了身，婦人遞出一個袋子。「太太，這個送給妳的孩子們！」她的天使站在她的身後微笑著，婦人終於聽見了他的話語。


    之後，我又去了摩爾街許多次，但街道再也不曾像那次如此活躍鮮明。我很清楚雖然自己看不見某些東西，但不表示沒有發生。天使知道他們不能一直讓我看見所有事物，我會無法承受，也會因此分心而無法正常生活。


    天使還教了我許多關於選擇的觀念。有個午後，他們幫助我了解：改變想法，做出正確選擇，永遠不嫌晚；也讓我知道只要願意傾聽，天使便能幫助我們做出許多正確的選擇。


    我很喜歡幫媽媽跑腿辦事，這樣就可以和天使自在說話。我喜歡和他們一起在街上跳著走，欣賞鳥兒和樹木。這天午後，在前往店鋪的途上，天使告訴我：「停下來，羅娜！走到另一條街上去，我們等下會解釋給妳聽。走到大街後，不要左轉到商店，過馬路，然後右轉直走。」


    我確實照做了，抵達目的地後，看見人行道上堆滿了家具，還有一輛警車和一群圍觀的人。有個老人正從大門拄著柺杖走出來，他所有的財產和家具都堆在街上。那個景象使我非常震驚，終生留在我的腦海裏。


    「天使，」我說，「那個可憐人發生了什麼事？」


    我站在對街人行道上，看著一切。


    「羅娜，那老人一輩子都住在那間房子裏。那是他的房子，但是他越老越頑固，甚至拒絕繳稅。他曾經有過選擇，可以選擇繳稅，也有錢繳，這一切原本不必發生。假使他現在還願意和家人溝通，他們會幫助他做出正確的選擇，可是因為固執，他不願意和家人說話。現在他只有自己能依靠，至少目前是這樣。」


    我問天使在一旁試圖和他說話的女人是誰，如果是他的女兒，他會不會聽她的話？天使回答：「羅娜，妳難道沒看見天使在他的耳邊細語？要知道，他聽得見他們的！妳看，他哭了，願意讓女兒挽起他的手臂，他終於做出正確的選擇。只要我們願意傾聽，做出正確的選擇的時機永遠不嫌晚。」


    「我懂了，」我說，「天使也永遠會幫助我做出正確的選擇嗎？」


    「羅娜，我們會的。」


    有時候，事情只是看起來像個悲劇，爸爸的意外就是這麼回事。他當時為一家大型石油公司工作，在運送煤油時出了意外。公司願意提出賠償，但爸爸不想要錢，只想有份長期工作。最後，公司提出一份合約，讓他擔任都柏林市內一家加油站的經理。爸爸的眼前出現了選擇的機會，毫無疑問，天使幫助他做出正確的決定。這份長期工作使父母在經濟上得以穩定，最後終於能夠負擔一棟屬於自己的房子所需的頭期款。父親的意外事件是個經過僞裝的幸福。有時候發生艱難的事件，是爲了讓人改變，讓生命中的事物得以改變。奇蹟隨時都在發生，只是大家沒看見。


    ## 06

    ### 吸收他人之苦


    沒有人能了解我的學習障礙究竟怎麼回事，父母於是決定在搬到來錫利普（Leixlip）的家後，不再讓我繼續就學。我很難過他們沒有跟我商量就做出這樣的決定。退學的決定是父母對我不公的另一例。他們或許沒有依照別人建議把我送走，但的確對我有不同待遇。


    我看見家裏的經濟環境好轉，而這對我的際遇似乎絲毫沒有影響。當時家裏有了電話，其他的兄弟姊妹隨時可以使用電話而不會被念，可是我想打電話時，就會被告知電話費有多貴，不准使用。想要泡澡，聽到的也是「不可以」，或者「只能用一點水」。事情經常這樣。我到後來根本不敢要求沐浴，只是在臉盆注滿水，用那一點水來洗澡，這樣才不會在提出請求後，又遭到拒絕。我從來不明白，至今也仍然不懂，為什麼我一直受到不同待遇，彷彿我的價值不如別人。


    在家裏幫媽媽打理屋子、整理花園時，我只能眼睜睜看著姊姊與弟妹們出發到新學校。某天晚上，媽媽和我們孩子用餐時，宣布要我隔天陪她去參加喪禮，有個親戚往生了，可是她不想獨自出席。大家想知道是誰往生，迪倫想知道她的名字。媽媽說是泰瑞莎，還讓我們看了照片。


    「我們得搭早班公車，」媽說，「因為我們要到市區另一端，到了之後還要走個十分鐘，才能到教堂。」


    隔天天氣很冷，媽媽要我穿暖和一點。我穿上外套，戴了帽子、手套，也披上圍巾，媽媽還帶了一把傘，以防下雨。在公車上，我看著窗外風景，腦海裏思緒不斷，很好奇喪禮是怎樣的場景，因為這是我第一次參加。


    過了一會兒，媽媽轉過身來對我說：「我們快到了，要記得喔，羅娜，妳要一直待在我身邊，不可以走開，否則會走丟。」


    公車到站後，我們下了車，前往教堂的那段路走起來很舒服。教堂裏已經擠滿人，每個人面容哀戚。神父在前主持彌撒，我則目不轉睛看著整個過程。


    儀式結束後，我們走一小段路抵達墓園。墓園裏有好多天使站在親戚之間，多到讓我嘆為觀止。大多數親戚對我來說很陌生。我看見一大群人，就往人群外圍走去，想把整個場景看得清楚些。媽媽忙著說話，沒有注意到我。一座墓碑旁的灌木叢裏站了一位穿著像人的美麗天使，散發出非常明亮的天藍色。我問她：「為什麼所有天使都在這裏？」


    我以前也常在墓園裏看見天使，但這一天的天使真的非常多。她笑著對我說：「羅娜，妳還有很多東西要學。這裏是天使會被召喚的地方之一，是人們在悲痛之中會呼喊『上帝啊，請幫幫我！我無法獨自面對此事』的地方，所以我們聚集在這裏。」


    美麗的藍色天使牽起我的手，領著我穿越聚集在喪禮的人群。在人群中穿梭時，人們好像自動分站兩側，讓出一條路。雖然大家肯定注意到我走過，卻沒有人阻止我。我們一直走到聚集在墓碑旁哀悼人群的另一端。


    在那群人的外側，就在墓碑旁，站著泰瑞莎的靈魂，也就是當天被埋葬的親人，前一晚媽媽給我們看的照片讓我認出她。泰瑞莎身邊圍了約莫十位天使，或者更多。她的模樣比照片上漂亮許多，就像一朵散發出明亮光芒的美麗黃水仙。這個美麗的靈體獲准觀看自己的葬禮。我走近的時候，她正請求身邊的天使們到所有來哀悼的親友身邊。「剛往生的靈魂可以請求天使們去安慰與幫助留在身後的親友。」


    泰瑞莎一說完，天使隨即飛到墓園裏每位朋友、熟人和親人的身邊。有些人身邊甚至不只一位天使，而是一群天使。天使非常溫柔、慈愛，他們把手搭在眾人的肩上，在他們耳邊輕聲細語，輕柔地撫摸他們的頭。我還看見一位天使像是伸出雙手般環抱了其中一人，天使說這人也失去了親友，心裏正同時為那位親友哀悼。


    我永遠記得藍色天使所展現的美麗，因為她散發出無限的慈悲與同情。不過，當我想到人們得等到有人死了才會請求天使協助的怪異景象，不禁想笑，因為我們並不需要等到絕望或極端痛苦時，才來請求協助，而是應該每天、每月或每年請求一次協助：「我希望天使能陪我一起度過我所經歷的一切。」這樣簡單的請求就能讓天使來協助我們。


    搬到新家幾個月後，爸爸下班回家為我帶來了好消息。當時是秋天，天色還很亮，大約七點，又或許更晚一些，因為爸爸的工作時數很長。他一如往常走進長形的大客廳，舒服地坐在沙發上，打開電視看新聞，在漫長的工作結束後放鬆自己。偶爾我會看著他，但從未告訴過他我能看見他身邊的天使，或環繞著他的能量場。有時候他的能量會嘆一口氣，然後往下沉（我只能這樣形容）。他坐在沙發上時，媽媽從廚房端來晚餐，放在小木桌上，讓爸爸邊吃邊看電視。這一晚，他開口問我：「妳想不想跟我一起到加油站工作？先試試看妳喜不喜歡，至少這是個開始。」


    我開心得想要親吻爸爸，不過，一如往常，我保留了我的心情。爸爸是個好人，在許多方面都接受了我，我也總覺得他早就知道某些事情，只是沒法說個清楚。不過從很小的時候天使就一直提醒我，我很有可能被當作有精神障礙而被關起來；他們一直告誡我，要是父母覺得我不對勁，就會把我送到精神病院。為此，我從來不敢對爸爸有過度的情緒表現，在他身邊時，舉止行爲總是特別小心。


    幾天後，我開始工作。上班的第一天，我吃過早餐，和媽媽道別後，就上車跟爸爸到加油站去。加油站叫做葛斯夫諾（Grosvenor），位於都柏林郊外的羅斯曼地區（Rathmines），坐落在繁忙的交叉路口上，左右各有一條主要道路，地點絕佳。加油站本身是一棟老舊的大房子，前面有四座汽油幫浦、一座柴油幫浦、一組打氣管和一個水龍頭。整個地方又臭又濕，簡直要四分五裂，讓我想起舊克爾麥罕的老房子。房子本身一部分做為辦公室，一部分用來銷售輪胎、爆胎維修組件、電池和其他重要的汽車零件，還有一間是用來修補爆胎的車庫。


    上班的第一天我非常興奮，也很緊張，害怕自己做了什麼蠢事或傻事而讓爸爸失望，我不想讓他失望。但我其實不用擔心，因爲每個人都很和善，也很熱心幫我，當然，天使也伸出援手。我學會做各種工作,包括加油和銷售商品,也開始學習行政事務。加油站約有九到十位工作人員,其中只有一位女性,可愛的安妮,她從我上工第一天,就一直保護著我。我們相處得很好,她還教了我許多東西。


    第一天上班很愉快,下班跟爸爸回家時,我對自己也很滿意。我倒是很好奇,不論是那天或其他時候,爸爸爲何不曾注意到不論加油或找錢,對我來說都不成問題,爲什麼他還是繼續把我當作智障的孩子?


    我開始工作後不久,公司決定拆掉老舊的加油站,重蓋一座新的。一個週末早晨,我跟爸爸坐在車裏,驚奇地看著工人用巨大的鐵球不停撞擊舊有建築,直到房子崩塌爲止。一段時間後,一棟新穎的現代加油站蓋好了,有新的店鋪、新的加油幫浦,還有一間明亮舒適的辦公室,從辦公室裏可以看到店鋪和加油幫浦。


    一如往常,天使讓我看見許多事物。有一天他們要我觀察一位老客戶,一名叫約翰的男人,我對他很熟悉。「看著他,他要偷妳爸的東西。」


    爸爸認爲約翰是個有錢人,也是個重要的顧客,所以聽到天使這麼說,我很震驚。我說:「走開,他才不會偷東西。」


    「他會的,」天使堅持說,「妳可以仔細觀察,他看不見妳的。」


    我還是不相信他們。我看著約翰和爸爸談話,聽見他稱讚這家新的店鋪和其中販賣的各種商品。爸爸邀請他四處看看,然後離開去做別的事情。我單獨和約翰一起留在店鋪裏,天使卻說約翰看不見我。我說:「他當然看得見我,我是個血肉之軀啊。」


    他們笑著對我說:「不,他看不見妳!」


    有時候天使會說些我無法全然明白的事情。但我突然間明白了,原來他看不見我是因為天使把我從他的眼底變不見。


    我看著約翰四處走動,觀察每樣東西,包括剛進貨的新音樂卡帶(當時卡帶很昂貴)。他拿起一片卡帶放進自己的口袋。我簡直不敢相信自己的眼睛。


    「為什麼?」我問天使。


    「他常做這種事,」他們回答,「偷竊讓他覺得自己比別人更勝一籌。」天使解釋說,當約翰看到某人很成功,或者做得很好的時候,總會心生嫉妒,而他的反應方式就是從那人身上偷取他認為有價值的東西。


    「我該告訴爸爸嗎?」


    猜猜他們怎麼回答的?我不敢相信他們竟然告訴我:「不!有一天這男人會對自己過去偷竊東西感到良心不安,但不是現在。此刻時機未到,任由他去吧。」


    我很難過,因為約翰和加油站往來許多年了。在那之後,只要他來到店裏,我就會跟在他身邊,假裝在打掃。


    有一天我和安妮在辦公室核算總帳的數字。安妮是很棒的祕書,教我許多東西,有時候我很訝異一切其實竟然如此簡單。那天我們做了很多事。然後,店鋪的門開了,一個男人走進來，我起身為他服務。在那當下，我察覺到他有一股沉靜的氣息，空氣裏也有種靜止的氛圍，他沒有多說什麼話。我把商品交給他，道別後，他就離開了。


    我走回辦公室的座位，四下寂靜無聲，安妮動也不動。我站在她的左後方，看著窗外，一位天使把手放在我的肩上。前庭看起來空空蕩蕩，只有一輛車停在汽油幫浦旁。我朝街道盡頭看去，原本看不見的街道轉角處，突然出現在我眼前，一群小男孩踩著自行車朝加油站的方向騎來。


    這群孩子非常快樂，彼此笑鬧，伸手互相觸碰，玩得很開心。我聽得見他們說話的聲音，但無法聽清楚內容。我把注意力集中在他們身上。一輛車從旁經過，一切彷彿以慢動作進行，周遭其他事物則完全靜止，又彷彿我也和孩子們一起騎著車前進。一輛聯結車從後方追上孩子們，我屏住呼吸，剎那間我已經知道下一刻會發生什麼事。前面那輛車已經離開了，卡車和孩子們成為唯一移動的物體。


    男孩們仍然開心騎著自行車，在路上追逐，放聲笑著。一切都是慢動作，聯結車通過之際，孩子們和聯結車全變成了發光體。他們如鬼影般穿越彼此。聯結車轉了彎，繼續往前開，駕駛對剛才發生的事渾然不知。時空的連結完全沒有中斷，一切繼續流動。男孩們對剛才發生的事也視若無睹，彷彿不曾摔落下來，一點也沒注意到發生什麼事，只是繼續跟著卡車前進，開心踩著車。聯結車繼續前進的同時，出現一團巨大的光芒，那光芒彷彿來自卡車末端。


    突然間，馬路上充滿天使。男孩們和自行車都在發光，並朝著光芒前進。我目睹自行車逐漸浮升到空中，街道也變成一道充滿天使的光芒。這是個非常輕柔和緩的轉換過程，從一個生命轉換到另一個新生的生命中，直接前往天堂。接著，男孩們消失，一切恢復正常。


    突然間，一輛車開進加油站，有個男人下車大喊：「你看見聯結車往哪個方向去了嗎？」


    在亭子裏工作的史蒂夫大喊：「發生什麼事？」


    那人說出車禍了。有人告訴他聯結車往右邊開，他立即上車追去。就在那時候，又一輛車高速行經加油站，在路上飛馳。我則呆站在原地。


    通往店鋪門被打開，我轉身看見爸爸走來，他說剛剛發生慘重的車禍，要我去泡一點茶。我很高興能離開辦公室，得到一點屬於自己的空間。前往茶水間的路上，我忍不住對天使大叫：「為什麼要發生這種事？」


    我得到的答案是：「羅娜，生命就是這樣。對多數人而言，死亡是讓生命持續流動到另一個生命的完美和諧過程。要記得，在死亡的剎那，那些男孩並沒有什麼感覺。同樣的，一個人即使因病所苦，死亡的剎那他們卻不會覺得痛苦。」


    在泡茶和工作當中，天使不斷安慰我，那天工作結束時，我很開心能回家享用媽媽的手藝。到家後，我給她一個大大的擁抱。那天起，我每天都刻意記得要給媽媽一個擁抱，因為那很重要。


    我知道自己遲早得走過意外發生的現場，所以約一週後的某天上午，我鼓起勇氣朝街上的商店走去。我並不是獨自一人，米迦勒牽著我的手。當我經過加油站的前庭，他對我耳語：「走向五金行，有個要到達的目的地，能幫助妳集中精神。」


    接近事故現場時，我看見路上有血漬，一時震驚不已。雖然事故發生已經一週，但我從沒想到路上還有血漬，我震驚得像被閃電擊中。但也許不是人人都看得見血漬，或許只有我看得見。


    通過事故現場時，我聽見了那些男孩的父母和家人哭泣哀嚎的聲音，心中升起難以抑制的悲傷情緒，眼淚奪眶而出。我向上帝請求：「求求祢，上帝，請幫助這些親人，盡量讓我接收他們的痛苦與哀傷。請讓這些父母知道他們的孩子已與祢同在天堂。」


    我失去了知覺，對周遭的一切毫無意識，天使帶著我的身體通過那個時空。有時候，我不解自己是如何從一個地點到達另一個地點。這是個難以理解的奧祢。突然間，我已經來到五金行門前，感覺到天使用天使把我從靈的空間攜出，讓我重新站穩腳步。「完成了，羅娜，」米迦勒說，「上帝聽見妳的祈禱了。」


    我進入五金行，四處逛了逛，好讓自己重回現實，恢復正常。然後我又走回加油站，中途再度經過事故現場。那時我知道自己已經吸收了那些家庭部分的傷痛。但我無法描述究竟是身體的痛比較難受，還是精神上的。但只要是上帝和天使要求，我都會做，即使是要我吸收別人的痛苦，我也願意。這是我的命運，是上帝給我的禮物，這份療癒的禮物就是去接收他人的痛苦與折磨。有人或許認為這是一種詛咒，而非禮物，但只要我願意接收，就能減緩他人的痛苦。我就像個媒介，接收痛苦，把它傳遞給上帝。有時候，痛苦實在是難以承受，甚至覺得自己就要死去似的。但我不會因此喪命，因為上帝接收走我的痛苦。我不知道上帝又是如何處理那些痛苦，對我來說那也是個謎。不過，我一再見證了一切。


    ## 07

    ### 沒有靈魂的東西


    十七歲那年，在加油站工作十八個月後，以萊亞的預言成真了。


    當時我和安妮及爸爸在辦公室裏，從我的位置，能透過大窗戶看到街道遠端和那兒的樹。遠方有個年輕人沿著街道走來，突然間，我認出了他。


    一看見那排樹和年輕人，儘管他的距離還很遙遠，我立即明白那就是我將要結婚的對象。我幾乎喘不過氣來。我知道他將要越過馬路，走進加油站來找工作。


    有人撫弄我的頭髮，我回頭看見守護天使站在一旁。我又朝窗外看去，男人穿越前庭時，我也模糊看見他的守護天使就在他的能量場之中。年輕人非常英俊，有著偏紅的金髮，身材很高，我喜歡高個子的男人。看著他，我無比興奮，因為我已經知道結果將如何發展。


    儘管如此，我還是轉身對安妮說：「有人要來應徵了，希望他不會被錄取！」這話我自己也覺得好笑，因為我對生命中的這個重大改變是那麼害怕，又那麼害羞。不過內心深處，我知道他將得到這份工作，一切已經注定好。


    年輕人走進店鋪，爸爸抬頭看見他，示意他一會兒就過去。爸爸走出去時，我坐在原地，幾乎動彈不得。我全身顫抖不停，根本不想待在那裏。以萊亞所說的一切湧入腦海：我將和這個男人結婚，我會愛他，他也愛我，我們在一起的大部分時光很愉快，但是到最後，我得看護他，而且無法一起終老。


    爸爸和年輕人站在店鋪裏談了許久。後來，我終於起身收拾用過的杯子，拿到茶水間清洗。我從仍在談話的兩人身邊走過，偷偷看了他一眼。我好喜歡他的模樣！我花了很久的時間洗杯子，泡新茶，茶端出來時，他仍在和爸爸說話。我不知如何是好，店裏剛好來了一個顧客，便趕緊去招呼客人。我非常緊張，只得努力忽視那年輕人。


    當然，父親雇用了他，隔天就開始工作。經過介紹，我得知他的名字是喬。我從遠處看著他學習一切如何運作，如何加油，如何修理爆胎。喬結束第一天的工作後，在回家的路上，爸爸告訴我他覺得喬很聰明，學習力很強。


    我試圖避開喬，但總會忍不住偷看他，深受他的吸引。我好奇喬是否注意到我，是否感覺到我們之間的連結。每次我去茶水間泡茶洗杯子時，天使似乎故意讓喬也出現。他總是對我露出燦爛的笑容，於是我心裏知道他也感受到什麼。我也回以微笑，但不會多說話，而且是盡快衝出茶水間。


    喬上班約莫六個月後，他邀我出去。那天我又到茶水間泡茶，在注水入茶壺，清洗杯子時，喬走了進來，說要幫我清洗。我笑著說不需要，因為才三個杯子而已！正當我拿著茶盤端茶壺和杯子要離開時，喬問道：「羅娜，我可以跟妳約會嗎？妳覺得如何？」


    我對喬笑著說：「當然，我很樂意跟你約會。」


    喬希望我們當晚就出去，但我說不行，得等到星期五下班後。


    「好，太好了。」喬爲我開門時回道。


    「我們晚點再決定星期五晚上要做什麼。」說著，我走出了門。


    我整個人開心得飄飄然。那個星期似乎過得特別快，不知不覺到了星期五。那天早上我走進茶水間，喬已經等在那裏，他露出燦爛的微笑問道：「羅娜，今晚妳想要去哪裏？」


    「我想去看電影，」我回答，「我們約六點半在歐康諾橋（O''Connell Bridge）上見。」


    喬要我挑一部片子，這時另一個員工走了進來，之後一整天我們沒再多說一句話。我問爸爸是否可以提早下班，我不要等到六點，想在四點先離開。爸爸什麼也沒問，就答應了。天使早已警告我這事要保密。


    四點鐘一到，我就搭公車回家，走到家門之前，我一直對天使說話。「我好興奮，不過我完全不清楚都柏林上映哪些電影，上次看電影已經是很久以前的事，大約有兩年了。我根本不在乎我們看什麼電影，我只想和喬在一起。」天使笑了。對天使說話的同時，我想起來天使以萊亞告訴我的一切。


    到家時，我告訴媽媽要和朋友到都柏林看電影，她只說：「不要錯過最後一班公車。」再也沒有多問，我猜想天使正在使勁兒幫忙。


    餐廳桌上有份報紙，我立刻翻到影視版，有許多電影正在上映，我隨便挑了一部，雖然對那電影一無所知，但我一點也不在乎，而且天使也沒說什麼，我便覺得一切應該沒問題。現在想起來，覺得很好笑。


    那是個美麗的夏夜，歐康諾橋在街燈和大型盆花的妝點下顯得非常美麗。喬遲到了幾分'
