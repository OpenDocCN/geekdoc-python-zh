    我記得自己非常難過, 心想：「天啊, 我討厭看到這種場景。」不過, 討厭是錯誤的字

    眼。我在觀看的同时, 感受到強烈的痛苦, 也非常同情躺在擔架上的男人所感受到的痛苦和

