  md: '米迦勒 268


    汝療癒天使的祈禱，

    由天使長米迦勒為上帝所帶來。

    傾注，汝療癒天使，

    汝天堂之主降臨於我，

    於我所愛的人們，

    使我感受汝。

    療癒天使之光於我身上，

    你療癒之手的光芒。

    我將令汝的療癒開始，

    以上帝所賜之道，

    阿們。


    米迦勒讀完捲軸，我請求他再讀一遍，而且要慢一點，因為我無法順利寫下內容，那用詞很奇怪，不是我慣用的言語，但這就是我所接收到的文字。米迦勒天使對我笑著，然後用一根指頭觸碰我的額頭。「現在寫吧，羅娜。」

    米迦勒天使再度讀出捲軸上的祈禱文時，我毫無困難寫下了每一個字。上面所寫的正是我被給予的文字，雖然這些字在我聽來頗為奇怪。米迦勒說：「把這祈禱文給予每位來尋求'
