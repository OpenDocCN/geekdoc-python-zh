  md: '身體兩旁，手掌張開，指尖朝下，手指散發一道道金光；臉龐耀眼透亮，明亮的雙眼充滿色彩，從中投射出生命的永恆；古銅色的捲髮長及肩膀。但我該如何描述一道充滿愛、慈悲和希望，同時充滿生命的明亮耀眼光芒？


    上帝緩緩轉身面對大家，以我們無法理解的動態在橢圓形座位內側移動。所有人在沉靜之中、在靜思之中、在祈禱之中讚美與感恩上帝，卻對祂的存在毫無知覺。上帝在我身後的民眾間移動時，我感受到祂強而有力的存在感，祂內在的寧靜也填滿了我。我於是祈禱上帝能永遠如此停留與行走於我們之中。


    禱告完時，我感覺到祂用手觸碰我的肩膀。上帝在這明亮的光耀之中切實觸碰了我的靈魂。該如何描述我的靈魂所目睹的景象？那是在永恆無盡之中的純淨，全然的清晰。


    接著，上帝化為一道閃光，消失無蹤，教室又恢復正常。我的眼睛完全張開，那一團美麗煥發的生命，上帝於我們之間行走時所散發的光輝已不復存在。我帶著微笑，熱淚盈眶。


    又過一會兒，大家停止禱告，抬起了頭。有人開口說在大團體中祈禱與冥想，讓他們感受到一股難以置信的喜悅與平靜。這時候，一位年輕神父（我不知道他是否已經是位神父，也可能還是個神職學生）說話了。他坐在最內圈裏，有一頭棕髮，個子不高，留了點鬍子，又或者只是有鬍渣？我並不確定。


    「有人感覺到了嗎？」他問道。


    我知道他要說什麼，我詢問天使：「我可不可以告訴大家我也感受到了，這樣才能幫助他？」但天使回答不可以。'
