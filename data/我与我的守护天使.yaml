  md: '取他人的靈魂（我知道有人會說，你若遭到謀殺，那是因為你的時間已到，或者是前世作為帶來的復仇，但這並非定律），自己的靈魂同時也感到巨大的疼痛與傷害，因為他的靈魂無法阻止他進行如此駭人聽聞的舉動。


    遭到謀殺的年輕妻子的靈魂，因為知道男人的靈魂陷於囹圄，而感到悲傷，原諒了他。


    靈魂永遠會寬恕他人，永不放棄，就像天使一般。我們的靈魂永遠不會放棄彼此。'
