  md: '奶奶給我一塊布,要我擦桌子,她則整理櫃子,小心地拿起上面的寶貴物品,一件件拂去塵土。我看著她拿起裝在橢圓大相框裏的照片,感覺到她內心有很深的悲傷。她一定感受到我的目光,所以轉過身,帶著照片走過來,坐在古老的大高床上,並拍拍一旁的空位,我隨即爬到床上坐下,兩隻腳懸空擺盪。她拿出一張老照片給我看,上面有個女孩大約與我同齡,衣衫襤褸、打著赤腳、披頭散髮,還有個小男孩蹲在一旁,拿樹枝玩著泥巴和水塘。

    「這是我兩個被上帝帶走的孩子,他們正與上帝同在天堂。」

    說這話的同時,奶奶眼裏泛著淚光。我對她說:「妳會再見到他們,妳知道的,對不對,奶奶?」

    「是啊,羅娜,」她回道:「希望能很快再見到他們。」

    奶奶告訴我他們當時非常貧窮,小兒子湯米可能是因為營養不良,所以生了病。我能在奶奶的言語間感受到一股深沉的悲傷和沉重感。小女兒美莉喉嚨裏長了東西,爺爺背著她騎車騎了好幾十公里路,從威克羅(Wicklow)一路騎到都柏林的醫院。但他這麼努力付出卻依然不夠,醫生還沒能動刀,美莉就死了。奶奶告訴我,當她看著我爸黝黑的帥氣臉龐時,就會幻想如果湯米長大的話,會是什麼樣子;當她看著我和姊妹們時,就想知道美莉又會是什麼模樣。「我知道有一天我可以再度擁抱他們,但是我等不及那天的來臨。」奶奶說。我能感覺到她心中的傷痛,那些發生在她和子女身上的事情所帶來的痛苦。

    接著她沒來由地對我說:「要知道,羅娜,妳不需要害怕。靈體無論如何都無法傷害妳。若是害怕,只要做個小小的祈禱就可以:『耶穌和瑪麗亞,我愛你們,請拯救這些靈


