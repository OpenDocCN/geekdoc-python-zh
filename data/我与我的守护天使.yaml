  - '[PAGE 286]


    美妙有如瓷器一般，五官清晰，身體則像太陽般發光，雪白的雙眼也閃耀著光亮。羽毛翅膀彷彿向上旋轉，並且觸碰到上方的一道光。

    「可以摸摸她嗎？」我問道。

    「不，妳不可以摸她，但可以把手放在她的上方。」天使對我說。

    我把手伸到她的上方。當我伸出手，她轉頭看著我，眼中充滿生命力，並且散發比天上星星更燦爛的光芒。她微笑，在那一刻我聽見她說：「告訴媽咪我愛她，也愛爸爸。」

    兩位天使彎腰把她抱了起來，他們的翅膀交纏環繞著她。他們向上升起，天空輕柔開啟，他們如光般一閃即逝，房裏的一切恢復正常。

    我知道一切都結束了。我讚美並感謝著上帝。


    那天上午稍後我到吉姆肉鋪，聽到大家議論紛紛。有人問我是否聽見了消息？有個新生兒的屍體在運河橋畔被人發現。沒有人知道誰是母親，或者發生了什麼事情。有個男人在清晨溜狗時發現了她。這時我才明白，小寶寶被發現的那一刻，就是天使們從臥室消失的時候。我非常開心，但無法描述感受到的快樂，因為那是一股了解寶寶的靈體已經去了天堂，而我的任務已經完成後，所感受到的喜悅和寬慰。


    當地社區對此事非常難過，過去不曾發生過這樣的事情。某個年輕的母親，或許是學院的學生，認為懷孕一事必須保密。想到此，就讓人震驚。

    警察進行了調查，但就我所知，他們未能找到母親。或許有一天她會讀到這個訊息，了解不論寶寶在何種情況下死去，都一樣愛她，也從來不曾感到孤獨，因為天使一直陪著她。'
  - '[PAGE 287]


    所有寶寶都一樣，不論是生是死，不論在何種情況下，天使總是陪在一旁。

    社區被寶寶的死觸動了心弦，大家捐款爲她購買一個墳墓，讓她妥善埋葬。在埋葬之前，小寶寶有了名字。如今，布麗姬（Bridget，譯註：與英文「橋」字近音）就埋葬在梅努斯的墓園中。


    喬的病情越來越惡化，陸陸續續小中風，喬非常害怕。有時候他會失明幾分鐘或身體完全癱瘓，走路對他來說越來越困難，還經常跌倒。雖然我盡全力看護他、扶住他，他還是全身瘀青。醫生也無能爲力。


    天使努力鼓勵著我。有一天我到附近散步，享受溫暖的陽光，觀賞周圍景物，最後來到一處綠地。孩子們在那兒踢足球，許多人也輕鬆躺在草地，享受美好的天氣。我注意到有個孩子坐在輪椅上，蜷曲著身子睡著。她的身體似乎扭曲得厲害，而且非常消瘦，很難看出年紀大小，很可能是七歲左右。她的母親坐在不遠處的一面矮牆上，和鄰居談著話。


    我慢慢靠近，那孩子變得越來越明亮，輪椅也一樣。一切事物似乎靜止下來，我簡直不敢相信眼前所見。她的靈魂離開了身體，留下輪椅上熟睡的身形。靈魂散發著光芒，模樣就像小女孩若上了天堂時會有的樣子，全然完美無缺，美麗無比。


    兩位年紀和她相仿，也是女孩的天使出現，牽起她的手。接著又來了三位天使，也都是小女孩，一身白色，明亮到近乎帶著藍色光彩。我站在原地，動彈不得，完全被眼前景象震'
  - '[PAGE 288]


    懾。小女孩的靈魂離開身體，跟天使玩耍。他們彼此追逐，也手牽手繞著圈圈唱著歌，但始終不曾遠離輪椅。我能聽見他們的笑聲，小女孩的靈魂是那麼自在、快樂。我試圖向前移動，想要把一隻腳移到另一隻腳前面，但是不論多麼努力，天使就是不讓我走動。

    小天使們和小女孩的靈魂圍成一圈，坐在輪椅旁邊的草地上。我入迷地看著她們，對於即將發生的事情一無所知。突然間，一位天使的手觸摸了一片草葉，隨即出現一朵雛菊。其天使也移動她們的手，用指尖觸摸草葉，草葉一一變成美麗的雛菊。就在草地中央，出現了一圈白色小雛菊，圓圈裏坐著開心大笑的天使和一個光芒四射的小靈魂。那母親持續在一旁聊著天，完全不知道發生什麼事。


    「雛菊鍊。」小靈魂大喊，於是她們開始製作雛菊鍊。天使用雛菊項鍊妝點小女孩的頸部，也套在手臂和腳踝上，還在她頭頂放上公主的頭冠。她們教她在花莖上劃出一道小裂縫來製作鍊子，她也坐在那裏開始動手。如此豐富的愛與溫柔，使我不禁充滿喜悅與幸福感，也因此淚流滿面。我看著小女孩，欣賞著她的雛菊鍊。她的臉龐如太陽一般煥發著光芒。


    最後天使把手臂環繞在她身旁，把她抱起來，帶回輪椅上。她似乎並不介意。小靈魂輕輕躺下，蜷縮回自己沉睡的軀體中。

    天使也如來時那般突然消失無蹤，光芒也不復存在。小女孩在輪椅裏動了動。我被鬆開而能自由移動時，差點絆倒自己。周圍的一切又恢復正常模樣。我聽見鳥叫，感覺微風吹拂，看見了人群。我離開坐在輪椅上的小女孩時，朝她母親看去，心想她是多麼有福氣，能在家中擁有如此純淨的靈魂。'
- md: "## 27\n### 喬\n\n  喬在生命的尾聲時，無法記得自己是誰，人在哪裏，也經常認不得我或孩子。幸好，孩子似乎從未注意過此事。我經常坐在他身邊，跟他說話，訴說往事，幫助他記憶。我非常急切想幫助他盡可能神智清醒和我們同在一起。\n\
    \n  每天早上我幾乎都得到鎮上一趟，因為家裏總是少了什麼東西。我回到家，一定先去看一下躺在床上的喬，確認他安然無恙後，再為兩人泡茶，然後坐在床邊的小板凳上和他聊天。\n\
    \n  一天上午，我們這樣坐著聊天，喬說：「妳知道嗎，羅娜，早上妳出門後，我就一直躺在那裏回想過去的事情，回想我們的生活和孩子們的一切。讓我害怕的是，有時候我連自己在哪裏都不知道。」\n\
    \n  和往常一樣，我們身邊坐著許多天使。突然間，坐在床上的天使消失，只剩下喬的守護天使。守護天使似乎支撐著喬的身體，雖然喬就躺在床上，但感覺上床彷彿根本不存在。喬一臉困惑。「握著我的手，」我說，「我會幫助你記得。」\n\
    \n  喬的守護天使從背後支撐，並將一隻手高舉在喬頭頂上，為他傾注記憶之光。一道如奶油般閃著銀光的白色物質，從守護天使的手心流出，進入喬的頭頂。光持續流洩，直到我們結束對話。\n\
    \n  我們回顧了往事，我對喬當時所能記得的事情感到興奮無比。他談到兒子歐文在領聖餐禮的那一天，如何用領到的錢買了一雙全新的足球鞋。在那之前，熱愛足球的歐文一直都是接收二手鞋，這是他第一次擁有新鞋。想到歐文一雙又一雙試穿，不停比價之後，終於做出決定的模樣，喬便笑了起來，因為歐文非常驕傲擁有那雙鞋。\n\
    \n  回憶使喬的雙眼充滿幸福的淚水。\n\n  喬對於我和天使的關係一直很不安，儘管我和他分享了許多事情，依然害怕天使把我帶走。他會如此沒有安全感是因為生病的關係。他若知道有人要來找我，尤其又覺得身體特別不舒服或虛弱的話，就會變得很焦慮。有時候可以聽見他說：「他們把妳帶離我身邊，可是我比他們更需要妳。」我非常同情他，但也知道我必須完成該做的事情。\n\
    \n  記得有個男人帶著即將死去的妻子來找我，他們感到絕望無助。男人非常需要妻子活下去，可是那妻子已經接受自己即將死亡的事實，希望在心靈上獲得成長。他們經常來訪，有時候甚至突然出現。喬對此難以接受，對我說：「我也一步步邁向死亡啊。」儘管他嘴裏這麼說，我卻不完全相信他的話，因為喬並未真正接受生命再不久便結束的想法。這並不罕見。\n\
    \n  傳統醫藥對那位女士逐漸失效，只能控制疼痛，因此她也和許多人一樣，轉而尋求心靈上的協助。在醫生的協助下，她前往巴西旅行。我知道那是她最後的旅程，而且將對身體造成極大耗損，但對心靈來說卻是非常重要的。有時候，明白自己即將死去的人，會想學習更多關於靈魂之旅的事情，因為這能幫助他們更了解死亡。\n\
    \n  她在巴西的時間非常短暫，卻極為重要。她回來後，儘管體力非常虛弱，卻第一時間來找我，告訴我旅程上發生的種種，並為心靈之旅尋求更進一步的學習。她丈夫也坐在廚房裡，在她說話時幫腔。有一度，她要求丈夫閉嘴，不要插話，她非常渴望親自告訴我一切，如此才能得到療癒，最後在平靜中死去。她要離開時，我給她一個擁抱，明白這是最後一次見面。她走下階梯，我看見一道光芒，她的靈魂回頭看我，一個完美的靈魂。她回到家，上了床，從此不曾下床。\n\
    \n  天使一直告訴我喬的時間不多了，我經常因為他們說我不想聽的話而哭泣。有一天我去商店購物出來，一位天使站在我面前，四周圍繞著小鳥。「走開！」我說。\n\n\
    \  天使隨之消失，可是小鳥依然存在，各式各樣的小鳥，包括麻雀、椋鳥、黑鶇、寒鴉及烏鴉等較大型的鳥。牠們繞著我飛，翅膀幾乎要碰到我。我伸手驅開小鳥，最後牠們終於飛離。現在我稱那位天使為「鳥天使」。\n\
    \n  鳥天使非常美麗，身材高挑優雅，身穿白色長袖袍子，袖子有特殊剪裁，腰間繫著金色腰帶，還戴著一條V形項鍊，項鍊尖端掛有一顆約五公分厚的綠寶石。他有金色的臉龐，白色的眼睛。以前他只出現過幾次，每次見到他之前，我身邊會先出現各種大小的鳥類，並且靠我很近。\n\
    \n  喬若是比較舒服，很喜歡到爐火邊坐一會兒，有時候甚至在我的協助下，努力走到前門。有一晚，我們一走出屋外，小鳥從四面八方飛來，飛到他的腳邊，啄著石頭，有些則飛到柵門上，開始整理羽毛。\n\
    \n  「這些鳥是從哪裏來的？我從未一次見到這麼多種鳥。」\n\n  我指著鳥說：「牠們會在這裏，是因為鳥天使就站在離我們不遠處。」喬自然看不見鳥天使，但他的眼睛頓時亮了起來，露出一個大笑容說：「我喜歡鳥天使。」然後我們就轉身走回屋內。\n\
    \n  我跟喬談論過他是否應該住院。他說如果住院，最後在醫院死去，我和孩子可以輕鬆一些，他不想成為我們的負擔。「不，喬，你並不是負擔。我愛你，孩子們也愛你。我們不希望你死在醫院裏，而是希望你留在家裏，和我們在一起。」\n\
    \n  喬過世前幾天，醫生在午餐時間來問診並告訴喬也許他應該住院。我問醫生：「喬如果現在住院，再回家的機會有多大？」\n\n  「他很可能無法再回家了。」醫生回道。\n\
    \n  喬和我看了彼此一眼，同聲說：「不要。」喬告訴醫生我們談論過讓他在家臨終的事情，我也補充說：「我們已經決定了。」\n\n  站在床尾的醫生眼中透出慈悲與理解。「不論日夜，隨時打電話給我，任何時間都不要緊。」他說。\n\
    \n  隔天，喬告訴我晚餐想吃豬排，所以我去吉姆肉鋪。吉姆知道喬生病，不過他說：「抱歉，現在沒有豬排。」接著他走到後面，回來後說明天會有豬排。\n\n  那晚喬說他想要走點路，我幫助他走到柵門邊。那是個明亮的夜晚，星羅棋布，但是也很冷。我們站在柵門邊，鳥天使再度出現，站在房子對面草地旁路燈的左邊。喬停下來，靠在柵門邊休息。\n\
    \n  「真是個美麗的夜晚。」他說。\n\n  我轉身再往路燈處看一眼，鳥天使已離去。我注意到右邊夜空中出現一道亮光。「喬，快看！」我說。\n\n  喬轉身朝屋子的方向看去，一隻美麗的白鳥從黑暗中朝我們飛來，越靠近，身影越明亮，體型也越大。低飛而來的鳥呈現出雪亮的白，而且非常龐大，羽毛紋路清晰，非常華麗。\n\
    \n  「是一隻白鴉！」喬驚呼。\n\n  我們以爲會被牠撞上，於是低頭躲避。白鴉從頭頂上掠過，直接朝環繞街燈的光芒飛去。街燈非常明亮，現在想起來，才察覺亮得很不尋常。白鴉飛過燈時，我們清楚看見牠的樣貌，接著牠就消失無蹤。\n\
    \n  「真是個壯觀的景象！」喬讚嘆說，「那隻夜鴉竟如此龐大、雪白。牠到哪裏去了？飛進燈光後就不見，彷彿發生一陣光爆，隨即消失無蹤。」\n\n  我對喬微笑，告訴他稍早走出來時，鳥天使就站在路燈旁，他把自己變成一隻白鴉讓喬能夠看見。\n\
    \n  我們在外面停留的時間比平常更久，喬的腿開始顫抖，我扶他回屋內上床，倒了一杯茶給他。他要我在床邊坐下，有事情要告訴我。\n\n  他打開床邊的抽屜，拿出一個信封交給我：「這是妳的生日禮物，明天是妳和露絲的特殊日子，這是妳們的生日禮物。」\n\
    \n  我困惑地看著信封袋。\n\n  「打開來！」他說。\n\n  我不敢相信眼前所見，裏頭竟裝了一百鎊！\n\n  「喬，這是從哪裏來的？」\n\n \
    \ 喬告訴我他已經存了一段時間。\n\n  「我一直沒跟妳說，有時候來找妳的訪客會堅持給我一點買菸錢。我一直把錢存著。我希望妳們兩人到都柏林享用一頓美食，並且去買一只我答應要給妳的戒指。」\n\
    \n  喬指的自然彌補那只在當鋪被偷的訂婚戒指。他曾經承諾要再爲我買一只，如今他實現承諾，卻是在這樣的情況下！過去六星期來，喬一直說要努力活到我們生日這一天，現在我知道其中的原因了。\n\
    \n  我給喬一個擁抱和親吻，然後到露絲房裏告訴她明天一早要到都柏林去慶祝她十六歲的生日，我還要去買戒指。露絲跑到她爸的房裏，也給了他一個大擁抱和一個吻。\n\
    \n  隔天上午，露絲和我搭公車到都柏林，走到兩條腿快斷了，才在歐康諾街上的珠寶店找到我想買的類似戒指，然後去吃了午餐。吃飯時，露絲說她那晚打算出門，和朋友的父母及家人一起度週末。\n\
    \n  「媽，妳覺得我週末出去有關係嗎？我真的很期待可以去，但也很擔心爸的狀況。」\n\n  「去吧，度過一個愉快的週末。」我說，「不用跟妳爸說要出門，那只會讓他擔心、困惑。」\n\
    \n  那天我們過得很開心。不過我很擔心喬，不斷停下來打電話回家，確定一切沒問題。幸好電話就在他的床邊。\n\n  我們外出時，發生了一件美好的事情。當時四歲的梅根，那天又跟平常一樣跑去找她爸爸說話。她習慣坐到床上窩在喬身邊，聽他讀書，或者坐在一旁的地上畫圖。那一天她告訴喬「來跟我玩」，用的是還沒出生前在他面前現身時所說的話。她非常堅持喬來推鞦韆。喬不知從哪兒來的能量——只有上帝和天使才辦得到——起床，換衣服（他已經好幾星期不曾這麼做），到外面去幫梅根推鞦韆。克里斯多夫看著他們兩人，不敢相信自己的眼睛。梅根和喬開心笑著，整整盪了十分鐘的鞦韆，之後喬又回到床上。\n\
    \n  回到梅努斯後，我到吉姆肉鋪去取豬排，正要付錢時，吉姆卻說：「這是招待的！告訴喬我問候他。」我謝過他後，便和露絲趕回家。\n\n  那晚小屋裏擠滿了天使。前廳裏火爐燃著火，我一邊烹調豬排、馬鈴薯、蔬菜和肉汁，一邊把菜從廚房端到前廳，我們在火爐邊的咖啡桌享用晚餐，慶祝生日。喬幾乎什麼也沒吃。他說雖然一直期待能嘗到豬排的美味，現在卻只吃得下一點點。他注意到露絲正準備出門，不斷問她要去哪裏。露絲回答要去拜訪朋友，但喬似乎非常困惑。\n\
    \n  露絲在廚房裏準備離開時，又問：「媽，妳想爸會沒問題吧？」\n\n  「我『妳爸會希望妳生日這一天玩得開心。快去吧，如果有事情，我會馬上打電話給妳。」我回道。\n\
    \n  露絲跑回她爸身邊，給他一個吻，跟他說再見。她哥哥克里斯多夫回到家，給自己弄了點晚餐，也和我們一起坐在前廳烤火。他邊吃晚餐邊和他爸聊天，吃完後給喬一個擁抱，說他稍後就回來。\n\
    \n  我獨自和喬待在前廳，喬說：「妳知道我好不容易才活到妳生日這天。」\n\n  「我知道，謝謝你，這是最好的生日禮物，我也很愛那只戒指。我已經別無所求了。」我給他一個擁抱，天使們圍繞在他身邊，他的守護天使緊抱著他。我微笑了，因為我注意到天使讓孩子以極溫柔的方式，跟他們的父親道別。克里斯多夫在走道上和歐文擦身而過，歐文進來坐在火爐邊和他爸說話。他也打算要出門。喬和我將留在家裏獨自過夜。\n\
    \n  我們坐在火邊聊了一會兒，喬隨後睡著。我坐在他身邊看著電視。大約午夜左右，喬睜開眼睛，一臉困惑，不知道自己在哪裏。我安慰著他，告訴他不要擔心，他在家裏。他帶著微笑看著我。「妳該去睡覺了，羅娜。」\n\
    \n  「我等你。」我回答。\n\n  「不，妳先去吧，我想獨自在火邊多坐一會兒。」\n\n  我親吻了喬，道過晚安後便上床。不久後他也進到房裏。我不知道他如何走來，相信是守護天使扶他進來的。他在我身邊上了床後，對我說：「羅娜，妳想我會沒事嗎？我是否過得了今晚？」\n\
    \n  「喬，別擔心，我會照顧你，你會沒事的。」他的守護天使卻對著我搖頭。\n\n  我不知不覺依偎在喬身邊睡著，然後突然醒來，喬的情況惡化，房裏因為擠滿天使和靈體而充滿光亮，爸爸的靈魂就站在床邊。我看著喬的眼睛，那生命之光近乎熄滅，他已經不認得我，他周圍的光也不再發亮。\n\
    \n  爸爸說：「羅娜，讓他走吧，妳知道妳不可以再請求了。」\n\n  我把喬抱在懷裏，熱淚盈眶。我知道不能再請求上帝讓喬留下，答案也一定是不可以。\n\n\
    \  我讓喬躺回床上，克里斯多夫外出找朋友，我叫了歐文，他一路跑來。\n\n  歐文立刻跳到床上。\n\n  「媽，」他看著我說，「我知道爸要我們讓他走，但是我一定得試試，因為他是我爸，我愛他。」\n\
    \n  我讓他試了。他坐在床上叫喬的名字，搓他的臉，設法讓他恢復意識。我不忍心告訴他一切只是徒然。上帝已經說過不可以，所有的天使和靈魂等在這裏要帶喬上天堂。\n\
    \n  我跑到廚房打電話叫救護車，做了一切喬平日病情惡化時會做的事情，也打電話叫了熟悉的計程車司機，並請他在來的路上去接克里斯多夫。接著，歐文大喊：「媽！爸停止呼吸了。」\n\
    \n  我衝進臥室，在門口遇見喬的靈魂，守護天使陪伴著他。喬看起來非常美麗，光芒四射。他對我微笑，然後回頭看看歐文後便消失無蹤。\n\n  救護車來了，把喬載走。克里斯多夫和我搭計程車在後面跟到醫院。\n\
    \n  我對喬的喪禮記得不多，雖然我早就知道他活在借來的時間裏，他的死依然是個很大的震撼。上帝已經賜予喬生命的奇蹟，不會再讓奇蹟發生第二次。祂告訴我絕對不可以再度要求，因為祂必然說不。要我不去祈求上帝，不苦苦哀求，實在是極度困難的事情。我並不想讓他離去，但我必須放手。我知道他每天看著我和孩子們，也感謝他的愛、仁慈與溫柔。\n\
    \n  喬過世後，我生日戒指只戴了兩星期，之後便取下，不曾再戴過。\n\n## 28\n### 天堂來的羽毛\n\n  喬下葬後沒多久，我又開始接見人，幫助他們解決問題。我總是把私人生活與上帝和天使要求我做的工作分離。大部分來看我的人，對於我喪夫一無所知。就算有人察覺，他們也非常慈悲，所以我收到許多尋求協助者寄來的慰問卡片，雖然他們自己也有許多問題。\n\
    \n  那對我來說是一段艱難的時期，不過能在梅努斯學院裏漫步，對我幫助很大。我四處走動，上教堂，走在校園的漫長迴廊裏，看著已經成爲神父的年輕人的照片。我經常和喬說話，問他過得如何，告訴他孩子們的近況，然後又一起笑著說：「你當然知道他們的狀況啊！」我感覺得到他就走在我身邊。喬過世後幾個月的某天，我覺得非常難過。那一天我見了一些人，其中有些人的問題真的很難處理，有重病的孩子和非常棘手的情況。他們離開後，我筋疲力竭，心情也很沉重，所以外出朝校園走去。我總是等到走出柵門，才開始和上帝談論人們來求助的問題，談論他們的創傷和痛苦，也談論他們的喜悅。我四處走動，一邊請求上帝：「祢不能施展奇蹟嗎？」\n\
    \n  這一天我感到非常難過，把心情和守護天使及上帝分享，告訴他們我自己也覺得低潮。直到今日，我仍然記得那一天穿梭在校園裏，感覺冷風吹拂，雨水打在臉上。我沒戴手套，雙手很冷，所以把手放在口袋裏，摸到裏頭的一本小祈禱書。走在學院後方曲折蜿蜒的步道上，不時得閃避路上的坑洞，因為裏面溢滿雨水和從樹上飄下的落葉。我看著人們走過，其中包括一位經常在此走動，口中念著祈禱文的神父。我對他笑了笑，繼續往前走。在另一條小徑上，我看見一位母親推著娃娃車跑著。她跑一下、停一下，然後快步走，最後又跑起來。\n\
    \n  我轉過一條步道，右邊有許多大樹，左邊是一片綠地，還有一個有巨大十字架的墓園。經過墓園時，我對上帝訴說我的感覺。我告訴祂：「我撐不下去了，我真的需要來自祢，我的神，和祢的天使的協助。如果祢不幫助我，我不知道該如何繼續下去。」\n\
    \n  我朝右轉彎後，一棟大而老舊的學院建築清晰矗立在前方。接著發生了非常奇怪的事情：美麗老建築正上方遙遠的天空裏，充滿天使。由於距離非常遙遠，最初我不確定他們是天使。我目不轉睛看著，並對自己說：「不是天使還能是什麼？」當他們越來越近，就飛在學院上方時，我的疑慮消失一空。天使變得越來越大，到最後體型相當巨大。他們從天上降下，靠得更近，全身金色與白色，非常美麗，翅膀也很大，華貴有力，漂亮得令人禁不住屏息讚嘆。我又哭又笑，身體顫抖不停。\n\
    \n  「祢真的賜給我一份特別的禮物！」我說：「祢提升我的心和靈魂。讓我了解到不論事情有多糟，今生仍有一個活下去的理由，一個喜悅與快樂的理由，就連眼淚都有意義！」\n\
    \n  這段時間，我仍繼續走著，又或者，我以爲自己仍然走著。我的腿在動，雙腳往前進，但後來我才發覺腳下的土地並未移動。有些天使轉身飛離了學院，越飛越遠，越來越小，最後消失無蹤。我感到有些悲傷。\n\
    \n  接著有聲音要我抬頭往上看，就在天空裏，遙遠到難以相信的天空裏，我看見更多天使。這些美麗的天使越變越大，當他們靠近我，其上方又出現更多天使。突然間，就在天使之間，在高高的天空上，我看見了一位天使，我相信那是天使。但他在那麼高遠的天空裏，看起來微小無比，我能看見如此細小的東西，真是個奇蹟。我好奇自己怎麼看得見這位在如此遙遠處的小天使，看著他不斷往下飄落、飄落又飄落。\n\
    \n  他穿越所有天使繼續飄落，卻似乎絲毫沒有變大。我不停笑著，而且興奮不已，直到現在，我仍能感受到那股興奮之情！我的身體因為喜悅而顫抖。當他更靠近時，我終於看清那不是天使，而是一根小羽毛！\n\
    \n  我驚奇地看著小羽毛在巨大的天使之間，被往下導引。羽毛如雪花般從天而降的情景實在非常壯麗。那天早晨風吹得厲害，但羽毛仍持續飄落，在天使的引導下穿越空氣，朝我的方向而來。我擔心風將它吹走，但其實一點也不需擔憂，我早該明白一切。那根羽毛在兩旁天使的護衛下，持續飄落。\n\
    \n  就在羽毛快飄到伸手可及之處，但還沒近到拿得到的距離時，猜猜我做了什麼？我跳起來握住了它！我等不及羽毛飄得更近，盡全力跳得好高，彷彿有一公尺半似的，然後伸手抓住那根羽毛，緊緊握在手中，興奮地抱在胸前。\n\
    \n  突然間，周遭的情境變了，我再度感覺到雨滴打落在臉頰上，感覺到冷風的吹襲。這時候我才注意到有對老夫妻朝我走來，也才察覺時間爲我停止了。雖然我以爲自己在走路，但從看到天使的第一眼起，我就停留在原地，腳下不再感覺到破碎的石頭或崎嶇不平的步道。這是因為我的腳並未真正觸碰地面，也未曾感覺到雨水、風吹和寒冷的存在。而就在握住羽毛那片刻，時間又開始流動。我記得老夫妻對我微笑，他們一定看見我跳起來抓住東西。我也微笑以對。如今，在寫下此事的此時，我很好奇他們怎麼看待那一天？他們看見了什麼？是否看見我為何躍起？我不知道他們是誰，或許當他們讀到這本書時，會記起那一天。\n\
    \n  我感到非常快樂與振奮。那是我生命中最美好的早晨之一，因為我得到一份來自上帝和天使的禮物。我讚美上帝，感謝祂賜予羽毛。我也感謝喬，因為我覺得他也參與了此事。\n\
    \n  我很珍惜那根來自天堂之門，由天使引導而來的羽毛。那是一份禮物，它讓我心情舒暢，感到安全，提醒我活著的理由，讓我記得任何情況下都有希望存在。它也提醒我，每個人都擁有靈魂，而且不論做過什麼，靈魂都是完美的。身體或許會死去，但靈魂不會。我們也有翅膀，只是形式不同，就算認不得自己的或他人的翅膀，也不影響實情，因為事實上，每個人都是天使。\n\
    \n---\n\n**國家圖書館出版物預行編目資料**\n\n我與我的守護天使：愛爾蘭天使夫人的生命視界 / 羅娜·拜恩(Lorna Byrne)著；達娃譯.\
