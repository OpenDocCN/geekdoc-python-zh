    我和父母抵達喬的家赴約的時候，爸爸敲了門，我很高興看見喬來開門。喬歡迎爸媽進屋，並給我一個擁抱。我們進入餐廳，餐桌擺設得有如皇家宴會般，令人難以置信。喬為我們介紹他的母親、姊姊芭芭拉、姊夫和他們的孩子。不過，剛開始時發生一件有趣的事，芭芭拉一直要幫媽媽把外套脫下掛起來，媽一直說：「不用，沒關係。」

    我把喬拉到一邊，偷偷告訴他：「那不是外套，那是外套式洋裝，你去告訴芭芭拉不要再問了，不然我會笑出來。」

    喬說他從未聽過外套式洋裝，當他回到餐廳時，芭芭拉再度詢問媽媽是否要脫下外套，喬打斷了她，趕緊為媽媽拉出椅子，請她坐下。

    那是一頓美好的晚餐，有烤牛肉、烤馬鈴薯、高麗菜和紅蘿蔔，點心是美味的奶油蘋果派。我從未吃過更好吃的蘋果派。喬的媽媽讓我們感到光榮，一切也進行得非常順利。


