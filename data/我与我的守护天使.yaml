  md: '他的父親帶他到庭院去，單獨和我在一起的母親哭了起來，問道：「天使怎麼說？」

    當父母親問：「天使怎麼說？」而我能給的不是好消息時，我真的很難過。我能說什麼呢？有時候父母會問：「我做錯了什麼？我犯了什麼大罪嗎？這是上帝對我的懲罰嗎？」我必須了解這是生命的旅程，是自己尚未來到世間之前，就已經選好的旅程。

    「看著妳的兒子，」我回答，「看著他所擁有的信念與信心。他並不害怕，既不怕病情是否變好，也不怕到上帝身邊。傾聽妳兒子的話，他會帶來許多訊息。」

    尼克的父親進屋，我和兩人又談了幾分鐘，轉達天使要他們盡量花時間和兒子相處。他們離開後，我仍定期收到他們的消息。只要尼克在醫院，或是感到不舒服，他就會請母親或父親打電話給我，要我請求守護天使用光之劍碰他，讓他好轉。他父母一來電，他的痛苦就會消失。尼克當然也會自己請求守護天使幫助他，不過我發現生病的孩子通常會請父母打電話給我，或許這能加強他們的信心。

