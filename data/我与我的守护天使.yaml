  md: '從她的中心點散發出來。這股能量和那位女士本身的能量不同，令我十分著迷。多日後，媽媽提起那位女士就要生寶寶，我聽了露出笑容。

    同樣的，我也能看出人們是否生病，即使我不懂自己看見的是什麼。一道深色陰影環繞著人們的身體，就表示他們的血液出了問題。有時候某根骨頭會發出閃光，讓我看見骨頭有所損傷或變了形。儘管我無法用言語來解釋，卻本能知道他們的身體有狀況。


    一天，我跪坐在窗前，一個男人騎著黑色大腳踏車經過，後面載著他的小女兒。天使要我在父女通過面前時，緊盯著他們不放，不可把眼神移開。我沒問為什麼。還是孩子的我，天使說什麼我就做什麼，不曾質疑。但我知道他們要我幫助這對父女，所以他們行經窗前時，我已經在祈禱。我不知道會發生什麼事情，只是請求讓情況別太嚴重。

    父女通過屋前時，一切似乎慢了下來，就像影片的慢動作。他們騎在一輛要超車的雙層巴士旁，忽然間，小女孩發出驚叫，男人開始傾倒。但小女孩並未跌落腳踏車下，因為她的腳卡在輪輻之間。父親用顫抖的手，小心翼翼把女孩的腳從折彎的輪子裏抽出來，並把正在哭泣的女孩抱到我窗下的人行道上。女孩此時只是輕聲嗚咽，沒有尖聲驚叫。大人都跑去幫忙，媽媽也去了。我也飛奔下樓，到屋外去探視她的狀況。一如往常，誰也沒注意到我。小女孩的鞋掉了，腳底的皮掀開來，挫傷流血，但並沒有骨折。儘管如此，我還是請求上帝和天使來幫助她。'
