    幾天後的某一晚,喬送我回家,他提議開車到山上兜風。

    「這是個美麗的夜晚,」他說,「今晚滿月,希望天上能布滿星星。我知道有個地方能停車觀賞都柏林美麗的夜景和遠處的海洋。」


    我們抵達時,那裏已經停了許多車。「我們下車走走,到那邊牆上坐一會兒。」我說。

    那道牆只是一堆四散的石頭,但我們還是坐下來。喬把我抱在懷裏,讓我很有安全感,我們親吻彼此。我不知道究竟坐了多久,但我突然發現天空充滿星星。有些星星開始旋轉、落下,逐漸接近地面時,我才看出那是天使。我聽見天使說:「現在是跟喬分享一點祕密的時機。」


    我在喬的懷裏轉身,說我有事情要告訴他。他看著我,問我是否跟婚禮有關。

    「不是,」我說,「其實是跟我有關。我想告訴你,我能看見一般人平常看不見的東西。

    有時候我能看見天使。」


    他臉上浮現出完全不相信的表情,看著我笑說:「羅娜,就我所知,只有修女和神父能看見天使。這太可笑了!妳我這樣的普通人是看不見天使的。」


    我緊張地看著他,這正是我所擔心的事情。我在心底向圍繞在四周的千百位天使大喊:

    「快幫忙!」


    喬給我一個擁抱,便不再多說。

    「走吧,明天還要工作。」

    回家的路上我們緘默無聲,只說了幾個字。喬開著車,不時看著我,彷彿在說:「我給'
  - '[PAGE 145]


    自己找了什麼麻煩？

    我對天使說：「喬的反應一點也不好。」

    抵達我家門口時，喬說：「羅娜，妳要我相信的是一件我想也沒想過的事情。」不過當他抱住我、吻我的時候，我又感到安心多了。

    走向後門時，我還是不停對天使哭訴。天使說：「別擔心，羅娜，這只是喬開始認識妳的起步而已。」


    我不知道該如何讓他相信我，但是過不久我就有了機會。

    喬雖然已經不再為爸爸工作，偶爾還是會到加油站幫忙。某個星期四晚上下班時，我看見一個靈視影像，有許多玻璃和大窗戶，光線從玻璃上反射出來，使我無法看清一切，但周圍似乎是黑暗的。「這是怎麼回事？」我問天使。

    天使說：「跟喬說。」

    「我不想說。」我回答。

    「記住妳的靈視影像，羅娜，」天使說，「妳看見事件的地點嗎？」「在加油站。」


    當晚，我跟喬說了。「那沒什麼意義。」他回答。

    我們沒再多說什麼，但我很擔心，又對天使哭訴。星期五我再度看見影像，這次我看見喬在車內，好像要開車去加油，有人對著車子走來，喬則把窗戶搖下。接著影像消失了。

    我告訴喬我又看見靈視影像，還解釋了細節。「那是個警告，我不希望你受傷。」'
  - '[PAGE 146]


    「我不相信這種事。」喬說。「妳爸來電留言，加油站的晚班人員離職，他需要我週末去幫忙，因為星期六的午夜到早上七點沒有人值班。」


    我再度看見同一個影像，而且更加詳細。我看見喬把窗戶搖下，有兩個人，其中一人在他的臉上揍了一拳；我看見喬在警察局裏，警察相信另一人所言，不相信喬。我不知道究竟發生什麼事，非常沮喪，因此又對天使訴苦。


    「喬會被揍到流鼻血。」天使說，「除此之外，他不會有事。記住這個靈視影像，雖然警察不相信他，不過最後會水落石出。」下班後，我到喬的家。喬和我到附近住宅區散步，我請求他相信我，甚至火氣都上來了：「你為什麼不肯聽我說？」


    一路上，他的守護天使始終在他耳邊輕語。我很想對他大喊：「你的守護天使也正在對你說話，但你就是不肯聽。」喬看我似乎生氣了，因此承諾那個週末他會很小心。


    週末來臨，預言成真，一切如我所看見的那樣發生了。


    那晚，喬修理客人的車，並把車開去加油。車主的朋友經過時，認定喬在偷車。他對喬大喊，喬把窗戶搖下時，他就朝喬的臉上揍了一拳，然後報警。警察不相信喬的解釋，於是逮捕他。爸爸把喬保釋出來，事情才真相大白。那晚的事件讓喬對我有了進一步的認識。


    婚禮前兩週，寶琳、薇樂莉和瑪麗帶我去慶祝婚前的單身之夜。以前我從未在下班後跟她們出去。她們先帶我到薇樂莉星期五晚上最常光顧的史密斯酒吧，許多客人是百貨公司的'
- md: '員工。薇樂莉和瑪麗幾乎認識酒吧裏的每個人，大家笑聲不斷。她們習慣喝酒，但我一點也不行，她們鼓勵我喝了一杯紅酒，結果酒直衝我的腦門，朋友對我的反應捧腹大笑。我喝一杯就完全感受到酒精威力，根本受不了，後來只喝七喜汽水。


    我們逛過一家又一家酒吧，最後來到瑪麗最喜歡的墨菲酒吧。這裏的氣氛很好，地板是坑坑洞洞的水泥地，雖然店內沒有桌子，只有吧台旁的高腳椅，卻擠滿唱著愛爾蘭反叛歌曲的人。我喜歡這裏的音樂和歌唱，大家全跟著放聲高歌。之後我們回到瑪麗位於市區的套房喝茶、吃點心，閒聊當晚的種種。她們戲弄我，討論要如何在婚禮當天鬧洞房，我們玩得很開心，也度過美好的一晚，但最後我還是很高興能回家倒在床上睡覺。


    婚禮越來越近，一切即將就緒，結婚蛋糕也送到家，這是一位阿姨親手製作，送給我的結婚禮物。那是個三層高的美麗蛋糕，非常美好的作品。我至今仍留著蛋糕的飾品，收藏在盒子裏。


    婚禮前兩天，家裏已整理得一塵不染，雙方家人準備妥當。婚禮前夕鄰居還來拜訪，看有什麼臨時需要幫忙的事情。隔壁鄰居安妮承諾當天一早到家裏來幫我做頭髮。


    能看見一場婚禮為家人、朋友和鄰居帶來喜悅，每個人內心的激動溢於言表，感覺很美。每當有婚禮，我就會請求全宇宙的天使讓婚禮為所有參與者帶來幸福與快樂。


    終於到了婚禮當天！前一晚我輾轉難眠，很早就起床，其他人也起了個大早。我興奮得吃不下早餐，只喝了一杯茶。爸爸先帶大家到教堂，我和一位鄰居站在大廳裏等待他回來接我，爸爸到家後護送我上車，和我一起坐在後座，他默默不語握著我的手，那是當天最珍貴的時光。車抵達教堂正門口時，爸爸說：「別動。」他下了車，司機繞過來準備為我開車門，但爸爸堅持要自己來。我下車時，他臉上的笑容讓我非常快樂。爸爸牽起我的手，站在教堂門口，要走向紅地毯的那一刻，他溫柔地告訴我，他很驕傲能在女兒婚禮這一天，牽著美麗女兒的手走在地毯上。


    我倚著爸爸的手臂走向聖壇，感覺到守護天使撫弄鄰居那天早上花了許多時間幫我設計的頭髮。喬站在走道頂端，朝我的方向看著，模樣好俊美。他的守護天使滿臉笑容站在一旁。祭壇上陸陸續續出現天使，有米迦勒、荷賽司、以萊亞、以莉莎，和所有多年來一直跟在我身旁的天使們。祭壇上站滿天使。


    神父在祭壇上等著，喬和我走過去，站在神父面前，儀式開始。喬把結婚戒指套在我的手指上，荷賽司拉了拉我的禮服，跟著我一起說：「我願意。」


    我們在教堂外拍了許多照片，回到家後，一起與親友圍著大桌子，共進美好的一餐。那天晚上我們和朋友們到當地酒吧喝一杯，可是酒吧裏擠滿了人，我們又前往都柏林市區的酒吧。沒多久，喬和我就先行離開，前往梅努斯。在凌晨時分，喬抱起我，跨過我們小屋的門檻。


    # 14

    從不知道我有守護天使


    有時候事情發生前，天使一點警告也沒給。喬和我結婚後三個月的某一晚，發生一件奇怪的事。當時大約十一點，喬已經躺在床上讀書，我還在清理，準備上床。當時小屋裏還沒有浴室，所以我在火爐前洗澡。上床不到五分鐘，我就想去上廁所，又從床尾爬下來。


    一打開臥室門，我嚇了一大跳，因爲我差點踩進某人的身體裏。

    「天啊，妳在這裏做什麼？」我大呼一聲。


    原本住在這裏的柯斯特洛太太正站在我面前！她看起來就像伊麗莎白所描述的，穿著大衣，戴著一頂有面紗的漂亮帽子，上面還裝飾著水果，手臂下夾著一個大袋子。

    「再見，」她說，「我要走了。」


    她對我露出微笑，模樣很美麗，就像溫太太一樣完美。我不知道她爲何跟我道別，既然她需要這麼做，我自然沒問題。只是她實在讓我嚇了一大跳。


    我轉身回到床邊，喬問道：「有什麼問題嗎？」

    「我差點踩進她的靈體。」我答道，忘記我還沒告訴他我也能看到靈體。「剛剛遇見以前住在這裏的老太太，她來道別。」


    喬從床上坐起來，驚訝地瞪著我看，然後要我上床躲進毯子下。

    我安靜照著做，一邊希望喬不要想太多。所幸，他並沒有，只是轉身躺回去睡覺。我的天使顯然費了不少力氣，因為喬不曾再提起此事。

    我躺在床上問天使，為何柯斯特洛太太差點讓我踩到她。我不喜歡踩進還沒進入天堂的死人靈體裏，那種感覺就像是被電流擊中，很不舒服。未進入天堂的靈體還沒經過淨化，感覺和去過天堂又回來的靈體不同，譬如我的靈魂哥哥克里斯多夫就是後者。從天堂回來的靈體身上，我可以感受到靈魂的生命力。

    天使並未解釋為什麼，只告訴我柯斯特洛太太在未與我接觸前，無法離開小屋，她需要這次的接觸才能前往天堂。我無法解釋為何如此，不過我經常遇到尚未離開人間前往天堂的靈魂，而且在他們的過渡期中扮演某種角色。


    幾個月後，我懷孕了，喬決定把車賣掉，才能負擔即將出世的孩子所需的額外花費。所以我們又回復搭公車的日子，也對此甘之如飴。

    妊娠對我來說很辛苦，我經常向天使和上帝抱怨。天使們只是一笑置之，要我多休息。

    孩子決定比預產期早幾星期來到這個世界，是個將近三千公克重的漂亮男嬰。很久以前，我就告訴過喬關於靈魂哥哥克里斯多夫夭折的事情，希望能以他的名字為長子命名。因此我們早已決定要把孩子取名為克里斯多夫。


    不過，我從未告訴過喬我和靈魂哥哥的相遇。在還沒寫這本書之前，我一直未獲准與人分享這些際遇。我請喬不要對我父母提起為兒子取名為克里斯多夫的原因。生產後，爸媽來到醫院探望我，媽媽提起我們應該以她的父親，也就是外公的名字為兒子取名為克里斯多夫。我對喬笑了笑，告訴媽媽已經為兒子取名為克里斯多夫。喬聽了，捏了捏我的手。


    把克里斯多夫從醫院抱回家後，我跟所有新手媽媽一樣，緊張萬分。他相當健康、強壯，不過有一回照顧他時，天使出現在我身旁，告訴我他有點小問題。


    「我注意到他無法好好消化牛奶，對不對？」我問道。


    「沒錯，」天使說，「把克里斯多夫包好，放到娃娃車裏，帶著他到電話亭去吧。」


    我依照指示到了電話亭，很高興沒人使用電話。我打電話給醫生，請他出診來看克里斯多夫。醫生當天下午就到了。那天很冷，又下著雨。鑰匙就插在門上，醫生走進門時喊著：「有人在家嗎？」我正把克里斯多夫抱在膝上餵奶。我對醫生笑了笑，因為天使都跟著他一起進來。他在椅子上坐下，說這裏很舒適，還在火邊把手烤暖。和孩子玩了一會兒後，他詢問孩子有什麼問題。我告訴他克里斯多夫無法好好消化牛奶。醫生以怪異的眼光看著我，他身後的天使告訴我要小心選擇用字。


    「他經常吐奶。」我補充。


    「羅娜，」他笑著說，「每個嬰兒都會吐奶。」


    正當醫生把椅子拉靠近點，準備檢查克里斯多夫時，一位天使觸碰克里斯多夫的肚子，他立刻吐了奶，牛奶如噴泉般射到房間的另一端。醫生看著我說：「這就不正常了。」


    醫生用聽筒檢查寶寶的肚子，告訴我嬰兒若出現克里斯多夫剛才的反應時，通常是得了腸胃病。他給我一份轉介函，要我到都柏林坦波街（Temple Street）上的兒童醫院去找專科醫生。


    克里斯多夫確實得了腸胃病，從那時候起，他必須吃特殊食品，也意味我們需要經常往來醫院，有時候他還得住院幾天，這對他和我們都很不容易。


    喬一有空就在庭院裏忙活，院子越來越有模有樣。有一天，喬在庭院工作，他的守護天使短暫現了身，接著許多天使出現在喬的身邊支持著他。我看見他周圍的光芒越來越微弱。


    我掉下眼淚，一邊對自己說：「不要！這不公平。」


    我知道天使要讓我知道喬即將生病。


    他果真生病了，有嚴重的胃潰瘍，比其他患有同樣疾病的人還要嚴重。喬的模式就是如此，我不懂原因何在，他只要生病，狀況總是比別人更嚴重。


    雖然服用特殊飲食和大量的藥物，喬仍然病得很嚴重，甚至六個月無法工作，因此失去在大眾運輸公司的職位，我們只得靠著社會救濟金度日。


    這段時間對我們來說非常艱辛，當時我並不知道日後喬將這樣度過餘生。


    克里斯多夫一歲半的某一天，我帶他到前院去玩耍，然後鎖上前院的小柵門，讓大門開著，便走回屋內去整理床鋪。天使以莉莎現身了一下。


    「哈囉，羅娜，我是來告訴妳，妳將有個訪客。」


    我還沒能答話，以莉莎就消失無蹤。我笑著說：「還真是個短暫的拜訪啊。」


    以莉莎沒再出現，我也不再多想，繼續鋪床，偶爾抬頭看看窗外的克里斯多夫。當我走進小房間時，注意到門口閃過一道亮光，並且聽到一聲笑聲。一個小女孩的靈魂走了進來。她有一頭黑色波浪長髮和一雙深藍色眼睛，穿著黑領大衣、黑色鞋子和及膝的襪子，並且戴著帽子。她對著我微笑，蹦蹦跳跳走進廚房，我跟隨著她進去。


    小靈魂身邊還跟著她的守護天使，這種情況非常少見。守護天使在人死後，通常只停留很短暫的時間，因為靈魂進入我們所謂的天堂之後，就不再需要守護天使的協助。


    小女孩以血肉之軀出現，就跟你我沒兩樣。她曾以小女孩的模樣活在過去某段時間，這時候我還不知道她是如何死亡。她的守護天使是透明的，像個充滿生命的雨滴，反射出各種色彩，並且包覆著小女孩。守護天使雖然各有其獨特的性格，但外觀也有相似之處，就像兄弟姊妹雖然彼此相似，卻各有自己的性格一樣，所以我能毫無困難分辨守護天使和其他類型天使之間的差別。


    小女孩的守護天使圍著她四處移動，彷彿保護她不受人間事物的侵擾，甚至不讓她的雙腳觸碰地面。偶爾，她的守護天使會轉身對我微笑，並且把手指擺在嘴脣上，示意我一個字也不要說。


    小女孩轉身又蹦蹦跳跳離開廚房，進入門廳，穿過大門，然後化成一道亮光，消失無蹤。接下來幾個月，小女孩和守護天使又出現許多次。她只在前門打開的時候來，不過前門百分之九十九的時間都開著。她第一次對我說話時，告訴我她一個人孤獨死去，然後抬頭看著她的守護天使說：「我真的不知道我有個守護天使。我從不知道你的存在。」


    小女孩熱淚盈眶，守護天使伸手拭去她的淚水。我感受到強烈的愛與情感，不禁也眼眶泛紅。小女孩不再多說，又蹦蹦跳跳從大門離開。


    又一回，她說她的名字叫做安妮。我從來沒有機會問她問題，因為守護天使總把手指擺在嘴唇上，指示我不要說話。


    一天早上，天使以莉莎再度出現。「這次妳可不准像上次那樣突然消失。」我馬上對她說。


    「我們在門口坐一下吧。」天使以莉莎說。


    「以莉莎，為什麼小女孩的靈魂和她的守護天使要來找我？」


    「羅娜，安妮需要知道她活著時有人愛她。她孤獨死去，以爲沒有人愛她，連她的爸爸媽媽也一樣，因爲她要死去時找不到他們。她的守護天使帶安妮來找妳，讓妳擔任她的父母，這對妳是很大的請求。」


    「妳知道嗎？以莉莎天使，」我說，「這已經起了作用，我開始期待見到安妮，雖然她只是個靈魂，而非血肉之軀。我察覺自己對她有感情，我也知道她的守護天使努力使那感情化成我們之間的愛。謝謝妳，以莉莎天使。」


    「再見了，羅娜。」以莉莎說完便消失。


    安妮越來越常出現，幾乎天天報到。有一天她叫了我的名字。


    「羅娜，」她說，「妳知道我死於火災。那時我找不到別人，放聲大喊，可是沒有人聽到。我爸爸媽媽到哪裏去了？他們不在乎我、不愛我。我記得我哭著躺下，醒來時已經在天堂了。」


    「安妮，妳回到天堂後，將會見到爸爸媽媽，也會知道他們很愛妳。」我說話的同時，安妮伸手觸碰了我。在她的擁抱中，我感覺到她真實的身體。「這就夠了，我只是需要知道在人間有人愛過我。」她說完便轉身和守護天使一起跑出了門。


    感謝上帝，現在安妮能和爸媽快樂地留在天堂，我很高興。有時候，上帝和天使也無法說服靈魂，讓他們相信自己活著時曾被愛過。所以上帝把安妮與她的守護天使，送到我們這個世間來，如此她才能親耳聽見自己活著時曾經被愛過。這令人難以理解，不過她就是需要知道有人愛她。


    # 15

    祈禱的力量


    我又懷孕了。那年我二十五歲，克里斯多夫已經兩歲半。前三個月一切非常順利，早上也沒有害喜。有一天早上，喬出門上班後，我又在床上跟克里斯多夫多睡了一會兒，一個小時後我醒來，克里斯多夫仍熟睡著，我吻了他一下，安靜溜下床。我走到小前廳，看見天使荷賽司坐在一張椅子上，他要我也坐下。

    「荷賽司天使，別告訴我出了什麼差錯了。」我說。

    「沒有，羅娜，沒什麼嚴重的事，妳肚裏寶寶的左邊有個標記，讓醫生有點擔心，特別要其他醫院派專科醫生來。妳要記住，一切沒問題，寶寶很健康，只是急著想報到而已。寶寶沒耐心留在妳的肚子裏，我們這些天使和寶寶的守護天使會盡全力讓寶寶待在該留的地方，直到時間成熟。就在那裏面，羅娜。」

    天使荷賽司伸手碰了碰我的肚子，我感覺到寶寶動了。

    「我的寶寶知道你觸碰了我的肚子。」我告訴荷賽司。「懷孕六週時，我感覺到寶寶動了，但是醫生說不可能。我知道事情不是這樣。有時候，我站在鏡子前，請求上帝讓我偷看一眼，就看見能量像漩渦般旋轉著。有時候，能量會短暫開啓，上帝藉此讓我看見完美無瑕的寶寶。」

    我問天使荷賽司：「為什麼我的寶寶想提前報到呢？」

    他沒有回答我的問題，反而告訴我：「從現在起，一切會很辛苦，懷孕期間妳大多會住在醫院裏。」


    幾天後我到醫院產檢，看見了寶寶的模樣。

    「妳的寶寶似乎很活躍。一切看起來沒問題，他雖然還沒有我的拇指指甲大，不過手腳已經在動了，眼睛張開，拇指還放在嘴巴裏。」醫生說。


    醫生決定留我在醫院休息幾天，我被送到病房裏。喬回家後又立刻帶來一些住院需要的東西。結果我在醫院待了一星期。醫生告訴我可以回家時，我非常開心，身體感覺也很好。

    我在家裏只住了兩星期，然後又回到醫院。媽媽幫我們照顧克里斯多夫，喬才能繼續上班，那時候他在郡議會工作。克里斯多夫非常煩躁，媽媽要安撫他不容易。喬下班後會先到媽媽那邊去，才來醫院看我，週末時則把克里斯多夫帶在身邊。


    我在醫院裏打點滴，不准下床。醫生無法理解我爲何不斷有早產跡象，懷孕後面幾個月我都住在醫院。聖誕節的前一週，肚裏小孩已經七個月大，病房逐漸變空，因爲能回家的患者都獲准回家過節了。看起來，醫生似乎不打算讓我回家，但我不斷向上帝祈禱，希望能回家和克里斯多夫和喬一起度過聖誕節。聖誕節前夕，在午餐之前，一位醫生來到我床邊，說我能回家兩、三天，不過一感覺不舒服，必須馬上回醫院。

    當晚，爸爸開車載喬和克里斯多夫到醫院接我，我覺得身體很好。回到小屋，屋內好溫馨，因為我們的好鄰居伊麗莎白在火爐裏生了火。爸爸離開前邀請我們在聖史蒂芬日（譯註：十二月二十六日）回家吃晚餐，約好中午十二點來接我們。克里斯多夫和喬一起目送外公開車離去，然後關上柵門。他們進屋時，我正舒服地坐在火爐邊。克里斯多夫坐在我的膝上，我抱著他，喬為我們泡茶。我實在不太記得那個聖誕節，也不知道喬是如何應付一切，只記得聖誕夜我抱著克里斯多夫坐在火邊，然後在聖史蒂芬日到爸媽家，我感到很不舒服，請爸爸帶我回醫院。


    爸爸送我回到醫院，兩週後，我懷孕第八個月，二兒子歐文出世了。令人難以相信的是，雖然他早產了四星期，卻將近三千六百克重。


    我不清楚爸媽是怎麼加入祈禱會，但他們不僅加入，爸爸甚至因此產生很大的變化。他開始幫助別人，雖然他以前便不吝助人，但現在似乎付出更多，一聽到有人需要幫助，他完全是赴湯蹈火。


    有一晚，爸爸來到小屋問我們要不要參加梅努斯學院的祈禱會。我看著喬，兩人點了點頭。我很興奮能有機會出去走走，也對一群人一起祈禱很感興趣。而且我向來喜歡教堂，有機會就去望彌撒。


    「祈禱會是怎樣的團體？」我問道。「梅努斯學院有間教室給我們用，」爸回答，「大家一起祈禱、誦讀聖經，然後請求祈禱會為需要幫助的家人祈禱。之後，成員通常喝杯茶，吃個點心，互相聊聊。」「也可以交新朋友。」我說。


    伊麗莎白願意幫忙照顧小孩，因此那天起，我們去參加祈禱會時，小孩就託付給她。


    我非常喜歡第一次的祈禱會，雖然當時我非常緊張。事實上，我緊張到不太記得整個過程，不過我們後來成為祈禱會的常態成員，只要有時間就會出席。


    祈禱的力量非常強大，因為祈禱時，並非只有我們人類，守護天使和任何在身邊的天使，乃至我們所關愛的已往生親友，都會跟我們一起祈禱。沒有卑微到不足以祈禱的事情，也沒有所謂太簡短的祈禱，不論是一個字或很多話都沒關係。祈禱也沒有地點限制，開車、走路、會談，在人群中或獨自一人都可以。有時候，我們甚至沒有察覺到自己在祈禱，特別是當我們心裏想著生病的親人，或是陷入困境的朋友。發自內心由衷祈禱，產生的力量尤其驚人，不論個人的宗教信仰或教義為何，上帝都會用心傾聽。


    一群人在同一個地方同時祈禱，譬如在祈禱會的場合，或者世界各地的人在同一時間為特定事情祈禱時，祈禱的力量特別強大。這樣的祈禱能大幅強化靈性的力量。


    我和喬很享受前往祈禱會的那段路程，喬總是邊走邊說在那議會發生的林林總總，我們也會討論祈禱會的事務。某個星期三，在前往祈禱會的路上，我對喬說，希望當晚參與的人數能多一點。祈禱會一般大約有十人，有時候更少，夏天尤其如此。暑假結束後，祈禱會的人會陸續增加，人數一多，聚會地點就移到校園的另一端。


    爸爸參加許多祈禱會，卻只到過梅努斯祈禱會幾次，我們第一次是他帶去的，但之後他就沒再來過，所以那一晚我看到他時非常開心，趕緊去問候。我們一起走上階梯，穿越大門，進入左手邊一間教室。室內已經聚集了一些人，還有約二十張椅子排成一個圓。打過招呼後，我們隨即坐下，椅子差不多快坐滿人。我對喬說：「真是太棒了。」越來越多人出現，一位神父進來，自我介紹是大衛神父，並詢問大家是否介意神職學生和修女加入今晚的祈禱會。我們異口同聲歡迎他們。由於當時室內已約有二十名一般民眾，他建議我們換到大一點的教室。幾分鐘後，他回來告訴我們可以換到一間大教室，要我們把椅子帶著，連堆疊在牆邊的椅子也帶去。


    另一間教室比之前大上許多。很快的，一群年輕神職學生（學習如何成為神父的年輕人）和大約七位神父陸續抵達，一群修女帶著一位住在校園修女之家的女孩也出現。此外還來了許多民眾。


    整個教室變得非常活躍，且充滿光亮。儘管影像並不清晰，但我看見許多天使，內心不由湧出一股興奮感，我的靈魂因為歡喜而雀躍不已。天使對我悄悄耳語有個很特別的人要來。「我知道，我知道誰要來。」我高興得幾乎跳起來，想向大家宣告，但天使把我的腳固定在地上，讓我動彈不得。「不行，」天使說，「他們不會相信你。」


    當時我站在門內的右邊看人排放椅子，雙腳動彈不得。椅子被排成同心圓，整個祈禱團變得越來越大，椅子也不斷被移動重排。最後，同心圓的排法已不足以應付，所以椅子又被排成橢圓形，一共排了五、六圈，而且數量不斷增加。現場有更多人陸續帶著椅子出現。


    喬叫我到他身邊坐下，這時候教室的椅子已排滿六圈完整的橢圓形。天使鬆開我的腳，'
  mdcn: '員工。薇樂莉和瑪麗幾乎認識酒吧裏的每個人，大家笑聲不斷。她們習慣喝酒，但我一點也不行，她們鼓勵我喝了一杯紅酒，結果酒直衝我的腦門，朋友對我的反應捧腹大笑。我喝一杯就完全感受到酒精威力，根本受不了，後來只喝七喜汽水。


    我們逛過一家又一家酒吧，最後來到瑪麗最喜歡的墨菲酒吧。這裏的氣氛很好，地板是坑坑洞洞的水泥地，雖然店內沒有桌子，只有吧台旁的高腳椅，卻擠滿唱著愛爾蘭反叛歌曲的人。我喜歡這裏的音樂和歌唱，大家全跟著放聲高歌。之後我們回到瑪麗位於市區的套房喝茶、吃點心，閒聊當晚的種種。她們戲弄我，討論要如何在婚禮當天鬧洞房，我們玩得很開心，也度過美好的一晚，但最後我還是很高興能回家倒在床上睡覺。


    婚禮越來越近，一切即將就緒，結婚蛋糕也送到家，這是一位阿姨親手製作，送給我的結婚禮物。那是個三層高的美麗蛋糕，非常美好的作品。我至今仍留著蛋糕的飾品，收藏在盒子裏。


    婚禮前兩天，家裏已整理得一塵不染，雙方家人準備妥當。婚禮前夕鄰居還來拜訪，看有什麼臨時需要幫忙的事情。隔壁鄰居安妮承諾當天一早到家裏來幫我做頭髮。


    能看見一場婚禮為家人、朋友和鄰居帶來喜悅，每個人內心的激動溢於言表，感覺很美。每當有婚禮，我就會請求全宇宙的天使讓婚禮為所有參與者帶來幸福與快樂。


    終於到了婚禮當天！前一晚我輾轉難眠，很早就起床，其他人也起了個大早。我興奮得吃不下早餐，只喝了一杯茶。爸爸先帶大家到教堂，我和一位鄰居站在大廳裏等待他回來接我，爸爸到家後護送我上車，和我一起坐在後座，他默默不語握著我的手，那是當天最珍貴的時光。車抵達教堂正門口時，爸爸說：「別動。」他下了車，司機繞過來準備為我開車門，但爸爸堅持要自己來。我下車時，他臉上的笑容讓我非常快樂。爸爸牽起我的手，站在教堂門口，要走向紅地毯的那一刻，他溫柔地告訴我，他很驕傲能在女兒婚禮這一天，牽著美麗女兒的手走在地毯上。


    我倚著爸爸的手臂走向聖壇，感覺到守護天使撫弄鄰居那天早上花了許多時間幫我設計的頭髮。喬站在走道頂端，朝我的方向看著，模樣好俊美。他的守護天使滿臉笑容站在一旁。祭壇上陸陸續續出現天使，有米迦勒、荷賽司、以萊亞、以莉莎，和所有多年來一直跟在我身旁的天使們。祭壇上站滿天使。


    神父在祭壇上等著，喬和我走過去，站在神父面前，儀式開始。喬把結婚戒指套在我的手指上，荷賽司拉了拉我的禮服，跟著我一起說：「我願意。」


    我們在教堂外拍了許多照片，回到家後，一起與親友圍著大桌子，共進美好的一餐。那天晚上我們和朋友們到當地酒吧喝一杯，可是酒吧裏擠滿了人，我們又前往都柏林市區的酒吧。沒多久，喬和我就先行離開，前往梅努斯。在凌晨時分，喬抱起我，跨過我們小屋的門檻。


    # 14

    從不知道我有守護天使


    有時候事情發生前，天使一點警告也沒給。喬和我結婚後三個月的某一晚，發生一件奇怪的事。當時大約十一點，喬已經躺在床上讀書，我還在清理，準備上床。當時小屋裏還沒有浴室，所以我在火爐前洗澡。上床不到五分鐘，我就想去上廁所，又從床尾爬下來。


    一打開臥室門，我嚇了一大跳，因爲我差點踩進某人的身體裏。

    「天啊，妳在這裏做什麼？」我大呼一聲。


    原本住在這裏的柯斯特洛太太正站在我面前！她看起來就像伊麗莎白所描述的，穿著大衣，戴著一頂有面紗的漂亮帽子，上面還裝飾著水果，手臂下夾著一個大袋子。

    「再見，」她說，「我要走了。」


    她對我露出微笑，模樣很美麗，就像溫太太一樣完美。我不知道她爲何跟我道別，既然她需要這麼做，我自然沒問題。只是她實在讓我嚇了一大跳。


    我轉身回到床邊，喬問道：「有什麼問題嗎？」

    「我差點踩進她的靈體。」我答道，忘記我還沒告訴他我也能看到靈體。「剛剛遇見以前住在這裏的老太太，她來道別。」


    喬從床上坐起來，驚訝地瞪著我看，然後要我上床躲進毯子下。

    我安靜照著做，一邊希望喬不要想太多。所幸，他並沒有，只是轉身躺回去睡覺。我的天使顯然費了不少力氣，因為喬不曾再提起此事。

    我躺在床上問天使，為何柯斯特洛太太差點讓我踩到她。我不喜歡踩進還沒進入天堂的死人靈體裏，那種感覺就像是被電流擊中，很不舒服。未進入天堂的靈體還沒經過淨化，感覺和去過天堂又回來的靈體不同，譬如我的靈魂哥哥克里斯多夫就是後者。從天堂回來的靈體身上，我可以感受到靈魂的生命力。

    天使並未解釋為什麼，只告訴我柯斯特洛太太在未與我接觸前，無法離開小屋，她需要這次的接觸才能前往天堂。我無法解釋為何如此，不過我經常遇到尚未離開人間前往天堂的靈魂，而且在他們的過渡期中扮演某種角色。


    幾個月後，我懷孕了，喬決定把車賣掉，才能負擔即將出世的孩子所需的額外花費。所以我們又回復搭公車的日子，也對此甘之如飴。

    妊娠對我來說很辛苦，我經常向天使和上帝抱怨。天使們只是一笑置之，要我多休息。

    孩子決定比預產期早幾星期來到這個世界，是個將近三千公克重的漂亮男嬰。很久以前，我就告訴過喬關於靈魂哥哥克里斯多夫夭折的事情，希望能以他的名字為長子命名。因此我們早已決定要把孩子取名為克里斯多夫。


    不過，我從未告訴過喬我和靈魂哥哥的相遇。在還沒寫這本書之前，我一直未獲准與人分享這些際遇。我請喬不要對我父母提起為兒子取名為克里斯多夫的原因。生產後，爸媽來到醫院探望我，媽媽提起我們應該以她的父親，也就是外公的名字為兒子取名為克里斯多夫。我對喬笑了笑，告訴媽媽已經為兒子取名為克里斯多夫。喬聽了，捏了捏我的手。


    把克里斯多夫從醫院抱回家後，我跟所有新手媽媽一樣，緊張萬分。他相當健康、強壯，不過有一回照顧他時，天使出現在我身旁，告訴我他有點小問題。


    「我注意到他無法好好消化牛奶，對不對？」我問道。


    「沒錯，」天使說，「把克里斯多夫包好，放到娃娃車裏，帶著他到電話亭去吧。」


    我依照指示到了電話亭，很高興沒人使用電話。我打電話給醫生，請他出診來看克里斯多夫。醫生當天下午就到了。那天很冷，又下著雨。鑰匙就插在門上，醫生走進門時喊著：「有人在家嗎？」我正把克里斯多夫抱在膝上餵奶。我對醫生笑了笑，因為天使都跟著他一起進來。他在椅子上坐下，說這裏很舒適，還在火邊把手烤暖。和孩子玩了一會兒後，他詢問孩子有什麼問題。我告訴他克里斯多夫無法好好消化牛奶。醫生以怪異的眼光看著我，他身後的天使告訴我要小心選擇用字。


    「他經常吐奶。」我補充。


    「羅娜，」他笑著說，「每個嬰兒都會吐奶。」


    正當醫生把椅子拉靠近點，準備檢查克里斯多夫時，一位天使觸碰克里斯多夫的肚子，他立刻吐了奶，牛奶如噴泉般射到房間的另一端。醫生看著我說：「這就不正常了。」


    醫生用聽筒檢查寶寶的肚子，告訴我嬰兒若出現克里斯多夫剛才的反應時，通常是得了腸胃病。他給我一份轉介函，要我到都柏林坦波街（Temple Street）上的兒童醫院去找專科醫生。


    克里斯多夫確實得了腸胃病，從那時候起，他必須吃特殊食品，也意味我們需要經常往來醫院，有時候他還得住院幾天，這對他和我們都很不容易。


    喬一有空就在庭院裏忙活，院子越來越有模有樣。有一天，喬在庭院工作，他的守護天使短暫現了身，接著許多天使出現在喬的身邊支持著他。我看見他周圍的光芒越來越微弱。


    我掉下眼淚，一邊對自己說：「不要！這不公平。」


    我知道天使要讓我知道喬即將生病。


    他果真生病了，有嚴重的胃潰瘍，比其他患有同樣疾病的人還要嚴重。喬的模式就是如此，我不懂原因何在，他只要生病，狀況總是比別人更嚴重。


    雖然服用特殊飲食和大量的藥物，喬仍然病得很嚴重，甚至六個月無法工作，因此失去在大眾運輸公司的職位，我們只得靠著社會救濟金度日。


    這段時間對我們來說非常艱辛，當時我並不知道日後喬將這樣度過餘生。


    克里斯多夫一歲半的某一天，我帶他到前院去玩耍，然後鎖上前院的小柵門，讓大門開著，便走回屋內去整理床鋪。天使以莉莎現身了一下。


    「哈囉，羅娜，我是來告訴妳，妳將有個訪客。」


    我還沒能答話，以莉莎就消失無蹤。我笑著說：「還真是個短暫的拜訪啊。」


    以莉莎沒再出現，我也不再多想，繼續鋪床，偶爾抬頭看看窗外的克里斯多夫。當我走進小房間時，注意到門口閃過一道亮光，並且聽到一聲笑聲。一個小女孩的靈魂走了進來。她有一頭黑色波浪長髮和一雙深藍色眼睛，穿著黑領大衣、黑色鞋子和及膝的襪子，並且戴著帽子。她對著我微笑，蹦蹦跳跳走進廚房，我跟隨著她進去。


    小靈魂身邊還跟著她的守護天使，這種情況非常少見。守護天使在人死後，通常只停留很短暫的時間，因為靈魂進入我們所謂的天堂之後，就不再需要守護天使的協助。


    小女孩以血肉之軀出現，就跟你我沒兩樣。她曾以小女孩的模樣活在過去某段時間，這時候我還不知道她是如何死亡。她的守護天使是透明的，像個充滿生命的雨滴，反射出各種色彩，並且包覆著小女孩。守護天使雖然各有其獨特的性格，但外觀也有相似之處，就像兄弟姊妹雖然彼此相似，卻各有自己的性格一樣，所以我能毫無困難分辨守護天使和其他類型天使之間的差別。


    小女孩的守護天使圍著她四處移動，彷彿保護她不受人間事物的侵擾，甚至不讓她的雙腳觸碰地面。偶爾，她的守護天使會轉身對我微笑，並且把手指擺在嘴脣上，示意我一個字也不要說。


    小女孩轉身又蹦蹦跳跳離開廚房，進入門廳，穿過大門，然後化成一道亮光，消失無蹤。接下來幾個月，小女孩和守護天使又出現許多次。她只在前門打開的時候來，不過前門百分之九十九的時間都開著。她第一次對我說話時，告訴我她一個人孤獨死去，然後抬頭看著她的守護天使說：「我真的不知道我有個守護天使。我從不知道你的存在。」


    小女孩熱淚盈眶，守護天使伸手拭去她的淚水。我感受到強烈的愛與情感，不禁也眼眶泛紅。小女孩不再多說，又蹦蹦跳跳從大門離開。


    又一回，她說她的名字叫做安妮。我從來沒有機會問她問題，因為守護天使總把手指擺在嘴唇上，指示我不要說話。


    一天早上，天使以莉莎再度出現。「這次妳可不准像上次那樣突然消失。」我馬上對她說。


    「我們在門口坐一下吧。」天使以莉莎說。


    「以莉莎，為什麼小女孩的靈魂和她的守護天使要來找我？」


    「羅娜，安妮需要知道她活著時有人愛她。她孤獨死去，以爲沒有人愛她，連她的爸爸媽媽也一樣，因爲她要死去時找不到他們。她的守護天使帶安妮來找妳，讓妳擔任她的父母，這對妳是很大的請求。」


    「妳知道嗎？以莉莎天使，」我說，「這已經起了作用，我開始期待見到安妮，雖然她只是個靈魂，而非血肉之軀。我察覺自己對她有感情，我也知道她的守護天使努力使那感情化成我們之間的愛。謝謝妳，以莉莎天使。」


    「再見了，羅娜。」以莉莎說完便消失。


    安妮越來越常出現，幾乎天天報到。有一天她叫了我的名字。


    「羅娜，」她說，「妳知道我死於火災。那時我找不到別人，放聲大喊，可是沒有人聽到。我爸爸媽媽到哪裏去了？他們不在乎我、不愛我。我記得我哭著躺下，醒來時已經在天堂了。」


    「安妮，妳回到天堂後，將會見到爸爸媽媽，也會知道他們很愛妳。」我說話的同時，安妮伸手觸碰了我。在她的擁抱中，我感覺到她真實的身體。「這就夠了，我只是需要知道在人間有人愛過我。」她說完便轉身和守護天使一起跑出了門。


    感謝上帝，現在安妮能和爸媽快樂地留在天堂，我很高興。有時候，上帝和天使也無法說服靈魂，讓他們相信自己活著時曾被愛過。所以上帝把安妮與她的守護天使，送到我們這個世間來，如此她才能親耳聽見自己活著時曾經被愛過。這令人難以理解，不過她就是需要知道有人愛她。


    # 15

    祈禱的力量


    我又懷孕了。那年我二十五歲，克里斯多夫已經兩歲半。前三個月一切非常順利，早上也沒有害喜。有一天早上，喬出門上班後，我又在床上跟克里斯多夫多睡了一會兒，一個小時後我醒來，克里斯多夫仍熟睡著，我吻了他一下，安靜溜下床。我走到小前廳，看見天使荷賽司坐在一張椅子上，他要我也坐下。

    「荷賽司天使，別告訴我出了什麼差錯了。」我說。

    「沒有，羅娜，沒什麼嚴重的事，妳肚裏寶寶的左邊有個標記，讓醫生有點擔心，特別要其他醫院派專科醫生來。妳要記住，一切沒問題，寶寶很健康，只是急著想報到而已。寶寶沒耐心留在妳的肚子裏，我們這些天使和寶寶的守護天使會盡全力讓寶寶待在該留的地方，直到時間成熟。就在那裏面，羅娜。」

    天使荷賽司伸手碰了碰我的肚子，我感覺到寶寶動了。

    「我的寶寶知道你觸碰了我的肚子。」我告訴荷賽司。「懷孕六週時，我感覺到寶寶動了，但是醫生說不可能。我知道事情不是這樣。有時候，我站在鏡子前，請求上帝讓我偷看一眼，就看見能量像漩渦般旋轉著。有時候，能量會短暫開啓，上帝藉此讓我看見完美無瑕的寶寶。」

    我問天使荷賽司：「為什麼我的寶寶想提前報到呢？」

    他沒有回答我的問題，反而告訴我：「從現在起，一切會很辛苦，懷孕期間妳大多會住在醫院裏。」


    幾天後我到醫院產檢，看見了寶寶的模樣。

    「妳的寶寶似乎很活躍。一切看起來沒問題，他雖然還沒有我的拇指指甲大，不過手腳已經在動了，眼睛張開，拇指還放在嘴巴裏。」醫生說。


    醫生決定留我在醫院休息幾天，我被送到病房裏。喬回家後又立刻帶來一些住院需要的東西。結果我在醫院待了一星期。醫生告訴我可以回家時，我非常開心，身體感覺也很好。

    我在家裏只住了兩星期，然後又回到醫院。媽媽幫我們照顧克里斯多夫，喬才能繼續上班，那時候他在郡議會工作。克里斯多夫非常煩躁，媽媽要安撫他不容易。喬下班後會先到媽媽那邊去，才來醫院看我，週末時則把克里斯多夫帶在身邊。


    我在醫院裏打點滴，不准下床。醫生無法理解我爲何不斷有早產跡象，懷孕後面幾個月我都住在醫院。聖誕節的前一週，肚裏小孩已經七個月大，病房逐漸變空，因爲能回家的患者都獲准回家過節了。看起來，醫生似乎不打算讓我回家，但我不斷向上帝祈禱，希望能回家和克里斯多夫和喬一起度過聖誕節。聖誕節前夕，在午餐之前，一位醫生來到我床邊，說我能回家兩、三天，不過一感覺不舒服，必須馬上回醫院。

    當晚，爸爸開車載喬和克里斯多夫到醫院接我，我覺得身體很好。回到小屋，屋內好溫馨，因為我們的好鄰居伊麗莎白在火爐裏生了火。爸爸離開前邀請我們在聖史蒂芬日（譯註：十二月二十六日）回家吃晚餐，約好中午十二點來接我們。克里斯多夫和喬一起目送外公開車離去，然後關上柵門。他們進屋時，我正舒服地坐在火爐邊。克里斯多夫坐在我的膝上，我抱著他，喬為我們泡茶。我實在不太記得那個聖誕節，也不知道喬是如何應付一切，只記得聖誕夜我抱著克里斯多夫坐在火邊，然後在聖史蒂芬日到爸媽家，我感到很不舒服，請爸爸帶我回醫院。


    爸爸送我回到醫院，兩週後，我懷孕第八個月，二兒子歐文出世了。令人難以相信的是，雖然他早產了四星期，卻將近三千六百克重。


    我不清楚爸媽是怎麼加入祈禱會，但他們不僅加入，爸爸甚至因此產生很大的變化。他開始幫助別人，雖然他以前便不吝助人，但現在似乎付出更多，一聽到有人需要幫助，他完全是赴湯蹈火。


    有一晚，爸爸來到小屋問我們要不要參加梅努斯學院的祈禱會。我看著喬，兩人點了點頭。我很興奮能有機會出去走走，也對一群人一起祈禱很感興趣。而且我向來喜歡教堂，有機會就去望彌撒。


    「祈禱會是怎樣的團體？」我問道。「梅努斯學院有間教室給我們用，」爸回答，「大家一起祈禱、誦讀聖經，然後請求祈禱會為需要幫助的家人祈禱。之後，成員通常喝杯茶，吃個點心，互相聊聊。」「也可以交新朋友。」我說。


    伊麗莎白願意幫忙照顧小孩，因此那天起，我們去參加祈禱會時，小孩就託付給她。


    我非常喜歡第一次的祈禱會，雖然當時我非常緊張。事實上，我緊張到不太記得整個過程，不過我們後來成為祈禱會的常態成員，只要有時間就會出席。


    祈禱的力量非常強大，因為祈禱時，並非只有我們人類，守護天使和任何在身邊的天使，乃至我們所關愛的已往生親友，都會跟我們一起祈禱。沒有卑微到不足以祈禱的事情，也沒有所謂太簡短的祈禱，不論是一個字或很多話都沒關係。祈禱也沒有地點限制，開車、走路、會談，在人群中或獨自一人都可以。有時候，我們甚至沒有察覺到自己在祈禱，特別是當我們心裏想著生病的親人，或是陷入困境的朋友。發自內心由衷祈禱，產生的力量尤其驚人，不論個人的宗教信仰或教義為何，上帝都會用心傾聽。


    一群人在同一個地方同時祈禱，譬如在祈禱會的場合，或者世界各地的人在同一時間為特定事情祈禱時，祈禱的力量特別強大。這樣的祈禱能大幅強化靈性的力量。


    我和喬很享受前往祈禱會的那段路程，喬總是邊走邊說在那議會發生的林林總總，我們也會討論祈禱會的事務。某個星期三，在前往祈禱會的路上，我對喬說，希望當晚參與的人數能多一點。祈禱會一般大約有十人，有時候更少，夏天尤其如此。暑假結束後，祈禱會的人會陸續增加，人數一多，聚會地點就移到校園的另一端。


    爸爸參加許多祈禱會，卻只到過梅努斯祈禱會幾次，我們第一次是他帶去的，但之後他就沒再來過，所以那一晚我看到他時非常開心，趕緊去問候。我們一起走上階梯，穿越大門，進入左手邊一間教室。室內已經聚集了一些人，還有約二十張椅子排成一個圓。打過招呼後，我們隨即坐下，椅子差不多快坐滿人。我對喬說：「真是太棒了。」越來越多人出現，一位神父進來，自我介紹是大衛神父，並詢問大家是否介意神職學生和修女加入今晚的祈禱會。我們異口同聲歡迎他們。由於當時室內已約有二十名一般民眾，他建議我們換到大一點的教室。幾分鐘後，他回來告訴我們可以換到一間大教室，要我們把椅子帶著，連堆疊在牆邊的椅子也帶去。


    另一間教室比之前大上許多。很快的，一群年輕神職學生（學習如何成為神父的年輕人）和大約七位神父陸續抵達，一群修女帶著一位住在校園修女之家的女孩也出現。此外還來了許多民眾。


    整個教室變得非常活躍，且充滿光亮。儘管影像並不清晰，但我看見許多天使，內心不由湧出一股興奮感，我的靈魂因為歡喜而雀躍不已。天使對我悄悄耳語有個很特別的人要來。「我知道，我知道誰要來。」我高興得幾乎跳起來，想向大家宣告，但天使把我的腳固定在地上，讓我動彈不得。「不行，」天使說，「他們不會相信你。」


    當時我站在門內的右邊看人排放椅子，雙腳動彈不得。椅子被排成同心圓，整個祈禱團變得越來越大，椅子也不斷被移動重排。最後，同心圓的排法已不足以應付，所以椅子又被排成橢圓形，一共排了五、六圈，而且數量不斷增加。現場有更多人陸續帶著椅子出現。


    喬叫我到他身邊坐下，這時候教室的椅子已排滿六圈完整的橢圓形。天使鬆開我的腳，'
