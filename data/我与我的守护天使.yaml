    星期六早上我最喜歡的外出活動是跟媽媽去買菜，這表示我們要到摩爾街，那是位於都柏林市中心的繁忙街道，兩邊設滿有隔間的攤位，婦女們拉開嗓門，用濃濃的都柏林口音叫賣貨物。我則拉著菜籃車跟在媽媽後面，等著她選購最適合的蔬果。


    有個星期六，我們一轉進摩爾街，有位天使就拉了我的肩膀，對我耳語：「讓媽媽走在前面，她不會注意到的。」我退後兩步，媽媽繼續向前走，看著正在叫賣販售的蔬果。突然間，整條摩爾街彷彿變成一座黃金宮殿，一切全染上金黃色，連人群也不例外。接著，顏色又產生了變化，其他顏色再度浮現，卻是活躍鮮亮的色彩，比平常更爲鮮明亮麗。這些顏色開始從水果、蔬菜和花朵中流竄出來，像是充滿能量的波浪，波浪隨後變成了色彩球，從街道的一邊彈跳到另一邊，又彈到攤位上，甚至彈到人們身上，但似乎沒有人注意到它們。


    街道上不僅到處是人，天使也比平常多。有些天使的穿著打扮就和賣蔬果的婦人一樣，而且也忙著幫忙。看天使模仿婦人的每個動作，實在很有趣，他們真是擅長模仿。天使還唱著歌，彷彿是為了配合四周的街道生活而唱。


    之前我去過摩爾街很多次，卻從未見過如此景象，或許這是為了讓我開心而發生，又或許每天都有，不過我是第一次看見。熙熙攘攘的繁忙景象讓我非常興奮。


    忽然間，走在三個攤位前的媽媽發現我沒跟在身邊。


