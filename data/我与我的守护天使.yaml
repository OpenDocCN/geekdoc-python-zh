  md: '生或救護車，因為我心底明白自己會活下去，死亡的時間還未到。我沒有告訴喬自己曾經死亡的事情，他不需要知道，實情只會加深他已有的恐懼。最後，喬還是到公共電話亭打電話給我父母，他們立刻來到家裏看我。


