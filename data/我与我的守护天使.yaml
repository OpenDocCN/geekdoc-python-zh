  md: '造成永久性的發展遲緩（事實上，七歲的他只有十五公斤重，但正常小孩至少有二十五公斤）。我也解釋喬的疾病讓他無法消化許多食物。但那人的根本不願意聽，執意相信自己是對的。


    最後，慈善單位只給我們極微小的協助，但多半是無益的支援。他們送我們特定食物的免費兌換券，但往往是克里斯多夫和喬不能吃的東西。有個聖誕節，我們拿到一張火雞兌換券，非常開心，但是去兌換時的羞辱經驗，卻讓所有美好的感覺消失無蹤。委員叫著名字，等人們上前領取火雞。他們叫到我的名字時，卻說：「喔，是妳啊……」我覺得他們一直在談論我，認為我投機取巧，從真正需要的人口口中搶奪食物。他們根本一無所知！


    有一天，我巧遇多年前在梅努斯祈禱會認識的夏恩。由於喬的身體禁不起奔波，所以我們很久沒有出席。但是我很想念祈禱會，想念共同祈禱的經驗，也想念在那裏認識的夥伴。事實上，在這段時間，我極少出門，除了購物、接小孩放學、打幾小時零工之外，哪裏也沒去。喬的身體狀況很難預測，所以我不敢留他單獨一人太久。


    這時的夏恩是地區慈善機構委員會的一員，巧遇後不久，他說想來家裏喝杯茶。在廚房喝茶時，我告訴他實情。我只對他一人清楚說明我們的財務實際上到底有多困窘。夏恩非常震驚，並且承諾會為我們向慈善機構爭取更多協助。


    但這並不容易。夏恩向委員會提出我們的案例時，他們強烈反對提供協助，最後還是拒絕他的請求。我知道這是惡魔所為。撒旦有時候在我們步上該走的道路時，讓我們遭遇重重困難；有時候，邪惡力量讓我們在生命路程中受挫，使生命比應有的際遇更爲艱困；又或者'
