    「幾年前發生過一次石油罷工，當時我曾設法讓莫菲公司不會因此短少柴油或汽油，」爸爸說，「現在是他們還我人情的時候了。我跟他們談得很愉快，並透露你們一心想要買下小屋。」

    我們不知道除了小屋外，還有一片土地要賣。莫菲公司來拍賣會的主要目的是那片土地，但也想買那棟小屋，因為就在同一條路上，可以用來當辦公室和卡車停車場。不過跟爸爸談過後，他們同意不競標小屋，甚至會盡力幫助我們得標。

