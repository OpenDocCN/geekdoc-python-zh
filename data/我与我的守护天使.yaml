  md: '「不,我有話要說。」我說。我轉向第一個年輕人,解釋他的靈視影像和他對成爲神職人員的恐懼有關。我說這一路上他將遭遇許多上帝爲他設置的障礙,但他會一一克服,並且發揮極大的影響力,影響層面不僅止於愛爾蘭,還會擴及世界其他地區。他必須對上帝和自己懷有信心和信念,而且他應該整理行囊,啓程展開這項旅程了。我解釋說,這是天使要我傳遞給他的訊息。


    接著,強尼開始禱告,我們一起唱起聖歌,讚美上帝。我非常喜愛這個時刻。天使說將來我在祈禱會還有很多工作,我則回說我對他們要求的事感到很焦慮。


    祈禱會結束了,吃過茶點後,喬跟我走路回家。喬對於我在祈禱會說話一事,並未多說什麼。


    幾個月後,在梅努斯的另一次祈禱會中,強尼說:「現在讓我們來祈禱,爲有所需要的家人、朋友,和在世界各地需要幫助的人請求療癒的力量。」


