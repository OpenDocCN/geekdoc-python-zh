  - '[PAGE 221]


    來得及召喚天使，就聽到柵門旁傳來的汽車喇叭聲。一切都以慢動作緩慢進行，我很驚訝看見爸爸已經下車，站在柵門前，看起來不想要打開柵門，不想走進來。


    我心跳非常快。他喚我到外面，說他很累，可是有強烈的慾望要把吸塵器拿給我。我要去打開柵門請他進來，但爸爸說：「不了，羅娜，我的肺很沉重，我得回家了。」他站在柵門外邊，我站在裏邊。我沒有開門。守護天使把他抱在懷裏，他周身的光芒已經非常微弱。


    我知道你會問我為何沒有打開柵門，但我只是尊重爸爸不想那麼做的意願。我們靈魂之間的連結必須打破，這就是為何爸爸不願讓我開門，他知道我們必須停留在相異的兩端。在靈性層次上，爸爸明白那道柵門不能開，但他當時還了解多少，我並不知道。我對著爸爸微笑著，伸手握住他的手，互道再見後，他就回家了。那天晚上，我告訴喬，爸爸正逐漸死去，他沒多說什麼，只是把我抱在懷裏。


    兩天後，我們的靈魂完全分離了。那天是三月十七日，聖派翠克日（St. Patrick''s Day）的早晨。喬覺得身體不適，我告訴他留在床上，不用跟孩子們和我出門去看遊行。我們吃過早餐，幫孩子準備東西去梅努斯參加遊行。到鎮上時，遊行正盛大展開，孩子們拿到了糖果，又和小丑握手，大家都非常開心。我也努力微笑，露出開心的模樣，因為我不想破壞孩子們愉快的心情。但有好幾次，我都以爲遊行漫長到永遠不會結束。


    當我終於能帶孩子們回家時，鬆了口一氣，天使米迦勒出現在我身旁。我感覺到他把手放在我的肩上。「妳並不孤單，羅娜。」他在我耳邊低語。我努力忍住不哭，因為我知道孩子們若看到我哭，也會很悲傷。'
  - '[PAGE 222]


    「我覺得好空洞。」我悄悄告訴米迦勒，「爸爸已經離去了！我無法感覺到和他之間的連結，他走了。」

    「妳父親將來會以靈的模樣回來看妳。」米迦勒輕聲說：「不過那是很久以後的事了。記得你們之間所分享的連結，你們靈魂間的夥伴關係。」

    「我知道，米迦勒，只是我的人性部分覺得好悲痛。」

    天使米迦勒安靜地走在我身旁，兩個男孩在前面跑著，露絲的小腳走累了，所以坐在娃娃車裏。走到小屋柵門前不久，米迦勒把手伸入我的手中說：「羅娜，妳知道妳和上帝及天使之間的連結永遠不會斷。」

    我停下腳步看著我的天使。「米迦勒，謝謝你，我很需要聽到這些話。」

    路上有輛車開了過來，米迦勒隨即消失。我們到家後約半小時，弟弟柯爾馬克就開車抵達。我看著窗外，看見他站在柵門外，我笑了，因為他也沒有打開柵門，而是站在那裏等到我開門爲止。弟弟並不知道自己在父親的靈性祝福中也扮演了一個角色，當他走過柵門的那一刻，替代了我們父親的位置。一道光芒一閃即逝，我知道那是爸爸在說謝謝。

    「我知道，柯爾馬克，」我說，「我們的父親走了。」

    柯爾馬克說：「我是來告訴你，爸爸往生了。」

    「進來喝杯茶吧。」我說。一小時後，我們去探望媽媽。


    金鍊子 222'
  - '[PAGE 223]


    # # 21

    給我奇蹟


    就算是有工作，錢仍然不夠用。好幾次，我們因為無法付帳單，電力被切斷。而且克里

    斯多夫需要吃無麩質飲食，這表示我不能買便宜品牌的食物。我經常感謝天使讓我們擁有庭

    院，因為能自己種菜對我們幫助極大。在我腦海深處，那種遭人注視的模糊感覺一直存在

    著，有時候一想到以萊亞在多納迪亞湖畔野餐那晚提到撒旦即將測試我一事，就感到害怕。

    我盡量不去想，希望事情不會發生，但內心深處知道那是遲早的事。


    喬終於遭到地毯工廠解雇，廠方說他們也解雇其他人，但我相信喬是因為健康狀況和長

    期缺席而遭到解雇。他在愛爾蘭大眾運輸公司找到臨時工作。通常他得走到主要幹道搭便車

    去上班，有時候運氣好，有時候則要花好幾小時才能抵達公司，所以他總是提早出門。

    有天早上他搭便車，結果出了車禍，司機沒事，但喬嚴重腦震盪。他在醫院住了幾天，

    被診斷出患有糖尿病。以萊亞曾經展現給我看的靈視影像正逐一實現。喬再也不曾回到運輸

    公司上班。


    十一月底，聖誕節越來越近，我們幾乎沒有錢可以在餐桌擺上食物，或讓柴火繼續燃

    燒。有一天我在大雨中到庭院採甘藍菜芽，一個個放到袋子裏。我全身濕答答，覺得自己很'
  - '[PAGE 224]


    悲慘，也很氣天使。「我們沒法只靠著蔬菜生活！」我淚流滿面對他們大叫。突然間，我看見一隻發光的手伸入袋子，一抬頭，是天使荷賽司，他看起來跟我一樣濕淋淋，我不禁笑了，覺得好多了。


    「荷賽司，你知道情況有多糟嗎？我們沒有東西可以讓孩子們過聖誕節。我需要奇蹟，除了蔬菜，我們沒有其他食物，而且電力又被切斷。我甚至沒法拿訂婚戒指去當鋪，因為已經當掉，我和喬大概再也無法籌到足夠的錢把戒指贖回來。」


    荷賽司伸手捧著我的臉。我看著他的眼睛，感覺就像看著天堂。


    「羅娜，我們一直在人們耳邊細語，可是有時候要他們聽進去很困難。」「為什麼別人沒法像我這樣聽見天使的聲音，荷賽司？」我問道。


    「羅娜，他們事實上有聽見天使說話，但往往覺得那是個傻想法，所以對這些請求置若罔聞。如果發現有人對我們請求協助他人的耳邊細語有點反應，我們就會加以鼓勵，使他們內心產生信心。人們總是怕自己鬧笑話，可是幫助別人不會讓他們鬧出任何笑話。」


    「荷賽司，我要祈禱人們能夠聽見天使的聲音。」


    荷賽司消失後，我回到小屋。過了幾天，距聖誕節只剩兩星期，我下坡去學校接孩子們，一輛車經過我身邊又停了下來。車裏有一男一女，男人搖下窗戶打招呼。最初我以爲他們要問方向，但是當我往車裏看時，隱約看見他們的守護天使。


    「我們知道妳有兩個男孩。」男人說。


    這時候，他的妻子下車，打開行李箱，拿出一個白色的大袋子說：「這些是聖誕老公公'
- md: '送，的孩子長大了。


    我目瞪口呆站著，不敢相信這一切。我還沒能開口說話，她已回到車上，車子也啟動了。我在車後喊著：「謝謝你們！」


    我看著車子繼續往上坡開去，車體發出瞬間閃光。我雀躍無比，又笑又跳說著：「謝謝天使，那些人願意傾聽了！」我好開心，打開袋子，裏面有各種適合小男孩的玩具。


    我趕緊上路，先去找肉販吉姆，把袋子寄放在他那裏，才不會讓孩子們看見。在學校等孩子們時，我實在興奮難耐，也等不及找人分享這件事情。等待跟喬分享的這段時間，我幾乎快爆炸。


    回到家，一等孩子們聽不見我們的說話聲，我馬上把事情鉅細靡遺告訴喬。他設法拼湊出那對夫婦是誰，因為他在這一區認識的人比我多，我幾乎誰也不認識。事實上，在最近之前，天使們一直不允許我有親近的朋友，他們似乎需要我維持在隔離的狀態。當然，我有人為伴，但有時候我真希望能有些朋友。


    喬認為我們的大善人可能是一對住在來錫利普的夫妻。就算是，我們也無法去向他們道謝，因為我們實在無法真正確定。


    「你難道不知道這是天使的功勞？」我說。


    他笑了：「謝謝天使。」我也笑了，並且鬆了一口氣。


    不過，聖誕晚餐又是另一回事了。距聖誕節還有兩天，喬和我連買一份小麵包的錢都籌不出來，更別說是火雞。可是天使不斷出現，也一直要我別擔心，因為事情將有轉機，有人會傾聽。


    聖誕節前夕孩子非常興奮，他們等不及聖誕老公公的拜訪。我也一直很喜歡聖誕節，因為這是個美好的日子。在基督教世界中，耶穌基督誕生的日子，也是伸手救濟他人、分享與建立同情心、放下界線、消除怨恨，讓我們與生俱來那份對愛與和平的強烈渴望浮現的時刻。


    我上床時，心底想著沒有聖誕晚餐的事情，但也感謝所有天使付出的努力，並告訴他們我期待看見孩子早上收到禮物時的興奮神情。


    隔天早上，也就是聖誕節當天，孩子們六點就醒來。火爐裏仍有些紅炭，喬要到小棚屋拿柴火，但還沒開門就聽見他叫我，只見他手裏拿著一個信封走回前廳。信封上一片空白。


    喬打開信封的那一刻，室內充滿天使，他們四周的光芒閃爍不停。喬從中拿出兩張二十鎊的紙鈔。我簡直不敢置信，高興得不得了，衝上去抱著喬。孩子們跑來詢問怎麼回事，喬跟我異口同聲說：「聖誕老公公也送我們一份禮物！」結果孩子們也抱著我們的腿。


    想想看，有個人把兩張二十鎊紙鈔放進信封，走路或開車來到小屋，輕聲打開柵門，躡手躡足來到門口，把信封滑進門內！信封送達時一定非常晚了，因為喬和我午夜後才上床睡覺。這是一份完全匿名的贈與，上面既沒有說明，也沒有卡片，他們完全不期待任何回報。


    這真是上天恩賜的禮物，讓我們能有個快樂的聖誕節。我感謝那位送禮的人，感謝他聽見了守護天使的聲音。


    我告訴孩子們，聖誕老公公的名字源自於聖尼古拉斯（Saint Nicholas），這位聖人激發人們的善心，讓人們願意分享禮物。顯然聖尼古拉斯來過這裏，天使們也是。


    在當時，四十鎊是很大一筆錢，足夠買八個星期的食物。我們覺得自己富足得像百萬富翁！喬寫了一張購物清單，包括檸檬汁、小麵包、甜點、一些零碎的東西，最重要的是一隻雞，這樣孩子就能假裝那是火雞了。出門購物前，我們開心地和孩子們玩了一會兒。


    準備好出門參加彌撒後，我走在前往教堂的路上，覺得一切非常美好。走進教堂大門時，我對喬說：「希望店鋪裏有煮熟的雞。」喬的回應讓我笑了出來，他說：「怎麼會在望彌撒時，還想著這樣的事情。」但在彌撒當中，我還是祈禱能有一隻煮熟的雞！我感謝上帝和天使賜與的一切，尤其感謝那位在門底下塞進信封的人。


    彌撒結束後，我們立即前往梅努斯鎮位於緬恩街（Main Street）上唯一一家在聖誕節早上開門的巴利商鋪。從教堂走出來，在轉入緬恩街的轉角時，我看見天使荷賽司站在巴利商鋪的門口，散發著愛的光芒。喬和孩子們走在前面，我在店門口遲疑了一下，荷賽司碰了我的肩膀。我對他說：「謝謝你充滿光芒的愛的禮物。」


    「你聞到烤雞的香味了嗎？」荷賽司說完就消失無蹤。


    店內非常擁擠，大家忙著採買雜貨，互道「聖誕快樂，新年豐足」。喬在一角和老闆娘巴利太太講話。她說她收到一些烤雞的訂單，大多是老人家的要求，我們很幸運，因為她多放了幾隻雞下去烤。


    巴利太太臉上掛著大大的笑容，看得出來她很高興自己多烤了幾隻雞。她的守護天使在她身後短暫現身，我對她點了點頭，靜靜感謝他，也感謝巴利太太的傾聽。


    我們在鎮上四處走走，逛著櫥窗，逗弄兩個男孩，露絲則在娃娃車中熟睡。回到店鋪時，烤雞的香味美極了。巴利太太說我們時間拿捏得很準，因為她才剛把雞從烤箱取出來。她包好一隻雞，放進袋子，也把清單上的其他雜貨放進盒子裏。喬付了錢，謝過她，祝她聖誕節快樂。


    喬拿著盒子，我提著暖烘烘的袋子回到小屋。喬到廚房把雜貨和雞放在桌上，幫忙拿出甜點、小麵包和檸檬汁，感覺像是一場饗宴。


    我查看一下烤雞，轉身對喬說：「我真不敢相信，這裏面還有餡料！巴利太太真是好心，不僅在聖誕節早上烤雞，還在裏面塞了餡料。」


    晚餐準備好，我們點上蠟燭，烤雞也擺上桌。這是一頓美麗的大餐，烤雞比我以前和之後吃過的任何火雞還更美味。我們度過一個美好的聖誕節。


    接下來幾個月天氣很冷，甚至下起雪。我們到院子裏丟雪球，孩子們堆起雪人，我看著小兒子歐文滾著雪球，一位天使對著我耳語，但並未現身。


    「是你嗎，天使荷賽司？」我問道。


    「不，我是歐文的守護天使。」天使回應道，仍然沒有現身。「看著妳的兒子，我要為妳展現影像。」


    這個時候，歐文喊道：「媽咪，看我的雪球。」他哥哥克里斯多夫跑過去幫忙，很快的，雪球滾到幾乎和歐文一樣大。「你的雪球已經夠大，可以做雪人的身體了。」我邊說邊轉身要走回小屋。「現在，只要再做一個足球大小的雪球當頭，用石頭做眼睛和嘴巴，再拿胡蘿蔔做鼻子就可以了。」


    這時候歐文的守護天使喊著：「妳要去哪裏，羅娜？」我以爲守護天使只是要我看著兩個男孩滾動巨大的雪球。我轉回頭，看見了他。歐文的守護天使現身在我面前。他非常高，眼睛散著祖母綠的光芒，滿臉笑容，彷彿在說：「看看妳不聽我的話，差點就錯失了什麼，羅娜。」他身穿鎧甲，鎧甲看起來非常細緻，散發銀色光芒，可是沒多久顏色就變了，變成熱焰一般的光芒，和四周的白雪形成強烈對比。他的雙腳似乎深植在積雪中，而且在雪中發光，但我知道他的腳並沒有真的觸碰到地面或積雪。光這樣看著歐文的守護天使，已經讓我感到非常快樂。


    「羅娜，看著妳的兒子。」天使才說完話，歐文就站起來推著巨大的雪球，同時轉身給我一個笑容，滿臉驕傲的模樣。接著，我看見一團相當壯觀美麗的能量從歐文的胸膛浮現出來，能量不斷漲大，彷彿逐漸形成一面盾的模樣，但最後卻變成美麗的心形。這顆心充滿生命，呈現出河水匯流時的翠綠和湛藍色彩，而且就浮現在我小兒子的胸前，和他的胸膛連接著。我非常震驚地望著，因爲那美得教人難以呼吸。


    「那是什麼意思？」我問道。


    我察覺到歐文的守護天使站在左邊，手搭在我的肩上，我想轉身面對他，但他要我別轉頭，我聽話照辦。他繼續說：「這顆心象徵生命的盾牌，是生命與愛的給予者，是大地和是非的保護者。」


    我笑著對天使說：「對大人來說，那都是很大的責任了，更何況是個孩子。」


    我請求歐文的守護天使在他的人生旅程上引導他、保護他。


    「羅娜，歐文長大後，可以告訴他妳今天見到的影像，可以告訴他我是天使塔非克斯（Taffikis）。」


    我看著歐文和哥哥推著另一顆雪球，看著他胸前的心逐漸縮小，感覺到天使塔非克斯的手不再停留在我肩上。有那麼一瞬間，我看見塔非克斯站在歐文身邊，後來歐文跌坐在地上，笑著喊我過去幫忙。


    ## 22 撒旦在門口


    多年前，在湖畔野餐時，天使以萊亞曾經說過，上帝要在撒旦面前測試我。有一天，以萊亞再度來訪，告訴我撒旦就快來到我身邊。


    > 「我感覺得到他越來越接近。」我非常驚恐，也為自己和孩子擔憂。

    > 「不要害怕，」以萊亞對我說，「證明妳對上帝的信心。」


    自從和以萊亞在湖畔對話後，我一直覺得撒旦向我行來，具體情況不容易說明。想想看，他距離我幾百萬公里時，我就能感覺到他的存在，然後越來越接近，只剩下幾千公里、幾百公里。自從以萊亞說撒旦將走近我身邊，至今已經過了許多年，但我能感受到他持續不斷靠近。如今以萊亞已證實撒旦就快抵達。


    隨著撒旦越來越接近，有天大約正午左右，天使米迦勒、荷賽司和我所有的天使全都出現，在我面前圍成半圓，要幫助我阻擋來自撒旦的巨大邪惡感。接著，天使消失，再也看不見他們。我走回小屋，把前門關上時，心裏知道撒旦已經站在柵門前。我感到非常寒冷，幾乎要凍僵，生命的元氣彷彿正從體內流失。那感覺就像是站在鐵軌上，面對一輛迎面飛快駛來的火車，卻被告知只要有足夠的信心，火車就會在面前及時煞車。我不斷想起以萊亞的話：證明妳對上帝的信心。


    撒旦肯定在柵門前站了好幾個星期，我則持續進入恍惚狀態，迷失在時間之流中。有一晚床睡覺時，我知道他已經來到前門。撒旦的力量強大到難以置信。我召喚天使，可是他們沒有回應。喬和孩子們在臥室裏熟睡著，一定是上帝和天使讓他們進入深層睡眠。


    我坐在床上抱著膝蓋，毯子拉高到頸部，害怕得直發抖，就這樣坐了好一段時間。然後，所有的天使們，包括荷賽司、米迦勒和以萊亞現身在我面前，圍繞著我，要我別害怕，接著又突然消失。


    我能感覺到撒旦的存在進入屋內，朝臥房走來，他一抵達，臥房裏的一切，包括喬和孩子都消失了，彷彿融入黑暗之中，連我所坐的床也不見。我被隻身留下來面對撒旦。


    撒旦的力量讓我非常恐懼，那是一種全然的邪惡與恐怖，令人毛骨悚然。我不知道他是否為男性，也不知其長相如何，感覺上是一團惡的、黑暗的、強大的力量。他有極大的信心，而且絲毫沒有恐懼。


    接著，上帝走進黑暗之中。就如同在祈禱會中那樣，他以年輕人的模樣現身，穿著耀眼的白袍，臉上散發著光芒，深色頭髮長及肩膀。他站在我的右邊，伸出手臂握住我的手。有上帝的存在站在右邊，我得到了力量。我知道上帝讓撒旦不敢逾矩，阻止他進一步靠近，但是我仍然驚恐不已。這一生中，我不曾如此驚恐害怕，全身顫抖不停。


    我坐在床上，撒旦在我的左邊，那是一片巨大的黑暗，巨大的邪惡，而上帝就在我的右邊。我無法清楚看見撒旦，因為他是一團黑暗，但我能清楚看見上帝。當我看著上帝，恐懼便消失；可是看著撒旦時，恐懼再度升起，甚至更爲強烈。


    我察覺到這是上帝對我的測試，要我展現出自己無畏於撒旦，展現出我比撒旦更堅強，而且能夠將他推離。上帝的存在碰了我的手，給予我推開撒旦所需的力量。於是我連續三次大聲說：「撒旦，走開，我選擇上帝而非你，我比你更堅強！」


    我每說一次，他就往後退一些，第三次時，他已經退到臥房外。接著，上帝把他推離到屋外、推到整個地區之外，彷彿推入一個漫長而黑暗的隧道，進入虛空。那一天，我向上帝證明我具有將撒旦推開的信心。


    撒旦確實存在，我對此毫無疑問。一旦允許撒旦進入我們的生活，他一定會出現。他會像「神」一樣，讓生命中出現許多極棒的事情，也許是財富，也許是外在的成功，但代價卻深刻無比。撒旦不希望我們的靈性持續成長，因此會妨礙所有願意幫助他人打開心胸、以不同角度看待世界的人。


    人類的靈性正在演化之中。這是人類演化的一部分，使身體和靈魂能夠結合，到最後達到身靈合一的境界。我看見人越來越不受制約，充滿疑問，而且更有探索靈性本質議題的意願。我們在生命中將面對上帝給予的測試，這是靈性成長的一部分。我們全都擁有將撒旦推開的能力，這是絕對不可忘記的事情。只要把撒旦推開，他就會往後退一步，別無選擇。不幸的是，他仍將存在，不過力量將會衰退。我們隨時能召喚上帝和天使來強健我們的手，強化我們的信念和信心。


    喬的糖尿病變成慢性病。他經常昏倒或感到疲倦衰弱，有時候克里斯多夫會從庭院衝進屋裏，喊著「爸摔倒了」。這對喬、對我們都是一段困難的時光。多數的糖尿病患者對藥物治療都有反應，可惜喬的案例沒那麼簡單，儘管醫生已經盡力，還是無法控制病情，而且他的病情已影響到心臟。自從被診斷出糖尿病後，喬就不曾再出門工作，他曾經應徵梅努斯學院的守衛，如果能被錄取，對我們就相當方便，因為離家很近。可是他們在最後一刻卻基於體檢的結果，沒有錄用他。這使喬極度失望。


    喬經常進出醫院，有一回護士建議我們也許應該在小屋安裝電話。六個星期後，電話安裝好，這要感謝地區醫療當局的協助。不過我只用來打緊急電話和接聽，因為怕費用太貴。電話裝好後不久，孩子們在庭院裏玩耍，有輛車開了進來。當時我正在後院整理一個棚子。（我們花很多時間在庭院裏，養了幾隻雞，鄰居還送我們一隻小狗。）這一天，我聽見有個男人喊著：「哈囉！」我走出來打招呼，他正要下車，車裏還坐著一位女士和小孩。他問我他是否走對了地方。我笑著說：「我不知道，你要找誰呢？」


    「找療癒者，」他回答，「我太太人不舒服。」


    我面帶微笑，但是心中並無把握，雖然知道他找的人是我，可是在此之前，我不曾被這樣稱呼過。事實上，被稱爲療癒者，讓我侷促不安，我覺得自己不夠好。但我深呼吸一口氣後說：「是的，你走對了，請進。」


    我們走進廚房，他們介紹自己是芬頓、佩格和兒子艾蒙。小男孩在庭院裏和我的孩子們、雞和小狗一起玩耍。這是第一次有人到小屋尋求我的協助，我始終不知道是誰把他們送來找我，或者告訴他們我是個靈療者。但他們是諸多求助者中的第一人。


    許多年後，我再度遇見芬頓，他說當初看見那棟有孩子、小狗和雞的小屋時，就知道自己來對地方。他同時也告訴我，會面之後，妻子的健康有了大幅改善。


    有一天我接到一通名爲喬西的女性來電，有人把我的號碼給了她。她的兒子被診斷出癌症，因此想尋求我的支持。她還請我看看另一個家庭，他們的兒子也得了癌症。我安排那個家庭在隔週星期一來見我。


    星期一上午，大約十點四十五分，一輛車開到柵門前。我打開大門，歡迎他們一家人進屋。握手後，我們走到廚房，父親介紹自己是德蒙，太太是蘇珊以及兒子尼克。我們在狹小廚房的桌邊坐下，尼克玩著母親帶來的玩具，我開始和父母談話。幾分鐘後，尼克給我一個大大的笑容說：「別說了，媽，讓羅娜請上帝保佑我，告訴我可以把病變好的天使名字，然後我就可以到院子去玩了。」


    父親訓誡他不可以沒耐心，要給我一個機會，但我告訴他們沒問題。「告訴你我們要怎麼做。」我說；「我先爲尼克請求上帝保佑，替他祈禱，詢問天使的名字。尼克，去坐在媽或爸爸的膝上。」尼克坐在爸爸膝上。「我不能保證守護天使會給我他的名字，尼克。所以你要跟我一起祈禱，請求守護天使打開你的心靈。做完之後，就可以到庭院玩，我再跟你的爸媽說話。」


    我看了他一眼，請求上帝爲我展現癌症部位。我看見了，但沒有說出癌症在哪裏，因爲惡化很嚴重。我不禁心想：「喔，神啊，他真的需要奇蹟才能活下去。」突然我心底生出個想法，也許尼克的生命不該延續，也許他此生的目的就是要更靠近上帝，要認識他的天使。我知道這也是他們一家人的生命旅程之一。


    我為尼克祈禱，請求上帝賜予奇蹟使他好轉。尼克的守護天使現身片刻，對我說奇蹟不會發生，請尼克的父母盡量花時間和他相處，時間很寶貴。我不能明白告知尼克的父母真相，他們還無法接受這樣的訊息。此外，我應該告訴尼克天使的名字。


    我為尼克祈禱時，他靜靜坐在父親的膝上。祈禱完後，我給他祝福，他隨即跳下父親的膝蓋說：「告訴我天使的名字！」


    「坐回你父親的膝蓋，我才能告訴你天使的名字，還有他的模樣。尼克，你的天使非常華貴，身上穿著閃爍各種顏色的衣服，頭戴一頂不斷移動的帽子；還有一雙閃閃發亮的美麗綠靴子，那是我見過最美麗的綠色，靴筒有膝蓋那麼高，上面有大大的銀色方形扣環；腰間繫著一條金色腰帶，中央也有另一個銀色扣環。」


    尼克一動也不動坐在父親膝上，目不轉睛看著我。我描述天使模樣時，他的眼中充滿興奮。


    「他的頭髮如火焰般火紅。」我繼續說，「眼睛像星星。左手拿著劍一般的東西，不過那把劍其實是光之劍，會閃閃發亮。你的守護天使要我告訴你，覺得不舒服時，只要發出請求，他就會用光之劍碰你，你便會覺得舒服點。」


    尼克再度跳下父親的膝蓋，並且問道：「現在我可以出去玩了嗎？」


    他的父親帶他到庭院去，單獨和我在一起的母親哭了起來，問道：「天使怎麼說？」


    當父母親問：「天使怎麼說？」而我能給的不是好消息時，我真的很難過。我能說什麼呢？有時候父母會問：「我做錯了什麼？我犯了什麼大罪嗎？這是上帝對我的懲罰嗎？」我必須了解這是生命的旅程，是自己尚未來到世間之前，就已經選好的旅程。


    「看著妳的兒子，」我回答，「看著他所擁有的信念與信心。他並不害怕，既不怕病情是否變好，也不怕到上帝身邊。傾聽妳兒子的話，他會帶來許多訊息。」


    尼克的父親進屋，我和兩人又談了幾分鐘，轉達天使要他們盡量花時間和兒子相處。他們離開後，我仍定期收到他們的消息。只要尼克在醫院，或是感到不舒服，他就會請母親或父親打電話給我，要我請求守護天使用光之劍碰他，讓他好轉。他父母一來電，他的痛苦就會消失。尼克當然也會自己請求守護天使幫助他，不過我發現生病的孩子通常會請父母打電話給我，或許這能加強他們的信心。


    有一回，尼克的病情稍微舒緩，他請父母帶他回來見我，並且堅持單獨會面。我們獨處時，尼克告訴我，他一直和守護天使對話。天使告訴他，不久的將來他就會來帶尼克到天堂去。尼克認為上天堂對他來說不是問題，因為他已經九歲了。他告訴父母自己再過不久就要到天堂去，可是父母說不想聽見這種話。


    尼克說媽媽一直哭。「我告訴媽咪，我不介意到天堂，沒關係的。可是她不肯聽。」


    我問道：「尼克，你希望我跟你爸媽談一談嗎？」


    「是的，妳願意嗎，羅娜？」'
  mdcn: '送，的孩子長大了。


    我目瞪口呆站著，不敢相信這一切。我還沒能開口說話，她已回到車上，車子也啟動了。我在車後喊著：「謝謝你們！」


    我看著車子繼續往上坡開去，車體發出瞬間閃光。我雀躍無比，又笑又跳說著：「謝謝天使，那些人願意傾聽了！」我好開心，打開袋子，裏面有各種適合小男孩的玩具。


    我趕緊上路，先去找肉販吉姆，把袋子寄放在他那裏，才不會讓孩子們看見。在學校等孩子們時，我實在興奮難耐，也等不及找人分享這件事情。等待跟喬分享的這段時間，我幾乎快爆炸。


    回到家，一等孩子們聽不見我們的說話聲，我馬上把事情鉅細靡遺告訴喬。他設法拼湊出那對夫婦是誰，因為他在這一區認識的人比我多，我幾乎誰也不認識。事實上，在最近之前，天使們一直不允許我有親近的朋友，他們似乎需要我維持在隔離的狀態。當然，我有人為伴，但有時候我真希望能有些朋友。


    喬認為我們的大善人可能是一對住在來錫利普的夫妻。就算是，我們也無法去向他們道謝，因為我們實在無法真正確定。


    「你難道不知道這是天使的功勞？」我說。


    他笑了：「謝謝天使。」我也笑了，並且鬆了一口氣。


    不過，聖誕晚餐又是另一回事了。距聖誕節還有兩天，喬和我連買一份小麵包的錢都籌不出來，更別說是火雞。可是天使不斷出現，也一直要我別擔心，因為事情將有轉機，有人會傾聽。


    聖誕節前夕孩子非常興奮，他們等不及聖誕老公公的拜訪。我也一直很喜歡聖誕節，因為這是個美好的日子。在基督教世界中，耶穌基督誕生的日子，也是伸手救濟他人、分享與建立同情心、放下界線、消除怨恨，讓我們與生俱來那份對愛與和平的強烈渴望浮現的時刻。


    我上床時，心底想著沒有聖誕晚餐的事情，但也感謝所有天使付出的努力，並告訴他們我期待看見孩子早上收到禮物時的興奮神情。


    隔天早上，也就是聖誕節當天，孩子們六點就醒來。火爐裏仍有些紅炭，喬要到小棚屋拿柴火，但還沒開門就聽見他叫我，只見他手裏拿著一個信封走回前廳。信封上一片空白。


    喬打開信封的那一刻，室內充滿天使，他們四周的光芒閃爍不停。喬從中拿出兩張二十鎊的紙鈔。我簡直不敢置信，高興得不得了，衝上去抱著喬。孩子們跑來詢問怎麼回事，喬跟我異口同聲說：「聖誕老公公也送我們一份禮物！」結果孩子們也抱著我們的腿。


    想想看，有個人把兩張二十鎊紙鈔放進信封，走路或開車來到小屋，輕聲打開柵門，躡手躡足來到門口，把信封滑進門內！信封送達時一定非常晚了，因為喬和我午夜後才上床睡覺。這是一份完全匿名的贈與，上面既沒有說明，也沒有卡片，他們完全不期待任何回報。


    這真是上天恩賜的禮物，讓我們能有個快樂的聖誕節。我感謝那位送禮的人，感謝他聽見了守護天使的聲音。


    我告訴孩子們，聖誕老公公的名字源自於聖尼古拉斯（Saint Nicholas），這位聖人激發人們的善心，讓人們願意分享禮物。顯然聖尼古拉斯來過這裏，天使們也是。


    在當時，四十鎊是很大一筆錢，足夠買八個星期的食物。我們覺得自己富足得像百萬富翁！喬寫了一張購物清單，包括檸檬汁、小麵包、甜點、一些零碎的東西，最重要的是一隻雞，這樣孩子就能假裝那是火雞了。出門購物前，我們開心地和孩子們玩了一會兒。


    準備好出門參加彌撒後，我走在前往教堂的路上，覺得一切非常美好。走進教堂大門時，我對喬說：「希望店鋪裏有煮熟的雞。」喬的回應讓我笑了出來，他說：「怎麼會在望彌撒時，還想著這樣的事情。」但在彌撒當中，我還是祈禱能有一隻煮熟的雞！我感謝上帝和天使賜與的一切，尤其感謝那位在門底下塞進信封的人。


    彌撒結束後，我們立即前往梅努斯鎮位於緬恩街（Main Street）上唯一一家在聖誕節早上開門的巴利商鋪。從教堂走出來，在轉入緬恩街的轉角時，我看見天使荷賽司站在巴利商鋪的門口，散發著愛的光芒。喬和孩子們走在前面，我在店門口遲疑了一下，荷賽司碰了我的肩膀。我對他說：「謝謝你充滿光芒的愛的禮物。」


    「你聞到烤雞的香味了嗎？」荷賽司說完就消失無蹤。


    店內非常擁擠，大家忙著採買雜貨，互道「聖誕快樂，新年豐足」。喬在一角和老闆娘巴利太太講話。她說她收到一些烤雞的訂單，大多是老人家的要求，我們很幸運，因為她多放了幾隻雞下去烤。


    巴利太太臉上掛著大大的笑容，看得出來她很高興自己多烤了幾隻雞。她的守護天使在她身後短暫現身，我對她點了點頭，靜靜感謝他，也感謝巴利太太的傾聽。


    我們在鎮上四處走走，逛著櫥窗，逗弄兩個男孩，露絲則在娃娃車中熟睡。回到店鋪時，烤雞的香味美極了。巴利太太說我們時間拿捏得很準，因為她才剛把雞從烤箱取出來。她包好一隻雞，放進袋子，也把清單上的其他雜貨放進盒子裏。喬付了錢，謝過她，祝她聖誕節快樂。


    喬拿著盒子，我提著暖烘烘的袋子回到小屋。喬到廚房把雜貨和雞放在桌上，幫忙拿出甜點、小麵包和檸檬汁，感覺像是一場饗宴。


    我查看一下烤雞，轉身對喬說：「我真不敢相信，這裏面還有餡料！巴利太太真是好心，不僅在聖誕節早上烤雞，還在裏面塞了餡料。」


    晚餐準備好，我們點上蠟燭，烤雞也擺上桌。這是一頓美麗的大餐，烤雞比我以前和之後吃過的任何火雞還更美味。我們度過一個美好的聖誕節。


    接下來幾個月天氣很冷，甚至下起雪。我們到院子裏丟雪球，孩子們堆起雪人，我看著小兒子歐文滾著雪球，一位天使對著我耳語，但並未現身。


    「是你嗎，天使荷賽司？」我問道。


    「不，我是歐文的守護天使。」天使回應道，仍然沒有現身。「看著妳的兒子，我要為妳展現影像。」


    這個時候，歐文喊道：「媽咪，看我的雪球。」他哥哥克里斯多夫跑過去幫忙，很快的，雪球滾到幾乎和歐文一樣大。「你的雪球已經夠大，可以做雪人的身體了。」我邊說邊轉身要走回小屋。「現在，只要再做一個足球大小的雪球當頭，用石頭做眼睛和嘴巴，再拿胡蘿蔔做鼻子就可以了。」


    這時候歐文的守護天使喊著：「妳要去哪裏，羅娜？」我以爲守護天使只是要我看著兩個男孩滾動巨大的雪球。我轉回頭，看見了他。歐文的守護天使現身在我面前。他非常高，眼睛散著祖母綠的光芒，滿臉笑容，彷彿在說：「看看妳不聽我的話，差點就錯失了什麼，羅娜。」他身穿鎧甲，鎧甲看起來非常細緻，散發銀色光芒，可是沒多久顏色就變了，變成熱焰一般的光芒，和四周的白雪形成強烈對比。他的雙腳似乎深植在積雪中，而且在雪中發光，但我知道他的腳並沒有真的觸碰到地面或積雪。光這樣看著歐文的守護天使，已經讓我感到非常快樂。


    「羅娜，看著妳的兒子。」天使才說完話，歐文就站起來推著巨大的雪球，同時轉身給我一個笑容，滿臉驕傲的模樣。接著，我看見一團相當壯觀美麗的能量從歐文的胸膛浮現出來，能量不斷漲大，彷彿逐漸形成一面盾的模樣，但最後卻變成美麗的心形。這顆心充滿生命，呈現出河水匯流時的翠綠和湛藍色彩，而且就浮現在我小兒子的胸前，和他的胸膛連接著。我非常震驚地望著，因爲那美得教人難以呼吸。


    「那是什麼意思？」我問道。


    我察覺到歐文的守護天使站在左邊，手搭在我的肩上，我想轉身面對他，但他要我別轉頭，我聽話照辦。他繼續說：「這顆心象徵生命的盾牌，是生命與愛的給予者，是大地和是非的保護者。」


    我笑著對天使說：「對大人來說，那都是很大的責任了，更何況是個孩子。」


    我請求歐文的守護天使在他的人生旅程上引導他、保護他。


    「羅娜，歐文長大後，可以告訴他妳今天見到的影像，可以告訴他我是天使塔非克斯（Taffikis）。」


    我看著歐文和哥哥推著另一顆雪球，看著他胸前的心逐漸縮小，感覺到天使塔非克斯的手不再停留在我肩上。有那麼一瞬間，我看見塔非克斯站在歐文身邊，後來歐文跌坐在地上，笑著喊我過去幫忙。


    ## 22 撒旦在門口


    多年前，在湖畔野餐時，天使以萊亞曾經說過，上帝要在撒旦面前測試我。有一天，以萊亞再度來訪，告訴我撒旦就快來到我身邊。


    > 「我感覺得到他越來越接近。」我非常驚恐，也為自己和孩子擔憂。

    > 「不要害怕，」以萊亞對我說，「證明妳對上帝的信心。」


    自從和以萊亞在湖畔對話後，我一直覺得撒旦向我行來，具體情況不容易說明。想想看，他距離我幾百萬公里時，我就能感覺到他的存在，然後越來越接近，只剩下幾千公里、幾百公里。自從以萊亞說撒旦將走近我身邊，至今已經過了許多年，但我能感受到他持續不斷靠近。如今以萊亞已證實撒旦就快抵達。


    隨著撒旦越來越接近，有天大約正午左右，天使米迦勒、荷賽司和我所有的天使全都出現，在我面前圍成半圓，要幫助我阻擋來自撒旦的巨大邪惡感。接著，天使消失，再也看不見他們。我走回小屋，把前門關上時，心裏知道撒旦已經站在柵門前。我感到非常寒冷，幾乎要凍僵，生命的元氣彷彿正從體內流失。那感覺就像是站在鐵軌上，面對一輛迎面飛快駛來的火車，卻被告知只要有足夠的信心，火車就會在面前及時煞車。我不斷想起以萊亞的話：證明妳對上帝的信心。


    撒旦肯定在柵門前站了好幾個星期，我則持續進入恍惚狀態，迷失在時間之流中。有一晚床睡覺時，我知道他已經來到前門。撒旦的力量強大到難以置信。我召喚天使，可是他們沒有回應。喬和孩子們在臥室裏熟睡著，一定是上帝和天使讓他們進入深層睡眠。


    我坐在床上抱著膝蓋，毯子拉高到頸部，害怕得直發抖，就這樣坐了好一段時間。然後，所有的天使們，包括荷賽司、米迦勒和以萊亞現身在我面前，圍繞著我，要我別害怕，接著又突然消失。


    我能感覺到撒旦的存在進入屋內，朝臥房走來，他一抵達，臥房裏的一切，包括喬和孩子都消失了，彷彿融入黑暗之中，連我所坐的床也不見。我被隻身留下來面對撒旦。


    撒旦的力量讓我非常恐懼，那是一種全然的邪惡與恐怖，令人毛骨悚然。我不知道他是否為男性，也不知其長相如何，感覺上是一團惡的、黑暗的、強大的力量。他有極大的信心，而且絲毫沒有恐懼。


    接著，上帝走進黑暗之中。就如同在祈禱會中那樣，他以年輕人的模樣現身，穿著耀眼的白袍，臉上散發著光芒，深色頭髮長及肩膀。他站在我的右邊，伸出手臂握住我的手。有上帝的存在站在右邊，我得到了力量。我知道上帝讓撒旦不敢逾矩，阻止他進一步靠近，但是我仍然驚恐不已。這一生中，我不曾如此驚恐害怕，全身顫抖不停。


    我坐在床上，撒旦在我的左邊，那是一片巨大的黑暗，巨大的邪惡，而上帝就在我的右邊。我無法清楚看見撒旦，因為他是一團黑暗，但我能清楚看見上帝。當我看著上帝，恐懼便消失；可是看著撒旦時，恐懼再度升起，甚至更爲強烈。


    我察覺到這是上帝對我的測試，要我展現出自己無畏於撒旦，展現出我比撒旦更堅強，而且能夠將他推離。上帝的存在碰了我的手，給予我推開撒旦所需的力量。於是我連續三次大聲說：「撒旦，走開，我選擇上帝而非你，我比你更堅強！」


    我每說一次，他就往後退一些，第三次時，他已經退到臥房外。接著，上帝把他推離到屋外、推到整個地區之外，彷彿推入一個漫長而黑暗的隧道，進入虛空。那一天，我向上帝證明我具有將撒旦推開的信心。


    撒旦確實存在，我對此毫無疑問。一旦允許撒旦進入我們的生活，他一定會出現。他會像「神」一樣，讓生命中出現許多極棒的事情，也許是財富，也許是外在的成功，但代價卻深刻無比。撒旦不希望我們的靈性持續成長，因此會妨礙所有願意幫助他人打開心胸、以不同角度看待世界的人。


    人類的靈性正在演化之中。這是人類演化的一部分，使身體和靈魂能夠結合，到最後達到身靈合一的境界。我看見人越來越不受制約，充滿疑問，而且更有探索靈性本質議題的意願。我們在生命中將面對上帝給予的測試，這是靈性成長的一部分。我們全都擁有將撒旦推開的能力，這是絕對不可忘記的事情。只要把撒旦推開，他就會往後退一步，別無選擇。不幸的是，他仍將存在，不過力量將會衰退。我們隨時能召喚上帝和天使來強健我們的手，強化我們的信念和信心。


    喬的糖尿病變成慢性病。他經常昏倒或感到疲倦衰弱，有時候克里斯多夫會從庭院衝進屋裏，喊著「爸摔倒了」。這對喬、對我們都是一段困難的時光。多數的糖尿病患者對藥物治療都有反應，可惜喬的案例沒那麼簡單，儘管醫生已經盡力，還是無法控制病情，而且他的病情已影響到心臟。自從被診斷出糖尿病後，喬就不曾再出門工作，他曾經應徵梅努斯學院的守衛，如果能被錄取，對我們就相當方便，因為離家很近。可是他們在最後一刻卻基於體檢的結果，沒有錄用他。這使喬極度失望。


    喬經常進出醫院，有一回護士建議我們也許應該在小屋安裝電話。六個星期後，電話安裝好，這要感謝地區醫療當局的協助。不過我只用來打緊急電話和接聽，因為怕費用太貴。電話裝好後不久，孩子們在庭院裏玩耍，有輛車開了進來。當時我正在後院整理一個棚子。（我們花很多時間在庭院裏，養了幾隻雞，鄰居還送我們一隻小狗。）這一天，我聽見有個男人喊著：「哈囉！」我走出來打招呼，他正要下車，車裏還坐著一位女士和小孩。他問我他是否走對了地方。我笑著說：「我不知道，你要找誰呢？」


    「找療癒者，」他回答，「我太太人不舒服。」


    我面帶微笑，但是心中並無把握，雖然知道他找的人是我，可是在此之前，我不曾被這樣稱呼過。事實上，被稱爲療癒者，讓我侷促不安，我覺得自己不夠好。但我深呼吸一口氣後說：「是的，你走對了，請進。」


    我們走進廚房，他們介紹自己是芬頓、佩格和兒子艾蒙。小男孩在庭院裏和我的孩子們、雞和小狗一起玩耍。這是第一次有人到小屋尋求我的協助，我始終不知道是誰把他們送來找我，或者告訴他們我是個靈療者。但他們是諸多求助者中的第一人。


    許多年後，我再度遇見芬頓，他說當初看見那棟有孩子、小狗和雞的小屋時，就知道自己來對地方。他同時也告訴我，會面之後，妻子的健康有了大幅改善。


    有一天我接到一通名爲喬西的女性來電，有人把我的號碼給了她。她的兒子被診斷出癌症，因此想尋求我的支持。她還請我看看另一個家庭，他們的兒子也得了癌症。我安排那個家庭在隔週星期一來見我。


    星期一上午，大約十點四十五分，一輛車開到柵門前。我打開大門，歡迎他們一家人進屋。握手後，我們走到廚房，父親介紹自己是德蒙，太太是蘇珊以及兒子尼克。我們在狹小廚房的桌邊坐下，尼克玩著母親帶來的玩具，我開始和父母談話。幾分鐘後，尼克給我一個大大的笑容說：「別說了，媽，讓羅娜請上帝保佑我，告訴我可以把病變好的天使名字，然後我就可以到院子去玩了。」


    父親訓誡他不可以沒耐心，要給我一個機會，但我告訴他們沒問題。「告訴你我們要怎麼做。」我說；「我先爲尼克請求上帝保佑，替他祈禱，詢問天使的名字。尼克，去坐在媽或爸爸的膝上。」尼克坐在爸爸膝上。「我不能保證守護天使會給我他的名字，尼克。所以你要跟我一起祈禱，請求守護天使打開你的心靈。做完之後，就可以到庭院玩，我再跟你的爸媽說話。」


    我看了他一眼，請求上帝爲我展現癌症部位。我看見了，但沒有說出癌症在哪裏，因爲惡化很嚴重。我不禁心想：「喔，神啊，他真的需要奇蹟才能活下去。」突然我心底生出個想法，也許尼克的生命不該延續，也許他此生的目的就是要更靠近上帝，要認識他的天使。我知道這也是他們一家人的生命旅程之一。


    我為尼克祈禱，請求上帝賜予奇蹟使他好轉。尼克的守護天使現身片刻，對我說奇蹟不會發生，請尼克的父母盡量花時間和他相處，時間很寶貴。我不能明白告知尼克的父母真相，他們還無法接受這樣的訊息。此外，我應該告訴尼克天使的名字。


    我為尼克祈禱時，他靜靜坐在父親的膝上。祈禱完後，我給他祝福，他隨即跳下父親的膝蓋說：「告訴我天使的名字！」


    「坐回你父親的膝蓋，我才能告訴你天使的名字，還有他的模樣。尼克，你的天使非常華貴，身上穿著閃爍各種顏色的衣服，頭戴一頂不斷移動的帽子；還有一雙閃閃發亮的美麗綠靴子，那是我見過最美麗的綠色，靴筒有膝蓋那麼高，上面有大大的銀色方形扣環；腰間繫著一條金色腰帶，中央也有另一個銀色扣環。」


    尼克一動也不動坐在父親膝上，目不轉睛看著我。我描述天使模樣時，他的眼中充滿興奮。


    「他的頭髮如火焰般火紅。」我繼續說，「眼睛像星星。左手拿著劍一般的東西，不過那把劍其實是光之劍，會閃閃發亮。你的守護天使要我告訴你，覺得不舒服時，只要發出請求，他就會用光之劍碰你，你便會覺得舒服點。」


    尼克再度跳下父親的膝蓋，並且問道：「現在我可以出去玩了嗎？」


    他的父親帶他到庭院去，單獨和我在一起的母親哭了起來，問道：「天使怎麼說？」


    當父母親問：「天使怎麼說？」而我能給的不是好消息時，我真的很難過。我能說什麼呢？有時候父母會問：「我做錯了什麼？我犯了什麼大罪嗎？這是上帝對我的懲罰嗎？」我必須了解這是生命的旅程，是自己尚未來到世間之前，就已經選好的旅程。


    「看著妳的兒子，」我回答，「看著他所擁有的信念與信心。他並不害怕，既不怕病情是否變好，也不怕到上帝身邊。傾聽妳兒子的話，他會帶來許多訊息。」


    尼克的父親進屋，我和兩人又談了幾分鐘，轉達天使要他們盡量花時間和兒子相處。他們離開後，我仍定期收到他們的消息。只要尼克在醫院，或是感到不舒服，他就會請母親或父親打電話給我，要我請求守護天使用光之劍碰他，讓他好轉。他父母一來電，他的痛苦就會消失。尼克當然也會自己請求守護天使幫助他，不過我發現生病的孩子通常會請父母打電話給我，或許這能加強他們的信心。


    有一回，尼克的病情稍微舒緩，他請父母帶他回來見我，並且堅持單獨會面。我們獨處時，尼克告訴我，他一直和守護天使對話。天使告訴他，不久的將來他就會來帶尼克到天堂去。尼克認為上天堂對他來說不是問題，因為他已經九歲了。他告訴父母自己再過不久就要到天堂去，可是父母說不想聽見這種話。


    尼克說媽媽一直哭。「我告訴媽咪，我不介意到天堂，沒關係的。可是她不肯聽。」


    我問道：「尼克，你希望我跟你爸媽談一談嗎？」


    「是的，妳願意嗎，羅娜？」'
