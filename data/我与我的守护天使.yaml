  md: '不會啊，他們說過你要來。」我回道。

    我四處張望，這才察覺到平常跟在身邊的天使都不見了，只剩下我自己的守護天使。

    「他們去哪裏了？」我問。

    「只是離開一下。」他說，「現在我要握著妳的手，羅娜。」他伸出手，我把手放在他的手上，感覺我的手好像要消失在他的手中，變成他手的一部分。「我不想讓妳感到害怕，」他說，「因為沒什麼好怕的，這是妳長大後可以期待的事情，將會發生在妳身上。」

    「為什麼我現在就需要知道呢？」我問。

    他並未回答我的問題，只是說：「妳將看見一個人，我們會告訴妳這個人的一切。」

    接著，前方河面中央彷彿有面布幕被拉開般，出現巨大的螢幕，我在上面的靈視影像中，看見一條兩側都是樹木的街道，而我似乎坐在路底。有個人影從遠方穿越樹木，沿著街道走來。我望向一旁的以萊亞說：「我看不清楚。」

    「繼續看！」他說。

    人影更靠近後，我看見有著一頭紅髮、身材高挑、面貌英俊的年輕人。以萊亞又開口說：「妳現在可以清楚看見他了。」

    我轉頭看著身旁這個天使，對他點點頭。

    「繼續看，記住他的模樣，因為我們不會讓妳再看一次。我要說的是，妳以後將和這個年輕人締結連理。當妳第一次看見他，就能因為目前這個影像而認出他，不過那是多年後的事了，妳得先長大才行！」'
  merge: -1
  pgno: 59
- img_proc: true
  md: '想到戀愛或結婚的事情，我不禁咯咯笑了。我問以萊亞：「他現在就這麼大了嗎？」

    「不，」以萊亞回答，「他現在也是個小孩，比妳大幾歲而已。」他繼續說：「妳和他在一起會過得很開心，他愛妳，妳也愛他。你們將一起度過盛衰沉浮的日子，有美好和不太美好的時光，還會擁有健康的孩子，每個孩子都非常獨特。但到最後，妳必須看護他，上帝不會讓他留在妳身邊一輩子，你們無法一起終老。」


    我轉身看著以萊亞，問道：「以萊亞，你說看護他，是什麼意思？」

    「他的健康狀況不是很好，」以萊亞回答，「有一天上帝會把他帶走，而那時候他還相當年輕。」


    「我並不想知道這件事。」我說。


    可是以萊亞繼續說：「羅娜，別生氣，我們只是想讓妳記住，讓妳變得堅強，以準備好面對未來。只要想想你們將會擁有愛和幸福的時光就好了。看看他有多帥氣，妳自己也這麼說。」


    我再看了一眼，而且看得很清楚。「是的，他長得很好看。」

    影像消失後，以萊亞問道：「妳能記住這一切嗎？」

    「可以。」我回答，「我會記住。我了解他無法永遠和我在一起，而我必須看護他。」


    雖然我的年紀還小，但我轉身對以萊亞說：「我會堅強的。」

    以萊亞牽著我的手，站起身。我們走了一段路，然後他停下來說道：「現在不用想太多，把這件事放在心底就好，發生的那一天，妳會認出他來。」'
