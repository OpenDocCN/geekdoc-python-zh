  md: '隙，而他非常不想再加深那道嫌隙。


    我了解爸爸為何沒有挺身護衛我，但心裏仍然非常難過，那晚我躺在床上傷心欲絕。


    多年後我意外發現口吐惡言的外婆，曾經生下一個唐氏症寶寶，那個寶寶的心臟不好，只活了六、七歲。而她在短短的人生歲月裏，一直被關在樓上房間裏，和所有鄰居隔絕。據說生了一個「智障兒」，讓外祖父母感到很羞恥。


    隔天早上我開始陣痛，小女兒露絲在三月二十五日，也就是母親節和我的生日那天問世，這真是一份美好的生日禮物。


    出院那一天，喬帶著克里斯多夫和歐文前來。兒子們跑到我床邊，喬卻慢慢走來，身邊滿是天使支撐著他。他的守護天使上前來告訴我喬身體不適，我很想哭，但我知道自己必須要笑。克里斯多夫和歐文正忙著和新妹妹玩，爭相抱她，喬把小女兒從搖籃裏抱起來，讓小哥哥們把手環抱在她身上。我問喬身體是否安好，他說沒有問題，但我知道那不是真話，他也很清楚。我告訴天使我很擔心，請求他們盡力協助喬。


    兩個月後的某一晚，喬上夜班時，腹部突然一陣劇痛。他跟老闆說身體不舒服，請他找人送他回家。


    「不行，你看起來很好。」老闆要他回到崗位繼續工作。


    問題就在喬長得又高又壯，外表上看起來往往不像生病。不過最後他仍然跟老闆告假，'
