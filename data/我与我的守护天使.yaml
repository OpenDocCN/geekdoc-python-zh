  md: '厚，故事太長，就得分成幾週來念。我最喜歡的故事之一是法蘭西斯·霍森·柏納（Frances Hodgson Burnett）所寫的《祕密花園》（A Secret
    Garden）。


    我們的庭院裏有個很大的木造鞦韆，爸爸修理過後能盪得很高，每次我都玩上好幾個小時。坐在鞦韆上時，天使教了我許多關於生活與生命的簡單課程。事實上，我人雖然在鞦韆上，神魂卻早已去了另一個世界，在那裏，天使們爲我展現各種美好而神奇的事物。


    當我獨自盪鞦韆時，天使有時會說：「羅娜，伸出妳的手，有東西給妳。」然後在我手上放一個微小的東西，小東西一觸碰到我的手掌，天使就把手收回去，掌心上於是出現一團光。光時而像個小星星，時而像朵小雛菊，沒多久即開始長大，發出亮黃色的光芒。接著，從掌心飄起，越升越高，越來越亮，把太陽也給半遮蔽了，讓我不眨眼睛直視太陽，也不覺得刺眼。最後我看見一幅極度美麗的景象反射回來，就像一面鏡子一樣，影像裏出現一張像人類的漂亮臉龐對著我微笑。


    第一次經歷這個景象時，天使告訴我那是天使皇后。他們用小朋友能懂的語言對我說話，讓我想起精靈的故事，知道皇后如同母親，就像媽媽是我家的皇后一樣。天使解釋說，這個人是天使皇后，是宇宙之母、萬物之母，是所有天使之母。突然間，環繞著這張臉的黃色光環爆炸成數不盡的小碎片，感覺像從太陽中散發出來的金黃色極光。


    多年來，天使經常爲我帶來這份禮物，我成年後亦然，尤其是在我需要信心的時候。'
