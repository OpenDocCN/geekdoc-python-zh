  md: '大人嚴禁我們走近疊得高高的毀損車體堆，但我還是決定去看看，喬西跟在我身後。我

    跟著天使穿越車陣，還記得自己一路不斷說著：「請求上帝、請求天使，請讓她的爸爸平安

    無事！」


    我們找到了喬西的父親，一輛車子壓倒在他身上，到處血跡斑斑，不過他還活著。我記

    得自己跑去求救，喬西應該是留在原地。我不確定去了她家還是我家。大家都跑來幫忙，我

    們則被帶開，因為把車子抬起來時，我們不可以在現場，但我記得救護車來了，聖詹姆斯醫

