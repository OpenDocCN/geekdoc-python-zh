  md: '我一直不明白為什麼父母不願協助餵養小鷹，至今仍困惑不已。連不認識的陌生人都肯幫我忙，我的父母卻不願意。媽媽煮飯時，我會去看看是否能要到一點生肉，只要一小湯匙就好，卻惹來媽媽怒斥。我即使願意讓出自己的食物來餵牠，媽媽也不准，弄得我到最後只得去求別人。我總是認爲，假使是其他兄弟姊妹養牠，牠就不會被排斥。我的處境真的很困難。即使如此，牠還是得到食物，逐漸長大茁壯。


    有一天我很悲傷，荷賽司安慰我說：「我們知道有時候妳覺得心情沉重，因為妳還小。但是妳要記得，上帝讓妳與眾不同，一輩子皆如此，因為妳有特殊的使命。」


    我回道：「可是我並不想要啊，為什麼上帝不挑別人來做呢？」


    荷賽司只是對我笑了笑。「有一天妳自己會明白。」


    「我很害怕，很想哭。」


    「妳必須哭泣，因為靈魂要得到自由，正需要妳的眼淚。」


    當時我一點也不懂他的意思。


    奶奶和許多人一樣，也認爲我在某些方面是智障，所以她很少跟我說話。但有一天她說了一些，讓我得知她和家人的許多故事。那天，她邀我幫忙打掃她的臥房，這是她前所未有的舉動，在這之前我只到過她的臥房一、兩次，而且僅是看看而已，什麼也沒碰。但這次她是邀我去幫忙打掃呢！'
