  md: '某位在他出世前已經死去的往生者。那孩子或許有些訊息要傳遞給父母。

    孩子們是智慧的泉源，具有來自其他世界的智慧，我們應該經常傾聽他們的話語。


    來找我的人越來越多。這時候，喬的健康狀況每況愈下，幾乎足不出戶，有人來訪，就會躲起來。他是個自尊心很強的人，不想讓人知道他病了。來拜訪我的人不知道他生病，也不知道我的生命狀況，或者我要面對一位重病的丈夫，更不知道天使說他無法長久陪在我身邊時，我所要面對的困難。


    有位女士來拜訪我，希望天使能介入她的生活。那是一位醫學院的學生瑪麗安，她說自己壓力很大，無法應付考試。「我聽說妳能和天使對話。我相信上帝，我有信心，我也相信天使，但我現在真的非常需要幫忙，因為我面對的壓力極大，我怕自己會崩潰。」


    瑪麗安正在習醫，即將完成學業，但她極度害怕期末考失敗。她渴望成為一名醫生，而且知道自己會是個好醫生，但覺得養成過程非常難熬。我告訴她，她的信心與信念已經幫助她度過困難時期，上帝已經派遣天使來給她力量，幫助她突破困境。我們向上帝和天使祈禱，請他們派遣天使來教導她通過考試，引導她成為一位具有靈性、愛與關懷的醫生。

    我們都有守護天使隨侍在旁。身為你靈魂的守門員，守護天使可以允許其他天使來到你的生命中，幫助你面對各種困難。我稱這些天使為老師，他們來去頻繁，也跟守護天使不同。我們請求一群天使來擔任她的老師。在祈禱當下，我已經看見三位天使朝她大步走來，'
