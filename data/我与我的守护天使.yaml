  md: '棒的老爺車，經過改裝後他也能支著肢趴趴走。抵達的第一晚，爺爺讓我看一隻從鳥巢摔落的小燕子，他把小燕子放在鞋盒裏，用滴管餵食。另外他還找到一些鳥蛋，幫忙保溫，希望可以孵出小鳥。爺爺看起來很虛弱，彎腰駝背。那晚我注意到環繞他周身的光芒比其他人微弱許多，似乎非常昏暗，難以辨認。但在當時我並沒有想太多。


    奶奶蓄著灰色短髮，身材嬌小，面容姣好，且體態優雅。她辛勤工作，保持旅社的潔淨，也是很棒的廚子，每天花很多時間在廚房裏烤黑麵包、蘋果塔，以及各式各樣美味的菜餚。事實上，爺爺奶奶大部分時間在廚房度過，所以那裏始終瀰漫新鮮的烘焙味道。我最喜歡坐在廚房的桌邊和他們一起喝杯茶，吃塊熱騰騰的黑麵包。


    那棟大房子實在很棒，走出廚房後有一道長廊，放滿了盆花。在夏天，也就是我們造訪的時間，長廊裏隨時擺滿五顏六色的花。長廊底是間玻璃溫室，除了有更多奶奶栽種的花之外，並沒有其他東西。不過我很喜歡溫室，經常花很多時間在裏面和天使說話。


    庭院也非常迷人。馬車房四周的小庭院裏有許多燕子築巢，還有個小柵門，我從來不開柵門，反而喜歡直接爬過去。門另一側是個種有大樹和美麗花朵的花園，花香芬芳，園裏還有兔子和小鳥。坐在某棵大樹傾斜的枝幹上，偶爾還能看到黑鶇鳥巢裏的小雛鳥。花園外面就是田野和開闊的鄉間。我非常喜歡花園，覺得在裏面很安全。


    從第一天抵達蒙夏南開始，我就經常溜出門，走很遠的路散步去，似乎沒人注意到或者在乎我去了哪裏，我也很擅長不引人注意。多數時候，對大人來說，我就像是不存在。有時侯我甚至認爲要是自己真的不存在，他們還更快樂些。不過我不太確定那是因爲我感覺得到'
  merge: -1
  pgno: 44
- img_proc: true
  md: '他們的想法，或是多年來聽到太多關於我的說法。我還很小的時候，有一回聽見鄰居跟媽媽說我很幸運，沒被關起來，順便把鑰匙丟掉。她那樣說時，媽媽既沒回應也沒為我辯護。


    我會走上幾公里路，穿越泥沼、樹林，走過牧草地，沿著夏南河畔一路前去，從來不曾感到孤獨，因為我會和跟在身邊的天使說話，觀看與傾聽鳥兒和動物的聲音。一旦天使偶爾說：「腳步輕柔，安靜地走。」前面就會出現某種東西讓我觀看。記得他們領我去看一窩小兔子玩耍，我完全入了迷。小兔子沒有跑開，我也就近坐著，好幾個小時一直看著牠們。我知道有些日子我肯定走了好幾里路，但未曾迷路或發生意外。現在想想當初我做過的事，跨越馬路、河流、泥沼和四處是牛隻的田野，不禁訝異自己竟沒受過傷害。其實答案很明顯：上帝和天使一直把我捧在手掌心。天使讓我笑、讓我哭，是我擁有的最好朋友，是我的一切。有一天我又溜了出去，一個天使突然現身，拉住我的手臂。「來吧，羅娜，我們有東西要給妳看，妳一定會喜歡。」


    然後走過田野時，我轉身面對天使，大笑說：「打賭我肯定跑贏你們。」我們使出全力往前衝，結果我摔倒，割傷膝蓋，哭了起來。


    「並不嚴重，只是小擦傷而已。」我的天使說。

    「嗯，對你來說是小擦傷，對我卻是個大擦傷。我覺得很痛，你知道那很刺痛耶！」他們只是笑了笑，然後說：「走吧，快起來，我們要讓妳看個東西。」'
