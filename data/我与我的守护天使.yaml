  md: '馨,因為我們的好鄰居伊麗莎白在火爐裏生了火。爸爸離開前邀請我們在聖史蒂芬日(譯註:十二月二十六日)回家吃晚餐,約好中午十二點來接我們。克里斯多夫和喬一起目送外公開車離去,然後關上柵門。他們進屋時,我正舒服地坐在火爐邊。克里斯多夫夫坐在我的膝上,我抱著他,喬為我們泡茶。我實在不太記得那個聖誕節,也不知道喬是如何應付一切,只記得聖誕夜我抱著克里斯多夫坐在火邊,然後在聖史蒂芬日到爸媽家,我感到很不舒服,請爸爸帶我回醫院。


