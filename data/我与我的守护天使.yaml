  md: '「我很擔心讓你們看見屋內狀況有多差。這裏已經閒置很久，原本的屋主柯斯特洛老太太很久以前過世了。」她說。


    「沒關係的，伊麗莎白。」我說。我們一起察看各個房間。


    「我們很快就會把屋子整理好，努力洗刷、撕下壁紙、換掉地毯、清除舊家具，」喬四處張望著，「也許還能留下某些舊家具，餐桌看起來還堪用，那些手扶椅和斗櫃也還好。」


    事實上我們沒有家具，而且沒什麼錢可花，所以打算能留就留，也接收別人給我們的舊家具。


