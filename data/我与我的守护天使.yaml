  md: '事情。他展開走向上帝的旅程，也就是從人類世界進入靈性世界的過渡期。不論宗教信仰為何，不論是否相信上帝，每個人終將走上這個旅程。對某些人來說，這是個短暫的旅程，對其他人來說，則是個長途旅行，要花上好幾年，甚至一輩子來完成。


    有一回爸爸邀請我們全家星期天一起去都柏林參加重生基督徒家庭祈禱會。喬和我異口同聲說好。


    當天稍晚，我到運河邊散步，孩子們跑在我前面玩耍，因此我有點獨處的時間可以和天使談話。我說：「哈囉，天使們。」卻邊說邊笑了起來，因為他們搔我癢，輕扯我的頭髮，我全身一陣酥麻。我請天使告訴我，爲何要花這麼久的時間才能參加這個祈禱會。自從那位來自都柏林重生基督徒祈禱會的傳教士，在媽媽家建議她帶我們參加星期天的聚會至今，已經過了好幾年。


    天使們齊聲回答：「要記得，羅娜，妳正和父親分享非常靈性的層次，也就是靈魂的夥伴關係。妳父親內心感受到想要和妳分享這個祈禱會的需求。時機成熟了。」


    歐文喊道：「媽咪！」天使像一道閃光般消失無蹤。


    我朝他們走去，兩個男孩站在一起，面帶微笑，露絲在娃娃車裏熟睡著。從他們的表情看來，我知道他們看見了某些東西。


    「什麼都不要說。」我說。


    「我不會的。」克里斯多夫回道。


    那天我們玩得很開心，餵過鴨子後就回家。'
