  md: '坐在沙發上，打開電視看新聞，在漫長的工作結束後放鬆自己。偶爾我會看著他，但從未告訴過他我能看見他身邊的天使，或環繞著他的能量場。有時候他的能量會嘆一口氣，然後往下沉（我只能這樣形容）。他坐在沙發上時，媽媽從廚房端來晚餐，放在小木桌上，讓爸爸邊吃邊看電視。這一晚，他開口問我：「妳想不想跟我一起到加油站工作？先試試看妳喜不喜歡，至少這是個開始。」


    我開心得想要親吻爸爸，不過，一如往常，我保留了我的心情。爸爸是個好人，在許多方面都接受了我，我也總覺得他早就知道某些事情，只是沒法說個清楚。不過從很小的時候天使就一直提醒我，我很有可能被當作有精神障礙而被關起來；他們一直告誡我，要是父母覺得我不對勁，就會把我送到精神病院。為此，我從來不敢對爸爸有過度的情緒表現，在他身邊時，舉止行爲總是特別小心。


    幾天後，我開始工作。上班的第一天，我吃過早餐，和媽媽道別後，就上車跟爸爸到加油站去。加油站叫做葛斯夫諾（Grosvenor），位於都柏林郊外的羅斯曼地區（Rathmines），坐落在繁忙的交叉路口上，左右各有一條主要道路，地點絕佳。加油站本身是一棟老舊的大房子，前面有四座汽油幫浦、一座柴油幫浦、一組打氣管和一個水龍頭。整個地方又臭又濕，簡直要四分五裂，讓我想起舊克爾麥罕的老房子。房子本身一部分做為辦公室，一部分用來銷售輪胎、爆胎維修組件、電池和其他重要的汽車零件，還有一間是用來修補爆胎的車庫。


    上班的第一天我非常興奮，也很緊張，害怕自己做了什麼蠢事或傻事而讓爸爸失望，我不想讓他失望。但我其實不用擔心，因爲每個人都很和善，也很熱心幫我，當然，天使也伸'
