    魂。」她對我笑了笑，沒對這件事再多說一個字，始終沒有。我多麼想要告訴她我看見的一切，和她分享我感受到的痛苦和喜悅，問問她又看見了什麼、感受到什麼，但是天使告誡我不可以這麼做。我始終覺得奶奶明白我看見的世界比別人更多，但她從未對我多說什麼。奶奶起身繼續打掃，做完後就走出臥房，我也跟著出去，把門帶上。


    奶奶回到廚房，我則跑到浴室去祈禱。

    「感謝上帝和天使們，請求你們幫助奶奶，她正處於悲傷與痛苦之中。」


    那個夏天，我又得知更多關於美莉的遭遇。一個風和日麗的下午，爺爺在馬車房為車子打蠟，我朝裏面偷窺了一下，爺爺要我去幫他端杯茶來。回來時，他要我和他在院子裏坐下。我們看著燕子飛來飛去，忙著為巢裏的雛鳥找食物。很難得能這樣和爺爺坐在一起，在這之前，我只在抵達的第一天，幫他餵小燕子時和他說過話。這次感覺很不同，我問天使：「怎麼回事？」


    「注意聽就好，」天使說，「他需要告訴妳美莉的事，和帶她到醫院的經過。」

    爺爺對我描述了那天的景象。


    「那天很冷，但陽光高照，奶奶把美莉穿戴好準備出門。美莉生病了，我們知道必須趕快送她到醫院。我牽出腳踏車時，整個人也在顫抖，因為我明白那車騎不了三十多公里路，可是我們別無他法，沒有人有馬或貨車能借，也沒人陪我一起上路。」

    他低頭對我笑。「羅娜，妳是第一個聽我說這些話的人。」


    「我在腳踏車後座綁了一個袋子，裏面裝有三明治、蘋果和一罐水。」他繼續說道：「我'
  - '[PAGE 51]


    跟來，他們倆也還只是小寶寶而已。我從她手中抱過美莉，設法將她放在腳踏車的橫桿上，緊緊靠在我胸前，隨即踩著車上路。我甚至無法回頭跟她奶奶道別，因為抱著美莉，還要用我的木頭腿踩動車子，實在很困難，說是推著車而非騎車也不為過。我騎了很遠一段路，中間停下很多次，用手指餵水給美莉喝，她根本無法吃東西，甚至無法正常喝水。她若試著吃東西，可能會導致喉嚨裡的腫塊移動而死去。幾個小時後，應該差不多是午餐時間，我覺得好餓，停下來吃三明治，喝了點水。然後又騎了一段路，腳踏車卻爆胎，報銷了。我拋下車，抱著美莉步行。我緊緊抱著她，感覺到她的心跳與呼吸是那麼短淺。走到醫院時，天色已黑，他們似乎知道我們來了。我筋疲力竭走上醫院的階梯，就在幾乎無法再往前踏出一步時，一位護士走來，把美莉抱了去。並不想和她分開，可是只能坐在椅子上等待。一位醫生告訴我，他們隔天清晨就會為她開刀。


    他看著我，眼裡充滿淚水，說：「但還是太遲了！」


    美莉被帶往開刀房時，移動到喉嚨裡的腫塊，因此窒息而亡。爺爺轉身對我說：「失去湯米和美莉之後，我非常怨天尤人，再也無法相信上帝，也讓奶奶過得很辛苦。」


    我看著爺爺，淚水滑落他的臉頰，美莉和湯米站在他面前，伸手觸摸他的淚水。我告訴他我眼前所見：「爺爺，美莉和湯米正在你身邊，別哭了。」


    他給了我一個大大的擁抱，然後哽咽地說：「妳可別告訴別人爺爺哭了。」


    「別擔心。」我笑著對他說。'
