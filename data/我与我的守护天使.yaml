    子，最前方有一張桌子和椅子。約有二十人參加拍賣競標。我們坐在右邊中間的位置，莫菲的人坐在左邊。拍賣小屋之前，先進行了其他多筆拍賣，那片土地也在其中，莫菲公司最後如願標得。


    在漫長的等待後，終於輪到小屋，它是最後一筆拍賣物件。競標開始，一位女士舉手喊價，爸爸也舉手喊出更高價，莫菲公司跟著出價，爸又出價，這樣來來回回一段時間後，那位女士放棄。爸爸出價後，莫菲公司又出了一次，便停止競標。然後爸爸喊出：「二千五百鎊。」沒有其他人跟進，主持人於是宣布：「賣出！」我終於鬆了一口氣。


    拍賣員示意爸爸到前面去，爸爸卻回頭對喬和我說：「你們最好一起來，讓他們知道購屋的是你們。」


    拍賣員詢問爸爸的名字，爸爸驕傲地說他只負責出價，要買房的是喬和我。他取得我們的名字，要求付訂金，爸爸毫不猶豫說由他來處理。


    訂金是標價的百分之十，也就是二百五十鎊，對我來說是一筆大數目，因此當我看著爸爸拿出支票本，簽下支票的那一刻，心中湧出說不盡的愛和情意，很高興他願意為我們這麼做，讓我想要上前擁抱他。


    爸媽開車送我們回喬的母親家。抵達時，喬的母親正站在庭院欄杆旁和鄰居說話。喬再度邀請爸媽進屋喝杯茶，他們仍然謝絕邀請。我們下車時，喬的母親也來到柵門前。我父母揮手道別後便開車離去。我們立刻告訴喬的母親好消息。


    「先進屋裏去，」她說，「邊喝茶邊告訴我整個過程，我想知道全部的細節，而且我剛烤'
