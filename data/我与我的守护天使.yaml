    而且大多上夜班。這份工作對他的健康沒好處,但我們需要這筆收入。

    除了穩定的小收入之外,這份工作的好處之一是喬能拿到未染色的便宜羊毛。小時候我曾經編織過一些東西,現在能取得羊毛,我更是開始積極編織。不過,我織的毛衣只有一種顏色,就是羊的顏色。我為孩子們、喬和爸爸織了粗羊毛毛衣,爸爸非常喜歡,經常在不上班的日子穿。

    這天爸爸和我坐著喝茶,聊了一會兒。孩子們也很開心,問了外公許多問題,小屋在哪裡、是什麼模樣、庭院裏有沒有樹等等。

    「庭院非常茂密,不但樹很多,連草都長得跟你們一樣高,裏面還有一條小徑,兩旁像叢林一樣,植物蔓生。你們會玩得很開心。」

    「我們什麼時候能去?」他們不斷提出問題,我告訴孩子們:「要等到外公和爸爸能放假時才去。」

    爸爸喝完茶,跟孩子們在外面玩了一會兒。「我要走了,再見,羅娜。」他在外面喊道。

    出發度假前一天,天氣非常暖和,是個無風的大晴天,我正在晾曬洗好的衣物,突然吹起一陣強風。我知道這不是一般的風,便笑了起來。

    「我打賭一定是你,荷賽司。為什麼要把我晾好的衣服吹走,你在搞什麼鬼?」

    接著他突然現身。和往常一樣,他只是在搗蛋,想逗我笑,然後又像光一般在空氣中蒸發。他是個很棒的天使。那一天,我發現克里斯多夫站在那裏,睜大眼睛跟我看著同一個方'
  - '[PAGE 183]


    183


    向，從他的眼神裏，我知道他看見我所看見的影像。但他在當時，乃至今日，都不曾提起此事，也許他忘了，也許讀到這本書時會想起來，我不知道，只是靜觀其變。


    出發度假那一天，我很擔心車子載不下全部的人，因爲爸爸的車不大，我們又有許多行李，也許他忘了，也許讀到這本書時會想起來，我不知道，只是靜觀其變。


    李和孩子們的換洗衣物。孩子們在庭院裏急切等待著外公、外婆，車子一到門前，立刻發出興奮的叫喊聲。


    克里斯多夫和歐文馬上帶著玩具爬進車裏，爸爸和喬把行李全部塞進後車廂，就出發前往距離梅努斯八十公里，位於威斯米斯郡（Westmeath）的墨林加。一路上，喬說了不少話，我則保持安靜，一邊和孩子們玩著。


    抵達小屋時天色幾乎要黑了，不過天空掛著一輪明月，清澈的夜空滿是星星。那棟小屋非常可愛，溫暖舒適，讓我滿心歡喜。爸媽睡在一樓，我們一家全睡在二樓，第一晚我睡得非常香甜。


    度假期間，爸爸和喬到附近許多湖泊釣魚。他也帶著孩子和我去划船，儘管我們只駛離岸邊沒多遠又折返，孩子們一到水上還是非常興奮，惹得船身上下搖晃。


    幾年前，爸爸曾在加油站發生過一次意外，之後無法做粗重的工作。雖然喬自己不是很健康，但那次假期，他在小屋做了許多爸爸沒法做的粗重工作，我也一起幫忙。我們為所有牆面鋪上一層石膏板，保護牆壁不受潮，這工作不輕鬆，因爲有一面牆非常高，石膏板很重。有幾天我們甚至從早到晚不停工作，不過，我們終於在假期接近尾聲時完成。


    有些晚上喬和爸爸會去飛蠅釣。有一晚我請喬照顧孩子，因爲我想獨處一下，跟天使好'
  - '[PAGE 184]


    好說說話，而不是在腦海裏安靜和他們對話。我八點左右出門，那個時間湖邊很少有人，我越過大馬路，打算左轉朝一條往湖邊的小徑走去。當我應該左轉走向湖邊時，卻決定要往前直走。我一邊走著，一邊對天使說：「現在你們可以走在我身邊了。我知道你們以靈的方式圍繞在我四周，可是我需要你們現身，才能好好談話。」


    米迦勒天使出現在我身邊一起齊步並行，手搭在我的肩膀上，我覺得很舒服。走在路邊時，米迦勒天使說：「前面不遠處的右邊有座森林，羅娜，我們到那邊散步吧。」


    抵達那片森林時，林子看起來濃密黑暗。「我沒法在那樣的林子裏散步。」我說。米迦勒於是牽起我的手前進，黑莓叢自動往兩側分開，讓出一條小徑。我們沿著小徑來到森林裏一處能鳥瞰田野和湖泊的空地。有時候，知道天使就在身邊，散步時不用擔心害怕，是件美好的事情。但那一晚，我和米迦勒穿越森林，隱約有種被注視的感覺。但我並沒有對此多想，也沒多問米迦勒些什麼。


    隔天早上吃過早餐後，爸爸又邀喬去釣魚，他們帶著釣具出門，我在後面喊要他們帶魚回來當茶點。爸爸說他盡量，但無法保證，兩人就往湖邊走去。媽媽在庭院裏忙來忙去，照顧盆栽，我把屋子打掃乾淨後，便跟孩子們到樹木叢生的小徑散步，他們非常喜歡那片荒野之地。


    稍後，媽媽和我又帶著孩子到湖邊享受假期最後一天，也和路上遇到的人聊天。有些人跟我們一樣來度假，有些則是媽媽在這裏認識的當地人。我們抵達湖邊，看到許多家庭出遊。孩子和我在湖裏玩水，他們很喜歡撿石頭朝水裏丟去，觀看濺起的水花，感受腳邊迴盪'
  - '[PAGE 185]


    的漣漪。該回小屋時，孩子因為捨不得，眼睛都紅了。


    沒多久，喬和爸爸帶著鱒魚回來。爸爸把鱒魚拿到外面，教孩子們如何砍掉魚頭和魚尾，清洗魚身。兩個孩子齊說：「噁。」


    「這並不難，」我告訴他們，「我小時候就學會怎麼清理魚。學會以後，就能在營火邊烤魚來吃了，很棒喔。」


    我才說完，克里斯多夫就嚷著要搭營火烤魚，可惜我們得拒絕，因為當晚就要回梅努斯了。不過我們還是在廚房裏把魚煮熟，吃掉美味的鱒魚。吃完茶點後，我們開始清理，把行李裝上車。我們回到梅努斯，媽和爸也回家去。假期結束了。


    家裏一直很清貧。以前我常問上帝：「我們該怎麼活下去？」但我們確實活了下來，雖然是勉強維持。我們靠著口袋裏的零錢和自己種的蔬菜節儉度日，更別說是買新衣了。媽媽偶爾給我們一袋衣服，我不知道她從哪兒拿到這些衣服，不過它們從來不合我的身，不是太大，就是穿起來像個老太婆。偶爾袋子裏有喬能穿的褲子或毛衣，我們總是笑說：「乞丐沒得挑。」


    有好幾次，我的訂婚戒指成了天賜之物。就跟當時愛爾蘭的許多家庭一樣，經常大排長龍的當鋪成了我們的救命恩人。我們好幾次走進當鋪，出來時手中握著錢，覺得自己像個百萬富翁。只要連買麵包、奶油來餵孩子的錢都沒了，喬就到路上舉起拇指搭便車到都柏林，'
  - '[PAGE 186]


    口袋裏帶著我的訂婚戒指直奔當鋪，一次可以典當十英鎊左右。隔一段時間，等我們存夠錢，再把它贖回來。戒指就這樣變成了救命之物。

    隔壁一位老人家拜託喬幫忙清理房子和庭院，最後把自己的舊腳踏車送給喬當作謝禮。那輛車只需要稍加清理，修幾個小地方就能使用，我感謝上帝和天使讓我們得到這份禮物，也感謝老人能傾聽他的天使說話。也因此，喬能騎腳踏車到地毯工廠上班。

    雖然我們很缺錢，那幾年時光卻很快樂。在那些美好的日子裏，我看著孩子開心大笑，看著喬享受人生一段時間，不禁覺得活著真好。

    我流產那年的夏天，喬想到一個好主意。他跑到賽爾布里齊一家自行車店，談定每晚去幫忙清理店鋪，整理院子裏的腳踏車和零件，兩星期後，就能得到兩輛腳踏車作為報酬，成人、兒童用車各一輛。這樣一來，我們只要把歐文放在喬的自行車後面，就能全家一起出遊了。

    喬下班後接著到腳踏車店工作，回到家已經午夜時分。但一切是值得的。在第一週結束，他帶回一輛兒童腳踏車，雖然車看起來簡直像堆廢鐵，需要大幅整修。第二週過了一半，店家又給了他一輛成人用車，這一輛狀況就好多了。

    克里斯多夫非常興奮，希望盡快騎上腳踏車。在他的幫忙下，我們很快就把腳踏車整理好。當時的克里斯多夫還是個身形瘦弱的小孩，他在外面幫著父親，一邊學習為車鍊上油，修理輪輻等等各種工作，也一邊學騎腳踏車。

    我永遠記得第一次決定騎車到九公里外的多納迪亞（Donadea）野餐的那一天。喬說九公'
  - '[PAGE 187]


    里對五歲的孩子來說不算短,所以得看克里斯多夫累壞之前能騎多遠。喬在他的車後為歐文放了椅子,我的車後則載著裝有野餐的袋子。


    我很擔心克里斯多夫,不過那實在多餘,因為他有足夠的能力騎車。我們一路上停了幾回,稍作休息,偶爾也邊走邊推車。


    之後,我們有時間就到多納迪亞野餐,度過許多美好時光。那裏有一股寧靜、祥和的氣氛,尤其是所有人都回家後的夜晚。還有一個大家稱之為湖,我卻稱爲池塘的水塘,裏面有鴨子,以及一座連接到水中小島的小橋,小島上有四棵樹和幾張野餐桌,但地面光禿禿的沒有草。


    到達小島後,我們生起小營火,然後泡茶。孩子們最喜歡坐在小島上的營火旁,四周都是水,還有鴨子在身邊走來走去討麵包吃。我們一邊喝茶吃三明治,一邊看著天上的星星。我知道不該在那裏生營火,因為附近有森林,不過我們非常小心火燭。小時候,爸爸教了我許多關於營火和在大自然中活動該注意的事情,他教我如何生火,如何安全走在河岸邊,如何游泳,還有關於水流的知識。他告訴我萬物皆有規矩。


    有一晚,我們又到多納迪亞野餐,夜空星光閃亮,高掛一輪明月,所以四周還算明亮。當時四下無人,除了我們只有鴨子。我們生起小營火,孩子一邊吃三明治,一邊玩著小男孩玩的各種遊戲。我告訴喬想獨處一下,請他看著孩子。過去這段時間,我一直感覺到有什麽東西在遙遠他方注視著我,我想要和天使談談此事。


    喬說天色太暗了,不同意我去。我回道:「我會帶著手電筒。」'
  - '[PAGE 188]


    我走過小木橋，踏上前往老城堡的小徑，然後右轉到一片有許多樹木環繞的草地。我故意走入大橡樹林，這樣喬就看不見我了。我真的很想獨處，也知道他會看著我。

    天使以萊亞現身，他像一道來自樹叢間的光亮，走到草地上，呼喚我的名字。以萊亞向我伸出手，我的雙手也向他的方向舉起，他用雙手包覆了我的手。

    我們開始溝通，卻沒有說話，以萊亞傳遞著：「羅娜，他走在黑暗之中。妳不用害怕，沒有上帝的允許，他無法更靠近。妳知道我說的是誰嗎？」

    「知道，天使以萊亞，」我說，「是撒旦。他就是在黑暗中一直注視著我的人嗎？我察覺到有人，或有某種東西存在於我的生活圈外圍，存在於環繞著我的光環之外，藏身在幾百里外的另一個黑暗之圓內。過去六個月來，我一直很害怕，雖然我知道上帝和天使們會保護我。」「羅娜，妳之所以面對這些狀況，是因為有一天上帝將會讓妳在撒旦面前接受試驗。」天使以萊亞說。

    「這件事發生時，上帝會在哪裏呢？」我問道。

    「上帝將在妳的右邊，撒旦在妳的左邊。」以萊亞說。

    「上帝會在身邊給我力量，這樣就夠了。」但我內心充滿無盡的擔憂與害怕。天使以萊亞放開我的手，當我的手臂又落回身體兩側時，心底已充滿平靜與愛。以萊亞笑著指示我回頭看，然後消失無蹤。

    喬帶著孩子從我身後走來。克里斯多夫牽著他的腳踏車，喬牽著兩輛車，還帶著歐文。'
- md: '「羅娜，我們該走了，真的很晚了。」他以一種極安靜的語調說著，彷彿不想吵醒森林裏的生物。

    「我沒注意到時間已經晚了。」我說。

    接過腳踏車後，我們沿著小徑走到馬路上。我覺得自己非常沉靜，距離人類世界和家人相當遙遠。從那一刻起，我感覺到撒旦正朝我走來，他也許要花幾個月，甚至幾年的時間才能來到我面前，但我很肯定，我們即將正面遭遇。


    # 18


    「羅娜真好運……」


    某個冬夜，喬和我來到梅努斯的祈禱會，當時約有二十五人到場，許多是年輕人。一位虔誠的年輕人強尼歡迎大家之後，便一起祈禱、歌頌，我一直很喜歡這樣的活動。之後，包括我在內，每個人開始默禱，現場安靜到連一根針掉落的聲音都能聽見。一位天使在我耳邊細語：「羅娜，張開眼睛，抬起頭。看見右邊那位年輕人了嗎？」

    「看見了。」我輕聲回答。

    「羅娜，妳將看見那年輕人的靈視影像，現在低下頭，閉上眼睛。」


    我立即進入他的靈視影像，我在年輕人身邊和他一起走在一條塵土飛揚、充滿坑洞且蜿蜒曲折的道路上，我無法看得很遠，因為道路曲曲折折。他走了好一段時間，一路上避開石頭和坑洞，看起來像是迷失，事實不然，因為在下個轉彎處，出現了一棟建築，左邊有一道階梯。年輕人開始費力往上爬，彷彿每踏出一步，階梯就變得更陡峭難爬，最後他終於來到門前。

    在他的靈視影像中，那建築似乎不斷擴大，此時已經變得巨大無比，原本在路邊看去時，只是一棟普通建築，此時卻變成了龐然大物。年輕人驚訝地往後退了一步。眼前的門是如此巨大而沉重，相較之下，他卻是渺小而微不足道。他想要走進門內，但那必須付出很大的氣力。在用盡全身力量後，他終於成功推開大門，擠過門板，進入一間明亮且空曠的巨大廳堂。他在地板上坐下，開始祈禱，進入冥想，成為浩瀚空間中的一個小點。


    天使在我頭上摸了一下，我和年輕人之間的連結隨即中斷。


    「分享的時候到了。」強尼說。


    大家一個接著一個開始分享，最後輪到那位看見靈視預言的年輕人。他如實描述自己所經歷的靈視影像，就和我所看見的一模一樣。我是第一次以這種方式分享他人的靈視影像，因此興奮無比。年輕人描述完之後，最後又說他不懂這靈視影像的意義。


    天使要我開口說話，說我必須讓年輕人了解靈視影像的重要性，鼓勵他繼續走在這條道路上。


    我非常緊張，甚至是到了害怕的程度！


    「我辦不到，」我對天使說，「他們聽不進去的，我只是個平凡人。」


    年輕人停止說話，天使則不停告訴我該怎麼做，我又不斷藉口推託。這時，另一位年輕人開口說話了，天使要我注意聽他所說的話。


    「祈禱會現場有個人聽見了上帝的話，這個人非常緊張、害怕。」他只說了這些。


    上帝要我停止躲藏。


    正當我深呼吸準備說話時，強尼先開口說：「如果大家的分享到此為止，我們就一起進行禱告。」


    「不，我有話要說。」我說。我轉向第一個年輕人，解釋他的靈視影像和他對成爲神職人員的恐懼有關。我說這一路上他將遭遇許多上帝爲他設置的障礙，但他會一一克服，並且發揮極大的影響力，影響層面不僅止於愛爾蘭，還會擴及世界其他地區。他必須對上帝和自己懷有信心和信念，而且他應該整理行囊，啓程展開這項旅程了。我解釋說，這是天使要我傳遞給他的訊息。


    接著，強尼開始禱告，我們一起唱起聖歌，讚美上帝。我非常喜愛這個時刻。天使說將來我在祈禱會還有很多工作，我則回說我對他們要求的事感到很焦慮。


    祈禱會結束了，吃過茶點後，喬跟我走路回家。喬對於我在祈禱會說話一事，並未多說什麼。


    幾個月後，在梅努斯的另一次祈禱會中，強尼說：「現在讓我們來祈禱，爲有所需要的家人、朋友，和在世界各地需要幫助的人請求療癒的力量。」


    大家開始輪流分享，有人是家人或朋友遭遇到困難，大家爲那些家人、朋友祈禱，希望他們一切安好；也爲女兒能通過考試而祈禱；爲一個亟需的假期而祈禱；爲買車的決定而祈禱。我們也祈禱奇蹟降臨，使世界和平，也爲政府、爲需要幫助的神父、修女和各個慈善團體請求奇蹟。需要請求神蹟的事情相當多。在這段時間裏，天使不斷拍著我的肩膀說：「羅娜，妳知道該說些什麼。」


    我深呼吸了一口氣，開始說：「這裏有個人需要爲她的家人祈禱。她有個兄弟結婚了，卻有酗酒的問題，也對妻女施虐。這個人深愛自己的兄弟，此外，她還有一些司法問題要面對，因此處在極大的壓力之中。上帝正在對你說，你不需要感到羞愧，站出來跟祂說話；要有信心，並且祈禱一切安然度過。」


    我說完後，沒有人再發言。


    祈禱會中某些人有時會把手放在他人身上，和他們一起祈福，有時則是大聲禱告。強尼會詢問是否有人想接受他人的祈福，然後召喚願意為他人禱告者的名字。


    我並不是其中一員，始終不曾加入過，但那天情況有了變化，上帝另有打算。


    大家在室內四處走動談天喝茶時，有個修女朝我走來，我笑著對她打招呼。當時我並沒有想到她想找我一起禱告，但她開口了。


    「羅娜，妳願意和我一起禱告嗎？妳剛才所提的人是我，我需要透過妳和上帝說話。」


    我差點說不出話來。「好的，那當然，」我說，「不過不要在這裏，人太多，可以找其他地方獨處嗎？」


    「當然。」她說。我們來到走廊上，在隔三道門處找到一間空房。我們在裏面一起坐下，就只有我們兩人。她根本不知道我緊張得直發抖。「喔，天啊，妳在做什麼？」我不斷祈禱著。


    天使出現在我們四周，在我耳邊輕聲說：「上帝守護著妳，羅娜。」


    我為修女祈福，為所有能改變她生命的美好事物而感謝上帝。接著我對她說：「是妳和上帝談話的時候了。」


    她開始說話，而且持續一個小時，最後我們一起禱告。這期間，天使不時要我張開眼睛看著她。站在她身邊的守護天使非常美麗，我稱為「和平寧靜天使」。我並未告訴修女我能看見她的天使，也沒說天使用手臂和翅膀將她環抱著，和她融合在一起。我笑了，再度閉上眼睛，繼續讚美上帝。接著，天使告訴我該回到另一間教室，和大家會合了。


    我們回到另一間教室時，多數人已經離去。我和喬走路回家，在路上喬說很驚訝我今天開口發言。我回答說，那其實非常困難，因為我很緊張，但我必須完成上帝交代的任務，何況有天使幫忙。在此之前，我當然也為許多人祈福過，但我總是在人們不知情的情況下默默地做。


    ![Image](img/764d3207649262328904293ec5c0feee_194_0.png)


    喬因為在地毯工廠工作，大多數夜晚不在家。我經常在孩子們上床睡覺後，獨自坐在火爐前，閉著眼睛深呼吸一口氣，再睜開眼睛，四周便圍繞許多天使一起坐在火爐旁。我跟他們傾吐一切，告訴他們，對我來說最美好的事情之一，就是不論置身何處，都能和他們談話，而且知道他們專心傾聽。天使陪伴著我，是我最好的朋友。


    時間若太晚，我會請天使離開，因為喬很快就要回家，而我還有事情要做。天使雖然隨即消失，但我仍然能感覺到他們的存在，有時候甚至感受到天使和我擦身而過。有一晚，一位天使就真的這麼做了，他和我擦身而過，然後現身在我面前。在那短暫的瞬間，他觸碰了我的肚皮，帶著微笑對我說：「上帝回應了妳想要再有一個孩子的渴望。」然後消失無蹤。


    沒多久，我發現自己懷孕了，喬興奮不已，還說如果能生個小女兒就太好了。這次妊娠期間，我沒有遭遇到什麼困難，也爲此感謝上帝。


    聖誕節後我們決定爲即將問世的寶寶取名。喬說這回不需要挑個男孩的名字，他非常肯定是個女孩。我們決定爲寶寶取名爲露絲。預產期前十天，我開始陣痛，馬上被送往醫院。可是陣痛後來停了一陣子，那時候，爸媽帶著水果來醫院探望我，爸爸說他期待有另一個孫子，喬則告訴他：「這次不會是男孩，你等著看，絕對是個女孩。」


    爸媽要離開醫院時，我也決定和喬到醫院大門口走走。爸媽走在我們前面，外公外婆剛好走入醫院大門。爸媽停下來和他們說話，喬和我也打了聲招呼。我們站在離爸媽不遠處，聽見外婆對父母說：「羅娜真好運，兒子們沒有跟她一樣是智障，或者更慘！不過我們覺得這個寶寶會是個智障。」


    她的守護天使出現在她的身後，眼中充滿淚水，他伸出手來撫摸我，給我力量。可是我非常悲傷，並且看到喬不小心聽見這段話時震驚的模樣。外公外婆對我父母說話時，根本無視於我們的存在。喬摟著我離開。


    「別在意，」喬說，「他們是無知的人。」


    他陪我回到病房，知道他們的想法，使我不禁落下淚來。天使圍繞在病床四周，爲我和喬注入平靜與愛的力量。我請求喬不要對我父母提起無意間聽到那段話的事。


    但那一天最令我傷心的，是爸爸未挺身捍衛我。對於他沒能指責外祖父母的看法，我感到非常難過，儘管我心底明白爲什麼。爸爸知道外祖父母未全然認可他，儘管爸爸已越來越有成就，他們仍然覺得媽媽委屈下嫁了。爸爸深愛著媽媽，但又覺得自己讓她和父母產生嫌隙，而他非常不想再加深那道嫌隙。


    我了解爸爸為何沒有挺身護衛我，但心裏仍然非常難過，那晚我躺在床上傷心欲絕。


    多年後我意外發現口吐惡言的外婆，曾經生下一個唐氏症寶寶，那個寶寶的心臟不好，只活了六、七歲。而她在短短的人生歲月裏，一直被關在樓上房間裏，和所有鄰居隔絕。據說生了一個「智障兒」，讓外祖父母感到很羞恥。


    隔天早上我開始陣痛，小女兒露絲在三月二十五日，也就是母親節和我的生日那天問世，這真是一份美好的生日禮物。


    出院那一天，喬帶著克里斯多夫和歐文前來。兒子們跑到我床邊，喬卻慢慢走來，身邊滿是天使支撐著他。他的守護天使上前來告訴我喬身體不適，我很想哭，但我知道自己必須要笑。克里斯多夫和歐文正忙著和新妹妹玩，爭相抱她，喬把小女兒從搖籃裏抱起來，讓小哥哥們把手環抱在她身上。我問喬身體是否安好，他說沒有問題，但我知道那不是真話，他也很清楚。我告訴天使我很擔心，請求他們盡力協助喬。


    兩個月後的某一晚，喬上夜班時，腹部突然一陣劇痛。他跟老闆說身體不舒服，請他找人送他回家。


    「不行，你看起來很好。」老闆要他回到崗位繼續工作。


    問題就在喬長得又高又壯，外表上看起來往往不像生病。不過最後他仍然跟老闆告假，堅持回家，因為他實在痛得受不了。大約清晨兩點，天使把我叫醒：「羅娜，快起床，喬身體不適，已經在回家的路上。我們正在找人幫助他。」


    我立即起床，打開所有燈光，開始燒水，也換好衣服。我站在窗邊等著，一邊向上帝祈禱，希望喬平安到家。


    後來，喬告訴我他來到賽爾布里齊和梅努斯之間，終於不支倒地。他記得自己醒來後，跪在地上爬著前進，突然間有車燈照在他身上，停車的是一位住在梅努斯的鄰居。他趕緊把車子掉頭，下車幫助他。最初鄰居以爲他是個醉漢，當他認出是喬時，簡直不敢相信自己的眼睛。喬解釋說他的胃劇烈疼痛，鄰居開車送他回家。


    天使在我肩上點了一下說：「羅娜，去開柵門，喬就要到家了。」


    我打開柵門，鄰居的車開了進來。我幫忙把喬扶進屋裏，安置在床上。鄰居說他去打電話叫醫生。


    「我該如何回報你好心的幫忙？」我說。


    他說他剛好睡不著，決定開車兜風，現在很高興自己有開車出門。道別後，他開車離去。我泡了一杯茶給喬，醫生約十分鐘後抵達，喬正坐在床上，覺得舒服了一點。醫生對喬笑著說：「希望你把我從床上挖起來，不是沒事找事做。我聽說你有劇痛，被人發現倒在路邊爬著。」


    「劇痛已經減緩了，」喬說，「我現在覺得很好。」


    他們談笑了一會兒之後，醫生說：「平躺在床上讓我看看，也許你的盲腸炎又發作了。」


    他把手放在喬的胃部，喬突然筆直彈了起來，痛苦叫喊著。

    「你的麻煩大了，喬，」醫生說，「我要請救護車來，並給醫院寫張單子。」


    天使不斷給我驚喜，猜猜看那晚他們還跟誰說了話？是我父親！他們要爸爸起床來小屋。他把車開進來，停在醫生的車後時，醫生恰好在問最近的電話在什麼地方。


    爸爸走進小屋問道：「發生了什麼事？」


    醫生告訴爸爸，喬需要送醫院，他正要打電話叫救護車。爸爸說他可以送喬到醫院，但醫生拒絕，說喬需要救護車。爸爸出門移車，醫生到路邊的公共電話亭，他兩分鐘後回來，告訴我們救護車已經上路，然後回到車上寫單子給醫院說明喬的情況。我則到廚房去，讓爸爸與喬獨處。


    我再度去燒水，感覺到天使的手撫摸我，帶走我身上的焦慮，他們耳語說：「喬將會沒事，雖然不容易，但他熬得過去。」


    醫生回來說救護車已經抵達，爸爸開車跟在救護車後面，到醫院陪喬。我自然得留下來照顧孩子們，而且還得給露絲餵奶。


    他們離開後，我回到臥室，孩子們仍然熟睡，守護天使在一旁看護著。我對天使微笑，心裏早就清楚他們會讓孩子在騷動中持續熟睡。我謝過天使，轉身打算離開，天使荷賽司出現在我面前。


    「羅娜，上床去吧，」他說，「我們要讓妳睡一覺。」


    我上床一覺睡到隔天早上十點鐘，孩子們也睡著。我起床準備早餐，克里斯多夫來到廚房問爸爸在哪裏。我解釋他去了醫院，等大家吃過早餐，就去打電話給醫生，詢問他的狀況。


    餵露絲吃奶時，爸爸來了。孩子們很高興見到他。我感謝他昨晚在醫院陪喬，也問他狀況如何，陪喬到幾點？爸爸一整晚都待在醫院裏，喬被緊急送進開刀房，他們一度害怕會失去他，不過現在已經沒事了。


    「我會每晚帶妳去看喬。」爸說。


    儘管我反對，認爲這樣太麻煩他，但他堅持如此，還說媽媽會幫忙照顧孩子。


    晚上去探望喬時，他的模樣很悲慘。他在醫院住了兩星期，出院幾星期後，又因爲感染，回到醫院再住了十天。之後，他有將近半年無法工作。


    有一天，我在超級市場走向結帳櫃台，一位女孩坐在推車上，她的守護天使召喚我。我認得那位母親，但不知道她的名字。


    我向小女孩問好，守護天使告訴我小女孩病了，請求我觸摸她。我向小女孩的母親打招呼的同時，摸了摸女孩的小手，告訴那位母親她有個美麗的女兒。母親道別後，帶著女兒離開。


    天使告訴我，小女孩和我之間必須建立起一個連結，才有機會好轉。這類事情經常發生，但我無法全然了解箇中的因果。大約一年後，我又遇見同一對母女，女孩的守護天使再度召喚我。那母親告訴我，小女孩一直生病住院，但現在好多了。


    女孩的母亲帶著她離去，天使對我說：「小女孩將病得更嚴重，不過羅娜，因爲妳的觸'
  mdcn: '「羅娜，我們該走了，真的很晚了。」他以一種極安靜的語調說著，彷彿不想吵醒森林裏的生物。

    「我沒注意到時間已經晚了。」我說。

    接過腳踏車後，我們沿著小徑走到馬路上。我覺得自己非常沉靜，距離人類世界和家人相當遙遠。從那一刻起，我感覺到撒旦正朝我走來，他也許要花幾個月，甚至幾年的時間才能來到我面前，但我很肯定，我們即將正面遭遇。


    # 18


    「羅娜真好運……」


    某個冬夜，喬和我來到梅努斯的祈禱會，當時約有二十五人到場，許多是年輕人。一位虔誠的年輕人強尼歡迎大家之後，便一起祈禱、歌頌，我一直很喜歡這樣的活動。之後，包括我在內，每個人開始默禱，現場安靜到連一根針掉落的聲音都能聽見。一位天使在我耳邊細語：「羅娜，張開眼睛，抬起頭。看見右邊那位年輕人了嗎？」

    「看見了。」我輕聲回答。

    「羅娜，妳將看見那年輕人的靈視影像，現在低下頭，閉上眼睛。」


    我立即進入他的靈視影像，我在年輕人身邊和他一起走在一條塵土飛揚、充滿坑洞且蜿蜒曲折的道路上，我無法看得很遠，因為道路曲曲折折。他走了好一段時間，一路上避開石頭和坑洞，看起來像是迷失，事實不然，因為在下個轉彎處，出現了一棟建築，左邊有一道階梯。年輕人開始費力往上爬，彷彿每踏出一步，階梯就變得更陡峭難爬，最後他終於來到門前。

    在他的靈視影像中，那建築似乎不斷擴大，此時已經變得巨大無比，原本在路邊看去時，只是一棟普通建築，此時卻變成了龐然大物。年輕人驚訝地往後退了一步。眼前的門是如此巨大而沉重，相較之下，他卻是渺小而微不足道。他想要走進門內，但那必須付出很大的氣力。在用盡全身力量後，他終於成功推開大門，擠過門板，進入一間明亮且空曠的巨大廳堂。他在地板上坐下，開始祈禱，進入冥想，成為浩瀚空間中的一個小點。


    天使在我頭上摸了一下，我和年輕人之間的連結隨即中斷。


    「分享的時候到了。」強尼說。


    大家一個接著一個開始分享，最後輪到那位看見靈視預言的年輕人。他如實描述自己所經歷的靈視影像，就和我所看見的一模一樣。我是第一次以這種方式分享他人的靈視影像，因此興奮無比。年輕人描述完之後，最後又說他不懂這靈視影像的意義。


    天使要我開口說話，說我必須讓年輕人了解靈視影像的重要性，鼓勵他繼續走在這條道路上。


    我非常緊張，甚至是到了害怕的程度！


    「我辦不到，」我對天使說，「他們聽不進去的，我只是個平凡人。」


    年輕人停止說話，天使則不停告訴我該怎麼做，我又不斷藉口推託。這時，另一位年輕人開口說話了，天使要我注意聽他所說的話。


    「祈禱會現場有個人聽見了上帝的話，這個人非常緊張、害怕。」他只說了這些。


    上帝要我停止躲藏。


    正當我深呼吸準備說話時，強尼先開口說：「如果大家的分享到此為止，我們就一起進行禱告。」


    「不，我有話要說。」我說。我轉向第一個年輕人，解釋他的靈視影像和他對成爲神職人員的恐懼有關。我說這一路上他將遭遇許多上帝爲他設置的障礙，但他會一一克服，並且發揮極大的影響力，影響層面不僅止於愛爾蘭，還會擴及世界其他地區。他必須對上帝和自己懷有信心和信念，而且他應該整理行囊，啓程展開這項旅程了。我解釋說，這是天使要我傳遞給他的訊息。


    接著，強尼開始禱告，我們一起唱起聖歌，讚美上帝。我非常喜愛這個時刻。天使說將來我在祈禱會還有很多工作，我則回說我對他們要求的事感到很焦慮。


    祈禱會結束了，吃過茶點後，喬跟我走路回家。喬對於我在祈禱會說話一事，並未多說什麼。


    幾個月後，在梅努斯的另一次祈禱會中，強尼說：「現在讓我們來祈禱，爲有所需要的家人、朋友，和在世界各地需要幫助的人請求療癒的力量。」


    大家開始輪流分享，有人是家人或朋友遭遇到困難，大家爲那些家人、朋友祈禱，希望他們一切安好；也爲女兒能通過考試而祈禱；爲一個亟需的假期而祈禱；爲買車的決定而祈禱。我們也祈禱奇蹟降臨，使世界和平，也爲政府、爲需要幫助的神父、修女和各個慈善團體請求奇蹟。需要請求神蹟的事情相當多。在這段時間裏，天使不斷拍著我的肩膀說：「羅娜，妳知道該說些什麼。」


    我深呼吸了一口氣，開始說：「這裏有個人需要爲她的家人祈禱。她有個兄弟結婚了，卻有酗酒的問題，也對妻女施虐。這個人深愛自己的兄弟，此外，她還有一些司法問題要面對，因此處在極大的壓力之中。上帝正在對你說，你不需要感到羞愧，站出來跟祂說話；要有信心，並且祈禱一切安然度過。」


    我說完後，沒有人再發言。


    祈禱會中某些人有時會把手放在他人身上，和他們一起祈福，有時則是大聲禱告。強尼會詢問是否有人想接受他人的祈福，然後召喚願意為他人禱告者的名字。


    我並不是其中一員，始終不曾加入過，但那天情況有了變化，上帝另有打算。


    大家在室內四處走動談天喝茶時，有個修女朝我走來，我笑著對她打招呼。當時我並沒有想到她想找我一起禱告，但她開口了。


    「羅娜，妳願意和我一起禱告嗎？妳剛才所提的人是我，我需要透過妳和上帝說話。」


    我差點說不出話來。「好的，那當然，」我說，「不過不要在這裏，人太多，可以找其他地方獨處嗎？」


    「當然。」她說。我們來到走廊上，在隔三道門處找到一間空房。我們在裏面一起坐下，就只有我們兩人。她根本不知道我緊張得直發抖。「喔，天啊，妳在做什麼？」我不斷祈禱著。


    天使出現在我們四周，在我耳邊輕聲說：「上帝守護著妳，羅娜。」


    我為修女祈福，為所有能改變她生命的美好事物而感謝上帝。接著我對她說：「是妳和上帝談話的時候了。」


    她開始說話，而且持續一個小時，最後我們一起禱告。這期間，天使不時要我張開眼睛看著她。站在她身邊的守護天使非常美麗，我稱為「和平寧靜天使」。我並未告訴修女我能看見她的天使，也沒說天使用手臂和翅膀將她環抱著，和她融合在一起。我笑了，再度閉上眼睛，繼續讚美上帝。接著，天使告訴我該回到另一間教室，和大家會合了。


    我們回到另一間教室時，多數人已經離去。我和喬走路回家，在路上喬說很驚訝我今天開口發言。我回答說，那其實非常困難，因為我很緊張，但我必須完成上帝交代的任務，何況有天使幫忙。在此之前，我當然也為許多人祈福過，但我總是在人們不知情的情況下默默地做。


    ![Image](img/764d3207649262328904293ec5c0feee_194_0.png)


    喬因為在地毯工廠工作，大多數夜晚不在家。我經常在孩子們上床睡覺後，獨自坐在火爐前，閉著眼睛深呼吸一口氣，再睜開眼睛，四周便圍繞許多天使一起坐在火爐旁。我跟他們傾吐一切，告訴他們，對我來說最美好的事情之一，就是不論置身何處，都能和他們談話，而且知道他們專心傾聽。天使陪伴著我，是我最好的朋友。


    時間若太晚，我會請天使離開，因為喬很快就要回家，而我還有事情要做。天使雖然隨即消失，但我仍然能感覺到他們的存在，有時候甚至感受到天使和我擦身而過。有一晚，一位天使就真的這麼做了，他和我擦身而過，然後現身在我面前。在那短暫的瞬間，他觸碰了我的肚皮，帶著微笑對我說：「上帝回應了妳想要再有一個孩子的渴望。」然後消失無蹤。


    沒多久，我發現自己懷孕了，喬興奮不已，還說如果能生個小女兒就太好了。這次妊娠期間，我沒有遭遇到什麼困難，也爲此感謝上帝。


    聖誕節後我們決定爲即將問世的寶寶取名。喬說這回不需要挑個男孩的名字，他非常肯定是個女孩。我們決定爲寶寶取名爲露絲。預產期前十天，我開始陣痛，馬上被送往醫院。可是陣痛後來停了一陣子，那時候，爸媽帶著水果來醫院探望我，爸爸說他期待有另一個孫子，喬則告訴他：「這次不會是男孩，你等著看，絕對是個女孩。」


    爸媽要離開醫院時，我也決定和喬到醫院大門口走走。爸媽走在我們前面，外公外婆剛好走入醫院大門。爸媽停下來和他們說話，喬和我也打了聲招呼。我們站在離爸媽不遠處，聽見外婆對父母說：「羅娜真好運，兒子們沒有跟她一樣是智障，或者更慘！不過我們覺得這個寶寶會是個智障。」


    她的守護天使出現在她的身後，眼中充滿淚水，他伸出手來撫摸我，給我力量。可是我非常悲傷，並且看到喬不小心聽見這段話時震驚的模樣。外公外婆對我父母說話時，根本無視於我們的存在。喬摟著我離開。


    「別在意，」喬說，「他們是無知的人。」


    他陪我回到病房，知道他們的想法，使我不禁落下淚來。天使圍繞在病床四周，爲我和喬注入平靜與愛的力量。我請求喬不要對我父母提起無意間聽到那段話的事。


    但那一天最令我傷心的，是爸爸未挺身捍衛我。對於他沒能指責外祖父母的看法，我感到非常難過，儘管我心底明白爲什麼。爸爸知道外祖父母未全然認可他，儘管爸爸已越來越有成就，他們仍然覺得媽媽委屈下嫁了。爸爸深愛著媽媽，但又覺得自己讓她和父母產生嫌隙，而他非常不想再加深那道嫌隙。


    我了解爸爸為何沒有挺身護衛我，但心裏仍然非常難過，那晚我躺在床上傷心欲絕。


    多年後我意外發現口吐惡言的外婆，曾經生下一個唐氏症寶寶，那個寶寶的心臟不好，只活了六、七歲。而她在短短的人生歲月裏，一直被關在樓上房間裏，和所有鄰居隔絕。據說生了一個「智障兒」，讓外祖父母感到很羞恥。


    隔天早上我開始陣痛，小女兒露絲在三月二十五日，也就是母親節和我的生日那天問世，這真是一份美好的生日禮物。


    出院那一天，喬帶著克里斯多夫和歐文前來。兒子們跑到我床邊，喬卻慢慢走來，身邊滿是天使支撐著他。他的守護天使上前來告訴我喬身體不適，我很想哭，但我知道自己必須要笑。克里斯多夫和歐文正忙著和新妹妹玩，爭相抱她，喬把小女兒從搖籃裏抱起來，讓小哥哥們把手環抱在她身上。我問喬身體是否安好，他說沒有問題，但我知道那不是真話，他也很清楚。我告訴天使我很擔心，請求他們盡力協助喬。


    兩個月後的某一晚，喬上夜班時，腹部突然一陣劇痛。他跟老闆說身體不舒服，請他找人送他回家。


    「不行，你看起來很好。」老闆要他回到崗位繼續工作。


    問題就在喬長得又高又壯，外表上看起來往往不像生病。不過最後他仍然跟老闆告假，堅持回家，因為他實在痛得受不了。大約清晨兩點，天使把我叫醒：「羅娜，快起床，喬身體不適，已經在回家的路上。我們正在找人幫助他。」


    我立即起床，打開所有燈光，開始燒水，也換好衣服。我站在窗邊等著，一邊向上帝祈禱，希望喬平安到家。


    後來，喬告訴我他來到賽爾布里齊和梅努斯之間，終於不支倒地。他記得自己醒來後，跪在地上爬著前進，突然間有車燈照在他身上，停車的是一位住在梅努斯的鄰居。他趕緊把車子掉頭，下車幫助他。最初鄰居以爲他是個醉漢，當他認出是喬時，簡直不敢相信自己的眼睛。喬解釋說他的胃劇烈疼痛，鄰居開車送他回家。


    天使在我肩上點了一下說：「羅娜，去開柵門，喬就要到家了。」


    我打開柵門，鄰居的車開了進來。我幫忙把喬扶進屋裏，安置在床上。鄰居說他去打電話叫醫生。


    「我該如何回報你好心的幫忙？」我說。


    他說他剛好睡不著，決定開車兜風，現在很高興自己有開車出門。道別後，他開車離去。我泡了一杯茶給喬，醫生約十分鐘後抵達，喬正坐在床上，覺得舒服了一點。醫生對喬笑著說：「希望你把我從床上挖起來，不是沒事找事做。我聽說你有劇痛，被人發現倒在路邊爬著。」


    「劇痛已經減緩了，」喬說，「我現在覺得很好。」


    他們談笑了一會兒之後，醫生說：「平躺在床上讓我看看，也許你的盲腸炎又發作了。」


    他把手放在喬的胃部，喬突然筆直彈了起來，痛苦叫喊著。

    「你的麻煩大了，喬，」醫生說，「我要請救護車來，並給醫院寫張單子。」


    天使不斷給我驚喜，猜猜看那晚他們還跟誰說了話？是我父親！他們要爸爸起床來小屋。他把車開進來，停在醫生的車後時，醫生恰好在問最近的電話在什麼地方。


    爸爸走進小屋問道：「發生了什麼事？」


    醫生告訴爸爸，喬需要送醫院，他正要打電話叫救護車。爸爸說他可以送喬到醫院，但醫生拒絕，說喬需要救護車。爸爸出門移車，醫生到路邊的公共電話亭，他兩分鐘後回來，告訴我們救護車已經上路，然後回到車上寫單子給醫院說明喬的情況。我則到廚房去，讓爸爸與喬獨處。


    我再度去燒水，感覺到天使的手撫摸我，帶走我身上的焦慮，他們耳語說：「喬將會沒事，雖然不容易，但他熬得過去。」


    醫生回來說救護車已經抵達，爸爸開車跟在救護車後面，到醫院陪喬。我自然得留下來照顧孩子們，而且還得給露絲餵奶。


    他們離開後，我回到臥室，孩子們仍然熟睡，守護天使在一旁看護著。我對天使微笑，心裏早就清楚他們會讓孩子在騷動中持續熟睡。我謝過天使，轉身打算離開，天使荷賽司出現在我面前。


    「羅娜，上床去吧，」他說，「我們要讓妳睡一覺。」


    我上床一覺睡到隔天早上十點鐘，孩子們也睡著。我起床準備早餐，克里斯多夫來到廚房問爸爸在哪裏。我解釋他去了醫院，等大家吃過早餐，就去打電話給醫生，詢問他的狀況。


    餵露絲吃奶時，爸爸來了。孩子們很高興見到他。我感謝他昨晚在醫院陪喬，也問他狀況如何，陪喬到幾點？爸爸一整晚都待在醫院裏，喬被緊急送進開刀房，他們一度害怕會失去他，不過現在已經沒事了。


    「我會每晚帶妳去看喬。」爸說。


    儘管我反對，認爲這樣太麻煩他，但他堅持如此，還說媽媽會幫忙照顧孩子。


    晚上去探望喬時，他的模樣很悲慘。他在醫院住了兩星期，出院幾星期後，又因爲感染，回到醫院再住了十天。之後，他有將近半年無法工作。


    有一天，我在超級市場走向結帳櫃台，一位女孩坐在推車上，她的守護天使召喚我。我認得那位母親，但不知道她的名字。


    我向小女孩問好，守護天使告訴我小女孩病了，請求我觸摸她。我向小女孩的母親打招呼的同時，摸了摸女孩的小手，告訴那位母親她有個美麗的女兒。母親道別後，帶著女兒離開。


    天使告訴我，小女孩和我之間必須建立起一個連結，才有機會好轉。這類事情經常發生，但我無法全然了解箇中的因果。大約一年後，我又遇見同一對母女，女孩的守護天使再度召喚我。那母親告訴我，小女孩一直生病住院，但現在好多了。


    女孩的母亲帶著她離去，天使對我說：「小女孩將病得更嚴重，不過羅娜，因爲妳的觸'
