  md: '我站起身，當然，馬上就忘記了膝蓋的疼痛。我們走過草地，來到另一端的森林，天使要我傾聽。我注意聽，遠方傳來許多動物的聲音。


    「要聽什麼呢？」我問道。


    「聽某種動物的聲響。把所有聲音一一辨認出來，最後妳就會聽到一個聲音。」天使說，「這樣等妳長大一點，我們就能教妳更清楚聽見我們。」


    於是我一邊穿越樹林，一邊辨認不同的聲音，每踏出一步，地面便傳來枝葉斷裂嗶啪聲。沒多久，我已經能夠辨認鳥類的聲音，麻雀、鷦鷯、鶯雀、黑鶇，以及其他許多鳥類，還能找出牠們的確切位置，就跟辨別四周其他動物一樣毫無困難。我在天使的教導下，似乎很快學會一切。


    接著，我停下來對天使說：「有個哭聲，那是你們要我聽的聲音，對不對？聽起來像是有人在哭泣。」


    我繼續穿越樹林，但樹木似乎越來越高大，森林也變得昏暗。「喔，天使，這裏好暗，你們能把這裏變亮嗎？」


    天使說：「別害怕，跟著哭聲走，跟著妳聽見的聲音走。」


    我照著做了。哭聲把我引到一處空地，我站在那裏傾聽，似乎已經很靠近了，就在我的右邊。我朝右邊荊棘密布的樹林走去，手腳被刮得全是傷，但聲音消失了，更難找到目標。


    天光在我的身後，刺灌木叢裏一片昏暗。


    「天使，我什麼也看不見。」話一說出，一棵樹的底部出現了亮光。'
