  - '[PAGE 178]


    又過了幾個星期，我不確定是多久，天氣越來越冷。喬對於失去孩子一事仍然非常傷心，雖然我也一樣，但是因爲事先知道，所以有更多時間來面對。天氣變得很差，戶外一片冰天雪地，大雪紛飛，真的非常冷。喬下班後，決定多買些食品雜貨回家，我永遠記得他到家時，雙手抱滿購物袋的模樣。喬一走進屋就喊著：「天（上帝）啊，真是冷透了⋯⋯」他一開口說「天（上帝）」，天使們立即降臨到我們小小的家裏。


    感覺上，天使好像是從屋子每個角落，包括屋頂、牆壁，乃至從地板浮現。構成小屋的所有原子似乎都充滿了天使。我以前曾目睹過這個現象，現在也仍會發生，通常是在特殊事件即將展開之前。我知道這就是天使卡法斯所說的，爲喬而生的特殊事件。


    喬繼續說：「雪再這樣繼續下，天曉得明天早上是否開得了大門。」積雪已經堆得老高，廣報導許多道路已經阻斷。因爲路上積滿冰雪，前往來錫利普的交通也中斷了。


    那一晚，我們讓壁爐的火持續燃燒，由於電力中斷，所以火成爲室內唯一的光源，能這樣窩在小屋裏，我覺得很舒服。孩子們已經上床睡覺，屋裏有足夠的燃料和食物，一切都令人感到舒適、安全。十點左右，喬和我坐在壁爐旁享用茶點和三明治，談著失去的寶寶，最後我們爲他取了名字。


    屋內充滿了閃閃發亮的天使，我注意到有些天使走進臥房，他們回到小前廳時，我聽見他們提到克里斯多夫和歐文：「他們就像小天使般，睡得非常祥和。」


    突然，一切變得寂靜無比，毫無聲響。我起身離開椅子，走到窗邊往外瞧，外面除了白雪，一片漆黑，黑暗中泛著雪光。我有種按捺不住的興奮感，雖然不知道天使要讓什麼事情'
