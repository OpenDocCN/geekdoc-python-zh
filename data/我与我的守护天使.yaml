    靈魂並無不同。假使能看見彼此的靈魂，就不會因為對上帝的詮釋不同而相互殘害。

    有一天，我和阿姨經過她家附近一間教堂，教堂門口站著兩位非常美麗的天使，阿姨轉身對我說：「眼睛不要掃視那間教堂。」我驚訝地望著她，阿姨繼續說：「那是新教的教堂，妳禁止走進任何新教教堂的門。」我回頭看了看進入教堂的人，覺得他們和我們沒有兩樣。下次我又經過那間教堂時，對門口的天使笑了笑。雖然我不可以進入那間教堂，但我知道裏面充滿了天使。


    鄰居莫塔太太是個容貌姣好、身材曼妙的女士，卻經常對走在圍牆上的我們破口大罵。偶爾，她會請我當她孩子的臨時保母。八歲那年，有個午後，她想到我家和媽媽喝杯茶，所以請我去看著她的孩子。就在我走進她家時，有位天使出現在我面前說：「妳到那裏後，要非常小心。」


    我立刻害怕起來，但還是走進她家廚房，只是腳步躊躇。莫塔太太正準備離開，爐子上有個鍋子煮得沸騰。我問她：「要讓它繼續煮嗎？」

    「是的，這會非常美味。」

    「妳不打算熄火嗎？」

    她根本聽不進去，她是那種若不照著她的話做，就會大發雷霆的女人。廚房裏有兩個孩子，一個才剛學會走路，一個是還躺在大娃娃車內的嬰兒。她一離開，我就開始觀察廚房，'
- md: '後門鎖起來了，上面也沒掛著鑰匙。


    突然間，一陣嘶聲，鍋子爆開，我不知道發生什麼事，到處是濃煙和火焰。我記得自己拉著學步兒，又推著娃娃車，想要把車子推到門外的大廳裏。可是鍋子和桌子擋在娃娃車和門之間，我得越過滾燙的鍋子才能出去。娃娃車很重，我推不動，只得拉著學步兒跑到前院，一邊對路過的鄰居大喊房子失火。


    我又跑回屋裏，整個屋子黑煙瀰漫，我非常擔心小嬰兒會在我們回去前遭濃煙嗆到窒息。鄰居跟著我跑進去，感謝上天，他設法把娃娃車推了出來。


    孩子們平安無事，我邊哭邊抖地跑回家去。媽媽和莫塔太太正坐在廚房裏喝茶，什麼也沒聽到。我哭著說，房子著火了，她們立刻往隔壁庭院跑去。我記得莫塔太太雙手環抱著她的小孩，一邊顫抖一邊哭泣。她看著我，跟我道謝。房子一樓整個燻黑，但那位鄰居已經設法把火熄滅了。


    五○年代的愛爾蘭生活相當困頓，工作機會很少，很多人必須移民。家裏的狀況也很差，因為媽媽經常生病住院。媽媽住院時，庭院無人照顧，雜草叢生，因為爸爸忙著工作與照顧我們，根本沒時間整理庭院。即使有我們幫忙，他還是有許多事要做，這讓我非常擔心。在上學途中，我會跟天使說家裏發生的一切，他們要我別擔心，媽媽將會康復。


    爸爸通常一早叫我們起床，幫我們打理準備上學，我們會幫忙做早餐與午餐的三明治。姊姊和我看護弟妹，打掃房子，擺設晚餐要用的餐桌。家裏沒什麼錢，加上還有爸爸往來醫院的額外交通費，所以媽媽住院時，我們晚餐經常只以餅乾和乳酪果腹。


    住在巴里曼那五年，媽媽又生了兩個弟弟，柯爾馬克和迪倫。那時我們七個孩子全都不到十二歲，日子真的很艱困。有段時間爸爸還去英格蘭工作，似乎去了好幾個月，所以庭院再度失去蔬菜的蹤影，一片荒煙蔓草。我會跟天使訴說對爸爸的思念，很難過他必須出遠門。


    我永遠記得爸爸出其不意突然回家的那一天。天使要我看看窗外，只見爸爸穿著大衣，戴著帽子，提著行李，朝屋子走來。我發現他長得真是帥氣。我以爲他會變老，比離家前更老，但他看起來仍然是那麼年輕，事實上他也才三十出頭而已。我非常開心，飛奔到樓下告訴媽媽，然後躲在她的身後，看著她開門歡迎爸爸回家。那一天全家非常高興。


    雖然爸爸必須立即出門找工作，他還是先在庭院忙了起來，我們全都一起幫忙。我一直很喜歡幫爸爸做事，也喜歡種植蔬菜，拔除雜草，請求天使幫助蔬菜長大。我真的很想幫忙，可是那麼小的年紀能做的又有多少？我經常因爲沒辦法幫更多忙而沮喪到哭，不過我會躲到工具室後面，才不會被人瞧見。


    我和對街死巷裏一戶人家的交情也不錯，他們和我家一樣是個大家庭，有個年紀和我一樣大的女孩愛麗絲，我們很要好。她爸爸經常到英格蘭工作，媽媽則忙裏忙外，很辛苦。她爸爸每隔幾個月回家一次。有一天，天使告訴我下次他回家時，將是最後一次歸程，他要到天堂去了。


    我覺得很悲傷，不再想到愛麗絲家去和她一起在庭院裏玩耍。我刻意疏離，盡力不引起注意，特別是不讓愛麗絲察覺。後來有一天我在家時，天使告訴我：「再過幾天，我們會請妳去一趟愛麗絲家，妳一定要去。」


    三天後我被告知到愛麗絲家去。我深深地吸一口氣，跨出自家大門，橫越大馬路，穿過愛麗絲家的側門，繞到屋後敲廚房的門。愛麗絲的媽媽開了門，我朝廚房瞧去，覺得屋內比平日還昏暗些。愛麗絲和一個兄弟在廚房裏，她轉身看見是我，露出一個大大的微笑。我朝屋裏走了幾步，卻不想再更往裏面去。愛麗絲興奮地告訴我她爸爸要回家，不會再出遠門了，他終於在愛爾蘭找到工作安定下來。她是那麼興奮，而我則是很困惑，我爲她感到開心，內心深處卻在哭泣。我知道她媽媽也很期望他能在愛爾蘭找到工作，住在家裏。現在他有了工作，卻無法活著享受。我請愛麗絲到我家來跟我玩，因爲我不想待在她家。


    那天稍晚，我去了教堂，坐在祭壇前和上帝說話，請求祂設法讓愛麗絲的爸爸能夠回家，並且留在家裏。


    愛麗絲爸爸回家那一天，他們一家興奮無比。幾天後，我在她家後院盪鞦韆，其他孩子在前院玩耍，天色突然轉變，一位天使對我說：「轉身張開妳的眼睛。」


    我轉身看著屋子，一道無比明亮的光從天而降，那是一道充滿了天使的亮光。我把那道美麗的亮光稱爲「通往天堂的階梯」。這個景象，還有伴隨而來的歌聲與音樂，美得讓我喘不過氣。雖然我想要往前走去，最後還是留在鞦韆上，輕緩地前後擺盪著。


    那道光穿透屋頂，彷彿也把整棟屋子給裹覆起來。接著，房子的外牆似乎消失了，我看見愛麗絲的爸爸躺在床上，妻子正試圖搖醒他。他的身體躺在那裏，事實上已魂不附體，他的神魂站在床尾，有兩個靈體陪伴著，他似乎認得他們。我並不認得那些靈體，但他們與愛麗絲爸爸的樣貌相似，所以我猜那是要來幫助他步上旅途的家人，此外還有許多天使在場。


    愛麗絲的爸爸在靈體和天使輕柔攙扶下，進入光中，他們在光內的天使圍繞下逐漸上升，天堂般的音樂和歌聲始終不曾間斷。她爸爸和兩個靈體停頓下來，他回頭朝下望了望。


    時間似乎為我停止。突然間，房子又重新回到我視野中，階梯也消失。愛麗絲的母親站在門口呼喊孩子。她的子女都在前院玩耍，我獨自一人坐在後院的鞦韆上。她朝著我的方向看來，但彷彿沒有看見我似的，轉身走出側門到前院去。我坐在那裏，知道愛麗絲和她的兄弟姊妹即將聽到一件噩耗。我感到孤獨悲傷，詢問了陪在我身旁的天使：「他會回來安慰他們嗎？就算只是一下下也好？尤其是愛麗絲，因為她那麼愛他，在他離家時那麼想念他。」


    天使回答：「會的，他很快就會回來，陪他們一段時間。」這讓我安心些。我深吸一口氣，跳下鞦韆，跟天使說：「我現在要回家了。」


    離開時，聽見窗裏傳來哭泣的聲音。我從側門離開，回家去。家裏沒有人，媽媽已經到對街去安慰愛麗絲的母親。


    那是年紀小小的我最傷心的一天，因為我一直以爲所有的爸爸媽媽會永遠活在世界上。


    # 04

    為何躲著我？


    有一天，爸爸開了一輛美麗且閃閃發亮的紅色汽車回家，它看起來龐大無比，不過那可能是因為我還很小的關係。爸爸向朋友借了這輛車，因為我們要去度假，我生平的第一次假期！堆好行李後，爸媽和我們七個孩子全爬進車裏，要去拜訪位在一百九十公里外的克來爾郡蒙夏南（Mountshannon,
    County Clare）鄉下的祖母家。那段旅程似乎花了一整天時間，可是我每分每秒樂在其中，因為我好喜歡看著窗外的風景。爸爸偶爾停車讓大家下來透透氣，運氣好的話，我們還能吃到冰淇淋。


    這是我第一次見到祖父母，他們住在一家青年旅社裏，奶奶是管理員。至今我還記得抵達時的情景：爸爸駛進一座雄偉的大柵門，來到庭院後再穿越一個古老拱門，最後又經過另一個小拱門來到另一個庭院後，眼前隨即出現一棟龐大的老房子，四周還有許多由大石頭蓋成，模樣和房子一樣的車庫。奶奶後來告訴我那些是馬車房，很久以前用來安置馬匹和馬車。


    車停好後，我們跌跌撞撞下了車。我驚訝地看著老房子。爺爺的腿裝了一隻木製義肢，聽說那條腿是年輕時為愛爾蘭的自由而戰時失去的。爺爺奶奶並沒有錢，但是爺爺有一輛很棒的老爺車，經過改裝後他也能支著肢趴趴走。抵達的第一晚，爺爺讓我看一隻從鳥巢摔落的小燕子，他把小燕子放在鞋盒裏，用滴管餵食。另外他還找到一些鳥蛋，幫忙保溫，希望可以孵出小鳥。爺爺看起來很虛弱，彎腰駝背。那晚我注意到環繞他周身的光芒比其他人微弱許多，似乎非常昏暗，難以辨認。但在當時我並沒有想太多。


    奶奶蓄著灰色短髮，身材嬌小，面容姣好，且體態優雅。她辛勤工作，保持旅社的潔淨，也是很棒的廚子，每天花很多時間在廚房裏烤黑麵包、蘋果塔，以及各式各樣美味的菜餚。事實上，爺爺奶奶大部分時間在廚房度過，所以那裏始終瀰漫新鮮的烘焙味道。我最喜歡坐在廚房的桌邊和他們一起喝杯茶，吃塊熱騰騰的黑麵包。


    那棟大房子實在很棒，走出廚房後有一道長廊，放滿了盆花。在夏天，也就是我們造訪的時間，長廊裏隨時擺滿五顏六色的花。長廊底是間玻璃溫室，除了有更多奶奶栽種的花之外，並沒有其他東西。不過我很喜歡溫室，經常花很多時間在裏面和天使說話。


    庭院也非常迷人。馬車房四周的小庭院裏有許多燕子築巢，還有個小柵門，我從來不開柵門，反而喜歡直接爬過去。門另一側是個種有大樹和美麗花朵的花園，花香芬芳，園裏還有兔子和小鳥。坐在某棵大樹傾斜的枝幹上，偶爾還能看到黑鶇鳥巢裏的小雛鳥。花園外面就是田野和開闊的鄉間。我非常喜歡花園，覺得在裏面很安全。


    從第一天抵達蒙夏南開始，我就經常溜出門，走很遠的路散步去，似乎沒人注意到或者在乎我去了哪裏，我也很擅長不引人注意。多數時候，對大人來說，我就像是不存在。有時侯我甚至認爲要是自己真的不存在，他們還更快樂些。不過我不太確定那是因爲我感覺得到他們的想法，或是多年來聽到太多關於我的說法。我還很小的時候，有一回聽見鄰居跟媽媽說我很幸運，沒被關起來，順便把鑰匙丟掉。她那樣說時，媽媽既沒回應也沒為我辯護。


    我會走上幾公里路，穿越泥沼、樹林，走過牧草地，沿著夏南河畔一路前去，從來不曾感到孤獨，因為我會和跟在身邊的天使說話，觀看與傾聽鳥兒和動物的聲音。一旦天使偶爾說：「腳步輕柔，安靜地走。」前面就會出現某種東西讓我觀看。記得他們領我去看一窩小兔子玩耍，我完全入了迷。小兔子沒有跑開，我也就近坐著，好幾個小時一直看著牠們。我知道有些日子我肯定走了好幾里路，但未曾迷路或發生意外。現在想想當初我做過的事，跨越馬路、河流、泥沼和四處是牛隻的田野，不禁訝異自己竟沒受過傷害。其實答案很明顯：上帝和天使一直把我捧在手掌心。天使讓我笑、讓我哭，是我擁有的最好朋友，是我的一切。有一天我又溜了出去，一個天使突然現身，拉住我的手臂。「來吧，羅娜，我們有東西要給妳看，妳一定會喜歡。」


    然後走過田野時，我轉身面對天使，大笑說：「打賭我肯定跑贏你們。」我們使出全力往前衝，結果我摔倒，割傷膝蓋，哭了起來。


    「並不嚴重，只是小擦傷而已。」我的天使說。


    「嗯，對你來說是小擦傷，對我卻是個大擦傷。我覺得很痛，你知道那很刺痛耶！」他們只是笑了笑，然後說：「走吧，快起來，我們要讓妳看個東西。」


    我站起身，當然，馬上就忘記了膝蓋的疼痛。我們走過草地，來到另一端的森林，天使要我傾聽。我注意聽，遠方傳來許多動物的聲音。


    「要聽什麼呢？」我問道。


    「聽某種動物的聲響。把所有聲音一一辨認出來，最後妳就會聽到一個聲音。」天使說，「這樣等妳長大一點，我們就能教妳更清楚聽見我們。」


    於是我一邊穿越樹林，一邊辨認不同的聲音，每踏出一步，地面便傳來枝葉斷裂嗶啪聲。沒多久，我已經能夠辨認鳥類的聲音，麻雀、鷦鷯、鶯雀、黑鶇，以及其他許多鳥類，還能找出牠們的確切位置，就跟辨別四周其他動物一樣毫無困難。我在天使的教導下，似乎很快學會一切。


    接著，我停下來對天使說：「有個哭聲，那是你們要我聽的聲音，對不對？聽起來像是有人在哭泣。」


    我繼續穿越樹林，但樹木似乎越來越高大，森林也變得昏暗。「喔，天使，這裏好暗，你們能把這裏變亮嗎？」


    天使說：「別害怕，跟著哭聲走，跟著妳聽見的聲音走。」


    我照著做了。哭聲把我引到一處空地，我站在那裏傾聽，似乎已經很靠近了，就在我的右邊。我朝右邊荊棘密布的樹林走去，手腳被刮得全是傷，但聲音消失了，更難找到目標。


    天光在我的身後，刺灌木叢裏一片昏暗。


    「天使，我什麼也看不見。」話一說出，一棵樹的底部出現了亮光。


    有個天使說：「看看樹下那片光亮處，就在刺金雀花叢下。」


    我果然找到牠。那是一隻鳥，但不是普通的鳥，而是一隻猛禽。後來我得知那是松雀鷹。牠可能是我見過最乾瘦孱弱、模樣最醜陋的小東西，但對我來說，卻是美麗極了。我把牠拾起來，抬頭看著牠掉下來的大樹梢，我根本爬不上去，更別說把牠放回鳥巢。牠在我手上移動時，我發覺牠受了傷，兩隻腳扭曲變形，脖子也割破，或許是摔落時受的傷。天使告訴我，牠的父母不要牠，所以把牠丟出巢外。


    「這是上帝送給妳的禮物，讓妳在這個暑假和明年夏天照顧牠。但在那之後，牠無法跟你一起回家。」


    有時候天使會說些我聽不懂的話，不過我通常就當成既定事實，接受一切。於是我帶著小鷹穿越樹林和草原回到家，找了個舊帽子和盒子給牠當窩。


    小雛鷹日漸茁壯，不過仍無法正常走路，所以我得帶著牠到處去。牠也無法正常飛行，因為沒辦法雙腳著地。爸爸和我把牠往空中拋向彼此，藉此教牠伸展翅膀，短暫飛翔。


    餵食也是一大難題，牠需要的是血淋淋的生肉，而我無法捕殺獵物來餵牠。我知道肉必須是新鮮的，但牠每次只吃一丁點兒，讓事情更難為。爸媽沒法給我一分半角去買生肉給牠吃，所以我對天使說：「你們讓我很為難。」記得和家人到幾哩外的齊拉雷歐（Killaleo）時，我帶著小鷹到一間肉鋪，跟肉販說我需要生肉來養牠，可是我沒錢。我憎恨自己必須乞討。但肉販人很好，告訴我放假的時候隨時去找他，他會給我生肉。這聽起來很簡單，事實上並非如此，因為爸媽並沒有多餘油錢往來齊拉雷歐和蒙夏南。


    我一直不明白為什麼父母不願協助餵養小鷹，至今仍困惑不已。連不認識的陌生人都肯幫我忙，我的父母卻不願意。媽媽煮飯時，我會去看看是否能要到一點生肉，只要一小湯匙就好，卻惹來媽媽怒斥。我即使願意讓出自己的食物來餵牠，媽媽也不准，弄得我到最後只得去求別人。我總是認爲，假使是其他兄弟姊妹養牠，牠就不會被排斥。我的處境真的很困難。即使如此，牠還是得到食物，逐漸長大茁壯。


    有一天我很悲傷，荷賽司安慰我說：「我們知道有時候妳覺得心情沉重，因為妳還小。但是妳要記得，上帝讓妳與眾不同，一輩子皆如此，因為妳有特殊的使命。」


    我回道：「可是我並不想要啊，為什麼上帝不挑別人來做呢？」


    荷賽司只是對我笑了笑。「有一天妳自己會明白。」


    「我很害怕，很想哭。」


    「妳必須哭泣，因為靈魂要得到自由，正需要妳的眼淚。」


    當時我一點也不懂他的意思。


    奶奶和許多人一樣，也認爲我在某些方面是智障，所以她很少跟我說話。但有一天她說了一些，讓我得知她和家人的許多故事。那天，她邀我幫忙打掃她的臥房，這是她前所未有的舉動，在這之前我只到過她的臥房一、兩次，而且僅是看看而已，什麼也沒碰。但這次她是邀我去幫忙打掃呢！


    奶奶給我一塊布，要我擦桌子，她則整理櫃子，小心地拿起上面的寶貴物品，一件件拂去塵土。我看著她拿起裝在橢圓大相框裏的照片，感覺到她內心有很深的悲傷。她一定感受到我的目光，所以轉過身，帶著照片走過來，坐在古老的大高床上，並拍拍一旁的空位，我隨即爬到床上坐下，兩隻腳懸空擺盪。她拿出一張老照片給我看，上面有個女孩大約與我同齡，衣衫襤褸、打著赤腳、披頭散髮，還有個小男孩蹲在一旁，拿樹枝玩著泥巴和水塘。


    「這是我兩個被上帝帶走的孩子，他們正與上帝同在天堂。」


    說這話的同時，奶奶眼裏泛著淚光。我對她說：「妳會再見到他們，妳知道的，對不對，奶奶？」


    「是啊，羅娜，」她回道：「希望能很快再見到他們。」


    奶奶告訴我他們當時非常貧窮，小兒子湯米可能是因為營養不良，所以生了病。我能在奶奶的言語間感受到一股深沉的悲傷和沉重感。小女兒美莉喉嚨裏長了東西，爺爺背著她騎車騎了好幾十公里路，從威克羅（Wicklow）一路騎到都柏林的醫院。但他這麼努力付出卻依然不夠，醫生還沒能動刀，美莉就死了。奶奶告訴我，當她看著我爸黝黑的帥氣臉龐時，就會幻想如果湯米長大的話，會是什麼樣子；當她看著我和姊妹們時，就想知道美莉又會是什麼模樣。「我知道有一天我可以再度擁抱他們，但是我等不及那天的來臨。」奶奶說。我能感覺到她心中的傷痛，那些發生在她和子女身上的事情所帶來的痛苦。


    接著她沒來由地對我說：「要知道，羅娜，妳不需要害怕。靈體無論如何都無法傷害妳。若是害怕，只要做個小小的祈禱就可以：『耶穌和瑪麗亞，我愛你們，請拯救這些靈'
  mdcn: '後門鎖起來了，上面也沒掛著鑰匙。


    突然間，一陣嘶聲，鍋子爆開，我不知道發生什麼事，到處是濃煙和火焰。我記得自己拉著學步兒，又推著娃娃車，想要把車子推到門外的大廳裏。可是鍋子和桌子擋在娃娃車和門之間，我得越過滾燙的鍋子才能出去。娃娃車很重，我推不動，只得拉著學步兒跑到前院，一邊對路過的鄰居大喊房子失火。


    我又跑回屋裏，整個屋子黑煙瀰漫，我非常擔心小嬰兒會在我們回去前遭濃煙嗆到窒息。鄰居跟著我跑進去，感謝上天，他設法把娃娃車推了出來。


    孩子們平安無事，我邊哭邊抖地跑回家去。媽媽和莫塔太太正坐在廚房裏喝茶，什麼也沒聽到。我哭著說，房子著火了，她們立刻往隔壁庭院跑去。我記得莫塔太太雙手環抱著她的小孩，一邊顫抖一邊哭泣。她看著我，跟我道謝。房子一樓整個燻黑，但那位鄰居已經設法把火熄滅了。


    五○年代的愛爾蘭生活相當困頓，工作機會很少，很多人必須移民。家裏的狀況也很差，因為媽媽經常生病住院。媽媽住院時，庭院無人照顧，雜草叢生，因為爸爸忙著工作與照顧我們，根本沒時間整理庭院。即使有我們幫忙，他還是有許多事要做，這讓我非常擔心。在上學途中，我會跟天使說家裏發生的一切，他們要我別擔心，媽媽將會康復。


    爸爸通常一早叫我們起床，幫我們打理準備上學，我們會幫忙做早餐與午餐的三明治。姊姊和我看護弟妹，打掃房子，擺設晚餐要用的餐桌。家裏沒什麼錢，加上還有爸爸往來醫院的額外交通費，所以媽媽住院時，我們晚餐經常只以餅乾和乳酪果腹。


    住在巴里曼那五年，媽媽又生了兩個弟弟，柯爾馬克和迪倫。那時我們七個孩子全都不到十二歲，日子真的很艱困。有段時間爸爸還去英格蘭工作，似乎去了好幾個月，所以庭院再度失去蔬菜的蹤影，一片荒煙蔓草。我會跟天使訴說對爸爸的思念，很難過他必須出遠門。


    我永遠記得爸爸出其不意突然回家的那一天。天使要我看看窗外，只見爸爸穿著大衣，戴著帽子，提著行李，朝屋子走來。我發現他長得真是帥氣。我以爲他會變老，比離家前更老，但他看起來仍然是那麼年輕，事實上他也才三十出頭而已。我非常開心，飛奔到樓下告訴媽媽，然後躲在她的身後，看著她開門歡迎爸爸回家。那一天全家非常高興。


    雖然爸爸必須立即出門找工作，他還是先在庭院忙了起來，我們全都一起幫忙。我一直很喜歡幫爸爸做事，也喜歡種植蔬菜，拔除雜草，請求天使幫助蔬菜長大。我真的很想幫忙，可是那麼小的年紀能做的又有多少？我經常因爲沒辦法幫更多忙而沮喪到哭，不過我會躲到工具室後面，才不會被人瞧見。


    我和對街死巷裏一戶人家的交情也不錯，他們和我家一樣是個大家庭，有個年紀和我一樣大的女孩愛麗絲，我們很要好。她爸爸經常到英格蘭工作，媽媽則忙裏忙外，很辛苦。她爸爸每隔幾個月回家一次。有一天，天使告訴我下次他回家時，將是最後一次歸程，他要到天堂去了。


    我覺得很悲傷，不再想到愛麗絲家去和她一起在庭院裏玩耍。我刻意疏離，盡力不引起注意，特別是不讓愛麗絲察覺。後來有一天我在家時，天使告訴我：「再過幾天，我們會請妳去一趟愛麗絲家，妳一定要去。」


    三天後我被告知到愛麗絲家去。我深深地吸一口氣，跨出自家大門，橫越大馬路，穿過愛麗絲家的側門，繞到屋後敲廚房的門。愛麗絲的媽媽開了門，我朝廚房瞧去，覺得屋內比平日還昏暗些。愛麗絲和一個兄弟在廚房裏，她轉身看見是我，露出一個大大的微笑。我朝屋裏走了幾步，卻不想再更往裏面去。愛麗絲興奮地告訴我她爸爸要回家，不會再出遠門了，他終於在愛爾蘭找到工作安定下來。她是那麼興奮，而我則是很困惑，我爲她感到開心，內心深處卻在哭泣。我知道她媽媽也很期望他能在愛爾蘭找到工作，住在家裏。現在他有了工作，卻無法活著享受。我請愛麗絲到我家來跟我玩，因爲我不想待在她家。


    那天稍晚，我去了教堂，坐在祭壇前和上帝說話，請求祂設法讓愛麗絲的爸爸能夠回家，並且留在家裏。


    愛麗絲爸爸回家那一天，他們一家興奮無比。幾天後，我在她家後院盪鞦韆，其他孩子在前院玩耍，天色突然轉變，一位天使對我說：「轉身張開妳的眼睛。」


    我轉身看著屋子，一道無比明亮的光從天而降，那是一道充滿了天使的亮光。我把那道美麗的亮光稱爲「通往天堂的階梯」。這個景象，還有伴隨而來的歌聲與音樂，美得讓我喘不過氣。雖然我想要往前走去，最後還是留在鞦韆上，輕緩地前後擺盪著。


    那道光穿透屋頂，彷彿也把整棟屋子給裹覆起來。接著，房子的外牆似乎消失了，我看見愛麗絲的爸爸躺在床上，妻子正試圖搖醒他。他的身體躺在那裏，事實上已魂不附體，他的神魂站在床尾，有兩個靈體陪伴著，他似乎認得他們。我並不認得那些靈體，但他們與愛麗絲爸爸的樣貌相似，所以我猜那是要來幫助他步上旅途的家人，此外還有許多天使在場。


    愛麗絲的爸爸在靈體和天使輕柔攙扶下，進入光中，他們在光內的天使圍繞下逐漸上升，天堂般的音樂和歌聲始終不曾間斷。她爸爸和兩個靈體停頓下來，他回頭朝下望了望。


    時間似乎為我停止。突然間，房子又重新回到我視野中，階梯也消失。愛麗絲的母親站在門口呼喊孩子。她的子女都在前院玩耍，我獨自一人坐在後院的鞦韆上。她朝著我的方向看來，但彷彿沒有看見我似的，轉身走出側門到前院去。我坐在那裏，知道愛麗絲和她的兄弟姊妹即將聽到一件噩耗。我感到孤獨悲傷，詢問了陪在我身旁的天使：「他會回來安慰他們嗎？就算只是一下下也好？尤其是愛麗絲，因為她那麼愛他，在他離家時那麼想念他。」


    天使回答：「會的，他很快就會回來，陪他們一段時間。」這讓我安心些。我深吸一口氣，跳下鞦韆，跟天使說：「我現在要回家了。」


    離開時，聽見窗裏傳來哭泣的聲音。我從側門離開，回家去。家裏沒有人，媽媽已經到對街去安慰愛麗絲的母親。


    那是年紀小小的我最傷心的一天，因為我一直以爲所有的爸爸媽媽會永遠活在世界上。


    # 04

    為何躲著我？


    有一天，爸爸開了一輛美麗且閃閃發亮的紅色汽車回家，它看起來龐大無比，不過那可能是因為我還很小的關係。爸爸向朋友借了這輛車，因為我們要去度假，我生平的第一次假期！堆好行李後，爸媽和我們七個孩子全爬進車裏，要去拜訪位在一百九十公里外的克來爾郡蒙夏南（Mountshannon,
    County Clare）鄉下的祖母家。那段旅程似乎花了一整天時間，可是我每分每秒樂在其中，因為我好喜歡看著窗外的風景。爸爸偶爾停車讓大家下來透透氣，運氣好的話，我們還能吃到冰淇淋。


    這是我第一次見到祖父母，他們住在一家青年旅社裏，奶奶是管理員。至今我還記得抵達時的情景：爸爸駛進一座雄偉的大柵門，來到庭院後再穿越一個古老拱門，最後又經過另一個小拱門來到另一個庭院後，眼前隨即出現一棟龐大的老房子，四周還有許多由大石頭蓋成，模樣和房子一樣的車庫。奶奶後來告訴我那些是馬車房，很久以前用來安置馬匹和馬車。


    車停好後，我們跌跌撞撞下了車。我驚訝地看著老房子。爺爺的腿裝了一隻木製義肢，聽說那條腿是年輕時為愛爾蘭的自由而戰時失去的。爺爺奶奶並沒有錢，但是爺爺有一輛很棒的老爺車，經過改裝後他也能支著肢趴趴走。抵達的第一晚，爺爺讓我看一隻從鳥巢摔落的小燕子，他把小燕子放在鞋盒裏，用滴管餵食。另外他還找到一些鳥蛋，幫忙保溫，希望可以孵出小鳥。爺爺看起來很虛弱，彎腰駝背。那晚我注意到環繞他周身的光芒比其他人微弱許多，似乎非常昏暗，難以辨認。但在當時我並沒有想太多。


    奶奶蓄著灰色短髮，身材嬌小，面容姣好，且體態優雅。她辛勤工作，保持旅社的潔淨，也是很棒的廚子，每天花很多時間在廚房裏烤黑麵包、蘋果塔，以及各式各樣美味的菜餚。事實上，爺爺奶奶大部分時間在廚房度過，所以那裏始終瀰漫新鮮的烘焙味道。我最喜歡坐在廚房的桌邊和他們一起喝杯茶，吃塊熱騰騰的黑麵包。


    那棟大房子實在很棒，走出廚房後有一道長廊，放滿了盆花。在夏天，也就是我們造訪的時間，長廊裏隨時擺滿五顏六色的花。長廊底是間玻璃溫室，除了有更多奶奶栽種的花之外，並沒有其他東西。不過我很喜歡溫室，經常花很多時間在裏面和天使說話。


    庭院也非常迷人。馬車房四周的小庭院裏有許多燕子築巢，還有個小柵門，我從來不開柵門，反而喜歡直接爬過去。門另一側是個種有大樹和美麗花朵的花園，花香芬芳，園裏還有兔子和小鳥。坐在某棵大樹傾斜的枝幹上，偶爾還能看到黑鶇鳥巢裏的小雛鳥。花園外面就是田野和開闊的鄉間。我非常喜歡花園，覺得在裏面很安全。


    從第一天抵達蒙夏南開始，我就經常溜出門，走很遠的路散步去，似乎沒人注意到或者在乎我去了哪裏，我也很擅長不引人注意。多數時候，對大人來說，我就像是不存在。有時侯我甚至認爲要是自己真的不存在，他們還更快樂些。不過我不太確定那是因爲我感覺得到他們的想法，或是多年來聽到太多關於我的說法。我還很小的時候，有一回聽見鄰居跟媽媽說我很幸運，沒被關起來，順便把鑰匙丟掉。她那樣說時，媽媽既沒回應也沒為我辯護。


    我會走上幾公里路，穿越泥沼、樹林，走過牧草地，沿著夏南河畔一路前去，從來不曾感到孤獨，因為我會和跟在身邊的天使說話，觀看與傾聽鳥兒和動物的聲音。一旦天使偶爾說：「腳步輕柔，安靜地走。」前面就會出現某種東西讓我觀看。記得他們領我去看一窩小兔子玩耍，我完全入了迷。小兔子沒有跑開，我也就近坐著，好幾個小時一直看著牠們。我知道有些日子我肯定走了好幾里路，但未曾迷路或發生意外。現在想想當初我做過的事，跨越馬路、河流、泥沼和四處是牛隻的田野，不禁訝異自己竟沒受過傷害。其實答案很明顯：上帝和天使一直把我捧在手掌心。天使讓我笑、讓我哭，是我擁有的最好朋友，是我的一切。有一天我又溜了出去，一個天使突然現身，拉住我的手臂。「來吧，羅娜，我們有東西要給妳看，妳一定會喜歡。」


    然後走過田野時，我轉身面對天使，大笑說：「打賭我肯定跑贏你們。」我們使出全力往前衝，結果我摔倒，割傷膝蓋，哭了起來。


    「並不嚴重，只是小擦傷而已。」我的天使說。


    「嗯，對你來說是小擦傷，對我卻是個大擦傷。我覺得很痛，你知道那很刺痛耶！」他們只是笑了笑，然後說：「走吧，快起來，我們要讓妳看個東西。」


    我站起身，當然，馬上就忘記了膝蓋的疼痛。我們走過草地，來到另一端的森林，天使要我傾聽。我注意聽，遠方傳來許多動物的聲音。


    「要聽什麼呢？」我問道。


    「聽某種動物的聲響。把所有聲音一一辨認出來，最後妳就會聽到一個聲音。」天使說，「這樣等妳長大一點，我們就能教妳更清楚聽見我們。」


    於是我一邊穿越樹林，一邊辨認不同的聲音，每踏出一步，地面便傳來枝葉斷裂嗶啪聲。沒多久，我已經能夠辨認鳥類的聲音，麻雀、鷦鷯、鶯雀、黑鶇，以及其他許多鳥類，還能找出牠們的確切位置，就跟辨別四周其他動物一樣毫無困難。我在天使的教導下，似乎很快學會一切。


    接著，我停下來對天使說：「有個哭聲，那是你們要我聽的聲音，對不對？聽起來像是有人在哭泣。」


    我繼續穿越樹林，但樹木似乎越來越高大，森林也變得昏暗。「喔，天使，這裏好暗，你們能把這裏變亮嗎？」


    天使說：「別害怕，跟著哭聲走，跟著妳聽見的聲音走。」


    我照著做了。哭聲把我引到一處空地，我站在那裏傾聽，似乎已經很靠近了，就在我的右邊。我朝右邊荊棘密布的樹林走去，手腳被刮得全是傷，但聲音消失了，更難找到目標。


    天光在我的身後，刺灌木叢裏一片昏暗。


    「天使，我什麼也看不見。」話一說出，一棵樹的底部出現了亮光。


    有個天使說：「看看樹下那片光亮處，就在刺金雀花叢下。」


    我果然找到牠。那是一隻鳥，但不是普通的鳥，而是一隻猛禽。後來我得知那是松雀鷹。牠可能是我見過最乾瘦孱弱、模樣最醜陋的小東西，但對我來說，卻是美麗極了。我把牠拾起來，抬頭看著牠掉下來的大樹梢，我根本爬不上去，更別說把牠放回鳥巢。牠在我手上移動時，我發覺牠受了傷，兩隻腳扭曲變形，脖子也割破，或許是摔落時受的傷。天使告訴我，牠的父母不要牠，所以把牠丟出巢外。


    「這是上帝送給妳的禮物，讓妳在這個暑假和明年夏天照顧牠。但在那之後，牠無法跟你一起回家。」


    有時候天使會說些我聽不懂的話，不過我通常就當成既定事實，接受一切。於是我帶著小鷹穿越樹林和草原回到家，找了個舊帽子和盒子給牠當窩。


    小雛鷹日漸茁壯，不過仍無法正常走路，所以我得帶著牠到處去。牠也無法正常飛行，因為沒辦法雙腳著地。爸爸和我把牠往空中拋向彼此，藉此教牠伸展翅膀，短暫飛翔。


    餵食也是一大難題，牠需要的是血淋淋的生肉，而我無法捕殺獵物來餵牠。我知道肉必須是新鮮的，但牠每次只吃一丁點兒，讓事情更難為。爸媽沒法給我一分半角去買生肉給牠吃，所以我對天使說：「你們讓我很為難。」記得和家人到幾哩外的齊拉雷歐（Killaleo）時，我帶著小鷹到一間肉鋪，跟肉販說我需要生肉來養牠，可是我沒錢。我憎恨自己必須乞討。但肉販人很好，告訴我放假的時候隨時去找他，他會給我生肉。這聽起來很簡單，事實上並非如此，因為爸媽並沒有多餘油錢往來齊拉雷歐和蒙夏南。


    我一直不明白為什麼父母不願協助餵養小鷹，至今仍困惑不已。連不認識的陌生人都肯幫我忙，我的父母卻不願意。媽媽煮飯時，我會去看看是否能要到一點生肉，只要一小湯匙就好，卻惹來媽媽怒斥。我即使願意讓出自己的食物來餵牠，媽媽也不准，弄得我到最後只得去求別人。我總是認爲，假使是其他兄弟姊妹養牠，牠就不會被排斥。我的處境真的很困難。即使如此，牠還是得到食物，逐漸長大茁壯。


    有一天我很悲傷，荷賽司安慰我說：「我們知道有時候妳覺得心情沉重，因為妳還小。但是妳要記得，上帝讓妳與眾不同，一輩子皆如此，因為妳有特殊的使命。」


    我回道：「可是我並不想要啊，為什麼上帝不挑別人來做呢？」


    荷賽司只是對我笑了笑。「有一天妳自己會明白。」


    「我很害怕，很想哭。」


    「妳必須哭泣，因為靈魂要得到自由，正需要妳的眼淚。」


    當時我一點也不懂他的意思。


    奶奶和許多人一樣，也認爲我在某些方面是智障，所以她很少跟我說話。但有一天她說了一些，讓我得知她和家人的許多故事。那天，她邀我幫忙打掃她的臥房，這是她前所未有的舉動，在這之前我只到過她的臥房一、兩次，而且僅是看看而已，什麼也沒碰。但這次她是邀我去幫忙打掃呢！


    奶奶給我一塊布，要我擦桌子，她則整理櫃子，小心地拿起上面的寶貴物品，一件件拂去塵土。我看著她拿起裝在橢圓大相框裏的照片，感覺到她內心有很深的悲傷。她一定感受到我的目光，所以轉過身，帶著照片走過來，坐在古老的大高床上，並拍拍一旁的空位，我隨即爬到床上坐下，兩隻腳懸空擺盪。她拿出一張老照片給我看，上面有個女孩大約與我同齡，衣衫襤褸、打著赤腳、披頭散髮，還有個小男孩蹲在一旁，拿樹枝玩著泥巴和水塘。


    「這是我兩個被上帝帶走的孩子，他們正與上帝同在天堂。」


    說這話的同時，奶奶眼裏泛著淚光。我對她說：「妳會再見到他們，妳知道的，對不對，奶奶？」


    「是啊，羅娜，」她回道：「希望能很快再見到他們。」


    奶奶告訴我他們當時非常貧窮，小兒子湯米可能是因為營養不良，所以生了病。我能在奶奶的言語間感受到一股深沉的悲傷和沉重感。小女兒美莉喉嚨裏長了東西，爺爺背著她騎車騎了好幾十公里路，從威克羅（Wicklow）一路騎到都柏林的醫院。但他這麼努力付出卻依然不夠，醫生還沒能動刀，美莉就死了。奶奶告訴我，當她看著我爸黝黑的帥氣臉龐時，就會幻想如果湯米長大的話，會是什麼樣子；當她看著我和姊妹們時，就想知道美莉又會是什麼模樣。「我知道有一天我可以再度擁抱他們，但是我等不及那天的來臨。」奶奶說。我能感覺到她心中的傷痛，那些發生在她和子女身上的事情所帶來的痛苦。


    接著她沒來由地對我說：「要知道，羅娜，妳不需要害怕。靈體無論如何都無法傷害妳。若是害怕，只要做個小小的祈禱就可以：『耶穌和瑪麗亞，我愛你們，請拯救這些靈'
