    露絲在廚房裏準備離開時，又問：「媽，妳想爸會沒問題吧？」「我『妳爸會希望妳生日這一天玩得開心。快去吧，如果有事情，我會馬上打電話給妳。」我回道。


    露絲跑回她爸身邊，給他一個吻，跟他說再見。她哥哥克里斯多夫回到家，給自己弄了點晚餐，也和我們一起坐在前廳烤火。他邊吃晚餐邊和他爸聊天，吃完後給喬一個擁抱，說他稍後就回來。


    我獨自和喬待在前廳，喬說：「妳知道我好不容易才活到妳生日這天。」「我知道，謝謝你，這是最好的生日禮物，我也很愛那只戒指。我已經別無所求了。」我給他一個擁抱，天使們圍繞在他身邊，他的守護天使緊抱著他。我微笑了，因為我注意到天使讓孩子以極溫柔的方式，跟他們的父親道別。克里斯多夫在走道上和歐文擦身而過，歐文進來坐在火爐邊和他爸說話。他也打算要出門。喬和我將留在家裏獨自過夜。


    我們坐在火邊聊了一會兒，喬隨後睡著。我坐在他身邊看著電視。大約午夜左右，喬睜開眼睛，一臉困惑，不知道自己在哪裏。我安慰著他，告訴他不要擔心，他在家裏。他帶著微笑看著我。「妳該去睡覺了，羅娜。」「我等你。」我回答。


