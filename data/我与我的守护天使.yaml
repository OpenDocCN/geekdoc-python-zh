  md: '爸爸每隔幾個月回家一次。有一天，天使告訴我下次他回家時，將是最後一次歸程，他要到天堂去了。


    我覺得很悲傷，不再想到愛麗絲家去和她一起在庭院裏玩耍。我刻意疏離，盡力不引起注意，特別是不讓愛麗絲察覺。後來有一天我在家時，天使告訴我：「再過幾天，我們會請妳去一趟愛麗絲家，妳一定要去。」


    三天後我被告知到愛麗絲家去。我深深地吸一口氣，跨出自家大門，橫越大馬路，穿過愛麗絲家的側門，繞到屋後敲廚房的門。愛麗絲的媽媽開了門，我朝廚房瞧去，覺得屋內比平日還昏暗些。愛麗絲和一個兄弟在廚房裏，她轉身看見是我，露出一個大大的微笑。我朝屋裏走了幾步，卻不想再更往裏面去。愛麗絲興奮地告訴我她爸爸要回家，不會再出遠門了，他終於在愛爾蘭找到工作安定下來。她是那麼興奮，而我則是很困惑，我爲她感到開心，內心深處卻在哭泣。我知道她媽媽也很期望他能在愛爾蘭找到工作，住在家裏。現在他有了工作，卻無法活著享受。我請愛麗絲到我家來跟我玩，因爲我不想待在她家。


    那天稍晚，我去了教堂，坐在祭壇前和上帝說話，請求祂設法讓愛麗絲的爸爸能夠回家，並且留在家裏。


    愛麗絲爸爸回家那一天，他們一家興奮無比。幾天後，我在她家後院盪鞦韆，其他孩子在前院玩耍，天色突然轉變，一位天使對我說：「轉身張開妳的眼睛。」


    我轉身看著屋子，一道無比明亮的光從天而降，那是一道充滿了天使的亮光。我把那道美麗的亮光稱爲「通往天堂的階梯」。這個景象，還有伴隨而來的歌聲與音樂，美得讓我喘不'
  merge: -1
