    接著一切迅速恢復正常，稍後我問了妹妹愛歐菲那個年輕人是誰。她說是莎麗的弟弟彼得。之後我也沒把這件事放在心上。

    喬也沒有聯想到此事，沒有想到那靈體就是莎麗失蹤的弟弟。或許我們本來就不該聯想到他。事實上喬的好奇心很重，在正常狀況下，莎麗一離開，他就會告訴我那鬼魂是她的弟弟。但這並非上帝的計畫。他被找到的時機未到。'
