    我們和伊麗莎白及約翰愉快地喝茶，她為我描述了原本住在那裏的柯斯特洛太太的模樣，說她有些像碧翠斯·波特（Beatrice Potter）故事書裏的溫太太（Mrs.
    Tiggwinkle），戴著一頂大帽子，穿著大外套，而且總是帶個大袋子。她獨居，從來沒有訪客。

    約翰邀喬參觀他們的屋子和庭院。從窗戶看著他們的身影，我能看見他們周圍的天使，不禁露出笑容。

    「看妳這樣笑著，似乎很快樂。」伊麗莎白說。

    「我非常快樂。」我回答。能到他們家坐坐，看見伊麗莎白和約翰散發出來的光芒，我覺得很美好。他們夫妻還有一個小男孩，我不確定他年紀多大，大約十歲吧。

    「若需要幫忙，隨時讓我們知道。」伊麗莎白說。謝過他們，告辭之後，喬和我手牽手走路回家。

    隔週六，喬帶他的母親到小屋，我已經在那裏等著他們。喬的母親下了車，給我們一個大擁抱。她四處看過後說：「天啊，從外觀看起來，你們要做的事不少啊。」她要喬打開後車廂，裏面有各式各樣的清潔工具。我們把東西搬進屋裏，她也走進屋內。

    「這棟小屋可以營造出一個美好家庭。」她說。

    接下來兩天我們做了不少清理工作。這樣花時間一起相處，讓我有機會深入認識喬的母親，我們相處愉快，那兩天過得很開心，也完成許多工作。喬的母親非常聰慧。等我們要舉行婚禮時，小屋也幾乎可以住人了。'
