- md: '子，最前方有一張桌子和椅子。約有二十人參加拍賣競標。我們坐在右邊中間的位置，莫菲的人坐在左邊。拍賣小屋之前，先進行了其他多筆拍賣，那片土地也在其中，莫菲公司最後如願標得。


    在漫長的等待後，終於輪到小屋，它是最後一筆拍賣物件。競標開始，一位女士舉手喊價，爸爸也舉手喊出更高價，莫菲公司跟著出價，爸又出價，這樣來來回回一段時間後，那位女士放棄。爸爸出價後，莫菲公司又出了一次，便停止競標。然後爸爸喊出：「二千五百鎊。」沒有其他人跟進，主持人於是宣布：「賣出！」我終於鬆了一口氣。


    拍賣員示意爸爸到前面去，爸爸卻回頭對喬和我說：「你們最好一起來，讓他們知道購屋的是你們。」


    拍賣員詢問爸爸的名字，爸爸驕傲地說他只負責出價，要買房的是喬和我。他取得我們的名字，要求付訂金，爸爸毫不猶豫說由他來處理。


    訂金是標價的百分之十，也就是二百五十鎊，對我來說是一筆大數目，因此當我看著爸爸拿出支票本，簽下支票的那一刻，心中湧出說不盡的愛和情意，很高興他願意為我們這麼做，讓我想要上前擁抱他。


    爸媽開車送我們回喬的母親家。抵達時，喬的母親正站在庭院欄杆旁和鄰居說話。喬再度邀請爸媽進屋喝杯茶，他們仍然謝絕邀請。我們下車時，喬的母親也來到柵門前。我父母揮手道別後便開車離去。我們立刻告訴喬的母親好消息。


    「先進屋裏去，」她說，「邊喝茶邊告訴我整個過程，我想知道全部的細節，而且我剛烤好蘋果塔。」


    我們進入廚房，喬的母親開始燒水，桌上已經擺好杯盤、牛奶、糖和蘋果塔。茶準備好後，我們三人坐在廚房桌邊，喬的母親迫不及待想知道每個細節。屋子裏很熱鬧，喬的家人進進出出，都想知道小屋的消息。有人說：「梅努斯還挺遠的，一想到你們要搬到鄉下，我們永遠沒法習慣。」我笑著說：「你們大概以爲我們是搬到千里之外，而非只有四十公里遠。」


    喬的母親問道：「什麼時候可以去幫你們打掃屋子？」


    喬看了我一眼，我說：「下個週末我休長週末。」喬說他也休假，所以我們決定週六上午在小屋會面。稍晚，喬送我回家，這天發生的一切讓我們很興奮。


    幾天後，喬和我決定從來錫利普走路到梅努斯，展開打掃工作。我們心情相當激奮。抵達時，柵門開著，我們四處尋找鑰匙，花了一些時間，最後喬在小屋遠端的石頭下找到。


    隔壁鄰居可能聽到我們的聲音，一位女士來到柵門前喊道：「哈囉，我是隔壁鄰居。」


    「哈囉，」我朝柵門處喊去，「我是羅娜。我們在六個月內結婚後，將要搬進來。」


    「那真是太棒了。」她開懷笑著說，「能有鄰居真是太好了，我是伊麗莎白。」


    我邀請伊麗莎白進來，我們走過雜草叢生的車道，轉向右邊沿著小屋外牆來到大門口。喬站在那裏，我介紹他是我的未婚夫。她很開心能認識他。


    「你們真是可愛的一對。」她說。


    我邀請伊麗莎白到屋裏，喬用鑰匙開了門，我們邊談邊走進屋內。


    「我很擔心讓你們看見屋內狀況有多差。這裏已經閒置很久，原本的屋主柯斯特洛老太太很久以前過世了。」她說。


    「沒關係的，伊麗莎白。」我說。我們一起察看各個房間。


    「我們很快就會把屋子整理好，努力洗刷、撕下壁紙、換掉地毯、清除舊家具，」喬四處張望著，「也許還能留下某些舊家具，餐桌看起來還堪用，那些手扶椅和斗櫃也還好。」


    事實上我們沒有家具，而且沒什麼錢可花，所以打算能留就留，也接收別人給我們的舊家具。


    「那些洗乾淨後就跟新的一樣了。」伊麗莎白說：「對了，我先生還能幫你們做些粗重的工作。」


    我們還來不及回應，她就衝出門去找她丈夫。我們笑了，因為伊麗莎白是位令人愉快的女士，我覺得她圓圓胖胖的模樣很可愛，而且有個美麗的笑容。她周圍的能量充滿許多愛與關心，是個高尚的人。


    她很快就跟一位高高瘦瘦的男人回來，他膚色蒼白，臉上有很深的皺紋，是一張充滿個性的臉。「哈囉，你好嗎？」他說。


    「這是我先生，約翰。」伊麗莎白將我們介紹給他認識，解釋我們不久將會結婚，並且搬進來。


    「喬，這裏要做的事可多了。有一大堆呢！」約翰說。


    「你說的沒錯。」喬回答，「我們到後面去看看工具間的狀況。」


    兩位男士出去後，客廳只剩下伊麗莎白和我，裏面空間很小，但有個壁爐。我們走進臥室，仔細四處察看。整個房間發出惡臭。


    「老天啊，這些窗簾真是髒啊，狀況很糟，可是我們沒錢買新的。」我說。


    「羅娜，別擔心。」伊麗莎白回道，「這個星期我把窗簾拆下來洗，反正我現在沒什麼事做。」


    我簡直不敢相信。「伊麗莎白，要洗的窗簾可不少啊！」


    「我洗好、燙好後，再掛回窗戶上。我洗窗簾時，會讓約翰來洗窗子。」


    我們有一間臥室、一間小前廳、一間小廚房，還有另一間也可以當臥室的小房間，不過室內沒有廁所或浴室。


    「對新成立的小家庭來說，廚房的大小差不多。」伊麗莎白說，「不過你們最好把那個小房間改成浴室，以後若有小孩，可能用得上。」


    「我們當然會有小孩。」我語氣肯定，因為天使以萊亞已經告訴過我。「不過，現在只能先使用戶外廁所。不知道那個廁所狀況如何？」


    我們繞到屋子後面，那邊也是一片荒煙蔓草，樹籬遮住一切，什麼也看不到。到處都是長及腰際的野草、雜草、蕁麻、刺藤等，我們經過一番掙扎才走到她說的廁所位置。


    我們沒看見喬或約翰，不過找到了廁所，那是一間有門的長形棚子，裏面有馬桶，雖然沒有馬桶坐墊，但還堪用，情況還不算糟。我詢問伊麗莎白旁邊的建築是什麼。


    「那是另一個小棚子，我們那邊也有一樣的棚子。」


    我們聽見喬和約翰的聲音。「別往那棚子裏面瞧。」喬說。這當然無法阻止我的好奇心。「喔,既然你那樣說,我偷看一眼就好。」我看了一眼,裏面堆滿各式各樣的雜物。「另一間棚子又是怎樣呢?」我問道。


    「最好也別看。那邊有個更大一點的棚子,下面有個豬舍,那是個有外牆的小棚子。還有一道門,通往一個小院子,是個養雞的理想場所。裏面當然也堆滿垃圾,下回喬來的時候,我會幫忙一起清理出來燒掉。」約翰說。


    「天啊,約翰,你真是太好的幫手了。」我說。


    約翰轉身說:「伊麗莎白,我們該離開了,讓他們有自己的空間。」


    伊麗莎白離開時,又轉身對我們說：「回家前,要不要來喝杯茶?歡迎你們來。」


    「你想去嗎?」我問喬,他點了點頭。「好的,五到十分鐘後過去,我們還要再四處看,整理出一些頭緒。」我真的很開心,喬也一樣。「這房子屬於我們了,太棒了,不是嗎?雖然有很多事情要做,但我知道我們辦得到。」


    我們回到屋內,喬動手拉下牆上的壁紙,想了解清理起來有多困難。情況不太差。地板上的地毯已經嚴重磨損,我們合力拉起來,結果發現每拉起一層,下面還有一層,而最底層竟然還有一層厚厚的報紙,數百張報紙黏在一起。我們四目相對,不知所措。


    「去找個工具來試試能否移開這些東西。」喬提出建議。


    我們找到一根木棒,撬開一層又一層的地毯和報紙後,出現了稻草和黏土。最後,在那之下,雖然難以置信,但是木材地板終於現身,而且狀況還不錯。隨後我們從伊麗莎白那邊得知一切都是為了隔絕溫度，使房子能夠保暖。


    我們和伊麗莎白及約翰愉快地喝茶，她為我描述了原本住在那裏的柯斯特洛太太的模樣，說她有些像碧翠斯·波特（Beatrice Potter）故事書裏的溫太太（Mrs.
    Tiggwinkle），戴著一頂大帽子，穿著大外套，而且總是帶個大袋子。她獨居，從來沒有訪客。


    約翰邀喬參觀他們的屋子和庭院。從窗戶看著他們的身影，我能看見他們周圍的天使，不禁露出笑容。


    「看妳這樣笑著，似乎很快樂。」伊麗莎白說。


    「我非常快樂。」我回答。能到他們家坐坐，看見伊麗莎白和約翰散發出來的光芒，我覺得很美好。他們夫妻還有一個小男孩，我不確定他年紀多大，大約十歲吧。


    「若需要幫忙，隨時讓我們知道。」伊麗莎白說。謝過他們，告辭之後，喬和我手牽手走路回家。


    隔週六，喬帶他的母親到小屋，我已經在那裏等著他們。喬的母親下了車，給我們一個大擁抱。她四處看過後說：「天啊，從外觀看起來，你們要做的事不少啊。」她要喬打開後車廂，裏面有各式各樣的清潔工具。我們把東西搬進屋裏，她也走進屋內。


    「這棟小屋可以營造出一個美好家庭。」她說。


    接下來兩天我們做了不少清理工作。這樣花時間一起相處，讓我有機會深入認識喬的母親，我們相處愉快，那兩天過得很開心，也完成許多工作。喬的母親非常聰慧。等我們要舉行婚禮時，小屋也幾乎可以住人了。


    ## 13 告白


    一天早上，寶琳和我在樓下的衣帽間討論婚紗，她問主管能否把我們的午休時間排在一起，才能去布店選材料。主管欣然同意。


    一百種花樣和布料，過程非常精彩有趣。多次利用午休挑選布料之後，我終於找到一塊真心喜歡，而且覺得適合用於婚紗的布料，那是一塊有酒紅色小野花點綴的乳白色布料。寶琳也找到一塊能搭配我的婚紗花色的美麗布料。但我並未買下任何布料，因為我知道媽媽會希望跟我一起採購婚紗。


    儘管我們花了很多時間挑選布料，我始終無法告訴寶琳婚宴將在家中舉行。我不敢告訴她和其他女孩。有一天，我問天使什麼時候是對朋友表白的最佳時機，他們說：「現在。」


    「你是說現在，在午茶時間？」我問道。


    「是的。」天使們回答。我走到販賣部，薇樂莉和瑪麗坐在我們的老位置。我端了茶和點心，加入她們。我一坐下，薇樂莉問道：「羅娜，我們等不及想知道婚宴在哪裏舉行？」我的朋友臉上充滿期待與微笑。


    「在我父母位於來錫利普的家中。」從臉上的表情，看得出她們很震驚。


    「妳在開玩笑吧，羅娜？」瑪麗說。


    「沒有，」我說，「我不會拿婚禮這樣大的事情來開玩笑。」


    她們又問了我許多問題，包括爲何爸媽要在家裏接待客人。我回答這是我母親的家族傳統，她已經決定這麼做。她們又問道有誰會來參加婚禮。


    「大都是家族朋友，我父母、兄弟姊妹、叔叔、阿姨、喬的家人，當然還有妳們兩位和我的伴娘寶琳。大約三十位一起用餐，還有些鄰居會去教堂觀禮。」


    幾天後，我在販賣部和女孩們一起用餐時，薇樂莉說她對婚宴有個建議。


    「這樣好不好，羅娜，用餐後，我們到都柏林的酒吧聽音樂跳舞，慶祝一下。」


    「這個主意很棒，喬應該會同意，因爲我們無法在家裏跳舞。那天早上妳們要如何前往來錫利普的教堂呢？」


    「我們打算在都柏林會合，」薇樂莉說，「一起搭公車到教堂。希望那天不要下雨，因爲我們不想帶外套，也希望從教堂到妳家不用走太遠，因爲我們要穿高跟鞋去！」


    「兩分鐘而已。」我向她們保證，「妳們最好早點到。」大家開心笑說她們真的很期待那一天。


    當天稍晚流行服飾部打烊前，寶琳幫我一起整理吊桿，我對她說：「我該告訴妳婚宴要在哪裏舉行了。」


    「我已經從其他女孩那邊得知，要在妳父母家裏舉辦。」寶琳說，「我覺得那很棒。」


    我謝謝她這麼說。


    那天下班回到家,媽媽建議隔天我休假時,一起去挑選布料。雖然我已經選好婚紗布料,還是滿心期待能跟媽媽一起進城挑選。當然,我並未告訴她我已經選好,我知道媽喜歡逛店鋪,所以隻字未提。


    隔天早上我和媽媽一起逛布料百貨和店鋪,一路上雖然好玩,但媽媽開始對我不耐煩,因為她看到許多完美的布料,我卻什麼也不喜歡。


    「我不想要穿傳統的款式,」我對媽說,「而且我絕對不要穿純白的。媽,前面還有一家布料店,妳以前帶我去過一次,就在克利絲旁的巷子裏。」


    喝過茶後,媽媽帶頭到了那家布店,我們翻看許多大捲的布料,有立著的、平擺在櫃台上的,當我們來到我選定的那一塊布時,我對媽說:「我覺得這塊布料很漂亮,我喜歡乳白色,還有上面點綴的酒紅小花,而且旁邊這一塊也很適合伴娘的禮服。」


    「沒錯,是很美麗,兩塊布很相襯。」媽媽這樣說時,天使全都圍著我們。她問道:「這塊布要多少錢?」我差點大笑,因為天使們吟誦著:「沒有標籤、沒有標籤。」我知道天使們讓標籤消失了。


    媽媽決定找個店員來問價錢,天使隨即停止原來在做的事,一起搖著手,示意「不可以」。我隨即明白我得阻止媽媽,因為她會認爲價錢太貴,要我買便宜一點的布料。我不願那麼做,但也不想讓她傷心。


    「媽,別擔心,我會支付布料和款式樣版等所有禮服需要的花費,我們去看款式冊吧。」


    天使牽著媽媽的手，一起走向款式冊所在的牆面。為了節省時間，我向媽媽建議各看一本。至少看了五本以後，我才找到之前看過的款式。我請媽媽過來。「妳看，這個款式搭配我選的布料一定很漂亮。」


    媽媽很會做衣服，只要閱讀說明就知道兩件禮服需要多少布料。她算好所需的布料後，我們便到櫃台去請人幫助。店員把兩捲布擺在櫃台上，一尺一尺量好，布越堆越高。店員把布料摺得漂漂亮亮，然後放進袋子裏，同時也把樣版和收邊的材料包好。


    「一共是二十五磅。」她說。


    我要付錢的時候，媽媽說她想為我支付婚紗材料的費用，我很高興她想這麼做，但仍說：「不用了，媽，這太貴了。」可是媽媽很堅持，我也就順了她的意。她付錢給店員時，看起來既快樂又驕傲。我們謝過店員，要離開店鋪時，有位天使站在門口，我輕聲向天使道謝，然後上路回家。我們走向公車站，我拿著袋子，跟媽媽道謝。


    我就像個孩子一樣興奮無比，想要把布料帶到喬的家，讓喬看看。那一晚，喬的母親說：「我得跟妳的父母見個面，可以請妳邀他們星期天來用餐嗎？」


    那晚喬送我回家，我跟平常一樣從後門進屋，很驚訝爸媽還在餐廳裏，便抓住機會。「哈囉，沒想到你們還沒睡。對了，喬的媽媽想邀請你們星期天五點過去用餐。」


    媽沒什麼反應，但爸爸說：「我們一定到。告訴喬的媽媽我們星期天五點到。」我聽了很開心，問他們要不要喝杯茶，爸爸婉拒了，並說：「上床睡覺去。」我便道了晚安。


    隔天下班後，我搭公車到喬他家，告訴他母親我的父母星期日會過來。她很高興，也有點緊張。我知道她費了很大的功夫為星期日準備一頓完美的晚餐。


    我和父母抵達喬的家赴約的時候，爸爸敲了門，我很高興看見喬來開門。喬歡迎爸媽進屋，並給我一個擁抱。我們進入餐廳，餐桌擺設得有如皇家宴會般，令人難以置信。喬為我們介紹他的母親、姊姊芭芭拉、姊夫和他們的孩子。不過，剛開始時發生一件有趣的事，芭芭拉一直要幫媽媽把外套脫下掛起來，媽一直說：「不用，沒關係。」


    我把喬拉到一邊，偷偷告訴他：「那不是外套，那是外套式洋裝，你去告訴芭芭拉不要再問了，不然我會笑出來。」


    喬說他從未聽過外套式洋裝，當他回到餐廳時，芭芭拉再度詢問媽媽是否要脫下外套，喬打斷了她，趕緊為媽媽拉出椅子，請她坐下。


    那是一頓美好的晚餐，有烤牛肉、烤馬鈴薯、高麗菜和紅蘿蔔，點心是美味的奶油蘋果派。我從未吃過更好吃的蘋果派。喬的媽媽讓我們感到光榮，一切也進行得非常順利。


    那個夏天，在我們結婚之前，天使不斷要我讓喬知道一點我的祕密。我也多次告訴他們我的憂慮。我很想跟某人分享我的祕密，特別是喬，但也害怕面對他的反應，萬一他不相信我呢？


    「妳只能分享一點點，」天使說，「一次一點點，不能再多。羅娜，要記住，妳永遠不能說出全部的祕密，有些祕密絕對不能公開。下次有適當的機會時，我們會協助妳。」


    幾天後的某一晚,喬送我回家,他提議開車到山上兜風。


    「這是個美麗的夜晚,」他說,「今晚滿月,希望天上能布滿星星。我知道有個地方能停車觀賞都柏林美麗的夜景和遠處的海洋。」


    我們抵達時,那裏已經停了許多車。「我們下車走走,到那邊牆上坐一會兒。」我說。


    那道牆只是一堆四散的石頭,但我們還是坐下來。喬把我抱在懷裏,讓我很有安全感,我們親吻彼此。我不知道究竟坐了多久,但我突然發現天空充滿星星。有些星星開始旋轉、落下,逐漸接近地面時,我才看出那是天使。我聽見天使說:「現在是跟喬分享一點祕密的時機。」


    我在喬的懷裏轉身,說我有事情要告訴他。他看著我,問我是否跟婚禮有關。


    「不是,」我說,「其實是跟我有關。我想告訴你,我能看見一般人平常看不見的東西。有時候我能看見天使。」


    他臉上浮現出完全不相信的表情,看著我笑說:「羅娜,就我所知,只有修女和神父能看見天使。這太可笑了!妳我這樣的普通人是看不見天使的。」


    我緊張地看著他,這正是我所擔心的事情。我在心底向圍繞在四周的千百位天使大喊:「快幫忙!」


    喬給我一個擁抱,便不再多說。


    「走吧,明天還要工作。」


    回家的路上我們緘默無聲,只說了幾個字。喬開著車,不時看著我,彷彿在說:「我給自己找了什麼麻煩？」


    我對天使說：「喬的反應一點也不好。」


    抵達我家門口時，喬說：「羅娜，妳要我相信的是一件我想也沒想過的事情。」不過當他抱住我、吻我的時候，我又感到安心多了。


    走向後門時，我還是不停對天使哭訴。天使說：「別擔心，羅娜，這只是喬開始認識妳的起步而已。」


    我不知道該如何讓他相信我，但是過不久我就有了機會。


    喬雖然已經不再為爸爸工作，偶爾還是會到加油站幫忙。某個星期四晚上下班時，我看見一個靈視影像，有許多玻璃和大窗戶，光線從玻璃上反射出來，使我無法看清一切，但周圍似乎是黑暗的。「這是怎麼回事？」我問天使。


    天使說：「跟喬說。」


    「我不想說。」我回答。


    「記住妳的靈視影像，羅娜，」天使說，「妳看見事件的地點嗎？」「在加油站。」


    當晚，我跟喬說了。「那沒什麼意義。」他回答。


    我們沒再多說什麼，但我很擔心，又對天使哭訴。星期五我再度看見影像，這次我看見喬在車內，好像要開車去加油，有人對著車子走來，喬則把窗戶搖下。接著影像消失了。


    我告訴喬我又看見靈視影像，還解釋了細節。「那是個警告，我不希望你受傷。」


    「我不相信這種事。」喬說。「妳爸來電留言，加油站的晚班人員離職，他需要我週末去幫忙，因為星期六的午夜到早上七點沒有人值班。」


    我再度看見同一個影像，而且更加詳細。我看見喬把窗戶搖下，有兩個人，其中一人在他的臉上揍了一拳；我看見喬在警察局裏，警察相信另一人所言，不相信喬。我不知道究竟發生什麼事，非常沮喪，因此又對天使訴苦。


    「喬會被揍到流鼻血。」天使說，「除此之外，他不會有事。記住這個靈視影像，雖然警察不相信他，不過最後會水落石出。」下班後，我到喬的家。喬和我到附近住宅區散步，我請求他相信我，甚至火氣都上來了：「你為什麼不肯聽我說？」


    一路上，他的守護天使始終在他耳邊輕語。我很想對他大喊：「你的守護天使也正在對你說話，但你就是不肯聽。」喬看我似乎生氣了，因此承諾那個週末他會很小心。


    週末來臨，預言成真，一切如我所看見的那樣發生了。


    那晚，喬修理客人的車，並把車開去加油。車主的朋友經過時，認定喬在偷車。他對喬大喊，喬把窗戶搖下時，他就朝喬的臉上揍了一拳，然後報警。警察不相信喬的解釋，於是逮捕他。爸爸把喬保釋出來，事情才真相大白。那晚的事件讓喬對我有了進一步的認識。


    婚禮前兩週，寶琳、薇樂莉和瑪麗帶我去慶祝婚前的單身之夜。以前我從未在下班後跟她們出去。她們先帶我到薇樂莉星期五晚上最常光顧的史密斯酒吧，許多客人是百貨公司的'
  mdcn: '子，最前方有一張桌子和椅子。約有二十人參加拍賣競標。我們坐在右邊中間的位置，莫菲的人坐在左邊。拍賣小屋之前，先進行了其他多筆拍賣，那片土地也在其中，莫菲公司最後如願標得。


    在漫長的等待後，終於輪到小屋，它是最後一筆拍賣物件。競標開始，一位女士舉手喊價，爸爸也舉手喊出更高價，莫菲公司跟著出價，爸又出價，這樣來來回回一段時間後，那位女士放棄。爸爸出價後，莫菲公司又出了一次，便停止競標。然後爸爸喊出：「二千五百鎊。」沒有其他人跟進，主持人於是宣布：「賣出！」我終於鬆了一口氣。


    拍賣員示意爸爸到前面去，爸爸卻回頭對喬和我說：「你們最好一起來，讓他們知道購屋的是你們。」


    拍賣員詢問爸爸的名字，爸爸驕傲地說他只負責出價，要買房的是喬和我。他取得我們的名字，要求付訂金，爸爸毫不猶豫說由他來處理。


    訂金是標價的百分之十，也就是二百五十鎊，對我來說是一筆大數目，因此當我看著爸爸拿出支票本，簽下支票的那一刻，心中湧出說不盡的愛和情意，很高興他願意為我們這麼做，讓我想要上前擁抱他。


    爸媽開車送我們回喬的母親家。抵達時，喬的母親正站在庭院欄杆旁和鄰居說話。喬再度邀請爸媽進屋喝杯茶，他們仍然謝絕邀請。我們下車時，喬的母親也來到柵門前。我父母揮手道別後便開車離去。我們立刻告訴喬的母親好消息。


    「先進屋裏去，」她說，「邊喝茶邊告訴我整個過程，我想知道全部的細節，而且我剛烤好蘋果塔。」


    我們進入廚房，喬的母親開始燒水，桌上已經擺好杯盤、牛奶、糖和蘋果塔。茶準備好後，我們三人坐在廚房桌邊，喬的母親迫不及待想知道每個細節。屋子裏很熱鬧，喬的家人進進出出，都想知道小屋的消息。有人說：「梅努斯還挺遠的，一想到你們要搬到鄉下，我們永遠沒法習慣。」我笑著說：「你們大概以爲我們是搬到千里之外，而非只有四十公里遠。」


    喬的母親問道：「什麼時候可以去幫你們打掃屋子？」


    喬看了我一眼，我說：「下個週末我休長週末。」喬說他也休假，所以我們決定週六上午在小屋會面。稍晚，喬送我回家，這天發生的一切讓我們很興奮。


    幾天後，喬和我決定從來錫利普走路到梅努斯，展開打掃工作。我們心情相當激奮。抵達時，柵門開著，我們四處尋找鑰匙，花了一些時間，最後喬在小屋遠端的石頭下找到。


    隔壁鄰居可能聽到我們的聲音，一位女士來到柵門前喊道：「哈囉，我是隔壁鄰居。」


    「哈囉，」我朝柵門處喊去，「我是羅娜。我們在六個月內結婚後，將要搬進來。」


    「那真是太棒了。」她開懷笑著說，「能有鄰居真是太好了，我是伊麗莎白。」


    我邀請伊麗莎白進來，我們走過雜草叢生的車道，轉向右邊沿著小屋外牆來到大門口。喬站在那裏，我介紹他是我的未婚夫。她很開心能認識他。


    「你們真是可愛的一對。」她說。


    我邀請伊麗莎白到屋裏，喬用鑰匙開了門，我們邊談邊走進屋內。


    「我很擔心讓你們看見屋內狀況有多差。這裏已經閒置很久，原本的屋主柯斯特洛老太太很久以前過世了。」她說。


    「沒關係的，伊麗莎白。」我說。我們一起察看各個房間。


    「我們很快就會把屋子整理好，努力洗刷、撕下壁紙、換掉地毯、清除舊家具，」喬四處張望著，「也許還能留下某些舊家具，餐桌看起來還堪用，那些手扶椅和斗櫃也還好。」


    事實上我們沒有家具，而且沒什麼錢可花，所以打算能留就留，也接收別人給我們的舊家具。


    「那些洗乾淨後就跟新的一樣了。」伊麗莎白說：「對了，我先生還能幫你們做些粗重的工作。」


    我們還來不及回應，她就衝出門去找她丈夫。我們笑了，因為伊麗莎白是位令人愉快的女士，我覺得她圓圓胖胖的模樣很可愛，而且有個美麗的笑容。她周圍的能量充滿許多愛與關心，是個高尚的人。


    她很快就跟一位高高瘦瘦的男人回來，他膚色蒼白，臉上有很深的皺紋，是一張充滿個性的臉。「哈囉，你好嗎？」他說。


    「這是我先生，約翰。」伊麗莎白將我們介紹給他認識，解釋我們不久將會結婚，並且搬進來。


    「喬，這裏要做的事可多了。有一大堆呢！」約翰說。


    「你說的沒錯。」喬回答，「我們到後面去看看工具間的狀況。」


    兩位男士出去後，客廳只剩下伊麗莎白和我，裏面空間很小，但有個壁爐。我們走進臥室，仔細四處察看。整個房間發出惡臭。


    「老天啊，這些窗簾真是髒啊，狀況很糟，可是我們沒錢買新的。」我說。


    「羅娜，別擔心。」伊麗莎白回道，「這個星期我把窗簾拆下來洗，反正我現在沒什麼事做。」


    我簡直不敢相信。「伊麗莎白，要洗的窗簾可不少啊！」


    「我洗好、燙好後，再掛回窗戶上。我洗窗簾時，會讓約翰來洗窗子。」


    我們有一間臥室、一間小前廳、一間小廚房，還有另一間也可以當臥室的小房間，不過室內沒有廁所或浴室。


    「對新成立的小家庭來說，廚房的大小差不多。」伊麗莎白說，「不過你們最好把那個小房間改成浴室，以後若有小孩，可能用得上。」


    「我們當然會有小孩。」我語氣肯定，因為天使以萊亞已經告訴過我。「不過，現在只能先使用戶外廁所。不知道那個廁所狀況如何？」


    我們繞到屋子後面，那邊也是一片荒煙蔓草，樹籬遮住一切，什麼也看不到。到處都是長及腰際的野草、雜草、蕁麻、刺藤等，我們經過一番掙扎才走到她說的廁所位置。


    我們沒看見喬或約翰，不過找到了廁所，那是一間有門的長形棚子，裏面有馬桶，雖然沒有馬桶坐墊，但還堪用，情況還不算糟。我詢問伊麗莎白旁邊的建築是什麼。


    「那是另一個小棚子，我們那邊也有一樣的棚子。」


    我們聽見喬和約翰的聲音。「別往那棚子裏面瞧。」喬說。這當然無法阻止我的好奇心。「喔,既然你那樣說,我偷看一眼就好。」我看了一眼,裏面堆滿各式各樣的雜物。「另一間棚子又是怎樣呢?」我問道。


    「最好也別看。那邊有個更大一點的棚子,下面有個豬舍,那是個有外牆的小棚子。還有一道門,通往一個小院子,是個養雞的理想場所。裏面當然也堆滿垃圾,下回喬來的時候,我會幫忙一起清理出來燒掉。」約翰說。


    「天啊,約翰,你真是太好的幫手了。」我說。


    約翰轉身說:「伊麗莎白,我們該離開了,讓他們有自己的空間。」


    伊麗莎白離開時,又轉身對我們說：「回家前,要不要來喝杯茶?歡迎你們來。」


    「你想去嗎?」我問喬,他點了點頭。「好的,五到十分鐘後過去,我們還要再四處看,整理出一些頭緒。」我真的很開心,喬也一樣。「這房子屬於我們了,太棒了,不是嗎?雖然有很多事情要做,但我知道我們辦得到。」


    我們回到屋內,喬動手拉下牆上的壁紙,想了解清理起來有多困難。情況不太差。地板上的地毯已經嚴重磨損,我們合力拉起來,結果發現每拉起一層,下面還有一層,而最底層竟然還有一層厚厚的報紙,數百張報紙黏在一起。我們四目相對,不知所措。


    「去找個工具來試試能否移開這些東西。」喬提出建議。


    我們找到一根木棒,撬開一層又一層的地毯和報紙後,出現了稻草和黏土。最後,在那之下,雖然難以置信,但是木材地板終於現身,而且狀況還不錯。隨後我們從伊麗莎白那邊得知一切都是為了隔絕溫度，使房子能夠保暖。


    我們和伊麗莎白及約翰愉快地喝茶，她為我描述了原本住在那裏的柯斯特洛太太的模樣，說她有些像碧翠斯·波特（Beatrice Potter）故事書裏的溫太太（Mrs.
    Tiggwinkle），戴著一頂大帽子，穿著大外套，而且總是帶個大袋子。她獨居，從來沒有訪客。


    約翰邀喬參觀他們的屋子和庭院。從窗戶看著他們的身影，我能看見他們周圍的天使，不禁露出笑容。


    「看妳這樣笑著，似乎很快樂。」伊麗莎白說。


    「我非常快樂。」我回答。能到他們家坐坐，看見伊麗莎白和約翰散發出來的光芒，我覺得很美好。他們夫妻還有一個小男孩，我不確定他年紀多大，大約十歲吧。


    「若需要幫忙，隨時讓我們知道。」伊麗莎白說。謝過他們，告辭之後，喬和我手牽手走路回家。


    隔週六，喬帶他的母親到小屋，我已經在那裏等著他們。喬的母親下了車，給我們一個大擁抱。她四處看過後說：「天啊，從外觀看起來，你們要做的事不少啊。」她要喬打開後車廂，裏面有各式各樣的清潔工具。我們把東西搬進屋裏，她也走進屋內。


    「這棟小屋可以營造出一個美好家庭。」她說。


    接下來兩天我們做了不少清理工作。這樣花時間一起相處，讓我有機會深入認識喬的母親，我們相處愉快，那兩天過得很開心，也完成許多工作。喬的母親非常聰慧。等我們要舉行婚禮時，小屋也幾乎可以住人了。


    ## 13 告白


    一天早上，寶琳和我在樓下的衣帽間討論婚紗，她問主管能否把我們的午休時間排在一起，才能去布店選材料。主管欣然同意。


    一百種花樣和布料，過程非常精彩有趣。多次利用午休挑選布料之後，我終於找到一塊真心喜歡，而且覺得適合用於婚紗的布料，那是一塊有酒紅色小野花點綴的乳白色布料。寶琳也找到一塊能搭配我的婚紗花色的美麗布料。但我並未買下任何布料，因為我知道媽媽會希望跟我一起採購婚紗。


    儘管我們花了很多時間挑選布料，我始終無法告訴寶琳婚宴將在家中舉行。我不敢告訴她和其他女孩。有一天，我問天使什麼時候是對朋友表白的最佳時機，他們說：「現在。」


    「你是說現在，在午茶時間？」我問道。


    「是的。」天使們回答。我走到販賣部，薇樂莉和瑪麗坐在我們的老位置。我端了茶和點心，加入她們。我一坐下，薇樂莉問道：「羅娜，我們等不及想知道婚宴在哪裏舉行？」我的朋友臉上充滿期待與微笑。


    「在我父母位於來錫利普的家中。」從臉上的表情，看得出她們很震驚。


    「妳在開玩笑吧，羅娜？」瑪麗說。


    「沒有，」我說，「我不會拿婚禮這樣大的事情來開玩笑。」


    她們又問了我許多問題，包括爲何爸媽要在家裏接待客人。我回答這是我母親的家族傳統，她已經決定這麼做。她們又問道有誰會來參加婚禮。


    「大都是家族朋友，我父母、兄弟姊妹、叔叔、阿姨、喬的家人，當然還有妳們兩位和我的伴娘寶琳。大約三十位一起用餐，還有些鄰居會去教堂觀禮。」


    幾天後，我在販賣部和女孩們一起用餐時，薇樂莉說她對婚宴有個建議。


    「這樣好不好，羅娜，用餐後，我們到都柏林的酒吧聽音樂跳舞，慶祝一下。」


    「這個主意很棒，喬應該會同意，因爲我們無法在家裏跳舞。那天早上妳們要如何前往來錫利普的教堂呢？」


    「我們打算在都柏林會合，」薇樂莉說，「一起搭公車到教堂。希望那天不要下雨，因爲我們不想帶外套，也希望從教堂到妳家不用走太遠，因爲我們要穿高跟鞋去！」


    「兩分鐘而已。」我向她們保證，「妳們最好早點到。」大家開心笑說她們真的很期待那一天。


    當天稍晚流行服飾部打烊前，寶琳幫我一起整理吊桿，我對她說：「我該告訴妳婚宴要在哪裏舉行了。」


    「我已經從其他女孩那邊得知，要在妳父母家裏舉辦。」寶琳說，「我覺得那很棒。」


    我謝謝她這麼說。


    那天下班回到家,媽媽建議隔天我休假時,一起去挑選布料。雖然我已經選好婚紗布料,還是滿心期待能跟媽媽一起進城挑選。當然,我並未告訴她我已經選好,我知道媽喜歡逛店鋪,所以隻字未提。


    隔天早上我和媽媽一起逛布料百貨和店鋪,一路上雖然好玩,但媽媽開始對我不耐煩,因為她看到許多完美的布料,我卻什麼也不喜歡。


    「我不想要穿傳統的款式,」我對媽說,「而且我絕對不要穿純白的。媽,前面還有一家布料店,妳以前帶我去過一次,就在克利絲旁的巷子裏。」


    喝過茶後,媽媽帶頭到了那家布店,我們翻看許多大捲的布料,有立著的、平擺在櫃台上的,當我們來到我選定的那一塊布時,我對媽說:「我覺得這塊布料很漂亮,我喜歡乳白色,還有上面點綴的酒紅小花,而且旁邊這一塊也很適合伴娘的禮服。」


    「沒錯,是很美麗,兩塊布很相襯。」媽媽這樣說時,天使全都圍著我們。她問道:「這塊布要多少錢?」我差點大笑,因為天使們吟誦著:「沒有標籤、沒有標籤。」我知道天使們讓標籤消失了。


    媽媽決定找個店員來問價錢,天使隨即停止原來在做的事,一起搖著手,示意「不可以」。我隨即明白我得阻止媽媽,因為她會認爲價錢太貴,要我買便宜一點的布料。我不願那麼做,但也不想讓她傷心。


    「媽,別擔心,我會支付布料和款式樣版等所有禮服需要的花費,我們去看款式冊吧。」


    天使牽著媽媽的手，一起走向款式冊所在的牆面。為了節省時間，我向媽媽建議各看一本。至少看了五本以後，我才找到之前看過的款式。我請媽媽過來。「妳看，這個款式搭配我選的布料一定很漂亮。」


    媽媽很會做衣服，只要閱讀說明就知道兩件禮服需要多少布料。她算好所需的布料後，我們便到櫃台去請人幫助。店員把兩捲布擺在櫃台上，一尺一尺量好，布越堆越高。店員把布料摺得漂漂亮亮，然後放進袋子裏，同時也把樣版和收邊的材料包好。


    「一共是二十五磅。」她說。


    我要付錢的時候，媽媽說她想為我支付婚紗材料的費用，我很高興她想這麼做，但仍說：「不用了，媽，這太貴了。」可是媽媽很堅持，我也就順了她的意。她付錢給店員時，看起來既快樂又驕傲。我們謝過店員，要離開店鋪時，有位天使站在門口，我輕聲向天使道謝，然後上路回家。我們走向公車站，我拿著袋子，跟媽媽道謝。


    我就像個孩子一樣興奮無比，想要把布料帶到喬的家，讓喬看看。那一晚，喬的母親說：「我得跟妳的父母見個面，可以請妳邀他們星期天來用餐嗎？」


    那晚喬送我回家，我跟平常一樣從後門進屋，很驚訝爸媽還在餐廳裏，便抓住機會。「哈囉，沒想到你們還沒睡。對了，喬的媽媽想邀請你們星期天五點過去用餐。」


    媽沒什麼反應，但爸爸說：「我們一定到。告訴喬的媽媽我們星期天五點到。」我聽了很開心，問他們要不要喝杯茶，爸爸婉拒了，並說：「上床睡覺去。」我便道了晚安。


    隔天下班後，我搭公車到喬他家，告訴他母親我的父母星期日會過來。她很高興，也有點緊張。我知道她費了很大的功夫為星期日準備一頓完美的晚餐。


    我和父母抵達喬的家赴約的時候，爸爸敲了門，我很高興看見喬來開門。喬歡迎爸媽進屋，並給我一個擁抱。我們進入餐廳，餐桌擺設得有如皇家宴會般，令人難以置信。喬為我們介紹他的母親、姊姊芭芭拉、姊夫和他們的孩子。不過，剛開始時發生一件有趣的事，芭芭拉一直要幫媽媽把外套脫下掛起來，媽一直說：「不用，沒關係。」


    我把喬拉到一邊，偷偷告訴他：「那不是外套，那是外套式洋裝，你去告訴芭芭拉不要再問了，不然我會笑出來。」


    喬說他從未聽過外套式洋裝，當他回到餐廳時，芭芭拉再度詢問媽媽是否要脫下外套，喬打斷了她，趕緊為媽媽拉出椅子，請她坐下。


    那是一頓美好的晚餐，有烤牛肉、烤馬鈴薯、高麗菜和紅蘿蔔，點心是美味的奶油蘋果派。我從未吃過更好吃的蘋果派。喬的媽媽讓我們感到光榮，一切也進行得非常順利。


    那個夏天，在我們結婚之前，天使不斷要我讓喬知道一點我的祕密。我也多次告訴他們我的憂慮。我很想跟某人分享我的祕密，特別是喬，但也害怕面對他的反應，萬一他不相信我呢？


    「妳只能分享一點點，」天使說，「一次一點點，不能再多。羅娜，要記住，妳永遠不能說出全部的祕密，有些祕密絕對不能公開。下次有適當的機會時，我們會協助妳。」


    幾天後的某一晚,喬送我回家,他提議開車到山上兜風。


    「這是個美麗的夜晚,」他說,「今晚滿月,希望天上能布滿星星。我知道有個地方能停車觀賞都柏林美麗的夜景和遠處的海洋。」


    我們抵達時,那裏已經停了許多車。「我們下車走走,到那邊牆上坐一會兒。」我說。


    那道牆只是一堆四散的石頭,但我們還是坐下來。喬把我抱在懷裏,讓我很有安全感,我們親吻彼此。我不知道究竟坐了多久,但我突然發現天空充滿星星。有些星星開始旋轉、落下,逐漸接近地面時,我才看出那是天使。我聽見天使說:「現在是跟喬分享一點祕密的時機。」


    我在喬的懷裏轉身,說我有事情要告訴他。他看著我,問我是否跟婚禮有關。


    「不是,」我說,「其實是跟我有關。我想告訴你,我能看見一般人平常看不見的東西。有時候我能看見天使。」


    他臉上浮現出完全不相信的表情,看著我笑說:「羅娜,就我所知,只有修女和神父能看見天使。這太可笑了!妳我這樣的普通人是看不見天使的。」


    我緊張地看著他,這正是我所擔心的事情。我在心底向圍繞在四周的千百位天使大喊:「快幫忙!」


    喬給我一個擁抱,便不再多說。


    「走吧,明天還要工作。」


    回家的路上我們緘默無聲,只說了幾個字。喬開著車,不時看著我,彷彿在說:「我給自己找了什麼麻煩？」


    我對天使說：「喬的反應一點也不好。」


    抵達我家門口時，喬說：「羅娜，妳要我相信的是一件我想也沒想過的事情。」不過當他抱住我、吻我的時候，我又感到安心多了。


    走向後門時，我還是不停對天使哭訴。天使說：「別擔心，羅娜，這只是喬開始認識妳的起步而已。」


    我不知道該如何讓他相信我，但是過不久我就有了機會。


    喬雖然已經不再為爸爸工作，偶爾還是會到加油站幫忙。某個星期四晚上下班時，我看見一個靈視影像，有許多玻璃和大窗戶，光線從玻璃上反射出來，使我無法看清一切，但周圍似乎是黑暗的。「這是怎麼回事？」我問天使。


    天使說：「跟喬說。」


    「我不想說。」我回答。


    「記住妳的靈視影像，羅娜，」天使說，「妳看見事件的地點嗎？」「在加油站。」


    當晚，我跟喬說了。「那沒什麼意義。」他回答。


    我們沒再多說什麼，但我很擔心，又對天使哭訴。星期五我再度看見影像，這次我看見喬在車內，好像要開車去加油，有人對著車子走來，喬則把窗戶搖下。接著影像消失了。


    我告訴喬我又看見靈視影像，還解釋了細節。「那是個警告，我不希望你受傷。」


    「我不相信這種事。」喬說。「妳爸來電留言，加油站的晚班人員離職，他需要我週末去幫忙，因為星期六的午夜到早上七點沒有人值班。」


    我再度看見同一個影像，而且更加詳細。我看見喬把窗戶搖下，有兩個人，其中一人在他的臉上揍了一拳；我看見喬在警察局裏，警察相信另一人所言，不相信喬。我不知道究竟發生什麼事，非常沮喪，因此又對天使訴苦。


    「喬會被揍到流鼻血。」天使說，「除此之外，他不會有事。記住這個靈視影像，雖然警察不相信他，不過最後會水落石出。」下班後，我到喬的家。喬和我到附近住宅區散步，我請求他相信我，甚至火氣都上來了：「你為什麼不肯聽我說？」


    一路上，他的守護天使始終在他耳邊輕語。我很想對他大喊：「你的守護天使也正在對你說話，但你就是不肯聽。」喬看我似乎生氣了，因此承諾那個週末他會很小心。


    週末來臨，預言成真，一切如我所看見的那樣發生了。


    那晚，喬修理客人的車，並把車開去加油。車主的朋友經過時，認定喬在偷車。他對喬大喊，喬把窗戶搖下時，他就朝喬的臉上揍了一拳，然後報警。警察不相信喬的解釋，於是逮捕他。爸爸把喬保釋出來，事情才真相大白。那晚的事件讓喬對我有了進一步的認識。


    婚禮前兩週，寶琳、薇樂莉和瑪麗帶我去慶祝婚前的單身之夜。以前我從未在下班後跟她們出去。她們先帶我到薇樂莉星期五晚上最常光顧的史密斯酒吧，許多客人是百貨公司的'
