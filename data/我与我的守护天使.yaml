    期間，我沒有遭遇到什麼困難，也爲此感謝上帝。


    聖誕節後我們決定爲即將問世的寶寶取名。喬說這回不需要挑個男孩的名字，他非常肯定是個女孩。我們決定爲寶寶取名爲露絲。預產期前十天，我開始陣痛，馬上被送往醫院。可是陣痛後來停了一陣子，那時候，爸媽帶著水果來醫院探望我，爸爸說他期待有另一個孫子，喬則告訴他：「這次不會是男孩，你等著看，絕對是個女孩。」


    爸媽要離開醫院時，我也決定和喬到醫院大門口走走。爸媽走在我們前面，外公外婆剛好走入醫院大門。爸媽停下來和他們說話，喬和我也打了聲招呼。我們站在離爸媽不遠處，聽見外婆對父母說：「羅娜真好運，兒子們沒有跟她一樣是智障，或者更慘！不過我們覺得這個寶寶會是個智障。」


    她的守護天使出現在她的身後，眼中充滿淚水，他伸出手來撫摸我，給我力量。可是我非常悲傷，並且看到喬不小心聽見這段話時震驚的模樣。外公外婆對我父母說話時，根本無視於我們的存在。喬摟著我離開。


    「別在意，」喬說，「他們是無知的人。」


    他陪我回到病房，知道他們的想法，使我不禁落下淚來。天使圍繞在病床四周，爲我和喬注入平靜與愛的力量。我請求喬不要對我父母提起無意間聽到那段話的事。


    但那一天最令我傷心的，是爸爸未挺身捍衛我。對於他沒能指責外祖父母的看法，我感到非常難過，儘管我心底明白爲什麼。爸爸知道外祖父母未全然認可他，儘管爸爸已越來越有成就，他們仍然覺得媽媽委屈下嫁了。爸爸深愛著媽媽，但又覺得自己讓她和父母產生嫌'
  - '[PAGE 196]


    隙，而他非常不想再加深那道嫌隙。


    我了解爸爸為何沒有挺身護衛我，但心裏仍然非常難過，那晚我躺在床上傷心欲絕。


    多年後我意外發現口吐惡言的外婆，曾經生下一個唐氏症寶寶，那個寶寶的心臟不好，只活了六、七歲。而她在短短的人生歲月裏，一直被關在樓上房間裏，和所有鄰居隔絕。據說生了一個「智障兒」，讓外祖父母感到很羞恥。


    隔天早上我開始陣痛，小女兒露絲在三月二十五日，也就是母親節和我的生日那天問世，這真是一份美好的生日禮物。


    出院那一天，喬帶著克里斯多夫和歐文前來。兒子們跑到我床邊，喬卻慢慢走來，身邊滿是天使支撐著他。他的守護天使上前來告訴我喬身體不適，我很想哭，但我知道自己必須要笑。克里斯多夫和歐文正忙著和新妹妹玩，爭相抱她，喬把小女兒從搖籃裏抱起來，讓小哥哥們把手環抱在她身上。我問喬身體是否安好，他說沒有問題，但我知道那不是真話，他也很清楚。我告訴天使我很擔心，請求他們盡力協助喬。


    兩個月後的某一晚，喬上夜班時，腹部突然一陣劇痛。他跟老闆說身體不舒服，請他找人送他回家。


    「不行，你看起來很好。」老闆要他回到崗位繼續工作。


    問題就在喬長得又高又壯，外表上看起來往往不像生病。不過最後他仍然跟老闆告假，'
  - '[PAGE 197]


    堅持回家，因為他實在痛得受不了。大約清晨兩點，天使把我叫醒：「羅娜，快起床，喬身體不適，已經在回家的路上。我們正在找人幫助他。」


    我立即起床，打開所有燈光，開始燒水，也換好衣服。我站在窗邊等著，一邊向上帝祈禱，希望喬平安到家。


    後來，喬告訴我他來到賽爾布里齊和梅努斯之間，終於不支倒地。他記得自己醒來後，跪在地上爬著前進，突然間有車燈照在他身上，停車的是一位住在梅努斯的鄰居。他趕緊把車子掉頭，下車幫助他。最初鄰居以爲他是個醉漢，當他認出是喬時，簡直不敢相信自己的眼睛。喬解釋說他的胃劇烈疼痛，鄰居開車送他回家。


    天使在我肩上點了一下說：「羅娜，去開柵門，喬就要到家了。」


    我打開柵門，鄰居的車開了進來。我幫忙把喬扶進屋裏，安置在床上。鄰居說他去打電話叫醫生。


    「我該如何回報你好心的幫忙？」我說。


    他說他剛好睡不著，決定開車兜風，現在很高興自己有開車出門。道別後，他開車離去。我泡了一杯茶給喬，醫生約十分鐘後抵達，喬正坐在床上，覺得舒服了一點。醫生對喬笑著說：「希望你把我從床上挖起來，不是沒事找事做。我聽說你有劇痛，被人發現倒在路邊爬著。」


    「劇痛已經減緩了，」喬說，「我現在覺得很好。」


    他們談笑了一會兒之後，醫生說：「平躺在床上讓我看看，也許你的盲腸炎又發作了。」'
  - '[PAGE 198]


    他把手放在喬的胃部，喬突然筆直彈了起來，痛苦叫喊著。

    「你的麻煩大了，喬，」醫生說，「我要請救護車來，並給醫院寫張單子。」

    天使不斷給我驚喜，猜猜看那晚他們還跟誰說了話？是我父親！他們要爸爸起床來小屋。他把車開進來，停在醫生的車後時，醫生恰好在問最近的電話在什麼地方。

    爸爸走進小屋問道：「發生了什麼事？」

    醫生告訴爸爸，喬需要送醫院，他正要打電話叫救護車。爸爸說他可以送喬到醫院，但醫生拒絕，說喬需要救護車。爸爸出門移車，醫生到路邊的公共電話亭，他兩分鐘後回來，告訴我們救護車已經上路，然後回到車上寫單子給醫院說明喬的情況。我則到廚房去，讓爸爸與喬獨處。

    我再度去燒水，感覺到天使的手撫摸我，帶走我身上的焦慮，他們耳語說：「喬將會沒事，雖然不容易，但他熬得過去。」

    醫生回來說救護車已經抵達，爸爸開車跟在救護車後面，到醫院陪喬。我自然得留下來照顧孩子們，而且還得給露絲餵奶。

    他們離開後，我回到臥室，孩子們仍然熟睡，守護天使在一旁看護著。我對天使微笑，心裏早就清楚他們會讓孩子在騷動中持續熟睡。我謝過天使，轉身打算離開，天使荷賽司出現在我面前。

    「羅娜，上床去吧，」他說，「我們要讓妳睡一覺。」

    我上床一覺睡到隔天早上十點鐘，孩子們也睡著。我起床準備早餐，克里斯多夫來到廚


