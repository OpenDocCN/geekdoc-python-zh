- md: '# 活在燦爛的黃金未來：五次元的靈性覺醒


    The Archangel Guide to Enlightenment and Mastery: Living in the Fifth Dimension


    黛安娜·庫柏 & 提姆·威德 著

    周家騏 譯


    ## 推薦序：精通自己的頻率在第五次元是刻不容緩的當務之急！


    伊莉莎白


    根據大天使麥可（Archangel Michael）的說法，目前已經有三顆地球成型了。第一顆地球是人類尚未出現，保留最初原始風貌的地球。那是屬於地球原生物種的世界，是植物、礦物和動物的天堂，為了保有地球的原始根基與血脈而存在。第二顆地球是在三至四次元頻率振動的地球，在這個頻率帶振動的人們，深陷在負面低頻的情緒中，過著分裂鬥爭、惶恐不安、辛苦艱難的生活。第三顆地球是在五至七次元頻率振動的地球，在這個頻率振動的人們，內心平安富足、互助合作，過著心想事成、揚昇開悟的生活。這三種振動頻率同時存在於一個物理地球裡，卻各自過著截然不同的生活。


    誠如本書開宗明義提到的精通（Mastery），是指在任何情況下，都能控制自己的能量系統，並保持高頻率的能力。行止精通（Walking Mastery），是指活在肉身又能把自己維持在較高頻率第五次元的人。


    現今已經有很多人的振動頻率達到第五次元甚至第七次元了，所以要進入更高次元並不困難，人的一天當中有可能在三次元和七次元之間來來去去。心情好、充滿光跟愛的時候，就在第五次元，心情不好、攻擊批判別人的時候，就回到第三次元。因此接下來的時日裡，全球人類將進入「精通」大作戰——訓練自己穩定在行止精通的狀態。因為要進入更高次元並不困難，但是如何維持在高頻不再掉墜，是人類要努力耕耘的重點。


    尤其地球將於二〇三二年邁入第五次元，因此地球自我清理、升頻產生的天災人禍在未來將越發層出不窮，二〇二〇年爆發的新型冠狀病毒肺炎（Covid-19）橫掃全球就是最典型地球自我清理的現象，人類如何能順利地與地球一同揚昇，個人振動頻率的高低是決定性的關鍵。


    然而讓自己的頻率穩定維持在第五次元，靠臨時抱佛腳是無法完成的，只有依靠大家自我鍛鍊，養成高頻的思想、態度和習慣堆積能量才能養成。本書《五次元的靈性覺醒》就是呼應大家現階段的需求應運而生的揚昇法寶。


    英國天使夫人黛安娜·庫柏老師一直以來就是帶領全人類揚昇到第五次元的人間天使，她的所有著作都內蘊著開悟的智慧與揚昇的契機，而且她的每本著作都比上一本的振動更快、眼界更高、光度更亮，她的每本智慧與經驗的結晶，都是值得大家品味收藏的靈性寶藏。


    繼《五次元的靈魂揚昇》一書中引導大家如何獲得大天使、獨角獸、龍、元素精靈、星際議會、基督的金色光束、宇宙鑽石紫色火焰等高頻能量的加持，協助我們釋放業力、提升頻率，並與內在純淨的神性再次連結。《五次元的靈魂覺醒》則是繼續擴展提昇五次元的十二個靈魂脈輪，讓五次元的梅爾卡巴穩定在我們的氣場；還帶領我們拜訪世界導師庫圖彌大師的十二學堂，進入十二神聖廳堂學習明心見性的功課；會見星際大師，進入星際訓練學校學習；接引神聖陰性能量與眾多女神大師連結；與龍族、元素精靈更密切的互動⋯⋯這些都是我們日常生活中維持在較高次元的簡易操作方法。


    建議讀者安排每天一小段，十至十五分鐘獨處的時間，跟隨書中的冥想引導，這些冥想會帶領我們前往更高次元、接收更高層級神聖智慧的灌溉，協助我們適應並穩定在五次元的頻率中。當我們在五次元的頻率中越久，身心靈的光化轉換因此更快發生，地球自我清理產生的天災人禍與人類集體的負面潛意識影響就會變小。只能說有幸能閱讀此書的人，必定是得到上天恩寵之人！


    如果有讀者已經練習過《五次元的靈魂揚昇》，我要恭喜你，你的光之振動已經進入第五次元，並朝著第七次元的頻率邁進！若是期望自身的光之振動能進入第九次元，繼續從事《五次元的靈魂覺醒》書中的各項練習，不只會是你的最佳選擇，更是你眼下的當務之急！


    感謝黛安娜·庫柏老師以及生命潛能出版社為全球人類付出的貢獻，衷心祝福全球所有生命都能在二〇三二年之前順利升頻至第五次元，進入第三顆地球！


    伊莉莎白

    - 英國天使靈氣教師

    - 獨角獸靈氣源頭管道

    - 龍吟靈氣源頭管道

    - 英國黛安娜·庫柏白光學校教師

    - 埃洛希娜白光天堂的創始人

    - 《實現願望的獨角獸：月光寶盒》的作者

    - 《天使能量排毒法》、《光行者》、《五次元的靈魂揚昇》、《不要讓人家淡你的光》與《水晶天使444》等書的推薦序作者。

    - 目前正在全世界的華人地區推動天使靈氣、獨角獸靈氣、龍吟靈氣、啟動天使之翼、揚昇大師鍊金術、銀河星際大使、天堂香巴拉的工作坊教學。


    伊莉莎白個人連結：

    - 臉書：Elizabeth Chou https://www.facebook.com/elizabeth.chou.16

    - 臉書粉絲專頁：埃洛希娜白光天堂 https://www.facebook.com/elohima/


    ## 導言


    提姆·威德跟我一起與令人敬畏的大天使麥達昶合作了許多年，因此，當祂要我們合寫《五次元的靈性覺醒》時，我們感到非常興奮。


    開悟就是從一個更高、更廣的視角看一切。當我們學會這麼做的時候，就會知道宇宙中存在的只有愛，因為其他的一切都是幻相。這種對生命的深刻了解便足以轉化我們整個存在的方式和關係。


    精通意味著對發生在我們身上的一切事負起責任。它是告別內疚、譴責、傷害和憤怒。當我們把投入這些情緒上的能量收回來時，就會取回自己的力量。大師堅強不屈，昂首挺胸，他會憑著內在的智慧行動。


    黃金亞特蘭提斯紀元的所有居民，都活在第五次元的境界裡。他們是開悟的大師——充滿智慧與天賦的存在。但自亞特蘭提斯墮落後的一萬年來，地球人一直活在第三次元的空間裡，不再對自己的行為或情緒負擔任何責任。


    目前，我們正處於一個為期二十年的機會之窗，新的黃金時代正在建立，地球的頻率正在快速上升到亞特蘭提斯的層面。我們活在一個不平凡的時代，因為對那些準備好了的人來說，這是一個史無前例的靈性提升機會。


    這本書從令人神往的亞特蘭提斯黃金紀元開始，因為他們的生活方式奠定了開悟精通的基礎，以及未來的人類生活方式。本書提供的資訊，會觸發你隱藏在內心深處的記憶，並揭開你沒有意識到，但已經知道的事情。


    亞特蘭提斯黃金紀元的人都與龍族、天使和獨角獸有連結。現在是再度與祂們連結的時候了。美麗又有智慧的龍族，正要重返地球幫助我們。因此，我們會介紹這些活在第四、五次元的存在，因為祂們是人類的好朋友、同伴和保護者。


    此外，第七和第九次元的獨角獸，也正大批地湧向地球，協助我們加快靈性成長的速度。觸及這些聖獸的能量，會帶來喜悅、愛和啟發。祂們會幫助你活在第五次元的層面裡。


    我們邀請一些偉大的啟明大師和女神大師，用祂們的光加持這本書。祂們走過地球上的揚昇之路，經歷了自己的考驗和啟蒙，因此，祂們很了解我們正在面臨的諸多挑戰。當祂們與我們連結時，就會觸發潛伏我們內在的開悟和精通的鑰匙與密碼。我和提姆衷心地向祂們致上感激之意。祂們的幫助會讓我們接收更多的光能，同時也能為世界提供服務。


    庫圖彌尊主（Lord Kuthumi）是其中的一位，祂是一位光明的存在，現在的世界導師。祂在內層（inner plane）成立了十二個學堂。進入這些學堂就會接收到資訊、光與能量密碼，進而讓你在這一世成為一位開悟的大師。


    由於頻率上升得太快，你的脈輪系統正在以前所未有的速度發亮和擴張。因此，我們也以高於以往的振波，把新的資訊納入書裡，加快你十二個第五次元脈輪的旋轉和容量。


    真誠地希望你喜歡書裡提供的高頻率新資訊，也希望你在每一章末尾進行觀想的練習時，能連結傾注其中的能量。


    希望你在經歷完全開悟的旅程中滿懷喜悦。


    願龍族、天使、獨角獸和啟明大師加持你，並照亮你的生命。


    ## 精通的未來


    ### 第一章 人間大師


    精通（mastery）是指在任何情況下，都能控制自己的能量系統，並保持高頻率的能力。「行止精通」（walking mastery）這個名詞指的是那些活在肉身，又能把自己維持在高層第五次元的人。當你的四身系統——身體、情緒體、心智體和靈性體，含有高百分比的光能時，行止精通就會發生。通過靈魂發出的考驗和啟蒙以後，你的氣場就會吸收這種光能。


    地球上的每一個人，現在都有可能成為開悟的揚昇大師。能否達到這個目標，則取決於你的人格意圖和靈魂契約。以目前的可能性趨勢來看，地球上的七十億人都能達到這個層次。這種靈性的快速提升，是地球當前獨一無二的機會。


    亞特蘭提斯在它們為期一千五百年的黃金紀元提供給世界行止精通的藍圖。那個時代的人演示了這種藍圖如何運作，本書依據的基礎之一正是來自他們的示範。所有需要的資訊都被編譯成符碼，置入我們每個人當時的化身中。


    那個黃金時期的男女大祭司，都活在第五次元的上層。他們不斷地與第七次元的存有保持連結，也能很短暫地生活在第六次元裡。然而，即使是高度進化的存有，也無法在擁有肉身的情況下在這個層面生存。他們必須運用心靈的力量和水晶的協助，來管理圍繞在周圍的能量。


    包括孩童在內的每一個人，無論處於什麼層次，都在亞特蘭提斯的黃金紀元受過心靈控制訓練，以維持他們在周圍設想出來的形體生命。這種不需要我執就可以完成的訓練，是讓他們成為行止高人的原因。


    從第三次元往高層揚昇的條件，包括建立一個叫梅爾卡巴（Merkabah）的純水晶光體。這個光體是由你的能量和靈魂藍圖共同創造出來的幾何形制。當你十二個第五次元脈輪都完全活躍的時候，靈魂就會向下投射一個四面體來容納身體發出的振波。梅爾卡巴是由兩個交互扣鎖的金字塔組成的立體六芒星。到了下一階段，當神聖陰陽能量達到平衡時，它就會變成一個圓球。因為無角的圓能容納更多光能。


    我們現在要進入的一個階段，涉及了所有第五次元存有的光體擴張。失去了個別顏色的脈輪，會變成半透明狀。當它們在白光的光譜中閃爍時，會產生統一的光柱，並從心中的位置雙向擴張。作為揚昇過程核心的心輪，會驅動我們朝著精通的道路邁進。我執會隨著心力的壯大而失去掌控，進而遭到廢棄。凡是通過靈魂考驗的大師，都會發生這種情況。這些都是大師在進入肉身前為我執選擇的釘刑（crucifixion）。


    十二個脈輪的每一個，都包含了心能量與個人生前設定的成長計劃。對那些致力於尋求開悟的人來說，這會為他們創造一條具有高度挑戰性的道途。目前為止，地球是全宇宙中最快、最艱難的一所學校。然而，這些挑戰在靈性上帶來的回報和獎賞，卻遠超過我們對宇宙的理解程度。


    你的靈魂必須處於第七次元以上的頻率，才能化身到地球來。當你遺忘了過去種種，掀起分隔前世今生的的遮幕，進入肉身展開學習的過程後，這個頻率也許會急劇地下降。某些人由於前世業力的平衡，而能使這個頻率繼續降低。許多靈魂為了彌補所有未完成的功課，並在新黃金紀元開始前清除宿業，而選擇了這個特殊的一生。這就是使地球人會有如此不同又艱困經驗的原因之一。


    當你學會並克服這些功課和經驗以後，不可思議的變化就會發生。心會啟動人類的進程，並推動著人類往前邁進。靈魂的意識也會隨著一起進化。你會想追求一種充滿愛、合作、分享，並與全人類連結的生活方式。


    這種寬闊的視野，會使你成為一個能覺察自己真實身分的大師。你會知道自己是以一個人類形式化身的靈魂。這種證悟本身就能完全改變生命的每一個面向，讓你把基督意識帶進每一個思想、言語和行為之中。這些變化正在世界各地的人身上發生。星際議會預測，地球及其居民會在二〇三二年以前進入第五次元的振波。


    雖然精通的過程會影響所有的個體靈魂，但畢竟這是一個集體的運作。因為每一個從心覺醒的靈魂，都會影響周圍所有人事物的能量狀態。同樣地，無論有沒有情感覺知，地球上的所有生命體之間的心流通訊將會在瞬間發生。大師將他們開敞的心放射出去，映照出心靈封閉的人們真實的面目。當他們看到這個反映時，心靈的所有面向便會隨之甦醒。


    因此，大師單憑著他最純淨的本質，就可以轉化出更多的大師。


    行止精通是地球上每一個靈魂的神聖傳承。


    在未來的幾年中，隨著世界各地人們受到高層次元振波的觸及，會迎來新一波的頓悟浪潮。有別於一九八七年諧波匯聚（Harmonic Convergence）以漸進的方式喚醒人類，這些新意識靈魂會在一夜之間找到自己選擇的角色。


    你必須經歷和通過許多挑戰和啟蒙，才能成為一位行止高人。對那些覺醒速度緩慢的人來說，這會是一個漫長的過程。然而，一個快速覺醒的高人會在無意識的情況下完成他們的考驗。這些靈魂將在瞬間理解和開悟。他們在源頭變成實相的運作過程中，會本能地擁抱宇宙之流。能量與資訊會通過第五次元的心輪，即時地傳遞給他們，為他們提供高層的天使視角。這將是自亞特蘭提斯沉沒以來，我執第一次被遣散，所有的幻相都被真實的本心所見取而代之。


    隨著揚昇的全面展開，許多大師現在都憶起了累世以來與他們共處過的靈魂。來自同'
  mdcn: '# 活在燦爛的黃金未來：五次元的靈性覺醒


    The Archangel Guide to Enlightenment and Mastery: Living in the Fifth Dimension


    黛安娜·庫柏 & 提姆·威德 著

    周家騏 譯


    ## 推薦序：精通自己的頻率在第五次元是刻不容緩的當務之急！


    伊莉莎白


    根據大天使麥可（Archangel Michael）的說法，目前已經有三顆地球成型了。第一顆地球是人類尚未出現，保留最初原始風貌的地球。那是屬於地球原生物種的世界，是植物、礦物和動物的天堂，為了保有地球的原始根基與血脈而存在。第二顆地球是在三至四次元頻率振動的地球，在這個頻率帶振動的人們，深陷在負面低頻的情緒中，過著分裂鬥爭、惶恐不安、辛苦艱難的生活。第三顆地球是在五至七次元頻率振動的地球，在這個頻率振動的人們，內心平安富足、互助合作，過著心想事成、揚昇開悟的生活。這三種振動頻率同時存在於一個物理地球裡，卻各自過著截然不同的生活。


    誠如本書開宗明義提到的精通（Mastery），是指在任何情況下，都能控制自己的能量系統，並保持高頻率的能力。行止精通（Walking Mastery），是指活在肉身又能把自己維持在較高頻率第五次元的人。


    現今已經有很多人的振動頻率達到第五次元甚至第七次元了，所以要進入更高次元並不困難，人的一天當中有可能在三次元和七次元之間來來去去。心情好、充滿光跟愛的時候，就在第五次元，心情不好、攻擊批判別人的時候，就回到第三次元。因此接下來的時日裡，全球人類將進入「精通」大作戰——訓練自己穩定在行止精通的狀態。因為要進入更高次元並不困難，但是如何維持在高頻不再掉墜，是人類要努力耕耘的重點。


    尤其地球將於二〇三二年邁入第五次元，因此地球自我清理、升頻產生的天災人禍在未來將越發層出不窮，二〇二〇年爆發的新型冠狀病毒肺炎（Covid-19）橫掃全球就是最典型地球自我清理的現象，人類如何能順利地與地球一同揚昇，個人振動頻率的高低是決定性的關鍵。


    然而讓自己的頻率穩定維持在第五次元，靠臨時抱佛腳是無法完成的，只有依靠大家自我鍛鍊，養成高頻的思想、態度和習慣堆積能量才能養成。本書《五次元的靈性覺醒》就是呼應大家現階段的需求應運而生的揚昇法寶。


    英國天使夫人黛安娜·庫柏老師一直以來就是帶領全人類揚昇到第五次元的人間天使，她的所有著作都內蘊著開悟的智慧與揚昇的契機，而且她的每本著作都比上一本的振動更快、眼界更高、光度更亮，她的每本智慧與經驗的結晶，都是值得大家品味收藏的靈性寶藏。


    繼《五次元的靈魂揚昇》一書中引導大家如何獲得大天使、獨角獸、龍、元素精靈、星際議會、基督的金色光束、宇宙鑽石紫色火焰等高頻能量的加持，協助我們釋放業力、提升頻率，並與內在純淨的神性再次連結。《五次元的靈魂覺醒》則是繼續擴展提昇五次元的十二個靈魂脈輪，讓五次元的梅爾卡巴穩定在我們的氣場；還帶領我們拜訪世界導師庫圖彌大師的十二學堂，進入十二神聖廳堂學習明心見性的功課；會見星際大師，進入星際訓練學校學習；接引神聖陰性能量與眾多女神大師連結；與龍族、元素精靈更密切的互動⋯⋯這些都是我們日常生活中維持在較高次元的簡易操作方法。


    建議讀者安排每天一小段，十至十五分鐘獨處的時間，跟隨書中的冥想引導，這些冥想會帶領我們前往更高次元、接收更高層級神聖智慧的灌溉，協助我們適應並穩定在五次元的頻率中。當我們在五次元的頻率中越久，身心靈的光化轉換因此更快發生，地球自我清理產生的天災人禍與人類集體的負面潛意識影響就會變小。只能說有幸能閱讀此書的人，必定是得到上天恩寵之人！


    如果有讀者已經練習過《五次元的靈魂揚昇》，我要恭喜你，你的光之振動已經進入第五次元，並朝著第七次元的頻率邁進！若是期望自身的光之振動能進入第九次元，繼續從事《五次元的靈魂覺醒》書中的各項練習，不只會是你的最佳選擇，更是你眼下的當務之急！


    感謝黛安娜·庫柏老師以及生命潛能出版社為全球人類付出的貢獻，衷心祝福全球所有生命都能在二〇三二年之前順利升頻至第五次元，進入第三顆地球！


