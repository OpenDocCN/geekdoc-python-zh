    \n這些龍族與姆的存有合作，把天使麥可和馬利亞的火焰之光，越過地球的能量線帶進揚昇行星、恆星和星系的氣場裡。祂們服務的結果，讓這些特殊的龍族都在這個文明的末期揚昇到第五次元了。\n\
    \n列木里亞大陸是第四個黃金紀元，也是以太平洋為基地，發生在人類還不是第五次元存在的時期。列木尼亞人很像天使，是五次元的光能，但振動的頻率比較低。他們熱愛地球，並熱切地想提供幫助。即便如此，它還是會在遙遠的二〇一二到二〇三二年間經歷一個關鍵階段！\n\
    \n列木里亞大陸留下一個了不起的禮物，要幫助我們完成目前正經歷的驚人轉換。他們把從源頭取得的光，以及來自恆星、行星和宇宙巨大能量的氣場融合、聚焦，直到它們變成熔融的狀態後，再傾注到龍脈，並在那裡形成高頻的列木里亞水晶。這就是地球的內部有輻射光的原因。\n\
    \n龍族一直在保護這些列木里亞光的特殊縫隙，幫助我們通過這個過渡時期，順利進入下一個黃金紀元。「龍」（dragon）這個字的原意是「觀察者」（watcher）或「監護人」（guardian）。龍族一直照顧列木里亞人鍾愛的一切——土地、自然和人。祂們不愧為人類偉大的同伴、捍衛者、保護者和照顧者。\n\
    \n列木里亞時代結束時，乙太存在祈禱自己能擁有肉身，讓他們得以全新的形式體驗生命。他們希望經驗這些感知，並希望以肉體的形式呈現大天使麥達昶和神之臨在（Shekinah）的能量，以便在地球上紮根。\n\
    \n他們的要求被接受了，但條件是參與這個實驗的列木里亞人也要有情緒。號角聲發出後，就像以前那些偉大的機會一樣，全宇宙的志願者都來響應。列木里亞人從來沒有肉體的經驗，龍族也來幫助這些新人類。祂們先協助列木里亞人在地球上建造結構，為實驗做準備，接著，再清除第一批亞特蘭提斯人周圍的能量，好讓一切都能很輕易地流動。\n\
    \n龍族幫他們開鑿亞特蘭提斯的波賽頓山，和上面聳立著的波賽頓神殿。神殿裡安放了亞特蘭提斯大水晶。祂們還保護這個水晶發電器。大水晶在亞特蘭提斯末期掉進百慕達三角洲的中心時，水龍承擔了保護它的責任，因為它仍然是一個活躍的次元入口和強大的發電器。\n\
    \n當星際議會需要使用入口時，它就會產生強光，讓三角洲的所有人事物都經歷一個次元間的轉換。這意味著祂們會從人類的眼中消失不見。當然了，這是祂們的靈魂事先同意的，這也為祂們提供了一次靈性提升的機會。\n\
    \n由於祂們過去經常需要這個入口，也因此促生了今天的百慕達三角洲之謎。如今，由於行星的頻率增加，次元的入口開啟時，已經不會對周圍的人事物產生太大的影響了。\n\
    \n二〇一五年是大水晶再度躍升的時間。龍族釋放祂們的保護能量，使光全部的力量像噴泉一樣升起，再度照亮了地球。這對地球的揚昇和精通過程產生了巨大影響。\n\n\
    亞特蘭提斯在幾千年前沉沒時，龍族做出了巨大的犧牲：放棄揚昇的角色，採取了第四次元的乙太體，隨時準備在我們經歷的強大過渡期間幫助我們。祂們也因為這一次的犧牲而成為故事和童話的焦點。然而，這些故事鏤刻在每一個跟祂們一起在黃金紀元化身者的藍圖裡，讓祂們長久保存這個記憶。凡是有意識或無意識地相信這些故事的人，都能吸引一隻第四次元的龍族來幫助自己。\n\
    \n一九八七年的諧波匯聚，也就是地球淨化二十五年週期的開始，人們對龍的記憶讓這些有智慧的生物得以返回地球，讓他們重新在高層建立連結。\n\n二〇一一年和二〇一二年，龍族的能量隨著三十三個宇宙入口的開啟而劇升。列木里亞大陸神聖入口的開啟，使大量的龍之光回到了地球。安道爾（Andora）和檀香山的宇宙入口也是龍族的入口，可以讓這些有智慧的生物大量湧入。大量的龍族在那個時代進入地球，使牠們的數目立刻超過人類的兩倍。這些入口還會繼續開啟並照亮人類，直到二〇三二年全面運作為止。這意味著你現在正擁有一個精通和開悟的大好機會。\n\
    \n龍族現在正將很高的頻率引入並固化在地球上。由於祂們是威力無比強大的存在，因此會督促在精通之路上邁進的每一個人跟祂們連結。身為求道者的你，能在旅途中的任何時間進行連結。但由於次元間的遮幕越來越薄，這種連結就變得更加地勢在必行了。\n\
    \n二〇一三年，提姆寫作《五次元的靈魂揚昇》這本書以前，有一次在散步與大自然連結時，龍族便與他有過一次直接的接觸。一個很清楚的聲音跟他說：「我們是龍的原力，來此聽候你的差遣。」\n\
    \n提姆起初有些不安，因為從來沒有龍族接近過他。他決定按照連結外部能量源頭的方式把這個能量帶進自己的心輪，以驗證它的純淨性。他發現這是一種純度和完整性最高的能量。兩天後他開始與這些偉大的存在合作，並被祂們引導到一個浩瀚的光與愛的境界。"
  mdcn: "## 第三十六章 女神大師\n\n### 聖女貞德／布拉瓦茨基夫人／錫耶納的凱瑟琳\n\n使祂們在精通上的屬性。\n\n聖女貞德（Joan of\
    \ Arc）是一個具有非凡信念和熱情的偉大遠見者。雖然祂只是中世紀法國時的一個農家女，但聖麥可（St. Michael）和聖凱瑟琳（St. Catherine）的現身，都給祂留下了深刻的印象：祂是整個法國的救星，天主希望祂帶領法軍打敗英國，並告訴祂必須與法國王太子（Dauphin）查爾斯談話。祂不得不剪掉頭髮，女扮男裝前往覲見王太子。最後，祂果然領導法軍，在奧爾良（Orleans）贏得一場偉大的戰爭。然而，祂那一生的最後一次啟蒙是在火刑柱上燒死。火刑柱淨化了祂，使祂以壯觀的姿態揚昇。\n\
    \n祂的第二個化身是十九世紀引導迪瓦爾·庫爾（Dwihal Khul）成立通神學會（Theosophical Society）的海倫娜·布拉瓦茨基（Helena\
    \ Blavatsky）。海倫娜克服挑戰，成功地在世界上建立了「白色火焰」教團。\n\n祂的另一生是十四世紀義大利的錫耶納的凱瑟琳（Catherine of\
    \ Siena）。祂這一生從小就擁有各種神祕和宗教的憧憬。祂成年後過著非常嚴格和純潔的生活，並創建了一個極其嚴格的教團。祂試圖當一名和平大使，也為了促進宗教間的友好寫了許多信件。祂在三十三歲那年過世，而三十三是基督之光的號碼。祂目前正在內層努力把靈性帶入宗教。\n\
    \n### 觀世音\n\n偉大的遠見者仍然過著非常有挑戰性的生活。即使是現在，心理學家和有靈性觀念的人，都會有超越自己時代的知見，但祂們都可以透過進入聖女貞德／布拉瓦茨基夫人／錫耶納的凱瑟琳的能量而獲得幫助。如果你想成為攜帶白色揚昇火焰，為人類帶來和平與光明的人，那就調整自己的頻率，接通這個偉大存在的能量。\n\
    \n由於兩萬年前在中國的化身時展現的愛、悲憫和智慧，使觀世音成為慈悲女神的代表。祂在這一段漫長的時間裡，雖然學會了出入多次元的能力，但還是選擇以肉身留在地球，幫助人類。祂活在第七次元，但能把頻率降低到第五次元。祂能在第五次元裡保持肉身，也能提升到第九次元。祂不需要食物，但在第五次元時喜歡吃帶給地球輕鬆、喜悦的水果和蔬菜。隨著光之工作者成為行止高人，更多人可以存在不同次元，也能呼請觀世音的幫助。\n\
    \n祂的龍族朋友就像祂的隨身護衛一樣，跟祂一起穿越頻段，讓祂飛越各式各樣的挑戰。祂對了解龍族並把龍視為生活一部分的東方，懷有一份熱愛。龍族現在正湧入東西方世界，觀世音正在幫助人們開啟意識，讓人們接受祂們並與祂們合作。身爲一位大師的祂，現在擁抱了整個地球，讓我們得以沐浴在祂的愛裡。\n\
    \n祂一直被視為東方的聖母馬利亞。祂目前所做的一切，都是為了把神聖的陰性能量帶進人類的意識。祂目前在星際議會任職，負責傳播神聖的陰性智慧。許多婦女組織都能感受到祂的影響力。祂也在開啟世界各地的教師、監獄工作者，甚至政府和企業員工的心輪。\n\
    \n無論在任何的情況下，祂都會發送光能，幫助男人與祂們的陰性面有更多的連結。祂負責推動男性的交流社團，使男性對養兒育女的活動有興趣，幫助他們擁抱自己更有智慧、更溫柔的一面。\n\
    \n身為因果輪尊主董事會第六射線的大師，祂也會協助促進宗教和靈性之間的平衡。如果你想把祂的光能散佈到地球，那就調整頻率，接通偉大觀世音女神的能量場。如果你認為自己的使命是以某種方式，透過人們對男女屬性的集體了解來擴大世界的開悟，那你也許會想連結本節提到的女神大師。\n\
    \n### 觀想：與聖母馬利亞和觀世音連結\n\n1. 找一個安靜、不受干擾的地方。\n2. 觀想自己站在一個能量很強的地點，那裡的地球能量和美景會強化你的磁場。用一點時間吸收這個能量。\n\
    3. 最重要的是放輕鬆。因此，吸入周圍的和平與美，直到你感到平靜和處於中心為止。\n4. 思考一下你的使命，或者思考在偉大女神大師的幫助下，你下一步要完成的使命。任何事都有可能發生。\n\
    5. 邀請祂們來協助你。\n6. 覺察站在你面前的聖母馬利亞或愛希斯。祂的能量體點亮了一個海藍寶石和金色光芒的大球。祂努力獲得的光能從祂的身上輻射出來。\n\
    7. 向前走，好讓你進入祂脈動的高頻率光能和能量場裡。\n8. 感覺祂的能量在你身上工作，療癒你、強化你、帶給你智慧、賦權給你，並用高層的屬性照亮你。慢慢來，繼續呼吸。\n\
    9. 當祂退出的時候，向祂致謝。\n10. 現在，覺察聖女貞德、布拉瓦茨基夫人、錫耶納的凱瑟琳（其中的一位、兩位或三位）站在你面前。祂們巨大的能量閃爍著藍色、綠色和金色的光能。\n\
    11. 向前走，站在祂們脈動的高頻光能和能量場裡。\n12. 感覺祂們的能量在你身上工作，療癒你、強化你、帶給你智慧、賦權給你，並用高層的屬性照亮你。不要急，繼續呼吸。\n\
    13. 祂們退出的時候，向祂們致謝。\n14. 現在覺察慈悲女神觀世音站在你面前，祂巨大、發光和流動的能量體，散發著洋紅色、白色、金色和鑽石光芒。\n15.\
    \ 感覺祂的能量在你身上工作，療癒你、強化你、帶給你智慧、賦權給你，並用高層的屬性照亮你。不要急，繼續呼吸。\n16. 當祂退出的時候，向祂致謝。\n17.\
    \ 你的能量場發生了一次非凡的轉變。你現在可以為了至善的目的從事任何的工作了。\n\n## 第三十七章 女神大師的影響力\n\n好幾個偉大的女神大師，都為了讓我們發展靈性角度的新理解而奉獻自己。他們目前正在內層努力，把靈性而非宗教的印象，烙印在人類的心智裡。這些人裡有一些在多生多世中帶動了很大的改變，而且他們的靈體還在繼續改變。覺醒大師的肉身角色和職責往往令人敬畏，但我們很少能覺察到這一點。\n\
    \n另外，請切記，你的化身也許正在從事這項工作。你甚至會成為莊嚴大師的一個面向，氣場裡攜帶了一些祂們的能量。你也許本身就是一個偉大的大師，你會對自己的光產生的力量感到驚訝。這只有在你看到自己的真我時才會知道。當你死後達到更高的證悟時，這種情況就會發生。\n\
    \n### 抹大拉的馬利亞\n\n抹大拉的馬利亞 (Mary Magdalene) 是一個純粹的本體 (Essence)。祂那一生是一個高度進化的大師。祂與耶穌一起化身，成為祂的靈性伴侶。祂們和女兒莎拉\
    \ (Sarah) 一起在脈輪的道路上前進。抹大拉的馬利亞一生遭受人們的誹謗，而且至今還有人繼續批判祂。\n\n祂受過多年的內層訓練，能把療癒和靈性帶進第六射線的光裡。這是從第六射線大師耶穌承接過來的理想主義和奉獻的射線。\n\
    \n此外，祂也在星際議會負責監督用靈性點亮宗教的工作。祂擁有世界合一之愛的願景。\n\n如果你想發展超越的愛，那就調整你的頻率，接通祂的能量場。\n\n###\
    \ 聖克萊爾\n\n聖克萊爾 (St. Clare) 的肉身誕生於一個富有的義大利家庭，擁有備受寵愛的童年。然而，祂卻渴望過虔誠和簡樸的生活。由於庫圖彌上主化身的亞西西的聖方濟各\
    \ (St. Francis of Assisi) 給祂很大的啟發，促使祂離開了舒適的家庭生活，成為一名修女。最後，祂創立了貧窮修女會（the Order\
    \ of Poor Clares）。這些修女宣誓守貧，獻身於濟貧扶弱的服務工作。\n\n在靈性的領域裡，聖克萊爾現在的工作是把更大的靈性覺知帶給人類。祂是三位女大師組成的團隊成員。這個團隊正為了提高人類的頻率而共同運作。另外兩個是錫耶納的聖凱瑟琳（Catherine\
    \ of Siena）和亞維拉的聖德蘭（St. Teresa d'Avila）。\n\n隨著時間的接近，聖克萊爾將再次化身，並在這一生從靈魂的層面，向世界導師庫圖彌上主報告祂在提高地球靈性覺知上的進展。祂也會跟祂聯絡，討論這個過程該做些什麼。\n\
    \n如果你有一個需要勇氣和決心的願景，那就調整自己的頻率，接通聖克萊爾的能量場。\n\n### 亞維拉的聖德蘭\n\n聖德蘭（St. Teresa d'Avila）經歷過許多化身，最重要的是在十六世紀的西班牙時，作為亞維拉的聖德蘭那一生。祂是一個宗教神祕主義者和預言家。母親在祂幼年去世，祂是被修女撫養長大的。祂最後改革了加爾默羅教團（the\
    \ Carmelite order），克服了改革過程中遭遇到的許多反對力量。\n\n祂在多生多世中召集了一個光之工作者團隊，許多人現在還跟祂一起在內層工作。加入了祂們行列的，還有大批的其他人。\n\
    \n這些地球上的行止高人們，正為了在靈性世界扮演的更大角色接受訓練，以便承擔巨大的責任，並發揮深遠的影響力。聖德蘭目前正努力實現以靈性與眾生一體為基礎的、無教條式的宗教信仰。\n\
    \n如果你想高舉合一的火焰，那就調整你的頻率，接通聖德蘭的能量場。\n\n### 娜達夫人\n\n娜達夫人（Lady Nada）的Nada含有「空無」的意思，所以娜達夫人的名字來自於祂的無我（no\
    \ ego）。祂是耶穌的高我薩南達（Senanda）的孿生火焰。\n\n祂有一世化身為施洗約翰（John the Baptist）的母親伊麗莎白。祂在先知穆罕默德（Mohammed）那個時代的化身，曾大力倡導伊斯蘭藝術。\n\
    \n祂目前是祭典、儀式和魔法的第七射線大師。這一道射線將主導新黃金寶瓶時代，並能使身心靈融為一體。但祂仍然是因果委員會裡負責第三射線的成員。\n\n祂最近也擔任過星際議會的成員。祂的晉升意味著祂正在向宇宙傳播宇宙之愛。\n\
    \n祂正在幫助人們憶起古老的療癒法和智慧，並提出正逐漸發揮影響力的「替代」和「自然」療法。祂還教導那些為了至善而發揮天賦的人，讓他們的通靈力量更強大，並善於傾聽自己的直覺。\n\
    \n如果你準備要推廣古老的療癒法和智慧，並傳播宇宙之愛，那就調整自己的頻率，接通娜達夫人的能量場。\n\n### 雅典娜女神\n\n雅典娜女神（Pallas\
    \ Athena）是列木里亞大陸的首席顧問，也是亞特蘭提斯真理神殿的大祭司。\n\n祂代表因果委員會透過衝突產生的第四道和諧射線。祂攜帶著所有地球人的正直屬性，並幫助所有推動真理的人。\n\
    \n如果你希望發展真理和正直並傳播和諧，就調整頻率，接通雅典娜女神的能量場。\n\n### 波夏女士\n\n波夏女士（Lady Portia）被稱為自由女神。祂是亞特蘭提斯自由神殿的大祭司。祂與個人合作，幫助祂們獲得心理和情緒上的自由。然而，在大多數的情況下，祂都會與威尼斯的保羅（Paul\
    \ the Venetian），一起高舉自由之火，使人類在揚昇之路上向前邁進。現在是我們照預定計劃自由體驗地球的時候了。\n\n波夏女士的任務是把黃金亞特蘭提斯的能量帶回地球。祂是因果委員會第七射線的發言人。\n\
    \n如果你希望高舉地球的自由火焰，加速黃金亞特蘭提斯能量回歸，就調整頻率，接通波夏女士的能量場。\n\n### 觀想：與更多女神大師連結\n\n1. 找一個安靜、不受干擾的地方。如果可以，點一支蠟燭。\n\
    2. 用一點時間放鬆、集中自己，準備吸收女神大師的能量。\n3. 觀想自己沿著一條鑲滿珠寶的金色小徑，朝著天空金色的神殿前進。\n4. 高頻率的金龍盤旋在神殿上空。火龍在保護神殿的入口。祂們點頭歡迎你的光臨。\n\
    5. 你穿過閃閃發光的金色大門，聞到美麗的香氣，也聽到天使般的音樂。\n6. 你走進一個陽光明媚的庭院，院子裡到處都開滿了鮮花。\n7. 敞開心、散發愛與光的女神大師抹大拉的馬利亞、聖克萊爾、亞維拉的聖德蘭、娜達夫人、雅典娜女神和波夏女士都在這裡迎接你。\n\
    8. 告訴祂們你想發展的女神大師屬性。你也可以只跟其中的一位大師說。\n9. 祂們同時起身，彼此手牽手圍繞著你。\n10. 你發現自己在一個旋轉著金色和彩虹光大圓圈的中央。\n\
    11. 你也許感覺內在的能量被釋放，密碼被點亮，派不上用場的陳舊信念也被移除了。\n12. 每一個女神大師都在你的氣場裡放了一把火焰：\n    *   抹大拉的馬利亞放了一把深粉色的火焰。\n\
    \    *   聖克萊爾放淡藍色的。\n    *   亞維拉的聖德蘭是深藍色的。\n    *   娜達夫人是淡粉紅色的。\n    *   雅典娜女神是黃金色的。\n\
    \    *   波夏女士是閃閃發光的白色火焰。\n13. 女神大師退去的時候，感覺祂們燦爛的光芒從你身邊掠過。\n14. 知道你接受了一次神聖的陰性光浴，向祂們致謝。\n\
    15. 穿過金色大門，回到起點。\n16. 感知你已經邁入精通和開悟新可能性了。\n\n## 第三十八章 龍族\n\n龍是精靈——但不隸屬於地、風、火、水四大元素——祂們屬於天使界。祂們的頻率超出了人類有限的視覺能力。\n\
    \n自地球形成以來，祂們就與地球一起合作。在地球誕生的第一個安加拉黃金紀元（Golden Age of Angara）時，祂們就開始幫忙把地球從火球變成一個充滿生命、有呼吸的世界。祂們與大天使麥達昶和神之臨在（Shekinah）的創造原力，一起在地球上建立了大陸的初期形式。此外，由於祂們也幫忙建立地球的能量線，能量線也因此被稱為龍脈。\n\
    \n黃金時代這個名稱的由來，是因為當時的人和土地都會散發熾烈的金色氣場。到目前為止，地球已經有過五個非常高頻率的時期了。\n\n第一個是星球誕生的安哥拉時期，龍族曾在這個時期提供了特別的貢獻。這是一個永恆的時刻，因此，人類隨時都能取用此時重要的創造原力。\n\
    \n第二個是被稱為派特尼姆紀元的非洲黃金時代。來自全宇宙的高頻存在，都回應了這個與生存有關的召喚。這個事件發生在非洲和規模比較小的亞洲地區。這個時期的非洲仍然是一個綠林蒼翠的時代，留在大地裡的能量正等著人們準備好的時候返回地面。龍族與活在乙太體中的第七次元存有合作，幫助人們在非洲和亞洲建立這個紀元。\n\
    \n這個時期的地球只有第七次元的龍族。這些龍族擁有創造或摧毀物質的力量。因此，土龍和火龍幫忙開鑿山脈，水龍則幫忙淨化並用基督意識照亮水域。凡是有祂們聚集的地方，金色的光芒都會從水中散發出來。龍族負責大地萬物的運轉。\n\
    \n龍族後來把維護這個不平凡的高頻時代工作，交給了非洲的天使部隊和第七次元的乙太行止高人。\n\n第三個姆黃金紀元是一個以太平洋為基礎，而且早於列木里亞大陸的紀元。這就是恐龍的時代。地球上還居住著第四到第五次元的乙太存在。他們沒有留下任何踪跡，但非常熱愛並樂於協助大自然。他們仍然把麥可和馬利亞的海藍寶石療癒火焰，保存在空心地球以及海王星、獵戶座、天狼星和昴宿星團的中空內層。\n\
    \n這些龍族與姆的存有合作，把天使麥可和馬利亞的火焰之光，越過地球的能量線帶進揚昇行星、恆星和星系的氣場裡。祂們服務的結果，讓這些特殊的龍族都在這個文明的末期揚昇到第五次元了。\n\
    \n列木里亞大陸是第四個黃金紀元，也是以太平洋為基地，發生在人類還不是第五次元存在的時期。列木尼亞人很像天使，是五次元的光能，但振動的頻率比較低。他們熱愛地球，並熱切地想提供幫助。即便如此，它還是會在遙遠的二〇一二到二〇三二年間經歷一個關鍵階段！\n\
    \n列木里亞大陸留下一個了不起的禮物，要幫助我們完成目前正經歷的驚人轉換。他們把從源頭取得的光，以及來自恆星、行星和宇宙巨大能量的氣場融合、聚焦，直到它們變成熔融的狀態後，再傾注到龍脈，並在那裡形成高頻的列木里亞水晶。這就是地球的內部有輻射光的原因。\n\
    \n龍族一直在保護這些列木里亞光的特殊縫隙，幫助我們通過這個過渡時期，順利進入下一個黃金紀元。「龍」（dragon）這個字的原意是「觀察者」（watcher）或「監護人」（guardian）。龍族一直照顧列木里亞人鍾愛的一切——土地、自然和人。祂們不愧為人類偉大的同伴、捍衛者、保護者和照顧者。\n\
    \n列木里亞時代結束時，乙太存在祈禱自己能擁有肉身，讓他們得以全新的形式體驗生命。他們希望經驗這些感知，並希望以肉體的形式呈現大天使麥達昶和神之臨在（Shekinah）的能量，以便在地球上紮根。\n\
    \n他們的要求被接受了，但條件是參與這個實驗的列木里亞人也要有情緒。號角聲發出後，就像以前那些偉大的機會一樣，全宇宙的志願者都來響應。列木里亞人從來沒有肉體的經驗，龍族也來幫助這些新人類。祂們先協助列木里亞人在地球上建造結構，為實驗做準備，接著，再清除第一批亞特蘭提斯人周圍的能量，好讓一切都能很輕易地流動。\n\
    \n龍族幫他們開鑿亞特蘭提斯的波賽頓山，和上面聳立著的波賽頓神殿。神殿裡安放了亞特蘭提斯大水晶。祂們還保護這個水晶發電器。大水晶在亞特蘭提斯末期掉進百慕達三角洲的中心時，水龍承擔了保護它的責任，因為它仍然是一個活躍的次元入口和強大的發電器。\n\
    \n當星際議會需要使用入口時，它就會產生強光，讓三角洲的所有人事物都經歷一個次元間的轉換。這意味著祂們會從人類的眼中消失不見。當然了，這是祂們的靈魂事先同意的，這也為祂們提供了一次靈性提升的機會。\n\
    \n由於祂們過去經常需要這個入口，也因此促生了今天的百慕達三角洲之謎。如今，由於行星的頻率增加，次元的入口開啟時，已經不會對周圍的人事物產生太大的影響了。\n\
    \n二〇一五年是大水晶再度躍升的時間。龍族釋放祂們的保護能量，使光全部的力量像噴泉一樣升起，再度照亮了地球。這對地球的揚昇和精通過程產生了巨大影響。\n\n\
    亞特蘭提斯在幾千年前沉沒時，龍族做出了巨大的犧牲：放棄揚昇的角色，採取了第四次元的乙太體，隨時準備在我們經歷的強大過渡期間幫助我們。祂們也因為這一次的犧牲而成為故事和童話的焦點。然而，這些故事鏤刻在每一個跟祂們一起在黃金紀元化身者的藍圖裡，讓祂們長久保存這個記憶。凡是有意識或無意識地相信這些故事的人，都能吸引一隻第四次元的龍族來幫助自己。\n\
    \n一九八七年的諧波匯聚，也就是地球淨化二十五年週期的開始，人們對龍的記憶讓這些有智慧的生物得以返回地球，讓他們重新在高層建立連結。\n\n二〇一一年和二〇一二年，龍族的能量隨著三十三個宇宙入口的開啟而劇升。列木里亞大陸神聖入口的開啟，使大量的龍之光回到了地球。安道爾（Andora）和檀香山的宇宙入口也是龍族的入口，可以讓這些有智慧的生物大量湧入。大量的龍族在那個時代進入地球，使牠們的數目立刻超過人類的兩倍。這些入口還會繼續開啟並照亮人類，直到二〇三二年全面運作為止。這意味著你現在正擁有一個精通和開悟的大好機會。\n\
    \n龍族現在正將很高的頻率引入並固化在地球上。由於祂們是威力無比強大的存在，因此會督促在精通之路上邁進的每一個人跟祂們連結。身為求道者的你，能在旅途中的任何時間進行連結。但由於次元間的遮幕越來越薄，這種連結就變得更加地勢在必行了。\n\
    \n二〇一三年，提姆寫作《五次元的靈魂揚昇》這本書以前，有一次在散步與大自然連結時，龍族便與他有過一次直接的接觸。一個很清楚的聲音跟他說：「我們是龍的原力，來此聽候你的差遣。」\n\
    \n提姆起初有些不安，因為從來沒有龍族接近過他。他決定按照連結外部能量源頭的方式把這個能量帶進自己的心輪，以驗證它的純淨性。他發現這是一種純度和完整性最高的能量。兩天後他開始與這些偉大的存在合作，並被祂們引導到一個浩瀚的光與愛的境界。"
