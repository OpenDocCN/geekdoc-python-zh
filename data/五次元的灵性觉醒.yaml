    15. 穿過金色大門，回到起點。\n16. 感知你已經邁入精通和開悟新可能性了。\n\n## 第三十八章 龍族\n\n龍是精靈——但不隸屬於地、風、火、水四大元素——祂們屬於天使界。祂們的頻率超出了人類有限的視覺能力。\n\
    \n自地球形成以來，祂們就與地球一起合作。在地球誕生的第一個安加拉黃金紀元（Golden Age of Angara）時，祂們就開始幫忙把地球從火球變成一個充滿生命、有呼吸的世界。祂們與大天使麥達昶和神之臨在（Shekinah）的創造原力，一起在地球上建立了大陸的初期形式。此外，由於祂們也幫忙建立地球的能量線，能量線也因此被稱為龍脈。\n\
