    太陽神經叢是一個非常強大的精神中心。它保存著我們的直覺，伸出觸角，探查周圍發生的事件。幾千年來，由於地球上的靈魂疏忽了這個脈輪的精神力量，也因此只會運用邏輯思維導引道途的方向。


