    15. 預期即將來臨的新事物。'
  mdcn: '## 第二十五章 學堂七：高層覺知


    似乎是一個不可能的任務。後來，有一天晚上，她躺在床上，看到母親的高我進入房間。那個女人散發著光芒，充滿愛和關懷地看著她。黛安娜立刻知道這是媽媽的真我。他們在地球上建立的障礙只是一個幻相。這徹底改變了她對母親的觀感。此後，每當我執想要冒出來，她就會回想起這場母女鬥爭的源頭其實是母親和她受過創傷的自我。她也會想起母親的高我傾注出來的愛，然後就會微笑著把她放下。


