- md: '# 第四十四章 精通合一法則


    大師會為生活中的每一個人、事、物負起全部的責任。他們知道是自己把各種人、事、物吸引到身邊的。


    如果你的生活裡出現挑戰性的人物，要不是你吸引他們來，就是因為前世的協議而選擇他們的。你也許正在向他們學習，或者要以高層的了解和愛啟發他們。作為開悟的大師，你能看到他們的靈魂，並以平常心和不批判的態度對待他們。（這是理想的態度。即使是揚昇大師也難免會有一點我執！）


    你也要用同樣的態度對待情境。你會把每一種經驗，包括似乎不可能發生的經驗，吸引到自己的能量場裡。同樣地，這通常是為了讓你學習。因此，你有責任內觀是什麼原因讓你把它吸引到生命裡的。切記，你也許是為了幫助別人才選擇這個經驗的。


    ## 五次元的靈性覺醒


    這種了解有極大的解脫性，因為它會讓你創造更滿意的結果。


    一個開悟的大師會問：


    - 我是如何吸引這個人或情境的？

    - 我如何透過內在的改變轉化外在的世界？

    - 那個人為什麼用這種態度對我？

    - 我能從他們的內心和靈魂裡，看到讓他們有這種行為的原因嗎？

    - 我該如何對待他們，好讓他們對我有安全感，並照亮他們的大師我？

    - 我如何給別人最好的服務？


    當你的脈輪擴張到第五次元時，人們就會用不同的態度對你，你也會注意到這個改變。此外，你會自動點亮他們的心和其他第五次元的脈輪，好讓他們繼續在揚昇之路上邁進。


    開悟大師的另一個任務，就是親身示範第五次元的生活。以肉身存在的你，能在面對挑戰時保持高層大師的屬性：平常心、不批判、全然真實、喜悅、信仰、慈愛、信心和開悟的視角嗎？你要像大師一樣堅守你的意圖和行為。


    這正是你召喚書中提到的偉大啟明者的時刻。你可以請求祂們給你灑光，並強化你內在已編碼的屬性。這是一種實用、啟發性並能幫助你的方式。


    切記，當你發展並把這些恩典的屬性整合到能量場以後，你就會自動地提供相同的服務給別人。你甚至會在毫不覺察的情況下，幫助成百上千的靈魂。


    當我們朝著新黃金寶瓶時代邁進時，就會再度擁抱地球的合一法則。遵循這種靈性法則生活的人，就自動地成為大師。


    合一法則有七個面向，能讓我們與自己、與彼此，以及所有人和諧相處。


    1. 恩典會從源頭之心傾注，化解所有低層振波。恩典的能量會立刻寬恕和遺忘，進而用淨光取代陳舊的一切。它能釋放我們，而我們也能把它提供給別人。

    2. 意圖是專注在情境，讓它帶來至善結果的能量。由於它包含了心能量，因此，也具有不可思議的力量。

    3. 顯化是運用念力把光煉為物質的能力。當它為了至善而被啟動時，那就是一項偉大的服務。

    4. 因果報應是對自己的每一個身、語、意負責的方式，因為一切都會在生命之鏡中返回自己身上。

    5. 責任是大師的標誌，因為他們知道自己要對生活中發生的一切負責。

    6. 無條件的愛是一種不加批判地接納所有眾生的形式。

    7. 合一法則是知道你在我的裡面，我在你裡面。這個法則適用於所有眾生。我們不會傷害任何有覺知的生命，因為這等於傷害自己。萬物都是源頭的一部分，而且也是彼此的一部分。


    合一法則是第五次元生活的模板。在亞特蘭提斯黃金紀元建立的合一法則，讓每一個人都能在和諧和真正的快樂裡生活。


    二〇一五年九月二十八日的血月（blood Moon）使能量急劇地上升，以至於即時業力回到了地球。靈性層級體系有意用血月喚醒還活在睡夢裡的地球靈魂。其結果是，隨著地球頻率的迅速上升，星際議會已經發佈旨令，要把恩典法則運用在人類身上，使人類以低於許多光之工作者期望的速度，緩慢地揚昇。


    亞特蘭提斯的所有靈魂都會記得如何遵循合一法則生活，因為這是團結、愛與至樂生活的萬用鑰。化身為黃金小孩（golden children）的靈魂，已經具有擁抱高層宇宙法則的能力了。他們現在抵達地球，以老師的身分為人們帶路。自二〇一二年的宇宙時刻以來，這些年輕的啟明者在出生時就擁有拋棄幻相遮幕的機會。他們之中有許多人都這麼做了，因為他們憶起了自己的真我。


    在接下來的五到十年之間，人類的生活會發生巨變，以便為二〇三二年開始的新黃金時代做準備。覺醒的靈魂會引導脈動朝著揚昇之路邁進。他們都是決心盡快引入新典範的遠見者。


    隨著地球學生晉升為大師，合一法則在地球上的應用，就會開始為地球帶來美好的改變。


    ### 觀想：遵行合一法則的生活


    1. 準備一個不受干擾的神聖空間。你也可以選擇一個戶外的神聖空間。

    2. 面向東方，大聲向宇宙發出聲明：

    「我，（姓名），光的行止高人，現在以源頭的名義，發出遵循合一法則生活的旨意。

    我選擇走在恩典之美中。我選擇以周圍所有人的至善為意圖。我選擇以精通的生活顯化我需要的一切。我選擇用充滿愛的業力賜福我的生命。我選擇為自己和美麗的地球負責。我選擇無條件地愛自己和別人。我要秉持這些法則，擁抱最高程度的開悟！」

    3. 帶著能量和意圖重複以上的旨意三遍。

    4. 結束時，再陳述下列內容一次：

    「誠於中，形於外。如其上，如其下。」


    # 結論：開悟大師燦爛的黃金未來


    靈性層級體系不斷地要我們觀想光輝燦爛的未來，好讓我們能把它創造出來。以下是開悟大師們對未來抱持的燦爛黃金願景：


    - 新黃金時代蓬勃發展的商業，都是那些為了至善而服務人類、動物或大自然的類型。

    - 我們將會享有富有創造力又令人滿意的工作。

    - 我們會把自己照顧的孩童和動物視為美麗的靈魂。

    - 我們會尊重和崇敬大自然與水域。

    - 我們會關愛自己的身體。

    - 當金錢不再那麼重要時，靈魂的滿足感會成為我們一切行為背後的驅動力。

    - 我們會與精靈、天使、龍族、獨角獸和前方的大師們溝通。

    - 我們只說慈愛的話語。

    - 我們會對自己接收的一切心存感恩。


    以開悟大師的身分昂首邁步，影響你的世界，讓它成為一個黃金世界。


