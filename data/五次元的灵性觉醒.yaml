    \ of Siena）和亞維拉的聖德蘭（St. Teresa d'Avila）。\n\n隨著時間的接近，聖克萊爾將再次化身，並在這一生從靈魂的層面，向世界導師庫圖彌上主報告祂在提高地球靈性覺知上的進展。祂也會跟祂聯絡，討論這個過程該做些什麼。\n\
    \n如果你有一個需要勇氣和決心的願景，那就調整自己的頻率，接通聖克萊爾的能量場。\n\n### 亞維拉的聖德蘭\n\n聖德蘭（St. Teresa d'Avila）經歷過許多化身，最重要的是在十六世紀的西班牙時，作為亞維拉的聖德蘭那一生。祂是一個宗教神祕主義者和預言家。母親在祂幼年去世，祂是被修女撫養長大的。祂最後改革了加爾默羅教團（the\
    \ Carmelite order），克服了改革過程中遭遇到的許多反對力量。\n\n祂在多生多世中召集了一個光之工作者團隊，許多人現在還跟祂一起在內層工作。加入了祂們行列的，還有大批的其他人。\n\
