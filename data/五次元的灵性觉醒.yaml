    ## 第二十一章 學堂三：了解水晶科技


    黃金亞特蘭提斯時代的每一個人，都有十二個輻射旋轉的脈輪和十二股活躍的 DNA。由於擁有第五次元的能量，所以他們的身體是矽基的。矽基的身體比第三次元的碳基身體擁有更多的高頻光。光承載著靈性的資訊和知識，因此，你擁有的光越多，就越能使用更多的鑰匙和密碼，以了解這些取得馬上就能用的靈性知識。


    基於這個緣故，男女大祭司得以從星際議會獲得非比尋常的資料。其中包括與水晶特性以及與精靈合作的資訊。接著，他們就會把適當的資訊傳遞給人們。這就是讓黃金亞特蘭提斯擁有強大威力的祕密。


    同樣有幫助的是，當時的亞特蘭提斯人運用了百分之九十以上的腦容量。我們目前只運用了大腦容量的百分之十。


    ## 第二十一章 學堂三：了解水晶科技


    學生在這個學堂裡要學的，是如何把第三次元的碳基世界轉變成高頻的矽基世界。他們了解碳的能量屬性。碳只含有少量的相對低階頻光，而且這些光會膨脹成結晶的形式。這種轉換是當頻率提高到一定層面時，自動產生的結果。此外，他們還了解如何使用晶體形式中的神聖幾何形狀，使不平凡的事情發生。這些都超越了我們目前的理解力。目前有許多人正在參訪這個特殊的學堂，想把他們對新黃金時代水晶科技的了解帶回去。


    亞特蘭提斯人可以接通許多不同的頻段。例如，他們可以輕易地把自己內在的撥接盤切換到天使、獨角獸、精靈、樹木和動物的波長。這麼做就能讓他們通過思想、畫面或感官，直接與這些存在溝通。這是在有意圖的情況下完成的。這要歸功於亞特蘭提斯人的天眼、天耳和心電感應，使得他們能調整至與其他物種溝通的頻率。


    現在的人正在無意識的情況下，重新取回這些通靈的能力。你也許聽不到聲音，但能接收音波傳來的印象。你也許看不到生動的畫面，但能感知正在發生的事情。你也許會對別人的想法有相當程度的了解。這意味著你會通靈，而且很可能還會有其他類似的經驗，也就是一種高頻的了解能力。對一個已開悟的大師來說，你的任務是接納和信任。


    每一個水晶裡都有來自自然界，並願意跟你建立連結的小精靈。當你對水晶有一份了解，並願意的時候，你就可以學著與精靈溝通了。精靈會回應你充滿愛的命令和願望。例如，你提出點亮水晶的要求時，精靈也許會與水晶合作，以滿足你的要求。這就是黃金亞特蘭提斯人為住家照明的方法。


    今天的電腦能完成的工作，當時都是通過水晶裡的精靈，直接用心念的力量，對水晶進行編程來完成的。


    有一些水晶會變成高度進化存有的能量基地。他們會透過水晶的媒介，傳遞重要的資訊、療癒能量或其他的屬性。隨著黃金亞特蘭提斯的發展，人們已經能接通蘊藏在水晶裡的強大本質了。星際議事會在亞特蘭提斯居民準備好的時候，把近乎不可思議的高振波科技設計圖，下載到神殿裡那一顆巨大的水晶裡。這是由賢士先吸收和研究以後，再向人們解說的。用這種方式製造的火箭，就會以超乎我們想像的快速度運動。他們開發了多層次飛行運輸系統，也建立了先進、不需要人工即可栽種農作物的水耕法（hydroponics）。亞特蘭提斯人有控制天氣的能力；他們使用雷射手術讓四肢再生；建造圓形建築物，與其恆星系統通信。甚至能從其他恆星系統中獲取可以在地球使用的礦物。他們的方法是先將物質解構，吸到地面以後，再重組物質的結構。所有這些都從波賽頓神殿裡的大水晶提取的能量來提供動力，而水晶的動能則是來自純淨的源頭（Source）能量。


    同時，他們卻是以極其簡單、和諧、有趣、放鬆、創意和關愛的互動，在大自然裡生活。他們的心智清明、平靜，因此，能以超出我們現有能力的方式集中心念，顯化物質。但他們的科技基礎要透過心念的控制、聲光與觀想的力量，與水晶裡的生命力量進行溝通。


