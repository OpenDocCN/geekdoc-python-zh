    滿月一直都是一個充滿魔幻和令人敬畏的時段。人類很早就知道動物和感覺敏銳的人，都很容易因為月亮發出的振波而受到深沉的影響。二〇一四到二〇一五年間，滿月的力量越來越大，最後在二〇一五年九月的滿月日達到最高峰。蓋婭已經獲得了足夠的月光，使得祂可以平衡地球上陰陽兩性的能量。雖然已有廣大人群的陰陽能量逐漸達到平衡，但滿月仍將繼續發揮它非比尋常的影響力。


    因果輪除了會吸收和散播神聖的陰性之光，還有另一個強大的目的：為求道者提供一個與靈界深沉、密切的連結。這種連結的程度，取決於一個人從前世帶來的靈性天賦。這也與他們的靈魂使命有關。


    因果輪也會讓天使界的能量和光進行雙向的交流。這會把天使的振波帶給個人，並讓它永久錨定。當光之工作者的因果輪再度活躍時，獨角獸就會通過這些存在，把牠們令人敬畏的淨光連結到地球上。


    當獨角獸看到你的服務之光在頂輪發光時，祂就會跟你建立連結，並通過因果輪進入你的能量場。由於這件事的意義無比重大、美麗和強大，以至於它有完全改變你靈魂之路的潛力。


    獨角獸是唯一帶著純淨的恩典來與地球合作的存有。祂們用無條件的愛賜福所有的環境。這些偉大的存有，在第七和第九次元之間震動，照亮並觸動了所有人的心靈。


    大天使克里斯提爾負責因果輪的發展。由於這個脈輪關係著人類開悟的進展，因此，祂繼續與我們一起在成就開悟大師的路上努力。


    大天使克里斯提爾會隨著所有靈魂內在之光的亮度增加，把更高層的基督意識帶進地球的能量場。這個光會穿過因果輪和心輪。基督之光會在二〇三二年以前完成它在高層的體現，好讓我們為新的黃金紀元做好準備。


    ### 觀想：因果輪的擴張


    +   1. 做好冥想的準備。選一個神聖的地點，並按自己的意思點一支蠟燭。

    +   2. 呼喚大天使克里斯提爾，請祂用第九次元的基督之光充滿你的四身系統。

    +   3. 把基督之光吸入身體的每一個細胞，讓光把你徹底清洗乾淨。在這個光裡休息片刻。

    +   4. 把你的注意力轉移到因果輪，觀察它散發出來的明亮白光。

    +   5. 看著它用純白的光絲與月球接觸。

    +   6. 把月光帶到你的因果輪，看著它擴張，直到與你融為一體，再從你延伸到所有的眾生為止。

    +   7. 讓大天使克里斯提爾把脈輪的高層面向錨定到你的身體裡。感覺並感知這對你的能量場產生的影響。

    +   8. 感知你的因果輪把振波發送到天使界。

    +   9. 大天使和天使們來到你身邊。祂們手裡拿著淨光的禮物。祂們後面有一隻華麗的第九次元獨角獸在滑行。

    +   10. 讓祂們把禮物放進你的因果輪裡。感覺美和光在擴張你的因果輪，直到與月光的亮度一樣為止。

    +   11. 獨角獸向你走來，祂帶來一個條通往高層揚昇之路的訊息。這個訊息也許是文字、神聖的幾何圖形或光之編碼。

    +   12. 把訊息吸引到你的心輪，知道你的旅程會有最燦爛的明光相伴。

    +   13. 向天使和獨角獸致謝，回到你的神聖空間。

    +   14. 睜開眼睛，運用已擴張的因果輪，把天使之光遍灑到周圍每一個人的生命裡。


    ## 第十六章：擴張的靈魂之星


    靈魂之星脈輪是第二個超越的靈性中心，它對我們的覺悟有相當大的影響。位於頂輪上方三十公分（十二吋）的位置，也就是整合柱因果輪正上方的靈魂之星，會在揚昇過程的早期啟動。它的特別之處是在一個人的光商數（light
    quotient）達到百分之七十九以前就能取用。唯一的條件就是靈魂要接受他的靈性使命。


    靈魂之星脈輪保存著人在靈魂之旅中獲得的每一種天賦、才能和靈性的成就。這包括累世在其他身體、次元空間和宇宙中獲得的知識和智慧。因此，一旦這個脈輪開始活躍，求道者就能從一座龐大的圖書館裡存取資訊了。


    靈魂之星開始甦醒時，大天使薩基爾和大天使馬利爾（Archangel Mariel）會監督它的發展。這些燦爛的存在會在它活躍的初期持續地參與發展過程。祂們會確保靈魂之星能以最大的程度開啟和啟動。


    靈魂之星分為高、低兩個面向。低面向會連結靈魂和它的本質，從單子體裡吸收光能，加速它在選擇的道路上邁進。許多人都會在邁向第四次元時發生這種情況。這就是當你把心敞開，開始認知自己的靈魂之旅的時候。


    靈魂之星的高層面向是開啟你大師智慧的真正關鍵。


    二〇一四年夏至，當這顆靈魂之星進入活躍的下一階段時，多彩明亮的洋紅光就會錨定在數百萬人的內在，讓所有人都能取用第五次元的揚昇脈輪。這為通往前世的天賦、知識和意識之路開啟了大門。


    地球上得以汲取宇宙和個人成就寶藏的開悟大師們，正開始顯化他們偉大的技能。這使得每一個人都能進入更高層的振波。


    提姆在二〇〇八年有過平生第一次靈魂之星的體驗。他經歷一場巨大的變化後，大天使麥可在他早上冥想時來拜訪他。大天使告訴他，儘管祂非常愛提姆，但提姆現在必須對自己的能量承擔更多的責任，不要經常召喚祂來。


    接著，大天使麥可交給提姆一個叫藍星封印（Blue Star Seal）的亞特蘭提斯古科技，讓他能管理自己的能量系統。這是祂從提姆的靈魂之星找回來後再啟動的。提姆在托特（Thoth）那一生的記憶和天賦，隨之蜂擁而來。五年後，大天使麥可告訴提姆，可以把這個科技傳遞給做好準備的人。他在《五次元的靈魂揚昇》這本書裡傳遞了這個科技。


    靈性之路上所有的求道者，都能汲取同樣層面的資訊。然而，每一個靈魂都有自己獨一無二的道路要走。靈魂之星脈輪能提供一個大師需要的東西。它永遠不會拿出不適用或不合時宜的資訊或記憶。


    當你直接與擴張的靈魂之星一起工作時，令人難以置信的大門就會為你開啟。當你直視靈魂之星脈輪時，就會看到在時空裡移動的純淨光線。這些光線會通過金色的閘道，通向高頻率的前世記憶。這些明亮的閘道是連結單子臨在（monadic
    presence）、空心地球、冥界廳和阿卡西紀錄的乙太知識儲存庫。


    所有這些神聖的記錄，都可以視你的振波頻率狀態而存取。你的光照越耀眼，靈魂就會走到更遠的時空，找回你需要的東西。當你達到這個層面時，大天使薩基爾和馬利爾就會退開，讓你靠著自己的力量行動。由於許多走在揚昇之路上的人握有明光，他們正經驗靈性協助的撤離。高能勢域開始觀察我們，而不再親自一步步拉著我們前進了。引導始終都在，但只有地球上的大師才能真正錨定寶瓶時代的光能。


    亞特蘭提斯黃金紀元的男女大祭司，發揮了靈魂之星脈輪的全部潛能。阿爾塔（Altar）可以利用這個脈輪，開發足以提升他人振波的靈性工具。他們可以連結自己的單子在第十二次元的光能，讓他們提取不可思議的技術藍圖。這是讓亞特蘭提斯成為地球第五次元生命基礎的因素之一。


    如果你在亞特蘭提斯黃金時代生活和工作過，你的靈魂之星脈輪裡就儲存著這個時期光和愛。這種能量能讓地球在未來的二十年內燦爛地揚昇。接著，我們就能邁向靈性和科技的高度發展。這是亞特蘭提斯的智者難以想像的事。


    ### 觀想：進入靈魂之星脈輪


    +   1. 做好冥想的準備。找一個神聖的空間，也可以點一支蠟燭，然後，把自己完全放鬆下來。

    +   2. 閉上眼睛，深呼吸。把注意力轉移到頭頂上方三十公分（十二吋）處的靈魂之星脈輪。

    +   3. 看著它發出令人驚訝的洋紅色光。光的核心是亮藍光。

    +   4. 專注於這個藍光，把你的能量移到光裡。感覺它與你合為一體。

    +   5. 看著自己站在閃爍著藍色和洋紅色的大門外。大天使薩基爾和馬利爾在那裡迎接你。

    +   6. 祂們替你開門，讓你進去。

    +   7. 你面前有一條閃閃發光的銀色通道，一直延伸到觸目可及的遠方。路徑的兩側都有發光的入口，每一個入口都通往你經歷過的一個前世。

    +   8. 這些入口儲存了你所有光榮的靈性成就。選擇一個入口，打開它。

    +   9. 它裡面含有什麼能量？

    +   10. 接下它給你的第一個東西，把它吸引到你的心輪裡。感覺那一個前世的光把你的振波提升到一個新的高峰。

    +   11. 選擇另一個通道。如有需要，可以請薩基爾和馬利爾幫你打開更多扇門。

    +   12. 把所有的光能吸到你的心輪裡，讓光之密碼和振波擴散到全身。感覺你個人的宇宙知識讓你發光。

    +   13. 把注意力帶回頭頂上方的靈魂之星脈輪。看著它如何變大、變亮。

    +   14. 向大天使薩基爾和馬利爾致謝後，回到你的起點。

    +   15. 睜開眼睛，準備接受以任何形式出現的古老智慧。


    你可以依照自己的需要多觀想幾次。


    ## 第十七章：擴張的星系門戶


    從天使的角度來看，明亮的星系門戶脈輪是一幅最壯觀的景象。正在觀察我們進展的天使、指導靈和其他的光之存有，很樂於見到我們的光體與靈魂的本質一起綻放。第五次元脈輪柱發出不可思議的明光，吸引了來自宇宙四面八方的最高振波。


    每一個人的脈輪系統都會散發自己這一生的靈魂使命，因此，也都有它獨一無二的光。星系門戶的任務是把肉身裡的靈魂，連結到它們所來自的源頭之光——我們起源的恆星或行星。


    我們只有七個可操作的脈輪，而頂輪要負責接收和處理提供給我們的所有資訊。但隨著我們邁向第五次元的生活方式，這個角色就由星系門戶來接替。當它在揚昇的過程開始活躍時，我們所有的能量系統就會重新排列光和力量的路線。


    星系門戶具有跨越所有時空次元界限的能力。它的工作是提供超過我們身體現有能力頻率。它能接收來自第九次元的光源，並把它降低到讓我們感覺舒適的層面。這種驚人的連結，使許多正在使用第五次元脈輪柱的靈魂，以超過預期更快的速度發展靈性的進步。


    星系門戶首度錨定和啟動時，是美麗的金橘色。它是由光之尊主大天使麥達昶負責監督。大天使麥達昶是宇宙所有已知光能的創造者。在我們揚昇之旅的早期，祂小心翼翼把這個光傾注到脈輪裡，滋養我們的擴張。當這個進程被錨定下來以後，祂就會退開，讓我們用與靈魂使命協調的速度擴張。


    星系門戶會在揚昇過程的第二階段迅速地擴張。目前有許多靈魂正處於這個層面。金橘色在這個階段會呈現明亮的色調，因為它充滿了基督意識的更高頻率，而且脈輪也會不斷地改變形狀。它會根據我們個別的動力，形成複雜、神聖的幾何形狀，把正確的能量磁吸到光體上。這些能量總是連結著靈魂起源的恆星或行星系統。這可以為地球上的我們提供最高層面的支持。


    我們的靈魂也許會有意識地發出對光和資訊的要求，星系門戶也會滿足這些要求。它也會獨立地為靈魂的成長尋找宇宙的資訊。它會被浩瀚空間裡的所有純淨的光吸引。這有助於它為我們在地球上的學習過程吸引新的經驗。


    它這種工作方式形成了一個明亮的金色聖杯，上面散佈著美麗的金線，在時空的不同'
