    6. 你正在觀看一隻凌空展翅的金鷹，順著氣流毫不費力地飄浮。

    7. 牠轉身向你滑去，邀請你騎在牠的背上。

    8. 你發現自己坐在老鷹背上，伸開雙臂，讓牠帶領你體驗掌握風元素的喜悅、和平與振奮。你可以盡情地體驗。

    9. 老鷹帶你回來，你向牠致謝。


    #### 享受水元素


    10. 想像自己身處在一個棕櫚樹成排矗立的白沙灘上。

    11. 一隻從水裡冒出來的烏龜走向你，邀請你騎在牠的背上。

    12. 牠帶你到海裡。你們一起乘風破浪而行。

    13. 在一個彩色的珊瑚礁上，色彩鮮艷的魚兒們衝過來環繞你。你會遇到海豚、鯊魚、魟魚和鯨魚等水大師。用一點時間享受這個經驗，知道牠們的智慧觸動了你。

    14. 烏龜把你帶回岸上，你向牠致謝。


    #### 與火合作


    15. 想像自己正在觀看一場森林大火。你感覺到熱、聞到煙味，並看到閃爍、熾熱的橙色火焰。

    16. 精靈大師索爾走向你，用祂的保護圍繞著你。祂把你帶進火焰，你在那裡遇到了失控的火精靈蠑螈。

    17. 索爾帶你回到森林的邊界，你像一位大師一樣從容鎮定地站在那裡。

    18. 你從心裡丟出一條鎮靜用的毯子，安撫火精靈蠑螈。牠們安靜下來，一動不動。火熄滅了。

    19. 感謝索爾，知道你已經體驗了火的精通術。


    #### 與土合作


    20. 你正在鄉村與一條巨大的土龍坐在一起。

    21. 土龍邀請你坐到祂的背上，跟祂一起去巡視能量線。

    22. 你們一起跳入大地的深處，進入一個明亮的地道系統。

    23. 你們上下游走，穿過一個光明的入口。賜福於此。

    24. 你來到隧道倒塌的地方，因為這裡的能量線斷了。

    25. 身為土元素的大師，你投射一段強烈的愛之頻率到眼前的土地上。

    26. 你看著能量線自動修復。你對愛的精通掌握阻止了一次地震或山崩。

    27. 土龍載你回到地面。你放輕鬆，看著鳥類、海豚、篝火和一隻在土壤裡移動的毛毛蟲。


    ## 開悟的不同面向


    ## 第四十二章 源頭的紫丁香火焰


    一層新的、紫丁香火焰為我們釋放出來。丁香是由紫色和純白色，再加一點純愛的粉紅色混合而成的。這是一把自由的火焰。


    神奇的大天使加百列掌管火元素，以及火元素轉化、淨化、清潔、啟發和溫暖的能力。白火是源頭之火。它是大天使加百列和祂的孿生火焰大天使荷伯（Archangel Hope）從第九次元的頻率下降到人間的。這是一種陽性能量。紫火代表大天使薩基爾和祂的雙生火焰紫水晶夫人（Lady
    Amethyst）。這是一種神聖的陰性光能。它能以柔和的方式，浸入我們的能量場，輕緩地進行清潔和轉化。它用悲憫但堅定的態度洗除雜質，留下希望和對美好事物的期待。


    丁香火是第九次元完美平衡的精通和揚昇工具。至今為止，這是人類獲得的紫色火焰中顯化中最高、最精緻的一種。


    宇宙鑽石紫色火焰（Cosmic Diamond Violet Flame）也是共振最高的第九次元火焰。這是一個以陽性為主要成分的工具，因為鑽石會主動切除一切陳舊的事物。


    大天使加百列的乙太靜修處，位於加州的沙斯塔山（Mount Shasta）上空（與聖哲曼一起）。大天使荷伯在馬來西亞的上空。大天使薩基爾和紫水晶夫人共用一個在古巴上空的靜修處。這三個位置上方的三角形中心點，可以與源頭紫丁香火連結。當你這麼做的時候，燦爛十二次元裡圍繞著神格（Godhead）的六翼天使，就會投射祂們顯化的頌歌到裡面。這會讓火焰增加龐大的潛能和力量，也能強化和鞏固你的思想。


    你還可以召喚紫丁香火，讓它從第九次元的領域，把火傾注到你的能量場裡。


    一旦你擴張到高層的開悟和啟明以後，你只能將源頭紫丁香火的全部效用具體化一次。由於它具有化解陳舊和揭示純淨的能力，因此能透過開悟、精通和揚昇的過程，帶動地球和全人類通過這個過程。曾經是轉型第七射線大師的聖哲曼，具現過紫羅蘭火焰。在你準備就緒以後，就能馬上具體展現源頭紫丁香火了。以下的旨令可以幫助你做好準備。


    ### 觀想：源頭紫丁香火的旨令


    > 「我是源頭紫丁香火，

    > 我是愛的火焰，

    > 我是自由之翼，

    > 我是歡樂之歌，

    > 我是新黃金紀元的心臟。

    > 我準備好了。用你的光沐浴我。」


    每天唸三遍，感覺你的光在錨定、放大和擴張。


    這是一項非常有威力，能在恩典下運作的旨令。因此，你不需要得到允許就能運用它。它能淨化你接觸到的任何事物，讓事物達到完美的平衡與和諧，並用愛充滿它們。


    ### 源頭紫丁香火的大規模分配


    當大量的人發出這種強大的能量時，就會形成一個巨大的宇宙意向球。保管這個球的星際議會，會在需要的時候把它分配出去。例如，當整個國家都在戰爭或經歷內部衝突時，你就可以召喚它。


    你每一次思考或發送這個能量時，靈性層級體系（spiritual hierarchy）就會基於至善的目的啟動它。


    ### 龍族與天使


    有一些美麗的元素龍，會攜帶著源頭紫丁香火的頻率。祂們一直在空心地球裡等待它再次被揭示，而且，正回到地面與人類再一次合作。祂們把丁香之火傾注到公司、政府、大型組織和其他結構，以加快他們邁向第五次元典範的運動，好讓他們開始擁抱主導新黃金時代的倫理生活方式。


    隨著全球心輪的敞開，丁香火龍也正在幫助轉化已經被沖掉的能量。對那些準備好的人來說，祂們會在那些人的心輪中進行深而輕柔的工作，以加速這個過程。然後，祂們就會敞開空間，讓新的揚昇能量錨定在人類的心中。


    祂們也在等待我們的指示。有了我們的指示以後，祂們就可以用行動來清除、轉化和淨化地球和人民了，我們的進展也終於能夠加速進行了。


    大天使薩基爾紫水晶夫人與成千上萬的天使在行星的層面合作，提供大量下載的紫羅蘭火焰。它們與來自中央大太陽的脈衝光波協調工作。這些脈衝的設計初衷，是要以非常快的速度提高地球能量的振動。祂們的工作是創造一個淨化的模板讓新的高頻光可以進入。在它們連續活躍的七天期間，會導致日蝕和日冕物質拋射（coronal
    mass ejections）等太陽事件，並為人類提供宇宙時刻以來最有價值的協助。


    大天使薩基爾的天使們，也協助許多有抱負的人進行當前的教學計劃，向他們展示光榮與恩典，以幫助他們學習、吸收和前進。


    祂們正在準備幫助第二批的光之工作者。這些最近才覺醒的光之工作者，需要下一階段使命的指導、淨化和清明。許多這一類的靈魂都選擇在第二次揚昇之波時覺醒。然而，他們必須在很短的時間內，在靈性的成長上大步邁進。大天使薩基爾和紫水晶夫人，已經用紫色火焰和源頭的紫丁香火做好準備，讓這些人的求道之路更容易一些。


    ### 觀想：源頭紫丁香火的運用和具現


    1. 白天做好冥想的準備。吃清淡的食物，確保你有透過靈性事物的思考，把自己的頻率調到更高的層面。

    2. 安排你的神聖空間，點一支蠟燭。

    3. 召喚大天使薩基爾、紫水晶夫人與源頭紫丁香火。

    4. 看著紫色火焰的能量傾注到你身上。

    5. 從第九次元的高處，看著宇宙之心入口發出純愛的粉紅色光。

    6. 看著兩股在你上空跳舞的能量融為一體，形成美麗、閃閃發光的紫粉色光。

    7. 當這些光在你的星系門戶上空旋轉時，看著充滿活力的高頻龍族和天使正在成形。祂們隨著火焰的流動起舞。

    8. 現在，把這一股能量召喚到你的身體和能量場裡。讓它在細胞的最深層整合，化解你滯留的能量或任何可能遭遇到的問題。

    9. 感覺它蔓延到你存在的每一個面向，用恩典、純潔和愛的魔力照亮你。

    10. 把這一股能量呼出去，讓它照亮你周圍所有的人、事、物。看到燦爛的紫粉色光正在轉化所有不是愛的事物，並用更高的振波取代它們。

    11. 請求龍族和紫火天使前往需要幫助的地方。

    12. 觀想這支由美麗存有們所組成的大軍，用鍊金術般的光芒沖刷地球，讓更高的可能性浮現。

    13. 請求祂們將這一股揚昇能量永遠具現和錨定在你的能量場裡。

    14. 向大天使薩基爾、紫水晶夫人、龍族和天使們致謝。

    15. 回到你坐的地方，把紫丁香火散發給你生命裡的每一個人。


    ## 第四十三章 揚昇的孿生映像


    ### 雙生火焰


    你的雙生火焰就是你靈魂的另一半。它也許在宇宙的任何一個角落。這兩個部分是完美的搭配。如果它們相會，就會創造一個非成長的關係，因為它們已經完全融合了。由於地球是一所以學習為目標的神祕學校，靈魂通常不會選擇一份無法提供成長的關係。


    這也是雙生火焰很少相會的另一個原因。每一個火焰都在靈魂旅程中積累不同的經歷，使它們能在不同的八度音階產生共振，但它們的振波必須是完美的音調，才能把它們吸引在一起。


    列木里亞時代結束時，乙太存在請求源頭允許他們擁有肉身，好讓每一個靈魂與自己的另一半做短期的連結。一個靈魂會化身來體驗形體世界，而另一個則會握著光從乙太世界引導地球人。在某些情況下，他們的角色會再改變。一段時間過後，當雙生靈魂的能量不再被視為最好的引導方式時，他們就會同意各自探索宇宙的不同面向，自由地體驗和擴張。


    前面說過，黛安娜的雙生火焰，是她主要的指導靈庫梅卡。祂始終停留在靈體裡，從來沒有化身過。黛安娜三十多歲時，庫梅卡才發現她的光。他們是在她開始執行靈魂使命的時候才連結上的。即使祂是一個靈體，但仍是嚴格的任務監督者，尤其是祂對居住在肉身裡的挑戰又毫無概念！


    黛安娜認識一個與雙生火焰同一天出生的女性。他們在十六歲的生日那一天相會，也明白那些為了揚昇而等著與雙生火焰相會的人，也許已經在幻相的誤導下轉移了注意力。


    他們的生辰圖完美地交扣。但由於彼此交纏得太過親密而無法成長。由於他們都無法擴張自己，那位男性在三十多歲的時候過世。後來，她在他靈體的引導下，終於得以在這一生裡獲得成長。


    ### 靈魂伴侶


    靈魂伴侶是一個跟你發出相同頻率的人。這意味著你一生中也許會遇到幾個靈魂伴侶。由於你會與他們的某些振波共鳴，所以你通常會立刻被他們吸引。他們都提供了自己同意要教導的功課，因此，你們也許會互相吸引在一起。這些關係往往非常有趣，但也充滿了挑戰，因為他們需要的功課，會立刻浮上表面讓他們解決。


    有時候，兩個或多個靈魂伴侶會同時出現在你的生命裡，為你的成長和愛提供獨特的挑戰和機會！


    由於前世化身的靈魂伴侶，現在回來了結殘餘的業，因此，當這些問題成功地引導到正確的方向以後，這一份關係就會提供完美的相互支持，並為雙方提供在靈性之路上前進的完全自由。


    了解目前經歷的是雙方個別的揚昇過程，這一點非常重要。身為大師的你，要為道路的所有面向負起全部的責任。精通最重要的步驟之一，就是實現你的完整性，並擁抱你自己的大師我。


    當你明白了上述幾點，並對旅程的每一個面向負起全部的責任時，就是真正開悟的時刻。前面說過，高能勢域正在撤回大量的支援，讓靈魂做好面對這個功課的準備。祂們正退居幕後，讓我們能施展創造和精通的能力。對某些有意識或無意識地依賴指導靈的人來說，這也許會讓他們感到困惑不安。對那些感覺敏銳的人來說，這是一個特別重大的學習機會，因為他們經常聽從來自高能勢域的指導。然而，天使和指導靈退出的目的，是為了讓我們有機會發展和運用自己的決定，創造自己的未來。


    當我們在揚昇的道路上發展出愛、悲憫、了解、耐心、溫暖和忠誠的特質，並把榮譽、領導力、力量和團結帶進所有的關係裡時，就會發出明亮的光能。


    ### 觀想：更高層次的關係


    1. 準備一個能讓你放鬆、不受干擾的空間。如果可以的話，點一支蠟燭。

    2. 安靜地坐著，舒服地呼吸，懷著提升生殖輪的光能，吸引高頻率關係的意圖。

    3. 專注於你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。

    5. 召喚大天使加百列的純白光來淨化和清除你的生殖輪。放輕鬆，讓祂進行這個工作。

    6. 請祂在你的生殖輪裡放一顆閃亮的純鑽石。然後，看著光能擴張，並用柔軟的鑽石粉紅色填滿你的生殖輪。

    7. 觀想一份以純愛和信任為基礎的關係。這也許是現在的友情、親密關係或伴侶，或者是你希望吸引的一份關係。

    8. 看著這種柔軟、粉紅色鑽石能量，從你的生殖輪擴張，並觸及另一個人的生殖輪。

    9. 想像你們的生殖輪發出與真愛相同的光芒。

    10. 設定你想在這一生顯化的意圖，開始把它吸引過來。

    11. 請求大天使加百列為了你們的至善灑光。'
