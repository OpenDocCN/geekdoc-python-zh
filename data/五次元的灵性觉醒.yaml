    ## 擴張的脈輪


    ![](img/18faa311e3ed886ca3159c2e22f45138_58_0.png)


    # 第六章


    # 擴張的地球之星脈輪


    在地球演化的第三次元階段，七脈輪柱完美地發揮了它有限的連結。人類在地球上徘徊，凝視著恆星，思考自己的存在。他們必須在旅程中探索與源頭能量的連結。許多人因此失去了連結，然而，這種情況正在改變。當一個人的地球之星（Earth
    Star）被啟動以後，一切都會隨之改變。


    你的觀點決定了地球之星是十二脈輪中的第一個，或最後一個。大天使聖德芬（Archangel Sandalphon）仔細監督這個脈輪的發展。由於它在地球的進程中扮演至關重要的作用，祂會持續支持你的靈魂在地球上的化身。其他脈輪的大天使不會這麼做。


    在揚昇過程的開始，我們可以把地球之星看做是一個黑白的惰性能量球。當它覺醒以後，就會變成深灰色，反映著地殼的磁性物質。這使得它能與地球的母性本質或靈體蓋婭進行接地的聯繫。當這個能量迴路開始流動時，揚昇之道上的靈魂就不需要再進行能量的接地（grounding）了。


    接地是第三次元裡靈性生活的日常部分。求道者隨時都會記得早上進行能量的接地，就像有規律地刷牙一樣。高敏銳度的光之工作者，必須努力把自己的四身系統維持在同一個地方。


    接地還可以把身體統一成單一的共振光柱。地球之星與行星磁場及能量場的連結，會自動完成這個工作。


    當你的靈魂通過了揚昇的初階以後，地球之星的大小和力量就會擴張。它的角色是引導你到達分配給你的任務位置。你的第五次元脈輪藍圖會在你出生時，根據你的一「大師我」（master
    self）編程你的人生使命內容。因此，你的地球之星會確切地知道你在地球上的該有位置。


    許多靈魂完成初步的淨化過程以後，就會感到內心自由地追隨自己選擇的道路。當他們與自己現在的位置統一時，個人的能量就會急劇地增加。尚未與自己的位置統一以前，沒有安頓下來的靈魂就會感到躁動不安。


    這是一個威力非常強大的過程。在你抵達目的地以前，你的靈魂往往無法意識到這一點。接著，你的地球之星就會變成液態銀，反射大天使聖德芬本身的第九次元光能。


