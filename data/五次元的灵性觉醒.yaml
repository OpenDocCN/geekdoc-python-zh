    ## 第二十二章 學堂四：真理的振波


    庫圖彌尊主的興趣，始終都是那個支配著地球的偉大、恆常不變的靈性法則。這些法則說明了從業力到恩典，再到對振波做出反應的責任。


    純粹真理的振波閃爍著耀眼的白光。它發自於一個健全且與神性完全協調的心靈。當你的氣場散發出這種白色的振波時，每一個人都會感受到它的共振，而且會信任你。它會帶給周圍的人安全感和希望。在日常生活的基礎上，你每一次以誠實和正直的態度說話和做事，都會在自己的能量場裡累積更多的白光。


    這一座神殿裡的學生，都沐浴在完美的白光裡。白光在他們身體裡每一個細胞閃耀，同時也永遠夾帶在祂們的氣場中。


    你會在這一座神殿裡了解人類為了生存和保護自己，而發展出來的不同內在小孩策略。這方面的了解會在所有人的心中引發宏大的悲憫之情。當你用新的眼光看人類和自己脆弱的一面時，這種悲憫會開啟高層的純白色心瓣。


    孩子會為了獲得愛與關懷而取悅父母，例如，他們必須壓制自己的欲求。他們會為了討父母的歡心，而以微妙的方式講不真實的事，但也會因為不能做真實的自己而生氣。他們長大後會成為一個令人愉悅的、順從的成年人，但別人不會真正信任他們，因為他們會說別人想聽的答案，而不是誠實的答案。通過神殿的水晶骷髏頭下載到喉輪和太陽神經叢裡的光，會讓這一類的學生有說出真理的勇氣。對那些把生存策略建立在謊話連篇的人來說，這個學堂的教誨可能會讓他們難以消化，但當他們這麼做了以後，就必然會帶給他們不可限量的成長。


