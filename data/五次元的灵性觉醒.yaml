    5. 你穿過大門，發現自己站在一個巨大的、半透明的黃玉藍色的光球裡。球裡有讓你做為第五次元存在的完美密碼。

    6. 你正握著個人的水晶或水晶骷髏頭。當你安靜地在這個珍貴的學堂中等待時，你會透過它下載一些奧祕的資訊。這些資訊不是有意識地傳給你的。放輕鬆，讓它過濾你的能量場。

    7. 你的本質會在過濾的過程中，被現世揚昇大師的完美藍圖覆蓋。這是一個令人敬畏的機會，它能讓你敞開心，把自己臣服給最高可能的化身。進入這個學堂需要你放棄我執裡所有限制性的自我意念，這樣它才能把記憶和相關情緒帶到表面，以鬆動你那些意念。接著，金色的光芒會帶出你的高層智慧。

    8. 你的單子體或「我是臨在」（I AM Presence），是你第十二次元的面向。我們的內心深處都隱藏著這個難以置信的、照亮我們高層部分的藍圖。準備就緒以後，你與單子智慧的連結就會啟動。你站在這個萬有合一廳裡，請庫圖彌尊主和庫梅卡尊主調和你的振波。


    我們在第十二次元的單子層面上都是合一的。這裡只有源頭的光與愛、熾天使的歌聲，以及超乎我們了解的喜悦。這也許超出我們現在能承受的範圍，但你可曾看過一片天空因為烏雲密布，而讓你難以想像其他的事物嗎？突然之間，雲層散開，你瞥見了明淨閃耀的藍天。它揭示了承諾和希望。它讓你想起那一半被遺忘了的可能性。


