- md: '## 第二十九章


    ### 學堂十一：神聖的陰性能量


    你在第一個學堂裡學習的是基本的平衡與和諧。當你進階到第十一堂時，可以確定的是你的十二個脈輪已經完全平衡，陰陽能量已經處於均衡的狀態，而且你已經是一個行止高人了。


    許多人都了解關愛、同理心、智慧、療癒、和平、愛、仁慈和養育的神聖陰性特質，具有不可思議的強大力量。這些和其他許多的陰性特質，都可以化剛為柔、消融鐵壁，並敞開心輪，這些都是陽性能量做不到的。只有當大師的工具庫裡兼具陰陽兩性的特質時，他們才能被允許接觸陰性智慧的更深層祕密。陰性智慧的終極祕密就是生命本身的祕密。


    過去的神聖學校裡，女性更容易把這種啟蒙帶進宇宙的偉大奧祕之中。據了解，婦女被賦予一個子宮，是為了讓生命在一個黑暗的洞穴裡安全地活著，然後再生產母乳，讓嬰兒在完美的滋養下蓬勃成長。月經和分娩被認為是一種內在的啟蒙，這就是傳統上女性不需要外在啟蒙的原因。


    現在的男人正在平衡自己的十二個脈輪，並進入陰性與陽性力量彼此融洽共存的狀態。許多男人已經做好進入這個學堂學習的準備。經歷過神聖啟蒙的男人，需要做好這個準備。


    在第十一個學堂裡，我們會被給予取得鍊金術和神聖之光的最深奧祕。這些都被保留在黑暗的陰性能量裡。


