  - '[PAGE 230]


    # 第三十六章

    女神大師


    本章是為了男性和女性讀者而寫的。它的對象是所有會因為開發陰性精通而獲益的人。


    亞特蘭提斯沒落後的一萬年來，有一個信念一直在人們的集體無意識裡，認為男人不只強而有力，而且比女人優越。那些化身為女性的人，必須超越這個信念才能實現精通。


    這個信念在今天依然適用，但已不像以前那麼極端了。


    挪開集體無意識的障礙，從來都不是一件容易的事。但近年來，每一個人的觀點和期望都發生了巨大的變化。誰會想到人類能搭飛機飛行？或隨身攜帶自己的電話？或在任何地方，從微型的手提電腦上接收資訊？或用義肢到處奔跑？科技時代擴大了我們的信念範圍。當我們從擴展的角度看事物時，就會變得更加開悟。'
  - '[PAGE 231]


    # 馬利亞／愛希斯


    偉大的啟蒙者馬利亞（Mary）在某一次的化身時，以處女生子的方式生下耶穌；祂在愛希斯（Isis）的化身時，也以處女生子的方式生下荷魯斯。這是一個道德困境，因為當時的人還不了解處女生子的概念。只有達到第五次元啟明高層振波的人，才能理解這個概念。然後他就會知道每一個概念都有身體和靈性的部分。某些情況下，女性的參與者都處於非常純潔的高頻率，使他們的靈性超越了身體行為的侷限。然而，當馬利亞和愛希斯在靈魂的層面同意受孕耶穌和荷魯斯時，祂們對上帝旨意的臣服，敞開了世界大規模變革的大門。


    如果祂們的故事觸動了你，那就調整你的頻率，接通祂們的能量。這麼做會讓你取得靈性科技的出現會使人類以更快的速度覺醒。由於靈性科技仰賴新思想和新觀念的右腦概念，因此，女性就會脫穎而出。


    許多偉大的大師，尤其是女性，在面對人類的集體意識時，曾勇敢地堅守著自己的光明和正直。這把祂們推向極具挑戰性的啟蒙，並因此引發了地球的變革。祂們的勇氣和奉獻導致了人類屬性的發展，這些屬性極大程度地照亮了祂們的氣場。祂們所獲得的光能，幫助了所有渴望成為行止高人的人。'
- md: "## 第三十六章 女神大師\n\n### 聖女貞德／布拉瓦茨基夫人／錫耶納的凱瑟琳\n\n使祂們在精通上的屬性。\n\n聖女貞德（Joan of Arc）是一個具有非凡信念和熱情的偉大遠見者。雖然祂只是中世紀法國時的一個農家女，但聖麥可（St.\
    \ Michael）和聖凱瑟琳（St. Catherine）的現身，都給祂留下了深刻的印象：祂是整個法國的救星，天主希望祂帶領法軍打敗英國，並告訴祂必須與法國王太子（Dauphin）查爾斯談話。祂不得不剪掉頭髮，女扮男裝前往覲見王太子。最後，祂果然領導法軍，在奧爾良（Orleans）贏得一場偉大的戰爭。然而，祂那一生的最後一次啟蒙是在火刑柱上燒死。火刑柱淨化了祂，使祂以壯觀的姿態揚昇。\n\
    \n祂的第二個化身是十九世紀引導迪瓦爾·庫爾（Dwihal Khul）成立通神學會（Theosophical Society）的海倫娜·布拉瓦茨基（Helena\
    \ Blavatsky）。海倫娜克服挑戰，成功地在世界上建立了「白色火焰」教團。\n\n祂的另一生是十四世紀義大利的錫耶納的凱瑟琳（Catherine of\
    \ Siena）。祂這一生從小就擁有各種神祕和宗教的憧憬。祂成年後過著非常嚴格和純潔的生活，並創建了一個極其嚴格的教團。祂試圖當一名和平大使，也為了促進宗教間的友好寫了許多信件。祂在三十三歲那年過世，而三十三是基督之光的號碼。祂目前正在內層努力把靈性帶入宗教。\n\
    \n### 觀世音\n\n偉大的遠見者仍然過著非常有挑戰性的生活。即使是現在，心理學家和有靈性觀念的人，都會有超越自己時代的知見，但祂們都可以透過進入聖女貞德／布拉瓦茨基夫人／錫耶納的凱瑟琳的能量而獲得幫助。如果你想成為攜帶白色揚昇火焰，為人類帶來和平與光明的人，那就調整自己的頻率，接通這個偉大存在的能量。\n\
    \n由於兩萬年前在中國的化身時展現的愛、悲憫和智慧，使觀世音成為慈悲女神的代表。祂在這一段漫長的時間裡，雖然學會了出入多次元的能力，但還是選擇以肉身留在地球，幫助人類。祂活在第七次元，但能把頻率降低到第五次元。祂能在第五次元裡保持肉身，也能提升到第九次元。祂不需要食物，但在第五次元時喜歡吃帶給地球輕鬆、喜悦的水果和蔬菜。隨著光之工作者成為行止高人，更多人可以存在不同次元，也能呼請觀世音的幫助。\n\
    \n祂的龍族朋友就像祂的隨身護衛一樣，跟祂一起穿越頻段，讓祂飛越各式各樣的挑戰。祂對了解龍族並把龍視為生活一部分的東方，懷有一份熱愛。龍族現在正湧入東西方世界，觀世音正在幫助人們開啟意識，讓人們接受祂們並與祂們合作。身爲一位大師的祂，現在擁抱了整個地球，讓我們得以沐浴在祂的愛裡。\n\
    \n祂一直被視為東方的聖母馬利亞。祂目前所做的一切，都是為了把神聖的陰性能量帶進人類的意識。祂目前在星際議會任職，負責傳播神聖的陰性智慧。許多婦女組織都能感受到祂的影響力。祂也在開啟世界各地的教師、監獄工作者，甚至政府和企業員工的心輪。\n\
    \n無論在任何的情況下，祂都會發送光能，幫助男人與祂們的陰性面有更多的連結。祂負責推動男性的交流社團，使男性對養兒育女的活動有興趣，幫助他們擁抱自己更有智慧、更溫柔的一面。\n\
    \n身為因果輪尊主董事會第六射線的大師，祂也會協助促進宗教和靈性之間的平衡。如果你想把祂的光能散佈到地球，那就調整頻率，接通偉大觀世音女神的能量場。如果你認為自己的使命是以某種方式，透過人們對男女屬性的集體了解來擴大世界的開悟，那你也許會想連結本節提到的女神大師。\n\
    \n### 觀想：與聖母馬利亞和觀世音連結\n\n1. 找一個安靜、不受干擾的地方。\n2. 觀想自己站在一個能量很強的地點，那裡的地球能量和美景會強化你的磁場。用一點時間吸收這個能量。\n\
