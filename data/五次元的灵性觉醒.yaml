    你必須超越人們對地心引力的集體信念，才能掌握風元素。前面說過，在黃金亞特蘭提斯紀元的早期，進入波賽頓神殿的唯一途徑是懸浮或飛行，當時的男女大祭司都能做到這一點。


    地球上有些生物會教導我們與集體信念有關的知識。從一個沒有重力的宇宙化身到地球的蜘蛛，向我們揭示了心靈力量勝過集體信念的力量。牠們堅守著對完成品的願景，才能克服地心引力，編織蛛網。


    掌握風元素的關鍵，就是與負責風的獨角獸連結。牠們會與元素大師多姆（Dom）合作。我們有時會在雲裡看到多姆。祂是從來沒有化身過的乙太體。然而，祂卻支配了風精靈裡的小仙女（fairies）和西爾夫（sylphs）。如果我們敞開心接納祂，祂就會教我們與風的運動和力量有關的知識。


    這是一個非常簡單的練習。當你走進大自然時，調整你的頻率，接通西爾夫的能量'
