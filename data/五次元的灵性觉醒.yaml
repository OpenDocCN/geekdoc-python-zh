    ## 觀想：創造睿智、正面、充滿愛心的內在父母


    1. 安靜地坐在一個可以放輕鬆、不受干擾的地方。

    2. 觀想金色的基督之光湧入你的心中。

    3. 覺察在你上方的天空裡那一座白色的大房子。

    4. 白色的台階從房屋向下延伸到你坐的地方。一道強烈的藍光正往台階下面移動。

    5. 光裡走出一個堅強、明智、微笑、充滿保護感的父親。

    6. 你跟他說出你的問題，他鼓勵、支持和幫助你。他提醒你，讓你知道自己很特別、很聰明。他愛本然的你。

    7. 他坐在你身邊，你能感受到他的支持和力量。放輕鬆。

    8. 一道粉紅色的光正走下階梯。

