    ## 第三十一章


    ### 成為星際大師


    你最原始的神聖火花，其源頭是一個第十二次元的單子體。每一個人都是一個無以言表的單子體的一部分。你的單子體會為了學習和體驗的目的，把它的某些面向發送給宇宙。這些都被稱為靈魂的面向。你是靈魂或高我的一部分，開悟的目的就是從靈魂更廣泛和更高的視角看待一切。它很像祖父母的孩子分散在世界各地傳宗接代，有了自己的子孫。然而，即使他們自認為失去了聯繫，但仍然與原生家庭聯繫著。所有人都渴望與明智的祖父母團聚。


    從某方面來看，我們就像一片樹葉一樣微不足道。另一方面，我們獨一無二，而且都具有無比的重要性。如果我們不是本然的自己，整個宇宙系統就會有所不同了！


    我們活在許多巨大、相連的多次元宇宙中的一個。儘管我們曾在許多行星和許多星系、宇宙空間和乙太的實相中學習過，但目前卻參與著地球上的活動。我們把這種地球經驗所需要的知識、智慧和光明帶進這一世的生活裡。我們的靈魂保存了更多的了解，可以讓我們在準備好的時候找回來。當我們成為開悟的大師時，就能取得更多的這種光。


    當我們成就精通的時候，就會有更多的服務機會。其中之一是接受星際大師的訓練。然後，我們就能在睡眠中從靈魂的層面運作，為宇宙服務了。一支為星際議會工作的大師團隊，維持著整個宇宙的平衡與和諧。


    目前有許多人都曾在靈魂擴張期間，多次來過地球化身。雖然地球被認為是非常困難的訓練場，但它也會讓人產生愛、忠誠和服務的欲望。有許多對地球擁用愛、崇敬和尊重的人，都在擔任地球、乃至內層星際大師的大使。


    你也許想接受星際大師的訓練，或者還沒有意識到自己已經是一個星際大師了。由於這個工作是在無意識的層面完成的，因此，你無法判斷別人的生命。一個總是疲倦、生病或一無所成之人，也許正在透過自己的身體進行一項難以置信的靈魂工作。他們的靈體也許在每晚入睡或做白日夢時進人時空中旅行，從事神奇的療癒、搶救或星際工作。


    只有當你的十二個第五次元脈輪完全活躍，並做好服務的準備時，你才能成為銀河系的使者、談判者、顧問或工作者。我們之中有許多人在亞特蘭提斯黃金紀元的化身時，扮演過這些星際角色。現在是覺醒的時刻了。現在是重新啟動我們的能量場鑰匙和密碼的時刻。如果你感到一股能量的拉扯，那也許代表你報名參加課程的時間到了。


    ### 星際精通


    指揮官阿斯塔（Ash tar）和瑟拉菲娜（Seraphina）與威武的熾天使，負責訓練十二個星際學校裡的存有，好讓他們擔任地球的大使。召喚阿斯塔指揮官，如果這一條道路適合你，祂會邀請你來參加這些學校。這個邀請會暫時存放在你的能量場裡，你可以選擇現在或以後接受。


    指揮官阿斯塔與馬可大師（Master Marko）密切合作。馬可大師是亞特蘭提斯的偉人，後來又成為印加文明的負責人。祂是我們太陽系裡最高銀河聯盟的代表。


    我們太陽系的首都在土星。它由一個九人議會和先進的團體意識掌管。在亞特蘭提斯黃金紀元時，男女大祭司都在那裡參加特別會議，他們的靈體會通過亞特蘭提斯大水晶的乙太公路進入土星。


    另一個協助你進行星際精通的大師，是星際議會的成員希拉靈尊主。祂與阿斯塔指揮官和馬可大師密切合作。祂目前是土星議會的地球談判代表。


    在整個宇宙裡工作的成千上萬個存在，特別值得一提的是非常有名的瑟若佩斯·貝。祂是亞特蘭提斯的大祭司，攜帶著亞特蘭提斯的白色火焰。亞特蘭提斯沉沒後，祂的靈體與大天使麥達昶和托特（Thoth）一起建造埃及的大金字塔。這一座宇宙金字塔與天狼星和獵戶座密切連結。這些恆星和星系的知識和智慧都來自銀河系。宇宙智慧的鑰匙和密碼都保存在那裡。這是一台龐大的宇宙電腦。托特和瑟若佩斯·貝為了啟動地球的亢達里尼（kundalini）都曾進行過宇宙電腦的編碼。這個亢達里尼位於倫敦的地球之星裡。它在二〇一二年十二月二十一日上午十一點十一分的宇宙時刻升起過。同時，也開啟了三十三個引入基督之光的宇宙入口。


    瑟拉菲娜的星際學校處理的不只是地球這一個區域而已。訓練的內容涵蓋了不同的恆星系統。參加這些學校，會讓你真實地感知自己是一個宇宙的開悟小孩。


    因此，如果你對地球充滿熱愛，有一份想保護它的渴望，你也許希望接通一些能量，讓自己成為星際大師。


    星際精通的第一步，就是學習把脈輪與對應的恆星連結起來，因為恆星、行星和星系是宇宙的神聖脈輪。許多人目前正在做這個練習。由於這個練習非常重要，我和提姆·威德都透過研討會、CD或下載的文件教學。當你把脈輪與恆星連結起來時，你就開始把恆星的知識、智慧和光，下載到自己的脈輪系統裡了。由於光的手指會伸入宇宙並帶回淨光，你的氣場會變得更加強大、清晰和明亮。


    當你的第五次元脈輪插入以第七次元頻率振動的天體時，能量系統就會充滿必須加以吸收和整合的光。你也許會需要在休息的時候讓它發生。


    如果你深愛這個星球，也希望以宇宙人的身分提供服務，這麼做也許能幫助你認識一些星際大師，並吸收祂們的能量。大天使布提亞里爾（Archangel Butyail）是一位純白'
  mdcn: '## 第二十九章


