    ## 第十五章：擴張的因果輪


    月白色的因果輪位於水晶骷髏頭的後部。亞特蘭提斯時代，它和頂輪一樣有實體，佔據了顱骨後部的一個空間，為當時的人創造了加長的頭部。它首度啟動時是與頭部分開的，且位於頂輪和靈魂之星脈輪之間。隨著它的啟動，因果輪逐漸與第五次元的脈輪柱連結，後來就被吸入身體，進而與頭部有實質的接觸。


    這些超越的脈輪始終都屬於第五次元，是我們的第三個超越中心。它與月球連結，就像你個人的月亮一樣，會吸收並輻射神聖的陰性之光。它具有磁鐵的功能，可以直接把月光吸引到人的四身系統裡。這會提升你的振波，照亮靈魂裡的陰性智慧。自二〇一二年宇宙時刻以來，所有覺醒靈魂的因果輪都在迅速地擴張。


    近年來不斷灑向地球的神聖陰性能量中，這是最強大的一次。這種智慧與慈悲的振波，在亞特蘭提斯沉沒後就被收回了。這種失落對接下來一萬年的人類旅程，產生了巨大的影響。然而，它現在又回到所有人的手中，讓我們得以化解不平衡的陽性力量，也讓真心再度掌權。


    由於月亮是一個揚昇的、擁有神聖陰性能量的高層衛星，因此，它在這方面扮演了重要的角色。這些是由宇宙天使馬利亞和祂的獨角獸團隊負責監控和分配。祂們在高峰時期收穫這種純淨、柔和的陰性光能，並讓光明湧向地球，創造更多陰柔的可能性。


    月亮也反射著太陽神赫利歐斯（Helios），又名大中央太陽的光能。這個第九次元的靈性之星，會透過我們的太陽，把光傳送到地球。當這種能量離開赫利歐斯時，它就會發出神聖的陽性振波，並與維斯塔行星（Vesta）的影響保持平衡。維斯塔是它在中央太陽系的神聖陰性對應體。


    地球的滿月期會有強大的銀色光湧入人類的心靈，對人類產生深沉的影響。它會在人類的覺悟上帶來巨大的轉變，為即將到來的新黃金紀元預做準備。


    滿月一直都是一個充滿魔幻和令人敬畏的時段。人類很早就知道動物和感覺敏銳的人，都很容易因為月亮發出的振波而受到深沉的影響。二〇一四到二〇一五年間，滿月的力量越來越大，最後在二〇一五年九月的滿月日達到最高峰。蓋婭已經獲得了足夠的月光，使得祂可以平衡地球上陰陽兩性的能量。雖然已有廣大人群的陰陽能量逐漸達到平衡，但滿月仍將繼續發揮它非比尋常的影響力。


    因果輪除了會吸收和散播神聖的陰性之光，還有另一個強大的目的：為求道者提供一個與靈界深沉、密切的連結。這種連結的程度，取決於一個人從前世帶來的靈性天賦。這也與他們的靈魂使命有關。


    因果輪也會讓天使界的能量和光進行雙向的交流。這會把天使的振波帶給個人，並讓它永久錨定。當光之工作者的因果輪再度活躍時，獨角獸就會通過這些存在，把牠們令人敬畏的淨光連結到地球上。


    當獨角獸看到你的服務之光在頂輪發光時，祂就會跟你建立連結，並通過因果輪進入你的能量場。由於這件事的意義無比重大、美麗和強大，以至於它有完全改變你靈魂之路的潛力。


    獨角獸是唯一帶著純淨的恩典來與地球合作的存有。祂們用無條件的愛賜福所有的環境。這些偉大的存有，在第七和第九次元之間震動，照亮並觸動了所有人的心靈。


    大天使克里斯提爾負責因果輪的發展。由於這個脈輪關係著人類開悟的進展，因此，祂繼續與我們一起在成就開悟大師的路上努力。


    大天使克里斯提爾會隨著所有靈魂內在之光的亮度增加，把更高層的基督意識帶進地球的能量場。這個光會穿過因果輪和心輪。基督之光會在二〇三二年以前完成它在高層的體現，好讓我們為新的黃金紀元做好準備。


