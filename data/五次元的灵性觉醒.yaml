    此外，每一個孩子都會養一隻兔子。兔子來自於有著「智慧星球」之稱的獵戶座。他們帶著重大的使命來到地球，其中一部分是擔任心的療癒者。孩子不高興的時候會抱著柔軟、毛茸茸的兔子，兔子就會用愛和智慧療癒他們。這使亞特蘭提斯的孩子始終保持一顆完全敞開和正常運作的心。這也是培養美好行止精通的絕妙基礎。


    孩子到了三歲左右就被分成小組，帶到大自然裡，讓他們了解大自然和靈界的事物。孩子的老師都很敬業。他們都是根據與不同年齡兒童的連結能力，分別甄選出來的。老師會鼓勵孩童探索大自然的祕密，引導他們用開悟的眼光看待生命。


    即使孩子年紀還小，老師也會教導他們培養集中、專注和想像力，因為當他們到達顯化和創造的年齡時，這些能力將會為他們運用心理控制的技巧打下完美基礎。


    無論孩子幾歲，老師都很注重培養孩子放鬆的習慣。學校是一個充滿平靜和快樂的地方。遊戲、歡樂、音樂和特殊的呼吸技巧，能使孩子放鬆，進而輕易地吸收資訊。「教育」字面的意思是發揮潛能，這正是老師們在工作時應該具備的意圖。


    孩子長大以後，就要練習細胞層面的放鬆技巧。這種練習能伸展ＤＮＡ的十二股線，使它們完美地彼此接觸。這種連結會讓孩子汲取自己全副的潛能。


    亞特蘭提斯人不會把別人的知識灌輸到孩子們的心靈裡。相反地，他們專注於讓孩子的天賦、才能和靈魂知識自然地浮現。他們會鼓勵每一個人做自己最喜歡做的事。這種教'
