  md: '# 五次的靈性覺醒


    復完美的平衡，很快就能讓他們發出健康的振波。

    花草香精設計的初衷，是為了影響人類腦部的接受器，讓我們敞開自己，擁抱愛、和平、放鬆、喜悅和神聖的知足感。百合和玫瑰之類的花朵，能幫助我們與天使的共振連結起來。

    自然界由精靈界王國負責照顧。與地、水、火、風合作的小精靈，會促進蟲魚鳥獸和人類的生存和繁榮。這些精靈裡有許多只包含一種元素，但也有一些是由一個以上的元素構成的。精靈和我們一樣都在進化。


    +   • 風精靈包括西爾夫（sylph），祂們跟風合作，讓植物的根部自由活動；以及最近才從另一個宇宙來清除地球污染的艾沙斯（esaks）。花仙子（fairies）也屬於風精靈。祂們會幫助花朵生長，支持天使、大天使和獨角獸的工作。自二〇一二年的宇宙時刻以來，許多輕盈、充滿樂趣和美麗的花仙子已經揚昇成天使了。

    • 跟土壤合作的地精靈是小妖精（pixies）和諾姆（gnomes），幫助樹木的是小精靈（elves）。高智力的哥布林（goblins）是擁有高度進化心輪的地精靈。

    • 水元素包括照顧水生植物的美人魚（mermaid）、讓海洋和河流暢通無阻的水女神（undines），以及剛從另一個宇宙來消除地球水域污染的克爾希斯（kyhils）。

    • 火蠑螈（salamander）是讓火焰持續燃燒的火精靈。

    • 妖魔精（imps）和牧神羊男（fauns）會幫助植物的光合作用。祂們是地、風和水元


