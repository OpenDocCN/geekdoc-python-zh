    # 第十八章


    # 世界導師庫圖彌尊主


    庫圖彌尊主（Lord Kuthumi）是地球上最偉大的啟明大師之一。當你在通往精通和開悟的揚昇之路閱讀或思考祂時，就會讓祂的能量觸動你，並擴張你的意識。


    祂是庫瑪拉（Kumara），也就是來自上帝之心的四個靈魂之一。祂在宇宙中從事特殊的服務。這四個靈魂的化身，一出生已經是開悟與啟明的狀態。


    庫圖彌尊主來自有愛的星球之稱的金星。祂在漫長的靈魂之旅中，始終在向所有人展示愛的力量。現在，祂在晶瑩的黃色射線上振動。這個顏色來自通明的心靈，而且祂才剛成為世界老師。祂在為人類服務方面有著非凡而卓越的歷史，儘管祂在多生多世中經歷過非常艱鉅的挑戰。


    祂的乙太靜修處（etheric retreat）在印度阿格拉（Agra），美麗的泰姬瑪哈陵'
  - '[PAGE 118]


    # 第十八章 世界導師庫圖彌尊主


    （Taj Mahal）的上空。在祂成為沙賈汗大帝（Shah Jahan）的那一世，與祂最寵愛的妻子慕塔芝·瑪哈（Mumtaz Mahal）經歷過一段真愛。慕塔芝·瑪哈去逝後，祂建造泰姬瑪哈陵，把完美的愛獻給她。這個陵墓是用祂對細節的熱愛和關注建造的。它的能量場至今仍然散發聖愛的光芒，吸引著準備體驗無條件和虔敬之愛的人前來。


    祂還動用龐大的經費在德里建造了一座紅堡（Red Fort），與印度當時最大的一座清真寺。此外，祂也幫助窮人，並以公平正義治理國家。但由於祂的幾個兒子彼此衝突對立，使祂度過了非常艱苦的一生。祂失去了大部分的帝國，後來被一個兒子監禁而死在牢裡。這一生的經歷相當程度地強化了祂在精通之路上的進展。


    祂化身為聖方濟各亞西西（St. Francis of Assisi）的那一世，把不傷害和慈愛普施給一切眾生。祂的光環如此清晰、平靜，讓每一隻靠近祂的動物都感覺十足的安全，沒有受到任何傷害的恐懼。祂那一生不只把和平獻給所有人。身為一個堅決服事天主的僧侶，祂也對自己的使命展現出極大的勇氣、信任和信心。


    祂也化身為約翰至愛（John the Beloved）、占卜耶穌出生地的智者巴薩扎（Balthazar），以及埃及法老圖特摩斯三世（Pharaoh Tutmose
    III）。


    多年以來，庫圖彌尊主一直是第二道射線，也就是愛與智慧的黃射線的真主。祂一直非常關心靈性法則對人類的啟發。祂是聖殿騎士團（Knights Templar）的創始成員。這個騎士團保留了古老的奧祕，並保護著朝聖者旅途的安全。祂化身為畢達哥拉斯'
