    14. 睜開眼睛，準備把光能散佈到雙腳接觸到的任何一處地面。


    # 第七章


    # 擴張的海底輪


    第五次元海底輪是我們的揚昇錨定的地方。這個錨點有時被描述為達到開悟的靈魂基座（seat of the soul）。


    當我們將更高層次的面向具體化，我們便展開了揚昇的過程，而這個脈輪就會發出明亮的鉑金光芒。大天使加百列負責滋養海底輪早期的發展階段，並協助我們淨化它可能含有的低層能量。


    第三次元裡的海底輪會發出深紅色的光。這種顏色代表地球經歷過的生存情緒。許多靈魂在學習功課的過程裡迷失了。其結果是，許多人開始追隨德能不足的領導者和老師，想在他們身上尋求安全感。這種情況正在快速地改變。隨著信心、信任、喜悅與和諧的白金光流入海底輪，我們就會把快樂吸引到自己的環境裡。


    當地球展開揚昇的過程時，我們就能重新與強大的「我是臨在」（I AM Presence），也就是神性的火花連結起來。這促使許多光之工作者開始把自己的高層面向，錨定在他們的四身系統裡。當第五次元的海底輪完全錨定時，它就會一直擴張，直到高我與小我的分裂不復存在。然後，我們就會變成自己的高我。


    當我們的光昇起，並在地球上開始精通之路時，海底輪就會直接吸納靈魂的振波。現在有數百萬的人達成了這個轉變。然而，他們只有在擁抱自己真正的莊嚴美麗時，才能意識到這一點。


    海底輪的頻率試圖引起我們的關注，讓我們了解自己的真我。這是它在我们的大師之路上，要教導我們的最普通的功課之一。


    我們的情緒體是四身系統的一部分，它把我們的生命記憶保存在一個肉體裡。大天使加百列最近把祂的淨光與大天使克里斯提爾（Archangel Christiel）的淨光結合在一起，幫助我們以非常快的速度淨化自己的情緒體。祂們共同努力謀求地球和人類的至善，創造了每一個滿月都會釋放的純淨鑽石射線（Diamond
    Ray of Purification）和宇宙基督之光（Cosmic Christ Light）的混合物。


    這種恩賜使另一波的光之工作者進入了揚昇過程的第二階段，並體現亞特蘭提斯黃金紀元的振波。偉大的火龍一直在協助大天使加百列執行這個使命。祂們日以繼夜地工作，以確保我們的海底輪能維持最純淨的振波。


    每一個後續的滿月來到時，高層的能量就能供我們取用，我們的海底輪也能錨定這個能量。這個過程也強化了我們的安達卡拉那橋（Antakarana bridge），讓我們直接連結更高次元的單子體。


    亞特蘭提斯黃金紀元的記憶開始提醒我們，讓我們看到自己的真我。許多走在靈性之路的求道者，已經準備好接受給自己的授權。當所有人都能真正地了解自己強大的力量和能力時，我們對自己的信念就會擴大。我們的指導靈和天使為了鼓勵和給予我們權力擔任更高的角色，會在我們面前展示各種情境。海底輪會提供記憶或提示，幫助我們從高層的光照下看自己在前世的化身。任何無助於這個功能的記憶都會被棄置。


    ## 觀想：高層海底輪的錨定與擴張


    1. 做好冥想的準備。創造一個神聖的空間，確保你不會受到干擾。

    2. 點一支蠟燭，把它獻給自己和你偉大的力量。

    3. 呼喚宇宙鑽石紫色火焰沖刷你的四身系統，讓它變得純淨、清明，並讓火焰通過你的十二個脈輪。

    4. 讓大天使加百列和薩基爾（Archangel Zadkiel）在接下來的冥想中，把你放進一顆閃亮的宇宙鑽石裡。

    5. 安靜地坐著，讓祂們為你做這件事。看著並感覺這顆鑽石在你的周圍閃閃發光，隨著紫色火焰的高層面向流動。

    6. 把注意力轉移到海底輪上。進入它。你感覺到什麼顏色？

    7. 如果有紅色的殘留，用你溫柔的手輕輕地把它移進你的宇宙鑽石裡。

    8. 看著能量瞬間轉化為高層的光能。

    9. 請大天使加百列發出最高層次的鉑金光，用這個射線充滿你的海底輪。

    10. 看它隨著這一股輻射能量旋轉和閃爍。

    11. 當你的第五次元海底輪永久錨定和擴張時，召喚你的單子體，把它的高層能量透過安達卡拉那橋，錨定在你的海底輪裡。

    12. 感覺有一束高層的光能穿過你的頭頂，與海底輪的鉑金光融為一體。

    13. 在這個點上，覺知並允許你所有卓越的精通成就，流入你的內在並點亮你。

    14. 讓這股能量從海底輪沖刷你的整個四身系統，讓它照亮你的梅爾卡巴（Merkabah）。

    15. 用幾分鐘的時間感知你的海底輪能量。準備好的時候，站起來。

    16. 對著一面鏡子，凝視自己的眼睛，大聲地說：

    17. 「我是揚昇大師。我是，我是，我是。」

    18. 重複三遍，或照你的希望多重複幾遍。

    19. 向大天使加百列、薩基爾和龍族致謝。

    20. 睜開眼睛，微笑，把你的精通帶到世間。


    # 第八章


    # 擴張的生殖輪


    第五次元的生殖輪，為踏上揚昇之路的人提供了一些挑戰性的功課。這個脈輪關係著性愛與人際關係。家庭關係往往是由這個脈輪形成的。這取決於靈魂帶到化身裡的業力藍圖。


    在亞特蘭提斯的黃金紀元，人們有時會採取雌雄同體的形式化身，因為他們已經超越了生殖的功課。只有為了帶新靈魂來到世間他們才表現出性慾。這個脈輪的能量是以純潔的愛來表達。


    亞特蘭提斯沉沒時，靈魂之間的高層聯繫就被身體層面的行為取代了。現在的人已經吸取了這些經驗的教訓，但仍有許多人枉顧周遭的變化，依然執行一些根深蒂固的殘餘模式。


    工作。這種情況發生時，靈魂就會面臨一些需要大智慧、明辨力和直覺式的信任，才能處理的關係挑戰。通過這些最終的考驗以後，你就會邁入輝煌的第五元振波。


    那些已經達到這種神性光輝的人，會吸引一些容許他們自由做自己的靈魂。這意味著他們可以表達自己的真我之光。與自己的神性拼圖（divine complement）連結的渴望，為他們的靈性關係增添了更高的動能。


    利亞（Angel Mary）、聖母馬利亞（Mother Mary）和愛希斯三個偉大的存在，手上握著這個明亮的療癒之光。他們一直在引導更高的光線進入一些有接納性靈魂的生殖輪，並分佈在整個四身系統裡。這意味著人類能夠再一次體驗真愛了。


    靈性的精通需要完全掌控每一個呈現在眼前的情境。高能勢域的存有們能設計了許多情境來考驗求道者，並提升他們的明辨力。人在過渡到較高頻率的過程中，很難區分心輪和生殖輪的能量。通過第三次元脈輪吸引來的關係，通常只是肉體的連結。第五次元會尋求超越的愛。然而，更深層的靈魂連結卻只會發生在心輪裡。


