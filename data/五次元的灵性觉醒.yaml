    包括所有白色兄弟會（White Brotherhoods）的大白兄弟會（The Great White Brotherhood），是由庫圖彌尊主創立的，現在由彌勒尊主（Lord
    Maitreya）負責帶領。大白兄弟會的成員都是已經贏得純白真理、正直、榮譽、和平與高層意圖的存在。祂們的氣場會散發鑽石的白光。彌勒尊主和這個傑出團隊的其他成員，都在這一座神殿裡教學。


    大天使加百列的能量場裡攜帶了真理的鑽石。當你從學堂畢業的時候，祂會親自把這個真理的鑽石放在你頭上。


    瑟若佩斯·貝會把祂攜帶的亞特蘭提斯純白火焰放在那些已經做好準備的人的能量場上方。


    ## 第二十二章 學堂四：真理的振波


    ## 觀想：拜訪真理廳


    1. 準備一個能讓你放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。

    2. 安靜地坐著，舒服地呼吸，懷著參訪真理廳的意圖。

    3. 專注在你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。

    5. 看著自己站在真理廳閃閃發光的白色大門旁。

    6. 你踏進大廳時，發現自己在一個發光、多面向的白色鑽石裡。它照亮了你真實的本質。

    7. 瑟若佩斯．貝走過來，把亞特蘭提斯的白色揚昇火焰放在你上方。你站在裡面，讓它清除並點亮你的十二個脈輪。

    8. 一隻雄偉、莊嚴的純白獨角獸降落在你身邊，把神奇、閃爍的白光傾注在你的上方。

    9. 最後，庫圖爾尊主把一隻手放在你的胸口，另一隻手放在你的第三眼上。你感覺古老的幻相在鍊金術般猛烈的白火中焚毀，你的心在真理的喜悅中點亮了。

    10. 你已經收到了一份做自己的禮物。你可以忠於真實的自己了。

    11. 你放射純真理的白光。

    12. 當你準備好的時候，向庫圖爾尊主致謝，回到你的起點。從現在開始放輕鬆，說出自己的真理。無論走到哪裡，你都會得到別人的信任和尊重。


