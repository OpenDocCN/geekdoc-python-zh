    ## 第十四章：擴張的頂輪


    頂輪扮演的角色正隨著高層揚昇能量的接收，而發生巨大的變化。頂輪千瓣蓮花的每一瓣，現在像天線一樣搜尋它能接通的高層頻率，再把這些揚昇的振波帶進我們的松果體。


    隨著頂輪頻率的升高，所有第七到第九次元的頻率，都將繞到星系門戶脈輪，接著，再變成一個與大中央太陽連結的聖杯。跨越整個宇宙大量的光之編碼，會注入這個金色的聖杯裡。你的星系門戶會根據你的使命，調整為支持你靈魂能量的特定密碼。在單子體（monad）的引導下，你個人的實相和宇宙的連結就會啟動揚昇的過程。


    大天使約菲爾（Archangel Jophiel）負責第五次元頂輪的早期開發階段。祂用高層的振波輕輕地充滿這個脈輪，幫助它的擴張。發生這種情況時，我們就會從單子體的臨在接收一波能量。這些接收來的能量波，會從頂輪中心通過靈性場，在我們周圍延伸三十二公里（二十哩）的距離。我們的靈場包含了我們為了執行地球使命所選擇的潛伏密碼。在高層存有的指導下，這些密碼現在都被啟動了。


    接著，頂輪就會直接從我們的靈魂藍圖接收能量和指示。這可以引導我們邁向大師之路。我們在這個過程中接收的經驗，既具挑戰性又有廣泛性。


    我們的揚昇使命變得非常具體。我們在地球上的化身肩負著很重要的工作。首要的一個，就是專注於手頭上的任務。當我們的頂輪變成第五次元以後，就會吸引我們關注內在的知識和引導。在地球的最後一個典範期中，許多靈魂都追隨著指導靈和天使的提示，但祂們現在都為了讓我們自給自足而退居後位了。


    提姆和黛安娜合寫第一本《五次元的靈魂揚昇》（The Archangel Guide to Ascension）時，就有過一次親身的經歷。他一直與祂的天使保持聯繫，也很習慣地接收源源不絕的資訊流。但在他寫作《五次元的靈魂揚昇》時，原來的資訊流停止了。這讓他很自然地感到困擾，因為他從未經歷過這種情況。他花了一些時間冥想這個問題，並接通真心的引導，想尋求解決之道。


    一段時間過後，問題變得很明顯。地球急劇上升的振波，在他的能量場裡引發了巨大的變化。然後，他開始從內在尋找寫書需要的知識。他發現來自亞特蘭提斯圖書館的資訊早已經啟動了。他利用當時身為大祭司的知識完成這本書的寫作，並汲取了他多生多世以前儲存在黃金亞特蘭提斯的重要資訊。


    那一年，他看到許多人都經歷這種情況，也都採用同樣的方式回應這個遭遇。這證實了我們身為大師的責任，已經開始增加和成長了。


    人類歷史中許多啟明的大師都被描繪成頭戴光環的人物。這意味著光或知識是從頂輪傾注給我們的。當第五次元能量在我們內部擴張時，頂輪就會開始閃耀金光，高層意識的千瓣蓮花也會綻放，以創造開悟智慧的完美平衡。


    我們曾經在過去的許多世中是大師，而且現在都擁有獲得這種智慧的機會，讓我們幫助地球進入黃金的蓋婭時代。


