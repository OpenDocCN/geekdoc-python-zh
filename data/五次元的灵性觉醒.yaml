  - '[PAGE 111]


    # 第十七章


    # 擴張的星系門戶


    從天使的角度來看，明亮的星系門戶脈輪是一幅最壯觀的景象。正在觀察我們進展的天使、指導靈和其他的光之存有，很樂於見到我們的光體與靈魂的本質一起綻放。第五次元脈輪柱發出不可思議的明光，吸引了來自宇宙四面八方的最高振波。


    每一個人的脈輪系統都會散發自己這一生的靈魂使命，因此，也都有它獨一無二的光。星系門戶的任務是把肉身裡的靈魂，連結到它們所來自的源頭之光——我們起源的恆星或行星。


    我們只有七個可操作的脈輪，而頂輪要負責接收和處理提供給我們的所有資訊。但隨著我們邁向第五次元的生活方式，這個角色就由星系門戶來接替。當它在揚昇的過程開始活躍時，我們所有的能量系統就會重新排列光和力量的路線。'
  - '[PAGE 112]


    # 第十七章 擴張的星系門戶


    星系門戶具有跨越所有時空次元界限的能力。它的工作是提供超過我們身體現有能力

    的頻率。它能接收來自第九次元的光源，並把它降低到讓我們感覺舒適的層面。這種驚人

    的連結，使許多正在使用第五次元脈輪柱的靈魂，以超過預期更快的速度發展靈性的進

    步。


    星系門戶首度錨定和啟動時，是美麗的金橘色。它是由光之尊主大天使麥達昶負責監

    督。大天使麥達昶是宇宙所有已知光能的創造者。在我們揚昇之旅的早期，祂小心翼翼把

    這個光傾注到脈輪裡，滋養我們的擴張。當這個進程被錨定下來以後，祂就會退開，讓我

    們用與靈魂使命協調的速度擴張。


    星系門戶會在揚昇過程的第二階段迅速地擴張。目前有許多靈魂正處於這個層面。金

    橘色在這個階段會呈現明亮的色調，因為它充滿了基督意識的更高頻率，而且脈輪也會不

    斷地改變形狀。它會根據我們個別的動力，形成複雜、神聖的幾何形狀，把正確的能量磁

    吸到光體上。這些能量總是連結著靈魂起源的恆星或行星系統。這可以為地球上的我們提

    供最高層面的支持。


    我們的靈魂也許會有意識地發出對光和資訊的要求，星系門戶也會滿足這些要求。它

    也會獨立地為靈魂的成長尋找宇宙的資訊。它會被浩瀚空間裡的所有純淨的光吸引。這有

    助於它為我們在地球上的學習過程吸引新的經驗。


    它這種工作方式形成了一個明亮的金色聖杯，上面散佈著美麗的金線，在時空的不同'
- md: "# 五次元的靈性覺醒\n\n次元裡穿梭。這就是為何它從更高界域看會呈現如此奇景的原因。自二○一二年的宇宙時刻以來，星系門戶一直負責接收大中央太陽的第一波光能。這個第九次元的靈性太陽，是餵養實體地球的光源。\n\
    \n在地球上可以清楚地感覺和看到的太陽，它的功能遠超過只為我們提供光源和熱能而已。它以有形的方式，把第九次元的光降轉成地球能更處理的層面，再持續地分佈給我們，等於是高層光之編碼的轉化器。\n\
    \n星系門戶特別與火星和它的揚昇面向耐吉雷（Nigel Ray）有關。這個星球或月牙會散發和平的靈性領袖之光。它的影響力也有助於反射和放大光能。\n\n此外，我們個人的星系門戶脈輪也與北極星的星系門戶脈輪連結著。這個行星門戶的頻率正在上升，以配合地球的能量場。當它們的頻率上升時，我們也會跟著這麼做。我們到現在才真正看到自己與星球之間的緊密連結。\n\
    \n亞特蘭提斯黃金紀元時，因為星系門戶脈輪的先進功能，男女大祭司才能與其他星際議會進行溝通。阿爾塔會在深度的冥想中與光的存有進行協商，讓無數恆星的療癒能量和先進科技都被下載到星系門戶裡。他們再把這些科技傳遞給賢士，賢士再傳給祭司。祭司會以充滿愛的方式，把科技轉化為有形的資訊，幫助人們把文明發展到更高的第五次元。\n\
    \n在整個黃金亞特蘭提斯時期，地外文明和跨次元文明都來過地球。從那個紀元開始，他們就從遙遠的層面發送光和愛給我們。他們透過那些敞開和做好準備者的能量場，發送光和愛給我們。\n\
    \n## 第十七章 擴張的星系門戶\n\n這些不可思議的知識藍圖，都儲存在地球上所有星系門戶脈輪的高層面向裡。當我們準備再度使用這個知識藍圖時，它就會釋放出來。\n\
    \n## 觀想：星系門戶的擴張\n\n1. 做好冥想的準備。找一個神聖的空間，按自己的需要點一支蠟燭。\n2. 放輕鬆，專注在呼吸上。\n3. 呼喚第九次元的基督黃金射線，讓它充滿你的四身系統，並密封你的神聖空間。把這股能量吸入你的每一個細胞裡。\n\
    4. 把注意力轉移到頭頂上方四十五公分（十八吋）處的星系門戶脈輪。\n5. 看著它散發耀眼的金色光芒，要求它形成一個能反映你靈魂本質的形狀。\n6. 放輕鬆，讓你的星系門戶採取它希望的任何形狀。\n\
    7. 要求它調用最高頻率的光能。這個光能也許來自宇宙裡的任何來源，因此，你要對可能出現的任何資訊保持開放的心態。\n8. 看著從星系門戶傳播過來的純淨光絲與高層的光源連結。\n\
    9. 連結以後，讓光線通過光絲沖進你的脈輪裡，讓它擴張到最高的層面。\n10. 讓這個光從你的星系門戶沖刷身體和脈輪系統的其他部分。看著它穿越你的靈魂之星、因果輪、頂輪、第三眼、喉輪、心輪、太陽神經叢、臍輪、生殖輪、海底輪，最後是你的地球之星脈輪。\n\
    11. 讓這個光通過你的地球之星，進入蓋婭之心和行星的矩陣裡。\n12. 感知並感覺這個禮物帶給你和地球之母的振波。\n13. 準備開始接收更高層面的揚昇資訊。\n\
    14. 睜開眼睛，散發你的宇宙精通之光。\n\n# 庫圖彌尊主與學堂\n\n![庫圖彌尊主與學堂](img/18faa311e3ed886ca3159c2e22f45138_116_0.png)\n\
    \n# 第十八章 世界導師庫圖彌尊主\n\n庫圖彌尊主（Lord Kuthumi）是地球上最偉大的啟明大師之一。當你在通往精通和開悟的揚昇之路閱讀或思考祂時，就會讓祂的能量觸動你，並擴張你的意識。\n\
    \n祂是庫瑪拉（Kumara），也就是來自上帝之心的四個靈魂之一。祂在宇宙中從事特殊的服務。這四個靈魂的化身，一出生已經是開悟與啟明的狀態。\n\n庫圖彌尊主來自有愛的星球之稱的金星。祂在漫長的靈魂之旅中，始終在向所有人展示愛的力量。現在，祂在晶瑩的黃色射線上振動。這個顏色來自通明的心靈，而且祂才剛成為世界老師。祂在為人類服務方面有著非凡而卓越的歷史，儘管祂在多生多世中經歷過非常艱鉅的挑戰。\n\
    \n祂的乙太靜修處（etheric retreat）在印度阿格拉（Agra），美麗的泰姬瑪哈陵（Taj Mahal）的上空。在祂成為沙賈汗大帝（Shah Jahan）的那一世，與祂最寵愛的妻子慕塔芝·瑪哈（Mumtaz\
    \ Mahal）經歷過一段真愛。慕塔芝·瑪哈去世後，祂建造泰姬瑪哈陵，把完美的愛獻給她。這個陵墓是用祂對細節的熱愛和關注建造的。它的能量場至今仍然散發聖愛的光芒，吸引著準備體驗無條件和虔敬之愛的人前來。\n\
    \n祂還動用龐大的經費在德里建造了一座紅堡（Red Fort），與印度當時最大的一座清真寺。此外，祂也幫助窮人，並以公平正義治理國家。但由於祂的幾個兒子彼此衝突對立，使祂度過了非常艱苦的一生。祂失去了大部分的帝國，後來被一個兒子監禁而死在牢裡。這一生的經歷相當程度地強化了祂在精通之路上的進展。\n\
    \n祂化身為聖方濟各亞西西（St. Francis of Assisi）的那一世，把不傷害和慈愛普施給一切眾生。祂的光環如此清晰、平靜，讓每一隻靠近祂的動物都感覺十足的安全，沒有受到任何傷害的恐懼。祂那一生不只把和平獻給所有人。身為一個堅決服事天主的僧侶，祂也對自己的使命展現出極大的勇氣、信任和信心。\n\
    \n祂也化身為約翰至愛（John the Beloved）、占卜耶穌出生地的智者巴薩扎（Balthazar），以及埃及法老圖特摩斯三世（Pharaoh Tutmose\
    \ III）。\n\n多年以來，庫圖彌尊主一直是第二道射線，也就是愛與智慧的黃射線的真主。祂一直非常關心靈性法則對人類的啟發。祂是聖殿騎士團（Knights\
    \ Templar）的創始成員。這個騎士團保留了古老的奧祕，並保護著朝聖者旅途的安全。祂化身為畢達哥拉斯（Pythagoras）的那一世，把神聖的幾何學、數祕術（numerology）、數學和不可思議的天體音樂（Music\
    \ of the Spheres）引到世間，並為大白兄弟會（the Great White Brotherhood）建立一所神祕學校。祂與大天使麥可是聖杯（holy\
    \ grail）的共同保護者。聖杯代表對自我了解和精通的神祕追求。\n\n祂以無私奉獻的精神，擔任金袍兄弟會（the Brotherhood of the\
    \ Golden Robe）的祭司長。這是一個透過金光傳播和平並承擔世界重任的職責。此外，祂還是古老奧祕的守門人。\n\n祂目前正在世界導師的身分，把奧祕的資訊帶給在揚昇之路上邁進，並能了解這些資訊的光之工作者。祂會散發這種高頻角色的水晶品質。\n\
    \n祂一直以象徵天地融合的六角星為徽章。六角星也是亞特蘭提斯的象徵。然而，這個徽章已經擴張了六束額外的光線。\n\n二○一二年的宇宙時刻以前，乙太有七所由庫圖彌尊主和迪瓦爾·庫爾（Dwija\
    \ Kul）共同經營的學校。自從祂成為世界導師和學校的負責人以來，就在內在層面創建了十二所與宇宙能量和期望同步增長的學校。參加這些學校的不只地球，還有其他宇宙的生命。\n\
    \n這些不是初級學校，而是乙太大學。學校會透過一系列的課程，指導那些想成為宇宙揚昇大師的學生。許多人認為只有一個擁有肉身的人才能成為揚昇大師，但事實並非如此。黛安娜的指導靈庫梅卡（Kume\
    \ Ka），就是從未在地球化身的光之尊主和揚昇大師。祂們已經從非物質次元、學習、考驗、測試和啟蒙的課程中畢業了。\n\n讓一些存在停留在靈體的理由很多。他們也許被認為尚未做好實體經驗的準備，有的靈魂也許需要更多的地球經驗，或者由於非實體課程更能符合他們的靈魂藍圖。以黛安娜的情況來說，她是庫梅卡的雙生火焰（參閱286頁的〈靈魂伴侶〉）。他們的靈魂合約規定由她來化身，祂則負責從內層引導祂。因此，這是一個牽涉了多生多世的約定。\n\
    \n乙太大學的十二座教學建物都是圓形的，就像一座發光的柱型神殿一樣。已經化身的學生，會在入睡後進入祂們的靈體。\n\n學校的教學法與亞特蘭提斯黃金紀元的教學法如出一轍。每一座神殿裡都會有一個水晶骷髏頭，好讓庫圖彌尊主下載資訊和知識。祂偶爾也會從星際議會那裡下載。塞若佩斯·貝、迪瓦爾·庫爾（Swihal\
    \ Khul）、希拉靈尊主（Lord Hilari on）、沃斯洛尊主，以及一些偉大的神聖指導者，都在這裡把智慧分享給宇宙學生。\n\n每一個申請獲准參加課程的學生，都會擁有個人的水晶骷髏頭。他們可以把自己的水晶骷髏頭連結到神殿裡的主水晶骷髏頭，下載小組的課程。接著，再把水晶骷髏頭放在第三眼上，就可以存取教學資訊了。他們還可以參加專為個人訂製的課程，再透過靈性密碼存取課程資訊。許多參與課程的人，正在從非物質的層面協助地球。\n\
    \n大天使麥達昶的附殿裡每一個學堂的教學空間，都沐浴在適當的色光裡，每一個教學空間裡，都有資訊相當具體地傳達光的語言。\n\n當你造訪世界導師的教學神殿，你就能下載大量含光的知識和智慧，這可以幫助你在成為大師的路上更臻完美。進入他的教學學院就等同為你的啟蒙和精通提供了速成的計劃。\n\
    \n## 觀想：加入庫圖彌尊主的學校\n\n1. 找一個安靜、不受干擾的地方。可能的話，點一支蠟燭。\n2. 閉上眼睛，舒適地呼吸，讓心念集中。\n3. 注意前方出現的黃色水晶光。這道光構成了進入內在層面的螺旋路徑。\n\
    4. 循著這條路徑前進，可以俯視在下方放射彩光的泰姬瑪哈陵。\n5. 一位穿著棕色袍子的純樸僧侶，正走過來跟你會合。祂身邊圍繞著小鳥和動物，你一眼就能認出祂是聖法蘭西斯（St.\
    \ Francis）。\n6. 祂熱情地歡迎你的光臨。接著，祂提醒你開悟和精通的道路也許不會一路順風，但永遠都會有回報。\n7. 前方有一扇巨大、發光的黃色大門，旁邊有一個門鈴。聖法蘭西斯點頭微笑，所以你按下門鈴。\n\
    8. 鈴聲響起，大門打開，渾身閃爍著明光的庫圖彌尊主本人就站在你面前。\n9. 祂一見到你就對你微笑。\n10. 你為了加快開悟和精通之路，謙卑地提出進入學校的請求。\n\
    11. 庫圖彌尊主檢視你的光環，你能感知在周圍旋轉和發光的顏色。\n12. 祂邀請你跟祂一起進入電梯，帶你到一個架高的房間。\n13. 你看到窗外有十二座冒著五顏六色光芒的建築。\n\
    14. 來自整個宇宙的各種形狀和大小的學生，不是在中庭裡喧鬧，就是往建築物裡走。祂們的光環亮得令人難以置信，充滿了喜悅、尊嚴和靈魂的滿足感。\n15. 庫圖彌尊主問你是否準備要加入祂的學校。\n\
    16. 如果你願意，舉起手，鄭重地說出：\n    > 「我，（姓名），謹此申請加入庫圖彌尊主的學校學習。我保證盡全力學習並尊重神聖的靈性教誨。」\n17.\
    \ 庫圖彌尊主遞給你一個小水晶骷髏頭，你小心翼翼地接過來。\n18. 祂說：\n    > 「我接受你，（姓名），作為我的光之學校的學生。歡迎你的加入。」\n\
    19. 祂示意你該告辭了。你走進升降梯，來到下面的正門。\n20. 聖法蘭西斯向你道賀，陪你一起沿著漫長蜿蜒的黃色小徑來到起點。\n21. 你手裡握著乙太水晶骷髏頭，安靜地坐著。\n\
    22. 接著，你睜開眼睛，回到房間。\n\n# 第十九章 學堂一：平衡的功課\n\n在過去的一萬年裡，人類不斷地參訪第一學堂，努力了解和遵守地球的靈性法則。當你收到來自蓋婭母神化身的邀請時，這個邀請就會自動包括參訪地球這個靈性教學機構裡的特定學院。\n\
    \n學生會沐浴在這座神殿的淡紫丁香色的光裡。這裡的初級課程包括不斷教導的七個第三次元脈輪的平衡。但現在的能量已經上升了。最後，求道者的靈魂會整合這些課程，並準備與高層的脈輪合作。\n\
    \n自二○一二年以來，這個學堂裡教授的宇宙特定光能祕密，讓十二個高頻脈輪得以在和諧的氣氛下彼此合作。當個人在這些中心下功夫時，他就能活在神聖完美的金色繭包裡。\n\
    \n此外，蓋婭母神已經在二○一五年九月，決定把即時業力應用在每一個地球人的身上，無論他的靈性層面如何。這導致許多靈魂的瞬間覺醒。\n\n保持平衡是這個學堂裡要傳授的主要知識。對一個允許自由意志的世界來說，這是一門必修的功課。教學廳入口處掛了一個象徵男女平衡的陰陽圖。這個圖像可以藉由操作松果體中一個能觸發特定光之編碼的按鍵來開啟心門。這能使個人保持平衡，並在自己的內在找到完美、神聖的陰陽平衡。\n\
    \n由於地球仍然處於男性主導的優勢，許多高度進化的大師，無論有無化身，都在幫助引導人們進入神聖的陰性能量。他們的做法是以輕聲耳語的方式，把對高層的期盼傳送到人們的心靈。\n\
    \n來自赫利歐斯的神聖陽性能量，是透過月亮反射出來的。這會以神聖的陰性之愛柔化太陽的光之編碼。\n\n此外，在大天使克里斯提爾的指導下，月亮天使也幫忙開啟人們的心瓣。\n\
    \n當作為陰性能量的基督之光在心輪啟明時，它就會創造平衡。這個學堂的學生得到的教導是，把來自天狼星揚昇面向拉庫美（Lakumay）的基督之光鑰匙和密碼，直接帶進他們的脈輪裡。這會讓他們的心輪充滿完美的愛。因為心輪會影響人的心靈，所以這麼做會逐漸軟化那些需要者的心態。\n\
    \n如果兩個孩子坐在蹺蹺板上，一個孩子比另一個重，那麼這兩個孩子都要更加努力才能保持穩定。一旦他們的重量絕對相等時，諧波運動就會變得更加容易，而且也會讓他們消耗更少的能量。\n\
    \n第一個學堂裡所有的練習和測試，都與自我的平衡有關，接下來，就是幫助局勢、家庭、國家、世界，以及其他星球找到穩定。這是一個實用又有挑戰性的射線。其結果是，許多人仍然等待著進入需要自我之愛的第二階段。這裡提供的訓練和發展課程，會要求他們練習能量的操縱，好讓他們創造為能所有人帶來至善的生活。畢業生必須能從高層心靈投射心理能量，使環境裡的所有事物處於穩定的狀態。此外，他們還必須能把神聖的和諧聚焦到遠方的人、地方或情境上。\n\
    \n這裡使用的教學和練習，與亞特蘭提斯開發的心靈訓練方法雷同。平衡的功課包括放下我執、取回自己的力量，並樂於以異中求同的態度與人相處。這些能量不僅從個人身上，也在星球的氣場裡散發。目前，我們的地球正努力平衡陰陽兩性的能量，參加庫圖彌尊主訓練的人，正在努力促進這個目標。\n\
    \n當你達到完美的平衡時，氣場就會發光，並會做好進入下一步的準備。蓋婭母神正熱切地期盼這個顏色在地球的能量場中發展、壯大，好讓我們的地球能轉化，並幫助整個宇宙的和諧。\n\
    \n## 觀想：拜訪平衡廳\n\n1. 準備一個能讓你放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。\n2. 安靜地坐著，舒適地呼吸，懷著拜訪平衡廳的意圖。\n\
    3. 專注於你已經啟動的地球之星。\n4. 請大天使麥可把祂深藍色的保護斗篷披在你周圍。\n5. 呼喚庫圖彌尊主，請祂在你周圍放一個有陰陽符號的球。\n6.\
    \ 觀想自己在時空裡升到第七次元的平衡廳。\n7. 掛著一個巨大陰陽符號的大門開啟，你走進一個美麗、閃閃發光、充滿了學生的金色學習神殿。\n8. 庫圖彌尊主站在一個架高的平台上，準備傳授知識。\n\
    9. 你左手握著一個純淨、透明的水晶骷髏頭，正與神殿中央那一個巨大的水晶骷髏頭有力地連結著。\n10. 你把水晶骷髏頭放在第三眼上，感知松果體中的符號被啟動了。\n\
    11. 你覺察心輪的花瓣正自動地綻放。\n12. 你感知能量向下傳播到地球之星脈輪，把它打開，並啟動它。\n13. 你的四身系統現在已達到完全平衡和均勻的狀態。\n\
    14. 感覺你對平衡充分地了解，以光之編碼的形式啟動它。\n15. 放輕鬆，準備好以後，回到開始的地方。\n\n你在清醒狀態中接收的資訊，會隨著頻率的增加隨時供你取用。每當你提出請求時，庫圖彌尊主就會協助你進行這個過程。\n\
    \n祂要求你注意保持身體平衡、均勻與和諧的選擇。做一個與解決這個問題有關的決定。\n\n你在學堂中處於睡眠狀態時學到的所有內容，都會反映在日常生活裡。因此，你要覺察正在發生的變化，反之亦然。白天做的明智決定和反應，都會立刻影響並加速你在學堂的進步。\n\
    \n無論何時，在你感覺必要的時候，觀想陰陽符號會有助於你再次找到自己的位置。\n\n# 第二十章 學堂二：至樂的功課\n\n揚昇大師之路是一條充滿快樂、喜悅和知足的道路。無論你置身何處，它都會讓你散發輕鬆、和諧的狀態。身處神性第五次元裡的正確位置，就是你的自然狀態。\n\
    \n這個課程最重要的部分就是信任宇宙會支持你。當你絕對知道自己的生存所需會得到滿足時——事實上，不只是滿足而已——就會發生這種情況：你知道自己會以充滿愛、滋養的方式，得到豐富的生活。因此，這個學堂的教學基礎就是海底輪的淨化和開發。\n\
    \n只有當海底輪得到放鬆，並注入閃爍的鉑金光時，學生才會來敲這個教學設施的大門。進入這個教育殿堂所收到的鑰匙和密碼，會自動加快海底輪往第四次元和第五次元揚昇的速度。\n\
    \n進入這個學堂的同時，就會袪除第六層的黃色幻相。這是第二個要解除的遮幕。當你"
  mdcn: "# 五次元的靈性覺醒\n\n次元裡穿梭。這就是為何它從更高界域看會呈現如此奇景的原因。自二○一二年的宇宙時刻以來，星系門戶一直負責接收大中央太陽的第一波光能。這個第九次元的靈性太陽，是餵養實體地球的光源。\n\
    \n在地球上可以清楚地感覺和看到的太陽，它的功能遠超過只為我們提供光源和熱能而已。它以有形的方式，把第九次元的光降轉成地球能更處理的層面，再持續地分佈給我們，等於是高層光之編碼的轉化器。\n\
    \n星系門戶特別與火星和它的揚昇面向耐吉雷（Nigel Ray）有關。這個星球或月牙會散發和平的靈性領袖之光。它的影響力也有助於反射和放大光能。\n\n此外，我們個人的星系門戶脈輪也與北極星的星系門戶脈輪連結著。這個行星門戶的頻率正在上升，以配合地球的能量場。當它們的頻率上升時，我們也會跟著這麼做。我們到現在才真正看到自己與星球之間的緊密連結。\n\
    \n亞特蘭提斯黃金紀元時，因為星系門戶脈輪的先進功能，男女大祭司才能與其他星際議會進行溝通。阿爾塔會在深度的冥想中與光的存有進行協商，讓無數恆星的療癒能量和先進科技都被下載到星系門戶裡。他們再把這些科技傳遞給賢士，賢士再傳給祭司。祭司會以充滿愛的方式，把科技轉化為有形的資訊，幫助人們把文明發展到更高的第五次元。\n\
    \n在整個黃金亞特蘭提斯時期，地外文明和跨次元文明都來過地球。從那個紀元開始，他們就從遙遠的層面發送光和愛給我們。他們透過那些敞開和做好準備者的能量場，發送光和愛給我們。\n\
    \n## 第十七章 擴張的星系門戶\n\n這些不可思議的知識藍圖，都儲存在地球上所有星系門戶脈輪的高層面向裡。當我們準備再度使用這個知識藍圖時，它就會釋放出來。\n\
    \n## 觀想：星系門戶的擴張\n\n1. 做好冥想的準備。找一個神聖的空間，按自己的需要點一支蠟燭。\n2. 放輕鬆，專注在呼吸上。\n3. 呼喚第九次元的基督黃金射線，讓它充滿你的四身系統，並密封你的神聖空間。把這股能量吸入你的每一個細胞裡。\n\
    4. 把注意力轉移到頭頂上方四十五公分（十八吋）處的星系門戶脈輪。\n5. 看著它散發耀眼的金色光芒，要求它形成一個能反映你靈魂本質的形狀。\n6. 放輕鬆，讓你的星系門戶採取它希望的任何形狀。\n\
    7. 要求它調用最高頻率的光能。這個光能也許來自宇宙裡的任何來源，因此，你要對可能出現的任何資訊保持開放的心態。\n8. 看著從星系門戶傳播過來的純淨光絲與高層的光源連結。\n\
    9. 連結以後，讓光線通過光絲沖進你的脈輪裡，讓它擴張到最高的層面。\n10. 讓這個光從你的星系門戶沖刷身體和脈輪系統的其他部分。看著它穿越你的靈魂之星、因果輪、頂輪、第三眼、喉輪、心輪、太陽神經叢、臍輪、生殖輪、海底輪，最後是你的地球之星脈輪。\n\
    11. 讓這個光通過你的地球之星，進入蓋婭之心和行星的矩陣裡。\n12. 感知並感覺這個禮物帶給你和地球之母的振波。\n13. 準備開始接收更高層面的揚昇資訊。\n\
    14. 睜開眼睛，散發你的宇宙精通之光。\n\n# 庫圖彌尊主與學堂\n\n![庫圖彌尊主與學堂](img/18faa311e3ed886ca3159c2e22f45138_116_0.png)\n\
    \n# 第十八章 世界導師庫圖彌尊主\n\n庫圖彌尊主（Lord Kuthumi）是地球上最偉大的啟明大師之一。當你在通往精通和開悟的揚昇之路閱讀或思考祂時，就會讓祂的能量觸動你，並擴張你的意識。\n\
    \n祂是庫瑪拉（Kumara），也就是來自上帝之心的四個靈魂之一。祂在宇宙中從事特殊的服務。這四個靈魂的化身，一出生已經是開悟與啟明的狀態。\n\n庫圖彌尊主來自有愛的星球之稱的金星。祂在漫長的靈魂之旅中，始終在向所有人展示愛的力量。現在，祂在晶瑩的黃色射線上振動。這個顏色來自通明的心靈，而且祂才剛成為世界老師。祂在為人類服務方面有著非凡而卓越的歷史，儘管祂在多生多世中經歷過非常艱鉅的挑戰。\n\
    \n祂的乙太靜修處（etheric retreat）在印度阿格拉（Agra），美麗的泰姬瑪哈陵（Taj Mahal）的上空。在祂成為沙賈汗大帝（Shah Jahan）的那一世，與祂最寵愛的妻子慕塔芝·瑪哈（Mumtaz\
    \ Mahal）經歷過一段真愛。慕塔芝·瑪哈去世後，祂建造泰姬瑪哈陵，把完美的愛獻給她。這個陵墓是用祂對細節的熱愛和關注建造的。它的能量場至今仍然散發聖愛的光芒，吸引著準備體驗無條件和虔敬之愛的人前來。\n\
    \n祂還動用龐大的經費在德里建造了一座紅堡（Red Fort），與印度當時最大的一座清真寺。此外，祂也幫助窮人，並以公平正義治理國家。但由於祂的幾個兒子彼此衝突對立，使祂度過了非常艱苦的一生。祂失去了大部分的帝國，後來被一個兒子監禁而死在牢裡。這一生的經歷相當程度地強化了祂在精通之路上的進展。\n\
    \n祂化身為聖方濟各亞西西（St. Francis of Assisi）的那一世，把不傷害和慈愛普施給一切眾生。祂的光環如此清晰、平靜，讓每一隻靠近祂的動物都感覺十足的安全，沒有受到任何傷害的恐懼。祂那一生不只把和平獻給所有人。身為一個堅決服事天主的僧侶，祂也對自己的使命展現出極大的勇氣、信任和信心。\n\
    \n祂也化身為約翰至愛（John the Beloved）、占卜耶穌出生地的智者巴薩扎（Balthazar），以及埃及法老圖特摩斯三世（Pharaoh Tutmose\
    \ III）。\n\n多年以來，庫圖彌尊主一直是第二道射線，也就是愛與智慧的黃射線的真主。祂一直非常關心靈性法則對人類的啟發。祂是聖殿騎士團（Knights\
    \ Templar）的創始成員。這個騎士團保留了古老的奧祕，並保護著朝聖者旅途的安全。祂化身為畢達哥拉斯（Pythagoras）的那一世，把神聖的幾何學、數祕術（numerology）、數學和不可思議的天體音樂（Music\
    \ of the Spheres）引到世間，並為大白兄弟會（the Great White Brotherhood）建立一所神祕學校。祂與大天使麥可是聖杯（holy\
    \ grail）的共同保護者。聖杯代表對自我了解和精通的神祕追求。\n\n祂以無私奉獻的精神，擔任金袍兄弟會（the Brotherhood of the\
    \ Golden Robe）的祭司長。這是一個透過金光傳播和平並承擔世界重任的職責。此外，祂還是古老奧祕的守門人。\n\n祂目前正在世界導師的身分，把奧祕的資訊帶給在揚昇之路上邁進，並能了解這些資訊的光之工作者。祂會散發這種高頻角色的水晶品質。\n\
    \n祂一直以象徵天地融合的六角星為徽章。六角星也是亞特蘭提斯的象徵。然而，這個徽章已經擴張了六束額外的光線。\n\n二○一二年的宇宙時刻以前，乙太有七所由庫圖彌尊主和迪瓦爾·庫爾（Dwija\
    \ Kul）共同經營的學校。自從祂成為世界導師和學校的負責人以來，就在內在層面創建了十二所與宇宙能量和期望同步增長的學校。參加這些學校的不只地球，還有其他宇宙的生命。\n\
    \n這些不是初級學校，而是乙太大學。學校會透過一系列的課程，指導那些想成為宇宙揚昇大師的學生。許多人認為只有一個擁有肉身的人才能成為揚昇大師，但事實並非如此。黛安娜的指導靈庫梅卡（Kume\
    \ Ka），就是從未在地球化身的光之尊主和揚昇大師。祂們已經從非物質次元、學習、考驗、測試和啟蒙的課程中畢業了。\n\n讓一些存在停留在靈體的理由很多。他們也許被認為尚未做好實體經驗的準備，有的靈魂也許需要更多的地球經驗，或者由於非實體課程更能符合他們的靈魂藍圖。以黛安娜的情況來說，她是庫梅卡的雙生火焰（參閱286頁的〈靈魂伴侶〉）。他們的靈魂合約規定由她來化身，祂則負責從內層引導祂。因此，這是一個牽涉了多生多世的約定。\n\
    \n乙太大學的十二座教學建物都是圓形的，就像一座發光的柱型神殿一樣。已經化身的學生，會在入睡後進入祂們的靈體。\n\n學校的教學法與亞特蘭提斯黃金紀元的教學法如出一轍。每一座神殿裡都會有一個水晶骷髏頭，好讓庫圖彌尊主下載資訊和知識。祂偶爾也會從星際議會那裡下載。塞若佩斯·貝、迪瓦爾·庫爾（Swihal\
    \ Khul）、希拉靈尊主（Lord Hilari on）、沃斯洛尊主，以及一些偉大的神聖指導者，都在這裡把智慧分享給宇宙學生。\n\n每一個申請獲准參加課程的學生，都會擁有個人的水晶骷髏頭。他們可以把自己的水晶骷髏頭連結到神殿裡的主水晶骷髏頭，下載小組的課程。接著，再把水晶骷髏頭放在第三眼上，就可以存取教學資訊了。他們還可以參加專為個人訂製的課程，再透過靈性密碼存取課程資訊。許多參與課程的人，正在從非物質的層面協助地球。\n\
    \n大天使麥達昶的附殿裡每一個學堂的教學空間，都沐浴在適當的色光裡，每一個教學空間裡，都有資訊相當具體地傳達光的語言。\n\n當你造訪世界導師的教學神殿，你就能下載大量含光的知識和智慧，這可以幫助你在成為大師的路上更臻完美。進入他的教學學院就等同為你的啟蒙和精通提供了速成的計劃。\n\
    \n## 觀想：加入庫圖彌尊主的學校\n\n1. 找一個安靜、不受干擾的地方。可能的話，點一支蠟燭。\n2. 閉上眼睛，舒適地呼吸，讓心念集中。\n3. 注意前方出現的黃色水晶光。這道光構成了進入內在層面的螺旋路徑。\n\
    4. 循著這條路徑前進，可以俯視在下方放射彩光的泰姬瑪哈陵。\n5. 一位穿著棕色袍子的純樸僧侶，正走過來跟你會合。祂身邊圍繞著小鳥和動物，你一眼就能認出祂是聖法蘭西斯（St.\
    \ Francis）。\n6. 祂熱情地歡迎你的光臨。接著，祂提醒你開悟和精通的道路也許不會一路順風，但永遠都會有回報。\n7. 前方有一扇巨大、發光的黃色大門，旁邊有一個門鈴。聖法蘭西斯點頭微笑，所以你按下門鈴。\n\
    8. 鈴聲響起，大門打開，渾身閃爍著明光的庫圖彌尊主本人就站在你面前。\n9. 祂一見到你就對你微笑。\n10. 你為了加快開悟和精通之路，謙卑地提出進入學校的請求。\n\
    11. 庫圖彌尊主檢視你的光環，你能感知在周圍旋轉和發光的顏色。\n12. 祂邀請你跟祂一起進入電梯，帶你到一個架高的房間。\n13. 你看到窗外有十二座冒著五顏六色光芒的建築。\n\
    14. 來自整個宇宙的各種形狀和大小的學生，不是在中庭裡喧鬧，就是往建築物裡走。祂們的光環亮得令人難以置信，充滿了喜悅、尊嚴和靈魂的滿足感。\n15. 庫圖彌尊主問你是否準備要加入祂的學校。\n\
    16. 如果你願意，舉起手，鄭重地說出：\n    > 「我，（姓名），謹此申請加入庫圖彌尊主的學校學習。我保證盡全力學習並尊重神聖的靈性教誨。」\n17.\
    \ 庫圖彌尊主遞給你一個小水晶骷髏頭，你小心翼翼地接過來。\n18. 祂說：\n    > 「我接受你，（姓名），作為我的光之學校的學生。歡迎你的加入。」\n\
    19. 祂示意你該告辭了。你走進升降梯，來到下面的正門。\n20. 聖法蘭西斯向你道賀，陪你一起沿著漫長蜿蜒的黃色小徑來到起點。\n21. 你手裡握著乙太水晶骷髏頭，安靜地坐著。\n\
    22. 接著，你睜開眼睛，回到房間。\n\n# 第十九章 學堂一：平衡的功課\n\n在過去的一萬年裡，人類不斷地參訪第一學堂，努力了解和遵守地球的靈性法則。當你收到來自蓋婭母神化身的邀請時，這個邀請就會自動包括參訪地球這個靈性教學機構裡的特定學院。\n\
    \n學生會沐浴在這座神殿的淡紫丁香色的光裡。這裡的初級課程包括不斷教導的七個第三次元脈輪的平衡。但現在的能量已經上升了。最後，求道者的靈魂會整合這些課程，並準備與高層的脈輪合作。\n\
    \n自二○一二年以來，這個學堂裡教授的宇宙特定光能祕密，讓十二個高頻脈輪得以在和諧的氣氛下彼此合作。當個人在這些中心下功夫時，他就能活在神聖完美的金色繭包裡。\n\
    \n此外，蓋婭母神已經在二○一五年九月，決定把即時業力應用在每一個地球人的身上，無論他的靈性層面如何。這導致許多靈魂的瞬間覺醒。\n\n保持平衡是這個學堂裡要傳授的主要知識。對一個允許自由意志的世界來說，這是一門必修的功課。教學廳入口處掛了一個象徵男女平衡的陰陽圖。這個圖像可以藉由操作松果體中一個能觸發特定光之編碼的按鍵來開啟心門。這能使個人保持平衡，並在自己的內在找到完美、神聖的陰陽平衡。\n\
    \n由於地球仍然處於男性主導的優勢，許多高度進化的大師，無論有無化身，都在幫助引導人們進入神聖的陰性能量。他們的做法是以輕聲耳語的方式，把對高層的期盼傳送到人們的心靈。\n\
    \n來自赫利歐斯的神聖陽性能量，是透過月亮反射出來的。這會以神聖的陰性之愛柔化太陽的光之編碼。\n\n此外，在大天使克里斯提爾的指導下，月亮天使也幫忙開啟人們的心瓣。\n\
    \n當作為陰性能量的基督之光在心輪啟明時，它就會創造平衡。這個學堂的學生得到的教導是，把來自天狼星揚昇面向拉庫美（Lakumay）的基督之光鑰匙和密碼，直接帶進他們的脈輪裡。這會讓他們的心輪充滿完美的愛。因為心輪會影響人的心靈，所以這麼做會逐漸軟化那些需要者的心態。\n\
    \n如果兩個孩子坐在蹺蹺板上，一個孩子比另一個重，那麼這兩個孩子都要更加努力才能保持穩定。一旦他們的重量絕對相等時，諧波運動就會變得更加容易，而且也會讓他們消耗更少的能量。\n\
    \n第一個學堂裡所有的練習和測試，都與自我的平衡有關，接下來，就是幫助局勢、家庭、國家、世界，以及其他星球找到穩定。這是一個實用又有挑戰性的射線。其結果是，許多人仍然等待著進入需要自我之愛的第二階段。這裡提供的訓練和發展課程，會要求他們練習能量的操縱，好讓他們創造為能所有人帶來至善的生活。畢業生必須能從高層心靈投射心理能量，使環境裡的所有事物處於穩定的狀態。此外，他們還必須能把神聖的和諧聚焦到遠方的人、地方或情境上。\n\
    \n這裡使用的教學和練習，與亞特蘭提斯開發的心靈訓練方法雷同。平衡的功課包括放下我執、取回自己的力量，並樂於以異中求同的態度與人相處。這些能量不僅從個人身上，也在星球的氣場裡散發。目前，我們的地球正努力平衡陰陽兩性的能量，參加庫圖彌尊主訓練的人，正在努力促進這個目標。\n\
    \n當你達到完美的平衡時，氣場就會發光，並會做好進入下一步的準備。蓋婭母神正熱切地期盼這個顏色在地球的能量場中發展、壯大，好讓我們的地球能轉化，並幫助整個宇宙的和諧。\n\
    \n## 觀想：拜訪平衡廳\n\n1. 準備一個能讓你放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。\n2. 安靜地坐著，舒適地呼吸，懷著拜訪平衡廳的意圖。\n\
    3. 專注於你已經啟動的地球之星。\n4. 請大天使麥可把祂深藍色的保護斗篷披在你周圍。\n5. 呼喚庫圖彌尊主，請祂在你周圍放一個有陰陽符號的球。\n6.\
    \ 觀想自己在時空裡升到第七次元的平衡廳。\n7. 掛著一個巨大陰陽符號的大門開啟，你走進一個美麗、閃閃發光、充滿了學生的金色學習神殿。\n8. 庫圖彌尊主站在一個架高的平台上，準備傳授知識。\n\
    9. 你左手握著一個純淨、透明的水晶骷髏頭，正與神殿中央那一個巨大的水晶骷髏頭有力地連結著。\n10. 你把水晶骷髏頭放在第三眼上，感知松果體中的符號被啟動了。\n\
    11. 你覺察心輪的花瓣正自動地綻放。\n12. 你感知能量向下傳播到地球之星脈輪，把它打開，並啟動它。\n13. 你的四身系統現在已達到完全平衡和均勻的狀態。\n\
    14. 感覺你對平衡充分地了解，以光之編碼的形式啟動它。\n15. 放輕鬆，準備好以後，回到開始的地方。\n\n你在清醒狀態中接收的資訊，會隨著頻率的增加隨時供你取用。每當你提出請求時，庫圖彌尊主就會協助你進行這個過程。\n\
    \n祂要求你注意保持身體平衡、均勻與和諧的選擇。做一個與解決這個問題有關的決定。\n\n你在學堂中處於睡眠狀態時學到的所有內容，都會反映在日常生活裡。因此，你要覺察正在發生的變化，反之亦然。白天做的明智決定和反應，都會立刻影響並加速你在學堂的進步。\n\
    \n無論何時，在你感覺必要的時候，觀想陰陽符號會有助於你再次找到自己的位置。\n\n# 第二十章 學堂二：至樂的功課\n\n揚昇大師之路是一條充滿快樂、喜悅和知足的道路。無論你置身何處，它都會讓你散發輕鬆、和諧的狀態。身處神性第五次元裡的正確位置，就是你的自然狀態。\n\
    \n這個課程最重要的部分就是信任宇宙會支持你。當你絕對知道自己的生存所需會得到滿足時——事實上，不只是滿足而已——就會發生這種情況：你知道自己會以充滿愛、滋養的方式，得到豐富的生活。因此，這個學堂的教學基礎就是海底輪的淨化和開發。\n\
    \n只有當海底輪得到放鬆，並注入閃爍的鉑金光時，學生才會來敲這個教學設施的大門。進入這個教育殿堂所收到的鑰匙和密碼，會自動加快海底輪往第四次元和第五次元揚昇的速度。\n\
    \n進入這個學堂的同時，就會袪除第六層的黃色幻相。這是第二個要解除的遮幕。當你"
