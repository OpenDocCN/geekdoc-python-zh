  md: '# 第三十八章 龍族


    的經驗，龍族也來幫助這些新人類。祂們先協助列木里亞人在地球上建造結構，為實驗做準備，接著，再清除第一批亞特蘭提斯人周圍的能量，好讓一切都能很輕易地流動。


    龍族幫他們開鑿亞特蘭提斯的波賽頓山，和上面聳立著的波賽頓神殿。神殿裡安放了亞特蘭提斯大水晶。祂們還保護這個水晶發電器。大水晶在亞特蘭提斯末期掉進百慕達三角洲的中心時，水龍承擔了保護它的責任，因為它仍然是一個活躍的次元入口和強大的發電器。


    當星際議會需要使用入口時，它就會產生強光，讓三角洲的所有人事物都經歷一個次元間的轉換。這意味著祂們會從人類的眼中消失不見。當然了，這是祂們的靈魂事先同意的，這也為祂們提供了一次靈性提升的機會。


    由於祂們過去經常需要這個入口，也因此促生了今天的百慕達三角洲之謎。如今，由於行星的頻率增加，次元的入口開啟時，已經不會對周圍的人事物產生太大的影響了。


    二〇一五年是大水晶再度躍升的時間。龍族釋放祂們的保護能量，使光全部的力量像噴泉一樣升起，再度照亮了地球。這對地球的揚昇和精通過程產生了巨大影響。


