    # 第三十五章 耶穌—宇宙之愛的使者


    的母親。由於她太純潔，以至於在四歲以前，父母不准她接觸地面，不是有人抱，就是站在一塊鋪在地上的白布上。這些都象徵了她的純潔無瑕，她的一生都是為了生養耶穌這個偉大的靈性任務做準備。她和耶穌的父親約瑟夫都是純粹的本體（Essences）。他們每天都要做好幾小時的靈修和深奧的技術。這賦予了他們巨大的力量，使他們能進入宇宙的聖奧秘中，包括處女生子在內。


    耶穌誕生前，技藝精湛的星象家透過星象的計算，精確地指出祂的出生地，讓智者艾爾·莫里亞（El Morya）、迪瓦爾·庫爾（Diwal Khul）和庫圖彌尊主（能夠順利地找到祂。注意那些啟明的存在如何向耶穌致敬，又如何支持祂。看看你生命中的那些人，你會詫異於祂們真實的身分嗎？


    祂誕生於四月，聖誕卡上那一隻春季的小羊羔就是祂的象徵。第五世紀以前，教父們經過多年的討論才頒布敕令，正式把祂的生日公定為十二月二十五日。這是一個具有神祕意義的日期。在十二月二十一日冬至以前，基督之光和源頭之愛便開始滲入地球。十二月二十四日午夜發生的一場宇宙變化，使神聖之光沖入地球的速度加快，讓我們在十二月二十五日沐浴在光裡。由於這個改變，印度、中國、埃及和墨西哥等古文明，都把這一天當做宗教節日來慶祝。據說，愛希斯（Isis）、歐西里斯（Osiris）、荷魯斯（Horus）、巴克斯（Bacchus）、阿多尼斯（Adonis）、赫丘利斯（Hercules）以及許多偉大的大師，都是在那個時間出生的。'
  - '[PAGE 225]


    # 五次元的靈性覺醒


    正如祂父母奉獻一生為祂的出生做準備，耶穌的一生也奉獻在為自己的使命做準備。祂的教育很嚴格，做過縝密的計劃，成年以後的遊歷也是如此。


    祂用了三年的時間傳播無條件之愛的基督之光，獲得了光榮的成功。當祂準備要接受宇宙基督的能量時，彌勒尊主與祂的內在配合，讓祂成為麥基洗德教士團（Order of
    Melchizedek）的大祭司。


    祂是最受愛戴的啟明大師，祂的內在層面被稱為薩南達（Sananda），同時也是祂的高我振波。祂的雙生火焰是娜達女士（Lady Nada）。


    耶穌的使命是再次提升地球上的光能層面，讓靈魂能散發更大的潛能。祂的化身受到極大的挑戰，但祂終於克服萬難達成了目標。


    祂在埃及去世後幾年，祂的教誨和開放的心胸被記錄在歷史中。祂打開並錨定了通往宇宙之心的巨大入口，讓光能再度沖刷我們的地球。在過去的兩年裡，這個光能強化了我們揚昇過程的準備工作。


    耶穌與地球的靈魂一起工作時，傳授了開明之心的愛和謙卑，數以百萬計的天使湧入地球，展開他們的工作。這整個計劃都是在為第五次元星球和新黃金時代鋪路。


    在耶穌四十多歲時，曾前往地球的心輪，就是現在被稱為格拉斯頓伯里（Glastonbury）的地方。祂與妻子抹大拉的馬利亞（Mary Magdalene）和揚昇大師托特離開埃及，在英格蘭的海岸遇見梅林。他們結伴前往阿瓦隆，把自己的光能與阿里瑪西亞


    224'
