    # 第三十五章 耶穌—宇宙之愛的使者


    的約瑟夫（Joseph of Arimathca）的光結合，改變了地球能量歷史路線的任務。

    地球心輪圍繞著許多稱為龍脈（dragon lines）或能量線（ley lines）的純金光複雜能量路徑。能量線遍布整個地球，可以說是蓋婭的神經通路。最初的能量線系統是托特在亞特蘭提斯化身之初親自建立的。隨著人類在亞特蘭提斯沉沒後的迷失，能量線開始斷裂、暗淡。耶穌被派去協助能量線的修復。


    祂到達阿瓦隆時，冬天已經籠罩了英格蘭，天氣非常惡劣。祂把馬利亞留在格拉斯頓伯里鎮。耶穌、托特和梅林在暴風雪中，掙扎著爬到托爾山頂。強風好幾次把祂們吹到陡峭的山坡下。


    托爾山頂有一堆岩石。耶穌、托特和梅林把它們重新排列成神聖的幾何圖案，其中還點綴著特別賜福過的水晶。接著，祂們開始冥想，把結合的能量傾注到地球的心輪裡，開始修復大地的神聖幾何形狀。


    托特召喚土龍前來，要求祂們把基督之光帶到地球各地。土龍按照祂的要求完成了任務。

    梅林呼喚第九次元的自然大師潘，以及風、火和水的大師多姆（Dom）、索爾（Thor）和波賽頓（Poseidon），要求祂們照亮格拉斯頓伯里托與金星的連結，並通過精靈傳播愛。


    後來，在托爾山腳懷特阿平（White Aping）舉行的儀式上，耶穌和抹大拉的馬利亞'
