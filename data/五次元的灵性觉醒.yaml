  md: '# 第三十九章


    # 與龍合作


    當揚昇之路上的靈魂開始覺醒時，一隻能反映他們星座象限元素的，第四次元的龍，就會跟他們一起工作。這些龍包括土龍、風龍、火龍和水龍，偶而也有混合元素龍。然而，如果你的使命需要特定元素龍的才能，那一隻龍就會來找你。例如，如果你的靈魂之旅要你使用神通，或為夢想和想像的世界導航、或者要把大量的時間用在實體的水面或水裡，那你也許會吸引一隻水龍前來。


    黛安娜的星座是土元素的處女座。她有一隻火龍，因為她需要火龍燃燒所有阻礙她工作的能量。她像許多人一樣，幫助維護第五次元社區與下一時代黃金城市的願景，以及即將到來的寶瓶時代的新存在方式，因此，她也需一隻火龍協助祂建構地球未來的構造。


    提姆是火象星座，所以他很自然地擁有一隻火龍。'
