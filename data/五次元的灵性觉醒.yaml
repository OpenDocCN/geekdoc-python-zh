    每一個掌握了生殖輪功課的靈魂，都會為地球的改變之波增加光能。這使得後繼的靈魂能更輕易地通過它們的考驗和啟蒙。


    由於第五次元脈輪柱始終錨定在高頻率的個體中，也因此突出了生殖中心需要的淨化。一九八七年的諧波匯聚，使碧綠色光再度以洶湧的愛和女性的悲憫擁抱地球。天使馬隨著生殖輪快速的擴張，那個脈輪的超越之愛能量，就會把伴侶聚合在一起。與另一個人的振波相配的生殖輪，就會讓兩個靈魂在完美的融洽中結合。但重要的是，每一個靈魂都有需要相互學習的功課，而且會以有助於它們前進的方式學習。當我們學會跟隨將我們聚在一起的高層能量時，這種情況就會發生。


    當家庭成員透過高層的生殖輪連結起來時，業力的束縛就會化解。這意味著家庭裡的所有個體，都能獨立自由地享受以愛與尊重為基礎的關係。


    當我們所有的生殖輪都是第五次元時，就會為地球上所有的關係帶來喜悅、光明和無條件的愛。


