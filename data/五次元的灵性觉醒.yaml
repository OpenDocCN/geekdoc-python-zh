    包括大自然的喜樂在內，太多的經驗都提供給我們生活所在的地面，以至於整個宇宙都以敬畏的眼光看待地球的化身。許多存在都希望來參觀這個特殊的學堂。


    這裡提供廣泛且兼容並蓄的課程。某些鳥類會唱一些讓人接通第五次元藍圖的音符。螞蟻會教導我們建築的密碼。蜘蛛則會示範如何有意圖地克服地心引力的方法。


    綠色螺旋會讓人進入自然的祕密。在這個學堂裡的學生，都沐浴在半透明的淡黃色和數百種綠色調的色光裡。當這些顏色出現在你的氣場中，你就能與自然和精靈合作了。它們會自動地回應你。


