    ## 擴張的脈輪


    ![](img/18faa311e3ed886ca3159c2e22f45138_58_0.png)


    # 第六章


    # 擴張的地球之星脈輪


    在地球演化的第三次元階段，七脈輪柱完美地發揮了它有限的連結。人類在地球上徘徊，凝視著恆星，思考自己的存在。他們必須在旅程中探索與源頭能量的連結。許多人因此失去了連結，然而，這種情況正在改變。當一個人的地球之星（Earth
    Star）被啟動以後，一切都會隨之改變。


    你的觀點決定了地球之星是十二脈輪中的第一個，或最後一個。大天使聖德芬（Archangel Sandalphon）仔細監督這個脈輪的發展。由於它在地球的進程中扮演至關重要的作用，祂會持續支持你的靈魂在地球上的化身。其他脈輪的大天使不會這麼做。


    在揚昇過程的開始，我們可以把地球之星看做是一個黑白的惰性能量球。當它覺醒以後，就會變成深灰色，反映著地殼的磁性物質。這使得它能與地球的母性本質或靈體蓋婭進行接地的聯繫。當這個能量迴路開始流動時，揚昇之道上的靈魂就不需要再進行能量的接地（grounding）了。


    接地是第三次元裡靈性生活的日常部分。求道者隨時都會記得早上進行能量的接地，就像有規律地刷牙一樣。高敏銳度的光之工作者，必須努力把自己的四身系統維持在同一個地方。


    接地還可以把身體統一成單一的共振光柱。地球之星與行星磁場及能量場的連結，會自動完成這個工作。


    當你的靈魂通過了揚昇的初階以後，地球之星的大小和力量就會擴張。它的角色是引導你到達分配給你的任務位置。你的第五次元脈輪藍圖會在你出生時，根據你的一「大師我」（master
    self）編程你的人生使命內容。因此，你的地球之星會確切地知道你在地球上的該有位置。


    許多靈魂完成初步的淨化過程以後，就會感到內心自由地追隨自己選擇的道路。當他們與自己現在的位置統一時，個人的能量就會急劇地增加。尚未與自己的位置統一以前，沒有安頓下來的靈魂就會感到躁動不安。


    這是一個威力非常強大的過程。在你抵達目的地以前，你的靈魂往往無法意識到這一點。接著，你的地球之星就會變成液態銀，反射大天使聖德芬本身的第九次元光能。


    有些光之工作者會在不假思索，或完全不合邏輯的情況下，談論他們驚奇的真心之旅。他們會說自己曾踏上一艘小太空船或飛機，去拜訪在遠方召喚他們的故鄉或聖地。他們會有一股想住在其他國家的強烈願望，而且，也會發現自己真的住在那裡。


    當你發生這種情況時，就表示你的地球之星正處於最有力道的運作狀態。當你抵達選定的地點時，這個脈輪會把特定的光之編碼下載到地球，以便在更高的頻率上啟動它。這些旅程會在地球建立黃金紀元的過程中，持續扮演重要的角色。許多被吸引到某一地方的大師們，已經在那裡度過了強有力的多生多世。他們正要返回地球，完成多生多世以前就計劃好的工作。


    揚昇大師托特在亞特蘭提斯的黃金紀元，把祂的地球之星發揮到最大的極限。亞特蘭提斯沉沒以後，祂將匯集巨量光能的陂池從更高次元引流至行星的能量線系統（planetary
    ley system），以維持基督意識（Christ consciousness）的完整。這是透過祂的星系門戶，從銀河太陽中吸收光能，再將濃縮的光流向下穿過祂的雙腳達到的。而這一股能量會通過特定的水晶和水晶骷髏頭的網格，達到集中和放大的效果。許多光之工作者現在已經憶起了實現這個目標的方法，並且在全球各位位置執行類似的任務。


    地球之星也在協助覺醒的靈魂，讓他們與地球上升的頻率並行。隨著蓋婭母神的振波上升，地球人的頻率也跟著一起上升。因此，我們是在被驅迫下進步的，並在無意識的情況下努力工作，以便能對上新的頻率。這是讓地球加速揚昇的方式之一。


    地球之星也與第七次的空心地球（Hollow Earth）緊密連結。瑟若佩斯·貝在祂的大水晶金字塔裡工作。祂手上握著每一個地球之星脈輪的連線。祂把所有脈輪的能量奠基在這個浩大的光能裡。


    隨著光之工作者越來越容易觸及水晶金字塔，他們便把地球的五個黃金紀元：安加拉（Angal）、特派尼姆（Petraniun）、姆（Mu）、列木里亞（Lemuria）和亞特蘭提斯的高層密碼吸入自己的脈輪柱裡。這為他們的旅途提供了不可或缺的資訊。隨著地球揚昇過程的發展，這些古老的知識將再度成為我們日常生活的一部分。


