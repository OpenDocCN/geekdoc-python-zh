    許多偉大的啟明大師，包括前面提過的聖母馬利亞、聖克萊爾、錫耶納的聖凱瑟琳、觀世音、亞維拉的聖德蘭、耶穌和聖哲曼，都點亮了祂們內層的心靈，幫助我們理解真正的靈性之道，就是包含並接納所有的宗教。由於一切都完美無瑕，所以並沒有什麼需要我們寬恕的，而愛是人類的自然狀態。


    宇宙天使馬利亞和祂一起教學的老師，正在教導無條件之愛廳的學生，讓他們了解不同的療癒法。這些方法都能讓他們敞開心靈，使他們與宇宙之心協調一致。


