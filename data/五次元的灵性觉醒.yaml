- md: '## 第三十三章 沃斯洛尊主


    ### 沃斯洛尊主的乙太靜修處


    麥達昶，現在正領導著一個由進化存在組成的團隊，在地球周圍創建第九次元的網格。當你與沃斯洛尊主合作時，祂也許會邀請你加入這個團隊。


    沃斯洛尊主的乙太靜修處位於巨石陣（Stonehenge）的上空。巨石陣是地球上最古老、最有威力的次元入口之一，也是世界上僅有的兩個雙向次元入口之一。它也是第九次元網格神聖幾何結構在地球上的錨點。它用很高的頻率連結著宇宙裡的所有錨點。


    數千年來，它一直處於關閉的狀態，目前仍然只有部分開啟而已。我們預計它會在二〇三二年完全開啟。然而，如果你在冥想或入睡時拜訪它，它就會帶你進入第七次元的光體。你會在這個層面上，透過天使般的眼睛看；換句話說，你會看到每一個人和情境的神聖完美。你會覺知隱藏在許多挑戰性環境背後的靈魂協議。你會看到和平、愛與和諧的光球，盤旋在世界所有社區的上空。你會用開悟的眼睛覺察，看到它在等待那些社區裡的人覺醒。看到他們用不同的眼睛看世界，進而能讓自己沐浴在發光的能量裡。


    黛安娜曾和黛安娜·庫柏基金會（Diana Cooper Foundation）的高頻率老師們一起拜訪沃斯洛尊主的靜修處，該次經驗非常美好。


    由於一次只允許二十二個人進入巨石陣的神聖中心，其他的成員只好站在圍繩外面與五次元的靈性覺醒中心接通。他們圍成一個圈，黛安娜刻意地背著曙光，好讓他們看到在地平線上滑行的太陽。


    他們創造了一個升降梯，一起搭著升降梯參觀巨石陣上方的第七次元密室。接著，又前往沃斯洛尊主的第九次元的乙太靜修處，看到祂洋溢著喜悦等待他們的光臨。這種情況發生時，太陽一定升起了，因為黛安娜能感覺一股不尋常的太陽黃光照著她的背部和內在之眼，彷彿太陽正用它不尋常的陽光黃擁抱她似地。這是一種只能意會，無法言傳的感覺。


    沃斯洛尊主、大天使麥達昶、烏列爾與這個小組合作，直到黛安娜能感覺黃光在她的周圍閃爍為止。當第九次元的能量湧入時，金光立刻瀰漫了整個宇宙，把每一個恆星、行星、星系和神聖的能量，連結到一個由第九次元幾何線編織成的神聖恩典網路上。這個小組要幫助這個宇宙創造新的光能網格。


    你也可以透過下面的觀想這麼做。


    ### 觀想：拜訪沃斯洛尊主的靜修處


    1. 準備一個能讓你放輕鬆、不受干擾的空間。

    2. 安靜地坐著，舒服地呼吸，懷著要拜訪沃斯洛尊主在巨石陣上空靜修處的意圖。

    3. 專注在你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。

    5. 點一支蠟燭，獻給為沃斯洛尊主服務，傳播宇宙陽光與和諧的自己。

    6. 觀想自己在巨石陣古老又神聖的石頭裡面。如果你無法想像那個畫面，那就要求讓自己進入裡面。

    7. 你正站在光能驅動的巨大升降梯中央。金色天使包圍的升降梯，載著你穿越次元，進入第七次元的諧波領域。

    8. 你透過一個鑽石天使的門戶，看到地球上的人事物和生命。你用天使般的眼光看到這一切都是靈魂簽訂的協議。每一個情境都是參與者的完美功課。

    9. 升降梯帶你到沃斯洛尊主在第九次元的乙太靜修處。

    10. 你走下電梯，那個偉大的大師正散發喜悅的光芒等著你。你彷彿沐浴在太陽最柔和、最燦爛的光照下。

    11. 閃爍著金橘色光芒的大天使麥達昶站在祂身邊。

    12. 祂們一起把一個光球放進你的太陽神經叢。光球形成一個第九次元的瞬間太陽。

    13. 看著或感知太陽球瞬間擴張到你氣場的遠方，形成一個環繞著你的第九次元光球。

    14. 它吞噬了你四身系統裡所有的低能量。

    15. 接著，再把它們收縮起來，直到那些低能量變成太陽神經叢裡的一個小硬球為止。

    16. 大天使烏列爾出現，並走向前來。祂從你的太陽神經叢裡拉出一個小硬球，把它交給獨角獸。獨角獸把球拿走，並轉化它。

    17. 當你的氣場再度擴張時，沃斯洛尊主用祂閃爍的黃光把它充滿。你現在也許能想像這一生最崇高的願景，並把它保留在顯化的光能裡。

    18. 第九次元的能量現在被吸進來了。天狼星的基督金光、昴宿星團的藍玫瑰、基督聖雄、宇宙鑽石的紫色火焰、白色的揚昇火焰、宇宙之心的白光和蓋婭母神的愛，全部都湧進你的氣場裡。

    19. 金黃色的光流從你的身上射出，通過第九次元幾何線的神聖網絡，把每一個恆星、行星、星系和神聖的能量連結起來。你正在幫助宇宙創建新的光能網格。

    20. 回到光的升降梯，向沃斯洛尊主和大天使麥達昶致謝。


    ## 第三十四章 聖哲曼和梅林


    聖哲曼（St. Germain）是最傑出的揚昇大師之一。祂起源於土星的揚昇面向奎夏（Qrisha）。祂啟明的靈魂就在這裡接受高層的啟蒙。這使祂能帶來地球和其他訓練設施所需要的靈性修練。在我們第五次元海底輪裡編碼的靈性修煉之道，讓祂發展出成為魔術師、鍊金術士和永生存在的力量。當我們進入第五次元的脈輪時，就會接受與聖哲曼類似的課程，以便磨練我們成為大師所需要的靈性修練。


    聖哲曼經歷過一段非凡的靈魂之旅。身為一個揚昇大師，祂化身過的肉體幾乎多於任何一個大師。祂也獲得了不朽的永生。祂在每一個化身的二十九歲那年，都接受過挑戰性的啟蒙，以證明自己具有做為一個領袖的能力。


    作為歐洲貴族聖多美的聖哲曼（Domete de St. Germain）的祂，是鍊金術士和魔術師。祂在世的三百年，都在幕後從事為世界服務的工作。


    祂作為亞瑟王宮廷的梅林那一世，被奉為聖者和自然秩序的男巫。祂有指揮精靈的力量，也每天跟祂們合作。當阿瓦隆（Avallon）的祕密需要保護時，祂就會揚起濃霧，讓這個祕密消失，以免被人發現。祂還掌握了水域的指揮權，能在需要的時候提高湖泊河川的水位。祂在那一世的化身後期，定居在英國康沃爾郡的廷塔傑爾，把祂的能量與海洋之神連結在一起。祂在這裡從事高級鍊金術的研究，把基督之光送進地球的水域和包圍那個地區的麥可能量線（Michael
    ley lines）。


    祂去過威爾斯，賜福巨石陣的石頭，讓它們充滿神奇的振波，以支撐雙向次元的入口。祂對鍊金術的掌握，讓祂能降低石頭的重量，以便輕鬆地運送到巨石陣的現場。後來，在一次德魯伊（druidic）的滿月祭典裡，祂把巨石陣架構成能駕馭宇宙振波進入第七次元的入口。


    為了護持自然法則，聖哲曼曾多次化身為德魯伊人和異教徒。祂定居在英國的康沃爾郡或南海岸，以保存能量線的能量。


    作為一個兩千年前的德魯伊人，祂扮演了非常重要的角色。祂的能量使以利馬太（Arimathea）的耶穌、托特和約瑟夫，在訪問英國的格拉斯頓伯里（Glastonbury）時創造的光波回流到能量線裡。聖哲曼為此舉行了一場威力強大的儀典，召喚整個精靈王國的力量前來加持。


    在前一個埃及的約瑟夫化身時，祂經歷過不可思議的艱苦，因而使祂超越了自己的感情。祂的雙重定位能力，使自己的靈魂脫離肉身的監禁，自由自在地遊走。祂的肢體能力使祂得以解脫，成為法老王強大、明智的顧問。


    祂還化身為創立玫瑰十字會（Rosicrucians）和白色兄弟會（White Brotherhood）的先知撒母耳（Samuel）。


    此外，聖哲曼也為了幫助我們努力精進祂的內在層面。祂活在肉身裡的時候，靈體一直在星際議會中任職。祂經常會在我們有問題要提交議會時跟我們聯絡。祂可以持續地取得地球靈性發展的現況，密切地與我們的揚昇過程合作。


    多年以來，祂一直是儀軌、魔法和祭典紫射線第七道射線的大師。祂把轉型的紫色火焰帶給人類，並與紫色火焰的大天使薩基爾密切合作。


    祂現在的職務是宇宙最高的文明尊主。


    祂也是土星的九位大師之一。這九個負責管理土星的靈魂，正在錨定宇宙裡的靈性修煉能量。靈性修煉是至樂的基礎。當你與聖哲曼合作時，祂會幫你把第五次元的海底輪錨定在土星裡，讓你取得高層的精通、完全的信心和至樂。


    靈性修煉是亞特蘭提斯男女大祭司發展出來的。他們知道這是開悟和啟明精通的基礎。靈性修煉使他們能夠掌握所有身心控制的面向。今天的瑜伽士仍在修煉其中的部分形式。


    聖哲曼的乙太靜修處位於美國加州北部的沙斯塔山（Mount Shasta）。在這個美麗的地方，你可以更輕易地進入祂令人敬畏的紫色光能裡。


    ### 觀想：為了地球的至善與聖哲曼合作


    1. 做好冥想的準備。你可以選擇點一支蠟燭，把它獻給聖哲曼。

    2. 呼喚祂來加入你，讓你沐浴在紫色的火焰裡。

    3. 放輕鬆，紫色火焰會轉化你的四身系統，讓你發光，並讓你保持在第五次元裡。聖哲曼的臨在既溫和又威力十足。感知從祂身上散發出來的精神紀律。

    4. 祂請你陪祂去沙斯塔山的靜修處。這是一個在山嶺上空第七次元的乙太靜修處，裡面充滿了純紫色的光。

    5. 當你進入這個能量時，就能看到自己的揚昇脈輪變得完全純淨。

    6. 聖哲曼詢問你的揚昇過程，是否有需要幫助的地方。你告訴祂旅程的種種，祂聽你講話。

    7. 你講完的時候，祂告訴你現在有一個加速揚昇之道的機會。祂邀請你入睡後，跟祂一起起去土星的靈性修煉廳。

    8. 你感謝祂提供這個由土星大師教學的絕佳機會。從這一刻開始，你會與祂一起訓練，以擁抱你的靈性之路。這一項了不起的榮譽，會讓你以極快的速度前進。

    9. 聖哲曼現在邀請你把紫色火焰發送到你想祝福的任何地方。

    10. 你看著紫色的光波離開沙斯塔山，用它的恩典和轉化沖刷著地球。觀想第五次元裡的所有事物，並用那裡最高頻率的光祝福地球。

    11. 感謝聖哲曼，返回你的神聖空間。

    12. 睜開眼睛，知道你正在接受訓練，要成為一位充滿信心和至樂的土星大師。


    ## 第三十五章 耶穌——宇宙之愛的使者


    自從亞特蘭提斯沉沒以後，人類開始探索自由意志，因而失去了與靈魂與真正使命之間的連結。星際議會邀請一位偉大的大師，把宇宙之愛帶回地球，以提高所有人的頻率。這是迄今為止最具挑戰性的一項任務。


    為了這一項龐大的挑戰和驚人的使命而選擇好的偉大啟蒙者，在祂許多化身時準備好了。祂來自金星，沒有任何需要消除的業力。祂曾經化身為亞當、以諾、耶書亞、約書亞和以利亞。祂也曾化身為教導神聖法則的大師提亞納的阿波羅尼烏斯（Apollonius
    of Tyana）。在這些累世的化身中，祂的靈魂能量只有一部分來過地球。然而，祂卻在化身為耶穌的那一生，把整個靈魂能量帶到地球上。


    星際議會和大白兄弟會為耶穌的化身做了非常細心的準備。馬利亞是議會為耶穌挑選的母親。由於她太純潔，以至於在四歲以前，父母不准她接觸地面，不是有人抱，就是站在一塊鋪在地上的白布上。這些都象徵了她的純潔無瑕，她的一生都是為了生養耶穌這個偉大的靈性任務做準備。她和耶穌的父親約瑟夫都是純粹的本體（Essences）。他們每天都要做好幾小時的靈修和深奧的技術。這賦予了他們巨大的力量，使他們能進入宇宙的聖奧秘中，包括處女生子在內。


    耶穌誕生前，技藝精湛的星象家透過星象的計算，精確地指出祂的出生地，讓智者艾爾·莫里亞（El Morya）、迪瓦爾·庫爾（Diwal Khul）和庫圖彌尊主（能夠順利地找到祂。注意那些啟明的存在如何向耶穌致敬，又如何支持祂。看看你生命中的那些人，你會詫異於祂們真實的身分嗎？


    祂誕生於四月，聖誕卡上那一隻春季的小羊羔就是祂的象徵。第五世紀以前，教父們經過多年的討論才頒布敕令，正式把祂的生日公定為十二月二十五日。這是一個具有神祕意義的日期。在十二月二十一日冬至以前，基督之光和源頭之愛便開始滲入地球。十二月二十四日午夜發生的一場宇宙變化，使神聖之光沖入地球的速度加快，讓我們在十二月二十五日沐浴在光裡。由於這個改變，印度、中國、埃及和墨西哥等古文明，都把這一天當做宗教節日來慶祝。據說，愛希斯（Isis）、歐西里斯（Osiris）、荷魯斯（Horus）、巴克斯（Bacchus）、阿多尼斯（Adonis）、赫丘利斯（Hercules）以及許多偉大的大師，都是在那個時間出生的。


    正如祂父母奉獻一生為祂的出生做準備，耶穌的一生也奉獻在為自己的使命做準備。祂的教育很嚴格，做過縝密的計劃，成年以後的遊歷也是如此。


    祂用了三年的時間傳播無條件之愛的基督之光，獲得了光榮的成功。當祂準備要接受宇宙基督的能量時，彌勒尊主與祂的內在配合，讓祂成為麥基洗德教士團（Order of
    Melchizedek）的大祭司。


    祂是最受愛戴的啟明大師，祂的內在層面被稱為薩南達（Sananda），同時也是祂的高我振波。祂的雙生火焰是娜達女士（Lady Nada）。


    耶穌的使命是再次提升地球上的光能層面，讓靈魂能散發更大的潛能。祂的化身受到極大的挑戰，但祂終於克服萬難達成了目標。


    祂在埃及去世後幾年，祂的教誨和開放的心胸被記錄在歷史中。祂打開並錨定了通往宇宙之心的巨大入口，讓光能再度沖刷我們的地球。在過去的兩年裡，這個光能強化了我們揚昇過程的準備工作。


    耶穌與地球的靈魂一起工作時，傳授了開明之心的愛和謙卑，數以百萬計的天使湧入地球，展開他們的工作。這整個計劃都是在為第五次元星球和新黃金時代鋪路。


    在耶穌四十多歲時，曾前往地球的心輪，就是現在被稱為格拉斯頓伯里（Glastonbury）的地方。祂與妻子抹大拉的馬利亞（Mary Magdalene）和揚昇大師托特離開埃及，在英格蘭的海岸遇見梅林。他們結伴前往阿瓦隆，把自己的光能與阿里瑪西亞的約瑟夫（Joseph
    of Arimathca）的光結合，改變了地球能量歷史路線的任務。


    地球心輪圍繞著許多稱為龍脈（dragon lines）或能量線（ley lines）的純金光複雜能量路徑。能量線遍布整個地球，可以說是蓋婭的神經通路。最初的能量線系統是托特在亞特蘭提斯化身之初親自建立的。隨著人類在亞特蘭提斯沉沒後的迷失，能量線開始斷裂、暗淡。耶穌被派去協助能量線的修復。


    祂到達阿瓦隆時，冬天已經籠罩了英格蘭，天氣非常惡劣。祂把馬利亞留在格拉斯頓伯里鎮。耶穌、托特和梅林在暴風雪中，掙扎著爬到托爾山頂。強風好幾次把祂們吹到陡峭的山坡下。


    托爾山頂有一堆岩石。耶穌、托特和梅林把它們重新排列成神聖的幾何圖案，其中還點綴著特別賜福過的水晶。接著，祂們開始冥想，把結合的能量傾注到地球的心輪裡，開始修復大地的神聖幾何形狀。


    托特召喚土龍前來，要求祂們把基督之光帶到地球各地。土龍按照祂的要求完成了任務。


    梅林呼喚第九次元的自然大師潘，以及風、火和水的大師多姆（Dom）、索爾（Thor）和波賽頓（Poseidon），要求祂們照亮格拉斯頓伯里托與金星的連結，並通過精靈傳播愛。


    後來，在托爾山腳懷特阿平（White Aping）舉行的儀式上，耶穌和抹大拉的馬利亞利用祂們愛與神聖的結合，把神聖的陰陽光能錨定在這個願景裡。


    阿里瑪西亞的約瑟夫前往周圍的地區，利用祂神聖的知識，連結了基督之光與其他的地点。


    這一切工作都是為了今天，為了奠定兩千多年後第五次元光能回來的道路。


    一九八七年的諧波匯聚發生時，地面做好了接受光能的準備。這要歸功於這些警覺的靈魂勤奮的工作。祂們在這一次旅行後分道揚鑣，各自回到自己的日常生活裡。


    耶穌的工作繼續在內層進行。祂現在是第八射線的因果尊主，最近又擔任了宇宙之愛的使者，負責把愛傳播到地球的各個角落。


    當光的脈衝離開中央大太陽和宇宙之心時，人們就能在格拉斯頓伯里直接接收，並從這裡向地球各地傳送。正如人類的心輪是人最先覺醒的部分，行星的心輪也是如此。許多目前在揚昇過程工作的靈魂，已經把自己的愛和意圖傾注到這個區域，以便延續大師們的工作。


    地球周圍的光網現在又再度發光了。隨著地球頻率的急劇上升，住在這裡的靈魂，正努力地配合地球的進度。土龍也繼續與精靈合作，幫助需要高層能量的湧入的地區。隨著更多人的心在甦醒，光的錨定和成長也變得更強大。隨著第五次元脈輪系統的甦醒，許多地球大師現在都憶起了自己的真實身分，以及他們擁有的神奇技能。


    許多人正在為提高地球的頻率做出貢獻，而且這個人數每天都在增加。


    ### 觀想：照亮地球


    1. 做好冥想的準備。

    2. 在家裡或室外的露天處，選擇一個神聖的地點。

    3. 右手握著水晶，要求它與宇宙之心連結。

    4. 感覺第九次元的光或揚昇的金星充滿了你的水晶。

    5. 讓這個光從你的水晶沿著手臂散播到整個身體。

    6. 看著並感覺你的脈輪發光。

    7. 當水晶充滿金色的光芒時，把它放在雙腳之間，讓它與你的地球之星脈輪連結。

    8. 看著你的地球之星開始發出明亮的液態銀光。

    9. 觀想水晶與地球之星融合並進入地球。

    10. 看著金銀色的光合流到你周圍的能量線。無論身在何處，你都會把它點得非常明亮。

    11. 呼喚偉大的巨龍，把這個光帶到最需要的地方。你心中甚至會有一個特定的地方。

    12. 看著你在世界各地川流不息的光，發出更強烈的光芒。

    13. 要求大天使聖德芬和麥達昶把天堂的高層錨定在地球裡。安靜地坐著，讓祂們執行這個行星任務。當你感覺到光已經錨定時，向祂們致謝。

    14. 你也向土龍致謝，做一次深呼吸。

    15. 準備就緒後，睜開眼睛，知道你已經完成了一項強有力的行星工作。


    ## 第三十六章 女神大師


    本章是為了男性和女性讀者而寫的。它的對象是所有會因為開發陰性精通而獲益的人。


    亞特蘭提斯沒落後的一萬年來，有一個信念一直在人們的集體無意識裡，認為男人不只強而有力，而且比女人優越。那些化身為女性的人，必須超越這個信念才能實現精通。


    這個信念在今天依然適用，但已不像以前那麼極端了。


    挪開集體無意識的障礙，從來都不是一件容易的事。但近年來，每一個人的觀點和期望都發生了巨大的變化。誰會想到人類能搭飛機飛行？或隨身攜帶自己的電話？或在任何地方，從微型的手提電腦上接收資訊？或用義肢到處奔跑？科技時代擴大了我們的信念範圍。當我們從擴展的角度看事物時，就會變得更加開悟。


    ### 馬利亞／愛希斯


    偉大的啟蒙者馬利亞（Mary）在某一次的化身時，以處女生子的方式生下耶穌；祂在愛希斯（Isis）的化身時，也以處女生子的方式生下荷魯斯。這是一個道德困境，因為當時的人還不了解處女生子的概念。只有達到第五次元啟明高層振波的人，才能理解這個概念。然後他就會知道每一個概念都有身體和靈性的部分。某些情況下，女性的參與者都處於非常純潔的高頻率，使他們的靈性超越了身體行為的侷限。然而，當馬利亞和愛希斯在靈魂的層面同意受孕耶穌和荷魯斯時，祂們對上帝旨意的臣服，敞開了世界大規模變革的大門。


    如果祂們的故事觸動了你，那就調整你的頻率，接通祂們的能量。這麼做會讓你取得靈性科技的出現會使人類以更快的速度覺醒。由於靈性科技仰賴新思想和新觀念的右腦概念，因此，女性就會脫穎而出。


    許多偉大的大師，尤其是女性，在面對人類的集體意識時，曾勇敢地堅守著自己的光明和正直。這把祂們推向極具挑戰性的啟蒙，並因此引發了地球的變革。祂們的勇氣和奉獻導致了人類屬性的發展，這些屬性極大程度地照亮了祂們的氣場。祂們所獲得的光能，幫助了所有渴望成為行止高人的人。'
  mdcn: '## 第三十三章 沃斯洛尊主


    ### 沃斯洛尊主的乙太靜修處


    麥達昶，現在正領導著一個由進化存在組成的團隊，在地球周圍創建第九次元的網格。當你與沃斯洛尊主合作時，祂也許會邀請你加入這個團隊。


    沃斯洛尊主的乙太靜修處位於巨石陣（Stonehenge）的上空。巨石陣是地球上最古老、最有威力的次元入口之一，也是世界上僅有的兩個雙向次元入口之一。它也是第九次元網格神聖幾何結構在地球上的錨點。它用很高的頻率連結著宇宙裡的所有錨點。


    數千年來，它一直處於關閉的狀態，目前仍然只有部分開啟而已。我們預計它會在二〇三二年完全開啟。然而，如果你在冥想或入睡時拜訪它，它就會帶你進入第七次元的光體。你會在這個層面上，透過天使般的眼睛看；換句話說，你會看到每一個人和情境的神聖完美。你會覺知隱藏在許多挑戰性環境背後的靈魂協議。你會看到和平、愛與和諧的光球，盤旋在世界所有社區的上空。你會用開悟的眼睛覺察，看到它在等待那些社區裡的人覺醒。看到他們用不同的眼睛看世界，進而能讓自己沐浴在發光的能量裡。


    黛安娜曾和黛安娜·庫柏基金會（Diana Cooper Foundation）的高頻率老師們一起拜訪沃斯洛尊主的靜修處，該次經驗非常美好。


    由於一次只允許二十二個人進入巨石陣的神聖中心，其他的成員只好站在圍繩外面與五次元的靈性覺醒中心接通。他們圍成一個圈，黛安娜刻意地背著曙光，好讓他們看到在地平線上滑行的太陽。


    他們創造了一個升降梯，一起搭著升降梯參觀巨石陣上方的第七次元密室。接著，又前往沃斯洛尊主的第九次元的乙太靜修處，看到祂洋溢著喜悦等待他們的光臨。這種情況發生時，太陽一定升起了，因為黛安娜能感覺一股不尋常的太陽黃光照著她的背部和內在之眼，彷彿太陽正用它不尋常的陽光黃擁抱她似地。這是一種只能意會，無法言傳的感覺。


    沃斯洛尊主、大天使麥達昶、烏列爾與這個小組合作，直到黛安娜能感覺黃光在她的周圍閃爍為止。當第九次元的能量湧入時，金光立刻瀰漫了整個宇宙，把每一個恆星、行星、星系和神聖的能量，連結到一個由第九次元幾何線編織成的神聖恩典網路上。這個小組要幫助這個宇宙創造新的光能網格。


    你也可以透過下面的觀想這麼做。


    ### 觀想：拜訪沃斯洛尊主的靜修處


    1. 準備一個能讓你放輕鬆、不受干擾的空間。

    2. 安靜地坐著，舒服地呼吸，懷著要拜訪沃斯洛尊主在巨石陣上空靜修處的意圖。

    3. 專注在你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。

    5. 點一支蠟燭，獻給為沃斯洛尊主服務，傳播宇宙陽光與和諧的自己。

    6. 觀想自己在巨石陣古老又神聖的石頭裡面。如果你無法想像那個畫面，那就要求讓自己進入裡面。

    7. 你正站在光能驅動的巨大升降梯中央。金色天使包圍的升降梯，載著你穿越次元，進入第七次元的諧波領域。

    8. 你透過一個鑽石天使的門戶，看到地球上的人事物和生命。你用天使般的眼光看到這一切都是靈魂簽訂的協議。每一個情境都是參與者的完美功課。

    9. 升降梯帶你到沃斯洛尊主在第九次元的乙太靜修處。

    10. 你走下電梯，那個偉大的大師正散發喜悅的光芒等著你。你彷彿沐浴在太陽最柔和、最燦爛的光照下。

    11. 閃爍著金橘色光芒的大天使麥達昶站在祂身邊。

    12. 祂們一起把一個光球放進你的太陽神經叢。光球形成一個第九次元的瞬間太陽。

    13. 看著或感知太陽球瞬間擴張到你氣場的遠方，形成一個環繞著你的第九次元光球。

    14. 它吞噬了你四身系統裡所有的低能量。

    15. 接著，再把它們收縮起來，直到那些低能量變成太陽神經叢裡的一個小硬球為止。

    16. 大天使烏列爾出現，並走向前來。祂從你的太陽神經叢裡拉出一個小硬球，把它交給獨角獸。獨角獸把球拿走，並轉化它。

    17. 當你的氣場再度擴張時，沃斯洛尊主用祂閃爍的黃光把它充滿。你現在也許能想像這一生最崇高的願景，並把它保留在顯化的光能裡。

    18. 第九次元的能量現在被吸進來了。天狼星的基督金光、昴宿星團的藍玫瑰、基督聖雄、宇宙鑽石的紫色火焰、白色的揚昇火焰、宇宙之心的白光和蓋婭母神的愛，全部都湧進你的氣場裡。

    19. 金黃色的光流從你的身上射出，通過第九次元幾何線的神聖網絡，把每一個恆星、行星、星系和神聖的能量連結起來。你正在幫助宇宙創建新的光能網格。

    20. 回到光的升降梯，向沃斯洛尊主和大天使麥達昶致謝。


    ## 第三十四章 聖哲曼和梅林


    聖哲曼（St. Germain）是最傑出的揚昇大師之一。祂起源於土星的揚昇面向奎夏（Qrisha）。祂啟明的靈魂就在這裡接受高層的啟蒙。這使祂能帶來地球和其他訓練設施所需要的靈性修練。在我們第五次元海底輪裡編碼的靈性修煉之道，讓祂發展出成為魔術師、鍊金術士和永生存在的力量。當我們進入第五次元的脈輪時，就會接受與聖哲曼類似的課程，以便磨練我們成為大師所需要的靈性修練。


    聖哲曼經歷過一段非凡的靈魂之旅。身為一個揚昇大師，祂化身過的肉體幾乎多於任何一個大師。祂也獲得了不朽的永生。祂在每一個化身的二十九歲那年，都接受過挑戰性的啟蒙，以證明自己具有做為一個領袖的能力。


    作為歐洲貴族聖多美的聖哲曼（Domete de St. Germain）的祂，是鍊金術士和魔術師。祂在世的三百年，都在幕後從事為世界服務的工作。


    祂作為亞瑟王宮廷的梅林那一世，被奉為聖者和自然秩序的男巫。祂有指揮精靈的力量，也每天跟祂們合作。當阿瓦隆（Avallon）的祕密需要保護時，祂就會揚起濃霧，讓這個祕密消失，以免被人發現。祂還掌握了水域的指揮權，能在需要的時候提高湖泊河川的水位。祂在那一世的化身後期，定居在英國康沃爾郡的廷塔傑爾，把祂的能量與海洋之神連結在一起。祂在這裡從事高級鍊金術的研究，把基督之光送進地球的水域和包圍那個地區的麥可能量線（Michael
    ley lines）。


    祂去過威爾斯，賜福巨石陣的石頭，讓它們充滿神奇的振波，以支撐雙向次元的入口。祂對鍊金術的掌握，讓祂能降低石頭的重量，以便輕鬆地運送到巨石陣的現場。後來，在一次德魯伊（druidic）的滿月祭典裡，祂把巨石陣架構成能駕馭宇宙振波進入第七次元的入口。


    為了護持自然法則，聖哲曼曾多次化身為德魯伊人和異教徒。祂定居在英國的康沃爾郡或南海岸，以保存能量線的能量。


    作為一個兩千年前的德魯伊人，祂扮演了非常重要的角色。祂的能量使以利馬太（Arimathea）的耶穌、托特和約瑟夫，在訪問英國的格拉斯頓伯里（Glastonbury）時創造的光波回流到能量線裡。聖哲曼為此舉行了一場威力強大的儀典，召喚整個精靈王國的力量前來加持。


    在前一個埃及的約瑟夫化身時，祂經歷過不可思議的艱苦，因而使祂超越了自己的感情。祂的雙重定位能力，使自己的靈魂脫離肉身的監禁，自由自在地遊走。祂的肢體能力使祂得以解脫，成為法老王強大、明智的顧問。


    祂還化身為創立玫瑰十字會（Rosicrucians）和白色兄弟會（White Brotherhood）的先知撒母耳（Samuel）。


    此外，聖哲曼也為了幫助我們努力精進祂的內在層面。祂活在肉身裡的時候，靈體一直在星際議會中任職。祂經常會在我們有問題要提交議會時跟我們聯絡。祂可以持續地取得地球靈性發展的現況，密切地與我們的揚昇過程合作。


    多年以來，祂一直是儀軌、魔法和祭典紫射線第七道射線的大師。祂把轉型的紫色火焰帶給人類，並與紫色火焰的大天使薩基爾密切合作。


    祂現在的職務是宇宙最高的文明尊主。


    祂也是土星的九位大師之一。這九個負責管理土星的靈魂，正在錨定宇宙裡的靈性修煉能量。靈性修煉是至樂的基礎。當你與聖哲曼合作時，祂會幫你把第五次元的海底輪錨定在土星裡，讓你取得高層的精通、完全的信心和至樂。


    靈性修煉是亞特蘭提斯男女大祭司發展出來的。他們知道這是開悟和啟明精通的基礎。靈性修煉使他們能夠掌握所有身心控制的面向。今天的瑜伽士仍在修煉其中的部分形式。


    聖哲曼的乙太靜修處位於美國加州北部的沙斯塔山（Mount Shasta）。在這個美麗的地方，你可以更輕易地進入祂令人敬畏的紫色光能裡。


    ### 觀想：為了地球的至善與聖哲曼合作


    1. 做好冥想的準備。你可以選擇點一支蠟燭，把它獻給聖哲曼。

    2. 呼喚祂來加入你，讓你沐浴在紫色的火焰裡。

    3. 放輕鬆，紫色火焰會轉化你的四身系統，讓你發光，並讓你保持在第五次元裡。聖哲曼的臨在既溫和又威力十足。感知從祂身上散發出來的精神紀律。

    4. 祂請你陪祂去沙斯塔山的靜修處。這是一個在山嶺上空第七次元的乙太靜修處，裡面充滿了純紫色的光。

    5. 當你進入這個能量時，就能看到自己的揚昇脈輪變得完全純淨。

    6. 聖哲曼詢問你的揚昇過程，是否有需要幫助的地方。你告訴祂旅程的種種，祂聽你講話。

    7. 你講完的時候，祂告訴你現在有一個加速揚昇之道的機會。祂邀請你入睡後，跟祂一起起去土星的靈性修煉廳。

    8. 你感謝祂提供這個由土星大師教學的絕佳機會。從這一刻開始，你會與祂一起訓練，以擁抱你的靈性之路。這一項了不起的榮譽，會讓你以極快的速度前進。

    9. 聖哲曼現在邀請你把紫色火焰發送到你想祝福的任何地方。

    10. 你看著紫色的光波離開沙斯塔山，用它的恩典和轉化沖刷著地球。觀想第五次元裡的所有事物，並用那裡最高頻率的光祝福地球。

    11. 感謝聖哲曼，返回你的神聖空間。

    12. 睜開眼睛，知道你正在接受訓練，要成為一位充滿信心和至樂的土星大師。


    ## 第三十五章 耶穌——宇宙之愛的使者


    自從亞特蘭提斯沉沒以後，人類開始探索自由意志，因而失去了與靈魂與真正使命之間的連結。星際議會邀請一位偉大的大師，把宇宙之愛帶回地球，以提高所有人的頻率。這是迄今為止最具挑戰性的一項任務。


    為了這一項龐大的挑戰和驚人的使命而選擇好的偉大啟蒙者，在祂許多化身時準備好了。祂來自金星，沒有任何需要消除的業力。祂曾經化身為亞當、以諾、耶書亞、約書亞和以利亞。祂也曾化身為教導神聖法則的大師提亞納的阿波羅尼烏斯（Apollonius
    of Tyana）。在這些累世的化身中，祂的靈魂能量只有一部分來過地球。然而，祂卻在化身為耶穌的那一生，把整個靈魂能量帶到地球上。


    星際議會和大白兄弟會為耶穌的化身做了非常細心的準備。馬利亞是議會為耶穌挑選的母親。由於她太純潔，以至於在四歲以前，父母不准她接觸地面，不是有人抱，就是站在一塊鋪在地上的白布上。這些都象徵了她的純潔無瑕，她的一生都是為了生養耶穌這個偉大的靈性任務做準備。她和耶穌的父親約瑟夫都是純粹的本體（Essences）。他們每天都要做好幾小時的靈修和深奧的技術。這賦予了他們巨大的力量，使他們能進入宇宙的聖奧秘中，包括處女生子在內。


    耶穌誕生前，技藝精湛的星象家透過星象的計算，精確地指出祂的出生地，讓智者艾爾·莫里亞（El Morya）、迪瓦爾·庫爾（Diwal Khul）和庫圖彌尊主（能夠順利地找到祂。注意那些啟明的存在如何向耶穌致敬，又如何支持祂。看看你生命中的那些人，你會詫異於祂們真實的身分嗎？


    祂誕生於四月，聖誕卡上那一隻春季的小羊羔就是祂的象徵。第五世紀以前，教父們經過多年的討論才頒布敕令，正式把祂的生日公定為十二月二十五日。這是一個具有神祕意義的日期。在十二月二十一日冬至以前，基督之光和源頭之愛便開始滲入地球。十二月二十四日午夜發生的一場宇宙變化，使神聖之光沖入地球的速度加快，讓我們在十二月二十五日沐浴在光裡。由於這個改變，印度、中國、埃及和墨西哥等古文明，都把這一天當做宗教節日來慶祝。據說，愛希斯（Isis）、歐西里斯（Osiris）、荷魯斯（Horus）、巴克斯（Bacchus）、阿多尼斯（Adonis）、赫丘利斯（Hercules）以及許多偉大的大師，都是在那個時間出生的。


    正如祂父母奉獻一生為祂的出生做準備，耶穌的一生也奉獻在為自己的使命做準備。祂的教育很嚴格，做過縝密的計劃，成年以後的遊歷也是如此。


    祂用了三年的時間傳播無條件之愛的基督之光，獲得了光榮的成功。當祂準備要接受宇宙基督的能量時，彌勒尊主與祂的內在配合，讓祂成為麥基洗德教士團（Order of
    Melchizedek）的大祭司。


    祂是最受愛戴的啟明大師，祂的內在層面被稱為薩南達（Sananda），同時也是祂的高我振波。祂的雙生火焰是娜達女士（Lady Nada）。


    耶穌的使命是再次提升地球上的光能層面，讓靈魂能散發更大的潛能。祂的化身受到極大的挑戰，但祂終於克服萬難達成了目標。


    祂在埃及去世後幾年，祂的教誨和開放的心胸被記錄在歷史中。祂打開並錨定了通往宇宙之心的巨大入口，讓光能再度沖刷我們的地球。在過去的兩年裡，這個光能強化了我們揚昇過程的準備工作。


    耶穌與地球的靈魂一起工作時，傳授了開明之心的愛和謙卑，數以百萬計的天使湧入地球，展開他們的工作。這整個計劃都是在為第五次元星球和新黃金時代鋪路。


    在耶穌四十多歲時，曾前往地球的心輪，就是現在被稱為格拉斯頓伯里（Glastonbury）的地方。祂與妻子抹大拉的馬利亞（Mary Magdalene）和揚昇大師托特離開埃及，在英格蘭的海岸遇見梅林。他們結伴前往阿瓦隆，把自己的光能與阿里瑪西亞的約瑟夫（Joseph
    of Arimathca）的光結合，改變了地球能量歷史路線的任務。


    地球心輪圍繞著許多稱為龍脈（dragon lines）或能量線（ley lines）的純金光複雜能量路徑。能量線遍布整個地球，可以說是蓋婭的神經通路。最初的能量線系統是托特在亞特蘭提斯化身之初親自建立的。隨著人類在亞特蘭提斯沉沒後的迷失，能量線開始斷裂、暗淡。耶穌被派去協助能量線的修復。


    祂到達阿瓦隆時，冬天已經籠罩了英格蘭，天氣非常惡劣。祂把馬利亞留在格拉斯頓伯里鎮。耶穌、托特和梅林在暴風雪中，掙扎著爬到托爾山頂。強風好幾次把祂們吹到陡峭的山坡下。


    托爾山頂有一堆岩石。耶穌、托特和梅林把它們重新排列成神聖的幾何圖案，其中還點綴著特別賜福過的水晶。接著，祂們開始冥想，把結合的能量傾注到地球的心輪裡，開始修復大地的神聖幾何形狀。


    托特召喚土龍前來，要求祂們把基督之光帶到地球各地。土龍按照祂的要求完成了任務。


    梅林呼喚第九次元的自然大師潘，以及風、火和水的大師多姆（Dom）、索爾（Thor）和波賽頓（Poseidon），要求祂們照亮格拉斯頓伯里托與金星的連結，並通過精靈傳播愛。


    後來，在托爾山腳懷特阿平（White Aping）舉行的儀式上，耶穌和抹大拉的馬利亞利用祂們愛與神聖的結合，把神聖的陰陽光能錨定在這個願景裡。


    阿里瑪西亞的約瑟夫前往周圍的地區，利用祂神聖的知識，連結了基督之光與其他的地点。


    這一切工作都是為了今天，為了奠定兩千多年後第五次元光能回來的道路。


    一九八七年的諧波匯聚發生時，地面做好了接受光能的準備。這要歸功於這些警覺的靈魂勤奮的工作。祂們在這一次旅行後分道揚鑣，各自回到自己的日常生活裡。


    耶穌的工作繼續在內層進行。祂現在是第八射線的因果尊主，最近又擔任了宇宙之愛的使者，負責把愛傳播到地球的各個角落。


    當光的脈衝離開中央大太陽和宇宙之心時，人們就能在格拉斯頓伯里直接接收，並從這裡向地球各地傳送。正如人類的心輪是人最先覺醒的部分，行星的心輪也是如此。許多目前在揚昇過程工作的靈魂，已經把自己的愛和意圖傾注到這個區域，以便延續大師們的工作。


    地球周圍的光網現在又再度發光了。隨著地球頻率的急劇上升，住在這裡的靈魂，正努力地配合地球的進度。土龍也繼續與精靈合作，幫助需要高層能量的湧入的地區。隨著更多人的心在甦醒，光的錨定和成長也變得更強大。隨著第五次元脈輪系統的甦醒，許多地球大師現在都憶起了自己的真實身分，以及他們擁有的神奇技能。


    許多人正在為提高地球的頻率做出貢獻，而且這個人數每天都在增加。


    ### 觀想：照亮地球


    1. 做好冥想的準備。

    2. 在家裡或室外的露天處，選擇一個神聖的地點。

    3. 右手握著水晶，要求它與宇宙之心連結。

    4. 感覺第九次元的光或揚昇的金星充滿了你的水晶。

    5. 讓這個光從你的水晶沿著手臂散播到整個身體。

    6. 看著並感覺你的脈輪發光。

    7. 當水晶充滿金色的光芒時，把它放在雙腳之間，讓它與你的地球之星脈輪連結。

    8. 看著你的地球之星開始發出明亮的液態銀光。

    9. 觀想水晶與地球之星融合並進入地球。

    10. 看著金銀色的光合流到你周圍的能量線。無論身在何處，你都會把它點得非常明亮。

    11. 呼喚偉大的巨龍，把這個光帶到最需要的地方。你心中甚至會有一個特定的地方。

    12. 看著你在世界各地川流不息的光，發出更強烈的光芒。

    13. 要求大天使聖德芬和麥達昶把天堂的高層錨定在地球裡。安靜地坐著，讓祂們執行這個行星任務。當你感覺到光已經錨定時，向祂們致謝。

    14. 你也向土龍致謝，做一次深呼吸。

    15. 準備就緒後，睜開眼睛，知道你已經完成了一項強有力的行星工作。


    ## 第三十六章 女神大師


    本章是為了男性和女性讀者而寫的。它的對象是所有會因為開發陰性精通而獲益的人。


    亞特蘭提斯沒落後的一萬年來，有一個信念一直在人們的集體無意識裡，認為男人不只強而有力，而且比女人優越。那些化身為女性的人，必須超越這個信念才能實現精通。


    這個信念在今天依然適用，但已不像以前那麼極端了。


    挪開集體無意識的障礙，從來都不是一件容易的事。但近年來，每一個人的觀點和期望都發生了巨大的變化。誰會想到人類能搭飛機飛行？或隨身攜帶自己的電話？或在任何地方，從微型的手提電腦上接收資訊？或用義肢到處奔跑？科技時代擴大了我們的信念範圍。當我們從擴展的角度看事物時，就會變得更加開悟。


    ### 馬利亞／愛希斯


    偉大的啟蒙者馬利亞（Mary）在某一次的化身時，以處女生子的方式生下耶穌；祂在愛希斯（Isis）的化身時，也以處女生子的方式生下荷魯斯。這是一個道德困境，因為當時的人還不了解處女生子的概念。只有達到第五次元啟明高層振波的人，才能理解這個概念。然後他就會知道每一個概念都有身體和靈性的部分。某些情況下，女性的參與者都處於非常純潔的高頻率，使他們的靈性超越了身體行為的侷限。然而，當馬利亞和愛希斯在靈魂的層面同意受孕耶穌和荷魯斯時，祂們對上帝旨意的臣服，敞開了世界大規模變革的大門。


    如果祂們的故事觸動了你，那就調整你的頻率，接通祂們的能量。這麼做會讓你取得靈性科技的出現會使人類以更快的速度覺醒。由於靈性科技仰賴新思想和新觀念的右腦概念，因此，女性就會脫穎而出。


    許多偉大的大師，尤其是女性，在面對人類的集體意識時，曾勇敢地堅守著自己的光明和正直。這把祂們推向極具挑戰性的啟蒙，並因此引發了地球的變革。祂們的勇氣和奉獻導致了人類屬性的發展，這些屬性極大程度地照亮了祂們的氣場。祂們所獲得的光能，幫助了所有渴望成為行止高人的人。'
