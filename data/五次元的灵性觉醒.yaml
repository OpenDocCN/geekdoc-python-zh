    # 第三十四章 聖哲曼和梅林


    在前一個埃及的約瑟夫化身時，祂經歷過不可思議的艱苦，因而使祂超越了自己的感情。祂的雙重定位能力，使自己的靈魂脫離肉身的監禁，自由自在地遊走。祂的肢體能力使祂得以解脫，成為法老王強大、明智的顧問。


    祂還化身為創立玫瑰十字會（Rosicrucians）和白色兄弟會（White Brotherhood）的先知撒母耳（Samuel）。


    此外，聖哲曼也為了幫助我們努力精進祂的內在層面。祂活在肉身裡的時候，靈體一直在星際議會中任職。祂經常會在我們有問題要提交議會時跟我們聯絡。祂可以持續地取得地球靈性發展的現況，密切地與我們的揚昇過程合作。


    多年以來，祂一直是儀軌、魔法和祭典紫射線第七道射線的大師。祂把轉型的紫色火焰帶給人類，並與紫色火焰的大天使薩基爾密切合作。


