    對那些準備錨定自己的人來說，大天使克里斯提爾這一時間滴灌到地球的微小能量，足以開啟他們的因果輪。二〇一五年以來，大天使克里斯提爾傾注到星系門戶的能量，能使地球七十多億的人錨定自己的因果輪。每一個因果輪錨定的靈魂，都能進入他們的十二脈輪柱。地球上的每一個人，現在都蓄勢待發，準備決定自己踏上黃金揚昇之道的旅途。


    陰陽能量經過一萬年的平衡，在許多個人和社會結構中掀起了變化。由於本心運作的靈魂越來越多，因而建立了愛、合作與關懷的新五次元示範模型。我們會看到所有為地球和人類服務的結構正在快速成長。這會使靈魂的滿足和快樂得以順利地傳播。


    當天琴座的基督之門開啟時，許多求道者發現幻相的第五層遮幕會在瞬間消失。這一層粉紅紅色的遮幕與心輪密切連結。遮幕會在我們的心準備擁抱無條件之愛時消散。它帶來深層的寬恕，並允許我們從更高的角度看情境與人。遮幕消散後，我們就可以進入能讓我們在揚昇過程中受益的前世。它也會開啟我們與靈魂家族的連結，並把他們吸引到我們的身邊。


    對某些個體來說，這是一個非常微妙的轉換。有的人會面臨挑戰，因為一切都會在一個更高的頻率上進行調整和重組。這種情況之所以會發生，是因為當星系門戶為了加速人類的揚昇而開啟時，成千上萬的獨角獸會從第九次元的星系門戶發出純白色的光。


    獨角獸在第七和第九次元之間發出振波。一九八七年的諧波匯聚時，人們的揚昇之光就開始發射。第七次元的獨角獸看到這個情形，藉機穿過天琴座通道中的一條裂縫。接著，祂們就開始幫助那些頭頂發出服務之光或心地純淨的人。


    天琴座的星系門戶在二〇一五年全面開啟時，第九次元的獨角獸藉此涌入，幫助那些敞開心輪的人。這種影響太過強大，以至於使另外百分之十的人類覺醒，並踏上他們的揚昇之路。這也把許多揚昇者從金色的揚昇之路，推向更高頻率的鑽石路徑，啟動了他們的鑽石光密碼，也增加了他們在多元宇宙裡的服務機會。


    一旦這百分之十的人類覺醒以後，地球的集體意識就會轉移到更高的八度階，從而引發更多的和平運動以及與動物界更親和的接觸。


    在天琴座星系門戶開啟的吉時，集體能量就會上升，使亞特蘭提斯第十三個紫水晶骷髏頭揭示靈性領域的知識。它會揭示來自冥界廳（Amenti）的古亞特蘭提斯人的智慧。這十三個水晶骷髏頭包含了亞特蘭提斯黃金紀元所有的古老智慧、科技和資訊。這種智慧將根據亞特蘭提斯人的原理重建我們的社會，但卻會在一個比新黃金紀元更高的頻率上進行。社會將會在合一法則的基礎上重建。


    二〇一五年九月，大量的水晶鑽石能量湧入，這意味著在地球上採取的所有行動，都會以即時業力（Instant Karma）的形式反映出來。這個情況適用於每一個人，並會迫使人們對自己的思想、言語和行為承擔責任。恩典、意圖、顯化、即時業力、責任和最後的無條件之愛，將成為建造新世界的基石。更多人會在這個巨大的轉捩點上覺醒。


    即時業力的返回意味著宇宙即將開始給予我們艱難之愛。因為所有被允許化身的人，必須擁有第七次元以上的靈魂。現在是這些靈魂憶起自己真實身分，並採取相應行動的時候。所有在舊典範中工作的人，都將與他們的真心連結，並看到自己的行為在日常生活中的反映。當這種情況發生時，他們就會覺醒，也會想改變。


    這意味著結構會從內部改變，以便與真心的頻率對位。其他人都會溫和地消退，讓位給更高的經濟倫理。


    當我們完全進入第五次元時，所有極端的選擇都將從我們身上撤退。愛與正直會成為前進的道路。鑽石之路上的靈魂已經覺醒，準備進行威力強大的工作。


    二〇一五年九月以後，又發生了一次巨大的調整，讓地球靈魂的光體整合更高的頻率。這掀起了一股地球與個人的淨化浪潮，把靈魂看待生命的方式引入一個全新的途徑。


    一萬年來，光之工作者第一次有機會獲得真心的指引。第五次元心的敞開和錨定，使真理和正直的能量得以發射。


    這標誌著一個新紀元的開始。舊有的方式被一個以真心為基礎的統一社會所取代。曾經在亞特蘭提斯充分活躍的臍輪，再次閃耀光芒，提供靈魂在所有次元間進行全光譜的連結。例如，地球人現在能與他們的靈魂群體連結，包括在宇宙另一邊的靈魂在內。以前的人會把時間、空間和距離視為無法克服的障礙。


    第五次元黃金紀元將迅速教導地球上的我們如何再度成為大師，如何駕馭宇宙能量，以及如何把光和愛帶給地球。


    ## 觀想：創造你美好的未來


    1. 準備在你的神聖空間裡冥想和放鬆。

    2. 把一個石英水晶放在第三眼上（任何透明的水晶都可以，例如：黃水晶或紫水晶）。

    3. 觀想自己穩健地踏在揚昇之路上，許多挑戰緊隨其後。

    4. 感覺光和能量沖刷你的十二個脈輪和光體。你看見天使和龍族團隊與你比翼飛翔。

    5. 想像你來到一堵空白的牆前面。牆腳有幾罐彩色的油漆。

    6. 在你的心眼中，隨心所欲地描繪一幅美麗的地球。你可以選擇在牆上畫任何一種情境。

    7. 盡可能將你所想的畫面精密、細膩的呈現出來。這是你的作品。

    8. 完成後，退後幾步，欣賞你的畫作。你創造了什麼？

    9. 當你感覺完美時，請你的天使和龍族給予祝福，並放大作品的能量。

    10. 看見自己走進畫裡，讓它成為你統一的實相。你知道思想只是尚未顯化的能量而已。

    11. 隨著創作的能量流動，感受其美妙之處。請你的水晶錄下心之眼看到的畫面，並把畫面擺在光下。

    12. 睜開眼睛，微笑。你正以高人的身分與神性共同創造。


    # 第三章 亞特蘭提斯的重建


    ## 神殿的創造


    當亞特蘭提斯展開最後的一個，也是第五個實驗時，志願服務者做的第一件事，就是建造一座實體的神殿來表達他們的感恩之情。這就是後來成為愛神阿芙蘿黛蒂（Aphrodite）與維納斯女神（Venus）監管的爱神殿。但在亞特蘭提斯人建立家園和部落前的一段時期，他們都舉行露天朝拜，向星空尋求光明和靈感。


    他們始終把與源頭保持連結和表達感恩視為第一優先順位。這就是他們保持清淨、開悟和精通，進而導致亞特蘭提斯黃金紀元的方式。由於那個紀元是我們黃金未來的模板，這一章就要介紹亞特蘭提斯人在第五次元生活的基礎。


    亞特蘭提斯文明與它所在的大陸歷經了四度的瓦解。然而，他們力量的來源，包含獅身人面像和大水晶的波賽頓神殿，卻得以倖存下來。但由於它們都建在亞特蘭提斯大陸的最高點因而遺世獨立，一般人無法通行。男女大祭司是唯一能進入這個聖地的人。他們能操縱地心引力，讓自已以懸浮或飛行的方式進入。他們從神殿裡傾注光、愛、啟明和實用的資訊給山下平原的志願服務者，讓他們能維持自己的高頻率。


    最後，人們得以在每一個社區中心建造奇妙、高頻的圓形寺殿，以反映波賽頓神殿發出的愛與光。每一座神殿都代表著亞特蘭提斯人生活的不同面向。這些神殿包括愛神殿、聲音神殿、療癒神殿、太陽神殿、月亮神殿、真理神殿、夜神殿、動物神殿、智慧與知識神殿、合一真光神殿、海神殿和自然神殿。其中有一些是用水晶建造的。他們會彼此分享資訊，幫助亞特蘭提斯人建立社區。


    每一座神殿都圍繞著清澈的流水，讓聖殿維持在高頻率上。每一座神殿都有其所屬的黑貓來保持它的能量，以協助水晶的校準和神聖的鍊金術。


    這個時代的亞特蘭提斯人已經認知到一切眾生都來自源頭，最終都要為自己內在的一切負責。這是當今的高人們正在吸收的理解。


    由於亞特蘭提斯人必須從開始學習所有的事物，他們發現了很多事物，也學會如何為了至善的目的而實踐這些知識。閱讀與每一座神殿有關的資訊，都會觸發你內在無意識的記憶和密碼，從而擴張你的個人之光。


    ## 愛神殿


    用玫瑰石英製造的愛神殿（The Temple of Love），可以直接接通宇宙之心的金星。從金星傳來的光流攜帶者基督意識的鑰匙和神聖的幾何密碼。凡是在這裡獻上感激的人都會沐浴在完美之愛裡。這會幫助他們的心輪對準基督之光和愛的揚昇頻率。


    這是由大祭司維納斯女神負責監管的。這個神殿裡的男女祭司建立了較高的心頻，也是在第五次實驗中最先揚昇的一批。維納斯女神後來化身為掌管愛神殿的大祭司。


    ## 聲音神殿


    男女大祭司透過聲音神殿（The Temple of Sound），把聲音的重要性教給早期的亞特蘭提斯人，讓他們知道聲音是建立和維持極高頻率的快速方法。聲音能改變固體的頻率，使固體成為有聲波共振的美麗物件。他們也把這個方法用在治療上。


    亞特蘭提斯人後來才明白，他們可以透過音波來操縱物質，並能借助心念的控制，使物體變輕或變重。他們使用這種技術建造了超出我們現有能力的先進建築。他們也能為了讓石頭沉入井裡而讓石頭變重。


    大量的靈性科技都來自這一座特別的神殿。如今，我們能透過水晶和聲音的療癒恢復這些技術，但其中大部分的技術仍然超出我們的理解範圍。


    ## 療癒神殿


    療癒神殿（Temple of Healing）是用融合了祖母綠的石英水晶製造的。如果有人的頻率嚴重偏離正確波段時，大天使拉斐爾（Archangel Raphael）就會用綠寶石放大祂的療癒之光幫他們治療。這麼做會把他們帶入神聖的完美之中。


    聲音神殿與療癒神殿彼此密切配合。這些神殿的男女祭司會協調工作，以產生強有力的療癒能量。他們的意圖始終都是為了讓人們與他們真正的神聖藍圖貼合無間。


    黃金紀元的高峰期沒有業力，偏離中心的人只要重新平衡就可以了。這是任何一位男女祭司都能輕易做到的事。


    太陽、月亮與治療者的意圖，會把能量加持給毫無瑕疵的水晶。再由治療者拍打充滿光能的水晶或發出嗡聲。水晶釋放的聲波就能讓患者的頻率完美回到正確的波段上。


    此外，昴宿星團（Pleiades）的存在也會把藍光和知識注入神殿的水晶裡，讓祭司釋放這些振波。它將帶來不可思議強大的諧波心靈療癒，使四身系統立刻平衡，並讓身體回到最精準完美的狀態。


    隨著亞特蘭提斯人能量的消散，業力便開始發揮作用，這時就需要更強的療癒能量了。療癒神殿裡所有的治療都是在恩典下進行的。恩典雖然能消除業力，但開悟的祭司想展示靈性法則，讓患者透過其他方式，經常是透過服務，消除疾病的業因。


    黃金紀元開始時，男女大祭司就把草藥的療效教給人們了。後來，負責療癒聖殿的祭司成為草藥煉金士以後，來自四面八方的求治者，都會前來從他們的專業中受益。他們了解每一種草藥會與身體的某一部位共振。一帖備製好的草藥裡，會含有那個器官的黃金藍圖。這個藍圖會覆蓋身體，使器官恢復原初的神聖完美狀態。


    這種療法既快速又輕易，因為患者只會有輕微的失衡而已。然而，由於現代人的業力已經根深蒂固，這種療法的運作速度也就變得越來越慢了。


    強大、神聖的幾何圖案也是用水晶製成的。躺在沙發上的患者，周圍鋪放需要由祭司的意圖啟動的網格。神殿裡的貓通常會監督這個過程。有時候，也會為了完美校準而移動水晶。在其他情況下，他會坐在患者身上，盡可能地把最高層次的光能吸進患者體內。


    亞特蘭提斯黃金紀元的巔峰期，治療師能運用高度先進的水晶科技，把患者安放在一個以水晶製成的繭中。接著，再把加持過的水放在患者身上，放大高頻的水晶效果。這種方法有即刻療癒的力量。


    這些水晶繭同時也是一個再生室，它能把高頻光注入細胞，延長希望在地球上服務者的壽命。


    ## 太陽神殿


    太陽神殿（The Temple of Sun）對亞特蘭提斯人非常重要。他們明白太陽是通往更高次元的門戶。它會讓部分受控制的光流進入我們已知的宇宙，並與地球整合。這是對進入驅動亞特蘭提斯大水晶之光的頌歌。


    太陽神殿是用非常清澈的石英、黃水晶和黃金混合物建造的。這有助於讓光的折射達到最大程度。太陽神殿還會教導亞特蘭提斯人使用水晶與含銅金屬駕馭陽光，並把陽光當做動力，分配到整個亞特蘭提斯大陸，為自己提供能量的方法。


    這一座神殿裡的男女大祭司，能直接連結大天使麥達昶（Archangel Metatron）的光和教誨。大天使麥達昶訓練大祭司雷（Ra），運用祂不可思議的知識，形成長達一千五百年的黃金紀元模板。


    太陽神殿也能直接接通宇宙其他太陽的光流和密碼。黃金紀元時期，這一座太陽神殿會接收大量傳送來的純淨光能。再把光能傳遞給其他人，幫助整個亞特蘭提斯快速建立宇宙的揚昇過程。這已經超越了第五次元揚昇的層次。這個次元裡的靈魂會轉移到自己的宇宙精通和周圍宇宙的精通裡。


    太陽神殿的教誨都保存在一個黃水晶的大師水晶骷髏頭裡。這個水晶骷髏頭的第三眼鑲了一個美麗的太陽石。只要利用大角星人（Arcturians）的知識，並將其運用在水晶的成形、熔化和雕刻上，就能達到這種難以置信的先進水晶科技。


    ## 月神殿


    只有最純淨的女祭司，才能進入這一座由大祭司愛希斯（Isis）建立的月神殿（The Temple of Moon）裡。用月長石建造的月亮神殿，是神聖陰性能量的中心。月神殿對維持陰陽能量的平衡至關重要。


    月神殿的女祭司，一生都奉獻在尊崇月球的週期以及月光的獲取和分配上。


    大天使克里斯提爾會協助能量的流動。當亞特蘭提斯部分地區的月光閃爍不定時，偉大的大天使克里斯提爾就會通報神殿，讓他們對整個大陸進行調整。


    所有把化身奉獻給這一座美麗神殿的婦女，都在絕對和諧與彼此合作的情況下工作。他們的身體與每一個月亮週期完美地協調一致，並為了所有人的至善而竭盡一切所能。


    他們的神殿裡有一顆由閃爍的月光石雕刻而成的水晶骷髏頭。


    當亞特蘭提斯最後一次沉沒時，古老的埃及重建了月亮姐妹會（Sisterhood of the Moon），並把月光的祕密交給獅身人面像保管。


    ## 真理神殿


    用純白色石英建造的真理神殿（The Temple of Truth），反映了大天使加百列（Archangel Gabriel）的純淨。大天使加百列直接與亞特蘭提斯人合作，協助他們把真理和秩序帶進生命裡。


    這個聖殿的純淨讓祭司的脈輪發出白色的虹光，這顯示他們已進化到第五次元的高層了。真理是靈性存在的整體核心，它也能提升振波。


