    \n## 第三十九章 與龍合作\n\n當揚昇之路上的靈魂開始覺醒時，一隻能反映他們星座象限元素的，第四次元的龍，就會跟他們一起工作。這些龍包括土龍、風龍、火龍和水龍，偶而也有混合元素龍。然而，如果你的使命需要特定元素龍的才能，那一隻龍就會來找你。例如，如果你的靈魂之旅要你使用神通，或為夢想和想像的世界導航、或者要把大量的時間用在實體的水面或水裡，那你也許會吸引一隻水龍前來。\n\
    \n黛安娜的星座是土元素的處女座。她有一隻火龍，因為她需要火龍燃燒所有阻礙她工作的能量。她像許多人一樣，幫助維護第五次元社區與下一時代黃金城市的願景，以及即將到來的寶瓶時代的新存在方式，因此，她也需一隻火龍協助祂建構地球未來的構造。\n\
    \n提姆是火象星座，所以他很自然地擁有一隻火龍。\n\n龍是你最偉大的伴侶、保護者和支持者。你的守護天使也會執行這些任務，但天使在一個不同於龍的頻道工作。龍能實質地清除你周圍的低能量，並為了你的至善而操控物質。天使保存了你最大潛力的藍圖，也會把你最好的行動方針投入你的意識裡。\n\
    \n許多人會無意識地相信靈界，但他們會在清醒的世界中矢口否認。黛安娜的母親與自然非常協調，但卻是一個狂熱的無神論者。大自然會自動地敞開人的心輪，讓人接納神聖的能量。黛安娜的童年在喜馬拉雅山區度過。儘管她小時候經常搬家，但一支高大的木龍燈始終跟著他們。他們把客廳裡那一支木龍燈稱為杜吉（Dugie）。木龍燈甚至跟他們一家搬回英國。\n\
    \n有一次黛安娜進入心神領會的狀態，在與靈界進行交流的時候遇見了她的龍。她一開始以為祂叫杜吉，龍笑了起來，說杜吉是她母親那一隻龍的名字。顯然，她母親是在無意識下跟祂連結的！黛安娜的龍叫道格拉斯（Douglas）。她從這兩個名字的振波知道他們之間有很密切的連結。\n\
    \n### 龍如何幫助你？\n\n#### ·保護\n\n黛安娜不太喜歡開車，但有一次，她不得不開車載著她的狗維納斯跨越大陸到法國南部。她每一次上車時都會請道格拉斯和龍族幫祂清除前方的障礙，並請天使包圍車子，獨角獸則負責照亮前面的路。她沿路的感覺就像自己在一個安全的繭包裡，沒什麼好讓她擔心的事。\n\
    \n#### ·惡夢\n\n惡夢通常是你今生或前世留存在潛意識裡的情緒，在呼喚你把它們釋放出來。你睡覺的時候，會開啟潛意識和意識之間的通道，讓記憶浮上表面。附著在記憶裡的情緒，會保留在你的情緒體和集體的星光層。你的靈體會在你入睡後穿過星光層到靈體的層面。如果它遇到一個情緒，那個情緒就會浮到表面，引起你的注意。感覺敏銳的人和兒童，特別會受這種情緒的影響。\n\
    \n你可以請你的龍為你的夢中之旅掃除障礙。龍也會吞噬祂需要的任何能量，好讓你享受清淨的睡眠。\n\n你也可以要求孩子的龍來守護他們。給孩子一隻玩具龍或在床邊擺一個保護性的龍模型也有幫助。\n\
    \n你看電視或聽新聞的時候，會覺察一些需要清除的能量。其中有一些會進入土地的深處。你可以派火龍去消除那些不是愛的能量。接著，再要求獨角獸在上空飛行，把光維持在那個地方。你可以請求火龍和天使之力清理一些地方，讓你進行大規模的神奇服務。\n\
    \n水龍能淨化地球上的美麗水域。如果你有一隻水龍，請祂們去需要清潔的地方特別有效。我們的水域在呼喚著要恢復原始的純淨、充滿愛的自然狀態。因此，大天使麥達昶在二〇一〇年左右，向宇宙發出了邀請，希望有生命體能幫助地球實現這個目標。名為克希爾斯（Kyhils）的元素精靈回應了祂的邀請，並以靈性的提升為條件，交換祂恢復純淨美好的海洋。\n\
    \n### 五次元的靈性覺醒\n\n#### • 基督金龍\n\n這些神奇、金色的第五次元龍族，正在把純潔的愛帶到地球。祂們會回應人們的要求，圍成一個圓圈保護儀式或婚禮、生日派對之類的特殊場合。\n\
    \n#### • 愛的粉紅龍\n\n檀香山的入口開啟時，攜帶著燦爛的超越之愛的粉紅色巨龍，在觀音大師的指導下，在宇宙時刻湧到了地球。\n\n這些明亮的、粉紅色的龍會化解阻礙個人或家庭無法經驗或實現的，潛在的愛。就像明亮的粉紅色燈光一樣，祂們會照亮各種情境，讓參與其中的每一個人都可以從更高的角度，用愛的眼睛看事物。粉紅龍會融化舊有的性愛信念，讓療癒和快樂回來。祂們會呼應你的召喚來找你。\n\
    \n感覺敏銳的人經常會看到肩膀上纏著一隻粉紅龍的觀世音。\n\n#### • 紫龍\n\n當你需要轉換一個地方、情境或周圍的能量時，就可以召喚紫龍。這些神奇的龍可以跟紫色火焰一起工作，也可以獨立工作，讓你活得自由自在。當你處於第三次元時，祂們就會隨時待命，聽從你的指揮。\n\
    \n當我們進入新的黃金紀元，那些仍然處於第四次元上層的少數人，就會有一些紫龍留在第四次元的身體裡協助他們。祂們會進行最後一次清潔，讓地球再度發光。\n\n\
    大多數的人類都是第五次元的，因此，第五次元的紫龍會幫助他們創造新的黃金紀元。祂們能穩定高層的能量，在轉型發生時，把紫色火焰放在有需要的地方。\n\n####\
    \ • 黑龍\n\n黑色一直是神聖的陰性色，代表黑洞裡的祕密寶藏和智慧會得到安全的維護。黑龍的保護性強、有智慧又神祕。祂們會幫助那些在開悟和精通之路上的人，與自己最深層的智慧連結。當黑龍與你連結時，你就會知道自己是走在正確的道路上。\n\
    \n### 龍的精通術\n\n人類的歷史中有些人與龍有著很深的連結，並且學會了用心靈力量引導和控制祂們的方法：祂們已經變成了龍大師。\n\n亞伯拉罕大師（Master\
    \ Abraham）是最著名的龍大師之一。祂是艾爾·莫里亞（El Morya）的一個面向。艾爾·莫里亞是亞特蘭提斯的大祭司，也是麥基洗德（Melchizedek）教團的祭司。如果你想在內層接受龍大師的訓練或服務，那就召喚亞伯拉罕大師。這種訓練還包括幫助他人了解龍的力量，以及祂們服務的真正範圍。\n\
    \n前面說過，經常有人看見有龍伴隨在側的觀世音。網路上有數百張與觀世音有關，而且有火、土、風和水龍的圖片。許多圖片描繪祂與龍一起在元素或龍控制的元素裡旅行。例如，祂能平息巨浪或狂風。\n\
    \n龍的精通術是開悟和與精通之旅的一部分，你也許想成為一個龍大師。龍精通術的旅程是：\n\n- 培養龍陰陽兼具的屬性：善良、關愛、陪伴、勇猛、堅強、有力、開放和慷慨。控制自己的情緒，成為幫助他人的一座燈塔。\n\
    - 掌握元素（如第四十一章所述）。\n- 始終守住自己的力量。\n\n### 觀想：龍族的祝福\n\n1. 做好冥想的準備。\n2. 召喚火龍清理並照亮你的神聖空間。感覺祂們以順時針或逆時針的方向繞著你旋轉，用一把金色火焰點亮你的周圍。\n\
    3. 請龍進入你的四身系統，淨化任何一個你感覺需要釋放的東西。感覺它被神聖的火焰\n4. 閉上眼睛，呼喚一隻龍代表來向你自我介紹。任何大小、顏色或能量的龍都可以。讓祂跟你一起安靜地坐著，感覺祂的能量。\n\
    5. 把注意力轉移到心輪。觀想它流出純潔、燦爛的白光。看著龍夥伴龐大的胸部中央也發出明亮的光輝。\n6. 讓一束光從你的大師心輪流出，與龍的光結合。感覺你們之間的結合——合一。\n\
    7. 把你心輪想說的任何話告訴龍。要忠實、充滿愛和誠實。龍有無限的智慧。\n8. 等祂的回應。如果你提出一個問題，答案也許會在稍後以信號或同步的方式出現。\n\
    9. 召喚大天使加百列在你的龍心裡放一顆璀璨的鑽石。感謝龍為你、為人類和地球提供的無私服務。\n10. 請加百列和祂的天使團把這個祝福賜給正在努力的所有龍族。看著所有天使的心輪都閃爍著鑽石的光芒。\n\
    11. 感謝大天使加百列，並知道你為蓋婭之龍提供了很好的服務。\n\n## 第四十章 龍如何幫助你完成靈魂使命\n\n靈魂使命通常是你喜愛做的事。它會讓你有實現感，讓你感覺生命是有價值的。你往往只能看到使命的下一個步驟。你可以請龍幫你達到這一步，也可以舉行一場龍儀式。只要是為了你的至善，龍就會幫你達成任何目標。\n\
    \n#### • 水龍\n\n有一天，黛安娜在森林裡散步，心裡想著自己的靈魂使命。當時水想教她一些功課。她的房子裡有幾處漏水，這些都需要時間、金錢和精力才能解決。當時按摩浴缸上的水管斷了，沉積物堆在她供奉麥達昶那個房間的天花板上。這似乎要傳達給她一個明確的靈性訊息。\n\
    \n她呼喚水龍，請祂們幫忙她了解水想引起她注意些什麼。她立刻被幾十條像蟒蛇一樣的綠蛟龍包圍。祂們都朝著她走路的方向，在她旁邊上下起伏地流動著。當她前進時，完美的景象出現了：黛安娜感覺自己與祂們同在那個流裡。但當她停下站著不動時，祂們就轉過身圍繞著她：祂們不流動了。她這才明白祂們在告訴她必須跟著宇宙的步調前進。\n\
    \n當她了解這個訊息時，祂們又提醒她水是有彈性的，並要她走阻力最小的一條路。她明白祂們要告訴她的是保持靈活，尋找磋商的方法，繞過障礙和問題，不要跟問題硬碰硬。\n\
    \n當她撫摸祂們時，她感覺自己像在撫摸一隻非常柔軟的貓咪。即使祂們沒有長毛，但仍然會給她柔滑的感覺。這是在提醒她要呼喚祂們的陰性能量。她比較習慣呼喚有強烈陽性氣質的火龍，但水龍的出現為她的前進提供了一個新的洞見。\n\
    \n黛安娜向水龍致謝。此後，只要她一想起水龍，祂們就會出現在她身邊，在空中起伏，提醒她記得祂們的許多特質，例如：流動、彈性、淨化和清潔。最重要的一點是，水攜帶著對宇宙的愛。永遠懷著愛做任何事。\n\
    \n#### • 風龍\n\n俏皮的藍色風龍會把輕盈和樂趣這種非常重要的屬性，帶進你的靈魂之旅。當你像一隻堅定的公牛一樣猛衝，既不看左也不顧右時，就會錯失目標。當你太專注於目的地，卻無視於步行的樂趣時，你就會錯失機會。人生不是急行軍。\n\
    \n請風龍點亮你的生活，為你的生活帶來樂趣。接下來發生的事也許會讓你感到驚訝。你必須願意參與這種享樂。積極地加入提供給你的每一件事，否則風龍就會盤旋而出，到別的地方遊戲了。\n\
    \n當你放鬆下來享受呈現給你的一切以後，風龍就會自動地用隱喻的方式，把風塞滿你的帆，讓你順風而行。\n\n#### • 土龍\n\n神奇的土龍鼓勵你接地、紮實、生根，並清潔你賴以生存和腳踏足履的土地。同時，祂們也喜歡你隨著亢達里尼的上升，用充滿活力的舞蹈敲擊大地。土龍會積極地跟你合作，提升你內在的能量之蛇。因為這會提升你的頻率，讓生命為你帶來豐厚的回報。祂也會讓你與地球和蓋婭母神連結。蓋婭母神會自動地把你和你的靈魂使命連結起來。\n\
    \n#### ·火龍\n\n威力強大又活力十足的橙色火龍，牠們會不由自主地吞噬和燃燒掉所有為了你的解脫釋放出來的一切。牠們喜歡像燃燒的燈塔一樣，清除你靈魂之路上的障礙，點亮你的道途。牠們用熱情燃燒你，而且是最兇猛的保護者。牠們會在你的靈魂之旅上提供非常大的幫助。\n\
    \n還有很多其他的龍也會幫助你完成靈魂使命。紫龍會轉化老舊的；粉紅龍會帶來高層的愛；基督的金龍會給你愛、智慧和保護。與大天使聖德芬合作的黑龍，會帶來宇宙最深奧、最有智慧的祕密。\n\
    \n當你與所有的龍族合作時，牠們就會幫助你平衡陰陽兩性的特質、工作和遊戲，讓你有接地和飛翔的能力。有了牠們，你就能掌握生命的元素，並真正享受地球上的生活。\n\
    \n### 觀想：龍族的儀典\n\n你可以舉行以下的儀式，請龍點亮你的使命，幫助你完成自己的命運。\n\n#### 做好龍儀式的準備\n\n1. 清楚地寫下你的使命，或希望龍幫你實現的目標。\n\
    2. 你也許會想做一個祭壇，放一些代表元素龍的物品：\n    - 找一個能代表水龍的東西。一碗水或一瓶花都可以。\n    - 風龍可以用羽毛來代表。一片樹葉、一個天使模型、獨角獸或仙女，都是風元素的代表。\n\
    \    - 土龍可以用水晶或鵝卵石、一點土或活的植物來代表。\n    - 火龍可以用一支蠟燭或火來代表。\n    - 紫色、粉紅色、金色和黑色的龍，可以用一塊布、水晶、物件，或適當的顏色來代表。\n\
    3. 如果你特別想跟某一種龍合作，注意以下幾點：\n    - 如果你特別想跟水龍合作，那就在海邊、河邊或湖邊舉行儀式。滿月時舉行的威力最強。\n    -\
    \ 如果你特別想跟風龍合作，就在早晨或週末到山頂或有風的地方舉行儀式。\n    - 如果你特別想跟土龍合作，就在室外一個能量很強的神聖場所，或一個美麗的景點舉行儀式。\n\
    \    - 如果你特別想跟火龍合作，就在夜晚發光的烈火，或一堆篝火旁邊舉行儀式。\n    - 如果你特別想跟紫龍合作，用一塊紫色的布（參閱266頁的步驟五），在紫水晶排成的圓圈裡，或把紫水晶擺在你的圓圈中央舉行儀式。\n\
    \    - 如果你特別想跟粉紅龍合作，把一塊粉紅色的布（參閱266頁的步驟六），或粉紅色的石英水晶放在祭壇上的心形裡。\n    - 如果你特別想跟金龍合作，在祭壇上放一個金黃色的物件。\n\
    \    - 如果你特別跟黑龍合作，在祭壇上放一塊黑布（參閱第266頁的步驟八）或黑曜石，並在天黑後舉行儀式。\n\n#### 請龍幫你達成靈魂使命的儀式\n\
    \n1. 把代表水龍的物件擺在祭壇上，附帶以下的文字：\n\n> 「我呼喚心愛的紫龍用最短、最簡單的方法，讓我流向我的使命，並幫助我流向成功。」"
