    # 觀世音


    偉大的遠見者仍然過著非常有挑戰性的生活。即使是現在，心理學家和有靈性觀念的人，都會有超越自己時代的知見，但祂們都可以透過進入聖女貞德／布拉瓦茨基夫人／錫耶納的凱瑟琳的能量而獲得幫助。如果你想成為攜帶白色揚昇火焰，為人類帶來和平與光明的人，那就調整自己的頻率，接通這個偉大存在的能量。


    由於兩萬年前在中國的化身時展現的愛、悲憫和智慧，使觀世音成為慈悲女神的代表。祂在這一段漫長的時間裡，雖然學會了出入多次元的能力，但還是選擇以肉身留在地球，幫助人類。祂活在第七次元，但能把頻率降低到第五次元。祂能在第五次元裡保持肉身，也能提升到第九次元。祂不需要食物，但在第五次元時喜歡吃帶給地球輕鬆、喜悦的水果和蔬菜。隨著光之工作者成為行止高人，更多人可以存在不同次元，也能呼請觀世音的幫助。


    祂的龍族朋友就像祂的隨身護衛一樣，跟祂一起穿越頻段，讓祂飛越各式各樣的挑戰。祂對了解龍族並把龍視為生活一部分的東方，懷有一份熱愛。龍族現在正湧入東西方世界，觀世音正在幫助人們開啟意識，讓人們接受祂們並與祂們合作。身爲一位大師的祂，現在擁抱了整個地球，讓我們得以沐浴在祂的愛裡。'
