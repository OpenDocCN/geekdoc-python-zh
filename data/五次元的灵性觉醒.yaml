    7. 你覺察到鋪滿小路和草地的粉紅色花朵。陽光灑在花上，照亮了許多你平常不會注意的人和動物。你的心瞬間充滿了對所有眾生的愛。

    8. 你繼續前進，陽光傾灑在環繞你的紫色天使身上，花朵隨之散發一絲紫色的光芒。你敞開著心，對地球上的人懷著悲憫和同情。你真的關心他們發生的事。

    9. 快走到山頂的你，可以看到螺旋小徑的盡頭發出純白色的光。

