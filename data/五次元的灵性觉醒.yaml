    # 五次元的靈性覺醒


    地球上的基本業力法則——你給出什麼就得到什麼——仍然是支配一切事物的至高法則。這也適用於前生與來世。我們現在正處於這個機會的末期。從現在開始到二〇三二年，在新黃金紀元開始以前，是讓我們在這個種存在層面，完成業力的最後一個機會。在靈魂的層面上，確實有數十億的存有渴望償還自己的業力，讓自己獲得自由。他們真的想學習自己的功課，以便掌握提供給他們的宇宙提升機會。那些準備好，也在靈性上達到平衡的人，會有參與地球新黃金時代的驚人機會。


    以下是對其他挑戰性的生活經歷，可以採取的高層觀點。


    靈魂可能很勇敢、很願意付出，因此接受了艱鉅的考驗，以便把經驗傳給別人，使他們能揚昇到地球的下一個黃金階段。例如，一個人也許會在靈魂層面同意讓自己成為殘障，好讓親人了解無私的奉獻和關懷，並在自己的氣場建立許多高頻的特質。殘障者的靈魂也許想學習耐心、感恩，想放棄控制、依賴。這些也許不是憑著業力決定的，而是想成長的渴望，甚至是為了獲得高頻率的啟蒙。老靈魂會為了受難和啟蒙，而選擇許多嚴峻的挑戰。


    除非所有參與劇碼的靈魂都同意，否則什麼事都不會發生在你身上。除非你的高我同意參與，否則你不會以某種特定的方式死亡。


    在很多情況下，參與艱困處境和人際關係的雙方，都是為了互相教導重要功課的靈魂伴侶。多年前，黛安娜跟母親有過一段非常艱困的關係。她嘗試過各種解決的辦法，但這'
- md: '## 第二十五章 學堂七：高層覺知


    似乎是一個不可能的任務。後來，有一天晚上，她躺在床上，看到母親的高我進入房間。那個女人散發著光芒，充滿愛和關懷地看著她。黛安娜立刻知道這是媽媽的真我。他們在地球上建立的障礙只是一個幻相。這徹底改變了她對母親的觀感。此後，每當我執想要冒出來，她就會回想起這場母女鬥爭的源頭其實是母親和她受過創傷的自我。她也會想起母親的高我傾注出來的愛，然後就會微笑著把她放下。


    這個學堂裡第一個要了解的是，沒有譴責、罪惡感，也沒有任何值得寬恕或哀傷的事。


    這是第七個學堂，七是天使的振波。這裡的學生要學習的是透過天使的眼睛，也就是從第七次元的角度看事物。天使只會看到你輻射的高頻率，看到你最大的潛能和靈魂的渴望。由於祂們保存了這個偉大意圖和希望的藍圖，因此也會幫助你實現它們。


    這個廳裡的學生還會學習到的是，當你把愛的藍圖放在一個人或情境上面時，它就會療癒你扭曲的視野和認知。當有足夠多的人都這麼做時，它就能轉變信念，修補愛破碎的鑰匙和密碼，重新排列它們，以恢復原來的神聖計劃。


    對一個人抱持純粹的意圖，也能幫助那個人實現目標。你可以透過與一個人或為一個人保存那個願景，而幫助他實現那個願景。


    黛安娜曾經收過一封讀者的來信。這個男人有一個被他形容為懶惰，對任何學術成就都不感興趣的兒子，不過這個男孩很聰明。父親用盡一切辦法想激勵他發揮自己的潛能，但仍然無濟於事。他問黛安娜是是否能描繪一幅孩子在學校表現優異的願景。她同意了，並向宇宙發出一張清晰的畫面：男孩輕鬆、快樂，並且在學校有非常出色的表現。她說自己不該對結果感到驚訝，但結果確實讓他大吃一驚。學期結束時，男孩子的所有學科都名列前茅，並被學校選為橄欖球隊員。此外，他也充滿了上進的動力和快樂。


    父親對兒子的欲求被自己的懊惱、希望與執著渲染了。由於黛安娜從沒見過這個孩子，她描繪的願景裡沒有自己的執著，只是為了他的至善著想，所以靈性法則就會自動發揮作用。這就是為什麼應該邀請一個跟自己沒有聯繫的人，來描繪自己想要達到或吸引的畫面的原因。


    這個學堂裡的學生，都沐浴在清淨的鑽石白、金色鑲邊與淡粉紅結合的光裡。你把這些顏色和相關的光保存在自己的氣場裡，人們就會信任你的智慧，願意聽從你的話。此外，你也能幫助他們發揮自己神聖的潛能。


    ### 觀想：拜訪高層感知廳


    1. 準備一個能讓你放鬆、不受干擾的空間。可以的話，點一支蠟燭。

    2. 安靜地坐著，舒服地呼吸，懷著拜訪高層感知廳的意圖。

    3. 專注在你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。

    5. 專注在你的心輪上，看著它閃爍著鑲了淡純金和淡粉紅色邊的純白色。

    6. 你站在神殿掛著大型發光鑽石符號的大門外。你的心輪發出的光線射進鑽石造型裡，把大門打開了。

    7. 你進門時，庫圖彌尊主和數百個美麗的天使，用微笑和敞開的心向你致意。

    8. 大廳中央的水晶骷髏頭，對你發出前所未有的非凡能量。能量敲中你的第三眼。

    9. 大廳的中心以旋轉的方式開啟，露出了一個洞，你可以從洞口看到地球。

    10. 天使在上方為你歌唱，把你的頻率提高，讓你從神聖的角度看待生命的各種面向。

    11. 當你俯瞰地球上一些艱困的處境時，更多的天使聚集在你的身邊唱歌。你用天使般的眼神看祂們。

    12. 你用第三眼把神聖完美的藍圖射進一個艱困的處境。你看到所有參與者都以和平與愛行動，因為他們都處在揚昇的境界裡。

    13. 向庫圖彌尊主和天使們致謝，返回你的起點。


    ## 第二十六章 學堂八：萬有合一


    庫圖彌尊主邀請最偉大的宇宙啟明大師庫梅卡尊主（Lord KumeKa），來這個學堂授課。祂最近揚昇到第十一次元了。祂曾在許多宇宙裡服務過，也是建立和監督亞蘭提斯第五個和最後一個實驗團隊的成員。黃金紀元就是在這個時期誕生的。


    為了回應幫助地球的號角，讓地球可以順利通過這個前所未有的二十年轉型期，庫梅卡尊主回來負責深度清潔、轉化、喜悦和合一的第八射線。祂透過這種奇妙發光的黃玉藍光，幫助地球上的個體進行深度淨化，好讓他們準備與宇宙的合一連結起來。這帶來了超然的喜悦與和平感。當我們把第五次元視為生活的重點時，祂就會跟我們合作。


    ### 觀想：接收庫梅卡尊主的黃玉光轉化射線


    1. 準備一個能讓你放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。

    2. 安靜地坐著，舒服地呼吸，懷著拜訪高層覺知廳的意圖。

    3. 專注在你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。當你接近大廳時，你覺察到從大廳傾注出來的明光。你在一些巨大的藍金色大門上看到似於側躺的「8」，代表無限的符號「∞」。你懷著純潔的意圖走過去，它們就自動開啟了。

    5. 你穿過大門，發現自己站在一個巨大的、半透明的黃玉藍色的光球裡。球裡有讓你做為第五次元存在的完美密碼。

    6. 你正握著個人的水晶或水晶骷髏頭。當你安靜地在這個珍貴的學堂中等待時，你會透過它下載一些奧祕的資訊。這些資訊不是有意識地傳給你的。放輕鬆，讓它過濾你的能量場。

    7. 你的本質會在過濾的過程中，被現世揚昇大師的完美藍圖覆蓋。這是一個令人敬畏的機會，它能讓你敞開心，把自己臣服給最高可能的化身。進入這個學堂需要你放棄我執裡所有限制性的自我意念，這樣它才能把記憶和相關情緒帶到表面，以鬆動你那些意念。接著，金色的光芒會帶出你的高層智慧。

    8. 你的單子體或「我是臨在」（I AM Presence），是你第十二次元的面向。我們的內心深處都隱藏著這個難以置信的、照亮我們高層部分的藍圖。準備就緒以後，你與單子智慧的連結就會啟動。你站在這個萬有合一廳裡，請庫圖彌尊主和庫梅卡尊主調和你的振波。


    我們在第十二次元的單子層面上都是合一的。這裡只有源頭的光與愛、熾天使的歌聲，以及超乎我們了解的喜悦。這也許超出我們現在能承受的範圍，但你可曾看過一片天空因為烏雲密布，而讓你難以想像其他的事物嗎？突然之間，雲層散開，你瞥見了明淨閃耀的藍天。它揭示了承諾和希望。它讓你想起那一半被遺忘了的可能性。


    在庫梅卡尊主的監護下拜訪萬有合一廳，點燃了你內心的承諾和希望。它現在可以供你取用了。


    有一天，黛安娜在林間安靜地散步。她從心裡要求庫梅卡尊主和庫圖彌尊主，允許她進入萬有合一廳。她的請求得到祂們的許可。接著，她發生一個非常有趣、不舒服、但又深刻的經驗。當巨大的藍色和金色大門打開時，她立刻發現自己在一個黃玉水晶球裡。沿著這一條被不尋常的透明藍色能量球包圍的小徑，走了一段時間以後，她發現舊有的記憶浮上表面。這個多年沒有經歷過，但顯然鎖在十多歲內在小孩細胞裡的感覺，從她存在的深處浮現。被遺忘的古老悲傷和無力感，都在她散步時被清洗和轉化了。


    這個經驗結束後，庫梅卡尊主反復地問她真正想要什麼。她說想要所有能帶來喜悅的事物。最後，金色的光芒在她周圍閃閃發亮，她感覺有一些深沉的東西被轉化了。這是她揚昇大師的完美藍圖，擺在她的氣場時發生的。她被一種神奇、難以捉摸的可能性感動了。


    你想蓋房子的時候，會先在心裡生起一個畫面。然後你會與建築師討論，接著，完成設計圖和達成協議。最後，你就能真正地預設它的結果了。然後，你必須啟動它。你的下一個任務，就是建造並居住在那個房子裡。只要你是為了所有人的至善，那個房子就會成為一個充滿喜悦和快樂的地方。


    ### 觀想：拜訪萬有合一廳


    1. 準備一個能讓你放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。

