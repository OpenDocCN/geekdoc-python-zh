    幫我們進行第三眼和頂輪融合的揚昇大師有兩位，分別是亞特蘭提斯黃金紀元的大祭司沃斯洛尊主和瑟若佩斯·貝大師。祂們負責啟蒙和訓練特別挑選出來的高頻率賢士，讓他們獲得操縱現實的神奇力量。


