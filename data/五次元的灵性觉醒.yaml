    ## 第四十章 龍如何幫助你完成靈魂使命


    ## 第四十一章 四大元素與自然界的精通


    微風、颶風、地震、風暴、洪水或大火的發生，都是由許多因素決定的。這些因素包括：


    - 星際議會的旨令。

    - 大天使波利梅克（Archangel Purlimiek）和蓋婭母神對自然界做的決定。

    - 保存在大地裡的古老和近代的業力。

    - 人類的情緒和他們對元素的掌握。


    當有足夠的人類能掌控自己的情緒，並能與元素的靈體連結時，我們就能為了至善的目的，對自然界發揮重大的影響了。


    ### 風元素


    除了鴕鳥、奇異鳥和其他不能飛翔的鳥類以外，所有鳥類都掌握了風元素的各種面向。老鷹和信天翁是充分掌握風元素的例子。牠們也不斷地向我們展示這一點。牠們展示了一個大師能上升到稀薄的能量裡，從更高的視角看待所有的事物。最重要的是，展示如何輕易地隨順生命之流飄浮。這是牠們要傳達給所有人、其他鳥類和動物的訊息。


    你必須超越人們對地心引力的集體信念，才能掌握風元素。前面說過，在黃金亞特蘭提斯紀元的早期，進入波賽頓神殿的唯一途徑是懸浮或飛行，當時的男女大祭司都能做到這一點。


    地球上有些生物會教導我們與集體信念有關的知識。從一個沒有重力的宇宙化身到地球的蜘蛛，向我們揭示了心靈力量勝過集體信念的力量。牠們堅守著對完成品的願景，才能克服地心引力，編織蛛網。


    掌握風元素的關鍵，就是與負責風的獨角獸連結。牠們會與元素大師多姆（Dom）合作。我們有時會在雲裡看到多姆。祂是從來沒有化身過的乙太體。然而，祂卻支配了風精靈裡的小仙女（fairies）和西爾夫（sylphs）。如果我們敞開心接納祂，祂就會教我們與風的運動和力量有關的知識。


    這是一個非常簡單的練習。當你走進大自然時，調整你的頻率，接通西爾夫的能量。


    ### 水元素


    水攜帶著整個宇宙的愛能量，這可以從一些水生物中看出來。掌握了水元素的海豚，在享受海洋世界時展現了純粹的喜悅和至樂。牠們在歡樂之餘，也把亞特蘭提斯的愛和智慧，傳播給與牠們共享海洋的所有生物。此外，牠們還透過自己的聲波把天使的能量帶來地球，淨化水域。


    其他的第五次元水生物還有海龜、魟魚、鯨魚和鯊魚。牠們保護那些在能量場中攜帶著亞特蘭提斯智慧的天使海豚。牠們各以不同的方式掌握水元素，執行靈魂使命，並把牠們在地球上獲得的知識和智慧帶回恆星、星系或源頭。


    - 海豚來自天狼星的揚昇面向拉庫美（Lakumay）。牠們的靈魂使命是把黃金亞特蘭提斯偉大文明的知識和智慧，傳播到世界各地的水域。因為水會保存含有能量的記憶印記，並在我們準備好的時候傳遞給我們。

    - 鯨魚來自神之臨在（Shekinah）第十次元宇宙裡的一顆小行星。牠們的使命是散佈含有超越我們理解的知識、智慧和快樂的大量高頻光能。同樣地，水也保存了有能量的記憶印記。

    - 烏龜來自木星的揚昇面向金貝（Jumbay）。牠們會透過水來傳播宇宙的豐盛意識，將第五次元的了解帶到世界。

    - 鯊魚來自火星高層面向的奈傑利（Nigelley），負責海洋裡的巡邏工作。牠們是把紀律和秩序帶給海洋生物的靈性戰士。

    - 此外，昴宿星團發出來的巨大射線，已經被個別化與三次元化。牠們能把心的療癒光能傾注到水域裡。


    棲居在珊瑚礁裡的生物都是第五次元的。牠們負責把空心地球的能量和光帶進水域。這些高度進化的生物，都掌握了水的不同面向，因此，都能用自己特殊的天賦為水域服務。我們可以透過與牠們的認同來學習。如果你「像魚得水」一樣地游泳，那麼你已經開始有掌握水的能力了。如果你能在水面漂浮，表示你允許並信任水元素給你的支持。


    你可以從祝福水展開你精通水的旅程。你每一次這麼做的同時，都會把水的能量帶到第五次元，並影響每一個在水裡沐浴、游泳或生存的生物！


    如果你與掌管水的波賽頓大師和祂的精靈大師海王星（Neptune）有共鳴，也會對你有所幫助。


    ### 火元素


    大天使加百列負責火元素，而祂的精靈大師索爾（Thor）則負責指揮火精靈蠑螈（salamanders）。


    有吞過火或走過火坑的人，都已經克服了他們對火的恐懼情緒，但他們還必須會用念力控制這個元素，才能完全掌控它。


    想練習火的精通術，可以點一把火或一支蠟燭，再與火精靈蠑螈連結。接著，再把它平息下來，或讓它和你的念力一起燒成一團熾烈的火焰。


    當你輕鬆地掌握了指揮權的時候，就能撲滅房屋或森林的大火。你甚至可以駕馭火光，幫助火焰傳播它的溫暖和歡呼。


    ### 土元素


    儘管我們在土地上行走，並與土地保持不斷的接觸，但幾乎沒有人能掌握它。然而，第四次元的蠕蟲，卻能在土地裡蓬勃繁衍！牠們的服務就是把風元素帶進土壤裡。


    有一些勇敢的靈魂，在地震或儀式中被活埋而劫後餘生，因而通過了啟蒙。他們已經掌握了土元素的各種面向。


    蓋婭母神負責掌管土元素，精靈大師泰亞（Taia）則負責監督地精靈諾姆（gnomes）和哥布林（goblins），以及已經成為土地一部分的妖魔精（imps）與小妖精（pixies）。


