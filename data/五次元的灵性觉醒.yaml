    必須迎合父母而追求完美成就的孩子，會做任何事來掩飾自認為不完美的面向。這些會在他們在成年以後變成內心的陰影。有這種內在小孩的成人，經常會因為害怕失敗而不敢嘗試。同樣地，一次完整的脈輪浴，也會洗掉他們自覺不夠好的恐懼。


    每一個成人都有一個需索無度的內在小孩。不快樂的人會創造嚴苛、批判或懲罰性的內在。這通常來自世世代代的傳承。


    對所有人都懷著極大的悲憫和同情心的高層靈界，正在幫助我們找回內在的真理和美。二〇三二年的新黃金時代，標示了內在痛苦小孩的終結期。現在是改變並創造內在快樂人格的時候了。


    生活在肉身裡的大師們，仍然會有他們的內在小孩。這是他們地球經驗的一部分。然而，他們培養出來的內在智慧，會鼓勵、愛和幫助自己脆弱的部分。


    當你進入真理廳時，真我的鑰匙和密碼就會灌進你的體內，洗掉因為缺乏愛而產生的驅迫力。接著，你就能活出睿智、誠實的內在我了。


    ## 純白的真理


    有些存在和團體已經發展出純白的真理，也能把這個神聖的了解傳授給別人。


