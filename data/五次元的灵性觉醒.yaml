  md: '# 五次元的靈性覺醒


    列木里亞大陸是第四個黃金紀元，也是以太平洋為基地，發生在人類還不是第五次元存在的時期。列木尼亞人很像天使，是五次元的光能，但振動的頻率比較低。他們熱愛地球，並熱切地想提供幫助。即便如此，它還是會在遙遠的二〇一二到二〇三二年間經歷一個關鍵階段！


    列木里亞大陸留下一個了不起的禮物，要幫助我們完成目前正經歷的驚人轉換。他們把從源頭取得的光，以及來自恆星、行星和宇宙巨大能量的氣場融合、聚焦，直到它們變成熔融的狀態後，再傾注到龍脈，並在那裡形成高頻的列木里亞水晶。這就是地球的內部有輻射光的原因。


    龍族一直在保護這些列木里亞光的特殊縫隙，幫助我們通過這個過渡時期，順利進入下一個黃金紀元。「龍」（dragon）這個字的原意是「觀察者」（watcher）或「監護人」（guardian）。龍族一直照顧列木里亞人鍾愛的一切——土地、自然和人。祂們不愧為人類偉大的同伴、捍衛者、保護者和照顧者。


    列木里亞時代結束時，乙太存在祈禱自己能擁有肉身，讓他們得以全新的形式體驗生命。他們希望經驗這些感知，並希望以肉體的形式呈現大天使麥達昶和神之臨在（Shekinah）的能量，以便在地球上紮根。


