    \ 你的能量場發生了一次非凡的轉變。你現在可以為了至善的目的從事任何的工作了。\n\n## 第三十七章 女神大師的影響力\n\n好幾個偉大的女神大師，都為了讓我們發展靈性角度的新理解而奉獻自己。他們目前正在內層努力，把靈性而非宗教的印象，烙印在人類的心智裡。這些人裡有一些在多生多世中帶動了很大的改變，而且他們的靈體還在繼續改變。覺醒大師的肉身角色和職責往往令人敬畏，但我們很少能覺察到這一點。\n\
    \n另外，請切記，你的化身也許正在從事這項工作。你甚至會成為莊嚴大師的一個面向，氣場裡攜帶了一些祂們的能量。你也許本身就是一個偉大的大師，你會對自己的光產生的力量感到驚訝。這只有在你看到自己的真我時才會知道。當你死後達到更高的證悟時，這種情況就會發生。\n\
    \n### 抹大拉的馬利亞\n\n抹大拉的馬利亞 (Mary Magdalene) 是一個純粹的本體 (Essence)。祂那一生是一個高度進化的大師。祂與耶穌一起化身，成為祂的靈性伴侶。祂們和女兒莎拉\
    \ (Sarah) 一起在脈輪的道路上前進。抹大拉的馬利亞一生遭受人們的誹謗，而且至今還有人繼續批判祂。\n\n祂受過多年的內層訓練，能把療癒和靈性帶進第六射線的光裡。這是從第六射線大師耶穌承接過來的理想主義和奉獻的射線。\n\
    \n此外，祂也在星際議會負責監督用靈性點亮宗教的工作。祂擁有世界合一之愛的願景。\n\n如果你想發展超越的愛，那就調整你的頻率，接通祂的能量場。\n\n###\
    \ 聖克萊爾\n\n聖克萊爾 (St. Clare) 的肉身誕生於一個富有的義大利家庭，擁有備受寵愛的童年。然而，祂卻渴望過虔誠和簡樸的生活。由於庫圖彌上主化身的亞西西的聖方濟各\
