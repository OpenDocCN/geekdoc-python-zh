    位。祂直接和這座神殿合作，並常帶著新加入的成員進行他們初次的銀河系連結。祂能讓他們的身體充滿純淨的光芒，引導他們的意識連結恆星。這種連結能使他們存取和下載星際間的知識和智慧。


    這一座神殿最偉大的教誨，就是向亞特蘭提斯人展示他們真正的本質。在沃斯洛尊主指導下經歷過神殿的人，都會看到自己與萬有皆是（All That Is）之間無邊無限的連結。


    神殿裡的男女祭司使用黃水晶和透明石英混合的高導電物物質，吸收來自昴宿星、仙女座、大角星、天狼星、天琴座以及許多其他恆星、行星和星系產生的高振波。他們把這些光收集在神殿的水晶裡，讓神殿能在黑暗中發光。


    所有亞特蘭提斯人都因為他們內在發光的太陽而備受榮耀。


    ## 海神殿


    又名海王星神殿（The Temple of the Sea），與海王星已揚昇的面向——托地雷（Toutilay）上流動的水密切合作。這一座神殿的男女祭司都專注在空間中不斷移動的能量。


    亞特蘭提斯人了解第三次的能量會構成形體，也了解那個高頻能量會以液態光的形式連續流動。受過訓練的海王星神殿的啟蒙者，能使用頻率比自己更高的能量。他們也會因此變成顯化的專家。


    海王星的能量始終要求關注內、外在的靈魂工作。這裡會定期舉行測試，以確保祭司連結自己最深處的情緒。因為這些情緒會極大程度地影響他們在實體世界中投射出來的創造物。


    海王星神殿的教誨非常神聖，以至於亞特蘭提斯沉沒後，仍然把它們送回海王星加以保護。對那些真正準備好接受靈魂的各種面向，並願意為至善而竭盡全力的人來說，他們再度能夠取用這個光能和資訊了。


    ## 自然神殿


    自然神殿（The Temple of Nature）是亞特蘭提斯最美的建築之一。自然神殿矗立在燦爛的林地裡，教導亞特蘭提斯人自然律的各種面向，並展示如何尊重地球的靈體。蓋婭女神（Lady
    Gaia）和祂的精靈大師泰亞（Tia）直接與所有拜訪這座神殿的高我（Higher Selves）一起工作。祂們向這些高層的大我展示如何崇敬和賜福大地，使他們邁出來的每一個腳步都能留下金色的足跡。


    所有草木昆蟲鳥獸都會被神殿的振波吸引而來。亞特蘭提斯人會用幾小時的時間與他們進行心靈的交流（communion）。他們教導大家與地球生命的共生之道。由於尊重大自然的微妙平衡，並維持與所有人的和諧共處，地球便以聚寶盆來回報：高頻率的營養食品、燦爛美麗的鮮花和青蔥茂鬱的樹草。


    ## 波賽頓神殿


    波賽頓神殿（The Temple of Poseidon）有時也被稱為聖高地（Sacred Heights）大教堂，是亞特蘭提斯所有神殿中最雄偉、最有靈性的一個。前面說過，這一座神殿建在波塞達島（Isle
    of Poseida）的最高點，只有精通懸浮技術的亞特蘭提斯人才能進入。黃金紀元的後期，祭司們決定修建一條通往山頂的道路，好把神殿開放給其他人參訪。


    神殿裡安放一個巨大的紫水晶骷髏頭，水晶骷髏頭裡儲存了所有水晶骷髏頭蓄積的光、愛與智慧。亞特蘭提斯的大師們會在這一座神殿裡聚集；高級的啟蒙儀式會在男女大祭司密切的監督和星際議會的指導下，在這裡進行。


    亞特蘭提斯沉沒時，波塞達島的祕密就被儲存在冥界廳裡，直到今天，還是由阿努比斯軍團（Legions of Anubis）守衛著。（阿努比斯軍團是為阿努比斯神的工作的人。他們都攜帶著祂的愛和高頻率，並作為祂的延伸行動）。轉世到地球來的大師們，才剛開始憶起獲取這個神聖知識的方法。這些知識被用來把揚昇過程轉換到更高的傳動檔，並在地球重建亞特蘭提斯黃金紀元的第五次元藍圖。


    亞特蘭提斯人的生活、合作、分享和愛，是揚昇之道的基礎。這個基礎構成了地球上行止精通的模板。我們正在憶起那些時代，準備要把那些教誨帶回來，好讓地球能完全揚昇到第五次元，再度散發金色的光能。


    ## 第四章 幫助孩子開悟並掌握黃金亞特蘭提斯的精通


    亞特蘭提斯黃金紀元的一切事物，都是從開悟的角度進行的；所有的決定，都經過精通的角度考量。把新靈魂帶入世界並教育他們，被認為是一件無比重要的事。年輕人都要接受開悟和精通的訓練。我們需要向這個紀元的人學習養兒育女的重要性和力量。這就是我們撰寫這一章的原因。當我們以正直的態度朝着這條道路前進時，它就會提供我們許多開悟和精通的機會。


    並非每一個人都適合為人父母。有賢士（Magi）之稱的大祭司與大多數啟蒙者都是獨身。只有準備要過獨身生活的人，才能承擔這個高度進化的角色。此外，也並非所有的婦女都要成為母親。這個決定是在靈魂的層面上做出來的。有的人選擇把一生奉獻給創造之類的事物上；也有人致力於照顧別人的孩子、孤兒或從事教育工作。


    當你像這個時期的人一樣在第五次元的上層發出振波時，你體內的陰陽能量就會達到完美的平衡狀態。因此，性愛被視為以生殖為目的的神聖行為。如果一對墜入愛河的男女想結婚，他們就得先去拜訪當地的祭司。祭司是高度進化並受過心理訓練的人。祭司會檢視他們的氣場，了解他們在身心靈和情感上的契合度。如果不契合，他們就不能，也不會想結婚。他們不會！如果婚姻不是為了所有人的至善，那就是一個沒有目的的婚姻。


    亞特蘭提斯人務實，他們知道婚姻關係中充滿了挑戰。如果一對夫妻相處得不快樂，儘管他們可以事先採取預防措施來確保彼此的包容，即使離婚也沒有什麼問題。但這種情況極少發生。


    婚禮是一場充滿能量的儀式，他們會呼請巨大的靈性能量照亮這一對新人，但沒有交換戒指或其他象徵性的習俗，因為他們不認為有此必要。


    這一對新人知道人一生中最大靈性責任之一，就是孕育一個靈魂。他們知道照料那個孩子，是一項至關重要的任務。他們也了解養育子女是一個高頻率的服務工作。因此，他們在準備這一項被祝福的任務時，經常會與大家庭的人一起冥想，以便探索最適合他們提供服務的那一類靈魂。這個時機可能會出現兩、三個靈體，想在受孕前探索彼此的能量，進而做出最適合雙方的決定。肉體的性行為會吸引新的靈魂，前來與母親的身體連結。


    出生的嬰兒會受到父母、直系親屬和整個社區的歡迎。在殷切期盼下誕生的嬰兒，都會受到熱烈的歡迎和深度的關愛。他們會被帶到神殿，讓祭司檢視他們的氣場，了解他們經歷的靈魂旅程，以及他們帶來的天賦和才華。這對孩子的發展有極大的幫助，因為父母和社區會尊重和鼓勵孩子從事自己擅長的事情。每一個孩子的生命都會在潛能被引發出來的時候綻放。就這方面來說，亞特蘭提斯黃金紀元的孩子特別幸運。


    賢士會憑著他們非凡的力量，從嬰兒的母星球上吸引液態水晶。固化後的液態水晶，就成了孩子的生辰水晶。生辰水晶會與孩子的恆星或母星球連結，使孩子能與自己的家園建立強有力的能量接觸。這也能幫助孩子有一份聯繫感和安全感，並從開悟的觀點看待生命。你現在也可以選擇一個吸引自己的水晶，要求它把你連結到自己的母星球。把水晶放在枕頭下，讓它在你入睡後建立能量的連結。隨著連結的強化，你可能會有更舒適和安定的感覺。


    孩子很小的時候，一隻小狗就會來到他的家門口。這一隻在人們的期盼下來到的小狗，會變成陪伴孩子上學，保護他的伴侶。孩子也會學習照顧小狗來回報牠。當時的勒車犬（Lurchers）就擁有「狗」能量的完美藍圖。牠們優雅的性情和智慧，使牠們廣泛地被人們接受。


    孩子和狗始終都維持著非常親密的聯繫，孩子在十六歲結婚或加入祭司行列以前都會養狗。狗完成任務以後就會返回靈界。


    這隻狗會在孩子的整個成長過程中，確保孩子的安全受到妥善的保護。牠會讓孩子的海底輪、生殖輪以高頻率發光、旋轉和輻射。這為精通打下了絕佳的基礎。每一個家庭平均有三個孩子，因此也會飼養三隻勒車犬，為家庭提供很多樂趣、遊戲和非正式的活動。


    此外，每一個孩子都會養一隻兔子。兔子來自於有著「智慧星球」之稱的獵戶座。他們帶著重大的使命來到地球，其中一部分是擔任心的療癒者。孩子不高興的時候會抱著柔軟、毛茸茸的兔子，兔子就會用愛和智慧療癒他們。這使亞特蘭提斯的孩子始終保持一顆完全敞開和正常運作的心。這也是培養美好行止精通的絕妙基礎。


    孩子到了三歲左右就被分成小組，帶到大自然裡，讓他們了解大自然和靈界的事物。孩子的老師都很敬業。他們都是根據與不同年齡兒童的連結能力，分別甄選出來的。老師會鼓勵孩童探索大自然的祕密，引導他們用開悟的眼光看待生命。


    即使孩子年紀還小，老師也會教導他們培養集中、專注和想像力，因為當他們到達顯化和創造的年齡時，這些能力將會為他們運用心理控制的技巧打下完美基礎。


    無論孩子幾歲，老師都很注重培養孩子放鬆的習慣。學校是一個充滿平靜和快樂的地方。遊戲、歡樂、音樂和特殊的呼吸技巧，能使孩子放鬆，進而輕易地吸收資訊。「教育」字面的意思是發揮潛能，這正是老師們在工作時應該具備的意圖。


    孩子長大以後，就要練習細胞層面的放鬆技巧。這種練習能伸展 DNA 的十二股線，使它們完美地彼此接觸。這種連結會讓孩子汲取自己全副的潛能。


    亞特蘭提斯人不會把別人的知識灌輸到孩子們的心靈裡。相反地，他們專注於讓孩子的天賦、才能和靈魂知識自然地浮現。他們會鼓勵每一個人做自己最喜歡做的事。這種教育方式讓他們長大後，在靈魂的層面上變得快樂和充實。


    唯一被允許教學的資訊，是以靈性知識編程的高頻石英水晶。當孩子長大以後，就會被教導以直接的方式，或透過個人的教學石英水晶存取這些資訊。


    由於每一個人都有心電感應，他們只使用初級的語言，對文法毫無興趣。每一個人都用思想或意像進行心對心的溝通。他們會用意圖創造思想和圖像，並透過第三眼傳遞到對方的第三眼。比如說，如果你想知道孩子在做什麼，於是你發出一個心電感應的訊息，接著，你就會收到孩子直接從心裡發出來的圖像或視頻。


    創意、藝術和音樂是右腦活動，因此會受到鼓勵。運動負責維繫身體的健康，因此也很受重視。純淨的水、愛的成長、加持過的素食與快樂，是掌控身體健康的要素。


    以下是一個有助於你對個人頻率負責的觀想。


    ### 觀想：汲取內在小孩的天賦


    1. 準備一個可以放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。

    2. 安靜地坐著，舒適地呼吸，心裡懷著從內在小孩那裡提取天賦的意圖。

    3. 專注在已經啟動的地球之星上。

    4. 請大天使麥可（Archangel Michael）把祂深藍色的保護斗篷披在你的周圍。

    5. 想像三歲的你正在和一隻溫柔的棕色狗，在美麗的林地上快樂地玩耍。

    6. 你察覺精靈在草叢中飛舞，散發著光芒的天使正看著你。

    7. 一位明智的老師坐在樹下，你喜悅地奔向他。

    8. 他說出你所有的優點，提醒你看自己的天賦和才華。他甚至會說一些你完全沒有意識到的事。

    9. 他把你的生辰水晶交給你。水晶可能是任何顏色，而且形狀也可能與你想像的不同。當你把水晶握在手裡時，無論你是否意識到，它都與你的母星或行星建立了連結，即使是在另一個宇宙也不例外。

    10. 隨著你心中湧出歸屬感、安全感、自我價值感和希望的同時，你感覺自己放鬆了。

    11. 睜開眼睛，把自己帶到當下，讓這些美好的感覺在你的內在成長和擴張。


    ## 第五章 開悟大師的回歸與冥界廳


    一九八七年的諧波匯聚（Harmonic Convergence）使開悟重返地球。亞特蘭提斯沉沒以後，紫色火焰和聖雄（Mahatma）之類的精神能量都被撤回了，以確保這一類能量只被那些心地保持清淨的人處理。雖然地球上所有的靈魂心裡都有清淨，但大多數靈魂都遺忘了如何提取。只有某些攜帶了足夠明亮光能的靈魂，才能使高層次的勢域和星際議會從啟明的次元裡看到他們。不過，這就足以使能量返回地球了。


    揚昇過程的重要性在於，現在發生的一切都是在亞特蘭提斯二十六萬年前實驗開始就計劃好的。其結果是，受過高度訓練的大師靈魂團體，同意在同一時間化身到地球來。他們都同意穿越失憶的遮幕，忘記自己的來源。這個遮幕包括七個階層的幻相。它確保了每一個大師，都能在非常人性的環境中生活。唯有如此，他們才會教導並帶領數百萬快速覺醒的靈魂，進入新的寶瓶時代（Golden
    Age of Aquarius）。你很可能就是其中之一。


    在過去的一千年中，許多大師在其他的化身或內在的層面上，達到了靈性覺悟的巔峰。這引發了一股巨大的期望感，來自宇宙各角落的存在來此聚集，一起見證並支持這個正在發生的轉變。他們都以自己獨特的方式提供協助。


    每一個化身的大師都掌握了一把開啟這個過程的鑰匙。每一個大師都帶來一項與靈魂群體中其他光能協調一致的獨特天賦和才能。這創建了一個以最高光能為目標的龐大大師團隊。


    靈魂團隊的主要成員覺醒後，就立刻聚集成一個統一的群體。來自亞特蘭提斯、列木里亞大陸（Lemuria）、埃及和所有其他進化文明的大師們，都憶起了自己的真實身分，以及多生累世以來與自己有過連結的其他靈魂。


    這些連結具有不可思議的強大威力。他們會讓靈魂感到一股驅力，促使他們搬遷或改變所在的環境。如此一來，即使他們彼此並不認識，也會像團隊一樣展開積極的合作。他們來地球是為了維護、支撐和啟發第一波的揚昇過程，並用愛帶領世界前進。


    第二波的過程在二〇一五年九月開始匯聚動能，核心小組首當其衝地發揮了領導作用，為社會結構的實體轉變做準備。


    二〇一二年以前，包括瑪雅文明在內的許多文明，早就預見了世界末日的來臨。但瑪雅人真正看到的，是緊接著二〇一二年十二月二十一日宇宙時刻（Cosmic Moment）之後的一頁空白。


    擁有高頻率的祭司也無法窺見在「宇宙時刻」結束的亞特蘭提斯以後的紀元。有關這個時期的預言，大多數都是由攜帶第三次元振波的靈魂在通靈後撰寫下來的。你無法解讀超越自己的振波，這意味著，他們的預測都是扭曲且無效的。宇宙的未來完全會受目前的地球人，特別是揚昇大師的影響。


    愛與正面的創造是覺醒大師們最重要的職責。他們同意藉由敞開自己的心，幫助人們敞開心靈。而這些知識和愛，已經在全球錨定了一張浩瀚無邊的光網。社交媒體讓這個過程變得輕易了。它讓來自地球兩側的靈性團體，透過按鍵把能量集中起來。高級和初學者的支持小組會定期集會，擔負起引導他們靈性成長的責任。新一波的大師們正隨著這個振波的增加和成長向前邁進。


    當一定的比例的存有覺醒時，高能勢域就會退場，讓他們自己做決定。自立是精通最重要的面向之一。


    許多這一類的靈魂都在一夜之間覺醒。他們選擇在最適當的時間和地點這麼做。他們很容易辨識，因為他們對宇宙的運作有廣泛又直接的了解。


    曾經在地球上度過生命的大師都前來提供幫助，其結果是，從更高的次元就能清楚地看見地球發出的金光。這些光之工作者現在開始運用冥界廳的知識來加速揚昇的過程。


    ## 冥界廳


    冥界廳（Halls of Amenti）是高層領域裡一座浩大的宇宙圖書館。這些廳是宇宙天使為了記錄所有已知宇宙的靈性成就而建立的。


    冥界廳不同於阿卡西紀錄（Akashic records），因為後者記錄的是在地球上化身者的生命經驗。許多有天賦的靈媒都能存取阿卡西紀錄，但也只能存取那些振波與自己搭配的資訊。那些振波較高的人，才能深入靈魂更輝煌的歷史。然而，應該注意的一點是，當事人的指導靈和天使有時會刻意阻止這些紀錄的存取，因為與靈魂使命無關的前世資訊，往往會分散他們的注意。


    冥界廳是一個充滿光與愛的揚昇空間。來自各個時空的所有大師，都擁有自己的房間。每一個房間裡的資訊，都會隨著靈魂在選擇的道路上前進而擴張。


    阿努比斯軍團就是為了保護這些空間而創立的。他們以非常謹慎的態度保護著這些空間。


    亞特蘭提斯沉沒時，許多大師趕在冥界廳落入歹人手裡以前，就匆忙地把它塞滿了自己的資訊。隨著地球振波的上升，來自亞特蘭提斯黃金紀元的科技和靈性工具又再度可以任人取用了。


    冥界廳有幾個入口點。一個是通過空心地球（Hollow Earth）首都的阿加斯（Agarths）找到的，另一個是在獅身人面像的腳底下。有人說，在這個點上可以很清楚地感到冥界廳的振波。西藏、希臘、美索不達米亞、馬丘比丘的大金字塔與瑪雅金字塔也可以進入。


    冥界廳令人嘆為觀止。入口處有一個金色的大門，進入後，有一條由火把照明的金色隧道。進入這條隧道的人，他們的揚昇之路就會加速，並會受到更嚴苛的考驗。通過這些啟蒙的人，就會站在第一階有守衛的門口。阿努比斯的哨兵會藉由掃描靈魂的光體，評估他們的振波，再決定是否要讓他們通過。


    冥界廳的第一層像一個浩瀚無比的房間。房間裡有所有為宇宙服務的大師名字。這個空間一直延伸到觸目所及的遠方，裡面點著液態黃金的火炬。漂亮的沉思座排成一列，讓訪客在這裡休息，吸收美麗的頻率。


    房間的盡頭有兩個金色的哨兵，守衛著大師房間的入口。只有在地球上啟蒙過的靈魂才能進入。有些大師往往要在門口站很多年才能獲准進入，而且他們的啟蒙往往充滿了挑戰。


    門打開以後，大師便可進入第二層充滿靈性遺產的金字塔。有的大師會選擇把這個房間當做靜修所，在入睡的時候前往冥界進行各種計劃。


    空心地球的奧祕保存在冥界廳的第三層。這一層仍然與地球的能量連結，但它的範圍浩大，要花好幾生的時間才能完全探索。手上握著白色揚昇火焰的瑟若佩斯·貝（Serapis
    Bey），就在這個第七次元的空間裡。


    第四層連結著銀河系的大師。這個廳含有外星人和宇宙天使的知識。它發出的是第八或第九次元的振波。


    第五層是獻給宇宙普世智慧的。源頭可以觸及這個第十次元的階層。


    第六層還沒有被人類的心靈探索過，但據說它蘊含了恆星的光與愛。揚昇大師托特（Thoth）試圖在睡眠中進入這一階層，但卻被告知必須先在自己的宇宙中做進一步的發展。這個階層的振波已高達第十一次元，有時甚至會觸及第十二次元。


    第七層裡充滿了清淨的源頭之光。這個源頭之光會傳遞給熾天使（Seraphim）和創造之龍（Dragon of Creation），因為祂們要用光和愛來建造新的宇宙。這個廳會發出與源頭對應的第十二次元振波。


    ### 觀想：與冥界廳連結


    1. 做好冥想的準備。把注意力集中在白天的冥界廳，發出要去拜訪的意圖。

    2. 選擇一個不受干擾的空間，希望的話，可以點一支蠟燭。

    3. 召喚阿努比斯軍團來密封你的神聖空間，並引導你前往冥界廳的入口。

    4. 站在門口，陳述你想進去的意圖。感覺從這個神聖空間裡流瀉出來的金色共振。'
