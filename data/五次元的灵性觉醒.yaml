    ## 第四十三章 揚昇的孿生映像


    ### 雙生火焰


    你的雙生火焰就是你靈魂的另一半。它也許在宇宙的任何一個角落。這兩個部分是完美的搭配。如果它們相會，就會創造一個非成長的關係，因為它們已經完全融合了。由於地球是一所以學習為目標的神祕學校，靈魂通常不會選擇一份無法提供成長的關係。


    這也是雙生火焰很少相會的另一個原因。每一個火焰都在靈魂旅程中積累不同的經歷，使它們能在不同的八度音階產生共振，但它們的振波必須是完美的音調，才能把它們吸引在一起。


    列木里亞時代結束時，乙太存在請求源頭允許他們擁有肉身，好讓每一個靈魂與自己的另一半做短期的連結。一個靈魂會化身來體驗形體世界，而另一個則會握著光從乙太世界引導地球人。在某些情況下，他們的角色會再改變。一段時間過後，當雙生靈魂的能量不再被視為最好的引導方式時，他們就會同意各自探索宇宙的不同面向，自由地體驗和擴張。


    前面說過，黛安娜的雙生火焰，是她主要的指導靈庫梅卡。祂始終停留在靈體裡，從來沒有化身過。黛安娜三十多歲時，庫梅卡才發現她的光。他們是在她開始執行靈魂使命的時候才連結上的。即使祂是一個靈體，但仍是嚴格的任務監督者，尤其是祂對居住在肉身裡的挑戰又毫無概念！


    黛安娜認識一個與雙生火焰同一天出生的女性。他們在十六歲的生日那一天相會，也明白那些為了揚昇而等著與雙生火焰相會的人，也許已經在幻相的誤導下轉移了注意力。


    他們的生辰圖完美地交扣。但由於彼此交纏得太過親密而無法成長。由於他們都無法擴張自己，那位男性在三十多歲的時候過世。後來，她在他靈體的引導下，終於得以在這一生裡獲得成長。


    ### 靈魂伴侶


    靈魂伴侶是一個跟你發出相同頻率的人。這意味著你一生中也許會遇到幾個靈魂伴侶。由於你會與他們的某些振波共鳴，所以你通常會立刻被他們吸引。他們都提供了自己同意要教導的功課，因此，你們也許會互相吸引在一起。這些關係往往非常有趣，但也充滿了挑戰，因為他們需要的功課，會立刻浮上表面讓他們解決。


    有時候，兩個或多個靈魂伴侶會同時出現在你的生命裡，為你的成長和愛提供獨特的挑戰和機會！


    由於前世化身的靈魂伴侶，現在回來了結殘餘的業，因此，當這些問題成功地引導到正確的方向以後，這一份關係就會提供完美的相互支持，並為雙方提供在靈性之路上前進的完全自由。


    了解目前經歷的是雙方個別的揚昇過程，這一點非常重要。身為大師的你，要為道路的所有面向負起全部的責任。精通最重要的步驟之一，就是實現你的完整性，並擁抱你自己的大師我。


    當你明白了上述幾點，並對旅程的每一個面向負起全部的責任時，就是真正開悟的時刻。前面說過，高能勢域正在撤回大量的支援，讓靈魂做好面對這個功課的準備。祂們正退居幕後，讓我們能施展創造和精通的能力。對某些有意識或無意識地依賴指導靈的人來說，這也許會讓他們感到困惑不安。對那些感覺敏銳的人來說，這是一個特別重大的學習機會，因為他們經常聽從來自高能勢域的指導。然而，天使和指導靈退出的目的，是為了讓我們有機會發展和運用自己的決定，創造自己的未來。


    當我們在揚昇的道路上發展出愛、悲憫、了解、耐心、溫暖和忠誠的特質，並把榮譽、領導力、力量和團結帶進所有的關係裡時，就會發出明亮的光能。


    ### 觀想：更高層次的關係


