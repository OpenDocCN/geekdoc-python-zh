    7. 觀想一份以純愛和信任為基礎的關係。這也許是現在的友情、親密關係或伴侶，或者是你希望吸引的一份關係。

    8. 看著這種柔軟、粉紅色鑽石能量，從你的生殖輪擴張，並觸及另一個人的生殖輪。

    9. 想像你們的生殖輪發出與真愛相同的光芒。

    10. 設定你想在這一生顯化的意圖，開始把它吸引過來。

    11. 請求大天使加百列為了你們的至善灑光。'
