    開悟就是從一個更高、更廣的視角看一切。當我們學會這麼做的時候，就會知道宇宙中存在的只有愛，因為其他的一切都是幻相。這種對生命的深刻了解便足以轉化我們整個存在的方式和關係。


    精通意味著對發生在我們身上的一切事負起責任。它是告別內疚、譴責、傷害和憤怒。當我們把投入這些情緒上的能量收回來時，就會取回自己的力量。大師堅強不屈，昂首挺胸，他會憑著內在的智慧行動。


