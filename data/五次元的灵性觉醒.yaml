    你想蓋房子的時候，會先在心裡生起一個畫面。然後你會與建築師討論，接著，完成設計圖和達成協議。最後，你就能真正地預設它的結果了。然後，你必須啟動它。你的下一個任務，就是建造並居住在那個房子裡。只要你是為了所有人的至善，那個房子就會成為一個充滿喜悦和快樂的地方。


    ### 觀想：拜訪萬有合一廳


    1. 準備一個能讓你放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。

