    \n這裡要介紹幾個準備幫助你的啟明者。\n\n## 蘭托大師\n\n蘭托大師（Master Lanto）是地球有史以來最有愛心的啟明大師之一。祂充滿愛的心流瀉出金黃粉紅色的光。更奇妙的是，當祂來到地球時，由於祂的心輪處於過度發展的狀態，以至於人們可以透過祂的皮膚看到祂發光的心輪。\n\
    \n祂現在同意擔任「智慧與啟明第二射線」（the Second Ray of Wisdom and Illumination）的大師。祂的能力遠超過職位所需的資格，但祂巨大的魅力，會使這個輻射光加速每一個人的精通和開悟。\n\
    \n就像身兼梅林賢士（Mage Merlin）的聖哲曼（St. Germain）一樣，蘭托也是鍊金術大師。這意味著祂有把光顯化為實物的能力。\n\n祂的靜修處美國懷俄明州的提頓山脈（Teton\
    \ mountains）上空，祂曾是皇家提頓靜修議會的大師（現在祂的職位由揚昇大師孔子繼任）。這裡也是大白兄弟會聚會的地方。祂在這些山脈的上空放了含有基督之光的金色啟明火焰，用來影響所有準備接受祂智慧的人。祂還在大天使約菲爾和克里斯汀（Archangel\
    \ Chrestine）位於中國的靜修處，錨定了金色的啟明火焰給予中國人支持。\n\n祂的前世是把政府、法律、音樂和藝術體系引介到中國的黃帝（Yellow\
    \ Emperor）。祂也支持道教。一千五百年後，祂又化身為中國的統治者周公（Duke of Zhou）。同樣地，祂也是一個明智、以身作則，並堅信人天和諧的管理者。祂曾在多生多世中研究和實踐智慧與愛的治國之道。我們地球人能接通祂的頻率，並能從祂非凡的光中受益。\n\
    \n### 觀想：會見蘭托大師\n\n1. 找一個能讓你放輕鬆、不受干擾的空間。\n2. 想像一個酷熱的天氣，你站在一座純淨、發光的白色瀑布下面。\n3.\
    \ 帶著清潔和淨化的感覺走出瀑布。站在燦爛的烈日下把自己曬乾。\n4. 察覺蘭托大師走過來。祂的氣場閃著黃色和粉紅色光，心輪閃著粉紅色的光。\n5. 當祂走過來時，你能感覺祂金色的智慧和無所不包的愛流過全身。沉浸在祂的能量裡，放輕鬆。\n\
    6. 蘭托大師微笑者邀請你一同前往提頓山脈。\n7. 你和祂來到山脈，一起站在啟明的金色火焰裡。\n8. 祂逐漸褪失，讓你的氣場閃耀著金色和粉紅色光。\n\n\
    ## 巴巴吉\n\n巴巴吉（Babají）是「尊敬的父親」的意思。祂是大雄化身（Mahavatar），也就是「偉大的化身」，堪稱地球有史以來最偉大的化身之一。祂被稱為不死的化身，因為祂超越了死亡，已經為人類服務了數千年之久。祂可以出現、消失，或隨心所欲地讓自己隱形。\n\
    \n巴巴吉與基督之間一直保持著往來和溝通。祂們共同為了改善世界而努力。\n\n祂也追蹤個人與人類的進步情況。黛安娜接收過一張太極課的照片，照片上有一個光彩奪目的氣泡，氣泡裡的巴巴吉靈體在觀看上課的情形。另有一次，她家裡開辦瑜伽課時，那個氣泡出現在老師前面。氣泡裡同樣有巴巴吉的靈體。祂這一次是在觀察和評估瑜伽老師的靈性進展。\n\
    \n當黛安娜在一把搖椅上放鬆，沉思著這一章要寫誰的時候，她想到了巴巴吉。沒多久，巴巴吉就化現了。祂置身在一個懸浮的、莊嚴透明的光球裡。黛安娜感受到一種很祥和、平常的感覺，她只有喜悅，沒有任何敬畏之情。在一般的情況下，她心裡想問的重大靈性問題都會從心裡消失，但這一次，她問了一個與氣泡有關的問題。它是一個高頻的氣泡嗎？祂提醒她，每一個化身的存在都必須與天使同行，以免人類的熱情干擾業力的平衡。這就是為什麼即使是最偉大的大師，被我們所見的時候都隔著天使氣泡的原因。以巴巴吉的情況來說，氣泡是祂的守護天使。由於我們的天使在靈性上的進步，祂們也像我們一樣會提高頻率。巴巴吉就像熾天使一樣，閃爍著不可思議的光彩。而且，它是完全清澈的。這表示天使都使用主動的陽性能量，而不是乳白、不透明、被動的陰性光。顯然，這是為了保護巴巴吉不受人類低頻率的傷害。祂發出的是第十二次元的頻率。\n\
    \n那天晚上，巴巴吉再度出現在飄浮的氣泡裡，並邀請黛安娜陪祂一起出遊。她的靈體立刻進入祂的氣泡，坐在祂身邊。他們一起飄到喜馬拉雅山頂，祂向她展示揚昇世界和我們都在追求的光榮未來。一切似乎都有可能發生。\n\
    \n令人驚奇的是，接下來的幾天，她和來訪的提姆都能感受到巴巴吉留在房間裡的能量。\n\n閱讀與巴巴吉有關的書籍或呼喚祂，都會自動帶來靈性的祝福。你會在瞬間被難以理解的十二次元能量觸動。這種能量會劇烈地推動你邁向開悟的精通之旅。\n\
    \n### 觀想：會見巴巴吉\n\n1. 找一個安靜、不受干擾的地方。\n2. 一個半透明的大氣泡正向你飄來。聲譽卓著的巴巴吉正盤著腿坐在裡面。\n3. 光球飄到你的位置時打開了，你發現自己坐在巴巴吉的身邊。\n\
    4. 你們在喜馬拉雅山脈湛藍的天空裡滑翔，你感受到祂難以置信的祥和與洋溢的喜悅。\n5. 你也許會聽到熾天使的歌聲。\n6. 在一秒的微分之幾的時間內，你看到巴巴吉第十二次元的世界願景。深呼吸，因為這個動作會無意識地照亮你。\n\
    7. 當你和巴巴吉一起飄回起點時，升起的太陽預兆著一個新世界的來臨。\n8. 永生的巴巴吉（Avatar Babaji）化身消失前，留下一些指導性的思想給你。\n\
    9. 你向巴巴吉大雄致謝。\n10. 睜開眼睛，知道你已經啟動了開悟和精通的內在鑰匙。\n\n## 約西亞大師\n\n約西亞（Josiah）是一個知名度較低的啟明者，然而，祂還是有很多可以教導我們的知識。祂來自天狼星（Sirius），現在是第九射線的因果輪尊主。\n\
    \n祂曾經做過猶大的國王。八歲那年，祂的父親阿蒙（Amon）被謀殺，使祂失去強大的男性影響力和保護者。然而，這反而增強了約西亞的力量，祂後來推動宗教改革，把純正與善良帶進教會。\n\
    \n祂有一世化身在龐貝城（Pompeii）。龐貝城被火山爆發摧毀時，祂在一場大災變裡喪生。祂保持鎮定，對該怎麼做了然於胸。祂與和平和智慧的大天使烏列爾合作，以橋梁的角色幫助祂人轉型。祂無私的舉動，使一些人得以揚昇，許多人也從祂那裡得到了極大的幫助。\n\
    \n黛安娜的指導靈庫梅卡（Kumeka）第一次提供寫《揚昇彩球》（Ascension Through Orbs）的資訊給她時，讓她大吃一驚。這對她產生了巨大的影響。即使到現在，她仍然要求自己在死後，她的靈魂也能成為幫助別人過渡的橋梁。終其一生地幫助別人到生命的最後一刻，似乎是一種美好的服務精神。\n\
    \n約西亞仍然會幫助解決火山和地震帶來的災難。如果你聽到或看到天災地變的消息，記得請祂和祂的光之工作者團隊來幫忙。無論在任何地方，祂都會帶來超越的愛。\n\n\
    ### 觀想：會見大師約西亞\n\n1. 找一個能讓你安靜的地方。願意的話，可以點一支蠟燧。\n2. 將你的地球之星視作一個巨大的、讓你接地的銀球。\n3.\
    \ 讓大天使加百列把祂那顆純淨和保護用的偉大鑽石放在你的上方。你感知自己坐在裡面。\n4. 覺察偉大的約西亞大師站在你面前。祂伸出手，你握住它。\n5. 你跟祂來到一座雄偉的靈山上。山腳下有成千萬個受驚的靈魂在呼救。\n\
    6. 你和約西亞大師走入人群，散佈祥和與平靜。\n7. 美麗、智慧、金色的大天使烏列爾跟你合作。\n8. 接著，你的靈體架起了一座大橋。這些靈魂都踏著你，進入更高的境界。\n\
    9. 你驚訝地凝視自己服務的結果。\n10. 約西亞大師感謝你，並提醒你在任何情況下，都要保有服務的意圖。\n11. 大天使烏列爾把金光放入你的氣場裡。\n\
    \n## 彼得大帝\n\n經過多生多世的貴族化身以後，彼得大帝（Peter the Great）在十七和十八世紀化身為俄羅斯的皇帝。祂為了改善俄羅斯而推動廣泛的改革，希望把它建設成一個偉大的國家。像多數偉大的大師一樣，祂也面對了人們的反對，但祂克服了這些反對，並在那一生結束後揚昇了。\n\
    \n祂在那一生中熱愛自然和動物，現在負責的是環境和保育運動。祂與守護動物的大天使斐利亞合作，讓人們了解哪些動物是靈性的存有。祂透過這種方式，幫助人類把意識轉向動物。當地球的污染者死亡時，祂和守護大自然的大天使波利梅克就跟他們合作，幫助他們了解自己製造的污染帶來的影響。\n\
    \n在亞特蘭提斯一項早期的實驗中，大陸到處都是巨象、猛瑪象、大鳥、大貓、大馬之類的巨型動物。這些動物變得非常有攻擊性，陸地幾乎不可能生活了。當所有和平的控制法都失敗以後，五個民族的代表召開會議，一起討論這種局勢該如何處理。俄羅斯、蘇丹、印度和秘魯的代表通過瞬間移動（teleport）來到亞特蘭提斯。最後，他們終於在公元前五萬兩千年，引爆了地下的核彈，希望殺死那些兇猛的野獸。這一次核爆的確滅絕了那些生物，但最後也賠上了所有人類的生命。其結果是，兩千年以後，隨著地球軸線的移動，亞特蘭提斯終於變成了五個島嶼。\n\
    \n那一場核爆炸的落塵仍然污染著地球，彼得大帝目前仍在深層進行清洗和療癒的工作。\n\n祂現在是第十一射線的因果輪尊主，並負責把和平與療癒的能量帶到地球。\n\
    \n### 觀想：會見彼得大帝\n\n1. 找一個能讓你安靜和靜止的空間。可以的話，點一支蠟燭。\n2. 讓你的根源深入蓋婭母神的心輪。\n3. 用口述的方式，把基督的黃金光芒導引下來做全面的保護：\n\
    \   「我，（姓名），召喚基督的金光。」\n4. 你覺察到一個大廳裡擠滿了聽環境議題演講的人。\n5. 彼得大帝站在講台後面，試圖影響群眾一起幫助地球。\n\
    6. 彼得大師看到你，跟你打招呼。祂請你守住清晰、美麗、無污染的地球願景。\n7. 散發著燦爛黃光的動物天使——大天使斐利亞就站在你身邊。祂發射的黃光打動人們的心，讓他們看到動物真正美麗的靈魂。\n\
    8. 彼得大師現在與你同行，向你展示一個深入地心的深坑。深坑裡充滿了亞特蘭提斯核爆殘留的放射性物質。\n9. 你們一起把白光傾注到深坑裡。\n10. 彼得大師把手放在你的肩上，感謝你的服務。\n\
    11. 祂請你再度跟祂合作，幫祂完成任務，並加快你精通之路的速度。\n\n# 第三十三章 沃斯洛尊主\n\n啟明的存在沃斯洛尊主，是宇宙的揚昇大師和光之尊主。來自另一個宇宙的祂輻射著第十一次元頻率。祂最初是通過大中央太陽赫利歐斯（Helios）進入這個宇宙，後來又通過覺性更高的海王星面向（Neptune）把頻率降低。\n\
    \n當地球意識發生量子轉移（quantum shift）時，祂曾在那個關鍵的時刻幫助過地球。祂是地球第四次元非物質的黃金時代——姆文明時期（time of\
    \ Mu）的一位智者，曾經協助當時的存在揚昇到第五次元。在那個時代以前，祂已經幫助祂們學習了來地球要學的東西，好讓祂們回到內在的層面。\n\n這位榮耀的揚昇大師，也曾在黃金亞特蘭提斯紀元幫助過地球。來自宇宙每一個角落的人，對參加亞特蘭提斯最後一次實驗的呼籲做出了回應。入選參加活動的十四萬四千名志願者，都能在第五次元的高層光譜發出振波。黃金紀元的第十二位男女大祭司，讓這些靈魂了解地球，並幫助他們維持自己的頻率。\n\
    \n當黃金紀元達到進化的巔峰時，他們邀請新的男女大祭司前來，讓人們做好準備，發揮內在已經編碼的天賦和力量，尤其是使用水晶科技的能力。沃斯洛尊主就是為了督導下一個步驟，而在這個時候來的。身為有史以來頻率最高的一位化身，祂的能量場裡攜帶的鑰匙和密碼，足以照亮亞特蘭提斯人第五次元的完整水晶藍圖。這些鑰匙和密碼也能使意識躍進，進而引發亞特蘭提斯人全副的偉大潛能。\n\
    \n由於我們非凡的地球目前正在經歷前所未有的雙次元變化，因此，偉大的沃斯洛尊主再度光臨。祂這一次是專門來幫助我們揚昇的。\n\n祂在靈魂之旅中精通了所有頻率，包括第九射線、和諧的黃射線以及至善平衡。事實上，祂在亞特蘭提斯時代掌握了陰陽能量的均衡與平衡，以至於讓自己變成雌雄同體。祂在二〇〇一年把第九射線帶回地球。祂並沒有採取任何肉身，而是變成這個射線的淡藍綠色（Chohan）光暈。\n\
    \n這種極高頻率的射線是美麗、溫暖的陽光黃色。它沐浴著那些在喜悅中取得它，並渴望把和諧帶給自己和地球的人。它的振波會觸發合作、團結、和平、渴望和完美的平衡。\n\
    \n沃斯洛尊主把這種陽光黃的能量，傾注到準備就緒的個人和團體靈魂的心智、脈輪和能量場裡，孜孜不倦地努力為新黃金紀元的人類意識做準備。祂的願景是幫助我們所有人順利轉型到更高層的領域。\n\
    \n陽光黃是一種快樂的顏色，吸收這種頻率就能像黃金亞特蘭提斯人一樣，體驗真正的喜悅、知足、恩典和至樂。此外，我們也能增強在金色揚昇之旅中飛翔的願望。當光之工作者從氣場發射這種黃光時，它就能使人成為新黃金時代的一座真理和智慧的燈塔。\n\
    \n沃斯洛尊主透過這一道黃光，不僅幫助我們了解了亞特蘭提斯黃金紀元的最高智慧，也療癒了我們靈魂深處的創傷。祂強化並平衡了細胞裡被低頻扭曲的所有鑰匙、密碼和神聖的幾何形狀。這使得神聖的至善和完美的健康，得以建立在充滿活力的模型裡。\n\
    \n這個射線是照亮並使十二個脈輪統一的射線之一。當它們變得平衡和活躍時，我們的十二股DNA鏈就會開始重新連結。這種情況會隨著越來越多人成為第五次元而發生。此外，自二〇一二年以來，更多嬰兒的十二股DNA會在出生時就已經連結好了。這些DNA股在啟動以前是惰性的，但由沃斯洛尊主指揮的第九射線的陽光能量，正在啟動它們的反應。你也可以要求獨角獸和宇宙鑽石紫色火焰，為那些準備重新啟動十二股DNA鏈的人清除、提高和賜福他們的能量。更多的奇蹟會隨著這種情況發生。\n\
    \n第九射線還有助於完全啟動我們的第五次元藍圖。它會點亮我們神聖潛能的所有鑰匙和密碼。如果我們準備好了，它就會讓我們以驚人的方式，參與新黃金時代的冒險。透過與沃斯洛尊主的融合，我們就能經驗到人間天堂了。\n\
    \n一萬年來，人類和地球上的大多數存在都是碳基的（carbon-based），因此，他們的脈輪旋轉緩慢，也只能接受並發出微弱的暗光。樹木、花朵、許多動物、人類與一些昆蟲，正在建立他們的第五次元藍圖。第五次元的十二脈輪柱正在下降，並錨定到他們的內在。隨著這種情況的發生，他們就會變成晶體結構，而不是碳的結構，進而讓他們能包含並輻射更多的光能。\n\
    \n這個加速轉變的過程正在地球上發生。大天使麥達昶和沃斯洛尊主正在把第四、五次元水晶能量，放在第三次元存在的周圍，讓他們能在覺醒的時候立刻發光。數以百萬計的人類會因此突然被啟明，並做好在新黃金時代佔有一席之地的準備。\n\
    \n地球的設計，就是為了讓我們能進入比自己更高頻率的兩個次元。活在第三次元的我們能連結到第五次元，偶爾也可以連結到第七次元的天使界。因此，一個第三次元的人也許偶爾會有開放、慷慨、真誠合作與無私的時候，但終究還是會回到他熟悉的模式裡。第五次元的人，才能更穩定地連結第七次元的天使和大師。此外，他們還可以連結到令人敬畏，有著難以想像的輕盈又充滿喜悅的第九次元。\n\
    \n因為這個緣故，從二〇一二年的宇宙時刻以來，我們已經能在地球上取得第九次元的能量了。其中有一些是昴宿星團的藍色宇宙玫瑰、宇宙鑽石的紫色火焰、基督聖雄、基督的金射線、宇宙之心、瞬間太陽、第九次元獨角獸和獵戶座大師的光能。\n\
    \n在地球的頻率開始升高以前，偉大的大師和天使們正圍繞著地球創建一個第七次元的網格，向我們照射更高頻率的光能，為地球揚昇到第五次元做準備。沃斯洛尊主和大天使"
