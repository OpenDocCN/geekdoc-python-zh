    10. 她用雙臂抱著你，對你說你是完美、被愛、美麗或英俊的。

    11. 她鼓勵你，並提醒你記得她完全愛著你。任何事都不能阻止她對你的愛。

    12. 你坐在睿智、有愛心的父母中間，感受著父親的堅強和母親的溫暖。你有一種安全和被支持的感覺。

    13. 想想你的家庭和工作，傾聽他們正面的輸入和關愛的支持。

    14. 從現在開始，每當你害怕、孤獨或感到自己不夠好的時候，傾聽他們的聲音。


    ## 第二十三章 學堂五：隱藏在自然界的密碼


    被自然界包圍是地球生活的樂趣和賜福之一。人類有責任照顧草木植物，以及它們所支持的蟲魚鳥獸。


    偉大的第九次元大師潘（Pan）負責照顧大自然，監督精靈，並幫助自然界在地球上的繁榮滋長。幾年前，黛安娜在樹林裡散步時遇過祂。祂靜立在一道巨大的光芒裡，安靜地看著黛安娜。當潘把鑰匙和密碼下載給她時，她入迷得無法動彈。接著，祂就消失了，留下她在驚奇和詫異的狀態下安靜地走著。


    來自另一個宇宙的大天使波利梅克（Archangel Purimiek），是要幫助大自然揚昇的。祂散發美麗的碧綠色光，監管綠色的大地。如果有人毫無必要地砍伐一棵樹，祂的天使就會輕聲細語地勸阻那個人。


    ## 第二十三章 學堂五：隱藏在自然界的密碼


    潘大師和大天使波利梅克兩個偉大的存在，經常到學堂與庫圖彌尊主合作，幫助宇宙的灵魂了解隱藏在大自然裡的密碼。


    地球是一所神祕的學校，我們要尋找的答案能在許多地方，尤其是在大自然裡找到。綠色是大自然的首選之色，因為綠色透過昴宿星團，合成了源頭的藍色、智能的淡黃色和太陽快樂的黃色。在象徵出生和更新的春天，充滿希望的新葉是陽光的黃綠色，並非一件偶然的事。


    綠色是平衡的顏色，這種振波會護持地球上所有的生命。生活在花草樹木圍繞的環境裡，會讓人有更快樂、更平靜的感覺。


    費波那西序列（Fibonacci sequence）和黃金分割，是支配花草樹木、蝸牛和大自然生長的神聖幾何形狀。神聖的幾何形狀會吸引天使的聲能。這意味著天使會對這種特殊的神聖比例建構的任何東西唱歌，並淨化它周圍的能量。例如，使用這種幾何形狀建造大教堂，它裡面發出的天使諧波就會促使奇蹟發生。奇蹟也會在樹木下和植物的周圍發生，但我們比較不太能察覺這一類的奇蹟。


    植物都經過仔細的編碼。例如，療癒性植物是按照神聖人體器官的幾何形狀編碼的。舉例來說，肝臟有缺陷的人攝食護肝的草藥時，草藥中健康的第五次元藍圖就會覆蓋肝臟，使肝臟按照完全的健康狀況重新排列。星際議會已經提供了會帶來完美記憶或深度放鬆的其他植物和草藥。亞特蘭提斯黃金紀元的人沒有業力，只要攝取植物就足以讓他們恢復。'
