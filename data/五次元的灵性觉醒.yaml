    6. 你一面走，一面看著小徑兩旁的綠色田野。突然之間，日出把草地灑滿了金光。一切都讓人驚艷，你的心裡也跟著起了一些變化。

    7. 你覺察到鋪滿小路和草地的粉紅色花朵。陽光灑在花上，照亮了許多你平常不會注意的人和動物。你的心瞬間充滿了對所有眾生的愛。

    8. 你繼續前進，陽光傾灑在環繞你的紫色天使身上，花朵隨之散發一絲紫色的光芒。你敞開著心，對地球上的人懷著悲憫和同情。你真的關心他們發生的事。

    9. 快走到山頂的你，可以看到螺旋小徑的盡頭發出純白色的光。

    10. 莊嚴的宇宙天使馬利亞和大師馬利亞、聖克萊爾、錫耶納的聖凱瑟琳、觀世音、亞維拉的聖德蘭、耶穌和聖哲曼在為你歌唱，讓你的心裡充滿了純愛的密碼。你張開雙臂，把這些都吸進來。

    11. 你的心是一朵完全綻放的純白色、第五次元的玫瑰。你也許能聞到它散發出來的香味。

    12. 你從山頂俯瞰，看到人們的我執正在彼此衝突。你用覺悟的眼睛，看到他們的高我正彼此手牽著手。

    13. 你把愛散發給每一個人。那裡只有愛。你與所有的人合一了。

    14. 淺海藍與白色交織的薄絲披風，把半透明的淡粉和深金色灑在你的能量場上。

    15. 最後，你帶著完全敞開、散發光芒的鑽石心，返回起點的時候到了。


    ## 第二十五章 學堂七：高層覺知


    來這個學校參加學習的存有，已經準備接受進入高級的開悟了。他們知道地球上的萬事萬物都是完美的。對生命來說，這裡是精密法則的偉大實驗場。然而，智力上的了解是一回事，本質上的感受和生活上的應用又是另外一回事。一切事物都要遵循靈性的法則運作。對地球上發生的某些事，我們該如何改變自己的看法呢？這個學堂裡的學生，會從開悟的角度來看待一切。


    切記，除非自己的靈魂允許，否則任何人都不會發生任何事。如果有人正在經歷壓力或挑戰，這必然是基於一個或幾個理由才會發生的。


    主要的一個問題是，靈魂希望償還業力，尤其是在現在這個時候。因為從二○一二到二○一三這二十年間所提供的靈性成長機會，是宇宙前所未有的。


    地球上的基本業力法則——你給出什麼就得到什麼——仍然是支配一切事物的至高法則。這也適用於前生與來世。我們現在正處於這個機會的末期。從現在開始到二〇三二年，在新黃金紀元開始以前，是讓我們在這個種存在層面，完成業力的最後一個機會。在靈魂的層面上，確實有數十億的存有渴望償還自己的業力，讓自己獲得自由。他們真的想學習自己的功課，以便掌握提供給他們的宇宙提升機會。那些準備好，也在靈性上達到平衡的人，會有參與地球新黃金時代的驚人機會。


    以下是對其他挑戰性的生活經歷，可以採取的高層觀點。


    靈魂可能很勇敢、很願意付出，因此接受了艱鉅的考驗，以便把經驗傳給別人，使他們能揚昇到地球的下一個黃金階段。例如，一個人也許會在靈魂層面同意讓自己成為殘障，好讓親人了解無私的奉獻和關懷，並在自己的氣場建立許多高頻的特質。殘障者的靈魂也許想學習耐心、感恩，想放棄控制、依賴。這些也許不是憑著業力決定的，而是想成長的渴望，甚至是為了獲得高頻率的啟蒙。老靈魂會為了受難和啟蒙，而選擇許多嚴峻的挑戰。


    除非所有參與劇碼的靈魂都同意，否則什麼事都不會發生在你身上。除非你的高我同意參與，否則你不會以某種特定的方式死亡。


    在很多情況下，參與艱困處境和人際關係的雙方，都是為了互相教導重要功課的靈魂伴侶。多年前，黛安娜跟母親有過一段非常艱困的關係。她嘗試過各種解決的辦法，但這'
