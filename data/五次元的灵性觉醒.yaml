    這個廳裡的學生還會學習到的是，當你把愛的藍圖放在一個人或情境上面時，它就會療癒你扭曲的視野和認知。當有足夠多的人都這麼做時，它就能轉變信念，修補愛破碎的鑰匙和密碼，重新排列它們，以恢復原來的神聖計劃。


    對一個人抱持純粹的意圖，也能幫助那個人實現目標。你可以透過與一個人或為一個人保存那個願景，而幫助他實現那個願景。


    黛安娜曾經收過一封讀者的來信。這個男人有一個被他形容為懶惰，對任何學術成就都不感興趣的兒子，不過這個男孩很聰明。父親用盡一切辦法想激勵他發揮自己的潛能，但仍然無濟於事。他問黛安娜是是否能描繪一幅孩子在學校表現優異的願景。她同意了，並向宇宙發出一張清晰的畫面：男孩輕鬆、快樂，並且在學校有非常出色的表現。她說自己不該對結果感到驚訝，但結果確實讓他大吃一驚。學期結束時，男孩子的所有學科都名列前茅，並被學校選為橄欖球隊員。此外，他也充滿了上進的動力和快樂。


    父親對兒子的欲求被自己的懊惱、希望與執著渲染了。由於黛安娜從沒見過這個孩子，她描繪的願景裡沒有自己的執著，只是為了他的至善著想，所以靈性法則就會自動發揮作用。這就是為什麼應該邀請一個跟自己沒有聯繫的人，來描繪自己想要達到或吸引的畫面的原因。


    這個學堂裡的學生，都沐浴在清淨的鑽石白、金色鑲邊與淡粉紅結合的光裡。你把這些顏色和相關的光保存在自己的氣場裡，人們就會信任你的智慧，願意聽從你的話。此外，你也能幫助他們發揮自己神聖的潛能。


    ### 觀想：拜訪高層感知廳


    1. 準備一個能讓你放鬆、不受干擾的空間。可以的話，點一支蠟燭。

