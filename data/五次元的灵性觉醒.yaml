    # 第三十六章 女神大師


    # 聖女貞德／布拉瓦茨基夫人／錫耶納的凱瑟琳


    使祂們在精通上的屬性。


    聖女貞德（Joan of Arc）是一個具有非凡信念和熱情的偉大遠見者。雖然祂只是中世紀法國時的一個農家女，但聖麥可（St. Michael）和聖凱瑟琳（St.
    Catherine）的現身，都給祂留下了深刻的印象：祂是整個法國的救星，天主希望祂帶領法軍打敗英國，並告訴祂必須與法國王太子（Dauphin）查爾斯談話。祂不得不剪掉頭髮，女扮男裝前往覲見王天子。最後，祂果然領導法軍，在奧爾良（Orleans）贏得一場偉大的戰爭。然而，祂那一生的最後一次啟蒙是在火刑柱上燒死。火刑柱淨化了祂，使祂以壯觀的姿態揚昇。


    祂的第二個化身是十九世紀引導迪瓦爾·庫爾（Dwihal Khul）成立通神學會（Theosophical Society）的海倫娜·布拉瓦茨基（Helena
    Blavatsky）。海倫娜克服挑戰，成功地在世界上建立了「白色火焰」教團。


    祂的另一生是十四世紀義大利的錫耶納的凱瑟琳（Catherine of Siena）。祂這一生從小就擁有各種神祕和宗教的憧憬。祂成年後過著非常嚴格和純潔的生活，並創建了一個極其嚴格的教團。祂試圖當一名和平大使，也為了促進宗教間的友好寫了許多信件。祂在三十三歲那年過世，而三十三是基督之光的號碼。祂目前正在內層努力把靈性帶入宗教。'
