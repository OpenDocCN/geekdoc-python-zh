    # 星際精通


    指揮官阿斯塔(Ash tar)和瑟拉菲娜(Seraphina)與威武的熾天使,負責訓練十二個星際學校裡的存有,好讓他們擔任地球的大使。召喚阿斯塔指揮官,如果這一條道路適合你,祂會邀請你來參加這些學校。這個邀請會暫時存放在你的能量場裡,你可以選擇現在或以後接受。


    指揮官阿斯塔與馬可大師(Master Marko)密切合作。馬可大師是亞特蘭提斯的偉人,後來又成為印加文明的負責人。祂是我們太陽系裡最高銀河聯盟的代表。


    我們太陽系的首都在土星。它由一個九人議會和先進的團體意識掌管。在亞特蘭提斯黃金紀元時,男女大祭司都在那裡參加特別會議,他們的靈體會通過亞特蘭提斯大水晶的乙太公路進入土星。


    另一個協助你進行星際精通的大師,是星際議會的成員希拉靈尊主。祂與阿斯塔指揮官和馬可大師密切合作。祂目前是土星議會的地球談判代表。


    在整個宇宙裡工作的成千上萬個存在,特別值得一提的是非常有名的瑟若佩斯·貝。祂是亞特蘭提斯的大祭司,攜帶著亞特蘭提斯的白色火焰。亞特蘭提斯沉沒後,祂的靈體與大天使麥達昶和托特(Thoth)一起建造埃及的大金字塔。這一座宇宙金字塔與天狼星和獵戶座密切連結。這些恆星和星系的知識和智慧都來自銀河系。宇宙智慧的鑰匙和密碼'
  - '[PAGE 196]


    # 第三十一章 成為星際大師


    都保存在那裡。這是一台龐大的宇宙電腦。托特和瑟若佩斯·貝為了啟動地球的亢達里尼(kundalini)都曾進行過宇宙電腦的編碼。這個亢達里尼位於倫敦的地球之星裡。它在二〇一二年十二月二十一日上午十一點十一分的宇宙時刻升起過。同時,也開啟了三十三個引入基督之光的宇宙入口。


    瑟拉菲娜的星際學校處理的不只是地球這一個區域而已。訓練的內容涵蓋了不同的恆星系統。參加這些學校,會讓你真實地感知自己是一個宇宙的開悟小孩。


    因此,如果你對地球充滿熱愛,有一份想保護它的渴望,你也許希望接通一些能量,讓自己成為星際大師。


    星際精通的第一步,就是學習把脈輪與對應的恆星連結起來,因為恆星、行星和星系是宇宙的神聖脈輪。許多人目前正在做這個練習。由於這個練習非常重要,我和提姆·威德都透過研討會、CD或下載的文件教學。當你把脈輪與恆星連結起來時,你就開始把恆星的知識、智慧和光,下載到自己的脈輪系統裡了。由於光的手指會伸入宇宙並帶回淨光,你的氣場會變得更加強大、清晰和明亮。


    當你的第五次元脈輪插入以第七次元頻率振動的天體時,能量系統就會充滿必須加以吸收和整合的光。你也許會需要在休息的時候讓它發生。


    如果你深愛這個星球,也希望以宇宙人的身分提供服務,這麼做也許能幫助你認識一些星際大師,並吸收祂們的能量。大天使布提亞里爾(Archangel Butyail)是一位純白'
- md: "# 五次元的靈性覺醒\n\n的天使，負責宇宙流的流動，並確保它們與宇宙維持在和諧的狀態。當你提出要求時，祂就會帶你前往瑟拉菲娜的訓練學校。\n\n##\
    \ 觀想：會見星際大師\n\n1. 準備一個能讓你放輕鬆、不受干擾的空間。\n2. 安靜地坐著，舒服地呼吸，懷著與幫助你的星際大師相會的意圖。\n3. 專注在你已經啟動的地球之星。\n\
    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。\n5. 點一支蠟燭，獻給為宇宙服務的存在。\n6. 覺察正朝你走來的純白火焰。瑟若佩斯·貝從火焰裡走出來。祂站在你面前，凝視著你的眼睛。你也許注意到流進你心裡的光。\n\
    7. 現在，一道耀眼的金光照耀在你身上。你察覺阿斯塔指揮官微笑著喚醒你服務的記憶。這也許只持續不到一秒鐘，但它能幫助你做出一些重要的決定。\n8. 希拉靈尊主乘著一道橙色的閃光抵達。祂觸摸你的第三眼，瞬間點亮了你神聖藍圖裡蘊藏的高層可能性。\n\
    9. 最後，穿著星光燦爛的綠紫色斗篷的馬可大師站在你面前。祂向你伸出手，祂的光進入你的心裡。\n10. 你向大師致謝後離開。\n11. 你的氣場在擴張，把地球包圍起來。接著，再向宇宙延伸。\n\
    12. 你面前出現一扇標示了「星際訓練學校」的大門。如果你願意的話，可以把它打開。\n13. 純白耀眼的光芒充滿了整個空間。大天使布提亞里爾等著你做決定。\n\
    14. 如果你希望跟祂一起去瑟拉菲娜的訓練學校，祂會在你今晚入睡時帶你去。用白天的時間提高自己的頻率，好讓自己為這個最令人敬畏的靈性進展做好準備。\n\n\
    # 第三十一章 成為星際大師\n\n# 第三十二章 追隨啟明者的腳步\n\n開悟意味著從一個更高、更廣泛的角度覺察一切，觀照而不批判。用隱喻的意義來說，一位開悟的大師會站在山頂，觀察頂輪、第三眼和心輪都敞開的你，以及山下所有人的生命畫面。\n\
    \n敞開的頂輪表示你有威嚴、有力量地挺立著，你在主導情勢，並從浩瀚的宇宙裡接收高層的能量和智慧。你必須讓它接地。從靈性的角度來說，你是國王／女王或皇帝／皇后。\n\
    \n你的第三眼在高度拋光的水晶球裡。你可以清楚地看到，因為所有幻相的遮幕都已經化解了。彷彿你打開窗簾，透過一個非常乾淨的窗戶向外看。你可以透過人類誤解的迷霧，看到只有愛的神聖之光。你不必實際看到，只需知道那裡有愛就好。\n\
    \n你的心輪完全敞開，三十三片心瓣閃著白光。身為一個開悟的大師，你永遠不會執著心裡濃厚的情緒，因為你可以看到並感受到真理，也就是說，人的一切行為都是出於愛，或是前世靈魂服務協議的一部分。因此，你不需要批判，也沒有任何可以傷害的東西。\n\
    \n由於這個原因，第五次元高層開悟大師的藍圖都是完全健康和寧靜的。\n\n這種靈性特殊進展的時刻，我們都有實現這個目標的機會。所有希望在這一生成為行止高人的人，現在都可以追隨偉大啟明者的腳步了。祂們已經在我們前面開闢了一條小路，等著擁抱和幫助我們。當我們閱讀、談論和進入他們的頻率時，祂們的光就會觸及我們，推動我們前進。當我們自己也是行止高人的時候，就會轉而幫助別人。\n\
    \n我們追隨的所有偉大存在，都受過多生多世的任務訓練。祂們要讓你憶起，你的肉體和內在層面已經為這個特殊的、前所未有的一生做好了準備。不要低估規劃在你生命裡的力量。接受挑戰，活出一個不平凡的生命。這會影響你通往精通和開悟的靈魂之旅，你也可能影響成百上千的人。\n\
    \n這裡要介紹幾個準備幫助你的啟明者。\n\n## 蘭托大師\n\n蘭托大師（Master Lanto）是地球有史以來最有愛心的啟明大師之一。祂充滿愛的心流瀉出金黃粉紅色的光。更奇妙的是，當祂來到地球時，由於祂的心輪處於過度發展的狀態，以至於人們可以透過祂的皮膚看到祂發光的心輪。\n\
    \n祂現在同意擔任「智慧與啟明第二射線」（the Second Ray of Wisdom and Illumination）的大師。祂的能力遠超過職位所需的資格，但祂巨大的魅力，會使這個輻射光加速每一個人的精通和開悟。\n\
    \n就像身兼梅林賢士（Mage Merlin）的聖哲曼（St. Germain）一樣，蘭托也是鍊金術大師。這意味著祂有把光顯化為實物的能力。\n\n祂的靜修處美國懷俄明州的提頓山脈（Teton\
    \ mountains）上空，祂曾是皇家提頓靜修議會的大師（現在祂的職位由揚昇大師孔子繼任）。這裡也是大白兄弟會聚會的地方。祂在這些山脈的上空放了含有基督之光的金色啟明火焰，用來影響所有準備接受祂智慧的人。祂還在大天使約菲爾和克里斯汀（Archangel\
    \ Chrestine）位於中國的靜修處，錨定了金色的啟明火焰給予中國人支持。\n\n祂的前世是把政府、法律、音樂和藝術體系引介到中國的黃帝（Yellow\
    \ Emperor）。祂也支持道教。一千五百年後，祂又化身為中國的統治者周公（Duke of Zhou）。同樣地，祂也是一個明智、以身作則，並堅信人天和諧的管理者。祂曾在多生多世中研究和實踐智慧與愛的治國之道。我們地球人能接通祂的頻率，並能從祂非凡的光中受益。\n\
    \n### 觀想：會見蘭托大師\n\n1. 找一個能讓你放輕鬆、不受干擾的空間。\n2. 想像一個酷熱的天氣，你站在一座純淨、發光的白色瀑布下面。\n3.\
    \ 帶著清潔和淨化的感覺走出瀑布。站在燦爛的烈日下把自己曬乾。\n4. 察覺蘭托大師走過來。祂的氣場閃著黃色和粉紅色光，心輪閃著粉紅色的光。\n5. 當祂走過來時，你能感覺祂金色的智慧和無所不包的愛流過全身。沉浸在祂的能量裡，放輕鬆。\n\
    6. 蘭托大師微笑者邀請你一同前往提頓山脈。\n7. 你和祂來到山脈，一起站在啟明的金色火焰裡。\n8. 祂逐漸褪失，讓你的氣場閃耀著金色和粉紅色光。\n\n\
    ## 巴巴吉\n\n巴巴吉（Babají）是「尊敬的父親」的意思。祂是大雄化身（Mahavatar），也就是「偉大的化身」，堪稱地球有史以來最偉大的化身之一。祂被稱為不死的化身，因為祂超越了死亡，已經為人類服務了數千年之久。祂可以出現、消失，或隨心所欲地讓自己隱形。\n\
    \n巴巴吉與基督之間一直保持著往來和溝通。祂們共同為了改善世界而努力。\n\n祂也追蹤個人與人類的進步情況。黛安娜接收過一張太極課的照片，照片上有一個光彩奪目的氣泡，氣泡裡的巴巴吉靈體在觀看上課的情形。另有一次，她家裡開辦瑜伽課時，那個氣泡出現在老師前面。氣泡裡同樣有巴巴吉的靈體。祂這一次是在觀察和評估瑜伽老師的靈性進展。\n\
    \n當黛安娜在一把搖椅上放鬆，沉思著這一章要寫誰的時候，她想到了巴巴吉。沒多久，巴巴吉就化現了。祂置身在一個懸浮的、莊嚴透明的光球裡。黛安娜感受到一種很祥和、平常的感覺，她只有喜悅，沒有任何敬畏之情。在一般的情況下，她心裡想問的重大靈性問題都會從心裡消失，但這一次，她問了一個與氣泡有關的問題。它是一個高頻的氣泡嗎？祂提醒她，每一個化身的存在都必須與天使同行，以免人類的熱情干擾業力的平衡。這就是為什麼即使是最偉大的大師，被我們所見的時候都隔著天使氣泡的原因。以巴巴吉的情況來說，氣泡是祂的守護天使。由於我們的天使在靈性上的進步，祂們也像我們一樣會提高頻率。巴巴吉就像熾天使一樣，閃爍著不可思議的光彩。而且，它是完全清澈的。這表示天使都使用主動的陽性能量，而不是乳白、不透明、被動的陰性光。顯然，這是為了保護巴巴吉不受人類低頻率的傷害。祂發出的是第十二次元的頻率。\n\
    \n那天晚上，巴巴吉再度出現在飄浮的氣泡裡，並邀請黛安娜陪祂一起出遊。她的靈體立刻進入祂的氣泡，坐在祂身邊。他們一起飄到喜馬拉雅山頂，祂向她展示揚昇世界和我們都在追求的光榮未來。一切似乎都有可能發生。\n\
    \n令人驚奇的是，接下來的幾天，她和來訪的提姆都能感受到巴巴吉留在房間裡的能量。\n\n閱讀與巴巴吉有關的書籍或呼喚祂，都會自動帶來靈性的祝福。你會在瞬間被難以理解的十二次元能量觸動。這種能量會劇烈地推動你邁向開悟的精通之旅。\n\
    \n### 觀想：會見巴巴吉\n\n1. 找一個安靜、不受干擾的地方。\n2. 一個半透明的大氣泡正向你飄來。聲譽卓著的巴巴吉正盤著腿坐在裡面。\n3. 光球飄到你的位置時打開了，你發現自己坐在巴巴吉的身邊。\n\
    4. 你們在喜馬拉雅山脈湛藍的天空裡滑翔，你感受到祂難以置信的祥和與洋溢的喜悅。\n5. 你也許會聽到熾天使的歌聲。\n6. 在一秒的微分之幾的時間內，你看到巴巴吉第十二次元的世界願景。深呼吸，因為這個動作會無意識地照亮你。\n\
    7. 當你和巴巴吉一起飄回起點時，升起的太陽預兆著一個新世界的來臨。\n8. 永生的巴巴吉（Avatar Babaji）化身消失前，留下一些指導性的思想給你。\n\
    9. 你向巴巴吉大雄致謝。\n10. 睜開眼睛，知道你已經啟動了開悟和精通的內在鑰匙。\n\n## 約西亞大師\n\n約西亞（Josiah）是一個知名度較低的啟明者，然而，祂還是有很多可以教導我們的知識。祂來自天狼星（Sirius），現在是第九射線的因果輪尊主。\n\
    \n祂曾經做過猶大的國王。八歲那年，祂的父親阿蒙（Amon）被謀殺，使祂失去強大的男性影響力和保護者。然而，這反而增強了約西亞的力量，祂後來推動宗教改革，把純正與善良帶進教會。\n\
    \n祂有一世化身在龐貝城（Pompeii）。龐貝城被火山爆發摧毀時，祂在一場大災變裡喪生。祂保持鎮定，對該怎麼做了然於胸。祂與和平和智慧的大天使烏列爾合作，以橋梁的角色幫助祂人轉型。祂無私的舉動，使一些人得以揚昇，許多人也從祂那裡得到了極大的幫助。\n\
    \n黛安娜的指導靈庫梅卡（Kumeka）第一次提供寫《揚昇彩球》（Ascension Through Orbs）的資訊給她時，讓她大吃一驚。這對她產生了巨大的影響。即使到現在，她仍然要求自己在死後，她的靈魂也能成為幫助別人過渡的橋梁。終其一生地幫助別人到生命的最後一刻，似乎是一種美好的服務精神。\n\
    \n約西亞仍然會幫助解決火山和地震帶來的災難。如果你聽到或看到天災地變的消息，記得請祂和祂的光之工作者團隊來幫忙。無論在任何地方，祂都會帶來超越的愛。\n\n\
    ### 觀想：會見大師約西亞\n\n1. 找一個能讓你安靜的地方。願意的話，可以點一支蠟燧。\n2. 將你的地球之星視作一個巨大的、讓你接地的銀球。\n3.\
