    9. 祂們中間有一個巨大透明的黃玉球。你走進球裡。

    10. 你向正在發生的深度清潔臣服。你也許會感知或感覺一些舊有的東西浮上來等著被轉化。

    11. 庫圖彌尊主舉起一隻手，你接受下載的密碼。這些密碼正符合你下一階段的進化。

    12. 庫梅卡尊主舉起一隻手，你感知一件含有揚昇大師完美藍圖的薄紗披風，落在你的氣場上。

    13. 你往上看，看到一束很小的針狀高頻淨光。它點燃了你內心的希望和喜悅。

    14. 兩位偉大的光之尊主觸摸你的心輪，讓它變得比以前大了數百倍。

    15. 感謝光之尊主。感謝源頭在這一刻賜給你的恩典。

    16. 返回開始的地方，放輕鬆，好讓自己吸收這個經驗。


    ## 第二十七章 學堂九：在喜悅中服務


    當你的第五次元心輪敞開，開始為他人、社區和世界的至善服務時，它就會變成你的喜悅和歡喜。事實上，它會帶給你無比的至樂感，使你能散發別人看得到的光。


    由於這個緣故，充滿喜悅的服務是最偉大的揚昇途徑之一。它會吸引許多心懷熱望的人。如果你決定這是你的靈性之旅，你就會沉浸在學堂教誨的喜悅之中。


    懷著喜悅的服務不一定是你黃金揚昇之路的唯一焦點。無論你選擇哪一個途徑，你也許會希望它成為你本質的一部分。無論哪一種方式，你都可以先參加庫圖彌尊主的課程，再決定是否適合你。


    庫圖彌尊主已邀請大天使麥達昶，跟祂一起在這個廳裡教學。大天使麥達昶的光、智慧和知識，已經編碼到中央教學水晶骷髏頭裡，好讓這個不平凡的水晶骷髏頭輪流輻射大天使麥達昶的金橘色光，以及庫圖彌尊主的深黃色光。


    在領會這個訓練課程的奇妙以前，你必須先感覺並了解合一。只有當你的心對所有眾生的心敞開時，你才能真正體驗自己與源頭和眾生最深層的連結。這是你與源頭之愛建立連結的時候。這是大天使麥達昶和庫圖彌尊主，送給真誠渴望在喜悅中服務的揚昇大師們的一份揚昇禮物。


    由於這個課程的畢業生，都會沐浴在最美的金橘色和黃色的光裡，因此他們都會散發知足和快樂的光輝。當你把這種顏色帶入自己的氣場時，就會自動地把高層的揚昇教誨和愛傳播給別人。


    許多從事護理工作的人，都是這個學堂的學生或畢業生。這是他們的靈魂把他們放在這個位置的。那些在平靜和喜悅中完成任務的人，會在白天完成他們的靈體在睡眠時學習到的功課。


    許多老人現在都同意活久一點，好讓他們的子女或照護人，能在照顧他們時有敞開心輪的機會，讓他們順利地從這個學堂畢業。從靈魂的層面上來看，一切都是完美無瑕的。


    與人類相較之下，許多動物已經快速地揚昇了。原因之一，牠們用單純的快樂為你服務。如果你對自己的狗發脾氣，牠下一次看到你還是會喜悅地搖尾巴，很高興又能跟你在一起。動物的心是敞開的，牠們不用左腦處理事物。牠們活在一個右腦充滿智慧、神聖和陰性接納的當下。


    在喜悅中服務需要活在真心、當下、完全的接納和單純的智慧裡。你呼出的每一口氣，都會把賜福和恩典提供給世界。


    在這個教學廳裡，從水晶骷髏頭流進你的神聖幾何密碼，會喚醒你先天的了知，讓你明白我們都是神。它會讓你在神聖的火焰裡淨化，讓你內在的一切都轉化為最純白的愛。天使在你的上方唱歌，淨化你周圍的能量，點亮你的心。這些榮耀的天使中，有一些會跟你一起回到日常生活裡，繼續為你唱歌。無論你周圍發生什麼，祂們都把你與源頭之愛接通。


    當你參加這個訓練課程，並通過所有相關的挑戰以後，你就會被邀請加入金袍兄弟會（Brotherhood of the Golden Robe）。庫圖彌尊主是這個兄弟會的大家長。祂承擔著世界的重擔，並透過祂的存在轉化世人。迪瓦爾·庫爾（Dwihal
    Khul）和許多偉大的大師一樣，也是金袍兄弟會的成員。另外，也有些化身到地球上的人，已經在前世擔任過兄弟會的成員，而且仍然對自己身為這個莊嚴但謙卑結構的一部分毫不知情。他們樂於接受這個服務，也接受了天使界和大師的大力協助。


    ### 觀想：拜訪喜悅服務廳


    1. 準備一個能讓你放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。

    2. 安靜地坐著，用你的心輪舒服地呼吸，感覺自己向高層的能量臣服。

    3. 專注在你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。

    5. 你踏上閃著深黃色微光的升降梯，讓自己通過燦爛的宇宙，被帶到喜悅服務廳。

    6. 庫圖彌尊主本人站在入口處。祂滿溢關愛的招呼打動了你的心。你的心發出白光。接著，祂在你身上披了一件黃色長袍。

    7. 圓形的大廳裡擠滿了人，你坐下來，讓自己感覺舒服。

    8. 你察覺到一個巨大的水晶骷髏頭，金黃色和金橘色的脈衝光波緩慢地交替出現。

    9. 如果願意，你可以把個人的乙太水晶骷髏頭放在第三眼上。或者，你也可以讓光線進入你的第三眼。它包含的神聖幾何密碼，正在改變舊有的事物，喚醒你認識自己和每一個生命的神性我。放輕鬆。

    10. 大天使麥達昶站在你後面。感覺自己像一座金橘色的燈塔發亮。

    11. 祂把手放在你的第三眼上，或放在你個人的水晶骷髏頭上（如果現場有的話），把這些光密封在你的能量場裡。

    12. 當你接收了今天需要的一切時，庫圖彌尊主和大天使麥達昶詢問你是否希望成為金袍兄弟會的成員。

    13. 如果你拒絕，那就放輕鬆，繼續沐浴在光裡。如果你答應，祂們會觸摸你穿的黃色長袍，直到它散發美麗的深金色為止。你現在可以真正地懷著喜悅服務了。

    14. 你感謝庫圖彌尊主和大天使麥達昶後，返回升降梯。如果你是金袍兄弟會的成員，你就能看到或感受到你的金袍正在觸及和轉變全世界的問題。

    15. 準備好以後，睜開眼睛，知道自己是一個貨真價實的行止高人。


    ## 第二十八章 學堂十：通往其他次元的門戶


    在生命的循環中，春天和新月提供了希望和嶄新的開始。靈性之路也是同樣的情形。在發展的某一個中心點上，當你完成一個循環以後，一扇光榮的新門就會為你開啟，允許你進入其他的次元。


    在這個學堂裡，有關精靈、天使和獨角獸王國的資訊已經為你下載好，好讓你用來開啟新世界，在更深的層面上與高次元的眾生連結。


    來自上帝之心的精靈和天使的存在，正加快牠們在靈性之路上的成長速度。牠們充分利用現在聚集在地球上的奇妙能量，牠們的成長也相應地跟著一起擴張。牠們就像一條朝著愛之洋奔馳的洶湧河流，大多數人類卻以較慢的速度在旁邊的一條平行道上流動。


    當你通過這個特殊的門戶時，天使和啟明大師就會對你發生真正的影響力。你會面對的抉擇是，沿著當前的黃金之路飛翔，或決定轉到一條不同的路徑，探索那裡提供的魔幻和神祕。


    無論你怎麼決定，每一件事都會加速進行。你踏進這個門戶的時候是一隻毛毛蟲，但走出來的時候卻蛻變成一隻蝴蝶。一個全新的、充滿了可能性的世界會為你開啟。


    當你進入這個學堂時，用來教學的水晶骷髏頭會把最柔和的春綠色光灑在你身上，把有助於你脫離舊環境，擁抱新環境的鑰匙和密碼，下載到你的能量場裡。


    你在這裡了解了神聖的幾何造形。這些形態會使毛毛蟲安息在神聖的繭包裡經歷不可思議的變形，這都是基於信任和信心的神聖靈性法則，以及鍊金術的神奇定律。憩息中的毛毛蟲，身上覆蓋著美麗、有翼生物產生的高共振模板。牠出繭後就是一隻散發著獵戶座智慧的第五次元蝴蝶，並擔任天使真正的信差。


    如果你願意接受驚人的變化，並有報名參加的勇氣，庫圖彌尊主就會邀請大天使加百列和克里斯提爾觸動你的意識。大天使加百列會用祂的純白光把你包裹一會兒，抹去你陳舊的東西，讓真理之光在你的意識裡瞬間閃過。祂會提供你一份難以言喻的禮物：最寶貴的蛻變（metamorphosis）機會。你內在的每一個層面都會發生變化。


    你也許會發現身體這時候迫切地需要睡眠。你也許一直感覺疲勞，或者在最意想不到的時候發現自己正在打盹。這是因為你的靈體和肉體必須在正確的相對位置上，好讓發生的變化能轉移到你的意識裡。


    接著，大天使克里斯提爾會打開你難以言喻的因果輪，祂的月亮天使會在你建立的連結裡唱歌。你也許會在這個時候看到或記起獨角獸、天使、精靈、大師、龍族，或來自不同次元的其他存有。你也許會感知自己收到了大天使克里斯提爾的純白色光。即使你看不到，也感覺不到任何東西，但你的氣場和身體的細胞裡，卻發生了難以置信的變化。你知道自己的乙太翅膀已經發育完成了。你的神聖藍圖已經更改了。你擁有了無止無盡的新可能性。當你放鬆自己時，你可以翱翔在自己的生命之上，看到向你敞開的金色大門。之前看不到的路徑都會出現。這是要向你確認你已經做好準備，並知道你需要的一切都會提供給你。


    事實上，你現在要做的就是為新的未來做好準備。其他的一切都會為你或替你完成。這超越了你的控制範圍。像毛毛蟲一樣，現在是你臣服的時候了。蝴蝶信任胚胎，你也要如此信任自己。讓大天使加百列用祂的光繭包裹你。一旦經歷完這個過程，你就會知道一切都有可能發生。你會期待奇蹟的發生，並知道奇蹟是高次元日常生活的一部分。然而，你還是會維持這種既敬畏和又驚奇的感覺。這一點至關重要，因為讓宇宙為你開啟金色大門的正是這個能量。


    ### 觀想：拜訪通往其他次元的門戶


    1. 準備一個能讓你放輕鬆、不受干擾的空間。可以的話，點一支蠟燭。

    2. 安靜地坐著，舒服地呼吸，心裡想著要去拜訪其他次元的門戶學堂。

    3. 專注在你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你的周圍。

    5. 一百萬個光芒四射的天使環繞著你。祂們創造出你聽力範圍以外的音符。這些音符會推動你穿越次元，帶你進入宏偉的次元門戶所在的學堂。

    6. 你坐在前排，正對著偉大的教學水晶骷髏頭。

    7. 柔和的葉綠光湧進你的心靈，充滿你的氣場，為你的變化做準備。

    8. 庫圖彌尊主觸摸你，感覺一股巨大的電流在你整個存在中流竄。你放輕鬆。

    9. 大天使加百列把你放進一個純白色的繭包裡。隨著陳舊的消失，你和明亮的新光一同進入繭包，讓自己完全臣服。

    10. 大天使克里斯提爾觸摸你頭頂上的因果輪。感知你的脈輪像發光的乳白色月亮一樣敞開。

    11. 你也許會聽到天使唱歌。你也許覺察了周圍的精靈、天使、獨角獸或大師。享受這個印象。

    12. 感知你的乙太翅膀擴張，你的身體變形為宇宙存有的身體。

    13. 一扇巨大的金門敞開，你走進去或飛進去。繼續對你進入的新世界裡的可能性保持敞開。

    14. 返回你的起點，向庫圖彌尊主、大天使加百列和克里斯提爾，以及擴張的世界致謝。

    15. 預期即將來臨的新事物。'
