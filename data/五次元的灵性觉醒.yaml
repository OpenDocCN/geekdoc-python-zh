- md: '## 第二十章 學堂二：至樂的功課


    相信靈性世界會照顧你的時候，就會發生這種情況。只是接受和相信靈性的幫助還不夠，你還必須信任它。當你這麼做的時候，圍繞著你的巨大、無形的靈性大軍就會願意幫助你。


    由於地球本身就是一所培養精通能力的學校，我們需要學習的功課會以經驗的形式呈現。因此，你在學堂下載的光之編碼，會轉譯為日常生活的考驗。因此，儘管你的氣場會吸收高頻光，但庫圖彌尊主會在你的形體生活中提出挑戰，檢查你是否真的在學習這些課程。如果你放輕鬆並相信一些完美的事物會提供給你，或者你會獲得所需要的支持，那麼，你已成功地學會這個學堂教給你的功課了。當這種情況發生時，海底輪會發出越來越多美麗的鉑金光。


    以下是遇到挑戰時應該採取的幾個步驟：


    - 步驟一，放輕鬆，相信一切都在神聖的正確秩序下進行。

    - 步驟二，聆聽宇宙的聲音。這種情境有把來自靈魂的訊息帶給你嗎？你朝著正確的方向前進，但你的決心有受到考驗嗎？現在是改變工作、家庭或其他事物的時候嗎？你的自我信念或自我價值有受到考驗嗎？

    - 步驟三，掌握個人的精通，並清楚地決定你的人生是朝著至善的方向邁進。

    - 步驟四，以完美的信念和信任堅守你的願景。


    ## 五次元的靈性覺醒


    在這個學堂裡沐浴著你的，是注入了鑽石光的、濃郁的鉑金色。


    第二階段的功課，是當事物處於神聖一致狀態時產生的深沉滿足感。地球是一個很稀有的實體行星，住在地球上的我們，也擁有感官、感覺和情緒。這些禮物都是為了帶給我們以下的幸福感，而特別放在這裡的：


    - 視覺很寶貴。觀看鳥兒的飛翔、孩子的微笑或花朵的顏色，也許會生起喜樂的感覺。

    - 聽覺是一份來自神性的禮物。傾聽一條銀色溪流的聲音，聆聽愛人的聲音，吸收合唱團的聲音，都是為了帶來極大的滿足感而設計的。

    - 觸覺是身體經驗的儲存庫。當我們撫摸柔軟、毛茸茸的兔子，或漂浮在溫暖的鹹海裡，或接受充滿關愛的按摩時，一切事物都會協調一致。性的膚觸是其中一個特殊的部分，因為性高潮是為了讓兩個人結合在一起，並把他們的頻率提升到更高次元而設計的，這會暫時讓他們完全處在當下的時刻。

    - 味覺是保留給地球經驗的另一種覺知。在炎熱的夏天品嚐草莓或芒果，或在寒冷的冬季吞食烤熟的馬鈴薯，都是一種特別的感受。同餐共食之樂也是地球提供的另一份特別禮物。

    - 嗅一朵玫瑰或百合花，會讓我們與天使的力量取得連結。聞一聞至愛生前擦過的香水，會喚回他們和靈界的記憶。氣味有很大的誘發性，也會勾起深層的記憶。


    ## 第二十章 學堂二：至樂的功課


    情緒設計的初衷，是讓我們紮根於地球上的生活，並幫助我們負起對自己的責任。然而，情緒的功能已經遠超過這些了。它能讓我們接近或遠離人事物。它能讓我們開啟或關閉心房。它能提供機會讓我們做出最卑劣或最利他的反應。它能提供我們龐大的成長經驗。它能提供的選擇，讓我們擁有掌握精通的機會。


    在這個學堂裡，你會以極大的感激之情了解這些威力十足的稟賦。感激是一把開啟宇宙豐富意識的金鑰匙。它照亮了你的海底輪，讓你像磁鐵一樣吸引美好的事物。


    一旦你美麗的第五次元海底輪下降時，就是你準備要體驗至樂的時候了。你的第五次元藍圖嵌入了接受至樂的編碼，而至樂是一種安全感和內在的知足感。這是赫利歐斯太陽神，也就是大中央太陽發出來的頻率。光之編碼會通過主水晶骷髏頭傳遞給準備永久接受它的人。


    學堂的象徵是一個正方形的海底輪。它的設計初衷是為了保留和錨定神聖的至樂。


    這一座神殿裡的學生會沐浴在輻射的陽光黃裡。當你吸收了這個從氣場散發出來的光以後，那些進入你存在狀態的人，就會感到難以言喻的快樂。


    ## 觀想：拜訪至樂廳


    1. 準備一個能讓你放輕鬆、不受干擾的空間。如果可以的話，點一支蠟燭。

    2. 安靜地坐著，舒適地呼吸，懷著拜訪至樂廳的意圖。

    3. 專注你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你周圍。

    5. 看到自己站在一個散發黃色陽光的正方形裡。

    6. 你在第二個學堂的院子裡，庫圖彌尊主臉上掛著溫暖的微笑，親自在這裡迎接你。

    7. 儘管同學們包圍著你，但你感覺自己是與庫圖彌尊主獨處。祂把手放在你的胸口，好讓你的十二個脈輪旋轉得更快，準備下載神聖的至樂。

    8. 覺察神殿中央昂揚的雛菊，它上面有一個巨大的黃色與鉑金色的水晶骷髏頭。

    9. 把你的個人水晶骷髏頭擺在面前，用所有的感官看、聽、嗅、嚐那個包含神聖幾何象徵和密碼的光流，從中央水晶骷髏頭傾注到你的水晶骷髏頭裡，再進入你所有的脈輪裡。

    10. 這會啟動你的頂輪和海底輪，並讓它們以真正揚昇大師的至樂為基準，找到其對應的位置。

    11. 你也許會感到一股洶湧而來的快樂、喜悅、安全和對宇宙信任，或者，這些感覺會逐漸滲入你的身體裡。

    12. 慢慢回到開始的地方，給自己時間吸收高層的光之編碼和與它相關的感覺。

    13. 信任宇宙會傾盡全力支持你，並在所有事物中看到快樂。


    ## 第二十一章 學堂三：了解水晶科技


    黃金亞特蘭提斯時代的每一個人，都有十二個輻射旋轉的脈輪和十二股活躍的 DNA。由於擁有第五次元的能量，所以他們的身體是矽基的。矽基的身體比第三次元的碳基身體擁有更多的高頻光。光承載著靈性的資訊和知識，因此，你擁有的光越多，就越能使用更多的鑰匙和密碼，以了解這些取得馬上就能用的靈性知識。


    基於這個緣故，男女大祭司得以從星際議會獲得非比尋常的資料。其中包括與水晶特性以及與精靈合作的資訊。接著，他們就會把適當的資訊傳遞給人們。這就是讓黃金亞特蘭提斯擁有強大威力的祕密。


    同樣有幫助的是，當時的亞特蘭提斯人運用了百分之九十以上的腦容量。我們目前只運用了大腦容量的百分之十。


    ## 第二十一章 學堂三：了解水晶科技


    學生在這個學堂裡要學的，是如何把第三次元的碳基世界轉變成高頻的矽基世界。他們了解碳的能量屬性。碳只含有少量的相對低階頻光，而且這些光會膨脹成結晶的形式。這種轉換是當頻率提高到一定層面時，自動產生的結果。此外，他們還了解如何使用晶體形式中的神聖幾何形狀，使不平凡的事情發生。這些都超越了我們目前的理解力。目前有許多人正在參訪這個特殊的學堂，想把他們對新黃金時代水晶科技的了解帶回去。


    亞特蘭提斯人可以接通許多不同的頻段。例如，他們可以輕易地把自己內在的撥接盤切換到天使、獨角獸、精靈、樹木和動物的波長。這麼做就能讓他們通過思想、畫面或感官，直接與這些存在溝通。這是在有意圖的情況下完成的。這要歸功於亞特蘭提斯人的天眼、天耳和心電感應，使得他們能調整至與其他物種溝通的頻率。


    現在的人正在無意識的情況下，重新取回這些通靈的能力。你也許聽不到聲音，但能接收音波傳來的印象。你也許看不到生動的畫面，但能感知正在發生的事情。你也許會對別人的想法有相當程度的了解。這意味著你會通靈，而且很可能還會有其他類似的經驗，也就是一種高頻的了解能力。對一個已開悟的大師來說，你的任務是接納和信任。


    每一個水晶裡都有來自自然界，並願意跟你建立連結的小精靈。當你對水晶有一份了解，並願意的時候，你就可以學著與精靈溝通了。精靈會回應你充滿愛的命令和願望。例如，你提出點亮水晶的要求時，精靈也許會與水晶合作，以滿足你的要求。這就是黃金亞特蘭提斯人為住家照明的方法。


    今天的電腦能完成的工作，當時都是通過水晶裡的精靈，直接用心念的力量，對水晶進行編程來完成的。


    有一些水晶會變成高度進化存有的能量基地。他們會透過水晶的媒介，傳遞重要的資訊、療癒能量或其他的屬性。隨著黃金亞特蘭提斯的發展，人們已經能接通蘊藏在水晶裡的強大本質了。星際議事會在亞特蘭提斯居民準備好的時候，把近乎不可思議的高振波科技設計圖，下載到神殿裡那一顆巨大的水晶裡。這是由賢士先吸收和研究以後，再向人們解說的。用這種方式製造的火箭，就會以超乎我們想像的快速度運動。他們開發了多層次飛行運輸系統，也建立了先進、不需要人工即可栽種農作物的水耕法（hydroponics）。亞特蘭提斯人有控制天氣的能力；他們使用雷射手術讓四肢再生；建造圓形建築物，與其恆星系統通信。甚至能從其他恆星系統中獲取可以在地球使用的礦物。他們的方法是先將物質解構，吸到地面以後，再重組物質的結構。所有這些都從波賽頓神殿裡的大水晶提取的能量來提供動力，而水晶的動能則是來自純淨的源頭（Source）能量。


    同時，他們卻是以極其簡單、和諧、有趣、放鬆、創意和關愛的互動，在大自然裡生活。他們的心智清明、平靜，因此，能以超出我們現有能力的方式集中心念，顯化物質。但他們的科技基礎要透過心念的控制、聲光與觀想的力量，與水晶裡的生命力量進行溝通。


    ## 第二十一章 學堂三：了解水晶科技


    當你進入水晶科技神殿時，這些來自亞特蘭提斯第五次元藍圖中編碼的天賦、才能和力量都會甦醒。他們會要求你保持覺知，將具啟發性的思想落實到心田。庫圖彌尊主和負責監督亞特蘭提斯水晶科技回歸的希拉靈尊主都會在這裡幫助你。


    記住向水晶致謝，包括在你電腦水晶裡的智能靈體。它們也像有覺知的生命一樣，會對人類的情緒有所反應。


    ## 觀想：拜訪水晶科技廳


    1. 準備一個能讓你放輕鬆、不受干擾的空間。

    2. 點一支蠟燭，把它奉獻給為了眾生的至善而回歸地球的水晶科技。

    3. 專注於你已經啟動的地球之星。

    4. 請大天使麥可把祂深藍色的保護斗篷披在你周圍。

    5. 一架圓形的小飛行器在你旁邊降落。你進入飛行器，隨即就安靜無聲地被送到水晶科技廳。

    6. 你走出飛行器，發現自己站在大廳的院子裡。你可以看到許多其他的存有，也用相同的方式抵達。

    7. 你能看到光彩奪目的金黃桃紅色透過拱門閃閃發光。你跟著其他學生穿過拱門，進入大廳。你立刻沐浴在閃閃發光的金色桃紅光照之中。

    8. 庫圖彌尊主和希拉靈尊主並肩站在一個講台上，舉手向所有人致意。明亮的金黃桃紅射線從他們的手掌發出，照在你的第三眼上。

    9. 當你坐下吸收這些光能時，就會發現自己的手裡拿了一個水晶。感覺它，感知它，把它擺在你的第三眼上。覺察水晶裡的精靈。

    10. 帶著愛，要求精靈點亮水晶。你的水晶和大廳裡的其他水晶都立刻點亮了，創造出一個光彩燦爛的仙境。

    11. 庫圖彌尊主和希拉靈尊主向你發送了一些未來的靈性科技畫面。放輕鬆，讓某些東西掉進你的心海。

    12. 你藉由接收這種神聖的信任，幫助集體意識的改變，讓人類和地球的至善更迅速、更輕易地顯化。

    13. 向庫圖彌尊主和希拉靈尊主致謝後，返回等著載你返回起點的飛行器。


    ## 第二十二章 學堂四：真理的振波


    庫圖彌尊主的興趣，始終都是那個支配著地球的偉大、恆常不變的靈性法則。這些法則說明了從業力到恩典，再到對振波做出反應的責任。


    純粹真理的振波閃爍著耀眼的白光。它發自於一個健全且與神性完全協調的心靈。當你的氣場散發出這種白色的振波時，每一個人都會感受到它的共振，而且會信任你。它會帶給周圍的人安全感和希望。在日常生活的基礎上，你每一次以誠實和正直的態度說話和做事，都會在自己的能量場裡累積更多的白光。


    這一座神殿裡的學生，都沐浴在完美的白光裡。白光在他們身體裡每一個細胞閃耀，同時也永遠夾帶在祂們的氣場中。


    你會在這一座神殿裡了解人類為了生存和保護自己，而發展出來的不同內在小孩策略。這方面的了解會在所有人的心中引發宏大的悲憫之情。當你用新的眼光看人類和自己脆弱的一面時，這種悲憫會開啟高層的純白色心瓣。


    孩子會為了獲得愛與關懷而取悅父母，例如，他們必須壓制自己的欲求。他們會為了討父母的歡心，而以微妙的方式講不真實的事，但也會因為不能做真實的自己而生氣。他們長大後會成為一個令人愉悅的、順從的成年人，但別人不會真正信任他們，因為他們會說別人想聽的答案，而不是誠實的答案。通過神殿的水晶骷髏頭下載到喉輪和太陽神經叢裡的光，會讓這一類的學生有說出真理的勇氣。對那些把生存策略建立在謊話連篇的人來說，這個學堂的教誨可能會讓他們難以消化，但當他們這麼做了以後，就必然會帶給他們不可限量的成長。


