  md: '知命，即掌握了命运规律的前提下，充分发挥人生最辉煌的阶段，更好地把握人生机遇，避开人生中不利的时空和因素，选择有利的时空和因素去做有利的、有益的事情，获取命中注定的最高限额，尽最大可能改变和改善命运的目的。风水调整可在一定的范围内调整和改善命运，使好命者更好，差命者得到改善，趋吉避凶，而且还可以福荫子孙后代。


    易经学提倡：“知命而不忧”，泰然自得地生活，从实际出发，不要强求富贵，只要心中常怀知足常乐的胸怀，克己奉公，勤俭节约，艰苦奋斗，行善积德，必然有幸福愉快的一生的。古人说：“尽人事以听天命”，就是说，只要我们在尽了自己最大的努力以后，仍然办不到的时候才可以听天由命。命与力的关系就如内因和外因的关系，正所谓“命是必然之份，非力不成；力是进取之源，非命不就”。故不能认为命好就可以不劳而获、坐享其成，命不好就灰心丧气、放弃进取。


    世人若能以“了凡四训”作典范，立志敬奉佛道，决心改正过失，发愿扬善积德，就能适当地改变命运，福荫在生之年、来生以及子孙后代。一个人的命运、身心疾病，无非是阴阳五行之气起的作用，如果我们能经常行善积德，敬老扶弱，爱惜物命，舍己为人，敬礼佛道，修炼气功，修持佛道法门，就可以使自身体内的阴阳五行之气常处于平衡状态，从而少病灾，甚至无病无灾，好运随之常伴，正所谓“积善之家必有余庆”。从事命理者，更宜修功积德，敬礼佛道，修炼气功，这样既可维持自身阴阳五行的平衡，又可提高身体素质，提高智慧，增强灵感，从而提高预测的准确率。若要为人解灾，更需要有一定的功德和功力，否则害人害己。


    有人说，易道之术须要师传，靠书本难以成道。此说言难不假，唯难不等于一点希望都没有，只要勤学苦练，再加上活学活用、开悟，就算成不了“天仙”，做个“地仙”还是有可能的；再退一步，不能成师，为自己及亲友进行一些命运改良工作，总会有一些益处的。邵伟华、张志春二位易师，主要就是靠书本自学成才的。呵呵，师传？真师在哪里？明师只可遇而不可求，缘也。一般之师父，往往比较保守，且多为经验之传，知识较单一，缺乏全面性。现在的高价师确实不少啊！如果你钱多的话，可以去打打水漂。我在气功大潮期间也曾拜师学艺，减肥瘦了上万斤，梦中成了师，不过还好，得了师父们的“真诀”：“自己多去悟吧”。往往师传难尽，书言难尽，靠各人的悟性，故悟性确实很重要，且各人的悟性是不尽相同的，命理也。我对命理及奇门有兴趣和悟性，对地理就没有兴趣和悟性。悟性随时都可能突然出现，自己要把握好。我编这本书几年了，不时会涌现一些新观念，有时走路、吃饭、看别的书突然悟通某个道理，甚至睡梦中都'
