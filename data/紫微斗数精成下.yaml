    1998 年，多财喜，走动也多，但姐姐有灾。（虽大限吉而小限凶聚，且三方有阴阳会照，仍可平平而过。小限的兄弟宫紫微星高照，兄弟应主风光无咎）。


    1999 年，妻儿有灾，兄姐亦有祸。（小限入申，逢大限的化禄星，但又逢地劫，且小限的事业宫逢大限的化忌星，故为吉处藏凶，冲运小限夫妻宫，主妻子不利。小限的兄弟宫凶煞凑，又逢流年的化忌冲动凶星，主兄姐有灾）。


    2000 年，财名双美，但恐有外遇或儿子有婚喜。（流年使太阳化禄入原命宫，故有财名双美之事）。


    2001 年，名气更大，财利享通。（小限天府，流年太阳化权入原命宫，财名很好）。


    2003 年，名声受损，且有病灾住院。（小限在子宫，流年使贪狼化忌入小限宫，小限主内，为有病灾）。


    7、原书未作讨论（第六大限入壬戌宫，56 岁至 65 岁，2005 年至 2014 年。廉府大限，大限天干使天梁化禄入原命，本人无什么大问题；但大限天干使武曲化忌冲夫妻宫，大限宫又有寡宿星，主本人孤独，恐对妻子不利）。


    8、2015 年本人有一关口，若过得此关，至 72 岁，2021 年再难度过了。（第七大限入辛酉宫，66 至 75 岁，2015 年至 2024 年。此大限为致病焦点，入原身宫，无正星而值蜚廉、白虎、大耗、死等凶星，身体逢凶煞可知不妙。2021
    年原命、大限、流年三忌重叠流年宫，确实凶多吉少。看寿数，我们不主张妄论，以免引起人家的精神负担。当然为了学术研究，可以自己心中有数，也可采取暗示的办法，说明在此限某年某月内要注意身体、防止疾病等。看寿数，先看福德命身宫定个大数，次看大数左右的大限的宫度是否凶，若凶，再看小限流年哪一宫最凶，即该引起注意；若不凶，可看上下一个大限是否凶来论断；大限及小限的疾厄宫的好坏也不可忽视。有时大限虽然不凶，而福德命身宫的寿数已到，且小限流年又十分凶者，亦为大凶）。'
