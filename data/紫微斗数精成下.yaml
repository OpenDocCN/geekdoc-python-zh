    (1)、首先选定命盘：用自己的命盘。


    (2)、按预测时间布流分盘（股票变化较大，以流分盘预测较流时盘好），并找到预测时流分盘的命宫在盘上的位置。


    (3)、如果只测一支股票或期货，就以流分盘的父母宫为这时你想预测的这支股票或期货的命官所在。


    (4)、如果要预测多支股票，可以流分盘的父母宫为第一支股票的命宫，以第一支股票所在的宫位逆数一位（即流分盘的命宫）为第二支股票的命宫，再逆下一宫（即流分盘的兄弟宫）为第三支股票的命宫……其他各支股票可依次逆推，便可确定那个宫位代表的股票上升。假如预测对象480个股，用这种方法筛选出40个命中率'
