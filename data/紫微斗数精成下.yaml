    - 见多，或受其拖累；若化忌入本命之三方，虽主关系不太好，但\n- 凶力较小。\n- \n- 凡事都有先因而后有果，有得就会有失，有失亦会有得，好\n- 的时候要看到坏的一面，坏的时候要看有无补救或补偿，怎样看\n\
