    # △三、纵横分析论断法


    看限年吉凶，可以原命盘的四化，一路留给大限、流年、流月、流日、流时用。以原命盘化出的四化（以禄、忌为主），一路从纵向、横向扩展来跟踪进行论断。


    纵向看，就是以原命盘四化（生年四化或命盘十二宫四化），一路留给大限、流年、流月、流日、流时等下级盆用。凡逢原命盘化三吉入（或照）而无忌冲的宫位主吉利，入或照限、年、月、日、时都主吉利；凡逢化忌入的宫位及限、年、月、日、时都主有阻滞，但不算凶，只要努力仍会成功；凡逢化忌冲照的宫位及限、年、月、日、时都主不利。


    横向看，就是从宫与宫之间的关系看。原盘十二宫皆可为本宫（太极点，新命宫），按宫位太极转换法，重布命盘十二宫，例如以兄弟宫为新命宫，重布命盘十二宫，则原命盘十二宫的名称随之而改变，原命宫变为新盘的父母宫，就是兄弟的父母宫；原命盘的夫妻宫变为新盘的兄弟宫，也就是兄弟的兄弟宫。若以父母宫为新命宫，原盘夫妻宫变为父母的子女宫。其余类推。这样，一个宫位就可以变出十二个新名称，那么原盘十二个宫，就可以变化成
    12×12=144 个信息。仍以生年四化落宫为主宫，看其余十二宫与生年落宫之间的关系来论，还可再扩展到十二宫的十二宫与生年四化落宫的关系论，这样每个化曜就有
    144 个信息量；每一级就有 144×4 个信息；再扩展到限、年、月、日、时的十二宫与生年四化落宫的关系来论，信息容量更大，则论述的内容就相当丰富了。


    例如，生年化忌冲夫妻，从正面来看，夫妻宫被冲，兆示这一生夫妻缘薄，夫妻关系不好；从同级横向扩展看，夫妻是父母的子女，父母的子女就是自己的兄弟，这样也就看出其人得不到兄弟的帮助；夫妻是兄弟的兄弟，兄友线主成就，表我对兄弟的成就无助；夫妻是福德的财帛，表示嗜好浪费；夫妻是田宅的疾厄，表示这人没有自己的房子，住宅是租的，且搬动频繁；夫妻是厨房位，冲就无厨房，房屋是公众式的，或是租住的房子，或'
