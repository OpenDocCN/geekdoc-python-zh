    ## △十二、看六亲


    论六亲属相，以六亲宫（注意下述的排行）的天干去化忌，看化忌入何宫，该宫的地支属相即为该六亲的属相。有时，属相会在化忌宫的三方四正官位上。总之，六亲的属相必在化忌宫的三方四正宫内或六合宫内。


