    49，即为申时的 49 流分。


    得出流分后，就可以推流分宫。从流时宫起 1 数，顺盘宫数到预测的流分止，安流分宫。此例流时宫为申，即从申起 1，亥 2，子 3……顺数十二宫，数到 49 位仍是申，所以流分宫为申
    (一个命盘只有 12 宫，若流分大于 12，可除以 12，只以余数来推流分宫。如此例，49÷12=4 余 1，余数 1 就在流时宫)。


    推出流分宫后，即以流分宫为新命宫，重布命宫、兄弟宫、夫妻宫……等十二宫，即得到自己的流分盘，测自己这时干什么，得失及六亲等情况，就可用此流分盘进行预测。若为他人预测时，还得以自己的流分盘取出用神宫，并以用神宫为新命宫，再重布十二宫，然后进行分析判断。其余可参看流刻法。


