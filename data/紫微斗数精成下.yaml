    "打工有没有利？"从他的迁移宫星情看，出外比在家好。最后一句话共九个字，天干数 9，为壬，壬使天梁化禄入兄弟，为财之田，有积聚；化科入财，平稳增收，但不多；化忌入夫妻冲官，工作很积极，但劳而无功。七杀之人，刚强勇猛，工作积极，但须经一翻波折才能成功；杀羊同宫，脾气暴躁，出外小心打斗、伤灾；夫妻关系不好，晚婚和离多聚少为妙。


    ## 第三节

    活用斗数分类预测


    ◆1、测来意

    以来人进门的时间起出紫微盘，先从命宫的星情及四化落宫（化忌为主为事体且看凶事，化禄为次为原因且看吉事，权科在此一般不用）可以看出来人间测的大致内容。例如，命宫逢杀破狼，可能为测外出变动之事；太阴化忌，与妻、母、女儿、女人之事有关；太阳化忌，与父亲、儿子、男人之事有关；破军化忌，与子女之事有关；天机化忌，与兄弟、车辆之事有关。


    以日干化忌落宫可用来预测“来人不用问”，即不用来人报出测什么，而可以知其来意，不过有时要参考时干化忌落宫，因有大约有 10% 的来意是时干化忌所在宫，两者要兼看。以化忌落宫的名称测大致的事情，再以星情看细节事情。例如，忌入子女则可知为问子女之事；子女为生殖位，女命可能为问生理病；子女为合伙宫，若为生意人，可能为问合伙事;
    子女为桃花宫，也可能为桃花事或婚姻事而来。又如巨门化忌入田宅宫，可能为测家庭、家宅事；再以星情细断，巨门表是非，问离婚或家宅纠纷，不搬家就有是非。事情将会怎样？再以化忌落宫飞四化，以化忌落宫断结果。如上例，搬到哪里去呢？以田宅宫干化忌落宫断方位，如化忌入子女，子女在田宅的对宫，故表搬到对面去；周围的环境怎样？以化忌落宫的星情断（如逢天空为附近有空地，逢天同为近处有水沟或土地庙等）。


    测某年、月、日、时有何事？看流年、流月、流日、流时宫的星情。而年月日时发生的焦点问题可看天干化忌星的冲宫，问年用年干，问月用月干，问日用日干，间用时干。例如，问今天有什么事？以问测的时间起盘或随机起盘，然后看流日宫（即流日地支所在宫）的星情即知其人当日在干什么；而当日将发生什么焦点事件则看流日干的四化星，凡流日干化忌的冲宫凶；凶的程度要结合星情看，落宫主星失陷遇凶恶星必凶，主星庙旺、有吉星则凶不起来，最多有些阻滞而已。誰凶或什么事凶？参看冲宫的名称，凶的原因看化忌原星的星情表意，例如冲财帛宫主破财，若贪狼星化忌来冲，可能因酒色赌博投机等有关。一般为有凶事才问测，有时也会问喜事，喜事看流日干化禄落宫的星情表意。


    若预测现在或某个时候在干什么？看流刻盘用神命宫的星情，以及看流时干化忌落宫和冲宫。


    若问某时朋友在干什么？看流时或流刻盘的奴仆宫的星情。


    若测某时自己的收入，看流时盘的财帛宫。若要测某时朋友的收入，可以流时盘的奴仆宫为新命宫重布十二宫，看新命盘的财帛宫（即流时盘奴仆宫的财帛宫）。若想测朋友的妻子的情况，就以流时盘奴仆宫的夫妻宫为太极点（即命宫），重布十二宫，以此新命盘的十二宫来看朋友妻子各方面的情况。


    若问某日外出有什么事？就看流日宫的迁移宫，外出的事情与该宫的星情表意有关。还可以流日的迁移宫飞四化，以四化落宫看外出情况。


    ◆2、风水预测

    以预测用事时间排出紫微盘，或随机定命宫法，以田宅宫看现在的居住环境情况。当然也可以出生时间起出紫微盘，再以田宅宫来看出生时的住宅及其周围的环境情况；以限年的田宅宫看限年的住宅环境情况。


    阴阳宅风水均以田宅宫和子女宫来看，阴阳宅的区分：田宅宫为阳宫看阳宅，子女宫则看阴宅；田宅宫为阴宫看阴宅，子女宫看阳宅。


    设田宅宫为阳宅，田宅宫为住宅的中心，以十二地支论方位，田宅宫的对宫 (即子女宫) 为住宅对面的情况：站在田宅官，面向对宫，田宅宫左边宫位的星情即为住宅左面的环境情况，田宅宫右边宫位的星情即为住宅右面的环境情况，对宫左边宫位的星情即为左前方的环境情况，对宫右边宫位的星情即为右前方的环境情况。具体的环境情况可以参看上编的星情要义及“八卦万物类象”等情况来分析判断。(又有以命宫看阳宅，以田宅宫看阴宅的，布局看法同上，且结合十二地支宫属性论，听说较准确，可参考)


    屋内摆设情况也可以田宅为中心，以十二地支论方位，子女宫为前面，将屋内分出前后左右而论。逢太阳之方光线较好，或摆放电话；逢廉贞之方摆放电器、电脑；逢太阴之方为冰箱；逢天机之方摆放风扇；逢贪狼之方放食品等。


    以巨门落宫的地支方位看大门所在方位。


    阴宅预测，可以阴宅宫为坐山，对宫为向方，以落宫星情论吉凶，再以十二地支方位论周围形势，看法同住宅一样。


    以十二宫论：兄弟宫为现金存放处、夫妻的床位，夫妻宫为厕所位，子女宫为大门，财帛宫为银柜、客户，疾厄宫为客厅，交友宫为神位，官禄宫为书房，父母宫为厨房，福德宫为娱乐室。


