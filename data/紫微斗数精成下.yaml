    本人的灵感与实践经验发现：小限、流年宜综合起来看，小限官

    看迹象，侧重内部因素，主要显示本人、体内的信息，如本人的疾病、灾厄、心态、行为之类，其次才是与本人的事业财运及家庭有关系；流年断实际，侧重外部因素，主要显示外部环境对自己的影响，如单位、家庭、家人的情况及与上司、家人的关系，因此而影响本人的事业、财运、婚姻、升迁、贬职、受罚、破财之类。例如，看流年，先看小限宫，若凶，已主本人当年不利；再看流年的流煞凶星和化忌星入小限官否，若入，主更凶；再看太岁宫，若太岁宫又凶者，则主大凶，本人灾厄就难免了。


    - 流年的具体看法与大限的看法基本一样，可比照参考，也是把小限、流年落宫当作命官再逆布人事十二宫，然后以星情及流年四化星相结合起来看该年本人及六亲的遭遇。须注意的是：小限是以出生的月日时为转折点，一般都跨两个日历

    年，例如 1990 年六月五日辰时出生，那么从出生之时至 1991 年六月五日辰时为一岁小限，至 1992 年六月五日辰时为二岁小限，其余类推。结果每一小限的吉凶就得参看两个太岁年，同一小限的两个太岁的吉凶就有可能不同。流年太岁法则不会跨年。


    - 看流年四化，一共有生年、大限、流年三组四化，较复杂。一般，流年只看大限和流年两组四化，不看生年四化，但当生年四化被限年四化冲会时则须注意其作用。四化的看法可参看大限四化的看法。


    - 小限、流年与大限一样，落于何宫，吉凶首先应于该官对应原局的类神。（类神即为该宫的名称定义所代表的六亲及事项，如父母宫代表父母，子女官代子女，事业宫代表事业等）。所以,'
