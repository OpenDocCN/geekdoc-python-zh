    以化忌而论，迁移宫化忌冲命、官、田、子等宫易有意外灾厄；疾厄化忌冲田宅，亦易有灾厄；可以原局跟踪限年来定发生灾厄的具体时间。例如，迁移化忌冲本命（子位），大限入申宫，化忌冲大官，此限易有意外灾厄而亡；大限入辰宫，化忌冲大财，此限易撞伤别人而破财。


    ▲ 应灾时间：原命盘有凶兆，大限盘又凶，则要注意这大限十年内最凶的一年，凶事就有可能会发生，尤其注意原命盘、大限的化忌宫带凶星冲入流年的命、迁、疾三宫，以及流年化忌星带凶星冲入原命的命、迁、疾三宫，是年应灾。原命、迁、疾宫失陷且凶星聚凑，注意限、年重叠之限年月日时。七杀、羊陀迭并之年易有灾。原命、迁、疾宫失陷或凶星聚且化忌，大限、流年的化忌重叠之年。


    断应期，可应用四化的“同类相冲是个禁忌”的理论（解释参看第十四章第八节之二）来分析，注意重病焦点宫，例如原命疾厄宫失陷且凶星聚（即重病焦点宫），大限化忌来冲，当流年的疾厄宫与原命疾厄宫重叠时，即流疾被冲之年应灾；又如原命宫失陷且凶星聚，大限化忌来冲，当流年走到原命宫时应灾；又如原命迁移宫有失陷的巨门、天机、陀罗、天马等星，大限化忌来冲，当流年与原命宫重叠时，即流迁被冲之年，会发生车祸；以上命、迁宫都是应在本人身上，而疾厄宫既会应于本人，又会应于父亲，为什么？因疾厄为父母的迁移；看其他六亲灾厄也同理，例如田宅宫有失陷的巨门、天机、陀罗、天马等星，大限化忌来冲，当流年的田宅宫与原命盘田宅重叠时，即流田被冲之年，则主子女发生车祸，为什么？因田宅是子女的迁移宫。应于何月何日何时？方法亦同理，流年凶就看哪一月、哪一日、哪一时最凶，往往灾厄就在当时；若应用“同类相冲”则要注意三级相应，例如，看流月则看大限、流年、流月这三级，看流日则看流年、流月、流日这三级，假如大限的迁移宫有失陷的巨门、天机、陀罗、天马等星，流年化忌来冲，当流月与大限同宫时，即流迁被冲之月，会发生车祸；应用“同类相冲法”，还可这样来看，原命局凶，再看哪一大限最凶
    (一般是 70 岁内之限，不要拉得太远)，就以该大限干化忌的冲宫是原命的什么宫来看，例如是迁移宫，当流年的同类宫，即流年的迁移宫走到化忌的冲宫时，这一年灾厄就产生了；同理以这一大限最凶的流年化忌的冲宫来分析哪一月应灾。


    在凶星聚凑时，若逢消灾星，一般情况下是可以减轻灾祸的。消灾星是：紫微、天府星，这是消灾制化之星；天喜，“一喜可解三煞”；解神，对消除、减轻灾祸有一定的作用；巨门星，表示可以逃离现场及灾祸之星；天空，好事难来坏事不生之星。前四星的解灾作用是肯定的，后二星则要具体分析，因为巨门、天空二星本身亦是凶祸星，当它们与特定的凶星聚凑时，反而起到加速灾祸的作用。例如，巨门若与太阳星同宫，再加凶煞丧门白虎聚时，则有离开阳间之意；又如巨门与天机、陀罗、天马等交通星再加凶煞星聚时，则有车祸的可能；除上两种情况外，巨门可以有解灾作用。天空星，在空难、车祸、坠跌等灾害中为凶意，而在病灾、中毒、凶杀中则有凶不起来的作用；预测坐飞机逢天空加凶煞星时则不去为妙。解神星对一些小凶星有一定的解灾作用，但若与交通星、凶祸星聚会时，也表示有出轨、离开车道、解体和精神分散的意思，同时对一些大凶星，如天空地劫等亦难起到解灾的作用。


    在遇到凶祸星聚凑时，必须小心行事，以防不测之灾。


    港台前辈用到“中限”，本人认为没有必要，只用原局、大限、流年三盘即可。


    在岁运分析中，不显眼的小凶星、流星却占有很重要的作用，它们会影响和左右大星、主星。化忌星的作用更不可低估，它能冲动命局、岁限宫中的凶煞星，起到引动爆发作用。


    ### 第二节 一般灾伤


    一般伤灾指自己无故地遭受的器械、碰撞、跌打损伤出血和开刀手术等。伤灾多与流血有关，故又称为血光之灾。


    一般伤灾以命疾父宫为主（父母看头面破相），外出性伤灾及意外、车祸以迁移宫为主，兼看命疾宫。迁移宫化忌冲命宫、官禄宫、田宅宫、子女宫，疾厄宫化忌冲田宅宫，均易有意外灾厄。例如：迁移宫化忌冲本命宫，大限官禄宫进入本命宫，则化忌则冲大官，此限外出有意外死亡的危险；若大财进入命宫，则化忌则冲大财，此限外出意外撞伤别人赔钱了事。


    迁移宫化忌冲本命宫（子位），大限入辰宫时，化忌则冲大财，此限外出意外撞伤别人赔钱了事。


    一般的小伤小灾仅是大限、小限和流年逢灾伤星所致，原命局不一定有兆示。若大的意外事故，多是原局、大限、流年同时逢凶所致。


    擎羊星是血光的代表星，入命、岁限或对宫见，小心伤灾手术。


    命疾父宫及限运逢四煞、破碎、天刑、七杀、破军等星，易有灾伤，加红鸾更要小心。


    命宫有擎羊，身宫有陀罗，一生易有血光之灾或手术。


    - 限年逢巨门与火星、擎羊星、化忌星同宫，防是非、灾伤、手术。

    - 命宫或对宫有廉贞、七杀加煞忌星，易有灾伤、手术，限运逢之亦然。

    - 疾厄宫武曲化忌加天刑、擎羊，易有伤残、手术。

    - 命身有七杀，极易跌扑外伤；加擎羊，宜远离刀兵之地，不宜参军作战，防意外伤亡。


    - 七杀、破军入命或疾厄与羊陀同宫或对宫，主外伤或手术。

    - 命疾宫破碎在巳酉两宫遇破军地劫，发生血光、破相的可能性很高。

    - 天刑、刑伤星如飞入大小限，易有刀伤、手术、损伤等灾害。


    ### 第三节 打斗凶杀祸害


    #### △一、凶星分类


    - **1**、暴怒星群：武曲、七杀、廉贞、破军、火星、铃星、天魁、天钺。

    此类凶星多因性情恶劣，脾气刚硬暴躁，不能自制、忍让而引起冲突。


    - **2**、是非星群：巨门、擎羊、陀罗、铃星、阴煞、蜚廉。

    此类星多因言词和行动过激而引起是非纠纷。


    - **3**、伤害星群：天刑、天钺、火星、擎羊、陀罗、破军、七杀、飞廉。

    此类星曜容易致凶恶心横、打斗、刑伤、祸害。


    - **4**、丧亡星群：天哭、天虚、截空、天空、地劫、天魁、阴煞、破碎、白虎、吊客、巨门、丧门、灾煞、太阴地劫 (须二星同宫)、太阳巨门 (须二星同官)。

    此类凶星易致死亡、丧命。


    #### △二、凶星表意


    - **巨门**：吵架、口舌是非、离异、逃离、车祸、机件失灵

    - **擎羊**：凶狠、霸道、争斗、欺负、冲突、碰撞、抢劫，攻击性很强

    - **蜚廉**：惹事生非、细菌、动物、中毒


    - **阴煞**：阴谋、心术不正、仇恨、阴魂鬼怪缠度、怪异、阴暗

    - **太阴**、龙池：江河、水池、水沟、水灾、溺水、冻伤

    - **太阳**：炎热、强光、雷电


    - **禄存**：食物、毒品、钱财

    - **天刑**：伤害、刀伤、手术、被杀、官司、典刑、赌博、罪犯、凶手

    - **天空**：跌倒、翻车、坠毁、从高处坠落、飞禽


    - **地劫**：崩陷、埋在地下、坑洼

    - **截空**：截断、夺命、立即死亡

    - **哭、虚**：伤心、哭丧、愁云密布、死亡


    - **破碎**：肢解、解体、断手断脚、碎石、石头、零件、零碎

    - **太阳**、巨门：**二星同宫且与凶星聚会，有离开人间之意**

    - **太阴**、地劫：**二星同宫且与凶星聚会，有坠入地府之意**


    - **武曲**：暴躁、刚硬、打架、武斗

    - **七杀**：暴躁、刚硬、杀斗、厮杀、凶残砍杀、恐怖、冒险

    - **破军**：暴躁、刚烈、吵架、破坏、军火、炸药、毒液


    - **廉贞**：暴躁、遇暴、血液、流血、官司、牢狱、电、火

    - **天钺**：械斗、砍杀、刀砍、断肢

    - **天魁**：歹徒、仇敌、刑警、被捕、鬼卒来拘


    - **火星**：暴躁、火灾、枪击、熔液、烫伤


    铃星：是非、激烈争吵、流氓行为

    贪狼：贪心、野心、淫欲、吞咽、咽呛

    注：天魁、天钺为贵人星，与凶星聚会者如上断，若与吉星会合则以贵人星看。


    #### △三、凶祸发生情况


    当凶星聚凑时，凶祸就易发生。暴怒星加是非星，易引起争吵纠纷；暴怒星加是非星再加伤害星，则易造成争吵冲突，以致打斗伤害；暴怒星与是非星、伤害星、丧亡星聚凑，则易造成打斗伤害致死的危险；上述凶星再加桃花星，则易因色情纠纷而引起打斗伤害。


    在终生命运预测中，若命身、迁移、疾厄宫有上述凶星缠度，而大小限流年又遇上述凶星聚凑时，就容易发生祸事，流年化忌星冲动原局命迁疾宫的凶星时更是凶祸的导火索。


    命身宫见武曲、七杀、天刑、天虚、天哭、天空等凶星交会，易入江湖黑道，参加打斗谋杀行动，本身亦易遭伤害或刑灾。


    大小限的迁移宫遇蜚廉、阴煞，出外易无缘无故地生祸事；逢伤害星，出外易遭伤害。限运宫中见凶煞，前后两宫又见阴暗夺魂之星，则兆示生机渺茫。


    迁移宫有擎羊、蜚廉、白虎、破碎、阴煞、地劫等凶星聚会，出外易生祸殃；再与武曲、七杀、天刑等武斗星交会，则出外易有打斗险恶行为，也易为险恶行为所伤；再与红鸾、天喜等桃花星交会时，外出易有血光之灾，当流年干的化忌星入到此宫时，要特别注意。（命身、小限宫有凶煞及红喜，流年化忌到此，亦凶，逢流鸾流喜同断）。


    ## 第四节 车祸


    车祸亦属意外和血光之灾，唯与车辆撞击有关，亦有轻有重。


    命局的迁移宫、疾厄宫有交通车祸星：巨门、陀罗、天机、天马等（机马在四马之地更是），再与廉、擎、空、劫、刑、忌、蜚、白虎、破碎、阴煞，尤其天刑等凶祸星缠度，一生易有车祸，陷地更凶；迁移宫有交通加凶祸星，父疾线有化忌和伤害星，更易发生车祸；当进入迁宫或迁宫逢忌入照的限年月日，要特别注意，进入疾宫或疾宫逢忌入照的限年也要注意。命宫陷凶，迁宫带煞忌，逢天机化忌的限年月日也易发生交通意外灾害。命宫化忌入迁移，迁移有四煞，限年至此易有车祸或出外血光之灾。命宫化禄入迁移，迁移宫转化忌冲父母宫，易有血光之灾，限年逢之或逢流年自化忌之年就要注意了。有血光之灾者，最好事前捐点血来化解。


    迁移宫天机化忌加羊火，易有骑机动车受伤的意外事故，加天马空劫更严重。巨门火铃在迁移，无吉必有车祸，天机同宫更宜小心。廉杀、廉破在迁，父疾带刑煞化忌；廉破（廉化忌），父疾线带交通并伤害星；廉羊在迁，逢天机化忌等，均易有交通意外事故。疾厄化忌冲子女宫，大限疾厄化忌亦冲大限子女宫时，易有车祸。流年命宫自化忌，此年易有交通事故。


    责任判断：命疾两宫皆凶，命宫天干使疾宫带伤害星化忌，均为命主自己造成；命宫戊使天机化忌，自己开车造成。命疾迁化忌冲六亲宫，尤其是迁移宫化忌冲子女宫，易有车祸，是我撞别人。兄友子等六亲宫天干使带伤害星（天机、破军等）的迁宫化忌冲命，是别人开车撞我，为他人的责任（逢天梁则无事）。限年遇之同断。


    限年迁宫逢廉贞化忌，逢丙日和流日父疾有忌并交通星则注意道路险发生事故。


