    还可以按间测人提问的字数飞四化，例如问“什么时候能找回？”共 7 个字，7 的天干为庚，即以庚飞四化，然后以化忌落宫顺数到物品宫，得几数即定几日几时。


    **下面为兰老师的例子，以流分盘定宫法。**


    戊寅年九月二十七日 21:25，一朋友来电说丢了东西，让预测一下情况怎样？推排出此时的流分盘，命宫在辰，求测的朋友在西宫。本日干支丙寅，日干使她的父母宫廉贞化忌，廉贞是带电的精密仪器，既然丢了东西，是否丢了手机呢？对方说是，问“能否找回？”廉贞在戌宫化忌，成为火墓之地，廉贞又为囚星，有被关起来的意思，而墓库亦为收藏之意；戌宫还有右弼华盖星，为优美或可移动的物品，故其手机没有丢，就在家中或办公室的某个袋子里面。后来，大概二月后在家中的旅行袋中找回。


    # **◆5、测行人**


    以行人出走时间或间测时间起盘，再以求测人与行人之间的关系取用神。例如，父母来问测则以子女宫为用神，兄弟来间测则以兄弟宫为用神等。看出走人现在怎样？看用神宫的星情，逢吉则安，逢煞聚则凶，逢丧亡星则已死亡。看出走去干什么？可以用神官的对宫星情看，例如逢贪狼为去玩，连廉贪为去玩游戏机；逢阴煞为迷路或精神失常；逢阴煞、天刑、擎羊为被拐、绑架等。


    出走路线，可以用神宫干飞四化，从用神宫起，男顺数女逆数，数到化忌宫止，看经过的宫位所属方位，定其出走经过的地方，以星情看经过地方遇到什么人和事物，最后停留在化忌星的宫位上，并以化忌星落宫看现在情况。能否找回？看化忌落宫，吉多则安然，可以找回；遇煞则不安，煞聚或有空、劫、白虎等星，则凶而难找回。什么时候找回？方法与找回失物的方法一样。


    例：戊寅年十一月十六日 10:41，同事问某孩子出走不知在哪里？


    按时间定宫法，这孩子的命宫在午宫，乙卯日干使命宫紫微化科，化科主贵人，所以小孩无事，乙使兄弟宫中天机化禄，奴仆宫太阴化忌。禄忌在兄友线主破财；命宫在午，迁移在未，小孩可能去北边，子宫贪狼，贪狼主桃花、娱乐，小学生只能去游戏店，果然下午在家的北方游戏机店被其奶奶找回。


    ◆6、预测股票期货（根据兰天辰老师的方法进行整理）


    (1)、首先选定命盘：用自己的命盘。


    (2)、按预测时间布流分盘（股票变化较大，以流分盘预测较流时盘好），并找到预测时流分盘的命宫在盘上的位置。


    (3)、如果只测一支股票或期货，就以流分盘的父母宫为这时你想预测的这支股票或期货的命官所在。


    (4)、如果要预测多支股票，可以流分盘的父母宫为第一支股票的命宫，以第一支股票所在的宫位逆数一位（即流分盘的命宫）为第二支股票的命宫，再逆下一宫（即流分盘的兄弟宫）为第三支股票的命宫……其他各支股票可依次逆推，便可确定那个宫位代表的股票上升。假如预测对象
    480 个股，用这种方法筛选出 40 个命中率高的个股，然后再预测这 40 个股涨幅情况。


    (5)、以某一股票的命宫为始，重布十二宫，然后以此新盘为依据进行预测该股票的升降情况。


    首先以该股票命宫的星情来断该股票的大致走势。例如命宫逢杀破狼，主有大的变动，逢紫微在午为极向离明格主走到尽头了，逢廉贞囚星主被套住等。


    再以年月日时的天干去四化，来看该股票远近期的升降情况，年干四化影响一年的走势，月干四化影响一月的走势，日干四化影响一日的走势，时干四化影响本时辰内和未来的走势。


    若化禄入父疾线或兄友线，且无化忌同入或会照的情况下，说明该股会上升；化禄入或照财帛宫也主上升。


    若化忌入父疾线或兄友线，说明该股会下跌；化忌入或照财帛宫也主下跌。


    (6)、上升的最高点和下降的最低点的计算方法：


    价格总数一般以该股财帛宫的天干数加地支数加干支纳音数之和来计算；点数，即小数点后之数，以天干数加地支数来计算。逢双化禄加倍，逢禄忌或双化忌减倍。


    以上计算方法要以预测时的开盘价为参考点，在预测出升或降后灵活掌握。任何预测都不是绝对准确的，很多时候仍要靠灵活和灵感。


    价格和点数用天干地支数和纳音数表示，天干为 1 至 10 数，地支为 1 至 12 数，以财帛宫的天干地支查其纳音五行，水二局是 2 数，木三局是 3 数，金四局是
    4 数，土五局是 5 数，火六局是 6 数等。


    紫微斗数的宫位旋转表示时间的迁移。顺时针表示时间前进，即子宫为今日，则丑宫为明日，若子宫为开盘的时间的命宫，那么下一个时辰的命宫顺时针移到丑宫了。


    例一：1998 年 9 月 28 日湖南株州易友 22:05 来电说今日秦川发展开盘价 7.00 元，收盘价 8.19 元，以后一二个月的走势如何？预测时的四柱：戊寅
    辛酉 戊贸 癸亥，我 (兰天辰) 的流分命宫在辰，上述股票定位在戌。命宫坐廉府，廉贞为囚星，月干辛使父疾线的文昌化忌，八月股票没法升，年日天干都是戊，戊使贪狼化禄在福德宫照财帛宫，该股会上扬涨幅较大。九月壬干使该股的兄友成就线化禄，化权又入财帛宫，股票上涨，涨到多少呢？想到戊使贪狼双化禄入福德宫，而福德宫的纳音为土五局，双五为十数；又财帛宫甲午纳音为金四局，天干数加地云数加纳音数为：1
    十 7 十 4=12。故断股价涨到 10--12 之间。现在我们分析准确数字，庚子数为 7 十 1=8，双化禄为 88，农历九月收盘价最高达到 10.88。农历癸干使贪狼化忌冲破财帛宫，股票下跌。实际情况正如所述测，九月初泰川发展逐渐上升，到九月二十四日达最高价
    10.88，过后就慢慢跌落下来。


    例二：1998 年八月十三日 22:15，广东易友问股票行情，随即报了三支股票：0776 延边公路，0830 鲁西化工，0586 川长江 A，按时间定宫分别在申未午。预测时的四柱：戊寅
    辛未 癸末 癸亥。


    延边公路预测时的前一周收盘价为 15.04 元，双癸使破军化禄入命宫，杀破狼主开创大变动，此股将大幅度上涨，结果从此一路冲高，11 月 16 日 22.55
    元收盘，12 月 4 日还有 21.30 元收盘。财帛宫壬辰纳音水二局 2 数，地支辰 5 数，双化禄为 22.55，故最高点为 22.55 元。


    鲁西化工命宫在未，日月会照，父母双化禄，稳定上升。川长江 A 命宫在午，双化禄在福德官照财帛宫，亦是上升之象。


    例三：1998 年九月十九日，一小姐带某男友来求测，20:33，问他买的 60009 虹桥机场这支股票情况如何？


    按时间定官该支股票在我命盘之午宫，预测时间的四柱是：戊寅 壬戌 戊午壬戌。命宫一定下来，我就说：“该股票目前已走到顶点了，最好在九月廿九日抛掉，最迟不能放到
    12 月 4 日。”当时那人不信。事实上本周收盘价 14.90 元，次周开盘价 14.78 元，收盘价 14.68 元，完全应验。


    本支股票命宫在午，紫微在午宫谓之“极向离明格”，说明它的道路已经走到头了；其二，前一宫末宫无主星；其三，年日双忌在已宫财库，日时双忌入财帛宫，因此，该股票下跌无疑。


    ◇7、个人近运预测


    紫微斗数信息直观、容量大，不管是测近运，还是测其他事情，均可以一盘多测，一问多测，全方位地测出各方面的情况。


    预测近运的起盘方法及分析判断方法，均与终生运的预测方法基本一样，区别在于：终生命运预测起盘方法是按命主的出生时间起盘，而近运预测则是按问事时间或动态时间起盘的；其次，终生预测要用到大小限运盘，而近运预测一般不用大小限盘，直接用日历的年月日时支落宫星情及用年月日时天干飞四化来预测某年月日时的情况。


    例如，求测今年运气如何？以求测时间起盘，再根据此盘十二宫的星情及流年干四化情况断今年本人及六亲各方面的情况。至于年内各月各日各时的运气情况，可以用各月各日各时的天干飞四化，以四化落宫和冲照宫来断各月各日各时的运气。凡逢化三吉守照的宫位一般多吉
    (要结合星情看)，逢化忌冲的宫位一般多凶 (要结合星情看，若被冲的宫失陷且有凶煞者必凶无疑，若宫吉又无凶煞，至多有些阻滞或有迁动而已)。若月干化禄入父母而时干化忌守照父母，则表示该月有好事，但当时好事还没有得到。测前几年和后几年情况，则以要测年的年支落宫的星情及年干飞四化来看。


    测近运，以命宫统领其人近期的全面情况、整体格局，结合事业宫看事业的荣衰，结合财帛宫看财运的好坏，结合迁移宫看外出、迁动情况，以田宅宫看家庭、家人、住宅的环境及不动产的情况，以疾厄宫看疾病灾厄情况，以福德宫看享受、娱乐、精神生活、品德情况，以六亲宫看六亲的情况，以奴仆宫看交友、合伙情况，以父母宫看父母、上司、老师、长辈情况，凡是与文书契约、股票等与“文”有关的事情，均可以父母宫为用神。


    命宫逢杀破狼，情绪变动大，想外出；主开创，是财经能手。


    用问事时间起盘，能解决求测者出生时间不准的难题，而且准确率也很高，有些内容甚至比用出生时间起盘预测还要准确。


    在测近运中，如何看有无灾厄，可看命迁线和疾厄宫有无凶煞星聚凑，具体可参看第十二章中有关的论述。宜重视白虎丧门二星，逢之多与疾病、死亡、丧服有关。


    快速推断命限的焦点问题，参看第六章第十一节。


    六亲情况，还可以相应的六亲宫为用神，重布命盘十二宫进行详细分析论断。例如父母求测子女情况，则以子女官为用神；子女求测父母情况，则以父母宫为用神；其余类推。


    问那个方位有发展前途？看命宫化禄入宫的方位。


    兄弟宫不但与兄弟事有关，而且还与疾病、寿命有关，若逢煞忌及白虎丧门，说明有病，寿命不长。兄弟又为床位，逢孤辰寡宿主孤身独睡。


    活测可应用于流年、流月、流日、流时，一般不用大小限。流年直接用流年支落宫即可。推流月捷法：从流年宫逆推，即流年为一月，逆数第二宫为二月、第三宫为三月……直至十二月。推流日从相应的流月宫起初一，顺数第一宫为初一、第二宫为初二、第三宫为初三……直至月底最后一天。推流时从流日宫起子时，顺推下去，直至亥时。


    前途如何？①以命宫与的星情格局来看，宫吉或逢三化吉者顺，宫凶或逢化忌者阻力大②一生或较长时间的前途以官禄宫飞四化，各个流年以流年干飞四化，并且可以入父疾线或兄友线来看，化三吉入父疾线主光明，有前途；化三吉入兄友线主有成就；化忌入此两线则没有前途、成就；不入父疾、兄友线的，平常。


    # ◇8、预测事业工作


    预测事业，可以在近运预测内参断，也可单项预测，仍以求测时间起盘，然后取用神。以用神的官禄宫为主参看命宫来看事业工作情况。官禄宫为第一职业，田宅宫为第二职业，官宫无主星，无职业或失业或无官职。工作地点为疾厄宫，疾厄宫干化忌冲田宅宫为搞第二职业或有兼职。


    问何时能找到工作？分配工作和应聘，一看流年官禄宫化三吉入父疾线或命迁线否，有则此年找到工作、聘任或升迁，其中化禄是自然而得，化权是靠努力，化科靠分配或贵人提拔帮助，逢化忌入则此年无望；二看何月何日的天干化三吉入原局命、父、官来定具体月日。例如，命在辰，父母宫在巳，天机文昌坐守，丙月可找到工作。打工则看四化入兄友线的情况而定，看法同上。


    工作性质如何？以官禄宫和命宫的星情格局来看。例如，官禄宫天机文昌，可以从事策划、统计、文教、科研、机械、电子、汽车运输等转动性的工作。具体参看第十四章第十节之二。


    上司、领导对自己的看法如何？以父母宫干的四化落宫来看，若化三吉入命宫三方，则吉；其中化禄是有情，化权是严要求，化科是常关怀；化忌入命宫三方，尤其是入命宫和对官，则与领导关系不好，得不到领导的赏识。


    事业概况：①以官禄宫的星情格局来看，宫吉或逢三化吉者顺，宫凶或逢化忌者阻力大②逢化三吉入父疾线或命迁线，有光明；化忌入父疾线，前途暗淡。化三吉入兄友线，有成就；化忌入兄友线，无成就。其中化禄主升迁、提拔、就业；化权主升迁、创业（化权表成就）；化科主有贵人扶助，得人赏赐，考绩好；化忌主不顺。


    何时升迁？与何时找到工作判断方法基本相同，官禄化三吉入父疾或命迁线均能升官升职；化禄入兄友线，花钱经人介绍而升；化权入兄友线，以人情走后门升。再看何月何日进入上述宫位，或何月何日的天干化三吉入原局命、父、官来定具体月日。官禄宫化忌入财帛宫，公职人员易贪非分之财。


    看何时加工资？看何时 (年月日) 的天干化禄入财帛宫，即为加工资的时间。


    看与工友之间的关系如何？以命宫与奴仆宫的四化情况来看。奴仆宫干化禄入命宫，则工友或朋友有情义，有助益；化忌入命宫则无情义，无助益。


    职位升迁的高低如何？先看命宫与官禄宫的格局高低，逢富贵格局则职位高且有升迁的希望，逢贫贱格局则职位低且无升迁的希望。再从四化星看，官禄宫若化三吉入父疾线主一生有升官之望，若化忌入父疾线则一生无升官的希望。流年化三吉入父疾线主当年有升迁、升职的希望，化忌入父疾线则无望。


    # ◇9、看财运


    求测今年的财运如何？可按上述各种方法起盘，求出其人命宫及命盘，再以财帛宫星情看，吉则财运好，凶则财运差；又，财帛宫化三吉入命财官宫主财运好。化忌入冲命财官宫主财运差；命宫化三吉入财帛的父疾线主财运好，有机遇，化忌入冲财帛的父疾线主财运差；命宫化三吉入财帛宫的兄友线，能赚钱，化忌入主损财折本。财帛化禄入父母，化忌入疾厄，赚钱要与人共分。原盘化三吉坐或照流年宫则本年吉，化忌入冲则凶。财帛宫化禄入田宅，化忌入父母，易被人倒钱；财帛宫化神妙入夫妻，化忌入交友，赚钱交配偶掌管或购物为宜，否则易损财；财帛宫化禄入父母，化忌入田宅，不易被人倒钱；财帛宫自化禄，会赚钱，也会花钱享受；财帛宫自化权，敢花钱；财帛宫自化科，花钱有计划；财帛宫自化忌，破财不聚。


    流年干化禄入 A 宫，A 宫转化忌冲流年命宫，损财。流年财帛宫化禄入 B 宫，B 宫转化忌冲 A 月宫，A 月损财。


    求测近期财运如何？可以流年盘来看，看法与上面财年运一样，但须以各年的流年干飞四化来看，化三吉入命兄财田宫主财运好，化忌入或冲照命兄财田宫则会破财。至于年内各月的财运如何，则可以各月的天干飞四化来看，看法同上。


    何时发财？看何时 (年月日) 的天干化禄入财帛宫、命宫、兄弟宫、田宅宫均表财运好，有财发，有收获。当禄入的宫位变为流月的财帛，即流月的财帛与流年禄入的宫位同宫时，这一月最赚钱。禄入的宫位变为流月的命官财田等宫时也表有利。还可以流月化禄入宫位看，化禄入原命官财田宫，均主进财。发财数目，用化禄落宫地支数定。


    能否守得住财，则看田宅宫的星情及四化。


    测店铺的生意和转让如何？


