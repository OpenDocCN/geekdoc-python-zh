    △三、凶祸发生情况


    当凶星聚凑时，凶祸就易发生。暴怒星加是非星，易引起争吵纠纷；暴怒星加是非星再加伤害星，则易造成争吵冲突，以致打斗伤害；暴怒星与是非星、伤害星、丧亡星聚凑，则易造成打斗伤害致死的危险；上述凶星再加桃花星，则易因色情纠纷而引起打斗伤害。


    在终生命运预测中，若命身、迁移、疾厄宫有上述凶星缠度，而大小限流年又遇上述凶星聚凑时，就容易发生祸事，流年化忌星冲动原局命迁疾宫的凶星时更是凶祸的导火索。


    命身宫见武曲、七杀、天刑、天虚、天哭、天空等凶星交会，易入江湖黑道，参加打斗谋杀行动，本身亦易遭伤害或刑灾。


    大小限的迁移宫遇蜚廉、阴煞，出外易无缘无故地生祸事；逢伤害星，出外易遭伤害。限运宫中见凶煞，前后两宫又见阴暗夺魂之星，则兆示生机渺茫。


    迁移宫有擎羊、蜚廉、白虎、破碎、阴煞、地劫等凶星聚会，出外易生祸殃；再与武曲、七杀、天刑等武斗星交会，则出外易有打斗险恶行为，也易为险恶行为所伤；再与红鸾、天喜等桃花星交会时，外出易有血光之灾，当流年干的化忌星入到此宫时，要特别注意。（命身、小限宫有凶煞及红喜，流年化忌到此，亦凶，逢流鸾流喜同断）。


    # 第四节 车祸


    车祸亦属意外和血光之灾，唯与车辆撞击有关，亦有轻有重。


    命局的迁移宫、疾厄宫有交通车祸星：巨门、陀罗、天机、天马等（机马在四马之地更是），再与廉、擎、空、劫、刑、忌、蜚、白虎、破碎、阴煞，尤其天刑等凶祸星缠度，一生易有车祸，陷地更凶；迁移宫有交通加凶祸星，父疾线有化忌和伤害星，更易发生车祸；当进入迁宫或迁宫逢忌入照的限年月日，要特别注意，进入疾宫或疾宫逢忌入照的限年也要注意。命宫陷凶，迁宫带煞忌，逢天机化忌的限年月日也易发生交通意外灾害。命宫化忌入迁移，迁移有四煞，限年至此易有车祸或出外血光之灾。命宫化禄入迁移，迁移宫转化忌冲父母宫，易有血光之灾，限年逢之或逢流年自化忌之年就要注意了。有血光之灾者，最好事前捐点血来化解。


    迁移宫天机化忌加羊火，易有骑机动车受伤的意外事故，加天马空劫更严重。巨门火铃在迁移，无吉必有车祸，天机同宫更宜小心。廉杀、廉破在迁，父疾带刑煞化忌；廉破（廉化忌），父疾线带交通并伤害星；廉羊在迁，逢天机化忌等，均易有交通意外事故。疾厄化忌冲子女宫，大限疾厄化忌亦冲大限子女宫时，易有车祸。流年命宫自化忌，此年易有交通事故。


    责任判断：命疾两宫皆凶，命宫天干使疾宫带伤害星化忌，均为命主自己造成；命宫戊使天机化忌，自己开车造成。命疾迁化忌冲六亲宫，尤其是迁移宫化忌冲子女宫，易有车祸，是我撞别人。兄友子等六亲宫天干使带伤害星（天机、破军等）的迁宫化忌冲命，是别人开车撞我，为他人的责任（逢天梁则无事）。限年遇之同断。


    限年迁宫逢廉贞化忌，逢丙日和流日父疾有忌并交通星则注意道路险发生事故。


    △1、车祸星的表意及事故原因：'
- md: '天马：车辆，驾驶。

    天机：引擎，机械。

    天魁：超速，意识迷乱，凶险。


    逃避。


    火星、天马、龙池同宫：火车。


    天钺、擎羊同宫：相撞。


    太阳：阳光刺目。


    火星：引擎太热，烧车。


    天同：同向行驶，加巨或魁钺，超车。


    天刑：打斗，伤害，损坏。


    擎羊：性急抢道、超车、超速、相撞。


    解神：出轨离道，精神分散，车辆解体。


    # △2、车祸现场情况


    台辅：桥墩、车架、坭石堆。


    巨门：河口，交叉路口，路边。


    武曲：市场，商店，车辆密集，相撞。


    封诰：栅栏，墙壁，前车。


    天魁：险峻，陡坡，高速公路，荒郊。


    龙池：水池，水塘。


    文曲：崎岖、回绕车道。


    贪狼：平交道、坟地。


    紫微、天府：微高地、土坡、高级进口车。


    # △3、受伤情况


    天刑：受伤。


    天机：脑浆流出。


    天府武曲同宫：肠胃受伤。


    太阳：眼目损伤。


    紫微、破军同宫：头部受伤。


    # △4、死亡星 (忌入命身二宫或夹限)


    解神：失魂。


    截空：夺命。


    天魁：精神混乱，怪异，鬼怪。


    太阴、地劫同宫：坠入阴间地府。


    陀罗：轮胎飞出，辗过。


    天空：方向失灵，翻车，翻落。


    巨门：刹车失灵，路滑，夜行。


    阴煞：视线不清，浓雾，意识迷乱。


    破碎：车毁，损坏。


    太阴：视线暗、看不清，夜间行驶。


    贪狼：酗酒，贪财物，贪赶路。


    封诰：挡路，栅栏。


    地劫：道路坑陷险恶，抢夺财物。


    破军：破坏，山崩，道路破坏。


    天相：擦过。


    天梁：桥梁，树林。


    太阴：河流，山谷，断崖。


    天同：双车道，安全岛。


    地劫：低地，坑洼，坑槽。


    陀罗：弯车道，他车。


    破碎：碎石路，道路不平。


    文昌：学校旁边。


    七杀：车辆拥挤，连环车祸。


    化禄：车上有豪华设备。


    破碎：身体碎烂。


    武曲天相同宫：四肢断折。


    廉贞：大量流血。


    天梁：骨折。


    地劫：断腿、死亡。


    天哭：落魄。


    太阳、巨门同宫：离开阳间。


    白虎：伤亡。


    丧门：鬼门关。


    # 第五节 坠跌灾祸


    坠跌灾祸包括崩塌压身、高处坠落、飞机失事等。


    若命身有凶煞星，限年的命迁线又碰到煞星加天空、截空星，易发生坠跌事故。伤害的情况，看是否有伤害星同缠。是否会死亡，看有无丧亡星缠度。限年命宫有凶星，前后 (即左右宫)
    有太阴地劫同宫或太阳巨门同宫，容易死亡。命身疾迁宫同时有凶祸星与太阴、截空、旬空、地劫、天魁等丧亡星会合，死劫难逃。


    预测失事原因，可参看车祸一节。另外，天机表飞机；擎羊表超速、碰撞；火星表起火；天空、截空表坠落；阴煞表阴谋、精神错乱；武曲七杀擎羊表打斗、劫机。


    命身有杀破狼昌曲等星，有从高处摔下或跌坠的意外，加空劫尤甚。限运见空劫亦易跌倒坠落，不宜上高处和乘坐飞机。


    # ## 第六节 水祸


    水祸包括溺水、沉船、烫伤等与水有关的灾祸。


    太阴、龙池代表河水湖海；田宅宫见天机、太阴、龙池即代表船；天空代表翻覆、掉落；地劫代表沉溺；巨门代表迷失；擎羊代表碰撞。限运的命迁疾宫见煞星加上上述祸害星则易有水祸，再加丧亡星则有死亡的危险。太阴、龙池、火星聚，亦主有水火烫伤的危险。太阴星，游泳易抽筋。


    命宫破军与文曲化忌同宫，易有水灾投河之险。命身逢铃昌陀武同宫，防水险或投河。


    # ## 第七节 动物伤害


    1、代表禽兽的星曜有：


    凤阁、红鸾代表飞禽走兽；


    龙池太阴：鱼类、水族；


    陀罗：蛇类；


    再结合落宫地支所属生肖看：子鼠，丑牛，寅虎，卯兔，辰龙，巳蛇，午马，未羊，申猴，酉鸡，戌狗，亥猪。


    2、限运命迁疾宫见上述禽兽星加伤害星，较易受动物伤害，再加丧亡星则有死亡的危险。


    蜚廉：爬虫，细菌；


    贪狼：豹、狼、犬；


    擎羊：有角动物。


    # ## 第八节 雷电击伤


    大小限流年命迁疾宫见太阴太阳廉贞与伤害星缠度，易有触电、雷击伤害，再加上丧亡星群则有死亡的危险。


    # ## 第九节 药物中毒灾祸


    命盘的疾厄宫有禄存，一生防饮食、钱财是非。天相亦代表毒品、瓦斯、化工药品。大小限流年命迁疾宫见禄存、天相 (表药物)、蜚廉 (表细菌、毒物) 会聚伤害星，易有中毒祸害。再加丧亡星则有死亡的危险。


    # ## 第十节 自杀


    易有自杀的组合：①命身福德宫有紫微、天机、天空这三颗精神星，碰到凶劣星聚时，一生多思多虑，思想驳杂，再加破碎、阴煞、天魁等星，易有悲观厌世的念头；②命宫廉火同居陷宫，较易想不开，易寻短见，女性更验；③命宫或福德宫逢太阴陷地化忌、文曲陷地化忌，其人较自卑内向，再加六煞守照，便会想不开，女命更是；④巨羊火入命或迁；⑤巨门化忌冲天同
    + 陀罗之宫。上述组合行限再逢凶煞、伤害、阴煞、空劫、旬空等星，便会有想不开而自杀的可能，尤其是碰到很不如意事的时候更有可能，再加丧亡星则有死亡的危险。再会桃花星，可能因风流感情事想不开而自杀。


    本命福德宫化忌冲大福，大福化忌冲本福，均易自杀。


    如何自杀？在上述凶祸星的基础上再加禄存、蜚廉，可能为服毒自杀；再加贯索、天空，可能为吊颈；再加擎羊、廉贞可能为用刀自杀；再加太阴龙池可能为跳**水**自杀。


    # ## 第十一节 吸毒


    命身宫逢贪狼星，个性贪欲，好逸恶劳，常起非份之想，一旦财帛宫遇上廉贞、破军、火星、截空、旬空、破碎，容易成为小偷。若命身宫再加 (或行限逢) 禄存 (毒品)、擎羊
    (瘾癖)，则易成为吸毒者。再会合天刑 (刑讼)、封诰 (牢狱)，还防牢狱之灾。


    其中，贪狼表吸食，禄存表毒品，擎羊表瘾癖。


    # ## 第十二节 火灾爆炸祸害


    火灾星有：火星为直接火源；廉贞、太阳为间接火种，如电器起火，瓦斯、药物等。


    **爆炸星有：**廉贞为化学物聚合反应而引发；天空为空气；破军为火种；阴煞为瓦斯、气体。


    命身宫有太阴阴煞巨门天魁等阴暗星，随时有事故突发的可能。田宅宫又有上述火灾爆炸星，种下祸因，当限年天干为甲丙和大小限又犯凶星聚会时，灾祸易发生。若又有丧亡星聚者，有死亡的危险。偶宫（厨房），尤其偶田两宫逢上述凶星恶曜聚时，易有火灾。


    命坐火、廉、阳，田宅有化忌星，易被烫伤、烧伤。


    # ## 第十三节 刑讼与牢狱之灾


    主要看命宫、官禄宫，参看父疾宫和田宅宫。成因在原命盘或大限盘，结果在流年盘。起因由主星星情看，或以化忌冲动刑讼星的宫名、星情看。


    **命宫或官禄宫逢以下情况最易有刑讼牢狱之灾：**“**刑囚夹印**” ，即天相与擎羊同宫；逢 “**刑囚夹忌**” ，即天相逢擎羊与化忌相夹二星相夹；廉贞加会四煞天刑化忌，尤其是陷地与煞刑忌混杂再加白虎贯索等，很凶。


    命身宫逢煞刑忌，尤其是逢羊陀夹，而田宅宫多刑讼星，再逢化忌冲动的限年时，表示人失去自由，已在牢中。父疾宫逢化忌多是非；父母宫逢化忌加刑讼星者易有讼狱。


    官禄化忌入父疾线再逢刑讼星必有刑讼，官禄化吉入父疾线则可解厄。


    **容易有刑讼的星曜有：**太阳、廉贞、巨门、昌曲化忌、天魁、天刑、官符、贯索、将星、丧门、灾煞、封诰、白虎；其次是武杀破狼火铃羊陀。以上诸星入命、迁、官、父宫且组合不吉再逢化忌时较验。


    △**容易有刑讼的组合 (命官宫)：**

    1. 太阳化忌加会天刑白虎；2. 太阳落陷加会天刑星；3. 太阳陷地化权再逢刑讼星；4. 太阳在卯，擎羊在西；5. 廉贞白虎同宫；6. 刑囚夹印（廉羊夹天相）；7.
    廉贞化忌；8. 廉贞擎羊同在官禄宫；9. 廉贞陷地守官禄宫;10.巨门会火铃白虎及巨门落陷化忌;11.七杀加会擎羊官符 (或流羊流官符);12.贪狼陷地化忌加天刑;13.命宫破军铃星居申，官禄宫见白虎，或破军天马加煞忌居寅申巳亥；14.
    天同加会擎羊；15.太岁压官符（如流年官符飞入本命限的时候）。以上刑讼的轻重要参考三方会合的情况而定，例如有紫府魁钺禄存天空或天喜在一起，就能解除或减轻灾情，只是一场虚惊而已，刑讼不致真正构成。逢流年凶星引动就易有刑讼和牢狱之灾。


    原命盘只是一种征兆，会否发生要看限运，如原盘命父疾田有上述刑讼星，限年又逢则要小心，再看四化入父疾线来断契机，化禄入父疾线可解厄，化忌入父疾线或化忌冲动带刑讼星的限运宫则凶；限运的父疾逢化忌多是非刑讼，父疾有刑讼星更凶。


    当官禄宫为廉、巨、昌化忌冲大限的夫妻、而冲宫成为流年的田宅宫时最凶；大限宫为廉、巨、昌化忌冲本命的夫妻宫，当冲宫成为流年的田宅宫时亦凶，加煞更验。


    原命宫或限年的命宫逢天刑，父疾宫多刑讼星者，易有是非刑讼。


    命官宫逢落陷的太阴加火、铃坐守，限年逢乙，易有官司刑讼。


    命官宫逢贪狼与昌、曲同宫或会照，再加会火、铃，逢忌冲之年有官司刑讼。


    命官宫武曲会照昌铃陀，行辛壬限年有官司刑灾或投河自杀。


    命官宫廉贞、天相、擎羊会齐，行运至此或丙年，易有官司刑讼。


    命官宫巨门加四煞，行丁限年易因口舌惹官司词讼。


    廉贞、天刑、昌曲等星入父疾，逢化忌之限运易有刑讼，父疾宫多刑讼星更验。


    父母宫逢廉贞、天刑、贯索，丙限年易爆发刑狱。


    命宫三方有天刑、贯索，父宫有灾煞，限年的疾厄宫逢天刑、贯索时，要小心刑讼。


    命宫三方有白虎、将星、官符、封诰，廉贞在父或疾，大限入丙，小心刑讼。


    命宫三方会廉、魁、封，父宫有蜚廉，田宅有地劫、巨门，易犯重刑，当大限父母宫化忌而流年入大限疾厄宫时就爆发。


    命盘上不论何宫有廉贞加煞，逢流年白虎同度，易犯法坐牢。


    命宫有羊铃，三方有廉杀破陀拱照，流年入命宫，又遇流年白虎同入，易犯重罪入狱。


    命宫三方会天刑、白虎、将星、官符，田宅宫有贯索、封诰，易有刑讼，当大父化忌时本限爆发，若大父冲刑讼星更验。逢刑凶星聚之年应灾，或流年入大疾时应灾。


    限运进入刑讼星星时爆发，过了刑讼星或逢天喜、禄存星时刑散。


    天刑、刑伤星如飞入大小限，易有刀伤、手术、损伤等灾害，如果田宅宫又碰上阴暗星 (太阴、巨门、地劫、阴煞、封诰等)，则化为官司牢狱之灾。


    天魁，既为歹徒，又为刑警。犯罪之人遇天魁，即为被拘役。


    封诰，是拘束、封闭之星，如限运与刑恶星 (天刑、天魁) 相聚，则易有牢狱之灾发生。


    △如何看有官司无牢狱之灾？①天刑天魁逢脱离星 (巨门、天空、截空、旬空)，或化解星 (天空、解神) 等；②田宅宫无阴暗星与拘束星；③命身或田宅宫见天空或冲见巨门（即对宫见巨门），则容易逃脱。


    △刑囚开释期：限运进入刑讼星时爆发，行限碰到天刑、天魁、封诰星及限运田宅宫见阴暗星为入狱期，行运过了刑讼星影响期限，大小限或流年又逢天喜、解神、禄存、天空、截空、旬空等星为刑狱开释期。


    命身宫有暴怒星、是非星、伤害星加上述刑狱星，可能为打斗凶杀犯；命身宫有是非星、伤害星加桃花星，可能为流氓伤害罪；命身宫有暴怒星、是非星、伤害星而财帛宫有羊陀刑贪破等星，可能为抢劫罪；有上述刑狱星，再逢财帛宫有禄存、阴煞，且财帛宫对宫又见巨门、天空、解神等星（表由于海关疏忽大意而使之闯关成功之意），可能为盗窃或走私贩毒犯罪。


    # - 第十四节

    # - 失窃破财


    - 本不属灾厄，仅算事故而已。以行限财帛宫、田宅宫和禄存星落宫来看。


    # - △ 1、财物星


    - 财帛宫：表钱财出入；

    - 禄存星：财禄，原材料；

    - 天魁星：古董；

    - 天机星：机械，设备；

    - 廉贞星：高级电器，手机；

    - 紫微星：珠宝，高级贵重物品；


    - 田宅宫：不动产，房屋，家俱；

