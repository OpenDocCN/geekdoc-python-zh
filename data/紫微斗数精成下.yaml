    - 命宫化忌入子女，教育方法过于生硬，子女不服管教，令人烦心；子女官又为生殖位，故也表对色情执迷，为色情操劳；子女为桃花宫，故一生易有劫数，易因桃花外遇而引来心烦或麻烦；子女为合伙宫，凡命宫四化入都主合伙，化三吉入则有利，化忌入子则有麻烦；子女为财之父，表有钱财麻烦；忌冲田宅，田宅为家，为家族，故与族人不和，不理家庭，多离异，易变动，不动产少，也表隐藏有破财的迹象，当运入福德时，冲宫成为父母，主无光明，文书上有麻烦；田为夫之交友，故主与配偶不和；当逆行运入财帛，冲官成为疾厄，疾厄受冲易损财败业；田宅为财'
