  md: '# # 第十二章 预测灾厄


    # ## 第一节 灾厄预测的哲理


    灾厄，主要是区别于疾病，多指突然发生的意外事故造成的灾害、伤亡而言。灾厄对人类的威胁很大，应引起人们的高度重视。现代科学对个人灾厄的预测还是一片空白，祖国的周易预测学给我们带来了光明。紫微斗数也可用来预测灾厄，但还处在研究开发阶段，有待我们去发扬光大。


    ▲灾厄预测的哲理，在四柱预测学中，主要是通过四柱五行的生克制化情况来推断的，四柱五行平衡则安顺，不平衡则易有灾厄。在紫微斗数中，主要是根据天人感应原理，天体是一个大宇宙，人体是一个小宇宙，时空不同，天体星辰的空间及组合就不同，所产生的宇宙力对人体的影响情况也就不同，则人的吉凶祸福自然不同。


    在紫微斗数中，原命盘是“体”是因，行限盘是“用”是果。原命盘为“天”，大限盘为“地”，流年盘为“人”。灾厄的产生孕于天盘，成形于地盘，产生于人盘，流年是灾厄产生的结果。所以看灾厄要三盘同时兼看，尤其注意大限和流年，以命盘的命、身、迁移、疾厄宫看有无凶煞星种下灾厄的因素，再以大限、小限、流年的命、迁、疾等宫看有无凶星致祸的契机，三方面的条件具备时，则灾厄易发生。例如，命身宫主星失陷，又加大耗恶煞守照，二限凶则呈凶象；再逢流年的流羊流陀或七杀重逢，已是凶多吉少；再加流年太岁的丧门吊客白虎临于命身及三方四正，更是雪上加霜；再见天伤天使同守或夹，可断其人有死亡的可能。


    限、年凶星聚凑，也易产生灾厄，唯原局吉者灾轻，原局凶者灾重。有时大限吉流年凶而应大凶，或大限凶流年吉而应大吉，那可能是积恶、扬善或风水等因素所致。


    凶祸是否会发生，关键是看凶星是否聚凑。灾厄的产生，多是凶煞星聚凑于命盘、限盘、流年盘中的命身、迁移、疾厄等宫造成的。父疾、子田、兄友，这三线逢化忌加刑伤星、血光星、死亡星聚会时，都会有生命危险。


    以化忌而论，迁移宫化忌冲命、官、田、子等宫易有意外灾厄；疾厄化忌冲田宅，亦易有灾厄；可以原局跟踪限年来定发生灾厄的具体时间。例如，迁移化忌冲本命（子位），大限入申宫，化忌冲大官，此限易有意外灾厄而亡；大限入辰宫，化忌冲大财，此限易撞伤别人而破财。


    ▲应灾时间：原命盘有凶兆，大限盘又凶，则要注意这大限十年内最凶的一年，凶事就有可能会发生，尤其注意原命盘、大限的化忌宫带凶星冲入流年的命、迁、疾三宫，以及流年化忌星带凶星冲入原命的命、迁、疾三宫，是年应灾。原命、迁、疾宫失陷且凶星聚凑，注意限、年重叠之限年月日时。七杀、羊陀迭并之年易有灾。原命、迁、疾宫失陷或凶星聚且化忌，大限、流年的化忌重叠之年。


    断应期，可应用四化的“同类相冲是个禁忌”的理论（解释参看第十四章第八节之二）来分析，注意重病焦点宫，例如原命疾厄宫失陷且凶星聚（即重病焦点宫），大限化忌来冲，当流年的疾厄宫与原命疾厄宫重叠时，即流疾被冲之年应灾；又如原命宫失陷且凶星聚，大限化忌来冲，当流年走到原命宫时应灾；又如原命迁移宫有失陷的巨门、天机、陀罗、天马等星，大限化忌来冲，当流年与原命宫重叠时，即流迁被冲之年，会发生车祸；以上命、迁宫都是应在本人身上，而疾厄宫既会应于本人，又会应于父亲，为什么？因疾厄为父母的迁移；看其他六亲灾厄也同理，例如田宅宫有失陷的巨门、天机、陀罗、天马等星，大限化忌来冲，当流年的田宅宫与原命盘田宅重叠时，即流田被冲之年，则主子女发生车祸，为什么？因田宅是子'
