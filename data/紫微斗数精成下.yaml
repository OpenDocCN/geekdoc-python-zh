  md: '63/72, 戊子大限, 原禄入大限, 本大限收入仍很平稳。忌冲大兄, 不属“我”宫, 最多家庭开支大一些而已。大限官干所化禄忌与原禄忌相同, 意义同上。


    服公职的人进财的地方就是服务的公司、单位, 所以也可以疾厄官干四化飞入的宫位一路跟踪一生的财运发展情况。疾厄官干己的四化星为: 武贪梁曲。疾厄官四化主要是论进财情况的,所以化禄与化忌分开论,
    化禄主进财, 化忌主破财, 不作双忌一起论, 但每一大限和流年都是禄忌对宫, 都既好又坏, 意义基本相同, 不太好分析。化禄入财帛, 化忌又冲财, 禄忌对宫,
    犹如云中之月, 时光时暗, 既能赚钱, 又有破耗, 暴发则会暴败, 但工薪收入则较为稳定, 只要不贪污就不会大败。因是子女和疾厄化出的忌, 故破财的原因多是因子女或身体方面造成的。下面以此跟踪各大限的财运。


    23 岁/32 岁, 原禄入的宫位成为大限的夫官线, 财运与事业有关, 参加工作进入领薪阶层。忌入大官, 工作虽很认真负责,但本人事业有麻烦, 不顺, 多变,
    得益少; 忌冲大妻, 为大财之福, 故财源少, 收入低微。


    33/42 岁, 原禄入和忌冲的宫位成为大限的兄弟宫, 事业成就不大; 兄弟为田宅的财帛, 禄入为生活有所好转; 兄弟为财帛的田宅, 忌冲则库破, 损耗大。


    43/52 岁, 原禄入的宫位成为大限的的命官, 禄入“我”官,是财来就我, 收入大增; 忌入大迁冲大命, 这一大限在外或社会花费大(学气功、术数花费了不少钱)。


    53/62 岁, 原禄入的宫位成为大限的父疾线, 是一生进财最多的大限, 薪金达到了顶峰; 忌入大疾冲大父, 一方面主与上司关系下降到低谷, 名誉和事业受挫,
    另一方面也可能因疾病伤灾及子女而破财。


    # △四、看合伙


    先审兄友宫, 视其星情是否吉利而定, 旺吉而无煞则可合,衰绝或恶煞聚则不可合。兄友化三吉入命财官迁, 大吉; 化忌入命财官迁, 则凶, 不可合, 也不宜借钱给朋友。


    以河洛法而论, 以奴仆宫的气数位, 即子女官干去飞四化,若化三吉入父疾线、兄友线, 表示可以合伙; 若化忌入父疾线、兄友线, 不能合伙, 尤其 40 岁前更不能合;
    若化禄忌同入交友宫, 也不能合。若化三吉入命财官迁或忌冲官禄, 均可合伙。化忌入本命的三合方而化三吉又会照三方者, 合而大吉。子女官化忌冲本命, 不能做股东。子女官化忌冲交友,
    不可合伙。子女官化忌入交友宫, 合伙时, 对朋友较有利。'
