    疾厄宫化忌，以宫中的主星看生何病；命、限、年都一样；例如原局疾厄宫主星巨门化忌，一生易得与口、呼吸、管道有关的疾病；流年的疾厄宫武曲化忌，此年易得肺病、气喘。看六亲病也一样，例如流父之疾厄宫武曲化忌，此年父亲得肺病。


