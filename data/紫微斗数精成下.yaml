    # 第五节 坠跌灾祸


    坠跌灾祸包括崩塌压身、高处坠落、飞机失事等。


    若命身有凶煞星，限年的命迁线又碰到煞星加天空、截空星，易发生坠跌事故。伤害的情况，看是否有伤害星同缠。是否会死亡，看有无丧亡星缠度。限年命宫有凶星，前后(即左右宫)有太阴地劫同宫或太阳巨门同宫，容易死亡。命身疾迁宫同时有凶祸星与太阴、截空、旬空、地劫、天魁等丧亡星会合，死劫难逃。


    预测失事原因，可参看车祸一节。另外，天机表飞机；擎羊表超速、碰撞；火星表起火；天空、截空表坠落；阴煞表阴谋、精神错乱；武曲七杀擎羊表打斗、劫机。'
