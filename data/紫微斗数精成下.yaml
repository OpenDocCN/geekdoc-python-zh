    - **文昌星**：文书、文具、礼品、攻关等以及与口才交涉有关的行业。


    - **文曲星**：文书、文具、记者、算命、与口有关的行业。昌曲同宫，为文学家，艺术家，作者、摄影、公教、图书、饮食等行业。


    - **禄存**：金融、计算机。


    - **擎羊**：开车、挖土机。


    - **陀螺**：机械工人。


    - **天刑**：法官、骨科医师。


    - 以上只提供一些大的行业类别，工作类别必在宫中数个星内。现代工作分得很细，一般能分到大类已是不错了，技术高者可以分得更细。宫中有多个星曜，因而工作类别也多，应以正星为主，当有两个正星时，以得官生、另一星或辅星相生的正星为主，其余星曜为辅。就是同一个星，由于它的落宫不同，同宫辅星不同，人的职业贵贱层次都有不同，例如天府星，庙旺有吉星助则可为官员、公务员；若与煞星同宫，三方四正又多凶煞，那就可能是辛劳的农民。所以，要断准行业，要多实践，靠过硬的技术和灵感。


    - 断行业，还应结合大限来看，尤其是第三大限，命逢杀破狼者，工作事业变化大，可从第二大限开始，每一大限都看，以大限财帛宫干的四化入官来断（断法同上）。


    - **4、看限运事业**


    看能否升官，要结合看原命盘命官两官的星情是否有做官的命，再以限运四化断什么时候升迁。若原命无官，限运最好也只能顺遂一些而已，难有官升，但可升职称、提薪。


    河洛四化法看限年事业运，主要看命财官三宫干四化入何限的父疾线和兄友线。逢化三吉入父疾线的限运主有光明，有前途，有才干作为；化忌入父疾线主无光明，无前途，无才干作为；化三吉入兄友线主有成就，有财气，有助力；化忌入兄友线主无成就，无财气，无助
    力；四化不入父疾线和兄友线，表不好也不坏，平常而已。若三吉虽入父母，而化忌也入父母或在对宫冲破，吉处藏凶，美景成空。


    具体看法：重点看官禄宫四化，本宫化出大限逢，大官化出流年逢，当年应吉凶：逢化禄主升迁、提拔、就业，或走后门升迁的；逢化权主升迁、创业（化权表成就）；逢化科主贵人、有人扶助，得人赏赐，考绩好；逢化忌主不顺，忌冲更不利。又，一是看原命盘禄入某大父
    (或大疾)，主此限内有光明；若原禄再入流父或流疾，此年必升迁或事业有进；二是看大官化三吉有无入本命父疾，有则此限内有光明；若流官再入大父（或大疾），这一年必升迁或事业有进展。若父母宫无主星，或主星不四化，可看官禄化禄是否入疾厄宫，禄入疾厄仍有光明，惟禄入疾厄较虚，无实权，禄入父母较实在，有实权。而在行政机关任职时，禄入父母最管用。


    若为公营企事业单位，因其以财经为主，故以禄忌入兄弟或交友来看，看法同上。


    父疾为文书线，主晋升；兄友线主成就提拔。晋升与提拔是有区别的，晋升自然而得，如登云梯，步步高升；提拔要费点力气取得领导赏识，是破格提升，异路功名。


    那一年升迁？大命化权入本命或本官，逢大限化权照流命或流官，换个说法，流命或流官行经本迁或本偶宫，主此年升迁；更逢大限化禄入流命或流官（即化禄化权互照），此年大发，升官加薪。（看流命或流官在此大限内谁先走进照地，就以先进入之年优先考虑）。流年的官禄宫走到大限官干化权的宫位，此年主升迁；流年的官禄宫走到大限官禄宫干化权的宫位，也主升迁。大官化权照本官，流年入配偶官或官禄官时升官。


    那一年事业会变动？大官的禄转忌冲流官之年，事业会变动。这是好的变动，如升迁，换工作，扩张营业。例如，大官的化禄在未，官干己使太阳化忌入戌冲辰，当流年入子位，冲宫成为流年的官禄，是年工作有好的变动。


    大官的忌转忌冲流年的官禄，事业也主变动，但为不利的变动。变动原因看冲宫为原命盘的什么宫位而定。


    命宫化禄所入的宫位，就是事业上较有发展前途的方位。


    大官忌冲疾厄 (工厂)，当流年的忌也冲疾厄之年，工厂会倒闭；冲流月之疾，该月倒闭。官禄宫化忌入疾厄宫冲父母宫，流年入父母宫，该年倒闭。


    # △三、看财运


    现代社会，命运、事业、财运都归结到钱财上，所以，三者都可以看财运。


    论财运，四化都管用。其中化禄表示财源滚滚，自然而然，毫不费劲。化权表示一整毕，如薪俸收入，或经奋斗而获得之财。化科是贵入财，是在缺钱用时，适时的有人援助；或者是比较平顺，低收入，过得去而已。化忌则是粘入、破耗、浪费，有入有出。


    化三吉入财帛宫最吉利，化忌入财帛宫破财。禄权同入，敢赚敢花；禄科同入，量入为出；禄忌同入，敢借敢花；禄忌对冲，主大破败。福德宫为财源，逢化三吉主财源好，逢化忌主财源差。


    看财运，要分清“他”和“我”宫，“我”宫是属于我的宫位，包括命财疾官田福迁等宫，其余宫位均为“他”宫，“他”宫不属于我的宫位。“他”宫禄入“我”宫表示他给我，我得；“我”宫禄入“他”宫表示我给他，我失。“我”宫化忌入“他”宫表示我损他，他失；“他”宫化忌入“我”宫表示他损我，我失。


    凡“他”宫化三吉入“我”宫者，为他人益“我”，主进财。


    四化以化禄和化忌为主，化禄看进财，化忌看损财，要综合看，若化禄入“我”宫而化忌不入“我”宫则主有益；反之若化禄不入“我”宫而化忌入“我”宫者则主损财；禄忌同入我宫，先得后失，算凶；禄忌均入“他”宫，吉。


    以上适用于终生和限年财运。


    # (一)、论终生财运


    以生年四化看，看法同上之概论。福德化禄、权、科入命宫，得祖荫；福德化忌入父母，而父母化忌入命，三代不发；福德化忌入财、疾、迁，破祖业。


    以财帛宫为本宫，本宫的吉凶决定财运的旺衰。命宫为财帛的气数位，显示管理钱财的能力，其天干四化星决定钱财的得失。所以，看财运，以命宫天干的四化落宫情况来看，化三吉入命宫的三方主进财，入财帛的父疾线、兄友线主有机遇，限年同论。命干权入财官，主管理现金。


    若命宫化三吉入本命的子田线，因子田线为财帛的父疾线，故主有财名，靠职务、靠山和名声发达，有因名得财的机遇（化禄是自然而得，化权要经奋斗，化科为得人助），不会有财务纠纷；若化忌入此线，则无财名，因财失名，因名破财，财务纠纷多，尤其是命宫化忌入子女官冲田宅宫，表示一生与财名无缘，财务纠纷特多，不宜走求名（从政）得财的路线。


    若命宫化三吉入本命的父疾线，父疾线为财帛的兄友线，兄友主成就，故可靠实业大发财利，在财经上将会有突出成就（化禄最风光，化权稍次，化科更次），可投资实业和经商；若化忌入此线，格调极低，只可当雇员、技艺，不可投资搞实业和经商作老板。


    命宫化出的忌，与破财有关，也可以看出那个大限以后开始发财（即化忌落宫或冲官的后一宫位对应的大限开始发财）。


    财帛宫干四化，表怎样分配利用钱财，即钱花在哪里？花费情况，禄是经常性的；权是偶然的一毕；科是有计划的，是点点滴滴的用；忌是无计划，被迫消费。财帛官化禄入十二宫不是用来看进财的，是表示把钱用在什么地方。例如财禄入命，表有钱经常自己花；入兄，表钱花在家里；入夫，表有钱就给配偶保管；入子，表钱用于投资搞大众事业，如炒股、合伙等，或投资在子女身上；入财，即自化禄，虽主财丰，亦会花钱享受，为过路财神，钱留不住；入疾，有钱花在健康投资上，或投资于工厂、商店；入迁，钱花在外面，如旅游，社会；入奴，钱财用于企业的生产经营上，或花在朋友、情人身上；入官，有钱就增加投资；入田，储蓄、买首饰、购房地产；入福，搞福利事业和花于享受；入父，智力投资，供父母享受，或用于发放员工工资。财宫化禄入偶而化忌入友，宜购物，以免损财；禄入父而忌入疾，赚钱与人共分；禄入父而忌入田，钱不易被倒；禄入田而忌入父，被倒钱；财官化权入财宫，即自化权，主浪费，敢花钱；财官化科入财宫，即自化科，花钱有计划、有节制；财官化忌入财宫，即自化忌，破财。


    # (二)、看最适宜的谋生手段


    看钱财怎样赚来，或者讲用什么方式来赚钱，或者讲谋生的手段如何？可以看哪一宫化禄入财帛，就表示钱从那儿赚来，换句话说，是谁使财帛宫的星曜化禄，钱财就从谁那里得来。此为一生的发展方向。命官为事业财，兄弟为家庭费用、家庭副业，夫妻为储蓄财和娱乐财，子女为晚辈财和合伙财，财帛为以财生财之财，疾厄为打工、店面财，迁移为江湖财，奴仆为员工财，官禄为行政薪金、投资财，田宅为祖产、房地产财、积聚财，福德为外销财，父母为用脑财。


    例如，财帛宫主星为天机，使天机化禄的天干是乙，就看乙在哪一宫，若在夫妻宫，表示赚配偶的钱，引伸婚后得配偶之助而发财，赚储蓄和娱乐性的钱。


    又如，财帛宫无主星，看财帛的气数位，即命宫的主星。若命宫主星为巨门，使巨门化禄的天干是辛，就看辛在哪一宫，若在子女宫，则表示钱财来自子女，应引伸为赚晚辈、学徒、学生的钱，合伙事业赚的钱，或者为生育子女后发财。


    配偶宫化禄入财宫，而财宫化忌入父母，赚风月钱。


    # (三)、看岁限财运


    # 1、赚钱


    大疾禄入流夫，夫妻为田宅的第六位，依一六共宗，故一荣则六益，禄入夫妻如同入田宅，表可存钱。


    限年化禄入命疾财官田兄福等宫，是真正具有进财的现象。


    武贪居四墓宫，若为大限的命迁官财等宫，大限宫干为己，此限赚大钱。


    大官化禄或权照之年，流官化禄入流财，流财化禄入命，均赚钱。


    生年化禄入 A 宫，大财化忌入 A 宫，此限赚大钱。例如，生年化禄入福德，大财化忌入福德，此限大赚。


    大财化忌入本财，逢生年化禄，此年赚钱。


    大田化忌入本田，逢生年化禄，此年赚不动产财。


    大父化忌入本父，逢生年化禄，此年父母赚钱。


    大限化禄入流命或流财，此年发财，又逢权照更是大发。


    # 2、跟踪岁限财运的方法


    方法一：以限年宫干飞四化，若化三吉入“我”宫主吉，化忌入“我”宫主凶。具体方法同终生财运。


    方法二：以原命盘四化飞入的宫位为龙头，一路往下级盘传，一路跟踪，看一生每一大限、每一年、月、日的财运。命财官三宫干飞四化都可以，老板及有固定单位工作者用疾厄宫干四化看，合伙及由他人代理经营者以奴仆宫四化看。


    看各大限的财运，用原命盘禄入的宫位看，看其与大限官相比，是大限什么宫来论断。若原命盘禄入的宫位变为大财 (即大限的财帛宫) 的父疾线和兄友线，则表本大限内财运很好。禄入大命、大财、大官，也主进财。化禄，逢财星化禄更有力，若不是财星化禄，仅主表面风光而已。若禄入大兄，兄弟为田宅的财帛，则表示家庭生活费用比较充裕，但禄入兄弟是过路财神，存不住。若禄入大父，父母为财帛的交友，引伸为银行，故表示把钱存入银行。


    看流年财运，当禄入的宫位变为流年的财帛，即流年的财帛与本命禄入的宫位同宫时，这一年为此限内最赚钱的一年。禄入的宫位变为流年的命官财田等“我”宫时也表有财利。以上是以原命盘禄入宫位看，还可以大限化禄入宫位看，看法同上，例如大限化禄入原命、大命、流年命官，皆主进财，财富来自天然，收入比较大。



    以上是看好运的方法，论财运还要看不好的一面，这就是要结合看化忌入宫 (主要是看冲宫)，与上面看禄入的看法同理。凡是忌冲岁限的命财官宫都不利。



    例如，原命盘的忌冲之宫成为流年的财帛宫位时，这一年必破财；冲流官，事业要失败，事业败也会与财运有关的；冲交友，交友为朋友、工人，朋友、工人造反了还有什么搞头；冲田宅，财库有漏洞，不但破财，而且家庭也有问题。



    方法三：以大限四化上入本命盘和下入流年来看，主要看大限化三吉有否入本命或流年的父疾线 (财帛的兄友线) 和子田线（财帛的父疾线），有则此限内财运好；当大忌入本命盘的父疾线或子田线，则财运差，甚则破财。又以流年四化入原命盘来看，若化三吉入本命的父疾线和子田线，有则此年内财运好；当流忌入本命盘的父疾线或子田线，则财运差，甚则破财。



    看流月、流日、流时的财运，方法同上。



    看流日财运，若疾厄化禄入夫妻表进财，禄入兄弟表今天有人送钱来。


    # 3、论财路、进财的机遇



    疾厄宫是官禄的田宅，为工作的地点，疾宫有财星主工作地点上赚钱，代表我来财的地方，如我的公司、工厂、商店等，故可以疾厄宫干化禄入何宫的星情来断财路，以禄入父母、兄弟两宫最好，禄入命财官亦好，入其他宫位则无力，疾禄入父主工作上得财。禄入财，用身体和设店面去赚钱，自力更生，老板兼打工，较劳碌；禄入田宅，田为财之库，积财越来越多。



    田宫为财的本身，是收藏的财库，田禄入则钱财增加。兄宫是现金之库，过路财神，为费用和支出，禄入表现金库存增加，兄友线化忌者主费用和支出。兄友线和子田线都有忌星进入时，这时费用最大、支出最多。情况最为不妙，往往花钱如流水。



    因为子宫是朋友宫的官禄宫，代表合伙事业，所以看合伙事以子女宫来看。



    武曲、天府、禄存、太阴等财星最喜化禄。禄存与化禄同宫或相对名为迭福，主财源顺、或钱财流通。禄存或化禄与天马同宫或相对，称禄马交驰，钱财容易流通，发则如猛虎，破则如山倒。


    四化论进财，禄是源源不断、一笔接一笔，钱财调度容易。权是一大（整）毕，如工薪，一个月发一次，比较有控制；科是贵人财，缺钱时会有人送来，赚的不多，但比较平顺，比较有计划性；忌是失去，被迫花费。


    论财运，因各种人赚钱方式不同，故要综合看命运、事业、财运三方面的情况来论断。


    论限运财运、进财机遇，以禄入的宫位一路传经大限、流年进行跟踪。疾厄化禄入父母为最好的进财之兆，交友财，坐地交易，让客人上门做生意，但若禄入的官位逢自化忌，则为过路财神，赚最多，到头来还是空空的。此则公式最适宜于老板，对服公职或固定服务于公司者亦适用，以此一路跟踪各限年。


    若是国营企业、合伙、由他人代理经营者，可以奴仆宫化禄入的官位来看，仍以禄入的宫位一路传经大限、流年进行跟踪。交友禄入兄弟则为最好的进财之兆。交友为来财的地方，兄弟为夫妻的父母，表配偶财运好。此则公式较适用于配偶掌财、兄弟代理的人。


    化禄入命疾财官田兄福，是真正的进财现象，财星化禄最佳。化禄入父迁偶友子；有时进财，有时可看不可得或中看不中用。论限年尤其如此。限、年化禄入限、年命宫，财富自天来，收入很可观。限、年化禄入原命，也主进财。


    4、破财倒店的看法


