    # # 第十章 后天运势——岁限的分析推断


    利用本章的内容来进行分析推演，即可完成命运动态部分的批断。


    # ## 第一节 命局、大限、小限流年的关系


    命和运是一个整体，但各自又有所主与不同的特点。“命”是先天及内部因素，是人的灵魂、身体，是人的命运的主体骨架、主要成份。“命”的格局高低注定了一个人一生承受富贵福寿能力所达到的最高限额。“运”则是外部因素、后天环境影响力，是人适应时空场能变化的能力，在各个时空场点上活动与运用的历程，以及后天努力的结果，“运”的发展变化也可以影响“命”的结局。内因起主要作用，内因通过外因而起作用。“命”是主要因素，“命”通过“运”起作用，所以“命”和“运”都很重要，共同组成人生命运的曲线。例如，原命局凶星多或主星失陷，出身贫穷，逢限运化吉或吉星来合，多有突发的成就，好运过后仍为奔波失意；反之，原命局吉多星旺，出身富贵，逢限运恶煞化忌来冲，亦会突然失意落魄，唯恶运过后则能恢复元气。又如，原局有官的命，大运扶助则有官当，若一生不得运，也是不能当官的，最多不致太贫贱罢了；原局无官的格局，大运扶助也难有官当，最多事业较顺而已。


    在天垂象，在地成形，在人成事。天盘如天，大限盘如地，流年盘如人。命是天定的，原命格局的高低，注定一生富贵贫贱寿夭的大势，即定数，是静态部分。岁限则是人生各个阶段在定数基础上的上下浮动变化情况，即应数，属动态部分。原命盘的宫星反映人事的本质，运限只反映人生的际遇，限运宫星不起本质、本性（性情）的作用，在短期内不可能达到，但能显现原有象意的作用，星曜的化气和象意特色仍起作用；例如，紫微本质为皇帝星，须百官朝拱，限运则无皇帝的本质，可以不必百官朝拱，但仍有高格调、首、头和才能等特色，逢百官朝拱更为有利；又如天机的本性主聪明，须要科文星来拱，在限运中则不能主聪明，并不一定须要科文星拱，在短期内难以达到聪明，但机变、变动、谋划和依附权势的特色仍然存在，逢科文吉星亦对运程有利。限运宫星的性质为在先天盘宫星本质基础上的发展变化和反应，看其对本质的影响如何？是否为本质所喜还是所忌，若为本质所喜则增强本质的作用，人事向好方向展；若为本质所忌则减弱本质的作用，人事向坏方向发展。命盘宫星的本质不同，行运的喜忌也不同，则限年的克应也不同。因此，岁限的分折是不能脱离命局的，仍应以命局为主线、为定数。例如，原命局显示其人无官，大小限最好也只表示比较顺遂而已，不可能升官，即使升官也不大，尤如鱼虾入大海任其畅游，但不可能变成龙一样。而什么时候升官发财？什么时候灾殃？则必须由大限、流年小限来确定。大限是个转折点，是至关重要的一环，它起到承上传下的作用，富贵吉凶已基本定型，就看应于本大限十年中哪一年了。例如论凶灾，首先看原命局的重病焦点宫，存在哪些灾厄的隐患、祸根；再看大限的发展情'
  - '[PAGE 9]


    - 况，若增凶则增加了发生灾厄的份量，灾厄已经怀胎成形，即基本定局，就看哪一年发生了；再看这大限十年中哪一个流年小限宫和流年宫凶，以定灾厄发生的年份；接下来再分析流月、流日、流时。


    - 原命局管人一生的大局，大限管人十年的遭遇，小限、流年管一年的祸福。与四柱命理比较，斗数的大限大约相当于四柱的大运，但起运限的岁数多有差别；小限、流年大约相当于四柱的小运、流年。


    - 我们把人一生分为三个时期，即少年、中年、老年三大时期，称为时期运。人的生活、事业、灾厄随着少年、中年、老年三个不同时期的变化，会有截然不同的发展规律。少年时期，正是长身体和学习时期，身体应变能力较差，生活上还必须依赖父母家庭。中年时期，身体发育成熟，应变能力强，是自立成家、发展事业的大好时机。老年时期，是退休享福而逐渐衰老、身体毛病越来越多的时期。少、中、老三期的年龄划分，从现代情况考虑，少年运从出生至20岁，中年运从21岁至55岁，老年运从55岁起至死亡。三期各有所主的官度，少年期吉凶以命宫为主，生活以父母宫为主，流年注重父母宫；中期以命宫为主，参看财官迁官，限年注重财官迁官；老年期以德福德宫为主，兼看命、身、疾厄宫，晚年注重疾厄宫。看所主官度的星情好坏以定各个时期的命运吉凶，所主官度好者则吉，主宫坏者则凶。注意：这三个时期的吉凶祸福还只是模糊的预兆，而且仅作辅助参考，发生与否主要由大限、流年来决定。


    - 一个人的吉运，是喜庆的，对人的身心虽有影响，但毕竟比起灾祸，尤其是伤残死亡的影响来说，那是截然不同的，伤死的悲痛是刻骨铭心。所以，在论限运吉凶时，以灾厄为重，以便在灾祸来临之前预防，趋吉避凶。论限运吉凶，应从命局开始，再到大限、流年小限、流月、流日、流时，逐级进行分析论断；大限对命局发生作用，小限、流年对大限发生作用，而不是命局对大限作用，大限对小限流年作用，流月、流日、流时同理。


