    以夫妻宫干飞四化看：1、化忌入兄弟宫（偶之父）至官禄宫（偶之迁）之间的宫位，均主配偶年龄比自己大。

    2、化忌入子女宫（偶之兄）至交友宫（偶之疾）之间的宫位，均主年龄比自己小。


