    大迁（父之疾）化忌入 A 宫，A 宫转化忌冲流迁，母亲身体不好。


    ## △十三、看疾病


    古有“生病看疾厄，兄弟定寿数”的说法。


    兄弟为疾厄的气数位（疾之官），故兄弟宫干化曜可看一般明见的疾病。奴仆宫为父母 (遗传宫位) 的气数位，故奴仆宫干的化曜可看暗疾、相貌。逢化忌入官主有病，冲宫主病凶，带煞更凶。


