    7 个字，对应序数的天干为庚，即按天干庚去飞四化，然后以四化星断财运情况。又如来人问“能不能算出我干这一行几年？”此句话共十二个字，天干数为 2，2 为乙，假如命宫在未，乙使太阳化忌在亥，从其命宫未逆数到亥为九，所以为九年。


