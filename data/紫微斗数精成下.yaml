    离九，轻清在上，故为头。坎一，重浊在下，故主生殖器位。

    左三右七为腰腹。二四为肩看胸手。六八为足看腿脚。故病在什么部位看对应的卦位。例如，疾厄宫逢凶煞星多，则示有病。什么病？看疾厄宫及卦位的五行，若疾厄宫在午，午为离，离为火为头，故主头部疾或心脑血管、目疾等；理一步结合疾厄宫的星情看，若该宫有羊陀、白虎、破碎，则可能为头部外伤、破损。


