    # 第十五章 活用斗数预测生活百事


    ## 第一节 概述


    紫微斗数，原本是用于预测个人命运的，近人研究开发出新的用途，利用其信息直观、容量大的特点，广泛应用于生活中各个领域，预测诸事诸物，即把紫微用于占卜。这是个新鲜事物，其理论尚有待我们不断研究、实践、总结、发扬和光大。


    紫微斗数应用于预测生活中的诸事物，即紫微占卜，其原则和哲理与“梅花易数”、“八卦预测”及其他占卜一样，就是“不动不占”，“不问不占”。也就是说，必须他人或自己有预测的强烈意向，才能进行预测，意向越迫切越准确。有意向，提出要求以后，才有信息发出，否则无信息发出，则测不准。


    紫微斗数预测百事万物，起盘方法与命理预测基本一样，判断方法与星情法、河洛四化法、八卦卦象法也基本一样，区别在于：命理起盘方法是按命主的出生时间来起盘，而占事预测则按问事的时间起盘，或随机运用预测者自己或别人的命盘来进行预测。所以，活用预测和命理预测事件的方法，原则上两者是可以通用的，均可互相参考。


    活用预测法测近期命运，由于求测者此时的运气已包含了其人的先后天因素、环境、风水、修炼、积德等，充分反映了命主近期体内综合五行气场的实际情况，故某些信息比用出生时间预测还要准确，而且能解决出生时辰不准的问题，但时间范围较短。


    看时运，十分重视小星，尤其是化忌落宫及对宫的凶星，主星仅作为救应来看，即凶中是否有救，若主星为吉星善星为有救，不致大凶。发事的具体原因亦看星情。


    ## 第二节 预测方法简介


    ### △一、时间起盘方法


    在占测百事万物时，起盘方法很多，以问事的时间起盘法是其中常用之一。具体方法是：当有人要求预测时，即以问测当时的年、月、日、时来排出紫微盘，排盘方法与上编的“紫微斗数排盘方法步骤表”一样（但不必推排大小限）。


    排出紫微盘后，再取用神。所谓“用神”，就是与所问的人、事相对应的宫、卦或星曜。例如，父母问儿女升学，则以子女宫为用神；儿女问父母病情，则以父母宫为用神。“用神”，在预测中往往是多重、多种的，例如某人问测近期运气，可按问时起盘，以该人与我（预测师本人）的关系取用神，也可以其人站的位置方位落宫为用神，以及按其问事的内容取用神，当发现其人的子女或父母有问题，又可以其人的子女宫或父母宫再次取用神进行预测，等等。


    取出用神后，就可以进行判断。判断方法可用上面讲的星情法、奇门卦位法和四化法等方法，就是以用神落宫为新命宫重布十二宫，并以星惰、四化及卦位进行综合论断。


    ### △二、外应法


    仍以问事的时间起出紫微盘，然后以来人的方位作为来人的命宫，重布十二宫，再以来人的关系或问事内容取用神进行论断。此法适用于同一时间要求预测人数较多的场合。


    ### △三、梅花易数法


    仍以问事时间起出紫微盘，然后以抽签、报数、外应（如响声、奇异天象）等方法定出新命宫（数字要转化成地支序数，再以地支对应的宫位定新命宫），重排十二宫，再取用神进行论断。此法适用于要求预测人数更多的场合。


    ### △四、四化飞星法


    以上述几种方法起出紫微盘，然后以各种方法飞四化进行论断。例如，流年干飞四化论其人一年的运气，流月干飞四化论一月之运气，以流日干飞四化论其今日的情况，以流时干飞四化看其人现时干什么。年月四化为过去之事，日时四化为现在和将来之事。


    以日干化忌落宫可以用来预测“来人不用问”，即不用来人报出测什么，而可以知其来意，不过还要参考时干化忌落宫，因有大约有 10% 的来意是时干化忌所在宫。


    还可以按报数飞四化，即把数字与天干序数相对应的天干（例如 1 数为甲，2 数为乙，3 数为丙等，大于 10 要除以 10，以余数取天干）飞四化。


    或者按问话的字数相对应的天干（字数与天干序数相对应，例如 1 个字为甲，2 个字为乙，3 个字为丙，大于 10 要除以 10，以余数取天干）来飞四化。例如，若来人问“我的财运怎样？”共
    7 个字，对应序数的天干为庚，即按天干庚去飞四化，然后以四化星断财运情况。又如来人问“能不能算出我干这一行几年？”此句话共十二个字，天干数为 2，2 为乙，假如命宫在未，乙使太阳化忌在亥，从其命宫未逆数到亥为九，所以为九年。


    ◎问今天他答应的事会不会照办？看文曲星落宫的天干化忌有没有冲我三方（本命三合方或流年三方），不冲则办，冲则不办。


    ◎问收票放利息可不可靠？化忌冲父母宫，不可靠。又文昌落宫的天干化忌冲事业宫，流日被冲，表示支票不可收。文昌忌冲奴仆也是开空头支票。


    ◎问银柜放于何位好？那宫的天干使武曲化禄，银柜就放于该天干的方位上。


    ◎问办公桌放于何位好？那宫的天干使父母化禄，办公桌就放在该宫天干的方位。


    以上几个问题，既可以用其本人的命盘，也可以按问事时间起盘进行论断。


    ### △五、活用自己的命盘测事


    平时经常拨弄自己的命盘，把每宫的星曜都熟记后，利用自己的命盘作为推断百事万物的基本命盘，在预测时，星曜所在宫位及地盘不变，要变的只是以流时、流刻或流分为新命宫并重布十二宫，按问事取出用神后即可进行论断。可结合外应法、梅花数、四化法进行操作。


    ### △活变十二宫有二种方法，分析如下：


    1、有为法


    有为法就是没有脱离预测的时间，仍须以求测时刻来定出用事的新命宫并重布十二官，再取用神进行分析论断。此法的时刻盘又分为流时盘、流刻盘、流分盘等，是根据预测时间、发事时间的长短来选定的，时间长或不须详细时间的，可选用流时盘；时间短或须较详细时间的，可选用流刻盘；时间很短或须具体到分钟的，可选用流分盘。具体方法如下：


    以戊寅年六月初三 16 点 37 分（戊寅 己未 癸酉 庚申）为例。


    (1) 先推流年斗君所在宫位


    先熟记自己原命盘子年的斗君所在宫位，然后推出问事年的斗君。以原盘子年斗君所在宫起子年，顺盘宫数地支到流年支所在宫止，即为流年斗君所在宫。例如，原命盘子年的斗君在申宫，推查戊寅流年的斗君在何宫，即从申宫起子年，顺盘宫数到酉为丑年，到戌宫为寅年，那么寅年的斗君就在戌宫。


    (2) 推流月宫


    在流年斗君所在宫起正月，顺盘宫数月数到预测的月份止，所止之宫就是流月所在宫。此例寅年，斗君在戌，从戌宫起正月，顺数到亥宫为二月，子宫为三月，丑宫为四月，寅宫为五月，卯宫为六月，那么，卯宫就是六月的流月宫。


    (3) 推流日宫


    从流月宫起初一，顺盘宫数日数到流日止，即在此宫安流日宫。此例流月宫在卯，即从卯宫起初一，顺推辰宫初二，巳宫初三，那么，巳宫就是流日宫。


    (4) 推流时宫，定流时盘


    从流日宫起子时，顺盘宫数地支数到预测的时辰地支止，安流时宫。此例，流日在巳，即从巳宫起子时，顺推午宫为丑时，未宫寅时，申宫卯时，酉宫辰时，戌宫已时，亥宫午时，子宫未时，丑宫申时，好，申宫即为流时宫。如果选定用流时盘，就以推出的流时宫作为新命宫重布十二宫，再取用神进行分析推断。


    (5) 推流刻宫，定流刻盘 (本门派所用)


    时辰、小时、分钟、刻钟的关系如下：一个时辰=2 小时=120 分钟=12 刻钟，故每 10 分钟等于 1 刻，一个时辰等于 12 刻，刚好与十二宫数相等，1
    刻入一宫。


    每个时辰的分数与刻数对应关系规定如下：每个时辰第一个小时的 1 至 10 分为第 1 刻，11 至 20 分钟为第 2 刻，21 至 30 分钟为第 3 刻，31
    至 40 分钟为第 4 刻，41 分钟至 50 分钟为第 5 刻，51 至 60 分钟为第 6 刻，第二个小时的 1 至 10 分为第 7 刻，11 至 20
    分钟为第 8 刻，21 至 30 分钟为第 9 刻，31 至 40 分钟为第 10 刻，41 分钟至 50 分钟为第 11 刻，51 至 60 分钟为第 12
    刻。例如，16 点 37 分，属于申时，申时从 15.00 起算，则 16.37-15.00=1.37，已过了 1 个多小时，属申时第二个小时的第 37 分钟，37
    分钟在 31 至 40 分钟之间，故 16.37 属于申时的第 10 刻。


    得出求测时间所在的刻数后，就可推算流刻宫。推算方法为：从上一步推出的流时所在宫起数 1 刻，顺宫数到求测时辰所在的刻数止，所止之宫就是流刻宫。如上例，流时宫在申，就在申宫起数
    1 刻，顺次数到酉为 2，戌 3，亥 4，子 5，丑 6，寅 7，卯 8，辰 9，巳 10，那么巳宫就是求测时辰的流刻宫。


    如果选定用流刻盘，就以推出的流刻宫作为新命宫重布十二宫，就得到预测师自己的流刻盘，测自己这时干什么，得失及六亲等情况，就可用此流刻盘进行预测。若为他人预测时，还得以自己的流刻盘取出用神宫，并以用神宫为新命宫，再重布十二官，然后进行分析判断。


    例如，在上述这个流刻内有人 (包括朋友) 要求预测，你在起出流刻盘后，取流刻盘的交友宫为新命宫，重布十二宫，看日干化忌入宫的星情表意就可测出他的来意 (即要求测什么容)(为准确起见，最好再以时干化忌入宫的星情表意作参考)。如果来人不是测自己，而是测朋友的情况，就以他的交友宫为用神进行预测；若是为他的朋友的朋友预测，则在上述取出交友宫为来人的命宫，再取此新命盘的交友宫为他朋友的命宫
    (即原命盘交友的交友宫)，再取用神进行分析判断。若问他的亲人，就以他的六亲宫为用神进行分析判断。


    一般除六亲以外，自己不相识又无特殊身份的人求测，均以交友官为求测人的新命宫，重布十二宫，再以他要求预测的人和事取用神进行分析判断。若是自己的老师、长辈求测，则以流刻盘我的父母官为新的命宫。


    > ▲本人认为，流刻法时间不长不短，最为适中，计算也方便，特推荐使用此法。


    (6) 推流分宫，定流分盘


    流分盘法为福建兰天辰老师所创。


    一个时辰 2 个小时，即 120 分钟。按六十甲子分，120÷60=2，所以 1 个流分应为 2 分钟，把流时所占分钟数除以 2 就得到流分数。


    此例 16:37，属申时，申时从 15:00 开始，则 16:37-15:00=1:37，1:37=97 分钟，表示申时已走过了 97 分钟。此时的流分：97÷2=48.5，取
    49，即为申时的 49 流分。


    得出流分后，就可以推流分宫。从流时宫起 1 数，顺盘宫数到预测的流分止，安流分宫。此例流时宫为申，即从申起 1，亥 2，子 3……顺数十二宫，数到 49 位仍是申，所以流分宫为申
    (一个命盘只有 12 宫，若流分大于 12，可除以 12，只以余数来推流分宫。如此例，49÷12=4 余 1，余数 1 就在流时宫)。


    推出流分宫后，即以流分宫为新命宫，重布命宫、兄弟宫、夫妻宫……等十二宫，即得到自己的流分盘，测自己这时干什么，得失及六亲等情况，就可用此流分盘进行预测。若为他人预测时，还得以自己的流分盘取出用神宫，并以用神宫为新命宫，再重布十二宫，然后进行分析判断。其余可参看流刻法。


    2、无为法，即随机法


    就是随机定命宫，即以自己的命盘为基础（也可随便用一个命盘），根据外应（即看到什么，听到什么，变换成数字后求命宫）或随心所欲地在十二个宫中任意点一个宫（要毫不犹豫，点中那一宫就是那一宫）作为预测人和事的新命宫，然后取用神进行分析判断。


    还可随意用一张命盘，然后随机点一个宫作为起始宫，再让求测者报一组数（大于十二除以十二，只用余数），再以起始宫为 1 数，顺数至所报之数为止，所止之宫即为求测人的命宫，然后以此新命宫为太极点，重布十二宫，然后取用神进行分析论断。


    此种方法可以快速地进

    行预测判断但必须在有为法十分熟练之后才能练习使用。


    例如：2000 年六月十六日 21:36，辛巳 癸未 丙子己亥，一人来电话求测，命盘如右。


