    大限则不用看；再看定型的大限中哪一年这个人事发展变化最大的，则吉凶的人事就必然在此年发生。例如，原局官禄落陷带煞化忌，兆示此人一生事业不利，当大限入官禄宫或大限官禄宫化忌冲本命官禄宫时则事业会大败，当流年入官禄宫或流官入忌冲之宫时，失业倒店就必然发生了。


    上级盘为“体”，下级盘为“用”。例如，原盘化忌入大限，“体”冲“用”，凶事较轻，且仅主迹象；大限化忌冲原盘，“用”冲“体”，凶事必然发生，凶重，且主十年多凶。原盘化三吉入大限，吉小，且仅主迹象；大限化三吉入原盘，吉事必然发生，吉重，且主十年吉。大限与流年，流
    年与流月同理。


    上级盘的四化应于下级盘（如年对月）审迹象，下级盘的四化入上级盘（如月对年）断吉凶。应先审迹象而后断吉凶，也就是先审命盘而后看限运。


    上级盘四化入下级盘（如生年入大限）审迹象，看“定数”，意思是下级某限年行到上级四化的宫位时，兆示该限年会有吉凶的迹象(发生时间)，发生的吉凶事与四化入下级盘的宫名表意有关(应于何人事)。例如，原盘化忌入疾厄宫，大限入到原盘父母宫，大限受忌冲，兆示此大限内自己会有不利的事情。但凶事会不会发生？与原局疾厄宫及父母宫的吉凶、大限四化及流年吉凶等都有关系，不可一概而论。


    下级盘四化入上级盘（如大限入原盘）断吉凶，看“应数”，意思是本级四化入上级某宫，即对上级该宫有影响，表在什么时间什么地方发生了什么事，结果如何？发生的吉凶事与四化入上级盘的官名和星曜表意有关，但必须在原局兆示凶的情况下才会发生。例如，大限化禄入大限的什么宫位表示我这十年把心思放在什么地方，但是要看这步限将发生什么事情，必须看所入的这一宫位在原盘上是什么宫位，如果大限盘为夫妻表示这十年很疼老婆，但夫妻在原盘上是福德，表示此限我关心的是赚钱的事。又如，原局兆示父母凶，大限化忌冲原局父母，则主父母在此大限内必有不利事发生，什么事与星情表意有关，凶的程度，即结果与官的组合及旺衰有关。


