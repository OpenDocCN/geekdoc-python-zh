    故次重子女宫，子女宫宜得富贵格局，无煞冲破。选夫妻宫逢化科的年月日时结婚

    最佳。


    择吉还宜参看命主及其家人的出生年落宫，最不宜逢化忌相冲和流年太岁相冲。


