  md: '- 马倒禄斜（即禄马逢空），均主凶，煞聚大凶。太岁冲照这些宫位的人事亦主凶。事情发展较急速。亦须原命、大限凶者才大凶。

    - 15、流年七煞飞入命身官，再加会丧、吊、白虎、阴煞、大耗、天伤、天使、天哭、天虚等星，大凶，必有丧服。

    - 16、凡逢原命盘化忌与大小限流忌同守一宫，称为忌带忌，在何官，即表示该宫的类神不吉。如落于疾厄宫，会有疾病、意外伤亡；如入事业宫，则事业不利；入田宅宫则家人、田产不利；入子女宫，则子女病伤。是年本身亦不利。

    - 17、太岁行致官符、天伤、天使、羊陀、火铃、白虎、丧门、空劫、化忌，逢一二位者，已主人离财散、疾病哭泣之兆，若逢岁限重迭，大凶，官吏遭滴，常人招灾，妇人损胎，病人死亡。如无吉星来解，命中无救，其年难逃厄运。

    - 18、太岁为煞神，喜扶不喜刑，喜与善宿同度，与恶煞同行则凶，尤其于辰戌宫与七杀重逢或羊陀迭并，更凶。

    - 19、大小限入陷官，多主不利，但三方吉拱亦利，若加会煞星则凶。

    - 20、太岁冲小限，旺吉无妨，若陷地加会煞星则凶，破财伤病，意外横祸，甚则身亡；干支均相冲更凶。流年与小限干支相同为伏吟，多病灾。小限宫冲大限官亦不利（陷加煞才论凶），干支均冲更凶,应于小限宫对应原盘官名称定义所代表的人和事。

    - 21、大限小限或流年地支成三合者吉，即使逢杀破狼羊陀亦无妨（喜合不喜冲）。

