  md: '且得紫府昌曲武相同梁左右魁钺禄马等吉星守照合，反有开创的局面，可一举冲破难关而取得成就。杀破狼不入原局命身，二限遇之亦为“竹罗”，逢凶亦凶，但凶性减弱，原命吉者亦不主凶而主更新开创局面，逢吉更吉。消极之星（如同阴梁）逢杀破狼限年，会有变动之举，吉则变好，凶则招灾。二限逢杀破狼，一般入生年死墓绝沐浴等宫为凶；本官化忌有煞、旬空、丧吊白虎等则凶，再逢伤使夹或羊陀夹，劫数难逃，对宫化忌亦是。


    第七节 诸星值限年运气推断


    以大小限、流年落宫的星曜来推断，例如大小限、流年宫值紫微星，称为紫微星之限年。一般正星庙旺加吉化吉则吉，加煞平常；失陷加吉亦平常，失陷加煞则凶。逢化忌多有特殊之处，官吉则变动，官凶则变凶。三方宜注重对宫，三方煞聚，主大凶。以下所论吉者亦宜庙旺有吉拱照才论吉，所论凶者须陷弱或加会煞星才论凶。其余人事十二宫什星可仿照参断。


    ☆1、紫微星之限，会发生有关事业、职务、财利、夫运、考试、名誉等类事情。仍有高、高级、首、头、才干等意义。


    庙旺，可得贵人相助，能发挥才干，百事顺遂，地位高升，经商发财，是赚钱的好时机，可加大投资；有左右众吉守照更吉；若无左右等百官朝拱时只能算小吉；加文昌考试高中；无吉加煞，辛劳且平常。弱闲，有左右众吉星相会可有
    小成；无左右众吉星相会，主破财不聚；加恶煞，将会发生意外损失。逢紫破，有搬家之象，不吉。三方逢杀破狼加会，主职位不稳定，时起时落。大小限凶，对宫逢紫府可渡难关。破军守命者，不喜逢紫相限年，主有疾病。


    青少年行紫微运，高傲，不听话，好高骛远，不切实际而误事，或错失良机。中年最宜逢紫微，精力旺盛，大利创业。老年行运逢紫微，亦不一定吉，因承受不起贵气而致灾。


    流年太岁小限遇紫微，有见贵人高人之象。初春秋冬衰而不 利，三至六月旺而最利。


    此运及此方位时辰，利考试、求名、访贵人。


    紫微入二限吉凶诀：紫微垣内吉星临，二限相逢福禄兴，常人得之多吉庆，官贵逢之职位升。紫微入限本为祥，只恐三方杀破狼，常人逢之多不利，官员降谪有惊伤。


    ☆2、天机星之限，会发生有关交际、应酬、事业变动、外出、搬家、长远性的决策计划、学问、考试、名誉、宗教、五术、问题解决与否等事情。


    天机入限，好奇喜动，往往会作出人生中关键的决策或决定，'
