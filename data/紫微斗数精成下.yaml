    化忌入冲命财官宫主财运差；命宫化三吉入财帛的父疾线主财运好，有机遇，化忌入冲财帛的父疾线主财运差；命宫化三吉入财帛宫的兄友线，能赚钱，化忌入主损财折本。财帛化禄入父母，化忌入疾厄，赚钱要与人共分。原盘化三吉坐或照流年宫则本年吉，化忌入冲则凶。财帛宫化禄入田宅，化忌入父母，易被人倒钱；财帛宫化神妙入夫妻，化忌入交友，赚钱交配偶掌管或购物为宜，否则易损财；财帛宫化禄入父母，化忌入田宅，不易被人倒钱；财帛宫自化禄，会赚钱，也会花钱享受；财帛宫自化权，敢花钱；财帛宫自化科，花钱有计划；财帛宫自化忌，破财不聚。


