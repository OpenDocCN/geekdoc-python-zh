    身宫入事业宫，主星天机陷弱，虽化权而无力，更加地劫、寡宿，主凶。天德在此，对富贵无助，只能起到减少灾厄的作用而已，所以本宫应算为凶，尤其事业不利。天同与天机分守身命，很可能从事宗教、艺术工作；逢空劫、空亡，又无禄马吉星来拱，平凡孤独贫寒的一生，多是孤独僧道之命；或吉少者，晚年遁入空门，或信奉佛道，信奉五术。


