  md: '看能否升官，要结合看原命盘命官两官的星情是否有做官的命，再以限运四化断什么时候升迁。若原命无官，限运最好也只能顺遂一些而已，难有官升，但可升职称、提薪。


    河洛四化法看限年事业运，主要看命财官三宫干四化入何限的父疾线和兄友线。逢化三吉入父疾线的限运主有光明，有前途，有才干作为；化忌入父疾线主无光明，无前途，无才干作为；化三吉入兄友线主有成就，有财气，有助力；化忌入兄友线主无成就，无财气，无助
    力；四化不入父疾线和兄友线，表不好也不坏，平常而已。若三吉虽入父母，而化忌也入父母或在对宫冲破，吉处藏凶，美景成空。


    具体看法：重点看官禄宫四化，本宫化出大限逢，大官化出流年逢，当年应吉凶：逢化禄主升迁、提拔、就业，或走后门升迁的；逢化权主升迁、创业（化权表成就）；逢化科主贵人、有人扶助，得人赏赐，考绩好；逢化忌主不顺，忌冲更不利。又，一是看原命盘禄入某大父(或大疾)，主此限内有光明；若原禄再入流父或流疾，此年必升迁或事业有进；二是看大官化三吉有无入本命父疾，有则此限内有光明；若流官再入大父（或大疾），这一年必升迁或事业有进展。若父母宫无主星，或主星不四化，可看官禄化禄是否入疾厄宫，禄入疾厄仍有光明，惟禄入疾厄较虚，无实权，禄入父母较实在，有实权。而在行政机关任职时，禄入父母最管用。


    若为公营企事业单位，因其以财经为主，故以禄忌入兄弟或交友来看，看法同上。


    父疾为文书线，主晋升；兄友线主成就提拔。晋升与提拔是有区别的，晋升自然而得，如登云梯，步步高升；提拔要费点力气取得领导赏识，是破格提升，异路功名。


    那一年升迁？大命化权入本命或本官，逢大限化权照流命或流官，换个说法，流命或流官行经本迁或本偶宫，主此年升迁；更逢大限化禄入流命或流官（即化禄化权互照），此年大发，升官加薪。（看流命或流官在此大限内谁先走进照地，就以先进入之年优先考虑）。流年的官禄宫走到大限官干化权的宫位，此年主升迁；流年的官禄宫走到大限官禄宫干化权的宫位，也主升迁。大官化权照本官，流年入配偶官或官禄官时升官。


    那一年事业会变动？大官的禄转忌冲流官之年，事业会变动。这是好的变动，如升迁，换工作，扩张营业。例如，大官的化禄在未，官干己使太阳化忌入戌冲辰，当流年入子位，冲宫成为流年的官禄，是年工作有好的变动。


    大官的忌转忌冲流年的官禄，事业也主变动，但为不利的变'
