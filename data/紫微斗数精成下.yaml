    ## 第八节 命局与岁限四化的关系


    *   四化分级为：命盘四化，大限宫干四化，流年宫干四化，流月宫干四化，流日宫干四化，流时宫干四化等级。命盘四化包括生年四化和命盘十二宫干四化。从命盘到流时，是从上到下的关系，是从先天到后天的关系。从大限到流时都称为行限盘。

    *   看四化的吉凶影响，本级四化首先影响本级十二宫，例如大限四化首先对本大限的吉凶起直接的作用，其次才是对上下级发生影响作用。看大限，以大限四化为主，以命盘四化为辅。看流年，以流年四化为主，以大限四化为辅，以命盘四化为参考。

    *   原命盘是“体”是“因”，看定数；行限盘是“用”是“果”，看应数（应期）。

    *   河洛紫微斗数有一法则，就是由命、大限、流年、流月、流日、流时，一路往下推，落宫的天干一律以原命盘为准，一成不变（均用原命盘的天干）。这一点与星情法是有区别的，星情论大限四化时，天干要重排（有些派别不重排）。

    *   河洛派以命盘为“天盘”，大限盘为“地盘”，流年盘为“人盘”。


    ◇ “在天成象，在地成形，在人成事”。所以，推命就分为三个不同的阶段。“在天成象”，意思是在天盘只是朦胧的象，就如刚受精的卵子，只是生命的播种阶段，是为种“因”。


    “在地成形”，意思是到了地盘，朦胧的象已发展成为有形有状的阶段，就如受精的卵子经过母体的孕育，逐渐成为胎儿，是为“缘”。“在人成事”，意思是事情已经产生，就如孕育成的胎儿呱呱落地，已经脱离母体，成为活生生的人，是为结“果”。


    在这三个阶段中，地盘是至关重要的转折阶段，它承担孕育天盘之象以成形，又负担转化生人盘以成事的承前启后的作用。但结果在人盘，所以最后成与不成得看人盘。


    一件事的产生，在紫微斗数中亦分为三个阶段，即在本命盘为“天垂象”的酝酿阶段，在大限盘的“成形”孕育阶段，在流年盘为事物产生阶段，即“成事”阶段。大限盘是一个转折的关键阶段，力量最大，管十年祸福，其吉凶已基本定型，就看应于这十年内的哪一年了。所以，推算流年运，应由大限盘的天干四化情况并结合本命盘之象来推断，三环相扣才能顺理成章。同理，在看流月时，应以流年的四化并配合大限之象来推断；看流日应以流月四化并配合流年之象来推断；看流时应以流日四化并配合流月之象来推断（三环相扣法在下节详论）。


    我们在推命过程中，如能劝人在垂象成因阶段不要在某时某方做什么事，就可以避免发生不良的后果（无因则无果），这才是功德无量。


    生年四化叫天垂象，是天赋之意。原盘四化入大限盘也叫垂象，是为定数，决定此大限的格局高低、是吉是凶，即此大限内的运气情况，反映的主要是时间关系。


    生年四化要入本命的三方才有力；大限四化要入本命的三方才有力；流年四化要入大限的三方才有力；流月四化要入流年的三方才有力；流日四化要入流月的三方才有力；流时四化要入流日的三方才有力。这叫“下承上”。


    大限要得生年三吉会照才好，逢生年忌会照则不利，尤其逢忌冲更不利；流年要得大限三吉会照才好，生年三吉会照亦好，逢大限忌会照则不利，逢大忌冲更不利；流月逢流年三吉会照才好，逢流年忌会照则不利；流日和流时同理。这叫“上应下”。


    命盘四化留给大限看，大限四化留给流年看，反过来，命局的定数应于某一限年，就以应数之年飞四化回大限，以大限飞上化回命盘，用这种方法来看吉的大限和流年是增吉还是减吉？凶的大限和流年是增凶还是减凶、有无补救？例如生年化禄之星，行限使之化禄，为增吉；生年化忌之星，行限使之化禄，为变好，可减其凶性，为有补救。生年禄入大限的父疾线，主光明；但大限宫天干使此星再化忌，则为忌带忌，为变坏，主大凶。故生年化禄之星，行限使之化忌则凶。化权科有解忌的作用，上下级逢权忌、科忌都不致大凶，例如大权逢本忌和大忌逢本钱，仅主增点阻力或烦恼而已。


    大限宫是个中转站，大限宫四化“上应本命，下应流年”，即大限四化入原命盘何宫为“上应本命”，为“应数”，说明这步限运将在什么时间、地点、发生什么事情，事情首先与四化落原盘宫的名称有关，其次才是与横向宫发生关系，故主要反映出空间关系，也就是说这步运限我将会把全部精力投入到原命盘宫所关系到的人事和领域。例如大限化禄入本命的福德宫，首先，福德是财源，故表示此限我很关心赚钱；其次，福德为夫妻的事业，也表示我对配偶的事业很关心。又如大限化忌冲本命事业，为用冲体，灾害必重，此大限的事业必有变动。


    大限是转折点，是事件的成形阶段，只要本大限的事件已经形成，在本大限内的某一年即会发生。事件产生于那一年，则看本限内那一年走到大限同类的四化坐宫（吉事）或对冲宫（凶事）。至于吉凶的程度，则宜参看上面的“化出”和“化入”、“忌出”与“忌入”，以及四化之间的关系。


    不同级而同类四化之间的关系：同类宫位互忌则不忌，例如大限的财帛宫化忌入本命的财帛宫，流年的财帛宫化忌入大限的财帛宫，本命的财帛化忌入大限的财帛或流年的财帛宫，是为同类互忌，不以凶论。同类宫互冲忌则凶，例如大财化忌冲本财，流财化忌冲大财，大疾化忌冲本疾，流疾化忌冲大疾等，必然有事。大限与流年同类相冲亦凶。例如大限事业化忌在亥宫冲巳宫，当巳宫变为流年事业宫之年，事业便崩溃了。又如，大限财帛化忌冲流年财帛宫，破财之事便发生了。


    大限与流年，流年间流月，流月与流日，流日与流时的关系及论断方法同理，分三级相扣，中级为转折点，具体参看下一节。论流年、月、日、时四化，较重视冲宫，不太重视三合宫。


    ### 第九节 河洛四化分析论断的基本方法


    #### 一、气数位分析论断法


    从本宫为 1 数起，逆数到第 9 宫，称为本宫的“气数位”。例如从命宫为 1，逆数到 9 宫为官禄宫，那么官禄宫就称为命宫的气数位；又如从财帛宫为 1，逆数到
    9 为命宫，则命宫就是财帛宫的气数位，其余类推。总之，各宫的官禄宫就是其气数位。


    官禄宫是对命宫制约的宫位，所以，各宫的成败皆由各宫的官禄宫（气数位）决定。


    所谓“气数”，就是指有无生气，有生气则命存，无生气则命亡。气数位则是生气库藏的地方。既然是气，就有动态、影象、虚而不实的意思。所以，论命应以本宫为“体”，以气数位为“用”，气数位法只起兆示和辅助作用，仍应以本宫的星情论断法为主为实。


    河洛四化法很重视“气数位”，以本宫（十二宫均可为本宫）的气数宫位的天干去四化，看化出的四化星落宫好坏，以应本宫的动态吉凶情况。看“气数位”，最重要的是命、财、官三宫，这三宫互为气数位。气数位论断法，不仅适用于原盘，也适用于各级活盘，而且要上下盘双线交流以寻迹象，断其吉凶。一般命局看气运、格局高低，大限看时空，流年看破败点。


    气数位法最重视父疾线和兄友线，四化只有入本宫的父疾线和兄友线才起重要作用，四化不入本宫的父疾线或兄友线，则表示不好也不坏，平常而已。父疾线主有无光明、幸运、贵气名望和行政文书管理才能，成败作用大于兄友线，偏于天成；兄友线主才干、能力、财气和财经管理才能，成败偏于自身的努力。


    “气数位”化三吉入本宫的父疾线主有光明、幸运、贵气名望和行政文书管理才能，成就天成，宜走行政文书等求名路线，父母宫成败天成，疾厄宫偏于身体力行；化忌入本宫的父疾线则主无光明，前途暗淡，难有贵气名望，不宜走行政文书等求名路线，可从事经商、技术等，且须努力拼搏。


    “气数位”化三吉入本宫的兄友线主有才干、能力、财气和财经管理才能，宜走财经路线，亦可有天然的助力；化忌入本宫的兄友线主无才干，无成就，无财气，甚至破财不聚，不宜经商，可走技术路线，且须努力拼搏。


    若以命宫为本宫，官禄宫是命宫的气数位，所以论人的贵气、地位与运数，则以命宫为体，以官禄宫为用，以命宫的强弱论一生命数的高低，用官禄宫的天干四化来断一生的运数、机遇、吉凶祸福，应本命的荣辱，最重视父疾线。如果官禄宫干化三吉入父疾线，则一生前途光明，青云直上，有贵气名望，可在行政机构任职（化禄入表成功来得很天然幸运，权入是打拼得来，科入是得贵人助而成功）；若化忌入父疾线，表损光明，一生命运多阻，无贵气名望，是非麻烦事多。如果官禄宫化三吉入兄友线，则其人能干，在事业运上将会有成就，宜财经界；若化忌入兄友线，表无才干，事业无成就，不宜经商。


    官禄宫化忌导致事业失败，必是一种人为因素，例如自己估计不足，或因个性问题造成。化忌所入之宫，表有生之年倒霉事的原因必与该宫有关；忌冲入那一宫，坏事就发生在那一宫，该宫的人事要倒霉；例如化忌入子女宫冲田宅宫，事必与子女、田宅有关，或与桃花事有关；化忌入兄弟宫冲交友宫，倒霉事必为兄弟朋友而起，交友为朋友、工人，冲交友就表示朋友、工人有问题，没有助益，没有搞头。官禄是我的事业，不怕忌入，忌入表拼搏，拼出成果来；但忌冲则凶，对事业不利。疾厄是官禄的田宅，是自己工作的地方、工厂、公司、商店，忌冲疾厄则表示有倒店的可能；忌入命迁线，表里外不顺，进退维谷。化曜入命，表工作有得做。若官禄四化不入父疾线或兄友线，则表示不好也不坏，平常而已。化曜入父母、兄弟的力量较实，入疾厄、奴仆的力量较虚。


    官禄宫四化对精神生活产生作用，官忌入大限（即大限入官禄化忌之宫），主本大限内是非较多。


    若以财帛宫为本宫，命宫是财帛宫的气数位，所以论财运，以财帛宫为体，以命宫为用，用命宫的天干四化来断财运好坏。若命宫化禄入子田线，子田线为财帛的父疾线，表示可以有财名，因名得财，或因财而扬名，而且不会有财务纠纷；命宫化忌入子田线，主无财名，因财失名，财务纠纷多。若命宫化禄入父疾线，因父疾线为财帛的兄友线，因而在钱财上较善管理，可以有成就，发财利；命宫化忌入父疾线，则无财利或失财利（尤其是命宫化忌入子女宫冲田宅宫，表示一生与钱财无缘，不宜经商，只宜上班、技艺工作）。命宫化出的忌，主钱财，导致事业失败时，必与钱财有关，决定钱财损在什么地方，可能因资金短缺，靠借贷创业，结果如汤洗雪，入不敷出，越欠越多。命宫化忌入官禄宫，表示对任何事情都必亲自处理才放心。看那一大限发财，须看命宫化忌入宫的下一宫位（顺行运）或上一宫位（逆行运）。命忌不入子田、父疾线，一般主平顺，无多大风险。


    论事业，官禄宫为本宫，财帛宫是官禄宫的气数位，所以论事业，以官禄宫为体，以财帛宫为用，用财帛宫的天干四化来断事业的成败。若财帛宫干化三吉入兄友线，因兄友线是官禄的父疾线，因而表示在事业上名气好，容易得到提拔的机遇；若财帛宫干化忌入兄友线，则事业难以有名望。再者，若化禄逢空劫忌冲破，则表示所做的事业将要成功时，即美景成空。若财帛宫干化三吉入子田线，因子田线是官禄的兄友线，因而表示事业上能干，易成功；若化忌入子田线，则事业上因自己无能而无成就。由财帛宫化出的忌，导致事业失败，是因为事业出了差错，例如出现强劲的对手，订单出问题等。财帛化忌入官禄，表借贷投资。


    *   一个人一生最大的成就表现在命宫（表人格的升华）、官禄宫（表事业的腾达）、财帛宫（表财富的多少）等三个方面。但还要看三者的配合情况以及运限是否相助，以及四化之间的相互作用，而吉凶以化禄和化忌为重。方外人的同步断诀主要应用本命盘的命宫忌来断财运，用官禄宫的忌来断运途，用财帛宫的忌来断事业。

    *   其余各宫均可为本宫，以其气数位的宫干四化入宫情况来论本宫有无生气。

    *   例如兄弟宫又为母亲宫，要了解母亲有无生气，可以兄弟宫为本宫，则田宅宫为兄弟的气数位，看田宅宫干的四化落宫情况，若田宅宫干化禄入命迁线，因命迁线为母亲宫的父疾线，故表示母亲受教育良好，名誉较高；若化忌入此线，则表示母亲一辈子难有名声，困难重重；化忌入迁移宫冲命宫同论，表母亲受教育程度不高，没有社会地位。若田宅宫干化禄入夫官线，因夫官线为母亲的兄友线，表母亲在事业上很能干，有成就；反之，化忌入夫妻宫冲官禄宫，表母亲在事业上的没有任何成就。

    *   论子女有无出息，以子女为本宫，父母宫为子女的气数位。父母化禄入夫妻宫，因夫妻是子女的父疾线（文书线），故表示子女聪明智慧，读书很轻松，成绩好，日后青云直上，光宗耀祖；父母化权入夫妻，表示子女能认真读书，成绩也不错；父母化科入夫妻，表子女入学读书，是靠老师或别人帮助的；父母化忌入夫妻，表示子女智力不好，读书成绩不好，在文书上有麻烦。若父母化吉入财福线，因财福线是子女的兄友线，表示子女在财经方面有成就；父母化忌入财福线，则表子女财经上无成就。

    *   田宅是家，是房地产，是财之库。田宅的气数位为疾厄宫，疾厄宫干化吉入夫官线，因夫官线是田宅的父疾线，表示家世清白，家族在社会上有较高的声誉地位，不会有房地产纠纷。若疾厄宫干化吉入财福线，因财福线是田宅的兄友线，表示一家人主要走经商或财经界者居多，也主家族在财经方面较有成就。疾厄宫干化忌入夫官线或财福线，则家庭不幸，家庭财经困难。

