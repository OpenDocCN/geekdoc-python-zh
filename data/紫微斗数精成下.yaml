    ### 紫微：

    为宫禄主，掌爵禄，解厄制化。无左右等吉星扶助则不贵。代表尊贵，高级，政治，头部，红或紫黄色，首饰，古董，宾馆，别墅，政府要地，脾胃病。性情厚重，中庸，谦恭，耿直，才华横溢，热情好客，聪明能干；见异思迁，忧犹寡断，性情多变，喜好纵欲，高傲，喜奉承，心活耳根软，易听信别人的言语，贪图名利，小心谨慎。


    ### 太阳：

    为光明之星，官禄正主，主功名权贵，掌贵禄。失陷及夜生则不贵。代表父星，象意为阳性，男人，父，夫，企业，政治，动力，摄影，阳宅，电业，电话，眼镜，火，火灾，电，雷，动，运动，红色，心脏，高血压，肝火旺，眼病。性刚强，勇敢，聪明，能干，光明正大，公正无私，慈善博爱，豪爽，慷慨，好动，善交际；急躁，喜投机，浮华不实，好胜要强，奔波劳碌。


    ### 太阴：

    为财帛田宅主，主富贵。陷地及日生则难富贵。象意母宿，阴性，女，妻，服务业，财经，化装品，低洼，水池，水沟，幽静，大饭店，镜子，青白色，肾脏、膀胱、阴虚、妇科病。俊美优雅，聪明博学，仁慈，沉静，柔顺，诚实，人缘；性内向，多阴私，讲享受，懒散，疑心大，胆小，有洁癖，喜自由，辛劳，陷地权术阴谋，歪理多。


    ### 贪狼：

    为第一桃花星，欲望之星，主寿与祸福，掌游乐。象意为酒色，娱乐，饮食，原料，诱骗，赌博，乐器，贪念，情欲，圆滑，大树，餐饮店，教师，演艺人员，青白色，肝胆疾病。旺吉则良，聪明善辩，机谋，善交际，人缘好，头脑好，有创劲，不断进取；陷凶则劣，好表现，多计较，多变，好胜，自傲，浮荡，贪欲，好妒，占有欲强烈，狡猾，喜夜生活，好动，好酒色，好投机，好赌。


    ### 巨门：

    为物品主，象门户，主阴暗是非。代表暗沟，桥梁，烟囱，卡车，睡觉，教师，学术研究，用口或无证行业，医师，走私，窝盗，户口名，五谷，神庙，青黑色，呼吸道及胃病。旺吉则记忆好，口才佳，聪明善辩，分析力强，好学，交际广。陷凶则幼年多灾，暗昧多疑，喜吹牛，虚伪，偏激，好辨，是非多，易得罪人，劳碌，破败多灾。


    ### 禄存：

    主爵禄贵寿，能解厄延寿。代表俸禄，衣食，存款，钱币，古井，孤独，稻草。性情刚直仁慈，厚重守信，多学多能，计划性强，责任心强，有机谋，喜存储；胆小，固执，孤独刻薄，不合群，吝啬。逢空劫，吉处藏凶。与贪煞聚易吸烟吸毒。


    ### 文曲：

    科甲主星，掌文墨，偏重文学艺术。代表文书契约副本，创作，诗画，艺术，舌辩人，辩论，判决，学校，古玩店，文具店，书店，派出所，水池。学识广博，敏锐能干，光明磊落，多才多艺，文雅，善辩。女主多欲多疑。陷地则虚花，孤僻，固执，穷秀才。


    ### 廉贞：

    在命为次桃花，在事业为官禄主，掌品秩。象意公堂，堂上为官，堂下为囚。代表公教职员，外科医生，军警，电器，仪器，果园，血液，技术员，红色，心肺病。脾气差，固执好胜，喜表现，能言好辩。旺吉则有福，主官贵，性刚强，有冲劲，聪明能干，责任心强，廉洁。陷凶则轻浮放荡，心狂傲，无礼义，好酒色，多刑讼祸殃。'
