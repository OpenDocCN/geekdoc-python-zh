    # - △五、岁限应注意的几种凶格：

    - 1、七杀重逢：命宫有七杀守照，而大小限流年又逢七杀之官，即是。忌见羊陀重迭，大凶。逢羊陀空劫伤使者定有刑伤。七杀入庙及逢紫、相、禄存、化禄三方守照者可解。

    - 2、羊陀迭并：原命盘命宫或对宫有羊陀，而流年又逢流羊流陀飞入该官，谓羊陀迭并。若大小限重迭于该宫或对宫，无吉化解，主大凶。例如，庚生人坐命在西，西见羊；庚流年，流羊在西，流陀在未，为羊陀迭并。

    - 3、竹罗三限：凡命官逢杀破狼之一坐守，谓之“竹罗”，若大限与小限或流年又同时值杀破狼（即原命宫、大限宫、小限宫或流年宫必须都为杀破狼坐守），称为竹罗三限，如果三星失陷又无众吉守照来救，必主大凶，但亦必须流年凶煞会聚才应凶。尤其是三限俱坐七杀，复会巨门丧吊白虎，主其年九死一生。大限杀破狼，小限羊陀迭并，防意外伤亡。遇“竹罗”于庙旺之官,'
