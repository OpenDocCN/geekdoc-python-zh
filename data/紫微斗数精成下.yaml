    \n34 岁，流年在亥，为大限的财帛位，这一年所表现的都与钞票有关；冲宫成为流年的兄弟位，兄弟为田宅的财帛，为家庭生活费用；受冲表生活费用常会没有着落，经常寅吃卯粮，甚至还会断炊。\n\
    \n35 岁，流年与本命重叠；力量加倍；冲宫为流年的夫妻位，表这一年夫妻感情不好，聚少离多；命忌入官，表冲动事业，工作很认真努力；冲宫为田宅的疾厄，依一六共宗的原则，六破则一亡，故意味着这一年财库有损，破财不免，更谈不上有余钱。\n\
    \n36 岁，流年入丑，冲宫成为流年福德的疾厄，福德是夫妻的事业，表配偶的事业不顺，夫妻不太融洽。\n\n37 岁，流年入寅，流年的福德坐生年忌，冲宫为流年的财帛，财运必然很差。\n\
    \n38 岁，流年入卯，与大限重叠，好坏力量加倍，冲宫成为流年的疾厄，又为冲宫的交友，疾厄逢冲会倒店失业。（冲宫的交友是最凶的宫位，凡限年进入原命盘财官的化忌之“冲宫的交友”，都有可能倒店失业，但若该限大官化吉入本父或本疾，仍表有光明，当有救援作用）。\n\
    \n39 岁，流年入辰，坐忌；命忌入官，表终生痴情于事业，当大限或流年进入官禄宫时，这种痴情便会表露更为突出；官禄官不怕忌入，忌入表冲动事业，会认真打拼；但做归做，命归命，太阳化忌\
    \ 39 官 | 例二 | 忌冲宫夫\n| --- | --- | --- |\n| 38 | | |\n| 37 | 36 | 巨门<br>35 命甲子\
    \ | 34\n\n**有劳无功。**\n\n40 岁，流年入巳，冲宫成为交友，交友为工人，受冲表工人出勤不出力，故没有搞头；交友事业的上司，表与上司关系不好，事业不利。\n\
    \n41 岁，流年入午，冲流官，表能积极工作，事业有变动。\n\n42 岁，流年入未，冲流田（财之库），财库破，要破财。\n\n43 岁，流年入申，冲流年的福德（来财的地方），财源短缺。\n\
    \n**◎ 下面再举一个实例，是以化禄、化忌同时来看的，命盘如例三：**\n\n生年干化禄入兄弟、忌入交友，化权入子田线，不入本命的三方，一生属中等命运，不会大富大贵，但化科入命，一生喜学习偏门的科学文化知识和神秘文化知识，事业稳定平顺，钱财细水长流，源源不断，平稳增加。\n\
    \n**看终生财运，以命宫干飞四化来看。命宫干壬，四化分别为：梁紫左武。**天梁化禄入子女宫，子田线为财帛的父疾线，后天易得财名，即走先求名后得利，较有光明前景。但武曲化忌入财帛官，又是财星化忌，虽想发财却无能耐，不宜直接做生意求财，尤其不宜投资经商。综合看，只宜走求名的路线，以得名后赚钱，以名赚钱就是以公职或技艺方式赚钱。**\n\
    \n**既然分析出其人宜服公职，公职必以事业为主，我们来看看他的事业情况。财帛宫为官禄的气数位，就以财帛官干戊飞四化：贪阴右机。**化禄入迁移，离乡发展较有前途；化忌入兄弟官，为官禄的父疾线，主事业无名较难得上司的提拔无靠山；化权也入此线，虽稍有改善，但亦仅主本人有才千，工作积极，却怀才不遇，难得升迁。\n\
    \n**我们分析此人最适宜的谋生手段是什么？子女官干己使武曲化禄入财帛宫，应赚晚辈的钱，故最好搞教学工作；又疾厄官于也**机 | 化禄 |\t紫\t|\t\
    化科\t||破曲福甲申田乙酉廉府官丙戌阴化忌奴丁亥巨同贪左迁子武相右财寅命 3/12 壬午父癸未杀夫 23/32 庚辰阳梁化权子 33/42 己卯疾 53/62\
    \ 已丑例三\n\n是己，主自己用身体去赚钱，即服公职亦宜。\n\n再分析此人从事什么职业？以财帛宫干戊飞四化入宫来定，先看化忌星，化忌入兄弟宫，属“命兄财疾官田”的范围，就以兄弟宫的星曜论从事的行业。主星天机，一般主机械电器、计算、统计或跑动性工作，加破碎则可能为搞机械零配件的工作，加化禄为爱好、有缘，加天刑、天巫均表示为管理性的。此人确实做过修理电工、采购员、物资管理员、机械管理员\
    \ (与统计报表有关) 等工作，早年业余爱好也是电器，一生离不了机电、计算类。如能从事机械电器方面的教学工作最为理想。\n\n接着分析此人的财运。以上分析出此人不宜经商作老板，宜服公职，赚钱与事业为主，就以财帛宫干的四化飞入的宫位一路跟踪其人一生的财运发展情况。\n\
    \n命财官三宫化忌冲夫妻的大限只有己丑大限，已到退休年龄，所以运限中间不会有失业之大限。\n\n分析财运一般从第三大运开始，因为这一运程是成家立业的时期，如果命、财宫好的且属早发之人，可以从第二大限开始。此人紫微星坐命的人不会早发，财运也不算很好，故从第三大限开始分析。\n\
    \n23 岁/32 岁，大限居庚辰宫，七杀坐守，事业和婚恋多变动的限运 (此限内工作单位和工种变动了三次)。原禄入的宫位成为大限的财帛宫，财运好；但忌冲的宫位成为大限的父疾线，冲则动，父母为读书，意为要毕业工作了，但化忌又主事业庸碌，前途暗淡；忌冲的宫位成为大财的兄弟宫，也主钱财无成就；综合看，有财运，但事业不利，收入低微。事实是，本限参加工作，开始发薪水财运，但当工人，工资低微，月薪\
    \ 29.50 元。\n\n从另一方法看，大限宫干化禄入原命的子田线，即为财帛的父疾线，主此限内有财名，因名得财，亦为参加工作领薪之意。而化忌入原命的疾父线，即财帛的兄友线，又主无成就，故主事业平常，当木工、电工，收入低微。\n\
    \n33/42 岁，大限居己卯宫，阳梁坐守，二星均为事业星，事业应逐渐好转，但太阳为动星，工作变动大或作跑动多的工作 (作物资采购员，到处跑)。原禄入的宫位成为大限的子田线，即大财的父疾线，有财名，主事业前景好；但忌冲大财，力量大，损耗多，差费低，开始仅\
    \ 0.40 元一天，结果为入不敷出。\n\n从另一方法看，大限宫干化禄入原命的财帛宫，但化忌也冲财帛宫，收入大支出也大，若为经营老板必破败。上述已分析其中途不会失业，按常理，工薪会随工龄增加而增加的，但按当时的国力，增加不多，且支出也会增加，只能量入为出吧，生活仍属艰苦。\n\
    \n43/52 岁，大限居戊寅宫，武曲正财星之运，好财运。原禄入的官位成为大限的夫官线，即大财的财福线，主因事业增加收入；忌冲的官位成为大限的子田线，即大财的父疾线，又主财名有损，即难升迁；从发展趋势看，收入是平稳增加的。\n\
    \n从另一方法看，大限宫干化禄入原命的命迁线，亦是财来就我之意，收入大增。化忌入原命的兄弟官冲交友，与兄弟、朋友及同事合不来，事业不利，甚则失业倒店；交友为事业的父母，故与上司关系不好，亦主事业不利，造成收入增加不多。事实是，这一限运收入大增，但受到上司的排挤、打击，89\
    \ 年降职并第四次调换工作 (调换后的工作仍为与机械、计算有关)，为什么？流年己巳，坐忌，天机工作星化忌主工作变动，冲宫成为流迁，亦主工作要迁动，天机为机械、计算类。\n\
    \n53/62 岁，大限居己丑宫，从丁丑年九月十七日辰时起算，本官为原局疾厄宫，同巨二星均陷弱，难得大成就，且病灾多，宜保守为上；同巨二星的组合，有广交友之意。原禄入的官位成为大限的兄弟，即大财的田宅，钱财入库，银行存款增多；忌冲大限的夫妻，夫妻是个死亡点，表失业倒店，这一大限已到退休年龄，失业是正常的退休。\n\
    \n从另一方法看，大限宫干化禄入原命的财帛官，化忌又来冲财，也是有成有败，成败多端，收入大，支出也大，但存款还是平稳增加的。大限宫为原命的疾厄宫，因疾病破财，应于己年（双干化忌增力）。\n\
    \n1997 年，丁丑，与大限重叠，好坏力量加倍。原禄入的官位成为流年的兄弟宫，兄弟为田宅的财帛，表这一年生活费用充裕；禄入兄弟为过路财神，无积蓄或借钱给兄弟朋友。原忌入流年，对事业很认真；冲流年的夫妻宫，夫妻聚少离多；依一六共宗，冲六则一亡，从冲官逆数到第六宫为流田，故主财库有破损，破财不免。事实是，这一年的积蓄都借给兄弟了。\n\
    \n1998 年，戊寅，原禄入的官位成为流年的夫妻宫，禄照官禄，主事业平顺；夫妻为流财的福德，主财源多，有偏财收入。原忌冲流年的子女宫，破财与子女有关，合伙事业要散。这一年发了三笔偏财，其中一笔为一生以来最大的偏财\
    \ (正当补贴之类), 看哪一月得财？子年斗君在申，从申起子数到寅，寅年斗君在戌，再从戌官起正月，顺数到卯为五月（润五月），原禄入的宫位成为流月的夫妻宫，收入最大\
    \ (正应了“如果是化三吉，则会应于同类坐宫的限年”)；七月，原禄入的宫位成为流月的财帛官，亦主进财；九月，女儿跌伤手，破了点财。\n\n1999 年，己卯，原禄入的官位成为流年的子女宫，为流财的父疾线，有赚钱机遇，禄照田宅，家庭生活富裕。原忌冲流年的财帛宫，这一年必破财，什么时间？“同类相冲是个禁忌”卯年斗君在亥，从亥起正月，五月为流月的财帛，故应于五月。又己年干化禄、忌入冲原命财帛官，先发财后破财，“冲六则一亡”，从财帛宫顺数到第六宫为父母宫，父母官应属九月，故九月也主破财。什么原因破财？己干为原命的子女宫和疾厄宫，不是因疾病就是子女。事实是，二月兼职发点财，五月和九月二次留医（注，发财和破财均为开始引发时间，不是实际收支的时间）。\n\
    \n2000 年，庚辰，原禄入的官位成为流年的财帛宫，财运看好。原忌冲流年的疾厄，失业倒店的格局，上面已分析其人中途不会失业，所以仅主事业不顺，及因疾病而破财。综合看，其人收入大于支出，积存较多。对此人来说，财帛主正财，故这一年反无偏财收入。\n\
    \n2001 年，辛巳，原禄入的官位成为流年的疾厄宫，主有光明，疾厄为单位，意为靠单位收入，此年收入可观。原忌冲流命，忌不反冲，凶力不大。\n\n2002\
    \ 年，壬午，流年与本命重叠，力量加倍。原化禄入流迁照命，财运继续看好。原忌冲流兄，兄弟为财之田，财库破，要破财，因兄为田之财，故破财因家庭开支增大。这一年薪水大增，带子女外出旅游和为子女读书花费了几千元。\n\
    \n2003 年，癸未，原禄入的官位成为流年的兄友线，仍主有成就，但禄不入“我”宫，比不上前几年。原忌冲流官，表能积极工作，事业有波动。\n\n2004 年，甲申，原禄入的官位成为流年的官禄，事业有成就而赚钱。原忌冲流田，主财库破，因家庭事而耗财。流年干化忌入子女，注意因子女事破财。\n\
    \n2005 年，乙酉，原禄入的宫位成为流年的田宅宫，钱财入库，存款增加。原忌冲流年的福德，财源短缺。流年干与生年干同，禄忌同入流年财福线，有财又破财这一年为子女读书花费很大；忌冲天机工作星，工作变动，工作量增大或退休。\n\
    \n2006 年，丙戌，原禄入流年的福德宫，享福之财，即退休金。忌冲流疾，可能因疾病破财，或主上一年未退休，这一年必离开工作场所，即退休。\n\n2007\
    \ 年，丁亥，原禄入流年的父母官，仍有光明，可能会增加退休金。原忌入流迁冲流命，可能会外出旅游，但天机星化忌入迁，要注意车祸。\n\n63/72, 戊子大限，原禄入大限，本大限收入仍很平稳。忌冲大兄，不属“我”宫，最多家庭开支大一些而已。大限官干所化禄忌与原禄忌相同，意义同上。\n\
    \n服公职的人进财的地方就是服务的公司、单位，所以也可以疾厄官干四化飞入的宫位一路跟踪一生的财运发展情况。疾厄官干己的四化星为：武贪梁曲。疾厄官四化主要是论进财情况的，所以化禄与化忌分开论，化禄主进财，化忌主破财，不作双忌一起论，但每一大限和流年都是禄忌对宫，都既好又坏，意义基本相同，不太好分析。化禄入财帛，化忌又冲财，禄忌对宫，犹如云中之月，时光时暗，既能赚钱，又有破耗，暴发则会暴败，但工薪收入则较为稳定，只要不贪污就不会大败。因是子女和疾厄化出的忌，故破财的原因多是因子女或身体方面造成的。下面以此跟踪各大限的财运。\n\
    \n23 岁/32 岁，原禄入的宫位成为大限的夫官线，财运与事业有关，参加工作进入领薪阶层。忌入大官，工作虽很认真负责，但本人事业有麻烦，不顺，多变，得益少；忌冲大妻，为大财之福，故财源少，收入低微。\n\
    \n33/42 岁，原禄入和忌冲的宫位成为大限的兄弟宫，事业成就不大；兄弟为田宅的财帛，禄入为生活有所好转；兄弟为财帛的田宅，忌冲则库破，损耗大。\n\n\
    43/52 岁，原禄入的宫位成为大限的的命官，禄入“我”官，是财来就我，收入大增；忌入大迁冲大命，这一大限在外或社会花费大 (学气功、术数花费了不少钱)。\n\
    \n53/62 岁，原禄入的宫位成为大限的父疾线，是一生进财最多的大限，薪金达到了顶峰；忌入大疾冲大父，一方面主与上司关系下降到低谷，名誉和事业受挫，另一方面也可能因疾病伤灾及子女而破财。\n\
    \n# △四、看合伙\n\n先审兄友宫，视其星情是否吉利而定，旺吉而无煞则可合，衰绝或恶煞聚则不可合。兄友化三吉入命财官迁，大吉；化忌入命财官迁，则凶，不可合，也不宜借钱给朋友。\n\
    \n以河洛法而论，以奴仆宫的气数位，即子女官干去飞四化，若化三吉入父疾线、兄友线，表示可以合伙；若化忌入父疾线、兄友线，不能合伙，尤其 40 岁前更不能合；若化禄忌同入交友宫，也不能合。若化三吉入命财官迁或忌冲官禄，均可合伙。化忌入本命的三合方而化三吉又会照三方者，合而大吉。子女官化忌冲本命，不能做股东。子女官化忌冲交友，不可合伙。子女官化忌入交友宫，合伙时，对朋友较有利。\n\
    \n父母宫为文书官，父母化忌入命宫三方；福德或官禄宫化忌入父母；流年干化忌入父母宫；均指是非较多，文书上有麻烦，不可与人签约合伙及与人作保，好心没有好报。\n\
    \n看合伙人是否有诚意？以子女宫的天干飞四化来看，化禄入命兄，表示有诚意，化忌入命兄则无诚意。\n\n看合伙人是否有实力？以子女宫的星情格局来看，逢吉星吉格则有实力，逢凶星凶格则无实力，不宜与其合伙。\n\
    \n父母宫化权入命，本人以技术入伙。财帛宫化权、科入命，亦以技术入伙，无须出钱（化科仍要出少量钱）。财帛宫化禄入命，出钱多；化禄入兄友线，出最多钱。\n\n\
    合伙人数，看交友宫的五行局数，水局二人，木局三人等。\n\n合伙资金额，看父母宫五行局数或地支序数。又可以交友的财帛宫五行局数看要多少资金入伙。\n\n经营项目，以财帛宫的四化入财疾田官（按顺序先后看）等宫的星情断行业。\n\
    \n官禄化禄入父母，大限入本福，此限可合伙，能赚钱。\n\n何时合伙？大子化权入流年，此年合伙。\n\n看何时散伙：大子化禄入 A 宫，A 宫转化忌冲大子，流子入大子之年散伙；流年化禄入\
    \ A 宫，A 宫转化忌冲流子之年散伙；大子化忌入 A 宫，A 宫转化忌冲流子，当年合当年散；流年忌冲流子散伙，若大限化权照流年，散伙后自己又再另组伙伴。\n\
    \n# △五、搞外销的看法\n\n以迁移为本宫，其气数位为夫妻宫。\n\n夫妻宫化三吉入父疾线，表今年与人签约顺利。禄入父疾，只要三分努力就可成事；权入父疾，努力多少就成多少；科入父疾，为过得去，平顺，没有麻烦。\n\
    \n化忌入父疾线，表有文书上的麻烦，不可与人签约。\n\n外销的利润如何，赚不赚钱？看父母化禄有无入命兄财田，有则有利赚。无则平过，逢忌冲这些宫位则亏本，禄忌同宫或对照更凶。\n\
    \n若有利润，赚多少钱呢？以禄入宫的地支数来看。\n\n迁移逢忌冲，今年外销不好；忌冲子女，没有订单。\n\n凡命财宫的忌冲夫妻，是为倒店的格局。\n\n\
    # △六、看借钱、贷款\n\n十二宫分为八方（卦）位。\n\n流日干化科所落的宫位是贵人方，试想该方有哪些朋友是贵人，即向他借，可成。\n\n借钱要用化禄，无禄用科，无科用魁钺（以流日干查出），化权没有意思。禄是情，若交友禄入命，表朋友对我有情，很乐意借给我。禄入命财田皆可借。\n\
    \n借钱也可找天刑星，看天刑在流日的什么宫位，若为流日的兄弟宫，可找兄弟借；在子女宫可找晚辈或岳母借；在父母宫可找长辈、上司借。\n\n流友 (即流官的父母宫，代表公司老板)\
    \ 化忌冲命宫三合，贷不到；冲命或官禄官因贷不到钱而倒闭。\n\n# △七、讨钱\n\n流日的父母化禄入命，可顺利。化科入命，好言商量可讨到。\n\n化权入，恶脸相向，不一定能讨到。化忌入迁移冲命，讨不到。\n\
    \n父母化忌入命，分期付回，不顺。\n\n也可看流日的迁移宫之星，是哪一官干使之化权，就在该宫的时辰去讨。\n\n流兄化禄入 A 宫，A 月可去讨钱；流兄化忌入\
    \ A 宫的官禄宫，A 月的下一个月去讨钱。\n\n# △八、倒钱\n\n财帛宫化忌入父疾线，尤其是入父母宫，我会倒别人的钱，还钱时会拖延。\n\n财帛宫化忌冲父母，或财帛宫化禄入交友，会被人倒钱。\n\
    \n父母宫化忌入财官，朋友会倒我的钱，还钱拖延；化忌冲财，朋友还钱以拖拖拉拉的方式来还。\n\n交友化忌冲财，不情愿地被朋友亏损我的钱。\n\n交友化忌入财帛或官禄，不宜与朋友有金钱的来往，但钱财有惊无险。\n\
    \n交友的财帛宫化忌冲疾厄，朋友会倒我的钱。\n\n# △九、囤货\n\n田宅化三吉父疾线、子田线，可囤。\n\n田宅化忌入父疾线、子田线，不可囤；入兄友会有小亏，要有囤有出。\n\
    \n# △十、智商与考试\n\n可怜天下父母心，大多数父母都会关心自己的子女能否成才。\n\n“昌曲入命，不读诗书也可人”，其人脑子好，聪明才干，但学习态度不够积极，不实在。\n\
    \n昌曲夹命，遗传基因很不错，聪明，但昌曲入命和夹命，如午后太阳，开始明亮，往后日渐西斜。魁钺入命或夹命，如上午的太阳，越来越光明。命宫和父母宫逢机阴府相昌曲魁钺化科等星，庙旺无破主智商高；但若逢化忌加煞则主智商低，甚至弱智。\n\
    \n这是星情法看智商高低的一种方法。昌曲入田宅，家里很多书，却不爱读书。\n\n论智商与考试，四化法以官禄宫的四化是否入父疾线（父母宫为主）来看，化三吉入父疾线主智商高，化忌入父疾线则智商低。化禄入父母主光明，聪明机伶、反应快，读书考试好，禄\
    \ + 科更好、成绩高，禄 + 权不但成绩很好，且适宜从政当官。化权入父母是能干、认真攻读，读书考试也好，用功则名列前茅；权 + 科，要用功才能有好成绩。化科入父母是读书平常，成绩中等；化忌入父母或冲父母则不是读书命，成绩不好，若三吉入父母而化忌也入父母或冲父母，亦是不利。父母宫自化忌，不肯用功读书。官禄化禄入迁移，外在聪明，却不肯用功。化禄而自化忌，虽聪明，但不肯读书。\n\
    \n考试要结合大限和流年看，若大限化禄权入本命父疾，且流年也化禄权入大限的父疾线者则必然高中；若大限化忌入或冲本命父疾线则不利，流年也化忌入或冲本命父疾线，必不中。若原官禄宫化禄权入大父主十年光明，再入流年父母必高中；化忌入父疾线则不利。大官化禄权入本父，流年入本父；大官化禄权入大限的父疾线，禄权入的宫位成为流年命宫或事业官；均主此年必高中。\n\
    \n# △十一、看婚姻\n\n(一)、看预测者是否已婚：以流年夫妻宫看，若夫妻宫有两颗主星，且两主星均有四化星者是，逢化科（包括原局、大限、流年、自化）更是。\n\
    \n(二)、婚姻缘\n\n1、先审命宫的化曜有没有入夫妻宫，有则表觅友容易。命禄入夫妻，表对配偶情深、情浓，一见钟情，爱其人的品格；权入是虐待狂，多有争执；科入随和，随便，但关心有限，也较会犯桃花；忌入是粘住，不管好坏都一味狂热追求，婚后是非争吵多。\n\
    \n若命宫化曜没有入夫妻，再看有没有入交友（夫妻的疾厄）。命禄入交友，表关心配偶的身体健康，爱其身材姿色；权入交友，对配偶的身材要求很高，对配偶的健康要求很高；科入交友，我是配偶的贵人，表处处帮助配偶身体健康，对配偶要求不高；忌入则为关心配偶的身体而生烦恼，即爱得很痛苦。\n\
    \n命宫化禄入夫妻、奴仆宫，表我去追他（她）。\n\n2、次审夫妻宫的化曜有没有入命宫或疾厄宫。\n\n若命宫化曜不入夫妻和交友，表自己觅偶困难，可以再审视夫妻宫的化曜有没有入命或疾厄宫，有则表配偶会来就我。\n\
    \n夫妻禄入命，配偶有人缘，对我情探，一见钟情，爱我的品"
