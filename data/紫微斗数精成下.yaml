    ### (五)、结婚的时间


    #### 1、早晚婚


    化禄入命或配偶宫，可早婚。

    化忌入命或配偶宫，配偶化忌冲命或入官禄宫，均宜晚婚。


    #### 2、结婚的大限


    (1) 夫妻官的化曜入二、三、四大限宫，以先到的大限为结婚限。

    (2) 若夫妻官的化曜不入二、三、四大限宫者，可以夫妻宫的化曜入二、三、四大限的疾厄宫来看，视为对婚限。

    (3) 交友为夫妻的疾厄，交友宫干化忌入二、三、四限者，亦可能为结婚之限。

    (4) 配偶官化忌入 A 宫，A 宫为大限的四正位 (命迁子田)，此限结婚。

    (5) 男命，交友化忌入大限，或大限入交友，均主此限结婚。

    (6) 女命，疾厄化忌入交友。

    (7) 大限化忌入交友。

    (8) 配偶化科入交友。

    (9) 大限入本命配偶宫，大限化禄入命或化忌入疾厄。


    #### 3、结婚的流年


    (1) 以结婚大限的夫妻化忌之宫成为流年命官或流疾之年，为认识、订婚或成婚之年，也就是说，流年命宫或流疾走到大妻化忌之官，为相识之年，或上车之年。

    (2) 结婚大限的夫妻宫化科入流命、流偶，或照流命、流偶官，为结婚年。

    结婚大限宫干化科入流年命或流偶，或科照流年、流偶，为结婚之年（流年化科入夫妻官是择吉结婚的好方法之一）。

    以上附带条件为：流命或流夫之忌要冲流父（男命）、冲流田（女命）。

    (3) 也可用原局疾厄宫化忌所入之官，大限的夫妻宫走到该官为结婚限；再以大疾的化忌所入之官与流年的夫妻宫重迭为结婚之年。

    总之，我命疾之化曜要入他命疾，他命疾之化曜要入我命疾，才算具备条件。

    (4) 流年天干化禄权入夫妻官，也为结婚之年。流年红喜入命、限、年盘的命身夫福宫；十二博士中的青龙、喜神入命身也可用；大限且流年走入本命的红、喜、流年配偶官时；流年红喜入小限命或夫宫；流年化禄权科入小限配偶官；但上述各条必须不逢孤、寡、破碎、空、劫为前提，逢者煮熟的鸡也要飞。

    (5) 男命，交友宫化禄或忌入流年的命财福官。

    (6) 女命，疾厄宫化禄或忌入流年的命财福官。

    (7) 大限配偶化忌入 A 官，再找配偶的 A 宫化忌入何年之父疾线，则该年结婚。若大偶自化忌，则找化禄，其推算步骤同上。

    (8) 女命大限入太阳宫位，流年逢同禄紫破阳（陷）阴（陷）且流年红喜入命、身、夫、福、大限官。

    (9) 配偶宫化忌入 A 冲 B 官，在结婚大限内，流年要过 A 或 B 官才会结婚。

    (10) 大友化忌入流命，为结婚年。

    (11) 大偶化忌入流年、流偶，结婚之年。

    (12) 大友化忌入流年，大限化忌入流偶或流偶化忌入流疾，结婚之年。

    (13) 大友自化忌时，则大禄，入流偶年结婚。

    (14) 流年四化三吉入命官三合方，结婚之年。


    ### (六)、合婚


    男女双方的流年同时出现喜庆之兆，可视为有夫妻缘。


    #### 1、三合派合婚法：


    以男女双方命盘的命宫与夫妻官的星情来论合婚。例：如火星独守夫妻官者，可与命或夫妻官有擎羊星者婚配，称为“绝配”；巨门为暗星，易遭遗弃。若巨门在子午线者，互为夫妻，能同病相怜，亦为“绝配”。天梁为大人星喜照顾他人，与巨门组配，堪称美眷。太阳为光明之星，与巨门相配也不错。

    紫微独坐夫妻者，不免孤独，需懂生活情趣的伴侣才能美满，与太阳、天府、贪狼、天相、禄存坐命者相配为挂，若再会左右昌曲则更佳。


    #### 2、河洛派合婚法：


    用对方的生年干在我命盘上飞四化：

    化三吉入我三合方者，表示能使我格调高，能给我助益。

    生年干化吉入我父疾线者，表求对方为我的文书贵人，对我人格的升华有助力。

    生年干化吉入我兄友线者，为助我事业成功。

    生年干化吉入我田宅、福德，亦示为佳配。

    若化忌入我命迁线、财福线，必为怨偶，不可配。

    对方命宫干化禄入我命疾者，表示对我感情很深厚，尤以入命者为佳。


