    # ### 3、造宅择吉


    紫微斗数的星曜可与玄空紫白九星相配，对应关系如下：贪狼配一白，主宫在。子，管二十年；巨门配二黑，主宫在丑亥，每宫管十年；禄存配三碧，主宫在寅，管二十年；文曲配四禄，主宫在卯，管二十年；廉贞配五黄，主宫在申，管二十年；武曲配六白，主宫在未，管二十年；破军配七赤，主宫在午，管二十年；左辅配八白，主宫在辰巳，每宫管十年；右弼配九紫，主宫在酉戌，每宫管十年。吉凶可互相参考。


    屋宅择吉，主要是希望发财利和人丁兴旺，“山管人丁，向管财”，故首重坐方，坐方若得吉格吉星，无煞冲破，则为好课，能发人丁和官贵；若吉众而逢粒把煞星，煞星又逢制伏，则仍为可用。次重向方，若得吉格吉星，大旺财利；若见凶格凶星，主破财败业。出入的大门也很重要，忌见凶煞。


    紫微日课，以坐山看全面，看人丁及贵气，兼以子女官看人丁(子女)，以官禄宫看官贵；向方及财帛官看财；大门看吉凶；六亲官看六亲，父母同住者，亦不宜逢凶。


    选课的方法，以求测人要求的大致时间起出各日各时的紫微盘，然后以坐山为新命宫重布十二宫，看各宫的好坏，以分析出那方、那个六亲有利。最宜坐山方得吉格吉星，无煞星冲破，尤忌见空、劫、忌、孤、寡、灾煞、劫煞、天煞、太岁等'
