    看合伙人是否有实力？以求测人奴仆宫的星情格局来看，逢吉星吉格则有实力，逢凶星凶格则无实力，不宜与其合伙。

    父母宫化权入命宫，本人以技术入伙，无须出钱。财帛宫化权入命宫，本人以技术入伙，无须出钱。财帛宫化科入命宫，亦以技术入伙，但要出少量钱。财帛宫化禄入命，出钱多；化禄入兄友线，出最多钱，与股东出同样的钱财。

