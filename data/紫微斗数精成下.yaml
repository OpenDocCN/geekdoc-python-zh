    # ☆19、羊陀星之年，会发生伤害、疾病、争执之事。


    擎羊入限运，百事不吉，常失意，麻烦事多，是非纷争，忧愁寡断，伤灾疾病，常起是非之心，口舌较多。庙旺稍安，加吉经努力仍可有成就。失陷则有灾厄，事业难成；加吉可减轻灾祸；若再与陀罗化忌同宫，灾祸更重，主伤灾疾病缠身，或官司诉讼。生年支为四墓者，灾祸较轻，若与紫府昌曲同宫，则仍可有名利，但须努力拼搏才成。生年支为子午卯酉者，灾重；逢紫府守照可减轻灾祸。


