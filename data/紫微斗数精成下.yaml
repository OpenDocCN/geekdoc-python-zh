    随着时间、空间的不断变化，如大限、流年、流月、流日、流时等时空变化，天象也会发生变化，星辰的吉凶善恶也会随之而变化,以应人间百态和反影人事的吉凶成败的具体时间和地点。斗数的星曜落宫后，在同一时空内，即同一限运内，只反映随太极点变换（即官星变动）后的一次变化情况，若不四化，就不再变动，若要变化就要通过四化来表象星辰的变化。所以，限运的变化是从动中和外部看变化，而四化是从静处和内部看变化（动是绝对的，静是相对的，是相对于同一时间而言）。星辰不动，吉凶反影不出来；有变化就有动，有动就有吉凶的结果。从而使时间、空间与事件之间的关系串联起来，显现出某时某方位发生了什么事情，结果如何。可见，四化就是斗数中的“用神”，变化的契机。星情原本的好坏只是一种迹象、成因，时空变化和四化之后才能有变化，产生飞跃而显现出好坏，形成吉凶祸福，即结果。


    # △二、四化飞星


    四化飞星，是“四化”和“飞星”两词复合起来，表示两层不同的意思。


    "四化"，只表示星曜的变态，但不表示动向、与谁交往？


    “飞星”则是更进一层，是四化星变化后的行动，与其他官星发生相碰在一起的关系。


    四化与飞星虽意思不同，但两者是密不可分的，化了就要飞，不飞则不成化。


    # △三、四化的类型


    四化可分为生年天干四化、十二宫天干四化和限运天干四化等三大类型，这样“用神”就较多，参考的因素也就更多，可以从不同的角度来观察人事物的变化，从而使预测的内容更丰富，预测的准确率更高。(还可以生月、日、时干飞四化，属性与生年干类同)


    生年干四化与命宫干四化作用的时间相同，即对一生的命运均有影响，不同的是：生年干四化的影响是命里带来的，是天赋的，与先天因素有关，与祖德有关，见效显而快，力量大；命官于四化是自己造成的，是后天的行为表现，见效隐而慢，力量小。十二宫干四化也是见效隐而慢，整体力量较小，但也有其特殊作用。


    限运四化，包括大限、流年、流月、流日、流时等官的天干'
  - '[PAGE 84]


    飞出的四化，主要看本限运中人事物受本限运空间环境因素影响而发生变化的情况。大限干四化仅对本大限内的十年有影响，流年干四化仅对本年内有影响，流月干四化仅对本月内有影响，流日干四化仅对本日内有影响，流时干四化仅对本时辰内有影响。流年、流月、流日、流时比较重视冲照，不太重视三合方。

    小限宫干不飞四化，只用流年干四化入十二宫来论流年的吉凶，亦只重冲照。


    # △四、四化的自化


    由本宫干化四化入回本宫，叫自化，例如命宫干化禄正好入回命宫，即叫命宫自化禄。四化的自化，就是四化所在宫干化出的四化飞回本宫。

    凡四化的自化，即化为无，但并不是自始化掉而是得而复失。自化禄出是失去很甘心，权出是争到底还是失去，科出是能够看破，忌出是失去了还有麻烦。例如生年禄自化禄，即生年化禄星落宫的天干化出的禄入回本宫，结果先得后失，没有禄了。但自化科则仍算吉利，主考试及文上有喜。

    命宫有自化者，做事持续性较差，三分钟热度，动口不动手，好发号施令；比较善于原谅自己，遇挫折会自己找借口下台阶。


    # 四化中逢自化


    四化的自化有以下关系：

    化禄自化禄，禄出，同类相抵消，等于无禄。

    化禄自化权，等于禄权，须防得中有失。

    化禄自化科，等于禄科，防得中有失。

    化禄自化忌，禄忌，等于双忌。

    化权自化禄，为禄权，想的多，但力弱。

    化权自化权，同类相抵消，等于无权，没有节制。

    化权自化科，为权科，自己不想做。

    化权自化忌，为权忌，权可解忌，想要做又不要做。

    化科自化禄，为科禄，与贵人相处随和，不感激。

    化科自化权，为权科，但贵人助力一般。

    化科自化科，同类相抵消，等于无科，无贵人。

    化科自化忌，为科忌，科可解忌，但不彻底，表面好。

    化忌自化禄，禄忌，等于双忌。

    化忌自化权，忌权，不择手段，较有是非。

    化忌自化科，忌科，虽有贵人，但不显，硬装场面。

    化忌自化忌，同类相抵消，不忌。


    # △五、四化的化入与化出


