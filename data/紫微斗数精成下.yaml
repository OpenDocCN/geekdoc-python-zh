    # # 第五节

    活用紫微斗数择吉简介


    紫微斗数也可用于日课，即选择吉时吉方。紫微斗数原为命理预测学的专科,

    近人试用于选择吉日良时日课,其优点是吉凶分明，判断直观快捷，内容丰富。


    用紫微斗数选日课时，以求测者要求的大致时间来起出各日各时的一批紫微盘,

    从中选出所用之方有富贵格局且无破者为好课,得落宫主星吉且众吉扶拱而无煞或

