    ## 26、预测应期问题

    ### 预测应期，就是断事发生的具体时间

    是比较难掌握的问题，在此仅提供参考。可以命盘化忌星落宫顺数到用神宫，得几数即定为几月几日几时。还可以让求测人报数，转化成天干，再以天干飞四化，以化忌落宫顺数到用神宫位，看得几数，即为几月几日几时。具体是月还是日还是时，则要灵活掌握，可根据问测人提问时间，又可根据用神落宫的庙旺衰绝，用神宫与流年流月流日流时是否逢反吟
    (地支相冲)、伏吟 (地支相同) 来判断应期的快慢远近。一般伏吟主慢，反吟主快；测坏事，逢用神宫旺相（五行相生、相同）的月日时则应期慢，逢用神宫衰绝（相克，泄气，耗气）的月日时则应期快；测好事，逢用神官旺相的月日时则快，逢用神宫衰绝的月日时则慢。


    下面为兰天辰老师的例子：斗数速断应期方法，以四化和宫位来定应期。


    例如，戊寅年十二月二十二日 21:29，朋友问其徒弟在何处？按流分法我的命宫在辰，朋友在西宫，其弟子在午宫，紫微坐守，迁移宫贪狼星，上街去玩。


    21:37，朋友追问其弟子“戴代传几点回来？”问话字数 7 个，7 数对应的天干为庚，用天干庚去四化，庚使丑官天同化忌，从午到丑共 8 个宫位，一时辰 120
    分钟为六十甲子，则每 2 分钟一个宫位，8 个宫位相当于 16 分钟，故答："21:53 到家。”结果准时于 21：53 在楼下碰见。


    第二天，14:17 这位朋友又问；“测代传什么时候回来？”按流分法我的命宫在丑，由于戴代传也是我的学生，故以子女为其命宫在戌，问话数共 9 个字，对应天干为壬，壬使武曲化忌在寅，从戌开始数到寅四宫，每宫
    2 分钟，所以 8 分钟后回来。果然 16：26 到家，时间是 8 分过了 2 秒。


    还可应用河洛四化法的“同类相叠好事生”和“同类相冲凶事发”的方法法来定应期。例如，原命化三吉入财帛宫，当流年、流月、流日、流时的财帛宫走到原命的财帛宫时，吉事便发生了；又如，原命化忌冲寅宫，当流年、流月、流日、流时走入寅宫时，凶事便发生了。


    ## 第四节 测事速断捷法

    在预测近期事情，包括婚姻、求学、考试、升迁、求职、合伙、生意、开店、寻人、寻物等等，有一捷法，可以不用排星，仅按求测的时间求出命宫，即可速断。但这种论断仅为一种倾向性而已，具体性及准确率不高。


    此节可结合第十三章的八卦卦位法进行分析推断会更好。


    ### △一、求出命宫

    可在掌上进行：从寅宫起正月，顺数到问事之月，再从该月支宫起子时，逆数到问事时辰止，所止之宫就是命宫。


    ### △二、命宫支分组

    命宫求出后，以命宫所在宫的地支进行分组，共分三组；

    - 子午卯酉为一组，称为四正官：

    - 寅申巳亥为一组。称为四生、四马宫；

    - 辰戌丑末为一组，称为四墓宫。


    ### △三、命宫落宫含意及速断

    不管命宫落于何宫，凡逢冲年支、月支者，事多阻滞而难成，逢年破、月破百事难成。


    1、命宫落于四正宫者，为天地四正之位，代表积极、向上，且为敏捷、聪明和幸运的意思，但又为四败、桃花之地，主色情风流。

    - 问事畅通无阻而易成功。

    - 为远地、近期。

    - 问灾厄疾病为严重；若问病什么时候能好，则为近期。

    - 为道路旁、热闹的地方。

    - 个性活泼开朗，热情，性急，敏捷，重外表，喜交游，风流好色，飘荡难免。

    - 问寻物，可很快找到，遗失地点较远；在家为客厅；走失方位，可依地支宫位断，如子为正北方，午为正南方等。

    (7)、问事可成，问谈婚可成，问离婚也可成。


    2、命宫落于四马宫者，为四马之地，意为奔波、多动、变动，主才艺，又为四生宫，主操劳。

    - (1)、问事须积极争取才能成功。

    - (2)、为不远不近之地。

    - (3)、为道路与住宅区之间或巷子胡同等。

    - (4)、问灾厄疾病为不轻不重，一般；问病何时好，要一段时间才好，但也不会太长。

    - (5)、个性为中立派，可动可不动，聪明而富才艺，辛勤劳碌，易受制于人，自寻苦恼。

    - (6)、寻物要积极寻找才能找到，失落于离家不远不近的地方，如走道，过道等；失物方位可依地支而断。

    - (7)、问谈婚积极可成，问离婚积极也可成。


    3、命宫落于四墓之宫，代表收 (潜) 藏、保守和拖延性，主富，主刑，刑克六亲。

    - (1)、问事多阻滞而难成。

    - (2)、为近地。

    - (3)、问灾厄疾病为轻；问病何时好，为拖延难好。

    - (4)、为公寓区、为宁静、清静之地。

    - (5)、个性孤独、内向、多思多虑，外表沉厚而内心多疑，离乡外地发展为好。

    - (6)、寻物难找回，已被人收藏，或丢失于不易寻找的地方；在较近的地方失落；失物方位可依地支断。

    - (7)、问谈婚不成，问离婚也不成。


    ## 第五节 活用紫微斗数择吉简介

    紫微斗数也可用于日课，即选择吉时吉方。紫微斗数原为命理预测学的专科，近人试用于选择吉日良时日课，其优点是吉凶分明，判断直观快捷，内容丰富。


    用紫微斗数选日课时，以求测者要求的大致时间来起出各日各时的一批紫微盘，从中选出所用之方有富贵格局且无破者为好课，得落宫主星吉且众吉扶拱而无煞或虽有煞而有制服者亦可用。用于评格日课同理，只是用他人或用其他方法选出的日课起盘，然后审所用之方好坏以断该日课可用否，以及好在那里？不好在那里？


    婚姻嫁娶等无方位的，只用命宫和用神宫来判断吉凶。婚姻嫁娶择吉，最紧要的是夫妻能和睦相处，故首重命宫和夫妻宫，命宫和夫妻宫要成富贵格局，两宫的星曜配合好且吉众无煞，最宜逢梁、同、府、相等吉星。结婚也希望能子女有成，故次重子女宫，子女宫宜得富贵格局，无煞冲破。选夫妻宫逢化科的年月日时结婚最佳。


    择吉还宜参看命主及其家人的出生年落宫，最不宜逢化忌相冲和流年太岁相冲。


    择吉出行，以所到方位之宫的好坏看吉凶，而兼以出行所办之事的用神宫看办事的成败。例如，为经营求财，则以财帛宫及其气数位的四化星为用神；如为公事、求学考试，则以事业宫及其气数位为用神。


    紫微斗数起盘比较麻烦费时，要择一好的吉时吉方并非易事，用于选课显然受到局限，相对来讲，用于评格日课就比较容易和适用，可先以其他方法选好日子，或按人家择好的日课来起紫微盘，用紫微斗数来看用神方位之宫有吉格吉星否，有则可用；反之如有凶格凶星则不可用。如有“紫微斗数
    144 局图”一书就方便多了。有电脑的人就方便多了，紫微斗数排盘和批命的软件都有，可到网上去找或到软件店去选购，下面网站可供参考：(1)http://www.cqchen.com,
    (2) http://www.vichina.net。


    择吉选日课，派别甚多，各有各的理论体系，公有公理，婆有婆文章，那个正宗，无法说得清楚。用某派的观点去评格别派的日课，显然是不妥的。但为了慎重起见，多参考几家学说，不无好处，当几家的结果近于相同时，确定用此课，损害相对就会少一些。


    另外，注意所选日课要结合命主四柱来选，日课的四柱要为命主的喜用神，生扶命主的四柱，不能有刑冲克害命主的四柱，尤其不能刑冲命主的年柱。


    下面试用紫微斗数评格别家几例日课，以供参考。


    ### 1、签约投标

    对于签约投标类的预测或择吉，可以求测时间起盘，若已知投标的具体时间和方位，也可以签约投标的时间起出紫微盘，看该方位之落宫好坏以定投标有无把握。若要达到趋吉的目的，可先看那个方位宫最吉，在到达签约投标处后，就抢先坐于最吉之方，可达到事半功倍的作用。


    签约投标最忌空劫、旬空、截空、破碎、大耗、化忌等。


    以流时飞四化，化三吉 (以化禄为主) 入父疾线或所往方则表顺利，逢化忌入冲则不利。


