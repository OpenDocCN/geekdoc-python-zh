    命宫化忌入迁移，须经常往外跑，出外自主奋斗比在家好，但在外又是非多，人缘差，在外宜受雇、上班，经过艰苦奋斗才能成功。本宫化忌入对官，不反冲，凶力较弱。跑出去干什么？看星情，例如，贪狼主与食、色有关，武曲与经商有关。


    命宫化忌入奴仆，过份关心朋友，反而引起不和，且易犯小人，易为朋友拖累而心烦；奴仆为事业的上司，忌入主不会巴结上司；忌冲兄弟，与兄弟缘薄；兄弟为床位，逢冲表与配偶聚少离多；兄弟为夫之父，表女命与公婆关系不好，男命与岳父母或配偶的长辈关系不好；兄弟主成就，冲则无成就；兄为夫之父，冲则表婚书有麻烦，意为有离婚的可能（兄为田之财，离婚的原'
  merge: -1
