    下面为兰天辰老师的例子：斗数速断应期方法，以四化和宫位来定应期。


    例如，戊寅年十二月二十二日 21:29，朋友问其徒弟在何处？按流分法我的命宫在辰，朋友在西宫，其弟子在午宫，紫微坐守，迁移宫贪狼星，上街去玩。


    21:37，朋友追问其弟子“戴代传几点回来？”问话字数 7 个，7 数对应的天干为庚，用天干庚去四化，庚使丑官天同化忌，从午到丑共 8 个宫位，一时辰 120
    分钟为六十甲子，则每 2 分钟一个宫位，8 个宫位相当于 16 分钟，故答：“21:53 到家。”结果准时于 21：53 在楼下碰见。


    第二天，14:17 这位朋友又问；“测代传什么时候回来？”按流分法我的命宫在丑，由于戴代传也是我的学生，故以子女为其命宫在戌，问话数共 9 个字，对应天干为壬，壬使武曲化忌在寅，从戌开始数到寅四宫，每宫
    2 分钟，所以 8 分钟后回来。果然 16：26 到家，时间是 8 分过了 2 秒。


    还可应用河洛四化法的“同类相叠好事生”和“同类相冲凶事发”的方法法来定应期。例如，原命化三吉入财帛宫，当流年、流月、流日、流时的财帛宫走到原命的财帛宫时，吉事便发生了；又如，原命化忌冲寅宫，当流年、流月、流日、流时走入寅宫时，凶事便发生了。


    # ## 第四节 测事速断捷法


    在预测近期事情，包括婚姻、求学、考试、升迁、求职、合伙、生意、开店、寻人、寻物等等，有一捷法，可以不用排星，仅按求测的时间求出命宫，即可速断。但这种论断仅为一种倾向性而已，具体性及准确率不高。


    此节可结合第十三章的八卦卦位法进行分析推断会更好。


    # ### △一、求出命宫


    可在掌上进行：从寅宫起正月，顺数到问事之月，再从该月支宫起子时，逆数到问事时辰止，所止之宫就是命宫。


    # ### △二、命宫支分组


    命宫求出后，以命宫所在宫的地支进行分组，共分三组；


    +   - 子午卯酉为一组，称为四正官：

    - 寅申巳亥为一组。称为四生、四马宫；

    - 辰戌丑末为一组，称为四墓宫。


    # ### △三、命宫落宫含意及速断


    不管命宫落于何宫，凡逢冲年支、月支者，事多阻滞而难成，逢年破、月破百事难成。


    1、命宫落于四正宫者，为天地四正之位，代表积极、向上，且为敏捷、聪明和幸运的意思，但又为四败、桃花之地，主色情风流。


    +   - 问事畅通无阻而易成功。

    - 为远地、近期。

    - 问灾厄疾病为严重；若问病什么时候能好，则为近期。

