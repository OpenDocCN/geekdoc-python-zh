    # - ◇25、预测选举、竞赛、评比

    - **测本人能否选举上？**推出求测人的命盘，官禄宫干化三吉入父疾线，表有功名，可以当选。


    - **父疾线是文书线**，与功名有关，是升迁、晋升、升华，是按步就班得来的，也主读书、考试、申请专利、申请移民都很顺利。

    - 三吉入父母宫是有分别的，禄入是高票当选，轻松得来；权入要努力争取，但当选没问题；科入是贵人星，请求众人帮助，得到人家的同情。


    - **化忌入父疾线则没有入选**。

    - 以上是党内选举，若为党外或企业选举，应看兄友友线，官禄化三吉入兄友线可以当选，化忌入兄友线则没有当选。


    - **若有多个个人竞选**，问哪人中选（或问运动冠军是谁）？推出命盘后，再以十二宫分八方(卦)位，人数不多者，可以住家或现场站位作这几人的命宫，先以星情看，居最旺吉的宫位的那个人中选。又以预测或选举时的时干飞四化，以化三吉入父疾线看，先看有无逢化禄入者，有者中；无化禄入者，再看有无化权入，有者中；无化权入者，再看有无化科入，有者中；又无化科入者，再以化三吉入兄友线看，看法同上；逢化忌入者则落选。


    - **又法**，把竞选人进行随意编号，以兄弟宫（老师选优秀学生以子女宫）为1号的命宫，逆数到夫妻宫为2号的命宫，再逆数到子女宫为3号的命宫……，一直排到最后一人止（对于运动员，可直接用编号作命宫，大于12者除以12，取余数作命宫），再按上述方法进行推选。


    - **从多人中选中几个人亦同理**，选其命宫落宫最吉或逢化禄入父疾线者为第一名，落宫次吉或逢化权入父疾线者为第二名，落宫再次或逢化科入父疾线者为第三名。

    - 又法，以某人的生肖落宫星曜看，再以其生年干飞四化看，推断方法同上。


    - **单位检查评比排名次方法同上**。

    - ◇26、预测应期问题

    - **预测应期，就是断事发生的具体时间**，是比较难掌握的问题，在此仅提供参考。可以命盘化忌星落宫顺数到用神宫，得几数即定为几月几日几时。还可以让求测人报数，转化成天干，再以天干飞四化，以化忌落宫顺数到用神宫位，看得几数，即为几月几日几时。具体是月还是日还是时，则要灵活掌握，可根据问测人提问时间，又可根据用神落宫的庙旺衰绝，用神宫与流年流月流日流时是否逢反吟(地支相冲)、伏吟(地支相同)来判断应期的快慢远近。一般伏吟主慢，反吟主快；测坏事，逢用神宫旺相（五行相生、相同）的月日时则应期慢，逢用神宫衰绝（相克，泄气，耗气）的月日时则应期快；测好事，逢用神官旺相的月日时则快，逢用神宫衰绝的月日'
  - '[PAGE 190]


    时则慢。


    下面为兰天辰老师的例子：斗数速断应期方法，以四化和宫位来定应期。


    例如，戊寅年十二月二十二日 21:29，朋友问其徒弟在何处？按流分法我的命宫在辰，朋友在西宫，其弟子在午宫，紫微坐守，迁移宫贪狼星，上街去玩。


    21:37，朋友追问其弟子“戴代传几点回来？”问话字数 7 个，7 数对应的天干为庚，用天干庚去四化，庚使丑官天同化忌，从午到丑共 8 个宫位，一时辰 120
    分钟为六十甲子，则每 2 分钟一个宫位，8 个宫位相当于 16 分钟，故答：“21:53 到家。”结果准时于 21：53 在楼下碰见。


    第二天，14:17 这位朋友又问；“测代传什么时候回来？”按流分法我的命宫在丑，由于戴代传也是我的学生，故以子女为其命宫在戌，问话数共 9 个字，对应天干为壬，壬使武曲化忌在寅，从戌开始数到寅四宫，每宫
    2 分钟，所以 8 分钟后回来。果然 16：26 到家，时间是 8 分过了 2 秒。


    还可应用河洛四化法的“同类相叠好事生”和“同类相冲凶事发”的方法法来定应期。例如，原命化三吉入财帛宫，当流年、流月、流日、流时的财帛宫走到原命的财帛宫时，吉事便发生了；又如，原命化忌冲寅宫，当流年、流月、流日、流时走入寅宫时，凶事便发生了。


    # ## 第四节 测事速断捷法


    在预测近期事情，包括婚姻、求学、考试、升迁、求职、合伙、生意、开店、寻人、寻物等等，有一捷法，可以不用排星，仅按求测的时间求出命宫，即可速断。但这种论断仅为一种倾向性而已，具体性及准确率不高。


    此节可结合第十三章的八卦卦位法进行分析推断会更好。


    # ### △一、求出命宫


    可在掌上进行：从寅宫起正月，顺数到问事之月，再从该月支宫起子时，逆数到问事时辰止，所止之宫就是命宫。


    # ### △二、命宫支分组


    命宫求出后，以命宫所在宫的地支进行分组，共分三组；


    +   - 子午卯酉为一组，称为四正官：

    - 寅申巳亥为一组。称为四生、四马宫；

    - 辰戌丑末为一组，称为四墓宫。


    # ### △三、命宫落宫含意及速断


    不管命宫落于何宫，凡逢冲年支、月支者，事多阻滞而难成，逢年破、月破百事难成。


    1、命宫落于四正宫者，为天地四正之位，代表积极、向上，且为敏捷、聪明和幸运的意思，但又为四败、桃花之地，主色情风流。


    +   - 问事畅通无阻而易成功。

    - 为远地、近期。

    - 问灾厄疾病为严重；若问病什么时候能好，则为近期。

    - 为道路旁、热闹的地方。

    - 个性活泼开朗，热情，性急，敏捷，重外表，喜交游，风流好色，飘荡难免。

    - 问寻物，可很快找到，遗失地点较远；在家为客厅；走失方位，可依地支宫位断，如子为正北方，午为正南方等。'
