    # **第八节**


    太岁、小限落十二宫吉凶参断


    **上节是限年逢星的看法，不分宫度。此节是从流年入宫与星的配合而论，从不同方面加以考虑，来判断人行年灾患，故两节宜共同参看。以下若未论及的星曜，多为平平过，不吉不凶。以下之论，逢本官化吉时，主应福，亦宜三方吉众拱扶，若三方有煞则半吉半凶，吉处藏凶。本宫逢凶星时，主应灾，但三方吉众则可减灾，三方再逢煞者灾咎必应且重。（出生年太岁亦可参此节进行论断）。


    **☆1、子年太岁及小限到子宫，主星庙旺而化吉时：**（子年太岁及小限到子宫的意思是：流年为子年入子宫所主吉凶，或者是小限入子宫时所主吉凶，下同）


    主星为杀破，癸庚己年生人发福。主星为巨机，乙癸年生人'
