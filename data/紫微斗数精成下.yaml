  md: '同样，用紫微斗数预测六亲的生肖，以六亲宫的天干去四化，六亲生肖在化忌所在宫位的三方四正宫，但若用其人本命盘预测时，准确率不高，如若应用于活盘（即求测人有要求测六亲生肖的意向时起出的盘或用随机法定求测人的命宫法），则准确率会很高，而且往往就在化忌所在的宫内。


    "天机为兄弟主"，断兄弟个数的窍门就在这六个字当中。具体方法：


    +   - (1)、按求测时间起盘或用随机起盘的流时盘，定出求测人的命宫；

    - (2)、从命宫逆数到天机星所在宫位止；

    - (3)、数过宫位的总数就是兄弟姐妹的人数（数过的宫位中必须有甲级主星才算，无主星不算数）。


    例如（兰老师之例）：1999年二月初五日亥时，某先生求测，起出紫微盘，其命宫在酉，武曲七杀坐守，天机星在子，命盘寅宫无主星，从西逆数到子共十个宫位，考虑到寅官无主星，故兄弟姐妹共有九个。蔡先生回答非常正确，接着又问“现在兄弟几人？”我看了一下手表，时间是21:53，按流分定命宫，蔡先生在我命盘的未宫，天机星在巳，从未逆数到巳为三个宫：“现在兄弟几人”共六个字，即以己干四化，己使文曲化忌入西，从西逆数到未也是三个宫位，因此断：“三兄弟”。果验。


    蔡先生又问：“能不能算出排行？”共七个字，以庚干四化，庚使天同化忌入丑宫，未到丑共七宫，故知其排行第七，回答对；再想，天机在巳宫，若从巳到丑才五个官位，心想会不会有四个哥哥，排行第五，加上两个姐姐，总排行第七。果然如此。


    速断兄弟朋友例：


