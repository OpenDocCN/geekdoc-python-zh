- img_proc: true
  md: '因为不能照顾家庭生活）；兄为官之疾，任何官位冲疾厄皆视为凶兆，表我不能成就事业，事业做不好（原因是自己糊涂，做不好）；兄为田之财，又为财之田，表我不能照顾家庭，家庭费用大，生活困难，常断吹，寅吃卯粮；兄为福之子，阿公的子女为我之叔伯，表与叔伯往来较少；兄为父之妻，即母亲官，表与母缘薄，不同住或幼年离家；兄为子之福，表不能惠及子女；兄为疾之官，疾厄为生产的场地，疾之官为生产项目，表没有产品，引伸为无固定职业，到处打散工，难以成大业；兄为迁之奴，表与社会群众相处不好。


    命官化忌入官禄，喜固定工作，不喜变动，不宜做生意，宜上班；对事业工作很认真，很执迷，肯拼命干，认真到底，求好心切，每事必亲恭，也不计较得利之多少，事业每多波折，越波折越不服输，失败越惨；官为兄之交友，故表与兄弟共事会有是非；官为夫之迁，配偶外出久了会生心烦；官为子之疾，故表子女的身体会令我心烦；官为田之父，父为文书荣誉，故表不利家族，不能光宗耀祖，家人有是非麻烦；忌冲夫妻，只顾自己的事业而忽视了夫妻关系，夫妻缘薄，聚少离多，所以先立业而后再成家较好；夫妻为厨房位，冲则表房子无厨房，或为公共的，或厨房不好；夫妻为田宅的疾厄，冲夫妻谓“死亡点”，容易失业倒店，损房地产，青黄不接，损家族，六亲缘薄，家庭不和；夫妻为子女的父母，故表不能给子女带来光明，无力为其排忧解难，或因忙于事业而忽略了子女的教育；田宅又为女儿官，故表女儿的学业、事业会令我心烦；官为父之田，故表与父同住会心烦；夫妻是疾厄的田宅，田宅为护体，故主不珍惜自己的身体；夫妻为迁移的官禄，迁移为社会，为活动空间，故表我冲社会的事业，具有革命性，好改革，走时代的尖端；夫妻为交友的交友（即友谊），故表每多言词过失而伤及朋友；夫妻为父母的子女，父母的子女即我的兄弟姐妹，故表与兄弟姐妹缘薄，或不同居；夫妻为福德的财帛，冲则表爱好享受而花费钱财。（冲夫妻，依一六共宗的理论，以夫妻为六，顺数到第六位为田宅为一，冲六则一损，田宅受损为破库，表损财败财；又田宅为夫妻的交友，故冲宫的交友是最凶的宫位；以上的灾害还只是凶兆，即“天垂象”，“在地成形”，看应于那一大限？当大限进入田宅官，冲宫成为大限的疾厄官，疾厄为工厂、商店，冲则会倒店、失业，倒霉事就在这个大限，因命宫为财帛的气数位，所以倒霉事必与钱财有关；大限仍是凶兆，“在人成事”，看发生在哪一年？当流年进入田宅官，与大限重迭，好坏力量加倍，且冲宫为流年的疾厄，疾厄受冲为倒店的格局，所以这一年最凶；当冲官为大限'
