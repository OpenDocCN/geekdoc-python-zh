    - 命宫化禄入兄弟，表其人待人亲切，人缘好，对兄弟姐妹及朋友有情义，常以财物资助兄弟；兄为母官，表对母亲孝顺；兄为夫妻的父母，表因自身有成就而能给配偶带来荣誉，也表对配偶的父母恭顺；兄弟为田宅的财帛，故表能关心家庭经济和生活；兄弟为子女的福德，故表对子女的前程、品德很关心，对子女有很大的恩惠；兄弟为官禄的疾厄，表我想把事业扩大；兄弟为交友的迁移，表能善待朋友；兄弟为迁移的交友，迁移为社会，故表与社会各阶层的人相处不错，人缘好。


