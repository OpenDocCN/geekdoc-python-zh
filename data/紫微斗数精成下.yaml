  md: '仍属艰苦。


    43/52岁，大限居戊寅宫，武曲正财星之运，好财运。原禄入的官位成为大限的夫官线，即大财的财福线，主因事业增加收入；忌冲的官位成为大限的子田线，即大财的父疾线，又主财名有损，即难升迁；从发展趋势看，收入是平稳增加的。


    从另一方法看，大限宫干化禄入原命的命迁线，亦是财来就我之意，收入大增。化忌入原命的兄弟官冲交友，与兄弟、朋友及同事合不来，事业不利，甚则失业倒店；交友为事业的父母，故与上司关系不好，亦主事业不利，造成收入增加不多。事实是，这一限运收入大增，但受到上司的排挤、打击，89年降职并第四次调换工作(调换后的工作仍为与机械、计算有关)，为什么？流年己巳，坐忌，天机工作星化忌主工作变动，冲宫成为流迁，亦主工作要迁动，天机为机械、计算类。


    53/62岁，大限居己丑宫，从丁丑年九月十七日辰时起算，本官为原局疾厄宫，同巨二星均陷弱，难得大成就，且病灾多，宜保守为上；同巨二星的组合，有广交友之意。原禄入的官位成为大限的兄弟，即大财的田宅，钱财入库，银行存款增多；忌冲大限的夫妻，夫妻是个死亡点，表失业倒店，这一大限已到退休年龄，失业是正常的退休。


    从另一方法看，大限宫干化禄入原命的财帛官，化忌又来冲财，也是有成有败，成败多端，收入大，支出也大，但存款还是平稳增加的。大限宫为原命的疾厄宫，因疾病破财，应于己年（双干化忌增力）。


    1997年，丁丑，与大限重叠，好坏力量加倍。原禄入的官位成为流年的兄弟宫，兄弟为田宅的财帛，表这一年生活费用充裕；禄入兄弟为过路财神，无积蓄或借钱给兄弟朋友。原忌入流年，对事业很认真；冲流年的夫妻宫，夫妻聚少离多；依一六共宗，冲六则一亡，从冲官逆数到第六宫为流田，故主财库有破损，破财不免。事实是，这一年的积蓄都借给兄弟了。


    1998年，戊寅，原禄入的官位成为流年的夫妻宫，禄照官禄，主事业平顺；夫妻为流财的福德，主财源多，有偏财收入。原忌冲流年的子女宫，破财与子女有关，合伙事业要散。这一年发了三毕偏财,其中一毕为一生以来最大的偏财(正当补贴之类),看哪一月得财？子年斗君在申,从申起子数到寅,寅年斗君在戌,再从戌官起正月，顺数到卯为五月（润五月），原禄入的宫位成为流月的夫妻宫，收入最大(正应了“如果是化三吉，则会应于同类坐宫的限年”)；七月，原禄入的宫位成为流月的财帛官，亦主进财；九月，女儿跌伤手，破了点财。'
