    1994、95年，为债务而不安。（1995 年小限在辰宫，太岁在亥宫。小限盘为：辰为命宫，卯为兄弟，寅为夫妻，丑子女，子财帛，亥疾厄，戌迁移，酉奴仆，申事业，未田宅，午福德，巳父母。小限七杀坐守，好在无煞同宫，对宫天府来制化，且太岁宫吉，仍可相安无事，只是较辛劳而已，宜注意品德修养，不可激动。小限的财帛宫贪狼坐守，逢大限的化忌星，故为财务而烦恼。小限的事业宫破军地劫，事业上不宜妄动。小限兄弟宫阳梁坐守，应主兄弟吉庆。小限夫妻宫武相坐守，吉凶混杂，主妻子有吉有凶。小限的子女宫昌曲逢大限化权，子女学业长进，得贵人助益大）。


