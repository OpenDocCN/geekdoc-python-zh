    能否守得住财，则看田宅宫的星情及四化。**


    测店铺的生意和转让如何？**


    (1)、店铺的位置、经营项目如何选择？以疾厄宫的地支方位定位置，以化禄星落宫的星情表意论经营项目，以化禄星所在宫的地支方位为旺财方，或以武曲、天府、禄存所在官支为旺财的方位。


    (2)、店铺能干多少年月？那一年或月的天干化忌入父疾线或入子女冲田宅宫，则表示不开这个店了。也可从赚钱角度来分析，当财运差时就可能干不下去了。


    (3)、开张之后可能发生什么事？以流年天干和流月天干的四化星落宫来断财运的好坏。化三吉入父疾线或兄友线则财运好，化忌入父疾线或兄友线主财运差，化忌冲疾厄和田宅要关门或倒闭。


    (4)、店铺转让如何看？年月的天干化三吉入父疾线或兄友线主财运还好，不必转让；若年月的化忌冲疾厄宫、田宅宫时表示要转让。


    (5)、来租人能否出高价或压价？以奴仆宫为来租人，奴仆官干化禄入命、财宫则对方出高价；化忌冲财、田宫或入迁移宫则表示对方出低价。


    (6)、如何看能否成交？以父疾线或文昌文曲星落宫来看，若被年月日化忌来冲则成交不了。


    **测买车如何定宫？以父母官为用神，以星情及四化论其好坏，星曜反映具体部件**


    例如天机为轮子、电机、发动机等。


    问那一年炒股好？以天梁星落宫为本官，看其气数位(即天梁星落宫的官禄宫)化禄在何宫，流年走到该宫的对宫时会赚钱。例如，天梁的事业宫干甲使廉贞化禄入酉宫，那么会在卯年赚股票钱。何宫于化忌冲文曲之财帛，流年走到该宫的对宫，股票要亏。**


    ◇10、六亲预测**'
