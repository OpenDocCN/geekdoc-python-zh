    哪一年有光明？星的组合好的小限或流年，且流年小限的父疾线没有煞星侵犯而有吉星会，有光明，逢父疾线化吉更有光明。


    小限与太岁同宫，吉者更吉，凶者更凶。小限与大限同宫亦是。小限大限流年太岁三者同宫，更是。太岁与生年支相冲之年有灾，与大小限支相冲亦不利。


    太岁吉凶诀：太岁之星不可当，守临官限要推详，若无吉星来相扶，未免官灾人祸来。


