    # **◆15、预测搏彩**


    彩票号码如何算？以求测的时间起盘，再以父母宫为用神，父母官的天干数、地支数、干支纳音数可以反映出开奖的号码，以上述三数组合成号码。此外，还要参考父母宫的三方干支纳音数来参合。


    例如，某人测某日福利彩票号码，父母宫乙未，父母的财帛官为辛卯，对宫为辛丑，父母的官禄宫为己亥。天干乙为2数，地支末为8数，合起来为28；乙末纳音数为4，可为40；纳音加干支数为42；对宫丑为2数，加父母宫天干乙2数，合起来为22；财官辛卯纳音数3，与父母宫天干乙2数合起来为23：官禄宫天干己6数，地支亥12数，干支相加得18。开奖结果为：22、23、28、40、42，特别号码是18。


