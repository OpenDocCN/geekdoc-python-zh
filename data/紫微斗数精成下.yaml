    命身宫三方组成科权禄“三奇佳会”富贵格局，亦为机月同梁格（主机谋寿算），无凶煞破格，为上等星格；命身宫坐冠带、青龙，宫支辰土生文昌金，文昌金又生太阴水，为连续相生格局，数格可得上等。星得上格，数亦得上格，所以该命造可为上品富贵之命，成为一代国家元首，极品之贵。（从四柱八字很难看出其能当上国家元首，而从紫微斗数三方四正组成的三奇佳会格中可得答案，其高贵之处主要就是得力于此格局）。


