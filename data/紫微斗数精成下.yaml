  md: '帛的第六位，冲六则一损，故主财务上有损失，财务风险多；冲田，主常出远门，田为财库，冲则破，表因钱财与人纠缠，或因纠纷而破财；发生事之限年：大限入财福线，流年入兄或迁之年出事（以先到兄或迁之年断发生事）；田为兄之官，表与兄弟不能共事；田为福之父，表给祖上蒙羞；田为官之兄，表与同行不相往来，也可能经营冷门生意。


