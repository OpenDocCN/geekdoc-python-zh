    贫困夭折。行限遇左右昌曲，为官者升官升职，平民可生子发财，妇人喜事，做生意的可得利，僧道亦利。二限逢紫府武禄等星多升迁开创发财。


    11、凡大小二限及太岁，怕行伤使空劫羊陀之地，怕逢羊陀冲照，又怕伤使劫空羊陀并夹岁限，大凶，须有紫微天同天梁贪狼坐命方可解救。


    12、二限逢杀破狼廉巨等星，陷地加煞者多有祸，三方逢六煞交会照夹，男人易留连风月场所，女人易有外情而失身，甚则遭拐卖；夫妻官凶者，易有私情暴光、上报或捉奸受罚。


    13、岁限本宫无正星的一些看法：①命无正星，遇凶更凶, 若三方见煞凑，有死亡的可能。对官见凶煞更凶。②本宫无正星，再见羊陀及杀破狼，有开刀的可能。③流年遇本宫无正星，往往无主见，方针策略无法确定，行运多困顿，事业难遂。④本宫无正星，财帛官又不好时，财破得很利害，尤其大限逢之，更是。若三方四正吉多者亦可过得去。


    14、小限或流年逢杀破狼，陷地加会七煞、丧、吊、虎、伤、使、哭、虚、大耗等凶，或逢羊陀夹、空劫夹、火铃夹、伤使夹,'
