    # **准提菩萨手印**


    **第二节   略谈解灾**


    解灾，是趋吉避凶的主要内容之一，但范围较窄一些，往往是在测出有灾厄以后采取的防范、解救方法和措施。


    **俗话讲：君子问凶不问吉。对于吉，有吉者自然来，不必要管它，大不了少点富贵而已。而对于凶，若任其自然发展，则灾祸不免自然而然，这就不好了；若能提前预测知灾祸，而后采取防范措施，趋吉避凶，则有可能将大灾化小，小灾化无。这就是我们搞预测的目的。**


    **解灾有能解和不能解的，这一点必须预先讲清楚。邵康节这样伟大的易学家，预测出自己只寿61岁，他为什么不解呢？诸葛亮搞还魂大法，在关键时刻被魏延碰倒七星灯，结果功将成而垂败，寿仅54岁。为什么灾难这么难解呢？原因是多方面的，主要有以下几个：一个原因是命主前生种下恶果，今生又不修功积德，罪孽深重，不可救药，因果报应也；二个原因是命运是固有规律，很难改变，如果凶性太大就难解救;三个原因是灾难已临近，时间又紧迫也难解救，正所谓“平时不烧香,急时抱佛脚”，很多灾难不是一朝一夕就能形成，也不是一朝一夕就能解救得了的，须要按上一节的方法长期施行；四个原因是预测者水平不高，解灾者功力不足；五个原因是命主不信命或者没有按预测师的要求和方法去做。就象疾病，亦有可医与不可医者，即使明知不可医，亦会尽量医治。解灾也一样，亦宜尽力而为之，尽人事而后应天命。**


    **在此，奉劝世人，要发大慈大悲心，经常行善积德，勇于忏悔改过，不做坏事，敬礼佛道，则多福寿安康而少灾疾，有灾疾亦易化解，即使化解不了，还可以积下阴德、种下福田给后世后代，免除后世后代之苦。**


    **解灾的方法，除了按第一节所讲的常规方法经常施行之外，在测出有灾之年月，应注意以下几个方面：**


    1、预测出有灾的年月，不要到命局、大小限均凶，尤其是小限或流年、流月凶的方位去远行、活动，起居也宜避开此方位；到命宫三方四正好的宫位或紫微、天喜星(二星落宫亦宜吉多无煞方可)所在宫位去活动,最好远离住家50公里以上的吉方居住上一段时间;或在化科星的方位多读书活动、定居一段时间。若福德宫化科所在宫位吉者，亦可搬到该宫方位定居。


    2、有凶灾的年月，宜忌在第九章中有论述，以凶星为主进行避忌。**'
