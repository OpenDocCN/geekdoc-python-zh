- md: "## ◇ 10、速断兄弟朋友例\n\n同样，用紫微斗数预测六亲的生肖，以六亲宫的天干去四化，六亲生肖在化忌所在宫位的三方四正宫，但若用其人本命盘预测时，准确率不高；如若应用于活盘（即求测人有要求测六亲生肖的意向时起出的盘或用随机法定求测人的命宫法），则准确率会很高，而且往往就在化忌所在的宫内。\n\
    \n“天机为兄弟主”，断兄弟个数的窍门就在这六个字当中。具体方法：\n- (1)、按求测时间起盘或用随机起盘的流时盘，定出求测人的命宫；\n- (2)、从命宫逆数到天机星所在宫位止；\n\
    - (3)、数过宫位的总数就是兄弟姐妹的人数（数过的宫位中必须有甲级主星才算，无主星不算数）。\n\n**例如（兰老师之例）：** 1999年二月初五日亥时，某先生求测，起出紫微盘，其命宫在酉，武曲七杀坐守，天机星在子，命盘寅宫无主星。从西逆数到子共十个宫位，考虑到寅官无主星，故兄弟姐妹共有九个。蔡先生回答非常正确，接着又问“现在兄弟几人？”我看了一下手表，时间是\
    \ 21:53，按流分定命宫，蔡先生在我命盘的未宫，天机星在巳，从未逆数到巳为三个宫位；“现在兄弟几人”共六个字，即以己干四化，己使文曲化忌入酉，从西逆数到未也是三个宫位，因此断：“三兄弟”。果验。\n\
    \n蔡先生又问：“能不能算出排行？”共七个字，以庚干四化，庚使天同化忌入丑宫，未到丑共七宫，故知其排行第七，回答对；再想，天机在巳宫，若从巳到丑才五个官位，心想会不会有四个哥哥，排行第五，加上两个姐姐，总排行第七。果然如此。\n\
    \n**速断兄弟朋友例：**\n用预测师本人的命盘来为求测人预测其兄弟朋友的情况。求测人坐落命盘的午宫，午宫为原命盘的兄弟宫，命盘如下图：\n\n| | 机昌火\
    \ | | |\n|---|---|---|---|\n| | 速测兄弟例 | 阴陀 |\n| 同梁铃 | | 巨羊 | |\n\n求测人的命宫就是我（预测者）的兄弟宫，兄弟宫表兄弟的事情。现兄弟宫中有三颗主星，故断求测人共有兄弟三人（以甲级主星为准）；对宫为我的交友宫，巨门擎羊为恶曜，为二个不良的朋友，巨门为暗星，主小人暗中捣鬼，擎羊同宫更不利。\n\
    \n有人以夫妻宫的纳音数看兄弟数目，因夫妻为父母的子女；姐妹数目，以官禄宫的纳音数看；逢化科加 3，逢禄权加数，逢化忌减数。可在实践中试试。\n\n也可以求人坐落的宫为新命宫，重布十二宫，再以新命盘的兄弟宫来分析论断。\n\
    \n**看六亲属相：**\n以六亲的宫干去化忌，看化忌入何宫，该宫的地支属相即为该六亲的属相。有时，属相会在化忌宫的三方四正宫位上。总之，六亲的属相必在化忌宫的三方四正宫内或六合宫内。\n\
    \n**求测兄弟、子女事件：**\n看日时干化忌的冲宫属第几个兄弟姐妹或第几个子女。\n\n**儿子的推算法：**\n以子女宫为长子，逆去到财帛宫为次子，疾厄宫为三子……。\n\
    \n**女儿的推算法：**\n以田宅宫为长女，顺行下一宫为二女，再顺下一宫三女……。\n\n**看子孙：**\n以子女宫往下推，财帛宫为嫡孙，疾厄宫为曾孙。\n\
    \n**兄弟的排行：**\n以兄弟宫为老大，逆数排行下去，如自己为老大，则兄弟宫为大弟，子女宫为二弟，夫妻宫为三弟等。姐妹则从父母宫起老大，顺数排行下去。\n\
    \n还可以流日干飞四化，看六亲目前的情况，逢三吉入主吉，逢忌冲则凶。\n\n## ◇ 11、预测灾病\n\n**看疾病灾厄：**\n以疾厄宫为主，兼看命宫；外出则看迁移宫。占病最忌疾兄田宫动（即逢煞或化忌星冲则动）。\n\
    \n疾厄宫主星失陷加煞忌星聚会，必有病灾。逢化忌冲更凶。病情轻重看煞忌星多少及制化情况而定：\n- 煞聚兼有哭丧星，则病重难愈；命宫又不吉者则不治；\n-\
    \ 煞少或能制伏且无哭丧星，则病易愈。\n\n**什么时候病？**\n年、月、日、时干化忌冲疾厄的时候病。流年（月）化忌冲疾厄，当流月（日）的疾厄入原疾厄宫时病重；流年（月）的疾厄化忌冲夫妻，流月（日）的夫妻宫入原夫妻宫时病重。\n\
    \n**什么病？**\n以疾厄宫的宫卦和宫中星曜的五行属性而定。\n\n**病的部位：**\n可以星曜的性质和后天八卦来定。例如：紫微星为头部，巨门为咽喉，天府为腹部等。以后天八卦洛书数而论，“载九履一，二四为肩，左三右七，六八为足”，离在头部，坎宫在下阴部，坤、巽宫在肩部，震宫在左腹胁部，兑宫在右腹胁部，乾、艮宫在足部。\n\
    \n**测灾厄：**\n以迁移宫为主来看，兼看命、疾宫。\n- 宫中有羊、陀、哭、虚、空、劫、阴煞、丧门、白虎易生祸殃；\n- 若再与天机、巨门、天马等交通星交会，则易有车祸；\n\
    - 若再与武、杀、刑、羊等武斗星会聚，则在外易受打杀伤害；\n- 若与红鸾、咸池、廉贞、贪狼、天姚等桃花星交会，为色情之灾；\n- 与红鸾、廉贞交会，易有血光之灾。\n\
    \n**七杀擎羊白虎组合：**\n对宫武曲化忌来冲，争斗、官司、血光、凶杀；杀羊官符入迁移，犯刑、降调；武曲会火铃，因财被劫，财务纠纷；武曲逢羊忌，因财持刀，加白虎定有刑伤；昌曲陀武，投河自杀；廉贞在巳宫加会四煞化忌白虎，主残疾、手术、刑灾；卯酉迁移宫逢廉破曲，枷锁囚徒；廉杀丑未同宫，加六煞星，路上埋尸；廉破羊居迁移，死于外道。\n\
    \n**流年凶险：**\n- 流化禄入田宅而田宅自化忌，疾厄化忌入官禄，福德化忌入官禄，疾厄宫化忌入迁移，疾厄化忌入父母，均易有凶险死亡；\n- 流化忌冲本田，流月田宅宫走到本田，该月凶险；\n\
    - 流月化忌冲本命，流月入本命宫时亦为凶险。\n\n**如何避难？**\n可搬往天喜、化科（包括原盘化科、福德宫化科）或空亡的方位去住一段时间；测出有血光之灾者，可捐献点血来化解。\n\
    \n**医生以化科星为用神：**\n- 化科入命身或疾厄，主可得良医；\n- 化科落宫克疾厄宫者也主可治；\n- 反之化科不入命身、疾厄或被疾厄宫克者，均主难医。可到化科的方位去找医生。\n\
    \n**什么时候好？**\n在有救的情况下，逢化科、天喜的月、日、时好。\n\n**找医生看病：**\n以流日干（即看病当天的天干）化科所入的方位为贵人方，可到该方位去看病；以该方位所属八卦，看找什么样的医生。例如：化科入午宫，离卦，可到南方找属马的中年女医生看。\n\
    \n## ◇ 12、预测事情、信息真假\n\n**以父母宫的星情配合四化来论：**\n- 父母宫不逢凶星、空星则真；有科权禄守照更为有利。\n\n**事后能否有利，能否领到钱？**\n\
    - 父母宫或疾厄宫干化三吉入财帛宫表示有利、能领到钱；\n- 化忌入财帛宫则表示不利、领不到钱。\n\n## ◇ 13、看刑讼\n\n有无刑灾以命父宫为主，兼看官禄宫。可参看第十二章有关章节。\n\
    \n**容易有刑灾的组合：**\n①太阳化忌或落陷宫化权再逢刑煞星；\n②廉贞加白虎；\n③刑囚夹印（廉相会擎羊）；\n④廉贞化忌；\n⑥巨门会火铃白虎及巨门落陷化忌；\n\
    ⑥七杀会羊陀官符。\n\n**测词讼：**\n以父母宫为用神，何宫天干化忌入父母即为起因。奴仆宫为对方。**结果如何？** 以年干四化：\n- 化三吉入父疾线则对自己有利；\n\
    - 化忌入父疾线对自己不利；\n- 化三吉入奴仆宫则对对方有利；\n- 化忌入奴仆宫及其对宫则对对方不利。\n\n## ◇ 14、预测怀孕\n\n**若问生男生女，有多种方法：**\n\
    ①太阳落阳宫主生男，落阴宫主生女；太阴落阴宫主生女，落阳宫主生男（子寅辰午申成为阳宫，丑卯巳未酉亥为阴宫）；\n②红鸾星坐子女宫多生女，天喜星坐子女宫多生男；\n\
    ③子女官逢紫阳明廉等星多生男，逢府阴贪杀破巨梁多生女。\n\n**看子女好坏：**\n以子女的星情看：\n- 子田线吉多无煞，儿女品貌好，孝顺，将来有成就；\n\
    - 子田线煞忌星聚，多为不吉，儿女品貌劣，不孝，将来难有成就。还可以子女宫的气数位（父母官）飞四化来看，化三吉入子女的父疾线和兄友线则好，化忌入此二线则不好。\n\
    \n**看生产情况：**\n- 以子女宫吉则吉，子女官凶则不利；\n- 子女宫逢羊刑，难产，开刀而产；\n- 逢杀破刑羊，难养；\n- 子女宫逢化忌，易有流产事。\n\
    \n**看产母情况：**\n孕妇本来测以命宫为用神，丈夫来测以夫妻官为用神：\n- 用神宫逢煞忌星聚，产母不利；\n- 逢刑羊杀破钺廉红等聚，易有开刀或流血过多的危险；\n\
    - 子女宫又逢凶煞星者，更为开刀破腹产的兆示；若又逢空、劫、截空、旬空、哭、虚等丧亡星聚，则有死胎的危险。\n\n**若问何时生产？**\n紫微斗数在这方面预测经验很少，可以从下面几方面试验：\n\
    ①以红鸾星落宫的地支定出生日；\n②以红鸾星落官顺数到儿女宫定月数或日数；\n③让求测者报一个或一组数字，求出对应天干（大于十则除以十，以余数求天干），用天干飞四化，以化忌落宫顺数到子女宫得几数即可定几月或几日数，或以化忌落宫的地支定为生产的日支；\n\
    ④以子女官干飞四化，以化忌落宫定生产月或日数，或以化忌落宫的地支定为生产的日支。\n\n## ◇ 15、预测搏彩\n\n**彩票号码如何算？**\n以求测的时间起盘，再以父母宫为用神：\n\
    - 父母官的天干数、地支数、干支纳音数可以反映出开奖的号码，以上述三数组合成号码；\n- 此外，还要参考父母宫的三方干支纳音数来参合。\n\n**例如：**\
    \ 某人测某日福利彩票号码，父母宫乙未，父母的财帛官为辛卯，对宫为辛丑，父母的官禄宫为己亥：\n- 天干乙为 2 数，地支末为 8 数，合起来为 28；\n\
    - 乙末纳音数为 4，可为 40；\n- 纳音加干支数为 42；\n- 对宫丑为 2 数，加父母宫天干乙 2 数，合起来为 22；\n- 财官辛卯纳音数 3，与父母宫天干乙\
    \ 2 数合起来为 23；\n- 官禄宫天干己 6 数，地支亥 12 数，干支相加得 18。\n\n开奖结果为：22、23、28、40、42，特别号码是 18。\n\
    \n**总之：**\n开奖号码数多在父母宫及其三方四正各官天干、地支、纳音数字的不同组合上。至于中与不中，那是玄机之事，说白了就是你本人有没有这个福气，有没有偏财（横财）运的问题。\n\
    \n## ◇ 16、国运或地区运势预测\n\n**测国运：**\n以大年初一日晚上子时起盘进行预测，也可以问事时间起盘预测。\n\n**测地区或单位情况：**\n\
    则以间测时间或随机起盘。\n\n**(1)、命盘十二宫的基本表意如下：**\n- **命官**：国家荣衰，人民富裕，社会安泰，国力等情况；地区荣衰情况。\n\
    - **兄弟宫**：正义，公理；一般的睦邻和伙伴关系，交通运输，邮电通信，新闻传播，公共公益事业。\n- **夫妻宫**：亲仁，和睦；国际交往，国外事业，比较友好的睦邻和伙伴关系，外交事务，契约，计划，战争，后勤，物质生活水平。\n\
    - **子女宫**：创造能力，发展能力，文化教育，体育，儿童，出生率。\n- **财帛宫**：经济景况，工商业，银行，存款利率，黄金，白银，股市，证券。\n\
    - **疾厄宫**：税收，自然灾害，流行病，保险业，驻外代表，公共安全，公共卫生，外汇管理及汇率。\n- **迁移宫**：旅游业，船务，运输，法律，宗教，哲学，对外发展、扩张能力。\n\
    - **奴仆宫**：工人，劳保，企业，军队，警察，秩序，劳工法，左派分子。\n- **官禄宫**：统治，推进；国家或地方领导人，执政党，政府形象，政治活动。\n\
    - **田宅宫**：大地，田园，河山，矿产，农牧业，建筑业，生态环境，反对党，非主流派，民主人士。\n- **福德宫**：民意，群情，福利事业，精神意识形态，社团活动，国会，议会，地方政府，行政工作，选举工作。\n\
    - **父母宫**：慈善事业，刑法，制度，特赦，慈善机构，公立医院，秘密结社，庙观，赈灾，抚恤，科学技术，文学艺术。\n\n**(2)、具体分析：**\n\
    以命宫看近期全国或地区的总体情况：\n- 若逢吉星吉格，无煞冲破，三方四正吉众拱扶，则太平盛世，人民安泰，国富民强；\n- 若逢凶星凶格，三方四正凶煞聚凑，则国无宁日，地区不安。\n\
    \n以命盘十二宫的星曜情况参看上述十二宫表意进行各方面的分析论断。还可以紫微星落宫的情况看国家或地区首领的情况：\n- 若逢左右吉众会照，无煞冲破，则明君得良臣辅佐，国家或地区自然大有希望；\n\
    - 反之，若无左右吉星而逢凶煞聚凑，则领导不力，奸臣当道，小人得志。\n\n还可以各宫干飞四化，以四化星进行分析论断各方面情况：\n- 例如，以官禄宫或紫微宫干化禄入宫看领导人近期特别关心那一方面，将到那一方视察；\n\
    - 若化禄入奴仆，则今年领导人将关心民众疾苦；\n- 若化禄入申、酉宫，则领导人将到西方视察，等等。\n\n以天相落宫看总理或副职领导人：\n- 若逢吉星吉格，则为忠良之人；\n\
    - 若逢凶星凶格，则为不忠不义之人，不能辅佐主要领导人。\n\n**官员职能：**\n- 武曲为掌管军机、财务、经济大权的官员；\n- 廉贞是掌管人事、司法大权的官员；\n\
    - 七杀破军为战将，逢吉聚则太平；逢羊陀凶煞聚、化忌冲照，将会有动乱、战争。将星也是战将，逢化忌冲动亦主动乱。\n\n**测自然灾害：**\n可以十二地支宫看各方位情况：\n\
    - 逢廉、贪、杀、阳、火、铃、空、劫、忌、阴煞等聚会之方，将有火灾、旱灾、地震等灾害；\n- 逢蜚廉、天空、地劫、凤阁、红鸾、破军、大耗、化忌等凶星聚会之方，将会有虫灾、传染病、失收；\n\
    - 逢阴、贪、龙池、劫、忌、哭、虚、破、大耗等凶星聚会之方，将会有水灾、失收；\n- 逢羊、陀、劫煞、天刑、地劫、巨门、大耗、七杀、破军、化忌等凶星聚会之方，将会有纷乱争斗、盗贼；\n\
    - 逢巨门、陀罗、天机、天空、天马、地劫、天刑、阴煞、飞廉、火、铃等凶星聚会之方，将会有交通事故频繁。\n\n**从星情看：**\n- 贪狼星代表天灾、台风、雷雨、水灾、旱灾、病毒、动物；\n\
    - 七杀星代表地变、地震、火山爆发、山崩地陷；\n- 破军代表人祸、战争、爆炸、杀害、瘟疫、毁灭。\n\n**一般，测天气天时情况以父母宫为用神，测官员以官禄宫为用神，测病灾流行病以疾厄宫为用神等。**\n\
    \n## ◇ 17、预测出行\n\n**以问事时间起盘：**\n- 命忌入迁主出行，加会马星更是。什么原因动？就看那一宫干使命宫化忌，原因就是该宫的名称。例如官禄宫干使命宫化忌，因事业而动。\n\
    \n**若问出行吉凶：**\n以出行的时间起盘，以迁移宫为用神；若知具体出行方位，也可以所到之方为用神：\n- 以用神宫星情看顺利与否：有吉星吉格，无煞冲破，则必然美好顺遂；逢煞忌星聚凑，则不吉，出行不利；用神宫煞聚，对宫化忌冲动更凶。又可以用迁移宫飞四化，化三吉入命财官福等宫则吉，化忌入则凶。\n\
    \n**注意事项：**\n- 用神宫逢大凶、凶祸之格局，命宫又不吉者，不要在这个时辰出行，应改时辰出行；若时间已定，非出行不可时，可先向紫微盘上吉利的方位、或天喜星所在方位、或化科星所在方位走，然后再绕道到所要去的方位。\n\
    - 如果时间、方位、绕道都不能变，那就只好听天由命了，命运好者亦可平安无事。\n\n**迁移宫或所到之方逢凶星聚会：**\n巨、马、羊、陀、机、空、劫、刑、魁、哭、虚、忌、阴煞、破碎等凶星聚会，出外小心车祸；若逢武、杀、破、廉、等暴怒星与刑、火、铃、羊、陀、巨、阴煞等是非伤害星聚会，易有纷争是非、破财，再加会哭、虚、空劫、截空、破碎、天魁等丧亡星，则有伤亡的危险；若逢煞忌与桃花星聚会，小心因色情惹祸。\n\
    \n**坐飞机者：**\n迁移宫逢杀、阴、空、劫、魁、破碎、阴煞、哭、虚、羊、火、忌、阳巨 (同宫) 等星聚会，易发生空难，不去为妙。\n\n**坐船者：**\n\
    迁移宫逢机、阴、巨、魁、空、劫、哭、虚、忌、阴煞、截空、龙池、四煞等星聚会，易有沉船事故，不去为妙。\n\n**特殊情况：**\n- 迁移官逢吉星加哭虚、孤寡，出外无大碍，仅有烦恼、孤独而已；\n\
    - 逢孤寡也表示为自己单独出行，或同行者少而不能融洽。\n\n**若问出行谋事顺利否？**\n则以出行所谋的具体事情取用神宫：\n- **例如出行求财：**\
    \ 以财帛宫为用神，逢吉星聚（如武、府、火贪、铃贪、禄马而无煞冲破），则求财顺利，逢富贵格局更妙；若逢煞聚，尤其是空劫忌，则无利，劳而无功。\n- **例如出行办公事：**\
    \ 以事业宫为用神，逢吉星聚（如紫、阳、左、右、昌、曲、相），无煞冲破，则办事顺遂；若逢煞聚，则办事阻滞不利。\n\n**何时出行？**\n可以日时 (时间长者用月)\
    \ 的天干化忌冲迁移宫的时候走。\n\n**何时回来？**\n可以日时 (时间长者用年月) 的天干化忌入田宅宫的时候回到家。\n\n**出国移民：**\n\
    看田宅宫，吉则顺利，凶则不利；见杀破狼机马等星，有动向。但若问移民还回来否？则看田宅宫逢破反主永久移民，田宅宫不见破而见禄，则去了还会回来。\n\n## ◇\
    \ 18、刑事案件预测\n\n第十二章中的灾祸预测是个人灾祸的预测，其分析判断方法也适用于活测。\n\n**刑事案件预测：**\n以发生案件的时间起盘，也可以报案时间或问事时间起盘：\n\
    - 以命宫为基本案情；\n- 以田宅宫为发案现场周围情况；\n- 以官禄宫或天魁星为公安干警；\n- 以奴仆宫或天刑星为案犯；\n- 失窃案以巨门为罪犯，以巨门落宫为罪犯逃藏之处。(注：在个人灾祸预测中，以天魁为拘魂鬼卒看，在刑事案件中则以天魁为公安人员)。\n\
    \n**又：**\n以日时干落宫为罪犯，宫支所属方位为其来方，化忌宫地支方为其最后所去之方。\n\n**能否破案？**\n- 天魁星落宫生旺，吉星聚，克天刑星落宫，说明公安人员得力，能破案；若天魁落宫衰死绝，凶星聚，生天刑落宫或天刑落宫克制，则难破案，即使破案也有伤亡；\n\
    - 天刑落宫生旺，吉星聚，克天魁落官，则难破案；\n- 天刑落宫衰死绝，被天魁落宫克，或与天魁同宫，凶星聚，则易破案；\n- 天刑逢天喜、解神、天空、截空、旬空，或冲见巨门，不会天魁，说明罪犯已逃藏，暂时难破案，待出空、天魁旺相、天刑衰绝之时有可能破案。又，官禄宫吉而奴仆宫凶易破，官禄宫凶而奴仆宫吉者难破。\n\
    \n**也可以日时干落宫的星情看：**\n- 逢吉则暂时难破；\n- 逢凶则易破；\n- 逢化吉亦难破；\n- 逢化忌守照则易破案。\n\n**(1)、凶杀**\n\
    命迁线逢暴怒星 + 是非星 + 伤害星 + 丧门星会聚，为打斗凶杀案 (见杀、羊、刑、钺、武等有打斗的兆示)；加禄存或财帛宫见羊、刑、贪、空、劫、大耗等星为因财打斗杀人或抢劫杀人案；加桃花星为因色情打斗杀人案。\n\
    \n命迁线逢是非星 + 伤害星 + 丧亡星 + 桃花星会聚，为色情纠纷或强奸杀人案。\n\n**(2)、失窃案**\n命宫及财帛宫逢巨、贪、劫、刑、破、钺、阴煞等星聚会，为失窃案。\n\
    \n**损失什么物品？**\n参看第十二章第十二节。**能否找回？** 参看失物一节。\n\n## ◇ 19、预测考试\n\n以求测时间起盘，再以求测人与考试人之间的关系取用神：\n\
    - 例如自测以命宫为用神；父母问测子女则以子女宫为用神；兄弟来问测则以兄弟宫为用神。\n\n**以用神宫的星情看其人的运势及知识高低：**\n- 用神宫逢昌曲魁府机科会聚者，大利考试；\n\
    - 逢四煞空劫、截空、旬空、破碎、哭虚等星会聚，不利考试。\n\n**还可以用神宫干或流年干飞四化：**\n- 化三吉入用神宫的父疾线者，可以考中：其中化禄为高分录取，轻松得来；权入有些紧张，成绩次等，但录取没问题；科入则是得评卷老师赞赏或贵人帮助，也能录取；化忌入父疾线则必不能录取。\n\
    \n**测考试情况：**\n因父母宫为文书宫，故应以用神的父母宫来看考试的实际情况：\n- 从落宫的星情及四化来断成绩的等级。例如，父母宫逢昌曲左右禄权科等科考吉星，无煞冲破，成绩可得优良；若无上述吉星而逢空劫、截空、旬空、破碎、哭虚、化忌等星聚会，则考试成绩不好。\n\
    - **父母逢四化的影响：**\n    - 逢化禄：题目显浅明白，考得很轻松，成绩最好；\n    - 逢化权：题目稍深，考得紧张，成绩稍次；\n   \
    \ - 逢化科：亦能顺利；\n    - 逢化忌：题目深而不理解，考得很吃力，成绩很差。\n\n**具体分数：**\n可从父母宫的天干地支纳音数及干支数来计算。例如，父母宫为甲戌，纳音为火\
    \ 6 数，甲 1 数，戌 11 数：若成绩优者可能是 96 或 91 分；良好的可能是 86 或 81 分；一般为 61 至 76；劣等的可能是 61 或\
    \ 56 或 51 分等。\n\n**四化法以官禄宫的四化是否入父疾线（父母宫为主）来看：**\n- 化三吉入父疾线主智商高；\n- 化忌入父疾线则智商低。\n\
    - **具体解读：**\n    - 化禄入父母：光明，聪明机伶、反应快，读书考试好；禄 + 科更好、成绩高；禄 + 权不但成绩很好，且适宜从政当官。\n\
    \    - 化权入父母：能干、认真攻读，读书考试也好，用功则名列前茅；权 + 科，要用功才能有好成绩。\n    - 化科入父母：读书平常，成绩中等。\n\
    \    - 化忌入父母或冲父母：不是读书命，成绩不好；若三吉入父母而化忌也入父母或冲父母，亦是不利。\n    - 父母宫自化忌：不肯用功读书。\n  \
    \  - 官禄化禄入迁移：外在聪明，却不肯用功。\n    - 化禄而自化忌：虽聪明，但不肯读书。"
  mdcn: "## ◇ 10、速断兄弟朋友例\n\n同样，用紫微斗数预测六亲的生肖，以六亲宫的天干去四化，六亲生肖在化忌所在宫位的三方四正宫，但若用其人本命盘预测时，准确率不高；如若应用于活盘（即求测人有要求测六亲生肖的意向时起出的盘或用随机法定求测人的命宫法），则准确率会很高，而且往往就在化忌所在的宫内。\n\
    \n“天机为兄弟主”，断兄弟个数的窍门就在这六个字当中。具体方法：\n- (1)、按求测时间起盘或用随机起盘的流时盘，定出求测人的命宫；\n- (2)、从命宫逆数到天机星所在宫位止；\n\
    - (3)、数过宫位的总数就是兄弟姐妹的人数（数过的宫位中必须有甲级主星才算，无主星不算数）。\n\n**例如（兰老师之例）：** 1999年二月初五日亥时，某先生求测，起出紫微盘，其命宫在酉，武曲七杀坐守，天机星在子，命盘寅宫无主星。从西逆数到子共十个宫位，考虑到寅官无主星，故兄弟姐妹共有九个。蔡先生回答非常正确，接着又问“现在兄弟几人？”我看了一下手表，时间是\
    \ 21:53，按流分定命宫，蔡先生在我命盘的未宫，天机星在巳，从未逆数到巳为三个宫位；“现在兄弟几人”共六个字，即以己干四化，己使文曲化忌入酉，从西逆数到未也是三个宫位，因此断：“三兄弟”。果验。\n\
    \n蔡先生又问：“能不能算出排行？”共七个字，以庚干四化，庚使天同化忌入丑宫，未到丑共七宫，故知其排行第七，回答对；再想，天机在巳宫，若从巳到丑才五个官位，心想会不会有四个哥哥，排行第五，加上两个姐姐，总排行第七。果然如此。\n\
    \n**速断兄弟朋友例：**\n用预测师本人的命盘来为求测人预测其兄弟朋友的情况。求测人坐落命盘的午宫，午宫为原命盘的兄弟宫，命盘如下图：\n\n| | 机昌火\
    \ | | |\n|---|---|---|---|\n| | 速测兄弟例 | 阴陀 |\n| 同梁铃 | | 巨羊 | |\n\n求测人的命宫就是我（预测者）的兄弟宫，兄弟宫表兄弟的事情。现兄弟宫中有三颗主星，故断求测人共有兄弟三人（以甲级主星为准）；对宫为我的交友宫，巨门擎羊为恶曜，为二个不良的朋友，巨门为暗星，主小人暗中捣鬼，擎羊同宫更不利。\n\
    \n有人以夫妻宫的纳音数看兄弟数目，因夫妻为父母的子女；姐妹数目，以官禄宫的纳音数看；逢化科加 3，逢禄权加数，逢化忌减数。可在实践中试试。\n\n也可以求人坐落的宫为新命宫，重布十二宫，再以新命盘的兄弟宫来分析论断。\n\
    \n**看六亲属相：**\n以六亲的宫干去化忌，看化忌入何宫，该宫的地支属相即为该六亲的属相。有时，属相会在化忌宫的三方四正宫位上。总之，六亲的属相必在化忌宫的三方四正宫内或六合宫内。\n\
    \n**求测兄弟、子女事件：**\n看日时干化忌的冲宫属第几个兄弟姐妹或第几个子女。\n\n**儿子的推算法：**\n以子女宫为长子，逆去到财帛宫为次子，疾厄宫为三子……。\n\
    \n**女儿的推算法：**\n以田宅宫为长女，顺行下一宫为二女，再顺下一宫三女……。\n\n**看子孙：**\n以子女宫往下推，财帛宫为嫡孙，疾厄宫为曾孙。\n\
    \n**兄弟的排行：**\n以兄弟宫为老大，逆数排行下去，如自己为老大，则兄弟宫为大弟，子女宫为二弟，夫妻宫为三弟等。姐妹则从父母宫起老大，顺数排行下去。\n\
    \n还可以流日干飞四化，看六亲目前的情况，逢三吉入主吉，逢忌冲则凶。\n\n## ◇ 11、预测灾病\n\n**看疾病灾厄：**\n以疾厄宫为主，兼看命宫；外出则看迁移宫。占病最忌疾兄田宫动（即逢煞或化忌星冲则动）。\n\
    \n疾厄宫主星失陷加煞忌星聚会，必有病灾。逢化忌冲更凶。病情轻重看煞忌星多少及制化情况而定：\n- 煞聚兼有哭丧星，则病重难愈；命宫又不吉者则不治；\n-\
    \ 煞少或能制伏且无哭丧星，则病易愈。\n\n**什么时候病？**\n年、月、日、时干化忌冲疾厄的时候病。流年（月）化忌冲疾厄，当流月（日）的疾厄入原疾厄宫时病重；流年（月）的疾厄化忌冲夫妻，流月（日）的夫妻宫入原夫妻宫时病重。\n\
    \n**什么病？**\n以疾厄宫的宫卦和宫中星曜的五行属性而定。\n\n**病的部位：**\n可以星曜的性质和后天八卦来定。例如：紫微星为头部，巨门为咽喉，天府为腹部等。以后天八卦洛书数而论，“载九履一，二四为肩，左三右七，六八为足”，离在头部，坎宫在下阴部，坤、巽宫在肩部，震宫在左腹胁部，兑宫在右腹胁部，乾、艮宫在足部。\n\
    \n**测灾厄：**\n以迁移宫为主来看，兼看命、疾宫。\n- 宫中有羊、陀、哭、虚、空、劫、阴煞、丧门、白虎易生祸殃；\n- 若再与天机、巨门、天马等交通星交会，则易有车祸；\n\
    - 若再与武、杀、刑、羊等武斗星会聚，则在外易受打杀伤害；\n- 若与红鸾、咸池、廉贞、贪狼、天姚等桃花星交会，为色情之灾；\n- 与红鸾、廉贞交会，易有血光之灾。\n\
    \n**七杀擎羊白虎组合：**\n对宫武曲化忌来冲，争斗、官司、血光、凶杀；杀羊官符入迁移，犯刑、降调；武曲会火铃，因财被劫，财务纠纷；武曲逢羊忌，因财持刀，加白虎定有刑伤；昌曲陀武，投河自杀；廉贞在巳宫加会四煞化忌白虎，主残疾、手术、刑灾；卯酉迁移宫逢廉破曲，枷锁囚徒；廉杀丑未同宫，加六煞星，路上埋尸；廉破羊居迁移，死于外道。\n\
    \n**流年凶险：**\n- 流化禄入田宅而田宅自化忌，疾厄化忌入官禄，福德化忌入官禄，疾厄宫化忌入迁移，疾厄化忌入父母，均易有凶险死亡；\n- 流化忌冲本田，流月田宅宫走到本田，该月凶险；\n\
    - 流月化忌冲本命，流月入本命宫时亦为凶险。\n\n**如何避难？**\n可搬往天喜、化科（包括原盘化科、福德宫化科）或空亡的方位去住一段时间；测出有血光之灾者，可捐献点血来化解。\n\
    \n**医生以化科星为用神：**\n- 化科入命身或疾厄，主可得良医；\n- 化科落宫克疾厄宫者也主可治；\n- 反之化科不入命身、疾厄或被疾厄宫克者，均主难医。可到化科的方位去找医生。\n\
    \n**什么时候好？**\n在有救的情况下，逢化科、天喜的月、日、时好。\n\n**找医生看病：**\n以流日干（即看病当天的天干）化科所入的方位为贵人方，可到该方位去看病；以该方位所属八卦，看找什么样的医生。例如：化科入午宫，离卦，可到南方找属马的中年女医生看。\n\
    \n## ◇ 12、预测事情、信息真假\n\n**以父母宫的星情配合四化来论：**\n- 父母宫不逢凶星、空星则真；有科权禄守照更为有利。\n\n**事后能否有利，能否领到钱？**\n\
    - 父母宫或疾厄宫干化三吉入财帛宫表示有利、能领到钱；\n- 化忌入财帛宫则表示不利、领不到钱。\n\n## ◇ 13、看刑讼\n\n有无刑灾以命父宫为主，兼看官禄宫。可参看第十二章有关章节。\n\
    \n**容易有刑灾的组合：**\n①太阳化忌或落陷宫化权再逢刑煞星；\n②廉贞加白虎；\n③刑囚夹印（廉相会擎羊）；\n④廉贞化忌；\n⑥巨门会火铃白虎及巨门落陷化忌；\n\
    ⑥七杀会羊陀官符。\n\n**测词讼：**\n以父母宫为用神，何宫天干化忌入父母即为起因。奴仆宫为对方。**结果如何？** 以年干四化：\n- 化三吉入父疾线则对自己有利；\n\
    - 化忌入父疾线对自己不利；\n- 化三吉入奴仆宫则对对方有利；\n- 化忌入奴仆宫及其对宫则对对方不利。\n\n## ◇ 14、预测怀孕\n\n**若问生男生女，有多种方法：**\n\
    ①太阳落阳宫主生男，落阴宫主生女；太阴落阴宫主生女，落阳宫主生男（子寅辰午申成为阳宫，丑卯巳未酉亥为阴宫）；\n②红鸾星坐子女宫多生女，天喜星坐子女宫多生男；\n\
    ③子女官逢紫阳明廉等星多生男，逢府阴贪杀破巨梁多生女。\n\n**看子女好坏：**\n以子女的星情看：\n- 子田线吉多无煞，儿女品貌好，孝顺，将来有成就；\n\
    - 子田线煞忌星聚，多为不吉，儿女品貌劣，不孝，将来难有成就。还可以子女宫的气数位（父母官）飞四化来看，化三吉入子女的父疾线和兄友线则好，化忌入此二线则不好。\n\
    \n**看生产情况：**\n- 以子女宫吉则吉，子女官凶则不利；\n- 子女宫逢羊刑，难产，开刀而产；\n- 逢杀破刑羊，难养；\n- 子女宫逢化忌，易有流产事。\n\
    \n**看产母情况：**\n孕妇本来测以命宫为用神，丈夫来测以夫妻官为用神：\n- 用神宫逢煞忌星聚，产母不利；\n- 逢刑羊杀破钺廉红等聚，易有开刀或流血过多的危险；\n\
    - 子女宫又逢凶煞星者，更为开刀破腹产的兆示；若又逢空、劫、截空、旬空、哭、虚等丧亡星聚，则有死胎的危险。\n\n**若问何时生产？**\n紫微斗数在这方面预测经验很少，可以从下面几方面试验：\n\
    ①以红鸾星落宫的地支定出生日；\n②以红鸾星落官顺数到儿女宫定月数或日数；\n③让求测者报一个或一组数字，求出对应天干（大于十则除以十，以余数求天干），用天干飞四化，以化忌落宫顺数到子女宫得几数即可定几月或几日数，或以化忌落宫的地支定为生产的日支；\n\
    ④以子女官干飞四化，以化忌落宫定生产月或日数，或以化忌落宫的地支定为生产的日支。\n\n## ◇ 15、预测搏彩\n\n**彩票号码如何算？**\n以求测的时间起盘，再以父母宫为用神：\n\
    - 父母官的天干数、地支数、干支纳音数可以反映出开奖的号码，以上述三数组合成号码；\n- 此外，还要参考父母宫的三方干支纳音数来参合。\n\n**例如：**\
    \ 某人测某日福利彩票号码，父母宫乙未，父母的财帛官为辛卯，对宫为辛丑，父母的官禄宫为己亥：\n- 天干乙为 2 数，地支末为 8 数，合起来为 28；\n\
    - 乙末纳音数为 4，可为 40；\n- 纳音加干支数为 42；\n- 对宫丑为 2 数，加父母宫天干乙 2 数，合起来为 22；\n- 财官辛卯纳音数 3，与父母宫天干乙\
    \ 2 数合起来为 23；\n- 官禄宫天干己 6 数，地支亥 12 数，干支相加得 18。\n\n开奖结果为：22、23、28、40、42，特别号码是 18。\n\
    \n**总之：**\n开奖号码数多在父母宫及其三方四正各官天干、地支、纳音数字的不同组合上。至于中与不中，那是玄机之事，说白了就是你本人有没有这个福气，有没有偏财（横财）运的问题。\n\
    \n## ◇ 16、国运或地区运势预测\n\n**测国运：**\n以大年初一日晚上子时起盘进行预测，也可以问事时间起盘预测。\n\n**测地区或单位情况：**\n\
    则以间测时间或随机起盘。\n\n**(1)、命盘十二宫的基本表意如下：**\n- **命官**：国家荣衰，人民富裕，社会安泰，国力等情况；地区荣衰情况。\n\
    - **兄弟宫**：正义，公理；一般的睦邻和伙伴关系，交通运输，邮电通信，新闻传播，公共公益事业。\n- **夫妻宫**：亲仁，和睦；国际交往，国外事业，比较友好的睦邻和伙伴关系，外交事务，契约，计划，战争，后勤，物质生活水平。\n\
    - **子女宫**：创造能力，发展能力，文化教育，体育，儿童，出生率。\n- **财帛宫**：经济景况，工商业，银行，存款利率，黄金，白银，股市，证券。\n\
    - **疾厄宫**：税收，自然灾害，流行病，保险业，驻外代表，公共安全，公共卫生，外汇管理及汇率。\n- **迁移宫**：旅游业，船务，运输，法律，宗教，哲学，对外发展、扩张能力。\n\
    - **奴仆宫**：工人，劳保，企业，军队，警察，秩序，劳工法，左派分子。\n- **官禄宫**：统治，推进；国家或地方领导人，执政党，政府形象，政治活动。\n\
    - **田宅宫**：大地，田园，河山，矿产，农牧业，建筑业，生态环境，反对党，非主流派，民主人士。\n- **福德宫**：民意，群情，福利事业，精神意识形态，社团活动，国会，议会，地方政府，行政工作，选举工作。\n\
    - **父母宫**：慈善事业，刑法，制度，特赦，慈善机构，公立医院，秘密结社，庙观，赈灾，抚恤，科学技术，文学艺术。\n\n**(2)、具体分析：**\n\
    以命宫看近期全国或地区的总体情况：\n- 若逢吉星吉格，无煞冲破，三方四正吉众拱扶，则太平盛世，人民安泰，国富民强；\n- 若逢凶星凶格，三方四正凶煞聚凑，则国无宁日，地区不安。\n\
