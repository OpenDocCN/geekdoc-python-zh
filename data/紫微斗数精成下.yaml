    ### 3、造宅择吉

    紫微斗数的星曜可与玄空紫白九星相配，对应关系如下：贪狼配一白，主宫在。子，管二十年；巨门配二黑，主宫在丑亥，每宫管十年；禄存配三碧，主宫在寅，管二十年；文曲配四禄，主宫在卯，管二十年；廉贞配五黄，主宫在申，管二十年；武曲配六白，主宫在未，管二十年；破军配七赤，主宫在午，管二十年；左辅配八白，主宫在辰巳，每宫管十年；右弼配九紫，主宫在酉戌，每宫管十年。吉凶可互相参考。


