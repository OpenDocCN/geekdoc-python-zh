  md: '1999年，己卯，原禄入的官位成为流年的子女宫，为流财的父疾线，有赚钱机遇，禄照田宅，家庭生活富裕。原忌冲流年的财帛宫，这一年必破财，什么时间？“同类相冲是个禁忌”卯年斗君在亥，从亥起正月，五月为流月的财帛，故应于五月。又己年干化禄、忌入冲原命财帛官，先发财后破财，“冲六则一亡”，从财帛宫顺数到第六宫为父母宫，父母官应属九月，故九月也主破财。什么原因破财？己干为原命的子女宫和疾厄宫，不是因疾病就是子女。事实是，二月兼职发点财，五月和九月二次留医（注，发财和破财均为开始引发时间，不是实际收支的时间）。


    2000年，庚辰，原禄入的官位成为流年的财帛宫，财运看好。原忌冲流年的疾厄，失业倒店的格局，上面已分析其人中途不会失业，所以仅主事业不顺，及因疾病而破财。综合看，其人收入大于支出，积存较多。对此人来说，财帛主正财，故这一年反无偏财收入。


    2001年，辛巳，原禄入的官位成为流年的疾厄宫，主有光明，疾厄为单位，意为靠单位收入，此年收入可观。原忌冲流命，忌不反冲，凶力不大。


    2002年，壬午，流年与本命重叠，力量加倍。原化禄入流迁照命，财运继续看好。原忌冲流兄，兄弟为财之田，财库破，要破财，因兄为田之财，故破财因家庭开支增大。这一年薪水大增，带子女外出旅游和为子女读书花费了几千元。


    2003年，癸未，原禄入的官位成为流年的兄友线，仍主有成就，但禄不入“我”宫，比不上前几年。原忌冲流官，表能积极工作，事业有波动。


    2004年，甲申，原禄入的官位成为流年的官禄，事业有成就而赚钱。原忌冲流田，主财库破，因家庭事而耗财。流年干化忌入子女，注意因子女事破财。


    2005年，乙酉，原禄入的宫位成为流年的田宅宫，钱财入库，存款增加。原忌冲流年的福德，财源短缺。流年干与生年干同，禄忌同入流年财福线，有财又破财这一年为子女读书花费很大；忌冲天机工作星，工作变动，工作量增大或退休。


    2006年，丙戌，原禄入流年的福德宫，享福之财，即退休金。忌冲流疾，可能因疾病破财，或主上一年未退休，这一年必离开工作场所，即退休。


    2007年，丁亥，原禄入流年的父母官，仍有光明，可能会增加退休金。原忌入流迁冲流命，可能会外出旅游，但天机星化忌入迁，要注意车祸。'
