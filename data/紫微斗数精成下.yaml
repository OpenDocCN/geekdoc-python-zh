  mdcn: '## 小时侯家里很穷，野菜充饥，无钱读书，只好在校门外听读，后老师可怜，命我入校就坐（童年宜参看父母宫，父母宫不吉，父母病多，幼年丧父，家里生活怎么会不穷）。


    1954年发洪水，淹没村庄，逃难山区，兄姐七人拉扯而行，苦不堪言。（幼年贫困，又值灾荒，小限值天马，天马主动，故有逃难之象）。


    ### 2、一运乙亥，5至15岁，54年七月至64年七月

    行比肩正印运，劫财夺财，家境贫苦不堪。（斗数第一大限丁卯，6至15岁，从54年十一月初二日酉时起至64年十一月初二日申时止，与四柱的大运稍有出入。少年运仍宜参看父母宫。父母宫不吉，小时生活贫困。大限太阳庙旺化科值限，大吉，说明生活应逐渐好转，本人读书聪明，成绩好；太阳光辉照耀，邪魔灭迹，多吉庆，但太阳日日运转不停，故亦主奔波劳碌，且少年行好运并无多大益处）。


    59年，水淹投河之灾，自己爬起来。（小限值罗网七杀之宫，易有灾，小限的疾厄宫值太阴星，太阴主水，故为水灾；但大限吉，故有惊无险，自己能爬起来，就算不了什么大灾大难）。


    1960年，爷爷去世。（小限在巳，天哭哭家人；又流年天干庚为致病凶年，庚使天同化忌冲动未宫的凶煞，引爆重病宫，未宫是小限的爷爷宫位，故爷爷有凶）。


    1963年，母亡。（小限入申宫，凶多吉少；小限的父母宫凤阁遇蜚廉、截空、白虎、大耗、灾煞，凤阁为女星、母星；小限的兄弟宫凶煞会聚；流年天干癸使贪狼化忌冲田宅宫，田宅为家人；以上几方面的原因，造成母亡）。


    ### 3、二运甲戌，15至25岁，64年七月至74年七月

    甲木帮身，戌中有用神之根，用神调侯得力，读书成绩名列前茅。（斗数第二大限自65年至74年，入丙寅宫，武曲化禄，天相、左辅、红鸾、天福、长生等吉星同守，这是有利的一面，但有天空、孤辰、劫煞、晦气等凶星，吉凶混杂，故本大限内，命运将会有吉有凶，遇凶的年限则会一边倒，突然破败，骤然灾疾）。


    1965年，参加中考，以优异成绩被录取。（小限戌宫，廉府二星均为聪明考学之星，流年巳宫自化神禄，故能高中录取）。


    1966年，文革开始，去北京见了毛主席。（小限天马星主走动）。


