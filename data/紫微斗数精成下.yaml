- md: "## 五、岁限应注意的几种凶格：\n\n### 1、七杀重逢\n命宫有七杀守照，而大小限流年又逢七杀之宫，即是。忌见羊陀重叠，大凶。逢羊陀空劫伤使者定有刑伤。七杀入庙及逢紫微、天相、禄存、化禄三方守照者可解。\n\
    \n### 2、羊陀迭并\n原命盘命宫或对宫有羊陀，而流年又逢流羊流陀飞入该宫，谓羊陀迭并。若大小限重叠于该宫或对宫，无吉化解，主大凶。例如，庚生人坐命在西，西见羊；庚流年，流羊在西，流陀在未，为羊陀迭并。\n\
    \n### 3、竹罗三限\n凡命宫逢杀破狼之一坐守，谓之“竹罗”。若大限与小限或流年又同时值杀破狼（即原命宫、大限宫、小限宫或流年宫必须都为杀破狼坐守），称为竹罗三限。如果三星失陷又无众吉守照来救，必主大凶，但亦必须流年凶煞会聚才应凶。尤其是三限俱坐七杀，复会巨门、丧门、吊客、白虎，主其年九死一生。大限杀破狼，小限羊陀迭并，防意外伤亡。遇“竹罗”于庙旺之宫，且得紫微、天府、文昌、文曲、武曲、天相同梁、左辅、右弼、天魁、天钺、禄存、天马等吉星守照合，反有开创的局面，可一举冲破难关而取得成就。杀破狼不入原局命身，二限遇之亦为“竹罗”，逢凶亦凶，但凶性减弱，原命吉者亦不主凶而主更新开创局面，逢吉更吉。消极之星（如天同、天梁）逢杀破狼限年，会有变动之举，吉则变好，凶则招灾。二限逢杀破狼，一般入生年死墓绝沐浴等宫为凶；本宫化忌有煞、旬空、丧门、吊客、白虎等则凶，再逢伤使夹或羊陀夹，劫数难逃，对宫化忌亦是。\n\
    \n## 第七节 诸星值限年运气推断\n\n以大小限、流年落宫的星曜来推断，例如大小限、流年宫值紫微星，称为紫微星之限年。一般正星庙旺加吉化吉则吉，加煞平常；失陷加吉亦平常，失陷加煞则凶。逢化忌多有特殊之处，官吉则变动，官凶则变凶。三方宜注重对宫，三方煞聚，主大凶。以下所论吉者亦宜庙旺有吉拱照才论吉，所论凶者须陷弱或加会煞星才论凶。其余人事十二宫什星可仿照参断。\n\
    \n### 1、紫微星之限\n会发生有关事业、职务、财利、夫运、考试、名誉等类事情。仍有高、高级、首、头、才干等意义。\n\n- **庙旺**：可得贵人相助，能发挥才干，百事顺遂，地位高升，经商发财，是赚钱的好时机，可加大投资；有左右众吉守照更吉；若无左右等百官朝拱时只能算小吉；加文昌考试高中；无吉加煞，辛劳且平常。\n\
    - **弱闲**：有左右众吉星相会可有小成；无左右众吉星相会，主破财不聚；加恶煞，将会发生意外损失。\n- **逢紫破**：有搬家之象，不吉。三方逢杀破狼加会，主职位不稳定，时起时落。大小限凶，对宫逢紫府可渡难关。破军守命者，不喜逢紫相限年，主有疾病。\n\
    \n青少年行紫微运，高傲，不听话，好高骛远，不切实际而误事，或错失良机。中年最宜逢紫微，精力旺盛，大利创业。老年行运逢紫微，亦不一定吉，因承受不起贵气而致灾。\n\
    \n流年太岁小限遇紫微，有见贵人高人之象。初春秋冬衰而不 利，三至六月旺而最利。此运及此方位时辰，利考试、求名、访贵人。\n\n**紫微入二限吉凶诀：**\n\
    紫微垣内吉星临，二限相逢福禄兴，常人得之多吉庆，官贵逢之职位升。\n紫微入限本为祥，只恐三方杀破狼，常人逢之多不利，官员降谪有惊伤。\n\n### 2、天机星之限\n\
    会发生有关交际、应酬、事业变动、外出、搬家、长远性的决策计划、学问、考试、名誉、宗教、五术、问题解决与否等事情。\n\n- **天机入限**：好奇喜动，往往会作出人生中关键的决策或决定，影响较深远。年轻运主活泼而社交广泛，积极策划行动；老年运主老谋深算，经验丰富。事业、家庭环境多变动（例如搬家或变动床铺），家庭纷争，长期积压之事亦会有变更。会天马有远行之兆。加同梁主享受。加会日月于旺地，升官发财。巨门同，是非纠纷多，再加羊陀主灾厄。天机小限，春夏充满活力，多变动而有进展；秋冬不利活动，宜蓄机待发。\n\
    - **庙旺众吉拱照**：多得贤人指路，思维敏捷，机遇较多，事业大有发展，宜果敢行动，兴家创业，子午宫最佳。失陷或加煞，会有阻丧的境遇，甚至有悲观厌世的念头。\n\
    - **逢化三吉**：主变好，得贵人助而发展，经营顺遂。\n- **逢化忌**：凡事变坏，工作不安定，事业艰难，计划失误（多因贪图捷径所致），惊慌失措（宜镇静，早谋对策），官员防降职，交友宜小心，防机器损伤；加羊火小心骑机动车出事。化忌星入田宅宫，有搬家之象。\n\
    - **天机入大小限的对宫**：主事业不安宁。流日逢天机天马化忌，小心车祸。\n- **炼功及学习五术中**：宜选在天机当值的大限、流年、流月、流日、流时及天机的方位，切莫错过天时良机。遇到困难时可在天机方去寻找贵人相助。\n\
    \n**天机入二限吉凶诀：**\n男女二限值天机，科权禄逢大有为，出入营谋多遇贵，发财发福少人知。\n天机照限不安宁，家事纷纷外事多，更遇羊陀并巨门，须知此岁入南柯。\n\
    \n### 3、太阳星之限年\n会发生有关工作、财利、考试、名誉等事情。太阳为父星、夫星、子星、事业星，限年逢，亦会有父、夫、子、事业等方面的事情。\n\n\
    - **太阳入二限**：有强烈的创业心，会接近与政治有关的人和事，好心反易招怨。\n    - **青少年运**：活泼好动，喜出风头，又不肯动脑，重感情。\n\
    \    - **中年运**：干劲足，喜社交，不感情用事。\n    - **晚年运**：变得冷静，成败起伏，多家庭变故。\n- **化三吉大利**。\n\
    - **逢化忌**：易受瞒骗、误会、冤枉（不与人合伙，凡事预先通告），防头心眼疾，名誉受损；加煞，刑克父母，财破得很利害，是明见的破；会天刑、羊陀、白虎，主降级、刑讼、丧服、疾病、克父、克夫、克子。原局逢化忌，大小限逢白虎、丧门、吊客之年有丧父之忧。\n\
    - **流年大限遇阳梁**：可与老友相遇，若天梁化禄，老友已婚，好谈世事政事；太阳化禄，热情而多寒喧。\n- **大小限入田宅宫**：吉聚必有聚兴之喜。女命逢太阳限年，会谈情说爱，有红喜星更是，吉则成，凶则告吹。\n\
    \n小限逢太阳，春夏大吉，秋冬不利。\n\n- **庙旺无煞**：事业顺遂，有名声，可积极主动进取，会有升职、进财、添子、结婚等喜庆事，是最适合恋爱结婚之年。加吉更佳。加四煞一事业财务考试等不顺，亦主父、夫、子有病灾，但为灾较轻。原命宫化科行至此，日生人，有吉无煞主名声大噪。\n\
    - **失陷**：主变动、耗财，先好后坏。加吉，平平过。加煞忌，会破大财，事业大败，恋爱婚姻失败，亦主父、夫、子、男命本人有病灾，甚则丧父、丧夫、丧子。原命宫化科行至此，有煞忌主名声有损。\n\
    \n在运用中，太阳当运，可把握机遇，大展宏图。\n\n**太阳入二限吉凶诀：**\n二限喜逢旺日临，添财进业福非凡，婚姻和合添子嗣，仕者高迁坐庙堂。\n太阳守限有多般，陷地须防恶煞侵，加忌逢凶多阻滞，横事破财家伶仃。\n\
    \n### 4、武曲星之限年\n会发生财利、争斗、伤害、健康、旅行等有关的事情。原命武曲坐守者行运至此者，可能会参军、练武，但有煞忌者不利。\n\n- **庙旺无煞**：适宜创业，声誉好，政界高升，经商发财；加昌曲，事业顺遂，声誉高；逢化权更吉；加煞，多财务纠纷，甚至打架，事业努力仍可有成。\n\
    - **失陷**：财运欠佳，事业低落；加吉可小有成就；加煞忌，破财亏损，其至负债倒闭、招牢狱、官非词讼、疾病刃伤之灾。\n- **逢化科权禄**：大利求财求谋。\n\
    - **逢化忌**：破财、资金周转困难（节制用钱，早防，不加大投资），不利求财、应酬、健康，防金属损伤和手术，打斗决裂（宜忍让、慎言）。\n\n青少年运逢武曲，冲劲足，但易生纠纷、打架，加羊陀天刑防受伤，逢化权更利害，逢化忌还防打斗而至官司牢狱之灾，四煞混杂更验。中老年运无煞可勤劳发财，有煞不利，多伤病。\n\
    \n小限逢武曲，秋季最利，夏季最不利，春冬也不好。\n\n- **二限逢武破**：主求财艰难，加煞忌定有是非争斗破财事。\n- **限运逢武贪**：庙旺时主升迁、发财、掌权，失陷时主有灾病。少年不宜行武贪大限，一脑子想当老板，会荒废学业。火铃同度或对照，横发，名利双收，有出国机运（为商业性的）。\n\
    - **武贪文曲三星同守于午丑二宫**：行限到此，无禄马吉星来解，主有水灾凶险。\n- **行限逢武昌铃陀四星守照（四星会齐）之宫**：主投河溺水而亡，或运途而终。若旺地而有吉星禄马来救，亦惊险非常。逢武曲化忌之限年，必凶。再如武昌铃三星同守于戌宫之限，逢壬流年，流陀在戌与三星同宫更凶，必死。\n\
    - **武杀加煞大耗之限年**：易有打架、官讼是非。\n\n此运及此方位，宜求财、参军、投资、经商。\n\n**武曲入二限吉凶诀：**\n限逢武庙主财兴，左右昌临福禄荣，化权化禄利求谋，会合吉星显声名。\n\
    武曲之星忌失陷，官员值此防降职，公吏逢之防刑杖，常人逢之还负债。\n\n### 5、天同星之年\n会发生交际、夫妇、色情、健康、旅行、饮食、喜庆、宴会等事。\n\
    \n- **少年运**：逢天同，得父母宠爱照顾，父母宫吉则生活富裕。\n- **老年运**：逢天同大吉，较能享清福，快乐延寿。\n- **青壮年运**：逢天同不算美，读书贪吃贪玩不努力，工作懒散无创劲。\n\
    \n- **庙旺无煞**：虽有点懒散，但福气天成，喜事临门，交友广而获益，事事遂意，常有人宴请；加吉更佳；即使加会凶煞，虽事业稍有阻，但反主有冲劲，若能努力终可成功。\n\
    - **失陷**：运气欠佳，夫妇不和，破财疾病，少享受乐趣；加吉稍好一些；加煞，破财失职和伤病灾祸较重。\n- **天同为医生**：限年逢之，主有疾病，即使旺吉也难免，旺吉主小病，陷凶主大病。\n\
    - **逢化忌**：自卑、伤心（宜想开点），伤感情（多因饮宴、享乐事），破财（不宜投机，不出入娱乐、酒宴场所），防牙、心、肾、生殖系统疾病。\n- **大小限或流年逢天同**：有化忌或逢煞冲破者，此限年有生病开刀的可能，疾厄宫再不好者，病重。例如疾厄宫同巨在丑宫为陷地，大小限同临；大限天干为己，使天同化权、巨门化忌；流年己卯，流羊在对宫冲照；巨门化忌主咽喉、呼吸道有病，天同化权主医生掌刀柄之权，故而当年有甲状腺切除手术之事，天同为吉星、良医，故手术成功。\n\
    - **限运逢于田宅宫**：遇化禄及会吉，主有庆典；再见昌曲，主重修房屋。若逢天同化忌，主家庭愁云密布，家宅及家人不宁，有吉星加临则主装修。\n\n小限逢天同，冬春季吉，夏秋季不佳。限运逢天同，可宴请嘉宾，求道拜师访友，求医问药。\n\
    \n**天同入二限吉凶诀：**\n二限天同喜盈门，财禄增添家道丰，陷地恶煞来冲破，官灾破败家不宁。\n\n### 6、廉贞星之年\n会发生工作、夫妇、色情、健康、财利、名誉等事。不宜求财，可求名，求财不成，求名荣归，主孤芳自赏，自命不凡，胆大佞为，常有孤独感。易有官司刑狱，不可贪图富贵而贪污枉法，陷凶而与贪狼同宫更宜注意。防意外及血光之灾，加红喜刑更验，不宜远行、冒险，远离利器。\n\
    \n小限逢，春秋较吉，夏季次吉，冬季不吉。\n\n- **庙旺无煞**：有突发性的好机遇，政界升官提职，经商发财，未婚者易碰上结婚对象；加吉或化吉更是喜气临门，可加大投资；加煞事业有阻；中晚年较佳；对宫见火贪，更多意外的机遇。\n\
    - **失陷**：易流于邪恶偏激，虚伪奸诈，财与名均不利；少年运易冲动犯刑，中年运遇主多灾疾，四十五岁后较稳定；加煞，易有官司病伤，宜谦虚谨慎，遵纪守法；若为原盘官禄宫，逢四煞（擎羊最凶）或天刑白虎，不是官司就是病伤。\n\
    - **廉贞天相**：小限行至，在午宫屋顶易漏水；在子宫下水道不通，水管问题；加羊刃易患官司或者冰箱会坏。加会擎羊，大限行到，遇丙流年易有官司刑灾或血光之灾，宜小心行事，遵纪守法，远离利器。\n\
    - **廉贞化忌**：防伤感情事（少与六亲来往，凡事预先声明），更宜防官非犯刑；若与天刑、官符、贯索、白虎同宫，必因色惹官司；若会武曲于原命宫，有木压雷惊之险，防车祸、木压、兽咬之灾；逢凶煞或孤寡或逢双化忌于田宅宫，主家中老人有血光之灾或心血管重病，失陷更凶；逢双化忌入奴仆宫会被异性朋友出卖或拖累；化忌入子女宫，防子女有血光之灾；入失陷或有凶煞星的疾厄宫，本人有血光之灾；入失陷或有凶煞星的夫妻宫，配偶有血光之灾。以上有血光之灾者，若加红喜刑更验。凡廉贞化忌之灾多应于五月份以前。\n\
    - **廉贞坐命**：流年小限迭至，又值流年白虎加临，定主官非牢狱之灾（若入狱，要逢命盘化科或流年化科之年才能出狱）。逢化禄或化忌，限年到此，易为情所困。\n\
    - **行限逢廉贞于陷地遇火星**：易自寻短见；如煞多主横死，轻则伤残。与天刑、化忌、擎羊同宫，防官司入狱，若再逢杀破狼更重，或主疾病严重。\n- **大限流年遇廉贞化禄**：未婚者有婚喜，结婚后有桃花事。廉贪同宫更是。廉贞化禄遇禄存很有异性缘，廉贪化禄亦是。\n\
    - **流年父母宫守廉贞**：加会杀破狼或煞刑忌，更见流年白虎丧门流羊，主父母有伤亡的危险；廉贞化忌会武曲化忌之年，亦是。\n- **流年的田宅宫逢廉贞化忌**：家里的电器常出毛病；有煞时，也主家人生病或死亡。\n\
    - **流年的疾厄宫逢廉贞化忌**：防感冒或过敏症，若煞重则宜注意意外伤灾手术。\n\n◇“刑杀会廉贞于官禄，枷锁同流”：如羊杀廉守于事业官，流年二限到此，不逢祸患，定遭刑伤。（陷地才是）。\n\
    \n此运此方位宜求名求职，不宜求财。\n\n**廉贞入二限吉凶诀：**\n廉贞入限旺宫临，喜逢吉曜福禄深，财物自然能蓄积，任人得意位高升。\n大小二限遇廉贞，更有天刑忌羊侵，脓血刑灾逃不得，破贪杀会赴幽冥。\n\
    \n### 7、天府星之年\n会发生有关工作、财利、产业、不动产等事。可创业办公司，置不动产。无煞冲破，什么事都能一帆风顺，平稳发展，但不会横发，金钱、地位、婚姻、声誉、考试等都显吉兆，发财置业，事事如意，家中喜庆事多，添丁进喜；易得中奖之类不劳而获之财；加吉更佳，有升迁发财机遇，可加大投资；喜见禄存化禄，主发财；可能有合伙事，可购置房地产。加煞则运气平平，仅主困难挫折，计划难实现，但不会有官司词讼等重大灾难发生，逢空劫会变得寂寞，无所事事的空虚感。\n\
    \n- **少年运**：逢天府，大利读书，加吉星名列前茅。\n- **青年运**：逢天府较骄傲。\n- **中晚年**：稳步发展，五十岁后虽好，但外华内虚，宜保守。\n\
    - **小限**：冬春季吉，夏季虽好但外华内虚，秋季事业不利。\n\n在运用天府星时，可在此运此方积蓄财富，开办公司，置产业。\n\n**天府入二限吉凶诀：**\n\
    限临天府能司禄，常人逢之多发福，添财进喜永无灾，又主闺身并闺屋。\n南斗尊星入限来，所为谋事称心怀，若还又会科权禄，指日欣然展大才。\n\n### 8、太阴星之限年\n\
    会发生与母、妻、女、财利、产业、不动产等有关的事情。未婚者易有纯真的爱情。\n\n- **庙旺无煞**：事事如意，财源广进，添丁进喜，谈情说爱顺利，有得到奖赏的机会，宜购置不动产；加煞则辛劳，事业有阻，但经努力仍可有成。\n\
    - **失陷**：出力不讨好，辛劳而难成，破财不聚，又主不利母、妻、女或恋爱婚姻，感情多波折，易失恋单相思，精神上很痛苦；加煞化忌更凶，钱财亏损，甚则破产，且易发生健康、家庭、恋爱婚姻的纷忧。\n\
    - **逢化忌**：有败家之象，多暗耗破财（不宜投资），易受诱骗（莫贪心），陷地易因色损名破财（莫贪色贪财，凡事保守）。与火铃同宫，有官灾疾病，三方再见羊陀七杀，有灾祸，逢乙年应灾。\n\
    - **青少年运**：逢太阴，较喜安静，有人缘，学习好。\n- **中年运**：逢太阴较喜动，创业心强，多奔波，较喜接近异性。\n- **老年运**：较注重享受，有财富。\n\
    \n小限逢，春季多动，夏季多灾疾，秋季多收益，冬季多享受。流年太阴白虎逢主母灾，或主妻凶。与天刑、天巫同宫，小限流年逢，亦主母灾。\n\n**流年逢太阴化忌**：往往会有拖延和计划受阻，例如流年迁移宫化忌，出行或回程时间拖延；流年命宫化忌，易失眠，事业有阻。\n\
    \n在运用太阴时，此运此方位可求财，易得私财；遇事宜私办，不利公办。\n\n**太阴入二限吉凶诀：**\n太阴限逢福禄丰，嫁娶添嗣旺门风，火铃凶煞来相凌，未免官灾病患临；限至太阴居反背，不喜羊陀四煞会，火铃二限最为凶，不见官灾也有晦。\n\
    \n### 9、贪狼星之年\n会发生有关夫妻、色情、健康、交际应酬等事情。\n\n**贪狼当运**：多开创变动，机遇较多，事业忙碌，酒宴机会多，主交际应酬，吉则发财，凶则易被财所困；有异性缘，与异性接触的机会也多，亦易入色情场所，有煞易有色情纠纷；或聚会朋友；女性易有感情破裂或流产。运程中，贪狼落于年月日时支上皆可暴发的机会，贪狼不发少年人，三十五岁前逢之难发，中年后逢之可发，火铃守照横发，但不可贪得无厌，宜见好就收；逢羊陀阻力大，横发横破；逢空劫辛劳而无功。二限逢贪狼羊陀刑耗忌聚，主有官司横祸。逢贪狼与化忌的昌曲同守或对照之宫，有官非受挫之灾，逢叠忌之限年或忌冲之限年灾重。与火星同守寅宫逢化忌，流年行到逢双化忌，防火灾。流年遇贪狼于田宅宫有搬家之象，或屋内装修事。这一年不宜结婚。事情发展急成急败。\n\
    \n**逢化忌**：易因大意而竞争失利，因不良嗜好而惹祸，因色损名破财，不小心被人夺爱（指最喜欢的人事物）；陷地或加煞更凶；若与天刑、官符、贯索同宫加煞冲，必因色惹官司；逢昌或曲同宫易因女人事惹麻烦。流日逢贪狼化禄，会有人请客。\n\
    \n**小限逢贪狼**：春夏较佳，秋季一般，冬季不利。\n\n- **庙旺无煞**：加化科权禄，主升职发财；加火铃，横发高升；加羊陀空劫忌，夫妇不和，破财贪淫。\n\
    - **失陷**：事事不如意，破财败业，恋爱失败，夫妇不和；加羊陀空劫忌更凶，易有色情之灾或意外的灾伤，或因应酬赌博破财；加火铃亦可发一时之财。\n- **流年入原局迁移宫**：贪狼加煞坐守，逢流煞冲动，且见太岁、岁破、官符、大耗等，又逢忌星会合，主遭兵贼盗乱之灾，或受贪官污吏诬陷。\n\
    - **流年田宅宫见贪狼化禄**：主买宅、装修；见贪狼化忌，主搬迁或大修；贪狼落陷，火铃同度，又见刑耗，流煞冲会，主火灾，若有吉则主火灾后损耗不大并进行装修。\n\
    \n在运用此星时，此运此方可求财，宜做股票、期货等投机性的生意，还可求学、求道。\n\n**贪狼于二限吉凶诀：**\n贪狼庙旺事和谐，科权禄伴财官发，陷地恶煞来冲破，官灾破败家不宁。"
  mdcn: "## 五、岁限应注意的几种凶格：\n\n### 1、七杀重逢\n命宫有七杀守照，而大小限流年又逢七杀之宫，即是。忌见羊陀重叠，大凶。逢羊陀空劫伤使者定有刑伤。七杀入庙及逢紫微、天相、禄存、化禄三方守照者可解。\n\
    \n### 2、羊陀迭并\n原命盘命宫或对宫有羊陀，而流年又逢流羊流陀飞入该宫，谓羊陀迭并。若大小限重叠于该宫或对宫，无吉化解，主大凶。例如，庚生人坐命在西，西见羊；庚流年，流羊在西，流陀在未，为羊陀迭并。\n\
    \n### 3、竹罗三限\n凡命宫逢杀破狼之一坐守，谓之“竹罗”。若大限与小限或流年又同时值杀破狼（即原命宫、大限宫、小限宫或流年宫必须都为杀破狼坐守），称为竹罗三限。如果三星失陷又无众吉守照来救，必主大凶，但亦必须流年凶煞会聚才应凶。尤其是三限俱坐七杀，复会巨门、丧门、吊客、白虎，主其年九死一生。大限杀破狼，小限羊陀迭并，防意外伤亡。遇“竹罗”于庙旺之宫，且得紫微、天府、文昌、文曲、武曲、天相同梁、左辅、右弼、天魁、天钺、禄存、天马等吉星守照合，反有开创的局面，可一举冲破难关而取得成就。杀破狼不入原局命身，二限遇之亦为“竹罗”，逢凶亦凶，但凶性减弱，原命吉者亦不主凶而主更新开创局面，逢吉更吉。消极之星（如天同、天梁）逢杀破狼限年，会有变动之举，吉则变好，凶则招灾。二限逢杀破狼，一般入生年死墓绝沐浴等宫为凶；本宫化忌有煞、旬空、丧门、吊客、白虎等则凶，再逢伤使夹或羊陀夹，劫数难逃，对宫化忌亦是。\n\
    \n## 第七节 诸星值限年运气推断\n\n以大小限、流年落宫的星曜来推断，例如大小限、流年宫值紫微星，称为紫微星之限年。一般正星庙旺加吉化吉则吉，加煞平常；失陷加吉亦平常，失陷加煞则凶。逢化忌多有特殊之处，官吉则变动，官凶则变凶。三方宜注重对宫，三方煞聚，主大凶。以下所论吉者亦宜庙旺有吉拱照才论吉，所论凶者须陷弱或加会煞星才论凶。其余人事十二宫什星可仿照参断。\n\
    \n### 1、紫微星之限\n会发生有关事业、职务、财利、夫运、考试、名誉等类事情。仍有高、高级、首、头、才干等意义。\n\n- **庙旺**：可得贵人相助，能发挥才干，百事顺遂，地位高升，经商发财，是赚钱的好时机，可加大投资；有左右众吉守照更吉；若无左右等百官朝拱时只能算小吉；加文昌考试高中；无吉加煞，辛劳且平常。\n\
    - **弱闲**：有左右众吉星相会可有小成；无左右众吉星相会，主破财不聚；加恶煞，将会发生意外损失。\n- **逢紫破**：有搬家之象，不吉。三方逢杀破狼加会，主职位不稳定，时起时落。大小限凶，对宫逢紫府可渡难关。破军守命者，不喜逢紫相限年，主有疾病。\n\
    \n青少年行紫微运，高傲，不听话，好高骛远，不切实际而误事，或错失良机。中年最宜逢紫微，精力旺盛，大利创业。老年行运逢紫微，亦不一定吉，因承受不起贵气而致灾。\n\
    \n流年太岁小限遇紫微，有见贵人高人之象。初春秋冬衰而不 利，三至六月旺而最利。此运及此方位时辰，利考试、求名、访贵人。\n\n**紫微入二限吉凶诀：**\n\
    紫微垣内吉星临，二限相逢福禄兴，常人得之多吉庆，官贵逢之职位升。\n紫微入限本为祥，只恐三方杀破狼，常人逢之多不利，官员降谪有惊伤。\n\n### 2、天机星之限\n\
    会发生有关交际、应酬、事业变动、外出、搬家、长远性的决策计划、学问、考试、名誉、宗教、五术、问题解决与否等事情。\n\n- **天机入限**：好奇喜动，往往会作出人生中关键的决策或决定，影响较深远。年轻运主活泼而社交广泛，积极策划行动；老年运主老谋深算，经验丰富。事业、家庭环境多变动（例如搬家或变动床铺），家庭纷争，长期积压之事亦会有变更。会天马有远行之兆。加同梁主享受。加会日月于旺地，升官发财。巨门同，是非纠纷多，再加羊陀主灾厄。天机小限，春夏充满活力，多变动而有进展；秋冬不利活动，宜蓄机待发。\n\
    - **庙旺众吉拱照**：多得贤人指路，思维敏捷，机遇较多，事业大有发展，宜果敢行动，兴家创业，子午宫最佳。失陷或加煞，会有阻丧的境遇，甚至有悲观厌世的念头。\n\
    - **逢化三吉**：主变好，得贵人助而发展，经营顺遂。\n- **逢化忌**：凡事变坏，工作不安定，事业艰难，计划失误（多因贪图捷径所致），惊慌失措（宜镇静，早谋对策），官员防降职，交友宜小心，防机器损伤；加羊火小心骑机动车出事。化忌星入田宅宫，有搬家之象。\n\
    - **天机入大小限的对宫**：主事业不安宁。流日逢天机天马化忌，小心车祸。\n- **炼功及学习五术中**：宜选在天机当值的大限、流年、流月、流日、流时及天机的方位，切莫错过天时良机。遇到困难时可在天机方去寻找贵人相助。\n\
    \n**天机入二限吉凶诀：**\n男女二限值天机，科权禄逢大有为，出入营谋多遇贵，发财发福少人知。\n天机照限不安宁，家事纷纷外事多，更遇羊陀并巨门，须知此岁入南柯。\n\
    \n### 3、太阳星之限年\n会发生有关工作、财利、考试、名誉等事情。太阳为父星、夫星、子星、事业星，限年逢，亦会有父、夫、子、事业等方面的事情。\n\n\
    - **太阳入二限**：有强烈的创业心，会接近与政治有关的人和事，好心反易招怨。\n    - **青少年运**：活泼好动，喜出风头，又不肯动脑，重感情。\n\
    \    - **中年运**：干劲足，喜社交，不感情用事。\n    - **晚年运**：变得冷静，成败起伏，多家庭变故。\n- **化三吉大利**。\n\
    - **逢化忌**：易受瞒骗、误会、冤枉（不与人合伙，凡事预先通告），防头心眼疾，名誉受损；加煞，刑克父母，财破得很利害，是明见的破；会天刑、羊陀、白虎，主降级、刑讼、丧服、疾病、克父、克夫、克子。原局逢化忌，大小限逢白虎、丧门、吊客之年有丧父之忧。\n\
    - **流年大限遇阳梁**：可与老友相遇，若天梁化禄，老友已婚，好谈世事政事；太阳化禄，热情而多寒喧。\n- **大小限入田宅宫**：吉聚必有聚兴之喜。女命逢太阳限年，会谈情说爱，有红喜星更是，吉则成，凶则告吹。\n\
    \n小限逢太阳，春夏大吉，秋冬不利。\n\n- **庙旺无煞**：事业顺遂，有名声，可积极主动进取，会有升职、进财、添子、结婚等喜庆事，是最适合恋爱结婚之年。加吉更佳。加四煞一事业财务考试等不顺，亦主父、夫、子有病灾，但为灾较轻。原命宫化科行至此，日生人，有吉无煞主名声大噪。\n\
    - **失陷**：主变动、耗财，先好后坏。加吉，平平过。加煞忌，会破大财，事业大败，恋爱婚姻失败，亦主父、夫、子、男命本人有病灾，甚则丧父、丧夫、丧子。原命宫化科行至此，有煞忌主名声有损。\n\
    \n在运用中，太阳当运，可把握机遇，大展宏图。\n\n**太阳入二限吉凶诀：**\n二限喜逢旺日临，添财进业福非凡，婚姻和合添子嗣，仕者高迁坐庙堂。\n太阳守限有多般，陷地须防恶煞侵，加忌逢凶多阻滞，横事破财家伶仃。\n\
    \n### 4、武曲星之限年\n会发生财利、争斗、伤害、健康、旅行等有关的事情。原命武曲坐守者行运至此者，可能会参军、练武，但有煞忌者不利。\n\n- **庙旺无煞**：适宜创业，声誉好，政界高升，经商发财；加昌曲，事业顺遂，声誉高；逢化权更吉；加煞，多财务纠纷，甚至打架，事业努力仍可有成。\n\
    - **失陷**：财运欠佳，事业低落；加吉可小有成就；加煞忌，破财亏损，其至负债倒闭、招牢狱、官非词讼、疾病刃伤之灾。\n- **逢化科权禄**：大利求财求谋。\n\
    - **逢化忌**：破财、资金周转困难（节制用钱，早防，不加大投资），不利求财、应酬、健康，防金属损伤和手术，打斗决裂（宜忍让、慎言）。\n\n青少年运逢武曲，冲劲足，但易生纠纷、打架，加羊陀天刑防受伤，逢化权更利害，逢化忌还防打斗而至官司牢狱之灾，四煞混杂更验。中老年运无煞可勤劳发财，有煞不利，多伤病。\n\
    \n小限逢武曲，秋季最利，夏季最不利，春冬也不好。\n\n- **二限逢武破**：主求财艰难，加煞忌定有是非争斗破财事。\n- **限运逢武贪**：庙旺时主升迁、发财、掌权，失陷时主有灾病。少年不宜行武贪大限，一脑子想当老板，会荒废学业。火铃同度或对照，横发，名利双收，有出国机运（为商业性的）。\n\
    - **武贪文曲三星同守于午丑二宫**：行限到此，无禄马吉星来解，主有水灾凶险。\n- **行限逢武昌铃陀四星守照（四星会齐）之宫**：主投河溺水而亡，或运途而终。若旺地而有吉星禄马来救，亦惊险非常。逢武曲化忌之限年，必凶。再如武昌铃三星同守于戌宫之限，逢壬流年，流陀在戌与三星同宫更凶，必死。\n\
    - **武杀加煞大耗之限年**：易有打架、官讼是非。\n\n此运及此方位，宜求财、参军、投资、经商。\n\n**武曲入二限吉凶诀：**\n限逢武庙主财兴，左右昌临福禄荣，化权化禄利求谋，会合吉星显声名。\n\
    武曲之星忌失陷，官员值此防降职，公吏逢之防刑杖，常人逢之还负债。\n\n### 5、天同星之年\n会发生交际、夫妇、色情、健康、旅行、饮食、喜庆、宴会等事。\n\
    \n- **少年运**：逢天同，得父母宠爱照顾，父母宫吉则生活富裕。\n- **老年运**：逢天同大吉，较能享清福，快乐延寿。\n- **青壮年运**：逢天同不算美，读书贪吃贪玩不努力，工作懒散无创劲。\n\
    \n- **庙旺无煞**：虽有点懒散，但福气天成，喜事临门，交友广而获益，事事遂意，常有人宴请；加吉更佳；即使加会凶煞，虽事业稍有阻，但反主有冲劲，若能努力终可成功。\n\
    - **失陷**：运气欠佳，夫妇不和，破财疾病，少享受乐趣；加吉稍好一些；加煞，破财失职和伤病灾祸较重。\n- **天同为医生**：限年逢之，主有疾病，即使旺吉也难免，旺吉主小病，陷凶主大病。\n\
    - **逢化忌**：自卑、伤心（宜想开点），伤感情（多因饮宴、享乐事），破财（不宜投机，不出入娱乐、酒宴场所），防牙、心、肾、生殖系统疾病。\n- **大小限或流年逢天同**：有化忌或逢煞冲破者，此限年有生病开刀的可能，疾厄宫再不好者，病重。例如疾厄宫同巨在丑宫为陷地，大小限同临；大限天干为己，使天同化权、巨门化忌；流年己卯，流羊在对宫冲照；巨门化忌主咽喉、呼吸道有病，天同化权主医生掌刀柄之权，故而当年有甲状腺切除手术之事，天同为吉星、良医，故手术成功。\n\
    - **限运逢于田宅宫**：遇化禄及会吉，主有庆典；再见昌曲，主重修房屋。若逢天同化忌，主家庭愁云密布，家宅及家人不宁，有吉星加临则主装修。\n\n小限逢天同，冬春季吉，夏秋季不佳。限运逢天同，可宴请嘉宾，求道拜师访友，求医问药。\n\
    \n**天同入二限吉凶诀：**\n二限天同喜盈门，财禄增添家道丰，陷地恶煞来冲破，官灾破败家不宁。\n\n### 6、廉贞星之年\n会发生工作、夫妇、色情、健康、财利、名誉等事。不宜求财，可求名，求财不成，求名荣归，主孤芳自赏，自命不凡，胆大佞为，常有孤独感。易有官司刑狱，不可贪图富贵而贪污枉法，陷凶而与贪狼同宫更宜注意。防意外及血光之灾，加红喜刑更验，不宜远行、冒险，远离利器。\n\
    \n小限逢，春秋较吉，夏季次吉，冬季不吉。\n\n- **庙旺无煞**：有突发性的好机遇，政界升官提职，经商发财，未婚者易碰上结婚对象；加吉或化吉更是喜气临门，可加大投资；加煞事业有阻；中晚年较佳；对宫见火贪，更多意外的机遇。\n\
    - **失陷**：易流于邪恶偏激，虚伪奸诈，财与名均不利；少年运易冲动犯刑，中年运遇主多灾疾，四十五岁后较稳定；加煞，易有官司病伤，宜谦虚谨慎，遵纪守法；若为原盘官禄宫，逢四煞（擎羊最凶）或天刑白虎，不是官司就是病伤。\n\
    - **廉贞天相**：小限行至，在午宫屋顶易漏水；在子宫下水道不通，水管问题；加羊刃易患官司或者冰箱会坏。加会擎羊，大限行到，遇丙流年易有官司刑灾或血光之灾，宜小心行事，遵纪守法，远离利器。\n\
    - **廉贞化忌**：防伤感情事（少与六亲来往，凡事预先声明），更宜防官非犯刑；若与天刑、官符、贯索、白虎同宫，必因色惹官司；若会武曲于原命宫，有木压雷惊之险，防车祸、木压、兽咬之灾；逢凶煞或孤寡或逢双化忌于田宅宫，主家中老人有血光之灾或心血管重病，失陷更凶；逢双化忌入奴仆宫会被异性朋友出卖或拖累；化忌入子女宫，防子女有血光之灾；入失陷或有凶煞星的疾厄宫，本人有血光之灾；入失陷或有凶煞星的夫妻宫，配偶有血光之灾。以上有血光之灾者，若加红喜刑更验。凡廉贞化忌之灾多应于五月份以前。\n\
    - **廉贞坐命**：流年小限迭至，又值流年白虎加临，定主官非牢狱之灾（若入狱，要逢命盘化科或流年化科之年才能出狱）。逢化禄或化忌，限年到此，易为情所困。\n\
    - **行限逢廉贞于陷地遇火星**：易自寻短见；如煞多主横死，轻则伤残。与天刑、化忌、擎羊同宫，防官司入狱，若再逢杀破狼更重，或主疾病严重。\n- **大限流年遇廉贞化禄**：未婚者有婚喜，结婚后有桃花事。廉贪同宫更是。廉贞化禄遇禄存很有异性缘，廉贪化禄亦是。\n\
    - **流年父母宫守廉贞**：加会杀破狼或煞刑忌，更见流年白虎丧门流羊，主父母有伤亡的危险；廉贞化忌会武曲化忌之年，亦是。\n- **流年的田宅宫逢廉贞化忌**：家里的电器常出毛病；有煞时，也主家人生病或死亡。\n\
    - **流年的疾厄宫逢廉贞化忌**：防感冒或过敏症，若煞重则宜注意意外伤灾手术。\n\n◇“刑杀会廉贞于官禄，枷锁同流”：如羊杀廉守于事业官，流年二限到此，不逢祸患，定遭刑伤。（陷地才是）。\n\
    \n此运此方位宜求名求职，不宜求财。\n\n**廉贞入二限吉凶诀：**\n廉贞入限旺宫临，喜逢吉曜福禄深，财物自然能蓄积，任人得意位高升。\n大小二限遇廉贞，更有天刑忌羊侵，脓血刑灾逃不得，破贪杀会赴幽冥。\n\
    \n### 7、天府星之年\n会发生有关工作、财利、产业、不动产等事。可创业办公司，置不动产。无煞冲破，什么事都能一帆风顺，平稳发展，但不会横发，金钱、地位、婚姻、声誉、考试等都显吉兆，发财置业，事事如意，家中喜庆事多，添丁进喜；易得中奖之类不劳而获之财；加吉更佳，有升迁发财机遇，可加大投资；喜见禄存化禄，主发财；可能有合伙事，可购置房地产。加煞则运气平平，仅主困难挫折，计划难实现，但不会有官司词讼等重大灾难发生，逢空劫会变得寂寞，无所事事的空虚感。\n\
    \n- **少年运**：逢天府，大利读书，加吉星名列前茅。\n- **青年运**：逢天府较骄傲。\n- **中晚年**：稳步发展，五十岁后虽好，但外华内虚，宜保守。\n\
    - **小限**：冬春季吉，夏季虽好但外华内虚，秋季事业不利。\n\n在运用天府星时，可在此运此方积蓄财富，开办公司，置产业。\n\n**天府入二限吉凶诀：**\n\
    限临天府能司禄，常人逢之多发福，添财进喜永无灾，又主闺身并闺屋。\n南斗尊星入限来，所为谋事称心怀，若还又会科权禄，指日欣然展大才。\n\n### 8、太阴星之限年\n\
    会发生与母、妻、女、财利、产业、不动产等有关的事情。未婚者易有纯真的爱情。\n\n- **庙旺无煞**：事事如意，财源广进，添丁进喜，谈情说爱顺利，有得到奖赏的机会，宜购置不动产；加煞则辛劳，事业有阻，但经努力仍可有成。\n\
    - **失陷**：出力不讨好，辛劳而难成，破财不聚，又主不利母、妻、女或恋爱婚姻，感情多波折，易失恋单相思，精神上很痛苦；加煞化忌更凶，钱财亏损，甚则破产，且易发生健康、家庭、恋爱婚姻的纷忧。\n\
    - **逢化忌**：有败家之象，多暗耗破财（不宜投资），易受诱骗（莫贪心），陷地易因色损名破财（莫贪色贪财，凡事保守）。与火铃同宫，有官灾疾病，三方再见羊陀七杀，有灾祸，逢乙年应灾。\n\
    - **青少年运**：逢太阴，较喜安静，有人缘，学习好。\n- **中年运**：逢太阴较喜动，创业心强，多奔波，较喜接近异性。\n- **老年运**：较注重享受，有财富。\n\
    \n小限逢，春季多动，夏季多灾疾，秋季多收益，冬季多享受。流年太阴白虎逢主母灾，或主妻凶。与天刑、天巫同宫，小限流年逢，亦主母灾。\n\n**流年逢太阴化忌**：往往会有拖延和计划受阻，例如流年迁移宫化忌，出行或回程时间拖延；流年命宫化忌，易失眠，事业有阻。\n\
    \n在运用太阴时，此运此方位可求财，易得私财；遇事宜私办，不利公办。\n\n**太阴入二限吉凶诀：**\n太阴限逢福禄丰，嫁娶添嗣旺门风，火铃凶煞来相凌，未免官灾病患临；限至太阴居反背，不喜羊陀四煞会，火铃二限最为凶，不见官灾也有晦。\n\
    \n### 9、贪狼星之年\n会发生有关夫妻、色情、健康、交际应酬等事情。\n\n**贪狼当运**：多开创变动，机遇较多，事业忙碌，酒宴机会多，主交际应酬，吉则发财，凶则易被财所困；有异性缘，与异性接触的机会也多，亦易入色情场所，有煞易有色情纠纷；或聚会朋友；女性易有感情破裂或流产。运程中，贪狼落于年月日时支上皆可暴发的机会，贪狼不发少年人，三十五岁前逢之难发，中年后逢之可发，火铃守照横发，但不可贪得无厌，宜见好就收；逢羊陀阻力大，横发横破；逢空劫辛劳而无功。二限逢贪狼羊陀刑耗忌聚，主有官司横祸。逢贪狼与化忌的昌曲同守或对照之宫，有官非受挫之灾，逢叠忌之限年或忌冲之限年灾重。与火星同守寅宫逢化忌，流年行到逢双化忌，防火灾。流年遇贪狼于田宅宫有搬家之象，或屋内装修事。这一年不宜结婚。事情发展急成急败。\n\
    \n**逢化忌**：易因大意而竞争失利，因不良嗜好而惹祸，因色损名破财，不小心被人夺爱（指最喜欢的人事物）；陷地或加煞更凶；若与天刑、官符、贯索同宫加煞冲，必因色惹官司；逢昌或曲同宫易因女人事惹麻烦。流日逢贪狼化禄，会有人请客。\n\
    \n**小限逢贪狼**：春夏较佳，秋季一般，冬季不利。\n\n- **庙旺无煞**：加化科权禄，主升职发财；加火铃，横发高升；加羊陀空劫忌，夫妇不和，破财贪淫。\n\
    - **失陷**：事事不如意，破财败业，恋爱失败，夫妇不和；加羊陀空劫忌更凶，易有色情之灾或意外的灾伤，或因应酬赌博破财；加火铃亦可发一时之财。\n- **流年入原局迁移宫**：贪狼加煞坐守，逢流煞冲动，且见太岁、岁破、官符、大耗等，又逢忌星会合，主遭兵贼盗乱之灾，或受贪官污吏诬陷。\n\
    - **流年田宅宫见贪狼化禄**：主买宅、装修；见贪狼化忌，主搬迁或大修；贪狼落陷，火铃同度，又见刑耗，流煞冲会，主火灾，若有吉则主火灾后损耗不大并进行装修。\n\
    \n在运用此星时，此运此方可求财，宜做股票、期货等投机性的生意，还可求学、求道。\n\n**贪狼于二限吉凶诀：**\n贪狼庙旺事和谐，科权禄伴财官发，陷地恶煞来冲破，官灾破败家不宁。"
