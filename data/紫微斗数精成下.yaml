    # ### 第五节 四化详释


    #### △一、四化义理


    紫微斗数派别众多，其中主要分南派和北派，南派重星情法，北派重四化法。


    所谓四化星，是星曜的气化、变化、变动，就是指某星曜逢某天干牵动而性情义理向好或向坏方向发展变化的四种不同的结果。四化星具体是指：化禄、化权、化科、化忌，简称：禄、权、科、忌等四颗化曜。四化星的属性意义参看上编。


    △紫微斗数论断的基本法则是：宫位定人事，星情断吉凶，四化寻契机，行运看变化。“四化寻契机”，就是以四化星来寻找引发吉事凶事的时机。四化星是最活跃和能量最大的星曜，它能领导群星的运动与变化，是事态变化的契机和源动力。所以四化星在斗数分析论断中很重要，是人事物变好变坏的关键之一，它能改变吉星为凶星，也能改变凶星为吉星。一般逢化禄权科为化吉，逢化忌为化凶，但也不是绝对的，须结合具体人事物来决定。例如，疾厄宫逢化禄权就不一定好，因化禄为多为情缘之意，对疾病多情怎么会好呢？化权入疾，官强则吉，官弱则灾。化忌入官禄宫则主对事业很肯钻、负责，因而工作很积极，但结果对社会虽有贡献，对自己没有多少好处了。


    既然是寻契机，应该是指大限和流年而言，限年四化才起吉凶的发动、引暴作用，是在原局的基础变好或变坏。所以，原局以星情为主，四化为辅，限年则非常重视四化。


    化忌星是斗数中的神机显现处，化忌能牵动全局，所以，化忌星是四化中至关重要的核心，在分析四化中首先要重视化忌星，其次是化禄星，化权、化科更次。化忌入宫为引坏，化忌冲宫为引爆，所以冲宫为发生事端的焦点，而冲宫的交友为严重的后果。


    从因果关系看，以四化看，同级化忌的结果，以同级化禄查起因。以宫位看，引发四化的天干所在的宫就是四化的根源，为值事的权柄，为事件产生的原因（引发事件的人和事看落宫的官'
