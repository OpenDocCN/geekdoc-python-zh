    # ### 第三节

    活用斗数分类预测


    ◆1、测来意

    以来人进门的时间起出紫微盘，先从命宫的星情及四化落宫（化忌为主为事体且看凶事，化禄为次为原因且看吉事，权科在此一般不用）可以看出来人间测的大致内容。例如，命宫逢杀破狼，可能为测外出变动之事；太阴化忌，与妻、母、女儿、女人之事有关；太阳化忌，与父亲、儿子、男人之事有关；破军化忌，与子女之事有关；天机化忌，与兄弟、车辆之事有关。


    以日干化忌落宫可用来预测“来人不用问”，即不用来人报出测什么，而可以知其来意，不过有时要参考时干化忌落宫，因有大约有10%的来意是时干化忌所在宫，两者要兼看。以化忌落宫的名称测大致的事情，再以星情看细节事情。例如，忌入子女则可知为问子女之事；子女为生殖位，女命可能为问生理病；子女为合伙宫，若为生意人，可能为问合伙事;
    子女为桃花宫，也可能为桃花事或婚姻事而来。又如巨门化忌入田宅宫，可能为测家庭、家宅事；再以星情细断，巨门表是非，问离婚或家宅纠纷，不搬家就有是非。事情将会怎样？再以化忌落宫飞四化，以化忌落宫断结果。如上例，搬到哪里去呢？以田宅宫干化忌落宫断方位，如化忌入子女，子女在田宅的对宫，故表搬到对面去；周围的环境怎样？以化忌落宫的星情断（如逢天空为附近有空地，逢天同为近处有水沟或土地庙等）。


    测某年、月、日、时有何事？看流年、流月、流日、流时宫的星情。而年月日时发生的焦点问题可看天干化忌星的冲宫，问年用年干，问月用月干，问日用日干，间用时干。例如，问今天有什么事？以问测的时间起盘或随机起盘，然后看流日宫（即流日地支所在宫）的星情即知其人当日在干什么；而当日将发生什么焦点事件则看流日干的四化星，凡流日干化忌的冲宫凶；凶的程度要结合星情看，落宫主星失陷遇凶恶星必凶，主星庙旺、有吉星则凶不起来，最多有些阻滞而已。誰凶或什么事凶？参看冲宫的名称，凶的原因看化忌原星的星情表意，例如冲财帛宫主破财，若贪狼星化忌来冲，可能因酒色赌博投机等有关。一般为有凶事才问测，有时也会问喜事，喜事看流日干化禄落宫的星情表意。


    若预测现在或某个时候在干什么？看流刻盘用神命宫的星情，以及看流时干化忌落宫和冲宫。


    若问某时朋友在干什么？看流时或流刻盘的奴仆宫的星情。


    若测某时自己的收入，看流时盘的财帛宫。若要测某时朋友的收入，可以流时盘的奴仆宫为新命宫重布十二宫，看新命盘的财帛宫（即流时盘奴仆宫的财帛宫）。若想测朋友的妻子的情况，就以流时盘奴仆宫的夫妻宫为太极点（即命宫），重布十二宫，以此新命盘的十二宫来看朋友妻子各方面的情况。


    若问某日外出有什么事？就看流日宫的迁移宫，外出的事情与该宫的星情表意有关。还可以流日的迁移宫飞四化，以四化落宫看外出情况。


    ◆2、风水预测

    以预测用事时间排出紫微盘，或随机定命宫法，以田宅宫看现在的居住环境情'
  - '[PAGE 175]


    况。当然也可以出生时间起出紫微盘，再以田宅宫来看出生时的住宅及其周围的环境情况；以限年的田宅宫看限年的住宅环境情况。


    阴阳宅风水均以田宅宫和子女宫来看，阴阳宅的区分：田宅宫为阳宫看阳宅，子女宫则看阴宅；田宅宫为阴宫看阴宅，子女宫看阳宅。


    设田宅宫为阳宅，田宅宫为住宅的中心，以十二地支论方位，田宅宫的对宫(即子女宫)为住宅对面的情况：站在田宅官，面向对宫，田宅宫左边宫位的星情即为住宅左面的环境情况，田宅宫右边宫位的星情即为住宅右面的环境情况，对宫左边宫位的星情即为左前方的环境情况，对宫右边宫位的星情即为右前方的环境情况。具体的环境情况可以参看上编的星情要义及“八卦万物类象”等情况来分析判断。(又有以命宫看阳宅，以田宅宫看阴宅的，布局看法同上，且结合十二地支宫属性论，听说较准确，可参考)


    屋内摆设情况也可以田宅为中心，以十二地支论方位，子女宫为前面，将屋内分出前后左右而论。逢太阳之方光线较好，或摆放电话；逢廉贞之方摆放电器、电脑；逢太阴之方为冰箱；逢天机之方摆放风扇；逢贪狼之方放食品等。


    以巨门落宫的地支方位看大门所在方位。


    阴宅预测，可以阴宅宫为坐山，对宫为向方，以落宫星情论吉凶，再以十二地支方位论周围形势，看法同住宅一样。


    以十二宫论：兄弟宫为现金存放处、夫妻的床位，夫妻宫为厕所位，子女宫为大门，财帛宫为银柜、客户，疾厄宫为客厅，交友宫为神位，官禄宫为书房，父母宫为厨房，福德宫为娱乐室。


    # ◇3、预测恋爱婚姻


    起盘方法按上述各种方法都可以。看配偶的外貌及性格怎样？可由夫妻官的星情来看。看婚姻情况，夫妻宫逢吉星吉格则美，逢凶星凶格者必不美；夫妻宫比命宫好，说明配偶的命格比自己强；夫妻宫逢庙旺的同、相、梁、府、化科等星较好；逢失陷的杀、破、狼、廉、巨加煞忌星，多不美，刑克纷争不免；逢空、劫、忌、截空、旬空、破碎等星，谈婚必不成，成了也易散或有刑克，婚后也诸多不妙；逢孤、寡、哭、虚、阴煞也不好，阴沉沉的；逢粒把桃花星，说明配偶有风度、吸引力；逢桃花星多或加昌曲左右单星，恐有第三者插足，或是用情不专；夫妻宫男逢太阴，女逢太阳也不太好，表示配偶异性化或异性缘多。


    看夫妻之间的关系如何？以命宫及夫妻官的四化情况来看：命宫干的四化入夫妻，表其人对配偶有情；夫妻宫四化入命宫，表配偶对其人有情；如二宫无四化相连，则说明双方感情一般。化禄主缘厚，化权多管而关系不太好，化科随和但多外情，化忌入主痴情和多管，关系并不好，常吵架，忌冲则彼此关系更不好，若宫凶者主不离异就刑克。


    具体而论，夫妻宫四化入命，说明配偶爱我的人品；夫奏宫四化入疾厄宫，说明配偶仅仅是爱我的外表美。命宫四化入夫妻，我爱配偶的人品；命宫四化入奴仆（夫之疾），我爱配偶的外表美。


    看感情是否专一，可以看夫妻宫四化入田宅（偶之奴），表配偶会对他人生情；田宅四化入夫妻，则别人会对配偶生情；田宅四化入父疾线，主会有外人与你的配偶发生感情纠缠。官禄宫为情人，该宫化四化入命宫，表有情人缘。化禄主情，化忌主纠缠不清。


    测你爱的人是否已有恋人？只要夫妻宫与财帛宫发生互化，不管单化还是双化，都表示你爱的人已有恋人。'
- md: '## 看一个人是否已经结婚了？主要看流日四化是否入夫妻宫。如流日化忌入夫妻宫，则此人一定已婚；如坐化科，则此入必有事实上的婚姻存在，起码已发生两性关系；而坐禄或坐权则不一定已婚。


    谈婚能否成功？只要用神宫的兄友线不逢化忌就可以成功。


    配偶为何方人？以夫妻宫的天干看，甲乙东方，丙丁南方，庚辛西方，壬癸北方，戊己为中部和当地人，甲丁己为外乡人。再以夫妻宫的星曜看，阳、巨为异乡或异族人。


    六亲对婚姻的看法如何？以用神命盘的六亲宫去四化，化三吉入命身迁宫多表示关怀、同意；化忌人命身迁宫则不关心、不同意。


    何时有桃花运？流年的命、偶、福宫逢红鸾、天喜、化科、天姚等有桃花运，流年化禄入子女和流田化禄入流命均有桃花，交友或偶宫四化入命亦是，但化忌较难成，逢空劫也是不成。疾厄化禄入交友，我想异性；交友化禄入疾厄，异性想我；子女化禄入疾厄，疾厄化禄入子女，想发生性关系；子女化权入疾或疾厄化权入子女，动手动脚；子女化忌入疾或疾厄化忌入子女，上床；命宫化禄入交友，而交友化忌入命，上床；田宅化禄入命，而命宫化忌入夫妻，上床；夫妻化禄入田宅而田宅化忌入子女，疾厄化禄入田宅而田宅化忌入夫妻，均是先上车后补票。流月同论。


    走私外遇：上述逢桃花的格局多易有外遇，命疾福是自己有，夫妻宫为配偶有；夫妻化禄或忌入子女是配偶勾引人家，子女化禄或忌入夫妻是人家勾引配偶，多已有性行为；命宫化禄入交友为自己主动，交友化禄入命是朋友勾引自己，不一定有性行为；夫妻化禄忌入田宅而田宅化禄忌入夫妻，配偶有外遇。


    一般已婚者问婚姻，多是有问题才预测的，这时主要看什么原因？先看上述有无外遇的情况，有则为第三者插足，无则再看夫妻宫星情善恶来定是否因性情不合所致，夫妻宫星曜凶恶或逢化忌守照多属性情不合；命宫化忌冲夫妻而化禄入交友，是自己另有新欢；夫妻化忌冲命而化禄入田宅，是配偶另有新欢；化忌入照子女，子女宫有恶煞，可能因不育问题；财帛破损严重可能因财务问题。


    离异：化忌冲夫妻宫，不是已离就是丧偶；命宫化忌冲夫妻，夫妻化忌冲命，均主已离异；夫妻宫自化忌，迁移化忌冲偶，夫妻化禄入交友而交友化忌入田宅，夫妻化禄入福德而福德化忌冲父母，均易离婚；夫妻化禄入迁移而迁移化忌入子女，夫妻化忌入田宅而田宅自化忌，女命易离婚。婚姻有纠纷，问何时能离？逢流年化忌冲夫妻之年，流月化忌亦冲夫妻宫或流月入夫妻宫之月离成。


    风尘女：紫贪入命宫，再有桃花星；命坐寅申巳亥而逢破、马、姚、咸、昌、曲等加会照；命宫逢破、姚、劫；女命逢之自己为风尘女，夫妻宫逢之妻子为风尘女。


    # ◇ 4、预测失物


    以遗失时间或求测时间起盘，并以财帛宫或禄存宫为用神。损失什么财物？看用神宫是什么财物星而定，具体参看第十二章第十二节（该节是未知先测，此处则是已知有失而求测）。


    若已知遗失什么财物，即可以相应的财物星落宫来看，若不逢损失星，说明财物没有丢失而易找回，若逢损失星则财物已失而难找回，逢损失星又逢巨门、天空、截空、解神、破碎等疏忽星，为自己疏忽遗失。


    又可以财物星落宫天干飞四化，化禄入命财田福等宫，则财物未丢易找；化禄入夫妻宫、子女宫，财物在配偶、子女处；化禄入兄弟、奴仆宫，则财物已被人收去，难找回；化忌入命财田福，更难找回。单车丢失以天机星落宫飞四化，汽车、摩托车丢失以陀罗星落宫飞四化。若为文书、支票等类，以文曲星落宫干飞四化。


    化三吉入父疾线则没有丢失，化忌入父疾线则已丢失难找回。


    若测出未丢失，问什么时间能找回？可以化忌星落宫顺数到财物星所在宫，得几数即可定几日几时几时，具体是月还是日还是时，则要灵活掌握。若财物落宫旺相、逢吉不逢煞，则快，可定日；若落宫衰绝、逢煞则慢，可定月。又问测人坐着问则慢，可定月；站着问则不快不慢，可定日；走着问则快，可定时。


    还可以按间测人提问的字数飞四化，例如问“什么时候能找回？”共 7 个字，7 的天干为庚，即以庚飞四化，然后以化忌落宫顺数到物品宫，得几数即定几日几时。


    **下面为兰老师的例子，以流分盘定宫法。**


    戊寅年九月二十七日 21:25，一朋友来电说丢了东西，让预测一下情况怎样？推排出此时的流分盘，命宫在辰，求测的朋友在西宫。本日干支丙寅，日干使她的父母宫廉贞化忌，廉贞是带电的精密仪器，既然丢了东西，是否丢了手机呢？对方说是，问“能否找回？”廉贞在戌宫化忌，成为火墓之地，廉贞又为囚星，有被关起来的意思，而墓库亦为收藏之意；戌宫还有右弼华盖星，为优美或可移动的物品，故其手机没有丢，就在家中或办公室的某个袋子里面。后来，大概二月后在家中的旅行袋中找回。


    # **◆5、测行人**


    以行人出走时间或间测时间起盘，再以求测人与行人之间的关系取用神。例如，父母来问测则以子女宫为用神，兄弟来间测则以兄弟宫为用神等。看出走人现在怎样？看用神宫的星情，逢吉则安，逢煞聚则凶，逢丧亡星则已死亡。看出走去干什么？可以用神官的对宫星情看，例如逢贪狼为去玩，连廉贪为去玩游戏机；逢阴煞为迷路或精神失常；逢阴煞、天刑、擎羊为被拐、绑架等。


    出走路线，可以用神宫干飞四化，从用神宫起，男顺数女逆数，数到化忌宫止，看经过的宫位所属方位，定其出走经过的地方，以星情看经过地方遇到什么人和事物，最后停留在化忌星的宫位上，并以化忌星落宫看现在情况。能否找回？看化忌落宫，吉多则安然，可以找回；遇煞则不安，煞聚或有空、劫、白虎等星，则凶而难找回。什么时候找回？方法与找回失物的方法一样。


    例：戊寅年十一月十六日 10:41，同事问某孩子出走不知在哪里？


    按时间定宫法，这孩子的命宫在午宫，乙卯日干使命宫紫微化科，化科主贵人，所以小孩无事，乙使兄弟宫中天机化禄，奴仆宫太阴化忌。禄忌在兄友线主破财；命宫在午，迁移在未，小孩可能去北边，子宫贪狼，贪狼主桃花、娱乐，小学生只能去游戏店，果然下午在家的北方游戏机店被其奶奶找回。


    ◆6、预测股票期货（根据兰天辰老师的方法进行整理）


    (1)、首先选定命盘：用自己的命盘。


    (2)、按预测时间布流分盘（股票变化较大，以流分盘预测较流时盘好），并找到预测时流分盘的命宫在盘上的位置。


    (3)、如果只测一支股票或期货，就以流分盘的父母宫为这时你想预测的这支股票或期货的命官所在。


    (4)、如果要预测多支股票，可以流分盘的父母宫为第一支股票的命宫，以第一支股票所在的宫位逆数一位（即流分盘的命宫）为第二支股票的命宫，再逆下一宫（即流分盘的兄弟宫）为第三支股票的命宫……其他各支股票可依次逆推，便可确定那个宫位代表的股票上升。假如预测对象
    480 个股，用这种方法筛选出 40 个命中率高的个股，然后再预测这 40 个股涨幅情况。


    (5)、以某一股票的命宫为始，重布十二宫，然后以此新盘为依据进行预测该股票的升降情况。


    首先以该股票命宫的星情来断该股票的大致走势。例如命宫逢杀破狼，主有大的变动，逢紫微在午为极向离明格主走到尽头了，逢廉贞囚星主被套住等。


    再以年月日时的天干去四化，来看该股票远近期的升降情况，年干四化影响一年的走势，月干四化影响一月的走势，日干四化影响一日的走势，时干四化影响本时辰内和未来的走势。


    若化禄入父疾线或兄友线，且无化忌同入或会照的情况下，说明该股会上升；化禄入或照财帛宫也主上升。


    若化忌入父疾线或兄友线，说明该股会下跌；化忌入或照财帛宫也主下跌。


    (6)、上升的最高点和下降的最低点的计算方法：


    价格总数一般以该股财帛宫的天干数加地支数加干支纳音数之和来计算；点数，即小数点后之数，以天干数加地支数来计算。逢双化禄加倍，逢禄忌或双化忌减倍。


    以上计算方法要以预测时的开盘价为参考点，在预测出升或降后灵活掌握。任何预测都不是绝对准确的，很多时候仍要靠灵活和灵感。


    价格和点数用天干地支数和纳音数表示，天干为 1 至 10 数，地支为 1 至 12 数，以财帛宫的天干地支查其纳音五行，水二局是 2 数，木三局是 3 数，金四局是
    4 数，土五局是 5 数，火六局是 6 数等。


    紫微斗数的宫位旋转表示时间的迁移。顺时针表示时间前进，即子宫为今日，则丑宫为明日，若子宫为开盘的时间的命宫，那么下一个时辰的命宫顺时针移到丑宫了。


    例一：1998 年 9 月 28 日湖南株州易友 22:05 来电说今日秦川发展开盘价 7.00 元，收盘价 8.19 元，以后一二个月的走势如何？预测时的四柱：戊寅
    辛酉 戊贸 癸亥，我 (兰天辰) 的流分命宫在辰，上述股票定位在戌。命宫坐廉府，廉贞为囚星，月干辛使父疾线的文昌化忌，八月股票没法升，年日天干都是戊，戊使贪狼化禄在福德宫照财帛宫，该股会上扬涨幅较大。九月壬干使该股的兄友成就线化禄，化权又入财帛宫，股票上涨，涨到多少呢？想到戊使贪狼双化禄入福德宫，而福德宫的纳音为土五局，双五为十数；又财帛宫甲午纳音为金四局，天干数加地云数加纳音数为：1
    十 7 十 4=12。故断股价涨到 10--12 之间。现在我们分析准确数字，庚子数为 7 十 1=8，双化禄为 88，农历九月收盘价最高达到 10.88。农历癸干使贪狼化忌冲破财帛宫，股票下跌。实际情况正如所述测，九月初泰川发展逐渐上升，到九月二十四日达最高价
    10.88，过后就慢慢跌落下来。


    例二：1998 年八月十三日 22:15，广东易友问股票行情，随即报了三支股票：0776 延边公路，0830 鲁西化工，0586 川长江 A，按时间定宫分别在申未午。预测时的四柱：戊寅
    辛未 癸末 癸亥。


    延边公路预测时的前一周收盘价为 15.04 元，双癸使破军化禄入命宫，杀破狼主开创大变动，此股将大幅度上涨，结果从此一路冲高，11 月 16 日 22.55
    元收盘，12 月 4 日还有 21.30 元收盘。财帛宫壬辰纳音水二局 2 数，地支辰 5 数，双化禄为 22.55，故最高点为 22.55 元。


    鲁西化工命宫在未，日月会照，父母双化禄，稳定上升。川长江 A 命宫在午，双化禄在福德官照财帛宫，亦是上升之象。


    例三：1998 年九月十九日，一小姐带某男友来求测，20:33，问他买的 60009 虹桥机场这支股票情况如何？


    按时间定官该支股票在我命盘之午宫，预测时间的四柱是：戊寅 壬戌 戊午壬戌。命宫一定下来，我就说：“该股票目前已走到顶点了，最好在九月廿九日抛掉，最迟不能放到
    12 月 4 日。”当时那人不信。事实上本周收盘价 14.90 元，次周开盘价 14.78 元，收盘价 14.68 元，完全应验。


