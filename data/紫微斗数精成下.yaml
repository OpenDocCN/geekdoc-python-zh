    **力士**——武官仕途之星，主有小权势，入各宫皆吉。会羊陀，武职事业难遂，但不利考试。与化权同宫主增权力。利武职。


    **青龙**——文官仕途之所，入各宫皆吉。主喜事或进财。辰年逢最吉。年逢宜结婚。


