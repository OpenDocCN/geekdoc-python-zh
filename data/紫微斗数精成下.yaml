    四生宫，主操劳。


    +   (1)、问事须积极争取才能成功。

    (2)、为不远不近之地。

    (3)、为道路与住宅区之间或巷子胡同等。


    (4)、问灾厄疾病为不轻不重，一般；问病何时好，要一段时间才好，但也不会太长。


