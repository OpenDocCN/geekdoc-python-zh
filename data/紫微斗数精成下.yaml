    - 1979年，工作调动，爱人流产。（流年使文曲化忌，不利文书，故调离文秘工作；化忌入原夫妻宫，此宫为重病宫，不利事爆发）。

    - 1980、81年，搞文化工作，出席中央文化工作积极分子代表。（流年干使太阳化禄权入原命宫，又值昌曲天贵恩光，故在文化事业上有风光事；但又值化忌，先好后坏，故突然被批整）。

    - 1982、83年都在乡里劳动。


    - 1983年，生了个儿子，同年十月被水泥板掉下砸了头，鲜血满身，但无大碍。（小限值七杀，易有变动和伤灾事，十月进入未宫，为凶煞聚凑之宫，对宫化忌冲照，故此月有伤灾；小限的儿女宫逢巨门化权，故生儿子）。

    - 5、四运壬申，35至45岁，1984年七月至1994年七月。前五年伤官佩印，风光的机会来了，官衔满身，权大夹威，有钱有权有势，一呼百应，威名远扬，但其中两年有灾。命主叹息说：“时来铁成金，运去金成铁，此十年我高则上天堂，低则下地狱，荣厚相济，变幻莫测。”（此大限入甲子宫，火贪同行格，又有右弼天魁吉助，主横发，贪狼北斗星，前五年发达；但大限天干使太阳化忌入大限的田宅宫，即原命宫，主本身及家人易有刑灾）。

    - 1984年10月，被领导重用，任一家工厂厂长，另兼其他三职，直至89年，都是车水马龙，风光舒服。（小限天机，主工作调动；逢天哭、陀罗，天哭哭家人；又流年太阳化忌入小限的夫妻宫，故老婆有病）。

    - 1986年丧失一子。（小限入未宫，凶煞聚; 流年廉贞化忌冲动辰宫的七杀恶星，辰宫是小限的儿女宫，故主子女有凶灾，有丧子之痛）。

    - 1990年11月，因财问题被停职反省。（流年天同化忌冲动小限的财帛宫，该宫凶煞聚凑，逢冲则凶星必动而有灾厄，故主财经上出问题）。

    - 1992年二月案情查清出狱，官复原职。（流年天梁化禄入原命宫，故能出狱）。

    - 1993年调一家实业公司任总经理，此年亏损若干万元。（小限宫武曲星为商业财星，而此宫有天空，所以主财务亏损）。


    - 6、五运辛未，45至55岁，1994年七月至2004年七月。七杀运，命书说：“伤官用神怕行七杀运。”（以下用紫微斗数对本大限、流年小限进行综合讨论。本大限从46岁至55岁，1995年十一月初二日戌时至2004年十一月初二日酉时，行亥宫。大限盘为：亥为命宫，戍宫兄弟，西夫妻，申子女，未财帛，午疾厄，巳迁移，辰奴仆，卯事业，寅田宅，丑福德，子父母。大限天干求法：从命宫干卯起丁卯，逆布下来，丙寅，乙丑，甲子，癸亥，壬戌，辛酉，庚申……本大限天干为癸，四化星为：破军化禄，巨门化权，太阴化科，贪狼化忌。太阴入亥宫，名“月朗天门”，庙旺化科，无煞有吉，应为比较风光吉祥之限。太阴主财，化科主名，财名双美，多积私财；封诰、八座主升迁，天巫、天马名“天巫赶马”，升迁快；天马、八座在旧社会主坐轿之人，今天主坐轿车；太阴为女人星，加天姚，不是得女人助就是有酒色外遇；本宫有吊客，对宫有天哭，注意亲人伤灾。再看本宫三方四正情况，左方事业宫阳梁吉星高照，主事业蒸蒸日上;
    右方财帛宫破军化禄，但逢地劫，虽财务不错，暗耗也大；对官天机加陀罗天哭，出外为事业烦心。再看本限六亲情况：凤阁入主夫妻宫，为得宜，对面太阳正照，主事业不错，但本宫有蜚廉、白虎、正空星，注意伤病灾及暗耗，又逢解神，问题不大;
    大限子女宫在申,'
  - '[PAGE 58]


