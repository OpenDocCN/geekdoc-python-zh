    ## 第六节

    岁限的经验论断


    ### △一、斗分


    - 行限分南北斗，阳男阴女及南方生人以南斗星为福，重点看南斗星，遇南煞灾轻，遇北煞灾重；阴男阳女及北方生人以北斗星为福，重点看北斗星，遇北煞灾轻，遇南煞灾重。大限前五年以北斗星为主，后五年以南斗星为主，中天星十年均管。小限上半年以北斗星为主，下半年以南斗星为主，中天星一年均管。斗君上半月应北斗星，下半月应南斗星。


    ### △二、岁限经验论断注解


    - ◇“命实运坚，稻田得雨；命衰限弱，嫩草遭霜”：即命身宫好，岁限亦好，其福自然来。如命坐陷地，却有四面吉拱，亦为福论。又如命坐凶地，运逢恶煞，即为嫩草遭霜，必主灾晦。

    - “先富后贫，只为运逢劫煞”：如身命中正星庙旺又有吉拱，少年行吉限而发，行限至中晚年后逢空劫煞星又兼遇绝地，则先富后贫。

    - “运衰限衰喜紫微来解凶恶”：大小限不逢吉星，而身命有紫微守照，则限虽凶而平稳。

    - “吊客丧门，绿珠有坠楼之厄”：大小二限，遇前有丧门，后有吊客，及太岁逢凶星，必有惊险。（本宫凶才如是论，本宫吉无妨）。

    - “限至天罗地网，屈原溺水而亡”：二限行至辰戌二宫，逢武曲贪狼，更有太岁、丧吊、白虎、空劫、四煞，或逢其中之一冲照，其限最凶。（交运之初及至运尾之年见灾）。

    - “运遇空劫，则有贫困之苦”：二限遇劫空，虽吉多，亦财来财去，如见流年煞星凶曜，定主贫困。限运遇空劫大耗破碎均主损财败业。（如命宫吉，仅主此限年困阻，过此则好）。

    - “命空限空无吉凑，功名蹭蹬”：如命限均逢空劫四煞，其功名必不能就。或虽有正星吉化，逢空劫限年，亦主灯火辛勤，不得上达。

    - “石崇豪富，限行劫地而亡家”：大小二限临陷地又逢空劫，更逢流陀等，必破败。

    - “颜回夭折，文昌陷于天伤”：如丑生人，安命寅宫，逢文昌与天伤同陷于未宫。但必须流年又遇七杀及羊陀迭并之限，才如此判断。小限逢伤、使、流羊、化忌在对宫，是年必凶。

    - “巨门忌星都不吉，运身命限忌相逢。更兼太岁官符至，口舌是非决不空”：化忌、巨门二星为多管之神，十二宫、二限逢之，皆主不吉；巨门本非吉星，在陷地化吉也主不吉。太岁官符二星，本为兴讼之神，而巨门为是非之星，再加化忌同临，其官灾是非口舌必难免。

    - “吊客丧门又相逢，定教灾病两相攻”：吊客丧门二星，本主刑孝，但不逢七杀、羊陀，只是病灾而已。若是加逢七杀、羊陀、化忌，则死丧之事难免。

    - “官符夹刑杀于迁移，离乡遭配”：如流年官符与当生官符夹刑杀在迁移宫，又逢太岁小限到此，必遭贬配，离祖之论。


    ### 三、岁限的喜忌


    #### 1、生年支忌行的二限及流年：


    | 生年支→ | 子 | 丑 | 寅 | 卯 | 辰 | 巳 | 午 | 未 | 申 | 酉 | 戌 | 亥 |

    | :--- | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---:
    | :---: | :---: | :---: |

    | **所限忌及大流小年二** | 寅流申年限及午 | 丑限午及、未七流杀年 | 巳流亥年限及申 | 己流亥年限及酉 | 巳流辰年限及戌 | 巳流辰年限及亥
    | 丑限午及、子七流杀年 | 酉限亥及、丑擎流羊年 | 火流铃年限及寅 | 羊流陀年限及卯 | 羊限陀及、辰流成年 | 擎限羊及、巳陀流罗年 |


    **注：**以生年地支为准来查，逢之主灾悔、官非、孝服、失盗、破财、刑伤、死亡等，再逢三方四正及太岁诸凶煞，必招灾祸。例如子年生人，切忌大小二限入寅申宫及寅申流年，又忌逢午流年相冲，均灾晦至重。若官凶，且三方四正官遇煞，主大凶。


    #### 2、岁限喜行的宫度


    火局人喜行寅午巳，金局人喜巳酉申，木局人喜亥寅卯，水局人喜申子辰，土局人喜申未戌。（注：以上为大小限均为喜行之地，大小限入这些宫度则吉，但亦宜该宫得长生、帝旺、临官、冠带为得数；遇墓绝死衰病为反背，即使遇吉亦无用）。


    #### 3、限行反背：

    火行戌亥便为凶，金行丑寅须有害，木到申酉不相安，水土辰巳会有衰。（注：大小限俱逢反背之宫，且遇墓绝死衰病及众恶曜者，才应验。）


    金局遇子命须伤，木局逢午有祸殃，水遇丑寅应蹇滞，土局莫见卯辰巳，火上见酉祸来临，须防脓血及惊慌，即使吉星来照逢，也有官灾与是非。


    #### △四、限年的一些经验之谈


    1. 命身宫主星失陷（吉则无力，凶则更凶），又遇大耗恶煞守照，二限凶则呈凶象。再逢流年的流羊流陀或七杀重逢，已是凶多吉少；再加流年太岁的丧门吊客白虎临于命身及三方四正，更是雪上加霜；再见天伤天使同守或夹，可断其人有死亡的可能。大小二限、太岁重叠，或逢吉限与凶限交接之时，且太岁、小限俱凶者亦很凶。病符加凶煞星守照命身，二限临之，再加伤使同守或夹，亦凶。

    2. 生旺发来墓绝止，墓绝发来生旺终：命宫在生旺之宫，忌行墓绝之限年；命宫逢墓绝之宫，忌行生旺之限年。

    3. 天罗地网入火蛇（即火陀二星入辰戌宫），二限逢之祸患多，若是命中主星弱，须教魂魄见阎王。

    4. 倒限：二限太岁大耗宫（大小限太岁大耗同宫），更加禄倒必然凶（化禄或禄存逢败地遇空劫、截空、旬空、大耗等星守照为禄倒，不是暴败就是生命垂危；天马逢为马倒，同论）。

    5. 巨廉空劫火铃位，二限俱到不宜临，贪破廉杀多刑失，三方守照老童凶。


    **注：**巨、廉加空劫火铃，大小限具行到此宫，有刑伤之灾。'
  mdcn: '## 二地支宫和原命盘的星曜完全不动，只是人事十二宫的名称改变了。不过，也增加了大限的四化星。大限四化星在运限的分析中很重要，它们都是以大限宫的天干为准推导出来的，推法与原局的一样，只是生年干换成大限天干而已，参看排盘总表的天干四化表。


    排布出大限人事十二宫后，细查此十二宫位的星情及四化星落宫的吉凶，即可知道十年里本人各方面的人事情况及六亲的遭遇。限年十二宫所代表的基本类象和意义与原局相似，例如，命宫代表命主本人，兄弟宫代表兄弟姐妹，子女宫代表子女等。看限年事业及官运，主要看限年命宫和事业宫，吉则事业顺遂，凶则事业不利。看限年财运，主要看限年财帛宫，吉则财运好，凶则财运差；财运宜兼看福德宫，福德宫主思想行为，若逢财星并开创之星则主有加大投资的思想行为。


    看大限，星情法仍为普遍分析和具体内容分析的主要方法，与先天命的星情分析法一样，注意格局运用和四化引发。首先查看以下几节中专论星情组合行运部分的内容，就可以看出该大限内人事发展变化的主要内容、本人的心理状况；再参看宫内正星的庙旺失陷，以及三方四正的扶助情况，则本大限内的吉凶祸福即可基本掌握。如果大限宫内正星为吉星坐守，庙旺得地，无七煞同宫，主十年心情安静；再加三方及夹宫吉拱照会，组成好格局，更主十年吉庆，人财两美；若逢左右昌曲魁钺守照，原有官职的可升迁，平民可以发财有喜；若加七煞同守，三方也吉凶混杂，则十年阻滞，辛劳多败，但还不致于凶死。若大限宫内正星失陷，主十年平常；加煞主十年凶多吉少，三方煞凑大凶。若大限宫内正星为失陷的恶星或无主星，加七煞，必主这一大限内大凶；再遇恶煞聚凑的流年、小限，则官灾人祸、破败等凶灾就会发生在这一年内，甚则凶死。


    看大限吉凶的重点问题，是以四化星寻契机，紧紧围绕四化星分析吉凶事态，尤其是化忌和化禄的星宫进行跟踪（下编作详细论述）。这里有原局四化和大限四化星之分。原局四化星是以生年天干为依据，查天干四化表得出，对原局影响大，对限年影响较小，但当被限年四化冲叠时则对限年亦起作用，例如原局化禄逢限年化禄同宫，称叠禄，化禄的力量大增；若原化禄的星宫逢限年变为化忌，则表示由好变坏，逢限年化忌在对宫冲照亦同；原局化忌之星宫逢限年变为化禄，则表示由坏变好，逢限年化禄在对宫冲照亦同；原局化忌之星逢限年化忌，称叠忌，化忌的力量大增，逢限年化忌在对宫冲照，化忌的力量倍增。大限四化星则以大限宫的天干为依据，查天干四化表得出，对本大限影响大，对原局和流年影响较小，但当被流年四化冲叠时则对流年亦起加强作用，看法同上。限年的化禄与四柱的运年与原局合化成喜用神相似，化忌则与四柱的合化成忌神相似。


    以大限四化星来判断行运的吉凶，逢化禄、权、科均主吉，逢化忌主凶，应把重点放在大限化禄和化忌星上。如果大限宫逢流禄守照，不逢流忌，主十年吉利；若同时有流禄、流权、流科守照，主锦上添花。如大限宫逢流忌守照，则主十年不利。若化科、权与化忌同宫，则可减弱化忌的力量，主十年辛劳而平常。若禄忌同宫或对冲，则按双忌看，凶力加倍，主十年大凶，一般多先吉后凶。但看四化还要结合主星的庙陷及官的组合来看，逢主星庙旺无恶煞，化科、权、禄更吉，化忌及忌冲则不顺，主辛劳而成；若主星失陷或有恶煞，逢化科、权、禄亦主虚名，逢化忌则更凶，辛劳而无成，逢忌冲还主有凶灾。若本宫及三方全逢禄、权、科，均主十年大吉利，必升职发财，旺吉更利，衰及有煞辛劳而发。


    大限的焦点问题，着重是跟踪化忌星，首先以原局焦点宫为体，看大限化忌星是否重叠或冲原局焦点宫，若是则凶灾已基本定型，凶灾很可能会应于此十年内的某一年，但凶灾的程度则看流年的增凶程度。原局或限运组成格局，逢四化引发往往也是焦点所在。


    大限落何宫，宫的吉凶首先应于该宫的类神，即该宫名称所代表的人事定义，如大限落父母宫，若该宫好，表十年父母吉利，自己得父母的福荫；若父母宫凶，则父母十年不利，自己与父母关系不好，或得不到父母的福荫。又如，大限落事业宫，若该宫好，则十年事业发展顺利；若该宫凶，则十年事业不利。这就是“宫位定人事”的意思。紫微斗数重视“体”与“用”的关系。（体用的解释参看前面有关章节），“体”兆示大体、背景的信息，“用”显示详细、前景的信息。这里讲大限落原局宫的兆示，原局为“体”，故显示出“体”的信息，是大体的、背景的信息，“用”的兆示在那里？在大限的十二宫。


    在活用大限人事十二宫时，应以天盘十二宫原对应宫的吉凶为体为兆示，而以大限盘对应宫的吉凶为用为克应。例如，天盘中父母宫预示父母有凶灾，而凶灾发生于什么时候呢？则看岁限十二宫中的父母宫最凶的岁限，即为应期。又例如，大限化忌入天盘命宫，主运程凶险，这是“体”；凶来自何方？看天盘命宫变成大限的什么官，若变为大限的兄弟官，则凶险障碍来自同僚、兄弟的倾轧，这就是“用”的意义了。


    大限吉凶的应验时间还宜结合星曜斗分来看，北斗星的吉凶多应于前五年，南斗星的吉凶多应于后五年。这一点对于结合四柱命理分析尤其重要，因四柱大运和紫微大限的起始年龄一般差别较大，吉凶应验时间就可用斗分来调整。


    # ◎大限入十二宫人事吉凶简断


    这里就是上述“大限落何宫，宫的吉凶首先应于该宫的类神”的具体分析论述。


    未行大限前，以命宫和父母宫、小限宫一起研参。父母宫好，儿时易养，得父母福荫，生活不错；父母宫凶煞凑，儿时病多或父母照料不周，因父母不济而生活困难；更加命身宫凶且三方均有煞时则有夭折的危险。


    大限入命宫，亦为儿童时代，生活上亦宜参考父母宫。命宫好，生活开始好转，学业有成；该宫不好，凶煞聚，则生活困难，学业不好，伤残疾病，再见三方煞聚，更凶，甚则夭折。后靠看父母，前景看兄弟；父母是富贵之基，兄弟是成就之基。


    大限入兄弟宫，该宫好，主十年兄弟和睦，有助益，本人生活幸福，学业有成；该宫不好，主兄弟不睦，兄弟或本人生活、学业不好，身体不佳。应注意，以上看法，仅是表面的情况，本限内兄弟的具体情况，应以大限的兄弟宫为主来看，以下各宫断法亦同理。


    大限入夫妻宫，该宫好，主男得贤妻女嫁俊郎，夫妻和睦，本人及配偶事业有成，生活愉快；该宫不好，主婚姻难成，夫妻不睦，双方事业阻滞，生活困难，或双方病灾，生育困难等。


    大限入子女宫，该宫好，主十年子女及本人吉祥；该宫不好，主子女及本人阻滞、疾病灾咎，子女难教养。


    大限入财帛宫，该宫好，主十年财运亨通；该宫不好，主十年破败多端，求财艰难，为生活而奔波，疾病灾咎。


    大限入疾厄宫，该宫好，主十年平安吉祥；该宫不好，灾病重重，工作场地不良，公司（单位）不景气，诸凶煞聚，大凶，遇流年大凶之年应验。


    大限入迁移宫，该宫好，主十年外出顺遂吉利，或得贵人相助，事业具开创局面，经营获利，或主社会地位升高；该宫不好，出外不利，事业辛劳无成，疾病灾咎。


    大限入奴仆宫，该宫吉，得朋友部下之助而顺遂；该宫坏，朋友部下寡情薄义，常遇小人中伤损害，事业阻滞，疾病灾咎。


    大限入事业宫，该宫好，主十年事业发达，经营顺遂；该宫坏，主十年辛劳而事业阻滞，经营不利，多灾咎。命身宫吉，逢杀破狼之限，不论好坏都主开创更新，事业出现转机，不过，官吉者虽辛劳而大成，官凶者更辛劳而少成。


    - 大限入田宅宫，该宫好，可继承祖业，自置产业顺遂，居家平安吉祥；该宫凶，破祖败业，居家不宁，产业纠纷。

    - 大限入福德宫，该宫好，主十年福隆，思想开朗，享受高尚，或知足常乐，生活愉快。该宫不好，福薄德浅，孤僻寡合，忧虑重重，贪心不足，享受低俗，不良嗜好，疾病灾咎。

    - 大限入父母宫，该宫好，主十年父母及本身吉祥、有靠山、事业光明；该宫坏，主父母灾病、不和、离异，无靠山，并主本人有破相之灾和事业无光明。


    ## 第四节

    看流年


    - 流年，就是出生后农历每一年的干支，随农历年而变化，可看一年的吉凶情况。


    - 看流年有两个流派，一是以小限宫看，二是以流年支落宫看。大多流派只以流年支落宫的星情为主来看流年吉凶，不看小限宫。本人的灵感与实践经验发现：小限、流年宜综合起来看，小限看迹象，侧重内部因素，主要显示本人、体内的信息，如本人的疾病、灾厄、心态、行为之类，其次才是与本人的事业财运及家庭有关系；流年断实际，侧重外部因素，主要显示外部环境对自己的影响，如单位、家庭、家人的情况及与上司、家人的关系，因此而影响本人的事业、财运、婚姻、升迁、贬职、受罚、破财之类。例如，看流年，先看小限宫，若凶，已主本人当年不利；再看流年的流煞凶星和化忌星入小限宫否，若入，主更凶；再看太岁宫，若太岁宫又凶者，则主大凶，本人灾厄就难免了。


    - 流年的具体看法与大限的看法基本一样，可比照参考，也是把小限、流年落宫当作命宫再逆布人事十二宫，然后以星情及流年四化星相结合起来看该年本人及六亲的遭遇。须注意的是：小限是以出生的月日时为转折点，一般都跨两个日历年的，例如
    1990 年六月五日辰时出生，那么从出生之时至 1991 年六月五日辰时为一岁小限，至 1992 年六月五日辰时为二岁小限，其余类推。结果每一小限的吉凶就得参看两个太岁年，同一小限的两个太岁的吉凶就有可能不同。流年太岁法则不会跨年。


    - 看流年四化，一共有生年、大限、流年三组四化，较复杂。一般，流年只看大限和流年两组四化，不看生年四化，但当生年四化被限年四化冲会时则须注意其作用。四化的看法可参看大限四化的看法。


    - 小限、流年与大限一样，落于何宫，吉凶首先应于该宫对应原局的类神。（类神即为该宫的名称定义所代表的六亲及事项，如父母宫代表父母，子女宫代表子女，事业宫代表事业等）。所以，大小限所主之事与原盘宫的类神有关。


    流年的流星较多，其中有以流年天干为准查出的流昌、流曲、流羊、流陀、流火、流铃、流马及流年四化星；还有以流年地支为准查出的流年将前十二星，流年岁前十二星等。它们的意义和吉凶情况可参看诸星落十二宫参断一章。流星的吉凶应于谁人身上，以流星入小限的命、兄、妻、儿……等十二宫来断。若流星冲起原局的煞星，则力量彼此加强，推断流年即以此为变动的枢纽。


    流年的焦点问题，仍是着重跟踪化忌星，化忌星落宫和冲宫多有特殊的情况，表示命主对该宫的人事特别在意，但不一定凶，宫吉主有动作，宫凶主有凶变。流年化忌守照流年小限宫、大限宫和原局命宫均主当年有特殊之处。化忌的看法，小限法和流年太岁法稍有不同，小限法看化忌落宫，太岁法则看化忌冲宫。若大限化忌星重叠或冲原局焦点宫，流年化忌星亦重叠或冲原局焦点宫，十有八九为大凶。禄忌同宫或对冲，更激烈，吉者减吉，凶者更凶，化禄之星代表的人事仍吉，化忌之星代表的人事凶。大限化忌在流年的何宫位，则该宫位的意象所代表的人事往往成为该年发生的事的焦点。流年疾厄宫或其对宫恰为大限化忌所落之宫，所值之年易有大事发生。流年干化忌入大限命迁线或财福亦是寻特殊流年法。


    流年的吉凶看法要与命局和大限结合起来参看，必须以命局和大限的总趋势，尤其以大限的趋势下去推导。大限吉，流年吉，则更吉；大限吉，流年凶，本年不至大凶；大限凶，流年吉，本年不凶；大限凶，流年凶，本年大凶。流年小限凶者总会有灾，只不过灾大灾小而已。大限半吉半凶，小限流年凶者则一边倒，凶。小限宫不吉，流年太岁又不吉者，大凶。


    哪一年有光明？星的组合好的小限或流年，且流年小限的父疾线没有煞星侵犯而有吉星会，有光明，逢父疾线化吉更有光明。


    小限与太岁同宫，吉者更吉，凶者更凶。小限与大限同宫亦是。小限、大限、流年、太岁三者同宫，更是。太岁与生年支相冲之年有灾，与大小限支相冲亦不利。


    **太岁吉凶诀：**

    太岁之星不可当，守临官限要推详，若无吉星来相扶，未免官灾人祸来。


    看太岁星，宜看落宫及看三方四正的吉凶情况来定祸福。太岁入命宫者，祸福尤为要紧，逢吉更吉，逢凶则更凶。


    小限和流年吉凶的应验时间还宜结合星曜斗分来看，北斗星的吉凶多应于上半年，南斗星的吉凶多应于下半年。


    斗君主要用来推断流月的，由于一年之计在于正月，所以斗君亦用来看一年之吉凶（本人不主张用斗君来看流年吉凶，要用也只宜用来参考），该宫吉则吉，遇凶则凶；该宫凶而大小限、太岁吉，也主当年有得失；该宫凶而大小限、太岁又凶，则其年灾病官非难免，甚则夭折。


    # 第五节 流月、流日、流时的看法


    推演流月、流日、流时，是更详细的分析方法，可以分析出人生各个时间的细节，比如何月日时水管漏水、理发、电话不通、遇桃花、电器出故障等等，有时间可以玩玩。我们主要是从吉凶两方面来讨论的，一般分析到流年没有什么大问题就不必分析流月流日流时了，如果流年为大凶之年，则要继续分析流月流日流时，来确切知道凶祸发生的详细时间，以便采取措施进行趋避。


    流月、流日、流时盘，不必排入命盘图中，但可注明生年斗君在某宫，以便心算逐年斗君和流月。


    流月、流日、流时的分析方法与大限小限的分析方法一样，可参照之。


    看四化，本生的四化，不管大限、小限、流年、流月、流日逢到皆有影响；大限的四化对于流年之影响较大，对流月、流日、流时则较小；流年天干四化主要是对流年、流月、流日有影响；流月四化主要是对月及日有影响；流日四化，只对流日及流时有影响。


    凡流禄飞入原局、大限、流年、流月、流日、流时诸命宫的，其福加倍；凡流忌飞入前述诸命宫的，其凶亦加倍；流忌迭见，即原命宫化忌，大小限及流年、流月、流日、流时的化忌星有重叠于某一宫的情况者，大凶，重叠得越多则越凶。


    流年、流月、流日、流时的四化星均以天文历书中的年月日时天干为准。


    ◎下面介绍推算流月流日流时及流星的方法：


    流月、流日、流时盘，不必排入命盘图中，但可注明生年斗君在某宫，以便心算逐年斗君和流月。


    # 1、定斗君及流月


    斗君即是流月的正月。因是以各人的生月和生时为准来推出的，所以各人的斗君不同，且每年不同。


    **△起斗君的规则：**

    以流年的太岁（即流年地支，生年斗君以生年地支）所在宫起正月，逆数到出生月宫上，再以该宫起子时，顺数到出生时辰止，即在此宫安斗君。


    生年斗君定出后，以后逐年斗君可顺盘而推，一年一宫。


    **△起流月的规则：**

    以斗君宫起正月，其余各流月顺盘而布，一月一宫。


    # 2、定流日：

    以流月所在的宫起初一，顺行十二宫，一日一宫，到月底最后一天止。


    # 3、定流时：

    在流日所在的宫上起子时，顺布十二宫，每一个时辰占一宫。


    # 4、流星的推算方法如下


    - 根据大限、流年、流月、流日、流时来推查流星。其中流魁、流钺、流禄、流羊、流陀、及流化星，均可依大限、流年、流月、流日、流时的天干为准来推查，查法和原命盘推查方法一样。流鸾、流喜则以流支为准来推查。流年将前十二星及流年岁前十二星的查法可参看《紫微斗数排盘方法步骤总表》之表
    29、表 30，将生年支换成流年支即可。流昌流曲的推查方法与原命盘推查方法不同，原命盘的文昌文曲是以生年地支为准来推查的，流昌流曲则以流年天干为准来推查，推查方法见下表。


    | 流年天干 | 甲 | 乙 | 丙 | 丁 | 戊 | 己 | 庚 | 辛 | 壬 | 癸 |

    | :--- | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---:
    | :---: |

    | **流年文昌** | 巳 | 午 | 申 | 酉 | 申 | 酉 | 亥 | 子 | 寅 | 卯 |

    | **流年文曲** | 酉 | 申 | 午 | 巳 | 午 | 巳 | 卯 | 寅 | 子 | 亥 |


    - 流年三煞，即劫煞、灾煞、岁煞，其危害性较大。三煞的查法以流年支为条件查下表。


    | 流年支 | 寅午戌 | 申子辰 | 巳酉丑 | 亥卯未 |

