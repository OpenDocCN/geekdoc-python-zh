    ## 续言


    上篇论述了紫微斗数的基础知识，排盘方法，以及基本的也是主要的论断方法，即南派星情论断法。下篇将继续完成星情法的限运分析法，并深入讨论紫微斗数的其他论断方法，主要有八卦卦位论断法和北派四化论断法，以及活用紫微斗数来预测日常生活中的人事物的方法。


    紫微斗数论命，门派众多，方法各异，其中主要的派别有南派和北派。南派重星情，北派重四化。如能将南北两派及诸法结合起来进行分析论断，取各家之长，补各家之短，将是比较完善的方法。诸法结合论命，总宜以南派星情法为主，河洛四化法和其他方法为辅。以星情法论命运高低、断大事，看迹象，即存在的因缘；以四化法断契机，看引动、看发用、看结果，追踪事物发生的来龙去脉；以卦位法断人事和时空，立体交叉地进行分析论断。


    在星情法中，有以小限和流年并重者，以小限为内看迹象，流年为外断表象。而在河洛法、奇门卦位法及活测中，是不用小限的，只用流年。


    紫微斗数原是用于命理的，近人发明用于预测日常生活中的百事万物和择吉，续集归纳整理了一些预测方法的和经验，作为抛砖引玉，供同好们研参。


    活用预测法测近期命运，由于求测者此时的运气已包含了其人的先后天因素、环境、风水、修炼、积德等，充分反映了命主近期体内综合五行气场的实际情况，故在某些方面比用出生时间预测还要准确，而且能解决出生时辰不准的问题。


    有人问：命理与风水谁重要？“一命二运三婚配四风水五姓名”。人出生后以命理为重，未出生的子孙后代的兴衰以风水为重，尤其是第三代。为什么命理和风水都能断准？这是两者均按天命定数同步运行之故。命运、风水、姓名、形相等，一切都会顺应命运的既定程序安排，好命者自然地住进好宅、起得好名、吉相，命差者鬼使神差地住进坏宅、起得坏名、凶相，正所谓“福地福人居，凶地贱人住”，就是此理。


    既然命运天定，何必要算命、看风水？人的命运是客观规律，要彻底改变确实很难，但我们可以掌握客观规律为人类服务。在知命，即掌握了命运规律的前提下，充分发挥人生最辉煌的阶段，更好地把握人生机遇，避开人生中不利的时空和因素，选择有利的时空和因素去做有利的、有益的事情，获取命中注定的最高限额，尽最大可能改变和改善命运的目的。风水调整可在一定的范围内调整和改善命运，使好命者更好，差命者得到改善，趋吉避凶，而且还可以福荫子孙后代。


    易经学提倡：“知命而不忧”，泰然自得地生活，从实际出发，不要强求富贵，只要心中常怀知足常乐的胸怀，克己奉公，勤俭节约，艰苦奋斗，行善积德，必然有幸福愉快的一生的。古人说：“尽人事以听天命”，就是说，只要我们在尽了自己最大的努力以后，仍然办不到的时候才可以听天由命。命与力的关系就如内因和外因的关系，正所谓“命是必然之份，非力不成；力是进取之源，非命不就”。故不能认为命好就可以不劳而获、坐享其成，命不好就灰心丧气、放弃进取。


    世人若能以“了凡四训”作典范，立志敬奉佛道，决心改正过失，发愿扬善积德，就能适当地改变命运，福荫在生之年、来生以及子孙后代。一个人的命运、身心疾病，无非是阴阳五行之气起的作用，如果我们能经常行善积德，敬老扶弱，爱惜物命，舍己为人，敬礼佛道，修炼气功，修持佛道法门，就可以使自身体内的阴阳五行之气常处于平衡状态，从而少病灾，甚至无病无灾，好运随之常伴，正所谓“积善之家必有余庆”。从事命理者，更宜修功积德，敬礼佛道，修炼气功，这样既可维持自身阴阳五行的平衡，又可提高身体素质，提高智慧，增强灵感，从而提高预测的准确率。若要为人解灾，更需要有一定的功德和功力，否则害人害己。


    有人说，易道之术须要师传，靠书本难以成道。此说言难不假，唯难不等于一点希望都没有，只要勤学苦练，再加上活学活用、开悟，就算成不了“天仙”，做个“地仙”还是有可能的；再退一步，不能成师，为自己及亲友进行一些命运改良工作，总会有一些益处的。邵伟华、张志春二位易师，主要就是靠书本自学成才的。呵呵，师传？真师在哪里？明师只可遇而不可求，缘也。一般之师父，往往比较保守，且多为经验之传，知识较单一，缺乏全面性。现在的高价师确实不少啊！如果你钱多的话，可以去打打水漂。我在气功大潮期间也曾拜师学艺，减肥瘦了上万斤，梦中成了师，不过还好，得了师父们的“真诀”：“自己多去悟吧”。往往师传难尽，书言难尽，靠各人的悟性，故悟性确实很重要，且各人的悟性是不尽相同的，命理也。我对命理及奇门有兴趣和悟性，对地理就没有兴趣和悟性。悟性随时都可能突然出现，自己要把握好。我编这本书几年了，不时会涌现一些新观念，有时走路、吃饭、看别的书突然悟通某个道理，甚至睡梦中都会有所觉，马上笔记下来，不断添枝加叶。据报导，不少科学家也有梦中得诀的现象。现时读书困难更大，旧书古文难理解，新书水份极大，要有大海捞针的精神，一点一滴地积累，大浪淘砂，淘出真金来。


    我的做人准则和期望是：以本派为主，按自己的灵感去觉悟，容纳百家，去其糟粕，取其精华，为我所用，荟萃精成，指引后学，造福子孙。


    由于本人学识和悟性有限，疏误之处、甚至糟粕在所难免，诚望有识之士鉴正。


    桂桂木木乡士：大德山人

    乙酉中秋善稿


    ## 第十章 后天运势——岁限的分析推断


    利用本章的内容来进行分析推演，即可完成命运动态部分的批断。


    ### 第一节 命局、大限、小限流年的关系


    命和运是一个整体，但各自又有所主与不同的特点。“命”是先天及内部因素，是人的灵魂、身体，是人的命运的主体骨架、主要成份。“命”的格局高低注定了一个人一生承受富贵福寿能力所达到的最高限额。“运”则是外部因素、后天环境影响力，是人适应时空场能变化的能力，在各个时空场点上活动与运用的历程，以及后天努力的结果，“运”的发展变化也可以影响“命”的结局。内因起主要作用，内因通过外因而起作用。“命”是主要因素，“命”通过“运”起作用，所以“命”和“运”都很重要，共同组成人生命运的曲线。例如，原命局凶星多或主星失陷，出身贫穷，逢限运化吉或吉星来合，多有突发的成就，好运过后仍为奔波失意；反之，原命局吉多星旺，出身富贵，逢限运恶煞化忌来冲，亦会突然失意落魄，唯恶运过后则能恢复元气。又如，原局有官的命，大运扶助则有官当，若一生不得运，也是不能当官的，最多不致太贫贱罢了；原局无官的格局，大运扶助也难有官当，最多事业较顺而已。


    在天垂象，在地成形，在人成事。天盘如天，大限盘如地，流年盘如人。命是天定的，原命格局的高低，注定一生富贵贫贱寿夭的大势，即定数，是静态部分。岁限则是人生各个阶段在定数基础上的上下浮动变化情况，即应数，属动态部分。原命盘的宫星反映人事的本质，运限只反映人生的际遇，限运宫星不起本质、本性（性情）的作用，在短期内不可能达到，但能显现原有象意的作用，星曜的化气和象意特色仍起作用；例如，紫微本质为皇帝星，须百官朝拱，限运则无皇帝的本质，可以不必百官朝拱，但仍有高格调、首、头和才能等特色，逢百官朝拱更为有利；又如天机的本性主聪明，须要科文星来拱，在限运中则不能主聪明，并不一定须要科文星拱，在短期内难以达到聪明，但机变、变动、谋划和依附权势的特色仍然存在，逢科文吉星亦对运程有利。限运宫星的性质为在先天盘宫星本质基础上的发展变化和反应，看其对本质的影响如何？是否为本质所喜还是所忌，若为本质所喜则增强本质的作用，人事向好方向展；若为本质所忌则减弱本质的作用，人事向坏方向发展。命盘宫星的本质不同，行运的喜忌也不同，则限年的克应也不同。因此，岁限的分折是不能脱离命局的，仍应以命局为主线、为定数。例如，原命局显示其人无官，大小限最好也只表示比较顺遂而已，不可能升官，即使升官也不大，尤如鱼虾入大海任其畅游，但不可能变成龙一样。而什么时候升官发财？什么时候灾殃？则必须由大限、流年小限来确定。大限是个转折点，是至关重要的一环，它起到承上传下的作用，富贵吉凶已基本定型，就看应于本大限十年中哪一年了。例如论凶灾，首先看原命局的重病焦点宫，存在哪些灾厄的隐患、祸根；再看大限的发展情况，若增凶则增加了发生灾厄的份量，灾厄已经怀胎成形，即基本定局，就看哪一年发生了；再看这大限十年中哪一个流年小限宫和流年宫凶，以定灾厄发生的年份；接下来再分析流月、流日、流时。


    - 原命局管人一生的大局，大限管人十年的遭遇，小限、流年管一年的祸福。与四柱命理比较，斗数的大限大约相当于四柱的大运，但起运限的岁数多有差别；小限、流年大约相当于四柱的小运、流年。


    - 我们把人一生分为三个时期，即少年、中年、老年三大时期，称为时期运。人的生活、事业、灾厄随着少年、中年、老年三个不同时期的变化，会有截然不同的发展规律。少年时期，正是长身体和学习时期，身体应变能力较差，生活上还必须依赖父母家庭。中年时期，身体发育成熟，应变能力强，是自立成家、发展事业的大好时机。老年时期，是退休享福而逐渐衰老、身体毛病越来越多的时期。少、中、老三期的年龄划分，从现代情况考虑，少年运从出生至
    20 岁，中年运从 21 岁至 55 岁，老年运从 55 岁起至死亡。三期各有所主的官度，少年期吉凶以命宫为主，生活以父母宫为主，流年注重父母宫；中期以命宫为主，参看财官迁官，限年注重财官迁官；老年期以德福德宫为主，兼看命、身、疾厄宫，晚年注重疾厄宫。看所主官度的星情好坏以定各个时期的命运吉凶，所主官度好者则吉，主宫坏者则凶。注意：这三个时期的吉凶祸福还只是模糊的预兆，而且仅作辅助参考，发生与否主要由大限、流年来决定。


    - 一个人的吉运，是喜庆的，对人的身心虽有影响，但毕竟比起灾祸，尤其是伤残死亡的影响来说，那是截然不同的，伤死的悲痛是刻骨铭心。所以，在论限运吉凶时，以灾厄为重，以便在灾祸来临之前预防，趋吉避凶。论限运吉凶，应从命局开始，再到大限、流年小限、流月、流日、流时，逐级进行分析论断；大限对命局发生作用，小限、流年对大限发生作用，而不是命局对大限作用，大限对小限流年作用，流月、流日、流时同理。


    - 限年分析与与原局一样，也讲格局和四化引发，论星情也以主星为主为树干，辅星小星为辅为枝叶。但在看限年动盘中，尤其流年，不可低估小星一的作用，它们甚至可以影响和左右大星的作用。在论凶祸灾厄时，很重视小星及四化星、流星的吉凶论断，若遇六煞星及阴煞、劫煞、大耗、蜚廉、天伤、天使、天哭、天虚、丧吊、白虎、化忌等凶星，必显示其凶性，易发生官非、伤病、死丧等凶灾。例如，大限流年逢化科、文昌、化禄（或禄存）会集，考试本应高中，但却又逢咸池、大耗同守，是年会因有桃花星的作用，会迷入情海或谈恋爱而影响学习，结果考试落榜。


    论限运吉凶，北斗星作用较早，南斗星作用较晚。大限中，北斗星应于前 5 年，南斗星应于后 5 年。小限流年中，北斗星应于上半年，南斗星应于下半年。流月日时同理。

    限运逢杀破狼，多有特殊之转机，事情或急成急败，或发展变化大。限运逢化禄加会四煞，事情会急速成功，叠禄更是。限运逢化忌加会六煞，事情会急剧破败，叠忌更是。


    命局、大限、小限流年吉凶的关系，一般情况下有如下关系：

    命局吉，大限吉，流年吉，是年大吉；命局吉，大限吉，流年凶，是年平运；

    命局吉，大限凶，流年吉，是年小吉；命局吉，大限凶，流年凶，是年凶；

    命局凶，大限吉，流年吉，是年吉；命局凶，大限吉，流年凶，是年小凶；

    命局凶，大限凶，流年吉，是年平运；命局凶，大限凶，流年凶，是年大凶。


    特殊情况下，大限吉流年凶而应凶甚至大凶，大限凶流年吉而应吉甚至大吉，那是福荫、积恶、扬善、风水影响或环境时局改变所致，研命者不可不知。


    ### 第二节 大限天干的求法


    大限天干与原局天干有些不同，焦点在子丑寅卯四宫内，尤以寅宫为转折点。原因是，流年与流月是按规律向前推进的，而天盘天干在寅宫的左右宫度与流年流月向前的规则不符。例如蒋介石的命盘，大限逆布，命宫甲辰，逆上为癸卯，再逆上为壬寅，相当于正月，再逆上一限相当于上一年的十二月份，理应为逆行的辛丑，而天盘丑宫的天干为癸，亦为前进了，所以不符。再逆上到子宫，相当于上一年的十一月，理应为庚子才对。其余类推。

    大限天干求法规则：以天盘命宫天干打头，依天干的固有次序，阳男阴女顺布十二宫，阴男阳女逆布十二官。

