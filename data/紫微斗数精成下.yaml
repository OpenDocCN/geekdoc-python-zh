  md: '# ### △四、四化飞星法


    以上述几种方法起出紫微盘，然后以各种方法飞四化进行论断。例如，流年干飞四化论其人一年的运气，流月干飞四化论一月之运气，以流日干飞四化论其今日的情况，以流时干飞四化看其人现时干什么。年月四化为过去之事，日时四化为现在和将来之事。


    以日干化忌落宫可以用来预测“来人不用问”，即不用来人报出测什么，而可以知其来意，不过还要参考时干化忌落宫，因有大约有 10% 的来意是时干化忌所在宫。


    还可以按报数飞四化，即把数字与天干序数相对应的天干（例如 1 数为甲，2 数为乙，3 数为丙等，大于 10 要除以 10，以余数取天干）飞四化。


