    ◎下面再看《开馆人紫微斗数》中的一例，是从化忌的宫位来看的，命盘如下例二：


    命宫在子，巨门坐守，命宫干甲使官禄宫之太阳化忌冲夫妻，夫妻为死亡点，易失业、倒店，或常换工作。以冲宫为第六位，依一六共宗的理论，顺数至第六宫（即田宅宫）为第一位，冲六则一亡；田宅为财库，财库的疾厄（夫妻宫）受冲，表破库。凡命财官官化忌冲夫妻，多表失业、倒店或工作青黄不接。


