    1、论终生事业情况


    以官禄宫为本宫，财帛宫为官禄的气数位，所以，可以财帛宫干的四化来论事业的成败得失。


    若财帛宫干化禄入兄友线，因兄友线是官禄的父疾线，因而一生前途光明，名气自然而然；若化权入兄友线，须经奋斗才能得名气，有成就（若化权入奴仆，表努力工作可以有成就名誉，但若财帛宫干又化忌入兄弟冲奴仆，则表求争来的名誉成就，到头来还是会失去）；若化科入兄友线，会得贵人提携而成功；若化忌入兄友线，则前选暗淡，无名气，不宜走求名路线，即不宜从政，只宜技艺或经商。若财帛宫化三吉入兄友线，而化忌也入兄友线，则表开始得到名气成就，但到头来还是会失去，禄忌同官更凶。


    若财帛宫干化三吉入子田线，因子田线是官禄的兄友线，主走经商路线，或在金融财经界工作，较有发财机遇。其中化禄主不费力气，化权主拼搏而得，化科主得人助。若化忌入子田线，则事业阻力大，不宜经商，只宜上班及技艺工作。'
