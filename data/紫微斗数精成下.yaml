    1，顺数到本命财帛宫，所得数即为 0 的个数。将 (2) 的 0 个数加到 (1) 的数目右边，即得钱财总数。


    例如，大田为阳巨，阳属火 6 局，巨属水 2 局，相克用减法，6-2=4，则最左边之数目为 4；大限斗君为 1，顺数到本命财帛宫为 5，则本限财数为 400000
    元。


