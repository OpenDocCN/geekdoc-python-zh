    # - △七、四化之间的关系


    - 四个化星在命局中是同时存在于命盘的，它们有可能碰撞在一起，形成不同的组合，因而其表意和吉凶就有不同。四化分级有：生年干四化，命盘十二宫干四化，大限十二官四化，流年、流月、流日、流时十二宫干四化。其中命盘、限运十二宫干的四化又各分为十二组。同级且同一宫干的四化为同一组，生年四化只有同一级和一组。


    - 同级官干的四化虽不能相混而论，但可以论相互之间的影响。


    - 1、同一官干四化（即同一组四化）之间的组合有以下几种：


    - (1)、双星同宫或对官的组合：禄权：为合好，表财利发达、丰厚，名利双收（利大于名，会赚钱）。


    - 禄科：为合好，表有才干，功名显扬（名大于利），成名后获利，财利较平稳。


    - 禄忌：为合凶，变化大，时好时坏，作双化忌论，忌的力量倍增。禄忌对冲（即在对官）亦作双忌论，而且较禄忌同宫更凶。


    - 权科：为合好，表有专业技能，名利易得，且刚柔相济，不会有化权的刚愎自用。


    - 权忌：火耗水，能解忌，用强硬手段来化解忌的力量，为死饼，故较辛劳，不安定，为人好争、不讲理，做事有虎头蛇尾之嫌，发生事情较快，成败不定，看官的吉凶。


    - 科忌：木泄水气，能解忌，以文力来化解忌的力量，故解忌较和平，不能全部化解。事情发展较缓慢，拖拖拉拉，须经一翻磨练后才能获得成功，不宜贪利急进猛进。


    - (2)、三星同宫或对官的组合：禄权科：为合好，为富贵格局。


