    四化论进财，禄是源源不断、一笔接一笔，钱财调度容易。权是一大（整）毕，如工薪，一个月发一次，比较有控制；科是贵人财，缺钱时会有人送来，赚的不多，但比较平顺，比较有计划性；忌是失去，被迫花费。


    论财运，因各种人赚钱方式不同，故要综合看命运、事业、财运三方面的情况来论断。


