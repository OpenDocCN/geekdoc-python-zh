  md: "- 生年干四化是命带来的，天赋的，与祖荫有关。命盘十二宫\n- 于四化的影响来自后天，是后天行为，与后天因素有关。命官于\n- 四化，发生的事情是自己造成的，由个人意志行为而引发。命宫\n\
    - 四化看心态行为，官禄宫四化审吉凶祸福。\n- \n- 十二宫干飞四化，发生什么事情？要看是化三吉还是化忌，\n- 若为化三吉，发生的事情与化入或照之宫的名称和星情有关；若\n\
    - 为化忌，发生的事情与对冲之官的名称和星情有关。发生事情的\n- 原因必与飞四化之宫的名称和星情有关，化忌时还与化忌人的官\n- 星有关。例如，田宅宫干丁使巨门在疾厄化忌冲父母，发生的家\n\
    - 事情必与父母宫有关，父母宫表父母、名誉、文书契约；田宅表家\n- 人、家庭、房地产，巨门表是非、阴暗不明，发生事情和原因就\n- 有多个方面，一个可能是家庭是非而引起父母生事，另一个是因\n\
    - 房地产（是非纠纷或不明不白）引起文书契约纠纷、名誉受损、官\n- 司诉讼等(具体原因看田宅宫星情，发生的具体事情看父母宫星\n- 情来定)。\n- \n\
    - 命宫为“我”，其余各宫为“他”。命宫四化入他宫，为\n- “我”与“他人它事”的关系，表“我”将对“他人它事”怎么\n- 样；例如，命官化禄入六亲宫，表我对他情浓，与他缘厚；命宫\n\
    - 化忌入他宫，表我欠他的债，生硬的去关心他，反生是非；命宫\n- 化忌冲某宫，表我冲他，我跟他无缘。他官飞四化入我宫（包括\n- 三方四正宫），为“他”与“我”的关系，表“他”将怎么样对\n\
    - 待“我”；例如，他官化禄入我宫，表他对我有情缘；他官化忌\n- 冲我，表他使我受拖累。他官四化不入我宫（包括三方四正\n- 宫），与我关系不大、不重要。\n\
