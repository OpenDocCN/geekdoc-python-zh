  md: '到功名，发誓要做三千件的善事，来赎罪和报答上天给我的果报。禅师听我立誓要做

    三千件的善事，就拿来一本‘功过格’给我，叫我把每天所做的事情都记在功过格上，

    善事就记在功格上面，恶事就记在过格下面。如果做了恶事，还要把已经记的功来减

    除。


    禅师还教我念准提咒，期望我所求的事会有效验。你现在还不能做到不动心念的

    境界，只要坚持念准提咒，不必用心去记数，一直念下去，不要间断，念到极熟的时

    候，自然就会口里在念，自己不觉得在念，这叫做持中不持；在不念的时候，心里不

    觉的仍在念，这叫做不持中持；念咒能念到这样，那就把我、咒、念打成一片了，自

    然不会有杂念进来，那时念的咒就灵验了。


    我起初的号叫学海，自从那一天起就改号叫了凡。因为我明白‘了’立命的道

    理，不愿意再做‘凡’夫了。


    从此以后，就整天小心谨慎，约束自己的言行，与从前大不相同。从前尽是糊

    涂随便地放任，现在，自然有一种战战兢兢戒慎恭敬的景象。虽然在暗室无人的地方，

    也常恐怕得罪天地鬼神。碰到憎恨和毁谤我的，也能够安然的接受，不再与人计较争

    论了。


    第二年到礼部去考科举，孔先生算我应该考中第三名，忽然考中了第一名，孔先

    生的预测就不灵验了；到了秋天考试，我竟然考中了举人，这些都不是我命里注定的。

    云谷禅师说：命运是可以改造的。这话我更加地相信了。


    我虽然把过失改了许多，但自己检点反省，觉得过失仍然很多。例如看见善，

    虽然肯做，但还不能勇敢地去做；遇到救人时，心里面常犹豫不决；或虽然勉强做善

    事，而常说过失的话；或在清醒时能把持住自己，而在酒醉后就放任了。拿功来抵过，

    还不够虔诚，常是虚度光阴。从己巳年开始发愿，直到己卯年，经过十多年，才把三

    千件善事做完。至此，我又发起求子的心愿，也许了行三千件善事的大愿。到辛巳年，

    生了你，取名叫天启。


    我每做了一件善事，随时都用笔记下来。你母亲不会写字，每做一件善事，都

    用鹅毛管印一个红圈在日历上。或是送食物给穷人，或买动物放生，都要记圈。有时

    一天多到十几个红圈呢！


    到了癸未年的八月，三千条善事的愿已经做满。九月十三日，再发起求中进士

    的愿，许行一万条善事的大愿。到了丙戌年，我居然中了进士，授宝坻县县长。我准

    备一本有空格的小册子，名叫‘治心篇’，放在办公桌上。每天所做的善事恶事，虽

    然极小，也都记在治心篇上。到了晚上，在庭院中摆上桌子，焚香祷告上天。你母亲

    见我所做的善事不多，就皱着眉头对我说：从前我在家里帮你做善事，所以三千件善

    事能够做完。现在你许了做一万件善事的心愿，可衙门里无善事可做，要等到什么时

    候才能做完呢？


    我晚上做了一个梦，看到一位神人，我告诉他善事难完成的原因。天神说：‘只

    是你当县长减钱粮这件事，一万件善事就已经算圆满了。’原来宝坻县的田，每亩本

    来要纳粮两分三厘七毫，我把它减至一分四厘七毫。我觉得奇怪，这事天神怎么知道？

    并且，只这一件事情怎么就可以抵得了一万件善事呢？那时候恰好幻余禅师从五台山

    来，我就把这梦告诉他，并问这件事可以相信吗？幻余禅师说：做善事只要存心真诚

    恳切，虽只有一件善事，就可抵得过一万件善事了。况且你减轻全县的钱粮，万民受

    惠获福啊！


    我听了禅师的话，就立刻把我所得的薪水捐出来，请禅师在五台山替我斋僧一

    万人，并把斋僧的功德代为回向。'
