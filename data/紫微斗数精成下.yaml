    加吉曜逢庙地，贵极一品辅山河；天梁守限寿延长，作事求谋大吉昌；若遇火铃羊陀会，须防疾厄与人亡。


    # ☆13、七杀星之年，会发生与工作、健康、伤害等有关的事情。不能安居家中，常会出外，事业易变动；容易激动，易有纷争，无论做什么事都困难重重，求谋难遂。遇紫府禄存守照则吉，若无制则遭殃，更遇恶煞，定有官司疾病横祸。事情发展急成急败。


    庙旺有创劲，加吉，会有意外的好运，一举成名，地位高升。弱地或加煞，百事不称心，事情反复失败，病患多年的人将会有凶险，易有突发性的灾祸。逢四煞、截空、空劫、白虎、天魁等煞星聚凑，易有大凶灾，甚则死亡。


    > ◇“羊陀七杀，限运莫逢”：七杀与失陷的羊陀火铃同宫，或与劫空伤使同宫，才以大凶论，有死亡的危险。若羊陀庙旺，反主闹中有成（即辛劳后取得成就）。流年逢“七杀流羊遇官符，离乡遭配”
    “七杀羊铃，流年白虎，刑戮灾迍”会降调，犯错误远调，甚至犯刑劳改。


    > ◇最凶是“七杀守照限逢擎羊，午年生人安卯酉宫，主凶亡”，是谓“羊陀迭併”。


