  mdcn: '## 第十六章 略谈趋吉避凶及解灾


    ### 第一节 改运及趋吉避凶


    改运、趋吉避凶，是圣人制易的主要目的。人的命运是固有规律，是不易改变的，但是，我们可在知命的前提下，充分利用有利的因素，避开不利因素，利用不同的时空点和外部环境来改变宇宙影响力，从而达到趋吉避凶的目的。


    改运、趋吉避凶，所指范围比较大，可指一生的命运改良工作，也可指在预测出有灾难后的趋吉避凶（解凶）方法。


    人的命运、灾疾，无非是天地阴阳五行之气，即宙宇力作用的结果。所以，改运和趋吉避凶就必须从时空、阴阳五行上入手，才是正理。


    时间和空间都包含着阴阳五行的气场，时空改变了，阴阳五行的气场也随之改变。某时某地对我不利，可以选有利的时间到有利的地方去，以达到趋吉避凶的目的。


    环境里面也包含着阴阳五行的气场，环境不同，阴阳五行的气场就不同；环境改变了，阴阳五行的气场也就改变了。动物和人都有适宜的生存环境，如果环境良好、适宜，则生活安然，灾患少，繁衍不息；如果环境恶劣、不适宜，就要生病、灾难，甚至死亡灭种。人适应环境的能力比动物强，但各个人的适应能力是不尽相同的，原因就是各人的命理结构不同，身体素质不同，接受宙宇力作用的能力不同所致。


    人的性格、精神面貌和人生观的不同，对体内阴阳五行的平衡起到很大的作用，足以影响命运。若能改善性情，一生乐观、知足常乐、不做坏事、心安理得、行善积德、敬礼佛道者，体内的阴阳五行之气常趋于稳定平衡状态，从而少灾少病，健康长寿，改善命运。如果一生喜怒无常、悲观愁苦、常做坏事而常常处于惊恐忧怕状态，体内阴阳五行之气常趋于不平衡状态，从而造成多灾、多病、短寿。大多数癌症患者一旦知道自己得了癌症就精神崩溃而很快死亡，有少数患者仍能泰然自若地生活、治疗而生存下来，就是此理。


    因此，要进行改运和趋吉避凶，就要从树立正确的人生观和选择适宜的时空生存环境两个主要方面来多加考虑。


    正确的人生观，包括知命而不忧，正正当当做入，泰然处事，从实际出发，富贵不能淫，乐善好施，扶贫济弱，不能富贵者不要强求，乐天知命，知足常乐，多做好事，不做坏事，从而达到心理平衡，自然会有幸福愉快的一生。正所谓“好人自有好报”，“积善之家，常有余庆，积恶之家，常有余殃”。这是人人适用的趋吉避凶的常规方法。


    适宜的生存环境，包括选择适宜的居住地、方位、床位、衣食、工作、职业、颜色等等。生态环境的好坏，还与时间有关，在不同的时间里，某一空间气场较为有利，这就是择吉学和风水学的范畴，在改换环境时宜多加注意。


    下面结合紫微命理谈谈改运和趋吉避凶：


    1. 紫微斗数中，每一个星曜都有其利与弊方面，若能善于利用有利方面，则可趋吉避凶，逢凶化吉。例如，空劫为凶星，其最凶处是不利投资求财、直接经商，最利处是头脑特灵，创造性强，所以，命或限运逢空劫，可以搞创作、开发新产品、搞科技艺术等；其次命逢空劫，幻想太多，若能逆之，信奉佛道，静心少虑，则可能化解而长寿。

    2. 根据“事业的看法”一节的内容，选择适合自己的职业工作。

    3. 选择合适的配偶，对改善家庭的气场起到很大的作用，宜慎重对待。一个人婚前多与父母同居，家庭和个人的气场暂时处于先天定局状态，好坏难于改变。结婚后重组了一个新家庭，双方气场纠缠在一起，逐渐形成一个新气场，有利无利就看双方的气场能否互补，配合得好可以改良一生的命运，配合不好使双方的命运都变坏。从紫微命盘上看，夫妻宫与事业宫成一线，互相影响，结合好可以夫荣妻贵，配合不好则刑克配偶，破财败业。因此择偶问题十分重要，对一生能否过幸福生活起到举足轻重和十分关键的作用，不可不引起人们的重视。俗话说：“姻缘命定”，这是对一般不知命而改的人而论的。先哲们又说：“顺则成人，逆则成仙”，知命而改，知难而上，尽量选择好与自己命理匹配的配偶，则可“柳暗花明又一村”矣。为什么说知命而改、知难而上呢？就是说难度很大，会受命理、环境、条件等诸多限制。如何选择配偶，参看有关婚姻的章节。

    4. 多婚和婚灾的解救：①选个好的配偶；②命中有多婚者，宜晚婚，先公证并同房，过一段时间再举行婚礼，或先同居后办公证；③已婚夫妇，婚姻出现裂痕时，可隆重举行一次结婚纪念，或去拍个结婚纪念照；④夫妇远离少聚，或分床或生活各自为政，互不干涉对方的思想行为；⑤如无法融合，干脆离婚另寻志同道合者。

    5. 居住地及方位的选择，可根据原命盘及限运中最吉的宫位来进行选择。命宫、身宫、紫微星落宫、五行局所属五行的宫位，如果没有什么大的问题，应优先考虑。居住位置的选择有条件的宜随大小限的变化而变换。

    6. 一生忌犯的方位与场所：疾厄宫或子女宫内有文昌或文曲，此方位的人事物；疾厄宫或子女宫化忌入宫的方位及人事物。

    7. 命里有牢狱官灾的人，应特别注意遵纪守法。

    8. 根据命宫五行局的五行属性的选择名字，例如五行局属木，在名字中选带木字傍或有木意思的字。也可结合其它易学起名方法安名。

    9. 本人克子女或子女克性大者，可让子女认义父义母，或寄养他家，或分离。

    10. 利用命局或限运中最好的宫度去发展；遇坏的命宫，可在其三方中好的宫度去发展。各个限运里适宜做什么？不适宜做什么？在岁运分析一章上已有说明，可参阅。

    11. 逢杀破狼的限运，多有开创革新的劲头；遇有煞星的限运，多有阻力；均宜多读书，多学技艺，到好的宫度去努力拼搏，冲破阻力，光明就在脚下。

    12. 限运好的时候，要把握好机遇，创造更好的成效；限运不好时，要以退为守，不要妄动，不要强求富贵，要踏实工作，把精力集中于学习技艺、修炼和教育子女上面。

    13. 加强身心的修炼，使体内阴阳五行常趋平衡。改变命运最好的方法是诚心皈依佛道，修炼佛法道术，决心忏悔改过，发大善愿。在此提供一些简便法门：坚持不懈地唸佛号“南无阿弥陀佛”，久之自有效果。又法，坚持唸准提神咒，面向西方，站坐均可，虔心静意，结准提菩萨手印（如图），置于胸前，先唸：“那么佛母准提王菩萨”（三遍）；再唸：“稽首归依苏悉帝，头面顶礼七俱（唸支音）胝（念织音），我今称赞大準提，惟願慈悲垂加护”（三遍）；然后唸：“南（那）无（么）萨多喃（南），三藐三菩陀（提），俱胝（支）喃，怛（达）姪他（拖），吽（嗡），折隸主隸，准提娑婆诃”（唸的遍数不限，越多越好）。结束时唸“叩谢佛母准提王菩萨”。接着再唸往生咒七遍：南无阿弥陀夜，多拖茄多夜，多地夜拖，阿弥利哆婆脾，阿弥利多，西枕婆脾，阿弥利多，毕加烂帝，阿弥利多，毕加烂多，加弥腻，加加那，只多加地，娑婆何。最后回向唸：拜请佛祖菩萨将弟子所唸神咒的威力，消除弟子所有宿现业障与祸患，弟子愿以唸佛唸咒的功德，回向奉献给十方三世一切佛，回向奉献给弟子的累世眷属、师长及历劫冤亲债主，愿一切众生离苦得乐，成就无上佛道。愿以此功德，庄严佛净土，上报四重恩，下济三途苦，若有见闻者，悉发菩提心，尽报此一生，同生极乐国。


    唸咒最好用普通话唸，用本地方言唸亦可，最好用咀巴微动而不出声的方法唸。若有反应，例如眼泪鼻涕一把流时，不必管它，或擦去后继续唸下去。唸到纯熟空无处，自然能与菩萨沟通，得到菩萨的加惠。


    #### 准提菩萨手印


    ### 第二节 略谈解灾


    解灾，是趋吉避凶的主要内容之一，但范围较窄一些，往往是在测出有灾厄以后采取的防范、解救方法和措施。


    俗话讲：君子问凶不问吉。对于吉，有吉者自然来，不必要管它，大不了少点富贵而已。而对于凶，若任其自然发展，则灾祸不免自然而然，这就不好了；若能提前预测知灾祸，而后采取防范措施，趋吉避凶，则有可能将大灾化小，小灾化无。这就是我们搞预测的目的。


    解灾有能解和不能解的，这一点必须预先讲清楚。邵康节这样伟大的易学家，预测出自己只寿 61 岁，他为什么不解呢？诸葛亮搞还魂大法，在关键时刻被魏延碰倒七星灯，结果功将成而垂败，寿仅
    54 岁。为什么灾难这么难解呢？原因是多方面的，主要有以下几个：一个原因是命主前生种下恶果，今生又不修功积德，罪孽深重，不可救药，因果报应也；二个原因是命运是固有规律，很难改变，如果凶性太大就难解救；三个原因是灾难已临近，时间又紧迫也难解救，正所谓“平时不烧香，急时抱佛脚”，很多灾难不是一朝一夕就能形成，也不是一朝一夕就能解救得了的，须要按上一节的方法长期施行；四个原因是预测者水平不高，解灾者功力不足；五个原因是命主不信命或者没有按预测师的要求和方法去做。就象疾病，亦有可医与不可医者，即使明知不可医，亦会尽量医治。解灾也一样，亦宜尽力而为之，尽人事而后应天命。


    在此，奉劝世人，要发大慈大悲心，经常行善积德，勇于忏悔改过，不做坏事，敬礼佛道，则多福寿安康而少灾疾，有灾疾亦易化解，即使化解不了，还可以积下阴德、种下福田给后世后代，免除后世后代之苦。


    解灾的方法，除了按第一节所讲的常规方法经常施行之外，在测出有灾之年月，应注意以下几个方面：


    1. 预测出有灾的年月，不要到命局、大小限均凶，尤其是小限或流年、流月凶的方位去远行、活动，起居也宜避开此方位；到命宫三方四正好的宫位或紫微、天喜星（二星落宫亦宜吉多无煞方可）所在宫位去活动，最好远离住家
    50 公里以上的吉方居住上一段时间；或在化科星的方位多读书活动、定居一段时间。若福德宫化科所在宫位吉者，亦可搬到该宫方位定居。

    2. 有凶灾的年月，宜忌在第九章中有论述，以凶星为主进行避忌。

    3. 多在原命盘、大小限均吉的宫位或天喜的宫位上起居、活动，例如安放床位、办公坐位、旅游方位等，可以感应到有利的气场；应避开最差的宫位。

    4. 在测出有灾的年月、凶方凶事，不动不干，采取守势，就可以没事或少事；测出有牢灾官司者，宜在此年月及方位里特别注意遵纪守法、不与人争吵、行事慎密。有血光之灾者，可捐血化解。

    5. 如果奴仆宫凶煞星多者，易犯小人，不要乱交朋友，不要与人合伙。

    6. 如果测出有口舌是非者，宜注意不要妄言，不要与人争执。如果测出有色情之灾者，注意洁身自爱，不要沾花惹草。

    7. 如果测出有破财之灾或因财招灾者，注意不要做大的生意，可把钱转移起来，在田宅宫好的情况下可购置不动产或存入银行，最好能施舍一点，捐一些钱物出来修桥铺路、接济贫困者，舍财救命亦是一种解灾的好方法。

    8. 移星换斗术：命盘或岁限某宫对我不利，就利用与该宫相合（六合）的宫或与岁限天干相合之宫进行化解，贪合忘克之意。例如，到相合之宫去避难，请相合之宫属相的人帮助，在居室内相合的方位上安床、或掛该宫属相的动物玩具或图画，把相合宫属相的动物玩具、图画等包绛好后佩戴在身上。要注意的是：相合之宫必须吉而无破才能起作用，若六合宫不吉而三合宫吉也可选用三合宫。（第
    1 点亦属移星换斗术）

    9. 选择吉时吉方（房子周围或屋内）开一个坑，埋进代表吉星之物，或在吉方掛代表吉星之物、八卦镜等，可以催官催财，趋吉避凶。此方法要由内行的预测师施行才行。

    10. 在有灾年的前一年底，或前一年生日这一天，在吉方放生。一般放龟、鳖较好，可在背上刻上"***名，*年*月放生”字样。但须注意，放生后就不要再吃该动物。这种方法据有些大师说对某些年出生的人不适宜，我认为应该不会有什么冲突，放生毕竟是件好事，最多对解灾暂时起不到作用，绝对不可能有什么副作用，长期放生，多放生，不杀生者，必有好处。也可边放边念：“愿佛祖菩萨慈悲，解脱众生疾苦，度尽天下苍生，南无阿弥陀佛，塔梭哈”（三遍）。

    11. 测出有病灾的，除了采取上述有关措施之外，还必须提前进行预防，进行认真的体格检查和积极进行治疗，找到良医良药也是一种解灾方法。看病找医生，以流月、日化科所在宫的方位去找该宫属相和卦位所属男女老幼的医生看。

    12. 测出有灾的流年，最好经常用随机预测的方法测近运（即用日历的年月日时起出紫微盘进行预测，参看有关章节）进行验证，能看出命者因时空变化，因修行、积阴功或是因做坏事、积恶等致使灾厄发生变化的情况，并可用此命盘的吉利方位及星曜进行解灾，往往较为准验。也可用六爻、奇门遁甲、六壬等方法进行预测和趋避。


