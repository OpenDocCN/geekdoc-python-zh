    疾厄为身体，兄弟为疾厄的气数位，故兄弟的四化决定身体的健康、寿数。


    如何同时看四化之间产生的复合作用呢？例如禄入兄友而忌入父疾，不能以双忌论。禄入兄友，表示走财经路线，事业有成；忌入父疾线，为文书，是非一大堆；综合看，做生意做得很好，但常常和人家打官司；所以在选择事业上，应避免带文书契约的工作。如果禄入父疾而忌入兄友，则表示作文书或带经纪、服务性的工作较有成就，而搞投资经商则较会有麻烦。


