  md: '三方更见贪破廉杀，老人幼童最忌行此凶地，青壮年遇之亦有忧。童子限如水上浮标，老人限如风中灯烛，遇煞忌无制多凶。


    6、流年恶煞照限：看诸恶煞、三煞三合冲并，太岁、白虎、病符、死符照限，九死一生。（注：如小限坐卯宫，该宫有失陷的恶煞，流年太岁又行值该官，已主此小限不吉，若三合方的亥官、未宫以及对官有恶煞冲照，主此小限必凶；再若小限官与三方四正俱见白虎、病符、死符、太岁，主有生死之危；若小限又落在大限宫内，谓二限重逢，更凶，生机渺茫。）（又注：死符即小耗）。逢凶煞喜见空亡，能反凶为吉。


    7、太岁入命官，谓之太岁当头坐，无吉便是凶。太岁坐命，本宫及三方四正有众吉守照，可主福禄。若遇诸煞守照，必然凶恶，尤其落于辰戌官更凶，轻则破财败业，重则丧命。


    大小限与太岁重叠于命身，吉则更吉，凶则更凶。重叠它宫亦同。


    8、逢大限、小限、流年太岁均凶，则很凶。大小限凶，太岁吉者为有救，不致于死；大限太岁凶而小限吉者亦为有救。


    9、大小限行长生帝旺临官之地主吉，逢吉更吉，逢凶减凶; 逢死墓绝沐浴之地主凶。


