- img_proc: true
  md: '- 踏实，能将自己的才能贡献于社会；命忌入其他宫位则多酒色财气，悠游自得，对社会不利。


    - 命宫为财帛的气数位，表管理钱财的能力，其天干化忌决定钱财损在什么地方。命官干化忌为一生成败的枢扭，故命干化忌有“紫微斗数星王”之称，即在命官干四化中，化忌为主要，化禄为其次，化科化权为更次。


    - 命宫化忌入命官，即自化忌，往往是自找麻烦，自己跟自己过不去，只是自我牺牲而不牵扯到别人，对十二宫较不构成妨害。为人慷慨，耿直，但固执，自私，懒惰，情绪不稳定，不轻信别人，遇事犹疑不决，一生命运坎坷不顺，少年更不利，自己不懂享受，六亲缘薄；忌冲迁移，出外自找麻烦，易导致意外伤灾，破财败业。命宫自化忌又坐生年权者，一生自我困扰，易惹是生非。命官自化忌又坐生年禄者，为人忠厚，却又不太信任人。


    - 命宫化忌入兄弟，对兄弟关心过度，易变为过份的管束，引起反感而不和，易受兄弟拖累；兄友为我的成就线，受冲表我没有成就；兄弟为财之库、家庭费用，忌入主家庭开支大；兄弟为夫妻的父母，表夫妻的功名受阻；忌冲奴仆（交友），与兄弟、朋友及同事合不来；交友为事业的上司（老板），故与老板关系不好，事业时好时坏，自己不宜作老板；又奴仆为员工，冲则表不能对员工没有保障，虽心系员工，但因自己的事业不稳定，无法保障员工的利益，即心有余力不足；交友为夫之疾，故表对配偶的身体不关心，因而夫妻关系不好。


