  md: '- 其他情况，四化不入兄友、子田线者，均属平常，不吉也不凶。

    - 官禄忌入迁移冲命，常换工作；命忌入迁亦同。生年禄入官，事业平顺。


    # - **2、有无老板命**

    - （1）、男命以太阳星所在宫位飞化禄。女命以太阴星所在官位飞化禄。

    - 化禄入命、财、官等宫为老板命。化禄入子女宫、田宅宫，为无实权的老板。化禄入疾厄宫，上班族。

    - （2）、大限化权入A宫照B宫，流年入A或B时会当老板。大限化权入A宫（为本命三方）照B宫。流年入A官，当实质 的老板。流年入B宫，当虚有的老板(合伙业)。

    - （3）、田宅宫化忌入子女宫，不宜当老板。田宅宫化禄入官禄宫，宜上班。


    # - **3、从事职业**

    - 河洛法论行业，以财帛宫干去四化，看其所化的“忌禄权科”（按此次序排先后）入“命兄财疾官田”(亦按此次序排先后)的哪一宫，再以该宫的主星断大的行业，以副星辅助看细节。具体看法如下：

    - （1）、先看化忌星入宫情况

    - 看化忌星入命宫否？若是，则以命宫的星曜断人事的行业；若不是，再看化忌入兄弟官否？若是，则以兄弟宫的星曜断行业；若不是，再看化忌入财帛宫否？若是，则以财帛宫的星曜断行业；若不是，再看化忌入疾厄宫否？若是，则以疾厄宫的星曜论行业；若不是，再看化忌入官禄宫否？若是，则以官禄宫的星耀论行业；若不是，再看化忌入田宅宫否？若是，则以田宅宫的星曜论行业；若不是，则再看下一步。

    - （2）、次看化禄星入宫情况

    - 看法同上步，顺序看化禄星入命兄财疾官田等宫，先入到那一宫即以该宫的星耀来断行业。若化禄又不入命兄财疾官田等宫时，再看下一步。

    - （2）、再看化权星入宫情况

    - 看法同前，顺序看化权星入命兄财疾官田等宫，先入那一官即以该宫的星曜来论行业。若化权又不入命兄财疾官田等宫时，再看下一步。

    - （4）、再看化科星入宫情况

    - 看法同前，顺序看化科星入命兄财疾官田等宫，先入那一官即以该宫的星曜来论行业。'
