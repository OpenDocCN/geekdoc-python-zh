    女的迁移宫。应于何月何日何时？方法亦同理，流年凶就看哪一月、哪一日、哪一时最凶，往往灾厄就在当时；若应用“同类相冲”则要注意三级相应，例如，看流月则看大限、流年、流月这三级，看流日则看流年、流月、流日这三级，假如大限的迁移宫有失陷的巨门、天机、陀罗、天马等星，流年化忌来冲，当流月与大限同宫时，即流迁被冲之月，会发生车祸；应用“同类相冲法”，还可这样来看，原命局凶，再看哪一大限最凶(一般是70岁内之限，不要拉得太远)，就以该大限干化忌的冲宫是原命的什么宫来看，例如是迁移宫，当流年的同类宫，即流年的迁移宫走到化忌的冲宫时，这一年灾厄就产生了；同理以这一大限最凶的流年化忌的冲宫来分析哪一月应灾。


    在凶星聚凑时，若逢消灾星，一般情况下是可以减轻灾祸的。消灾星是：紫微、天府星，这是消灾制化之星；天喜，“一喜可解三煞”；解神，对消除、减轻灾祸有一定的作用；巨门星，表示可以逃离现场及灾祸之星；天空，好事难来坏事不生之星。前四星的解灾作用是肯定的，后二星则要具体分析，因为巨门、天空二星本身亦是凶祸星，当它们与特定的凶星聚凑时，反而起到加速灾祸的作用。例如，巨门若与太阳星同宫，再加凶煞丧门白虎聚时，则有离开阳间之意；又如巨门与天机、陀罗、天马等交通星再加凶煞星聚时，则有车祸的可能；除上两种情况外，巨门可以有解灾作用。天空星，在空难、车祸、坠跌等灾害中为凶意，而在病灾、中毒、凶杀中则有凶不起来的作用；预测坐飞机逢天空加凶煞星时则不去为妙。解神星对一些小凶星有一定的解灾作用，但若与交通星、凶祸星聚会时，也表示有出轨、离开车道、解体和精神分散的意思，同时对一些大凶星，如天空地劫等亦难起到解灾的作用。


    在遇到凶祸星聚凑时，必须小心行事，以防不测之灾。


    港台前辈用到“中限”，本人认为没有必要，只用原局、大限、流年三盘即可。


    在岁运分析中，不显眼的小凶星、流星却占有很重要的作用，它们会影响和左右大星、主星。化忌星的作用更不可低估，它能冲动命局、岁限宫中的凶煞星，起到引动爆发作用。


    # ## 第二节 一般灾伤


    一般伤灾指自己无故地遭受的器械、碰撞、跌打损伤出血和开刀手术等。伤灾多与流血有关，故又称为血光之灾。


    一般伤灾以命疾父宫为主（父母看头面破相），外出性伤灾及意外、车祸以迁移宫为主，兼看命疾宫。迁移宫化忌冲命宫、官禄宫、田宅宫、子女宫，疾厄宫化忌冲田宅宫，均易有意外灾厄。例如：迁移宫化忌冲本命宫，大限官禄宫进入本命宫，则化忌则冲大官，此限外出有意外死亡的危险；若大财进入命宫，则化忌则冲大财，此限外出意外撞伤别人赔钱了事。


    迁移宫化忌冲本命宫（子位），大限入辰宫时，化忌则冲大财，此限外出意外撞伤别人赔钱了事。


    一般的小伤小灾仅是大限、小限和流年逢灾伤星所致，原命局不一定有兆示。若大的意外事故，多是原局、大限、流年同时逢凶所致。


    擎羊星是血光的代表星，入命、岁限或对宫见，小心伤灾手术。


    命疾父宫及限运逢四煞、破碎、天刑、七杀、破军等星，易有灾伤，加红鸾更要小心。


