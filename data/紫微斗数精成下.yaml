  md: '- 婚前多与父母同居，家庭和个人的气场暂时处于先天定局状态，好坏难于改变。结婚后重组了一个新家庭，双方气场纠缠在一起，逐渐形成一个新气场，有利无利就看双方的气场能否互补，配合得好可以改良一生的命运，配合不好使双方的命运都变坏。从紫微命盘上看，夫妻宫与事业宫成一线，互相影响，结合好可以夫荣妻贵，配合不好则刑克配偶，破财败业。因此择偶问题十分重要，对一生能否过幸福生活起到举足轻重和十分关键的作用，不可不引起人们的重视。俗话说：“姻缘命定”，这是对一般不知命而改的人而论的。先哲们又说：“顺则成人，逆则成仙”，知命而改，知难而上，尽量选择好与自己命理匹配的配偶，则可“柳暗花明又一村”矣。为什么说知命而改、知难而上呢？就是说难度很大，会受命理、环境、条件等诸多限制。如何选择配偶，参看有关婚姻的章节。

    - 多婚和婚灾的解救：①选个好的配偶②命中有多婚者，宜晚婚，先公证并同房，过一段时间再举行婚礼，或先同居后办公证③已婚夫妇，婚姻出现裂痕时，可隆重举行一次结婚纪念，或去拍个结婚纪念照④夫妇远离少聚，或分床或生活各自为政，互不干涉对方的思想行为⑤如无法融合，干脆离婚另寻志同道合者。

    - 4、居住地及方位的选择，可根据原命盘及限运中最吉的宫位来进行选择。命宫、身宫、紫微星落宫、五行局所属五行的宫位，如果没有什么大的问题，应优先考虑。居住位置的选择有条件的宜随大小限的变化而变换。

    - 一生忌犯的方位与场所：疾厄宫或子女宫内有文昌或文曲，此方位的人事物；疾厄宫或子女宫化忌入宫的方位及人事物。

    - 5、命里有牢狱官灾的人，应特别注意遵纪守法。

    - 6、根据命宫五行局的五行属性的选择名字，例如五行局属木，在名字中选带木字傍或有木意思的字。也可结合其它易学起名方法安名。

    - 7、本人克子女或子女克性大者，可让子女认义父义母，或寄养他家，或分离。

    - 8、利用命局或限运中最好的宫度去发展；遇坏的命宫，可在其三方中好的宫度去发展。各个限运里适宜做什么？不适宜做什么？在岁运分析一章上已有说明，可参阅。

    - 9、逢杀破狼的限运，多有开创革新的劲头；遇有煞星的限运，多有阻力；均宜多读书，多学技艺，到好的宫度去努力拼搏，冲破阻力，光明就在脚下。

    - 10、限运好的时候，要把握好机遇，创造更好的成效；限运不好时，要以退为守，不要妄动，不要强求富贵，要踏实工作，把精力集中于学习技艺、修炼和教育子女上面。

    - 11、加强身心的修炼，使体内阴阳五行常趋平衡。改变命运最好的方法是诚心皈依佛道，修炼佛法道术，决心忏悔改过，发大善愿。在此提供一些简便法门：坚持不懈地唸佛号“南无阿弥陀佛”，久之自有效果。又法，坚持唸准提神咒，面向西方，站坐均可，虔心静意，结准提菩萨手印(如图)，置于胸前，先唸：“那么佛母准提王菩萨”（三遍）；再唸：
    “稽首归依苏悉帝，头面顶礼七俱 (唸支音) 胝 （念织音），我今称赞大準提，惟願慈悲垂加护”（三遍）；然后唸：“南（那）无（么）萨多喃（南），三藐三菩陀（提），俱胝（支）喃，怛（达）姪他（拖），吽（嗡），折隸主隸，准提娑婆诃”
    （唸的遍数不限，越多越好）。结束时唸“叩谢佛母准提王菩萨”。接着再唸往生咒七遍：南无阿弥陀夜，多拖茄多夜，多地夜拖，阿弥利哆婆脾，阿弥利多，西枕婆脾，阿弥利多，毕加烂帝，阿弥利多，毕加烂多，加弥腻，加加那，只多加地，娑婆何。最后回向唸：拜请佛祖菩萨将弟子所唸神咒的威力，消除弟子所有宿现业障与祸患，弟子愿以唸佛唸咒的功德，回向奉'
