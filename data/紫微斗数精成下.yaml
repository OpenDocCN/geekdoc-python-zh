    命身有杀破狼昌曲等星，有从高处摔下或跌坠的意外，加空劫尤甚。限运见空劫亦易跌倒坠落，不宜上高处和乘坐飞机。


    # ## 第六节 水祸


    水祸包括溺水、沉船、烫伤等与水有关的灾祸。


    太阴、龙池代表河水湖海；田宅宫见天机、太阴、龙池即代表船；天空代表翻覆、掉落；地劫代表沉溺；巨门代表迷失；擎羊代表碰撞。限运的命迁疾宫见煞星加上上述祸害星则易有水祸，再加丧亡星则有死亡的危险。太阴、龙池、火星聚，亦主有水火烫伤的危险。太阴星，游泳易抽筋。


    命宫破军与文曲化忌同宫，易有水灾投河之险。命身逢铃昌陀武同宫，防水险或投河。


    # ## 第七节 动物伤害


    1、代表禽兽的星曜有：


    凤阁、红鸾代表飞禽乌兽；


    龙池太阴：鱼类、水族；


    陀罗：蛇类；


    再结合落宫地支所属生肖看：子鼠，丑牛，寅虎，卯兔，辰龙，巳蛇，午马，未羊，申猴，酉鸡，戌狗，亥猪。


    2、限运命迁疾宫见上述禽兽星加伤害星，较易受动物伤害，再加丧亡星则有死亡的危险。


    蜚廉：爬虫，细菌；


    贪狼：豹、狼、犬；


    擎羊：有角动物。


    # ## 第八节 雷电击伤


    大小限流年命迁疾宫见太阴太阳廉贞与伤害星缠度，易有触电、雷击伤害，再加上丧亡星群则有死亡的危险。


    # ## 第九节 药物中毒灾祸


    命盘的疾厄宫有禄存，一生防饮食、钱财是非。天相亦代表毒品、瓦斯、化工药品。大小限流年命迁疾宫见禄存、天相(表药物)、蜚廉(表细菌、毒物)会聚伤害星，易有中毒祸害。再加丧亡星则有死亡的危险。


    # ## 第十节 自杀


    易有自杀的组合：①命身福德宫有紫微、天机、天空这三颗精神星，碰到凶劣星聚时，一生多思多虑，思想驳杂，再加破碎、阴煞、天魁等星，易有悲观厌世的念头②命宫廉火同居陷宫，较易想不开，易寻短见，女性更验③命宫或福德宫逢太阴陷地化忌、文曲陷地化忌，其人较自卑内向，再加六煞守照，便会想不开，女命更是④巨羊火入命或迁⑤巨门化忌冲天同+陀罗之宫。上述组合行限再逢凶煞、伤害、阴煞、空劫、旬空等星，便会有想不开而自杀的可能，尤其是碰到很不如意事的时候更有可能，再加丧亡星则有死亡的危险。再会桃花星，可能因风流感情事想不开而自杀。


    本命福德宫化忌冲大福，大福化忌冲本福，均易自杀。


