  md: "**有劳无功。**\n\n40岁，流年入巳，冲宫成为交友，交友为工人，受冲表工人出勤不出力，故没有搞头；交友事业的上司，表与上司关系不好，事业不利。\n\
    \n41岁，流年入午，冲流官，表能积极工作，事业有变动。\n\n42岁，流年入未，冲流田（财之库），财库破，要破财。\n\n43岁，流年入申，冲流年的福德（来财的地方），财源短缺。\n\
    \n**◎ 下面再举一个实例，是以化禄、化忌同时来看的，命盘如例三：**\n\n生年干化禄入兄弟、忌入交友，化权入子田线，不入本命的三方，一生属中等命运，不会大富大贵，但化科入命，一生喜学习偏门的科学文化知识和神秘文化知识，事业稳定平顺，钱财细水长流，源源不断，平稳增加。\n\
    \n**看终生财运，以命宫干飞四化来看。命宫干壬，四化分别为：梁紫左武。**天梁化禄入子女宫，子田线为财帛的父疾线，后天易得财名，即走先求名后得利，较有光明前景。但武曲化忌入财帛官，又是财星化忌，虽想发财却无能耐，不宜直接做生意求财，尤其不宜投资经商。综合看，只宜走求名的路线，以得名后赚钱，以名赚钱就是以公职或技艺方式赚钱。**\n\
    \n**既然分析出其人宜服公职，公职必以事业为主，我们来看看他的事业情况。财帛宫为官禄的气数位，就以财帛官干戊飞四化：贪阴右机。**化禄入迁移，离乡发展较有前途化忌入兄弟官,为官禄的父疾线，主事业无名较难得上司的提拔无靠山；化权也入此线，虽稍有改善，但亦仅主本人有才千，工作积极，却怀才不遇，难得升迁。\n\
    \n**我们分析此人最适宜的谋生手段是什么？子女官干己使武曲化禄入财帛宫，应赚晚辈的钱，故最好搞教学工作又疾厄官于也**\n\n| 机 | 化禄 |\t紫\t\
    |\t化科\t||破曲福甲申田乙酉廉府官丙戌阴化忌奴丁亥巨同贪左迁子武相右财寅命3/12壬午父癸未杀夫23/32庚辰阳梁化权子33/42己卯疾53/62已丑例三"
