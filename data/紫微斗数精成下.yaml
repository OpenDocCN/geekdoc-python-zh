  md: '影响较深远。年轻运主活泼而社交广泛，积极策划行动；老年运主老谋深算，经验丰富。事业、家庭环境多变动（例如搬家或变动床铺），家庭纷争，长期积压之事亦会有变更。会天马有远行之兆。加同梁主享受。加会日月于旺地，升官发财。巨门同，是非纠纷多，再加羊陀主灾厄。天机小限，春夏充满活力，多变动而有进展；秋冬不利活动，宜蓄机待发。


    庙旺众吉拱照，多得贤人指路，思维敏捷，机遇较多，事业大有发展，宜果敢行动，兴家创业，子午宫最佳。失陷或加煞，会有阻丧的境遇，甚至有悲观厌世的念头。


    逢化三吉主变好，得贵人助而发展，经营顺遂。逢化忌，凡事变坏，工作不安定，事业艰难，计划失误（多因贪图捷径所致），惊慌失措（宜镇静，早谋对策），官员防降职，交友宜小心，防机器损伤；加羊火小心骑机动车出事。化忌星入田宅宫，有搬家之象。


    天机入大小限的对官，主事业不安宁。流日逢天机天马化忌，小心车祸。


    炼功及学习五术中，宜选在天机当值的大限、流年、流月、流日、流时及天机的方位，切莫错过天时良机。遇到困难时可在天机方去寻找贵人相助。


    **天机入二限吉凶诀：**男女二限值天机，科权禄逢大有为，出入营谋多遇贵，发财发福少人知。天机照限不安宁，家事纷纷外事多，更遇羊陀并巨门，须知此岁入南柯。


    ☆3、**太阳星之限年**，会发生有关工作、财利、考试、名誉等事情。太阳为父星、夫星、子星、事业星，限年逢，亦会有父、夫、子、事业等方面的事情。


    太阳入二限，有强烈的创业心，会接近与政治有关的人和事，好心反易招怨。青少年运，活泼好动，喜出风头，又不肯动脑，重感情；中年运，干劲足，喜社交，不感情用事；晚年运，变得冷静，成败起伏，多家庭变故。与羊铃刑忌会集，常人有官非，官人遭贬，或生克父亲与男孩。化三吉大利。逢化忌，易受瞒骗、误会、冤枉（不与人合伙，凡事预先通告），防头心眼疾，名誉受损；加煞，刑克父母，财破得很利害，是明见的破；会天刑、羊陀、白虎，主降级、刑讼、丧服、疾病、克父、克夫、克子。原局逢化忌，大小限逢白虎、丧门、吊客之年有丧父之忧。流年大限遇阳梁，可与老友相遇，若天梁化禄，老友已婚，好谈世事政事；太阳化禄，热情而多寒喧。大小限入田宅宫，吉聚必有聚兴之喜。女命逢太阳限年，会谈情说爱，有红喜星更是，吉则成，凶则告吹。'
