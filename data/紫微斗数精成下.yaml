  md: '命盘四化留给大限看，大限四化留给流年看，反过来，命局的定数应于某一限年，就以应数之年飞四化回大限，以大限飞上化回命盘, 用这种方法来看吉的大限和流年是增吉还是减吉？凶的大限和流年是增凶还是减凶、有无补救？例如生年化禄之星，行限使之化禄，为增吉；生年化忌之星，行限使之化禄，为变好，可减其凶性，为有补救。生年禄入大限的父疾线，主光明；但大限宫天干使此星再化忌，则为忌带忌，为变坏，主大凶。故生年化禄之星，行限使之化忌则凶。化权科有解忌的作用，上下级逢权忌、科忌都不致大凶，例如大权逢本忌和大忌逢本钱，仅主增点阻力或烦恼而已。


    大限宫是个中转站，大限官四化“上应本命，下应流年”，即大限四化入原命盘何宫为“上应本命”，为“应数”，说明这步限运将在什么时间、地点、发生什么事情，事情首先与四化落原盘宫的名称有关，其次才是与横向宫发生关系，故主要反映出空间关系，也就是说这步运限我将会把全部精力投入到原命盘官所关系到的人事和领域。例如大限化禄入本命的福德官，首先，福德是财源，故表示此限我很关心赚钱；其次，福德为夫妻的事业，也表示我对配偶的事业很关心。又如大限化忌冲本命事业，为用冲体，灾害必重，此大限的事业必有变动。


    大限是转折点，是事件的成形阶段，只要本大限的事件已经形成，在本大限内的某一年即会发生。事件产生于那一年，则看本限内那一年走到大限同类的四化坐官(吉事)或对冲宫(凶事)。至于吉凶的程度，则宜参看上面的“化出”和“化入”、“忌出”与“忌入”，以及四化之间的关系。


    不同级而同类四化之间的关系：同类官位互忌则不忌，例如大限的财帛官化忌入本命的财帛宫, 流年的财帛官化忌入大限的财帛宫，本命的财帛化忌入大限的财帛或流年的财帛宫，是为同类互忌，不以凶论。同类官互冲忌则凶，例如大财化忌冲本财,
    流财化忌冲大财，大疾化忌冲本疾，流疾化忌冲大疾等，必然有事。大限与流年同类相冲亦凶。例如大限事业化忌在亥宫冲巳官，当已宫变为流年事业官之年，事业便崩溃了。又如，大限财帛化忌冲流年财帛宫，破财之事便发生了。


    大限与流年，流年间流月，流月与流日，流日与流时的关系及论断方法同理, 分三级相扣，中级为转折点，具体参看下一节。论流年、月、日、时四化，较重视冲宫，不太重视三合官。


    第九节 河洛四化分析论断的基本方法

    △一、气数位分析论断法'
