    # # 第八节 命局与岁限四化的关系


    - 四化分级为：命盘四化，大限宫干四化，流年宫干四化，流月宫干四化，流日宫干四化，流时宫干四化等级。命盘四化包括生年四化和命盘十二宫干四化。从命盘到流时，是从上到下的关系，是从先天到后天的关系。从大限到流时都称为行限盘。


    - 看四化的吉凶影响，本级四化首先影响本级十二宫，例如大限四化首先对本大限的吉凶起直接的作用，其次才是对上下级发生影响作用。看大限，以大限四化为主，以命盘四化为辅。看流年，以流年四化为主，以大限四化为辅，以命盘四化为参考。


    - 原命盘是“体”是“因”，看定数；行限盘是“用”是“果”，看应数（应期）。


    - 河洛紫微斗数有一法则，就是由命、大限、流年、流月、流'
  - '[PAGE 126]


    日、流时，一路往下推，落宫的天干一律以原命盘为准，一成不变（均用原命盘的天干）。这一点与星情法是有区别的，星情论大限四化时，天干要重排（有些派别不重排）。


    河洛派以命盘为“天盘”，大限盘为“地盘”，流年盘为“人盘”。


    ◇ “在天成象，在地成形，在人成事” 。所以，推命就分为三个不同的阶段。“在天成象”，意思是在天盘只是朦胧的象，就如刚受过精的卵子，只是生命的播种阶段，是为种“因”。


    “在地成形”，意思是到了地盘，朦胧的象已发展成为有形有状的阶段，就如受精的卵子经过母体的孕育，逐渐成为胎儿，是为“缘”。 “在人成事”，意思是事情已经产生，就如孕育成的胎儿瓜瓜落地，已经脱离母体，成为活生生的人，是为结“果”。


    在这三个阶段中，地盘是至关重要的转折阶段，它承担孕育天盘之象以成形，又负担转化生人盘以成事的承前启后的作用。但结果在人盘，所以最后成与不成得看人盘。


    一件事的产生，在紫微斗数中亦分为三个阶段，即在本命盘为“天垂象”的酝酿阶段，在大限盘的“成形”孕育阶段，在流年盘为事物产生阶段，即“成事”阶段。大限盘是一个转折的关键阶段，力量最大，管十年祸福，其吉凶已基本定型，就看应于这十年内的哪一年了。所以，推算流年运，应由大限盘的天干四化情况并结合本命盘之象来推断,三环相扣才能顺理成章。同理，在看流月时，应以流年的四化并配合大限之象来推断；看流日应以流月四化并配合流年之象来推断；看流时应以流日四化并配合流月之象来推断(三环相扣法在下节详论)。


    我们在推命过程中，如能劝人在垂象成因阶段不要在某时某方做什么事，就可以避免发生不良的后果（无因则无果），这才是功德无量。


    生年四化叫天垂象，是天赋之意。原盘四化入大限盘也叫垂象，是为定数，决定此大限的格局高低、是吉是凶，即此大限内的运气情况，反映的主要是时间关系。


    生年四化要入本命的三方才有力；大限四化要入本命的三方才有力；流年四化要入大限的三方才有力；流月四化要入流年的三方才有力；流日四化要入流月的三方才有力；流时四化要入流日的三方才有力。这叫“下承上”。


    大限要得生年三吉会照才好，逢生年忌会照则不利，尤其逢忌冲更不利；流年要得大限三吉会照才好，生年三吉会照亦好，逢大限忌会照则不利，逢大忌冲更不利；流月逢流年三吉会照才好，逢流年忌会照则不利；流日和流时同理。这叫“上应下”。'
  - '[PAGE 127]


    命盘四化留给大限看，大限四化留给流年看，反过来，命局的定数应于某一限年，就以应数之年飞四化回大限，以大限飞上化回命盘, 用这种方法来看吉的大限和流年是增吉还是减吉？凶的大限和流年是增凶还是减凶、有无补救？例如生年化禄之星，行限使之化禄，为增吉；生年化忌之星，行限使之化禄，为变好，可减其凶性，为有补救。生年禄入大限的父疾线，主光明；但大限宫天干使此星再化忌，则为忌带忌，为变坏，主大凶。故生年化禄之星，行限使之化忌则凶。化权科有解忌的作用，上下级逢权忌、科忌都不致大凶，例如大权逢本忌和大忌逢本钱，仅主增点阻力或烦恼而已。


    大限宫是个中转站，大限官四化“上应本命，下应流年”，即大限四化入原命盘何宫为“上应本命”，为“应数”，说明这步限运将在什么时间、地点、发生什么事情，事情首先与四化落原盘宫的名称有关，其次才是与横向宫发生关系，故主要反映出空间关系，也就是说这步运限我将会把全部精力投入到原命盘官所关系到的人事和领域。例如大限化禄入本命的福德官，首先，福德是财源，故表示此限我很关心赚钱；其次，福德为夫妻的事业，也表示我对配偶的事业很关心。又如大限化忌冲本命事业，为用冲体，灾害必重，此大限的事业必有变动。


    大限是转折点，是事件的成形阶段，只要本大限的事件已经形成，在本大限内的某一年即会发生。事件产生于那一年，则看本限内那一年走到大限同类的四化坐官(吉事)或对冲宫(凶事)。至于吉凶的程度，则宜参看上面的“化出”和“化入”、“忌出”与“忌入”，以及四化之间的关系。


    不同级而同类四化之间的关系：同类官位互忌则不忌，例如大限的财帛官化忌入本命的财帛宫, 流年的财帛官化忌入大限的财帛宫，本命的财帛化忌入大限的财帛或流年的财帛宫，是为同类互忌，不以凶论。同类官互冲忌则凶，例如大财化忌冲本财,
    流财化忌冲大财，大疾化忌冲本疾，流疾化忌冲大疾等，必然有事。大限与流年同类相冲亦凶。例如大限事业化忌在亥宫冲巳官，当已宫变为流年事业官之年，事业便崩溃了。又如，大限财帛化忌冲流年财帛宫，破财之事便发生了。


    大限与流年，流年间流月，流月与流日，流日与流时的关系及论断方法同理, 分三级相扣，中级为转折点，具体参看下一节。论流年、月、日、时四化，较重视冲宫，不太重视三合官。


    第九节 河洛四化分析论断的基本方法

    △一、气数位分析论断法'
  - '[PAGE 128]


    从本宫为1数起，逆数到第9宫，称为本宫的“气数位”。例如从命宫为1，逆数到9宫为官禄宫，那么官禄宫就称为命宫的气数位；又如从财帛宫为1，逆数到9为命宫，则命宫就是财帛宫的气数位，其余类推。总之，各宫的官禄宫就是其气数位。


    官禄宫是对命宫制约的宫位，所以，各宫的成败皆由各宫的官禄宫(气数位)决定。


    所谓“气数”，就是指有无生气，有生气则命存，无生气则命亡。气数位则是生气库藏的地方。既然是气，就有动态、影象、虚而不实的意思。所以，论命应以本宫为“体”，以气数位为“用”，气数位法只起兆示和辅助作用，仍应以本宫的星情论断法为主为实。


    河洛四化法很重视“气数位”，以本宫（十二宫均可为本宫）的气数宫位的天干去四化，看化出的四化星落宫好坏，以应本宫的动态吉凶情况。看“气数位”，最重要的是命、财、官三宫，这三宫互为气数位。气数位论断法，不仅适用于原盘，也适用于各级活盘，而且要上下盘双线交流以寻迹象，断其吉凶。一般命局看气运、格局高低，大限看时空，流年看破败点。


    气数位法最重视父疾线和兄友线，四化只有入本宫的父疾线和兄友线才起重要作用，四化不入本宫的父疾线或兄友线，则表示不好也不坏，平常而已。父疾线主有无光明、幸运、贵气名望和行政文书管理才能，成败作用大于兄友线，偏于天成；兄友线主才干、能力、财气和财经管理才能，成败偏于自身的努力。


    “气数位”化三吉入本宫的父疾线主有光明、幸运、贵气名望和行政文书管理才能，成就天成，宜走行政文书等求名路线，父母宫成败天成，疾厄宫偏于身体力行；化忌入本宫的父疾线则主无光明，前途暗淡，难有贵气名望，不宜走行政文书等求名路线，可从事经商、技术等，且须努力拼搏。


    “气数位”化三吉入本宫的兄友线主有才干、能力、财气和财经管理才能，宜走财经路线，亦可有天然的助力；化忌入本宫的兄友线主无才干，无成就，无财气，甚至破财不聚，不宜经商，可走技术路线，且须努力拼搏。


    若以命宫为本宫，官禄宫是命宫的气数位，所以论人的贵气、地位与运数，则以命宫为体，以官禄宫为用，以命宫的强弱论一生命数的高低，用官禄宫的天干四化来断一生的运数、机遇、吉凶祸福，应本命的荣辱，最重视父疾线。如果官禄宫干化三吉入父疾线，则一生前途光明，青云直上，有贵气名望，可在行政机构任职（化禄入表成功来得很天然幸运，权入是打拼得来，科入是得贵人助而成功）；若化忌入父疾线，表损光明，一生命运多'
  - '[PAGE 129]


    阻，无贵气名望，是非麻烦事多。如果官禄宫化三吉入兄友线，则其人能干，在事业运上将会有成就，宜财经界；若化忌入兄友线，表无才干，事业无成就，不宜经商。


    官禄宫化忌导至事业失败，必是一种人为因素，例如自己估计不足，或因个性问题造成。化忌所入之宫，表有生之年倒霉事的原因必与该宫有关；忌冲入那一宫，坏事就发生在那一宫，该宫的人事要倒霉；例如化忌入子女宫冲田宅宫，事必与子女、田宅有关，或与桃花事有关；化忌入兄弟宫冲交友宫，倒霉事必为兄弟朋友而起，交友为朋友、工人，冲交友就表示朋友、工人有问题，没有助益，没有搞头。官禄是我的事业，不怕忌入，忌入表拼搏，拼出成果来；但忌冲则凶，对事业不利。疾厄是官禄的田宅，是自己工作的地方、工厂、公司、商店，忌冲疾厄则表示有倒店的可能；忌入命迁线，表里外不顺，进退维谷。化曜入命，表工作有得做。若官禄四化不入父疾线或兄友线，则表示不好也不坏，平常而已。化曜入父母、兄弟的力量较实，入疾厄、奴仆的力量较虚。


    官禄宫四化对精神生活产生作用，官忌入大限（即大限入官禄化忌之宫），主本大限内是非较多。


    若以财帛宫为本宫，命宫是财帛宫的气数位，所以论财运，以财帛宫为体，以命宫为用，用命宫的天干四化来断财运好坏。若命宫化禄入子田线，子田线为财帛的父疾线，表示可以有财名，因名得财，或因财而扬名，而且不会有财务纠纷；命宫化忌入子田线，主无财名，因财失名，财务纠纷多。若命宫化禄入父疾线，因父疾线为财帛的兄友线，因而在钱财上较善管理，可以有成就，发财利；命宫化忌入父疾线，则无财利或失财利（尤其是命宫化忌入子女宫冲田宅宫，表示一生与钱财无缘，不宜经商，只宜上班、技艺工作）。命宫化出的忌，主钱财，导至事业失败时，必与钱财有关，决定钱财损在什么地方，可能因资金短缺，靠借贷创业，结果如汤洗雪，入不敷出，越欠越多。命宫化忌入官禄宫，表示对任何事情都必亲自处理才放心。看那一大限发财，须看命宫化忌入宫的下一宫位（顺行运）或上一宫位（逆行运）。命忌不入子田、父疾线，一般主平顺，无多大风险。


    论事业，官禄宫为本宫，财帛宫是官禄宫的气数位，所以论事业，以官禄宫为体，以财帛宫为用，用财帛宫的天干四化来断事业的成败。若财帛宫干化三吉入兄友线，因兄友线是官禄的父疾线，因而表示在事业上名气好，容易得到提拔的机遇；若财帛宫干化忌入兄友线，则事业难以有名望。再者，若化禄逢空劫忌冲破，则表示所做的事业将要成功时，即美景成空。若财帛宫干'
  - '[PAGE 130]


    - 化三吉入子田线，因子田线是官禄的兄友线，因而表示事业上能干，易成功；若化忌入子田线，则事业上因自己无能而无成就。由财帛宫化出的忌，导至事业失败，是因为事业出了差错，例如出现强劲的对手，订单出问题等。财帛化忌入官禄，表借贷投资。


    - 一个人一生最大的成就表现在命宫（表人格的升华）、官禄宫（表事业的腾达）、财帛宫（表财富的多少）等三个方面。但还要看三者的配合情况以及运限是否相助，以及四化之间的相互作用，而吉凶以化禄和化忌为重。方外人的同步断诀主要应用本命盘的命宫忌来断财运，用官禄宫的忌来断运途，用财帛宫的忌来断事业。


    - 其余各宫均可为本宫，以其气数位的宫干四化入宫情况来论本宫有无生气。


    - 例如兄弟宫又为母亲宫，要了解母亲有无生气，可以兄弟宫为本宫,则田宅宫为兄弟的气数值,看田宅宫干的四化落宫情况，若田宅官干化禄入命迁线，因命迁线为母亲宫的父疾线，故表示母亲受教育良好，名誉较高；若化忌入此线，则表示母亲一辈子难有名声，困难重重；化忌入迁移宫冲命宫同论，表母亲受教育程度不高，没有社会地位。若田宅官干化禄入夫官线，因夫官线为母亲的兄友线，表母亲在事业上很能干，有成就；反之，化忌入夫妻宫冲官禄宫，表母亲在事业上的没有任何成就。


    - 论子女有无出息，以子女为本宫，父母宫为子女的气数位。父母化禄入夫妻宫，因夫妻是子女的父疾线（文书线），故表示子女聪明智慧，读书很轻松，成绩好，日后青云直上，光宗耀祖；父母化权入夫妻，表示子女能认真读书，成绩也不错；父母化科入夫妻，表子女入学读书，是靠老师或别人帮助的；父母化忌入夫妻，表示子女智力不好，读书成绩不好，在文书上有麻烦。若父母化吉入财福线，因财福线是子女的兄友线，表示子女在财经方面有成就；父母化忌入财福线，则表子女财经上无成就。


    - 田宅是家，是房地产，是财之库。田宅的气数位为疾厄宫，疾厄官干化吉入夫官线，因夫官线是田宅的父疾线，表示家世清白，家族在社会上有较高的声誉地位，不会有房地产纠纷。若疾厄宫干化吉入财福线，因财福线是田宅的兄友线，表示一家人主要走经商或财经界者居多，也主家族在财经方面较有成就。疾厄官干化忌入夫官线或财福线，则家庭不幸，家庭财经困难。


    - 福德宫表祖德、财源和嗜好之宫，福德的气数位是迁移宫。迁移宫干化吉入父疾线，因父疾线是福德的兄友线，表示祖业茂盛；若化忌入父疾线，则表示祖业不景气。


    - 父母官是父亲之宫位，也是相貌宫和遗传位。奴仆官是父母'
- md: "## 宫的气数位与四化入宫论断\n\n宫的气数位，奴仆宫干的四化入宫情况可看出父亲有无生气，也可看出本身有何暗疾、宿疾或不明原因的疾病。\n\n疾厄为身体，兄弟为疾厄的气数位，故兄弟的四化决定身体的健康、寿数。\n\
    \n如何同时看四化之间产生的复合作用呢？例如禄入兄友而忌入父疾，不能以双忌论。禄入兄友，表示走财经路线，事业有成；忌入父疾线，为文书是非一大堆；综合看，做生意做得很好，但常常和人家打官司；所以在选择事业上，应避免带文书契约的工作。如果禄入父疾而忌入兄友，则表示作文书或带经纪、服务性的工作较有成就，而搞投资经商则较会有麻烦。\n\
    \n如果禄、忌同宫或在对冲宫，以双忌论，但必须是同一宫干化出的禄、忌才算，不相干的宫位之化曜只作闲神看。例如，生年干庚使太阳化禄入父母宫，而命宫干甲又使太阳化忌入父母，这不能算双忌，而且此禄还有解忌的能力。所谓化解，不是抵消，而是减轻作用。\n\
    \n“气数位”化三吉入本宫的三方为吉；化忌入本宫的三方则有阻滞，但不算大凶；化忌冲本宫的三方则为大凶。\n\n问题是气数位化三吉入本宫父疾线、兄友线而又化忌入本宫的三方，或者化忌入本宫的父疾线、兄友线而又化三吉入本宫的三方，将如何论断呢？两者相互化解缓和作用，吉者减吉，凶者减凶。四化入本宫父疾线、兄友线为兆象、机遇，吉凶较虚；四化入三方，三方为“我”官，故吉凶较实；两者皆吉则增吉，一吉一忌则吉凶均减力。\n\
    \n原命、财、官三宫所化之忌，要入大限的父疾线才以大凶论；原命、财、官三宫所化三吉，要入大限的父疾线才以大吉论。\n\n## 二、上中下三级相扣论断法\n\n\
    这一方法要结合“命局与限年四化的关系”一节来看。四化分为命盘、大限、流年、流月、流日、流时等六级。“在天成象，在地成形，在人成事”的三阶段法则同样适用于这六级中的任意三级，但必须是从上到下的三级，结果可分为命、限、年一组，限、年、月一组，年、月、日一组，月、日、时一组，共组成四组上中下三级盘。以这些三级四化的关系来分析事情的发生、发展和结果，称为三级相扣论断法，主要用来断应期的，就是说，凡同一类人事吉凶必须以三级同看，上级兆示，中级定型，下级为应期。\n\
    \n本级四化的吉凶，首先兆示在本级，然后才发展到下级。原命局必然会有某个或吉或凶之人事；再看哪一大限中这个人事发展变化较大的，则吉凶就已基本定型，这个人事发展变化不大的大限则不用看；再看定型的大限中哪一年这个人事发展变化最大的，则吉凶的人事就必然在此年发生。例如，原局官禄落陷带煞化忌，兆示此人一生事业不利，当大限入官禄宫或大限官禄宫化忌冲本命官禄宫时则事业会大败，当流年入官禄宫或流官入忌冲之宫时，失业倒店就必然发生了。\n\
    \n上级盘为“体”，下级盘为“用”。例如，原盘化忌入大限，“体”冲“用”，凶事较轻，且仅主迹象；大限化忌冲原盘，“用”冲“体”，凶事必然发生，凶重，且主十年多凶。原盘化三吉入大限，吉小，且仅主迹象；大限化三吉入原盘，吉事必然发生，吉重，且主十年吉。大限与流年、流\
    \ 年与流月同理。\n\n上级盘的四化应于下级盘（如年对月）审迹象，下级盘的四化入上级盘（如月对年）断吉凶。应先审迹象而后断吉凶，也就是先审命盘而后看限运。\n\
    \n上级盘四化入下级盘（如生年入大限）审迹象，看“定数”，意思是下级某限年行到上级四化的宫位时，兆示该限年会有吉凶的迹象 (发生时间)，发生的吉凶事与四化入下级盘的宫名表意有关\
    \ (应于何人事)。例如，原盘化忌入疾厄宫，大限入到原盘父母宫，大限受忌冲，兆示此大限内自己会有不利的事情。但凶事会不会发生？与原局疾厄宫及父母宫的吉凶、大限四化及流年吉凶等都有关系，不可一概而论。\n\
    \n下级盘四化入上级盘（如大限入原盘）断吉凶，看“应数”，意思是本级四化入上级某宫，即对上级该宫有影响，表在什么时间什么地方发生了什么事，结果如何？发生的吉凶事与四化入上级盘的官名和星曜表意有关，但必须在原局兆示凶的情况下才会发生。例如，大限化禄入大限的什么宫位表示我这十年把心思放在什么地方，但是要看这步限将发生什么事情，必须看所入的这一宫位在原盘上是什么宫位，如果大限盘为夫妻表示这十年很疼老婆，但夫妻在原盘上是福德，表示此限我关心的是赚钱的事。又如，原局兆示父母凶，大限化忌冲原局父母，则主父母在此大限内必有不利事发生，什么事与星情表意有关，凶的程度，即结果与官的组合及旺衰有关。\n\
    \n上中下三级相扣论断法又分为三个方法，分论如下：\n\n### （一）、天人合一法\n\n原命盘化给大限用，大限化给流年用，流年化回去给命盘用，方外人前辈称为“天人合一”。我们把他扩展到其他上中下三级，以上级盘化给中级盘用，中级盘化给下级盘用，下级盘化回去给上级盘用，统称为天人合一法。\n\
    \n我们以命、限、年这三级为例来说明“天人合一”法的具体应用。\n\n原命盘化给大限用，就是原命盘的四化飞入大限十二宫的某官，就表该大限所发生的事与该大限的该宫名称表意有关。例如，原命宫化忌入大限的父母宫，麻烦事就与父母或文书契约有关；因是坐忌，麻烦事还不算大，大问题在忌冲之宫，忌冲疾厄，疾厄是身体、工作场所，表身体有灾疾，也表会失业倒店，依“一六共宗”，冲疾则命不保，是大破败的迹象。\n\
    \n同理，大限四化留给流年用，当流年走到大限四化宫时应吉凶，就是说，大限的四化宫位，当流年进入该宫位时，吉凶事就发生了。\n\n大限孕育的事件，然必应于十年内的某一年，这就是“下应流年”的意思。大限十年的情况将会怎样？有三种看法：一种是看原盘禄忌成为流年的什么宫位来定，例如看凶事，主要看原盘冲宫成为流年的什么宫位来定，若原盘冲宫成为流年的子女宫，表对子女不利，而且子女为合伙宫，表示这一年合伙的事情会散伙；又如冲宫成为流年的财帛宫，表示这一年要破财；当冲宫成为流年的疾厄宫时，表示身体多灾，又疾厄受冲会损业倒店。第二种看法是看大限的禄忌成为流年的什么宫位，例如，大限化出的忌，流年走到该年就不利，流年走到忌冲之宫更不利。第三种看法是以流年化回去给命盘用。\n\
    \n流年化回给命盘用，就是以流年干飞四化，看入原命盘的什么宫位来看该年的吉凶，亦属“上应本命”，看“应数”，即是这一年会发生什么事。原命为“体”，流年为“用”。发生什么事？必须以原命盘十二宫的名称表意来论。例如，流年化忌入事业，表这一年埋头于事业，工作很积极，但劳而无功；忌冲夫妻，痴情工作，忘了夫妻，夫妻关系出问题；又依一六共宗，顺数至第六宫为田宅宫，冲六则一亡，田宅为财库，财库破，要破财了;用冲体，大凶。\n\
    \n大限是个转折点，一般流年的吉凶要在大限吉凶的基础上论断，也就是说要命、限、年三盘相扣来看。\n\n### （二）、中盘四化上传下应法\n\n中盘是个关键，是上下的转折点，所以特别重视中盘。中盘四化上应下传法，就是在上中下三级中，以中级的宫干飞四化，看四化飞入上级盘的什么宫位，即为“上传”；再以上级的这个宫位成为下级的同类宫位时为吉凶的应期，即为下应。\n\
    \n所谓同类，就是指不同级而同一名称之宫，例如，本命财帛宫与大限财帛宫或流年财帛宫为同类，本命事业宫与大限事业宫或流年事业宫为同类，其余类推。\n\n####\
    \ 吉事应验之期\n看中级宫化三吉，则会应于与上级盘“同类”坐宫的限年。例如大限化禄入本命的福德，表示本大限我关心赚钱，当本命的福德宫成为流年的福德宫时，也可以说流年的福德宫走到本命的福德宫时，此年财源滚滚来，福德与福德为同类。又如流年化禄入大限的事业宫，表示我关心事业，当大限的事业宫成为流月的事业宫时，也可以说当流月的事业宫走到大限的事业宫时，此月事业要发达了，事业与事业为同类。\n\
    \n#### 小结\n例如大限化禄入本命，当流年入本命，命与命为同类，则此年应吉；大限财帛化禄入寅宫，当流年的财帛宫入到寅宫时，便高升了，财帛与财帛为同类，寅宫与寅宫为同类。\n\
    \n#### 凶事应验之期\n看中转之宫的化忌，则会应于与上级盘“同类”相冲的流年。例如，大限疾厄宫化忌冲本命的田宅宫，主本大限财库破，当流年的田宅宫走到本命的田宅宫时，即流田被冲之年，则此年要破财，田宅与田宅为同类。又如，流年化忌冲大限的父母宫，主本年父母、文书契约、名誉有问题，当流月的父母宫走到大限的父母宫时，该月凶事要发生了，父母与父母为同类。其余类推。\n\
    \n#### 小结\n专看忌冲之宫，同类相冲凶事发，例如，大限化忌入迁冲大限，流年入大限宫时破败，命与命同类。若命宫化忌冲寅宫，当大限和流年均入到寅宫时，此年便破财了，寅宫与寅宫为同类。命、限、年三级同类相冲最凶。例如大限化忌冲本命，命冲命，为同类相冲，又是用冲体，此大限凶，命宫化出的忌，与破财有关，当流年进入本命宫时，此年必破财；大限财帛宫化忌冲本命的财帛宫，财帛与财帛为同类相冲，又是用冲体，此限凶，财帛化出的忌与事业有关，当流年财帛宫入本命财帛宫时便败业了。\n\
    \n**铁口断诀：** 本命宫化忌或忌冲：入大限父疾线；冲宫入流年的田、财应之。\n\n### （三）、综合论断法\n\n此法中盘转折、气数位、同类叠冲、一路跟踪等法并用。我们用命、限、年这三级来举例说明。先用命盘飞四化，一般只看禄忌；当命盘禄忌的宫位进入大限的父疾线时，换个说法，当大限父、疾宫进入命盘禄忌的宫位时，吉凶事就要发生在此大限运内；再看吉凶应此大限的那一年，吉事会应于与原命盘禄入同类相叠的流年，凶事会应于同类相冲的流年。例如，原盘命宫化忌冲夫妻，会失业倒店，当大限入子田线时，忌入的宫位成为大限的父疾线，倒霉事就会发生在这个大限，发生在哪一年？因命宫为财帛的气数位，与财有关，既然与财有关，依同类相冲论，当冲宫成为流年的财帛、田宅宫的流年发生（还可依一六同宗论，流年走到田宅宫最凶）。又例如，原盘命宫化禄入夫妻，婚后事业顺遂、发财利，当大限入子田线时，禄入的宫位成为大限的父疾线，发财事就会发生在这个大限，发生在哪一年？因命宫为财帛的气数位，与财有关，既然与财有关，依同类相叠论，当禄入的宫位成为流年的财帛、田宅宫的流年发生。\n\
    \n论流月、日、时的吉凶可仿上述方法分析。流年、月、日、时四化，较重视冲宫，不重视三合宫。\n\n## 三、纵横分析论断法\n\n看限年吉凶，可以原命盘的四化，一路留给大限、流年、流月、流日、流时用。以原命盘化出的四化（以禄、忌为主），一路从纵向、横向扩展来跟踪进行论断。\n\
    \n### 纵向\n纵向看，就是以原命盘四化（生年四化或命盘十二宫四化），一路留给大限、流年、流月、流日、流时等下级盆用。凡逢原命盘化三吉入（或照）而无忌冲的宫位主吉利，入或照限、年、月、日、时都主吉利；凡逢化忌入的宫位及限、年、月、日、时都主有阻滞，但不算凶，只要努力仍会成功；凡逢化忌冲照的宫位及限、年、月、日、时都主不利。\n\
    \n### 横向\n横向看，就是从宫与宫之间的关系看。原盘十二宫皆可为本宫（太极点，新命宫），按宫位太极转换法，重布命盘十二宫，例如以兄弟宫为新命宫，重布命盘十二宫，则原命盘十二宫的名称随之而改变，原命宫变为新盘的父母宫，就是兄弟的父母宫；原命盘的夫妻宫变为新盘的兄弟宫，也就是兄弟的兄弟宫。若以父母宫为新命宫，原盘夫妻宫变为父母的子女宫。其余类推。这样，一个宫位就可以变出十二个新名称，那么原盘十二个宫，就可以变化成\
    \ 12×12=144 个信息。仍以生年四化落宫为主宫，看其余十二宫与生年落宫之间的关系来论，还可再扩展到十二宫的十二宫与生年四化落宫的关系论，这样每个化曜就有\
    \ 144 个信息量；每一级就有 144×4 个信息；再扩展到限、年、月、日、时的十二宫与生年四化落宫的关系来论，信息容量更大，则论述的内容就相当丰富了。\n\
    \n例如，生年化忌冲夫妻，从正面来看，夫妻宫被冲，兆示这一生夫妻缘薄，夫妻关系不好；从同级横向扩展看，夫妻是父母的子女，父母的子女就是自己的兄弟，这样也就看出其人得不到兄弟的帮助；夫妻是兄弟的兄弟，兄友线主成就，表我对兄弟的成就无助；夫妻是福德的财帛，表示嗜好浪费；夫妻是田宅的疾厄，表示这人没有自己的房子，住宅是租的，且搬动频繁；夫妻是厨房位，冲就无厨房，房屋是公众式的，或是租住的房子，或厨房不好。其余类推。\n\
    \n再跟踪到下一级盘，看大限，看冲宫成为大限的什么官位？若为大财，财受冲，这十年的财运就不好了；如为大疾，疾厄为身体，疾厄逢冲则身体不好，又疾厄为公司、工厂、商店，所以本限内公司要破败或倒闭。再从大限的横向关系来看（参看命官化忌入各官）。\n\
    \n再跟踪到流年，看某年有什么事？就以冲宫成为流年的什么宫位来看？若冲宫刚好是流年宫，即流年本宫，凶力加倍，宫的星情好尚无大事，宫凶可要遭殃了；若冲宫成为流年的疾厄，不但主这一年身体不好，而且主其人的公司有问题；若冲宫成为流年的交友，交友是工友、朋友、工人，工人、工友出勤不出力，那还有什么搞头；若冲宫为流兄，表这一年兄弟有问题，自己也没有成就；若冲宫为流年的官禄，主事业有麻烦；冲宫为流年的福德，表财源出问题；冲宫为流年的子女，表子女的学习或事业有阻，又子女为合伙宫，表这一年要散伙；冲宫为流年的财帛，表这一年要破财；冲流田，财库出问题，要破财，家庭、家宅也有问题。还可从受冲的流年十二官横看（参看命官化忌入各官），例如，冲宫成为流田的兄弟宫，兄弟是田宅的财帛，受冲就表示家庭生活费用困难，经常寅吃卯粮。\n\
    \n接下来还可以上面的方法一路纵横向来跟踪到流月、流日、流时。\n\n原命盘的生年四化以及命、财、官等官四化入下级盘十二宫，只要入宫的名称相同，所发生的吉凶事体都会基本相似，例如四化入下级盘的父母宫，事情都与父母或文书有关；四化入下级盘的子女宫，事情都与子女有关；事情还可横向看；但事情发生的原因则会不同，事因与原命盘飞四化的官和星有关，还与气数位有关。\n\
    \n以上分析凶事的方法，最宜以原盘重病焦点问题之宫来进行分析，因为原盘存在的焦点问题，多会有凶事发生，我们就要分析发生于哪限哪年。例如，原命官禄官失陷化忌，为焦点问题宫，不但兆示事业凶，夫妻官和田宅宫都凶，当大限走到官禄宫时此十年麻烦事就多了，具体分析参看上术各法。\n\
    \n## 第十节 四化法的分类预测\n\n### △一、看人事、地位与运数\n以命官为本官，官禄宫为命宫的气数位，分析参看上节“气数位论断法”。\n\n####\
    \ 1. 光彩之源\n- **看哪一大限光彩**：就看那一大限的父母宫进入生年干化禄之宫。\n- **看哪一年光彩**：就看那一年的父母宫进入生年干化禄之宫。\n\
    - **谁（或什么事）给我带来光明**：就看谁化禄入父母宫。例如，福德化禄入父母，表得到祖公的荫助；迁移化禄入父母，表社会或外出工作带来光明。\n\n####\
    \ 2. 格局与声誉\n- 官禄化吉入命迁财福官田六强宫，主格局好，命格高。\n- **一生前途**：\n    - 官禄化禄入父母，一生前途光明，声誉高。\n\
    \    - 官禄宫化忌冲父母，一生不免官讼是非多，尤以文昌、文曲、廉贞化忌为最凶。\n    - 父母宫文昌自化忌，相当于忌冲的力量，表示先天就有官讼是非的气运存在。\n\
    \n#### 3. 官司与钱财的关联\n- **人事相关**：文昌在疾厄宫化忌冲父母，这种官讼是非与人事有关；文昌在父母宫化忌冲疾厄，疾厄为财帛的父母，故这种官讼是非与钱财有关。\n\
    - **应期判断**：官禄化忌入疾厄冲父母，当流年走到父母宫时，官讼是非就要发生，甚至失业倒闭。\n\n#### 4. 工作与健康调整\n限年干化忌冲疾厄，不是病了就是工作场所变动或工作单位不景气；若官禄宫有变动星（如杀破狼机等星）则主工作变动；若命财官宫好而疾厄宫差，说明身体或工作单位有问题，必须调理身体或调换单位，或转向第二职业，以寻求出路。\n\
    \n#### 5. 财运与爱好\n大限宫化忌入流年的福德官冲财帛宫，说明今年要破财，原因看福德宫，福德为爱好上出问题，爱好什么看星情，例如贪狼星爱好酒色赌博投机。\n\
    \n### △二、看事业\n\n#### 1. 论终生事业情况\n以官禄宫为本宫，财帛宫为官禄的气数位，所以，可以财帛宫干的四化来论事业的成败得失。\n\n\
    - **若财帛宫干化三吉入兄友线**：因兄友线是官禄的父疾线，因而一生前途光明，名气自然而然；\n    - 化权入兄友线，须经奋斗才能得名气，有成就（若化权入奴仆，表努力工作可以有成就名誉，但若财帛宫干又化忌入兄弟冲奴仆，则表求争来的名誉成就，到头来还是会失去）；\n\
    \    - 化科入兄友线，会得贵人提携而成功；\n    - 化忌入兄友线，则前途暗淡，无名气，不宜走求名路线，即不宜从政，只宜技艺或经商。若财帛宫化三吉入兄友线，而化忌也入兄友线，则表开始得到名气成就，但到头来还是会失去，禄忌同官更凶。\n\
    - **若财帛宫干化三吉入子田线**：因子田线是官禄的兄友线，主走经商路线，或在金融财经界工作，较有发财机遇。其中化禄主不费力气，化权主拼搏而得，化科主得人助。\n\
    - **若化忌入子田线**：则事业阻力大，不宜经商，只宜上班及技艺工作。\n\n#### 2. 其他情况\n四化不入兄友、子田线者，均属平常，不吉也不凶。\n\
    \n| 现象 | 说明 |\n| :--- | :--- |\n| 官禄忌入迁移冲命 / 命忌入迁 | 常换工作 |\n| 生年禄入官 | 事业平顺 |\n\
    \n#### - **2、有无老板命**\n- **(1) 星曜与宫位关系：**\n    - 男命以太阳星所在宫位飞化禄，女命以太阴星所在宫位飞化禄。\n\
    \    - 化禄入命、财、官等宫：为老板命。\n    - 化禄入子女宫、田宅宫：为无实权的老板。\n    - 化禄入疾厄宫：上班族。\n- **(2)\
    \ 大限与流年配合：**\n    - 大限化权入 A 宫照 B 宫，流年入 A 或 B 时会当老板。\n    - 具体而言：大限化权入 A 宫（为本命三方）照\
    \ B 宫；流年入 A 官，当实质 的老板；流年入 B 宫，当虚有的老板 (合伙业)。\n- **(3) 田宅与子女关系：**\n    - 田宅宫化忌入子女宫：不宜当老板。\n\
    \    - 田宅宫化禄入官禄宫：宜上班。\n\n#### - **3、从事职业**\n河洛法论行业，以财帛宫干去四化，看其所化的“忌禄权科”（按此次序排先后）入“命兄财疾官田”(亦按此次序排先后)\
    \ 的哪一宫，再以该宫的主星断大的行业，以副星辅助看细节。具体看法如下：\n\n- **(1)、先看化忌星入宫情况：**\n    - 顺序查看：化忌星是否入命宫？若是，则以命宫的星曜断人事的行业；若不是，再看化忌入兄弟官否？若是，则以兄弟宫的星曜断行业；依此类推（财帛、疾厄、官禄、田宅），若都不是则看下一步。\n\
    - **(2)、次看化禄星入宫情况：**\n    - 看法同上步，顺序看化禄星入命兄财疾官田等宫，先入到那一宫即以该宫的星耀来断行业。若化禄又不入上述诸宫时，再看下一步。\n\
    - **(3)、再看化权星入宫情况：**\n    - 看法同前，顺序看化权星入命兄财疾官田等宫，先入那一宫即以该宫的星曜来论行业。若化权又不入上述诸宫时，再看下一步。\n\
    - **(4)、再看化科星入宫情况：**\n    - 看法同前，顺序看化科星入命兄财疾官田等宫，先入那一宫即以该宫的星曜来断行业。\n\n经过此四步，必然能查出四化入宫。查出四化入宫后，即以该宫的星曜论行业。\n\
    \n**各星曜所主行业：**\n- **紫微星**：与高级、珍贵、高楼、公职、男人有关的行业；若会左右吉星，可为政府官员、单位第一把手、高级饭店、高级家俱、珍贵物店的大老板；若不会左右吉星，只可上班，可为政府机关的办事员，高级饭店、精致物店、古董店、高档货物店、钟表店、珍珠宝贝店的服务员或此类技术人员。\n\
    \    - 紫贪：高级雕塑品、高级酒店、高级舞厅。\n    - 紫府：官员、政府机关财务主管、公务员。\n- **天机星**：与转动或轴类有关的行业，如汽车、轮船、车床加工及零配件等；以及秘书、顾问、技术员、教师、渔业、果菜、统计、企划等；加魁钺为公务员、基层领导；加禄存为银行工作人员、生意人。\n\
    - **太阳星**：与动性、动力、能源、照明、电话、发电机类、中学老师、律师、代表、外交、跑腿等有关的行业；阳梁同宫，可为邮电、电话亭、电力、行政、执法等行业；阳梁加天刑，公安、军警，再加化权可为公安军警界的领导。\n\
    - **武曲星**：与武职、财务、金融、机械五金、重工、外科医生、生意等行业有关；武相同宫，除上述行业外，还可为娱乐、保险业；武破同官，还可为兽医、赌博、捕猎等业。武杀同宫，还可为大外科医师，军警。\n\
    - **天同星**：学术、服务、医药、教师、公职、管道等，宜较轻松自由没有压力的工作，还可为小吃、零食业、百货、装饰品等服务业及五术人员。不宜开创性及重责任的工作。\n\
    - **廉贞星**：精密细致的工作，与电视、电脑等带电的精密仪器有关的行业，行政，医生，军警，护士，艺术，理发，可从事水果业、门市生意，静止性的行业，不宜跑外务。丙年生人忌作电器业，因丙使廉贞化忌，电器故障率高。\n\
    \    - 廉杀：格调高者为包扎、打针等小外科医护人员，格调低者屠宰人员。\n    - 廉府：为金融、医生、行政、服装、仪器、农民等业。\n    -\
    \ 廉破：可为水果、杂货、肉类生意。\n    - 廉贪：电脑、电器、娱乐、演艺、教师等。\n- **天府星**：格调高者为行政、公职、畜牧、土地、保险、仓管等行业的领导，格调低者为上述行业的管理、打工人员或收钱员、农民。\n\
    - **太阴星**：旅游、运输、装饰品、化工原料、护士、文教、能源、出私车、内河船员、房地产管理、服务、洗洁精、演员等业。\n- **贪狼星**：幼儿园、小学教师、色情娱乐、饮食、木材、原材..."
  mdcn: "## 宫的气数位与四化入宫论断\n\n宫的气数位，奴仆宫干的四化入宫情况可看出父亲有无生气，也可看出本身有何暗疾、宿疾或不明原因的疾病。\n\n\
    疾厄为身体，兄弟为疾厄的气数位，故兄弟的四化决定身体的健康、寿数。\n\n如何同时看四化之间产生的复合作用呢？例如禄入兄友而忌入父疾，不能以双忌论。禄入兄友，表示走财经路线，事业有成；忌入父疾线，为文书是非一大堆；综合看，做生意做得很好，但常常和人家打官司；所以在选择事业上，应避免带文书契约的工作。如果禄入父疾而忌入兄友，则表示作文书或带经纪、服务性的工作较有成就，而搞投资经商则较会有麻烦。\n\
    \n如果禄、忌同宫或在对冲宫，以双忌论，但必须是同一宫干化出的禄、忌才算，不相干的宫位之化曜只作闲神看。例如，生年干庚使太阳化禄入父母宫，而命宫干甲又使太阳化忌入父母，这不能算双忌，而且此禄还有解忌的能力。所谓化解，不是抵消，而是减轻作用。\n\
    \n“气数位”化三吉入本宫的三方为吉；化忌入本宫的三方则有阻滞，但不算大凶；化忌冲本宫的三方则为大凶。\n\n问题是气数位化三吉入本宫父疾线、兄友线而又化忌入本宫的三方，或者化忌入本宫的父疾线、兄友线而又化三吉入本宫的三方，将如何论断呢？两者相互化解缓和作用，吉者减吉，凶者减凶。四化入本宫父疾线、兄友线为兆象、机遇，吉凶较虚；四化入三方，三方为“我”官，故吉凶较实；两者皆吉则增吉，一吉一忌则吉凶均减力。\n\
    \n原命、财、官三宫所化之忌，要入大限的父疾线才以大凶论；原命、财、官三宫所化三吉，要入大限的父疾线才以大吉论。\n\n## 二、上中下三级相扣论断法\n\n\
    这一方法要结合“命局与限年四化的关系”一节来看。四化分为命盘、大限、流年、流月、流日、流时等六级。“在天成象，在地成形，在人成事”的三阶段法则同样适用于这六级中的任意三级，但必须是从上到下的三级，结果可分为命、限、年一组，限、年、月一组，年、月、日一组，月、日、时一组，共组成四组上中下三级盘。以这些三级四化的关系来分析事情的发生、发展和结果，称为三级相扣论断法，主要用来断应期的，就是说，凡同一类人事吉凶必须以三级同看，上级兆示，中级定型，下级为应期。\n\
    \n本级四化的吉凶，首先兆示在本级，然后才发展到下级。原命局必然会有某个或吉或凶之人事；再看哪一大限中这个人事发展变化较大的，则吉凶就已基本定型，这个人事发展变化不大的大限则不用看；再看定型的大限中哪一年这个人事发展变化最大的，则吉凶的人事就必然在此年发生。例如，原局官禄落陷带煞化忌，兆示此人一生事业不利，当大限入官禄宫或大限官禄宫化忌冲本命官禄宫时则事业会大败，当流年入官禄宫或流官入忌冲之宫时，失业倒店就必然发生了。\n\
    \n上级盘为“体”，下级盘为“用”。例如，原盘化忌入大限，“体”冲“用”，凶事较轻，且仅主迹象；大限化忌冲原盘，“用”冲“体”，凶事必然发生，凶重，且主十年多凶。原盘化三吉入大限，吉小，且仅主迹象；大限化三吉入原盘，吉事必然发生，吉重，且主十年吉。大限与流年、流\
    \ 年与流月同理。\n\n上级盘的四化应于下级盘（如年对月）审迹象，下级盘的四化入上级盘（如月对年）断吉凶。应先审迹象而后断吉凶，也就是先审命盘而后看限运。\n\
    \n上级盘四化入下级盘（如生年入大限）审迹象，看“定数”，意思是下级某限年行到上级四化的宫位时，兆示该限年会有吉凶的迹象 (发生时间)，发生的吉凶事与四化入下级盘的宫名表意有关\
    \ (应于何人事)。例如，原盘化忌入疾厄宫，大限入到原盘父母宫，大限受忌冲，兆示此大限内自己会有不利的事情。但凶事会不会发生？与原局疾厄宫及父母宫的吉凶、大限四化及流年吉凶等都有关系，不可一概而论。\n\
    \n下级盘四化入上级盘（如大限入原盘）断吉凶，看“应数”，意思是本级四化入上级某宫，即对上级该宫有影响，表在什么时间什么地方发生了什么事，结果如何？发生的吉凶事与四化入上级盘的官名和星曜表意有关，但必须在原局兆示凶的情况下才会发生。例如，大限化禄入大限的什么宫位表示我这十年把心思放在什么地方，但是要看这步限将发生什么事情，必须看所入的这一宫位在原盘上是什么宫位，如果大限盘为夫妻表示这十年很疼老婆，但夫妻在原盘上是福德，表示此限我关心的是赚钱的事。又如，原局兆示父母凶，大限化忌冲原局父母，则主父母在此大限内必有不利事发生，什么事与星情表意有关，凶的程度，即结果与官的组合及旺衰有关。\n\
    \n上中下三级相扣论断法又分为三个方法，分论如下：\n\n### （一）、天人合一法\n\n原命盘化给大限用，大限化给流年用，流年化回去给命盘用，方外人前辈称为“天人合一”。我们把他扩展到其他上中下三级，以上级盘化给中级盘用，中级盘化给下级盘用，下级盘化回去给上级盘用，统称为天人合一法。\n\
    \n我们以命、限、年这三级为例来说明“天人合一”法的具体应用。\n\n原命盘化给大限用，就是原命盘的四化飞入大限十二宫的某官，就表该大限所发生的事与该大限的该宫名称表意有关。例如，原命宫化忌入大限的父母宫，麻烦事就与父母或文书契约有关；因是坐忌，麻烦事还不算大，大问题在忌冲之宫，忌冲疾厄，疾厄是身体、工作场所，表身体有灾疾，也表会失业倒店，依“一六共宗”，冲疾则命不保，是大破败的迹象。\n\
    \n同理，大限四化留给流年用，当流年走到大限四化宫时应吉凶，就是说，大限的四化宫位，当流年进入该宫位时，吉凶事就发生了。\n\n大限孕育的事件，然必应于十年内的某一年，这就是“下应流年”的意思。大限十年的情况将会怎样？有三种看法：一种是看原盘禄忌成为流年的什么宫位来定，例如看凶事，主要看原盘冲宫成为流年的什么宫位来定，若原盘冲宫成为流年的子女宫，表对子女不利，而且子女为合伙宫，表示这一年合伙的事情会散伙；又如冲宫成为流年的财帛宫，表示这一年要破财；当冲宫成为流年的疾厄宫时，表示身体多灾，又疾厄受冲会损业倒店。第二种看法是看大限的禄忌成为流年的什么宫位，例如，大限化出的忌，流年走到该年就不利，流年走到忌冲之宫更不利。第三种看法是以流年化回去给命盘用。\n\
    \n流年化回给命盘用，就是以流年干飞四化，看入原命盘的什么宫位来看该年的吉凶，亦属“上应本命”，看“应数”，即是这一年会发生什么事。原命为“体”，流年为“用”。发生什么事？必须以原命盘十二宫的名称表意来论。例如，流年化忌入事业，表这一年埋头于事业，工作很积极，但劳而无功；忌冲夫妻，痴情工作，忘了夫妻，夫妻关系出问题；又依一六共宗，顺数至第六宫为田宅宫，冲六则一亡，田宅为财库，财库破，要破财了;用冲体，大凶。\n\
    \n大限是个转折点，一般流年的吉凶要在大限吉凶的基础上论断，也就是说要命、限、年三盘相扣来看。\n\n### （二）、中盘四化上传下应法\n\n中盘是个关键，是上下的转折点，所以特别重视中盘。中盘四化上应下传法，就是在上中下三级中，以中级的宫干飞四化，看四化飞入上级盘的什么宫位，即为“上传”；再以上级的这个宫位成为下级的同类宫位时为吉凶的应期，即为下应。\n\
    \n所谓同类，就是指不同级而同一名称之宫，例如，本命财帛宫与大限财帛宫或流年财帛宫为同类，本命事业宫与大限事业宫或流年事业宫为同类，其余类推。\n\n####\
    \ 吉事应验之期\n看中级宫化三吉，则会应于与上级盘“同类”坐宫的限年。例如大限化禄入本命的福德，表示本大限我关心赚钱，当本命的福德宫成为流年的福德宫时，也可以说流年的福德宫走到本命的福德宫时，此年财源滚滚来，福德与福德为同类。又如流年化禄入大限的事业宫，表示我关心事业，当大限的事业宫成为流月的事业宫时，也可以说当流月的事业宫走到大限的事业宫时，此月事业要发达了，事业与事业为同类。\n\
    \n#### 小结\n例如大限化禄入本命，当流年入本命，命与命为同类，则此年应吉；大限财帛化禄入寅宫，当流年的财帛宫入到寅宫时，便高升了，财帛与财帛为同类，寅宫与寅宫为同类。\n\
    \n#### 凶事应验之期\n看中转之宫的化忌，则会应于与上级盘“同类”相冲的流年。例如，大限疾厄宫化忌冲本命的田宅宫，主本大限财库破，当流年的田宅宫走到本命的田宅宫时，即流田被冲之年，则此年要破财，田宅与田宅为同类。又如，流年化忌冲大限的父母宫，主本年父母、文书契约、名誉有问题，当流月的父母宫走到大限的父母宫时，该月凶事要发生了，父母与父母为同类。其余类推。\n\
    \n#### 小结\n专看忌冲之宫，同类相冲凶事发，例如，大限化忌入迁冲大限，流年入大限宫时破败，命与命同类。若命宫化忌冲寅宫，当大限和流年均入到寅宫时，此年便破财了，寅宫与寅宫为同类。命、限、年三级同类相冲最凶。例如大限化忌冲本命，命冲命，为同类相冲，又是用冲体，此大限凶，命宫化出的忌，与破财有关，当流年进入本命宫时，此年必破财；大限财帛宫化忌冲本命的财帛宫，财帛与财帛为同类相冲，又是用冲体，此限凶，财帛化出的忌与事业有关，当流年财帛宫入本命财帛宫时便败业了。\n\
    \n**铁口断诀：** 本命宫化忌或忌冲：入大限父疾线；冲宫入流年的田、财应之。\n\n### （三）、综合论断法\n\n此法中盘转折、气数位、同类叠冲、一路跟踪等法并用。我们用命、限、年这三级来举例说明。先用命盘飞四化，一般只看禄忌；当命盘禄忌的宫位进入大限的父疾线时，换个说法，当大限父、疾宫进入命盘禄忌的宫位时，吉凶事就要发生在此大限运内；再看吉凶应此大限的那一年，吉事会应于与原命盘禄入同类相叠的流年，凶事会应于同类相冲的流年。例如，原盘命宫化忌冲夫妻，会失业倒店，当大限入子田线时，忌入的宫位成为大限的父疾线，倒霉事就会发生在这个大限，发生在哪一年？因命宫为财帛的气数位，与财有关，既然与财有关，依同类相冲论，当冲宫成为流年的财帛、田宅宫的流年发生（还可依一六同宗论，流年走到田宅宫最凶）。又例如，原盘命宫化禄入夫妻，婚后事业顺遂、发财利，当大限入子田线时，禄入的宫位成为大限的父疾线，发财事就会发生在这个大限，发生在哪一年？因命宫为财帛的气数位，与财有关，既然与财有关，依同类相叠论，当禄入的宫位成为流年的财帛、田宅宫的流年发生。\n\
    \n论流月、日、时的吉凶可仿上述方法分析。流年、月、日、时四化，较重视冲宫，不重视三合宫。\n\n## 三、纵横分析论断法\n\n看限年吉凶，可以原命盘的四化，一路留给大限、流年、流月、流日、流时用。以原命盘化出的四化（以禄、忌为主），一路从纵向、横向扩展来跟踪进行论断。\n\
    \n### 纵向\n纵向看，就是以原命盘四化（生年四化或命盘十二宫四化），一路留给大限、流年、流月、流日、流时等下级盆用。凡逢原命盘化三吉入（或照）而无忌冲的宫位主吉利，入或照限、年、月、日、时都主吉利；凡逢化忌入的宫位及限、年、月、日、时都主有阻滞，但不算凶，只要努力仍会成功；凡逢化忌冲照的宫位及限、年、月、日、时都主不利。\n\
    \n### 横向\n横向看，就是从宫与宫之间的关系看。原盘十二宫皆可为本宫（太极点，新命宫），按宫位太极转换法，重布命盘十二宫，例如以兄弟宫为新命宫，重布命盘十二宫，则原命盘十二宫的名称随之而改变，原命宫变为新盘的父母宫，就是兄弟的父母宫；原命盘的夫妻宫变为新盘的兄弟宫，也就是兄弟的兄弟宫。若以父母宫为新命宫，原盘夫妻宫变为父母的子女宫。其余类推。这样，一个宫位就可以变出十二个新名称，那么原盘十二个宫，就可以变化成\
    \ 12×12=144 个信息。仍以生年四化落宫为主宫，看其余十二宫与生年落宫之间的关系来论，还可再扩展到十二宫的十二宫与生年四化落宫的关系论，这样每个化曜就有\
    \ 144 个信息量；每一级就有 144×4 个信息；再扩展到限、年、月、日、时的十二宫与生年四化落宫的关系来论，信息容量更大，则论述的内容就相当丰富了。\n\
    \n例如，生年化忌冲夫妻，从正面来看，夫妻宫被冲，兆示这一生夫妻缘薄，夫妻关系不好；从同级横向扩展看，夫妻是父母的子女，父母的子女就是自己的兄弟，这样也就看出其人得不到兄弟的帮助；夫妻是兄弟的兄弟，兄友线主成就，表我对兄弟的成就无助；夫妻是福德的财帛，表示嗜好浪费；夫妻是田宅的疾厄，表示这人没有自己的房子，住宅是租的，且搬动频繁；夫妻是厨房位，冲就无厨房，房屋是公众式的，或是租住的房子，或厨房不好。其余类推。\n\
    \n再跟踪到下一级盘，看大限，看冲宫成为大限的什么官位？若为大财，财受冲，这十年的财运就不好了；如为大疾，疾厄为身体，疾厄逢冲则身体不好，又疾厄为公司、工厂、商店，所以本限内公司要破败或倒闭。再从大限的横向关系来看（参看命官化忌入各官）。\n\
    \n再跟踪到流年，看某年有什么事？就以冲宫成为流年的什么宫位来看？若冲宫刚好是流年宫，即流年本宫，凶力加倍，宫的星情好尚无大事，宫凶可要遭殃了；若冲宫成为流年的疾厄，不但主这一年身体不好，而且主其人的公司有问题；若冲宫成为流年的交友，交友是工友、朋友、工人，工人、工友出勤不出力，那还有什么搞头；若冲宫为流兄，表这一年兄弟有问题，自己也没有成就；若冲宫为流年的官禄，主事业有麻烦；冲宫为流年的福德，表财源出问题；冲宫为流年的子女，表子女的学习或事业有阻，又子女为合伙宫，表这一年要散伙；冲宫为流年的财帛，表这一年要破财；冲流田，财库出问题，要破财，家庭、家宅也有问题。还可从受冲的流年十二官横看（参看命官化忌入各官），例如，冲宫成为流田的兄弟宫，兄弟是田宅的财帛，受冲就表示家庭生活费用困难，经常寅吃卯粮。\n\
    \n接下来还可以上面的方法一路纵横向来跟踪到流月、流日、流时。\n\n原命盘的生年四化以及命、财、官等官四化入下级盘十二宫，只要入宫的名称相同，所发生的吉凶事体都会基本相似，例如四化入下级盘的父母宫，事情都与父母或文书有关；四化入下级盘的子女宫，事情都与子女有关；事情还可横向看；但事情发生的原因则会不同，事因与原命盘飞四化的官和星有关，还与气数位有关。\n\
    \n以上分析凶事的方法，最宜以原盘重病焦点问题之宫来进行分析，因为原盘存在的焦点问题，多会有凶事发生，我们就要分析发生于哪限哪年。例如，原命官禄官失陷化忌，为焦点问题宫，不但兆示事业凶，夫妻官和田宅宫都凶，当大限走到官禄宫时此十年麻烦事就多了，具体分析参看上术各法。\n\
    \n## 第十节 四化法的分类预测\n\n### △一、看人事、地位与运数\n以命官为本官，官禄宫为命宫的气数位，分析参看上节“气数位论断法”。\n\n####\
    \ 1. 光彩之源\n- **看哪一大限光彩**：就看那一大限的父母宫进入生年干化禄之宫。\n- **看哪一年光彩**：就看那一年的父母宫进入生年干化禄之宫。\n\
    - **谁（或什么事）给我带来光明**：就看谁化禄入父母宫。例如，福德化禄入父母，表得到祖公的荫助；迁移化禄入父母，表社会或外出工作带来光明。\n\n####\
    \ 2. 格局与声誉\n- 官禄化吉入命迁财福官田六强宫，主格局好，命格高。\n- **一生前途**：\n    - 官禄化禄入父母，一生前途光明，声誉高。\n\
    \    - 官禄宫化忌冲父母，一生不免官讼是非多，尤以文昌、文曲、廉贞化忌为最凶。\n    - 父母宫文昌自化忌，相当于忌冲的力量，表示先天就有官讼是非的气运存在。\n\
    \n#### 3. 官司与钱财的关联\n- **人事相关**：文昌在疾厄宫化忌冲父母，这种官讼是非与人事有关；文昌在父母宫化忌冲疾厄，疾厄为财帛的父母，故这种官讼是非与钱财有关。\n\
    - **应期判断**：官禄化忌入疾厄冲父母，当流年走到父母宫时，官讼是非就要发生，甚至失业倒闭。\n\n#### 4. 工作与健康调整\n限年干化忌冲疾厄，不是病了就是工作场所变动或工作单位不景气；若官禄宫有变动星（如杀破狼机等星）则主工作变动；若命财官宫好而疾厄宫差，说明身体或工作单位有问题，必须调理身体或调换单位，或转向第二职业，以寻求出路。\n\
    \n#### 5. 财运与爱好\n大限宫化忌入流年的福德官冲财帛宫，说明今年要破财，原因看福德宫，福德为爱好上出问题，爱好什么看星情，例如贪狼星爱好酒色赌博投机。\n\
    \n### △二、看事业\n\n#### 1. 论终生事业情况\n以官禄宫为本宫，财帛宫为官禄的气数位，所以，可以财帛宫干的四化来论事业的成败得失。\n\n\
    - **若财帛宫干化三吉入兄友线**：因兄友线是官禄的父疾线，因而一生前途光明，名气自然而然；\n    - 化权入兄友线，须经奋斗才能得名气，有成就（若化权入奴仆，表努力工作可以有成就名誉，但若财帛宫干又化忌入兄弟冲奴仆，则表求争来的名誉成就，到头来还是会失去）；\n\
    \    - 化科入兄友线，会得贵人提携而成功；\n    - 化忌入兄友线，则前途暗淡，无名气，不宜走求名路线，即不宜从政，只宜技艺或经商。若财帛宫化三吉入兄友线，而化忌也入兄友线，则表开始得到名气成就，但到头来还是会失去，禄忌同官更凶。\n\
    - **若财帛宫干化三吉入子田线**：因子田线是官禄的兄友线，主走经商路线，或在金融财经界工作，较有发财机遇。其中化禄主不费力气，化权主拼搏而得，化科主得人助。\n\
    - **若化忌入子田线**：则事业阻力大，不宜经商，只宜上班及技艺工作。\n\n#### 2. 其他情况\n四化不入兄友、子田线者，均属平常，不吉也不凶。\n\
    \n| 现象 | 说明 |\n| :--- | :--- |\n| 官禄忌入迁移冲命 / 命忌入迁 | 常换工作 |\n| 生年禄入官 | 事业平顺 |\n\
    \n#### - **2、有无老板命**\n- **(1) 星曜与宫位关系：**\n    - 男命以太阳星所在宫位飞化禄，女命以太阴星所在宫位飞化禄。\n\
    \    - 化禄入命、财、官等宫：为老板命。\n    - 化禄入子女宫、田宅宫：为无实权的老板。\n    - 化禄入疾厄宫：上班族。\n- **(2)\
    \ 大限与流年配合：**\n    - 大限化权入 A 宫照 B 宫，流年入 A 或 B 时会当老板。\n    - 具体而言：大限化权入 A 宫（为本命三方）照\
    \ B 宫；流年入 A 官，当实质 的老板；流年入 B 宫，当虚有的老板 (合伙业)。\n- **(3) 田宅与子女关系：**\n    - 田宅宫化忌入子女宫：不宜当老板。\n\
    \    - 田宅宫化禄入官禄宫：宜上班。\n\n#### - **3、从事职业**\n河洛法论行业，以财帛宫干去四化，看其所化的“忌禄权科”（按此次序排先后）入“命兄财疾官田”(亦按此次序排先后)\
    \ 的哪一宫，再以该宫的主星断大的行业，以副星辅助看细节。具体看法如下：\n\n- **(1)、先看化忌星入宫情况：**\n    - 顺序查看：化忌星是否入命宫？若是，则以命宫的星曜断人事的行业；若不是，再看化忌入兄弟官否？若是，则以兄弟宫的星曜断行业；依此类推（财帛、疾厄、官禄、田宅），若都不是则看下一步。\n\
