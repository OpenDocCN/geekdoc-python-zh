    # 第十三章 八卦卦位应用简介


    第一节 简介


    八卦卦位应用法，就是根据八卦万物类象来进行推断人事物和发事的时间、空间的方法。在紫微斗数中，可根据用事用神的落宫所属八卦对应的万物类象来参断人事物。但应用中，本法只起配角作用，不能决定吉凶，是对已判定的人事物作更细致的揭示，揭示人事物的类型、象意和时间方位等。所以，在预测人事物及其吉凶中，必须配合星情法和四化法来进行，而且还必须看契机，即导火索，如大限、小限、流年引动，以及四化星的引动等。用田宅宫测家庭环境、用疾厄宫测疾病时最宜参考此章。


    例如，看六亲吉凶，可查看命盘中哪个六亲宫凶星多，可知相应的六亲隐伏着危机；再看大限该六亲的宫位凶否；若凶，再看小限该六亲宫凶否；若凶，再看流年天干的化忌星是否与小限宫同宫或在对宫冲照，若是，则凶灾暴发。若是子女宫凶，则应在子女身上。假如子女宫居午宫，宫中有擎羊、天刑、灾煞等凶星，逢对宫化忌冲动凶星的岁限应灾；是哪个子女应凶呢？这就可用到八卦卦位法，看子女宫在何地支宫，或以子女宫的天干去化忌，看入何宫，就先用八卦人物类象看属男还是女，是长男、中男、少男，还是长女、中女、少女等，然后再用四化详细判断是第几个孩子。例如入辰宫，从子女宫午逆数到辰，为
    3 数，故知是第三个孩子有刑伤；辰宫属龙，故知该子女的属相是属龙的；辰宫属巽卦，巽为长女。还可断伤在什么部位？在什么地方出事？此例辰宫属巽卦，巽为公园、在家的东南方、伤在左肢或股等。


    八卦以先天为体，后天为用，所以八卦卦位应用法以后天八卦为主。以卦位定疾病有一定的意义，例如，疾厄居酉，后天卦为兑，主后天易得肺经病；先天卦为坎，主先天易有肾脏、泌尿系疾病。其余类推。


    又如随机预测（即随时随意预测），可以求测时的年月日时起出紫微盘，以命宫或用神宫的星情定吉凶，以命宫或用神宫所属八卦方位及其卦象断应事事物的类型、发生的方位。例如，有人生病求测如何找医生？按问测时辰起出紫微盘，以福德宫干化科所入的卦位为贵人方，若是福德宫天干己使酉官的天梁星化科，酉为正西方，天梁是有执照的中医诊所、中医师，那就以本人住处为中心，往西方去找中医诊所的中医师看病；酉属兑卦，兑为少女，故为年轻的女医师；酉属鸡，故应找生肖属鸡或带金字傍姓名的女医师看病。


