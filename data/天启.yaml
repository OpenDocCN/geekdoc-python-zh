    人究竟到哪兒去了？她把每個骨灰罐擦乾之後，發現上面

    刻的全是日本人的名字，而且都是五、六十年前就託放在

    此處了，他們去世時的年齡，老少都有。


    原來他們是已經死去多年卻放不下自己骨灰的靈魂。

