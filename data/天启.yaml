    # 奇妙的修復者


    幾年前我的左腳背上長了一個約三公分的硬塊，穿鞋子時會磨擦到鞋子，所以很痛。每當我擔心時就祈禱，請上帝來幫我醫治它，然後耐心等待。然而幾個月過去了，它又增大一點，鞋子都快穿不進去，我開始擔心了。那天早上我忍不住跟上帝說：「祢再不來幫忙，明天我就非得去看醫生不可了，因為我擔心……。」


    那天我想睡午覺時，剛要闔眼，忽然看見有一個透明的人影，穿透我二樓窗戶的玻璃，直接走進我的臥室，然後在牆壁上寫一些化學方程式，一面寫一面用心電感應跟我解釋，這沒什麼，只是老舊細胞鈣化的陳積物，說完就走了。我趕緊起來摸摸我的腳背，奇蹟真的發生了，那硬塊不知不覺中已消失無蹤，一滴血也沒有的，不痛不癢的，對方甚至沒有觸摸到，就取走了它。這不是我自己幻想的，也不是夢，是清醒中看見的，我的先生和女兒都可以作證，他們倆人都看過我腳背的硬塊，也知道我的硬塊憑空消失的奇蹟（P.7圖）。


    親愛的上帝！謝謝祢為我展現奇蹟，但是我很好奇，這位奇妙的修復者究竟是誰呢？


    # 人體自動修復系統


    2017年11月中，我走路時不慎摔傷了右膝蓋，急診時X光顯示膝蓋骨折，醫生幫我打了石膏，回家靜養一個月。這期間我大多在電腦前工作，偶而想起就對膝蓋送些能量，或是觀想光來療癒它。過程中，感覺到腳底逐漸溫暖起來，似乎有活血的效果。


    有一晚我睡不著，就起床靜坐。當我頭腦放空時，忽然感覺全身的能量場開始自動運作，尤其是受傷部位，有強大能量場自動運轉。我看到能量在右腿附近像波浪一樣起伏，感覺能量集中修復受傷部位大約十分鐘。因此，右腿充滿了熱能，溫度居然超過正常的左腿。


    一個月後我去醫院回診，醫生幫我照X光時，對我豎起大拇指說：「你的腿骨癒合良好，可以開始練習走路，兩週後，你就會完全康復。」感謝醫生幫我診斷和打石膏，也感謝我們身體的自動療癒系統，讓我在一粒藥也沒吃的情況下，自動療癒了膝蓋骨。


    幸好，我平日有打坐靜心練功，必要時可以療癒自己。我深深體會到，當我們將情緒和思維全部放下時，可以變成強大的能量場療癒自己。


    # 信心的療癒力量


    大約十多年前，有一位朋友的兒子打電話告訴我，他的媽媽快死了，現在躺在床上不停的抖著，檢驗報告顯示她可能有子宮頸癌，我就說：「告訴你媽媽，她死不了的，她沒有癌，她只是發炎，不信再去檢查看看。」過十幾分鐘後，我朋友不抖了，起床打電話和我談得很開心，隔幾天，她又檢查一遍，檢驗報告顯示她只是發炎，很快就好了。


    幾年後她問我，為什麼我當時那麼肯定的說她死不了？我說：「因為我知道信心的力量，加上妳對我的信任，這樣妳就可以療癒自己。」


    心情保持愉快，完全信任，自我療癒的潛能就會發揮，把大病化小、小病化無。現在我的朋友活得積極快樂，參與許多活動，還經常把她的修行心得與大家分享。


    有一次我在朋友家遇見一位中年男性，雖是初見面，但我們在靈性成長的話題上，自然順暢的談了一個多小時。後來他告訴我，他當天開車回花蓮的途中，經過濱海公路時，他的眼睛忽然變得前所未有的明亮，可以看得很遠，景物清晰又鮮明，色彩很豐富，這情況維持了相當長的一段時間。


    事後，我問指導靈，為何有這樣的奇蹟？


    訊息是：由於當事人深信我那天所說有關靈性成長的話語，因此，他更信任上天了，所以他的能量迅速提升，而且，指導靈希望他能明白和體會修行很好，能對修行有信心，因此，在他身上展現奇蹟。


    # 量子療癒場


    大約在2006年Arthur老師介紹我們去看一個從加拿大BC省來的十九歲男孩亞當（Adam McLeod），他天生就可以看到人類及動物身上的光環（能量場），所以，他小時候最不解的是：為什麼要玩抓迷藏這種遊戲？因為，他可以看到人的大光環，當小朋友躲在樹幹後面時，對他而言，就好像一個人躲在掃帚柄後面一樣好笑。他一直以為每個人都和他一樣，可以看到這個彩色的人體光環。他甚至可以清楚透視人體內細胞運轉的情形，以及患病部位的情況。


    他可以調整人體器官內阻塞滯留的能量，使它在體內運行暢通，因此他治療了許多病人。但是，他建議人們自己調整身心，使自己經常保持在正面積極樂觀的狀態，才能真正治癒自己的疾病。（註：2018年秋季起，亞當博士已經不再接受病患了，他有更新的研究計畫和方向。）


    參加亞當的聚會那天，我們到了會場已經有幾百個聽眾在等候，大多是西方人，許多是病人。亞當翩然的出現了，他的眼眸流露出安寧和純淨，他那高雅和藹的雙親，以及可愛的弟弟妹妹陪伴著他一起出場。他的演說充滿了智慧與愛心，如果不了解靈魂年齡的不同，真難以相信一個高中剛畢業的少年會有如此深刻的見解。


    當他在會場慈悲的運用他與生俱來的能力，對全場的人放送治療能量時，我感受到能量之流，由他的一雙手掌中發射出來。那振動力一波一波像海浪一般的湧過來，這是自從我十幾年前練氣功以來，第一次感受到這樣強的能量，從一個人身上散發出來。原本我的左肩經常疼痛，忽然減輕許多，幾星期後，居然再也不痛了。


    當天我在台下默默的學亞當，去感受那三個上台接受他觀察病情的人的身體磁場。我發現自己也可以清楚的感受到他們不舒服或疼痛的部位。原來當我們靜下來時，都可以和別人的磁場能量溝通，比把脈問診還快速，而且距離多遠也可以。我發覺那些人的疾病大多是因為恐懼、壓力或思想過度負面而引起的。那些疾病原本可以避免的，如果人們養成正確的思維習慣，身體才能健康。


    亞當運用許多生動的影片講解如何排除體內的濁氣，如何導引體內的能量正確運行，如何治癒自己的身心。最後他感謝他的父母、朋友、已被他治癒的患者，以及所有幫助他的幕後工作人員的支持。他說，一個人的力量畢竟太小，團體的力量大，大家聯合起來，一起幫助地球上的人們，養成正面思想的習慣，人們才能享有更健康快樂的生活。


    # 學習自我療癒


    2018年，我的一位親戚（六十八歲）因為暈眩被送急診，才發現是肺癌末期患者，癌細胞已擴散到淋巴和腦部。她打電話問我，如果練氣功，是否對病情有幫助？其實，現在才想要練氣功似乎太遲了。我本想放下她，因為她年齡大了，思維很難改變。但是我又忍心見死不救，還是設法幫助她，所以就花一些時間幫她催眠，才發現她在幼年期有許多創傷和痛苦的經驗。


    我知道她兩星期後要再檢查一次，勸她要開心的過每一天，想辦法在這兩星期都過自己喜歡過的生活，把一切的煩惱都放下。由於細胞是因為生氣、不快樂，才扭曲成癌細胞，如果學會開心過生活，細胞會回復正常。


    她接受我的建言，努力嘗試開心的生活，也打坐靜心。十五天後檢查結果，她的癌細胞不只沒有擴散，左肺只剩一個約三公分大的點，腦和淋巴都是正常的。醫生很開心，決定幫她開刀治療，存活率很高。


    其實這不是奇蹟，當我們真正開心的活在每一個當下時，癌細胞絕對沒有孳生的理由和空間。


    # 呵護自己的方法


    如果頭腦有許多執著，想要擁有過多的事物，就很容易造成許多壓力，人際關係的緊張，身體細胞的混亂，各器官之間的不協調，脈輪之間的不平衡。那時，身體需要放鬆和休息。不需要等到疾病降臨，才開始休息和放鬆。如果身體出現病症，那是身體的智慧在發出警訊。


    日常生活中，好好呵護自己吧！放慢腳步，放鬆心情，享受生活的每一個當下。聽聽音樂，喝喝咖啡，細細咀嚼一片麵包，聞聞花草香，觀看可愛的小貓小狗，欣賞那空中的飛鳥，天邊的雲彩，燦爛輝煌的日出和日落……生活原本可以簡單、幸福、又豐盛的。


    # 活化身體的細胞


    放鬆坐著，

    柔和的看著自己的肌膚，充滿愛心的撫摸它們，

    輕柔的對身體的每一個細胞說話，讚美它們的完美，

    細胞是有意識的，有智力的，

    細胞被稱讚時，

    會活化，充滿生命力，變得光澤亮麗。


    你也可以在心裡對著家人的細胞說話，

    溫柔的讚美它們！

    那樣你的家人會更健康，也會很愛你，

    不由自主的來到你身邊。


    # 紫火的奇蹟


    2016年10月，我先生經常感覺頭暈，所以我們減少工作量，甚至常常兩三天都停工，讓他可以獲得足夠的休息。但是他的頭暈卻越來越嚴重，直到他走路不平衡晃動厲害，甚至無法自己洗澡。那天臨睡前，我問上帝：「我先生到底怎麼了？」


    夢中見到一本古書，書上有許多文字，其中一行字有光照射著，我湊近看仔細「你是那紫羅蘭色的火焰！」接著，另一幕出現，一些業障正在加緊攻擊他的身體。


    夢醒時，約清晨四點，我把他送進急診室，電腦斷層診療結果是中風，後腦有一條細血管堵塞。看著他逐漸無法集中對焦的一雙眼球，和無法平衡走路而晃動的身軀，我覺得心疼和無力感，不知道怎麼幫助他？


    我打電話給Arthur老師，問他該怎麼辦，並且把前一天的夢境告訴他。Arthur說：「你是那紫羅蘭色的火焰，就是上帝給你的答案，你快點用紫火燒掉那些業障！」非常感謝Arthur老師及時幫我解答夢訊息！（P.6圖）


    事實上，Arthur老師教給我們紫火已經將近十年了，我一直被自己的概念阻擋著，所以都沒練習，沒運用，也因此沒印證。


    我知道後，立即試著坐下來靜心，開始向上帝申請那神聖紫羅蘭色的火焰，燒掉我先生的業障。於是，我從智慧眼中看見有些類似蓮花形狀的紫色火焰從天上降下來，包圍他的身體。紫火中出現大約十個靈界的醫生，圍繞在我先生的身體四周，幫他醫病。然後許多像咖啡色葉片般的東西，從他身體裡飛出去消失，我猜那是濁氣或業障，我看到他回復強壯的身體。


    第二天我去看他時，他已經好了。可以起床自由行動，近乎正常行動的人。出院後不到一星期，復健科醫師也覺得他不需要復健了，只要參加一個長期的太極拳班就好了。醫師說：「太極拳可以放鬆和平衡身體，是很好的運動。」


    發表這篇文章，是為了見證上帝紫火的奇蹟，希望與大家分享上帝的愛，感謝上帝的恩典！感謝Arthur老師的指引！


    # 情緒篇


    - 情緒管理

    - 放下生死的恐懼

    - 情緒引來的笑話

    - 負面情緒的影響

    - 情緒失控的危險

    - 轉換情緒的良方


    # 情緒管理


    修行許多年後，我還是很容易生氣，我希望自己能改變習氣，所以向我的靈修導師請教如何改掉我的壞脾氣？他說：「我不覺得你脾氣壞，只是你情緒升起時比較激動，你要學會情緒管理，當自己情緒的主人，不要被情緒牽著走。」於是，我開始練習時時觀察自己情緒的起伏。


    平時，我很愛先生、孩子，但是，在整理環境時，常常把大家數落一頓，甚至罵得全家落荒而逃。有一次，先生跟孩子們都被我罵走了，因為我叫大家立刻滾蛋，我暫時不想看到他們。他們趕緊都撤出去之後，我很快就冷靜下來了。


    過了半小時，女兒從門縫探頭進來說：「媽媽你好了嗎？」我說：「早就好了，你們去了哪裡？」她說：「只是去車房，好多蚊子喲！」接著門開了，先生、兒子都跟著女兒溜進門，各就各位坐回自己電腦桌前。他們的姿態讓我聯想起以前媽媽養的母雞，總是喜歡走到窩裡，抖抖身子，整理好羽毛，安穩的坐著孵蛋的樣子。我有點啼笑皆非，沒想到自己的火爆情緒，竟然弄得三個我心愛的人兒不得安寧，還得去車房餵蚊子，真是不好意思！


    事後回想，我在發脾氣時是理直氣壯的，因為我認為都是他們造成髒亂的，可是為何之前的許多天，我都可以包容這個環境，對髒亂視而不見呢？而今天看了為什麼就會發脾氣呢？第二天，我發現自己月事來了，才想起，每次發生爭吵時，先生都會說：「你的月事快要來了吧！」他每次都猜對了。我才發現，自己的情緒經常受到生理期的影響，從此，我練習在生理期前後，盡量多休息，保持平靜和放鬆，生活簡單，避免造成不必要的壓力，讓家人都能享有平安和樂的生活。


    此外，我觀察到，自己情緒起伏的原因，多半來自對於名譽的得失心，尤其我對於被別人誣陷的情況，幾乎沒有免疫力，我會一直去辯解。我的導師Arthur經常接收天意來考驗我這個執著。每一次失敗後，導師會說，你怎麼又被我考倒了！直到有一天我終於感到厭煩了，不想再解釋了！導師問我：「你還在乎別人的批評嗎？」我說：「看淡得失，我已經懶得生氣了！」導師高興的說：「懶得生氣，就是過關了！」我說：「這樣也算過關啊？」他說：「因為不在乎了，才會懶得生氣，你已經不執著個人的名譽了！」


    我繼續練習觀察自己的每一個起心動念，是否還有任何執著？對於外界的人事物還有批評嗎？只要有執著、有批評，一定會產生負面情緒。因此，我練習感謝上帝送到面前來的每個人事物，學習去欣賞、接受，和無條件的愛'
  mdcn: '# 氣功與能量


    1994年學了先天氣功之後，開始明顯感受到能量，靜坐時也開始感受到磁場，內心更加平靜了，常常靜到可以察覺大約十幾公尺範圍的他人能量場。


    有一次氣功的同修們相約去拉拉山靜坐，深山中磁場特強，人煙稀少又安靜，更能清晰感受到別人的能量場。雖然我們閉上眼睛靜坐，但若有同修走近約兩百公尺內，就可以感受到他的振動波正在靠近，張開眼睛即可證實。尤其某位師兄到達時，他的能量場特別強，能感覺到一波一波的能量流，也能明顯從內視看到他的光能量場。


    我們可以開發和運用自己的內在潛能，如果我們只活在肉眼的層次，就只能看到外在表相的物質。武俠小說中有一些盲俠，可以從內在感知敵手的位置。這是真的，當我們靜心到一個程度，對能量的感知可以很清晰。


    氣功能在緊急時救人一命。那年我才剛學到氣功可以讓傷口止血。有一天開車外出，有位老先生喝醉酒，騎腳踏車來撞我們的車，他自己倒地後撞破頭，流出許多濃濃的血，把我們嚇壞了。先生打一一九找救護車，我用氣功送能量，先幫老人家止血。救護車來時，他已經止血了。


    > 醫護人員說：「這麼大的傷口，居然可以自己止血？！」


    送醫的路上，我一直牽著老人家的手傳送能量，並且專心念阿彌陀佛，在場的醫護人員都以為他是我的父親。幸好他沒有生命危險，也沒有內傷，只是額頭縫了幾針，真是不幸中之大幸啊！


    我們持續關注他幾個月，注意他的健康狀況。由於他是單身獨居，我們擔心他失血許多，需要補充營養，所以經常帶些食物、營養品和紅包給他，以表達我們的心意，直到他回復健康後，客氣的婉拒我們為止。


    ## 凝視的力量


    以前我練氣功時，師父說：「凝神收心」。光是練習這四個字，就對我有許多的助益！我發現在專注凝視時，可以送出能量，把自己或別人身上的污濁之氣排出體外，因而回復健康。吃素、練氣功不僅可以調整自己的能量，淨化自己的身心靈，還可以幫助自己和家人更健康。


    我兒子約七歲的時候，有一天他發燒了，我坐在他的旁邊看著他，應該說，我只是靜靜的凝視他的身體。幾分鐘後，我發現他身上飄出一陣黑色煙霧，並不是很明顯，我懷疑自己眼睛花了，或是幻覺。但是，這時他流汗了，我摸摸他的額頭，已經退燒了。這個方法我曾用在先生和孩子身上幾次，我印證了凝視確實可以逼出身上的濁氣。


    有一次我去朋友家，她三歲的女兒正在發高燒，約三十九度半，她讓我到孩子房間去看孩子，我說：「帶孩子去看醫生吧！免得燒過頭。」她說：「妳就幫我看看吧！」我不忍心拒絕正在擔憂的她，於是靜靜凝視她的女兒約五分鐘，隱約看到孩子身上飄出一陣陣的黑色煙霧，孩子又奇蹟似的立即退燒了。


    我並不想用這種方式去幫別人治病，因為，有一位靈性導師曾經告誡我們，不要用氣功幫人治病，原因是如果無緣無故拿走別人的功課，有可能必須幫別人擔負業障。所以，這個方法我只用在自己家人身上。


    二十幾年前，我的婆婆中風情況危急，醫生第三次發出病危通知時，我告訴父親，他希望我用氣功幫助婆婆止血。我說，師父是反對我們用氣功幫人治病的，我如果幫忙會有業障，因為這樣會拿走她的課程。


    父親說：「妳再不出手醫治她，過兩天她就出殯了，妳不會難過嗎？」因此，我回到醫院，伸出手到婆婆的頭部，送了许多能量給婆婆，止住她的大出血，她的病情因此穩定下來。


    到了晚上，我陪在婆婆身邊，看到婆婆一直說夢話，她不斷在跟夢裡的人辯論，其實，她白天是昏迷不醒的，不知夢裡為什麼頭腦那麼清楚，還能說那麼多話？辯論非常激烈，最後，她大聲說：「我絕對不走，那不是我的錯！」突然間，陷入一陣寂靜！感覺上，與她辯論的靈魂走了，我猜她的命是撿回來了。現在她已經多活二十幾年，身體雖然還差強人意，但是，可以自由的到處走動，已是不幸中之大幸了。


    至於擔負業障，我想也是難免的。但是自己的親人面臨生死存亡時，這還是一個愛的選擇。


    # 內境影響外境


    我們的情感和思維會影響我們的能量，我們的能量會影響我們周圍環境的能量場。因此，我們的內在情境影響我們的外在環境。比如，暴風雨是人們的集體意識形成的一個能量體。在物質界，人們聚集的負面思想能量，是以狂風的型態展現；人們的負面情緒能量，是以洪水的形態展現。因此，當許多人在擔心、恐懼、憤怒和不安時，他們的負面能量聚集起來，很容易引發暴風雨。


    我們可以觀察到，每當人們不信任政府、擔心世界局勢、擔心戰爭、擔心經濟不景氣、擔心通貨膨脹、或抱怨連天時，聚集起來的怨氣能量，非常容易引發颱風、地震、土石流等等災難，人們往往認為那是天災。殊不知，那其實是人禍。如果希望這世界風調雨順，我們最好時時保持正面的情感和思維，不要讓負面的情緒和思想汙染這世界，我們才能享有平安美好的生活。


    > 「自己就是所有外在惡事及困擾的唯一創造者，

    ……只要透過努力淨化自己的負面性，

    就能將任何外在的負面情境轉換為正面的。」

    ～摘自：赫萊瑞恩系列 《靈性的季節》～


    # 暗戀能量干擾


    大多數人都喜歡長得美麗、英俊或外表吸引人，可是如果有人暗戀你時，就不妙了！人們思念你時，會發出一種能量波，可能干擾你的睡眠，甚至導致嚴重失眠。


    有位師姐有一陣子半夜都睡不著，Arthur老師對她說：「你這陣子常常睡不著，是因為有異性整天想著你，他的能量糾纏著你，所以你會睡不著。你可以觀想一把大剪刀，把所有附著在你身上的別人的能量線剪掉。」後來，她試著練習『剪刀大法』，之後就睡得很好。


    事實上，那時有位男士一直在追求她，她是有夫之婦，當然不能接受這追求。那陣子她幾乎夜夜睡不著，飽受干擾，但她並不知道真實原因。幸好，經Arthur老師點醒，才解決了這個困擾。


    Arthur老師還提到，有些影歌星是許多人的偶像，甚至成為許多星迷的性幻想對象，可能不明原因的患失眠症，每天得吃安眠藥才能入睡，有些吃安眠藥過量、或自殺的，他們並不知道自己是被許多人的能量干擾太嚴重，所以痛苦到去自殺。


    ## 磁場與吸引力


    問：如何看待最近許多人對我的喜歡與思念？

    答：情境是我們安排的。

    能量產生的磁場是不可思議的，

