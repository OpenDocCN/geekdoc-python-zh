  md: '他們離去後，我們正興高采烈的討論當天的成長心得時，忽然門鈴響了！二姐夫的舅媽送來一大箱水果，打開後放上大圓桌，是滿滿的一桌香檳葡萄！上天透過親人，為我們送來了香檳，慶祝當天的圓滿豐收，多麼貼心的上天啊！


