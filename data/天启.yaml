  md: '# 發展創造性思維


    想要擁有優質的生活，必須多多學習創造性的事物，那麼，就會得到靈界的禮遇，會被安排比較完善的生活。上天為了讓我明白這個訊息，送了我一個象徵性的夢境。


    有一天，我夢到坐飛機，空服員說：「能拿出特殊才藝的證明，就可以坐在比較舒適的位置。」我女兒立刻從皮包中拿出文學和音樂家證明（夢中我才知道，因為她從小就喜歡閱讀，論文比賽得過全校前幾名，所以得到文學家證明。她也喜歡唱歌，從小學到高中都有參加學校合唱團，所以還擁有一張靈界頒發的音樂家證明。）她被安排在機艙中最前面的好的位置。另一位會拉小提琴的乘客，也拿出音樂家證明，所以也有好位置。


    我問說：「我喜歡畫畫，這樣有沒有藝術家位置？」空服員說：「當然可以！主要是因為學習文學、藝術、音樂和科學，可以刺激腦前葉，發展創造性思維。靈界敬重這些努力學習和成長的人，會給予特別的福利，也會安排更好的生活給這些人，其他人只能坐在後面的艙等。」


    第五部、居家修行 / 259'
