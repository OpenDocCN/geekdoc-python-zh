    # 兩個我


    很小的時候，我就發現有兩個我。


    在夢中，我總是在飛行，常常夢到自己半夜飛到星空中看地球，有時飛在黃沙遍野的沙漠，有時坐在火車頂上穿越山洞～居然毫髮無傷，有時站在峻嶺之巔，看著漫天的星辰，有時飛到風光明媚的地方，看到成群的鳳凰，它們身上柔軟閃亮的綠色羽毛，散發著高雅的氣質。


    每當我飛回家裡，進入臥室之際，看見床上有另一個熟睡的自已，瞬間就能進入身體。我發現的兩個我，一個是半夜會飛出體外遊玩的靈體，一個是身體。


    當我們的思維更單純更清淨時，常常可以感知自己的靈體。靈體可以自由進出身體，遨遊宇宙，或是回到靈界和靈魂弟兄們在一起，討論個人的課程，或是大家共同的課程。最容易感知的時間是在睡夢中，夢到自己離體出外，輕鬆飛翔。平時在生活中，也會感到很輕鬆，走路時感覺身輕如燕，健步如飛。'
