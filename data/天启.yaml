    我們希望此書像一面鏡子，

    讓修行者照出自己的缺失，逐步修正。


    問：有些人不知道什麼是正確的思想？

    答：正確思想是正面、樂觀、進取、

    輕鬆、自在、活潑、開朗、有建設性，

    負面思想，沉重，總往壞處想，那會產生負面能量，

    因此負面思想太多的人會造成疾病及家庭運勢破敗。

    負面情緒過多的人，好像運氣特別不好，

    彷彿所有的不如意都跟著他似的，

    因為，思想會產生能量，所以我們必須提醒自己，

    想一些好的事，當然未來會有好的果實。

    未來會更好，這是我們該深信不疑的！

    即使真的碰到不如意，也要明白那是上帝的恩典，

    考驗會使我們成長，是上天賜給我們的成長機會。

    也許外在肉體在老化，但內在靈性卻日日在成長，

    一切都不用擔憂，樂觀其成。


    問：可否舉負面思想的實例？

    答：有些人尚未出門就擔心下雨、或被車子撞到，

    坐飛機時，又擔心飛機掉下去，

    有人婚後擔心生不出孩子，懷了孕又擔心胎兒畸形，'
  - '[PAGE 123]


    孩子剛生下來，就擔心他是否能養大，

    剛找到工作，就擔心失業，

    每天擔心一大堆事情，怎麼會不生病呢？

    那些負面情緒會導致免疫力下降，中樞神經障礙。

    所以我們得時時提醒自己，擺脫負面思想的習慣，

    凡事都往好處去想，把挫折當成考驗，

    才能成功的走向美好的未來。


    問：有些天災人禍，是人類無法抗拒的？

    答：世界上幾乎日日都有災難發生，

    雖然那些災難是一些定業，

    但是也啟發許多人修道的想法，

    讓人們深入的省思，從而尋求內在的力量。

    所以連外表看來最壞的事，都還是上帝的恩典，

    更何況是那些好事情！

    每一件事都是上天精心安排讓我們靈性成長的課程，

    沒有一件事是專門用來傷害我們的心智，

    除非你自己，沒有人能真正毀滅你，

    其實，就連你自己，也不能毀滅你自己，

    因為，真我是永生不死的，我們是恆久的存在。

    上帝就在我們心中，永遠與我們同在。

    傾聽上帝的聲音，

    直接與上帝溝通，明白上帝的旨意，

    知道自己的定位，重新創造自己的未來。'
  - '[PAGE 124]


    問：我的閉關方式，有沒有需要改進？

    答：你強烈執著於打坐，

    但我們希望你「記錄修行的須知和方法」，

    這是救眾生的工作，也是你與我們的共同大願，

    你覺得哪一個重要呢？


    問：救眾生固然重要，但我自己都還沒有修成？

    答：你以為什麼是修成？長了翅膀？還是羽化登仙？


    問：至少是和萬物同一體！

    答：那還不容易，你一直是「與萬物同一體」！

    無論你是在寫字時、睡覺時、打坐時，都是。


    問：我感覺不到！

    答：放下內心的障礙，

    放下對時間空間的觀念，

    放下所有對立的想法，不做任何分別，

    實相世界就會自然呈現！


    問：雖然我聽懂你們的每句話，但覺得好空泛，很無力。

    答：盡量往內集中吧，神性是在我們內邊，

    向外尋找，是緣木求魚，永遠不可能尋得。


    問：我閉關中吃的食物會不會影響修行品質？

    答：不要去分辨食物對你的影響，集中精神在修行。'
  - '[PAGE 125]


    食物的影響不大，如果你一直在食物上打轉，

    對物質的困惑如此之深，你如何專心呢？

    重要是你有沒有專注於一心，時時刻刻在集中狀態。


    問：我四天中瘦了三磅呢！

    答：你太擔心物質的身體，擔心到瘦了三磅，

    別在閉關中刻意減少飲食然後浪費能量去擔心健康。


    問：吃素食的優點是什麼？

    答：振動力比較高

    身體比較健康

    思想容易正面

    打坐時容易進入禪定


    問：昨天半夜，我的孩子突然很激動的大聲抗議，

    因為我的閉關使他感覺寂寞無聊，而且必須很安靜，

    他連講話還得低聲的講，他說他快瘋了！

    答：他被外界的負面力量利用，來干擾你的修行，

    不要擔心，繼續努力，

    我們會盡全力保護你不受干擾。

    你只要心平氣和的，完成此生中最重大的突破即可。

    十五天轉眼即過，珍惜每一日每一時，

    你會有意想不到的收穫與成就！

    你身邊有許多我們的工作人員，

    就像是拍電影時，主角旁有一大堆人，'
  - '[PAGE 126]


    像導演、工具組、道具組、臨時演員等等，

    大家都忙裡忙外的。

    你做的只是最舒服的工作，

    任務是「頭腦放空，接收我們的訊息」，

    你越認真，我們做得越起勁，

    別忘了，我們正在拍一部，你即將成就的電影，

    只是我們的鏡頭在半空中。


    問：好奇妙啊！

    答：任何一個眾生想成就，我們就會全力以赴，

    別忘了，我們都是上帝的孩子。


    問：每一個證悟的人，都像我一樣的方式嗎？

    答：每個人有每個人的方式，因為習性與層次不同，

    所呈現出的開悟方式，就完全不同。

    而你是經由「內在聲音」回來，

    那是我們與生俱來的能力，

    內在聲音是一種振動力的波動，

    我們順著我們振波發出的音流回家，

    就像收音機的接收頻道，

    那是我們唯一的頻道，

    能夠找回我們的無上力量，

    進入實相世界～那永恆的天國。'
  - '[PAGE 127]


    問：我目前的修行方向？

    答：喚醒你的無上智慧，走進實相世界。


    問：我都知道了，我並未開悟？

    答：真理躲在「全然不思考」的背後。


    問：你們叫我不再思維？

    答：放下頭腦的成見，你就可以順利走進實相。


    問：如何放下？

    答：靜默，傾聽內在的聲音，走入內在的家園。

    這是最後的指示！


    2002.07.24午後三點


    問：昨天頭很痛？

    答：調整能量，打開頂門。


    問：我覺得現在，頭頂有奇異的感覺。

    答：頂門穴開，用以突破小周天。


    問：小周天。

    答：即肉身的循環系統，

    一旦調整在最適當和諧的狀態，才能突破，

    進入大周天（與萬物同一體）。'
- md: "## 2002.07.26 中午\n\n問：我現在覺得連救眾生也只是一個夢哩？\n\n答：很好，你醒來的程度更高了，你已完全明白物質界，是虛假短暫的存在，與永恆生命比，人生百年幾乎是不存在的，幻滅的。所以，即使是渡化眾生，也只不過是極短暫的剎那，所以你認為那不能算是實際的存在，只像場夢而已。你就在醒來的邊緣，只差臨門一腳！\n\
    \n問：臨門一腳？\n\n答：全然放下！\n\n既然一切都不值得思維，就不要思維，回到實相世界，你內心的永恆國度～完美的境界。最後，請你就連「醒來」也要放下，醒來與作夢仍是對立的，開悟與不開悟也是對立的，放下對立，才能遠離物質層次。\n\
    \n此時，我完全放下一切雜念，一種全然的釋放，沒有掛礙，沒有分別，沒有思維的我，所看到、覺察到的世界是出奇的奧妙！\n\n我忽然發現，連空氣和微風都是充滿了愛的流動能量，而且感受到這個能量流經我時，溫柔的輕撫了我的臉龐，好像我們一向熟悉彼此的存在，原來連空氣都是活生生的智慧生命體！我無法形容出我真正的感覺，空氣～其實不是空的～是一種柔軟綿密的物質，充滿了整個虛空，空氣中也充滿了神性～上帝！原來上帝無所不在！我瞬間體驗到空中的妙有，感覺到空氣像一些看不見的河流在流動，而且這些流動的空氣充滿慈愛。\n\
    \n原來，我們一直活在這個充滿愛的能量的宇宙中，只是沒有一刻撤除重重的心防，真正靜下來，去體驗「萬物同一體」的感覺，希望每一個人都能自己親身去感覺宇宙的愛力，進入精神界去體驗純淨無瑕之美！我們必須「放下對物質界的思考習慣」才能看到真理！\n\
    \n2002.07.27\n\n...............\n\n感謝上帝！以及一切幫助過我的靈性導師們！無論是人間或是天上界的高等靈！我覺得我重新醒來，對整個世界有全新的認知，我告訴丈夫，我看到實相世界了！他笑說：「很簡單嘛！不必像密勒日巴修道時那麼辛苦，吃草吃成一個綠絨人！」這時我忽然順口唱起一首傷心的歌「每日思念你一人」，奇怪的是，我一點也感受不到悲傷，還唱得十分快樂。真是一切唯心造！如果你是一個快樂的人，你找不到一首傷心的歌。難怪我小時候，聽那些失戀、哀怨的歌，覺得十分無聊。原來失戀的情緒也是執著於舊愛的人所產生的負面情緒。世間尚有許多美好的事物存在，何必執著逝去的戀情？就像是想要抓住剛剛拂過身邊的微風一樣，了不可得。物質界沒有永恆的事物，即使愛人沒離開，時間也會過去，人也會自然老化死亡，這是物質界的定律。看破放下，才能得到永恆的寧靜。\n\
    \n我看到屋外每一個走過的路人，都以不同的膚色、姿態、氣質，展現不同的美和生命力，騎著腳踏車的少女、牽著孩子的母親、背著書包的學生、提著工作箱的中年男子、白髮蒼蒼的老人…都有他們特殊型態的美感。我看到人們神性中的品質：自在、無憂、愉悅，從鏡子裡，我頭一次不批評自己的臉，覺得自己長得正好，即使是一絲皺紋，也是美得恰恰好。我覺得身處天堂，在這夏日的午後，從我的窗口看去，彷彿看到從未注意過的生命實相，我看到屋外的每一棵樹，都長得剛剛好，恰好應該長在那裡，無論是色澤、形狀、或大小，都構成最完美的畫面。一隻鴿子，從我眼前快速飛過，我能清晰的看見每一個細微的展翅和勁道～好像慢動作一樣，那閃耀繽紛色彩羽毛的翅膀，充滿了生命力之美，令我深深的感動！所有人、動物、植物、都美得恰到好處，無懈可擊。原來我一直是身處天堂。這四十七年來，我第一次體驗到生命是如此值得讚嘆的。深深的感謝實相世界的指導靈！感謝他們細心引導我！讓我看到並且感覺到萬物的莊嚴華美！\n\
    \n我對著桌上那嚴肅的達摩祖師雕像，忍不住告訴它：「微笑吧！沒什麼值得那麼嚴肅的！」只要我們放下對週遭一切事物的執著，只是純然的欣賞，你會發現一切眼前的事物，都是生機盎然，居然～連空氣都充滿了智慧和能量！\n\
    \n## 2002.07.28\n\n一大早醒來，覺得全身都充滿了能量！躺在床上也一直看到光、聽到內在的聲音，看著屋外的清晨，剛下過雨，一切格外清新。最快樂的是：我已經覺察到，萬事萬物都是能量形成的。我們是永恆的存在，輪迴轉世也只是換個面貌而已，只要心境是天堂，就時時處在天堂中。我知道我會很滿足於一切，直到未來，因為，我找到永恆的生命。我覺得，既然連微風都充滿了愛的能量，而在這宇宙中，我們還有數不盡的高等境界的朋友，我們又怎麼會孤獨寂寞呢？我覺得自己時刻徜徉於一片愛海中。我從來沒有想到同一體的感覺是與空氣都同一體，是那樣親密的同一體！\n\
    \n希望每一個眾生，都能體驗同一體的境界，那是圓滿、無缺、充滿愛力的國度！它其實一直在我們身邊，只是我們心太忙了，無暇去察覺罷了！\n\n證入同一體之後，雖然看不到靈體的成長，卻感覺得到，我們會得到自然神通，可以利益眾生，因為上帝的力量可以輕易的透過我們，傳送給祖先、朋友、甚至不認識的人，我們可以自然無為的幫助眾生提升（超生）。這種利人利己的事，在物質界中勝過任何一種布施。\n\
    \n深深祝福大家精進修行，早日進入同一體！\n\n## 宇宙能量場\n\n在我首次進入同一體時，看到和感覺到的是～「宇宙能量場」～無限豐盈的能量充滿著我們所認為的空間，這帶給我許多震撼，這能量是我們和宇宙一體性的存在。在一體性的能量一道、神性之中，沒有恐懼和困惑，覺得圓滿、平安、平等、平靜、舒服、被呵護、被照顧、充滿愛和喜悅⋯⋯。當我們的心非常平靜時，可以看到，也可以感覺到這湧動的、活潑的、充滿生命力的、愛的、慈悲的能量。整個宇宙空間，充滿了流動和交織的能量漩渦。\n\
    \n梵谷的《星夜，Starry Night》（P.8下圖）畫裡月亮與閃亮的各星球之間的能量彷彿在旋轉的筆觸，和宇宙能量場的流動非常近似。我猜想，梵谷在專心作畫時，也曾觸及與感受到這亙古存在的能量場，所以試圖用畫筆去展現它。一般人們肉眼所見的空間，其實並非空空如也，它充滿著宇宙能量流。這能量流像海洋波浪一樣的湧動著，當它流經我們身邊時，輕柔的撫觸我們的肌膚，我們可以感受到它的愛。有些人覺得自己缺乏愛，其實宇宙愛力的能量流充滿我們身體的內和外。無法感受能量流的人們，就很像魚兒一直在水裡游來游去，卻無法感知自己正是在水中。\n\
    \n## 進入同一體前，需要修正的習性：\n\n- 一、注意力偏重物質\n  偏重物質，忽略靈性的人，感受不到宇宙能量場。看淡物質，提升靈性，才容易進入同一體的頻率。\n\
    \n- 二、批評心和分別心\n  有分別心時，會產生孤立和匱乏的幻覺，這與一體性的品質相違。批評或排斥任何人事物時，會形成煙霧般的能量，阻礙與訊息場的連結和交流，因此無法進入同一體。批評時，能量容易流失。當一個人真正發自內心與所有的人事物化敵為友、和平共處時，能量會自然的擴展，因為那時更接近同一體的頻率。\n\
    \n## 對治批評心的方法：\n\n- 一、接受、包容和欣賞所有人事物的本然。\n- 二、站在他人的立場思考，理解他人正在學習的課程。\n- 三、練習在日常生活中沒有批評心。\n\
    \n如果在日常生活中不能接納和原諒許多人事物，有許多情緒起伏，及各種是非善惡等等「二元對立」的念頭，都會干擾內心的平靜，因此無法觸及一體靈性。由於頭腦容易批評，所以要練習觀察每一個起心動念，去除雜念，養成頭腦的良好紀律，逐漸放下批評的習性。\n\
    \n## 練習進入同一體的方法：\n\n- 一、提升能量\n  運作「全能量」是進入同一體最快捷的方法。醒著時都保持在全能量狀態，就好像泡在能量流裡，很容易進入同一體。\n\
    \n- 二、無條件服務\n  願意「無條件」服務的人，原則上，是希望大家都好，當一個人具有平等心和無條件的愛時，他的振動力相當接近同一體，因此容易進入宇宙訊息場。\n\
    \n- 三、祈禱\n  祈禱是與神的意識以及能量交流，是主動進入訊息場的一種方法。\n\n- 四、查訊息（聆聽天意）\n  查訊息是主動接觸宇宙訊息場的一種方法，查詢過程中必須平靜，有愛心，因此容易進入同一體。\n\
    \n## 超渡親族\n\n在我剛進入同一體之際，靈魂一直處於很忙的狀態，常常夢見自己一戶戶的去許多親族的住所拜訪。當我進入他們的客廳時，就會有許多親人，老老少少，大排長龍的合掌走進來，朝著我微笑致敬。當我合掌回敬時，對方的腳似乎有些動搖，接著就輕輕的飄浮起來，每一位都開心的、笑瞇瞇的向我道謝，然後，像天使一般成群的飄著、飛著離開了！\n\
    \n原來超渡人們的靈魂是這麼有趣的事情，太奇妙啦！\n\n有一次，我夢見我去一個很大的廣場～類似球場的地方，裡面約有上萬人吧！由於我坐下來就會打坐，並且習慣開始啟動能量，於是能量場迅速擴展，忽然球場裡所有的人都接收到能量，不由自主的飄起來，白日飛升了！\n\
    \n不過，偌大的球場裡，居然有兩個靈魂留在原地，我好奇的靠近問他們：「為什麼不走呢？」他們沒說話，表情不開心，遇到這樣執著的靈魂，似乎也不能強求，只能放他們自由吧！\n\
    \n## 宇宙定位\n\n我終於明白自己在宇宙中的定位，我是由上帝分支出來的一個能量，這個能量可大可小，全在意念的變化。如果把自己充滿愛力與喜悅的能量，那麼所有接觸到我的能量團的人，都能感受到那股愛的能量及喜悅，因而學習取得能量與成長。\n\
    \n我們不是侷限在一個小小肉體中的一個肉身，我們可以隨時從上帝那裡取得無限的能量照亮眾生的心，讓眾生逐漸明白自己也是一個能量場的地位，我們都是平等的，能量也是不滅的。所以當我們死時，只是拋下肉身障礙，能量卻隨即前往更適合我們的空間，再充電，再進步。我忽然發現自己是一個發光的能量團，我不再只是個由骨骼、皮膚、頭髮、眼睛等等物質所構成的一個生命體。我們隨時都可以是一個充滿宇宙能量的發光體，照亮每一個眾生的心。\n\
    \n## 永恆的記憶\n\n當你知道生命是無止境的，當你真正明白我們與所有生命都息息相關，我們不停的投生來創造新的生命共同體時，你會變得無所畏懼！既然是無止境的生命，我們就不被時間束縛，我們擁有無限的時間，我們超脫了生死的幻相。在每一個當下，我們活得自在快樂。人們一向緊張不安，因為人們以為時間有限，生命短暫。人們迷失在時間幻相中，被死亡陰影逼得快樂不起來。然而，人生只是如同一場戲。幾億萬年來，我們都以不同的角色，在天界，在人間，在六道中，扮演著一幕一幕的戲劇。我們的「真我」只是靜觀著，祂不生也不死，不會衰老也不會受傷害，永遠安然自在。祂只見證一切喜怒哀樂，祂沒有任何批判。當你平靜下來，不像一般眾生那樣貪生怕死時，你的無上智慧會逐漸顯露出來。你會知道時間與空間都是不實際存在的，所以，突破時間與空間的「想法」，喚醒自己永恆的記憶吧！\n\
    \n# 第三部\n永生的靈魂\n\n- 兩個我\n- 通靈者\n- 預知時至\n- 生死有命\n- 執著的老母\n- 執著的靈魂\n- 迷失的天人\n- 夢中的大餐\n\
    - 借來的命盤\n\n- 靈魂的結合\n- 靈魂的團體\n- 靈界醫療團\n- 楚門的世界\n- 靈界的排演\n- 靈界的照顧\n- 動物靈轉生\n- 靈體的樣貌\n\
    - 墮胎和嬰靈\n\n![](img/3a2e865c13e3ce69f7f5ead8dcaa3507_140_0.png)\n\n## 兩個我\n\n很小的時候，我就發現有兩個我。\n\
    \n在夢中，我總是在飛行，常常夢到自己半夜飛到星空中看地球，有時飛在黃沙遍野的沙漠，有時坐在火車頂上穿越山洞～居然毫髮無傷，有時站在峻嶺之巔，看著漫天的星辰，有時飛到風光明媚的地方，看到成群的鳳凰，它們身上柔軟閃亮的綠色羽毛，散發著高雅的氣質。\n\
    \n每當我飛回家裡，進入臥室之際，看見床上有另一個熟睡的自已，瞬間就能進入身體。我發現的兩個我，一個是半夜會飛出體外遊玩的靈體，一個是身體。\n\n當我們的思維更單純更清淨時，常常可以感知自己的靈體。靈體可以自由進出身體，遨遊宇宙，或是回到靈界和靈魂弟兄們在一起，討論個人的課程，或是大家共同的課程。最容易感知的時間是在睡夢中，夢到自己離體出外，輕鬆飛翔。平時在生活中，也會感到很輕鬆，走路時感覺身輕如燕，健步如飛。\n\
    \n## 通靈者\n\n我父親年輕時認識一個可以隨時隨地看到靈界的人，這個人在妻子去世時，因為過度悲傷竟然哭瞎了一隻眼睛，沒想到從此以後，他可以看到靈界眾生，聽說是靈界同情他的癡情，只好讓他可以隨時看到他已過世的妻子。\n\
    \n起先大家以為他想妻子想瘋了，因為他邊走路，邊打招呼，可是前方並無來人，不知道究竟他看到什麼，而且他常對著空氣講話，又不像自言自語。\n\n有一天，村子裡有人去世，剛好抬棺經過他的身邊，他突然把耳朵貼到棺材上聽死者說話。然後，他轉頭傳達訊息給死者家屬，說是他在家中某塊磚頭下藏有一些錢。大家半信半疑的回家查看，真的找到錢了！從此他變成村人心目中的算命仙，因為他預告的未來一律應驗。\n\
    \n有一天，父親坐火車時與他同車，他忽然對著父親說：「你現在有五個女兒了！」\n\n父親說：「不對，只有四個。」\n\n他也不在意，還把五個女兒的來歷，脾氣，個性及特色，和未來的命運都介紹了！他並且安慰父親說：「你將會如願喜獲麟兒，不過那得等到你頭髮開始白的時候。」\n\
    \n父親回家以後告訴母親，去醫院檢查，才證實母親真的懷孕了，次年生下第五個女兒。又過了幾年，確實在父親開始有白髮時，總算得到盼望已久的兒子。\n\n大多數人總是以為看不見的事物一定不存在，實際上靈界才是真實的世界呢！而我們都是來自於永恆的靈性。\n\
    \n## 預知時至\n\n公公重病期間，我常為他送飯去醫院。有一天，他一反常態，神采奕奕的坐在病床上，很嚴肅的環顧著病房四周，說了幾次：「環境都變了！跟以前都不一樣了！」\n\
    \n我知道，他的神識已經接近中陰身狀態，偶而可以看見靈界了。其實，人在即將進入靈界之前，靈體已經逐漸脫離肉身，所以開始可以看到靈界。\n\n他說：「今天換了這張床比較舒服，我也洗澡了。這個房間很暖，前幾天好冷。」我慶幸他在靈界的境界不錯，是乾淨舒適溫暖的。其實，自從入院以來，他的病房及病床一直沒有改變過。他一直喊冷，而且睡得不舒服。但是他現在看到、感覺到的是靈界的景象，所以，跟以前都不一樣了。\n\
    \n他又說：「從明天起不要再送飯來了！」一向無神論的婆婆以為他腦子混亂了，胡言亂語，叫我別理他。\n\n我想今晚是他最後一夜了，我得趁半夜他身旁無人時，去提醒他如何面對靈界。要離開人世時，最好是跟隨發光的佛菩薩或天使走，才能往生光明的境界。（《西藏生死書》已有詳細的說明，讀者可參考，本書不在此詳述。)\n\
    \n當夜我找他談話，他回顧了此生經歷的各種考驗，他恭喜我的修行方向是對的，他相當遺憾自己以前不知道要修行，我說：「您也盡力了！」他露出無奈的笑容。\n\n\
    第二天，我帶著全家去見他最後一面，這時他老人家已無法言語，比手勢要走了，婆婆大哭大叫，不肯讓他走。\n\n公公一時心軟，就暫時沒走，當天夜裡趁著婆婆不在場時，公公還是悄悄的離開了人間。\n\
    \n我們在親人往生之際，切記：絕對不要哭叫！那是不利他們的行為，會拖延和阻礙親人往生善處。真正愛他們的方式有許多種，比如，可以為他們誦經，想著光和愛，送給他們，祝福他們隨著光明的佛菩薩或高靈往生善處！祝福他們進入另一個嶄新的生命旅程！……\n\
    \n## 生死有命\n\n就在移民加拿大前，台北發生一次五級的大地震。當時我住三樓，覺得天搖地動，挺嚇人的！我跑到四樓找母親，想要安慰她。同時，小妹也從五樓跑下來找母親，我們都沒想到母親正很悠哉的在煮湯圓。妹妹看著大湯鍋說：「哇！這麼大的地震，湯圓竟然沒震出來啊！」母親說：「是啊！」\n\
    \n我說：「媽！房子搖成這樣妳不害怕嗎？」\n\n媽媽平靜的說：「有什麼好怕的？生死都是注定的。我小時候台灣曾經發生一次大地震。那次，有個鄰居的小孩在放學回家的路上經過土地公廟，看見一群人大排長龍，他的親戚、朋友、鄰居以及許多陌生人都被捆綁著，排隊依序走進土地公廟。本來土地公廟是小小的，那時好像變大了。他看見自己的父母也在隊伍中，就大聲呼喊並且往土地公廟跑過去。那時土地公廟忽然變回原來的大小，那些人物都消失了。他有不祥之感，立即朝回家的路上奔跑。忽然間，大地開始搖晃震動，當他跑到家時，他家及附近的房子皆已崩塌，他之前看見的那些走進土地公廟的人們，都被壓死了。」\n\
    \n聽了這個故事以後，我對地震真的沒那麼怕了！反正，生死是注定的嘛！\n\n## 執著的老母\n\n我在多倫多市有一個無神論的朋友，前兩天突然來電，原來她那年齡近百，中風臥床約十年的老母，最近總是說著一些奇怪的話，她說她的床上睡了另外兩個人，一直在拿她的財物，所以她就一直罵那兩個人，每天晚上鬧得全家都睡不著，雞犬不寧的。\n\
    \n有時老太太還會一人扮演兩個角色。她會用莊嚴的口穩說：「我是觀世音菩薩，我來帶妳去轉世了！」接著，她又轉換為小女孩稚嫩的聲音，撒嬌的說：「我不走！我不要去，我的女兒和孫子們都對我很好，我要留下來讓她們照顧。」\n\
    \n觀世音菩薩的聲音更嚴肅的說：「妳已經讓全家人守著妳，照顧妳那麼久，他們有自己的功課要學習，妳一直在這裡會影響他們的學習，也浪費妳自己的時間，沒有成長。」接著，老太太又變成小女孩的聲音嬌滴滴的說：「不要，不要！我絕對不走，我要和他們在一起！」這時，菩薩的聲音又開始不斷的曉以大義⋯⋯。\n\
    \n朋友問我怎麼辦？\n\n我說，她的時間到了，菩薩來引領是很好的，將會往生善處，不會有任何痛苦，只是放下肉體就走！如果她一直執著在這個老朽枯乾，行動不便的驅殼裡，連大小便都要別人打理，自己也像個犯人一樣，每天臥病在床，哪裡也不能去，這樣多麼不自由啊！還不如換一個年輕活潑、健康有朝氣、充滿生命力的身體，再回到世間繼續學習成長，這樣記憶力好，學習力也強。\n\
    \n朋友問：「那兩個睡在我母親身邊的靈魂怎麼辦？」\n\n我回答：「念地藏經迴向給他們，請對方原諒，請他們跟隨觀世音菩薩往生善處。」她立刻向我借《地藏菩薩本願經》回去念了。\n\
    \n## 執著的靈魂\n\n我小學同學的姊姊大學畢業後，看破紅塵在北投山上一家寺院出家，她那個寺院放置著許多骨灰罐，有些似乎沒人祭拜，年代久遠，散發陣陣霉味。\n\
    \n有一天她看到太陽高照，一時心血來潮，就好心的把一些骨灰罐搬到屋外去曬。沒想到忽然變了天，一陣突然來的雷雨，她正要衝出大門去搶救那些骨灰罐，門口忽然擠進來許多日本人，男女、老少都有，每個人身上都淋得濕答答的，像落湯雞一般。奇怪的是，他們全都是古代日本和服的打扮。\n\
    \n她想，等會再招待他們吧！所以匆忙奪門而出，前後不到一分鐘的時間，當她抱著骨灰罐回到室內時，裡面居然靜悄悄的，空無一人。這個寺廟後面沒有門，這一大群人究竟到哪兒去了？她把每個骨灰罐擦乾之後，發現上面刻的全是日本人的名字，而且都是五、六十年前就託放在此處了，他們去世時的年齡，老少都有。\n\
    \n原來他們是已經死去多年卻放不下自己骨灰的靈魂。其實他們可以選擇投胎轉世，到世間來修行，卻仍守在骨灰罐附近。\n\n有一個得證天眼通的修行人，走到墳地，看到一個老人的靈魂，坐在他自己的墓碑上哭泣。這個修行人問他：「您在哭什麼？」老人魂說：「我死了呀！」修行人說：「你的靈魂沒有死，你不是坐在這兒說話嗎？」老人仍不停的說：「明明就是死了！才會躺在下面的，不是嗎？」這修行人說不過他，只好離開了。\n\
    \n有些執著的靈魂會以為那過去的身體就是他本人，所以就不捨得離開自己的墓穴，死守在那兒，幾十年甚至幾百年，過著像孤魂野鬼的歲月，真是可憐！在有生之年不知修行，智慧不開，死後一樣過著無明的日子。要知道，肉身只是像衣服一樣，用壞之後要立即捨棄，不要執著一件舊衣服不放，應當尋找更美好的未來！"
  mdcn: "## 2002.07.26 中午\n\n問：我現在覺得連救眾生也只是一個夢哩？\n\n答：很好，你醒來的程度更高了，你已完全明白物質界，是虛假短暫的存在，與永恆生命比，人生百年幾乎是不存在的，幻滅的。所以，即使是渡化眾生，也只不過是極短暫的剎那，所以你認為那不能算是實際的存在，只像場夢而已。你就在醒來的邊緣，只差臨門一腳！\n\
    \n問：臨門一腳？\n\n答：全然放下！\n\n既然一切都不值得思維，就不要思維，回到實相世界，你內心的永恆國度～完美的境界。最後，請你就連「醒來」也要放下，醒來與作夢仍是對立的，開悟與不開悟也是對立的，放下對立，才能遠離物質層次。\n\
    \n此時，我完全放下一切雜念，一種全然的釋放，沒有掛礙，沒有分別，沒有思維的我，所看到、覺察到的世界是出奇的奧妙！\n\n我忽然發現，連空氣和微風都是充滿了愛的流動能量，而且感受到這個能量流經我時，溫柔的輕撫了我的臉龐，好像我們一向熟悉彼此的存在，原來連空氣都是活生生的智慧生命體！我無法形容出我真正的感覺，空氣～其實不是空的～是一種柔軟綿密的物質，充滿了整個虛空，空氣中也充滿了神性～上帝！原來上帝無所不在！我瞬間體驗到空中的妙有，感覺到空氣像一些看不見的河流在流動，而且這些流動的空氣充滿慈愛。\n\
    \n原來，我們一直活在這個充滿愛的能量的宇宙中，只是沒有一刻撤除重重的心防，真正靜下來，去體驗「萬物同一體」的感覺，希望每一個人都能自己親身去感覺宇宙的愛力，進入精神界去體驗純淨無瑕之美！我們必須「放下對物質界的思考習慣」才能看到真理！\n\
    \n2002.07.27\n\n...............\n\n感謝上帝！以及一切幫助過我的靈性導師們！無論是人間或是天上界的高等靈！我覺得我重新醒來，對整個世界有全新的認知，我告訴丈夫，我看到實相世界了！他笑說：「很簡單嘛！不必像密勒日巴修道時那麼辛苦，吃草吃成一個綠絨人！」這時我忽然順口唱起一首傷心的歌「每日思念你一人」，奇怪的是，我一點也感受不到悲傷，還唱得十分快樂。真是一切唯心造！如果你是一個快樂的人，你找不到一首傷心的歌。難怪我小時候，聽那些失戀、哀怨的歌，覺得十分無聊。原來失戀的情緒也是執著於舊愛的人所產生的負面情緒。世間尚有許多美好的事物存在，何必執著逝去的戀情？就像是想要抓住剛剛拂過身邊的微風一樣，了不可得。物質界沒有永恆的事物，即使愛人沒離開，時間也會過去，人也會自然老化死亡，這是物質界的定律。看破放下，才能得到永恆的寧靜。\n\
    \n我看到屋外每一個走過的路人，都以不同的膚色、姿態、氣質，展現不同的美和生命力，騎著腳踏車的少女、牽著孩子的母親、背著書包的學生、提著工作箱的中年男子、白髮蒼蒼的老人…都有他們特殊型態的美感。我看到人們神性中的品質：自在、無憂、愉悅，從鏡子裡，我頭一次不批評自己的臉，覺得自己長得正好，即使是一絲皺紋，也是美得恰恰好。我覺得身處天堂，在這夏日的午後，從我的窗口看去，彷彿看到從未注意過的生命實相，我看到屋外的每一棵樹，都長得剛剛好，恰好應該長在那裡，無論是色澤、形狀、或大小，都構成最完美的畫面。一隻鴿子，從我眼前快速飛過，我能清晰的看見每一個細微的展翅和勁道～好像慢動作一樣，那閃耀繽紛色彩羽毛的翅膀，充滿了生命力之美，令我深深的感動！所有人、動物、植物、都美得恰到好處，無懈可擊。原來我一直是身處天堂。這四十七年來，我第一次體驗到生命是如此值得讚嘆的。深深的感謝實相世界的指導靈！感謝他們細心引導我！讓我看到並且感覺到萬物的莊嚴華美！\n\
    \n我對著桌上那嚴肅的達摩祖師雕像，忍不住告訴它：「微笑吧！沒什麼值得那麼嚴肅的！」只要我們放下對週遭一切事物的執著，只是純然的欣賞，你會發現一切眼前的事物，都是生機盎然，居然～連空氣都充滿了智慧和能量！\n\
    \n## 2002.07.28\n\n一大早醒來，覺得全身都充滿了能量！躺在床上也一直看到光、聽到內在的聲音，看著屋外的清晨，剛下過雨，一切格外清新。最快樂的是：我已經覺察到，萬事萬物都是能量形成的。我們是永恆的存在，輪迴轉世也只是換個面貌而已，只要心境是天堂，就時時處在天堂中。我知道我會很滿足於一切，直到未來，因為，我找到永恆的生命。我覺得，既然連微風都充滿了愛的能量，而在這宇宙中，我們還有數不盡的高等境界的朋友，我們又怎麼會孤獨寂寞呢？我覺得自己時刻徜徉於一片愛海中。我從來沒有想到同一體的感覺是與空氣都同一體，是那樣親密的同一體！\n\
    \n希望每一個眾生，都能體驗同一體的境界，那是圓滿、無缺、充滿愛力的國度！它其實一直在我們身邊，只是我們心太忙了，無暇去察覺罷了！\n\n證入同一體之後，雖然看不到靈體的成長，卻感覺得到，我們會得到自然神通，可以利益眾生，因為上帝的力量可以輕易的透過我們，傳送給祖先、朋友、甚至不認識的人，我們可以自然無為的幫助眾生提升（超生）。這種利人利己的事，在物質界中勝過任何一種布施。\n\
    \n深深祝福大家精進修行，早日進入同一體！\n\n## 宇宙能量場\n\n在我首次進入同一體時，看到和感覺到的是～「宇宙能量場」～無限豐盈的能量充滿著我們所認為的空間，這帶給我許多震撼，這能量是我們和宇宙一體性的存在。在一體性的能量一道、神性之中，沒有恐懼和困惑，覺得圓滿、平安、平等、平靜、舒服、被呵護、被照顧、充滿愛和喜悅⋯⋯。當我們的心非常平靜時，可以看到，也可以感覺到這湧動的、活潑的、充滿生命力的、愛的、慈悲的能量。整個宇宙空間，充滿了流動和交織的能量漩渦。\n\
    \n梵谷的《星夜，Starry Night》（P.8下圖）畫裡月亮與閃亮的各星球之間的能量彷彿在旋轉的筆觸，和宇宙能量場的流動非常近似。我猜想，梵谷在專心作畫時，也曾觸及與感受到這亙古存在的能量場，所以試圖用畫筆去展現它。一般人們肉眼所見的空間，其實並非空空如也，它充滿著宇宙能量流。這能量流像海洋波浪一樣的湧動著，當它流經我們身邊時，輕柔的撫觸我們的肌膚，我們可以感受到它的愛。有些人覺得自己缺乏愛，其實宇宙愛力的能量流充滿我們身體的內和外。無法感受能量流的人們，就很像魚兒一直在水裡游來游去，卻無法感知自己正是在水中。\n\
    \n## 進入同一體前，需要修正的習性：\n\n- 一、注意力偏重物質\n  偏重物質，忽略靈性的人，感受不到宇宙能量場。看淡物質，提升靈性，才容易進入同一體的頻率。\n\
    \n- 二、批評心和分別心\n  有分別心時，會產生孤立和匱乏的幻覺，這與一體性的品質相違。批評或排斥任何人事物時，會形成煙霧般的能量，阻礙與訊息場的連結和交流，因此無法進入同一體。批評時，能量容易流失。當一個人真正發自內心與所有的人事物化敵為友、和平共處時，能量會自然的擴展，因為那時更接近同一體的頻率。\n\
    \n## 對治批評心的方法：\n\n- 一、接受、包容和欣賞所有人事物的本然。\n- 二、站在他人的立場思考，理解他人正在學習的課程。\n- 三、練習在日常生活中沒有批評心。\n\
    \n如果在日常生活中不能接納和原諒許多人事物，有許多情緒起伏，及各種是非善惡等等「二元對立」的念頭，都會干擾內心的平靜，因此無法觸及一體靈性。由於頭腦容易批評，所以要練習觀察每一個起心動念，去除雜念，養成頭腦的良好紀律，逐漸放下批評的習性。\n\
    \n## 練習進入同一體的方法：\n\n- 一、提升能量\n  運作「全能量」是進入同一體最快捷的方法。醒著時都保持在全能量狀態，就好像泡在能量流裡，很容易進入同一體。\n\
    \n- 二、無條件服務\n  願意「無條件」服務的人，原則上，是希望大家都好，當一個人具有平等心和無條件的愛時，他的振動力相當接近同一體，因此容易進入宇宙訊息場。\n\
    \n- 三、祈禱\n  祈禱是與神的意識以及能量交流，是主動進入訊息場的一種方法。\n\n- 四、查訊息（聆聽天意）\n  查訊息是主動接觸宇宙訊息場的一種方法，查詢過程中必須平靜，有愛心，因此容易進入同一體。\n\
    \n## 超渡親族\n\n在我剛進入同一體之際，靈魂一直處於很忙的狀態，常常夢見自己一戶戶的去許多親族的住所拜訪。當我進入他們的客廳時，就會有許多親人，老老少少，大排長龍的合掌走進來，朝著我微笑致敬。當我合掌回敬時，對方的腳似乎有些動搖，接著就輕輕的飄浮起來，每一位都開心的、笑瞇瞇的向我道謝，然後，像天使一般成群的飄著、飛著離開了！\n\
    \n原來超渡人們的靈魂是這麼有趣的事情，太奇妙啦！\n\n有一次，我夢見我去一個很大的廣場～類似球場的地方，裡面約有上萬人吧！由於我坐下來就會打坐，並且習慣開始啟動能量，於是能量場迅速擴展，忽然球場裡所有的人都接收到能量，不由自主的飄起來，白日飛升了！\n\
    \n不過，偌大的球場裡，居然有兩個靈魂留在原地，我好奇的靠近問他們：「為什麼不走呢？」他們沒說話，表情不開心，遇到這樣執著的靈魂，似乎也不能強求，只能放他們自由吧！\n\
    \n## 宇宙定位\n\n我終於明白自己在宇宙中的定位，我是由上帝分支出來的一個能量，這個能量可大可小，全在意念的變化。如果把自己充滿愛力與喜悅的能量，那麼所有接觸到我的能量團的人，都能感受到那股愛的能量及喜悅，因而學習取得能量與成長。\n\
    \n我們不是侷限在一個小小肉體中的一個肉身，我們可以隨時從上帝那裡取得無限的能量照亮眾生的心，讓眾生逐漸明白自己也是一個能量場的地位，我們都是平等的，能量也是不滅的。所以當我們死時，只是拋下肉身障礙，能量卻隨即前往更適合我們的空間，再充電，再進步。我忽然發現自己是一個發光的能量團，我不再只是個由骨骼、皮膚、頭髮、眼睛等等物質所構成的一個生命體。我們隨時都可以是一個充滿宇宙能量的發光體，照亮每一個眾生的心。\n\
    \n## 永恆的記憶\n\n當你知道生命是無止境的，當你真正明白我們與所有生命都息息相關，我們不停的投生來創造新的生命共同體時，你會變得無所畏懼！既然是無止境的生命，我們就不被時間束縛，我們擁有無限的時間，我們超脫了生死的幻相。在每一個當下，我們活得自在快樂。人們一向緊張不安，因為人們以為時間有限，生命短暫。人們迷失在時間幻相中，被死亡陰影逼得快樂不起來。然而，人生只是如同一場戲。幾億萬年來，我們都以不同的角色，在天界，在人間，在六道中，扮演著一幕一幕的戲劇。我們的「真我」只是靜觀著，祂不生也不死，不會衰老也不會受傷害，永遠安然自在。祂只見證一切喜怒哀樂，祂沒有任何批判。當你平靜下來，不像一般眾生那樣貪生怕死時，你的無上智慧會逐漸顯露出來。你會知道時間與空間都是不實際存在的，所以，突破時間與空間的「想法」，喚醒自己永恆的記憶吧！\n\
    \n# 第三部\n永生的靈魂\n\n- 兩個我\n- 通靈者\n- 預知時至\n- 生死有命\n- 執著的老母\n- 執著的靈魂\n- 迷失的天人\n- 夢中的大餐\n\
    - 借來的命盤\n\n- 靈魂的結合\n- 靈魂的團體\n- 靈界醫療團\n- 楚門的世界\n- 靈界的排演\n- 靈界的照顧\n- 動物靈轉生\n- 靈體的樣貌\n\
    - 墮胎和嬰靈\n\n![](img/3a2e865c13e3ce69f7f5ead8dcaa3507_140_0.png)\n\n## 兩個我\n\n很小的時候，我就發現有兩個我。\n\
    \n在夢中，我總是在飛行，常常夢到自己半夜飛到星空中看地球，有時飛在黃沙遍野的沙漠，有時坐在火車頂上穿越山洞～居然毫髮無傷，有時站在峻嶺之巔，看著漫天的星辰，有時飛到風光明媚的地方，看到成群的鳳凰，它們身上柔軟閃亮的綠色羽毛，散發著高雅的氣質。\n\
    \n每當我飛回家裡，進入臥室之際，看見床上有另一個熟睡的自已，瞬間就能進入身體。我發現的兩個我，一個是半夜會飛出體外遊玩的靈體，一個是身體。\n\n當我們的思維更單純更清淨時，常常可以感知自己的靈體。靈體可以自由進出身體，遨遊宇宙，或是回到靈界和靈魂弟兄們在一起，討論個人的課程，或是大家共同的課程。最容易感知的時間是在睡夢中，夢到自己離體出外，輕鬆飛翔。平時在生活中，也會感到很輕鬆，走路時感覺身輕如燕，健步如飛。\n\
    \n## 通靈者\n\n我父親年輕時認識一個可以隨時隨地看到靈界的人，這個人在妻子去世時，因為過度悲傷竟然哭瞎了一隻眼睛，沒想到從此以後，他可以看到靈界眾生，聽說是靈界同情他的癡情，只好讓他可以隨時看到他已過世的妻子。\n\
    \n起先大家以為他想妻子想瘋了，因為他邊走路，邊打招呼，可是前方並無來人，不知道究竟他看到什麼，而且他常對著空氣講話，又不像自言自語。\n\n有一天，村子裡有人去世，剛好抬棺經過他的身邊，他突然把耳朵貼到棺材上聽死者說話。然後，他轉頭傳達訊息給死者家屬，說是他在家中某塊磚頭下藏有一些錢。大家半信半疑的回家查看，真的找到錢了！從此他變成村人心目中的算命仙，因為他預告的未來一律應驗。\n\
    \n有一天，父親坐火車時與他同車，他忽然對著父親說：「你現在有五個女兒了！」\n\n父親說：「不對，只有四個。」\n\n他也不在意，還把五個女兒的來歷，脾氣，個性及特色，和未來的命運都介紹了！他並且安慰父親說：「你將會如願喜獲麟兒，不過那得等到你頭髮開始白的時候。」\n\
    \n父親回家以後告訴母親，去醫院檢查，才證實母親真的懷孕了，次年生下第五個女兒。又過了幾年，確實在父親開始有白髮時，總算得到盼望已久的兒子。\n\n大多數人總是以為看不見的事物一定不存在，實際上靈界才是真實的世界呢！而我們都是來自於永恆的靈性。\n\
    \n## 預知時至\n\n公公重病期間，我常為他送飯去醫院。有一天，他一反常態，神采奕奕的坐在病床上，很嚴肅的環顧著病房四周，說了幾次：「環境都變了！跟以前都不一樣了！」\n\
    \n我知道，他的神識已經接近中陰身狀態，偶而可以看見靈界了。其實，人在即將進入靈界之前，靈體已經逐漸脫離肉身，所以開始可以看到靈界。\n\n他說：「今天換了這張床比較舒服，我也洗澡了。這個房間很暖，前幾天好冷。」我慶幸他在靈界的境界不錯，是乾淨舒適溫暖的。其實，自從入院以來，他的病房及病床一直沒有改變過。他一直喊冷，而且睡得不舒服。但是他現在看到、感覺到的是靈界的景象，所以，跟以前都不一樣了。\n\
    \n他又說：「從明天起不要再送飯來了！」一向無神論的婆婆以為他腦子混亂了，胡言亂語，叫我別理他。\n\n我想今晚是他最後一夜了，我得趁半夜他身旁無人時，去提醒他如何面對靈界。要離開人世時，最好是跟隨發光的佛菩薩或天使走，才能往生光明的境界。（《西藏生死書》已有詳細的說明，讀者可參考，本書不在此詳述。)\n\
    \n當夜我找他談話，他回顧了此生經歷的各種考驗，他恭喜我的修行方向是對的，他相當遺憾自己以前不知道要修行，我說：「您也盡力了！」他露出無奈的笑容。\n\n\
    第二天，我帶著全家去見他最後一面，這時他老人家已無法言語，比手勢要走了，婆婆大哭大叫，不肯讓他走。\n\n公公一時心軟，就暫時沒走，當天夜裡趁著婆婆不在場時，公公還是悄悄的離開了人間。\n\
    \n我們在親人往生之際，切記：絕對不要哭叫！那是不利他們的行為，會拖延和阻礙親人往生善處。真正愛他們的方式有許多種，比如，可以為他們誦經，想著光和愛，送給他們，祝福他們隨著光明的佛菩薩或高靈往生善處！祝福他們進入另一個嶄新的生命旅程！……\n\
    \n## 生死有命\n\n就在移民加拿大前，台北發生一次五級的大地震。當時我住三樓，覺得天搖地動，挺嚇人的！我跑到四樓找母親，想要安慰她。同時，小妹也從五樓跑下來找母親，我們都沒想到母親正很悠哉的在煮湯圓。妹妹看著大湯鍋說：「哇！這麼大的地震，湯圓竟然沒震出來啊！」母親說：「是啊！」\n\
    \n我說：「媽！房子搖成這樣妳不害怕嗎？」\n\n媽媽平靜的說：「有什麼好怕的？生死都是注定的。我小時候台灣曾經發生一次大地震。那次，有個鄰居的小孩在放學回家的路上經過土地公廟，看見一群人大排長龍，他的親戚、朋友、鄰居以及許多陌生人都被捆綁著，排隊依序走進土地公廟。本來土地公廟是小小的，那時好像變大了。他看見自己的父母也在隊伍中，就大聲呼喊並且往土地公廟跑過去。那時土地公廟忽然變回原來的大小，那些人物都消失了。他有不祥之感，立即朝回家的路上奔跑。忽然間，大地開始搖晃震動，當他跑到家時，他家及附近的房子皆已崩塌，他之前看見的那些走進土地公廟的人們，都被壓死了。」\n\
    \n聽了這個故事以後，我對地震真的沒那麼怕了！反正，生死是注定的嘛！\n\n## 執著的老母\n\n我在多倫多市有一個無神論的朋友，前兩天突然來電，原來她那年齡近百，中風臥床約十年的老母，最近總是說著一些奇怪的話，她說她的床上睡了另外兩個人，一直在拿她的財物，所以她就一直罵那兩個人，每天晚上鬧得全家都睡不著，雞犬不寧的。\n\
    \n有時老太太還會一人扮演兩個角色。她會用莊嚴的口穩說：「我是觀世音菩薩，我來帶妳去轉世了！」接著，她又轉換為小女孩稚嫩的聲音，撒嬌的說：「我不走！我不要去，我的女兒和孫子們都對我很好，我要留下來讓她們照顧。」\n\
    \n觀世音菩薩的聲音更嚴肅的說：「妳已經讓全家人守著妳，照顧妳那麼久，他們有自己的功課要學習，妳一直在這裡會影響他們的學習，也浪費妳自己的時間，沒有成長。」接著，老太太又變成小女孩的聲音嬌滴滴的說：「不要，不要！我絕對不走，我要和他們在一起！」這時，菩薩的聲音又開始不斷的曉以大義⋯⋯。\n\
    \n朋友問我怎麼辦？\n\n我說，她的時間到了，菩薩來引領是很好的，將會往生善處，不會有任何痛苦，只是放下肉體就走！如果她一直執著在這個老朽枯乾，行動不便的驅殼裡，連大小便都要別人打理，自己也像個犯人一樣，每天臥病在床，哪裡也不能去，這樣多麼不自由啊！還不如換一個年輕活潑、健康有朝氣、充滿生命力的身體，再回到世間繼續學習成長，這樣記憶力好，學習力也強。\n\
    \n朋友問：「那兩個睡在我母親身邊的靈魂怎麼辦？」\n\n我回答：「念地藏經迴向給他們，請對方原諒，請他們跟隨觀世音菩薩往生善處。」她立刻向我借《地藏菩薩本願經》回去念了。\n\
    \n## 執著的靈魂\n\n我小學同學的姊姊大學畢業後，看破紅塵在北投山上一家寺院出家，她那個寺院放置著許多骨灰罐，有些似乎沒人祭拜，年代久遠，散發陣陣霉味。\n\
    \n有一天她看到太陽高照，一時心血來潮，就好心的把一些骨灰罐搬到屋外去曬。沒想到忽然變了天，一陣突然來的雷雨，她正要衝出大門去搶救那些骨灰罐，門口忽然擠進來許多日本人，男女、老少都有，每個人身上都淋得濕答答的，像落湯雞一般。奇怪的是，他們全都是古代日本和服的打扮。\n\
    \n她想，等會再招待他們吧！所以匆忙奪門而出，前後不到一分鐘的時間，當她抱著骨灰罐回到室內時，裡面居然靜悄悄的，空無一人。這個寺廟後面沒有門，這一大群人究竟到哪兒去了？她把每個骨灰罐擦乾之後，發現上面刻的全是日本人的名字，而且都是五、六十年前就託放在此處了，他們去世時的年齡，老少都有。\n\
    \n原來他們是已經死去多年卻放不下自己骨灰的靈魂。其實他們可以選擇投胎轉世，到世間來修行，卻仍守在骨灰罐附近。\n\n有一個得證天眼通的修行人，走到墳地，看到一個老人的靈魂，坐在他自己的墓碑上哭泣。這個修行人問他：「您在哭什麼？」老人魂說：「我死了呀！」修行人說：「你的靈魂沒有死，你不是坐在這兒說話嗎？」老人仍不停的說：「明明就是死了！才會躺在下面的，不是嗎？」這修行人說不過他，只好離開了。\n\
    \n有些執著的靈魂會以為那過去的身體就是他本人，所以就不捨得離開自己的墓穴，死守在那兒，幾十年甚至幾百年，過著像孤魂野鬼的歲月，真是可憐！在有生之年不知修行，智慧不開，死後一樣過著無明的日子。要知道，肉身只是像衣服一樣，用壞之後要立即捨棄，不要執著一件舊衣服不放，應當尋找更美好的未來！"
