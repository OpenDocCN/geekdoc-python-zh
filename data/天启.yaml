  md: '美國總統老布希的妻子芭芭拉常對孩子說：「朋友！你最好自己拿定主意，要不然就得聽我的。」這一句話幽默而且中肯。她的第三個兒子患有閱讀困難症，醫生告訴她「親子閱讀」是對這孩子最好的良藥。她就卯足了勁，努力陪伴他學習，兒子也因此有了很大的進步。後來她的愛心擴展到幫助其他種族的家庭教育，惠及廣大的人群。


    教育是日日的滋養與陪伴，每天找一段時間陪著孩子成長，自我也同步成長。為人父母者，都希望子女幸福，只要每天滋養一點點，孩子的幸福指數就能節節升高，千萬不要忽視自身的力量。


    有位朋友在修行求道的過程中，忽略了自己的孩子。我給他的建議是：


    靜下心來！好好陪伴孩子成長。


    這是為人父母所能為孩子做的最有價值的事。


    用你的愛心耐心和智慧培育自己的孩子。


    我們的神性可展現在日常生活的細節中，


    不必日日渴望著開「天眼」，


    我們最需要的是開「心眼」～愛心之眼，


    覺知家人的需要，供給家人真正的需求，


    先把自己的天職做好，這就是修行的一部分。


    專注於當下孩子的成長，


    好好培育孩子～這是為人父母最重要的任務！'
