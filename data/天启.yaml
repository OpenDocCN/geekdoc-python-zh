    # 人體自動修復系統


    2017年11月中，我走路時不慎摔傷了右膝蓋，急診時X光顯示膝蓋骨折，醫生幫我打了石膏，回家靜養一個月。這期間我大多在電腦前工作，偶而想起就對膝蓋送些能量，或是觀想光來療癒它。過程中，感覺到腳底逐漸溫暖起來，似乎有活血的效果。


    有一晚我睡不著，就起床靜坐。當我頭腦放空時，忽然感覺全身的能量場開始自動運作，尤其是受傷部位，有強大能量場自動運轉。我看到能量在右腿附近像波浪一樣起伏，感覺能量集中修復受傷部位大約十分鐘。因此，右腿充滿了熱能，溫度居然超過正常的左腿。


    一個月後我去醫院回診，醫生幫我照X光時，對我豎起大拇指說：「你的腿骨癒合良好，可以開始練習走路，兩週後，你就會完全康復。」感謝醫生幫我診斷和打石膏，也感謝我們身體的自動療癒系統，讓我在一粒藥也沒吃的情況下，自動療癒了膝蓋骨。


    幸好，我平日有打坐靜心練功，必要時可以療癒自己。我深深體會到，當我們將情緒和思維全部放下時，可以變成強大的能量場療癒自己。'
