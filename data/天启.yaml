    # 生死有命


    就在移民加拿大前，台北發生一次五級的大地震。當時我住三樓，覺得天搖地動，挺嚇人的！我跑到四樓找母親，想要安慰她。同時，小妹也從五樓跑下來找母親，我們都沒想到母親正很悠哉的在煮湯圓。妹妹看著大湯鍋說：「哇！這麼大的地震，湯圓竟然沒震出來啊！」母親說：「是啊！」


    我說：「媽！房子搖成這樣妳不害怕嗎？」


    媽媽平靜的說：「有什麼好怕的？生死都是注定的。我小時候台灣曾經發生一次大地震。那次，有個鄰居的小孩在放學回家的路上經過土地公廟，看見一群人大排長龍，他的親戚、朋友、鄰居以及許多陌生人都被捆綁著，排隊依序走進土地公廟。本來土地公廟是小小的，那時好像變大了。他看見自己的父母也在隊伍中，就大聲呼喊並且往土地公廟跑過去。那時土地公廟忽然變回原來的大小，那些人物都消失了。他有不祥之感，立即朝回家的路上奔跑。忽然間，大地開始搖晃震動，當他跑到家時，他家及附近的房子皆已崩塌，他之前看見的那些走進土地公廟的人們，都被壓死了。」'
  - '[PAGE 147]


    聽了這個故事以後，我對地震真的沒那麼怕了！反正，生死是注定的嘛！'
