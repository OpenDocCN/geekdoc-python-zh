    # ## 敦促


    一位朋友面臨親人病危，向我詢問有沒有解決之道。指導靈透過我傳達給他的訊息如下：


    生死無常，時間越來越急迫了！你的親人因為執著於名利，沒有專心修行，所以大限一到就得離開，完全沒有延壽的機會。


    在地球上，這個肉身短暫無常，而財富就像空花水月一般虛幻，就算你玩遍天涯海角，你的心依然失落，不要再讓心隨波逐流，一世又一世輪迴生死。修行並沒有要你放下任何世俗的財物，只是讓你學習，不執著世間一切虛幻不實的境界，修行只是讓你明白，還有一個真實和永恆的世界存在。


    淨化你的身體、情感、和思想，在深入的禪定中，找回自己榮耀的真實身分，那時你會發現自己非常富有，從來不缺少什麼，你會活得真正自在和喜悅！'
  - '[PAGE 202]


    # 修身


    修身養性是逐漸沉澱、安靜、收心、內斂的過程，平常就要讓自己生活簡單，練習每個思維的靜定，有機會獨處時，多閱讀靈性的書籍，交友要審慎，選擇思想單純、善良、靈性高、積極有愛心的善知識。和他們在一起時很容易就學習到他們的優點，感染他們高雅的氣質，平和、溫柔、敦厚、正直的氛圍。


    打坐如何向內集中？許多修行人長期打坐卻不得要領，意念紛飛，一些人事物的片段干擾身心，靜不下來，或是只能靜一點，不能更進一步進入禪定。


    平時要注意自己的心理是否處於平衡的狀態？因為，所有的混亂來自內心深處的不平衡。


    如果能修正到身口意都清淨時，打坐就能自然的提升品質。打坐是征服自己的過程。'
  - '[PAGE 203]


    # 六度


    「六度」是六種法門，為菩薩道必修科目。

    行六度可以從生死苦海渡脫到涅槃安樂彼岸。


    # 布施


    分享自身所擁有的或所知道的給需要的人。

    財布施、法布施（分享真理）、無畏布施（消除恐懼），

    可長養慈悲心，除去五毒中的「貪」。


    # 持戒


    遵守佛法不作諸惡，奉行一切善，

    廣修善法利益眾生。

    基本的戒律是守五戒：

    不殺生、不偷盜、不邪淫、不妄語、不飲酒或吃迷幻藥。


    # 忍辱


    能忍受別人的羞辱、懷疑、誤會、排擠等等而不生怨恨。

    當別人對你恭敬供養時，不生憍逸。

    當別人對你嗔罵打害時，不生怨恨。

    遇寒熱風雨饑渴等外界的惱害時，能忍耐能安住。

    能行忍辱者，乃可成為真正具有力量的人。

    忍辱能除去五毒中的「瞋」。


    200 / 天啟'
  - '[PAGE 204]


    # 精進


    力行善法，勤斷惡根，不懶惰，不懈怠。

    找一個自己喜歡的法門，專心持續的修行。

    對於自己的不良習性，要持續的清理直到斷除。


    # 禪定


    心無雜念，不為世俗萬物迷惑顛倒。

    禪定能對治散亂。

    打坐、靜心都是練習禪定的方法。


    # 智慧


    修得智慧以破除煩惱，遠離無明和愚痴。

    了解萬物同一體，萬物的本質皆是愛。

    能除去五毒中的「癡」。'
  - '[PAGE 205]


    # # 逆境考


    人生的起伏和天上的烏雲或風暴差不多。有時看起來很驚險，可是很快就事過境遷，完全沒事了。有一次，我忽然財物損失兩百萬，一時真是嚇壞了，誰知不到一年，又莫名其妙的賺回來了。另有一年，有位朋友被騙幾千萬，我與先生都為他難過，不知道他往後日子怎麼過。可是十幾年後，我們發現他早就回復了富裕的生活。所以不要被一些人事物的起伏嚇得要死，這些都是逆境考。


    有些人遭遇逆境時就想不開，彷彿天要塌下來了，他們不相信自己可以敗部復活，以為從此人生無望，如果放棄了希望，那才是被逆境考打敗了。


    其實，逆境考常常是人生中一段短時間的低谷考驗，遇到這樣的考驗時，我們要記得孟子所說的：「天將降大任於斯人也，必先苦其心志，勞其筋骨，餓其體膚，空乏其身，行拂亂其所為，所以動心忍性，增益其所不能。」當我們從容樂觀的面對考驗之後，會發現柳暗花明又一村，逆境過後，就好像雨過天晴，光明在望！'
  - '[PAGE 206]


    # 物質幻相


    有一個神話故事，大意是，有個年輕人在路上走著，忽然遇見一位仙人，他可以點石成金，還可以飛行。年輕人很想跟這位仙人學習成仙，仙人說：「你要先通過考驗才可以跟我學成仙之術。當你閉上眼睛，你會看到許多可怕的景象，你要知道一切都是假的，只是幻相。如果你把這些幻相當成真的，叫出聲來，你就不能學成仙之術了！」


    這年輕人閉上眼睛後，看見獅子老虎撲過來要咬他，他知道這是幻境，所以他一點也不害怕。接著，看到狂風暴雨、天災地變，他仍然知道這些都是幻相而已，所以也不害怕。他看到自己似乎遭遇許多災難，過了一段時間，他死了，被抓到地府去，接受閻羅王的審判。當閻羅王命人抓來他年老的父母，並派人鞭打他的父母，他心疼的大叫起來，然後他醒了，睜開眼睛。仙人說：「顯然你是個孝子，但不是成仙的材料！」接著神仙就騰空而去。


    雖然許多人都想成仙，但是卻對物質界有許多執著，比如：親情、財富、名利、成就、生死等等，如果把物質世界當成真實的，就會有許多的恐懼和掙扎，當然很難活得像神仙一樣的無憂無懼啦！'
  - '[PAGE 207]


    # 修行忘年交


    游老太太是我的一個白髮知己、忘年之交！二十年前，我初到加拿大時，就幸運的遇見他們夫妻，他們帶我參加日本佛教會，因為我聽不懂日文，所以假日裡，我常常去拜訪他們，和他們一起複習前一次的佛法課程。每當我走近她家門口時，已經聞到空氣中一縷淡淡的綠茶清香，而她總是很貼心的準備我愛吃的小點心。


    她是一個非常浪漫又可愛的人，印象中，她常常穿著淡雅的粉紅色唐裝，正好是我很喜歡的顏色和樣式。當我問起這衣服在哪裡買得到時，她居然有些害羞，笑咪咪的說，那是她結婚時的晚禮服。


    我們常常相約去公園坐坐，回想起來我們像母女一樣，總是坐在一起談天。和她說話是很輕鬆溫暖的，完全沒有負擔的感覺，不用擔心說錯什麼。她常常就哼起日本小調，後來我也學著像她那樣，時時刻刻都活得很開心，我們經常攜手哼著歌，一起去逛街。'
  - '[PAGE 208]


    游老先生往生後，我和游老太太仍然繼續努力修行，有幾次游老太太想搬來和我同住，因為她當時八十二歲了。我怕我照顧不周，會引起她九個兒女的擔心，所以不敢答應。


    有一天，她舉辦慶生會，我應邀去她家，她的女兒準備了豐盛美味的食物，參加的人都是游老太太的好朋友。當天游老太太穿了一件大紅色的禮服，看起來好美！她那銀白的頭髮，白裡透紅的皮膚，配上大紅色衣服，顯得雍容華貴。她很開心的與我們一起唱了許多歌！奇妙的是，在她的臉上，我永遠察覺不到歲月的痕跡，我想那是因為她一直保有年輕快樂的心境！


    兩個月後，游老太太仙逝了！她是無疾而終的。她女兒說，她當時在美國兒子的家中，打電話給女兒時，神采奕奕，有說有笑的。掛電話後，就坐在椅子上，安詳的離開人間了。我對於她的走法有許多的羨慕和讚嘆！但願我能修到像她這樣，能遊戲人間，來去自如！'
  - '[PAGE 209]


    # 修行與助人


    有一次我夢見，廣欽老和尚來對我說：「你去告訴我的弟子們，不要老是躲在廟裡打坐念經，應該出山門去救渡眾生。另一次，我夢見弘一法師，他交代我幫助他的弟子們。其實，我根本不認識弘一法師，夢醒之後，我立即上網查他的長相，證實我夢中看見的形象是弘一法師。


    2002年，我本想要閉關十幾天，閉關中忽然有問題要問Arthur老師，於是打電話給他，他說：「你閉什麼關啊？躲避人！躲清涼吧！你立刻給我出來幫助別人！」


    我說：「我想一直都在同一體裡面！」


    老師說：「如果你只想在涅槃裡面，又何必來投胎？你應該出來幫助別人，助人的時候，你會進步更快！」


    由於老師的當頭棒喝，我當天就出關了。後來我發現，每當我有機會幫助別人時，有如神助，而且對自己有最大的收穫。因為與靈界合作幫助眾生，會越來越了解靈界的運作，更知道靈界的存在與幫助，也更了解各路神明的能量，更容易查到訊息，這些與靈界溝通的能力都是在幫助別人時，自然發生的。所以有能力幫助別人時，不要執著獨自修行，也不要獨善其身，應該與有緣人多分享修行的心得。主動發展更多的人際關係，才有更多助人的機'
  - '[PAGE 210]


    會，我們發出去愛心的能量，宇宙也會回饋更多愛的贈禮。


    除了諸位已離世以及還在世的老師教我去助人之外，靈界還給我一個夢訊息。有一天早晨我醒來前，聽見靈界的聲音說：「今天是你兒子滿十三歲的日子，從現在起，他的健康和學業由我們接管，你只要去幫助別人的小孩就可以了。」夢中我看到一大群的孩子環繞著我。


    醒來後，我立刻去看日曆，天啊！真的是我兒子十三歲的生日，這個印證讓我對靈界產生了極大的信心。從那天起，我把助人當成修行的第一順位。


    因助人的時間增加許多，所以打坐時間大幅減少了，我練習在日常生活中，觀察自己的起心動念，練習讓思維有紀律，練習放下情緒的起伏，練習時時保持靜定。


    也許外在扮演著母親、妻子、媳婦、老師、學生、許許多多的角色，像一隻花蝴蝶似的忙碌。但是，內在的我，要求自己像老僧入定，做到內外兼修，盡量做到八風吹不動。雖然困難度極高，挑戰極多，考驗很大，我只是盡力而為罷了！幸好，我對自己很寬鬆，做不到的時候，就自我解嘲一下，生活還是要以愉快平靜為主啊！'
  - '[PAGE 211]


    # 天意的管道


    幫助有緣人，許多情況是天意的指示和安排，我們只要配合天意去幫助別人，無我無求的人是最佳的管道。


    想要成為天意的管道，可以向天意祈禱和發願：「我願意成為天意的管道，請安排讓我有幫助別人的機會。」這樣靈界弟兄們，就會安排在適當時機，讓我們有機會陪伴一些有緣人靈性成長。


    如果我們身心靈都還沒準備好，無法勝任陪伴眾生成長的工作，靈界弟兄會安排適合我們的老師或書籍，讓我們可以快速成長，達到一定程度的了悟之後，可以真正陪伴眾生靈性成長。


    當我們陪伴別人成長時，我們會進步更快，每一位我們陪伴的眾生的修行體驗，也會成為我們的體驗。如果一年內有機會陪伴三十位朋友成長，我們就賺到三十份修行經歷，好像我們多賺到三十年的體驗，這些靈性的養分，讓我們更容易智慧開花，收穫更多靈性的果實，所以有機會要多幫助別人靈性成長。'
  - '[PAGE 212]


    # 陰陽界的溝通


    多年前，有一位親人身體疼痛不堪，我打電話安慰她，電話裡一直有許多聲音干擾，他們發出一些噪音，我忍耐著不理會他們，但也沒告訴我的親人，免得她恐懼。但是，我勸她念地藏經，並且對過去世所造的惡業懺悔。


    掛上電話，我就對這些吵鬧的靈魂說：「有話就說清楚、講明白，我才會知道你們想要什麼，不要總說一些我聽不懂的話。」當我閉上眼時，看到右方一個約二十多歲的男人，他誠懇的要求我收留他，他想跟我學修行。左方有兩個約三十來歲的女人，帶著一個小女孩，其中一個對我說：「我也想跟妳學習，我保證絕對不會吵妳，我的小孩晚上會哭鬧，晚上我會帶她去住旅館，只希望妳務必收容我們。」因為他們都說要修行，我就全部答應了。


    第二天我的親人痊癒了，她驚訝的問我是如何處理的？因為，她已經痛苦一個多月了，我告訴她事情的來龍去脈。她說，難怪上回有朋友去她家住的時候，抱怨半夜有小孩子來拉她的手。她說這一年多來，經常在半夜聽到有男人女人在她床邊講話的聲音。我感到非常開心，因為，我終於有能力可以幫助親人脫離苦難了！'
