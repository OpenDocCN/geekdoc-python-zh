    他們只是情不自禁，沒有什麼其它的原因。

    當你想幫助別人時，別擔心太多事物。

    如果，你的心中充滿愛，沒有壞事可以到達你身邊。

    因為，愛不會傷害愛！

    所以，你不用擔心！

    事實上，你已經通過了多次考驗。

    你不會被別人深深的愛意沖昏了頭，

    你的冷靜及不帶情感的處理方式，正是我們需要的。

    你理性、客觀、機智，所以得到我們的大磁場，

    現在你是上帝的美好管道了。


