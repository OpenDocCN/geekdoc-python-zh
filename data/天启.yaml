    問：找回超意識能量的捷徑？

    答：沒有所謂的捷徑，必須先看破一切外相的無常，

    專注於內在，打破心性中的無明，才能證得內在力量。


    問：我出關後，想把這些對話記錄成一本閉關日記，給我的親戚朋友們看好嗎？

    答：當然可以，我們這個智慧醞釀團正想藉助你的力量，去完成我們的共同使命，拯救現在及未來的人類。


    問：為什麼會選擇我？

    答：因為你有單純的心。

    你活著的目的只是為了修行及幫助眾生，別無所求，所以我們樂意與你合作，共同完成任務。


