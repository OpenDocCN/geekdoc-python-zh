  md: '持續學習，可保持思維的擴展和成長，在這個資訊發達的時代，我們很幸運的有許多學習的方式，例如：參加讀書會、研討會、音樂會、各種藝術或專業展覽、各種才藝或專業課程、烹飪或烘培課程、舞蹈課程、瑜珈課程、知性旅遊等等。這些活動都會刺激腦前葉細胞持續成長，使頭腦保持年輕靈活，體態也自然會保持年輕有生命力。老化和癡呆並不只是年齡因素所造成，還有一個重要的原因是停止學習，頭腦長年不使用，鈍銹了！


    不分年齡，都可以繼續學習和成長。我的房產律師來自台灣，年齡大約七十幾歲，身體健康，思維靈敏且清晰，睿智幽默，走路步伐輕盈。他說，他從電腦專業退休時，就去學習法律，六十歲時考取律師執照，他從來沒打算退休，一直都精神奕奕的繼續在工作。我希望我以後也可以和他一樣，保持身心健康，為人們服務到最後一分鐘。


