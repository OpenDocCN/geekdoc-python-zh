  md: '# 宇宙執法者


    在地球這個行星上，有兩億以上的宇宙執法者。他們正在執行天意，幫助人類意識的提升。其中有些人已經知道自己的任務，有些是被告知，然後恍然大悟的，有些還不清楚，但是，也可以憑著直覺和善良正直的心性與天意感應，而執行幫助人類提升的工作。


    宇宙執法者，有許多種職別，各自依照不同的能力，執行天意計畫。以下列舉幾種為例：


    ☆宇宙法官，檢察官，司法官。


    是宇宙高層的執法者，他們具有「慈悲」與「公平正義」的特質，有冷靜，清晰的邏輯，沒有人類起伏不定的情緒。他們來自高等智慧的星球，他們敏銳的眼睛，就好像照相機，隨時把所見到的人類各種行為，拍照傳回靈界。靈界將之用於審查和評估人們的身心靈進展情況，並用以安排人們的學習課程，在地球學習的時間，及未來適合的教室。


    能收到並且解讀宇宙訊息，才能當選宇宙法官，更有效率的幫助人類。有時宇宙法官也擔任解釋和翻譯的工作，將宇宙高層的訊息，更清晰的轉譯給其他還不熟悉接'
