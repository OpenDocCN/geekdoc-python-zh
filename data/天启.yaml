    # 暗戀能量干擾


    大多數人都喜歡長得美麗、英俊或外表吸引人，可是如果有人暗戀你時，就不妙了！人們思念你時，會發出一種能量波，可能干擾你的睡眠，甚至導致嚴重失眠。


    有位師姐有一陣子半夜都睡不著，Arthur老師對她說：「你這陣子常常睡不著，是因為有異性整天想著你，他的能量糾纏著你，所以你會睡不著。你可以觀想一把大剪刀，把所有附著在你身上的別人的能量線剪掉。」後來，她試著練習『剪刀大法』，之後就睡得很好。


    事實上，那時有位男士一直在追求她，她是有夫之婦，當然不能接受這追求。那陣子她幾乎夜夜睡不著，飽受干擾，但她並不知道真實原因。幸好，經Arthur老師點醒，才解決了這個困擾。


    Arthur老師還提到，有些影歌星是許多人的偶像，甚至成為許多星迷的性幻想對象，可能不明原因的患失眠症，每天得吃安眠藥才能入睡，有些吃安眠藥過量、或自殺的，他們並不知道自己是被許多人的能量干擾太嚴重，所以痛苦到去自殺。'
