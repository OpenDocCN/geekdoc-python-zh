    # 淨化思維


    負面和混亂的思想會阻礙靈性成長以及幸福的生活。因為,當一個人經常胡思亂想時,振動力會下降,與陰間那些思想負面的眾生頻率接近。而且,生生世世的冤親債主很容易找到他,有機會干擾他的生活,阻礙他的成長。因此,淨化思維,是修行很重要的基本功。


    我結婚後是以畫外銷油畫來賺取生活費,同時還要兼顧家庭,所以,靈修初期我選擇念佛號的方式淨化思維,對我而言是最容易做到的。任何時候我都可以念佛,畫畫時、洗碗時、走路時(有時候,每見到一根電線桿,我就念一句,挺好玩的!)。一直念到頭腦越來越清淨時,我開始有能力接收一些靈界的訊息,也開始發現一些陰陽兩界的奧祕。早期我仍害怕看到鬼魂,所以,當時靈魂與我溝通的方式是用「聲音」。


    有一天,一個朋友打電話向我哭訴,前幾天她二十歲的兒子剛剛車禍死亡,她自己也破產了,正走投無路想要自殺。當時,她的冤親債主也同時在電話中發聲向我申訴:「這女人在過去世當縣官時審判錯誤,造成我和腹中胎兒無辜被判死刑,我發誓生生世世追討,我要他們母子一命償一命,還我們母子一個公道。」'
  - '[PAGE 252]


    此外，我有一位同學，當我跟她在一起時，會一直聽到嬰兒的哭聲，求證之後，才知道她曾經拿掉幾個胎兒。


    當我們淨化思維之後，可以更容易接收靈性訊息，這是每個人都擁有的內在能力，可以透過練習發展這項能力。有了內在靈性訊息，我們才能得知外在生活事件背後真正的因果關係，以及靈性上的意義，才能公正合理的處理。'
