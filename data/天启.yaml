  md: '我並不想用這種方式去幫別人治病，因為，有一位靈性導師曾經告誡我們，不要用氣功幫人治病，原因是如果無緣無故拿走別人的功課，有可能必須幫別人擔負業障。所以，這個方法我只用在自己家人身上。


