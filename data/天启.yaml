    # 不義之財


    不義之財不能取。不義是指：不應該得到的。拿了不義之財，往往有難以想像的災難，古今中外都有許多實例。我們也常聽說「拿人錢財與人消災」，從別人那裡拿了不應該拿的錢財，必須幫對方承擔業障。所以，千萬別貪人錢財！別短視近利，要小心長期的因果業力！


    2007年，妹妹受託去法院幫客戶說明財務報表，受託前，她接收到相當清楚的夢訊息，因此過程中都與我保持聯繫，隨時請教指導靈，希望在處理上能真正公平合理。這個個案，是不義之財以及冤冤相報的典型案例。


    前來委託的是一個投資公司的小股東，他認為大股東侵占私吞，希望透過財務報表，能證明侵占的金額，之前已經打了十年官司，還沒有贏得訴訟，他非常不甘願。


    指導靈訊息如下：


    「前世，他們是兩名大將結拜為兄弟，駐守邊防。因為被部屬出賣，誤以為戰敗，所以兄長決定棄官而逃。他將政府所撥的盤纏大部分捲款而走，只留下一點給乾弟，僅僅讓他足以維生，所以乾弟覺得被兄長出賣了，懷恨終生。但兄長由於取得不義之財，短命而終。'
  - '[PAGE 180]


    今生兩人又成為股東一起投資事業。但角色翻轉，乾弟成為大股東，兄長成為小股東。乾弟想討回公道，然而，前世兩人所爭的錢財是公款，皆非兩人應得的，是不義之財，所以兩人皆種下惡業。今生兩人雖然費盡心機爭錢奪利，但都沒有福報可獲得所爭的錢。


    兄長此世本應受短命報，但因錢財被侵佔，由侵占人承擔惡業，所以得以消災延壽。乾弟此世貪得無厭，但是不知守財，隨意揮霍，外強中乾，並無實質財力。


    這場官司若兄長贏，乾弟也拿不出錢，空有贏得官司之名，而無實質財產利益。兄長到死也拿不到錢。因此，這場官司繼續下去只會兩敗俱傷，贏得官司者，取得「短命報」。


    雙方官司纏訟，心懷怨恨，不得安寧。十年光陰耗費在爭錢奪利，試問此生還有多少日子？奉勸珍惜生命光陰，千萬不要再浪費生命在討債和爭錢奪利。


    消除業障的方法：懺悔、念誦地藏經迴向對方，將惡因惡果轉變為菩提智慧，原諒對方此世所做的錯事，原諒自己過去世所做的錯事，多做善事，多積功德。過去的讓它過去，生命短暫，要多珍惜！」'
  - '[PAGE 181]


    # 孤獨的果報


    有一位朋友，離婚之後，悲傷的去請教一位法師，這位法師能通曉過去未來，他告訴我的朋友：「這是因果報應，你過去世是個男人，常常無故虐待妻子，不但毆打她，傷害她的心靈，最後還拋棄了她。你此生的丈夫正是你過去世的妻子，你曾欠他，所以必須賺錢養他，還要遭到他的虐待及拋棄，因為過去不珍惜身邊的人，所以得到孤獨的果報！」


    正如法師所說的，我的朋友過去確實常遭丈夫虐待。因此，她相信這是過去世的作為所造的業障，現在她持素念經精進修行，希望透過修行，改變此生及未來的命運。'
  - '[PAGE 182]


    # 殺生的果報


    廣欽老和尚在世之時，常常盤腿坐在殿堂上，大批信徒都排隊膜拜。有一天，一位手裡抱著嬰兒的男士走到老和尚跟前，請求幫助。老和尚說：「你做的是什麼事業？」男子說：「冷凍雞工廠。」老和尚說：「這孩子是醉雞轉世的，渾身軟若無骨。」男子說：「對！醫生說這是軟骨症。」老和尚說：「你可不可以另外換個不殺生的工作？」男子說：「可是我所有的家產兩千萬，都已經投資下去了，如果不做我就破產了！」老和尚說：「繼續做的話，下一胎是個女兒，還是這種病啦！」


    另一位男子來朝拜老和尚。老和尚說：「你的職業要趕緊換了！不然就要沒命了！」原來此人的職業是賣蛇肉的，他回家後前思後想，寧可相信老和尚的話，也真心打算洗手不幹了。但家中還剩一條響尾蛇，他想，這次殺完以後就不再殺生了！於是動手去抓蛇，卻不幸的被那條蛇給咬死了。其實他殺蛇無數，從未失手，如果他當下聽老和尚的話，戒殺、放生就不會落得如此下場了。'
  - '[PAGE 183]


    # # 畜生的果報


    以前有一戶人家,居住在深山僻靜之處,他的鄰居有一次在通往他家的路上,看到一男三女穿著華麗、舉止輕挑,感覺不是正派的人,正結伴往他家走去,鄰居十分好奇,一路跟著觀看,眼見這群陌生人,走進這戶人家。


    好奇的鄰居趕緊跟進去,奇怪的是屋裡空無一人,於是鄰居喊出了主人問道:「你家剛進來的四個客人呢?」主人驚訝的說:「哪有什麼客人?我家的母豬剛生了四隻小豬,我正忙著接生,哪裡有四個人?」


    那四個人怎會在剎那間消失了蹤影?鄰居很驚訝的去查看,那四隻剛出生的小豬,居然正好是一隻公的三隻母的,鄰居訝異得說不出話來,他想起剛才那些人走路像是飄飄的,異於常人。


    不務正業的果報是相當可怕的,好好的四個人的魂魄居然投生豬腹,做人能不謹言慎行嗎?'
  - '[PAGE 184]


    # 縱欲的果報


    有一次我的鄰居請來一位道士，有能力讓人去陰間探望去世的親人，俗稱「觀落陰」。那位鄰居想去看他剛過世的母親，但因為這門派對於生肖有限制，無奈之餘，只好讓最小的八歲兒子去觀看。孩子眼睛被蒙了黑布，在道士的作法下，似乎真的看到陰間的景象，他開始描述眼前發生的事物。


    他說，他看到地獄的入口，有火紅的火焰燃燒著，當他走到一個巨大的建築裡，看見許多人被綁在燒得通紅的鐵柱上，皮肉都燒焦了，非常痛苦。當中他看見一位剛過世不久的鄰居大嬸，這孩子就好奇的問旁邊的獄卒道：「阿嬸是好人，為什麼要這樣待她？」獄卒答：「這女人在人間時，丈夫去世之後，偷偷和鄰居丈夫有染，所以遭此果報。」這事讓人心驚，因為在場的人都知道，這位美麗的大嬸生前待人和善客氣，溫文有禮，很得眾望。卻因為丈夫早死，為解孤獨寂寞，與別人的丈夫偷情，竟遭此慘酷的地獄果報。


    陰間的律法森嚴，我們在人間時要小心，切勿縱情縱欲，否則臨命終時，地獄業報現前，那時後悔已太遲。'
  - '[PAGE 185]


    # 小計謀也有業障


    心地必須光明善良，這是我頭一次與朋友去問神的心得。記得那日輪到我時，那位修道人對我十分客氣，誇獎我心地慈善，將有後福。我還以為他習慣恭維每一個上門的客人，但是輪到我後面那位同學時，他竟然以很嚴厲的口氣說：「妳總是算計別人，怎麼能心安理得？妳若不改，一生命運會很慘，小心哪！妳走路都可能跌進水溝裡，夜路走多了會碰到鬼的！」


    我驚訝的回想起，這位同學最喜歡在考試的前幾天，去租一大疊故事書，免費借給同學們看，目的是讓大家沒空溫習功課，這是我們一群受害同學在幾次大考之後研究出她的用心。像這樣小的計謀都能被神明看穿，人還是善良一點為妙！許多年後，這位朋友的命運真的是全班同學中最不如意的！'
  - '[PAGE 186]


    # 布施的功德


    我剛結婚的時候收入非常少，我的佛學啟蒙老師黃信安居士告訴我：「想脫離貧困，必須布施。」我說：「我的錢少得每個月都不夠用了，還談什麼布施呢？」黃居士說：「布施不一定要許多錢，一點誠心罷了。送給乞丐三、五元都是布施。倒一杯水讓人解渴，也是結善緣。微笑也是不必花錢的布施。念佛的功德迴向給眾生是布施。講佛法給眾生聽，是法布施。布施以印經功德最大，因為看經典可以讓人開智慧，成就佛道。所以印經功德第一，但是功德必須先迴向給眾生成就佛道之後，再迴向給自己。希望在此生能衣食具足，還能有足夠的時間，修持禪定，將來得證佛果。千萬別要求人世間的財富，否則下一世無法跳脫三界必須回來享受那些福報，萬一又造惡業，墮入六道輪迴，苦難無期，得不償失。」


    聽了黃老師的開示，我把僅存的一點錢委託書店，印了一些經典與人結緣。奇妙的是，從那時起，我的經濟就逐漸好轉了！


    第四部、因果的律法 / 183'
  - '[PAGE 187]


    # 印經的功德


    我有一個朋友，開了一家茶藝館，因為生意不是很好，竟然到一家陰神的廟，求了一隻黑旗回來，供奉在店裡，據說若是有了這五鬼運財旗子，每到黃昏，她只要燒冥紙，五鬼自然會幫忙拉客人，進來茶藝館消費。我是不敢苟同，總覺得有點邪門，恐怕她會造業障。有一天我告訴她印經功德無量，更容易有大福報，所以她就託我去幫她印了五百本佛經，印好當天印刷廠直接把書送到她的店裡。沒想到隔沒幾天，她打電話對我抱怨：「都是妳說印經功德多好，自從那天佛經送到我店裡之後，我們的生意竟一落千丈，每日門可羅雀，我只好回黑旗廟去查問，誰知道五鬼說他們再也不敢來我店裡，因為我店裡突然來了五百位觀世音菩薩，太亮了，他們只好落荒而逃。」


    原來這五百本佛經是觀世音菩薩普門品，封面都有一尊觀世音菩薩聖像，我從來就不知道紙印的菩薩，竟然有如此神祕的力量，真是不可思議。我這位朋友後來把茶藝館收了，另謀職業。但不久之後，她改信佛教，修行精進、虔誠，沒多久就找到真正的明師，從此走在無上的正道。經書裡的佛智慧可以幫助閱讀者開悟，所以助印經書者也容易開悟，我們幫助別人什麼，自己就會得到什麼。'
  - '[PAGE 188]


    # 念佛的功德


    念佛號時，就與佛的能量場共振連結，佛菩薩會幫助我們調整頻率、穩定能量。佛菩薩就像是能為我們補充能量磁場的「靈性贊助者」～這概念引用自《神遊時空》。


    念佛號有無數的功德，除了淨化思維、修得禪定外，還會產生能量「光」和「功德力」，可以超渡許多冤親債主，也可以累積功德幫助自己的親人消除業障。我們可以善用各種時間念佛，無論是坐車、走路、洗碗、做飯時或睡覺前都可以。如果能念佛念到「一心不亂」，會得到不可思議的功德。我有一位朋友十八歲開始修行和念佛，他在臨終前坐著念佛號，直到佛來接引他時，保持打坐姿勢，含笑而去。


    還有一位朋友也是往生西方，她臨終時，自己專心念佛號，朋友們也為她助念，忽然間，佛放大金身來接引她！旁邊六位朋友，都同時看見巨大的佛身，金光晃耀阿彌陀佛親自來接引，整個醫院的病房中金光閃爍，無法用言語形容的莊嚴輝煌。佛手中拋出一朵蓮花，拋到她跟前時，像車輪一樣巨大。她的靈體就從頭頂出來，坐上蓮花隨著佛和八大菩薩，一起騰空而去。'
  - '[PAGE 189]


    # 福報的杯子


    我二十歲時，黃老師告訴我：「福報像個杯子，如果杯子滿了，水會自動流走。但是布施能提升福報的杯子，布施越多，杯子就更換為更大的，更好的。」


    老師舉了一個例子，有一次他搭火車時，一個人在車外伸手跟他乞討，老師想遞給他一枚銅板，由於火車已經啟動，那人沒接到，銅板居然掉進地下水溝，那是加蓋的水溝，所以這一位乞討者，沒有得到那枚銅板的福報，這是他的福報不夠，所以即使你想給他，他都得不到。


    我相信這個增加福報的概念。每當我發現金錢開始以各種不同的方式流失時，我就趕緊去布施了，這樣才能加大我福報杯子的尺碼。根據多年的體驗，布施的奇蹟多到說不完。簡而言之，可以使運氣變好、身體健康轉佳、小孩學業變好、家人獲得高薪的工作、或是得到意想不到的收穫，此外，還可以廣結善緣喔！'
  - '[PAGE 190]


    # 善心種福田


    我的外曾祖父是個殷實的鄉村農人，他心地慈善，每次看到路人爬山涉水經過附近山崗時，總是累得口乾舌燥的。所以他建了一間小涼亭在路邊，並買了一個大水壺，每天裝滿白開水，供趕路的過客，坐下來歇歇腿喝杯水。


    細心的他，因為憐惜路上沒鞋穿的孩子，還特地用布縫了一個袋子，每天出門時，帶在身上，沿路把釘子及玻璃屑，裝進袋中，免得光著腳丫子的孩子們，踩著了會受傷流血。他還曾經收留一家窮人，讓他們住在一間閒置的房子裡，甚至把自己的農田分出一塊，讓他們去耕作，自力更生。


    他自己一生克勤克儉，對待他人及兒孫，卻是寬厚仁慈，在他六十歲生日時，忽然得了急病，一日之內就與世長辭，很奇怪的是，他剛過世之時，兒子們去市場買棺材，棺材店老闆，完全不信的說：「別開玩笑了！我剛才親眼看見他從對面理髮店走出來，又走進前面的廟裡！」兒子們好奇的跑去問理髮店的老闆，那老闆確定，剛才他老人家確實活生生的在理髮，當時頭也是暖的，一點也不像剛死去的人。連外面一堆熟人，都親眼看見他穿著一身白衣白褲，很清爽自在的，走進廟裡去，他去世時，確實'
  - '[PAGE 191]


    穿著一身白衣褲，但是廟裡卻找不著他的蹤影！


    許多年後，我母親居然夢見自己飛到一處百花盛開的山谷，在一個山洞中，坐著白髮紅顏的外曾祖父，他坐在一朵蓮花上，笑著對我母親說：「傻孩子！妳的福報就要來了！」那一年我父親考取政府高等考試，職位和薪資都調升，從此我家的經濟逐漸改善。


    有一次母親與二阿姨在談天時，無意中談起這個夢境，二阿姨很驚訝的說：「怎麼和我的夢一模一樣？那山洞種滿奇花異草，尤其是各種蘭花布滿洞外，美不勝收。我也是每次都夢見飛著去見他老人家，也是看見他坐在蓮花上！」母親和二阿姨，後來都是虔誠茹素的佛弟子，修行十分精進。


    我的大舅舅年輕時在學校教書，有一天走路回家時，經過一條簡陋的木橋，發現橋面少了三條長木。那時一個失明的老人家，左手拿著柺杖，右手提著林投葉，走過那危險的木橋，柺杖插進洞口時，整個人差點兒就跌下去，舅舅目睹時嚇得冒了一身冷汗。平常他經過那條橋時，總以為每個人都看得見，少三條木頭無所謂。這回為了失明老人的安全，他立刻買了三條長約五呎，寬約一呎的木板，找朋友幫忙扛到木橋上，補釘上去。'
  - '[PAGE 192]


    正當他很專心的在釘著木板時，有一個路人，笑著對他說：「老師啊！您在造橋鋪路啊！我看你快生兒子了！」雖是一句玩笑似的祝福，但不到兩個月，他的妻子懷孕了，後來出生時，真的是兒子。這孩子非常優秀而且孝順，舅舅晚年主要都是靠著這個兒子養老享福呢！


    此外，舅舅的長女和次女都是長年茹素修行的居士，次女在南非事業有成，還開設了一個道場，服務當地的有緣人。由此可見，善心必有善報，積善之家必有餘慶！'
  - '[PAGE 193]


    # ## 節儉能增壽


    我的祖父一生節儉，食量也少，平日每頓頂多一碗的飯量。他八十五歲那年病重，家母替他去問神，神明指示：「這個人平日省吃儉用，愛惜五穀，今年本該壽終，但他剩餘三年的食祿尚未吃完，所以還能再多活三年！」說也奇怪，這場疾病慢慢有了起色，祖父果真病癒，又活了三年才往生，真是應驗了神明的指示！


    家母有個多年老友，每餐食量驚人，常常一人吃下一大鍋飯，但是身體一向不好，四、五十歲就嚴重氣喘，成日喘不停，非常痛苦。有一年病重時，家人替他去求神，但神明指示：「這女人已將一生食祿吃光，所以得提早走了！」隔沒多少日子，她就藥石罔效，無奈的離開人世！


    我也認識一位朋友，他本來十分富有，但奢侈浪費，吃喝無度。到了五十多歲時，居然倒了朋友壹仟多萬元的會，以為可以安度晚年，沒想到才一個多月，一向體態健壯的他，突然中風，臥床不起！'
  - '[PAGE 194]


    人一生的福報有多少通常是有定數的，主要是與前世布施及善行的多寡相關。如果有人自以為家財萬貫，就胡亂浪費五穀，尤其是食物白白糟蹋，或很新的衣服、完好的家具，就嫌舊丟棄換新，這樣的人是在隨手丟棄自己的福報，一旦福報用完，就得過苦日子了。


    有些人以為自己身懷壹億元，就有福報壹億元。其實那壹億元中，說不定只有壹仟萬元，是他一生中真正可使用的福報，但是他並不知道，硬是在短期內用光了福報。如果這人又一毛不拔，不曾布施，那麼福報享盡之後，會突然破產、變窮、或去世。所以，奉勸大家，節約用度，平時記得常常布施累積福德。'
  - '[PAGE 195]


    # 慈悲得善終


    有一天我打電話給台北的母親，她興奮的告訴我一個好消息，原來是我的一個叔公剛剛過世，家人卻很替他高興，因為他老人家活到九十二歲了，一向健康活動自如，老妻也九十一歲了。他是一生不曾罵人的長者，為人慈悲溫和，他要走的那天，一點也看不出病徵，只是邀請所有的兒孫到家中吃飯，他高高興興的吃飽了，接著穿上一套平日最愛穿的衣服，然後走到廳前，對每一位兒孫打招呼之後，他說：「各位這世就到此再見了！外面許多穿紅衣服的，要迎接我回去了，不用替我辦喪事，不用披麻帶孝，應該像辦喜事一樣處理！」說完，就安詳的與世長辭了。


    兒孫們驚訝之餘，也非常欣慰他老人家的自在生死和遊戲人間。這是西元2002年，在台灣發生的真人真事！'
- md: '# 和順得善終


    鄰居有位老太太，一向溫和善良，對待兒孫媳婦都是和顏悅色，而且很會幫忙家務，照顧孫輩，人前人後沒有半句怨言，誰也沒看過她生氣的樣子，雖然沒參加什麼宗教，修什麼行，但是她的一舉一動，就是那樣安詳自在、與世無爭。在她接近八十歲時，有一天她拜託媳婦幫她買了一件新草蓆，並且買了一套白色棉布衣褲，然後她囑咐兒子通知所有的家人回家，她說她要出遠門，大家都很奇怪，以為她要去旅行，所以都回來看她。


    那天早上她洗了澡，換上了新衣服，坐在草蓆上，等所有親人到齊了，她平靜的說：「我今天要走了，等一下，會有許多人，來接我去一個很好的地方！」說完，她頭靠著兒子肩膀，就微笑著仙逝了。親人們聽到屋外隱約傳來鑼鼓的奏樂聲，應該是迎接她的隊伍吧！


    因為她身心清靜，病苦對她而言，似乎是不存在的。我想：每一個念頭都乾淨的人，天生與病無緣吧！


    # 神聖的任務


    有位朋友是土木技師在工程顧問公司服務，專門負責承攬處理工業廢料工程。他總覺得事業上沒有突破，有一天他去請教一位已證神通的居士，這位居士對他說：「你本是天神轉世的，有重要任務在身，你所負責丟棄的有毒工業廢料，關係許多人的性命，要認真去完成，才不會辜負使命！」


    本來這位朋友覺得丟棄廢料，是沒有成就感的工作，沒想到居然是重大的任務。他聽了之後非常努力的尋找到合適的地點，終於在某偏遠無人之處，買到一處適當的土地，小心翼翼的放置那批工業廢料，完成使命。


    千萬不要看輕自己的工作，去了解它利益眾生的層面和價值，然後用心完成自己份內的工作，就是功德一件。


    # 愛惜公物是惜福


    有一位女士，每次去公共游泳池，沖澡都開最強的水，嘩啦啦沖水一個多小時之久。管理員提醒她，但是她卻依然故我，想沖多久就沖多久，絲毫不珍惜公共的資源。


    她有一棟房屋出租，三十年來每月的水費都高到驚人，她老是抱怨房客亂用水。她跟我訴苦後，我猜想她家可能有地方在漏水。後來水電人員查出原因，是她家地下室一個久未使用的廁所在漏水，平均一個月大約流掉台幣一萬多元。濫用公家的水，結果自家的水也莫名的被耗用，宇宙的因果律，似乎悄悄的在運作。


    有些人以為公共的資源就不必節省，我們使用公廁時，常會發現有人用完水龍頭不會去關緊，其實，白白流掉的水正是在損耗自己用水的福報，而且浪費水資源的人，將來還可能會有缺水、或生長在沙漠國家無水可用的果報。奉勸大家當用才用，以免流失自己的福報，或造了未來的惡報。


    # 累積功德的方法


    服務是累積功德的方法之一。重點在於：帶著愛心，以及付出不求回報的心服務。如果一邊服務一邊生氣，功德很少，甚至於有業障。


    服務的方式有許多，在這裡舉一些簡單的例子：


    在家中，以愛心洗碗、洗衣、燒飯，照顧配偶、幼兒、父母、公婆或親人朋友，幫家人理髮、洗澡、整理家務等等。


    在工作中，在社區中，在大環境中，視情況的需要，都可以為人們服務。比如以愛心幫助人們靈性成長，教導他人學習讀書、繪畫、插花、園藝、烹飪、文學、藝術、音樂、舞蹈或其他自己擅長的項目等。或當環保義工，為大眾服務，或為老人院、孤兒院、或食物銀行服務。


    不要小看這些零零碎碎的服務，每一次的服務靈界都有計分的，都有累計功德。這些服務功德，可以為自己或家人朋友減輕業障、延長壽命、增加福報。人生只有短短幾十年，如果無所事事，時間也很快就過去了。把握珍貴的時間服務，因為在服務過程中，很容易放下我執，發展無條件的愛心。


    # 第五部 居家修行 修行篇


    - 敦促

    - 修身

    - 六度

    - 逆境考

    - 物質幻相

    - 修行忘年交

    - 修行與助人

    - 天意的管道

    - 陰陽界的溝通

    - 封神榜的啟示


    ## 敦促


    一位朋友面臨親人病危，向我詢問有沒有解決之道。指導靈透過我傳達給他的訊息如下：


    生死無常，時間越來越急迫了！你的親人因為執著於名利，沒有專心修行，所以大限一到就得離開，完全沒有延壽的機會。


    在地球上，這個肉身短暫無常，而財富就像空花水月一般虛幻，就算你玩遍天涯海角，你的心依然失落，不要再讓心隨波逐流，一世又一世輪迴生死。修行並沒有要你放下任何世俗的財物，只是讓你學習，不執著世間一切虛幻不實的境界，修行只是讓你明白，還有一個真實和永恆的世界存在。


    淨化你的身體、情感、和思想，在深入的禪定中，找回自己榮耀的真實身分，那時你會發現自己非常富有，從來不缺少什麼，你會活得真正自在和喜悅！


    ## 修身


    修身養性是逐漸沉澱、安靜、收心、內斂的過程，平常就要讓自己生活簡單，練習每個思維的靜定，有機會獨處時，多閱讀靈性的書籍，交友要審慎，選擇思想單純、善良、靈性高、積極有愛心的善知識。和他們在一起時很容易就學習到他們的優點，感染他們高雅的氣質，平和、溫柔、敦厚、正直的氛圍。


    打坐如何向內集中？許多修行人長期打坐卻不得要領，意念紛飛，一些人事物的片段干擾身心，靜不下來，或是只能靜一點，不能更進一步進入禪定。


    平時要注意自己的心理是否處於平衡的狀態？因為，所有的混亂來自內心深處的不平衡。


    如果能修正到身口意都清淨時，打坐就能自然的提升品質。打坐是征服自己的過程。


    ## 六度


    「六度」是六種法門，為菩薩道必修科目。行六度可以從生死苦海渡脫到涅槃安樂彼岸。


    ### 布施


    分享自身所擁有的或所知道的給需要的人。

    財布施、法布施（分享真理）、無畏布施（消除恐懼），

    可長養慈悲心，除去五毒中的「貪」。


    ### 持戒


    遵守佛法不作諸惡，奉行一切善，

    廣修善法利益眾生。

    基本的戒律是守五戒：

    不殺生、不偷盜、不邪淫、不妄語、不飲酒或吃迷幻藥。


    ### 忍辱


    能忍受別人的羞辱、懷疑、誤會、排擠等等而不生怨恨。

    當別人對你恭敬供養時，不生憍逸。

    當別人對你嗔罵打害時，不生怨恨。

    遇寒熱風雨饑渴等外界的惱害時，能忍耐能安住。

    能行忍辱者，乃可成為真正具有力量的人。

    忍辱能除去五毒中的「瞋」。


    ### 精進


    力行善法，勤斷惡根，不懶惰，不懈怠。

    找一個自己喜歡的法門，專心持續的修行。

    對於自己的不良習性，要持續的清理直到斷除。


    ### 禪定


    心無雜念，不為世俗萬物迷惑顛倒。

    禪定能對治散亂。

    打坐、靜心都是練習禪定的方法。


    ### 智慧


    修得智慧以破除煩惱，遠離無明和愚痴。

    了解萬物同一體，萬物的本質皆是愛。

    能除去五毒中的「癡」。


    ## 逆境考


    人生的起伏和天上的烏雲或風暴差不多。有時看起來很驚險，可是很快就事過境遷，完全沒事了。有一次，我忽然財物損失兩百萬，一時真是嚇壞了，誰知不到一年，又莫名其妙的賺回來了。另有一年，有位朋友被騙幾千萬，我與先生都為他難過，不知道他往後日子怎麼過。可是十幾年後，我們發現他早就回復了富裕的生活。所以不要被一些人事物的起伏嚇得要死，這些都是逆境考。


    有些人遭遇逆境時就想不開，彷彿天要塌下來了，他們不相信自己可以敗部復活，以為從此人生無望，如果放棄了希望，那才是被逆境考打敗了。


    其實，逆境考常常是人生中一段短時間的低谷考驗，遇到這樣的考驗時，我們要記得孟子所說的：「天將降大任於斯人也，必先苦其心志，勞其筋骨，餓其體膚，空乏其身，行拂亂其所為，所以動心忍性，增益其所不能。」當我們從容樂觀的面對考驗之後，會發現柳暗花明又一村，逆境過後，就好像雨過天晴，光明在望！


    ## 物質幻相


    有一個神話故事，大意是，有個年輕人在路上走著，忽然遇見一位仙人，他可以點石成金，還可以飛行。年輕人很想跟這位仙人學習成仙，仙人說：「你要先通過考驗才可以跟我學成仙之術。當你閉上眼睛，你會看到許多可怕的景象，你要知道一切都是假的，只是幻相。如果你把這些幻相當成真的，叫出聲來，你就不能學成仙之術了！」


    這年輕人閉上眼睛後，看見獅子老虎撲過來要咬他，他知道這是幻境，所以他一點也不害怕。接著，看到狂風暴雨、天災地變，他仍然知道這些都是幻相而已，所以也不害怕。他看到自己似乎遭遇許多災難，過了一段時間，他死了，被抓到地府去，接受閻羅王的審判。當閻羅王命人抓來他年老的父母，並派人鞭打他的父母，他心疼的大叫起來，然後他醒了，睜開眼睛。仙人說：「顯然你是個孝子，但不是成仙的材料！」接著神仙就騰空而去。


    雖然許多人都想成仙，但是卻對物質界有許多執著，比如：親情、財富、名利、成就、生死等等，如果把物質世界當成真實的，就會有許多的恐懼和掙扎，當然很難活得像神仙一樣的無憂無懼啦！


    ## 修行忘年交


    游老太太是我的一個白髮知己、忘年之交！二十年前，我初到加拿大時，就幸運的遇見他們夫妻，他們帶我參加日本佛教會，因為我聽不懂日文，所以假日裡，我常常去拜訪他們，和他們一起複習前一次的佛法課程。每當我走近她家門口時，已經聞到空氣中一縷淡淡的綠茶清香，而她總是很貼心的準備我愛吃的小點心。


    她是一個非常浪漫又可愛的人，印象中，她常常穿著淡雅的粉紅色唐裝，正好是我很喜歡的顏色和樣式。當我問起這衣服在哪裡買得到時，她居然有些害羞，笑咪咪的說，那是她結婚時的晚禮服。


    我們常常相約去公園坐坐，回想起來我們像母女一樣，總是坐在一起談天。和她說話是很輕鬆溫暖的，完全沒有負擔的感覺，不用擔心說錯什麼。她常常就哼起日本小調，後來我也學著像她那樣，時時刻刻都活得很開心，我們經常攜手哼著歌，一起去逛街。


    游老先生往生後，我和游老太太仍然繼續努力修行，有幾次游老太太想搬來和我同住，因為她當時八十二歲了。我怕我照顧不周，會引起她九個兒女的擔心，所以不敢答應。


    有一天，她舉辦慶生會，我應邀去她家，她的女兒準備了豐盛美味的食物，參加的人都是游老太太的好朋友。當天游老太太穿了一件大紅色的禮服，看起來好美！她那銀白的頭髮，白裡透紅的皮膚，配上大紅色衣服，顯得雍容華貴。她很開心的與我們一起唱了許多歌！奇妙的是，在她的臉上，我永遠察覺不到歲月的痕跡，我想那是因為她一直保有年輕快樂的心境！


    兩個月後，游老太太仙逝了！她是無疾而終的。她女兒說，她當時在美國兒子的家中，打電話給女兒時，神采奕奕，有說有笑的。掛電話後，就坐在椅子上，安詳的離開人間了。我對於她的走法有許多的羨慕和讚嘆！但願我能修到像她這樣，能遊戲人間，來去自如！


    ## 修行與助人


    有一次我夢見，廣欽老和尚來對我說：「你去告訴我的弟子們，不要老是躲在廟裡打坐念經，應該出山門去救渡眾生。另一次，我夢見弘一法師，他交代我幫助他的弟子們。其實，我根本不認識弘一法師，夢醒之後，我立即上網查他的長相，證實我夢中看見的形象是弘一法師。


    2002年，我本想要閉關十幾天，閉關中忽然有問題要問Arthur老師，於是打電話給他，他說：「你閉什麼關啊？躲避人！躲清涼吧！你立刻給我出來幫助別人！」


    我說：「我想一直都在同一體裡面！」


    老師說：「如果你只想在涅槃裡面，又何必來投胎？你應該出來幫助別人，助人的時候，你會進步更快！」


    由於老師的當頭棒喝，我當天就出關了。後來我發現，每當我有機會幫助別人時，有如神助，而且對自己有最大的收穫。因為與靈界合作幫助眾生，會越來越了解靈界的運作，更知道靈界的存在與幫助，也更了解各路神明的能量，更容易查到訊息，這些與靈界溝通的能力都是在幫助別人時，自然發生的。所以有能力幫助別人時，不要執著獨自修行，也不要獨善其身，應該與有緣人多分享修行的心得。主動發展更多的人際關係，才有更多助人的機會，我們發出去愛心的能量，宇宙也會回饋更多愛的贈禮。


    除了諸位已離世以及還在世的老師教我去助人之外，靈界還給我一個夢訊息。有一天早晨我醒來前，聽見靈界的聲音說：「今天是你兒子滿十三歲的日子，從現在起，他的健康和學業由我們接管，你只要去幫助別人的小孩就可以了。」夢中我看到一大群的孩子環繞著我。


    醒來後，我立刻去看日曆，天啊！真的是我兒子十三歲的生日，這個印證讓我對靈界產生了極大的信心。從那天起，我把助人當成修行的第一順位。


    因助人的時間增加許多，所以打坐時間大幅減少了，我練習在日常生活中，觀察自己的起心動念，練習讓思維有紀律，練習放下情緒的起伏，練習時時保持靜定。


    也許外在扮演著母親、妻子、媳婦、老師、學生、許許多多的角色，像一隻花蝴蝶似的忙碌。但是，內在的我，要求自己像老僧入定，做到內外兼修，盡量做到八風吹不動。雖然困難度極高，挑戰極多，考驗很大，我只是盡力而為罷了！幸好，我對自己很寬鬆，做不到的時候，就自我解嘲一下，生活還是要以愉快平靜為主啊！


    ## 天意的管道


    幫助有緣人，許多情況是天意的指示和安排，我們只要配合天意去幫助別人，無我無求的人是最佳的管道。


    想要成為天意的管道，可以向天意祈禱和發願：「我願意成為天意的管道，請安排讓我有幫助別人的機會。」這樣靈界弟兄們，就會安排在適當時機，讓我們有機會陪伴一些有緣人靈性成長。


    如果我們身心靈都還沒準備好，無法勝任陪伴眾生成長的工作，靈界弟兄會安排適合我們的老師或書籍，讓我們可以快速成長，達到一定程度的了悟之後，可以真正陪伴眾生靈性成長。


    當我們陪伴別人成長時，我們會進步更快，每一位我們陪伴的眾生的修行體驗，也會成為我們的體驗。如果一年內有機會陪伴三十位朋友成長，我們就賺到三十份修行經歷，好像我們多賺到三十年的體驗，這些靈性的養分，讓我們更容易智慧開花，收穫更多靈性的果實，所以有機會要多幫助別人靈性成長。


    ## 陰陽界的溝通


    多年前，有一位親人身體疼痛不堪，我打電話安慰她，電話裡一直有許多聲音干擾，他們發出一些噪音，我忍耐著不理會他們，但也沒告訴我的親人，免得她恐懼。但是，我勸她念地藏經，並且對過去世所造的惡業懺悔。


    掛上電話，我就對這些吵鬧的靈魂說：「有話就說清楚、講明白，我才會知道你們想要什麼，不要總說一些我聽不懂的話。」當我閉上眼時，看到右方一個約二十多歲的男人，他誠懇的要求我收留他，他想跟我學修行。左方有兩個約三十來歲的女人，帶著一個小女孩，其中一個對我說：「我也想跟妳學習，我保證絕對不會吵妳，我的小孩晚上會哭鬧，晚上我會帶她去住旅館，只希望妳務必收容我們。」因為他們都說要修行，我就全部答應了。


    第二天我的親人痊癒了，她驚訝的問我是如何處理的？因為，她已經痛苦一個多月了，我告訴她事情的來龍去脈。她說，難怪上回有朋友去她家住的時候，抱怨半夜有小孩子來拉她的手。她說這一年多來，經常在半夜聽到有男人女人在她床邊講話的聲音。我感到非常開心，因為，我終於有能力可以幫助親人脫離苦難了！


    ## 封神榜的啟示


    小時候看封神榜只當它是神話故事，這次再看封神榜，覺得上天透過這本書，教導「順天者昌，逆天者亡」的基本道理，並且提醒我們走在修行路上應該要注意的事情。


    主角姜子牙，順應天意，替天行道。他修道四十年後，奉天命下山執行封神計畫，並輔佐武王伐紂。在戰爭中，他面臨了七次死亡，三次災厄，但是憑著智慧以及遵從天意，總是能逢凶化吉，最終成功的輔佐周武王完成大業。並且，在封神台上，冊封三百六十五位正神。


    紂王違逆天意，暴虐無道，聽信讒言，誅殺忠良，長久征戰，勞民傷財，禍國殃民，又成天享樂，建造鹿臺、酒池肉林，奢華無度，最終導致商朝滅亡，自焚而死。


    周國的大公子伯邑考，以進貢拯救父親時，妲己見他年輕俊秀起了色心，他不知婉轉變通，嚴厲拒絕妲己的誘惑，遭到妲己狠毒的報復，落得被剁成肉餅的悽慘下場。還連累獄中老父，非得傷心的吞下親生兒的肉才能保命。


    忠肝義膽的皇叔比干，堅持「君要臣死，臣不得不死。」的愚忠，在明知不合理的情況下，還是自己痛苦的剜心送給紂王，希望他會覺醒。結果只是白白犧牲性命，無濟於事。由此可見，想幫助別人，並不是掏心掏肺就可以解決，而是要運用技巧及智慧。


    周侯二公子姬發，大智若愚，忠孝仁義俱全的他，每天裝瘋賣傻於市井之間，方得以逃過紂王的監視，最終順利救出老父，完成大業，成為周朝開國君主周武王。


    此外，還有許多不同修道門派的人，有些聽從天意加入討伐紂王之戰，但也有一些逆天而行，助紂為虐的修道人，與正義之師大動干戈。那時上天傳下旨意給所有修道之人：


    > 凡是在家潛心修行者，不插手戰事者，

    > 皆可被封神，名列仙班。


    這麼容易遵守的旨意，都還是有許多人寧願去打抱不平，戰得水深火熱，渾然忘了自己修道的目的。試想一個修道之人，找個幫助別人的藉口，成日跑到戰場上和別人打仗，比賽神通，心忙意亂，爭鬥心如此強大，如何修身養性，如何成聖成佛？


    封神榜給我許多啟示，也成為我修行的參考與借鏡。


    ### 後記：


    在家乖乖修行，不要去攻擊其他人。

    這麼簡單就可以名列仙班

    ～多麼令人開心啊！～


    # 能量篇


    - 全能量

    - 氣功與能量

    - 凝視的力量

    - 內境影響外境

    - 暗戀能量干擾

    - 磁場與吸引力


    ## 全能量


    全能量是具有愛和智慧的宇宙能量，是完美且完整的創造性能量，可直接供應我們身體與靈體所需的能量，是我們的基本生命能。充足的全能量可以為我們帶來健康、生命力、以及物質上的豐盛富裕，也可以幫助家庭和樂，事業興旺。


    守五戒、有愛心，思維有紀律的修行者，練習全能量可以修補自己的乙太體，擁有自我療癒的能力。當我們的乙太體獲得足夠的全能量時，可以開啟第三眼，擴展靈性的視野。能量充沛時，還可強化星光體，神遊太虛。


    運作全能量有助於進入禪定狀態，擴展內在的神力。充足的全能量會成為「能量的天梯」，讓我們得以連結到浩瀚宇宙中的高能量智慧眾生，最終得以成為他們之中的一員。


    全能量之於靈界，就好比金錢之於物質界。若精通全能量的運作，成為高能量的眾生，回到靈界時，可以進入更高的能量界，在高等能量界的眾生擁有強大的創造力。


    ### 練習運作全能量的步驟：


    一、做三個深呼吸，讓身體放鬆。


    二、有意識的提醒自己：

    我吸進全能量，

    我呼出和釋放全能量，

    我可以為這個世界帶來豐沛的能量，

    這個世界因為我的存在而變得更宏偉華麗。


    三、閉上雙眼，專注於自己的「手掌心」幾分鐘。

    注意力在手掌心可打開勞宮穴，啟動能量運轉。

    中指自然彎曲，中指點在手心的地方就是勞宮穴。

    「勞宮穴」是人體內外能量交換的主要通道，是身體吸收能量最快的部位之一。右手是陽性能量，左手是陰性能量，兩手的能量相結合，形成一個太極磁場，這太極磁場是一個強大磁場。


    四、保持放鬆入靜，讓全能量自動運轉，通達全身。

    全能量是有智慧的，讓全能量自動運轉，不要用意念去引導，以免干擾全能量的運轉方向和順暢。首先，感覺到雙手的脈動變強了，兩手的能量相連結，接著，感覺到心臟的脈動，心輪的能量同時啟動，心輪開始散發出熱能。全能量會自動去打通每一個能量輪，以及身體所有的經脈，使我們的身體載具運轉更順暢。靜心程度較高的人，可以用內眼看到光的流動，有些人可以感覺到能量的旋轉，有些人可以感知能量的色彩，有些人可以感覺到能量正在修復身體的某些部位或器官。


    全能量可以幫助我們身體更健康，並且充滿生命力。練習全能量後，心臟會變得更強而有力，腸胃的吸收力會更好，免疫系統更健全，身體若有能量堵塞的部位，全能量會自動偵測並疏通清理，因此，也自然的療癒了身體。


    全能量可以強化乙太體，形成一個強大的保護能場，可防止外在負面能量的影響。若有人受到負面能量或靈魂干擾時，可以練習啟動全能量，當身體開始溫暖放光時，會形成一個強大的磁場，那些負面能量或靈魂將無法在人體上繼續逗留，會被全能量逼出去。


    練習專注手掌心一段時間，自然會養成專注的習慣，頭腦有了紀律，不再胡思亂想而浪費能量，就算不再去想手掌心，也容易時時保持充沛的能量。因此，情緒更穩定，思維更正面、更清晰、更有條理。


    任何時候，無論是走路時、工作時、談話時、靜心時、或睡覺前，都可以練習把注意力放在手掌心，從宇宙中取得全能量，那是取之不盡、用之不竭的宇宙能。


    祝福大家行住坐臥都能保持在能量充沛的狀態中！'
  mdcn: '# 和順得善終


    鄰居有位老太太，一向溫和善良，對待兒孫媳婦都是和顏悅色，而且很會幫忙家務，照顧孫輩，人前人後沒有半句怨言，誰也沒看過她生氣的樣子，雖然沒參加什麼宗教，修什麼行，但是她的一舉一動，就是那樣安詳自在、與世無爭。在她接近八十歲時，有一天她拜託媳婦幫她買了一件新草蓆，並且買了一套白色棉布衣褲，然後她囑咐兒子通知所有的家人回家，她說她要出遠門，大家都很奇怪，以為她要去旅行，所以都回來看她。


