    以上是《三波志願者與新地球》的摘要筆記。該書作者朵洛莉絲出生於1931年的美國，我們將這篇摘要編入此書，是為了印證，雖然我們身處不同的時空，而且彼此不認識，但是，我們所接收到的訊息，卻有許多相同之處。


    2013年9月15日，我曾在靈性成長部落格上發表一篇「他們來自銀河系」在此供大家對照和參考。


    許多來自銀河系的高等進化生命，來到地球幫助人類的轉化提升。比如修正人類基因（DNA），製作電腦高科技產物，改善環境美化地球，以及許多新的思維概念等等，都是他們帶給地球的贈禮。


    地球漸漸進入新紀元，整個星球正在快速進化提升，宇宙間許多與地球有緣的高等進化生命，自願承擔不同的任務和使命，來到地球共襄盛舉。


    一切的轉換快到不可想像，願意接受轉型，繼續進化的眾生，可留在地球繼續學習。不想進步、醉生夢死的眾生，會被帶到適合他們等級的星球，以自己的速度進化。


    留在地球上的眾生都會逐漸提升到思維清晰，充滿愛力，身心平衡，快樂自在的狀態，繼續靈性成長之旅。


    ## 提醒外星人

    ～2008.08.18指導靈訊息～


    有些外星人第一次來到地球投胎，對他們而言，這是全新的嘗試。原本在高科技星球的人，吃穿都不用愁，來到地球常會感覺很失落。外星人太聰明了，所以會想得很遠，反而把自己嚇得魂不守舍。他們常常覺得自己有一身好武藝，卻英雄無用武之地，所以外星人來地球投生並不保證成功，甚至可能比地球人還混得不好。他們想要很多財富，卻不知如何去賺取，因此感到挫敗。他們雖然擅長分析，卻分析不出挫敗的原因。外星人非常容易憤世嫉俗，常常覺得別人比他笨，嘲笑地球人沒氣質，覺得地球人是暴發戶⋯⋯。


    還有一類外星人的特性是非常懶惰，怨天尤人，不想去工作。遇到障礙時，總覺得都是別人的錯。孤僻高傲，眼高手低，喜歡躲在自己的城堡裡，覺得別人很低俗。很會唱高調，和地球人格格不入。基本上沒什麼朋友，卻又瞧不起別人。雖然冷靜、機智，但冷漠、固步自封。常常覺得如果自己去做會比別人更好，但是也沒見到他們真正動手去實行。他們喜歡守株待兔，等待事物從天而降。


    另一類外星人很有成就，比前一類開心很多，但是，他們也不太想和地球人往來。只有幾個外星人互相聯絡，久久才一次，彼此惺惺相惜。他們潔身自愛，決不打擾別人的生活，行為舉止非常紳士淑女。不過，也傾向於說得多，做得少。計畫一堆，但終其一生，並沒有去實現。因為，他們接收到訊息，卻沒有去做。


    由於之前的外星人失敗率太高，現在派來大批的外星人，就好比愛斯基摩人的雪橇，需要用很多隻狗來拉。現在要運用群體的力量，外星人必須聚在一起，才有影響力，落單時，沒有力量。這就是為什麼將這些「落寞的外星人」帶到你這兒，因為，你可以提醒這些人。


    有些外星人雖然已經七老八十了，但是仍然可以盡一些心力，有所貢獻。而且，下一世他們會更開悟。因為，他們曾經在地球上醒來過，這些記憶會帶到下一世。


    2007年起，開始推廣「生命藍圖」，這是一項拯救外星人的行動。因為，許多外星人陷在無助的幻覺裡～以為自己是地球人。醒來時，他們是一個全新的外星人，他們會很開心，就像經歷一次重生，並且開始執行自己的任務。否則，不知生命的意義，和一般人一樣，落入生老病死的幻覺裡。


    透過「生命藍圖」的解說，一群一群的外星人正在覺醒，透過解說，他們不再徬徨迷失和掙扎，開始充滿了力量，活出一個新的自我，並且拿出自己的武器（專長），開始執行「捍衛地球」的任務。


    地球正在覺醒，全面提升！


    ## 遨遊宇宙星際


    這大概是我此生中最難忘懷的一日，那天清晨我剛剛起床，坐在電腦桌前工作。忽然門鈴響了，我從二樓看下去，玻璃門前，亮麗的陽光中站著一個纖瘦女孩的身影。打開門，見到的是一位清秀的女孩，容貌長得很像我學生時代的好朋友欣欣。


    「嗨！你是欣欣嗎？」我好奇的問。她笑笑沒回答，指著身後的一個約汽車大小，類似飛碟的小型圓形飛行器，說：「要不要出去玩？」我好奇的問「去哪裡？」。「宇宙！」她說（P.4圖）。


    由於她說話時的語調就像極了溫柔善解人意的欣欣，我對她幾乎如同對老友般的信任，於是懷著一顆好奇的心，走上飛行器。控制台上其實沒有任何儀器，前方只是大大的玻璃窗。她說：「妳喜歡幫人，我幫妳找找看是否有人需要幫忙。」然後飛行器直線上升，到我家隔壁三樓外牆。她說：「妳看！」


    我說：「我只看到牆壁。」


    她笑了，說：「忘了幫妳改變振動力！」瞬間，我就可以透視牆壁，看到裡面有一位大學生，在他的大型工作台前坐著，而且愉快的吹著口哨。她說：「妳看！他很快樂，不需要人家幫忙，我們去玩吧！」


    我很納悶飛行器似乎沒有任何的動力被啟動，也沒有引擎的聲音，但是頃刻間，我們已經飛離地球，來到太陽系的一個星球附近，這個星球的外圍環繞著一大圈正在旋轉的、許多彩色的小礦石塊，她說這是土星。可是我認為土星應該是有一圈白色的光圈。她說那只是因為遠看、速度、還有照相的緣故，其實真實的情況就是這樣的。我說：「這樣很美！很特別啊！」


    接著，我看到整個外太空宇宙緩緩的在旋轉中，無邊無際，細細密密的星球佈滿虛空，星球與星球之間還有能量在流轉，這些能量有他們自己的色彩和光暈，放眼望去整個宇宙滿滿的能量，好像河流在流動。那浩瀚壯麗華美的景觀，真讓我目不暇給！


    我們參觀了一個美麗的星球，在綠草如茵的大地上，有許多人在演奏。他們都像是喜歡音樂的年輕人，有男有女，每個人都使用自己喜歡的樂器，有大提琴、小提琴、笛子、豎琴等等。當需要時，鋼琴居然是可以從天而降的，大家都陶醉在美妙的音樂中。


    他們的食物，也很特別，野餐桌上的水果都是透明的，很像我們的果凍，有一種水果形似木瓜，像虎珀一樣透明，木瓜中的咖啡色種子，像是透明的珠子，充滿了視覺之美。她說：「你會選擇住在這個星球嗎？」我回答：「嗯！我雖然覺得這裡很美也很浪漫，但是如果永遠都在演奏，也會覺得很無趣啊！」


    她又帶我去另一個科技先進的星球，這裡是不需要勞動工作的星球。食物以及生活必需品都是透過電腦控制，由機械自動播種和生產，所有的必需品都可以免費取得。風景優美，環境整潔，人們自由自在，想旅遊就乘著小飛碟去旅遊，想泛舟潛水都是隨時可以去的，像是一個專門度假的星球。但我還是覺得遲早會無聊的，所以它仍不是我想要的天堂。


    當飛行器回到家門口，我依依不捨的，向外星朋友揮手道別！走在屋前的院子，無意中瞥見，有許多豆大的雨珠子，正緩慢的滑落。那些雨珠子滑落的速度，讓我可以很仔細的看，它們就像晶瑩剔透的珍珠。我仰望著天空，欣賞那漫天透明的珍珠緩緩滑落之美（P.5圖）。那一刻，我捨不得走回家中，一直佇立在前院，欣賞這雨中奇景～絕美的慢鏡頭。我知道一旦跨進家門，我的振動力會立刻變回來，就好像公主又變回灰姑娘了！


    這雨珠滑落的速度，就好像在電影「駭客帝國」裡，子彈緩緩前進的那個情節，難怪他們可以徒手把行進中的子彈拿住。我終於知道原來在不同的振動頻率裡，可以看到物質以不同的速度運行。


