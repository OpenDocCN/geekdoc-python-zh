  md: '這時，兒子又說話了：「鬼！」這次他的發音更清楚了，見到我倆還是不理他，他就用越來越大的聲音說：「鬼！鬼！鬼！」我和我先生面面相覷，寒毛直豎，二話不說，帶著兒子跑出那房子。後來我們才聽說，那間房子的基地曾經有兩座墳墓。


