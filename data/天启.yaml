    # 愛情保鮮劑


    放手，給配偶自由的時間和空間！


    許多人剛結婚時，一直想和配偶膩在一起，想要無時無刻攜手共度。但是婚後幾個月後就開始相處不愉快了。有位新婚妻子跟我抱怨，先生開始冷落她了。


    我說：「妳想離婚嗎？」

    她說：「我才剛結婚，怎麼會想離婚呢？」

    我說：「可是妳的作法是想離婚的做法啊！男孩子在未婚前很自由，他們習慣這樣的生活，如果妳想牢牢控制他的生活，他會覺得婚姻生活很痛苦，就像在監獄牢籠中，一定會想逃走。所以要學會欲擒故縱，讓他們在家裡也很自在，讓他像婚前一樣，可以自由的做自己喜欢做的事情，這樣婚姻才能長久。」


    她說：「可是，他沒陪我，我會很寂寞啊？」


    我建議她也要像未婚時的心情一樣，多學習新事物，多做自己喜歡的事，多和朋友們交流，保有自己獨立自主的生活，這樣才不會覺得無聊而整天想跟先生膩在一起。'
