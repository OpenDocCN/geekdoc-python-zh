    \n編輯者序 014\n作者介紹 019\n\n## 編輯者序\n\n本書是由Samantha的作品《無上力量》、《愛海》、及「靈性成長」部落格的文章彙編而成。書名《天啟》已道出了本書所要傳達的訊息主要是來自上天的啟示。\n\
    \n其實，就連書名也是來自靈界的訊息，並非作者個人的構思。起初，作者覺得這書名太嚴肅了，與她的個性不符，所以並不想採納。但是，靜下來仔細想想，她這一生確實是隨時在接受天啟，所有書中的故事、個案、實例，都是由上天精心安排，由靈界弟兄們用心排練，而後才呈現於她的日常生活中。令人感動的是，早期親友的生命故事，發生的時間距今已將近百年，靈界的指導靈們為了這本書不知投入了多少愛心和能量。\n\
    \n我們投生地球教室，在人間學習和歷練，肉眼看得見的，是親友、老師、以及其他有緣人，他們參與了我們的學習和成長。肉眼看不見的，在靈界還有許多指導靈、守護靈們時時在關懷、照顧和指引我們的靈性成長。他們隨時注意我們的思言行，並且安排定期或不定期的考驗，來決定我們提升的進程，以及新課程、新教室的規劃。\n\
    \nSamantha天生擅長把握重點，所以這次指導靈借重她，為大家編寫這本「修行考古題」。由於閱讀這本書的有緣人，分布各種靈魂年齡層，而且這本書的眾多指導靈也來自不同境界，各有不同的重點和指引。各位看官，請隨順自己的喜好，選擇適合自己的主題閱讀。覺得自己已通過或不需要的主題，就跳過或放下吧！\n\
    \n指導靈說，修行的經典很多，但是「應用在生活中」的文章並不多，Samantha可以在生活中實踐教理，並且寫出感想。所以上天借重她，讓她從小經歷各種考驗，當她通過課程時，再經由她來表達如何過關，而每一次過關都是因為「愛」。所有人際關係的背後幾乎都有因果關係，然而，愛可以超越一切因果。\n\
    \n地球被宇宙高層封鎖許多年，現在開始讓地球更自由，並且全面提升人類的意識層次。指導靈希望能透過這本書，鼓勵人們擴展眼界和意識層次，但是達到這之前，要先學會「愛」。\n\
    \n在編輯過程中，我們更深入體會到，小我與大我的視野不同，小我會有個性和偏好，而大我著重的是「如何利益最多的人」。比如，小我頭腦希望用字遣詞能文雅或富有學識，但是，來自大我的訊息是，文字要平易近人，甚至為了某些有緣人，必須運用粗糙的語氣。在這些過程中，我們同時學習放下小我的執著，隨順大我和天意的啟示。\n\
    \n就在我們以為全書已編好要定稿的那天，忽然間，訊息從四面八方，透過不同的管道傳來。靈界簡直就是在「點名」，而遺漏的文章竟然都在「靈性成長」部落格可以找到。Samantha驚訝的說，那麼多年前寫的文章，她自己早就忘了，本來要提筆重寫，而靈界立即提醒她，文章就在她的部落格中，不必費事了！\n\
    \n本書的編輯順序主要是依據作者的成長歷程：\n\n第一部 邁向修行路，主要是源自《無上力量》書中的文章，敘述作者從小聽聞和經歷的親友故事，從中體會到人間的苦難和無常，因而產生出離心，邁向修行的道路。\n\
    \n第二部 與上天溝通，主要是《愛海》書中的文章，收錄許多與靈界指導靈的對話，以及作者閉關的同一體體驗。\n\n第三部 永生的靈魂，希望讀者了解靈魂是永生不死的，能放下對生死的恐懼，了解靈界的愛護，並且更加信任上天。\n\
    \n第四部 因果的律法，提醒讀者，諸惡莫做，勿以惡小而為之，勿以善小而不為。這部主要是修行的基本功。\n\n第五部 居家修行，與讀者分享在生活中修行的經驗。這一部主要是為了不想出家，或不想參加宗教團體，而在家修行的讀者而寫的。\n\
    \n第六部 解析夢訊息，希望讀者透過書中的實例解析，了解夢訊息的重要，並且開始記錄自己的夢訊息。這方法有助於了解自己的意識和潛意識，以及目前靈性成長需要改進的方向。\n\
    \n第七部 宇宙星球，希望讀者透過這些文章能將眼界從地球擴展至宇宙，並且將意識提升到宇宙的層次，進而回歸上主。作者認為，當我們還在地球的每一天，都要過得精彩豐富，不是等到回去靈界時，才享受天人的樂趣，我們可以在地球上享有天人般的美妙生活，也就是，實現「地球有如天堂」的願景。\n\
    \n當我們綜覽完成的手稿時，才發現，這些故事不僅是我們親朋好友的故事，也是更廣大人群的縮影。雖然故事中有人類殘酷血腥的過去，但也有溫馨感人的提醒，以及充滿希望的當下及未來，一切都交織在美麗的生命織錦圖中。Samantha擅長繪畫，但她從沒想到，這張織錦圖竟然是透過她六十幾年的歲月來展現。\n\
    \n本書的完成要感謝：\n護持本書的指導靈們\nArthur以及各位靈性導師們的教導\nSamantha的人生經驗和智慧的分享\n所有參與演出書中故事的親朋好友們\n\
    Omni、素雲、雅玲、夏惠以及所有參與編輯、修正、\n和校對的每一位工作人員～無論是在時空內或時空外的！\n\n這本書是我們在靈性成長過程中的愛心和智慧結晶，\n\
    是一體性共同的創作。\n\n深深的祝福每一位有緣的讀者：\n在了悟真我的朝聖旅程中，\n能有時空內外的良師益友的愛心指引和陪伴，\n能夠早日成為宇宙公民，\n\
    自由自在的遨遊宇宙星際，\n快樂的回歸上主永恆的懷抱中！\n\n天啟編輯團隊\n在愛與至福中\n2019年9月7日\n\n## 作者介紹～我心目中的Samantha\n\
    \n《神仙家庭》是60年代非常賣座的喜劇電視影集，女主角Samantha（莎曼珊）是位具有超能力的魔法仙女，為了愛，她化身為平凡人，與她所心愛的男士組成了家庭。天真善良的Samantha，只要動動鼻子，並運用法力，就可以幫助家人及朋友解決問題，一連串的驚奇與趣事，就此展開⋯⋯。\n\
    \n這部影集在我幼年時上映，我記得女主角總是動動鼻子的俏模樣，但我已忘了她的名字。我覺得二姐的個性很像她，今天特別上網搜尋看看，赫然發現她的名字也是：Samantha，而且長相和笑容還有點兒像二姐！\n\
    \n二姐最喜歡頭腦放空，不多思考，Samantha這名字是Arthur給她的修行法名，他說，這個名字有助於思維上的成長。所以，二姐欣然的接受了。\n\n在我出生時，二姐已經九歲，當時父母親共有五個女兒，我是Samantha最小的妹妹。從我有記憶起，二姐已進入青少年的叛逆期。印象中，她總是隨著心動的感覺，做自己想做的事，因此與父母嚴格且傳統的管教時有衝突。當我還是一個乖乖順從父母的小孩時，二姐已是有主見的女兒了。\n\
    \n我們在人間的父親出生於日據時代，因家境變故，僅接受日本的小學教育，第二次世界大戰結束時，父親以十四歲的年齡，進入郵電局窗口工作。為改善家人的生活，自學苦讀多年，才通過重重檢定考試，而取得高考資格，在公家機關努力認真的上班，慢慢等待升遷的機會。因此，他最大的希望就是，他的孩子們可以有機會好好的接受正規教育。在他個人的價值觀裡，有好的學歷，才有好的未來。\n\
    \n然而，Samantha天生愛好自由，她喜歡看書，但是教科書對她而言，太狹隘。家裡沒有錢買課外書，她就去圖書館看書。當時我很小，並不知道她看了許多書，只記得父母總是在教訓她，怎麼都不讀書，成績單發下來時，總有嚴厲的責罵聲。幼小的我，還傻楞楞的以為姐姐不喜歡看書呢！\n\
    \nSamantha天生喜愛繪畫，隨筆一揮，就是好畫一幅，只可惜由於當時家境清寒，父親反對她去念美術學校。有一段時間，青潭社區裡的小朋友流行玩紙娃娃，我們沒有零用錢買紙娃娃，二姐就畫給我們。她畫的娃娃，有著水汪汪的大眼睛，溫柔可愛的面容，窈窕勻稱的身材，活潑動人的姿態。她還畫了許多時尚的衣服和裝飾品，讓娃娃可以更換穿戴。由於她畫的比坊間賣的紙娃娃更清新漂亮，所以我的玩伴們都來拜託她，請她多畫一些娃娃。大家都很羨慕我有一個擅長繪畫的姐姐，我也感到好榮幸啊！\n\
    \n有一次，Samantha將粗製的火柴盒改裝為細緻優雅的化妝台，每一個抽屜，都有透明的彩色珠珠串成的把手，可以真正拉合開關，也可以存放小飾品。我看了真是好喜歡，也好佩服姐姐巧手天工，化腐朽為神奇的能力。\n\
    \n由於父親工作的薪資，一部分要寄給祖父母，另一部分要養活我們家八口人，因此家中的食物是要節約分配的，比如吃水果時，一顆橘子三人分，一條香蕉兩人分。一家人能維持基本的生活，已經是母親努力勤儉持家的成果了。但是孩童時期的我們，除了正餐外，也會想吃點心或零食。偶爾，二姐也會趁著母親去買菜不在家時，進入廚房運用她的創造力，做出簡單美味的小點心，主要材料可能只是麵粉、太白粉…但是，加上她的巧思和愛心調味之後，我們都吃得津津有味，至今都還難以忘懷那時的滿足感。\n\
    \n1972年夏天，二姐暑期打工領薪資的那一天，她帶著我去卡林塑膠公司，領了薪水後立即帶著我去喝綠豆湯，我們一起開心的享受她努力工作後的甜美果實。接著，她帶我去看早場電影，是凌波主演的《十四女英豪》。電影的情節我大致記得，是講述宋朝楊門女將衛國安民的英勇"
