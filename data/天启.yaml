    # 情緒失控的危險


    習慣發脾氣的人，身體容易被其他靈魂借用。發脾氣時，容易引來情緒強烈且憎恨心重的靈魂。他們隨著當事人的情緒振動力，介入當事人的情緒、思維和身體。


    曾經有許多平時相愛的人，在吵架時不小心刺傷對方，或殺死對方。他們本來並沒有想這麼做，只是生氣時沒有辦法控制自己，像發了瘋一樣。其實，當時只是身體被其他靈魂借用，失去控制自己意志力的能力，就連身體的肢體都被介入的靈魂使用，事後懊悔都來不及了，感覺自己像做了一場惡夢。


    靈魂暫時介入的時間通常不會很久，大約一兩小時，他們會出去。因為人體屬陽，它們屬陰，他們無法在人體內太久，所以會自動離開。這時剛才被介入者，會清醒過來。所以發生爭吵或衝突時，最好至少有一方能警覺到，保持冷靜，暫時先藉故離開，彼此隔離幾小時，避免被借用。'
