    # 神遊時空


    作者：Arthur

    出版社：白象文化

    出版日期：2018/09/01

    語言：繁體中文

    定價：300元


    ![](img/3a2e865c13e3ce69f7f5ead8dcaa3507_348_1.png)


    本書收錄了Arthur所發表過的珍貴教理，是一本充滿正念、正法、正能量的修行寶典。這些珍貴的教理，有許多是Arthur接收來自高等意識層次的靈感訊息。閱讀時，讀者可以去感受那文字背後的明晰、平靜和靈性之美。我們希望透過這本書將Arthur與我們分享的靈性智慧，與更多渴望了悟自我、提昇靈性的有緣人分享。在人類進化的朝聖旅程中，這本書就好像旅程中的指南，先驅者分享了寶貴的經驗，好讓讀者可以充分享受自在修行的樂趣。


    全能量是具有愛和智慧的宇宙能量，是完美且完整的創造性能量，可直接供應我們身體與靈體所需的能量，是我們的基本生命能。充足的全能量可以為我們帶來健康、生命力、以及物質上的豐盛富裕，也可以幫助家庭和樂、事業興旺。


    守五戒、有愛心，思維有紀律的修行者，練習全能量可以修補自己的以太體，擁有自我療癒的能力。當我們的以太體獲得足夠的全能量時，可以開啓第三眼，擴展靈性的視野。能量充沛時，還可強化星光體，神遊太虛。


    運作全能量有助於進入禪定狀態，擴展內在的神力。充足的全能量會成為「能量的天梯」，讓我們得以連結到浩瀚宇宙中的高能量智慧衆生，最終得以成為他們之中的一員。


    全能量之於靈界，就好比金錢之於物質界。若精通全能量的運作，成為高能量的衆生，回到靈界時，可以進入更高的能量界，在高等能量界的衆生擁有強大的創造力。


    任何時候，無論是走路時、工作時、談話時、靜心時、或睡覺前，都可以練習把注意力放在手掌心，從宇宙中取得全能量，那是取之不盡、用之不竭的宇宙能。祝福大家行住坐臥都能保持在能量充沛的狀態中！


    > ～節錄：《天啓。全能量》～


    ![](img/3a2e865c13e3ce69f7f5ead8dcaa3507_349_0.png)'
