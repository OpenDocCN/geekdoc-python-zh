  md: '# 幸福的祕訣


    幸福不是天上掉下來的，雖然如此先別失望，讓我悄悄的告訴你：如何找到幸福！其實，只要學會正面思維，很快的就能擁有幸福的生活。如果你們曾經看過一些具有超能力的人，集中心智移動物品，或扭曲鐵湯匙等，就會明白，思維是可以控制物質的。


    思維是具有創造性的能量，想好的，就會創造好的。因此，最好只想幸福的事，想自己未來會更好，更健康，更富有，更幸福，更快樂，更有智慧，更自在，更開悟。如果有恆心、有信心的想正面的。而且當你想得到什麼，就專注的投入心力，盡力去做應當做的事，相信事情會圓滿達成，你就可以準備迎接所有幸福的來臨。


    有些人常常胡思亂想，杞人憂天，整日憂心忡忡的。他們不知道自己已經在不知不覺中過著暗無天日的生活，而且，還為自己的未來訂製了暗潮洶湧崎嶇坎坷的生命。


    有一個簡單的培養思維紀律的方法是：隨時觀察自己的每一個思想，把所有負面思想改為正面，持續的做，直到頭腦裡只留下「正面的」思想。'
