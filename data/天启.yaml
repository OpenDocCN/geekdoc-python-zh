  md: '他的雙眼，接著鋸斷雙腿，我嚇得大叫阻止。這時旁邊的人很客氣的對我說：「回去拿五百元來，買新的眼珠子和一雙腿。」


    我是哭著醒來的，眼角還含著淚水。冷靜後想想，這個夢是訊息，提醒我，我先生必須備有捐五百元的功德，靈界才可以幫他更換眼睛和雙腿。所以我立即去捐了加幣五百元給慈善團體。從此以後，他的痛風症狀逐漸減輕，腿部回復了健康，眼睛也不再有內出血的狀況了。指導靈說，因為我先生幫修行團體運送物資，才有這樣的優惠。


    許多年後，一位朋友突然從台灣打電話來，希望我幫他解夢。他夢見妻子的兩個卵巢被挖出來，擺在地上血淋淋的，他簡直嚇壞了。


