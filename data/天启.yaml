    ## 制作说明：\n\n本书由《天使神秘学院》出重金从台湾购入的原版书籍扫描制作完成。为达到最好阅读效果，特地把书全部切开后，再经由专业扫描设备高精度扫描完成，并经过一张张的PS后期处理最终成书，其间花费大量的人力、物力以及时间，只为能给大家提供经济并优质的神秘学学习资料而努力。\n\
    \n本学院强力谴责某些机构和个人，把本学院花心血制作完成的电子书籍，包装后直接放在自家淘宝网上低价倾销的行为，以谋取不劳而获的经济利益。如果长此以往最终将无人愿意再为大家花心思制作电子书，那以后可能大家再无新书可读。\n\
    \n为让大家以后能够读到更多的好书，也为了本学院的良性发展。本学院恳请大家尽量做到如下几点：\n\n- 一、尽量在天使神秘学院的官方网站购买电子书籍。\n\
    \  官网电脑访问地址：http://strc.cr.cx\n\n- 二、在收到电子书后小范围传阅即可，千万不要公开传播，更别挂到淘宝网上低价销售。\n\n\
    同时为答谢广大支持者，学院电子书将做如下调整：\n\n- 一、学院会把一些早已收回制作成本的电子书折价销售。\n- 二、最新制作的电子书籍会开放打印功能，大家购买后有条件的可自行打印成书。\n\
    \n天使神秘学院\n2020年5月\n\n# 天啓\n\n文 Samantha\n編 Omni\n\n天馬～Samantha練習電腦繪圖的作品～\n\n##\
    \ 第五部 居家修行～思維篇《專注於創造》\n\n有時候，我母親花了幾小時的時間，才畫出一隻毛茸茸的小兔子，她也覺得好快樂，因為時間已經不重要了！\n\n\
    我母親八十三歲那年愛上了色鉛筆著色。從此幾乎天天專注於繪畫。她說，有時候，只是想著要給一朵花畫上什麼顏色，就覺得好快樂。\n\n## 第七部 宇宙星球《遨遊宇宙星際》\n\
    \n她指著身後的一個約汽車大小，類似飛碟的小型圓形飛行器，說：「要不要出去玩？」我好奇的問「去哪裡？」。「宇宙！」她說。\n\n我依依不捨的，向外星朋友揮手道別！走在屋前的院子，無意中瞥見，有許多豆大的雨珠子，正緩慢的滑落。那些雨珠子滑落的速度，讓我可以很仔細的看，它們就像晶瑩剔透的珍珠。我仰望著天空，欣賞那漫天透明的珍珠緩緩滑落之美。\n\
    \n## 第五部 居家修行～療癒篇《紫火的奇蹟》\n\nArthur說：「你是那紫羅蘭色的火焰，就是上帝給你的答案，你快點用紫火燒掉那些業障！」\n\n##\
    \ 第五部 居家修行～療癒篇《奇妙的修復者》\n\n忽然看見有一個透明的人影，穿透我二樓窗戶的玻璃，直接走進我的臥室，然後在牆壁上寫一些化學方程式，一面寫一面用心電感應跟我解釋，這沒什麼，只是老舊細胞鈣化的陳積物，說完就走了。\n\
    \n廣大的宇宙中，除了數不盡的星球之外，還包含了各種不同能量的眾生。～Samantha油畫作品～\n\n## 第二部 與上天溝通《宇宙能量場》\n\n整個宇宙空間充滿了流動和交織的能量漩渦，梵谷的名畫《星夜》與這能量場非常近似，我猜想，梵谷在作畫時也感受到這亙古存在的能量場。\n\
