  mdcn: '# 年齡與婚姻


    有人因交往的對象年齡比她大十歲，家人極力反對。


    指導靈給他們的訊息是：

    婚姻是否幸福與年齡無關，

    重點在兩人是否「相愛」。

    如果相愛，所有困難都可以克服；

    如果不相愛，所有人事物都可能是挑戰。

    進入每一段關係都會讓他們成長，

    在這時代，經常重新洗牌，不像古代的限制那麼多，

    不用擔心現代的年輕人，這是他們成長的課程，

    他們不會無緣無故認識，

    他們有各自的神聖天心，

    都是經過神聖天心的安排而相遇，

    雙方的靈魂都同意在這段期間一起學習課程。

    婚姻並沒有所謂的成敗，

    或是有沒有在這段關係裡面淘到金，

    婚姻課程的重點是：無條件的愛。

    不要把「有條件的眼光」框架在人們的身上。

    對於婚姻的課程，採取「理性的態度」是適宜的，

    如果雙方在各方面「旗鼓相當」，

    婚姻關係更容易和諧美滿，

    因為，任何一段熱戀都會隨時間而冷卻。


    # 共同成長


    有位朋友非常希望配偶和自己一起修行，一起成長。指導靈給的訊息是：提升家庭的和諧與氣氛，用無盡的愛心去包容他，用重重的愛去感化他冰冷的磁場，他也是天父的孩子，只是目前沉睡，耐心等待他醒來，給他時間耐心等待他的成長。


    練習隨順眾生的成長進程，你做你該做的，你維持好自己的紀律，但是，不要叫別人遵守你的紀律，那會令人生厭。要讓人崇拜你，真心愛你，你要對他們完全包容。你從自己的紀律中去感化他們，當你的能量越來越強時，他們才有機會修正他們的能量～高高興興跟著你走，而不是你牽著他們的鼻子走。愛每一個眾生，不是拉著他們跟我們走同樣的路，讓他們自由，給他們最大的寬容和愛心，因為有些眾生起步比較晚。


    # 外遇的考驗


    > 婉轉體諒是修行人的美德，

    > 原諒眾生的錯誤是菩薩的責任，

    > 我們不要憎恨任何傷害過我們的人，

    > 心靈才能得到真正的救贖與釋放。～指導靈訊息


    1993年練氣功之後，我把氣功師父的「百日築基」當作「一百天的精進修行」，很興奮的期待在這美妙的三個月內可以身心快速的淨化和成長。然而這一段時間，居然面臨了難以置信的婚姻危機。


    對我而言，這項考驗的難度極高，我感到身心煎熬，幾乎要舉白旗投降了。每天就想著快快離婚，解決痛苦。依照我的個性和脾氣，根本無法容忍先生變心，所以逼著他辦理離婚手續。有一天他被我吵得受不了，載著我到法院門口，但是，車子稍停時，他突然改變主意，踩了油門又離開法院了。我很惱火，不想繼續忍受與他生活在一起的痛苦。我說：「你為什麼又不願意離婚了？你都已經愛上別人，不要再扯著我不放，我沒興趣搞三人行。」


    他說：「我也愛妳啊！難道為了孩子們，妳都不想再努力一次？難道我不值得妳努力？我都發誓已經跟她斷交了，已經退讓到這樣了⋯⋯。」


    我心想，這是什麼話啊？是誰先變心的啊？我可不想活得這麼累，維持這種名存實亡的婚姻，多痛苦啊？而且我不想讓一個已經不愛我的男人繼續供養我，不希望在因果上虧欠他，所以我決定去租個店面做生意，獨力撫養孩子們長大。


    隔了幾天我決定成全他，做最後了斷，再也不要一段剪不斷理還亂的生活，我想要重新開始過自己平靜的生活，所以就把他的衣服裝在一個大皮箱裡，然後，把他連人和皮箱一起推送到門外。我說：「真的很感謝你十幾年來愛心的照顧，現在放你自由啦！祝你跟她生活美滿！」然後狠心關上門，任他在門外，敲了半小時的門。回到客廳裡，孩子們都在罵我。


    女兒說：「妳怎麼可以趕走爸爸啊？那我們就沒有爸爸了！」我平靜的說：「他現在談戀愛了，我們祝福他吧！如果他不愛我了，他想那女人時會痛苦，我也會不快樂！」女兒哭了：「可是我要我的爸爸啊！你怎麼可以把我爸爸拱手讓給別人啊？」我說：「以後我讓你爸爸每個假日來帶你們出去玩吧！」暫時安撫了就讀初二的女兒。


    隔天我送兒子去托兒所，兒子的小手緊緊牽著我的手，走到老師布置的海報前，指著標明著爸爸、媽媽的兩張畫像，念著；「爸爸！媽媽！」眼睛專注的望著我。我知道他想爸爸了，兒子跟我要爸爸了！他希望同時擁有爸爸和媽媽。我心疼的親親他的小臉，安慰他說：「爸爸很愛你，我會讓他來帶你出去玩！」他認真的點點頭。


    那段期間，許多親友為我擔憂，其中有兩位親友跟我說，要幫我去懲罰對方，有一位說要派人去砍對方的腿。我聽了真是嚇壞了，我趕緊阻止，我說：「你就別嚇唬我了，那太可怕，如果她沒有腿，她會生活很困難，我也會為此良心不安一輩子，我以後怎麼睡得著啊？」


    還有一些親人罵我趕走先生，包括我最敬愛的父親，他說：「你離婚是想再婚嗎？」我說：「結一次婚就嚇死了，還要結幾次婚？更何況我有責任要專心陪孩子長大。」


    父親說：「既然你不想再結婚，那就別逼他離婚了，離婚會有財產分割的問題，分割後你們的財力都各少一半。何況他是男人，他變心了，都還想要為孩子再努力一次，你是當媽媽的，難道不想為孩子維持一個完整的家？兒女沒有爸爸是很難教育的，孩子很需要父親，將來他們心理才能正常。如果家庭破碎了，你很難獨自教養他們。昨天你先生來求我幫他，我沒法答應，他居然跪下來哭了，給他一次機會吧！」聽到這裡，我凍結在冰點的心開始動搖了！


    先生每天早晚都打電話回來，問我可不可以回家了？如果不是為了孩子們想要自己的父親，說真的，我自己一個人生活還比較清靜快樂，不用去擔心他在外面幹什麼。


    五天後，是星期六，我允許他來探視孩子。他回來了，髒兮兮的渾身汗臭味，鬍渣滿臉、和全身蚊子叮咬的痕跡，簡直跟逃犯一樣！原先是善意要放他去自由的，他怎麼會沒有選擇自由？我很是驚奇，天啊！我還想像他們正像羅密歐和茱麗葉一樣，神采飛揚的、歡樂的去逍遙度蜜月了呢！


    原來那五天他下班後都睡在車上，連旅館也捨不得住，沒得洗澡。看看也滿心疼的，不忍心趕他走，讓他把皮箱拿回來，把髒衣服都拿去洗洗，讓他立即去浴室洗個香噴噴的澡，刮鬍子好好睡一覺。


    女兒開心極了，兩歲的兒子不時走過來摸摸爸爸的臉。為了幫孩子真正賺回自己父親的心，我也振作起來，蓄起（少女時期的）披肩長髮，買了許多以前捨不得買的衣服，從內在到外在，把自己打扮起來，努力做一個最明亮的自己，每次遇到朋友時，就聽見她們驚呼：「你怎麼變那麼漂亮？」看起來「佛要金裝，人要衣裳。」是真的！女人要多疼愛自己一點，不要為了省錢，忽略了打扮自己，免得省下來的錢讓先生陪著別的美女去享受。


    假日全家去烏來、坪林溫泉泡澡、住小木屋、基隆海邊野營，到處走走玩玩，孩子們很快樂，北部附近山區充滿了我們的足跡，我們也重溫初戀時的樂趣。這時期我只是努力扮演好母親和妻子的角色，內心明白人間就像一場戲。


    這段期間，我持續在心中念著佛號，修心養性，默默完成自己的「百日築基」。我知道，人間情愛不僅虛幻，而且短暫。我想超越世俗的情感，找到內在永恆的真理。所以，我從來沒有偏離修行的軌道。


    外遇的考驗持續了一段時間，先生似乎一直與對方藕斷絲連。對我而言，這真是難以忍受的拉鋸戰。雖然我很想放手，眼不見為淨，但是雙方父母都不同意我們離婚。有一天，夜深人靜時，我忍不住對觀世音菩薩說：「停止這個考驗吧！再下去，我實在受不了，不要再考我吧！」


    第二天早上，我四歲大的兒子，指著旁邊的牆壁跟我說：「媽媽！我剛才夢見，牆壁突然迸裂，好大的觀世音菩薩從裡面飛出來，旁邊一大堆的大鬼小鬼都嚇得跑光光！」大約一個小時後，奇蹟發生了！我先生打電話給寄宿在加拿大的女兒，但是，講不到兩句話，就被寄宿的親戚給搶了電話掛掉。先生傷心的哭了起來，他非常擔心女兒被虐待，於是立刻訂了隔天的機票，我們一起搬去加拿大，外遇的事件就此落幕了！


    事後，有人問我：「他曾對你不忠誠，你不恨他嗎？」其實我心裡還是很感謝先生這些年來對我的呵護和照顧，如果，他真的愛上別人，我雖然會傷心，但還是祝福他，能找到他的真愛。「感恩」對我來說是很自然的，這樣很開心！很舒服！


    當別人對我們好時，就心存感恩！

    當別人離開時，就祝福吧！


    # 重婚的問題


    由於一位朋友的先生因為工作在大陸，而另結新歡。我向指導靈詢問訊息記錄如下：


    問：台商在大陸另娶妻，台灣的妻子不是很無辜嗎？


    答：不要批判，那是她們的業，是她們練習成長的方法，她們在當中學習包容和真愛。


    問：有關朋友及她的夢境？


    答：她的先生在大陸另結新歡。


    她的因果多在大陸，所以此行去大陸遇到兩次險境。幸而，她在危急時，記得祈求內在師父幫忙。因此，她在夢中看見靈性的愛海。她目前像遇到大風浪的船，非常需要關心和安慰！


    問：在這外遇課程中，台商學會什麼？


    答：他們在不忠的情緒中，短暫的快感帶來長久的無奈。他們終究得面對因果的情況。讓別人極端痛苦的人，自己也無法真正快樂。如果他們沒有懺悔和改變，在下一世中，他們將自卑而且頹廢。他們變成受害者，那是因果輪替的情況。


    # 信任與懷疑


    有些人經常懷疑配偶有外遇，懷疑是一種負面的創造。小時候，常聽長輩說：「嚴官府，出厚賊。」在婚姻方面，也是同樣的道理。越是懷疑配偶，越是嚴謹監管配偶的人，越容易發生外遇的情事。


    建議練習心想事成的創造方法，時時都信任配偶的忠誠。正面的創造，可以為夫妻雙方都帶來正面的能量，婚姻生活會更快樂。修行也是在生活中練習保持快樂的過程。


    曾聽聞，有一位富豪丈夫徹夜不歸，他的妻子很生氣，不斷質問昨晚去了哪裡，丈夫起先不肯說，妻子還是咄咄逼人的問，你昨晚究竟跟誰在一起，最後丈夫受不了，說：「妳真想知道我昨夜跟誰在一起嗎？」這時，妻子忽然打住，她心裡明白，如果揭露真相，一定會鬧離婚。那麼，她不僅失去丈夫，孩子們也會失去父親，富豪太太的身分以及龐大的家產也幾乎拱手讓人。妻子衡量了利害關係後，只好忍下來說：「算了！我不想知道你究竟去哪鬼混，你以後最好早點回來。」知道事情背後的真相，不一定會更快樂，有時，還必須睜一眼閉一眼。當一位妻子也要有智慧才能保住婚姻！


    # 愛情保鮮劑


    放手，給配偶自由的時間和空間！


    許多人剛結婚時，一直想和配偶膩在一起，想要無時無刻攜手共度。但是婚後幾個月後就開始相處不愉快了。有位新婚妻子跟我抱怨，先生開始冷落她了。


    我說：「妳想離婚嗎？」

    她說：「我才剛結婚，怎麼會想離婚呢？」

    我說：「可是妳的作法是想離婚的做法啊！男孩子在未婚前很自由，他們習慣這樣的生活，如果妳想牢牢控制他的生活，他會覺得婚姻生活很痛苦，就像在監獄牢籠中，一定會想逃走。所以要學會欲擒故縱，讓他們在家裡也很自在，讓他像婚前一樣，可以自由的做自己喜欢做的事情，這樣婚姻才能長久。」


    她說：「可是，他沒陪我，我會很寂寞啊？」


    我建議她也要像未婚時的心情一樣，多學習新事物，多做自己喜歡的事，多和朋友們交流，保有自己獨立自主的生活，這樣才不會覺得無聊而整天想跟先生膩在一起。


    我先生有一位同事，每天下班回到家附近，就睡在汽車的駕駛座上。許多次他的妻子焦急的打電話來詢問，問我先生可曾看到他先生下班了？雖然，我們都知道她先生此刻正在她們家大樓下方的路邊熟睡，但我們也深知這位妻子的個性，為了讓他先生有個清靜的休息時間，我和先生都三緘其口。有時候，給彼此一些時間或空間是美好的，對婚姻的持久和保全是有幫助的。


    # 情人節禮物


    情人節晚上，老公說：「不好意思！沒買禮物給妳！」我溫柔的擁抱他說：「你今天整天都陪著我，我感覺到你的心都在我身上，你是我最大的禮物！我最喜歡的禮物！你把自己送給了我，你應該在自己身上紮一個大大的蝴蝶結！」他微笑著親吻我說：「只是不知道蝴蝶結應該紮在哪兒？」


    女兒聽了說：「哼！沒誠意，一個禮物也沒有！」


    我說：「妳難道不明白羊毛出在羊身上的道理嗎？我們的存款是共有的，他拿錢去買些我不需要的禮物，我會開心嗎？其實，前幾天他陪我逛街時，就問我需要什麼禮物？我說都不需要啦！」


    女兒說：「也是喔！上回陪爸爸去買禮物，好不容易狠下心，買條鑽石項鍊送給妳，第二天就被妳逼著退回去了！」


    ## 情感的獨立


    有位朋友當初為了陪伴孩子出國留學而移居加拿大，目前在多倫多有一個穩定的工作。此外，她還投資了幾間房子，經濟生活相當穩定。她的孩子已經順利大學畢業，目前在中國工作。但是她常抱怨她的先生與她分居兩地，而且拒絕她回台灣的家。這樣的情況已十二年了，她一直希望夫妻能長住一起，而先生永遠都在拒絕她，她內心深感受傷。她常常頭痛、失眠，而且認為自己的不快樂都是先生造成的。


    其實，這是一個情感獨立的課程，學習在情感上不依賴任何人，除了自己，沒有任何人應該為我們的快樂負責。我們的幸福，不是別人能給我們的。不要想要依賴父母、配偶、孩子、或任何其他人。我們可以為自己的生活創造樂趣，多結交良友，多學習新的事物，閱讀、寫作、唱歌、跳舞、莳花、養草、登山、健行、旅遊、繪畫、攝影、藝術創作…。開心的學習多彩多姿的事物，感覺自己永遠在人生的黃金年齡，活在人生的春天裡。有一個很容易讓自己快樂的方法就是「助人」。有能力時，盡量多幫助別人。其實，萬物同一體，助人就是助己。助人時，很容易提升自己的能量和生命力。小時候我們都背過這一句「助人為快樂之本」～就把它應用在生活中吧！


    # 夫妻的性生活


    許多人前來詢問夫妻性生活的問題，社會新聞中，也有因誤會而發生悲劇的驚悚個案，所以在此特別提出個人的見聞與想法。


    我有一位好朋友，年輕時與先生感情很好，總是出雙入對的。但中年後，先生逐漸對她冷淡，常常躲避她。因此，她開始懷疑先生有外遇，常常跟先生吵架。離婚後，才發現完全是誤會，他先生只是有性功能障礙，根本沒有外遇對象，離婚後依然是單身，就在另一條街上租屋獨自生活，原本相愛的兩人，卻從此咫尺天涯，美好的家庭就這樣破碎了，這是我接觸的許多類似案例之一。


    四十多歲時的離婚率相當高，其中一個可能的原因是，中年男性體能開始下降，有些男性開始害怕妻子主動，因為他們的生理不是隨時都可以做愛的，如果他們沒有需求或欲望時，這時妻子突然找他做愛，他會非常緊張，覺得自己難以滿足妻子。有些丈夫為了躲開性欲強的妻子，甚至找藉口，或裝作有婚外情，最後導致離婚。


    其實，有性功能障礙的男性並不少。我有個朋友在診所工作，她說有許多男性，包括高大威猛的肌肉男，都來拿「威而鋼」。建議男性若有性功能障礙，對於自己的妻子，不要羞於啟齒，最好勇敢的說出來，與妻子一起討論和解決，大部分的妻子都可以諒解與配合的。大多數女性對於性的需求並不大，女性真正渴望的是被愛以及被呵護的感覺。許多男性並不了解女性，總把女人想成如狼似虎，其實，女性更喜歡的是溫柔體貼的陪伴，而不是老守著床第做那件事情。


    婚姻生活中，最珍貴的是無條件的愛與交流，夫妻可以一起培養共同的興趣，比如：閱讀、運動、旅行、繪畫、烹飪、看電影、聽音樂、喝咖啡談天等等。夫妻可以一起學習，一起靈性成長，一起完成共同的理想。夫妻在一起有許多事情可以做，若加上一些創造力還可以更富有變化。


    在此誠心的祝福：

    每一對夫妻都能過著和諧、充實、美滿的婚姻生活！


