  md: '# 夢境的啟示


    初到加拿大時，我們買了一棟一、二樓的舊房子，樓上出租，樓下自己住。有一天，在睡午覺的時候，夢見一場奇異的景像，我看到頭頂上有一個浴缸，裡面坐了一位長髮女子，看不清她的五官，另一邊站著一個大巨人，站在半空中，朝著女子用力吹氣，因為力量很大，吹了又吹之後，就產生了巨大的風力，終於把女子給吹走了，醒來印象深刻。


    當天夜裡一點左右，二樓浴缸突然堵塞，大量的水流到一樓來。我先生急忙把一樓的天花板打開，鋸斷排水管，從裡面抓出了一大堆長頭髮，之後他把銅管焊接回去，但是銅管在屋頂，他仰著頭很困難的焊接。因為焊接時會掉下來許多火紅的銲錫，燙傷了他的臉，所以他努力的把銲錫吹走，吹了又吹，吹個不停。這時我突然覺得看過這一幕，才聯想起下午的夢，他站在樓梯上的樣子，吹的動作與姿勢，幾乎一模一樣！整件事與夢是同一回事！


    因為這個抽象的夢，我明白了，在地球上發生的事，其實早已在另一度空間發生過。從此，無論發生什麼困擾時，我比較能心平氣和，因為都是事出有因，不必抱怨或不耐煩。


