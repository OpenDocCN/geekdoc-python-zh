    長大後，她曾經託我幫她查潛意識，我查到她在嬰兒期的感覺，她覺得空氣裡瀰漫著煙味（她的父親年輕時抽菸），房子很小、人很多、很擁擠。（當時他們家只有十坪大，卻住了八個人，而前世她是歐洲貴族，擁有寬敞的古堡，因此剛投生時相當不習慣。）


