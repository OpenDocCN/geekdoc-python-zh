  md: '# 負面情緒的影響


    +   一、習慣性的妒忌、憤怒容易造成心臟、肝功能、痔瘡、貧血和視力的問題。

    二、感覺寂寞、孤獨、缺乏愛，易有過敏、鼻塞、咳嗽、肺部功能的問題，以及人際關係疏離的情況。

    三、抑鬱、憂傷、恐懼感深的人，會覺得能量不足、容易疲倦、對體能的無力感、肩痛，手腳冰冷。

    四、過多的擔憂形成胃部的疾病，消化不良、胃酸過多、胃脹氣等等消化系統的障礙。

    五、氣喘大多是幼年時期害怕和母親分離，或害怕弟妹的出生，分散了母親對自己的關愛。

    六、腎臟病和糖尿病是不肯釋放過時且負面的情緒。

    七、高傲、死板、頑固的人，容易引起膝蓋關節疼痛。

    八、覺得挫敗連連，或不能自在表達情感者，容易咳嗽、喉嚨發炎、口腔潰瘍。

    九、在發生癌症之前，當事人可能曾經發生極端的恐懼、負面、憤怒、抑壓的情緒。

    十、心臟與愛有關，若表達愛和接受愛的能力出現問題，容易產生心血管的疾病。比如，高血壓是吝於表達對人們的愛心所致。'
