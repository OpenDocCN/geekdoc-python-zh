    # 愛海


    父親往生之後，我開始加強內修靜坐，我所練習的是集中看內在光的方法。起初有一段時間看不到光，後來才逐漸看到一點淡淡會動的光影。但是我也不灰心，持續練習之後，光影越來越明亮，而出現時間也越長。


    大約過了兩年，在一個戶外打禪的清晨，我在帳篷中靜心時，忽然光越來越強，內在的音流也越來越大。那股金黃色的強光，大得好像天空中開了一個大洞。這時感覺有一股強大的電流衝擊我的身體，整個身體被衝擊退後約一尺。我想：我應該往光中衝進去吧！但是，當我起了念頭時，光、音及電流都消失了。我只好重新靜下來打坐，不到一分鐘，又來了強大的光、音及電流。可惜，我仍然沒有從那光中衝進去。我覺得那邊是另一度空間，那兒充滿了能量。有了這樣的體驗，我開始對修行充滿信心，我相信這樣修下去總有一天會開悟的。可是，問題始終卡在那兒，不知該如何突破和進展。


    有一次共修時，我不斷的咳嗽，咳到胸腔都痛了，一陣激烈的咳嗽之後，就對坐在我身邊的同修Arthur師兄說：「坐離我遠一點，免得傳染給你。」他微笑說：「不要亂加持我得病，我跟你沒有一樣的業障。」我說：「我都想去檢查了,不知道是什麼病?」他說:「其實也不是什麼病,是你前幾天不小心吃到含蛋的食物,所以目前在排毒,排毒要十四天的時間才能排完。」


    我回想起約十二天前,我吃了一袋素肉乾,是朋友特別從台灣為我帶來的,味道很香,我吃得很開心,吃完才發現包裝上標示含蛋。我想,都吃掉了,不知者無罪,就沒放在心上。沒想到Arthur居然知道,而且正如他說的,兩天後,我的咳嗽完全好了,正好合計排毒十四天。我逐漸察覺到他超乎常人,居然心靜到這個程度,可以聽到別人的心聲,知道別人的過去和未來,於是開始想要認真的跟他學習。


    因此,我去請教師兄如何突破修行障礙。他淡淡的說:「愛心不夠,是不能進步的原因。」我回家想了好久,我一向都是冷眼觀看世界,自掃門前雪,愛心確實有問題。這種習性一時之間還不知從何改起呢?然而,我儘量想辦法改就是了!從那天起,我對親戚朋友開始用心以待,對不太友善的人也儘量真誠相待,就這樣也不知道愛心及格沒有。師兄又應我的要求,教我一些修行的方法。於是我一步一步的修改身、口、意的缺點,練習放下我執,逐漸放下對世俗的欲望。


    有一天,師兄說:「剛才幫你計時,你在二十分鐘內沒有任何念頭,我看你的頭腦很容易放空,我教你如何查訊息吧！你可以問一個問題，然後把頭腦放空，就可以聽到指導靈回答你的問題。」我回家練習一陣子，真的可以問到許多答案。


    有一次我想證實答案的正確性，我問：「下一個找我的人是誰？」答案是我的弟弟。我想，弟弟人在台灣耶！誰知道才隔了一小時，弟弟還真的打電話找我。


    另一次我查一位親戚的來歷，內眼看到的是一條美人魚，我困惑的說：「怎麼會是美人魚來投胎的？或許是我查錯了吧！」但是，妹妹興奮回應的說：「曾經有一位天眼通的修行人，說她是『鯉魚仙子』來投胎的。」用這樣的方式，我試了許多次的問答都很準確。因此，我逐漸對內在訊息產生信心。


    開始有能力與上天溝通時，我忍不住要感謝上帝。這是多麼值得喜悅的時刻，數十年的摸索與修行，終於露出曙光。就好像歸途中的旅人，知道家就在不遠處，在那裡，我擁有永恆的喜悅。我的心不再流浪，我還可以幫那些流浪的心找到回家的方向。


