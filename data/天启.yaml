- img_proc: true
  md: '來拿「威而鋼」。建議男性若有性功能障礙，對於自己的妻子，不要羞於啟齒，最好勇敢的說出來，與妻子一起討論和解決，大部分的妻子都可以諒解與配合的。大多數女性對於性的需求並不大，女性真正渴望的是被愛以及被呵護的感覺。許多男性並不了解女性，總把女人想成如狼似虎，其實，女性更喜歡的是溫柔體貼的陪伴，而不是老守著床第做那件事情。


    婚姻生活中，最珍貴的是無條件的愛與交流，夫妻可以一起培養共同的興趣，比如：閱讀、運動、旅行、繪畫、烹飪、看電影、聽音樂、喝咖啡談天等等。夫妻可以一起學習，一起靈性成長，一起完成共同的理想。夫妻在一起有許多事情可以做，若加上一些創造力還可以更富有變化。


    在此誠心的祝福：

    每一對夫妻都能過著和諧、充實、美滿的婚姻生活！'
