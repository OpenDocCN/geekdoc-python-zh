  md: '# 親人的超生


    我小時候會看到靈魂，大約十幾歲時，閉上眼睛，總是有一位年輕漂亮的少女，嘴角流著血，哀傷的望著我。當時我以為鬧鬼了，好害怕啊！


    直到我開始接觸我的第一位佛門老師，他告訴我：「我們看到的受苦靈魂，通常是與我們有緣的靈魂～比如，過去世的親人朋友想來請我們幫他們，我們可以為他們念地藏經超渡他們。」


    後來，我查到，這位嘴角流著血的少女靈魂，是我過去世的女兒，因為騎馬摔死，所以嘴部受傷流血，她一直來向我求助，因為我不知情，所以很害怕。直到我念佛三年後，才開始有能力得到一些靈界訊息，了解她的身世，可以幫助她脫離苦難。


    我今生的女兒小時候一直希望有個兄弟姊妹可陪伴她玩，我也希望再生一個孩子。1990年的一個冬天，我好不容易懷孕了，很高興的等待第二個孩子的誕生。沒想到，一場大風雪，奪走我的美夢。只是為了去剷大門前那厚重的雪，不知是凍著或累壞了，竟然流產了！那天夜裡，我在淚溼枕巾中，悲傷的進入夢鄉。'
