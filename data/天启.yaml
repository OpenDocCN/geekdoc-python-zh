  md: '# 作者介紹～我心目中的Samantha


    《神仙家庭》是60年代非常賣座的喜劇電視影集，女主角Samantha（莎曼珊）是位具有超能力的魔法仙女，為了愛，她化身為平凡人，與她所心愛的男士組成了家庭。天真善良的Samantha，只要動動鼻子，並運用法力，就可以幫助家人及朋友解決問題，一連串的驚奇與趣事，就此展開⋯⋯。


    這部影集在我幼年時上映，我記得女主角總是動動鼻子的俏模樣，但我已忘了她的名字。我覺得二姐的個性很像她，今天特別上網搜尋看看，赫然發現她的名字也是：Samantha，而且長相和笑容還有點兒像二姐！


    二姐最喜歡頭腦放空，不多思考，Samantha這名字是Arthur給她的修行法名，他說，這個名字有助於思維上的成長。所以，二姐欣然的接受了。


    在我出生時，二姐已經九歲，當時父母親共有五個女兒，我是Samantha最小的妹妹。從我有記憶起，二姐已進入青少年的叛逆期。印象中，她總是隨著心動的感覺，做自己想做的事，因此與父母嚴格且傳統的管教時有衝突。當我還是一個乖乖順從父母的小孩時，二姐已是有主見的'
  merge: -1
  pgno: 22
- img_proc: true
  md: '少女了。


    我們在人間的父親出生於日據時代，因家境變故，僅接受日本的小學教育，第二次世界大戰結束時，父親以十四歲的年齡，進入郵電局窗口工作。為改善家人的生活，自學苦讀多年，才通過重重檢定考試，而取得高考資格，在公家機關努力認真的上班，慢慢等待升遷的機會。因此，他最大的希望就是，他的孩子們可以有機會好好的接受正規教育。在他個人的價值觀裡，有好的學歷，才有好的未來。


    然而，Samantha天生愛好自由，她喜歡看書，但是教科書對她而言，太狹隘。家裡沒有錢買課外書，她就去圖書館看書。當時我很小，並不知道她看了許多書，只記得父母總是在教訓她，怎麼都不讀書，成績單發下來時，總有嚴厲的責罵聲。幼小的我，還傻楞楞的以為姐姐不喜歡看書呢！


    Samantha天生喜愛繪畫，隨筆一揮，就是好畫一幅，只可惜由於當時家境清寒，父親反對她去念美術學校。有一段時間，青潭社區裡的小朋友流行玩紙娃娃，我們沒有零用錢買紙娃娃，二姐就畫給我們。她畫的娃娃，有著水汪汪的大眼睛，溫柔可愛的面容，窈窕勻稱的身材，活潑動人的姿態。她還畫了許多時尚的衣服和裝飾品，讓娃娃可以更換穿戴。由於她畫的比坊間賣的紙娃娃更清新漂'
