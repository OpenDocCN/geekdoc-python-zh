    # ## 永恆的記憶


    當你知道生命是無止境的，

    當你真正明白我們與所有生命都息息相關，

    我們不停的投生來創造新的生命共同體時，

    你會變得無所畏懼！

    既然是無止境的生命，我們就不被時間束縛，

    我們擁有無限的時間，我們超脫了生死的幻相。

    在每一個當下，我們活得自在快樂。

    人們一向緊張不安，因為人們以為時間有限，生命短暫。

    人們迷失在時間幻相中，被死亡陰影逼得快樂不起來。

    然而，人生只是如同一場戲。

