    # 愛海


    父親往生之後，我開始加強內修靜坐，我所練習的是集中看內在光的方法。起初有一段時間看不到光，後來才逐漸看到一點淡淡會動的光影。但是我也不灰心，持續練習之後，光影越來越明亮，而出現時間也越長。


    大約過了兩年，在一個戶外打禪的清晨，我在帳篷中靜心時，忽然光越來越強，內在的音流也越來越大。那股金黃色的強光，大得好像天空中開了一個大洞。這時感覺有一股強大的電流衝擊我的身體，整個身體被衝擊退後約一尺。我想：我應該往光中衝進去吧！但是，當我起了念頭時，光、音及電流都消失了。我只好重新靜下來打坐，不到一分鐘，又來了強大的光、音及電流。可惜，我仍然沒有從那光中衝進去。我覺得那邊是另一度空間，那兒充滿了能量。有了這樣的體驗，我開始對修行充滿信心，我相信這樣修下去總有一天會開悟的。可是，問題始終卡在那兒，不知該如何突破和進展。


    有一次共修時，我不斷的咳嗽，咳到胸腔都痛了，一陣激烈的咳嗽之後，就對坐在我身邊的同修Arthur師兄說：「坐離我遠一點，免得傳染給你。」他微笑說：「不要亂加持我得病，我跟你沒有一樣的業障。」我說：「我都想去檢查了,不知道是什麼病?」他說:「其實也不是什麼病,是你前幾天不小心吃到含蛋的食物,所以目前在排毒,排毒要十四天的時間才能排完。」


    我回想起約十二天前,我吃了一袋素肉乾,是朋友特別從台灣為我帶來的,味道很香,我吃得很開心,吃完才發現包裝上標示含蛋。我想,都吃掉了,不知者無罪,就沒放在心上。沒想到Arthur居然知道,而且正如他說的,兩天後,我的咳嗽完全好了,正好合計排毒十四天。我逐漸察覺到他超乎常人,居然心靜到這個程度,可以聽到別人的心聲,知道別人的過去和未來,於是開始想要認真的跟他學習。


    因此,我去請教師兄如何突破修行障礙。他淡淡的說:「愛心不夠,是不能進步的原因。」我回家想了好久,我一向都是冷眼觀看世界,自掃門前雪,愛心確實有問題。這種習性一時之間還不知從何改起呢?然而,我儘量想辦法改就是了!從那天起,我對親戚朋友開始用心以待,對不太友善的人也儘量真誠相待,就這樣也不知道愛心及格沒有。師兄又應我的要求,教我一些修行的方法。於是我一步一步的修改身、口、意的缺點,練習放下我執,逐漸放下對世俗的欲望。


    有一天,師兄說:「剛才幫你計時,你在二十分鐘內沒有任何念頭,我看你的頭腦很容易放空,我教你如何查訊息吧！你可以問一個問題，然後把頭腦放空，就可以聽到指導靈回答你的問題。」我回家練習一陣子，真的可以問到許多答案。


    有一次我想證實答案的正確性，我問：「下一個找我的人是誰？」答案是我的弟弟。我想，弟弟人在台灣耶！誰知道才隔了一小時，弟弟還真的打電話找我。


    另一次我查一位親戚的來歷，內眼看到的是一條美人魚，我困惑的說：「怎麼會是美人魚來投胎的？或許是我查錯了吧！」但是，妹妹興奮回應的說：「曾經有一位天眼通的修行人，說她是『鯉魚仙子』來投胎的。」用這樣的方式，我試了許多次的問答都很準確。因此，我逐漸對內在訊息產生信心。


    開始有能力與上天溝通時，我忍不住要感謝上帝。這是多麼值得喜悅的時刻，數十年的摸索與修行，終於露出曙光。就好像歸途中的旅人，知道家就在不遠處，在那裡，我擁有永恆的喜悅。我的心不再流浪，我還可以幫那些流浪的心找到回家的方向。


    # 通靈日記


    2002.07.19


    我說：師父！上帝！感謝祢們！

    內在師父回應：這是我們的光榮使命！


    問：我兩天沒好好打坐了，會不會被扣分？

    答：在這個層次，你時時都在打坐了，不是嗎？

    不要拘泥於形象的打坐。


    問：工作不是會分心嗎？

    答：外在是忙碌的，內心是平靜的，那就是打坐！


    問：打坐如何入定？

    答：平心靜氣，不思考，一心不亂，直至忘我的境界！


    問：我的父親往生後在何處？

    答：你的父親正在超意識層次，關心你們的成長，

    他告訴你們：你們的成就是我的光榮！


    問：超三界的定義。

    答：脫離世俗的層次，走進心靈的境界，

    走向永恆的真理，不再回頭。


    問：為何我夢到再次與丈夫「結婚」？

    答：再次自我成長，同時與先生的情感跨入更高的層面，

    更容易彼此心意相通，互相扶持，以及共同成長。


    問：為何我在夢中找不到「衣服」，去借母親的。

    答：你自覺能量不足，向上界借用，母親代表高等靈界。


    問：我借到一套紫花亮光衣裙是什麼涵義？

    答：上界衣服是能量的象徵。

    紫色光代表療癒、清理磁場、和消除業障。


    問：為什麼夢中忘了宴客時間地點？

    答：你在超越時間與空間。


    問：為什麼我夢見邀請所有的親友吃飯？

    答：你想幫助所有的親友靈性成長。


    問：夢中為何只有我自己一人出現？

    答：你在獨立奮鬥中。


    問：我夢中為何緊張的找餐館？

    答：你在尋找圓滿與愛力。


    問：我會成功嗎？

    答：一切努力都會有成果的。


    問：為什麼我穿的不是結婚禮服？

    答：你在突破傳統的束縛。


    問：這會很難嗎？

    答：你的成長很快，不要擔心！


    問：有位親人想知道他未來的生活規劃？

    答：專心修持，無所掛礙，與萬物同一體。


    勿執著幻滅的物質，自然看清滾滾紅塵非久留之地。

    欲求何需過高，徒然增添煩惱，

    放下一切，就是涅槃。

    把握光陰，不做無謂浪費，

    必在此生證道，慎勿放逸！


    問：有位同修想知道他目前的修行障礙？

    答：他對世俗的牽掛未全然放下，


    過分自責的情緒，

    愛憎分明的思想，

    過分審慎的態度，都是執著，

    必須放下執著才能順利提升。


    問：他要如何超越？

    答：放下成見、放下心因障礙，


    放下批評責怪的情緒，放下所有的愛恨情仇。

    告訴他，一切轉眼成空，沒有永恆的敵人。


    問：他目前的修行重點？

    答：圓滿、圓融、愛力與無畏，付出不求回報，

    這就是無條件的愛，是我們最崇高的理想！


    問：圓滿？

    答：自在無私與包容，莊嚴華麗的天堂，

    光明與喜悅，完整的人格，天國的品質，大愛！


    問：圓融？

    答：與人相處融洽，有愛心、耐心、包容心，

    寬懷的心胸，無私的人格，純真的心性。


    問：有位親友想知道他目前的修行重點？

    答：了解小我與大我的概念，可幫助他啟發精神能量，

    一般人以為自己綁在小我裡面，無法真正的超越，

    只相信柔弱肉身，不相信自己神性中擁有強大力量。


    問：有些同修抱怨打坐沒有光與音！

    答：他們心裡俗事太多，牽掛太多，沒有專心打坐。


    問：如何幫助他們？

    答：勸他們放下掛礙，

    全心全意修行，不要無謂浪費能量，

    日日精進，神性光自會現前，內在音聲自會變大。


    問：有位同修想知道適合他的成長方法？

    答：啟發他快速成長的方法是「安住於實相」。

    相信上帝、相信我們來自上帝，

    相信我們的萬能力量。

    一切向內尋找，應無所掛礙，毋庸擔心。

    明白上帝與我們同在，繼續努力修行。

    我們是天堂裡美麗的眾生，我們就是圓滿與愛力！


    告訴他們：

    所有的考驗，都是為了幫助人們進入「實相」，

    找到本來面目。


    問：我有哪些修行障礙必須克服？

    答：無所求的心


    - 愛與被愛的詮釋

    - 抽象意念的成長

    - 時空觀念的限制

    - 無求的境界


    問：聽起來好空泛，是空的感覺嗎？

    答：空相中的實有。


    問：何謂空相中的實有？

    答：空相中蘊藏著無所不在的潛能，無所不能的力量。


    問：天哪！我覺得什麼也沒看到。

    答：不要執著你所看到的外相。


    問：其實我的眼睛目前只看到清晨屋外街道寂靜的景象。

    答：專注你心性中的「空寂」，不要掛礙外在的事物。

    專注內在的尋找，找回你內在的力量。

    它是亙古存在的，你從來沒失去它，只是重新憶起。

    不難，也不用想像，那是自然來的，它會自然顯現，

    像你的無上力量突然湧現，不需思考，不要思維。


    問：我試著努力找回內在的力量，誰來幫我？

    答：我們一窩蜂的人！


    問：多少人啊？

    答：無所不在的人，無所不能的力量。


    問：是你們推著我向上提升？

    答：正是。


    問：但我覺得我很笨！我真的修得起來嗎？

    答：沒有人真正完美，除非他找回自己無所不在的力量。

    你不孤獨，你有我們的支持。


    問：目前如何靈修？

    答：專注於心靈成長，全力以赴，不要分心。


    問：我得閉關嗎？

    答：勢在所需～如果你志在必得。


    問：閉關的方式？

    答：足不出戶，隔絕一切外界干擾。


    問：生活所需呢？孩子呢？

    答：交代別人做。


    問：何時開始？

    答：你自己決定，越快越好，祝你早日成就！

    我：感謝妳們無盡的愛！


    閉關前，我請先生及一對兒女在閉關期間為我護持，

    他們聽說十五天不能與我說話，都依依不捨緊緊擁抱我，

    讓我受寵若驚，其實我只是一個人搬到三樓住幾天而已！


    一切快到我不能想像，

    我感覺到黎明前的寂靜。

    我的心忽然沉靜下來。


    # 閉關日記


    2002.07.20 凌晨


    這是我有生以來第一次閉關，

    有一種脫離塵世的感覺～清靜、自在、祥和，

    最重要的是，我學會時刻與上界溝通，

    信心大增！感到無上的光榮。


    問：何謂無所求的心？

    答：沒有得失心，沒有對人事物的執著，

    坦然面對每一個當下，

    專注於生活中的人事物，但沒有掛礙。

    眾生的諸多念頭都想求得利益，

    有求的心，見不到實相。

    貪婪與執著，不能使心靈成長，

    無求，是全然的放下，

    不掛礙，不惹塵埃，清靜自在。


    問：何謂愛與被愛？

    答：愛是無所求的照顧別人，關心別人。

    大愛是超越凡俗的愛，不綁人，不求回報，

    一心希望別人快樂成長。

    被愛是被照顧、被疼愛的感覺，

    會使被愛者心生歡喜，感到光榮，

    生出信心，發出愛力。


    愛與被愛是世界上最快樂的感覺！

    愛是恆久的力量，不因時間空間而消失。


    問：世人的情愛為何常變質？

    答：那是狹義的愛，

    用來綁人，使人怨恨、不自由、無奈，

    是自私的品質，不曾替對方著想，

    造成別人身心受創，

    那不是真愛，

    只是一種有條件的交換。


    問：其實我懂，為何要我去詮釋？

    答：你真懂了嗎？你總在否定愛，你以為它是不存在的。

    你以為只有你懂得愛別人，

    你一直不明白別人對你的付出，是真實的感情。


    問：他又去愛別人了，不是嗎？

    答：你沒愛過兩個以上的人嗎？

    你會為了愛一個人，就否定一個你真心愛過的人嗎？

    那只是你同時愛上不同的兩個人而已。

    仔細檢討你的婚姻，

    你的選擇只是個緣字，並不是因為你特別愛誰，

    姻緣是個定數，是業力牽引。

    你會嫁給你看得順眼的每一個男子嗎？


    問：我懂了這個，對我的修行有幫助嗎？

    答：你會平靜下來，心如止水。

    你不會再抱怨，或覺得自己受傷及委屈。

    你會更懂得愛別人，體諒別人。

    你會逐漸發現自己的幸福，發現真愛並沒有離開你。

    你會更有能力愛別人。


    問：如何讓抽象意念成長，以及突破時空觀念的限制？

    答：明白沒有時間與空間，沒有日夜與四時寒暑，

    沒有明暗，沒有陰陽，

    沒有是非，沒有愛憎，沒有對立，

    實相世界只有純淨的美。

    所有的對立都在這個境界消失，

    一切無明皆在這裡清除，

    那些無明的習慣，在這裡徹底做個了斷。

    自由意識的產生，全然的解放，

    時間無限，空間無限，

    上層世界，亮麗輝煌，

    超能力的產生也在此時出現。


    問：上層世界的人啊！請告訴我，如何進入你們的天堂？

    答：靜默，傾聽內在的聲音。

    那音聲會引領你重回上帝的懷抱，重回實相境界，

    在那音聲的盡處是你的家鄉。

    我們看到你展開雙翼準備回航，


    我們全體都虔誠的祝福你早日回到家。

    你是我們最思念的家人，

    你在回航的途中不用害怕，

    我們會全力護航。


    > （每當我重新看到這段對話，

    都會被上層世界的愛心，再一次深深的感動。）


    問：何謂「超意識」？

    答：超意識是能量的蘊藏所。

    超意識有無限潛能，

    掌管生死奧祕，控制宇宙的變化，

    我們皆從超意識而來，卻忘了超意識的存在，

    與超意識能量失去連結的眾生，

    活在懷疑、恐懼、不安的情緒中，

    因為他們對於未來的不確定性感到不安，

    無奈的走過生、老、病、死，疲累與消沉，

    終日麻痺自己的感覺，沉淪於短暫的歡笑與得失，

    他們忘了自己的榮耀光輝，在無明中惶惶不可終日，

    他們斤斤計較於榮辱得失，以減輕他們的不安全感，

    他們總是拖著沉重的步伐走向未來，

    所以他們的肉身，總會出現各種病症，

    一切皆因無明而來，而拔除無明的唯一方法是：

    靈修與靜坐，重新找回超意識能量。'
