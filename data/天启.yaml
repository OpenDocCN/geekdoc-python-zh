  md: 'Samantha在原生家庭中所扮演的角色是「先鋒者」。由於父母親生長於農村，有許多傳統保守的觀念，再加之有兩位親人，相繼於游泳時意外喪生，英年早逝，父母親對我們的保護更加小心翼翼。因此許多需要外宿或有危險的運動或活動，一律不准我們參加。我記得，Samantha想去參加救國團的中橫健行隊時，是經過一番激烈的爭取，父母才首肯的。輪到我大學想要去參加時，父母親這一關就輕鬆的通過了。Samantha和一位美麗的表姊，兩人在70年代初期，就經常隨著美國的流行穿迷你裙，當時母親常常訓誡二姐，甚至惡言怒罵，彷彿她是離經叛道的孩子。但是，二姐依然勇敢的展現自己的青春之美，絕不妥協！誰也沒有料到，後來，這兩位時尚的妙齡少女，都是家族中最早開始靈修的先鋒者，表姊移民南非，在那裡開了一個道場，服務當地的有緣人。Samantha移民北美加拿大，隨緣加入Arthur的靈性聚會，目前透過網路服務在地球上的有緣人。雖然，兩人各奔南北，但是都走在靈修和服務的道路上。


    Samantha五專畢業後，帥氣的告訴父親，我幫您把商科讀完了，現在我要去畫畫了。於是她找到一個油畫的工作室，開始她的繪畫學習和工作，當時畫的大多是外銷的油畫。一段時間後，她就購置了人生中的第一間房子。後來，親朋好友們欣賞她的畫，幾乎家家都掛了一幅她的油畫，有位舅舅還請她去畫壁畫呢！我在大學時也特別請姐姐為我男朋友的畫，畫的兩旁有青翠茂'
  merge: -1
  pgno: 27
- img_proc: true
  md: '盛的大樹（象徵家人健康強壯），遠方有閃耀著銀白光輝的森林（象徵光明豐盛的未來），清澈的溪水從遠方流入（象徵擁有源源不斷的能量流），溪畔有著金黃色的石頭（象徵穩定的財富）。那幅美麗的畫至今仍然掛在我先生原生家庭的客廳，我的婆婆一直都很喜歡它。在我看來，這些油畫為每一個親友的家開了一扇美麗的窗，從家中隨時可以看見大自然的美。


    *Samantha*在結婚後，經歷了許多人生考驗，在本書中已經毫不保留的與讀者們分享，讀者可以從書中了解她的心路歷程。那段期間，我正處於升學與考試的奮鬥階段，我們相會的時間極少，所以，我也是透過這本書的編輯，才有更深入的了解。


    1999年台灣大地震，2000年父親病危和往生，當時對我們而言，都是相當大的考驗，而我們靈性成長的道路，也再次交織在一起。2002年*Samantha*閉關期間的前後，我與她密切聯繫，也盡量同步閉關。禁語期間*Samantha*透過傳真機（當時網路尚未普及）將指導靈的訊息傳給我，讓我知道自己在當時應該如何修正身口意。我們兩人都專注於內在的提升，知道哪裡需要修改就改，通過之後指導靈會有新的提醒，我們就立即再修正。感覺上好像武俠小說中的衝關，一關一關的通過。這些閉關過程的詳細訊息，都收錄在本書的第二部。'
  merge: -1
  pgno: 28
- img_proc: true
  md: '2004年Samantha特別為我翻譯《Opening to Channel～打開頻道》的1～7章，看了之後，我深深被指導靈們的光與愛所感動。這本書可以讓我們對於通靈和指導靈有正確的了解，建議有興趣的讀者可以閱讀，台灣中文版於2011年正式出版，譯者將書名譯為：《開放通靈》。


    2006年去多倫多學習時，我們的靈性導師Arthur為我們解說天火（The Spirit of Fire）。下課後，我與Samantha一起搭地鐵回家的路上，我心裡正想著，不知何年何月何日才能達到三火合一的狀態，覺得自己好像離這目標還很遙遠，雖然嚮往，但有一點沮喪。而Samantha一路上興奮得幾乎是要旋轉飛舞的樣子。她說，今天老師傳授的內容好棒！她對我們姐妹的成長充滿了信心。我驚訝的望著她開心的笑容。心想，她是多麼勇敢和無畏啊！在修行的道路上，她的信心和勇氣，是我最羨慕和最需要學習的。這些年來，每當我自信不足落入修行低潮時，她總是那個努力把我往上拉拔的人，雖然，我的小我偶爾會與她抗爭，但她總是不放棄，永遠愛護我，提攜我。


    Samantha 的個性與我在許多方面是互補的，因此，上天總是把我們安排在一起學習和成長。多年來的配合與磨練之後，我發現，每當我們聯手一起「出任務」時，總是有美好的成果，有時甚至可以感受到上天的歡呼和鼓舞！印象非常深刻的是，有一天在多倫多，從早上八點多一直到晚上八點多，我們一起陪伴上天安排來的幾位有緣人，'
  merge: -1
  pgno: 29
