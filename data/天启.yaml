    # # 宇宙能量場


    在我首次進入同一體時，看到和感覺到的是～「宇宙能量場」～無限豐盈的能量充滿著我們所認為的空間，這帶給我許多震撼，這能量是我們和宇宙一體性的存在。在一體性的能量一道、神性之中，沒有恐懼和困惑，覺得圓滿、平安、平等、平靜、舒服、被呵護、被照顧、充滿愛和喜悅⋯⋯。當我們的心非常平靜時，可以看到，也可以感覺到這湧動的、活潑的、充滿生命力的、愛的、慈悲的能量。整個宇宙空間，充滿了流動和交織的能量漩渦。


    梵谷的《星夜，Starry Night》（P.8下圖）畫裡月亮與閃亮的各星球之間的能量彷彿在旋轉的筆觸，和宇宙能量場的流動非常近似。我猜想，梵谷在專心作畫時，也曾觸及與感受到這亙古存在的能量場，所以試圖用畫筆去展現它。一般人們肉眼所見的空間，其實並非空空如也，它充滿著宇宙能量流。這能量流像海洋波浪一樣的湧動著，當它流經我們身邊時，輕柔的撫觸我們的肌膚，我們可以感受到它的愛。有些人覺得自己缺乏愛，其實宇宙愛力的能量流充滿我們身體的內和外。無法感受能量流的人們，就很像魚兒一直在水裡游來游去，卻無法感知自己正是在水中。'
  - '[PAGE 135]


    # 進入同一體前，需要修正的習性：


    +   一、注意力偏重物質

    偏重物質，忽略靈性的人，感受不到宇宙能量場。

    看淡物質，提升靈性，才容易進入同一體的頻率。


    +   二、批評心和分別心

    有分別心時，會產生孤立和匱乏的幻覺，這與一體性的品質相違。批評或排斥任何人事物時，會形成煙霧般的能量，阻礙與訊息場的連結和交流，因此無法進入同一體。批評時，能量容易流失。當一個人真正發自內心與所有的人事物化敵為友、和平共處時，能量會自然的擴展，因為那時更接近同一體的頻率。


    # 對治批評心的方法：


    +   一、接受、包容和欣賞所有人事物的本然。

    二、站在他人的立場思考，理解他人正在學習的課程。

    三、練習在日常生活中沒有批評心。


    如果在日常生活中不能接納和原諒許多人事物，有許多情緒起伏，及各種是非善惡等等「二元對立」的念頭，都會干擾內心的平靜，因此無法觸及一體靈性。由於頭腦容易批評，所以要練習觀察每一個起心動念，去除雜念，養成頭腦的良好紀律，逐漸放下批評的習性。'
  - '[PAGE 136]


    # 練習進入同一體的方法：


    +   一、提升能量

    運作「全能量」是進入同一體最快捷的方法。醒著時都保持在全能量狀態，就好像泡在能量流裡，很容易進入同一體。


    +   二、無條件服務

    願意「無條件」服務的人，原則上，是希望大家都好，當一個人具有平等心和無條件的愛時，他的振動力相當接近同一體，因此容易進入宇宙訊息場。


    +   三、祈禱

    祈禱是與神的意識以及能量交流，是主動進入訊息場的一種方法。


    +   四、查訊息（聆聽天意）

    查訊息是主動接觸宇宙訊息場的一種方法，查詢過程中必須平靜，有愛心，因此容易進入同一體。'
