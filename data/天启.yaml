  - '[PAGE 151]


    有一個得證天眼通的修行人，走到墳地，看到一個老人的靈魂，坐在他自己的墓碑上哭泣。這個修行人問他：「您在哭什麼？」老人魂說：「我死了呀！」修行人說：「你的靈魂沒有死，你不是坐在這兒說話嗎？」老人仍不停的說：「明明就是死了！才會躺在下面的，不是嗎？」這修行人說不過他，只好離開了。


    有些執著的靈魂會以為那過去的身體就是他本人，所以就不捨得離開自己的墓穴，死守在那兒，幾十年甚至幾百年，過著像孤魂野鬼的歲月，真是可憐！在有生之年不知修行，智慧不開，死後一樣過著無明的日子。要知道，肉身只是像衣服一樣，用壞之後要立即捨棄，不要執著一件舊衣服不放，應當尋找更美好的未來！'
- md: '# 迷失的天人


    有位擔任工程師的朋友，他親眼見證一個靈魂的故事，事情發生在他任職的工地。一次臨時電梯突然故障，掉了下來，不巧壓死一位工程人員，從此常常有工作人員撞見死者的魂魄在此遊蕩，嚇得許多工人不敢來工作。老闆請來多位法師超渡亡魂，但是效果不彰，還越鬧越凶。


    有一天，終於請來了一位有道高僧，他到了現場後，對著電梯坑說：「王大得：你本是天上派來人間有任務必須去執行的人，你卻把使命忘得一乾二淨，成日做些偷工減料、要求回扣、貪得無饜的非法勾當，拿了不義之財，居然又在外花天酒地，包養女人，拋妻棄子於不顧，所以福報被你用盡，世壽被減短，死於非命。這是你咎由自取，如果你再不知悔改，怨天尤人，每日在工地裡興風作浪，嚇唬別人，你不怕再墮入更深的地獄嗎？」從此，再也沒有人看見鬼魂現身，工程總算順利建築完成！


    名利是誘人的東西，然而君子愛財，應當取之有道。古人常說：「舉頭三尺有神明」、「人在做天在看」，這都是真實不虛的！


    # 夢中的大餐


    看到黃山谷轉世的故事，我想起很久以前，有個朋友告訴我：如果你夢到獨自吃一桌菜，那很可能是過去世的家人在幫你做忌日。


    我想起我已經有好幾次夢見獨自一人在吃一大桌菜，桌上總有一條香噴噴的大鯉魚，和一大盤堆得像座小山的包子，及其他幾盤菜。


    自從聽說和過去世的忌日有關，我就開始留意了，結果很巧，都在我生日前一天夢到吃大餐。最後一次夢到吃那桌飯是我二十九歲那年生日前一天。也許在那之後，連我前世的後人也轉世去啦！


    有時，我想到前世的家人為我做了二十九年的忌日，那份耐心，那份愛，真令人感動啊！


    可惜，我不知道他們在哪裡？不能去告訴他們，我現在過得很好！不要掛念，也不用做忌日啦！


    # 借來的命盤


    有些靈魂響應天意的號召來地球幫忙，他們的目的是來地球執行某些任務，幫助地球人成長，自己也在這過程中學習成長。但如果與地球人沒有任何緣分和因果關係，是無法來投胎的。有一種解決方法是，借用別人的因果關係來地球，因此，他們也必須同時承受別人部分的福報和業障。


    有一次，我的兒子忽然生病，病得很厲害。發高燒，臉色發黑，能量似乎迅速的在消退。我看著他，很想救他。那夜夢中，我看見窗外有個老人在撿拾一些類似烏龜殼的東西，有老的殼，也有大的殼，忽然我發現我家門前有一個嫩嫩的小烏龜殼丟在地上，這個老人正要撿走，我忽然間意識到這是兒子的命盤。


    我問兒子：「你為什麼丟了你的命盤？」

    兒子說：「地球好無聊。」

    我說：「你居然把向別人借來的命盤丟掉，你忘了投胎前的約定嗎？這是不守信用，太不應該了！」

    兒子說：「好吧！」然後趕緊跑出去把命盤要回來。

    我醒來時，孩子退燒了，好像能量都回來了，氣色也已回復正常。


    # 靈魂的結合


    我們在夢中有時會和其他的靈魂結合，有時我們夢見自己身穿結婚禮服與其他人結婚，那是我們在靈界與其他靈魂「結合」。靈魂的結合是神聖高雅的，我們在靈界遇到有共同理想，振動頻率相當的靈體，我們會覺得像是遇到知音，所以選擇與他們的「能量」合一。當許多靈魂結合在一起時，就成為更大的靈魂團體，擁有更多的力量和靈性資源。


    比如，慈悲、喜歡照顧眾生的靈魂，可能會選擇加入觀世音菩薩的靈魂團體，一起聯手照顧眾生。觀世音菩薩的靈魂團體，在宇宙間有自己的辦公室，因為團員人數眾多，他們在宇宙中的據點形成相當龐大的辦公機構，大家連線在幫助別人。此外，多倫多市有一個修行團體的成員大都是來自宇宙的壽星～南極老人星。他們的長相接近南極仙翁，高廣的額頭和長長的下巴是他們的臉部特徵。這個團體的成員開了幾家素食餐館，也製作美味的素食品，造福了當地的素食者。我也認識一些來自王母娘娘、九天玄女、藥王菩薩，以及宇宙間其他高靈「靈魂團體」的朋友，無論他們是否憶起自己的宇宙來歷，大都持續精進和提升自己，積極幫助眾生靈性成長，並且執行提升地球的任務。


    ## 靈魂的團體


    一個靈魂團體可能同時有許多成員一起下來投胎。每個靈魂來學習的課程不同，這些靈魂在地球上獲得的經驗、福報、功德，都可以在靈魂團裡與大家共同交流分享。但如果其中有人造了太多惡業，整個靈魂團體的人可能也需要幫他分擔一部分業障。


    成員當中如果有一個人開始修行，靈魂團體的弟兄們會一起守護他、保護他，直到他證悟。因為他的證悟，會使整個靈魂團體與他同時提升。


    領先開悟的那個人有可能會知道靈魂團隊彼此之間的關係，也會常常在物質界或靈界裡，與團隊成員分享他自己的修行心得與體驗。


    然而，同時來投胎的其他成員，有可能一輩子都不知道彼此的存在與關係。當整個靈魂團體被提升時，雖然他們的頭腦並不知道自己內在的提升，但是他們會變得輕鬆快樂，很像開悟的眾生。


    每個人有自己所屬的「靈魂團體」，當我們從內在發現自己的靈魂團體時，可能外在也開始遇到一些自己靈魂團體的成員。大家本來就有共同的理想，可以攜手合作，把已經獲得的經驗和了悟的真理與有緣人分享。


    # 靈界醫療團


    藥師佛是靈界最典型的醫療團體，藥師佛和他的十二藥叉大將，都是很有愛心的靈魂。若有人向藥師佛祈求幫助，或是持誦藥師經，藥師佛的團體會盡量伸出援手。


    我女兒小學五年級時有嚴重氣喘，有一次她氣喘發作，我送她去醫院急救。當時她的臉都發黑了，不能自己行走，我硬是把她扛進醫院的病床上，然後急診室醫生立刻對她的喉嚨噴類固醇，她才可以正常呼吸。可是從此之後她必須隨時帶著類固醇噴劑，才能確保呼吸順暢。


    我很擔心她的氣喘，有一天我陪她一起念《藥師琉璃光如來本願功德經》，當我們念到「亦復不為諸惡鬼神奪其精氣。設已奪者，還得如故，身心安樂。」這段，我們母女感到很疲倦，兩人都睡著了。夢中我聽到電鈴響，過去開門時，居然看到我女兒衝進門。我很驚訝，因為我的女兒剛剛一直睡在我身邊，我緊跟著看發生什麼事？她迅速的進入我那睡著女兒的肉體與她合成一體。醒來時，我知道我的女兒丟失的一個魂魄回來了，這是藥師佛團體為我們展現的奇蹟。


    從那時起，女兒的身體逐漸好起來，她在十五歲開始吃素，從此沒有氣喘。她從出生就有的嚴重異位性皮膚炎漸漸好了，皮膚也逐漸變得光澤細緻。


    # 楚門的世界


    相信有些人看過電影「楚門的世界（True Man）」，片中男主角最後發現，自己整輩子是活在被一群人監控、拍攝的影城裡，他從生下來開始，就是一部電視劇裡的男主角。


    其實我們每個人的一生與靈界的關係，和這部電影的劇情十分類似。在我們出生之前，已經與我們的指導靈們討論好，我們想要到人間學習和體驗哪些課程，一起擬訂好這一生的生命藍圖。


    有些靈魂團體的成員為了支持我們的投胎成長計畫，也會與我們簽約，投生來扮演我們生命中的人物。有些人飾演我們的親人朋友，有些人飾演幫助我們的人，有些人飾演來考驗我們的人，以配合我們的修正和成長計畫。


    有些留在靈界的靈魂團體成員，則願意成為我們的無形導師或護法，在我們需要幫助時，提醒和保護我們。我們不是宇宙的孤兒，也不是來到地球單打獨鬥的，我們是受到重重的保護和關愛的靈魂。我們確實受到監控，但這是為了愛和成長的原因所做的照顧。


    # 靈界的排演


    當一個人面臨提升之際,而且他的靈魂同意被提醒,在一些必要或特殊的情況下,靈界的弟兄們會安排一些情境考驗,幫助他的頭腦超越一些執著的想法或偏見。


    有一次,我在靈界的一處廣場,看到一群人專注認真的在排演一齣戲。我好奇的在一旁猜測他們所演的情境和意義。然而,當我猜對時,他們就像洩了氣的汽球。那位導演說:「考題的答案被她猜中了,我們得換個主題。」我識趣的趕緊離開那裡,免得他們排演的主題若被我識破,還得重新安排角色和對話。從此我才明白,我們平時會遇到的一些情境考驗,或是機緣巧合,很可能是在靈界就已經排演過的,並非偶然。這些情境和對話,是即將發生在近期的事件。不久之後,我們在物質界,將會遇見這一群人,彼此間會有互動、交流和對話。他們所說出來的話語會點醒我們,也許是一句祝福、一個肯定、一句評論、甚至一聲喝叱,都是為了突破我們頭腦的框架或錯誤的思維。因為是經過事前排演的,所以沒有哪一句話是白費的對話,一切都是靈界精心安排的。也許,我們暫時不知道為什麼會遇到這些事,然而這都是靈界弟兄善意的安排,目的是要幫助我們提升。


    # 靈界的照顧


    大約四十幾歲時，有一天，我夢見自己的頭皮連著頭髮被掀開放在桌面上，頭皮中心剛生出幾根白髮，有幾位靈界的醫療人員看著我已被打開的頭部，正在討論我的腦部，需要更換哪些零件。好玩的是，我居然和他們一起專注的在看自己的頭部呢！


    醒來後，我立即去化妝室，用兩個鏡子相互映照著看，查看自己頭頂中心的頭髮，確實看見已經發出幾根白髮了，此夢之前，我都沒發現，這應證了夢中的情節是真實的。


    我先生在四十二歲時腿部痛風症狀很嚴重，有時甚至無法行走，他的雙眼也常常出血，但醫生束手無策。因為經常的劇痛，他自己覺得快要活不下去了。當時我們的兒子才五歲，我先生為了自己的生命以及家人的幸福，發願吃全素，並且開始學習打坐。


    他持素修行一段時間後，有一天我夢見，我陪著他在一棟建築的中庭廣場裡排隊，前面早已大排長龍，入口處有檢查人員，必須擁有「持素修行身分證明」才能進入。終於輪到我們時，工作人員讓我先生躺下，然後動手挖出他的雙眼，接著鋸斷雙腿，我嚇得大叫阻止。這時旁邊的人很客氣的對我說：「回去拿五百元來，買新的眼珠子和一雙腿。」


    我是哭著醒來的，眼角還含著淚水。冷靜後想想，這個夢是訊息，提醒我，我先生必須備有捐五百元的功德，靈界才可以幫他更換眼睛和雙腿。所以我立即去捐了加幣五百元給慈善團體。從此以後，他的痛風症狀逐漸減輕，腿部回復了健康，眼睛也不再有內出血的狀況了。指導靈說，因為我先生幫修行團體運送物資，才有這樣的優惠。


    許多年後，一位朋友突然從台灣打電話來，希望我幫他解夢。他夢見妻子的兩個卵巢被挖出來，擺在地上血淋淋的，他簡直嚇壞了。


    我問他夢中是否看到價格。他說看到一張紙上只寫著「任捐」二字。我覺得上天好幽默，忍不住笑了起來。接著告訴他：「你隨意捐一個數目就好了！」


    他的妻子患有紅斑性狼瘡很久了，靈界想幫她醫病，但她只需要一點布施功德就可以了，他趕緊捐了一大筆錢給慈善機構。之後，她太太的身體回復了健康。他們開始從事老人安養的慈善服務，指導靈說，靈界知道她以後會幫助很多人，所以先幫她療癒身體，讓她有足夠的體力服務眾生。


    2002年佛州國際禪期間,我在靜坐當中看見,靈界正在幫我妹妹更換心輪部位的零件,幫助她擴展心輪。2003年起,她隨順天意開始主辦靈性成長的讀書會,過了兩年開始翻譯靈修書籍,持續至今。


    我發現,我們的健康,有靈界在密切照顧。若我們平時專心修行,樂於助人,積累了足夠的功德,當身體上有某些問題,他們會幫我們更換一部分受損的部位、器官或肢體,讓我們在地球上可以更健康的生活、工作和助人。


    我好奇的問指導靈,哪些人有機會接受靈界的調整?


    指導靈傳達的訊息是:

    吃全素、守五戒、專心修行(包括打坐、靜心)、

    願意聆聽天意幫助別人者(有菩薩心、行菩薩道的人)。

    服務眾生的功德足夠時,不必捐款,靈界也會主動調整。

    自了漢、不願助人者,則是依照自己原訂的命運和大限。


    # 動物靈轉生


    擁有天眼通的人，大多知道有動物靈，也相信動物靈可以轉生人類。


    我看過有人身上纏著許多蛇靈，那人說，從小他的長輩都會帶他去喝蛇湯。另一個案是因重病而坐在輪椅上。我看到他肩上有兩條很大隻的鰻魚靈，重重的壓著他，以致他無法站立。他說他爸爸以前養了兩大池的鰻魚。


    一位同學的母親特別喜歡吃牛肉和狗肉，她的午餐便當裡常有牛肉或狗肉。當她母親癌末時，總是說有一群牛和狗凶猛的攻擊她，她的疼痛吃什麼止痛藥都沒有用，她慘叫的聲音傳到醫院外面很遠的地方，她的子女心痛不已。


    中東有一個組織經常無緣無故處決人，而且是以砍頭的方式。朋友好奇問我，究竟這是什麼業障。我查看時，發現這個組織的人過去世曾是豬牛羊，被送進屠宰場的機器，以砍頭的方式屠殺的。這一世換他們投胎為人，以砍頭的方式處決與他們有因果關係的人。


    # 靈體的樣貌


    我看過不同靈體的樣貌。例：餓鬼道眾生的形象，有大大的肚皮，細長的脖子。有的人靈體有第三隻手在腋下，因為他會偷東西。有的人靈體長了大大的嘴巴，足足有正常人的兩倍大而且歪斜，看起來很恐怖，因為他到處說別人的閒話。


    靈體是多變化的，當一個人充滿愛心或愉快的時候，靈體展現美麗的樣貌。充滿憤怒的時候，靈體會冒黑煙，汙染自己與旁人的磁場，而且容易吸引憤怒的靈魂侵入肉體。當一個人緊張或恐懼時，靈體冒出土黃色煙霧，使自己免疫系統功能下降，容易患病。


    有些人因為情緒起伏太大，或動了許多念頭，一天之間，靈體顯現了六道的形象。（詳見：六道輪迴。）


    # 墮胎和嬰靈


    台灣有些法師主張墮胎的人必須為死去胎兒的靈魂超渡，另一些法師又說不必相信這些怪力亂神的事，我本來也不知究竟該聽誰的？但自從親自體驗以下的事件後，我知道胎兒靈魂的存在。


    事情是這樣的，我有個朋友在她的母親過世之後，非常想知道她母親的去處。經人介紹基隆有個神壇，可以幫她和她母親的靈魂溝通。當天我先生開車帶我們去，一路上她不停的抱怨她的婚姻及事業，而且即將面臨破產！我告訴她錢不是拼命想賺就有的，必須有福報才有，而福報又是依據我們過去世的布施功德，及此生的布施多寡而定。所以此生應該多行善布施，才能福報源源不斷。


    這時車上傳來陣陣嬰兒的哭聲，像是好幾個嬰兒不停的哭泣。我以為是車上錄音帶裡的聲音，忍不住問我先生：「你在哪兒錄這帶子的？怎麼在孩子哭這麼大聲的地方錄音，這歌還能聽嗎？吵死人了！」其實，我是不好意思讓朋友聽這樣難聽的錄音帶。可是，沒想到我先生立刻轉頭說：「有哭聲嗎？我怎麼沒聽到，何況這帶子是買來的，哪是我自己錄的！」朋友驚訝的說：「我也沒聽到嬰兒哭聲啊！」這時我忽然明白了，這些嬰兒的哭聲來自靈界，所以他們兩人聽不見。


    我問朋友說：「妳拿過孩子吧？」她說：「一共拿掉三個！」我問她為什麼不生呢？她說：「養一個就夠麻煩了！」我又問：「妳為何一再懷孕，然後一再的殺死自己的孩子？」她只能嘆口氣說：「都是不小心有的！」


    到了廟裡，我們看到許多黑色的旗子，氣氛陰暗詭異，一位通靈人正被靈魂附身和家屬們談著死別的悲傷。我看了心裡直發毛，就不由自主的在心中念起佛號，沒想到這樣也不行。那靈魂立刻退出通靈人的身體，通靈人像瘋了一樣，對著我們大叫著他頭好痛，而且罵我一直念佛發光，弄得他那間陰廟太亮，死者靈魂都跑掉了，害得他不能繼續讓靈魂附身，於是把我們趕出來，所以朋友失望而歸。


    其實我明白，是佛號的光芒力量使她們的法力失效，但是我可不是有心來鬧場的！我只是養成二十四小時念佛的習慣。朋友的運氣不好，事業失敗，全是墮胎果報，三個胎兒的靈魂一直跟著她，使她家運不好、身體也不好。


    我有個遠房親戚，她兒子是婦產科醫生，時常有婦女要求拿掉孩子。有幾次她住兒子家，半夜走到開刀房附近，都會聽到一大群嬰兒的哭聲。問題是家中一個嬰兒也沒有，哪來的嬰兒哭聲？幾次下來，她苦苦勸告兒子，終於使他兒子搬離那個房子，而且再也不做墮胎的生意了！


    我也曾在一次大病初癒時發現懷孕了，其實我很喜歡孩子，當時已經有一個兩歲的女兒，但是我懷孕時因為生病吃了許多西藥，深怕胎兒畸形，所以忍痛去墮胎。沒想到從此以後每天頭昏嘔吐，像懷孕一樣。


    有一位好友介紹我去三重一位老太太家，她自稱是為地藏王菩薩工作，不收任何費用。一見面，她就對我說：「有個小男孩跟著你！妳為何拿掉孩子？這孩子說他不會畸形，他本該來妳家出世修行，現在卻沒機會了，他又無處可去，只好住在妳家臥室一角，沒衣服穿，又冷又餓。他最羨慕妳的女兒，他稱呼妳的女兒姊姊，他說妳好疼姊姊，每天早上姊姊都有包子吃，他也好想吃。」我確實為了方便，每天早上買包子給女兒當早餐。我聽了很驚訝，竟然有一個小兒子躲在牆角挨餓受凍，感覺好心酸。


    老太太祈請地藏菩薩引領這胎兒的靈魂去別處投胎，那孩子要求吃三種他一直想吃的食物，兩個包子、兩片餅乾、兩顆糖果，這樣他才願意走。在引領那天，我們夫妻準備了三大盤食物，來補償這個無緣的孩子，說也奇怪，從那天起我的病也不藥而癒了！


    誰說胎兒沒有靈魂？


    # 因果的律法


