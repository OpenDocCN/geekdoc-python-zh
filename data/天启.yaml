  md: '# 六度


    「六度」是六種法門，為菩薩道必修科目。

    行六度可以從生死苦海渡脫到涅槃安樂彼岸。


    # 布施


    分享自身所擁有的或所知道的給需要的人。

    財布施、法布施（分享真理）、無畏布施（消除恐懼），

    可長養慈悲心，除去五毒中的「貪」。


    # 持戒


    遵守佛法不作諸惡，奉行一切善，

    廣修善法利益眾生。

    基本的戒律是守五戒：

    不殺生、不偷盜、不邪淫、不妄語、不飲酒或吃迷幻藥。


    # 忍辱


    能忍受別人的羞辱、懷疑、誤會、排擠等等而不生怨恨。

    當別人對你恭敬供養時，不生憍逸。

    當別人對你嗔罵打害時，不生怨恨。

    遇寒熱風雨饑渴等外界的惱害時，能忍耐能安住。

    能行忍辱者，乃可成為真正具有力量的人。

    忍辱能除去五毒中的「瞋」。


