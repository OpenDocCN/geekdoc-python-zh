    這是我幼年時期經歷的最大傷痛～體驗到無常和生離死別的悲哀。從此我對於人的生死與存在的價值經常感到迷惑。為什麼？我們必須被生下來，然後等著那既不可知又是可知的未來，也就是那死路一條，人人平等的路！'
