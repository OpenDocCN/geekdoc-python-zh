  md: '# ## 幼兒的感知


    嬰幼兒其實是很敏感的，他們剛剛從靈界來到物質界，對地球生活感到相當陌生。一般人認為嬰兒什麼都不知道，其實他們只是還不能說話，但是有一些嬰兒還擁有前世的記憶。比如瑜珈之龍的作者尤伽南達，出生時清晰的記得前世在喜馬拉雅山上的修行生活。有些嬰兒的靈魂年齡可能比我們大，生生世世的經驗可能比我們豐富，對於宇宙的知識也知道得更多。


