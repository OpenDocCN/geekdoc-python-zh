  md: '# 佛學的啟蒙


    因為從小喜歡美術，所以二十歲時，找了一份油畫的工作。我的老師是油畫家，黃信安居士，他是虔誠的佛教徒，很年輕就持素，他的修行是以淨土和禪宗為主，他對佛經有非常深入的研究與了悟。因為有幸在他身邊工作，我聽聞了許多佛理，奠定了我的佛學基礎。


    每天午飯時間，我最喜歡聽黃老師為我開示，在那個時期，我聽聞了佛法中的三十七道品。例如：


    +   - 四念處：觀身不淨、觀受是苦、觀心無常、觀法無我。

    - 五根：信根、進根、念根、定根、慧根。

    - 五力：信力、進力、念力、定力、慧力。

    - 七覺支：念覺支、擇法覺支、精進覺支、喜覺之、除覺支、定覺支、捨覺支。

    - 八正道：正見、正思維、正語、正業、正命、正精進、正念、正定。


    他教我要離相（一切相皆是虛妄）、要有平等心、去除分別心。善護身業，不失律儀；善護口業，不譏他過；善護意業，清靜無染，隨時記得苦空、無常、無我。持續堅持六度之行：布施、持戒、忍辱、精進、禪定、智慧。'
  merge: -1
  pgno: 50
- img_proc: true
  md: '我逐漸對佛法有了認識，並開始學習念經及靜坐。有了疑問，我就請教黃老師，例如：如何修無我？黃老師說：「睡覺蓋上被子時，就當自己死了，睡在棺材裡，死了的人是不能在乎世間的一切事物了！把自己當成活死人吧！」於是我練習這方法半個月。


    有一天，我先生對我說了一些不合理的話，若是往日的我，一定要辯論到底，討個公道。可是我想我正在體驗自己已死，死人哪裡能有本事吵架呢？所以，我若無其事，先生對我的反應愕然莫名。我覺得這方法真是有效，讓我的貪、嗔、痴、及驕慢少了一大半。過了一陣子，老師教我：白骨觀，這回死得更徹底了！回想起來，我的修行路真是好有趣。


    就在那個時期，我的夢變得很美麗，有一次我夢見濟公活佛，像一座山一樣高，全身金光閃閃，夢中的我大喊：「師父！師父！」並想去追他。因為他的腳步太大、走得太快，我一急竟然飛了起來，飛到一處如夢似幻的美麗山水中。


    另一次我夢見在夜晚走到一間教堂旁，我忽而跳上了十字架，然後輕輕的一直浮上了高空中，看到漫天星斗，及很大黃金色的月亮，那寧靜的夜色，閃爍的星光令人難忘！有一次夢見五隻鳳凰飛過我的窗前，那是一種很高雅的姿態，抬頭挺胸，頭頂上長著兩隻柔軟而綠得發亮的羽'
