    ## 共業


    我先生平時很喜歡看有關戰鬥機的電影。有一次我夢見「有一群日軍戰鬥機的飛行員，我先生是其中一員，他們的任務是開飛機去轟炸別國的土地、炸毀別人的家園。（這群戰鬥機的飛行員，這一世都住在我家附近，平時我們見面都會彼此打招呼，是熟悉的好鄰居。）接著的場景是有飛機來轟炸我們，鄰居的房子被擊中引起大火，我家也被蔓延的火舌燒到屋頂了，這時消防隊員用水一直灌到我家屋頂，我家的牆壁和地板全是水，我想這下完了，房子全毀了。」醒來之後，心裡為那些非常真實的畫面感到有些忐忑不安。


    過幾天，參加聚會時，Arthur忽然對我說：「如果發生火災時，記得要祈禱！」我立即想起那個夢，心裡毛毛的，覺得老師為何要說不吉利的話？


    又過了幾天，距離我家十幾戶的房子著火了，火勢非常猛烈，一間一間延燒過來，五部消防車都無法控制，消防隊員緊急來按鈴叩門，叫我們立刻疏散，不可留在家中。


    我忽然想起Arthur所說的話，即刻就找先生、女兒、兒子，四個人在一樓客廳做一個短暫的祈禱。我在祈禱時看到在那熊熊烈火中，原本著火的屋頂上有一些地獄爬上來的靈體，接著看見，從天而降一股冰寒之氣，把他們壓到地底去了，強大的烈火逐漸被冰冷寒氣熄滅了。


    祈禱完走出家門，發現火勢已經逐漸被控制住了。夢境裡是延燒到我家，但實際火災只燒了五家，我們這後面十家都倖免於難。我知道這是祈禱的力量，使我們安然度過這個業障。因為這些鄰居前世都是轟炸機的隊員，炸毀許多人的家園，所以這是大家前世的共業引起的災難。感謝我的導師在事前的提醒！讓我們透過祈禱和恩典的力量，保全了這一世的身家財產。


    再舉另一個共業的例子，幾年前，某國工黨舉辦夏令營培訓下一代的政治領袖，許多中學派出傑出的學生參加，這些學生成績都相當優異，可是卻被一名假警察將他們集中起來，然後開機關槍掃射，死亡人數將近七十人。朋友看了這消息很難過，請我查查看是什麼因果。


    查得訊息是：這些罹難者在納粹德國時代，都是希特勒的手下，專門在集中營裡射殺無辜的猶太人，因此，這一世，他們也要體驗被集中起來屠殺的感受。


    ## 慎選行業


    我女兒就讀高中時，為了幫父母減輕家計，一直都很勤勞打工。有一次，她想找餐飲業的工作，我說，葷食餐廳、有賣肉類產品的公司我們都不要去做，會有共業。賺錢要選擇不殺生的、不會傷害眾生的行業，殺生的錢是存不住的，還會惹來業障、疾病或殺身之禍。


    她很傷心的說：「那樣一定找不到工作啦！」


    我說：「一定會找到的，上天會幫助你的！」


    隔了幾天，她找到一個醫生診所的前台工作，後來，又找到一個在學校圖書館的兼職工作，薪水都挺好，大學學費就有著落了。此外，她去生命線當義工，通常當義工是沒有收入的，可是她招募和訓練員工績效非常好，而且盡心盡力幫助了許多人，所以榮獲年度的最高工作獎金五百元。


    事實上，拿人錢財與人消災，不明白的人才敢不慎選行業，或不擇手段去賺錢，或貪求別人的錢財。如果知道要血淋淋的替「金主」去生病開刀或承受業障，不知道誰還有勇氣騙別人的錢？！


    ## 不義之財


    不義之財不能取。不義是指：不應該得到的。拿了不義之財，往往有難以想像的災難，古今中外都有許多實例。我們也常聽說「拿人錢財與人消災」，從別人那裡拿了不應該拿的錢財，必須幫對方承擔業障。所以，千萬別貪人錢財！別短視近利，要小心長期的因果業力！


    2007年，妹妹受託去法院幫客戶說明財務報表，受託前，她接收到相當清楚的夢訊息，因此過程中都與我保持聯繫，隨時請教指導靈，希望在處理上能真正公平合理。這個個案，是不義之財以及冤冤相報的典型案例。


    前來委託的是一個投資公司的小股東，他認為大股東侵占私吞，希望透過財務報表，能證明侵占的金額，之前已經打了十年官司，還沒有贏得訴訟，他非常不甘願。


    指導靈訊息如下：


    「前世，他們是兩名大將結拜為兄弟，駐守邊防。因為被部屬出賣，誤以為戰敗，所以兄長決定棄官而逃。他將政府所撥的盤纏大部分捲款而走，只留下一點給乾弟，僅僅讓他足以維生，所以乾弟覺得被兄長出賣了，懷恨終生。但兄長由於取得不義之財，短命而終。


    今生兩人又成為股東一起投資事業。但角色翻轉，乾弟成為大股東，兄長成為小股東。乾弟想討回公道，然而，前世兩人所爭的錢財是公款，皆非兩人應得的，是不義之財，所以兩人皆種下惡業。今生兩人雖然費盡心機爭錢奪利，但都沒有福報可獲得所爭的錢。


    兄長此世本應受短命報，但因錢財被侵佔，由侵占人承擔惡業，所以得以消災延壽。乾弟此世貪得無厭，但是不知守財，隨意揮霍，外強中乾，並無實質財力。


    這場官司若兄長贏，乾弟也拿不出錢，空有贏得官司之名，而無實質財產利益。兄長到死也拿不到錢。因此，這場官司繼續下去只會兩敗俱傷，贏得官司者，取得「短命報」。


    雙方官司纏訟，心懷怨恨，不得安寧。十年光陰耗費在爭錢奪利，試問此生還有多少日子？奉勸珍惜生命光陰，千萬不要再浪費生命在討債和爭錢奪利。


    消除業障的方法：懺悔、念誦地藏經迴向對方，將惡因惡果轉變為菩提智慧，原諒對方此世所做的錯事，原諒自己過去世所做的錯事，多做善事，多積功德。過去的讓它過去，生命短暫，要多珍惜！」


    ## 孤獨的果報


    有一位朋友，離婚之後，悲傷的去請教一位法師，這位法師能通曉過去未來，他告訴我的朋友：「這是因果報應，你過去世是個男人，常常無故虐待妻子，不但毆打她，傷害她的心靈，最後還拋棄了她。你此生的丈夫正是你過去世的妻子，你曾欠他，所以必須賺錢養他，還要遭到他的虐待及拋棄，因為過去不珍惜身邊的人，所以得到孤獨的果報！」


    正如法師所說的，我的朋友過去確實常遭丈夫虐待。因此，她相信這是過去世的作為所造的業障，現在她持素念經精進修行，希望透過修行，改變此生及未來的命運。


    ## 殺生的果報


    廣欽老和尚在世之時，常常盤腿坐在殿堂上，大批信徒都排隊膜拜。有一天，一位手裡抱著嬰兒的男士走到老和尚跟前，請求幫助。老和尚說：「你做的是什麼事業？」男子說：「冷凍雞工廠。」老和尚說：「這孩子是醉雞轉世的，渾身軟若無骨。」男子說：「對！醫生說這是軟骨症。」老和尚說：「你可不可以另外換個不殺生的工作？」男子說：「可是我所有的家產兩千萬，都已經投資下去了，如果不做我就破產了！」老和尚說：「繼續做的話，下一胎是個女兒，還是這種病啦！」


    另一位男子來朝拜老和尚。老和尚說：「你的職業要趕緊換了！不然就要沒命了！」原來此人的職業是賣蛇肉的，他回家後前思後想，寧可相信老和尚的話，也真心打算洗手不幹了。但家中還剩一條響尾蛇，他想，這次殺完以後就不再殺生了！於是動手去抓蛇，卻不幸的被那條蛇給咬死了。其實他殺蛇無數，從未失手，如果他當下聽老和尚的話，戒殺、放生就不會落得如此下場了。


    ## 畜生的果報


    以前有一戶人家，居住在深山僻靜之處，他的鄰居有一次在通往他家的路上，看到一男三女穿著華麗、舉止輕挑，感覺不是正派的人，正結伴往他家走去，鄰居十分好奇，一路跟著觀看，眼見這群陌生人，走進這戶人家。


    好奇的鄰居趕緊跟進去，奇怪的是屋裡空無一人，於是鄰居喊出了主人問道：「你家剛進來的四個客人呢？」主人驚訝的說：「哪有什麼客人？我家的母豬剛生了四隻小豬，我正忙著接生，哪裡有四個人？」


    那四個人怎會在剎那間消失了蹤影？鄰居很驚訝的去查看，那四隻剛出生的小豬，居然正好是一隻公的三隻母的，鄰居訝異得說不出話來，他想起剛才那些人走路像是飄飄的，異於常人。


    不務正業的果報是相當可怕的，好好的四個人的魂魄居然投生豬腹，做人能不謹言慎行嗎？


    ## 縱欲的果報


    有一次我的鄰居請來一位道士，有能力讓人去陰間探望去世的親人，俗稱「觀落陰」。那位鄰居想去看他剛過世的母親，但因為這門派對於生肖有限制，無奈之餘，只好讓最小的八歲兒子去觀看。孩子眼睛被蒙了黑布，在道士的作法下，似乎真的看到陰間的景象，他開始描述眼前發生的事物。


    他說，他看到地獄的入口，有火紅的火焰燃燒著，當他走到一個巨大的建築裡，看見許多人被綁在燒得通紅的鐵柱上，皮肉都燒焦了，非常痛苦。當中他看見一位剛過世不久的鄰居大嬸，這孩子就好奇的問旁邊的獄卒道：「阿嬸是好人，為什麼要這樣待她？」獄卒答：「這女人在人間時，丈夫去世之後，偷偷和鄰居丈夫有染，所以遭此果報。」這事讓人心驚，因為在場的人都知道，這位美麗的大嬸生前待人和善客氣，溫文有禮，很得眾望。卻因為丈夫早死，為解孤獨寂寞，與別人的丈夫偷情，竟遭此慘酷的地獄果報。


    陰間的律法森嚴，我們在人間時要小心，切勿縱情縱欲，否則臨命終時，地獄業報現前，那時後悔已太遲。


    ## 小計謀也有業障


    心地必須光明善良，這是我頭一次與朋友去問神的心得。記得那日輪到我時，那位修道人對我十分客氣，誇獎我心地慈善，將有後福。我還以為他習慣恭維每一個上門的客人，但是輪到我後面那位同學時，他竟然以很嚴厲的口氣說：「妳總是算計別人，怎麼能心安理得？妳若不改，一生命運會很慘，小心哪！妳走路都可能跌進水溝裡，夜路走多了會碰到鬼的！」


    我驚訝的回想起，這位同學最喜歡在考試的前幾天，去租一大疊故事書，免費借給同學們看，目的是讓大家沒空溫習功課，這是我們一群受害同學在幾次大考之後研究出她的用心。像這樣小的計謀都能被神明看穿，人還是善良一點為妙！許多年後，這位朋友的命運真的是全班同學中最不如意的！


    ## 布施的功德


    我剛結婚的時候收入非常少，我的佛學啟蒙老師黃信安居士告訴我：「想脫離貧困，必須布施。」我說：「我的錢少得每個月都不夠用了，還談什麼布施呢？」黃居士說：「布施不一定要許多錢，一點誠心罷了。送給乞丐三、五元都是布施。倒一杯水讓人解渴，也是結善緣。微笑也是不必花錢的布施。念佛的功德迴向給眾生是布施。講佛法給眾生聽，是法布施。布施以印經功德最大，因為看經典可以讓人開智慧，成就佛道。所以印經功德第一，但是功德必須先迴向給眾生成就佛道之後，再迴向給自己。希望在此生能衣食具足，還能有足夠的時間，修持禪定，將來得證佛果。千萬別要求人世間的財富，否則下一世無法跳脫三界必須回來享受那些福報，萬一又造惡業，墮入六道輪迴，苦難無期，得不償失。」


    聽了黃老師的開示，我把僅存的一點錢委託書店，印了一些經典與人結緣。奇妙的是，從那時起，我的經濟就逐漸好轉了！


    ## 印經的功德


    我有一個朋友，開了一家茶藝館，因為生意不是很好，竟然到一家陰神的廟，求了一隻黑旗回來，供奉在店裡，據說若是有了這五鬼運財旗子，每到黃昏，她只要燒冥紙，五鬼自然會幫忙拉客人，進來茶藝館消費。我是不敢苟同，總覺得有點邪門，恐怕她會造業障。有一天我告訴她印經功德無量，更容易有大福報，所以她就託我去幫她印了五百本佛經，印好當天印刷廠直接把書送到她的店裡。沒想到隔沒幾天，她打電話對我抱怨：「都是妳說印經功德多好，自從那天佛經送到我店裡之後，我們的生意竟一落千丈，每日門可羅雀，我只好回黑旗廟去查問，誰知道五鬼說他們再也不敢來我店裡，因為我店裡突然來了五百位觀世音菩薩，太亮了，他們只好落荒而逃。」


    原來這五百本佛經是觀世音菩薩普門品，封面都有一尊觀世音菩薩聖像，我從來就不知道紙印的菩薩，竟然有如此神祕的力量，真是不可思議。我這位朋友後來把茶藝館收了，另謀職業。但不久之後，她改信佛教，修行精進、虔誠，沒多久就找到真正的明師，從此走在無上的正道。經書裡的佛智慧可以幫助閱讀者開悟，所以助印經書者也容易開悟，我們幫助別人什麼，自己就會得到什麼。


    ## 念佛的功德


    念佛號時，就與佛的能量場共振連結，佛菩薩會幫助我們調整頻率、穩定能量。佛菩薩就像是能為我們補充能量磁場的「靈性贊助者」～這概念引用自《神遊時空》。


    念佛號有無數的功德，除了淨化思維、修得禪定外，還會產生能量「光」和「功德力」，可以超渡許多冤親債主，也可以累積功德幫助自己的親人消除業障。我們可以善用各種時間念佛，無論是坐車、走路、洗碗、做飯時或睡覺前都可以。如果能念佛念到「一心不亂」，會得到不可思議的功德。我有一位朋友十八歲開始修行和念佛，他在臨終前坐著念佛號，直到佛來接引他時，保持打坐姿勢，含笑而去。


    還有一位朋友也是往生西方，她臨終時，自己專心念佛號，朋友們也為她助念，忽然間，佛放大金身來接引她！旁邊六位朋友，都同時看見巨大的佛身，金光晃耀阿彌陀佛親自來接引，整個醫院的病房中金光閃爍，無法用言語形容的莊嚴輝煌。佛手中拋出一朵蓮花，拋到她跟前時，像車輪一樣巨大。她的靈體就從頭頂出來，坐上蓮花隨著佛和八大菩薩，一起騰空而去。


    ## 福報的杯子


    我二十歲時，黃老師告訴我：「福報像個杯子，如果杯子滿了，水會自動流走。但是布施能提升福報的杯子，布施越多，杯子就更換為更大的，更好的。」


    老師舉了一個例子，有一次他搭火車時，一個人在車外伸手跟他乞討，老師想遞給他一枚銅板，由於火車已經啟動，那人沒接到，銅板居然掉進地下水溝，那是加蓋的水溝，所以這一位乞討者，沒有得到那枚銅板的福報，這是他的福報不夠，所以即使你想給他，他都得不到。


    我相信這個增加福報的概念。每當我發現金錢開始以各種不同的方式流失時，我就趕緊去布施了，這樣才能加大我福報杯子的尺碼。根據多年的體驗，布施的奇蹟多到說不完。簡而言之，可以使運氣變好、身體健康轉佳、小孩學業變好、家人獲得高薪的工作、或是得到意想不到的收穫，此外，還可以廣結善緣喔！


    ## 善心種福田


    我的外曾祖父是個殷實的鄉村農人，他心地慈善，每次看到路人爬山涉水經過附近山崗時，總是累得口乾舌燥的。所以他建了一間小涼亭在路邊，並買了一個大水壺，每天裝滿白開水，供趕路的過客，坐下來歇歇腿喝杯水。


    細心的他，因為憐惜路上沒鞋穿的孩子，還特地用布縫了一個袋子，每天出門時，帶在身上，沿路把釘子及玻璃屑，裝進袋中，免得光著腳丫子的孩子們，踩著了會受傷流血。他還曾經收留一家窮人，讓他們住在一間閒置的房子裡，甚至把自己的農田分出一塊，讓他們去耕作，自力更生。


    他自己一生克勤克儉，對待他人及兒孫，卻是寬厚仁慈，在他六十歲生日時，忽然得了急病，一日之內就與世長辭，很奇怪的是，他剛過世之時，兒子們去市場買棺材，棺材店老闆，完全不信的說：「別開玩笑了！我剛才親眼看見他從對面理髮店走出來，又走進前面的廟裡！」兒子們好奇的跑去問理髮店的老闆，那老闆確定，剛才他老人家確實活生生的在理髮，當時頭也是暖的，一點也不像剛死去的人。連外面一堆熟人，都親眼看見他穿著一身白衣白褲，很清爽自在的，走進廟裡去，他去世時，確實穿著一身白衣褲，但是廟裡卻找不著他的蹤影！


    許多年後，我母親居然夢見自己飛到一處百花盛開的山谷，在一個山洞中，坐著白髮紅顏的外曾祖父，他坐在一朵蓮花上，笑著對我母親說：「傻孩子！妳的福報就要來了！」那一年我父親考取政府高等考試，職位和薪資都調升，從此我家的經濟逐漸改善。


    有一次母親與二阿姨在談天時，無意中談起這個夢境，二阿姨很驚訝的說：「怎麼和我的夢一模一樣？那山洞種滿奇花異草，尤其是各種蘭花布滿洞外，美不勝收。我也是每次都夢見飛著去見他老人家，也是看見他坐在蓮花上！」母親和二阿姨，後來都是虔誠茹素的佛弟子，修行十分精進。


    我的大舅舅年輕時在學校教書，有一天走路回家時，經過一條簡陋的木橋，發現橋面少了三條長木。那時一個失明的老人家，左手拿著柺杖，右手提著林投葉，走過那危險的木橋，柺杖插進洞口時，整個人差點兒就跌下去，舅舅目睹時嚇得冒了一身冷汗。平常他經過那條橋時，總以為每個人都看得見，少三條木頭無所謂。這回為了失明老人的安全，他立刻買了三條長約五呎，寬約一呎的木板，找朋友幫忙扛到木橋上，補釘上去。


    正當他很專心的在釘著木板時，有一個路人，笑著對他說：「老師啊！您在造橋鋪路啊！我看你快生兒子了！」雖是一句玩笑似的祝福，但不到兩個月，他的妻子懷孕了，後來出生時，真的是兒子。這孩子非常優秀而且孝順，舅舅晚年主要都是靠著這個兒子養老享福呢！


    此外，舅舅的長女和次女都是長年茹素修行的居士，次女在南非事業有成，還開設了一個道場，服務當地的有緣人。由此可見，善心必有善報，積善之家必有餘慶！


    ## 節儉能增壽


    我的祖父一生節儉，食量也少，平日每頓頂多一碗的飯量。他八十五歲那年病重，家母替他去問神，神明指示：「這個人平日省吃儉用，愛惜五穀，今年本該壽終，但他剩餘三年的食祿尚未吃完，所以還能再多活三年！」說也奇怪，這場疾病慢慢有了起色，祖父果真病癒，又活了三年才往生，真是應驗了神明的指示！


    家母有個多年老友，每餐食量驚人，常常一人吃下一大鍋飯，但是身體一向不好，四、五十歲就嚴重氣喘，成日喘不停，非常痛苦。有一年病重時，家人替他去求神，但神明指示：「這女人已將一生食祿吃光，所以得提早走了！」隔沒多少日子，她就藥石罔效，無奈的離開人世！


    我也認識一位朋友，他本來十分富有，但奢侈浪費，吃喝無度。到了五十多歲時，居然倒了朋友壹仟多萬元的會，以為可以安度晚年，沒想到才一個多月，一向體態健壯的他，突然中風，臥床不起！


    人一生的福報有多少通常是有定數的，主要是與前世布施及善行的多寡相關。如果有人自以為家財萬貫，就胡亂浪費五穀，尤其是食物白白糟蹋，或很新的衣服、完好的家具，就嫌舊丟棄換新，這樣的人是在隨手丟棄自己的福報，一旦福報用完，就得過苦日子了。


    有些人以為自己身懷壹億元，就有福報壹億元。其實那壹億元中，說不定只有壹仟萬元，是他一生中真正可使用的福報，但是他並不知道，硬是在短期內用光了福報。如果這人又一毛不拔，不曾布施，那麼福報享盡之後，會突然破產、變窮、或去世。所以，奉勸大家，節約用度，平時記得常常布施累積福德。


    ## 慈悲得善終


    有一天我打電話給台北的母親，她興奮的告訴我一個好消息，原來是我的一個叔公剛剛過世，家人卻很替他高興，因為他老人家活到九十二歲了，一向健康活動自如，老妻也九十一歲了。他是一生不曾罵人的長者，為人慈悲溫和，他要走的那天，一點也看不出病徵，只是邀請所有的兒孫到家中吃飯，他高高興興的吃飽了，接著穿上一套平日最愛穿的衣服，然後走到廳前，對每一位兒孫打招呼之後，他說：「各位這世就到此再見了！外面許多穿紅衣服的，要迎接我回去了，不用替我辦喪事，不用披麻帶孝，應該像辦喜事一樣處理！」說完，就安詳的與世長辭了。


    兒孫們驚訝之餘，也非常欣慰他老人家的自在生死和遊戲人間。這是西元2002年，在台灣發生的真人真事！'
  merge: 0
  raw:
  - '[PAGE 174]


    此外，念經若要有功德必須淨口，淨口不只是茹素，茹素只是吃齋。淨口必須沒有惡口、兩舌、綺語、妄言。我們經常會聽到有人說：「吃齋的人，怎麼還這樣說話？……」人們對於修行人會採用更嚴格的標準來看待，所以，為了保護人們對於修行的信心，我們要更謹慎修持口德才是。


    當我們修行成長到某個階段以後，上天會開始安排有緣人來到我們面前，與我們切磋交流，一起學習成長。當我們有機會幫助別人成長時，第一個要遵守的天律，就是「不揭發他人的隱私」。因為對方基於信任，為了解決難題，通常會把私事告訴我們。如果，把別人隱私說出去，還沒幫到人，就先害了人，那是嚴重違反了天律。因此，天意怎敢再透過這個管道傳達訊息呢？可能從此無法再查到相關的訊息檔案，喪失了幫靈界工作的機會，甚至，還造了口業。所以，一定要小心遵守「不揭發他人的隱私」的戒律！


    有句古老的真理：「除非舌頭失去傷害的力量，否則它永遠無法說出靈性的真理。」我們要學會「管好自己的舌頭」<sup>(註)</sup>，不再用言語傷人，我們的喉輪能量才會和諧美麗，真理才能從我們的口中流露出來，當我們開口說話時，就像蓮花綻放，那是多麼美好的境界啊！在此提出來與大家共勉之！'
  - '[PAGE 175]


    註：詳見赫萊瑞恩系列《靈性的季節》中文版P.71～72。'
