    # 口業


    有個鄰居經常在兄弟姐妹與子女間抱怨和說閒話，說得太過，以致親人間反目成仇，甚至老死不相往來。後來，大家終於發現是她的抱怨製造了矛盾和衝突，因此，漸漸避免與她往來。她年老後孤獨且多病，依然常常抱怨，覺得別人都對不起她，完全沒想過，這是自己造了太多口業的果報。


    口出惡言時的負面能量，首先會燒傷到自己嘴部。至於口業的大小，還要看造成的損害有多大。有一位婆婆向朋友滔滔不絕的講媳婦的閒話，第二天她的嘴部就長了一大串的水泡，痛了許多天才好。有一位婦人，習慣批評別人，咒罵先生時也是口不擇言，後來被口腔癌折磨許多年。


    有一位王小姐，經常對我們這群朋友說，張先生是一個喜新厭舊的男人，欺騙許多女人的情感。有一天清晨，我夢見張先生非常憤怒的在靈界控告王小姐詆毀他的人格。事隔沒幾天，王小姐開車時發生車禍，損失了七千元加幣，大約將近台幣二十萬元。雖然，張先生頭腦不知道詆毀的事情，但是他的靈魂知道。所以，在背後說人閒話或詆毀別人者，千萬不要以為對方不知道，對方的靈魂一定會知道的。


    撰寫此篇時，有一位親戚與我同步分享一個夢訊息：

    「有人在網路上謾罵某家公司，導致那家公司財務嚴重受損，許多投資者遭受破產之苦。因此，該公司的老闆決定提告，要求將那人判處死刑。但當事人曾經為社會做過許多善事，所以他的朋友們一起去幫他向那老闆求情。代表陳情的一位朋友拿出厚厚一疊檔案文件，裡面記錄了當事人曾經做過的所有善事，開始向老闆勸說，希望他手下留情，放過那個人。」


    這個訊息提醒了我們，在這個網路及媒體發達的時代，有些人往往隨意公開的批評、指責、謾罵、或散播各種謠言或負面消息，影響的範圍非常廣，延燒的速度非常快，所造成的口業真是難以計算。


    這個訊息也讓我們了解，即便是在物質界發生的事件，尚在人間的老闆可以在靈界控告討回公道，而造口業的人差點被靈界判處死刑，幸而，當事人平時做了許多善事，才撿回一條命，真的要小心禍從口出啊！


    年輕時，我深怕自己在身口意不清淨時不自覺的犯錯，所以與神明約定，如果我做錯什麼，說錯什麼，或想錯什麼，請敲一下我的頭以示警告。


    一九九五年八月，我先生的同學將我們合夥的工程款兩百萬元捲款而走，並逃往大陸。得知這消息時，我既緊張又生氣的在心中咒罵他，才剛罵完的瞬間，頭頂中心被櫃子上面掉下來的針線盒重重的敲了一下，好痛啊！那大概是我最後一次詛咒別人。我發現，就算是我們的頭腦認為別人做了對不起我們的事情時，也不能造口業。一來，有損自己的口德。二來，我們不一定知道事情背後的因果關係。


    離題一下，因為損失了那兩百萬元，家庭經濟頓時出現危機。起先全家都很震驚，接著，全家總動員一起想辦法：「爸爸努力兼差、媽媽努力畫油畫賺錢、減少帶弟弟外出玩以降低消費支出。…」後來，女兒主動省下中午在學校吃飯的錢，存足了五百元給我。我不忍心收她辛苦存下的錢，她卻偷偷塞在錢包裡，看到女兒這麼善良的一面，讓我這當媽媽的，既高興又感動。那次她的聯考總分比在校模擬考多了五十分，順利進入公立高中。那工程款事件表面上像是損失，但實質上，得失之間很難衡量啊！


    開始修行以後，守五戒是「戒定慧」～通往智慧源頭旅程的開端。五戒中有一項是妄語戒，不打妄語正是在修口德。我們說話時要選擇說正面的，才會產生正能量，並且提升我們的振動頻率。修行若想要進步，想要超凡入聖，口德是必須修好的基本功。還有，我們的每一個思言行靈界都看得很清楚，而且隨時在打分數喔！'
