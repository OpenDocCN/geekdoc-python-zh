  md: 'Samantha天生擅長把握重點，所以這次指導靈借重她，為大家編寫這本「修行考古題」。由於閱讀這本書的有緣人，分布各種靈魂年齡層，而且這本書的眾多指導靈也來自不同境界，各有不同的重點和指引。各位看官，請隨順自己的喜好，選擇適合自己的主題閱讀。覺得自己已通過或不需要的主題，就跳過或放下吧！


    指導靈說，修行的經典很多，但是「應用在生活中」的文章並不多，Samantha可以在生活中實踐教理，並且寫出感想。所以上天借重她，讓她從小經歷各種考驗，當她通過課程時，再經由她來表達如何過關，而每一次過關都是因為「愛」。所有人際關係的背後幾乎都有因果關係，然而，愛可以超越一切因果。


    地球被宇宙高層封鎖許多年，現在開始讓地球更自由，並且全面提升人類的意識層次。指導靈希望能透過這本書，鼓勵人們擴展眼界和意識層次，但是達到這之前，要先學會「愛」。


    在編輯過程中，我們更深入體會到，小我與大我的視野不同，小我會有個性和偏好，而大我著重的是「如何利益最多的人」。比如，小我頭腦希望用字遣詞能文雅或富有學識，但是，來自大我的訊息是，文字要平易近人，甚至為了某些有緣人，必須運用粗糙的語氣。在這些過程中，我們同時學習放下小我的執著，隨順大我和天意的啟示。'
