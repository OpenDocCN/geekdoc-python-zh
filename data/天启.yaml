    # 超渡親族


    在我剛進入同一體之際，靈魂一直處於很忙的狀態，常常夢見自己一戶戶的去許多親族的住所拜訪。當我進入他們的客廳時，就會有許多親人，老老少少，大排長龍的合掌走進來，朝著我微笑致敬。當我合掌回敬時，對方的腳似乎有些動搖，接著就輕輕的飄浮起來，每一位都開心的、笑瞇瞇的向我道謝，然後，像天使一般成群的飄著、飛著離開了！


    原來超渡人們的靈魂是這麼有趣的事情，太奇妙啦！


    有一次，我夢見我去一個很大的廣場～類似球場的地方，裡面約有上萬人吧！由於我坐下來就會打坐，並且習慣開始啟動能量，於是能量場迅速擴展，忽然球場裡所有的人都接收到能量，不由自主的飄起來，白日飛升了！


    不過，偌大的球場裡，居然有兩個靈魂留在原地，我好奇的靠近問他們：「為什麼不走呢？」他們沒說話，表情不開心，遇到這樣執著的靈魂，似乎也不能強求，只能放他們自由吧！'
