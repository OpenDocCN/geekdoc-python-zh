  md: '# 愛惜公物是惜福


    有一位女士，每次去公共游泳池，沖澡都開最強的水，嘩啦啦沖水一個多小時之久。管理員提醒她，但是她卻依然故我，想沖多久就沖多久，絲毫不珍惜公共的資源。


    她有一棟房屋出租，三十年來每月的水費都高到驚人，她老是抱怨房客亂用水。她跟我訴苦後，我猜想她家可能有地方在漏水。後來水電人員查出原因，是她家地下室一個久未使用的廁所在漏水，平均一個月大約流掉台幣一萬多元。濫用公家的水，結果自家的水也莫名的被耗用，宇宙的因果律，似乎悄悄的在運作。


    有些人以為公共的資源就不必節省，我們使用公廁時，常會發現有人用完水龍頭不會去關緊，其實，白白流掉的水正是在損耗自己用水的福報，而且浪費水資源的人，將來還可能會有缺水、或生長在沙漠國家無水可用的果報。奉勸大家當用才用，以免流失自己的福報，或造了未來的惡報。


