  md: '# # 逆境考


    人生的起伏和天上的烏雲或風暴差不多。有時看起來很驚險，可是很快就事過境遷，完全沒事了。有一次，我忽然財物損失兩百萬，一時真是嚇壞了，誰知不到一年，又莫名其妙的賺回來了。另有一年，有位朋友被騙幾千萬，我與先生都為他難過，不知道他往後日子怎麼過。可是十幾年後，我們發現他早就回復了富裕的生活。所以不要被一些人事物的起伏嚇得要死，這些都是逆境考。


    有些人遭遇逆境時就想不開，彷彿天要塌下來了，他們不相信自己可以敗部復活，以為從此人生無望，如果放棄了希望，那才是被逆境考打敗了。


    其實，逆境考常常是人生中一段短時間的低谷考驗，遇到這樣的考驗時，我們要記得孟子所說的：「天將降大任於斯人也，必先苦其心志，勞其筋骨，餓其體膚，空乏其身，行拂亂其所為，所以動心忍性，增益其所不能。」當我們從容樂觀的面對考驗之後，會發現柳暗花明又一村，逆境過後，就好像雨過天晴，光明在望！'
