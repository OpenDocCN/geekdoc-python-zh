    # 執著的老母


    我在多倫多市有一個無神論的朋友，前兩天突然來電，原來她那年齡近百，中風臥床約十年的老母，最近總是說著一些奇怪的話，她說她的床上睡了另外兩個人，一直在拿她的財物，所以她就一直罵那兩個人，每天晚上鬧得全家都睡不著，雞犬不寧的。


    有時老太太還會一人扮演兩個角色。她會用莊嚴的口穩說：「我是觀世音菩薩，我來帶妳去轉世了！」接著，她又轉換為小女孩稚嫩的聲音，撒嬌的說：「我不走！我不要去，我的女兒和孫子們都對我很好，我要留下來讓她們照顧。」


    觀世音菩薩的聲音更嚴肅的說：「妳已經讓全家人守著妳，照顧妳那麼久，他們有自己的功課要學習，妳一直在這裡會影響他們的學習，也浪費妳自己的時間，沒有成長。」接著，老太太又變成小女孩的聲音嬌滴滴的說：「不要，不要！我絕對不走，我要和他們在一起！」這時，菩薩的聲音又開始不斷的曉以大義⋯⋯。'
