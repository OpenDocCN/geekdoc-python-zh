  md: '# 通靈者


    我父親年輕時認識一個可以隨時隨地看到靈界的人，這個人在妻子去世時，因為過度悲傷竟然哭瞎了一隻眼睛，沒想到從此以後，他可以看到靈界眾生，聽說是靈界同情他的癡情，只好讓他可以隨時看到他已過世的妻子。


    起先大家以為他想妻子想瘋了，因為他邊走路，邊打招呼，可是前方並無來人，不知道究竟他看到什麼，而且他常對著空氣講話，又不像自言自語。


    有一天，村子裡有人去世，剛好抬棺經過他的身邊，他突然把耳朵貼到棺材上聽死者說話。然後，他轉頭傳達訊息給死者家屬，說是他在家中某塊磚頭下藏有一些錢。大家半信半疑的回家查看，真的找到錢了！從此他變成村人心目中的算命仙，因為他預告的未來一律應驗。


    有一天，父親坐火車時與他同車，他忽然對著父親說：「你現在有五個女兒了！」


