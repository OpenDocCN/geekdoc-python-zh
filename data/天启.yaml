    一天夜裡，我夢見自己一身民國初年的打扮，大約十七、八歲結了一條長長的辮子，辮子尾端繫了一條紅絲帶。我坐在黃河邊，手裡拿著兩個細鐵環套著的布料，正在刺繡，那是我的謀生方法。此外我和當時的父親擁有一條渡船，全家靠擺渡維生，但是碰上乾旱連年，大家都窮了，沒人買刺繡，連坐渡船的人都少了。有一天我家已經無米下炊，那日正好有一對父子，坐上我們的渡船。船到了河中央時，我正巧看到船艙裡他們父子打開了布包，裡面露出了一個小金塊。我多嘴的把這事告訴正在掌舵的父親，豈知窮急了的他，竟把船上防身之用的刀子取出，我們各拿一把刀去恐嚇人家，交出了黃金。


    夢到這裡，我耳邊突然有聲音說：「搶劫的業障是很重的！」接著，我看到了地藏王菩薩的顯像，醒來後，我流淚滿面，懺悔不已！


    世上的苦難太多，前世今生，痛苦無盡。想到眾生為了生存，而造的惡業無數，劇苦無有止期。為了自己，也為了眾生，再苦也值得成就佛道。就從那時起，我下定決心，今生要以修行為最重要的任務！'
