    第六部 解析夢訊息，希望讀者透過書中的實例解析，了解夢訊息的重要，並且開始記錄自己的夢訊息。這方法有助於了解自己的意識和潛意識，以及目前靈性成長需要改進的方向。


    第七部 宇宙星球，希望讀者透過這些文章能將眼界從地球擴展至宇宙，並且將意識提升到宇宙的層次，進而回歸上主。作者認為，當我們還在地球的每一天，都要過得精彩豐富，不是等到回去靈界時，才享受天人的樂趣，我們可以在地球上享有天人般的美妙生活，也就是，實現「地球有如天堂」的願景。


