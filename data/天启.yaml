    # 一切唯心造


    古人說：「一切唯心造。」這裡的「心」是指心智、思維。我們的每一個思維都具有能量，也具有創造力，因此無論一個人想什麼，他已經開始變成他所想的。所以，我們要時時覺察自己正在想什麼，也要謹慎選擇思維所專注的對象或目標。有些人可以閱讀或感知人們的思維。以前我練習在心裡時時念佛號的期間，曾經遇到三位具有天眼通的人。


    第一位有天眼通的人跟我說：「哈哈哈！真好玩！我看到一串串的阿彌陀佛文字，一直從你頭上飄出來。」


    第二位是幫人觀落陰（和已過世親人說話）的乩童，他對我說：「你出去吧！不要待在我這裡。你把我這房子弄得都是光，太亮！太刺眼了！嚇得那些靈魂都跑掉了，不敢來附我的身，我怎麼跟我的客人交代啊？我還要不要做生意啊？」這讓我更明白，念佛號，可以產生光。


    第三位有天眼通的人是我的靈修老師Arthur，他對我說：「你可以不用再念佛號了！你已經練成沒有雜念了，我剛才坐在你身邊二十分鐘，你除了佛號沒有任何一個念頭和想法，現在我可以教你接收訊息了！」'
  - '[PAGE 256]


    # 思維與視野


    因為念佛和吃素打坐，我的念頭越來越少，甚至一念不生。有時我一想起誰，就感應到那個人的思維。有一次，我坐在車子前座，靈修導師坐在我後面，我回頭看了導師一眼之後，忽然進入一種很深的禪定。當時我感受到我就是他，於是我用他的視野看世界，覺得車窗外的夜色變得好靜好美！我享受這前所未有的美妙感覺，時間長達二十分鐘，直到我們下車。


    有一次我獨自在家打坐，忽然想起我的一位親戚，瞬間感應到他的思維。當他走在路上時，頭腦想著：「這裡真荒涼，賺不到錢！」從他的視野看出去，房屋街道顯得破落、荒涼黯淡。（平時，在我的眼裡，這裡有許多參天大樹，綠意盎然、風光明媚，街道上有許多維多利亞式的優雅建築。）當時他剛剛移民來多倫多，沒有固定的工作，內在的擔憂和匱乏感，造成他眼裡看見的是滿地的荒涼，我在他的思維世界裡才幾秒鐘，胸悶和壓抑的感覺讓我差點不能呼吸（他當時有高血壓），所以趕緊逃出來。


    為了印證這個體驗的真實性，我立即打電話問他。我說：「你剛剛在想，這裡真荒涼，賺不到錢。是不是？」'
  - '[PAGE 257]


    他說：「是啊！你怎麼知道啊？」原來，同樣的地點

    環境，在不同人的視野裡，景色與氛圍竟然完全不同啊！


    難怪佛經裡說，天堂和地獄是我們自己的創造。同樣

    在這世界上生活，快樂的人覺得自己彷彿置身在天堂裡，

    痛苦的人彷彿生存在地獄中，所以思維深深影響我們對這

    個世界的觀感，想要生活在天堂或是地獄，就看自己的選

    擇和創造能力了。'
  - '[PAGE 258]


    # 思維的進展


    我幫人催眠時發現，人們生生世世的學習和生活背景不同，思維的進展方向和程度也不同，因此，影響了這一世的學習能力，以及所展現的各個面向。


    有些女孩過去世大多是男性，扮演女性角色的經驗較少，因此，她們今生的個性比較男性化，與男性談戀愛時經常觸礁，雖然渴望結婚，美夢卻不容易成真。


    有些人在今生沒念到高中或大學，查出過去世是在荷蘭種田、或是在紐西蘭當牧羊人。他們的思想單純，待人誠懇。他們的衣著樸實淡雅，比較鄉村風。由於他們在過去世讀書的經驗較少，這一世在讀書方面感覺相當吃力。


    有些人在前世當過皇家成員、或達官貴族等，他們的思想較為細密，通常講究禮節、服飾或美食。基本上，他們在前世大都在文化藝術方面投入較多能量，所以，今生往往也是琴棋書畫樣樣行。


    我也曾經幫一位高中學生催眠，他看到自己來自高科技行星，他們的行星使用電腦控制機器生產農作物，人人都擅長操作電腦。他的數學能力很好，邏輯思維也很強，'
  - '[PAGE 259]


    電腦對他來說特別簡單。在現實生活中，他曾代表學校參加電腦遙控機器人的比賽，並且得到名次，顯然這和他過去世所學的東西息息相關。


    我們常常認為某些人是某方面的天才，其實這和他們過去世的學習經驗有關。比如，莫札特就是大家都熟知的一位天才音樂家。這裡引用《靈性的季節》書中的一段：「莫札特就是一個很好的例子。他在孩童時所譜寫的優美樂曲，已超越許多當代成人作曲家，這來自兩個因素。首先，莫札特獲得的音樂天賦部分來自高等靈界的加持，尤其是天使界。然而，如果莫札特的靈魂在過去世並沒有努力增進作曲家和演奏家的才能，天使界也不可能加持他。由於他曾經努力投入能量，天使們才可能透過加持他曾發展的天賦能力而成就他最精華的作品。」


    因此，我們可以了解所謂的「天才」是經過生生世世努力的學習、投入能量、以增進某項才能，再加上靈界的加持，而成就的。所謂自助者天助也！


    我們生生世世的學習經驗和能力都會累積在靈魂的層面，即使前世沒學習過的領域，此生開始努力投入學習，就可以在這領域累積經驗。如果，來世再來地球投胎時，就會具有這方面的天賦能力。那時，人們可能會讚嘆你：「哇！你真是天才喔！」'
  - '[PAGE 260]


    # 閱讀啟發思維


    在我幼年時期，閱讀已經成為我最重要的娛樂。大約小學三年級開始，每天我都要閱讀幾本課外書，並且神遊於作者的思維世界中。我大多是利用放學後的時間，去圖書館閱讀課外讀物，從亞森羅蘋偵探推理小說、到紅樓夢、屋上提琴手、還有許多世界文學名著等等。到了初中一年級時，我已經把圖書館裡所有我感興趣的書都讀完，那時我已經養成喜歡閱讀的習慣了。


    有一天上中文課時，我還在閱讀課外書，老師走過來要沒收我的書，當他看見書名《叔本華與尼采》時，他說：「你看得懂嗎？不要看這些書，他們很悲觀。」


    我說：「可是我覺得他們是探討生命的哲學家。」


    老師說：「好吧！你喜歡閱讀，也看得懂，很好！書還給你，但是上課時間，不要看課外書，要專心聽課。」


    其實，對我而言，中文課本內容太少了，才十幾篇文章，在開學第一天拿到課本時，我就讀完啦！然而，老師卻要講整個學期，對我來說，上課實在太無趣了！'
  - '[PAGE 261]


    閱讀使我大開眼界，有許多作者的思維世界很美，經由書中的文字，我可以隨著他們的思維，去想像和感受他們多采多姿的生活，覺得比看電影還精彩。


    我喜歡看的書籍還有世界歷史，綜觀人類的歷史，可以看到人類從早期的野蠻戰爭，進化到文明與和平，從匱乏的年代，進步到繁華與豐盛，人類在不停的進化中，世界也變得越來越美。這是整個天意的計畫與安排，讓地球逐漸提升，進化至愛的文明。


    閱讀可幫助我們拓展思維和視野，有空就多閱讀吧！'
  - '[PAGE 262]


    # 發展創造性思維


    想要擁有優質的生活，必須多多學習創造性的事物，那麼，就會得到靈界的禮遇，會被安排比較完善的生活。上天為了讓我明白這個訊息，送了我一個象徵性的夢境。


    有一天，我夢到坐飛機，空服員說：「能拿出特殊才藝的證明，就可以坐在比較舒適的位置。」我女兒立刻從皮包中拿出文學和音樂家證明（夢中我才知道，因為她從小就喜歡閱讀，論文比賽得過全校前幾名，所以得到文學家證明。她也喜歡唱歌，從小學到高中都有參加學校合唱團，所以還擁有一張靈界頒發的音樂家證明。）她被安排在機艙中最前面的好的位置。另一位會拉小提琴的乘客，也拿出音樂家證明，所以也有好位置。


    我問說：「我喜歡畫畫，這樣有沒有藝術家位置？」空服員說：「當然可以！主要是因為學習文學、藝術、音樂和科學，可以刺激腦前葉，發展創造性思維。靈界敬重這些努力學習和成長的人，會給予特別的福利，也會安排更好的生活給這些人，其他人只能坐在後面的艙等。」


    第五部、居家修行 / 259'
  - '[PAGE 263]


    持續學習，可保持思維的擴展和成長，在這個資訊發達的時代，我們很幸運的有許多學習的方式，例如：參加讀書會、研討會、音樂會、各種藝術或專業展覽、各種才藝或專業課程、烹飪或烘培課程、舞蹈課程、瑜珈課程、知性旅遊等等。這些活動都會刺激腦前葉細胞持續成長，使頭腦保持年輕靈活，體態也自然會保持年輕有生命力。老化和癡呆並不只是年齡因素所造成，還有一個重要的原因是停止學習，頭腦長年不使用，鈍銹了！


    不分年齡，都可以繼續學習和成長。我的房產律師來自台灣，年齡大約七十幾歲，身體健康，思維靈敏且清晰，睿智幽默，走路步伐輕盈。他說，他從電腦專業退休時，就去學習法律，六十歲時考取律師執照，他從來沒打算退休，一直都精神奕奕的繼續在工作。我希望我以後也可以和他一樣，保持身心健康，為人們服務到最後一分鐘。


    260 / 天啟'
  - '[PAGE 264]


    # ### 專注於創造


    我的母親八十三歲那年，因為參加讀書會的活動，而愛上了色鉛筆著色。從此幾乎天天專注於繪畫。她說，有時候，只是想著要給一朵花畫上什麼顏色（P.3下圖），就覺得好快樂。有時候，她在一張紙上，畫滿了不同色彩組合的小鳥，她的心情彷彿也和小鳥一樣雀躍。


    隨著練習的進展，慢慢的，她開始臨摹畫本，勾勒出圖案，而不只是著色。過了一段時間，她開始注意到立體的表現方式。有時候，她花了幾小時，才畫出一隻毛茸茸的小兔子（P.3上圖），她也覺得好快樂，因為時間已經不重要了！接著，她開始把她的畫分送給親朋好友，這是因為，她內在的愛和喜悅已滿滿的流溢出來了！


    她越畫越快樂，頭腦越清晰，記憶力更好，她發現自己的行動力比以前更好，做家事也比以前更有效率。因此，她的信心也越來越增長。


    專注於畫畫三年後，最近，她常常從夢訊息中，清楚的知道自己在靈界的提升進程，她靜坐的時間越來越增加，禪定的法喜隨之而來。'
  - '[PAGE 265]


    > 「我們透過創造，注意力向內，了解自己的內在有創造力，我們了解『創造力就是神明』，了解內在有神性。我們感悟到內在神性的時候，愛會自然的表達和流露。」


    > ～摘自：《神遊時空》～'
