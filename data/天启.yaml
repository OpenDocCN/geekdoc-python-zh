    ## 百善孝為先


    「百善孝為先」這個古老的訓勉，至今仍然是一項真理。靈界對於孝敬父母的人加分最多，那些功成名就或享有人天福報的人，多半是非常孝敬父母的。


    在我年幼時，父親的薪水都要分成兩等分，一份給住在家鄉的祖父母，一份留著家用。每當祖父母來台北時，母親會立即小跑步到附近的市場，買最好的菜做給老人家吃，甚至還買昂貴的水蜜桃或其他水果，儘管平時我們家是非常省吃儉用的。母親都會私下跟我們說：「老人家需要補補身體，你們這些孩子長大以後有的是機會可以吃。」


    祖母因為眼疾很年輕就看不見了，因此有了自卑感。有一次她私下問我：「你媽媽介意有我這樣盲眼的婆婆嗎？」


    我說：「哪裡會啊？媽媽常向鄰居稱讚您，說您眼睛看不到，還養育了七個孩子，洗衣、晾衣、燒飯，還幫媳婦坐月子，她覺得您真是太棒了！」祖母聽了之後，很安慰的露出她那慣有羞澀的微笑。


    我的母親喜歡給予公婆營養的食物,而我父親表達孝心的方式則是給予精神的食糧。住在通霄時,父親每天下班回來,就陪著祖母談天,然後述說歷史故事或經典小說給她聽,像是水滸傳、諸葛亮、西遊記等,他想排解祖母平日的寂寞,而且幫她增長知識和智慧。父親說故事相當生動活潑,許多親戚都聞風而來,津津有味的旁聽。


    祖母的心很寧靜、記憶力非常好,雖然沒上過學,數學方面,她學會心算加減乘除,中文方面,她可以把父親說給她聽的故事,全部深深的記憶在腦海中。在我幼兒時期,祖母就經常說這些故事給我聽,我覺得她老人家彷彿是一字不漏的在講,尤其是孔明草船借箭的故事,我聽了深深佩服這位歷史上的優秀人物。就學後,我特別喜歡去圖書館借閱這些膾炙人口的歷史小說,也因此養成愛好閱讀的習慣。(編輯至此,綜觀了我的家族故事,我才發現,父親說故事給祖母聽,祖母就說給我聽;父親幫祖母增長知識和智慧,祖母就幫我增長知識和智慧。凡是給出去的,一定會回來,這美善的循環,也證明了萬物同一體。)


