    ## 師兄的忠言


    我曾請教那位證神通的師兄，我修行沒有進步的原因。他列舉了五點：


    一、驕傲和自滿的人修行不會進步。


    因為他們認為自己懂得很多，修得很好，做得很完美、很夠了。他們認為沒有人可以講他們，他們也不想聽別人的，所以他們才會不斷的錯過上帝及佛菩薩的恩典，而永遠的停留在原地，不會進步。「原地」指的就是一個充滿幻想、貪婪、虛榮、好勝、愛比較、期待讚嘆和肯定的虛假世界。


    二、貪生怕死不是一個真正的修行人。


    修行人指的是一個不畏艱難、努力追求真理的人。不是拿著修行當藉口，躲進來避難的。修行人要有勇氣接受一切，不管情況好壞，一旦我們接受一切，靈魂就會被蛻變，接受就能超越！不是一味逃避、好逸惡勞，我們不是修行的難民！修行是為了尋找真理、尋求開悟和智慧，不是為了躲避災難！如果疾病、災難和不祥可以讓我們看破放下、不執著和開悟的話，那麼他們不是不好的，而是上帝的恩典。


    三、好勝。


    好勝就一定能勝嗎？不服輸就能不輸嗎？

    誰能跟上帝鬥？誰能跟永恆和生死鬥？

    人太渺小了，小得微不足道，所以有什麼好驕傲呢？


    四、如果你修的是無上法門，最好有準備去死的精神！


    因為那個無上力量會逼我們的頭腦死，逼我們的貪婪、嫉妒、我執死。那些障礙我們靈性開悟的東西不死，我們無法獲得新生！就像毛毛蟲要蛻變為蝴蝶時，必先置之死地而後生。無上法門會蛻變我們的靈魂，如果你真正誠心努力修行的話，它會把你從罪人變成聖人，把你從黑暗帶進光明及永恆的喜悅。


    五、「我」指的是神性。


    神性既然是不生不滅怎麼會生病呢？

    如果身體病了，不要說我病了，應該說身體病了！

    頭腦混淆不清、貪婪迷惑時，要說頭腦病了，不是我病了。因為我們跟身體和頭腦黏在一起生活太久了，才會受苦的。


    師兄的話讓我深深的感動，我立刻修正自己的缺點，隨時觀察自己的想法，立即有了很好的體驗與進步。我發現只要自己肯虛心改進，修行也不難，修行就是修正自己的思言行！


    ### 拜訪王羲之


    這位證神通的師兄，總嫌我打坐太少，所以有一天我特地靜坐了四個小時之後，才去向他求教，沒想到師兄竟看出來，他興奮的說：「我以為妳打坐不容易得到光，沒想到妳才坐四個小時，光就這麼多，今天真高興看到妳的光強起來，以前妳就像一個富有的人，放著一倉庫的財寶而不去拿來用，光在那兒叫窮。現在我發現妳輕易的可以拿妳的財富來用，真替妳高興！妳知道嗎？我們整個道場也沒幾個真正肯修行的、想好好修的，更不用講那些不修行的世間人了！看到肯修的人真難得，真高興！告訴妳一些有趣的事。」


    師兄說：「我喜歡書法，常去拜訪古代的書法家，找他們敎我寫毛筆字。」


    我好奇的問：「你看到的是真實的世界，還是過去的影像？」


    他說：「很真實，連毛筆都可以滴出水珠，所以我們可以交談，做朋友，其實現在、過去、未來、都是同時存在的，所以我可以隨時走進走出，要查到每個人的過去世，易如反掌，甚至十幾世前的因緣都可查得清楚明白。」


    我問：「未來是定數？還是可以改變？」


    他說：「大多已定，小部分可以改，修行人如果努力精進，就比較容易改變命運！因為修行人不斷修正自己的錯誤，命運當然會改好。」


    我：「如果過去、現在、未來，同時存在，那有幾千萬億個我們？」


    他：「是這樣沒錯，但也是一個。用頭腦是想不通的，妳先有個概念，以後自己去證得吧！我得到的，沒辦法給妳，妳得靠自己去證得。」


    當我又提起思念的父親，師兄說：「趕緊修到開天眼吧！這樣妳可以隨時看到他，不管他在世上，或離開人世，妳一想到他，就可以見到他。我隨時可以看到我已往生的祖父，只是很少想要看他，看多了也沒意思，個人有個人的工作，我不那麼執著於阿修羅感情。」


