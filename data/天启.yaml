  md: '# 年齡與婚姻


    有人因交往的對象年齡比她大十歲，家人極力反對。


    指導靈給他們的訊息是：

    婚姻是否幸福與年齡無關，

    重點在兩人是否「相愛」。

    如果相愛，所有困難都可以克服；

    如果不相愛，所有人事物都可能是挑戰。

    進入每一段關係都會讓他們成長，

    在這時代，經常重新洗牌，不像古代的限制那麼多，

    不用擔心現代的年輕人，這是他們成長的課程，

    他們不會無緣無故認識，

    他們有各自的神聖天心，

    都是經過神聖天心的安排而相遇，

    雙方的靈魂都同意在這段期間一起學習課程。

    婚姻並沒有所謂的成敗，

    或是有沒有在這段關係裡面淘到金，

    婚姻課程的重點是：無條件的愛。

    不要把「有條件的眼光」框架在人們的身上。

    對於婚姻的課程，採取「理性的態度」是適宜的，

    如果雙方在各方面「旗鼓相當」，

    婚姻關係更容易和諧美滿，

    因為，任何一段熱戀都會隨時間而冷卻。'
