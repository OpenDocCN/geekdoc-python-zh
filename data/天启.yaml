    # # 念佛號


    小時候我很膽小又常看到鬼，因此恐懼得睡不著。父親告訴我：「妳只要念阿彌陀佛，身體就會發光，鬼害怕亮光，會被妳身上的光芒嚇跑了！」


    修行後，我去承天禪寺許多次，但是廣欽老和尚從未對我個人開示什麼。僅有的一次，我帶著幼齡女兒去請他開智慧，之後我站在他老人家身旁，虔誠的望著他，希望他會對我開導修行的方法，忽然他叫住我：「喂！妳過來！」我興奮的洗耳恭聽接下來的開示，他老人家指著我的女兒說：「注意照顧她！她正在吃一張紙屑！」我紅著臉趕緊把紙從女兒嘴裡拿出來，心裡想，他老人家是否認為我連女兒都照顧不周，還談什麼修行？


    有一次我鼓足勇氣，問他老人家：「師父我該如何修行？」他淡淡一笑說：「念阿彌陀佛啦！」從此我訓練自己走路也念佛號，洗碗也念，煮菜、做事，都儘量念佛號，日子久了，頭腦似乎乾淨不少，不會亂糟糟的。睡夢中偶然會預先看見一些未來發生的事，事後也能印證那夢的真實性。但是我覺得那是不夠的，我渴望在清醒中知道整個事的來龍去脈，知道宇宙的真理，找到自己的佛智慧，那才是真正的成就。'
  - '[PAGE 54]


    我認識許多的師兄師姐，其中有一些已證得很高等級，他們得到神通自在，並且默默的關心並指導我們，如何在修行中突破心靈障礙。他們的愛心、耐心、定力、超乎一般的修行者，他們的一舉一動，是如此安詳、寧靜與自在。從他們那裡，我學到許多修行的方法，每一段日子後可以察覺自己又進步了！那是一種很安心的感覺！好像你闊別家鄉已久，而今你已經坐上了對號快車，車子正帶著你走向溫馨家園的途中，你數著每一站，知道家鄉越來越近了。'
  - '[PAGE 55]


    # 天上的兄長


    記得有一次去問神，是我及大姐陪大表姐一起去的，在基隆路一家道教的廟，法師居然當著眾人面說：「這三個女孩都是天人轉世！」我們只能一笑置之，誰也沒有相信會有這種事。


    隔了幾年，兩位朋友帶我去新店山裡，一座挺大的神廟，這次更怪了！本來一群人排隊問神明問題，都是問什麼答什麼，輪到我時，神明突然唱起歌來，但是每句話都在對我開示：「妳原是天人，你下凡來目的是為了渡人，自己卻迷失了兩百年，都已經忘了回家的路，所以妳的心靈苦很久了！」我問他：「您是誰？」他說：「妳下來兩百年，連自己兄長的聲音也不記得了？」他的歌聲雄壯迷人，絕不輸男高音，聽來有點耳熟，但又不知道在哪兒聽過！


    他接著又唱：「我是妳天上的兄長，我一直在注意妳，妳吃了許多苦，這一世總算想回家了！我知道你一直想修行，目前在學靜坐，只要妳明白陰陽合一的道理時就可以回家了！」我好奇的問：「我這世回得了家嗎？」「可以！因為妳開始修行了。但是別貪玩，天上的母親非常想念妳！只要專心修，這一世肯定可以回家了！」我忽'
  - '[PAGE 56]


    然覺得好安心好快樂!好像迷路的人找到了方向。


    一會兒,神靈退出了法師的身體,我想再問些問題,法師已不復記憶,這時我問旁邊負責翻譯神語的婦人:「神明說了什麼?」她居然說:「神明說,把這些香灰吃了,妳的病就會好!」真是讓人驚訝,她一點也沒聽懂神明的話!我向陪我來的兩位朋友說:「真奇怪,她一點也不明白神明說了什麼?」沒想到他們都很困惑的問我:「究竟神明說了什麼?妳好像大有來頭?為什麼聽得懂神語?神又為什麼對妳講了四十分鐘之久?」


    這時候,輪到我很迷惑,我一直以為我與神的對話,是使用中文,但是一旁所有的人卻又完全聽不懂?那些對話真是天界的語言嗎?而且我認為我和神明只說了五分鐘,為什麼他們說是四十分鐘?這麼長的時間差距是怎麼發生的?這成了不解之謎,但之後回想起來,這個神明的聲音,之前曾經救我一命。


    事情發生在我剛結婚不久的時候,因為二十歲就結婚,婚姻生活使我很苦惱,兩人都太年輕,認知不同,適應不良,不懂得包容對方,脾氣又大,所以時常吵架。有一天剛吵了一架,我覺得十分委屈,就以自殺威脅,他也不理我,逕自睡覺去了。以我當時的驕傲和任性,說了就不會食言,於是我就悲傷的坐在書桌前,寫一封給父母的訣別書,心裡其實也不想為這無聊的小事去死,只是話已'
  - '[PAGE 57]


    出口，不能收回，何況沒良心的他正呼呼大睡呢！該怎麼死法？跳樓，太可怕！也會嚇著別人。跳海，這個好！不用埋葬，省了家人許多事！


    正打好主意，忽然聽見我那「天上兄長」的聲音，嘹亮的唱著：「夫妻本是同林鳥，大限到時各分飛，沒什麼想不開的，快去睡吧！」我伸頭望著窗外，夜空中繁星閃爍著，不知聲音從何而來，但是我忽然覺得很快樂！天外有兄長關心著我哪！我很快的撕了訣別信，躲進被子裡安心的睡覺了！'
  - '[PAGE 58]


    # 我的仙丹妙醬


    有一年夏天，得了一種可能是腸炎的毛病，每天下痢數次，所以身體立刻瘦弱下來，但是我記得黃老師曾告訴我：「每天儘管念佛，別太注意身體，病也是想出來的，一切唯心造，只要專心修行，該死的病，醫不好，不該死的病，想死也死不掉！」所以我每天在心中念著佛號，若無其事的拖了二十來天，瘦得走路都有點飄飄然，重心不穩了！


    一天中午，我躺在床上休息，似乎半睡半醒中，看到一位像武俠片中身著勁裝的男子，手裡拿著柺杖走近我的床頭，對我說：「我是李鐵拐，妳的病得吃那個才會好！」說著他指著我的窗戶，我順著他的手勢望去，窗戶的玻璃上有許多草莓醬緩緩的流下來。


    醒來時，一直覺得自己的夢很有想像力呢！李鐵拐不就是八仙過海那個故事中的仙人嗎？何況，古代的人怎麼會知道這種西方食物呢？再說，我的腸胃極差，多吃點甜食就會胃酸過多，所以我一點也不信這個夢。


    隔天我和黃師母談天，談到這個夢，沒想到她叫我吃吃看，她說反正那也很好吃，又不是什麼藥，說不定吃了'
  - '[PAGE 59]


    真的會好呢！我因為草莓醬有防腐劑及色素，所以一直沒去買。


    隔了幾天，嚴重到一天下痢十來次了，當我走到超級市場都快走不動了！這時迎面而來一個甜美的女子，笑容滿面的說：「純天然保證不含防腐劑及色素，來自加拿大的草莓醬。」我想起了我的夢，順手買了一瓶，心裡想，再不吃恐怕就得等死了！


    就這樣，連我自己都難以相信，吃了兩小湯匙之後，肚子一陣清涼，立刻止瀉，吃不到四分之一瓶，腸胃的毛病就不藥而癒了。甚至從此之後，只要腸胃的問題又發生時，草莓醬隨時對我都有效。但別人試我的方法不見得有效，或許這是體質不同的緣故吧！'
  - '[PAGE 60]


    # 神仙的地址


    又隔了幾年，有一次，我與家人到獅頭山去玩，在一個王母娘娘廟裡，我們碰到一位修道人，羅師兄，他有通靈的能力，可惜我當時不太信任他。因為我父親獨自先進廟裡，聽到羅師兄對另一位修道人說：「妳看那位進門的女人背後有佛菩薩保護著！她是站蓮花的人。」父親轉頭看那個女人，竟是我的母親！父親很好奇的問羅師兄：「站蓮花的人，是什麼意思？」羅師兄回答：「是佛家的修行者！」他又自稱自己是道家弟子。父親問：「我屬哪一家？」羅師兄笑著說：「你啊！是儒家的讀書人啦！你的修行等級，如果與你妻子比，她是老闆，你是她的門房！幫她看大門那種！」


    父親立刻告訴母親，母親就急忙想拜羅師兄為師，他說：「不行啦！妳有妳自己的師父，妳師父和我師父不是同一個人，妳的等級很高的！妳就快要見到妳師父了！」這時我也好奇了，就問他如何修行？他說：「這兒妳修得最差了，修行人哪有那麼驕傲的？修行人要像成熟的稻子一樣，頭垂得低低的！」我有點不服氣，我想：每次都是我解釋經典給母親聽的，佛經我可看了不少，何況還天天念佛。我都修十年了，母親才剛剛開始，怎麼就遠遠超越我了呢？我問：「我到底是誰來投胎的？」他說：「如果'
  - '[PAGE 61]


    你知道自己是誰，你這輩子就更不想修行了，也不用去證得自己是誰？我是不會告訴你的，免得壞了你的修行路！無論是什麼都要靠自己去證得！」


    我告訴他關於李鐵拐這個夢，問他究竟是真是假？他似乎很高興，好像我提到他的一個好朋友似的！他一本正經的說：「喔！李鐵拐嗎？他住板橋呢！你要不要抄寫他的地址？」說著拿出紙和筆，我張大眼睛驚訝的望著他，他又繼續說：「但是不太好找！因為他常常四處雲遊！」我心想：天哪！我會作夢，你也挺會編故事耶！


    他似乎察覺我的懷疑，就正色道：「事情是這樣的，前些日子，李鐵拐路過這兒曾來看我，像八仙這些神仙，是真實存在的，他們常駐人間，到處渡人，非常忙碌。外表看來和普通人長得一個樣子，你自己也看到過他嘛！如果你努力精進修行，這些過往神仙都會幫忙指點你的！」慈悲的羅師兄又特別指示我，一項未來即將發生在我身上的事，該如何處理比較圓滿，他先把答案告訴了我！


    回家之後不到幾天，果真發生了他意料中的事，但是我當時處理得很困惑，一直不知如何是好，所以在前往加拿大之前又趕去找他，沒想到一趟路興沖沖的到了山上，羅師兄卻在禁語中，只對我點頭致意，我竟失去了請教他問題的機會。'
  - '[PAGE 62]


    # 法師的警告


    以前有位同修道友，名叫心潔，不論走到哪裡，手裡總是一串念珠，遇到生人熟客都一律虔誠禮拜，並且口念一句阿彌陀佛，她舉止永遠都是溫文賢淑，讓我們這些初學佛法的人，感到自嘆不如，覺得她的修持必定最好！


    有一天，同修們一起去拜望靜心法師。回來之後，有位同修私下告訴我，不知道為什麼，靜心法師他老人家，竟然重重的打了心潔的肩膀兩下，害得心潔回來之後得貼膏藥。此外還罵心潔說：「妳這條蛇精，還不改妳的毒性，又想來危害世間，竟敢到我寺廟來，還敢帶妳那三條小蛇來，我就是不讓他們進來。妳再不改，報應就不遠了！」這時大家才注意到心潔的三個孩子一直在屋外探頭探腦，卻一步也不敢踏進來，而別的同修的孩子都在屋裡，真是奇怪呢！


    同修們仍然和心潔很要好，總覺得靜心法師他老人家誤會了她。大約一年之後，心潔想在四樓頂加蓋一間佛堂，向許多同修借了數百萬元，卻不肯還錢，還理直氣壯的說：「錢用來蓋佛堂，功德無量。」其中有一個老太太，就只有八十萬老本，借給她之後，生活就出了問題，卻也索求無門，真後悔當時沒有相信法師的話。'
  - '[PAGE 63]


    # 慎選修行路


    我有個鄰居名叫愛莉，不知怎麼會迷上一家神廟，剛開始也看不出來，這廟的主持人心術不正，有一次說是帶他們去台南做法，愛莉被安置在一個荒山野外的墳場，每天夜半三更，都得去墳墓旁做法，想利用孤魂野鬼的靈魂，幫忙賺錢，氣氛陰森森、恐怖兮兮的，愛莉害怕得想回家。主持人竟叫人把她打得遍體鱗傷，甚至理光她的頭髮，強迫她出家，還逼她在陰神之前發毒誓。


    有一次愛莉乘人不備，偷跑回家。這些大膽神棍居然跑到她家門外埋伏，嚇得她連續幾個月躲在家中不敢踏出家門一步。幸好出外採購食物有她先生全力幫忙，終於渡過難關。但是愛莉受了這場無妄之災，身心受傷，變得畏縮、憂鬱，精神大不如前，再也不敢相信別人。為了修行走錯路，真是可憐！既危險又浪費了許多時間，選擇師父時，要十分小心。


    另一件事是我在黃老師家學禪時，有一位新來的師姐憂心忡忡的問黃老師：「以前我在一家神壇當弟子之時，拜師那天就發了毒誓，如果將來背叛了教主，就要被毒蛇猛獸咬死。現在我離開了他們，可是我已經中了他們下的蠱，每天夜裡都被一大堆的蛇糾纏著，還有獅子、老虎撲'
  - '[PAGE 64]


    咬我，我簡直就要瘋了，我該怎麼辦呢？」黃老師教她求佛、菩薩保護，並以精神力量，克服內心的恐懼。黃老師強調：修行人要思維清楚，自己有判斷能力，千萬別走入邪門外道，真正的有道修行人，行為端正，身口意清靜，絕不會要求弟子，作一些不合法、或不合情理的事。'
  - '[PAGE 65]


    # 六道輪迴


    許多人以為餓鬼道是死後靈魂才可能去的地方。我的夢訊息卻讓我明白，活人也可能處於那種境界。


    有一次，我夢見母親的朋友王阿姨變成餓鬼的形狀，有大大的肚子，細細長長的脖子。她跳到母親的跟前，伸長兩手去掐住母親的脖子，母親為了脫困就叫道：「我沒辦法幫你，去找我二女兒想辦法吧！」只見餓鬼形象的王阿姨立刻轉往我的方向來，我想，台灣離加拿大這麼遠，總要一會兒才會到吧！沒想到，不到一秒鐘，她飛到我面前，手伸好長準備掐我的脖子。我趕緊抓住她的手，因為不忍見到她的餓鬼形象，所以閉上雙眼拼命念佛號，念了好久，張開眼看她仍是餓鬼形象，忽然想起應將念佛功德迴向給她，才迴向完，她已回復人身了！我也嚇醒了。


    第二天，打電話問母親：「王阿姨好嗎？怎麼我夢到她變成餓鬼呢？她不是修行非常精進的嗎？」母親聽了，很驚訝的說：「我聽說她破產了，很可能沒有飯吃，我去看看她！」探望之後，才知道王阿姨已好幾天沒飯吃了，餓得渾身無力，原來王阿姨的兒子賭輸了家產，把家裡所有的錢全賠光，連一點吃飯的錢也沒有了！母親趕緊送她一筆錢讓她渡過這難關。'
- md: '這事讓我非常警惕，修行人經歷大考驗時，如果沒有定力，靈魂也會墮入黑暗界，所以修持禪定是十分重要的！


    我觀察到：


    - 當人們的思想清靜喜悅時，靈魂在天道等級。

    - 當人們仁慈和善、寬以待人時，靈魂在人道等級。

    - 當人們憤怒、嫉妒、驕慢、爭鬥時，處於阿修羅道。

    - 當人們處於飢餓痛苦時，靈魂處於餓鬼道。

    - 當人們無明，不守五戒，犯貪、瞋、痴時，靈魂處於畜生道或地獄道。

    - 當人們起搶奪、偷竊、傷害等凶惡之心時，或悲傷、悔恨、痛苦時，靈魂處於地獄道。


    一天之中，人的靈魂可能跑遍六道，如果不修禪定，很容易因為外界環境的好壞、碰到順境或逆境，情緒的變化，而使靈魂等級起伏不定。因此，古人說，要修到八風吹不動，就是任何境界來臨時，都有能力保持清靜之心，不為境界所轉，這才叫做真正的禪定！


    一輩子算一算，頂多也才兩、三萬天，每過一天就少了一天，來去匆匆，有什麼值得你爭我奪？值得和人結惡緣？每個人都很苦了，應該盡力幫助別人，互相照顧，讓大家這趟人間之旅過得愉快些！減少自己的貪嗔癡，掃除無明，看清楚這個像夢幻泡影的世間，真正做到像「心經」裡的一句話：「遠離顛倒夢想」把所有的妄念雜念，全都放下，達到身口意都乾淨，才能達到「定」的境界！


    有一天睡到半夜時，我覺得身旁忽然多了一個人，原來是女兒，她說：「好可怕！好可怕！剛剛夢見三個好可怕的鬼，第三個鬼還撲到我身上來，幸好夢中媽媽即時出現，把他們都變成人了。」我睡得迷迷糊糊的，只保持聽覺狀態。


    她繼續說：「第三個鬼最可怕，他說他考財稅人員執照，考了許多年卻一直考不取，他非常痛苦鬱悶，他的靈體扭曲變形，陰暗可怕，一直要撲到我身上，幸好媽媽來了，送了许多愛的能量給他們，他們的靈體變得越來越明亮，後來居然變成正常人形了。」


    次日早晨我問女兒：「妳昨晚夢見的鬼，是已經過世的還是活著的人？」她說：「他們是還活著的人，只是想不開，煩惱太多時，靈體扭曲變形，看起來就像是鬼。」


    我乘勢勸她：「任何時候都要保持快樂！」


    她：「怎可能都快樂呢？世間事不如意十有八九。」


    我：「快樂與痛苦都是自己的選擇，妳想快樂的面對每一刻，隨時保持正面的覺知，還是成日愁眉苦臉，都是妳自己的決定。」


    她：「好難啊！我做不到。」


    我：「做不到就會吸引那些鬼囉！因為振動力接近，物以類聚。」


    她：「妳說得簡單，我就是做不到，我就是會擔心、煩惱、生氣、……」


    我：「學會感恩吧！感恩所有的人事物，妳就很容易快樂的！當妳快樂時，靈體就會像美麗的天使一樣，散發出光輝。」


    ## 疾風知勁草


    我曾在淨空法師那兒，聽了幾次開示，在農禪寺學會靜坐，後來又在承天禪寺拜廣欽老和尚為師。這幾位法師，都是很有修持的出家大師，在我的修行路上，對我都有很大的助益。我也努力的閱讀佛教經典，每天過得無憂無慮，自在快樂，自以為這就是人間淨土了。然而，遇到病苦的考驗時，才赫然發現，自己的修行定力不夠。


    有一次，發燒半個多月，去檢查之後，醫生說：「很可能是癌症。」信心立即崩潰，想到當時才一歲的女兒就要失去母親，心都碎了，近乎三天以淚洗面。這時，我才發現自己修行的定力是如此脆弱，碰到生死關頭，也不過如此。幸而事後證明並非什麼絕症，但也證明了自己還是貪生怕死的凡夫。病中我仍努力念佛，病後，一直很迷惑，究竟如何才能真正了脫生死，不再受無常之苦？


    # 往生的接引


    許多人非常害怕死神，我也曾與死神照過面。四十二歲那年的一個午後，我正埋首畫畫，眼角餘光中，瞥見兩位盛裝的印度美女，我認出她們是來接引我回靈界的使者，頓時心頭一驚！「為什麼找我？」我強作鎮定的問。


    她們倆人溫柔靦腆的微笑著：「你忙著畫那些俗世的畫，不過就是賺那一點點小錢罷了！你可知道我們那邊（靈界）大家都好忙，希望妳趕快回來幫忙。」她們指著牆角方向有一道通往靈界的門說：「請妳看一下吧！我們真的很需要妳回來幫忙。」


    我環顧自己住的小房子，真是寒磣得很，其實沒有什麼可以留戀的。我知道，我看了之後，一定會想回去，可是我覺得還有一些俗世責任未了，所以強忍著好奇的心，拒絕去看那道通往天家的門。


    我說：「我這邊還有事沒做完，我才四十二歲，有做錯什麼？為什麼是這麼短命的果報？」她們說：「妳以前拿掉腹中那塊肉時，沒有覺得很殘忍嗎？」


    我摸著下腹，心裡很困惑，我問：「究竟是哪塊肉啊？」一時之間也想不起來。接著，我嚴肅的說：「別再來吵我！我還有許多事要做，我要活到八十歲！」她們苦笑著離開了。


    忽然間我想起，那塊肉是我在年輕時曾經拿掉的胎兒，想到這裡，我嚇得冒出冷汗，全身顫抖著，我剛剛差點就要離開人世了，死神居然放過我，然而靈界怎麼會有這麼美麗這麼溫柔的死神？


    我有一位長輩在五十九歲那年，一夜夢醒，對續紘說：「我剛才夢見前妻要來帶我走，大概時間到了，我得回去了。」隔了幾天，他騎車出門被一個年輕人撞上，就與世長辭了。


    有一個朋友的祖父，中年喪妻，晚年生病時，常說他看見年輕時候的妻子一直在床邊陪伴他。有一天妻子對他說：「該回去靈界了。」他說：「為什麼要回去啊？」妻子說：「因為人只是靈魂與身體的組合體，大限到時，就回去靈界的家，我是你永生的妻子。」朋友的祖父聽完，安心的跟著妻子往生了。


    # 親人的超生


    我小時候會看到靈魂，大約十幾歲時，閉上眼睛，總是有一位年輕漂亮的少女，嘴角流著血，哀傷的望著我。當時我以為鬧鬼了，好害怕啊！


    直到我開始接觸我的第一位佛門老師，他告訴我：「我們看到的受苦靈魂，通常是與我們有緣的靈魂～比如，過去世的親人朋友想來請我們幫他們，我們可以為他們念地藏經超渡他們。」


    後來，我查到，這位嘴角流著血的少女靈魂，是我過去世的女兒，因為騎馬摔死，所以嘴部受傷流血，她一直來向我求助，因為我不知情，所以很害怕。直到我念佛三年後，才開始有能力得到一些靈界訊息，了解她的身世，可以幫助她脫離苦難。


    我今生的女兒小時候一直希望有個兄弟姊妹可陪伴她玩，我也希望再生一個孩子。1990年的一個冬天，我好不容易懷孕了，很高興的等待第二個孩子的誕生。沒想到，一場大風雪，奪走我的美夢。只是為了去剷大門前那厚重的雪，不知是凍著或累壞了，竟然流產了！那天夜裡，我在淚溼枕巾中，悲傷的進入夢鄉。


    我夢見，觀世音菩薩來到我床前，她看起來莊嚴高雅。她說：「我來幫妳醫病了！」我說：「我沒病！」


    她慈祥的望著我說：「可是妳身體裡住了一個男靈魂，妳只要張開嘴，我就可以帶他走！」


    我真的張大了嘴，就在這時我覺得胸腹之間一陣絞痛，接著開始嘔吐，吐出一大堆鮮血，這時我的背脊由下而上的昇起一股暖流，我從小就常常冰冷的四肢也開始暖和起來。我心想，床邊這塊新地毯完蛋了！接著我開始擔心，這個被叫出來的靈魂又回來。


    這時菩薩似乎看穿我的心事，她說：「我已經送他去人間轉世了，妳剛剛流產的這個前世女兒，會在明年投胎在你好友的家庭，妳很快就會在人間見到她。」


    「妳之前一直不容易再懷孕，是因為那個男魂的關係，他是妳過去世的情人，雖然他只是想保護妳，但是，陰陽不相容，導致妳身體太弱，所以我只好來帶他走，明年妳會得到妳想要的孩子。」說完，菩薩飄然而去。


    醒來時，我急忙查看地毯，卻了無痕跡。明年我真能如夢中所示得子嗎？當時我認為這只是一個夢罷了！次年，我們搬回台灣，這時好友鈴茵快生產了！因為她要剖腹生產，我答應去醫院陪她。


    一天夜裡我夢見我走進一座陵墓中，裡面有幾層台階，潮濕的空氣中瀰漫著濃濁的霉味，泥土味，右邊放置著一座棺槨，我知道躺在裡面的少女，是我四百多年前的女兒。她原來的身分是公主，卻不幸在十八歲時，因為騎馬摔死，他的父親捨不得掌上明珠驟然逝去，所以特地將她的遺體浸泡在防腐劑中保存。從此她的靈魂守著屍體，執著那具早已失去生命力的身體，一直留在陰暗的陵墓中，始終不願出來。我來到她的棺槨前，試圖說服她出來投胎，她一直不肯，她說：「父王說我很美麗，我喜歡父王幫我建造的這個家。」


    我告訴她：「這裡太暗了！外面的世界可以看到陽光，藍天白雲及許多美景，還可以交到許多朋友，學習許多有趣的事物。」她仍在猶豫，我說：「妳就相信媽媽一次！跟著我走吧！……」費盡了唇舌，終於，她願意出來了，我趕緊轉頭往陽間走，不敢回頭望她一眼。因為經過了四百多年，不知如今她的面貌會是如何！所以我只是雙手合掌，拼命的念著佛號，戰戰兢兢的帶著她走回陽間。


    半夜兩點，電話鈴聲吵醒了我，中斷了這段冗長的夢。我得知鈴茵忽然血壓升高，緊急送醫院剖腹生產，在母女都非常危險的狀態中，總算平安的搶救成功。由於觀世音菩薩之前已經預告，我知道那個新生兒正是我剛剛說動的前世女兒。當我趕到醫院時，護士正好抱著她走過我身邊，我認真的查看她的小臉，她也盯著我看。雖然和一般嬰兒差不多，長得也端正，只是很奇怪，她的瞳孔外圍（虹膜區）是淺灰色的，我聯想到防腐劑，或許是泡在其中太多年了吧！


    當時鈴茵剛手術完尚未醒來，我是第一個看到嬰兒的人。後來聽說嬰兒日夜啼哭了三個月，吵得全家人睡不好，所以鈴茵就帶她去問一個能查到過去未來的修行人，那個人說這孩子生下來第一眼看到她過去世的母親，卻不是她這世的生母，因為太悲傷所以哭不停。


    鈴茵以為幫她開刀的那個女醫生是她前世的母親，而我不敢說實話，因為怕她嚇壞了，試想一個剛從棺材中跑出來的女兒，這聽起來多麼驚悚，所以我只好隻字不提。


    但是，我找機會去鈴茵家，抱著正在哭泣中的嬰兒說：「投生在我的好友家有什麼不好？鈴茵的脾氣好，有愛心，學識高、擅長栽培孩子，而且非常富有。投生為她的孩子，更有機會自在的展現自己的天賦。」


    我關愛的對她說：「不要再吵現在的爸媽啦！高高興興的成長吧！我會常常來探望妳的。而且我會一直從旁關心妳的靈性成長，妳可以放心！」她彷彿聽得懂我的話，完全停止哭泣，並且用那淺灰色眼珠子認真的望著我。她的眼珠在一年後逐漸轉黑。現在她已經大學畢業了！她聰明伶俐品學兼優！和她上輩子一樣，琴、棋、書、畫，樣樣精通，是個快樂積極的好孩子。


    而我自己就在那年底懷孕，次年，安全的生下了兒子，夢中觀世音菩薩的話逐一應驗了！這真是不容易，因為當時我女兒已經十一歲，她終於盼到一個弟弟了！


    我剛懷孕時也有一個奇蹟，因為超音波照出嬰兒頭部有黑點，醫生懷疑胎兒腦部有問題，我先生很擔心，就半夜起床，念地藏經迴向給胎兒。


    當時正在睡夢中的我，忽然，看到先生殺了一簍鴿子，那些血淋淋的翅膀與鴿腿，竟變成人類的手和腿，於是我從夢中嚇醒，從此發願吃素，後來再照超音波時胎兒就正常了。


    我先生說他家以前養過鴿子，他確實殺過鴿子。從發生此事之後，他也發願，從此不再殺生了！


    # 夢境的啟示


    初到加拿大時，我們買了一棟一、二樓的舊房子，樓上出租，樓下自己住。有一天，在睡午覺的時候，夢見一場奇異的景像，我看到頭頂上有一個浴缸，裡面坐了一位長髮女子，看不清她的五官，另一邊站著一個大巨人，站在半空中，朝著女子用力吹氣，因為力量很大，吹了又吹之後，就產生了巨大的風力，終於把女子給吹走了，醒來印象深刻。


    當天夜裡一點左右，二樓浴缸突然堵塞，大量的水流到一樓來。我先生急忙把一樓的天花板打開，鋸斷排水管，從裡面抓出了一大堆長頭髮，之後他把銅管焊接回去，但是銅管在屋頂，他仰著頭很困難的焊接。因為焊接時會掉下來許多火紅的銲錫，燙傷了他的臉，所以他努力的把銲錫吹走，吹了又吹，吹個不停。這時我突然覺得看過這一幕，才聯想起下午的夢，他站在樓梯上的樣子，吹的動作與姿勢，幾乎一模一樣！整件事與夢是同一回事！


    因為這個抽象的夢，我明白了，在地球上發生的事，其實早已在另一度空間發生過。從此，無論發生什麼困擾時，我比較能心平氣和，因為都是事出有因，不必抱怨或不耐煩。


    # 父親的印證


    當我正享受修行的喜悅時，突然得知父親驗出癌末，而且群醫已經束手無策。接到消息之日，彷彿晴天霹靂，我痛哭失聲，想到我那仁慈善良的父亲竟會得到這可怕的疾病，而且似乎很快就要離我而去，我的心幾乎要碎了！


    然而，就在當天夜裡，一位來自台灣的師兄，找個藉口住進我的家（事後回想，他其實是專為渡我而來）。他一見面就告訴我：「人總是要死的！你別以為吃素的人就不會死！」


    奇妙的是，當時我心裡正在想，為什麼我父親吃素多年了，還會得癌症？所以我就順口問：「為什麼會死？」他說：「吃素的人如果都不會死，不都變成老妖怪了？」我也覺得好笑，但是，我已發現他是證得他心通的聖者。


    當晚我獨自去請教他，有關父親的病，他說：「這次你父親是死定了！我都看見他躺在棺材的模樣，及告別式的許多鮮花，因為他生平布施很多，所以值得這麼多的鮮花，未來都已成定局，沒法可改了！」


    我非常傷心的流著淚，並且不服氣的說：「我父親一生都在作善事，他也努力修行，他不該得這種病，至少他該有個善終！」


    他：「你怎知他沒有善終？」


    我：「這個病聽說會很痛的！」


    他：「我保證他從頭到尾都不會因為這個病而痛！不信妳回去陪他，反正只剩短短幾個月，妳去陪他之後就不會那麼悲傷，妳會比較情願讓他走！」


    我仍是不停的落淚，他無奈的說：「不要特別重視這種阿修羅感情，修行人太重情是一種執著，你不要太悲傷，否則身體哭壞了靜坐也坐不好，修行也不會進步了，妳知道嗎？身體不好，打坐時是不會進入高境界的！」


    隔天我先生吵著想和我一起回台灣，他想回去找工作，不想留在加拿大。我覺得好像上天，一口氣想拿走我生命中，最重要的兩個男人，絕望的我又去找這位師兄，他輕描淡寫的說：「讓他去吧！找不著什麼工作的，沒那個緣，過幾年他厭煩了，就會乖乖的回來，再也不提台灣的事！何況他不在，妳才好修行！」


    接著，他又說：「他的腳很痛吧？我看到一大群鵝圍著咬他的腳，他吃了這麼多的鵝肉，鵝很凶的，妳睡他旁邊，也不得安寧，怎麼修行呢？要是我啊！就讓他走，才修得快！」


    我說：「他確實有痛風，常常一夜痛到天亮，他最愛吃鵝肉了，但是我們有兩個孩子啊！叫他走，孩子就沒有爸爸了！」


    他笑著說：「妳啊！很早就修到超三界了，竟為了渡這個人下來七次了，天堂、地獄都為他去過了！我觀察你們之間的因果，妳也不曾欠他什麼，卻為他吃那麼多苦！這一世萬一又渡不成，妳還想再陪他來這個苦海嗎？」


    這時我越來越相信他了，於是誠心求他渡化我先生，他說：「既然妳都開口了，我也就試試看，我會花幾天來做這件事！」


    隔了幾天，我趕回台灣陪伴日益消瘦的父親，心中的疼痛自是不用細說了。有一天，接到這位證宿命通的師兄打來的電話，原來他已經回到台灣，他說：「妳拜託我做的事，我已達成了，我和妳先生談過幾次，他還挺風趣的！」我說：「這幾天我也看開不少，如果我先生得離開，我才能修成，我就讓他走吧！」他笑說：「妳先生其實滿可愛的，可以留他下來，他也會修行的！」我心想，我先生怎麼肯修行呢？（我先生在隔不到三個月之後，開始了吃素和在家修行的生活。）


    但是，當時我最在意的是父親的生死問題，所以又提起父親的病：「師兄，到底我父親有沒有方法可救？」


    師兄說：「沒有！但是我幫他去玉皇大帝那兒查過，他原本還要十幾世才能修成，現在大幅縮短為幾世就能修成正果！你們應該替他慶幸才對，這是喜事！」我問：「為什麼可以縮短時間？」師兄說：「因為妳父親這世很慈悲，做了許多善事，所以進步如此神速，但是下一世能否成就，要看他自己的努力，我們修行的快慢，完全看我們是否精進。」


    這時我母親也來請教師兄，師兄說了一些安慰的話。後來他交代我要小心，因為我父親會逐漸知道我們在想什麼，也會看到一些異象，因為他的靈魂逐漸接近靈界了，很快就會進入「中陰身狀態」，會開始有神通能力。所以在他面前不能想不快樂的事，免得他知道了會難過。


    等我們掛掉電話以後，父親突然問：「剛才打電話的人是誰？是不是高人？」我很好奇爸爸為何以高人稱之？原來剛才父親因為好奇，在隔壁房間拿起聽筒，沒想到父親看到聽筒發出一股白色強光。


    幾天之後父親更奇怪了，他指著我母親、我、及妹妹的頭說：「妳們頭上都有一圈光。」我驚訝的問：「什麼樣子？」父親指家中觀世音菩薩的畫相說：「就像那樣，圓形正好包住妳們的頭，妳媽的光大約六尺，妳們的兩尺寬！」我以為父親病糊塗了，就經常考他。每次有人來訪，或其他親人回來，過後，我就問父親：「剛才某某人有沒有光？」父親總是搖頭說：「他們身上都是吃肉的臭味，黑黑暗暗的哪來的光？」


    只有兩人例外，一個是以前練氣功的同修，她吃全素每日靜坐一小時，父親看到她有半尺光。另一個是我親戚，她吃素，拜佛，偶而念經，她也有不到半尺光。有一位氣功同修本來吃素的，父親說：「她哪有吃素？渾身都暗得可怕！」我後來問她：「妳現在還吃素嗎？」她說：「現在沒有啦！全家都吃葷的，我總要吃剩菜，不然倒掉了可惜！」我知道她在找藉口，但父親真的沒看錯！


    從父親說打坐者有光之後，我就努力打坐了。有一夜，我打坐四個小時，次日，父親說：「奇怪妳今天的光變大了！變成四尺寬！」有一天我打坐之後，父親又驚訝的說：「妳進步真快，今天變成六尺寬了！已經趕上妳媽媽了！」其實以前媽媽是很認真的，打坐時間較長。而我一向缺乏紀律，沒認真打坐。自從發現打坐時間長短影響光度時，我更努力打坐了。


    有一天，我與妹妹去山上共修後回到家，正好父親坐在客廳，我進門時，父親瞇著眼望著我說：「妳今天太亮了！好刺眼，我沒辦法看清楚妳的臉！」我笑著問說：「今天有幾尺？」父親搖頭說：「太大的光了，不能用尺或丈來量，應該到幾公里以外去了吧！我沒辦法看到尾端。」我感到很喜悅，頭一次覺得修行如此簡單！


    但是，當我感到無限歡喜時，卻看到父親流下眼淚，這是勇敢面對病苦的父親頭一次落淚，他說：「妳們都修成了，而我，這輩子是修不成了！」我安慰父親：「既然你知道靜坐這麼好，為什麼都不坐了呢？」父親黯然神傷的說：「太遲了！身體病了，沒有元氣修練了！」


    我說：「爸！這光的事情到底是真是假？還是你在安慰我們的？」父親忽然間很神祕的說：「這當然是真的！我騙妳們做什麼？我是偷偷告訴妳們的，這本不能說的，我是為了妳們修行的信心才洩漏天機的，以後不能再說了！他們說不能說！」我沒問「他們」是誰，我猜是指導靈吧！從此，父親絕口不提「光」的事情！


    父親真的一直沒有痛過，一粒止痛藥都沒吃，夜間也睡得很好。有一日還半開玩笑似的自我安慰：「上天派了三個發光的仙女在我身邊，我就是不信我會有事！」父親往生時，我不在台灣。母親告訴我，父親在往生的前一天說：「從我生病開始至今，師父天天都在我身邊！師父還告訴我，我的病好了，但身體已鈣化，不能吸收營養了，以後不用煮東西給我吃了，我現在好舒服！好輕快！」


    第二天清早，父親問看護洪女士說：「昨晚一夜美妙的音樂妳是否聽到？」洪女士問：「是佛讚嗎？」父親說：「不是！是從來沒聽過的，很好聽的音樂！」父親要求弟弟扶他起來坐著，弟弟推來輪椅，正想扶起已經弱到'
  mdcn: '這事讓我非常警惕，修行人經歷大考驗時，如果沒有定力，靈魂也會墮入黑暗界，所以修持禪定是十分重要的！


    我觀察到：


    - 當人們的思想清靜喜悅時，靈魂在天道等級。

    - 當人們仁慈和善、寬以待人時，靈魂在人道等級。

    - 當人們憤怒、嫉妒、驕慢、爭鬥時，處於阿修羅道。

    - 當人們處於飢餓痛苦時，靈魂處於餓鬼道。

    - 當人們無明，不守五戒，犯貪、瞋、痴時，靈魂處於畜生道或地獄道。

    - 當人們起搶奪、偷竊、傷害等凶惡之心時，或悲傷、悔恨、痛苦時，靈魂處於地獄道。


    一天之中，人的靈魂可能跑遍六道，如果不修禪定，很容易因為外界環境的好壞、碰到順境或逆境，情緒的變化，而使靈魂等級起伏不定。因此，古人說，要修到八風吹不動，就是任何境界來臨時，都有能力保持清靜之心，不為境界所轉，這才叫做真正的禪定！


    一輩子算一算，頂多也才兩、三萬天，每過一天就少了一天，來去匆匆，有什麼值得你爭我奪？值得和人結惡緣？每個人都很苦了，應該盡力幫助別人，互相照顧，讓大家這趟人間之旅過得愉快些！減少自己的貪嗔癡，掃除無明，看清楚這個像夢幻泡影的世間，真正做到像「心經」裡的一句話：「遠離顛倒夢想」把所有的妄念雜念，全都放下，達到身口意都乾淨，才能達到「定」的境界！


    有一天睡到半夜時，我覺得身旁忽然多了一個人，原來是女兒，她說：「好可怕！好可怕！剛剛夢見三個好可怕的鬼，第三個鬼還撲到我身上來，幸好夢中媽媽即時出現，把他們都變成人了。」我睡得迷迷糊糊的，只保持聽覺狀態。


    她繼續說：「第三個鬼最可怕，他說他考財稅人員執照，考了許多年卻一直考不取，他非常痛苦鬱悶，他的靈體扭曲變形，陰暗可怕，一直要撲到我身上，幸好媽媽來了，送了许多愛的能量給他們，他們的靈體變得越來越明亮，後來居然變成正常人形了。」


    次日早晨我問女兒：「妳昨晚夢見的鬼，是已經過世的還是活著的人？」她說：「他們是還活著的人，只是想不開，煩惱太多時，靈體扭曲變形，看起來就像是鬼。」


    我乘勢勸她：「任何時候都要保持快樂！」


    她：「怎可能都快樂呢？世間事不如意十有八九。」


    我：「快樂與痛苦都是自己的選擇，妳想快樂的面對每一刻，隨時保持正面的覺知，還是成日愁眉苦臉，都是妳自己的決定。」


    她：「好難啊！我做不到。」


    我：「做不到就會吸引那些鬼囉！因為振動力接近，物以類聚。」


    她：「妳說得簡單，我就是做不到，我就是會擔心、煩惱、生氣、……」


    我：「學會感恩吧！感恩所有的人事物，妳就很容易快樂的！當妳快樂時，靈體就會像美麗的天使一樣，散發出光輝。」


    ## 疾風知勁草


    我曾在淨空法師那兒，聽了幾次開示，在農禪寺學會靜坐，後來又在承天禪寺拜廣欽老和尚為師。這幾位法師，都是很有修持的出家大師，在我的修行路上，對我都有很大的助益。我也努力的閱讀佛教經典，每天過得無憂無慮，自在快樂，自以為這就是人間淨土了。然而，遇到病苦的考驗時，才赫然發現，自己的修行定力不夠。


    有一次，發燒半個多月，去檢查之後，醫生說：「很可能是癌症。」信心立即崩潰，想到當時才一歲的女兒就要失去母親，心都碎了，近乎三天以淚洗面。這時，我才發現自己修行的定力是如此脆弱，碰到生死關頭，也不過如此。幸而事後證明並非什麼絕症，但也證明了自己還是貪生怕死的凡夫。病中我仍努力念佛，病後，一直很迷惑，究竟如何才能真正了脫生死，不再受無常之苦？


    # 往生的接引


    許多人非常害怕死神，我也曾與死神照過面。四十二歲那年的一個午後，我正埋首畫畫，眼角餘光中，瞥見兩位盛裝的印度美女，我認出她們是來接引我回靈界的使者，頓時心頭一驚！「為什麼找我？」我強作鎮定的問。


    她們倆人溫柔靦腆的微笑著：「你忙著畫那些俗世的畫，不過就是賺那一點點小錢罷了！你可知道我們那邊（靈界）大家都好忙，希望妳趕快回來幫忙。」她們指著牆角方向有一道通往靈界的門說：「請妳看一下吧！我們真的很需要妳回來幫忙。」


    我環顧自己住的小房子，真是寒磣得很，其實沒有什麼可以留戀的。我知道，我看了之後，一定會想回去，可是我覺得還有一些俗世責任未了，所以強忍著好奇的心，拒絕去看那道通往天家的門。


    我說：「我這邊還有事沒做完，我才四十二歲，有做錯什麼？為什麼是這麼短命的果報？」她們說：「妳以前拿掉腹中那塊肉時，沒有覺得很殘忍嗎？」


    我摸著下腹，心裡很困惑，我問：「究竟是哪塊肉啊？」一時之間也想不起來。接著，我嚴肅的說：「別再來吵我！我還有許多事要做，我要活到八十歲！」她們苦笑著離開了。


    忽然間我想起，那塊肉是我在年輕時曾經拿掉的胎兒，想到這裡，我嚇得冒出冷汗，全身顫抖著，我剛剛差點就要離開人世了，死神居然放過我，然而靈界怎麼會有這麼美麗這麼溫柔的死神？


    我有一位長輩在五十九歲那年，一夜夢醒，對續紘說：「我剛才夢見前妻要來帶我走，大概時間到了，我得回去了。」隔了幾天，他騎車出門被一個年輕人撞上，就與世長辭了。


    有一個朋友的祖父，中年喪妻，晚年生病時，常說他看見年輕時候的妻子一直在床邊陪伴他。有一天妻子對他說：「該回去靈界了。」他說：「為什麼要回去啊？」妻子說：「因為人只是靈魂與身體的組合體，大限到時，就回去靈界的家，我是你永生的妻子。」朋友的祖父聽完，安心的跟著妻子往生了。


    # 親人的超生


    我小時候會看到靈魂，大約十幾歲時，閉上眼睛，總是有一位年輕漂亮的少女，嘴角流著血，哀傷的望著我。當時我以為鬧鬼了，好害怕啊！


    直到我開始接觸我的第一位佛門老師，他告訴我：「我們看到的受苦靈魂，通常是與我們有緣的靈魂～比如，過去世的親人朋友想來請我們幫他們，我們可以為他們念地藏經超渡他們。」


    後來，我查到，這位嘴角流著血的少女靈魂，是我過去世的女兒，因為騎馬摔死，所以嘴部受傷流血，她一直來向我求助，因為我不知情，所以很害怕。直到我念佛三年後，才開始有能力得到一些靈界訊息，了解她的身世，可以幫助她脫離苦難。


    我今生的女兒小時候一直希望有個兄弟姊妹可陪伴她玩，我也希望再生一個孩子。1990年的一個冬天，我好不容易懷孕了，很高興的等待第二個孩子的誕生。沒想到，一場大風雪，奪走我的美夢。只是為了去剷大門前那厚重的雪，不知是凍著或累壞了，竟然流產了！那天夜裡，我在淚溼枕巾中，悲傷的進入夢鄉。


    我夢見，觀世音菩薩來到我床前，她看起來莊嚴高雅。她說：「我來幫妳醫病了！」我說：「我沒病！」


    她慈祥的望著我說：「可是妳身體裡住了一個男靈魂，妳只要張開嘴，我就可以帶他走！」


    我真的張大了嘴，就在這時我覺得胸腹之間一陣絞痛，接著開始嘔吐，吐出一大堆鮮血，這時我的背脊由下而上的昇起一股暖流，我從小就常常冰冷的四肢也開始暖和起來。我心想，床邊這塊新地毯完蛋了！接著我開始擔心，這個被叫出來的靈魂又回來。


    這時菩薩似乎看穿我的心事，她說：「我已經送他去人間轉世了，妳剛剛流產的這個前世女兒，會在明年投胎在你好友的家庭，妳很快就會在人間見到她。」


    「妳之前一直不容易再懷孕，是因為那個男魂的關係，他是妳過去世的情人，雖然他只是想保護妳，但是，陰陽不相容，導致妳身體太弱，所以我只好來帶他走，明年妳會得到妳想要的孩子。」說完，菩薩飄然而去。


    醒來時，我急忙查看地毯，卻了無痕跡。明年我真能如夢中所示得子嗎？當時我認為這只是一個夢罷了！次年，我們搬回台灣，這時好友鈴茵快生產了！因為她要剖腹生產，我答應去醫院陪她。


    一天夜裡我夢見我走進一座陵墓中，裡面有幾層台階，潮濕的空氣中瀰漫著濃濁的霉味，泥土味，右邊放置著一座棺槨，我知道躺在裡面的少女，是我四百多年前的女兒。她原來的身分是公主，卻不幸在十八歲時，因為騎馬摔死，他的父親捨不得掌上明珠驟然逝去，所以特地將她的遺體浸泡在防腐劑中保存。從此她的靈魂守著屍體，執著那具早已失去生命力的身體，一直留在陰暗的陵墓中，始終不願出來。我來到她的棺槨前，試圖說服她出來投胎，她一直不肯，她說：「父王說我很美麗，我喜歡父王幫我建造的這個家。」


    我告訴她：「這裡太暗了！外面的世界可以看到陽光，藍天白雲及許多美景，還可以交到許多朋友，學習許多有趣的事物。」她仍在猶豫，我說：「妳就相信媽媽一次！跟著我走吧！……」費盡了唇舌，終於，她願意出來了，我趕緊轉頭往陽間走，不敢回頭望她一眼。因為經過了四百多年，不知如今她的面貌會是如何！所以我只是雙手合掌，拼命的念著佛號，戰戰兢兢的帶著她走回陽間。


    半夜兩點，電話鈴聲吵醒了我，中斷了這段冗長的夢。我得知鈴茵忽然血壓升高，緊急送醫院剖腹生產，在母女都非常危險的狀態中，總算平安的搶救成功。由於觀世音菩薩之前已經預告，我知道那個新生兒正是我剛剛說動的前世女兒。當我趕到醫院時，護士正好抱著她走過我身邊，我認真的查看她的小臉，她也盯著我看。雖然和一般嬰兒差不多，長得也端正，只是很奇怪，她的瞳孔外圍（虹膜區）是淺灰色的，我聯想到防腐劑，或許是泡在其中太多年了吧！


    當時鈴茵剛手術完尚未醒來，我是第一個看到嬰兒的人。後來聽說嬰兒日夜啼哭了三個月，吵得全家人睡不好，所以鈴茵就帶她去問一個能查到過去未來的修行人，那個人說這孩子生下來第一眼看到她過去世的母親，卻不是她這世的生母，因為太悲傷所以哭不停。


    鈴茵以為幫她開刀的那個女醫生是她前世的母親，而我不敢說實話，因為怕她嚇壞了，試想一個剛從棺材中跑出來的女兒，這聽起來多麼驚悚，所以我只好隻字不提。


    但是，我找機會去鈴茵家，抱著正在哭泣中的嬰兒說：「投生在我的好友家有什麼不好？鈴茵的脾氣好，有愛心，學識高、擅長栽培孩子，而且非常富有。投生為她的孩子，更有機會自在的展現自己的天賦。」


    我關愛的對她說：「不要再吵現在的爸媽啦！高高興興的成長吧！我會常常來探望妳的。而且我會一直從旁關心妳的靈性成長，妳可以放心！」她彷彿聽得懂我的話，完全停止哭泣，並且用那淺灰色眼珠子認真的望著我。她的眼珠在一年後逐漸轉黑。現在她已經大學畢業了！她聰明伶俐品學兼優！和她上輩子一樣，琴、棋、書、畫，樣樣精通，是個快樂積極的好孩子。


    而我自己就在那年底懷孕，次年，安全的生下了兒子，夢中觀世音菩薩的話逐一應驗了！這真是不容易，因為當時我女兒已經十一歲，她終於盼到一個弟弟了！


    我剛懷孕時也有一個奇蹟，因為超音波照出嬰兒頭部有黑點，醫生懷疑胎兒腦部有問題，我先生很擔心，就半夜起床，念地藏經迴向給胎兒。


    當時正在睡夢中的我，忽然，看到先生殺了一簍鴿子，那些血淋淋的翅膀與鴿腿，竟變成人類的手和腿，於是我從夢中嚇醒，從此發願吃素，後來再照超音波時胎兒就正常了。


    我先生說他家以前養過鴿子，他確實殺過鴿子。從發生此事之後，他也發願，從此不再殺生了！


    # 夢境的啟示


    初到加拿大時，我們買了一棟一、二樓的舊房子，樓上出租，樓下自己住。有一天，在睡午覺的時候，夢見一場奇異的景像，我看到頭頂上有一個浴缸，裡面坐了一位長髮女子，看不清她的五官，另一邊站著一個大巨人，站在半空中，朝著女子用力吹氣，因為力量很大，吹了又吹之後，就產生了巨大的風力，終於把女子給吹走了，醒來印象深刻。


    當天夜裡一點左右，二樓浴缸突然堵塞，大量的水流到一樓來。我先生急忙把一樓的天花板打開，鋸斷排水管，從裡面抓出了一大堆長頭髮，之後他把銅管焊接回去，但是銅管在屋頂，他仰著頭很困難的焊接。因為焊接時會掉下來許多火紅的銲錫，燙傷了他的臉，所以他努力的把銲錫吹走，吹了又吹，吹個不停。這時我突然覺得看過這一幕，才聯想起下午的夢，他站在樓梯上的樣子，吹的動作與姿勢，幾乎一模一樣！整件事與夢是同一回事！


    因為這個抽象的夢，我明白了，在地球上發生的事，其實早已在另一度空間發生過。從此，無論發生什麼困擾時，我比較能心平氣和，因為都是事出有因，不必抱怨或不耐煩。


    # 父親的印證


    當我正享受修行的喜悅時，突然得知父親驗出癌末，而且群醫已經束手無策。接到消息之日，彷彿晴天霹靂，我痛哭失聲，想到我那仁慈善良的父亲竟會得到這可怕的疾病，而且似乎很快就要離我而去，我的心幾乎要碎了！


    然而，就在當天夜裡，一位來自台灣的師兄，找個藉口住進我的家（事後回想，他其實是專為渡我而來）。他一見面就告訴我：「人總是要死的！你別以為吃素的人就不會死！」


    奇妙的是，當時我心裡正在想，為什麼我父親吃素多年了，還會得癌症？所以我就順口問：「為什麼會死？」他說：「吃素的人如果都不會死，不都變成老妖怪了？」我也覺得好笑，但是，我已發現他是證得他心通的聖者。


    當晚我獨自去請教他，有關父親的病，他說：「這次你父親是死定了！我都看見他躺在棺材的模樣，及告別式的許多鮮花，因為他生平布施很多，所以值得這麼多的鮮花，未來都已成定局，沒法可改了！」


    我非常傷心的流著淚，並且不服氣的說：「我父親一生都在作善事，他也努力修行，他不該得這種病，至少他該有個善終！」


    他：「你怎知他沒有善終？」


    我：「這個病聽說會很痛的！」


    他：「我保證他從頭到尾都不會因為這個病而痛！不信妳回去陪他，反正只剩短短幾個月，妳去陪他之後就不會那麼悲傷，妳會比較情願讓他走！」


    我仍是不停的落淚，他無奈的說：「不要特別重視這種阿修羅感情，修行人太重情是一種執著，你不要太悲傷，否則身體哭壞了靜坐也坐不好，修行也不會進步了，妳知道嗎？身體不好，打坐時是不會進入高境界的！」


    隔天我先生吵著想和我一起回台灣，他想回去找工作，不想留在加拿大。我覺得好像上天，一口氣想拿走我生命中，最重要的兩個男人，絕望的我又去找這位師兄，他輕描淡寫的說：「讓他去吧！找不著什麼工作的，沒那個緣，過幾年他厭煩了，就會乖乖的回來，再也不提台灣的事！何況他不在，妳才好修行！」


    接著，他又說：「他的腳很痛吧？我看到一大群鵝圍著咬他的腳，他吃了這麼多的鵝肉，鵝很凶的，妳睡他旁邊，也不得安寧，怎麼修行呢？要是我啊！就讓他走，才修得快！」


    我說：「他確實有痛風，常常一夜痛到天亮，他最愛吃鵝肉了，但是我們有兩個孩子啊！叫他走，孩子就沒有爸爸了！」


    他笑著說：「妳啊！很早就修到超三界了，竟為了渡這個人下來七次了，天堂、地獄都為他去過了！我觀察你們之間的因果，妳也不曾欠他什麼，卻為他吃那麼多苦！這一世萬一又渡不成，妳還想再陪他來這個苦海嗎？」


    這時我越來越相信他了，於是誠心求他渡化我先生，他說：「既然妳都開口了，我也就試試看，我會花幾天來做這件事！」


    隔了幾天，我趕回台灣陪伴日益消瘦的父親，心中的疼痛自是不用細說了。有一天，接到這位證宿命通的師兄打來的電話，原來他已經回到台灣，他說：「妳拜託我做的事，我已達成了，我和妳先生談過幾次，他還挺風趣的！」我說：「這幾天我也看開不少，如果我先生得離開，我才能修成，我就讓他走吧！」他笑說：「妳先生其實滿可愛的，可以留他下來，他也會修行的！」我心想，我先生怎麼肯修行呢？（我先生在隔不到三個月之後，開始了吃素和在家修行的生活。）


    但是，當時我最在意的是父親的生死問題，所以又提起父親的病：「師兄，到底我父親有沒有方法可救？」


    師兄說：「沒有！但是我幫他去玉皇大帝那兒查過，他原本還要十幾世才能修成，現在大幅縮短為幾世就能修成正果！你們應該替他慶幸才對，這是喜事！」我問：「為什麼可以縮短時間？」師兄說：「因為妳父親這世很慈悲，做了許多善事，所以進步如此神速，但是下一世能否成就，要看他自己的努力，我們修行的快慢，完全看我們是否精進。」


    這時我母親也來請教師兄，師兄說了一些安慰的話。後來他交代我要小心，因為我父親會逐漸知道我們在想什麼，也會看到一些異象，因為他的靈魂逐漸接近靈界了，很快就會進入「中陰身狀態」，會開始有神通能力。所以在他面前不能想不快樂的事，免得他知道了會難過。


    等我們掛掉電話以後，父親突然問：「剛才打電話的人是誰？是不是高人？」我很好奇爸爸為何以高人稱之？原來剛才父親因為好奇，在隔壁房間拿起聽筒，沒想到父親看到聽筒發出一股白色強光。


    幾天之後父親更奇怪了，他指著我母親、我、及妹妹的頭說：「妳們頭上都有一圈光。」我驚訝的問：「什麼樣子？」父親指家中觀世音菩薩的畫相說：「就像那樣，圓形正好包住妳們的頭，妳媽的光大約六尺，妳們的兩尺寬！」我以為父親病糊塗了，就經常考他。每次有人來訪，或其他親人回來，過後，我就問父親：「剛才某某人有沒有光？」父親總是搖頭說：「他們身上都是吃肉的臭味，黑黑暗暗的哪來的光？」


    只有兩人例外，一個是以前練氣功的同修，她吃全素每日靜坐一小時，父親看到她有半尺光。另一個是我親戚，她吃素，拜佛，偶而念經，她也有不到半尺光。有一位氣功同修本來吃素的，父親說：「她哪有吃素？渾身都暗得可怕！」我後來問她：「妳現在還吃素嗎？」她說：「現在沒有啦！全家都吃葷的，我總要吃剩菜，不然倒掉了可惜！」我知道她在找藉口，但父親真的沒看錯！


    從父親說打坐者有光之後，我就努力打坐了。有一夜，我打坐四個小時，次日，父親說：「奇怪妳今天的光變大了！變成四尺寬！」有一天我打坐之後，父親又驚訝的說：「妳進步真快，今天變成六尺寬了！已經趕上妳媽媽了！」其實以前媽媽是很認真的，打坐時間較長。而我一向缺乏紀律，沒認真打坐。自從發現打坐時間長短影響光度時，我更努力打坐了。


    有一天，我與妹妹去山上共修後回到家，正好父親坐在客廳，我進門時，父親瞇著眼望著我說：「妳今天太亮了！好刺眼，我沒辦法看清楚妳的臉！」我笑著問說：「今天有幾尺？」父親搖頭說：「太大的光了，不能用尺或丈來量，應該到幾公里以外去了吧！我沒辦法看到尾端。」我感到很喜悅，頭一次覺得修行如此簡單！


    但是，當我感到無限歡喜時，卻看到父親流下眼淚，這是勇敢面對病苦的父親頭一次落淚，他說：「妳們都修成了，而我，這輩子是修不成了！」我安慰父親：「既然你知道靜坐這麼好，為什麼都不坐了呢？」父親黯然神傷的說：「太遲了！身體病了，沒有元氣修練了！」


    我說：「爸！這光的事情到底是真是假？還是你在安慰我們的？」父親忽然間很神祕的說：「這當然是真的！我騙妳們做什麼？我是偷偷告訴妳們的，這本不能說的，我是為了妳們修行的信心才洩漏天機的，以後不能再說了！他們說不能說！」我沒問「他們」是誰，我猜是指導靈吧！從此，父親絕口不提「光」的事情！


    父親真的一直沒有痛過，一粒止痛藥都沒吃，夜間也睡得很好。有一日還半開玩笑似的自我安慰：「上天派了三個發光的仙女在我身邊，我就是不信我會有事！」父親往生時，我不在台灣。母親告訴我，父親在往生的前一天說：「從我生病開始至今，師父天天都在我身邊！師父還告訴我，我的病好了，但身體已鈣化，不能吸收營養了，以後不用煮東西給我吃了，我現在好舒服！好輕快！」


    第二天清早，父親問看護洪女士說：「昨晚一夜美妙的音樂妳是否聽到？」洪女士問：「是佛讚嗎？」父親說：「不是！是從來沒聽過的，很好聽的音樂！」父親要求弟弟扶他起來坐著，弟弟推來輪椅，正想扶起已經弱到'
