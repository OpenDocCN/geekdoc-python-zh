    # # 前言


    原本我從未有寫書的念頭，但最近忽然覺得眾生求道艱難，我也是過來人，而我因為生長在大家族，聽聞許多有關因果的實例，又碰到許多神仙、聖者、及在世佛的幫助，讓我逐漸看破放下，專心修行，希望這些真實的故事能帶給人們一些啟示。


    我幼年生長在台灣中部的一個小鎮～通霄，祖父母的家在一個依山傍水的純樸小村，我們是一個大家族聚居在附近，所以諸如三叔公、四嬸婆之類的長輩有許多，至於堂兄弟姊妹至少也有四十幾人。幼年時期，我們成天混跡山林及海邊，快樂的遊玩。拾貝殼，烤地瓜，採野果，日子過得無憂無慮的。夜晚是另一個有趣的世界，母親總會讓我們洗一個香噴噴的澡，吃頓豐富的晚餐，然後我們搬些小椅子到村子中央的廣場去，聽大人們談天說笑，除了當日的趣聞之外，我最愛聽的莫過於那些充滿神祕色彩，又聳人聽聞的靈異故事，它們被這些樸實的長輩們描述起來特別生動，何況又是真人真事，所以我一直想要把我的聽聞寫成文章與大家分享，但是為了尊敬及保障當事人隱私，我已經改變了人名及地點，現在請各位以寧靜的心來閱讀這些故事。'
  - '[PAGE 34]


    # 前世因果


    芙蓉是個三十二歲的婦人，剛生下第五個孩子，忽然生了一場大病臥床不起，她的大女兒名叫婉兒，是個非常孝順的女孩。十一歲的她為了想醫治母親的病，聽了長輩們的建議，跑到一間著名的神廟去問神。當神明附身在乩童身上時，是以觀世音菩薩的身分告訴婉兒：「妳的母親過去世曾經殺害三名舞女，她在前一世是名男子，住在台北，他被三名舞女騙了許多錢之後，起了極端的憎恨心，就先後把她們帶到河邊殺害，然後在她們身上綁著大石頭，將屍體沉入水中。在當時從未被破案，所以在他命終之前，並未受到法律制裁，他死後……」觀世音菩薩的話尚未說完，忽然乩童神色轉變，而且換成了另一女子的聲音，帶著憤怒的腔調，原來是其中一名被害的舞女忍不住插嘴了。


    舞女靈魂：「他以為他死了，偷偷溜到鄉下，投胎成女的，我們就找不到他？三十年來我們無時無刻不在找他，現在總算找到了，我們要他立刻償命，才能消了我們的心頭之恨！」婉兒問：「你們是不是捉錯人了，我媽媽可是善良的女子，不是男人！」舞女：「絕對錯不了，我們在閻羅王那兒查過了，也拿了地府令牌。現在是他的死期到了，命債是逃不掉的，更何況我們是三條命，他才一'
  - '[PAGE 35]


    條，已經很便宜他了。就算這一世他投胎成女人，裝得再善良，也不能掩蓋掉前世殘殺我們三人的罪行。」


    婉兒不禁悲傷的哭了起來，她哀求道：「如果我媽媽做錯了是該賠命，可是我那剛出世的妹妹才十幾天大，她沒奶水喝，只怕是要活活餓死的，她是無辜的！這時三個舞女的靈魂討論了一會兒，就派其中一人說：「其實當我們被殺之時，也有著家人父母，及年幼的子女需要照顧，我們死時內心的掙扎與痛苦又有誰同情呢？但是我們實在也不忍心看著妳妹妹餓死，畢竟你妹妹是無辜的，我們決定讓妳媽媽再活一年，可以餵奶，一年到了，我們再來捉拿人！」


    就這樣芙蓉的病奇蹟似的康復了，孩子也平安的養到一歲，就在孩子滿一週歲時，芙蓉又病了。婉兒從未對母親提起問神明之事，但芙蓉在病中總是說，有三名打扮非常美麗的女子，衣著時髦，老愛在她床前跳舞，搞得她頭昏腦脹的。所以婉兒硬著頭皮再一次去了趟觀音廟，這一次菩薩給了許多張符咒，並交代她把符咒貼在門口及窗口，並且再三告誡，當病人好了之後，切勿走出家門一步。然而芙蓉耐不住成日關在家裡，病一好就急急忙忙出門去工作，豈知當天就又病倒了。這次十分嚴重，躺在床上連大小便都不能自理了，婉兒很焦急的趕去請教神明。'
  - '[PAGE 36]


    這一次菩薩只是安慰她說：「回去問問妳媽媽吃了別人的東西嗎？如果吃了就沒辦法了。婉兒奔回家中，喘著氣問母親：「媽媽，那三個女人有沒有讓妳吃下什麼？」芙蓉最後一次說的話是：「有啊！就在剛才，三個漂亮女人，好心的給我一個亮晶晶的丸子，說是仙丹，能治好我的病，我才吞下去的！」就從那時起，芙蓉再也不能言語，只是不停的呻吟好像極端痛苦，直到十多日之後，嚥下最後一口氣。


    第一部、邁向修行路 / 33'
  - '[PAGE 37]


    # 靈魂的存在


    但芙蓉也並非無聲無息的離開人世而消失於宇宙間，其實她仍是丟不下五個孩子的媽。話說婉兒的父親另娶之後，平時倒也相安無事，但芙蓉的靈魂在必要時會忽然插上一「手」的！有一次在郊外時，婉兒的繼母乘四下無人之際，推打婉兒，婉兒本能的閃開，沒想到繼母自己重心不穩，居然摔了一大跤，嚇到她背著的小嬰兒，那是她自己剛出生的兒子。繼母摔跤之後，嬰孩三天不喝奶，嚇得她急忙跑去問神明。這回觀世音菩薩並未出面，倒是芙蓉的靈魂附在乩童身上說：「妳竟敢在荒野無人之處毆打我的女兒，我只是推了妳一把而已，順便讓妳兒子不敢喝妳的奶，如果有此事，休怪我手下無情！」繼母心虛得直說：「好姐姐！對不起！我再也不敢了。」從此以後，繼母只敢罵人或瞪人，再也不敢動手打婉兒。


    婉兒的同父異母弟弟，有一個名叫文彬的特別愛看書。我小時候暑假回家鄉，特別喜歡去坐在他的房門口聽他吹笛子，那美妙的旋律，如行雲流水般的悅耳，又像訴說著一段段感人的故事，文彬像是用心靈在吹著生命的樂章。他的舉止一直都是那般文靜優雅，臉上總是清新的笑容。他十九歲時從師範學校畢業，開始教書。我始終記得他最後一次到我家時，帶著未婚妻，來拜訪家母時，說是'
  - '[PAGE 38]


    兩人即將訂婚。當時他年輕帥氣的臉頰在陽光下閃爍著光輝，幸福洋溢著，我們心中都為他們感到無限的祝福。


    誰知天有不測風雲，才隔幾天，竟傳來文彬在海濱浴場附近衝浪而溺死的不幸消息。婉兒在失去弟弟之後非常悲傷，她愛她的弟弟，卻再也沒有機會可以疼愛他了。因為婉兒的遺憾，使我有了很大的警惕。從此我盡可能的多疼愛弟弟妹妹，我有了零用錢也會分些給弟妹們，我知道，總有一天，每個人都要面對自己的生老病死，各自離世，唯有珍惜每一刻的相處時間，互相友愛，將來分離時才不會遺憾。


    我們非常懷念這個剛要展翅飛翔的年輕生命，文彬的母親更是無法接受這個最聽話、最善解人意的兒子，在一夕之間消失的事實，所以她去一處神廟，據說可以招亡靈來對話。那天大夥兒一起去，文彬的靈魂沒讓大家失望，很快的出來與大家對話，他說：「我的頭撞到海底岩石，而痛昏過去，就這樣失去生命。起先我很傷心，後來閻羅王第五殿正好缺一名文書，我就在那兒工作到現在，工作很輕鬆，請大家不必擔心我。」接著文彬交代那位痛不欲生的未婚妻說；「我是不可能回去了，妳還是另外找對象結婚吧！別為我難過，我們今生已經無緣了！」


    這事大家也就姑且相信了，因為誰也沒辦法印證文彬是否真的在閻羅王那兒工作，只能自我安慰，相信他在陰'
  - '[PAGE 39]


    間過得不錯！」


    一年之後，文彬的父親車禍過世，文彬的母親再一次受到重擊。因為掛念丈夫，她聽說宜蘭有一家招魂更靈驗，所以邀了原班人馬，大老遠跑去宜蘭牽丈夫的魂魄。文彬的父親一出來就叫著每個人的名字，說他去靈界時，本來是很辛苦的。幸好有個好兒子，在閻羅王第五殿當文書，幫他美言了許多，說他在人間是個好人、好父親，所以他很快就離開陰暗的地方，現在過得比較自由了。


    不同的神靈給了同樣的訊息，這印證文彬真的在閻羅王那兒工作。我開始相信人死後，靈魂真實存在的事實。'
  - '[PAGE 40]


    # 未了的親情


    素玉是我母親的遠房親戚，婚後不停的生孩子。生第十胎時難產，孩子被產婆硬擠了出來，因而存活。孩子的父親張大叔，嫌他一出生就剋死親娘，竟把他丟進畚箕裡。誰知，過了一夜，他仍活得好好的，被姊姊偷偷抱了回去。小奶娃在九個兄姐的照顧下也就安然無事。但是每天傍晚大家總被「驚嚇」一回，原來死去的母親心疼孩子們沒人照顧，每天太陽一下山，她的靈魂就從隔一座山的墳地裡回來。


    聽說像一陣陰風過來，素玉家的狗就會吹狗螺，然後一路搖著尾巴追過去，溫順的陪著她回家。素玉一進門第一件事，是幫奶娃蓋被子，順便逗逗他。過一會她會收拾家務，探望每個房間。但是讀者可別想像這是溫馨的場面，九個孩子怕得都躲在被子裡，被子又嫌太小，大家拉來扯去的，深怕自己一條腿，或一隻胳臂露在外頭，真是嚇得魂不附體。


    素玉可不在乎這些，她執著每天固定時間回家探望一番，直到一個月後張大叔帶回了新娘子。這新娘子，新婚之夜就領教了兩人中間夾了一個冰冷軀體的怪事。嚇得她第二天就去廟裡拿了一大堆符咒貼滿了門窗，當晚只聽見'
  - '[PAGE 41]


    素玉在門外哭了一夜，她哭、狗也跟著哭、真令人心酸。這樣過了幾天，張大叔決定搬家，沒幾天全家都搬到彰化去了。


    每當我想到這可憐的女人，一輩子辛苦的生了十胎，卻留不住丈夫的心，只去世短短一個月就忘了她，再與別人結婚。暫不提夫妻的情感，設身處地的想想，一位慈母想照顧自己的孩子，卻因為陰陽兩隔，而被狠心擋在門外，她內心多麼淒苦啊！從此，我對成人世界存在著如此冷漠無情的事實感到困惑，對人性及兩性之間的情愛感到懷疑。'
  - '[PAGE 42]


    # 祝福與咒罵


    我的母親心地慈善，生長在農家，少女時期就常要挑扁擔，那是非常粗重的工作。平時她經常與幾位嬸嬸一起工作，但這些嬸嬸常常輪流在懷孕，有時還兩、三人同時懷孕，可是農家人懷孕仍是得做這些粗活。母親看到她們大腹便便的挑擔子，於心不忍，所以她總會走得特別快，像小跑步一樣，先把自己的擔子挑下山，再跑回去替嬸嬸們挑，她常常跑了三趟，寧可累自己，也不忍累壞孕婦。所以，我母親要出嫁時，她的叔叔嬸嬸們特地打了許多金鍊子送給她，又獲得許多誠心的「祝福」！這些祝福隨著她的人生持續的開花結果。


    另一面借鏡讓我明白，千萬別做那些會被別人在背後「咒罵」的事。小時候有個鄰居，非常調皮，他最喜歡走在田裡，而且一腳踩壞一顆高麗菜，或踩死一株株的稻苗，大概他覺得很有趣，但是後面常有氣急敗壞的老農夫，邊追邊咒罵：「夭壽的死孩子！」老農夫辛苦的翻土，播種了許久，每日扛水灌溉，眼看就要收穫，賣點錢貼補家用，偏偏碰到這種頑童，真是欲哭無淚，只能扯著喉嚨罵出心中的怨恨。然而那股怨氣，真能凝成一股負面的力量！'
  - '[PAGE 43]


    他十八歲那年。有一天，他來我家玩，突然和我們談了許多事，包括他的學徒工作以及碰到的許多挫折，雖然都是不如意的事，但他還是有說有笑。我聽了相當心疼，覺得他年紀輕輕，無法繼續念書，必須遠離家人家鄉，獨自辛苦工作賺錢養活自己。但是我也覺得奇怪，平時文靜寡言的他，怎麼變得如此健談？這是前所未有的事。我們完全沒料到，他是來向我們作最後的訣別！


    過幾天他去游泳，就失蹤了。我父親受託去找尋他的屍體，請了船家打撈，卻始終找不到，於是父親焚香對他說：「如果你死後有靈，請引導我們找到你的屍體。」


    沒多久，看到水面有一處冒出許多大水泡，父親立即請船家到那兒打撈，不一會兒就看到他，雙手好似抓著打撈的繩索一般，被拉出水面。三十幾個小時之後（民國五十幾年時的交通尚未發達），他的父母兄姊從家鄉通霄趕到現場，撕心裂肺的呼喊他的名字時，他忽然七孔大量流血，似乎哀傷至極！


    當時我曾告訴母親，如果我可以替他死就好了，他的家人就不必那麼悲傷了，但是，母親悲傷的說：「如果換成是你死，我也是一樣會非常悲傷的！」'
- md: '這是我幼年時期經歷的最大傷痛，體驗到無常和生離死別的悲哀。從此我對於人的生死與存在的價值經常感到迷惑。為什麼？我們必須被生下來，然後等著那既不可知又是可知的未來，也就是那死路一條、人人平等的路！


    # 如露亦如電


    一切有為法

    如夢幻泡影

    如露亦如電

    應作如是觀～金剛經～


    就讀五專一年級的暑假，我去當保母，這是我打工賺到最多錢的一次，有電子公司薪水的兩倍。應徵當天是個颱風天，走進豪宅，真是羨慕呀！就連人家的傭人房，都是有衛浴設備呢！我乾脆住下來了，然後才打電話通知爸媽。媽媽在電話中說：「妳爸在公家機關是個主管，同事們稱妳們姊妹是千金，妳不當小姐，卻要跑去當傭人。」


    我說：「放心！我報了一個英文名字叫做碧莉（當天的颱風名字），碰到熟人我一概不認識。不會給妳丟臉的，沒人知道我是誰。」講完立刻掛電話。嘿嘿！將在外，君命有所不受！


    這真是個舒服的工作，只需陪一個六歲的男孩，他綽號小叮噹，是中外混血兒，長得好可愛好乖。他住外祖母家，他的外祖母也就是僱用我的人，是大約60歲的老太太，她還僱用一名司機，及一個煮飯的婦人。


    幾天後，老太太的三兒子從軍隊休假回家，命令我煎蛋給他吃，我說煮飯不是我的任務。（其實，當時十四歲的我，根本不會煎蛋，那只是我的藉口。）他就生氣了，大呼小叫的。老太太來了，看我在收拾衣物準備回家，就一直挽留，還加薪給我。事後，司機說老太太其實很兇，許多僱來的小妹都被罵跑了，他覺得老太太對我的好，超乎一般常情。


    老太太的長子是一位溫文和善的人，常幫忙餵小叮噹吃飯。次子也很文靜，從不麻煩我。她的長外孫子面貌清秀，就讀私立高中名校，成績都是第一名，牆上掛滿獎狀。長外孫女也是同一所高中，品學兼優，氣質高雅，清秀亮麗，身材高挑，皮膚白皙，是我最欣賞的典型。她的小外孫女雅芳還是個小學生，鋼琴彈得相當好，常常應我的要求，彈我最喜歡的一首鋼琴名曲給我聽。聲音嬌滴滴的雅芳，幾乎是整天守在我身邊，要求我講童話故事給她聽。當時，看他們兄妹三人，住在這美麗豪宅裡，每天有說有笑的，看著大銀幕電視，真是令人羨慕啊！


    有一天，我和雅芳在她家附近的別墅區散步，看到一間更大的豪宅，雅芳很羨慕那家人擁有寬敞的游泳池，我才發現，人們不論多麼富有，也不會感到滿足的，因為小我頭腦永遠在比較啊！


    有一天，長子開著雪佛蘭大車帶我們大家去看電影，上館子。這是我有生以來頭一次上飯館吃飯，我邊吃邊偷偷的笑，開心極了！有錢賺，有飯吃，還有免費電影看，覺得自己像是在度假。


    暑假過去了，小叮噹要回美國去念書了，我向老太太提辭職。但是老太太一直要我留下，開了一個很好的條件，就是放學去她家住，只要陪她就行了，因為兒子們都沒空陪她談天，薪水還有原來的二分之一。


    然而，爸爸說什麼也不答應，他說他養得起我，而且他一直不放心我住在別人家。經不起爸爸的親情挽留，我很遺憾的放棄了輕易可得的Money。離開前，雅芳堅持送我一條她的黃寶石的項鍊，叫我一定再回來看她。


    一個半月之後，我看到報紙的頭條新聞：**府命案**，五名死者是：長子，三個孫子女及煮飯的婦人。對我而言，彷彿晴天霹靂，我簡直無法接受這樣殘酷的事實。他們的死法都很慘，可憐的雅芳，不知為什麼被兇手砍了33刀，想了就好心痛，每次看到黃寶石項鍊就想起她。後來兇手找到了，是長子的軍中好友（我也看過他）夥同自己的弟弟來搶劫屋裡密室的現金十萬和洋酒。


    爸爸說：「幸好我叫妳回家住，不然妳也會死在那兒。」是啊！我差點也要去陪葬了！


    富貴榮華原來像朝露那麼容易消失！第一名品學兼優的獎狀都還高掛室中，三個兄妹俊美的身體卻已成灰燼。從此，我不再羨慕有錢的人！不再羨慕豪宅大院！不再羨慕俊美的外表！對於子女的才藝及學歷也看淡了！⋯


    我開始思考「如何超脫人生的無常」。


    # 定身法


    在台灣，每逢神明生日，常有神明出巡。我在初中時，有一天，和同學走在路上，忽然聽見遠處有一陣陣鼓笛聲傳來，我就順口說：「八成是出殯的隊伍！」話一出口，我的腳忽然抬不起來，好像牢牢的黏在地上。當時倒也不怕，只是告訴同學，我的腳不能挪動一步，怎麼使勁也沒用。同學只好陪我一起站在那兒，這時迎神的隊伍慢慢的走近我的視線。「啊！」我說：「原來是迎神的隊伍！」這話剛出口，我的腳立即可以移動，這時我才意識到剛才得罪了神明，被罰站了！心中直抱歉。這是我頭一次發現，神明無所不知的力量！


    我有一個鄰居，平日不信鬼神，有一日在路上碰到迎神隊伍，當時路旁擠滿了夾道歡迎神明的人，他就跟著看熱鬧。突然間神轎停在他前面，那轎內的人以神明的口吻對他說：「你一輩子不信神，不拜祖先，成日喝酒，遊蕩成性，不務正業，若再不改，恐怕來不及了。」這鄰居回去後，依然故我，完全不知悔改。不到一年，有一天，他在人行道上走著，突然一輛車朝著人行道失速衝了過來，他閃避不及，就活活被撞死了！


    # 佛學的啟蒙


    因為從小喜歡美術，所以二十歲時，找了一份油畫的工作。我的老師是油畫家，黃信安居士，他是虔誠的佛教徒，很年輕就持素，他的修行是以淨土和禪宗為主，他對佛經有非常深入的研究與了悟。因為有幸在他身邊工作，我聽聞了許多佛理，奠定了我的佛學基礎。


    每天午飯時間，我最喜歡聽黃老師為我開示，在那個時期，我聽聞了佛法中的三十七道品。例如：


    - 四念處：觀身不淨、觀受是苦、觀心無常、觀法無我。

    - 五根：信根、進根、念根、定根、慧根。

    - 五力：信力、進力、念力、定力、慧力。

    - 七覺支：念覺支、擇法覺支、精進覺支、喜覺支、除覺支、定覺支、捨覺支。

    - 八正道：正見、正思維、正語、正業、正命、正精進、正念、正定。


    他教我要離相（一切相皆是虛妄）、要有平等心、去除分別心。善護身業，不失律儀；善護口業，不譏他過；善護意業，清靜無染，隨時記得苦空、無常、無我。持續堅持六度之行：布施、持戒、忍辱、精進、禪定、智慧。


    我逐漸對佛法有了認識，並開始學習念經及靜坐。有了疑問，我就請教黃老師，例如：如何修無我？黃老師說：「睡覺蓋上被子時，就當自己死了，睡在棺材裡，死了的人是不能在乎世間的一切事物了！把自己當成活死人吧！」於是我練習這方法半個月。


    有一天，我先生對我說了一些不合理的話，若是往日的我，一定要辯論到底，討個公道。可是我想我正在體驗自己已死，死人哪裡能有本事吵架呢？所以，我若無其事，先生對我的反應愕然莫名。我覺得這方法真是有效，讓我的貪、嗔、痴、及驕慢少了一大半。過了一陣子，老師教我：白骨觀，這回死得更徹底了！回想起來，我的修行路真是好有趣。


    就在那個時期，我的夢變得很美麗，有一次我夢見濟公活佛，像一座山一樣高，全身金光閃閃，夢中的我大喊：「師父！師父！」並想去追他。因為他的腳步太大、走得太快，我一急竟然飛了起來，飛到一處如夢似幻的美麗山水中。


    另一次我夢見在夜晚走到一間教堂旁，我忽而跳上了十字架，然後輕輕的一直浮上了高空中，看到漫天星斗，及很大黃金色的月亮，那寧靜的夜色，閃爍的星光令人難忘！有一次夢見五隻鳳凰飛過我的窗前，那是一種很高雅的姿態，抬頭挺胸，頭頂上長著兩隻柔軟而綠得發亮的羽毛，尾巴的羽毛長長柔柔的飄動著，閃爍著綠色的光芒，那高貴優雅的身姿，令人過目難忘。後來我注意到廟宇彩繪的龍鳳圖案，和我的夢中鳳凰一模一樣，只是缺少了那柔美生動的生命力！


    從我聽聞佛法之後，我的夢，忽然由黑白的變成七彩亮麗的境界，有一次，甚至和聖誕老人共乘雪撬從彩虹上滑下來，簡直可用此景不似在人間來形容！


    # 念佛號


    小時候我很膽小又常看到鬼，因此恐懼得睡不著。父親告訴我：「妳只要念阿彌陀佛，身體就會發光，鬼害怕亮光，會被妳身上的光芒嚇跑了！」


    修行後，我去承天禪寺許多次，但是廣欽老和尚從未對我個人開示什麼。僅有的一次，我帶著幼齡女兒去請他開智慧，之後我站在他老人家身旁，虔誠的望著他，希望他會對我開導修行的方法，忽然他叫住我：「喂！妳過來！」我興奮的洗耳恭聽接下來的開示，他老人家指著我的女兒說：「注意照顧她！她正在吃一張紙屑！」我紅著臉趕緊把紙從女兒嘴裡拿出來，心裡想，他老人家是否認為我連女兒都照顧不周，還談什麼修行？


    有一次我鼓足勇氣，問他老人家：「師父我該如何修行？」他淡淡一笑說：「念阿彌陀佛啦！」從此我訓練自己走路也念佛號，洗碗也念，煮菜、做事，都儘量念佛號，日子久了，頭腦似乎乾淨不少，不會亂糟糟的。睡夢中偶然會預先看見一些未來發生的事，事後也能印證那夢的真實性。但是我覺得那是不夠的，我渴望在清醒中知道整個事的來龍去脈，知道宇宙的真理，找到自己的佛智慧，那才是真正的成就。


    我認識許多的師兄師姐，其中有一些已證得很高等級，他們得到神通自在，並且默默的關心並指導我們，如何在修行中突破心靈障礙。他們的愛心、耐心、定力、超乎一般的修行者，他們的一舉一動，是如此安詳、寧靜與自在。從他們那裡，我學到許多修行的方法，每一段日子後可以察覺自己又進步了！那是一種很安心的感覺！好像你闊別家鄉已久，而今你已經坐上了對號快車，車子正帶著你走向溫馨家園的途中，你數著每一站，知道家鄉越來越近了。


    # 天上的兄長


    記得有一次去問神，是我及大姐陪大表姐一起去的，在基隆路一家道教的廟，法師居然當著眾人面說：「這三個女孩都是天人轉世！」我們只能一笑置之，誰也沒有相信會有這種事。


    隔了幾年，兩位朋友帶我去新店山裡，一座挺大的神廟，這次更怪了！本來一群人排隊問神明問題，都是問什麼答什麼，輪到我時，神明突然唱起歌來，但是每句話都在對我開示：「妳原是天人，你下凡來目的是為了渡人，自己卻迷失了兩百年，都已經忘了回家的路，所以妳的心靈苦很久了！」我問他：「您是誰？」他說：「妳下來兩百年，連自己兄長的聲音也不記得了？」他的歌聲雄壯迷人，絕不輸男高音，聽來有點耳熟，但又不知道在哪兒聽過！


    他接著又唱：「我是妳天上的兄長，我一直在注意妳，妳吃了許多苦，這一世總算想回家了！我知道你一直想修行，目前在學靜坐，只要妳明白陰陽合一的道理時就可以回家了！」我好奇的問：「我這世回得了家嗎？」「可以！因為妳開始修行了。但是別貪玩，天上的母親非常想念妳！只要專心修，這一世肯定可以回家了！」我忽然覺得好安心好快樂！好像迷路的人找到了方向。


    一會兒，神靈退出了法師的身體，我想再問些問題，法師已不復記憶，這時我問旁邊負責翻譯神語的婦人：「神明說了什麼？」她居然說：「神明說，把這些香灰吃了，妳的病就會好！」真是讓人驚訝，她一點也沒聽懂神明的話！我向陪我來的兩位朋友說：「真奇怪，她一點也不明白神明說了什麼？」沒想到他們都很困惑的問我：「究竟神明說了什麼？妳好像大有來頭？為什麼聽得懂神語？神又為什麼對妳講了四十分鐘之久？」


    這時候，輪到我很迷惑，我一直以為我與神的對話，是使用中文，但是一旁所有的人卻又完全聽不懂？那些對話真是天界的語言嗎？而且我認為我和神明只說了五分鐘，為什麼他們說是四十分鐘？這麼長的時間差距是怎麼發生的？這成了不解之謎，但之後回想起來，這個神明的聲音，之前曾經救我一命。


    事情發生在我剛結婚不久的時候，因為二十歲就結婚，婚姻生活使我很苦惱，兩人都太年輕，認知不同，適應不良，不懂得包容對方，脾氣又大，所以時常吵架。有一天剛吵了一架，我覺得十分委屈，就以自殺威脅，他也不理我，逕自睡覺去了。以我當時的驕傲和任性，說了就不會食言，於是我就悲傷的坐在書桌前，寫一封給父母的訣別書，心裡其實也不想為這無聊的小事去死，只是話已出口，不能收回，何況沒良心的他正呼呼大睡呢！該怎麼死法？跳樓，太可怕！也會嚇著別人。跳海，這個好！不用埋葬，省了家人許多事！


    正打好主意，忽然聽見我那「天上兄長」的聲音，嘹亮的唱著：「夫妻本是同林鳥，大限到時各分飛，沒什麼想不開的，快去睡吧！」我伸頭望著窗外，夜空中繁星閃爍著，不知聲音從何而來，但是我忽然覺得很快樂！天外有兄長關心著我哪！我很快的撕了訣別信，躲進被子裡安心的睡覺了！


    # 我的仙丹妙醬


    有一年夏天，得了一種可能是腸炎的毛病，每天下痢數次，所以身體立刻瘦弱下來，但是我記得黃老師曾告訴我：「每天儘管念佛，別太注意身體，病也是想出來的，一切唯心造，只要專心修行，該死的病，醫不好，不該死的病，想死也死不掉！」所以我每天在心中念著佛號，若無其事的拖了二十來天，瘦得走路都有點飄飄然，重心不穩了！


    一天中午，我躺在床上休息，似乎半睡半醒中，看到一位像武俠片中身著勁裝的男子，手裡拿著柺杖走近我的床頭，對我說：「我是李鐵拐，妳的病得吃那個才會好！」說著他指著我的窗戶，我順著他的手勢望去，窗戶的玻璃上有許多草莓醬緩緩的流下來。


    醒來時，一直覺得自己的夢很有想像力呢！李鐵拐不就是八仙過海那個故事中的仙人嗎？何況，古代的人怎麼會知道這種西方食物呢？再說，我的腸胃極差，多吃點甜食就會胃酸過多，所以我一點也不信這個夢。


    隔天我和黃師母談天，談到這個夢，沒想到她叫我吃吃看，她說反正那也很好吃，又不是什麼藥，說不定吃了真的會好呢！我因為草莓醬有防腐劑及色素，所以一直沒去買。


    隔了幾天，嚴重到一天下痢十來次了，當我走到超級市場都快走不動了！這時迎面而來一個甜美的女子，笑容滿面的說：「純天然保證不含防腐劑及色素，來自加拿大的草莓醬。」我想起了我的夢，順手買了一瓶，心裡想，再不吃恐怕就得等死了！


    就這樣，連我自己都難以相信，吃了兩小湯匙之後，肚子一陣清涼，立刻止瀉，吃不到四分之一瓶，腸胃的毛病就不藥而癒了。甚至從此之後，只要腸胃的問題又發生時，草莓醬隨時對我都有效。但別人試我的方法不見得有效，或許這是體質不同的緣故吧！


    # 神仙的地址


    又隔了幾年，有一次，我與家人到獅頭山去玩，在一個王母娘娘廟裡，我們碰到一位修道人，羅師兄，他有通靈的能力，可惜我當時不太信任他。因為我父親獨自先進廟裡，聽到羅師兄對另一位修道人說：「妳看那位進門的女人背後有佛菩薩保護著！她是站蓮花的人。」父親轉頭看那個女人，竟是我的母親！父親很好奇的問羅師兄：「站蓮花的人，是什麼意思？」羅師兄回答：「是佛家的修行者！」他又自稱自己是道家弟子。父親問：「我屬哪一家？」羅師兄笑著說：「你啊！是儒家的讀書人啦！你的修行等級，如果與你妻子比，她是老闆，你是她的門房！幫她看大門那種！」


    父親立刻告訴母親，母親就急忙想拜羅師兄為師，他說：「不行啦！妳有妳自己的師父，妳師父和我師父不是同一個人，妳的等級很高的！妳就快要見到妳師父了！」這時我也好奇了，就問他如何修行？他說：「這兒妳修得最差了，修行人哪有那麼驕傲的？修行人要像成熟的稻子一樣，頭垂得低低的！」我有點不服氣，我想：每次都是我解釋經典給母親聽的，佛經我可看了不少，何況還天天念佛。我都修十年了，母親才剛剛開始，怎麼就遠遠超越我了呢？我問：「我到底是誰來投胎的？」他說：「如果你知道自己是誰，你這輩子就更不想修行了，也不用去證得自己是誰？我是不會告訴你的，免得壞了你的修行路！無論是什麼都要靠自己去證得！」


    我告訴他關於李鐵拐這個夢，問他究竟是真是假？他似乎很高興，好像我提到他的一個好朋友似的！他一本正經的說：「喔！李鐵拐嗎？他住板橋呢！你要不要抄寫他的地址？」說著拿出紙和筆，我張大眼睛驚訝的望著他，他又繼續說：「但是不太好找！因為他常常四處雲遊！」我心想：天哪！我會作夢，你也挺會編故事耶！


    他似乎察覺我的懷疑，就正色道：「事情是這樣的，前些日子，李鐵拐路過這兒曾來看我，像八仙這些神仙，是真實存在的，他們常駐人間，到處渡人，非常忙碌。外表看來和普通人長得一個樣子，你自己也看到過他嘛！如果你努力精進修行，這些過往神仙都會幫忙指點你的！」慈悲的羅師兄又特別指示我，一項未來即將發生在我身上的事，該如何處理比較圓滿，他先把答案告訴了我！


    回家之後不到幾天，果真發生了他意料中的事，但是我當時處理得很困惑，一直不知如何是好，所以在前往加拿大之前又趕去找他，沒想到一趟路興沖沖的到了山上，羅師兄卻在禁語中，只對我點頭致意，我竟失去了請教他問題的機會。


    # 法師的警告


    以前有位同修道友，名叫心潔，不論走到哪裡，手裡總是一串念珠，遇到生人熟客都一律虔誠禮拜，並且口念一句阿彌陀佛，她舉止永遠都是溫文賢淑，讓我們這些初學佛法的人，感到自嘆不如，覺得她的修持必定最好！


    有一天，同修們一起去拜望靜心法師。回來之後，有位同修私下告訴我，不知道為什麼，靜心法師他老人家，竟然重重的打了心潔的肩膀兩下，害得心潔回來之後得貼膏藥。此外還罵心潔說：「妳這條蛇精，還不改妳的毒性，又想來危害世間，竟敢到我寺廟來，還敢帶妳那三條小蛇來，我就是不讓他們進來。妳再不改，報應就不遠了！」這時大家才注意到心潔的三個孩子一直在屋外探頭探腦，卻一步也不敢踏進來，而別的同修的孩子都在屋裡，真是奇怪呢！


    同修們仍然和心潔很要好，總覺得靜心法師他老人家誤會了她。大約一年之後，心潔想在四樓頂加蓋一間佛堂，向許多同修借了數百萬元，卻不肯還錢，還理直氣壯的說：「錢用來蓋佛堂，功德無量。」其中有一個老太太，就只有八十萬老本，借給她之後，生活就出了問題，卻也索求無門，真後悔當時沒有相信法師的話。


    # 慎選修行路


    我有個鄰居名叫愛莉，不知怎麼會迷上一家神廟，剛開始也看不出來，這廟的主持人心術不正，有一次說是帶他們去台南做法，愛莉被安置在一個荒山野外的墳場，每天夜半三更，都得去墳墓旁做法，想利用孤魂野鬼的靈魂，幫忙賺錢，氣氛陰森森、恐怖兮兮的，愛莉害怕得想回家。主持人竟叫人把她打得遍體鱗傷，甚至理光她的頭髮，強迫她出家，還逼她在陰神之前發毒誓。


    有一次愛莉乘人不備，偷跑回家。這些大膽神棍居然跑到她家門外埋伏，嚇得她連續幾個月躲在家中不敢踏出家門一步。幸好出外採購食物有她先生全力幫忙，終於渡過難關。但是愛莉受了這場無妄之災，身心受傷，變得畏縮、憂鬱，精神大不如前，再也不敢相信別人。為了修行走錯路，真是可憐！既危險又浪費了許多時間，選擇師父時，要十分小心。


    另一件事是我在黃老師家學禪時，有一位新來的師姐憂心忡忡的問黃老師：「以前我在一家神壇當弟子之時，拜師那天就發了毒誓，如果將來背叛了教主，就要被毒蛇猛獸咬死。現在我離開了他們，可是我已經中了他們下的蠱，每天夜裡都被一大堆的蛇糾纏著，還有獅子、老虎撲咬我，我簡直就要瘋了，我該怎麼辦呢？」黃老師教她求佛、菩薩保護，並以精神力量，克服內心的恐懼。黃老師強調：修行人要思維清楚，自己有判斷能力，千萬別走入邪門外道，真正的有道修行人，行為端正，身口意清靜，絕不會要求弟子，作一些不合法、或不合情理的事。


    # 六道輪迴


    許多人以為餓鬼道是死後靈魂才可能去的地方。我的夢訊息卻讓我明白，活人也可能處於那種境界。


    有一次，我夢見母親的朋友王阿姨變成餓鬼的形狀，有大大的肚子，細細長長的脖子。她跳到母親的跟前，伸長兩手去掐住母親的脖子，母親為了脫困就叫道：「我沒辦法幫你，去找我二女兒想辦法吧！」只見餓鬼形象的王阿姨立刻轉往我的方向來，我想，台灣離加拿大這麼遠，總要一會兒才會到吧！沒想到，不到一秒鐘，她飛到我面前，手伸好長準備掐我的脖子。我趕緊抓住她的手，因為不忍見到她的餓鬼形象，所以閉上雙眼拼命念佛號，念了好久，張開眼看她仍是餓鬼形象，忽然想起應將念佛功德迴向給她，才迴向完，她已回復人身了！我也嚇醒了。


    第二天，打電話問母親：「王阿姨好嗎？怎麼我夢到她變成餓鬼呢？她不是修行非常精進的嗎？」母親聽了，很驚訝的說：「我聽說她破產了，很可能沒有飯吃，我去看看她！」探望之後，才知道王阿姨已好幾天沒飯吃了，餓得渾身無力，原來王阿姨的兒子賭輸了家產，把家裡所有的錢全賠光，連一點吃飯的錢也沒有了！母親趕緊送她一筆錢讓她渡過這難關。'
  mdcn: '這是我幼年時期經歷的最大傷痛，體驗到無常和生離死別的悲哀。從此我對於人的生死與存在的價值經常感到迷惑。為什麼？我們必須被生下來，然後等著那既不可知又是可知的未來，也就是那死路一條、人人平等的路！


    # 如露亦如電


    一切有為法

    如夢幻泡影

    如露亦如電

    應作如是觀～金剛經～


    就讀五專一年級的暑假，我去當保母，這是我打工賺到最多錢的一次，有電子公司薪水的兩倍。應徵當天是個颱風天，走進豪宅，真是羨慕呀！就連人家的傭人房，都是有衛浴設備呢！我乾脆住下來了，然後才打電話通知爸媽。媽媽在電話中說：「妳爸在公家機關是個主管，同事們稱妳們姊妹是千金，妳不當小姐，卻要跑去當傭人。」


    我說：「放心！我報了一個英文名字叫做碧莉（當天的颱風名字），碰到熟人我一概不認識。不會給妳丟臉的，沒人知道我是誰。」講完立刻掛電話。嘿嘿！將在外，君命有所不受！


    這真是個舒服的工作，只需陪一個六歲的男孩，他綽號小叮噹，是中外混血兒，長得好可愛好乖。他住外祖母家，他的外祖母也就是僱用我的人，是大約60歲的老太太，她還僱用一名司機，及一個煮飯的婦人。


    幾天後，老太太的三兒子從軍隊休假回家，命令我煎蛋給他吃，我說煮飯不是我的任務。（其實，當時十四歲的我，根本不會煎蛋，那只是我的藉口。）他就生氣了，大呼小叫的。老太太來了，看我在收拾衣物準備回家，就一直挽留，還加薪給我。事後，司機說老太太其實很兇，許多僱來的小妹都被罵跑了，他覺得老太太對我的好，超乎一般常情。


    老太太的長子是一位溫文和善的人，常幫忙餵小叮噹吃飯。次子也很文靜，從不麻煩我。她的長外孫子面貌清秀，就讀私立高中名校，成績都是第一名，牆上掛滿獎狀。長外孫女也是同一所高中，品學兼優，氣質高雅，清秀亮麗，身材高挑，皮膚白皙，是我最欣賞的典型。她的小外孫女雅芳還是個小學生，鋼琴彈得相當好，常常應我的要求，彈我最喜歡的一首鋼琴名曲給我聽。聲音嬌滴滴的雅芳，幾乎是整天守在我身邊，要求我講童話故事給她聽。當時，看他們兄妹三人，住在這美麗豪宅裡，每天有說有笑的，看著大銀幕電視，真是令人羨慕啊！


    有一天，我和雅芳在她家附近的別墅區散步，看到一間更大的豪宅，雅芳很羨慕那家人擁有寬敞的游泳池，我才發現，人們不論多麼富有，也不會感到滿足的，因為小我頭腦永遠在比較啊！


    有一天，長子開著雪佛蘭大車帶我們大家去看電影，上館子。這是我有生以來頭一次上飯館吃飯，我邊吃邊偷偷的笑，開心極了！有錢賺，有飯吃，還有免費電影看，覺得自己像是在度假。


    暑假過去了，小叮噹要回美國去念書了，我向老太太提辭職。但是老太太一直要我留下，開了一個很好的條件，就是放學去她家住，只要陪她就行了，因為兒子們都沒空陪她談天，薪水還有原來的二分之一。


    然而，爸爸說什麼也不答應，他說他養得起我，而且他一直不放心我住在別人家。經不起爸爸的親情挽留，我很遺憾的放棄了輕易可得的Money。離開前，雅芳堅持送我一條她的黃寶石的項鍊，叫我一定再回來看她。


    一個半月之後，我看到報紙的頭條新聞：**府命案**，五名死者是：長子，三個孫子女及煮飯的婦人。對我而言，彷彿晴天霹靂，我簡直無法接受這樣殘酷的事實。他們的死法都很慘，可憐的雅芳，不知為什麼被兇手砍了33刀，想了就好心痛，每次看到黃寶石項鍊就想起她。後來兇手找到了，是長子的軍中好友（我也看過他）夥同自己的弟弟來搶劫屋裡密室的現金十萬和洋酒。


    爸爸說：「幸好我叫妳回家住，不然妳也會死在那兒。」是啊！我差點也要去陪葬了！


    富貴榮華原來像朝露那麼容易消失！第一名品學兼優的獎狀都還高掛室中，三個兄妹俊美的身體卻已成灰燼。從此，我不再羨慕有錢的人！不再羨慕豪宅大院！不再羨慕俊美的外表！對於子女的才藝及學歷也看淡了！⋯


    我開始思考「如何超脫人生的無常」。


    # 定身法


    在台灣，每逢神明生日，常有神明出巡。我在初中時，有一天，和同學走在路上，忽然聽見遠處有一陣陣鼓笛聲傳來，我就順口說：「八成是出殯的隊伍！」話一出口，我的腳忽然抬不起來，好像牢牢的黏在地上。當時倒也不怕，只是告訴同學，我的腳不能挪動一步，怎麼使勁也沒用。同學只好陪我一起站在那兒，這時迎神的隊伍慢慢的走近我的視線。「啊！」我說：「原來是迎神的隊伍！」這話剛出口，我的腳立即可以移動，這時我才意識到剛才得罪了神明，被罰站了！心中直抱歉。這是我頭一次發現，神明無所不知的力量！


    我有一個鄰居，平日不信鬼神，有一日在路上碰到迎神隊伍，當時路旁擠滿了夾道歡迎神明的人，他就跟著看熱鬧。突然間神轎停在他前面，那轎內的人以神明的口吻對他說：「你一輩子不信神，不拜祖先，成日喝酒，遊蕩成性，不務正業，若再不改，恐怕來不及了。」這鄰居回去後，依然故我，完全不知悔改。不到一年，有一天，他在人行道上走著，突然一輛車朝著人行道失速衝了過來，他閃避不及，就活活被撞死了！


    # 佛學的啟蒙


    因為從小喜歡美術，所以二十歲時，找了一份油畫的工作。我的老師是油畫家，黃信安居士，他是虔誠的佛教徒，很年輕就持素，他的修行是以淨土和禪宗為主，他對佛經有非常深入的研究與了悟。因為有幸在他身邊工作，我聽聞了許多佛理，奠定了我的佛學基礎。


    每天午飯時間，我最喜歡聽黃老師為我開示，在那個時期，我聽聞了佛法中的三十七道品。例如：


    - 四念處：觀身不淨、觀受是苦、觀心無常、觀法無我。

    - 五根：信根、進根、念根、定根、慧根。

    - 五力：信力、進力、念力、定力、慧力。

    - 七覺支：念覺支、擇法覺支、精進覺支、喜覺支、除覺支、定覺支、捨覺支。

    - 八正道：正見、正思維、正語、正業、正命、正精進、正念、正定。


    他教我要離相（一切相皆是虛妄）、要有平等心、去除分別心。善護身業，不失律儀；善護口業，不譏他過；善護意業，清靜無染，隨時記得苦空、無常、無我。持續堅持六度之行：布施、持戒、忍辱、精進、禪定、智慧。


    我逐漸對佛法有了認識，並開始學習念經及靜坐。有了疑問，我就請教黃老師，例如：如何修無我？黃老師說：「睡覺蓋上被子時，就當自己死了，睡在棺材裡，死了的人是不能在乎世間的一切事物了！把自己當成活死人吧！」於是我練習這方法半個月。


    有一天，我先生對我說了一些不合理的話，若是往日的我，一定要辯論到底，討個公道。可是我想我正在體驗自己已死，死人哪裡能有本事吵架呢？所以，我若無其事，先生對我的反應愕然莫名。我覺得這方法真是有效，讓我的貪、嗔、痴、及驕慢少了一大半。過了一陣子，老師教我：白骨觀，這回死得更徹底了！回想起來，我的修行路真是好有趣。


    就在那個時期，我的夢變得很美麗，有一次我夢見濟公活佛，像一座山一樣高，全身金光閃閃，夢中的我大喊：「師父！師父！」並想去追他。因為他的腳步太大、走得太快，我一急竟然飛了起來，飛到一處如夢似幻的美麗山水中。


    另一次我夢見在夜晚走到一間教堂旁，我忽而跳上了十字架，然後輕輕的一直浮上了高空中，看到漫天星斗，及很大黃金色的月亮，那寧靜的夜色，閃爍的星光令人難忘！有一次夢見五隻鳳凰飛過我的窗前，那是一種很高雅的姿態，抬頭挺胸，頭頂上長著兩隻柔軟而綠得發亮的羽毛，尾巴的羽毛長長柔柔的飄動著，閃爍著綠色的光芒，那高貴優雅的身姿，令人過目難忘。後來我注意到廟宇彩繪的龍鳳圖案，和我的夢中鳳凰一模一樣，只是缺少了那柔美生動的生命力！


    從我聽聞佛法之後，我的夢，忽然由黑白的變成七彩亮麗的境界，有一次，甚至和聖誕老人共乘雪撬從彩虹上滑下來，簡直可用此景不似在人間來形容！


    # 念佛號


    小時候我很膽小又常看到鬼，因此恐懼得睡不著。父親告訴我：「妳只要念阿彌陀佛，身體就會發光，鬼害怕亮光，會被妳身上的光芒嚇跑了！」


    修行後，我去承天禪寺許多次，但是廣欽老和尚從未對我個人開示什麼。僅有的一次，我帶著幼齡女兒去請他開智慧，之後我站在他老人家身旁，虔誠的望著他，希望他會對我開導修行的方法，忽然他叫住我：「喂！妳過來！」我興奮的洗耳恭聽接下來的開示，他老人家指著我的女兒說：「注意照顧她！她正在吃一張紙屑！」我紅著臉趕緊把紙從女兒嘴裡拿出來，心裡想，他老人家是否認為我連女兒都照顧不周，還談什麼修行？


    有一次我鼓足勇氣，問他老人家：「師父我該如何修行？」他淡淡一笑說：「念阿彌陀佛啦！」從此我訓練自己走路也念佛號，洗碗也念，煮菜、做事，都儘量念佛號，日子久了，頭腦似乎乾淨不少，不會亂糟糟的。睡夢中偶然會預先看見一些未來發生的事，事後也能印證那夢的真實性。但是我覺得那是不夠的，我渴望在清醒中知道整個事的來龍去脈，知道宇宙的真理，找到自己的佛智慧，那才是真正的成就。


    我認識許多的師兄師姐，其中有一些已證得很高等級，他們得到神通自在，並且默默的關心並指導我們，如何在修行中突破心靈障礙。他們的愛心、耐心、定力、超乎一般的修行者，他們的一舉一動，是如此安詳、寧靜與自在。從他們那裡，我學到許多修行的方法，每一段日子後可以察覺自己又進步了！那是一種很安心的感覺！好像你闊別家鄉已久，而今你已經坐上了對號快車，車子正帶著你走向溫馨家園的途中，你數著每一站，知道家鄉越來越近了。


    # 天上的兄長


    記得有一次去問神，是我及大姐陪大表姐一起去的，在基隆路一家道教的廟，法師居然當著眾人面說：「這三個女孩都是天人轉世！」我們只能一笑置之，誰也沒有相信會有這種事。


    隔了幾年，兩位朋友帶我去新店山裡，一座挺大的神廟，這次更怪了！本來一群人排隊問神明問題，都是問什麼答什麼，輪到我時，神明突然唱起歌來，但是每句話都在對我開示：「妳原是天人，你下凡來目的是為了渡人，自己卻迷失了兩百年，都已經忘了回家的路，所以妳的心靈苦很久了！」我問他：「您是誰？」他說：「妳下來兩百年，連自己兄長的聲音也不記得了？」他的歌聲雄壯迷人，絕不輸男高音，聽來有點耳熟，但又不知道在哪兒聽過！


    他接著又唱：「我是妳天上的兄長，我一直在注意妳，妳吃了許多苦，這一世總算想回家了！我知道你一直想修行，目前在學靜坐，只要妳明白陰陽合一的道理時就可以回家了！」我好奇的問：「我這世回得了家嗎？」「可以！因為妳開始修行了。但是別貪玩，天上的母親非常想念妳！只要專心修，這一世肯定可以回家了！」我忽然覺得好安心好快樂！好像迷路的人找到了方向。


    一會兒，神靈退出了法師的身體，我想再問些問題，法師已不復記憶，這時我問旁邊負責翻譯神語的婦人：「神明說了什麼？」她居然說：「神明說，把這些香灰吃了，妳的病就會好！」真是讓人驚訝，她一點也沒聽懂神明的話！我向陪我來的兩位朋友說：「真奇怪，她一點也不明白神明說了什麼？」沒想到他們都很困惑的問我：「究竟神明說了什麼？妳好像大有來頭？為什麼聽得懂神語？神又為什麼對妳講了四十分鐘之久？」


    這時候，輪到我很迷惑，我一直以為我與神的對話，是使用中文，但是一旁所有的人卻又完全聽不懂？那些對話真是天界的語言嗎？而且我認為我和神明只說了五分鐘，為什麼他們說是四十分鐘？這麼長的時間差距是怎麼發生的？這成了不解之謎，但之後回想起來，這個神明的聲音，之前曾經救我一命。


    事情發生在我剛結婚不久的時候，因為二十歲就結婚，婚姻生活使我很苦惱，兩人都太年輕，認知不同，適應不良，不懂得包容對方，脾氣又大，所以時常吵架。有一天剛吵了一架，我覺得十分委屈，就以自殺威脅，他也不理我，逕自睡覺去了。以我當時的驕傲和任性，說了就不會食言，於是我就悲傷的坐在書桌前，寫一封給父母的訣別書，心裡其實也不想為這無聊的小事去死，只是話已出口，不能收回，何況沒良心的他正呼呼大睡呢！該怎麼死法？跳樓，太可怕！也會嚇著別人。跳海，這個好！不用埋葬，省了家人許多事！


    正打好主意，忽然聽見我那「天上兄長」的聲音，嘹亮的唱著：「夫妻本是同林鳥，大限到時各分飛，沒什麼想不開的，快去睡吧！」我伸頭望著窗外，夜空中繁星閃爍著，不知聲音從何而來，但是我忽然覺得很快樂！天外有兄長關心著我哪！我很快的撕了訣別信，躲進被子裡安心的睡覺了！


    # 我的仙丹妙醬


    有一年夏天，得了一種可能是腸炎的毛病，每天下痢數次，所以身體立刻瘦弱下來，但是我記得黃老師曾告訴我：「每天儘管念佛，別太注意身體，病也是想出來的，一切唯心造，只要專心修行，該死的病，醫不好，不該死的病，想死也死不掉！」所以我每天在心中念著佛號，若無其事的拖了二十來天，瘦得走路都有點飄飄然，重心不穩了！


    一天中午，我躺在床上休息，似乎半睡半醒中，看到一位像武俠片中身著勁裝的男子，手裡拿著柺杖走近我的床頭，對我說：「我是李鐵拐，妳的病得吃那個才會好！」說著他指著我的窗戶，我順著他的手勢望去，窗戶的玻璃上有許多草莓醬緩緩的流下來。


    醒來時，一直覺得自己的夢很有想像力呢！李鐵拐不就是八仙過海那個故事中的仙人嗎？何況，古代的人怎麼會知道這種西方食物呢？再說，我的腸胃極差，多吃點甜食就會胃酸過多，所以我一點也不信這個夢。


    隔天我和黃師母談天，談到這個夢，沒想到她叫我吃吃看，她說反正那也很好吃，又不是什麼藥，說不定吃了真的會好呢！我因為草莓醬有防腐劑及色素，所以一直沒去買。


    隔了幾天，嚴重到一天下痢十來次了，當我走到超級市場都快走不動了！這時迎面而來一個甜美的女子，笑容滿面的說：「純天然保證不含防腐劑及色素，來自加拿大的草莓醬。」我想起了我的夢，順手買了一瓶，心裡想，再不吃恐怕就得等死了！


    就這樣，連我自己都難以相信，吃了兩小湯匙之後，肚子一陣清涼，立刻止瀉，吃不到四分之一瓶，腸胃的毛病就不藥而癒了。甚至從此之後，只要腸胃的問題又發生時，草莓醬隨時對我都有效。但別人試我的方法不見得有效，或許這是體質不同的緣故吧！


    # 神仙的地址


    又隔了幾年，有一次，我與家人到獅頭山去玩，在一個王母娘娘廟裡，我們碰到一位修道人，羅師兄，他有通靈的能力，可惜我當時不太信任他。因為我父親獨自先進廟裡，聽到羅師兄對另一位修道人說：「妳看那位進門的女人背後有佛菩薩保護著！她是站蓮花的人。」父親轉頭看那個女人，竟是我的母親！父親很好奇的問羅師兄：「站蓮花的人，是什麼意思？」羅師兄回答：「是佛家的修行者！」他又自稱自己是道家弟子。父親問：「我屬哪一家？」羅師兄笑著說：「你啊！是儒家的讀書人啦！你的修行等級，如果與你妻子比，她是老闆，你是她的門房！幫她看大門那種！」


    父親立刻告訴母親，母親就急忙想拜羅師兄為師，他說：「不行啦！妳有妳自己的師父，妳師父和我師父不是同一個人，妳的等級很高的！妳就快要見到妳師父了！」這時我也好奇了，就問他如何修行？他說：「這兒妳修得最差了，修行人哪有那麼驕傲的？修行人要像成熟的稻子一樣，頭垂得低低的！」我有點不服氣，我想：每次都是我解釋經典給母親聽的，佛經我可看了不少，何況還天天念佛。我都修十年了，母親才剛剛開始，怎麼就遠遠超越我了呢？我問：「我到底是誰來投胎的？」他說：「如果你知道自己是誰，你這輩子就更不想修行了，也不用去證得自己是誰？我是不會告訴你的，免得壞了你的修行路！無論是什麼都要靠自己去證得！」


    我告訴他關於李鐵拐這個夢，問他究竟是真是假？他似乎很高興，好像我提到他的一個好朋友似的！他一本正經的說：「喔！李鐵拐嗎？他住板橋呢！你要不要抄寫他的地址？」說著拿出紙和筆，我張大眼睛驚訝的望著他，他又繼續說：「但是不太好找！因為他常常四處雲遊！」我心想：天哪！我會作夢，你也挺會編故事耶！


    他似乎察覺我的懷疑，就正色道：「事情是這樣的，前些日子，李鐵拐路過這兒曾來看我，像八仙這些神仙，是真實存在的，他們常駐人間，到處渡人，非常忙碌。外表看來和普通人長得一個樣子，你自己也看到過他嘛！如果你努力精進修行，這些過往神仙都會幫忙指點你的！」慈悲的羅師兄又特別指示我，一項未來即將發生在我身上的事，該如何處理比較圓滿，他先把答案告訴了我！


    回家之後不到幾天，果真發生了他意料中的事，但是我當時處理得很困惑，一直不知如何是好，所以在前往加拿大之前又趕去找他，沒想到一趟路興沖沖的到了山上，羅師兄卻在禁語中，只對我點頭致意，我竟失去了請教他問題的機會。


    # 法師的警告


    以前有位同修道友，名叫心潔，不論走到哪裡，手裡總是一串念珠，遇到生人熟客都一律虔誠禮拜，並且口念一句阿彌陀佛，她舉止永遠都是溫文賢淑，讓我們這些初學佛法的人，感到自嘆不如，覺得她的修持必定最好！


    有一天，同修們一起去拜望靜心法師。回來之後，有位同修私下告訴我，不知道為什麼，靜心法師他老人家，竟然重重的打了心潔的肩膀兩下，害得心潔回來之後得貼膏藥。此外還罵心潔說：「妳這條蛇精，還不改妳的毒性，又想來危害世間，竟敢到我寺廟來，還敢帶妳那三條小蛇來，我就是不讓他們進來。妳再不改，報應就不遠了！」這時大家才注意到心潔的三個孩子一直在屋外探頭探腦，卻一步也不敢踏進來，而別的同修的孩子都在屋裡，真是奇怪呢！


    同修們仍然和心潔很要好，總覺得靜心法師他老人家誤會了她。大約一年之後，心潔想在四樓頂加蓋一間佛堂，向許多同修借了數百萬元，卻不肯還錢，還理直氣壯的說：「錢用來蓋佛堂，功德無量。」其中有一個老太太，就只有八十萬老本，借給她之後，生活就出了問題，卻也索求無門，真後悔當時沒有相信法師的話。


    # 慎選修行路


    我有個鄰居名叫愛莉，不知怎麼會迷上一家神廟，剛開始也看不出來，這廟的主持人心術不正，有一次說是帶他們去台南做法，愛莉被安置在一個荒山野外的墳場，每天夜半三更，都得去墳墓旁做法，想利用孤魂野鬼的靈魂，幫忙賺錢，氣氛陰森森、恐怖兮兮的，愛莉害怕得想回家。主持人竟叫人把她打得遍體鱗傷，甚至理光她的頭髮，強迫她出家，還逼她在陰神之前發毒誓。


    有一次愛莉乘人不備，偷跑回家。這些大膽神棍居然跑到她家門外埋伏，嚇得她連續幾個月躲在家中不敢踏出家門一步。幸好出外採購食物有她先生全力幫忙，終於渡過難關。但是愛莉受了這場無妄之災，身心受傷，變得畏縮、憂鬱，精神大不如前，再也不敢相信別人。為了修行走錯路，真是可憐！既危險又浪費了許多時間，選擇師父時，要十分小心。


    另一件事是我在黃老師家學禪時，有一位新來的師姐憂心忡忡的問黃老師：「以前我在一家神壇當弟子之時，拜師那天就發了毒誓，如果將來背叛了教主，就要被毒蛇猛獸咬死。現在我離開了他們，可是我已經中了他們下的蠱，每天夜裡都被一大堆的蛇糾纏著，還有獅子、老虎撲咬我，我簡直就要瘋了，我該怎麼辦呢？」黃老師教她求佛、菩薩保護，並以精神力量，克服內心的恐懼。黃老師強調：修行人要思維清楚，自己有判斷能力，千萬別走入邪門外道，真正的有道修行人，行為端正，身口意清靜，絕不會要求弟子，作一些不合法、或不合情理的事。


    # 六道輪迴


    許多人以為餓鬼道是死後靈魂才可能去的地方。我的夢訊息卻讓我明白，活人也可能處於那種境界。


    有一次，我夢見母親的朋友王阿姨變成餓鬼的形狀，有大大的肚子，細細長長的脖子。她跳到母親的跟前，伸長兩手去掐住母親的脖子，母親為了脫困就叫道：「我沒辦法幫你，去找我二女兒想辦法吧！」只見餓鬼形象的王阿姨立刻轉往我的方向來，我想，台灣離加拿大這麼遠，總要一會兒才會到吧！沒想到，不到一秒鐘，她飛到我面前，手伸好長準備掐我的脖子。我趕緊抓住她的手，因為不忍見到她的餓鬼形象，所以閉上雙眼拼命念佛號，念了好久，張開眼看她仍是餓鬼形象，忽然想起應將念佛功德迴向給她，才迴向完，她已回復人身了！我也嚇醒了。


    第二天，打電話問母親：「王阿姨好嗎？怎麼我夢到她變成餓鬼呢？她不是修行非常精進的嗎？」母親聽了，很驚訝的說：「我聽說她破產了，很可能沒有飯吃，我去看看她！」探望之後，才知道王阿姨已好幾天沒飯吃了，餓得渾身無力，原來王阿姨的兒子賭輸了家產，把家裡所有的錢全賠光，連一點吃飯的錢也沒有了！母親趕緊送她一筆錢讓她渡過這難關。'
