  md: '一天夜裡我夢見我走進一座陵墓中，裡面有幾層台階，潮濕的空氣中瀰漫著濃濁的霉味，泥土味，右邊放置著一座棺槨，我知道躺在裡面的少女，是我四百多年前的女兒。她原來的身分是公主，卻不幸在十八歲時，因為騎馬摔死，他的父親捨不得掌上明珠驟然逝去，所以特地將她的遺體浸泡在防腐劑中保存。從此她的靈魂守著屍體，執著那具早已失去生命力的身體，一直留在陰暗的陵墓中，始終不願出來。我來到她的棺槨前，試圖說服她出來投胎，她一直不肯，她說：「父王說我很美麗，我喜歡父王幫我建造的這個家。」


    我告訴她：「這裡太暗了！外面的世界可以看到陽光，藍天白雲及許多美景，還可以交到許多朋友，學習許多有趣的事物。」她仍在猶豫，我說：「妳就相信媽媽一次！跟著我走吧！……」費盡了唇舌，終於，她願意出來了，我趕緊轉頭往陽間走，不敢回頭望她一眼。因為經過了四百多年，不知如今她的面貌會是如何！所以我只是雙手合掌，拼命的念著佛號，戰戰兢兢的帶著她走回陽間。


