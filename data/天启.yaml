    # 全然的信任


    我常常告訴上帝：「我用人類頭腦的思考模式頗有問題，但是我就是沒法子改！只有請你幫忙修正啦！至於用什麼方法都沒關係，只是請溫柔一點！」


    上帝也真的很努力在幫忙修正！我知道祂無時無刻都在照顧，像一個神祕的戀人二十四小時愛護著我！


    現在我不願用任何一分鐘的注意力，去猜測人類的心思，因為那複雜而且變動不定。我只全然的信任上帝，因為祂從不辜負我，祂從未忘記我，祂是那最貼心的情人！'
  - '[PAGE 344]


    # 上帝的回應


    有一夜，我獨自坐在車上等人。等待的時光中，我對上帝說：「親愛的上帝！我希望你現在給我一點羅曼蒂克的感覺，因為我想更進一步的體會祢的存在！」起初沒有回應，我仍靜靜等待，我深信祂會回應我的願望。


    這時，微風輕拂我的臉龐，一彎金色的明月鑲嵌在湛藍的夜空中，街道看來寧靜美好，來往的車燈與靜立一旁的街燈，相互輝映著，我感覺自己彷彿置身天堂。當我深深的沉浸於夜色中時，忽然聽到對街傳來優美的音樂，就在對街轉角，出現了兩位小提琴手演奏著我覺得最浪漫的一首歌～電影羅密歐與茱麗葉的主題曲A
    time for us！以往我並不知道為什麼每次聽到這首歌，都會引起我的內心蕩漾！現在我明白了，原來是它讓我憶起那永恆的戀人！我生生世世找尋的真愛，原來一直默默陪伴著我！


    我輕輕的對上帝說：「有祢在，我是多麼幸福啊！再也沒有寂寞與徬徨！我深深的愛你～親愛的上帝！謝謝祢！」'
