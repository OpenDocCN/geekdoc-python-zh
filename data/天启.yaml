    # 信任與懷疑


    有些人經常懷疑配偶有外遇，懷疑是一種負面的創造。小時候，常聽長輩說：「嚴官府，出厚賊。」在婚姻方面，也是同樣的道理。越是懷疑配偶，越是嚴謹監管配偶的人，越容易發生外遇的情事。


    建議練習心想事成的創造方法，時時都信任配偶的忠誠。正面的創造，可以為夫妻雙方都帶來正面的能量，婚姻生活會更快樂。修行也是在生活中練習保持快樂的過程。


