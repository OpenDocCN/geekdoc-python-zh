    老太太祈請地藏菩薩引領這胎兒的靈魂去別處投胎，那孩子要求吃三種他一直想吃的食物，兩個包子、兩片餅乾、兩顆糖果，這樣他才願意走。在引領那天，我們夫妻準備了三大盤食物，來補償這個無緣的孩子，說也奇怪，從那天起我的病也不藥而癒了！


