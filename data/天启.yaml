    我們參觀了一個美麗的星球，在綠草如茵的大地上，有許多人在演奏。他們都像是喜歡音樂的年輕人，有男有女，每個人都使用自己喜歡的樂器，有大提琴、小提琴、笛子、豎琴等等。當需要時，鋼琴居然是可以從天而降的，大家都陶醉在美妙的音樂中。


    他們的食物，也很特別，野餐桌上的水果都是透明的，很像我們的果凍，有一種水果形似木瓜，像虎珀一樣透明，木瓜中的咖啡色種子，像是透明的珠子，充滿了視'
  merge: -1
  pgno: 340
- img_proc: true
  md: '覺之美。她說：「你會選擇住在這個星球嗎？」我回答：

    「嗯！我雖然覺得這裡很美也很浪漫，但是如果永遠都在

    演奏，也會覺得很無趣啊！」


    她又帶我去另一個科技先進的星球，這裡是不需要勞

    動工作的星球。食物以及生活必需品都是透過電腦控制，

    由機械自動播種和生產，所有的必需品都可以免費取得。

    風景優美，環境整潔，人們自由自在，想旅遊就乘著小飛

    碟去旅遊，想泛舟潛水都是隨時可以去的，像是一個專門

    度假的星球。但我還是覺得遲早會無聊的，所以它仍不是

    我想要的天堂。


    當飛行器回到家門口，我依依不捨的，向外星朋友揮

    手道別！走在屋前的院子，無意中瞥見，有許多豆大的雨

    珠子，正緩慢的滑落。那些雨珠子滑落的速度，讓我可以

    很仔細的看，它們就像晶瑩剔透的珍珠。我仰望著天空，

    欣賞那漫天透明的珍珠緩緩滑落之美（P.5圖）。那一刻，

    我捨不得走回家中，一直佇立在前院，欣賞這雨中奇景～

    絕美的慢鏡頭。我知道一旦跨進家門，我的振動力會立刻

    變回來，就好像公主又變回灰姑娘了！


    這雨珠滑落的速度，就好像在電影「駭客帝國」裡，

    子彈緩緩前進的那個情節，難怪他們可以徒手把行進中的

    子彈拿住。我終於知道原來在不同的振動頻率裡，可以看

    到物質以不同的速度運行。


    338 / 天啟'
  merge: -1
  pgno: 341
- img_proc: true
  md: 直到現在，每當下雨時，我就好想再看一次，那個緩慢速度滑落的漫天雨珠奇景。
