    有些外星人第一次來到地球投胎，對他們而言，這是全新的嘗試。原本在高科技星球的人，吃穿都不用愁，來到地球常會感覺很失落。外星人太聰明了，所以會想得很遠，反而把自己嚇得魂不守舍。他們常常覺得自己有一身好武藝，卻英雄無用武之地，所以外星人來地球投生並不保證成功，甚至可能比地球人還混得不好。他們想要很多財富，卻不知如何去賺取，因此感到挫敗。他們雖然擅長分析，卻分析不出挫敗的原因。外星人非常容易憤世嫉俗，常常覺得別人比他笨，嘲笑地球人沒氣質，覺得地球人是暴發戶⋯⋯。


