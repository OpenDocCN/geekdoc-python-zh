  md: '# 一切唯心造


    古人說：「一切唯心造。」這裡的「心」是指心智、思維。我們的每一個思維都具有能量，也具有創造力，因此無論一個人想什麼，他已經開始變成他所想的。所以，我們要時時覺察自己正在想什麼，也要謹慎選擇思維所專注的對象或目標。有些人可以閱讀或感知人們的思維。以前我練習在心裡時時念佛號的期間，曾經遇到三位具有天眼通的人。


    第一位有天眼通的人跟我說：「哈哈哈！真好玩！我看到一串串的阿彌陀佛文字，一直從你頭上飄出來。」


    第二位是幫人觀落陰（和已過世親人說話）的乩童，他對我說：「你出去吧！不要待在我這裡。你把我這房子弄得都是光，太亮！太刺眼了！嚇得那些靈魂都跑掉了，不敢來附我的身，我怎麼跟我的客人交代啊？我還要不要做生意啊？」這讓我更明白，念佛號，可以產生光。


    第三位有天眼通的人是我的靈修老師Arthur，他對我說：「你可以不用再念佛號了！你已經練成沒有雜念了，我剛才坐在你身邊二十分鐘，你除了佛號沒有任何一個念頭和想法，現在我可以教你接收訊息了！」'
  merge: -1
