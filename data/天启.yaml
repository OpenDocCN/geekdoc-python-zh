  md: '有一天,長子開著雪佛蘭大車帶我們大家去看電影,上館子。這是我有生以來頭一次上飯館吃飯,我邊吃邊偷偷的笑,開心極了!有錢賺,有飯吃,還有免費電影看,覺得自己像是在度假。


    暑假過去了,小叮噹要回美國去念書了,我向老太太提辭職。但是老太太一直要我留下,開了一個很好的條件,就是放學去她家住,只要陪她就行了,因為兒子們都沒空陪她談天,薪水還有原來的二分之一。


