    # 預知時至


    公公重病期間，我常為他送飯去醫院。有一天，他一反常態，神采奕奕的坐在病床上，很嚴肅的環顧著病房四周，說了幾次：「環境都變了！跟以前都不一樣了！」


    我知道，他的神識已經接近中陰身狀態，偶而可以看見靈界了。其實，人在即將進入靈界之前，靈體已經逐漸脫離肉身，所以開始可以看到靈界。


    他說：「今天換了這張床比較舒服，我也洗澡了。這個房間很暖，前幾天好冷。」我慶幸他在靈界的境界不錯，是乾淨舒適溫暖的。其實，自從入院以來，他的病房及病床一直沒有改變過。他一直喊冷，而且睡得不舒服。但是他現在看到、感覺到的是靈界的景象，所以，跟以前都不一樣了。


    他又說：「從明天起不要再送飯來了！」一向無神論的婆婆以為他腦子混亂了，胡言亂語，叫我別理他。


    我想今晚是他最後一夜了，我得趁半夜他身旁無人時，去提醒他如何面對靈界。要離開人世時，最好是跟隨發光的佛菩薩或天使走，才能往生光明的境界。（《西藏'
