    無求，是全然的放下，

    不掛礙，不惹塵埃，清靜自在。


    問：何謂愛與被愛？

    答：愛是無所求的照顧別人，關心別人。

    大愛是超越凡俗的愛，不綁人，不求回報，

    一心希望別人快樂成長。

    被愛是被照顧、被疼愛的感覺，

    會使被愛者心生歡喜，感到光榮，

    生出信心，發出愛力。'
