    # # 凝視的力量


    以前我練氣功時,師父說:「凝神收心」。光是練習這四個字,就對我有許多的助益!我發現在專注凝視時,可以送出能量,把自己或別人身上的污濁之氣排出體外,因而回復健康。吃素、練氣功不僅可以調整自己的能量,淨化自己的身心靈,還可以幫助自己和家人更健康。


    我兒子約七歲的時候,有一天他發燒了,我坐在他的旁邊看著他,應該說,我只是靜靜的凝視他的身體。幾分鐘後,我發現他身上飄出一陣黑色煙霧,並不是很明顯,我懷疑自己眼睛花了,或是幻覺。但是,這時他流汗了,我摸摸他的額頭,已經退燒了。這個方法我曾用在先生和孩子身上幾次,我印證了凝視確實可以逼出身上的濁氣。


    有一次我去朋友家,她三歲的女兒正在發高燒,約三十九度半,她讓我到孩子房間去看孩子,我說:「帶孩子去看醫生吧!免得燒過頭。」她說:「妳就幫我看看吧!」我不忍心拒絕正在擔憂的她,於是靜靜凝視她的女兒約五分鐘,隱約看到孩子身上飄出一陣陣的黑色煙霧,孩子又奇蹟似的立即退燒了。


    第五部、居家修行 /219'
