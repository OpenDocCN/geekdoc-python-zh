    # 前言


    原本我從未有寫書的念頭，但最近忽然覺得眾生求道艱難，我也是過來人，而我因為生長在大家族，聽聞許多有關因果的實例，又碰到許多神仙、聖者、及在世佛的幫助，讓我逐漸看破放下，專心修行，希望這些真實的故事能帶給人們一些啟示。


    我幼年生長在台灣中部的一個小鎮～通霄，祖父母的家在一個依山傍水的純樸小村，我們是一個大家族聚居在附近，所以諸如三叔公、四嬸婆之類的長輩有許多，至於堂兄弟姊妹至少也有四十幾人。幼年時期，我們成天混跡山林及海邊，快樂的遊玩。拾貝殼，烤地瓜，採野果，日子過得無憂無慮的。夜晚是另一個有趣的世界，母親總會讓我們洗一個香噴噴的澡，吃頓豐富的晚餐，然後我們搬些小椅子到村子中央的廣場去，聽大人們談天說笑，除了當日的趣聞之外，我最愛聽的莫過於那些充滿神祕色彩，又聳人聽聞的靈異故事，它們被這些樸實的長輩們描述起來特別生動，何況又是真人真事，所以我一直想要把我的聽聞寫成文章與大家分享，但是為了尊敬及保障當事人隱私，我已經改變了人名及地點，現在請各位以寧靜的心來閱讀這些故事。


    # 前世因果


    芙蓉是個三十二歲的婦人，剛生下第五個孩子，忽然生了一場大病臥床不起，她的大女兒名叫婉兒，是個非常孝順的女孩。十一歲的她為了想醫治母親的病，聽了長輩們的建議，跑到一間著名的神廟去問神。當神明附身在乩童身上時，是以觀世音菩薩的身分告訴婉兒：「妳的母親過去世曾經殺害三名舞女，她在前一世是名男子，住在台北，他被三名舞女騙了許多錢之後，起了極端的憎恨心，就先後把她們帶到河邊殺害，然後在她們身上綁著大石頭，將屍體沉入水中。在當時從未被破案，所以在他命終之前，並未受到法律制裁，他死後……」觀世音菩薩的話尚未說完，忽然乩童神色轉變，而且換成了另一女子的聲音，帶著憤怒的腔調，原來是其中一名被害的舞女忍不住插嘴了。


    舞女靈魂：「他以為他死了，偷偷溜到鄉下，投胎成女的，我們就找不到他？三十年來我們無時無刻不在找他，現在總算找到了，我們要他立刻償命，才能消了我們的心頭之恨！」婉兒問：「你們是不是捉錯人了，我媽媽可是善良的女子，不是男人！」舞女：「絕對錯不了，我們在閻羅王那兒查過了，也拿了地府令牌。現在是他的死期到了，命債是逃不掉的，更何況我們是三條命，他才一條，已經很便宜他了。就算這一世他投胎成女人，裝得再善良，也不能掩蓋掉前世殘殺我們三人的罪行。」


    婉兒不禁悲傷的哭了起來，她哀求道：「如果我媽媽做錯了是該賠命，可是我那剛出世的妹妹才十幾天大，她沒奶水喝，只怕是要活活餓死的，她是無辜的！這時三個舞女的靈魂討論了一會兒，就派其中一人說：「其實當我們被殺之時，也有著家人父母，及年幼的子女需要照顧，我們死時內心的掙扎與痛苦又有誰同情呢？但是我們實在也不忍心看著妳妹妹餓死，畢竟你妹妹是無辜的，我們決定讓妳媽媽再活一年，可以餵奶，一年到了，我們再來捉拿人！」


    就這樣芙蓉的病奇蹟似的康復了，孩子也平安的養到一歲，就在孩子滿一週歲時，芙蓉又病了。婉兒從未對母親提起問神明之事，但芙蓉在病中總是說，有三名打扮非常美麗的女子，衣著時髦，老愛在她床前跳舞，搞得她頭昏腦脹的。所以婉兒硬著頭皮再一次去了趟觀音廟，這一次菩薩給了許多張符咒，並交代她把符咒貼在門口及窗口，並且再三告誡，當病人好了之後，切勿走出家門一步。然而芙蓉耐不住成日關在家裡，病一好就急急忙忙出門去工作，豈知當天就又病倒了。這次十分嚴重，躺在床上連大小便都不能自理了，婉兒很焦急的趕去請教神明。


    這一次菩薩只是安慰她說：「回去問問妳媽媽吃了別人的東西嗎？如果吃了就沒辦法了。婉兒奔回家中，喘著氣問母親：「媽媽，那三個女人有沒有讓妳吃下什麼？」芙蓉最後一次說的話是：「有啊！就在剛才，三個漂亮女人，好心的給我一個亮晶晶的丸子，說是仙丹，能治好我的病，我才吞下去的！」就從那時起，芙蓉再也不能言語，只是不停的呻吟好像極端痛苦，直到十多日之後，嚥下最後一口氣。


    第一部、邁向修行路 / 33


    # 靈魂的存在


    但芙蓉也並非無聲無息的離開人世而消失於宇宙間，其實她仍是丟不下五個孩子的媽。話說婉兒的父親另娶之後，平時倒也相安無事，但芙蓉的靈魂在必要時會忽然插上一「手」的！有一次在郊外時，婉兒的繼母乘四下無人之際，推打婉兒，婉兒本能的閃開，沒想到繼母自己重心不穩，居然摔了一大跤，嚇到她背著的小嬰兒，那是她自己剛出生的兒子。繼母摔跤之後，嬰孩三天不喝奶，嚇得她急忙跑去問神明。這回觀世音菩薩並未出面，倒是芙蓉的靈魂附在乩童身上說：「妳竟敢在荒野無人之處毆打我的女兒，我只是推了妳一把而已，順便讓妳兒子不敢喝妳的奶，如果有此事，休怪我手下無情！」繼母心虛得直說：「好姐姐！對不起！我再也不敢了。」從此以後，繼母只敢罵人或瞪人，再也不敢動手打婉兒。


    婉兒的同父異母弟弟，有一個名叫文彬的特別愛看書。我小時候暑假回家鄉，特別喜歡去坐在他的房門口聽他吹笛子，那美妙的旋律，如行雲流水般的悅耳，又像訴說著一段段感人的故事，文彬像是用心靈在吹著生命的樂章。他的舉止一直都是那般文靜優雅，臉上總是清新的笑容。他十九歲時從師範學校畢業，開始教書。我始終記得他最後一次到我家時，帶著未婚妻，來拜訪家母時，說是兩人即將訂婚。當時他年輕帥氣的臉頰在陽光下閃爍著光輝，幸福洋溢著，我們心中都為他們感到無限的祝福。


    誰知天有不測風雲，才隔幾天，竟傳來文彬在海濱浴場附近衝浪而溺死的不幸消息。婉兒在失去弟弟之後非常悲傷，她愛她的弟弟，卻再也沒有機會可以疼愛他了。因為婉兒的遺憾，使我有了很大的警惕。從此我盡可能的多疼愛弟弟妹妹，我有了零用錢也會分些給弟妹們，我知道，總有一天，每個人都要面對自己的生老病死，各自離世，唯有珍惜每一刻的相處時間，互相友愛，將來分離時才不會遺憾。


    我們非常懷念這個剛要展翅飛翔的年輕生命，文彬的母親更是無法接受這個最聽話、最善解人意的兒子，在一夕之間消失的事實，所以她去一處神廟，據說可以招亡靈來對話。那天大夥兒一起去，文彬的靈魂沒讓大家失望，很快的出來與大家對話，他說：「我的頭撞到海底岩石，而痛昏過去，就這樣失去生命。起先我很傷心，後來閻羅王第五殿正好缺一名文書，我就在那兒工作到現在，工作很輕鬆，請大家不必擔心我。」接著文彬交代那位痛不欲生的未婚妻說；「我是不可能回去了，妳還是另外找對象結婚吧！別為我難過，我們今生已經無緣了！」


    這事大家也就姑且相信了，因為誰也沒辦法印證文彬是否真的在閻羅王那兒工作，只能自我安慰，相信他在陰間過得不錯！」


    一年之後，文彬的父親車禍過世，文彬的母親再一次受到重擊。因為掛念丈夫，她聽說宜蘭有一家招魂更靈驗，所以邀了原班人馬，大老遠跑去宜蘭牽丈夫的魂魄。文彬的父親一出來就叫著每個人的名字，說他去靈界時，本來是很辛苦的。幸好有個好兒子，在閻羅王第五殿當文書，幫他美言了許多，說他在人間是個好人、好父親，所以他很快就離開陰暗的地方，現在過得比較自由了。


    不同的神靈給了同樣的訊息，這印證文彬真的在閻羅王那兒工作。我開始相信人死後，靈魂真實存在的事實。


    # 未了的親情


    素玉是我母親的遠房親戚，婚後不停的生孩子。生第十胎時難產，孩子被產婆硬擠了出來，因而存活。孩子的父親張大叔，嫌他一出生就剋死親娘，竟把他丟進畚箕裡。誰知，過了一夜，他仍活得好好的，被姊姊偷偷抱了回去。小奶娃在九個兄姐的照顧下也就安然無事。但是每天傍晚大家總被「驚嚇」一回，原來死去的母親心疼孩子們沒人照顧，每天太陽一下山，她的靈魂就從隔一座山的墳地裡回來。


    聽說像一陣陰風過來，素玉家的狗就會吹狗螺，然後一路搖著尾巴追過去，溫順的陪著她回家。素玉一進門第一件事，是幫奶娃蓋被子，順便逗逗他。過一會她會收拾家務，探望每個房間。但是讀者可別想像這是溫馨的場面，九個孩子怕得都躲在被子裡，被子又嫌太小，大家拉來扯去的，深怕自己一條腿，或一隻胳臂露在外頭，真是嚇得魂不附體。


    素玉可不在乎這些，她執著每天固定時間回家探望一番，直到一個月後張大叔帶回了新娘子。這新娘子，新婚之夜就領教了兩人中間夾了一個冰冷軀體的怪事。嚇得她第二天就去廟裡拿了一大堆符咒貼滿了門窗，當晚只聽見素玉在門外哭了一夜，她哭、狗也跟著哭、真令人心酸。這樣過了幾天，張大叔決定搬家，沒幾天全家都搬到彰化去了。


    每當我想到這可憐的女人，一輩子辛苦的生了十胎，卻留不住丈夫的心，只去世短短一個月就忘了她，再與別人結婚。暫不提夫妻的情感，設身處地的想想，一位慈母想照顧自己的孩子，卻因為陰陽兩隔，而被狠心擋在門外，她內心多麼淒苦啊！從此，我對成人世界存在著如此冷漠無情的事實感到困惑，對人性及兩性之間的情愛感到懷疑。


    # 祝福與咒罵


    我的母親心地慈善，生長在農家，少女時期就常要挑扁擔，那是非常粗重的工作。平時她經常與幾位嬸嬸一起工作，但這些嬸嬸常常輪流在懷孕，有時還兩、三人同時懷孕，可是農家人懷孕仍是得做這些粗活。母親看到她們大腹便便的挑擔子，於心不忍，所以她總會走得特別快，像小跑步一樣，先把自己的擔子挑下山，再跑回去替嬸嬸們挑，她常常跑了三趟，寧可累自己，也不忍累壞孕婦。所以，我母親要出嫁時，她的叔叔嬸嬸們特地打了許多金鍊子送給她，又獲得許多誠心的「祝福」！這些祝福隨著她的人生持續的開花結果。


    另一面借鏡讓我明白，千萬別做那些會被別人在背後「咒罵」的事。小時候有個鄰居，非常調皮，他最喜歡走在田裡，而且一腳踩壞一顆高麗菜，或踩死一株株的稻苗，大概他覺得很有趣，但是後面常有氣急敗壞的老農夫，邊追邊咒罵：「夭壽的死孩子！」老農夫辛苦的翻土，播種了許久，每日扛水灌溉，眼看就要收穫，賣點錢貼補家用，偏偏碰到這種頑童，真是欲哭無淚，只能扯著喉嚨罵出心中的怨恨。然而那股怨氣，真能凝成一股負面的力量！


    他十八歲那年。有一天，他來我家玩，突然和我們談了許多事，包括他的學徒工作以及碰到的許多挫折，雖然都是不如意的事，但他還是有說有笑。我聽了相當心疼，覺得他年紀輕輕，無法繼續念書，必須遠離家人家鄉，獨自辛苦工作賺錢養活自己。但是我也覺得奇怪，平時文靜寡言的他，怎麼變得如此健談？這是前所未有的事。我們完全沒料到，他是來向我們作最後的訣別！


    過幾天他去游泳，就失蹤了。我父親受託去找尋他的屍體，請了船家打撈，卻始終找不到，於是父親焚香對他說：「如果你死後有靈，請引導我們找到你的屍體。」


    沒多久，看到水面有一處冒出許多大水泡，父親立即請船家到那兒打撈，不一會兒就看到他，雙手好似抓著打撈的繩索一般，被拉出水面。三十幾個小時之後（民國五十幾年時的交通尚未發達），他的父母兄姊從家鄉通霄趕到現場，撕心裂肺的呼喊他的名字時，他忽然七孔大量流血，似乎哀傷至極！


    當時我曾告訴母親，如果我可以替他死就好了，他的家人就不必那麼悲傷了，但是，母親悲傷的說：「如果換成是你死，我也是一樣會非常悲傷的！」'
  mdcn: '事蹟。現在回想起來，那也還是天啟訊息之一。踏上修行路之後，才明白每個人在自己的朝聖旅程中，都要走出一條自己的英雄路。


    小學四年級時，二姐帶我去看電影《齊瓦哥醫生》，第二天，我的導師問大家，有人去看《齊瓦哥醫生》嗎？全班只有我舉手，老師問我：「你看得懂嗎？」我說：「不太懂。」老師說：「我也不能了解！」高中時，我再看一遍，男主角逃難時，在擁擠混亂的火車廂中，從底牆開窗，仰望冬日太陽的那一幕，令我深受感動。在我高中的學習困境中，那個畫面為我帶來了光明和力量。大學時，我再看一遍，對於女主角的情欲掙扎，有更深入的了解。但是，難以接受那困惑與混亂。最近再看一遍，我發現，我可以理解、接受、包容和欣賞劇中的每一個角色，他們在人生的每一個階段，勇於活出自己的生命力。我才發現，二姐為我播下的那顆種子，在漫長的四十五年後，終於開花結果了！


    Samantha喜歡在睡前聽古典音樂，小時候家中有一片鋼琴名曲集的唱片，晚上睡前她就會播這片音樂。其中有一首是韋伯的〈邀舞〉，原本我覺得它好沉悶，不喜歡聽，希望能跳過這首歌。但是，二姐像說童話故事般的為我「導聆」。她說這首歌在形容一場盛大的舞會～舞會剛開始，大家彼此不太認識，場面比較安靜，因此，音樂是溫和的慢板。觀察一段時間後，一位紳士彬彬有禮的邀請他所心儀的女士。但是，這位淑女總要表示一下矜持，因此婉言謝絕。然而這位紳士持續的與她談話，慢慢取得她的好感，交談越來越熱絡，音樂隨之迴旋和加速。經過幾番的邀請之後，這位淑女終於同意與他共舞。於是他們在優雅的圓舞曲聲中翩翩起舞。隨著舞步的加快，音樂越來越熱情奔放，在華麗歡欣熱騰的樂聲中達到最高潮。當舞蹈圓滿的結束之後，音樂又回到慢板，紳士彬彬有禮的致謝，淑女也回禮告別。舞會為雙方留下了美好的回憶。~聽完二姐的導聆，從此我愛上了這首樂曲。


    60年代的台灣，以美國為主流的西方流行文化與思想，隨著美國對台的經濟援助輸入台灣，Samantha很喜歡西洋流行歌曲，常常聽到她唱著自己喜愛的英文歌。尤其約會前，她會一邊哼著歌，一邊梳妝打扮，好像一隻翩翩飛舞的蝴蝶，穿梭於化妝鏡前。當她準備好要出門時，我抬頭仰望我美麗的姐姐，她身穿自己縫製的細肩帶洋裝，明黃色碎花布上面飾以白色細緻的蕾絲，頭上繫著金黃色的緞帶，全身散發著清新亮麗的氣息，她對著我眨眨眼，像一縷輕風般飛去赴約了!


    有時候Samantha會帶著我去約會，我是她的小跟班、小電燈泡，她會觀察男朋友如何對待小孩，回到家也會問我，對她的男朋友作何感想。只是沒想到，現在她與上主談戀愛了，要寫一本情書，我仍是一個電燈泡咧!


    作者介紹～我心目中的Samantha / 23


    Samantha在原生家庭中所扮演的角色是「先鋒者」。由於父母親生長於農村，有許多傳統保守的觀念，再加之有兩位親人，相繼於游泳時意外喪生，英年早逝，父母親對我們的保護更加小心翼翼。因此許多需要外宿或有危險的運動或活動，一律不准我們參加。我記得，Samantha想去參加救國團的中橫健行隊時，是經過一番激烈的爭取，父母才首肯的。輪到我大學想要去參加時，父母親這一關就輕鬆的通過了。Samantha和一位美麗的表姊，兩人在70年代初期，就經常隨著美國的流行穿迷你裙，當時母親常常訓誡二姐，甚至惡言怒罵，彷彿她是離經叛道的孩子。但是，二姐依然勇敢的展現自己的青春之美，絕不妥協！誰也沒有料到，後來，這兩位時尚的妙齡少女，都是家族中最早開始靈修的先鋒者，表姊移民南非，在那裡開了一個道場，服務當地的有緣人。Samantha移民北美加拿大，隨緣加入Arthur的靈性聚會，目前透過網路服務在地球上的有緣人。雖然，兩人各奔南北，但是都走在靈修和服務的道路上。


    Samantha五專畢業後，帥氣的告訴父親，我幫您把商科讀完了，現在我要去畫畫了。於是她找到一個油畫的工作室，開始她的繪畫學習和工作，當時畫的大多是外銷的油畫。一段時間後，她就購置了人生中的第一間房子。後來，親朋好友們欣賞她的畫，幾乎家家都掛了一幅她的油畫，有位舅舅還請她去畫壁畫呢！我在大學時也特別請姐姐為我男朋友的畫，畫的兩旁有青翠茂盛的大樹（象徵家人健康強壯），遠方有閃耀著銀白光輝的森林（象徵光明豐盛的未來），清澈的溪水從遠方流入（象徵擁有源源不斷的能量流），溪畔有著金黃色的石頭（象徵穩定的財富）。那幅美麗的畫至今仍然掛在我先生原生家庭的客廳，我的婆婆一直都很喜歡它。在我看來，這些油畫為每一個親友的家開了一扇美麗的窗，從家中隨時可以看見大自然的美。


    *Samantha*在結婚後，經歷了許多人生考驗，在本書中已經毫不保留的與讀者們分享，讀者可以從書中了解她的心路歷程。那段期間，我正處於升學與考試的奮鬥階段，我們相會的時間極少，所以，我也是透過這本書的編輯，才有更深入的了解。


    1999年台灣大地震，2000年父親病危和往生，當時對我們而言，都是相當大的考驗，而我們靈性成長的道路，也再次交織在一起。2002年*Samantha*閉關期間的前後，我與她密切聯繫，也盡量同步閉關。禁語期間*Samantha*透過傳真機（當時網路尚未普及）將指導靈的訊息傳給我，讓我知道自己在當時應該如何修正身口意。我們兩人都專注於內在的提升，知道哪裡需要修改就改，通過之後指導靈會有新的提醒，我們就立即再修正。感覺上好像武俠小說中的衝關，一關一關的通過。這些閉關過程的詳細訊息，都收錄在本書的第二部。


    2004年Samantha特別為我翻譯《Opening to Channel～打開頻道》的1～7章，看了之後，我深深被指導靈們的光與愛所感動。這本書可以讓我們對於通靈和指導靈有正確的了解，建議有興趣的讀者可以閱讀，台灣中文版於2011年正式出版，譯者將書名譯為：《開放通靈》。


    2006年去多倫多學習時，我們的靈性導師Arthur為我們解說天火（The Spirit of Fire）。下課後，我與Samantha一起搭地鐵回家的路上，我心裡正想著，不知何年何月何日才能達到三火合一的狀態，覺得自己好像離這目標還很遙遠，雖然嚮往，但有一點沮喪。而Samantha一路上興奮得幾乎是要旋轉飛舞的樣子。她說，今天老師傳授的內容好棒！她對我們姐妹的成長充滿了信心。我驚訝的望著她開心的笑容。心想，她是多麼勇敢和無畏啊！在修行的道路上，她的信心和勇氣，是我最羨慕和最需要學習的。這些年來，每當我自信不足落入修行低潮時，她總是那個努力把我往上拉拔的人，雖然，我的小我偶爾會與她抗爭，但她總是不放棄，永遠愛護我，提攜我。


    Samantha 的個性與我在許多方面是互補的，因此，上天總是把我們安排在一起學習和成長。多年來的配合與磨練之後，我發現，每當我們聯手一起「出任務」時，總是有美好的成果，有時甚至可以感受到上天的歡呼和鼓舞！印象非常深刻的是，有一天在多倫多，從早上八點多一直到晚上八點多，我們一起陪伴上天安排來的幾位有緣人，他們離去後，我們正興高采烈的討論當天的成長心得時，忽然門鈴響了！二姐夫的舅媽送來一大箱水果，打開後放上大圓桌，是滿滿的一桌香檳葡萄！上天透過親人，為我們送來了香檳，慶祝當天的圓滿豐收，多麼貼心的上天啊！


    這一次編輯出版《天啟》的任務，是在《神遊時空》即將出版時就接到的派令。過程中，我們都在接受信心的考驗，無論是對自己、對家人、對親友、對師長、對指導靈、對上天的信心，一一都在接受考驗。在此，我要感謝上天和親愛的Samantha對我完全的信任和包容，當她傳給我原稿之後，同時也授予我完全的自由去篩選和編輯。雖然我知道，真正的編輯者不在我，我只是人間的一個管道。但是，過程中，我盡量讓自己保持平靜，接受上天的啟發，希望能夠真正隨順天意！


    自從Samantha學習通靈之後，我深深的愛上了來自上天的訊息和啟發，我可以分辨那些來自更高的智慧訊息，因為它們自有清晰的能量和寬廣的見解，過去現在和未來都在指導靈考量的範圍內，而且他們往往都是一針見血的指出問題的癥結，完全是根據當事人的狀況而量身訂做的解答。這些年來我們盡可能的記錄這些美好的靈界訊息，也在為當事人保密的前提下，與許多有緣的人分享上天的智慧和指引。


    作者介紹～我心目中的Samantha / 27


