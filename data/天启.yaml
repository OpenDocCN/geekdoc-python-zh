    # 神聖的任務


    有位朋友是土木技師在工程顧問公司服務，專門負責承攬處理工業廢料工程。他總覺得事業上沒有突破，有一天他去請教一位已證神通的居士，這位居士對他說：「你本是天神轉世的，有重要任務在身，你所負責丟棄的有毒工業廢料，關係許多人的性命，要認真去完成，才不會辜負使命！」


    本來這位朋友覺得丟棄廢料，是沒有成就感的工作，沒想到居然是重大的任務。他聽了之後非常努力的尋找到合適的地點，終於在某偏遠無人之處，買到一處適當的土地，小心翼翼的放置那批工業廢料，完成使命。


    千萬不要看輕自己的工作，去了解它利益眾生的層面和價值，然後用心完成自己份內的工作，就是功德一件。


    # 愛惜公物是惜福


    有一位女士，每次去公共游泳池，沖澡都開最強的水，嘩啦啦沖水一個多小時之久。管理員提醒她，但是她卻依然故我，想沖多久就沖多久，絲毫不珍惜公共的資源。


    她有一棟房屋出租，三十年來每月的水費都高到驚人，她老是抱怨房客亂用水。她跟我訴苦後，我猜想她家可能有地方在漏水。後來水電人員查出原因，是她家地下室一個久未使用的廁所在漏水，平均一個月大約流掉台幣一萬多元。濫用公家的水，結果自家的水也莫名的被耗用，宇宙的因果律，似乎悄悄的在運作。


    有些人以為公共的資源就不必節省，我們使用公廁時，常會發現有人用完水龍頭不會去關緊，其實，白白流掉的水正是在損耗自己用水的福報，而且浪費水資源的人，將來還可能會有缺水、或生長在沙漠國家無水可用的果報。奉勸大家當用才用，以免流失自己的福報，或造了未來的惡報。


    # 累積功德的方法


    服務是累積功德的方法之一。重點在於：帶著愛心，以及付出不求回報的心服務。如果一邊服務一邊生氣，功德很少，甚至於有業障。


    服務的方式有許多，在這裡舉一些簡單的例子：


    在家中，以愛心洗碗、洗衣、燒飯，照顧配偶、幼兒、父母、公婆或親人朋友，幫家人理髮、洗澡、整理家務等等。


    在工作中，在社區中，在大環境中，視情況的需要，都可以為人們服務。比如以愛心幫助人們靈性成長，教導他人學習讀書、繪畫、插花、園藝、烹飪、文學、藝術、音樂、舞蹈或其他自己擅長的項目等。或當環保義工，為大眾服務，或為老人院、孤兒院、或食物銀行服務。


    不要小看這些零零碎碎的服務，每一次的服務靈界都有計分的，都有累計功德。這些服務功德，可以為自己或家人朋友減輕業障、延長壽命、增加福報。人生只有短短幾十年，如果無所事事，時間也很快就過去了。把握珍貴的時間服務，因為在服務過程中，很容易放下我執，發展無條件的愛心。


    # 第五部 居家修行 修行篇


    - 敦促

    - 修身

    - 六度

    - 逆境考

    - 物質幻相

