  md: '# 量子療癒場


    大約在2006年Arthur老師介紹我們去看一個從加拿大BC省來的十九歲男孩亞當（Adam McLeod），他天生就可以看到人類及動物身上的光環（能量場），所以，他小時候最不解的是：為什麼要玩抓迷藏這種遊戲？因為，他可以看到人的大光環，當小朋友躲在樹幹後面時，對他而言，就好像一個人躲在掃帚柄後面一樣好笑。他一直以為每個人都和他一樣，可以看到這個彩色的人體光環。他甚至可以清楚透視人體內細胞運轉的情形，以及患病部位的情況。


    他可以調整人體器官內阻塞滯留的能量，使它在體內運行暢通，因此他治療了許多病人。但是，他建議人們自己調整身心，使自己經常保持在正面積極樂觀的狀態，才能真正治癒自己的疾病。（註：2018年秋季起，亞當博士已經不再接受病患了，他有更新的研究計畫和方向。）


