  md: '事後回想,我在發脾氣時是理直氣壯的,因為我認為都是他們造成髒亂的,可是為何之前的許多天,我都可以包容這個環境,對髒亂視而不見呢?而今天看了為什麼就會發脾氣呢?第二天,我發現自己月事來了,才想起,每次發生爭吵時,先生都會說:「你的月事快要來了吧!」他每次都猜對了。我才發現,自己的情緒經常受到生理期的影響,從此,我練習在生理期前後,盡量多休息,保持平靜和放鬆,生活簡單,避免造成不必要的壓力,讓家人都能享有平安和樂的生活。


