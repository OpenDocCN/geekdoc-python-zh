    # 如露亦如電


    一切有為法

    如夢幻泡影

    如露亦如電

    應作如是觀～金剛經～


    就讀五專一年級的暑假，我去當保母，這是我打工賺到最多錢的一次，有電子公司薪水的兩倍。應徵當天是個颱風天，走進豪宅，真是羨慕呀！就連人家的傭人房，都是有衛浴設備呢！我乾脆住下來了，然後才打電話通知爸媽。媽媽在電話中說：「妳爸在公家機關是個主管，同事們稱妳們姊妹是千金，妳不當小姐，卻要跑去當傭人。」


    我說：「放心！我報了一個英文名字叫做碧莉（當天的颱風名字），碰到熟人我一概不認識。不會給妳丟臉的，沒人知道我是誰。」講完立刻掛電話。嘿嘿！將在外，君命有所不受！


    這真是個舒服的工作，只需陪一個六歲的男孩，他綽號小叮噹，是中外混血兒，長得好可愛好乖。他住外祖母家，他的外祖母也就是僱用我的人，是大約60歲的老太'
  - '[PAGE 46]


    太，她還僱用一名司機，及一個煮飯的婦人。


    幾天後，老太太的三兒子從軍隊休假回家，命令我煎蛋給他吃，我說煮飯不是我的任務。（其實，當時十四歲的我，根本不會煎蛋，那只是我的藉口。）他就生氣了，大呼小叫的。老太太來了，看我在收拾衣物準備回家，就一直挽留，還加薪給我。事後，司機說老太太其實很兇，許多僱來的小妹都被罵跑了，他覺得老太太對我的好，超乎一般常情。


    老太太的長子是一位溫文和善的人，常幫忙餵小叮噹吃飯。次子也很文靜，從不麻煩我。她的長外孫子面貌清秀，就讀私立高中名校，成績都是第一名，牆上掛滿獎狀。長外孫女也是同一所高中，品學兼優，氣質高雅，清秀亮麗，身材高挑，皮膚白皙，是我最欣賞的典型。她的小外孫女雅芳還是個小學生，鋼琴彈得相當好，常常應我的要求，彈我最喜歡的一首鋼琴名曲給我聽。聲音嬌滴滴的雅芳，幾乎是整天守在我身邊，要求我講童話故事給她聽。當時，看他們兄妹三人，住在這美麗豪宅裡，每天有說有笑的，看著大銀幕電視，真是令人羨慕啊！


    有一天，我和雅芳在她家附近的別墅區散步，看到一間更大的豪宅，雅芳很羨慕那家人擁有寬敞的游泳池，我才發現，人們不論多麼富有，也不會感到滿足的，因為小我頭腦永遠在比較啊！


