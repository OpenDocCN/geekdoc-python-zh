    # 情緒管理


    修行許多年後，我還是很容易生氣，我希望自己能改變習氣，所以向我的靈修導師請教如何改掉我的壞脾氣？他說：「我不覺得你脾氣壞，只是你情緒升起時比較激動，你要學會情緒管理，當自己情緒的主人，不要被情緒牽著走。」於是，我開始練習時時觀察自己情緒的起伏。


    平時，我很愛先生、孩子，但是，在整理環境時，常常把大家數落一頓，甚至罵得全家落荒而逃。有一次，先生跟孩子們都被我罵走了，因為我叫大家立刻滾蛋，我暫時不想看到他們。他們趕緊都撤出去之後，我很快就冷靜下來了。


    過了半小時，女兒從門縫探頭進來說：「媽媽你好了嗎？」我說：「早就好了，你們去了哪裡？」她說：「只是去車房，好多蚊子喲！」接著門開了，先生、兒子都跟著女兒溜進門，各就各位坐回自己電腦桌前。他們的姿態讓我聯想起以前媽媽養的母雞，總是喜歡走到窩裡，抖抖身子，整理好羽毛，安穩的坐著孵蛋的樣子。我有點啼笑皆非，沒想到自己的火爆情緒，竟然弄得三個我心愛的人兒不得安寧，還得去車房餵蚊子，真是不好意思！'
  - '[PAGE 242]


    事後回想,我在發脾氣時是理直氣壯的,因為我認為都是他們造成髒亂的,可是為何之前的許多天,我都可以包容這個環境,對髒亂視而不見呢?而今天看了為什麼就會發脾氣呢?第二天,我發現自己月事來了,才想起,每次發生爭吵時,先生都會說:「你的月事快要來了吧!」他每次都猜對了。我才發現,自己的情緒經常受到生理期的影響,從此,我練習在生理期前後,盡量多休息,保持平靜和放鬆,生活簡單,避免造成不必要的壓力,讓家人都能享有平安和樂的生活。


    此外,我觀察到,自己情緒起伏的原因,多半來自對於名譽的得失心,尤其我對於被別人誣陷的情況,幾乎沒有免疫力,我會一直去辯解。我的導師Arthur經常接收天意來考驗我這個執著。每一次失敗後,導師會說,你怎麼又被我考倒了!直到有一天我終於感到厭煩了,不想再解釋了!導師問我:「你還在乎別人的批評嗎?」我說:「看淡得失,我已經懶得生氣了!」導師高興的說:「懶得生氣,就是過關了!」我說:「這樣也算過關啊?」他說:「因為不在乎了,才會懶得生氣,你已經不執著個人的名譽了!」


    我繼續練習觀察自己的每一個起心動念,是否還有任何執著?對於外界的人事物還有批評嗎?只要有執著、有批評,一定會產生負面情緒。因此,我練習感謝上帝送到面前來的每個人事物,學習去欣賞、接受,和無條件的愛


    第五部、居家修行 / 239'
- md: '所有的人事物。我相信，有朝一日，我的情感將會昇華為愛。


    ## 放下生死的恐懼


    ～死亡絕非終結，只是另一段旅程的開端！～


    其實，任何自己或別人所發生的事情，都只是課程，沒那麼可怕。連「死亡」也都只是幻覺。與其擔心死亡，不如好好活在當下。真相是：沒有死亡，只有時間到了，應該回靈界的家。在人間時，我們應該發揮所長，認真服務，直到「回家」的時間到來。這時自然有靈界的友人來迎接我們，回到靈界的天家。有些人看不見靈界，不相信死後有靈界，老愛跟我辯論，我說：「不管你信不信有靈界，靈界不會因為你不信，就不存在。」


    在這本書中，我述說了許多和「靈界」有關的事情，就是為了讓朋友們更了解靈界的存在。如果喜歡看漫畫的讀者，建議看《漫畫靈界（靈界見聞錄）》那是有關十八世紀瑞典科學家史威登堡（Emanuel
    Swedenborg）探訪靈界的真實見聞，由日本醫師今村光一根據史威登堡的暢銷鉅著《天堂與地獄》翻譯、摘要、編輯而成的漫畫書籍，圖文並茂非常容易了解。《天堂與地獄》出版至今已被譯為各國語言，中文譯本至少也有三個版本，有興趣想要更深入了解靈界的讀者，可以閱讀這本書。


    ## 情緒引來的笑話


    我先生平時在家裡對我滿體貼溫柔的，但是他的個性很急，一急起來就會亂吼亂叫。結婚多年，我已經習慣了，我知道他沒什麼惡意，吼完一會兒，自己就會來陪禮道歉。我覺得他的脾氣像小孩一樣，但這也不是說改就能夠改的，所以就多包容囉！


    然而，我們住在加拿大多倫多，這裡的男士對女士大都是具有紳士風度的。有一天，我與先生開車去一間電料商，卻買不到所需的電線材料，我說我們去另外一間電料商吧！我老公就開始發飆了，他大吼著說：「我絕對不去！你都只會指揮我東西南北的跑，你知道那家店有多遠嗎？」原來兩地相隔大約五十公里，而我沒有地理位置的概念，以為很近。那時有位白人走過來勸說：「要疼愛自己的女人啊！對女人要疼愛不能用罵的！」緊跟著又來了一位黑人，也很嚴肅的跟我老公說：「Be
    a man！（要像個男人）要有紳士風度，對女人說話要客氣溫柔。」


    我差點笑出來但我忍著，禮貌的跟兩位男士道謝。等他們走遠了，我跟先生說：「Be a man！哈哈！哈哈！」有時候，我們情緒化時，旁人會以為我們是在吵架，聽不懂中文的外國人就誤會大了。


    ## 負面情緒的影響


    - 一、習慣性的妒忌、憤怒容易造成心臟、肝功能、痔瘡、貧血和視力的問題。

    - 二、感覺寂寞、孤獨、缺乏愛，易有過敏、鼻塞、咳嗽、肺部功能的問題，以及人際關係疏離的情況。

    - 三、抑鬱、憂傷、恐懼感深的人，會覺得能量不足、容易疲倦、對體能的無力感、肩痛，手腳冰冷。

    - 四、過多的擔憂形成胃部的疾病，消化不良、胃酸過多、胃脹氣等等消化系統的障礙。

    - 五、氣喘大多是幼年時期害怕和母親分離，或害怕弟妹的出生，分散了母親對自己的關愛。

    - 六、腎臟病和糖尿病是不肯釋放過時且負面的情緒。

    - 七、高傲、死板、頑固的人，容易引起膝蓋關節疼痛。

    - 八、覺得挫敗連連，或不能自在表達情感者，容易咳嗽、喉嚨發炎、口腔潰瘍。

    - 九、在發生癌症之前，當事人可能曾經發生極端的恐懼、負面、憤怒、抑壓的情緒。

    - 十、心臟與愛有關，若表達愛和接受愛的能力出現問題，容易產生心血管的疾病。比如，高血壓是吝於表達對人們的愛心所致。


    ## 情緒失控的危險


    習慣發脾氣的人，身體容易被其他靈魂借用。發脾氣時，容易引來情緒強烈且憎恨心重的靈魂。他們隨著當事人的情緒振動力，介入當事人的情緒、思維和身體。


    曾經有許多平時相愛的人，在吵架時不小心刺傷對方，或殺死對方。他們本來並沒有想這麼做，只是生氣時沒有辦法控制自己，像發了瘋一樣。其實，當時只是身體被其他靈魂借用，失去控制自己意志力的能力，就連身體的肢體都被介入的靈魂使用，事後懊悔都來不及了，感覺自己像做了一場惡夢。


    靈魂暫時介入的時間通常不會很久，大約一兩小時，他們會出去。因為人體屬陽，它們屬陰，他們無法在人體內太久，所以會自動離開。這時剛才被介入者，會清醒過來。所以發生爭吵或衝突時，最好至少有一方能警覺到，保持冷靜，暫時先藉故離開，彼此隔離幾小時，避免被借用。


    被靈體介入時，通常會有異樣的感覺，比如耳朵被一種壓力蒙住，或是一瞬間耳朵很痛，或是一個很尖銳的聲音刺入耳朵的感覺。因為耳膜很敏銳，容易感覺靈體的振動力侵入或離開。如果感覺被侵入，趕緊專心念佛號，或念四句，或集中注意力靜心，介入的靈魂受不了我們凝神收心時所產生的全能量，就會離開。


    ## 轉換情緒的良方


    振動頻率好的音樂可以淨化身心，紓解情緒，快速調整我們不平衡的振動力，產生美好的氛圍和磁場。


    有時我看到一些憤怒的人，頭上冒出一股股的黑煙，那些黑煙會使室內充滿淡淡的黑色霧氣，使自己與家人生病。還有一些人是比較抑鬱、封閉不愛別人，不喜歡與別人共處，他們是頭頂或身體冒著土黃色的煙霧，會讓他自己和家人感覺鼻塞、咳嗽、眼睛不舒服。這些煙霧是有毒的能量，讓人覺得不舒服，有時打開窗戶也不會出去。為了清理這些能量，我會播放音樂，利用音樂的振動力，清理室內的磁場。


    閉關的時候，我也會用一些時間聽音樂，享受並且融入美好的樂聲中。很快的，感覺身心靈像是被洗淨了，就像是雨後的天空，清澈澄明！


