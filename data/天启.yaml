    # 夫妻的性生活


    許多人前來詢問夫妻性生活的問題，社會新聞中，也有因誤會而發生悲劇的驚悚個案，所以在此特別提出個人的見聞與想法。


    我有一位好朋友，年輕時與先生感情很好，總是出雙入對的。但中年後，先生逐漸對她冷淡，常常躲避她。因此，她開始懷疑先生有外遇，常常跟先生吵架。離婚後，才發現完全是誤會，他先生只是有性功能障礙，根本沒有外遇對象，離婚後依然是單身，就在另一條街上租屋獨自生活，原本相愛的兩人，卻從此咫尺天涯，美好的家庭就這樣破碎了，這是我接觸的許多類似案例之一。


    四十多歲時的離婚率相當高，其中一個可能的原因是，中年男性體能開始下降，有些男性開始害怕妻子主動，因為他們的生理不是隨時都可以做愛的，如果他們沒有需求或欲望時，這時妻子突然找他做愛，他會非常緊張，覺得自己難以滿足妻子。有些丈夫為了躲開性欲強的妻子，甚至找藉口，或裝作有婚外情，最後導致離婚。


    其實，有性功能障礙的男性並不少。我有個朋友在診所工作，她說有許多男性，包括高大威猛的肌肉男，都'
  - '[PAGE 283]


    來拿「威而鋼」。建議男性若有性功能障礙，對於自己的妻子，不要羞於啟齒，最好勇敢的說出來，與妻子一起討論和解決，大部分的妻子都可以諒解與配合的。大多數女性對於性的需求並不大，女性真正渴望的是被愛以及被呵護的感覺。許多男性並不了解女性，總把女人想成如狼似虎，其實，女性更喜歡的是溫柔體貼的陪伴，而不是老守著床第做那件事情。


    婚姻生活中，最珍貴的是無條件的愛與交流，夫妻可以一起培養共同的興趣，比如：閱讀、運動、旅行、繪畫、烹飪、看電影、聽音樂、喝咖啡談天等等。夫妻可以一起學習，一起靈性成長，一起完成共同的理想。夫妻在一起有許多事情可以做，若加上一些創造力還可以更富有變化。


    在此誠心的祝福：

    每一對夫妻都能過著和諧、充實、美滿的婚姻生活！'
