    夢是重要的訊息來源，建議床頭放一支筆和日記本，醒來時，盡快把夢記錄在日記裡面。有些夢訊息可以幫我們或別人解決一些事情，以下列舉幾個夢訊息。


    ## 求救


    我夢見一位四十幾年不曾會面的同學，帶著他的小女兒來找我求救。


    過幾天，我看見他的妻子在網路上發出他的病危通知，她說準備去買棺材了。為了這個在夢中求救的同學，我臨時決定買機票，從多倫多回台北，看看能為我的同學做點什麼。


    到了臺大醫院，我看見呼吸急促，垂死掙扎的同學，我問他的妻子，究竟他與小女兒間發生什麼事，使他生病了？她說，父女吵架吵得很激烈，同學很憤怒，忽然中風倒地。我問她為何放棄治療先生。她說：「因為擔心他以後四肢有後遺症，所以放棄治療。」


    我發現我的同學意識還很清楚，他很想活下去，只是不能言語。我問我同學，是否記得我是誰，他居然艱難的微弱的說出我的名字。我覺得他應該會復原。


    我對同學說：「如果你想活下去，就握緊我的手。」他很努力的握我的手。於是，我鄭重要求他的妻子，讓他接受治療。她說：「他這樣會拖累我們全家。」


    第六部、解析夢訊息/303


    我說：「可是他想活下去，妳不救他，等於殺了他。人的靈魂是不會死的，如果妳讓他肉體死了，他的靈魂會來找妳算帳的，到時候妳也不可能平靜的過生活。」她被我說動了，當天簽字讓她先生接受治療，我的同學才撿回一條性命。


    ## 地毯


    有位朋友，搬進郊區新房子後，先生失業了，運氣很不順，總是跟我訴說。我想幫忙，卻不知從哪裡著手。有一天，我夢見去她家，看見三片暗褐色的地毯，我拿水管噴洗那些地毯，裡面一直流出血水來。醒來後，我打電話問她，是否有那樣的三片地毯？她查看了一下，真的找到大小不同的三片暗褐色地毯，是由一片分割的，分別鋪在不同的地方，那是前屋主留下來的。我說：「扔出去吧！那地毯有問題，會影響你家的運氣。」她立刻就把地毯扔出去了。


    當晚，打坐時，一個外國女子的靈體出現在我面前，面容很難看，我說：「其實真正的妳不是長這個樣子的，妳是上主完美的孩子，請展現妳美麗的面容！」她立刻變回生前金髮碧眼的面貌。她說，她本來住在地毯上，現在被丟到戶外了，她覺得很冷（當天屋外氣溫低於零度）。我問她怎麼會住地毯上？她說，之前，她和男友在地毯上吸毒玩樂時，男友不小心失手弄死她了。


    當下，我呼請天使帶她回靈界，她隨著天使離開了！不久，朋友的先生找到高薪的工作，家庭運氣轉好，經濟也變富裕了！


    第六部、解析夢訊息 / 305


    ## 真相


    林媽住在非常偏僻的山下，種田維生。她有個女兒，十八歲時，忽然在男友家因腹痛而猝死，林媽難以相信，也非常不捨，很想知道真相。


    有一天晚上，她夢見女兒前來，很傷心的對她說：「我不是生病死的！而是因為男友的父母嫌我體弱，不能幫忙種田，不希望我當他們的媳婦，趁男友外出工作時，夥同大哥三人強灌我喝下毒藥，我因此腹痛而死。但是，千萬不要去警察局告發他們的罪行，因為我男友很愛我，也愛他的父母。失去我，他已經很傷心，我不希望這事情鬧大，男朋友又得痛失父母了。」


    此外，我也得知過去世的因果關係，前世我仍是一個小孩時，因為玩火不慎燒死他們三人，而結下這個惡緣。我希望事情到此為止，不要再冤冤相報。這一生倉促來去，沒能善盡孝道，還讓您如此傷心牽掛，請您原諒！」


    林媽得知真相後漸漸釋懷，她依照女兒夢中的交代，沒有向對方追討人命。她繼續種田維生，過著單純簡樸的生活，目前已經九十幾歲高齡了。'
