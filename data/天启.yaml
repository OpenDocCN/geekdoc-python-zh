    我並不想用這種方式去幫別人治病，因為，有一位靈性導師曾經告誡我們，不要用氣功幫人治病，原因是如果無緣無故拿走別人的功課，有可能必須幫別人擔負業障。所以，這個方法我只用在自己家人身上。


    二十幾年前，我的婆婆中風情況危急，醫生第三次發出病危通知時，我告訴父親，他希望我用氣功幫助婆婆止血。我說，師父是反對我們用氣功幫人治病的，我如果幫忙會有業障，因為這樣會拿走她的課程。


    父親說：「妳再不出手醫治她，過兩天她就出殯了，妳不會難過嗎？」因此，我回到醫院，伸出手到婆婆的頭部，送了许多能量給婆婆，止住她的大出血，她的病情因此穩定下來。


    到了晚上，我陪在婆婆身邊，看到婆婆一直說夢話，她不斷在跟夢裡的人辯論，其實，她白天是昏迷不醒的，不知夢裡為什麼頭腦那麼清楚，還能說那麼多話？辯論非常激烈，最後，她大聲說：「我絕對不走，那不是我的錯！」突然間，陷入一陣寂靜！感覺上，與她辯論的靈魂走了，我猜她的命是撿回來了。現在她已經多活二十幾年，身體雖然還差強人意，但是，可以自由的到處走動，已是不幸中之大幸了。'
