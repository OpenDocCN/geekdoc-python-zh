    答：不要批判，那是她們的業，是她們練習成長的方法，她們在當中學習包容和真愛。


    問：有關朋友及她的夢境？


    答：她的先生在大陸另結新歡。


    她的因果多在大陸，所以此行去大陸遇到兩次險境。幸而，她在危急時，記得祈求內在師父幫忙。因此，她在夢中看見靈性的愛海。她目前像遇到大風浪的船，非常需要關心和安慰！


    問：在這外遇課程中，台商學會什麼？


    答：他們在不忠的情緒中，短暫的快感帶來長久的無奈。他們終究得面對因果的情況。讓別人極端痛苦的人，自己也無法真正快樂。如果他們沒有懺悔和改變，在下一世中，他們將自卑而且頹廢。他們變成受害者，那是因果輪替的情況。'
