    # 萬花筒人生


    這些年來，我在幫別人催眠、做深層溝通、查潛意識和查過去世的體驗中，發現人的靈魂在時空中一直變換角色～有時在古埃及當女祭司，穿著純白的長袍和金絲鞋；有時又到日本投生為一位孔武有力的相撲手，只穿個丁字褲；有時投生到歐洲當一位船長，體驗航行的樂趣；有時投生在其他星球，做一名創造和孕育新生命物種的科學家。


    生命有無限的可能性，永生的靈魂就好像一個演員，隨時變換角色，演著精彩刺激的戲劇，體驗像萬花筒般變幻無窮的生活。


    # 宇宙的公民


    一位合格的宇宙公民享有的福利主要是，可以在各星球之間學習成長，可選擇自己喜歡的星球，因為宇宙有非常多不同類型的星球，幾乎有無限的時間，可以讓宇宙公民在喜悅中成長。而且，可以很開心的穿梭於各種不同的時空世界，像是遊戲的人生，因為沒有戰爭也沒有煩惱。但是，也可以選擇回到地球，幫助還沒出離地球的親人和朋友。如果尚未合格，就仍須留在地球，直到每個課程都通過，才能成為宇宙公民。


    大致來說，宇宙公民應該具備的品質有：慈悲、高雅、有愛心、喜歡創造、品味高尚、愛好和平、樂觀正面、真誠、忠誠、勇敢、守信用、負責任、公平正義、利益他人、保護動物、愛護環境、充滿感恩的心等等。


    宇宙無限大，有各式各樣的星球和境界，有許多不同品質的眾生。以下僅列舉幾個：


    高等靈性世界的眾生喜歡藝術，具有美感和創造力，他們在創作時會感受到在高境界時的喜悅。雖然，物質世界的眾生也畫畫，也學音樂。但如果學習或從事藝術的目的只是為了賺錢，想要出名，出人頭地，或是想要給別人留下特別的印象，在練習的過程中，就無法感受到真正的喜悅，甚至可能感到痛苦。


    有些星球特別注重音樂，居民大多是音樂家，可稱之為音樂家的故鄉，地球上有許多音樂家是來自那裡的眾生。


    有些星球愛好和平，這些星球注重心態的平衡。比如，性情急躁、習慣抱怨、不懂得體諒別人，有暴戾之氣的人，皆無法進入和平的星球。


    有些星球注重環保，環境非常清新美麗，他們不歡迎會汙染星球的眾生去他們的星球。比如，有些地球人會把油漆倒在下水溝，汙染了水質，這樣的人是不會被環保星球接受的。


    宇宙公民在婚姻關係中是忠誠的一對一伴侶關係，他們沒有見異思遷，始亂終棄的情況。婚姻關係混亂的人，盲目尋求感官刺激的人，還不能離開地球教室，必須一直學習和歷練，直到懂得對伴侶忠誠，守信用負責任，才可能提升為宇宙公民。


    宇宙公民不酗酒、不吸毒、不抽菸。因為吸毒、吸菸、酗酒都會毒害自己的頭腦和思維，這些頭腦混亂的人無法去更高等的星球。


    思維負面的人，本身會冒黑煙，無法成為宇宙公民。


    想要成為宇宙公民，首先要調整好自己的心態、振動力，讓自己的品質符合更高等星球的品質，才能進入那些星球。才能確保自己有機會升格成為宇宙公民。


    比如：


    - 化負面為正面。

    - 化抱怨為感恩的心態。

    - 放下功利心和爭鬥心。

    - 活在當下，開心愉悅。

    - 放下對物質的執著。


    將注重物質享受的習性，轉變為注重精神感受。


    放下對於一切人事物，都以金錢或物質來衡量的習性。


    - 多學習藝術、文學、科學、以及各種新知新事物。

    - 創新、改變，提升品味，增進生活品質。

    - 發展無條件的愛。

    - 學習接收宇宙訊息。

    - 提升自己的靈性智慧。


    # 宇宙執法者


    在地球這個行星上，有兩億以上的宇宙執法者。他們正在執行天意，幫助人類意識的提升。其中有些人已經知道自己的任務，有些是被告知，然後恍然大悟的，有些還不清楚，但是，也可以憑著直覺和善良正直的心性與天意感應，而執行幫助人類提升的工作。


    宇宙執法者，有許多種職別，各自依照不同的能力，執行天意計畫。以下列舉幾種為例：


    ### ☆宇宙法官，檢察官，司法官


    是宇宙高層的執法者，他們具有「慈悲」與「公平正義」的特質，有冷靜，清晰的邏輯，沒有人類起伏不定的情緒。他們來自高等智慧的星球，他們敏銳的眼睛，就好像照相機，隨時把所見到的人類各種行為，拍照傳回靈界。靈界將之用於審查和評估人們的身心靈進展情況，並用以安排人們的學習課程，在地球學習的時間，及未來適合的教室。


    能收到並且解讀宇宙訊息，才能當選宇宙法官，更有效率的幫助人類。有時宇宙法官也擔任解釋和翻譯的工作，將宇宙高層的訊息，更清晰的轉譯給其他還不熟悉接收訊息的執法人員，以共同完成天意計畫。


    ### ☆宇宙行政人員


    特質是頭腦清晰，執行力強，他們也具有慈悲與公平正義的特質，大多是從靈界高層過來，不是一般的人類。他們的工作非常廣泛，是總括性的行政管理工作。


    其實，在人間政府當選的執政者，都是由靈界安排的，選舉時能得多少票，也是靈界決定的。靈界會根據政府轄區公民的平均靈魂年齡所需要的課程，為廣大群眾的靈性成長而安排。比如，挪威以及一些北歐國家，由於人民的平均靈魂年齡比較高，人民比較自覺，所以當地政府的法令相對上比較寬鬆。


    任何一個執政者都會有支持者和反對者，所以本身要有足夠的自信心，頭腦要清楚，不要被反對的聲浪干擾。要專注於自己該做的事。有時情況需要通融一下時，可以合理的修正，讓政策更加圓融的實行。


    ### ☆宇宙醫生


    他們也是來自高等智慧的星球。他們洞悉人類疾病產生的原因，他們知道「人所承受的疾病與身體的缺陷，只是他自己經由思維的力量所造成的。～摘自：《臨界點》第四章疾病與老化。」他們的任務是幫助人類修正錯誤的思維，使他們心理健康，那麼身體就不會生病。所以他們的治療，是從疾病的根源著手。他們醫治人們分裂的負面思維，讓人們從痛苦的分離幻相中覺醒，並幫助他們靈性成長。


    ### ☆宇宙護理人員


    他們負責以愛心和耐心「陪伴」病人成長，他們天生具有同理心，慈悲善良。但是他們尚未了悟人類生病的原因，是來自於思想的不平衡，所以還沒有能力醫治病人。他們自己的心情也常隨著病人的身心情況變化而煩惱起伏，因此，還沒有足夠的能力，真正解決他人的痛苦。


    ### ☆宇宙警察


    他們是人天的護法，富有正義感，能量充沛，熱情揚溢，喜歡伸張正義，維護秩序，他們對善良的地球居民特別擁護，對行為偏差的地球居民特別厭惡，總想去警告或教訓那類人。他們的情緒隨著別人的善惡表現而起伏，極端情緒化是他們的特性。在宇宙兩億的執法者裡，宇宙警察占的比例最大，他們可以繼續提升自己的靈性，直到成為高等執法者，他們必須放下對人類善惡好壞的批評，真正學習把注意力放在自己身上，修正自己正負兩極對立的分裂思想，給予地球居民成長的時間及空間。


    除了執法者之外，宇宙公民所擔任的其他職務相當多，在此僅僅例舉一些常見的單位，有些人也可能身兼數職。


    - **建築設計**：改變居住的品質，美化環境，讓進化中的人類有更好的居住環境。

    - **環境保護**：維護生態，保護地球教室讓人類擁有良好的學習環境。

    - **藝術及音樂創作**：提升人類欣賞藝術及創造的能力。

    - **資訊傳播**：推展天意計畫，廣為傳播。

    - **教育**：提升人類意識及靈性智慧。

    - **人類歷史保護者**：史學者，圖書管理者，幫助人類學習古人的經驗智慧。

    - **天文學與地理學**：擴展人類的宇宙意識。


    # 我的新職務


    許多人好奇我在靈界的職務是什麼？有時包括我自己都好奇！因為一直都在變動中……。


    最近上帝又跟我開了個玩笑，說起來各位看官一定很難相信。有一天網友問我：「妳在靈界的職務是什麼？」我還在認真的思考著，尚未回答，那時我本來在電腦前工作，然後去廚房拿杯飲料回來，我的電腦螢幕竟然自動出現「媒婆」兩個超級大的字！我看了哈哈大笑，原來靈界回答我，我在靈界及地球的新職位是媒婆。各位！可別小看媒婆喲！


    以前我最喜歡幫朋友做媒，因為看不得別人孤獨，所以至少做了幾十次媒人，成功兩次。不過這兩對都不是太幸福。一對是生了兩個孩子，但是都是太太辛苦養家。另一對是生不出孩子，這個先生很抱怨，一直希望有孩子。有一天我靈機一動，想了個點子，所以和我先生商量。我志願幫他們當代母，生一個孩子。


    沒想到，我先生出奇的憤慨。他說他本來也希望再有一個小孩，但是因為我兩次生產都血崩很危險，我的產科醫生警告他，絕對不能讓我再冒險產子。他哇哇叫罵了許多天！直到我打消念頭。我可不希望別人的孩子在我肚子裡每天挨罵，那會影響胎教。唉！做媒人還要包生兒子，真是麻煩！


    學會與上帝連線之後。有一天，我心血來潮又想搓合一對朋友，他們老是在抱怨沒有機會碰到好對象，我很希望他們可以擁有幸福的婚姻生活。


    我請教上帝：「他們兩人適合結為夫妻嗎？」

    祂回答：「哈！哈！哈！你的老毛病又犯了嗎？他們兩人是宿世冤家！」嚇得我立即打退堂鼓，再也不打此類的妄念了。


    沒想到，我現在的新職位是宇宙「媒婆」，任務是把人們介紹給最親愛的上帝。這真是非常光榮的使命啊！


    上帝是最好的情人！祂幽默，健康，富有，充滿愛和創造力，祂無所不知，無所不在，無所不能，還永遠不會死！我們任何一個微細的念頭，祂都知道和理解，祂是我們真正貼心的知己。能夠發現祂的存在，與祂分秒都在一起的人，會是世界上最幸福的人。


    我這個超級的媒人婆，能說的都說了，剩下的就是你們自己去找上帝約會（祈禱）啦！不論男女老少，婚寡不居，美醜都沒關係！只要你敢求婚，祂一定會答應，因為祂是來自無限的無所不能的大眾情人，有什麼事都跟上帝去商量吧！


    最後提醒一下，度蜜月時，別忘了我這個媒人婆！


    # 地球的遊戲


    地球之旅像是進入一場大型的遊戲（Game）。


    地球上有許多不同層次的遊戲，必須用「愛心鑰匙」才能通過層層關卡，贏得最後的勝利～出離地球。


    成為宇宙公民後，可以選擇到其它更進化的星球去，那裡有更新穎舒適的時空，更先進的科技世界，還有更大型更精彩的宇宙遊戲。這些都是上帝的創造，為了我們的靈性及意識的提升而安排的。


    愛心的鑰匙有各種不同的等級，有對自己的愛，對家庭的愛，對親朋好友的愛，對社區的愛，對國家的愛，對整個地球的愛，對宇宙的愛，對上帝的愛。你知道自己的愛心鑰匙屬於哪一級嗎？


    當你的愛心越大時，被賦予的能力越多，任務也會升級和增加。比如有些人擁有了超能力～他心通，天眼通，天耳通，宿命通，辯才無礙，智慧亨通等等。他們可以利用這些超能力，更有效的去執行任務。例如，他們能查到地球的歷史記錄，有關人類的過去、現在、未來，而用以幫助調整人類個體及整體的成長方式。


    我們每天所遇到的人事物，其實都是自己心靈的投射，也反應出我們的心路歷程。我們與其他的親人朋友或陌生人，每一個生命中的過客都是與我們一起共同成長的夥伴。從學會保護自己，保護別人，保護人類的提升過程當中，我們的愛心鑰匙逐漸轉換成更高等，更完美的。直到我們修好在地球上的所有課程，光榮的從地球畢業，成為宇宙公民，那時我們將發現我們擁有整個宇宙的遊戲權！


    當我們進化到擁有無限的創造力時，可以控制能量，甚至可以自己創造新的星球。我們學會寫宇宙程式，設計出好玩的遊戲，和大家分享，並且歡迎其他宇宙公民來玩我們設計的新遊戲！


    # 三波志願者


    ～《三波志願者與新地球》摘要筆記～


    The Three Waves of Volunteers and the New Earth.


    作者：Dolores Cannon 出版日：2011.06.13


    作者在催眠時發現人們在地球以外的生活記憶，雖然，地球是一所供我們學習課程的學校，但她不是唯一的一所。在數百個催眠個案中，作者發現許多人都對自己這一世的生命有同樣的說法，因此，作者依據他們的年齡，將他們大致分類為三波。


