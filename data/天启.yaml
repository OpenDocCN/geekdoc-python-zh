    朋友問我怎麼辦？


    我說，她的時間到了，菩薩來引領是很好的，將會往生善處，不會有任何痛苦，只是放下肉體就走！如果她一直執著在這個老朽枯乾，行動不便的驅殼裡，連大小便都要別人打理，自己也像個犯人一樣，每天臥病在床，哪裡也不能去，這樣多麼不自由啊！還不如換一個年輕活潑、健康有朝氣、充滿生命力的身體，再回到世間繼續學習成長，這樣記憶力好，學習力也強。


    朋友問：「那兩個睡在我母親身邊的靈魂怎麼辦？」


    我回答：「念地藏經迴向給他們，請對方原諒，請他們跟隨觀世音菩薩往生善處。」她立刻向我借《地藏菩薩本願經》回去念了。'
