  md: '正當他很專心的在釘著木板時，有一個路人，笑著對他說：「老師啊！您在造橋鋪路啊！我看你快生兒子了！」雖是一句玩笑似的祝福，但不到兩個月，他的妻子懷孕了，後來出生時，真的是兒子。這孩子非常優秀而且孝順，舅舅晚年主要都是靠著這個兒子養老享福呢！


