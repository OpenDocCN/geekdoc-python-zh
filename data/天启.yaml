    問：有位親人想知道他未來的生活規劃？

    答：專心修持，無所掛礙，與萬物同一體。


    勿執著幻滅的物質，自然看清滾滾紅塵非久留之地。

    欲求何需過高，徒然增添煩惱，

    放下一切，就是涅槃。

    把握光陰，不做無謂浪費，

    必在此生證道，慎勿放逸！


    問：有位同修想知道他目前的修行障礙？

    答：他對世俗的牽掛未全然放下，


    過分自責的情緒，

    愛憎分明的思想，

    過分審慎的態度，都是執著，

    必須放下執著才能順利提升。


    問：他要如何超越？

    答：放下成見、放下心因障礙，


    放下批評責怪的情緒，放下所有的愛恨情仇。

    告訴他，一切轉眼成空，沒有永恆的敵人。


    問：他目前的修行重點？

    答：圓滿、圓融、愛力與無畏，付出不求回報，

    這就是無條件的愛，是我們最崇高的理想！


    問：圓滿？

    答：自在無私與包容，莊嚴華麗的天堂，

    光明與喜悅，完整的人格，天國的品質，大愛！


    問：圓融？

    答：與人相處融洽，有愛心、耐心、包容心，

    寬懷的心胸，無私的人格，純真的心性。


    問：有位親友想知道他目前的修行重點？

    答：了解小我與大我的概念，可幫助他啟發精神能量，

    一般人以為自己綁在小我裡面，無法真正的超越，

    只相信柔弱肉身，不相信自己神性中擁有強大力量。


    問：有些同修抱怨打坐沒有光與音！

    答：他們心裡俗事太多，牽掛太多，沒有專心打坐。


    問：如何幫助他們？

    答：勸他們放下掛礙，

    全心全意修行，不要無謂浪費能量，

    日日精進，神性光自會現前，內在音聲自會變大。


    問：有位同修想知道適合他的成長方法？

    答：啟發他快速成長的方法是「安住於實相」。

    相信上帝、相信我們來自上帝，

    相信我們的萬能力量。

    一切向內尋找，應無所掛礙，毋庸擔心。

    明白上帝與我們同在，繼續努力修行。

    我們是天堂裡美麗的眾生，我們就是圓滿與愛力！


    告訴他們：

    所有的考驗，都是為了幫助人們進入「實相」，

    找到本來面目。


    問：我有哪些修行障礙必須克服？

    答：無所求的心


    - 愛與被愛的詮釋

    - 抽象意念的成長

    - 時空觀念的限制

    - 無求的境界


    問：聽起來好空泛，是空的感覺嗎？

    答：空相中的實有。


    問：何謂空相中的實有？

    答：空相中蘊藏著無所不在的潛能，無所不能的力量。


    問：天哪！我覺得什麼也沒看到。

    答：不要執著你所看到的外相。


    問：其實我的眼睛目前只看到清晨屋外街道寂靜的景象。

    答：專注你心性中的「空寂」，不要掛礙外在的事物。

    專注內在的尋找，找回你內在的力量。

    它是亙古存在的，你從來沒失去它，只是重新憶起。

    不難，也不用想像，那是自然來的，它會自然顯現，

    像你的無上力量突然湧現，不需思考，不要思維。


    問：我試著努力找回內在的力量，誰來幫我？

    答：我們一窩蜂的人！


    問：多少人啊？

    答：無所不在的人，無所不能的力量。


    問：是你們推著我向上提升？

    答：正是。


    問：但我覺得我很笨！我真的修得起來嗎？

    答：沒有人真正完美，除非他找回自己無所不在的力量。

    你不孤獨，你有我們的支持。


    問：目前如何靈修？

    答：專注於心靈成長，全力以赴，不要分心。


    問：我得閉關嗎？

    答：勢在所需～如果你志在必得。


    問：閉關的方式？

    答：足不出戶，隔絕一切外界干擾。


    問：生活所需呢？孩子呢？

    答：交代別人做。


    問：何時開始？

    答：你自己決定，越快越好，祝你早日成就！

    我：感謝妳們無盡的愛！


    閉關前，我請先生及一對兒女在閉關期間為我護持，

    他們聽說十五天不能與我說話，都依依不捨緊緊擁抱我，

    讓我受寵若驚，其實我只是一個人搬到三樓住幾天而已！


    一切快到我不能想像，

    我感覺到黎明前的寂靜。

    我的心忽然沉靜下來。


    # 閉關日記


    2002.07.20 凌晨


    這是我有生以來第一次閉關，

    有一種脫離塵世的感覺～清靜、自在、祥和，

    最重要的是，我學會時刻與上界溝通，

    信心大增！感到無上的光榮。


    問：何謂無所求的心？

    答：沒有得失心，沒有對人事物的執著，

    坦然面對每一個當下，

    專注於生活中的人事物，但沒有掛礙。

    眾生的諸多念頭都想求得利益，

    有求的心，見不到實相。

    貪婪與執著，不能使心靈成長，

    無求，是全然的放下，

    不掛礙，不惹塵埃，清靜自在。


    問：何謂愛與被愛？

    答：愛是無所求的照顧別人，關心別人。

    大愛是超越凡俗的愛，不綁人，不求回報，

    一心希望別人快樂成長。

    被愛是被照顧、被疼愛的感覺，

    會使被愛者心生歡喜，感到光榮，

    生出信心，發出愛力。


    愛與被愛是世界上最快樂的感覺！

    愛是恆久的力量，不因時間空間而消失。


    問：世人的情愛為何常變質？

    答：那是狹義的愛，

    用來綁人，使人怨恨、不自由、無奈，

    是自私的品質，不曾替對方著想，

    造成別人身心受創，

    那不是真愛，

    只是一種有條件的交換。


    問：其實我懂，為何要我去詮釋？

    答：你真懂了嗎？你總在否定愛，你以為它是不存在的。

    你以為只有你懂得愛別人，

    你一直不明白別人對你的付出，是真實的感情。


    問：他又去愛別人了，不是嗎？

    答：你沒愛過兩個以上的人嗎？

    你會為了愛一個人，就否定一個你真心愛過的人嗎？

    那只是你同時愛上不同的兩個人而已。

    仔細檢討你的婚姻，

    你的選擇只是個緣字，並不是因為你特別愛誰，

    姻緣是個定數，是業力牽引。

    你會嫁給你看得順眼的每一個男子嗎？


    問：我懂了這個，對我的修行有幫助嗎？

    答：你會平靜下來，心如止水。

    你不會再抱怨，或覺得自己受傷及委屈。

    你會更懂得愛別人，體諒別人。

    你會逐漸發現自己的幸福，發現真愛並沒有離開你。

    你會更有能力愛別人。


    問：如何讓抽象意念成長，以及突破時空觀念的限制？

    答：明白沒有時間與空間，沒有日夜與四時寒暑，

    沒有明暗，沒有陰陽，

    沒有是非，沒有愛憎，沒有對立，

    實相世界只有純淨的美。

    所有的對立都在這個境界消失，

    一切無明皆在這裡清除，

    那些無明的習慣，在這裡徹底做個了斷。

    自由意識的產生，全然的解放，

    時間無限，空間無限，

    上層世界，亮麗輝煌，

    超能力的產生也在此時出現。


    問：上層世界的人啊！請告訴我，如何進入你們的天堂？

    答：靜默，傾聽內在的聲音。

    那音聲會引領你重回上帝的懷抱，重回實相境界，

    在那音聲的盡處是你的家鄉。

    我們看到你展開雙翼準備回航，


    我們全體都虔誠的祝福你早日回到家。

    你是我們最思念的家人，

    你在回航的途中不用害怕，

    我們會全力護航。


    > （每當我重新看到這段對話，

    都會被上層世界的愛心，再一次深深的感動。）


    問：何謂「超意識」？

    答：超意識是能量的蘊藏所。

    超意識有無限潛能，

    掌管生死奧祕，控制宇宙的變化，

    我們皆從超意識而來，卻忘了超意識的存在，

    與超意識能量失去連結的眾生，

    活在懷疑、恐懼、不安的情緒中，

    因為他們對於未來的不確定性感到不安，

    無奈的走過生、老、病、死，疲累與消沉，

    終日麻痺自己的感覺，沉淪於短暫的歡笑與得失，

    他們忘了自己的榮耀光輝，在無明中惶惶不可終日，

    他們斤斤計較於榮辱得失，以減輕他們的不安全感，

    他們總是拖著沉重的步伐走向未來，

    所以他們的肉身，總會出現各種病症，

    一切皆因無明而來，而拔除無明的唯一方法是：

    靈修與靜坐，重新找回超意識能量。'
  mdcn: '無力起床的父親時，父親居然自己很快的坐上輪椅。那一剎那，弟弟還開心的以為父親的病有了起色！


    弟弟和母親陪著父親一起到大窗前看日出，俯瞰下方的雕塑公園，溫馨交談約半個小時，正當母親走去廚房拿個東西時，父親彷彿就在瞬間離開人世，沒有一絲掙扎與痛苦！牆上的時鐘，是七點零二分。


    我們真是感謝上天對父親所做的一切安排！由於母親仍迷信，認為人不能死在床上，所以一直擔心不小心會讓父親在床上斷氣。沒想到，上天安排父親能安詳的坐在輪椅上，在欣賞日出的時刻離開！這對父親的下一世會是個美好的緣起。


    父親一生慈悲，樂善好施，持素學佛多年，助人無數！在父親往生的當天，我連續打坐八個小時，終於清楚的看到父親回到靈界的近況。他的外貌看似四十歲，穿著西裝，神采飛揚，興高采烈的，正在對著一群人演說他這趟人間之旅的成就與心得，這些人大都是他在人間時的好友和同事們（包含已去世的和仍然在世的）。


    幾個月後，我夢見，父親正在學習菩薩的課程。夢中我剛吃完早餐，看見父親來了，我好開心的握著父親溫暖的手說：「爸爸我幫你準備早餐好嗎！」父親側著頭若有所思的想了一下說：「不用了！我好像很久沒吃東西了，自從我來到這兒，從來沒有覺得需要吃東西！」


    他又說：「現在我上的這個班級是教導菩薩課程，我要很努力才能跟上進度，我需要六祖壇經和地藏菩薩本願經，請妳幫我找來！」


    父親往生多年後，有一天清晨，我小妹的婆婆非常驚喜的打電話給她說：「不可思議！不可思議！今天早上妳爸爸來救我一命！我是醒著親眼看到他！清晨三點，我的血壓升高、頭痛欲裂，我吃了降血壓的藥、吃了止痛藥都沒用，甚至拿布條來綁著頭，也還是痛，試了各種方法後，才想到親家曾教過我練氣功靜坐。但是，我已經荒廢多年沒練習了，不知從何開始。」


    「正在痛不欲生時，忽然看見巨大的光，就像金色的河流從天上流下來，我以為是佛來了，但是當我仔細看光的中心，居然是親家！他坐在金碧輝煌的椅子上，身穿白色中山裝，全身都閃閃發光。他沒有說一句話，但以手示意要我跟著他做，他一招一招的教我，我就一一跟著做，最後有一個動作讓我覺得好痛，劇痛的剎那間，就好像雨過天青，一切痛苦和陰霾都消失了！」


    「我正想跟親家道謝，他卻消失得無影無蹤！我看看時鐘是三點半，我知道我一直都是清醒的，這不是夢境，我迫不及待想要告訴妳，但因為是半夜三點半，不忍心吵醒妳，好不容易熬到五點鐘才打電話給妳，告訴妳這個不可思議的好消息，妳父親顯靈來救了我的命！」


    有趣的是，從此之後，親家母不敢在父親顯現的那個地方更衣，她認為父親隨時都可能再度出現。


    ## 師兄的忠言


    我曾請教那位證神通的師兄，我修行沒有進步的原因。他列舉了五點：


    一、驕傲和自滿的人修行不會進步。


    因為他們認為自己懂得很多，修得很好，做得很完美、很夠了。他們認為沒有人可以講他們，他們也不想聽別人的，所以他們才會不斷的錯過上帝及佛菩薩的恩典，而永遠的停留在原地，不會進步。「原地」指的就是一個充滿幻想、貪婪、虛榮、好勝、愛比較、期待讚嘆和肯定的虛假世界。


    二、貪生怕死不是一個真正的修行人。


    修行人指的是一個不畏艱難、努力追求真理的人。不是拿著修行當藉口，躲進來避難的。修行人要有勇氣接受一切，不管情況好壞，一旦我們接受一切，靈魂就會被蛻變，接受就能超越！不是一味逃避、好逸惡勞，我們不是修行的難民！修行是為了尋找真理、尋求開悟和智慧，不是為了躲避災難！如果疾病、災難和不祥可以讓我們看破放下、不執著和開悟的話，那麼他們不是不好的，而是上帝的恩典。


    三、好勝。


    好勝就一定能勝嗎？不服輸就能不輸嗎？

    誰能跟上帝鬥？誰能跟永恆和生死鬥？

    人太渺小了，小得微不足道，所以有什麼好驕傲呢？


    四、如果你修的是無上法門，最好有準備去死的精神！


    因為那個無上力量會逼我們的頭腦死，逼我們的貪婪、嫉妒、我執死。那些障礙我們靈性開悟的東西不死，我們無法獲得新生！就像毛毛蟲要蛻變為蝴蝶時，必先置之死地而後生。無上法門會蛻變我們的靈魂，如果你真正誠心努力修行的話，它會把你從罪人變成聖人，把你從黑暗帶進光明及永恆的喜悅。


    五、「我」指的是神性。


    神性既然是不生不滅怎麼會生病呢？

    如果身體病了，不要說我病了，應該說身體病了！

    頭腦混淆不清、貪婪迷惑時，要說頭腦病了，不是我病了。因為我們跟身體和頭腦黏在一起生活太久了，才會受苦的。


    師兄的話讓我深深的感動，我立刻修正自己的缺點，隨時觀察自己的想法，立即有了很好的體驗與進步。我發現只要自己肯虛心改進，修行也不難，修行就是修正自己的思言行！


    ### 拜訪王羲之


    這位證神通的師兄，總嫌我打坐太少，所以有一天我特地靜坐了四個小時之後，才去向他求教，沒想到師兄竟看出來，他興奮的說：「我以為妳打坐不容易得到光，沒想到妳才坐四個小時，光就這麼多，今天真高興看到妳的光強起來，以前妳就像一個富有的人，放著一倉庫的財寶而不去拿來用，光在那兒叫窮。現在我發現妳輕易的可以拿妳的財富來用，真替妳高興！妳知道嗎？我們整個道場也沒幾個真正肯修行的、想好好修的，更不用講那些不修行的世間人了！看到肯修的人真難得，真高興！告訴妳一些有趣的事。」


    師兄說：「我喜歡書法，常去拜訪古代的書法家，找他們敎我寫毛筆字。」


    我好奇的問：「你看到的是真實的世界，還是過去的影像？」


    他說：「很真實，連毛筆都可以滴出水珠，所以我們可以交談，做朋友，其實現在、過去、未來、都是同時存在的，所以我可以隨時走進走出，要查到每個人的過去世，易如反掌，甚至十幾世前的因緣都可查得清楚明白。」


    我問：「未來是定數？還是可以改變？」


    他說：「大多已定，小部分可以改，修行人如果努力精進，就比較容易改變命運！因為修行人不斷修正自己的錯誤，命運當然會改好。」


    我：「如果過去、現在、未來，同時存在，那有幾千萬億個我們？」


    他：「是這樣沒錯，但也是一個。用頭腦是想不通的，妳先有個概念，以後自己去證得吧！我得到的，沒辦法給妳，妳得靠自己去證得。」


    當我又提起思念的父親，師兄說：「趕緊修到開天眼吧！這樣妳可以隨時看到他，不管他在世上，或離開人世，妳一想到他，就可以見到他。我隨時可以看到我已往生的祖父，只是很少想要看他，看多了也沒意思，個人有個人的工作，我不那麼執著於阿修羅感情。」


