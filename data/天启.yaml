    ## 第二部、與上天溝通


    問：我們的對話也算靜心嗎？

    答：也是靜心的一種，是高境界的靜心，你正與上界溝通，你會越來越了解我們，越接近我們的層次產生越多的智慧，終至回歸天國。


    問：我究竟能否走進實相世界？

    答：指日可待，無庸置疑。


    問：我認為你們在安慰我，我怎能放心？

    答：脫離頭腦的判斷吧！實相世界並不需要很辛苦，才能走進來的，輕鬆點和我們多談天吧！你會有意想不到的收穫。


    問：我實在不相信我可以輕鬆的進入實相世界。

    答：相信我們，不要掛礙，我們與你同在，我們那麼接近你，會適時拯救你上岸，何況你就在岸邊咫尺之處，就要到家了，放心吧！我們不會丟下你不管，那多麼不合我們的慈悲之道，寫完你的書，真相將會大白。


    問：為什麼一定要寫完書呢？那是交換嗎？

    答：書中也有你要學的東西，學完才能畢業。


    問：拜託！不能先畢業再學嗎？

    答：沒有畢業就沒有文憑，假的文憑你要嗎？沒有畢業就沒有辦法去工作（幫助眾生），如果你還有迷惑，怎麼為眾生解答？


    問：誰會相信我與你們的對話？

    答：他們的內在、靈魂，什麼都明白，永遠別以為只有你自己有道心，別人都不懂，他們的內在與你是一模一樣的，只是暫時迷失罷了，他們很希望回到天堂，正如你一樣！


    問：我看到很多人，吃喝玩樂，一點也不思修行。

    答：他們沉溺在過深的夢境中，暫時還醒不來，必須不停的、耐心去喚醒他們，才能緩緩甦醒。給予他們一些時日吧！苦難的人生，很容易磨醒沉睡的靈魂。


    問：那些還吃眾生肉的人如何才能喚醒他們？

    答：告訴他們無常與因果，吃一口肉就得還一口，沒有僥倖的事，物質世界沒有白吃的午餐，吃完了就要付出代價，你不想付，人家也會追著要。吃肉前想清楚，是否還想繼續在六道輪迴？


    問：如何去除憎恨心？

    答：「憎恨心」多因「得失心」而生，擔心自己的財物或名利被奪，甚至別人不經意的眼光，都能解釋成輕視、惡意，而引燃怒火，對治的方法是培養「慈悲喜捨的心」，以寬懷的胸襟，去包容和愛護他人，憎恨別人會使自己先受到傷害，那怒火首先傷害自己，為何要傷害自己呢？許多人的病痛是因為憎恨的情緒引起，例如：心臟病、高血壓等等。


    問：如何對治貪婪？

    答：貪婪始於無明，總擔心財物不夠溫飽，總想把眼見之物占為己有，貪婪的對治是愛心，想想別人也需要，大家也都是勞碌奔波，何必你爭我奪？不如高雅一點，欲求少一點，簡單過日子，越少奔忙越接近實相世界，因為實相世界中沒有勞苦與奔忙。你放棄的上天會補償你更多，不用擔心布施會變窮，懂得布施的人會更有福報，寬懷大量的人總是活的優遊自在，斤斤計較的人，一世的奔波卻換來愁眉深鎖的面容。


    問：實相世界的人們，我如何走進你們的國度？

    答：等待，我們會給你奇蹟！


    問：真奇怪，人們都說：「要拼才會贏」你們卻說等待？

    答：精神界與物質界最大的不同就是「我們用想的，你們要實際動手做」。我們用精神力量得來輕鬆容易，你們似乎很難想像，每次叫你們實證實得就好像要你們赴前線作戰似的，其實，也只是請你們放下背負在身上的重擔，丟下來不要執著它們而已。改變一些無明的習慣，也只是改變念頭而已，都是精神層面的東西，你以為你能動手做什麼？放下世間的習慣，學習在思考中進步，我們強大的精神力量能做很多事。你以為你只是在寫字，不是靜坐和修行，但不同的是，你寫的是天界的語言，你和無所不在的力量一直在溝通，無形中你會取得那些力量，你的證悟是指日可待的。為什麼要不停的擔憂？「擔憂」這個品質，只有物質界才有，放下它吧！放下擔憂的壞習慣！天堂裡萬事具足，還可以用精神力量創造，取之不盡，用之不竭，何需煩憂？


    問：目前為止，我尚缺什麼？不能看到天國？

    答：不知足！總想獲得更多的開悟、更多的智慧，更多的能量，你忘了我們約定的「無求」，無所求，才能接近實相。實相世界是一個無求的國度。你必須品質與我們相當，才能踏進來！


    問：天啊！這個習慣真難改。

    答：如果連你自己都不能改，如何說服眾生改掉壞習慣？如何振振有詞的叫別人看破放下？只不過是「無求」兩個字，轉個念頭吧！不要一直想得到什麼就可以了！


    問：好吧！聽你們的，反正你們不會害我。

    答：哈！你真幽默！我們喜歡和幽默的人合作，這樣工作起來比較愉快！


    問：好吧！既然無所求本人睡覺去也，只有睡覺才會無所求嘛！

    答：累了就去睡吧！別找藉口了。


    問：還有什麼指教嗎？

    答：你的個性開放，很像我們的品質，你越來越接近我們了！


    問：反正我一定要做到，沒有愛恨情仇，沒有我執、得失心，還要學會無所求、無憂、知足，沒有掛礙等等，這些品質都和你們一樣，才能走進你們的世界，對吧！

    答：你總算明白了，正是這樣。大多數的人都要走過這些路，在我們看來幾億年也是有限的時間，怎麼與永恆比？永恆就是無限，沒有時間與空間，那些時空觀念，都是你們的想像力創造出來的，因為有時空的限制，就有生、老、病、死，及無常。時空觀念是修行的一大障礙，試著去忘記時空，忘了白天或黑夜，那些本來就不存在的東西，實相世界裡沒有它們！


    問：超越時空觀念，聽起來很困難！

    答：其實也不難，想像你的時間無限，空間無限，想像你不會老，想像一切永恆！


    問：那不是在騙我自己嗎？

    答：會嗎？相信有時間與空間，才真正是在騙你自己。騙了幾億年還不該停嗎？


    問：時鐘滴滴答答的走著，叫我怎麼忘了它？

    答：不要看它，那是物質界創造的東西，如果你相信它，你會忘了回天國的路。


    問：你不能叫我一個人都不去配合大家的時間嘛！

    答：配合團體生活的時候，你可以看它，平時你獨處時，最好忘記時間，不要老記得，幾時該吃飯，幾時該睡了，沒那回事。餓了就去吃，累了就去睡，誰規定一日三餐？那都是前人的習慣，不要被框架框住了，走不出來。


    問：人家都說三餐不定時會出問題？

    答：別人的偏見，豈可當真？別人還說吃肉有營養，你怎麼不信？那些都是信以為真的人才會被「自我催眠」，越擔心營養不良的人，身體越會出問題。一日三餐，這個想法也是古人設計的，其實每個人體質不同，工作性質不同，應該在肚子真正餓時吃東西，對身體最好！這些只是物質的問題。我們還有一些未完的任務，需要達成。


    問：我們的任務到底是什麼？

    答：如何把此書詮釋到每一個等級的修行人都明白，不再有些許的迷惑，腳踏實地的檢視自己的障礙，快樂的進入真正的修行狀態，突破所有的難關，早日證道。


    問：聽起來挺困難的，光憑一本書？

    答：不要有否定的思想，無所不在的人，能做無所不能的事，不要再用人類的思想判斷我們，我們有各路的精英，和許多來自你們那兒的成就者，對修行的困難和荊棘瞭若指掌，我們不會失誤，只需你的全力配合。


    問：我又不是什麼作家，誰會想到看我的書？

    答：時間已到，必須看到的人，自然會有得到書的因緣，我們會安排，你只要用心去做，它自然會廣為流傳。


    問：糟的是我不知道我還有什麼問題？

    答：不要急，泰山也不是一日形成的，我們有的是時間，何況我們已經完成一大半了，全部檔案都已完成，只有細部修正，正在進行中，我們希望做到更完整！


    問：一般人對於修行，有哪些迷思？

    答：


    - 以為修行是修行人的事，與自己無關。

    - 以為人家都是想不開，受了什麼挫折才來修行。

    - 以為命好的人不用修行，有錢又善良就不必修行。

    - 以為修行是贖罪者的專屬。

    - 以為自己不夠聰明，肯定修不起來，乾脆放棄！

    - 迷戀紅塵事物，浪費一生在追逐名利、積聚財物。

    - 不願放棄葷食。

    - 懶得深入去思維。

    - 懷疑實相世界的存在。

    - 迷戀自己的肉身，修行只是想長生不老。

    - 有些人修行，只是用來控制別人思想的藉口。

    - 有些人修行，是不停的求神拜佛，妄想幾個水果就可以求神明保佑闔家平安，或求一些物質的事物，例如：升官、發財。對佛法不求甚解，全然的迷信。

    - 有些人為了廣結善緣，居然大宴親友，還供應葷食，大開殺戒，徒然增添新業障，卻以為自己在布施。

    - 有些人燃香求神，放下香就在罵人，惡行惡狀，也自認是修行者。

    - 有些人心口不一，說的是修行話，暗中卻做傷人的事，以為可以瞞騙諸天，果報臨頭又呼天搶地。


    問：身、口、意清淨？

    答：身：外在身體的表現及所作所為必須是清靜的舉止。口：言語必須正確，合乎情理。意：思維要單純、乾淨。也就是心口合一，內在外在全在修行。


    問：心口不一的壞處。

    答：心口不一的人，以為騙得了別人，卻瞞不了自己的良知，所以寢食難安，進而損壞了自己的健康和靈體，業障的累積會拉低自己的層次，我們希望此書像一面鏡子，讓修行者照出自己的缺失，逐步修正。


    問：有些人不知道什麼是正確的思想？

    答：正確思想是正面、樂觀、進取、輕鬆、自在、活潑、開朗、有建設性，負面思想，沉重，總往壞處想，那會產生負面能量，因此負面思想太多的人會造成疾病及家庭運勢破敗。負面情緒過多的人，好像運氣特別不好，彷彿所有的不如意都跟著他似的，因為，思想會產生能量，所以我們必須提醒自己，想一些好的事，當然未來會有好的果實。未來會更好，這是我們該深信不疑的！即使真的碰到不如意，也要明白那是上帝的恩典，考驗會使我們成長，是上天賜給我們的成長機會。也許外在肉體在老化，但內在靈性卻日日在成長，一切都不用擔憂，樂觀其成。


    問：可否舉負面思想的實例？

    答：有些人尚未出門就擔心下雨、或被車子撞到，坐飛機時，又擔心飛機掉下去，有人婚後擔心生不出孩子，懷了孕又擔心胎兒畸形，孩子剛生下來，就擔心他是否能養大，剛找到工作，就擔心失業，每天擔心一大堆事情，怎麼會不生病呢？那些負面情緒會導致免疫力下降，中樞神經障礙。所以我們得時時提醒自己，擺脫負面思想的習慣，凡事都往好處去想，把挫折當成考驗，才能成功的走向美好的未來。


    問：有些天災人禍，是人類無法抗拒的？

    答：世界上幾乎日日都有災難發生，雖然那些災難是一些定業，但是也啟發許多人修道的想法，讓人們深入的省思，從而尋求內在的力量。所以連外表看來最壞的事，都還是上帝的恩典，更何況是那些好事情！每一件事都是上天精心安排讓我們靈性成長的課程，沒有一件事是專門用來傷害我們的心智，除非你自己，沒有人能真正毀滅你，其實，就連你自己，也不能毀滅你自己，因為，真我是永生不死的，我們是恆久的存在。上帝就在我們心中，永遠與我們同在。傾聽上帝的聲音，直接與上帝溝通，明白上帝的旨意，知道自己的定位，重新創造自己的未來。


    問：我的閉關方式，有沒有需要改進？

    答：你強烈執著於打坐，但我們希望你「記錄修行的須知和方法」，這是救眾生的工作，也是你與我們的共同大願，你覺得哪一個重要呢？


    問：救眾生固然重要，但我自己都還沒有修成？

    答：你以為什麼是修成？長了翅膀？還是羽化登仙？


    問：至少是和萬物同一體！

    答：那還不容易，你一直是「與萬物同一體」！無論你是在寫字時、睡覺時、打坐時，都是。


    問：我感覺不到！

    答：放下內心的障礙，放下對時間空間的觀念，放下所有對立的想法，不做任何分別，實相世界就會自然呈現！


    問：雖然我聽懂你們的每句話，但覺得好空泛，很無力。

    答：盡量往內集中吧，神性是在我們內邊，向外尋找，是緣木求魚，永遠不可能尋得。


    問：我閉關中吃的食物會不會影響修行品質？

    答：不要去分辨食物對你的影響，集中精神在修行。食物的影響不大，如果你一直在食物上打轉，對物質的困惑如此之深，你如何專心呢？重要是你有沒有專注於一心，時時刻刻在集中狀態。


    問：我四天中瘦了三磅呢！

    答：你太擔心物質的身體，擔心到瘦了三磅，別在閉關中刻意減少飲食然後浪費能量去擔心健康。


    問：吃素食的優點是什麼？

    答：


    - 振動力比較高

    - 身體比較健康

    - 思想容易正面

    - 打坐時容易進入禪定


    問：昨天半夜，我的孩子突然很激動的大聲抗議，因為我的閉關使他感覺寂寞無聊，而且必須很安靜，他連講話還得低聲的講，他說他快瘋了！

    答：他被外界的負面力量利用，來干擾你的修行，不要擔心，繼續努力，我們會盡全力保護你不受干擾。你只要心平氣和的，完成此生中最重大的突破即可。十五天轉眼即過，珍惜每一日每一時，你會有意想不到的收穫與成就！你身邊有許多我們的工作人員，就像是拍電影時，主角旁有一大堆人，像導演、工具組、道具組、臨時演員等等，大家都忙裡忙外的。你做的只是最舒服的工作，任務是「頭腦放空，接收我們的訊息」，你越認真，我們做得越起勁，別忘了，我們正在拍一部，你即將成就的電影，只是我們的鏡頭在半空中。


    問：好奇妙啊！

    答：任何一個眾生想成就，我們就會全力以赴，別忘了，我們都是上帝的孩子。


    問：每一個證悟的人，都像我一樣的方式嗎？

    答：每個人有每個人的方式，因為習性與層次不同，所呈現出的開悟方式，就完全不同。而你是經由「內在聲音」回來，那是我們與生俱來的能力，內在聲音是一種振動力的波動，我們順著我們振波發出的音流回家，就像收音機的接收頻道，那是我們唯一的頻道，能夠找回我們的無上力量，進入實相世界～那永恆的天國。


    問：我目前的修行方向？

    答：喚醒你的無上智慧，走進實相世界。


    問：我都知道了，我並未開悟？

    答：真理躲在「全然不思考」的背後。


    問：你們叫我不再思維？

    答：放下頭腦的成見，你就可以順利走進實相。


    問：如何放下？

    答：靜默，傾聽內在的聲音，走入內在的家園。這是最後的指示！


    2002.07.24午後三點


    問：昨天頭很痛？

    答：調整能量，打開頂門。


    問：我覺得現在，頭頂有奇異的感覺。

    答：頂門穴開，用以突破小周天。


    問：小周天。

    答：即肉身的循環系統，一旦調整在最適當和諧的狀態，才能突破，進入大周天（與萬物同一體）。'
