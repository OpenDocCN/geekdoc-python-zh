    # ## 孕育善緣子


    女兒有幾位同學婚後很想有孩子，可是一直無法如願，醫生說她們的體質很難受孕。女兒帶她們來問我該怎麼辦，我說當年想生第二胎時，九年一直無法受孕。後來，我是焚香祈請觀世音菩薩送我孩子，誠心念「觀世音菩薩普門品」，我夢見觀世音菩薩來幫我醫病，還送我兒子。


    她們聽了之後，就向我拿了一本普門品回家念。其中一位沒有多久就懷孕了，生出了兒子。接著她想再生一個孩子，又繼續念普門品，又生了一個女兒。她介紹她的朋友念，也如願生了孩子。後來，她乾脆就把這本「普門品」當作她家的寶物供在神桌上。


    想要求子的人可以試試看，先吃素焚香，然後向觀世音菩薩祈禱：「請觀世音菩薩送給我一個相貌莊嚴、身體健全、福德智慧之子。」如果想要生孩子，先誠心向宇宙預約一位善良有智慧有福氣的靈魂，來做我們的孩子，這樣更有機會是善緣來的好孩子。'
