    1993年練氣功之後，我把氣功師父的「百日築基」當作「一百天的精進修行」，很興奮的期待在這美妙的三個月內可以身心快速的淨化和成長。然而這一段時間，居然面臨了難以置信的婚姻危機。


    對我而言，這項考驗的難度極高，我感到身心煎熬，幾乎要舉白旗投降了。每天就想著快快離婚，解決痛苦。依照我的個性和脾氣，根本無法容忍先生變心，所以逼著他辦理離婚手續。有一天他被我吵得受不了，載著我到法院門口，但是，車子稍停時，他突然改變主意，踩了油門又離開法院了。我很惱火，不想繼續忍受與他生活在一起的痛苦。我說：「你為什麼又不願意離婚了？你都已經愛上別人，不要再扯著我不放，我沒興趣搞三人行。」


