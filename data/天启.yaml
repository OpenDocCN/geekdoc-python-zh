  md: '就在我們以為全書已編好要定稿的那天，忽然間，訊息從四面八方，透過不同的管道傳來。靈界簡直就是在「點名」，而遺漏的文章竟然都在「靈性成長」部落格可以找到。Samantha驚訝的說，那麼多年前寫的文章，她自己早就忘了，本來要提筆重寫，而靈界立即提醒她，文章就在她的部落格中，不必費事了！


    本書的編輯順序主要是依據作者的成長歷程：


    第一部 邁向修行路，主要是源自《無上力量》書中的文章，敘述作者從小聽聞和經歷的親友故事，從中體會到人間的苦難和無常，因而產生出離心，邁向修行的道路。


    第二部 與上天溝通，主要是《愛海》書中的文章，收錄許多與靈界指導靈的對話，以及作者閉關的同一體體驗。


    第三部 永生的靈魂，希望讀者了解靈魂是永生不死的，能放下對生死的恐懼，了解靈界的愛護，並且更加信任上天。


    第四部 因果的律法，提醒讀者，諸惡莫做，勿以惡小而為之，勿以善小而不為。這部主要是修行的基本功。'
  merge: -1
  pgno: 19
- img_proc: true
  md: '第五部 居家修行，與讀者分享在生活中修行的經驗。這一部主要是為了不想出家，或不想參加宗教團體，而在家修行的讀者而寫的。


    第六部 解析夢訊息，希望讀者透過書中的實例解析，了解夢訊息的重要，並且開始記錄自己的夢訊息。這方法有助於了解自己的意識和潛意識，以及目前靈性成長需要改進的方向。


    第七部 宇宙星球，希望讀者透過這些文章能將眼界從地球擴展至宇宙，並且將意識提升到宇宙的層次，進而回歸上主。作者認為，當我們還在地球的每一天，都要過得精彩豐富，不是等到回去靈界時，才享受天人的樂趣，我們可以在地球上享有天人般的美妙生活，也就是，實現「地球有如天堂」的願景。


    當我們綜覽完成的手稿時，才發現，這些故事不僅是我們親朋好友的故事，也是更廣大人群的縮影。雖然故事中有人類殘酷血腥的過去，但也有溫馨感人的提醒，以及充滿希望的當下及未來，一切都交織在美麗的生命織錦圖中。Samantha擅長繪畫，但她從沒想到，這張織錦圖竟然是透過她六十幾年的歲月來展現。'
