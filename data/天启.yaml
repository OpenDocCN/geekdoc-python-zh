  md: '# 我的仙丹妙醬


    有一年夏天，得了一種可能是腸炎的毛病，每天下痢數次，所以身體立刻瘦弱下來，但是我記得黃老師曾告訴我：「每天儘管念佛，別太注意身體，病也是想出來的，一切唯心造，只要專心修行，該死的病，醫不好，不該死的病，想死也死不掉！」所以我每天在心中念著佛號，若無其事的拖了二十來天，瘦得走路都有點飄飄然，重心不穩了！


    一天中午，我躺在床上休息，似乎半睡半醒中，看到一位像武俠片中身著勁裝的男子，手裡拿著柺杖走近我的床頭，對我說：「我是李鐵拐，妳的病得吃那個才會好！」說著他指著我的窗戶，我順著他的手勢望去，窗戶的玻璃上有許多草莓醬緩緩的流下來。


    醒來時，一直覺得自己的夢很有想像力呢！李鐵拐不就是八仙過海那個故事中的仙人嗎？何況，古代的人怎麼會知道這種西方食物呢？再說，我的腸胃極差，多吃點甜食就會胃酸過多，所以我一點也不信這個夢。


    隔天我和黃師母談天，談到這個夢，沒想到她叫我吃吃看，她說反正那也很好吃，又不是什麼藥，說不定吃了'
