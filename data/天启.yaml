    # # 求救


    我夢見一位四十幾年不曾會面的同學,帶著他的小女兒來找我求救。


    過幾天,我看見他的妻子在網路上發出他的病危通知,她說準備去買棺材了。為了這個在夢中求救的同學,我臨時決定買機票,從多倫多回台北,看看能為我的同學做點什麼。


    到了臺大醫院,我看見呼吸急促,垂死掙扎的同學,我問他的妻子,究竟他與小女兒間發生什麼事,使他生病了?她說,父女吵架吵得很激烈,同學很憤怒,忽然中風倒地。我問她為何放棄治療先生。她說:「因為擔心他以後四肢有後遺症,所以放棄治療。」


    我發現我的同學意識還很清楚,他很想活下去,只是不能言語。我問我同學,是否記得我是誰,他居然艱難的微弱的說出我的名字。我覺得他應該會復原。


    我對同學說:「如果你想活下去,就握緊我的手。」他很努力的握我的手。於是,我鄭重要求他的妻子,讓他接受治療。她說:「他這樣會拖累我們全家。」


    第六部、解析夢訊息/303'
  - '[PAGE 307]


    我說：「可是他想活下去，妳不救他，等於殺了他。人的靈魂是不會死的，如果妳讓他肉體死了，他的靈魂會來找妳算帳的，到時候妳也不可能平靜的過生活。」她被我說動了，當天簽字讓她先生接受治療，我的同學才撿回一條性命。'
  - '[PAGE 308]


    # 地毯


    有位朋友，搬進郊區新房子後，先生失業了，運氣很不順，總是跟我訴說。我想幫忙，卻不知從哪裡著手。有一天，我夢見去她家，看見三片暗褐色的地毯，我拿水管噴洗那些地毯，裡面一直流出血水來。醒來後，我打電話問她，是否有那樣的三片地毯？她查看了一下，真的找到大小不同的三片暗褐色地毯，是由一片分割的，分別鋪在不同的地方，那是前屋主留下來的。我說：「扔出去吧！那地毯有問題，會影響你家的運氣。」她立刻就把地毯扔出去了。


    當晚，打坐時，一個外國女子的靈體出現在我面前，面容很難看，我說：「其實真正的妳不是長這個樣子的，妳是上主完美的孩子，請展現妳美麗的面容！」她立刻變回生前金髮碧眼的面貌。她說，她本來住在地毯上，現在被丟到戶外了，她覺得很冷（當天屋外氣溫低於零度）。我問她怎麼會住地毯上？她說，之前，她和男友在地毯上吸毒玩樂時，男友不小心失手弄死她了。


    當下，我呼請天使帶她回靈界，她隨著天使離開了！不久，朋友的先生找到高薪的工作，家庭運氣轉好，經濟也變富裕了！


    第六部、解析夢訊息 / 305'
  - '[PAGE 309]


    # 真相


    林媽住在非常偏僻的山下，種田維生。她有個女兒，十八歲時，忽然在男友家因腹痛而猝死，林媽難以相信，也非常不捨，很想知道真相。


    有一天晚上，她夢見女兒前來，很傷心的對她說：「我不是生病死的！而是因為男友的父母嫌我體弱，不能幫忙種田，不希望我當他們的媳婦，趁男友外出工作時，夥同大哥三人強灌我喝下毒藥，我因此腹痛而死。但是，千萬不要去警察局告發他們的罪行，因為我男友很愛我，也愛他的父母。失去我，他已經很傷心，我不希望這事情鬧大，男朋友又得痛失父母了。」


    此外，我也得知過去世的因果關係，前世我仍是一個小孩時，因為玩火不慎燒死他們三人，而結下這個惡緣。我希望事情到此為止，不要再冤冤相報。這一生倉促來去，沒能善盡孝道，還讓您如此傷心牽掛，請您原諒！」


    林媽得知真相後漸漸釋懷，她依照女兒夢中的交代，沒有向對方追討人命。她繼續種田維生，過著單純簡樸的生活，目前已經九十幾歲高齡了。'
- md: '# 養小雞


    夢有時看起來很無厘頭。前幾天夢到不知道誰送來一屋子的小雞，那黃色毛茸茸的樣子看起來天真可愛，不過我不知道該餵牠們什麼食物，所以把牠們留在屋裡，然後出去忙我自己的事了。等我回來，滿屋子的小雞幾乎都乾乾扁扁的，半死不活的。雖然心裡感到有點遺憾，不過，這也不能怪我，誰叫他們無緣無故送來那麼多小雞，誰有本事養啊？


    我知道，這夢境象徵靈界送了多少小靈魂給我照顧。我與兒子討論這個夢。他說：「養小雞很簡單！陪伴牠們成長就好了，給一點點食物牠們吃了自己會慢慢長大。」


    我：「我情願養大雞，省麻煩！」


    他：「這幾百隻小雞養大了，你就擁有幾百隻大雞，怎麼會只想養一隻大雞啊？小雞就像小嬰兒，你只需要跟他說，天黑了，是因為太陽下山了！不需要跟他詳細說，天黑了，是因為地球是圓的，太陽轉到地球另一邊去了。不需要跟他們說深奧的道理，等他們長大自然會了解！」


    # 接納異族


    有一天，我在夢中看見一位好友在電話中對她的朋友說：「我等一下要出門，兒子要帶我出去玩，所以妳不用來看我了！」其實，她並沒有出去，那只是一個藉口。


    第二天她打電話找我，我問她：「妳明明在家，為何告訴人家，妳兒子要帶妳去玩？」她嚇了一大跳，說：「妳怎麼會知道我昨天跟朋友說的話？」說完她立刻就趕來我家與我密談。原來，她的女兒嫁了一個非洲人，剛剛生了孩子，她幫女兒帶孫子，可是這孩子皮膚是黑色的，一看就有黑人血統，她覺得很丟臉，所以不讓客人上門，也不願讓女婿進門。


    我問：「究竟是女兒的快樂重要，還是面子重要？」她說：「如果你女兒嫁給黑人呢？」我說：「婚姻是看緣分，如果她真的想嫁給黑人，我還是會接受，因為，那是她的選擇。我認為女兒喜歡的人，我們做父母的應該要接納，而且有許多黑人心地很好，也長得很好看啊！無論如何，我一定會祝福我的女兒和女婿！」


    她回去以後，立即接納了女婿，歡迎女婿到家中玩。


    隔了幾年，她摔傷頭部，女兒女婿把她接去他們的家中，無微不至的照顧到她完全回復健康，才讓她回家。


    # 破鏡重圓


    有一天我夢到朋友的母親說：「我可以去你家玩嗎？」我說：「當然可以啦！」夢中，我看到她與先生帶著兒子和媳婦還有三個孫子來。隔幾天，朋友打電話給我：「我爸媽計畫去多倫多旅行時也去拜訪妳，我怕他們打擾妳，所以已經幫他們訂旅館了。」我說：「我夢裡是歡迎他們住我家的，我們的靈魂已約定好了！」


    幾天後，她的父母來了，決定退掉旅館住在我們家，因為他們覺得住我家比較有安全感。談到兒子的婚姻問題時，她母親說：「沒辦法幫忙了！因為兒子有外遇，所以，媳婦鬧離婚，帶走了三個孫子，真是遺憾！」我說他們還會和好的，因為他們的靈魂彼此相愛，還是想在一起共同生活。朋友的母親不信，因為她兒子已經快要跟外遇對象結婚了。


    我說：「妳兒子會聽妳的話，妳勸勸他，他們真的可以再復合的，他們遲早會團圓的！」


    過了幾年，她的兒子和媳婦真的破鏡重圓了。目前，他們也已經當了祖父母了！


    # 三十六道怪風


    去年，我們這裡有一道怪風，吹走許多人家的屋頂，大家都趕緊找人整修屋頂，因此，屋頂的材料賣到缺貨，而且聽說還有工人施工時不慎摔死。


    過兩天，一位台灣同修傳來夢的訊息，希望我解夢。「昨晚夢到有人拿文件給我看，解釋接下來有36道怪風，或是怪雷，要我好好準備！」


    她問：「是誰給我文件？要我怎麼準備？」我說：「是我們天意計畫中的弟兄們！因為我們是工作人員，所以來提醒一下，他們不想嚇到自己人，先讓你心裡有準備，而且，我們還得配合天意演出。」


    此外，多倫多有一個區域接連幾年都遇到大停電。第一年是在冬天零下十四度的氣溫下，停電沒暖氣，要在嚴寒中渡過那些日子，那真是令人心疼的情況！


    那年停電前，我夢見在一片美麗的森林中，不知道是誰在亂槍打鳥，許多大鳥被槍聲嚇得從鳥巢掉到地面，一動都不敢動，似乎驚呆了。


    我詢問靈界，得知這些天災都是在提醒人們：「要專注於靈性成長，不要只注重物質層面的發展。」


    人們接連著被警告，但是都不知道需要改變，他們以為只是運氣不好。如果我們去提醒，他們都說這是天災，還說我們怪力亂神。其實，人們面臨的許多阻礙或災難，通常只是因為不知道要順應天意。


    靈界的警告，最初是細微的，如果當事人不以為意，再次發出的警告就更強烈，到最後就是鑼鼓喧天。所以，即使是收到交通罰單，都要認真想想，之前是否做錯什麼，例如：對別人或家人亂發脾氣，或是做事操之過急等等。


    # 夢中的曼妙舞者


    幾年前的一個晚上，我非常渴望開悟，於是跟上帝禱告，請祂無論如何幫助我！當晚我得到一個永遠忘不了的夢！


    夢中，我看到自己仍然跪著在祈禱！接著，從我的頭頂中心飄出另外一個我。那個我，青春美麗，活潑可愛，身段柔美，輕柔的來到地面，充滿生命力的開始跳舞。我欣賞著她快樂的，全然的舞動輕巧曼妙的身軀，忽然明白～上帝讓我看到內在真我了！


    - 真我永遠青春美麗！

    - 真我永遠充滿活力！

    - 真我永遠快樂無邊！

    - 我應該運用真我的力量～自由自在的遊戲人間！

    - 享受無限美好的生命！


    從此，我開始了嶄新的生活方式，不再深居避世，改以積極的心態面對地球生活。我努力改善家庭的經濟，增加與人們的交流和互動，充實自己，學習英文，重拾所愛的畫筆，跟隨自己的心動，做一切自己喜歡的事物！


