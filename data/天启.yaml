    # ## 幼兒的感知


    嬰幼兒其實是很敏感的，他們剛剛從靈界來到物質界，對地球生活感到相當陌生。一般人認為嬰兒什麼都不知道，其實他們只是還不能說話，但是有一些嬰兒還擁有前世的記憶。比如瑜珈之龍的作者尤伽南達，出生時清晰的記得前世在喜馬拉雅山上的修行生活。有些嬰兒的靈魂年齡可能比我們大，生生世世的經驗可能比我們豐富，對於宇宙的知識也知道得更多。


    我有位親戚在嬰兒時期，若有能量複雜或情緒負面的人靠近她時，她就會煩躁哭鬧。若有抽菸或喝酒的人靠近她時，她會渾身發癢、身上起小疹子，所以她幼年時就很怕陌生人靠近她。


    長大後，她曾經託我幫她查潛意識，我查到她在嬰兒期的感覺，她覺得空氣裡瀰漫著煙味（她的父親年輕時抽菸），房子很小、人很多、很擁擠。（當時他們家只有十坪大，卻住了八個人，而前世她是歐洲貴族，擁有寬敞的古堡，因此剛投生時相當不習慣。）


    嬰兒期的她，還注意到媽媽的門牙有一顆金牙，她覺得俗不可耐。每當她媽媽要餵奶時，她就開始大哭，不肯'
  - '[PAGE 291]


    喝奶。為了讓她進食，指導靈只好派一位鄰居前來提醒。那是一位穿著時尚的鄰居，她問：「妳年紀輕輕的為什麼鑲金牙？因為有蛀牙嗎？」嬰兒的媽媽說：「我的牙齒很好沒有蛀牙，只是那陣子我們家鄉注重時尚的人都去鑲金牙，我以為那是流行趨勢，所以也去鑲一顆。」那位太太好心的勸她媽媽：「很慫啦！一笑就黃澄澄亮晶晶的，台北沒有人這樣做的，可以換掉就把它換掉吧！免得影響妳的高雅氣質。」她的媽媽聽了鄰居的忠告，立即去找牙醫把那個金牙套去除了。這是她嬰兒時期的事情，她的頭腦完全不記得，卻藏在她的潛意識裡。之後，她向媽媽詢問，證實確有此事，我們都覺得很有趣。


    ……※…… ※……※……


    我的兒子學會說話之前，我和先生都在猜，他會先叫爸爸還是媽媽？有一天，我們終於知道他講的第一個字是什麼？那天，我和先生看到住家附近有一間新房子正在出售，就興奮的抱著兒子去看那間房子，準備要買。


    到了房子裡，我們很開心的討論價格準備要下訂金時，突然一歲的兒子跳到我身上要我抱，而且神色恐懼的指著廚房說：「鬼！」我和先生停頓了一下，但沒理會他。我們以為他還不會說話，只是不小心發出這個音，所以我們繼續討論，要出價多少買下房子。'
  - '[PAGE 292]


    這時，兒子又說話了：「鬼！」這次他的發音更清楚了，見到我倆還是不理他，他就用越來越大的聲音說：「鬼！鬼！鬼！」我和我先生面面相覷，寒毛直豎，二話不說，帶著兒子跑出那房子。後來我們才聽說，那間房子的基地曾經有兩座墳墓。


    有一天，我說：「太陽下山了！天黑了！」當時才兩歲但平日寡言的兒子卻大笑說：「哈哈哈！才不是太陽下山了，太陽只是被地球的影子擋住了。」我困惑的望著他，想像他是從太空中哪個星球的角度來看地球？才會得出這樣的觀點？兒子小時候曾跟我說：「我常常都是從天花板上看下來，看到你們每個人在想什麼！或是做什麼！所以我知道你們的所有想法。」原來他小時候一直是用「靈魂的視野」在看我們。


    每當我知道親友家裡有新生兒日夜哭鬧，我會找機會去和那個嬰兒說話：「我知道你剛來地球很不習慣，因為什麼事都要靠大人，還得吃奶、包尿片，充滿無力感。但是人世的時間很快就會過去了，你再多喝幾次奶，就會發現自己已經可以走路。長大了以後，你可以去學校讀書，學習許多新事物，你會很有成就感。所以你要開心起來，好好的喝奶，乖乖的睡覺，快快的長大。不要吵父母，免得他們為了照顧而太勞累，你讓他們好好的睡飽，他們身'
  - '[PAGE 293]


    體健康，才有精神好好陪伴你，照顧你長大。」基本上，寶寶都會眼睛張大認真的盯著我看，也聽得懂我說的話，開始減少哭鬧了，因為他們發現有人能夠了解他們，他們並不孤獨。


    許多人認為嬰兒什麼都不知道，不跟他們說話，或對他們亂說話。事實上，許多嬰兒聽得懂大人在說什麼，而且大人的言行舉止，都會影響他們這一生。所以，和小寶寶在一起時，我都會很尊重他們，溫柔的跟他們談話，每次我讚美小寶寶可愛、漂亮或是英俊的時候，他們都會露出很開心的表情。


    我們可以從嬰兒誕生就開始與他們做好朋友，除了照顧他們的身體成長之外，與他們談天，說故事，可以幫助他們發展思維；唱歌或播放音樂給他們聽，可以紓解他們的情感；多讚美他們，幫助他們建立自信心，他們這一生就更容易健康快樂的成長。'
  - '[PAGE 294]


    # 受驚的孩子


    許多初為人父母者，總是慌張的半夜打電話來問：「我的寶寶似乎受驚了，啼哭不已，而且發高燒了，怎麼辦！」


    我通常會問：「在孩子生病發燒之前，你們夫妻曾經在寶寶面前吵架嗎？」結果，通常都被我說中了！


    小寶寶在各層面都是相當敏感細嫩的，在寶寶面前說話一定要溫柔，有愛心。若是大呼小叫的，很容易驚嚇到小寶寶。所以，夫妻感情要融洽，在溫馨的家庭氣氛中，小寶寶自然會健康開心的長大！


    我觀察到，當父母正在鬧分手時，小孩很容易生病。因為孩子擔心失去父母，失去依靠，不知未來如何生存，所以恐懼到身體出問題。為人父母者，無論如何，都要盡量為孩子、也為自己，保持家庭氣氛的和諧！'
  - '[PAGE 295]


    # 孩子的性向


    每一個孩子的性向不同，就算是雙胞胎，也是兩個不同的靈魂來投胎，有不同的宇宙經驗，有不同的性向和專長。我女兒的記憶力和語文能力都很強，幼兒期她看卡通時會一直對照字幕，小小年紀就拿著一份中文報紙，念出頭條新聞，我很驚訝的問她從哪兒學來的？她說是看卡通學的。


    但是，我的兒子不喜歡學中文，對英文也沒興趣，甚至很少開口說話，然而他的數學很好，也擅長電腦的軟體。後來我引導他做過一次深層溝通，他查到他是來自一個高科技的行星，那個行星上的人都擅長運用電腦。'
  - '[PAGE 296]


    # 陪伴和閱讀


    自從兒子就讀幼稚園起，我通常會在每日的晚飯後，陪他一起做功課，順便預習數學。有時我會陪他一起閱讀英文課外讀物，讓他說說閱讀後的感想，也聽聽他說學校裡的趣事。我們像知心的朋友一樣，相處時總是說說笑笑的，因此，我們一起共度了無數個愉快的夜晚。


    兒子申請到大學那天，很興奮的跑來感謝我！他說：「媽媽我能上這所好學校都是你的幫忙！」我說：「哪有啊！我能幫什麼忙？我只能教你數學直到小學畢業，中學以後都是你自己念的。」他說：「就是因為小學時你幫助我在數學方面打下良好的基礎，讓我對數學越來越有信心，所以後來很喜歡數學，是你讓我覺得讀書可以輕鬆愉快，不必給自己太大壓力。可是我有許多同學，小時候成績跟我差不多，但是他們的媽媽忙著工作賺錢，沒空陪伴他們讀書，他們對於讀書缺乏興趣或是備感壓力，許多同學無法進入自己喜歡的學校和科系，我覺得好可惜！」'
  - '[PAGE 297]


    美國總統老布希的妻子芭芭拉常對孩子說：「朋友！你最好自己拿定主意，要不然就得聽我的。」這一句話幽默而且中肯。她的第三個兒子患有閱讀困難症，醫生告訴她「親子閱讀」是對這孩子最好的良藥。她就卯足了勁，努力陪伴他學習，兒子也因此有了很大的進步。後來她的愛心擴展到幫助其他種族的家庭教育，惠及廣大的人群。


    教育是日日的滋養與陪伴，每天找一段時間陪著孩子成長，自我也同步成長。為人父母者，都希望子女幸福，只要每天滋養一點點，孩子的幸福指數就能節節升高，千萬不要忽視自身的力量。


    有位朋友在修行求道的過程中，忽略了自己的孩子。我給他的建議是：


    靜下心來！好好陪伴孩子成長。


    這是為人父母所能為孩子做的最有價值的事。


    用你的愛心耐心和智慧培育自己的孩子。


    我們的神性可展現在日常生活的細節中，


    不必日日渴望著開「天眼」，


    我們最需要的是開「心眼」～愛心之眼，


    覺知家人的需要，供給家人真正的需求，


    先把自己的天職做好，這就是修行的一部分。


    專注於當下孩子的成長，


    好好培育孩子～這是為人父母最重要的任務！'
  - '[PAGE 298]


    # 親子談心記


    昨晚兒子一定要把奶奶、外婆與阿姨送給他的申請到大學的大紅包和我分享一半，硬說他能進大學都是我幫的忙！兒子還一本正經的說：「媽媽！我擔心以後我教我的孩子，沒有妳教我這麼好！」我都被逗笑了，說：「我都不知道我教了你什麼？如果有，也就只是教你如何愛別人！」


    兒子說：「可是我覺得因為妳是我媽媽，我現在才會活得這麼好，我許多同學他們都活得很不快樂，他們生活都很茫然。」


    我說：「我只是教你沒有恐懼！你現在有恐懼嗎？」

    他認真的想想：「沒有！我想不出我害怕什麼！」

    我說：「其實你帶給我許多快樂，你本來就很可愛，溫柔、聰明、善解人意！你和姐姐都很優秀，所以我有你們就很開心了！」


    我們母子談到凌晨三點，還意猶未盡！'
  - '[PAGE 299]


    # 子女的學業


    有些父母非常重視學歷，而且把自己的價值觀套用在孩子身上。雖然，子女的身體是父母所生，但是，他們有自己的靈魂，自己的生命藍圖，自己的人格特質，也有自己的人生觀。為人父母者，如果硬把自己的人生觀套在孩子身上，常會造成孩子內心的矛盾，並且與父母間產生對立和衝突。


    曾經看到一則台灣的新聞，有一位母親痛失愛子。由於她要求兒子一定要出國留學，而且要念到博士。然而，這孩子並不喜歡念書，但是從小學開始，母親的教育就十分嚴苛，他又不敢忤逆母親，因此深感痛苦。他在國外取得博士學位之後，選擇自殺結束了他年輕的生命。


    這則新聞讓我百思不解，為何這個孩子不能了解母親的苦心？為何選擇以死亡懲罰母親？對他自己而言，苦讀幾十年，好不容易成就了博士學位，為什麼要輕生？


    有一天，我在靜心中忽然收到有關這個孩子的訊息：

    在他埋頭苦讀的這些年中，他變得痛苦抑鬱，思維與正常人不同，逐漸失去了寶貴的生命力。在他努力達成母親心願成為博士的那一天，已經沒有活下去的意志力了。'
  - '[PAGE 300]


    更沒有能力回到台灣，告慰他那望子成龍的母親。他覺得死亡是他的終極解脫，所以他選擇放棄生命。


    在台灣，有許多父母對於子女的學歷相當重視，其實，行行出狀元。我有位同學，畢業後，將大專畢業證書束之高閣，選擇在山區種花養草。假日的時候，他就去花市賣花，生意很好，生活很富裕。由於養花蒔草，常常接近大自然，也有正常的運動，雖年齡已達六十五，身體依然健康強壯，生活自由自在、幸福快樂！可見，擁有一技之長，一樣可以開創美好的人生。


    另一個類似的案例，卻有相當不同的結局。多年前，我有個房客是從中國大陸來到多倫多大學攻讀博士的，他讀到第七年時，可能學業壓力太大了，精神發生異常現象。搭機返鄉的途中，覺得無顏見家鄉父母，想自殺了結生命，所以從國內機場的二樓跳下來。幸好只是摔斷了腿，被父母接回家治療。


    後來，他又回多倫多再讀一年，因為他一直說他殺了他的德裔前房東，他很害怕，覺得冤鬼老是跟著他，所以精神病老是好不了。我還記得他精神病發作的那個深夜裡，他恍惚中看到冤鬼，雙手揮打了牆壁，因此受傷流血，我和女兒一人扶著他的一隻手，帶著他去醫院急診。當時他渾身發抖，極為恐懼，一直說房東冤鬼跟著他。'
  - '[PAGE 301]


    我覺得他平時是一個聰明乖巧且善良的孩子，我和我女兒都不相信他會殺人。我們一直問他是用什麼方法殺了前房東，他卻怎麼都想不起來。我們覺得他很可能只是幻想他殺了人。所以我和女兒專程去探訪他前房東的家，沒想到他所說已被他殺死的前房東，居然活得好好的，還一直稱讚他是好孩子。我們趕緊帶他去看看前房東，他發現自己其實沒有殺人，感到非常開心，病就自然痊癒了。後來，他順利拿到博士學位回鄉，喜劇性的收場。


    約一年之後，他的父親寄來家鄉土產禮物給我們，說非常感謝我們把他那原本以為已經病到無藥可救的兒子醫好了，還說他的兒子常常說，他在多倫多遇到兩位天使（我和女兒），使他真的復原了。現在他已找到工作，能過著正常人的生活。


    整個事件回想起來，只能說是天意吧！因為他平時是很善良的人。當他精神病發作時，發生了一連串的危機和奇蹟。他能夠大難不死，應該是祖上積德，上天保佑吧！


    父母若希望兒女有成就，自己平時就要多多行善布施與積德。四維八德並非口號，而是要在生活中實踐。我們平時多幫助別人，多愛護別人的孩子，上天自然會照顧我們的子孫。因為，萬物同一體，幫助別人就是幫助自己！'
  - '[PAGE 302]


    # 無條件的愛


    與父母、孩子的關係，都要有「無條件的愛」才能過關。何謂無條件的愛？無條件的愛是付出不求回報。大多數的父母，無論孩子是否身體健全、是否長相甜美、是否優秀、是否善解人意，都是珍愛的把他們保護在羽翼下，這就是無條件的愛。


    有一位老先生，雖然有愛心但脾氣很暴躁，兒女都很怕被他罵，所以躲著他。上回我們談天時，他談到子女，忍不住又發火了，他說：「他們不關心我、對我太冷淡，我不留財產給他們。」我說：「父母對子女的愛，不是無條件的嗎？」他思考了好一會兒，無法說出一句話。


    事實上，我們真正的父親是天父～我們的造物主。祂對我們的愛更是無法用言語形容，祂送我們到地球上遊玩和學習，讓我們可以在時空中體驗和歷練，祂分秒都與我們同在，我們的每一個起心動念祂都知道，祂陪著我們度過每一個晨昏，知道我們每一份喜樂與哀愁，祂陪著我們成長，直到我們學會無條件的愛眾生。然後我們終於學會以天父的意志為意志，開始可以陪著眾生學習和成長。靈修者最終要達到「無條件的愛」，宇宙自然會為靈修者打開方便之門，能夠一探究竟，了知宇宙的奧祕。'
  - '[PAGE 303]


    # 人生是一場遊戲


    當我們玩電腦遊戲時，輸了可以重來，對吧？！如果肉體死了，我們會回到真實的世界去挑選一具我們喜歡的身體，然後再到地球挑選一對父母，可以適合我們下一輩子的挑戰。假設，我們在下一世的遊戲中，想當科學家，我們可以去比較文明的國家出生，父母也是比較開明的，他們支持我們做科學研究。我們從真實的世界看地球時，我們知道在地球的生活其實只是一場比較長、比較複雜、困難度極高的、看起來很逼真的一場遊戲。


    當我們越來越知道自己是在一場遊戲中時，會很容易跳脫角色，了悟我們的真實本質。當我們悟出這只是一場遊戲後，自然會比一般不知情的人更理性，更從容自在的遊戲人生。'
  - '[PAGE 304]


    # 第六部


