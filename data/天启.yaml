  md: '# 奇妙的修復者


    幾年前我的左腳背上長了一個約三公分的硬塊，穿鞋子時會磨擦到鞋子，所以很痛。每當我擔心時就祈禱，請上帝來幫我醫治它，然後耐心等待。然而幾個月過去了，它又增大一點，鞋子都快穿不進去，我開始擔心了。那天早上我忍不住跟上帝說：「祢再不來幫忙，明天我就非得去看醫生不可了，因為我擔心……。」


    那天我想睡午覺時，剛要闔眼，忽然看見有一個透明的人影，穿透我二樓窗戶的玻璃，直接走進我的臥室，然後在牆壁上寫一些化學方程式，一面寫一面用心電感應跟我解釋，這沒什麼，只是老舊細胞鈣化的陳積物，說完就走了。我趕緊起來摸摸我的腳背，奇蹟真的發生了，那硬塊不知不覺中已消失無蹤，一滴血也沒有的，不痛不癢的，對方甚至沒有觸摸到，就取走了它。這不是我自己幻想的，也不是夢，是清醒中看見的，我的先生和女兒都可以作證，他們倆人都看過我腳背的硬塊，也知道我的硬塊憑空消失的奇蹟（P.7圖）。


    親愛的上帝！謝謝祢為我展現奇蹟，但是我很好奇，這位奇妙的修復者究竟是誰呢？'
