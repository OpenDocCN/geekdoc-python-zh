    \ |  |\n\n## 本命盤\n\n中國俗諺有云：不孝有三，無後為大，在傳統中國父系社會下，大都強調多子多孫，尤其是傳宗接代的觀念根深柢固。尤其倘若您是獨子的話，我想壓力會是相當的大。所以子息有無這個問題，對中國人而言，是相當重要的事情呢，也因此斗數理會有子女宮的存在。\n\
    \n由於斗數創自中國宋朝，當時的社會氛圍與現代大異其趣，所以古代的標準，到了現今確實已經不適用。因現代少子化當道，加上生殖技術進步，縱使不孕症的夫妻，都可以透過試管或是人工方式成功受孕，或是採用代理孕母的方式。所以有無子息這個問題，我想應該可以從斗數古籍裏淘汰了。因不符合社會進展現況呢！但與子女相處狀況，個性等卻還是相當的準確呢！所以同學千萬別斷章取義說子女宮不用看，因為不符合現代社會型態，但只有子息數量無法推算罷了，其餘的部份，還是可以推估的。\n\
    \n至於命主自述其他的命理老師會說他不是沒小孩就是會「離開」（應該成：生離死別的狀況），到底為何如此論斷，就是因為命主子女宮三方四正會照羊陀雙煞，加上天馬正坐，所以有此推論，並不意外。但其子女宮雖逢羊陀雙煞來衝，但同時也會照昌曲輔弼等四吉星。表示求子路上因煞星影響會比較辛苦，但在吉星拱照下，只要努力，也是會有好結果的。所以山人會說，那位老師說對一半，是否無子息或是生離死別的狀況，以此星曜結構看來是有可能的，因古書有曰：廉貞，1\
    \ 人，若貪狼破軍七殺同，主孤。但這位老師只看到煞星卻忘了吉星也同時會照，此為兇中帶吉之局，尚可撐持呀，以山人觀點，充其量也只是得子較爲辛苦且較晚罷了，沒有那麼嚴重呢！且以此盤論之，除非自己不努力，否則應該還是會有孩子的呢！最慘的狀況就是找代理孕母，一樣可以圓夢，不是嗎？\n\
    \n至於孩子的個性及相處模式呢？這問題就要從該宮星曜組合逐一拼湊了，廉貪正坐會照紫微與輔弼加上天馬，因此個人性上較爲強勢及叛逆，好勝心強，有過動傾向，喜動不喜靜，而天壽、天福正坐，表與子女感情深厚，所以整體而言，相處模式還算不錯呢，只是要多注意過動及較爲叛逆的問題。而結婚時間點呢，基於三才理論，我們就轉進最有可能的（24～33）大限看看吧！\n\
    \n## 本命大限盤\n\n這個大限命宮逢鑾喜對拱，主有正緣可期待，夫妻宮逢天喜且會照本命祿及大限祿，是故此大限應有喜訊可聞才是。但因大限命宮逢本命忌，因此增添了起伏與波折。於成婚年齡，就要逐年搜尋，以流年看來，正緣可能要到\
    \ 28 歲前後，正確結婚年齡，應落在 30 歲前後，而子息問題，倘若女方子女宮頗強，亦可補足命主之不足處，以山人經驗，有無子息這個問題，還是要以母親命盤結構為準，所以還是有逆轉的機會呢！縱使女方也是子息緣淺，但還有現代生殖科技幫忙，最多就是花點錢了吧！所以命主真的不要太擔心呢！倒是先煩惱對象在那兒，會比較實際一點，因為人類總不可能無性生殖吧，沒對象，還談生孩子這件事，好像有點太過慮了呢，各位看倌您說對不對呢？\n\
    \n案例 80、一切就任它「順其自然」嗎？\n\n## 案例 80、一切就任它「順其自然」嗎？\n\n**【提問時間】** 2009-08-30 00:05:12\
    \  \n\n**【提問內容】**  \n人真的是什麼命造就什麼人嗎？當然要更好就要更努力。不過如果感覺沒得選擇，那是否就讓它順其自然？\n\n或許我的命宮在太陰，整個對任何事都超軟弱的，當然什麼命就有什麼優點缺點。但是，總是覺得好無力喔？好難改變。\n\
