    ### 本命盤


    山人常說，一個人的命運，在出生時已經註定 7 成以上，當命盤一排出，好壞立見分明。命無格局者，承擔力弱，注定如何踢騰，都難有好的結果。此時命理老師就應該扮演心靈輔導師的角色，所以習命之人，除隨時充實自身的專業之外，更重要是必須要有豐富的人生體驗，這樣才能夠安慰這些陷於困境中的芸芸眾生，協助依照其特色與屬性，他們找到人生的新方向。同時揮別過往陰霾，勇敢迎向新生，我想，這才是命理存在的目的。千萬不可趁虛而入，造成命主二次傷害。這豈非造業不淺，學者須慎之。提出一句話與大家勉勵：莫因貧賤而欺之，勿以富貴而攀之。故習命者應安貧樂道，以協助苦難眾生走出困境迎向新生為要。這個心態，是每個習命者所應該遵守的原則呀。


    回到主題吧，命主命身均無正曜，福德又逢空又遭羊陀夾置，為命弱身弱之造，所幸本命宮見天壽星及輔弼、魁鉞拱照，否則倘大限流年凶險，還真有性命交關之危呀。但此曜終究是只是助星，但仍難以避免傷病的折磨。此局空劫正坐財宮，會照本命及福德，為標準的勞碌命。倘以福德宮為累世福報的觀察宮位來看，這一世的資糧均被空劫此土匪星曜搶奪殆盡，以因果關係來看，又怎能期待有順利的人生呢？故此類結構山人經常歸類為「還債型的人生」，既然是由因生果，欠債還錢。所以通常建議命主可朝向宗教方向尋求心靈寄託，並以正確的心態來面對人生，再多的苦難，都是累世所種之惡因所造成，還完了就好，能這樣想，人生會快樂的多。


    整體而言，由於本命宮逢輔弼魁鉞四大吉星拱照，除表示命主心慈良善，加上天梁化祿坐命，故命主本性定然相當善良，有同情心，願意照顧弱小，但此曜為風紀官，因此原則性較強，而三方又會照天馬，形成梁馬飄蕩之局，此生難有安定之時，加上空劫齊臨，且命身同宮者，其個性大都有較為固執、堅持及不知變通的毛病，但優點是不論結果如何，都會自己承擔，因此我想應該經常會有「天涯我獨行，不必相送」的感慨吧！我想命主會如此，大都也此而造成的吧！有原則性是好事，但切莫過頭，正所謂過於不及均為災，以此結構而言，便是堅持過度了，加上空劫及天馬會照，以至於產生諸事不順的感觸，其實命由性生，倘命主能適時的放手看開，人生定然會順暢的多呢，不是嗎？


    ## 案例 93、即將消逝在感情宮位的對象，紫微如何破解？


    **【提問時間】** 2009-08-23 11:25:17

    **【提問內容】**

    即將消逝在感情宮位的對象，紫微如何破解？明年我十年運要轉運了，但之前喜歡的對象，卻不在未來那個大運的感情宮位中了，這樣是否代表緣已盡？請問這樣如何用方法解決呢？又感情宮位看哪裡呢？謝謝！


    **【回覆內容】**

    我想您對於斗數有誤解了，十年運勢轉變表示的是宮位改變，運勢跟著改變。如：某人大限 13～22 位於本命盤兄弟宮，大運走勢逆行，則以此兄弟宮爲大限命宮，依序逆向布
    12 宮，作爲觀察這 10 年各宮位變化的情形。而下一大限爲 23～32，位於本命盤的夫妻宮，則以此宮爲大限命宮，依序逆向布 12 宮。斗數觀大限是要了解此
    10 年間的變化。宮位改變表示的是情況改變，而非對象改變。

    以上例來說：假定你在 13～22 大限結婚了，此時夫妻的星宿為假設為天府，如以你的論點來看，23 歲會走另一個十年大限，在這新的大限，假定夫妻宮為太陽與擎羊的組合，表示你的老婆會消失，要換一個老婆了嗎？？？那斗數共有
    12 宮，不代表每個人一生要娶 12 次嗎？所以您真的是誤解了呢！大運改變是指整體情勢的改變，以夫妻宮看來，是雙方相處模式或是欣賞對象的改變，而非婚配或交往對象的改變，倘真如此，天下不大亂才怪呢！所以算命還是要去找真正的老師，比較不會有此種誤解產生。


    還有，斗數是屬於統計學的一種，只是能推論觀察出你一生的起伏，並無法改變或破解，如果你想要破解的話，我想你可能要去依循其他的宗教而行。因為命是天定的，沒有人可以改，但運是後天的，可以靠自己改變，其方法只有兩種，除此之外別無他法：


    1. 改變自己的個性

    2. 行善積德


    另感情的話基本上當然是看夫妻宮了。


