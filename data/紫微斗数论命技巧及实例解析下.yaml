    現在我專心準備參加考試，今年前半年專心努力，卻逢考運不佳，總覺考題不難，考完也算有信心，結果卻是大失所望。我不知道問題出在哪？雖然不想歸咎於命運，更不願意以流年不佳解釋一切。但真心不明白，冥冥之中是否有些姻緣已成定局？？？故想在此誠心誠意向您請教，紫微可看出有無功名嗎？或者考運何時較佳呢？或者運勢合時會撥雲見朗？若大師有空，勞煩您爲我解惑。失禮之處，請您見諒。

