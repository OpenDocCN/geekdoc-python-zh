  md: '案例87、感情困擾請老師解惑


    # 【回覆內容】


    果單從你的本命夫妻宮來看，你的眼光應該還滿高的。不過看來你的對象應該都是身邊的人，如：同學、同事或是鄰居等，整體看來比較適宜晚婚，但是如果有不錯的對象，倒是可以試試。


    只是建議你這個大限（24～33），對於感情還是看開點，因為山人很擔心你的狀況會一再重複發生。讓你自己感到很挫折，分析你這個大限的夫妻宮，貪狼桃花星正坐，但與野桃花天姚星相會，對宮廉貞化忌射入加上空劫來襲，因此你這段時間很容易會錯過好姻緣，就像你現在面臨的困境一樣，桃花不是沒有，只是和對方是有緣無份。只怕長久下去會讓你自己陷入困境，尤其廉貞貪狼這組桃花組合，會野桃花在加化忌，很擔心你會為情所困，甚至是遇到感情上的騙子。


    今年的緣分看起來還不錯，對方年紀應該比你還大，聰明，經濟狀況應該還不錯才是，看來要好好把握才是，試著交往看看。女生追男生應該很容易。不過可別太快把你那急躁火爆的脾氣給顯露出來，這樣會嚇跑人呢！


    基本上堅強的女生，個性都比較內斂也比較急躁，也比較喜歡接受挑戰與刺激。但大部分的男生還是比較喜歡小女生類型的，所以平常時也要適時表現出妳溫柔的一面，尤其是職場上，好事不出門，壞事傳千里。偶爾表現出你那有點散仙的潛質，其實還會滿可愛呢！


    193'
