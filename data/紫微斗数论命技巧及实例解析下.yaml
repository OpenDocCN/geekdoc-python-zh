- md: '## 紫微斗數論命技巧及實例解析（下冊）


    議命主可從事如：客服、電話行銷、櫃檯小姐等類型，定然會有不錯的成就。而鑾喜會命，也可嘗試往演藝圈發展看看呢！


    優點說完了，該來看看缺點了，此局命宮三方會照擎羊、陀羅，雖本命宮火星正坐，本有形成火羊奇局的機會，但可惜會照陀羅破局，在沒有優化的情況下，命主個性定然相當急躁且剛烈，加上會照地劫，是故應對進退相當情緒化且欠缺思考。再觀其官祿宮，雖逢廟旺日月會照，表示在工作上相當容易得到上級長官賞識與拔擢，也經常會有表現自己的機會，但擎羊正坐又會地劫，表示大都因自己個性上的問題，導致到嘴的鴨子飛了呢，就像命主自述目前面臨的困境一般。加上此局人經常有想多做少且過度表現自我的狀況，經常因此而遭人妒忌甚至陷害，所以想要在職場上升遷到不錯的高度，自己的個性，真的要多加修正呀，倘持續如此，只怕難有升遷之時。至於為何其他老師說命主當年有升遷機會呢，基於三才理論，我們就轉進流年命宮看看吧！


    ## 案例85、困惑之人請紫微高人解命'
