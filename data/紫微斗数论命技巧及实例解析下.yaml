    **溢，而此局又可稱爲公門局**，故參與考試擔任公職，也是相當適宜的。整體看來是個相當不錯的命局。但可惜紫微不逢輔弼，否則未來的成就相當值得期待呢！


    **通常魁鉞拱命者**，其外在氣度及儀表均相當出色，但此曜因本質心慈善良，通常當不成生意人。此點可從其天馬與空劫同度，形成半空馬格局的組合可見一班。但可惜空劫同臨官祿，又逢羊陀夾制，因此在職場發展上會是相當辛苦與挫折。而此局由於本命宮火貪成局，表偏財運相當強旺，又財宮會鑾喜適合賺取所謂的「歡喜財」，同時火貪、鈴貪均成局，通常在理財上較爲有投機的傾向，但因三合穩定無煞，因此投機的結果大都應該是良好的。以命主田宅宮穩健的情況看來，撈偏財確實是相當適宜呢！或許因此所以象徵正職的官祿宮才會如此弱勢吧！但畢竟此非求財的正道，因此山人才勸戒命主不宜過度沉迷此道。


    **只是命主命身同宮**，個性上較爲固執、堅持己見，加上主星曜匯聚，個性過於強勢，因此在職場上常因此個性而遭致非議，所以遇到目前的困境，確實不令人意外。加上問命當年正值24～33這個大限，官祿宮逢空劫齊臨，雖逢輔弼拱照，其危害稍可緩解，但仍難逃起伏波折及勞而無獲的困境，尤其本命盤官祿宮相當弱勢，大限組合亦不佳，因此這段時間真的就是多忍耐了，而大限疾厄宮逢羊陀雙煞會照，所以身體健康狀況要特別注意呢，好在命主即將邁入下一個10年大限（34～'
