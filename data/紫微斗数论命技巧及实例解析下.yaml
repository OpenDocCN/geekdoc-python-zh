    # # 案例 62、前途茫茫，想創業不知道合適與否？


    如果目前暫時找不到工作的話，建議你可以去職訓局學習專業技能。政府還有補助呢，以你的能力，倘能在專業技能方面發展會有很好的結果。而且今年你的流年命宮見昌曲魁鉞等文星拱照，考運不錯，可以去考一些專門的證照，難得今年流年利於考試，要好好把握。


    沒錯的話你的感情路上應該也是一直遇不對人吧，滿挫折的。又祿存爲財貨之意，祿存坐命，表示你對於錢財相當重視，可以說是小氣財神，但可惜祿存必遭羊陀雙煞夾制，加上命無正曜借對宮太陽巨門來論，而甲年剛好又是太陽化忌，所以除瞭被空劫拱之外，更形成「羊陀夾忌」之局。特別提醒你，明年流年正值你本命宮，所以會非常辛苦。


    不過你的優點也還不少，你的人緣好、口才佳，反應應該也滿機伶的，滿適合從事業務方面的工作，或是其他以口爲業的工作。


    而且你的想像力應該也滿豐富的，適合從事專門技能、研發、規劃、文學創作等，可以讓你想像力充分發揮的地方。但有時後太過於新潮，反被人家感到激進或難以瞭解。我想這點應該會讓你滿困擾的


    沒錯的話你常會感到身邊小人多，口角是非也多。因爲有時候你的言語有時候過於直接，常常會在無意間得罪人，同時也因此造成自己無謂的困擾，這點你確實要好好改進，對你的未來會比較好。


