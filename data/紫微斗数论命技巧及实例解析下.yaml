    此大限命宮逢火鈴同襲，雖見輔弼拱照，但煞星帶來的不順遂本質仍然存在，不可能因見吉星而抵銷，這是同學必須深切認知的地方。而此大限官祿宮天馬正坐，此曜主動中求財，對宮會照本命祿，形成祿馬交馳之勢，對創業者而言，是相當好的時機，對職場工作者而言，則有異動或是外地工作求財之意，且能有不錯的收穫呢！


    而官祿宮也逢輔弼拱照，三方無煞有吉，因此在工作發展上應是相當順心如意的大限呢！但爲何會有目前的困境呢？


    因大限畢竟是 10 年總和，總是會有那麼幾年是困頓的，畢竟人生不可能永遠順風，也不會永遠逆風，所以問題應該是出在流年上，我們就轉進流年盤看看吧！'
  mdcn: '# 紫微斗數論命技巧及實例解析（下冊）


    每個人事業心都是很重的呢！也有許多是以家庭爲重的，此局倘落男命，則應能開創一番大事業才是。但落女命也不差，縱使不追求事業成就，其賢慧及理財專長，也是能幫夫旺夫的呢！只能說誰能娶到她，真的是好福氣呀。


    從命主自述看來，對於感情的重視程度應遠大於事業，我們就來看看，這位女孩的夫妻宮到底發生什麼事了吧！破軍正坐，基本上對象以「二手貨」居多，就如同命主自述的，經常莫名奇妙成了小三，而火鈴同會夫妻宮，有閃婚的可能，而閃婚由於雙方了解及認識度不足，所以相處之間多是口不言而內心痛苦的狀況，天馬會照，故應是聚少離多。而右弼單入命宮，表感情上易有第三者出現，以命主本命不見桃宿的狀況推斷，應是遇到負心漢居多，整體夫妻宮結構看來，相當符合命主自述的狀況。所幸三方不會煞忌，所以縱使受傷也不致於發生社會事件。又依據命主自述，目前有個對象，但因雙方總缺那臨門一腳，山人推論，也許是因為雙方都沒有同時單身的時候，加上當時正值求學時期，雙方家長應該也並不是很贊成，所以才會有這種狀況發生。


    而以本命盤看來，命主的姻緣動的很早，在 16～25 這個大限，就應該已經有成婚的跡象，以流年走勢推估，此男孩應在 22 歲前後認識，但因當時大限夫妻宮會照雙煞又逢空，因此縱有緣分蠢動，也難有結果，也因此拖延到現在吧！其實以命主的夫妻宮結構看來，仍然是以晚婚爲宜，因對於感情的態度與想法會比較成熟。


    另有關準備公職考試的事情，首先命宮不具備公門格局，倒是文曲單入，適合所謂的異路功名，就是循著非正統的方式任公職，例如戰國時代的蘇秦，靠著口才佩掛六國相印。


    而盤中昌曲皆位於落陷宮位，古曰：昌曲在弱鄉，林泉冷淡，是故倘要金榜題名，可能要比別人更認真準備，也要有多考幾次的心理準備了。畢竟參加考試屬正途功名，對命主適合以異路功名取勝的命局而言，會是比較辛苦的。不過考試畢竟是靠實力的，只要認真努力，其實不管有沒有格局，都會有希望的。而命主問命當年是民國
    98 年，流年命宮逢魁鉞拱照，考運還算不錯，努力點應該會有機會的。


    ## 案例 99、請高人指點工作迷津


    ### 【提問時間】


    ### 【提問內容】


    > 您好，最近爲工作的方向很迷惑及煩惱，剛好在網路上尋找有關算命的文章就找到您這來了，不曉得您能否幫我算一下工作呢？我是國曆71年8月12日辰時出生，若可以則非常感謝您，不方便也沒關係，謝謝！


    ### 【回覆內容】


    > 沒錯的話你應該是滿有想像力的女生吧，想法頗爲特別，有時讓人難以接受，做事情總感到東做西成，個性的話應該是滿開朗大方，有點大姊頭的樣子。但陽剛中又不失女生的溫柔，但平時應該屬於陽剛型的女生才是。


    > 看來你應該也是屬於比較愛打抱不平，有正義感的人。心直口快，常常會得罪人，所以這些都是你個性上的缺失，要記得改進，這樣對自己未來都比較好，女生還是比較溫柔點，有原則是好事，但也要聽聽人家怎說。


    > 就你個命宮星宿組合來說，比較適合創作、研發、公關及企劃或其他可以發揮你想像力特長的工作會比較適合，而且你應該外型屬於俏麗型的女生，異性緣應該也不差，加上你的個性，應該好哥們很多吧！


    > 至於工作的話，以大限來看，呈現祿馬交流的狀況，表越動越有財。只是錢財部分應該還是守不太住，總是因爲意外而支出，常感到有過路財神的感覺吧！不過在這10年至少辛勤奔波會有點收穫與成就感的。


    > 幫你用流年看看，我想去年對你應該是還滿順利的一年，但今年工作上應該滿辛苦的，對宮大限化忌衝入，雖坐紫微但無輔，因此更感到單打獨鬥，而且做任何事都感到有點卡卡的，看似簡單順利的工作卻一拖再拖，而且外在的競爭壓力很大。確實來說，今年在工作運應該很辛苦，而且貪狼化忌坐夫妻宮，相信在男女之間的關係上也會有不小的影響。總之今年多忍忍，明年應該會順利多，能讓你有表現的機會，雖說還是有點空虛感，但應該比起今年會好很多，如果有工作的話，堅持下去，明年有可能會受到重用。雖說很辛苦，但多少會有點小回報。


    > 人生就是這樣，起起伏伏，不會有永遠好，也不會有永遠壞，看開點，遇到逆境多忍忍，自然就雨過天晴，不要想太多。至少你的工作運沒有連續走壞好幾年呢！


    ### 【發問者意見】


    謝謝！


