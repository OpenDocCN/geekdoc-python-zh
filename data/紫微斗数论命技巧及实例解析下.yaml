    # # 本命大限盤


    命主問命當年爲西元 2009 年，時年 28 歲，大限落於 24～33 這個宮位，大限命宮廉貞正坐加會紅鑾天姚，大限化祿及化權會照引動，因此正野桃花同時引動，可謂百花齊放呢！而大限夫妻宮會照天喜，又逢對宮化祿引動，此大限結束前，必能聞到喜訊無疑。但同時會照孤辰寡宿，所以對象必須慎選，對象錯誤，則離異的狀況也是有可能會發生呀。以此大限夫妻宮結構看來，理應晚成爲宜。（註：須視流年的姻緣狀況而定，因此段期間緣分包含正緣及桃花，該如何選擇，我想這


