    # ## 【命盤解析及內容說明】


    ![](img/28f3dd112e79ba7e3ec565caf64b7b7d_72_0.png)


    # ## 本命盤


    此命為文武雙全之局，命宮三方逢昌曲來拱，為文星拱命

    之局，命主聰明有才華，又此局又稱為公門局，相當適宜朝公

    門發展。又鈴貪入命成局，古曰：威權出眾，宜以武職顯貴，

    三方不會煞忌，故此結構相當漂亮。古曰：昌曲入命，不讀詩

    書也可人，通常昌曲入命的人，大都有相當的氣質，身宮坐天

    姚，故命主外型應該不差，加上龍池，鳳閣入福德，表示命主

    心思細膩，多才多藝，故擔任空姐，應是相當適宜。'
