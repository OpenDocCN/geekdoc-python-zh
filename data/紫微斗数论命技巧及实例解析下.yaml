    橫看豎看，命主都應當會有不錯的發展與成就才是呢！


    至於財運部分，財帛宮雖逢本命貪狼化祿正坐，但三方空劫羊陀四煞匯聚，求財會相當的辛苦，且大概都需要靠努力獲得，倘不會煞，逢本命祿正坐，得財會是相當容易的呢！這就是煞星帶來的影響呀。再觀其財庫，得昌曲輔弼四吉星拱照，因此庫位頗爲穩固，倘能穩紮穩打，晚景應可期待才是。而祿存正坐田宅，表命主多爲穩定之財，且太陽化祿本身就不代表錢財，其象徵是名聲。是故以財帛宮及財庫狀況看來，命主宜將名逐利，不可以錢滾錢，否則破耗難逃。


    由於命主問的是緣分，我們就從本命宮看起，本命宮野桃花天姚正坐，故命主應桃花不缺，但正緣會比較難得。此點可從夫妻宮得到反證，地劫正坐，得亦復失，三方會擎羊、陀羅雙煞，感情不容易有穩定之時，所以一路上走來，會相當的崎嶇波折。


    再觀其子女宮，逢地空地劫夾制，表與子息緣分淺，或是聚少離多的情況，所以這又反證了夫妻宮顯現的情況，倘在古代，恐有無後之慮。但現今科技發達，不孕症夫妻透過試管嬰兒等生育技術得子。台灣新竹的送子鳥診所創下的最高紀錄還有
