  md: '紫微斗數

    論命技巧及實例解析（下冊）


    # # 案例 100、請教是否適合外出創業？


    **【提問時間】**

    **【提問內容】**

    了然山人你好：

    我國曆 71/05/10 晚上六點生，我想請教是否適合外出創業，因本身家中經營小工廠，收入勉強可以過活，但我已 29 歲，希望能外出創業，但受到家裡反對，產生家庭革命，不知是否還要堅持已見？能給我一個建議嗎？


    **【回覆內容】**

    你的命立四馬地，我想你應該也是屬於那種坐不太住的人，此局人本來就適宜在奔波中求財。而對宮雙主星會照，表示你本性不喜歡寄人籬下，加上本命盤呈現殺破狼格局，整體看來比較勇於接受挑戰及追求成就，所以你會有這種想法不讓山人訝異。

    而你本命宮見地劫入命，地劫本來就是反傳統、反潮流，所以你應該對家裡的經營模式有許多的意見，也因此想要自行出外創業吧！而雙祿馬交馳於田宅，整體而言，頗適合創業求財，但因命身空劫各一，古曰：浪裡行舟，如要自行創業的話,'
  merge: -1
  pgno: 262
- img_proc: true
  md: '# # 案例100、請教是否適合外出創業？


    可能會很辛苦，也不太容易有很大的斬獲。倘真的要出去闖一闖，建議創業規模不可過大，且最好以獨資爲宜，這點是山人必須先跟你說清楚的事情。


    從你的田宅宮及父母宮來看，家境應該還不錯。而且你的田宅宮頗爲漂亮，如果以田宅宮爲財庫的話，算是十分穩健的。沒錯的話父母親應該也有打算把公司工廠交給你，因你的田宅宮見天巫星，天巫星主長上贈與之財，如果有自己的想法，可以多磨練經驗與視野，等待機會讓老屋翻新，這不也算是光宗耀祖嗎？


    以山人的觀點，建議你克紹其裘。在家裡的工廠內打拼，因爲看起來早晚會是你的，同時改改你自己那有點過於新潮的想法，多與父母親溝通經營模式與方法。地劫入命的人雖然反傳統、反潮流，但其創新及豐富想像力的優點卻是不可忽略。許多從事企劃或研發工作的人命宮都見地劫星，就是因爲這特點。所以也許父母的觀念過於老舊，試著溝通與了解。你現在應該的方向是，如何使父母親創建的事業逐步擴大，以你的田宅宫看來，確實應該如此做。


    【發問者意見】

    謝謝老師指點。'
