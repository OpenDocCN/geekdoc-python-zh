    確實是相當符合呀。另大限官祿宮逢羊陀雙煞沖照，因此在事業上也較有起伏，所以這段時間走的會是相當辛苦呀。


    至於朋友問題，由於僕役宮無主星，借對宮天機天梁論之，主交遊廣闊，朋友多為專業人士或精於某種學術或技術者，但逢地劫正坐，故朋友相處難有知心，且多有因友破耗之情事發生，此點可從其本命宮呈現孤君無輔的情況可得反證。而身體健康問題，觀其疾厄宮天同太陰正坐，多有消化系統及代謝問題產生（詳上冊第一章第三節），以經驗判斷，應是胃部疾病的機率最高呢！


    另有關姻緣問題，由於鑾喜於16～25這個大限對拱，加上會照本命祿，倘此間流年穩定且又逢化祿引動，定有喜訊可聞呢，所以推論命主姻緣成的相當早，以流年看來，應成於23歲前後，本命夫妻宮逢天相正坐，表示配偶賢慧持家，且婚配對象多是鄰居，同學或同事等週邊較為熟悉之人，此點與命主補充內容相當符合。又命主與孩子的關係部份，以子女宮觀之，太陽巨門正坐，主個性活潑外向，口才相當不錯，三方會照地劫，表個性較為叛逆，且相處之間代溝頗重。又會照旬空及天空，故與子女緣份較淺，有聚少離多的狀況。


    總而言之，命主相當不宜從事投機事業，定然以敗局居多，倘能做點小生意，以其田宅宮穩健的組合而言，應能有不錯的成就。'
