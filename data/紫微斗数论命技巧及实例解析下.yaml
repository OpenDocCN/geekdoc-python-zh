    命主太陽坐命，此曜女命相當不宜，因太陽爲男性的象徵，女命得之，其個性因過於陽剛，心直口快加上脾氣通常頗爲急躁，大部分男孩子都比較會退避三舍，此點由其提問內容語氣可見一班。由於女生仍然是以姻緣爲重，女生個性太像男生，與男孩子較難發展男女情愫，感情路上不易有發展，故此曜坐女命，大都以大姊頭居多。所幸命主三方仍然會照太陰，是故仍保有女性溫柔婉約的特質，整體給人感覺是個外剛內柔的女孩。又其身宮坐天喜，故應屬俏麗型女生，而鑾喜拱身，更是表示其異性緣絕佳。又火鈴拱照夫妻宮，相當有閃婚的可能，且與配偶相處之間，大概也是口不言而內心痛苦折磨。


    此局有兩個可惜之處，其一是少了文昌星，其命宮倘再會照此曜，便形成「陽梁昌祿」奇局。其二是命宮逢地空地劫拱照，為浪裡行舟，因此而增添了人生的波折與不順心。而此兩曜帶來的影響經常是因想法過於偏執且聽不下他人勸告，故經常遭到失敗的苦果。山人常說，倘命逢空劫，應勤加修心，想辦法把此兩曜的影響減少，畢竟此兩曜帶來的影響，是可以靠自己的努力改變的。但羊陀火鈴此四煞的影響，就是難以靠自己改變。因此空劫入命者，尚有可為也。且此曜的想像力及創新能力是超越正常人的，所以適合從事研發、創作、規劃、企劃等，善用其天馬行空的想像力及勇於創新的優點，我想激發出來的成果，會相當不錯的呢！


    至於工作部份，基於三才理論，我們就轉進大限盤看看吧！


