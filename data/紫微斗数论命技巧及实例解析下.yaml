    \ |\n| 疾厄 |\n| 亥 |\n| 電話： |\n| 地址： |\n| 編號:000000124 |\n\n## 本命盤\n\n紫微坐命，首先要看是否會合左輔、右弼形成君臣慶會的大局，倘結果是沒有，那就屬於孤君無輔，倘會煞過多，則爲無道之君。此例中，三方四正中不會輔弼，故不構成大局。但逢天魁天鉞拱照命宮，爲坐貴向貴格，又可稱爲公門格局，基本上表示命主天資聰穎，才華洋溢，且魁鉞二曜也是貴人與機遇的象徵。此盤倘會照輔弼，那命主定然會有相當的成就才是。\n\
    \n而此盤左看右看，實在想不出差在哪理，此盤格局雖稱不\n上極品，但至少可以貴格論之，倘說到不好，最多就是擎羊煞星坐命，但擎羊與天相同度，古曰：天相爲善曜，可制擎羊之惡。此處必須特別說明，並非天相會擎羊便可抵消其影響，而是可以抑制及優化，但其暴戾之氣仍存在，其外在表現是雖然脾氣火爆，但往往像陣風，過了就沒事了，而且發完脾氣後經常是後悔的呢！故此盤並非不佳，因此山人才勸誡命主寬心。\n\
    \n而紫微坐命的人，通常不太願意寄人籬下或是順從他人領導，尤其命主三方又會照天府，天府星爲南斗主星，雙主星坐命，我想要它乖乖在職場上受人指揮領導，會是相當苦悶的事。因此會有創業打算，並不讓人意外。而通常擎羊坐命者，創業只宜獨資，加上紫府不會輔弼，缺少得力助手，靠著個人的能力單打獨鬥，會是相當辛苦的呢！所以個人工作室對命主而言，確實是個好事。又此盤天馬居巳，三方四正不會祿就罷了，還會照本命太陰化忌，形成拆馬忌組合。故此盤創業相當不適宜，輔以其命宮情況，倒也是相當符合的呢！以田宅宮狀況看來，日月昌曲共度，又會雙祿，我想命主家境應該相當優渥，有祖業及祖產可得，財庫相當漂亮，而觀其財宮，武曲正坐，財星得位，又三方形成火羊的偏財局，主財多，與其本命田宅宮的狀況相呼應。但三方會照地空，除將火羊局給破壞之外，亦表得中有失，以此狀況看來，不宜進行貿然進行投資。\n\
    \n而命主雙祿均落僕役，古曰：祿落僕役，縱有官也奔馳。基本上命主相當照顧兄弟朋友，是個對朋友兄弟相當講義氣甚\n至是重義不惜財那類型的人。所幸三方組成良好，看來不太會有「真心換絕情」的結果。看到這理，山人實在搞不清楚，為何有算命老師說他的命不好呢？真是費思量呀。\n\
    \n而命好，是否就保證終身富貴呢？那可不然，正所謂「命好運好限好，到老榮昌」，因此命局與運限的行進狀況是相輔相成的。依據山人多年經驗，舉凡本命宮領有大格局者，通常是屬於「大雞晚啼」型，事業成就會比較晚。不過這也是好事，因年少得志大不幸呀。\n\
    \n基於運限相輔相成的道理，山人也常說，倘本命創業不宜，若大限流年漂亮，倒是可以炒個短線，但必須見好就收，切莫戀棧，仍是有可爲的呢！所以我們就來看看命主這個大限的狀況吧！"
