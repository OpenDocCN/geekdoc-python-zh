    ### 本命盤


    山人在看到命主自述內容，心理便在猜想，此人命必逢空劫，因空劫入命者，一生至少會被騙一次。其因爲何？因此局人經常都是聰明一世，糊塗一時。且空劫兩煞曜影響的是自己的判斷力，所以誤判狀況，對空劫會命者，是很正常的。因此山人暱稱此二曜爲「土匪星」。另其必有化祿或禄存正坐或會照命宮，因只有禄落僕役者，才會有重義不惜財的狀況。(所以要借錢或是找「人呆」,只要找這種格局的人，包準沒錯)。


    當星盤一排出，果然與山人推測相同。可惜命主沒有早點遇到山人，且聽進勸告，謹慎行事。自然此嚴重損失不會發生。但山人常說因果關係的存續問題，所以這也許是命主上輩子欠朋友的因果債，還了也好呀！


    而命主命身同宮，基本上表示是一個固執，堅持己見的人，但後果不管好壞，都會自行承擔。我想這也是他目前難過的原因吧！其實此個性之人，加上空劫會照，推測應該是相當固執，完全聽不進他人勸告，也很難溝通之人才是。因空劫帶來的疏狂本質，加上自己莫名無謂的堅持，自然造就這種個性。也因此遭朋友詐騙的結果，其實真的不令人意外。


    至於命主是否適合創業，我想以此個性之人，創業要成功，只怕是會很辛苦。從星盤看來，祿存與天馬同度，本是好事。但又與空劫同宮，此局稱爲半空馬 + 倒祿格局，故創業或做小生意是萬萬不宜。此局本爲祿馬交馳會命，最宜外地經商求財，但可惜被空劫給搞掉了，但因會照本命宮，是故經常會有創業的想法。


    但以星盤結構看來，剎羽而歸的機率相當的大呀。而此點可從其財帛宮及田宅宮星曜結構得到反證。倒祿格局落於財帛宮，得財不易，且經常是過路財神，錢財怎來就怎去。而田宅宮會擎羊，陀羅雙煞，庫位破耗嚴重，以此田財之星曜結構加上自己的個性，我想乖乖的待在職場上發展，是最好的選項。尤其命主目前從事會計工作，相當適宜。'
