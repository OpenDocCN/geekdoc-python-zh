    # # 本命大限盤


    此大限命宮逢火鈴同襲，雖見輔弼拱照，但煞星帶來的不順遂本質仍然存在，不可能因見吉星而抵銷，這是同學必須深切認知的地方。而此大限官祿宮天馬正坐，此曜主動中求財，對宮會照本命祿，形成祿馬交馳之勢，對創業者而言，是相當好的時機，對職場工作者而言，則有異動或是外地工作求財之意，且能有不錯的收穫呢！


    而官祿宮也逢輔弼拱照，三方無煞有吉，因此在工作發展上應是相當順心如意的大限呢！但爲何會有目前的困境呢？


