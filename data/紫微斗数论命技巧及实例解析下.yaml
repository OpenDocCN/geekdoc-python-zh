  md: '# # 案例69、我的命格屬於機月同梁嗎？


    古曰：同梁守命，男得純陽之中心，因此，命主應該是個正直，誠懇又重信義的人。但空劫於命身宮對拱，勞碌且無所成，加上三方天機天梁與擎羊相會，太陰擎羊又成局，且天梁正坐命宮，是故命主原則性甚強，經常會讓人感到不近人情，但有時候又會有許多無謂的堅持。


    命盤逢紫微輔弼同度，形成君臣慶會格局，又逢雙祿馬交馳，適合從事買賣交易獲得利潤，整體而言，命盤相當漂亮，財宮逢雙煞襲，錢財破耗難流，但財庫卻是雙祿交流，此局為財弱庫強之局，只要命主能守成，不遭詐騙或投機，我想晚景仍是相當值得期待。但通常空劫入命者，一生至少會被騙一次以上，這也是一種無奈呀。


    倘命主真要創業，建議盡量選擇流動性高，規模小的微型創業，例如網拍，園遊會，攤販或小吃等，必有利基，因小本經營，縱遭詐騙或倒債，以其田宅宮穩固的狀況，損失也有限呀。


    至於命主提到僕役宮吉星匯聚，確實是如此，六吉全彰，山人常說，六吉星匯聚之處，也是命主最強的宮位，輔弼表示朋友對命主交友的層級甚高，能成爲助力，魁鉞則是貴人的象徵，表示能得到提攜協助，而昌曲表示朋友間多有才華能力之人，紫微會輔弼，爲君臣慶會格局，能因朋友部屬助力而成大事，所以那位朋友說錯了，應該是倒過來說，是朋友會對他很好很照顧，並不是他對朋友很好呢！'
