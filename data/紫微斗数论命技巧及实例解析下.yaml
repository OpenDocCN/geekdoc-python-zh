  md: '# # 紫微斗數

    論命技巧及實例解析（下冊）


    且此局又可稱為公門格局，故從事公職，也會是相當適宜的。


    另命宮三方會照又陀羅及擎羊，此兩煞星帶來的是挫折與不順利，但在大格局的支撐下，雖然外在環境不佳，但卻是關關難過，關關過。並非大格局能抵消煞曜影響，除非是成為斗數奇格如：鈴貪，火貪這類，這點必須要特別強調。而命主本身空劫會命，個性略帶點迷糊散仙，但由於格局夠強，因此想要詐騙他，我想還是很困難的呢！充其量也只是較無理財觀念罷了。


    通常紫微坐命又成局者，主觀意識都相當強，且絕大多數不願意屈居籬下。但因空劫影響，所以經常待人處世上，會給人家滿不講理的感覺，而且也經常發生誤判形勢的狀況，我想這也就是命主在工作上會不穩定的原因，並非工作不適合，而是因為自己誤判形勢及太過急於想要做主的個性而敗事。以此格局看來，我想老闆對命主的工作能力及才華，應該都是評價很高的呢，只能說是小廟容不了大和尚了。終歸起來，問題都出在自己身上呀，這也就是此些煞曜帶來的影響。


    故命主倘能練習修心，如打坐，瑜珈等，讓空劫對自己的影響減少，以此格局而言，定然會有相當成就才是。倘不願意改變自己，只怕這種一年換 365 個老闆的狀況，會層出不窮，也不容易有穩定的時候。正所謂命由性生，其意便在此阿。希望命主能真正改善自己個性缺陷，不要白白浪費此難得一見的大格局呀！


