  md: '# 案例83、從命格看事業、財運&中年或晚年能享福嗎？


    會提出此問題，並不讓人意外。但接下來命主連續走3個強運的大限，斗數每個大限以10年為度，3個強運大限，就是30年呀，多麼讓人羨慕呀。這不正呼應了「大雞晚啼」的通則嗎，基於研究的精神，山人就簡單分析如下：


    1.32~41大限，逢本命祿正坐，三方穩定無煞，大限官祿宮又逢日月並明，此段期間倘於職場上，會是發光發熱的開始。


    2.42~51大限，大限命宮廉貪正坐，三方會照紫微與輔弼，形成君臣慶會大局，所有主星均到齊，雖陀羅正坐，但因此局夠強勢，故煞星造成影響不大。而走紫微大限，通常都是相當有成就的時候，加上命主格局相當大，故定能有相當滿意的成果。


    3.52~61大限，逢日月對應，三合亦是穩定無煞，相當漂亮。


    整體而言，命主中年運相當強勢，故此段時間只要堅持不投機或從事投資事業，專心一致的在職場上發展，晚年定然會是相當悠閒自在。最怕就是被30年大運的成就給沖昏頭，導致過度擴張或投機，則以62~71這個大限星宿組合而言，定然有苦頭吃。所以山人在回覆時刻意不提後來的大運發展，就是希望命主能再大運來到之前，學習好理財與建立良好心態。否則以大限走勢而言，中年雖然強勢，但晚景確實堪慮呀。'
