    # ## 本命盤


    本命盤太陽正坐，通常太陽坐命的男生，個性開朗，有正義感，個性較爲急躁，經常因爲過於直來直往而得罪人不自知，但做事積極主動，其實整體而言，由於太陽除爲中天星曜外，更爲爲男性表徵，男命得之，相當適宜。倘結構佳者，其成就更是不可限量呢！


    此盤由於太陽居子位，爲落陷宮位且本命化忌，加上三方會照地空，地劫。爲「浪裡行舟」的格局，空劫入命，除爲人較爲迷糊散仙外，也暗示了命主此生難逃勞碌奔波無所成的味道。故此局又稱爲勞碌命。而此兩曜係自三方會照，表示外在環境對命主相當不利，但因太陽坐命者，通常事業心強。但由命盤構造看來，並非命主不努力，而是外在環境強於本命所致，也因此倍感失落吧！且一顆坐落於官祿，一顆坐落於遷移這兩個對男人最重要的宮位，我想這應該是其他命理老師會說命局不好的主因。


    而本命宮三方巨門火星會照，當流年擎羊出現於值年命宮三方位置時，就構成巨火羊的惡局，此局山人稱爲，禍必自招，意思就是因爲自己的問題導致嚴重的錯誤結果。


    三方會照巨門，巨門爲暗曜，子位太陽又照度不足，暗上加暗，且空劫雙曜除讓人奔波勞碌外，同時也會讓人容易胡思亂想，綜合此兩因素，我想命主遇到困境會失眠加上暴瘦，是有他的原因的。但太陽巨門結構本質尚稱不錯，所以命主仍然適宜從事以口爲業的工作，如業務員，講師等。


    而其盤中天馬會陀羅，爲標準折足馬格局，是故此局人不宜創業也因空劫入命，故不宜從事投資或投機的事業，必然遭逢重大挫敗。再觀其財帛宮，雖逢本命祿，但三方會照雙空，主與財無緣，空歡喜一場罷了。此點可從命主自述經歷可反證此結果。但其田宅宮逢科祿權三奇佳會又逢文昌文曲來拱，主得財容易，相信命主家境應該也還不錯才是。故若命主能夠專心在職場上發展，不輕言創業或從事投資及投機事業，我想以其田宅宮穩健的狀況，雖無大富之有，但小富卻是沒問題的。


    以命主尚未滿 40 歲，還算年輕，人生還有很長的路要走，倘能聽進山人所勸，穩紮穩打，謹守本分不踰矩，我想還是亡羊補牢，還是猶時未晚的。這也是命理最可貴之處，就是能依據本命缺陷，指導命主趨吉避凶，改變人生。


    而命主問命當年為戊子年，流年命宮居子，與其本命宮坐落宮位相同，星曜組合相當差，又上節曾提過命主本命宮逢巨門火星會照，而戊子年適逢流羊於流年遷移宮，整體三方四正構成巨火羊惡局，所以當年的不如意，必是由於自身的因素所造成的，此部份可從命主自述內容得到反證。不過流年畢竟只主
    1 年之運，發生的事就已經發生，逝者如斯，重點是要把握好未來才是，所以我們就來看看民國 98 年己丑年的命盤吧！


    ## 大限流年盤


    正所謂柳暗花明又一村，人生不可能永遠逆風，也不可能永遠順風。在命主身上得到證明，民國 98 年流年命宮逢天府正坐，三方會照天魁天鉞及左輔右弼，四吉星匯聚，雖坐陀羅煞星，但此曜入墓不兇，故
    98 年當年可會是相當順利的一年。天魁天鉞表機遇及貴人，屬天助型吉曜，而左輔右弼表助力，為人助型吉曜。是故 98 年在事業發展上，應會有相當成就才是。


    又此年逢紅鑾天喜會照流年命宮，且夫妻宮武曲化祿，看來有結婚的跡象，所以建議命主是個很適合結婚的時機呢！加上流年看來會有一番新氣象，故要求婚，此時最爲適宜。而魁鉞入命，基本上亦可表示考運頗佳，是故山人建議倘命主一時之間找不到方向，也賦閒在家，不如趁流年魁鉞會命時，專心衝刺國家考試，當個公務員，也是很不錯的選擇呢！


