    ### 本命盤


    許多人在運勢不佳時，都會改名希望能帶來好運氣，我想這是心理作用大於實際作用。須知今生所有磨難，都是因爲累世所種之惡因所致，倘改姓名就能改變因果，那您又把因果關係置於何物呢？不過改個名字，重新出發，迎接新生，倒是不錯的呢！


    命主祿存坐命，援例應該也是小氣財神一個，而府祿相三合會命，更表示命主不但善於理財，對於「守財」，應該也很有一套呢！而此命局相當漂亮，天府正坐，會照紫微，雙主星會命，又逢左輔右弼，形成君臣慶會大局，古曰：才善經邦，加上魁鉞拱照，除表示命主才華洋溢及聰明之外，也是多貴人與機遇的象徵，整體而言是一個強勢的領導者格局，倘大限流年搭配得宜之時，定能有一番相當大的成就才是。但因格局夠大，古曰：能降七殺，制火鈴，故煞星不但對命主影響不大，倒是能夠激發其潛能呢！且以山人經驗，通常本命格局大者，大都屬於大雞晚啼型，年輕時都會比較辛苦。命主年紀尚輕，故此段時間的不順利，是相當正常的。並非其命運不佳，而是大限問題，所以這段時間就當成累積經驗，畢竟命格強勢者，未來相當值得期待呢！


    又本命宮逢鑾喜對拱，表示異性緣相當好，但夫妻宮逢空劫對拱，又逢本命忌，雖逢魁鉞拱照，但感情路上難免出現單戀或是聚少離多狀況。整體看來，以晚婚爲宜，且命主命宮得府相來朝，古曰：府相之星女命纏，定當子貴與孫賢。因此命主幫夫運相當強的呢！由於命主問命當年正值
