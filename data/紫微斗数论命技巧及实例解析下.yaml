    案例67、想換工作，請教紫微達人


    **【提問時間】** 2009-10-31 22:59:33

    **【提問內容】**

    農曆74年1月14日亥時，女。命宮是紫微貪狼星，想請教紫微達人們，明年想要換工作（想考空姐）不知道合不合適？明年換工作好嗎？還是不要變動比較好？明年工作上有沒有什麼該注意的？一直很苦惱。所以想請教，希望能給我些參考。

    **【回覆內容】**

    看起來你是一個有才華心思細膩的女生，當空姐確實是滿適合的，服務類性質的工作都不錯。

    以大限來看，大限官祿宮星宿組合不錯，應該是能在事業上有所進展才是，以流年來看，明年流年命宮逢化科，會天馬。所以會有異動的徵兆。但是遷移宮會雙煞，本命宮又逢陀羅正坐，陀羅主慢，而官祿宮又逢空劫來拱。雖會太陰化科，但也會化忌。造成科忌交馳的局面。

    基本上可能會發生努力很久，卻高分落榜或是縱然錄取，也有可能無法如願，如本想當空姐卻變成地勤人員，陰錯陽差，而且以官祿宮逢空劫來推論，看起來在職場上會很辛苦與'
