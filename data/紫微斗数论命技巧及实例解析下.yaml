    以本命宮來看，命坐武曲爲財星坐命，加會化祿星，財星遇財，本是可收斂其孤剋，獨斷之本性。但可惜化忌同時會照，本命宮祿忌交馳再會地劫，因此難免爲財煩惱甚至惹來麻煩，加上身居財宮，此生更是難免會爲財拼生死呀。再以財宮觀之，仍是祿忌交馳之局。不過財庫會照本命祿存再逢科權，不見煞忌，頗爲穩健。只要能夠守成不投機，自然可以期待中晚年順利。


