    # ## 本命盤


    命主太陽坐命，此曜女命相當不宜，因太陽爲男性的象徵，女命得之，其個性因過於陽剛，心直口快加上脾氣通常頗爲急躁，大部分男孩子都比較會退避三舍，此點由其提問內容語氣可見一班。由於女生仍然是以姻緣爲重，女生個性太像男生，與男孩子較難發展男女情愫，感情路上不易有發展，故此曜坐女命，大都以大姊頭居多。所幸命主三方仍然會照太陰，是故仍保有女性溫柔婉約的特質，整體給人感覺是個外剛內柔


