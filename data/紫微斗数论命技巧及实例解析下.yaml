    命主太陰坐命，基本上屬於氣質型的漂亮女生，而太陰為女性象徵，因此有心思細膩，溫柔婉約的特質，魁星坐命，外表雍容華貴。而昌曲會命，故命主天資聰穎，相當有才華，又輔弼入命加會天魁，主心慈善良，整體而言，是個兼具外在與內涵的好女孩。


    但官祿宮逢天機天梁擎羊會此孤剋格局，又此局直射夫妻宮，所以在感情上容易有生離死別的狀況發生。同時陀羅亦會照，主拖泥帶水，若即若離。又如以夫妻宮爲命宮，對宮就是夫妻宮的遷移宮，逢此孤剋格局，無怪乎與前男友分分合合，加上孤辰寡宿會照，此組合之人，經常是爲情所困呀。而又以命宮星曜組合而言，會有目前困境產生的主因是過於心軟善良，這也是情路波折的主因呀。


    命會煞星雖然不佳，但至少具有果斷及敢愛敢恨的特性，命主三方吉星拱照，不會煞忌，缺乏激發，加上太陰本性就較爲柔弱，又夫妻宮煞星齊臨，以整體結構看來，山人實在相當擔心會因此發生不良的後果呢！所以建議命主，倘雙方真的無法相處，該斷就斷，否則必然禍害自己呀。


    許多的同學都會擔心，倘與這個對象分手後，是否不容易在遇到好的對象。其實以命主的外型及內涵，真的是多慮了。加上以大限星盤看來，鑾喜會照入命加上夫妻宮逢六吉拱照，沒錯的話在此大限內必有姻緣可成，又何需想那麼多呢？這也是山人奉勸命主多看看，多接觸其他對象的主因，畢竟年紀尚輕，又何苦如此執著呢？又命主問命當年爲民國
    99 年，我們就來看看流年的結構如何吧！


