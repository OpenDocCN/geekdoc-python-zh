    本命盤


    本命宮廉貞正坐加會貪狼又落丑宮，加上鑾喜入命，因此從事娛樂業或是公關交際類工作相當適宜，因此從事導遊工作，相當適性。正所謂，男怕入錯行，我想在導遊工作上，命主應該是相當得心應手才是。


    三方火貪成局，因此命主除偏財運強之外，也表示了其衝勁十足的本質，故倘命主於運限恰當時，應會有相當成就。尤其此局利於武職顯貴，對於在外打拼的命主而言，更是如虎添翼。


