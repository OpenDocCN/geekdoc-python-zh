    # # 紫微斗數

    論命技巧及實例解析（下冊）


    你的本命盤看來並不適合經商，而且容易被騙，主因在你的個性有點散仙，常常會因判斷錯誤或誤信他人，導致破財。由於財庫不佳，甚至是好不容易存了點錢，卻又發生意外，如：家裡修繕、修車等意外支出，導致你再賺都感到不夠，因爲總是存不下來，雖然自己很節省了，但莫明的意外支出總是很多，對不對？


    大概這樣吧，忍耐點，今年要過去了。山人是不知道你找哪個老師幫你看，說你的命盤不佳。整體而言你的命格並不差，只要改掉你那散仙的個性還有不要太相信人或太投機，導致破財，換言之，不要再輕易投資，因爲你相當不適合。


    你的人緣好口才佳，只是口舌糾紛多了點，適合以口爲業的工作。個性開朗，喜歡照顧人。直來直往的個性，也常常會得罪人。不過這是個性坦率人的通病，不要介意。


    大概這樣吧，其實危機也是轉機，但看你怎樣看待，此時命理可以作爲未來方向的參酌。山人依你的命盤來，只能告訴你未來最好的方向，但要怎樣做是看自己的呢！千萬不要山人跟你說明年考試上榜機會大就不讀書，這樣還是沒用的。看來你後來幾年都沒有這樣的好機運了。加油！


