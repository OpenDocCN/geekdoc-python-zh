    以山人多年論命的經驗，其實一個人的命運好壞，在出生的那一刻，就已經註定了7分，為何會如此準確？除了山人立論的統計學的基礎之外，最重要的是因果關係。倘改出生時間就能改變因果，各位同學，您認為可能嗎？許多家長就是有這種迷思，總認為小孩的出生時間好，就能保證終身富貴，但事實上，人命是天定，不可能因人爲因素遭到改變，許多父母望子成龍，都會擇日剖腹。但，真的有用嗎？如果有用的話，那每個人都是王永慶了。哇！那台灣豈非成為「香格里拉」，一個沒有窮人的國度，每個都是巨商豪賈，這是多麼理想的境界，倘真如此，我想連佛祖釋迦牟尼都要跟這些狂妄的命理師請益了呢！


    所以改變出生時間或是擇日擇時剖腹，有可能讓小孩的命變的更好嗎？用「第三隻眼」來想都知道：根本不可能！家長倘選擇這樣做，經常是害了這個孩子，因爲每個人天生命格的承受力不同，格局大者，承受力佳，可堪重任，但沒格局者，你硬給他大格局，請問他承受的住嗎？


