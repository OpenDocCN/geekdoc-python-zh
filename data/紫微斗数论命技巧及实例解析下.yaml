    ### 本命大限盤


    命主問命當年為西元 2009 年，時年 25 歲，正值 24～33 這個大限，其大限命宮逢空劫對拱，且命身各一，又逢陀羅正坐，我想這個大限貿然創業，只怕是花錢買經驗又勞碌而無所獲罷了。此點可從其大限財帛宮的狀況得到反證，破軍正坐，三方會照擎羊陀羅，主其錢財聚散無常，難有餘裕。而大限田宅宮倒是相當穩固，故僅是賺不到錢，但不至於有太大的破財狀況才是。


