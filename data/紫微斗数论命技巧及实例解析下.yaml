    ### 本命盤


    古曰：天魁天鉞，蓋世文章，此局又稱為魁鉞拱命，為公門格局的結構之一。因古代以科舉取士，此局人天生才華洋溢，文章令聞，通常都是文官的首選，故此局被封為公門格局，是其來有自的。而盤中文昌文曲皆於旺地，是故倘命主目前待業中，建議可以去嘗試看看。但因其格局是殺破狼加熱，穩定性較不足，所以適合以武職顯貴，例如：軍，警，專技人員或是總務工作皆相當適宜。


    **以整體結構看來，命主是以擔任公務員為最佳選項。其因為何？由於本命宮三方會照擎羊、陀羅、地劫、天空等，四煞匯聚，表示外在環境對命主相當不利。加上官祿宮結構不佳，倘於一般職場上發展，恐怕會是相當挫折與失落，我想也應該不會有太好的發展前途才是。而公務員相對穩定，對命主來說，應該是最好的選項才是。**


    由於參與考試，是流年偶遇，命主問命當年為民國 98 年（己丑年），以整體盤勢推估，民國 99 年（庚寅年），流年命宮及官祿宮皆逢廟旺昌曲拱照，考運應該相當不錯，所以建議命主可從
    98 年開始準備，99 年參加考試，我想在吉星的拱照加上本命帶格局的加持下，只要努力，一定會有上榜機會的。（註：考試是講究實力與公平的，沒有格局的人只要努力仍然是有金榜題名的機會，有格局的人不肯讀書，縱使給你六吉全彰，還是沒有用。這些所謂公門格局，是指其天賦相當優異，參加考試獲取功名，比起沒有天賦的人，自然較爲容易，此點同學須謹記，不要認爲沒有格局就當不成公務員，這是錯誤的觀念。）


    **註：考試是講究實力與公平的，沒有格局的人只要努力仍然是有金榜題名的機會，有格局的人不肯讀書，縱使給你六吉全彰，還是沒有用。這些所謂公門格局，是指其天賦相當優異，參加考試獲取功名，比起沒有天賦的人，自然較爲容易，此點同學須謹記，不要認爲沒有格局就當不成公務員，這是錯誤的觀念。**'
