    ### 本命盤


    命坐武貪又落四墓地（辰戌丑未），為標準晚發格局。此局人通病就是大雞晚啼，縱使結構再好，也難逃年輕時的挫折與勞碌。其實年少得志大不幸，因年輕氣盛，加上成功來的快，因此過於自信與狂妄，最後都難以守成，落的一無所有的下場。所以命主晚發局，並非壞事。


    綜觀其命宮三合，不見煞忌，且逢文昌，文曲拱照，為文星拱命格局；又本命宮逢日月來夾，古曰：「夾日夾月誰能遇，夾昌夾曲主貴兮」，故此命格局相當大，想來命主出身環境定然不差。只是命好還要運限配合，正所謂：命好運好限好，終身富貴。但別忘了，武貪落四墓地為晚發格局，以命主格局而言，定然會有相當成就，只是不會在年輕之時。晚發格局通常在行約
    45 歲之後。


    山人常說，大限行進方式最忌諱波折過大，舉例來說，倘上一個大限無論事業感情都相當順利，當大運轉進下一個大限時，人生崎嶇波折，東做西成，諸事不順。對於命主而言，會是相當的折磨。此例正好印證這個觀點，尤其大限星宿組合看來，此盤之起伏頗大，可謂大好大壞各一輪，也難怪命主會如此的感概與失落。


    以其大限星宿觀之，本命宮（6～15）相當漂亮，命主定然家境相當優渥，而第二大限（16～25），天機天梁會擎羊的格局會照大限命宮，又逢太陰擎羊人離財散格局會照，是故此大限定有相當的苦頭吃。當大運轉進到（26～35）這個大限，雙主星會命，又逢府祿相三合入命，雖鈴星正坐，但影響不大，是故應該是個很好的大限，但因地空地劫夾拱命宮，是故溫飽無虞，但在事業發展上，難有相當成就，正好印證武貪不發少年人的論點，但整體看來一切尚稱順利。


    但走到（36～45）這個大限，也就是命主問命時的大限命宮，逢地空正坐，三方會照擎羊，陀羅雙煞，又對宮天機天梁擎羊這個刑剋格局直衝，因此其家人健康狀況比較容易出現問題。所幸左輔右弼拱照，可免其刑剋。此意並非可免除，而是病痛折磨免不了的，但因此兩曜拱照下，得以順利過關，正所謂關關難過，關關過。（因此山人一直提醒各位同學在論盤時，千萬不能使用消去法，認為大限遇吉星，就可以抵消，這是不可能的。吉星充其量是讓事情能夠順利度過，但該受的折磨還是躲不過）。所以命主自述的現況，其實是可以預見的。


    再觀其 46～55 這個大限，大限命宮三方不會煞忌，又逢昌曲來拱，財官雙美，搭配命主本身具備的大格局，想來此大限定有相當的成就才是。而此時已步入中老年了，豈不再度驗證武貪不發少年人這句古諺了嗎。


    綜上所述，命主大運行進起伏過大，一好一壞，而且接連 4 個大限，真是夠折磨人的。倘運限搭配一直不好，一般人還會認命的接受，最怕就是這種大好大壞的運程呀！


    也因如此，故山人在回覆命主時，除勸其要接受命運的淬煉考驗外，同時也預告了下一個大限，整體運勢會非常強勁，會有一番全新氣象，讓命主能更坦然的接受目前的困境，進而把握即將來到的大運，這就是命理學說最迷人的地方，不是嗎？


    ## 案例 61、我的命中真的就缺錢嗎？


    【提問時間】2011-02-12 15:27:16


    【提問內容】因為心情很沮喪，在網路上逛逛，想知道自己的運氣怎麼會這麼差。好心的幫助別人，結果卻被倒債 2 百多萬。新年才剛開始，就遇到這樣的事，看到山人的文章，知道山人對紫微鬥數很有研究。想要請教山人，眼前的難關要怎麼過去？我的命中真的就缺錢嗎？好不容易和先生工作開始穩定了，結果現在發生這樣的事，讓我好沮喪。可以請山人幫我看看嗎？萬分感謝！生日:1976/03/22(國曆)中午
    12:30 左右出生，目前是工作是會計，先生是在大陸工作。


    【回覆內容】其實你的本質是很屬於賢慧型的女生，正所謂，府相之星女命纏，定當子貴與孫賢。你本身天府星坐命，應該屬於清秀型的女生，天府星基本上擅於守成，不善於開發，而且你應該有堅持固執己見的毛病才是。


    就星盤看來你的財帛情況非常不佳，空劫齊臨本命忌衝，因此聚財不易，而且財庫逢煞匯聚，就是說當你身上有錢的時候，總是會有突發狀況發生，錢也存不起來。


    又天同化祿坐僕役宮，正所謂：「祿落僕役，縱有官也奔馳」，意即你是個很講義氣的人，尤其對朋友，所以朋友應該是你最大破財之處，正所謂肥水不落外人田，化祿星代表的是財富，財富落在朋友宮，加上你的財得來不易，所以對朋友要小氣點，肥水還是落在自己家比較好呢！


    至於做網拍或生意，基本上萬萬不可，因為你的命盤呈現，半空馬格局，聚財不易但敗家很容易，加上空劫會命，做生意很容易被騙或是投資失利，尤其在目前的狀況，更是不宜。


    不過你幫人家採購，基本上屬於工作而非創業，所以可以朝這方向進行，也穩定多了。至少幫忙採購不需要負擔成本與風險，以你會計的觀點，幫人打工應該都是淨利，只需付出勞力成本罷了，何樂而不爲。


    總之記得，不要對朋友太講義氣，肥水要落自己家；切忌創業或投資，跟會等理財行爲。你的財多屬正財，投機絕對不宜。


    其實只要注意這些，以你的能力我想一段時間後就有機會損益兩平，但切記，不要再來一次，因空劫會命的人，常會忘了教訓，一犯再犯。


    山人幫你看了今年的流年，貴人運很強，機遇也好，流年命宮呈現非常好的狀況，在工作上也會有進展，甚至掌權。只是財帛宮又逢地空地劫兩煞，容易有財到手成空的現象，因此今年好好珍惜機會，努力做，不要投機，把握好今年的機會，我想年底結算時你應該會有所進展，加油歐。


