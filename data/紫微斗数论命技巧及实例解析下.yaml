- md: '## 紫微斗數論命技巧及實例解析（下冊）


    ### 案例 67、想換工作，請教紫微達人


    **【提問時間】** 2009-10-31 22:59:33

    **【提問內容】**

    農曆 74 年 1 月 14 日亥時，女。命宮是紫微貪狼星，想請教紫微達人們，明年想要換工作（想考空姐）不知道合不合適？明年換工作好嗎？還是不要變動比較好？明年工作上有沒有什麼該注意的？一直很苦惱。所以想請教，希望能給我些參考。

    **【回覆內容】**

    看起來你是一個有才華心思細膩的女生，當空姐確實是滿適合的，服務類性質的工作都不錯。

    以大限來看，大限官祿宮星宿組合不錯，應該是能在事業上有所進展才是，以流年來看，明年流年命宮逢化科，會天馬。所以會有異動的徵兆。但是遷移宮會雙煞，本命宮又逢陀羅正坐，陀羅主慢，而官祿宮又逢空劫來拱。雖會太陰化科，但也會化忌。造成科忌交馳的局面。

    基本上可能會發生努力很久，卻高分落榜或是縱然錄取，也有可能無法如願，如本想當空姐卻變成地勤人員，陰錯陽差，而且以官祿宮逢空劫來推論，看起來在職場上會很辛苦與勞累。


    所以山人建議你，還是利用閒暇的時間準備，得失心不要太重。以免希望過大，失望也大，現在的工作還是把他顧好，等到考上後在煩惱這問題也不遲。


    你的本命宮逢文昌文曲來拱，古曰：文星拱命，是利於典試科舉的格局，建議你可以朝考試方面嘗試看看，不過明年流年不佳，會有感覺上形勢一片大好，但卻暗潮洶湧的感覺。


    以流年来看，後年本命宮逢昌曲來拱，要考試的話後年機會比較大，明年的話就當做考個經驗，努力點，也許還會有機會的。


    明年的話自己要特別注意情緒的管控，看起來會有情緒上的問題，而此問題極有可能是因爲感情上所造成，自己要多加注意歐。


    **【發問者意見】**

    3Q！


    ---


    ## 【命盤解析及內容說明】


    ![img/28f3dd112e79ba7e3ec565caf64b7b7d_72_0.png](img/28f3dd112e79ba7e3ec565caf64b7b7d_72_0.png)


    ### 本命盤


    此命為文武雙全之局，命宮三方逢昌曲來拱，為文星拱命之局，命主聰明有才華，又此局又稱為公門局，相當適宜朝公門發展。又鈴貪入命成局，古曰：威權出眾，宜以武職顯貴，三方不會煞忌，故此結構相當漂亮。古曰：昌曲入命，不讀詩書也可人，通常昌曲入命的人，大都有相當的氣質，身宮坐天姚，故命主外型應該不差，加上龍池，鳳閣入福德，表示命主心思細膩，多才多藝，故擔任空姐，應是相當適宜。


    命雖坐紫微，但不逢輔弼，架構不佳，為孤君一人，難以言貴。府相不會祿，為空庫一座，地空，地劫夾財帛宮，同時會照田宅宮，此生財務方面相當辛苦，財來財去，無大富可言。而天馬會陀羅，為標準折足馬格局，不宜創業。故命主較適合在職場上發揮才能，並不適宜開創事業。


    好了，基本盤大概分析完了，該回到命主詢問的問題了，依三才理論，應先由大限盤來研判工作上的整體走勢，再從流年逐年檢視，故我們先從大限盤看起。


    ### 本命大限盤


    此大限官祿宮無正曜，借對宮紫微貪狼來論，三方會照天府，雙主星入官祿宮且逢本命紫微化科及大限文曲化科，化科主科名，是故命主此段期間內參與國家考試或其他類型的考試均相當適宜，且倘流年佳時，考運更是超強。且整體結構不會煞忌，看起來相當穩定。故建議命主可積極準備考試，包含空姐考試等。


    既然命主預定明年跳槽且考空姐（99 年），故我們看看當年的流年盤。


    ### 99 年流年大限盤


    流年命宮見天馬，是故有異動的跡象，且逢流年太陰化科衝起，故有往考試方向發展的情形，但流年命宮同時會照天同化忌，形成煞忌交馳的局面，且逢陀羅正坐，陀羅主慢，遲滯，加上命官均不會昌曲，因此倘
    99 年參加考試，只怕是要相當努力才行。加上天同化忌，主情緒上問題，如心情低落，疑神疑鬼，心神不寧等，故提醒命主須特別注意管控自己情緒，別讓化忌影響了自己的思緒。大限既然適合參加相關考試，那我們就來看看
    100 年時命主的考運如何？


    ### 100 年大限流年盤


    100 年大限命宮逢文曲化雙科，又逢昌曲拱流年命宮及流年官祿宮，雖文昌化雙忌同會，形成科忌交馳狀況，雖略有遺憾，但總比 99 年來的好多了，因此山人認爲 100
    年時，只要認真，應該能有上榜的機會。


    但考試畢竟是以實力取勝，縱使給你文星拱命，加紫微化科，所有的好星都給你了，但是你不肯讀書，又怎樣能期待有金榜題名的一天？倘命不帶格局，文星一顆都不見，但抱持著必勝決心，頭懸樑，錐刺股的苦讀，有誰說她會考不上呢？


    以命盤充其量是告訴命主考運優劣，考運好的人，猜題命中率高，考運不好的，可能背了 100 題只出不到 2 題，故仍然有一點差異，考試除了實力外，還是需要那一點點的運氣，就像賭博一樣，技術好不一定贏錢，但運氣不好，鐵定輸錢。所以倘見昌曲入命且化科，基本上只要有努力，上榜機會相當大。因此雖說考試靠實力，但命盤推理還是有那一點點的幫助的，您說是嗎？


    ---


    ### 案例 68、好想結婚，請大師指點迷津


    **【提問時間】** 2009-08-05 20:14:43

    **【提問內容】**

    小女子 67 年 4 月 10 日上午 9:45 生（農）希望各位大師能指點迷津，我在感情、工作跟財運都不太好。目前適婚年齡，家人很急，謝謝！


    **【回覆內容】**

    如果單從星盤看來，確實你的一路上都會走的滿辛苦的，命坐貪狼且居子宮，為泛水桃花格局，但可惜被煞星給壓抑住，加上天姚這顆野桃花入命，所以桃花縱然開，我想也都是濫桃花居多吧！


    而且你應該是滿注重婚姻關係的人，但問題也常常在這裡發生。如果以夫妻宮看來，對你而言晚婚並不是件壞事。


    從你的星盤看來，你應該是個滿重義氣的人，但可惜朋友卻不這樣想。基本上你的朋友對你是阻力大於助力，而且沒錯的話你應該也曾被朋友所連累，所以交友一定要謹慎。


    看來你應該也是一個滿喜歡享受的人，喜歡美食與裝扮，不過以整體盤勢來看，可能波折及勞碌難免，這點也要多忍耐。


    沒錯的話你的個性應該也不是很好，也頗爲急躁，正所謂，命由性生。命運的起落，多由個性而生起。所以建議你，可以去學習瑜珈或打坐。讓自己的脾氣與個性能夠和緩一點，這樣可以減少人生的波折。


    **【發問者意見】**

    無。


    ---


    ## 【命盤解析及內容說明】


    ![img/28f3dd112e79ba7e3ec565caf64b7b7d_72_0.png](img/28f3dd112e79ba7e3ec565caf64b7b7d_72_0.png)


    ### 本命盤


    貪狼居子，謂之泛水桃花，表示桃花運相當旺盛，但是好桃花或是爛桃花，就要看本宮及三方四正會合星曜而定。以本例而言，三方會照地空、地劫、火星、鈴星及陀羅，最糟糕的就是陀羅這顆星，因陀羅化氣爲忌，正所謂：忌遇貪狼，謂之風流杖彩，多因桃花或風流韻事而惹上麻煩或官非，此局便是如此，加上天姚這顆野桃花星會命，爲紅艶煞的情況，我想命主桃花定然不缺，但大都屬於爛桃花類型，無怪乎如此煩惱。


    真是辛苦了。


    而命主身居夫妻宮，想來對於男女及家庭關係相當重視，卻老是遇到濫桃花，也是相當的無奈呀。此點可從其夫妻宮星宿組合得到反證，三方會照四煞，最要不得的就是地空地劫兩煞曜，到手也成空，是故命主對於心儀的對象大都有緣無份，勉強交往則難逃同床異夢及聚少離多的情況。倒是爛桃花不少，喜歡的人不喜歡自己，不喜歡的人卻黏的緊緊，況且倘遇流年化忌或星宿組合不佳時，這些爛桃花甚至會導致桃花劫的結果，所以命主以晚婚爲宜呀。


    由於命宮會煞過多，表示外在環境相當不利於自己，而空劫入命，又可稱爲勞碌命，想來命主無論在感情或事業上，應該一路上都很波折才是。不過沒關係，以大限看來，因大限逆行（註：順行那可就糟糕了），因此命主不至於屬於那種會孤單終老的人，以大限盤勢推估，姻緣應該成於
    34～43 這個大限，正好呼應了山人晚婚的觀點呀。其大限盤如下；


    ### 34～43 本命大限盤


    在此大限中，鑾喜會照入命，又逢大限祿權引動，想來這個大限必有姻緣可成才是。而其夫妻宮逢日月拱照且加會輔弼及魁鉞，因此對象想必在社會上有一定的地位，而且能得到配偶的助力與光環呢！加上大限夫妻宮會照天喜逢大限巨門化祿引動，三方穩定無煞，此段時間定然有好消息傳出呢，且應該是可得配貴夫才是。從整體盤勢看來，此姻緣研判應該是由長輩介紹媒合的對象。其實這樣也好，因為命主倘自由戀愛，以此盤勢推估，遇到的對象都不會太好。所以這段時間的失落，就當作歷練人生吧，真的不需要太擔心。


    倒是命主由於空劫入命，三方會煞，故脾氣應當不佳且較為急躁，有點過於偏執疏狂的感覺，故當務之急，是先鍛鍊自己的心性，把煞曜對自己的影響減到最低，這樣當好姻緣來到時，才不會又因自己的個性而讓好對象退避三舍，這就不妙了。


    因此山人回覆時一直希望命主由自身改變，畢竟有可能配得貴夫，倘自己的個性不改正，自然難逃本命盤夫妻宮顯現的同床異夢或是聚少離多的狀況。


    ---


    ### 案例 69、我的命格屬於機月同梁嗎？


    **【提問時間】** 2009-08-05 11:53:30

    **【提問內容】**

    1978.05.18.卯時，男性。有人跟我說我是機月同梁格也說我的好星都在奴僕宮，對朋友有利對自己則普普。紫微達人能否指教 3Q！


    **【回覆內容】**

    是機月同梁格沒錯，基本上此格局適合穩定單調的工作，積極度不足，但守成有餘，古曰：機月同梁當吏人，便是針對此特性而言。


    至於好星都在奴僕宮這部份，就表面上看六吉星確實都在這裡，所以朋友並沒有看錯。至於是否對朋友有利對自己則普普，山人是不這樣認為。首先，以大限來說，如果你的大限走到奴僕宮位，自然這些吉星會再此大限拱照而順利一點，流年也是這樣。再者，以朋友來說，表示你朋友間多貴人也多助力，並不是單純的說只有對朋友有利。


    而且僕役宮代表的意義是命主與朋友、同事或下屬間相處狀況的判識宮位，如：得力與否？朋友性情、傾向及彼此的相'
  mdcn: '## 紫微斗數論命技巧及實例解析（下冊）


    ### 案例 67、想換工作，請教紫微達人


    **【提問時間】** 2009-10-31 22:59:33

    **【提問內容】**

    農曆 74 年 1 月 14 日亥時，女。命宮是紫微貪狼星，想請教紫微達人們，明年想要換工作（想考空姐）不知道合不合適？明年換工作好嗎？還是不要變動比較好？明年工作上有沒有什麼該注意的？一直很苦惱。所以想請教，希望能給我些參考。

    **【回覆內容】**

    看起來你是一個有才華心思細膩的女生，當空姐確實是滿適合的，服務類性質的工作都不錯。

    以大限來看，大限官祿宮星宿組合不錯，應該是能在事業上有所進展才是，以流年來看，明年流年命宮逢化科，會天馬。所以會有異動的徵兆。但是遷移宮會雙煞，本命宮又逢陀羅正坐，陀羅主慢，而官祿宮又逢空劫來拱。雖會太陰化科，但也會化忌。造成科忌交馳的局面。

    基本上可能會發生努力很久，卻高分落榜或是縱然錄取，也有可能無法如願，如本想當空姐卻變成地勤人員，陰錯陽差，而且以官祿宮逢空劫來推論，看起來在職場上會很辛苦與勞累。


    所以山人建議你，還是利用閒暇的時間準備，得失心不要太重。以免希望過大，失望也大，現在的工作還是把他顧好，等到考上後在煩惱這問題也不遲。


    你的本命宮逢文昌文曲來拱，古曰：文星拱命，是利於典試科舉的格局，建議你可以朝考試方面嘗試看看，不過明年流年不佳，會有感覺上形勢一片大好，但卻暗潮洶湧的感覺。


    以流年来看，後年本命宮逢昌曲來拱，要考試的話後年機會比較大，明年的話就當做考個經驗，努力點，也許還會有機會的。


    明年的話自己要特別注意情緒的管控，看起來會有情緒上的問題，而此問題極有可能是因爲感情上所造成，自己要多加注意歐。


    **【發問者意見】**

    3Q！


