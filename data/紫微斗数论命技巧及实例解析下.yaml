    而七殺坐命，三方定然形成殺破狼格局，因七殺與破軍永遠在三方四正遙相對望，而殺破狼局的影響，我想不需山人再贅述。此局為殺破狼加熱，衝擊性相當強，加上三方會照星曜相對穩定，故倘命主有志於衝刺事業，應該會有一番成就才是，此局相當適宜以武職顯貴，例如從事軍、警或專業技術人員。不過從命主自述及本命祿落夫妻宮的結構看來，應該是對感情比較執著吧！


    至於財運部分，田宅宮逢空劫對拱，三方又照會擎羊陀羅，加上本命宮化忌直衝，又太陰擎羊此人離財散格局成立，是故財庫破耗相當嚴重，錢財經常是怎來就怎去，聚散無常，以此財庫狀況，想要有富裕之時，我想會是相當困難的。其破耗最嚴重之處，推估應是在兄弟朋友之間，因本命化祿落僕役，表示此人對朋友相當講義氣，自然會有重義不惜財的狀況發生。但以其兄弟宮及僕役宮的星曜組合看來，朋友間難有知心，且多是酒肉朋友，雖說朋友有通財之義，但對於這些損友而言，只怕是肉包子打狗，拿錢讓人家花罷了。其實命主財宮組合頗為穩定，加上府祿相三合，表示對於財務管理很有一套。故只要不要對朋友太過於慷慨及過度講義氣，因此而莫名'
