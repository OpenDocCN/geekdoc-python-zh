    ## 案例 75、請問我的五行屬性較適合哪一類型的工作？


    **【提問時間】** 2010-02-13 10:26

    **【提問內容】**

    老師您好：

    我平常每個月都有固定在做善事，提問後也會完成你所說的做 3 件善事，在這有個問題想請教老師您，希望老師您能幫我回答一下，謝謝。民國 70 年農曆 8 月 12
    日晚上 11 點 05 分生男生從事電子業到至今已有了一段時間到現在對人生的方向還是毫無目標不知如何是好？目前從事研發助理工程師，想轉換跑道從事電子業測試工程師或電機水電相關的工作？不知今年適不適合換工作金木水火土那一類屬性的工作比較適合自己謝謝！


    **【回覆內容】**

    如果單從你的命盤看來，你比較適合研發或是流程改造、工業工程管理等。所以研發助理工程師、或電子業測試工程師應該還滿適合你的才是。不過測試的話工作內容應該比較死板，發揮空間不那麼大，所以還是建議你再考慮為宜。因為看來你的想像力滿豐富的，也會有特立獨行的想法，其實電機水電這類型的專業也滿適合你的，因爲需要動腦來排解困難與問題。但研發工作更適合你呢！


    以流年命宮幫你看，今年流年命宮逢化忌且會雙煞，基本上會感到很不順利。而且在情緒上會有不穩定的現象，自己要多注意情緒的問題，不過今年倒是滿適合以頭腦或腦力賺錢的工作就是。


    以這個 10 年大限來看（26～35），官祿宮逢天馬但會空劫，形成半空馬的格局，古曰：馬遇空亡，奔走無方。且同時會照入命，所以會發生現在的感觸並不意外。在工作上感到奔波勞碌但沒太大的成就感，多擔待點吧！基本上以大限的情況來看，建議你還是留在原工作崗位上，因爲不管轉不轉換跑道，都不容易有感到很滿意的時候。與其如此，不如堅守原位爲宜，至少在自己熟悉的環境，比較不會出現適應不良的問題。


    今年流年官祿宮雖逢忌星，但也照會雙祿，又逢魁鉞來拱，表示在工作上雖然有不如意，但也能得到長輩或貴人的協助，整體而言還算不錯。算是這個大限比較好的一年。升遷應該是沒有，但加點薪水應該是沒問題，所以不需要想太多。


    至於五行屬性的問題，基本上山人認爲應該是以一個人內在個性來決定，並非看五行能夠斷言的。所以這部分因觀念不同，所以山人不便回答，也請見諒。


    **【發問者意見】**

    感謝老師指導，受益良多。


    ## 案例 75、請問我的五行屬性較適合哪一類型的工作？


    ### 【命盤解析及內容說明】


    | 破軍天虛 | 台天紅天天輔才鸞廚魁樂 | 天寡七廉月宿殺貞回△ | 恩陀光桃羅× |

    | :--- | :--- | :--- | :--- |

    | 將指白 46-55 縮突巳小咸天 36-45 墓甲青月吊 26-35 死乙力亡病 16-25 病丙軍背虎財帛已耗池德子女午夫妻未土神符兄弟申 |


    **本命盤**


    祿存坐命，三方得府相來朝，呈現府祿相三合的狀態，又紫微右弼借星坐命，形成君臣慶會大局，整體而言，可以財官雙美論之。以此結構，倘行限良好，勢必會有一番成就才是。


    有人說，選擇工作，必須參照五行屬性，方能適性發展。但山人認爲，應該是以命主自身的特性來做考量。例如殺破狼格局的人，叫他從事內勤行政，我想是相當不適宜的。機月同梁格局的人，你叫他去做業務開發，我想應該是做不長久的。


    **所以單以五行考量，其實不是很正確呢！應該要輔以命主特性，才是最佳的方案呢！**


    至於命主適合哪類型工作呢，本命宮不見一顆文星，倒見象徵才藝的雜曜：龍池鳳閣等會照入命，因此命主適宜從事技藝或專門技術類工作，以其君臣慶會的大格局而言，會有不錯的成就。而福德宮亦可觀察出一個人的思考模式，其福德宮逢地空地劫正坐，山人常說，此兩曜雖帶來不順利與挫折，但其充滿想像力及勇於創新的特質，相當適合研發類工作。因此命主最適宜從事專門技術或工藝類的研發或是企劃工作。


    而目前命主擔任研發助理工程師，以整體命局組合而言，是一個相當適性的工作，所以山人才會希望命主能繼續堅守崗位。至於命主打算轉往測試及電機水電工作，其實也未嘗不可，因此類工作都屬於專門技術類科，但由於空劫入福德，所以從事研發工作，會是更適宜的呢！


    以山人經驗，通常命宮格局大者，多屬於大雞晚啼型的，年輕時通常是相當波折與失落。這也就是孟子所說：天將降大任於斯人也，必先苦其心志，勞其體膚，空乏其身，行拂亂其所爲，所以動心忍性，增益其所不能。所以年輕時的不如意，都會是日後成功的基石。所以一時的不順利，真的不需要太在意。至於是否適合轉換跑道，由於職業轉換，屬流年偶遇，依照強盤理論，我們就轉進流年盤看看。


    ## 99 年大限流年盤


    命主問命當年為西元 2010 年，歲次庚寅年，流年命宮在寅宮，三方會羊陀雙煞又逢流年天同化忌入命，天同化忌，主情緒上問題，表示在這個流年在情緒管控上要特別注意。而三方會煞，表示外在環境對命主相當不利，因此會有轉職打算，其實不讓人意外。至於是否有轉職成功的機會呢？


    以流年官祿宮來看，逢天梁化權及魁鉞拱照，基本上倘流月官祿宮亦為化權之時，倒是有轉職成功的機會。但 100 年流年命宮空劫會照入命，加會天馬，本有徒勞無功之意味；而
    101 年流年命宮亦會照三煞，顯見這幾年運勢都不會太好，既然如此，何不停留在原工作崗位上，至少在熟悉的環境，遇到不如意時，也較能夠適應。加上流年官祿宮逢貴人星拱照，顯見能有長輩及適時的助力出現，所以山人一直希望命主能留在原工作崗位上，除適才適所外，更因未來幾年流年不佳，在此考量下，還是不要輕舉妄動爲宜呀！


    ## 案例 76、請指點待人行事的注意事項


    **【提問時間】** 2009-08-24 22:03:57

    **【提問內容】**

    想請教您關於一位男性友人，丙午年 10 月 1 日巳時（農曆），從事汽車業，請問您該命盤之人行事各方面該注意事項，再次感謝您的指點！


    **【回覆內容】**

    基本上這位男性命宮天同坐命且化祿，算是很有福氣的人。沒錯的話家境應該也不差才是，橫財運及偏財運都不錯，脾氣是有點暴躁，基本上還算是滿穩定的人。但個性有點散仙糊塗，財庫頗為穩健，看起來應該還滿顧家的就是。


    但先天兄弟緣份較淺，所以對於兄弟朋友都滿照顧的。基本上有點重義不惜財的感覺，所以財要守住，先要改掉這毛病，否則借錢或投資朋友只怕是有去無回的居多。


    基本上此人頗適合以口為業的工作，個性觀念開朗樂觀有正義感，所以從事汽車銷售還不錯。不過想法有時候過於新潮，激進，而且有點拖泥帶水不乾脆，算是本性上的矛盾。雖然嚮往自由自在穩定而且享受的生活，但總在命運的牽引下難以如願。


    今年邁入一個新的大限（44～53），這十年時間看來會非常辛苦。尤其不宜再創業，因本命宮逢四煞齊臨且化忌，走起來會非常的不順與挫折。而且往往是表面看來一片大好，但卻暗藏凶惡，為吉處藏兇之局是故如經營事業者不可不愼，建議此大限盡量不要進行過度投資，一切以穩定爲上。因此大限稍有不甚，只怕晚景堪慮，因大限命宮，財宮均不佳。尤其是僕役宮化忌，表示朋友屬下無助力就算了，甚至可能會害人，命主這種重義不惜財的個性，在此大限，千萬對朋友要提防點。


    雖說大限不佳，畢竟只是 10 年的總和。至少會有那麼幾年是好運的。是故不宜進行長期投資，如房地產或研發、生產類的創業。但短期的投資則尚可，但千萬記住見好就收，窮寇莫追，追之必遭伏兵。應採取打跑戰術爲宜。或可參照山人的生命曲線理論，在這
    10 年大限中在進出間掌握天時，該攻則攻，該守則守。應該能安渡此大限，畢竟以命主的財庫穩健狀況來看，應可期待晚景。


    切記，此 10 年大限險惡，絕對不宜擴大或輕易投資，一切以穩定中發展爲上策，如有其他需要亦歡迎與山人面談。


    **【發問者意見】**

    謝謝老師，希望能盡速與老師面談。


    ### 【命盤解析及內容說明】


