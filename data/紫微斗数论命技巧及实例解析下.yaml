    # # 紫微斗數

    論命技巧及實例解析（下冊）


    # # 案例88、我是一個沒福氣的人嗎？


    **【提問時間】** 2009-09-13 23:45:54

    **【提問內容】**

    山人您好：

    最近因工作上發生了一些事，讓我開始不得不思考自己個性上的缺點，我想請山人幫我看我的命盤，在個性上我需要注意些什麼？我適合從事怎樣的工作呢！


    我的生日為68年1月23日子時（國曆），我本來的工作是會計，進去才二個月吧！目前這份工作已經離職。一開始進去時我就自以爲是了、而作帳方式也太隨性了，有些動作也造成讓人產生其他的聯想，才會導致後面的後果。會不會引來牢獄之災或財損之類的我也不太清楚。但一開始的個性及做事方式如果可以避開，也或許後來不會這樣！而這件事其實造成我精神很大的折磨，讓我差點變成神經病，也差點被朋友們抓去看心理醫生！雖然最近的精神狀況有好點，但其實還是放不開、想不開，還是會偷偷哭。


    仔細思考會變成這樣子，應該跟我的個性和做事方式有關，我的個性似乎太剛烈了、太直來直往了點、不太懂得柔軟、太有自己了想法了吧！沒有顧及到其他人的想法。所以想請山人指'
  - '[PAGE 199]


    # # 案例 88、我是一個沒福氣的人嗎？


    點一下，在工作人際關係方面我要特別注意什麼？工作運何時會變好呢！以我的命盤來說，我是不是一個沒福氣的人呢！不管是工作上或是財運或是婚姻、健康之類的，我怎麼覺得都不太順！不期望大富大貴，但希望能平平順順，但似乎也是一種奢求。看著朋友們的工作穩定，錢財都固定的有收入，而且我好不容易找到的工作卻搞砸了，而錢財也在流失中，花的更兇，似乎留不住財。


    懇請山人幫我指點一下我的疑惑吧！讓我明白，我現在該做些什麼？我現在完全處於茫然的狀況下，不知道該怎麼辦？以前從來沒想過要給人看命盤之類的，當身邊的朋友們都在為愛情之類的跑去算命的，我卻沒什麼感覺，但人總是要遇到自己覺得人生中的最大挫折時，才會想透過別的方式，來更了解自己，來提醒自己該注意些什麼。


    # ## 【回覆內容】


    這張命盤整體而言是頗爲強勢的命盤，三方四正會雙祿不會煞忌，加上火貪成局，相信你的偏財運還不錯，常常會出現意外之財。但很可惜的是逢煞破局，加上你的財庫又有損，財宮顯示出來的現象是你財務的流動性頗大，總是感到怎樣來就怎樣去，所以還是建議你可以把錢財交給信賴的人管理會比較好。


    199'
  - '[PAGE 200]


    # # 紫微斗數

    論命技巧及實例解析（下冊）


    沒錯的話你的個性頗為主觀，也比較會堅持己見，固執。有時候給人感到有點霸氣，命宮主星為武曲貪狼，古曰：武貪不發少年人，而且舉凡命格強勢的大都走中老年運，以你的大限走勢看來確實也是如此。武貪坐命的人，如果年輕發財，老來必定無靠。原因很簡單，武曲爲財星，貪狼表示物慾，當此兩星相會時發生的加乘效果。對於金錢的執著比常人還堅持，手段自然會頗爲激烈。所以只有當中老年時候能把這個性給收斂起來之後，方可有成就的機會。而年輕時年少氣盛，自然容易陷入困境。


    做財務工作確實很適合你，因爲你是天生的財務精算及規畫人才。加上雙祿會命宮，以此局來論，只要不投機，不貪求。金錢對你而言是不虞匱乏的。如果以你的理財來看，有時會過於偏向投機，雖說經常都是好的結果，但終究並非正途呀。


    你的本命宮也帶有標準的公門格局，沒錯的話你出門在外或多有貴人提攜扶持及良好的機遇，而且你本身應該也很有才華。所以如果真的找不到合適的工作，不妨往這方向去嘗試。我想以你的格局，努力點應該會很有希望的。


    24～33 歲這段時間，我想是你很辛苦的時候，總感到四處奔忙，卻毫無所獲。而這個大限看起來也差不多，苦在壓力與競爭，還有謀事不順的困境。不過既然走的是中老年運，所以年輕時的挫折，就當作磨練吧！'
  - '[PAGE 201]


    # # 案例88、我是一個沒福氣的人嗎？


    至於今年對於財務方面要特別小心，看來很有可能因此而引發官非困擾。以職場上來看，這兩年工作感覺上不是很穩定，有經常換工作的可能。下個大限（34～43）官祿宮看來是穩定多了，加油吧！


