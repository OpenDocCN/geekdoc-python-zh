  md: '# # 案例66、待業中，請高人幫我解紫微找方向


    **以整體結構看來，命主是以擔任公務員為最佳選項。其因為何？由於本命宮三方會照擎羊、陀羅、地劫、天空等，四煞匯聚，表示外在環境對命主相當不利。加上官祿宮結構不佳，倘於一般職場上發展，恐怕會是相當挫折與失落，我想也應該不會有太好的發展前途才是。而公務員相對穩定，對命主來說，應該是最好的選項才是。**

    由於參與考試，是流年偶遇，命主問命當年為民國98年（己丑年），以整體盤勢推估，民國99年（庚寅年），流年命宮及官祿宮皆逢廟旺昌曲拱照，考運應該相當不錯，所以建議命主可從98年開始準備，99年參加考試，我想在吉星的拱照加上本命帶格局的加持下，只要努力，一定會有上榜機會的。（註：考試是講究實力與公平的，沒有格局的人只要努力仍然是有金榜題名的機會，有格局的人不肯讀書，縱使給你六吉全彰，還是沒有用。這些所謂公門格局，是指其天賦相當優異，參加考試獲取功名，比起沒有天賦的人，自然較爲容易，此點同學須謹記，不要認爲沒有格局就當不成公務員，這是錯誤的觀念。）


