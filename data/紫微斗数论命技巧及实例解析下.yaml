    民國63年適逢日光節約時間，所以出生時間需要往前調一個小時，所以還是要確實的時間，才會比較準確。不過山人還是用你提供的卯時來幫你看看夫妻宮。


    從你的本命宮看來，你的脾氣應該不是很好吧！正所謂，命由性生。女生嗎，本來就應該溫柔一點，對不對。


