    # 本命盤


    命主太陽巨門坐命，又太陽可驅巨門之暗，巨門本主口舌，但經太陽優化此缺點後，轉變成爲口才絕佳，辯才無礙的優點。基本上此局人相當適合以口爲業的工作，如：老師、教授、業務員，講師等。有許多律師及
    top sales 其本命都帶有巨日的格局呢！又三方昌曲拱照，故命主除口才好之外，其聰明才智也是相當出色的呢！而左輔坐命，主人心慈善良，三方整體而言尚稱穩定，倘逢天時之助，應能有一番成就才是呀。


    而太陽為男性的表徵，男命得之，相當適宜。其外在表現頗為陽剛，做事主動積極，個性坦率，不拘小節，個性頗為急躁，經常因說話經常過於直接，得罪人而不自知。又男命逢太陽正坐者，經常都有較為「博愛」的通病，倘再會合天姚或鑾喜此類象徵桃花的星曜尤確。


    三方會照擎羊煞星，表示命主個性頗為叛逆，且此曜不管是正坐或會照命身宮，其人身上多帶有傷疤，倘正坐身宮，以山人經驗，機率將近 90%。實在是因為此曜煞氣太重所致。


    而本命化忌正坐兄弟，兄弟緣較淺，而空劫會照僕役宮又逢化忌會照，是故命主多酒肉朋友，來去相當快，缺少知心好友，對於命裏缺兄弟的人來說，也是相當苦惱的事情呀。以此結構而言，朋友部屬不但對命主無助益，當大限流年組合較差之時，更有可能因此而受拖累，故勸誡命主，此處不可不慎呀。


    至於姻緣問題，由於命主夫妻宮坐太陰，可謂艷福不淺，因太陰坐妻宮，主可配得美嬌娘，氣質大方出眾，聰慧可人，個性溫柔賢淑，持家有方。反之，若太陽坐夫妻宮，則可能落得「家有河東獅」的窘境呀。以其結構看來，由於會照擎羊及陀羅雙煞，基本上在感情上較會產生單戀或是辛苦追求卻屢屢落空的情況。故此局人以晚婚為宜。早婚容易有生離死別的狀況，所以目前沒對象，其實也不算是壞事呢！以大限走勢看來，姻緣應成於
    36 歲前後，故不需多慮。


