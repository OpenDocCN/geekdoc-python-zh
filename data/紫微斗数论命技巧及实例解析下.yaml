    # # 案例76、請指點待人行事的注意事項


    **雖說此大限田宅宮逢輔弼正坐，相當漂亮，但其命宮星曜組合的破耗相當嚴重，倘不好好守成及管好自己的「下半身」，則再多的祖產也不夠敗呀。所以山人建議命主在這10年間，由於本命帶祿馬交馳格局，且財庫相當穩固，勉強可以創業，但保守為上，以守成為最高指導原則，萬不可過度擴張或操作財務槓桿，最重要是「路邊野花不要採」，因此大限極有可能因此而破大財呢！而下個大限（54～63），紫微七殺正坐，紫殺化權，又得天府來朝，本命祿會照，加會大限祿權，形成疊祿及另類的疊權，看起來非常漂亮，通常走紫微的大限都是相當強運的時候，加上祿權巡逢加雙主星匯聚，故推測命主在事業上應會有相當的成就，也應該是相當強運的大限。但前提是必須能忍過這段時間的不順利呀。**


    **這也是山人再三叮嚀命主需面談的主因。山人研發的生命曲線理論，可以找出大限流年的強運點，在此強運點出擊，定然有所收穫，但因大限不佳，故需見好就收，不可戀棧。待下次運至之時，再戰江湖，採游擊戰術，我想這個大限星宿組合縱然不佳，也能有一條生路的呢！**


