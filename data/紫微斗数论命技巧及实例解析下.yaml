    \n### 本命盤\n\n古曰：武曲加煞為寡宿，故女命不宜坐武曲，主因在於此曜本性過於剛毅，個性愛恨分明，倘會煞忌，更是強化此特性，因此武曲加煞之女性，感情路上通常非常辛苦。此點可從夫妻宮星曜組合得到反證，夫妻宮逢空劫會照，是故夫妻相處間應是聚少離多或是貌合神離的狀況，且與欣賞的異性多是有緣無份，而天馬解神（年解）這組離婚的組合亦出現於此，故倘逢大限或流年化忌引動之時，離婚的機率相當高。所以如何修煉自己的心性，使七殺及殺破狼加煞格局對自己的影響減到最小，這才是命主最應該做的事，否則再好的姻緣，也會因此而搞砸。\n\
    \n至於買屋部份，由於置產需要充足的銀彈，故我們就從他的財帛宮看起，廉貪會祿馬，適宜外埠經商求財，並於流動或交際中成就事業，三方組合頗為穩定，得財應該不困難才是，但本命盤天馬會空劫，呈現半空馬格局，又會照於福德宮，而福德宮又是人思想的象徵，因此推論命主應該經常有創業的想法。但由於出現半空馬格局，所以建議還是在職場上發展會比較安適。且其田宅宮雖會陀羅煞星，但因格局不錯，所以尚稱穩定，只要不冒險創業，晚景應可期待才是。至於姻緣問題，我們就來看看命主自述\
    \ 37 歲離婚那年到底發生了什麼事吧！\n\n### 37 歲大限流年盤\n\n前例曾說過，天馬解神是離婚的組合之一，尤其是逢流年煞曜或化忌衝起尤確，而\
    \ 37 歲流年命宮逢天馬年解正坐，又逢流年羊陀衝起，所以此年對於婚姻部份，必須要相當小心。尤其命主七殺坐命，處事果決，愛恨分明，又加上此組合出現流年命宮，我想只要有一點小狀況，則這段婚姻是離定了。再觀其夫妻宮，暗合位逢流年化祿，又會紅鑾，故配偶易有偷吃狀況發生，故命主自述由於婚外情而離異，確實是有跡可循。\n\
    \n不過逝者如斯，還是要展望未來才是。人不能永遠活在過去呀。如果以本命盤推估，36～45 這個大限相當有梅開二度的機會，我們就轉進大限盤看看吧！"
