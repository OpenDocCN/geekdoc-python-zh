    # # 案例77、請問我今年或明年的結婚運到了嗎？


    其實婚姻這件是取決於兩個人，願不願意重視雙方的溝通協調及包容彼此的缺點，如果都能做到，誰說八字不合不會有好結果？如果做不到，縱使給你們六合，誰敢保證這婚姻能長久？對不對。


    好啦，觀念正確了，那現在山人就用命理的角度幫你看看，幾時姻緣有動靜，讓你做參考。


    以大限來看，這個大限（24～33），大限命宮見次桃花正坐，再會紅鑾、天姚等桃花星來拱，加上大限夫妻宮見化祿引動，只能說，這個大限不結婚都很難。所以盡可寬心。


    如果以流年來看，流年夫妻宮見鑾喜對照，又逢本命祿存，照理說今年就應該結婚了。但可惜文曲化雙忌正坐，所以雙方應該最近口角糾紛嚴重，甚至有財務問題，今年的情形只能說，雖然很有結婚的機會，但最後總是因爭執而不了了之吧！


    單就命理角度來看，姻緣應該是成於 30 歲左右，但是如果今年問題可以可以克服的話，也是有機會的。


