    至於買屋部份，由於置產需要充足的銀彈，故我們就從他的財帛宮看起，廉貪會祿馬，適宜外埠經商求財，並於流動或交際中成就事業，三方組合頗為穩定，得財應該不困難才是，但本命盤天馬會空劫，呈現半空馬格局，又會照於福德宮，而福德宮又是人思想的象徵，因此推論命主應該經常有創業的想法。但由於出現半空馬格局，所以建議還是在職場上發展會比較安適。且其田宅宮雖會陀羅煞星，但因格局不錯，所以尚稱穩定，只要不冒險創業，晚景應可期待才是。至於姻緣問題，我們就來看看命主自述
