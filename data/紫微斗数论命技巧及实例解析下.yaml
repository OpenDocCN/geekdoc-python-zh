    這個命盤看來相當強勢，紫殺化權坐命又會照天府，雙主星坐命，企圖心與事業會是相當旺盛，我想寄人籬下對命主而言會是相當痛苦的事情。以命主補充內容看來，此局人擔任工作沉悶單調的公務員，確實相當不適合呀。但山人常說，紫微坐命，首先要看是否會合左輔，右弼形成君臣慶會大局，否則也難逃孤軍奮戰的命運，難有相當成就。


    而本命宮並未會照輔弼，不構成大局，為無輔孤君，加上三方羊陀會照，表示外在環境對命主相當不利。通常雙主星坐命的人，事業企圖心大，加上文昌單入命宮又會貪狼，主人經常是文過其實，有點虛華浮誇的狀況。加上雙主星坐命，更彰顯此特性，想來創業應是貪求規模要大，加上缺少助力，且朋友部屬間信任度不佳，才會招致投資失利的命運才是呀。


    而文昌文曲會福德宮，亦表示命主天生相當聰明有才華，所以通過國家考試，擔任公職並不讓人意外。但公務員生活單調，我想會是命主苦悶的根源呀，只能說，工作選擇理應適性適所，否則再好的工作，除賺錢填飽肚子的功能外，實在無法滿足個人的成就感。命宮三方形成鈴貪、鈴羊此類橫財局，加上命立四馬地，喜動不喜靜，而通常命帶橫財局者，相當適合從事偏門生意，所以從事夜間娛樂事業，確實相當適宜。但可惜同時會照陀羅破局，故難逃橫發橫破命運，勉強繼續從事此類事業，我想最後大都是敗局收場才是。也因此命主表示目前從事小吃生意，以此盤而言，相當適宜。倘腳踏實地的做下去，我想晚景應該還可期待，畢竟人生
    70 才開始，命主 50 多歲重新出發，也還不晚。


    另談到事業大起大落的問題，以大限看來，26～35 大限命宮會照陀羅，外在環境不佳。而大限財宮逢空劫夾制，照理說財應該難聚。但詭異的是，昌曲亦同時會照，通常昌曲照財宮，表財來容易，但空劫夾制，難以守成，因此推論在財務上較有大起大落的狀況，對照命主從事夜間娛樂業的財務狀況，確實是相當符合呀。另大限官祿宮逢羊陀雙煞沖照，因此在事業上也較有起伏，所以這段時間走的會是相當辛苦呀。


    至於朋友問題，由於僕役宮無主星，借對宮天機天梁論之，主交遊廣闊，朋友多為專業人士或精於某種學術或技術者，但逢地劫正坐，故朋友相處難有知心，且多有因友破耗之情事發生，此點可從其本命宮呈現孤君無輔的情況可得反證。而身體健康問題，觀其疾厄宮天同太陰正坐，多有消化系統及代謝問題產生（詳上冊第一章第三節），以經驗判斷，應是胃部疾病的機率最高呢！


    另有關姻緣問題，由於鑾喜於16～25這個大限對拱，加上會照本命祿，倘此間流年穩定且又逢化祿引動，定有喜訊可聞呢，所以推論命主姻緣成的相當早，以流年看來，應成於23歲前後，本命夫妻宮逢天相正坐，表示配偶賢慧持家，且婚配對象多是鄰居，同學或同事等週邊較為熟悉之人，此點與命主補充內容相當符合。又命主與孩子的關係部份，以子女宮觀之，太陽巨門正坐，主個性活潑外向，口才相當不錯，三方會照地劫，表個性較為叛逆，且相處之間代溝頗重。又會照旬空及天空，故與子女緣份較淺，有聚少離多的狀況。


    總而言之，命主相當不宜從事投機事業，定然以敗局居多，倘能做點小生意，以其田宅宮穩健的組合而言，應能有不錯的成就。


