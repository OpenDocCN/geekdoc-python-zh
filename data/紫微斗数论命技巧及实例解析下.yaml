    ## 本命大限盤


    命主問命時間為西元2010年，時齡44歲，剛好跨入一個新的十年大限，此大限命宮逢地空、地劫拱照，本有徒勞無獲之意，而此局又稱為浪裡行舟，表面上看來一片大好，但暗地裡卻危機四伏。加上羊陀雙煞亦同時會照，表示其面對的競爭與壓力是相當強大，四煞齊臨大限命宮，此大限想要有所成就，只怕會是相當困難。加上天姚野桃花正坐，加會煞星，只怕要特別提防「桃花劫」的狀況。


