    ## 案例 98、正緣會出現在何時？對方大概會是怎樣的人？


    ### 【提問時間】

    【提問內容】


    山人您好：


    有幸從奇摩知識 + 連結到您的部落格，不曉得是否能煩請老師解惑一下呢？


    我出生於國曆 73 年 7 月 29 日戌時目前是幼教老師。這幾年來，感情路上一直不是很順遂，總容易不小心成爲第三者，或是被劈腿。其實期間也有許多追求者，但我就是無法動心。因爲心裡頭就是有一個很在意很在意的人（我們倆對彼此的心意應該是相互喜歡的），曖昧好多年，但總是缺少那臨門一腳。


    他是國曆 70.11.01 出生的（可能是辰時出生），他目前是職業軍人。想問問看，我和他有沒有機會有一段良緣呢（我其實很希望是他）？不知道爲什麼，這麼多年下來，我還是堅持執著於他。好幾次，快要放棄了，想要把他當普通朋友了，他又讓我燃起希望，然後一次又一次的失望。如果不是他，那我的正緣會出現在何時？對方大概會是怎樣的人呢？


    另外，我有報考年底的地方政府公職考試，不曉得今年考運如何？是否能夠有好的成績呢？謝謝！


    ### 【回覆內容】


    就你夫妻宮來看，這種曖昧的情愫是相當難以避免的，感覺上對方的個性難以捉摸，加上可能也是抱持不婚主義的人，所以雙方相處意見不容易合諧。而且破軍坐夫妻，所以容易遇到結過婚的男性，也就是山人暱稱的「二手貨」。加上又見右弼單入，所以很容易出現你目前的問題，第三者或者是被劈腿，加上你的本命宮看來桃花並不算很旺，所以大概都是被背叛的情況居多。


    而且沒錯的話你非常有可能是火速結婚一族，不過以此局來看，基本上建議以晚婚爲宜，比較穩定。況且你還算年輕，所以可以在多等等。


    如果就大限走勢來看，你的姻緣動的應該還滿早的，沒錯的話這個對象應該是在 22.23 歲左右認識的，但對你而言，早婚並不是一件好事，所以錯過也是一件好事，不要想太多。


    至於考運，由於本命盤文昌文曲均落陷，且本命並不具備公門格局，所以要考公職可能要多幾次，而且要比人家更認真。但考運好，不讀書也是沒有用，肯認真努力的人，縱使考運不好，也還是有機會的。這一點對於準備考試的你要有深切的體認，畢竟考試是講實力的，並不是像賭博一樣，運氣佔大


    部分。雖說整體考運不是很好，但今年流年逢魁鉞拱照，考運應該還不錯，只要認真努力一點，還是有希望的。加油。


    **【發問者意見】**

    謝謝老師，我會努力準備考試。


