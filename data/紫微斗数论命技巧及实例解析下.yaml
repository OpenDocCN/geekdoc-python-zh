  md: '# # 案例 100、請教是否適合外出創業？


    購物狂潮席捲而來之時，消費型態跟著改變，許多老店因爲跟不上潮流變化而黯然退場。因此命主應該做的，是與父母多加溝通協調，以其創新及研發能力，爲家族事業再創顛峰才是。


    此局亦爲七殺朝斗格局，古曰：爵祿昌榮，且此局由於雙主星會照，七殺化權，因此工作能力相當的強，應可開創一番新局才是。但可惜朝了個大空斗，因與地空地劫同度，反倒變成盲目衝刺，而難有所獲。加上空劫命身各一，增添了人生的勞碌與波折。加上福德宮化忌又逢陀羅正坐，而福德宮亦可表示一個人的思考模式，因此命主的想法經常是相當跳躍與混亂，且容易鑽牛角尖。加上地劫正坐，因此倘過於年輕就接下家族事業，由於社會經驗不足，加上年少輕狂的個性，只怕是會犯了許多第二代企業家過度擴張導致敗亡的通病呀。


    雖說本命盤雙祿馬交馳，且不會煞忌，頗適合創業求財。但因空劫命身各一，故創業只宜獨資且規模切不可過大，否則仍難逃敗亡之運。但以其雙主星會命的人而言，規模不夠大，也無法滿足其成就感，這也是相當矛盾的事情呀。田宅宮逢雙祿交流，加上輔弼會照，三方不會煞忌，相當漂亮與穩健，同時也表示家庭環境背景相當的不錯，但商場如戰場，一個判斷失誤，可能一夕之間多年奮鬥結果化爲烏有，尤其是地劫坐命者，以山人經驗，一生至少會被騙一次以上，長此以來，則在多的祖產都不夠賠呀！


