    ### 案例 69、我的命格屬於機月同梁嗎？


    **【提問時間】** 2009-08-05 11:53:30

    **【提問內容】**

    1978.05.18.卯時，男性。有人跟我說我是機月同梁格也說我的好星都在奴僕宮，對朋友有利對自己則普普。紫微達人能否指教 3Q！


    **【回覆內容】**

    是機月同梁格沒錯，基本上此格局適合穩定單調的工作，積極度不足，但守成有餘，古曰：機月同梁當吏人，便是針對此特性而言。


    至於好星都在奴僕宮這部份，就表面上看六吉星確實都在這裡，所以朋友並沒有看錯。至於是否對朋友有利對自己則普普，山人是不這樣認為。首先，以大限來說，如果你的大限走到奴僕宮位，自然這些吉星會再此大限拱照而順利一點，流年也是這樣。再者，以朋友來說，表示你朋友間多貴人也多助力，並不是單純的說只有對朋友有利。


    而且僕役宮代表的意義是命主與朋友、同事或下屬間相處狀況的判識宮位，如：得力與否？朋友性情、傾向及彼此的相'
