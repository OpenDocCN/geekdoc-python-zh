    \n本命宮三方四正見魁鉞來拱，為坐貴向貴的公門格局，也表示命裏多貴人提攜及扶持，而本身頗具才華，古曰：天魁天鉞，蓋世文章。\n\n## 紫微斗數\n論命技巧及實例解析（下冊）\n\
    \n雖本命宮見擎羊煞星正坐，但居廟旺之地，兇星得地不為凶。且得府相來朝，又紫微坐命且化科，適合將名逐利。\n\n你的為人頗爲忠厚老實，聰明靈敏，志氣高傲，性情倔強，對任何的事物都具有非常強烈的好奇心。喜歡學習新的事物，但是由於缺乏耐心容易有半途而廢的情形，耳根較軟，個性善變且多疑，易受他人影響。同時有著強烈自尊心及優越感，不喜歡受到別人的約束，也較不喜歡屈服於別人的領導之下。舉動穩重，有正義感，感情容易衝動。放寬心吧，整體而言，你的命局不會太差。\n\
    \n在斗數中，擎羊雖是煞星，你的本命宮見擎羊星，可謂之煞星坐命。但煞星如居廟旺，可謂之得地，就像凶煞被供在廟堂上，兇可不兇反爲吉。擎羊星吉化，就正面來看，表示處事積極，有先見之明，且有前瞻性，毅力強，事業心強。\n\
    \n如命坐擎羊星，創業宜獨資。適合當小型工作室老闆，但其煞氣仍在。不過你的命宮見天相同度，所以說多少可以收斂這種煞氣，所以山人推估你的個性應該是脾氣來的快，去的也快。每次發完脾氣後都會後悔，但傷害往往造成，這就是你比較適合獨資的原因。\n\
    \n至於你已經開業了，以流年本命宮看來，適逢日月正坐，看來形勢一片大好。且流年財宮見祿馬交馳，表示會有一番作為。但流年財庫逢煞，又流年命宮逢文曲化忌射入，可謂吉處藏兇之勢。建議你以保守爲宜，盡量不要再今年作擴張的動\n\
    \n作，以守成爲主，注意好現金流量，應該是沒有太大問題。而你這個大限走的又是殺破狼運程，通常走殺破狼運程，在此 10 年間多大起大落，在加會空劫雙煞，搭配你本命格局，我想花的會比賺的多。\n\
    \n補充一下：\n\n你的本命星宿組合不錯，差的是這個大限及流年不好，大限是指 10 年的運勢，波折起伏比較大。流年是單指當年的運勢，這幾年的流年都不是很好。也請多擔待。其實人生就是起起落落，運勢好的時候往前衝，運勢不好的時候保守應對，掌握天機，方可立於不敗。\n\
