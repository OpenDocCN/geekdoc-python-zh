    \n### 本命盤\n\n女命坐七殺，確實相當不適宜，因過於孤剋與決絕，不論是在對待工作或感情上，都會有速戰速決的現象，且待人處世，經常過於無情。對女生而言，這也是不容易找到伴侶的原因，畢竟男生大都希望另一半屬於溫柔賢淑類型，「恰北北」的女生，我想大多數的男生大概都敬謝不敏，此點可從夫妻宮會照火鈴雙煞可得反證，通常夫妻宮見火鈴，會有閃電成婚的徵兆，又因爲彼此瞭解不足，過於衝動與激情，因此雙方相處經常是口不言，但內心痛苦折磨。所以如何減緩七殺星帶來的影響，我想是命主此生無論在工作或感情上，都必須要先改善的課題。正所謂命由性生，倘不改變自己的個性上缺陷，又怎能奢望有穩定之時呢？\n\
    \n而七殺坐命，三方定然形成殺破狼格局，因七殺與破軍永遠在三方四正遙相對望，而殺破狼局的影響，我想不需山人再贅述。此局為殺破狼加熱，衝擊性相當強，加上三方會照星曜相對穩定，故倘命主有志於衝刺事業，應該會有一番成就才是，此局相當適宜以武職顯貴，例如從事軍、警或專業技術人員。不過從命主自述及本命祿落夫妻宮的結構看來，應該是對感情比較執著吧！\n\
    \n至於財運部分，田宅宮逢空劫對拱，三方又照會擎羊陀羅，加上本命宮化忌直衝，又太陰擎羊此人離財散格局成立，是故財庫破耗相當嚴重，錢財經常是怎來就怎去，聚散無常，以此財庫狀況，想要有富裕之時，我想會是相當困難的。其破耗最嚴重之處，推估應是在兄弟朋友之間，因本命化祿落僕役，表示此人對朋友相當講義氣，自然會有重義不惜財的狀況發生。但以其兄弟宮及僕役宮的星曜組合看來，朋友間難有知心，且多是酒肉朋友，雖說朋友有通財之義，但對於這些損友而言，只怕是肉包子打狗，拿錢讓人家花罷了。其實命主財宮組合頗為穩定，加上府祿相三合，表示對於財務管理很有一套。故只要不要對朋友太過於慷慨及過度講義氣，因此而背上債務，我想未來仍可期待。但還是老話一句，這些缺點我想命主應該自己都很清楚，但狀況來時，就是無法避免，所以倘希望在感情及財務甚至於工作上有穩定之時，改變自己的個性，才是釜底抽薪的良策呀！\n\
    \n## 案例 65、請達人爲小女子解命\n\n**【提問時間】**\n\n2009-07-27 18:07:42\n\n**【提問內容】**\n\n女：60/12/25\
    \ 辰時生（過立春/鼠），97 因先生婚外情而離異。\n\n因安全考量故一個人在外租賃管理員的房子，租金不低，想請問是否何時有機會買屋（今年破財破的利害……）？未來的感情、婚姻路？\n\
    \n**【回覆內容】**\n\n因婚外情而離異，唉，男人就是這樣，有了新歡就忘了舊愛，有小孩嗎？要堅強一點呢！\n\n\t\t命造農曆 60 年 12 月\
    \ 25 日辰時瑞生。如果從你的本命宮看來，確實破財會滿嚴重的。我想一直以來都是如此吧，本命祿存正坐，但逢地劫衝入，所以破財難免。同時最好也避免投資，否則恐怕是肉包子打狗，有去無回。\n\
    \n\t\t而你的本命宮坐武曲七殺，三方四正形成殺破狼格局。所以一路走來多顛簸且多起落，難有享清福之時，這也是殺破狼格局的無奈之處。\n\n\t\t況且女命坐武曲本來就不宜，再加上七殺來助威，所以你應該要讓自己脾氣稍爲和緩一點，多讓讓男生。家中盡量不要太過於強勢，武曲本性就是過於強勢與任性，也因此造成了人生路途中無謂的波折與困擾。\n\
    建議你可以去學習打坐或瑜珈，如果有宗教信仰，也可以去唸唸佛。讓自己可以平靜且學習放下，這樣對你未來比較好歐，也可望有機會跳脫殺破狼的格局。\n其實殺破狼格局並不是造成自己波折的主因，主要是因爲自己個性使然。所以首要之務，是要學習，如何不執著與放下，這樣必然會有改變的時候。\n\
    如果就你的夫妻宮看來，早婚並不是好事，沒錯的話你與先生之間聚少離多，先生老是在外面奔波。而且看來你的姻緣很早就動了吧！\n沒錯的話 45 歲之前還有一次機會，不過可能會是\
    \ 2 手貨（開開玩笑，就是指離過婚的男生），自己要好好把握。同時趁此時間好好修正自己的個性，下次機會在來時，也比較容易能夠走的長久。\n\n【發問者意見】\n\
