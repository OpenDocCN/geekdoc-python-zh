  md: '# # 案例 85、困惑之人請紫微高人解命


    氣質與俏麗並具的漂亮女生，聰明，口才也不錯。基本上你頗適合以口爲業的工作，如：客服、電話行銷、老師、藝人等。


    因本命盤巨門化祿，可以把是非的缺點轉化爲口才，但可惜，也因爲太喜歡表現自己，由而生是非之擾。也因此古人認爲巨門化祿不耐久，演藝人員不也是如此嗎？其實有利有弊。


    好啦，先在用流年來分析你的問題。


    山人大概知道對方說你今年會升遷的原因了，因爲流年官祿宮逢化權且會天馬及本命祿，再會天巫，看起來是一片大好。


    但可惜爲何會這樣呢？其實是因爲大限廉貞化忌亦同時會照入官祿宮，造成權忌交馳的局面，加上流年官祿宮是空宮且逢空。所以縱使有升遷的話，可能也做不久。因爲權忌交馳的情況是，當權力越大，就越會被權力給反撲。或者是明明有升遷的機會卻落空，因爲化忌來搗蛋。


    至於你現在的工作，以流年官祿宮看來空間滿大的。但切忌不宜太過於表現自己，或過於追求權力或升遷。否則很容易被舊有勢力反撲。導致自己的挫敗。加上你本身就是屬於喜歡表現自己的人，今年可以保守點，有才華就稍微隱藏一下，自然可以有好的發展。但倘若升遷過於快速，真的要特別小心。


    因爲今年官祿宮權忌交馳的警報還沒有解除。


    如果以流年來看，可能這幾年的波折都滿大的。你的問題應該是何時會穩定一點，而不是何時適合換工作吧！這幾年看來以穩定爲上。如果真要看官祿的話，可能要到民國 102
    年之


