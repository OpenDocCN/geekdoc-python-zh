  md: '# # 案例86、算命老師說31歲之前有個死劫，嚇死人了！


    再者，雖然文昌化雙忌坐流年命宮，但文昌化忌，不表示血光，因此最多就是金錢損失罷了呀。又何來性命交關之危呢？


    如果那位老師說是 101 年的話，還有點說的過去。因 101年流年命宮落於辰宮，而七殺廉貞又在此天羅地網處對拱，這就是俗稱的車關呀，但壬年廉貞並未化忌，且命宮三方四正亦不會忌星，縱有惡局，但不被引動，充其量也是啞彈，有何畏懼呢？縱使引動，命身不空，最多就是受點傷罷了，談到死劫，真的是言重了。連惡局都沒有，就解釋成死劫，倘真有惡局出現，真不知道這位大師該如何解釋呢？倘因此造成命主心理壓力過大，整天胡思亂想，心神不寧，以此情況繼續下去，我想也許不到
    31 歲就可能把自己搞成神經病了，沒死都被這位老師嚇死。這不是造業嗎？命理應該是要幫助在十字路口或遭逢人生低潮而徬惶無措的眾生，找到新的方向，得到新生才是呀。這些不學無術的江湖術士，胡言亂語，害人不淺。要知道善惡到頭終有報，習命者須戒慎之，切莫因一時之快而自造口業呀。


    191'
