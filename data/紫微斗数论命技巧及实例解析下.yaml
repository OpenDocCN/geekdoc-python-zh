    # 本命盤


    命理真的能論斷生死嗎？答案絕對是否定的，其道理很簡單，命理的統計單位是人的出生年月日時，那相同時辰出生的人有多少？這是個很簡單的計算，列式如下：


    60（1甲子）*12（月）*30（天）*12（時辰）=259,200


    倘若以台灣2000萬人計算，則共盤的人有


    20,000,000/259,200=77


    意思就是扣除命主1人，尚有76人是共用同一個盤的，'
