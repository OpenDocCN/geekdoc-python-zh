    空劫夾命，意思就是命被空劫雙煞給挾持，通常表示的意思是人生的路程比較容易失去機遇，例如本命宮逢紫微七殺，紫殺化權，但逢空劫夾置，便形成是權力必須受制於人的組合。空劫夾命，其實普通可怕。如本命宮化忌，形成空劫夾忌，那才真可怕。古曰：空劫夾命爲乞，此乞並非乞丐。而是人生走勢諸多不順，空劫雙煞爲土匪之意，倘人被惡煞左右挾持，自然不容易有順利的時候，也因此古人形容爲乞。


    回到你的問題，倘以國曆生日來看的話，根本沒有死劫這回事。無論就大限或流年看來都是如此，31 歲那年文昌化忌入命，文昌化忌頂多是財務損失，安心吧！這只是江湖術士在唬人的罷了。連空劫夾命這種尋常的格局都說成這樣恐怖，其他真不敢想像呢！放寬心，不要想太多，倒是
    31 歲那年倘參加國家考試，也許還有可能金榜題名呢！況且以流年看來，三方四正不逢煞侵，雖說會照化忌，但整體而言不構成太恐怖的格局，所以不要想太多。


    # ## 【發問者意見】


    很有幫助，謝謝！'
