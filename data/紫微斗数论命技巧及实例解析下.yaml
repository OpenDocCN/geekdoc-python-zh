  md: '# # 案例86、算命老師說31歲之前有個死劫，嚇死人了！


    回到問題原點吧，山人常說，論斷重大意外時，首先需檢視星曜組成是否構成所謂的惡局，如鈴昌陀武、巨火羊、殺拱廉貞等，同時需注意命、身及福德宮強弱問題。倘本命宮命身及福德宮無主星且會空曜，則確實發生重大意外的機率會是比較高。此例命宮三方不構成惡局，且命宮有主星，福德宮與身宮雖無主星，但也不會空曜，田宅宮亦不空，怎會有太大的意外發生呢？所以跟命主說死劫的這位老師，連最基本的三強理論都搞不清楚，難怪會把空劫夾命這種星盤必然出現的組合說的這麼嚴重，真是無言以對呀。而31歲那年怎會被斷為死劫呢？咱們就轉進31歲那年的流年盤來看分明吧！


