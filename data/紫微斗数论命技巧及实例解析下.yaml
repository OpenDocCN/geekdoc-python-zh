- md: '## 案例 86、算命老師說 31 歲之前有個死劫，嚇死人了！


    再者，雖然文昌化雙忌坐流年命宮，但文昌化忌，不表示血光，因此最多就是金錢損失罷了呀。又何來性命交關之危呢？


    如果那位老師說是 101 年的話，還有點說的過去。因 101 年流年命宮落於辰宮，而七殺廉貞又在此天羅地網處對拱，這就是俗稱的車關呀，但壬年廉貞並未化忌，且命宮三方四正亦不會忌星，縱有惡局，但不被引動，充其量也是啞彈，有何畏懼呢？縱使引動，命身不空，最多就是受點傷罷了，談到死劫，真的是言重了。連惡局都沒有，就解釋成死劫，倘真有惡局出現，真不知道這位大師該如何解釋呢？倘因此造成命主心理壓力過大，整天胡思亂想，心神不寧，以此情況繼續下去，我想也許不到
    31 歲就可能把自己搞成神經病了，沒死都被這位老師嚇死。這不是造業嗎？命理應該是要幫助在十字路口或遭逢人生低潮而徬惶無措的眾生，找到新的方向，得到新生才是呀。這些不學無術的江湖術士，胡言亂語，害人不淺。要知道善惡到頭終有報，習命者須戒慎之，切莫因一時之快而自造口業呀。


    ## 案例 87、感情困擾請老師解惑


    ### 【提問時間】


    ### 【提問內容】


    山人您好，小女子又來像您請益了。


    最近因爲感情的事情，把自己弄得很不解，在我的工作職場中，遇到了一位很心儀的男孩子，他很符合我心中所設定的條件類型，因此讓我很心動，很期待與他共事，只是不曉得爲什麼，從以前到現在，只要我有心儀的對象，過沒多久，單身的他就會找到另一半，有另一半的就會步入婚姻，我總覺得自己有"便媒人"的命。冥冥中會帶桃花給別人，這情況有趣到自己想忽視都很難，山人，可否請您幫小女看看，我到底該怎麼做才好？其實我滿困惑的，或許是因爲傷過太多，所以不會太過強求，對緣分看得比較開，但也總會有寂寞難過的時候，獨立堅強久了，說真的，也想要有個肩膀來依靠，就我自己對自己命盤的分析，可能我也是個難有姻緣的人，我知道自己很《一∠、很矜持，而我正努力調整改變中，新的一年將至，想聽聽您的意見分析，無論優劣與否，對我來說，都是成長，也是提升。不好意思麻煩您了！


    民國 75 年 3 月 21 日酉時生（國曆）


    ### 【回覆內容】


    果單從你的本命夫妻宮來看，你的眼光應該還滿高的。不過看來你的對象應該都是身邊的人，如：同學、同事或是鄰居等，整體看來比較適宜晚婚，但是如果有不錯的對象，倒是可以試試。


    只是建議你這個大限（24～33），對於感情還是看開點，因為山人很擔心你的狀況會一再重複發生。讓你自己感到很挫折，分析你這個大限的夫妻宮，貪狼桃花星正坐，但與野桃花天姚星相會，對宮廉貞化忌射入加上空劫來襲，因此你這段時間很容易會錯過好姻緣，就像你現在面臨的困境一樣，桃花不是沒有，只是和對方是有緣無份。只怕長久下去會讓你自己陷入困境，尤其廉貞貪狼這組桃花組合，會野桃花在加化忌，很擔心你會為情所困，甚至是遇到感情上的騙子。


    今年的緣分看起來還不錯，對方年紀應該比你還大，聰明，經濟狀況應該還不錯才是，看來要好好把握才是，試著交往看看。女生追男生應該很容易。不過可別太快把你那急躁火爆的脾氣給顯露出來，這樣會嚇跑人呢！


    基本上堅強的女生，個性都比較內斂也比較急躁，也比較喜歡接受挑戰與刺激。但大部分的男生還是比較喜歡小女生類型的，所以平常時也要適時表現出妳溫柔的一面，尤其是職場上，好事不出門，壞事傳千里。偶爾表現出你那有點散仙的潛質，其實還會滿可愛呢！


    畢竟妳還年輕，多方嘗試，不過要多加觀察，因就這個大限看來極有可能會發生遇人不淑的狀況。


    偶爾把自己的條件稍微放低一點，有時候看起來蠢蠢或普通的男生，才是當老公的最佳人選。山人閱人無數，有許多的熟女師姐，都很有氣質，也很漂亮，無奈淪落到 40 多歲都還單身，看來大姊頭是當定了。她們最常跟山人說的一句話就是：帥哥到最後都是別人的。因此而蹉跎耽誤了花樣青春年華，發現時往往悔之已晚，但又奈何？帥哥本身就比較花心，因為條件好，追求到最後，有個故事是這樣說的，一個女孩在海邊撿貝殼，一心只想撿到一顆最棒的貝殼，一路上走呀走，沿路看到很多貝殼，但因爲一直想著下一個會更好，路到底了，手上卻一顆也沒有，清楚嗎？


    所以你還年輕，試著把自己的條件給寬鬆一點，適時的表現自己女人的那一面。女生嗎，本來就不要太ㄍ一ㄥ，柔弱一點，會讓男生更生憐惜之心，自然會有好桃花出現。太強勢或太堅強的話，反而會讓男生不敢靠近，因而錯失機會。再度提醒你，帥哥或條件好的男生，常常都是毒藥，自己要多觀察。

    這個大限夫妻宮看來很辛苦，注意爲上，尤其是明年。


    **【發問者意見】**

    感謝老師指導，我會多注意。


