- md: '# 紫微斗數

    ## 論命技巧及實例解析（下冊）


    ### 了然山人 著


    深入淺出 實例論命

    白話講古 享饗大眾


    白話闡述紫微斗數論盤技巧及觀念，

    帶領讀者進入深奧的命理殿堂，

    系列書籍匯集百餘命例，

    輔以圖文並茂及系統性分析解說，

    輕鬆提升論命經驗與功力。


    # 自序


    常言道：紫微斗數易學難精，許多斗數學者學到一定程度時，由於缺少實戰經驗而苦於無法升級，加上市面上相當缺乏此類型書籍。回想十年前開始學習斗數時，便面臨此困境。有感於此，山人自民國
    101 年起便著手整理這幾年來的相關稀奇古怪的案例，希望能以此實例分析系列書籍來分享更多同好，提升自己的經驗與功力，不但能爲自己也能爲身邊朋友指點迷津，迎向新生。


    由於此實例分析連載合計百例，頁數超過千頁以上，故區分爲上、中、下冊出版，也要感謝同學長期的支持，使得本系列書籍均能登上各大書局暢銷排行版。此段期間，山人經常接到同學反映，由於許多派系對星曜的解說與組成有相當差異之處，因此在研讀此系列書籍與閱聽錄影課程時，有許多混淆不清之處，希望山人能提供授課講義，相輔相成，以達到最佳的學習效果。由於此書爲本系列之最終回，爲避免混淆，故本次山人將十餘年經驗濃縮而成的《輕鬆學五術：紫微斗數圖解》書籍內容，將以贈閱方式分享給各位同學，如有需要可
    e-mail 山人索取電子檔。也歡迎同學傳閱分享同好，讓更多的人能透過圖解說明方式輕鬆學習此術，進而掌握命運，改變人生。


    而《輕鬆學五術：紫微斗數圖解》，係以陳希夷（搏）道長原著之《紫微斗數全書》爲主體，但此古籍因長期收藏，竹簡紙張難免因腐蝕而難以辨識，加上後人對斗數認知不足，導致各賦文內容相當混亂，錯別字相當多，難以研讀。加上各派宗師體認與理解均有不同，也因此造成了同學反映對於星曜認知各有所屬的狀況。斗數流派相當多，建議同學可以專心學好一個派別的理論後，再另行進階，會是最好的學習方法，千萬不要這個派別學一點點，那個系列學一點點，結果弄成四不像，這就不應該了。


    因此《輕鬆學五術：紫微斗數圖解》，是才疏學淺的山人，輔以各門各派（如王亭之大師的中洲派）之精華，來補足原古籍缺漏或語焉不詳之處，並以淺顯的解釋、生動的圖解說明，加上多年經驗累積所編撰而成，特此分享各位同學。


    以山人多年研究各派別理論的經驗，認爲中洲派對於星曜特性的解說與認知，是最詳細且精確的，尤其王亭之大師的斗數推演理論，更是一絕，礙於未經授權無法刊載說明。也希望有興趣的同學能自行購買書籍或上網搜尋資料研究，定能有所收穫。


    由於紫微斗數的精要是在論盤而非排盤。故建議學者僅需知道安星規則及基礎的方法即可，排盤問題就交給電腦處理（至於選用何種軟體較爲適合論命者使用？山人強力推薦同學可選購星橋易學的斗數排盤軟體，簡潔明瞭易上手，專業度相當足夠，故本書便採用該軟體進行排盤，同學可自行上網下載，網址如下：

    http://www.ncc.com.tw/soft/


    歷經 8 年多的醞釀及 2 年多的籌劃準備，終於完成此系列書籍，期間經歷愛子誕生及許多的點滴，感謝母親大人的照顧，讓山人能在無後顧之憂的狀況下，專心著述，完成此系列書籍。也感謝王詩媛同學的改版建議。同時真心希望各位同學能因此套書籍得到更多的經驗，提升功力，一起推行此中國傳統術數，期能像西洋
    12 星座學一般，風行世界。


    如有任何疑問歡迎 e-mail 給山人，將盡速回覆。

    kzf0910@yahoo.com.tw

    也歡迎同學至山人的 facebook 粉絲團打卡按個讚歐。

    https://www.facebook.com/kzf0910


    了然山人

    103.2.21 歲次甲午年·於北投自宅


