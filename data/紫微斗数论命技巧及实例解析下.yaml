    ## 本命大限盤


    此大限命宮逢地空地劫會照，本有勞而無獲之味道，加上財官空劫正坐與天馬共度，田宅宮會照羊陀雙煞，庫位亦破，官祿宮亦同。是故此大限無論在事業或是財務上都會相當呈現相當辛苦的狀況。且大限破軍祿與本命祿雖於財宮，但被空劫搞成「倒祿」格局，加上鑾喜對拱，只怕此大限難逃因桃花而破大財的狀況。但盼命主慎之呀。


    ## 案例 60、請大師解惑：家庭、事業蠟燭兩頭燒


    【提問時間】

    【提問內容】

    小弟在知識家上有看過大師爲網友回覆的文章，不瞞大師，小弟最近因工作及家人健康上的問題煩心，是標準的夾心族，家庭事業兩頭燒，真是身心俱疲。小弟覺得事業運不是很順，忙東忙西，但賺不到什麼錢。又要三天兩頭往醫院跑（父母，小孩），加上年紀也不小了，對於未來有很大的不確定感，所以附上小弟的生辰八字，煩請大師抽空幫小弟解惑。

    國曆 64 年 3 月 11 日早上 2 點 40 分出生。感激不盡！


    【回覆內容】

    投胎人世間，本來就很苦。以佛家來說，會成爲一家人只有 4 種因緣：欠債，還債，報恩，報仇。所以辛苦點也就當作是來還債的，心情也會好多了呢！


    你的本命坐武曲貪狼，且落於四墓地中，爲晚成格局，古諺云：「武貪不發少年人」，便是此意。想想，早發對你的命局而言並不是件好事，因通常都沒有太好的結果。因此你年輕時候比較辛苦，並不是件壞事。所以別想太多。


    你的命宮三方無煞，表示一路走來雖然辛苦，但沒有太大的挫折與不順，最多就是感到失落。命不會煞雖然很好，但相對而言，個性也比較不具衝勁（殺氣），無法成就太大的事業。


    你本命宮逢日月夾又會昌曲，爲文星拱命及日月夾命局。想來你應該也是滿有才華的人，家境也還不錯才是。整體個性比較偏向文人方面。


    就本命盤看來，你應該不會有太大的挫折與不順利，只是這個十年大限（36-45），大限命宮逢雙煞侵襲，福德宮又逢空劫拱，所幸有輔弼兩大助星對拱，因此縱是有不順利或挫折，最後總是會關關難過，關關過。


    至於事業部分，因逢祿馬交馳且會祿權，因此環境會迫使你不停奔波賺錢，但可惜大限官祿宮坐陀羅，陀羅主遲滯，打轉。因此祿馬交馳會陀羅，便構成了折足馬的格局，表現在現實上，就是忙的要死，煩的要死，卻賺不到什麼錢，運氣差一點，還會賠錢坐收呢！不過到下個大限就會開始轉進大運了，此時定然會有相當的成就才是，正所謂柳暗花明又一村，不是嗎？


    因此在目前這個十年大限建議你不要輕易嘗試去做需長期經營才能生意或創業，因爲最終賺到的只有經驗。如非得要做生意，建議你可以跑跑短線，打打游擊。趁流年運勢轉好時來做，運勢轉差時馬上收，這樣也許還有獲利守成的機會。


    但因你本命太過平穩順利，加上上個 10 年大限還算平順，因此遇到這個不是很吉祥的大限，會感到無力與挫折感，這是難免的，所以不要想太多。學著鍛鍊自己吧，一切的勞累就當作磨練與還債。等到這個大限走完，狀況會好多的。畢竟人生總不會一直順風，對不對。


