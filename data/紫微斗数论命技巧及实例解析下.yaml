    # 本命盤


    武曲坐命加上身居財宮，是故命主對於錢財多寡定是相當重視。武曲為財星，但此財必須靠自己努力而得，與祿存星、化祿星此類天賜之財不同，因此武曲本性便帶著強烈的孤剋性，其實這也是沒辦法的事，正所謂：道義放兩旁，把利字擺中間。這就是求財必須的態度。而這也是魁星坐命者不宜的主因。天魁坐命者，心慈善良，想在弱肉強食的商場上搏鬥，只怕是小白兔與大野狼。故以命主的命宮星曜組合，倘硬要求大財，只怕是敗局居多。


    而本命宮會照紫微、天府又逢輔弼來拱，形成君臣慶會大局，古曰：才善經邦。且府祿相三合會命，加上紫府廉武相這個穩定的星曜組合，整體而言，格局相當大，相信命主定然會有相當成就才是。而官祿宮的星曜組合相當漂亮，故此局人最宜在職場上發展，八成能升遷到不錯的職位。對上班族而言，升遷意味薪水增加，自然有晚景可期。


    而此盤是否適宜創業，山人就本命宮星曜組成斷定決然不宜，此點可從其盤中天馬陀羅同度，形成「折足馬」格局，可得反證。身宮表後天，由於命主身居財宮，加會化祿與天馬，加上本命格局大，表示命主能力相當強，自然經常會有創業的打算。畢竟領死薪水的人，很難有發達的一天。對身居財宮的人，會是相當苦悶的事情。不過倘流年大限洽當時，倒是可以抄個短線，定能有所收穫才是。


    由於命主問的是中晚年的情景，以此局而言，倘能專心在職場上發展，不輕言投資或投機，甚或是創業。以其財官雙美的格局而言，定然能有相當的榮景可期。


    而以山人經驗而論，通常命宮帶有強格局者，大都屬於大雞晚啼型，所以年輕時候的波折與不順，要多加忍耐，因這都是後來成功的經驗累積呀。此點可從命主大限運行得到證明，在問命當年這個大限（22～31），大限命宮擎羊正坐，又逢空劫齊臨，大有東做西成，勞碌奔波無所獲的狀況，也因此命主會提出此問題，並不讓人意外。但接下來命主連續走
    3 個強運的大限，斗數每個大限以 10 年為度，3 個強運大限，就是 30 年呀，多麼讓人羨慕呀。這不正呼應了「大雞晚啼」的通則嗎，基於研究的精神，山人就簡單分析如下：


    1. 32~41 大限，逢本命祿正坐，三方穩定無煞，大限官祿宮又逢日月並明，此段期間倘於職場上，會是發光發熱的開始。

    2. 42~51 大限，大限命宮廉貪正坐，三方會照紫微與輔弼，形成君臣慶會大局，所有主星均到齊，雖陀羅正坐，但因此局夠強勢，故煞星造成影響不大。而走紫微大限，通常都是相當有成就的時候，加上命主格局相當大，故定能有相當滿意的成果。

    3. 52~61 大限，逢日月對應，三合亦是穩定無煞，相當漂亮。


    整體而言，命主中年運相當強勢，故此段時間只要堅持不投機或從事投資事業，專心一致的在職場上發展，晚年定然會是相當悠閒自在。最怕就是被 30 年大運的成就給沖昏頭，導致過度擴張或投機，則以
    62~71 這個大限星宿組合而言，定然有苦頭吃。所以山人在回覆時刻意不提後來的大運發展，就是希望命主能再大運來到之前，學習好理財與建立良好心態。否則以大限走勢而言，中年雖然強勢，但晚景確實堪慮呀。


    ## 案例 84、兩人的命盤是否適合結婚？


    **【提問時間】** 2009-09-02 20:33:06

    **【提問內容】**

    姐姐和男友分分合合了七八年，感情時好時壞，目前姐姐也三十歲了，想要有定下來的打算，但又覺得常常有爭執婚後會不會更嚴重？請大家幫忙看看。

    女：民國 69 年 7 月 21 日 19 時生

    男：民國 63 年 11 月 13 日 11 時生

    謝謝大家！


    **【回覆內容】**

    先問你一個問題，如果命盤不合，妳們會分手嗎？


    如果答案是 yes 的話，山人不會幫妳們看，因為這是破壞姻緣，罪業深重。如果答案是 no 的話，更不用看了。如果絕對不會因爲這樣分手，那又何須看？？又何必問？


    要知道男女相處靠的是彼此之間的包容與協調，只要彼此肯爲對方改變，多包容對方的缺點，又怎會有不和的問題？哪個人結婚沒有去合八字，那台灣不就應該是個幸福的島嶼，因爲壓根沒有離婚這回事。哪個人結婚不擇日，如果真的有效的話，那離婚率為何這樣高？


    誰說八字不合不能相處，又有誰敢說八字合絕對能白頭到老？


    主要在於自己是否珍惜這段緣份，是否願意改變自己，是否願意彼此尊重，注意溝通協調。如果能做到的話，又何必去在乎八字問題呢？


    ### 【發問者意見】


    感謝山人不吝指點迷津。


    ### 【命盤解析及內容說明】


    山人論命多年，經常遇到男女合盤問題，再此想請問大家，倘雙方以命理角度推估，真的是不和局，到底你會怎麼做？是據實以告？或是選擇性的忽略？山人論命以來經常碰到女方登門哭訴，說雙方原有結婚打算，有的連餐廳都預定好了，但男女某方家長去找老師合八字，結果說女（男）方命裏帶剋或是八字不合，結果搞成家庭革命，通常最後結果大都是勞燕分飛就是以私奔結案，所以我猜，大部分的老師應該都是選擇據實以告。


    站在因果的角度來看，縱使你可以用命理的方法預知這段姻緣可能不佳，但畢竟是累世因所導致的今生果，正所謂，百年修得同船渡，修百年也才有同船渡的緣分，又何況是打算牽手一輩子呢？縱使是孽緣，也是因果所致，習命者，又何苦去背這因果債？破壞人家的良緣呢？山人常說，命理是統計學的一種表現方法，也是會有例外的狀況，不是嗎？


    撇開因果這類問題，回到現實層面，婚姻是兩個人的事情，倘若雙方願意相互包容體諒，以溝通取代爭執，縱使八字不合，誰敢說這兩人不能夠白頭偕老？縱使兩人六合，但雙方堅持己見，不願溝通協調，又有誰敢說這兩人能長久？就實際上來看，在台灣這個小小的島國，幾乎每對情侶結婚都會看日子，會合八字，所以會結婚成爲伴侶，應該都是相當的合盤了吧，但爲何離婚率還是這麼高呢？身爲命理老師的大家，是否應該思考這個問題呢？


    再者，縱使你提出雙方不合盤，不應該結婚，那她們就真的不結婚了嗎？倘是累世因果所致，又怎可能因你的一句話而輕易拆散，只是徒增雙方還有兩個家庭長輩間的糾紛困擾而已，若導致雙方家長兵戎相向或是男女雙方承受不住壓力尋短，衍生社會事件，那這惡果，自然就是由造此惡業的命理老師承受。因此習命者當慎言，需知你的一句話，極有可能影響他人的一生。尤其當你看到一對情侶就這爲這荒誕不羈的原因，硬生生拆散，怎能不讓人心酸與感嘆？


    所以山人在遇到這類型問題時，答案只有一個，就是：不錯，其因爲何？山人會把雙方個性的優缺點做個詳細分析，未來應採取的相處模式，建議她們該如何互補，並勸誡婚姻須注意事項與正確心態，倘男女雙方真能依建議相處，又何來八字不合問題呢？又有誰能說這兩個八字不合的情侶，無法結髮一輩子呢？這是每個習命者應有的態度與心態呀，但這也是山人窮困的主因呀！


    ## 案例 85、困惑之人請紫微高人解命


    **【提問時間】** 2009-09-08 19:49:08


    **【提問內容】**


    1. 日前有人看了我的命盤說我今年是要升官勿運，但也有人說我沒有。升官的運到底是怎麼一回事呢？

