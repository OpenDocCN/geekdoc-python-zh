  md: '# # 案例 88、我是一個沒福氣的人嗎？


    點一下，在工作人際關係方面我要特別注意什麼？工作運何時會變好呢！以我的命盤來說，我是不是一個沒福氣的人呢！不管是工作上或是財運或是婚姻、健康之類的，我怎麼覺得都不太順！不期望大富大貴，但希望能平平順順，但似乎也是一種奢求。看著朋友們的工作穩定，錢財都固定的有收入，而且我好不容易找到的工作卻搞砸了，而錢財也在流失中，花的更兇，似乎留不住財。


    懇請山人幫我指點一下我的疑惑吧！讓我明白，我現在該做些什麼？我現在完全處於茫然的狀況下，不知道該怎麼辦？以前從來沒想過要給人看命盤之類的，當身邊的朋友們都在為愛情之類的跑去算命的，我卻沒什麼感覺，但人總是要遇到自己覺得人生中的最大挫折時，才會想透過別的方式，來更了解自己，來提醒自己該注意些什麼。


