  md: '# # 紫微斗數

    論命技巧及實例解析（下冊）


    所以建議命主能夠克紹其裘，好好接下家族事業，不要輕言創業，同時趁此時間磨練心性，讓空劫雙煞對自身的影響減至最低。以其雙祿馬交馳及雙主星坐命的格局看來，定能將家族事業給經營的有聲有色的呢！這不也是光宗耀祖的一種方式嗎？創業雖然辛苦，但守成更是不容易呢，這也是山人對命主的期待呀！


