    \ 75 年國曆 5 月 26 日 13 時 27 分（未時）生。\n\n謝謝！\n\n**【回覆內容】**  \n嗯，你說的話，基本上對了 80%，正所謂命由性生。一個人的命運決定在他自己的個性，一個積極度不足的人，怎能期待在工作上能大放異彩呢？至於命是否天定，以山人多年論命經驗，一個人此生如果沒有自造大善大惡，基本上人生的運勢及歷程，不會與命理所敘述的相差太大。所以命理老師都勸人"
  mdcn: "## 案例 77、請問我今年或明年的結婚運到了嗎？\n\n各個省份，自然會有不同的嫁娶習俗。\n\n有鑑於此，雙方家庭在嫁娶習俗上認知的差異，往往是爭執的主因。而當雙方家長爭執不下之時，我想苦的就是這對將成婚的新人了，所以當年不是沒有成婚的可能，只是雙方要盡量互相包容對方家長在文化習俗上的差異，盡量避免因婚事而爭執，我想還是有成婚的機會呢！但單以命理角度由流年推估，30\
