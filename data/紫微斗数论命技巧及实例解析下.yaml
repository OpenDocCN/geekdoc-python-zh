  md: '# # 案例58、請老師幫我解命盤（現逢人生最低點）


    我想請問各位老師的是：


    1.工作何時才能夠穩定？何時才能找到適合的工作？


    2.我的女友會和我有結果嗎？會是我的正緣嗎？


    她的資料:國曆67年3月13日早上8:00出生。臺北市出生。


    # ## 【回覆內容】


    看來你確實是很低潮，今年尤其是。流年不甚佳，煞忌齊臨。好在流年僅主1年之運，眼看今年就要過去了，明年看你會滿順利的，多忍耐吧！


    如果可以的話，明年是結婚的好日子，倘雙方有意願就結婚吧！姻緣運很強，你這個女朋友看來也不錯呢，至少在妳苦的時候不離棄你，明年開始轉好後，得對人家好一點。


    明年己丑年，整體看來不錯，有外出或調動的機會，也會有助力出現，同時貴人與機遇都還不少呢，應該也會有至外地工作的機會，且明年應該會賺到錢，耐心點，人總沒有一直平順的吧，好好展望明年，你會很不錯的。


    如果真的沒方向的話，建議你可以去考公務員，明年你的流年命宮正逢魁鉞入命，考上的機會不小。努力點會有金榜題名的機會的，可以走這方向。反正沒工作，剛好專心唸書，考上後，工作穩定了，也就可以結婚了，女朋友也不會在沒有安全感了，對不對呢？況且考運正好，不去嘗試看看，真是很可惜呢！'
