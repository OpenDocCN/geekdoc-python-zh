    # ## 本命盤


    正所謂男怕入錯行，女怕嫁錯郎。山人論命以來，登門的女性同學，大都以姻緣問題居多，尤其是另一半到底是怎樣的外型個性及相處模式。針對這個問題，我們就從本命盤夫妻宮直接分析吧！


    夫妻宮太陽正坐，表另一半較有大男人主義傾向，通常也較爲「博愛」，性急，好面子，個性直爽，整體三方四正不見煞忌，結構相當穩定。而對宮會照天梁，表交往對象通常較爲


    166'
- md: '## 案例 82、此女命盤未來婚配對象的條件會很糟嗎？


    年長。因若將夫妻宮當命宮，對宮就是夫妻宮的遷移宮，表示外在所接觸的對象。而三方雖會照巨門，表口舌是非，但因太陽正坐且居午宮，爲日正當中之時，恰可驅巨門之暗，所以應該都是小吵架罷了，夫妻相處，誰不是吵吵鬧鬧的呢！加上本命化祿坐夫妻宮，暗示命主對配偶相當的重視，且看來有嫁入有錢人家的可能呢！


    整體而言，星曜組合相當漂亮。所以未來的對象，想必也糟不到哪去，所以命主真的是多慮了。倘真的要挑毛病，最多就是陰煞會照，表之間多小人作怪，但此曜屬雜曜，影響畢竟不大呀。


    而夫妻宮除可窺見未來對象的大致輪廓之外，同時也暗示命主喜歡異性的類型，所以各位同學，當你幫女朋友或老婆、老公排盤時，記得看看自己是否符合他所喜歡的類型呢，倘若不是，自己要更加倍努力，贏得芳心。


