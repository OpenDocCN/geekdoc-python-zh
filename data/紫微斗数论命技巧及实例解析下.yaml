- md: "## 案例 77、請問我今年或明年的結婚運到了嗎？\n\n各個省份，自然會有不同的嫁娶習俗。\n\n有鑑於此，雙方家庭在嫁娶習俗上認知的差異，往往是爭執的主因。而當雙方家長爭執不下之時，我想苦的就是這對將成婚的新人了，所以當年不是沒有成婚的可能，只是雙方要盡量互相包容對方家長在文化習俗上的差異，盡量避免因婚事而爭執，我想還是有成婚的機會呢！但單以命理角度由流年推估，30\
    \ 歲那年成婚會是更好的選擇呢，所以倘當年因爭執而作罷，未來還是會有機會的呢！\n\n## 紫微斗數\n論命技巧及實例解析（下冊）\n\n## 案例 78、人稱「鐵掃把」，請大師幫我解惑好嗎？\n\
    \n**【提問時間】** 2009-08-29 08:21:02  \n**【提問內容】**  \n老師你好我想請問今年牛年農曆 6 月出生的小孩好嗎？我的小孩子出生日期為國曆\
    \ 2009/08/17 是男生，早上 9 點 23 分出生。有一位老師說不好，說是「鐵掃把」，要我去找診所護士改出生證明，要我報戶口時要改為國曆 2009/06/21，請大師救我，幫我解惑。\n\
    \n**【回覆內容】**  \n這位煩惱的父母親，首先要澄清一個觀念，就是人的命在他出生的時候已經定了，改變出生日期，不但改不了命，反而是害了這個孩子呀！\n\
    \n你試想，如果你在公司上班，只是一個小職員，當你到了董事長辦公室，你敢坐在董事長的椅子上嗎？為何副總統不敢坐在總統的位子？又為何沒升到將軍的人，不敢隨便佩戴星星在肩上？\n\
    \n都是怕沒有這個福分，所以大人不要隨便幫小孩改日期，因這樣反而是害了它。所有的事，都是由因果所造成的，沒辦法用投機取巧的方式改變它，這樣清楚了嗎？山人幫你孩子看看吧\
    \  \n命造國曆 98 年 8 月 17 日巳時建生\n\n本命宮見天機太陰坐，此格局為標準的機月同梁格局，古曰：機月同梁當吏人，整體而言不算太差，只是這個小孩有點散仙，聰明但是個性有點溫吞、內向，不過機謀多變，多才多藝也是他的優點呢！所以命局整體看來還不算太差，不要想太多，要知道，鐵掃把又如何？如果能夠多行善積德，自然有改變的機會，命格再好又如何？自己不努力也是惘然，所以這位父母親，不要擔心，好嗎？\n\
    \n沒錯的話這小孩的家境頗爲寬裕，如果真的擔心的話，可以考慮重拜父母，比去戶政事務所謊報日子還來的實際多。\n\n對了，既然是小孩，就順便把這小孩該注意的地方一併告訴你，八字學上稱之爲「小兒關煞」，也請多加注意。\n\
    \n撞命關：勿入中元壇內，保平安。  \n直難關：限內刀器利器小心可保平安。  \n四柱關：所有修造動土、不可近前、遠離爲吉、俗忌坐兒童車，須小心可保平安。\
    \  \n落井關：勿近井邊、河邊、水邊、渡舟、有坑洞穴的地方去玩必險、有水厄之災、勿近爲要。  \n雞飛關：怕看殺生，防之為要，以免不吉。\n\n# **【發問者意見】**\n\
    \n**謝謝**。\n\n## 案例 78、人稱「鐵掃把」,請大師幫我解惑好嗎？\n\n### 【命盤解析及內容說明】\n\n| 文右龍天天陀天昌獨池哭馬羅相\
