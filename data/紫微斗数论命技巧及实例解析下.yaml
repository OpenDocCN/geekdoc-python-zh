    ## 案例 91、家裡陰盛陽衰，而我會是同性戀嗎？


    **【提問時間】** 2009-10-26 16:09:42


    **【提問內容】**

    從小家裡就陰盛陽衰，父母把我當男人帶大，打扮也較中性，我會變成同性戀嗎？我是 74.6.15 辰時（農曆）。


    **【回覆內容】**

    會不會變成同性戀，我想這問題在你自己身上，看你自己喜歡的是男生或是女生，自己最清楚。命理分析只能夠可以提供你參考。


    如果單以命盤來看的話，看起來不像是個男人婆的樣子，且疾厄宮雖會陰煞，但子女宮不會哭虛。以命盤看來，欠缺成為正牌同性戀的必要條件，也不構成一般較易有同性戀傾向之格局。而你的夫妻宮看來也不算太差，子女宮會魁鉞，表示孩子日後應頗有成就才是呢！以山人的經驗看來應該不會是同性戀才對。


    沒錯的話你的心思還滿細膩的呢，不過思考邏輯卻是滿前衛也有點叛逆。也滿有豐富的想像力，無怪乎你會問這問題，不奇怪。


    沒錯的話你應該也是小氣財神一個，但常常會有胡亂投資或莫名破財的情況，對自己很好，很捨得花錢在自己身上。以你的本命宮格局來看，千萬不要輕易相信人，因為可能會因此破大財。盡量避免跟會或從事投機事業，看有沒有機會把自己的錢財給守住。


    不過如果就你的父母宮看來，雙親應該想法與觀念還滿開明的。所以會把你當男生來看，也不是很奇怪。雖說命盤不構成同性戀的條件，但這一切還是要看你自己，因為這問題決定權在你自己手上。喜歡異性或是同性，都是自己的選擇，命理只能提供您參考。


    ## 【發問者意見】


    無。


