    # # 本命盤


    山人在看到命主自述內容，心理便在猜想，此人命必逢空劫，因空劫入命者，一生至少會被騙一次。其因爲何？因此局人經常都是聰明一世，糊塗一時。且空劫兩煞曜影響的是自己的判斷力，所以誤判狀況，對空劫會命者，是很正常的。因此山人暱稱此二曜爲「土匪星」。另其必有化祿或禄存正坐或會照命宮，因只有禄落僕役者，才會有重義不惜財的狀況。(所以要借錢或是找「人呆」,只要找這種格局的人，包準沒錯)。'
