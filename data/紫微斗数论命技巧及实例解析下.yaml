    \ 29 41 53 65 | 電話： | 地址： | 編號： | 0000000128 |\n\n## 本命盤\n\n這又是一個不學無術的老師惹出的麻煩，山人論命多年，此類型事件遭遇相當頻繁。所以論命者務須謹慎言行，讓這位母親如此苦惱，還要爲了你的一句話，竄改出生時間，犯了「使公務員登載不實罪」，這又何苦呢？倘竄改時間有效，冒個犯法的風險也就罷了，但這是無謂的行爲，若竄改出生時間有效的話，那全國的嬰孩不就都是台灣首富郭台明，因爲沒人會把時間改成「乞丐」的格局，這聽起來是否有點荒謬無厘頭呢？\n\
    \n也就是因為如此，所以中國術數經常被視為迷信，都是這些不學無術的江湖術士搞出來的呀，胡亂編造故事背上因果，自己下拔舌地獄就算了，還要讓中國五術因此蒙上迷信的惡名，真是為禍不淺。\n\
    \n以山人多年論命的經驗，其實一個人的命運好壞，在出生的那一刻，就已經註定了 7 分，為何會如此準確？除了山人立論的統計學的基礎之外，最重要的是因果關係。倘改出生時間就能改變因果，各位同學，您認為可能嗎？許多家長就是有這種迷思，總認為小孩的出生時間好，就能保證終身富貴，但事實上，人命是天定，不可能因人爲因素遭到改變，許多父母望子成龍，都會擇日剖腹。但，真的有用嗎？如果有用的話，那每個人都是王永慶了。哇！那台灣豈非成為「香格里拉」，一個沒有窮人的國度，每個都是巨商豪賈，這是多麼理想的境界，倘真如此，我想連佛祖釋迦牟尼都要跟這些狂妄的命理師請益了呢！\n\
    \n所以改變出生時間或是擇日擇時剖腹，有可能讓小孩的命變的更好嗎？用「第三隻眼」來想都知道：根本不可能！家長倘選擇這樣做，經常是害了這個孩子，因爲每個人天生命格的承受力不同，格局大者，承受力佳，可堪重任，但沒格局者，你硬給他大格局，請問他承受的住嗎？\n\
    \n山人在回覆時舉了很淺顯的例子，假如你今天是公司的小職員，讓你去董事長的椅子坐坐看，我想你會感到頭暈不舒適，又台灣曾有某位民意代表，受高層賞識，進入政府擔任部長等級的要職，但在就職前幾日，因登山心臟麻痺而意外死亡。為何？就是因為承受力不足。大人尚且如此，又何苦這個寶寶呢？這並非山人危言聳聽，而是真實的例子呀，為人父母者，當須慎之。\n\
    \n縱使真是鐵掃把，也是因為累世的因果所致？佛家常說，會成爲一家人，只有四種姻緣：還債、討債、報仇、報恩罷了，知乎於此，何須過度在意呢？再怎麼說都是自己的孩子，在怎樣不好，就當作還債了吧！讓山人感到納悶不解的是，通常命理老師遇到這情況，都會建議八字帶鐵掃把的孩子，重拜父母可免刑剋，從未聽過要去戶政事務所改日期的建議，真讓人匪夷所思。基於研究的心態，倘有機會，山人倒真想拜會這位大師，探究其因，也許是山人學養不足吧，以至於聞所未聞。\n\
    \n觀念正確了，我們就幫這位煩惱的父母親看看孩子的命盤吧！天機太陰坐命，三方形成機月同梁格局，基本上此局人穩定性相當足夠，又紅鑾天喜入命，異性緣絕佳，但因天空正坐會照地空，雙空會命，故個性會相當迷糊散仙，但整體星曜組合相當穩定。身宮又逢天魁天鉞此類貴人星拱照，命身皆強，福德不倒，又怎會有太大的問題？而田宅宮得府相朝，又逢昌曲拱照，家境定然不差，又有什麼必要去亂改呢？至於命帶刑剋，過房或重拜父母及用孩子的名義行佈施與放生，累積福報與資糧即可，這位父母親，真的不需要擔心太多呢！\n\
    \n## 案例 79、關於婚姻與小孩請協助解盤\n\n**【提問時間】** 2009-08-27 10:49:02  \n\n**【提問內容】**  \n\
    農曆 76 年 4 月 27 日卯時，男，可以看出幾歲結婚與小孩的情況嗎？之前有別的老師說：「不是沒小孩就是會『離開』。」\n\n**【回覆內容】**  \n\
    看來你對這問題很重視，你應該是獨子吧，壓力會比較大。其實有沒有小孩這點，為何許多老師不會回答你？原因很簡單，現代科技進步，可以做人工，也可以做試管，不孕症的都可以子孫滿堂。而且古代強調多子多孫，現代少子化當道，所以用古代的命理論子息數量，基本上已經不會正確。\n\
    \n但與小孩的相處及小孩個性，卻還是正確的。只是有沒有小孩這個問題，以目前的生殖科技來講決定權在你自己手上。而非天意，這樣清楚了嗎？好了，基本觀念正確，現在就幫你看看：\
    \  \n結婚這回事，其實決定權也在你自己，命理充其量只能提供你參考值，因為你如果想結婚，明天就可以呢！\n\n如果單純以命理的角度來看，你青少年時期多為單戀，且常有拖泥帶水的情況。以你現在這個大限來看（24～33），大限命宮逢桃宿對照對照本命盤夫妻宮，大限夫妻宮逢化祿，沒錯的話婚姻應該成於此大限，所以耐心點，不要急，時候到了，自然就會結婚，至於確實的年紀，雖然可以推論的出來，但是這樣會有暗示的問題，有時候反而是害了你。所以只能大概的告訴你，也歡迎你在這大限成婚後再來與山人印證。\n\
    \n至於小孩的情況，子息數量問題，上節已經敘述過，至於您的孩子，看起來個性比較強硬也比較叛逆，有主見，不喜歡被人管。而且是個過動兒，比較坐不住。老愛到處跑來跑去，以子女宮逢雙煞的情形來看。推論是子息數會比較少，當然如果你去做人工受孕就另當別論。\n\
    \n就像山人說的，雖然子息數量不會準確，但相處模式及小孩個性，卻是相符的。\n\n# **【發問者意見】**\n\n無。\n\n### 【命盤解析及內容說明】\n\
