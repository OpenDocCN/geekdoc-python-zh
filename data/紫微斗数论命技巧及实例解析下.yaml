    如果真的沒方向的話，建議你可以去考公務員，明年你的流年命宮正逢魁鉞入命，考上的機會不小。努力點會有金榜題名的機會的，可以走這方向。反正沒工作，剛好專心唸書，考上後，工作穩定了，也就可以結婚了，女朋友也不會在沒有安全感了，對不對呢？況且考運正好，不去嘗試看看，真是很可惜呢！


