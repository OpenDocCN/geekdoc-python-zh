    # ## 案例77、請問我今年或明年的結婚運到了嗎？


    【提問時間】2009-09-01 23:40:13


    【提問內容】


    我是1982年06月16日未時生的，農曆潤4月25日，想問今或明年有結婚運嗎？


    【回覆內容】


    結婚，只要你們雙方想結婚就隨時可以結婚，哪有結婚運這回事呢？因為結婚的時機決定權在自己，命理只能當作參考，或是提供比較適宜結婚的時機點，這樣才比較正確。還有，沒有出生時辰，無論是八字或紫微等命理術數，都沒有辦法做整體的論述，所以也沒有辦法幫妳男朋友看。


    不過其實不需要看，原因很簡單，如果兩個人看了不合盤，你們會因此分手嗎？如果不會，那看又有什麼意義？如果會，哪個老師會拆散人家的姻緣呢？縱使給你六合，又如何呢？台灣大家結婚哪個不去合盤？不去挑良辰吉日？如果有用的話，那離婚率怎會如此之高？


    130'
