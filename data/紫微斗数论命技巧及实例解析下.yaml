    ## 案例 66、待業中，請高人幫我解紫微找方向


    **【提問時間】** 2009-07-27 11:16:11

    **【提問內容】**

    國曆：64/9/15 丑時，感恩～


    **【回覆內容】**

    從你的命宮看來，比較適合變動性較大的工作，如：業務、總務或專業技能方向。看起來雖然你一路走來頗爲顛簸，但至少都會有適時的貴人出現，雖然辛勞仍難避免。


    你的命格具有公門命格，我想你應該還滿有才華的，文筆應該也不錯，只是你的脾氣有點陰晴不定。建議你稍作修正會比較好，至少可以避免掉一些無謂的挫折。你的行動力頗強，但有時候卻會過於衝動行事，這樣通常結果不是大好，就是大壞。


    本命具有公門命格，可以嘗試去考公務員，太單調的內勤行政工作不太適合你，不過總務工作倒還滿適合的。從流年看來明年流年命宮逢昌曲文星拱照，考運應該還不錯，可以試試。


    ## 【發問者意見】


    所言極是。感恩感恩～


