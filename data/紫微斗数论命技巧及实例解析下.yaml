    \n## 案例 74、我的命不好嗎？\n\n**【提問時間】**\n2009-08-15 18:33:59\n\n**【提問內容】**\n1985/7/29，早上六點生！最近身邊的人迷上算命！但有很多個說我命不好！最近在創業！雖然我不是很信這個！但心裡還是會怕怕的！也不知道該相信誰！誰叫現在騙人的算命太多了！一堆死要錢了！\n\
    \n我現在賣女裝這是我喜歡的行業！怎麼辦！好多算命的都說我這次創業會白忙一場，但是這次我做的是有點中規模的店！\n就是這個我超擔心的。\n\n**【回覆內容】**\n\
