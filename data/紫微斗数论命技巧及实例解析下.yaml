    命主天同坐命且化祿，福星坐命化祿原本並非好事，但因與火星、擎羊雙煞同度，因此得以激發其軟弱本質。天同坐命者，由於太過於員外個性，本不宜創業。但此局在煞星的激發下，又火羊成局，故相當適合以武職顯貴，而汽車業，不管是銷售或是維修，都是相當適宜的工作，正所謂，男怕入錯行，看來命主的選擇是正確的呢！


