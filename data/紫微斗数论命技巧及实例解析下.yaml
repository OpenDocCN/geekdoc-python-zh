    # # 案例88、我是一個沒福氣的人嗎？


    **【提問時間】** 2009-09-13 23:45:54

    **【提問內容】**

    山人您好：

    最近因工作上發生了一些事，讓我開始不得不思考自己個性上的缺點，我想請山人幫我看我的命盤，在個性上我需要注意些什麼？我適合從事怎樣的工作呢！


    我的生日為68年1月23日子時（國曆），我本來的工作是會計，進去才二個月吧！目前這份工作已經離職。一開始進去時我就自以爲是了、而作帳方式也太隨性了，有些動作也造成讓人產生其他的聯想，才會導致後面的後果。會不會引來牢獄之災或財損之類的我也不太清楚。但一開始的個性及做事方式如果可以避開，也或許後來不會這樣！而這件事其實造成我精神很大的折磨，讓我差點變成神經病，也差點被朋友們抓去看心理醫生！雖然最近的精神狀況有好點，但其實還是放不開、想不開，還是會偷偷哭。


    仔細思考會變成這樣子，應該跟我的個性和做事方式有關，我的個性似乎太剛烈了、太直來直往了點、不太懂得柔軟、太有自己了想法了吧！沒有顧及到其他人的想法。所以想請山人指'
