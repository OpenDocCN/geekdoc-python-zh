    ## 案例 59、請老師指點感情與事業問題


    **翼呀。因此山人建議命主繼續留在原工作上，會有一番成就的。**


    **倘若要轉換跑道，仍是以娛樂休閒產業為最佳，當然，公關行業亦是不錯的選擇**。


    **至於感情部份，本命宮三方加會鑾喜**，基本上表示此人異性緣甚佳，照理說伴侶應該不缺才是。問題在於對宮寡宿正衝，夫妻宮逢地空地劫正坐加會本命祿，形成倒祿格局，此局出現於夫妻宮，經常會有遇人不淑的感慨，在感情路上會是相當的挫折，以男生而言，大都是只有幫人家養老婆的份。加上又會照孤辰寡宿這兩顆星曜，且對宮本命忌衝，縱使成婚或有穩定對象，也難逃生離死別、聚少離多或貌合神離的狀況。**我想命主應該經常碰到喜歡的人不喜歡她**，而不喜歡的人，卻黏著不放的情況。但因夫妻宮天相正坐，表示配偶應該都是身邊熟識的人，例如同學，鄰居等。因此建議命主要好好把握珍惜身邊現有的女生，與其辛苦去追求那湖中月影，倒不如把握住身邊的花朵。**倘真能如此**，我想命主的情路應該會感到順多了。畢竟被愛比愛人還幸福呀。


    **至於命主提到事業問題，那我們就轉進這個 10 年大限**，看看該怎麼給他建議吧！


