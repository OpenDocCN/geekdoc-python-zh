    ## 大限流年盤


    看了這麼多案例，相信大家已經看出來了吧，祿馬交馳會流年命宮，又逢地空地劫會照，雖不逢化忌引動，但因祿落流年僕役且會照雙忌，又引動天機天梁會擎羊這人離財散的格局，可以肯定的說，這位朋友借完錢後，鐵定消失的無影無蹤。以此結構看來，被朋友倒債，並不意外。所有的格局被化祿或化忌引動，會使格局往好壞方向發展，其表現狀況是被外在環境逼的不得不為，但無引動表示決定在自己。


    以整體命盤看來，命主其實錢並不缺，問題出在自己身上呀。倘能不要那麼心軟講義氣，也不胡亂投資，又怎會有缺錢之時呢？此盤只適宜穩定保守，所以也勸誡命主。其實只要知道自己的缺點，開始改善，時猶未晚，過去的就過去了，只要不在重蹈覆轍，自會有一個好結果的。


    ## 案例 62、前途茫茫，想創業不知道合適與否？


    **【提問時間】**

    **【提問內容】**

    了然山人大師您好！


    在知識 + 看見你幫人解盤，非常精確詳細。很喜歡您的見解風格。小弟非常敬佩您！有在知識 + 發問過，但是無緣得到您的福份與指點，所以小弟厚著臉皮，不請自來，特地請求了然山人大師能夠幫忙小弟指點迷津！


    小弟出生於，甲寅年潤四月初三日卯時呈祥，初中畢業，至今仍然一事無成，內心萬般懊悔，目前面臨失業危機！買大樂透又頻頻貢龜連連，無顏回鄉見江東父老@ @。


    前途茫茫！都年過三十有五了，不想再蹉跎光陰了，想全力一博自己（創業），也不知道該做哪一類比較好，不知那一途得宜本命？


    懇請了然山人大師幫忙小弟解惑命盤並指點明燈。


    功德無量！闔家平安！


    ## 【回覆內容】


    甲寅年，是民國 63 年吧，那就先用 63 年男性幫你看看，

    至於大禮只要做 3 件善事就算是給我的大禮了。


    命造農曆 63 年閏 4 月 3 日卯時建生


    (但是因爲 63 年有實施日光節約時間，應該要往前調 1

    小時。所以可能要知道你的卯時的確實時間是幾點，卯時是指

    上午 5～7 時，所以還是要知道你如果是 5 時或是 7 時出生的，

    如果是 5 時那時辰往前調 1 小時的話，就變成寅時了。不過還

    是先用卯時幫你看看，如果是上午 5 時出生的話，那結果就會

    完全不一樣了。)


    如果以卯時這個盤來看的話，你的本命宮無正曜，借對宮

    太陽巨門來論，基本上命無正曜的人，比較容易隨波逐流，也

    比較容易飄浪。加上你的命身宮都被空劫給拱掉了，所以人生

    的路走來會比一般人來的波折起伏，也滿辛苦的，加油歐。


    而且看來你沒有偏財運，加上本命宮逢空劫來拱，又祿存

    坐命，形成所謂的「倒祿」格局，建議你千萬不要去嚐試買樂

    透或賭博。因爲此格局真的很破財。


    有的人有偏財運，但有的人沒有，而且這個格局看來，連

    正財都會很辛苦，因爲你很難留住財，經常都是左手來右手去。


    所以山人良心的建議你不宜創業，在職場上發展會比較

    好。而且沒錯的話，明年流年命宮十分不好，恐將會有大破財

    的情況。


    如果目前暫時找不到工作的話，建議你可以去職訓局學習專業技能。政府還有補助呢，以你的能力，倘能在專業技能方面發展會有很好的結果。而且今年你的流年命宮見昌曲魁鉞等文星拱照，考運不錯，可以去考一些專門的證照，難得今年流年利於考試，要好好把握。


    沒錯的話你的感情路上應該也是一直遇不對人吧，滿挫折的。又祿存爲財貨之意，祿存坐命，表示你對於錢財相當重視，可以說是小氣財神，但可惜祿存必遭羊陀雙煞夾制，加上命無正曜借對宮太陽巨門來論，而甲年剛好又是太陽化忌，所以除瞭被空劫拱之外，更形成「羊陀夾忌」之局。特別提醒你，明年流年正值你本命宮，所以會非常辛苦。


    不過你的優點也還不少，你的人緣好、口才佳，反應應該也滿機伶的，滿適合從事業務方面的工作，或是其他以口爲業的工作。


    而且你的想像力應該也滿豐富的，適合從事專門技能、研發、規劃、文學創作等，可以讓你想像力充分發揮的地方。但有時後太過於新潮，反被人家感到激進或難以瞭解。我想這點應該會讓你滿困擾的


    沒錯的話你常會感到身邊小人多，口角是非也多。因爲有時候你的言語有時候過於直接，常常會在無意間得罪人，同時也因此造成自己無謂的困擾，這點你確實要好好改進，對你的未來會比較好。


    建議你這段時間可以把自己給歸零，正所謂「行到水窮處，坐看雲起時」，水窮處往往是制高點（因為水往低處流，所以水的源頭必定是在高處）。在這看風景，是最漂亮也最美的。


    雖說這個命盤看來波折勞碌難免，但如果你能夠從自己的個性來做一個徹底的改變，加上多行善事，我想還會有機會扭轉這個盤勢。


    命是天註定的，改不了。但運在自己手上，知命之後，就是要再造自己的命，我想只要努力的朝正確的方向走，你的未來會有改變的機會。


    以下是山人建議你的步驟：


    - 1. 不要賭博、切忌投機：因為偏財運不佳，越投機可能結果會更不好。

    - 2. 不要嘗試創業：因為辛苦，且本命格局並不適宜，加上明後兩年的流年真的不佳，貿然嘗試，只會徒增人生的波折。

    - 3. 去學習專業技能，也可以去學習打坐，讓自己能夠再學習靜與定，修煉自己的心，進而改變自己的個性而扭轉命運。

    - 4. 這點是最重要的，就是多行善事。不一定要捐很多錢，你可以試著每個月小額捐款幾百元給一些慈善團體，如：流浪動物之家，門諾醫院等，持續固定的捐，我相信不出數月，你會慢慢發現自己的運勢變好了。


    山人有很多學生與朋友，就是持續的行善，到現在整個運都轉好了呢！


    還有建議你千萬不要隨便去給外面的老師看，不是山人自私，而是因為你的盤勢確實不是很好，如果給其他居心不良的老師看到，恐怕你可能會破大財，因為一下說要改命，又要改名字等等。加上你本身也是有點迷糊，對你而言最常發生的應該就是：聰明一世、糊塗一時。切記切記！


