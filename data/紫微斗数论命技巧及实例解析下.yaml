    # # 紫微斗數

    論命技巧及實例解析（下冊）


    此局為殺破狼加煞，衝擊性相當強，於事業發展上相當不錯，以山人觀點，建議命主可於事業上衝刺，畢竟此局適合發展事業而不利於男女關係，所以暫時將感情放一邊，等到事業有成，口袋錢多多之時，還怕沒有對象嗎？養隻小狼狗都行呢，對不對。而這不是也是趨吉避凶的方法嗎？


    再從夫妻宮觀之，紫微正坐，表示命主眼光相當高，沒有高富帥等級的男生，我想還很難看的上眼。而陀羅正坐，以晚婚為宜。而火鈴同會夫妻宮，基本上暗示命主易有閃電成婚的狀況，對於七殺坐命的人而言，由於其個性愛恨分明，果斷且速戰速決的本性所致，因此倘發生此狀況，其實並不讓人意外。而火鈴衝夫妻宮，除表示雙方相處多是口不言而內心痛苦折磨，加上陀羅主慢，遲滯，延宕，故命主縱然姻緣早動，也難逃雙方相處不和的問題，以整體看來，其婚姻以晚成為宜。至於晚婚應該到幾時呢，通常山人建議是在32歲之後。至於此盤是否真的沒有姻緣呢？其實不然，如果沒有意外，姻緣應成於34～43這個10年大限，婚期應在36歲前後，因此大限命宮會照天喜，夫妻宮逢鑾喜對拱，又會照本命祿及大限化權化科，三合穩定無煞，且以該大限夫妻宮逢日月昌曲正坐再會輔弼的星群組合看來，對象應該是滿有成就，且家庭背景應當也是相當不錯的呢！這不也反證了命主較適宜晚婚的觀點了嗎？姻緣不會沒有，只是來的比較晚。


    196'
  - '[PAGE 197]


    # # 案例87、感情困擾請老師解惑


    倘命主真要追逐感情，也建議命主將眼光放低一點，因夫妻宮坐天相星，表示配偶多是身邊早已熟識的人，例如同學、同事或是鄰居等，所以可以從身邊的異性去找找，也許會有不錯的結果呢！山人開業論命以來，經常看到許多氣質出眾的「超齡美少女」，人長的漂亮，但卻是單身，情路長期不順，一直埋怨「水人沒水命」。主因在於年輕時條件優異，擇偶條件甚高，到最後，落得一場空，不是當小三，就是孤單終老。因40多歲的男生大概都已成家立業，好對象不容易尋覓。而這些女孩的共同心聲就是「帥哥到最後都是別人的」，看到此處，各位豆蔻年華的女性，能不戒慎之嗎？


