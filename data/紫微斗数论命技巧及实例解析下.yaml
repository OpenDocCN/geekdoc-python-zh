    ## 案例 95、命中缺木，請問如何讓運氣變好？


    **【提問時間】**

    **【提問內容】**

    我知道我命個缺木。請問老師給啥建議會讓運氣比較好？除了多做善事跟念經之外，現在改名叫林 OO 1983.1.29 寅時出生。


    **【回覆內容】**

    其實改名字真的能改變命運嗎？這點山人非常存疑，看你提到念經，我想你應該也是佛教徒，佛陀談的是輪迴與因果，今生的一切，都是因爲前世的修爲而來，種瓜得瓜，種豆得豆。決不是改個名字就可以改變的。如果改個名子就能改變現況，那輪迴與因果也就不存在了，不是嗎？這點希望你能理解。


    姓名學可參考，但決不能太認真。因爲姓名學是這個世紀發明的產物，不像中國命理，歷經數千年演變，所以姓名學老師都會問你的生辰八字，因爲它主要是利用八字或斗數排出命盤，了解你的概況後再評論你的姓名。這是業界公開的秘密。


    > 山人看過你的命盤，你的本命格局還不錯。祿坐命宮，基本上是個小氣財神，也是個很捨得對自己好的人。加上你的命宮出現君臣慶會的大格局，相信你在朋友群中會是個領導者，而且異性緣好，際遇與貴人都多，命宮整體格局非常強勢，相信你在未來會有很好的發展。


    不過你應該會覺得奇怪，為何這段時間好像不是很順。其實並不是你的名字出問題，而是大限問題。正所謂十年河東，十年河西。命盤每 10 年一轉，有好命格，也要有好運勢。以山人經驗，命格強勢者，多屬大雞晚啼型。加上你的福德宮坐武曲貪狼，又落四墓地，正所謂武貪不發少年人，所以你是走老運的，年輕時難免挫折，當作學習經驗了。山人看你這個大限（24-33），空劫會忌，整體而言，這
    10 年的錢財與工作上都滿糟糕的，多多忍耐，當作學習經驗，命理有時終須有，你的命格強勢，會有好結果的，不要想太多歐。下個大限會不錯的。


