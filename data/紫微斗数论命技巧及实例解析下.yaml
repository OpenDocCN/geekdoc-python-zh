    此流年命宮逢鑾喜對照，又逢流年化祿引動，故應有正緣出現才是，我想這應該也是命主困擾的主因，由於太過心軟善良，故與前男友藕斷絲連，但因流年夫妻宮逢天機天梁擎羊會照，又逢大限流年雙化忌引動，整體情況相當兇險，倘非六吉拱照，還真有可能鬧上社會新聞版面呢！故倘真要此斬斷感情糾纏，99
    年會是個很好的機會。只是此點決定權在自己，倘不願勇敢的向過去揮手告別，又怎能期待新生呢？


    山人開業論命多年，有許多登門的熟女同學，年輕時就是與前男友如此拖延，分分合合數次，當有新對象出現，又捨不得舊情人或是遭其苦苦糾纏，不得不放棄新的緣分，與舊情人重修舊好，但除非男方願意改變，否則最後結果定然是再度分開，如此循環不已，因而蹉跎美好年輕歲月。當年華老去之時，好對象更難覓得，最後的結果通常都是孤單終老，這又何苦呢？


    以命主的夫妻宮帶此孤剋格局觀之，此狀況確實相當有可能發生，到時候再來怨嘆「水人沒水命」，又有何用？這不也是自己一手造成的結果嗎？故在面對此問題，怎可不慎呢？正所謂，捨得就是有捨才有得，不捨焉能有得呢？也希望命主能聽進老夫的勸告，做出最好的決定。


    ## 案例 97、紫微可否看出有無功名？何時考運佳？或運勢何時撥雲見朗？


    **【提問時間】**

    **【提問內容】**

    大師您好：

    我 24 歲研究所畢業後，走了幾年好運，工作也沒很認真，但是長官都待我很好，財運也不錯。自民國 97 年起，就開始發生大小倒霉事，工作認真也沒起色，感情也不順遂，生活總覺得煩悶沒目標。一整個胸口鬱悶無法透氣。

    現在我專心準備參加考試，今年前半年專心努力，卻逢考運不佳，總覺考題不難，考完也算有信心，結果卻是大失所望。我不知道問題出在哪？雖然不想歸咎於命運，更不願意以流年不佳解釋一切。但真心不明白，冥冥之中是否有些姻緣已成定局？？？故想在此誠心誠意向您請教，紫微可看出有無功名嗎？或者考運何時較佳呢？或者運勢合時會撥雲見朗？若大師有空，勞煩您爲我解惑。失禮之處，請您見諒。

    生日：69/5/21 23:45（農）


    ### 【回覆內容】


    整體而言您的格局還不差，三方四正不會煞忌，至少外在的環境不會對你產生太大的阻礙，只是身邊總是不缺小人就是了。


    三方形成殺破狼格局，又會火鈴，整體而言此格局適合以武職顯貴，如專技人員等。沒錯的話你應該是屬於比較堅持己見，固執的人。但頗有擔當就是。


    如果說是參加考試，以您的星盤看來，昌曲均落陷，古曰：昌曲弱鄉，林泉冷淡，基本上您的考運並不是很好，準備考試是必須要比人家更努力才有機會。不過考試就是這樣，給你天生好考運，但自己不讀書也是惘然，但請您稍微放寬心，因為您的考運不是很好，尤其是要參加國家考試，基本上要比別人更認真。畢竟考試這東西，八分靠自己，二分才是靠運氣。好好加油。


    以您目前的 10 年大限看來，昌曲拱命身，至少表示您的求學還滿順利的，但因均為落陷情形，所以會辛苦點。至於大限夫妻宮，坐七殺，三方也形成殺破狼局，所以這段時間感情會走的辛苦波折點。所幸會煞不多，所以只是不太順遂，不至於多嚴重就是。這點算是滿慶幸的。至於感情部份，建議你不用擔心太多，因為下個大限看來會有良緣出現，沒錯的話應該在
    34 歲前後會成婚，所以感情部份，順其自然，對的人一定會出現，只是不是現在。


    **至於考試的話，山人是建議你好好努力讀書**，因為以流年看來這幾年的考運真的不是很好，不過考試這東西是看自己，加油。


    **【發問者意見】**

    感謝老師指點。


