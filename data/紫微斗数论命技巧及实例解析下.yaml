    \ | 電話：地址： | 編號:0000000123 | \n\n## 本命盤\n\n命主天梁坐命，而天梁化氣為蔭，是故命主有同情心，性情耿直，能關懷他人，但天梁星在斗數裡扮演監察官的角色，所以原則性相當強，此要倘會照天刑之類孤剋性質的星曜，更是鐵石心腸如包公一般。\n\
