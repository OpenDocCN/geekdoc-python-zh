    # 案例94、為何命理師告訴我這番話？


    男女雙方交往一開始認識憑的是感覺與外表，但過了一段時間之後，就是彼此之間的相處。正所謂相愛容易相處難，相處的時候，如果兩個人都是比較強勢也比較硬底子的個性，相處之間難免會常常發生爭執。而且個性強的人，通常都好面子，也比較不會低頭認錯。


    所以除非一個肯低頭認錯，否則當兩個強勢個性的人一起鬧起彆扭。很可能分手的結果就隨之而來，就像石頭碰上石頭，結果往往是兩敗俱傷。


    通常婚姻或男女關係，需要以互補為基礎，女生脾氣不好，男生脾氣好，或者相反都可以走的長久。當然如果願意為對方改變自己的個性，主動低頭的話，那是更好的。所以如果你與對方都不願意改變自己的個性去適應對方，那這段感情一定會走的很辛苦。所以我想命理老師要表達的意思應該就是這樣。


    除非願意因為喜歡這個女生而改變自己原本強勢的個性來配合他，否則應該要去找一個屬於賢妻良母型的女生，夫唱婦隨那種，那應該就可以很圓滿。最後一句話的意思，應該就是，你與這個女生交往如果過了3～4年還能再繼續相處，應該就會有圓滿的結局，因為妳們已經找到最好的相處模式了。原因是，如果兩個強勢個性的人能相處4年以上，那必定有一方已經改變，願意為愛去改變自己，那當然結果是圓滿。希望這樣解釋能讓你清楚命理老師的本意。'
