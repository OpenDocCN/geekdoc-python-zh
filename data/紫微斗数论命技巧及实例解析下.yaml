    ## 本命盤


    此盤祿存與地劫坐命，加會地空，形成山人常說的「倒祿」格局，加上本宮無正曜可平衡，故此局人，一生都會過的相當辛苦勞碌且難有所成。原因很簡單，祿存表示財貨，而地空地劫是盜匪星曜，財遇盜匪，自然轉手成空。而命無正曜，好像家裡沒大人一般，自然容易受到外在環境影響而隨波逐流。所以其偏財運不佳，也是意料中呀。


    而地劫坐命加會地空，其人通常自我意識相當高，勇於創及敢與眾不同，想像力豐富，但相對而言，讓人難以理解，也經常因爲這種個性，而導致人生的挫敗。這也就是古人評價地劫坐命者疏狂。但山人常說，煞星雖然帶來不好的影響，但倘能將此缺點轉化成優點，倒也是件好事。以地空地劫爲例，此兩曜星性雖然不佳，但其豐富的想像力與勇於創新的想法，卻是其他正曜所沒有的優點。而什麼行業需要這種特質，例如：文創業，發明家，專門技術人員，研發等。倘能將此缺點轉化成優點，加上勤加修心，例如學習打坐，氣功，參禪等，讓此兩曜對自身的影響降到最低，自然會有很大的改變。


    - 回到正題吧，命無正曜，借對宮太陽巨門論之，巨門爲暗曜，此暗並非黯淡無光，而是過度明亮，掩蓋住其他星曜的光芒。所以這顆星曜最適宜見到太陽，因能平衡其本性，而巨門表示口舌，因此太陽巨門組合，相當適合以口爲業的工作，例如：業務員，講師，教授，律師等。

    - 以此盤整體論之，較適宜在職場上發展，且應該朝向專業人員方面去走，所以建議命主參加職訓局提供之訓練課程，正所謂，一技在身，勝過家財萬貫。且以命主的創新與充滿想像力的特質，在此類行業發展，定能有相當成就。而命主問命當年爲民國
    98 年（己丑年），隔年（庚寅年）流年走回本命宮，星曜組合相當差，加上庚年天同化忌會照流年命宮，初判應該也是相當辛苦的一年。而本命不宜創業，加上流年亦不利於己，此時驟然出征，只怕是徒留遺憾罷了。


    ## 案例 63、事業老是不順，請大師用紫微斗數指點


    **【提問時間】** 2009-07-23 12:32:04

    **【提問內容】**

    本人（女）是農曆 74 年 02 月 03 日中午 12 點出生，想請問要往哪方向發展、該如何賺大錢。謝謝！


    **【回覆內容】**

    如果就你的命盤看來的話，建議你還是在職場上發展會比較好。可以向專業技術或企劃規劃這方面來走。賺大錢的話，可能要先改改你的個性。沒錯的話你是一個頗爲固執，堅持己見的人。喜歡享受，也滿愛亂花錢的吧，而且你的本性帶點糊塗、散仙。這些缺點都要改進，才有機會能賺大錢呢！


    雙祿在命宮交流，本來應該是屬於財來不愁的，可惜空劫同時入命，再加上對宮太陰化忌會照，造成祿忌交馳的情況。雖見輔弼來拱，但卻難避免損失的發生，尤其是不善於理財這一點，正所謂，只有你善於理財，財才會理妳呀，不是嗎？


    所以建議你，在個性上缺陷還沒辦法改善前，最好不要嘗試創業，因為創業雖然說有賺大錢的機會。但是也有賠大錢的可能，以你命宮星曜組合看來，可能是屬於後者的機率比較高。


    不過你倒是想像力滿豐富的，雖然想法有時過於特立獨行，有點跳躍式思考。不過倒滿適合從事發明、研發、或專業技能的工作。相信有很多你可以發揮的空間。如果能有創新的發明，就像發明「好神拖」的人一樣，也是賺大錢的方法，對不對呢？


    至於今年不順的話，以流年看來煞忌交馳又逢空劫來拱，不順是必然的。建議你今年一切以保守爲宜。


