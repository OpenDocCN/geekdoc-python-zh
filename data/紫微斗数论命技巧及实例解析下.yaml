  md: '# # 自序

    # 自序


    常言道：紫微斗數易學難精，許多斗數學者學到一定程度時，由於缺少實戰經驗而苦於無法升級，加上市面上相當缺乏此類型書籍。回想十年前開始學習斗數時，便面臨此困境。有感於此，山人自民國
    101 年起便著手整理這幾年來的相關稀奇古怪的案例，希望能以此實例分析系列書籍來分享更多同好，提升自己的經驗與功力，不但能爲自己也能爲身邊朋友指點迷津，迎向新生。


