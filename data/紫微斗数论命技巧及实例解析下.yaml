  md: '# # 紫微斗數

    論命技巧及實例解析（下冊）


    沒錯的話你的個性頗為主觀，也比較會堅持己見，固執。有時候給人感到有點霸氣，命宮主星為武曲貪狼，古曰：武貪不發少年人，而且舉凡命格強勢的大都走中老年運，以你的大限走勢看來確實也是如此。武貪坐命的人，如果年輕發財，老來必定無靠。原因很簡單，武曲爲財星，貪狼表示物慾，當此兩星相會時發生的加乘效果。對於金錢的執著比常人還堅持，手段自然會頗爲激烈。所以只有當中老年時候能把這個性給收斂起來之後，方可有成就的機會。而年輕時年少氣盛，自然容易陷入困境。


    做財務工作確實很適合你，因爲你是天生的財務精算及規畫人才。加上雙祿會命宮，以此局來論，只要不投機，不貪求。金錢對你而言是不虞匱乏的。如果以你的理財來看，有時會過於偏向投機，雖說經常都是好的結果，但終究並非正途呀。


    你的本命宮也帶有標準的公門格局，沒錯的話你出門在外或多有貴人提攜扶持及良好的機遇，而且你本身應該也很有才華。所以如果真的找不到合適的工作，不妨往這方向去嘗試。我想以你的格局，努力點應該會很有希望的。


    24～33 歲這段時間，我想是你很辛苦的時候，總感到四處奔忙，卻毫無所獲。而這個大限看起來也差不多，苦在壓力與競爭，還有謀事不順的困境。不過既然走的是中老年運，所以年輕時的挫折，就當作磨練吧！'
