    \ | | | |\n| 電話：<br>地址： | | | | | | | |\n\n## 本命盤\n\n命主格局相當漂亮，紫微坐命會輔弼，形成君臣慶會大局，古曰：才善經邦，表示命主工作能力強，在團體中都是領導者，也都能得到部屬及朋友的擁戴支持而成就。又祿權科三奇佳會，學習能力相當強，在任何行業很輕易就能夠出類拔萃，而此局人家境通常都是相當不錯才是。\n\
    \n以此格局而言，應能在各領域中得到一定的成就與地位。\n\n且又逢天魁天鉞對拱，相信命主應該也是相當聰明有才華的，\n\n## 紫微斗數\n論命技巧及實例解析（下冊）\n\
    \n且此局又可稱為公門格局，故從事公職，也會是相當適宜的。\n\n另命宮三方會照又陀羅及擎羊，此兩煞星帶來的是挫折與不順利，但在大格局的支撐下，雖然外在環境不佳，但卻是關關難過，關關過。並非大格局能抵消煞曜影響，除非是成為斗數奇格如：鈴貪，火貪這類，這點必須要特別強調。而命主本身空劫會命，個性略帶點迷糊散仙，但由於格局夠強，因此想要詐騙他，我想還是很困難的呢！充其量也只是較無理財觀念罷了。\n\
    \n通常紫微坐命又成局者，主觀意識都相當強，且絕大多數不願意屈居籬下。但因空劫影響，所以經常待人處世上，會給人家滿不講理的感覺，而且也經常發生誤判形勢的狀況，我想這也就是命主在工作上會不穩定的原因，並非工作不適合，而是因為自己誤判形勢及太過急於想要做主的個性而敗事。以此格局看來，我想老闆對命主的工作能力及才華，應該都是評價很高的呢，只能說是小廟容不了大和尚了。終歸起來，問題都出在自己身上呀，這也就是此些煞曜帶來的影響。\n\
    \n故命主倘能練習修心，如打坐，瑜珈等，讓空劫對自己的影響減少，以此格局而言，定然會有相當成就才是。倘不願意改變自己，只怕這種一年換 365 個老闆的狀況，會層出不窮，也不容易有穩定的時候。正所謂命由性生，其意便在此阿。希望命主能真正改善自己個性缺陷，不要白白浪費此難得一見的大格局呀！\n\
    \n## 案例 73、請幫忙分析整體命格與運勢\n\n**【提問時間】** 2009-08-15 17:28:38\n\n**【提問內容】**\n請問女生國曆\
    \ 64 年 8 月 14 日早上 5 點生的人命盤與紫微斗數如何？\n例如婚姻、事業，往什麼方向做哪一行，財運，子女等越詳細越好謝謝！\n\n**【回覆內容】**\n\
    民國 64 年實施日光節約時間，所以出生時間應該向前調 1 小時，所以山人用寅時幫你看看。\n\n命造國曆 64 年 8 月 14 日寅時瑞生\n\n本命宮天梁正坐，表示你是一個喜歡照顧他人，對人有同情心也富有正義感的人。但原則性過強，且喜歡依據自己的原則來判斷是非，也因此總是帶點千山我獨行的孤傲，個性頗爲好勝。而天梁加會天馬，又爲梁馬飄盪格局，很難有穩定的時候。\n\
    \n本命宮見祿忌交馳，表示人生的路上多波折起伏，勞碌難得享受，本命宮格局亦形成機月同梁格，正所謂機月同梁當吏人，意即你比較適合從事穩定的工作。如內勤或文書工作，變動性過大的工作不是很適合你，如業務或企劃類。建議你可以從事社會服務、法官、醫師或內勤行政等相關工作發展，會是相當適宜的呢！\n\
    \n財運部分，財宮見祿忌交馳，錢財得中有失，且波動較大。財庫雖逢對宮祿存會照，但逢空劫雙煞來襲，因此可以庫破來論。故整體而言，金錢及財運部份，大都是來來去去空歡喜，所以你要比其他人更注意自己的金錢管理。身體方面，多注意婦科方面及胃的疾病。\n\
    \n### 【發問者意見】\n\n無。\n\n## 案例 73、請幫忙分析整體命格與運勢\n\n### 【命盤解析及內容說明】\n\n| 三破孤蜚天台碎廉辰祖△\
