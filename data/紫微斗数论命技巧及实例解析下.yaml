    ### 本命盤


    命主太陰坐命，故應屬於氣質型的漂亮女孩。在斗數裡，太陽是男性的表徵，而太陰就是女性表徵，所以女命坐太陰，絕對是適宜的呢！而太陰坐命者，心思細膩，想像力及感情豐富，善解人意等優點。以此例而言，由於三方四正同時會照斗數四煞：擎羊、陀羅、地空、地劫。除表示外在環境對命主相當不利之外，也劣化了太陰星優良的本質。


    例如原本想像力豐富，但因空劫會照，反倒形成鑽牛角尖，胡思亂想。而善解人意的優點，亦會轉化成暴躁易怒，讓人難以理解與相處。而命宮天機天梁擎羊會的孤剋組合，更是證明了此論點。因此命主會提出目前的疑惑及困擾問題，實在不讓人意外。


    基本上而言，學校剛畢業，工作經驗不足，找工作本身就較為吃虧，加上台灣景氣長期不佳，年輕人待業往往需要超過半年以上。所以應該趁此時間，積極的學習專業技能，增加職場競爭力才是，而非消極的在那兒胡思亂想，這樣真會悶出病來的呢！


    至於命主適合哪類型的工作呢？由於命宮三方四正組合爲著名的「機月同梁」格局，基本上此局人較適合單調的工作，也因爲穩定性足夠，所以往往是大企業最喜歡的人格特質呢！加上太陽會照，其個性應該也是頗爲外向開朗，而且長的有氣質又漂亮，所以相當適合如：秘書、行政內勤、客服人員、公關等類型的工作，應該會相當適性的呢！所以建議命主再這段時間可以一邊找工作，同時參加一些專業技能訓練課程，例如語文課程、電腦文書處理等技能，增加競爭力。我想應該是能夠離開目前困境的狀況。且工作適性發展，對命主而言，會是很棒的第一步呢！


    人生就像在海上航行，一定要有方向與目標，專心一致前進，自然會到達目的地。若否，就是真的隨波逐流了，四處漂泊。這也是命理可以對人們有幫助之著力點，就是在這個人生的十字路口，幫助命主撥雲見日，找到最適性適所的方向，勇敢大步前進，相信在命理協助之下，一定會有好結果的。


    ## 案例 81、想問此人的財務狀況與工作運途


    **【提問時間】** 2009-08-29 23:06:39

    **【提問內容】**

    論命：男，農曆民國48年3月3日巳時生

    想問此人：

    1. 財務狀況與工作運途，是屬於投機事業亦或苦幹實幹亦或上班族？

    2. 在哪幾年是大發大落，或陷於經濟困境，或有財務糾紛等？

    3. 出外朋友大都為哪些類型，是否對此人真有所幫忙，或純粹互相利用等？

    4. 健康方面應該注意些什麼？與妻小孩子相處情況如何？


    **2009-08-30 03:12:40 補充：**

    To 了然山人：此命盤主人從小家境不好，二十幾歲的時候進入公職服務，認識另一半結婚，白天是公務員，晚上從事娛樂事業。這種一天睡不到幾個小時的日子過了十幾年，將近二十年有。如你所說，這個主人很不喜歡公務員生活，所以晚上的娛樂事業才是他最開心最有精神的時候。因爲是他自己當老闆經營的，也因此他很少跟子女碰面甚至是講話。26～35
    確實走的很辛苦，因為卸下白天公務員身分後又馬上出門當老闆他的老婆是個對於家事很能幹，小孩一手照顧，多煩惱又身體不太好的配偶，他們口角滿嚴重。但是因爲從小家境不好，再加上從事娛樂事業，當上老闆經營有成賺了不少錢，野心和膽子愈來愈大。結果遭到朋友不良誘惑轉而經營投機事業，結果身敗名裂，現在日子過的非常不好。以前晚上經營娛樂事業的時候常常會喝酒應酬，現在在家會藉酒消愁，所以胃確實不好。


    **2009-09-02 00:32:32 補充：**

    那晚年運勢大概如何，想請問如果現在經營小本生意（吃的方面）會賺嗎？我說的是至少能有點小賺，能衣食無虞就好，不求大富，只求安飽。因爲這個命盤的主人目前經濟狀況很差，或者是繼續投機或娛樂事業？


    ### 【回覆內容】


    由於民國 48 年實施日光節約時間，時間應該要向前調 1 小時，所以還是需要實際的出生時間方可確實的排盤。不過還是先幫你用已時來看看。你的問題，還是分項回答：


    1. **投機事業**，看不出來，苦幹實幹，有一點。但紫殺化權，加上本命宮祿權巡逢，又紫微天府雙主星坐命。但逢羊陀雙煞，在逢文昌單入，給人家感到有點言過其實。雙主星坐命，本來就有點好大喜功的心態。綜上所述，我想上班族的生活對妳是不適合的，因你也不喜歡久居人下。沒錯的話這是個老闆格局。

    2. **哪幾年大起大落**，26～35歲這個大限走的很辛苦，36歲之後逐漸轉好。

    3. **朋友**，交遊頗為廣闊，朋友多為專業人才或精於某一種學術或技術者，各階級及各方面的朋友都有。朋友之間是你的貴人所在，但彼此信任度不佳，如果是老闆的話，公司部屬流動性較大。如果是上班族的話就是常常自己換老闆。

    4. **健康方面**，必須注意胃部方面的疾病。

    5. **姻緣與子女**，以星盤看來，你的姻緣動的很早，沒錯的話在25歲前就已經結婚了。大概在23歲左右，老婆聰明賢淑，持家有方，多才多藝，但時常有口舌不和，或多病多憂的情況。而子女活潑好動，個性外向，頗為聰明，口才不錯，滿會說話的。好的時候嘴巴甜，壞的時候愛頂嘴。與子女的代溝頗深，與子女相處機會不多或少見面。


