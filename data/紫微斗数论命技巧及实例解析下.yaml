    偶爾把自己的條件稍微放低一點，有時候看起來蠢蠢或普通的男生，才是當老公的最佳人選。山人閱人無數，有許多的熟女師姐，都很有氣質，也很漂亮，無奈淪落到40多歲都還單身，看來大姊頭是當定了。她們最常跟山人說的一句話就是：帥哥到最後都是別人的。因此而蹉跎耽誤了花樣青春年華，發現時往往悔之已晚，但又奈何？帥哥本身就比較花心，因為條件好，追求到最後，有個故事是這樣說的，一個女孩在海邊撿貝殼，一心只想撿到一顆最棒的貝殼，一路上走呀走，沿路看到很多貝殼，但因爲一直想著下一個會更好，路到底了，手上卻一顆也沒有，清楚嗎？


    所以你還年輕，試著把自己的條件給寬鬆一點，適時的表現自己女人的那一面。女生嗎，本來就不要太ㄍ一ㄥ，柔弱一點，會讓男生更生憐惜之心，自然會有好桃花出現。太強勢或太堅強的話，反而會讓男生不敢靠近，因而錯失機會。再度提醒你，帥哥或條件好的男生，常常都是毒藥，自己要多觀察。

    這個大限夫妻宮看來很辛苦，注意爲上，尤其是明年。


