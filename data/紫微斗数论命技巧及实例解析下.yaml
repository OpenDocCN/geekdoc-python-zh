- md: "## # 紫微斗數論命技巧及實例解析（下冊）\n\n也不容易有好的機會。倘命主早些遇到山人，山人應該會建議命主待在原工作崗位上，而非輕率的跳槽呀，這不也點出命主在個性上過於衝動及欠缺思考的問題了嗎？而以流年看來，99年流年命宮空劫對拱，本有勞而無獲的味道，又逢天機天梁擎羊會且又流年天同化忌引動，會是相當辛苦落寞的一年。100\
    \ 年官祿宮又是科忌交馳，整體觀之，應該要到民國 102 年後在職場上的發展才會轉好，所以升遷問題，我想這幾年應該是免了，倒是趁此機會好好修身養性，把煞星對自己的影響程度降到最低，同時累積更多的經驗與專業知識，才能在下次機會再度降臨時，好好把握。\n\
    \n## # 案例86、算命老師說31歲之前有個死劫，嚇死人了！\n\n**【提問時間】** 2009-09-07 21:34:51  \n**【提問內容】**\n\
    我哥哥1981.12.05未時出生，他不知道在哪裡算到說31歲之前有個死劫，嚇死人了！還有什麼空劫夾命的？？可以幫忙解析一下嗎？謝謝！\n\n**【回覆內容】**\n\
    死劫，真可怕的說法，放寬心，不要想太多。以科學的觀念來看，命理是由出生年月日時所組合而成的，所以共盤的機率很高，以台灣2000萬人為例，共盤的除了你之外，還有76人呢！\n\
    \n如果真有死劫的話，那麼共盤的76人都會再同一年同一時間死亡嗎？無稽之談，命理就是太多宿命論式的論法，才會到現在還被視為迷信。不過容易發生意外事故倒是真的，只是罪不致死。\n\
    \n共盤的問題在山人的部落格有專文敘述，限於篇幅沒辦法完全寫出，有興趣可以至山人部落格看看。\n\n空劫夾命，意思就是命被空劫雙煞給挾持，通常表示的意思是人生的路程比較容易失去機遇，例如本命宮逢紫微七殺，紫殺化權，但逢空劫夾置，便形成是權力必須受制於人的組合。空劫夾命，其實普通可怕。如本命宮化忌，形成空劫夾忌，那才真可怕。古曰：空劫夾命爲乞，此乞並非乞丐。而是人生走勢諸多不順，空劫雙煞爲土匪之意，倘人被惡煞左右挾持，自然不容易有順利的時候，也因此古人形容爲乞。\n\
    \n回到你的問題，倘以國曆生日來看的話，根本沒有死劫這回事。無論就大限或流年看來都是如此，31 歲那年文昌化忌入命，文昌化忌頂多是財務損失，安心吧！這只是江湖術士在唬人的罷了。連空劫夾命這種尋常的格局都說成這樣恐怖，其他真不敢想像呢！放寬心，不要想太多，倒是\
    \ 31 歲那年倘參加國家考試，也許還有可能金榜題名呢！況且以流年看來，三方四正不逢煞侵，雖說會照化忌，但整體而言不構成太恐怖的格局，所以不要想太多。\n\n\
    ## # 【發問者意見】\n很有幫助，謝謝！\n\n## # 案例86、算命老師說31歲之前有個死劫，嚇死人了！\n\n### # 【命盤解析及內容說明】\n\
    \n![](img/28f3dd112e79ba7e3ec565caf64b7b7d_187_0.png)\n\n## # 本命盤\n命理真的能論斷生死嗎？答案絕對是否定的，其道理很簡單，命理的統計單位是人的出生年月日時，那相同時辰出生的人有多少？這是個很簡單的計算，列式如下：\n\
    \n60（1甲子）*12（月）*30（天）*12（時辰）=259,200\n\n倘若以台灣2000萬人計算，則共盤的人有\n20,000,000/259,200=77\n\
    \n意思就是扣除命主1人，尚有76人是共用同一個盤的。那倘真有死劫這種事情，豈非另外那 76 人都會在同一時間，因為同一個原因，一起魂歸西天嗎？套用一句台灣的流行用語：這不是荒謬，那什麼才是荒謬呢？再者，倘若用中國\
    \ 12 億人口計算，那共盤人數更是驚人。所以這種濃濃宿命論的說法，就是導致中國命理迄今仍被視為迷信的主因。因經不起科學辯證呀。許多老師誑稱能推算出死期，經過山人以科學方式驗證，完全的破解此妄言。再怎樣說，命理終究是世間法，有他的極限存在，並非任何事都能夠推論的，簡單的說，凡是自由意志可以決定的事情，通通應該歸類到不可推算的範疇才是。\n\
    \n至於死期是否真的可以推算呢？確實是可以的，但並非使用命理這門技巧，而是類似佛祖的六神通或其他出世法，才有可能做到，但通於此術的老師，多為方外之人。佛祖又嚴禁弟子顯現神通力，故縱使精於此法，又怎會冒著破壞因果及戒律的風險，只爲賺你區區數千元的代價來爲您論斷呢？所以日後讀者在遇到號稱能用八字、紫微或其他命理術數斷死期的命理老師，大可將它視為江湖術士，不聽也罷。\n\
    \n山人論命以來，經常遇到此類型問題，中國術數倘在如此宿命論，永遠都會被視為迷信，又怎能向西洋 12 星座一樣，讓普羅大眾接受的時候呢！這也是山人多年來的感慨呀。只是此傳統觀念就像老太婆的棉被，蓋之有年也。這也是一種無奈與感慨呀！\n\
    \n回到問題原點吧，山人常說，論斷重大意外時，首先需檢視星曜組成是否構成所謂的惡局，如鈴昌陀武、巨火羊、殺拱廉貞等，同時需注意命、身及福德宮強弱問題。倘本命宮命身及福德宮無主星且會空曜，則確實發生重大意外的機率會是比較高。此例命宮三方不構成惡局，且命宮有主星，福德宮與身宮雖無主星，但也不會空曜，田宅宮亦不空，怎會有太大的意外發生呢？所以跟命主說死劫的這位老師，連最基本的三強理論都搞不清楚，難怪會把空劫夾命這種星盤必然出現的組合說的這麼嚴重，真是無言以對呀。而31歲那年怎會被斷為死劫呢？咱們就轉進31歲那年的流年盤來看分明吧！"
