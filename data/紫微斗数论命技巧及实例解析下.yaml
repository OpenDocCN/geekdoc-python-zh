    # ## 本命盤


    古曰：武曲加煞為寡宿，故女命不宜坐武曲，主因在於此曜本性過於剛毅，個性愛恨分明，倘會煞忌，更是強化此特性，因此武曲加煞之女性，感情路上通常非常辛苦。此點可從夫妻宮星曜組合得到反證，夫妻宮逢空劫會照，是故夫妻相處間應是聚少離多或是貌合神離的狀況，且與欣賞的異性多是有緣無份，而天馬解神（年解）這組離婚的組合亦出現於此，故倘逢大限或流年化忌引動之時，離婚的機率相當高。所以如何修煉


