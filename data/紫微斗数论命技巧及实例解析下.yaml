    ## 案例 94、為何命理師告訴我這番話？


    **【提問時間】** 2009-08-24 21:23:16

    **【提問內容】**

    我今年 21 歲，我女友本人沒到，但是他一看到我女友名字和命盤，他說我們兩個人個性都很強，就說我女友是個獨立自強和能力很好以及個性很強的女強人。他說現在他是喜歡我的外表，往後結婚就不是了。他還說叫我努力學個技術三年會有成績，他意思就好像是講將來我女友是怎樣，很能幹，我也忘記，他說別想說他會再家幫你顧小孩，沒叫我顧就不錯了，他說就看你要選擇一個賢妻良母型還是女強人型。還跟我說淡淡交往就好。他說這種要以娶老婆為目標不鼓勵。

    他說現在不分，等過個三四年還是分，他說如果到那時候我還是繼續在跟我現在這個女友交往，那恭喜，就圓滿。我真的不太懂這意思，這位命理師大家好像都說很準。


    **【回覆內容】**

    仔細閱讀了您的內容，我想你女朋友的命盤應該算是女強人格局，偏偏你也是個性比較強硬的人。所以結果可能是不好的。


    男女雙方交往一開始認識憑的是感覺與外表，但過了一段時間之後，就是彼此之間的相處。正所謂相愛容易相處難，相處的時候，如果兩個人都是比較強勢也比較硬底子的個性，相處之間難免會常常發生爭執。而且個性強的人，通常都好面子，也比較不會低頭認錯。


    所以除非一個肯低頭認錯，否則當兩個強勢個性的人一起鬧起彆扭。很可能分手的結果就隨之而來，就像石頭碰上石頭，結果往往是兩敗俱傷。


    通常婚姻或男女關係，需要以互補為基礎，女生脾氣不好，男生脾氣好，或者相反都可以走的長久。當然如果願意為對方改變自己的個性，主動低頭的話，那是更好的。所以如果你與對方都不願意改變自己的個性去適應對方，那這段感情一定會走的很辛苦。所以我想命理老師要表達的意思應該就是這樣。


    除非願意因為喜歡這個女生而改變自己原本強勢的個性來配合他，否則應該要去找一個屬於賢妻良母型的女生，夫唱婦隨那種，那應該就可以很圓滿。最後一句話的意思，應該就是，你與這個女生交往如果過了
    3～4 年還能再繼續相處，應該就會有圓滿的結局，因為妳們已經找到最好的相處模式了。原因是，如果兩個強勢個性的人能相處 4 年以上，那必定有一方已經改變，願意為愛去改變自己，那當然結果是圓滿。希望這樣解釋能讓你清楚命理老師的本意。


    況且你現在還年輕，應該以學業爲主，未來的社會，沒有好的學歷或一技之長，很容易被社會淘汰，尤其你的女友如果是女強人命格，那他未來的發展如果比你還好，那你能夠欣然接受嗎？所以站在山人的立場，你應該要更努力的去學習或讀書，這樣才能與女強人的女朋友或老婆，互相勉勵成長。


    2009-08-24 22:08:42 補充：


    當然，如果你願意當個家庭主夫也不錯，不過女強人通常都很強勢，要多忍讓了。其實如果你能夠調適自己的話，其實當個家庭主夫也不賴呢，至少不會錯過小孩的成長。


    我想那個算命老師說的應該也與山人一樣，因爲如果你女朋友是屬於女強人的命格，倘你打算與他相處下去甚至結髮一輩子的時候，你要更努力的讀書，與學習一技之長，讓自己也很優秀，這樣才可以與女強人的女朋友或是老婆相匹配，所以你自己要更努力。


