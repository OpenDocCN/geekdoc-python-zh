    能，且與配偶相處之間，大概也是口不言而內心痛苦折磨。


    此局有兩個可惜之處，其一是少了文昌星，其命宮倘再會

    照此曜，便形成「陽梁昌祿」奇局。其二是命宮逢地空地劫拱

    照，為浪裡行舟，因此而增添了人生的波折與不順心。而此兩

    曜帶來的影響經常是因想法過於偏執且聽不下他人勸告，故經

    常遭到失敗的苦果。山人常說，倘命逢空劫，應勤加修心，想

    辦法把此兩曜的影響減少，畢竟此兩曜帶來的影響，是可以靠

    自己的努力改變的。但羊陀火鈴此四煞的影響，就是難以靠自己

    改變。因此空劫入命者，尚有可為也。且此曜的想像力及創

    新能力是超越正常人的，所以適合從事研發、創作、規劃、企

    劃等，善用其天馬行空的想像力及勇於創新的優點，我想激發

    出來的成果，會相當不錯的呢！


