  md: '# # 紫微斗數

    論命技巧及實例解析（下冊）


    那倘真有死劫這種事情，豈非另外那 76 人都會在同一時間，因為同一個原因，一起魂歸西天嗎？套用一句台灣的流行用語：這不是荒謬，那什麼才是荒謬呢？再者，倘若用中國
    12 億人口計算，那共盤人數更是驚人。所以這種濃濃宿命論的說法，就是導致中國命理迄今仍被視為迷信的主因。因經不起科學辯證呀。許多老師誑稱能推算出死期，經過山人以科學方式驗證，完全的破解此妄言。再怎樣說，命理終究是世間法，有他的極限存在，並非任何事都能夠推論的，簡單的說，凡是自由意志可以決定的事情，通通應該歸類到不可推算的範疇才是。


    至於死期是否真的可以推算呢？確實是可以的，但並非使用命理這門技巧，而是類似佛祖的六神通或其他出世法，才有可能做到，但通於此術的老師，多為方外之人。佛祖又嚴禁弟子顯現神通力，故縱使精於此法，又怎會冒著破壞因果及戒律的風險，只爲賺你區區數千元的代價來爲您論斷呢？所以日後讀者在遇到號稱能用八字、紫微或其他命理術數斷死期的命理老師，大可將它視為江湖術士，不聽也罷。


    山人論命以來，經常遇到此類型問題，中國術數倘在如此宿命論，永遠都會被視為迷信，又怎能向西洋 12 星座一樣，讓普羅大眾接受的時候呢！這也是山人多年來的感慨呀。只是此傳統觀念就像老太婆的棉被，蓋之有年也。這也是一種無奈與感慨呀！'
