    ## 【命盤解析及內容說明】


    ![img/28f3dd112e79ba7e3ec565caf64b7b7d_72_0.png](img/28f3dd112e79ba7e3ec565caf64b7b7d_72_0.png)


    ### 本命盤


    貪狼居子，謂之泛水桃花，表示桃花運相當旺盛，但是好桃花或是爛桃花，就要看本宮及三方四正會合星曜而定。以本例而言，三方會照地空、地劫、火星、鈴星及陀羅，最糟糕的就是陀羅這顆星，因陀羅化氣爲忌，正所謂：忌遇貪狼，謂之風流杖彩，多因桃花或風流韻事而惹上麻煩或官非，此局便是如此，加上天姚這顆野桃花星會命，爲紅艶煞的情況，我想命主桃花定然不缺，但大都屬於爛桃花類型，無怪乎如此煩惱。


    真是辛苦了。


    而命主身居夫妻宮，想來對於男女及家庭關係相當重視，卻老是遇到濫桃花，也是相當的無奈呀。此點可從其夫妻宮星宿組合得到反證，三方會照四煞，最要不得的就是地空地劫兩煞曜，到手也成空，是故命主對於心儀的對象大都有緣無份，勉強交往則難逃同床異夢及聚少離多的情況。倒是爛桃花不少，喜歡的人不喜歡自己，不喜歡的人卻黏的緊緊，況且倘遇流年化忌或星宿組合不佳時，這些爛桃花甚至會導致桃花劫的結果，所以命主以晚婚爲宜呀。


    由於命宮會煞過多，表示外在環境相當不利於自己，而空劫入命，又可稱爲勞碌命，想來命主無論在感情或事業上，應該一路上都很波折才是。不過沒關係，以大限看來，因大限逆行（註：順行那可就糟糕了），因此命主不至於屬於那種會孤單終老的人，以大限盤勢推估，姻緣應該成於
    34～43 這個大限，正好呼應了山人晚婚的觀點呀。其大限盤如下；


    ### 34～43 本命大限盤


    在此大限中，鑾喜會照入命，又逢大限祿權引動，想來這個大限必有姻緣可成才是。而其夫妻宮逢日月拱照且加會輔弼及魁鉞，因此對象想必在社會上有一定的地位，而且能得到配偶的助力與光環呢！加上大限夫妻宮會照天喜逢大限巨門化祿引動，三方穩定無煞，此段時間定然有好消息傳出呢，且應該是可得配貴夫才是。從整體盤勢看來，此姻緣研判應該是由長輩介紹媒合的對象。其實這樣也好，因為命主倘自由戀愛，以此盤勢推估，遇到的對象都不會太好。所以這段時間的失落，就當作歷練人生吧，真的不需要太擔心。


    倒是命主由於空劫入命，三方會煞，故脾氣應當不佳且較為急躁，有點過於偏執疏狂的感覺，故當務之急，是先鍛鍊自己的心性，把煞曜對自己的影響減到最低，這樣當好姻緣來到時，才不會又因自己的個性而讓好對象退避三舍，這就不妙了。


    因此山人回覆時一直希望命主由自身改變，畢竟有可能配得貴夫，倘自己的個性不改正，自然難逃本命盤夫妻宮顯現的同床異夢或是聚少離多的狀況。


