    # # 案例80、一切就任它「順其自然」嗎？


    【提問時間】2009-08-30 00:05:12


    【提問內容】


    人真的是什麼命造就什麼人嗎？當然要更好就要更努力。不過如果感覺沒得選擇，那是否就讓它順其自然？


    或許我的命宮在太陰，整個對任何事都超軟弱的，當然什麼命就有什麼優點缺點。但是，總是覺得好無力喔？好難改變。


    難道目前什麼事就不要強求，時間到運就到嗎？


    目前剛畢業找工作，覺得什麼都很不順，又無可奈何。請問就我的紫微八字來說目前我該如何做呢？


    本人：女，民國75年國曆5月26日13時27分（未時）生。


    謝謝！


    【回覆內容】


    嗯，你說的話，基本上對了80%，正所謂命由性生。一個人的命運決定在他自己的個性，一個積極度不足的人，怎能期待在工作上能大放異彩呢？至於命是否天定，以山人多年論命經驗，一個人此生如果沒有自造大善大惡，基本上人生的運勢及歷程，不會與命理所敘述的相差太大。所以命理老師都勸人'
- md: '## 紫微斗數論命技巧及實例解析（下冊）


    多行善事，就是因為要改變命運，除了改變個性之外，更重要的就是多行善事，自然就會有改變。所以山人才會說你說對了80%了。沒關係，山人幫你看看，你未來適合的方向吧！


    基本上你是太陰坐命的女生，由於太陰代表女性，因此坐女命最適宜。倘落男命則不恰當，因會有缺乏魄力及過於天馬行空的感覺。而且太陰坐命，通常都是屬於氣質型的女生，美麗不一定，但氣質絕對不會差。


    而太陰坐女命，基本上較為多愁善感，感情豐富，也不擅長拒絕別人。個性平和，善解人意，對逆境比較採容忍的態度。相對積極度不足，個性頗爲固執、倔強也較爲主觀。


    不過你的除了太陰坐命外，還逢太陽來會。表示妳外在表現給人家的感覺還算是樂觀開朗，也喜歡照顧弱小，有正義感，會打抱不平，不過有時後言語過於坦率，常常得罪人就是。


    至於你適合的工作，基本上你是屬於機月同梁格局的人，古曰：機月同梁作吏人，所以適合穩定單調的工作。加上太陰坐命本身積極度就不足，所以你比較適合擔任如：公務員，行政內勤，秘書，作業員，行政助理或社會工作。


    不過本命宮逢空劫羊陀四煞侵襲，雖說逢日月來拱，但人生路上的挫折與失意難免。而且日月喜會照，坐命威力較弱，所以助力總是不足，也難免你會感到失落與無奈。建議你可以朝向山人分析的工作方向發展，會比較適合你。


