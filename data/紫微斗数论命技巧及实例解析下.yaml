    案例 83、從命格看事業、財運&中年或晚年能享福嗎？


    還有一個問題武曲坐命不利少年，但是七殺坐命沒什麼影響嗎？或有什麼辦法能改變？


    # 【回覆內容】


    唉，年輕的時候不努力，縱使給你老來富的格局，也還是沒有用。所以趁現在還年輕，努力打拼，老來自然就能享福，對不對呢？


    不過你還算滿會想的，這麼年輕就想到中老年去了，山人幫你看看吧！


    山人大概猜到你會這樣問的原因了，我想你應該有針對命盤去查閱網路或其他的資料吧，因為你命坐武曲會貪狼，古曰：武貪不發少年郎，所以你才會想問中老年運的問題吧！


    但是命理不是自己上網查查就可以，他要考量的非常多，所以還是給老師幫你看比較好。


    以本命宮來看，命坐武曲爲財星坐命，加會化祿星，財星遇財，本是可收斂其孤剋，獨斷之本性。但可惜化忌同時會照，本命宮祿忌交馳再會地劫，因此難免爲財煩惱甚至惹來麻煩，加上身居財宮，此生更是難免會爲財拼生死呀。再以財宮觀之，仍是祿忌交馳之局。不過財庫會照本命祿存再逢科權，不見煞忌，頗爲穩健。只要能夠守成不投機，自然可以期待中晚年順利。


    以大限觀之，31 歲前走來波折辛苦，此時宜注意心態調整及切莫投機。32 歲之後會逐漸轉好。切記，你的財庫雖然穩健，但如過於投機，以財宮及本命的狀況看來，還是會有來去一場空的感覺。建議你做好財務管理，不要過度的操作財務，否則遇到武曲化忌入命之流年定有苦頭吃，而且魁星坐命的人，更是不宜投資。以你的盤而言，以要穩穩的儲蓄，不要亂投資或投機。以你財庫穩健的情形，自然可以期待晚景。


    2009-09-07 13:18:45 補充回答：


    武曲坐命，並不是不利少年。是要加上貪狼星才會構成。因為武曲為財星，為財帛宮主，對求財者而言財星入命是一件好事，但缺點在於過於孤剋，故此星不宜坐落於六親宮位，但卻利於財官遷田等象徵財富的宮位。求財時帶孤絕，是好事，但以此種態度對待親人的話就過於絕情。至於七殺坐命，其三方必形成殺破狼，更是象徵一生波折起伏，所以七殺坐命如果無吉曜扶持或其他星宿中和，則多挫折及折磨，但還是要看整體組合而定。


