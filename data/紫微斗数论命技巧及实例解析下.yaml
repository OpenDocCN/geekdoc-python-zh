    ## 案例 99、請高人指點工作迷津


    ### 【提問時間】


    ### 【提問內容】


    > 您好，最近爲工作的方向很迷惑及煩惱，剛好在網路上尋找有關算命的文章就找到您這來了，不曉得您能否幫我算一下工作呢？我是國曆71年8月12日辰時出生，若可以則非常感謝您，不方便也沒關係，謝謝！


    ### 【回覆內容】


    > 沒錯的話你應該是滿有想像力的女生吧，想法頗爲特別，有時讓人難以接受，做事情總感到東做西成，個性的話應該是滿開朗大方，有點大姊頭的樣子。但陽剛中又不失女生的溫柔，但平時應該屬於陽剛型的女生才是。


    > 看來你應該也是屬於比較愛打抱不平，有正義感的人。心直口快，常常會得罪人，所以這些都是你個性上的缺失，要記得改進，這樣對自己未來都比較好，女生還是比較溫柔點，有原則是好事，但也要聽聽人家怎說。


    > 就你個命宮星宿組合來說，比較適合創作、研發、公關及企劃或其他可以發揮你想像力特長的工作會比較適合，而且你應該外型屬於俏麗型的女生，異性緣應該也不差，加上你的個性，應該好哥們很多吧！


    > 至於工作的話，以大限來看，呈現祿馬交流的狀況，表越動越有財。只是錢財部分應該還是守不太住，總是因爲意外而支出，常感到有過路財神的感覺吧！不過在這10年至少辛勤奔波會有點收穫與成就感的。


    > 幫你用流年看看，我想去年對你應該是還滿順利的一年，但今年工作上應該滿辛苦的，對宮大限化忌衝入，雖坐紫微但無輔，因此更感到單打獨鬥，而且做任何事都感到有點卡卡的，看似簡單順利的工作卻一拖再拖，而且外在的競爭壓力很大。確實來說，今年在工作運應該很辛苦，而且貪狼化忌坐夫妻宮，相信在男女之間的關係上也會有不小的影響。總之今年多忍忍，明年應該會順利多，能讓你有表現的機會，雖說還是有點空虛感，但應該比起今年會好很多，如果有工作的話，堅持下去，明年有可能會受到重用。雖說很辛苦，但多少會有點小回報。


    > 人生就是這樣，起起伏伏，不會有永遠好，也不會有永遠壞，看開點，遇到逆境多忍忍，自然就雨過天晴，不要想太多。至少你的工作運沒有連續走壞好幾年呢！


