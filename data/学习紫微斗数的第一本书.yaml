    \n愛不需憐憫，也不必仇恨，但需學習、包容與寬恕；畢竟人生漫長的歲月裡，是一場充滿著學習之旅，包括學習兩性的相處，是一場藝術的洗禮，亦是人生必修的通識課程，唯須先修八個學分的分手哲學課程，因天不從人願由來已久；兩性的互動充斥著，緣起、緣續、緣變、緣滅等不一的情境；得者我幸、失之我命，人生瀟洒走一遭，蓋天下無不散的筵席，好聚好散是人性和諧地基礎。因此，作者疾聲呼籲，當兩性第一次的接觸，雙方應相互調侃：你、妳修了分手哲學的課程嗎？，希望能透過為數龐大地讀者們，蔚成風潮為時下最流行的口頭禪，則社會幸甚！國家幸甚！你、妳修了分手哲學的課程？\n\
