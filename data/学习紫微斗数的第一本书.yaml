    ## 第一章

    ### 紫微斗数命理学之研究


    紫微斗数命理学，乃先圣先贤遗留之智慧结晶；由唐朝希夷先生陈搏字图南，号扶摇子。集其大成，诉诸文字，流传迄今。


    希夷先生精易学、通河洛，二十六岁即穷通天体阴阳造化，上观天体之运行，下察地理之奥秘，以验人事穷通祸福，堪称一代大师，亦开启了宋明理学百年之盛业。


    紫微斗数命理学的思想体系，源由易经的思想体系；以紫微星立太极，以中天斗太阳星、太阴星表征日月之旋转，以四化象为占命论运之用神，藉象假合宫职三才，是天人合一的哲学，即是一门先天无为断命学。


    ---


    ### 第一节 命？运？

    #### 入门篇


    紫微斗数命理学，係依据一个人出生时间「年、月、日、时」转换成紫微斗数之命盘架构，来推算这个人【命和运】的一门学问。因此我们可开宗明义来探讨：


    **命？**

    即是一个人的本质论


    **运**

    即是一个人的潜能说


    俗话说：天生我才必有用，一语道尽命即是本质论；我才，我是何种质料？经商的料子？从政的格局？上班族？是公教职？或私人企业发展？是以才艺或文路为生的自由业？或是以头脑、智慧取财？亦或以身体劳力得财？？？所谓芸芸众生各种不一的本质论，恰是依你出生时间，排出的紫微斗数命盘，可窥其端倪，确定本质论。运有起伏荣枯、穷通祸福、进退得失，即反应在一个人的潜能是否受局限？或已开发？因此随着岁月的往前推进；若运在谷底之时，正是需要韬光养晦、累积能量、充实进修的积极人生观；则运开展之时，挟雷霆万钧之能量，缔造成功、幸福的人生。


    因此【命和运】即是质能的互变，命理学即是一门质能学，提供你做生涯规划的蓝图，认识自己命的本质，以达定位论，了解自己运途的走势，以期潜能的发挥，而作定向解；如是【命和运】即掌握在自己手中，而谱成一首美丽的人生交响乐章，则先圣先贤遗留之智慧结晶，即可承先启后、普照世人。


    **命**

    即先天定数


    **运**

