    # # 冷眼透視兩性關係


    印證每一個人的陰陽宅佈置，發覺竟然是百分之百正確；到現在為止仍然是零誤差，也因而藉以解決一些人的困厄。例如，任職於台南高分院的某法官，民國十七年曾因堂兄右腿突然萎縮一寸，看過中西醫罔效，求助於余，我分析了命盤後直截了當的告訴他有個坐西北向東南的祖墳須加整修。他請老家的地理師勘查處理，半年後堂兄的右腿又再長回一寸，柺杖正式與他絕緣。民國八十一年為台大研究生協會專題演講《易經與宇宙人生》時，一位婦幼醫師很憂戚的說，他家三代業醫，此刻老媽卻躺在台大加護病房，群醫束手無策，心臟隨時會停止，問我能否由易經尋得解決之道。我要了他媽媽的出生時間，當場排了命盤告訴他，在住的正南方一定有放電視機及鐵的東西，東南方有電線桿及電桶。他說說有、我告訴他怎麼處理，十五天之内全部照辦了。他媽媽也跟著出院回家，投入老公的懷抱。


    任何一門能夠流傳久遠的學術，一定都有它的原理原則，要學好它必先找到真正懂得又肯教出來的老師。紫微斗數藉由出生時間，天上眾星不列位置，對每一個人輻射光能的整體影響，提出相當完整細膩的解說，是易經系列學術的重要一環。有心弄懂它，我倒是建議讀者直接找許老師開班授課，從頭學到尾，對自'
