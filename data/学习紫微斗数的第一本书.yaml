    ## 自序


    男生、女生的战争与纷扰，古今中外皆如是；儿女私情、两性关系，道是有情？亦无情？人世间的情、性、爱又何解？究竟缘为何物？情为何物？十足让普天下的男女费思量，恰似道尽了两性微妙关系；人生之旅有多少缘起缘灭？缘起若相生了儿女私情，其结局是缘尽情未了？情尽缘未了？缘情皆未了？或是缘情皆了了？其过程是情、性、爱、恨、妒、怒，交织一片、五味杂陈；芸芸众生有谁又能跳脱、超越两性缘情之藩篱？


    作者早年在学校任教，尔后特考及格转任中央公职，廿余年的公教生涯背景，复加上先祖父于百年前，于日据时代为鹿港第一公小教师，使得礼教于公教世家的拘谨，形成难于同流合污人格特质，见弃于官场现形记，被东厂、西厂黑手修理；相对地五术的研究，亦具读书人批判性格，不耻那批不学无术之人，沽名钓誉、恣意妄为，以敛财为首要之徒。


    公余之暇，兼任台中学苑、彰化、员林育乐中心、妇女会等团体之教师，教授紫微斗数命理学迄今有十七寒暑，宣导正确地命理观、人生观、价值观不遗余力；这期间出入寒舍占命论运者，达万人次之谱，却有半数以上尽是在婚姻、桃花打转、困惑、伤感、无奈、何去何从？相对地接受咨询之余，也让作者醒眼看尽了人间百态、人情世故，不胜唏嘘！亦激起撰写本书之原动力。


    男女的合和，正是人类永续生存之必要条件；刚柔相推，是社会进步的原动力；阴阳合德，是人性和谐的基石。恋爱、婚姻是一场两性共同游戏，与相互学习的人生经验，更是一件呕心沥血、美学十足的雕塑品呵！人生漫长的岁月里，是一场充满着学习之旅，两性相处的艺术亦如是；本书呈献给普天下的男女，祝福拥有快乐、幸福的人生。唯作者才疏学浅，尚祈高德先进不吝指正，是至表谢忱。


    本书撰文期间，烦请黄庆龙君、蔡永吉君细心校稿、编辑及光碟片的研发，


    许徐仁 谨识

    庚辰年孟冬


