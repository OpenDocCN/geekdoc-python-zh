    \n#### ※大運子女宮、有自化忌\n\n象數的解說：是大運子女宮該宮靜態所得，表徵這十年行運的走勢，所逢遇的桃花運、其屬性是【一閃一閃亮晶晶】的戀情，緣起即緣滅，只有開幕式和閉幕式，沒有過程與內容；或者是尚未享用桃花甜美的果實，卻遭毒蛇咬一口，如同俗話說：尚未嚐到鮮、弄得滿嘴腥。畢竟是惡性的桃花運，當流年走到、切莫聞香下馬，因為激情之後，勢必衍生出困擾、是非不順、乖違、怨嘆、報復、緣滅等不一的情境。\n\
    \n#### ※大運子女宮、有自化權\n\n象數的解說：是大運子女宮該宮靜態所得，表徵這十年行運的走勢，所逢遇的情境；故上上策是立即閃避走人，莫徬徨、莫遲疑！\n\
