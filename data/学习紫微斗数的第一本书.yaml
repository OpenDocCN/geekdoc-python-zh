    # 第五章 · 婚姻專論


    婚，然而亦不必蓬門未識綺羅香，擬托良媒益自傷。反而應該以開朗的心、積極地

    行為，面對晚婚作不同的生涯規劃；例如工作與進修交替，工作兩年，再回到學校

    讀取碩士學位，或者是體制外的進修如學習外語、電腦、紫微斗數、美工設計、美

    容美髮，擁有第二專長；如此一來既可舒緩晚婚的壓力，又能充實人生，使得您多

    才多藝、更成熟、有智慧、自信，坦然面對晚婚，同時也克服了晚婚的鬱卒！


    賀、可喜！若您懂象數的話，必然更惜緣、惜情，所謂得之不易、彌加珍貴！努力

    經營婚姻，做除草、施肥的功夫，如是，若後天婚姻運主吉，儼如一部拼裝車，也

    能奔馳於道路上，恰似一幅農家樂、開著一部拼裝車，載滿收割成果，闔家快樂的

    景象。


