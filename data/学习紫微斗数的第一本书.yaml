    \n## 第四節 喪偶？離婚？如何判斷與面對？\n\n上天擁有肅殺之權，由不得您自做主張，相當於生物學的物競天擇，恐龍絕對不是自己咬舌自盡而滅種；天下沒有不散的筵席，在緣起緣滅的循環裡，有多少的無奈、悲情、與感傷？婚姻的道路上，又何嘗例外？上個月，有位警員已擇定良辰吉時，卻因公殉職而留下遺腹子的悲情，緣起即緣滅的浩嘆！意外傷亡、病魔侵蝕而逝？喪偶，是人間悲歡離合之至痛，但又何奈？\n\
    \n紫微斗數命理學，象數的表徵由生年四化象，及本夫的飛宮四化象、大夫的飛宮四化象可窺其端倪，了解先天姻緣之厚薄、有無，及後天婚姻運的吉凶、聚散。\n\n生年四化象為先天定數，可以論述此生男女關係及婚姻的緣起緣滅，所謂【來也生年、歸也生年】正是萬般皆有定數，萬般皆是命數；生年四化象務必要配合星辰論，而星辰具有陰陽五行，可供區分判讀男女關係，茲將區分理則陳述於下：\n\
    \n- 甲\n- 乙\n- 丙\n- 丁\n- 戊\n- 己\n- 庚\n- 辛\n- 壬\n- 癸\n\n1. 至 4 為生數，皆以男性論；例如貪狼星甲木、天機星乙木、太陽星丙火、廉貞星丁火，以上諸星皆表徵男性的星辰。\n\
    2. 除生數之外的星辰，一律以星辰之陰陽分男女說；例如天梁星戊土、左輔星戊土、天同星壬水、皆表徵男性的星辰；巨門星癸水、破軍星癸水、文曲星癸水、武曲星辛金、等諸星皆表徵女性的星辰。眾多的星辰無法一一列舉，請參考拙作《紫微斗數命理學正解一》\n\
    \n以上，星辰判讀男女的法則，可供生年四化象論述這一輩子男女微妙關係；同時，亦可判讀論斷生男育女的法則，往後作者時間允許的話，將會陸續出書再以詳述。\n\n\
    本夫的飛宮四化象為後天變數，可以論述此生姻緣之厚薄、含有無、吉凶等不一的現象說；例如，本夫忌沖本命這是屬於飛宮學八大理則中，第三理則【本命盤的十二官職體用對待關係】其象數的解說：我的配偶為異鄉人，亦表徵先天姻緣主緣薄，成婚較不易、往往是晚婚，同時晚婚反而主吉，若使用【過忌法】忌沖之流年、流月過後，才結婚最佳。反之若早婚不易白首偕老，有生離死別之虞。畢竟先天姻緣主緣薄，早婚會有留不住的意味；尤其是後天行運主悔吝時，即大夫、大命見凶象時，則先天、後天環環相扣，難解矣！\n\
    \n至於，大夫的飛宮四化象，是來描述這十年的婚姻運的吉凶、有無、聚散的問題，是後天的變數，亦關係著一個人成長的背景，如家教、學校教育、社會環境、時代潮流及人生的機遇，影響其兩性觀、婚姻觀、價值觀、人生觀的偏差與否，當然亦影響處理後天的變數，兩性、或婚姻問題的行爲論。\n\
    \n若先天姻緣主緣濃，猶如一部高級賓士驕車，跑遍天下；縱然未必早婚，歡樂青春、少年不留白是最佳寫照；然而後天婚姻運亮起紅燈、主悔吝時，恰似高級賓士驕車，行駛崎嶇不平地石頭路上，顛簸甚巨；此時此刻，您只好減速慢行、耐心地駕駛通過，甚至於還需下車搬移大石頭呢！敬愛的讀者們，每個人婚姻路上，或多或少難免有困厄、失意、欠和諧，甚至於亮起紅燈；但是您必須勇於面對，耐心地去做除草、施肥的工作，以時間換取空間，則一幕一景地更替，紅燈終將轉換成綠燈。擁有美好的婚姻，不是插秧即有好收穫，相對地說不是結婚，就從此王子與公主過著幸福、快樂的生活；這裡面尚需付出經營的功夫，如同除草、施肥的工作，否則那裡來的好收穫？\n\
    \n若先天姻緣主緣薄，猶如一部拼裝車，勉強上路；雖說成婚較不易、往往是晚婚，然而亦不必蓬門未識綺羅香，擬托良媒益自傷。反而應該以開朗的心、積極地行為，面對晚婚作不同的生涯規劃；例如工作與進修交替，工作兩年，再回到學校讀取碩士學位，或者是體制外的進修如學習外語、電腦、紫微斗數、美工設計、美容美髮，擁有第二專長；如此一來既可舒緩晚婚的壓力，又能充實人生，使得您多才多藝、更成熟、有智慧、自信，坦然面對晚婚，同時也克服了晚婚的鬱卒！\n\
    \n賀、可喜！若您懂象數的話，必然更惜緣、惜情，所謂得之不易、彌加珍貴！努力經營婚姻，做除草、施肥的功夫，如是，若後天婚姻運主吉，儼如一部拼裝車，也能奔馳於道路上，恰似一幅農家樂、開著一部拼裝車，載滿收割成果，闔家快樂的景象。\n\
    \n## 第五章 · 婚姻專論\n\n| | |\n|---|---|\n| **案例十：J 小姐** | D |\n| J 小姐：民國四十六年次生人、芳齡四十四歲，基隆市人、從事公關、播音員，廿七歲結婚、旋即廿九歲離婚矣，某女中畢業。\
    \ | D |\n\n> **何年結婚？何年離婚？**借 J 小姐的命盤講解，因此作者將時光倒回十五年前，\n> \n> **命盤呈現出第三個大運命宮**，在本命盤的福德宮，即廿四至三十三歲之大運，以方便本案例之研討。\n\
