    # # 第五章

    婚姻專論


    本命盤的結構，先天象數是科忌的組合，表徵人生的機遇，往往較拖延、滯延、拖拖拉拉、藕斷絲連，無論是人、事、物皆同論。因此凡飛宮四化象、或自化象、視同自化象，構成科忌的組合、平衡了先天象數，則其現象的解說，必然成局；說清楚、講明白，則其現象的解說，無論言一件事、一個人的有無或吉凶，必

    然會發生爲事實。


    # # 何以廿八歲農曆十月結婚？


    理由一、本夫【正好是來因宮】官干丙，文昌化科照命宮，又逢視同自化忌；

    這種飛宮逢視同自化，構成科忌的組合，平衡了先天象數，表徵我必有太太、一定

    會結婚，只是較拖延、滯延、拖拖拉拉。


    理由二、飛宮逢視同自化忌，須法象生年忌在午官，指示子宮大運即廿三至三

    十二歲【象即氣也、氣講往來】一定會結婚。


    理由三、由大夫宮干戊，貪狼視同自化祿，表徵這十年姻緣必有緣起的變化，

    即俗話說會結婚；同時指示戌官【自化宫即應數、在數時間】宫位，或亥宫【法象

    生年禄、定位爲流夫。】的流年结婚，答案是亥宮年即廿八歲，而戌宮爲農曆十月'
