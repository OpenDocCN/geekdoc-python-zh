    地去做除草、施肥的工作，以時間換取空間，則一幕一景地更替，紅燈終將轉換成

    綠燈。擁有美好的婚姻，不是插秧即有好收穫，相對地說不是結婚，就從此王子與

    公主過著幸福、快樂的生活；這裡面尚需付出經營的功夫，如同除草、施肥的工

    作，否則那裡來的好收穫？


