  mdcn: '## 學習紫微斗數的第一本書


    ### 第二節 斗數三要素


    #### 宮、象、星


    **希夷云**：【星佈十二垣、數定卅六位】此語即明確地指出，紫微斗數命理學的三要素「宮、象、星」合一論；星佈十二垣一語，係指宮與星的架構；數定卅六位一語，卅六除以十二等於三，其意指三者「天、地、人」即天盤、地盤、人盤三盤共一盤而用，則天人合一便見吉凶，數在其中矣！然數須藉象來演數，這正是本門紫微斗數命理學靈魂、精神之所在；如是，宮、象、星、即構成紫微斗數命理學的三要素。


    **讀者們**，假若您們思路清晰、反應敏捷的話，象數本一體論；即可察知幾百年來為何四化象秘而不宣？紫微斗數命理學，爲何幾百年來僅是宮星合一的跛腳斷命術？**希夷先生云**【星佈十二垣、數定卅六位】即暗藏玄機矣！


    **我們既已明白了**，紫微斗數命理學是一門「宮、象、星」三合一的完整解義學；唯四化象已於第二節陳述了，因此本節著重在官職的解說，星性的介紹及四化**象的單象、雙象之解說**。


    ---


    # 第一章 紫微斗數命理學之研究


    所謂宮職，係指該宮所司何職？紫微斗數命理學共有十二宮職，概括了人生旅途上所遭遇到的人、事、物之林林總總；含吉凶禍福、進退得失、悲歡離合、喜怒哀樂等等各種命運現象；換言之，每一宮職皆規範了該宮所得之氣數，含該宮所得星、象合一之解說，係該宮靜態的認識觀，另一方面，該宮宮干四化飛宮之解說，係該宮動態的認識觀。如是，即靜、動合參，則該宮之吉凶昭然若揭無所遁藏矣！因此，凡任何一個宮職的研究，欲了解該宮之吉凶悔吝，請讀者按靜、動合參的重要觀念著手研究。


    由上述可知，十二宮職的基本含義，其解說恰是紫微斗數命理學的入門功夫；更明確地說，方知來者問命的情事，該從何宮職下手。然而紫微斗數命理學共有十二個宮職，而這十二個宮職的排列，有其固定的順序關係；以命宮為基準，逆時鐘方向排列，依序是兄弟宮、夫妻宮、子女宮、財帛宮、疾厄宮、遷移宮、奴僕宮、官祿宮、田宅宮、福德宮、父母宮。


    ## 命宮：


    ### 十二宮職的基本含義：


    一、表徵此生我所有的一切，及運勢的起伏榮枯；認識自我的個性、才華、性向、及職業適性、生涯規劃。


    二、論後天格局的高低，以命宮宮干的四化象，判讀後天的富貴窮通；若論先天格局的高低，則取決於生年四化象。


    三、相貌宮，個性使然所呈現的相貌，所謂率性曰命。


    ## 兄弟宮：


    一、表徵兄弟姊妹的個性、才華，與格局的高低。


    二、表徵兄弟姊妹與我緣份的厚薄，亦象徵著私人機構或公司或行號、工廠、或私立學校。


    ## 夫妻宮：


    一、表徵配偶的個性、才華、家世，與格局的高低。


    二、表徵我的婚姻觀及先天緣份的厚薄，早婚或晚婚？幾歲結婚？及姻緣的類型。


    三、看婚後夫妻的感情及對待關係（需合參財帛宮）。


    ## 子女宮：


    一、表徵子女的個性、才華，與格局的高低。


    二、表徵子女與我緣份的厚薄、及子女的有無或多寡；亦表徵學生緣的宮位。


    三、又稱合夥位，看合作事業的吉凶得失。


    四、即是桃花宮，看桃花運的有無、是良性或惡性的桃花及其類型，亦表徵個人性生活能力的優劣。


    五、意外宮，唯須與疾厄宮或遷移宮交易。


    ## 財帛宮：


    一、表徵個人賺錢或理財能力的優劣，與賺錢機會的好壞。


    二、表徵財的來龍去脈，錢從那裡來？宜從事何種行業？錢用到何處去？及財得的得失論。


    ## 疾厄宮：


    一、表徵本人身體健康情形，與體質的強弱。


    二、表徵本人脾氣好壞的宮位，又稱脾氣宮；亦是觀一個人心術正邪的宮位。


    三、表徵疾病與災厄的宮位，及其症狀與類型。


    ## 遷移宮：


    一、表徵在外的變遷運，含驛馬及旅行運；亦主出外的吉凶，如交通意外。


    二、表徵人生的機遇，出外是否能逢遇貴人，遇？不遇？人生充滿著感嘆！故又名機遇宮。


    三、表徵老運的走勢，老運以享福為基。


    ## 奴僕宮：


    一、表徵交友與我緣份的厚薄，是益友？損友？


    二、亦表徵部屬或同事緣份的厚薄，是助力？或阻力？


    三、表徵眾生相的宮位又名絕情宮，是論斷壽元的關鍵宮位。


    ## 官祿宮：


    一、表徵運勢的起伏榮枯，故稱機運宮，又名氣數宮；兼論記功、記過、官非、訴訟、牢獄之災。


    二、表徵事業營運的狀態，或上班的工作狀況；含升遷、降調或轉業、失業等。


    三、求學階段以科甲論，斷學業成績及考運的好壞。


    四、論功名及官運之通塞、吉凶，參看父母宮。


    五、論選舉運的吉凶得失，參看奴僕宮。


    六、表徵本人形象的宮位。


    ## 田宅宮：


    一、表徵祖業的有無及不動產的多寡，故有庫位之稱。


    二、看住宅的環境，或搬家、遷移？或買房子？或賣房子？兼論陰陽宅的吉凶。


    三、表徵與家人相處的關係，又名家運宮。


    四、可預知火災或盜竊的發生。


    ## 福德宮：


    一、表徵福氣、道德的宮位，亦表徵己身的品行、德性。


    二、主享福、應酬的宮位，亦表徵利息差價的宮位。


    三、表徵身體健康狀況，女命與生產有關。


    四、表徵人生觀的宮位是積極或消極？是樂觀或悲觀？或自殺厭世、被殺、自閉症等因果病，皆與福德宮有關。


    五、又名因果位，所謂上承祖德、祖業，下蔭兒孫，中含己身因緣果報，是故惜福、積德、行善，猶如再造八字，故又名造化宮。


    ## 父母宮：


    一、表徵父母與我緣份的厚薄，含父母的庇蔭或無緣論。


    二、表徵父母的個性、才華，與格局的高低。


    三、又名長上宮，表徵師長、長輩、上司，與我緣份的厚薄及相處情形；亦表徵公權力或政府機構。


    四、亦稱文書宮，讀書、教育、功名、契約、文件等有關。亦表徵頭腦、智商高低的宮位。


    五、相貌宮，看五官長相及輪廓。


    六、就姻緣的註腳，表徵名份位；就財官的註腳，表徵血緣地或仲介、批發、包商、包工、或智慧取財的宮位。


    讀者們應可清晰地認知，紫微斗數命理學是一門占命論運學，是一門人生的究竟學，探討各種命運的吉凶，盡是在宮、象的合一，即決定吉凶；星辰所扮演的角色，僅僅是導氣於何方？即將四化象化祿象、化權象、化科象、化忌象的氣，引導至某宮，而去做判讀吉凶的憑藉，這就是遁星的功夫。換言之，星辰不具有吉凶的訊息，僅做導引的功能角色，及指示或指事人、事、物之具體解說，謂之物相論。


    讀者們！若您能深思細嚼前段之說明，則您即擁有紫微斗數命理學正確的認識觀，即不致於虛擲寶貴地光陰，泥濘於跛腳的星辰占星術，機月同梁？殺破狼？月朗天門？七殺朝斗？


    唯星辰本就有其性，謂之星性，係指未受四化象影響前的稱謂；若受四化象的影響，立即發生了星辰質變，一律曰質。例如貪狼星，受戊干的影響，立即發生了星辰質變，變成貪狼化祿星了；則貪狼星在命宮，未受四化象影響之前的星性解說


    是：表爲人圓滑於世故、平易近人、多才多藝，唯貪慾之心有之，主桃花、主禍福；受戊干的影響之後，立即發生了星辰質變，變成貪狼化祿星了，其解說是：爲人圓滑於世故，轉趨於廣結人緣，但卻有相識滿天下，知己無一人的感嘆！處事由多才多藝，轉變成膨風水蛙；貪婪化成豪奪、桃花變成三妻四妾的白日夢。星性的研究、星辰質變的探討，上述僅舉一例，若讀者們有興趣，請參閱拙作《紫微斗數命理學正解（一）》書中第一二九頁至二二〇頁，即有詳盡地解說。


    至此，我們已循序漸進地掌握到命理學正確的認識觀，紫微斗數命理學是一門宮、象、星三合一的完整解義學；缺一不可，但重心卻在宮、象的合一便見吉凶。因此，我們往下介紹，四化象的單象、雙象之解說。


    ### 化祿星的基本含義：


    - 一、代表財祿、食祿、福祿，含福報、慧報。

    - 二、主人緣佳、異性緣佳，含桃花的意味。

    - 三、表忙碌、隨和、好施捨。

    - 四、主聰明、悟性高、稟賦佳，主有才藝。

    - 五、表增加、增多，偏向財方面。

    - 六、有解厄制化之功，與健康、壽元有關。


    ### 化權星的基本含義：


    一、表徵權勢、權柄、威嚴。


    二、佔權、掌權、具領導的實質。


    三、任性、霸道、性剛。


    四、主能幹、有才華、含專技、表開創。


    五、表爭執、摩擦，亦表外來傷害如跌傷、撞傷、燙傷。


    六、增加、增值，傾向權力、地位、或不動產。


    ### 化科星的基本含義：


    一、表科甲、科名、功名。


    二、主聲名、聲望、名望、惜面子，清白之宿。


    三、主聰明、一學即知、博學多聞、主才藝。


    ### 化忌星的基本含義：


    一、主變動、變遷、驛馬、動盪不安。


    二、收藏、收束、管束。


    三、虧欠、固執、情義。


    四、不順、困擾、是非。


    五、凶兆、災厄、死亡。


    六、無緣、緣薄論，表徵人生觀、價值觀、兩性觀、婚姻觀有差距，唯未必表刑剋。


    ### ※雙象組合的基本含義：


    #### 祿權組合的含義：


    一、主豐盛、財官興旺，偏向一般投資、生產的生意。


    二、論人表二個人以上，言桃花屬泛水桃花。


    三、主平順，表擅於計劃。


    四、主貴人、解厄與健康有關。


    五、主風度、斯文、風情、珍惜、和睦，主桃花。


    #### 祿科組合的含義：


    一、名利雙收、因名得利，偏向巧藝的生意或文路之人，如會計師、律師、醫師、老師。


    二、論人表二個人以上，言桃花主有緣、有情。


    #### 權科組合的含義：


    一、以專技、才藝為主，如技師、工程師、建築師，或軍政、或上班。


    二、論人或桃花，象二數一，即一先一後、或一顯一隱。


    #### 祿忌組合的含義：


    一、表徵起伏大、變化大、週轉大。


    二、往往以雙忌論，主凶。唯飛宮化忌逢生年祿、或生年祿自化忌除外。


    #### 權忌組合的含義：


    一、以專技、技能為主，如技工、機工等技術人員，或軍警、俸薪者。


    二、主善變、突變，來得莫名、去也莫名，含無奈或天意。


    #### 科忌組合的含義：


    一、以學術、才藝為主，或上班爲宜、或教育、著作或服務業。


    二、言感情，表徵藕斷絲連、主糾纏、是非、嘮叨、拖拖拉拉。


