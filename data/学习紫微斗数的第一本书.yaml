    \n父母宮：有天梁星生年科、天機星、天喜星、火星。\n\n表徵：\n一、我與父母、師長、上司相處主和睦，相對地說、他們皆是我此生的貴人。\n二、天梁星生年科在父母宮，來因宮爲財帛宫，因此站在此生得財、謀生論，宜從事公關、交際、代言人、服務、仲介或代書業務等。\n\
