    # 第五章 婚姻專論


    尋覓第二春，何以應數四十一歲？


    逝者如斯，無情的歲月畢竟永遠地往前推進，中壯年喪偶，尚有兩個幼兒待撫養，尋覓第二春、勢在必行；為方便本案例之研討，因此作者將時光倒回四年前，命盤呈現出第四個大運命宮在丑宮，即本命盤的田宅宮，指示三十三至四十二歲之大運。


    尋覓第二春，直接由大夫宮干四化象判讀，K先生大夫宮干己干武曲星化祿、文曲星化忌入本命在戌宮，垂象有入婚姻六內宮；同時大夫宮干己干貪狼化權入本遷在辰宮，即構成三象、而決定一人、一事、一物說；其媒介在另一象。【因此，K先生這十年、本、對宮，即決定一人、一事、一物說；歸納為理則【三象同宮、或必能尋覓到第二春，並指示戌宮為四十一歲流年的夫妻位；媒介天梁化科在未宮、又逢自化權，所以未宮月【農曆四月】即介紹認識第二任太太，而農曆十二月【因為媒介科、逢自化權，法象生年權在丑宮、成為農曆十二月的夫妻位。】迎娶第二任太太，翌年再獲一麟兒，闔家快樂。'
