    \n## 學習紫微斗數的第一本書\n\n紫微斗數命理學，依子女宮、命宮所得象數，靜動合參即呈現出時空氣數；行運的走勢，若逢遇良性的桃花，往往命盤裡子女宮的垂象，有下列象數之一，提供給讀者們以資自行判讀的能力。\n\
