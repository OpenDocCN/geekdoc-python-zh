    上述七種象數的結構，逢自化象或逢視同自化象的解說雷同，其差異是逢視同自化象，另含有不斷地緣起的象意，換言之，表徵含有舊事重演的意思。


    ### ※動態的認識觀


    凡任何一個宮職的研究，須知該宮職所範圍的象數，含靜態的認識觀、動態的認識觀，合參靜、動的垂象以示該宮職吉凶論；就以本節的研究，須知大運子女宮該宮職所範圍的象數，其靜態的認識觀係指該宮職有何星？有何象？象含生年四化象、自化象、視同自化象，構成宮、象、星、三合一的解義如前述。而居動態，係指該宮職的宮干四化象，飛渡至某宮做吉凶的判讀解說，含飛宮四化象有否逢生年四化象，或逢自化象，或逢視同自化象；若有，則勢必發生象與象的碰撞說，爾後再做吉凶的判讀解說。


