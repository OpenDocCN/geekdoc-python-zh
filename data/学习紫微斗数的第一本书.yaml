    \n敬愛的讀者們，十二宮職含義的認識是入門基本功夫，但也是最重要的；若有此觀念，則象學的解說必然能綿延而生，況且宮職尙須配河洛理數。因此坊間的說法，四化派比星性派厲害，因沒有四化象的沖動，那有吉凶？若有人問你隸屬於何派，答曰【宮職派】因對宮職沒有正確地認識，焉有象學的正确解說；但請勿答曰【卜派】又非大力水手的兄弟們，嘿！紫微斗數又不是卡通影片；同時亦請勿嘿！\n\
    \n嘿！嘿！：：：屆時又要開記者會、對簿公堂而成新新聞矣！\n\n象即現象依屬性有別，分成化祿象、化權象、化忌象，而呈現兩組的對待、屬於陰陽法則，則化祿象、化忌象爲一組，化權象、化科象、化忌象另爲一組；這是基本分野，另外有錯象分組，如化權象、化忌象爲一組，化科象、化忌象爲一組，等等不一的分組；茲就本節主題【我該如何處理婚姻危機？】及【知命立命說。】掌握果報之因的訊息。此刻，幫讀者們整理成公式化如下：\n\
