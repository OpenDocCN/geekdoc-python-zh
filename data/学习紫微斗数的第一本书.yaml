- md: '## 學習紫微斗數的第一本書


    後天環環相扣；作者只能如此地宣示：緣業本相生，然而人活在消業中，這是因緣果報的平衡學；但切莫在消業中，又造業啊！則盡是在惡性地因緣果報的循環裡，又如何再談超越、了悟與淨心？又如何再談往後日子的生涯規劃？敬愛的讀者們，走筆至此，您們應可以體會到，紫微斗數命理所論及的命和運，本就是一門人生哲學，亦是一門修身養性之學。


    ## 喪偶？離婚？該如何判斷？又該如何面對？


    喪偶或離婚共同的先決條件，是後天婚姻運亮起紅燈，表徵這十年的婚姻運呈現出凶象，或夫妻之間有嚴重失和的氣數；然而兩者的差異性，喪偶其先天姻緣必主緣薄，使得先天化後天，後天返先天，先天後天環環相扣的循環裡，悲情、哀慟、是人間悲歡離合之至痛，但又何奈？此時，依邏輯學的嚴密性與完整性，務必要檢視配偶的紫微斗數命盤，有否健康、意外、壽元的時空垂象？所謂兩點決定一條線，三點決定一個面；聰明的讀者們亦可往下思考，若有子女的話，亦可檢視子女的紫微斗數命盤，有否喪父或喪母的時空垂象？如是嚴密性與完整性的邏輯，當然可鐵口直斷矣！


    ## 第五章 婚姻專論


    喪偶，該如何面對？上天有肅殺之權，天下沒有不散的筵席；在緣起緣滅的循環裡，未落果報之前，惜緣、惜情、抓住溫馨地【剎那即表永恆】擁有勝過佔有，畢竟佔有會質變，擁有即永恆；只在乎曾經擁有，又何須天長地久？


    斯人已逝，生者何堪？因此若您懂象數的結構，能在未落果報之前半年，請投保壽險、意外險一千萬元以上；因為保險業本是社會互助、社會福利的事業。作者遇上太多的個案，例如，先生四十開外中壯年之軀，前無病例、毫無預警的情況下，突然心肌梗塞猝死，留下三個求學中的子女；再例，有位太太三十歲發現子宮頸癌，未及半年病逝，留下嗷嗷待哺的幼兒。


    眾多的案例，不勝枚舉，然而紫微斗數由命盤的結構，能清楚地剖析出象數的吉凶、聚散、含時空，可掌握預警訊號，提示您在應注意、可注意的大前提下，做事先防範處理；例如，提前三個月做心導管、抹片等檢查，掌握先機、逢凶化吉，或者投保壽險、意外險一千萬元以上。


    作者教授紫微斗數命理學，迄今已達十七年了，接受命理諮詢無數，發現太多的來訪者，充斥著迷信的觀念、報喜不報憂、深怕觸霉運，甚而錯誤的思維，妄想花錢改變命運，使得神棍有機可乘；更甭提投保壽險、意外險【準死給他看！】的迷信，誠屬可嘆！猶如，台灣九年國教已推展三十年，幾乎沒有文盲，但政治文盲卻比比皆是，捧著神主牌到處狂吠中國人？台灣人？亂源由此而生，夫復何言？


    所謂【君子問禍不問福】況且紫微斗數命理學，是先聖先賢留下來的智慧結晶，是一門人生哲學、象數之學，與鬼神無關；故何來迷信？正是【菩提本無樹、明鏡亦非臺、本來無一物、何處惹塵埃。】庸人自擾、喪失先機，使得悲情發生，斯人已逝，生者何堪？若再受神棍糟蹋、騙錢、騙色，真可謂一頭撞牆去死，免得落人飯後茶餘之笑話。


    此刻，應該理性面對問題，掌握先機、提前三個月做健康檢查，或者投壽險、意外險一千萬元以上；金錢雖非萬能，但沒有錢卻是萬萬不能，所謂生者何堪？日子總要過下去，過年容易、過日子難喔！況且未引進外商之前，台灣的壽險業寡佔、坑人，我們應以學象數的優勢，扳回一城，可也。


    ## 離婚？該如何判斷？又該如何面對？


    前已略述，是後天婚姻運亮起紅燈，表徵這十年的婚姻運呈現出凶象，或夫妻之間有嚴重失和的氣數；該如何判斷？屬於居動態的象數結構，擬以實際命盤做判斷的解說；此時，我們先行討論會不會離婚？該不該離婚？


    ## 第五章

    婚姻專論


    離婚與否，是見仁見智的說法，但是作者以爲，既已做結婚的決擇，就不該在您的辭典裡，出現離婚一詞；理由有二：其一、您本可以自由地選擇快樂的單身主義者。其二、離婚是男女的恩怨情仇轉嫁給子女，是一種不公平的不幸，徒增社會成本，亦是社會亂源不斷的主因。作者多次參與社會工作，赫然察覺諸多作奸犯科、殺人放火、男盜女娼、強姦賣淫，甚而八家將、飆車族等社會邊緣人，竟然十有八九是單親家庭長大，頗令人深思與感嘆！


