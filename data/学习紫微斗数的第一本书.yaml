    表徵：一、配偶的個性隨和、隨緣、樂觀、開朗，亦表徵我本人姻緣早發，雖未必早婚，然人生不枉少年時、青春不留白；同時，我本人較喜歡自由戀愛的婚姻型態，婚後夫妻緣濃情深、感情甚佳，財祿、食祿、福祿易顯彰，相當於配偶帶來財運。


    二、生年祿又自化祿，象一數二，含有二度、雙重的意思；象數構成祿出，是同組、同象、又同一顆星，表徵不利前者，是緣盡情了時、再有新歡，正是（但見新人笑、那聞舊人哭）。


