    # # 學習紫微斗數的第一本書

    ## 人生的機遇，何以三十七歲喪偶？

    ### 理由一、論先天姻緣最不樂見右弼星在夫妻宮，或有雙重、二度的現象，當然關鍵是在四化象的沖動，始有吉凶論。

    #### 理由二、本田【夫妻宮之破敗位】本奴【夫妻宮之疾厄位】的宮干皆是辛干，雙辛的威力作祟，使得文昌化忌沖本命，必見凶象恐有喪偶之憾；至於再逢生年科、視同自化忌，平衡了先天象數科忌的組合，更進一步肯定有喪偶之憾、及時間的觀念。

    ##### 理由三、大命本田重疊，表徵三十三至四十二歲、這十年的我走到田宅運，即引爆【時間走到發射宮】喪偶之憾；大命即本田的宮干是辛干，使得文昌化忌沖本命，再逢生年科、視同自化忌，平衡了先天象數科忌的組合，表徵喪偶之憾的現象說必然成局。至於，視同自化忌須作法象的功夫，以確定應數之流年；法象生年忌在午宮，爲三十七歲的流年夫妻位，故答案是三十七歲喪偶。'
