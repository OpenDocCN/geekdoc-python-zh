    # ### 第二章 時間表達的方式與探討


    紫微斗數命理學的應用，須將出生年、月、日、時換算為陰曆或俗稱農民曆的時間，並以出生當地的時間為基準，即所謂【出世落土時】係以出生當地的時間，絕非以經緯度的地理時間落差處理；道理之淺顯，因為台灣不是地球的中心，況且紫微斗數命理學不是台灣文化，而是洛陽文化。


    # ### 生年換算：


    將已知的民國出生年，換算成天干地支年：


    # #### 一、出生年天干的求法：


    將民國出生年減2，所得餘數的個位數，即天干的順序數。例如民國47年出生，則47減2等於45，餘數的個位數為5，即為戊年生人。


    # #### 二、出生年地支的求法：


    將民國出生年除以12，餘數即地支的順序數。如前例、47除以12等於3，餘數11即表地支為戌；故答案是戊年生人，生肖屬狗。


    三、請務必以農民曆年計算，例如民國47年國曆1月8日生，則農曆為46年11月19日，應以46年計算。'
