    命宮：有武曲星、文曲星、貪狼星視同自化祿。


    表徵：一、K先生性剛果決、唯心直無毒、氣量寬宏，主觀意識高張，有不尋覓第二春，翌年再獲一麟兒，闔家快樂。


    二、此生主有財，唯須付出勞力、勞心而得之正財；最好是現金的生


    意，因為生年忌在財帛宮。


    三、K先生在外人緣佳、風度不錯、與人相處和睦，主樂觀、積極的


    人生觀。


    夫妻宮：有七殺星、右弼星、火星。


    表徵：一、配偶個性急躁、好勝心強，漂亮、外緣佳，姻緣往往是介紹認識


