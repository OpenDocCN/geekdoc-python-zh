- md: '# 冷眼透视两性关系

    紫微斗数命理学会理事长 许徐仁◎著


    ## 紫微斗数

    ### 学习吧！紫微斗数

    #### 的第一本书


    国内第一本随书附赠光碟引发风潮的紫微斗数畅销书。


    热销多年不退，仔细研读过的读者都大声叫好。


    你还在纸上画命盘吗？


    你总是抓不到紫微斗数的诀窍吗？


    你觉得学紫微斗数很难吗？


    这本书将彻底颠覆你的固有观念。


    ---


    ## 序


    回溯民国七十四、七十五年间，许老师不辞劳苦，往返于彰化、台南教授我们紫微斗数，老师不仅精通命理、教学认真、分析透彻、且待人诚恳，实属难觅，无人出其右之硕彦。特别值得一提的是严格要求学生排命盘不要看书，掐指一算掌上排盘直接断命，运用之巧妙存乎掌心。记得某次餐厅吃饭时，一位服务小姐慕名请求指点婚姻桃花迷津，许老师闭目掐指立即解说，何时曾跟长相如何、生肖所属之男士关系亲密，是续或断，能否成为夫妻何时成婚，令小姐闻之花容失色感佩不已。如同被许老师现场录影存证一般真实准确。并希望将来有缘能再见一面请益。


    使我最感念的是，结业前夕许老师告诉我一个天大的秘密：「古时候的高人是用紫微斗数看阴阳宅布局及断吉凶的」让我着实吓了一跳。自从大学毕业高考及格后即全心全力投入学习易经系列最困难最神秘的堪舆学研究，举凡三合派、九星派、三元玄空奥秘及救贫水法之理论及其真实性，无不了然于胸，临场搭配使用得心应手，就没听说过还有另外这么一套功夫！于是乎认真地从紫微斗数命盘印证每一个人的阴阳宅布置，发觉竟然是百分之百正确；到现在为止仍然是零误差，也因而藉以解决一些人的困厄。例如，任职于台南高分院的某法官，民国十七年曾因堂兄右腿突然萎缩一寸，看过中西医罔效，求助于余，我分析了命盘后直截了当地告诉他有个坐西北向东南的祖坟须加整修。他请老家的地理师勘查处理，半年后堂兄的右腿又再长回一寸，拐杖正式与他绝缘。民国八十一年为台大研究生协会专题演讲《易经与宇宙人生》时，一位妇幼医师很忧戚地说，他家三代业医，此刻老妈却躺在台大加护病房，群医束手无策，心脏随时会停止，问我能否由易经寻得解决之道。我要了他妈妈的出生时间，当场排了命盘告诉他，在住的正南方一定有放电视机及铁的东西，东南方有电线杆及电桶。他说有、我告诉他怎么处理，十五天之内全部照办了。他妈妈也跟著出院回家，投入老公的怀抱。


    任何一门能够流传久远的学术，一定都有它的原理原则，要学好它必先找到真正懂得又肯教出来的老师。紫微斗数藉由出生时间，天上众星不列位置，对每一个人辐射光能的整体影响，提出相当完整细腻的解说，是易经系列学术的重要一环。有心弄懂它，我倒是建议读者直接找许老师开班授课，从头学到尾，对自己或他人的学业、事业、运势、财运、桃花、婚姻、健康、寿元等问题，都可了然于心，预作规划。孟子说：学问之道无他，求其放心而已。这次许老师肯将属于论断桃花婚姻的部分，出书公诸于世，是读者的莫大福音，故乐为之序。


    门生代表


    邮政储金汇业局会计处长 廖文智

    法务部 矫正司长 黄徵男

    敬序

    庚辰年腊月


