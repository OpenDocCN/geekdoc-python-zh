    二、婚後的對待不佳，正是貧賤夫妻百事哀。\n\n本節的主題論述桃花，E小姐三十五歲既已離婚，恢復了單身女郎，則論述E小姐這十年的桃花運、性生活，端視三十四至四十三歲的大運子女宮四化象，其宫干爲癸干：\n\
