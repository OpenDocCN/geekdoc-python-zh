- md: "## 第二章 時間表達的方式與探討\n\n紫微斗數命理學的應用，須將出生年、月、日、時換算為陰曆或俗稱農民曆的時間，並以出生當地的時間為基準，即所謂【出世落土時】係以出生當地的時間，絕非以經緯度的地理時間落差處理；道理之淺顯，因為台灣不是地球的中心，況且紫微斗數命理學不是台灣文化，而是洛陽文化。\n\
    \n### 生年換算：\n\n將已知的民國出生年，換算成天干地支年：\n\n#### 一、出生年天干的求法：\n\n將民國出生年減 2，所得餘數的個位數，即天干的順序數。例如民國\
    \ 47 年出生，則 47 減 2 等於 45，餘數的個位數為 5，即為戊年生人。\n\n#### 二、出生年地支的求法：\n\n將民國出生年除以 12，餘數即地支的順序數。如前例、47\
    \ 除以 12 等於 3，餘數 11 即表地支為戌；故答案是戊年生人，生肖屬狗。\n\n三、請務必以農民曆年計算，例如民國 47 年國曆 1 月 8 日生，則農曆為\
    \ 46 年 11 月 19 日，應以 46 年計算。\n\n---\n\n## 第二章 時間表達的方式與探討\n\n生月換算：\n出生月令以農曆為基準，不論節氣，因為斗數重數不重節氣，子平法才需要論節氣；若閏月出生者，以月令十五日為基準；因閏月無中氣，故以十五日前後劃分之。\n\
    \n十五日以前出生者，以本月論。\n十五以後出生者，以下月論。\n\n生日換算：生日依農曆的初一、初二、廿七、廿八計算之，不用日的干支。\n\n### 生時換算：\n\
    \n一日廿四小時，共分爲十二個時辰，以十二地支的符號區分之；每日的廿四小時係從零時至廿四時，切記！廿三至廿四時生人，生日是今日，非以翌日計算。\n\n| 起迄時間\
    \ | 時支 |\n| --- | --- |\n| 0 ~ 1 | 早子 |\n| 1 ~ 3 | 丑 |\n| 3 ~ 5 | 寅 |\n| 5 ~ 7\
    \ | 卯 |\n| 7 ~ 9 | 辰 |\n| 9 ~ 11 | 巳 |\n| 11 ~ 13 | 午 |\n| 13 ~ 15 | 未 |\n| 15\
    \ ~ 17 | 申 |\n| 17 ~ 19 | 酉 |\n| 19 ~ 21 | 戌 |\n| 21 ~ 23 | 亥 |\n| 23 ~ 24 | 夜子\
    \ |\n\n在台灣，因政府實施日光節約時間，即所謂夏令時間，係人爲調整時間，故其實施年份出生者，其出生時辰應扣掉一小時換回真實、自然的時辰。\n\n國曆實施夏令時間之年月，摘錄如下：\n\
    \n| 實施年月 | 起訖月日 |\n| --- | --- |\n| 三十五至四十年 | 國曆五月一日至九月三十日止 |\n| 四十一年 | 國曆三月一日至十月三十一日止\
    \ |\n| 四十二年、四十三年 | 國曆四月一日至十月三十一日止 |\n| 四十四至四十八年 | 國曆四月一日至九月三十日止 |\n| 四十九年、五十年\
    \ | 國曆六月一日至九月三十日止 |\n| 六十三 年 | 國曆四月一日至十月三十一日止 |\n| 六十四年 | 國曆四月一日至九月三十日止 |\n| 六十八年\
    \ | 國曆七月一日至九月三十日止 |\n\n至於，剖腹時辰仍照算，或許有人會質疑，人算能巧奪天工？人人皆可得大貴大富之命嗎？殊不知萬般皆有定，往往您刻意選擇的良辰吉時，出自於不學無術或學藝不精，而自封大師、居士、上人、山人之手，其結果被術仔所誤尙沾沾自喜之可悲；故倒不如自然生產可也，除非是婦產科醫師基於安全之必要，良性地建議需剖腹生產。\n\
    \n---\n\n## 第二章 時間表達的方式與探討\n\n命盤的製作，係將一個人出生時間，轉換成紫微斗數語言架構；爾後研習紫微斗數命理學的各種語言、語法，如十二宮職含義、星性、四化象的基本解說，進一步學習飛宮四化象，呈現出的吉凶判讀法則；如是，您已掌握此門預測未來學的入門功夫，更上一層樓，指日可待矣！\n\
    \n命盤的製作，請參閱拙作《紫微斗數命理學正解（一）》廿五頁至四十三頁的說明，包括掌心訣推算五行局的速算法。\n\n唯即將邁入廿一世紀的今天，凡任何學術須與電腦科技結合，始能應付瞬息萬變日日新、月月異的未來，屬於\
    \ E 世代的天下。因此，作者研發出命盤製作的光碟片，呈現給讀者們，隨書附贈，方便初學者排盤的困惑與耗時。\n\n光碟片的功能介紹：\n\n- 一、從此排盤迅速、精確、象數清晰！\n\
    - 二、本光碟片可儲存上百、上千筆的資料，坊間販賣的軟體皆無此功能；同時本光碟片儲存的資料，依年齡大小的順序排列，方便讀者們查看。\n- 三、本光碟片共有四個畫面：1、導引的畫面，太極圖；2、新增資料的畫面請輸入年、月、日、時，姓名、男女、婚別；3、命盤完成的畫面；4、列印的畫面。\n\
    - 四、命盤完成的畫面中，十二宮的宮干，用滑鼠一點，即呈現該宮四化曜星的解說；此乃作者研發本光碟片細心、細膩的思維，方便初學者尚未熟稔十干四化曜星前的使用。\n\
    \n使用光碟片的說明事項：\n\n- 一、本光碟片，使用 800×600 之解析度最佳。\n- 二、列印之命盤紙，建議使用 A4 粉紅色的紙張；同時請用彩色列印機列印，畫面最美。\n\
    - 三、本光碟片，所列「光碟小弟」係虛擬之命盤，除廣告兼慶賀本光碟片之研發告成，藉此導引讀者們參考使用之範例。\n- 四、出生時間，請用農曆即陰曆的時間表達。年碼係三碼，例如民六十三年請打\
    \ 063；月、日、時、分、皆二碼。\n\n若已輸入農曆即陰曆的年、月、日、時、分，及姓名、男女、婚別之後，請在藍帶區域內，用滑鼠按二下，即呈現出命盤；若需列印，請按列印之按鈕，即可。\n\
    \n若命盤未能顯示出、生年四化象、自化象，係造字字型未聯結之故；請按下列步驟操作，即可。\n\n1. 開機→開始→程式集（P）→附屬應用程式→造字程式\n\
    2. 呈現出選擇字碼之畫面，請按取消之按鈕。\n3. 呈現出造字程式之畫面，由檔案裡找字型連結 F。\n   - A. 請點選連結選取的字型 S。\n  \
    \ - B. 請在標楷體的位置，按二下。\n   - C. 請找尋 Eudc.tte 點一下，再按存檔；即呈現出標楷體已更改成 Eudc.tte 了。\n\
    \   - D. 相同的動作請將細明體、新細明體，皆按照 B、C、的步驟操作，也使得細明體、新細明體等，皆更改成 Eudc.tte 了。\n   - E.\
    \ 再恢復點選連結所有字型 L，爾後再按確定。\n\n關機並請关掉電源，重新開機乙次，即 OK。\n\n讀者們，若您想擁有私人專屬之光碟片，請來電洽商合法授權事宜；所謂私人專屬版，即列印的命盤畫面，在原程式裡更改為您的姓名、職稱、電話、住址；再燒錄成您私人專屬之光碟片。學會\
    \ TEL：04 7270780\n\n---\n\n## 第三節 名詞解釋與符號解說\n\n紫微斗數命理學，是一門占命論運學，其功玄在於斗曜其數，而以宮位法辨，言吉凶、得失、聚散、有無、動靜、進退、存亡。紫微斗數確以六宮而定位，分陰陽、也分內外的闡述法則；茲介紹十二宮職二分法則如下：\n\
    \n依宮位陰陽分：六陽宮與六陰宮\n\n六陽宮：命宮、夫妻宮、財帛宮、遷移宮、官祿宮、福德宮。\n\n六陰宮：兄弟宮、子女宮、疾厄宮、奴僕宮、田宅宮、父母宮。\n\
    \n紫微斗數功力之高低，取決宮職基本解義說，進而宮職內涵說，終於宮職陰陽、內外、體用、本對；這是應用上的分野，例如生年四化象落於六陽宮或六陰宮，基本上可論本人的性向：\n\
    \n- 落六陽宮者：主觀意識強，多理性應用。\n- 落六陰宮者：性情不穩定，多感性變化。\n\n另外，六陽宮與六陰宮的應用上，也區分動靜與多寡。\n\n依宮位內外分：六內宮與六外宮\n\
    \n六內宮：命宮、財帛宮、疾厄宮、官祿宮、田宅宮、福德宮。\n\n六外宮：兄弟宮、夫妻宮、子女宮、遷移宮、奴僕宮、父母宮。\n\n六內宮與六外宮在應用上的分野，分得失、吉凶、聚散或自己份內事或他人之事。\n\
    \n依人與事物分：六親宮與六事宮\n\n六親宮：命宮、兄弟宮、夫妻宮、子女宮、奴僕宮、父母宮。\n\n六事宮：財帛宮、疾厄宮、遷移宮、官祿宮、田宅宮、福德宮。\n\
    \n依宮位往來分：本宮與對宮合爲一組，換言之，本宮與對宮可合爲一體，猶比如表裡可一致的理則，分與合正是往來理念的透視。\n\n依宮位體用分：六體宮與六用宮\n\
    \n六體宮：命宮、夫妻宮、疾厄宮、田宅宮、福德宮、父母宮。\n\n六用宮：兄弟宮、子女宮、財帛宮、遷移宮、官祿宮、奴僕宮。\n\n六體宮與六用宮是宮位的六爻定位，應用上以來因宮或大運命宮若屬六體宮，則其四化象所落的宮位，肯定的存有象；若屬六用宮，則其四化象相對的存有象。\n\
    \n如是的分野較深奧，另出書專論。\n\n其他名詞解釋如下：\n\n婚姻六內宮：命宮、夫妻宮、財帛宮、疾厄宮、奴僕宮、田宅宮。所謂婚姻六內宮，關係著婚姻有無的問題，若夫妻宮的飛宮四化象，飛入婚姻六內宮，爲婚姻成局的先決條件。\n\
    \n天盤：係指本命盤，統管這一輩子，各種命運的現象。\n\n地盤：係指大運盤，統管這十年，各種命運的現象。\n\n人盤：係指流年盤，統管今年，各種命運的現象。\n\
    \n天、地、人三盤，是共一盤而用，藉四化象貫穿三盤言吉凶、時空；例如，大運夫妻宮飛宫四化象，藉四化象與本命盤官職，發生動態官職的重疊，即是「官職由小歸大碰撞論」爾後判讀吉凶，下應流年；換言之，三盤是共一盤而用，而非分天盤、地盤、人盤逐一論述，這是犯了無知、愚昧的錯誤。\n\
    \n來因宮：生命在無由自我抉擇的天地無明以生的當下，生於陰陽十干化氣，故與生俱來，氣化生命之所在官，是謂來因宮，又名化氣宫。生命無明以生，斗數以生年的天干，重疊命盤的生年干的宫位，此宫即生命的來因、化氣宮；由於生命的氣息即凝於此而生化，命運所有的一切皆脫胎於此，並以其宮職分野人、物、事，方便顯象。\n\
    \n三合方：以命宮立太極，則命宮、財帛宮、官祿宮合稱三合方。如以夫妻宮立太極，則夫妻宮、遷移宮、福德宮合稱三合方；各宮皆可立太極說。\n\n四正：以命宮立太極，則命宮、遷移宮、子女宮、田宅宮合稱四正。唯三合法以命宮、財帛宮、官祿宮、遷移宮為四正。\n\
    \n大運：表示這十年行運的起伏變化，丁命宮上符號表之。如言我這十年所有的一切，以下命宮上表之，如下財帛上表之。\n\n流年：論每年行運的變化，流年命宮所落的宮位與太歲年支之宮位相同。例如，太歲庚午，流年命宮即在午宮，太歲辛未，流年命宮即在未宮。\n\
    \n流月：視本命盤寅宮之宮職為何？若為子女宮，則流年子女宮即為該年的正月命宮，又稱斗君位；則二月的流月命宮在流年夫妻宮，順時鐘方向理推三月、四月、五月等等。\n\
    \n流日：流月所在宮位起初一，然後順時鐘方向一日起一宮。\n\n流時：依原命盤十二地支論流時，例如子時在子宮、丑時在丑宮、寅時在寅宮等等。\n\n自化祿、自化權、自化科、自化忌的符號表示：\n\
    \n視同自化祿、視同自化權、視同自化科、視同自化忌的表示：\n\n- A\n- B\n- C\n- D\n\n---\n\n## 第三章 婚姻與桃花正解\n\
    \n婚姻的抉擇，十足給予普天下的男女費思量，曾經是牆裡、牆外地徘徊，又曾經是茫然於愛情十字口的迷惑？是雨過天晴、碧海藍天？或是喚不回的悔與恨？是有情人終成眷屬？亦或是含著眼淚默默地祝福？芸芸眾生，人生的境遇何其萬千，猶如坊間的愛情小說，永遠有寫不完的故事。\n\
    \n紫微斗數命理學，十二個宮職裡的夫妻宮、子女宮，可明確地幫您描述，男女兩性微妙地關係，及姻緣的有無、聚散，正緣何時現？能否白首偕老？有無生離死別之憾？往後的章節將逐一披露，請讀者們循序漸進，必可借紫微斗數的語言，幫自己剖析兩性微妙地關係，及婚姻的林林總總之象。\n\
    \n### 第一節 緣與情爲何物？\n\n有道是：「人生自是有情癡，此恨不關風與月」、「天長地久有時盡，此恨綿綿無絕期」語出【玉樓春】【長恨歌】恰似道盡了男女兩性微妙地關係；究竟情爲何物？緣又何解？\n\
    \n佛語：緣起性空、性空緣起，相生了人際關係，盡是在有緣裡；然緣起必有緣滅的因果循環性，則緣業本相生，唯業力使然，情亦即相生。如是，緣盡情未了？情盡緣未了？緣情皆未了？道盡了男女兩性微妙地關係，則悲歡離合、喜怒哀樂、兩地相思、此恨綿綿、無限地懷思，正是緣情各種不一的現象呵！\n\
    \n紫微斗數命理學是一門人生哲學，亦道盡了男女兩性微妙地關係，依象數可充分地認識，緣起、緣續、緣變、緣滅等不一的情境；則男女兩性微妙地關係，究竟是情何以堪？訴盡相思？破鏡重圓？情變生仇？糾纏、囉唆、是非？芸芸眾生，人生的境遇何其萬千，猶如愛情小說，永遠有寫不完的故事。\n\
    \n紫微斗數命理學的四化象，化祿象、化權象、化忌象，即表徵緣起、緣變、緣續、緣滅的現象說，茲詳述於左：\n\n**化祿象**：表徵宇宙萬有因緣，緣起的開端，生命猶如在於一系列緣起的無盡流中；所以化祿象，象徵新的開始，如新認識的人、新的知識、新的事業。換言之，生命隨著歲月的往前推進，萬物萬象是不斷地更替換新，故緣起的化祿象就猶如新的展望、寄託、或期待；相當於一顆希望的種子，不論是人、事、物皆同論。\n\
    \n因此，化祿象就人而言，依婚姻與桃花的註腳，解象是人際的緣起、異性緣佳、熱情、憧憬、樂觀、開朗、相識、戀愛、相見恨晚、隨和、隨緣、緣濃情深、姻緣早發。\n\
    \n**化權象**：表徵宇宙萬有因緣的自變體數，意指本來就會變，而非有原因；縱是有因，亦感無奈，即莫名而至，故似無常。換言之，化權象是對已有的人、事、物，作一種自然的變化，無為於天理流行，無奈於人自默受。相當於天有肅殺之權，物競天擇的自然淘汰，頗具權變的意味。\n\
    \n因此，化權象就人而言，依婚姻與桃花的註腳，解象是人際的爭執、摩擦、佔有、主導、霸道、強制、一廂情願、毛手毛腳、激情、強勢、掌權、負責、統御、愛現、能幹、才華、敢衝、有為。\n\
    \n**化科象**：表徵宇宙萬有因緣的延續，因緣有緣起，即有延續；猶如新舊接替，方能綿延而成恆古不滅的歲月長流，生生不息。所以化科象的特徵，意指舊識的人、念舊往昔包括人、事、物、景。重覆、二度、…：歸究是個戀眷之象，有一種放不下心的煩惱、及不足於外人道的隱衷。\n\
    \n因此，化科象就人而言，依婚姻與桃花的註腳，解象是善解人意、浪漫情懷、深情款款、多愁善感、風度、斯文、和睦、樂群、幽默、風趣、風情、媚力、主聲名、聲望、惜情、愛面子、桃花、才藝、貴人、解厄。\n\
    \n**化忌象**：表徵宇宙萬有因緣的終點，相當於一個結束，但所謂結束，並不表示萬緣全絕，係指萬有萬象之機變數，是生化作用，是物化原理。所以化忌象如果是一種果報，它必履經祿、權、科的過程，而產生應得之果；相當於一種氣自然流行的終點，猶如經過春、夏、秋而有冬，此乃屬循環之果。\n\
    \n因此，化忌象是對已有的人、事、物、之果報相應而得，故不論是佔有、或擁有，均同樣的變化，意指化忌象的本能是機變數，其所得含有機或無機；明確地說即是緣結束後，是有生機的轉進，亦或無生機矣。若屬有機之生命變化，即終止的剎那間，同時又隱藏了另一生機，讓生命再存有另一新生的空間，等待展開而適其生存。\n\
    \n因此，化忌象就人而言，依婚姻與桃花的註腳，解象是桃花收束、鑽牛角尖、內向、固執、虧欠、溺愛、依偎、黏膩、管束、嘮叨、不順、乖違、失和、冷淡、困擾、是非、怨嘆、報復、緣薄、無情、緣滅、無緣、生離、死別。\n\
    \n讀者們，請多細心琢磨、深思、了解四化象，化祿象、化權象、化科象、化忌象，所表徵緣起、緣變、緣續、緣滅的現象說，則你、妳必能掌握兩性微妙地關係，進退不失方向，有無、聚散不失原則，游刃有餘、人生少憾事矣！\n\
    \n唯四化象會發生雙象組合，有下列六種情況【一】飛宮雙象落同宮或本、對宮【二】生年雙象落同宮或本、對宮【三】自化雙象落同宮或本、對宮【四】有生年的基本含義先有所認識，茲介紹如左：\n\
    \n### 祿權雙象組合\n\n桃花註腳解說：表徵二個人以上或很多，亦表徵男女兩性微妙地關係，稍嫌複雜。桃花屬性是泛水桃花，紙茶杯主義者，用了即丟；例如某立委滑一跤、滑二跤的緋聞，出現了\
    \ A、B、C、D……寶寶。\n\n婚姻註腳解說：象二數二，往往傾向二度、重覆、或三角習題。\n\n### 祿科雙象組合\n\n桃花註腳解說：表徵二個人以上，亦表徵男女兩性微妙地關係，皆屬有緣有情、好聚好散地良性桃花；縱然是緣盡情了，恰似託付白雲，由衷地祝福！\n\
    \n婚姻註腳解說：象二數二，唯往往傾向良性地三角習題的迷惑。\n\n### 權科雙象組合\n\n桃花註腳解說：象二數一；因為四化象分成兩組，祿忌一組、權科一組，所以權科同組表徵象二數一；意指一先一後、一顯一隱，換言之，表徵男女兩性微妙地關係，舊情隨風飄逝，新戀始能湧現；或者是有不足以外人道的地下戀情。\n\
    \n婚姻註腳解說：象二數一，如同前述；表徵婚姻微妙地關係，舊緣隨風飄逝，新緣始能湧現；或者是有不足以外人道的地下戀情，卻有未能結合之憾。"
  mdcn: "## 第二章 時間表達的方式與探討\n\n紫微斗數命理學的應用，須將出生年、月、日、時換算為陰曆或俗稱農民曆的時間，並以出生當地的時間為基準，即所謂【出世落土時】係以出生當地的時間，絕非以經緯度的地理時間落差處理；道理之淺顯，因為台灣不是地球的中心，況且紫微斗數命理學不是台灣文化，而是洛陽文化。\n\
    \n### 生年換算：\n\n將已知的民國出生年，換算成天干地支年：\n\n#### 一、出生年天干的求法：\n\n將民國出生年減 2，所得餘數的個位數，即天干的順序數。例如民國\
    \ 47 年出生，則 47 減 2 等於 45，餘數的個位數為 5，即為戊年生人。\n\n#### 二、出生年地支的求法：\n\n將民國出生年除以 12，餘數即地支的順序數。如前例、47\
    \ 除以 12 等於 3，餘數 11 即表地支為戌；故答案是戊年生人，生肖屬狗。\n\n三、請務必以農民曆年計算，例如民國 47 年國曆 1 月 8 日生，則農曆為\
    \ 46 年 11 月 19 日，應以 46 年計算。\n\n---\n\n## 第二章 時間表達的方式與探討\n\n生月換算：\n出生月令以農曆為基準，不論節氣，因為斗數重數不重節氣，子平法才需要論節氣；若閏月出生者，以月令十五日為基準；因閏月無中氣，故以十五日前後劃分之。\n\
    \n十五日以前出生者，以本月論。\n十五以後出生者，以下月論。\n\n生日換算：生日依農曆的初一、初二、廿七、廿八計算之，不用日的干支。\n\n### 生時換算：\n\
    \n一日廿四小時，共分爲十二個時辰，以十二地支的符號區分之；每日的廿四小時係從零時至廿四時，切記！廿三至廿四時生人，生日是今日，非以翌日計算。\n\n| 起迄時間\
    \ | 時支 |\n| --- | --- |\n| 0 ~ 1 | 早子 |\n| 1 ~ 3 | 丑 |\n| 3 ~ 5 | 寅 |\n| 5 ~ 7\
    \ | 卯 |\n| 7 ~ 9 | 辰 |\n| 9 ~ 11 | 巳 |\n| 11 ~ 13 | 午 |\n| 13 ~ 15 | 未 |\n| 15\
    \ ~ 17 | 申 |\n| 17 ~ 19 | 酉 |\n| 19 ~ 21 | 戌 |\n| 21 ~ 23 | 亥 |\n| 23 ~ 24 | 夜子\
    \ |\n\n在台灣，因政府實施日光節約時間，即所謂夏令時間，係人爲調整時間，故其實施年份出生者，其出生時辰應扣掉一小時換回真實、自然的時辰。\n\n國曆實施夏令時間之年月，摘錄如下：\n\
    \n| 實施年月 | 起訖月日 |\n| --- | --- |\n| 三十五至四十年 | 國曆五月一日至九月三十日止 |\n| 四十一年 | 國曆三月一日至十月三十一日止\
    \ |\n| 四十二年、四十三年 | 國曆四月一日至十月三十一日止 |\n| 四十四至四十八年 | 國曆四月一日至九月三十日止 |\n| 四十九年、五十年\
    \ | 國曆六月一日至九月三十日止 |\n| 六十三 年 | 國曆四月一日至十月三十一日止 |\n| 六十四年 | 國曆四月一日至九月三十日止 |\n| 六十八年\
    \ | 國曆七月一日至九月三十日止 |\n\n至於，剖腹時辰仍照算，或許有人會質疑，人算能巧奪天工？人人皆可得大貴大富之命嗎？殊不知萬般皆有定，往往您刻意選擇的良辰吉時，出自於不學無術或學藝不精，而自封大師、居士、上人、山人之手，其結果被術仔所誤尙沾沾自喜之可悲；故倒不如自然生產可也，除非是婦產科醫師基於安全之必要，良性地建議需剖腹生產。\n\
    \n---\n\n## 第二章 時間表達的方式與探討\n\n命盤的製作，係將一個人出生時間，轉換成紫微斗數語言架構；爾後研習紫微斗數命理學的各種語言、語法，如十二宮職含義、星性、四化象的基本解說，進一步學習飛宮四化象，呈現出的吉凶判讀法則；如是，您已掌握此門預測未來學的入門功夫，更上一層樓，指日可待矣！\n\
    \n命盤的製作，請參閱拙作《紫微斗數命理學正解（一）》廿五頁至四十三頁的說明，包括掌心訣推算五行局的速算法。\n\n唯即將邁入廿一世紀的今天，凡任何學術須與電腦科技結合，始能應付瞬息萬變日日新、月月異的未來，屬於\
    \ E 世代的天下。因此，作者研發出命盤製作的光碟片，呈現給讀者們，隨書附贈，方便初學者排盤的困惑與耗時。\n\n光碟片的功能介紹：\n\n- 一、從此排盤迅速、精確、象數清晰！\n\
    - 二、本光碟片可儲存上百、上千筆的資料，坊間販賣的軟體皆無此功能；同時本光碟片儲存的資料，依年齡大小的順序排列，方便讀者們查看。\n- 三、本光碟片共有四個畫面：1、導引的畫面，太極圖；2、新增資料的畫面請輸入年、月、日、時，姓名、男女、婚別；3、命盤完成的畫面；4、列印的畫面。\n\
    - 四、命盤完成的畫面中，十二宮的宮干，用滑鼠一點，即呈現該宮四化曜星的解說；此乃作者研發本光碟片細心、細膩的思維，方便初學者尚未熟稔十干四化曜星前的使用。\n\
    \n使用光碟片的說明事項：\n\n- 一、本光碟片，使用 800×600 之解析度最佳。\n- 二、列印之命盤紙，建議使用 A4 粉紅色的紙張；同時請用彩色列印機列印，畫面最美。\n\
