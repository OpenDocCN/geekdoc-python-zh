    \ 第四章 桃花專論\n\n感情的落幕竟是無疾而終，沒有因為，也沒有所以；猶如在地球突然消失的飛碟。\n\n科忌象沖象數的所得是表徵藕斷絲連、糾纏、是非、嘮叨、拖拖拉拉。因此，男女兩性微妙地關係，出現了棄之可惜、食之無味的憾事，卻有揮之不去的膠著；充斥於兩性間竟是嘮叨、是非、糾纏、拖拖拉拉、藕斷絲連，縱然分手卻也牽腸掛肚，懷念特別多！\n\
