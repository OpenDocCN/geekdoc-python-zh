    **桃花註腳解說**：表徵男女兩性微妙地關係，起伏大、變化大；猶如一對如膠似漆的戀人，若情海生波，則狂風暴雨驟變的可怕，恰似一場大幅度的震撼教育，愛恨交加，最讓人難以消受！


    **婚姻註腳解說**：婚姻的分與合，如同洗三溫暖，冷熱自知矣！唯有理性地面對，良性地溝通、修心養性，為最上上策。


    **桃花註腳解說**：主善變、突變，來得莫名，去也莫名，含無奈或天意。表徵男女兩性微妙地關係，往往是不期而遇【今夕何夕？見此邂逅。】及徐志摩的【偶然】該是最佳寫照。來無影、去無蹤，感情的落幕竟是一拍兩散，視同陌路人。


    **婚姻註腳解說**：婚姻的結合，竟是緣份到來時候，佳人始現，頗有相見恨晚、閃電結婚，婚後再談戀愛之象；換言之，若緣份未到時，縱然是尋尋覓覓也成空！愛情長跑的對象，也往往不是未來的另一半。


    ### 科忌雙象組合


    **桃花註腳解說**：表徵藕斷絲連、糾纏、是非、嘮叨、拖拖拉拉。因此，男女兩性微妙地關係，出現了棄之可惜、食之無味的憾事；充斥於兩性間，竟是嘮叨、是非、糾纏、拖拖拉拉、藕斷絲連。縱然分手卻也牽腸掛肚，懷念特別多！


    **婚姻註腳解說**：姻緣的腳步，蹣跚來遲了，正是「過盡千帆皆不是，斜暉脈脈水悠悠。」的最佳寫照；因為得之不易，惜緣、惜福是良策，就不會重現食之無味、藕斷絲連的情節；縱然是離婚亦牽腸掛肚，懷念特別多！？


    以上，雙象組合的基本含義，正是斷婚姻與桃花，象數精髓之所在；所謂單象僅做象徵解，雙象成物對，即有吉凶矣！讀者們，請多深思、體悟。


    ## 第二節 桃花正解


    凡任何一門學術，皆依其時代背景而作詮釋與註解，斯謂正解；命理學亦如是。因此，一門學術的詮釋與註解，或者是教授與傳承，須具備其主、客觀條件；客觀條件是依其時代背景，主觀條件是作者或教授者，須擁有正確地人生觀、價值觀、婚姻觀，斯謂【正解】。


    桃花的正解，表徵異性緣、眾生相之緣；因此，所謂【命帶桃花】的正解，是表徵我此生深具異性緣、眾生相之緣，宜從事的工作性質與異性有關、或公眾性、老少咸宜、或才藝性、或文教性質。而非低知識水平的算命術仔或女神棍，胡言亂語三妻四妾、紅杏出牆、梅開三度、偏房侍妾……之命；緊接著這批算命術仔、女神棍，覬覦妳的荷包，慫恿花錢改運，畫符斬桃花、改名改運的老套，人性的弱點又再度被這批算命術仔、女神棍強姦了，夫復何言？


    所謂工作性質與異性有關，譬如男醫師從事婦產科、小兒科，而女醫師從事小兒科、家庭醫學科；或女性從事西裝裁縫師、理髮師，男性從事女服飾店、美容、美髮師：……；總而言之，其消費對象皆異性或幼兒。


    所謂公眾性或公關性質，譬如歌星、影星、舞女、記者、導遊、主播、主持人、經紀人、模特兒、空中小姐、政治人物、公關人員、或服務性或仲介性之講解者，皆屬之。


    所謂才藝性、文教性工作者，如教師、畫家、作家、攝影師、舞蹈家、美工設計、演說名嘴、文化事業、或與美學有關之性質者。


    上述是【命帶桃花】之正解與闡釋，至於芸芸眾生、形形色色，若從事於色情工作者亦算，唯不足以贅述。然最不可饒恕地是那批知識水平偏低的算命術仔、女神棍，扭曲解釋、危言聳聽，經一番胡言亂語促使聽者不寒而慄唉！結果是【又在嘯想妳的錢】騙錢開始！全體肅立，畫符、畫虎爛開始，妳的錢就不見了。


    至於命帶桃花表徵異性緣佳，不排除有兒女私情的存在，如【窗外】的情節，或影迷、歌迷的熱情，或導遊、模特兒、空中小姐、工作與生活的多彩多姿，不一而是，本屬平常；端賴個人有否健全的婚姻觀與家庭責任感；例如，某立法委員滑一跤、滑二跤的緋聞窘態，眾寶寶接力賽式的追殺，頗具震撼教育！足足讓崇尚一夜情的男士膽戰心驚、引以為戒。再例，某男性主持人聽說大紅大紫、天王級的人物，一副故作純情偶像，卻是個花心大蘿蔔，被拆穿西洋鏡，竟是四個孩子的爸；惜作者屬口口、竟然不認識，立即打開電視一看，一副不具內涵、氣質的臉孔，愛搞笑、耍嘴皮的模樣，會是天王級的主持人？真令人嘆爲觀止、不足爲訓。


    婚前，喜逢桃花運表徵兩性相吸、相識的運勢，若有緣、有份、有情，相知、相惜、相愛，有永久共同生活在一起的強烈意願，往往會步上地毯另一端；換言之，桃花、婚姻往往是一條連通之路，正是願天下有情人終成眷屬的進行曲。


    唯男女兩性微妙地關係、何其萬千；況天不從人願、由來已久。芸芸眾生，又該如何面對桃花運，演化成兩性微妙地關係？作者研究紫微斗數命理學有廿餘年，教授命理學亦達十七年之久，這其間接受命理諮詢無數，可謂看盡了人間百態；數不清的個案，猶如曾經滄海難爲水、除卻巫山不是雲。因此，作者接受命理諮詢的經驗，參悟了兩性微妙地關係，願提供結緣的讀者們參考。


    一、每個人皆須先修八個學分，分手哲學課程，因天不從人願、由來已久；況且多情自古空遺恨，好夢由來最易醒，因此隨緣應人、隨情應物，得者我幸、失之我命，瀟洒走一遭；揮揮您的雙手，不帶走任何一片雲，但切記要帶走那一套床單呵，否則又得向全國同胞道歉，辭去祕書長一職，莞爾一笑、可也；唉！不向情田種愛根，畫樓寧負美人恩，難過也。執是之故，先修分手哲學課程，較具寬闊地胸懷，能昇華情、性、愛的境界；縱然是剎那間的火花，只在乎曾經擁有，擁有勝過佔有的唯美主義，又何須死纏爛鬥、潑硫酸、開瓦斯、血刃情仇、毀她、謗他，而後自殘、自悔？再回頭已是百年身矣！


    二、惜緣、惜情；有道是：修得十年同船渡，修得百年共枕眠，更積極地說，化惜緣、惜情爲關心、關愛，則六〇年代往日情懷的電影情節，必將再重現；同時，必有助於現今混亂地兩性關係，則您的人生勢必更寬闊，兩性地關係及人際關係，勢必更美化。


    三、失意的人，沒有悲觀的權力；面對褪色的戀情，雖然忘了先修八個分手哲學的學分課程，也不懂惜緣、惜情爲何物？唯切記！勿將悲觀轉化成毀滅、激烈、瘋狂的偏差行徑；反而須更理性、冷靜、開朗地面對褪色的戀情；雖然是無語問蒼天，剪不斷、理還亂，是哀愁，別是一番滋味在心頭；但還是要勇敢地面對褪色的戀情，因爲是緣起則必有緣滅的時刻，雖履經緣變、緣續，尤其是緣變的不捨、不甘心，然又何須、何必轉化成毀滅、激烈、瘋狂的偏差行徑？隨緣應人、隨情應物，可也。反觀芸芸眾生，緣變、緣續的不捨、不甘心，竟有穿紅色衣服自殺，願能化成厲鬼報復的愚蠢行為，或轉愛成妒與恨的毀滅、激烈、瘋狂的偏差行徑；例如，某大學女副教授，十六歲就讀某女子高級中學即成名、震撼文壇，秀外慧中、是名作家，然卻為了諾理桑褪色的戀情，轉愛成妒與恨，急就章地出版一書××香爐人人插，蟲動一時，結果三人皆受傷害了，誠屬遺憾！名作家、副教授尚有如此的偏差行徑、夫復何言？況凡夫俗子拙劣地偏差行徑，更是死纏爛鬥、潑硫酸、開瓦斯、血刃情仇、毀她，謗他，而後自殘、自悔？誠屬可嘆！芸芸眾生，再回頭已是百年身矣！


    四、化失意與悲觀為生命再生的原動力：應以生涯另有規劃爲期許，轉移悲情、痛苦、掙扎、無奈地漩渦；則您將再起、展翅而飛，重新詮釋生命的意義；則您的人生將更寬闊、有智慧，隨著歲月的往前推進，必將締造更成熟、豐碩、完美地人生。


    ### 第三節 婚姻正解


    曾經是牆裡、牆外地徘徊？迷惑？婚姻是生命的一場賭注？婚姻是女人生活的全部、那男人？選擇單身主義者的浪漫人生？或未婚生子的完美主義者？亦或皈依佛門真、善主義者？芸芸眾生，結婚雖非唯一選項，那又該如何？紫微斗數命理学是一門人生哲學，夫妻宮的垂象能幫我們找尋答案。


    男女兩性微妙地關係，若發展至情同意合，且有強烈地共同生活在一起的意願，步上地毯的另一端，勢將水到渠成，誠屬可賀！紫微斗數命理學的夫妻宮可垂象，明確地告知何年何月結婚。若夫妻宮的垂象，呈現象不明、象不穩時，則表徵你、妳的婚姻觀稍嫌混沌、躑躅；猶如汽、機車引擎打空檔卻猛加油，雖努力有餘、無開花結果之實。若夫妻宮的垂象，呈現緣薄、無緣之象，則表徵你、妳的姻緣往往會晚婚，若早婚不易白首偕老，有生離死別之虞。


    諸多不一的婚姻現象、及兩性微妙地關係，就讀者們而言，恰似每一個故事裡的最佳男女主角，卻不知劇本在何處？一簾幽夢地茫然若失？紫微斗數命盤裡，夫妻宮的垂象即是劇本，導演是作者或命理分析者，僅僅是幫忙做劇本的解說及指導。此刻，我們尚未往下探究前，須先具有正確地婚姻觀，今詮釋如下：


    有道是：夫妻是緣，無緣不配；婚姻的存在、夫妻的關係首重在一個緣字；因此，古有名言如前世姻緣、七世夫妻、天賜良緣、天作之合，不勝枚舉唯強調的是有緣有份、無緣不配。然而既是有緣結合，又何來生離死別之無奈？是造化弄人？亦或先天定數化成後天行爲論？或後天所塑造偏差的婚姻觀、價值觀、人生觀，使得返歸先天宿命論？一連串的問號，又從何解？


    走筆至此，我們須做整理與歸納，以婚前與婚後兩方面，做積極地、正面的剖析：


    **婚前：**


    多結交異性朋友或多談戀愛，免除認識異性的狹隘，在正常的兩性交往，學習兩性相處的藝術，充份了解那種類型的異性，較能伴我終生；如是，應可做到這是我無怨無悔的抉擇。因此，務必請你、妳壓抑內心的自卑感重與外在的自尊心強，雙重相悖、混淆之圖騰，謄出更多相識的機會給有緣人，以期寬廣、開朗你的人生，則幸福、幸運之神，隨時即將降臨了，祝福你、妳！


    其次，應建立有相當的經濟力，至少要有正當的職業及穩定的收入，若尙具有前瞻性的開創力更佳；因為貧賤夫妻百事哀，往往逢遇後天婚姻運失和時、則雪上加霜，更難以克服婚姻的困厄，甚或墮入風塵；猶如作者所鄙視那群不具社經地位、好逸惡勞，專賴五術謀財者，雖亦有少數尙具職業道德與服務精神者除外，餘者往往一脫離五術或紫微斗數，則無以維生，故輕者賤踏學術、故弄玄虛，惡質者恣意斂財、騙色。


    若先天姻緣欠佳或緣薄，則應晚婚爲宜，俟忌過之年再做定奪；相對而言，若求學運佳，則多讀書、多進修，取得碩士、博士學位，以空間換取時間，而達晚婚之生涯規劃；若求學運不佳，則多學習各種技藝、才藝如學習外語、電腦、書法、烹飪、插花皆宜，取代【瑛瑛美代子】的無聊，以達成空間換取時間；畢竟廿一世紀的未來，是多元化、終生學習的世代。


    **婚後：**


    學習寬廣的包容心，婚姻雖基於有緣的結合，唯來自不同的成長環境、家教，必然在價值觀、人生觀、婚姻觀、生活習性等有某種程度的落差；若能知性好相處最佳，否則雙方都需學習寬廣的包容心。縱然爭執、摩擦、吵架、甚而打架雖說不宜，畢竟仍不失夫妻的一種溝通，因此須講究吵架的藝術與技巧，以不影響先生的事業或工作爲前提，因您的福德宮，乃先生的官祿位。換言之，妳此生享福與否？繫於先生事業的成敗；另外不擴大戰線，如回娘家，萬一娘家的知識水平偏低，徒增對立的昇高；若離家出走，也幾乎註定走上婚姻的不歸路；故應歸屬於茶壺裡的風暴淡然處之，或找見識面寬闊的長輩或親友或調解委員諮詢，亦可。


    再說，有子女就無離婚、自殺、同歸於盡的權力，除非子女已長大成人；否則將己身的緣與業，轉嫁於子女身上，是一種不公平的不幸！使得子女處於單親家庭不平衡的成長過程，往後再如何的彌補都嫌不足；故寧可做個同一屋簷下的陌生人，所有的委曲皆平衡於子女即是您生命的延續。換言之，子女即擁有健康的身心、成長與成就，故豈是以一個忍字了得；如同診語所說，結婚的辭典裡，永遠找不到離婚一詞，更甭論自殺、同歸於盡的愚蠢行爲。


    因此，婚姻處於低潮、失和之際，應一個忍字俟機而待，以期時間換取空間；因爲，命和運本就是時空的交錯，則時空再變、物換星移、人生一幕一景的更替，在無盡流地時光隧道中，婚姻的危機即是轉機，使得往後的空間充滿著寬闊與揮灑自如的人生。故切記莫怨天尤人，持有應劫須逢的理念，因為命理學所論及的命和運，本就是一門應劫須逢的平衡學呵！尤其切記莫聽信江湖算命術仔、神棍的搬弄是非，妄想改命改運，或扭轉婚姻的不幸與悲苦，其結果損財又遭狼吻；如此，惡性循環徒增您走上婚姻的不歸路而已。命和運絕不可能改，否則天理何在？因果循環的相續何來？命理學亦不復存在，試想若可改，如何再談命論運說？


    因此，莫鑽牛角尖走入死胡同，適時調整您的人生觀、價值觀、婚姻觀，而應以更理性、更健康的理念去平衡婚姻所得失和的氣數，此乃真正化解之道。敬愛的讀者們，每個人婚姻路上，或多或少難免有困厄、失意、欠和諧，然能拒絕江湖算命術仔、神棍的搬弄，尤其是女神棍的強姦，則婚姻終將步上坦途，祝福天下有緣人、有健康的婚姻、白首偕老。


    最後，我們更須做正面的呼籲，結婚未必等於恩愛夫妻；猶如插秧未必等於好收穫，連三歲孺子皆懂的道理，要有好收穫的前提是需除草、施肥、灌溉等中間過程的付出；換言之要擁有恩愛夫妻的實質，莫忘了婚姻是需要經營與付出，要互敬與互信而得之。別讓童話故事所矇騙：從此公主與王子過著幸福、快樂的生活。


    ## 第四章 桃花專論


    桃花的正解，表徵異性緣、眾生相之緣。因此，能善藉桃花者，人生處處皆左右逢源、無往不利、方便行事。就以現代企業管理的觀點，謂之親和力地人際關係；就以現代行銷學的觀點而言，人脈即是錢脈，擁有廣大的人脈，即坐擁金礦的道理是相通。


