    婚姻的道路上，又何嘗例外？喪偶或離婚皆是婚姻關係的中斷，雖說有太多的不捨、不甘，但又何奈？逝者如斯，無情的歲月畢竟永遠地往前推進，淹沒了一切、覆蓋了往昔。


    我將再起，展翅而飛，生命的意義重新詮釋，人生的方向盤勢必要轉舵；雖然


    緬懷往昔、珍惜舊情，但盡是在悲情、鬱卒、傷感的原地打轉，徒增自擾與自殘，


    畢竟【昨夜星辰昨夜風】勇於邁出悲情、迎接新生、尋覓第二春，應是嚴肅的課題、且須面對。


    紫微斗數命理學，依大運夫妻宮的飛宮四化象，是否垂象入本命盤的婚姻六內


    宮，若垂象有入婚姻六內宮，再逢同組的自化象，則象數必然成局；亦表徵您已尋


    覓到第二春，可直應何年、何月，再譜鴛鴦曲。


    若大運夫妻宮的飛宮四化象，垂象未入婚姻六內宮，表徵您這十年無意再婚，'
