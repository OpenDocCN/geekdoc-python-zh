    以上，象數之結構皆曰凶；若大命與本夫或本田宮職重疊，則化忌沖本命，象數之結構皆曰凶，表徵這十年婚姻運亮紅燈，輕者三天一小吵、五天開個家庭運動大會，嚴重者即有生離死別之象。但是，大命與其他宮職重疊時，忌沖本命，表徵這十年的行運必主悔吝、凶險，然不是婚姻方面的紅燈與悔吝，端視宮職重疊是何宮職，即呈現那方面的悔吝與凶險。


    居動態而言，若大運夫妻宮與田宅宮發生交易，而呈現凶象，即所謂【妻田交易】是斷婚姻存在與否，極重要的斷命訣；因為田宅宮是夫妻宮立太極的奴僕位，即是夫妻宮的破敗位、絕情位；表徵婚姻存在與否，是喪偶？離婚？


    上述，婚姻的斷命訣包括婚後的對待、姻緣道路上會遇黃燈或紅燈、及婚姻存在與否，讀者們請細心品味，並多印證命盤，則斗數的功力必突飛猛進。本節另一主題，我該如何處理婚姻危機？應秉持所謂【知命立命說】即俗話說：指點迷津，方能有導人於何去何從的功力；尤其在知識水平日益趨高的當下，面對諮商者，還是那套夾混於販夫走卒的市井裡，躲在暗巷畫虎爛、賺黑心錢的勾當，小心被逮到'
- md: "## 第五章 婚姻專論\n\n警察局；甚而狼狽入獄，屆時老公、或地下男友，拿妳的黑心錢娶二奶的現世報。\n\n所謂【知命立命說】依象數的觀點而言，若化忌沖是果報說，係基於緣業本相生的平衡論；然而有果必有因，故當未落果定、果報之前，要懂得做消除【果報之因】的功夫；猶如未釀成火災之前，先移除易燃物的道理是相通地；若時間走到，已落果定、果報，就需立即迅速撲滅火勢，以防火勢漫延而致不可收拾的地步；如是，命運即爲運命，自己主動掌握了人生各各環節，生涯的規劃盡是在藍圖裡，進而達成【知命立命說】。\n\
    \n紫微斗數命理學，依象數的觀點而言，若化忌沖言一種果報說，則化祿位即是肇因位；例如【大夫 化忌 沖 本夫】這十年婚姻宮化忌沖這輩子的婚姻宮，這種象數結構，表徵這十年婚姻運必亮起紅燈，輕者三天一小吵、五天開個家庭運動大會，嚴重者即有生離死別之象；則大夫的化祿位落在子女宮，表徵這十年婚姻運亮起紅燈的肇因，即是子女的問題、或桃花的問題、或性生活不協調。\n\
    \n上述的結構，大夫的化祿位落在父母宮，表徵這十年婚姻運亮紅燈，肇因是傳統地婆媳問題再翻版、或外戚強行介入的困擾；若大夫的化祿位落在財帛宮，表徵這十年婚姻運亮紅燈，肇因是貧賤夫妻百事哀、入不敷出，又不甘心降低物質生活水準的悲哀；若大夫的化祿位落在兄弟宮，表徵這十年婚姻運亮紅燈，肇因是兄弟姊妹的原故。\n\
    \n敬愛的讀者們，十二宮職含義的認識是入門基本功夫，但也是最重要的；若有此觀念，則象學的解說必然能綿延而生，況且宮職尙須配河洛理數。因此坊間的說法，四化派比星性派厲害，因沒有四化象的沖動，那有吉凶？若有人問你隸屬於何派，答曰【宮職派】因對宮職沒有正確地認識，焉有象學的正确解說；但請勿答曰【卜派】又非大力水手的兄弟們，嘿！紫微斗數又不是卡通影片；同時亦請勿嘿！\n\
    \n嘿！嘿！：：：屆時又要開記者會、對簿公堂而成新新聞矣！\n\n象即現象依屬性有別，分成化祿象、化權象、化忌象，而呈現兩組的對待、屬於陰陽法則，則化祿象、化忌象爲一組，化權象、化科象、化忌象另爲一組；這是基本分野，另外有錯象分組，如化權象、化忌象爲一組，化科象、化忌象爲一組，等等不一的分組；茲就本節主題【我該如何處理婚姻危機？】及【知命立命說。】掌握果報之因的訊息。此刻，幫讀者們整理成公式化如下：\n\
    \n- 化忌象果報說\n- 化祿象肇因位\n- 化權象為媒介\n- 化科象為質\n\n- 祿忌象果報說\n- 化權象為媒介與肇因位\n- 化科象為質\n\n\
    以上，象數理則為【四象掃一元】與【三象一物說】為先師混沌老人口傳授的重要口訣，呈現給讀者們，依您們命盤的垂象，先判斷果報說之象，是屬於上述四個公式中的那一組？爾後找出肇因位或媒介；在未落果報之前，趕快去做消除的功夫，如是即了悟【知命立命說】的正解。\n\
    \n## 「小姐何以廿七歲結婚？」\n\n傳統斷命訣論述姻緣的有無，是本夫決定何十年結婚？再由大夫決定何年結婚？當然，不排除本夫決定何十年結婚，同時直論應數的流年；差異性的關鍵在有無逢自化，因為自化可一直往下應時間。\n\
    \nJ小姐的命盤結構，本夫宮干癸，使得貪狼星化忌入遷移宮、即酉宮，再逢自化權即構成權忌的組合，平衡了先天象數權忌組合，可論述 J 小姐先天姻緣的有無、及吉凶。\n\
    \n【飛宮象、逢自化象，須碰撞說；飛宮學八大理則、理則八。】\n\n【飛宮象、逢自化象的組合，平衡了先天象數的組合；則現象必然成局，含有無、及吉凶。】\n\n\
    【凡一件事先言有無，再論吉凶；如尚未結婚，何來生離死別？】\n\nJ 小姐先天姻緣的有無，已決定在西宮、或卯宮的時間觀念，使得成為大命或大夫，答案是卯宮成為大夫，指示在第三個大運、即廿四至三十三歲；因為\
    \ J 小姐的行運走順行運。\n\n同時，直論應數的流年，因為自化的原故可一直往下應時間；使得酉宮成為流命或流夫，即廿五、或廿七歲結婚。\n\n假若依傳統斷命訣論述姻緣的有無，則大夫的視同自化忌，依然定位酉宮成為流命或流夫，即廿五、或廿七歲結婚。\n\
    \nJ 小姐爲何不是廿五、而是廿七歲結婚？\n\n本節內文已提示，若化忌象爲果報說，則化祿象爲肇因位，化權象爲媒介，化科象爲質；因爲 J 小姐的大夫宮干癸，巨門化權象在戌宮爲媒介，指示出廿六歲\
    \ J 小姐始認識其先生，故何來廿五歲結婚？\n\n況且大夫宮干癸，破軍星化祿象在巳宮照亥宮，指示出廿七歲爲肇因位，即姻緣顯現之時間，故答案是廿七歲結婚。\n\
    \n## J 小姐爲何廿九歲會離婚？\n\n理由一、J 小姐的命盤結構，本夫宮干癸，使得貪狼星化忌入遷移宮，再逢自化權即構成權忌的組合，轉化成權忌沖命宮，表徵先天姻緣主緣薄，若未過忌沖年【三十一歲】的早婚易有生離死別之象；這種【飛宮象、逢自化象】權忌的組合，平衡了先天象數權忌組合；則現象必然成局，意指生離死別會發生爲事實矣！\n\
    \n理由二、本夫權忌沖命宮【命宮爲廿四至三十三歲的大夫】表徵先天姻緣主緣薄，感應在第三個大運；這就是先天轉化後天、後天返歸先天的命運時空理念。\n\n**鍵是\
    \ J 小姐廿七歲已結婚，尚未走過忌沖年【三十一歲】啊！廿九歲流年命宮正逢走到本夫【即丑宮】年，即所謂時間走到發射宮，而引爆了這場婚姻危機、黯然離婚矣！**\n\
    \n理由三、大夫宮干癸，使得貪狼星化忌入對宮本遷、即酉宮，謂之視同自化的應用，巳、酉、丑三合交叉點，即吉凶處，所以丑宮年廿九歲即感應大夫，後天婚姻運之惡力施虐。\n\
    \n**總結本案例：J 小姐人生的境遇，主突變、善變，來得莫名，去也莫名，含無奈或天意；亦表感情與婚姻，係一種不期而遇的一段情，甚或迅速發展成婚姻的結合。**\n\
    \n**J 小姐民國七十一年、廿六歲，於基隆市不期而遇，認識小她三歲服役海軍的先生，感情迅速發展藍田種玉，立即於翌年廿七歲奉兒女之命結婚了；惜尚未過忌沖年【三十一歲】因此，隨即於廿九歲辦離婚矣！斗數之威力與精準，令人嘆為觀止！**\n\
    \n## 第四節 喪偶？離婚？如何判斷與面對？\n\n上天擁有肅殺之權，由不得您自做主張，相當於生物學的物競天擇，恐龍絕對不是自己咬舌自盡而滅種；天下沒有不散的筵席，在緣起緣滅的循環裡，有多少的無奈、悲情、與感傷？婚姻的道路上，又何嘗例外？上個月，有位警員已擇定良辰吉時，卻因公殉職而留下遺腹子的悲情，緣起即緣滅的浩嘆！意外傷亡、病魔侵蝕而逝？喪偶，是人間悲歡離合之至痛，但又何奈？\n\
    \n紫微斗數命理學，象數的表徵由生年四化象，及本夫的飛宮四化象、大夫的飛宮四化象可窺其端倪，了解先天姻緣之厚薄、有無，及後天婚姻運的吉凶、聚散。\n\n生年四化象為先天定數，可以論述此生男女關係及婚姻的緣起緣滅，所謂【來也生年、歸也生年】正是萬般皆有定數，萬般皆是命數；生年四化象務必要配合星辰論，而星辰具有陰陽五行，可供區分判讀男女關係，茲將區分理則陳述於下：\n\
    \n- 甲\n- 乙\n- 丙\n- 丁\n- 戊\n- 己\n- 庚\n- 辛\n- 壬\n- 癸\n\n1. 至 4 為生數，皆以男性論；例如貪狼星甲木、天機星乙木、太陽星丙火、廉貞星丁火，以上諸星皆表徵男性的星辰。\n\
    2. 除生數之外的星辰，一律以星辰之陰陽分男女說；例如天梁星戊土、左輔星戊土、天同星壬水、皆表徵男性的星辰；巨門星癸水、破軍星癸水、文曲星癸水、武曲星辛金、等諸星皆表徵女性的星辰。眾多的星辰無法一一列舉，請參考拙作《紫微斗數命理學正解一》\n\
    \n以上，星辰判讀男女的法則，可供生年四化象論述這一輩子男女微妙關係；同時，亦可判讀論斷生男育女的法則，往後作者時間允許的話，將會陸續出書再以詳述。\n\n\
    本夫的飛宮四化象為後天變數，可以論述此生姻緣之厚薄、含有無、吉凶等不一的現象說；例如，本夫忌沖本命這是屬於飛宮學八大理則中，第三理則【本命盤的十二官職體用對待關係】其象數的解說：我的配偶為異鄉人，亦表徵先天姻緣主緣薄，成婚較不易、往往是晚婚，同時晚婚反而主吉，若使用【過忌法】忌沖之流年、流月過後，才結婚最佳。反之若早婚不易白首偕老，有生離死別之虞。畢竟先天姻緣主緣薄，早婚會有留不住的意味；尤其是後天行運主悔吝時，即大夫、大命見凶象時，則先天、後天環環相扣，難解矣！\n\
    \n至於，大夫的飛宮四化象，是來描述這十年的婚姻運的吉凶、有無、聚散的問題，是後天的變數，亦關係著一個人成長的背景，如家教、學校教育、社會環境、時代潮流及人生的機遇，影響其兩性觀、婚姻觀、價值觀、人生觀的偏差與否，當然亦影響處理後天的變數，兩性、或婚姻問題的行爲論。\n\
    \n若先天姻緣主緣濃，猶如一部高級賓士驕車，跑遍天下；縱然未必早婚，歡樂青春、少年不留白是最佳寫照；然而後天婚姻運亮起紅燈、主悔吝時，恰似高級賓士驕車，行駛崎嶇不平地石頭路上，顛簸甚巨；此時此刻，您只好減速慢行、耐心地駕駛通過，甚至於還需下車搬移大石頭呢！敬愛的讀者們，每個人婚姻路上，或多或少難免有困厄、失意、欠和諧，甚至於亮起紅燈；但是您必須勇於面對，耐心地去做除草、施肥的工作，以時間換取空間，則一幕一景地更替，紅燈終將轉換成綠燈。擁有美好的婚姻，不是插秧即有好收穫，相對地說不是結婚，就從此王子與公主過著幸福、快樂的生活；這裡面尚需付出經營的功夫，如同除草、施肥的工作，否則那裡來的好收穫？\n\
    \n若先天姻緣主緣薄，猶如一部拼裝車，勉強上路；雖說成婚較不易、往往是晚婚，然而亦不必蓬門未識綺羅香，擬托良媒益自傷。反而應該以開朗的心、積極地行為，面對晚婚作不同的生涯規劃；例如工作與進修交替，工作兩年，再回到學校讀取碩士學位，或者是體制外的進修如學習外語、電腦、紫微斗數、美工設計、美容美髮，擁有第二專長；如此一來既可舒緩晚婚的壓力，又能充實人生，使得您多才多藝、更成熟、有智慧、自信，坦然面對晚婚，同時也克服了晚婚的鬱卒！\n\
    \n賀、可喜！若您懂象數的話，必然更惜緣、惜情，所謂得之不易、彌加珍貴！努力經營婚姻，做除草、施肥的功夫，如是，若後天婚姻運主吉，儼如一部拼裝車，也能奔馳於道路上，恰似一幅農家樂、開著一部拼裝車，載滿收割成果，闔家快樂的景象。\n\
    \n## 第五章 · 婚姻專論\n\n| | |\n|---|---|\n| **案例十：J 小姐** | D |\n| J 小姐：民國四十六年次生人、芳齡四十四歲，基隆市人、從事公關、播音員，廿七歲結婚、旋即廿九歲離婚矣，某女中畢業。\
    \ | D |\n\n> **何年結婚？何年離婚？**借 J 小姐的命盤講解，因此作者將時光倒回十五年前，\n> \n> **命盤呈現出第三個大運命宮**，在本命盤的福德宮，即廿四至三十三歲之大運，以方便本案例之研討。\n\
    \n### 命宮：無主星、只有貪狼星視同自化忌。\n\n- 表徵：一、J 小姐個性較鑽牛角尖，潛意識自卑感有之，然自尊心甚強；此生始終有事與願違、不順的感受，然人生的境遇好壞、冷暖自知，卻不輕易對外人釋出。\n\
    - 二、J 小姐面貌具桃花美，音質很美；可惜人生的境遇不佳，貪狼星視同自化忌的力量作祟，雖說有不斷地緣起，卻始終是不順的感受；再逢自化權，這種權忌的組合最令人無奈，況且先天象數又是權忌組。\n\
    - 父母宮有生權、疾厄宮有生忌，這種同宮、或本、對宮的組合，即構成先天象數是權忌的組合：表徵人生的境遇，主突變、善變，來得莫名，去也莫名，含無奈或天意；亦表感情與婚姻，係一種不期而遇的一段情，甚或迅速發展成婚姻的結合。若婚姻觀不健全，逢權忌雙象則一拍即散、乾脆、不拖泥帶水。\n\
