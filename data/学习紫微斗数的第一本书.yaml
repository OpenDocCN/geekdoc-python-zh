    \n## 「小姐何以廿七歲結婚？」\n\n傳統斷命訣論述姻緣的有無，是本夫決定何十年結婚？再由大夫決定何年結婚？當然，不排除本夫決定何十年結婚，同時直論應數的流年；差異性的關鍵在有無逢自化，因為自化可一直往下應時間。\n\
