    \n## J 小姐爲何廿九歲會離婚？\n\n理由一、J 小姐的命盤結構，本夫宮干癸，使得貪狼星化忌入遷移宮，再逢自化權即構成權忌的組合，轉化成權忌沖命宮，表徵先天姻緣主緣薄，若未過忌沖年【三十一歲】的早婚易有生離死別之象；這種【飛宮象、逢自化象】權忌的組合，平衡了先天象數權忌組合；則現象必然成局，意指生離死別會發生爲事實矣！\n\
