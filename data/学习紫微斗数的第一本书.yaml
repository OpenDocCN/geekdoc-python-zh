  mdcn: "## 第五章 婚姻專論\n\n警察局；甚而狼狽入獄，屆時老公、或地下男友，拿妳的黑心錢娶二奶的現世報。\n\n所謂【知命立命說】依象數的觀點而言，若化忌沖是果報說，係基於緣業本相生的平衡論；然而有果必有因，故當未落果定、果報之前，要懂得做消除【果報之因】的功夫；猶如未釀成火災之前，先移除易燃物的道理是相通地；若時間走到，已落果定、果報，就需立即迅速撲滅火勢，以防火勢漫延而致不可收拾的地步；如是，命運即爲運命，自己主動掌握了人生各各環節，生涯的規劃盡是在藍圖裡，進而達成【知命立命說】。\n\
    \n紫微斗數命理學，依象數的觀點而言，若化忌沖言一種果報說，則化祿位即是肇因位；例如【大夫 化忌 沖 本夫】這十年婚姻宮化忌沖這輩子的婚姻宮，這種象數結構，表徵這十年婚姻運必亮起紅燈，輕者三天一小吵、五天開個家庭運動大會，嚴重者即有生離死別之象；則大夫的化祿位落在子女宮，表徵這十年婚姻運亮起紅燈的肇因，即是子女的問題、或桃花的問題、或性生活不協調。\n\
