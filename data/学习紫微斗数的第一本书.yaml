    結婚絕非取得【睡覺權】的合法，離婚並非換得【睡覺權】的自由；除了「性」空無一物？結婚的真諦：是男女基於有緣的相會，進而有情的相惜，終於有強烈地共同生活意願，爲共同人生目標與願景打拼的結合；因此，就不該、亦不會離婚矣！


    假如您已選擇離婚，務必先站穩人生的腳步，爾後再思索人生的方向，何去何從？當然，紫微斗數命理學亦能幫您，做理性地分析與解惑，無論在工作、事業、財運，及感情或第二春。


    ### 案例十一


    #### 回顧第二節，國中物理教師 I 小姐的命盤，廿八歲結婚、三十三歲離婚了，婚姻維繫不滿五年的光景，究竟為何？人生的命和運，沒有【偶然】卻是道個【自然】的無奈？多少的悲歡離合，盡是在象數裡，多少的因緣果報，盡是在平衡中，平衡於消業、造業的循環裡。


    論斷一張命盤的悲歡離合，須檢視先天姻緣及後天婚姻運，必可窺其端倪，知曉象數之吉凶、時空。


    檢視 I 小姐的命盤，論先天姻緣應由本夫、本田著手研討：


