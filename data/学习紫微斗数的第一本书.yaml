    \n讀者們，假如命盤大運子女宮有自化祿忌雙象，當流年走到時，您們必須遠遠地閃躲，那邊涼快那邊去！猶如敬鬼神而遠之，尚須口唸阿彌陀佛！若戀情已經發生了，則須好自爲之、淡然處理，做好事前消毒作業，莫待祿忌雙象，媒介在化權象的時刻一現，狂風暴雨驟然而至，則束手無策矣！沒法度！\n\
    \n#### ※大運子女宮、有自化科忌雙象\n\n象數的解說：是大運子女宮該宮靜態所得，表徵這十年行運的走勢，所逢遇的桃花運、其屬性表徵藕斷絲連、糾纏、是非、嘮叨、拖拖拉拉。因此男女兩性微妙地關係，出現了棄之可惜、食之無味的憾事，卻有揮之不去的膠著；或者是拍拖甚久卻若及若離、了無新意，不得其門而入，徘徊於捨與不捨兩難中，充斥著焦慮、無奈、難以忘懷的困惑，縱然分手卻也牽腸掛肚，懷念特別多！\n\
    \n因此，假若命盤大運子女宮有自化科忌雙象時，當流年走到時，必須停、聽、看，分析你我的處境、心態與憧憬，爾後再決定是否參與這場乒乓球賽，規限定只可以抽長打球取勝，短打觸殺犯規的遊戲，你我有意願、實力參與這場乒乓球賽？讀者們，否則需要立即閃避走人，莫徬徨、莫遲疑！\n\
    \n上述七種象數的結構，無論是象數、象義的解析，已詳盡地陳述提供讀者們研習，諒必諸君紫微斗數的功力將突飛猛進！同時，有能力檢視紫微斗數的命盤，行運的走勢子女宮有否見凶象？若命盤裡子女宮的垂象，有上列象數之一，請務必注意！立即閃避走人，讓惡性的桃花擦身而過，寧可無情待之、不向情田種愛根；並期盼能自助助人，亦提示周遭的親朋好友，以增進社會的和諧，則社會幸甚！國家。"
