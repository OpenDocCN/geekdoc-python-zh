  md: '# # 紫微斗數命理學

    ## 研究班

    ### 招生啟事


    一、您曾在斗數打轉多年，卻不得其門而入？為什麼？是授業先生欠缺象數系統分析能力？或沒有正確地命理觀、人生觀？導致所教授的內容盡是誤打誤撞、斷章取義、不知所云？好為人師【敢算命、敢教就好、錢賺進來就好。】誰管誰？


    二、您想擁有第二專長？紫微斗數命理學是一門人生哲學、預測未來學，人生的命和運沒有偶然，卻是道個自然；命理學不是一門無限上綱的絕對說，但人卻活在象數裡，恰依您生存實質條件，而言一個人、一件事、物的究竟說；因此象數的分析，可提供每個人知進退得失的生涯規劃，剖析吉凶禍福、悲歡離合、興衰榮枯的命運人生。


    三、若您有興趣參加研究班課程，請來電報名，上課地點：彰化市寒舍，為期一年；外縣市報名滿十二位，當地開班亦可。


