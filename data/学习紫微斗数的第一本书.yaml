    # # 第一節 六十甲子與出生時間的探討


    人秉天地之氣而生，得自於父之精、母之血而孕育成生命體，經懷胎十月脫離母體，剪斷臍帶而成一獨立生命體之當下，即俗話說：出世落土時，命數已定；換言之，依其出生年、月、日、時，感應天體運動之氣，其先天命數已定，復加上後天的運勢，含機遇、機緣，即構成一個人的命和運。


    故凡任何一個人的【命】皆相異，縱使是雙胞胎亦然；雖然承繼父母的遺傳、遺德或遺殃之共同因子，但是每個人的前世因緣果報不一，況且後天又有不同的機遇、機緣，與人事、環境背景的影響。換言之，命和運即由先天化後天，曰【運】是生與成的宇宙進化原理；復有後天返先天，曰【命】此即覆命歸根，是自然的道理。如是，何來相同的命？一人一命也。


    所謂工欲善其事，必先利其器；欲研究命理學必先識其語言，爾後始能再詳論命和運；故以一個人的出生的年、月、日、時，須轉換成紫微斗數命盤，再推研之；如同須知電腦語言的轉換，才能善用電腦解題。唯命盤的製作，則又需先研討'
