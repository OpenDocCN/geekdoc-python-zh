    # 學習紫微斗數的第一本書


    若天干在上，地支在下，同時限定陽干配陽支、陰干配陰支，如是干支的組合：5×6+5×6=60，得六十個組合，若每年使用一個組合表達其流年的符號，則由甲子起，每六十年為一個循環，即俗稱【一甲子六十年】的源流與理則；而每六十年合稱一甲子，則每一百八十年合稱三元甲子；三元甲子為時間最大單位的表達方式，就目前的三元甲子而言：


    上元甲子：民國十二年之前六十年的時間範圍。


    中元甲子：民國十三年至七十二年的時間範圍。


    下元甲子：民國七十三年起，往後六十年的時間範圍。


