    \ 丙 | 田宅宮 | 乙 | 福德宮 |\n| 寅 | 54-63 | 丑 | 44-53 | 子 | 34-43 | 亥 | 24-33 |\n\nE小姐：民國四十八年次生人、芳齡四十二歲，從事房屋仲介有十餘年、勝任愉快、業績佳；唯三十五歲離婚。\n\
    \n命宮：有天相星、文昌星、天姚星、與破軍星視同自化祿。\n\n表徵：\n一、E小姐貌美、皮膚潔白、早熟、聰敏、喜歡聊天、愛打扮、愛穿漂亮的衣服，重視外觀的美感。\n\
