    了解G先生命的本質論，先天命數、姻緣、子女、及兩性關係，皆為先天象數，皆言此生人、事、物之林林總總。


    以上的論述，是本命盤命宮、夫妻宮、子女宮的宮、象、星三合一完整解義,唯关键在后天行运，与成长背景所塑造的人生观、价值观、两性观、婚姻观偏差与否？相对地说，人生之旅在相同的后天行运，却有不同的机遇与处境呵！提供读者们深思！


