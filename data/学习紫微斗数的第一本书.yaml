    每日社會新聞，從未曾間斷過，強姦、強暴、性侵害、性騷擾的報導，幾乎是無日不有、層出不窮；士林之狼、電梯之狼、割臂刺臀之狼、計程車之狼、校園之狼、連宗教界亦不能免疫，那該怎麼辦？尚有搖頭丸、大麻的誘餌與陷阱，普天下的女士幾近於步步驚魂、聞狼風色變，也難怪人際的疏離感、陌生感，持續加速、加劇中，這個社會充斥著不安定、不安全的因子，似乎隨時皆可能引爆任何事端。


    所謂【十年樹木、百年樹人。】為政者能不痛下針砭？!


    紫微斗數命理學，依命盤的子女宮、疾厄宮、奴僕宮，三個宮職的合參，即能明確地、清晰地揭示被強姦、強暴的時空垂象；因此，聰明的讀者們，應依稀還記得，上節作者諄諄告誡提示【改運法】即所謂要【懂得避開空間的因素。】在已知象數的前提下，當時間走到了，在應注意、能注意、而特別注意，避免落單、要結伴而行、不去複雜場所、不遠行、不理會陌生人的搭訕；如是，象數所揭示的流年及流月的時間走過了，又是一幕一景地更替，亦即避開空間的因素，此乃時空錯開法則；相當於俗話說【改運】了。執是之故，掌握應數時間是何年？何月？發生，該是第一要務，作者將以真人真事的個案解析做提示。


    前述的子女宮、疾厄宮、奴僕宮，必見凶象，相當於所得的氣數，有個很壞的交友運，對象包括已認識、或陌生人；同時，身體有受傷害的劫數，游走於惡性地、異性緣起緣滅的恐慌裡；敬愛的讀者們，務必多費心思，研習本節的斷命訣，一則可保身，務必記得時空錯開法則，一則可嘉惠諸親朋好友，可謂人生一大樂事呵！


    茲舉一例闡釋本節理則


    H 小姐：民國四十五年次生人、芳齡四十五歲、已婚，廿七歲出國留學並定居國外，私立某學院德文系、研究所畢業。


    命宮：僅有天馬星、及太陽星視同自化祿。


    表徵：一、H 小姐個性較沉，心裡的感受、好壞較不易釋出。

    二、H 小姐有對大眼睛的外貌、在外人緣佳、風情有之，此生主驛馬，相對地出外功名較易顯彰、主順利。

    三、太陽星視同自化祿，法象生年祿在官祿宮，作定向解表徵 H 小姐傾向國語文的性向；太陽星視同自化祿、再逢文昌星生年科自化科，文昌星表徵附加、衍生，故答案是外文系、或歷史系、考古系、公民系。


    夫妻宮：僅有鈴星、及視同自化科忌。


    表徵：一、配偶的個性較沉，心裡的感受、好壞較不易釋出；唯思考較細膩、周詳，往往是上班族、或學術研究者、或教育、著作、服務業。

    二、夫妻宮宮干庚、視同自化科忌，媒介太陽星化祿在遷移宮，表徵 H 小姐的配偶往往是他鄉之人，含外縣市之人、外籍人士，答案是外籍人士。回顧廿五年前，H 小姐正是花樣年華、讀大一當新鮮人、時年僅廿歲，竟然在舞會中、心裡毫無設防情況下，被同學下迷藥在飲料裡，結局是遭強姦而失身。

    因此，作者將時光倒回廿五年前，命盤呈現出第二個大運命宮，在本命盤的兄弟宮，即十三至廿二歲之大運，方便本案例之研討。


    象數的解說：大運子女宮該宮靜態所得，表徵這十年行運的走势有逢遇主善變、突變，來得莫名去也莫名，含無奈或天意的桃花運。表徵男女兩性微妙地關係，往往是不期而遇，來無蹤、去無影，感情的落幕竟是無疾而終，沒有因爲，也沒有所以；猶如在地球突然消失的飛碟，若流年走到即呈現出如此的桃花運，若不知立即閃避走人，甚而用情太深，則換來悵然若失、感傷、無奈、不平、且不知何去何從？尤其是青少年男女朋友宜特別留心，否則應變不及而受傷害了。


    ### 何以應數在廿歲？

    因為大運子女宮、有生年權又自化忌，有自化必有時間的觀念；應數在一、自化宮、或對宮之年【因為象即氣也、而氣講往來，含本宮、對宮】指示廿一或十五歲。二、法象生年忌定流年，即廿歲。


    ### 為何不是廿一或十五歲，而是廿歲？

    因為強暴、強姦的象數形成，不僅僅是一、大運子女宮見凶象，尙有二、身體受傷害了，即大運疾厄宮見凶象；三、很壞的交友運、對象含已認識之人、陌生人，換言之、大運奴僕宮必見凶象；如是三點決定一個面，時、空的交錯須兼顧三點的共同交集，相當於取得最大公約數；執是之故，須再論大運疾厄宮、大運奴僕宮，方能定奪。


    大運疾厄宮、宮干丙，廉貞化忌在卯宮、忌沖本命盤的疾厄宮，【大疾 忌沖本疾，同類宮職的用 忌沖 同類宮職的體，必見凶象；請參閱拙作紫微斗數命理學一、飛宮學八大理則、理則四。】表徵這十年身體健康所得之氣數，亮紅燈矣！而廿歲流年命宮、正巧走到卯宮年，感應此象數、身體受傷害了。


    大運奴僕宮、宮干甲，太陽星化忌在申宮，忌沖本命盤的命宮，【大奴 忌沖本命，任何宮職 忌沖 本命盤的命宮，必見凶象；請參閱拙作紫微斗數命理學一、飛宮學八大理則、理則五。】表徵這十年所得之氣數，是很壞的交友運；而申宮正是廿歲流年奴僕宮，故感應此象數是在廿歲，損友下迷藥的設計，因此殘遭狼吻的悲痛！


    前述，大運子女宮、大運疾厄宮、大運奴僕宮，皆見凶象；空間的理念係指這三個宮職的靜態、動態之象數所得，站在桃花註解判讀是吉？或凶？若果爲凶象，即構成被強姦、強暴的斷命訣；同時取得最大公約數，答案是廿歲。


    本案例，一、H 小姐大運子女宮得生年權又自化忌之象數，主不利、主凶象，表徵主善變、突變，來得莫名，去也莫名，含無奈或天意的桃花劫；這是被強姦、強暴的斷命訣，必先成立的大前提。爾後再論述：二、大運疾厄宮亦見凶象【大疾
    忌沖本疾】三、大運奴僕宮又見凶象【大奴 忌沖本命】如是，空間的理念即告成立，要特別注意不落單、不被設計、不去複雜場所、不遠行、不理會陌生人的搭訕【時空錯開法則】是最佳趨吉避凶法則。


    時間的觀念，何以應數在廿歲農曆十一月四日聖誕夜的舞會？

    【天垂象、示吉凶。】上述已綜括強姦、強暴斷命訣空間的理念；而時間的觀念、分為應數與在數，所謂應數係指時、空的交錯，事情發生的流年，所謂在數係指何月？何日？何時？


    應數在廿歲，請讀者複習前述，剖析空間的理念，已明白指出。

    至於，在數何以發生於農曆十一月四日聖誕夜的舞會？

    因為大運子女宮在戌宮、有生年權又自化忌，有自化必有時間的觀念；可直論應數、或在數，因此戌宮即為農曆十一月流月的子女位，辰宮即為農曆十一月四日、流日的命宮【因爲象即氣也、而氣講往來，含本宮、對宮】當然，流時即爲戌時。農曆十一月四日戌時，正是國曆十二月廿四日聖誕夜的舞會。


    人活在象數中，斗數的威力不僅能判讀空間的理念，是吉？或是凶？是一門生命運的究竟學，同時指出時間的觀念，應數於何年？在數於何月？

    因此，懂象數之人其應變之道，應用【時空錯開法則】是最佳趨吉避凶法則；


    在提示的流年、流月，應特別注意不落單、不被設計、不去複雜場所、不遠行、不理會陌生人的搭訕；使得時間雖然走到，但應特別注意使得空間的要件錯開、時空交集不成立，確保身體不被狼吻的悲情。作者十七年來，斗數教學與命理諮詢，女士來訪者若有此象數結構，作者皆主動提示應特別注意、小心。

    最後，借本案再複習，女士要突顯出吉祥地顏色，可在唇膏、眼線、圍巾、帽子、手提箱、高跟鞋、塗指甲、洋裝、裙子、洋傘、腰帶、外衣、褲襪等顏色的搭配，唯美加上突顯出吉祥地顏色，則必然能增強形象、擴展人際關係、無往不利。

    H 小姐可選擇辛干【文曲化科】壬干【左輔化科】癸干【太陰化科】的顏色表徵，即純白系列、淺黑系列、深黑系列的顏色，如清白色、象牙白、純白色、淺灰色、鐵灰色、淺黑色、暗咖啡、墨黑色爲主；搭配丙干【天同化祿】的顏色爲輔，即鮮紅系列的顏色、如粉紅色、珊瑚紅、朱紅色。


    ## 第五章

    ### 婚姻專論


    天地之氣，合而為一，分爲陰陽；陰陽之義配日月，日月正是陰陽之精華，陰虛則陽盈，陽消則陰長，陽動生陰，陰動生陽；是故日月爲一體之兩面，取法日月合明、陰陽合德、剛柔相推，萬物隨之生化，促使宇宙造化無窮！


    男女的合和，正是人類永續生存之必要條件；剛柔相推，是社會進步的原動力量；陰陽合德，是人性和諧的基石；唯自有人類存在迄今，男生、女生的戰爭與紛擾，持續不斷地上演，古今中外皆如是；兩性之間的樊離、挑釁與對抗，究竟是原始既有？亦或兩性的學習不足？兩性相處是一大藝術呵！阿扁總統曾經意有所指地說：副總統的辦公室距離我越遠，則空間較寬敞；距離我越近，則空間較狹小。化解了深宮怨婦的政治風波，唉！兩性共治是願景。


    戀愛、婚姻是一場兩性共同遊戲，與相互學習的人生經驗，更是一件嘔心瀝血、美學十足的雕塑品呵！人生漫長的歲月裡，是一場充滿著學習之旅，兩性相處的藝術亦如是，讀者們以爲然否？今作者清唱一曲元朝的我儂詞，以喚醒普天下男女，健康的兩性觀，倡導人性的光輝，期盼社會更和諧。


    「你儂我儂、忒煞情多；情多處熱如火；把一塊泥，捻一個你、塑一個我，將咱兩個一齊打破用水調和；再捻一個你，再塑一個我。我泥中有你，你泥中有我；我與你生同一個衾，死同一個椁。」


    ### 第一節 婚姻論斷之入門功夫

    紫微斗數命理學，是一門宮職、星性、四化象三合一的完整解義學，內含理、象、氣、數具足的一體論；因此本節婚姻論斷的入門之基，先依宮職、星性、四化象，分別介紹之：


    **依宮職而言的基本認識：**

    命宮：表徵此生我所有的一切，係原太極位統管所有的宮職，含婚姻、桃花、疾厄、出外、事業、財運等等，所謂皮之不存、毛又焉附？原太極位是本節婚姻論斷，極重要的宮職。


    夫妻宮：異性姻緣位，表徵本人的婚姻觀及先天姻緣之厚薄，亦象徵配偶的個性、才華、家世，及應數何年、何月？結婚，能否白首偕老？有無婚姻危機？對待關係如何？


    福德宮：本宮對婚姻深具影響力，尤其是女命以享福為基；福德宮既是自己的享福位，亦表徵先生的事業狀況興盛？衰敗？的宮位，就傳統地斷命學而言，可視同第二個夫妻宮。因此，審視命宮、夫妻宮、福德宮，即可了解先天姻緣之林林總總。


    財帛宮：以夫妻宮立太極，則財帛宮為夫妻宮之夫妻位，表徵婚後的對待位；所以審視命宮、夫妻宮、財帛宮，即可了解婚後夫妻對待關係的好壞。


    疾厄宮：表徵自己身體的宮位，與命宮視為一體論，即紫微斗數配河圖數的妙用，命宮為一、疾厄宮為六，即一六共宗之應用。


    奴僕宮：表徵配偶的身體位，以夫妻宮立太極的疾厄位；此刻，設定夫妻宮為一、奴僕宮為六，亦屬於一六共宗之應用。


    田宅宮：表徵成家之宮位，亦象徵婚姻之破敗位；係以夫妻宮立太極之奴僕位【凡任何宮職的奴僕位，即是該宮職的破敗位。】以上，命宮、夫妻宮、財帛宮、疾厄宮、奴僕宮、田宅宮，共六個宮職合稱為婚姻六內宮；關係婚姻有無、成局的先決條件。


    **依星辰而言的基本認識：**

    夫妻宮有四煞星，則影響婚姻的和諧，各有其不同程度的惡力存在，所謂四煞星即羊刃星、陀羅星、火星、鈴星；而以羊刃星、陀羅星的破壞力較強，夫妻易大吵、甚或肢體語言。火星、鈴星力破壞力較弱，夫妻易冷戰或相罵。唯若羊刃星坐命宮，陀羅星坐夫妻宮，婚後雙方的和諧度最差，終生座右銘應以【忍】字化解，忍者龜也。


    夫妻宮有天刑星，夫妻之間意見較不易溝通，精神面呈現出孤虛感；係指雙方人生觀、價值觀、婚姻觀有差距，故往往話不投機半句亦嫌多、或意見不合，但非同床異夢的錯誤解說。因此，可築成一組平行而共存的生活圈，例如一個看晚報，一個在插花，各忙各的、默默無語、相安無事矣。


    夫妻宮若在未宮，有武曲星、貪狼星、文昌星、文曲星，或天相星、文昌星、文曲星，或太陽星、太陰星、文昌星、文曲星；皆表徵先天姻緣不佳，此生多感情困擾，往往晚婚，且晚婚較吉，若早婚易有生離死別之象。


    命宮、夫妻宮、福德宮，此三宮職若有桃花星、貴人星太多，則表徵先天姻緣主不美；此生，無論婚前婚後較易有感情困擾。

    *   **桃花星**：天姚星、貪狼星、廉貞星、文昌星、文曲星、紅鸞星、天喜星、化科星、化祿星。

