    至於，該宮獨立的線性平衡，即該宮的飛宮四化象，若逢遇自化象、或生年四化象，則勢必發生象與象的碰撞；如此一來，線性平衡立即躍升至平面的平衡或立體的平衡，稍具複雜性，需以實際個案，命盤的解說較易懂、或者俟爾後的機緣再出書、或開班授課則較有寬廣的討論空間。


    ## 今舉一例闡釋本節理論


    ### **案例七：G先生**


    #### （表格内容）


    G先生：民國四十九年次生人、今年四十一歲、已婚，從事某食品公司外務員，台南市人。


