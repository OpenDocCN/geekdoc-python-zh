    \n## 第四章 桃花專論\n\n### ※靜態的認識觀\n\n- 大運子女宮、有生年權又有自化忌\n- 大運子女宮、有生年忌又有自化權\n- 大運子女宮、有自化忌\n\
    - 大運子女宮、有自化權\n- 大運子女宮、有自化祿忌雙象\n- 大運子女宮、有自化科忌雙象\n\n#### ※大運子女宮、有生年權又有自化忌\n\n象數的解說：是大運子女宮該宮靜態所得，表徵這十年行運的走勢，有逢遇主善變、突變，來得莫名、去也莫名，含無奈或天意的桃花運。表徵男女兩性微妙地關係，往往是不期而遇，今夕何夕？見此邂逅，及【偶然】一詩，該是最佳寫照。\n\
