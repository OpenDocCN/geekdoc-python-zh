    周先生笑着说：『几百万元是小钱，那要什么才算大钱呢？』


    我接着说道，若这种带有投机的金钱游戏，唐小姐应该还有其他玩得更大项目才对。


    先后天的羊陀和化权进入财帛宫，就可能玩上更大的金钱游戏。三年赚几百万元是小意思，那唐小姐必然还有其他更大金钱投注。


    『还是从实招来吧』周先生语带调侃的说道。


    『没有啦！这几年，偶而也透过一位在外国银行作事的朋友，买卖外币，赚赚利息和汇率差额而已，是多少赚了点钱，但也不多呀』唐小姐终被周先生一样样地掏出她的生财之道。


    据唐小姐说，近年来英磅因英国景气关系，不但币值率常有大起伏，而其利率奇高。因此一些有资金的玩家，除了玩股票之余，也会把钱投入英磅上，德国的马克也有人介入只是企求得利的方法略有不同而已。


    这种外汇的投注得失，有时也跟股票的输赢，同样会使人高兴得如飘上云端，当然也会有掉入万丈深渊的痛苦。虽然在介入资金前，都会从技术面分析再分析。但有时人算不如天算，上百万元的资金，常会在几天中，眼睁睁的看它流失而跺脚不已，唐小姐把外汇炒作的情况约略作了解说。


    『原来我们这位大小姐，的确是生财有道，否则我才不相信，你只在那个麻雀似的两家公司，就会有这么好的收入，让你一年接着一年的买房子。』周先生吁了一口气接着又'
