  mdcn: '因此，純投資結果要如何論斷，就須以流過的福德宮吉凶，作為論斷依據了。陳先生目前在臺南一家電子公司當主管級的工程師，他是我認識年輕朋友中，狂熱於斗數業餘研習的一位。己巳年中，有一次在我南下臺南公差時，他提出兩個純投資的命例來討論。


