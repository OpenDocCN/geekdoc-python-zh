- md: '## 賭徒的衆生相

    ——從財帛宮看賭博的命理格局


    認識吳先生，這位斗數命理界的后起新秀，就在戊辰年中。


    有次，和幾位同好在茶館里擺龍門陣的時候，由於他言談之間的謙虛和對斗數認知略異他人，因此讓我留下深刻印象。也許是投緣吧！從此以後經常通電話討論一些命理的瑣碎雜事。


    己巳年中，有天我路過他的住處，順便造訪，才知道他在斗數命理方面，年紀輕輕的，就有那種與衆不同的觀念和執着，這大概跟他平時博覽群書、熱愛真理的求知態度有關吧。


    浸淫命理二十多年，認識的同好不少，但在較年輕的一輩里，像他這樣熱衷于斗數的，還真不多見。真希望他能好自爲之，有朝一日，給這個混沌的斗數界，厘清出一條坦蕩大道來。


    閑談間，他提出了斗數命理，在求財格局上某些特殊狀況。近年來臺灣社會，各階層人士上焉者炒地皮、飆股票，下焉者賭錢、玩六合彩，幾使我們這個社會成爲狂賭王國。他在近幾年的論命間，偶而也會碰到一些嗜賭成性的客人。在累積較多的實例經驗以后，發現到在賭徒的命盤上，幾乎都有某些共同特點。因此他從舊檔案里，抽出幾個命例，逐一指出他在《賭》方面所理出的命理觀點，和推演方法。


    于是，我提出個人的看法說道：「炒地皮玩股票，固然帶有賭運氣成分，但在命理和現實條件上與賭博略有差異。以現實條件而言，這兩樣的人，都必須先擁有某程序的財力，否則運氣再好也炒玩不起。但賭金錢和玩六合彩，卻可賭大也可賭小，受金錢限制就更小了。


    打比方說，打電動玩具可以有純為松懈心神而娛樂的機種玩法，也有可輸贏金錢的吃角子老虎，和數不清種類的玩錢機臺。一個寓樂于賭錢的玩家，他可能就會對純娛樂的玩法，感到索然無味。若從這個觀點來觀察，這兩種電動玩具的人，在命理迹象方面，應該也會有某些差別。


    于是吴先生先指出這個林姓的命盤說道：


    「這個客人，于乙丑年（一九八五）間，因賭錢前後輸掉二百萬元左右。


    乙丑年三十一歲，大限在壬午運，壬午使武曲化忌在限過的財帛寅宮，這宮位的地劫和陀羅，歷忌星引動而逞害。


    乙丑年，流陀在寅宮，除了增強寅宮的凶象之外，流羊進辰宮和先天擎羊同踞，使由這一年的羊、陀兩大煞星與寅宮的忌煞，同時冲向先天和大限的福德宮位。行運如此，一旦坐上賭桌，將會有輸無贏。」


    我對吴先生說：「基本上我同意你這個論點。另外我想提出個人的看法供參考，在推論賭和機器賭錢，應該屬於新時代才有的賭博。賭法也許不同，但賭徒在命理上，必有其共同命理跡象。玩電動玩具，玩到輸掉兩百萬元，能說不是賭錢嗎？


    錢的案例前，必先審視命身格局的架構，其次再看先后天的限運與財帛宮。尤其須注意到先后天財帛宮的星曜組合。因為財帛宮，也是顯示一個在求財方式上的某種偏向。


    問道。

    『那么福德宮的《理財》和財帛宮的《求財》在作用上又有什么區別？』吳先生疑惑的段或方法。所以財帛就作《求財》方式解了。

    若從這些觀點來看這個命例，他之所以會賭錢，除了賭錢會有感官刺激以外，也顯示出他在求財手段上的傾向，所以一般有賭錢嗜好的人，命盤上的財帛宮都會有某些共同特點。


    這位林先生，先天財帛宮七殺與擎羊同宮。這個組合落在財帛宮，使他在求財上，帶有一種為求財不擇手段的心態。這個人在后天行運若又遇財帛宮再度逢煞星時，一旦有賭錢的環境與機會，就較會在這個方面顯示出來。


    壬午大限財帛宮在寅，有地劫、陀羅同宮，武曲遇化忌，使這個宮位忌煞引動而逞凶。因此在理論上，這位林先生，就在大限運行入壬午宮階段，充分引動了先天潛在的那種求財不擇手段的意識，于是他一有機會，就會去玩這種金錢遊戲。


    『武曲為財帛主，遇化忌而損財，何況會先天福德戌宮的廉貞，而有《財與仇囚》的凶格。這種情況會和他的賭錢，有關鍵性作用嗎？』吳先生提出更細微的問題。


    武曲為財帛主，遇化忌與先天福德宮廉貞成爲凶格，應該属于在此限運里，金錢上有虧損作用。這個忌星之于賭錢關系，我認爲還是作用在寅宫所引動的忌煞呈凶，這會使先天的賭性，在此限運凸顯出來。因此若刻意把因有武曲化忌而賭錢，那豈不是先后天限運不過壬干的人，就不會賭錢了？


    大限紫微化權與武曲化忌，這種權忌組合，會使一個人性格趨向頑固，若出現在賭錢方面，就有軌迷不悟的現象。當然化忌在財帛主的武曲星上，就更會讓他在屢賭屢輸情形下不知回頭。


    這位王先生于丁卯年（一九八七），『大家樂』賭風盛行的時候，也財迷心竅地壓了一陣寶，結果正是偷鷄不成，反蝕了一大把米。年紀輕輕的就輸掉五十萬。


    吳先生問說：玩『大家樂』和其後盛行的『六合彩』嚴格講起來，也算賭博嗎？


    應該把下賭注，憑賭技，靠運氣來輸贏金錢或彩金的游戲，全部包括在內。因此諸如臺灣的六合彩、大家樂、澳門瓣賽馬和賽狗、東南亞地區的玩斗鷄，英國大選每逢保守黨和工黨競爭得難分軒輕時，賭博公司便會乘機公開舉辦猜測那黨輸贏和可能得到多少國會議員席次的賭注。參加這種游戲的人，都要下賭金。最後半靠主觀與半靠運氣，輸掉賭注或是贏得彩金。這種金錢輸贏，和領取薪資酬勞或投資紅利報償性質截然兩樣。


    據說，在大家樂橫掃臺灣的時候，跑在高速公路的野鷄游覽車，只要車上有人當莊家，就可以和同車乘客，玩起「站站樂」。這個玩法就是由賭客來猜測，下一個收費站收到的收據號碼，有猜最後個位數的，也有猜兩碼的十位數的。個位數的彩金倍數較低，十位數的當然就比較高。全程的收費站賭下來，豈不正是站站樂歪歪？


    所以玩大家樂和六合彩的人，在命理上，應該可以列入賭徒之列。


    吳先生接着說道：


    王先生的先天財帛宮，有機陰祿存和鈴星在寅位，若把火鈴和太陰合為「十惡」凶格，豈不是在他先天命格里，就帶有這種求財不擇手段的意識存在。到了辛未大限，因辛干使文昌化忌沖寅宮，因而引動「十惡」這個先天財帛宮位的凶性發作。


    辛未大限，不只使文昌化忌引動先天的這個惡格，限運本宮廉貞七殺并坐地空，限運財帛卯宮，有紫微貪狼和地劫、擎羊。這種會《紫府朝垣》的《殺破狼》限運，加上先天的《三奇嘉會》，使命造的主人，在處事心態上滿懷雄心。但若另從限運會空劫，所造成的波動賦性而言，這也會使他產生一種不腳踏實地，而好高騖遠、眼高手低的做事心態。另外，這種先天命格，再加上后天如此運限，他在一般的處事待人方面，也會有某些异于常理的表現。


    若從大限財帛卯宮的組合來看，這個宮位的紫貪加上擎羊和地劫，正是會使他在《求財》的理念和手段上，顯現出上述那種不務實的心態。一旦沾上簽大家樂賭注，他會跟其他人一樣迷失在大家樂上，這種先后天的財帛宮現象，正是促使他迷上大家樂的命理因素。


    輸掉五、六十萬元，對於個有錢的中年人，不算大錢，但對一個年僅二十來歲的年輕人，就不是小數目了。


    「那么以這個年輕人，辛未大限福德西宮的陷弱，是否和他賭輸大錢，有某種因果關係？」吳先生問。


    「他的先天福德宮在申，無甲級星曜并會忌煞，即為陷弱。大限福德西宮，同樣是空宮又會羊陀兩大凶星。因此，這個酉宮的陷弱更甚于申宮。


    先后天的這種福德宮，若以勞心勞力去求取財利，已經是事倍功不半，若再妄想用什麼捷徑手段去求財，那豈不更是椽木求魚。因此一旦讓賭沾上了手，輸錢應該是意料中情事。」我說。


    「于是我開口念出一個生辰年月日，請吳先生排了命盤，并說，這個人閑暇無聊時，會去打電動玩具或『拍青哥』之類的消遣，并賭賭運氣。雖然他迄今未涉足過一般的賭場，但每一進出這種游戲場所，少則輸贏三、五百或上千元，但手氣特順或特背時，也常有三兩千元的輸贏。


    「這種花一找娛樂的消遣也算賭博」吳先生不勝詫异地問道。


    「怎么不算賭博？有賭性的人，不只在娛樂方面可以賭，在運動場上照賭不誤」


    被人說成貴族運動的高爾夫球，也被賭興大的玩家，拿來比球技，圍杆數，定輸贏。十八洞打下來，會有很多下賭項目：諸如算杆數、得博蒂（Bogey）低標準一標進洞）、罰界外球（Over
    of Boundary 簡稱 O.B.）、比近洞（Near Pe），甚至前後各九洞的半條龍，十八洞全贏或全輸的一條龍，花樣之多，可以隨興而定。這些既有錢又有閒的大爺，一旦賭起輸贏，賭注之大，會叫人咋舌。


    曾經有位太太找我論命時提起，他先生只喜愛打高爾夫球，三天兩頭和球友往球場跑。她問我打球所化費用，會否太貴？


    我說，有會員證者，打一場十八洞球，約在七、八百元左右，借會員證使用，約在一千兩、三百元上下，若是兩項都沒有，可能就要在二千到三千多元之間，收費高低視球場而定。


    花費也許多些，但的確寓運動于娛樂，只要花得起，總比花天酒地來得有價值。


    讓她覺得很納悶的，據她了解，近年來她先生，每年花用在打球上的費用，要高達二、三十萬元之多，所以家人說，他是貴族中的大貴族。


    她不知道，她這位貴族先生，也沉迷在高爾夫球的輸贏遊戲里。


    又有一位媽媽曾經向我說，她一個讀初中的小兒子，命中是否『漏財』？否則每個禮拜的零用金要多到兩三千元？


    我看了命盤后向着她說：這個小孩會否去打電動玩具？


    她說，偶而會去玩，功課之餘，讓他輕鬆一下，該没什么壞處吧？


    問題是，他在打輸贏金錢的電動玩具，難怪零用錢再多也不夠花。經我這一提醒，才使這位母親警覺到，她這個寶貝兒子所以會花錢太凶的原因。


    命理如一把利劍，行善為惡，全在談者的一念之間。『賭性』的命理探討，有時也可以給人指解迷津。


    吳先生聽完這些賭徒奇譚后，看着命盤說道：『這位許先生，果真在先后天的財帛宮（己巳年，大限在壬午宮）都會忌和忌煞凶星，難怪他一起玩起電動玩具，會對輸贏金錢產生興趣。』


    『先天財帛宮太陰化忌又落陷宮，大限壬午，武曲化忌冲財帛寅宮，使寅宮火星與陀羅引動凶性。這一引動，使破軍陀羅成為『决求乞』的『暗耗』凶格，也會使火星與破軍成為『水火交戰』的克害。好在他的先天財帛宮，還不成凶格，否則他恐怕不只玩電動玩具，以大限財帛宮的凶象，很可能叫他陷入更大輸贏的賭博泥淖里。』


    在命理上，倒不能說，有這種命理迹象的人，必然會去賭錢。但却可能在一個有『賭』的環境里，比較會傾向玩上各種賭錢的游戲。


    吳先生又問：『賭輸錢，比較容易分辨論斷，但賭贏錢的命盤常會混淆不清。在賭徒的命盤上，對此能作涇渭分明的辨别嗎？』


    當然可以，不過還是不要明談的好，以免有干天和。以后再碰到這種客人，就說久賭必輸，勸他別再做這種會使人破財又身財名裂的傻事


