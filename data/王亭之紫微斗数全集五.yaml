    關於這個問題，必須先了解兩個很重要的宮位用法。


    「福德宮」的生財，是指利用原有資金生財的「財」。因此也是一個「庫」的宮位，這個「庫」是屬於「動產」方面的「庫」。這個「庫」吉又旺時，就可以經過「純投資」來生財。


    買股票，就是一種純投資。


    「田宅宮」通常也作「庫」論，但這個「庫」，比較偏向于「不動產」方面的「庫」。一些豪門巨富的這個「庫」必然既吉且旺。


    若論這兩個「庫」在財富上的比較，「田宅」之「庫」的富，自然會比「福德」之「庫」的富，來得更加強大。


