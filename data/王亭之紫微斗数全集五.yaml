  md: '限內發生危機嗎？


    『他目前經營的這家公司，開始于什麼時候』我問道。


    居士么弟說：『大約在己巳大限的后半限內，詳細的年份不很清楚。』


    于是我又接着說道：『那么他進入戊辰限后，他的這家公司一直呈現快速發展。因為己巳限的已干武曲化祿，正好是戊辰限所坐的主要星曜。到了戊辰時，適時的又有戊干使貪狼化祿來接龍，何況戌宮的貪狼化祿后，使『火貪』的橫發格局作用，發揮到最大。


    除此之外，辰宮坐左輔，右弼在戌宮，因左右兩星的互為牽引作用（成對星曜），會使戌的雙祿交馳和『火貪』吉象發揮到極點。


    大限事業申宮紫府廟旺，三合方也是個會左輔的紫府相大結構，事業應該越做越大才對，因此這個限運的事業如何，就需從他在那一個限運開始經營為基礎來推論。


    居士么弟半帶疑惑的又問道：『那么大限引動先天事業宮在亥的忌煞交冲，絲毫都沒有凶象作用嗎？』


    『當然也有作用。』我很肯定地答說：


    第一，他若在這個限運，才開始的新事業投資經營，將會呈凶，就作不好論。


    第二，事業經營愈大自然會愈忙碌，就會有顧此失彼的現象。俗語說：『拳』字頭散散。在這個年頭，不管要經營好那種行業，那有不忙碌，而可優哉游哉的，應該是如此而已。'
