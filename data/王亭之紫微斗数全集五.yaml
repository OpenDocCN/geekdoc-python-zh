    唐小姐在看完書后，一直嚷着要周先生帶她來和我見面。在幾經安排后，己巳年底有天下午，终于在一家茶馆會了面。


    唐小姐在泡好茶后說道，她的斗數命盤，曾經有幾位高人看過，但都用命身破軍坐戌宮的盤來論斷，因為他們都說這個命盤的宅宮爲太陰化祿的〈日月照壁〉格局，所以才會買那么多不動產。又因爲先天財帛宮七殺祿存，所以賺錢才會那麼容易。


    也許戲法人人會變，各有巧妙不同。不過另有一點可以佐證命宮在酉的盤較正確性


    唐小姐說，小時因家庭境遇關系，家居可能居無定所，甚至有寄人離下的漂泊的遭遇。


    下日子，這也許正是造成以後經濟狀況好轉，會一再買房子的原因。


