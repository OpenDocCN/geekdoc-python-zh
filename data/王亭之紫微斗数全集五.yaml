  md: '# # 李大娘的退票


    ——從財帛宮談賭徒的命格

    己巳（一九八九）年中，有一天上班時間，財務部的會計小姐，送來一大堆傳票待審核簽字。驀然，在一個紅色卷宗里，看到一張傳票登錄着，要從銀行調回三張本欲托銀行代收的支票，三張支票都是南部一客戶—李大娘所開的，這個銷售本公司產品已近十年的客戶，一向業績滿大，信用極好的，怎麼會突然間要求收回已付帳款的支票，難不成信用出了批漏？於是，我給在南部的經銷商——黃先生撥了個電話，想了解個中究竟。黃先生接了電話后，唉聲嘆道，他會給李大娘害慘，已付帳的支票有四十多萬無法兌現，而未付的帳款，也近四十萬元。他在電話中懇求，希望公司能給他時間處理這筆爛帳。

    我們公司產品采賣斷的經銷制，因此，所收客戶的支票轉付公司，一旦不能兌現，仍需由經銷商負責兌現。二十多年來這類呆帳實在不計其數，也的確難爲了他們。

    談完電話后，我才想起，約在十年前，當我還兼任營業部主管時，經常會到各地拜訪客戶，了解市場。就在一次南下訪問李大娘時，在約略了解產品銷售情況以后，李大娘要幫我看看店里的櫥窗應該如何擺設、店門應該開在哪一邊

    不知道她爲什麼會問我這些？因此推辭說：『你怎麼會問我這個？我又不是地理師』

