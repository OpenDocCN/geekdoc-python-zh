  md: '**辅**，先天禄存又由卯宫来会。


    流年本官不凶，福德宫又吉大于凶象，为何洪先生会在这一年被倒帐？华先生思考周详的提出疑问。


    **这个疑间涉及斗数命理论事项上的两个关键问题**：


    第一，洪先生把钱存入投资公司在戊辰年，而非己巳年。因此已巳年发生的倒帐，不应该把它定在己巳流年的福德未宫。也就是这笔倒帐的重点官位，理论上，应该定在午宫里。


    这午宫在戊辰年时的凶象，已如前述，只因流年太岁宫位很吉，所以才无被倒债之事发生。


    **第二**，丙戌大限福德宫在子，子宫的凶象也已如前述市。但已巳年文曲一化忌时，辰官即被己宫的廉贞化忌（大限）和文曲化忌夹制。这一夹忌使辰宫的《财散》凶格引发其凶性而冲激子宫——这个大限的福德宫。


    若再以存钱流年的天机化忌，作为前因后果的缘起缘减》，不就使戊辰年存钱造成的因，到己巳年而有倒帐的果了吗？


    **华先生说道**：「你这个《缘起缘减》的运用方法很玄妙，这种推论方法，我很认同，也屡试不爽。但以这种命使来论，若将子宫定为被倒帐的重点宫位，那么到了己巳年，流禄入午官照子宫，武曲化禄也会先天福德宫。


    因此已巳流年，在使先后天福德宫都吉化之下，为什么又会被倒帐？」


    **华先生不愧老谋深算**，客人多，阅历丰富，因此推命析理精辟入微，很令人钦佩。'
