    # # 李大娘的退票

    ——從財帛宮談賭徒的命格


    己巳（一九八九）年中有一天上班時間財務部的會計小姐送來一大堆傳票待審核簽字驀然在一個紅色卷宗里看到一張傳票登錄着要從銀行調回三張本欲托銀行代收的支票三張支票都是南部一客戶李大娘所開的這個銷售本公司產品已近十年的客戶一向業績滿大信用極好的怎麼會突然間要求收回已付帳款的支票難不成信用出了批漏？於是我給在南部的經銷商黃先生撥了個電話想了解個中究竟。黃先生接了電話后唉聲嘆道他會給李大娘害慘已付帳的支票有四十多萬無法兌現而未付的帳款也近四十萬元他在電話中懇求希望公司能給他時間處理這筆爛帳。


    我們公司產品采賣斷的經銷制因此所收客戶的支票轉付公司一旦不能兌現仍需由經銷商負責兌現二十多年來這類呆帳實在不計其數也的確難爲了他們談完電話后我才想起約在十年前當我還兼任營業部主管時經常會到各地拜訪客戶了解市場就在一次南下訪問李大娘時在約略了解產品銷售情況以后李大娘要幫我看看店里的櫥窗應該如何擺設店門應該開在哪一邊不知道她爲什麼會問我這些？因此推辭說：『你怎麼會問我這個我又不是地理師』沒想到她卻開門見山地說道：『你是行家你們黃先生再三推薦過你精于此道相**信**你也希望我這個店能生意興隆才能多賣你們的產品吧！』


    好個能言善道的老板娘難怪同業間會稱呼她「李太娘」。既然如此我只好硬着頭皮當場起了她的斗數命盤并在附近的文具店里買了個小指南針略測方位才給她稍作些微更動的建議。十多年來我不知道給我少客戶做了類似的免費服務作生意嘛有時額外的這一套也着實幫助我拉短經銷商和客戶間的距離間接地使客戶更樂意銷售公司的產品學命理原為興趣沒想到還會有這些收穫李太娘言行舉止的爽朗使人印象深刻印象中她的生意堪稱山城的首屈一指怎麼會落到今天支票無法兌現的地步回家后我找出舊檔案發現就在幫她測店鋪方位的那年——辛酉年（一九八一）原留有當時的評語紀錄：慎防丁亥限后期因賭而破財。


    第二天我又給管轄的經銷商黃先生電話提及當年應該跟他提起李太娘就在四十歲前後會因賭破財的事作批發生意很忌諱客戶有這種敗財的事情為何黃先生這個經驗老到的老經銷商竟然沒有發現到李太娘會败财败到無法償付貨帳？


    據黃先生電話訴苦李太娘開始銷售我們公司產品以後生意一直不錯近十年來着實也賺了些錢家居生活也還儉樸不知道為什麼到了丁卯年（一九八七）中開始簽賭「大家樂」待「大家樂」因愛國獎券停止發行后接着賭起「六合彩」。原先只是偶爾簽賭運氣漸漸的越簽越大也跟一般鬼迷心竅的賭徒一般信起求『明牌』的鬼把戲。


