  - "[PAGE 139]\n\n太陰化忌。這個限運使先天財帛午宮成為雙忌夾，這一夾制，也使羊陀產生夾制午宮的煞\n害作用。因此李先生限入乙巳運時，當年的鴻福財運，已經一去不復回。」\n\
    \    高先生語帶詫異的問道：『乙干也使天機化祿，使已宮大限另成雙祿交馳，不也有呈\n    祥作用嗎？』\n    『沒錯，是先生天和限運雙化祿，使巳宮成雙祿交馳。但乙干也使太陰由祿轉忌，由\n\
    \    此忌星另引動兩個凶格的作用。』\n    其一，祿星與亥宮天馬會已宮陀羅，使吉象的『祿馬交馳』成為帶凶的『折足馬』，作\n    起事來難稱心順利。\n\
    \    其二，太陰化忌會亥宮火星，成為『十惡』凶格，若在這限運換了新的老板上司，當年\n    那種既和諧又信任的主從關係，就不復存在。\n    『那么午宮原來就是羊陀夾祿，為何在丙午大限時，羊陀對午宮不生夾害牽制，一旦\n\
    \    到了乙巳限途，就會使羊陀對午宮產生不利的擊肘作用？』高先生仍然不解。\n    『這個道理，要根據祿星同宮的星曜來作為判斷依據。同宮的星曜若強盛，則羊陀會\n\
    \    如包青天身邊的兩大護衛王朝馬漢保護着它。若祿存獨坐，或同宫里曜陷弱，甚至會煞大\n    凶，則羊陀就成身邊的兩大奸佞小人，虎視耽耽地想欺凌主人。』我回答。\n\
    \    丙午大限，使午宮成為雙祿輔祿，所以羊陀成為護衛，乙巳大限，午宮為雙忌所夾，使\n    午宮原有強旺氣勢大減，所以羊陀便趁機呈凶虐午宮。"
