    # # 「這又怎麼講」


    被人說成貴族運動的高爾夫球，也被賭興大的玩家，拿來比球技，圍杆數，定輸贏。十

    八洞打下來，會有很多下賭項目：諸如算杆數、得博蒂（Bogey）低標準一標進洞）、罰界外

    球（Over of Boundary 簡稱 O.B.）、比近洞（Near Pe），甚至前後各九洞的半條龍，十八

    洞全贏或全輸的一條龍，花樣之多，可以隨興而定。這些既有錢又有閒的大爺，一旦賭起

    輸贏，賭注之大，會叫人咋舌。


    曾經有位太太找我論命時提起，他先生只喜愛打高爾夫球，三天兩頭和球友往球場跑

    。她問我打球所化費用，會否太貴？


    我說，有會員證者，打一場十八洞球，約在七、八百元左右，借會員證使用，約在一千兩

