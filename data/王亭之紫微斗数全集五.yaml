    # # 股票、房地產、外匯操作一起來


    ### ——一位『水敗木死』命格者的生財之道


    抽着《斗數論命》乙書出版后，周先生多買了一本書，送給書中〈要驗證不要抬死杠〉一文里的主人翁——唐小姐。一來唐小姐也看斗數方面的書，再者這本書有她的命例，正可以給她參考并作紀念。


    唐小姐在看完書后，一直嚷着要周先生帶她來和我見面。在幾經安排后，己巳年底有天下午，终于在一家茶馆會了面。


    唐小姐在泡好茶后說道，她的斗數命盤，曾經有幾位高人看過，但都用命身破軍坐戌宮的盤來論斷，因為他們都說這個命盤的宅宮爲太陰化祿的〈日月照壁〉格局，所以才會買那么多不動產。又因爲先天財帛宮七殺祿存，所以賺錢才會那麼容易。


    也許戲法人人會變，各有巧妙不同。不過另有一點可以佐證命宮在酉的盤較正確性


    唐小姐說，小時因家庭境遇關系，家居可能居無定所，甚至有寄人離下的漂泊的遭遇。


    下日子，這也許正是造成以後經濟狀況好轉，會一再買房子的原因。


    大概是吧！這該屬於一種心理補償的反應，讓唐小姐對賺錢和買房子會特別感興趣。


    周先生不解的問說，像唐小姐這種命身宮——〈水敗木死〉的命身格局，就在辛亥大


    > · 175 ·'
- md: '里，竟能從一無片瓦而成爲擁有數棟房屋的小富婆嗎？


    這種命（身）格局，在古賦文上作破敗論。但我認爲這裡解說，完全根據《巨機》在西宮爲陷弱，又用宮星相克的理論來闡釋，才有這種論法。這種論法不僅沒考慮何年生人，以及其六吉和六煞的配合結構，甚至也沒理會行限運后吉凶如何？這類論點在古傳的星性及格局還例舉不少。由於古傳文字的言簡意賅，常使后人讀來有不知其真義或誤解之苦。


    當然這個破敗之局，據個人的見解，還是有它的道理存在。


    比如說，這種命格的人，他若出生在富貴之家，他有家產可敗，可能會在中年前，把家產先敗掉，至于能否先敗而后發，還需視生年和所行限運如何而判定。


    唐小姐從童年因家境因素，使她倍嘗顛僕，也是人生際遇上的一段辛酸，應該和她這個命身（宮）格局有關，只是因爲他的生年與整個命盤架構，以及所行限運尚佳，所以她會苦盡甘來，才沒有古傳所說的破敗凶象。


    周先生接着問說，她在辛亥大限間，從一無所有到廣置不動產，當然要有財源收入才能辦到。像她先后天這種財帛宮的星曜組合，可能會讓她財源滾滾嗎？


    若就財帛宮而言，先天財帛在巳、天同化權坐守，正表示她在金錢賺取上的一種強烈欲望。辛亥大限的財帛在未，太陰化祿本主財利，太陽再度化權，同樣主財利追求的強烈欲望。擎羊會有卯宮的火星而爲《火羊》格，在祿權催化下，產生強烈的《橫發》作用。”


