  mdcn: '## 賭徒的衆生相

    ——從財帛宮看賭博的命理格局


    認識吳先生，這位斗數命理界的后起新秀，就在戊辰年中。


    有次，和幾位同好在茶館里擺龍門陣的時候，由於他言談之間的謙虛和對斗數認知略異他人，因此讓我留下深刻印象。也許是投緣吧！從此以後經常通電話討論一些命理的瑣碎雜事。


    己巳年中，有天我路過他的住處，順便造訪，才知道他在斗數命理方面，年紀輕輕的，就有那種與衆不同的觀念和執着，這大概跟他平時博覽群書、熱愛真理的求知態度有關吧。


    浸淫命理二十多年，認識的同好不少，但在較年輕的一輩里，像他這樣熱衷于斗數的，還真不多見。真希望他能好自爲之，有朝一日，給這個混沌的斗數界，厘清出一條坦蕩大道來。


    閑談間，他提出了斗數命理，在求財格局上某些特殊狀況。近年來臺灣社會，各階層人士上焉者炒地皮、飆股票，下焉者賭錢、玩六合彩，幾使我們這個社會成爲狂賭王國。他在近幾年的論命間，偶而也會碰到一些嗜賭成性的客人。在累積較多的實例經驗以后，發現到在賭徒的命盤上，幾乎都有某些共同特點。因此他從舊檔案里，抽出幾個命例，逐一指出他在《賭》方面所理出的命理觀點，和推演方法。


    于是，我提出個人的看法說道：「炒地皮玩股票，固然帶有賭運氣成分，但在命理和現實條件上與賭博略有差異。以現實條件而言，這兩樣的人，都必須先擁有某程序的財力，否則運氣再好也炒玩不起。但賭金錢和玩六合彩，卻可賭大也可賭小，受金錢限制就更小了。


    打比方說，打電動玩具可以有純為松懈心神而娛樂的機種玩法，也有可輸贏金錢的吃角子老虎，和數不清種類的玩錢機臺。一個寓樂于賭錢的玩家，他可能就會對純娛樂的玩法，感到索然無味。若從這個觀點來觀察，這兩種電動玩具的人，在命理迹象方面，應該也會有某些差別。


    于是吴先生先指出這個林姓的命盤說道：


    「這個客人，于乙丑年（一九八五）間，因賭錢前後輸掉二百萬元左右。


    乙丑年三十一歲，大限在壬午運，壬午使武曲化忌在限過的財帛寅宮，這宮位的地劫和陀羅，歷忌星引動而逞害。


    乙丑年，流陀在寅宮，除了增強寅宮的凶象之外，流羊進辰宮和先天擎羊同踞，使由這一年的羊、陀兩大煞星與寅宮的忌煞，同時冲向先天和大限的福德宮位。行運如此，一旦坐上賭桌，將會有輸無贏。」


    我對吴先生說：「基本上我同意你這個論點。另外我想提出個人的看法供參考，在推論賭和機器賭錢，應該屬於新時代才有的賭博。賭法也許不同，但賭徒在命理上，必有其共同命理跡象。玩電動玩具，玩到輸掉兩百萬元，能說不是賭錢嗎？


    錢的案例前，必先審視命身格局的架構，其次再看先后天的限運與財帛宮。尤其須注意到先后天財帛宮的星曜組合。因為財帛宮，也是顯示一個在求財方式上的某種偏向。


    問道。

    『那么福德宮的《理財》和財帛宮的《求財》在作用上又有什么區別？』吳先生疑惑的段或方法。所以財帛就作《求財》方式解了。

    若從這些觀點來看這個命例，他之所以會賭錢，除了賭錢會有感官刺激以外，也顯示出他在求財手段上的傾向，所以一般有賭錢嗜好的人，命盤上的財帛宮都會有某些共同特點。


    這位林先生，先天財帛宮七殺與擎羊同宮。這個組合落在財帛宮，使他在求財上，帶有一種為求財不擇手段的心態。這個人在后天行運若又遇財帛宮再度逢煞星時，一旦有賭錢的環境與機會，就較會在這個方面顯示出來。


    壬午大限財帛宮在寅，有地劫、陀羅同宮，武曲遇化忌，使這個宮位忌煞引動而逞凶。因此在理論上，這位林先生，就在大限運行入壬午宮階段，充分引動了先天潛在的那種求財不擇手段的意識，于是他一有機會，就會去玩這種金錢遊戲。


    『武曲為財帛主，遇化忌而損財，何況會先天福德戌宮的廉貞，而有《財與仇囚》的凶格。這種情況會和他的賭錢，有關鍵性作用嗎？』吳先生提出更細微的問題。


    武曲為財帛主，遇化忌與先天福德宮廉貞成爲凶格，應該属于在此限運里，金錢上有虧損作用。這個忌星之于賭錢關系，我認爲還是作用在寅宫所引動的忌煞呈凶，這會使先天的賭性，在此限運凸顯出來。因此若刻意把因有武曲化忌而賭錢，那豈不是先后天限運不過壬干的人，就不會賭錢了？


    大限紫微化權與武曲化忌，這種權忌組合，會使一個人性格趨向頑固，若出現在賭錢方面，就有軌迷不悟的現象。當然化忌在財帛主的武曲星上，就更會讓他在屢賭屢輸情形下不知回頭。


    這位王先生于丁卯年（一九八七），『大家樂』賭風盛行的時候，也財迷心竅地壓了一陣寶，結果正是偷鷄不成，反蝕了一大把米。年紀輕輕的就輸掉五十萬。


    吳先生問說：玩『大家樂』和其後盛行的『六合彩』嚴格講起來，也算賭博嗎？


    應該把下賭注，憑賭技，靠運氣來輸贏金錢或彩金的游戲，全部包括在內。因此諸如臺灣的六合彩、大家樂、澳門瓣賽馬和賽狗、東南亞地區的玩斗鷄，英國大選每逢保守黨和工黨競爭得難分軒輕時，賭博公司便會乘機公開舉辦猜測那黨輸贏和可能得到多少國會議員席次的賭注。參加這種游戲的人，都要下賭金。最後半靠主觀與半靠運氣，輸掉賭注或是贏得彩金。這種金錢輸贏，和領取薪資酬勞或投資紅利報償性質截然兩樣。


