  md: '到了壬戌年，壬干武曲化忌在卯宫，正好和巳宫的化忌夹制大限事业辰宫，成为双忌夹煞（火星）凶格。武曲化忌又是大限的田宅宫。卯宫又会亥宫的廉贞大限化忌，因此凶性也很强。


    综合这些凶性来看，二十二日的这张命造只要在壬戌年扩充毕业，除非经由严密的策划，否则事业将会因没预期中的顺利，而导致资金的短缺。


    他在壬戌年发生的财务官司，在二十二命盘上，大概可以作此解释。


    另外的二十三日命盘，大限也在丙子限，同样是天同化禄和廉贞化忌。


    在这个大限里，武曲化禄和先天事业午宫成为双禄交驰，在事业上也一样会呈现有吉象的一面。特别是先天命格为『杀破狼』的格局，通常在这种大限里，较会想在事业上、企求大显身手的心理。


    不过遗憾的，大限天同化禄在亥宫，和先后天的事业宫不吉会，大限又坐地劫星。大限还在这里不受大限天干吉化情况下，想要事业上，有所作为，恐将困难重重。


    再者丙干廉贞化忌在申宫，正好和大限的武曲星，成为『财与囚仇』。武曲的先天化禄，在此大限正在可作为『吉处藏凶』解。


    『财与囚仇』的凶象，和因田宅宫与福德宫破损财败，所引起的财务徵结不太一样。前者的财务问题，带有源自『不择手段』引起的财务纠纷。后者比较属于因资金短缺产生的财务困境。同样有财务问题，但在性质和原由上，差别很大。


