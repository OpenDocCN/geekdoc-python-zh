    # # 命會空劫，半空折翅？


    一個不動產仲介者的生財之道

    吳先生商專畢業，服兵役後在幾個私人公司服務過，由于高不成低不就，兩年間換了三個老板，最後總是自己拍拍屁股走路。戊辰年底經朋友介紹找我論命。

    見面時他拿出自己排好的一張斗數命盤，壁頭就問，命身會空劫星的人，是否注定一輩子在事業上，就會《浪里行舟》兼《半空折翅》的半途而廢和漂浮不定？


    那麼十月生的人，因為命身必然分坐空劫星，難道這種人也將一生下來就注定一輩子落魄不得志了？我不作正面答覆地反問道。


    『一般書上不都說，像我這種財官兼命身宮都會空亡星的人，會一輩子萍踪無定，事業無成嗎？』這個年輕人，引經據典的提了他的論點。


    在古賦文上，對這兩顆星，的確有這種賦性方面的解釋，但它的賦性作用，并不只是表現在這方面。這兩個空亡星另有屬『玄學』方面的作用，因此一個命格會空亡的人，只要他格局好，往往都是『想像力』極爲豐富的人。有很多科學家、思想家、宗教家，這些亟需憑豐富想像力的人，常在命格上會坐空亡星，也因此才會有他們的輝煌成就。據個人所知，當代的幾位命理界高人，也都是屬於這種命理格局。吳先生會涉獵命理，理論上，也和此


