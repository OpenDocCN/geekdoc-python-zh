    ## 林先生疑問說：『流年辰宮'
  mdcn: '## 學方面因接觸而有了濃厚興趣，這個現象和命宮的貪狼，有『授學神仙之術』賦性有沒關係。


    『貪狼在命宮，據古賦文有此一說，但我的看法，命身會照地空和地劫，也多少有些關係。』


    地空地劫照會命身宮的人，也帶有一種偏向『玄學』方面的特質。宗教、哲學、和五術都有關係。』我說。


    『那么依命格講，這種人在事業上，從事于那種行業比較適合』或是『比較有發展』


    『那當然還需看他有什么專長』命里上的理論如此，不見得他就能從事這方面的行業談命理，不能脫離現象，否則就變成空談。』


    林先生說：『這位朋友，頭腦很靈活，一向對股市方面頗有研究和心情。因此經常在報章上發表股市方面的相關文章，偶而也會見機買賣股票。』


    『就命理上，他在這一行的發展如何』林先生問道。


    在這一行賺錢謀生的人，除了一般的股票投資和投機者以外，還有如證券公司，經紀股票買賣業務員，賺的是客戶交易股票的手續費行業。個人的股票經紀人，專門幫股票的投機或投資者想點子炒作股票，賺取盈餘的傭金或紅利。因為這些人的身份和在股票方面的性質都不盡相同，因此在命理上，並不可相提並論。


    『能否看出他在這一行上，比較適合扮演什么身份』林先生問。


    ## 若依命理而言，他比較適合當個人經紀人的角色較為有利。」我說。為什麼如此，這得從幾個方面來說明：


    第一，命身宮、除了魁鉞以外，不會昌曲和左右。《殺破狼》的格局，變化有余，但不會左右，因此欠缺事業多變化之下的持續和穩定。因此不利于經營證券公司。這種機構，固然對瞬息萬變的股票市場，要有高度的應變能力，但必須維持這個機構的長期穩定，才能使它信譽昭着，然後才有發展賺大錢機會。


    《殺破狼》不會左輔和右弼，格局雖好，只能當戰場上的大殺將，要他長期穩定千軍萬馬的軍心，他可沒有主帥者的能耐。


    另外，前面所提到，命身宮都會空劫星，難免有《半空折翅》之驚。因此這位先生更不利于開證券公司當老板。


    第二，先后天的財帛宮（到乙亥大限時）和福德宮皆破，這種人求財不利于經由投資或投機賺取。要是利用資金去投資和投機賺錢，勝算機會不大。


    但在乙亥大限時，先后天的事業宮都有祿星，表示他在職業上，雖然當不了老板，若是為人作嫁幫傭，還是會有很好的機會和表現。


    第三，他既然在股票方面已了解到可發表專文程度，可見他頗有心得。因此，他若能有有關證券機構方面的專家顧問，或是幫人炒作股票買賣賺取紅利或傭金，應該最爲妥當。


    ## 林先生說，這位朋友目前在一家顧問公司當證券分析員，表現很好。


    ## 林先生接着又問道，既然目前先后天的財帛宮和福德宮都不好，自己不宜投入股票，那么幫人家買賣股票，可能賺到錢嗎？


    ## 「若以既過的戊辰年（一九八八）來說，我的看法是，只要他在這一年幫人炒作股票，他必定獲益不錯。當然幫人買賣股票越多，他也賺得越多。」


    ## 這些凶都比較屬自己的投入資金想賺錢方面但若用勞心努力去賺勞碌錢，就不一定作此論。


    ## 前面曾提過，在乙亥大限里，先后天的事業宮都有祿星，只要在職業上，是屬於從事幫傭、爲人作嫁，還是會有很好表現。


    ## 戊辰年貪狼化祿，祿存在巳宮。乙亥大限天機化祿在卯宮。使辰官成爲雙祿所輔，這些祿星，使他在戊辰年，只要去反應吉象，去替人買賣股票，就會賺大錢。


    ## 寅宮貪狼化祿、和武曲化祿輔大限福德丑宮，流祿在巳照丑官。使大限的福德宫吉祥畢集。


    ## 流年行入先天的福德宮，正好爲大限天機化祿和流祿在已所輔。流年財帛宫有先天武曲化祿來會，使這個流年在財帛上，呈現出吉象的一面。


    ## 流年福德官在午，原就有祿存，在武曲化祿和貪狼化祿吉化之下，使他財源豐足。


    ## 林先生疑問說：『流年辰宮有流年天機化忌和巳宮文曲先天化忌夾制，辰宮還有火星，已成雙忌夾煞凶格。』


    ## 流年福德午宮，也是被巳宮的文曲忌大限太陰化忌作用到未宮所夾制，另有地空地劫來沖，還是有凶象，爲什么你却論吉？


    『我也曾說明過，福德宫的這些凶象，正是適合去賺勞心勞力的辛苦錢。這與投入資金賺錢的性質完全兩樣。我以爲在辰午兩宮的吉凶，應該作此分別，否則非吉凶混淆不清，究竟是賺還是虧都無法分辨。


    ## 假定他在戊辰年內，自己的資金也介入股票買賣，那么類似這種格局，就成爲『<u>吉凶相伴</u>』。一旦股票經常買賣不停，將會有先盛后敗的危機。


    所以吉凶的論斷，有時要看當事者，在求財利上的手段或方式，然后再依事實據命理跡象來認斷。』我說。


    ## 林先生說：『這位朋友在戊辰年，據我所知，以幫人買賣股票賺取傭金和紅利爲主，自己很少投入資金買賣。


    據他自己說，幾乎全年都生活在爲人作嫁的忙碌和緊張中，但的確讓他賺了不少，少說大概也有上億元左右的收入。戊辰年股票在年中階段飈漲得厲害，社會游資大量投入股票市場，有錢想投機股票，而不懂得炒作的人大有人在。因此讓這些精于此道的行家經紀人，有了大展身手的好機會。


