  md: '我回答说：『若从这观点来看，我同意，戊辰存入投资公司的钱，在己巳年间，虽有被倒帐危险，但似乎不至于全被倒光，连部份都收不回来。』


    我回答说：『若从这个观点来看，我同意，戊辰存入投资公司的钱，在己巳年间，虽有被倒帐危险，但似乎不至于全被倒光，连部分都收不回来。』


    华先生接着又说道：『这家投资公司，就在己巳年中宣布停止出金，也就是所有的存款冻结各种给付。但公司并未宣布破产解散，甚至也没有清算债务。因此洪先生手头握有的五、六百万元存款（投资）凭证，岂不全泡汤了』接着他又说道：『庚午年，太阳化禄照辰宫、流年禄存在申宫，分会子辰两宫，应该多少可以拿些回来吧』


    我说：『但庚午也使天同由禄转忌，子辰两宫。这两个宫位原为吉中带凶，又经申宫的忌禄再冲动下，恐怕还是凶多吉少，不可太乐观。』


    华先生接着说：『也许洪先生，他得在公司服务之便，多少可能拿些回来吧』


    『不过，我看连要回来部分钱的机会也不大，因为戊、己、庚，连续三年的忌星，也都连续冲击着子和辰两宫，因为这种连续三年的凶性太大了，因此很难收回』我不表同意的说道。


