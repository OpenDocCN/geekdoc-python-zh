  md: '會。這位朋友恭逢其盛，正好讓他逮到機會。委托的客人大有斬獲，自然會按照約定的傭金或紅利給他。他也這年，財利滾滾大發特發。『那依命盤行運看，這位朋友往后的財運能否繼續的興旺下去？』林先生接着問說。


    我個人的意見是，要看他以后在求財利手段方面如何的問題。若他一直堅守在戊辰年時的身份和職務，也就是在同類以『勞務』生財的方式，他可能繼續的好下去。


    問題是這種命格和往后的行運引動，可能會促使他，一旦賺了些錢以后，野心還會更大。到時一旦自己當老板搞公司或是把自己的資金介入股票市場，最遲就在甲戌大限運間，他會把曾經擁有的財富幾乎散盡。


    因此他將來如何，得看他自己的造化了。'
