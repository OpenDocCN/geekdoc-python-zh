    # # 紫微斗數大崩盤

    ### ——命理應用該有科學態度


    己巳年陽歷九月中旬，有一天接到東樵居士電話，約定周末下午來舍下，討論命理界預測股票漲跌問題。這位斗數命理的后起之秀，近幾年來勤于鑽研斗數，又因相關學術基礎的深厚，以及對學術研究的執着，因此每見一次面，總會發現到，他在論命技巧上，一次比一次進步。我曾再三告誡他，論命技巧固然重要，但命理的正確觀念，應該是研究命理的最高指導原則。有很多人窮其一生于命理，但最后迷失于如同五里迷霧中，主要原因在于欠缺命理的正確觀念。


    見面時他問說：『您能否用紫微斗數來預測股票的漲跌行情？』


    我笑笑說：『在拙着《斗數論命》乙書里，我曾表示，假若我能運用斗數來預測股票的走勢行情，我將先讓自己大發其財，也用不着這種苦行僧似地與人論命和寫文章，來賺這種嘔心瀝血的蠅頭小錢。』


    參透股票行情走勢，又能毫不藏私地把它公開出來，這種人的命理造詣，必定已超凡入聖，他們的德行也必然修爲到無我、無私 無欲的崇高境界。


    東樵居士語帶疑惑地问道：『近年來作發財大夢的人很多，因此有不少命理界人士，竟然運用命理來預測股票全盤漲跌大勢，您認爲可能性和可信度如何？』'
