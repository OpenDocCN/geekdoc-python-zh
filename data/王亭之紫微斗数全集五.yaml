  md: '于是 我强调说：「她和先生的意见欠和，不是这三两年的事，因此我想她不会把赚到的钱，全用她先生的名义来置产，因此不妨去详加了解，并帮她想法，如何由她名下的不动产来处理所欠下的债务。」


