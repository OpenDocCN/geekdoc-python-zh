  md: '過一萬點的指數大關，每日交易總額才常會高逾千億以上。這個年輕人在沖泡茶又點上了支烟后，繼續說道：「又因為股票買賣就是金錢遊戲，武曲為財帛主，一旦化祿時，就會使『財帛』大起作用，因此臺灣的股票，才會在己巳年有此空前的輝煌紀錄和表現。」


    這種歪用理論，比不懂理論來得更糟爛。臺灣的股票似乎開端于民國五十年前後，那麼民國五十八年的己酉年，和民國六十八年的己未年，也都是武曲化祿，這兩年的股票行情是否都有超過往前幾年份的特出成長紀錄？


    臺灣的股票雖然跟隨着經濟發展而成長。據記憶所及，在民國七十五年（丙寅）時，股票指數一直都還在不到一千點的低檔處徘徊。


    股票近年來，就在民國七十六年間開始，才有大幅度的漲幅，七十七年接着進入如火如荼的狂飈年份，七十八年指數的冲破萬點大關，應該只是連續飈漲三年後的結果而已。


    民國廿六年歲次丁卯，丁干太陰化祿，太陰為〈田宅主〉。


    七十七年歲次戊辰，戊干貪狼化祿，貪狼主〈禍福〉。


    七十九年歲次庚午，庚干太陽化祿，太陽為〈官祿主〉。


    古傳的星曜賦性作用，「太陰」和「貪狼」各有其所「主」，若是利用斗數星曜化祿星來論股票，那丁卯和戊辰兩年間的股票高漲，也應該和這兩顆化祿星有關。因此，若太強調武曲化祿的作用，就不應該忽視前兩年這兩個化祿呈的功能了。


