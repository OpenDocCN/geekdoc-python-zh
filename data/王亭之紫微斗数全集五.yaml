    把錢存入金字招牌的私人事業集團最後被倒帳在東窗事發前任誰都不會相信。這位小姐做夢也不會夢到她的積蓄會被這種響叮噹的人物倒掉！


    「那么亥宫的流年贪狼化忌并会有先天羊陀及同宫的火星不会因逞凶而影响她改变存放高利贷的意愿吗？」


    「我的看法正好相反一个人限运进入这种强烈又带凶煞的年份时往往会作出很大的错误判断也因为这种判断所以她才会把辛苦得来的积蓄全部改存入蔡氏的集团事业里生息。」我说。


    蔡氏当年还没出纰漏前蔡家的字号本是信用万无一失的金字招牌也难怪这位小姐会理所当然的把她积蓄的钱存进也许因为她有这个行运又偏逢蔡氏大量吸入资金所以才促成她改存高利存款。


    蔡氏当理事主席的台北十信在翌年的甲子年底违规受罚曾被勒令停止营业几天。到了乙丑年初整个十信风暴一发不可收拾后使蔡氏旗下的集团事业一个个地掀翻了底而拥出经济大风波弄得当时很多为贪图高利的存款人如丧考妣般疯狂的走上街头这些民间存款债务后来据说由蔡家其他人士情不甘心不愿的象征性拨款支援才草草处理了结因此这位小姐的五十万存款也没能全部收回。


    乙丑年（一九八五）流年在丑宫正好是癸亥年的福德宫也是癸年流羊进入的宫位丑宫有地劫三方会有羊陀和地空使丑宫呈现凶煞而不稳。大限午宫也是先天福德宫到了乙丑年经太阴化忌再冲后使这个宫位被三代忌星先天、大限和流年化忌所冲破。


    面大限福德申宫在乙丑年时也分别被辰寅宫两宫里的羊陀忌煞来冲害。『看来在限运福德宫逢有忌煞交冲凶象时想要赚些高利生息常会偷鸡不成反蚀把米』但很多升斗小民却常为贪图高利而鲁莽行事诚可怜亦可悲！『华先生不胜的感叹道


    台湾有句俗话说：「（贪）字（贫）字壳」。人常因贪而后贫。一个人一生能赚我少享用多少常有定数又何必强求？想要放高利生息实在太没保险但很多人常挡不住这条财路的欲望而遭受损失。


    我接着说道放钱生意被倒帐有时不全是为生重息才会如此有些人因被熟人调钱周转当时运不济时也会被倒帐。于是我又从档案里拿出一个命例这位太太在戊辰年（一九八八）初被朋友调借一百多万元作为生意周转急之用熟朋友生意告急并约定短期周转后就可奉还没想到约定还钱的时间已到不只无法如约偿还也空无一物这位吴太太就如此的平白损失一百多万元。


    华先生看了命盘后说戊辰年四十七岁大限在丁未限丁干使巨门化忌戊辰年擎羊在午宫戊干又使天机化忌巨门忌星正好由子宫冲午宫顿使戊辰流年的福德宫位忌煞交加所以她在这时借出去的錢就有出无回了。


    「理論上是這個樣子沒錯。」我接着說到：『通常要把錢借給朋友周轉或生息時必須要注意福德宮有否破損一但遇有凶煞常會使貸放出去的錢收不回來』以吳太太的福德宮來論先天福德宮在丑坐天相井與鈴星地空同躔西宮有地劫來合先天福德宮本就極不穩固。大限丁未福德宮在西宮有地劫會有丑宮地空和鈴星兩煞下曲先天化忌又由卯宮來冲這種先后福德宫都兩雙破損一旦流年引動大限福德宫受忌煞沖擊或是流年福德宫呈凶時把錢外貸生息就有被倒帳的機會。成交辰年天機化忌加擎羊的福德宫正好成為《天機天梁擎羊會》的格局這個格局又因天機化忌引動逞凶子宮巨門化忌加擎羊本已很凶若再把夾制子宫的鈴星和火星所成雙煞夹煞忌并論更使子宫成為《終生縊死》的凶限惡格。這個恶格冲激午宫會使这个宮位更形恶化所以吴太太在戊辰年借出的錢最後会血本無歸。


    把錢借給朋友周轉或生息除了應該留意福德宮有否暇疵以外還要注意到限運的僕役宮有否會凶要是這個宮位同樣的忌凶交加卻把錢出借他人那就會變成劉備借荆州——有借無還了。丁未大限使子宮所形成的惡格《終生縊死》不只是大限僕役宫也會冲擊着先天福德宫天僕役辰宫的宮位戊辰年偏偏又行入這個辰宫宮位又使擎羊和化忌在午宫午宫的凶象同樣會加強子宫凶恶格局作用流年的僕役官在西這宮位如前述原本就是忌煞交冲的不穩宮位先天大限及流年僕役官全部呈不穩而借錢給朋友后果必然『借錢容易還錢難』甚至朋友間從此因而形同陌路。


    這種命理迹象同樣可以應用在一般親友間的『搭會子錢』會首只要有福德宮和僕役宮雙破必會被會員倒帳會員遇此就會被會首倒錢華先生問說：「若是會首有此凶象能否從衆多的會員里推測出那個會員會發生倒帳嗎？」又問：「假如一個人同時搭三四個會可能推論得出那一個會首會倒會員的錢嗎」當然都可以只是這個問題牽涉範圍較廣不是三言兩語所能說清只好等待以后有機會再詳談了


