    這個造命在期貨公司幫客戶大賺也給自己帶來豐碩傭金收入，但自己的資金投入炒作却大虧，究竟爲什么？盈虧的道理，應該如何分辨？


    他開頭問我，這幾年她的財運如何？


    大限坐武曲天相在申宮，同宮有鈴星。武曲化忌和鈴星合為『寡宿』，武曲為財帛主、成凶格時，最不利于用錢滾錢的逐財求利。另以大限財帛宮在辰，有廉貞和天府并坐。廉貞和武曲化忌會合，也成為『財與囚仇』凶格，同樣不利于用錢滾錢。


    這兩個不利求財的凶格，再會沖三方煞星，在子的擎羊和辰宮的地劫，更使争逐財利如履薄冰，稍一不慎，就會跌得很慘。


    但這些凶險，只是應在用錢投機賺錢方面最凶，如一般的正常投資，凶性倒不一定會很大。若是普通的上班族時，就成為職繁責重，而薪水較低。


    『那我在這個大限就注定要既辛苦且沒錢了』韓小姐問道。


    『也不盡然。大限福德宮在戌，也是先天本命宮，正好為先天的雙祿所輔。大限戊干的貪狼化祿會戌宮，仍使這個福德宮呈現吉象。特別是貪狼在午有火星同宮，巧成『火貪』發，午宮的這個吉格也會照先天的福德子宮。這個吉象，也意味着，在戊申大限同豐碩的財利收入機會。』我說。


    『又是凶又是吉，不前后矛盾嗎？』


    『不矛盾，而是吉凶各自應驗在不同求財的方式上，只要不去呼應凶象，不讓它發作就不會虧錢，盡量去發揮吉象方面，財利自然滾滾而來。』


    『這話又怎麼辦？』韓小姐不解地問。


    財帛宮欠佳時求財，要是經由一種勞其心力的方式來取財利，也許還可在辛苦中得財利求得愈多當然就越辛苦。


    比如說，你在戊辰年進入期貨公司做事后，若曾幫客人操作買賣，將會賺到不少應得的傭金。


    假定你自己也投入資金想揮他一票，結果會事與願違，偷雞不成，反蝕把米。『


    韓小姐說：『我去年主管內部業務之余，漸漸把操作期貨的技術摸熟了，之后，先是幫客人操作買賣。沒想到一開始就很得心應手，在短短的幾個月內，單單傭金的收入，就有上百萬元的收入。經不起這種暴利的誘惑，我把傭金賺來的錢，也投入在自行操作期貨買賣上。結果正如你所說的，右手賺來，左手虧去，最後還是一無所有，去年算是白忙一場。』


    為什麼同樣是我操作買賣，幫別人就會賺，爲自己就會虧？這個道理總是想不通。『其實幫別人賺錢，你也分得不錯的傭金啊！』這正是前面我所說的，你在求財方面，最利于勞心勞力來賺錢，最不適用於利用自己的資金去求財利，道理就在這裡。』


    韓小姐接着又問：『那么今年（己巳）的財利吉凶現象還是如此嗎？』


    『今年你二十八歲，大限還在戊申運，同樣的會貪狼化祿和天機化忌。己巳流年，己干武曲化祿，流祿在午，文曲忌在西宮。


    在吉象方面，大限的武曲由忌轉祿，今年『寡宿』和『財與囚仇』的凶性會轉淡。武曲


    化禄又和午宫的流禄辅流年福德未宫。特别是流禄入午宫时更助强贪狼化禄和火星所成「火贪」横发格局的吉化力量，因此论吉方面，财利会比去年更好。


    但凶象仍然很可强。


    首先，大限的两个凶格——「寡宿」与「财与囚仇」的凶性仍在。流年文曲化忌在酉宫，和天机大限化忌，正好夹制先天命宫戌宫，戌宫有陀罗，成为「双忌夹煞」的凶局。


    戌宫同时为大限福德宫，大阴福德宫在己年引动冲破，主求财辛苦，亦不利于投资投机方面的求利。当然戌宫亦有双禄所辅，不能说成全凶。因此我认为在己巳流年的戌宫，在财利的求取方面，只宜劳获心的求财方式。


    流年的福德未宫，虽有双禄辅，但亦有流羊入，另天机化忌由亥宫来冲。从这个流年福德宫看，也只宜劳其心力，利用劳务佣金来求财利，才最适合。


    若再从大限戊干使天机化忌在大限田宅宫并论，那么己巳流年除了引动大限的福德宫逞凶之余，也使大限田宅宫煞交加（未宫会有流羊）之下，使财库两破。你若一旦有沈不住气，自行投入资金想大赚大捞，恐怕最后将会后悔莫及，悔不当初了「


    结论是，在今年的财利求取方面，还是应该在赚取佣金方面全力以赴，就会有大丰收，千万不要自行投入资金用以赚钱。


    韩小姐沉默了一会儿又问：「帮别人赚钱可以，若自己的兄弟姊妹买卖，情况又如何？」


    若你在去年（戊辰）也帮自己的兄弟姊妹买卖期货，结果是有失所托，对他（她）们都不好交待。''


    韩小姐：「真的是这个样子。同样不是我的资金，帮别人就赚，为自家人却赔了，真是想不通」


    今年还是如此吗？


    「今年千万别再为自家兄弟姊妹帮忙赚钱，否则更凶，更会不好交待」


    人间的事，就这么难以用常理理喻，但在命理上，所有吉凶，却都跃然于命盘上。


    ## 過路財神之二

    ### ——逐財求利的命理條件


