    ### # 紫微斗數大崩盤

    #### ——命理應用該有科學態度


    己巳年陽歷九月中旬，有一天接到東樵居士電話，約定周末下午來舍下，討論命理界預測股票漲跌問題。這位斗數命理的后起之秀，近幾年來勤于鑽研斗數，又因相關學術基礎的深厚，以及對學術研究的執着，因此每見一次面，總會發現到，他在論命技巧上，一次比一次進步。我曾再三告誡他，論命技巧固然重要，但命理的正確觀念，應該是研究命理的最高指導原則。有很多人窮其一生于命理，但最后迷失于如同五里迷霧中，主要原因在于欠缺命理的正確觀念。


    見面時他問說：『您能否用紫微斗數來預測股票的漲跌行情？』

    我笑笑說：『在拙着《斗數論命》乙書里，我曾表示，假若我能運用斗數來預測股票的走勢行情，我將先讓自己大發其財，也用不着這種苦行僧似地與人論命和寫文章，來賺這種嘔心瀝血的蠅頭小錢。』

    參透股票行情走勢，又能毫不藏私地把它公開出來，這種人的命理造詣，必定已超凡入聖，他們的德行也必然修爲到無我、無私 無欲的崇高境界。


    東樵居士語帶疑惑地问道：『近年來作發財大夢的人很多，因此有不少命理界人士，竟然運用命理來預測股票全盤漲跌大勢，您認爲可能性和可信度如何？』

    「利用命理來預測天下大事的淵源已久，正是自一自古皆然，所目悉耳熟的『推背圖』和『燒餅歌』，據傳就是前輩高人，所作有關后代遞延變化的一預

    言。」人說着我從書橱里拿出『辭海』，翻出這兩則預言典故，讓他自己閱讀。《推背圖》書名 相傳唐貞觀中李淳風與袁天罡共為圖識，每圖附七言詩一首，預言歷代興亡變亂之事，至六十圖，袁推李背止，故名推背圖，此書傳本不一，其詩大都在可解不可解之間。李、袁二氏雖實有其人，而此書是否為其所作，則殊難置信。《燒餅歌》民間流市之一預言歌謠：相傳明太祖方食燒餅，適劉基至，帝詢以后世治亂，基作此歌以對，故稱燒餅歌，亦名帝師問答歌，其詞皆作隱語，不足憑信這兩則『預言』的詳細圖文原書，在坊間都有現代版來發行，假使閣下有興趣，不妨也去買本看看，將保證你越看越迷糊，也許會讓你體會到，什么叫『天書』。

    「您說，預言之事」于今尤烈」難道說近代的命理學者，也有類似『預言』嗎？

    「有，但和『推背圖』與『燒餅歌』的預言性質有點差異。」于是我又從書橱上拿下一份剪貼資料來。這份資料是當年跟何老師學斗數時候，老 師提起，民國五十四年間，臺灣的星象界前輩，曾和氣象界專家，預測民國五十四年五月十五日（陽歷）臺北市的氣候情況。

