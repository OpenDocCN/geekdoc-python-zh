  md: '庚午年（一九九〇）元月五日巳時（星期三）

    若把這四年的開盤時日排成命盤，將會發現到某些共同點：

    其一，命宮都在酉宮，身宮都在未宮。

    其二，文昌必定在巳宮，文曲一定在西宮。也就是命宮每年都會照昌曲。

    其三，左輔一定在辰宮，右弼一定在戌宮。

    其四，地空和地劫，必定會夾制巳宮，巳宮也是命盤的財帛宮位。

    因為所取用的月份都是元月，時辰都是巳時，而且每年流年斗君，元月份都從寅宮起，


    那么基于『地空』和『地劫』必定分坐在辰午兩宮的現象，則：


    元月份在寅宮，會地空于午宮，

    三月份坐地劫于辰宮，

    四月份被空劫夾制于巳宮，

    五月份坐地空于午宮，

    七月份坐申宮，會地劫于辰宮，

    八月份坐酉宮，財帛宮在巳，為空劫夾制，

    九月份在戌，午辰空劫來冲，

    十一月在子，會有辰午兩宮的兩空亡。


    『地空』和『地劫』兩星都具有『半空折翅』與『浪里行舟』的起伏不定的賦性作用。


    庚午年（一九九〇）元月五日巳時（星期三）

    若把這四年的開盤時日排成命盤，將會發現到某些共同點：

    其一，命宮都在酉宮，身宮都在未宮。

    其二，文昌必定在巳宮，文曲一定在西宮。也就是命宮每年都會照昌曲。

    其三，左輔一定在辰宮，右弼一定在戌宮。

    其四，地空和地劫，必定會夾制巳宮，巳宮也是命盤的財帛宮位。

    因為所取用的月份都是元月，時辰都是巳時，而且每年流年斗君，元月份都從寅宮起，


    那么基于『地空』和『地劫』必定分坐在辰午兩宮的現象，則：


    元月份在寅宮，會地空于午宮，

    三月份坐地劫于辰宮，

    四月份被空劫夾制于巳宮，

    五月份坐地空于午宮，

    七月份坐申宮，會地劫于辰宮，

    八月份坐酉宮，財帛宮在巳，為空劫夾制，

