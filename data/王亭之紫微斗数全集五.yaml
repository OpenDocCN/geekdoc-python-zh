    ## 序


    運用斗數談論命理，命盤上除了命（身）宮以外，還有涇渭分明的其他十二個宮位。這十二宮，幾乎可以用來談論一個人一生錯綜複雜的人生際遇，


    因此對一個熟悉鬥數命理的人而言，只要有份命盤在手，大概就可以如數家珍的描述這個命造，其一生的休咎與榮辱。


    遺憾的是，在古傳僅有的幾部鬥數典籍裏，絕大部份文學，幾乎都偏向于星曜與格局賦性的闡釋，很少剖析有關十二宮的特具作用和本義，至于十


    二宮位在命盤上的推論適用方法，更是稀如鳳毛麟角。近人琳琅滿目的鬥數論著裏，絕大部份是極其呆板的認定，某星曜在某宮位的必然性作用，不抵


    把星曜賦性，常作出極其荒謬，也無視于宮位本義的命理運用。這種生吞活剝式的鑽研古傳命理學術，不祇使其命理探討和論斷，不能用以推演實際的


    人生遭遇，這種論著，更會錯誤引導有心于鬥數命理的愛好者，走向理念不清的死胡同，而無法籍此窺盡大千世界的百態人生。


    筆者在漫長的鬥數命理學習過程中，發現到星曜賦性和格局作用的了解，固然是研究這門學術的最基本要項，但對十二事項宮位特具作用性的合理


    運用，也同樣是學習鬥數命理不可或缺的極其重要部分。但很遺憾，在近代學者的諸多論著中，卻發現到，對有關宮位實際功能的運用上，一直滯留在


    觀念模糊和運用混淆錯亂中，因此使鬥數命理的推論很難適切應用在目前這個光怪陸離，又變化萬千的當代社會。


    在老祖宗時代，一個人一生的財富，除了生于豪門之家，當他（她）哇哇落地時，通常較可能享盡一生的榮華富貴以外，其他庶民百姓的富貴與窮


    通，上焉者，發奮圖強加上命運助勢，有的可能茅廬出公卿，也可能寒門出富貴，等而下焉者，一生胼手胝足祇可溫飽。因此這裏推論財富的命理條件，


    傳統上除了命身格局以外，無不以「財、官」兩宮的吉凶旺弱作爲命理跡象的推論依據。因爲一般百姓人家，財富通常都來自「官祿」——所從事行業


    的興衰榮枯。事業亨通，財源廣進，事業坎坷不濟，則利薄財窮，所以論及財富盈虧與多寡，在鬥數命理上，無不以「財富」兩宮合并推論其吉凶消長，


    作爲論斷依據。因此在古代，一生爲人幫傭的「僕役」族，除了極少數有奇遇或巧取豪奪而橫發外，一生在財富上，不單是僅求聊以維生，甚至祖孫三


    代，很多常是要賴自服侍老東家以維家計。若是想要企求更多財利，除非能自立門戶開創事業，否則在一輩子裏，將與財富無緣。


    但時代演變，社會環境已非昔日可比。雖然現代人仍須從各行各業裏討生活，但求財與生財之道，古今已經旋然迥異。一個人開創事業，因鴻業發


    發，固然可以廣進財源。但一個擁有資金的人，不管他是主持事業的大老板，或是爲人作嫁的上班族，祇要他有正確的理財觀念和妥善的理財方法，再


    透過適當的投资途徑，他照樣在不大動干戈經營備盡艱辛的企業下，可以掙得巨大豐厚的財利。


    在鬥數命理上，經由事業經營而求得財利，和經由純投資而得到的利潤，由于來源性質有异，因此在鬥數命理推演所根據的理論和方法，就應該有


    其截然不同的差別所在。但很遺憾的，對這裏迥然不同的求財方式，在當今的鬥數命理界，除了那些自詡爲鬥數命理專家，大發其荒誕無稽的謬誤觀念


    和錯誤百出的推論方法以外，竟然不曾聽聞有關這方面的正確理念和討論。


    筆者於多年業余的論命經驗裏，經常會碰到同好提及類似這種財利得失推論方面的謬誤觀念，諸如把金錢存入投資公司或貸放友人被倒帳，投機炒


    作股票，因適利空而大賠老本，偏偏常在財帛宮并不太顯現見凶然時而損財。類似這種似與鬥數命理背道而馳的事迹真相，常使這些同好百思不得其解，


    甚至因而懷疑鬥數命理，在推論財利得失方面的準確性。


    其實類似這種「宮位」本義和功能認識不清，致使推演方法因之誤道，也使推論不確的現象，同樣發生在命盤的其他十一宮位上。而這種情況，似


    乎很普遍的存在于一般鬥數初學的研學者之間。因此每逢有這種同好前來研討鬥數命理時，常需費盡口舌，經詳加解說后，才能使他們了解。


    爲了澄清鬥數命理十二宮位，在命理推論上的實際應用，筆者希望能以一宮一書方式，逐一以實際命例，從多方面詳加探討，聊作初學同好鑽研鬥


    數命理的參考之用。


    十二宮位能否如願寫完成書，除了祈求老天爺能多假我余年之外，更期待初學同好，能勿吝多賜捧場


    ## 卷一

    ### 觀念篇


    - 8 -


    # # 殺破狼格為什麼不開創？


    ——先天命格對求財心態的影響


    已巳年底，某一下午上班時間，接到小李電話，說他踢到鐵板，這幾天心里很不是味道

    想找個時間跟我見面，要我給他訂個時間。


    電話中，我問他傷得多重？走路方便否？

    他說，那兒是傷到腳，是傷到心——自信心。哦！我立刻意會，他大概又因好說大話，


    狂語連篇，搞得下不了臺了，所以才打電話求解圍。


    記得在丁卯年底，有一次在一位朋友家里閑聊時，有位高先生談到他曾經遇見過命理

    異人奇事，在座的有位年輕朋友，也口沫橫飛說道，他曾經拜在兩位當代高人的門下學

    命相，一位教他學看相，一位教他學命理，言談中隱約表示，他已盡得兩大高人的真傳，并

    大有青出于藍的造詣。因當時是初見面，我除了羨慕他的奇緣巧遇外，也不便表示意見。


    在座的，有位生性好捉狹的陳先生，就當面問起小李說：『你看我今年的財利狀況如

    何？』


    這位年輕人，往陳先生臉上，端詳了一番后，說道：『你今年四十一歲，行運在兩眼之

    間的《山根》部位。你的山根雖不斷折，但嫌低陷無力，上班領薪尚可，求大財利無緣』

    我也跟着看看陳先生臉孔，他的臉相雖不秀，但還清，山根雖不隆，但印還飽滿，鼻梁


    與準頭還懸膽又不露窮，顏臉氣色不暗、不晦，兩耳鮮中透潤，我想陳先生，今年必然財利順遂。只因另有老前輩在場，我不便班門弄斧，貽笑大方，只好靜默不語。


    另一位高先生則話帶揶揄地笑說：「小李啊！你說陳先生，今年除了在公司拿課長的薪水以外，也趁着房地產節節高漲時，炒了三四攤房地產，足足淨賺了四、五百萬元，你說這樣的財利還算差嗎？」


    接着陳先生又半帶數落和教訓地跟他說道：「半瓶醋才幌，人家在命理上的修為，已非你想像所及，只是深藏不露，你却自我吹噓。在真正的行家前面，你還是少開金口、少出丑為妙。或是干脆叩個頭拜拜師，也好指點你一！」


    小李面帶警奇的聽了后說道：「怎麼會這個樣子？」


    高先生得理不讓人的又說：「若要說命理，你的道行還算小學低年級，在座有人會嫌你還不够格當徒遞呢！」


    散会后，我送在座的一位命理界老前輩回家途上，他語重心長地說道：「初學三年，打遍天下，再學三年，寸步難行」


    幾年來，這句話，一直讓我回味無窮，并存戒惕。


    小李直到戊辰年底，看過我的兩本著作后，才輾轉經由出版社電話取得聯繫，才續上這段命理因緣。


    見面時，小李拿出這麼一張命盤，問道：


    | 辛巳福德宫 | 壬午田宅宫 | 癸未事业宫 | 甲申仆役宫 |

    | :---: | :---: | :---: | :---: |

    | 擎羊<br>庚辰父母宫 | 太阳<br>乙酉男命十二月三十日戌时一九四五年 | 天機禄<br>紫微破軍科 | 天鉞 |

    | 禄左七武存輔殺曲己卯命宮5-14 | 火地星空<br>己丑夫妻宫25-34 | 天文巨魁昌門<br>戊寅兄弟宫15-24 | 太陰忌<br>丙戌疾厄宫
    |

    | 陀羅文天天天曲梁同機 | 天相 | 右貪廉弒狼貞丁亥財帛宮15-54 |


    **命身都居“殺破狼”宮位，而成爲雙重的“殺破狼”格局時**，通常都比较属于“開創”的類型，這種命格不只在事業上傾向于開創，在理財方面，也趨向于積極性。但這個命造的主人翁，大半輩子是上班族，理財方面，相當謹慎保守，除了薪水之外，別無其他生財之道。爲什么？……


    「這個命造命身宮合為雙重〈殺破狼〉格局。七殺武曲在卯廟旺，有祿存同坐，可增強命宮格局主開創的命理作用。身宮在亥有廉貞貪狼，是為〈絕處逢生〉之地。若再以左輔命宮、右弼身宮來論，這一對頗具穩定、耐心和延續作用的星曜配置兩宮，在命理上應論為白手成家的命格，人到中年時也將是所從事行業中的佼佼者吧！」


    我略看了命盤后應道：「這個命造，雖然命身宮都是〈殺破狼〉格局，又會左右，理論上有主利於開創的命理條件，但這種格局在這個命盤上，卻需要加上幾個特點，兼幷考慮，否則在命理推論上，將會因差之毫厘而繆之千里了……」


    第一，〈殺破狼〉需兼會羊、蛇、火、鈴、空、劫、六煞曜中的某些煞星于適當宮位。


    煞曜雖主煞害，但往往也是命理現象的一種〈沖擊作用〉及一種〈憂患意識〉。人常有好逸惡勞心理，若一輩子都在安逸無憂中度過，自然缺乏憂患意識，而不思自強，也因而渾渾噩噩地過完一生，因此，命身宮不會煞的人，一輩子也許平順過日，但想要論及成功立業，恐怕就不是這種命格組合的人所能辦到。


    第二，七殺武曲在卯廟旺又和祿存同躔，不但不助七殺的開創，反使這個命宮格局呈現極端的保守。


    祿存雖可助旺同宮的甲級星曜，但前后的羊陀兩煞，卻會如同兩個保護神似的護衛着命宮。這兩個保護神，衛護命宮的安全有余，但也因此而限制了命宮，不使其向外沖鋒陷陣與冒險犯難。


    ：這個命造，命身宮三方都不見煞星，一生既無波折，自然沒有憂患意識，也就沒刻苦耐勞的冒險犯難沖動，因此一輩子將會偏向安穩，不如他人辛苦開創了。


    『地劫不也沖入命宮嗎？』小李問。


    我說：『地劫也為六煞之一，在命宮的對照宮位，對卯宮應該有某種程序的沖煞作用，但遺憾的，它對卯宮祿存的沖擊，在此却有〈祿逢冲破〉的害處。像這種命身所會均屬北斗剛星的人，個性都較剛烈，膽識大意志強。本來祿存在命宮，應該可使這方的生性更加彰顯，却因這個地劫來冲，反而使他個性偏向溫和，膽識不強，意志不甚堅定。因此更使命身格局的個性作用，偏向保守、拘謹和缺乏決斷力。』


    小李不勝詫异的說道：『怎么你會對這個命盤格局，有此异于常理的解說論法？』


    我說：『重點是我的分析與基本人的事實表現，是否吻合。我相信只要命盤正確，這種性向論斷，應該不離譜。』


    這個說來話長，近年來有很多搞斗數命理的人，僅在玩一些滿天飛星的〈四化〉游戲，甚至奇門、八字、斗數兼容并用。更甚者還把〈哈雷〉慧星也排上使用，似乎不標新立异，就不足以顯示道行高深。反而把傳統這些極為寶貴的星曜賦性和格局作用，視如弃履而不用。


    我贊成學理上的創新，但創新的理論，若違背命理邏輯，恐怕就很難在學理上站得住脚，因此，所據而推演出來的命理論斷，恐怕只能自說自道，必將無法和事實真象相互吻合了。


    小李說，我的分析和事實還很符合，但就是弄不懂，我為什麼會有這解釋和判斷。


    我對這個命造性格上的分析，其實只是很傳統地依理論說，根本毫無稀奇可言。


    小李聽來似懂非懂。我乘機勸他在星曜和格局賦性作用上，多下功夫，否則別說在斗


    數上不能登堂入室，也將一輩子會在圍牆外徘徊，老是找不到圍牆的入口大門。


    隔了一會后，小李又說：『武曲為財帛主，祿存也主財富，這兩星同坐命宮，應該主利


    財帛。另外七殺同宮、主變動，左輔同坐，又主財源的綿延不絕，應該可以作這種解說吧。』


    帛上『無缺』。但却不能據作『富格』論。七殺雖有求變作用，左輔也會綿延不絕，但并不


    足使他在求財利上，會有如他人一般，有種強烈謀求財利的意願。我的看法，他在求財方


    面，會偏向保守謹慎。這個道理和前面所談，命格成爲一種保守性格的道理一般。


    因此這種人，一輩子的財富，也都是由積少成多，慢慢節省累積而來的，應非積極追求


    而致富。斗數命理上，另有一種《積富之人》的命格，若要說這個命造，所以會『無缺』，應


    該同樣由這個道理而來。』


    『不過，若根據你在前幾本著作里，一再強調行限四化引動的理論來看，這位先生，第


    一個限運的己卯宮，到第四個限運的戊子限當中，一直是己、戊、己、戊四天干，反覆使命宮


    和財帛呂武曲和貪狼化祿，不正是吉化命宮與財宮，使這兩個宮位因引動而產生積極求財


    的意願嗎？』小李提出這個『半子之矛攻子之盾』的問題來。看來他還是滿用心在看這方


    面的書籍。


    **追求財利的論斷**，除了命宮和財帛宮以外，另一個重點宮位就在福德宮。而財帛宮則作為求財方式的論斷宮位。比如說，一個人，他的財源究竟主要是來自薪資收入，或是做生意求財、巧藝得財，甚至用不很正當的手段求取財利，都要看財帛宮。也就是說，諸凡以人為主，而付以勞心勞力來求得財利的命理跡象，就要用財帛宮的星曜組合來加以研判。


    而福德宮在求財方面的作用，卻屬另外一種對財利欲望强弱的表徵。福德宮既強且旺的人，他對求財的心態會極爲強烈，因此當他有了多餘的资金以后，他將會積極地利用這些資金去生財。福德宫弱陷的人，就算有了錢，也比較不會有這種「用財求財」的强烈心態。


    這個命造的先后天命宮和財帛宮，雖然歷任四大限的吉化引動，夸何他的先天福德已官太陷弱，因此就算他有了積蓄，也没太大的膽識，敢用钱去滚錢。


    **先天福德宮的這種跡象**，若再把它和命宫的保守性格型態兩相并論，這個命造，在后天

    的行運里，也只能顯示，在他進入社會工作后金錢收入上的穩定。并不意味着他在穩定收

    入以外，還有什么大財源，甚至運用積蓄去投資生财發財的現象。


    「這種行運」他不會去买股票嗎？」小李問。


    **臺灣的股票**，近幾年來形成一種畸形發展，也許是投機者的樂園，但對一個生性保守的人，大概不會去輕易地嘗試這種帶有相當冒險性的賺錢行逕。當然，這位先生也希望賺更多錢，但我不認爲他會把錢投入這裡飄忽不定，得利毫無準頭的股票上。


    小李又說：「他的先天田宅宫在午，天機化禄為『石中隱玉』格，命宮又有祿存。這兩


    個宮位的禄星交互作用，一旦有了積蓄，是否有可能把錢投入房地產方面去求財。


    先天田宅宮在午會照禄權又成格局，原則上作吉論，也可看作他在不動產方面應有強烈欲望情况才對。但因會戌宮的太陰化忌和寅宮陀羅，使原有的吉象大減。特別是在田宅主，因化忌會冲先天田宅宮，它對田宅宮的吉象不利影響會更深遠。


    另從己卯限運起，到戊子大限，甚至延到丁亥限運，每一個大限天干忌星都延續不斷地會冲先天田宅午宮。這種忌星相繼冲害這個宮位，除了表示庫因冲破受損而財利不聚以外，也會影響他在利用投資不動產以生財利的意願。


    因此我認爲，他十幾年來，在房地產方面，也只限于購置自用住宅。至于把積蓄投資在不動產上來生財，也將會趨向保守。因此在房價飆漲的這幾年來，他也不見得就賺到什麼錢來。


    買股票發大財的原因一樣。不能光憑田宅宮如何，就追下判斷。


    斗數的其他十一個事項宮位，固然有其特殊意義和功能，但在個別事項宮位的論斷上，仍不能偏離命宮的基本特性和功能來作綜合研判，因此斗數論命，會格外重視命身格局，原因就在于此。


    根據傳統理論，《殺破狼》命格，不是都比較属于不靠祖陰，白手成家的類型格局嗎？小李問。


    古傳的典籍上是有此一說，這個格局的人命，不管他有否家產家業可承陰，他一輩子的產業成果，都比較偏于自行開創。但是也得格局好，自行開創才會良好成果，并不是所有殺破狼格局的人，都能真正達到白手成家的目的。『我說。


    『這位先生的格局還不算凶吧？若自己創業，結果又將如何？』


    『正如前述，他雖屬〈殺破狼〉，但却是個太過於穩健的命理格局，也許守成有余，但想要有開創性的創業，其魄力，恐怕就太不足了。這個道理，前面已詳談，就不再贅述，不過正由于大限延續禄星來吉化命宮和財宮兩宮，又有左輔右弼扶持，雖然一輩子在事業上不見得有大作爲，但在職業上，只要安分守己去謀求個工作，也應該可以很平穩地做到退休年齡。』我問小李：『那個原來對這個命盤，究竟作怎么樣的論斷？』


    小李垂頭喪氣說：『我原以爲〈殺破狼〉的命格，都主開創。像這個命身宮雙重〈殺破狼〉的人，不只會有左輔右弼，而且三方又有地劫一個煞星，因此他不但是個白手起家的人，到了限入戊子大限時，必然會在他所從事的行業上，闖出名堂來，若自己經營事業，至少也會小有成就，若幫人做事，也必定表現輝煌，爲老板倚爲左右手的得力高級干部。


    這幾年臺灣的股票和房地產狂飆，我也以爲他必然會及時投入賺他幾票，所以我論斷這個人，這幾年來，應該在事業和財利將會兩雙得意。


    沒想到這個，打從己丑限起，進入一家民間企業公司以后，一直很平穩、安份干他的事業差事。十多年來，才熬到了一個業務課長。差事雖順利，但也談不上有杰出表現，待遇


    報酬，也只能勉強說成可以接受。


    十幾年來，夫妻省吃節用，多少存點錢，卻不敢心存僥幸在股票上投機冒險。而房子住了十來年，已嫌太小，也因猶豫不決，遲遲不敢買新屋，而遺憾無限地時常嘆氣，這輩子恐將沒能力，再買更寬敞的房屋。


    哦！這麼論斷，難怪會踢到鐵板，這個鐵板的確踢得不輕呢！


    『我的確沒了解到，命身宮都是《殺破狼》的人，也會一輩子『吃死頭路』小李說。


    我不以爲然：『什麼叫做『吃死頭路』（臺語，意即領人薪水沒出息）～人生安穩平順就是福，你別滿腦子的功、名、利、祿，好像不追求這些，就枉費一生。看來你不只斗數不通，你的人生體驗還更淺。年輕人，多下點功能吧！』


    # # 庫破財不聚


    純投資的重點宮位


    戊辰（一九八八）年底，接到陳先生從臺南來電話問起，若不參與經營，只是純投資于某種事業經營，應該根據什么重點條件來分析論斷可能的盈虧。


    傳統上，對於這個問題的探討，通常以先后天財帛宮的吉凶，作為投資后有否生財的論斷依據。近年來，有些斗數研習者，又提出一個特別看法，認為田宅宮破損的限運，不利于投資。其原因在于庫破財不聚。即使再好的投資，也將無利可得。


    其實這兩種說法，表面上看似合理，但若依此論斷，結果不一定正確。因為這兩種說法，全都患了理念不清的誤謬，沒有先把如何生財的性質加以分辨，因此使論斷依據的重點宮位發生偏失，最後會使推演的結論和實際結果大異其趣。


    財帛宮的財，主求財的方法、得財的難易，及所得多少。福德宮的財，主利用既有的財去理財生財，也就是偏向一種純投資生財。田宅宮的財，是主投資者把擁有的資金投入自行經營的事業上，若庫旺則財聚，表示他財力雄厚殷實，可以作中長期性的大額投資。因無資金短缺、周轉困難的顧慮，因此在事業經營上，至少沒有資金調度的困難。若庫位殘破，又想投資太大事業，到時候，事業經營勢被資金周轉困難而拖垮。所以限過庫凶的人，就不宜從事太大的投資經營，更不利于投資回收太慢的行業。


