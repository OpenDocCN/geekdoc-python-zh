    **丁卯年（一九八七）**，巨門化忌，流羊流陀由巳、未冲丑宫。戊辰年，丑官天機雙化忌，己已年除了流年羊陀再冲丑宫外，文曲也化忌冲丑宫。三年延續的忌煞冲丑宫，使李大娘的『六合彩』莊家愈做愈大，負債也越陷越深。


    幾年來的生意收入雖好，但總是在一次又一次幾十塊、幾百元，既零碎又微薄的利潤中賺取。然而她竟會在類似那種一番兩瞪眼的六合彩上，輸到血本無歸的程度，實在不能不叫人慨嘆！


    李大娘的支票退還給經銷商后，根據公司約定，必須于特定的時間內，由經銷商負責兌回現金。有一天黄先生來電話訴苦說：『李大娘表示，她已没錢付貨帳，更無法繳納已開出支票所需要的現金。這些欠款待以后繼續做生意賺錢時再還，看來這筆貨款，將要列在收款遙遠無期的未收帳款的科目上了。』


    于是我拿出帶在公事包里的李大娘命盤來，隨后我告訴這位已二十來年的老伙伴道：『李大娘這幾年應該買有不動產，大可逼她處理來還債。她的負債全因賭起，不因爲生意虧損，或是家里運道不濟才如此。生意人，固然不宜因錢而逼人太甚，但若對這種人太仁慈，豈不成爲爛好人。若你不趕快處理，等好的其他債主找上門擠着要債時，恐怕對你的欠款就要償還無期了。』


    黄先生接着回答說：『李大娘確實在近十年買過土地，但似乎都是在李先生的名下目前她們夫婦倆又在鬧别扭，李先生恐難願意出面解決債務，唉……。


    [PAGE 160]


    于是 我强调说：「她和先生的意见欠和，不是这三两年的事，因此我想她不会把赚到的钱，全用她先生的名义来置产，因此不妨去详加了解，并帮她想法，如何由她名下的不动产来处理所欠下的债务。」


    约莫过了两个礼拜左右，黄先生来电话告知，李大娘在他的劝告和建议之下，终于同意出售一块她名下的土地来偿还部分欠款，总算是临时解决了燃眉之急。


    李大娘，这位南部山城的老客户，我由衷地遥祝她能迷途知返。庚午（一九九〇）年，她即将行入丙辰限运，在这运限里，有贪狼的先天禄星，三方无凶星，又无忌星引动，大限事业宫七杀，能藉着《地空》星的转化作用，使她否极泰来。


