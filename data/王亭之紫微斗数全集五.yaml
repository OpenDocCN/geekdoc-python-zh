  md: '總帶有相當程度的冒險性。


    以房地產來說，當房地產在快速飈漲時，投入資金為求短期內獲得高利，即爲『投機』。


    若是長期間，看好某個地方房地產有漲價趨勢而投入資金，即爲『投資』。


    在股票方面：因有多余資金，又看好某種股票的長期漲勢，既作儲蓄又可衍金生意，所買進的股票即爲投資。要是投入股市，只求短期炒作來賺取價差利潤者，就是『投機』。


    因此『投資』與『投機』，就當事者而言，由於處理這種求財心態的差异，遂會使他在投入資金時，所采行手段方式有着明顯差别。


    『那么在斗數命理上，何者較會『投資』，何者較偏于『投機』，又根據什么來論斷』游先生又問道。


    這兩者的差別，乃需由先天命格和后天行運里來分辨。通常命格較剛強、又會煞星成格局的人，較具冒險患難精神，這種人比較會在類似的限運里，一有機會就把資金投入『投機』性的行為上。而命格較柔弱，又無煞星，也不成格局的，生性比較保守。因此當他想利用『錢賺錢』時，就會選擇比較沒有暴起暴落的生財方式。所以這種人較會選擇『投資』性的求財方法。


    在本書命例的《殺破狼格爲什么不開創》中的這位先生，雖是命身成雙重的『殺破狼』格局，但因不會煞，又没成『吉局』，因此雖然省吃儉用，存了一些錢，但因生性太過保守，但不敢把資金投入任何『投機』生財上，也未曾輕易地從事于什么『以錢賺錢』的『投資』'
