    # # 賭徒的衆生相


    ——從財帛宮看賭博的命理格局


    認識吳先生，這位斗數命理界的后起新秀，就在戊辰年中。


    有次，和幾位同好在茶館里擺龍門陣的時候，由于他言談之間的謙虛和對斗數認知略異他人，因此讓我留下深刻印象。也許是投緣吧！從此以後經常通電話討論一些命理的瑣碎雜事。


    己巳年中，有天我路過他的住處，順便造訪，才知道他在斗數命理方面，年紀輕輕的，就有那種與衆不同的觀念和執着，這大概跟他平時博覽群書、熱愛真理的求知態度有關吧。


    浸淫命理二十多年，認識的同好不少，但在較年輕的一輩里，像他這樣熱衷于斗數的，還真不多見。真希望他能好自爲之，有朝一日，給這個混沌的斗數界，厘清出一條坦蕩大道來。


    閑談間，他提出了斗數命理，在求財格局上某些特殊狀況。近年來臺灣社會，各階層人士上焉者炒地皮、飆股票，下焉者賭錢、玩六合彩，幾使我們這個社會成爲狂賭王國。他在近幾年的論命間，偶而也會碰到一些嗜賭成性的客人。在累積較多的實例經驗以后，發現到在賭徒的命盤上，幾乎都有某些共同特點。因此他從舊檔案里，抽出幾個命例，逐一'
