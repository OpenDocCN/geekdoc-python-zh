    得泡了湯。


    周先生確是個有心人，難得能透過買股票的這位朋友，留下這麼一份完整資料。本來嘛，做學問，研究命理就需踏實，絕不可打高空，否由隨興的高論總是空談。


    他說這位朋友謝先生，自己經營一家公司，一向不涉入股票，但他眼見周遭一些朋友，在股票上得利而大受誘惑，因而在年初時，由初嘗輕試，繼而投入數百萬元玩起真的來。


    投入股市的命理迹象


    我接過這份記錄詳盡又統計分明的資料，約略的看過以后，周先生馬上問說：「這位謝先生這幾年來雖然事業不甚理想，但一向不作任何投機來生財，為何他竟會在己巳年間，興起投入股市的念頭，斗數命理究竟要根據什麼來解釋？」


    己巳年四十六歲，大運行入癸酉限，癸干使先天財帛宮破軍由化權再加上化祿。先天


    的這個財帛宮位為紫破會左右的《殺破狼》格局，又有廉貞先生天化祿在巳來朝。癸酉限


    不只使先后天的廉貞和破軍雙祿交會，大限酉宮也正好會在巳、丑的三合方，因此，由癸干


    引動的祿里，其激發力道特別強烈。到了己巳年，又再度行入先天命宮和大限宮位的三合


    方，己干使武曲又化祿，于是就在己巳這年，巧使《三代》祿星分別在先天命宮和財帛與事


    業宮位上。


    大限和先天命宮三合，流年行入先天命宮也會大限，一旦又逢流年有吉化引動時，自


    然會在「財、官」兩宮上想要有所表現。


