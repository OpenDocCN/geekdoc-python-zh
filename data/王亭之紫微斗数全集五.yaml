    - 和高先生討論命理多年，偶而他還會提出一些試探性的問題來，好在只有兩個人對談，就算漏氣又有何妨？只有我還沒到神仙論命——鐵口直斷的登峰造極境界。凡人么，誰能不犯錯，何況只有在百折不撓的經驗中，才能真正的體會到命理的真義所在。'\n\
    - 我說：『在這個丙午限，一旦當上廠長，大概會《權》《利》一把抓。'\n- 『當廠長，當然要掌握權柄』'\n- 『不，我說的是，除了《權》以外，還會抓住利益的《利》，甚至因握有權柄之便，得寸進尺地抓緊了《利》字。』'\n\
    - 『這又怎麼講呢？』'\n- 丙午限天要化權和先天天同化權作用到丑宮后，使子宮的紫微星，成為雙權所夾輔，紫微並會左右，更能發揮帶座威權，何況右弼來自午官，使子午兩宮具有某種程序的感應作用。'\n\
    - 李先生既然當起廠長，頂頭上司應該是老板階層的總經理或是董事長。由于他在丁\n\n- 135 -\n\n未大限表現優異而高升，必然會受到老板方面的信任。因此他這個廠長必然能得充分的授權和信任。\n\
    \n若把子宫看成老板宫位，又因這個宫位所會的三方皆無忌煞來冲（鈴星在午和貪狼成格，不作凶論），因此李先生在這個大限時所碰上的老板們，應該很好對付。\n\n\
    好對付的老板，又得他們的信任有加，這個廠長是怎能不威風八面，抓握大權？\n\n『李先生先天無化權，大限的命官也不見權星，可作掌握大權論嗎？』高先生提出質疑。\n\
    \n命身宫的架構為『殺破狼』，生性上不會是軟脚蝦。丁未大限已有諸如上述的制煞爲權作用，到了丙午大限，紫微在子，也是大限老板宫位，大限事業官七殺，原爲他的命官，這兩顆星曜正好成爲『紫微七殺帶權威』的格局，這個格局在權柄的作用上，并不弱于任何一顆星曜的化權作用。因此從這個由他本命宫和老板宫位形成的權柄，其力道之強烈，也許在貴公司的同仁之中，難有人堪與媲美。\n\
    \n的確如此，反正在他當廠長以後，諸凡工廠和生產相關的事，不只老板對他言聽計從，任何狗屁倒竈的事，誰也奈何不了他一根汗毛。』\n\n『那么在所謂『利』的方面又如何呢？』\n\
    \n一個管技術生產的廠長，除領得較高的薪水，和相當優厚的盈余獎金以外，難道在命盤上又能看出他在這個限運内，有什么大利可得嗎？\n\n我不知道高先生是否明知故問，于是我指着命盤繼續說道：『大限坐先天財帛宮為雙祿輔祿，并有主橫發的《鈴貪》格局。另外文昌由大財帛寅宮來會，又成為《離正位而顛倒》的《昌貪》格局。大運居變化多端的《殺破狼》限，再加上《鈴貪》、《昌貪》，又是先天的財帛宮，對一個大權在握的廠長，除非不要讓他沾上得財利的機會，否則那種爲求一己私利的，《離正位而顛倒》的《昌貪》賦件，必然會及時出現，并發揮到相當大的作用。\n\
    \n工廠在臺中，所以另設有處理財務的單位和人員在管理帳目，廠長似無親自處理財務方面的機會。』高先生說：『一個接觸不到帳目的人，不可能在這方面動腦筋吧？』\n\
    \n個人近二十年來在公司職務上，都在監督公司各個部門，當然工廠也包括在內。因此了解，一個太囂張、有所欲爲的廠長，打從興建工廠裝設機器，到原物料采購，都可以以種『專業和實際生產必需』理由由來爲所欲爲。對於這類必須有專精的行當，一般老板可不一定樣樣精，除非一個公司有健全的職務劃分制度，否則這位李廠長就很可能會遠住機會大發其私己之《利》了。\n\
    \n『只不知道，你們公司在這方面的制度如何？』我問高先生。\n\n『唉！』高先生嘆了一口氣后說道：『本來這些差事，在廠內都有專人負責，但正如你所說，我們這位廠長老兄，總會找上冠冕堂皇的大理由，把部屬壓得不敢動彈，于是工廠所有的大筆支出，例如興蓋廠房、安裝機器以及大宗購買原物料類……等大案，幾乎都在他\n\
    \n• 137 •\n\n操縱決定下呈報公司。\n\n公司的部分同仁，有時看他囂張霸道到離了譜，會向老板另提建議。但每當公司一有\n\n和他不同意見時，他可就直冲着老板老實不客氣的說道：「有實際經驗又有擔當的人，就\n\
    \n別卷縮着，大可出來負責做做看，可別只講沒責任的風涼話。」\n\n說來好笑，有時老板雖也覺得他太強詞奪理，但終究還是依了他的意見來行事。也許\n\n他正鴻運當頭，在他當廠長的幾年以來，正是我們公司的產品、市場景氣都一直看好時期。\n\
    \n公司老板們，眼看財利滚滚而入，不多理會他在職務執行上，有違常理的胡作非為。\n\n在這段期間，諸凡蓋工廠訂機器，總有千百個理由，讓他選取他理想中的特殊廠家來\n\
    \n和他配合，成本高得令人莫名其妙，但老板最后還是依他的意見核準行事。尤其長時間為\n\n生產需要而采購的大宗原副物料，價格也會比類似品高得離譜。\n\n\
    不過，高先生仍不解地問：\n\n「命身格，不會惡煞的人，若以合命身宮六吉會有文昌左右和魁鉞輔命五顆吉曜，竟\n\n會擅用職務鑽營很不光明的私利，又能表現得理直氣壯，這些在命盤上，又是從什么星曜\n\
    \n結構顯出來？\n\n命身不會凶煞惡格，又會諸吉曜，這種人在待人方面，常使人有一種易和人相處的感\n\n覺。\n\n尤其魁鉞輔命，更會使他在言行舉止和待人方面，會維持相當的紳士風度。\n\
    \n另外在雙重的命身〈殺破狼〉和〈昌貪〉三種格局上，表現出他作事的能力、條理與足\n\n138\n\n# 智多謀。\n\n一般領薪水的上班族，很多人都會犯得過且過，不積極、不負責的毛病。但這位廠長先生，在公事表現方面，主動負責、不條不紊、并且善盡職務。所以他能得老板的提拔委以重任，并言從計聽，不是没有道理。命理上的諸多因素，又能讓他在得其所哉的機緣里充分發揮，當然會使他表現出潛在的能力。\n\
    \n至于他在職權上某些太為私利的作爲，除了前述的某些命理因素以外，還有當他行入先天財帛宮的丙午大限，正好讓他命理上的一些特殊格局，得到充分發揮的機會。\n\n\
    丙午大限，丙干使天機化權，廉貞化忌。天同化天化權，作用到丑宮后，知天機化權輔先天福德子宮。子宮的紫微星會左輔和右弼，又經雙權夾輔時，帶座的星賦力道大彰。福德宮可以看出對財富需求和處理的基本心態，有此紫微權化坐守，對財利欲求心理大增。若把這個官位再和《鈴貪》《昌貪》合并論斷，豈不更可說明，他在丙午限時，會有利用職權去大搞其私利的現象。\n\
    \n至于擅用職權去賺這種錢財，也可以用大限廉貞化忌，會冲先后天福德宮來解說。廉貞爲囚星，遇化忌會出現不是光明正大的賦性作用。會福德宮，正好引動他產生一種擅用職權謀取私利，不是光明坦蕩的錢財意識。\n\
    \n若把先后天福德子申兩宮與先天財帛宮的兩午大限，三個官位綜合并論，除了不會煞曜以外，又有左輔右弼會照來看，這位廠長，在這個大限内，可正是財利滚滚，連綿不斷。\n\
    \n• 139 •\n\n因為星，在這三宮位不會凶煞之下，更具有穩定作用。所以也可以說他，足足發了十來年的。\n\n那么這顆廉貞化忌的囚星，難道不會去破壞先后天福德宮對於財利的聚留嗎？何況廉\n\
    \n會武曲成爲〈財與囚仇〉的凶格。『高先生思慮問詳地問道。\n\n雖然廉貞化忌，使大限福德申宮成爲凶格，但在申宫的三方里却再無凶星來冲，因此\n\n這\n\n\
    爲害作用不一定會太大。再則先天福德子宫太穩，這個宫位又和大限丙午宫互爲\n\n映輝\n\n因此在這個大限里的先后天福德宫，仍作吉論。至于廉貞化忌的囚星，也許只\n\
    \n是表現\n\n個限運内，求財上的一種不很光明正大的心態和手段。\n\n另外，他若不去另作其他營利事業，或什么投資和投機事情，就不會使這個凶象引發，\n\n\
    不至于有漏失財利機會，因此不必看成有太大禍害。\n\n再從丙午限丙干天同化禄和先天太陰化祿合照丑宫，這個先天的田宅宫位，若他\n\n能把來的錢財，投入在購買房地產上，那他的財利不但可以無損地保留，甚至還可以增\n\
    \n值。\n\n一在這十年來，他把握機會上下其手，撈得不亦樂乎，再作其他生財行爲，可不一\n\n定會穩賺不賠，因此他在這些年來，倒是買了些不動產，可也有數倍的增值。『高先生\n\
    \n補充地說。\n\n我說：『不過己巳年已是丙午大限的最后一年，接着行乙巳限運。乙干使天機化祿，\n\n太陰化忌。這個限運使先天財帛午宮成為雙忌夾，這一夾制，也使羊陀產生夾制午宮的煞\n\
    害作用。因此李先生限入乙巳運時，當年的鴻福財運，已經一去不復回。」\n    高先生語帶詫異的問道：『乙干也使天機化祿，使已宮大限另成雙祿交馳，不也有呈\n\
    \    祥作用嗎？』\n    『沒錯，是先生天和限運雙化祿，使巳宮成雙祿交馳。但乙干也使太陰由祿轉忌，由\n    此忌星另引動兩個凶格的作用。』\n\
    \    其一，祿星與亥宮天馬會已宮陀羅，使吉象的『祿馬交馳』成為帶凶的『折足馬』，作\n    起事來難稱心順利。\n    其二，太陰化忌會亥宮火星，成為『十惡』凶格，若在這限運換了新的老板上司，當年\n\
    \    那種既和諧又信任的主從關係，就不復存在。\n    『那么午宮原來就是羊陀夾祿，為何在丙午大限時，羊陀對午宮不生夾害牽制，一旦\n    到了乙巳限途，就會使羊陀對午宮產生不利的擊肘作用？』高先生仍然不解。\n\
