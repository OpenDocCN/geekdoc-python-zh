  md: '「那么亥宫的流年贪狼化忌，并会有先天羊陀及同宫的火星，不会因逞凶而影响她改变存放高利贷的意愿吗？」


    「我的看法正好相反，一个人限运进入这种强烈又带凶煞的年份时，往往会作出很大的错误判断，也因为这种判断，所以她才会把辛苦得来的积蓄，全部改存入蔡氏的集团事业里生息。」我说。


    蔡氏当年还没出纰漏前，蔡家的字号，本是信用万无一失的金字招牌，也难怪这位小姐会理所当然的把她积蓄的钱存进。也许因为她有这个行运，又偏逢蔡氏大量吸入资金，所以才促成她改存高利存款。


    蔡氏当理事主席的台北十信，在翌年的甲子年底违规受罚，曾被勒令停止营业几天。


    到了乙丑年初，整个十信风暴一发不可收拾后，使蔡氏旗下的集团事业，一个个地掀翻了底，而拥出经济大风波。弄得当时很多为贪图高利的存款人如丧考妣般，疯狂的走上街头。这些民间存款债务，后来据说由蔡家其他人士，情不甘心不愿的，象徵性拨款支援，才草草处理了结。因此这位小姐的五十万存款，也没能全部收回。


    乙丑年（一九八五），流年在丑宫正好是癸亥年的福德宫，也是癸年流羊进入的宫位，丑宫有地劫，三方会有羊陀和地空，使丑宫呈现凶煞而不稳。


    大限午宫也是先天福德宫，到了乙丑年，经太阴化忌再冲后，使这个宫位被三代忌星先天、大限和流年化忌所冲破。


