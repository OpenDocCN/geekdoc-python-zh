    当然要根据第一次买的月（日）令来订定。因为既然是同一种股票，总不能説先后买的往后会有涨跌上的差别。因此可以根据『缘起』的时间，作为推论依据。你不妨自行依此情况来推演看看，结果应该就是如此。


    九月份在丑，福德宫在卯，天干为甲。


    **甲干廉贞化禄，破军化权**，武曲化科，太阳化忌。


    甲干使丑宫成为禄权的《三奇嘉会》，这个宫位又是紫破会左右的大格局。另有地劫同踞并会地空，流年也由未宫直冲而入，因此虽然也买入五次，但累计总金额却比前几个月要来得更多。


    从月令丑宫三奇嘉会，又有流年的武曲化禄来会，表面上似乎是个大吉大利的月份宫位。但买五笔，虽赚三笔，不过所亏的两次，其金额大于所赚的三次，因此结果还是亏钱达六万多元。


    『流年文曲忌星』和月令太阳化忌，既不冲月令丑宫，也不为害福德卯宫，为什么还会亏钱呢？


    月令丑宫，会有先天廉贞化禄。自坐大限破军化禄，流年武曲化禄在西宫，月令又使廉贞再度化禄，使丑宫这集会『四代化禄』而成锦上添花，因此对丑宫似乎吉祥毕集，这会使得苏先生误认为是个『利多』的大好机会。


    「你刚才谈到五月份时，认为亥宫得巳宫集破军禄和武曲禄与廉贞禄、三大禄吉作用照亥宫，使亥宫呈吉。因而使五月份获利。」


    为何集《四代禄》的丑宫反会『误认』有『利多』之害呢？周先生问。


    我回答：「你这个问题问得很鞭辟入微，看来你已能条理清晰有条不紊。」


    这个道理，即因巳宫不坐空亡。而丑宫自坐地劫又会地空，因此这两个宫位，在同样禄星的吉化下，巳宫的吉化作用较稳定，而丑宫的吉化，就带有极大动荡不稳现象了。固然巳宫同样有空劫自西丑来会，自然也使巳宫吉象多少有点不稳，这也正是五月份所以会有两次亏损的一个原因。要是没有空劫冲击，亥宫得自己巳宫照会的吉象会更大，也许就不会有两次差价亏损，而会赚得更多。”


    我再三强调，用『钱滚钱』的求财，除了本宫之外，重点宫位在福德宫。九月份福德宫在卯，天府擎羊同守，天府也为财帛之星，虽可制擎羊之恶，但本宫有流间，酉宫有地空双煞来冲。这三天凶星，会使天府很难全制其恶，所以一旦在此月份里多买或是大买时，恐怕就难使天府全制三煞的为害了。


    所以买五次，赚两次赔三次，赔大于赚，于是使结果成为负数。


    十月份斗君在寅宫，月令福德在辰宫，天干为乙。


    寅宫为羊陀夹禄，主《委屈》宫位，午宫有流禄和文曲流年忌星来会。本宫弱陷，虽有双禄，但另因忌星（还有戌宫太阳先天化忌）来冲，因此月令本宫不作吉论。


    月份天干为乙，天干使天机化禄、天梁化权、太阴化忌同时会照辰宫。辰宫会禄权两曜，会使谢先生认为『利多』兼『长红』，因此虽也同样买进五次，但累积总额却为全年最多的一个月份。但太阴化忌恰好引动辰宫同踞的火星，使这个月份福德宫成为《十恶》凶格。


    从记录表上看出，先前买进的『远纺』和『工矿』两项，后来以跌价亏本卖出。『勤益』先后买两次，第一次买进的，在十一月间脱手仍是大亏。


    周先生补充地说道：『勤益』和『远纺』这两支股票，直到十二月二十七日（阴历）封关那天，『勤益』以二百三十二元收盘，『远纺』却是涨到一百二十元之多。也许他还看好『远纺』，因此他还是没把它卖掉，以略补这个月的其他股票损失。


    周先生接着又说：『勤益』和『远纺』同样都买进十张，但单价，『勤益』的平均成本却有远纺接近两倍多价格，而『勤益』跌幅接近一百元，『远纺』的涨幅不到十元，因此怎么看，他在十月份买的股票看来是输定了。除非过了年后，『勤益』又能起死回升，长期长红。


    道：『看来辰宫的『十恶』凶格，的确极凶无比。』周先生利用计算机合算一番后，接着说出，则这一笔，又会多亏高达五十六万之谱。那么连带已卖出十张『远纺』所亏九万五千元，再加上工矿又亏三万五千，这个月所买进的亏损总额高达一百零五万之谱。要是扣除十月二十八日所进『远纺』十张的可能赚到（以一百二十元售价计算）七万，那么十月份还时亏一百万元之多。


    『由三月到九月累积赚约六十四万左右，但到十月底，却反成亏损约三十多万元。』


    买股票本来就需本身拥有资金，才能耐得住长期跌压，要是贷来资金，或是以『丙种』买『利多』，那就灾情惨重。财政部长郭婉容女士曾说，股票跌价就不卖，不卖就不亏。股票族，要是能認同部長的這種說法，就不會有走上街頭瞎胡鬧的鬧劇發生了。


    十一月份大概就因資金被套牢，所以没再買進。十二月份再買進五次，部額累計只有二百七十萬之多，看來已經不起十月間的大套牢和賣出三筆的虧損，所以在月底對關前的股市大長紅之下，仍無力再有什么交易。


    周先生頗有感嘆地接着說道：「近年關時，股市有連續幾天的大飈漲，指數也再度冲越萬點，對關時甚至冲破一萬一千點的指數記錄，但唯獨謝先生手上握有的股票漲幅不大而給謝先生十月間所買的股票帶來『利多』行情。」


    辰宫有太陰化禄，午宮有流年祿存，并會寅官祿存，合成雙祿交會。因此他在封關前所售出的那筆股票還是賺了錢，没出售的，在封關前也都呈現漲勢。


    周先生懷疑地問：「丁干不也使巨門化忌，午宫也有文曲的流年忌星嗎？怎么這個月所買的股票又會看好？」


    太陰與火星同宮，子宫又有鈴星來會，當太陰化忌成爲『十惡』時，它的凶性特别强烈。但若是太陰成為化祿時，火鈴兩星，不但不為惡，反有因煞得化禄，而有如同「制煞為用」的同樣功能，因此辰宫的太陰化祿就非一般『弱陷化祿發也虛花』的作用可比。


    雖然『用錢滾錢』的求財重點在福德宫，但也和其他命理事項的推論一樣，仍需重視行限（月令）本宮，也就是在限運（月令）本官强旺之下，相對的重點宫位（福德宫）才能因吉化而凸顯其吉象。要是限運本宫（月令）不佳，相對的，重點宫位（福德宫）再佳，也不會好到那里去。


    十二月辰宫就因上述的吉象，因此使午宫所会变禄吉象彰显，而相对的变忌（巨门和文曲双忌）之凶，也就不会为恶太强烈。


    「有一点，我观念一直转不过来的，就是十月份的福德辰宫，为什么历经十月乙干天机化禄会辰宫，十一月丙干天同化禄会辰宫，十二月丁干太阴又化禄，辰宫也在连续三个月连禄吉化下，十月间买的股票，到年底封关时，还是低迷不振呢？」周先生说。


    这个道理，可以分成几点来说明：


    第一，十月份在寅宫，前面已说过，这是个『委屈』的宫位，虽然有午宫的流禄来吉化，但也有文曲忌星来干扰，因此是个极弱陷的宫位。


    第二，辰宫因乙干太阴化忌，已成『十恶』，要是把铃星加上，可就成雪上加霜的大凶格。


    第三，十月、十一月和十二月的三个天干：


    十月乙干，天机化禄会辰宫，但是太阴化忌，使辰宫成为『十恶』。


    十一月丙干，天间化禄虽分会寅辰两宫，但寅宫太弱而辰宫太凶，因此仍难起死回生。


    十二月丁干，太阴化禄于辰宫，但巨门化忌又冲寅宫。因此这三个月的禄星虽然延续照入辰宫，仍难使寅辰两宫同时并旺。


    這兩個宮位，一個太弱，另一個太凶，三個月化星雖對辰宮成『連祿』，但也有一次造成『十惡』，另有一次對寅宮形成忌害，所以連續三個月祿星照辰宮，也就難使辰宮展現吉象了。


    若從這個觀點來推論，自然不會認定辰宮，經三個月的祿星吉化，就會使這個宮位轉凶成吉。


    『沒想到己巳流年，不但行入大陰運的財帛宮，既是先天的《三奇嘉會》宮位，又是適逢先天、大限和流年《三代》化祿的年份宮位里，一開始買股票，最後竟會虧損又套牢。』


    大限福德宮爲空宮，《動產之庫》虛弱，巳宮雖有廉貞化祿和貪狼及右弼來照，但究竟照而爲用的力道較弱。何況卯宮有擎羊，未宮還有流羊來擊，一祿難敵雙羊，空宮的亥位，也就被凶象佔據了。


    流年福德未宮有天相與流羊同踞，卯宮又會擎羊，丑宮地劫及陀羅來冲。這種宮位坐煞又有諸多煞星來冲，根基就已不穩固，就算丑宮有大限破軍化祿來朝，但單一化祿吉象，卻抵御不了衆多煞星的凶象力量了。


    大限福德宮弱又凶，流年福德宮又不佳，在這種流年從事股票炒短綫買賣，想求發財，除非能見好即收，要是全年買賣不停，到了年終，結果就會如此一既虧損又套牢。


    談了一整天，談得口干舌焦。但周先生還要我談談買賣股票日期吉凶因果的推論法，于是我委婉地說道：『年輕人，既然已有詳盡的明細記錄，你就自個兒回去研究吧』日子 >
    的推論法，其原理原則和月份一樣。學而不思則罔，不自己多用腦筋思考，老是靠人家指導，是永遠不會進步的。


