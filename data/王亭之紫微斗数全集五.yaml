    # # 怎一個貪字了得！


    | 一位上班族的撈財之道

    斗數同好高先生，是位上班族，就因斗數因緣而認識。近年來經常會提出一些，他所謂的「不知所雲」的命盤與我共賞，也經常會介紹親朋好友要我論命。其實在和這些客人討論命理時，他除了常替朋友提出問題外，也會就命理跡象，提出他獨特的見解，因此也常使我在枯索肝腸時，獲得峰回路轉的靈感和解答。


    古人曾說：與德者為鄰，與有能力者共事，與有學識者研究學問，是人生的三大樂事。


    有一次他提出他的老學長，也是老同事，李先生的這麼一個命例。李先生學化工，而高先生學會計，在十多年前，他們先后進入同一家化學公司作家。李先生在臺中工廠當工程師，而高先生在臺北總公司財務部門任職。十多年來，因經營性的公事接觸，加上同學關係，兩個人在公誼和私交上頗為融洽。也因爲這種雙重關系，所以高先生對李先生，在公事和私人情況方面，均頗爲熟悉。


    高先生說，這位李先生約在丁未限初進入公司。當時，公司正建廠生產某種化工原料

    一位學有專長的工程師，自然要負起既重要又繁雜的技術職務。若以丁未大限坐天同化權巨門化忌和擎凌晨地劫同宮，并會亥、卯兩宫火星和地空來并論，似乎對他當時所肩'
- md: "## 負職責的繁雜，還很吻合。\n\n我看了命盤以後接着說道，若再把大限丁干四化——太陰化祿、天同化權、天機化科和巨門化忌加上并用，應該更能凸顯出，李先生在丁未大限進入貴公司以後，的確卯足了勁，全力不討好，也多招惹是非嗎？怎麼會有好表現？又怎能得到公司老板的賞識呢？高先生提出不同的意見說道。\n\
    \n丁未大限的這些忌煞凶性，我以爲應該表現出他的工作職務上——技術生產多屬煞曜的賦性上，當然也代表他職務上的難辛和繁雜，甚至職責方面的重擔。天同雙化權雖在落陷宮位，但得左輔右弼鄰宮夾輔，另有火星由大限事業亥宮來會，使擎羊得制化而成制煞爲用。\n\
    \n擎羊如一把利劍，可增強天同雙權的權柄作用，因此他可以在這個限運里，得以發揮其所學。至於雙忌加上空劫，在實際現象方面，也許會因職責繁忙辛苦，有時難免心性不穩，脾氣不好，甚至略有盛氣凌人的霸道。\n\
    \n丁未的祿權科三奇嘉會大限事業宮，何況巳、亥兩宮，原已有先天化祿和化科在，因此他的表現應該不錯。至於能得公司的賞識，除了他在職務上表現優越之外，在命盤上，也有幾點迹象可尋：\n\
    \n第一，大限遷移丑宮，除了日月并明拱照之外，另有由巳宮太陰變化祿來照，使這個宮位產生兩種值得探討的命理迹象。\n\n| 陀羅 | 太陰 | 鈴星 | 祿存\
    \ | 右弼 | 擎羊 | 巨門 | 天同 | 忌權 | 左輔 | 天曲 | 武相 |\n| :--- | :--- | :--- | :--- | :---\
