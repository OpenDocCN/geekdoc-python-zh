    若從這些吉象會照宮，的確使使巳宮并非只凶不吉，但是若就吉凶力道強弱的比較而言，巳宮的天機本身已有限限所引動的化忌凶象，太陰化祿由對照宮位來會，其吉象，無法化解天機既有凶象。何況，由亥宮來會的祿星，只有一三隔代祿星，它的吉化力道没有巳宮所會，一、二、三代忌星全到的凶象力道那么强劲，所以巳宮的凶險，還是大于吉象。至于魁、鉞、左輔和文昌，這四顆吉星所發生的吉化作用，再和丁卯年時，巳宮所坐的雙陀，及西宮的鈴星三煞抵充，恐怕吉象力道就要抵消大半了。假使硬說這些吉星應該還有吉化作用，那么吳先生的投資，就算無利可圖，亦不易收回資金，但短期間內，尚不至于全部泡湯。只是這個投資，好像吊在牆壁的高處上，墻下垂涎欲滴的貓，盡管渴望，但却遥不可及，只有干瞪眼的份了。


