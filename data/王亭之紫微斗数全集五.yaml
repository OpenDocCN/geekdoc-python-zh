    打比方說，打電動玩具可以有純為松懈心神而娛樂的機種玩法，也有可輸贏金錢的吃角子老虎，和數不清種類的玩錢機臺。一個寓樂于賭錢的玩家，他可能就會對純娛樂的玩法，感到索然無味。若從這個觀點來觀察，這兩種電動玩具的人，在命理迹象方面，應該也會有某些差別。


