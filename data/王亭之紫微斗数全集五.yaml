    花費也許多些，但的確寓運動于娛樂，只要花得起，總比花天酒地來得有價值。


    讓她覺得很納悶的，據她了解，近年來她先生，每年花用在打球上的費用，要高達二、

    三十萬元之多，所以家人說，他是貴族中的大貴族。


    她不知道，她這位貴族先生，也沉迷在高爾夫球的輸贏遊戲里。


