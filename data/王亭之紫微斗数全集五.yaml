- md: '## 關係，因而能不遺漏地網住社會上很多略存有幾個錢的家庭。公司給予存款者月息四分的重利，吸收資金的員工則能得二分業績獎金，公司的錢財也就如潮水般地翻滾涌進。


    這位洪先生眼看着公司的業務正處於鴻圖大展、財源廣進的盛況下，他不但奮力積極向親友勸邀投資，也在他進入公司兩三個月後，把既有的儲蓄全部投入在自己公司裡。


    據他說，到年底概約一算，半年不到的期間，全部的收入比以往兩三年的薪水還多。


    戊辰年為流祿在巳，卯宮有祿存，流年財帛宮有天機化祿，事業申宮有天同化祿，難怪他在忙碌中大有斬獲。子宮的天機忌祿沖犯空亡，不只使他忙中生財，也使他原本不易或不該得的財變成意外得到。


    『不過戊辰年存進公司的錢，為什麼會到己巳年才發生問題呢？』華先生不解地說道：「戊辰年財帛宮天機化忌又逢雙擎間，流年福德午宮有流羊又有子宮的忌星與戌子兩宮空亡來沖，寅宮另有火星陀羅雙煞沖照。這種流年福德宮忌凶畢現，為何不在這年就發生被倒帳問題，而卻發生在己巳年福德未宮、凶性不頂大的年限裡？」


    當戊辰年洪先生把積蓄存入投資公司時，流年辰宮被巳宮的流祿及貪狼化祿和卯宮的祿存夾輔，申宮有天同大限化祿，子宮有先天天機化祿來會。因此辰宮雖會諸凶與天機流年化忌，尚不至于命名辰宮的凶象強過吉象。


    『到了己巳年，流年本宮自坐大限廉貞化忌，但也會有流年武曲化祿。流年福德未宮雖也有流羊會文曲、流年化忌，可是這宮位仍然被午宮的流年祿存和大限天同化祿在甲來輔，先天祿存又由卯宮來會。』


    『流年本官不凶，福德宮又吉大于凶象，為何洪先生會在这一年被倒帳？華先生思考周詳地提出疑問。』


    **這個疑間涉及斗數命理論事項上的兩個關鍵問題：**


    第一，洪先生把錢存入投資公司在戊辰年，而非己巳年。因此已巳年發生的倒帳不應該把它定在己巳流年的福德未宮。也就是這筆倒帳的重點官位，理論上應該定在午宮裡。


    這午宮在戊辰年時的凶象已如前述，只因流年太歲宮位很吉，所以才無被倒債之事發生。


    **第二**，丙戌大限福德宮在子，子宮的凶象也已如前述。但己巳年文曲一化忌時，辰官即被己宫的廉貞化忌（大限）和文曲化忌夾制。這一夹忌使辰宮的《財散》凶格引發其凶性而冲激子宫——這个大限的福德宫。


    若再以存钱流年的天机化忌作为前因后果的缘起缘减，不就使戊辰年存钱造成的因到己巳年而有倒帐的果了吗？


    **华先生说道：**「你这个《缘起缘减》的运用方法很玄妙，这种推论方法我很认同，也屡试不爽。但以这种命使来论，若将子宫定为被倒帐的重点宫位，那么到了己巳年，流禄入午官照子宫，武曲化禄也会先天福德宫。因此已巳流年，在先后天福德宫都吉化之下，为什么又会被倒帐？」


    **华先生不愧老谋深算**，客人多、阅历丰富，因此推命析理精辟入微，很令人钦佩。


    我回答说：『若从这观点来看，我同意，戊辰存入投资公司的钱在己巳年间虽有被倒帐危险，但似乎不至于全被倒光，连部分都收不回来。』


    华先生接着又说道：「这家投资公司就在己巳年中宣布停止出金，也就是所有的存款冻结各种给付。但公司并未宣布破产解散，甚至也没有清算债务。因此洪先生手头握有的五、六百万元存款（投资）凭证岂不全泡汤了？」接着他又说道：『庚午年太阳化禄照辰宫、流年祿存在申宮，分会子辰两宫，应该多少可以拿些回来吧』


    我说：『但庚午也使天同由禄转忌，子辰两宫。这两个宫位原为吉中带凶，又经申宫的忌禄再冲动下，恐怕还是凶多吉少，不可太乐观。』


    华先生接着说：「也许洪先生他得在公司服务之便多少可能拿些回来吧」


    『不过我看连要回来部分钱的机会也不大，因为戊、己、庚连续三年的忌星也都连续冲击着子和辰两宫，因为这种连续三年的凶性太大了因此很难收回』我不表同意的说道。


    讨论完华先生带来的命例后我也从档案里拿出一份命盘来。


    这位王小小姐学校毕业后做事几年省吃俭用地存了些钱就在癸亥年底（一九八三）蔡辰洲乘当选立法委员之际积极想把他旗下的企业雄图大展而以高利广纳民间游资時她也把僅有五十萬元儲蓄放進蔡氏經營的事業機構生利。


    癸亥年她二十五歲大限庚午，限運坐先天福德宮這個宮位天機祿存本為《石中隱玉》宮位奈何又有文曲化忌同坐而鈴星也由於宮來冲使這個宮位成白玉玷瑕。另外庚干使天同化忌冲照午宮使這個宮位更受摧損大限福德申宮無甲級星作限弱論經天同化忌和鈴星冲击后更形破損因此這個限運内把儲蓄貸放民間高利就難逃被倒帳的厄運了。


    『先后天福德宮這麼凶怎么還會有贷放高利生息求財的想法呢？』華先生提出不同的看法。


    午宮有祿存申宮有庚干的太陽化禄照會。先后天的福德宫都會照有祿星自然可作吉象論只是它的吉象比凶象的力道小但吉象仍有它的作用存在。


    癸亥年破軍化祿巨門化權流祿在子。流祿會照先后福德的午申宮巨門化權也在這個宮位同時分照這兩宮這種由流年同时引动的大限与其福德宫位会使这个命造激起如何去理财生财的强烈意愿。


    流年本宮在亥破軍化禄在流年財帛卯宮有《財帛主》的武曲先天化祿及太限化權這些皆主與財利有關的星曜會合又吉化后很自然的就會產生強烈的理財求财心理。從流年引動的這兩種命理跡象正可以用來說明她之所以把錢從銀行里提出改投入蔡氏事業集團的原因。


