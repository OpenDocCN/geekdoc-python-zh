    #### 從廿萬到四億元


    股票炒作的横發命例分析


    己巳年底，有一回碰到游先生時，他提出一張命盤問道：「這個人庚寅大限里投資求財吉凶如何？」


    庚寅大限，太陽巨門坐守，三方會有擎羊和火鈴，太陽在寅為〈東升〉，論求財主『競爭』，三方『火羊』與『鈴羊』來會另主〈横發〉。大限本宮太陽因庚干而化祿，並為先天福德宮，會使這個命造，在適當年份因緣巧合，興起強烈的求財欲望。另外大限福德辰宮禄權嘉會，也會加重在庚寅大限時的高昂求財欲望。


    但若以主『競爭』和『横發』，再和先天命宮與大限官位，這種會擎羊得火鈴而成的制煞為用來推論，在庚寅限運里的求財，應該比較偏向于劇烈性的『投機』求財現象，而不像是個謀定而后動的長期『投資』。


    『投資』和『投機』其目的都為賺錢，在命理上會有差別嗎？游先生問道。


