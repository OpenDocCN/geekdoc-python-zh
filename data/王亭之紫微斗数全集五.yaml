  md: '作用。因此當先后天福德宮形成《府相朝垣》時，一旦限運呈現較強烈的求財命理跡象時

    這未亥兩宮也會因此而產生相似的求財反應。

    在這個案例里，先天、大限和流年福德宮，正好分居在未、亥兩宮。未宮感受丑宮的吉

    化引動，亥宮和未宮三合外，也和巳宮對照而大受感應。只是，府相若未受四化引動，似乎

    形成靜態，因此在推論時，常會不受到重視。

    不過在這個命盤里，未宮也有丑宮的破軍祿權來會，亥宮也有巳宮廉貞化祿和貪狼流

    年化權來合，因此這兩個福德宮，也在限運被受到對宮吉化會合的激發。所以當限運使先

    后天財帛宮受到強烈引動時，這兩個福德宮，自然而然的『以錢滾錢』的這種

    求財效應了。

    另外，未宮在己巳流年有流羊進入，並會有卯宮擎羊和丑宮地劫與陀羅，亥宮也有未

    宮流羊和卯宮擎羊來冲。這兩宮都在凶煞冲動之下，促使他萌生一種投機求財的強烈意

    願。、這兩三年來股市大興風浪，造就了不少暴發的股票族。謝先生就是在這種命理跡象

    和環境促使之下，因而走入股票市場，假定沒此環境，那又不知道他會去投機什麼來求財

    了。

    月份的贏虧理由

    周先生看着記錄表說道：『三月份為戊辰月，流月在辰宮，福德宮在午。戊干天機化

    忌和流年文曲化忌會冲午宮。怎麼會在這種財帛宮和福德宮雙破之下，不虧反賺呢？』'
  merge: -1
  pgno: 83
