  md: '因此這次見面時，居士的么弟，提出另外這兩位投資者的命盤來。


    大老板李先生，丁卯年三十九歲，大限在戊辰，戊干使貪狼化祿，太陰化權，天機化忌。


    丁年干使太陰化祿，天同化權，巨門化忌。


    歲運卯宮坐流年天同化權，會有先天福德酉宫的大限太陰化權。卯宮又是先天的財帛宮位，逢此歲運，一旦有投資——以錢賺錢的機會時，較會興起強烈的投資意願。


    若從大限福德午宮來看，破軍和祿存同宮，又會有戌宫的貪狼先天化權和戊辰大限的貪狼化祿，同宫又有火星成爲〈火貪〉橫發格局。這種大限福德官，也具有強烈的用錢賺錢的投资意願，一旦在某個流年再度被吉星引動時，較會及時付之投資行動。


    丁年流禄在午，使大限福德宮吉化，若用大限運的這個福德宫，也可以說明，他會有這件投资的意願情事。


    不過這位李老板丁卯年投資的重點宫位，似乎要定在流年的福德巳宮較爲妥善。


    巳官太陽有鈴星陀羅同跨，鄰宫有雙祿所輔，酉宫會有大限的太陰化權。當丁卯年時，太陰又化禄，使已宫增加會祿存，若作爲丁年激發他的強烈投資意願，也甚爲妥當。


    『既然三個福德宮都有明顯的投资意願迹象，那么要根據那個官位，做爲丁卯年投资的重點宫位呢？』了無么弟問。


