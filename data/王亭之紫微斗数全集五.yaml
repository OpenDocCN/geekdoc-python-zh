    大限坐武曲天相在申宮，同宮有鈴星。武曲化忌和鈴星合為『寡宿』，武曲為財帛主、成凶格時，最不利于用錢滾錢的逐財求利。另以大限財帛宮在辰，有廉貞和天府并坐。廉貞和武曲化忌會合，也成為『財與囚仇』凶格，同樣不利于用錢滾錢。


