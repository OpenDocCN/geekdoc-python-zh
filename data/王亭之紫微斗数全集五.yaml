    本來嘛，這種輸贏分明的把戲，固然有它一套遊戲學問，但誰也不敢說能夠十拿九穩。穩賺不賠，否則那些所謂的分析專家，豈不是都成財神爺的化身？這種用錢滾錢的金錢游戲，固然不能不懂得相關的某些原則訣竅，但就命理而言，若無財運，那么人兩腳，錢四脚，不管你追得多快，錢還是沒能讓你逮著。


