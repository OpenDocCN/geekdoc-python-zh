- md: '因此，純投資結果要如何論斷，就須以流過的福德宮吉凶，作為論斷依據了。陳先生目前在臺南一家電子公司當主管級的工程師，他是我認識年輕朋友中，狂熱於斗數業餘研習的一位。己巳年中，有一次在我南下臺南公差時，他提出兩個純投資的命例來討論。


    他說，張先生和王先生，於戊辰年底向他請教，關於投資另外一個朋友經營養豬場的事。由於投資金額上百萬，因此事前來了解一下，這個投資的結果將會如何？三十多歲的年輕人，上百萬元的投資額不能說少，必須在投資前小心些。


    原來這兩個人想要投資一位養豬朋友的事業。據這位養豬朋友說，臺灣的養豬事業，只要能達到某個經濟規模，以一、二十年來的景氣而言，這個事業應該是個值得經營的好事業，因此想把目前略嫌小的規模擴充，所以才邀張、王兩位好友參加投資。陳先生就命理上分析說：


    「戊辰年張先生三十四歲，大限在己卯運，己干使武曲化祿，文曲化忌。

    流年流祿在巳，貪狼化祿、天機化忌。

    是個坐祿會祿，又是雙祿所輔的吉祥畢至的大好宮位。

    流年在辰宮，正好坐武曲大限化祿被卯巳的雙祿所輔，戌官貪狼化祿來會。因此辰宮

    大限的福德巳宮，在戊辰年有流祿進入，流年的福德午宮，也有已未兩宮的祿星輔佐，先天的福德申宮，也會有辰宮武曲的多重祿星吉化來照。這種本命、大限、流年的福德宮

    都吉祥之下，來作純投資，應該可以得到預期的投資利益。


    再以王先生來論，戊辰年三十五歲，大限在戊辰運，大限貪狼化祿，天機化忌。戊辰年貪狼再化祿，流祿在巳宮。由於大限和流年的福德重疊在午宮，這個宮位，在戊辰年時，正好被雙祿所輔（未宮無甲級星，讓宮主曜作用到未宮為用）。這個福德宮既然爲雙祿所輔，所以應該仍作吉論。


    若純投資由福德宮位爲重點來據以論斷，那麼這兩人限運的福德宮，至少不能作凶斷。所以在這年所作的純投資，應該不會離譜才對吧。」陳先生說。


    我說：「你拿福德宮來判定做爲純投資能否賺錢，理論上很正確。因爲純投資若賺錢，那是用錢去賺錢，不是自行經營事業來賺錢，所以重點宮位不在財帛宮，當然也不會在事業宮。若是投資的錢虧了，更不是因爲先后天行運的財官兩敗，而是把既有的錢因投資而虧損。既有的錢財，就是福德宮的財，所以凡是利用既有的錢去作純投資，其吉凶論斷，一律根據福德宮。


    不過你所定出來的重點位，恐怕有些不妥當，因此，所論斷的結果，恐怕會和事實的結果不盡相符。」


    以張先生的命盤來說，己卯大限的己干使文曲化忌，酉宮因而有先天和大限以化忌同宮。這個投資發生在戊辰年，戊干天機化忌在戌，正好使先天福德申宮被先天、大限和流年的《三代忌星》夾制。這個先天福德宮，又會有寅宮的陀羅、火星，及辰宮的擎羊和地劫四煞，其凶甚为强烈。


    而戊辰流年福德午宫，虽有双禄所辅，又有贪狼流年化禄由戌宫来会，但午宫究竟有地劫和流羊同躔，火星、陀罗又从寅宫来冲，所以午宫的吉象也不稳固。


    另外，若用大福德己宫来看，这宫位在戊辰流年，虽然有流禄入坐，但也会有酉宫的后天双忌冲击，所以还是吉中带凶。


    戊辰年底投资养猪，翌年就是己巳年，流禄在午，武曲化禄，文曲化忌。

    若重点宫位定在午宫，固然到了己年时有流禄同宫，并有戊年的贪狼化禄来会，但有地空踞午宫，使午、戌所会双禄减弱吉化作用——禄逢冲破。

    若重点宫位定在申宫，己年又有文曲化忌再度引动申宫受《三代忌》（含戊辰年的天机化忌）的凶象，其凶甚大。

    若重点宫位定在巳宫，文曲化忌为大限和流年双忌，再加上先天的太阴化忌，成《三代忌》冲击这个宫位。


    先天福德申宫呈凶；

    大限福德巳宫亦凶；

    流年福德午宫（戊辰年的福德宫）禄逢冲破。


