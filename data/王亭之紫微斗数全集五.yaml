  md: '到了壬戌年流年，武曲轉成化忌。也就在這年里，引動《財與囚仇》的凶性發作。


    壬年流年擎羊在子宮，使子宮除了《財與囚仇》的凶格之外，又多上《因財持刀》的凶格。若再把辰宮的火星合并運用，武曲一化忌，和大限事業宮的火星，又多了一個《寡宿》凶格。


    《財與囚仇》、《因財持刀》和《寡宿》，三個凶格并在一起，這種財務問題的糾葛可就大了。


    假定在壬戌年，因財務問題所引起的詐欺和干犯票據法官司，那麼便會曾因此而有的官非，比如說因而被判刑坐牢之類，就以這個命盤迹象較準確。


    『二十二日的命盤，不也是有財務困難嗎』林先生問。


    很單純，帶有不擇手段而形成的財務是非。因此前者比較屬於民事問題，只要民事方面解決，刑事上不會有太大難關。


    林先生說，這位朋友後來在甲子年（一九八四）被判刑坐牢，直到丁卯年（一九八七），才被釋放。


    那麼這個牢獄之灾的前因后果，以及進出監牢的時間，和二十三日的命盤，更加符合。二十二日的命盤，可不能作此論斷。所以我認為生日應該二十三日才正確。


