    根據證券專家指出，股市昨天在業內、市場主力聯手出擊下，可以說是『打了一場漂亮的仗』，重拾投資人的信心。


    證券專家表示，從昨天的盤面來看，事業上，市場主力早已有合力破除爲迷信的徵兆，因爲甫一開盤，幾乎出現『滿堂紅』的局面，且緊接着舉凡有主力介入股票，諸如嘉面、東和、建臺、南港、正豐、濟業、寶祥、國揚等等，都呈現相當強勁的走勢，由此可見，爲破除迷信，原本并不是很合作的市場新舊主力都傾巢而出。


    證券專家說，除了多頭主力聯手之外，投資人昨天雖然一開始也心慌慌，但終究還保持理性，而并没有急殺股票。


    據指出，近日明顯有不少業內或市場大主力爲將『九·七』崩盤之說攻破，而聯手硬撐，雖然市場實壓沈重，然大盤仍呈現盤局，因此，推論市場主力在前幾日必定吃進不少籌碼，而在星相幻術已驅攻破，昨日盤局表現對后市而言，又似乎以榮面居多。


