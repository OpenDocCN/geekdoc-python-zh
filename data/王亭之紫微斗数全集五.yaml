    高先生說：李先生在丁未大限的表現情況的確如此，因為得到老板的賞識，因此約略在丁未大限未或是丙午大限初，被提拔當廠長。工廠也就在李先生的管理之下，產品大量推上市場。近十年來，更因公司產品投合市場需求，使公司大賺其錢。因此多年來公司老\n\
