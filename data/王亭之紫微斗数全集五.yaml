  md: '上，只是個過路財神，無法享受。


    甲子大限太陽化忌會入先天田宅宮，癸亥大限雖破軍化雙祿在大限田宅宮上，但這宮位也會有午宮領狼化雙忌來沖寅宮。壬戌大限田宅宮在丑，雖然有雙祿來輔，但丑宮無甲級星曜，看對宮未宮。未宮為雙忌所夾，作用到丑宮時再加上擎羊爲惡。因此壬戌的田宅官，也是吉凶相伴。


    到了辛酉大限，文昌化忌在巳宮，不會入大限田宅子宮，但子宮原來就有貪狼化忌，并有地空地劫來沖，也不是很穩定。庚申大限天同化忌沖大限田宅亥宮，亥宮有陀羅并會有卯宮的鈴星雙煞，亦作弱宮論。


    己未大限文曲化忌，爲大限福德宮，大限田宅在戊，另承受空劫，貪狼化忌與寅宮的火星來克害，使由宅宮大破損。戊午大限田宅宮在西，太陽天梁爲陷落宮位，另有擎羊和鈴星來沖，也使這酉宮脆弱不堪。


    田宅宮在先后天上都不够強旺，凶象都比吉强。這種命格的宅宮，成不了富翁，想要逐財求利，幾乎是水里撈月。


    因此我勸簡先生，有朝一日，成爲某種財務管理專家時，最好去幫人家或在政府機構作事，甚至在大學教書。去大展他的專長才華。一旦表現杰出，那怕没有高薪厚祿可得。一個人，特别是一個知識份子，一生感到最窩囊的，就是壯志難伸。其實，成就倒不一定全在財富的多少上。


