    以這個純投資的個案為例：


    第一，想用純投資來賺錢，重點宮位必定在福德宮。

    第二，仔細檢視流年、大限和先天三個福德宮的吉凶程序，比較其輕重。

    第三，三代忌交會比兩代忌強，兩代忌比比一代忌強。同樣的祿星三代、兩代和一代的作用，也有這種強弱的比較之分。

    第四，不論吉或凶，只要能成為《格局》的，都以《格局》的作用較強烈，因此吉凶的程序，首先要以成格的《格局》來論。不成爲格局時，再由祿吉和忌凶來比較其強烈程序。


