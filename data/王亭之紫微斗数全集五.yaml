  md: '就一般推論而言，一個人會把資金投入房地產上，通常都根據先后天田宅宮作爲論斷依據。田宅宮興旺，在限運里時又被吉化引動，就有可能去置產或是炒地皮。而投資股票（中長期）或炒股票（短期買賣），就需用先後天的福德宮來衡量了。


    當然投入股票的資金可大可小，資金也比較容易兌現融通。而買賣房地產所需資金都較龐大，兌現融通就比較不那么容易快速了。


    這個命造的先天田宅宮在卯有天相坐守，另有未宮地劫和西宮化忌來冲，因此不是一個很興旺宮位。但大限田宅宮在巳，紫微七殺禄存同坐，限運武曲化權來會自有其吉化作用，因此在庚寅大限內，只要有足夠資金，他必然會興起置產念頭。


    然而，因紫殺與禄存同宫又不會煞，雖有西宮廉貞忌來冲仍撼動不了巳宮的穩固作用。因此在庚寅大限時，一有余錢，應該屬於置產，而非爲炒不動產來生財。


    若由福德宮來看，大運走入庚寅限，寅宫除了太陽自化禄，來吉化引動之外，午、戌兩宫也會來擎羊和火鈴三顆煞星。大限福德辰宫也由戌、子兩宫來會禄、忌和火星。先、後天的福德宮，在這種吉化和忌煞劇烈引助之下，一但有了資金，就比較會傾向于投機股票的金錢游戲上。


    除了根據福德宮來論斷其可能傾向外，命身格局和由煞星所形成的特殊組合，也有類似的趨勢作用。在拙着《斗數論名人》書中所剖析蔡家父子三人，他們在股票炒作上，所曾有過的翻雲覆雨作爲，正是由於命、身宫和福德宮都有這些特殊條件的因素。


