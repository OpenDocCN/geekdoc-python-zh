  md: '一、大限有地空同踞，不也有禄逢冲破的不稳凶象吗？居士么弟问。

    具有不稳的现象，因为《空劫》来就有《半空折翅》和《浪里行舟》的作用。但却不一定有《禄逢冲破》，吉处藏凶》的凶格作用。因为同宫的武曲五行属金，与地空同坐，反有《金空则鸣》的作用。戌宫适有火星来会，也使火星有《火空则发》的正面作用。因此这个同坐的地空，正好使武曲和火星格外发挥赋性上的正面作用。

    另外，在古赋文里有《化禄还为好，休向墓中藏》，武曲属金，一旦化禄又坐入五行属土的四基库之地的辰宫，将因化禄而呈静态垫居在这个宫位里。这颗『将星』若被安置在一个太安稳的宫位，有如大将军被闲置在宫廷或后方，将会无所作为。因此武曲化禄和地空同坐，正好刺激它冲开墓库而有所作为。所以地空在此，反作吉论了。

    丁卯年三十一岁，大限戊申运。

    戊干贪狼化禄，太阴化权，天机化忌，丁干太阴化禄，天同化权，巨门化忌。

