    # # ○技術分析說：逐步墊高有潛力


    近日內大盤雖然一直在萬點上下震蕩盤整，不過就昨天的大盤走勢來看，尾盤雖有急跌現象，但因低檔接手非常強勁，由此可見，雖然追高意願不足，但逢低承接卻頗強，因此在整個大勢有逐步墊高底部的趨勢下，大盤可能欲小不易。


    尤其大勢至今已盤成三角旗型整理，底部自七月十四日的七六九九點探底反轉以來，已讓七月廿六日的八五四六、八月廿一日的九一四〇、八月廿三日的九四八二及八月卅一日的九七六九點越墊越高，因此只要消息面一經澄清后，大盤將有突破盤局的潛力。


    此外，目前十日、卅日、七十二日移動平均線仍呈上升趨勢，這對指數具有助漲效果。


    ○紫微斗數崩盤，行情熱鬧非凡 投資人理性戰勝迷信


    【記者劉福運、蘇輝斌/臺北報導】由於紫微斗數派預測昨天股市將有「崩盤之災」，辰吉一開盤，攪得人心情都很緊張，惟從 指數的大漲二百零四點來看，不僅已使紫微斗數派「九七崩盤」之說不攻自破，同時也證明只要投資人都能保持理性，那么再多的謠言，也難以「打垮」股市。


    昨天晨市開盤后，在多頭主力刻意進場點火，并刺激散戶的追價意願，而不少因「九七崩盤」而做空的南部投資者，昨日以積極進行回補，而手中持股者惜售心態亦遇濃厚，大盤在此情況下買氣一直維持不墜，終能以開高走高局面收盤。


