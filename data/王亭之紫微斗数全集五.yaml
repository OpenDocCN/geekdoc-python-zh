  md: '人生在世既使百歲，榮華和富貴，享用也有限，一切事物都生不帶來死不帶去。但在有生之年，一旦因大受委屈或是壯志難伸，成就才會引爲人生最大憾事—爲什么一定要在財利渴求～清高并有專精的學者及政府首長，與成功于企業界的商賈，他們的成就絕不在財利的多少，而是在定位的不同。


    今年的社會工商業愈發達，大企業的財務管理會越形重要。政府里的財經政策，更是促進社會工商業發展的主要命脈。只要在這方面能學有專精，那怕找不到職高位重又高薪的差事。今后的社會，一定不會讓這種人才閒置着。


    年輕人，何去何從，就看你自己拿定主意和努力與造化了'
