    ：這個命造，命身宮三方都不見煞星，一生既無波折，自然沒有憂患意識，也就沒刻苦耐勞的冒險犯難沖動，因此一輩子將會偏向安穩，不如他人辛苦開創了。


    『地劫不也沖入命宮嗎？』小李問。


    我說：『地劫也為六煞之一，在命宮的對照宮位，對卯宮應該有某種程序的沖煞作用，但遺憾的，它對卯宮祿存的沖擊，在此却有〈祿逢冲破〉的害處。像這種命身所會均屬北斗剛星的人，個性都較剛烈，膽識大意志強。本來祿存在命宮，應該可使這方的生性更加彰顯，却因這個地劫來冲，反而使他個性偏向溫和，膽識不強，意志不甚堅定。因此更使命身格局的個性作用，偏向保守、拘謹和缺乏決斷力。』


    小李不勝詫异的說道：『怎么你會對這個命盤格局，有此异于常理的解說論法？』


    我說：『重點是我的分析與基本人的事實表現，是否吻合。我相信只要命盤正確，這種性向論斷，應該不離譜。』


    這個說來話長，近年來有很多搞斗數命理的人，僅在玩一些滿天飛星的〈四化〉游戲，甚至奇門、八字、斗數兼容并用。更甚者還把〈哈雷〉慧星也排上使用，似乎不標新立异，就不足以顯示道行高深。反而把傳統這些極為寶貴的星曜賦性和格局作用，視如弃履而不用。


    我贊成學理上的創新，但創新的理論，若違背命理邏輯，恐怕就很難在學理上站得住脚，因此，所據而推演出來的命理論斷，恐怕只能自說自道，必將無法和事實真象相互吻合了。


    小李說，我的分析和事實還很符合，但就是弄不懂，我為什麼會有這解釋和判斷。


