    ## 奇門遁甲說


    ### 尾盤走揚收紅綫


    由於市場盛傳紫微斗數顯示本月七日股市將出現回檔，一時間使市場人心惶惶。但尚據陰陽五行奇門遁甲推算的命理卻指出，農曆八月八日（即九月七日）不但不會崩盤，甚至會在金融股帶動下，尾盤走揚並收紅綫。


    據命理師的說法，今年屬火年，八月恰好在巳午兩個時辰中，分別屬金與木，根據陰陽五行排列推算，本月七日若無重大利空衝擊，因為屬金的關係開盤後行情會由金融股領先走揚，且電子股尤其是小型電子股也會有強勁表現，到了十一點以後，屬木的紡織股則會接續延續行情，並與大盤出現一片欣欣向榮的局面。


    只要政府不刻意打壓行情，依奇門遁甲推算，九月七日應該是會收紅綫，怎會有崩盤之說呢？


    ## 星象幻術、入侵股市


    ### 紫微斗數：明天崩盤；奇門遁甲：申至長紅


    【記者李文雁/台北報導】種種星象幻術的至理已侵入股市，紫微斗數與奇門遁甲將在九七大對決，連日來股市已陷入明顯的低潮。


    紫微斗數派預測股市將在九月七日崩盤，相信此道的散戶急於退出改作觀望，相反的部分投資人則表示，此無非與香港『九七』大限的數字作悲觀的聯想，沒有道理認同；他們表示，天下沒有這種巧合。


    另外一派奇門遁甲人士提出反擊，力稱九七股市將收中紅到長紅，此派人士指出，其預測是根據財政部長郭婉容的生辰八卦算出的，九七股市勢必收紅是有道理的。此外，為打擊紫微斗數，必要時，將發動『五千弟子』聲援。


    儘管眾說紛紜，可信度也頓值得懷疑，但是，投資人在『寧可信其有，不可信其無』的心態下，已多少受到傳染。事實上，包括各種技術分析亦經常出現分歧的看法，所以，九七的預測最後仍有待事實證明，投資人得小心斟酌。


    ## 紫微斗數說：諸凶作祟會破財


    本年為己巳年，年的忌星是文曲星，而文曲星化忌落在酉宮，也就是陰歷的八月，由於文曲和文昌這兩星在票據、證券、文書這方面影響較大，所以可以論財。


    流月方面，月令宮位（癸酉），除坐落有文曲化忌、官符、天刑等諸星外，三方四正有太歲、鈴星、天哭、陰煞、陀羅等諸凶星坐伺，雖然也有太陽、太陰及天梁化科諸星庇蔭，惟力道不足，故月令不以吉論。


    至於八月六日（國歷九月七日）流日在寅宮，坐殺破狼局，因此容易變化，且三方四正火星諸凶作祟，故曰主不利，且就九月七日而言，財帛官廉貞化忌主福德宮，有不安之象，可能破財。


    ## 技術分析說：逐步墊高有潛力


    近日內大盤雖然一直在萬點上下震盪盤整，不過就昨天的大盤走勢來看，尾盤雖有急跌現象，但因低檔接手非常強勁，由此可見，雖然追高意願不足，但逢低承接卻頗強，因此在整個大勢有逐步墊高底部的趨勢下，大盤可能欲小不易。


    尤其大勢至今已盤成三角旗型整理，底部自七月十四日的七六九九點探底反轉以來，已讓七月廿六日的八五四六、八月廿一日的九一四〇、八月廿三日的九四八二及八月卅一日的九七六九點越墊越高，因此只要消息面一經澄清後，大盤將有突破盤局的潛力。


    此外，目前十日、卅日、七十二日移動平均線仍呈上升趨勢，這對指數具有助漲效果。


    ### 紫微斗數崩盤，行情熱鬧非凡 投資人理性戰勝迷信


    【記者劉福運、蘇輝斌/臺北報導】由於紫微斗數派預測昨天股市將有「崩盤之災」，辰吉一開盤，攪得人心情都很緊張，惟從指數的大漲二百零四點來看，不僅已使紫微斗數派「九七崩盤」之說不攻自破，同時也證明只要投資人都能保持理性，那麼再多的謠言，也難以「打垮」股市。


    昨天晨市開盤後，在多頭主力刻意進場點火，並刺激散戶的追價意願，而不少因「九七崩盤」而做空的南部投資者，昨日以積極進行回補，而手中持股者惜售心態亦遇濃厚，大盤在此情況下買氣一直維持不墜，終能以開高走高局面收盤。


    根據證券專家指出，股市昨天在業內、市場主力聯手出擊下，可以說是『打了一場漂亮的仗』，重拾投資人的信心。


    證券專家表示，從昨天的盤面來看，事業上，市場主力早已有合力破除迷信的徵兆，因為甫一開盤，幾乎出現『滿堂紅』的局面，且緊接著舉凡有主力介入股票，諸如嘉面、東和、建臺、南港、正豐、濟業、寶祥、國揚等等，都呈現相當強勁的走勢，由此可見，為破除迷信，原本并不是很合作的市場新舊主力都傾巢而出。


    證券專家說，除了多頭主力聯手之外，投資人昨天雖然一開始也心慌慌，但終究還保持理性，而並沒有急殺股票。


    據指出，近日明顯有不少業內或市場大主力為將『九·七』崩盤之說攻破，而聯手硬撐，雖然市場實壓沈重，然大盤仍呈現盤局，因此，推論市場主力在前幾日必定吃進不少籌碼，而在星相幻術已驅攻破，昨日盤局表現對後市而言，又似乎以榮面居多。


    表這則斗數預測股票漲跌，指的是國歷九月七日——陰歷八月八日那天的股票行情。


    根據這個預測分析說明：


    流年斗君——元月份在寅宮，所以八月（陰歷）份才會在酉宮。


    斗君的起算法人言人殊：這個命例由寅宮作為流年斗君的宮位，也是其中的一派用去。


    依照這個用法，所以八月份斗君才會本宮，因此是『癸酉』月。

    根據這位高人分析，八月六日（陽歷九月七日）流日在寅宮。也就是八月一日在西宮，順行而數，六日才會在寅位。


    筆者翻遍民國七十八年（己巳）多種版本的黃歷記載，陽歷九月七日，正確的陰歷日期是八月八日才正切。因此把陽歷的九月七日說成陰歷八月六日，真不曉得根據是什麼歷書或歷法。這種『亂點鴛鴦譜』式的胡亂編按陰歷，可真是天下大奇聞和大笑話。陰歷的日子，似乎可以讓這位大師隨意編訂，斗數命理界的這類高人不少，難怪斗數命理，在中國傳統的命理學上，才會被人認為不入流的旁門之學。


    又依這篇分析所說：日斗君在寅，本宮坐破軍，對照宮為武曲化忌（武曲為財星），事業宮貪狼化忌……故日主不利。且就九月七日（指陽歷，本文預測所按的陰歷為八月六日而言，廉貞化忌主福德宮，有不安之象，可能破財。


    翻開黃歷，陰歷八月六日的日子干支為『戊辰』。那麼八月六日的月份與日子的四化星座該是：


    *   八月癸干：破軍化祿，貪狼化忌。

    *   六日戊干：貪狼化祿，天機化忌。


    筆者真不能了解，這個分析文中指的武曲化忌和廉貞化忌，這兩個忌星究竟依據什麼干來化忌。


    **會照日主寅宮**，是否就可以據以推論『日主不利』？


    陽歷九月七日的正確陰歷是八月八日。八日的干支是「庚午」。


    若根據月干的破軍化祿，日干的貪狼化祿，以及月干的貪狼化忌，這兩化祿和一化忌：


    *   **八月癸干**：破軍化祿，貪狼化忌。

    *   **八日庚干**：太陽化祿，天同化忌。


    **若依上述的這種方法來訂流日**，八日這一天，正好進入辰宮。辰宫有天府廉貞坐守，廉貞並沒被年和月日的四化所引動，三方所會的子宮戌官没化星，申宫武曲為流年的化祿星。日主辰宫的福德宫在午有貪狼坐守。


    **午宮雖有月干的貪狼化忌，但流年祿存也在午宫**，何況寅官還有月干的破軍化祿來照會。


    假定這個命盤可以運用，又假設這種月斗君和日斗君的推演方法無誤，當八月八日斗君進入辰宫時，由於辰宮無忌煞之害，事業申官有流年武曲化祿，財帛宫在子會有流年禄存和武曲化祿的雙一照會。流日福德午宫，由於月份的癸干四化，使這個宫位有貪狼化忌並會破軍化祿。在理論上，這個午宫的忌禄冲，也許只能據以推論，這一天的股票行情，將會在高低震蕩中起伏變化。但由于日主強勢，因此整個行情趨勢，將會往上攀升。


    **也許這位高人忙中有錯**，或許他有什么獨門訣竅，才會取用陰歷八月六日的日子來推論陰歷九月七日（正確的陰歷是八月八日）的股票行情。很遺憾的，在這則報導里，他没作詳細說明。


    筆者無意強調這則分析方法的正確或謬誤，但必需指出，命理的推論絕不能違背一命理邏輯」，否則這些推論都變成一種猜謎遊戲，那麼這種命理就沒什麼意義了。


    「我不懂這位斗數命理高人，究竟憑什麼理由來排這張斗數命盤，作為推論股票漲跌依據」吳東樵不勝詫异地問道。


    看到這個命盤，使我想起戊辰年上半年間，有位在股票市場進出頻繁的斗數同好——謝先生，有次在電話中談起，他在利用戊辰年股票開盤的時辰卦理，排出斗數命盤來研究股票的漲跌趨勢他問我，這種卦理命盤，用來預測股票行情的可行性如何。由於電話中無法詳談，因此我提議他，先試它一年看看，假定在一年的十二個月份、和一個月的二十四、五個股票交易日子里，論斷大體上都吻和，那就有其可行性。我再三囑咐他，千萬不要在還沒經過詳細驗證前，就妄加採用。在電話中，他還語帶興奮說道，假定這個卦理命盤能通，那真是太好了。


    記得我隨口稱贊他說，他將是陳希夷后的第一人。因此我想報載上的這個命盤，其始作俑者，說不定就是這位謝先生。至於為何會被其他高人抄襲來作為創見發表，那就不得而知了。


    「究竟根據什麼時辰卦理來排命盤」？


    臺灣股票在春節後開盤，慣例上都選在陰歷正月五日的上午九時，這個時間也是向來每天股票市場開始營業時辰。因此報載的這個命盤，就是根據『己巳年正月五日巳時』所排出來的命盤。


    「他們為什麼認定，根據這個時辰排出來的命盤，就可以用來推論今年股票的漲跌行情？」


    這個理由就是因為他認定，既然根據一個人的出生年月日時辰所排出來的命盤，可以用來推論這個人一生的窮通禍福和休咎榮枯，那麼一年伊始的股票開盤時辰，同樣依理可以作為推論股票的漲跌依據。有人還把辛亥革命，在武昌起義響起的第一道槍聲時間，作為中華民國誕生的『落土時辰』，再以這個時辰來排起命盤，用來大談這個多災多難國家的命理之道。這種人不但曲解了斗數命運，更昧於歷史。


    滿清覆亡和民國的成立，自有其錯綜複雜的歷史因緣，因此，利用武昌的這一道槍響來做民國開始，排盤推論國運，就顯得理論欠通和道理薄弱了。


    「那麼由股票開盤時辰排出來的命盤不可用嗎？」吳東樵說。


    且慢談能不能用，先談由這個時辰所排出命盤的一些情況。假定用這個時辰排命盤，那麼：


    *   丁卯年（一九八七）元月五日巳時。（星期二）

    *   戊辰年（一九八八）元月六日巳時。（星期一）

    *   己巳年（一九八九）元月五日巳時。（星期五）

    *   庚午年（一九九〇）元月五日巳時（星期三）


    若把這四年的開盤時日排成命盤，將會發現到某些共同點：

    其一，命宮都在酉宮，身宮都在未宮。

    其二，文昌必定在巳宮，文曲一定在西宮。也就是命宮每年都會照昌曲。

    其三，左輔一定在辰宮，右弼一定在戌宮。

    其四，地空和地劫，必定會夾制巳宮，巳宮也是命盤的財帛宮位。


    因為所取用的月份都是元月，時辰都是巳時，而且每年流年斗君，元月份都從寅宮起，那麼基於『地空』和『地劫』必定分坐在辰午兩宮的現象，則：


    *   元月份在寅宮，會地空于午宮，

    *   三月份坐地劫于辰宮，

    *   四月份被空劫夾制于巳宮，

    *   五月份坐地空于午宮，

    *   七月份坐申宮，會地劫于辰宮，

    *   八月份坐酉宮，財帛宮在巳，為空劫夾制，

    *   九月份在戌，午辰空劫來冲，

    *   十一月在子，會有辰午兩宮的兩空亡。


    『地空』和『地劫』兩星都具有『半空折翅』與『浪里行舟』的起伏不定的賦性作用。


    若把這四年的開盤時日排成命盤，將會發現到某些共同點：

    其一，命宮都在酉宮，身宮都在未宮。

    其二，文昌必定在巳宮，文曲一定在西宮。也就是命宮每年都會照昌曲。

    其三，左輔一定在辰宮，右弼一定在戌宮。

    其四，地空和地劫，必定會夾制巳宮，巳宮也是命盤的財帛宮位。


    因為所取用的月份都是元月，時辰都是巳時，而且每年流年斗君，元月份都從寅宮起，那麼基於『地空』和『地劫』必定分坐在辰午兩宮的現象，則：


    *   元月份在寅宮，會地空于午宮，

    *   三月份坐地劫于辰宮，

    *   四月份被空劫夾制于巳宮，

    *   五月份坐地空于午宮，

    *   七月份坐申宮，會地劫于辰宮，

    *   八月份坐酉宮，財帛宮在巳，為空劫夾制，

    *   九月份在戌，午辰空劫來冲，

    *   十一月在子，會有辰午兩宮的兩空亡。


    『地空』和『地劫』兩星都具有『半空折翅』與『浪里行舟』的起伏不定的賦性作用。


    那麼在不同年份裡，將會有相同的月份上，股票必定會呈現必然的雷同明顯變化。


    假定股票在斗數命盤，可發現有此明顯跡象，也就意味着股票漲跌行情，必定是隨著月令推移，形成有規則起伏，就好像氣候每年都會跟著節氣推移，有規則變化。


    我對他說：臺灣的股票發行已久，若你有興趣，不妨把近十年的資料，拿來依月份繪成趨勢圖加以比對，看看每一年在相同月份裡，會不會有類似的起伏變化？


    假定股票真的有固定月份的必然變化，那麼那些時時在絞盡腦汁的股票分析專家，應該早就會發現到這個事實，他們都早已成為擁有巨資的股市大亨，用不著長期絞盡腦汁去寫拿不到幾個小錢的傷神稿費了。』


    『發現這些用斗數鑽研股票行情的高漲，並不是用空劫兩星來推論，而是用四化的祿權、科、忌，與星曜五行特質來研判』他說。


    這個年輕人，閱遍新舊出版的斗數書籍和專論，因此和他閒聊時，常會提到很多新奇古怪的聽聞。


    『地空、地劫兩星賦性，古傳典籍敘述不多，因此後人對這兩星的應用也多不甚了了，他們也不知道如何運用。至於四化的正確應用和『五行』實際本質，據我所看過近代人所發表的論集裡，也幾乎都在理念不清的打混戰中。因此他們運用『四化』和『五行』於股票推論，其可靠性，就需存疑了』我說。


    『有人說，一九八八年手義欠三〇：三千式曲七录，所以言手沒票才會大隱脹，才會中過一萬點的指數大關，每日交易總額才常會高逾千億以上。這個年輕人在沖泡茶又點上了支烟后，繼續說道：「又因為股票買賣就是金錢遊戲，武曲為財帛主，一旦化祿時，就會使『財帛』大起作用，因此臺灣的股票，才會在己巳年有此空前的輝煌紀錄和表現。」


    這種歪用理論，比不懂理論來得更糟爛。臺灣的股票似乎開端於民國五十年前後，那麼民國五十八年的己酉年，和民國六十八年的己未年，也都是武曲化祿，這兩年的股票行情是否都有超過往前幾年份的特出成長紀錄？


    臺灣的股票雖然跟隨着經濟發展而成長。據記憶所及，在民國七十五年（丙寅）時，股票指數一直都還在不到一千點的低檔處徘徊。


    股票近年來，就在民國七十六年間開始，才有大幅度的漲幅，七十七年接著進入如火如荼的狂飈年份，七十八年指數的衝破萬點大關，應該只是連續飈漲三年後的結果而已。


    民國廿六年歲次丁卯，丁干太陰化祿，太陰為〈田宅主〉。

    七十七年歲次戊辰，戊干貪狼化祿，貪狼主〈禍福〉。

    七十九年歲次庚午，庚干太陽化祿，太陽為〈官祿主〉。


    古傳的星曜賦性作用，「太陰」和「貪狼」各有其所「主」，若是利用斗數星曜化祿星來論股票，那丁卯和戊辰兩年間的股票高漲，也應該和這兩顆化祿星有關。因此，若太強調武曲化祿的作用，就不應該忽視前兩年這兩個化祿呈的功能了。


    只要臺灣的經濟發展和政治安定，以及國際政經沒有異常變化，主管其事的財政部長像武曲的財帛。但不再發布不利股票的「利空」消息，臺灣淹脚目的社會游資還找不到適當的投資管道，那麼股票市場，在「財氣」和「人氣」兩旺之下，任誰都不會預測股票，會再有戊辰年中秋節後，那種跳樓般的大狂跌。


    假定庚午年間。股票也會繼續往年的飆漲不已，那麼斗數命理的股票專家，恐怕又要再用「官祿主化祿」來解說。因此說不定，這些傳逾千年的星曜賦性，以後恐怕就有勞這些大師們出來重新修訂了！又假定庚午年股票不漲反跌，又將如何解說？


    「武曲為財帛主，據這些專研的斗數股票專家認為，『銀行股』所以會居高檔，就是因為武曲化祿的原因」東樵居士說：


    他們犯了理念不清和意識過度膨脹的大毛病。若真的要談銀行股票價位。民國七十七年（戊辰）的價位應該高過己巳年，這兩三年來真正居高檔而不下的，也許應該首推以保險業為主的「國壽」股票。但保險行業在斗數命理的理論上，似乎應該歸類於「服務業」一行，究竟保險的業務本質有異於銀行，因為銀行今後銀行所擴張業務範圍情況來看，像承辦國內外匯兌業務來賺取的服務費，也兼併有賺取勞務費用的性質。因此若硬是把銀行說成只主「財帛」借貸行業，不正是患了知識的「貧血症」嗎？


    很多命理研習者，硬是把社會上的各行各業，依木、火、土、金、水，作有板有眼的歸類。因此把機械五金業和開銀行，都歸在「金」的這一行裡，把開化學工廠的歸生「水」類，把木材產業量在「木」類，把房地產業歸在「土」類，把電器行業歸在「火」類，這種觀念，不只誤解了「五行」的本義，也把命理上用以推演職業類別的方法導入歧途。


    百貨公司和雜貨貿易商，所買賣的商品包羅萬象，軍公教人員，公私機構的行政人員，這些行業和從業人員的行業五行類別，該如何劃分？既然可以把各種股票歸類在不同的「五行」上，也應該可以把社會上三百六十行的各行各業和從業人員，依照「五行」類別，這種「五行」的分類法，真有道理嗎？


    假定有人仍然認定股票一定可以依「五行」來分類，那麼不妨查看報載每天刊登股票漲跌行情表。是否凡是相同屬金、屬木、屬水、屬火、屬土的股票都同時漲或是同時跌？假設沒有，就可以證明，利用五行來歸類股票，就是一種毫無道理的鬼扯談。


    「我曾經詳細看過報載的這種股票行情表，五行五行同有股票，毫無這種同漲或同跌的跡象。『東樵居士又問道：『報載裡提到，己巳年命宮在西有文曲坐守，文昌在財帛宮。因為文曲和文昌這兩星在票據、證券、文書這些方面影響較大，所以可以論財』這個說法是否正確？


    在星曜賦性上，「文昌」謂之「文桂」，「文曲」謂之「文華」，皆主聰明才智，但也論及文書之類沒錯，但若硬是把它說成票據、證券、和屬於股票類，似乎有牽強之嫌。


    前面已說過，只要排盤的月份是正月，時辰是己時，命宮一定坐文曲，財帛一定有文昌。也因這個原因，所以這一類的高人才會據以斷定，臺灣的股票，必然可以根據這個命盤。'
  mdcn: '但很遺憾的，在中國傳統的星象界，卻把星象之學視作無所不能兼無所不通的神仙之術，這就難怪乎星象之學在世界文明進入廿世紀的這個時代，仍然沒能像其他的學術一樣，進得了殿堂之門。


    「改朝換代的天下大事和大自然影響下的氣象天候，不可能以星象來隨便預測，那麼和股票族群利害相關的股票行情，也不能用星象來作通盤的預測嗎？」吳東樵說。


    現代的星象研習者，也和老前輩一樣認為，星象之學可以用來研判天底下的任何大小事物。


    所以他們認為星象應所當然的，可以用來推論股票的漲跌起伏行情。因此才有『自由時報』在民國七十八年九月六日（陽歷）刊登，利用紫微斗數推論九月七日股票將會大崩盤的預測消息。這份報紙還刊登有『奇門遁甲』的不同論調。


    ## 奇門遁甲說


    ### 尾盤走揚收紅綫


    由於市場盛傳紫微斗數顯示本月七日股市將出現回檔，一時間使市場人心惶惶。但尚據陰陽五行奇門遁甲推算的命理卻指出，農曆八月八日（即九月七日）不但不會崩盤，甚至會在金融股帶動下，尾盤走揚並收紅綫。


    據命理師的說法，今年屬火年，八月恰好在巳午兩個時辰中，分別屬金與木，根據陰陽五行排列推算，本月七日若無重大利空衝擊，因為屬金的關係開盤後行情會由金融股領先走揚，且電子股尤其是小型電子股也會有強勁表現，到了十一點以後，屬木的紡織股則會接續延續行情，並與大盤出現一片欣欣向榮的局面。


    只要政府不刻意打壓行情，依奇門遁甲推算，九月七日應該是會收紅綫，怎會有崩盤之說呢？


    ## 星象幻術、入侵股市


    ### 紫微斗數：明天崩盤；奇門遁甲：申至長紅


    【記者李文雁/台北報導】種種星象幻術的至理已侵入股市，紫微斗數與奇門遁甲將在九七大對決，連日來股市已陷入明顯的低潮。


    紫微斗數派預測股市將在九月七日崩盤，相信此道的散戶急於退出改作觀望，相反的部分投資人則表示，此無非與香港『九七』大限的數字作悲觀的聯想，沒有道理認同；他們表示，天下沒有這種巧合。


    另外一派奇門遁甲人士提出反擊，力稱九七股市將收中紅到長紅，此派人士指出，其預測是根據財政部長郭婉容的生辰八卦算出的，九七股市勢必收紅是有道理的。此外，為打擊紫微斗數，必要時，將發動『五千弟子』聲援。


    儘管眾說紛紜，可信度也頓值得懷疑，但是，投資人在『寧可信其有，不可信其無』的心態下，已多少受到傳染。事實上，包括各種技術分析亦經常出現分歧的看法，所以，九七的預測最後仍有待事實證明，投資人得小心斟酌。


    ## 紫微斗數說：諸凶作祟會破財


    本年為己巳年，年的忌星是文曲星，而文曲星化忌落在酉宮，也就是陰歷的八月，由於文曲和文昌這兩星在票據、證券、文書這方面影響較大，所以可以論財。


    流月方面，月令宮位（癸酉），除坐落有文曲化忌、官符、天刑等諸星外，三方四正有太歲、鈴星、天哭、陰煞、陀羅等諸凶星坐伺，雖然也有太陽、太陰及天梁化科諸星庇蔭，惟力道不足，故月令不以吉論。


    至於八月六日（國歷九月七日）流日在寅宮，坐殺破狼局，因此容易變化，且三方四正火星諸凶作祟，故曰主不利，且就九月七日而言，財帛官廉貞化忌主福德宮，有不安之象，可能破財。


    ## 技術分析說：逐步墊高有潛力


    近日內大盤雖然一直在萬點上下震盪盤整，不過就昨天的大盤走勢來看，尾盤雖有急跌現象，但因低檔接手非常強勁，由此可見，雖然追高意願不足，但逢低承接卻頗強，因此在整個大勢有逐步墊高底部的趨勢下，大盤可能欲小不易。


    尤其大勢至今已盤成三角旗型整理，底部自七月十四日的七六九九點探底反轉以來，已讓七月廿六日的八五四六、八月廿一日的九一四〇、八月廿三日的九四八二及八月卅一日的九七六九點越墊越高，因此只要消息面一經澄清後，大盤將有突破盤局的潛力。


    此外，目前十日、卅日、七十二日移動平均線仍呈上升趨勢，這對指數具有助漲效果。


    ### 紫微斗數崩盤，行情熱鬧非凡 投資人理性戰勝迷信


    【記者劉福運、蘇輝斌/臺北報導】由於紫微斗數派預測昨天股市將有「崩盤之災」，辰吉一開盤，攪得人心情都很緊張，惟從指數的大漲二百零四點來看，不僅已使紫微斗數派「九七崩盤」之說不攻自破，同時也證明只要投資人都能保持理性，那麼再多的謠言，也難以「打垮」股市。


    昨天晨市開盤後，在多頭主力刻意進場點火，並刺激散戶的追價意願，而不少因「九七崩盤」而做空的南部投資者，昨日以積極進行回補，而手中持股者惜售心態亦遇濃厚，大盤在此情況下買氣一直維持不墜，終能以開高走高局面收盤。


    根據證券專家指出，股市昨天在業內、市場主力聯手出擊下，可以說是『打了一場漂亮的仗』，重拾投資人的信心。


    證券專家表示，從昨天的盤面來看，事業上，市場主力早已有合力破除迷信的徵兆，因為甫一開盤，幾乎出現『滿堂紅』的局面，且緊接著舉凡有主力介入股票，諸如嘉面、東和、建臺、南港、正豐、濟業、寶祥、國揚等等，都呈現相當強勁的走勢，由此可見，為破除迷信，原本并不是很合作的市場新舊主力都傾巢而出。


    證券專家說，除了多頭主力聯手之外，投資人昨天雖然一開始也心慌慌，但終究還保持理性，而並沒有急殺股票。


    據指出，近日明顯有不少業內或市場大主力為將『九·七』崩盤之說攻破，而聯手硬撐，雖然市場實壓沈重，然大盤仍呈現盤局，因此，推論市場主力在前幾日必定吃進不少籌碼，而在星相幻術已驅攻破，昨日盤局表現對後市而言，又似乎以榮面居多。


    表這則斗數預測股票漲跌，指的是國歷九月七日——陰歷八月八日那天的股票行情。


    根據這個預測分析說明：


    流年斗君——元月份在寅宮，所以八月（陰歷）份才會在酉宮。


    斗君的起算法人言人殊：這個命例由寅宮作為流年斗君的宮位，也是其中的一派用去。


    依照這個用法，所以八月份斗君才會本宮，因此是『癸酉』月。

    根據這位高人分析，八月六日（陽歷九月七日）流日在寅宮。也就是八月一日在西宮，順行而數，六日才會在寅位。


    筆者翻遍民國七十八年（己巳）多種版本的黃歷記載，陽歷九月七日，正確的陰歷日期是八月八日才正切。因此把陽歷的九月七日說成陰歷八月六日，真不曉得根據是什麼歷書或歷法。這種『亂點鴛鴦譜』式的胡亂編按陰歷，可真是天下大奇聞和大笑話。陰歷的日子，似乎可以讓這位大師隨意編訂，斗數命理界的這類高人不少，難怪斗數命理，在中國傳統的命理學上，才會被人認為不入流的旁門之學。


    又依這篇分析所說：日斗君在寅，本宮坐破軍，對照宮為武曲化忌（武曲為財星），事業宮貪狼化忌……故日主不利。且就九月七日（指陽歷，本文預測所按的陰歷為八月六日而言，廉貞化忌主福德宮，有不安之象，可能破財。


    翻開黃歷，陰歷八月六日的日子干支為『戊辰』。那麼八月六日的月份與日子的四化星座該是：


    *   八月癸干：破軍化祿，貪狼化忌。

    *   六日戊干：貪狼化祿，天機化忌。


    筆者真不能了解，這個分析文中指的武曲化忌和廉貞化忌，這兩個忌星究竟依據什麼干來化忌。


    **會照日主寅宮**，是否就可以據以推論『日主不利』？


    陽歷九月七日的正確陰歷是八月八日。八日的干支是「庚午」。


    若根據月干的破軍化祿，日干的貪狼化祿，以及月干的貪狼化忌，這兩化祿和一化忌：


    *   **八月癸干**：破軍化祿，貪狼化忌。

    *   **八日庚干**：太陽化祿，天同化忌。


    **若依上述的這種方法來訂流日**，八日這一天，正好進入辰宮。辰宫有天府廉貞坐守，廉貞並沒被年和月日的四化所引動，三方所會的子宮戌官没化星，申宫武曲為流年的化祿星。日主辰宫的福德宫在午有貪狼坐守。


    **午宮雖有月干的貪狼化忌，但流年祿存也在午宫**，何況寅官還有月干的破軍化祿來照會。


    假定這個命盤可以運用，又假設這種月斗君和日斗君的推演方法無誤，當八月八日斗君進入辰宫時，由於辰宮無忌煞之害，事業申官有流年武曲化祿，財帛宫在子會有流年禄存和武曲化祿的雙一照會。流日福德午宫，由於月份的癸干四化，使這個宫位有貪狼化忌並會破軍化祿。在理論上，這個午宫的忌禄冲，也許只能據以推論，這一天的股票行情，將會在高低震蕩中起伏變化。但由于日主強勢，因此整個行情趨勢，將會往上攀升。


    **也許這位高人忙中有錯**，或許他有什么獨門訣竅，才會取用陰歷八月六日的日子來推論陰歷九月七日（正確的陰歷是八月八日）的股票行情。很遺憾的，在這則報導里，他没作詳細說明。


    筆者無意強調這則分析方法的正確或謬誤，但必需指出，命理的推論絕不能違背一命理邏輯」，否則這些推論都變成一種猜謎遊戲，那麼這種命理就沒什麼意義了。


    「我不懂這位斗數命理高人，究竟憑什麼理由來排這張斗數命盤，作為推論股票漲跌依據」吳東樵不勝詫异地問道。


    看到這個命盤，使我想起戊辰年上半年間，有位在股票市場進出頻繁的斗數同好——謝先生，有次在電話中談起，他在利用戊辰年股票開盤的時辰卦理，排出斗數命盤來研究股票的漲跌趨勢他問我，這種卦理命盤，用來預測股票行情的可行性如何。由於電話中無法詳談，因此我提議他，先試它一年看看，假定在一年的十二個月份、和一個月的二十四、五個股票交易日子里，論斷大體上都吻和，那就有其可行性。我再三囑咐他，千萬不要在還沒經過詳細驗證前，就妄加採用。在電話中，他還語帶興奮說道，假定這個卦理命盤能通，那真是太好了。


    記得我隨口稱贊他說，他將是陳希夷后的第一人。因此我想報載上的這個命盤，其始作俑者，說不定就是這位謝先生。至於為何會被其他高人抄襲來作為創見發表，那就不得而知了。


    「究竟根據什麼時辰卦理來排命盤」？


    臺灣股票在春節後開盤，慣例上都選在陰歷正月五日的上午九時，這個時間也是向來每天股票市場開始營業時辰。因此報載的這個命盤，就是根據『己巳年正月五日巳時』所排出來的命盤。


    「他們為什麼認定，根據這個時辰排出來的命盤，就可以用來推論今年股票的漲跌行情？」


    這個理由就是因為他認定，既然根據一個人的出生年月日時辰所排出來的命盤，可以用來推論這個人一生的窮通禍福和休咎榮枯，那麼一年伊始的股票開盤時辰，同樣依理可以作為推論股票的漲跌依據。有人還把辛亥革命，在武昌起義響起的第一道槍聲時間，作為中華民國誕生的『落土時辰』，再以這個時辰來排起命盤，用來大談這個多災多難國家的命理之道。這種人不但曲解了斗數命運，更昧於歷史。


    滿清覆亡和民國的成立，自有其錯綜複雜的歷史因緣，因此，利用武昌的這一道槍響來做民國開始，排盤推論國運，就顯得理論欠通和道理薄弱了。


    「那麼由股票開盤時辰排出來的命盤不可用嗎？」吳東樵說。


    且慢談能不能用，先談由這個時辰所排出命盤的一些情況。假定用這個時辰排命盤，那麼：


    *   丁卯年（一九八七）元月五日巳時。（星期二）

    *   戊辰年（一九八八）元月六日巳時。（星期一）

    *   己巳年（一九八九）元月五日巳時。（星期五）

    *   庚午年（一九九〇）元月五日巳時（星期三）


    若把這四年的開盤時日排成命盤，將會發現到某些共同點：

    其一，命宮都在酉宮，身宮都在未宮。

    其二，文昌必定在巳宮，文曲一定在西宮。也就是命宮每年都會照昌曲。

    其三，左輔一定在辰宮，右弼一定在戌宮。

    其四，地空和地劫，必定會夾制巳宮，巳宮也是命盤的財帛宮位。


    因為所取用的月份都是元月，時辰都是巳時，而且每年流年斗君，元月份都從寅宮起，那麼基於『地空』和『地劫』必定分坐在辰午兩宮的現象，則：


    *   元月份在寅宮，會地空于午宮，

    *   三月份坐地劫于辰宮，

    *   四月份被空劫夾制于巳宮，

    *   五月份坐地空于午宮，

    *   七月份坐申宮，會地劫于辰宮，

    *   八月份坐酉宮，財帛宮在巳，為空劫夾制，

    *   九月份在戌，午辰空劫來冲，

    *   十一月在子，會有辰午兩宮的兩空亡。


    『地空』和『地劫』兩星都具有『半空折翅』與『浪里行舟』的起伏不定的賦性作用。


    若把這四年的開盤時日排成命盤，將會發現到某些共同點：

    其一，命宮都在酉宮，身宮都在未宮。

    其二，文昌必定在巳宮，文曲一定在西宮。也就是命宮每年都會照昌曲。

    其三，左輔一定在辰宮，右弼一定在戌宮。

    其四，地空和地劫，必定會夾制巳宮，巳宮也是命盤的財帛宮位。


    因為所取用的月份都是元月，時辰都是巳時，而且每年流年斗君，元月份都從寅宮起，那麼基於『地空』和『地劫』必定分坐在辰午兩宮的現象，則：


    *   元月份在寅宮，會地空于午宮，

    *   三月份坐地劫于辰宮，

    *   四月份被空劫夾制于巳宮，

    *   五月份坐地空于午宮，

    *   七月份坐申宮，會地劫于辰宮，

    *   八月份坐酉宮，財帛宮在巳，為空劫夾制，

    *   九月份在戌，午辰空劫來冲，

    *   十一月在子，會有辰午兩宮的兩空亡。


    『地空』和『地劫』兩星都具有『半空折翅』與『浪里行舟』的起伏不定的賦性作用。


    那麼在不同年份裡，將會有相同的月份上，股票必定會呈現必然的雷同明顯變化。


    假定股票在斗數命盤，可發現有此明顯跡象，也就意味着股票漲跌行情，必定是隨著月令推移，形成有規則起伏，就好像氣候每年都會跟著節氣推移，有規則變化。


    我對他說：臺灣的股票發行已久，若你有興趣，不妨把近十年的資料，拿來依月份繪成趨勢圖加以比對，看看每一年在相同月份裡，會不會有類似的起伏變化？


    假定股票真的有固定月份的必然變化，那麼那些時時在絞盡腦汁的股票分析專家，應該早就會發現到這個事實，他們都早已成為擁有巨資的股市大亨，用不著長期絞盡腦汁去寫拿不到幾個小錢的傷神稿費了。』


    『發現這些用斗數鑽研股票行情的高漲，並不是用空劫兩星來推論，而是用四化的祿權、科、忌，與星曜五行特質來研判』他說。


    這個年輕人，閱遍新舊出版的斗數書籍和專論，因此和他閒聊時，常會提到很多新奇古怪的聽聞。


    『地空、地劫兩星賦性，古傳典籍敘述不多，因此後人對這兩星的應用也多不甚了了，他們也不知道如何運用。至於四化的正確應用和『五行』實際本質，據我所看過近代人所發表的論集裡，也幾乎都在理念不清的打混戰中。因此他們運用『四化』和『五行』於股票推論，其可靠性，就需存疑了』我說。


    『有人說，一九八八年手義欠三〇：三千式曲七录，所以言手沒票才會大隱脹，才會中過一萬點的指數大關，每日交易總額才常會高逾千億以上。這個年輕人在沖泡茶又點上了支烟后，繼續說道：「又因為股票買賣就是金錢遊戲，武曲為財帛主，一旦化祿時，就會使『財帛』大起作用，因此臺灣的股票，才會在己巳年有此空前的輝煌紀錄和表現。」


    這種歪用理論，比不懂理論來得更糟爛。臺灣的股票似乎開端於民國五十年前後，那麼民國五十八年的己酉年，和民國六十八年的己未年，也都是武曲化祿，這兩年的股票行情是否都有超過往前幾年份的特出成長紀錄？


    臺灣的股票雖然跟隨着經濟發展而成長。據記憶所及，在民國七十五年（丙寅）時，股票指數一直都還在不到一千點的低檔處徘徊。


    股票近年來，就在民國七十六年間開始，才有大幅度的漲幅，七十七年接著進入如火如荼的狂飈年份，七十八年指數的衝破萬點大關，應該只是連續飈漲三年後的結果而已。


    民國廿六年歲次丁卯，丁干太陰化祿，太陰為〈田宅主〉。

    七十七年歲次戊辰，戊干貪狼化祿，貪狼主〈禍福〉。

    七十九年歲次庚午，庚干太陽化祿，太陽為〈官祿主〉。


    古傳的星曜賦性作用，「太陰」和「貪狼」各有其所「主」，若是利用斗數星曜化祿星來論股票，那丁卯和戊辰兩年間的股票高漲，也應該和這兩顆化祿星有關。因此，若太強調武曲化祿的作用，就不應該忽視前兩年這兩個化祿呈的功能了。


    只要臺灣的經濟發展和政治安定，以及國際政經沒有異常變化，主管其事的財政部長像武曲的財帛。但不再發布不利股票的「利空」消息，臺灣淹脚目的社會游資還找不到適當的投資管道，那麼股票市場，在「財氣」和「人氣」兩旺之下，任誰都不會預測股票，會再有戊辰年中秋節後，那種跳樓般的大狂跌。


    假定庚午年間。股票也會繼續往年的飆漲不已，那麼斗數命理的股票專家，恐怕又要再用「官祿主化祿」來解說。因此說不定，這些傳逾千年的星曜賦性，以後恐怕就有勞這些大師們出來重新修訂了！又假定庚午年股票不漲反跌，又將如何解說？


    「武曲為財帛主，據這些專研的斗數股票專家認為，『銀行股』所以會居高檔，就是因為武曲化祿的原因」東樵居士說：


    他們犯了理念不清和意識過度膨脹的大毛病。若真的要談銀行股票價位。民國七十七年（戊辰）的價位應該高過己巳年，這兩三年來真正居高檔而不下的，也許應該首推以保險業為主的「國壽」股票。但保險行業在斗數命理的理論上，似乎應該歸類於「服務業」一行，究竟保險的業務本質有異於銀行，因為銀行今後銀行所擴張業務範圍情況來看，像承辦國內外匯兌業務來賺取的服務費，也兼併有賺取勞務費用的性質。因此若硬是把銀行說成只主「財帛」借貸行業，不正是患了知識的「貧血症」嗎？


    很多命理研習者，硬是把社會上的各行各業，依木、火、土、金、水，作有板有眼的歸類。因此把機械五金業和開銀行，都歸在「金」的這一行裡，把開化學工廠的歸生「水」類，把木材產業量在「木」類，把房地產業歸在「土」類，把電器行業歸在「火」類，這種觀念，不只誤解了「五行」的本義，也把命理上用以推演職業類別的方法導入歧途。


    百貨公司和雜貨貿易商，所買賣的商品包羅萬象，軍公教人員，公私機構的行政人員，這些行業和從業人員的行業五行類別，該如何劃分？既然可以把各種股票歸類在不同的「五行」上，也應該可以把社會上三百六十行的各行各業和從業人員，依照「五行」類別，這種「五行」的分類法，真有道理嗎？


    假定有人仍然認定股票一定可以依「五行」來分類，那麼不妨查看報載每天刊登股票漲跌行情表。是否凡是相同屬金、屬木、屬水、屬火、屬土的股票都同時漲或是同時跌？假設沒有，就可以證明，利用五行來歸類股票，就是一種毫無道理的鬼扯談。


    「我曾經詳細看過報載的這種股票行情表，五行五行同有股票，毫無這種同漲或同跌的跡象。『東樵居士又問道：『報載裡提到，己巳年命宮在西有文曲坐守，文昌在財帛宮。因為文曲和文昌這兩星在票據、證券、文書這些方面影響較大，所以可以論財』這個說法是否正確？


    在星曜賦性上，「文昌」謂之「文桂」，「文曲」謂之「文華」，皆主聰明才智，但也論及文書之類沒錯，但若硬是把它說成票據、證券、和屬於股票類，似乎有牽強之嫌。


    前面已說過，只要排盤的月份是正月，時辰是己時，命宮一定坐文曲，財帛一定有文昌。也因這個原因，所以這一類的高人才會據以斷定，臺灣的股票，必然可以根據這個命盤。'
