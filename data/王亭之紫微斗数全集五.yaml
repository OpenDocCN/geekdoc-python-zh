    這個命造看來不像是個很會賺錢的命格，但他却能先由二十萬元投入股票市場開始，在短短不到兩年間，賺進四億多元，若不是炒股票行家，必定是財神爺幫了大忙。閣下也許另有高見，因此本文的論折只是筆者的一己之見，備供參考。


    『這位高先生，命坐天同太陰于子宮，身宮在辰為機梁，這種命身都由柔性星曜組成的格局，可能在庚寅大限從事主競爭性的『投機』嗎？』游先生說。


    天同太陰在子為《月出滄海》，也稱『水澄桂蕚』格。這個命造又因文曲同宮與祿權照命，因此是個才子型的讀書料子。但因會有羊陀和鈴星，使命格柔中帶剛。又身宮機梁化權和陀羅坐守，也呈剛柔并具現象。另外火星由戌宮來會，也使辰宮的陀羅，得以制煞為用，成爲有守有爲的格局了。


    『那么這種格局，在以錢賺錢上，會比較偏向于投資或是投機呢？』


    從命身格局而言，這種人一但有閑錢，不會很保守的只存進銀行生利息。至于偏向『投資』或是『投機』，就需視限運情況來論定。若以庚寅大限而言，一旦他有資金，就如上述各點說明，他會偏向于投機性的求財方式。若再由大限行入先天福德宮，又大限福德辰宮的星曜組合，就可以據爲推論，他會在這個限運內的某個年份內，把資金投入高度競爭的求財方式上。


    『近年來，地皮和股票都炒得熟騰騰，依命理迹象而言，這兩種以『炒』爲手段的求財方法，他可能會選擇那一樣？』


    炒地皮和炒股票都要利用資金，但因爲重點宮位不一樣，因此在這兩樣的命理重點，自然會有所差別。


    就一般推論而言，一個人會把資金投入房地產上，通常都根據先后天田宅宮作爲論斷依據。田宅宮興旺，在限運里時又被吉化引動，就有可能去置產或是炒地皮。而投資股票（中長期）或炒股票（短期買賣），就需用先後天的福德宮來衡量了。


    當然投入股票的資金可大可小，資金也比較容易兌現融通。而買賣房地產所需資金都較龐大，兌現融通就比較不那么容易快速了。


    這個命造的先天田宅宮在卯有天相坐守，另有未宮地劫和西宮化忌來冲，因此不是一個很興旺宮位。但大限田宅宮在巳，紫微七殺禄存同坐，限運武曲化權來會自有其吉化作用，因此在庚寅大限內，只要有足夠資金，他必然會興起置產念頭。


    然而，因紫殺與禄存同宫又不會煞，雖有西宮廉貞忌來冲仍撼動不了巳宮的穩固作用。因此在庚寅大限時，一有余錢，應該屬於置產，而非爲炒不動產來生財。


    若由福德宮來看，大運走入庚寅限，寅宫除了太陽自化禄，來吉化引動之外，午、戌兩宫也會來擎羊和火鈴三顆煞星。大限福德辰宫也由戌、子兩宫來會禄、忌和火星。先、後天的福德宮，在這種吉化和忌煞劇烈引助之下，一但有了資金，就比較會傾向于投機股票的金錢游戲上。


    除了根據福德宮來論斷其可能傾向外，命身格局和由煞星所形成的特殊組合，也有類似的趨勢作用。在拙着《斗數論名人》書中所剖析蔡家父子三人，他們在股票炒作上，所曾有過的翻雲覆雨作爲，正是由於命、身宫和福德宮都有這些特殊條件的因素。


    游先生接着说道：『这位高先生就在戊辰年（一九八八）初，以微少的二十万元投入股票市场，作起炒短线的买卖。但戊辰年行入大限福德宫。流年自坐天机化忌，子宫为流年财帛宫又有大限天同化忌来冲，因此使太岁所居的辰宫成为双忌会照的凶象宫位。


    流年福德宫在午，也有双羊并会天同忌和戌宫火星。这种流年命宫和流年福德宫都呈凶情况下，毅然投入股票市场，会有好成果吗？』


    从流年命宫和流年福德午宫的这些凶象会照来看，在这一年投入股票买卖，似乎凶多吉少。但若由流年福德午宫，在巳宫有流禄（还有先天禄存），戊干贪狼化禄作用到未宫（未宫无甲级星曜），使午宫成为双禄所辅。


    午宫虽有双羊，但有铃星同躔，戌宫尚有火星为会，正巧使午宫的双羊得制煞为用，形成强劲、横发的〈铃羊〉格，另外由寅宫的太阳大限化禄与在子的同先天禄星同时照会午宫，使午宫的〈铃羊〉既为双禄所辅，又有双禄照会，因此他在这一年进入股市，虽然仅区区二十万元，该必胯非常良好斩获。


    『那么流年命宫既然是大限福德宫，会照有双忌，所踞陀罗又有戌宫的火星来冲，长宫不也成爲忌煞交冲的凶性宫位吗？』游先生语带疑惑地问。


    『这问题问得很好，你已经能细思入微。这问题需从先天、大限和流年三代的福德宫来综合判断，才能断定戊辰年间的买卖股票吉凶如何』我说。


    大限行入先天福德宫，太阳化禄这个禄星与先天命宫的天同禄星互爲作用，意味着这个命造在庚寅大限間，先天福德宮得吉化興旺并能和命宮互為吉化作用。因此就會在這個大限里的某一個適當流年，一旦去積極求財利時，便會有豐碩的財利可得。


    大限福德宮在辰，本就為先天祿權照會宮位，自然會呈現出一種强烈的求財欲望。何况大限庚寅本是先天的福德宫，同時又有强烈求財的星曜組合，因此，促使大限的这个福德宫也跟着展現出極强的求財欲望。


    福德宫不犯忌煞，固然可以使財聚不散，但若缺了忌煞冲害，却有使這個財庫因过于平穩，而有守財過緊之弊，自然不太容易考慮作任何投資。因為凡是投資，總帶有虧錢的危险性。至于風險極大的股票投機，更不會去考慮了。


    斗數命理有個稱為《積富之人》的格局，這種人一輩子既勤勞又節儉，他的財富即由逐漸累積而成，决不是因横發所以成富。因此《積富之人》的命格，就比較不會去從事炒作股票的这种投機行當。


    因此大限福德辰宫，這種忌煞交冲現象，在命理上就是扮演着這個命造，就在這個限運内，一旦遇到適當年份來臨時，他就會嘗試以投機方式來求財。


    既然是投機，當然意會着有很大的虧錢機會。股票的漲跌難料，任何一個炒股票的人士，都不敢奢想穩賺不賠。因此辰宮的这种忌煞交冲現象，除意味求財方式上的一種風險現象外，也代表着求取財利過程中，一種盈虧不穩的動蕩狀況。


    至于戊辰流年的福德午宫，正如前述，既有雙祿所輔，又有雙祿來朝，午宫又是由雙羊所成的《鈴羊》橫發格局，因此在這個流年里，要是投入股票炒作，就大吉大利了。


    『午宮也會有大限的天同化忌來冲，不也有忌煞之害嗎』


    這個問題須從兩方面來討論：


    其一，午宮既成為極強旺的《橫發》格局，因此由子宫單一忌星來冲，所受沖害影響不大。保況買股票，要是大賺小賠，結果還是賺了。因此這一年由天同忌星所冲的影響，應該屬於這種現象。


    其二，天同太陰在子又有先天化禄，是個入廟旺的《月出滄海》吉格。星曜入廟又成壞作用，所以并不作太大的凶論。


    綜合上述福德官的三代吉凶現象來判斷，這位高先生，在戊辰年里，要是積極投入股票買賣，將會是個大贏家。


    游先生接着又說道，高先生在戊辰年初以二十萬元開始，但到了同年年底，累積的資金和在手的股票總和，已高達四千五百萬元左右，的確是個出人意表的大贏家。


    『己巳年（一九八九）他更熱衷地泡在股票號子里，這年的福德官在未，雖然有武曲大限化權和流年化禄來照，但未宮究竟是個無甲級星曜的空官，何况有流年擎羊和地劫同宫卯宮另有地空來擊，使這個宫位形成既凶且不穩，若再繼續玩股票，豈不是凶多吉少，還可能有賺頭嗎』


    己巳年自坐紫微七殺和祿存，流年財帛宮武曲化祿并有鄰宮雙祿夾輔。流年本宮（紫微七殺帶威權），財帛宮另有貪狼的流年化權，由于財帛宫這麼強勁組合，因此會促使他求財之心更熾熱。


    午、未、申三宮全無甲級星曜，因此當子、丑、寅三個宮的甲級星都照入各個對照宮位時，豈不也使未宮成為雙祿輔祿的宮位？特別是丑宮的武曲化祿，巳宮的祿存互為照會所形成的吉象更大，因而作用照未宮，使未宮吉象力道也跟着增強起來。所以己巳年他再度投入股市，應該仍作看好論。


    『昌曲夾制丑宮，因文曲流年化忌，不正是使丑宮的貪狼形成（昌貪）和（曲貪）的（粉身碎骨）凶格嗎？為什麼還作吉象論』


    貪狼在流年里化權，也是一種吉化現象，會使貪狼多少產生抗拒由昌曲化忌時所引發凶性作用。何況同宮有武曲化祿，鄰宮有雙祿所輔，巳宮又是祿存來會。這些祿星本就有解危制厄的作用，另外丑宮又有衆多祿星拱輔照會，所以由昌曲夾制貪狼所形成的凶格，就因被解危制厄而不會太凶惡。


    不過文昌和文曲化忌夾制貪狼所成的（昌貪）和（曲貪）格，既然成格，應該也有其作用存在。但這種作用，可能對這個格局另一種（離正位而顛倒）的作用。他可能在股票買賣之間，常有『不按牌理出牌』的做法。比如說，他人看跌大拋售，他却看好而大量買進，甚至他人看利空而賣出股票，他竟以利我的看法而買入。因此他在這一年里的操作股票，似乎常有出人意表的怪招買賣。


    紫殺會貪狼化權，更使他膽大忘爲到了極點。小犢不怕猛虎，何況他曾經在股票上有過豐碩的斬獲，怎會不在這種行運里橫冲直撞呢？


    「唉呀」說來好笑，這個家伙外表看來文質彬彬，性情隨和，但買起股票，却莽莽撞撞的，經常道聽途說就買進賣出。他還在某大學機械研究所攻讀博士班，根本不大懂股票經，一竅不通。因此他在那個號子里，是個有名的冒失鬼，也有人说他是匹福星高照的大黑馬呢」


    「人要發財，真的必須鴻運當頭。當時運來時，任憑什么也擋不住。游先生猛抽一口香烟后，接着又說道：


    「大陸『六四天安門事件』(陰歷五月一日)發生前后，臺灣的股票曾有過幾天的大波動，一般作短綫的人，無不盡快拋售手中股票，他老兄却是大反其道，不賣反買。」


    游先生愈講愈起勁，已燒到濾嘴的香烟，還猛抽不停，于是我遞給他另一支，在他再度點燃香烟后繼續說道：


    「天安門事件過後，股票又因人氣旺盛而再度飈漲。臺灣股票就在這個月的十九號（陰歷五月十六日），加權指數冲過一萬點大關。更妙的是，他當時所買進的，大部分都是在這段期間上下波動較大的股票，因此在短短的半個多月間，由當時他所累積近一億六、七千萬的資金，三個禮拜不到的時間內，就快速地增加到近三億元左右。」


    我不甚其解地問說，指數由八千三百多點跳到一萬零一百多點，只有一千八百多點的指數差距，怎會讓他有將近一倍的利益進帳。


    游先生說道：「指數只是一種股票交易總和的加權計算方式，因此指數高低，并不能充分反應每一支股票的實際漲跌情況，這正是所謂贏了『指數』的原因。」


    妙的是他當時所買進的，大部分都屬於些被哄抬炒熱的小型股票。這種股票一有風吹草動，往往會有很敏感的劇烈反應，亦即比較容易跌得凶、漲得快。很多炒短線的人，就常因這種股票而橫發，也會因它而橫破。


    他當時除了買賣這種股票以外，還作「丙種」交易（買主出三成，金主代墊七成，墊款將視客人信用程度而以日計息），所以他那時買進的股票總額，就有數億元之多。


    這種巨額買進，又屬波動大的股票，在短期一進一出之間，要賺個上億元就不是難事了。


    游先生接着又說道：「這位老兄在天安門事件時撈了一大票后，雄心跟着資金增多而加大。股票在已巳年下半年間，每當有較大起伏時，他幾乎都能逮到時機地買進賣出，好像他能通靈似的預知行情漲跌趨勢一般。但有時接到他電話問起股票行情，又如同六合彩迷猜明牌，你會懷疑類似這種『菜鳥』，又如何能在這種瞬息萬變又撲朔迷離的股票上掙得到大財。」


    但說來有點難以令人置信，他在下半年間，股票買賣又意外順利。到了年底概約估算，他在股票上所累積的資金，已經達到四億多元了。


    ,股票一年賺個幾億元并不稀奇，但對一個不諳股票經的年青人，能在短短不到兩年間竟由二十萬元開始，如同變戲法式地賺進四億多元，可真是財運要來時，連城牆都擋不住。這種現象，也許只有從命理上來分析，才能有其脈絡可循。


    ,這種現象，也許只有從命理上來分析，才能有其脈絡可循。


    # 股票經紀人

    ## 生日辨證和生財之道


    林先生又來電話要我安排見面的時間，說是有位朋友的生日無法分辨，想請我看看，究竟那一天才是真正生日。


    一般人都以生辰混淆不清的居多，但生日難辨的也有。特別是在臺灣剛光復初期，醫療不發達，一般人家生小孩，都請接生婆到家里來接生，因此沒像現在到醫院生產，有一份出生時間注明詳細的出生證明。若是家人沒能及時作下記錄，時間一久，常對出生的時間甚至日期，常會有混淆不清的記憶。


    林先生說，這個命造的家人肯定生時約在午夜兩點鐘左右，但生日，到底是二十二日或是二十三日，就沒能確定。身分證上填寫的生日，也并非正確的日子。


    近十年來，他因爲在事業上歷盡起伏，難免會找算命先生問問命理。但不同的命理先生，對日子的訂法，就因人而異。子平法的，多半就是生在二十三日，但斗數論命的卻說成生在二十二日方正確。每一位都說得頭頭是道，因此這位朋友，至今還弄不清楚，到底他生在那一天。


    這兩個命盤，命宮都在寅宮，身官也都在辰宮，雖然排列的星曜不同，但都會照地空和地劫。這種命身宮組合，因爲同受空劫照會的影響，因此不管在外表長相或個性表現上，都會受到空亡星沖擊的轉化。這一轉化，就和命身宮星曜原有特質，產生相當程度的差異性。因此，遇到這種命盤時，若光憑外表和個性來作爲分辨時辰的依據，有時就會產生誤差。所謂差之毫厘，謬之千里了。


    『那麼要根據什麼來分辨呢？』林先生有些迷惑地問道。


    『最好，根據他既往發生，比較重大的事件，拿來驗證會更可靠。因爲命身雖然同在寅辰宮，但是整個命盤星曜排列結構差異很大。一旦行入限運后，兩張命盤的命理跡象自然會有差別。我們就可以利用這些差別來分辨，究竟那張命盤比較符合。』


    林先生說：『這位朋友在壬戌年（一九八二），因事業經營上的困境，而犯上詐欺和票據法的官司。』


    壬戌年三十四歲，二十二日的命盤，大限在丙子，有巨門地劫和天魁同坐。大限丙干干同化祿，會先天事業午宮，成雙祿交馳。丙干天機化權也同時化在午宮內。


    大限事業官太陽在辰爲旺宮。在這種限運里經營事業，不無可能。但大限坐地劫，有『半空折翅』的不穩凶象。若在此大限經營事業，似乎難免會有波折。


    壬戌年天梁化祿與天同在流年事業宮，又再度引動寅午兩宮的吉象。在此一年，事業再度擴充，但也因流年正好在地空宮位，特別在大限也坐地劫時，在這個流年里，事業一旦擴大，難象會有不穩定的跡象。


    另外從大限丙干廉貞化忌沖巳宮，巳宮爲先天田宅宮，原有文曲化忌在，在丙子大限時，巳宮又因廉貞化忌對沖而加凶。


    | 陀羅己巳田宅宮 | 左輔文曲梁忌科 | 七殺存祿 | 擎羊羊未僕役宮 | 廉貞貞申遷移宮 |

    | :--- | :--- | :--- | :--- | :--- |

    | 火星戊辰福德宮身 | 紫微天相微 | 火六局 | 己丑男命2月23日申時 | 白虎癸酉疾厄56-65 |

    | 巨門機丁卯父母宮 | | | | 天刑甲戌財帛宮46-55 |

    | 天姚丙寅命宮6-15 | 貪狼機 | 太陰陽 | 天魁劫地 | 武曲府祿乙亥子女宮36-45 |

    | | | | | 天同鈴馬星 |


    假使生日是這份命盤，那么要根据什么命理理由來確實證明？空口無憑，總是需要講出個道理，才能叫人信服。不知閣下有何高見？但必須要能在自圓其說之外，也要有說服別人的充分理由。


    到了壬戌年，壬干武曲化忌在卯宫，正好和巳宫的化忌夹制大限事业辰宫，成为双忌夹煞（火星）凶格。武曲化忌又是大限的田宅宫。卯宫又会亥宫的廉贞大限化忌，因此凶性也很强。


    综合这些凶性来看，二十二日的这张命造只要在壬戌年扩充毕业，除非经由严密的策划，否则事业将会因没预期中的顺利，而导致资金的短缺。


    他在壬戌年发生的财务官司，在二十二命盘上，大概可以作此解释。


    另外的二十三日命盘，大限也在丙子限，同样是天同化禄和廉贞化忌。


    在这个大限里，武曲化禄和先天事业午宫成为双禄交驰，在事业上也一样会呈现有吉象的一面。特别是先天命格为『杀破狼』的格局，通常在这种大限里，较会想在事业上、企求大显身手的心理。


    不过遗憾的，大限天同化禄在亥宫，和先后天的事业宫不吉会，大限又坐地劫星。大限还在这里不受大限天干吉化情况下，想要事业上，有所作为，恐将困难重重。


    再者丙干廉贞化忌在申宫，正好和大限的武曲星，成为『财与囚仇』。武曲的先天化禄，在此大限正在可作为『吉处藏凶』解。


    『财与囚仇』的凶象，和因田宅宫与福德宫破损财败，所引起的财务徵结不太一样。前者的财务问题，带有源自『不择手段』引起的财务纠纷。后者比较属于因资金短缺产生的财务困境。同样有财务问题，但在性质和原由上，差别很大。


    | 陀羅 | 左輔 | 七殺 | 擎羊 | 紫微 | 天鉞 |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | 巳田宅宮 | 庚午事業宮 | 羊未僕役官 | 壬申遷移宮 | | |

    | 火星 | 太陽 | 己丑男命一九四九年癸酉疾厄宮 | 戊辰福德宮身 | 武曲七殺 | 火六局 |

    | 地空甲戌財帛宮 | 丁卯父母官 | 天同天梁科 | 天相 | 地劫天巨門鈴星乙亥子女宮36-45 | 丙寅命宮6-15 |

    | 丁丑兄弟宮16-25 | 丙子夫妻宮26-35 | 廉貞貪狼機 |


    這個命造的生日肯定生在二十二日或二十三日兩天中的一日，但無法確定究竟那一天才對。論命者，人言人殊，莫衷一是。如何來分辨生日是那一天才對，閣下有何高明辦法？這個命例提供參考。


    到了壬戌年流年，武曲轉成化忌。也就在這年里，引動《財與囚仇》的凶性發作。


    壬年流年擎羊在子宮，使子宮除了《財與囚仇》的凶格之外，又多上《因財持刀》的凶格。若再把辰宮的火星合并運用，武曲一化忌，和大限事業宮的火星，又多了一個《寡宿》凶格。


    《財與囚仇》、《因財持刀》和《寡宿》，三個凶格并在一起，這種財務問題的糾葛可就大了。


    假定在壬戌年，因財務問題所引起的詐欺和干犯票據法官司，那麼便會曾因此而有的官非，比如說因而被判刑坐牢之類，就以這個命盤迹象較準確。


    『二十二日的命盤，不也是有財務困難嗎』林先生問。


    很單純，帶有不擇手段而形成的財務是非。因此前者比較屬於民事問題，只要民事方面解決，刑事上不會有太大難關。


    林先生說，這位朋友後來在甲子年（一九八四）被判刑坐牢，直到丁卯年（一九八七），才被釋放。


    那麼這個牢獄之灾的前因后果，以及進出監牢的時間，和二十三日的命盤，更加符合。二十二日的命盤，可不能作此論斷。所以我認為生日應該二十三日才正確。


    林先生說，這位朋友在坐了幾年牢以后，也許歷經磨難和在里頭韜光養晦以后，對佛'
