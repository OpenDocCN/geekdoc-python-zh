    但很遺憾的，在中國傳統的星象界，卻把星象之學，視作無所不能兼無所不通的神仙之術，這就難怪乎星象之學，在世界文明進入廿世紀的這個時代，仍然沒能像其他的學術一樣，進得了殿堂之門。


    「改朝換代的天下大事和大自然影響下的氣象天候，不可能以星象來隨便預測，那么和股票族群利害相關的股票行情，也不能用星象來作通盤的預測嗎？」吳東樵說。


    現代的星象研習者，也和老前輩一樣認為，星象之學可以用來研判天底下的任何大小事物。


