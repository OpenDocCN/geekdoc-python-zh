    \    凶，則羊陀就成身邊的兩大奸佞小人，虎視耽耽地想欺凌主人。』我回答。\n    丙午大限，使午宮成為雙祿輔祿，所以羊陀成為護衛，乙巳大限，午宮為雙忌所夾，使\n\
    \    午宮原有強旺氣勢大減，所以羊陀便趁機呈凶虐午宮。\n\n所以乙巳太限時，不只限運差，可能遭遇的環境狀況，已大異上一個丙午限，因此他恐怕再沒機會去鑽營一己之私利了。\n\
    高先生嘆了口說道：『這幾年來他撈得也夠了，少說也有好幾個九位數的錢。若再把所買的不動產，在這幾年的增值合算，少算也有三五個九位數左右。這些積聚的財富，已够他下半輩子悠游不完了』\n\
    \n戲法人人會變，各有巧妙不同。生財之道人人也各有其竅門絕活。但一個上班族在十年間，能生財有道到這種程序，的確讓人覺得匪夷所思，也許財神爺特別厚愛他吧\n\n\
    ## 高利贷下的牺牲者\n——从福德宫看倒帐\n\n华先生于己巳年十月间由竹北来电话，话中提起，大限福德宫会变禄又有忌煞来冲，在财利上会有什么作用。\n\n\
    这位老先生，老当益壮，勤学不懈，一有疑问就来电话互相讨论。我若有空闲，就会在电话中和他聊上几句，但有时不详看命盘，可不敢随口武断表示意见，因此也常需用掌上推盘，了解个大概时才能回答他。\n\
    \n我跟他说道大约：丙戌大限的这个福德宫，只要去赚劳心劳力的钱财，应该财源广进，但千万不能作投资、投机或贷放高利，否则将会遭到『利空』而受亏损。\n\n长途电话不便详谈太久，要不然他论命的润金赚来不易，花在讲不清的电话费上，实在太可惜。\n\
    \n约在两个星期后的星期天，华先生又来电话说要登门造访。偶而他会利用假日返台北家里时前来见面，每次他总有讲不完的命例趣事。我常很羡慕地想着，待我再几年退休后，不晓得能否有他这般的逍遥自在。\n\
    \n他拿出那天在电话中谈起的命盘。他说，这位洪先生在丙戌大限间，原在一家机械厂当厂长，但在丁卯年（一九八七）中，因顶撞老板后辞职。戊辰年，进入一家投资公司当营\n\
    \n> • 143 •\n\n**業部門經理**，負責公司在某個地區吸收資金的職務。\n\n『在命理上，這一年新到職的差事穩嗎？待遇又如何』華先生提出問題說道。\n\
    \n**先天命宮為紫破守命的《殺破狼》格局**，六吉不會，先天事業宮有《昌貪》和《鈴貪》，來合成格，將主一生謀事的多變化。大限丙戌，太陽陷宮又坐地劫，運限不穩，三方會忌煞，會使行運多波折。\n\
    \n**戊辰年坐先天太陰化忌于隱官**，但流年事業申宮有大限天同化祿，子宮有先天天機化祿，流年會先后天祿星，故有換新工作環境機會。另外流年三合方，申宮有先天天梁化權，子宮有大限天機化權，辰宮有流年太陰化權，集三代化權于流年，所以，在這流年里所接新差事，能掌權而為部門主管。\n\
    \n**但若以流年辰宮所坐太陰化忌并擎羊**，是為《人離財散》格，此格會因流年天機化忌引動而逞凶，何況戊子兩宮還有空劫來沖，使流年太歲官位呈現動蕩不穩的現象。\n\
    \n**在這種流年帶有吉凶混雜的情況下**，進入一個新環境服務，在命理上會有表面穩定，暗地里藏有不穩凶機存在。因此若就工作的穩定性而言，正是個《吉凶相伴》，先吉而后凶的流年運勢。\n\
    \n丙戌限，兩干使廉貞化忌在巳宮，己已年文曲化忌在卯宮，會使辰宮成爲雙忌夾忌官位，因此洪先生的這個差事，到了己已年恐難繼續。\n\n**至于待遇方面先天福德卯宮**，天府祿存爲財星逢祿庫，難入間官，但三方無煞曜《鈴\n\
