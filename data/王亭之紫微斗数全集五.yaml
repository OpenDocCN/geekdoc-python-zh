  md: '「理論上是這個樣子沒錯。』我接着說到：『通常要把錢借給朋友周轉或生息時，必須要注意福德宮有否破損，一但遇有凶煞，常會使貸放出去的錢收不回來。』


    以吳太太的福德宮來論，先天福德宮在丑，坐天相井與鈴星地空同躔，西宮有地劫來合，先天福德宮本就極不穩固。


    大限丁未，福德宮在西宮有地劫，會有丑宮地空和鈴星兩煞，下曲先天化忌又由卯宮來冲。


    這種先后福德宮都兩雙破損，一旦流年引動大限福德宮受忌煞沖擊，或是流年福德宮呈凶時，把錢外貸生息，就有被倒帳的機會。


    成交辰年天機化忌加擎羊的福德宮，正好成為《天機天梁擎羊會》的格局，這個格局又因天機化忌引動逞凶。


    子宮巨門化忌加擎羊本已很凶，若再把夾制子宮的鈴星和火星所成雙煞夾煞忌并論，更使子宮成為《終生縊死》的凶限惡格。這個惡格冲激午宮，會使這個宮位更形惡化。所以吳太太在戊辰年借出的錢，最後會血本無歸。


    把錢借給朋友周轉或生息，除了應該留意福德宮有否暇疵以外，還要注意到限運的僕役宮有否會凶。要是這個宮位，同樣的忌凶交加，卻把錢出借他人，那就會變成劉備借荆州——有借無還了。


    丁未大限使子宮所形成的惡格——《終生縊死》，不只是大限僕役宮，也會冲擊着先天福德宮。


