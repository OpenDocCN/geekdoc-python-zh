  md: '據說，在大家樂橫掃臺灣的時候，跑在高速公路的野鷄游覽車，只要車上有人當莊家，就可以和同車乘客，玩起「站站樂」。這個玩法就是由賭客來猜測，下一個收費站收到的收據號碼，有猜最後個位數的，也有猜兩碼的十位數的。個位數的彩金倍數較低，十位數的當然就比較高。全程的收費站賭下來，豈不正是站站樂歪歪？


