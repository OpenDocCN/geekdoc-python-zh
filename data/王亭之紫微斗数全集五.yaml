    \n- 數了。'\n- 高先生點點頭，又提出問題：'\n- 丙干天同化祿和巳宮的太陰先天化祿輔午宮。午宮本身有貪狼、祿存和右弼，官位強旺，又是雙祿輔祿，除了反映他在這個大限里，工作環境良好，又有很好的表現以外，在星曜賦性上，又代表什么，會使他在公事上有些什麼特殊表現？'\n\
    - 和高先生討論命理多年，偶而他還會提出一些試探性的問題來，好在只有兩個人對談，就算漏氣又有何妨？只有我還沒到神仙論命——鐵口直斷的登峰造極境界。凡人么，誰能不犯錯，何況只有在百折不撓的經驗中，才能真正的體會到命理的真義所在。'\n\
