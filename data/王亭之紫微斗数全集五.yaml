  md: '米推論。


    在斗數命理里，雖然常用星曜有三四十顆之多，但在論斷時，通常依作用程序，分成甲、乙、丙三個等級來推論。（也有用到一百我顆者，又分爲甲、乙、丙、丁等五級）。通常以


    甲級星曜（如紫微系列和天府系列共十四顆星）爲格局架構的主干，其次配合六吉星（魁、


    鉞、昌、曲、左、右）和


    鈴、空、劫）再檢視衆多星曜所構成吉凶格局，


    作爲推論依據。六吉 煞 乙等星級，它的調別賦性作用并不頂強烈。必須配合其他昨


    曜作用才能凸顯特殊作用，并不可以據單一星曜來推論，比如某個宮位有某顆星曜，它必


    然會顯示什么？


    很遺憾的，這種錯誤觀念，很普遍地被受，也被某些大師極力推廣。最糟糕的，還有不


