    因此當先后天福德宮形成《府相朝垣》時，一旦限運呈現較強烈的求財命理跡象時，這未亥兩宮也會因此而產生相似的求財反應。在這個案例里，先天、大限和流年福德宮，正好分居在未、亥兩宮。未宮感受丑宮的吉化引動，亥宮和未宮三合外，也和巳宮對照而大受感應。只是，府相若未受四化引動，似乎形成靜態，因此在推論時，常會不受到重視。不過在這個命盤里，未宮也有丑宮的破軍祿權來會，亥宮也有巳宮廉貞化祿和貪狼流年化權來合，因此這兩個福德宮，也在限運被受到對宮吉化會合的激發。所以當限運使先后天財帛宮受到強烈引動時，這兩個福德宮，自然而然的『以錢滾錢』的這種求財效應了。


    另外，未宮在己巳流年有流羊進入，並會有卯宮擎羊和丑宮地劫與陀羅，亥宮也有未宮流羊和卯宮擎羊來冲。這兩宮都在凶煞冲動之下，促使他萌生一種投機求財的強烈意願。這兩三年來股市大興風浪，造就了不少暴發的股票族。謝先生就是在這種命理跡象和環境促使之下，因而走入股票市場，假定沒此環境，那又不知道他會去投機什麼來求財了。


    ### 月份的贏虧理由


    周先生看着記錄表說道：『三月份為戊辰月，流月在辰宮，福德宮在午。戊干天機化忌和流年文曲化忌會冲午宮。怎麼會在這種財帛宮和福德宮雙破之下，不虧反賺呢？』


    我說：『你用的是傳統的斗君來定流月，但根據我多年的驗證，利用這種斗君法所定的流月，似乎很難和實際的情況吻合。若是改從流年宮位做爲正月斗君宮位，幾乎都可以得到既符合又合理的解說。』


    『你擅用這種定斗君法，究竟根據什么理由或理論，能有合理的解釋嗎？』


    我當然有它的理由根據，但這個問題，不在這篇文字的討論範圍，容後有機會再詳談。


    要是從流年太歲起斗君，那么三月份就定在未宮，則流月福德宮在西。酉宮武曲爲流年化祿，三月戊干貪狼化祿會酉宮。酉宮得流年和流月天干雙化祿之下，使他在這個買賣的股票只賺不賠。


    四月份在申，天干爲己，月份福德宮在戌。謝先生買賣五次，結果賺三次賠兩次，最后净赚十六萬九千多元。


    流月福德宮在戌，戌宮坐太陽化忌，但酉宮有流年與流月的武曲化祿，亥宮有廉貞化祿，遂使戌宮成爲雙祿所輔。


    另外午宮有流祿，寅宮有先天祿存，使戌宮得此雙祿來朝而吉化。


    不過午宮的文曲，又因流年與流月干使它成爲雙變化忌，同樣沖擊戌宮，也使戌宮有凶來冲。又是祿又是忌的，使周先生聽來似感疑惑，于是問說：『這種吉凶混雜的組合最難分辨，究竟是吉或是凶？』


    『既然属「吉凶混杂」的组合，代表有吉也有凶。买五次，赢三次，输两次，不正是有吉也有凶吗？』


    『那为什么不会是输三次赢两次呢？』


    这个需从吉凶力道的强弱来分辨。戌宫被双禄所辅，又有禄存和流禄来会，这四个禄星辅照戌宫，其力道要比由午宫来冲的双忌力量还强，要不是戌宫的太阳落陷，又有先天化忌，单就文曲的双忌来冲戌宫，其凶性就要更弱小了。


    这种禄忌对戌宫所造成的吉凶对比，既然禄吉比忌凶力量来得更强，所以赢得次数会较多。月底输赢两相抵，也就成正数而赚钱了。


    周先生于是接着谈五月份情况。他说，这个月买的股票有六次之多，其中先买的三次在同月间卖出，后买的三次却在七月份才卖掉。若单根据买进的月份来核算最后的盈亏，就有下列两种情况：


    其一，单就买卖价差部分，输赢两相抵，则净亏两万八千亿元。


    其二，因配股价值达二十五万八千多元。因此扣掉价差亏损部分，这个月份还赚有十三万元左右。


    『这些状况，在命盘上究竟要如何推论？』他问。


    这种情形的确比较复杂，不过还是可以依实际状况理出条理来。


    五月斗君在西，天干为庚，四化为太阳化禄，武曲化权，太阴化科，天同化忌，流月福德宫在亥。


    流月行入流年化禄的武曲宫位，月份又有武曲化权，因此使谢先生更大胆地把资金投入股市，所以在这个月里买进的股票总额，累计高达五百九十万元之多。


    周先生接着说道：『但月份的福德宫在亥，亥宫既没有年与月份的禄星会照，也不见两者的忌星来冲，因此禄星似乎和亥宫毫无瓜葛。若论凶煞，却有卯宫的擎羊和未宫的流羊由双方冲，理论上不也可以据以推论亥宫，同样带有相当程度的凶象，为什么又能转亏为盈呢？』


    『你这个问题问得很好，可见你已渐能思考入微，这就是进步的现象。』


    巳宫有廉贞先天化禄，丑宫有大破军化禄，酉宫为五月斗君，有流年武曲化禄。这三代禄里交会于巳宫，其禄吉作用甚强。亥宫无甲级星曜，使巳宫的这一组合吉曜照入亥宫为用，不也使亥宫同样感受强烈的禄吉作用吗？


    五月间买进又卖出的三次股票所以会赚，应该可以据这道理来解释。


    『那么同样在五月间买入的另外三次，为什么又有两次在差价上的亏损，另外一次差价的净益也不多呢？』


    依记录来看，谢先生是个抢短线差价买卖的人。所以会在五月中旬买进，待七月中下旬卖出，可能由于进了股票后接着下跌。另因可能考虑到买进后正可过户分配『股仔仔』所以在精打细算下认为仍是有利可图，所以才俟侍领到配股后才出售。


    至于五月买进七月卖出，之所以会有差价亏损，是因为七月天干为壬，壬干使武曲化忌，这个武曲所在宫位，正是五月的流月斗君。斗君本宫因忌而破损，亥宫又得不到壬干的化禄吉化，也就因而以较低差价卖出了。


    「但因得配股，使留到七月份才卖出的股票变成反败为胜，又是从何解释？」周先生问。


    「五月庚干太阳化禄，七月壬干天梁化禄，不正使申戌两宫成双禄来辅酉宫吗？」我说。


    周先生喃喃自语的说道：「原来是这个道理。五月买进的股票，七月间卖出，月令宫位还是在酉宫。同样的福德宫，到了七月份时，还是定在亥宫了」


    「本来应该就是这个样子，绝没有把五月份买进的股票，在七月份卖出时，将月份宫位移到亥宫，把福德宫也移到丑宫的道理。但有太多的大师却不知道这种看法，实在令人纳闷。」


    六月份他只买一次，又在同月间卖出，赚到一万五千多元。


    六月在戌，坐破阳化忌又落宫位，月令天干为辛。辛干使巨门化禄会戌宫，也照入月令福德子宫。但流年文曲化忌也冲戌宫及子宫，流月辛干文昌化忌也冲子宫。


    戌宫另会有来自午宫的流禄，巨门化禄及文曲流年化忌，子宫同样受到午宫的这两个禄星和忌星之外，又加上辛干的文昌化忌来自申宫。成和子同样受到禄忌冲擊，形成吉凶混雜，因此就有吉凶并行之象。


    周先生又問：『這種月令若多買幾次，情況是否也將如五月份般的盈虧參半？』


    理論上應該可以應該想。但他只買一次，又在同月間賣出。雖然只賺一萬五千多元，但獲處比，在前后九天的時間，就賺有十個百分點的利潤，也算不錯了。


    這種忌禄并冲，但巨門為甲級星曜，文昌為乙級星，除非因化忌形成『凶局』，通常由甲级星形成的化曜，其力道要比乙级星强，因此使他得利。


    另外，月令坐入忌禄交冲的落陷宫，太阳又因辛干化權，常會使他產生一種買與不買，或買多少，猶豫不决的心理。最后他只買一筆，應該可以用戊宫所坐的月令陷落，使他提不起勇氣，可做較合理的解釋。


    另外若從自四月份以后忌星的延續冲擊子宫，也可作另一種使他不願意多買的原因。


    四月天干为己，文曲化忌，五月庚干天同化忌，六月辛干文昌化忌。這三個月的化忌延續冲擊六月份的福德子宫，因此消滅了他多買的意願。三個月化忌連續的為害，成爲『三胎』凶格，若多買幾次，就會應上這個凶格的凶象。


    七月份在亥，福德在丑，月干为壬，天梁化禄與亥宫無涉，倒是武曲化忌冲照丑宫，丑宫又會照空劫宫位。月令忌星冲擊力在本月甚强，可能使他認爲股市將會『利空』，因而干脆不买。


    『和「鬼月」的观念或许有关联吧』周先生说。


    也可能是如此。很多人在这个所谓的「鬼月」间，什么重大事都不敢做，因此不在鬼月结婚、生意不开张，不远游旅行……特别有些如同被「鬼」迷心窍的股票族，更会忌讳鬼。


    八月在子，福德宫在寅，天干为癸。癸干破军化禄，巨门化权，贪狼化忌。


    破军化禄和贪狼化忌与子寅两宫无会。但这两宫同时会有午宫的流年禄存和文曲流年在九和十月间出手。结果三笔赚一笔亏，净赚近二十万元，全因子寅两宫会照午宫的流禄，其吉象大于文曲忌星的缘故。


    『这个月三十日买进「台火」一张，翌日九月一日再买两张。类似这里同一様股票在不同的月或日子买进的，它的月（日）命本宫和月（日）令福德宫，究竟要根据那一天来推论』


    当然要根据第一次买的月（日）令来订定。因为既然是同一种股票，总不能説先后买的往后会有涨跌上的差别。因此可以根据『缘起』的时间，作为推论依据。你不妨自行依此情况来推演看看，结果应该就是如此。


    九月份在丑，福德宫在卯，天干为甲。


    **甲干廉贞化禄，破军化权**，武曲化科，太阳化忌。


    甲干使丑宫成为禄权的《三奇嘉会》，这个宫位又是紫破会左右的大格局。另有地劫同踞并会地空，流年也由未宫直冲而入，因此虽然也买入五次，但累计总金额却比前几个月要来得更多。


    从月令丑宫三奇嘉会，又有流年的武曲化禄来会，表面上似乎是个大吉大利的月份宫位。但买五笔，虽赚三笔，不过所亏的两次，其金额大于所赚的三次，因此结果还是亏钱达六万多元。


    『流年文曲忌星』和月令太阳化忌，既不冲月令丑宫，也不为害福德卯宫，为什么还会亏钱呢？


    月令丑宫，会有先天廉贞化禄。自坐大限破军化禄，流年武曲化禄在西宫，月令又使廉贞再度化禄，使丑宫这集会『四代化禄』而成锦上添花，因此对丑宫似乎吉祥毕集，这会使得苏先生误认为是个『利多』的大好机会。


    「你刚才谈到五月份时，认为亥宫得巳宫集破军禄和武曲禄与廉贞禄、三大禄吉作用照亥宫，使亥宫呈吉。因而使五月份获利。」


    为何集《四代禄》的丑宫反会『误认』有『利多』之害呢？周先生问。


    我回答：「你这个问题问得很鞭辟入微，看来你已能条理清晰有条不紊。」


    这个道理，即因巳宫不坐空亡。而丑宫自坐地劫又会地空，因此这两个宫位，在同样禄星的吉化下，巳宫的吉化作用较稳定，而丑宫的吉化，就带有极大动荡不稳现象了。固然巳宫同样有空劫自西丑来会，自然也使巳宫吉象多少有点不稳，这也正是五月份所以会有两次亏损的一个原因。要是没有空劫冲击，亥宫得自己巳宫照会的吉象会更大，也许就不会有两次差价亏损，而会赚得更多。”


    我再三强调，用『钱滚钱』的求财，除了本宫之外，重点宫位在福德宫。九月份福德宫在卯，天府擎羊同守，天府也为财帛之星，虽可制擎羊之恶，但本宫有流间，酉宫有地空双煞来冲。这三天凶星，会使天府很难全制其恶，所以一旦在此月份里多买或是大买时，恐怕就难使天府全制三煞的为害了。


    所以买五次，赚两次赔三次，赔大于赚，于是使结果成为负数。


    十月份斗君在寅宫，月令福德在辰宫，天干为乙。


    寅宫为羊陀夹禄，主《委屈》宫位，午宫有流禄和文曲流年忌星来会。本宫弱陷，虽有双禄，但另因忌星（还有戌宫太阳先天化忌）来冲，因此月令本宫不作吉论。


    月份天干为乙，天干使天机化禄、天梁化权、太阴化忌同时会照辰宫。辰宫会禄权两曜，会使谢先生认为『利多』兼『长红』，因此虽也同样买进五次，但累积总额却为全年最多的一个月份。但太阴化忌恰好引动辰宫同踞的火星，使这个月份福德宫成为《十恶》凶格。


    从记录表上看出，先前买进的『远纺』和『工矿』两项，后来以跌价亏本卖出。『勤益』先后买两次，第一次买进的，在十一月间脱手仍是大亏。


    周先生补充地说道：『勤益』和『远纺』这两支股票，直到十二月二十七日（阴历）封关那天，『勤益』以二百三十二元收盘，『远纺』却是涨到一百二十元之多。也许他还看好『远纺』，因此他还是没把它卖掉，以略补这个月的其他股票损失。


    周先生接着又说：『勤益』和『远纺』同样都买进十张，但单价，『勤益』的平均成本却有远纺接近两倍多价格，而『勤益』跌幅接近一百元，『远纺』的涨幅不到十元，因此怎么看，他在十月份买的股票看来是输定了。除非过了年后，『勤益』又能起死回升，长期长红。


    道：『看来辰宫的『十恶』凶格，的确极凶无比。』周先生利用计算机合算一番后，接着说出，则这一笔，又会多亏高达五十六万之谱。那么连带已卖出十张『远纺』所亏九万五千元，再加上工矿又亏三万五千，这个月所买进的亏损总额高达一百零五万之谱。要是扣除十月二十八日所进『远纺』十张的可能赚到（以一百二十元售价计算）七万，那么十月份还时亏一百万元之多。


    『由三月到九月累积赚约六十四万左右，但到十月底，却反成亏损约三十多万元。』


    买股票本来就需本身拥有资金，才能耐得住长期跌压，要是贷来资金，或是以『丙种』买『利多』，那就灾情惨重。财政部长郭婉容女士曾说，股票跌价就不卖，不卖就不亏。股票族，要是能認同部長的這種說法，就不會有走上街頭瞎胡鬧的鬧劇發生了。


    十一月份大概就因資金被套牢，所以没再買進。十二月份再買進五次，部額累計只有二百七十萬之多，看來已經不起十月間的大套牢和賣出三筆的虧損，所以在月底對關前的股市大長紅之下，仍無力再有什么交易。


    周先生頗有感嘆地接着說道：「近年關時，股市有連續幾天的大飈漲，指數也再度冲越萬點，對關時甚至冲破一萬一千點的指數記錄，但唯獨謝先生手上握有的股票漲幅不大而給謝先生十月間所買的股票帶來『利多』行情。」


    辰宫有太陰化禄，午宮有流年祿存，并會寅官祿存，合成雙祿交會。因此他在封關前所售出的那筆股票還是賺了錢，没出售的，在封關前也都呈現漲勢。


    周先生懷疑地問：「丁干不也使巨門化忌，午宫也有文曲的流年忌星嗎？怎么這個月所買的股票又會看好？」


    太陰與火星同宮，子宫又有鈴星來會，當太陰化忌成爲『十惡』時，它的凶性特别强烈。但若是太陰成為化祿時，火鈴兩星，不但不為惡，反有因煞得化禄，而有如同「制煞為用」的同樣功能，因此辰宫的太陰化祿就非一般『弱陷化祿發也虛花』的作用可比。


    雖然『用錢滾錢』的求財重點在福德宫，但也和其他命理事項的推論一樣，仍需重視行限（月令）本宮，也就是在限運（月令）本官强旺之下，相對的重點宫位（福德宫）才能因吉化而凸顯其吉象。要是限運本宫（月令）不佳，相對的，重點宫位（福德宫）再佳，也不會好到那里去。


    十二月辰宫就因上述的吉象，因此使午宫所会变禄吉象彰显，而相对的变忌（巨门和文曲双忌）之凶，也就不会为恶太强烈。


    「有一点，我观念一直转不过来的，就是十月份的福德辰宫，为什么历经十月乙干天机化禄会辰宫，十一月丙干天同化禄会辰宫，十二月丁干太阴又化禄，辰宫也在连续三个月连禄吉化下，十月间买的股票，到年底封关时，还是低迷不振呢？」周先生说。


    这个道理，可以分成几点来说明：


    第一，十月份在寅宫，前面已说过，这是个『委屈』的宫位，虽然有午宫的流禄来吉化，但也有文曲忌星来干扰，因此是个极弱陷的宫位。


    第二，辰宫因乙干太阴化忌，已成『十恶』，要是把铃星加上，可就成雪上加霜的大凶格。


    第三，十月、十一月和十二月的三个天干：


    十月乙干，天机化禄会辰宫，但是太阴化忌，使辰宫成为『十恶』。


    十一月丙干，天间化禄虽分会寅辰两宫，但寅宫太弱而辰宫太凶，因此仍难起死回生。


    十二月丁干，太阴化禄于辰宫，但巨门化忌又冲寅宫。因此这三个月的禄星虽然延续照入辰宫，仍难使寅辰两宫同时并旺。


    這兩個宮位，一個太弱，另一個太凶，三個月化星雖對辰宮成『連祿』，但也有一次造成『十惡』，另有一次對寅宮形成忌害，所以連續三個月祿星照辰宮，也就難使辰宮展現吉象了。


    若從這個觀點來推論，自然不會認定辰宮，經三個月的祿星吉化，就會使這個宮位轉凶成吉。


    『沒想到己巳流年，不但行入大陰運的財帛宮，既是先天的《三奇嘉會》宮位，又是適逢先天、大限和流年《三代》化祿的年份宮位里，一開始買股票，最後竟會虧損又套牢。』


    大限福德宮爲空宮，《動產之庫》虛弱，巳宮雖有廉貞化祿和貪狼及右弼來照，但究竟照而爲用的力道較弱。何況卯宮有擎羊，未宮還有流羊來擊，一祿難敵雙羊，空宮的亥位，也就被凶象佔據了。


    流年福德未宮有天相與流羊同踞，卯宮又會擎羊，丑宮地劫及陀羅來冲。這種宮位坐煞又有諸多煞星來冲，根基就已不穩固，就算丑宮有大限破軍化祿來朝，但單一化祿吉象，卻抵御不了衆多煞星的凶象力量了。


    大限福德宮弱又凶，流年福德宮又不佳，在這種流年從事股票炒短綫買賣，想求發財，除非能見好即收，要是全年買賣不停，到了年終，結果就會如此一既虧損又套牢。


    談了一整天，談得口干舌焦。但周先生還要我談談買賣股票日期吉凶因果的推論法，于是我委婉地說道：『年輕人，既然已有詳盡的明細記錄，你就自個兒回去研究吧』日子 >
