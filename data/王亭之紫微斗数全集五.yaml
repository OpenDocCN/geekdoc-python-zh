- md: '## 命會空劫，半空折翅？


    ### 一個不動產仲介者的生財之道


    吳先生商專畢業，服兵役後在幾個私人公司服務過，由於高不成低不就，兩年間換了三個老板，最後總是自己拍拍屁股走路。戊辰年底經朋友介紹找我論命。


    見面時他拿出自己排好的一張斗數命盤，壁頭就問，命身會空劫星的人，是否注定一輩子在事業上，就會《浪里行舟》兼《半空折翅》的半途而廢和漂浮不定？


    那麼十月生的人，因為命身必然分坐空劫星，難道這種人也將一生下來就注定一輩子落魄不得志了？我不作正面答覆地反問道。


    『一般書上不都說，像我這種財官兼命身宮都會空亡星的人，會一輩子萍踪無定，事業無成嗎？』這個年輕人，引經據典的提了他的論點。


    在古賦文上，對這兩顆星，的確有這種賦性方面的解釋，但它的賦性作用，并不只是表現在這方面。這兩個空亡星另有屬『玄學』方面的作用，因此一個命格會空亡的人，只要他格局好，往往都是『想像力』極爲豐富的人。有很多科學家、思想家、宗教家，這些亟需憑豐富想像力的人，常在命格上會坐空亡星，也因此才會有他們的輝煌成就。據個人所知，當代的幾位命理界高人，也都是屬於這種命理格局。吳先生會涉獵命理，理論上，也和此空亡星有關呢？


    | 鈴星 | 天右巨<br>餓弼門 | 文天廉<br>曲相貞 | 天梁<br>祿 | 文七<br>昌殺 |

    | :--- | :--- | :--- | :--- | :--- |

    | 乙<br>巳命宮 6-15 | 庚<br>午父母宮 16-25 | 辛<br>未福德宮 26-35 | 戊<br>申田宅宮 36-45 | |

    | 食<br>狼 | 吳先生<br>壬<br>寅<br>男命<br>六月×日寅時<br>一九六二年 | 地<br>空<br>癸<br>酉事業宮身宮 | 陀<br>羅<br>庚<br>戌僕役宮
    | |

    | 甲<br>辰兄弟宮 | 火<br>六局 | 癸<br>卯夫妻宮 | 武<br>曲<br>忌 | |

    | 天紫<br>府微<br>機 | 地<br>劫<br>癸<br>丑財帛宮 | 擎<br>羊<br>壬<br>子疾厄宮 | 破<br>軍<br>辛<br>亥遷移宮
    | |

    | 壬<br>寅子女宮 | | | | 太<br>存<br>陽<br>禄 |


    命宮會空劫，身居事業宮地空同踞，據古賦文解這種人一輩子的事業表現將會波動不穩——浪里行舟或半空折翅。若真是如此，十月份生人，命身宮必然和空劫同宮，豈不是全都很糟。這個命倒謹提出這種命格在理論探討上的另一種看法。


    畫信書，不如無書。許多書上對星曜賦性闡釋不完整，實在害人匪淺。我經常碰到一些年輕朋友，有這種星曜作用方面的誤解和誤用。


    若以吳先生這個命身格局架構而論，在聰明才智上應該屬於聰穎靈敏的人，腦筋動得快，有如天馬行空，缺點則是難免會有趨于不着邊際的幻想成分。好在他還有左右兩星輔佐，尚下至于凡事都墜入憑空想像。因此從這個組合上來看，他還是個既能想像，也能力行的。


    那么爲何在二十三、四歲間的近兩年里，總是沒一個地方能待上一年呢？[1] 他問。


    丙午限先后天會化權，也是他服完兵役踏入社會做事的起初階段。這種權星的作用，運也會寅宮的紫微先天化權。


    大限本宫廣貞化忌，會上大限事業宮武曲化忌，正好成爲雙忌之下的（財與囚仇）。一個初出茅廬的小伙子，作事的能力和經驗尚待磨練，自然只能找到一個從基層干起的職員差事，職重薪高的職位，自然輪不到他。這種現實和理想的重大差距，自然不能使他安于職低薪少的工作。他也就常因此而另謀高就，希望有朝一日能鳳栖喬木了。


    那么以我的命理條件來說，我最好走上那一行呢？[2] 他又問。


    在能力充分發揮。


    我說：「這種命格和行運，若能從事一種半帶外動的服務業，將會使你命理的最大潛


    『為什麼要外動又要帶服務業呢』


    『命身會坐空亡，既然有《浪里行舟》的作用，因此你應該不是一個只安于枯坐辦公廳，天天準時朝九晚五上下班的人。何況進入丁未大限后，大限田宅宮武曲化忌。田宅會忌煞的人，也會呈現不耐整天困守于案牘勞形。」


    丁未大限丁干使太陰化祿，這一個祿星引動他先天遷移亥宮的祿存，成爲三祿拱照。


    亥宮又是丁未大限的事業宮，因此這個亥巳，不只主大限事業的吉利，也是象徵着他在事業方面，若能帶有外動並且愈困難又競爭的差事最爲有利，所謂『亂世出英雄』即是也。


    至于服務業，先天財帛丑宮天機坐會空亡，并有鈴星三煞來冲，主勞心之財。后天財帛卯宮，太陰化祿和火星同宮，也會西宮地空冲照，求財性質幾與丑宮相似。這種星曜組合的財帛宮，异于一般投資生財，買賣業得利，也非以錢滾錢的投機財。


    基于命理上的這些條件，我作上述的這種論斷。不過命理理論雖是如此，并不代表他必然會走上這一條路，只能說，若他能走上這條途徑，應該比較有利，成就也會比較高。


    吳先生說，就在丙寅年里（一九八六）的一次機緣，他進入一家專門作房地產仲介生意的公司服務，這個行業，正好應上繁忙社會的需要，不只使買賣雙方各得其便，也同時造就了不少的就業人口。


    吳先生接着問道：『從事這個行業，能有利可圖嗎？丙午大限（財與囚仇），丁未大限雖會三祿，但日月反背，豈不是除了紙袋中極微薄的薪水，還有什么厚利可圖？』


    『我不認爲你在丙寅年進公司后，會很安份的只圖上班領薪水。』


    『當然，業績好，公司也會另發獎金，因爲這種行業底薪都不高，一般業務人員常有獎金可得。』吳先生補充的回答道。


    我還是不以爲然的說道：『丙寅年二十五歲，大限還在午宮。這年天同化祿，流祿在巳官，流年在午宮，使午宮成爲雙祿所輔，但同時也因廉貞化忌而成爲《刑囚夾印》格，流年財帛戌宮，也是雙祿夾煞格。流年的福德辰宮，和大限福德申宮，不只是都被雙祿所輔，又成《昌貪》。在多重的吉象和《離正位而顛倒》的作用下，我不認爲在你經手仲介買賣所賺取的傭金，會全部交給公司，再從中領取獎金。』


    『那年的確有幾個小 Case（個案），是我直接介紹給雙方的買賣客戶。由於服務到家的也給雙方客戶省了不少錢，因此雙方客戶，都曾經另給酬勞。』這個年輕人，總算說出了事實：『丁卯年（一九八七）中以后，由於房屋景氣復蘇，不只買新房子的人增多，買賣舊房子的人，也跟着多起來。委多房地產仲介公司大發利市。一些腦筋動得快，又有資金來源的業務人員，也常會相機行業，私下買進房子再賣出賺差額，公司方面，只要每個月有要求的業績交代就可打發。您覺得像我這種行運，丁未限的田宅宮武曲化忌并陀羅，有可能在類似自行買進賣出，來賺差額錢財嗎？』


    這個年輕人，不是來問命，簡直是在考算命先生。像這類『考』的客人，偶而也會碰到其中以略懂命理皮毛的人居多。我既然敢打着業余論命的招牌，就不擔心來客提出什麼問題。只是對這種只學一招半式，就想找人套招的年輕人，有時難免在談命說理上保留三分。


    丁未大限坐先天福德宮，天機化祿。丁干使太陰化祿會后天福德酉宮。這兩個先后天的福德宮，根據其三方四正的星曜組合來看，巨額資金也許沒有，但買賣老舊房的較少資金，再加上調頭兩周轉運用的能力，還是勉強可行。


    另后限運的福德宮的天同化權會太陰化祿，也會使他激起積極求取財利的心理。這些命理條件，會在一個適當的現實機運下，發揮其潛在的本能。因此我認爲，他在這一兩年間——丁卯和戊辰年，應該也會和其他業務人員一樣，打着公司的招牌去賺取額外的私利。


    『丁卯年財帛宮在亥，太陽落陷，流年雖變化祿，但也坐日月反背宮位，流年福德巳宮人財利。』


    不只巨門化忌，也坐怎么可能賺到這種錢』這個年輕人，不知道是心有疑惑，或者明知故問，但問題却頗言之成理。


    丁年流祿在午宮，這個祿星，不只使流年田宅宮吉化，也照會大限田宅戌宮。流年本宮大陰變化祿，不只是大限的財帛宮，太陰賦性爲『田宅主』，既有雙祿吉化，又會天同化權，很自然會興起符合不動產買賣來生財的想法。


    至于大限与流年财帛宫的日用反背，与其所会的一干煞星，只是意味着，在经手买卖的房地产之间，所付出的辛劳不是如中马票似的，一宗小买卖就能大把大把的捞入巨额差价财利。


    另外也可显示，在丁未限间，诸凡经手的房屋仲介或是私下买进卖出，都比较偏向于旧房子方面，也在这种房子上获利较多，新房子成交的机会较少，所以获利就不很大。丁卯年我认为他在仲介或私下买卖方面，就是属于这种型态，同时在这两种买卖上，也有不错的成果。


    吴先生于是说道：「丁卯年中以后，房地产景气否极泰来，沉寂多年的房地产买卖，奇迹似地熟络起来。很多人买新房子，也有很多人卖旧换新。因此同样使中古屋买卖成为热门生意。这一年我的确在公司里赚到不少仲介的业务奖金，当然私下也多少赚得一些买进卖出的差额钱。很奇怪的，我就是很少赚到经手新房子仲介和买卖方面的财利。不晓得这种现象，要从什么迹象来分辨？」


    「学斗数，若不把星曜赋性与其星曜组合作用，弄得滚瓜烂熟，当然就无法分辨出其所以了。」我说。


    「那么戊辰年（一九八八），天机化忌冲大限未宫，也是流年田宅宫。流年擎羊在午宫子宫又有先天擎羊来冲这个流年福德宫位，这种流年田宅和福德宫在双重忌煞交冲之下要是再私下买卖房子赚钱不就凶多吉少了吗？」


    『這是你的看法，我的看法是，你不可能在嘗到甜頭后，把這條生財之路斷絕掉。你所說的這種忌煞凶象，在命理上，只是呈現一種較艱辛的作用。比如說，買進中古屋時，房主出價較高，賣房子時，客人還價較低，你往往要費盤口舌，才能完成一宗買賣，而不像丁卯年，買賣之間，能在皆在歡喜中完成交易。


    不過若依流年辰宮化祿，又被卯巳兩宮的祿星所輔，而流年福德午宮的《刑囚夾印》為雙祿所夾輔情況來看，我認爲你今年不只仲介傭金上收入頗豐，你在私下買賣中古屋方面，也許件數較少，但賺取差價的總金額，比起丁卯年，應有過之而無不及。貪狼化祿，又為火鈴所夾，成爲橫發的《火鈴資格》，難道你不承認今年發了？我反問。


    吳先生說：『很奇怪，今年所有經手的個案，不管新舊房子，在接洽的買賣之間，總是有些比較不順遂的問題發生，特別是在新房子的買賣方面，有些新房子的個案，原以爲能大賺一票，待完成交易后，所賺取的獎金却没多少錢。反而在中古屋方面的各種交易，的確有料想不到的好成果。但在我們公司的同仕間，却有人適得其反，應在新屋交易個案的表現上，全都有不錯的收穫。』


    『從命理上，也許可以說明這種差異的緣由。因爲你在這個限運內從事這種不動產的仲介和買賣生意，你會因命理因素，產生一種特有因應心態，這種心態，自然會反應在你的做事方法上。這個也正是我前面提起，你這幾年間，在屋房買賣和仲介方面，比較利于中古屋的原因。這個現象，并不代表你在新房子仲介或買賣方面一無是處，只能說，你在（新）與（舊）兩者之間的同樣力求表現，其成果却截然不同。』


    也許一脚踏進這個行業后，求財得利順暢無阻，他也跟很多心懷雄心壯志的年輕人一般，因此他問我，對於自行創立房地產仲介公司，在命理上的條件如何。


    他自己分析：『丁未限的丁未太陰化祿，使大限的（財）（官）兩宮成爲雙祿并明合照大限官位。雖然日月反背，經營事業可能較爲辛苦，并主事業上的競爭現象。但房地產仲介，本就是個較具競爭性的行業，當然在心態上就必須要有這種心理準備。』


    「你這些話沒錯，能將命理和實際兼顧并論，才是真正的談論命理。但從事當老板開公司，在現實考慮上，將不只限于某些資金、有些微經驗和有市場就能辦到。


    若在臺北市從事這個行業，固然市場大，但競爭也頗劇烈，公司不只要設在人潮衆多的街道上，門面也不能太寒酸。爲了擴展業務，用人更不能太少，以免勢單力薄。辦公處所講究地點，辦公廳更需講究氣派，顧用人員，更不能小貓兩三雙，光是這些必然條件，就不是小家子氣的家庭式，或玩家家酒般的小公司所能撐出門面。這些都屬硬體方面的條件，至于屬於軟體的經營方針和管理策略，以及主其事的老板，有關這方面的歷練和魄力，恐怕都不是想辦法就能解決。


    有許多當伙計很成功的人，爲了想替自己賺大錢，而當起老板，結果常適得其反，只是達到當老板的心願，但最后負責債累累而后悔莫及。


    你丁未限的這幾年間，雖然因緣際會地讓你賺了些錢，也讓你得了一些仲介買賣房地產方面的经验，但是你目前只是个伙计，私下所赚的『私房钱』，也只能说是机遇上的巧合并不代表你在这一行上已有深入而充分的了解，否则你就不会只赚中古屋钱，而在新屋和土地方面所获无多，可见你不只在经验上还须磨练，在相关的专业知识上，也有待加强，一个三十岁不到的年轻人，太想早扬名立万，常会使事与愿违。


    就命理而论，本命田宅宫七杀不会吉化，后天田宅宫又是武曲化忌，这种先后天田宅宫，也许能聚小财，但恐还难能聚雄厚资金，开起小公司，作作小买卖也许可能。但若要做入综合性的房地产仲介行业上，恐怕财力尚有不逮。在台湾开房地产仲介公司，若只做纯媒介性的仲介业务，想要赚大钱，谈何容易！我看你不会只想开纯仲介业务的公司吧！”


    另从多用作业人员来说，丁干使巨门化忌，这一个忌星，正好和先天仆役宫武曲化忌互为引动。武曲化忌成为赋性作用上的《寡宿》。这个宫位的凶象，使你难能拥有尽忠职守的员工。到时也将会如目前在公司这几年来一样的，打着公司的招牌，却作起『私房』买卖。养兵，但兵不能为你效劳驰骋于商场上，难道只靠你这个老板，就能支撑得了大门面”


    也许你会考虑在资金和人手上与人合伙经营，但你先天迁移宫太阳在亥为落陷，又有巨门化忌来冲。虽然卯未两宫有化禄并照亥宫，但亥宫的太阳终究太弱，也许能召到有意投资人，但不一定会在经营理念上和你共通。一旦合起伙来，在经营上会意见纷歧，最后不欢而散。


    另从大限迁移丑宫来看，天机居丑本陷弱，再因地劫同宫，巳宫铃星及酉宫地空来击，'
  mdcn: '## 命會空劫，半空折翅？


    ### 一個不動產仲介者的生財之道


    吳先生商專畢業，服兵役後在幾個私人公司服務過，由於高不成低不就，兩年間換了三個老板，最後總是自己拍拍屁股走路。戊辰年底經朋友介紹找我論命。


    見面時他拿出自己排好的一張斗數命盤，壁頭就問，命身會空劫星的人，是否注定一輩子在事業上，就會《浪里行舟》兼《半空折翅》的半途而廢和漂浮不定？


    那麼十月生的人，因為命身必然分坐空劫星，難道這種人也將一生下來就注定一輩子落魄不得志了？我不作正面答覆地反問道。


    『一般書上不都說，像我這種財官兼命身宮都會空亡星的人，會一輩子萍踪無定，事業無成嗎？』這個年輕人，引經據典的提了他的論點。


    在古賦文上，對這兩顆星，的確有這種賦性方面的解釋，但它的賦性作用，并不只是表現在這方面。這兩個空亡星另有屬『玄學』方面的作用，因此一個命格會空亡的人，只要他格局好，往往都是『想像力』極爲豐富的人。有很多科學家、思想家、宗教家，這些亟需憑豐富想像力的人，常在命格上會坐空亡星，也因此才會有他們的輝煌成就。據個人所知，當代的幾位命理界高人，也都是屬於這種命理格局。吳先生會涉獵命理，理論上，也和此空亡星有關呢？


    | 鈴星 | 天右巨<br>餓弼門 | 文天廉<br>曲相貞 | 天梁<br>祿 | 文七<br>昌殺 |

    | :--- | :--- | :--- | :--- | :--- |

    | 乙<br>巳命宮 6-15 | 庚<br>午父母宮 16-25 | 辛<br>未福德宮 26-35 | 戊<br>申田宅宮 36-45 | |

    | 食<br>狼 | 吳先生<br>壬<br>寅<br>男命<br>六月×日寅時<br>一九六二年 | 地<br>空<br>癸<br>酉事業宮身宮 | 陀<br>羅<br>庚<br>戌僕役宮
    | |

    | 甲<br>辰兄弟宮 | 火<br>六局 | 癸<br>卯夫妻宮 | 武<br>曲<br>忌 | |

    | 天紫<br>府微<br>機 | 地<br>劫<br>癸<br>丑財帛宮 | 擎<br>羊<br>壬<br>子疾厄宮 | 破<br>軍<br>辛<br>亥遷移宮
    | |

    | 壬<br>寅子女宮 | | | | 太<br>存<br>陽<br>禄 |


    命宮會空劫，身居事業宮地空同踞，據古賦文解這種人一輩子的事業表現將會波動不穩——浪里行舟或半空折翅。若真是如此，十月份生人，命身宮必然和空劫同宮，豈不是全都很糟。這個命倒謹提出這種命格在理論探討上的另一種看法。


    畫信書，不如無書。許多書上對星曜賦性闡釋不完整，實在害人匪淺。我經常碰到一些年輕朋友，有這種星曜作用方面的誤解和誤用。


    若以吳先生這個命身格局架構而論，在聰明才智上應該屬於聰穎靈敏的人，腦筋動得快，有如天馬行空，缺點則是難免會有趨于不着邊際的幻想成分。好在他還有左右兩星輔佐，尚下至于凡事都墜入憑空想像。因此從這個組合上來看，他還是個既能想像，也能力行的。


    那么爲何在二十三、四歲間的近兩年里，總是沒一個地方能待上一年呢？[1] 他問。


    丙午限先后天會化權，也是他服完兵役踏入社會做事的起初階段。這種權星的作用，運也會寅宮的紫微先天化權。


    大限本宫廣貞化忌，會上大限事業宮武曲化忌，正好成爲雙忌之下的（財與囚仇）。一個初出茅廬的小伙子，作事的能力和經驗尚待磨練，自然只能找到一個從基層干起的職員差事，職重薪高的職位，自然輪不到他。這種現實和理想的重大差距，自然不能使他安于職低薪少的工作。他也就常因此而另謀高就，希望有朝一日能鳳栖喬木了。


    那么以我的命理條件來說，我最好走上那一行呢？[2] 他又問。


    在能力充分發揮。


    我說：「這種命格和行運，若能從事一種半帶外動的服務業，將會使你命理的最大潛


    『為什麼要外動又要帶服務業呢』


    『命身會坐空亡，既然有《浪里行舟》的作用，因此你應該不是一個只安于枯坐辦公廳，天天準時朝九晚五上下班的人。何況進入丁未大限后，大限田宅宮武曲化忌。田宅會忌煞的人，也會呈現不耐整天困守于案牘勞形。」


    丁未大限丁干使太陰化祿，這一個祿星引動他先天遷移亥宮的祿存，成爲三祿拱照。


    亥宮又是丁未大限的事業宮，因此這個亥巳，不只主大限事業的吉利，也是象徵着他在事業方面，若能帶有外動並且愈困難又競爭的差事最爲有利，所謂『亂世出英雄』即是也。


    至于服務業，先天財帛丑宮天機坐會空亡，并有鈴星三煞來冲，主勞心之財。后天財帛卯宮，太陰化祿和火星同宮，也會西宮地空冲照，求財性質幾與丑宮相似。這種星曜組合的財帛宮，异于一般投資生財，買賣業得利，也非以錢滾錢的投機財。


    基于命理上的這些條件，我作上述的這種論斷。不過命理理論雖是如此，并不代表他必然會走上這一條路，只能說，若他能走上這條途徑，應該比較有利，成就也會比較高。


    吳先生說，就在丙寅年里（一九八六）的一次機緣，他進入一家專門作房地產仲介生意的公司服務，這個行業，正好應上繁忙社會的需要，不只使買賣雙方各得其便，也同時造就了不少的就業人口。


    吳先生接着問道：『從事這個行業，能有利可圖嗎？丙午大限（財與囚仇），丁未大限雖會三祿，但日月反背，豈不是除了紙袋中極微薄的薪水，還有什么厚利可圖？』


    『我不認爲你在丙寅年進公司后，會很安份的只圖上班領薪水。』


    『當然，業績好，公司也會另發獎金，因爲這種行業底薪都不高，一般業務人員常有獎金可得。』吳先生補充的回答道。


    我還是不以爲然的說道：『丙寅年二十五歲，大限還在午宮。這年天同化祿，流祿在巳官，流年在午宮，使午宮成爲雙祿所輔，但同時也因廉貞化忌而成爲《刑囚夾印》格，流年財帛戌宮，也是雙祿夾煞格。流年的福德辰宮，和大限福德申宮，不只是都被雙祿所輔，又成《昌貪》。在多重的吉象和《離正位而顛倒》的作用下，我不認爲在你經手仲介買賣所賺取的傭金，會全部交給公司，再從中領取獎金。』


    『那年的確有幾個小 Case（個案），是我直接介紹給雙方的買賣客戶。由於服務到家的也給雙方客戶省了不少錢，因此雙方客戶，都曾經另給酬勞。』這個年輕人，總算說出了事實：『丁卯年（一九八七）中以后，由於房屋景氣復蘇，不只買新房子的人增多，買賣舊房子的人，也跟着多起來。委多房地產仲介公司大發利市。一些腦筋動得快，又有資金來源的業務人員，也常會相機行業，私下買進房子再賣出賺差額，公司方面，只要每個月有要求的業績交代就可打發。您覺得像我這種行運，丁未限的田宅宮武曲化忌并陀羅，有可能在類似自行買進賣出，來賺差額錢財嗎？』


    這個年輕人，不是來問命，簡直是在考算命先生。像這類『考』的客人，偶而也會碰到其中以略懂命理皮毛的人居多。我既然敢打着業余論命的招牌，就不擔心來客提出什麼問題。只是對這種只學一招半式，就想找人套招的年輕人，有時難免在談命說理上保留三分。


    丁未大限坐先天福德宮，天機化祿。丁干使太陰化祿會后天福德酉宮。這兩個先后天的福德宮，根據其三方四正的星曜組合來看，巨額資金也許沒有，但買賣老舊房的較少資金，再加上調頭兩周轉運用的能力，還是勉強可行。


    另后限運的福德宮的天同化權會太陰化祿，也會使他激起積極求取財利的心理。這些命理條件，會在一個適當的現實機運下，發揮其潛在的本能。因此我認爲，他在這一兩年間——丁卯和戊辰年，應該也會和其他業務人員一樣，打着公司的招牌去賺取額外的私利。


    『丁卯年財帛宮在亥，太陽落陷，流年雖變化祿，但也坐日月反背宮位，流年福德巳宮人財利。』


    不只巨門化忌，也坐怎么可能賺到這種錢』這個年輕人，不知道是心有疑惑，或者明知故問，但問題却頗言之成理。


    丁年流祿在午宮，這個祿星，不只使流年田宅宮吉化，也照會大限田宅戌宮。流年本宮大陰變化祿，不只是大限的財帛宮，太陰賦性爲『田宅主』，既有雙祿吉化，又會天同化權，很自然會興起符合不動產買賣來生財的想法。


    至于大限与流年财帛宫的日用反背，与其所会的一干煞星，只是意味着，在经手买卖的房地产之间，所付出的辛劳不是如中马票似的，一宗小买卖就能大把大把的捞入巨额差价财利。


    另外也可显示，在丁未限间，诸凡经手的房屋仲介或是私下买进卖出，都比较偏向于旧房子方面，也在这种房子上获利较多，新房子成交的机会较少，所以获利就不很大。丁卯年我认为他在仲介或私下买卖方面，就是属于这种型态，同时在这两种买卖上，也有不错的成果。


    吴先生于是说道：「丁卯年中以后，房地产景气否极泰来，沉寂多年的房地产买卖，奇迹似地熟络起来。很多人买新房子，也有很多人卖旧换新。因此同样使中古屋买卖成为热门生意。这一年我的确在公司里赚到不少仲介的业务奖金，当然私下也多少赚得一些买进卖出的差额钱。很奇怪的，我就是很少赚到经手新房子仲介和买卖方面的财利。不晓得这种现象，要从什么迹象来分辨？」


    「学斗数，若不把星曜赋性与其星曜组合作用，弄得滚瓜烂熟，当然就无法分辨出其所以了。」我说。


    「那么戊辰年（一九八八），天机化忌冲大限未宫，也是流年田宅宫。流年擎羊在午宫子宫又有先天擎羊来冲这个流年福德宫位，这种流年田宅和福德宫在双重忌煞交冲之下要是再私下买卖房子赚钱不就凶多吉少了吗？」


    『這是你的看法，我的看法是，你不可能在嘗到甜頭后，把這條生財之路斷絕掉。你所說的這種忌煞凶象，在命理上，只是呈現一種較艱辛的作用。比如說，買進中古屋時，房主出價較高，賣房子時，客人還價較低，你往往要費盤口舌，才能完成一宗買賣，而不像丁卯年，買賣之間，能在皆在歡喜中完成交易。


    不過若依流年辰宮化祿，又被卯巳兩宮的祿星所輔，而流年福德午宮的《刑囚夾印》為雙祿所夾輔情況來看，我認爲你今年不只仲介傭金上收入頗豐，你在私下買賣中古屋方面，也許件數較少，但賺取差價的總金額，比起丁卯年，應有過之而無不及。貪狼化祿，又為火鈴所夾，成爲橫發的《火鈴資格》，難道你不承認今年發了？我反問。


    吳先生說：『很奇怪，今年所有經手的個案，不管新舊房子，在接洽的買賣之間，總是有些比較不順遂的問題發生，特別是在新房子的買賣方面，有些新房子的個案，原以爲能大賺一票，待完成交易后，所賺取的獎金却没多少錢。反而在中古屋方面的各種交易，的確有料想不到的好成果。但在我們公司的同仕間，却有人適得其反，應在新屋交易個案的表現上，全都有不錯的收穫。』


    『從命理上，也許可以說明這種差異的緣由。因爲你在這個限運內從事這種不動產的仲介和買賣生意，你會因命理因素，產生一種特有因應心態，這種心態，自然會反應在你的做事方法上。這個也正是我前面提起，你這幾年間，在屋房買賣和仲介方面，比較利于中古屋的原因。這個現象，并不代表你在新房子仲介或買賣方面一無是處，只能說，你在（新）與（舊）兩者之間的同樣力求表現，其成果却截然不同。』


    也許一脚踏進這個行業后，求財得利順暢無阻，他也跟很多心懷雄心壯志的年輕人一般，因此他問我，對於自行創立房地產仲介公司，在命理上的條件如何。


    他自己分析：『丁未限的丁未太陰化祿，使大限的（財）（官）兩宮成爲雙祿并明合照大限官位。雖然日月反背，經營事業可能較爲辛苦，并主事業上的競爭現象。但房地產仲介，本就是個較具競爭性的行業，當然在心態上就必須要有這種心理準備。』


    「你這些話沒錯，能將命理和實際兼顧并論，才是真正的談論命理。但從事當老板開公司，在現實考慮上，將不只限于某些資金、有些微經驗和有市場就能辦到。


    若在臺北市從事這個行業，固然市場大，但競爭也頗劇烈，公司不只要設在人潮衆多的街道上，門面也不能太寒酸。爲了擴展業務，用人更不能太少，以免勢單力薄。辦公處所講究地點，辦公廳更需講究氣派，顧用人員，更不能小貓兩三雙，光是這些必然條件，就不是小家子氣的家庭式，或玩家家酒般的小公司所能撐出門面。這些都屬硬體方面的條件，至于屬於軟體的經營方針和管理策略，以及主其事的老板，有關這方面的歷練和魄力，恐怕都不是想辦法就能解決。


    有許多當伙計很成功的人，爲了想替自己賺大錢，而當起老板，結果常適得其反，只是達到當老板的心願，但最后負責債累累而后悔莫及。


    你丁未限的這幾年間，雖然因緣際會地讓你賺了些錢，也讓你得了一些仲介買賣房地產方面的经验，但是你目前只是个伙计，私下所赚的『私房钱』，也只能说是机遇上的巧合并不代表你在这一行上已有深入而充分的了解，否则你就不会只赚中古屋钱，而在新屋和土地方面所获无多，可见你不只在经验上还须磨练，在相关的专业知识上，也有待加强，一个三十岁不到的年轻人，太想早扬名立万，常会使事与愿违。


    就命理而论，本命田宅宫七杀不会吉化，后天田宅宫又是武曲化忌，这种先后天田宅宫，也许能聚小财，但恐还难能聚雄厚资金，开起小公司，作作小买卖也许可能。但若要做入综合性的房地产仲介行业上，恐怕财力尚有不逮。在台湾开房地产仲介公司，若只做纯媒介性的仲介业务，想要赚大钱，谈何容易！我看你不会只想开纯仲介业务的公司吧！”


    另从多用作业人员来说，丁干使巨门化忌，这一个忌星，正好和先天仆役宫武曲化忌互为引动。武曲化忌成为赋性作用上的《寡宿》。这个宫位的凶象，使你难能拥有尽忠职守的员工。到时也将会如目前在公司这几年来一样的，打着公司的招牌，却作起『私房』买卖。养兵，但兵不能为你效劳驰骋于商场上，难道只靠你这个老板，就能支撑得了大门面”


    也许你会考虑在资金和人手上与人合伙经营，但你先天迁移宫太阳在亥为落陷，又有巨门化忌来冲。虽然卯未两宫有化禄并照亥宫，但亥宫的太阳终究太弱，也许能召到有意投资人，但不一定会在经营理念上和你共通。一旦合起伙来，在经营上会意见纷歧，最后不欢而散。


    另从大限迁移丑宫来看，天机居丑本陷弱，再因地劫同宫，巳宫铃星及酉宫地空来击，'
