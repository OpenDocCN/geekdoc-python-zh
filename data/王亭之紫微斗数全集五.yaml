    # # 三奇嘉會，必主大發？


    ——一個期貨炒作者的命理格局


    丁卯年春節過後不久，我又到高雄公差，晚上造訪了無居士么弟府上。他好茶道，經常備有各種名貴茗茶。與同好飲佳茗閒聊，也是人生一大樂事。因此一有南下之便，常會乘空叨擾。


    待我到黃府時，已經有位年輕朋友在座，略經介紹寒暄后，這位朋友拿出一張斗數命盤來，說是要問我請教。但言談語氣中，卻帶有一般年輕小伙子所具有的表面客氣，卻滿懷自信的心理。原來這位洪先生，近年來眼看着不少朋友，經由炒作期貨，短期間斬獲甚豐，因此他也雄心勃勃、躍躍欲試，常偷空到朋友的期貨公司了解狀況。經過幾個月的摸索研究，他已有相當信心，認為大可下場一搏。他認為這種可大發橫財的捷徑，不好好發它幾票，更待何時？


    黃先生指着命盤對我說：『丁卯年二十九歲，流年和火限重疊。因丁干使太陰化祿，天同化權，天機化科，巨門化忌。雖然今年行入雙重《三奇嘉會》的卯宮，也許意味着他在工作表現方面的吉象，若是想要炒作投機性質的期貨來賺錢，因限運的財帛亥宮，有巨門雙化忌，並會未宮的羊鈴和巳宮的陀羅，恐怕會偷雞不成，反蝕把米。所以我極力勸他，千萬別去作這種橫財夢。只是他財迷心竅，自信滿滿，準備就在今春大揮一番。老朋友勸阻


