    假定有人仍然認定股票一定可以依「五行」來分類，那么不妨查看報載每天刊登股票漲跌行情表。是否凡是相同屬金、屬木、屬水、屬火、屬土的股票都同時漲或是同時跌？假設沒有，就可以證明，利用五行來歸類股票，就是一種毫無道理的鬼扯談。


    「我曾經詳細看過報載的這種股票行情表，五行五行同有股票，毫無這種同漲或同跌的跡象。『東樵居士又問道：『報載里提到，己巳年命宮在西有文曲坐守，文昌在財帛宮。因為文曲和文昌這兩星在票據、證券、文書這些方面影響較大，所以可以論財』這個說法是否正確？


    在星曜賦性上，「文昌」謂之「文桂」，「文曲」謂之「文華」，皆主聰明才智，但也論及文書之類沒錯，但若硬是把它說成票據、證券、和屬於股票類，似乎有牽強之嫌。


    前面已說過，只要排盤的月份是正月，時辰是己時，命宮一定坐文曲，財帛一定有文昌。也因這個原因，所以這一類的高人才會據以斷定，臺灣的股票，必然可以根據這個命盤。


    208'
- md: '## 推論


    在斗數命理里，雖然常用星曜有三四十顆之多，但在論斷時，通常依作用程序，分成甲、乙、丙三個等級來推論。（也有用到一百多顆者，又分為甲、乙、丙、丁等五級）。通常以

    **甲級星曜**（如紫微系列和天府系列共十四顆星）為格局架構的主干，其次配合六吉星（魁、鉞、昌、曲、左、右）和煞、空、劫再檢視衆多星曜所構成吉凶格局，作為推論依據。

    六吉、煞、乙等星級，它的個別賦性作用并不頂強烈。必須配合其他星曜作用才能凸顯特殊作用，并不可以據單一星曜來推論，比如某個宮位有某顆星曜，它必然會顯示什麼？


    很遺憾的，這種錯誤觀念，很普遍地被接受，也被某些大師極力推廣。最糟糕的，還有不少高人用此錯誤觀念，大量出書禍害後學。與人論錯命，只影響一個人，但錯誤的論著，卻會害慘有心於學習斗數命理的很多人。著書立說是千秋大事，因此下筆之時，實在不能不加慎重嚴謹了！


    『那麼報載「紫微斗數說：諸凶作祟會破一文」里的那些說法是否正確？』東樵居士問我的看法是，結果是否正確并不重要，重要的是所引用的理論是否可信。凡是通不過驗證——反復試驗的理論，便不足取。


    『您似乎反對用斗數命理來探討股票問題？』東樵居士說。


    我對東樵居士說：命理是用來探討人生百態，買賣股票也是百態中的一項求財之道。討論並無妨礙，但是立論根據必須正確也合乎道理，并能通過邏輯上的驗證，且百試不爽，才能成為定則。因此我更強調利用命理來探討任何一件事，不管是口說或立文成章。對於尚未成熟的立論應該秉持著學術良知確實探討命理運用的真象；若是有其他的目的，他的學術必然被私欲所表現，他的學術成果也就堪慮了！


