    徵信報，五十四年五月十六日二版

    至陰，『陣雨』與昨日天氣完全相符。王氏這次天氣預測是在本月六日咨封交由臺灣電視公司保管，至昨天下午給拆封，證實王氏以科學方法預測天氣與事實相符。而哲學組以易經、斗術推算昨天的天氣是：「晴多雲、高溫、午后三時至五時有點雷雨」，與昨日天氣稍有出入。

    這項科學與哲學預測天氣的比較，在相互融洽的氣氛下已得到結論。氣象專家王崇岳對這次預測天氣表示：「氣象學研究是根據科學與數理推算，他說，他不甚了解可用命理、斗數等方法算出天氣。


    # # 徵信報,民國五十四五月七日第三版

    ○各憑學問，互較短長，哲學對抗科學，陰陽五行登場

    十五日天氣如何，準不準過后方知


    [本報訊]三保學術研究中心哲學組，于六日在記者會中預測本月十五日臺北市的天氣是晴多雲，午后三時至五時有輕雷，東部有陣雨，也是本月氣溫最高的一天，而以科學方法預測氣象的王崇岳對這一天的預測則密封交由臺灣電視公司保管，將于十五日公布，屆時，可以看到用哲學與科學方法預測天氣的比較了。


    根據易經原理來預測天氣的哲學組命理家有陸致、李百年、陳易庵、王德董等人。代表科學預測氣明的王崇岳教授則根據過去七十年來的氣候紀錄，配合統計數學的原理來計算當日的天氣。他認為，天氣預測可以確定某一天的天氣概况的。他并預測民國七十五年十二月十三日有冬秀臺風。


    原子科學家李熙謀博士在記者會中說，科學上的預測應該有百分之百的把握才作定論，雖可作大膽假設，但必須小求證。他說，參加三保學術研究中心的科學家們是對哲學命理的研究抱着學習與了解的態度。

    李熙謀博士又說：即使這次以科學計算來預測天候的王崇岳教授，對他的研究，目前似仍在實驗階段。王教授則點頭承認李博士的觀點。


    哲學組的陳易庵表示：他們以易經及陰陽五行的數理推算天候，只是與科學上方程式的推理作一個比較，有游戲性質，但希望藉此溝通哲學與科學之間的思想。

    『推背圖』和『燒餅歌』，是用來預言后代王朝的遞延變化。在中國傳統的意識思想里，一直認為有某些道通天地的高人，可以預知天機不可泄露的任何天下大事。因此這種人自然可以了解一個王朝的興衰起伏和改朝換代底事。這兩則預言，諒必在這種思想觀念托附下而衍生。

    而『氣象預測』，卻是國人認為根據易理和陰陽五行學說，就可以推演有不測風雲的氣象變化。也許這些老祖宗傳下的學術，有它的道理和通用範圍，但能否據以推測天候變化實在令人存疑。


    在科學的領域里，有所謂的『大膽假設，小心求證』一言。但這個『大膽假設』絕對不是隨便意識過度膨脹的『假設』，我們實在無法了解，這些老前輩們，如何運用易經和陰陽五行數理來推演氣象。要是把『假設』定在道理不通、理論欠明的觀念上來推演，實在很難使人置信，類似這種推論，能有什么正確答案。

    「那您根本否定老前輩的這種星象觀念了」

    否定，我不敢。但我更肯定要有正確的星象觀念，我肯定易數之學有它的特定功能，而這些功能都可以經得起千錘百煉的驗證。利用螺旋槳推進器，可以使飛機上天空，但不可能飛上太空。不明真正道理地妄加相信，就是愚昧，這個觀念很重要。'
