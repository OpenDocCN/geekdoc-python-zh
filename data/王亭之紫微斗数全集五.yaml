    這種傾向。李大娘，處在當時大家樂、六合彩賭風盛行的社會里，就很難不受誘惑。


    而天同大限化權，經先天太陰化權强化后，使她在這個限運里，讓她的意識心態上，會


    凸顯出極爲强烈的一意孤行性格。


    另從大限財帛丑宮，除了雙忌雙煞冲會以外，打從第一個庚申大限到第四個丁巳限運


    ，每限天干化忌星都冲擊着丑宮，待入丁巳限時，這個宮位出現的凶象作用會格外劇烈。


    李大娘在這個限運下，一來生意收入豐足有余，再因所處環境正逢賭風熾烈，近朱者


    赤，近墨者黑，何況她先天既有這種賭性，又配合限運所行的命理迹象。


    久賭必輸。李大娘初期只下賭注，繼而當起莊家，玩起上十萬、百萬元的輸贏游戲。


    賭徒的性格，輸得越多，下的賭注越大，一旦沉迷，就有如鬼魂蒙住心竅。因此她會把


    黃先生的告誡，聽如馬耳東風。


