    命身宮同坐“水死木敗”的“巨機”在西，依古傳論說一輩子單求生活安定的希望恐怕都不可得。但這個命造却在辛亥大限間，不只廣置不動產，也因事業得利甚豐，更因理財得法，以致財源滾滾。

    本文如是我說，提供閣下參考。


    但巳宫有陀罗同宫，不是应该判作多折磨、暗耗，有损于求财得利吗？周先生问。


    羊陀是否为害同宫的甲级星，得视同宫这些星曜的庙陷和禄忌（权科亦同）而定。未

    宫的太阴若化忌又有擎羊同躔，则成为（人离财散）的凶格。但唐小姐的这个太阴化禄逢

    擎羊，它的组合作用，就适得其反，而大吉大利了。


    种暗中生财的特殊格局。


    同样道理，陀罗在巳和天同化权同宫，使陀罗成为（制煞为用），不但不为害，反成一

    先后天这两个财帛宫位，正是使唐小姐，在行人辛亥限后，能求财得财、求利得利。当

    然这种由煞星构成的财帛宫，在生财之道上，也有她辛苦的一面，倒不是长袖善舞型的，全

    部用钱滚钱的方式去生财。


    唐小姐咧着嘴笑道：「没有啦，我一直在一家一个老板一个伙计的广告公司上班，那

    能赚什么大钱」


    「真人面前不说假话，你得老实招来，要不然你别想讨教什么问题。」周先生瞪着她

    说道。


    唐小姐于是说，她几年来在一家由一位体育界名人开的广告公司工作，老板还有他的

    班要上。她平常无事可做，经常窝在家里睡大觉，但遇到有国际性或全国性的体育活动，

    公司的业务就来了。老板争取生意，再把业务交给她全权处理。这个公司就在一个老板

    一个伙计的一搭一唱之下，先由国内的业务做起，渐扩展到东南亚。台湾的体育活动伸入

    大陆后，她们的生意也跟着做到北京城。


    这种广告生意，老板有其特殊管道，经常可以顺利接到业务，因此她就常为着场地的广告规划、广告厂商招揽、广告板的制造、电视广告播出的接洽，而跑遍相关行号厂商、电视台和运动场。东南亚几个常办国际体育活动的场地，她都跑过。


    这种业务形态，公司有时会好几个月如同停业，有时业务接踵而来，忙得她如同转个不停的陀螺。「老板这几年，的确赚了些钱，不过我拿薪水，那儿是吃什么三年。」


    「你大概不会只有干薪收入吧？」我不以为然地问道。


    唐小姐说，当一个生意完成，老板在嘴笑眼笑时候，犒赏几个业务奖金打发，也是常有的事，当伙计也只能得些血汗钱。


    我接着说，「从命盘上的显示，你该不会只有单纯的薪水和什么有限的业务奖金，应该还有更丰富收入才对。因为辛亥大限，不只使先天命宫巨门化禄，也使先后天的财帛宫都化禄。」

    无天的太阴化禄为你后天的财帛宫，大限辛干引动巨门化禄会先天财帛巳宫。这种先后天财宫的吉化——禄里的双重作用，正是意味着在财利方面，有一股强大力量会驱使你全力以赴地鞭策作用，因此你在这种业务工作上，应该还有更丰富收入才对。


    唐小姐支吾其词，不肯说。不过以如前所述「太阴化禄会擎羊」和「火羊」这种横发资财，又加上「陀罗天同化权居财位」这种组合架构，当然会有某些不足为外人道的财得

    機會。但她有這種能力和機會去賺它，不賺豈非白白損失，何況還是需要付出相當辛苦代價才能得來。


    周先生又不甚其解地問：「大限亥宮和巳宮，正好成爲『馬逢空亡』終生奔馳，以及天馬陀羅諸事不順的『折足馬』，會有好財利收入嗎？」


    這兩個格局的確使她在這個限運里，常有馬不停蹄的奔勞之苦，也許這正是使她跑遍國內和東南亞，甚至到大陸去作廣告的原因。這種限運或命格若是在職業性質上，去因應命理上的這種特質，在工作表現往往會有正面的成果。很多從事事業和航海航空人員，都具有這種馬逢空亡的格局。也因命帶這種格局，才能適應長年奔波漂泊的生活。因此唐小姐在這個限運內，進這家公司，做這種性質的業務，才能真正的走在鴻運的大道上。


    周先生又提出問題說道：「若由唐小姐在這幾年買那么多房子來看，應該還有其他的生財之道，否則無法辦到。能否從命盤上看出，她究竟還有什么特殊的法力，好像賺錢都很容易似的，揮手即來。」

    時間嘛！


    唐小姐說：『沒有啦！公司沒事時，偶而也跑跑股票市場，買幾張股票玩玩，消遣打發為消遣跑號子去買股票玩玩，只有既有錢又有閑的人，才能當稀松平常的玩意兒來干。周先說，他偶而也買幾張股票，但常爲漲跌停板，因輸贏而搞得晨昏難安。難道唐小姐在股票方面也鴻運當頭，財利不絕？''


    「像唐姐這種先后天的財帛宮架構，與其化星引動吉象，就會激起她在能力範圍內開辟財源。這幾年來，臺灣股票由指數二千多點，飛漲到一萬出頭，若有閑錢又有意願的人都會投入股票市場。她也就在這種情形下買賣股票，至少在命理和現實條件上，應該是很正常的事。」我說。


    「但買賣股票不是贏就是輸，這兩三年來，固然造就了不少股票大發新貴，可也有不少人賠掉了家產。如唐小姐近種限運條件，可能在股票上得利嗎？」

    我說，股票買賣的得失，除了看限運本宮外，還需重視「財」、「福」兩宮，要有吉入為佳。唐小姐的大限財帛宮吉象呈前述，福德宮雖然是空宮，但是有雙祿會照。西宮的先天巨門化忌，没和大限文昌化忌交會，因此凶性不大。所以她在這幾年買股票，贏的機會較多。


    若由「財」、「福」兩宮會照的羊、陀、忌和雙化權星來合加并論，她在買股票方面，輸贏都不會戀棧難割舍。當也她遇上后市看好時，她會見好即收，因此不會因太貪大利，最后有反被套牢之苦。若是不巧買進看跌的股票，她也會忍痛割捨，因此也不會損失太多。她有她一套股票經，也許在旁人看來并不足取，但她的這套買賣方式，應該讓她在股票方面也頗有斬獲。


    「沒有啦！股票兩三年，只賺個幾百萬，還不如大户一次漲停板所賺的，像我這種小買賣那能賺了大錢」唐小姐說。


    周先生笑着说：『几百万元是小钱，那要什么才算大钱呢？』

    我接着说道，若这种带有投机的金钱游戏，唐小姐应该还有其他玩得更大项目才对。

    先后天的羊陀和化权进入财帛宫，就可能玩上更大的金钱游戏。三年赚几百万元是小意思，那唐小姐必然还有其他更大金钱投注。


    『还是从实招来吧』周先生语带调侃的说道。


    『没有啦！这几年，偶而也透过一位在外国银行作事的朋友，买卖外币，赚赚利息和汇率差额而已，是多少赚了点钱，但也不多呀』唐小姐终被周先生一样样地掏出她的生财之道。

    据唐小姐说，近年来英磅因英国景气关系，不但币值率常有大起伏，而其利率奇高。因此一些有资金的玩家，除了玩股票之余，也会把钱投入英磅上，德国的马克也有人介入只是企求得利的方法略有不同而已。


    这种外汇的投注得失，有时也跟股票的输赢，同样会使人高兴得如飘上云端，当然也会有掉入万丈深渊的痛苦。虽然在介入资金前，都会从技术面分析再分析。但有时人算不如天算，上百万元的资金，常会在几天中，眼睁睁的看它流失而跺脚不已，唐小姐把外汇炒作的情况约略作了解说。


    『原来我们这位大小姐，的确是生财有道，否则我才不相信，你只在那个麻雀似的两家公司，就会有这么好的收入，让你一年接着一年的买房子。』周先生吁了一口气接着又

    說道：『那麼從唐小姐的限運上來看，她這幾年在投入金錢遊戲方面，該是春風得意，財源滾滾了』


    我看了命盤后回答說，那也不盡然，唐小姐在戊辰年若是在外幣上，有過較大金額的投入，而且若不肯認賠，可能到現在還在被套牢中。

    『唉！晦氣得很～被套牢了，到目前約虧損了三四百萬。』唐小姐嘆了一口氣說道。


    『那麼凶嗎？』周先生隨口問說。


    戊辰年天機化忌沖大限福德丑宮。流羊入流年福德午宮，文昌大限化忌會午宮。擎羊因文昌化忌，除了忌煞引動午宮成為忌煞凶象以外，也使擎羊和武曲因忌星引動，而成爲『因財持刀』的劫財格。若把忌星作陀羅用，也使午宮成爲『鈴昌陀武』凶格。


    大限福德宮會有雙忌（天機及巨門化忌）和未宮擎羊逞凶，流年福德宮，又是雙重凶格，她若投入大筆資金于這種投機的金錢遊戲上，恐怕貪不到便宜。尤其是，這一年特別會逞凶在外幣的炒作上風險最大。


    『正是如此，去年以英磅存進銀行，打着既賺利息又賺匯率差額算盤。若按照以往的經驗，獲利應該比股票好且穩當。沒想到，錢投入后，英磅大跌，真是損失不少，直到現在還套牢着。有時想認賠算了但又不甘心，所以一直耗在那里，想來就心痛』唐小姐心有不甘心地訴說道。


