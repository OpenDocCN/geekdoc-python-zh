    這位王先生于丁卯年（一九八七），『大家樂』賭風盛行的時候，也財迷心竅地壓了一陣寶，結果正是偷鷄不成，反蝕了一大把米。年紀輕輕的就輸掉五十萬。


    吳先生問說：玩『大家樂』和其後盛行的『六合彩』嚴格講起來，也算賭博嗎？


    應該把下賭注，憑賭技，靠運氣來輸贏金錢或彩金的游戲，全部包括在內。因此諸如臺灣的六合彩、大家樂、澳門瓣賽馬和賽狗、東南亞地區的玩斗鷄，英國大選每逢保守黨和工黨競爭得難分軒輕時，賭博公司便會乘機公開舉辦猜測那黨輸贏和可能得到多少國會議員席次的賭注。參加這種游戲的人，都要下賭金。最後半靠主觀與半靠運氣，輸掉賭注或是贏得彩金。這種金錢輸贏，和領取薪資酬勞或投資紅利報償性質截然兩樣。


