    # # 星象幻术、入侵股市

    ### 紫微斗数：明天崩盘；奇门遁甲：申至长红


    [记者李文雁/台北报导] 种种星象幻术的至虱已侵入股市，紫微斗数与奇门遁甲将在九七大对决，连日来股市已陷入明显的低潮。


    紫微斗数派预测股市将在九月七日崩盘，相信此道的散户急慷慨记退出改作观望，相反的部分投资人则表示，此无非与香港『九七』大限的数字作悲观的联想，没有道理认同；他们表示，天下没有这种巧合。


    另外一派奇门遁甲人士提出反击，力称九七股市将收中红到长红，此派人士指出，其预测是根据财政部长郭婉容的生辰八卦算出的，九七股市势必收红是有道理的。此外，为打击紫微斗数，必要时，将发动『五千弟子』声援。


    尽管众说纷云，可信度也顿值得怀疑，但是，投资人在『宁可信其有，不可信其无』的心态下，已多少受到传染。事实上，包括各种技术分析亦经常出现分歧的看法，所以，九七的预测最后仍有待事实证明，投资人得小心斟酌。


