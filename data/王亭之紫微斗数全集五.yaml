    大陆后，她们的生意也跟着做到北京城。


    这种广告生意，老板有其特殊管道，经常可以顺利接到业务，因此她就常为着场地的广告规划、广告厂商招揽、广告板的制造、电视广告播出的接洽，而跑遍相关行号厂商、电视台和运动场。东南亚几个常办国际体育活动的场地，她都跑过。


    这种业务形态，公司有时会好几个月如同停业，有时业务接踵而来，忙得她如同转个不停的陀螺。「老板这几年，的确赚了些钱，不过我拿薪水，那儿是吃什么三年。」


    「你大概不会只有干薪收入吧？」我不以为然地问道。


    唐小姐说，当一个生意完成，老板在嘴笑眼笑时候，犒赏几个业务奖金打发，也是常有的事，当伙计也只能得些血汗钱。


    我接着说，「从命盘上的显示，你该不会只有单纯的薪水和什么有限的业务奖金，应该还有更丰富收入才对。因为辛亥大限，不只使先天命宫巨门化禄，也使先后天的财帛宫都化禄。」


    无天的太阴化禄为你后天的财帛宫，大限辛干引动巨门化禄会先天财帛巳宫。这种先后天财宫的吉化——禄里的双重作用，正是意味着在财利方面，有一股强大力量会驱使你全力以赴地鞭策作用，因此你在这种业务工作上，应该还有更丰富收入才对。


    唐小姐支吾其词，不肯说。不过以如前所述「太阴化禄会擎羊」和「火羊」这种横发资财，又加上「陀罗天同化权居财位」这种组合架构，当然会有某些不足为外人道的财得'
