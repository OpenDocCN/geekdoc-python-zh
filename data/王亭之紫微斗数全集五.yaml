    \n另外在雙重的命身〈殺破狼〉和〈昌貪〉三種格局上，表現出他作事的能力、條理與足\n\n138\n\n# 智多謀。\n\n一般領薪水的上班族，很多人都會犯得過且過，不積極、不負責的毛病。但這位廠長先生，在公事表現方面，主動負責、不條不紊、并且善盡職務。所以他能得老板的提拔委以重任，并言從計聽，不是没有道理。命理上的諸多因素，又能讓他在得其所哉的機緣里充分發揮，當然會使他表現出潛在的能力。\n\
    \n至于他在職權上某些太為私利的作爲，除了前述的某些命理因素以外，還有當他行入先天財帛宮的丙午大限，正好讓他命理上的一些特殊格局，得到充分發揮的機會。\n\n\
    丙午大限，丙干使天機化權，廉貞化忌。天同化天化權，作用到丑宮后，知天機化權輔先天福德子宮。子宮的紫微星會左輔和右弼，又經雙權夾輔時，帶座的星賦力道大彰。福德宮可以看出對財富需求和處理的基本心態，有此紫微權化坐守，對財利欲求心理大增。若把這個官位再和《鈴貪》《昌貪》合并論斷，豈不更可說明，他在丙午限時，會有利用職權去大搞其私利的現象。\n\
    \n至于擅用職權去賺這種錢財，也可以用大限廉貞化忌，會冲先后天福德宮來解說。廉貞爲囚星，遇化忌會出現不是光明正大的賦性作用。會福德宮，正好引動他產生一種擅用職權謀取私利，不是光明坦蕩的錢財意識。\n\
    \n若把先后天福德子申兩宮與先天財帛宮的兩午大限，三個官位綜合并論，除了不會煞曜以外，又有左輔右弼會照來看，這位廠長，在這個大限内，可正是財利滚滚，連綿不斷。\n\
    \n• 139 •\n\n因為星，在這三宮位不會凶煞之下，更具有穩定作用。所以也可以說他，足足發了十來年的。\n\n那么這顆廉貞化忌的囚星，難道不會去破壞先后天福德宮對於財利的聚留嗎？何況廉\n\
    \n會武曲成爲〈財與囚仇〉的凶格。『高先生思慮問詳地問道。\n\n雖然廉貞化忌，使大限福德申宮成爲凶格，但在申宫的三方里却再無凶星來冲，因此\n\n這\n\n\
