    好個能言善道的老板娘，難怪同業間會稱呼她「李太娘」。既然如此，我只好硬着頭皮，當場起了她的斗數命盤，并在附近的文具店里，買了個小指南針，略測方位，才給她稍作些微更動的建議。


    十多年來，我不知道給我少客戶，做了類似的免費服務。作生意嘛，有時額外的這一套，也着實幫助我拉短經銷商和客戶間的距離，間接地使客戶更樂意銷售公司的產品。學命理原為興趣，沒想到還會有這些收穫。


    李太娘言行舉止的爽朗使人印象深刻。印象中她的生意，堪稱山城的首屈一指，怎麼會落到今天支票無法兌現的地步。回家后，我找出舊檔案，發現就在幫她測店鋪方位的那年——辛酉年（一九八一），原留有當時的評語紀錄：慎防丁亥限后期，因賭而破財。


    第二天，我又給管轄的經銷商黃先生電話，提及當年應該跟他提起，李太娘就在四十歲前後，會因賭破財的事。作批發生意，很忌諱客戶有這種敗財的事情。為何黃先生，這個經驗老到的老經銷商，竟然沒有發現到李太娘會敗財敗到無法償付貨帳？


    據黃先生電話訴苦，李太娘開始銷售我們公司產品以後，生意一直不錯，近十年來，着實也賺了些錢。家居生活也還儉樸，不知道為什麼，到了丁卯年（一九八七）中，開始簽賭「大家樂」。待「大家樂」因愛國獎券停止發行后，接着賭起「六合彩」。原先只是偶爾簽賭運氣，漸漸的越簽越大，也跟一般鬼迷心竅的賭徒一般，信起求『明牌』的鬼把戲。賭徒


