    \n第二，李先生先天命在戌，魁鉞輔命為夾貴。夾貴的命格，即作近權貴之論。\n\n在一家私人企業任職，命格帶有近權貴格局的人，一旦限運來應合時，就比較有機會和權貴階級——也就是老板接近。\n\
