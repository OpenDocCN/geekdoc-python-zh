- md: '## 過路財神之一

    ### ——逐財求利的命理條件


    這是個「逐財求利」大虧的命例，虧得叫她莫名其妙。她來問我：在求財上，如何去趨吉避凶。


    韓小姐，大學國留系畢業。畢業后一直在不同的貿易商公司作事，從業務人員到老板的秘書都做過，但都因職重薪低，因此在四、五年內換了五、六家公司。後來在戊辰年（一九八八），經由朋友的介紹，進入一家期貨公司當內勤業務的辦事人員。


    期貨公司，其實就是個投機者大發橫財的樂園，當然也有人在此虧損累累。這賺虧之間，全看個人是否鴻運當頭，可没什么大道理。


    韓小姐說：當期貨公司的內勤業務辦事員，薪水不多，但只要能諳于期貨買賣之道，除了自己可以投入資金賺錢外，也可以幫客人操作，賺取傭金。一個精于此道的操作手，要是委旗的客户和金額多，一個月從客户得到的傭金，可以多達幾十萬。這也是她雖學有專長，但會改行換業的原因。


    見面時，她拿出一分由電腦排好的斗數命盤來，說是利用朋友的電腦排印的，作爲隨身攜帶，有空時拿出來看看研究。她說：曾經自行鑽研過不少坊間出版的斗數書籍，但越看越糊塗，因此遇到有比較重大的事情時，還是向精于此道的人請教。


