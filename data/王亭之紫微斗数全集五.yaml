  md: '不再發布不利股票的「利空」消息，臺灣淹脚目的社會游資還找不到適當的投資管道，那麼股票市場，在「財氣」和「人氣」兩旺之下，任誰都不會預測股票，會再有戊辰年中秋節后，那種跳樓般的大狂跌。


    假定庚午年間。股票也會繼續往年的飆漲不已，那么斗數命理的股票專家，恐怕又要再用「官祿主化祿」來解說。因此說不定，這些傳逾千年的星曜賦性，以后恐怕就有勞這些大師們出來重新修訂了！又假定庚午年股票不漲反跌，又將如何解說？


    「武曲為財帛主，據這些專研的斗數股票專家認為，『銀行股』所以會居高檔，就是因為武曲化祿的原因」東樵居士說：


    他們犯了理念不清和意識過度膨脹的大毛病。若真的要談銀行股票價位。民國七十七年（戊辰）的價位應該高過己巳年，這兩三年來真正居高檔而不下的，也許應該首推以保險業為主的「國壽」股票。但保險行業在斗數命理的理論上，似乎應該歸類于「服務業」一行，究竟保險的業務本質有異于銀行，因為銀行


    今后銀行所擴張業務範圍情況來看，像承辦國內外匯兌業務來賺取的服務費，也兼并有賺取勞務費用的性質。因此若硬是把銀行說成只主「財帛」借貸行業，不正是患了知識的「貧血症」嗎？


    很多命理研習者，硬是把社會上的各行各業，依木、火、土、金、水，作有板有眼的歸類。因此把機械五金業和開銀行，都歸在「金」的這一行里，把開化學工廠的歸生「水」類'
