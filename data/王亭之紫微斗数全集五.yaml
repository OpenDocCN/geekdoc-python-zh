    ### 月份的贏虧理由


    周先生看着記錄表說道：『三月份為戊辰月，流月在辰宮，福德宮在午。戊干天機化忌和流年文曲化忌會冲午宮。怎麼會在這種財帛宮和福德宮雙破之下，不虧反賺呢？』


    我說：『你用的是傳統的斗君來定流月，但根據我多年的驗證，利用這種斗君法所定的流月，似乎很難和實際的情況吻合。若是改從流年宮位做爲正月斗君宮位，幾乎都可以得到既符合又合理的解說。』


    『你擅用這種定斗君法，究竟根據什么理由或理論，能有合理的解釋嗎？』


    我當然有它的理由根據，但這個問題，不在這篇文字的討論範圍，容後有機會再詳談。


    要是從流年太歲起斗君，那么三月份就定在未宮，則流月福德宮在西。酉宮武曲爲流年化祿，三月戊干貪狼化祿會酉宮。酉宮得流年和流月天干雙化祿之下，使他在這個買賣的股票只賺不賠。


    四月份在申，天干爲己，月份福德宮在戌。謝先生買賣五次，結果賺三次賠兩次，最后净赚十六萬九千多元。


    流月福德宮在戌，戌宮坐太陽化忌，但酉宮有流年與流月的武曲化祿，亥宮有廉貞化祿，遂使戌宮成爲雙祿所輔。


    另外午宮有流祿，寅宮有先天祿存，使戌宮得此雙祿來朝而吉化。


    不過午宮的文曲，又因流年與流月干使它成爲雙變化忌，同樣沖擊戌宮，也使戌宮有凶來冲。又是祿又是忌的，使周先生聽來似感疑惑，于是問說：『這種吉凶混雜的組合最難分辨，究竟是吉或是凶？』


    『既然属「吉凶混杂」的组合，代表有吉也有凶。买五次，赢三次，输两次，不正是有吉也有凶吗？』


    『那为什么不会是输三次赢两次呢？』


    这个需从吉凶力道的强弱来分辨。戌宫被双禄所辅，又有禄存和流禄来会，这四个禄星辅照戌宫，其力道要比由午宫来冲的双忌力量还强，要不是戌宫的太阳落陷，又有先天化忌，单就文曲的双忌来冲戌宫，其凶性就要更弱小了。


    这种禄忌对戌宫所造成的吉凶对比，既然禄吉比忌凶力量来得更强，所以赢得次数会较多。月底输赢两相抵，也就成正数而赚钱了。


    周先生于是接着谈五月份情况。他说，这个月买的股票有六次之多，其中先买的三次在同月间卖出，后买的三次却在七月份才卖掉。若单根据买进的月份来核算最后的盈亏，就有下列两种情况：


    其一，单就买卖价差部分，输赢两相抵，则净亏两万八千亿元。


    其二，因配股价值达二十五万八千多元。因此扣掉价差亏损部分，这个月份还赚有十三万元左右。


    『这些状况，在命盘上究竟要如何推论？』他问。


    这种情形的确比较复杂，不过还是可以依实际状况理出条理来。


    五月斗君在西，天干为庚，四化为太阳化禄，武曲化权，太阴化科，天同化忌，流月福德宫在亥。


    流月行入流年化禄的武曲宫位，月份又有武曲化权，因此使谢先生更大胆地把资金投入股市，所以在这个月里买进的股票总额，累计高达五百九十万元之多。


    周先生接着说道：『但月份的福德宫在亥，亥宫既没有年与月份的禄星会照，也不见两者的忌星来冲，因此禄星似乎和亥宫毫无瓜葛。若论凶煞，却有卯宫的擎羊和未宫的流羊由双方冲，理论上不也可以据以推论亥宫，同样带有相当程度的凶象，为什么又能转亏为盈呢？』


    『你这个问题问得很好，可见你已渐能思考入微，这就是进步的现象。』


    巳宫有廉贞先天化禄，丑宫有大破军化禄，酉宫为五月斗君，有流年武曲化禄。这三代禄里交会于巳宫，其禄吉作用甚强。亥宫无甲级星曜，使巳宫的这一组合吉曜照入亥宫为用，不也使亥宫同样感受强烈的禄吉作用吗？


    五月间买进又卖出的三次股票所以会赚，应该可以据这道理来解释。


    『那么同样在五月间买入的另外三次，为什么又有两次在差价上的亏损，另外一次差价的净益也不多呢？』


    依记录来看，谢先生是个抢短线差价买卖的人。所以会在五月中旬买进，待七月中下旬卖出，可能由于进了股票后接着下跌。另因可能考虑到买进后正可过户分配『股仔仔』所以在精打细算下认为仍是有利可图，所以才俟侍领到配股后才出售。


    至于五月买进七月卖出，之所以会有差价亏损，是因为七月天干为壬，壬干使武曲化忌，这个武曲所在宫位，正是五月的流月斗君。斗君本宫因忌而破损，亥宫又得不到壬干的化禄吉化，也就因而以较低差价卖出了。


    「但因得配股，使留到七月份才卖出的股票变成反败为胜，又是从何解释？」周先生问。


    「五月庚干太阳化禄，七月壬干天梁化禄，不正使申戌两宫成双禄来辅酉宫吗？」我说。


    周先生喃喃自语的说道：「原来是这个道理。五月买进的股票，七月间卖出，月令宫位还是在酉宫。同样的福德宫，到了七月份时，还是定在亥宫了」


    「本来应该就是这个样子，绝没有把五月份买进的股票，在七月份卖出时，将月份宫位移到亥宫，把福德宫也移到丑宫的道理。但有太多的大师却不知道这种看法，实在令人纳闷。」


    六月份他只买一次，又在同月间卖出，赚到一万五千多元。


    六月在戌，坐破阳化忌又落宫位，月令天干为辛。辛干使巨门化禄会戌宫，也照入月令福德子宫。但流年文曲化忌也冲戌宫及子宫，流月辛干文昌化忌也冲子宫。


