    開始與人合而為一。但一等到生物學家判斷生物也是演算法，就等於拆除了有機和無機之間的那堵牆，讓電腦革命從單純機械事務轉變為生物的災難，也將權威從個人移轉到了演算法網路。


    確實有些人對這種發展感到恐懼，但事實上，也有數百萬人再樂意不過。今天許多人已經放棄了自己的隱私和個別性，把許多生命點滴全放上網路，每個行動都想記錄下來；只要與網路的連結一中斷，就算只是幾分鐘，也會讓他們坐立難安。就在我們身邊，處處都有權威由人類轉移到演算法的情形，而且不是因為什麼重大的政府決策，而是由於如狂潮般的日常個人選擇。


