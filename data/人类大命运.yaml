    # 從神使到代理人、再成為君主


    等到谷歌、臉書和其他演算法成為無所不知的神使（oracle，在古希臘神殿傳神諭者）之後，很有可能就會進一步演化成代理人，最後成為君主。33 為了解釋這個過程，讓我們以Waze為例。這是一個GPS導航程式，許多司機現在都會使用。Waze絕不只是地圖；它靠著數百萬用戶的不斷更新，就能得知各種塞車、事故和警車位置的資訊。因此，Waze知道怎樣讓你躲過繁忙的路段，讓你以最快的路線到達目的地。你到了某個路口，直覺要你往右、但Waze要你往左的時候，用戶遲早都會學到，自己最好相信Waze，不要相信自己的感覺。34


    乍看之下，Waze演算法應該只是神使的等級。你問問題，神使給你答覆，但最後還是由你決定。然而，如果神使開始贏得你的信任，合理的下一步驟就是讓它成為你的代理人。你只是向演算法指定一個最終目標，它就會在沒有你的監督之下，自行動作、達成目標。以Waze為例，就是你將Waze連結到自動駕駛的汽車上，並告訴Waze「走最快的路回家」或是「走風景最漂亮的路線」，又或是「走造成汙染最少的路線」。由你來發號施令，但是交給Waze來執行。


    最後，Waze可能就會成為君主。它手中握有大權，所知又遠超於你，就可能開始操縱你和其他駕駛人，形塑你們的欲望，讓你們做出顧全大局的決定。例如，假設因為Waze實在太好用，所有駕駛人都開始使用。再假設今天一號公路大塞車，而替代的二號公路車流相對順暢。如果Waze只是讓大家都知道二號公路順暢，所有駕駛人就會一窩蜂開向二號公路，最後又全塞在一起。一旦所有'
