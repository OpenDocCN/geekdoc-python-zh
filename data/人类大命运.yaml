    靈魂這個概念,並不是因為缺乏證據,而是因為這個概念根本違反演化的基本原理。也正是因為這種矛盾,使得虔誠一神論信徒,對演化論恨之入骨。


    # 誰怕達爾文?


    2012年的蓋洛普(Gallup)調查顯示,美國人只有15%認為智人演化全靠天擇,並無神祇介入;32%認為,人類可能是經由持續幾百萬年的過程,才從早期生命形式演化成現在的模樣,但整件事正是上帝的精心安排;46%則認為,人正如《聖經》所言,是由上帝在大約一萬年前所創。就算大學讀了三年,也完全不會影響這些看法。同一項調查發現,大學畢業生中,46%相信《聖經》裡神造萬物的故事,只有14%認為人類演化沒有什麼神祇監督。就算是碩士和博士畢業生,還是有25%相信《聖經》,只有29%相信人類是單純由天擇所演化而成。1


    顯然,目前學校對於演化的教學成效已經夠差了,但還有宗教狂熱份子堅持根本不該教孩子演化論,或聲稱應該帶入其他觀點,像是智慧設計論,也就是認為:所有的生物都是由某種更高的智慧(也稱為「上帝」)所設計。狂熱份子說:「兩種都教,再讓孩子自己決定。」


    為什麼演化論引起這麼強烈的反彈,但一講到相對論、量子力學,卻似乎一片靜悄悄?為什麼講到物質、能量、空間和時間的理論時,不會有政客要求應該教「其他觀點」?畢竟第一眼看來,和愛因斯坦的相對論或海森堡(Werner
    Heisenberg)的量子力學相比,達爾文的概念實在沒什麼可怕的。演化論的基本原理就是「生殖成'
