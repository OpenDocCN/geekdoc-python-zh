    這樣一來，科學家就能判斷：例如看似成為植物人的中風病人究竟是完全失去了意識，又或只是失去控制身體和語言的能力。如果病人的腦波顯示出有意識的特徵，那麼很可能病人雖然不能行動或言語，但其實仍有意識。事實上，醫師最近已能夠使用
    fMRI 來和這樣的病人進行溝通。醫師會問病人是非題，告訴他們如果想要答「是」，就想像自己在打網球，如果想要答「否」，則在腦中想著自己家的位置。如果病人所想的是打網球，運動皮質就會變得活躍，也就代表他想答「是」；如果活躍的是負責空間記憶的大腦區域，也就代表病人想答「否」。7


    # 圖靈測試


    這一套用在人類身上很方便，但用在電腦上又如何？由於電腦是以矽為基礎，而人類的神經網路是以碳為基礎，兩者架構大不相同，因此人類意識的特徵很可能無法套用。我們似乎陷入一個惡性循環了。一開始，是我們相信「人類說自己有意識的時候，就是真的有意識」，接著我們就能找出人類意識的腦波特徵，再接著就能用這些特徵來「證明」人類確實有意識。但如果人工智慧也說自己有意識，我們該信嗎？


    到目前為止，我們對這個問題還沒有很好的答案。早在幾千年前，哲學家就已經發現，沒有辦法明確證明除了自己以外的任何事物具有意識。而且就算只把範圍限制在其他人類，我們也只是假定他們有意識，無法真正確定。搞不好，其實全宇宙只有我自己在感覺著什麼，而其他所有人類和動物都只是沒有心靈的機器人？或許是我在做夢，而遇見的每個人都只是我夢裡的角色？又或許，我是被困在一個虛擬世界裡面，看到的一切生物都只是模擬？


    根據目前的科學定論，我所體驗到的一切，都是腦電活動的結果，所以理論上確實能夠模擬出一個我完全無法與「真實」分辨開來的虛擬世界。一些腦科學家相信，在不太遠的未來，我們就能做到這種事。也有可能，根本你就已經是住在這樣的世界裡？搞不好今年根本是2216年，你是個窮極無聊的青少年，泡在一個「虛擬世界」的遊戲裡，正在模擬二十一世紀早期這個原始卻又叫人興奮的世界。只要你一承認這種事情確有可能，數學邏輯就會把你帶向一個非常可怕的結論：因為只會有一個真實的世界，而可能的虛擬世界數量無窮無盡，所以你現在這個世界碰巧是真實的可能性，根本趨近於零。


    這個知名而難纏的問題，稱為「他心問題」（Problem of Other Minds），目前為止的所有科學突破，都還無法克服這項問題。目前學者對此提出的最佳測試方法，稱為「圖靈測試」（Turing
    test），但這項測試其實只是檢測是否符合社會常規而已。圖靈測試認為，想判斷某臺電腦算不算具備心靈，做法是安排測試者同時和電腦及另一個真人溝通，而測試者不知道哪個是電腦、哪個是真人。測試者可以任意問問題、玩遊戲、辯論、甚至是調情，時間長短不限；然後再來判斷哪個是電腦、哪個是真人。如果測試者無法決定、或根本選錯，就等於電腦通過了圖靈測試，我們應該認定它具有心靈。但這種測試當然不能做為證明。承認其他心靈的存在，只能說早已是一種社會和法律上的習慣。


    圖靈測試是由英國數學家圖靈（Alan Turing, 1912-1954）於1950年發明的，圖靈可說是電腦時代的創始人之一。他也是同性戀者，但當時同性戀在英國違法，因此他在1952年遭判犯有同性戀行為，被迫接受化學閹割。兩年後，圖靈自殺身亡。


    圖靈測試其實就是複製了每個同性戀男子在1950年的英國，必須通過的日常測試：你能裝成異性戀者嗎？圖靈從自己的個人經驗已知道，你究竟是誰根本不重要，重要的只是別人對你的看法。根據圖靈的觀點，未來的電腦就像是1950年代的男同性戀者，電腦究竟有沒有意識並不重要，重要的只是人類會怎麼想而已。


    # 《劍橋意識宣言》


    瞭解了心靈的概念、也發現我們所知竟是如此有限之後，就可以回到原來的問題：動物是否具有心靈？


    包括狗在內的一些動物，想必能夠通過修改版的圖靈測試。因為人類想要確定某個實體是否具有意識時，會尋找的不是什麼數學性向或記憶能力，而是能否與人類建立情感關係。


    人類有時候會非常喜歡某些東西，像是武器、汽車、甚至是內衣褲，從而產生強烈的情感依附（甚或戀物癖），但這些依附都只是單向的，並不會形成雙向關係。對大多數狗主人來說，狗能夠成為他們的夥伴、與人建立情感關係，就足以讓他們相信：狗並不是沒有心靈的自動物。


    但這對於懷疑論者來說還不夠，他們會說情感也只不過是演算法，而目前所有已知的演算法，都是無須意識便能動作。就算動物展現了複雜的情感行為，我們仍然無法證明「這絕對不是什麼極度複雜、但無意識的演算法所為」。當然，這種說法也能應用到人類身上。人所做的一切事情（包括做實驗的時候說自己有意識），理論上也都有可能是無意識的演算法所為。


    然而就人類而言，只要某個人說自己有意識，我們自然是全盤接受。根據這項最小的假設，我們現在已經可以找出意識的腦波特徵，並用來有系統的判別某個人是處於有意識或無意識的狀態。既然動物的大腦有許多特徵和人腦類似，隨著我們愈來愈瞭解意識的腦波特徵，也就有可能用來判斷其他動物究竟有沒有意識、或是在何時具有意識。如果某隻狗的大腦，顯示出與有意識人腦類似的腦波特徵，將會是很強力的證據，證明狗也有意識。


    根據初步對猴子和小鼠（mice）的測試，科學家已經指出：至少猴子和小鼠的大腦，確實顯示了有意識的腦波特徵。⁸但考量到動物大腦和人類大腦仍有差異，而且我們距離解譯所有意識的祕密，也還有一大段距離，可能需要再幾十年，才真正能夠研發出決定性的測試。與此同時，究竟該由哪方來負舉證責任？我們到底是該先把狗視為無意識的機器，直到證明並非如此為止；還是該把狗看做是像人類一樣有意識，直到出現令人信服的反證為止？


    2012年7月7日，許多神經生物學和認知科學的權威專家，齊聚劍橋大學，簽署〈劍橋意識宣言〉（The Cambridge Declaration on Consciousness），其中提到：「各種證據均指出，非人類動物擁有構成意識所需之神經結構、神經化學及神經生理基質，並且有能力展現帶有意圖的行為。因此，證據已充分顯示，用以產生意識的神經基質並非人類所獨有。非人類動物，包括所有哺乳動物、鳥類、以及章魚等其他生物，均擁有這些神經基質。」⁹


    由於仍然沒有最直接的證據，因此這項宣言就只差一步，並未直接說出其他動物也具有意識。儘管如此,這確實已經讓舉證責任轉向了另外一方。


    回應科學界的轉向,在2015年5月,紐西蘭國會開全球國家先例,通過《動物福利法修正案》,在法律上承認動物也像人類一樣具有情感。該法規定,從此必須認知到動物具有情感,因此在例如畜牧等情境下,必須適當維護動物的福利。


    在一個羊多於人的國家(三千萬頭羊、四百五十萬人),這項聲明的影響十分重大。加拿大魁北克省也已經通過類似的法案,其他國家可能很快也將跟進。


    # 實驗室大鼠的憂鬱生活


    許多企業同樣已體認到動物也有情感,但這常常反而讓動物落入相當不愉快的實驗室試驗。例如,製藥公司經常使用大鼠(rat)來試驗抗憂鬱藥物,在一種常見的試驗計畫中,需要取一百隻大鼠(以求統計信度),分別放進裝滿水的玻璃管內。這些大鼠會一次又一次努力想爬出玻璃管,但都無法成功。經過十五分鐘之後,大多數都會放棄而不再動作,只是漂在管子裡,對周遭情況了無興趣。


    接著,另外取一百隻大鼠,同樣丟進玻璃管,但這次會在十四分鐘後、正當牠們快要絕望之時,把牠們撈出來,擦乾、給食物、讓牠們休息一下,然後再重新丟回玻璃管裡。第二次,大多數的大鼠都能撐上二十分鐘才放棄。


    為什麼這次多了六分鐘?因為過去曾有成功的記憶,觸動了大腦釋放出某些生化物質,讓大鼠覺得又有了希望,而延遲了絕望的時間。只要我們能找出這種生化物質,就可能做為人類的抗憂鬱藥物。只不過，大鼠的腦中隨時都有許許多多種化學物質，怎麼才能知道究竟是哪一種？


    為了這個目的，還需要更多組沒接受過這項實驗的大鼠，在找出認為可能是抗憂鬱成分的化學物質之後，每一組各注入不同的化學物質，然後把牠們丟進水裡。譬如注射化學物質A的組別，仍然只撐了十五分鐘，那就可以把物質A從可能清單上劃掉。如果注射化學物質B的組別撐了二十分鐘，這下就可以告訴執行長和股東，你們可能中了大獎。


    ![](img/319dca06e22893e942053da0432e9f19_142_0.png)


    16.（左圖）大鼠抱著希望，掙扎著想逃離玻璃管。

    （右圖）大鼠漂在玻璃管中，已經放棄希望了。


    持懷疑態度的人可能已經跳出來，認為這段敘述把大鼠講得太人性化，實在是想太多。他們認為，大鼠既不會感覺到希望、也不會感覺到絕望，雖然有時候牠們動作很快，有時候在原地不動，但牠們並不會有任何感覺，大鼠只是由無意識的演算法來驅使而已。


    但如果真是這樣，這個實驗又有何意義？精神病的藥物就是為了要誘發改變，而且不只是想改變病人的行為，更是要改變病人的感覺。


    病人找上心理醫師，說：「醫師，想想辦法讓我不要這麼憂鬱吧。」他們可不是要醫師用機械刺激，讓他們就算心情低落仍然動作靈敏，而是要感覺很開心。如果藥廠覺得用大鼠做實驗，有助於開發這樣的神奇藥丸，只有一種可能，就是他們認定了大鼠的行為也帶有如同人類的情感。事實上，這也正是各家精神醫學實驗室共同的前提。10


    # 有自我意識的黑猩猩


    還有另一種認為人類比其他動物優越的論點，雖然已經接受老鼠、狗或其他動物也有意識，但認為牠們沒有像人類一樣的「自我意識」。這些動物可能會感到沮喪、快樂、飢餓或滿足，但並沒有自我的概念，不知道自己感受到的沮喪或飢餓只屬於這個稱為「我」的實體。


    這種想法非常常見，但也非常言不及義。顯然，如果一條狗覺得餓了，牠叼起的肉就是要給自己吃的，而不是要去餵另一隻狗。讓一條狗去聞聞附近其他狗尿過的樹，牠也立刻知道這氣味究竟是自己的、隔壁那條可愛的拉不拉多的、又或是某條陌生狗的。對於自己、交配對象或是敵人的氣味，狗會有非常不同的反應。^{11}
    這樣一來，哪能說牠們沒有自我意識？


    這種主張有個更複雜的版本，說的是自我意識可區分成不同程度，只有人類知道自己是個有過去和未來、長久延續的自我，或許是因為只有人類可以用語言來思考過去的經驗、思考未來的行動。至於其他動物，則只能活在當下，就算牠們似乎還記得過去、或是在打算未來，也只不過是在反應當下的刺激或瞬間的衝動。^{12}
    舉例來說，松鼠會貯藏堅果過冬，並不是因為牠記得自己去年冬天餓了肚子，也不是為了未來著想，只不過就是一時衝動，牠並不知道這種衝動是何起源、有何目的。正因如此，就算是那些從來沒遇過冬天、當然也就不可能記得冬天是什麼滋味的年輕松鼠，也會在夏天貯藏堅果。


    然而我們現在還不清楚，為什麼講到要對過去或未來有意識，會覺得語言是一個必要條件。只因為人類用語言這麼做，其實算不上是什麼證明。人類也會用語言來表達自己的愛和恐懼，但其他動物也能不靠語言就感受、甚至表達出愛和恐懼。事實上，人類自己也常常在沒說出口的情況下，意識到過去和未來的事件。特別是在夢境裡，我們可以不用語言就瞭解整個敘事情境，反而是醒過來之後，要用語言重述，卻變得非常困難。


    許多實驗指出，至少某些動物，包括鸚鵡和叢鴉之類的鳥類，確實能夠記得一些個別事件，並且也能有意識的未雨綢繆。^{13} 但這點永遠無法真正證明，因為不管動物表現出多複雜的行為，懷疑論者永遠可以說：這只是出於動物腦中無意識的演算法，而非出於心靈中有意識的圖像。


    要說明這個問題，讓我們以瑞典富魯維克動物園的雄性黑猩猩桑提諾（Santino）為例。牠為了在獸欄裡別那麼無聊，就培養出一種頗刺激的新嗜好：對動物園的遊客丟石頭。這個行為本身並不特殊，黑猩猩生氣的時候，投擲石頭、木棒、甚至排泄物，都是常有的事。只不過，桑提諾還會事先準備。一大早，動物園還沒開放遊客入場，桑提諾已經開始收集石頭，堆成一堆，看起來心平氣和得很。導遊和遊客很快就知道必須對桑提諾多加提防，特別是牠站在那堆石頭附近的時候。這下桑提諾比較難找到目標可丟了。


    2010年5月，桑提諾又出了新招來回應。一大早，牠就從睡覺的地方把稻草給搬出來，放在遊客通常聚集觀看黑猩猩的牆邊。然後，牠再把收集到的石頭藏在稻草堆下。大概一個小時後，第一批遊客走近，桑提諾仍然一派平靜，沒有任何被激怒或是充滿攻擊性的跡象。但等到受害者一走進牠有把握的範圍，桑提諾就突然拿出藏好的石頭，砲擊遊客，把遊客嚇得四處逃竄。2012年夏天，桑提諾更是加速提升軍備，除了稻草堆下面，也會把石頭藏在樹上、建築物裡、還有一切方便隱藏的地方。


    # 哪一方該負舉證責任？


    但就連桑提諾的例子，也無法讓懷疑論者信服。早上七點，桑提諾開始到處收集石頭的時候，我們怎麼能確定牠是覺得中午拿來丟人很有趣？會不會桑提諾也是被某種不自覺的演算法所驅動，就像是年輕的松鼠未曾經歷冬天、也知道要貯藏堅果？


    同樣的，懷疑論者會說：就算是雄性黑猩猩攻擊某隻幾週前傷害牠的對手，也不是真的在報先前的仇，只是一時間覺得憤怒、無法克制。母象如果看到獅子威脅牠的小象，之所以冒生命危險衝向前去，並不是因為記得這是牠深愛而且照顧了好幾個月的孩子，只是天生對獅子有著深不可測的敵意。狗在主人回家時，興奮不已，並不是因為認出這就是從小養牠、抱牠的人，只是這條狗很開心罷了，沒有任何其他理由。15


    對於這些說法，我們既無法證明為真、也無法證明為假，因為這其實就是「他心問題」的變化版本。由於我們並不知道有任何需要意識的演算法，所以不管動物做了什麼，都可以視為是無意識的演算法，而不是有意識的記憶和計畫。所以，桑提諾的例子其實也和前面一樣，真正的問題在於舉證責任。對於桑提諾的行為，最可能的解釋到底是什麼？我們是不是該假設牠就是有意識的對未來做規劃；而想反對的人，才該想辦法提出反證？或者，我們該假設黑猩猩是由一種無意識的演算法驅動，牠只是感受到一種神祕驅力，要把石頭藏在稻草下面；而不贊同這種想法的人，才該提出反證？


    而且，就算桑提諾不記得過去、也不會想像未來，難道這就代表他缺乏自我意識？畢竟，如果有個人既不忙著回憶過去、也不急於夢想未來，我們還是會認定他有自我意識。舉例來說，媽媽看到自己剛會走路的小嬰兒，要晃到大馬路上了，她可不會先想想過去還是未來，而是會像那頭母象一樣，衝過去救孩子。這種時候，為什麼我們不會把對大象的那一套說法，拿來用在她身上，說「媽媽趕去救孩子脫離危險時，其實沒有任何自我意識，只是由一時的衝動所驅使」？


    同樣的，想想年輕情侶第一次約會熱吻、士兵衝入猛烈炮火中搶救受傷戰友、藝術家狂亂落筆繪出傑作，這些人都不可能忽然暫停，思考一下過去和未來，但難道這就意味著他們缺乏自我意識，而且比不上那些吹噓著自己過去成就和未來計畫的政客競選演說？


    # 人類大命運


    2010年，科學家做了一項難得感人的大鼠實驗。他們將一隻大鼠關在一個很小的、透明壓克力製的大鼠抽血固定器裡，再把抽血固定器放進一個大得多的實驗箱，接著讓另一隻大鼠能夠在實驗箱裡自由走動。被關入抽血固定器的大鼠會發出痛苦的訊號，結果讓自由的大鼠也表現出焦慮和壓力。大多數情況下，自由的大鼠會嘗試拯救被關住的同伴，試了幾次之後，通常都能成功打開機關、把被關的大鼠解放出來。


    研究人員接著把實驗再做一次，但這次在大實驗箱裡放了巧克力。現在那隻自由的大鼠有兩種選擇：放出被關的同伴，或是自己獨享巧克力。許多大鼠都會選擇先放出同伴，再共享巧克力。（不過也有的比較自私，或許證明了某些大鼠就是比較壞心眼。）


    懷疑論者全盤否認這些結果，認為自由的大鼠放出同伴不是因為同情，只是希望阻止煩人的求救訊號。大鼠是因為覺得不愉快、想解決這個問題，而不是因為什麼崇高的理由。或許也是，但同一套道理完全也可以套用到人類身上。如果我給乞丐錢，是不是只是因為我覺得，看到乞丐令我不悅，於是做出這種反應？我到底是真正關心乞丐，或是只想讓自己好過點？16


    在本質上，我們人類和大鼠、狗、海豚或黑猩猩，並沒有多大的差異之處。正如牠們，我們也沒有靈魂。也正如我們，牠們也有意識，有著充滿感覺和情感的複雜世界。當然，每隻動物都有自己獨特的特質和才能，而每個人也有自己獨特的天賦。不過，我們倒也沒有必要進一步為動物都強加人性，覺得牠們就像是長了毛的人類。這種畫蛇添足的做法，不僅在科學上無法立足，也讓我們無法真正從動物的立場，來給予牠們理解和評價。


    144


    # 聰明的馬


    1900年代,德國有匹名馬「聰明的漢斯」(Clever Hans)。牠在德國許多城鎮村莊巡迴表演,不僅德語水準非同凡響,數學能力更是驚人。如果有人問牠:「漢斯,4乘3是多少?」漢斯就會用馬蹄點地12下。有人用文字寫給牠看:「20減11是多少?」漢斯也會展現普魯士的一絲不苟,點個9下。


    1904年,德國教育部門組成特別科學委員會,由一名心理學家領軍調查這件事。委員會的十三名成員(其中還包括一位馬戲團經理和一名獸醫）一心認為這必定是個騙局，但費盡九牛二虎之力，還是找不出任何欺偽不實之處。就算把漢斯與主人分開，由全然陌生的人問牠問題，漢斯仍然多半都能答對。


    直到1907年，心理學家方斯特（Oskar Pfungst）進行另一項調查，才終於查出真相。原來漢斯之所以能答出正確解答，靠的是觀察提問者的身體語言和臉部表情。如果有人問漢斯3乘4是多少，漢斯從過去的經驗知道，提問者心中會期待牠點蹄點到一定次數。於是牠開始點著，並且仔細觀察提問人。隨著漢斯慢慢接近答案，提問人會顯得愈來愈緊張，並在漢斯點到正確數字時，緊繃的情緒達到頂峰。漢斯知道的是，如何從人的肢體姿勢和表情看出這點。於是牠就停下來，看著提問人原本的緊張轉變成難以置信的表情、或是哈哈大笑。漢斯便知道，自己又答對了。


    常有人用聰明的漢斯做為例子，告誡不該誤以為動物有人性，或高估牠們有什麼驚人的能力。但事實上，這裡教我們的一課，卻正好相反。從這個故事可以看出，我們為動物強加人性，反而是低估了動物的認知能力，並忽略了其他生物獨特的能力。確實，漢斯在數學方面絕對算不上有什麼才能，任何八歲小孩的算術能力都比牠強。但如果講的是從肢體語言來推論情感和意圖，漢斯就是個真金實銀的天才了。


    如果有個瑞典人用我不懂的瑞典話，問我4乘3是多少，我絕不可能光看他的臉部表情和肢體語言，就用腳點出正確的12下。聰明的漢斯之所以擁有這個能力，是因為馬匹通常就是用肢體語言相互溝通。但漢斯了不起的地方在於：牠不只成功解讀了同類的情感和意圖，還看穿了原本不熟悉的人類。


