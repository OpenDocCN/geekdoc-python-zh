    第9章 自由主義大崩解


    在接下來這個世紀，印度、巴西或奈及利亞的精英，會想做些什麼？是要投資解決幾億個窮人的問題，還是讓少數幾個億萬富翁再升級？在二十世紀，因為窮人有軍事和經濟價值，精英階級必須解決窮人的問題；但是到了二十一世紀，精英階級最有效（雖然十分無情）的策略，很可能是乾脆切斷百無一用的三等車廂，只讓頭等車廂繼續前進。想與日本競爭，巴西更需要的可能不是幾百萬名健康的普通工人，而是少數幾個經過升級的超人類。


    一旦出現這種在身體、的情感和智力都遠超常人的超人類，自由主義信仰又怎麼可能存在？如果事實證明，這種超人類的經驗會和一般智人完全不同，情況又會如何？如果超人類一讀到關於低等智人盜賊經驗的小說，就覺得無聊，而一般人看到超人類的愛情肥皂劇，卻又完全無法理解，該怎麼辦？


    人類在二十世紀的偉大成就——克服饑荒、瘟疫和戰爭，都是為了讓所有人享有富足、健康與和平，完全一視同仁。至於二十一世紀的新議題——長生不死、幸福快樂、化身為神，也同樣希望為全人類服務。然而，由於這些計畫的目的在於超越、而非維持基本要求，最後就可能創造出新的超人類種姓階級，進而砍斷了原來的自由主義根源；超人類看待一般人，就會像是十九世紀歐洲人看待非洲人的情況。


    如果科學發現和科技發展將人類分為兩類：一類是絕大多數無用的普通人；另一類是一小部分經過升級的超人類，又或者是萬事的決定權已完全從人類手中轉移到具備高度智能的演算法手中——在這兩種情況下，自由主義都將崩潰！屆時會是什麼樣的新宗教或意識型態，可填補這樣的缺口，並且指導我們如神一般的後代呢？


