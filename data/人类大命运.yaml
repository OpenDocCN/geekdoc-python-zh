    Götze），擔綱2014年世界盃德國隊的攻擊型中場球員，在決賽對上阿根廷；這時已經開賽一百一十三分鐘了，兩隊都未能得分。再過短短七分鐘，就要來到恐怖的PK大戰。巴西里約的馬拉卡納體育場，塞滿了七萬五千名激動的球迷，全球還有不知幾百萬觀眾焦急的緊盯螢幕。你離阿根廷的球門只有幾公尺，這時舒勒（André
    Schürrle）忽然朝你踢來一記妙傳！你胸口停球，看著球向你的腳落下，再空中起腳一射，看著球越過阿根廷門將，強力射進球網。進了！


    體育場如火山爆發，幾萬人瘋了一般大吼，你的隊友衝上來擁抱親吻你，國內柏林和慕尼黑的數百萬觀眾，也在電視螢幕前激動落淚。這時你欣喜若狂，但並不是因為在阿根廷球門裡那顆球，也不是因為在巴伐利亞邦露天啤酒吧裡塞爆球迷的歡天喜地，而是因為在你的身體裡面，各種感受正有如風暴一般襲來，「欣喜若狂」就是對這些感覺的回應。你覺得有冷顫在你的脊椎上上下下，電波一波一波衝過身體，好像自己溶入了幾百萬顆爆炸的能源球一般。


    你不用在世界盃決賽踢進致勝一球，也能得到這樣的感覺。像是工作上意外升遷，讓你開心得跳了起來，就是對同一種感覺的反應。你的心靈深處，其實根本不懂足球、也不懂工作，只懂生物生理的感覺。如果你升遷了，但因為某種原因而沒有得到這種愉悅的感覺，你就不會覺得滿意。反之也是如此。如果你剛被開除（或是輸了一場重要賽事），但感受到了非常愉快的感覺（也許是因為嗑藥），那你還是可能以為自己就站在世界的頂峰，飄飄欲仙。


