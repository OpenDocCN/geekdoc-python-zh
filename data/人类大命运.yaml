    人類大命運


    為了解釋得更清楚,讓我們深入研究一項真實的歷史案例。宗教自吹自擂的時候,對這個案子絕口不提,但這件事對社會和政治的影響卻無與倫比。


    在中世紀歐洲,教皇的政治權力無遠弗屆。不管在歐洲何處,只要發生衝突,教皇都會聲稱自己有裁決權。為了鞏固自己的權力主張,歷任教皇都曾一再提到〈君士坦丁御賜教產論〉(Donation
    of Constantine)。這個故事是這麼說的:羅馬皇帝君士坦丁在西元315年3月30日簽署一份諭令,授權教皇聖思維一世(St. Sylvester I)和後繼者,永遠控制羅馬帝國西部領土。


    歷任教皇將〈君士坦丁御賜教產論〉這份珍貴文件留傳下去,每當有雄心勃勃的君主、喜爭好辯的城市、或是桀驁不馴的農民起身反抗,教皇就會拿這份文件,做為強大的宣傳工具。


    中世紀歐洲民眾十分尊重流傳久遠的帝國法令,認為文件歷史愈長,就承載著愈多權力。他們也一心堅信,國王和帝王都是上帝的代表。其中,由於君士坦丁讓羅馬帝國從異教領土變成了基督教帝國,也就特別受到尊崇。如果現在市議會想做的事,與偉大的君士坦丁本人所下的諭令有所衝突,對中世紀歐洲人來說,顯然就該服從古代的文件。於是,每當教皇碰上政治抗爭,他總是高舉〈君士坦丁御賜教產論〉,要求對方服從。


    倒也不是每次都靈。只不過,〈君士坦丁御賜教產論〉仍然是教皇的宣傳利器和中世紀政治秩序的重要基石。


    如果仔細研究〈君士坦丁御賜教產論〉,也會發現這個故事仍是由前述的三個部分組成:


