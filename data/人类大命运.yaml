  md: '種不斷成長的力量，試圖以某種方式，將意義重新帶回這個無限空虛的宇宙。沒錯，我們現代人曾經承諾要放棄意義，以換取力量；但也沒人押著我們，逼我們非得實現承諾。我們認為自己夠聰明，能夠盡享這份現代契約的好處，而無須付出代價。


    # 從前，經濟停滯是常態


    科學進步與經濟成長攜手共進，更進一步推動了現代對力量的追求。整部人類歷史上，科學多半是以蝸速進展，經濟更是遭到深度冰封。雖然人口的緩步成長確實使生產隨之成長，而每次科學偶有發現，也有可能帶動平均每人的經濟成長，但拉大鏡頭來看，整個過程是極度緩慢的。


    如果在西元1000年，是100個村民生產了100噸小麥，到了西元1100年，可能是105個村民生產了107噸小麥，這種成長可說是有名無實，既不改變生活節奏、也不影響社會政治秩序。今天所有的人熱切追求成長，但在前現代時期，人民對此卻是毫不在意。不論王公貴族、牧師神父或農民大眾，都認為人類生產大致就是維持穩定，某人想得到更多，就只能從別人那兒偷；也認為到了孫輩的生活水準，大概也不會有何躍進。


    這種停滯現象，有一大部分原因在於很難為新計畫籌措資金。沒有足夠的資金，就很難排乾沼澤、建築橋梁、開闢港口，更別提要培育新的小麥品種、發現新的能源、或是開拓新的貿易路線。當時資金稀缺，是因為沒有什麼信用（credit）的概念；之所以沒有什麼信用，是因為人類不相信成長；而之所以不相信成長，正是因為經濟停滯不前。於是，停滯就成了個惡性循環。'
