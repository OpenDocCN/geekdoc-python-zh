  md: '![](img/319dca06e22893e942053da0432e9f19_37_0.png)


    早。1900年全球的平均壽命之所以不到四十歲，是因為營養不良、傳染病和暴力，讓許多人還很年輕便離開人世。但只要避開饑荒、瘟疫和戰爭，就能活到七十、八十歲，這是智人自然的壽命長度。一般人可能沒想到，其實在幾百年前，活到七十幾歲也不是什麼罕見的怪事。伽利略享年七十七，牛頓享年八十四，米開朗基羅更是高齡八十八，而且當時還沒有抗生素、疫苗或器官移植的協助。甚至，就連叢林中的黑猩猩，有時候都能活到六十好幾。30


    事實上，到目前為止，現代醫學連自然壽命的一年，都還沒能延長。現代醫學的成功之處，是讓我們免於早夭早逝，能夠完整過完應有的人生。就算我們打敗了癌症、糖尿病和其他主要殺手，也只代表幾乎每個人都能夠活到九十歲，但和一百五十歲還差得遠，更別說五百歲了。想達成活到一百五十歲的目標，醫學必須重新打造人體最基本的結構和運作，並設法再生各種器官和組織。究竟在2100年能不能做到，現在絕對仍在未定之數。


    然而，每次失敗的嘗試，都是讓我們向戰勝死亡又邁進一步，也將帶來更多希望，鼓勵投入更多心力。谷歌旗下的Calico公司可能來不及讓聯合創辦人布林（Sergey
    Brin）和佩吉（Larry Page）長生不死，但很有可能會在細胞生物學、遺傳醫學、健康醫護方面有重大發現。這樣一來，新一代的谷歌員工就能站在更好的位置，向死亡進攻。高呼著人類不死的科學家，其實就像是〈狼來了〉故事裡的那個男孩——狼要來，只是早晚的事。


    因此，就算在我們有生之年還無法達成永生，這場與死亡的戰爭，仍有可能是接下來這個世紀的旗艦計畫。想到我們對於「生命神聖」的信念、整個科學界的動向、加上最重要的是資本經濟的需求，一場對死亡的無情戰爭似乎已無可避免。我們的意識型態看重'
