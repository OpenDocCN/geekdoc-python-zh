  md: '但她立刻又開始咯咯笑了起來，還用手遮住了自己的嘴。「那你為什麼會笑呢？」研究人員追問。也是一頭霧水的左腦翻譯官，拚盡全力想找出什麼合理的解釋，於是回答說：因為房間裡有部機器看起來很好笑。13


