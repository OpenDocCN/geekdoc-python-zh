  md: '桑提諾（Santino）為例。牠為了在獸欄裡別那麼無聊，就培養出一種頗刺激的新嗜好：對動物園的遊客丟石頭。這個行為本身並不特殊，黑猩猩生氣的時候，投擲石頭、木棒、甚至排泄物，都是常有的事。只不過，桑提諾還會事先準備。一大早，動物園還沒開放遊客入場，桑提諾已經開始收集石頭，堆成一堆，看起來心平氣和得很。導遊和遊客很快就知道必須對桑提諾多加提防，特別是牠站在那堆石頭附近的時候。這下桑提諾比較難找到目標可丟了。


    2010年5月，桑提諾又出了新招來回應。一大早，牠就從睡覺的地方把稻草給搬出來，放在遊客通常聚集觀看黑猩猩的牆邊。然後，牠再把收集到的石頭藏在稻草堆下。大概一個小時後，第一批遊客走近，桑提諾仍然一派平靜，沒有任何被激怒或是充滿攻擊性的跡象。但等到受害者一走進牠有把握的範圍，桑提諾就突然拿出藏好的石頭，砲擊遊客，把遊客嚇得四處逃竄。2012年夏天，桑提諾更是加速提升軍備，除了稻草堆下面，也會把石頭藏在樹上、建築物裡、還有一切方便隱藏的地方。


    # 哪一方該負舉證責任？


    但就連桑提諾的例子，也無法讓懷疑論者信服。早上七點，桑提諾開始到處收集石頭的時候，我們怎麼能確定牠是覺得中午拿來丟人很有趣？會不會桑提諾也是被某種不自覺的演算法所驅動，就像是年輕的松鼠未曾經歷冬天、也知道要貯藏堅果？


    同樣的，懷疑論者會說：就算是雄性黑猩猩攻擊某隻幾週前傷害牠的對手，也不是真的在報先前的仇，只是一時間覺得憤怒、無法克制。母象如果看到獅子威脅牠的小象，之所以冒生命危險衝向'
  merge: -1
  pgno: 145
- img_proc: true
  md: '前去，並不是因為記得這是牠深愛而且照顧了好幾個月的孩子，只是天生對獅子有著深不可測的敵意。狗在主人回家時，興奮不已，並不是因為認出這就是從小養牠、抱牠的人，只是這條狗很開心罷了，沒有任何其他理由。15


    對於這些說法，我們既無法證明為真、也無法證明為假，因為這其實就是「他心問題」的變化版本。由於我們並不知道有任何需要意識的演算法，所以不管動物做了什麼，都可以視為是無意識的演算法，而不是有意識的記憶和計畫。所以，桑提諾的例子其實也和前面一樣，真正的問題在於舉證責任。對於桑提諾的行為，最可能的解釋到底是什麼？我們是不是該假設牠就是有意識的對未來做規劃；而想反對的人，才該想辦法提出反證？或者，我們該假設黑猩猩是由一種無意識的演算法驅動，牠只是感受到一種神祕驅力，要把石頭藏在稻草下面；而不贊同這種想法的人，才該提出反證？


    而且，就算桑提諾不記得過去、也不會想像未來，難道這就代表他缺乏自我意識？畢竟，如果有個人既不忙著回憶過去、也不急於夢想未來，我們還是會認定他有自我意識。舉例來說，媽媽看到自己剛會走路的小嬰兒，要晃到大馬路上了，她可不會先想想過去還是未來，而是會像那頭母象一樣，衝過去救孩子。這種時候，為什麼我們不會把對大象的那一套說法，拿來用在她身上，說「媽媽趕去救孩子脫離危險時，其實沒有任何自我意識，只是由一時的衝動所驅使」？


    同樣的，想想年輕情侶第一次約會熱吻、士兵衝入猛烈炮火中搶救受傷戰友、藝術家狂亂落筆繪出傑作，這些人都不可能忽然暫停，思考一下過去和未來，但難道這就意味著他們缺乏自我意識，而且比不上那些吹噓著自己過去成就和未來計畫的政客競選演說？'
