    # 第6章


    # 與「現代」的契約


    「現代」就是一份交易契約，所有人都在出生的那天簽了契約，從此規範了我們的生活，直到死亡為止。很少有人能夠撤銷或超越這份契約，這份契約形塑了我們吃什麼、做什麼、夢想什麼，也決定了我們定居在哪裡、要愛什麼人，甚至是如何死去。


    乍看之下，這份契約非常複雜，因此很少有人會去瞭解自己究竟簽了什麼。這就像是下載某個軟體後，有一份使用同意書，裡面有幾十頁的法律語言；於是你瞄了一眼，立刻向下滾到最後一頁，勾了「我同意」，接著完全忘了這件事。但事實上，這份契約簡單到不可思議。只要一句話就能總結：人類同意放棄意義、換取力量。


    在現代之前，多數文化都相信人類是某個偉大宇宙計畫的一部分。這個計畫的設計者是某些萬能的神、又或是永恆的自然律，人類無法改變。是這個宇宙計畫讓人的生命有了意義，但同時也限制了人的力量。人類就像是舞臺上的演員，腳本讓他們所講的每個字、所掉的每滴眼淚、所做的每個手勢，都有了意義；但同時也對他們的表演設下嚴格限制。哈姆雷特不能在第一幕就殺了克勞迪亞'
