    圖靈測試是由英國數學家圖靈（Alan Turing, 1912-1954）於1950年發明的，圖靈可說是電腦時代的創始人之一。他也是同性戀者，但當時同性戀在英國違法，因此他在1952年遭判犯有同性戀行為，被迫接受化學閹割。兩年後，圖靈自殺身亡。


    圖靈測試其實就是複製了每個同性戀男子在1950年的英國，必須通過的日常測試：你能裝成異性戀者嗎？圖靈從自己的個人經驗已知道，你究竟是誰根本不重要，重要的只是別人對你的看法。根據圖靈的觀點，未來的電腦就像是1950年代的男同性戀者，電腦究竟有沒有意識並不重要，重要的只是人類會怎麼想而已。


    # 《劍橋意識宣言》


    瞭解了心靈的概念、也發現我們所知竟是如此有限之後，就可以回到原來的問題：動物是否具有心靈？


    包括狗在內的一些動物，想必能夠通過修改版的圖靈測試。因為人類想要確定某個實體是否具有意識時，會尋找的不是什麼數學性向或記憶能力，而是能否與人類建立情感關係。


    人類有時候會非常喜歡某些東西，像是武器、汽車、甚至是內衣褲，從而產生強烈的情感依附（甚或戀物癖），但這些依附都只是單向的，並不會形成雙向關係。對大多數狗主人來說，狗能夠成為他們的夥伴、與人建立情感關係，就足以讓他們相信：狗並不是沒有心靈的自動物。


    但這對於懷疑論者來說還不夠，他們會說情感也只不過是演算法，而目前所有已知的演算法，都是無須意識便能動作。就算動物展現了複雜的情感行為，我們仍然無法證明「這絕對不是什麼極度'
