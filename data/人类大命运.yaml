  md: '有一個故事（可能是假的，但精采的故事多半都是假的），講的是戈巴契夫為了讓蘇聯經濟起死回生，派出一位主要副手到倫敦，想瞭解柴契爾主義（Thatcherism）是什麼、資本主義制度又如何實際運作。東道主帶著這位蘇聯來的貴賓參觀倫敦，前往倫敦證券交易所和倫敦政經學院，與銀行經理、企業家和教授長談。經過許多小時的參訪，這位蘇聯專家忽然忍不住說：「抱歉，請先停一下。先別管所有這些複雜的經濟理論了。我們在倫敦來來回回一整天，有件事我一直不懂。在莫斯科，我們派了最聰明的人來研究麵包供應制度，但每間麵包店和雜貨店還是得大排長龍。在倫敦，這裡人口有數百萬，我們今天又經過了許多店家和超市，卻沒有半個地方需要排隊。請帶我去見一下在倫敦負責管控麵包供應的人，我一定得學學他的祕招。」東道主抓了抓頭，想了一下，說道：「可是，沒人負責管控麵包給倫敦啊。」


    這正是資本主義的成功祕訣。並沒有中央處理單元（CPU）壟斷倫敦麵包供應的所有資料數據，而是讓資訊在幾百萬位消費者和生產者、麵包師傅和企業家、農民和科學家之間自由流動。市場力量就會決定麵包的價格、每天烘焙的數量，以及研發的優先順序。如果市場力量做出不當的決定，也能很快自我修正（至少資本主義信徒是這麼相信的）。就我們的目的來說，重點並不在於這種資本主義理論是否正確，而在於這是用資料處理的概念，來瞭解經濟學。


    # 所有的權力都去了哪？


    政治科學家也愈來愈把人類政治結構，想成資料處理系統。一如資本主義和共產主義，民主和專制在本質上也就是兩套關於蒐集'
