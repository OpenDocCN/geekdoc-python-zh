- md: '障礙終於在大約五千年前打破了：蘇美人發明了文字與金錢。這兩者就像是雙胞胎，同時、同地由同樣的父母產出，讓人突破了人類大腦的資料處理限制。文字和金錢讓人開始能夠向成千上萬的人收稅，組織起複雜的官僚體系，打造出遼闊的王國。在蘇美，這些王國都是由同為人類的神職領袖來領導，以神之名統治管理。在鄰近的尼羅河谷則是更進一步，將神職領袖直接與神結合，創造出活生生的神祇——法老。


