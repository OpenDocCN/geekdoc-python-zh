    但可以購買更多士兵（只在有必要的時候），還能繼續擴大對生產的投資。很快的，村莊就能升級成城鎮；然後，能蓋出大學、港口和工廠；接著，能夠探索海洋；最終建立文明，贏得遊戲。


    然而，經濟真能永遠維持成長嗎？會不會有一天耗盡資源，終歸停止？為了確保永遠成長，我們必須找到永不枯竭的資源。


    解決方法之一，就是探索、征服新的土地。幾個世紀以來，不論是歐洲經濟成長、或是資本主義制度擴張，確實都有賴於帝國在海外的征服行動。不過，地球上的島嶼和大陸就只有這麼多。雖然某些企業家確實也打算探索征服新的行星、甚至是星系，但與此同時，現代經濟還是得找到更好的擴張方式。


    這時，是科學為現代提供了這個答案。在前面的例子裡，狐狸經濟之所以不能成長，是因為狐狸不知道如何讓兔子生得更多。兔子經濟之所以停滯，是因為兔子不知道如何讓草長得更快。然而，人類經濟之所以能夠成長，是因為人類可以找出新的原料、新的能源。


    傳統把世界看成一塊固定大小的餅，隱藏的假設是世界上只有兩種資源：原物料和能源。事實上，資源有三種：原物料、能源，還有知識。原物料和能源取之有盡：用得愈多，就剩下愈少。相反的，知識卻是不斷成長：用得愈多，反而擁有愈多，而且隨著知識不斷增長，還能帶來更多原物料和能源。


    如果我投資一億美元探勘石油，而且在阿拉斯加成功找到一片油田，我手上會有更多石油，但我的孫子能擁有的石油就少了。相'
  - '[PAGE 241]


    人類大命運


    較之下，如果我投資一億美元研究太陽能，而且成功找到更有效利用太陽能的新方法，我和我的孫子都能擁有更多能源。


    幾千年來，人類之所以無法用科學來推動成長，是因為大家誤以為各種宗教經典和古老傳統裡，已經提供了世界所有重要知識。如果石油公司相信已經找出了全球所有的油田，就不可能再浪費時間和金錢來探勘。同樣的，如果人類文化覺得已經知道了所有該知道的事，就不會費心尋找新的知識。而在現代之前，這正是大多數人類文明所持的立場。


    然而，科學革命打破了人類這種天真的信念。科學最大的發現正是讓人類發現自己的無知。人類發現自己對這個世界，所知竟如此之少，就突然有了很好的理由，要去追求新知，於是開啟了用科學推動進步的道路。


    一代接著一代，科學讓我們找到了新的能源、新的原物料、更好的機械技術、新的生產方法。到了此時此刻，人類手中的能源和原物料已遠超以往，整體產能一飛衝天。蒸汽機、內燃機和電腦等種種發明，打造出過去從來沒有的全新產業。


    展望二十年後的情形，我們可以信心滿滿，預期在2036年的生產和消費，都會遠超今日。我們相信奈米科技、基因工程和人工智慧，能夠再次為「生產」重新定義，在我們這個不斷擴大的超市裡開出新的商品區。


    # 方舟症候群


    因此，資源短缺的問題看來很有機會克服，但現代經濟真正的敵人是生態崩潰。不論是科學進步或經濟成長，都發生在地球這個


    238'
