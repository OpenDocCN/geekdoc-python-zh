    # 第9章


    # 自由主義大崩解


    上一章簡單回顧了近來的科學發現對自由主義哲學有何傷害，現在則該來檢視這些發現對實際生活有何影響。自由主義推崇自由市場和民主選舉，是因為自由主義相信每個人都獨一無二、各有價值，而且這些人的自由選擇就是權威的本源。但是在二十一世紀，有三項關於「實用」的發展，可能會讓這種信念成為明日黃花：


    +   一、人類將會失去在經濟和軍事上的用途，

    因此政經體系將不再繼續認同人類有太多價值。

    二、政經體系仍然認為人類整體有其價值，但個人則無價值。

    三、政經體系仍然會認為某些獨特的個人有其價值，

    但這些人會是一群超人類的精英階級，而不是一般大眾。


    讓我們仔細檢視這三項威脅。第一，科技發展將使人類不再具備經濟和軍事上的用途：這點雖然不會從哲學上推翻自由主義，但在實際生活中，卻很難想像民主制度、自由市場和其他自由主義制'
