    \n## 新議題之三：智人將演化為「神人」\n\n  我們並不知道這些眼前的道路，會把我們引向何方，也不知道我們那些像神一般的後代，會是什麼樣子。要預測未來，從來都不容易，而各種革命性的生物科技，又讓難上加難。原因就在於，要預測新科技對交通、通訊、能源等領域的影響，已經十分困難，更別說運用科技將人類升級了，那可是一項完全不同的挑戰。因為這有可能會徹底改變人類的心靈和欲望，而我們還抱持著現今的心靈和欲望，自然無法料到未來會是如何。\n\
    \n  幾千年來，歷史一直充滿工技、經濟、社會和政治的動盪，然而卻有一件事自始未變：人類本身。現在人類擁有的工具和體制，已經和《聖經》時代大為不同了，但是人類心靈的深層結構仍然相同。正因如此，我們現在觀看《聖經》、《論語》、或者是蘇弗克里茲（Sophocles）和尤里庇狄思（Euripides）的希臘悲劇，依然能從字裡行間找到自我。這些經典的創作者和我們都是一樣的人類，於是我們覺得這些典籍裡說的就是我們。在現代劇場的作品裡，伊底帕斯、哈姆雷特和奧賽羅，可能是穿著牛仔褲和T恤，而且還有臉書帳號，但他們的情感衝突卻和原劇並無不同。\n\
    \n  然而，一旦科技讓我們能夠重新打造人類的心靈，智人就會消失，人類的歷史就會告一段落了，另一個全新的過程將要開始，而這將會是你我這種人無法理解的過程。許多學者試圖預測世界到了2100年或2200年將會如何，但這是浪費時間。任何預測要有價值，就必須考量人類心靈被重新打造的影響，可是這件事本身就無法考量。有個問題是：「像我們這樣的人，會用生物科技來做什麼？」這個問題已經有了許多很好的答案。但還有一個問題：「對於心靈不像我們的人，又會用生物科技來做什麼？」這個問題至今尚無良好解答。我們能說的只有：像我們這樣的人，很有可能會用生物科技來重新打造人類的心靈，而以我們現在的心靈，無法預測接下來將會如何。\n\
    \n  雖然因為以上種種，我們無法確知相關細節，但仍然能夠肯定歷史的大方向為何。在二十一世紀，人類的第三大議題就會是為人類取得神一般的創造能力及毀滅能力，將「智人」演化為「神人」。這第三項新議題，顯然會將前兩項新議題納入其中，而且也正是由前兩項新議題所推動。\n\
    \n  我們希望擁有重新打造身體和心靈的能力，首要目的當然是為了逃避老死和痛苦，但等到真擁有了這些能力，誰知道我們還會做什麼應用？因此，我們也可以說，人類的新議題其實只有一個真正的議題（但有許多分支）：取得神性。\n\
    \n## 「神人」不是萬能的神\n\n  如果你覺得這聽起來實在太不科學、或覺得根本是胡言亂語，那是因為大眾往往誤解神性的意義。神性並不是某個模糊的形而上特質，也不是所謂的全能。這裡說要讓人類演化為神，講的比較像是希臘神話或印度教的諸神，而不是《聖經》裡那天上全能的父。我們的後代還是會各有弱點、怪癖和限制，就像宙斯和因陀羅也並非完美。只不過，他們的愛、恨、創造和毀滅，都可能在規模上遠大於現今。\n\
    \n  縱觀歷史，一般相信大多數的神並不是無所不能，而只是擁有特定的超能力，像是能夠設計和創造生命、能夠改造自己的身體、能夠控制環境和天氣、能夠讀心及遠距溝通、能夠以高速移動，當然也包括能夠逃避死亡而永生。人類正努力取得以上所有超能力，甚至更多超能力。\n\
    \n  某些數千年前認為如同神蹟般的能力，今日已經司空見慣，我們連想都很少想到。現代一般人要移動或是遠距通訊，可能要比希臘、印度或非洲的某些舊神祇，還來得容易。像是奈及利亞的伊博人（Igbo）相信，造物神「丘格烏」（Chukwu）原本是打算讓人永遠不死。他派了一隻狗來告訴人類，如果有人死了，只要在屍體旁邊灑上一些灰，就能起死回生。不幸的是這隻狗覺得很累，一路上拖拖拉拉。心急的丘格烏於是又派了一頭羊，叫牠趕快把這個重要消息傳過去。很遺憾，羊氣喘吁吁趕到之後，卻把指示講錯了，要人把死者給埋葬，於是死亡成為定案。這正是為何我們至今還難免一死的緣由。如果丘格烏能有個推特帳號，而不是靠著懶狗或笨羊來傳遞消息，不就太好了嗎！\n\
    \n  在古代農業社會，許多宗教對於形而上或來世的問題，興趣缺缺，只著重一項非常俗世的議題：如何增加農業的產量。因此，《舊約聖經》裡的上帝可從未承諾死後會有什麼獎勵或懲罰，反而是向以色列人說：「你們若留意聽從我今日所吩咐的誡命……我必按時降秋雨春雨在你們的地上，使你們可以收藏五穀、新酒和油，也必使你吃得飽足，並使田野為你的牲畜長草。你們要謹慎，免得心中受迷惑，就偏離正路，去侍奉敬拜別神。耶和華的怒氣向你們發作，就使天閉塞不下雨，地也不出產，使你們在耶和華所賜給你們的美地上速速滅亡。」（《申命記》第11章第13至17節）\n\
    \n  現在科學家能做的，會比《舊約聖經》的上帝好得多。靠著人工肥料、工業用殺蟲劑和基因改造作物，現在的農業產量已經超越了古代農民對神祇的最高期望。而且，氣候炎炎的以色列也無須再擔心哪位憤怒的神，會使天閉塞不下雨，因為最近以色列已經在地中海沿岸建好一座巨大的海水淡化廠，可以直接從海中取水來喝。\n\
    \n  到目前為止，我們是靠著日新月異的科技，創造出愈來愈好的工具，來與眾家舊神競爭。而在不太遙遠的將來，我們就有可能創造出超人類（superhuman），不只在工具上贏過遠古神祇，就連身體和智力也不落神後。然而，如果真有那麼一天，神性也將會變得像是現在的網路空間一樣平凡無奇；而網路空間正是我們早已習慣、但其實是奇蹟中的奇蹟。\n\
    \n  我們可以相當確定，人類會朝神性邁進，因為人類有太多理由會渴望這樣的演化，而且也有太多方式能達到這樣的目標。就算某一條原本看來很有希望的路，其實是死胡同，仍然能有其他替代路線。舉例來說，我們可能發現人類基因組實在太複雜、無法做大規模操弄，但這並不影響我們繼續開發人工智慧、奈米機器人、或是腦機介面（brain-computer\
    \ interface）。\n\n  話雖如此，我們卻也沒有必要驚慌——至少不必馬上驚慌。要將智人演化為神人，會是漸進的過程，而不是好萊塢式的天啟。並不會忽然出現一群反抗人類的機器人，使得智人遭到滅種。反而可能是智人將自己一步一步升級演化，在過程中持續與機器人和電腦融合，直到某天我們的後代回顧這段歷史，才赫然發現：自己已經不再是那個曾經寫下《聖經》、建起長城、或會因為卓別林的滑稽動作而發笑的動物了。\n\
    \n  這一切並不是在一天或一年後發生，而是透過無數看來平凡的作為，日日默默進行當中。每天都有數百萬的人們決定，要把更多生活的控制權交給智慧型手機，又或是嘗試某種更有效的新型抗憂鬱藥物。在追求健康、快樂和力量的過程中，人類慢慢改變了自己的特質，特質於是一個又一個發生了變化，直到智人不再是智人。\n\
    \n## 可以請哪位踩個煞車嗎？\n\n  我們說得平靜，但很多人聽到這些可能性，卻會十分恐慌。他們甘心聽從智慧型手機要他們做的事，也很願意吃醫師開的任何處方藥物，但只要一聽到升級演化成超人類，就會說：「我希望到時候我已經死了。」有個朋友就曾告訴我，她對於變老最擔心的一點，是怕自己與時代脫節，變成一個總在懷舊的老女人，再也不懂身邊的世界，也做不出什麼貢獻。\n\
    \n  這正是我們集體做為一個物種，聽到「超人類」這種事所擔心的。我們覺得，到了那樣的世界，我們的身分、夢想、甚至恐懼，都會與時代脫節，而且再也沒有什麼可貢獻的。今天你不管是什麼身分，可能是虔誠的印度教板球運動員、或是努力向上的女同性戀記者，一到了升級演化後的世界，你就會覺得自己像是一個尼安德塔獵人，身處於華爾街，那裡完全不是你能融入的世界。\n\
    \n  尼安德塔人不用懂納斯達克指數，畢竟這兩者之間，相隔幾萬年之久。但由我們現在的意義所建構的世界，卻可能會在幾十年內就崩潰了。「希望自己到時候已經死了，免得與時代脫節！」這種願望可能將事與願違。因為，各種要讓智人升級演化的嘗試，很可能在本世紀內就讓世界大為改觀。科學研究和科技發展的速度，將遠遠超過我們大多數人所能掌握。\n\
    \n  如果和專家聊聊，很多人會說我們還需要很久的時間，才可能用基因工程產出嬰兒，或製造出堪與人腦比擬的人工智慧。然而，大多數專家所謂的很久，用的是學術經費和大學職位的時間標準。所謂很久，可能只是二十年，但絕不可能超過五十年。\n\
    \n  我還記得自己第一次用到網際網路那天。那是在1993年，當時我讀中學，和幾個哥兒們去找朋友伊多（他現在是電腦科學家）打桌球。伊多當時已經很迷電腦，在打開桌球桌之前，堅持要讓我們瞧瞧一項最新的奇蹟。他把電話線接到電腦上，按下幾個鍵。大約一分鐘，我們只聽到一堆吱吱聲、尖叫聲、嗡嗡聲，然後就是一片沉默。連線失敗！我們不停碎碎念，但伊多又試了一次。再一次、又再一次。最後他終於發出歡呼，宣布自己已經把電腦連線到附近一所大學的中央電腦了。我們問：「喔，那中央電腦有什麼啊？」伊多承認：「這個……現在還什麼都沒有。但什麼都可以放進去。」\n\
    \n## 煞不住這輛大車！❄\n\n  我們問：「可以放什麼進去？」伊多說：「我不知道啦，就什麼都可以啊。」當時聽起來實在沒什麼搞頭。於是我們打了桌球，而且接下來幾星期，有個新的樂子，就是嘲笑伊多，笑著他想得有多荒謬。在我提筆寫下這段故事的時候，這只是不到二十五年前的事。再過二十五年，誰知道世界會發生什麼事呢？\n\
    \n  正因如此，有愈來愈多的個人、團體、企業和政府，都非常認真追求著長生不死、幸福快樂、以及如神般的能力。預期壽命大幅躍升，已經讓保險公司、退休基金、公共衛生體系和財政部門心驚膽跳。現代人活得要比預期更久，而我們並沒有足夠的資金，應付年長者的退休金和醫療開支。由於未來的七十歲人有可能就像現在的四十歲人，已經有專家呼籲應提高退休年齡，並重新調整就業市場的結構。\n\
    \n  一旦人們意識到我們正以如此高速衝向未知，而且還沒法指望自己死得夠早，常有的反應就是希望有人來踩煞車，減緩我們的速度。但我們不能踩煞車，而且理由很充分。\n\
    \n  首先，沒有人知道煞車在哪兒。專家各有所長，各自精通人工智慧、奈米科技、大數據、或遺傳學與基因組，可是沒有人能成為所有領域的專家。因此，沒有人能夠真正把所有的點都連結起來，看到完整的全貌。不同領域彼此的影響錯綜複雜，就算最聰明的頭腦，也無法預料人工智慧的突破會對奈米科技有什麼影響，反之亦然。換句話說，沒有人能掌握所有最新科學發現，沒有人能預測全球經濟在十年後將會如何，也沒有人知道我們在這一片匆忙之中，將走向何方。既然再也沒有人瞭解整個系統，當然也就沒有人能夠踩煞車。\n\
    \n  第二，如果我們不知怎的成功踩了煞車，就會讓經濟崩潰，並拖著社會一起下水。後面的章節將會解釋，現代經濟要能維持，就需要不斷的、而且是無止境的成長。如果成長停止，經濟並不會溫溫順順的平靜下來，而是會轟然崩解。正因如此，資本主義才會鼓勵我們追尋不死、快樂和神性。畢竟，我們能穿幾雙鞋、能開幾輛車、能度幾個滑雪假期，這些數字都有限。然而經濟需要永遠持續成長，也就需要能永遠持續的議題——剛好就是追尋不死、快樂和神性這種事。\n\
    \n  不過，如果我們需要無止境的議題，難道快樂和不死還不夠，一定得去追尋叫人害怕的超人類能力嗎？原因就在於，這件事無法與另外兩項分割開。研發出仿生機械腿，讓截肢的病人重新能夠走路的時候，同樣的科技就能用來為健康的人演化升級。如果發現如何抑制老年失智，同樣的療法也能用來為年輕人增強記憶。\n\
    \n  治癒與演化之間，並沒有明確的界限，醫學一開始幾乎總是要拯救那些落在常態下限以下的人，但同樣的工具和知識，也因此能用來超越常態的上限。威而鋼一開始是治療血壓問題，但輝瑞公司驚喜發現，它竟然也能醫治陽痿。於是，威而鋼讓數百萬人重新獲得正常的性能力；很快的，就連沒有陽痿問題的男人也開始服用，好讓自己超越常態、得到過去未曾擁有的性能力。46\n\
    \n  發生在特定藥物的事，也有可能發生在整體醫藥領域。現代整形外科誕生於第一次世界大戰，當時是吉利斯（Harold Gillies）在英國奧爾德肖特（Aldershot）的軍醫院，醫治臉部創傷，47但他在戰後發現，同樣的技術也能用來讓無病無痛、但很醜陋的鼻子，變得更为美观。虽然整形手术仍然继续协助颜面受伤的病人，但也愈来愈常用来为健康人士增添颜值。到如今，整形外科医师在私人诊所裡荷包满满，其明确且唯一的目标，就是要让健康的人更提升、富有的人再加分。48\n\
    \n  同样的情节，也可能发生在基因工程上。如果有位亿万富翁公开宣布，他希望能为自己打造一名超级聪明的后代，可以想像舆论必然一片哗然。但真正出现的情况不会是這樣，而比较可能是一种渐进的过程。一开始，可能是有某些父母的基因，让孩子拥有极高风险染上致命的遗传疾病，于是决定采用体外受精，并对受精卵的\
    \ DNA 进行检测。如果一切正常，就万事安心；如果 DNA 检测发现大家所担心的突变，就得销毁这枚胚胎。\n\n  然而，何必一次只让一枚卵子受精呢？何不一次让多枚卵子受精，这样就算三、四枚胚胎都有缺陷，但只要有一枚正常的胚胎就行。当这种体外选择变得可接受、也够便宜，使用机会也就可能更为普及。毕竟基因突变的风险无处不在，所有人的\
    \ DNA 裡，都带有某些致病的突变、不理想的对偶基因（allele），若是只能透过有性生殖，那就像是买彩券，只能靠运气。\n\n  〔岔题一下，有一个著名、但可能出于杜撰的故事，讲的是法国小说家、诺贝尔文学奖得主法朗士（Anatole\
    \ France）和美丽而有天分的舞者伊莎朵拉·邓肯（Isadora Duncan）于 1923 年碰面时的情景。两人讨论著当时流行的优生运动，邓肯说：「想像一下，孩子有我的美丽、你的智力，该有多好！」而法朗士则回答：「你说得沒錯，但如果孩子有的是我的美麗、你的智力，又該怎麼辦？」）\n\
    \n  所以，何不取巧一下？同時讓幾個卵子受精，再挑選出最好的組合。只要等到幹細胞研究能讓我們廉價取得無限量的人類胚胎，你就能從幾百個選項，選出你最理想的寶寶，這些寶寶都帶著你的DNA、保證沒有遺傳疾病，而且也不需要未來再藉由基因工程進行修飾。將這個過程重複幾個世代，最後很容易就會製造出超人類了（或是令人毛骨悚然的反烏托邦）。\n\
    \n  但是，如果就算讓幾百個、甚至無數個卵子受精，卻都還是有致命的突變呢？難道要摧毀所有的胚胎？為什麼不把那些有問題的基因換掉就好呢？\n\n  有一項突破性案例，是和粒線體DNA（mitochondrial\
    \ DNA）有關。粒線體是人類細胞內微小的胞器，負責產生細胞所需的能量。粒線體有自己的一套基因，與細胞核中的DNA無關。如果粒線體DNA有缺陷，就會導致各種造成人體衰弱、甚至致命的疾病。\n\
    \n  使用體外受精技術，目前在技術上已經可以製造「三親寶寶」，以克服粒線體遺傳疾病。這種嬰兒的細胞核DNA來自父母，而粒線體DNA則來自第三人。2000年，美國密西根州西布魯菲德鎮的莎朗·沙瑞南（Sharon\
    \ Saarinen）生下了健康的女嬰艾蘭娜。艾蘭娜的細胞核DNA來自於母親莎朗和父親保羅，但是她的粒線體DNA來自另一位女性。從純技術的觀點來看，艾蘭娜有三位親生父母。一年後，在2001年，美國政府因為安全和倫理問題，禁止了這種技術。49\n\
    \n  然而在2015年2月3日，英國國會卻投票通過所謂的〈三親胚胎法〉，在英國允許此項技術和相關研究。50 到目前為止，要置換細胞核DNA在技術上及法律上都還不可行，但等到解決技術困難，過去允許更換缺陷粒線體DNA的相同邏輯，似乎也能套用在細胞核DNA上。\n\
    \n  而在DNA篩選及更換之後，可能的下一步就是改寫DNA。如果能夠改寫致命基因，又何必多此一舉插入外來DNA？何不直接重寫基因碼，把某個危險的突變基因改成良性版本就好？接下來，同樣的機制修改的，可能就不只是致命的基因，還包括比較不那麼致命的疾病，像是自閉症、愚笨或肥胖。畢竟，誰願意自己的孩子有這些問題呢？假設基因檢測指出，你的女兒很有可能聰明、美麗又善良，但有慢性憂鬱症；難道你不想在試管裡做點快速又無痛的處理，好讓她不要長年受苦嗎？\n\
    \n  而且既然都做這些了，為什麼不順便幫孩子再加點分？就連對完全健康的人來說，生活都夠辛苦的了，如果能讓這個小女孩的免疫系統比一般人更強、記憶力比平均更高、性格特別開朗，一定會有幫助吧？就算你不想對自己的孩子這麼做，如果鄰居都這麼做了怎麼辦？難道要讓孩子輸在起跑點上，先落後別人一大截嗎？又如果本國政府直接禁止對嬰兒做基因工程，但北韓毫無限制，於是製造出許多了不起的天才、藝術家和運動員，遙遙領先全世界，又該怎麼辦？\n\
    \n  於是，我們就像這樣一小步、一小步走著，等到哪天，就會有孩子的基因型錄，任君選購。\n\n  每次的演化升級，最初理由都為了治療。你若去找那些正在做基因工程或腦機介面實驗的教授，問問看為什麼他們要從事此類研究，他們的答案很有可能就是要治癒疾病。他們可能會說：「有了基因工程協助，我們就能戰勝癌症。而如果能直接連結大腦和電腦，就能治癒思覺失調。」或許確實如此，但這絕不會是終點。等到我們成功將大腦和電腦連結，難道只會把這種科技用來治療思覺失調？真會這麼相信的人，可能很懂大腦和電腦，但是對人類心理和社會百態，可就沒那麼瞭解了。人類只要一有重大突破，就不可能只用於治療、不用於演化升級。\n\
    \n  當然，人類對於新科技的使用，確實能夠設下限制，也真的有所限制。所以像是優生運動，便在第二次世界大戰後失寵；而像人體器官交易，雖然確實能做到，也可能相當有利有圖，但至今仍然是非常邊緣的活動。就如同謀殺他人而取得器官，可能哪天「設計嬰兒」也會在技術上變得可行，但仍舊是一種邊緣活動。\n\
    \n  正如我們已經在戰爭領域逃出了契訶夫法則的魔掌，其他領域當然也能如法炮製。我們可以允許有些槍枝出現在舞臺上，但永遠不要上膛開火。因此，我們必須在現今就認真思考人類未來的三大新議題。正因為我們已經面臨了如何使用新科技的不同選項，也就更應該清楚掌握現在的狀況，主動決定、而不要被動等著被決定。\n\
    \n## 知識的弔詭\n\n  預測人類在二十一世紀的目標為「得到不死、快樂和神性」，可能會讓某些人深感憤怒或驚恐，因此我有必要再加以澄清。\n\n  首先，並不是說二十一世紀的大多數人都會做這些事。這指的是「人類整體」將會做的事，大多數人根本不會直接參與，就算參與，也很可能只是次要角色。不可諱言，雖然饑荒、瘟疫和戰爭已經不那麼盛行了，但是在發展中國家及落後的街區裡，仍然有幾十億人必須繼續面對貧窮、疾病和暴力；然而同時間，菁英份子可能正要取得永恆的青春、如神一般的能力。這顯然不公平。有人可能"
  mdcn: "生命。大腦神經網路將由智慧軟體取代，這樣就能同時優游虛擬世界與真實世界，不受有機化學的限制。經過了四十億年徘徊在有機化合物的國度，生命終將打破藩籬，進入一片無垠的無機領域，形成我們在最瘋狂的夢中，都未曾設想的形狀。畢竟，不管以往我們的夢想再瘋狂，也還是不脫有機化學的限制。\n\
    \n  離開有機領域後，生命或許也就終於能夠離開地球。四十億年來，生命之所以還是局限在地球上的一小部分，是因為天擇讓所有生物都完全得依靠地球這顆巨大飛岩的獨特情境。就連現在最強韌的細菌，也無法在火星上生存。但如果是非有機的人工智慧，就比較容易殖民外行星了。\n\
    \n  因此，用無機生命取代有機生命之後，可能就播下了未來銀河帝國的種子。但領導者不見得是像《星艦迷航記》裡的庫克船長，反而可能比較像是百科（Mr. Data）。\n\
    \n## 新議題之三：智人將演化為「神人」\n\n  我們並不知道這些眼前的道路，會把我們引向何方，也不知道我們那些像神一般的後代，會是什麼樣子。要預測未來，從來都不容易，而各種革命性的生物科技，又讓難上加難。原因就在於，要預測新科技對交通、通訊、能源等領域的影響，已經十分困難，更別說運用科技將人類升級了，那可是一項完全不同的挑戰。因為這有可能會徹底改變人類的心靈和欲望，而我們還抱持著現今的心靈和欲望，自然無法料到未來會是如何。\n\
    \n  幾千年來，歷史一直充滿工技、經濟、社會和政治的動盪，然而卻有一件事自始未變：人類本身。現在人類擁有的工具和體制，已經和《聖經》時代大為不同了，但是人類心靈的深層結構仍然相同。正因如此，我們現在觀看《聖經》、《論語》、或者是蘇弗克里茲（Sophocles）和尤里庇狄思（Euripides）的希臘悲劇，依然能從字裡行間找到自我。這些經典的創作者和我們都是一樣的人類，於是我們覺得這些典籍裡說的就是我們。在現代劇場的作品裡，伊底帕斯、哈姆雷特和奧賽羅，可能是穿著牛仔褲和T恤，而且還有臉書帳號，但他們的情感衝突卻和原劇並無不同。\n\
    \n  然而，一旦科技讓我們能夠重新打造人類的心靈，智人就會消失，人類的歷史就會告一段落了，另一個全新的過程將要開始，而這將會是你我這種人無法理解的過程。許多學者試圖預測世界到了2100年或2200年將會如何，但這是浪費時間。任何預測要有價值，就必須考量人類心靈被重新打造的影響，可是這件事本身就無法考量。有個問題是：「像我們這樣的人，會用生物科技來做什麼？」這個問題已經有了許多很好的答案。但還有一個問題：「對於心靈不像我們的人，又會用生物科技來做什麼？」這個問題至今尚無良好解答。我們能說的只有：像我們這樣的人，很有可能會用生物科技來重新打造人類的心靈，而以我們現在的心靈，無法預測接下來將會如何。\n\
    \n  雖然因為以上種種，我們無法確知相關細節，但仍然能夠肯定歷史的大方向為何。在二十一世紀，人類的第三大議題就會是為人類取得神一般的創造能力及毀滅能力，將「智人」演化為「神人」。這第三項新議題，顯然會將前兩項新議題納入其中，而且也正是由前兩項新議題所推動。\n\
    \n  我們希望擁有重新打造身體和心靈的能力，首要目的當然是為了逃避老死和痛苦，但等到真擁有了這些能力，誰知道我們還會做什麼應用？因此，我們也可以說，人類的新議題其實只有一個真正的議題（但有許多分支）：取得神性。\n\
    \n## 「神人」不是萬能的神\n\n  如果你覺得這聽起來實在太不科學、或覺得根本是胡言亂語，那是因為大眾往往誤解神性的意義。神性並不是某個模糊的形而上特質，也不是所謂的全能。這裡說要讓人類演化為神，講的比較像是希臘神話或印度教的諸神，而不是《聖經》裡那天上全能的父。我們的後代還是會各有弱點、怪癖和限制，就像宙斯和因陀羅也並非完美。只不過，他們的愛、恨、創造和毀滅，都可能在規模上遠大於現今。\n\
    \n  縱觀歷史，一般相信大多數的神並不是無所不能，而只是擁有特定的超能力，像是能夠設計和創造生命、能夠改造自己的身體、能夠控制環境和天氣、能夠讀心及遠距溝通、能夠以高速移動，當然也包括能夠逃避死亡而永生。人類正努力取得以上所有超能力，甚至更多超能力。\n\
    \n  某些數千年前認為如同神蹟般的能力，今日已經司空見慣，我們連想都很少想到。現代一般人要移動或是遠距通訊，可能要比希臘、印度或非洲的某些舊神祇，還來得容易。像是奈及利亞的伊博人（Igbo）相信，造物神「丘格烏」（Chukwu）原本是打算讓人永遠不死。他派了一隻狗來告訴人類，如果有人死了，只要在屍體旁邊灑上一些灰，就能起死回生。不幸的是這隻狗覺得很累，一路上拖拖拉拉。心急的丘格烏於是又派了一頭羊，叫牠趕快把這個重要消息傳過去。很遺憾，羊氣喘吁吁趕到之後，卻把指示講錯了，要人把死者給埋葬，於是死亡成為定案。這正是為何我們至今還難免一死的緣由。如果丘格烏能有個推特帳號，而不是靠著懶狗或笨羊來傳遞消息，不就太好了嗎！\n\
    \n  在古代農業社會，許多宗教對於形而上或來世的問題，興趣缺缺，只著重一項非常俗世的議題：如何增加農業的產量。因此，《舊約聖經》裡的上帝可從未承諾死後會有什麼獎勵或懲罰，反而是向以色列人說：「你們若留意聽從我今日所吩咐的誡命……我必按時降秋雨春雨在你們的地上，使你們可以收藏五穀、新酒和油，也必使你吃得飽足，並使田野為你的牲畜長草。你們要謹慎，免得心中受迷惑，就偏離正路，去侍奉敬拜別神。耶和華的怒氣向你們發作，就使天閉塞不下雨，地也不出產，使你們在耶和華所賜給你們的美地上速速滅亡。」（《申命記》第11章第13至17節）\n\
    \n  現在科學家能做的，會比《舊約聖經》的上帝好得多。靠著人工肥料、工業用殺蟲劑和基因改造作物，現在的農業產量已經超越了古代農民對神祇的最高期望。而且，氣候炎炎的以色列也無須再擔心哪位憤怒的神，會使天閉塞不下雨，因為最近以色列已經在地中海沿岸建好一座巨大的海水淡化廠，可以直接從海中取水來喝。\n\
    \n  到目前為止，我們是靠著日新月異的科技，創造出愈來愈好的工具，來與眾家舊神競爭。而在不太遙遠的將來，我們就有可能創造出超人類（superhuman），不只在工具上贏過遠古神祇，就連身體和智力也不落神後。然而，如果真有那麼一天，神性也將會變得像是現在的網路空間一樣平凡無奇；而網路空間正是我們早已習慣、但其實是奇蹟中的奇蹟。\n\
    \n  我們可以相當確定，人類會朝神性邁進，因為人類有太多理由會渴望這樣的演化，而且也有太多方式能達到這樣的目標。就算某一條原本看來很有希望的路，其實是死胡同，仍然能有其他替代路線。舉例來說，我們可能發現人類基因組實在太複雜、無法做大規模操弄，但這並不影響我們繼續開發人工智慧、奈米機器人、或是腦機介面（brain-computer\
    \ interface）。\n\n  話雖如此，我們卻也沒有必要驚慌——至少不必馬上驚慌。要將智人演化為神人，會是漸進的過程，而不是好萊塢式的天啟。並不會忽然出現一群反抗人類的機器人，使得智人遭到滅種。反而可能是智人將自己一步一步升級演化，在過程中持續與機器人和電腦融合，直到某天我們的後代回顧這段歷史，才赫然發現：自己已經不再是那個曾經寫下《聖經》、建起長城、或會因為卓別林的滑稽動作而發笑的動物了。\n\
    \n  這一切並不是在一天或一年後發生，而是透過無數看來平凡的作為，日日默默進行當中。每天都有數百萬的人們決定，要把更多生活的控制權交給智慧型手機，又或是嘗試某種更有效的新型抗憂鬱藥物。在追求健康、快樂和力量的過程中，人類慢慢改變了自己的特質，特質於是一個又一個發生了變化，直到智人不再是智人。\n\
    \n## 可以請哪位踩個煞車嗎？\n\n  我們說得平靜，但很多人聽到這些可能性，卻會十分恐慌。他們甘心聽從智慧型手機要他們做的事，也很願意吃醫師開的任何處方藥物，但只要一聽到升級演化成超人類，就會說：「我希望到時候我已經死了。」有個朋友就曾告訴我，她對於變老最擔心的一點，是怕自己與時代脫節，變成一個總在懷舊的老女人，再也不懂身邊的世界，也做不出什麼貢獻。\n\
    \n  這正是我們集體做為一個物種，聽到「超人類」這種事所擔心的。我們覺得，到了那樣的世界，我們的身分、夢想、甚至恐懼，都會與時代脫節，而且再也沒有什麼可貢獻的。今天你不管是什麼身分，可能是虔誠的印度教板球運動員、或是努力向上的女同性戀記者，一到了升級演化後的世界，你就會覺得自己像是一個尼安德塔獵人，身處於華爾街，那裡完全不是你能融入的世界。\n\
    \n  尼安德塔人不用懂納斯達克指數，畢竟這兩者之間，相隔幾萬年之久。但由我們現在的意義所建構的世界，卻可能會在幾十年內就崩潰了。「希望自己到時候已經死了，免得與時代脫節！」這種願望可能將事與願違。因為，各種要讓智人升級演化的嘗試，很可能在本世紀內就讓世界大為改觀。科學研究和科技發展的速度，將遠遠超過我們大多數人所能掌握。\n\
    \n  如果和專家聊聊，很多人會說我們還需要很久的時間，才可能用基因工程產出嬰兒，或製造出堪與人腦比擬的人工智慧。然而，大多數專家所謂的很久，用的是學術經費和大學職位的時間標準。所謂很久，可能只是二十年，但絕不可能超過五十年。\n\
    \n  我還記得自己第一次用到網際網路那天。那是在1993年，當時我讀中學，和幾個哥兒們去找朋友伊多（他現在是電腦科學家）打桌球。伊多當時已經很迷電腦，在打開桌球桌之前，堅持要讓我們瞧瞧一項最新的奇蹟。他把電話線接到電腦上，按下幾個鍵。大約一分鐘，我們只聽到一堆吱吱聲、尖叫聲、嗡嗡聲，然後就是一片沉默。連線失敗！我們不停碎碎念，但伊多又試了一次。再一次、又再一次。最後他終於發出歡呼，宣布自己已經把電腦連線到附近一所大學的中央電腦了。我們問：「喔，那中央電腦有什麼啊？」伊多承認：「這個……現在還什麼都沒有。但什麼都可以放進去。」\n\
    \n## 煞不住這輛大車！❄\n\n  我們問：「可以放什麼進去？」伊多說：「我不知道啦，就什麼都可以啊。」當時聽起來實在沒什麼搞頭。於是我們打了桌球，而且接下來幾星期，有個新的樂子，就是嘲笑伊多，笑著他想得有多荒謬。在我提筆寫下這段故事的時候，這只是不到二十五年前的事。再過二十五年，誰知道世界會發生什麼事呢？\n\
    \n  正因如此，有愈來愈多的個人、團體、企業和政府，都非常認真追求著長生不死、幸福快樂、以及如神般的能力。預期壽命大幅躍升，已經讓保險公司、退休基金、公共衛生體系和財政部門心驚膽跳。現代人活得要比預期更久，而我們並沒有足夠的資金，應付年長者的退休金和醫療開支。由於未來的七十歲人有可能就像現在的四十歲人，已經有專家呼籲應提高退休年齡，並重新調整就業市場的結構。\n\
    \n  一旦人們意識到我們正以如此高速衝向未知，而且還沒法指望自己死得夠早，常有的反應就是希望有人來踩煞車，減緩我們的速度。但我們不能踩煞車，而且理由很充分。\n\
    \n  首先，沒有人知道煞車在哪兒。專家各有所長，各自精通人工智慧、奈米科技、大數據、或遺傳學與基因組，可是沒有人能成為所有領域的專家。因此，沒有人能夠真正把所有的點都連結起來，看到完整的全貌。不同領域彼此的影響錯綜複雜，就算最聰明的頭腦，也無法預料人工智慧的突破會對奈米科技有什麼影響，反之亦然。換句話說，沒有人能掌握所有最新科學發現，沒有人能預測全球經濟在十年後將會如何，也沒有人知道我們在這一片匆忙之中，將走向何方。既然再也沒有人瞭解整個系統，當然也就沒有人能夠踩煞車。\n\
    \n  第二，如果我們不知怎的成功踩了煞車，就會讓經濟崩潰，並拖著社會一起下水。後面的章節將會解釋，現代經濟要能維持，就需要不斷的、而且是無止境的成長。如果成長停止，經濟並不會溫溫順順的平靜下來，而是會轟然崩解。正因如此，資本主義才會鼓勵我們追尋不死、快樂和神性。畢竟，我們能穿幾雙鞋、能開幾輛車、能度幾個滑雪假期，這些數字都有限。然而經濟需要永遠持續成長，也就需要能永遠持續的議題——剛好就是追尋不死、快樂和神性這種事。\n\
    \n  不過，如果我們需要無止境的議題，難道快樂和不死還不夠，一定得去追尋叫人害怕的超人類能力嗎？原因就在於，這件事無法與另外兩項分割開。研發出仿生機械腿，讓截肢的病人重新能夠走路的時候，同樣的科技就能用來為健康的人演化升級。如果發現如何抑制老年失智，同樣的療法也能用來為年輕人增強記憶。\n\
    \n  治癒與演化之間，並沒有明確的界限，醫學一開始幾乎總是要拯救那些落在常態下限以下的人，但同樣的工具和知識，也因此能用來超越常態的上限。威而鋼一開始是治療血壓問題，但輝瑞公司驚喜發現，它竟然也能醫治陽痿。於是，威而鋼讓數百萬人重新獲得正常的性能力；很快的，就連沒有陽痿問題的男人也開始服用，好讓自己超越常態、得到過去未曾擁有的性能力。46\n\
    \n  發生在特定藥物的事，也有可能發生在整體醫藥領域。現代整形外科誕生於第一次世界大戰，當時是吉利斯（Harold Gillies）在英國奧爾德肖特（Aldershot）的軍醫院，醫治臉部創傷，47但他在戰後發現，同樣的技術也能用來讓無病無痛、但很醜陋的鼻子，變得更为美观。虽然整形手术仍然继续协助颜面受伤的病人，但也愈来愈常用来为健康人士增添颜值。到如今，整形外科医师在私人诊所裡荷包满满，其明确且唯一的目标，就是要让健康的人更提升、富有的人再加分。48\n\
    \n  同样的情节，也可能发生在基因工程上。如果有位亿万富翁公开宣布，他希望能为自己打造一名超级聪明的后代，可以想像舆论必然一片哗然。但真正出现的情况不会是這樣，而比较可能是一种渐进的过程。一开始，可能是有某些父母的基因，让孩子拥有极高风险染上致命的遗传疾病，于是决定采用体外受精，并对受精卵的\
    \ DNA 进行检测。如果一切正常，就万事安心；如果 DNA 检测发现大家所担心的突变，就得销毁这枚胚胎。\n\n  然而，何必一次只让一枚卵子受精呢？何不一次让多枚卵子受精，这样就算三、四枚胚胎都有缺陷，但只要有一枚正常的胚胎就行。当这种体外选择变得可接受、也够便宜，使用机会也就可能更为普及。毕竟基因突变的风险无处不在，所有人的\
    \ DNA 裡，都带有某些致病的突变、不理想的对偶基因（allele），若是只能透过有性生殖，那就像是买彩券，只能靠运气。\n\n  〔岔题一下，有一个著名、但可能出于杜撰的故事，讲的是法国小说家、诺贝尔文学奖得主法朗士（Anatole\
    \ France）和美丽而有天分的舞者伊莎朵拉·邓肯（Isadora Duncan）于 1923 年碰面时的情景。两人讨论著当时流行的优生运动，邓肯说：「想像一下，孩子有我的美丽、你的智力，该有多好！」而法朗士则回答：「你说得沒錯，但如果孩子有的是我的美麗、你的智力，又該怎麼辦？」）\n\
    \n  所以，何不取巧一下？同時讓幾個卵子受精，再挑選出最好的組合。只要等到幹細胞研究能讓我們廉價取得無限量的人類胚胎，你就能從幾百個選項，選出你最理想的寶寶，這些寶寶都帶著你的DNA、保證沒有遺傳疾病，而且也不需要未來再藉由基因工程進行修飾。將這個過程重複幾個世代，最後很容易就會製造出超人類了（或是令人毛骨悚然的反烏托邦）。\n\
    \n  但是，如果就算讓幾百個、甚至無數個卵子受精，卻都還是有致命的突變呢？難道要摧毀所有的胚胎？為什麼不把那些有問題的基因換掉就好呢？\n\n  有一項突破性案例，是和粒線體DNA（mitochondrial\
    \ DNA）有關。粒線體是人類細胞內微小的胞器，負責產生細胞所需的能量。粒線體有自己的一套基因，與細胞核中的DNA無關。如果粒線體DNA有缺陷，就會導致各種造成人體衰弱、甚至致命的疾病。\n\
    \n  使用體外受精技術，目前在技術上已經可以製造「三親寶寶」，以克服粒線體遺傳疾病。這種嬰兒的細胞核DNA來自父母，而粒線體DNA則來自第三人。2000年，美國密西根州西布魯菲德鎮的莎朗·沙瑞南（Sharon\
    \ Saarinen）生下了健康的女嬰艾蘭娜。艾蘭娜的細胞核DNA來自於母親莎朗和父親保羅，但是她的粒線體DNA來自另一位女性。從純技術的觀點來看，艾蘭娜有三位親生父母。一年後，在2001年，美國政府因為安全和倫理問題，禁止了這種技術。49\n\
    \n  然而在2015年2月3日，英國國會卻投票通過所謂的〈三親胚胎法〉，在英國允許此項技術和相關研究。50 到目前為止，要置換細胞核DNA在技術上及法律上都還不可行，但等到解決技術困難，過去允許更換缺陷粒線體DNA的相同邏輯，似乎也能套用在細胞核DNA上。\n\
    \n  而在DNA篩選及更換之後，可能的下一步就是改寫DNA。如果能夠改寫致命基因，又何必多此一舉插入外來DNA？何不直接重寫基因碼，把某個危險的突變基因改成良性版本就好？接下來，同樣的機制修改的，可能就不只是致命的基因，還包括比較不那麼致命的疾病，像是自閉症、愚笨或肥胖。畢竟，誰願意自己的孩子有這些問題呢？假設基因檢測指出，你的女兒很有可能聰明、美麗又善良，但有慢性憂鬱症；難道你不想在試管裡做點快速又無痛的處理，好讓她不要長年受苦嗎？\n\
    \n  而且既然都做這些了，為什麼不順便幫孩子再加點分？就連對完全健康的人來說，生活都夠辛苦的了，如果能讓這個小女孩的免疫系統比一般人更強、記憶力比平均更高、性格特別開朗，一定會有幫助吧？就算你不想對自己的孩子這麼做，如果鄰居都這麼做了怎麼辦？難道要讓孩子輸在起跑點上，先落後別人一大截嗎？又如果本國政府直接禁止對嬰兒做基因工程，但北韓毫無限制，於是製造出許多了不起的天才、藝術家和運動員，遙遙領先全世界，又該怎麼辦？\n\
    \n  於是，我們就像這樣一小步、一小步走著，等到哪天，就會有孩子的基因型錄，任君選購。\n\n  每次的演化升級，最初理由都為了治療。你若去找那些正在做基因工程或腦機介面實驗的教授，問問看為什麼他們要從事此類研究，他們的答案很有可能就是要治癒疾病。他們可能會說：「有了基因工程協助，我們就能戰勝癌症。而如果能直接連結大腦和電腦，就能治癒思覺失調。」或許確實如此，但這絕不會是終點。等到我們成功將大腦和電腦連結，難道只會把這種科技用來治療思覺失調？真會這麼相信的人，可能很懂大腦和電腦，但是對人類心理和社會百態，可就沒那麼瞭解了。人類只要一有重大突破，就不可能只用於治療、不用於演化升級。\n\
    \n  當然，人類對於新科技的使用，確實能夠設下限制，也真的有所限制。所以像是優生運動，便在第二次世界大戰後失寵；而像人體器官交易，雖然確實能做到，也可能相當有利有圖，但至今仍然是非常邊緣的活動。就如同謀殺他人而取得器官，可能哪天「設計嬰兒」也會在技術上變得可行，但仍舊是一種邊緣活動。\n\
    \n  正如我們已經在戰爭領域逃出了契訶夫法則的魔掌，其他領域當然也能如法炮製。我們可以允許有些槍枝出現在舞臺上，但永遠不要上膛開火。因此，我們必須在現今就認真思考人類未來的三大新議題。正因為我們已經面臨了如何使用新科技的不同選項，也就更應該清楚掌握現在的狀況，主動決定、而不要被動等著被決定。\n\
    \n## 知識的弔詭\n\n  預測人類在二十一世紀的目標為「得到不死、快樂和神性」，可能會讓某些人深感憤怒或驚恐，因此我有必要再加以澄清。\n\n  首先，並不是說二十一世紀的大多數人都會做這些事。這指的是「人類整體」將會做的事，大多數人根本不會直接參與，就算參與，也很可能只是次要角色。不可諱言，雖然饑荒、瘟疫和戰爭已經不那麼盛行了，但是在發展中國家及落後的街區裡，仍然有幾十億人必須繼續面對貧窮、疾病和暴力；然而同時間，菁英份子可能正要取得永恆的青春、如神一般的能力。這顯然不公平。有人可能"
