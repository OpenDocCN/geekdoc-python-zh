    利用功能性磁振造影（fMRI）掃描、植入電極和其他複雜的小工具，科學家已經能夠肯定：在大腦中的電流與各種主觀經驗之間存在著相關性、甚至是因果關係。只要觀測大腦的活動，科學家就能知道你是醒著、正在做夢、或是處於熟睡狀態。他們只要在你眼前閃過一個圖像，時間稍微超過意識感知的門檻值，就能判斷你是否意識到這個圖像，而且完全不需要問你問題。他們甚至能找出某個腦神經元與特定心思的連結，像是找出一個「柯林頓」神經元、或是一個「辛普森」神經元——在「柯林頓」神經元活躍時，這人就是正在想著美國第四十二任總統；如果在這人眼前秀出辛普森的圖像，同名的神經元也必然會活躍起來。


    把範圍放寬，科學家也知道：如果大腦某區域的電化學活動特別活躍，那表示你可能正在生氣。如果這一區平息了、另一區又活躍起來，那表示你可能正在滋生愛意。而且事實上，科學家已經可以用電流刺激正確的神經元，誘發出憤怒或愛的感覺。然而，光是電子跑來跑去，又怎麼會變成一個主觀的柯林頓圖像，又或是憤怒或愛這種主觀感受？


    最常見的解释認為，大腦是相當複雜的系統，有超過八百億個神經元互相連結，組成無數細密的網路。而在幾十億的神經元來回'
  - '[PAGE 126]


    送出幾十億個電訊號時，主觀經驗就此浮現。雖然電訊號的傳送和接收，只是很簡單的生化現象，但這些訊號的互動卻會創造出複雜得多的東西：意識流。我們在許多其他領域，也能觀察到同樣的動態。譬如，單一輛車的移動只是個簡單的動作，但幾百萬輛同時移動及互動，就出現了交通堵塞。單一股票的買賣再簡單不過，但幾百萬股民同時買賣著幾百萬張股票，就可能造成讓專家也跌破眼鏡的經濟危機。


    然而，這種解釋等於什麼都沒解釋，只不過是確認這個問題非常複雜，但並未解釋為何某個現象（幾十億個電訊號從這到那）會創造出另一個完全不同的現象（憤怒或愛的主觀經驗）。至於要用其他也很複雜的過程（例如交通堵塞和經濟危機）來打比方，這種做法也有漏洞。究竟為什麼會交通堵塞？如果你只看某一輛車，永遠都不會明白，因為堵塞是許多車之間互動的結果。A車影響了B車的移動，B車又擋到了C車的路，諸如此類。所以，只要你把所有相關車輛的移動狀況、彼此的互動都對應出來，就能找出交通堵塞的完整解釋。去問「這些移動是怎麼創造出交通堵塞的呢？」其實並沒有意義，因為「交通堵塞」只是人類創出來的一個抽象詞彙，講的正是這裡所有車輛移動事件的集合。


