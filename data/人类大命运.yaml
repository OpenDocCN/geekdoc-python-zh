    ## 第7章 人文主義革命


    ![](img/319dca06e22893e942053da0432e9f19_266_0.png)


    30. 人文主義經濟：顧客永遠是對的。


    ![](img/319dca06e22893e942053da0432e9f19_267_0.png)


    31. 人文主義美學：看的人覺得美，就是美。

    照片中的白色瓷器，就是杜象的作品「噴泉」，在蘇格蘭國家畫廊的現代藝術特展中展出。


    ![](img/319dca06e22893e942053da0432e9f19_268_0.png)


    32. 人文主義倫理：感覺對了，就做吧！


    ![](img/319dca06e22893e942053da0432e9f19_269_0.png)


    33. 人文主義教育：為自己想！自己思考！


    隨著意義和權威的源頭，從天上轉移到人類的內心感受，整個宇宙的本質也隨之改變。對於外在世界，原本的印象是充滿著各種神祇、繆斯、精靈、食屍鬼，但現在就是一片空無的空間。對於內心世界，原本的印象只是包涵各種原始激情的一塊飛地，但現在忽然變得如此具有深度、廣度，難以度量。對於天使和魔鬼的概念，也已經從漫遊在森林和沙漠間的實體，轉換為人類心靈中的內部力量。天堂和地獄也不再是雲層之上和火山之下的實際地點，而認為是人類內在的精神狀態。只要你心中燃起憤怒和仇恨的火焰，便是正在經歷地獄的苦痛；只要你原諒敵人、懺悔錯誤、與窮人分享財富，就是享有天堂的幸福。


    尼采所謂的「上帝已死」，指的就是這個意思。至少在西方，上帝已經成了一個抽象概念，有人接受、有人不接受，但幾乎不會造成任何差別。在中世紀，如果沒有上帝，我就沒有了政治、道德和美學的權威來源，無法判斷正誤、好壞、美醜。這還得了？相較之下，今天要說自己不信上帝，卻是再容易不過，因為這並不會讓我付出任何代價。就算我完全是個無神論者，仍然能夠從內在的經驗得到非常豐富的政治、道德和美學價值觀。


    如果我相信上帝，那是因為我選擇相信。如果內心叫我要信上帝，我就信。我相信神，是因為自己感覺到了神的存在，我的心告訴我，祂就在那裡。但如果我不再感覺到神的存在，如果我的心突然告訴我世上沒有神，我也就不再相信神了。


    不管是哪一種，權威的本源都在於我自己的感覺。所以，就算有人說自己信上帝，其實他更信的，是自己內心的聲音。


    ## 計算「知識」的三條公式


    正如所有其他權威來源，「感受」也有其缺點。人文主義假設每個人都有一個真正的內在自我，但是我們去叩內心之門的時候，卻常常是沒有回應、或是眾聲喧囂。為了克服這個問題，人文主義又宣稱有另一個新的權威來源，同時還提出配套的新方法，告知大家如何使用這種權威，以取得真正的知識。


    在中世紀歐洲，取得知識的主要公式是：


    ```

    知識 = 經文 × 邏輯*

    ```


    如果想知道某個重要問題的答案，他們會閱讀相關經文，並用邏輯來理解經文的確切含義。舉例來說，學者如果想知道地球是什麼形狀，就會快速掃過《聖經》裡的內容，尋找相關參考記述。有人就會指出，〈約伯記〉第38章第13節提到，上帝「叫這光普照地的四極，將惡人從其中驅逐出來。」於是學者就會用邏輯推斷，因為這個世界有「四極」，一定就是個平坦的正方形。但另一位賢者不接受這種詮釋，要大家看看〈以賽亞書〉第40章第22節，裡面提到「神坐在地球大圈之上，地上的居民好像蝗蟲。」這豈不就證明了地球是圓的？


    在實務上，這代表著追求知識的學者會花費多年時間，泡在學校和圖書館裡，讀著愈來愈多的經文文本，不斷鍛鍊自己的邏輯，讓自己能夠正確瞭解文本的意義。


    > * 這裡的公式用的是乘法，是因為兩項元素需要彼此，才能運作。至少在中世紀學者看來，沒有邏輯，就不可能理解《聖經》。如果你的邏輯值為零，就算你把《聖經》每一頁都讀得滾瓜爛熟，知識總值仍然為零。反過來說，如果你的經文值為零，邏輯再好也沒用。如果公式裡用的是加法，代表的就是如果邏輯很好，就算不讀經文，也能擁有很多知識。這在你我看來可能覺得合理，但中世紀學術圈並不同意。


    科學革命的知識公式，則非常不同：


    知識 = 實驗數據 × 數學


    如果想知道某個重要問題的答案，我們要做的就是蒐集相關的實驗數據，再用數學工具加以分析。舉例來說，要測量地球真正的形狀為何，可以先從在世界各地觀測太陽、月亮和行星開始。等到累積了足夠的觀測值，只要運用三角學，不僅能推斷地球的形狀，就連整個太陽系的結構也能推知。在實務上，這代表著追求知識的科學家花費多年時間，泡在觀測站、實驗室和研究考察裡，蒐集愈來愈多的實驗數據，不斷鍛鍊自己的數學工具，讓自己能夠正確解讀數據的意義。


    這條計算知識的科學公式，讓我們在天文學、物理學、醫學等學門取得驚人突破，但是它有一個重大缺點：無法處理價值和意義的問題。中世紀學者可以完全肯定謀殺和偷竊是錯的，也知道人類生活的目的，就是要遵行上帝的指示，因為經文裡就是這麼說的。但科學家無法做出這樣的倫理判斷。不管有多少實驗數據、數學功力多強，都不可能證明謀殺是錯的。然而，人類社會如果缺乏這種價值判斷，就無以維繫。


    要克服這種困難，方法之一是在新的科學公式之外，繼續運用舊的中世紀公式。如果碰上的是很實際的問題，像是確定地球的形狀、搭橋、或治病，就蒐集實驗數據，做數學分析。但如果碰上倫理問題，像是能不能允許離婚、墮胎和同性戀，就轉向經文求助。


    從維多利亞時代的英國、到二十一世紀的伊朗，許多現代社會都採用這種解決方案。但人文主義還提供了另一種選擇。等到人類對自己有了足夠的信心之後，一條取得倫理知識的新公式出現了：


    知識 = 經驗 × 感性


    如果我們想知道任何道德問題的答案，我們需要連接到我們內心的經驗，並以最大的感性來觀察它們。在實務上，這代表著追求知識的方法要靠多年的經驗累積，並鍛鍊感性，好讓我們正確理解這些經驗。


    究竟「經驗」是什麼？經驗並不是實驗數據，也不是由原子、電磁波、蛋白質或數字所組成。經驗是一種主觀現象，有三個主要成分：知覺、情緒及想法。在任何時刻，我的經驗都包括了我的一切感知（熱、愉悅、緊張等等）；我所感覺到的情緒（愛、恐懼、憤怒等等）；以及一切出現在我腦海中的想法。


    而「感性」又是什麼？感性包括兩件事。第一，是注意到自己的知覺、情緒和想法。第二，是允許這些知覺、情緒和想法影響自己。當然，並不是略有風吹草動，就反應激烈，但重點是要對新的經驗抱持開放態度，允許新的經驗改變自己的觀點、改變自己的行為、甚至改變自己的個性。


    經驗和感性會形成彼此加強的無限迴圈。沒有感性，就無法經驗體會任何事物；沒有經驗體會各種事物，又無法培養感性。感性並不是什麼能夠靠著讀書或聽演講來培養的抽象能力，而是一種實作技巧，必須在實踐中慢慢成熟。


    ## 設法感受身為人的感覺


    讓我們以喝茶為例。最初，我是在早上讀報的時候，喝著加了许多糖、品質最普通的那種茶。那時喝茶只是個藉口，主要是想享受糖分帶來的快感。直到某天，我才發現自己看了報紙、攝取了糖分，但幾乎不算真的喝了茶。於是，我把糖量減少，把報紙放在一邊，閉上眼睛，專心喝茶。我開始感受到茶獨特的香氣和風味。很快的，我開始試試不同的茶，有紅茶、綠茶，比較各種茶高雅的口感、細緻的茶香。


    不過短短幾個月，我就無法再滿足於超市品牌，而是到高檔的哈洛德（Harrods）百貨買茶。裡面我又特別喜歡一種「貓熊茶」，產自四川雅安山區，是一種以貓熊糞便為肥料種植的茶葉。就是這樣，我一杯一杯喝著茶，磨練著對茶的感性，學會了品茶。如果在我喝茶的初期，就拿了明代的瓷杯來品茗貓熊茶，可能並不會感覺與用紙杯泡茶包，有太大差距。


    欠缺必要的感性，就無法體驗到某些事物；欠缺長期的經驗，就無法培養感性。


    關於茶的這一套，也可以應用到所有其他美學和倫理知識。我們並不是一出生就帶著良知。在人生旅程上，害人者人恆害之、敬人者人恆敬之。如果我們注意到這件事，道德的感性就會愈來愈敏銳，這些經驗就能提供有價值的道德知識，告訴我們什麼是善的、什麼是對的，以及自己是怎樣的人。


    因此，人文主義認為：生命就是一種內在的漸進變化過程，靠著經驗，讓人從無知走向啟蒙。人文主義生活的最高目標，就是透過各式智力、情緒及身體的經驗，充分發展你的知識。十九世紀初建構現代教育體系的重要人物威廉·洪堡德（Wilhelm
    von Humboldt）曾說，存在的目的就是「用生命能體驗到最廣泛的經驗，蒸餾成智慧。」他也寫道：「生命只有一座要征服的高峰：設法感受一切身為人的感覺。」⁴


    這正可做為人文主義的座右銘。


    ## 踏上綠野仙蹤的黃磚路 ❋


    根據中國哲學，世界是由陰陽這兩種相對、但又相依的力量所維繫。對於實際的物理世界來說，可能並不為真；但對於由科學和人文主義的契約所創造的現代世界來說，的確如此。


    每股科學的陽，都包含著一股人文主義的陰，反之亦然。陽給了我們力量，而陰則是提供意義和倫理判斷。現代性的陽和陰，分別就是理性和感性、實驗室和博物館、生產線和超市。人們常常只看到陽的一面，認為現代世界就是枯燥、科學、邏輯和實用，像是實驗室或工廠。然而，現代世界其實同時也是個奢華的超市。人類史上，從沒有任何文化如此重視人的感受、欲望和經驗。人文主義將生命看作是一連串的經驗，於是這個新神話便為從旅遊到藝術等等許多現代產業奠下基礎。旅行社和餐廳真正賣的不是機票、也不是什麼高檔晚餐，而是新奇的體驗。


    同樣的，現代之前的敘事多半強調外部事件和行動，但到了現代的小說、電影和詩，常常強調的就是感受、感覺。希臘羅馬史詩或中世紀的騎士文學，記錄的都是英勇的行為，而不是種種感受。這一章講的可能是某個勇敢的騎士，如何挑戰可怕的食人魔，最後殺了食人魔。另一章又講了騎士如何從噴火惡龍手中，救出美麗的公主，最後殺了那條龍。再一章講的是邪惡的巫師抓走了公主，但騎士追了上去，最後殺了巫師。毫無疑問，這裡的英雄一定是個騎士，不會是木匠或農民，因為中世紀對木匠或農民的刻板印象，就是這些卑微人物不會有英雄的作為。


    重點是，這裡的英雄也不會有什麼內心的重大轉折過程。不論是阿基里斯、亞瑟王、羅蘭或蘭斯洛特，都早在踏上征途之前，就已經是無畏的戰士了，已擁有騎士的世界觀。到了最後，他們仍然是無畏的戰士，世界觀也仍然維持不變。他們殺了這麼多食人魔、救出這麼多公主，在在肯定了他們的勇氣和堅毅，卻不見得真讓他們學到什麼。


    到了人文主義，重點放在感受和經驗，而非各種行為，於是藝術也因此改變了。在華茲華斯、杜斯妥也夫斯基、狄更斯和左拉的筆下，講的不是什麼英勇的騎士或騎兵，而是刻畫一般勞工和家庭主婦心裡的感受。有些人認為，講到現代關注內心生命而非外在行為，喬伊斯的《尤利西斯》正是巔峰之作——以洋洋灑灑的二十六萬字，描述了兩位都柏林人迪達勒斯（Stephen
    Dedalus）與布魯姆（Leopold Bloom）的一天，他們在那一天裡，所做的就是……幾乎什麼都沒做。


    很少有人真能把《尤利西斯》完整讀完，但這種焦點轉移，現在也同樣成了多數大眾文化的基礎。


    在美國，電視節目「我要活下去」（Survivor）常常獲譽（或遭斥）為掀起了實境秀的狂熱。「我要活下去」是電視節目史上第一部登上尼爾森收視排行榜首的實境秀，2007年的《時代》雜誌也將它列入史上百大電視節目。⁵在每季節目中，參賽者穿著不能再小的泳裝，孤立在某個熱帶小島上。前方有各種挑戰等著他們，而在每集最後，都會投票讓其中一人離開。最後剩下的人，就能抱走一百萬美元。


    如果有觀眾來自荷馬時代的希臘、羅馬帝國或中世紀歐洲，會發現這個概念十分熟悉而有吸引力。有二十位挑戰者走了進來，但最後只有一位英雄能走出去。「太好了！」古希臘羅馬的王公貴族、或是十字軍的騎士，就會一邊這麼想，一邊坐下來觀看。「接下來一定是精采萬分的冒險舉動、生死交關的戰鬥場面，以及英雄與叛徒的誓不兩立。這些戰士可能會在背後刺人一刀，或是把彼此的內臟都給掏出來！」


    他們可要失望了。這裡的背後刺人一刀，只是個比喻。節目每集大約一小時，而牙膏、洗髮精和麥片的廣告就占了十五分鐘。另外再有五分鐘左右，是用來處理幼稚得不可思議的挑戰，像是誰能把最多椰子扔進籃框，又或是能在一分鐘內吃下最多隻蟲。其他時間，這些「英雄」只是不斷談著自己有什麼感受！他說這、她說那，我覺得這樣、我覺得那樣。


    如果真有一個十字軍騎士坐下來看這節目，大概會窮極無聊又極度不耐，最後掄起戰斧把電視劈了。


    在我們今日看來，可能會覺得中世紀的騎士都是毫無感性的野蠻人。如果身邊有這樣的人，大概會被我們送去看心理治療師，要他們好好探索一下自己的感受。


    而這正是《綠野仙蹤》裡面那個錫樵夫的遭遇。他和桃樂絲及她的朋友一起走著黃磚路，希望等他們到達奧茲國之後，大巫師能給他一顆心。同樣走上黃磚路的，還有稻草人和獅子，稻草人想要的是大腦，而獅子想要的是勇氣。


    到了旅程的終點，卻發現大巫師只是個江湖術士，沒有辦法完成他們的願望。但是他們發現了更重要的事：他們所希望擁有的一切，早就在自己心裡了！


    要變得敏感、聰明、勇敢，從來就不需要什麼巫師的魔法，只要繼續沿著黃磚路走下去，放開心胸迎接任何經驗就行。


    一模一樣的教訓，也發生在寇克艦長與畢凱艦長乘著企業號，航行在星系的時候；發生在湯姆和哈克沿著密西西比河，順流而下的時候；發生在《逍遙騎士》（Easy Rider）的懷特和比利，騎著哈雷機車的時候；以及其他無數公路電影中的無數其他角色，離開了在賓州（或是新南威爾斯）的家鄉，開著一輛舊的敞篷車（或是搭著巴士），碰上一場又一場改變生命的經驗，接觸著自己，談論著他們的感受，最後到達舊金山（或是愛麗絲泉），成了一個更好、更聰明的人。


    ## 戰爭的真相


    「知識 = 經驗 × 感性」這個公式不僅改變了我們的流行文化，甚至也改變了我們對某些重量級議題的看法，例如戰爭。


    史上大多數時候，如果有人想知道某場戰爭究竟是否公義，他們會去問上帝、問經文、問王公貴族、問牧師神父。但很少有人會去問問二等兵或一般平民的意見或經驗如何。


    荷馬、維吉爾和莎士比亞等人筆下的戰爭敘事，都是以皇帝、將軍和英雄的行動為重點，雖然並未隱瞞戰爭的苦痛，但是各種榮耀和英雄主義卻提得更多。普通士兵出場的方式，大概就像是被巨人歌利亞屠殺成堆的屍體，又或是混在歡呼的人群之中，肩上舉著勝利的大衛。


    讓我們以下面這幅畫為例，主題是1631年9月17日的布萊登菲爾德戰役（Battle of Breitenfeld）：


    ![](img/319dca06e22893e942053da0432e9f19_279_0.png)


    34. 華特的畫作：《布萊登菲爾德戰役中的瑞典國王古斯塔夫·阿道夫》


    在畫中，畫家華特（Jean-Jacques Walter）讚頌瑞典國王古斯塔夫·阿道夫（Gustav Adolph）帶領軍隊在該日取得決定性的勝利。阿道夫在畫中英姿勃發，頗有戰神氣魄。這給人的印象就是國王仿若下棋的棋手，指揮戰場如同棋局。至於那些棋子，大概就是一堆都沒什麼差別的角色、或是背景裡的小點。這些人進攻、逃跑、被殺、死亡時有何感受，華特並不在意，因為他們就只是一群不知名的群體。


    就算有些畫家所畫的重點已經不是指揮官，而是戰場本身，仍然是以一種居高臨下的觀點，更看重整體的調度，而不是其中個體的感受。舉例來說，下圖是由斯奈爾斯（Pieter
    Snayers）所繪，1620年11月的白山戰役（Battle of White Mountain）：


    ![](img/319dca06e22893e942053da0432e9f19_280_0.png)


    35. 斯奈爾斯的畫作：《白山戰役》


    畫中描繪天主教在三十年戰爭中的一場著名勝利，擊敗了反叛的新教異端。斯奈爾斯煞費苦心，在畫中記錄各種陣型、調度及部隊移動，以慶賀這場勝利。觀者很容易就能看出不同的部隊、各自的武器，以及在戰鬥序列中的位置。但對於小兵的經驗和感受，斯奈爾斯賦予的重要性就遠遠不如了。


    正如華特的觀點，斯奈爾斯所用的視角也彷彿我們是奧林帕斯山上的眾神，讓我們覺得戰爭就是一場巨大的棋局。


    但如果你仔細看（可能得用上放大鏡），就會發現白山戰役要比棋局複雜那麼一些。乍看像是幾何抽象的圖像，細看才發現是血腥屠殺場面。在某些地方甚至可以看清個別士兵的面容，他可能是在奔跑或逃跑、開槍或是執矛刺殺敵人。然而就算是這些場景，也是要從整體畫面來定位，才有意義。如果看到砲彈將某個士兵炸得粉碎，我們首先會知道，這屬於偉大天主教勝利的一部分。接著，如果這是個新教士兵，他的死代表的是叛亂和異端的罪有應得；而如果這是個天主教士兵，他的死則是為了崇高理念的偉大犧牲。


    畫面上方可以看到天使在戰場上空盤旋，執著白色橫幅，以拉丁文說明這場戰役發生了什麼事、為何如此重要。橫幅裡講的是：上帝幫助皇帝斐迪南二世（Ferdinand
    II），在1620年11月8日擊敗了敵人。


    幾千年來，我們講到戰爭，看到的是神、皇帝、將軍，以及偉大的英雄。但在過去這兩個世紀，國王和將軍慢慢被推到一旁，注意力開始移到小兵和他們的經驗上。像是《西線無戰事》這種戰爭小說、或是像「前進高棉」這種戰爭電影，講的都是新兵的故事，新兵對自己和世界都所知甚少，卻背負了希望和假象的沉重負擔。他認為戰爭是光榮的、開戰的原由是公義的、領軍的將軍是天才。但經過幾星期真正戰火的洗禮，所有的泥濘、流血、加上死亡的氣味，讓他的想像逐一破滅。如果他活了下來，這個原本天真的士兵離開戰場後，就會成為更聰明的人，不再相信學校、電影和政客花言巧語中的陳詞濫調與虛假理想。


    但矛盾的是，現在這種敘事又已蔚為主流，甚至是學校、電影和政客也一再重複。就連「現代啟示錄」、「金甲部隊」、或是「黑鷹計畫」這些好萊塢大片，都不斷警告「戰爭與你在電影中所看到的不同」。隨著在膠卷、散文或詩歌中得到重視，底層小兵的感受'
  mdcn: '授怎麼說。他的專長是農場動物的基因改良，讓豬長得更快、牛產乳產得更多、雞的肉量也增加。接受《國土報》（Haaretz）訪問時，記者達隆（Naomi
    Darom）詢問安德森，這樣的基因操作是否會給動物造成許多痛苦。這些「加強版」的乳牛乳房太大，幾乎無法走路，而「升級版」的雞也是肉量過多，幾乎站不起來。安德森教授的答案十分堅定：「一切都要回到個別消費者、以及消費者願意為肉品付出多少價格的問題……我們必須記住，如果沒有（加強版的）現代雞隻，就不可能維持現在的全球肉品消耗量……如果客戶只問什麼肉最便宜，這就是我們給的答案……客戶需要決定自己最看重什麼，看看究竟是價錢、還是其他。」³


    安德森教授晚上就寢時，並不會良心不安。只要顧客願意購買這些強化版動物的各種產品，就代表他已經滿足了顧客的需求和欲望，也就代表他做得再正確不過。


    同樣的邏輯，如果某一間跨國企業想判斷自己是否還符合「不作惡」（Don''t be evil）的座右銘，判斷標準也就在於財務報表。如果現在看來財源滾滾，代表有幾百萬人都愛它的產品，也就代表這是一股善的力量。如果有人對此提出反對，說民眾也可能做出錯誤的選擇；很快就會有人提醒他，顧客永遠是對的，人的感受感覺才是一切意義和權威的源頭。如果有幾百萬人都是透過自由選擇，購買了這間公司的產品，你憑什麼說他們錯了？


    ## 人文主義的教育觀點


    最後，人文主義思想的興起，也徹底改變了教育制度。在中世紀，所有意義和權威都來自外部，因此教育的重點就在於順從、背誦經文、研讀古老傳統。教師向學生提出問題，學生就得背出亞里斯多德、所羅門王、或聖湯瑪士·阿奎那（St.
    Thomas Aquinas，歐洲中世紀經院派哲學家暨神學家）是如何回答的。


    相較之下，現代人文主義教育則要教導學生自己思考。能知道亞里斯多德、所羅門王和阿奎那等先賢先哲對政治、藝術和經濟有何想法，是很不錯，但因為意義和權威的本源在於我們的內心，所以更重要的是你自己對這些事情的看法。


    不管是在幼兒園、中小學或是大學，你可以隨便找一位老師，問她想教的是什麼。她可能就會回答：「這個嘛，我教的科目是歷史（或量子物理、或藝術），但最重要的是我想教學生如何思考。」雖然不見得總是成功，但這正是人文主義教育的目標。


    以下，我以五張照片，圖解人文主義：


