  md: '人類大命運


    著名的嘲諷笑話就說，在自由主義之下，每個人都有餓死的自由！更糟的是，自由主義鼓勵每個人把自己視為獨立個體，於是同一階級的成員各自分立，無法團結起來對抗壓迫他們的體制。於是，自由主義讓不平等永無止境，使大眾走向貧困，令精英走向孤立。


    自由主義先挨了左邊來的這一拳，已經步履蹣跚，但進化人文主義又從右邊襲來。在種族主義和法西斯主義眼中，自由主義和社會主義都妨礙了天擇，造成人類退化。他們提出警告，如果認定每個人的價值都相同、生育的機會也相同，天擇就無法運作。身為最優越者的那些人，將無法繼續演化成超人類，只能被大批平庸的人淹沒，人類終將滅絕。


    於是，從1914年到1989年，三種人文主義教派掀起一場兇殘的宗教戰爭，自由主義節節敗退，眼看著共產主義和法西斯政權搶下許多國家。而且自由主義的核心思想這時看來，不僅太過天真，甚至可能非常危險。只要讓每個人都有自由，世界就能和平繁榮？瞧瞧世界變成了什麼樣！


    從事後來看，第二次世界大戰似乎是自由主義的偉大勝利，但當時看來可不是這樣。戰爭在1939年9月開打，衝突的一方是強大的自由主義同盟國，另一方則是孤伶伶的納粹德國。就連法西斯主義的義大利一開始也是隔岸觀火，直到隔年6月才參戰。自由主義同盟國在數字上和經濟上都大占優勢。1940年，德國GDP為3.87億美元，而德國的歐洲對手們GDP總值為6.31億美元（不包括大英國協的成員國，以及英、法、荷、比等國的殖民地）。但在1940年春天，德國只花了三個月，就攻下法國、低地國、挪威和丹麥，讓同盟國挨了一記決定性重擊。英國則是靠著英吉利海峽，才免遭同樣的命運。13'
