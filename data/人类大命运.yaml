    一直要到1950、1960年代，才有愈來愈多專家達成共識，放棄這些嚴格的行為主義理論，承認情感需求的重要性。在一系列著名（而且殘酷到令人震驚）的實驗中，心理學家哈洛（Harry
    Harlow）在幼猴剛出生不久，就強行將幼猴與母猴分開，隔離在小籠子裡。籠子裡有兩隻假母猴，一隻是金屬假猴、裝有奶瓶，另一隻是絨布假猴、但沒有奶瓶，結果幼猴是使盡全力抱著絨布母猴。


