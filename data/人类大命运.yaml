    # 人類大命運


    開始與人合而為一。但一等到生物學家判斷生物也是演算法，就等於拆除了有機和無機之間的那堵牆，讓電腦革命從單純機械事務轉變為生物的災難，也將權威從個人移轉到了演算法網路。


    確實有些人對這種發展感到恐懼，但事實上，也有數百萬人再樂意不過。今天許多人已經放棄了自己的隱私和個別性，把許多生命點滴全放上網路，每個行動都想記錄下來；只要與網路的連結一中斷，就算只是幾分鐘，也會讓他們坐立難安。就在我們身邊，處處都有權威由人類轉移到演算法的情形，而且不是因為什麼重大的政府決策，而是由於如狂潮般的日常個人選擇。


    如果再不小心，結果可能就會是歐威爾筆下的那種警察國家，而且持續監控的還不只是我們外在的各種舉止，甚至也包括我們身體裡的活動、以及大腦中的活動。可以想想，如果生理感測器無所不在，史達林可能會用來做什麼？而普丁又可能想做什麼？


    目前，雖然有許多捍衛人類個體性的人，擔心二十世紀的噩夢重現，竭力抵抗這個似曾相識的歐威爾式敵人，但人類的個體性其實還受到另一方向更大的威脅。在二十一世紀，與其說個人會被外在力量殘忍輾碎，更有可能的是從內部緩緩崩解。


    今天，大多數企業和政府都會尊重每個人的個體性，承諾依據每個人的需求和願望，提供醫藥、教育和娛樂。但為了達到這個目的，企業和政府就得將個人解構為許多生化上的子系統，用無所不在的感測器監控這些子系統，並用強大的演算法加以解讀。在這個過程中，我們會發現：所謂不可分割的個體，只是一種宗教幻想。現實上，整體現實就是許多生化演算法和電子演算法的混合體，沒有清楚的邊界、也沒有自己的中心。'
