    法老自己安坐於首都孟菲斯，在宮殿裡吃著美味葡萄、與妻妾遊樂，而手下的官員則是在整個王國四處奔波，從地中海岸邊、遠至努比亞沙漠。官僚計算每個村莊必須上繳的稅款，記錄在長長的莎草紙捲軸上，送到孟菲斯。如果孟菲斯來了一道書面命令，要求為軍隊招募士兵或為工程徵集工人，官員就會努力補滿所需人數。他們會計算王室的糧倉裡還有多少小麥，清理運河和水庫需要多少工作天數，又該把多少豬鴨送往孟菲斯，好讓法老的後宮嬪妃大快朵頤。就算這位肉身神祇駕崩，把整個身體做了防腐處理，用極盡奢華的葬儀、一路護送到孟菲斯市郊的王室墓地，整個官僚體系還是不斷運作。官員還是繼續書寫捲軸、收稅、發布命令，繼續給這部法老機器的齒輪上油。


    如果蘇美的神祇讓我們想起現代的公司的品牌，那麼像法老這種「活神」就像是現代的個人品牌，一如貓王（Elvis Presley）、瑪丹娜、或是小賈斯丁。和法老一樣，貓王也有著生物的身軀，也有生物的需求、欲望和情緒。貓王得吃、得喝、也得睡。但貓王絕不只是一個生物軀體而已，他也像是法老，是一個故事、一個神話、一個品牌，而在這裡，品牌的價值要遠高於生物軀體的價值。


