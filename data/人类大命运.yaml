    只不過,譬如螞蟻和蜜蜂,早在人類之前幾百萬年,就已經學會了集體合作,為什麼沒能早早統治人類?原因在於牠們的合作缺乏靈活性。蜜蜂的合作方式雖然非常複雜巧妙,但牠們無法在一夜之間徹底改造其社會制度。舉個例子,如果蜂巢面臨突如其來的威脅或機會,蜜蜂並沒有辦法把蜂后送上斷頭臺,改制為蜜蜂民國。


