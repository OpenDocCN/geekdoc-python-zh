    筆碰上了紙，天靈靈地靈靈！蘇聯消失無蹤。27


    # 把人民像蒼蠅捕進網中


    1187年，薩拉丁（Saladin）在哈丁戰役（Battle of Hattin）擊敗十字軍，占領了耶路撒冷。教皇因此發起了第三次十字軍東征，希望奪回聖城。讓我們假設有位名叫約翰的年輕英國貴族，遠離家鄉征討薩拉丁。約翰相信，自己這麼做是有客觀意義的，如果自己在東征過程中去世，靈魂就能夠升上天堂，享受永恆的無上喜悅。


    如果這時候跟他說，靈魂和天堂都只是人類編出來的故事，肯定會把他嚇壞。約翰一心相信，如果他抵達聖地，卻被一個長著大鬍子的穆斯林戰士，一斧頭劈在他頭上，他當然會痛苦萬分，兩耳嗡嗡、兩腿一軟、視野一黑——然後就會突然發現，自己由一片明亮的光芒籠罩，聽到天使的歌聲、悠揚的豎琴絃音，看到發著光、有著翅膀的天使，召喚他通過一道雄偉的金色大門。


    約翰對這一切的信念之所以這麼強，是因為有一張細細密密又極度強大的意義之網，包覆著他。他最早的記憶，就是亨利爺爺有一把生鏽的劍，掛在古堡的主廳。當他還在蹣跚學步，就已經聽過亨利爺爺在第二次十字軍東征戰死的故事，說爺爺現在已經在天堂休息，有天使作伴，一直關照著約翰和他的家人。吟遊詩人來訪城堡時，常常吟唱著十字軍在聖地英勇作戰的歌謠。


    約翰上教堂的時候，很愛看彩繪玻璃窗，其中一扇正是布永的戈德弗里（Godfrey of Bouillon，第一次十字軍東征的領導者）拿長槍刺穿一個面容邪惡的穆斯林，另一扇則是罪人的靈魂在地獄裡燃燒。約翰也會認真聆聽當地神父的講道，那是他認識的最有學問的人。幾乎每個禮拜天，神父都會搭配各種精心設計的比喻和令人莞爾的笑話，講述著世上只有天主教是唯一的救贖，羅馬教皇是我們神聖的父，我們必須聽從他的指示。如果我們殺人或偷竊，上帝會叫我們下地獄；但如果我們殺的是異教徒穆斯林，上帝會歡迎我們上天堂。


    在約翰剛滿十八歲的一天，一位騎士很狼狽的騎馬來到城堡大門，語帶哽咽的大喊：十字軍在哈丁被薩拉丁擊敗了！耶路撒冷淪陷了！


    教皇宣布將發動新一波十字軍，並承諾不幸喪生者將得到永恆的救贖！身邊所有人看來都是既震驚又憂慮，但約翰臉上發出超脫俗世的光亮，宣告：「我將對戰異教徒，收復聖地！」每個人靜了一下，接著臉上露出笑容，流下感動的淚水。母親擦擦眼淚，緊緊抱著約翰，說她有多麼引以為榮。他的父親則是大力在他背上拍了一掌，說道：「兒子，如果我還是你這年紀，必會和你同行。事關我們家族的榮譽，相信你一定不會讓我們失望！」約翰有兩個朋友也宣布要一同從軍。而且，就連約翰的死對頭、那個住在河另一邊的男爵，也特地來家裡拜訪，祝他一路順利。


    當約翰離開城堡時，村民紛紛從小屋裡出來，向他揮手致意。而對於這位即將前去對抗異教徒的十字軍勇士，所有的美麗姑娘也露出崇拜的眼神。約翰從英國出航，航過各個陌生而遙遠的彼方，例如諾曼地、普羅旺斯、西西里島，許多異國的騎士也紛紛加入，大家都有著共同的目標、共同的信念。


    但等到軍隊終於在聖地上岸，開始與薩拉丁的部下戰鬥，約翰才驚訝的發現，這些邪惡的撒拉遜人怎麼也和自己有同樣的信念。當然，想必撒拉遜人沒搞清楚，竟然以為基督徒才是異教徒、而穆斯林則是服從神的旨意。但撒拉遜人也接受一樣的基本信念，也就是為神和耶路撒冷而戰的戰士一旦戰死，將會直接上天堂。


    就像這樣，中世紀文化一絲一縷的編織著意義的網，把約翰和同時代的人，都像蒼蠅一樣捕進網中。約翰絕不可能想像得到，這一切故事都只是出於想像虛構。說他的父母和叔伯都錯了，還有可能。但還有吟遊詩人、他所有的朋友、村裡的姑娘、知識淵博的神父、住在河另一邊的男爵、在羅馬的教皇、在普羅旺斯和西西里島的騎士、甚至還包括那些穆斯林，難道真有可能是這些人都在胡思亂想？


    # 事過境遷，意義不再


    時間就這麼過了好多好多年。在歷史學家的注視下，意義的網被拆散，又張起了另一張新的網。約翰的父母已然身故，他的所有兄弟姊妹也不在人世。這時已不再有吟遊詩人唱著十字軍東征的故事，新的流行是在劇院上演愛情悲劇。家族的城堡被燒成一片平地，而重建之後，亨利爺爺的劍已經失去影蹤。教堂的彩繪玻璃在一次冬季的狂風中粉碎，換上的玻璃不再描繪布永的戈德弗里和地獄裡的罪人，而是英國國王打敗法國國王的偉大勝利。當地的牧師已經不再稱呼教皇是「我們神聖的父」，而是「羅馬的那個魔鬼」。在附近的大學裡，學者鑽研著古希臘手稿、解剖屍體，並在緊閉的門後竊竊私語，說著：或許根本沒有靈魂這種東西。


    但時間轉眼又過了好多好多年。原本是城堡的地方，現在成了購物商場。在當地的電影院裡，「聖杯傳奇」（Monty Python and the Holy Grail）已經播了無數次。在一座空教堂裡，無聊的牧師看到兩名日本遊客，簡直喜出望外，開始滔滔不絕，解說教堂裡的彩繪玻璃。遊客不停禮貌的微笑點頭，但完全沒聽懂。


    教堂外面的階梯上，一群青少年正用iPhone看著一部YouTube影片，是約翰·藍儂那首〈Imagine〉的remix版。約翰·藍儂唱著「Imagine there''s
    no heaven, it''s easy if you try.」（想像世上如果沒有天堂，試試看，這並不難。）一名巴基斯坦清潔工正在打掃人行道，旁邊有收音機正播報新聞：敘利亞屠殺仍在繼續，聯合國安全理事會的會議落幕了，但未能達成任何協議。突然之間，天空打開了一個時光通道，一道神祕的光照在其中一位青少年臉上，他突然張口宣告：「我將對戰異教徒，收復聖地！」


    異教徒？聖地？對於現在絕大多數的英格蘭人來說，這些詞彙已經不再具有任何意義。就連那位牧師，也很可能覺得這年輕人是精神病發作。相反的，如果一位英國青年決定加入國際特赦組織，前往敘利亞保護難民、維護難民的人權，現在大家會覺得他是個英雄，但在中世紀，大家會覺得這人瘋了。在十二世紀的英格蘭，沒有人知道什麼叫人權。你要大老遠跑到中東，冒著生命危險，而且居然不是要殺死穆斯林，而是保護某一群穆斯林別被另一群穆斯林殺了？你絕對是腦子出了很大的問題。


    這正是歷史開展的方式。人類編織出一張意義的網，並全心相信它，但這張網遲早也會拆散，直到我們回頭一看，實在無法想像當時怎麼可能有人真心這麼相信著。事後看來，為了到達天堂而參加十字軍，聽起來就像是徹底瘋了。事後看來，冷戰似乎又是件更瘋的事。不過才短短三十年前，怎麼可能有人因為相信能打造出共產主義的天堂，就不惜為此冒著核戰浩劫的危險？而在現在的一百年後，我們現在對民主和人權的信念，也有可能會讓我們的後代，感到同樣的難以理解。


    # 大同世界


    智人統治世界，是因為只有智人能夠編織出互為主體的意義之網：其中的法律、約束力、實體和地點，都只存在於他們共同的想像之中。因為有這張網，讓所有動物只有人類能夠組織十字軍、社會主義革命和人權運動。


    其他動物也有可能想像各種事情。貓埋伏著要抓老鼠時，雖然可能沒看到老鼠，但很可能能夠想像老鼠的形狀、甚至是味道。但是就我們目前所知，貓只能想像實際存在這個世上的東西，例如老鼠。牠們無法想像自己看不見、聞不著、嚐不到的東西，比如美元或谷歌、歐盟。只有智人能夠想像出這種虛幻的事物。


    因此，貓和其他動物至今仍然只能處於客觀的世界，溝通系統也只用來描述現實，但智人能用語言創造出前所未有的現實。在過去七萬年間，智人所發明出具備互為主體性的現實，愈發強大，讓智人在今天稱霸世界。黑猩猩、大象、亞馬遜雨林和北極冰川，究竟能否活過二十一世紀？這一切的結果，將要看像是歐盟和世界銀行這種組織的意願和決定而定；而這幾個實體其實都屬互為主體，只存在我們共同的想像之中。


    沒有任何其他動物有能力對抗我們，並不是因為牠們少了靈魂或少了心靈，而是因為牠們少了必要的想像力。獅子能跑、能跳、能抓、能咬，卻沒辦法開銀行帳戶或提出訴訟。而在二十一世紀，一位知道怎麼提出訴訟的銀行家，擁有的權力絕對遠遠高於大草原上最兇猛的獅子。


    能夠創造出互為主體的實體，這種能力不僅讓人與其他動物有所不同，也讓人文科學與生命科學出現區隔。歷史學家希望瞭解像神祇、國家這種互為主體的實體如何發展，但生物學家很難認同有這種事情存在。有些人認為，如果我們能解開遺傳密碼、繪出大腦的每個神經元網絡，就能知道人類所有的祕密。畢竟，如果人類沒有靈魂，如果所有思想、情感和感覺都只是生化演算法，人類社會再怎麼奇特的現象，不是應該都不脫生物學的範疇？從這個角度來看，十字軍東征就是由演化壓力形成的領土爭執，英格蘭騎士前往聖地征伐薩拉丁，其實也就像是狼群想搶下隔壁狼群的勢力範圍。


    相反的，人文科學強調互為主體的實體，認為這種重要性不下於荷爾蒙和神經元。要用歷史的方式思考，也就代表著要將想像中的故事賦予實際的力量。當然，歷史學家並不會忽視像氣候變遷和基因突變之類的客觀因素，但他們更重視的是那些人們發明、並信以為真的故事。北韓與南韓之所以如此不同，並不是因為平壤居民和首爾居民基因不同，也不是因為北邊氣候較冷、較多山；而是因為北邊相信的是非常不同的一套故事。


    或許某一天，神經生物學能有重大突破，讓我們用純粹生化的詞彙，來解釋共產主義和十字軍東征。但我們現在離那裡還非常遙遠。


    在二十一世紀，歷史和生物學的界線可能會變得模糊，但並非因為發現了如何用生物學來詮釋歷史事件，而是因為我們會因應意識型態的虛構故事，而改寫DNA鏈；為了政治和經濟利益，而重新設計氣候；用網路空間，取代山川的地理環境。


    隨著人類的種種虛構想像（fiction），翻譯成基因和電訊編碼，互為主體的現實將會吞沒客觀現實，而使得生物學與歷史融合在一起。因此，到了二十一世紀，虛構想像有可能成為世界上最強大的力量，甚至超越隕石和天擇。


    # 人類大命運


    因此，如果我們想瞭解人類的未來，光是破解基因組、處理各種資料數字，仍遠遠不足。我們必須破解種種賦予世界意義的虛構想像！


    ![](img/319dca06e22893e942053da0432e9f19_174_0.png)


    20. 藝術創作者帕洛克（Jackson Pollock）靈感湧現的一刻。


    # 第二部


    # 智人為世界賦予意義


    人類創造了怎樣的世界？


    人類為何如此深信，以為自己不但控制了世界，還能賦予世界意義？


    而人文主義（也就是對人類的崇拜）又是怎麼成為全球最重要的宗教？


    ![](img/319dca06e22893e942053da0432e9f19_177_0.png)


    # 第4章


    # 說書人


    狼或黑猩猩這些動物，都活在一種雙重現實之中。一方面很熟悉外在的各種客觀實體，像是樹木、岩石和河流；但另一方面，也知道自己的主觀經驗，像是恐懼、喜悅和欲望。相較之下，智人則是活在一種三重現實之中：除了樹木、河流、恐懼和欲望，智人的世界還有各種關於金錢、神祇、國家和公司的虛構故事。歷史逐漸開展，神祇、國家和公司的影響也就不斷成長，而河流、恐懼和欲望則成為被犧牲的代價。世界上還是有河，人類也依然受到恐懼和欲望的驅使，但是耶穌基督、法國、蘋果公司都學會了如何築壩攔水、將河流控為己用，以及形塑我們最深切的焦慮和渴望。


    到了二十一世紀，新科技可能會讓這些虛構故事更為強大。為了瞭解我們的未來，就必須回顧像是耶穌基督、法蘭西共和國和蘋果公司這些故事，看看它們究竟是如何得到這麼大的力量。人類認為自己創造了歷史，但歷史其實就是圍繞著各種虛構故事而轉。單一人類個體的基本能力，從石器時代以來並沒有多大改變，真要說有什麼改變，很可能是變弱了。但成長的是各種虛構故事的力量，推動了歷史，讓我們從石器時代走到了矽晶時代。


    這一切開始於大約七萬年前，認知革命讓智人開始談著只存在於人類想像之中的事情。而在接下來的六萬年間，智人編織出許多虛構故事，只是這時的故事仍然規模有限，流傳也不廣。某個部落裡崇拜的祖靈，可能到了隔壁部落就已經一無所知；某個地方能用作通貨的貝殼，翻過山脈就可能毫無價值。但光是像祖靈或是貝殼的價值這種虛構故事，就已經能促成幾百、甚至是幾千個智人通力合作，遠超過尼安德塔人或黑猩猩，也就讓智人大占優勢。然而，如果只倚靠狩獵或是採集，並不足以支持城市、甚至王國的運作，因此只要智人仍然是狩獵採集者，就不可能有真正的大規模合作。也因此，石器時代的各種神祇、精靈和惡魔，說來並不強大。


    到了大約一萬二千年前，農業革命揭開序幕，為人類提供了必要的物質基礎，能夠擴大並強化人際網路。有了農業，開始有可能養活擁擠城市裡的幾千個市民、或是紀律嚴明的軍隊裡成千上萬的士兵。然而，這種人際網路也遇到了新的障礙。在維護這種集體神話、組織大規模合作的過程中，早期農民只能依賴人腦的資料處理能力，但人腦實在能力有限。


    # 蘇美神祇相當於現代公司


    農民深信各種偉大神祇的故事。他們為最敬愛的神祇，興建神廟、舉辦慶典、甘心奉獻，雙手送上土地、什一奉獻，或是各種祭品禮物。在大約六千年前的蘇美文化，城市開始成形，而神廟不僅是信仰中心，也是最重要的政治和經濟樞紐。蘇美神祇的功能，很類似現代的品牌和公司。


    在今日，公司是個虛構的法律實體，能夠擁有財產、借貸、雇用員工，進行買賣交易。在烏魯克（Uruk）、拉格什（Lagash）和舒魯帕克（Shurupak）這些古城裡，神祇也是法律實體，能擁有田地和奴隸、發放和接受貸款、支付薪資、建造水壩和開築運河。


    由於神不會死，也沒有後代互相爭奪遺產，也就累積愈來愈多的財富和權力。愈來愈多蘇美人發現自己成了神的員工，拿著神的貸款，耕作神的土地，也得向神繳稅和什一奉獻。就像現在有人是谷歌的僱員、有人是微軟的員工，在古代的烏魯克，可能某個人是大神恩基（Enki）的僱員，而鄰居則在女神伊南娜（Inanna）手下。恩基和伊南娜的神廟刻畫了烏魯克的天際線，神紋也出現在建物、產品和衣服上。對蘇美人而言，恩基和伊南娜再真實不過，就像我們眼中的谷歌和微軟，一樣真實。與先前石器時代的鬼魂和神靈相比，蘇美的神祇已經是非常強大的實體。


    不用說，各種業務當然不會由神祇親自動手，祂們根本只是人類的想像，也只會出現在想像之中。所有日常業務都是交給神廟的祭司（正如谷歌和微軟也需要有血有肉的真人來管理業務）。然而，隨著神祇名下的財產和權力愈來愈多，祭司開始無力應付。雖然祭司可能代表了神威浩蕩的天空之神、無所不知的地之女神，但自己畢竟還是血肉之軀。他們很難統統記住，究竟哪些是女神伊南娜的莊園、果園和田地，有哪些伊南娜的員工已經領了薪資，又有哪些伊南娜的佃戶還沒付佃租，這位女神對債務人收取的又是多高的利率。這正是一大主因，導致無論是在蘇美、或全球其他地方，就算農業革命已經發生數千年，人類的合作網路卻遲遲無法大幅擴張。既沒有幅員遼闊的王國，也沒有遍及四海的貿易網路，更沒有全球信仰的宗教。'
  mdcn: '檢查結果出爐，她說我完全健康，可以回家了。可是我仍然覺得頭痛得不得了。雖然所有客觀測試都找不出我有什麼問題，儘管除了我以外沒人感覺痛苦，但對我來說，這種痛苦是百分之百真實。


    多數人以為，現實只有客觀和主觀兩種，並沒有第三種可能。於是，只要他們說服自己某件事並非出於自己的主觀感受，就貿然認為這件事必然屬於客觀。如果有那麼多人相信上帝，如果錢確實能讓世界運轉，如果民族主義會促成戰爭、也會建立帝國……那麼這些事物或概念一定不只是我個人主觀的信念。也就是說，上帝、金錢和國家，一定是客觀的現實囉？


    然而，現實還有第三個層次：互為主體的（intersubjective）。這種互為主體的現實，並不是因為個人的信念或感受而存在，而是靠著許多人的溝通互動而存在。歷史上有許多最重要的驅動因素，都具有互為主體的概念。像是金錢，並沒有客觀的價值。1元的美鈔不能吃、不能喝，也沒法拿來穿。但只要有幾十億人都相信它的價值，你就可以拿它來買東西吃、買飲料喝、買衣服穿。如果有位麵包師傅忽然不再相信美鈔了，不願意讓我用這張綠色紙，換他的麵包，也沒什麼關係。只要再走幾條街，又有另一家超市可買。然而如果超市的收銀員、市場的小販、購物商場的銷售員，都一律拒絕接受這張紙，美鈔就會失去它的價值。當然，這些綠色紙張還是存在，但它們已經再無用處。


    這種事情其實不時會發生。1985年11月3日，緬甸政府毫無預警的宣布50緬元和100緬元的紙鈔不再是法定貨幣。民眾根本沒有兌換紙鈔的機會，一輩子的積蓄瞬間成了幾堆毫無價值的廢紙。為了取代失效的貨幣，政府發行了新的75緬元紙鈔，號稱是要紀念緬甸獨裁者奈溫將軍（General
    Ne Win）的七十五歲生日。1986年8月又發行了15緬元和35緬元的紙鈔。據傳，這位獨裁者深信命理，相信15和35是幸運數字。但對國民來說，可就一點也不幸運了。到了1987年9月5日，緬甸政府又突然下令，所有35緬元和75緬元的紙鈔同樣不再是法定貨幣。


    會像這樣因為人類不再相信而一夕蒸發的，並不只有金錢的價值。同樣的事情也可能發生在法律、神祇，甚至整個帝國上。這一秒它們還在忙著塑造世界，下一秒卻忽然不復存在。天神宙斯和天后赫拉，曾經是地中海一帶的重要力量，但現在不再有人相信，也就令祂們失去所有力量。蘇聯曾經一度能夠摧毀全人類，但也是在一支筆的力量下便煙消雲散——1991年12月8日，在維斯庫里（Viskuli）附近的一幢鄉間大宅，俄羅斯、烏克蘭和白俄羅斯的領導人簽署了〈白拉維沙協定〉（Belavezha
    Accords），其中聲明：「吾等白俄羅斯共和國、俄羅斯聯邦暨烏克蘭，做為1922年蘇聯成立條約之簽署創始國，茲此聲明終止蘇聯做為國際法之主體及地緣政治之現實。」26就這樣，蘇聯從此消失。


    要說金錢是個互為主體的現實，相對還比較容易接受。大多數人也很願意承認：那些古希臘神明、邪惡的帝國和異國文化價值觀都只是一種想像。但如果說的是自己的神、自己的國家、自己的價值觀，由於正是這些概念給了我們生命的意義，要承認這些概念也都是虛構的，就沒那麼容易了。我們希望自己的生命有客觀意義，希望自己的種種犧牲不只是為了腦子裡的各種空想。但事實上，大多數人生活的意義，都只存在於彼此述說的故事之中。


    在大家一起編織出共同故事網的那一刻，意義就產生了。對我來說，譬如在教堂結婚、在齋戒月禁食、或在選舉日投票，這些動作為什麼有意義？原因就在於我的父母也認為這有意義，還有我的兄弟姊妹、鄰居朋友、附近城市的居民、甚至是遙遠異國的民眾，都認為這有意義。為什麼這些人都認為這有意義？因為他們的朋友和鄰居也有同樣的看法。


    人類會以一種不斷自我循環的方式，持續增強彼此的信念。每一次的互相確認，都會讓這張「意義的網」收得更緊，直到你別無選擇，只能相信大家都相信的事。


    只不過，經過幾十年、幾世紀，意義的網也可能忽然拆散，而由一張新的網取而代之。讀歷史正是看著這些網的編織和拆散，並讓人意識到，對這個世代的人來說最重要的事情，很有可能對他們的後代變得毫無意義。


