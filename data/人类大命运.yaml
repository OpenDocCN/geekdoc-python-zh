  md: '如果你碰巧是個共產主義人士，可能會認為共產主義和基督教當然大不相同，因為共產主義是對的、而基督教義是錯的。資本主義制度本身就是帶有階級衝突，但是富人可不會在死後落入地獄、遭受永恆的折磨。不過，即使共產主義是對的，也不代表共產主義就不是一種宗教，反而證明共產主義就是個真金實銀的宗教。不論任何宗教的追隨者，都相信只有自己的宗教才是真實的。而或許，真有一種宗教是對的？


    # 如果你遇見佛陀


    我們說宗教是一種工具，用來維護社會秩序、組織人類進行大規模合作，這種說法可能讓某些人感到惱怒，因為對他們來說，宗教最重要的，就是代表一條通往靈性的途徑。然而，一方面宗教和科學的差距比我們一般認為的更小，另一方面，宗教和靈性的差距卻比想像的更大。宗教就是一份契約，而靈性卻是一趟旅程。


    宗教對世界提出一套完整的描述，並且提供一份定義清晰的契約，載明各項預定目標。「上帝存在。祂告訴我們該遵守某些作為。如果你服從上帝，你就能進天國。如果你不服從祂，你就會在地獄燃燒。」正是因為這類契約寫得清清楚楚，才讓社會得以訂出各種共同的規範和價值觀，約束人類的行為。


    但靈性之旅就不是這麼一回事了。這通常都是以神祕的方式，要把人帶向未知的目的地。旅程的一開始，通常都是某些大哉問，例如：我是誰？生命的意義是什麼？什麼是善？在大多數人欣然接受由當權者提供的現成答案時，真正的靈性追求者可不會那麼容易滿足。他們會下定決心，追尋著某一個大哉問，不論要追到何方，'
