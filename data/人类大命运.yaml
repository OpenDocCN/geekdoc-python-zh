  md: '斯（Claudius），也不可能忽然離開丹麥，跑去印度打坐冥想。莎士比亞不可能允許這種事發生。同樣的，人類也不可能永生不死、不可能免於一切疾病、不可能一切恣意妄為，這些事情就是不在腳本中。


    前現代的人放棄了力量，而相信自己的生命換得了意義。對當時的人來說，是否在戰場上英勇戰鬥、是否擁護嫡傳的國王、是否在早餐吃了禁忌的食物、甚至是否和隔壁鄰居有了姦情，都承擔著重要的意義。當然，這會帶來一些不便，但卻能讓人心裡覺得受到保護。如果發生什麼可怕的事，譬如戰爭、瘟疫或乾旱，大家還是能安慰自己說，「我們都是在一齣偉大的宇宙戲劇裡，扮演著自己的角色，這一切都是神或自然律的旨意。雖然我們不知道腳本，但可以放心，一切都有目的。就算是這場可怕的戰爭、瘟疫或乾旱，也都是在某個更偉大的計畫裡的場景。而且，我們知道這位劇作家值得信賴，故事最後一定有個美好而有意義的結局。因此就算發生了戰爭、瘟疫或乾旱，也都是為了最後的美好結局；就算現在看不到美好結局，來世總會等到的。」


    現代文化則不再相信有這種偉大的宇宙計畫存在。我們並不是活在一齣比日常生活更高位階的戲劇之中，生活沒有劇本、沒有劇作家、沒有導演、沒有製片；而且，也沒有意義！就我們目前最進步的科學所知，整個宇宙就是個「盲目而沒有目的」的過程，充滿各種雜音和憤怒，但毫無意義。我們只是在一顆行星上，占據著再小不過的一點，存在了一段再短不過的時間，如馬克白所說的那個可悲演員，在臺上得意或失意了一會，就再也悄無聲息。


    既然沒有劇本，人類也不是在什麼偉大戲劇中扮演什麼角色，雖然人類還是可能面臨各種可怕的事，但並不會有什麼神祇來拯救'
