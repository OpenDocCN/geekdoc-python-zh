  md: '設，如果人類說現在自己有意識，就是真的有意識。基於這種假設，科學家就能開始觀察腦波，看看有那些腦波只會在人類有意識時出現，而無意識時絕不會出現。


    這樣一來，科學家就能判斷：例如看似成為植物人的中風病人究竟是完全失去了意識，又或只是失去控制身體和語言的能力。如果病人的腦波顯示出有意識的特徵，那麼很可能病人雖然不能行動或言語，但其實仍有意識。事實上，醫師最近已能夠使用
    fMRI 來和這樣的病人進行溝通。醫師會問病人是非題，告訴他們如果想要答「是」，就想像自己在打網球，如果想要答「否」，則在腦中想著自己家的位置。如果病人所想的是打網球，運動皮質就會變得活躍，也就代表他想答「是」；如果活躍的是負責空間記憶的大腦區域，也就代表病人想答「否」。7


    # 圖靈測試


    這一套用在人類身上很方便，但用在電腦上又如何？由於電腦是以矽為基礎，而人類的神經網路是以碳為基礎，兩者架構大不相同，因此人類意識的特徵很可能無法套用。我們似乎陷入一個惡性循環了。一開始，是我們相信「人類說自己有意識的時候，就是真的有意識」，接著我們就能找出人類意識的腦波特徵，再接著就能用這些特徵來「證明」人類確實有意識。但如果人工智慧也說自己有意識，我們該信嗎？


    到目前為止，我們對這個問題還沒有很好的答案。早在幾千年前，哲學家就已經發現，沒有辦法明確證明除了自己以外的任何事物具有意識。而且就算只把範圍限制在其他人類，我們也只是假定'
