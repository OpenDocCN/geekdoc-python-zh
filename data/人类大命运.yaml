    # 哪個聲音是「真正的自我」?


    就個人而言,每個人都可能對這些問題有不同的看法。但從歷史觀點,現在顯然是風雨欲來。人文主義的最高誡命:「聆聽你自己!」已經不再不證自明。我們學會把內心的聲音調高調低之後,也就得放棄對「真實」的信念,因為我們再也不清楚現在是誰在調整開關。把腦中的噪音關掉似乎是個大好主意,但前提是要能讓我聽到真正的自我。如果就是沒有哪個聲音是「真正的自我」,又要怎麼決定哪些聲音要小、哪些聲音該大?


