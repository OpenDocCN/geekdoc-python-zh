  md: '# 第10章 新宗教：科技人文主義


    人文主義的戲劇，多半是以某個令人痛苦的欲望為開展。例如蒙太玖家的羅密歐，愛上了凱普雷特家的朱麗葉，兩家卻是世仇，於是雙方都非常痛苦。科技對這種情節的解法，就是確保讓我們不會有令人痛苦的欲望。如果羅密歐和朱麗葉服個藥丸、或是戴個頭盔，直接把那些對彼此造成不幸的愛意給消滅掉，不就沒事了嗎？


    在此，科技人文主義面臨了一項無解的兩難。它認為人的意志是宇宙中最重要的東西，因此推動人類開發能夠控制、重新設計意志的科技。畢竟，能夠控制全世界最重要的東西，不是太好了嗎？然而一旦這樣的控制成真，過去神聖的人類就會成了另外一項設計品，反而讓科技人文主義不知何去何從。只要我們仍然相信人類的意志和經驗是權威和意義的本源，就永遠無法面對這些科技。


    因此，有個更大膽的科技宗教，打算直接徹底切斷與人文主義的臍帶。這個科技宗教所預見的世界，並不是圍繞任何人類生命形式的欲望和經驗而轉。


    但又是什麼東西能夠取代欲望和經驗，成為一切意義和權威的本源？在2016年，正有一位候選人坐在歷史的接待室，等候面試。這位候選人名叫「資訊」。


    目前，最耐人尋味的新興科技宗教正是數據主義（Dataism），崇拜的既不是神祇、也不是人類，而是敬拜資料數據。'
