    # 踏上綠野仙蹤的黃磚路 ❋


    根據中國哲學，世界是由陰陽這兩種相對、但又相依的力量所維繫。對於實際的物理世界來說，可能並不為真；但對於由科學和人文主義的契約所創造的現代世界來說，的確如此。


    每股科學的陽，都包含著一股人文主義的陰，反之亦然。陽給了我們力量，而陰則是提供意義和倫理判斷。現代性的陽和陰，分別就是理性和感性、實驗室和博物館、生產線和超市。人們常常只看到陽的一面，認為現代世界就是枯燥、科學、邏輯和實用，像是實驗室或工廠。然而，現代世界其實同時也是個奢華的超市。人類史上，從沒有任何文化如此重視人的感受、欲望和經驗。人文主義將生命看作是一連串的經驗，於是這個新神話便為從旅遊到藝術等等許多現代產業奠下基礎。旅行社和餐廳真正賣的不是機票、也不是什麼高檔晚餐，而是新奇的體驗。


    同樣的，現代之前的敘事多半強調外部事件和行動，但到了現代的小說、電影和詩，常常強調的就是感受、感覺。希臘羅馬史詩或中世紀的騎士文學，記錄的都是英勇的行為，而不是種種感受。這一章講的可能是某個勇敢的騎士，如何挑戰可怕的食人魔，最後殺了食人魔。另一章又講了騎士如何從噴火惡龍手中，救出美麗的'
