    從人類學和考古證據看來，遠古狩獵採集者很有可能是泛靈論者，認為人類和其他動物並沒有什麼不同。整個世界（對當時的人來說，大概就是自己住的山谷和附近山區）共屬於這裡的萬物，而且萬物皆遵循著同樣一套規則：對於任何事情，只要是相關各方，就要不斷協商。於是，人們說話的對象不只有動物、樹木、石頭，


