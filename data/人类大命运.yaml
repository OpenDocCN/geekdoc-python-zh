    已經和《聖經》時代大為不同了，但是人類心靈的深層結構仍然相同。正因如此，我們現在觀看《聖經》、《論語》、或者是蘇弗克里茲（Sophocles）和尤里庇狄思（Euripides）的希臘悲劇，依然能從字裡行間找到自我。這些經典的創作者和我們都是一樣的人類，於是我們覺得這些典籍裡說的就是我們。在現代劇場的作品裡，伊底帕斯、哈姆雷特和奧賽羅，可能是穿著牛仔褲和T恤，而且還有臉書帳號，但他們的情感衝突卻和原劇並無不同。


