    # 出現「超人類」新種姓貴族


    面對這種情境，科學家的標準答案是：二十世紀也有許多醫療突破是從富人開始，但最後全體人類都同樣受益，所以其實是有助於縮小社會差距、而非擴大差距。舉例來說，疫苗和抗生素最早只有西方國家的上層階級能夠享有，但現在已改善了全球所有人類的生活。


    不過，若認為這種過程將會在二十一世紀重演，那很可能只是一廂情願。原因有二：第一，醫學的概念正在經歷巨大變革。二十世紀的醫學旨在治癒病人，但二十一世紀的醫學則逐漸走向要讓健康的人再升級。「治癒病人」代表的是一種平等，因為這假設有一套正常身心健康的規範標準，而人人都應享有這樣的健康。如果有人低於標準，醫師就該解決問題，讓病人能夠「像大家一樣」。


    相較之下，要讓健康的人再升級，背後則是精英的概念，因為這裡並沒有所有人類一體適用的標準，而是要讓某些人就是比其他人強。有太多人就是希望自己記憶力比別人強、智商比別人高、性能力更不能輸。如果某種升級已經變得太便宜、太普遍，人人都能享有，那等於又要把基線提高，有待下一代療法繼續超越。


    因此，到了2070年，雖然窮人很有可能享有比今天更好的醫療保健，但他們與富人的差距將更為拉大。要做比較的時候，我們找的比較對象通常都會是同時代更幸運的人，而不是以前命運不佳的祖先。如果你現在對一個住在底特律貧民區的美國人說，他享有的醫療保健水準，可比一世紀前的美國人好得多了，大概不會有什麼鼓勵作用。事實上，這種話聽起來是十足的自以為是、自以為了不起。住底特律貧民區的美國人會說：「為什麼我要和十九世紀的工'
