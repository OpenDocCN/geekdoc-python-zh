  md: '但在未來，則可能更會著重在改進人的身心，或直接將人與工具結合起來。人要升級為神，有三條路徑可走：生物工程、半機械人（cyborg）工程與無機生命（inorganic
    life）工程。


    生物工程的起源，是認為我們還遠遠尚未發揮人類身體的完整潛力。四十億年來，天擇（natural selection）不斷對生物撥撥弄弄、修修補補，讓我們從變形蟲變成爬蟲、再到哺乳動物，現在成了自封的「智人」。沒有理由認為智人就是最後一站。從人類發展歷程來看，不過就是在基因、荷爾蒙和神經元方面，出現一些相對來說並不大的變化，就已經足以讓直立人（Homo
    erectus，最厲害的成就只是能製作出石刀），變成了智人（生產出太空船和電腦）。誰曉得如果人類的DNA、內分泌系統和大腦結構再多變化一些，結果會是如何？


    生物工程並不會耐心等待天擇發揮魔力，而是要取來舊有的智人身體，刻意改寫基因碼、重接大腦迴路、改變生化平衡，甚至是要長出全新的肢體。這樣一來，將會創造出一些小神（godling），這些小神與我們智人的差異，可能就如同我們和直立人的差異，那般巨大。


    半機械人工程則更進一步，是讓人體結合各種非生物的機器設備，例如仿生機械手（bionic hand）、人造眼，又或是將數百萬個奈米機器人注入我們的血管，讓它們在血液中巡航、診斷病情並修補損傷。這種半機械人的某些能力，將會遠遠超出任何有機的人體。例如，一副有機身體的所有部分都必須緊緊相連，才能發揮作用。如果有一頭大象的大腦在印度、眼睛和耳朵在中國、腳在澳洲，最有可能的情況就是這頭大象根本就死了，而且就算因為某種神祕的因素而還活著，也是眼不能視、耳不能聽、足不能行。'
