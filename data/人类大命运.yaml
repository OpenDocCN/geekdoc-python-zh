  md: '舉例來說，讓我們看看佛洛伊德的以下主張：「軍隊會控制性驅力，以推動軍事上的侵略性。軍隊召募的就是性驅力達到頂峰的年輕男子，而又限制士兵性交、限制士兵釋放這些壓力的機會，於是讓壓力在士兵體內不斷累積。軍隊接著就會把這種受抑制的壓力重新導向，並允許壓力以軍事侵略的形式釋放。」這根本就是蒸汽引擎的運作原理。先將沸騰的蒸汽限制在一個密閉容器內，讓蒸汽壓力累積得愈來愈高，直到突然打開閥門，讓壓力往預定的方向釋放，就能用來推動火車或紡織機。也不只是在軍隊，我們在各種活動領域都常常抱怨，覺得心裡有股壓力愈來愈大，說如果不能找個方法「釋放壓力」，就快要爆炸了。


    到了二十一世紀，要再說人類心理就像是蒸汽引擎，可能聽來有點幼稚。既然我們現在有了「電腦」這項遠遠更為複雜的科技，也就開始將人類心理比喻成處理資訊的電腦，而不再說是調節壓力的蒸汽引擎。但就算是這個新的比喻，也可能同樣太過天真。畢竟電腦沒有心靈，就算程式出了問題，它們也不會想要做什麼；就算專制政權把整個國家的網路切斷，網際網路也是不痛不癢。所以，我們又為什麼要用電腦來做為瞭解心靈的比喻呢？


    話又說回來，我們真能確信電腦沒有感覺或欲望嗎？而且就算它們現在真的沒有，或許某天變得夠複雜之後，電腦也可能發展出意識？如果真發生這種事，我們又要如何確定？等到電腦取代了公車司機、老師、心理醫師，我們要怎麼知道它們是真有感情、又或只是無意識的演算法集合？


    講到人類，我們現在已經能分辨「有意識的心理經驗」和「無意識的腦部活動」有何差別。雖然我們距離理解意識還很遠，但科學家已經成功找出意識的一些電化學特徵了。科學家的做法是先假'
