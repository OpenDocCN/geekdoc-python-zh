    好消息是：人類已經享受了幾百年的經濟成長，卻一直沒成為生態崩潰的受害者。其他許多物種沒能撐過這個過程；人類也曾面臨一些經濟危機和生態災難，但總能化險為夷。


    但是，沒有任何自然律能夠保證未來繼續一帆風順。究竟科學能否永遠拯救經濟免於冰封、地球免於沸騰，實在沒人說得準。而且，由於腳步不斷加快，能夠犯錯的空間也不斷縮小。以前可能只要一個世紀發明出一項神奇的產品，便已足夠，但現在可能每兩年就得出現一項奇蹟。


    我們也該思考，生態末日對於不同的人類階級，又有什麼樣的不同後果。歷史從無正義。每當災難發生，就算這場悲劇根本是由富人所引起，但窮人受到的苦難幾乎總是遠遠高於富人。在乾旱的非洲國家，全球暖化已經開始影響窮人的生活，這些人受影響的程度遠比富裕的西方人來得高。矛盾的是，科學的力量愈大，反而可能愈危險；原因就在於這讓富人自鳴得意。


    以溫室氣體的排放為例。大多數學者和愈來愈多的政治家，已經開始體認到全球暖化的現實和危險程度，但也僅止於體認，而未有任何實際作為，未能真正改變我們的行事做法。對於全球暖化，'
