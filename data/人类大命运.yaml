    # 「量化自我」蔚為風潮


    有些人用這些應用程式時，並沒想太多，但對某些人來說，這已經構成一種意識型態、甚至是宗教。這個「量化自我」（Quantified Self）的運動認為，所謂的自我，就是數學模式。但因為這些模式非常複雜，人類心靈並無法理解。所以，如果真想遵從德爾菲神殿的神諭「認識你自己」（know
    thyself），就別再浪費時間研究哲學、冥想或精神分析了，反而應該系統性蒐集自己的生物統計資料，允許演算法為你分析這些資料，好告訴你：你是誰、又該做些什麼。這波運動的箴言，就是「透過數字，得到對自己的知識。」25


    2000年，以色列歌手沙班（Shlomi Shavan）以一曲〈亞瑞克〉（Arik）登上當地流行排行榜首。內容講的是有個男人，一直很糾結於女友的前男友亞瑞克。他想知道，究竟他和亞瑞克誰床上表現更佳。女友不想回答這個問題，只說各有長處。但這傢伙並不滿意，追問：「小姐，告訴我明確的數字。」這個嘛，正是為了滿足這種人，有一間名為「床柱」（Bedpost）的公司，賣的正是一種生物統計臂環，讓你在做愛時戴著，就能蒐集各種像是心跳、排汗、性交持續時間、性高潮持續時間、燃燒卡路里等數據。這些資料會再傳到電腦加以分析，就能用精確的數字來評斷您表現如何。這下，可不能再假高潮、也不用再問「剛才爽不爽」了。26'
