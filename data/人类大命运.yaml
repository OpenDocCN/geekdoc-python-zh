    # 第8章


    # 實驗室裡的定時炸彈


    時至今日，主導世界的仍然是全套自由主義的各種思想：個人主義、人權、民主、自由市場。然而二十一世紀的科學，正在破壞自由主義秩序的基礎。如同前面章節提到的，科學不討論價值觀的問題，因此科學無法論斷自由主義的「自由比平等更重要」或「個人比集體更重要」這些抽象倫理判斷，究竟是對是錯；不過，自由主義的基礎同樣也有它自己深信不疑的事實聲明，但這些事實聲明就是過不了科學審查這一關。


    自由主義重視個人自由，是因為相信人類有自由意志。自由主義認為，選民和顧客的決定既不是命中注定、也不是任意隨機，雖然人都會受到外部力量和隨機事件的影響，但到頭來，人人都是揮舞著自由的魔杖，為自己做決定。正因如此，自由主義認為選民和顧客至上，也總告訴我們要隨心而為、做讓自己覺得快樂的事。是我們的自由意志讓整個宇宙充滿意義；外人絕不可能知道你真正的感覺、也不可能預測你會做什麼選擇，所以你也不該讓什麼「老大哥」來決定你的興趣和欲望。'
  - '[PAGE 322]


    「人類有自由意志」看起來彷彿不是倫理判斷，而是對世界的事實描述。然而，這種說法雖然在洛克、盧梭或傑佛遜的時代可能很有道理，但根據生命科學的最新發現，卻已經不再成立。自由意志與當代科學之間的矛盾，已經成了實驗室裡的一頭大象（譯注：這是俚俗語，意思是：成了科學界的禁忌），許多人假裝專心看著顯微鏡和fMRI掃描儀，而不願面對這個問題。¹


    在十八世紀，智人就像個神祕的黑盒子，我們完全不知道內部如何運作。所以如果有人拿刀把另一個人刺死，學者想問原因的時候，一個聽來有說服力的答案會是：「因為他自己做了這個選擇，用自由意志選擇了謀殺；也如此，他必須對自己犯下的罪行，負起全責。」到了二十世紀，科學家打開了智人這個黑盒子，既沒找到靈魂、也沒找到自由意志，只找到基因、荷爾蒙、神經元——這些東西與現實世界的萬物都遵守著相同的物理定律和化學定律。時至今日，如果有個人拿刀把另一個人刺死，學者想問原因時，若有人再說是「因為他自己做了這個選擇」，這種話聽起來已經不再具有說服力了。反而是遺傳學家和大腦科學家，能夠提供更為詳細的答案：「他會這麼做，是因為特定基因構造讓大腦出現某種電化學反應，而基因構造反映的是從古至今的演化壓力及突變的結果。」


    會導致謀殺的大腦電化學反應，可能來自基因預設的指令、可能是隨機因素的結果，也可能是兩者的結合，但總之並非「自由意志」。例如，神經元之所以觸發，原因可能是基因預設的，只要遇到外部刺激便如此反應；也有可能是隨機事件，像是因為某個放射性原子忽然衰變。但不論是哪一種，都沒有「自由意志」插手的餘地。如果是遇到刺激、引發一連串生化事件的連鎖反應，每個事件都是由前一事件所決定，最後達成的決定當然不算是自由意志。如'
  - '[PAGE 323]


    果是原子忽然衰變造成的決定，那也只是單純的隨機事件，當然也不算自由意志。至於隨機事件加上基因預設的情況，也就是後果可能發生、也可能不發生，這同樣不可能等於自由意志。


    # 「自由意志」純屬想像？


    假設我們做出一具機器人，再把機器人的中央處理器連接到一團有放射性的鈾塊。只要遇到需要二選一的情境（例如要按右鍵或左鍵），機器人就會計算前一分鐘衰變的鈾原子數。數字是偶數，就按右鍵；數字是奇數，就按左鍵。這樣一來，我們永遠不可能預測這具機器人究竟會如何選擇——當然也不會有人認為這是機器人的「自由」選擇，也不可能讓它參與民主投票，或是要它對自己的選擇負起法律責任。


    所以就目前最先進的科學看來，人的選擇不是基因預設、就是隨機，兩者就像是把蛋糕一分為二，沒有哪一小塊是「自由意志」的份。到頭來，我們奉為神聖的自由，就像靈魂一樣，只是個空虛的詞彙，只存在人類發明的想像故事中。


    演化論像是為自由的棺材，釘上了最後一根釘子。「永恆的靈魂」在演化論面前就是說不通，而「自由意志」也是如此，否則如果人類真是自由的，哪有天擇的餘地？


    根據演化論，動物做的所有選擇（不論是選擇棲地、食物、或伴侶），都是基因密碼的反映。如果有適當的基因，讓這隻動物選了很營養的蘑菇、挑了健康而有生育力的伴侶，這些基因就能傳到下一代。如果基因不適當，讓這隻動物選了有毒的蘑菇、挑了虛弱的伴侶，這些基因就會滅絕。然而，如果這隻動物真能「自由」選'
- md: '擇要吃什麼、與誰交配，天擇就無用武之地。


    碰上這樣的科學論理，人們常常裝作沒看到，說他們「覺得」自己很自由、都依自己的意願和決定行事。確實也沒錯，人類是能夠依自己的欲望而行事。如果所謂「自由意志」指的就是「依自己的欲望而行事」，那麼人類確實有自由意志；但這樣說來，黑猩猩、狗和鸚鵡也一樣有自由意志。鸚鵡學會說「我想吃餅乾」之後，還真能有餅乾吃呢。


    但這裡最重要的問題，並不在於鸚鵡或人類能不能因應內在欲望而做出行動，而是究竟能不能選擇要產生什麼欲望？為什麼鸚鵡想吃餅乾、不想吃黃瓜？為什麼我想把討厭的鄰居一槍斃了，而不是把另一邊的臉頰轉過去讓他打？為什麼我這麼想買紅色的車、而不買黑色的車？為什麼我想投的是保守黨、而不是工黨？這些都不是我的「選擇」。我之所以覺得腦中浮起某個願望，是因為大腦裡某種生化過程創造出的感覺。這些過程可能是基因預設、也可能是隨機發生，但絕不是自由意志。


    你可能會說，至少像是要把鄰居宰了、或是選舉投票的時候，並不是用當下瞬間的感受來做選擇，而是經過長期思索，細細思量了各種重要論點。然而，檯面上就是有那麼多種論點，有的會讓你投給保守黨，有的會讓你投給工黨，還有些會讓你投給英國獨立黨（UKIP），或是乾脆待在家，不出門投票。是什麼讓你選擇了某種論點、而不是另一種論點？在腦中的中央車站，我可能會因為基因預設而被迫上了某列的論點列車，又或是隨機被分配上哪一列車；但我無法「自由選擇」讓自己只去思考那些「使我投票給保守黨的論點」。


    以上所說的，絕不只是個人假設或哲學猜測。現在只要掃描人腦，就能在受測者自己有所感覺之前，預測他們會有什麼欲望、做出什麼決定。在一項此類實驗中，請受試者躺進一部巨大的腦部掃描儀，兩手各拿一只開關，隨時想按就可以按下任何一個開關。科學家只要觀察大腦神經活動，就能預測受試者會按哪個開關，而且時間甚至比受試者自己感覺到想按開關還更早。在人類感覺到自己做某項決定前，大腦已經啟動了指示人類決定的神經事件，時間大約是在幾百毫秒到幾秒之前。


    決定要按下右邊或左邊的開關，反映的當然是這位受試者的選擇，但不能說是個「自由選擇」。我們對自由的信念，背後其實來自一套錯誤的邏輯。當一連串的生化反應讓我想按右邊的開關時，我確實覺得自己想按右邊的開關。一點沒錯，我確實想按。但有人就一下跳到結論，認為這種想按的念頭，就叫做自己的選擇。這當然是錯誤的解讀，因為人的欲望不是一種選擇，我們只能感覺到自己的欲望，再據以行事。


    但就算是科學家，現在也常使用「自由意志」這種過時的神學概念，民眾也還是繼續吵著自由意志的話題。幾個世紀以來，基督教、伊斯蘭及猶太神學家，一直對靈魂和意志的關係爭論不休。他們假設每個人都有一個內心本質，稱為靈魂，也就是真實的自我。他們進一步認為，這個自我擁有各種欲望，就像擁有衣服、車子和房子一樣。他們還說，每個人都能夠像是選衣服一樣，選擇自己的欲望，而命運就是依據這些選擇而定。如果選了好的欲望，最後就會上天堂；如果選了壞的欲望，最後就得下地獄。


    問題就來了：欲望真的能「選」嗎？舉例來說，夏娃想要吃蛇給她的那顆禁果，但她為什麼會想做這件事？是有人強加於她？完全隨機出現在她的心中？還是她的「自由」選擇？如果想做這件事並不是她的自由選擇，那為什麼她又要受罰呢？


    然而，如果我們已經接受「人沒有靈魂」、也沒有稱為自我的內在本質，這時再去問「自我如何選擇它想要的事物？」就是件不合理的事。這就像是問單身男子「你太太怎麼挑衣服？」一樣莫名其妙。事實上，人類有的就是一條意識流，欲望會在這條意識流中起伏來去，並沒有什麼永存不變的自我，能夠擁有這些欲望。如此說來，要問我到底是因為基因預設、隨機發生、還是自由意志而選擇了自己的欲望，其實是個沒有意義的問題。


    這個概念可能聽起來很複雜，但檢測的方式卻是意想不到的簡單。下次有個概念從你腦中跳出來，就趕快問問自己：「為什麼我會想到這個想法？我是在一分鐘前決定要想到這個想法、然後才想到的嗎？還是我自己並沒下任何指示或准許，這個想法就自己出現？如果我真的是自己思想和決定的主人，我能不能決定在接下來六十秒內，不要想到任何事？」請試試，看看情況如何。


    質疑是否有自由意志，並不只是一種哲學上的練習，而是確有實際的意義。如果生物確實沒有自由意志，也就意味著只要使用藥物、基因工程、或直接對腦做出刺激，就能操縱，甚至控制他們的欲望。


    如果想看看這種哲學觀點在日常生活的應用，可以參觀半機械鼠（roborat）的實驗室。這裡的半機械鼠，其實就是一般實驗用的大鼠，但有一點不同：科學家在大鼠腦中掌管感覺和報償的區域，植入電極，於是能夠遙控操縱這隻大鼠。只要稍加訓練，研究人員不僅能控制大鼠左轉或右轉，還能控制牠爬梯子、用嗅覺查探垃圾堆，以及做些大鼠通常不愛做的事情，例如從高處一躍而下。軍方和民間企業都對半機械鼠大感興趣，覺得在許多任務和情境都能派上用場，像是找出炸彈和詭雷，尋找倒塌建物下的受困倖存者，或是畫出地下隧道和洞穴的路線圖。


    動物福利團體提出關切，擔心這些實驗會對大鼠造成痛苦。但紐約州立大學半機械鼠研究先驅塔瓦（Sanjiv Talwar）教授，認為這些擔心是多餘的，大鼠其實很享受這些實驗。他解釋道，這些大鼠「工作是得到愉悅」，每次電極刺激牠們大腦的報償中心，「大鼠會覺得彷彿登上極樂」。


    就我們所知，這些大鼠並不覺得受人控制，也不覺得做了什麼違背自己意志的事。塔瓦教授按下遙控器，是讓大鼠自己想要往左走，於是牠就往左走。塔瓦教授按另一個開關，是讓大鼠想要爬梯子，於是牠就爬了梯子。畢竟，欲望也只是神經元的某種觸發模式而已。至於神經元觸發的原因，究竟是因為其他神經元的刺激或是塔瓦教授遙控器控制電極的刺激，真有那麼重要嗎？如果你去問問那隻大鼠，牠可能會告訴你「我當然有自由意志啊！你看，是我想要左轉，所以我就左轉了。是我想爬梯子，所以我就爬了。這不就證明了我有自由意志嗎？」


    ## 實驗之二：經顱刺激器


    智人的實驗則顯示，人也像大鼠一樣可以被操縱；只要能刺激人腦正確的位置，就算是愛、憤怒、恐懼或沮喪這些複雜的感受，也能夠予以創造或抑制。美國軍方最近開始實驗在人腦植入電腦晶片，希望能治療患了「創傷後壓力症」的士兵。在耶路撒冷的哈達薩醫院（Hadassah
    hospital），醫師為躁鬱症處於急性鬱期的病人，用了一種創新療法。他們將電極植入病人大腦，並連接到植入病人胸部的微型電腦。每次從電腦得到命令，電極就會放出一道微弱的電流，使造成憂鬱的大腦區域麻痺。這種療法並非萬無一失，但有部分病患就表示，那些一直折磨他們的空虛和黑暗，就好像變魔法一樣消失無蹤。


    曾有一位病人抱怨症狀在術後幾個月復發，讓他整個人陷入嚴重憂鬱。但經過檢查，醫師發現了問題根源：電腦的電池沒電了。他們一換了電池，憂鬱也就煙消雲散。


    這種療法顯然有其倫理限制，研究人員只能在某些特殊病例，才能將電極植入人腦，其他人體實驗多半還是使用非侵入性的頭盔裝置——技術上稱為「經顱直流電刺激器」（transcranial
    direct-current stimulator）。這種頭盔配有電極，連接頭皮外側，能夠產生弱電磁場，瞄準特定大腦區域，進而刺激或抑制所選定的大腦活動。


    美國軍方正在測試這種頭盔，希望能提升士兵在訓練或實戰時的專注力和表現。主要實驗由位於俄亥俄州空軍基地的人類效能指揮部（Human Effectiveness
    Directorate）進行。目前距離能下定論還很遠，而且經顱刺激器的效用還是名過於實，但有幾項研究指出，像是無人機操作員、空中交通管制員、狙擊手等等需要長期保持高度專注的職務，都能夠透過這種方式，提升認知能力。


    《新科學人》（New Scientist）的記者愛蒂（Sally Adee）就曾經獲准前往一處狙擊手訓練地點，親身測試效果。她一開始先不戴頭盔，進入戰場模擬室，面對二十個蒙面男子綁著自殺炸彈、持著步槍，直接向她衝來，令她一陣驚恐。她寫道：「好不容易射倒一個人，又有另外三個新的攻擊者不知道從哪裡冒出來。我顯然開槍速度不夠快，慌得要命又笨手笨腳，一直卡彈。」還好，這些攻擊者只是投射到她身邊巨型銀幕上的影像。但她還是覺得自己實在表現太差，沮喪到簡直想把槍丟下，一走了之。


    然後，他們幫她戴上了頭盔。她說其實沒什麼特別感覺，只是稍微覺得有點刺痛，嘴裡有奇怪的金屬味。但接下來，她開始一個一個放倒這些虛擬恐怖份子，態度冷靜、手法純熟，簡直像藍波或克林伊斯威特。「看著這二十個人拿槍衝向我，我冷靜的舉起步槍，深吸一口氣，放倒離我最近的人，再平靜的評估下個是誰。好像才沒一會，我就聽到有個聲音說：『好了，結束了。』模擬室裡燈光亮起……我身邊橫七豎八倒著屍體的影像，忽然一陣安靜，但我好希望有更多人來攻擊我。而且他們幫我脫下頭盔、移開電極的時候，我甚至有點失望。我抬起頭，想知道是不是有人把時鐘調快了，完全沒感覺到時間已經足足過了二十分鐘。『我擊中了幾個？』我問那位助理。她看著我，帶點揶揄的神色，『他們全掛了。』」


    這場實驗讓愛蒂的生命大為改觀。接下來幾天裡，她意識到自己經歷了一場「近乎靈性的體驗……並不是覺得更聰明、或是學得更快。真正讓我覺得好像腳下忽然一空的，是我這輩子第一次覺得大腦裡忽然一片安靜……沒有任何自我懷疑，彷彿看到一個新世界。腦中忽然就是靜得叫人難以置信……我希望你會懂，在那次測驗後的幾個星期裡，我心裡最想做的事情，就是再回去那邊，把電極再接回去。我也開始冒出許多疑問。平常，在我腦中總像是有許多憤憤不平的小地精，占滿了我的心思，讓我害怕嘗試，最後造成失敗。但除了這些聲音之外，我究竟是誰？這些聲音又是從哪裡來的？」


    ## 這能增強或削弱自由意志？


    這些聲音有些是重複了社會的偏見，有些是附和著我們個人的歷史，也有些傳達出我們的基因傳承。愛蒂認為，這一切創造出一個看不見的故事，在我們不知不覺中，塑造著我們有意識做出的決定。如果我們可以重寫這些內心的獨白、甚至叫它們完全噤聲，會發生什麼事？


    直到2016年，經顱刺激器仍在起步階段，也無法預測是否會在何時成為成熟的科技。到目前為止，透過這種方式增強能力，只能維持一段短暫的時間。愛蒂的經驗能到二十分鐘，可能是特例中的特例（甚至就只是安慰劑效應而已）。關於經顱刺激器，多數已發表成果的研究，都是人類樣本數極少、情境也有特殊限制，而且長期影響和危險也仍然完全未知。只不過，如果未來這項科技成熟，或是我們找到其他方法來操縱大腦的腦電模式，會對人類社會和人類有何影響？


    如果哪天人類真能控制自己的大腦電路，除了希望自己更有效擊倒恐怖份子之外，可能也會希望實現一些更俗世、自由主義的目標。換句話說，也就是能夠更有效學習和工作，讓自己能全心投入遊戲和嗜好，或是能在任何時刻專心於有趣的事物上（不管是數學或足球）。


    然而，如果這樣的操縱成了一件普遍的事，原本該由顧客自由操縱的意願，就會變成另一項可購買的商品。希望彈得一手好鋼琴，但要練琴時卻又想看電視嗎？沒問題：戴上頭盔、安裝適當的軟體，你就能夠完全只想練鋼琴了。


    你或許覺得不服氣，認為如果能讓腦中的聲音噤聲或是放大，其實是增強了自由意志，而非削弱。在過去，你可能就是因為被外界干擾，才沒能實現自己最珍視、內心最深處的真實欲望。有了這種讓人專心的頭盔或類似設備，你就更能把父母、牧師、神父、祭司、公關、廣告商、鄰居的聲音統統排除掉，專注於你自己想要什麼。然而我們很快就會看到，要說你有個單一的自我、能夠區分自己的真實欲望與外界聲音的不同，這也只是另一個自由人文主義的神話，已經遭到最新科學研究推翻了。


    ## 每個人心裡的中情局與國務院


    科學不僅破壞了自由人文主義對於自由意志的信念，也破壞了對個人主義的信念。自由主義認為每個人都有單一、不可分割的自我——individual（個人）這個英文字的意思，也就是in-dividual（不可分割的）。


    確實，人體是由大約三十七兆個細胞組成，而且每天身體和心智都會經歷無數次的變化及原子分子的置換，但只要集中精神、努力接觸自己，一定就能在內心深處，找到單一、清楚且真實的聲音，這也就是真實的自己，而這正是宇宙一切意義和權威的源頭。對於自由主義來說，想要有意義，就必須有一個真正的自我，而且還只能有唯一的自我。否則要是有許多個自我，我在投票站、超市和婚姻市場上，該聽哪個的意見？


    但經過數十年研究後，生命科學的結論是：這種自由主義的故事完全就是神話。所謂唯一真正的自我，就和永恆的靈魂、耶誕老人和復活節兔子一樣虛假。如果我真的深深去探測自己，就會發現自己一向以為理所當然的單一性，會分解成各種互相衝突的聲音，沒有哪個是「真正的自我」。人類絕非「不可分割」，反而就是由許多分割的部分組成。


    像是人腦就是由兩個腦半球組成，中間由一束神經纖維連結。每個腦半球控制著身體相對的另一側，例如右腦控制身體的左側、接收來自左側視野的資料、負責移動左臂和左腿；左腦則是剛好相反。因此，右腦中風的病人有時候會忽視身體的左側，例如只梳右邊的頭髮，或是只吃盤子右邊的食物。


    左右腦也有情感和認知方面的分工，但情況不算太明顯。事實上，多數認知活動都會同時用到兩個腦半球，只是使用程度有高低之別。例如在大多數情況下，左腦在語言和邏輯推理時，扮演較重要的角色，而右腦則是處理空間資訊時，較為強勢。


    在左右腦關係的研究上，許多突破性的成果是出自對癲癇病人的研究。嚴重的癲癇病人，是從大腦的某一區域掀起一場電風暴，迅速傳播到其他區域，造成急性癲癇發作。癲癇發作期間，病人無法控制身體；一旦發作頻繁，常常就會讓他們丟掉工作、無法過正常生活。在二十世紀中葉，如果其他療法都無法奏效，醫師的最後一招就是把連接兩個腦半球的神經束切斷，讓某個腦半球掀起的電風暴不會影響到另一半球。對腦科學家來說，這些病人簡直就像是金礦，提供了許多驚人的資料。


    關於這些「裂腦」（split-brain）病人，最著名的研究者是斯佩里（Roger Wolcott Sperry，因其突破性發現，獲頒1981年諾貝爾生理醫學獎），以及他的學生葛詹尼加（Michael
    S. Gazzaniga）。其中一項研究的對象是一位青少年。研究者問他，長大後想做什麼。男孩回答說：繪圖員。這個答案是由左腦提供，邏輯推理和語言多半由左腦控制。然而，男孩的右腦也有另一個活躍的語言中心，雖然無法控制口語，但能用拼字遊戲
    Scrabble 的字母牌拼出字來。研究人員很想知道男孩的右腦有何意見，於是把字母牌都散在桌上，再在一張紙上寫著：「你長大後想做什麼？」並把紙放在男孩左邊視野的邊緣處。來自左邊視野的資料會由右腦處理。右腦無法控制口語，所以男孩什麼也沒說，但他的左手開始迅速在桌上移動，到處蒐集字母牌，拼出：「汽車比賽」。厲害了吧！


    同樣令人感到離奇的另一項行為，則是出現在二戰退伍老兵 WJ 身上。WJ 的雙手分別由不同的腦半球控制。他的兩個半腦之間沒有連繫，於是有時候右手要開門、左手卻會把門甩上。


    還有另一項實驗，葛詹尼加的研究團隊向左腦（負責語言）秀出雞爪的照片，同時向右腦秀出雪景照。接著問病人 PS 看到了什麼，他回答「雞爪」。葛詹尼加接著再秀出許多圖卡給
    PS 看，請他指出最符合他所看到的內容。病人的右手（由左腦控制）指向一隻雞，但同時左手卻也伸了出來，指向一隻雪鏟。葛詹尼加接著就問了這個再明顯不過的問題：「為什麼你會同時指了雞和雪鏟？」PS
    回答：「呃，雞爪和雞有關係，而要清雞舍需要鏟子。」


    這裡是怎麼了？控制語言的左腦並未接受到雪景這項資訊，根本不知道為什麼左手會指向鏟子，結果左腦就自創出一些覺得合理的解釋。多次重複實驗後，葛詹尼加的結論認為：左腦不僅處理口語能力，也是腦內的翻譯人員，會用各種片段的線索，捏造出合理的故事，想為我們的生活找出意義。


    又例如另一項實驗，是讓掌管非語言能力的右腦看到一張色情圖片。受試者開始臉紅、咯咯笑著。「你看到了什麼？」研究人員賊賊的問道。受試者的左腦說著「沒什麼，只是有光閃了一下」，但她立刻又開始咯咯笑了起來，還用手遮住了自己的嘴。「那你為什麼會笑呢？」研究人員追問。也是一頭霧水的左腦翻譯官，拚盡全力想找出什麼合理的解釋，於是回答說：因為房間裡有部機器看起來很好笑。


    這就像是中央情報局在巴基斯坦執行無人機空襲任務，但美國國務院卻毫不知情。等到有記者向國務院官員詢問此事，官員只能趕快編造一些貌似合理的解釋。但實際上，這些公關人員根本不知道為何要空襲，就只是瞎掰。


    不僅是裂腦的病人，而是所有人類都會用到類似的機制。一次又一次，我們心中的中情局都是不經國務院批准或知情，就恣意行事，接著我們心中的國務院就只能編出一個讓自己看來最像正人君子的故事。常常，就連國務院自己最後都信了自己編出的故事。


    ## 我到底是誰？


    行為經濟學家也曾做出類似的結論，當時討論的是民眾如何下各種經濟決定。或者講得更精準些，是誰下了這些決定。是誰決定買豐田而不買賓士、度假去巴黎而不去泰國、投資南韓債券而不是上海股票？多數實驗都指出，並沒有什麼「單一的自我」做出這些決定，而是人心中有許多不同、常常還相互衝突的內在，經過不斷拉扯才決定的。


    2002年諾貝爾經濟學獎得主康納曼（Daniel Kahneman），就做過一項開創性的實驗，請一組志願受試者參加分成三階段的實驗。在「短」階段的實驗中，受試者將一隻手放入14°C的水裡一分鐘，這種水溫會讓人不悅、接近痛苦。六十秒後，就請他們把手給抽回來。而在「長」階段的實驗中，受試者的手會放在另一個容器中，水溫同樣為14°C；但在六十秒後，會偷偷將熱水導進容器，使水溫略升為15°C；三十秒後，再請他們把手抽回來。有些受試者會先做「短」版的實驗，也有些是從「長」版的實驗開始。但不論哪種，都會在兩個部分都結束的七分鐘後，進行第三階段、也是最重要階段的實驗。研究人員告知受試者，他們必須重複前兩階段的其中之一，但他們可以自由選擇。足足有80%的人選擇了「長」版實驗，在印象中以為這比較不那麼痛苦。


    這個冷水實驗如此簡單，透露的意義卻動搖了整個自由主義世界觀的核心。實驗告訴我們，人體內至少有兩種自我：經驗自我（experiencing self）及敘事自我（narrating
    self）。


    經驗自我是我們每時每刻的意識。所以對於經驗自我來說，顯然「長」版的實驗比較糟。因為你得先忍受14°C的水溫、達六十秒（「短」版實驗受的苦，在這裡一點也少不了），這已經很難忍受了，接下來你還得再忍受另外三十秒、15°C的水溫，雖然情況勉強好一點，但絕對也不愉快。對於經驗自我來說，在一個非常不愉快的經驗後，再加上另一個仍然不愉快的經驗，並不會讓整件事變得比較愉快一些。


    只不過，經驗自我並沒有深刻的記憶力。它不會說故事，而且我們要做重大決定的時候，也不會去問經驗自我有何想法。講到要喚起記憶、講故事、做重大決定，負責的是我們心中另一個非常不同的存在：敘事自我。


    敘事自我的概念，很類似葛詹尼加所說的左腦翻譯人員，永遠忙著將過去的絲絲縷縷，編織成一篇故事，並為未來制定計畫。敘事自我就像是記者、詩人或政治人物，不會敘述所有細節，通常只'
  mdcn: '擇要吃什麼、與誰交配，天擇就無用武之地。


    碰上這樣的科學論理，人們常常裝作沒看到，說他們「覺得」自己很自由、都依自己的意願和決定行事。確實也沒錯，人類是能夠依自己的欲望而行事。如果所謂「自由意志」指的就是「依自己的欲望而行事」，那麼人類確實有自由意志；但這樣說來，黑猩猩、狗和鸚鵡也一樣有自由意志。鸚鵡學會說「我想吃餅乾」之後，還真能有餅乾吃呢。


    但這裡最重要的問題，並不在於鸚鵡或人類能不能因應內在欲望而做出行動，而是究竟能不能選擇要產生什麼欲望？為什麼鸚鵡想吃餅乾、不想吃黃瓜？為什麼我想把討厭的鄰居一槍斃了，而不是把另一邊的臉頰轉過去讓他打？為什麼我這麼想買紅色的車、而不買黑色的車？為什麼我想投的是保守黨、而不是工黨？這些都不是我的「選擇」。我之所以覺得腦中浮起某個願望，是因為大腦裡某種生化過程創造出的感覺。這些過程可能是基因預設、也可能是隨機發生，但絕不是自由意志。


    你可能會說，至少像是要把鄰居宰了、或是選舉投票的時候，並不是用當下瞬間的感受來做選擇，而是經過長期思索，細細思量了各種重要論點。然而，檯面上就是有那麼多種論點，有的會讓你投給保守黨，有的會讓你投給工黨，還有些會讓你投給英國獨立黨（UKIP），或是乾脆待在家，不出門投票。是什麼讓你選擇了某種論點、而不是另一種論點？在腦中的中央車站，我可能會因為基因預設而被迫上了某列的論點列車，又或是隨機被分配上哪一列車；但我無法「自由選擇」讓自己只去思考那些「使我投票給保守黨的論點」。


    以上所說的，絕不只是個人假設或哲學猜測。現在只要掃描人腦，就能在受測者自己有所感覺之前，預測他們會有什麼欲望、做出什麼決定。在一項此類實驗中，請受試者躺進一部巨大的腦部掃描儀，兩手各拿一只開關，隨時想按就可以按下任何一個開關。科學家只要觀察大腦神經活動，就能預測受試者會按哪個開關，而且時間甚至比受試者自己感覺到想按開關還更早。在人類感覺到自己做某項決定前，大腦已經啟動了指示人類決定的神經事件，時間大約是在幾百毫秒到幾秒之前。


    決定要按下右邊或左邊的開關，反映的當然是這位受試者的選擇，但不能說是個「自由選擇」。我們對自由的信念，背後其實來自一套錯誤的邏輯。當一連串的生化反應讓我想按右邊的開關時，我確實覺得自己想按右邊的開關。一點沒錯，我確實想按。但有人就一下跳到結論，認為這種想按的念頭，就叫做自己的選擇。這當然是錯誤的解讀，因為人的欲望不是一種選擇，我們只能感覺到自己的欲望，再據以行事。


    但就算是科學家，現在也常使用「自由意志」這種過時的神學概念，民眾也還是繼續吵著自由意志的話題。幾個世紀以來，基督教、伊斯蘭及猶太神學家，一直對靈魂和意志的關係爭論不休。他們假設每個人都有一個內心本質，稱為靈魂，也就是真實的自我。他們進一步認為，這個自我擁有各種欲望，就像擁有衣服、車子和房子一樣。他們還說，每個人都能夠像是選衣服一樣，選擇自己的欲望，而命運就是依據這些選擇而定。如果選了好的欲望，最後就會上天堂；如果選了壞的欲望，最後就得下地獄。


    問題就來了：欲望真的能「選」嗎？舉例來說，夏娃想要吃蛇給她的那顆禁果，但她為什麼會想做這件事？是有人強加於她？完全隨機出現在她的心中？還是她的「自由」選擇？如果想做這件事並不是她的自由選擇，那為什麼她又要受罰呢？


    然而，如果我們已經接受「人沒有靈魂」、也沒有稱為自我的內在本質，這時再去問「自我如何選擇它想要的事物？」就是件不合理的事。這就像是問單身男子「你太太怎麼挑衣服？」一樣莫名其妙。事實上，人類有的就是一條意識流，欲望會在這條意識流中起伏來去，並沒有什麼永存不變的自我，能夠擁有這些欲望。如此說來，要問我到底是因為基因預設、隨機發生、還是自由意志而選擇了自己的欲望，其實是個沒有意義的問題。


    這個概念可能聽起來很複雜，但檢測的方式卻是意想不到的簡單。下次有個概念從你腦中跳出來，就趕快問問自己：「為什麼我會想到這個想法？我是在一分鐘前決定要想到這個想法、然後才想到的嗎？還是我自己並沒下任何指示或准許，這個想法就自己出現？如果我真的是自己思想和決定的主人，我能不能決定在接下來六十秒內，不要想到任何事？」請試試，看看情況如何。


    質疑是否有自由意志，並不只是一種哲學上的練習，而是確有實際的意義。如果生物確實沒有自由意志，也就意味著只要使用藥物、基因工程、或直接對腦做出刺激，就能操縱，甚至控制他們的欲望。


    如果想看看這種哲學觀點在日常生活的應用，可以參觀半機械鼠（roborat）的實驗室。這裡的半機械鼠，其實就是一般實驗用的大鼠，但有一點不同：科學家在大鼠腦中掌管感覺和報償的區域，植入電極，於是能夠遙控操縱這隻大鼠。只要稍加訓練，研究人員不僅能控制大鼠左轉或右轉，還能控制牠爬梯子、用嗅覺查探垃圾堆，以及做些大鼠通常不愛做的事情，例如從高處一躍而下。軍方和民間企業都對半機械鼠大感興趣，覺得在許多任務和情境都能派上用場，像是找出炸彈和詭雷，尋找倒塌建物下的受困倖存者，或是畫出地下隧道和洞穴的路線圖。


    動物福利團體提出關切，擔心這些實驗會對大鼠造成痛苦。但紐約州立大學半機械鼠研究先驅塔瓦（Sanjiv Talwar）教授，認為這些擔心是多餘的，大鼠其實很享受這些實驗。他解釋道，這些大鼠「工作是得到愉悅」，每次電極刺激牠們大腦的報償中心，「大鼠會覺得彷彿登上極樂」。


    就我們所知，這些大鼠並不覺得受人控制，也不覺得做了什麼違背自己意志的事。塔瓦教授按下遙控器，是讓大鼠自己想要往左走，於是牠就往左走。塔瓦教授按另一個開關，是讓大鼠想要爬梯子，於是牠就爬了梯子。畢竟，欲望也只是神經元的某種觸發模式而已。至於神經元觸發的原因，究竟是因為其他神經元的刺激或是塔瓦教授遙控器控制電極的刺激，真有那麼重要嗎？如果你去問問那隻大鼠，牠可能會告訴你「我當然有自由意志啊！你看，是我想要左轉，所以我就左轉了。是我想爬梯子，所以我就爬了。這不就證明了我有自由意志嗎？」


    ## 實驗之二：經顱刺激器


    智人的實驗則顯示，人也像大鼠一樣可以被操縱；只要能刺激人腦正確的位置，就算是愛、憤怒、恐懼或沮喪這些複雜的感受，也能夠予以創造或抑制。美國軍方最近開始實驗在人腦植入電腦晶片，希望能治療患了「創傷後壓力症」的士兵。在耶路撒冷的哈達薩醫院（Hadassah
    hospital），醫師為躁鬱症處於急性鬱期的病人，用了一種創新療法。他們將電極植入病人大腦，並連接到植入病人胸部的微型電腦。每次從電腦得到命令，電極就會放出一道微弱的電流，使造成憂鬱的大腦區域麻痺。這種療法並非萬無一失，但有部分病患就表示，那些一直折磨他們的空虛和黑暗，就好像變魔法一樣消失無蹤。


    曾有一位病人抱怨症狀在術後幾個月復發，讓他整個人陷入嚴重憂鬱。但經過檢查，醫師發現了問題根源：電腦的電池沒電了。他們一換了電池，憂鬱也就煙消雲散。


    這種療法顯然有其倫理限制，研究人員只能在某些特殊病例，才能將電極植入人腦，其他人體實驗多半還是使用非侵入性的頭盔裝置——技術上稱為「經顱直流電刺激器」（transcranial
    direct-current stimulator）。這種頭盔配有電極，連接頭皮外側，能夠產生弱電磁場，瞄準特定大腦區域，進而刺激或抑制所選定的大腦活動。


    美國軍方正在測試這種頭盔，希望能提升士兵在訓練或實戰時的專注力和表現。主要實驗由位於俄亥俄州空軍基地的人類效能指揮部（Human Effectiveness
    Directorate）進行。目前距離能下定論還很遠，而且經顱刺激器的效用還是名過於實，但有幾項研究指出，像是無人機操作員、空中交通管制員、狙擊手等等需要長期保持高度專注的職務，都能夠透過這種方式，提升認知能力。


    《新科學人》（New Scientist）的記者愛蒂（Sally Adee）就曾經獲准前往一處狙擊手訓練地點，親身測試效果。她一開始先不戴頭盔，進入戰場模擬室，面對二十個蒙面男子綁著自殺炸彈、持著步槍，直接向她衝來，令她一陣驚恐。她寫道：「好不容易射倒一個人，又有另外三個新的攻擊者不知道從哪裡冒出來。我顯然開槍速度不夠快，慌得要命又笨手笨腳，一直卡彈。」還好，這些攻擊者只是投射到她身邊巨型銀幕上的影像。但她還是覺得自己實在表現太差，沮喪到簡直想把槍丟下，一走了之。


    然後，他們幫她戴上了頭盔。她說其實沒什麼特別感覺，只是稍微覺得有點刺痛，嘴裡有奇怪的金屬味。但接下來，她開始一個一個放倒這些虛擬恐怖份子，態度冷靜、手法純熟，簡直像藍波或克林伊斯威特。「看著這二十個人拿槍衝向我，我冷靜的舉起步槍，深吸一口氣，放倒離我最近的人，再平靜的評估下個是誰。好像才沒一會，我就聽到有個聲音說：『好了，結束了。』模擬室裡燈光亮起……我身邊橫七豎八倒著屍體的影像，忽然一陣安靜，但我好希望有更多人來攻擊我。而且他們幫我脫下頭盔、移開電極的時候，我甚至有點失望。我抬起頭，想知道是不是有人把時鐘調快了，完全沒感覺到時間已經足足過了二十分鐘。『我擊中了幾個？』我問那位助理。她看著我，帶點揶揄的神色，『他們全掛了。』」


    這場實驗讓愛蒂的生命大為改觀。接下來幾天裡，她意識到自己經歷了一場「近乎靈性的體驗……並不是覺得更聰明、或是學得更快。真正讓我覺得好像腳下忽然一空的，是我這輩子第一次覺得大腦裡忽然一片安靜……沒有任何自我懷疑，彷彿看到一個新世界。腦中忽然就是靜得叫人難以置信……我希望你會懂，在那次測驗後的幾個星期裡，我心裡最想做的事情，就是再回去那邊，把電極再接回去。我也開始冒出許多疑問。平常，在我腦中總像是有許多憤憤不平的小地精，占滿了我的心思，讓我害怕嘗試，最後造成失敗。但除了這些聲音之外，我究竟是誰？這些聲音又是從哪裡來的？」


    ## 這能增強或削弱自由意志？


    這些聲音有些是重複了社會的偏見，有些是附和著我們個人的歷史，也有些傳達出我們的基因傳承。愛蒂認為，這一切創造出一個看不見的故事，在我們不知不覺中，塑造著我們有意識做出的決定。如果我們可以重寫這些內心的獨白、甚至叫它們完全噤聲，會發生什麼事？


    直到2016年，經顱刺激器仍在起步階段，也無法預測是否會在何時成為成熟的科技。到目前為止，透過這種方式增強能力，只能維持一段短暫的時間。愛蒂的經驗能到二十分鐘，可能是特例中的特例（甚至就只是安慰劑效應而已）。關於經顱刺激器，多數已發表成果的研究，都是人類樣本數極少、情境也有特殊限制，而且長期影響和危險也仍然完全未知。只不過，如果未來這項科技成熟，或是我們找到其他方法來操縱大腦的腦電模式，會對人類社會和人類有何影響？


    如果哪天人類真能控制自己的大腦電路，除了希望自己更有效擊倒恐怖份子之外，可能也會希望實現一些更俗世、自由主義的目標。換句話說，也就是能夠更有效學習和工作，讓自己能全心投入遊戲和嗜好，或是能在任何時刻專心於有趣的事物上（不管是數學或足球）。


    然而，如果這樣的操縱成了一件普遍的事，原本該由顧客自由操縱的意願，就會變成另一項可購買的商品。希望彈得一手好鋼琴，但要練琴時卻又想看電視嗎？沒問題：戴上頭盔、安裝適當的軟體，你就能夠完全只想練鋼琴了。


    你或許覺得不服氣，認為如果能讓腦中的聲音噤聲或是放大，其實是增強了自由意志，而非削弱。在過去，你可能就是因為被外界干擾，才沒能實現自己最珍視、內心最深處的真實欲望。有了這種讓人專心的頭盔或類似設備，你就更能把父母、牧師、神父、祭司、公關、廣告商、鄰居的聲音統統排除掉，專注於你自己想要什麼。然而我們很快就會看到，要說你有個單一的自我、能夠區分自己的真實欲望與外界聲音的不同，這也只是另一個自由人文主義的神話，已經遭到最新科學研究推翻了。


    ## 每個人心裡的中情局與國務院


    科學不僅破壞了自由人文主義對於自由意志的信念，也破壞了對個人主義的信念。自由主義認為每個人都有單一、不可分割的自我——individual（個人）這個英文字的意思，也就是in-dividual（不可分割的）。


    確實，人體是由大約三十七兆個細胞組成，而且每天身體和心智都會經歷無數次的變化及原子分子的置換，但只要集中精神、努力接觸自己，一定就能在內心深處，找到單一、清楚且真實的聲音，這也就是真實的自己，而這正是宇宙一切意義和權威的源頭。對於自由主義來說，想要有意義，就必須有一個真正的自我，而且還只能有唯一的自我。否則要是有許多個自我，我在投票站、超市和婚姻市場上，該聽哪個的意見？


    但經過數十年研究後，生命科學的結論是：這種自由主義的故事完全就是神話。所謂唯一真正的自我，就和永恆的靈魂、耶誕老人和復活節兔子一樣虛假。如果我真的深深去探測自己，就會發現自己一向以為理所當然的單一性，會分解成各種互相衝突的聲音，沒有哪個是「真正的自我」。人類絕非「不可分割」，反而就是由許多分割的部分組成。


    像是人腦就是由兩個腦半球組成，中間由一束神經纖維連結。每個腦半球控制著身體相對的另一側，例如右腦控制身體的左側、接收來自左側視野的資料、負責移動左臂和左腿；左腦則是剛好相反。因此，右腦中風的病人有時候會忽視身體的左側，例如只梳右邊的頭髮，或是只吃盤子右邊的食物。


    左右腦也有情感和認知方面的分工，但情況不算太明顯。事實上，多數認知活動都會同時用到兩個腦半球，只是使用程度有高低之別。例如在大多數情況下，左腦在語言和邏輯推理時，扮演較重要的角色，而右腦則是處理空間資訊時，較為強勢。


    在左右腦關係的研究上，許多突破性的成果是出自對癲癇病人的研究。嚴重的癲癇病人，是從大腦的某一區域掀起一場電風暴，迅速傳播到其他區域，造成急性癲癇發作。癲癇發作期間，病人無法控制身體；一旦發作頻繁，常常就會讓他們丟掉工作、無法過正常生活。在二十世紀中葉，如果其他療法都無法奏效，醫師的最後一招就是把連接兩個腦半球的神經束切斷，讓某個腦半球掀起的電風暴不會影響到另一半球。對腦科學家來說，這些病人簡直就像是金礦，提供了許多驚人的資料。


    關於這些「裂腦」（split-brain）病人，最著名的研究者是斯佩里（Roger Wolcott Sperry，因其突破性發現，獲頒1981年諾貝爾生理醫學獎），以及他的學生葛詹尼加（Michael
    S. Gazzaniga）。其中一項研究的對象是一位青少年。研究者問他，長大後想做什麼。男孩回答說：繪圖員。這個答案是由左腦提供，邏輯推理和語言多半由左腦控制。然而，男孩的右腦也有另一個活躍的語言中心，雖然無法控制口語，但能用拼字遊戲
    Scrabble 的字母牌拼出字來。研究人員很想知道男孩的右腦有何意見，於是把字母牌都散在桌上，再在一張紙上寫著：「你長大後想做什麼？」並把紙放在男孩左邊視野的邊緣處。來自左邊視野的資料會由右腦處理。右腦無法控制口語，所以男孩什麼也沒說，但他的左手開始迅速在桌上移動，到處蒐集字母牌，拼出：「汽車比賽」。厲害了吧！


    同樣令人感到離奇的另一項行為，則是出現在二戰退伍老兵 WJ 身上。WJ 的雙手分別由不同的腦半球控制。他的兩個半腦之間沒有連繫，於是有時候右手要開門、左手卻會把門甩上。


    還有另一項實驗，葛詹尼加的研究團隊向左腦（負責語言）秀出雞爪的照片，同時向右腦秀出雪景照。接著問病人 PS 看到了什麼，他回答「雞爪」。葛詹尼加接著再秀出許多圖卡給
    PS 看，請他指出最符合他所看到的內容。病人的右手（由左腦控制）指向一隻雞，但同時左手卻也伸了出來，指向一隻雪鏟。葛詹尼加接著就問了這個再明顯不過的問題：「為什麼你會同時指了雞和雪鏟？」PS
    回答：「呃，雞爪和雞有關係，而要清雞舍需要鏟子。」


    這裡是怎麼了？控制語言的左腦並未接受到雪景這項資訊，根本不知道為什麼左手會指向鏟子，結果左腦就自創出一些覺得合理的解釋。多次重複實驗後，葛詹尼加的結論認為：左腦不僅處理口語能力，也是腦內的翻譯人員，會用各種片段的線索，捏造出合理的故事，想為我們的生活找出意義。


    又例如另一項實驗，是讓掌管非語言能力的右腦看到一張色情圖片。受試者開始臉紅、咯咯笑著。「你看到了什麼？」研究人員賊賊的問道。受試者的左腦說著「沒什麼，只是有光閃了一下」，但她立刻又開始咯咯笑了起來，還用手遮住了自己的嘴。「那你為什麼會笑呢？」研究人員追問。也是一頭霧水的左腦翻譯官，拚盡全力想找出什麼合理的解釋，於是回答說：因為房間裡有部機器看起來很好笑。


    這就像是中央情報局在巴基斯坦執行無人機空襲任務，但美國國務院卻毫不知情。等到有記者向國務院官員詢問此事，官員只能趕快編造一些貌似合理的解釋。但實際上，這些公關人員根本不知道為何要空襲，就只是瞎掰。


    不僅是裂腦的病人，而是所有人類都會用到類似的機制。一次又一次，我們心中的中情局都是不經國務院批准或知情，就恣意行事，接著我們心中的國務院就只能編出一個讓自己看來最像正人君子的故事。常常，就連國務院自己最後都信了自己編出的故事。


    ## 我到底是誰？


    行為經濟學家也曾做出類似的結論，當時討論的是民眾如何下各種經濟決定。或者講得更精準些，是誰下了這些決定。是誰決定買豐田而不買賓士、度假去巴黎而不去泰國、投資南韓債券而不是上海股票？多數實驗都指出，並沒有什麼「單一的自我」做出這些決定，而是人心中有許多不同、常常還相互衝突的內在，經過不斷拉扯才決定的。


    2002年諾貝爾經濟學獎得主康納曼（Daniel Kahneman），就做過一項開創性的實驗，請一組志願受試者參加分成三階段的實驗。在「短」階段的實驗中，受試者將一隻手放入14°C的水裡一分鐘，這種水溫會讓人不悅、接近痛苦。六十秒後，就請他們把手給抽回來。而在「長」階段的實驗中，受試者的手會放在另一個容器中，水溫同樣為14°C；但在六十秒後，會偷偷將熱水導進容器，使水溫略升為15°C；三十秒後，再請他們把手抽回來。有些受試者會先做「短」版的實驗，也有些是從「長」版的實驗開始。但不論哪種，都會在兩個部分都結束的七分鐘後，進行第三階段、也是最重要階段的實驗。研究人員告知受試者，他們必須重複前兩階段的其中之一，但他們可以自由選擇。足足有80%的人選擇了「長」版實驗，在印象中以為這比較不那麼痛苦。


    這個冷水實驗如此簡單，透露的意義卻動搖了整個自由主義世界觀的核心。實驗告訴我們，人體內至少有兩種自我：經驗自我（experiencing self）及敘事自我（narrating
    self）。


    經驗自我是我們每時每刻的意識。所以對於經驗自我來說，顯然「長」版的實驗比較糟。因為你得先忍受14°C的水溫、達六十秒（「短」版實驗受的苦，在這裡一點也少不了），這已經很難忍受了，接下來你還得再忍受另外三十秒、15°C的水溫，雖然情況勉強好一點，但絕對也不愉快。對於經驗自我來說，在一個非常不愉快的經驗後，再加上另一個仍然不愉快的經驗，並不會讓整件事變得比較愉快一些。


    只不過，經驗自我並沒有深刻的記憶力。它不會說故事，而且我們要做重大決定的時候，也不會去問經驗自我有何想法。講到要喚起記憶、講故事、做重大決定，負責的是我們心中另一個非常不同的存在：敘事自我。


    敘事自我的概念，很類似葛詹尼加所說的左腦翻譯人員，永遠忙著將過去的絲絲縷縷，編織成一篇故事，並為未來制定計畫。敘事自我就像是記者、詩人或政治人物，不會敘述所有細節，通常只'
