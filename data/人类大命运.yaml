  md: '最後，跳著自己國家的波爾卡舞時，只要再跨出微小、但又重要的一步，就會讓你從只是相信自己的國家與其他國家「不同」，走向相信自己的國家「更優」。十九世紀的自由民族主義，是要求哈布斯堡和沙皇尊重德國人、義大利人、波蘭人和斯洛維尼亞人的獨特經驗。到了二十世紀的極端民族主義，就成了發動征服戰爭，把那些跳著不同舞蹈的人，關進了集中營。


    # 社會主義與自由主義之辯


    社會人文主義走的路，則非常不同。社會主義責怪自由主義太過注重自己的感覺、不管他人的經驗。沒錯，人類的經驗是一切意義的根源，但世界上有幾十億人，每個人的價值都不下於我。自由主義要人眼光向內，強調自己或本國的獨特性；而社會主義則要人別再迷戀於自己和自身的感覺，要注意他人的感受，注意自己的行動如何影響他人的經驗。


    社會主義主張：想達成全球和平，方法並不是去歌頌每個國家的獨特，而是要讓全世界的勞工都結合起來；想達成社會和諧，方式並不是讓每個人都很自戀的探索自己的內在，而是要請所有的人先放下自己的願望，把他人的需要和經驗視為優先。


    自由主義者可能提出反駁，認為透過探索自己的內心世界，才能培養對他人的同理心及瞭解。但這種論點並無法說服列寧或毛澤東。他們會解釋說，個人的自我探索是一種資產階級耽溺的罪惡，要接觸自我的內在，就很可能落入資本主義的陷阱。我當下的政治觀點、喜好與厭惡、興趣和抱負，都並非反映真實的自我，只是反映出我的成長和社會環境。而這都是由我的階級、鄰里、教育所塑'
