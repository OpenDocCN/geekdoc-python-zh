  md: '送出幾十億個電訊號時，主觀經驗就此浮現。雖然電訊號的傳送和接收，只是很簡單的生化現象，但這些訊號的互動卻會創造出複雜得多的東西：意識流。我們在許多其他領域，也能觀察到同樣的動態。譬如，單一輛車的移動只是個簡單的動作，但幾百萬輛同時移動及互動，就出現了交通堵塞。單一股票的買賣再簡單不過，但幾百萬股民同時買賣著幾百萬張股票，就可能造成讓專家也跌破眼鏡的經濟危機。


