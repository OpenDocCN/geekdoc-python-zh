  md: '# ## 你比機器人耐操嗎？


    經濟領域也有相同情形，能夠舉起錘子或按下按鈕的能力，已經不如以往有價值，這也就危害了自由主義和資本主義之間重要的合作關係。在二十世紀，自由主義認為倫理和經濟能夠兼得，保護人權和自由既是倫理道德的必要之舉、也是經濟成長的關鍵因素。自由主義認為，英美法等國正是因為開放經濟和社會而繁榮，如果土耳其、巴西或中國也想達到同樣的繁榮，就該起而效法。有許多（甚至是絕大多數的）專制君主或軍人政府，也是出於經濟而非道德因素，才終於願意走向開放。


    到了二十一世紀，自由主義的賣相將會大不如前。隨著一般民眾的經濟地位不再重要，光靠倫理道德的論述，是否還足以保護人權和自由？無法從一般民眾身上取得經濟紅利後，精英階級和政府還會認定每個人類都有價值嗎？


    過去有許多事情只有人類能做得到，但現在機器人和電腦正迎頭趕上，可能很快就會在多數的任務上超越人類。確實，電腦與人類的運作方式非常不同，而且看來電腦在短期內也不會變得更像人類——特別是電腦應該不會獲得意識、或是具備情緒和感覺。過去半個世紀，電腦智能（computer
    intelligence）已經有了巨大進展，但在電腦意識（computer consciousness）方面卻完全是原地踏步。據我們所知，2016年的電腦並未比1950年代的電腦原型更有意識。然而，一場重大革命已經風雨欲來。「智能」的觀念即將開始與「意識」的觀念脫鉤，也讓人類面臨失去經濟價值的危險。


    高度的智能與發達的意識，一向是兩個形影不離的觀念。必須是具有意識的個體，才能執行需要高度智能的任務，例如下棋、開'
