  md: '自己一向以為理所當然的單一性，會分解成各種互相衝突的聲音，沒有哪個是「真正的自我」。人類絕非「不可分割」，反而就是由許多分割的部分組成。


    像是人腦就是由兩個腦半球組成，中間由一束神經纖維連結。每個腦半球控制著身體相對的另一側，例如右腦控制身體的左側、接收來自左側視野的資料、負責移動左臂和左腿；左腦則是剛好相反。因此，右腦中風的病人有時候會忽視身體的左側，例如只梳右邊的頭髮，或是只吃盤子右邊的食物。10


