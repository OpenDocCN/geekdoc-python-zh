    # 為何我們要有意識？


    科學家並不知道，光是一群電訊號的集合，究竟是怎麼創造出主觀經驗。更關鍵的是，科學家不知道這種現象在演化上到底有什麼好處。這是我們在理解生命上，最大的空白了。人類有腳，是因為幾百萬個世代以來，可以讓我們的祖先去追兔子、並逃離獅子的爪下。人類有眼睛，是因為在數不清幾個千年以來，可以讓我們的祖先看到兔子去了哪、獅子又從哪來。然而，人類是為什麼要有像是飢餓和恐懼這樣的主觀經驗？'
