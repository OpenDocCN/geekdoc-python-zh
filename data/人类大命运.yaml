    因此,古代猶太人相信,不論是遭受大旱,或是遭到巴比倫王國的尼布甲尼撒二世(Nebuchadnezzar II)入侵猶太王國而流離失所,也都是因為他們犯了罪,以致受到神的懲罰。至於波斯的居魯士大帝(Cyrus)打敗巴比倫人,允許猶太流亡者回返家園重建耶路撒冷,當然是因為慈愛的上帝聽到了他們悔恨的禱告。《聖經》並不會承認,有可能是因為菲律賓火山爆發而引起乾旱,尼布甲尼撒二世的入侵是為了巴比倫的商業利益,居魯士也是基於自己的政治考量而支持猶太人。很顯然,《聖經》對於全球生態、巴比倫經濟或波斯政治體系,是沒什麼興趣的。


    所有人類的童年,都有這種以自我為中心的特徵。不論是受了哪種宗教或文化的薰陶,兒童都會認為自己是世界的中心,對其他人的處境和感受也就興趣缺缺。正因為如此,父母離婚對兒童會造成莫大的創傷。一個五歲的小孩並無法理解,某件重大事情可能不是因為他而造成的。不管爸媽跟他說了多少次,說爸媽都是獨立的人、有自己的問題和希望、他們離婚不是因為他,這個孩子就是不懂。他一心認為,所有事情都是因為他自己的關係。大多數人長大之後,就會擺脫這種幼兒期的妄想。但一神論者卻是繼續堅持,至死方休。就像孩子覺得爸媽是因為他才會吵架;一神論者也相信,波斯人與巴比倫人是因為自己才會開打。


