    # 生物也是演算法


    但我們怎麼能確定,動物(以豬為例)也有各種主觀的需求、感覺和情感?我們會不會只是一心把動物賦予人性,也就是把人類的特質賦予到非人類的對象上,像是小孩覺得玩偶能感受到人類的愛和憤怒?


    事實上,要說豬也有情感,並不是賦予牠們「人性」,而是賦予「哺乳動物性」。因為情感不是人類獨有的特質,而是所有哺乳動物(同時還包括所有鳥類、可能某些爬蟲類、甚至魚類)共有的特質。所有哺乳動物都演化出情感能力和需求,而光是從豬屬於哺乳動物這一點,就能肯定推斷牠們也有情感。16


    生命科學家近幾十年間已經證實,情感並不是只能用來寫詩、'
- md: '譜曲的神祕精神現象，反而是所有哺乳動物生存和繁衍的關鍵。這是什麼意思呢？請讓我們從究竟什麼是「演算法」（algorithm）開始解釋。這點非常重要，不僅因為這項關鍵概念將在以下的章節再三出現，也因為二十一世紀將是由演算法主導的世紀。現在，演算法已可說是這個世上最重要的概念。如果想瞭解我們的未來及我們的生活，就必須盡一切努力瞭解什麼是演算法、以及演算法和情感的關聯。


    演算法指的是一套很有系統的步驟，能用以進行計算、解決問題、作出決定。所以，演算法並不是單指某次計算，而是計算時採用的方法。舉例來說，如果想得到兩個數字的平均值，簡單的演算法會是：「第一步：將兩個數字相加。第二步：將總和除以2。」這時，如果輸入4和8，結果就是6；輸入117和231，結果就是174。


    食譜是個複雜一點的例子。像是蔬菜湯的演算法，大概會是這樣：


    - 一、在鍋中熱半杯油；

    - 二、將四顆洋蔥切成碎末；

    - 三、把洋蔥碎末炒至金黃色，再注入半鍋水；

    - 四、把三顆馬鈴薯切塊，加入鍋中；

    - 五、將一顆高麗菜切絲，加入鍋中。


    諸如之類。你可以試試看不斷重複這種演算法，每次用稍微不同的蔬菜，就會得到一鍋稍微不同的湯。然而，演算法本身並沒有改變。


    光有食譜，還煮不出湯來。還得有人讀這份食譜，並依規定的步驟執行才行。但還有一種方法，是製造出內含這種演算法、而且可以自動照做的機器。接下來，只要為機器供電、加入水和蔬菜，機器就會自動把湯給煮出來。


    雖然現在似乎沒有太多煮湯的機器，但大家應該都看過自助飲料機。這種飲料機通常會有硬幣投入孔、放杯子的位置，以及幾行按鈕。第一行按鈕大概是選擇要咖啡、茶或是可可，第二行是選擇不加糖、一匙糖、兩匙糖，第三行則是選擇要加牛奶、豆漿、或是都不加。今天有位男士走向機器，投入硬幣，按下了「茶」、「一匙糖」和「牛奶」，機器就會依據一系列明確的步驟開始執行。先是把一個茶包丟入杯中、倒入沸水、再加上一匙糖和牛奶，叮的一聲！一杯西式好茶就這樣在眼前出現。這就是一種演算法。


    過去幾十年間，生物學家已經有明確結論認為，像是那位男士按下按鈕、接著喝茶，也算是一套演算法。當然，這套演算法比自動飲料機要複雜得多，但仍然是一套演算法。人類這套演算法製造出來的不是茶，而是自己的副本——人類就像是製造自動販賣機的自動販賣機。


    控制自動飲料機的演算法，是透過機械齒輪和電路來運作。至於控制人類的演算法，則是透過感覺、情感和思想來運作。至於豬和雞、狒狒、水獺，用的也是同一種演算法。我們用以下的生存問題為例：有隻狒狒看到附近樹上掛著一串香蕉，但也看到旁邊埋伏著一隻獅子。狒狒該冒生命危險去拿香蕉嗎？


    這可以看做是計算機率的數學問題：一邊是不拿香蕉而餓死的機率，一邊是被獅子逮到的機率。要解開這個問題，狒狒有許多因素需要考慮。我離香蕉多遠？離獅子多遠？我能跑多快？獅子能跑多快？這隻獅子是醒著還是睡著？這隻獅子看起來很餓還是很飽？


    那裡有幾隻香蕉？香蕉是大是小？是青的還是熟的？除了這些外在資訊，狒狒還得考慮自己身體的內在資訊。如果牠已經快餓死了，就值得不顧一切去搶香蕉，別再管什麼機率了。相反的，如果牠才剛吃飽，多吃只是嘴饞，那又何必冒生命危險？


    想要權衡所有這些變項和機率，得到最好的結果，狒狒需要的演算法會比控制自動飲料機的演算法，遠遠複雜得多，然而計算正確的獎勵也大得多：這隻狒狒的生命。如果是一隻膽小的狒狒（也就是牠的演算法會高估風險），就會餓死，而形成這種膽小演算法的基因，也隨之滅絕。如果是一隻莽撞的狒狒（也就是牠的演算法會低估風險），則會落入獅子的爪下，而形成這種魯莽演算法的基因，也傳不到下一代。這些演算法正是靠著天擇，才達到穩定的品質控管。只有能夠正確計算出機率的動物，才能夠留下後代。


    但這還是非常抽象。到底狒狒要怎麼計算機率？牠當然不會忽然從耳後抽出一支鉛筆、從褲子後面的口袋掏出筆記本，然後開始認真用紙筆計算奔跑速度和所需體力。相反的，狒狒的整個身體就是牠的計算機。我們所謂的感覺和情感，其實都各是一套演算法。


    狒狒感覺餓、看到獅子的時候會感覺害怕而顫抖，看到香蕉也會感覺自己流口水。牠在一瞬間經歷到襲來的種種感覺、情感和欲望，都只不過是計算的過程。至於計算結果也是一個感覺：這隻狒狒突然覺得湧起一股力量，毛髮直豎，肌肉緊繃，胸部擴張，接著牠會大吸一口氣，「衝啊！我辦得到！衝向香蕉！」


    但也有可能，牠是被恐懼打敗，肩膀下垂，胃中一片翻攪，四肢無力腿軟，「媽媽！有獅子！救命啊！」


    也有時候，因為兩邊機率太相近，很難決定。而這也會表現成一種感覺。狒狒會感覺十分困惑，無法下決心。「衝呀……不衝……衝呀……不衝……可惡！我不知道該怎麼辦！」


    要把基因傳遞到下一代，光是解決生存問題還不夠，還得解決繁衍的問題，而這也是機率的計算。天擇演化出喜好和厭惡的情緒反應，做為評估繁衍機率和勝算的快速演算法。美麗的外表也就代表著「能夠成功繁衍後代的機率高」。像是如果有位女人看到某位男士，心想「哇塞！他真帥！」，與某隻雌孔雀看到雄孔雀而心想「我的老天！瞧瞧那尾羽！」，其實都是類似自動飲料機在做的事。


    ![](img/319dca06e22893e942053da0432e9f19_101_0.png)


    14. 孔雀和一個男人。你看著這些圖片的時候，身體裡的生化演算法就會開始處理各種關於比例、顏色和尺寸的資料，讓你覺得是受到吸引、覺得排斥、或是全然無感。


    光線一從男性身體反射到女性的視網膜上，這幾百萬年演化而成、無比強大的演算法就開始運作了。幾毫秒以內，就已經將男性外觀的各種小線索轉換為繁衍機率，並得出結論：「這很有可能是個非常健康、有生殖力的男性，有很優良的基因。如果我和他交配，我的後代也很可能擁有健康的身體、良好的基因。」當然，這項結論並不會用文字或數字表達出來，而是化成熊熊慾火在身體裡燃燒。對於雌孔雀或是大多數女性來說，這並不是以紙筆為之的計算，而是一種「感覺」。


    就連諾貝爾經濟學獎的得主，也只有在很少時間會用紙筆和計算機來做計算；人類各種決定有99%，包括各種關於配偶、事業和住處的最重要抉擇，都是由各種經過演化、千錘百鍊而成的演算法來處理的，我們把這些演算法稱為感覺、情感和欲望。


    所有哺乳動物和鳥類（可能還包括一些爬蟲類、甚至魚類），都受到同樣的演算法所掌控，所以不管是人類、狒狒或豬，感覺恐懼的時候，都會在類似的大腦區域，產生類似的神經處理過程。我們或許可以推斷，不管是人、狒狒或豬，對於受驚這種事的體驗，會十分類似。


    當然，並不是說一切必然完全相同。豬似乎並不會感覺到屬於智人特徵的那種極端同情或極端殘酷，也無法感受到人類仰望無窮壯麗星空所感受到的那種讚嘆。當然，很可能有相反的例子，是人無法感受到豬的情感，只不過這顯然我也說不上來。


    然而有一種核心情感，顯然是所有哺乳動物共有的：母嬰連結（mother-infant bond）。事實上，這也正是mammal（哺乳動物）這個名詞的語源：mammal一詞來自拉丁文mamma，語義就是乳房。哺乳動物的母親就是如此疼愛自己的後代，願意讓後代從自己身上吸吮營養。至於哺乳動物的嬰孩，則是有強烈的欲望，想要和母親待在一起，待在她們的身邊。如果是在野外，沒能跟在母親身邊的小豬、小牛和小狗，通常活不了多久。而且到不久之前，人類的嬰兒也同樣是如此。相對的，如果成年的母豬、母牛或母狗因為某種罕見的基因突變，而一點也不關心生下的孩子，當然她們自己可能活得舒適自在又長壽，但她的基因也就不會傳遞到下一代。同樣的邏輯也適用於長頸鹿、蝙蝠、鯨和豪豬。


    對於其他情感，我們或許還有爭議的空間，但因為哺乳動物的幼兒必須要有母親的照顧，才能生存，顯然母愛以及強烈的母嬰連結，會是所有哺乳動物共同的特色。


    ## 哺乳動物渴求母嬰連結


    科學家經過多年努力，才研究出這一點。然而在不久之前，甚至連人類父母與子女之間的情感連結，都曾遭到心理學家質疑其重要性。在二十世紀上半葉，雖然也有佛洛伊德理論的影響，但蔚為一時主流的行為主義學派認為，父母與子女之間的關係是由物質的回饋所塑造；兒童主要需要的就是食物、居處和醫療照護，之所以和父母建立連結，只是因為父母能夠滿足這些物質需求罷了。如果是那些會要求溫暖、擁抱和親吻的兒童，則被認為是「寵壞了」。當時的育兒專家就警告，如果父母太常擁抱、親吻孩子，會讓他們成年以後很自私、沒有安全感、情感不夠獨立。


    1920年代的育兒權威華生（John Watson），就對當代父母三令五申：「絕對不要擁抱和親吻你的孩子，也絕對不可讓他們坐在你的大腿上。如果你非得如此，也只能在他們說晚安的時候，親一下他們的額頭。早上碰面，則是與他們握手即可。」


    當時的流行雜誌《嬰兒照護》(Infant Care) 也提到，養育孩子的祕訣就是維持紀律，依據嚴格的每日時程表，提供孩子物質需求。一篇1929年的文章也指示家長，如果嬰兒在還不到正常進食時間之前，就哭了，「不可以抱他，不可以搖他、哄他別哭，而且也不可以餵奶，要等到確切的餵奶時間才行。嬰兒、甚至是小嬰兒，哭一下並不會有事。」


    一直要到1950、1960年代，才有愈來愈多專家達成共識，放棄這些嚴格的行為主義理論，承認情感需求的重要性。在一系列著名（而且殘酷到令人震驚）的實驗中，心理學家哈洛（Harry
    Harlow）在幼猴剛出生不久，就強行將幼猴與母猴分開，隔離在小籠子裡。籠子裡有兩隻假母猴，一隻是金屬假猴、裝有奶瓶，另一隻是絨布假猴、但沒有奶瓶，結果幼猴是使盡全力抱著絨布母猴。


    有一件事，這些幼猴都懂，但是華生與《嬰兒照護》的育兒專家卻不懂：哺乳動物要活下來，光靠食物還不夠，還需要情感上的連結。經過幾百萬年的演化，猴子天生就極度渴求情感連結，也讓牠們認為，比起堅硬、金屬製的物體，毛茸茸的物體比較可能建立起情感連結。（也是因為這樣，兒童比較會緊抱著洋娃娃、毯子、或是臭烘烘的破布，而不是什麼廚具、石頭或是木塊。）正是因為對情感連結的需求如此強烈，才讓哈洛實驗裡的幼猴不顧能提供奶水的金屬母猴，而投向唯一看來可能回應牠們需求的絨布母猴。但很遺憾，幼猴的真心渴望，始終沒能得到絨布母猴的回應，於是這些幼猴在心理和社交方面出現嚴重問題，長大後成為神經質和反社會的成猴。


    我們今天回顧二十世紀初的兒童養育指南，會大感難以置信。人類大命運專家怎麼可能沒發現兒童有情感需求？怎麼可能不知道，兒童心理和生理的健康，除了需要滿足食物、居處和醫療照護的需求之外，滿足情感的需求也一樣重要？


    然而如今，一講到其他哺乳動物，我們依然不斷否認這顯而易見的事實。就像華生和《嬰兒照護》的育兒專家一樣，整部人類歷史上的農夫，雖然提供了小豬、小牛物質上的需求，卻往往忽略牠們的情感需求。於是，不論是養豬場或是酪農業，都是以打斷哺乳動物最根本的情感連結做為基礎。農民讓母豬和母牛不斷懷胎，但小豬和小牛卻是出生沒多久，就被迫與母親分離，常常終其一生都未能舐到母親的眼淚、也沒能感受到她的舌頭和身體的溫暖。哈洛對幾百隻猴子所做的事，現在畜牧及酪農業每年還會在幾十億頭動物身上重現。


    ## 人與神的農業交易


    對自己的行為，農民是怎樣自圓其說？狩獵採集者很少意識到自己對生態系的損害，但農民則是再清楚不過。他們知道自己在剝削這些家畜，用牠們滿足人類的欲望和任性。他們用的理由是新的有神論（theism）宗教。


    自從農業革命以後，有神論便蓬勃興起、廣泛蔓延。在有神論宗教看來，整個宇宙並不是所有萬物共同組成的議會，而是由一小群神祇、又或是唯一的神（可能是英文大寫的 God，或是希臘文裡的
    Theos）所控制的神權政治。我們通常不會把這個概念和農業連在一起，但至少在一開始，有神論的宗教其實就是個農產事業。像是猶太教、印度教和基督教之類的宗教，其神學、神話和禮拜儀式一開始都是以人類、農作物與家畜的關係為重心。


    例如《聖經》時代的猶太教，就是以農民和牧人為主要對象，戒律多半是與農務和鄉村生活有關，主要的節慶也都是豐收節。在现代人的想像中，耶路撒冷的古猶太會堂可能就像大型的現代猶太會堂，祭司穿著雪白的長袍、迎接虔誠的朝聖者，合唱團悠揚吟唱著詩篇，空氣中飄著薰香。但實際上，古猶太會堂更像是屠宰場加上燒烤攤。朝聖者來的時候可不是兩手空空，而是帶著簡直川流不息的綿羊、山羊、雞等動物，在神的祭壇上獻祭，接著烹煮為食。另外，小牛和小孩發出一片吼叫吵雜聲，恐怕叫人難以聽到合唱團的詩篇歌聲。祭司穿著血跡斑斑的套服，切斷祭品的喉嚨，將噴湧而出的血液蒐集在罐中，再潑灑於祭壇上。薰香的味道混合著血液凝固後的臭味、烤肉的香氣，成群黑蒼蠅四處嗡嗡飛著——請參閱〈民數記〉第28章、〈申命記〉第12章、〈撒母耳記上〉第2章。


    現代猶太家庭過節的時候，是在前院草坪辦BBQ；而信仰傳統猶太教的家庭，則是上會堂研讀經文。這樣看來，辦一場BBQ可能還比較接近《聖經》時代的精神。


    有神論的宗教（例如《聖經》時代的猶太教）是用一種新的宇宙神話，來合理化農業經濟體制。過去的泛靈論宗教，是將宇宙描繪成如同一場盛大的京劇，有無窮無盡、五彩華麗的角色不斷上場。大象和櫟樹、鱷魚和河流、高山和青蛙、鬼魂和精靈、天使與魔鬼，都是這場宇宙大戲的角色。但有神論的宗教改寫了劇本，把宇宙變成易卜生荒涼的戲劇場景，只有兩個主要角色：人和神。天使和魔鬼也撐過了這次改寫，成為各個大神的使者和僕人。但其他原本泛靈論的卡司，包括所有的動物、植物、以及其他自然現象，現在都成了無聲的裝飾。確實，還是有這位或那位神祇，認定某些動物是神聖的，而且也有許多神帶著動物的特徵，譬如埃及的神祇阿努比斯（Anubis）就有著胡狼的頭，甚至耶穌基督也常被描繪成羔羊的形象。只不過，古埃及人很容易就能分辨阿努比斯與會潛到村子裡偷雞的胡狼有何差別，而信基督教的屠夫宰殺羔羊的時候，也從不會誤認為這是耶穌。


    我們常常認為，有神論的宗教只是將那些大神給神格化，卻忘記它們把人類也給神格化了。在這之前，智人一直只是數千演員當中的一員。但是在新的有神論戲劇之中，智人卻成了中心角色，整個宇宙繞著他而轉。


    而同時，諸神則要扮演兩個相關的角色。首先，要由祂們來解釋智人到底有什麼特別，憑什麼要讓人類占主導地位、剝削其他一切生物。例如基督教就說，人類之所以能支配其他生物，是因為造物主給了他們這項權力。基督教還說，上帝把永恆的靈魂只給了人類。既然這永恆的靈魂是整個基督教宇宙的重點，而動物又沒有靈魂，牠們當然就只能充當臨時演員的角色。於是，人類成為造物的頂峰，而其他所有生物只能待在角落。


    第二，神要負責在人類和生態系之間進行調解。在泛靈論的宇宙裡，所有角色都是直接彼此交談溝通。如果你需要美洲馴鹿、無花果樹、雲朵或岩石給你什麼，可以自己直接去談。但到了有神論的宇宙，所有非人類的實體都沉默了。於是，人類不再能和樹木與動物交談。但這樣一來，如果需要果樹產出更多果子、乳牛產出更多牛奶、雲朵帶來更多雨水、以及蝗蟲遠離你的作物，又該如何是好？這就是神上場的時候了。祂們承諾風調雨順、五穀豐登、蟲病不興，而人類也要提供一些回報。這就是農業交易的本質。諸神負責保護農業、讓農業豐收，換來人類將部分農產品獻予諸神。這筆交易對人和神都好,卻犧牲了整個其他生態系。


    在現今的尼泊爾巴利雅普(Bariyapur)村,信徒每五年會慶祝一次女神嘉蒂麥(Gadhimai)的節日。2009年創下紀錄,二十五萬頭動物遭宰殺,獻祭給女神。有一位當地司機,向來訪的英國記者解釋:「如果我們想要什麼,便帶著祭品來這裡獻給女神,所有的夢想就能在五年之內實現。」


    ## 犧牲了動物的利益


    在有神論的許多神話裡,會解釋這筆交易的微妙細節。美索不達米亞的史詩作品《吉爾伽美什》(Gilgamesh)就提到,諸神放出大洪水毀滅世界,幾乎所有人類和動物都淪為波臣。衝動的神祇此時才驚覺,這下沒人對他們奉獻了,飢餓和痛苦逼得祂們簡直要發狂。千幸萬幸,還有一個人類家庭存活了下來,這得感謝恩基(Enki)這位神祇的先見之明,安排信徒烏特納庇什提(Utnapishtim)躲在一艘木製的大方舟裡,方舟上也載著烏特納庇什提的親戚,以及各種動物。等到洪水消退,這位美索不達米亞神話裡的挪亞,便從方舟中現身,第一件事就是將一些動物獻祭給神祇。根據史詩說法,所有大神立刻衝到現場:「諸神嗅到香氣,諸神嗅到美味的香氣,諸神如蒼蠅群聚至祭品周圍。」


    至於《聖經》中的洪水故事(寫成時間比美索不達米亞神話晚了超過一千 年),同樣寫到挪亞一出了方舟,就「為耶和華築了一座壇,拿各類潔淨的牲畜、飛鳥獻在壇上為燔祭。耶和華聞那馨香之氣,就心裡說:我不再因人的緣故咒詛地,也不再按著我才行的,滅各種的活物了。」(出自〈創世記〉第8章第20至21節)。


    人類大命運這種洪水故事成為農業世界的奠基神話。當然，我們也可以給它添上一點現代環保的色彩，說這場洪水是在教訓人類，要我們知道人類的作為可能會毀掉整個生態系，而人類得負起保護剩餘萬物的神聖使命。只是就傳統的宗教詮釋而言，洪水正證明了人類的優越傑出、以及動物的毫無價值。在傳統的宗教詮釋中，挪亞雖然奉命拯救整個生態系，但目的是保護神和人類的共同利益，而不是為了動物的利益。非人類的生物本身並沒有價值，就只是為了人類的利益而存在。


    畢竟，當「耶和華見人在地上罪惡很大」，就決定「要將所造的人和走獸，並昆蟲，以及空中的飛鳥，都從地上除滅，因為我造他們後悔了。」（〈創世記〉第6章第7節）。可見《聖經》覺得，為了懲罰智人犯下的罪行，把所有動物都消滅掉，也是天經地義，但這就好像只因為人類不乖，所有長頸鹿、鵜鶘和瓢蟲也都不再有意義。《聖經》沒能想到另一種情節：耶和華後悔創造了智人，於是把這種罪惡的猿類，從地球表面抹去，接著就能享受鴕鳥、袋鼠和貓熊的各種可愛表演，直到永遠。


    ## 農業革命也成了宗教革命


    不過，有神論宗教仍然存有一些對動物友善的想法。諸神讓人有權掌控動物界，但享有權力的同時，也要負點責任。例如猶太人就奉命必須讓家畜在安息日休息，並盡可能不造成牠們不必要的痛苦。（只不過，每當發生利益衝突，人類的利益仍然永遠勝過動物的利益。）


    在猶太經典《塔木德》（Talmud）裡有一則故事，一頭小牛在往屠宰场的路上逃掉，求助於拉比猶太教的創始人之一：葉胡達拉比（Rabbi Yehuda HaNasi）。小牛把頭鑽到這位拉比的長袍下，開始哭泣。但拉比把小牛推開，說道：「去吧，你被創造就是為了這個目的。」由於這位拉比如此不慈悲，神便處罰他，讓他生了一場痛苦的疾病，長達十三年。直到有一天，僕人正在打掃拉比的家，發現幾隻剛生出來的老鼠，就把牠們掃地出門。但拉比立刻趕去拯救了這幾隻無助的小生物，要僕人放過牠們，因為「耶和華善待萬民；他的慈悲覆庇他一切所造的。」（《詩篇》145：9）。而因為這位拉比展現對老鼠的慈悲，神也就展現對他的憐憫，治癒他的疾病。


    其他宗教則對動物展現了更高的同理心，特別是源自印度的耆那教（Jainism）、佛教和印度教。這些宗教強調人類和生態系其他部分仍有連結，而且最重要的道德戒律就是不殺生。《聖經》只說「不可殺人」，但古印度的「ahimsa」（非暴力）原則卻適用於眾生。在這方面，耆那教的僧侶特別留意，總是用一塊白布蒙住嘴巴，以免呼吸時不小心殺害小昆蟲，走路的時候也總是帶著掃把，輕輕將路上的螞蟻或甲蟲掃到一旁。


    然而，所有農業宗教（也包括耆那教、佛教和印度教在內）都有一套說詞，認為人類就是比較高等，剝削利用動物實屬正當（就算不是殺生取肉，至少也是獲取乳汁、或是借助其勞力）。這些宗教都聲稱，確有一種自然的階層結構，賦予人類控制和使用其他動物的權力，唯一的條件就是人類得遵守一定的限制。舉例來說，印度教雖然認為牛是神聖的動物、並禁吃牛肉，但仍然能為酪農業找到冠冕堂皇的藉口，聲稱牛是一種慷慨的生物，很渴望和人類分享牠們產出的牛乳。


    因此，人類就這樣自己談成了一場「農業交易」。根據這項交易'
  mdcn: '譜曲的神祕精神現象，反而是所有哺乳動物生存和繁衍的關鍵。這是什麼意思呢？請讓我們從究竟什麼是「演算法」（algorithm）開始解釋。這點非常重要，不僅因為這項關鍵概念將在以下的章節再三出現，也因為二十一世紀將是由演算法主導的世紀。現在，演算法已可說是這個世上最重要的概念。如果想瞭解我們的未來及我們的生活，就必須盡一切努力瞭解什麼是演算法、以及演算法和情感的關聯。


    演算法指的是一套很有系統的步驟，能用以進行計算、解決問題、作出決定。所以，演算法並不是單指某次計算，而是計算時採用的方法。舉例來說，如果想得到兩個數字的平均值，簡單的演算法會是：「第一步：將兩個數字相加。第二步：將總和除以2。」這時，如果輸入4和8，結果就是6；輸入117和231，結果就是174。


    食譜是個複雜一點的例子。像是蔬菜湯的演算法，大概會是這樣：


    - 一、在鍋中熱半杯油；

    - 二、將四顆洋蔥切成碎末；

    - 三、把洋蔥碎末炒至金黃色，再注入半鍋水；

    - 四、把三顆馬鈴薯切塊，加入鍋中；

    - 五、將一顆高麗菜切絲，加入鍋中。


    諸如之類。你可以試試看不斷重複這種演算法，每次用稍微不同的蔬菜，就會得到一鍋稍微不同的湯。然而，演算法本身並沒有改變。


    光有食譜，還煮不出湯來。還得有人讀這份食譜，並依規定的步驟執行才行。但還有一種方法，是製造出內含這種演算法、而且可以自動照做的機器。接下來，只要為機器供電、加入水和蔬菜，機器就會自動把湯給煮出來。


    雖然現在似乎沒有太多煮湯的機器，但大家應該都看過自助飲料機。這種飲料機通常會有硬幣投入孔、放杯子的位置，以及幾行按鈕。第一行按鈕大概是選擇要咖啡、茶或是可可，第二行是選擇不加糖、一匙糖、兩匙糖，第三行則是選擇要加牛奶、豆漿、或是都不加。今天有位男士走向機器，投入硬幣，按下了「茶」、「一匙糖」和「牛奶」，機器就會依據一系列明確的步驟開始執行。先是把一個茶包丟入杯中、倒入沸水、再加上一匙糖和牛奶，叮的一聲！一杯西式好茶就這樣在眼前出現。這就是一種演算法。


    過去幾十年間，生物學家已經有明確結論認為，像是那位男士按下按鈕、接著喝茶，也算是一套演算法。當然，這套演算法比自動飲料機要複雜得多，但仍然是一套演算法。人類這套演算法製造出來的不是茶，而是自己的副本——人類就像是製造自動販賣機的自動販賣機。


    控制自動飲料機的演算法，是透過機械齒輪和電路來運作。至於控制人類的演算法，則是透過感覺、情感和思想來運作。至於豬和雞、狒狒、水獺，用的也是同一種演算法。我們用以下的生存問題為例：有隻狒狒看到附近樹上掛著一串香蕉，但也看到旁邊埋伏著一隻獅子。狒狒該冒生命危險去拿香蕉嗎？


    這可以看做是計算機率的數學問題：一邊是不拿香蕉而餓死的機率，一邊是被獅子逮到的機率。要解開這個問題，狒狒有許多因素需要考慮。我離香蕉多遠？離獅子多遠？我能跑多快？獅子能跑多快？這隻獅子是醒著還是睡著？這隻獅子看起來很餓還是很飽？


    那裡有幾隻香蕉？香蕉是大是小？是青的還是熟的？除了這些外在資訊，狒狒還得考慮自己身體的內在資訊。如果牠已經快餓死了，就值得不顧一切去搶香蕉，別再管什麼機率了。相反的，如果牠才剛吃飽，多吃只是嘴饞，那又何必冒生命危險？


    想要權衡所有這些變項和機率，得到最好的結果，狒狒需要的演算法會比控制自動飲料機的演算法，遠遠複雜得多，然而計算正確的獎勵也大得多：這隻狒狒的生命。如果是一隻膽小的狒狒（也就是牠的演算法會高估風險），就會餓死，而形成這種膽小演算法的基因，也隨之滅絕。如果是一隻莽撞的狒狒（也就是牠的演算法會低估風險），則會落入獅子的爪下，而形成這種魯莽演算法的基因，也傳不到下一代。這些演算法正是靠著天擇，才達到穩定的品質控管。只有能夠正確計算出機率的動物，才能夠留下後代。


    但這還是非常抽象。到底狒狒要怎麼計算機率？牠當然不會忽然從耳後抽出一支鉛筆、從褲子後面的口袋掏出筆記本，然後開始認真用紙筆計算奔跑速度和所需體力。相反的，狒狒的整個身體就是牠的計算機。我們所謂的感覺和情感，其實都各是一套演算法。


    狒狒感覺餓、看到獅子的時候會感覺害怕而顫抖，看到香蕉也會感覺自己流口水。牠在一瞬間經歷到襲來的種種感覺、情感和欲望，都只不過是計算的過程。至於計算結果也是一個感覺：這隻狒狒突然覺得湧起一股力量，毛髮直豎，肌肉緊繃，胸部擴張，接著牠會大吸一口氣，「衝啊！我辦得到！衝向香蕉！」


    但也有可能，牠是被恐懼打敗，肩膀下垂，胃中一片翻攪，四肢無力腿軟，「媽媽！有獅子！救命啊！」


    也有時候，因為兩邊機率太相近，很難決定。而這也會表現成一種感覺。狒狒會感覺十分困惑，無法下決心。「衝呀……不衝……衝呀……不衝……可惡！我不知道該怎麼辦！」


    要把基因傳遞到下一代，光是解決生存問題還不夠，還得解決繁衍的問題，而這也是機率的計算。天擇演化出喜好和厭惡的情緒反應，做為評估繁衍機率和勝算的快速演算法。美麗的外表也就代表著「能夠成功繁衍後代的機率高」。像是如果有位女人看到某位男士，心想「哇塞！他真帥！」，與某隻雌孔雀看到雄孔雀而心想「我的老天！瞧瞧那尾羽！」，其實都是類似自動飲料機在做的事。


    ![](img/319dca06e22893e942053da0432e9f19_101_0.png)


    14. 孔雀和一個男人。你看著這些圖片的時候，身體裡的生化演算法就會開始處理各種關於比例、顏色和尺寸的資料，讓你覺得是受到吸引、覺得排斥、或是全然無感。


    光線一從男性身體反射到女性的視網膜上，這幾百萬年演化而成、無比強大的演算法就開始運作了。幾毫秒以內，就已經將男性外觀的各種小線索轉換為繁衍機率，並得出結論：「這很有可能是個非常健康、有生殖力的男性，有很優良的基因。如果我和他交配，我的後代也很可能擁有健康的身體、良好的基因。」當然，這項結論並不會用文字或數字表達出來，而是化成熊熊慾火在身體裡燃燒。對於雌孔雀或是大多數女性來說，這並不是以紙筆為之的計算，而是一種「感覺」。


    就連諾貝爾經濟學獎的得主，也只有在很少時間會用紙筆和計算機來做計算；人類各種決定有99%，包括各種關於配偶、事業和住處的最重要抉擇，都是由各種經過演化、千錘百鍊而成的演算法來處理的，我們把這些演算法稱為感覺、情感和欲望。


    所有哺乳動物和鳥類（可能還包括一些爬蟲類、甚至魚類），都受到同樣的演算法所掌控，所以不管是人類、狒狒或豬，感覺恐懼的時候，都會在類似的大腦區域，產生類似的神經處理過程。我們或許可以推斷，不管是人、狒狒或豬，對於受驚這種事的體驗，會十分類似。


    當然，並不是說一切必然完全相同。豬似乎並不會感覺到屬於智人特徵的那種極端同情或極端殘酷，也無法感受到人類仰望無窮壯麗星空所感受到的那種讚嘆。當然，很可能有相反的例子，是人無法感受到豬的情感，只不過這顯然我也說不上來。


    然而有一種核心情感，顯然是所有哺乳動物共有的：母嬰連結（mother-infant bond）。事實上，這也正是mammal（哺乳動物）這個名詞的語源：mammal一詞來自拉丁文mamma，語義就是乳房。哺乳動物的母親就是如此疼愛自己的後代，願意讓後代從自己身上吸吮營養。至於哺乳動物的嬰孩，則是有強烈的欲望，想要和母親待在一起，待在她們的身邊。如果是在野外，沒能跟在母親身邊的小豬、小牛和小狗，通常活不了多久。而且到不久之前，人類的嬰兒也同樣是如此。相對的，如果成年的母豬、母牛或母狗因為某種罕見的基因突變，而一點也不關心生下的孩子，當然她們自己可能活得舒適自在又長壽，但她的基因也就不會傳遞到下一代。同樣的邏輯也適用於長頸鹿、蝙蝠、鯨和豪豬。


    對於其他情感，我們或許還有爭議的空間，但因為哺乳動物的幼兒必須要有母親的照顧，才能生存，顯然母愛以及強烈的母嬰連結，會是所有哺乳動物共同的特色。


    ## 哺乳動物渴求母嬰連結


    科學家經過多年努力，才研究出這一點。然而在不久之前，甚至連人類父母與子女之間的情感連結，都曾遭到心理學家質疑其重要性。在二十世紀上半葉，雖然也有佛洛伊德理論的影響，但蔚為一時主流的行為主義學派認為，父母與子女之間的關係是由物質的回饋所塑造；兒童主要需要的就是食物、居處和醫療照護，之所以和父母建立連結，只是因為父母能夠滿足這些物質需求罷了。如果是那些會要求溫暖、擁抱和親吻的兒童，則被認為是「寵壞了」。當時的育兒專家就警告，如果父母太常擁抱、親吻孩子，會讓他們成年以後很自私、沒有安全感、情感不夠獨立。


    1920年代的育兒權威華生（John Watson），就對當代父母三令五申：「絕對不要擁抱和親吻你的孩子，也絕對不可讓他們坐在你的大腿上。如果你非得如此，也只能在他們說晚安的時候，親一下他們的額頭。早上碰面，則是與他們握手即可。」


    當時的流行雜誌《嬰兒照護》(Infant Care) 也提到，養育孩子的祕訣就是維持紀律，依據嚴格的每日時程表，提供孩子物質需求。一篇1929年的文章也指示家長，如果嬰兒在還不到正常進食時間之前，就哭了，「不可以抱他，不可以搖他、哄他別哭，而且也不可以餵奶，要等到確切的餵奶時間才行。嬰兒、甚至是小嬰兒，哭一下並不會有事。」


    一直要到1950、1960年代，才有愈來愈多專家達成共識，放棄這些嚴格的行為主義理論，承認情感需求的重要性。在一系列著名（而且殘酷到令人震驚）的實驗中，心理學家哈洛（Harry
    Harlow）在幼猴剛出生不久，就強行將幼猴與母猴分開，隔離在小籠子裡。籠子裡有兩隻假母猴，一隻是金屬假猴、裝有奶瓶，另一隻是絨布假猴、但沒有奶瓶，結果幼猴是使盡全力抱著絨布母猴。


    有一件事，這些幼猴都懂，但是華生與《嬰兒照護》的育兒專家卻不懂：哺乳動物要活下來，光靠食物還不夠，還需要情感上的連結。經過幾百萬年的演化，猴子天生就極度渴求情感連結，也讓牠們認為，比起堅硬、金屬製的物體，毛茸茸的物體比較可能建立起情感連結。（也是因為這樣，兒童比較會緊抱著洋娃娃、毯子、或是臭烘烘的破布，而不是什麼廚具、石頭或是木塊。）正是因為對情感連結的需求如此強烈，才讓哈洛實驗裡的幼猴不顧能提供奶水的金屬母猴，而投向唯一看來可能回應牠們需求的絨布母猴。但很遺憾，幼猴的真心渴望，始終沒能得到絨布母猴的回應，於是這些幼猴在心理和社交方面出現嚴重問題，長大後成為神經質和反社會的成猴。


    我們今天回顧二十世紀初的兒童養育指南，會大感難以置信。人類大命運專家怎麼可能沒發現兒童有情感需求？怎麼可能不知道，兒童心理和生理的健康，除了需要滿足食物、居處和醫療照護的需求之外，滿足情感的需求也一樣重要？


    然而如今，一講到其他哺乳動物，我們依然不斷否認這顯而易見的事實。就像華生和《嬰兒照護》的育兒專家一樣，整部人類歷史上的農夫，雖然提供了小豬、小牛物質上的需求，卻往往忽略牠們的情感需求。於是，不論是養豬場或是酪農業，都是以打斷哺乳動物最根本的情感連結做為基礎。農民讓母豬和母牛不斷懷胎，但小豬和小牛卻是出生沒多久，就被迫與母親分離，常常終其一生都未能舐到母親的眼淚、也沒能感受到她的舌頭和身體的溫暖。哈洛對幾百隻猴子所做的事，現在畜牧及酪農業每年還會在幾十億頭動物身上重現。


    ## 人與神的農業交易


    對自己的行為，農民是怎樣自圓其說？狩獵採集者很少意識到自己對生態系的損害，但農民則是再清楚不過。他們知道自己在剝削這些家畜，用牠們滿足人類的欲望和任性。他們用的理由是新的有神論（theism）宗教。


    自從農業革命以後，有神論便蓬勃興起、廣泛蔓延。在有神論宗教看來，整個宇宙並不是所有萬物共同組成的議會，而是由一小群神祇、又或是唯一的神（可能是英文大寫的 God，或是希臘文裡的
    Theos）所控制的神權政治。我們通常不會把這個概念和農業連在一起，但至少在一開始，有神論的宗教其實就是個農產事業。像是猶太教、印度教和基督教之類的宗教，其神學、神話和禮拜儀式一開始都是以人類、農作物與家畜的關係為重心。


    例如《聖經》時代的猶太教，就是以農民和牧人為主要對象，戒律多半是與農務和鄉村生活有關，主要的節慶也都是豐收節。在现代人的想像中，耶路撒冷的古猶太會堂可能就像大型的現代猶太會堂，祭司穿著雪白的長袍、迎接虔誠的朝聖者，合唱團悠揚吟唱著詩篇，空氣中飄著薰香。但實際上，古猶太會堂更像是屠宰場加上燒烤攤。朝聖者來的時候可不是兩手空空，而是帶著簡直川流不息的綿羊、山羊、雞等動物，在神的祭壇上獻祭，接著烹煮為食。另外，小牛和小孩發出一片吼叫吵雜聲，恐怕叫人難以聽到合唱團的詩篇歌聲。祭司穿著血跡斑斑的套服，切斷祭品的喉嚨，將噴湧而出的血液蒐集在罐中，再潑灑於祭壇上。薰香的味道混合著血液凝固後的臭味、烤肉的香氣，成群黑蒼蠅四處嗡嗡飛著——請參閱〈民數記〉第28章、〈申命記〉第12章、〈撒母耳記上〉第2章。


    現代猶太家庭過節的時候，是在前院草坪辦BBQ；而信仰傳統猶太教的家庭，則是上會堂研讀經文。這樣看來，辦一場BBQ可能還比較接近《聖經》時代的精神。


    有神論的宗教（例如《聖經》時代的猶太教）是用一種新的宇宙神話，來合理化農業經濟體制。過去的泛靈論宗教，是將宇宙描繪成如同一場盛大的京劇，有無窮無盡、五彩華麗的角色不斷上場。大象和櫟樹、鱷魚和河流、高山和青蛙、鬼魂和精靈、天使與魔鬼，都是這場宇宙大戲的角色。但有神論的宗教改寫了劇本，把宇宙變成易卜生荒涼的戲劇場景，只有兩個主要角色：人和神。天使和魔鬼也撐過了這次改寫，成為各個大神的使者和僕人。但其他原本泛靈論的卡司，包括所有的動物、植物、以及其他自然現象，現在都成了無聲的裝飾。確實，還是有這位或那位神祇，認定某些動物是神聖的，而且也有許多神帶著動物的特徵，譬如埃及的神祇阿努比斯（Anubis）就有著胡狼的頭，甚至耶穌基督也常被描繪成羔羊的形象。只不過，古埃及人很容易就能分辨阿努比斯與會潛到村子裡偷雞的胡狼有何差別，而信基督教的屠夫宰殺羔羊的時候，也從不會誤認為這是耶穌。


    我們常常認為，有神論的宗教只是將那些大神給神格化，卻忘記它們把人類也給神格化了。在這之前，智人一直只是數千演員當中的一員。但是在新的有神論戲劇之中，智人卻成了中心角色，整個宇宙繞著他而轉。


    而同時，諸神則要扮演兩個相關的角色。首先，要由祂們來解釋智人到底有什麼特別，憑什麼要讓人類占主導地位、剝削其他一切生物。例如基督教就說，人類之所以能支配其他生物，是因為造物主給了他們這項權力。基督教還說，上帝把永恆的靈魂只給了人類。既然這永恆的靈魂是整個基督教宇宙的重點，而動物又沒有靈魂，牠們當然就只能充當臨時演員的角色。於是，人類成為造物的頂峰，而其他所有生物只能待在角落。


    第二，神要負責在人類和生態系之間進行調解。在泛靈論的宇宙裡，所有角色都是直接彼此交談溝通。如果你需要美洲馴鹿、無花果樹、雲朵或岩石給你什麼，可以自己直接去談。但到了有神論的宇宙，所有非人類的實體都沉默了。於是，人類不再能和樹木與動物交談。但這樣一來，如果需要果樹產出更多果子、乳牛產出更多牛奶、雲朵帶來更多雨水、以及蝗蟲遠離你的作物，又該如何是好？這就是神上場的時候了。祂們承諾風調雨順、五穀豐登、蟲病不興，而人類也要提供一些回報。這就是農業交易的本質。諸神負責保護農業、讓農業豐收，換來人類將部分農產品獻予諸神。這筆交易對人和神都好,卻犧牲了整個其他生態系。


    在現今的尼泊爾巴利雅普(Bariyapur)村,信徒每五年會慶祝一次女神嘉蒂麥(Gadhimai)的節日。2009年創下紀錄,二十五萬頭動物遭宰殺,獻祭給女神。有一位當地司機,向來訪的英國記者解釋:「如果我們想要什麼,便帶著祭品來這裡獻給女神,所有的夢想就能在五年之內實現。」


    ## 犧牲了動物的利益


    在有神論的許多神話裡,會解釋這筆交易的微妙細節。美索不達米亞的史詩作品《吉爾伽美什》(Gilgamesh)就提到,諸神放出大洪水毀滅世界,幾乎所有人類和動物都淪為波臣。衝動的神祇此時才驚覺,這下沒人對他們奉獻了,飢餓和痛苦逼得祂們簡直要發狂。千幸萬幸,還有一個人類家庭存活了下來,這得感謝恩基(Enki)這位神祇的先見之明,安排信徒烏特納庇什提(Utnapishtim)躲在一艘木製的大方舟裡,方舟上也載著烏特納庇什提的親戚,以及各種動物。等到洪水消退,這位美索不達米亞神話裡的挪亞,便從方舟中現身,第一件事就是將一些動物獻祭給神祇。根據史詩說法,所有大神立刻衝到現場:「諸神嗅到香氣,諸神嗅到美味的香氣,諸神如蒼蠅群聚至祭品周圍。」


    至於《聖經》中的洪水故事(寫成時間比美索不達米亞神話晚了超過一千 年),同樣寫到挪亞一出了方舟,就「為耶和華築了一座壇,拿各類潔淨的牲畜、飛鳥獻在壇上為燔祭。耶和華聞那馨香之氣,就心裡說:我不再因人的緣故咒詛地,也不再按著我才行的,滅各種的活物了。」(出自〈創世記〉第8章第20至21節)。


    人類大命運這種洪水故事成為農業世界的奠基神話。當然，我們也可以給它添上一點現代環保的色彩，說這場洪水是在教訓人類，要我們知道人類的作為可能會毀掉整個生態系，而人類得負起保護剩餘萬物的神聖使命。只是就傳統的宗教詮釋而言，洪水正證明了人類的優越傑出、以及動物的毫無價值。在傳統的宗教詮釋中，挪亞雖然奉命拯救整個生態系，但目的是保護神和人類的共同利益，而不是為了動物的利益。非人類的生物本身並沒有價值，就只是為了人類的利益而存在。


    畢竟，當「耶和華見人在地上罪惡很大」，就決定「要將所造的人和走獸，並昆蟲，以及空中的飛鳥，都從地上除滅，因為我造他們後悔了。」（〈創世記〉第6章第7節）。可見《聖經》覺得，為了懲罰智人犯下的罪行，把所有動物都消滅掉，也是天經地義，但這就好像只因為人類不乖，所有長頸鹿、鵜鶘和瓢蟲也都不再有意義。《聖經》沒能想到另一種情節：耶和華後悔創造了智人，於是把這種罪惡的猿類，從地球表面抹去，接著就能享受鴕鳥、袋鼠和貓熊的各種可愛表演，直到永遠。


    ## 農業革命也成了宗教革命


    不過，有神論宗教仍然存有一些對動物友善的想法。諸神讓人有權掌控動物界，但享有權力的同時，也要負點責任。例如猶太人就奉命必須讓家畜在安息日休息，並盡可能不造成牠們不必要的痛苦。（只不過，每當發生利益衝突，人類的利益仍然永遠勝過動物的利益。）


    在猶太經典《塔木德》（Talmud）裡有一則故事，一頭小牛在往屠宰场的路上逃掉，求助於拉比猶太教的創始人之一：葉胡達拉比（Rabbi Yehuda HaNasi）。小牛把頭鑽到這位拉比的長袍下，開始哭泣。但拉比把小牛推開，說道：「去吧，你被創造就是為了這個目的。」由於這位拉比如此不慈悲，神便處罰他，讓他生了一場痛苦的疾病，長達十三年。直到有一天，僕人正在打掃拉比的家，發現幾隻剛生出來的老鼠，就把牠們掃地出門。但拉比立刻趕去拯救了這幾隻無助的小生物，要僕人放過牠們，因為「耶和華善待萬民；他的慈悲覆庇他一切所造的。」（《詩篇》145：9）。而因為這位拉比展現對老鼠的慈悲，神也就展現對他的憐憫，治癒他的疾病。


    其他宗教則對動物展現了更高的同理心，特別是源自印度的耆那教（Jainism）、佛教和印度教。這些宗教強調人類和生態系其他部分仍有連結，而且最重要的道德戒律就是不殺生。《聖經》只說「不可殺人」，但古印度的「ahimsa」（非暴力）原則卻適用於眾生。在這方面，耆那教的僧侶特別留意，總是用一塊白布蒙住嘴巴，以免呼吸時不小心殺害小昆蟲，走路的時候也總是帶著掃把，輕輕將路上的螞蟻或甲蟲掃到一旁。


    然而，所有農業宗教（也包括耆那教、佛教和印度教在內）都有一套說詞，認為人類就是比較高等，剝削利用動物實屬正當（就算不是殺生取肉，至少也是獲取乳汁、或是借助其勞力）。這些宗教都聲稱，確有一種自然的階層結構，賦予人類控制和使用其他動物的權力，唯一的條件就是人類得遵守一定的限制。舉例來說，印度教雖然認為牛是神聖的動物、並禁吃牛肉，但仍然能為酪農業找到冠冕堂皇的藉口，聲稱牛是一種慷慨的生物，很渴望和人類分享牠們產出的牛乳。


    因此，人類就這樣自己談成了一場「農業交易」。根據這項交易'
