  md: '「人類有自由意志」看起來彷彿不是倫理判斷，而是對世界的事實描述。然而，這種說法雖然在洛克、盧梭或傑佛遜的時代可能很有道理，但根據生命科學的最新發現，卻已經不再成立。自由意志與當代科學之間的矛盾，已經成了實驗室裡的一頭大象（譯注：這是俚俗語，意思是：成了科學界的禁忌），許多人假裝專心看著顯微鏡和fMRI掃描儀，而不願面對這個問題。¹


    在十八世紀，智人就像個神祕的黑盒子，我們完全不知道內部如何運作。所以如果有人拿刀把另一個人刺死，學者想問原因的時候，一個聽來有說服力的答案會是：「因為他自己做了這個選擇，用自由意志選擇了謀殺；也如此，他必須對自己犯下的罪行，負起全責。」到了二十世紀，科學家打開了智人這個黑盒子，既沒找到靈魂、也沒找到自由意志，只找到基因、荷爾蒙、神經元——這些東西與現實世界的萬物都遵守著相同的物理定律和化學定律。時至今日，如果有個人拿刀把另一個人刺死，學者想問原因時，若有人再說是「因為他自己做了這個選擇」，這種話聽起來已經不再具有說服力了。反而是遺傳學家和大腦科學家，能夠提供更為詳細的答案：「他會這麼做，是因為特定基因構造讓大腦出現某種電化學反應，而基因構造反映的是從古至今的演化壓力及突變的結果。」


    會導致謀殺的大腦電化學反應，可能來自基因預設的指令、可能是隨機因素的結果，也可能是兩者的結合，但總之並非「自由意志」。例如，神經元之所以觸發，原因可能是基因預設的，只要遇到外部刺激便如此反應；也有可能是隨機事件，像是因為某個放射性原子忽然衰變。但不論是哪一種，都沒有「自由意志」插手的餘地。如果是遇到刺激、引發一連串生化事件的連鎖反應，每個事件都是由前一事件所決定，最後達成的決定當然不算是自由意志。如'
  merge: -1
  pgno: 322
- img_proc: true
  md: '果是原子忽然衰變造成的決定，那也只是單純的隨機事件，當然也不算自由意志。至於隨機事件加上基因預設的情況，也就是後果可能發生、也可能不發生，這同樣不可能等於自由意志。


    # 「自由意志」純屬想像？


    假設我們做出一具機器人，再把機器人的中央處理器連接到一團有放射性的鈾塊。只要遇到需要二選一的情境（例如要按右鍵或左鍵），機器人就會計算前一分鐘衰變的鈾原子數。數字是偶數，就按右鍵；數字是奇數，就按左鍵。這樣一來，我們永遠不可能預測這具機器人究竟會如何選擇——當然也不會有人認為這是機器人的「自由」選擇，也不可能讓它參與民主投票，或是要它對自己的選擇負起法律責任。


    所以就目前最先進的科學看來，人的選擇不是基因預設、就是隨機，兩者就像是把蛋糕一分為二，沒有哪一小塊是「自由意志」的份。到頭來，我們奉為神聖的自由，就像靈魂一樣，只是個空虛的詞彙，只存在人類發明的想像故事中。


    演化論像是為自由的棺材，釘上了最後一根釘子。「永恆的靈魂」在演化論面前就是說不通，而「自由意志」也是如此，否則如果人類真是自由的，哪有天擇的餘地？


    根據演化論，動物做的所有選擇（不論是選擇棲地、食物、或伴侶），都是基因密碼的反映。如果有適當的基因，讓這隻動物選了很營養的蘑菇、挑了健康而有生育力的伴侶，這些基因就能傳到下一代。如果基因不適當，讓這隻動物選了有毒的蘑菇、挑了虛弱的伴侶，這些基因就會滅絕。然而，如果這隻動物真能「自由」選'
  merge: -1
  pgno: 323
- img_proc: true
  md: '擇要吃什麼、與誰交配，天擇就無用武之地。


    碰上這樣的科學論理，人們常常裝作沒看到，說他們「覺得」自己很自由、都依自己的意願和決定行事。確實也沒錯，人類是能夠依自己的欲望而行事。如果所謂「自由意志」指的就是「依自己的欲望而行事」，那麼人類確實有自由意志；但這樣說來，黑猩猩、狗和鸚鵡也一樣有自由意志。鸚鵡學會說「我想吃餅乾」之後，還真能有餅乾吃呢。


    但這裡最重要的問題，並不在於鸚鵡或人類能不能因應內在欲望而做出行動，而是究竟能不能選擇要產生什麼欲望？為什麼鸚鵡想吃餅乾、不想吃黃瓜？為什麼我想把討厭的鄰居一槍斃了，而不是把另一邊的臉頰轉過去讓他打？為什麼我這麼想買紅色的車、而不買黑色的車？為什麼我想投的是保守黨、而不是工黨？這些都不是我的「選擇」。我之所以覺得腦中浮起某個願望，是因為大腦裡某種生化過程創造出的感覺。這些過程可能是基因預設、也可能是隨機發生，但絕不是自由意志。


    你可能會說，至少像是要把鄰居宰了、或是選舉投票的時候，並不是用當下瞬間的感受來做選擇，而是經過長期思索，細細思量了各種重要論點。然而，檯面上就是有那麼多種論點，有的會讓你投給保守黨，有的會讓你投給工黨，還有些會讓你投給英國獨立黨（UKIP），或是乾脆待在家，不出門投票。是什麼讓你選擇了某種論點、而不是另一種論點？在腦中的中央車站，我可能會因為基因預設而被迫上了某列的論點列車，又或是隨機被分配上哪一列車；但我無法「自由選擇」讓自己只去思考那些「使我投票給保守黨的論點」。


    以上所說的，絕不只是個人假設或哲學猜測。現在只要掃描'
