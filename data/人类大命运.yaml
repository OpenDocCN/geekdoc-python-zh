  md: '人類發現自己陷入了雙重的競賽。一方面，我們認為必須加快科學進步和經濟成長的腳步。十億中國人和十億印度人都希望過著像中產階級美國人一樣的生活——如果美國人都還是開著休旅車、逛著購物中心，中國人和印度人實在看不出，有什麼理由不去全力追求美式生活夢想。另一方面，我們又必須至少在生態世界末日來臨前懸崖勒馬。每一年，要處理這種雙重競賽的挑戰，都愈來愈艱巨，因為只要德里貧民窟的居民更接近美國夢一步，都是把地球更推近末日的邊緣。


    好消息是：人類已經享受了幾百年的經濟成長，卻一直沒成為生態崩潰的受害者。其他許多物種沒能撐過這個過程；人類也曾面臨一些經濟危機和生態災難，但總能化險為夷。


