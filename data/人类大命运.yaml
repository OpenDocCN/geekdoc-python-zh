    人類大命運


    所以，哪一種音樂最佳？是貝多芬的第五號交響曲、〈Johnny B. Goode〉、還是矮人族的成年曲？政府是該出資興建歌劇院、搖滾樂演出場所，還是非洲文化展覽廳？我們又該在中小學或大學教那些學音樂的學生什麼呢？別問我了，問問黨的文化書記吧。


    像是「文化比較」這種地雷區，自由主義是小心繞開，以免做出什麼政治不正確的失態舉動；社會主義是一切交給黨來處理，要找出通過地雷區的正確路途；但進化人文主義卻是開開心心的跳進來，把所有地雷都引爆，享受這場混亂。


    進化人文主義的第一步，可能就是指出：自由主義和社會主義都會畫條線，把自己和其他動物隔開，直接認定人就是比狼優越，所以人類的音樂比狼嚎更有價值。然而，人類也會受到演化力量的影響。正如人類比狼優越，某些人類文化也會比其他文化先進。人類的經驗也有明確的階級層次之分，而我們對此並無須抱歉。泰姬瑪哈陵就是比稻草屋更美；米開朗基羅的大衛像就是比我五歲侄女剛做出的黏土雕像更優；貝多芬譜出的音樂也超越了查克·貝瑞或剛果的矮人族。看吧，我們就是敢說！


    進化人文主義認為，如果有人說所有的人類經驗價值都一樣，他若不是笨蛋、就是懦夫——而這種粗鄙或膽怯的態度，就會造成以「文化相對論」（cultural relativism）或「社會平等」這些名義來妨礙社會進步，只會造成人類退化、滅絕。如果自由主義者或社會主義者回到石器時代，他們可能也不特別欣賞拉斯科（Lascaux）洞穴或阿爾塔米拉（Altamira）洞穴的壁畫，並且堅稱尼安德塔人的塗鴉也不輸這些壁畫。


