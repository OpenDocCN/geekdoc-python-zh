    目前仍有許多技術問題,讓華生及類似的AI不可能明天一早就忽然取代大多數醫師。然而,雖然這些技術問題確實棘手,解決後卻是一勞永逸。人類醫師的培訓是一系列複雜而昂貴的過程,需要費時多年。而且,花上大約十年的學習、實習,終於完成整個過程之後,我們擁有的仍然只是「一位」醫師。想要兩位,只能從頭再跑一次整個過程。相對的,只要解決了阻礙華生的技術問題,能得到的不是一位醫師,而是無數位醫師,能夠在全世界每個角落、全年無休提供服務。因此,就算得花上一千億美元才能解決那些技術問題,長遠看來,還是比培訓人類醫師便宜得多。


    當然,並不是所有人類醫師都會就此消失。至少在可預見的未來,那些需要創意、而不只是日常診斷的工作,還會繼續操縱在人類手中。正如二十一世紀的軍隊逐步擴增精英特種部隊,未來的醫院也可能會有更多等同於醫界遊騎兵或海豹突擊隊的醫師。但正如軍隊已不再需要幾百萬個大兵,未來的醫界也不需要幾百萬位家醫科醫師。


    醫師面臨的情境,對藥劑師來說更是如此。2011年,舊金山就開了一間藥房,由機器人擔任藥劑師。顧客上門之後,機器人只要幾秒鐘,就能得知這位顧客的所有處方箋、所有服用藥物的詳細資


    358'
  - '[PAGE 362]


    訊，以及知道顧客可能對哪些藥物過敏。機器人會先確認新藥不會造成過敏、也不會與其他藥物產生不良反應，接著為顧客配藥。開業第一年，機器人藥劑師配出超過兩百萬張處方，一個錯都沒犯。平均來說，人類藥劑師配藥錯誤的比例，大約是所有處方的1.7%。也就是說，單單在美國，每年就會有超過五千萬張處方配錯藥！10


    # 你需要溫情，華生也懂


    又會有人說，就算演算法在專業技術方面優於醫師和藥劑師，卻永遠無法取代人性的溫暖。假設CT掃描顯示你得了癌症，你希望告訴你這個消息的是一部冰冷的機器、還是一個會注意到你情緒的人類醫師？


    只不過，如果還有另一部機器，能注意到人類情緒，會依據你的感受和人格特質而調整用詞，這下該怎麼選擇醫師？請別忘了，生物也是各種演算法構成的，而華生偵測人類情緒的準確度，也可以和偵測腫瘤的準確度一樣高。


    人類醫師是透過各種外部訊號，像是臉部表情和語調，來判斷病人的情緒狀態。華生不但比人類醫師更能準確分析這樣的外部訊號，甚至還能同時分析一般人類看不到、聽不到的體內指標。華生能夠靠著監控你的血壓、腦部活動，以及比對生物統計資料庫，清楚知道你的感覺。在分析數百萬筆過去蒐集的社交資訊後，華生就能用最適當的音調、用你最想聽的詞彙，告知你需要知道的事情。


    雖然人類總對自己的情緒智能（emotional intelligence）洋洋得意，卻也常常受情緒影響，出現不尋常的反應。像是遇到一個憤怒的人，自己也開始大吼大叫；聽著一個滿懷憂慮的人講話，自己也'
  - '[PAGE 363]


    憂慮了起來。華生永遠不會受這種誘惑影響，它沒有自己的情緒，所以永遠只會依據你的情緒狀態，提供最適當的反應。


    這種概念目前已應用到某些客服現場，例如芝加哥 Mattersight 公司就設計出此類的軟體。Mattersight 的產品廣告詞就說：「是否曾和某個人說話，覺得真是觸動心弦？那種神奇的感受，正是人格搭配恰當的結果。Mattersight
    將讓全世界的客服中心，都能創造這種感受。」¹¹


    通常，顧客打電話要求客服或提出客訴的時候，總機大概要花個幾秒鐘聆聽，再把電話轉給客服專員。在 Mattersight 的系統裡，電話會由一套聰明的演算法來負責轉接。演算法會先請你說出致電原因，接著聆聽問題，分析你用的詞彙和語調，以此推斷你現在的情緒狀態、甚至是性格類型（內向、外向、死硬、或依賴）。根據這套資訊，演算法再為你轉接最適合現在心情及個性的客服專員。演算法能夠判斷，你需要的該是具備同情心、能夠耐心聽完客訴的人，還是毫不廢話、立刻提出技術解決方案的人。愈能搭配得當，顧客就愈滿意，客服也就能降低服務時間和成本。¹²


    # 人類比 AI 還剩什麼優勢？


    二十一世紀經濟學最重要的問題，可能就是所有多餘的人能有什麼功用？等到擁有高度智能而本身沒有意識的演算法，接手幾乎一切工作，而且都能比有意識的人類做得更好，人類還能做什麼？


    縱觀歷史，就業市場可分為三個主要部門：農業、工業和服務業。在大約西元 1800 年以前，絕大多數人務農，只有少數人在工業和服務業。到了工業革命，已開發國家的人民就離開了田野和'
  - '[PAGE 364]


    農畜。大多數人開始屬於工業部門，但也有愈來愈多人走向服務部門。到了最近幾十年，已開發國家又經歷了另一場革命：工業部門的職務消失，服務業大幅擴張。2010年，美國的農業人口只剩2%，工業人口有20%，占了78%的是教師、醫師、網頁設計師等服務業。但等到不具心靈的演算法也比人類更會教、更會醫、更會設計的時候，我們要做什麼？


    這並不是全新的問題。自從工業革命爆發以來，人類就擔心機械化可能導致大規模失業。然而，這種情況在過去從未發生，因為隨著舊職業過時，會有新職業出現，人類總有些事情做得比機器更好。只不過，這點並非自然律，也沒人敢保證未來定會繼續如此。人類有兩種基本能力：身體能力和認知能力。在機器與人類的競爭僅限於身體能力時，人類還有數不盡的認知任務可以做得更好。所以隨著機器取代單純操作性的工作，人類便轉向專注在需要認知技能的工作。然而，一旦演算法也比人類更能記憶、分析和辨識各種模式，會發生什麼事？


    如果認為人類永遠都能有自己獨特的能力，無意識的演算法永遠無法趕上，這只能說是一廂情願。對於這種空想，目前的科學回應，可以簡單概括為三項原則：


    +   一、生物是演算法。


    每種動物（包括智人）都是各種生化演算法的集合，是經過數百萬年演化、天擇而成。


    二、演算法的運作不受組成物質的影響。


    就像是算盤，不管算珠是木製、鐵製或是塑膠，兩個珠子加上兩個珠子還是等於四個珠子。'
- md: '## 三、因此沒有理由相信非生物演算法永遠無法複製或超越生物演算法能做的事


    只要運算確實，演算法是以碳來表現或是矽來表現，又有何差別？


    確實，目前還有許多事情是生物演算法比非生物演算法做得更好。也有專家反覆聲稱，有些事情「永遠」不是非生物演算法所能做到。然而事實證明，通常這裡的「永遠」都不超過一、二十年。就像在不久之前，大家還很喜歡用臉部識別做例子，說這項任務連嬰兒都能輕鬆辦到，可是最強的電腦卻無力完成。但是到了今天，臉部識別程式辨認人臉的速度和效率，都已經遠超過人類。警方和情報機構現在已經很習慣使用這種程式，掃描監視錄影機無數小時的影片，追蹤嫌犯和罪犯。


    1980年代討論到人類的獨到之處，很習慣用西洋棋做為人類較為優越的主要證據。他們相信電腦永遠不可能在西洋棋領域打敗人類。但是在1996年2月10日，IBM的深藍（Deep
    Blue）超級電腦就打敗了世界西洋棋王卡斯帕羅夫（Garry Kasparov），終結了這項認為人類較為優越的論點。


    深藍算是有點取巧，因為編寫程式的人不僅寫入了西洋棋的基本規則，還加入詳細的棋局策略。但到了新一代的AI，比起由人來教，反而更喜歡讓機器自己學。2015年2月，由Google
    DeepMind人工智慧公司所開發的一個程式，就自己學會了如何去玩四十九種經典的Atari遊戲。開發者之一的哈薩比斯（Demis Hassabis）博士解釋道：「我們唯一提供給系統的資訊，就是螢幕上的原始像素，而且指示系統要努力得到高分。剩下的一切都是它自己解出來的。」


    這套程式也成功找出所有遊戲的規則，從小精靈（Pac-Man）、小蜜蜂（Space Invaders）到各種賽車和網球遊戲。而且接著，這套程式得到的分數多半都能打平、甚至超越人類，有時候還會使出人類玩家從未想到的策略。$^{13}$


    不久之後，AI得到了更驚人的成就：谷歌的AlphaGo軟體，自學圍棋這種古老的中國策略遊戲，而圍棋的複雜度遠超過西洋棋，一般認為這並不在AI程式能夠處理的範圍。


    2016年3月，AlphaGo和韓國棋王李世乭，在首爾舉行一場比賽，AlphaGo靠著出奇的下法、創新的策略，以4比1擊敗李世乭，令各方專家跌破眼鏡。賽前，大多數專業棋手都肯定李世乭能贏得比賽；等到賽後分析AlphaGo的棋路，多數人的結論則是圍棋爭霸已經就此結束，人類不再有希望能打敗AlphaGo或其後代發明。


    ## 魔球效應擴散


    近來，電腦演算法也證明了自己在球類競賽中的價值。幾十年來，棒球隊挑選球員靠的是專業球探和經理的智慧、經驗和直覺。頂尖球員的身價直上數百萬美元，自然財力雄厚的球隊就能搶下一流選手，而經濟拮据的球隊只能用二線選手湊合湊合。


    2002年，銀彈有限的奧克蘭運動家隊總經理賓恩（Billy Beane）決定要打敗這個系統。他決定靠著由經濟學家和電腦怪才所開發的一套神祕電腦演算法，找出人類球探忽視或低估的球員，打造一支能贏球的隊伍。


    在守舊派看來，賓恩的演算法根本是玷汙棒球的神聖殿堂，令他們大感憤怒。他們堅決認為球員的選擇是一門藝術，只有長期親近棒球、相關經驗豐富的人類，才有可能掌握。至於電腦程式，因為它永遠無法懂得其中的奧祕和棒球的精神，永遠都不可能學會這一套。


    但沒多久，這些人就只能滿地撿眼鏡碎片。賓恩用演算法打造的這支低成本球隊（四千四百萬美元），不僅能與紐約洋基隊（一億二千五百萬美元）這種傳統棒球強隊平分秋色，甚至還成為美聯史上第一支二十連勝的隊伍。


    只不過，賓恩和運動家隊沒能得意太久。很快的，其他球隊也跟進使用同樣的演算法策略，而且由於洋基和紅襪不管在球員或電腦軟體上能砸的錢都遠遠勝出，現在像奧克蘭運動家隊這種低預算球隊，要打敗整個體制的機會反而又更小了。$^{14}$


    > 45. 深藍超級電腦擊敗西洋棋王卡斯帕羅夫，拉開了「非生物演算法擊敗生物演算法之戰」的序幕。


    ## 第 9 章 自由主義大崩解


    2004年，麻省理工學院的列維（Frank Levy）教授與哈佛大學的莫奈恩（Richard Murnane）教授，發表一份關於就業市場的全面研究報告，列出最有可能走向自動化的職業。當時講到在可預見的未來不可能自動化的職業，舉的例子是卡車司機。他們表示，實在很難想像電腦可以在繁忙的道路上安全駕駛。但才不過十幾年，谷歌和特斯拉不僅想像到這個願景，還正在促成這件事。$^{15}$


    事實上，隨著時間演進，不僅是因為演算法變得更聰明，也是因為人類逐漸走向專業化，於是用電腦來取代人類愈來愈容易。遠古的狩獵採集者光是想生存下去，就得掌握各式各樣的技能，也正因如此，想設計能狩獵採集的機器人，難度非常高。這種機器人須懂得如何用燧石做出矛頭，如何在森林中找到可食用的蘑菇，如何跟蹤長毛象，如何協調其他十幾個獵人分進合擊，之後還得知道怎麼用藥草來包紮獵人的傷口。


    但在過去幾千年間，人類已經走向專業化。比起狩獵採集者，計程車司機或心臟病專科醫師所做的事更為局限，也就更容易被AI取代。我已一再強調，AI目前絕對無法做到與人類相似。但對大多數的現代工作來說，有99%的人類特性及能力都是多餘的累贅。AI要把人類擠出就業市場，只要在特定行業需要的特定能力上超越人類，就已足夠。


    就連負責管理企業活動的經理，也可能被取代。例如Uber，就因為有強大的演算法，只要幾個人，就能管理數百萬位Uber司機。大多數的命令都是由演算法自動下達，無須人為監督。


    2014年5月，專精於再生醫學的香港創投公司Deep Knowledge Ventures（DKV）別創新局，任命一套名為VITAL的演算法，成為董事會一員。VITAL會分析候選公司的財務狀況、臨床試驗和智慧財產權等大量資料，據以提出投資建議。這套演算法就像另外五位董事一樣，能夠投票決定是否投資某一家特定公司。


    我們檢視VITAL到目前為止的紀錄，發現它似乎已經學到了一項在高層的壞習慣：裙帶關係。將較多權力交給演算法的公司，就較能得到VITAL的青睞。例如在VITAL支持下，DKV最近就投資了製藥公司Pathway
    Pharmaceuticals；這間製藥公司採用一套稱為OncoFinder的演算法，來選擇及評估個人化的癌症療法。$^{17}$


    ## 演算法無役不與


    隨著演算法將人類擠出就業市場，財富和權力可能會集中在擁有強大演算法的極少數精英手中，造成前所未有的社經及政治地位不平等。在今天，人數達到數百萬的計程車司機、公車司機和卡車司機擁有強大的經濟和政治影響力，每個人都在交通運輸市場占有一個小小的位置。如果集體利益受到威脅，他們可以團結起來，進行罷工、組織抵制，形成重要的投票族群。然而，一旦數百萬的人類司機都由單一演算法取代，這一切財富和權力都將被擁有演算法的公司壟斷，再由擁有公司的那極少數幾位億萬富翁放入口袋。


    又或者，演算法自己也可能成為所有權人。人類法律已經能夠認可公司或國家這種互為主體的實體，稱之為「法人」。雖然豐田或阿根廷既沒有身體、也沒有心靈，但都受到國際法的規範，都能擁有土地和金錢，也都可能在法庭上對他人提告或成為被告。很可能在不久之後，演算法也能得到這樣的地位。這樣一來，某一套演算法就能自己擁有一個運輸帝國、或是創投公司資本，不必聽從任何人類所有權人的命令。


    我們設想一下可能的場景：只要演算法做出正確的決定，就能蓄積財富，再用財富進行自己認定適當的投資，或許正是把你的房子給買下來，由它當你的房東。如果你侵犯了這套演算法的法定權利，像是不付房租，演算法就會聘請律師，把你告上法庭。如果這樣的演算法績效持續超過人類資本家，我們最後可能就得面對一批由演算法組成的上層階級，地球的絕大部分資產都在它們手上。


    在你覺得這實在是痴人說夢之前，請不要忘記，目前擁有大部分地球資產的，正是各種非人類的互為主體之實體，也就是國家和公司。事實上，早在五千年前，也是由恩基和伊南娜這種想像中的神祇，擁有蘇美的絕大部分資產。如果神祇也能擁有土地、雇用人力，為什麼演算法就不行？


    那麼，人要做什麼呢？常有人說，藝術是我們最終（而且是人類獨有）的聖殿。等到電腦取代了醫師、司機、教師、甚至地主和房東，會不會所有人都成為藝術家？然而，並沒有理由相信藝術創作會是一塊能絕緣於演算法的淨土。人類是哪來的信心，認為電腦譜曲永遠無法超越人類？


    在生命科學看來，藝術並不是出自什麼神靈或超自然靈魂，而是生物演算法發現數學模式之後的表現。若真是如此，非生物演算法就沒有理由不能掌握藝術表現。


    柯普（David Cope）是加州大學聖克魯茲分校的音樂教授，也是古典音樂界極具爭議的人物。柯普寫了一些電腦程式，能夠譜出協奏曲、合唱曲、交響樂和歌劇。他第一個寫出的程式，名為
    EMI（Experiments in Musical Intelligence，音樂智能的實驗），專門模仿巴哈的風格。雖然寫程式的時間花了七年，但一完工，EMI
    短短一天就譜出五千首巴哈風格的聖詠。柯普挑出幾首，安排在聖克魯茲的音樂節演出。樂音激動人心，觀眾反應熱烈，很興奮的講著這音樂是如何碰觸到他們內心最深處。觀眾並不知道作曲者是
    EMI、而非巴哈。等到真相揭露，有些人氣得一語不發，有些人甚至發出怒吼。


    EMI 繼續進步，學會了如何模仿貝多芬、蕭邦、拉赫曼尼諾夫和史特拉汶斯基。柯普還為 EMI 簽成一紙合約，首張專輯《電腦譜曲的古典音樂》（Classical
    Music Composed by Computer）出奇熱賣。


    人紅是非多，古典音樂愛好者的敵意湧現。奧勒岡大學的拉森（Steve Larson）就向柯普挑戰，來一場人機音樂單挑。拉森提案，由專業鋼琴家連續彈奏三首曲目，譜曲者分別是巴哈、EMI、以及拉森本人，接著讓觀眾票選認定是誰譜了哪首曲子。拉森堅信，一邊是人類的靈魂之作，一邊是機器人的死氣沉沉，觀眾肯定一聽就能判斷。柯普接下了戰帖。在指定的當天，有數百位講師、學生和音樂迷，齊聚於奧勒岡大學的音樂廳。表演結束，進行投票。


    結果呢？觀眾認為是巴哈的，其實是 EMI；認為是拉森的，其實是巴哈；而他們認為是電腦的，其實是拉森。


    還是有人繼續批評，說 EMI 的音樂雖然技術出眾，但仍缺了些什麼，像是一切太過準確、沒有深度、沒有靈魂。但只要人們不知出處而聽到 EMI 的作品，卻又常常大讚這些作品充滿靈魂和情感的共鳴。


    EMI 成功之後，柯普又繼續寫出更新、更複雜的程式——安妮（Annie）。EMI 譜曲是根據預定的規則，而安妮則是靠機器學習，會因應外界新的音樂輸入，不斷變化發展音樂風格。就連柯普也不知道安妮接下來會譜出什麼作品。而且事實上，安妮除了寫音樂，也對其他藝術形式很感興趣，像是俳句。2011
    年，柯普就出版了《灼炎之夜：人和機器所作的俳句兩千首》（Comes the Fiery Night: 2,000 Haiku by Man and Machine），其中有部分是安妮寫的，其他則來自真正的詩人。但書中並未透露哪些俳句的作者是誰。如果你認為自己一定可以看出人類創作與機器產出的差異，歡迎挑戰。$^{18}$


    ## 出現大批「無工作階級」


    十九世紀，工業革命創造出龐大的都市無產階級，這個新的工作階級帶來前所未見的需求、希望及恐懼，沒有其他信條能夠有效回應，社會主義因而擴張。到頭來，自由主義是靠著吸收了社會主義的精華，才打敗社會主義。到了二十一世紀，我們可能看到的是一批全新而龐大的無工作階級：這群人類沒有任何經濟、政治或藝術價值，對社會的繁榮、實力和榮耀，也沒有任何貢獻。這個「無用的階級」不只是失業，而是根本無業可就。


    2013年9月，牛津大學教授佛瑞（Carl Benedikt Frey）及奧斯本（Michael A. Osborne）發表〈就業的未來〉研究報告，調查各項工作在未來二十年，被電腦取代的可能性。根據他們所開發的演算法來估計，美國有47%的工作都屬於高風險。例如到了2033年，電話行銷和保險業務大概有99%的機率會失業。運動賽事的裁判有98%的可能性，收銀員97%、廚師96%、侍者94%、律師助手94%、導遊91%、麵包師傅89%、巴士司機89%、建築工人88%、獸醫助手86%、保全人員84%、船員83%、調酒師77%、檔案保管員76%、木匠72%、救生員67%，諸如此類。


    當然，也有一些工作還算安全。例如到了2033年，電腦能夠取代考古學家的可能性，只有0.7%，因為這種工作需要的模式辨識能力極為複雜，而且能夠產生的利潤又頗為微薄，因此很難想像會有企業或政府願意在接下來二十年間，投入足夠的資本，將考古學推向自動化。$^{19}$


    當然，到了2033年也可能出現許多新職業，像是虛擬世界的設計師。然而，此類專業可能會需要比現下的設計工作更高的創意和彈性，而且如果是收銀員或保險業務員到了四十歲中年失業，能否成功轉職為虛擬世界設計師，也實在難說得準。就算他們真的轉職成功，根據社會進步的速度，很有可能再過十年又得重新轉職。畢竟就算是設計虛擬世界這件事，演算法也可能會打敗人類。所以，這裡不只需要創造新工作，更得創造「人類做得比演算法好」的新工作。$^{20}$


    由於我們無法預知2030或2040年的就業市場會是什麼樣貌，現在也就不知道該如何教育下一代。等到孩子長到四十歲，他們在學校學的一切，可能都已經過時而遭到淘汰。傳統上，人生主要分成兩大時期：學習期、再加上之後的工作期。但這種傳統模式很快就會徹底過時，想要不被淘汰，只有一條路：一輩子不斷學習，不斷打造全新的自己。只不過，有許多人、甚至是大多數人，大概都做不到這件事。


    由於接下來的科技發展潛力極其龐大，很有可能就算這些無用的大眾什麼事都不做，整個社會也有能力餵飽這些人，讓這些人活下去。然而，能有什麼事讓他們打發時間、獲得滿足？人總得做些什麼，否則肯定會無聊到發瘋。到時候，要怎麼過一天的生活？


    答案之一可能是靠藥物和電玩。那些對社會來說多餘的人，可以多花點時間在3D虛擬世界裡；比起了無生趣的現實世界，虛擬世界能夠為他們提供更多刺激、更多情感投入。然而，自由主義推崇人類生命及人類經驗神聖不可侵犯，若真是朝「人生如夢」的境地發展，將會是一記致命打擊。這些人對社會毫無用處，整天活在現實與虛幻之間，這樣的人命何來神聖？


    譬如，伯斯楚隆（Nick Bostrom）之類的專家和思想家就提出警告，認為人類大概還來不及經歷這樣的退化，就滅亡了，因為一旦人工智慧超越人類智慧，可能就會直接消滅人類。AI這麼做的理由，一是可能擔心人類反撲、拔掉AI的插頭，二是要追求某種我們現在還難以想像的目標——而這目標，恐怕我們永遠也無法參透，因為等到整個AI系統比人類更聰明時，人類要再控制和探究AI系統有何動機，實在有如天方夜譚。


    就算目前看來立意全然良善的程式，也可能帶來令人恐懼的結果。有一套常見的劇本，就是某間公司設計出第一套真正的人工超級智慧，給了它一個毫無惡意的測試，像是計算π值。但就在任何人意識到任何事之前，AI已經接管整個地球、消滅人類，並對外太空發動攻擊，征服整個銀河系，把整個已知宇宙轉變成巨大的超級電腦，花上幾兆兆年的時間，只為了算出更精確的π值。畢竟，這正是它的創造者交付的神聖使命。$^{21}$


    本章開頭指出幾項自由主義面對的實際威脅，第一項就是人類不再具備在軍事和經濟上的用途。當然，這並非鐵口直斷，只是一種推測。不論是科技上的困難、或是政治上的反對，都可能減緩演算法入侵就業市場的腳步。而且，由於人類心靈還有一大塊未知的領域，我們還不確定人類是否有什麼隱藏的才能，或是能夠創造什麼新工作，來填補舊工作消失造成的缺口。然而光是這樣，可能還不足以拯救自由主義。因為自由主義不僅相信人的價值，信仰的還是「個人主義」。這就來到自由主義面臨的第二個威脅：雖然政經體系未來可能仍需要人類，但需要的並非個人。人類還是會繼續寫音樂、教物理、做投資，但政經體系對這些人的瞭解，會更甚於這些人所瞭解的自己，政經體系也會替這些人做出大多數重要決定。也就是說，政經體系將會剝奪個人的權威和自由。


    自由主義對個人主義的信念，前提就是之前討論過的三個重要假設：


    一、我是一個不可分割的個體；也就是說，我具備單一的本質，無法再分為各個部分或子系統。確實，這個內部核心可能有許多外層，但只要把這些外層努力剝掉，就能在內部找到一個清晰、單一的內在聲音，也就是真正的自我。


    二、真正的自我是完全自由的。


    三、根據前兩個假設，我很瞭解我自己，我能夠瞭解一些別人無法瞭解我的事。只有我能夠進入我內心自由的空間，只有我能聽到真實自我的低語。正因如此，自由主義才賦予個人極大的權威。我不該相信任何其他人為我做出的選擇，因為沒有任何人能真正瞭解我是誰、我有什麼感覺、我又想要什麼。正因如此，選民能做出最好的選擇，顧客永遠是對的，而且看的人覺得美、就是美。


    然而，生命科學卻對這三項假設都提出挑戰，認為：


    一、生物就是演算法，而且人類不是不可分割的個體，而是由可分割的部分組成。換句話說，人類是許多不同演算法的組合，並沒有單一的內在聲音或單一的自我。


    二、構成人類的演算法並不「自由」，而是由基因和環境壓力形塑，雖然可能依據基因預設或隨機做出決定，但總之絕不能說是「完全自由的」。


    三、因此，外部演算法理論上有可能比我更瞭解我自己。如果能用某個演算法，監視組成身體和大腦的每個子系統，就能清楚掌握我是誰、我有什麼感覺、我又想要什麼。只要開發出這樣的演算法，重點就不再是什麼選民、顧客和看的人；而是演算法能夠做出最好的選擇，演算法永遠是對的，演算法覺得美、就是美。


    在十九世紀和二十世紀，由於沒有任何外部演算法能夠對個人有效監測，因此個人主義仍然是一種很實用的選擇。雖然國家和市場可能都很想對每個人進行有效的監測，但當時就是缺少必要的科技。不論是KGB還是FBI，對我的生化、基因組和大腦都無法完全掌握，而且就算特務偷聽我每次打的電話、監視我在街頭上和別人的每次互動，也沒有足夠的運算能力來分析這些資料。因此就二十世紀的科技而言，自由主義說得並沒錯，沒有人能比我更認識我。於是，人類有充分的理由認為自己是個自主的系統，聽從的是自己內在的聲音，而不是聽從什麼老大哥的命令。


    然而到了二十一世紀，科技已經讓外部演算法有能力「駭進人性」，比我更瞭解我自己。一旦如此，個人主義就即將崩潰，權威也將從個人轉向由演算法構成的網路。人類不會再認為自己是自主的個體、依據自己的期望而度日，而是習慣把整體人類看做一種生化機制的集合體，由電子演算法網路不斷監控和指示。要發生這種情況，演算法甚至還不需要完全瞭解我、而且絕不出錯，只要比我自己更瞭解我、犯的錯更少，就已足夠。到了這個程度，合理的做法就是把愈來愈多的選擇和人生大事，都交給演算法來為我決定。


    在醫學方面，我們早已跨過這條線。在醫院裡，每位病人不再是「個人」。很有可能在我們的有生之年，就會看到許多關於身體和健康的重大決定，將由電腦幫忙決定（譬如IBM的華生）。這倒也不一定是個壞消息。


    目前，已有糖尿病人裝了感測器，每天幾次自動檢測血糖值，並在超標時發出警告。2014年，耶魯大學研究人員也宣布一種由iPhone控制的人工胰臟試驗成功了。有五十二名糖尿病人參與該實驗，每位病人都在腹部植入一個小小的感測器和小小的幫浦。幫浦連結裝有胰島素和升糖素的小管，用這兩種激素來調節血糖高低。感測器會不斷測量血糖值，將數據傳至iPhone，而iPhone安裝了能夠分析相關資訊的應用程式（app），能在必要時對幫浦發出命令，釋出胰島素或升糖素，完全不需人為操作。$^{22}$


    就算是許多沒有嚴重疾病的人，也已經開始使用穿戴式感測器和電腦，來監控自己的健康和活動狀況。相關設備從智慧型手機、智慧手錶、智慧手環、智慧臂環、甚至是智慧型內衣，不一而足，記錄著像是血壓和心跳等等生物統計資料。這些資料接著傳送到精密的電腦程式中，讓演算法來建議穿戴者該如何調整飲食和日常生活習慣，以改善健康、活得更久、也更有生產力。$^{23}$


    谷歌與製藥大廠諾華（Novartis）正在合作開發一種隱形眼鏡，能夠分析眼淚的成分，每隔幾秒檢查血糖值。$^{24}$ 精靈科學（Pixie Scientific）公司則推出智慧型尿布，能夠分析嬰兒的糞便，瞭解孩'
  mdcn: '## 三、因此沒有理由相信非生物演算法永遠無法複製或超越生物演算法能做的事


    只要運算確實，演算法是以碳來表現或是矽來表現，又有何差別？


    確實，目前還有許多事情是生物演算法比非生物演算法做得更好。也有專家反覆聲稱，有些事情「永遠」不是非生物演算法所能做到。然而事實證明，通常這裡的「永遠」都不超過一、二十年。就像在不久之前，大家還很喜歡用臉部識別做例子，說這項任務連嬰兒都能輕鬆辦到，可是最強的電腦卻無力完成。但是到了今天，臉部識別程式辨認人臉的速度和效率，都已經遠超過人類。警方和情報機構現在已經很習慣使用這種程式，掃描監視錄影機無數小時的影片，追蹤嫌犯和罪犯。


    1980年代討論到人類的獨到之處，很習慣用西洋棋做為人類較為優越的主要證據。他們相信電腦永遠不可能在西洋棋領域打敗人類。但是在1996年2月10日，IBM的深藍（Deep
    Blue）超級電腦就打敗了世界西洋棋王卡斯帕羅夫（Garry Kasparov），終結了這項認為人類較為優越的論點。


    深藍算是有點取巧，因為編寫程式的人不僅寫入了西洋棋的基本規則，還加入詳細的棋局策略。但到了新一代的AI，比起由人來教，反而更喜歡讓機器自己學。2015年2月，由Google
    DeepMind人工智慧公司所開發的一個程式，就自己學會了如何去玩四十九種經典的Atari遊戲。開發者之一的哈薩比斯（Demis Hassabis）博士解釋道：「我們唯一提供給系統的資訊，就是螢幕上的原始像素，而且指示系統要努力得到高分。剩下的一切都是它自己解出來的。」


    這套程式也成功找出所有遊戲的規則，從小精靈（Pac-Man）、小蜜蜂（Space Invaders）到各種賽車和網球遊戲。而且接著，這套程式得到的分數多半都能打平、甚至超越人類，有時候還會使出人類玩家從未想到的策略。$^{13}$


    不久之後，AI得到了更驚人的成就：谷歌的AlphaGo軟體，自學圍棋這種古老的中國策略遊戲，而圍棋的複雜度遠超過西洋棋，一般認為這並不在AI程式能夠處理的範圍。


    2016年3月，AlphaGo和韓國棋王李世乭，在首爾舉行一場比賽，AlphaGo靠著出奇的下法、創新的策略，以4比1擊敗李世乭，令各方專家跌破眼鏡。賽前，大多數專業棋手都肯定李世乭能贏得比賽；等到賽後分析AlphaGo的棋路，多數人的結論則是圍棋爭霸已經就此結束，人類不再有希望能打敗AlphaGo或其後代發明。


    ## 魔球效應擴散


    近來，電腦演算法也證明了自己在球類競賽中的價值。幾十年來，棒球隊挑選球員靠的是專業球探和經理的智慧、經驗和直覺。頂尖球員的身價直上數百萬美元，自然財力雄厚的球隊就能搶下一流選手，而經濟拮据的球隊只能用二線選手湊合湊合。


    2002年，銀彈有限的奧克蘭運動家隊總經理賓恩（Billy Beane）決定要打敗這個系統。他決定靠著由經濟學家和電腦怪才所開發的一套神祕電腦演算法，找出人類球探忽視或低估的球員，打造一支能贏球的隊伍。


    在守舊派看來，賓恩的演算法根本是玷汙棒球的神聖殿堂，令他們大感憤怒。他們堅決認為球員的選擇是一門藝術，只有長期親近棒球、相關經驗豐富的人類，才有可能掌握。至於電腦程式，因為它永遠無法懂得其中的奧祕和棒球的精神，永遠都不可能學會這一套。


    但沒多久，這些人就只能滿地撿眼鏡碎片。賓恩用演算法打造的這支低成本球隊（四千四百萬美元），不僅能與紐約洋基隊（一億二千五百萬美元）這種傳統棒球強隊平分秋色，甚至還成為美聯史上第一支二十連勝的隊伍。


    只不過，賓恩和運動家隊沒能得意太久。很快的，其他球隊也跟進使用同樣的演算法策略，而且由於洋基和紅襪不管在球員或電腦軟體上能砸的錢都遠遠勝出，現在像奧克蘭運動家隊這種低預算球隊，要打敗整個體制的機會反而又更小了。$^{14}$


    > 45. 深藍超級電腦擊敗西洋棋王卡斯帕羅夫，拉開了「非生物演算法擊敗生物演算法之戰」的序幕。


    ## 第 9 章 自由主義大崩解


    2004年，麻省理工學院的列維（Frank Levy）教授與哈佛大學的莫奈恩（Richard Murnane）教授，發表一份關於就業市場的全面研究報告，列出最有可能走向自動化的職業。當時講到在可預見的未來不可能自動化的職業，舉的例子是卡車司機。他們表示，實在很難想像電腦可以在繁忙的道路上安全駕駛。但才不過十幾年，谷歌和特斯拉不僅想像到這個願景，還正在促成這件事。$^{15}$


    事實上，隨著時間演進，不僅是因為演算法變得更聰明，也是因為人類逐漸走向專業化，於是用電腦來取代人類愈來愈容易。遠古的狩獵採集者光是想生存下去，就得掌握各式各樣的技能，也正因如此，想設計能狩獵採集的機器人，難度非常高。這種機器人須懂得如何用燧石做出矛頭，如何在森林中找到可食用的蘑菇，如何跟蹤長毛象，如何協調其他十幾個獵人分進合擊，之後還得知道怎麼用藥草來包紮獵人的傷口。


    但在過去幾千年間，人類已經走向專業化。比起狩獵採集者，計程車司機或心臟病專科醫師所做的事更為局限，也就更容易被AI取代。我已一再強調，AI目前絕對無法做到與人類相似。但對大多數的現代工作來說，有99%的人類特性及能力都是多餘的累贅。AI要把人類擠出就業市場，只要在特定行業需要的特定能力上超越人類，就已足夠。


    就連負責管理企業活動的經理，也可能被取代。例如Uber，就因為有強大的演算法，只要幾個人，就能管理數百萬位Uber司機。大多數的命令都是由演算法自動下達，無須人為監督。


    2014年5月，專精於再生醫學的香港創投公司Deep Knowledge Ventures（DKV）別創新局，任命一套名為VITAL的演算法，成為董事會一員。VITAL會分析候選公司的財務狀況、臨床試驗和智慧財產權等大量資料，據以提出投資建議。這套演算法就像另外五位董事一樣，能夠投票決定是否投資某一家特定公司。


    我們檢視VITAL到目前為止的紀錄，發現它似乎已經學到了一項在高層的壞習慣：裙帶關係。將較多權力交給演算法的公司，就較能得到VITAL的青睞。例如在VITAL支持下，DKV最近就投資了製藥公司Pathway
    Pharmaceuticals；這間製藥公司採用一套稱為OncoFinder的演算法，來選擇及評估個人化的癌症療法。$^{17}$


    ## 演算法無役不與


    隨著演算法將人類擠出就業市場，財富和權力可能會集中在擁有強大演算法的極少數精英手中，造成前所未有的社經及政治地位不平等。在今天，人數達到數百萬的計程車司機、公車司機和卡車司機擁有強大的經濟和政治影響力，每個人都在交通運輸市場占有一個小小的位置。如果集體利益受到威脅，他們可以團結起來，進行罷工、組織抵制，形成重要的投票族群。然而，一旦數百萬的人類司機都由單一演算法取代，這一切財富和權力都將被擁有演算法的公司壟斷，再由擁有公司的那極少數幾位億萬富翁放入口袋。


    又或者，演算法自己也可能成為所有權人。人類法律已經能夠認可公司或國家這種互為主體的實體，稱之為「法人」。雖然豐田或阿根廷既沒有身體、也沒有心靈，但都受到國際法的規範，都能擁有土地和金錢，也都可能在法庭上對他人提告或成為被告。很可能在不久之後，演算法也能得到這樣的地位。這樣一來，某一套演算法就能自己擁有一個運輸帝國、或是創投公司資本，不必聽從任何人類所有權人的命令。


    我們設想一下可能的場景：只要演算法做出正確的決定，就能蓄積財富，再用財富進行自己認定適當的投資，或許正是把你的房子給買下來，由它當你的房東。如果你侵犯了這套演算法的法定權利，像是不付房租，演算法就會聘請律師，把你告上法庭。如果這樣的演算法績效持續超過人類資本家，我們最後可能就得面對一批由演算法組成的上層階級，地球的絕大部分資產都在它們手上。


    在你覺得這實在是痴人說夢之前，請不要忘記，目前擁有大部分地球資產的，正是各種非人類的互為主體之實體，也就是國家和公司。事實上，早在五千年前，也是由恩基和伊南娜這種想像中的神祇，擁有蘇美的絕大部分資產。如果神祇也能擁有土地、雇用人力，為什麼演算法就不行？


    那麼，人要做什麼呢？常有人說，藝術是我們最終（而且是人類獨有）的聖殿。等到電腦取代了醫師、司機、教師、甚至地主和房東，會不會所有人都成為藝術家？然而，並沒有理由相信藝術創作會是一塊能絕緣於演算法的淨土。人類是哪來的信心，認為電腦譜曲永遠無法超越人類？


    在生命科學看來，藝術並不是出自什麼神靈或超自然靈魂，而是生物演算法發現數學模式之後的表現。若真是如此，非生物演算法就沒有理由不能掌握藝術表現。


    柯普（David Cope）是加州大學聖克魯茲分校的音樂教授，也是古典音樂界極具爭議的人物。柯普寫了一些電腦程式，能夠譜出協奏曲、合唱曲、交響樂和歌劇。他第一個寫出的程式，名為
    EMI（Experiments in Musical Intelligence，音樂智能的實驗），專門模仿巴哈的風格。雖然寫程式的時間花了七年，但一完工，EMI
    短短一天就譜出五千首巴哈風格的聖詠。柯普挑出幾首，安排在聖克魯茲的音樂節演出。樂音激動人心，觀眾反應熱烈，很興奮的講著這音樂是如何碰觸到他們內心最深處。觀眾並不知道作曲者是
    EMI、而非巴哈。等到真相揭露，有些人氣得一語不發，有些人甚至發出怒吼。


    EMI 繼續進步，學會了如何模仿貝多芬、蕭邦、拉赫曼尼諾夫和史特拉汶斯基。柯普還為 EMI 簽成一紙合約，首張專輯《電腦譜曲的古典音樂》（Classical
    Music Composed by Computer）出奇熱賣。


    人紅是非多，古典音樂愛好者的敵意湧現。奧勒岡大學的拉森（Steve Larson）就向柯普挑戰，來一場人機音樂單挑。拉森提案，由專業鋼琴家連續彈奏三首曲目，譜曲者分別是巴哈、EMI、以及拉森本人，接著讓觀眾票選認定是誰譜了哪首曲子。拉森堅信，一邊是人類的靈魂之作，一邊是機器人的死氣沉沉，觀眾肯定一聽就能判斷。柯普接下了戰帖。在指定的當天，有數百位講師、學生和音樂迷，齊聚於奧勒岡大學的音樂廳。表演結束，進行投票。


    結果呢？觀眾認為是巴哈的，其實是 EMI；認為是拉森的，其實是巴哈；而他們認為是電腦的，其實是拉森。


    還是有人繼續批評，說 EMI 的音樂雖然技術出眾，但仍缺了些什麼，像是一切太過準確、沒有深度、沒有靈魂。但只要人們不知出處而聽到 EMI 的作品，卻又常常大讚這些作品充滿靈魂和情感的共鳴。


    EMI 成功之後，柯普又繼續寫出更新、更複雜的程式——安妮（Annie）。EMI 譜曲是根據預定的規則，而安妮則是靠機器學習，會因應外界新的音樂輸入，不斷變化發展音樂風格。就連柯普也不知道安妮接下來會譜出什麼作品。而且事實上，安妮除了寫音樂，也對其他藝術形式很感興趣，像是俳句。2011
    年，柯普就出版了《灼炎之夜：人和機器所作的俳句兩千首》（Comes the Fiery Night: 2,000 Haiku by Man and Machine），其中有部分是安妮寫的，其他則來自真正的詩人。但書中並未透露哪些俳句的作者是誰。如果你認為自己一定可以看出人類創作與機器產出的差異，歡迎挑戰。$^{18}$


    ## 出現大批「無工作階級」


    十九世紀，工業革命創造出龐大的都市無產階級，這個新的工作階級帶來前所未見的需求、希望及恐懼，沒有其他信條能夠有效回應，社會主義因而擴張。到頭來，自由主義是靠著吸收了社會主義的精華，才打敗社會主義。到了二十一世紀，我們可能看到的是一批全新而龐大的無工作階級：這群人類沒有任何經濟、政治或藝術價值，對社會的繁榮、實力和榮耀，也沒有任何貢獻。這個「無用的階級」不只是失業，而是根本無業可就。


    2013年9月，牛津大學教授佛瑞（Carl Benedikt Frey）及奧斯本（Michael A. Osborne）發表〈就業的未來〉研究報告，調查各項工作在未來二十年，被電腦取代的可能性。根據他們所開發的演算法來估計，美國有47%的工作都屬於高風險。例如到了2033年，電話行銷和保險業務大概有99%的機率會失業。運動賽事的裁判有98%的可能性，收銀員97%、廚師96%、侍者94%、律師助手94%、導遊91%、麵包師傅89%、巴士司機89%、建築工人88%、獸醫助手86%、保全人員84%、船員83%、調酒師77%、檔案保管員76%、木匠72%、救生員67%，諸如此類。


    當然，也有一些工作還算安全。例如到了2033年，電腦能夠取代考古學家的可能性，只有0.7%，因為這種工作需要的模式辨識能力極為複雜，而且能夠產生的利潤又頗為微薄，因此很難想像會有企業或政府願意在接下來二十年間，投入足夠的資本，將考古學推向自動化。$^{19}$


    當然，到了2033年也可能出現許多新職業，像是虛擬世界的設計師。然而，此類專業可能會需要比現下的設計工作更高的創意和彈性，而且如果是收銀員或保險業務員到了四十歲中年失業，能否成功轉職為虛擬世界設計師，也實在難說得準。就算他們真的轉職成功，根據社會進步的速度，很有可能再過十年又得重新轉職。畢竟就算是設計虛擬世界這件事，演算法也可能會打敗人類。所以，這裡不只需要創造新工作，更得創造「人類做得比演算法好」的新工作。$^{20}$


    由於我們無法預知2030或2040年的就業市場會是什麼樣貌，現在也就不知道該如何教育下一代。等到孩子長到四十歲，他們在學校學的一切，可能都已經過時而遭到淘汰。傳統上，人生主要分成兩大時期：學習期、再加上之後的工作期。但這種傳統模式很快就會徹底過時，想要不被淘汰，只有一條路：一輩子不斷學習，不斷打造全新的自己。只不過，有許多人、甚至是大多數人，大概都做不到這件事。


    由於接下來的科技發展潛力極其龐大，很有可能就算這些無用的大眾什麼事都不做，整個社會也有能力餵飽這些人，讓這些人活下去。然而，能有什麼事讓他們打發時間、獲得滿足？人總得做些什麼，否則肯定會無聊到發瘋。到時候，要怎麼過一天的生活？


    答案之一可能是靠藥物和電玩。那些對社會來說多餘的人，可以多花點時間在3D虛擬世界裡；比起了無生趣的現實世界，虛擬世界能夠為他們提供更多刺激、更多情感投入。然而，自由主義推崇人類生命及人類經驗神聖不可侵犯，若真是朝「人生如夢」的境地發展，將會是一記致命打擊。這些人對社會毫無用處，整天活在現實與虛幻之間，這樣的人命何來神聖？


    譬如，伯斯楚隆（Nick Bostrom）之類的專家和思想家就提出警告，認為人類大概還來不及經歷這樣的退化，就滅亡了，因為一旦人工智慧超越人類智慧，可能就會直接消滅人類。AI這麼做的理由，一是可能擔心人類反撲、拔掉AI的插頭，二是要追求某種我們現在還難以想像的目標——而這目標，恐怕我們永遠也無法參透，因為等到整個AI系統比人類更聰明時，人類要再控制和探究AI系統有何動機，實在有如天方夜譚。


    就算目前看來立意全然良善的程式，也可能帶來令人恐懼的結果。有一套常見的劇本，就是某間公司設計出第一套真正的人工超級智慧，給了它一個毫無惡意的測試，像是計算π值。但就在任何人意識到任何事之前，AI已經接管整個地球、消滅人類，並對外太空發動攻擊，征服整個銀河系，把整個已知宇宙轉變成巨大的超級電腦，花上幾兆兆年的時間，只為了算出更精確的π值。畢竟，這正是它的創造者交付的神聖使命。$^{21}$


    本章開頭指出幾項自由主義面對的實際威脅，第一項就是人類不再具備在軍事和經濟上的用途。當然，這並非鐵口直斷，只是一種推測。不論是科技上的困難、或是政治上的反對，都可能減緩演算法入侵就業市場的腳步。而且，由於人類心靈還有一大塊未知的領域，我們還不確定人類是否有什麼隱藏的才能，或是能夠創造什麼新工作，來填補舊工作消失造成的缺口。然而光是這樣，可能還不足以拯救自由主義。因為自由主義不僅相信人的價值，信仰的還是「個人主義」。這就來到自由主義面臨的第二個威脅：雖然政經體系未來可能仍需要人類，但需要的並非個人。人類還是會繼續寫音樂、教物理、做投資，但政經體系對這些人的瞭解，會更甚於這些人所瞭解的自己，政經體系也會替這些人做出大多數重要決定。也就是說，政經體系將會剝奪個人的權威和自由。


    自由主義對個人主義的信念，前提就是之前討論過的三個重要假設：


    一、我是一個不可分割的個體；也就是說，我具備單一的本質，無法再分為各個部分或子系統。確實，這個內部核心可能有許多外層，但只要把這些外層努力剝掉，就能在內部找到一個清晰、單一的內在聲音，也就是真正的自我。


    二、真正的自我是完全自由的。


    三、根據前兩個假設，我很瞭解我自己，我能夠瞭解一些別人無法瞭解我的事。只有我能夠進入我內心自由的空間，只有我能聽到真實自我的低語。正因如此，自由主義才賦予個人極大的權威。我不該相信任何其他人為我做出的選擇，因為沒有任何人能真正瞭解我是誰、我有什麼感覺、我又想要什麼。正因如此，選民能做出最好的選擇，顧客永遠是對的，而且看的人覺得美、就是美。


    然而，生命科學卻對這三項假設都提出挑戰，認為：


    一、生物就是演算法，而且人類不是不可分割的個體，而是由可分割的部分組成。換句話說，人類是許多不同演算法的組合，並沒有單一的內在聲音或單一的自我。


    二、構成人類的演算法並不「自由」，而是由基因和環境壓力形塑，雖然可能依據基因預設或隨機做出決定，但總之絕不能說是「完全自由的」。


    三、因此，外部演算法理論上有可能比我更瞭解我自己。如果能用某個演算法，監視組成身體和大腦的每個子系統，就能清楚掌握我是誰、我有什麼感覺、我又想要什麼。只要開發出這樣的演算法，重點就不再是什麼選民、顧客和看的人；而是演算法能夠做出最好的選擇，演算法永遠是對的，演算法覺得美、就是美。


    在十九世紀和二十世紀，由於沒有任何外部演算法能夠對個人有效監測，因此個人主義仍然是一種很實用的選擇。雖然國家和市場可能都很想對每個人進行有效的監測，但當時就是缺少必要的科技。不論是KGB還是FBI，對我的生化、基因組和大腦都無法完全掌握，而且就算特務偷聽我每次打的電話、監視我在街頭上和別人的每次互動，也沒有足夠的運算能力來分析這些資料。因此就二十世紀的科技而言，自由主義說得並沒錯，沒有人能比我更認識我。於是，人類有充分的理由認為自己是個自主的系統，聽從的是自己內在的聲音，而不是聽從什麼老大哥的命令。


    然而到了二十一世紀，科技已經讓外部演算法有能力「駭進人性」，比我更瞭解我自己。一旦如此，個人主義就即將崩潰，權威也將從個人轉向由演算法構成的網路。人類不會再認為自己是自主的個體、依據自己的期望而度日，而是習慣把整體人類看做一種生化機制的集合體，由電子演算法網路不斷監控和指示。要發生這種情況，演算法甚至還不需要完全瞭解我、而且絕不出錯，只要比我自己更瞭解我、犯的錯更少，就已足夠。到了這個程度，合理的做法就是把愈來愈多的選擇和人生大事，都交給演算法來為我決定。


    在醫學方面，我們早已跨過這條線。在醫院裡，每位病人不再是「個人」。很有可能在我們的有生之年，就會看到許多關於身體和健康的重大決定，將由電腦幫忙決定（譬如IBM的華生）。這倒也不一定是個壞消息。


    目前，已有糖尿病人裝了感測器，每天幾次自動檢測血糖值，並在超標時發出警告。2014年，耶魯大學研究人員也宣布一種由iPhone控制的人工胰臟試驗成功了。有五十二名糖尿病人參與該實驗，每位病人都在腹部植入一個小小的感測器和小小的幫浦。幫浦連結裝有胰島素和升糖素的小管，用這兩種激素來調節血糖高低。感測器會不斷測量血糖值，將數據傳至iPhone，而iPhone安裝了能夠分析相關資訊的應用程式（app），能在必要時對幫浦發出命令，釋出胰島素或升糖素，完全不需人為操作。$^{22}$


    就算是許多沒有嚴重疾病的人，也已經開始使用穿戴式感測器和電腦，來監控自己的健康和活動狀況。相關設備從智慧型手機、智慧手錶、智慧手環、智慧臂環、甚至是智慧型內衣，不一而足，記錄著像是血壓和心跳等等生物統計資料。這些資料接著傳送到精密的電腦程式中，讓演算法來建議穿戴者該如何調整飲食和日常生活習慣，以改善健康、活得更久、也更有生產力。$^{23}$


    谷歌與製藥大廠諾華（Novartis）正在合作開發一種隱形眼鏡，能夠分析眼淚的成分，每隔幾秒檢查血糖值。$^{24}$ 精靈科學（Pixie Scientific）公司則推出智慧型尿布，能夠分析嬰兒的糞便，瞭解孩'
