  md: '現在這個混沌的世界，那些冷酷的億萬富翁和少數利益集團之所以能夠發展蓬勃，並不是因為他們更能看清全貌，反而是因為他們的目標非常狹隘。在混沌的系統中，集中視野反而有其優勢，而億萬富翁的權力大小，又與目標大小息息相關（呈現負相關）。如果你身為世上最富有的人，想再賺十億美元，簡直易如反掌，只要輕鬆操弄一下政經體系，就能辦到。但相對的，如果是想消弭全球的不平等、阻擋全球暖化，牽涉到的政經體系或社會體系就顯得太過複雜了，就算最富有的一群人也無法操控。


    然而，權力真空的狀況並不會持續太久。如果傳統政治結構在二十一世紀無法夠快處理資料、無法產生有意義的願景，就會出現更新、更有效率的結構，取代它們的地位。這些新的結構可能大異於任何先前的政治制度，既非民主、也非專制。這裡唯一的問題，就是會由誰來建立並控制這些結構。如果人類自己完成不了這項任務，或許該讓其他候選者來試試。


    # 數據主義觀點下的人類簡史


    從數據主義觀點，可以把全人類看成一套資料處理系統，而每個人都是裡面的一個晶片（處理器）。這樣一來，整部歷史的進程就是要透過四種方式，提高系統效率：


    +   一、增加處理器數量。擁有十萬人口的城市，運算能力就會高於擁有一千人口的村莊。

    二、增加處理器種類。處理器不同，運算和分析數據的方式就不相同。因此，如果資料處理系統擁有許多種不同的處理'
  merge: -1
  pgno: 428
- img_proc: true
  md: '人類大命運


    器，就能增加系統的動力與創意。農民、祭司和醫師之間的對話所產生的想法，可能是狩獵採集者之間怎麼談都談不到的。


    三、增加處理器之間的連結。如果光是增加處理器數量，但彼此之間無法連結，仍然沒有意義。十座有貿易網路連結的城市，產生的經濟、科技與社會創新，通常都會高於十座孤立的城市。


    四、增加現有連結網的流通自由度。如果資料數據無法自由流通，光是把處理器連結起來，也不會有什麼用處。這就像在是十座城市之間開出了道路，但路上卻滿是搶匪或路霸，商人和旅行者難以通行，效果也就大打折扣。


    這四種方法常常互相矛盾。像是處理器的數量和種類愈多，要能自由連結就愈難。因此，智人資料處理系統的建構，是分成四大階段，各自強調不同的方法。


    第一階段始於認知革命，開始能夠將大量智人連結為單一資料處理網路。這就讓智人擁有超乎其他人類及動物物種的關鍵優勢。對尼安德塔人、黑猩猩或大象來說，能夠連結成單一網路的個體數量有限，但智人卻打破了這個限制。


    智人運用資料處理優勢，遍布了整個世界。但隨著智人分散到不同地區、感受不同氣候，就開始彼此失去連繫，經歷不同的文化變革，於是形成各式各樣的人類文化，各有生活方式、行為模式及世界觀。因此，歷史的第一階段後期，就是增加人類處理器的數量及種類，但同時犧牲了連結：在二萬年前，智人數量遠多於七萬年前，但歐洲智人處理資訊的方式也不同於中國的智人。在當時，歐


    426'
