  md: '2015年12月，〈巴黎協定〉（Paris Agreement）訂出了較遠大的目標：在2100年以前，追求全球平均溫度升幅要低於1.5°C（以工業革命前的全球平均氣溫為準）。然而，有許多為了達成這項目標所必要的痛苦措施，卻都被輕描淡寫的延遲到2030年、甚至是二十一世紀的下半葉，其實也就是把燙手山芋丟給下一代。目前的主政者一派貌似環保，只想收割立即的政治利益，卻把減少排放（也就會減緩成長）的重大政治代價，留給未來的主政者。（本書寫作之時，即2016年1月，美國和其他最大汙染國是否會簽署〈巴黎協定〉及認真執行，看來仍在未定之數。）


