    # 人類大命運


    在羅馬帝國，每年會選出兩位執政官，文件以執政官的任期做為年代標記，也是慣例。君士坦丁第四次擔任執政官確實是在西元315年，但凸槌的是，加利卡努斯卻要到西元317年，才首次擔任執政官。如果這份這麼了不起的文件確實是在君士坦丁的時代寫就，絕不可能會有如此離譜誇張的錯誤。這就等於美國開國元勛傑佛遜等人，把〈美國獨立宣言〉的日期寫成「1776年7月34日」一樣不可思議。


    今天所有的歷史學家都同意，〈君士坦丁御賜教產諭〉是在大約八世紀的時候，在教廷中偽造而成。雖然瓦拉從未質疑這份古代帝王諭令的倫理權威，但他的科學分析確實影響了這份諭令的實務指示——也就是歐洲人應該要服從教皇的諭令。4


    # 《聖經》是由誰在何時寫的？


    2013年12月20日，烏干達國會通過《反同性戀法》，認定同性戀活動屬於刑事犯罪，某些犯行可能重判到無期徒刑。


    整件事情得到基督教福音教派的推動和支持，認為上帝禁止同性戀行為。他們引用〈利未記〉第18章第22節「不可與男人苟合，像與女人一樣，這本是可憎惡的」和〈利未記〉第20章第13節「人若與男人苟合，像與女人一樣，他們二人行了可憎的事，總要把他們治死，罪要歸到他們身上」，做為舉證。


    在過去這幾世紀裡，正是因為同一則宗教故事，造成全世界有數百萬人受苦受難。這個故事的三個成分，可以簡單整理如下：'
