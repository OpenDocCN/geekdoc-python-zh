  md: '障礙終於在大約五千年前打破了：蘇美人發明了文字與金錢。這兩者就像是雙胞胎，同時、同地由同樣的父母產出，讓人突破了人類大腦的資料處理限制。文字和金錢讓人開始能夠向成千上萬的人收稅，組織起複雜的官僚體系，打造出遼闊的王國。在蘇美，這些王國都是由同為人類的神職領袖來領導，以神之名統治管理。在鄰近的尼羅河谷則是更進一步，將神職領袖直接與神結合，創造出活生生的神祇——法老。


    在埃及人的概念裡，法老不只是神的代理人，而是一位真真正正的神。整個埃及都屬於這位神，所有人都必須服從祂的命令，繳納祂定下的稅。在法老統治下的埃及，就像蘇美神廟的景況，神並不會親自管理祂的商業帝國。雖然有些法老鐵腕統治、有些法老歌舞昇平，但不論哪種情形，實際行政管理還是交給手下幾千名能讀會寫的行政官員來處理。正如任何其他人類，法老還是有著生物的身軀，也就有著生物的需求、欲望和情緒。但那個「生物的法老」根本無足輕重。真正統治尼羅河谷的，是一個想像中的法老，存在於數百萬埃及人口耳相傳的故事之中。


    法老自己安坐於首都孟菲斯，在宮殿裡吃著美味葡萄、與妻妾遊樂，而手下的官員則是在整個王國四處奔波，從地中海岸邊、遠至努比亞沙漠。官僚計算每個村莊必須上繳的稅款，記錄在長長的莎草紙捲軸上，送到孟菲斯。如果孟菲斯來了一道書面命令，要求為軍隊招募士兵或為工程徵集工人，官員就會努力補滿所需人數。他們會計算王室的糧倉裡還有多少小麥，清理運河和水庫需要多少工作天數，又該把多少豬鴨送往孟菲斯，好讓法老的後宮嬪妃大快朵頤。就算這位肉身神祇駕崩，把整個身體做了防腐處理，用極盡奢華的葬儀、一路護送到孟菲斯市郊的王室墓地，整個官僚體系還'
