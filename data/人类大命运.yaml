    # 第 5 章 一對冤家


    己可以不靠宗教，就瞭解所有自然現象，而宗教只是一種選配——是在完全瞭解大自然的全貌後，還能選擇要不要再另外加點宗教的「超自然」教條。但大多數宗教都認為，如果沒有宗教，你根本不可能瞭解世界；不懂這些教條，你就不可能瞭解疾病、旱災或地震的真正原因。


    另外，要說宗教就是「相信神」也有問題。我們常常會說，某個虔誠的基督徒是信仰宗教的，因為她相信神（上帝），而某個狂熱的共產主義人士算不上是信仰宗教，因為共產主義並沒有神。然而宗教是由人所創、而非由神所創；宗教的定義應該是在於社會功能，而非是否有神。只要是任何無所不包的故事，能夠為人類的法律、規範和價值觀，賦予高於一般人的合法性，就應該算是宗教。宗教能夠為人類社會結構找的理由，就是這些結構反映了高於一般人的法則。


    宗教會說，人類都受制於某種道德法則系統，這個系統並非由人所創、也並非人所能改變。於是，虔誠的猶太人會說，這個道德法則系統就是由上帝所創，揭示在《聖經》之中。虔誠的印度教徒則會說，這些法則是由梵天（Brahma）、毘濕奴（Vishnu）和濕婆（Shiva）所創，揭示在《吠陀經》中。至於其他宗教，從佛教和道教，到共產主義、納粹主義和自由主義，也都會說自己那套高於一般人的法則都是源於大自然的自然律，而不是這個上帝或那個神祇所創。當然，每個宗教都各自信奉著不同的自然律、由不同的先知所揭示，從佛陀、老子，再到馬克思和希特勒，各顯神通。


    一個猶太男孩去找他爸爸，問說：「爸，為什麼我們不能吃豬肉啊？」這位爸爸若有所思的摸著他又長又捲的鬍子，回答道：「楊克勒啊，世界本來就是這樣啊。你還小，還不懂，如果我們吃'
