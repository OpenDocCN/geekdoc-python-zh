    49. 在莫斯科的蘇聯領導階層（1963 年）：集中式資料處理


    例如，蘇聯的經濟部門可能會決定：所有店裡的麵包價格都是 2 盧布又 4 戈比（kopek）；烏克蘭敖得薩州的某個集體農場，本來種小麥，但現在要改成養雞；莫斯科的紅色十月麵包店，每天要生產三百五十萬條麵包，而且一條也不准多。與此同時，蘇聯的科學部也會命令所有蘇聯生物科技實驗室接受李森科（Trofim
    Lysenko, 1898-1976）的理論。李森科素負惡名，執掌列寧農業科學院，但他不相信當時主流的基因遺傳理論。他堅信，如果某個生物這輩子得到了新的性狀，就能直接傳給後代。這種想法完全違背正統達爾文學說，卻與共產主義的教育原則十分吻合，意味著只要訓練小麥承'
