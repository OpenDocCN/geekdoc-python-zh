  md: '檔案管理、目錄、時間表和其他資料處理技術。在十二世紀歐洲，最像矽谷的地方大概就是梵蒂岡。教會建立了歐洲最早的經濟合作組織：修道院，在一千年間帶領歐洲經濟，並引進先進的農業和行政措施。修道院是最早使用時鐘的機構，而且幾個世紀以來，修道院和主教座堂學校一直是歐洲最重要的學習中心，協助成立了諸多歐洲頂尖大學，例如波隆那大學、牛津大學、薩拉曼卡大學。


    今日，天主教會仍享有數億信眾的忠誠和什一奉獻。但天主教和其他有神論的宗教，卻早已從創造轉為反動，忙於守舊，而非率先開創新科技、新經濟方法，或是突破性的社會思想。他們現在主要做的，是對各種運動所擴展的科技、方法及思想，感到憤怒。生物學家發明避孕藥，而教宗不知該如何反應。電腦科學家發展網際網路，而拉比還在討論是否該允許正統派猶太教徒上網。女性主義思想家呼籲女性取回自己身體的所有權，而學識淵博的穆夫提還在辯論該如何應對如此煽動的想法。


    讓我們問問自己：二十世紀最有影響力的發現、發明或創造是什麼？你會發現這個問題很難回答，因為候選者實在太多，有像是抗生素之類的科學發現；有像是電腦之類的科技發明；也有像是女性主義之類的意識型態創造。


