  md: '脆弱的生物圈裡，而隨著進步和成長的大舉啟動，也就衝擊到生態穩定。如果想讓全球每個人都過著像美國人一般的豪奢生活，我們得要多幾個地球才行，但我們就只有一個地球。如果進步和成長最後破壞了整個生態系，要付出代價的不會只是吸血蝙蝠、狐狸和兔子：智人也無法置身事外。生態崩潰將造成經濟崩盤、政治動盪、人類生活水準下降，還可能對人類文明的存在造成威脅。


