  md: '保護個人隱私的阻礙，允許國家官僚制度或跨國公司進入我們身體的最深處。舉例來說，允許谷歌閱讀我們的電子郵件、追蹤我們的各種活動，就可能讓谷歌在流行病爆發、而傳統衛生機構還渾然不覺的時候，向我們提出警告。


    英國國民保健署（NHS）如何得知倫敦爆發流感疫情？答案是分析幾百間診所、上千位醫師提出的通報。但這些醫師又是怎麼知道相關資訊？假設有位瑪麗，某天一早醒來覺得不太舒服，她並不會直接跑去看醫生。而是會先等個幾小時、甚至是一兩天，希望喝個幾杯加了蜂蜜的熱茶之後，身體就會舒服一點。等到病情一直沒改善，她才會預約掛號，上診所去看病。醫師將資料輸入電腦後，理想的狀況是NHS的某人會分析這些和其他數千名醫師所通報的資料，得出流感正在蔓延的結論。但這一切得花上許多時間。


    然而對谷歌來說，這只是幾分鐘的事。谷歌所做的，就是監控倫敦居民在電子郵件和谷歌搜尋引擎所輸入的詞彙，再與疾病症狀資料庫做交叉比對。假設一般來說，「頭痛」、「發燒」、「噁心」和「打噴嚏」每天在倫敦居民的電子郵件和搜尋中，會出現大約十萬筆，如果今天谷歌演算法發現這些詞彙的使用次數忽然飆到三十萬筆，就知道這下出了問題，正有流感肆虐！我們不用再等到瑪麗去看醫生了。第一天早上，她早上起床覺得不太舒服，就在上班前給同事寄了一封電子郵件：「我頭痛，但還是會去上班。」只要這樣，谷歌就已經知道了。


    然而，想讓谷歌發揮這種神力，瑪麗不僅得允許谷歌閱讀自己發出的電子郵件，還得允許谷歌與衛生當局分享資訊。如果連安潔莉娜．裘莉都願意犧牲自己的隱私，提高眾人对乳癌的警覺，瑪麗為什麼不做一個類似的小小犧牲，以避免流行病爆發呢？'
