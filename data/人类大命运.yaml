    # 聰明的馬


    1900年代,德國有匹名馬「聰明的漢斯」(Clever Hans)。牠在德國許多城鎮村莊巡迴表演,不僅德語水準非同凡響,數學能力更是驚人。如果有人問牠:「漢斯,4乘3是多少?」漢斯就會用馬蹄點地12下。有人用文字寫給牠看:「20減11是多少?」漢斯也會展現普魯士的一絲不苟,點個9下。


    1904年,德國教育部門組成特別科學委員會,由一名心理學家領軍調查這件事。委員會的十三名成員(其中還包括一位馬戲團經


    ![](img/319dca06e22893e942053da0432e9f19_148_0.png)


    17.西元1904年,聰明的漢斯正在表演。17'
  - '[PAGE 149]


    理和一名獸醫）一心認為這必定是個騙局，但費盡九牛二虎之力，還是找不出任何欺偽不實之處。就算把漢斯與主人分開，由全然陌生的人問牠問題，漢斯仍然多半都能答對。


    直到1907年，心理學家方斯特（Oskar Pfungst）進行另一項調查，才終於查出真相。原來漢斯之所以能答出正確解答，靠的是觀察提問者的身體語言和臉部表情。如果有人問漢斯3乘4是多少，漢斯從過去的經驗知道，提問者心中會期待牠點蹄點到一定次數。於是牠開始點著，並且仔細觀察提問人。隨著漢斯慢慢接近答案，提問人會顯得愈來愈緊張，並在漢斯點到正確數字時，緊繃的情緒達到頂峰。漢斯知道的是，如何從人的肢體姿勢和表情看出這點。於是牠就停下來，看著提問人原本的緊張轉變成難以置信的表情、或是哈哈大笑。漢斯便知道，自己又答對了。


    常有人用聰明的漢斯做為例子，告誡不該誤以為動物有人性，或高估牠們有什麼驚人的能力。但事實上，這裡教我們的一課，卻正好相反。從這個故事可以看出，我們為動物強加人性，反而是低估了動物的認知能力，並忽略了其他生物獨特的能力。確實，漢斯在數學方面絕對算不上有什麼才能，任何八歲小孩的算術能力都比牠強。但如果講的是從肢體語言來推論情感和意圖，漢斯就是個真金實銀的天才了。


    如果有個瑞典人用我不懂的瑞典話，問我4乘3是多少，我絕不可能光看他的臉部表情和肢體語言，就用腳點出正確的12下。聰明的漢斯之所以擁有這個能力，是因為馬匹通常就是用肢體語言相互溝通。但漢斯了不起的地方在於：牠不只成功解讀了同類的情感和意圖，還看穿了原本不熟悉的人類。'
  - '[PAGE 150]


    # 團結力量大


    多數研究提到,智力和工具製作是人類興起的關鍵因素。雖然其他動物同樣也會製作工具,但是人類在這一點的能力,無疑遠遠勝出。可是說到智力,就沒那麼明確了。雖然有一整個相關產業致力於智力的定義和評量,但距離達成共識,還有一段很遠的路程。幸好我們在這裡並不需要踏入這個雷區,因為不管如何定義智力,顯然光靠工具和智力,仍然不足以讓智人征服世界。


    根據大多數對智力的定義,人類在大約一萬年前,就已經成為地球上最聰明的動物了,也是工具製作的冠軍,卻仍然只是一種不太重要的生物,對周遭的生態系也沒什麼影響力。顯然,除了智力和工具製作之外,他們還缺了某種關鍵因素。


    也或許,人類之所以最後能主宰這顆星球,並不是因為有什麼第三個因素,而只是因為智力和工具製作的能力都提升了?看來不然,因為翻閱歷史,「個人的智力和工具製作能力」與「人類物種的能力提升」並沒有直接關係。兩萬年前的一般智人,智力和工具製作能力可能都要超過現代人的平均。現代學校和雇主雖然三不五時會測試我們的性向,但不管測出來的結果有多差,福利國家仍然會保障每個人的基本需求。但在石器時代,則是由天擇每天二十四小時來測試你,而且在這數不盡的測試中,只要有一項不過,就可能致命。然而,儘管我們石器時代的每一位祖先,工具製作能力可能更優秀,面對外在險惡的環境時,頭腦可能更清晰、感覺更敏銳,但是兩萬年前的人類仍然比今天弱小得多。


    在這兩萬年之間,人類從原本用石矛頭的長矛來獵殺猛獁象,演變成能製造太空船探索太陽系,並不是因為雙手變得更靈巧,也'
- md: '不是因為大腦發展得更大了（事實上，現代人的大腦似乎還小了一些）；我們征服世界的關鍵因素，其實是在於能夠讓許多人類團結起來的能力。如今人類完全主宰地球，並不是因為單一人類比單一的黑猩猩或狼更聰明、或是手指更靈巧，而是地球上只有智人這個物種，能夠大規模而靈活的合作。智力和工具製造當然非常重要，但如果人類還沒學會如何大規模靈活合作，即便大腦再聰明、手指再靈巧，現在仍然是在敲燧石，而不是撞擊鈾原子！


    只不過，譬如螞蟻和蜜蜂，早在人類之前幾百萬年，就已經學會了集體合作，為什麼沒能早早統治人類？原因在於牠們的合作缺乏靈活性。蜜蜂的合作方式雖然非常複雜巧妙，但牠們無法在一夜之間徹底改造其社會制度。舉個例子，如果蜂巢面臨突如其來的威脅或機會，蜜蜂並沒有辦法把蜂后送上斷頭臺，改制為蜜蜂民國。


    至於大象、黑猩猩這種有社交能力的哺乳動物，雖然合作起來比蜜蜂更靈活，但牠們的朋友與家人數量都太少。牠們的合作是以彼此認識為基礎——如果你我都是黑猩猩，而我想跟你合作，就必須真的認識你，知道你是怎樣的黑猩猩：你究竟是猩格高尚、還是猩品低落？如果我不認識你，怎麼可能跟你合作？據我們所知，只有智人能夠與無數陌生個體，進行非常靈活的合作。正是這種實際具體的能力，說明了為何目前是由人類主控地球，而不是什麼永恆的靈魂、或是獨有的意識。


    ## 革命萬歲!


    歷史已經提供充分證據，點出大規模合作極端重要。勝利幾乎永遠屬於合作更順暢的一方；這不只適用於人與動物的爭鬥，也適用於人群與人群之間的衝突。因此，羅馬之所以征服希臘，不是因為羅馬人的腦子比較大、或工具製造技術比較高明，而是因為他們的合作更具效率和效益。縱觀歷史，紀律嚴明的軍隊就是能擊敗散兵游勇，團結的精英就是能凌駕烏合之眾。例如在1914年，為數僅三百萬的俄羅斯貴族、官員和商人，就能作威作福，控制超過一億八千萬個農民和工人。俄羅斯精英熟知如何合作守衛其共同利益，但那一億八千萬平民卻無法有效動員。事實上，那些精英有一大部分的努力重點，正是要確保這一億八千萬底層民眾無法學會合作。


    想掀起一場革命，光靠人數，絕對遠遠不夠。革命靠的通常是一小群人集成的網路，而不是一大群人的動作。如果你想發動一場革命，不要問「有多少人會支持我的想法？」而是要問「我有多少支持者能夠有效合作？」俄國1917年爆發十月革命，引爆點並不是一億八千萬農民起身反抗沙皇，而是一小群共產主義信徒在對的時間，站到了對的位置。當時俄國中上階級人數至少有三百萬，但共產主義信徒僅有兩萬三千名。然而，共產主義信徒組織嚴密，依舊奪下了俄羅斯帝國。當俄羅斯的權力從沙皇老朽的掌握、與克倫斯基（Kerensky）臨時政府同樣顫抖的指間滑落，共產主義信徒一把接起，緊握住權力的韁繩，一如鬥牛犬對骨頭緊咬不放。


    共產黨徒這一握，一直到1980年代末之前，從未放開。有效的組織讓他們掌權長達八十年，而最後也是因為組織的缺陷，才頹然傾塌。


    1989年12月21日，羅馬尼亞共產獨裁者齊奧塞斯庫（Nicolae Ceaușescu）在首都布加勒斯特市中心，組織了一項大規模的支持者示威活動。在先前幾個月之間，蘇聯已經從東歐共產主義政權收回支援，柏林圍牆已倒下，革命席捲波蘭、東德、匈牙利和捷克斯洛伐克。齊奧塞斯庫自1965年以來，一直統治羅馬尼亞，就算羅馬尼亞的蒂米什瓦拉市，已經在12月17日出現抗暴運動，齊奧塞斯庫仍然相信，自己能擋下這波海嘯般的浪潮。而他的反制措施之一，就是在布加勒斯特安排大規模集會，希望向羅馬尼亞人和世界各國證明，大多數民眾仍然敬愛他、或至少是害怕他。當時已經吱嘎作響的黨機器，奮力動員了八萬人，塞滿市中心廣場，並號令羅馬尼亞全國民眾，放下手邊工作，聆聽廣播或收看電視。


    在一片看似熱情的群眾歡呼聲中，齊奧塞斯庫登上陽臺，俯瞰廣場，他在先前幾十年間，這動作已經做了不下數十次。在妻子艾蓮娜、黨領導和大批保鏢陪同下，齊奧塞斯庫開始了註冊商標一般的沉悶演講。在那八分鐘內，他讚揚羅馬尼亞社會主義的輝煌，並在群眾機械式鼓掌的掌聲中，顯得志得意滿。


    接著就出事了。這段影片現在上YouTube還看得到，只要搜尋「Ceausesco''s last speech」（齊奧塞斯庫的最後演說），你就能親眼目睹歷史的進展。


    從YouTube影片可以看到，齊奧塞斯庫才剛開始另一個冗長的句子，說到：「我要感謝在布加勒斯特發起及組織這項偉大集會的人，這是……」接著他忽然被眼前的景象給驚呆了，瞠目結舌，難以置信。他再也沒有把那句話說完。你可以看到，在那一秒，他的世界整個崩毀。觀眾居然有人在噓他？到現在，大家仍在討論究竟誰是第一個膽敢發出噓聲的人。但一聲之後，就是接二連三，短短幾秒鐘，群眾口哨聲此起彼落、辱罵聲不絕於耳，並一起大喊著「蒂·米·什瓦·拉！蒂·米·什瓦·拉！」


    而且這一切都透過電視直播，羅馬尼亞國民有四分之三正聽從命令，坐在電視機前，他們的心激動的跳著。惡名昭彰的羅馬尼亞秘密警察立刻下令停止直播，但電視臺工作人員並未聽命。攝影師把攝影機指向天空，因此觀眾不會再看到黨領導人在陽臺上有多驚慌，但錄音師還是繼續錄著音、技術人員也還是繼續播送。


    整個羅馬尼亞都能聽到群眾的噓聲，同時齊奧塞斯庫則是不斷大喊：「哈囉！哈囉！哈囉！」好像問題是出在麥克風一樣。他的妻子艾蓮娜開始斥喝觀眾「安靜！安靜！」，直到齊奧塞斯庫轉頭向她斥喝「是妳給我閉嘴！」，而且這一切都還在直播。齊奧塞斯庫接著開始向廣場上激動的群眾喊話：「同志們！同志們！請靜下來，同志們！」


    但同志們已經不願意安靜下來了。羅馬尼亞共產政府崩潰的時刻，就是有八萬人在布加勒斯特市中心廣場，意識到他們比那個在陽臺上戴著皮帽的老人強得太多。但真正令人震驚的，還不是這個系統崩潰的時刻，而是這種政權居然已作威作福了幾十年。為什麼世上的革命如此罕見？群眾早就有能力衝上陽臺，把這種人撕成碎片，但為什麼幾世紀以來，他們卻是一直聽話、鼓掌、歡呼，完全聽從陽臺上的人下的任何命令？


    齊奧塞斯庫和親信統治羅馬尼亞兩千萬人，長達四十年，靠的就是確保了三項重要條件。首先，將忠誠的共產官僚安插控制所有的合作網路，例如軍隊、工會、甚至是體育協會。第二，不論在政治、經濟或社會方面，只要是任何可能合作反共產的競爭組織，一律禁止成立。第三，他們擁有來自蘇聯和東歐共產政黨的支援。雖然偶有爭執，但這些共產政黨還是會在必要時互相伸出援手，或至少會確保沒有外人來到這個社會主義天堂多管閒事。在這種情況下，雖然領導精英對人民造成各種艱困痛苦，兩千萬羅馬尼亞人卻無法組織起任何有效的反對運動。


    一直要到這三項條件都不再存在，齊奧塞斯庫才終於垮臺。在1980年代末期，蘇聯撤回了保護傘，各個共產主義政權也像骨牌一樣，逐一倒下。到了1989年12月，齊奧塞斯庫已經再也無望取得任何外援，鄰近國家掀起的革命更像是給反對陣營一記強心針，而且共產黨本身也分裂成不同陣營，互相攻擊。溫和派希望拉下齊奧塞斯庫，開始改革，以免最後無法挽回。


    ![世界崩毀的那一刻：齊奧塞斯庫瞠目結舌，不敢相信自己的眼睛和耳朵。](img/319dca06e22893e942053da0432e9f19_155_0.png)


    ## 第 3 章 人類的獨特之處


    最後，就是齊奧塞斯庫自掘墳墓：他自己安排了在布加勒斯特的集會，還透過電視直播，讓革命份子把握絕佳機會，集結力量反抗齊奧塞斯庫。想讓革命星火燎原，哪有比電視直播更快的辦法？


    然而，雖然權力已經從陽臺上笨拙的掌權者手中滑落，卻不是由廣場上的群眾所承繼。雖然他們人數眾多、群情激昂，卻不知道該怎樣組織起來。因此，正如1917年「十月革命」時的俄羅斯，權力又來到了一小群政治玩家的手中，他們唯一擁有的，就是良好的組織能力。


    於是羅馬尼亞的革命成果，就這樣被自稱「救國陣線」的組織所竊據，而這個組織實際上就是共產黨溫和派的煙幕彈。救國陣線與當時的集會群眾，並沒有真正的關係，而是一群中階黨政官員，由共產黨的前中央委員會委員及宣傳部長伊列斯古（Ion
    Iliescu）率領。伊列斯古和救國戰線的同志搖身一變，成了民主政治家，抓緊每一支可用的麥克風，宣稱自己是改革的領導者，再透過他們長久以來的統治經驗和親信網路，繼續控制國家、侵占資源。


    在共產的羅馬尼亞，幾乎一切都歸於國有。但到了民主的羅馬尼亞，卻是迅速將一切資產私有化，再以低廉的價格售予前共產黨人；只有這些共產黨人知道發生了什麼事，並且合作互謀其利。控制著國家基礎設施和天然資源的國營公司，被以出清特賣價，出售給前共產政府官員，同時共產黨的士兵基層也能用極低的價格，買到房屋和公寓。


    伊列斯古自己當了羅馬尼亞總統，同事們則成了部長、國會議員、銀行董事、億萬富翁。直到如今，控制著這個國家的新羅馬尼亞精英份子，仍然大多是前共產黨人及其家屬。別人吃肉，那些冒著生命危險、在蒂米什瓦拉和布加勒斯特抗議的群眾卻只能喝湯，就是因為他們不知道如何合作，建立一個高效的組織來維護自己的利益。


    2011年的埃及革命，也出現同樣命運。1989年電視所扮演的角色，到了2011年由臉書和推特接手。在新媒體協助下，群眾得以協調整合，讓成千上萬的人潮，在對的時間淹沒街道和廣場，推翻穆巴拉克政權。然而，要把十萬人帶到解放廣場是一回事，但想要真正抓緊政治機器的操縱桿、在正確的房間握到正確的手、讓國家有效運作，又是另一回事。因此，穆巴拉克下臺的時候，示威者並無力填上那個空缺。埃及只有兩個組織擁有足以治國的組織能力：軍隊和穆斯林兄弟會。因此，這場革命的成果先由兄弟會竊據，之後再由軍隊劫持。


    比起過去的獨裁者、或是在開羅和布加勒斯特的示威者，不管是羅馬尼亞前共產黨人或是埃及的軍事將領，都算不上真的比較聰明、又或手指更為靈巧。他們的優勢只在於靈活合作。一方面，他們的合作效率高於群眾，二方面，比起頑固的齊奧塞斯庫和穆巴拉克，他們也展現了更大的靈活度。


    ## 在暴力與色情之外


    如果說，智人之所以統治世界，是因為只有我們能夠大規模靈活合作，這顯然又破壞了我們認為人類比較神聖的信念。我們希望人類真的是特殊的，值得擁有各種特權。為了證明這一點，我們會指出人類的各種驚人成就：我們蓋了金字塔和長城；我們解開了原子和DNA的結構；我們還抵達了南極、登上了月亮。如果說這些成就都源於每個人都擁有的某種獨特本質（例如不朽的靈魂），那要說人類生命有神聖之處，或許還說得過去。但因為這些勝利其實都是靠著大規模合作而來，就很難再說為什麼每個人類都值得我們如此敬重。


    整個蜂巢的能力，會遠比單一隻蝴蝶來得高，然而這並不會讓單隻的蜜蜂比單隻的蝴蝶更神聖。羅馬尼亞共產黨人成功主宰了沒有組織的羅馬尼亞大眾，難道我們該說共產黨人的生命比一般國民更神聖？人類所知的合作方式遠比黑猩猩更有效率，因此人類是將太空船射向月球，而黑猩猩只能在動物園對遊客扔石頭。但難道這就讓人類變得比較高級？


    也有這個可能，不過我們得先想想：到底為什麼人類可以互相配合得這麼好？為什麼只有人類能夠打造出這麼龐大而複雜的社會系統？對於像黑猩猩、狼和海豚這些社會性哺乳動物，社交合作大多必須以彼此認識為基礎。以黑猩猩為例，一定要等到互相熟識、建立起社會階層之後，才有可能一起獵食。因此，黑猩猩得花很多時間在社交互動、權力鬥爭。如果兩隻不認識的黑猩猩碰在一起，通常不但不能合作，反而會互相咆哮、扭打，或是盡速逃離。


    但是巴諾布猿（bonobo，與黑猩猩同為一屬）則有些不同，巴諾布猿常常是用性行為，來紓解壓力，建立社會連結。所以並不意外，同性的性行為也是稀鬆平常。如果兩群互不相識的巴諾布猿碰在一起，一開始會先展現恐懼和敵意，讓吼叫聲和尖叫聲不絕於叢林。但很快的，其中一群的雌性巴諾布猿會走出來，邀請陌生的巴諾布猿別打仗了，來做愛吧。通常另一方都會接受這項邀請，於是不到幾分鐘，原本可能的戰場就成了歡場，巴諾布猿用著幾乎所有你想得到的姿勢性交，甚至還包括倒吊在樹上。


    智人同樣很瞭解這些合作技巧，有時候是組成像黑猩猩那種權力階級，有時候也像巴諾布猿用性愛鞏固社會連結。但不管講的是打鬥或交配，光靠彼此相識，並無法成為大規模合作的基礎。想解決希臘債務危機，辦法絕不可能是邀請希臘政治家和德國銀行家來大打一架、或是雲雨一場。研究指出，不論是友好或敵對的關係，智人能夠真正熟識的對象不超過一百五十人。不管人類是靠什麼打造出大規模合作網路，總之絕不只是彼此熟識而已。


    對於想靠實驗來破解人類社會祕密的心理學家、社會學家、經濟學家，這實在是壞消息。由於組織和經費因素，絕大多數的實驗對象都只是個人或小群體。然而，想用小群體的行為來推斷大眾社會的動態，風險實在很高。有一億人口的國家，運作方式從根本上就和一百人的小部落，大不相同。


    ## 最後通牒賽局


    讓我們用行為經濟學上最著名的「最後通牒賽局」（ultimatum game，又稱為承讓賽局）實驗為例。這項實驗通常有兩名參與者，其中一人會得到100美元，可以自由分配給自己和另一位參與者。他可能會全留、分成兩半、或是把大多數給對方。另一位參與者只有兩個選項：接受、或拒絕。如果他拒絕對方的分法，兩人都得兩手空空回家。


    古典經濟學理論主張，人類是理性的計算機器。所以他們認為大多數人會自己留99美元，只給對方1美元；而且他們也認為另一位參與者會接受這樣的分法。畢竟如果有人問你要不要1美元，理性的回答自然就是接受。另一位參與者拿到99美元，又有什麼關係呢？


    古典經濟學家可能一輩子都待在實驗室和講堂，從沒冒險進入真實的世界。大多數參與最後通牒賽局的人，只要拿的錢太少，就會拒絕，理由就是「不公平」。他們寧願不拿這1美元，也不想看起來像個傻蛋。也因為這就是現實世界的運作方式，所以很少人會向對方提出極低的數字。大多數人就是直接平分，或是讓自己占點小好處，像是給對方30美元或40美元。


    最後通牒賽局影響深遠，不僅戳破古典經濟學理論，也建立起近幾十年最重要的一項經濟學發現：智人的行事並不是依照冷冰冰的數學邏輯，而是根據有溫度的社交邏輯。


    我們是由情感所控制。正如先前所見，這些情感實際上都是很複雜的演算法，反映出遠古狩獵採集部落的社會機制。如果在三萬年前，我幫你抓了一隻野雞，但你卻只分我一支雞翅，我可不會對自己說：「還有一支雞翅，總比什麼都沒有好。」而是演化演算法快速運轉，讓腎上腺素和睪固酮流向全身，血液沸騰，然後向地上重重一跺腳，發出怒吼。短期來說，我可能得餓肚子回來，甚至還會挨上一兩拳。但長期來說這是有好處的，因為你以後別想再坑我。我們會拒絕不公平的方案，是因為如果在石器時代，溫和接受一切要求，就只能等死。


    觀察現代仍存的狩獵採集部落，結果同樣支持這種觀點。大多數部落都很重視公平，如果獵人獵到一頭肥鹿回來，每個人都會得到一份。黑猩猩也是如此。如果有一隻黑猩猩殺了一頭小豬，同一群的其他黑猩猩會聚在一旁伸出手來，而且通常也都會拿到一份。


    最近，靈長類動物學家德瓦爾（Frans de Waal）在一項實驗中，將兩隻捲尾猴關在相鄰的籠子裡，兩隻都能看到對方的一切動作。德瓦爾的研究團隊在每個籠子都放了一些小石頭，訓練這些猴子把石頭交給研究人員。每次猴子拿一個石頭給他們，就會得到食物，一開始的獎勵是一片黃瓜。兩隻猴子都高高興興的把黃瓜吃了。幾回合後，德瓦爾進到實驗的下一個階段。這一次，第一隻猴子交出石頭，得到的是一顆葡萄。葡萄可比黃瓜美味多了。但第二隻猴子交出石頭的時候，拿到的卻仍然是一片黃瓜。這隻猴子之前拿到黃瓜還很高興，但現在卻火冒三丈。牠拿到黃瓜之後，先是難以置信的看了一會兒，接著就怒氣沖沖，把黃瓜丟向研究人員，並開始跳來跳去、大聲尖叫。牠可不是什麼好惹的角色！


    從這個令人發噱的實驗（可以上 YouTube 觀看）和最後通牒賽局，讓很多人以為：靈長類動物就是天生有道德觀，而平等是個普遍而永恆的價值。人類天生就是平等主義者，而不平等的社會必會招致怨恨和不滿，絕不可能運作順暢。


    ## 社會從來不平等


    真是這樣嗎？這些理論應用在黑猩猩、捲尾猴和小型狩獵採集部落或許很合用；或是在實驗室裡對一小群人做測試，也不會有什麼問題。然而，一旦觀察大批群眾的行為，就會看到一個全然不同的現實。大多數的人類王國和帝國都極度不平等，但其中的穩定性和效率卻好得不得了。


    在古埃及，法老王可以躺在舒適的墊子上，住的是涼爽而豪華的宮殿，穿的是黃金的涼鞋和鑲滿寶石的外衣，由美麗的女僕剝好甜滋滋的葡萄放進他嘴裡。透過敞開的窗戶，他可以看到農民在田裡工作，穿的是骯髒的破衣，頭上頂著無情的太陽，回家能有一根黃瓜吃，就已經是天大的幸福。然而，農民很少起身反抗。


    1740年，普魯士國王腓特烈二世入侵西里西亞（Silesia），發動一系列讓他贏得「腓特烈大帝」稱號的血腥戰爭，讓普魯士成為一大強權；卻也導致數百萬人死亡、殘廢、一無所有。他麾下的兵士多半是倒楣的新兵，得承受鐵的紀律和嚴苛的演練。可以想見，這些士兵對他們的最高指揮官並沒多大的好感。腓特烈有一次看著部隊集合、準備出擊，就和一位將軍說到，他最驚訝的是「我們站在這裡，面對這六萬大軍，卻安全無虞；他們都是我們的敵人，每個人都比我們武裝完整、身強體壯，但他們一見我們就發抖，我們卻對他們毫無所懼。」


    腓特烈確實是可以安全無虞的看著這群人。在接下來幾年，雖然戰事辛勞，但這六萬武裝大軍從未反叛，很多人還為他獻上非凡的勇氣、冒著生命危險，甚至獻出寶貴的生命。


    這些埃及農民和普魯士士兵的反應，為什麼和最後通牒賽局、或捲尾猴實驗的情況這麼不同？原因就在於：大批群眾的行為，就是和小型團體的情況有所不同。如果今天的最後通牒賽局實驗是有甲乙兩方各一百萬人，要分1,000億美元，科學家究竟會觀察到怎樣的情況？


    這裡面的動態很有可能十分奇特而迷人。舉例來說，因為一百萬人不可能直接做出共同的決定，因此可能兩方各出現一位統治精英。這時，如果甲方領導人說要給乙方領導人100億美元，而自己留下900億美元，情況會如何？乙方領導人有可能會接受這種不公平的報價，接著把這100億美元大部分直接轉到自己的瑞士銀行帳戶，同時用各種賞罰手段，避免底下的人叛亂。領導人可能威脅和嚴懲異議份子，並且告訴那些溫和有耐心的人，他們死後可以在來世得到永恆的獎勵。這正是古埃及和十八世紀普魯士的情況，而且至今在全球許多國家依舊如此。


    這樣的威脅和承諾，通常都能成功創造穩定的階級制度和群眾合作網路，但前提是民眾相信自己是順應著自然不可避免的法則、或是神祇神聖的命令，而不只是聽命於另一個人。所有的大規模人類合作，到頭來都是奠基於我們想像的秩序。這一套又一套的規矩雖然只存在於我們的想像之中，我們卻會認為這就像重力一樣真實而不可侵犯。


    「向天神獻上十頭牛，就會下雨；孝順父母，就會上天堂；如果不相信我說的話，你就會下地獄。」只要智人住在相信同樣一套故事的地方，就會遵守一樣的規矩，於是不僅很容易預測陌生人會有什麼行為，也很方便組織大規模合作的網路。智人也常常用可見的標記（例如頭巾、鬍子或西裝）來代表「你能相信我，我跟你信仰的故事是一樣的」。但我們那些黑猩猩堂兄弟，並無法創造和流傳這樣的故事，也因此無法大規模合作。


    ## 意義的網


    人之所以很難理解「想像的秩序」這種概念，是因為覺得現實只分兩類：客觀現實和主觀現實。所謂客觀現實，就是事物的存在與我們的信念和感受無關。例如重力就是一項客觀現實，早在牛頓之前便已存在，而且不論信不信它，都同樣會受到重力影響。


    但主觀現實則相反，事物的存在與否，是取決於個人的信念和感受。例如，假設我覺得頭一陣劇痛，去看醫生。雖然醫師對頭部做了徹底檢查，卻沒查到什麼問題。於是她又要我去做血液檢查、尿液檢查、DNA檢測、X光、心電圖、fMRI，什麼都做了。等到'
  mdcn: '不是因為大腦發展得更大了（事實上，現代人的大腦似乎還小了一些）；我們征服世界的關鍵因素，其實是在於能夠讓許多人類團結起來的能力。如今人類完全主宰地球，並不是因為單一人類比單一的黑猩猩或狼更聰明、或是手指更靈巧，而是地球上只有智人這個物種，能夠大規模而靈活的合作。智力和工具製造當然非常重要，但如果人類還沒學會如何大規模靈活合作，即便大腦再聰明、手指再靈巧，現在仍然是在敲燧石，而不是撞擊鈾原子！


    只不過，譬如螞蟻和蜜蜂，早在人類之前幾百萬年，就已經學會了集體合作，為什麼沒能早早統治人類？原因在於牠們的合作缺乏靈活性。蜜蜂的合作方式雖然非常複雜巧妙，但牠們無法在一夜之間徹底改造其社會制度。舉個例子，如果蜂巢面臨突如其來的威脅或機會，蜜蜂並沒有辦法把蜂后送上斷頭臺，改制為蜜蜂民國。


    至於大象、黑猩猩這種有社交能力的哺乳動物，雖然合作起來比蜜蜂更靈活，但牠們的朋友與家人數量都太少。牠們的合作是以彼此認識為基礎——如果你我都是黑猩猩，而我想跟你合作，就必須真的認識你，知道你是怎樣的黑猩猩：你究竟是猩格高尚、還是猩品低落？如果我不認識你，怎麼可能跟你合作？據我們所知，只有智人能夠與無數陌生個體，進行非常靈活的合作。正是這種實際具體的能力，說明了為何目前是由人類主控地球，而不是什麼永恆的靈魂、或是獨有的意識。


    ## 革命萬歲!


    歷史已經提供充分證據，點出大規模合作極端重要。勝利幾乎永遠屬於合作更順暢的一方；這不只適用於人與動物的爭鬥，也適用於人群與人群之間的衝突。因此，羅馬之所以征服希臘，不是因為羅馬人的腦子比較大、或工具製造技術比較高明，而是因為他們的合作更具效率和效益。縱觀歷史，紀律嚴明的軍隊就是能擊敗散兵游勇，團結的精英就是能凌駕烏合之眾。例如在1914年，為數僅三百萬的俄羅斯貴族、官員和商人，就能作威作福，控制超過一億八千萬個農民和工人。俄羅斯精英熟知如何合作守衛其共同利益，但那一億八千萬平民卻無法有效動員。事實上，那些精英有一大部分的努力重點，正是要確保這一億八千萬底層民眾無法學會合作。


    想掀起一場革命，光靠人數，絕對遠遠不夠。革命靠的通常是一小群人集成的網路，而不是一大群人的動作。如果你想發動一場革命，不要問「有多少人會支持我的想法？」而是要問「我有多少支持者能夠有效合作？」俄國1917年爆發十月革命，引爆點並不是一億八千萬農民起身反抗沙皇，而是一小群共產主義信徒在對的時間，站到了對的位置。當時俄國中上階級人數至少有三百萬，但共產主義信徒僅有兩萬三千名。然而，共產主義信徒組織嚴密，依舊奪下了俄羅斯帝國。當俄羅斯的權力從沙皇老朽的掌握、與克倫斯基（Kerensky）臨時政府同樣顫抖的指間滑落，共產主義信徒一把接起，緊握住權力的韁繩，一如鬥牛犬對骨頭緊咬不放。


    共產黨徒這一握，一直到1980年代末之前，從未放開。有效的組織讓他們掌權長達八十年，而最後也是因為組織的缺陷，才頹然傾塌。


    1989年12月21日，羅馬尼亞共產獨裁者齊奧塞斯庫（Nicolae Ceaușescu）在首都布加勒斯特市中心，組織了一項大規模的支持者示威活動。在先前幾個月之間，蘇聯已經從東歐共產主義政權收回支援，柏林圍牆已倒下，革命席捲波蘭、東德、匈牙利和捷克斯洛伐克。齊奧塞斯庫自1965年以來，一直統治羅馬尼亞，就算羅馬尼亞的蒂米什瓦拉市，已經在12月17日出現抗暴運動，齊奧塞斯庫仍然相信，自己能擋下這波海嘯般的浪潮。而他的反制措施之一，就是在布加勒斯特安排大規模集會，希望向羅馬尼亞人和世界各國證明，大多數民眾仍然敬愛他、或至少是害怕他。當時已經吱嘎作響的黨機器，奮力動員了八萬人，塞滿市中心廣場，並號令羅馬尼亞全國民眾，放下手邊工作，聆聽廣播或收看電視。


    在一片看似熱情的群眾歡呼聲中，齊奧塞斯庫登上陽臺，俯瞰廣場，他在先前幾十年間，這動作已經做了不下數十次。在妻子艾蓮娜、黨領導和大批保鏢陪同下，齊奧塞斯庫開始了註冊商標一般的沉悶演講。在那八分鐘內，他讚揚羅馬尼亞社會主義的輝煌，並在群眾機械式鼓掌的掌聲中，顯得志得意滿。


    接著就出事了。這段影片現在上YouTube還看得到，只要搜尋「Ceausesco''s last speech」（齊奧塞斯庫的最後演說），你就能親眼目睹歷史的進展。


    從YouTube影片可以看到，齊奧塞斯庫才剛開始另一個冗長的句子，說到：「我要感謝在布加勒斯特發起及組織這項偉大集會的人，這是……」接著他忽然被眼前的景象給驚呆了，瞠目結舌，難以置信。他再也沒有把那句話說完。你可以看到，在那一秒，他的世界整個崩毀。觀眾居然有人在噓他？到現在，大家仍在討論究竟誰是第一個膽敢發出噓聲的人。但一聲之後，就是接二連三，短短幾秒鐘，群眾口哨聲此起彼落、辱罵聲不絕於耳，並一起大喊著「蒂·米·什瓦·拉！蒂·米·什瓦·拉！」


    而且這一切都透過電視直播，羅馬尼亞國民有四分之三正聽從命令，坐在電視機前，他們的心激動的跳著。惡名昭彰的羅馬尼亞秘密警察立刻下令停止直播，但電視臺工作人員並未聽命。攝影師把攝影機指向天空，因此觀眾不會再看到黨領導人在陽臺上有多驚慌，但錄音師還是繼續錄著音、技術人員也還是繼續播送。


    整個羅馬尼亞都能聽到群眾的噓聲，同時齊奧塞斯庫則是不斷大喊：「哈囉！哈囉！哈囉！」好像問題是出在麥克風一樣。他的妻子艾蓮娜開始斥喝觀眾「安靜！安靜！」，直到齊奧塞斯庫轉頭向她斥喝「是妳給我閉嘴！」，而且這一切都還在直播。齊奧塞斯庫接著開始向廣場上激動的群眾喊話：「同志們！同志們！請靜下來，同志們！」


    但同志們已經不願意安靜下來了。羅馬尼亞共產政府崩潰的時刻，就是有八萬人在布加勒斯特市中心廣場，意識到他們比那個在陽臺上戴著皮帽的老人強得太多。但真正令人震驚的，還不是這個系統崩潰的時刻，而是這種政權居然已作威作福了幾十年。為什麼世上的革命如此罕見？群眾早就有能力衝上陽臺，把這種人撕成碎片，但為什麼幾世紀以來，他們卻是一直聽話、鼓掌、歡呼，完全聽從陽臺上的人下的任何命令？


    齊奧塞斯庫和親信統治羅馬尼亞兩千萬人，長達四十年，靠的就是確保了三項重要條件。首先，將忠誠的共產官僚安插控制所有的合作網路，例如軍隊、工會、甚至是體育協會。第二，不論在政治、經濟或社會方面，只要是任何可能合作反共產的競爭組織，一律禁止成立。第三，他們擁有來自蘇聯和東歐共產政黨的支援。雖然偶有爭執，但這些共產政黨還是會在必要時互相伸出援手，或至少會確保沒有外人來到這個社會主義天堂多管閒事。在這種情況下，雖然領導精英對人民造成各種艱困痛苦，兩千萬羅馬尼亞人卻無法組織起任何有效的反對運動。


    一直要到這三項條件都不再存在，齊奧塞斯庫才終於垮臺。在1980年代末期，蘇聯撤回了保護傘，各個共產主義政權也像骨牌一樣，逐一倒下。到了1989年12月，齊奧塞斯庫已經再也無望取得任何外援，鄰近國家掀起的革命更像是給反對陣營一記強心針，而且共產黨本身也分裂成不同陣營，互相攻擊。溫和派希望拉下齊奧塞斯庫，開始改革，以免最後無法挽回。


    ![世界崩毀的那一刻：齊奧塞斯庫瞠目結舌，不敢相信自己的眼睛和耳朵。](img/319dca06e22893e942053da0432e9f19_155_0.png)


    ## 第 3 章 人類的獨特之處


    最後，就是齊奧塞斯庫自掘墳墓：他自己安排了在布加勒斯特的集會，還透過電視直播，讓革命份子把握絕佳機會，集結力量反抗齊奧塞斯庫。想讓革命星火燎原，哪有比電視直播更快的辦法？


    然而，雖然權力已經從陽臺上笨拙的掌權者手中滑落，卻不是由廣場上的群眾所承繼。雖然他們人數眾多、群情激昂，卻不知道該怎樣組織起來。因此，正如1917年「十月革命」時的俄羅斯，權力又來到了一小群政治玩家的手中，他們唯一擁有的，就是良好的組織能力。


    於是羅馬尼亞的革命成果，就這樣被自稱「救國陣線」的組織所竊據，而這個組織實際上就是共產黨溫和派的煙幕彈。救國陣線與當時的集會群眾，並沒有真正的關係，而是一群中階黨政官員，由共產黨的前中央委員會委員及宣傳部長伊列斯古（Ion
    Iliescu）率領。伊列斯古和救國戰線的同志搖身一變，成了民主政治家，抓緊每一支可用的麥克風，宣稱自己是改革的領導者，再透過他們長久以來的統治經驗和親信網路，繼續控制國家、侵占資源。


    在共產的羅馬尼亞，幾乎一切都歸於國有。但到了民主的羅馬尼亞，卻是迅速將一切資產私有化，再以低廉的價格售予前共產黨人；只有這些共產黨人知道發生了什麼事，並且合作互謀其利。控制著國家基礎設施和天然資源的國營公司，被以出清特賣價，出售給前共產政府官員，同時共產黨的士兵基層也能用極低的價格，買到房屋和公寓。


    伊列斯古自己當了羅馬尼亞總統，同事們則成了部長、國會議員、銀行董事、億萬富翁。直到如今，控制著這個國家的新羅馬尼亞精英份子，仍然大多是前共產黨人及其家屬。別人吃肉，那些冒著生命危險、在蒂米什瓦拉和布加勒斯特抗議的群眾卻只能喝湯，就是因為他們不知道如何合作，建立一個高效的組織來維護自己的利益。


    2011年的埃及革命，也出現同樣命運。1989年電視所扮演的角色，到了2011年由臉書和推特接手。在新媒體協助下，群眾得以協調整合，讓成千上萬的人潮，在對的時間淹沒街道和廣場，推翻穆巴拉克政權。然而，要把十萬人帶到解放廣場是一回事，但想要真正抓緊政治機器的操縱桿、在正確的房間握到正確的手、讓國家有效運作，又是另一回事。因此，穆巴拉克下臺的時候，示威者並無力填上那個空缺。埃及只有兩個組織擁有足以治國的組織能力：軍隊和穆斯林兄弟會。因此，這場革命的成果先由兄弟會竊據，之後再由軍隊劫持。


    比起過去的獨裁者、或是在開羅和布加勒斯特的示威者，不管是羅馬尼亞前共產黨人或是埃及的軍事將領，都算不上真的比較聰明、又或手指更為靈巧。他們的優勢只在於靈活合作。一方面，他們的合作效率高於群眾，二方面，比起頑固的齊奧塞斯庫和穆巴拉克，他們也展現了更大的靈活度。


    ## 在暴力與色情之外


    如果說，智人之所以統治世界，是因為只有我們能夠大規模靈活合作，這顯然又破壞了我們認為人類比較神聖的信念。我們希望人類真的是特殊的，值得擁有各種特權。為了證明這一點，我們會指出人類的各種驚人成就：我們蓋了金字塔和長城；我們解開了原子和DNA的結構；我們還抵達了南極、登上了月亮。如果說這些成就都源於每個人都擁有的某種獨特本質（例如不朽的靈魂），那要說人類生命有神聖之處，或許還說得過去。但因為這些勝利其實都是靠著大規模合作而來，就很難再說為什麼每個人類都值得我們如此敬重。


    整個蜂巢的能力，會遠比單一隻蝴蝶來得高，然而這並不會讓單隻的蜜蜂比單隻的蝴蝶更神聖。羅馬尼亞共產黨人成功主宰了沒有組織的羅馬尼亞大眾，難道我們該說共產黨人的生命比一般國民更神聖？人類所知的合作方式遠比黑猩猩更有效率，因此人類是將太空船射向月球，而黑猩猩只能在動物園對遊客扔石頭。但難道這就讓人類變得比較高級？


    也有這個可能，不過我們得先想想：到底為什麼人類可以互相配合得這麼好？為什麼只有人類能夠打造出這麼龐大而複雜的社會系統？對於像黑猩猩、狼和海豚這些社會性哺乳動物，社交合作大多必須以彼此認識為基礎。以黑猩猩為例，一定要等到互相熟識、建立起社會階層之後，才有可能一起獵食。因此，黑猩猩得花很多時間在社交互動、權力鬥爭。如果兩隻不認識的黑猩猩碰在一起，通常不但不能合作，反而會互相咆哮、扭打，或是盡速逃離。


    但是巴諾布猿（bonobo，與黑猩猩同為一屬）則有些不同，巴諾布猿常常是用性行為，來紓解壓力，建立社會連結。所以並不意外，同性的性行為也是稀鬆平常。如果兩群互不相識的巴諾布猿碰在一起，一開始會先展現恐懼和敵意，讓吼叫聲和尖叫聲不絕於叢林。但很快的，其中一群的雌性巴諾布猿會走出來，邀請陌生的巴諾布猿別打仗了，來做愛吧。通常另一方都會接受這項邀請，於是不到幾分鐘，原本可能的戰場就成了歡場，巴諾布猿用著幾乎所有你想得到的姿勢性交，甚至還包括倒吊在樹上。


    智人同樣很瞭解這些合作技巧，有時候是組成像黑猩猩那種權力階級，有時候也像巴諾布猿用性愛鞏固社會連結。但不管講的是打鬥或交配，光靠彼此相識，並無法成為大規模合作的基礎。想解決希臘債務危機，辦法絕不可能是邀請希臘政治家和德國銀行家來大打一架、或是雲雨一場。研究指出，不論是友好或敵對的關係，智人能夠真正熟識的對象不超過一百五十人。不管人類是靠什麼打造出大規模合作網路，總之絕不只是彼此熟識而已。


    對於想靠實驗來破解人類社會祕密的心理學家、社會學家、經濟學家，這實在是壞消息。由於組織和經費因素，絕大多數的實驗對象都只是個人或小群體。然而，想用小群體的行為來推斷大眾社會的動態，風險實在很高。有一億人口的國家，運作方式從根本上就和一百人的小部落，大不相同。


    ## 最後通牒賽局


    讓我們用行為經濟學上最著名的「最後通牒賽局」（ultimatum game，又稱為承讓賽局）實驗為例。這項實驗通常有兩名參與者，其中一人會得到100美元，可以自由分配給自己和另一位參與者。他可能會全留、分成兩半、或是把大多數給對方。另一位參與者只有兩個選項：接受、或拒絕。如果他拒絕對方的分法，兩人都得兩手空空回家。


    古典經濟學理論主張，人類是理性的計算機器。所以他們認為大多數人會自己留99美元，只給對方1美元；而且他們也認為另一位參與者會接受這樣的分法。畢竟如果有人問你要不要1美元，理性的回答自然就是接受。另一位參與者拿到99美元，又有什麼關係呢？


    古典經濟學家可能一輩子都待在實驗室和講堂，從沒冒險進入真實的世界。大多數參與最後通牒賽局的人，只要拿的錢太少，就會拒絕，理由就是「不公平」。他們寧願不拿這1美元，也不想看起來像個傻蛋。也因為這就是現實世界的運作方式，所以很少人會向對方提出極低的數字。大多數人就是直接平分，或是讓自己占點小好處，像是給對方30美元或40美元。


    最後通牒賽局影響深遠，不僅戳破古典經濟學理論，也建立起近幾十年最重要的一項經濟學發現：智人的行事並不是依照冷冰冰的數學邏輯，而是根據有溫度的社交邏輯。


    我們是由情感所控制。正如先前所見，這些情感實際上都是很複雜的演算法，反映出遠古狩獵採集部落的社會機制。如果在三萬年前，我幫你抓了一隻野雞，但你卻只分我一支雞翅，我可不會對自己說：「還有一支雞翅，總比什麼都沒有好。」而是演化演算法快速運轉，讓腎上腺素和睪固酮流向全身，血液沸騰，然後向地上重重一跺腳，發出怒吼。短期來說，我可能得餓肚子回來，甚至還會挨上一兩拳。但長期來說這是有好處的，因為你以後別想再坑我。我們會拒絕不公平的方案，是因為如果在石器時代，溫和接受一切要求，就只能等死。


    觀察現代仍存的狩獵採集部落，結果同樣支持這種觀點。大多數部落都很重視公平，如果獵人獵到一頭肥鹿回來，每個人都會得到一份。黑猩猩也是如此。如果有一隻黑猩猩殺了一頭小豬，同一群的其他黑猩猩會聚在一旁伸出手來，而且通常也都會拿到一份。


    最近，靈長類動物學家德瓦爾（Frans de Waal）在一項實驗中，將兩隻捲尾猴關在相鄰的籠子裡，兩隻都能看到對方的一切動作。德瓦爾的研究團隊在每個籠子都放了一些小石頭，訓練這些猴子把石頭交給研究人員。每次猴子拿一個石頭給他們，就會得到食物，一開始的獎勵是一片黃瓜。兩隻猴子都高高興興的把黃瓜吃了。幾回合後，德瓦爾進到實驗的下一個階段。這一次，第一隻猴子交出石頭，得到的是一顆葡萄。葡萄可比黃瓜美味多了。但第二隻猴子交出石頭的時候，拿到的卻仍然是一片黃瓜。這隻猴子之前拿到黃瓜還很高興，但現在卻火冒三丈。牠拿到黃瓜之後，先是難以置信的看了一會兒，接著就怒氣沖沖，把黃瓜丟向研究人員，並開始跳來跳去、大聲尖叫。牠可不是什麼好惹的角色！


    從這個令人發噱的實驗（可以上 YouTube 觀看）和最後通牒賽局，讓很多人以為：靈長類動物就是天生有道德觀，而平等是個普遍而永恆的價值。人類天生就是平等主義者，而不平等的社會必會招致怨恨和不滿，絕不可能運作順暢。


    ## 社會從來不平等


    真是這樣嗎？這些理論應用在黑猩猩、捲尾猴和小型狩獵採集部落或許很合用；或是在實驗室裡對一小群人做測試，也不會有什麼問題。然而，一旦觀察大批群眾的行為，就會看到一個全然不同的現實。大多數的人類王國和帝國都極度不平等，但其中的穩定性和效率卻好得不得了。


    在古埃及，法老王可以躺在舒適的墊子上，住的是涼爽而豪華的宮殿，穿的是黃金的涼鞋和鑲滿寶石的外衣，由美麗的女僕剝好甜滋滋的葡萄放進他嘴裡。透過敞開的窗戶，他可以看到農民在田裡工作，穿的是骯髒的破衣，頭上頂著無情的太陽，回家能有一根黃瓜吃，就已經是天大的幸福。然而，農民很少起身反抗。


    1740年，普魯士國王腓特烈二世入侵西里西亞（Silesia），發動一系列讓他贏得「腓特烈大帝」稱號的血腥戰爭，讓普魯士成為一大強權；卻也導致數百萬人死亡、殘廢、一無所有。他麾下的兵士多半是倒楣的新兵，得承受鐵的紀律和嚴苛的演練。可以想見，這些士兵對他們的最高指揮官並沒多大的好感。腓特烈有一次看著部隊集合、準備出擊，就和一位將軍說到，他最驚訝的是「我們站在這裡，面對這六萬大軍，卻安全無虞；他們都是我們的敵人，每個人都比我們武裝完整、身強體壯，但他們一見我們就發抖，我們卻對他們毫無所懼。」


    腓特烈確實是可以安全無虞的看著這群人。在接下來幾年，雖然戰事辛勞，但這六萬武裝大軍從未反叛，很多人還為他獻上非凡的勇氣、冒著生命危險，甚至獻出寶貴的生命。


    這些埃及農民和普魯士士兵的反應，為什麼和最後通牒賽局、或捲尾猴實驗的情況這麼不同？原因就在於：大批群眾的行為，就是和小型團體的情況有所不同。如果今天的最後通牒賽局實驗是有甲乙兩方各一百萬人，要分1,000億美元，科學家究竟會觀察到怎樣的情況？


    這裡面的動態很有可能十分奇特而迷人。舉例來說，因為一百萬人不可能直接做出共同的決定，因此可能兩方各出現一位統治精英。這時，如果甲方領導人說要給乙方領導人100億美元，而自己留下900億美元，情況會如何？乙方領導人有可能會接受這種不公平的報價，接著把這100億美元大部分直接轉到自己的瑞士銀行帳戶，同時用各種賞罰手段，避免底下的人叛亂。領導人可能威脅和嚴懲異議份子，並且告訴那些溫和有耐心的人，他們死後可以在來世得到永恆的獎勵。這正是古埃及和十八世紀普魯士的情況，而且至今在全球許多國家依舊如此。


    這樣的威脅和承諾，通常都能成功創造穩定的階級制度和群眾合作網路，但前提是民眾相信自己是順應著自然不可避免的法則、或是神祇神聖的命令，而不只是聽命於另一個人。所有的大規模人類合作，到頭來都是奠基於我們想像的秩序。這一套又一套的規矩雖然只存在於我們的想像之中，我們卻會認為這就像重力一樣真實而不可侵犯。


    「向天神獻上十頭牛，就會下雨；孝順父母，就會上天堂；如果不相信我說的話，你就會下地獄。」只要智人住在相信同樣一套故事的地方，就會遵守一樣的規矩，於是不僅很容易預測陌生人會有什麼行為，也很方便組織大規模合作的網路。智人也常常用可見的標記（例如頭巾、鬍子或西裝）來代表「你能相信我，我跟你信仰的故事是一樣的」。但我們那些黑猩猩堂兄弟，並無法創造和流傳這樣的故事，也因此無法大規模合作。


    ## 意義的網


    人之所以很難理解「想像的秩序」這種概念，是因為覺得現實只分兩類：客觀現實和主觀現實。所謂客觀現實，就是事物的存在與我們的信念和感受無關。例如重力就是一項客觀現實，早在牛頓之前便已存在，而且不論信不信它，都同樣會受到重力影響。


    但主觀現實則相反，事物的存在與否，是取決於個人的信念和感受。例如，假設我覺得頭一陣劇痛，去看醫生。雖然醫師對頭部做了徹底檢查，卻沒查到什麼問題。於是她又要我去做血液檢查、尿液檢查、DNA檢測、X光、心電圖、fMRI，什麼都做了。等到'
