    法、選舉公務員、解決和平與戰爭問題的國家，比起靠世襲或全能的神所委託的獨裁者，前者的軍隊戰力更強。」²


    第一次世界大戰後，根據類似的理由，也支持賦予婦女各項權利。各國意識到女性在這場全面工業戰爭裡，占有重要角色，認為有必要在和平時期也賦予女性政治權利。因此在1918年，美國總統威爾遜（Woodrow
    Wilson）支持女性擁有投票權。威爾遜向參議院表示，在第一次世界大戰中，「若不是因為有女性在各個領域提供服務，美國或其他任何參戰國家都不可能贏得勝利；而且這裡指的不只是我們一般習於見到女性工作的領域，而是任何過去屬於男性工作的領域，幾乎已經類似戰鬥本身。如果不讓女性享有盡可能最完整的權利，我們不僅會失去民眾的信任，更將咎由自取。」³


    ## 人海戰術過時了


    然而，到了二十一世紀，不論男女，大多數人類都可能不再具有軍事和經濟上的價值。兩次世界大戰投入大量人力的時代，已成過去，二十一世紀最先進的軍隊，主要靠的是尖端科技。現在的戰爭需要的不再是人數無上限的炮灰，而是精挑細選少數訓練精良的士兵；甚至是更少數的特種部隊超級戰士，加上幾位知道如何使用先進科技的專家。由無人機和蠕蟲病毒組成的高科技部隊，正在取代二十世紀由人海組成的軍隊，而指揮作戰的將軍也已經將愈來愈多關鍵決定，交給演算法來處理。


    有血有肉的戰士除了行事難以預測，容易受到恐懼、飢餓和疲勞的影響，思考及行動的速度也愈來愈無法趕上現代戰爭的步調。從古代巴比倫的尼布甲尼撒二世、到現代伊拉克的海珊，雖然科技已有各式進展，但戰爭仍然處於生物的步調——討論得花上好幾小時，戰役得花上好幾天，戰爭得拖上好幾年。


    ![](img/319dca06e22893e942053da0432e9f19_352_0.png)


    43. 上圖：1916 年，索姆河戰役（Battle of the Somme）的作戰士兵。下圖：二十一世紀的無人戰機。


    但到了網路戰，一場戰爭的時間可能只有幾分鐘。在網路指揮中心值勤的中尉，發現有異常狀況後，就算立刻致電上級、上級再立刻警告白宮，最後還是只能一聲哀嘆，因為等到總統接到熱線，這場戰爭早已一敗塗地。只要短短幾秒，計畫夠周延的網路攻擊就能夠讓全美電網斷電、飛航管制中心遭破壞、核電廠和化學工廠發生大量事故；此外，也可以是干擾警察、軍隊的情報通訊網路，甚至是抹除所有金融紀錄，讓幾兆美元就這樣消失無形，沒人知道究竟誰有多少錢。這種時候，唯一讓民眾還不至於歇斯底里的原因，就是因為網路、電視和廣播也全面斷線，所以大家連情況有多慘也不知道。


    如果是比較小的規模，假設空中有兩架無人機正在交戰。其中一架需要先收到遠方碉堡操作人員的許可，才能開火，另一架則能完全自主開火。你覺得哪架勝算大？


    假設到了2093年，已經老舊迂腐的歐盟，決定派出無人機和機器人來殲滅一場新的法國大革命；那時，新的巴黎公社可能會徵集所有的駭客、電腦和智慧型手機參戰，但大多數的人類大概已派不上用場，頂多只能當人肉盾牌。別訝異，這在目前已經是事實了：在今天的許多不對稱衝突中，大多數公民已只能做為各式先進軍武的人肉盾牌。


    此外，就算不管勝敗問題，單單為了倫理正義，也該支持用機器人和無人機取代士兵和飛行員。人類士兵可能犯下謀殺、強姦、劫掠等罪行，而且就算他們循規蹈矩，誤殺平民仍然在所難免。相較之下，如果是搭載倫理演算法的電腦士兵，要能遵守國際刑事法庭最新判決的可能性，就高多了。


    ### 你比機器人耐操嗎？


    經濟領域也有相同情形，能夠舉起錘子或按下按鈕的能力，已經不如以往有價值，這也就危害了自由主義和資本主義之間重要的合作關係。在二十世紀，自由主義認為倫理和經濟能夠兼得，保護人權和自由既是倫理道德的必要之舉、也是經濟成長的關鍵因素。自由主義認為，英美法等國正是因為開放經濟和社會而繁榮，如果土耳其、巴西或中國也想達到同樣的繁榮，就該起而效法。有許多（甚至是絕大多數的）專制君主或軍人政府，也是出於經濟而非道德因素，才終於願意走向開放。


    到了二十一世紀，自由主義的賣相將會大不如前。隨著一般民眾的經濟地位不再重要，光靠倫理道德的論述，是否還足以保護人權和自由？無法從一般民眾身上取得經濟紅利後，精英階級和政府還會認定每個人類都有價值嗎？


    過去有許多事情只有人類能做得到，但現在機器人和電腦正迎頭趕上，可能很快就會在多數的任務上超越人類。確實，電腦與人類的運作方式非常不同，而且看來電腦在短期內也不會變得更像人類——特別是電腦應該不會獲得意識、或是具備情緒和感覺。過去半個世紀，電腦智能（computer
    intelligence）已經有了巨大進展，但在電腦意識（computer consciousness）方面卻完全是原地踏步。據我們所知，2016年的電腦並未比1950年代的電腦原型更有意識。然而，一場重大革命已經風雨欲來。「智能」的觀念即將開始與「意識」的觀念脫鉤，也讓人類面臨失去經濟價值的危險。


    高度的智能與發達的意識，一向是兩個形影不離的觀念。必須是具有意識的個體，才能執行需要高度智能的任務，例如下棋、開車、診療，或是辨認出恐怖份子。然而，我們正在開發新型的「無意識智能」，做起這些事來比人類更快更好。原因在於，這些任務說穿了就是要「找出模式」，而無意識的演算法很快就能在這點超越人類。


    科幻電影通常假設，電腦如果想趕上、甚至超越人類的智能，就必須發展出意識。但是真正的科學卻有另一種看法。想達到超級智能的境界可能有好幾種方式，並不是每一種都需要透過意識。數百萬年來，生物演化一直順著意識這條道路緩緩前行，但非生物的電腦卻可能完全不走這條窄路，而是走向另一條通往超級智能的捷徑。


    這就產生了一個新問題：智能和意識，兩者究竟哪個才真正重要？在兩者仍然攜手同行時，討論兩者的價值孰高孰低，大概只會是哲學家的有趣消遣。但是在二十一世紀，這正成為一項急迫的政治和經濟問題。而且只要一想清楚，會讓人不得不嚴肅起來。至少對軍隊和企業來說，答案再簡單不過：智能是必要的，但意識可有可無！


    軍隊和企業需要具有智能的個體，才有辦法運作，但這樣的個體卻不見得需要具有意識和主觀經驗。舉例來說，如果是血肉之軀的計程車司機，個人有意識的經驗絕對是比毫無感覺的無人車，來得豐富。計程車司機可以一邊在首爾繁忙的街道上開著車，一邊享受音樂。抬頭望見星空，他可能感到心胸忽然一片開朗，或是因為敬畏而讓他開始思考宇宙的奧祕。看到自己的小寶寶跨出第一步，他的眼睛也可能充滿著喜悅的淚水。只不過，這一切都不是社會需要計程車司機具備的特質。社會需要的只是把人從A點運到B點，而且要最快、最安全、最節省成本。就這點而言，無人車很快就能做得比人類駕駛更好，就算它不能享受音樂、也不會因為存在的奧祕而大感敬畏，又有什麼關係呢？


    ## 如果滿街都是無人駕駛車


    我們該回想一下，馬匹在工業革命後走向怎樣的命運。隨便一匹農場上的馬，不論是在嗅覺、愛的能力、認人的能力、跳過柵欄的能力、或是其他上千項的事情，絕對都遠高於史上首款平民汽車福特T型車、或是價值百萬美元的藍寶堅尼跑車。然而，馬匹仍然遭到汽車取代，原因就在於：汽車在社會真正需要的那少數幾項領域勝出。計程車司機很有可能也會走上馬匹這條路。


    事實上，如果不僅是計程車、而是規定所有車輛都不得由人駕駛，並將整個交通控制權交給電腦演算法，就能將所有車輛連接成單一網路，大大降低車禍發生率。


    2015年8月，谷歌實驗中的無人自動車發生車禍。當時這輛車正接近一個十字路口，發現有位行人想過馬路，於是煞了車。但接著這輛車就遭到後方來車追撞，後面那輛車的人類駕駛心不在焉，可能正思索著宇宙的奧祕，結果就忘了看路。如果兩輛車都是由互相連結的電腦來指揮，這種事就不可能發生。控制駕駛的演算法，能夠清楚掌握每輛車在路上的位置和意圖，絕不可能允許自己操縱的兩輛車就這樣相撞。如果能有這樣的系統，就能大幅節省時間金錢，並且拯救人命；只不過，這也會消滅人類開車的經驗，以及幾千萬人的工作機會。⁴


    一些經濟學家預測，「未經強化的人類」遲早會變得完全沒有用途。機器人和3D列印已經開始在像是製衣這種手工業取代人力，而高智能的演算法也即將在白領職業掀起同樣的風潮。不久之前，銀行員和旅行社職員似乎還不受自動化影響，但現在已經風雨欲來了。如果我們只要用智慧型手機就能向演算法買機票，何必還需要旅行社的代辦人員？


    ## 快閃崩盤事件


    股票交易員同樣陷入這種危險。現在大多數的金融交易都已經透過演算法來管理，只要一秒，能處理的資料量就比個人花上一年處理的資料量更大，而且也只要花上一眨眼的時間就能做出反應。2013年4月23日，敘利亞駭客入侵美聯社官方推特帳戶。當天13點07分，他們發出推文，指稱白宮遭到攻擊、歐巴馬總統受傷。各個持續監控所有新聞媒體的交易演算法，瞬間開始反應，瘋狂出售股票。道瓊指數如同自由落體，短短六十秒，大跌了一百五十點，相當於有一千三百六十億美元瞬間蒸發！三分鐘後的13點10分，美聯社發出澄清，表示該推文並非事實。於是演算法開始倒車，到了13點13分，道瓊指數幾乎已經完全回升。


    再三年前，2010年5月6日，紐約證券交易所還有過更劇烈的震盪。從14點42分到14點47分這不過五分鐘的時間，道瓊指數狂跌一千點，一兆美元煙消雲散。但接下來，只花了稍微超過三分鐘，指數同樣回到了狂跌前的水準。


    把我們的錢交給超高速電腦程式來操作，就是會發生這種事。這次的事件稱為「快閃崩盤」（Flash Crash），而專家還在努力研究一切究竟是怎麼回事。他們知道一定是演算法出了問題，但卻無法確認是錯在哪裡。


    美國有部分交易商，已經對演算法交易（algorithmic trading）提起訴訟，認為這種做法是對人類的歧視，人類在反應速度上絕不可能匹敵。光是要討論這是否真正構成侵權，就會為律師帶來大量的工作，當然也為律師事務所帶來大量的收入。⁵


    只不過，這裡講的律師也不一定是人。在電影和電視上，似乎律師就是整天在法庭上喊著「反對！」，然後發表慷慨激昂的陳詞。然而，大多數一般律師得花上最多時間的，反而是翻閱無止盡的文件，尋找判例、漏洞、或是那一絲絲可能相關的證據。有些得忙著找出某人被殺的某晚，究竟發生了什麼事；也有些忙著寫出厚度驚人的商業合約，保護客戶避開任何目前可知的風險。


    如果有一天，複雜的搜尋演算法只要一天時間，就能比一個人花一輩子找到的判例更多，而且只要按個鈕進行腦部掃描，就能戳破所有的謊言和欺騙，那麼這些律師該何去何從？光靠著觀察臉部表情和說話語調，就算是經驗極其豐富的律師和偵探，也很難準確抓到對方心口不一。然而，說謊用的腦部區域和說實話的腦部區域大有不同，雖然目前尚未實現，但是已經可以想像：在不太遙遠的未來，fMRI掃描就能做為幾乎絕對精準的測謊機。這樣一來，幾百萬的律師、法官、警察和偵探還能做什麼？豈不是得回學校再學個新的專業？⁶


    但等到他們進了教室，卻很可能發現等候他們的還是演算法。例如Mindojo公司正在開發互動演算法，不只能教我數學、物理、歷史，還能同時研究我這個人、瞭解我是誰。這種數位教師會仔細監控我答了什麼、又花了多久。隨著時間過去，它們就能判斷我個人獨特的優缺點何在，也知道什麼能讓我精神一振、什麼會叫我眼皮下垂。它們可以用最適合我人格類型的方式，來教我熱力學或幾何學，而無須擔心這種方式並不適合99%的其他學生。這些數位教師永遠不會失去耐心，永遠不會對我大吼大叫，而且也永遠不會罷工。這裡比較大的問題，大概在於：都已經有了這樣有智慧的電腦程式，我為什麼還需要懂熱力學或幾何學？7


    ## 超級醫師：華生


    就連醫師也無法倖免。大多數醫師最主要的任務，就是要正確診斷疾病、建議最好的療法。如果我上診所，主訴發燒、腹瀉，問題可能是食物中毒。然而，同樣的症狀也可能是腸病毒、霍亂、痢疾、瘧疾、癌症，或是什麼未知的新疾病。醫師只有幾分鐘能做出正確的診斷，因為我的保險就只付得起這麼多時間。所以，醫師根本只能問幾個問題，或許再快速做個簡單檢查，接著就得用這少得可憐的資訊，交叉參照我的病史、以及過濾所有人類的疾病。


    唉，不管醫師再怎麼認真，又怎麼可能記得住我以前生過什麼病、做過什麼檢查？同樣的，沒有人能夠熟悉每種疾病和藥物，也不可能讀過每一種醫學期刊的最新文章。最重要的是，醫師如果累了、餓了、甚至生病，都會影響診斷。也就難怪醫師有時會誤診，又或是建議了並非最理想的療法。


    現在讓我們來看看IBM著名的「華生」（Watson）超級電腦，這套人工智慧（AI）系統在2011年贏得電視益智搶答節目「危險境地」（Jeopardy!）首獎，擊敗該節目史上最強的兩位參賽者。


    目前華生的工作則嚴肅許多，主要就是診斷疾病。像華生這樣的AI，比起人類醫師會有某些巨大的潛在優勢。首先，AI可以將史上所有已知疾病和藥物的資訊，全部存在資料庫裡。而且這種資料庫還能每天更新，不僅得知最新研究結果，還能接收世界上所有相關診所和醫院蒐集到的醫療統計資訊。


    第二，華生不僅能熟知我的整個基因組、我完完整整的病史，甚至連我的父母、兄弟姊妹、表兄弟姊妹、鄰居和朋友的基因組和病史，它也一樣瞭若指掌。華生能立刻知道我是不是最近去過熱帶國家、是否有胃部感染的痼疾、家族是否有腸癌病史，又或者是不是最近全城的人都在抱怨腹瀉。


    第三，華生永遠不會說它累了、餓了或病了，它能用上全世界所有的時間為我診斷。我可以舒舒服服坐在沙發上，回答幾百個問題，告訴華生我究竟感覺如何。對大多數病人來說（或許除了患有「疑病症」的病人），這會是個天大的好消息。但如果你是今天要進醫學院，希望自己在二十年後能當個家庭醫師，或許就該重新考慮了。有了這樣的華生，哪還有福爾摩斯出場的機會？


    ![](img/319dca06e22893e942053da0432e9f19_360_0.png)


    44.西元 2011 年，IBM 的華生超級電腦在「危險境地」擊敗兩位人類對手。


    這種威脅,影響的不僅是家醫科,就連專科醫師也無法倖免。而且事實上,鑽研於相對專精領域的醫師(如癌症診斷),可能還更容易遭取代。最近一項實驗中,電腦演算法能夠正確診斷90%的肺癌病例,但人類醫師的正確率卻只有50%。8所謂的未來,其實已經降臨。目前,用專門演算法處理電腦斷層(CT)掃描和乳房攝影檢查已是常規,不僅能夠為醫師提供第二意見(second
    opinion),有時還能抓到醫師漏掉的腫瘤。9


    目前仍有許多技術問題,讓華生及類似的AI不可能明天一早就忽然取代大多數醫師。然而,雖然這些技術問題確實棘手,解決後卻是一勞永逸。人類醫師的培訓是一系列複雜而昂貴的過程,需要費時多年。而且,花上大約十年的學習、實習,終於完成整個過程之後,我們擁有的仍然只是「一位」醫師。想要兩位,只能從頭再跑一次整個過程。相對的,只要解決了阻礙華生的技術問題,能得到的不是一位醫師,而是無數位醫師,能夠在全世界每個角落、全年無休提供服務。因此,就算得花上一千億美元才能解決那些技術問題,長遠看來,還是比培訓人類醫師便宜得多。


    當然,並不是所有人類醫師都會就此消失。至少在可預見的未來,那些需要創意、而不只是日常診斷的工作,還會繼續操縱在人類手中。正如二十一世紀的軍隊逐步擴增精英特種部隊,未來的醫院也可能會有更多等同於醫界遊騎兵或海豹突擊隊的醫師。但正如軍隊已不再需要幾百萬個大兵,未來的醫界也不需要幾百萬位家醫科醫師。


    醫師面臨的情境,對藥劑師來說更是如此。2011年,舊金山就開了一間藥房,由機器人擔任藥劑師。顧客上門之後,機器人只要幾秒鐘,就能得知這位顧客的所有處方箋、所有服用藥物的詳細資訊，以及知道顧客可能對哪些藥物過敏。機器人會先確認新藥不會造成過敏、也不會與其他藥物產生不良反應，接著為顧客配藥。開業第一年，機器人藥劑師配出超過兩百萬張處方，一個錯都沒犯。平均來說，人類藥劑師配藥錯誤的比例，大約是所有處方的1.7%。也就是說，單單在美國，每年就會有超過五千萬張處方配錯藥！10


    ### 你需要溫情，華生也懂


    又會有人說，就算演算法在專業技術方面優於醫師和藥劑師，卻永遠無法取代人性的溫暖。假設CT掃描顯示你得了癌症，你希望告訴你這個消息的是一部冰冷的機器、還是一個會注意到你情緒的人類醫師？


    只不過，如果還有另一部機器，能注意到人類情緒，會依據你的感受和人格特質而調整用詞，這下該怎麼選擇醫師？請別忘了，生物也是各種演算法構成的，而華生偵測人類情緒的準確度，也可以和偵測腫瘤的準確度一樣高。


    人類醫師是透過各種外部訊號，像是臉部表情和語調，來判斷病人的情緒狀態。華生不但比人類醫師更能準確分析這樣的外部訊號，甚至還能同時分析一般人類看不到、聽不到的體內指標。華生能夠靠著監控你的血壓、腦部活動，以及比對生物統計資料庫，清楚知道你的感覺。在分析數百萬筆過去蒐集的社交資訊後，華生就能用最適當的音調、用你最想聽的詞彙，告知你需要知道的事情。


    雖然人類總對自己的情緒智能（emotional intelligence）洋洋得意，卻也常常受情緒影響，出現不尋常的反應。像是遇到一個憤怒的人，自己也開始大吼大叫；聽著一個滿懷憂慮的人講話，自己也憂慮了起來。華生永遠不會受這種誘惑影響，它沒有自己的情緒，所以永遠只會依據你的情緒狀態，提供最適當的反應。


    這種概念目前已應用到某些客服現場，例如芝加哥 Mattersight 公司就設計出此類的軟體。Mattersight 的產品廣告詞就說：「是否曾和某個人說話，覺得真是觸動心弦？那種神奇的感受，正是人格搭配恰當的結果。Mattersight
    將讓全世界的客服中心，都能創造這種感受。」¹¹


    通常，顧客打電話要求客服或提出客訴的時候，總機大概要花個幾秒鐘聆聽，再把電話轉給客服專員。在 Mattersight 的系統裡，電話會由一套聰明的演算法來負責轉接。演算法會先請你說出致電原因，接著聆聽問題，分析你用的詞彙和語調，以此推斷你現在的情緒狀態、甚至是性格類型（內向、外向、死硬、或依賴）。根據這套資訊，演算法再為你轉接最適合現在心情及個性的客服專員。演算法能夠判斷，你需要的該是具備同情心、能夠耐心聽完客訴的人，還是毫不廢話、立刻提出技術解決方案的人。愈能搭配得當，顧客就愈滿意，客服也就能降低服務時間和成本。¹²


    ## 人類比 AI 還剩什麼優勢？


    二十一世紀經濟學最重要的問題，可能就是所有多餘的人能有什麼功用？等到擁有高度智能而本身沒有意識的演算法，接手幾乎一切工作，而且都能比有意識的人類做得更好，人類還能做什麼？


    縱觀歷史，就業市場可分為三個主要部門：農業、工業和服務業。在大約西元 1800 年以前，絕大多數人務農，只有少數人在工業和服務業。到了工業革命，已開發國家的人民就離開了田野和農畜。大多數人開始屬於工業部門，但也有愈來愈多人走向服務部門。到了最近幾十年，已開發國家又經歷了另一場革命：工業部門的職務消失，服務業大幅擴張。2010年，美國的農業人口只剩2%，工業人口有20%，占了78%的是教師、醫師、網頁設計師等服務業。但等到不具心靈的演算法也比人類更會教、更會醫、更會設計的時候，我們要做什麼？


    這並不是全新的問題。自從工業革命爆發以來，人類就擔心機械化可能導致大規模失業。然而，這種情況在過去從未發生，因為隨著舊職業過時，會有新職業出現，人類總有些事情做得比機器更好。只不過，這點並非自然律，也沒人敢保證未來定會繼續如此。人類有兩種基本能力：身體能力和認知能力。在機器與人類的競爭僅限於身體能力時，人類還有數不盡的認知任務可以做得更好。所以隨著機器取代單純操作性的工作，人類便轉向專注在需要認知技能的工作。然而，一旦演算法也比人類更能記憶、分析和辨識各種模式，會發生什麼事？


    如果認為人類永遠都能有自己獨特的能力，無意識的演算法永遠無法趕上，這只能說是一廂情願。對於這種空想，目前的科學回應，可以簡單概括為三項原則：


    - 一、生物是演算法。

    每種動物（包括智人）都是各種生化演算法的集合，是經過數百萬年演化、天擇而成。


    - 二、演算法的運作不受組成物質的影響。

    就像是算盤，不管算珠是木製、鐵製或是塑膠，兩個珠子加上兩個珠子還是等於四個珠子。'
