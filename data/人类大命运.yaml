    有一項突破性案例，是和粒線體DNA（mitochondrial DNA）有關。粒線體是人類細胞內微小的胞器，負責產生細胞所需的能量。粒線體有自己的一套基因，與細胞核中的DNA無關。如果粒線體DNA有缺陷，就會導致各種造成人體衰弱、甚至致命的疾病。


    使用體外受精技術，目前在技術上已經可以製造「三親寶寶」，以克服粒線體遺傳疾病。這種嬰兒的細胞核DNA來自父母，而粒線體DNA則來自第三人。2000年，美國密西根州西布魯菲德鎮的莎朗·沙瑞南（Sharon
