    # 三、因此沒有理由相信非生物演算法永遠無法複製或超越


    生物演算法能做的事。只要運算確實，

    演算法是以碳來表現或是矽來表現，又有何差別？


    確實，目前還有許多事情是生物演算法比非生物演算法做得更好。也有專家反覆聲稱，有些事情「永遠」不是非生物演算法所能做到。然而事實證明，通常這裡的「永遠」都不超過一、二十年。就像在不久之前，大家還很喜歡用臉部識別做例子，說這項任務連嬰兒都能輕鬆辦到，可是最強的電腦卻無力完成。但是到了今天，臉部識別程式辨認人臉的速度和效率，都已經遠超過人類。警方和情報機構現在已經很習慣使用這種程式，掃描監視錄影機無數小時的影片，追蹤嫌犯和罪犯。


    1980年代討論到人類的獨到之處，很習慣用西洋棋做為人類較為優越的主要證據。他們相信電腦永遠不可能在西洋棋領域打敗人類。但是在1996年2月10日，IBM的深藍（Deep
    Blue）超級電腦就打敗了世界西洋棋王卡斯帕羅夫（Garry Kasparov），終結了這項認為人類較為優越的論點。


    深藍算是有點取巧，因為編寫程式的人不僅寫入了西洋棋的基本規則，還加入詳細的棋局策略。但到了新一代的AI，比起由人來教，反而更喜歡讓機器自己學。2015年2月，由Google
    DeepMind人工智慧公司所開發的一個程式，就自己學會了如何去玩四十九種經典的Atari遊戲。開發者之一的哈薩比斯（Demis Hassabis）博士解釋道：「我們唯一提供給系統的資訊，就是螢幕上的原始像素，而且指示系統要努力得到高分。剩下的一切都是它自己解出來的。」


    這套程式也成功找出所有遊戲的規則，從小精靈（Pac-Man）、'
  - '[PAGE 366]


    小蜜蜂（Space Invaders）到各種賽車和網球遊戲。而且接著，這套程式得到的分數多半都能打平、甚至超越人類，有時候還會使出人類玩家從未想到的策略。^{13}


    不久之後，AI得到了更驚人的成就：谷歌的AlphaGo軟體，自學圍棋這種古老的中國策略遊戲，而圍棋的複雜度遠超過西洋棋，一般認為這並不在AI程式能夠處理的範圍。


    2016年3月，AlphaGo和韓國棋王李世乭，在首爾舉行一場比賽，AlphaGo靠著出奇的下法、創新的策略，以4比1擊敗李世乭，令各方專家跌破眼鏡。賽前，大多數專業棋手都肯定李世乭能贏得比賽；等到賽後分析AlphaGo的棋路，多數人的結論則是圍棋爭霸已經就此結束，人類不再有希望能打敗AlphaGo或其後代發明。


    # 魔球效應擴散


    近來，電腦演算法也證明了自己在球類競賽中的價值。幾十年來，棒球隊挑選球員靠的是專業球探和經理的智慧、經驗和直覺。頂尖球員的身價直上數百萬美元，自然財力雄厚的球隊就能搶下一流選手，而經濟拮据的球隊只能用二線選手湊合湊合。


    2002年，銀彈有限的奧克蘭運動家隊總經理賓恩（Billy Beane）決定要打敗這個系統。他決定靠著由經濟學家和電腦怪才所開發的一套神祕電腦演算法，找出人類球探忽視或低估的球員，打造一支能贏球的隊伍。


    在守舊派看來，賓恩的演算法根本是玷汙棒球的神聖殿堂，令他們大感憤怒。他們堅決認為球員的選擇是一門藝術，只有長期親近棒球、相關經驗豐富的人類，才有可能掌握。至於電腦程式，因'
  - '[PAGE 367]


    為它永遠無法懂得其中的奧祕和棒球的精神，永遠都不可能學會這

    一套。


    但沒多久，這些人就只能滿地撿眼鏡碎片。賓恩用演算法打造的這支低成本球隊（四千四百萬美元），不僅能與紐約洋基隊（一億二千五百萬美元）這種傳統棒球強隊平分秋色，甚至還成為美聯史上第一支二十連勝的隊伍。


    只不過，賓恩和運動家隊沒能得意太久。很快的，其他球隊也跟進使用同樣的演算法策略，而且由於洋基和紅襪不管在球員或電腦軟體上能砸的錢都遠遠勝出，現在像奧克蘭運動家隊這種低預算球隊，要打敗整個體制的機會反而又更小了。14


