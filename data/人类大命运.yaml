    # 人文主義的政治觀點


    我們的感覺不只能提供私人生活中的意義，也能為社會和政治程序提供意義。想知道該由誰來統治國家、採用何種外交政策、使用何種經濟手段時，我們不會從古籍經典裡找答案，也不會只聽教宗或諾貝爾獎得主的命令。相反的，大多數國家都是用民主選舉，詢問人民對當前事務的看法。我們相信選民能做出最好的選擇，而個人的自由意志選擇，正是最終的政治權威。


    然而，選民又是怎麼知道該選什麼？至少在理論上，選民要探索自己內心最深處的感受、順心而為。但這並不容易。想要碰觸到自己真正的感受，就得先過濾掉那些沒有意義的宣傳口號、無恥政客無盡的謊言、狡猾公關放出的各種煙霧彈，以及被收買的專家提出貌似專業的想法。先清掉所有這些喧囂吵雜，才能聽到自己真正內心的聲音。接著，我真正內心的聲音會在我耳裡輕聲說「投給卡麥隆」、「投給莫迪」、或是「投給希拉蕊」，於是我就在選票上蓋下印記——這就是我們決定該由誰來領導國家的方式。


    在中世紀，大家會覺得這種方法實在愚不可及。對於重要的政治決定，怎麼可能會以無知俗人一時的感覺，做為判斷基礎呢？當英格蘭在玫瑰戰爭之後面臨分裂時，從來沒人提過要用全國公投來解決。哪有可能讓每個鄉巴佬或妓女都能有一票，選擇要蘭開斯特家族、還是約克家族！


