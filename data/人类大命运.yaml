  md: '人類大命運


    馬丁·路德愈想愈覺得不對，也連帶質疑起提供這套交易契約的教會。救贖怎麼可能是付錢了事？教皇又怎麼可能有權寬恕人們的罪、打開天堂的大門？


    於是路德根據新教傳統，在1517年10月31日，帶著一份長長的文件、一把槌子和幾根釘子，走到威登堡（Wittenberg）諸聖堂的大門。文件總共列出九十五條論點，反對當代宗教作為，其中就包括反對販售贖罪券。路德把文件釘上教堂大門，點燃宗教改革，呼籲所有關心救贖的基督徒起身反抗教皇權威，找出其他前往天堂的道路。


    從歷史的觀點來看，靈性之旅總是悲劇一場，因為這是一條孤獨的道路，只適合個人、不適合整個社會。人類要合作，就不能只有大哉問，而需要堅定的答案。推倒某些荒謬的宗教制度，也往往在其他地方又促成了新的宗教制度。這種事情曾發生在二元論者身上，他們的靈性之旅最終也變成了宗教體制。這種事情也發生在馬丁·路德身上，他挑戰了天主教會的法則、制度和儀式後，卻發現自己也正在寫下新的法則、建立新的制度、發明新的儀式。甚至連佛陀和耶穌也未能倖免。在堅持追求真理的路上，他們顛覆了傳統印度教和猶太教的法則、儀式和制度。但到頭來，以他們之名建立的法則、儀式和制度，數量卻是史上最多，無人能出其右。


    # 科學和宗教誓不兩立？


    現在我們已經更瞭解宗教的概念，可以回頭檢視宗教和科學之間的關係。對於這種關係，有兩種極端的觀點。第一種觀點認為科學和宗教誓不兩立，而現代史就是科學知識與宗教迷信的鬥爭史。


