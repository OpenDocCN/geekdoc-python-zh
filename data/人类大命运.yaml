    # 我聞到恐懼的氣味 ❖


    如果醫師、工程師和顧客一心想的就是治癒精神疾病、盡情享受WEIRD社會的生活，光是研究次於規範的心理狀態及WEIRD的心靈，或許已足以滿足我們的需求。雖然常有人批評規範心理學一看到偏離規範就認為是問題，但在上個世紀，這讓無數病人得到安慰，也讓數百萬人生活順利、精神正常。


    但到了第三個千禧年的開端，我們面臨的完全是另一種挑戰：自由人文主義被科技人文主義取代，而醫學也愈來愈著重於讓健康的人升級，而非治癒病人。醫師、工程師和顧客現在並不以解決精神問題為滿足，而是要讓整個心靈升級。我們的科技能力正逐漸足以打造新的意識狀態，但我們對這塊新領域卻還沒有堪用的地圖。我們熟悉的主要只有WEIRD族規範和次於規範的心理狀態頻譜，所以甚至連該前往哪個方向，都不知道。


