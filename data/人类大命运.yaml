    在埃及人的概念裡，法老不只是神的代理人，而是一位真真正正的神。整個埃及都屬於這位神，所有人都必須服從祂的命令，繳納祂定下的稅。在法老統治下的埃及，就像蘇美神廟的景況，神並不會親自管理祂的商業帝國。雖然有些法老鐵腕統治、有些法老歌舞昇平，但不論哪種情形，實際行政管理還是交給手下幾千名能讀會寫的行政官員來處理。正如任何其他人類，法老還是有著生物的身軀，也就有著生物的需求、欲望和情緒。但那個「生物的法老」根本無足輕重。真正統治尼羅河谷的，是一個想像中的法老，存在於數百萬埃及人口耳相傳的故事之中。


