    如果你在大約西元1600年前往開羅或伊斯坦堡，看到的是擁有多元文化和寬容的大都市，有遜尼派、什葉派、東正教基督徒、天主教徒、亞美尼亞人、科普特人（Copt）、猶太人、甚至偶爾還有印度教徒，足以稱得上是各教派和平共存。雖然仍有意見分歧和爭端騷亂、鄂圖曼帝國也經常出現宗教歧視，但和歐洲相比，這裡仍然是自由主義的天堂。


    如果你接著去了當時的巴黎或倫敦，看到的會是城裡充滿宗教極端主義，只有主流教派得以生存。在倫敦是天主教徒殞命，在巴黎是新教徒喪生，猶太人早遭驅逐，穆斯林更是想都別想進城。然而，科學革命卻是始於倫敦和巴黎，而非開羅或伊斯坦堡。


    講到現代性（modernity）的歷史，一般習慣將它講成是一場科學與宗教之爭。理論上，科學和宗教都是為了追求真理；而因為各自推崇不同的真理，也就注定有所衝突。但事實上，科學或宗教根本都沒那麼在乎真理，因此兩者十分容易妥協、共存，甚至合作。


    宗教最在乎的，其實是秩序。宗教的目的就是創造和維持社會結構。科學最在乎的，則是力量。科學的目的是透過研究，得到力量，以治療疾病、征討作戰、生產食物。個人而言，科學家和神職人員可能很在意真理；但整體而言，科學和宗教對真理的喜好，還不及於力量和秩序。因此，兩者一拍即合。對於真理毫不妥協的追求，其實是一種靈性之旅，宗教或科學機構之內很少得見。


    所以，對於現代歷史更準確的一種看法，其實是：科學與特定宗教（也就是人文主義）達成協議的過程。現代社會相信人文主義的教條，而科學的用途不是為了質疑這些教條，反而是為了實現。就算在二十一世紀，也不太可能有純粹的科學理論取代人文主義教條，但讓兩者目前攜手同行的契約，可能會瓦解，取而代之的是科'
