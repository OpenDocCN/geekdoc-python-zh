  md: '用於人群與人群之間的衝突。因此,羅馬之所以征服希臘,不是因為羅馬人的腦子比較大、或工具製造技術比較高明,而是因為他們的合作更具效率和效益。縱觀歷史,紀律嚴明的軍隊就是能擊敗散兵游勇,團結的精英就是能凌駕烏合之眾。例如在1914年,為數僅三百萬的俄羅斯貴族、官員和商人,就能作威作福,控制超過一億八千萬個農民和工人。俄羅斯精英熟知如何合作守衛其共同利益,但那一億八千萬平民卻無法有效動員。事實上,那些精英有一大部分的努力重點,正是要確保這一億八千萬底層民眾無法學會合作。


    想掀起一場革命,光靠人數,絕對遠遠不夠。革命靠的通常是一小群人集成的網路,而不是一大群人的動作。如果你想發動一場革命,不要問「有多少人會支持我的想法?」而是要問「我有多少支持者能夠有效合作?」俄國1917年爆發十月革命,引爆點並不是一億八千萬農民起身反抗沙皇,而是一小群共產主義信徒在對的時間,站到了對的位置。當時俄國中上階級人數至少有三百萬,但共產主義信徒僅有兩萬三千名。$^{20}$然而,共產主義信徒組織嚴密,依舊奪下了俄羅斯帝國。當俄羅斯的權力從沙皇老朽的掌握、與克倫斯基(Kerensky)臨時政府同樣顫抖的指間滑落,共產主義信徒一把接起,緊握住權力的韁繩,一如鬥牛犬對骨頭緊咬不放。


    共產黨徒這一握,一直到1980年代末之前,從未放開。有效的組織讓他們掌權長達八十年,而最後也是因為組織的缺陷,才頹然傾塌。


    1989年12月21日,羅馬尼亞共產獨裁者齊奧塞斯庫(Nicolae Ceaușescu)在首都布加勒斯特市中心,組織了一項大規模的支持者示威活動。在先前幾個月之間,蘇聯已經從東歐共產主義政權收回支援,柏林圍牆已倒下,革命席捲波蘭、東德、匈牙利、保加利亞'
