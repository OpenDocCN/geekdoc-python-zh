- md: '## 峰終法則


    會取事件的高潮和最後結果來編織故事。整個經驗的價值，是將峰值與終點兩者加以平均。舉例來說，敘事自我判斷「短」版冷水實驗時，是將最差的部分（水非常冷）和最後一刻（水還是非常冷）拿來做平均，結論就是「水非常冷」。接著，敘事自我對「長」版冷水實驗也做一樣的判斷，把過程中最差的部分（水非常冷）和最後一刻（水沒那麼冷）拿來做平均，結論就是「水稍微溫暖一點」。這裡的重點之一在於：敘事自我對於時間持續多久無感，並不在意長短兩款實驗的持續時間不同。所以，如果需要在兩者擇一，敘事自我會挑的是長版的實驗，認為「水稍微溫暖一點」。


    每次敘事自我要對我們的經驗下判斷時，並不會在意時間持續多長，只會採用「峰終法則」（peak-end rule），也就是只記得高峰和終點這兩者，再加以平均，做為整個經驗的價值。這法則對於我們所有的日常決定，都產生了深遠的影響。


    1990年代早期，康納曼開始與多倫多大學的瑞德邁爾（Donald Redelmeier）合作，一方面研究了做大腸鏡檢查的病人，另一方面開始研究經驗自我及敘事自我的差別。大腸鏡檢查是通過肛門將小型攝影機插入腸道，以診斷各種腸道疾病。這種檢查並不舒服，而醫師都想知道怎樣才能減輕這道程序的痛苦——是該把動作加快，讓病人長痛不如短痛？還是該把動作放慢、小心一點？


    為了回答這個問題，康納曼和瑞德邁爾請一百五十四位病人在大腸鏡檢查期間，每分鐘一次、報告他們的疼痛程度。報告時使用從0到10的分數，0代表完全無感，10則是痛到無法忍受。等到檢查結束，再請病人同樣使用0到10的分數，報告檢查的「整體疼痛程度」。


    我們可能會以為，整體分數會與每分鐘報告的分數總和相關，也就是如果時間持續愈久、病人承受的疼痛愈多，最後的整體疼痛分數就會愈高。但實際結果卻非如此。


    正如前面的冷水實驗，不管持續時間多長，整體疼痛分數只會反映出峰終法則。因此，有某一次大腸鏡檢查的時間持續八分鐘，過程中病人給出的最高疼痛分數為8分，而最後一分鐘的給分為7分。等到檢查結束，這位病人所給的整體疼痛分數就是7.5分。而在另一次大腸鏡檢查中，時間足足有二十四分鐘。過程中，最高的疼痛分數一樣是8分，但這位病人在最後一分鐘的給分只有1分。到最後，這位病人的整體疼痛分數給分就只有4.5分。事實上，後面這位病人的大腸鏡檢查時間足足是三倍，總和說來受到的痛苦要多得多，但這點完全沒有影響到他的記憶。敘事自我並不是將所有的經驗做總和，而是將峰值和終值做平均。


    所以，病人會喜歡哪一種呢？是為時短暫、但很痛苦的檢查，還是時間長、但動作小心的檢查？這個問題並沒有唯一正解，因為病人至少有兩個不同的自我，各自有不同的喜好。如果問的是經驗自我，它大概會選擇時間短的；但如果問的是敘事自我，它反而寧可挑時間長的，因為它只會記得最糟時刻和最後一刻的平均值。事實上，如果從敘事自我的觀點，醫師最好在檢查最後，安排幾分鐘原本完全不必要的鈍痛（dull
    ache，隱隱作痛），因為這反而會讓整件事的痛苦記憶大減。15


    兒科醫師和獸醫都很懂這個技巧。許多醫師會在診間裡準備零食點心，在打完針或做了什麼痛苦的檢查之後，讓孩子（或小狗）吃點甜。這樣一來，等到敘事自我後來回想這次看診，最後這十秒的快樂，會足以抹去之前許多分鐘的焦慮和疼痛。


    ## 「敘事自我」擁有一把利剪


    至於演化，更是早在兒科醫師之前許久，就發現了這伎倆。許多婦女分娩時，都會經歷難以忍受的痛苦，可能會讓人以為，只要生過一次，沒有哪個心靈正常的女性會願意再來一次。但在分娩後的幾天，荷爾蒙系統會分泌皮質醇和腦內啡，舒緩疼痛、讓人感到安慰，甚至是欣悅。再加上對小嬰兒的愛與日俱增，又得到來自親友、宗教和民族主義的多方讚譽，都會共謀協力，將分娩從創傷轉為正面記憶。


    位於以色列特拉維夫的拉賓醫學中心（Rabin Medical Center）研究顯示，分娩的記憶主要只反映高峰及終點，整體持續過程幾乎沒有任何影響。¹⁶在另一項研究中，請二千四百二十八名瑞典婦女在分娩兩個月後，回憶生產的過程，其中有90%認為這個過程屬於「正面」或「非常正面」。她們並沒有忘記分娩過程中的痛苦（有28.5%認為分娩是世上能想到最痛的事），但仍然認為這是個正面經驗。


    敘事自我有一把鋒利的剪刀、一支黑色的粗麥克筆，一一審查著我們的經驗。至少有某些令人恐懼不悅的時刻，就這樣遭到裁剪抹去，最後整理出一個有歡樂結尾的故事，歸檔存查。¹⁷


    我們日常的大多數關鍵抉擇，像是挑選另一半，挑選職場、住所或度假，都是由敘事自我來決定的。假設現在又有兩套度假行程任君挑選。第一套行程是到維吉尼亞州的詹姆斯鎮（Jamestown），參觀這個歷史悠久的殖民城鎮，這是英國在1607年於北美建立的第一個殖民地。第二套行程則是你自己的夢想假期，可以是阿拉斯加徒步旅行、佛羅里達日光浴，又或是到拉斯維加斯盡享帥哥美女、醇酒毒品、博奕激情。但有一項限制：如果選擇夢想假期，等到最後上飛機回家之前，你得服下一顆藥丸，消除所有對於這次假期的所有回憶。發生在拉斯維加斯的美好回憶，就真的只會留在拉斯維加斯了。


    你想挑哪套行程？大多數人都會選擇殖民地詹姆斯鎮。因為大多數人的信用卡都是交給敘事自我掌管，而敘事自我只在意故事，覺得記不住的體驗是白費力氣。


    說實話，經驗自我和敘事自我並非各自獨立，而是緊密交織。敘事自我也會用到我們的種種經驗，做為重要（但非唯一）的故事素材。反過來，這些故事也會形塑經驗自我的種種感受。例如，在齋戒月禁食、在準備體檢時禁食、又或是單純沒錢買東西吃，對於飢餓的感受就會有差異。敘事自我對飢餓賦予不同意義，就會讓實際的經驗大不相同。


    另一方面，經驗自我往往也強大到足以破壞敘事自我最完美的計畫。舉例來說，我可能在新年下定決心，要控制飲食，每天上健身房。這種偉大的決定是敘事自我的專利。只不過，過了一星期，該上健身房了，經驗自我卻過來接手。我現在就是不想上健身房，反而是訂了披薩，坐在沙發上打開電視。


    然而，大多數人認同的都是自己的敘事自我。我們口中的我，講的是我們腦中的故事，而不是身體持續感覺到的當下體驗。我們認同的是自己的內心，想從生活的各種瘋狂混亂中理出道理，編織出一套看來合理而一致的故事。不管情節是否充滿謊言和漏洞，也不管故事是否因為一再重寫而總是自打嘴巴，一切都不要緊。重要的是，我們總是覺得自己從出生到死亡（甚至死後）都有個單一、不變的身分。就是這種感覺，塑造出大有問題的自由主義信念，誤認為自己不可分割，誤認為內心有個清楚而一致的聲音，而且能為整個宇宙提供意義。18


    ## 在謊言中，建構生命的意義


    波赫士（Jorge Luis Borges）的短篇故事〈一個問題〉，正是以敘事自我做為重點。19故事的主人翁是唐吉訶德，與塞萬提斯（Miguel Cervantes）著名小說的主角同名。唐吉訶德為自己創造了一個想像世界，自己是裡面的傳奇騎士，四處對抗巨人，拯救托波索的杜爾西內亞女士。實際上，唐吉訶德本名叫做阿隆索·吉哈諾，是鄉下位上了年紀的沒落貴族；那位高貴的杜爾西內亞女士，則是附近村子裡的養豬村姑；至於巨人，則是一些風車。波赫士就在想，如果唐吉訶德因為相信這些幻想，攻擊、殺死了一個真正的人，後續會如何？


    波赫士提出了關於人類的一個根本問題：如果敘事自我講出的那套故事，對我們自己或周圍的人造成嚴重傷害，之後會怎樣？波赫士認為，主要有三種可能。


    第一種可能：沒什麼影響。雖然唐吉訶德殺了一個真正的人，卻毫無悔意。因為這些妄想已經太過鮮明，他一心認為自己在對抗風車巨人，根本無法意識到實際殺了人。


    第二種可能：在奪走他人生命的那一刻，會讓唐吉訶德大受驚駭，打破他的妄想。這種情況類似初上戰場的新兵，原本深信為國捐軀是件好事，最後卻被戰場現實狠狠打醒。


    另外還有更為複雜和影響深遠的第三種可能：原本與想像的巨人戰鬥時，唐吉訶德只是在演戲。但等到真的殺了人，他就會開始堅持自己的妄想，因為只有這樣，他不幸犯下的錯誤才會有意義。荒謬的是，我們對一個想像的故事做出的犧牲愈多，就可能愈是堅持，只為了讓我們的一切犧牲和痛苦有意義。


    在政治裡，這稱為「我們的孩子不能白白犧牲」症候群。1915年，義大利加入協約國，於第一次世界大戰正式參戰。義大利宣告的目標是要解放由奧匈帝國「不當」占有的特倫托（Trento）和提里雅斯特（Trieste）這兩處「義大利領土」。義大利政客在國會發表義憤填膺的演說，誓言要補正歷史的錯誤、恢復古羅馬的光榮。數十萬義大利士兵開往前線，高喊「為了特倫托和提里雅斯特！」以為這兩地唾手可得。


    情況大出意料。奧匈帝國的軍隊在伊索佐河（Isonzo River）沿岸組構了強大的防線。義大利總共發動了十一場血淋淋的戰役，最多只攻下幾公里，從未有真正突破。第一場戰役，他們失去了一萬五千人。第二場戰役，他們失去了四萬人。第三場戰役，他們失去了六萬人。就這樣持續了腥風血雨的兩年，直到第十一場戰役。但接著，奧地利人終於反擊了，這第十二場戰役，一般稱為卡波雷托戰役（Battle
    of Caporetto），德奧聯軍大敗義大利，一路殺到威尼斯門口。光榮出征成了一片血海的潰敗。等到戰爭結束，義大利士兵死亡人數達七十萬，傷兵人數超過百萬。20


    輸掉第一場伊索佐河戰役後，義大利政客有兩種選擇。他們本來大可承認自己犯了錯，要求簽署和平條約。奧匈帝國根本和義大利無怨無仇，又正在為了自己的生存，與更強大的俄羅斯打得焦頭爛額，必然樂意講和。


    然而，這些政客怎麼能面對這一萬五千名義大利士兵的父母、妻子和孩子，告訴他們：「對不起，出了一點錯，你家的喬望尼白死了，還有你家的馬克也是，希望你們別太難過。」


    另一種選擇是，這些政客可以說：「喬望尼和馬克是英雄！他們的死，是為了讓提里雅斯特回歸義大利，他們的血不能白流！我們會繼續戰鬥，直到勝利為止！」毫不意外，政客挑了第二個選項。因此他們打了第二場戰役，又失去了四萬人。政客再次決定，最好繼續戰鬥，因為「我們的孩子不能白白犧牲」。


    但我們也不能只怪政客，就連群眾對戰爭也是一路支持。就算到了戰後，義大利未能得到自己要求的所有領土，義大利人民透過民主，選出的就是墨索里尼和他的法西斯夥伴們，這些人的選舉訴求正是要為所有義大利人的犧牲，取得適當的賠償。


    講到要承認一切是白白犧牲，政客要對這些人的父母開口，已經夠難了；愛國的父母要對自己承認，兒子白白犧牲了，這還要更為困難；至於英勇從軍卻受傷、殘廢的人，更是說不出口。失去雙腿的士兵，會寧願告訴自己「我的犧牲，都是為了能讓義大利民族永存的榮光」，而不是「我之所以沒了腿，是因為蠢到相信自私的政客」。活在幻想裡是一個遠遠較為輕鬆的選項，唯有這樣，才能讓一切痛苦有了意義。


    早在幾千年前，神職人員就已經發現了其中的奧妙，許多宗教儀式和誡命都以此為基礎。如果想讓人相信某些假想的實體，像是神、國家，就要讓他們犧牲一些有價值的東西。犧牲叫人愈痛苦，他們就愈會相信犧牲奉獻的對象確實存在。如果有個貧窮的農民，把自己一頭珍貴的牛，都獻給了宙斯，就會開始對宙斯的存在深信不疑，否則要怎麼解釋自己竟然蠢成這樣？這個農民還會再獻出一頭牛、一頭、再一頭，才不用承認以前所有的牛都是白白犧牲。


    出於同樣的原因，如果我為了義大利民族國家的榮光，犧牲了一個孩子，或是為了共產革命失去雙腿，通常就足以讓我成為激進的義大利民族主義者或共產主義者。因為，如果說義大利民族神話或共產主義宣傳都是一片謊言，豈不是要我承認孩子都是白死、或是我的癱瘓完全沒有意義？很少人有勇氣能承認這樣的事情。


    ## 錯到底，就是對的？


    經濟上也會看到同樣的邏輯。1999年，蘇格蘭決定蓋一座新的國會大廈。原本預計施工時間兩年，預算四千萬英鎊。但到頭來，施工時間長達五年，成本高達四億英鎊。每當承包商遇到未預期的困難和費用，就會找上蘇格蘭政府，要求工期展延、增加預算。每次發生這種情況，政府就會對自己說：「我們已經投入幾千萬英鎊，如果現在停手，只能拿到一座蓋到一半的骨架，在人民心中會徹底信用掃地。還是再撥個四千萬英鎊吧。」


    再過幾個月，同樣的事情再次發生，但這時候，建物若還無法完工，壓力也就更大了。再過幾個月，故事繼續重複。就這樣拖下去，直到實際成本足足是原來估計的十倍。


    不是只有政府會陷入這個陷阱。企業集團也常常把幾百萬美金丟進失敗的子公司。至於個人，也常常依戀著不開心的婚姻，或拋不下沒前途的工作。我們的敘事自我寧可在未來繼續痛苦，也不想承認過去的痛苦完全沒有意義。最後，如果我們想把過去的錯誤一筆勾銷，敘事自我就一定得在情節中安排某個轉折，為錯誤注入意義。例如，一個和平主義的退伍軍人，可能告訴自己：「確實，我犯了錯，才沒了雙腿。但因為這個錯，我才看清戰爭是個地獄；從現在開始，我要奉獻我的生命，為和平而戰。因此，我受到的傷還是有些正面意義：讓我學會重視和平。」


    於是我們知道，「自我」也像國家、神祇和金錢一樣，都只是虛構、想像的故事。每個人都有一個複雜的心靈，會丟下我們大部分的經驗，只精挑細選幾樣，再與我們看過的電影、讀過的小說、聽過的演講、做過的白日夢，全部混和在一起，編織出看似一致連貫的故事，告訴我們自己是誰、來自哪裡、又要去哪裡。正是這個故事，告訴我們自己該愛誰、討厭誰、該怎麼對待自己。如果情節有需要，這個故事甚至也可能讓我們犧牲自己的生命。


    每個人的故事都各有文類。有些人活在悲劇之中，有些人上演永無結局的宗教戲劇，有些人的日子過得像是動作片，也有不少人過著喜劇人生。但到頭來，一切都是故事罷了。


    ## 生命科學顛覆了自由主義


    如此說來，生命的意義究竟是什麼？自由主義認為，我們不應期待外界為我們提供現成的意義。每位選民、顧客和觀者，都應該用自己的自由意志來創造意義，而且不只是創造自己生命的意義，更要創造整個宇宙的意義。


    然而，生命科學卻戳破了自由主義的想法，認為所謂的「自由個人」也是個虛構的故事，人只是生化演算法的組合。每時每刻，大腦的生化機制都會創造經驗，但一閃即逝，接著就是更多經驗閃現、消失、閃現、消失，彼此快速相連。這些瞬間的經驗並不會累積、構成什麼永續的本質。在這一片混沌中，敘事自我試著找出秩序，於是編織出一則永無結局的故事，讓每項經驗都能找到自己的位置，也就多少有些長久的意義。只不過，雖然這讓一切合理且誘人，卻仍然只是虛構的故事。中世紀的十字軍相信，是上帝和天堂讓他們的生命有意義；現代自由主義者則認為，是個人的自由選擇讓生活有意義。但不論如何，都一樣是妄想。


    當然，早已有人質疑自由意志和個人的概念。


    早在兩千多年前，印度、中國和希臘的思想家就已經認為個人概念是一種虛妄。然而，除非真正能影響經濟、政治和日常生活，否則光是質疑，並不足以改變歷史。


    人類很能應付認知上的矛盾，能允許自己在實驗室裡信一套，到了法庭或國會，又信完全不同的一套。就像基督教並未在達爾文發表《物種原始論》的那天消失，自由主義也不會因為科學家的結論是「並沒有自由的個人」，便就此滅亡。


    事實上，就連英國生物學家道金斯（Richard Dawkins，《自私的基因》的作者）、美國實驗心理學家平克（Steven Pinker，《語言本能》的作者）和其他新科學世界觀的擁護者，也並未放棄自由主義。就算他們已經用豐富的學理、數百頁的篇幅，解構了所謂自我及自由意志的概念，卻接著像是做了一個智識上的完美後空翻，奇蹟似的一躍回到十八世紀，好像演化生物學和大腦科學所有驚人的發現，完全不會影響洛克、盧梭和傑佛遜所提出的倫理及政治觀念。


    然而，等到這些異端科學見解逐漸成為每天使用的科技、日常活動和經濟結構，也就不可能再這樣兩面討好了。我們（或後代）很有可能會需要一套全新的宗教信仰和政治制度。在這第三個千禧年的初端，自由主義受到的威脅不再是來自「沒有自由的個人」這種哲學問題，而是來自扎扎實實的科技挑戰。我們即將擁有各種極實用的設備、工具和制度，但這些設備、工具和制度並不允許個人自由意志的存在。


    民主、自由市場和人權這些概念，是否真能在這場洪水中存活下來？


    # 第8章 實驗室裡的定時炸彈


    # 第9章 自由主義大崩解


    上一章簡單回顧了近來的科學發現對自由主義哲學有何傷害，現在則該來檢視這些發現對實際生活有何影響。自由主義推崇自由市場和民主選舉，是因為自由主義相信每個人都獨一無二、各有價值，而且這些人的自由選擇就是權威的本源。但是在二十一世紀，有三項關於「實用」的發展，可能會讓這種信念成為明日黃花：


    - 一、人類將會失去在經濟和軍事上的用途，因此政經體系將不再繼續認同人類有太多價值。

    - 二、政經體系仍然認為人類整體有其價值，但個人則無價值。

    - 三、政經體系仍然會認為某些獨特的個人有其價值，但這些人會是一群超人類的精英階級，而不是一般大眾。


    讓我們仔細檢視這三項威脅。第一，科技發展將使人類不再具備經濟和軍事上的用途：這點雖然不會從哲學上推翻自由主義，但在實際生活中，卻很難想像民主制度、自由市場和其他自由主義制度如何能承受這記打擊。畢竟，自由主義之所以能成為意識型態的主流，並不只是因為它的哲學論證最合理，而是因為它將價值歸功給每個人，這點在政治、經濟和軍事上大有好處。在現代工業戰爭的大規模戰場上、現代工業經濟的大規模生產線上，每個人都很重要。只要能持起步槍、或是拉下拉桿，每雙手都有價值。


    1793年春天，歐洲各王朝派出軍隊，希望趁法國大革命尚未茁壯時，趁早扼殺革命的根苗。巴黎革命份子的反應，則是宣布全國動員，發動第一波全面戰爭。8月23日，法國國民公會（National
    Convention）下令，「自此刻起、至敵人被逐出共和國土地前，永久徵用所有法國人從軍。年輕男性應戰鬥；已婚男性應鑄造武器、運輸補給；女性應製作帳篷及衣物，並至醫院服務；孩童應將舊軟麻料製為麻布；長者應前往公共廣場，喚起戰士的勇氣、表達對王室體制的憎惡、並宣揚共和國的統一。」¹


    法國大革命最著名的文件〈人權與公民權利宣言〉，認定所有公民擁有同等價值、享有平等的政治權利；但與國民公會所下的命令兩相對照，足堪玩味。在這歷史上的同一時刻，一方面宣告普世人權，一方面下令不分男女老幼全國動員，難道真是巧合？雖然學者對於兩者究竟有何確切關係，還多有爭辯，但在接下來的兩個世紀中，一種維護民主的常見論點認為：讓公民擁有政治權利是一件好事，因為民主國家的士兵和工人，表現會比在獨裁政權體制下，來得更好。據稱，讓人民享有政治權利，就能提升動機和進取心，而這在戰場上和工廠裡都大有益處。


    哈佛大學自1869年至1909年的校長艾略特（Charles W. Eliot）曾在1917年8月5日於《紐約時報》寫道：「民主軍隊的戰力高於用貴族方式組織、獨裁方式統治的軍隊」，以及「由民眾決定立'
  mdcn: '## 峰終法則


    會取事件的高潮和最後結果來編織故事。整個經驗的價值，是將峰值與終點兩者加以平均。舉例來說，敘事自我判斷「短」版冷水實驗時，是將最差的部分（水非常冷）和最後一刻（水還是非常冷）拿來做平均，結論就是「水非常冷」。接著，敘事自我對「長」版冷水實驗也做一樣的判斷，把過程中最差的部分（水非常冷）和最後一刻（水沒那麼冷）拿來做平均，結論就是「水稍微溫暖一點」。這裡的重點之一在於：敘事自我對於時間持續多久無感，並不在意長短兩款實驗的持續時間不同。所以，如果需要在兩者擇一，敘事自我會挑的是長版的實驗，認為「水稍微溫暖一點」。


    每次敘事自我要對我們的經驗下判斷時，並不會在意時間持續多長，只會採用「峰終法則」（peak-end rule），也就是只記得高峰和終點這兩者，再加以平均，做為整個經驗的價值。這法則對於我們所有的日常決定，都產生了深遠的影響。


    1990年代早期，康納曼開始與多倫多大學的瑞德邁爾（Donald Redelmeier）合作，一方面研究了做大腸鏡檢查的病人，另一方面開始研究經驗自我及敘事自我的差別。大腸鏡檢查是通過肛門將小型攝影機插入腸道，以診斷各種腸道疾病。這種檢查並不舒服，而醫師都想知道怎樣才能減輕這道程序的痛苦——是該把動作加快，讓病人長痛不如短痛？還是該把動作放慢、小心一點？


    為了回答這個問題，康納曼和瑞德邁爾請一百五十四位病人在大腸鏡檢查期間，每分鐘一次、報告他們的疼痛程度。報告時使用從0到10的分數，0代表完全無感，10則是痛到無法忍受。等到檢查結束，再請病人同樣使用0到10的分數，報告檢查的「整體疼痛程度」。


    我們可能會以為，整體分數會與每分鐘報告的分數總和相關，也就是如果時間持續愈久、病人承受的疼痛愈多，最後的整體疼痛分數就會愈高。但實際結果卻非如此。


    正如前面的冷水實驗，不管持續時間多長，整體疼痛分數只會反映出峰終法則。因此，有某一次大腸鏡檢查的時間持續八分鐘，過程中病人給出的最高疼痛分數為8分，而最後一分鐘的給分為7分。等到檢查結束，這位病人所給的整體疼痛分數就是7.5分。而在另一次大腸鏡檢查中，時間足足有二十四分鐘。過程中，最高的疼痛分數一樣是8分，但這位病人在最後一分鐘的給分只有1分。到最後，這位病人的整體疼痛分數給分就只有4.5分。事實上，後面這位病人的大腸鏡檢查時間足足是三倍，總和說來受到的痛苦要多得多，但這點完全沒有影響到他的記憶。敘事自我並不是將所有的經驗做總和，而是將峰值和終值做平均。


    所以，病人會喜歡哪一種呢？是為時短暫、但很痛苦的檢查，還是時間長、但動作小心的檢查？這個問題並沒有唯一正解，因為病人至少有兩個不同的自我，各自有不同的喜好。如果問的是經驗自我，它大概會選擇時間短的；但如果問的是敘事自我，它反而寧可挑時間長的，因為它只會記得最糟時刻和最後一刻的平均值。事實上，如果從敘事自我的觀點，醫師最好在檢查最後，安排幾分鐘原本完全不必要的鈍痛（dull
    ache，隱隱作痛），因為這反而會讓整件事的痛苦記憶大減。15


    兒科醫師和獸醫都很懂這個技巧。許多醫師會在診間裡準備零食點心，在打完針或做了什麼痛苦的檢查之後，讓孩子（或小狗）吃點甜。這樣一來，等到敘事自我後來回想這次看診，最後這十秒的快樂，會足以抹去之前許多分鐘的焦慮和疼痛。


    ## 「敘事自我」擁有一把利剪


    至於演化，更是早在兒科醫師之前許久，就發現了這伎倆。許多婦女分娩時，都會經歷難以忍受的痛苦，可能會讓人以為，只要生過一次，沒有哪個心靈正常的女性會願意再來一次。但在分娩後的幾天，荷爾蒙系統會分泌皮質醇和腦內啡，舒緩疼痛、讓人感到安慰，甚至是欣悅。再加上對小嬰兒的愛與日俱增，又得到來自親友、宗教和民族主義的多方讚譽，都會共謀協力，將分娩從創傷轉為正面記憶。


    位於以色列特拉維夫的拉賓醫學中心（Rabin Medical Center）研究顯示，分娩的記憶主要只反映高峰及終點，整體持續過程幾乎沒有任何影響。¹⁶在另一項研究中，請二千四百二十八名瑞典婦女在分娩兩個月後，回憶生產的過程，其中有90%認為這個過程屬於「正面」或「非常正面」。她們並沒有忘記分娩過程中的痛苦（有28.5%認為分娩是世上能想到最痛的事），但仍然認為這是個正面經驗。


    敘事自我有一把鋒利的剪刀、一支黑色的粗麥克筆，一一審查著我們的經驗。至少有某些令人恐懼不悅的時刻，就這樣遭到裁剪抹去，最後整理出一個有歡樂結尾的故事，歸檔存查。¹⁷


    我們日常的大多數關鍵抉擇，像是挑選另一半，挑選職場、住所或度假，都是由敘事自我來決定的。假設現在又有兩套度假行程任君挑選。第一套行程是到維吉尼亞州的詹姆斯鎮（Jamestown），參觀這個歷史悠久的殖民城鎮，這是英國在1607年於北美建立的第一個殖民地。第二套行程則是你自己的夢想假期，可以是阿拉斯加徒步旅行、佛羅里達日光浴，又或是到拉斯維加斯盡享帥哥美女、醇酒毒品、博奕激情。但有一項限制：如果選擇夢想假期，等到最後上飛機回家之前，你得服下一顆藥丸，消除所有對於這次假期的所有回憶。發生在拉斯維加斯的美好回憶，就真的只會留在拉斯維加斯了。


    你想挑哪套行程？大多數人都會選擇殖民地詹姆斯鎮。因為大多數人的信用卡都是交給敘事自我掌管，而敘事自我只在意故事，覺得記不住的體驗是白費力氣。


    說實話，經驗自我和敘事自我並非各自獨立，而是緊密交織。敘事自我也會用到我們的種種經驗，做為重要（但非唯一）的故事素材。反過來，這些故事也會形塑經驗自我的種種感受。例如，在齋戒月禁食、在準備體檢時禁食、又或是單純沒錢買東西吃，對於飢餓的感受就會有差異。敘事自我對飢餓賦予不同意義，就會讓實際的經驗大不相同。


    另一方面，經驗自我往往也強大到足以破壞敘事自我最完美的計畫。舉例來說，我可能在新年下定決心，要控制飲食，每天上健身房。這種偉大的決定是敘事自我的專利。只不過，過了一星期，該上健身房了，經驗自我卻過來接手。我現在就是不想上健身房，反而是訂了披薩，坐在沙發上打開電視。


    然而，大多數人認同的都是自己的敘事自我。我們口中的我，講的是我們腦中的故事，而不是身體持續感覺到的當下體驗。我們認同的是自己的內心，想從生活的各種瘋狂混亂中理出道理，編織出一套看來合理而一致的故事。不管情節是否充滿謊言和漏洞，也不管故事是否因為一再重寫而總是自打嘴巴，一切都不要緊。重要的是，我們總是覺得自己從出生到死亡（甚至死後）都有個單一、不變的身分。就是這種感覺，塑造出大有問題的自由主義信念，誤認為自己不可分割，誤認為內心有個清楚而一致的聲音，而且能為整個宇宙提供意義。18


    ## 在謊言中，建構生命的意義


    波赫士（Jorge Luis Borges）的短篇故事〈一個問題〉，正是以敘事自我做為重點。19故事的主人翁是唐吉訶德，與塞萬提斯（Miguel Cervantes）著名小說的主角同名。唐吉訶德為自己創造了一個想像世界，自己是裡面的傳奇騎士，四處對抗巨人，拯救托波索的杜爾西內亞女士。實際上，唐吉訶德本名叫做阿隆索·吉哈諾，是鄉下位上了年紀的沒落貴族；那位高貴的杜爾西內亞女士，則是附近村子裡的養豬村姑；至於巨人，則是一些風車。波赫士就在想，如果唐吉訶德因為相信這些幻想，攻擊、殺死了一個真正的人，後續會如何？


    波赫士提出了關於人類的一個根本問題：如果敘事自我講出的那套故事，對我們自己或周圍的人造成嚴重傷害，之後會怎樣？波赫士認為，主要有三種可能。


    第一種可能：沒什麼影響。雖然唐吉訶德殺了一個真正的人，卻毫無悔意。因為這些妄想已經太過鮮明，他一心認為自己在對抗風車巨人，根本無法意識到實際殺了人。


    第二種可能：在奪走他人生命的那一刻，會讓唐吉訶德大受驚駭，打破他的妄想。這種情況類似初上戰場的新兵，原本深信為國捐軀是件好事，最後卻被戰場現實狠狠打醒。


    另外還有更為複雜和影響深遠的第三種可能：原本與想像的巨人戰鬥時，唐吉訶德只是在演戲。但等到真的殺了人，他就會開始堅持自己的妄想，因為只有這樣，他不幸犯下的錯誤才會有意義。荒謬的是，我們對一個想像的故事做出的犧牲愈多，就可能愈是堅持，只為了讓我們的一切犧牲和痛苦有意義。


    在政治裡，這稱為「我們的孩子不能白白犧牲」症候群。1915年，義大利加入協約國，於第一次世界大戰正式參戰。義大利宣告的目標是要解放由奧匈帝國「不當」占有的特倫托（Trento）和提里雅斯特（Trieste）這兩處「義大利領土」。義大利政客在國會發表義憤填膺的演說，誓言要補正歷史的錯誤、恢復古羅馬的光榮。數十萬義大利士兵開往前線，高喊「為了特倫托和提里雅斯特！」以為這兩地唾手可得。


    情況大出意料。奧匈帝國的軍隊在伊索佐河（Isonzo River）沿岸組構了強大的防線。義大利總共發動了十一場血淋淋的戰役，最多只攻下幾公里，從未有真正突破。第一場戰役，他們失去了一萬五千人。第二場戰役，他們失去了四萬人。第三場戰役，他們失去了六萬人。就這樣持續了腥風血雨的兩年，直到第十一場戰役。但接著，奧地利人終於反擊了，這第十二場戰役，一般稱為卡波雷托戰役（Battle
    of Caporetto），德奧聯軍大敗義大利，一路殺到威尼斯門口。光榮出征成了一片血海的潰敗。等到戰爭結束，義大利士兵死亡人數達七十萬，傷兵人數超過百萬。20


    輸掉第一場伊索佐河戰役後，義大利政客有兩種選擇。他們本來大可承認自己犯了錯，要求簽署和平條約。奧匈帝國根本和義大利無怨無仇，又正在為了自己的生存，與更強大的俄羅斯打得焦頭爛額，必然樂意講和。


    然而，這些政客怎麼能面對這一萬五千名義大利士兵的父母、妻子和孩子，告訴他們：「對不起，出了一點錯，你家的喬望尼白死了，還有你家的馬克也是，希望你們別太難過。」


    另一種選擇是，這些政客可以說：「喬望尼和馬克是英雄！他們的死，是為了讓提里雅斯特回歸義大利，他們的血不能白流！我們會繼續戰鬥，直到勝利為止！」毫不意外，政客挑了第二個選項。因此他們打了第二場戰役，又失去了四萬人。政客再次決定，最好繼續戰鬥，因為「我們的孩子不能白白犧牲」。


    但我們也不能只怪政客，就連群眾對戰爭也是一路支持。就算到了戰後，義大利未能得到自己要求的所有領土，義大利人民透過民主，選出的就是墨索里尼和他的法西斯夥伴們，這些人的選舉訴求正是要為所有義大利人的犧牲，取得適當的賠償。


    講到要承認一切是白白犧牲，政客要對這些人的父母開口，已經夠難了；愛國的父母要對自己承認，兒子白白犧牲了，這還要更為困難；至於英勇從軍卻受傷、殘廢的人，更是說不出口。失去雙腿的士兵，會寧願告訴自己「我的犧牲，都是為了能讓義大利民族永存的榮光」，而不是「我之所以沒了腿，是因為蠢到相信自私的政客」。活在幻想裡是一個遠遠較為輕鬆的選項，唯有這樣，才能讓一切痛苦有了意義。


    早在幾千年前，神職人員就已經發現了其中的奧妙，許多宗教儀式和誡命都以此為基礎。如果想讓人相信某些假想的實體，像是神、國家，就要讓他們犧牲一些有價值的東西。犧牲叫人愈痛苦，他們就愈會相信犧牲奉獻的對象確實存在。如果有個貧窮的農民，把自己一頭珍貴的牛，都獻給了宙斯，就會開始對宙斯的存在深信不疑，否則要怎麼解釋自己竟然蠢成這樣？這個農民還會再獻出一頭牛、一頭、再一頭，才不用承認以前所有的牛都是白白犧牲。


    出於同樣的原因，如果我為了義大利民族國家的榮光，犧牲了一個孩子，或是為了共產革命失去雙腿，通常就足以讓我成為激進的義大利民族主義者或共產主義者。因為，如果說義大利民族神話或共產主義宣傳都是一片謊言，豈不是要我承認孩子都是白死、或是我的癱瘓完全沒有意義？很少人有勇氣能承認這樣的事情。


    ## 錯到底，就是對的？


    經濟上也會看到同樣的邏輯。1999年，蘇格蘭決定蓋一座新的國會大廈。原本預計施工時間兩年，預算四千萬英鎊。但到頭來，施工時間長達五年，成本高達四億英鎊。每當承包商遇到未預期的困難和費用，就會找上蘇格蘭政府，要求工期展延、增加預算。每次發生這種情況，政府就會對自己說：「我們已經投入幾千萬英鎊，如果現在停手，只能拿到一座蓋到一半的骨架，在人民心中會徹底信用掃地。還是再撥個四千萬英鎊吧。」


    再過幾個月，同樣的事情再次發生，但這時候，建物若還無法完工，壓力也就更大了。再過幾個月，故事繼續重複。就這樣拖下去，直到實際成本足足是原來估計的十倍。


    不是只有政府會陷入這個陷阱。企業集團也常常把幾百萬美金丟進失敗的子公司。至於個人，也常常依戀著不開心的婚姻，或拋不下沒前途的工作。我們的敘事自我寧可在未來繼續痛苦，也不想承認過去的痛苦完全沒有意義。最後，如果我們想把過去的錯誤一筆勾銷，敘事自我就一定得在情節中安排某個轉折，為錯誤注入意義。例如，一個和平主義的退伍軍人，可能告訴自己：「確實，我犯了錯，才沒了雙腿。但因為這個錯，我才看清戰爭是個地獄；從現在開始，我要奉獻我的生命，為和平而戰。因此，我受到的傷還是有些正面意義：讓我學會重視和平。」


    於是我們知道，「自我」也像國家、神祇和金錢一樣，都只是虛構、想像的故事。每個人都有一個複雜的心靈，會丟下我們大部分的經驗，只精挑細選幾樣，再與我們看過的電影、讀過的小說、聽過的演講、做過的白日夢，全部混和在一起，編織出看似一致連貫的故事，告訴我們自己是誰、來自哪裡、又要去哪裡。正是這個故事，告訴我們自己該愛誰、討厭誰、該怎麼對待自己。如果情節有需要，這個故事甚至也可能讓我們犧牲自己的生命。


    每個人的故事都各有文類。有些人活在悲劇之中，有些人上演永無結局的宗教戲劇，有些人的日子過得像是動作片，也有不少人過著喜劇人生。但到頭來，一切都是故事罷了。


    ## 生命科學顛覆了自由主義


    如此說來，生命的意義究竟是什麼？自由主義認為，我們不應期待外界為我們提供現成的意義。每位選民、顧客和觀者，都應該用自己的自由意志來創造意義，而且不只是創造自己生命的意義，更要創造整個宇宙的意義。


    然而，生命科學卻戳破了自由主義的想法，認為所謂的「自由個人」也是個虛構的故事，人只是生化演算法的組合。每時每刻，大腦的生化機制都會創造經驗，但一閃即逝，接著就是更多經驗閃現、消失、閃現、消失，彼此快速相連。這些瞬間的經驗並不會累積、構成什麼永續的本質。在這一片混沌中，敘事自我試著找出秩序，於是編織出一則永無結局的故事，讓每項經驗都能找到自己的位置，也就多少有些長久的意義。只不過，雖然這讓一切合理且誘人，卻仍然只是虛構的故事。中世紀的十字軍相信，是上帝和天堂讓他們的生命有意義；現代自由主義者則認為，是個人的自由選擇讓生活有意義。但不論如何，都一樣是妄想。


    當然，早已有人質疑自由意志和個人的概念。


    早在兩千多年前，印度、中國和希臘的思想家就已經認為個人概念是一種虛妄。然而，除非真正能影響經濟、政治和日常生活，否則光是質疑，並不足以改變歷史。


    人類很能應付認知上的矛盾，能允許自己在實驗室裡信一套，到了法庭或國會，又信完全不同的一套。就像基督教並未在達爾文發表《物種原始論》的那天消失，自由主義也不會因為科學家的結論是「並沒有自由的個人」，便就此滅亡。


    事實上，就連英國生物學家道金斯（Richard Dawkins，《自私的基因》的作者）、美國實驗心理學家平克（Steven Pinker，《語言本能》的作者）和其他新科學世界觀的擁護者，也並未放棄自由主義。就算他們已經用豐富的學理、數百頁的篇幅，解構了所謂自我及自由意志的概念，卻接著像是做了一個智識上的完美後空翻，奇蹟似的一躍回到十八世紀，好像演化生物學和大腦科學所有驚人的發現，完全不會影響洛克、盧梭和傑佛遜所提出的倫理及政治觀念。


    然而，等到這些異端科學見解逐漸成為每天使用的科技、日常活動和經濟結構，也就不可能再這樣兩面討好了。我們（或後代）很有可能會需要一套全新的宗教信仰和政治制度。在這第三個千禧年的初端，自由主義受到的威脅不再是來自「沒有自由的個人」這種哲學問題，而是來自扎扎實實的科技挑戰。我們即將擁有各種極實用的設備、工具和制度，但這些設備、工具和制度並不允許個人自由意志的存在。


    民主、自由市場和人權這些概念，是否真能在這場洪水中存活下來？


    # 第8章 實驗室裡的定時炸彈


    # 第9章 自由主義大崩解


    上一章簡單回顧了近來的科學發現對自由主義哲學有何傷害，現在則該來檢視這些發現對實際生活有何影響。自由主義推崇自由市場和民主選舉，是因為自由主義相信每個人都獨一無二、各有價值，而且這些人的自由選擇就是權威的本源。但是在二十一世紀，有三項關於「實用」的發展，可能會讓這種信念成為明日黃花：


    - 一、人類將會失去在經濟和軍事上的用途，因此政經體系將不再繼續認同人類有太多價值。

    - 二、政經體系仍然認為人類整體有其價值，但個人則無價值。

    - 三、政經體系仍然會認為某些獨特的個人有其價值，但這些人會是一群超人類的精英階級，而不是一般大眾。


    讓我們仔細檢視這三項威脅。第一，科技發展將使人類不再具備經濟和軍事上的用途：這點雖然不會從哲學上推翻自由主義，但在實際生活中，卻很難想像民主制度、自由市場和其他自由主義制度如何能承受這記打擊。畢竟，自由主義之所以能成為意識型態的主流，並不只是因為它的哲學論證最合理，而是因為它將價值歸功給每個人，這點在政治、經濟和軍事上大有好處。在現代工業戰爭的大規模戰場上、現代工業經濟的大規模生產線上，每個人都很重要。只要能持起步槍、或是拉下拉桿，每雙手都有價值。


    1793年春天，歐洲各王朝派出軍隊，希望趁法國大革命尚未茁壯時，趁早扼殺革命的根苗。巴黎革命份子的反應，則是宣布全國動員，發動第一波全面戰爭。8月23日，法國國民公會（National
