  md: '一旦互有扞格，可能導致全面的歐洲大戰，於是各方在1884年共聚柏林，在紙上瓜分非洲，彷彿非洲就只是一塊大餅。當時，歐洲人對非洲內陸的絕大部分景況仍然一無所知。英、法、德已經擁有非洲沿海地區的精確地圖，也清楚知道尼日河、剛果河和尚比西河是在哪裡入海。但他們幾乎不知道這些河流上游內陸的狀況，不知道河流沿岸的王國和部落，也不知道當地的宗教、歷史和地理。這些事情，歐洲外交官根本不放在心上。他們只是在柏林一張光亮的會議桌上，攤開一幅還有一半空白的非洲地圖，在這裡和那裡畫了幾條線，就私相授受了整個非洲大陸。


    等到歐洲人拿著先前早已商議定案的地圖，兵馬終於打進非洲內陸，才發現在柏林畫的許多邊界，根本難以適用於非洲的地理、經濟和種族現實。但為了避免產生新的衝突，這些侵略者仍然堅持原協議，於是這些想像出來的線條，就落實成了歐洲殖民地的實際邊界。在二十世紀下半葉，歐洲帝國瓦解、殖民地紛紛獨立，但新成立的國家擔心重訂邊界會帶來無止境的戰爭和衝突，因此邊界仍未改變。現今非洲國家面臨的許多困難，都是由於這些邊界毫無道理。歐洲官僚筆下的幻想遇到非洲的現實，卻是現實被迫投降。⁵


