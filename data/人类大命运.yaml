- md: '10. 亞述國王亞述巴尼拔（Ashurbanipal）殺獅：掌控動物界。


    # 第一部

    # 智人征服世界


    # 人類和其他動物有何不同？

    人類如何征服世界？

    智人究竟是比較高等的生命形式，

    或只是霸凌其他物種的地痞流氓？


    # 第2章

    # 人類世


    和其他動物相比，人類早已經化身為神。我們在這點並不喜歡著墨太多，因為我們實在不是特別公正或仁慈的神。如果看「國家地理頻道」、迪士尼電影或是童話書，可能還以為地球上主要住的是獅子、狼和老虎，而且和人類勢均力敵。畢竟，獅子王辛巴能號令森林裡的動物；小紅帽得躲避大野狼；森林王子毛克利則要勇敢對抗老虎謝爾汗。但在現實世界裡，動物早已不在那兒了。我們的電視、書籍、幻想、噩夢裡，仍然有各種野生動物，但是地球上的辛巴、大野狼和謝爾汗正在絕跡。現在世界上的動物主要都是人類和他們的家畜。


    寫出小紅帽和大野狼的格林兄弟是德國人，但現在德國野外究竟還剩幾匹狼？不到一百匹，而且多半是波蘭野狼，是近年跨越邊界而來的；相對的，德國現在家犬的數目達到五百萬隻。全球總共只剩約二十萬匹野狼漫遊在野外，但同時家犬數目足足超過四億。¹


    世界上現在有四萬頭獅子，但有六億隻家貓；九十萬頭非洲水牛，但有十五億頭馴化的牛；五千萬隻企鵝，但有二百億隻雞。²


    自1970年以來，雖然生態意識不斷提升，但是野生動物族群仍然減少了一半（而且可不是說牠們在1970年很繁盛的意思）。³


    1980年，歐洲還有二十億隻野鳥，到了2009年只剩十六億隻，但同年，歐洲肉雞和蛋雞的合計數目達到十九億隻。⁴目前，全球大型動物（也就是體重不只是幾公斤而已），有超過90%，不是人類、就是家畜。


    科學家將地球的歷史，分為不同的「世」（epoch），例如更新世（Pleistocene）、上新世（Pliocene）、中新世（Miocene）。正式說法，我們現在處於全新世（Holocene），但更好的說法可能是把過去這七萬年稱為「人類世」（Anthropocene），也就是人類的時代。原因就在於：這幾萬年來，人類已經成為全球生態變化唯一最重要的因素。⁵


    這是一種前所未見的現象。自從生命在大約四十億年前出現之後，從來沒有任何單一物種，能夠一手改變全球生態。雖然生態革命和大規模物種滅絕事件時有所聞，但原因都不是出於某種特定蜥蜴、蝙蝠或真菌的行動，而是一些強大的自然力量造成的，例如氣候變遷、板塊運動、火山噴發、或是隕石撞擊。


    有些人擔心，我們今天仍然可能因為大規模火山爆發或隕石撞擊，而有滅絕的危險。好萊塢電影靠著這樣的憂慮，就賺進了幾十億美元，但實際上這樣的風險小之又小。生物大滅絕的頻率，大約是好幾百萬年才會有一次。確實，未來一億年間有可能會有一顆巨大的隕石撞擊地球，但大概不是下週二這種時間。與其害怕隕石，還不如害怕人類自己吧！


    ## 生態殺手


    原因就在於：智人改寫了整套遊戲規則。單單這個「人科」物種，就在過去七萬年間，讓全球生態系起了前所未有、翻天覆地的變化，足以和冰河期與板塊運動相提並論。不過短短一世紀，人類造成的影響，可能已經超越六千五百萬年前那顆殺光恐龍的隕石。


    當時那顆隕石改變了陸地生態演化的軌跡，但並未改變生命的基本規則，生命仍然維持著四十億年前第一個生命出現時的本質：這幾十億年來，不管是小小的病毒、或是巨大的恐龍，都是依循不變的天擇原理而演化，此外，不論生物演化出怎樣奇特而怪異的外型，都還是僅限於有機領域——不管是仙人掌或鯨，一定都是由有機化合物所組成。然而，現在人類正準備用「智慧設計」（intelligent
    design）取代天擇，將生命形式從有機延伸進入無機的領域。


    就算不管未來，只談過去七萬年，仍然清楚可見：人類世讓全球起了前所未有的改變。隕石、板塊運動和氣候變遷，雖然也可能影響全球生物，但對每個地區的影響有所不同。地球從來就不是單一的生態系，而是由許多彼此稍有連結的小生態系所組成。板塊運動讓北美洲與南美洲相連，造成南美大多數有袋動物從此滅絕，不過這件事並未影響到澳洲的袋鼠。兩萬年前最後一次冰河期達到高峰，當時在波斯灣和東京灣的水母都得適應新的氣候，但因為兩種族群沒有連結，各自因應新氣候之後，就往不同的方向演化了。


    相較之下，智人突破了地球上各個生態區之間的障壁。在人類世，地球有史以來第一次成為單一的生態系。雖然澳洲、歐洲和美洲仍有不同的氣候和地形，但人類已經讓全球的各種生物打破距離和地理分區，定期交流融合。從過去的木造船隻到現在的飛機、油輪和巨大貨輪，全球各地的交流已經從涓涓細流演變成一股洪流，在每片海洋上縱橫交錯，讓每個島嶼和大陸緊密相連。因此，像是現在要討論澳洲的生態，已經不能不考慮充斥在海岸邊或沙漠裡的歐洲哺乳動物、美洲微生物。過去三百年間，人類將綿羊、小麥、老鼠和流感病毒帶到澳洲，而這些物種對今日澳洲生態的影響，已遠遠超過原生的袋鼠和無尾熊。


    然而，人類世並不是最近幾個世紀才出現的新現象。早在幾萬年前，智人的石器時代祖先就從東非走向地球的四方，每到一塊大陸和一座島嶼，就讓當地的動植物從此改觀。他們滅掉了所有其他人類、澳洲90%的大型動物、美洲75%的大型哺乳動物、全球大約50%的大型陸上哺乳動物；而且此時他們甚至還沒開始種麥、還沒開始製作金屬工具、還沒寫下任何文字、也還沒鑄出任何錢幣。⁶


    大型動物之所以首當其衝，是因為牠們數量相對較少、生育也較慢。我們可以用猛獁象（已滅絕）和兔子（仍倖存）來舉例。一群猛獁象的成員個數不超過幾十，繁衍速率大概就是每年只有兩頭小猛獁象。因此，只要當地的人類部落每年獵殺三頭猛獁象，就足以讓死亡大於出生，幾代之間就會讓猛獁象消失。相較之下，兔子則是生個不停，就算人類每年獵殺幾百隻兔子，仍然不足以讓牠們就此滅絕。


    人類祖先並非處心積慮要殲滅猛獁象，而是根本不知道自己的行為會有什麼後果。猛獁象等大型動物的滅絕，就演化的時間尺度來看，十分迅速；但就人類觀感而言，卻是個緩慢的進程。當時人類的壽命頂多七、八十年，但整個滅絕的過程卻花了幾個世紀。遠古的智人可能壓根就沒注意到，每年獵一次猛獁象、每次只獵個兩三頭，竟然會讓這些毛茸茸的巨獸就此滅絕。大不了可能就只是某位懷舊的老人家，告訴族裡的年輕人：「我年輕的時候，猛獁象可比現在多得多啊。乳齒象和大角鹿也一樣。還有，當然那時候的部落酋長比較誠實，小孩也比較敬老尊賢。」


    ## 蛇的孩子


    從人類學和考古證據看來，遠古狩獵採集者很有可能是泛靈論者，認為人類和其他動物並沒有什麼不同。整個世界（對當時的人來說，大概就是自己住的山谷和附近山區）共屬於這裡的萬物，而且萬物皆遵循著同樣一套規則：對於任何事情，只要是相關各方，就要不斷協商。於是，人們說話的對象不只有動物、樹木、石頭，還包括精靈、魔鬼和鬼魂。從這種錯綜複雜的溝通關係中，就會出現各種價值觀和規範，不論人類、大象、櫟樹和亡靈都一體適用。⁷


    某些狩獵採集社群直到現代依然存在，也仍然遵循著泛靈論的世界觀。例子之一是印度南部熱帶森林中的納雅卡人（Nayaka）。人類學家那瓦（Danny Naveh）多年研究納雅卡人，他曾提到，如果在叢林裡遇到像老虎、蛇或大象等等危險的動物，納雅卡人可能會向動物開口說：「你住在這片森林，我也住在這片森林。你來這裡吃東西，我也是要來採塊根和塊莖。我不是來傷害你的。」


    曾經有一頭公象，納雅卡人給牠取了個名字是「總是獨行的大象」，牠殺了一位納雅卡人。印度林業部想要抓住這頭大象，但納雅卡人卻拒絕協助。他們告訴人類學家那瓦，這頭公象曾經和另一頭公象感情很好，總是一起四處閒晃。直到某天，林業部把另一頭公象抓走了，從此之後，「總是獨行的大象」就變得易怒又暴力。納雅卡人說：「如果你的另一半被抓走了，你會感覺如何？這頭大象就是這麼感覺的啊。那兩頭大象有時候晚上會分開各走各的……但到了早上總是會又再一起。直到那天，大象看到牠的夥伴倒了下來，躺在地上。如果有兩個人總是在一起，但你射殺了其中一個人，另一個人會怎麼想？」⁸


    許多處於工業化時代的人，會覺得這種泛靈論簡直不可思議。對我們大多數人來說，都覺得動物從本質上就和人類有所不同，而且是較為低等。但這是因為，就算我們現存最古老的傳統，也要到狩獵採集時代結束幾千年之後，才創立出來。像是《舊約聖經》，寫成時間約在西元前一千年，而其中記載最古老的故事，則反映出大約西元前第二個千年間的事。然而，中東地區的狩獵採集時代早在七千年前就已經結束了。也就不難想見，《聖經》非但不接受泛靈信念，而且唯一一個泛靈論的故事，就出現在全書一開頭，做為警告之用。《聖經》這本書並不短，而且處處充滿各種神蹟奇事、驚奇詫異，但唯一一次說到動物與人交談，就是蛇引誘了夏娃吃下智慧的禁果。（另外在〈民數記〉裡，巴蘭的驢也向他講了幾句話，但只是為了要傳達上帝的訊息。）


    在伊甸園裡，亞當和夏娃就是採集為生，而逐出伊甸園的情節實在與農業革命有驚人的相似之處。憤怒的耶和華不再允許亞當採集野果，要他「從地裡得吃的……汗流滿面才得餬口」。因此，只有在伊甸園這個農業時代之前的階段，《聖經》裡的動物才會和人說話，這事可能並非巧合。從這個事件裡，《聖經》究竟是要教我們什麼呢？除了不該聽蛇的話，大致上最好也別和任何動物和植物說話，因為這一切只會導致災難而已。


    然而，這則《聖經》故事其實還有更深入、更古老的涵意。在大多數的閃族語言裡，「Eve」（夏娃）這個字的意思就是「蛇」、甚至是「母蛇」。因此，人類在《聖經》裡這位眾生之母的名字，其實還隱藏著一個古老的泛靈論神話：蛇非但不是我們的敵人，還是我們的祖先。⁹


    許多泛靈論的文化相信人類是動物的後代，而這些動物祖先也包括蛇和其他爬蟲類。大多數澳洲原住民都相信，世界是由彩虹蛇（Rainbow Serpent）所創造的，而像是阿蘭達人（Aranda）和狄亞里人（Dieri）也都認為，自己族人起源於原始的蜥蜴或蛇，後來才轉變為人類¹⁰。事實上，現代西方人也認為自己是從爬蟲類演化而來，我們每個人的大腦，都是圍繞著爬蟲類腦核（reptilian
    core）而生長，而人體的構造基本上也就是演化後的爬蟲類。


    〈創世記〉的作者可能在「Eve」這個名字，留下了一絲古老泛靈論的氣息，但他們可是費盡心思，掩蓋了所有其他痕跡。在〈創世記〉裡，人不是蛇的後代，而是由耶和華用地上的塵土，這種無生命物質所造。蛇不是人類的祖先，反而是引誘人對抗天上的父。


    泛靈論只把人類看成另一種動物，但《聖經》則認為人類是神獨特的創造；要說人也是動物，等於是否認神的大能和權柄。確實也如此，等到現代人類發現自己其實是由爬蟲類演化而來，就背叛了上帝、不再聽祂的話語了——甚至是不再相信祂的存在。


    ## 畜牧場裡的悲慘世界


    《聖經》以及書中相信「人類比其他動物特別」的信念，其實是農業革命的一項副產品，使人類與動物的關係走向一個新階段。人類開始農耕畜牧之後，導致新一波的生物大滅絕，但更重要的一點則是創造出另一種全新的生命形式：家畜。這種發展在一開始還沒什麼重要性，因為人類當時馴化的哺乳動物和鳥類不到二十種，相較之下，餘下的「野生」物種還有無數千千萬萬。但隨著時間一世紀一世紀過去，現在這種新的生命形式已經成為主導，今天有超過90%的大型動物都遭馴化成為家畜。


    對於遭到馴化的物種來說，物種整體達到無與倫比的成功，但物種個體卻是遭到前所未有的苦難。雖然動物界幾百萬年來也碰過各種痛苦磨難，但農業革命產生的完全是新型苦難，而且隨著時間推移，只有變得更糟。


    乍看之下，可能覺得家畜過的生活要比牠們的野生表親和祖先好得多。野豬得要整天覓食、尋水、找遮風避雨的地方，而且還會不斷受到獅子、寄生蟲和洪水的威脅。相較之下，家豬有人照顧，有得吃、有得喝、有得住，病了有人醫，也有人保護牠們免受掠食者及天災威脅。確實，大多數的家豬遲早都會進屠宰場，但這樣真的就能說牠們的命運比野豬差嗎？難道被獅子吃，就比被人吃來得好？還是說鱷魚的牙齒，不會比電動屠宰刀來得致命？


    要說家畜命運特別悲慘，重點不在於牠們死的方法，而是牠們活的方式。豢養動物从古至今的生活狀況，都受到兩個因素互相拉扯：人類的欲望、動物的需求。人類養豬，是為了得到豬肉；如果希望豬肉供應穩定，就必須確保豬能夠永續生存繁衍。照這道理來說，家畜應該能夠因此避開各種極端的殘酷對待。如果農夫不照顧好自己的豬，讓豬還沒生小豬就死了，這下就會輪到農夫餓死。


    但不幸的是，人類卻有各種方式給家畜帶來無盡苦難，但同時又能確保家畜永續生存繁衍。這個問題的根源在於：家畜仍然承繼著野生動物的種種生理、情感和社交需求，但這對人類的農場來說毫無意義。農夫常無視這些需求，而且不會因此在經濟上付出任何代價。動物被鎖在狹小的籠子裡；角和尾巴被削去剪掉；母幼骨肉分離；而且被人刻意繁殖養出畸形。這些動物飽受痛苦，但仍然繼續生存繁衍。


    這種說法，豈不是違反了天擇的最基本原理？演化論認為，所有本能、驅力、情感的演化，都只有一項目的：生存和繁衍。如果是這樣，看到家畜這樣生生不息，豈不是證明所有需求都得到了滿足？家畜真的有非關生存和繁衍的「需求」嗎？


    確實，所有的本能、驅力、情感之所以會演化，是為了滿足生存和繁衍的演化壓力。但就算這些壓力突然消失，本能、驅力和情感並不會隨之消失。至少，不是立刻隨之消失。就算這些本能、驅力和情感已經不再是生存和繁衍所必須，仍然會繼續影響動物的主觀經驗。在這裡，動物其實和人類一樣，雖然農業幾乎可說是在一夜之間改變了整個天擇的壓力，但並未改變牠們的生理、情感和社交驅力。當然，演化絕不會停下腳步，自從一萬二千年前農業興起之後，人類和動物仍然繼續演化。舉例來說，現在歐洲和西亞的人類已經演化出消化牛奶的能力，而乳牛則不再害怕人類，並且產乳量遠遠高於遠古的祖先。但這些都只是表面的改變。不論是牛、豬或人類，深層的感官及情感架構都仍然類似石器時代的情形，沒有多大改變。


    為什麼現代人如此熱愛甜食？可不是因為到了二十一世紀初，我們還得大吞冰淇淋和巧克力，才能生存下去。反而是因為，我們石器時代的祖先如果碰到香甜的水果或蜂蜜，最明智的做法就是盡量吃，愈快愈多愈好。


    年輕人為什麼開車魯莽、吵架衝動、還愛駭進機密網站？因為他們還是照著遠古基因的指令行事。遵行這些指令，在今天不僅無用，可能還有反效果，但在七萬年前，可是深深切合演化的目的。當時，年輕的獵人如果冒著生命危險追趕猛獁象，就可能勝過所有競爭對手，贏得當地美女的芳心；而我們現在就是還擁有這種男子氣概的基因。¹¹


    而在人類控制的農場裡，所有公豬、母豬和小豬也仍然遵循著一樣的演化邏輯。為了在野外生存和繁衍，遠古的野豬需要漫步巡查遼闊的範圍，好熟悉環境，並留意各種陷阱和天敵。牠們還需要和其他野豬溝通合作，形成複雜的豬群，並以年長、經驗豐富的母豬做為領導。演化壓力讓野豬成為具有高度智能的社會化動物（母野豬更是如此），有強烈的好奇心，加上難以遏抑的衝動，想要交往、玩樂、閒逛、探索周遭環境。如果某頭母豬出生時，有罕見的基因突變，讓牠對環境與公豬興趣缺缺，這頭母豬就不太可能生存或繁衍下去。


    野豬的後裔——家豬，也同樣繼承了牠們的智慧、好奇心和社交技巧。¹² 一如野豬，家豬也會用豐富多樣的聲音和嗅覺訊號，來互相溝通：母豬能夠辨識自己小豬獨特的尖叫聲，小豬也只要出生兩天，就能判斷自己媽媽和其他母豬叫聲的不同。¹³
    賓州大學的柯蒂斯（Stanley Curtis）教授養了兩隻豬，分別名為哈姆雷特和歐姆雷特，柯蒂斯訓練牠們用鼻子控制一支特殊的搖桿，他發現豬打簡單電玩的能力，很快就和靈長類動物不相上下。¹⁴


    今天，工業化畜牧場裡的母豬可沒有電玩可打。牠們被人類鎖在狹小的母豬狹欄（gestation crate）裡，通常是長200公分、寬60公分。狹欄裡為水泥地面，四面為金屬條，懷孕的母豬幾乎沒有轉身或躺下睡覺的空間，更別說要散步了。在這種條件生活三個半月後，母豬會給移到稍寬一點的豬欄，生下和養育小豬。一般來說，小豬自然的哺乳期是10週到12週，但在工業化畜牧場裡會被強制逼至2週到4週內斷奶，接著就與母親分離，運到他處等待養肥、屠宰。至於母豬則再次被受孕、送回母豬狹欄，開始另一個循環。母豬得要經過五次到十次這樣的循環，然後輪到自己遭屠宰。近年來，母豬狹欄已經在歐盟和美國一些州遭到禁用，但在其他國家仍然盛行，幾千萬隻懷孕的母豬幾乎一輩子都住在這樣的狹欄裡。


    母豬一切生存和繁衍的需要，都由畜牧場的人提供，包括足夠的食物、抵抗疾病的疫苗、遮風蔽雨的保護，另外還有人工授精。客觀來看，母豬再也不需要去探索周遭、與其他豬社交、與小豬有任何情感連結，甚至連走路都沒有必要。但從主觀而言，母豬仍然會對這些事情感受到極強烈的欲望，未能滿足則痛苦萬分。關在狹欄裡的母豬，通常都會有嚴重的挫折和絕望症狀交替出現。¹⁵


    這是演化心理學基本的一課：幾千世代以前所培養出的需求，就算已經不再是今日生存和繁衍所需，仍然會繼續留存在主觀感受之中。可悲的是，農業革命讓人類有了確保家畜生存繁衍的能力，卻忽視了家畜的主觀需求。


    ## 生物也是演算法


    但我們怎麼能確定，動物（以豬為例）也有各種主觀的需求、感覺和情感？我們會不會只是一心把動物賦予人性，也就是把人類的特質賦予到非人類的對象上，像是小孩覺得玩偶能感受到人類的愛和憤怒？


    事實上，要說豬也有情感，並不是賦予牠們「人性」，而是賦予「哺乳動物性」。因為情感不是人類獨有的特質，而是所有哺乳動物（同時還包括所有鳥類、可能某些爬蟲類、甚至魚類）共有的特質。所有哺乳動物都演化出情感能力和需求，而光是從豬屬於哺乳動物這一點，就能肯定推斷牠們也有情感。¹⁶


    生命科學家近幾十年間已經證實，情感並不是只能用來寫詩、'
  mdcn: '10. 亞述國王亞述巴尼拔（Ashurbanipal）殺獅：掌控動物界。


    # 第一部

    # 智人征服世界


    # 人類和其他動物有何不同？

    人類如何征服世界？

    智人究竟是比較高等的生命形式，

    或只是霸凌其他物種的地痞流氓？


    # 第2章

    # 人類世


    和其他動物相比，人類早已經化身為神。我們在這點並不喜歡著墨太多，因為我們實在不是特別公正或仁慈的神。如果看「國家地理頻道」、迪士尼電影或是童話書，可能還以為地球上主要住的是獅子、狼和老虎，而且和人類勢均力敵。畢竟，獅子王辛巴能號令森林裡的動物；小紅帽得躲避大野狼；森林王子毛克利則要勇敢對抗老虎謝爾汗。但在現實世界裡，動物早已不在那兒了。我們的電視、書籍、幻想、噩夢裡，仍然有各種野生動物，但是地球上的辛巴、大野狼和謝爾汗正在絕跡。現在世界上的動物主要都是人類和他們的家畜。


    寫出小紅帽和大野狼的格林兄弟是德國人，但現在德國野外究竟還剩幾匹狼？不到一百匹，而且多半是波蘭野狼，是近年跨越邊界而來的；相對的，德國現在家犬的數目達到五百萬隻。全球總共只剩約二十萬匹野狼漫遊在野外，但同時家犬數目足足超過四億。¹


    世界上現在有四萬頭獅子，但有六億隻家貓；九十萬頭非洲水牛，但有十五億頭馴化的牛；五千萬隻企鵝，但有二百億隻雞。²


    自1970年以來，雖然生態意識不斷提升，但是野生動物族群仍然減少了一半（而且可不是說牠們在1970年很繁盛的意思）。³


    1980年，歐洲還有二十億隻野鳥，到了2009年只剩十六億隻，但同年，歐洲肉雞和蛋雞的合計數目達到十九億隻。⁴目前，全球大型動物（也就是體重不只是幾公斤而已），有超過90%，不是人類、就是家畜。


    科學家將地球的歷史，分為不同的「世」（epoch），例如更新世（Pleistocene）、上新世（Pliocene）、中新世（Miocene）。正式說法，我們現在處於全新世（Holocene），但更好的說法可能是把過去這七萬年稱為「人類世」（Anthropocene），也就是人類的時代。原因就在於：這幾萬年來，人類已經成為全球生態變化唯一最重要的因素。⁵


    這是一種前所未見的現象。自從生命在大約四十億年前出現之後，從來沒有任何單一物種，能夠一手改變全球生態。雖然生態革命和大規模物種滅絕事件時有所聞，但原因都不是出於某種特定蜥蜴、蝙蝠或真菌的行動，而是一些強大的自然力量造成的，例如氣候變遷、板塊運動、火山噴發、或是隕石撞擊。


    有些人擔心，我們今天仍然可能因為大規模火山爆發或隕石撞擊，而有滅絕的危險。好萊塢電影靠著這樣的憂慮，就賺進了幾十億美元，但實際上這樣的風險小之又小。生物大滅絕的頻率，大約是好幾百萬年才會有一次。確實，未來一億年間有可能會有一顆巨大的隕石撞擊地球，但大概不是下週二這種時間。與其害怕隕石，還不如害怕人類自己吧！


    ## 生態殺手


    原因就在於：智人改寫了整套遊戲規則。單單這個「人科」物種，就在過去七萬年間，讓全球生態系起了前所未有、翻天覆地的變化，足以和冰河期與板塊運動相提並論。不過短短一世紀，人類造成的影響，可能已經超越六千五百萬年前那顆殺光恐龍的隕石。


    當時那顆隕石改變了陸地生態演化的軌跡，但並未改變生命的基本規則，生命仍然維持著四十億年前第一個生命出現時的本質：這幾十億年來，不管是小小的病毒、或是巨大的恐龍，都是依循不變的天擇原理而演化，此外，不論生物演化出怎樣奇特而怪異的外型，都還是僅限於有機領域——不管是仙人掌或鯨，一定都是由有機化合物所組成。然而，現在人類正準備用「智慧設計」（intelligent
    design）取代天擇，將生命形式從有機延伸進入無機的領域。


    就算不管未來，只談過去七萬年，仍然清楚可見：人類世讓全球起了前所未有的改變。隕石、板塊運動和氣候變遷，雖然也可能影響全球生物，但對每個地區的影響有所不同。地球從來就不是單一的生態系，而是由許多彼此稍有連結的小生態系所組成。板塊運動讓北美洲與南美洲相連，造成南美大多數有袋動物從此滅絕，不過這件事並未影響到澳洲的袋鼠。兩萬年前最後一次冰河期達到高峰，當時在波斯灣和東京灣的水母都得適應新的氣候，但因為兩種族群沒有連結，各自因應新氣候之後，就往不同的方向演化了。


    相較之下，智人突破了地球上各個生態區之間的障壁。在人類世，地球有史以來第一次成為單一的生態系。雖然澳洲、歐洲和美洲仍有不同的氣候和地形，但人類已經讓全球的各種生物打破距離和地理分區，定期交流融合。從過去的木造船隻到現在的飛機、油輪和巨大貨輪，全球各地的交流已經從涓涓細流演變成一股洪流，在每片海洋上縱橫交錯，讓每個島嶼和大陸緊密相連。因此，像是現在要討論澳洲的生態，已經不能不考慮充斥在海岸邊或沙漠裡的歐洲哺乳動物、美洲微生物。過去三百年間，人類將綿羊、小麥、老鼠和流感病毒帶到澳洲，而這些物種對今日澳洲生態的影響，已遠遠超過原生的袋鼠和無尾熊。


    然而，人類世並不是最近幾個世紀才出現的新現象。早在幾萬年前，智人的石器時代祖先就從東非走向地球的四方，每到一塊大陸和一座島嶼，就讓當地的動植物從此改觀。他們滅掉了所有其他人類、澳洲90%的大型動物、美洲75%的大型哺乳動物、全球大約50%的大型陸上哺乳動物；而且此時他們甚至還沒開始種麥、還沒開始製作金屬工具、還沒寫下任何文字、也還沒鑄出任何錢幣。⁶


    大型動物之所以首當其衝，是因為牠們數量相對較少、生育也較慢。我們可以用猛獁象（已滅絕）和兔子（仍倖存）來舉例。一群猛獁象的成員個數不超過幾十，繁衍速率大概就是每年只有兩頭小猛獁象。因此，只要當地的人類部落每年獵殺三頭猛獁象，就足以讓死亡大於出生，幾代之間就會讓猛獁象消失。相較之下，兔子則是生個不停，就算人類每年獵殺幾百隻兔子，仍然不足以讓牠們就此滅絕。


    人類祖先並非處心積慮要殲滅猛獁象，而是根本不知道自己的行為會有什麼後果。猛獁象等大型動物的滅絕，就演化的時間尺度來看，十分迅速；但就人類觀感而言，卻是個緩慢的進程。當時人類的壽命頂多七、八十年，但整個滅絕的過程卻花了幾個世紀。遠古的智人可能壓根就沒注意到，每年獵一次猛獁象、每次只獵個兩三頭，竟然會讓這些毛茸茸的巨獸就此滅絕。大不了可能就只是某位懷舊的老人家，告訴族裡的年輕人：「我年輕的時候，猛獁象可比現在多得多啊。乳齒象和大角鹿也一樣。還有，當然那時候的部落酋長比較誠實，小孩也比較敬老尊賢。」


    ## 蛇的孩子


    從人類學和考古證據看來，遠古狩獵採集者很有可能是泛靈論者，認為人類和其他動物並沒有什麼不同。整個世界（對當時的人來說，大概就是自己住的山谷和附近山區）共屬於這裡的萬物，而且萬物皆遵循著同樣一套規則：對於任何事情，只要是相關各方，就要不斷協商。於是，人們說話的對象不只有動物、樹木、石頭，還包括精靈、魔鬼和鬼魂。從這種錯綜複雜的溝通關係中，就會出現各種價值觀和規範，不論人類、大象、櫟樹和亡靈都一體適用。⁷


    某些狩獵採集社群直到現代依然存在，也仍然遵循著泛靈論的世界觀。例子之一是印度南部熱帶森林中的納雅卡人（Nayaka）。人類學家那瓦（Danny Naveh）多年研究納雅卡人，他曾提到，如果在叢林裡遇到像老虎、蛇或大象等等危險的動物，納雅卡人可能會向動物開口說：「你住在這片森林，我也住在這片森林。你來這裡吃東西，我也是要來採塊根和塊莖。我不是來傷害你的。」


    曾經有一頭公象，納雅卡人給牠取了個名字是「總是獨行的大象」，牠殺了一位納雅卡人。印度林業部想要抓住這頭大象，但納雅卡人卻拒絕協助。他們告訴人類學家那瓦，這頭公象曾經和另一頭公象感情很好，總是一起四處閒晃。直到某天，林業部把另一頭公象抓走了，從此之後，「總是獨行的大象」就變得易怒又暴力。納雅卡人說：「如果你的另一半被抓走了，你會感覺如何？這頭大象就是這麼感覺的啊。那兩頭大象有時候晚上會分開各走各的……但到了早上總是會又再一起。直到那天，大象看到牠的夥伴倒了下來，躺在地上。如果有兩個人總是在一起，但你射殺了其中一個人，另一個人會怎麼想？」⁸


    許多處於工業化時代的人，會覺得這種泛靈論簡直不可思議。對我們大多數人來說，都覺得動物從本質上就和人類有所不同，而且是較為低等。但這是因為，就算我們現存最古老的傳統，也要到狩獵採集時代結束幾千年之後，才創立出來。像是《舊約聖經》，寫成時間約在西元前一千年，而其中記載最古老的故事，則反映出大約西元前第二個千年間的事。然而，中東地區的狩獵採集時代早在七千年前就已經結束了。也就不難想見，《聖經》非但不接受泛靈信念，而且唯一一個泛靈論的故事，就出現在全書一開頭，做為警告之用。《聖經》這本書並不短，而且處處充滿各種神蹟奇事、驚奇詫異，但唯一一次說到動物與人交談，就是蛇引誘了夏娃吃下智慧的禁果。（另外在〈民數記〉裡，巴蘭的驢也向他講了幾句話，但只是為了要傳達上帝的訊息。）


    在伊甸園裡，亞當和夏娃就是採集為生，而逐出伊甸園的情節實在與農業革命有驚人的相似之處。憤怒的耶和華不再允許亞當採集野果，要他「從地裡得吃的……汗流滿面才得餬口」。因此，只有在伊甸園這個農業時代之前的階段，《聖經》裡的動物才會和人說話，這事可能並非巧合。從這個事件裡，《聖經》究竟是要教我們什麼呢？除了不該聽蛇的話，大致上最好也別和任何動物和植物說話，因為這一切只會導致災難而已。


    然而，這則《聖經》故事其實還有更深入、更古老的涵意。在大多數的閃族語言裡，「Eve」（夏娃）這個字的意思就是「蛇」、甚至是「母蛇」。因此，人類在《聖經》裡這位眾生之母的名字，其實還隱藏著一個古老的泛靈論神話：蛇非但不是我們的敵人，還是我們的祖先。⁹


    許多泛靈論的文化相信人類是動物的後代，而這些動物祖先也包括蛇和其他爬蟲類。大多數澳洲原住民都相信，世界是由彩虹蛇（Rainbow Serpent）所創造的，而像是阿蘭達人（Aranda）和狄亞里人（Dieri）也都認為，自己族人起源於原始的蜥蜴或蛇，後來才轉變為人類¹⁰。事實上，現代西方人也認為自己是從爬蟲類演化而來，我們每個人的大腦，都是圍繞著爬蟲類腦核（reptilian
    core）而生長，而人體的構造基本上也就是演化後的爬蟲類。


    〈創世記〉的作者可能在「Eve」這個名字，留下了一絲古老泛靈論的氣息，但他們可是費盡心思，掩蓋了所有其他痕跡。在〈創世記〉裡，人不是蛇的後代，而是由耶和華用地上的塵土，這種無生命物質所造。蛇不是人類的祖先，反而是引誘人對抗天上的父。


    泛靈論只把人類看成另一種動物，但《聖經》則認為人類是神獨特的創造；要說人也是動物，等於是否認神的大能和權柄。確實也如此，等到現代人類發現自己其實是由爬蟲類演化而來，就背叛了上帝、不再聽祂的話語了——甚至是不再相信祂的存在。


    ## 畜牧場裡的悲慘世界


    《聖經》以及書中相信「人類比其他動物特別」的信念，其實是農業革命的一項副產品，使人類與動物的關係走向一個新階段。人類開始農耕畜牧之後，導致新一波的生物大滅絕，但更重要的一點則是創造出另一種全新的生命形式：家畜。這種發展在一開始還沒什麼重要性，因為人類當時馴化的哺乳動物和鳥類不到二十種，相較之下，餘下的「野生」物種還有無數千千萬萬。但隨著時間一世紀一世紀過去，現在這種新的生命形式已經成為主導，今天有超過90%的大型動物都遭馴化成為家畜。


    對於遭到馴化的物種來說，物種整體達到無與倫比的成功，但物種個體卻是遭到前所未有的苦難。雖然動物界幾百萬年來也碰過各種痛苦磨難，但農業革命產生的完全是新型苦難，而且隨著時間推移，只有變得更糟。


    乍看之下，可能覺得家畜過的生活要比牠們的野生表親和祖先好得多。野豬得要整天覓食、尋水、找遮風避雨的地方，而且還會不斷受到獅子、寄生蟲和洪水的威脅。相較之下，家豬有人照顧，有得吃、有得喝、有得住，病了有人醫，也有人保護牠們免受掠食者及天災威脅。確實，大多數的家豬遲早都會進屠宰場，但這樣真的就能說牠們的命運比野豬差嗎？難道被獅子吃，就比被人吃來得好？還是說鱷魚的牙齒，不會比電動屠宰刀來得致命？


    要說家畜命運特別悲慘，重點不在於牠們死的方法，而是牠們活的方式。豢養動物从古至今的生活狀況，都受到兩個因素互相拉扯：人類的欲望、動物的需求。人類養豬，是為了得到豬肉；如果希望豬肉供應穩定，就必須確保豬能夠永續生存繁衍。照這道理來說，家畜應該能夠因此避開各種極端的殘酷對待。如果農夫不照顧好自己的豬，讓豬還沒生小豬就死了，這下就會輪到農夫餓死。


    但不幸的是，人類卻有各種方式給家畜帶來無盡苦難，但同時又能確保家畜永續生存繁衍。這個問題的根源在於：家畜仍然承繼著野生動物的種種生理、情感和社交需求，但這對人類的農場來說毫無意義。農夫常無視這些需求，而且不會因此在經濟上付出任何代價。動物被鎖在狹小的籠子裡；角和尾巴被削去剪掉；母幼骨肉分離；而且被人刻意繁殖養出畸形。這些動物飽受痛苦，但仍然繼續生存繁衍。


    這種說法，豈不是違反了天擇的最基本原理？演化論認為，所有本能、驅力、情感的演化，都只有一項目的：生存和繁衍。如果是這樣，看到家畜這樣生生不息，豈不是證明所有需求都得到了滿足？家畜真的有非關生存和繁衍的「需求」嗎？


    確實，所有的本能、驅力、情感之所以會演化，是為了滿足生存和繁衍的演化壓力。但就算這些壓力突然消失，本能、驅力和情感並不會隨之消失。至少，不是立刻隨之消失。就算這些本能、驅力和情感已經不再是生存和繁衍所必須，仍然會繼續影響動物的主觀經驗。在這裡，動物其實和人類一樣，雖然農業幾乎可說是在一夜之間改變了整個天擇的壓力，但並未改變牠們的生理、情感和社交驅力。當然，演化絕不會停下腳步，自從一萬二千年前農業興起之後，人類和動物仍然繼續演化。舉例來說，現在歐洲和西亞的人類已經演化出消化牛奶的能力，而乳牛則不再害怕人類，並且產乳量遠遠高於遠古的祖先。但這些都只是表面的改變。不論是牛、豬或人類，深層的感官及情感架構都仍然類似石器時代的情形，沒有多大改變。


    為什麼現代人如此熱愛甜食？可不是因為到了二十一世紀初，我們還得大吞冰淇淋和巧克力，才能生存下去。反而是因為，我們石器時代的祖先如果碰到香甜的水果或蜂蜜，最明智的做法就是盡量吃，愈快愈多愈好。


    年輕人為什麼開車魯莽、吵架衝動、還愛駭進機密網站？因為他們還是照著遠古基因的指令行事。遵行這些指令，在今天不僅無用，可能還有反效果，但在七萬年前，可是深深切合演化的目的。當時，年輕的獵人如果冒著生命危險追趕猛獁象，就可能勝過所有競爭對手，贏得當地美女的芳心；而我們現在就是還擁有這種男子氣概的基因。¹¹


    而在人類控制的農場裡，所有公豬、母豬和小豬也仍然遵循著一樣的演化邏輯。為了在野外生存和繁衍，遠古的野豬需要漫步巡查遼闊的範圍，好熟悉環境，並留意各種陷阱和天敵。牠們還需要和其他野豬溝通合作，形成複雜的豬群，並以年長、經驗豐富的母豬做為領導。演化壓力讓野豬成為具有高度智能的社會化動物（母野豬更是如此），有強烈的好奇心，加上難以遏抑的衝動，想要交往、玩樂、閒逛、探索周遭環境。如果某頭母豬出生時，有罕見的基因突變，讓牠對環境與公豬興趣缺缺，這頭母豬就不太可能生存或繁衍下去。


    野豬的後裔——家豬，也同樣繼承了牠們的智慧、好奇心和社交技巧。¹² 一如野豬，家豬也會用豐富多樣的聲音和嗅覺訊號，來互相溝通：母豬能夠辨識自己小豬獨特的尖叫聲，小豬也只要出生兩天，就能判斷自己媽媽和其他母豬叫聲的不同。¹³
    賓州大學的柯蒂斯（Stanley Curtis）教授養了兩隻豬，分別名為哈姆雷特和歐姆雷特，柯蒂斯訓練牠們用鼻子控制一支特殊的搖桿，他發現豬打簡單電玩的能力，很快就和靈長類動物不相上下。¹⁴


    今天，工業化畜牧場裡的母豬可沒有電玩可打。牠們被人類鎖在狹小的母豬狹欄（gestation crate）裡，通常是長200公分、寬60公分。狹欄裡為水泥地面，四面為金屬條，懷孕的母豬幾乎沒有轉身或躺下睡覺的空間，更別說要散步了。在這種條件生活三個半月後，母豬會給移到稍寬一點的豬欄，生下和養育小豬。一般來說，小豬自然的哺乳期是10週到12週，但在工業化畜牧場裡會被強制逼至2週到4週內斷奶，接著就與母親分離，運到他處等待養肥、屠宰。至於母豬則再次被受孕、送回母豬狹欄，開始另一個循環。母豬得要經過五次到十次這樣的循環，然後輪到自己遭屠宰。近年來，母豬狹欄已經在歐盟和美國一些州遭到禁用，但在其他國家仍然盛行，幾千萬隻懷孕的母豬幾乎一輩子都住在這樣的狹欄裡。


    母豬一切生存和繁衍的需要，都由畜牧場的人提供，包括足夠的食物、抵抗疾病的疫苗、遮風蔽雨的保護，另外還有人工授精。客觀來看，母豬再也不需要去探索周遭、與其他豬社交、與小豬有任何情感連結，甚至連走路都沒有必要。但從主觀而言，母豬仍然會對這些事情感受到極強烈的欲望，未能滿足則痛苦萬分。關在狹欄裡的母豬，通常都會有嚴重的挫折和絕望症狀交替出現。¹⁵


    這是演化心理學基本的一課：幾千世代以前所培養出的需求，就算已經不再是今日生存和繁衍所需，仍然會繼續留存在主觀感受之中。可悲的是，農業革命讓人類有了確保家畜生存繁衍的能力，卻忽視了家畜的主觀需求。


    ## 生物也是演算法


    但我們怎麼能確定，動物（以豬為例）也有各種主觀的需求、感覺和情感？我們會不會只是一心把動物賦予人性，也就是把人類的特質賦予到非人類的對象上，像是小孩覺得玩偶能感受到人類的愛和憤怒？


    事實上，要說豬也有情感，並不是賦予牠們「人性」，而是賦予「哺乳動物性」。因為情感不是人類獨有的特質，而是所有哺乳動物（同時還包括所有鳥類、可能某些爬蟲類、甚至魚類）共有的特質。所有哺乳動物都演化出情感能力和需求，而光是從豬屬於哺乳動物這一點，就能肯定推斷牠們也有情感。¹⁶


