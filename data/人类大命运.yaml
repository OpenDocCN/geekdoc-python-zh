    # 一神教以自我為中心


    各種宗教經典也是同樣的運作模式。各種宗教組織聲稱，自己的經典裡有著我們所有問題的答案，而且他們也會對法院、政府和企業施加壓力，要大家照著這本經典來行事。這時，如果有個聰明人讀到經文，再看看周遭的世界，會發現確實好像符合事實——「經文說，你必須向神繳納什一奉獻；而你看，大家真的都繳了。經文說，女不如男，不能擔任審判，甚至不能在法庭上作證；而你看，現在確實沒有女法官，法庭也確實不願接受女性的證詞。經文說，只要好好研讀神的話語，就能在生活中得到成功；而你看，現在所有那些好的工作，確實都是由這些熟讀經文的人擔任。」


    這樣一來，聰明人自然就會去研讀這本宗教經典。也因為他是個聰明人，很有可能就會成為這本經典的權威，甚至是成為法官。如果他當上了法官，一定不會允許婦女上法庭作證，如果要選繼任法官，顯然也會選個熟讀這本經典的人。如果有人提出異議說「這本書只是一疊紙！」而且還很認真的只把這本書當成一疊紙，這個異端份子的日子肯定不會好過。


    就算各種宗教經典根本是扭曲了民眾對於現實本質的理解，宗教經典的說書人卻還是能大權在握，時間長達數千年。舉例來說，《聖經》對歷史的看法從根本就有問題，卻仍然成功傳遍世界，幾百萬人深信不疑。《聖經》推銷的是一神論的史觀，聲稱整個世界是由某個唯一、全能的神所掌管，而且祂非常關心我、也關心我的作為。如果發生了什麼好事，一定是祂在獎勵我的善行。而如果發生了任何災難，也必然是祂在懲罰我的罪惡。


    因此，古代猶太人相信，不論是遭受大旱，或是遭到巴比倫王國的尼布甲尼撒二世（Nebuchadnezzar II）入侵猶太王國而流離失所，也都是因為他們犯了罪，以致受到神的懲罰。至於波斯的居魯士大帝（Cyrus）打敗巴比倫人，允許猶太流亡者回返家園重建耶路撒冷，當然是因為慈愛的上帝聽到了他們悔恨的禱告。《聖經》並不會承認，有可能是因為菲律賓火山爆發而引起乾旱，尼布甲尼撒二世的入侵是為了巴比倫的商業利益，居魯士也是基於自己的政治考量而支持猶太人。很顯然，《聖經》對於全球生態、巴比倫經濟或波斯政治體系，是沒什麼興趣的。


    所有人類的童年，都有這種以自我為中心的特徵。不論是受了哪種宗教或文化的薰陶，兒童都會認為自己是世界的中心，對其他人的處境和感受也就興趣缺缺。正因為如此，父母離婚對兒童會造成莫大的創傷。一個五歲的小孩並無法理解，某件重大事情可能不是因為他而造成的。不管爸媽跟他說了多少次，說爸媽都是獨立的人、有自己的問題和希望、他們離婚不是因為他，這個孩子就是不懂。他一心認為，所有事情都是因為他自己的關係。大多數人長大之後，就會擺脫這種幼兒期的妄想。但一神論者卻是繼續堅持，至死方休。就像孩子覺得爸媽是因為他才會吵架；一神論者也相信，波斯人與巴比倫人是因為自己才會開打。


    在《聖經》時代，有些其他文化對歷史的看法遠遠更為準確。在泛靈論和多神論宗教的眼中，世界就像是各方權力競逐的場地，而不只有單一的神祇。也因此泛靈論者和多神論者很容易相信，有很多事情不管是與我、或是與我最愛的神，都無關聯，既不是為了懲罰我的罪惡、也不是為了獎勵我的善行。


    不論是希羅多德（Herodotus）或修昔底德（Thucydides）這些希臘歷史學家，或是像司馬遷這些中國歷史學家，都已經發展出非常精緻的史觀，與今日的現代觀點極為類似。他們認為，之所以會爆發戰爭和革命，是由於無數的政治、社會和經濟因素所導致。人有可能完全沒犯下任何錯，卻仍然成為戰爭的受害者。因為具有這樣的史觀，所以希羅多德才會對波斯政治深感興趣，而司馬遷也極為重視蠻夷文化和宗教。


    現代學者多半會同意希羅多德和司馬遷的史觀與見解，而不是同意《聖經》的世界觀。正因如此，所有現代國家都會投入大批心力，蒐集關於其他國家的情資，並分析全球生態、政治和經濟趨勢。於是，在美國經濟表現不佳的時候，就連福音派的共和黨人，偶爾也是把錯怪到中國頭上，而不是懺悔自己的罪。


    然而，即便希羅多德和修昔底德比《聖經》的作者群更瞭解現實，但這兩種世界觀一發生衝突，《聖經》卻將敵手一擊倒地。最後是希臘人採用了猶太人的史觀，而不是猶太人接受希臘人的史觀。從修昔底德的時代又過了一千年之後，希臘人反而變得相信，如果有蠻族入侵，肯定是神在懲罰自己的罪行。不管《聖經》的世界觀錯得多麼離譜，卻能為人類大規模合作，提供更好的基礎。


    就算到了今天，美國總統宣誓就職的時候，手也是要放在《聖經》上面。同樣的，包括英美在內的許多國家，證人上法庭作證，也會把手放在《聖經》上面，發誓說出事實、完整的事實、也唯有事實。然而，發這個誓的時候，所憑依的書裡竟是充滿虛構、神話和謬誤，豈不諷刺？


    # 但這就是有用啊！


    靠著虛構故事，能讓人類更容易合作。但代價在於：這些虛構故事同時也會決定我們合作的目標。因此，我們可能擁有非常複雜的合作制度，卻只是為了服務虛構的目標和利益。這樣一來，雖然整個制度看來運作良好，但可能只是從這個制度的標準來看。


    例如，一位穆斯林的毛拉（mullah，對精通穆斯林神學的人士的尊稱）會說：「我們的制度很有用。現在全世界有十五億穆斯林，比起以往，也有更多人研讀《古蘭經》，服從阿拉的旨意。」這裡關鍵的問題是：這真的是判斷成功的正確標準嗎？學校的校長會說：「我們的制度很有用。在過去五年內，考試成績已上升
    7.3%。」這真的是判斷學校的最好方式嗎？至於古埃及的官員也會說：「我們的制度很有用。比起世界上任何人，我們收到的稅更多、挖出的運河更多、蓋起的金字塔更大！」確實，法老時代的埃及在稅收、灌溉系統和金字塔建設方面領先全球。但這真的是最重要的事嗎？


    人類有許多物質、社會和心理上的需求。我們實在很難判斷，比起從事狩獵採集的祖先，古埃及的農民是否真得到更多的愛、或是更好的社會關係？事實上，古埃及在營養、健康和兒童死亡率方面，情況反而很可能是更糟了。


    有一份大約出自西元前 1850 年的文件，時值阿蒙涅姆赫特三世在朝（就是那位闢出法雍湖的法老），提到有位叫做杜阿卡帝（Dua-Khety）的有錢人，要兒子佩皮去上學，好讓他以後當個書吏。在路上，杜阿卡帝很生動的向兒子描述農民、勞工、軍人和工匠的生活多麼悲慘，好鼓勵佩皮把所有心力投入學習，才能逃離大多數人不快樂的命運。


    根據杜阿卡帝的說法，自己沒有田地的農民，生活就是充滿艱辛和苦難，只得破布遮身，又得整天勞動，直到手指起滿水泡。接著，法老的官吏還要把他拉去服勞役。而他如此勞苦工作，卻只換來一身疾病。就算真的能活著回家，身心也已遭摧殘殆盡。而即使是擁有土地的農民，命也不見得比較好。每天從河邊用桶子把水挑回田裡，沉重的負擔壓彎肩膀，脖子上也滿是潰爛腫脹。早上是水韭田、下午是椰棗樹、晚上還有香菜田要灌溉。最後，他終於不支倒地，一命嗚呼。


    雖然這段文本可能有意誇大，但與實情也相去不遠。法老時代的埃及是當時最強大的王國，但對於底層的農民來說，這些強大的國力只代表他們得繳稅、得被迫服勞役，並不代表能得到健康照護或社會安全服務。


    此等缺憾並非埃及獨然。無論是中國歷代、穆斯林各個帝國或歐洲各個王國，雖然都是成就斐然，但就算到了西元 1850 年，一般人的生活比起遠古狩獵採集者，仍然不見得更好，而且實際上可能更糟。1850
    年，不管是中國農民、或是在曼徹斯特工廠裡的勞工，工時都比狩獵採集者更長，工作對身體的負擔更重、對心理的壓力也更大；他們的飲食比遠古更不均衡，衛生條件更為低落，而傳染病則是遠遠更為常見。


    假设有以下兩個度假體驗行程，任君挑選：


    - **石器時代體驗**：第一天，在原始森林徒步旅行十小時，在河邊開闊的空地搭營過夜。第二天，獨木舟順流而下十小時，在小湖旁露營。第三天，向當地人學習如何在湖裡釣魚，在附近的樹林裡採蘑菇。

    - **現代無產階級體驗**：第一天，在受到汙染的紡織工廠工作十小時，在擁擠的公寓過夜。第二天，在當地百貨公司擔任收銀員十小時，回到同一棟公寓睡覺。第三天，向當地人學習如何開立銀行帳戶、填寫貸款表格。


    你想挑哪個體驗行程？


    # 關鍵是：誰會感覺痛苦？


    因此，想評估人類合作網路究竟是好是壞，一切都得看用了什麼標準和觀點。評斷法老時代的埃及，我們要看的是產量、營養、還是社會和諧？重視的是貴族、底層農民、還是豬和鱷魚？歷史絕不是單一的敘事，而是同時有著成千上萬種不同的敘事。我們選擇講述其中一種敘事，就等於選擇讓其他的敘事噤聲。


    人類合作網路對自我加以評價時，常常用的就是自己發明的標準，屢獲好評也就毫不意外。特別是以虛構實體之名（例如神祇、國家和公司）而建立的人類網路，自然也就是從虛構實體的角度來判斷是否成功。這樣一來，宗教的成功就在於信眾徹底遵循神的誡命；國家的成功就在於提升國家的利益；企業的成功就在於錢財滾滾而來。


    因此，檢視任何人類網路的歷史時，我建議，可以三不五時暫停一下，改由真實實體的觀點來看事物。怎麼知道某個實體是否真實？答案很簡單，只要問問自己「它是否會感覺痛苦？」就行了。放火燒了宙斯的神廟，宙斯並不會感覺痛苦。歐元貶值，歐元不會感覺痛苦。銀行破產，銀行不會感覺痛苦。國家在戰爭中遭到擊敗，國家也不會真正感覺痛苦。這些實體，都只是隱喻。


    但相對的，如果是士兵在戰爭中受傷，他確實會感覺痛苦。飢餓的農民沒有食物可吃，會感覺痛苦。母牛被迫與新生小牛分離，會感覺痛苦。這些實體，則屬於真實。


    當然，我們有可能因為自己相信了虛構故事，而感到痛苦。例如，相信各種民族傳說和宗教神話，可能導致戰爭，而讓數百萬人失去家園、失去肢體，甚至失去生命。戰爭的起源是虛構，但痛苦則是百分之百真實。正因如此，我們才應該努力區分是虛構、或是真實。


    # 回歸故事的本質


    虛構故事本身並沒有錯，而且有其必要。如果沒有金錢、國家或公司這些人人共同接受的故事，就不可能有複雜的人類社會能夠正常運作。要先讓大家都相信了同樣的虛構規則，我們才可能一起踢一場足球；也要讓大家都相信了一些類似的虛構故事，才能讓市場或法庭真正發揮作用。


    然而，這些故事只是工具，不該成為目標、甚至標準。一旦我們忘了這些都只是虛構，就會開始與現實漸行漸遠。於是，可能只是為了「替公司賺很多錢」、或是「保護國家利益」，就讓我們掀起無邊戰火。公司、金錢和國家，都只存在於我們的想像之中。是人類發明了這些概念，好讓它們為人類服務；但為什麼最後反而是人類要為這些概念服務，甚至犧牲性命？


    在二十一世紀，我們還會創造出比以往更強大的虛構概念、更極權的宗教。在生物科技和電腦演算法的協助下，這些宗教不但會控制我們每分每秒的存在，甚至將能夠形塑我們的身體、大腦和心靈，創造出完整的虛擬世界，連地獄和天堂也能創造。這樣一來，要再區分虛構與真實、宗教與科學，將會變得更加困難。但要辨別清楚，卻又比以往更加重要了。


    # 第 5 章 一對冤家


    虛構故事是人類社會的基礎和支柱。隨著歷史不斷演進，關於神祇、國家和公司的故事愈見強大，開始主宰了客觀的現實。正因為相信著偉大的鱷神索貝克、天命、或是《聖經》，讓人能夠闢出法雍湖、建起長城、蓋出沙特爾大教堂（Chartres
    Cathedral）。但遺憾的是，盲目信從這些故事，也就意味人類的努力往往是用來榮耀某些虛構的實體，例如神和國家，而不是讓真正擁有感受的生命過得更美好。


    現在的情況又是如何？乍看之下，會覺得現代社會和古埃及或中世紀的中國大不相同。現代科學興起之後，是不是已經改變了人類遊戲的基本規則？有沒有可能，雖然傳統神話仍然重要，但現代社會制度已經逐漸偏向某些過去還不存在的客觀科學理論，例如演化論？


    我們當然可以說：科學理論也是一種新的神話，現代人相信科學，就像古埃及人相信鱷神索貝克。但這種比較禁不起推敲。索貝克只存在於信徒的想像之中。確實，信仰鱷神索貝克，鞏固了埃及的社會制度，也讓古埃及人建起水壩、開出運河，得以防洪防旱。然而，信仰本身並不會提升或降低尼羅河的水位。相較之下，科學理論絕不只是某種讓人合作的方式。有一種說法是「天助自助者」，這等於是兜了個圈子來說：根本沒有上天，但是對上天的信仰能夠激勵我們自己來做某件事，做為一種助力。相較之下，以抗生素為例，就算人不自助，抗生素也能助人，這可是和上天相去甚遠——不管你相不相信抗生素，它就是有療效。


    因此，現代世界才會與前現代世界大不相同。埃及法老和中國皇帝經過幾千年的努力，仍然未能克服饑荒、瘟疫和戰爭的問題。而現代社會不過短短幾世紀，就已經大功告成了。這難道不是因為我們擁抱了客觀的科學知識、拋棄了互為主體的神話嗎？有沒有可能，這個過程在未來幾十年間加速進展？隨著科技讓我們能夠將人類升級、克服老化、找到幸福快樂的關鍵，難道不會讓人們不再那麼關心虛構的神祇、國家和公司，而一心專注於解譯物理和生物學的現實？


    雖有可能，但實際上事情要遠遠更為複雜。現代科學確實改變了遊戲的規則，但並不是「以事實代替神話」如此簡單。神話仍然主宰人類，科學只是讓神話更為強大。科學非但沒有摧毀互為主體的現實，反而是讓它比以往更能完全控制客觀現實和主觀現實。在電腦和生物工程的協助下，人類開始重塑現實以符合心中的幻想，虛構與現實的界線將會變得更模糊。


    索貝克的祭司幻想著有鱷神存在，法老則幻想能夠長生不死。但在現實中，所謂的鱷神只是一條非常普通的沼澤爬蟲類、穿著金色的衣服，而法老也和最貧窮的農民一樣，終將過世。雖然法老的遺體會用防腐的油膏和香水製作成木乃伊，但還是一樣死得徹徹底底。相較之下，二十一世紀的科學家卻有可能打造出真正的超級鱷魚，並讓人類精英在人世就得到永恆的青春。


    於是，科學興起之後，至少會讓某些神話和宗教變得比以往更為強大。為了瞭解原因、面對二十一世紀的挑戰，我們必須再次回到一項最令人煩惱的問題：現代科學和宗教的關係，究竟為何？這個問題似乎早已提了百萬遍，能說的早已說完。但實際上，科學和宗教就像夫妻，上了五百年的婚姻諮商，仍然未能真正瞭解彼此。他還是一心想著灰姑娘，而她也還是一心念著白馬王子，但兩人卻吵著該輪到誰倒垃圾。


    # 宗教不等於迷信


    之所以會誤解科學和宗教的關係，多半是由於對宗教有錯誤的認知。人們常誤以為宗教就是迷信、靈性、相信超自然力量、或是崇拜神祇。但宗教並不是這些概念。宗教並不等於迷信，因為大多數人都不可能把自己最相信的事稱為迷信。自己相信的，一定是「真理」；只有別人相信的，才會是「迷信」。


    同樣的，也很少有人認為自己相信的是超自然力量。對那些相信惡魔、神靈、精靈的人來說，絕不會認為這些是「超自然」，而會認為這些都是大自然的一部分，與豪豬、蠍子和細菌並沒有兩樣。像是疾病這件事，現代醫師歸咎於看不見的細菌，巫毒祭司則歸咎於看不見的神靈——這沒什麼超自然的：如果你讓某個神靈生氣了，祂就會進到你的身體裡，讓你痛苦萬分。這豈不是再自然不過？只有不相信神靈的人，才會覺得這些事情超出自然的秩序。


    如果你說宗教就是信仰超自然的力量，那等於是說：你認為自己可以不靠宗教，就瞭解所有自然現象，而宗教只是一種選配——是在完全瞭解大自然的全貌後，還能選擇要不要再另外加點宗教的「超自然」教條。但大多數宗教都認為，如果沒有宗教，你根本不可能瞭解世界；不懂這些教條，你就不可能瞭解疾病、旱災或地震的真正原因。


    另外，要說宗教就是「相信神」也有問題。我們常常會說，某個虔誠的基督徒是信仰宗教的，因為她相信神（上帝），而某個狂熱的共產主義人士算不上是信仰宗教，因為共產主義並沒有神。然而宗教是由人所創、而非由神所創；宗教的定義應該是在於社會功能，而非是否有神。只要是任何無所不包的故事，能夠為人類的法律、規範和價值觀，賦予高於一般人的合法性，就應該算是宗教。宗教能夠為人類社會結構找的理由，就是這些結構反映了高於一般人的法則。


    宗教會說，人類都受制於某種道德法則系統，這個系統並非由人所創、也並非人所能改變。於是，虔誠的猶太人會說，這個道德法則系統就是由上帝所創，揭示在《聖經》之中。虔誠的印度教徒則會說，這些法則是由梵天（Brahma）、毘濕奴（Vishnu）和濕婆（Shiva）所創，揭示在《吠陀經》中。至於其他宗教，從佛教和道教，到共產主義、納粹主義和自由主義，也都會說自己那套高於一般人的法則都是源於大自然的自然律，而不是這個上帝或那個神祇所創。當然，每個宗教都各自信奉著不同的自然律、由不同的先知所揭示，從佛陀、老子，再到馬克思和希特勒，各顯神通。


    一個猶太男孩去找他爸爸，問說：「爸，為什麼我們不能吃豬肉啊？」這位爸爸若有所思的摸著他又長又捲的鬍子，回答道：「楊克勒啊，世界本來就是這樣啊。你還小，還不懂，如果我們吃豬肉，上帝會懲罰我們，我們最後不會有好下場。這不是我說的，甚至也不是拉比說的。如果是拉比創造這個世界，或許他就會創造一個讓豬肉也符合猶太戒律的世界。可是創造這個世界的不是拉比，而是上帝。雖然我不知道為什麼，但上帝說了，我們不該吃豬肉。所以我們就該聽話。懂了嗎？」


    1943 年，一個德國男孩去找他爸爸，那是一位資深蓋世太保，男孩問：「爸，為什麼我們要殺猶太人呢？」這位爸爸穿著他筆挺的制服和發亮的皮靴，鄭重解釋道：「弗烈茲啊，世界本來就是這樣啊。你還小，還不懂，如果我們允許猶太人活下去，他們就會造成人類退化、滅絕。這不是我說的，甚至也不是元首說的。如果是希特勒創造這個世界，或許他就會創造一個沒有天擇法則的世界，讓猶太人和雅利安人能夠和諧共處。可是創造這個世界的不是希特勒，他只是設法找出了自然律，然後告訴我們該怎樣遵照自然律來生活。如果不服從這些自然律，最後不會有好下場。懂了嗎？」


    2016 年，一個英國男孩也跑去找他爸爸，那是一位自由民主黨的國會議員，男孩問：「爸，為什麼我們要管中東那些穆斯林的人權啊？」這位爸爸放下手上那杯茶，想了一下，回答道：「鄧肯啊，世界本來就是這樣啊。你還小，還不懂，但所有人、包括中東的穆斯林，其實本質都相同，都該享有一樣的自然權利（天賦人權）。這不是我說的，甚至也不是國會說的。如果是國會創造這個世界，或許在所有那些什麼量子物理以外，也會有個人權委員會，規定讓普世都有人權。可是創造這個世界的不是國會，國會只是想讓一切都合乎道理，我們必須尊重這件事，就算中東的穆斯林也該擁有自然權利，否則我們自己的權利很快也會遭到侵犯，最後不會有好下場。懂了嗎？」'
  mdcn: '如果用時光機把現代科學家送回古埃及，就算她用演化論、相對論和量子物理，戳破了埃及祭司的一切虛構，還是無法在當時擁有力量。當然，如果這位科學家可以運用知識製作出槍炮，就能在面對法老和鱷魚神索貝克時大占優勢。但為此，她必須開採鐵礦、建造熔鐵爐、製作火藥，也就需要許多辛勤工作的農民為她工作。你真的覺得，和農民大談
    $E=mc^2$，就能讓他們對你五體投地嗎？如果你真這麼想，歡迎現在買張到阿富汗或敘利亞的機票，好好一展長才。


    法老統治下的埃及、歐洲的各個帝國、以及現代的學校體系，這些真正有力的人類組織，並不一定都是把現實呈現得清清楚楚。這些組織大部分的力量，都在於能夠將虛構的信仰建立在一個讓人順從的現實之上。舉例來說，整個「金錢」的概念正是如此。政府製作出本身並無價值的一些紙張，宣布它們是有價值的，接著就開始用它們來計算一切的價值。政府有權強迫公民只能用這些紙張納稅，於是公民別無選擇，至少得擁有個幾張。這下，這些鈔票就變得真的有價值了，官員的價值也跟著得到肯定，而政府既然控制著鈔票的發行，權力也就水漲船高。如果有人提出異議說「鈔票只是沒有任何價值的一張紙！」，而且還很認真的把鈔票當成紙，他的日子肯定不會好過。


    同樣的事情，也發生在教育體系認為入學考試是評量學生的最好方法。教育體系擁有足夠的權力，能夠影響大學入學標準、以及公職或私人企業的聘用標準。於是，學生就會全力投入，一心取得好成績。那些眾人垂涎的職位都由成績好的人搶下，而這些人又自然會大力支持這個讓自己得到好處的系統。教育體系掌控著各項關鍵考試，也就讓它更有權力能影響大學、政府及職場。如果有人提出異議說「學位證書只是一張紙！」，而且還很認真的只把證書當成紙，他的日子肯定不會好過。


    # 一神教以自我為中心


    各種宗教經典也是同樣的運作模式。各種宗教組織聲稱，自己的經典裡有著我們所有問題的答案，而且他們也會對法院、政府和企業施加壓力，要大家照著這本經典來行事。這時，如果有個聰明人讀到經文，再看看周遭的世界，會發現確實好像符合事實——「經文說，你必須向神繳納什一奉獻；而你看，大家真的都繳了。經文說，女不如男，不能擔任審判，甚至不能在法庭上作證；而你看，現在確實沒有女法官，法庭也確實不願接受女性的證詞。經文說，只要好好研讀神的話語，就能在生活中得到成功；而你看，現在所有那些好的工作，確實都是由這些熟讀經文的人擔任。」


    這樣一來，聰明人自然就會去研讀這本宗教經典。也因為他是個聰明人，很有可能就會成為這本經典的權威，甚至是成為法官。如果他當上了法官，一定不會允許婦女上法庭作證，如果要選繼任法官，顯然也會選個熟讀這本經典的人。如果有人提出異議說「這本書只是一疊紙！」而且還很認真的只把這本書當成一疊紙，這個異端份子的日子肯定不會好過。


    就算各種宗教經典根本是扭曲了民眾對於現實本質的理解，宗教經典的說書人卻還是能大權在握，時間長達數千年。舉例來說，《聖經》對歷史的看法從根本就有問題，卻仍然成功傳遍世界，幾百萬人深信不疑。《聖經》推銷的是一神論的史觀，聲稱整個世界是由某個唯一、全能的神所掌管，而且祂非常關心我、也關心我的作為。如果發生了什麼好事，一定是祂在獎勵我的善行。而如果發生了任何災難，也必然是祂在懲罰我的罪惡。


    因此，古代猶太人相信，不論是遭受大旱，或是遭到巴比倫王國的尼布甲尼撒二世（Nebuchadnezzar II）入侵猶太王國而流離失所，也都是因為他們犯了罪，以致受到神的懲罰。至於波斯的居魯士大帝（Cyrus）打敗巴比倫人，允許猶太流亡者回返家園重建耶路撒冷，當然是因為慈愛的上帝聽到了他們悔恨的禱告。《聖經》並不會承認，有可能是因為菲律賓火山爆發而引起乾旱，尼布甲尼撒二世的入侵是為了巴比倫的商業利益，居魯士也是基於自己的政治考量而支持猶太人。很顯然，《聖經》對於全球生態、巴比倫經濟或波斯政治體系，是沒什麼興趣的。


    所有人類的童年，都有這種以自我為中心的特徵。不論是受了哪種宗教或文化的薰陶，兒童都會認為自己是世界的中心，對其他人的處境和感受也就興趣缺缺。正因為如此，父母離婚對兒童會造成莫大的創傷。一個五歲的小孩並無法理解，某件重大事情可能不是因為他而造成的。不管爸媽跟他說了多少次，說爸媽都是獨立的人、有自己的問題和希望、他們離婚不是因為他，這個孩子就是不懂。他一心認為，所有事情都是因為他自己的關係。大多數人長大之後，就會擺脫這種幼兒期的妄想。但一神論者卻是繼續堅持，至死方休。就像孩子覺得爸媽是因為他才會吵架；一神論者也相信，波斯人與巴比倫人是因為自己才會開打。


    在《聖經》時代，有些其他文化對歷史的看法遠遠更為準確。在泛靈論和多神論宗教的眼中，世界就像是各方權力競逐的場地，而不只有單一的神祇。也因此泛靈論者和多神論者很容易相信，有很多事情不管是與我、或是與我最愛的神，都無關聯，既不是為了懲罰我的罪惡、也不是為了獎勵我的善行。


    不論是希羅多德（Herodotus）或修昔底德（Thucydides）這些希臘歷史學家，或是像司馬遷這些中國歷史學家，都已經發展出非常精緻的史觀，與今日的現代觀點極為類似。他們認為，之所以會爆發戰爭和革命，是由於無數的政治、社會和經濟因素所導致。人有可能完全沒犯下任何錯，卻仍然成為戰爭的受害者。因為具有這樣的史觀，所以希羅多德才會對波斯政治深感興趣，而司馬遷也極為重視蠻夷文化和宗教。


    現代學者多半會同意希羅多德和司馬遷的史觀與見解，而不是同意《聖經》的世界觀。正因如此，所有現代國家都會投入大批心力，蒐集關於其他國家的情資，並分析全球生態、政治和經濟趨勢。於是，在美國經濟表現不佳的時候，就連福音派的共和黨人，偶爾也是把錯怪到中國頭上，而不是懺悔自己的罪。


    然而，即便希羅多德和修昔底德比《聖經》的作者群更瞭解現實，但這兩種世界觀一發生衝突，《聖經》卻將敵手一擊倒地。最後是希臘人採用了猶太人的史觀，而不是猶太人接受希臘人的史觀。從修昔底德的時代又過了一千年之後，希臘人反而變得相信，如果有蠻族入侵，肯定是神在懲罰自己的罪行。不管《聖經》的世界觀錯得多麼離譜，卻能為人類大規模合作，提供更好的基礎。


    就算到了今天，美國總統宣誓就職的時候，手也是要放在《聖經》上面。同樣的，包括英美在內的許多國家，證人上法庭作證，也會把手放在《聖經》上面，發誓說出事實、完整的事實、也唯有事實。然而，發這個誓的時候，所憑依的書裡竟是充滿虛構、神話和謬誤，豈不諷刺？


    # 但這就是有用啊！


    靠著虛構故事，能讓人類更容易合作。但代價在於：這些虛構故事同時也會決定我們合作的目標。因此，我們可能擁有非常複雜的合作制度，卻只是為了服務虛構的目標和利益。這樣一來，雖然整個制度看來運作良好，但可能只是從這個制度的標準來看。


    例如，一位穆斯林的毛拉（mullah，對精通穆斯林神學的人士的尊稱）會說：「我們的制度很有用。現在全世界有十五億穆斯林，比起以往，也有更多人研讀《古蘭經》，服從阿拉的旨意。」這裡關鍵的問題是：這真的是判斷成功的正確標準嗎？學校的校長會說：「我們的制度很有用。在過去五年內，考試成績已上升
    7.3%。」這真的是判斷學校的最好方式嗎？至於古埃及的官員也會說：「我們的制度很有用。比起世界上任何人，我們收到的稅更多、挖出的運河更多、蓋起的金字塔更大！」確實，法老時代的埃及在稅收、灌溉系統和金字塔建設方面領先全球。但這真的是最重要的事嗎？


    人類有許多物質、社會和心理上的需求。我們實在很難判斷，比起從事狩獵採集的祖先，古埃及的農民是否真得到更多的愛、或是更好的社會關係？事實上，古埃及在營養、健康和兒童死亡率方面，情況反而很可能是更糟了。


    有一份大約出自西元前 1850 年的文件，時值阿蒙涅姆赫特三世在朝（就是那位闢出法雍湖的法老），提到有位叫做杜阿卡帝（Dua-Khety）的有錢人，要兒子佩皮去上學，好讓他以後當個書吏。在路上，杜阿卡帝很生動的向兒子描述農民、勞工、軍人和工匠的生活多麼悲慘，好鼓勵佩皮把所有心力投入學習，才能逃離大多數人不快樂的命運。


    根據杜阿卡帝的說法，自己沒有田地的農民，生活就是充滿艱辛和苦難，只得破布遮身，又得整天勞動，直到手指起滿水泡。接著，法老的官吏還要把他拉去服勞役。而他如此勞苦工作，卻只換來一身疾病。就算真的能活著回家，身心也已遭摧殘殆盡。而即使是擁有土地的農民，命也不見得比較好。每天從河邊用桶子把水挑回田裡，沉重的負擔壓彎肩膀，脖子上也滿是潰爛腫脹。早上是水韭田、下午是椰棗樹、晚上還有香菜田要灌溉。最後，他終於不支倒地，一命嗚呼。


    雖然這段文本可能有意誇大，但與實情也相去不遠。法老時代的埃及是當時最強大的王國，但對於底層的農民來說，這些強大的國力只代表他們得繳稅、得被迫服勞役，並不代表能得到健康照護或社會安全服務。


    此等缺憾並非埃及獨然。無論是中國歷代、穆斯林各個帝國或歐洲各個王國，雖然都是成就斐然，但就算到了西元 1850 年，一般人的生活比起遠古狩獵採集者，仍然不見得更好，而且實際上可能更糟。1850
    年，不管是中國農民、或是在曼徹斯特工廠裡的勞工，工時都比狩獵採集者更長，工作對身體的負擔更重、對心理的壓力也更大；他們的飲食比遠古更不均衡，衛生條件更為低落，而傳染病則是遠遠更為常見。


    假设有以下兩個度假體驗行程，任君挑選：


    - **石器時代體驗**：第一天，在原始森林徒步旅行十小時，在河邊開闊的空地搭營過夜。第二天，獨木舟順流而下十小時，在小湖旁露營。第三天，向當地人學習如何在湖裡釣魚，在附近的樹林裡採蘑菇。

    - **現代無產階級體驗**：第一天，在受到汙染的紡織工廠工作十小時，在擁擠的公寓過夜。第二天，在當地百貨公司擔任收銀員十小時，回到同一棟公寓睡覺。第三天，向當地人學習如何開立銀行帳戶、填寫貸款表格。


    你想挑哪個體驗行程？


    # 關鍵是：誰會感覺痛苦？


    因此，想評估人類合作網路究竟是好是壞，一切都得看用了什麼標準和觀點。評斷法老時代的埃及，我們要看的是產量、營養、還是社會和諧？重視的是貴族、底層農民、還是豬和鱷魚？歷史絕不是單一的敘事，而是同時有著成千上萬種不同的敘事。我們選擇講述其中一種敘事，就等於選擇讓其他的敘事噤聲。


    人類合作網路對自我加以評價時，常常用的就是自己發明的標準，屢獲好評也就毫不意外。特別是以虛構實體之名（例如神祇、國家和公司）而建立的人類網路，自然也就是從虛構實體的角度來判斷是否成功。這樣一來，宗教的成功就在於信眾徹底遵循神的誡命；國家的成功就在於提升國家的利益；企業的成功就在於錢財滾滾而來。


    因此，檢視任何人類網路的歷史時，我建議，可以三不五時暫停一下，改由真實實體的觀點來看事物。怎麼知道某個實體是否真實？答案很簡單，只要問問自己「它是否會感覺痛苦？」就行了。放火燒了宙斯的神廟，宙斯並不會感覺痛苦。歐元貶值，歐元不會感覺痛苦。銀行破產，銀行不會感覺痛苦。國家在戰爭中遭到擊敗，國家也不會真正感覺痛苦。這些實體，都只是隱喻。


    但相對的，如果是士兵在戰爭中受傷，他確實會感覺痛苦。飢餓的農民沒有食物可吃，會感覺痛苦。母牛被迫與新生小牛分離，會感覺痛苦。這些實體，則屬於真實。


    當然，我們有可能因為自己相信了虛構故事，而感到痛苦。例如，相信各種民族傳說和宗教神話，可能導致戰爭，而讓數百萬人失去家園、失去肢體，甚至失去生命。戰爭的起源是虛構，但痛苦則是百分之百真實。正因如此，我們才應該努力區分是虛構、或是真實。


    # 回歸故事的本質


    虛構故事本身並沒有錯，而且有其必要。如果沒有金錢、國家或公司這些人人共同接受的故事，就不可能有複雜的人類社會能夠正常運作。要先讓大家都相信了同樣的虛構規則，我們才可能一起踢一場足球；也要讓大家都相信了一些類似的虛構故事，才能讓市場或法庭真正發揮作用。


    然而，這些故事只是工具，不該成為目標、甚至標準。一旦我們忘了這些都只是虛構，就會開始與現實漸行漸遠。於是，可能只是為了「替公司賺很多錢」、或是「保護國家利益」，就讓我們掀起無邊戰火。公司、金錢和國家，都只存在於我們的想像之中。是人類發明了這些概念，好讓它們為人類服務；但為什麼最後反而是人類要為這些概念服務，甚至犧牲性命？


    在二十一世紀，我們還會創造出比以往更強大的虛構概念、更極權的宗教。在生物科技和電腦演算法的協助下，這些宗教不但會控制我們每分每秒的存在，甚至將能夠形塑我們的身體、大腦和心靈，創造出完整的虛擬世界，連地獄和天堂也能創造。這樣一來，要再區分虛構與真實、宗教與科學，將會變得更加困難。但要辨別清楚，卻又比以往更加重要了。


    # 第 5 章 一對冤家


    虛構故事是人類社會的基礎和支柱。隨著歷史不斷演進，關於神祇、國家和公司的故事愈見強大，開始主宰了客觀的現實。正因為相信著偉大的鱷神索貝克、天命、或是《聖經》，讓人能夠闢出法雍湖、建起長城、蓋出沙特爾大教堂（Chartres
    Cathedral）。但遺憾的是，盲目信從這些故事，也就意味人類的努力往往是用來榮耀某些虛構的實體，例如神和國家，而不是讓真正擁有感受的生命過得更美好。


    現在的情況又是如何？乍看之下，會覺得現代社會和古埃及或中世紀的中國大不相同。現代科學興起之後，是不是已經改變了人類遊戲的基本規則？有沒有可能，雖然傳統神話仍然重要，但現代社會制度已經逐漸偏向某些過去還不存在的客觀科學理論，例如演化論？


    我們當然可以說：科學理論也是一種新的神話，現代人相信科學，就像古埃及人相信鱷神索貝克。但這種比較禁不起推敲。索貝克只存在於信徒的想像之中。確實，信仰鱷神索貝克，鞏固了埃及的社會制度，也讓古埃及人建起水壩、開出運河，得以防洪防旱。然而，信仰本身並不會提升或降低尼羅河的水位。相較之下，科學理論絕不只是某種讓人合作的方式。有一種說法是「天助自助者」，這等於是兜了個圈子來說：根本沒有上天，但是對上天的信仰能夠激勵我們自己來做某件事，做為一種助力。相較之下，以抗生素為例，就算人不自助，抗生素也能助人，這可是和上天相去甚遠——不管你相不相信抗生素，它就是有療效。


    因此，現代世界才會與前現代世界大不相同。埃及法老和中國皇帝經過幾千年的努力，仍然未能克服饑荒、瘟疫和戰爭的問題。而現代社會不過短短幾世紀，就已經大功告成了。這難道不是因為我們擁抱了客觀的科學知識、拋棄了互為主體的神話嗎？有沒有可能，這個過程在未來幾十年間加速進展？隨著科技讓我們能夠將人類升級、克服老化、找到幸福快樂的關鍵，難道不會讓人們不再那麼關心虛構的神祇、國家和公司，而一心專注於解譯物理和生物學的現實？


    雖有可能，但實際上事情要遠遠更為複雜。現代科學確實改變了遊戲的規則，但並不是「以事實代替神話」如此簡單。神話仍然主宰人類，科學只是讓神話更為強大。科學非但沒有摧毀互為主體的現實，反而是讓它比以往更能完全控制客觀現實和主觀現實。在電腦和生物工程的協助下，人類開始重塑現實以符合心中的幻想，虛構與現實的界線將會變得更模糊。


    索貝克的祭司幻想著有鱷神存在，法老則幻想能夠長生不死。但在現實中，所謂的鱷神只是一條非常普通的沼澤爬蟲類、穿著金色的衣服，而法老也和最貧窮的農民一樣，終將過世。雖然法老的遺體會用防腐的油膏和香水製作成木乃伊，但還是一樣死得徹徹底底。相較之下，二十一世紀的科學家卻有可能打造出真正的超級鱷魚，並讓人類精英在人世就得到永恆的青春。


    於是，科學興起之後，至少會讓某些神話和宗教變得比以往更為強大。為了瞭解原因、面對二十一世紀的挑戰，我們必須再次回到一項最令人煩惱的問題：現代科學和宗教的關係，究竟為何？這個問題似乎早已提了百萬遍，能說的早已說完。但實際上，科學和宗教就像夫妻，上了五百年的婚姻諮商，仍然未能真正瞭解彼此。他還是一心想著灰姑娘，而她也還是一心念著白馬王子，但兩人卻吵著該輪到誰倒垃圾。


    # 宗教不等於迷信


    之所以會誤解科學和宗教的關係，多半是由於對宗教有錯誤的認知。人們常誤以為宗教就是迷信、靈性、相信超自然力量、或是崇拜神祇。但宗教並不是這些概念。宗教並不等於迷信，因為大多數人都不可能把自己最相信的事稱為迷信。自己相信的，一定是「真理」；只有別人相信的，才會是「迷信」。


    同樣的，也很少有人認為自己相信的是超自然力量。對那些相信惡魔、神靈、精靈的人來說，絕不會認為這些是「超自然」，而會認為這些都是大自然的一部分，與豪豬、蠍子和細菌並沒有兩樣。像是疾病這件事，現代醫師歸咎於看不見的細菌，巫毒祭司則歸咎於看不見的神靈——這沒什麼超自然的：如果你讓某個神靈生氣了，祂就會進到你的身體裡，讓你痛苦萬分。這豈不是再自然不過？只有不相信神靈的人，才會覺得這些事情超出自然的秩序。


    如果你說宗教就是信仰超自然的力量，那等於是說：你認為自己可以不靠宗教，就瞭解所有自然現象，而宗教只是一種選配——是在完全瞭解大自然的全貌後，還能選擇要不要再另外加點宗教的「超自然」教條。但大多數宗教都認為，如果沒有宗教，你根本不可能瞭解世界；不懂這些教條，你就不可能瞭解疾病、旱災或地震的真正原因。


    另外，要說宗教就是「相信神」也有問題。我們常常會說，某個虔誠的基督徒是信仰宗教的，因為她相信神（上帝），而某個狂熱的共產主義人士算不上是信仰宗教，因為共產主義並沒有神。然而宗教是由人所創、而非由神所創；宗教的定義應該是在於社會功能，而非是否有神。只要是任何無所不包的故事，能夠為人類的法律、規範和價值觀，賦予高於一般人的合法性，就應該算是宗教。宗教能夠為人類社會結構找的理由，就是這些結構反映了高於一般人的法則。


    宗教會說，人類都受制於某種道德法則系統，這個系統並非由人所創、也並非人所能改變。於是，虔誠的猶太人會說，這個道德法則系統就是由上帝所創，揭示在《聖經》之中。虔誠的印度教徒則會說，這些法則是由梵天（Brahma）、毘濕奴（Vishnu）和濕婆（Shiva）所創，揭示在《吠陀經》中。至於其他宗教，從佛教和道教，到共產主義、納粹主義和自由主義，也都會說自己那套高於一般人的法則都是源於大自然的自然律，而不是這個上帝或那個神祇所創。當然，每個宗教都各自信奉著不同的自然律、由不同的先知所揭示，從佛陀、老子，再到馬克思和希特勒，各顯神通。


    一個猶太男孩去找他爸爸，問說：「爸，為什麼我們不能吃豬肉啊？」這位爸爸若有所思的摸著他又長又捲的鬍子，回答道：「楊克勒啊，世界本來就是這樣啊。你還小，還不懂，如果我們吃豬肉，上帝會懲罰我們，我們最後不會有好下場。這不是我說的，甚至也不是拉比說的。如果是拉比創造這個世界，或許他就會創造一個讓豬肉也符合猶太戒律的世界。可是創造這個世界的不是拉比，而是上帝。雖然我不知道為什麼，但上帝說了，我們不該吃豬肉。所以我們就該聽話。懂了嗎？」


    1943 年，一個德國男孩去找他爸爸，那是一位資深蓋世太保，男孩問：「爸，為什麼我們要殺猶太人呢？」這位爸爸穿著他筆挺的制服和發亮的皮靴，鄭重解釋道：「弗烈茲啊，世界本來就是這樣啊。你還小，還不懂，如果我們允許猶太人活下去，他們就會造成人類退化、滅絕。這不是我說的，甚至也不是元首說的。如果是希特勒創造這個世界，或許他就會創造一個沒有天擇法則的世界，讓猶太人和雅利安人能夠和諧共處。可是創造這個世界的不是希特勒，他只是設法找出了自然律，然後告訴我們該怎樣遵照自然律來生活。如果不服從這些自然律，最後不會有好下場。懂了嗎？」


    2016 年，一個英國男孩也跑去找他爸爸，那是一位自由民主黨的國會議員，男孩問：「爸，為什麼我們要管中東那些穆斯林的人權啊？」這位爸爸放下手上那杯茶，想了一下，回答道：「鄧肯啊，世界本來就是這樣啊。你還小，還不懂，但所有人、包括中東的穆斯林，其實本質都相同，都該享有一樣的自然權利（天賦人權）。這不是我說的，甚至也不是國會說的。如果是國會創造這個世界，或許在所有那些什麼量子物理以外，也會有個人權委員會，規定讓普世都有人權。可是創造這個世界的不是國會，國會只是想讓一切都合乎道理，我們必須尊重這件事，就算中東的穆斯林也該擁有自然權利，否則我們自己的權利很快也會遭到侵犯，最後不會有好下場。懂了嗎？」'
