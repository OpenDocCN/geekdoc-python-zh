  md: '的就是比較優越。我們智人喜歡告訴自己，人類一定有某些神奇的特質，不僅能讓我們有如此偉大的能力，也為我們這種特權地位，找到道德上的理由。那麼，究竟人類獨特之處何在？


    傳統的一神論會說，只有智人擁有永恆的靈魂。雖然身體會衰老、腐爛，但靈魂會踏上通往救贖或詛咒的旅程，不是在天堂享受永恆的幸福，就是在地獄承受永遠的痛苦。但豬和其他動物沒有靈魂，自然也就不會出演這場宇宙大戲，不過就是活個幾年，接著就死去、化為虛無。因此，我們與其擔心生命短暫的豬，不如多把心思花在人類永恆的靈魂上。


    這絕不是幼兒園裡逗小孩的童話，而是非常強大的神話，即使到了二十一世紀初，仍然不斷影響著數十億人類和動物的生命。就現有的法律、政治和經濟制度而言，相信人類有永恆的靈魂、但動物只有短暫的肉體，可說是這些制度的中心支柱。舉例來說，這能夠解釋為什麼人類能夠宰殺動物為食，甚至只是為樂，就恣意欺凌屠戮！


    但是最新的科學發現，卻完全與這個一神論的神話互相牴觸。科學實驗確實也證明了這個神話的一部分：正如一神論宗教所言，動物沒有靈魂。經過各種小心研究、仔細檢視，都未發現線索證明豬、鼠或獼猴擁有靈魂。但遺憾的是：同樣的實驗卻也影響了一神論神話更重要的第二項假設，也就是人類擁有靈魂。科學家已經讓智人做過千千萬萬種怪異的實驗，找遍了人心臟裡的每個角落、看遍了大腦裡的每一道縫隙，卻仍未發現什麼獨特之處。完全沒有任何科學證據，能夠證明人擁有靈魂、豬則沒有。


