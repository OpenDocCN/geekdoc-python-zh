    2013年5月14日，女星安潔莉娜·裘莉在《紐約時報》發表一篇文章，解釋她為何決定進行雙乳房切除術。多年來，由於母親和外祖母雙雙在相對年輕時罹癌過世，她一直活在乳癌的陰影下。她自己做了基因檢測，也證實帶有抑癌基因BRCA1的變異，根據統計調查，帶有此類基因變異的婦女，罹患乳癌的機率高達87%。雖然當時她並未罹癌，但她決定預防這項可怕的疾病，於是進行了雙乳房切除術。在文章中，裘莉解釋道：「我選擇把自己的故事說出來，是因為有很多女性並不知道自己可能活在癌症的陰影下。我希望她們也能夠進行基因檢測，而如果發現自己風險很高，也能知道有個有力的選項。」<sup>28</sup>


    乳房切除術是一項很困難、也可能致命的抉擇。除了種種不適和風險、手術及術後照護的成本之外，這項決定也可能深深影響個人的健康、身材、情緒及人際關係。裘莉這項抉擇，加上當時決定公開的勇氣，掀起一片轟動，為她贏得全世界的盛譽讚賞。有許多人希望這樣的公開舉動，能讓大眾更認識基因醫學及潛在效益。


    從歷史觀點來看，有趣的是演算法在這個案例所扮演的關鍵角色。裘莉要做出對生活如此重要的決定時，並不是登上山巔俯瞰海洋、看著太陽沉入海中，接觸自己內心最深處的感覺。反而是寧願聽聽自己的基因怎麼說，而基因的表達方式並不是什麼感覺，而是數字。當時，裘莉的身體並沒有任何疼痛或不適，她的感覺告訴自己：「放輕鬆啦，一切沒事啊。」但醫師用的電腦演算法，說法卻完全不同：「你並未感覺有任何不適，但你的DNA裡有個定時炸彈正在滴答倒數。你必須處理這個問題，而且是現在立刻！」


    當然，裘莉的情緒和獨特人格也扮演關鍵角色。如果是另一位個性不同的女性，就算發現自己也有同樣的基因變異，也可能不會'
