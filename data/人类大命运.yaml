- img_proc: true
  md: '他們有意識，無法真正確定。搞不好，其實全宇宙只有我自己在感覺著什麼，而其他所有人類和動物都只是沒有心靈的機器人？或許是我在做夢，而遇見的每個人都只是我夢裡的角色？又或許，我是被困在一個虛擬世界裡面，看到的一切生物都只是模擬？


    根據目前的科學定論，我所體驗到的一切，都是腦電活動的結果，所以理論上確實能夠模擬出一個我完全無法與「真實」分辨開來的虛擬世界。一些腦科學家相信，在不太遠的未來，我們就能做到這種事。也有可能，根本你就已經是住在這樣的世界裡？搞不好今年根本是2216年，你是個窮極無聊的青少年，泡在一個「虛擬世界」的遊戲裡，正在模擬二十一世紀早期這個原始卻又叫人興奮的世界。只要你一承認這種事情確有可能，數學邏輯就會把你帶向一個非常可怕的結論：因為只會有一個真實的世界，而可能的虛擬世界數量無窮無盡，所以你現在這個世界碰巧是真實的可能性，根本趨近於零。


    這個知名而難纏的問題，稱為「他心問題」（Problem of Other Minds），目前為止的所有科學突破，都還無法克服這項問題。目前學者對此提出的最佳測試方法，稱為「圖靈測試」（Turing
    test），但這項測試其實只是檢測是否符合社會常規而已。圖靈測試認為，想判斷某臺電腦算不算具備心靈，做法是安排測試者同時和電腦及另一個真人溝通，而測試者不知道哪個是電腦、哪個是真人。測試者可以任意問問題、玩遊戲、辯論、甚至是調情，時間長短不限；然後再來判斷哪個是電腦、哪個是真人。如果測試者無法決定、或根本選錯，就等於電腦通過了圖靈測試，我們應該認定它具有心靈。但這種測試當然不能做為證明。承認其他心靈的存在，只能說早已是一種社會和法律上的習慣。'
