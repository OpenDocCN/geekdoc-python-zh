    # 「人類演算法」將被取代


    數據主義既非自由主義、亦非人文主義。但要特別強調一點：數據主義並不反對人文主義。數據主義對人類的經驗，並沒有什麼惡意，只是不認為經驗就本質上有何價值。


    前面檢視人文主義的三大教派時，我們曾問過哪個經驗最有價值：是聆聽貝多芬的第五號《命運交響曲》、查克·貝瑞的流行音樂、矮人族成年曲、或是狼嚎？如果就數據主義看來，這整件事根本是抓錯重點，因為衡量音樂的價值時，該看的是它帶來多少數據，而不是它創造了什麼經驗。舉例來說，數據主義就會認為：如果與矮人族的成年曲相較，《命運交響曲》用了更多和弦與音階，而且創造出更多在不同音樂風格間的對話，於是你需要更多的運算能力，才能解讀《命運交響曲》，由此也會獲得更多的知識。


    從這個觀點，音樂也是數學模式，也能用數學來描述每個音樂作品，以及任何兩首曲子之間的關係。這樣一來，所有的交響樂、歌曲和嚎叫，都能測量出精確的數據值，確定哪個最為豐富。至於它們對人類或狼所創造的體驗，其實並不重要。的確，在過去大約七萬年間，人類的經驗是整個世界最有效的資料處理演算法，確實有理由多加推崇。但我們可能很快就會到達臨界點，人類演算法將被取代，甚至成為負擔。'
