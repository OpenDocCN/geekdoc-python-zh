  md: '史上首次，當政府、企業和個人籌劃不遠的將來，多半不會考慮到戰爭的可能性。核武發明之後，超級大國之間如果還想掀起戰端，無異於集體自殺的瘋狂舉動，於是逼著全球最強大的幾個國家，得找出和平的替代方案，來解決衝突。同時，全球經濟的導向也已經從物料走向知識。過去主要的財富來源是物質資產，例如金礦、麥田、油井，而現在的主要財富來源則是知識。發動戰爭雖然能搶下油田，卻無法霸占知識。因此，隨著知識成為最重要的經濟資源，戰爭能帶來的獲利便下降；可能發生戰爭的地方，愈來愈局限在世界的特定區域（像是中東和中非），這些地方仍然維持老式的物料導向經濟。


    盧安達在1998年入侵鄰國剛果，奪占該國豐富的鈮鉭鐵礦；這件事之所以不令人意外，是因為這種礦產是手機和筆記型電腦不可或缺的重要原料，而剛果鈮鉭鐵礦的蘊藏量足足占了全球的80%。盧安達靠著掠奪來的鈮鉭鐵礦，每年能賺到二億四千萬美元，對於貧困的盧安達來說，可是一大筆收入。25


    相較之下，如果中國入侵加州奪下矽谷，卻是毫無道理。因為就算中國獲勝，矽谷也沒有矽礦可劫。中國真正能夠賺到幾十億美元的方式，反而是和蘋果及微軟等高科技龍頭合作，購買軟體，製造硬體產品。盧安達耗費蠻力從剛果搶來鈮鉭鐵礦的全年所得，還不如中國不流血、靠商業在一天賺得多。


    於是，目前「和平」這個詞已經有了新意義。過去幾代人想到和平，只是「暫時沒有戰爭」；而現在想到和平，是指「難以想像會有戰爭」。1913年的人說「法德兩國和平」，意思是法德兩國此刻並無戰事，但明年誰知道呢；但我們現在說「法德兩國和平」，意思是在任何可能預見的情況下，這兩國實在不可能爆發戰爭。這種意'
