  md: '# 這能增強或削弱自由意志？


    這些聲音有些是重複了社會的偏見，有些是附和著我們個人的歷史，也有些傳達出我們的基因傳承。愛蒂認為，這一切創造出一個看不見的故事，在我們不知不覺中，塑造著我們有意識做出的決定。如果我們可以重寫這些內心的獨白、甚至叫它們完全噤聲，會發生什麼事？8


    直到2016年，經顱刺激器仍在起步階段，也無法預測是否會在何時成為成熟的科技。到目前為止，透過這種方式增強能力，只能維持一段短暫的時間。愛蒂的經驗能到二十分鐘，可能是特例中的特例（甚至就只是安慰劑效應而已）。關於經顱刺激器，多數已發表成果的研究，都是人類樣本數極少、情境也有特殊限制，而且長期影響和危險也仍然完全未知。只不過，如果未來這項科技成熟，或是我們找到其他方法來操縱大腦的腦電模式，會對人類社會和人類有何影響？


    如果哪天人類真能控制自己的大腦電路，除了希望自己更有效擊倒恐怖份子之外，可能也會希望實現一些更俗世、自由主義的目標。換句話說，也就是能夠更有效學習和工作，讓自己能全心投入遊戲和嗜好，或是能在任何時刻專心於有趣的事物上（不管是數學或足球）。


    然而，如果這樣的操縱成了一件普遍的事，原本該由顧客自由操縱的意願，就會變成另一項可購買的商品。希望彈得一手好鋼琴，但要練琴時卻又想看電視嗎？沒問題：戴上頭盔、安裝適當的軟體，你就能夠完全只想練鋼琴了。'
