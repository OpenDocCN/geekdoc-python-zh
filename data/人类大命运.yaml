  md: '研發奈米機器人，希望有朝一日能讓它們在人類的血液中巡航，找出及殺死病原體和癌細胞。^{22} 細菌這種微生物，可能已經累積了三十億年對抗生物的經驗，但說到要應付奈米機械敵人，可就完全是新手上路，因此細菌要演化出有效的防衛機制，將會加倍困難。


    雖然我們不敢保證，絕不會爆發新一波伊波拉或未知流感病毒的疫情，橫掃全球造成數百萬人身亡，但至少我們不會認為這是不可避免的天然災害。我們反而會認為：這是不可原諒的人為疏失，要求有人為此負起責任。


    例如2014年夏末，有幾個星期情勢看來相當不妙，似乎伊波拉病毒已經占了上風，當時也就倉促成立了調查委員會。初步報告於2014年10月18日公布，批評世界衛生組織對疫情爆發的反應不合格，並認為這次的疫情要怪罪世界衛生組織非洲辦事處貪汙腐敗、效率低落。進一步的批評還拉高層級，批評整體國際社會的反應太慢、力道不足。這種批評背後的假設，正是認為人類的知識和工具已經足以防治傳染病，如果疫情仍然失控，原因便是人類的無能，而不是什麼神的憤怒。


    愛滋病也是類似的例子，雖然醫師早在多年前便已瞭解愛滋病的機制，但在非洲撒哈拉沙漠以南地區，愛滋病仍持續感染並奪走數百萬人的性命。現在我們也會把它看成是人為疏失，而不是什麼命運太過殘酷。


    所以，在這場與自然災害（例如愛滋病和伊波拉病毒）的爭鬥之中，看來人類是占了上風。但如果是人性自己帶來的危險呢？


    生物科技讓我們能夠打敗細菌和病毒，但同時也讓人類自己陷入前所未有的威脅。同樣的工具，在醫師手上能夠快速找出及治療新疾病，但在軍隊和恐怖份子的手上，就可能變成更可怕的疾病、'
