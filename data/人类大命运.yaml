    # 數據主義觀點下的人類簡史


    從數據主義觀點，可以把全人類看成一套資料處理系統，而每個人都是裡面的一個晶片（處理器）。這樣一來，整部歷史的進程就是要透過四種方式，提高系統效率：


    +   一、增加處理器數量。擁有十萬人口的城市，運算能力就會高於擁有一千人口的村莊。

    二、增加處理器種類。處理器不同，運算和分析數據的方式就不相同。因此，如果資料處理系統擁有許多種不同的處理'
- md: '人類大命運


    器，就能增加系統的動力與創意。農民、祭司和醫師之間的對話所產生的想法，可能是狩獵採集者之間怎麼談都談不到的。


    三、增加處理器之間的連結。如果光是增加處理器數量，但彼此之間無法連結，仍然沒有意義。十座有貿易網路連結的城市，產生的經濟、科技與社會創新，通常都會高於十座孤立的城市。


    四、增加現有連結網的流通自由度。如果資料數據無法自由流通，光是把處理器連結起來，也不會有什麼用處。這就像在是十座城市之間開出了道路，但路上卻滿是搶匪或路霸，商人和旅行者難以通行，效果也就大打折扣。


    這四種方法常常互相矛盾。像是處理器的數量和種類愈多，要能自由連結就愈難。因此，智人資料處理系統的建構，是分成四大階段，各自強調不同的方法。


    第一階段始於認知革命，開始能夠將大量智人連結為單一資料處理網路。這就讓智人擁有超乎其他人類及動物物種的關鍵優勢。對尼安德塔人、黑猩猩或大象來說，能夠連結成單一網路的個體數量有限，但智人卻打破了這個限制。


    智人運用資料處理優勢，遍布了整個世界。但隨著智人分散到不同地區、感受不同氣候，就開始彼此失去連繫，經歷不同的文化變革，於是形成各式各樣的人類文化，各有生活方式、行為模式及世界觀。因此，歷史的第一階段後期，就是增加人類處理器的數量及種類，但同時犧牲了連結：在二萬年前，智人數量遠多於七萬年前，但歐洲智人處理資訊的方式也不同於中國的智人。在當時，歐洲和中國之間並無連結，也幾乎不可能相信，某天所有智人居然會連結成單一的資料處理網路。


    第二階段從農業革命開始，持續到大約五千年前、發明了文字和金錢的時候。農業加速人口成長，使人類處理器數量急劇上升。同時，農業讓更多人能夠群聚生活，形成密集的局部網路，各自擁有數量空前的處理器。此外，農業也為各個局部網路創造動機和契機，鼓勵彼此貿易和溝通交流。但即使發展到這第二階段，仍然是以離心力為主。因為沒有文字和金錢的概念，人類難以建立城市、王國或帝國，仍然只是無數個小部落，各有自己的生活方式和世界觀。要說所有人類會團結形成一體，當時連做夢也想不到。


    第三階段始於大約五千年前發明了文字和金錢，並持續到科學革命肇始。有了文字和金錢之後，人類合作的重力場最終超過了離心力，讓各個團體融合起來，形成城市和王國，而各個城市和王國的政治和商業連結也更為密切。至少到了西元前第一個千禧年（出現了錢幣、帝國和普世宗教），人類已經開始有意識的想像著要建立涵括整個地球的單一網路。


    到了歷史的第四階段、也是最後一個階段，大約始於1492年，這個夢想成為現實。早期的現代探險家、征服者和交易者，一起編織出覆蓋整個世界的頭幾條絲線。到了近代晚期，這些絲線變得更加結實緊密了，在哥倫布時期已如同蛛網；到了二十一世紀，則已經是由鋼鐵和瀝青構成的網路。更重要的是，資訊能夠在這個全球網路裡愈來愈自由的流動。哥倫布剛剛把歐亞網路連結到美國網路時，每年只有極少量資訊能夠越過海洋，還得應付各種文化偏見、嚴格審查和政治打壓。但隨著時間過去，不論是自由市場、科學社群、法治概念或民主傳播，都有助於消除種種障礙。我們常常有所想像，認為民主和自由市場之所以獲勝，是因為它們比較「好」。但事實上，它們之所以勝出，是因為改善了全球資料處理系統。


    於是在過去的七萬年間，人類就是先擴散，再分成不同群體，最後再次合併。但合併並不代表一切回到原點。過去的多元族群融入今天的地球村時，各自都帶著思想、工具和行為上的獨特傳承，呈現一路走來的蒐集與發展。在我們現代的食品櫃裡，就有中東的小麥、南美洲安地斯地區的馬鈴薯、新幾內亞的糖，以及衣索比亞的咖啡。同樣的，我們的語言、宗教、音樂和政治，也充滿著來自地球各地的傳世寶藏。⁵


    如果人類整體就是單一的資料處理系統，它的產出是什麼？數據主義會說，它的產出會是一套全新、效率更高的資料處理系統，稱為萬物互聯網（Internet-of-All-Things）。只要這個任務完成，智人就會功成身退。


    ## 數據主義帶來全新價值觀：資訊自由


    一如資本主義，數據主義一開始也是個中立的科學理論，但正慢慢成為要判別是非的宗教。對這個新宗教來說，最高的價值就是資訊流通。如果生命就是資訊的流動，而我們又認為生命是好的，下一步就是該讓全宇宙的資訊流得更廣、更深。數據主義認為，人類的經驗並不神聖，智人並非造物的巔峰之作，也不是未來神人的前身。人類只是創造萬物互聯網的工具而已，而萬物互聯網可能從地球這個行星向外擴張，擴展到整個星系、甚至整個宇宙。這個宇宙資料處理系統將會如同上帝，無所不在、操控一切，而人類注定將會併入系統之中。


    這種概念讓人回想起某些傳統宗教願景，像是印度教相信人類能夠、也應該融入整個宇宙共有的靈魂，也就是「梵」（atman）的概念；基督徒則相信，聖人死後會充滿上帝的無限恩典，而罪人則是切斷了與上帝的連結。事實上在矽谷，數據主義的先知正是刻意運用傳統上的各種救世說詞。例如庫茲威爾（見第30頁）的預言書就叫做《奇點近了》（The
    Singularity is Near），呼應著施洗約翰的呼喊：「天國近了」（〈馬太福音〉第3章第2節）。


    數據主義告訴那些還崇拜著血肉之軀的人：你們已經太依賴一種過時的科技了，智人就是個該淘汰的演算法。這麼說吧，人類有什麼贏過雞的地方呢？唯一的一點，就是人類的資訊流通模式比雞複雜得多。人類能夠吸收更多資料數據，處理資訊的演算法也比雞更為優秀。（如果用人話來說，也就是說人類有更深的情感、更高的智力。但請別忘記，就現在的生物科學看來，情感和智力也不過都是演算法罷了。）這樣一來，如果我們創造出某個資料處理系統，能夠吸收比人類更多的資料數據，處理資訊的演算法也比人類更為優秀，是不是這個系統就能贏過人，正如人類贏過了雞？


    數據主義不只是空談理論，而是像每個宗教一樣擁有實際的誡命。最重要的第一條誡命，就是數據主義要連結愈來愈多的媒介，產生和使用愈來愈多的資訊，讓資料流最大化。數據主義也像其他成功的宗教，有其傳道使命。它的第二條誡命，就是要把一切連結到系統，就連那些不想加入的異端也不能例外。而且這裡指的一切並不只是人，而真的是一切事物。人類的身體自然不在話下，但另外還包括街上的車、廚房裡的冰箱、雞舍裡的雞、樹林裡的樹，一切都要連結到萬物互聯網上。以後，冰箱就會監看雞蛋還剩幾顆，並在需要補貨時，自動通知雞舍。汽車能夠互相交談，樹木則會報告天氣和二氧化碳含量。我們不會容許宇宙的任何部分與這個偉大的生命網路分開，如果有人斗膽阻礙資料的流通，就是犯下了最大的罪。因為，資訊若不再流通，與死亡又有何異？因此對數據主義來說，「資訊自由」就是最高的善。


    人類很少真正能夠想出全新的價值觀。回首上次已經是十八世紀，人文主義革命開始宣揚人類自由、人類平等、人類博愛這種種令人激動的理想。而自1789年以來，雖然也有許多戰爭、革命和動盪，人類卻並未想出什麼新的價值觀。後來的各種衝突及鬥爭，都是以自由、平等、博愛這三種人文主義價值觀為名，或者基於更早的價值觀，例如要服從上帝、服侍國家。數據主義是自1789年以來第一個真正創造新價值觀的運動，這個新價值觀就是「資訊自由」。


    要注意的是，新的「資訊自由」與過去自由主義所談的「言論自由」不能混為一談。言論自由所賦予的對象是人，保護的是人類思考及說出自己心中所想的權利，當然也保護他們緘默、把想法放在心中的權利。相較之下，資訊自由所賦予的對象並非人類，而是資訊。而且在這種新價值觀看來，資訊自由流通的權利應該高於人類擁有並限制資料流通的權利，因此「資訊自由」甚至可能侵犯到人類傳統的言論自由。


    2013年1月11日，數據主義新科技宗教出現了第一位殉道者：史瓦茲（Aaron Swartz）。這位二十六歲的美國駭客，在自家公寓自殺身亡。史瓦茲是個不世出的天才，十四歲就協同開發出了關鍵的RSS（Really
    Simple Syndication，極簡同步散播、或稱簡易供稿系統）通訊協定。他也是資訊自由的堅定信徒，曾在2008年發表〈開放存取游擊宣言〉（Guerilla
    Open Access Manifesto），呼籲應讓資訊流完全自由、不加限制。史瓦茲在宣言中表示：「無論現在資訊儲存在何處，我們都必須能取得這些資訊、複製、與全世界分享。我們必須蒐集沒有版權限制的內容，並將這些內容建檔加入。我們必須購入那些未公開的資料庫內容，將內容公開在網上。我們必須下載科學期刊內容，上傳到文件共享網路。我們必須為了開放存取，如游擊隊般奮戰。」


    史瓦茲說到做到。譬如使用者必須向期刊資料庫JSTOR付費，才能取得論文，就讓他十分惱火。JSTOR資料庫有數百萬份科學論文和研究成果，JSTOR完全支持科學家和期刊編輯應當享有言論自由，包括支持「這些人認為想讀文章就該付錢」的自由。JSTOR認為，在我研究創造出某種想法之後，如果想以此獲得部分報酬，應該是我的權利。但是史瓦茲可不這麼想。他相信資訊也想要自由，他認為這些想法並不屬於創造它們的人，把資訊鎖在牆後而必須收費才能觀看的做法是錯誤的。於是，史瓦茲用了麻省理工學院的電腦網路存取JSTOR，下載了數十萬份科學論文，打算全部公開到網際網路上，讓人人自由閱讀。


    史瓦茲遭到逮捕，被送上法庭。在他知道自己可能遭到定罪入獄之後，便上吊自殺。對於控告史瓦茲、侵犯資訊自由的學術機構和政府機關，駭客族群發動了各種請願和攻擊。在壓力下，JSTOR對自己在這起悲劇中的角色表示歉意，並開放許多（但仍非全部）資料內容，供免費使用。⁶


    ## 資訊自由好處多


    為了說服那些還在懷疑的人，數據主義的傳教士一再解釋，資訊自由有多大的好處。就像是資本主義相信一切的善都來自經濟成長，數據主義則相信一切的善（包括經濟成長）都來自資訊自由。為什麼美國成長比蘇聯快？因為資訊流動在美國更自由。為什麼美國人比伊朗人或奈及利亞人更健康、更富有、更幸福？都是多虧了資訊自由。所以，如果想要創造更美好的世界，關鍵就是要釋放資料、給它們自由。


    我們已經看到，谷歌能夠比傳統衛生機構更快察覺流行病的爆發，但前提是：必須允許谷歌自由存取我們產出的資訊。資料數據如果能夠自由流動，同樣也能減少汙染和浪費。例如，透過資訊自由，可讓交通運輸系統更為合理。2010年，全球自用車共有超過十億輛，而且還不斷增加。⁷這些車輛汙染地球、浪費大量資源，更別說還得為此不斷加寬道路、增設停車位。民眾又已經習慣擁有自用車的便利，不太可能再回頭搭公車和火車。但數據主義指出，民眾真正想要的並不是車輛本身，而是移動的便利；只要有優秀的資料處理系統，就能簡單又有效的提供這種移動的便利。


    我自己也有一輛車，但多半就是停著。就我平常的一天來說，早上8點04分上車，開車半小時到大學，把車停好，就放著一整天。下午6點11分，我又回到車上，開車半小時回家，就這樣。所以我每天根本只有一小時會用到車，何必另外二十三小時還要把車留著呢？如果有個智慧共乘系統，就能解決這個問題。我能讓電腦知道我需要在早上8點04分離開家，由電腦在那個時候把最近的無人駕駛車調過來，準時讓我上車。把我送到大學之後，這輛車就能用於其他目的，而不用在停車場白白等待。到了下午剛剛好6點11分，我走出大學的門口，就會有另一輛全民共用的無人駕駛車，停在我旁邊，帶我回家。


    這樣一來，只要有五千萬輛共用的無人駕駛車，就能取代十億輛自用車，而且所需的道路、橋梁、隧道和停車空間，都會大大減少。但想當然耳，如果想達到這樣的目地，我就得放棄隱私，允許演算法永遠知道我身在何處、想去何方。


    但也有可能，你根本早就信奉了數據主義（特別是二十歲以下的人）。有些人其實很願意成為資料流的一部分，就算這代表放棄隱私、放棄自主性和個別性，也覺得無傷大雅。


    人文主義藝術推崇個別的天才，所以就算畢卡索是在餐巾上隨筆塗鴉，也能在蘇富比拍賣會，賣出幾百萬美元。人文主義科學讚揚的是個別的學者，因此每個學者都希望自己的名字，哪天能掛上《科學》（Science）或《自然》（Nature）期刊論文的第一作者。然而，現在已經有愈來愈多的藝術和科學創作，都是由「每個人」的不斷合作而誕生。是誰著作了維基百科？我們每個人。


    「個人」正逐漸成為一個巨大系統裡的微小晶片，而這個巨大系統卻沒有人真正瞭解。每天我透過電子郵件、電話和文章，吸收無數位元的資料數據，然後處理這些資料數據，再透過更多的電子郵件、電話和文章，回傳新的資料數據。但我真的不知道，在整個宏觀的架構中，我究竟身屬何處？我所產出的那些資料數據，又和其他幾十億人或電腦產生的資料數據如何連結？而且我也沒有時間找出答案，因為光是回覆電子郵件，就已經耗盡我的時間。隨著我提升效率、能夠更有效處理更多資訊，也就是回覆更多電子郵件、打更多電話、寫更多文章，反而是讓身邊的人淹沒在更多的資料流之中。


    這種無情的資料流，帶來了新的發明和破壞，而且不在任何人的計畫、控制或理解之中。沒有人真能理解全球經濟如何運作，也沒有人知道全球政治將走向何方。但也沒有人真的需要理解這一切。你應當做的，就只是回信回得更快（而且允許系統存取這些內容）。正如自由市場資本主義相信市場那隻看不見的手，數據主義相信資料流也有一隻看不見的手。


    ## 不停的記錄、上傳、分享！


    隨著全球資料處理系統變得全知全能，「連結到這個系統」也就成了所有意義的來源。人類之所以想要融入這個資料流，是因為只要成為資料流的一部分，你就會隸屬於一個比自己更偉大的計畫。傳統宗教向你保證，你說的每個字、你的每個舉止，都是某個偉大宇宙計畫的一部分，上帝一直看顧你，也在意你的所有想法與所有感受。


    至於現在的數據宗教則說，你說的每個字、你的每個舉止，都是偉大資料流的一部分，演算法一直看顧你，也在意你的所有想法與所有感受。大多數人都對此非常滿意。對於真正的信徒來說，要他們脫離資料流，就等於是要冒著失去生命意義的風險。如果你有了某種感受，卻沒有別人知道它、也並未對全球資訊交換有任何貢獻，人生又有什麼意義呢？


    人文主義認為：所有的經驗體驗是發生在我們心中，我們要從自己的心裡找出一切事物的意義，進而為宇宙賦予意義。數據主義則認為：經驗不分享就沒有價值，而且我們並不需要（甚至是不可能）從自己心裡找到意義。我們該做的，就是要記錄自己的經驗，再連結到整個大資料流中，接著演算法就會找出這些經驗的意義，並告訴我們接下來該怎麼做。


    二十年前，日本遊客因為總是拿著相機照個不停，曾經受到全世界的嘲笑；但現在人人都是如此。如果你現在去印度看到一隻大象，你不會看著這隻大象而問問自己心中的感受，而是會趕緊掏出智慧型手機，趕快照張相、上傳臉書，再每隔兩分鐘就檢查一下，看看集到了多少個讚。在前幾個世代，寫日記只給自己看，是很常見的人文主義習慣；但現在，很多年輕人卻覺得完全沒道理。如果沒有其他人能讀到，寫了不都是白寫嗎？現代的新座右銘是：「如果你體驗到什麼，就記錄。如果你記錄了什麼，就上傳。如果你上傳了什麼，就分享！」


    我們在這本《人類大命運》裡不斷問道：究竟是什麼讓人類比其他動物優越？數據主義有一個全新而又簡潔的答案。


    就個體而言，人類的經驗並不比狼或大象的經驗來得優越。只要是資料數據，都無高下之別。然而，人類可以把自己的經驗吟成詩、寫成部落格、發表到網路上，使全球資料處理系統更為豐富。就是這樣，才讓人類的資料數據有了意義。狼做不到這件事，因此雖然狼的各種經驗可能一樣深刻複雜，卻毫無價值。難怪我們會如此忙著將自己的經驗，轉化為各種資料數據。這不是趕不趕流行的問題，而是生存的問題。我們必須向自己和系統證明自己仍然有價值，而且價值不在於單純擁有經驗，而在於將經驗轉化為自由流動的資料數據。


    〔順便提一下，就算是狼（或至少是與牠們血緣很近的狗）的經驗，現在也可能會產生意義。現在已經有一家名為「不再只是汪汪汪」（No More Woof）的公司，正在開發一種能夠讀懂犬類經驗的頭盔。這個頭盔會監測狗的腦波，再用電腦演算法把一些簡單的情緒，像是「我很生氣」，翻譯成人類的語言。⁸所以，你的狗可能也快要牠的臉書或推特帳號了，而且搞不好還會比你拿到更多讚、或是有更多追蹤者。〕


    ## 「人類演算法」將被取代


    數據主義既非自由主義、亦非人文主義。但要特別強調一點：數據主義並不反對人文主義。數據主義對人類的經驗，並沒有什麼惡意，只是不認為經驗就本質上有何價值。


    前面檢視人文主義的三大教派時，我們曾問過哪個經驗最有價值：是聆聽貝多芬的第五號《命運交響曲》、查克·貝瑞的流行音樂、矮人族成年曲、或是狼嚎？如果就數據主義看來，這整件事根本是抓錯重點，因為衡量音樂的價值時，該看的是它帶來多少數據，而不是它創造了什麼經驗。舉例來說，數據主義就會認為：如果與矮人族的成年曲相較，《命運交響曲》用了更多和弦與音階，而且創造出更多在不同音樂風格間的對話，於是你需要更多的運算能力，才能解讀《命運交響曲》，由此也會獲得更多的知識。


    從這個觀點，音樂也是數學模式，也能用數學來描述每個音樂作品，以及任何兩首曲子之間的關係。這樣一來，所有的交響樂、歌曲和嚎叫，都能測量出精確的數據值，確定哪個最為豐富。至於它們對人類或狼所創造的體驗，其實並不重要。的確，在過去大約七萬年間，人類的經驗是整個世界最有效的資料處理演算法，確實有理由多加推崇。但我們可能很快就會到達臨界點，人類演算法將被取代，甚至成為負擔。


    人類是從數萬年前的非洲大草原上開始演化，這套演算法並非天生用來應付二十一世紀的資料流。我們可以嘗試升級人類資料處理系統，但光這樣還不夠，因為萬物互聯網可能很快就會創造出極巨大而快速的資料流，就算是升級後的人類演算法也無法處理。在汽車取代馬車的時候，我們並不是讓馬升級，而是直接讓馬退休。或許，智人也到了該退休的時候。


    數據主義對人類採用嚴格的功能觀點，完全依據能在資料處理機制發揮多少功能，來評估人類經驗的價值。如果我們研發出能夠具備相同功能、而又更有效率的演算法，「人類經驗」這套演算法就會失去價值。因此，如果不只是計程車司機和醫師，就連律師、詩人和音樂家，都能用更厲害的電腦程式取代，那又何必在意這些程式有沒有意識、有沒有主觀經驗呢？如果人文主義又開始讚頌人類經驗的神聖，數據主義會覺得這是個訴諸情感的謊言。「你所稱讚的體驗，只是一種過時的生化演算法。在七萬年前的非洲大草原上，這種演算法可說是頂尖，而且就算到了二十世紀，仍然對軍隊和經濟至關重要。但我們很快就會有更好的演算法！」


    在許多好萊塢科幻電影的最後高潮裡，人類面臨外星人的入侵艦隊、造反的機器人大軍，又或是要消滅全人類的全知超級電腦，一切看來人類已經注定滅亡了；但人類總是在最後一刻反敗為勝，這要感謝的總歸是所有外星人、機器人和超級電腦未曾懷疑、也無法看穿的東西：愛。就像在「駭客任務」（Matrix）裡，主角原本完全被超級電腦玩弄在掌心、被邪惡的機器人射了滿滿一輪子彈，但得到愛人的啟發，就忽然大顯神威，徹底扭轉局勢。


    就數據主義看來，這整個場景實在太荒謬了。它會對好萊塢編劇嗤之以鼻：「拜託，你就只能編出這種玩意啊？愛？而且還不是'
  mdcn: '人類大命運


    器，就能增加系統的動力與創意。農民、祭司和醫師之間的對話所產生的想法，可能是狩獵採集者之間怎麼談都談不到的。


    三、增加處理器之間的連結。如果光是增加處理器數量，但彼此之間無法連結，仍然沒有意義。十座有貿易網路連結的城市，產生的經濟、科技與社會創新，通常都會高於十座孤立的城市。


    四、增加現有連結網的流通自由度。如果資料數據無法自由流通，光是把處理器連結起來，也不會有什麼用處。這就像在是十座城市之間開出了道路，但路上卻滿是搶匪或路霸，商人和旅行者難以通行，效果也就大打折扣。


    這四種方法常常互相矛盾。像是處理器的數量和種類愈多，要能自由連結就愈難。因此，智人資料處理系統的建構，是分成四大階段，各自強調不同的方法。


    第一階段始於認知革命，開始能夠將大量智人連結為單一資料處理網路。這就讓智人擁有超乎其他人類及動物物種的關鍵優勢。對尼安德塔人、黑猩猩或大象來說，能夠連結成單一網路的個體數量有限，但智人卻打破了這個限制。


    智人運用資料處理優勢，遍布了整個世界。但隨著智人分散到不同地區、感受不同氣候，就開始彼此失去連繫，經歷不同的文化變革，於是形成各式各樣的人類文化，各有生活方式、行為模式及世界觀。因此，歷史的第一階段後期，就是增加人類處理器的數量及種類，但同時犧牲了連結：在二萬年前，智人數量遠多於七萬年前，但歐洲智人處理資訊的方式也不同於中國的智人。在當時，歐洲和中國之間並無連結，也幾乎不可能相信，某天所有智人居然會連結成單一的資料處理網路。


    第二階段從農業革命開始，持續到大約五千年前、發明了文字和金錢的時候。農業加速人口成長，使人類處理器數量急劇上升。同時，農業讓更多人能夠群聚生活，形成密集的局部網路，各自擁有數量空前的處理器。此外，農業也為各個局部網路創造動機和契機，鼓勵彼此貿易和溝通交流。但即使發展到這第二階段，仍然是以離心力為主。因為沒有文字和金錢的概念，人類難以建立城市、王國或帝國，仍然只是無數個小部落，各有自己的生活方式和世界觀。要說所有人類會團結形成一體，當時連做夢也想不到。


    第三階段始於大約五千年前發明了文字和金錢，並持續到科學革命肇始。有了文字和金錢之後，人類合作的重力場最終超過了離心力，讓各個團體融合起來，形成城市和王國，而各個城市和王國的政治和商業連結也更為密切。至少到了西元前第一個千禧年（出現了錢幣、帝國和普世宗教），人類已經開始有意識的想像著要建立涵括整個地球的單一網路。


    到了歷史的第四階段、也是最後一個階段，大約始於1492年，這個夢想成為現實。早期的現代探險家、征服者和交易者，一起編織出覆蓋整個世界的頭幾條絲線。到了近代晚期，這些絲線變得更加結實緊密了，在哥倫布時期已如同蛛網；到了二十一世紀，則已經是由鋼鐵和瀝青構成的網路。更重要的是，資訊能夠在這個全球網路裡愈來愈自由的流動。哥倫布剛剛把歐亞網路連結到美國網路時，每年只有極少量資訊能夠越過海洋，還得應付各種文化偏見、嚴格審查和政治打壓。但隨著時間過去，不論是自由市場、科學社群、法治概念或民主傳播，都有助於消除種種障礙。我們常常有所想像，認為民主和自由市場之所以獲勝，是因為它們比較「好」。但事實上，它們之所以勝出，是因為改善了全球資料處理系統。


    於是在過去的七萬年間，人類就是先擴散，再分成不同群體，最後再次合併。但合併並不代表一切回到原點。過去的多元族群融入今天的地球村時，各自都帶著思想、工具和行為上的獨特傳承，呈現一路走來的蒐集與發展。在我們現代的食品櫃裡，就有中東的小麥、南美洲安地斯地區的馬鈴薯、新幾內亞的糖，以及衣索比亞的咖啡。同樣的，我們的語言、宗教、音樂和政治，也充滿著來自地球各地的傳世寶藏。⁵


    如果人類整體就是單一的資料處理系統，它的產出是什麼？數據主義會說，它的產出會是一套全新、效率更高的資料處理系統，稱為萬物互聯網（Internet-of-All-Things）。只要這個任務完成，智人就會功成身退。


    ## 數據主義帶來全新價值觀：資訊自由


    一如資本主義，數據主義一開始也是個中立的科學理論，但正慢慢成為要判別是非的宗教。對這個新宗教來說，最高的價值就是資訊流通。如果生命就是資訊的流動，而我們又認為生命是好的，下一步就是該讓全宇宙的資訊流得更廣、更深。數據主義認為，人類的經驗並不神聖，智人並非造物的巔峰之作，也不是未來神人的前身。人類只是創造萬物互聯網的工具而已，而萬物互聯網可能從地球這個行星向外擴張，擴展到整個星系、甚至整個宇宙。這個宇宙資料處理系統將會如同上帝，無所不在、操控一切，而人類注定將會併入系統之中。


    這種概念讓人回想起某些傳統宗教願景，像是印度教相信人類能夠、也應該融入整個宇宙共有的靈魂，也就是「梵」（atman）的概念；基督徒則相信，聖人死後會充滿上帝的無限恩典，而罪人則是切斷了與上帝的連結。事實上在矽谷，數據主義的先知正是刻意運用傳統上的各種救世說詞。例如庫茲威爾（見第30頁）的預言書就叫做《奇點近了》（The
    Singularity is Near），呼應著施洗約翰的呼喊：「天國近了」（〈馬太福音〉第3章第2節）。


    數據主義告訴那些還崇拜著血肉之軀的人：你們已經太依賴一種過時的科技了，智人就是個該淘汰的演算法。這麼說吧，人類有什麼贏過雞的地方呢？唯一的一點，就是人類的資訊流通模式比雞複雜得多。人類能夠吸收更多資料數據，處理資訊的演算法也比雞更為優秀。（如果用人話來說，也就是說人類有更深的情感、更高的智力。但請別忘記，就現在的生物科學看來，情感和智力也不過都是演算法罷了。）這樣一來，如果我們創造出某個資料處理系統，能夠吸收比人類更多的資料數據，處理資訊的演算法也比人類更為優秀，是不是這個系統就能贏過人，正如人類贏過了雞？


    數據主義不只是空談理論，而是像每個宗教一樣擁有實際的誡命。最重要的第一條誡命，就是數據主義要連結愈來愈多的媒介，產生和使用愈來愈多的資訊，讓資料流最大化。數據主義也像其他成功的宗教，有其傳道使命。它的第二條誡命，就是要把一切連結到系統，就連那些不想加入的異端也不能例外。而且這裡指的一切並不只是人，而真的是一切事物。人類的身體自然不在話下，但另外還包括街上的車、廚房裡的冰箱、雞舍裡的雞、樹林裡的樹，一切都要連結到萬物互聯網上。以後，冰箱就會監看雞蛋還剩幾顆，並在需要補貨時，自動通知雞舍。汽車能夠互相交談，樹木則會報告天氣和二氧化碳含量。我們不會容許宇宙的任何部分與這個偉大的生命網路分開，如果有人斗膽阻礙資料的流通，就是犯下了最大的罪。因為，資訊若不再流通，與死亡又有何異？因此對數據主義來說，「資訊自由」就是最高的善。


    人類很少真正能夠想出全新的價值觀。回首上次已經是十八世紀，人文主義革命開始宣揚人類自由、人類平等、人類博愛這種種令人激動的理想。而自1789年以來，雖然也有許多戰爭、革命和動盪，人類卻並未想出什麼新的價值觀。後來的各種衝突及鬥爭，都是以自由、平等、博愛這三種人文主義價值觀為名，或者基於更早的價值觀，例如要服從上帝、服侍國家。數據主義是自1789年以來第一個真正創造新價值觀的運動，這個新價值觀就是「資訊自由」。


    要注意的是，新的「資訊自由」與過去自由主義所談的「言論自由」不能混為一談。言論自由所賦予的對象是人，保護的是人類思考及說出自己心中所想的權利，當然也保護他們緘默、把想法放在心中的權利。相較之下，資訊自由所賦予的對象並非人類，而是資訊。而且在這種新價值觀看來，資訊自由流通的權利應該高於人類擁有並限制資料流通的權利，因此「資訊自由」甚至可能侵犯到人類傳統的言論自由。


    2013年1月11日，數據主義新科技宗教出現了第一位殉道者：史瓦茲（Aaron Swartz）。這位二十六歲的美國駭客，在自家公寓自殺身亡。史瓦茲是個不世出的天才，十四歲就協同開發出了關鍵的RSS（Really
    Simple Syndication，極簡同步散播、或稱簡易供稿系統）通訊協定。他也是資訊自由的堅定信徒，曾在2008年發表〈開放存取游擊宣言〉（Guerilla
    Open Access Manifesto），呼籲應讓資訊流完全自由、不加限制。史瓦茲在宣言中表示：「無論現在資訊儲存在何處，我們都必須能取得這些資訊、複製、與全世界分享。我們必須蒐集沒有版權限制的內容，並將這些內容建檔加入。我們必須購入那些未公開的資料庫內容，將內容公開在網上。我們必須下載科學期刊內容，上傳到文件共享網路。我們必須為了開放存取，如游擊隊般奮戰。」


    史瓦茲說到做到。譬如使用者必須向期刊資料庫JSTOR付費，才能取得論文，就讓他十分惱火。JSTOR資料庫有數百萬份科學論文和研究成果，JSTOR完全支持科學家和期刊編輯應當享有言論自由，包括支持「這些人認為想讀文章就該付錢」的自由。JSTOR認為，在我研究創造出某種想法之後，如果想以此獲得部分報酬，應該是我的權利。但是史瓦茲可不這麼想。他相信資訊也想要自由，他認為這些想法並不屬於創造它們的人，把資訊鎖在牆後而必須收費才能觀看的做法是錯誤的。於是，史瓦茲用了麻省理工學院的電腦網路存取JSTOR，下載了數十萬份科學論文，打算全部公開到網際網路上，讓人人自由閱讀。


    史瓦茲遭到逮捕，被送上法庭。在他知道自己可能遭到定罪入獄之後，便上吊自殺。對於控告史瓦茲、侵犯資訊自由的學術機構和政府機關，駭客族群發動了各種請願和攻擊。在壓力下，JSTOR對自己在這起悲劇中的角色表示歉意，並開放許多（但仍非全部）資料內容，供免費使用。⁶


    ## 資訊自由好處多


    為了說服那些還在懷疑的人，數據主義的傳教士一再解釋，資訊自由有多大的好處。就像是資本主義相信一切的善都來自經濟成長，數據主義則相信一切的善（包括經濟成長）都來自資訊自由。為什麼美國成長比蘇聯快？因為資訊流動在美國更自由。為什麼美國人比伊朗人或奈及利亞人更健康、更富有、更幸福？都是多虧了資訊自由。所以，如果想要創造更美好的世界，關鍵就是要釋放資料、給它們自由。


    我們已經看到，谷歌能夠比傳統衛生機構更快察覺流行病的爆發，但前提是：必須允許谷歌自由存取我們產出的資訊。資料數據如果能夠自由流動，同樣也能減少汙染和浪費。例如，透過資訊自由，可讓交通運輸系統更為合理。2010年，全球自用車共有超過十億輛，而且還不斷增加。⁷這些車輛汙染地球、浪費大量資源，更別說還得為此不斷加寬道路、增設停車位。民眾又已經習慣擁有自用車的便利，不太可能再回頭搭公車和火車。但數據主義指出，民眾真正想要的並不是車輛本身，而是移動的便利；只要有優秀的資料處理系統，就能簡單又有效的提供這種移動的便利。


    我自己也有一輛車，但多半就是停著。就我平常的一天來說，早上8點04分上車，開車半小時到大學，把車停好，就放著一整天。下午6點11分，我又回到車上，開車半小時回家，就這樣。所以我每天根本只有一小時會用到車，何必另外二十三小時還要把車留著呢？如果有個智慧共乘系統，就能解決這個問題。我能讓電腦知道我需要在早上8點04分離開家，由電腦在那個時候把最近的無人駕駛車調過來，準時讓我上車。把我送到大學之後，這輛車就能用於其他目的，而不用在停車場白白等待。到了下午剛剛好6點11分，我走出大學的門口，就會有另一輛全民共用的無人駕駛車，停在我旁邊，帶我回家。


    這樣一來，只要有五千萬輛共用的無人駕駛車，就能取代十億輛自用車，而且所需的道路、橋梁、隧道和停車空間，都會大大減少。但想當然耳，如果想達到這樣的目地，我就得放棄隱私，允許演算法永遠知道我身在何處、想去何方。


    但也有可能，你根本早就信奉了數據主義（特別是二十歲以下的人）。有些人其實很願意成為資料流的一部分，就算這代表放棄隱私、放棄自主性和個別性，也覺得無傷大雅。


    人文主義藝術推崇個別的天才，所以就算畢卡索是在餐巾上隨筆塗鴉，也能在蘇富比拍賣會，賣出幾百萬美元。人文主義科學讚揚的是個別的學者，因此每個學者都希望自己的名字，哪天能掛上《科學》（Science）或《自然》（Nature）期刊論文的第一作者。然而，現在已經有愈來愈多的藝術和科學創作，都是由「每個人」的不斷合作而誕生。是誰著作了維基百科？我們每個人。


    「個人」正逐漸成為一個巨大系統裡的微小晶片，而這個巨大系統卻沒有人真正瞭解。每天我透過電子郵件、電話和文章，吸收無數位元的資料數據，然後處理這些資料數據，再透過更多的電子郵件、電話和文章，回傳新的資料數據。但我真的不知道，在整個宏觀的架構中，我究竟身屬何處？我所產出的那些資料數據，又和其他幾十億人或電腦產生的資料數據如何連結？而且我也沒有時間找出答案，因為光是回覆電子郵件，就已經耗盡我的時間。隨著我提升效率、能夠更有效處理更多資訊，也就是回覆更多電子郵件、打更多電話、寫更多文章，反而是讓身邊的人淹沒在更多的資料流之中。


    這種無情的資料流，帶來了新的發明和破壞，而且不在任何人的計畫、控制或理解之中。沒有人真能理解全球經濟如何運作，也沒有人知道全球政治將走向何方。但也沒有人真的需要理解這一切。你應當做的，就只是回信回得更快（而且允許系統存取這些內容）。正如自由市場資本主義相信市場那隻看不見的手，數據主義相信資料流也有一隻看不見的手。


    ## 不停的記錄、上傳、分享！


    隨著全球資料處理系統變得全知全能，「連結到這個系統」也就成了所有意義的來源。人類之所以想要融入這個資料流，是因為只要成為資料流的一部分，你就會隸屬於一個比自己更偉大的計畫。傳統宗教向你保證，你說的每個字、你的每個舉止，都是某個偉大宇宙計畫的一部分，上帝一直看顧你，也在意你的所有想法與所有感受。


    至於現在的數據宗教則說，你說的每個字、你的每個舉止，都是偉大資料流的一部分，演算法一直看顧你，也在意你的所有想法與所有感受。大多數人都對此非常滿意。對於真正的信徒來說，要他們脫離資料流，就等於是要冒著失去生命意義的風險。如果你有了某種感受，卻沒有別人知道它、也並未對全球資訊交換有任何貢獻，人生又有什麼意義呢？


    人文主義認為：所有的經驗體驗是發生在我們心中，我們要從自己的心裡找出一切事物的意義，進而為宇宙賦予意義。數據主義則認為：經驗不分享就沒有價值，而且我們並不需要（甚至是不可能）從自己心裡找到意義。我們該做的，就是要記錄自己的經驗，再連結到整個大資料流中，接著演算法就會找出這些經驗的意義，並告訴我們接下來該怎麼做。


    二十年前，日本遊客因為總是拿著相機照個不停，曾經受到全世界的嘲笑；但現在人人都是如此。如果你現在去印度看到一隻大象，你不會看著這隻大象而問問自己心中的感受，而是會趕緊掏出智慧型手機，趕快照張相、上傳臉書，再每隔兩分鐘就檢查一下，看看集到了多少個讚。在前幾個世代，寫日記只給自己看，是很常見的人文主義習慣；但現在，很多年輕人卻覺得完全沒道理。如果沒有其他人能讀到，寫了不都是白寫嗎？現代的新座右銘是：「如果你體驗到什麼，就記錄。如果你記錄了什麼，就上傳。如果你上傳了什麼，就分享！」


    我們在這本《人類大命運》裡不斷問道：究竟是什麼讓人類比其他動物優越？數據主義有一個全新而又簡潔的答案。


    就個體而言，人類的經驗並不比狼或大象的經驗來得優越。只要是資料數據，都無高下之別。然而，人類可以把自己的經驗吟成詩、寫成部落格、發表到網路上，使全球資料處理系統更為豐富。就是這樣，才讓人類的資料數據有了意義。狼做不到這件事，因此雖然狼的各種經驗可能一樣深刻複雜，卻毫無價值。難怪我們會如此忙著將自己的經驗，轉化為各種資料數據。這不是趕不趕流行的問題，而是生存的問題。我們必須向自己和系統證明自己仍然有價值，而且價值不在於單純擁有經驗，而在於將經驗轉化為自由流動的資料數據。


    〔順便提一下，就算是狼（或至少是與牠們血緣很近的狗）的經驗，現在也可能會產生意義。現在已經有一家名為「不再只是汪汪汪」（No More Woof）的公司，正在開發一種能夠讀懂犬類經驗的頭盔。這個頭盔會監測狗的腦波，再用電腦演算法把一些簡單的情緒，像是「我很生氣」，翻譯成人類的語言。⁸所以，你的狗可能也快要牠的臉書或推特帳號了，而且搞不好還會比你拿到更多讚、或是有更多追蹤者。〕


    ## 「人類演算法」將被取代


    數據主義既非自由主義、亦非人文主義。但要特別強調一點：數據主義並不反對人文主義。數據主義對人類的經驗，並沒有什麼惡意，只是不認為經驗就本質上有何價值。


    前面檢視人文主義的三大教派時，我們曾問過哪個經驗最有價值：是聆聽貝多芬的第五號《命運交響曲》、查克·貝瑞的流行音樂、矮人族成年曲、或是狼嚎？如果就數據主義看來，這整件事根本是抓錯重點，因為衡量音樂的價值時，該看的是它帶來多少數據，而不是它創造了什麼經驗。舉例來說，數據主義就會認為：如果與矮人族的成年曲相較，《命運交響曲》用了更多和弦與音階，而且創造出更多在不同音樂風格間的對話，於是你需要更多的運算能力，才能解讀《命運交響曲》，由此也會獲得更多的知識。


    從這個觀點，音樂也是數學模式，也能用數學來描述每個音樂作品，以及任何兩首曲子之間的關係。這樣一來，所有的交響樂、歌曲和嚎叫，都能測量出精確的數據值，確定哪個最為豐富。至於它們對人類或狼所創造的體驗，其實並不重要。的確，在過去大約七萬年間，人類的經驗是整個世界最有效的資料處理演算法，確實有理由多加推崇。但我們可能很快就會到達臨界點，人類演算法將被取代，甚至成為負擔。


    人類是從數萬年前的非洲大草原上開始演化，這套演算法並非天生用來應付二十一世紀的資料流。我們可以嘗試升級人類資料處理系統，但光這樣還不夠，因為萬物互聯網可能很快就會創造出極巨大而快速的資料流，就算是升級後的人類演算法也無法處理。在汽車取代馬車的時候，我們並不是讓馬升級，而是直接讓馬退休。或許，智人也到了該退休的時候。


    數據主義對人類採用嚴格的功能觀點，完全依據能在資料處理機制發揮多少功能，來評估人類經驗的價值。如果我們研發出能夠具備相同功能、而又更有效率的演算法，「人類經驗」這套演算法就會失去價值。因此，如果不只是計程車司機和醫師，就連律師、詩人和音樂家，都能用更厲害的電腦程式取代，那又何必在意這些程式有沒有意識、有沒有主觀經驗呢？如果人文主義又開始讚頌人類經驗的神聖，數據主義會覺得這是個訴諸情感的謊言。「你所稱讚的體驗，只是一種過時的生化演算法。在七萬年前的非洲大草原上，這種演算法可說是頂尖，而且就算到了二十世紀，仍然對軍隊和經濟至關重要。但我們很快就會有更好的演算法！」


    在許多好萊塢科幻電影的最後高潮裡，人類面臨外星人的入侵艦隊、造反的機器人大軍，又或是要消滅全人類的全知超級電腦，一切看來人類已經注定滅亡了；但人類總是在最後一刻反敗為勝，這要感謝的總歸是所有外星人、機器人和超級電腦未曾懷疑、也無法看穿的東西：愛。就像在「駭客任務」（Matrix）裡，主角原本完全被超級電腦玩弄在掌心、被邪惡的機器人射了滿滿一輪子彈，但得到愛人的啟發，就忽然大顯神威，徹底扭轉局勢。


    就數據主義看來，這整個場景實在太荒謬了。它會對好萊塢編劇嗤之以鼻：「拜託，你就只能編出這種玩意啊？愛？而且還不是'
