    # 觀察腦波


    也許生命科學看這個問題的角度錯了？生命科學認為生命就是資料處理，而生物就是進行運算和做出決定的機器。然而，把生物類推成演算法可能是個誤導。在十九世紀，科學家是把大腦和思想比做蒸汽引擎。為什麼用蒸汽引擎做比喻？因為當時那就是最先進的科技，能夠推動火車、輪船和工廠，所以要解釋生命的時候，他們也相信應該是根據類似的原理。於是，他們相信心靈和身體就像是由各種管線、汽缸、活塞和閥門所構成，能夠蓄積和釋放壓力，從而產生各種運動和行為。這種想法甚至也對佛洛伊德的心理學影響甚深，至今仍有很多心理學術語來自機械工程。'
