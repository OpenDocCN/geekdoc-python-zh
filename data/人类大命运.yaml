- md: '什麼柏拉圖式的大愛，只是兩隻哺乳動物的肉體吸引力？你還真以為，如果有個全知的超級電腦或外星人，都要征服整個星系了，居然會被『荷爾蒙爆發』這種小事弄糊塗？」


    數據主義將人類經驗視同數據模式，也就破壞了我們的權威和意義的本源，帶來「自十八世紀以降從未有過的重大宗教革命」。在洛克、休謨和伏爾泰的時代，人文主義認為「上帝是人類想像力的產物」。但現在數據主義以其人之道還治其人之身，說道：「沒錯，上帝是人類想像力的產物，但人類的想像力一樣只是生化演算法的產物。」在十八世紀，人文主義從以神為中心的世界觀，走向以人為中心的世界觀，於是把神推到了一旁。在二十一世紀，數據主義則可能是從以人為中心，走向以資料為中心，於是把人也給推到了一邊。


    ## 從前，要聆聽自己內心的聲音


    數據主義革命可能需要幾十年、甚至一兩個世紀，才能成功，但人文主義革命也不是一夜之間忽然達成。一開始，人類一直相信上帝，認為人類之所以神聖，是因為人類由神所創，有某種神聖的目的。要到許久之後，才有一些人敢說：人類的神聖是靠自己，上帝根本不存在。同樣的，今天大多數的數據主義者認為：萬物互聯網之所以神聖，是因為它由人類所創，要滿足人類的需求。但到最後，萬物互聯網可能只需要靠自己，就有了神聖的意義。


    從以人為中心的世界觀、走向以資料為中心的世界觀，這項轉變並不只是一場哲學上的革命，而是會真真切切影響我們的生活。所有真正重要的革命，都會有實際的影響。人文主義認為「人類發明」，這件事之所以重要，正是因為有深遠的實際影響。同樣的，數據主義認為「生物是演算法」，這件事同樣有極深遠的實際影響，不容小覷。所有的想法都要先改變我們的行為，接著才會改變我們的世界。


    在古巴比倫，每當人們面臨兩難，都會在黑暗的夜裡爬到神廟頂，仰望天空。巴比倫人相信是星星控制他們的命運、預測他們的未來，於是會用觀星的結果決定是否結婚、耕田、發動戰爭。原本的哲學信念，轉化成非常實際的日常作為。


    但像是猶太教和基督教等聖經宗教，則是講了不一樣的故事：「這些星星會說謊。星星是由上帝所創，而上帝早已在《聖經》裡揭露了完整的真理。所以不要再觀星了，讀讀《聖經》吧！」這也是一種非常實際的建議作為。每當人們不知道如何挑揀結婚對象或選擇職業、又或是否應該開戰，就會查經、遵照《聖經》的指示。


    但接著來了人文主義，又講了一個全新的故事：「是人類發明了神、寫了《聖經》，而且用了上千種方式加以詮釋。所以，人類本身才是一切真理的本源。雖然可以把《聖經》當作一部具啟發性的人類作品來讀，但其實不一定需要這樣。如果你面對兩難局面，只要聆聽自己，聽從你內心的聲音就夠了。」接著，人文主義也提供各種詳細的實務指示及建議，告訴你如何聆聽自己——像是看日落、讀歌德、寫寫個人的私密日記、和密友談心，還有舉行民主選舉。


    幾世紀以來，科學家同樣接受了這些人文主義的指示。就算是物理學家想知道該不該結婚，也會去看日落，想多多接觸自己的內心。就算是化學家想考慮該不該接受某個似乎有麻煩的工作機會，也會寫日記、找好友談心。就算是生物學家要爭論該不該開戰或簽署和平條約，也會進行民主投票。就算是腦科學家要把自己震驚四座的發現寫成書，也常常在第一頁引用歌德的文句。這正是人文主義與科學之間現代聯盟的基礎，維持了現代微妙的陰陽平衡：感性与理性、博物館與實驗室、超市與生產線。


    科學家不僅認為人類的感覺是神聖的，甚至還為此找出了很好的演化理由。在達爾文之後，生物學家開始提出解釋，認為所謂感覺，也是透過演化千錘百鍊的複雜演算法，能夠幫助動物做出正確的決定。人類的愛情、恐懼和熱情，並不只是能用來寫詩的曖昧靈性，反而是體現了幾百萬年來的實務智慧。讀《聖經》，得到的是古代耶路撒冷幾位神父和拉比的建議；相較之下，聆聽內心的聲音，遵循的是幾百萬年演化而成的演算法，而且這套演算法已經通過天擇的最高規格品管測試。你的感覺正是幾百萬位祖先的聲音，而且他們都撐過了嚴酷的環境，成功生存和繁衍下來。當然，你的感覺並不見得萬無一失，但已經比大多數其他指導法則更可靠。幾百萬年以來，人的感覺就是全世界最好的演算法。因此，就算是在孔子、穆罕默德或史達林的時代，人人也都應該聆聽自己的感覺，而不是聽從儒教、伊斯蘭教、或共產主義的教訓。


    ## 現在，要聆聽演算法的意見


    可是到了二十一世紀，感覺不再是全世界最好的演算法了。我們正開發出更優秀的演算法，能夠充分利用前所未有的運算能力和巨大資料庫。谷歌和臉書的演算法，不僅完全知道你的感覺，還知道許許多多你自己渾然未覺的事。所以，你應該別再只聽自己心內的感覺，應當開始聽聽這些外部演算法怎麼說。


    # 第 11 章 信數據得永生？


    等到演算法不僅能知道每個人的投票意向，甚至還能從根本的神經原因，分析得知為何某人投民主黨、另一人投共和黨時，又何必辦什麼民主投票呢？過去的人文主義呼籲：「聆聽你的感覺！」而現在的數據主義則呼籲：「聆聽演算法的意見！」


    在你考慮結婚對象或職業、又或該不該開戰的時候，數據主義告訴你，別再浪費時間爬上高山看太陽落入海面了。至於去逛博物館、寫日記、或與朋友談心，也是多此一舉。沒錯，想做出正確決定，你確實要更認識自己。然而在二十一世紀，已經有了比登山、逛博物館或寫日記更好的辦法。以下是一些實用的數據主義指示：


    「你想知道真實的自己？」數據主義這麼問答：「不用爬山或去參觀博物館了，做DNA定序了沒？還沒？你在等什麼？今天就去做！而且還要告訴你的阿公阿嬤、爸爸媽媽、兄弟姊妹，大家都要去做。他們的資料對你也非常重要。另外，知道這些穿戴式的感測器嗎？這些裝置會每天二十四小時，量測你的血壓和心跳。聽過嗎？很好，那就去買一個，連結到智慧型手機上。另外，順便買個行動攝影機和麥克風，把你做的一切都記錄下來，放到網路上。還有，要允許谷歌和臉書存取你所有的電子郵件、監控你所有的聊天紀錄和郵件，並且記錄你所有的按讚和點擊。只要這些都做到了，萬物互聯網的偉大演算法就能告訴你：該跟誰結婚、挑什麼工作，以及是否該開戰。」


    只不過，這些偉大的演算法都是從哪來的？這就是數據主義的神祕之處了。就像基督宗教認為人類無法理解上帝和祂的計畫，數據主義也認為人類的大腦無法理解新的主演算法。


    當然，目前的演算法多半是由人類駭客所寫，但那些真正重要的演算法（譬如「Google搜尋」的演算法），背後都是巨大的開發團隊。每個成員只懂拼圖的一小塊，沒有人真正能夠全盤理解整個演算法。另外，隨著機器學習和人工神經網路興起，有愈來愈多演算法會獨立演化、自我改進、從自己的錯誤中學習。這些演算法分析的資料量是天文數字，絕非人力可及，而且它們也能學會找出人類找不出的模式、採用人類意想不到的策略。最早的種子演算法或許是由人類開發，但隨著演算法逐漸成長，就會走出自己的路，前往人類未曾踏足之地，而且人類也無力追尋。


    # 宇宙資料流裡的小漣漪


    數據主義當然也會面臨批評及異端。正如我們在第3章〈人類的獨特之處〉所見，生命究竟能不能簡化為資料流，還有待商榷。特別是我們也還不清楚，資料流究竟有什麼方式或原因，能夠產生意識和主觀經驗。或許在未來二十年間，我們就能得到一個很好的解釋，但也或許我們會發現，原來生物與演算法還是不同。


    同樣有待商榷的一點，在於生命是否真的只是做出各種決策。在數據主義的影響下，生命科學和社會科學都一心投入研究決策過程，彷彿這就是生命的全部。但實情是否真是如此？知覺、情緒和想法當然對決策很重要，但這就是它們唯一的意義嗎？數據主義對於決策過程愈來愈瞭解，但對於生命的看法卻可能是愈來愈偏斜。


    要對數據主義提出批判性檢視，不僅可能是二十一世紀最大的科學挑戰，更是最急迫的政治和經濟議題。生命科學和社會科學的學者應該自問，把生命當作資料處理系統和決策系統時，是否漏了什麼因素？在這世界上，會不會有什麼是無法簡化成數據的？如果在所有已知的資料處理任務上，無意識演算法終於完全勝過了有意識的人類智能，一旦我們用前者取代後者，可能會失去什麼？


    當然，就算數據主義有錯、生物不只是演算法，也不一定能阻止數據主義接掌世界。過去就有許多宗教，雖然在事實上不盡然正確，卻也是大受歡迎、大權在握。如果基督宗教和共產主義都能如此，數據主義何獨不然？而且，因為數據主義正傳播到所有的科學學門，前景看來特別是一片光明。只要能成為統一的科學典範，就很容易成為難以撼動的教條。要反駁科學典範並非易事；不過到目前為止，從來沒有哪個科學典範真正得到整個科學界一致的採用。於是，某個領域的學者總是能從外部帶入一些異端觀點。但如果從音樂學家到生物學家，人人都採用了同樣的數據主義典範，各種跨領域研究只會讓這個典範不斷增強。這樣一來，就算典範本身仍有缺陷，趨勢也極難抵抗。


    如果數據主義成功征服世界，人類會發生什麼事？一開始，數據主義可能會讓人文主義更加速追求健康、幸福和力量。數據主義正是透過「承諾它會滿足這些人文主義願望」，而得以傳播。為了實現長生不死、幸福快樂、化身為神，我們就需要處理巨量的資料數據，而這遠遠超出人類大腦的能力，所以只能交給演算法了。一旦權力從人類手中交給演算法，人文主義的宏大計畫就可能會慘遭淘汰。只要我們放棄了以人為中心的世界觀，而贊成以資料為中心的世界觀，人類的健康和幸福看來也就不再那麼重要了。畢竟，都已經出現遠遠更優秀的資料處理模型了，何必再糾結於這麼過時的資料處理機器呢？


    我們正努力打造出萬物互聯網，希望能讓我們健康、快樂、擁有強大的力量。然而，一旦萬物互聯網開始運作，人類就有可能從設計者降級成晶片、再降成資料數據，最後在資料數據的洪流中溶解分散，如同滾滾洪流中的一撮泥沙。


    於是，數據主義對人類造成的威脅，正如人類對其他動物造成的威脅。在歷史進程中，人類創造了一個全球性的網路，不論面對任何事物，都以它在這個網路中有何功能，來給予評價。幾千年以來，這讓人充滿自尊和偏見。人類在這個網路中執行著最重要的功能，也就很容易認為自己是這個網路任何成就的主要功臣，並認為自己就是造物的巔峰。至於其他動物，因為牠們執行的只是網路中次要的功能，於是其生命和經驗都遭到低估；甚至，只要動物不再能提供任何功能，就遭到滅絕的命運。


    然而，一旦人類對網路也不再能提供重要功能，就會發現自己到頭來也不是造物的巔峰。我們自己設下的標準，會讓我們也走上長毛象和白鱀豚遭到滅絕的死路。到時回首過去，人類也只會成為宇宙資料流裡的一個小小漣漪。


    # 我們究竟該關注哪些關鍵問題？


    我們無法真正預測未來，因為科技並不會帶來決定性的結果。同樣的科技，也可能創造出非常不一樣的社會。舉例來說，像是火車、電力、無線電、電話這些工業革命的科技，就能用來催生出共產專制、法西斯政權，但也能催生出自由民主政體。讓我們以南北韓為鑑鏡：兩國曾經能夠取得完全相同的科技，但最後選擇的用法只能說是南轅北轍。


    人工智慧和生物科技的興起，肯定會改變世界，但並不代表只會有一種結局。《人類大命運》書中講到的一切情境，都只是可能性，而非預言。如果你覺得某些可能性令你反感，歡迎運用各種新思維或新行為，讓那些可能性無法實現。


    不過，由於我們的思想和行動，通常會受限於當今的意識型態和社會制度，要以全新的方式來思考或行動，並非易事。本書追溯了目前各種制約條件的起源，希望能夠讓我們稍微從中鬆綁，以更多想像力思考我們的未來。


    《人類大命運》這本書所做的，並不是斷言未來必會如何，以致讓我們的視野縮得更窄；而是希望讓我們把視野放得寬闊，體察到還有其他更多選項。正如我一再強調的，沒有人真正知道2050年的就業市場、家庭或生態將會是什麼樣子，又或是由哪些宗教、經濟和政治制度主導世界。


    但放寬視野也可能造成副作用，讓我們比以往更加困惑和不知所措。面對這麼多情況和可能性，該注意哪些才正確？這世界的變化速度比以往更快，而我們又已遭到巨量的資料、想法、承諾和威脅所淹沒。人類正逐漸將手中的權力交給自由市場、交給群眾智慧和外部演算法，部分原因就出於人類無力處理大量資料數據。過去想阻擋思想言論，做法是阻擋資訊流通。但到了二十一世紀，想阻擋思想言論，反而靠的是用不相關的資訊，把人淹沒。如今，我們已經不知道該注意些什麼了，經常浪費時間去研究、辯論一些無關痛癢的議題。


    在古代，力量來自有權取得資料。到今天，力量卻是來自知道該略過什麼。所以，面對這個混沌世界的一切，我們究竟應該注意什麼？


    如果想的是幾個月，注意的可能就是當下的問題，像是中東動亂、歐洲難民危機、中國經濟趨緩。


    如果想的是幾十年，注意的就會是全球暖化、社會不平等的惡化，以及就業市場的破壞。但如果把視野放大到整個生命，其他的問題或發展的重要性，都比不過以下三項彼此息息相關的發展：


    - 一、科學正逐漸聚合在一項無所不包的教條之下，也就是認為所有生物都是演算法、而生命則是在進行資料處理。

    - 二、智能正與意識脫鉤。

    - 三、無意識但具備高度智能的演算法，可能很快就會比我們更瞭解我們。


    這三項發展，引發了三個關鍵問題，希望讀者在讀完這本《人類大命運》之後，仍然能常掛於心：


    - 一、生物真的只是演算法，而生命也真的只是資料處理嗎？

    - 二、智能和意識，究竟哪一項才更有價值？

    - 三、等到無意識但具備高度智能的演算法比我們更瞭解我們，社會、政治和日常生活將會有什麼變化？


