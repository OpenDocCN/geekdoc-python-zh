    人類大命運


    如果我授權谷歌來幫我投票，就能擺脫這樣的命運了。你也知道，谷歌可不是選舉前一天才忽然蹦出來，雖然它也會注意到最近的減稅和選舉支票，但過去四年的點點滴滴一樣是記得清清楚楚。它會知道我每次讀早報時的血壓，也知道我看晚間新聞時，多巴胺分泌量是否下降。谷歌會知道怎樣看穿公關人員華而不實的口號，谷歌也瞭解人生病的時候會稍微傾向右翼，於是據以調整。因此，谷歌投票時，根據的不是我當下瞬間的心態，也不是敘事自我的幻想，而是根據集合所有生化演算法真正的感受和興趣，而得出的結果；這一切生化演算法的集合，正是所謂的「我」。


    當然，谷歌也不見得永遠是對的，畢竟這一切都只是機率。但只要谷歌做出夠多正確的決定，人類就會將更多權力交給它。隨著時間慢慢過去，資料庫規模會逐漸成長，統計數字將會更準確，演算法將會繼續改進，決策的品質也會逐步提高。雖然這套系統永遠不可能完全認識我，也不可能完全不會出錯，但本來就沒有這種必要，只要到了谷歌系統比我自己更認識我的那一天，自由主義就會頹然崩垮。這點其實並沒有聽起來這麼困難，因為大多數人根本就沒有真正瞭解自己。


    而臉書這個谷歌的死敵，最近所委託的一項研究就指出：到了今天，如果要判斷某人的性格和性情，臉書演算法會比這個人的朋友、父母或配偶更為準確。這項研究共有86,220位志願者參與，他們都有個人的臉書帳號，並且填寫了有上百題的人格問卷。臉書演算法接著會根據受測者平常在臉書對文章、圖片、影片等等按讚的紀錄，預測這些志願參與者的回答。過去按讚的次數愈多，預測的準確度就愈高。接著，再把演算法預測的結果，與參與者的同事、朋友、家人和配偶的預測進行比較。了不起的地方在於，演算法只


    384'
