    ## 經驗4號：一個滿月的夜晚，在加拿大洛磯山脈某處。


    一匹狼站在小丘頂，聽著發情的母狼嚎叫。「Awoooooo! Awoooooo!」的聲音一波波撞擊牠的鼓膜，訊號透過聽覺神經傳遞到大腦，腎上腺讓牠的血液充滿腎上腺素。牠的心跳加速、呼吸急促，脖子起了雞皮疙瘩，背脊如有電流通過——
    Awoooooo! Awoooooo!


    這四種經驗裡，哪一種最有價值？


    ## 人類大命運


    有些人喜歡古典樂，有些人喜歡搖滾樂，還有些人喜歡非洲傳統歌謠。學音樂的學生應該盡可能什麼音樂都接觸，最後再到iTunes商店，輸入信用卡號，買下自己喜歡的音樂。聽起來美的，就是美；而且顧客永遠都是對的。


    但再說到那匹狼，因為狼不是人類，牠的經驗價值也就遠低於人。正因此，狼命的價值遠不及人命，殺一匹狼來救一個人，再合理也不過。畢竟，狼又不懂美，當然也不會有信用卡。


    這種自由主義的概念，也體現在「航海家」（Voyager）太空探測船攜帶的黃金唱片上。1977年，美國人向外太空發射了「航海家一號」太空探測船。這艘探測船現在已經離開了太陽系，成為史上第一具進入星際空間的人造物體。在航海家一號上面，除了當時最先進的科學設備，美國航太總署（NASA）還放了一張黃金唱片，希望向任何好奇而前來查看的外星人，介紹地球。


    這張唱片上，記錄著關於地球及地球居民的各種科學與文化資訊、一些圖像和聲音、以及世界各地的幾十首音樂——做為地球世俗藝術成就的樣本。音樂樣本不按排序，蒐集了許多古典音樂，包括貝多芬第五號《命運交響曲》的第一樂章；當代流行音樂，包括查克·貝瑞的〈Johnny
    B. Goode〉；世界各地傳統音樂，包括剛果矮人族女孩唱的成年曲。雖然唱片裡也有犬類的嚎叫聲，但並未歸類於音樂樣本，而是降級到另一個區塊，與風聲、雨聲、浪聲放在一起。


    因此，我們傳給南門二（Alpha Centauri）恆星系的那些可能聽眾的訊息是：貝多芬、查克·貝瑞、矮人族儀式歌曲有同樣的價值，但狼嚎聲完全是另一個類別。


    ## 三種主義，三種觀點


    社會主義的看法，大概有一點也和自由主義相同，也就是認為狼的經驗並沒有價值。


    但講到另外三種經驗，社會主義的態度就大不相同了。社會主義的虔誠信徒會認為：音樂的真正價值並不在於個別傾聽者的經驗，而在於對他人及社會整體的影響。毛澤東就曾經說：「為藝術的藝術，超階級的藝術，和政治並行或互相獨立的藝術，實際上是不存在的。」


    因此，要評價音樂經驗的時候，社會主義注意的地方會是：貝多芬是在歐洲即將進軍征服非洲時，為歐洲白人上層階級寫出第五號《命運交響曲》。這首交響曲反映了啟蒙時代的理想，推崇上層階級的白人，並將征服非洲正當化，認為是「白人應承擔的負擔」。


    而社會主義講到搖滾樂，會提的是：這種音樂乃是由受壓迫的非裔美籍音樂家所開創，靈感來自藍調、爵士和福音歌曲等音樂。但是在1950和1960年代，搖滾樂遭到主流白人美國劫持，被迫服務消費主義、美國帝國主義、以及可口可樂殖民主義。於是搖滾樂被商業化，被享有特權的白人青少年挪用到他們那種小資產階級幻想中的叛亂。查克·貝瑞自己就向資本主義屈服了，他原本的歌詞是「一個名為Johnny
    B. Goode的有色男孩」，但卻在白人電臺的壓力下，改為「一個名為Johnny B. Goode的鄉下男孩」。


    至於剛果矮人族女孩合唱的成年曲，社會主義也會批判：這正是父權結構的一部分，同時對男女兩性洗腦，讓他們遵循壓抑的性別秩序。如果這種歌進了全球市場，則又只是用來加強西方對整個非洲的殖民幻想，特別是對非洲女性。


    所以，哪一種音樂最佳？是貝多芬的第五號交響曲、〈Johnny B. Goode〉、還是矮人族的成年曲？政府是該出資興建歌劇院、搖滾樂演出場所，還是非洲文化展覽廳？我們又該在中小學或大學教那些學音樂的學生什麼呢？別問我了，問問黨的文化書記吧。


    像是「文化比較」這種地雷區，自由主義是小心繞開，以免做出什麼政治不正確的失態舉動；社會主義是一切交給黨來處理，要找出通過地雷區的正確路途；但進化人文主義卻是開開心心的跳進來，把所有地雷都引爆，享受這場混亂。


    進化人文主義的第一步，可能就是指出：自由主義和社會主義都會畫條線，把自己和其他動物隔開，直接認定人就是比狼優越，所以人類的音樂比狼嚎更有價值。然而，人類也會受到演化力量的影響。正如人類比狼優越，某些人類文化也會比其他文化先進。人類的經驗也有明確的階級層次之分，而我們對此並無須抱歉。泰姬瑪哈陵就是比稻草屋更美；米開朗基羅的大衛像就是比我五歲侄女剛做出的黏土雕像更優；貝多芬譜出的音樂也超越了查克·貝瑞或剛果的矮人族。看吧，我們就是敢說！


    進化人文主義認為，如果有人說所有的人類經驗價值都一樣，他若不是笨蛋、就是懦夫——而這種粗鄙或膽怯的態度，就會造成以「文化相對論」（cultural relativism）或「社會平等」這些名義來妨礙社會進步，只會造成人類退化、滅絕。如果自由主義者或社會主義者回到石器時代，他們可能也不特別欣賞拉斯科（Lascaux）洞穴或阿爾塔米拉（Altamira）洞穴的壁畫，並且堅稱尼安德塔人的塗鴉也不輸這些壁畫。


    ## 最慘烈的人文主義宗教戰爭


    一開始，要區分自由人文主義、社會人文主義和進化人文主義有何不同，似乎是件無聊事。畢竟，不論哪個人文主義教派，都與基督教、伊斯蘭教或印度教有巨大的差異，相較之下，不同人文主義教派之間的差別簡直微不足道。只要我們都同意上帝已死，只有人類經驗才能為宇宙帶來意義，這個時候，再去討論人類經驗到底是一律平等、或是有某些比較優越，真有那麼重要嗎？


    然而，隨著人文主義征服了世界，這些原本的內部分裂竟逐漸擴大，驟然引發了史上死傷最慘重的一場人文主義宗教戰爭。


    在二十世紀的第一個十年間，正統教派的自由主義仍然對自己信心滿滿。他們相信，只要讓個人享有最大的言論自由，隨心所欲而行，世界就能享有前所未有的和平與繁榮。雖然世界仍然受制於傳統的階層結構、蒙昧主義的宗教、以及殘酷無情的帝國，要徹底擺脫還需要一些時間，然而每過十年，都會出現新的自由和成就，總有一天，我們就能在地球上創造天堂。1914年6月，原本日子還過得平靜而幸福，自由主義者覺得歷史也站在自己這一邊。


    等到1914年耶誕節，在連綿的戰火下，自由主義者已經幾乎得了砲彈休克症，而且在接下來的幾十年間，這套思想同時遭到左右夾攻。在社會主義信徒看來，自由主義就只像是亞當的那片無花果樹葉，是在為整個無情、剝削、種族歧視的制度遮羞；高舉著「自由」的大纛，在意的其實是「財富」；說著要讓個體有權去做自己感覺良好的事，最後卻演變成要保護中上階級的財富和特權。如果連房租都付不起，還談什麼居住自由？如果連學費都付不起，又有什麼學習自由？如果連車都買不起，旅行的自由又有什麼意義？一則著名的嘲諷笑話就說，在自由主義之下，每個人都有餓死的自由！更糟的是，自由主義鼓勵每個人把自己視為獨立個體，於是同一階級的成員各自分立，無法團結起來對抗壓迫他們的體制。於是，自由主義讓不平等永無止境，使大眾走向貧困，令精英走向孤立。


    自由主義先挨了左邊來的這一拳，已經步履蹣跚，但進化人文主義又從右邊襲來。在種族主義和法西斯主義眼中，自由主義和社會主義都妨礙了天擇，造成人類退化。他們提出警告，如果認定每個人的價值都相同、生育的機會也相同，天擇就無法運作。身為最優越者的那些人，將無法繼續演化成超人類，只能被大批平庸的人淹沒，人類終將滅絕。


    於是，從1914年到1989年，三種人文主義教派掀起一場兇殘的宗教戰爭，自由主義節節敗退，眼看著共產主義和法西斯政權搶下許多國家。而且自由主義的核心思想這時看來，不僅太過天真，甚至可能非常危險。只要讓每個人都有自由，世界就能和平繁榮？瞧瞧世界變成了什麼樣！


    從事後來看，第二次世界大戰似乎是自由主義的偉大勝利，但當時看來可不是這樣。戰爭在1939年9月開打，衝突的一方是強大的自由主義同盟國，另一方則是孤伶伶的納粹德國。就連法西斯主義的義大利一開始也是隔岸觀火，直到隔年6月才參戰。自由主義同盟國在數字上和經濟上都大占優勢。1940年，德國GDP為3.87億美元，而德國的歐洲對手們GDP總值為6.31億美元（不包括大英國協的成員國，以及英、法、荷、比等國的殖民地）。但在1940年春天，德國只花了三個月，就攻下法國、低地國、挪威和丹麥，讓同盟國挨了一記決定性重擊。英國則是靠著英吉利海峽，才免遭同樣的命運。


    ## 社會主義差點席捲天下


    直到自由主義同盟國與蘇聯結盟，才終於打敗德國。蘇聯承受了這場衝突的主要力道，付出遠高於其他國家的慘痛代價——在這場戰爭中，蘇聯人民死亡人數達到二千五百萬，相較之下，英美則是各五十萬人。能夠打敗納粹主義，大半功勞其實應該歸於共產主義，而至少從短期看來，共產主義也是戰爭的最大受益者。


    蘇聯參戰時，是個孤立、不受重視的共產主義國家，但二戰後卻成了全球兩大超級強權之一，領導著一個不斷擴張的國際區塊。到了1949年，東歐成為蘇聯的附庸，中國共產黨贏得中國內戰，美國則陷入了反共的歇斯底里。世界各地的革命份子和反殖民運動份子，熱切將眼光投向莫斯科及北京，而自由主義卻是與種族主義的各個歐洲帝國畫上等號。每當這些帝國崩潰，取而代之的通常是軍事獨裁政權或社會主義政權，而非自由民主政體。1956年，蘇聯總理赫魯雪夫，自信滿滿的向自由主義西方誇下海口：「不論你們喜不喜歡，歷史站在我們這一邊。我們將會把你們埋葬！」


    赫魯雪夫真心如此相信，也有愈來愈多的第三世界領導人和第一世界知識份子，抱持同樣看法。1960和1970年代，「自由」一詞在許多西方大學裡已過度濫用。激進左派運動很自由的致力於破壞秩序，讓北美和西歐社會動盪不斷加劇。劍橋大學、巴黎大學和加州大學柏克萊分校（當時還有「柏克萊人民共和國」的戲稱）的學生，除了會翻閱毛主席的「小紅書」，也會把古巴革命英雄切·格瓦拉的肖像掛在床頭。


    1968年，整個西方世界頻頻爆發抗議與騷動事件，左派浪潮達到高峰。這一年，發生了惡名昭彰的特拉特洛爾科大屠殺（Tlatelolco Massacre），墨西哥安全部隊殺害數十名學生；所謂的朱利亞峽谷街戰役（Battle
    of Valle Giulia），學生在羅馬與義大利警方發生衝突；至於金恩博士遭到暗殺，也在一百多個美國城市引發暴動抗議。該年5月，學生占領了巴黎的街道，戴高樂總統逃到位於德國的法國軍事基地，至於法國的有錢人則是在床上顫抖，做著斷頭臺的噩夢。


    到了1970年，全球有一百三十個獨立國家，但只有三十個國家是自由民主政體，而且多半是塞在歐洲的西北一隅。當時，在第三世界各大國家當中，只有印度在獨立後走上自由的道路。但就算是印度，也與西方集團保持距離，而與蘇聯親近。


    1975年，自由主義陣營遭受最羞辱的一場失敗：越戰結束，北越如同大衛，打倒了美國這個巨人歌利亞。很快的，共產主義便奪下南越、寮國與柬埔寨。1975年4月17日，柬埔寨首都金邊落入赤柬手中。兩星期後，全球人民看著電視，看到直升機從美國駐西貢大使館的屋頂，撤走最後一批美國人。許多人都認定，美國這個帝國正在崩潰。


    就在大家還來不及說出「骨牌效應」這個詞之前，印度總理英迪拉·甘地（Indira Gandhi）突然也宣布印度進入緊急狀態。看來，全球最大的民主政體也正要走上社會主義獨裁的道路。


    自由民主看起來，愈來愈像是老年白人帝國主義者專屬的俱樂部，已經無法對世界其他地方、甚至是對自己國家的青年，有任何貢獻了。


    華盛頓特區自詡為自由世界的領導者，但大多數盟友卻都是專制獨裁的國王，例如沙烏地阿拉伯的哈利德國王（King Khaled）、摩洛哥的哈桑國王（King Hassan）和伊朗的國王；或是軍事獨裁者，例如希臘的上校軍團、智利的皮諾契將軍（General
    Pinochet）、西班牙的佛朗哥將軍（General Franco）、南韓的朴正熙將軍、巴西的蓋澤爾將軍（General Geisel），以及臺灣的蔣介石特級上將。


    雖然西方得到諸多國王和將軍的支持，但在軍事上，華沙公約組織的數量優勢，仍然遠超過北約組織。光是想在常備兵力達到平衡，西方國家就可能不得不放棄自由民主和自由市場，成為永久處於戰備狀態的極權主義國家。最後是靠著核武，才拯救了命懸一線的自由民主。北約採行「互相保證毀滅」（Mutual
    Assured Destruction, MAD）原則，就算蘇聯發動的是傳統攻擊，也會遭受北約發動全面核武回應。自由主義國家提出威脅：「如果你攻擊我們，我們一定會確保沒人能活著走出來。」


    躲在這個恐怖而荒謬的盾牌背後，自由民主和自由市場守住了最後的堡壘，西方繼續享受著性愛、搖滾樂，以及洗衣機、電視、和冰箱。沒有核武，就不會有披頭四，不會有胡士托音樂節，也不會有物資幾乎滿到溢出的超市。可是在1970年代中期，雖然有了核武為恃，前景似乎仍將歸於社會主義。


    ## 自由主義捲土重來


    接著，一切都改變了。自由民主從歷史的垃圾箱裡爬了出來，抖了抖身子，接著征服了世界。事實證明，超市的力量遠大於古拉格集中營。


    這場閃電戰始於南歐，希臘、西班牙和葡萄牙的專制政權崩潰，讓位給民主政府。1977年，英迪拉·甘地解除緊急狀態，在印度重建民主。1980年代，東亞和拉丁美洲的軍事獨裁政權也由民主政府取代，例如巴西、阿根廷、臺灣和南韓。直到1980年代末、1990年代初，自由主義的浪潮化為一波十足的海嘯，沖垮了強大的蘇聯帝國，讓人對於眼前的歷史終局，懷有更高的期望。經過數十年的失敗和挫折，自由主義在冷戰取得決定性的勝利，縱然千瘡百孔，還是成了這場人文主義宗教戰爭的最後贏家。


    隨著蘇聯帝國垮臺，自由民主政體不僅取代了東歐共產政權，甚至也取代了許多前蘇聯加盟共和國，例如波羅的海三小國、烏克蘭、喬治亞和亞美尼亞。就連俄羅斯，現在也假裝自己是個民主政體。冷戰勝利形成了一股新動力，將自由主義模式傳向世界其他地方，特別是在拉丁美洲、南亞和非洲。雖然也有某些自由主義的實驗徹底失敗，但成功案例的數量已足以令人嘆服。像是印尼、奈及利亞和智利，雖然曾由軍事強人統治數十年，但現在都是以民主政體運作。


    如果有個自由主義者在1914年6月沉沉睡去，直到2014年6月才醒來，大概還是會覺得十分自在。我們又再一次相信，只要讓每個人擁有更多的自由，世界就能和平繁榮。整個二十世紀看起來就像是犯了一個大錯。


    回到1914年的春天，人類在自由主義這條公路上奔馳，卻轉錯了彎、進了死路。要再過了八十年、經歷三次駭人的全球戰爭，我們才終於又回到公路上。當然，這幾十年並不是全然的浪費；我們還是得到了抗生素、核能、電腦，還有女性主義、去殖民主義，以及性解放。此外，自由主義本身在經驗中受傷之後，也不再像一個世紀前那麼自負。它向社會主義和法西斯主義這些對手，學來各種想法和制度，特別是承諾向大眾提供教育、衛生和福利服務。


    但驚人的是，自由主義的核心思想幾乎沒有什麼改變，仍然尊重個人自由，也仍然堅信選民最清楚、顧客永遠是對的。在二十一世紀初期，自由主義也成了我們唯一的選項。


    到了2016年，除了由個人主義、人權、民主、自由市場所組成的自由人文主義套裝方案之外，我們似乎沒有什麼真正值得考慮的替代方案。


    2011年曾有一波社會抗爭運動席捲西方世界，像是占領華爾街（Occupy Wall Street）、或是西班牙的15-M運動，但這些運動都並非反對民主、反對個人主義或人權，甚至也不是反對自由市場經濟的基本原則。正好相反，他們是責怪政府未能達成這些自由人文主義的理想。這些運動要求市場必須真正自由，而不是被那些「大到不能倒」的企業或銀行控制和操縱。他們要求要有真正具代表性的民主制度，能夠照顧一般大眾，而不只是照顧有錢的遊說者和有力的利益團體。


    就連那些用最嚴厲詞彙抨擊股票交易所和國會的人，也無法提出另一種可行的世界運作模式。雖然西方學者和運動人士最愛挑自由主義套裝方案的毛病，但至今仍未能提出任何更佳的選項。


    對自由主義來說，中國造成的挑戰似乎要比西方那些社運抗議人士更為嚴峻。雖然中國在政治和經濟方面有所開放，卻仍然既非民主國家、亦非真正的自由市場經濟；但這一切並不妨礙中國成為二十一世紀經濟巨人的腳步。只不過，這個經濟巨人卻投下了一個非常小的意識型態陰影——甚至包括中國人自己在內，現在似乎沒人知道中國究竟相信什麼。理論上，中國仍然信奉共產主義，但實際上卻不是這麼一回事。


    有些中國思想家和黨政領導人，操弄著回歸儒家思想的概念，但那不過是個方便的幌子。這種意識型態的真空狀態，就讓中國在面對從矽谷出現的種種新科技宗教（techno-religion）時，成了一個希望無窮的棲地（科技宗教將在後面的章節討論）。然而，這些信仰著長生不死與虛擬天堂的科技宗教，大概還需要一、二十年，才能站穩腳步。所以到目前為止，中國也尚未真正對自由主義提出替代方案。對於破產的希臘人來說，已經對自由主義模式感到絕望，但想靠著模仿中國找出替代方案，卻也是死路一條。


    ## 科技與宗教的探戈


    那麼，試試激進伊斯蘭主義（radical Islam）如何？又或是基督教基本教義派、彌賽亞派猶太教、復興主義印度教？中國人是不知道自己信什麼，但宗教的基本教義派卻又是太知道自己信什麼了。在尼采宣稱上帝已死超過一個世紀之後，上帝似乎又要重臨人世。但這只是海市蜃樓。上帝確實死了，這不過就是擺脫身體那一瞬間的事而已。激進伊斯蘭主義對自由主義套裝方案，並不構成嚴重威脅，因為雖然他們滿懷狂熱，卻並不真正瞭解二十一世紀的世界，對於我們身邊種種新科技帶來的全新危險和契機，也提不出什麼看法。


    宗教和科技總是跳著一曲優雅微妙的探戈。雙方互相推動、互相依賴，不能與對方離得太遠。科技之所以有求於宗教，是因為每種發明都有許多可能的應用方式，工程師需要一些先知做出關鍵的決定、指出可行的方向。


    在十九世紀，工程師發明的是火車、無線電和內燃機；但是二十世紀證明，運用同樣的工具，也可以創造出法西斯社會、共產獨裁政權或自由民主政體。沒有宗教信仰，科技列車就不能決定要駛往哪個方向。


    另一方面，科技常常也限制了我們對宗教的想像，像是侍者遞上菜單，多少就會限制我們想吃什麼。新科技殺死舊神、催生了新神，所以農業時代的神和狩獵採集時代的神不一樣，工廠工人想像的天堂也與農民不同；有了二十一世紀的革命性新科技之後，出現前所未有的新宗教的可能性，絕對遠遠超過讓中世紀的信條起死回'
  mdcn: '## 經驗1號：音樂學教授坐在維也納歌劇院，聆聽貝多芬第五號《命運交響曲》的開場。


    「Pa pa pa PAM!」的聲音一波波撞擊他的鼓膜，訊號透過聽覺神經傳遞到大腦，腎上腺讓他的血液充滿腎上腺素。他的心跳加速、呼吸急促，脖子起了雞皮疙瘩，背脊如有電流通過——
    Pa pa pa PAM!


    ## 經驗2號：時間是1965年。


    一部福特的「野馬」敞篷跑車，在太平洋海岸公路上油門全開，從舊金山前往洛杉磯。年輕強壯的駕駛把搖滾樂手查克·貝瑞（Chuck Berry）的音量調到最大。「Go!
    Go Johnny go!」聲音一波波撞擊他的鼓膜，訊號透過聽覺神經傳遞到大腦，腎上腺讓他的血液充滿腎上腺素。他的心跳加速、呼吸急促，脖子起了雞皮疙瘩，背脊如有電流通過——
    Go! Go Johnny go, go, go!


    ## 經驗3號：在剛果雨林深處，站著一個矮人族的獵人。


    他聽到附近村落傳來一群女孩合唱著成年曲。「Ye oh, oh. Ye oh, eh.」的聲音一波波撞擊他的鼓膜，訊號透過聽覺神經傳遞到大腦，腎上腺讓他的血液充滿腎上腺素。他的心跳加速、呼吸急促，脖子起了雞皮疙瘩，背脊如有電流通過——
    Ye oh, oh. Ye oh, eh.


    ## 經驗4號：一個滿月的夜晚，在加拿大洛磯山脈某處。


    一匹狼站在小丘頂，聽著發情的母狼嚎叫。「Awoooooo! Awoooooo!」的聲音一波波撞擊牠的鼓膜，訊號透過聽覺神經傳遞到大腦，腎上腺讓牠的血液充滿腎上腺素。牠的心跳加速、呼吸急促，脖子起了雞皮疙瘩，背脊如有電流通過——
    Awoooooo! Awoooooo!


    這四種經驗裡，哪一種最有價值？


    ## 人類大命運


    有些人喜歡古典樂，有些人喜歡搖滾樂，還有些人喜歡非洲傳統歌謠。學音樂的學生應該盡可能什麼音樂都接觸，最後再到iTunes商店，輸入信用卡號，買下自己喜歡的音樂。聽起來美的，就是美；而且顧客永遠都是對的。


    但再說到那匹狼，因為狼不是人類，牠的經驗價值也就遠低於人。正因此，狼命的價值遠不及人命，殺一匹狼來救一個人，再合理也不過。畢竟，狼又不懂美，當然也不會有信用卡。


    這種自由主義的概念，也體現在「航海家」（Voyager）太空探測船攜帶的黃金唱片上。1977年，美國人向外太空發射了「航海家一號」太空探測船。這艘探測船現在已經離開了太陽系，成為史上第一具進入星際空間的人造物體。在航海家一號上面，除了當時最先進的科學設備，美國航太總署（NASA）還放了一張黃金唱片，希望向任何好奇而前來查看的外星人，介紹地球。


    這張唱片上，記錄著關於地球及地球居民的各種科學與文化資訊、一些圖像和聲音、以及世界各地的幾十首音樂——做為地球世俗藝術成就的樣本。音樂樣本不按排序，蒐集了許多古典音樂，包括貝多芬第五號《命運交響曲》的第一樂章；當代流行音樂，包括查克·貝瑞的〈Johnny
    B. Goode〉；世界各地傳統音樂，包括剛果矮人族女孩唱的成年曲。雖然唱片裡也有犬類的嚎叫聲，但並未歸類於音樂樣本，而是降級到另一個區塊，與風聲、雨聲、浪聲放在一起。


    因此，我們傳給南門二（Alpha Centauri）恆星系的那些可能聽眾的訊息是：貝多芬、查克·貝瑞、矮人族儀式歌曲有同樣的價值，但狼嚎聲完全是另一個類別。


    ## 三種主義，三種觀點


    社會主義的看法，大概有一點也和自由主義相同，也就是認為狼的經驗並沒有價值。


    但講到另外三種經驗，社會主義的態度就大不相同了。社會主義的虔誠信徒會認為：音樂的真正價值並不在於個別傾聽者的經驗，而在於對他人及社會整體的影響。毛澤東就曾經說：「為藝術的藝術，超階級的藝術，和政治並行或互相獨立的藝術，實際上是不存在的。」


    因此，要評價音樂經驗的時候，社會主義注意的地方會是：貝多芬是在歐洲即將進軍征服非洲時，為歐洲白人上層階級寫出第五號《命運交響曲》。這首交響曲反映了啟蒙時代的理想，推崇上層階級的白人，並將征服非洲正當化，認為是「白人應承擔的負擔」。


    而社會主義講到搖滾樂，會提的是：這種音樂乃是由受壓迫的非裔美籍音樂家所開創，靈感來自藍調、爵士和福音歌曲等音樂。但是在1950和1960年代，搖滾樂遭到主流白人美國劫持，被迫服務消費主義、美國帝國主義、以及可口可樂殖民主義。於是搖滾樂被商業化，被享有特權的白人青少年挪用到他們那種小資產階級幻想中的叛亂。查克·貝瑞自己就向資本主義屈服了，他原本的歌詞是「一個名為Johnny
    B. Goode的有色男孩」，但卻在白人電臺的壓力下，改為「一個名為Johnny B. Goode的鄉下男孩」。


    至於剛果矮人族女孩合唱的成年曲，社會主義也會批判：這正是父權結構的一部分，同時對男女兩性洗腦，讓他們遵循壓抑的性別秩序。如果這種歌進了全球市場，則又只是用來加強西方對整個非洲的殖民幻想，特別是對非洲女性。


    所以，哪一種音樂最佳？是貝多芬的第五號交響曲、〈Johnny B. Goode〉、還是矮人族的成年曲？政府是該出資興建歌劇院、搖滾樂演出場所，還是非洲文化展覽廳？我們又該在中小學或大學教那些學音樂的學生什麼呢？別問我了，問問黨的文化書記吧。


    像是「文化比較」這種地雷區，自由主義是小心繞開，以免做出什麼政治不正確的失態舉動；社會主義是一切交給黨來處理，要找出通過地雷區的正確路途；但進化人文主義卻是開開心心的跳進來，把所有地雷都引爆，享受這場混亂。


    進化人文主義的第一步，可能就是指出：自由主義和社會主義都會畫條線，把自己和其他動物隔開，直接認定人就是比狼優越，所以人類的音樂比狼嚎更有價值。然而，人類也會受到演化力量的影響。正如人類比狼優越，某些人類文化也會比其他文化先進。人類的經驗也有明確的階級層次之分，而我們對此並無須抱歉。泰姬瑪哈陵就是比稻草屋更美；米開朗基羅的大衛像就是比我五歲侄女剛做出的黏土雕像更優；貝多芬譜出的音樂也超越了查克·貝瑞或剛果的矮人族。看吧，我們就是敢說！


    進化人文主義認為，如果有人說所有的人類經驗價值都一樣，他若不是笨蛋、就是懦夫——而這種粗鄙或膽怯的態度，就會造成以「文化相對論」（cultural relativism）或「社會平等」這些名義來妨礙社會進步，只會造成人類退化、滅絕。如果自由主義者或社會主義者回到石器時代，他們可能也不特別欣賞拉斯科（Lascaux）洞穴或阿爾塔米拉（Altamira）洞穴的壁畫，並且堅稱尼安德塔人的塗鴉也不輸這些壁畫。


    ## 最慘烈的人文主義宗教戰爭


    一開始，要區分自由人文主義、社會人文主義和進化人文主義有何不同，似乎是件無聊事。畢竟，不論哪個人文主義教派，都與基督教、伊斯蘭教或印度教有巨大的差異，相較之下，不同人文主義教派之間的差別簡直微不足道。只要我們都同意上帝已死，只有人類經驗才能為宇宙帶來意義，這個時候，再去討論人類經驗到底是一律平等、或是有某些比較優越，真有那麼重要嗎？


    然而，隨著人文主義征服了世界，這些原本的內部分裂竟逐漸擴大，驟然引發了史上死傷最慘重的一場人文主義宗教戰爭。


    在二十世紀的第一個十年間，正統教派的自由主義仍然對自己信心滿滿。他們相信，只要讓個人享有最大的言論自由，隨心所欲而行，世界就能享有前所未有的和平與繁榮。雖然世界仍然受制於傳統的階層結構、蒙昧主義的宗教、以及殘酷無情的帝國，要徹底擺脫還需要一些時間，然而每過十年，都會出現新的自由和成就，總有一天，我們就能在地球上創造天堂。1914年6月，原本日子還過得平靜而幸福，自由主義者覺得歷史也站在自己這一邊。


    等到1914年耶誕節，在連綿的戰火下，自由主義者已經幾乎得了砲彈休克症，而且在接下來的幾十年間，這套思想同時遭到左右夾攻。在社會主義信徒看來，自由主義就只像是亞當的那片無花果樹葉，是在為整個無情、剝削、種族歧視的制度遮羞；高舉著「自由」的大纛，在意的其實是「財富」；說著要讓個體有權去做自己感覺良好的事，最後卻演變成要保護中上階級的財富和特權。如果連房租都付不起，還談什麼居住自由？如果連學費都付不起，又有什麼學習自由？如果連車都買不起，旅行的自由又有什麼意義？一則著名的嘲諷笑話就說，在自由主義之下，每個人都有餓死的自由！更糟的是，自由主義鼓勵每個人把自己視為獨立個體，於是同一階級的成員各自分立，無法團結起來對抗壓迫他們的體制。於是，自由主義讓不平等永無止境，使大眾走向貧困，令精英走向孤立。


    自由主義先挨了左邊來的這一拳，已經步履蹣跚，但進化人文主義又從右邊襲來。在種族主義和法西斯主義眼中，自由主義和社會主義都妨礙了天擇，造成人類退化。他們提出警告，如果認定每個人的價值都相同、生育的機會也相同，天擇就無法運作。身為最優越者的那些人，將無法繼續演化成超人類，只能被大批平庸的人淹沒，人類終將滅絕。


    於是，從1914年到1989年，三種人文主義教派掀起一場兇殘的宗教戰爭，自由主義節節敗退，眼看著共產主義和法西斯政權搶下許多國家。而且自由主義的核心思想這時看來，不僅太過天真，甚至可能非常危險。只要讓每個人都有自由，世界就能和平繁榮？瞧瞧世界變成了什麼樣！


    從事後來看，第二次世界大戰似乎是自由主義的偉大勝利，但當時看來可不是這樣。戰爭在1939年9月開打，衝突的一方是強大的自由主義同盟國，另一方則是孤伶伶的納粹德國。就連法西斯主義的義大利一開始也是隔岸觀火，直到隔年6月才參戰。自由主義同盟國在數字上和經濟上都大占優勢。1940年，德國GDP為3.87億美元，而德國的歐洲對手們GDP總值為6.31億美元（不包括大英國協的成員國，以及英、法、荷、比等國的殖民地）。但在1940年春天，德國只花了三個月，就攻下法國、低地國、挪威和丹麥，讓同盟國挨了一記決定性重擊。英國則是靠著英吉利海峽，才免遭同樣的命運。


    ## 社會主義差點席捲天下


    直到自由主義同盟國與蘇聯結盟，才終於打敗德國。蘇聯承受了這場衝突的主要力道，付出遠高於其他國家的慘痛代價——在這場戰爭中，蘇聯人民死亡人數達到二千五百萬，相較之下，英美則是各五十萬人。能夠打敗納粹主義，大半功勞其實應該歸於共產主義，而至少從短期看來，共產主義也是戰爭的最大受益者。


    蘇聯參戰時，是個孤立、不受重視的共產主義國家，但二戰後卻成了全球兩大超級強權之一，領導著一個不斷擴張的國際區塊。到了1949年，東歐成為蘇聯的附庸，中國共產黨贏得中國內戰，美國則陷入了反共的歇斯底里。世界各地的革命份子和反殖民運動份子，熱切將眼光投向莫斯科及北京，而自由主義卻是與種族主義的各個歐洲帝國畫上等號。每當這些帝國崩潰，取而代之的通常是軍事獨裁政權或社會主義政權，而非自由民主政體。1956年，蘇聯總理赫魯雪夫，自信滿滿的向自由主義西方誇下海口：「不論你們喜不喜歡，歷史站在我們這一邊。我們將會把你們埋葬！」


    赫魯雪夫真心如此相信，也有愈來愈多的第三世界領導人和第一世界知識份子，抱持同樣看法。1960和1970年代，「自由」一詞在許多西方大學裡已過度濫用。激進左派運動很自由的致力於破壞秩序，讓北美和西歐社會動盪不斷加劇。劍橋大學、巴黎大學和加州大學柏克萊分校（當時還有「柏克萊人民共和國」的戲稱）的學生，除了會翻閱毛主席的「小紅書」，也會把古巴革命英雄切·格瓦拉的肖像掛在床頭。


    1968年，整個西方世界頻頻爆發抗議與騷動事件，左派浪潮達到高峰。這一年，發生了惡名昭彰的特拉特洛爾科大屠殺（Tlatelolco Massacre），墨西哥安全部隊殺害數十名學生；所謂的朱利亞峽谷街戰役（Battle
    of Valle Giulia），學生在羅馬與義大利警方發生衝突；至於金恩博士遭到暗殺，也在一百多個美國城市引發暴動抗議。該年5月，學生占領了巴黎的街道，戴高樂總統逃到位於德國的法國軍事基地，至於法國的有錢人則是在床上顫抖，做著斷頭臺的噩夢。


    到了1970年，全球有一百三十個獨立國家，但只有三十個國家是自由民主政體，而且多半是塞在歐洲的西北一隅。當時，在第三世界各大國家當中，只有印度在獨立後走上自由的道路。但就算是印度，也與西方集團保持距離，而與蘇聯親近。


    1975年，自由主義陣營遭受最羞辱的一場失敗：越戰結束，北越如同大衛，打倒了美國這個巨人歌利亞。很快的，共產主義便奪下南越、寮國與柬埔寨。1975年4月17日，柬埔寨首都金邊落入赤柬手中。兩星期後，全球人民看著電視，看到直升機從美國駐西貢大使館的屋頂，撤走最後一批美國人。許多人都認定，美國這個帝國正在崩潰。


    就在大家還來不及說出「骨牌效應」這個詞之前，印度總理英迪拉·甘地（Indira Gandhi）突然也宣布印度進入緊急狀態。看來，全球最大的民主政體也正要走上社會主義獨裁的道路。


    自由民主看起來，愈來愈像是老年白人帝國主義者專屬的俱樂部，已經無法對世界其他地方、甚至是對自己國家的青年，有任何貢獻了。


    華盛頓特區自詡為自由世界的領導者，但大多數盟友卻都是專制獨裁的國王，例如沙烏地阿拉伯的哈利德國王（King Khaled）、摩洛哥的哈桑國王（King Hassan）和伊朗的國王；或是軍事獨裁者，例如希臘的上校軍團、智利的皮諾契將軍（General
    Pinochet）、西班牙的佛朗哥將軍（General Franco）、南韓的朴正熙將軍、巴西的蓋澤爾將軍（General Geisel），以及臺灣的蔣介石特級上將。


    雖然西方得到諸多國王和將軍的支持，但在軍事上，華沙公約組織的數量優勢，仍然遠超過北約組織。光是想在常備兵力達到平衡，西方國家就可能不得不放棄自由民主和自由市場，成為永久處於戰備狀態的極權主義國家。最後是靠著核武，才拯救了命懸一線的自由民主。北約採行「互相保證毀滅」（Mutual
    Assured Destruction, MAD）原則，就算蘇聯發動的是傳統攻擊，也會遭受北約發動全面核武回應。自由主義國家提出威脅：「如果你攻擊我們，我們一定會確保沒人能活著走出來。」


    躲在這個恐怖而荒謬的盾牌背後，自由民主和自由市場守住了最後的堡壘，西方繼續享受著性愛、搖滾樂，以及洗衣機、電視、和冰箱。沒有核武，就不會有披頭四，不會有胡士托音樂節，也不會有物資幾乎滿到溢出的超市。可是在1970年代中期，雖然有了核武為恃，前景似乎仍將歸於社會主義。


    ## 自由主義捲土重來


    接著，一切都改變了。自由民主從歷史的垃圾箱裡爬了出來，抖了抖身子，接著征服了世界。事實證明，超市的力量遠大於古拉格集中營。


    這場閃電戰始於南歐，希臘、西班牙和葡萄牙的專制政權崩潰，讓位給民主政府。1977年，英迪拉·甘地解除緊急狀態，在印度重建民主。1980年代，東亞和拉丁美洲的軍事獨裁政權也由民主政府取代，例如巴西、阿根廷、臺灣和南韓。直到1980年代末、1990年代初，自由主義的浪潮化為一波十足的海嘯，沖垮了強大的蘇聯帝國，讓人對於眼前的歷史終局，懷有更高的期望。經過數十年的失敗和挫折，自由主義在冷戰取得決定性的勝利，縱然千瘡百孔，還是成了這場人文主義宗教戰爭的最後贏家。


    隨著蘇聯帝國垮臺，自由民主政體不僅取代了東歐共產政權，甚至也取代了許多前蘇聯加盟共和國，例如波羅的海三小國、烏克蘭、喬治亞和亞美尼亞。就連俄羅斯，現在也假裝自己是個民主政體。冷戰勝利形成了一股新動力，將自由主義模式傳向世界其他地方，特別是在拉丁美洲、南亞和非洲。雖然也有某些自由主義的實驗徹底失敗，但成功案例的數量已足以令人嘆服。像是印尼、奈及利亞和智利，雖然曾由軍事強人統治數十年，但現在都是以民主政體運作。


    如果有個自由主義者在1914年6月沉沉睡去，直到2014年6月才醒來，大概還是會覺得十分自在。我們又再一次相信，只要讓每個人擁有更多的自由，世界就能和平繁榮。整個二十世紀看起來就像是犯了一個大錯。


    回到1914年的春天，人類在自由主義這條公路上奔馳，卻轉錯了彎、進了死路。要再過了八十年、經歷三次駭人的全球戰爭，我們才終於又回到公路上。當然，這幾十年並不是全然的浪費；我們還是得到了抗生素、核能、電腦，還有女性主義、去殖民主義，以及性解放。此外，自由主義本身在經驗中受傷之後，也不再像一個世紀前那麼自負。它向社會主義和法西斯主義這些對手，學來各種想法和制度，特別是承諾向大眾提供教育、衛生和福利服務。


    但驚人的是，自由主義的核心思想幾乎沒有什麼改變，仍然尊重個人自由，也仍然堅信選民最清楚、顧客永遠是對的。在二十一世紀初期，自由主義也成了我們唯一的選項。


    到了2016年，除了由個人主義、人權、民主、自由市場所組成的自由人文主義套裝方案之外，我們似乎沒有什麼真正值得考慮的替代方案。


    2011年曾有一波社會抗爭運動席捲西方世界，像是占領華爾街（Occupy Wall Street）、或是西班牙的15-M運動，但這些運動都並非反對民主、反對個人主義或人權，甚至也不是反對自由市場經濟的基本原則。正好相反，他們是責怪政府未能達成這些自由人文主義的理想。這些運動要求市場必須真正自由，而不是被那些「大到不能倒」的企業或銀行控制和操縱。他們要求要有真正具代表性的民主制度，能夠照顧一般大眾，而不只是照顧有錢的遊說者和有力的利益團體。


    就連那些用最嚴厲詞彙抨擊股票交易所和國會的人，也無法提出另一種可行的世界運作模式。雖然西方學者和運動人士最愛挑自由主義套裝方案的毛病，但至今仍未能提出任何更佳的選項。


    對自由主義來說，中國造成的挑戰似乎要比西方那些社運抗議人士更為嚴峻。雖然中國在政治和經濟方面有所開放，卻仍然既非民主國家、亦非真正的自由市場經濟；但這一切並不妨礙中國成為二十一世紀經濟巨人的腳步。只不過，這個經濟巨人卻投下了一個非常小的意識型態陰影——甚至包括中國人自己在內，現在似乎沒人知道中國究竟相信什麼。理論上，中國仍然信奉共產主義，但實際上卻不是這麼一回事。


    有些中國思想家和黨政領導人，操弄著回歸儒家思想的概念，但那不過是個方便的幌子。這種意識型態的真空狀態，就讓中國在面對從矽谷出現的種種新科技宗教（techno-religion）時，成了一個希望無窮的棲地（科技宗教將在後面的章節討論）。然而，這些信仰著長生不死與虛擬天堂的科技宗教，大概還需要一、二十年，才能站穩腳步。所以到目前為止，中國也尚未真正對自由主義提出替代方案。對於破產的希臘人來說，已經對自由主義模式感到絕望，但想靠著模仿中國找出替代方案，卻也是死路一條。


    ## 科技與宗教的探戈


    那麼，試試激進伊斯蘭主義（radical Islam）如何？又或是基督教基本教義派、彌賽亞派猶太教、復興主義印度教？中國人是不知道自己信什麼，但宗教的基本教義派卻又是太知道自己信什麼了。在尼采宣稱上帝已死超過一個世紀之後，上帝似乎又要重臨人世。但這只是海市蜃樓。上帝確實死了，這不過就是擺脫身體那一瞬間的事而已。激進伊斯蘭主義對自由主義套裝方案，並不構成嚴重威脅，因為雖然他們滿懷狂熱，卻並不真正瞭解二十一世紀的世界，對於我們身邊種種新科技帶來的全新危險和契機，也提不出什麼看法。


    宗教和科技總是跳著一曲優雅微妙的探戈。雙方互相推動、互相依賴，不能與對方離得太遠。科技之所以有求於宗教，是因為每種發明都有許多可能的應用方式，工程師需要一些先知做出關鍵的決定、指出可行的方向。


    在十九世紀，工程師發明的是火車、無線電和內燃機；但是二十世紀證明，運用同樣的工具，也可以創造出法西斯社會、共產獨裁政權或自由民主政體。沒有宗教信仰，科技列車就不能決定要駛往哪個方向。


    另一方面，科技常常也限制了我們對宗教的想像，像是侍者遞上菜單，多少就會限制我們想吃什麼。新科技殺死舊神、催生了新神，所以農業時代的神和狩獵採集時代的神不一樣，工廠工人想像的天堂也與農民不同；有了二十一世紀的革命性新科技之後，出現前所未有的新宗教的可能性，絕對遠遠超過讓中世紀的信條起死回'
