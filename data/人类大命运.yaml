    Dinner）、契克森米哈賴（Mihaly Csikszentmihalyi）等權威專家認為，心理學除了研究心理的疾病，也該研究心理的積極力量。究竟為什麼，我們對生病的心靈瞭解得如此清楚，卻對正常強健的心靈沒有一張科學的地圖？在過去二十年之間，正向心理學已經對優於規範（super-normative）的心理狀態研究，邁出了重要的第一步，可是直到2016年，科學對於這片領域仍然近乎一無所知。


    在這種情況下，我們可能就是盲目向前衝，一心提升當下經濟和政治制度需要的心靈能力，卻忽略、甚至貶抑了其他心靈能力。當然，這種現象自古皆然。幾千年來，社會都會根據當時的需求，來塑造及重塑人類的心靈。智人原本的演化，只是要成為一小群親密社群裡的成員，這種心靈能力並不會讓他們習慣當個巨大機器的小齒輪。但隨著城市、王國和帝國興起，社會培養了大規模合作所需的能力，但同時也漸漸忽略了其他技能和性向。


