    # 超級醫師：華生


    就連醫師也無法倖免。大多數醫師最主要的任務，就是要正確診斷疾病、建議最好的療法。如果我上診所，主訴發燒、腹瀉，問題可能是食物中毒。然而，同樣的症狀也可能是腸病毒、霍亂、痢疾、瘧疾、癌症，或是什麼未知的新疾病。醫師只有幾分鐘能做出正確的診斷，因為我的保險就只付得起這麼多時間。所以，醫師根本只能問幾個問題，或許再快速做個簡單檢查，接著就得用這少得可憐的資訊，交叉參照我的病史、以及過濾所有人類的疾病。


    唉，不管醫師再怎麼認真，又怎麼可能記得住我以前生過什麼病、做過什麼檢查？同樣的，沒有人能夠熟悉每種疾病和藥物，也不可能讀過每一種醫學期刊的最新文章。最重要的是，醫師如果累了、餓了、甚至生病，都會影響診斷。也就難怪醫師有時會誤診，又或是建議了並非最理想的療法。


    現在讓我們來看看IBM著名的「華生」（Watson）超級電腦，這套人工智慧（AI）系統在2011年贏得電視益智搶答節目「危險境地」（Jeopardy!）首獎，擊敗該節目史上最強的兩位參賽者。


    目前華生的工作則嚴肅許多，主要就是診斷疾病。像華生這樣的AI，比起人類醫師會有某些巨大的潛在優勢。首先，AI可以將史上所有已知疾病和藥物的資訊，全部存在資料庫裡。而且這種資'
  - '[PAGE 360]


    料庫還能每天更新，不僅得知最新研究結果，還能接收世界上所有相關診所和醫院蒐集到的醫療統計資訊。


    第二，華生不僅能熟知我的整個基因組、我完完整整的病史，甚至連我的父母、兄弟姊妹、表兄弟姊妹、鄰居和朋友的基因組和病史，它也一樣瞭若指掌。華生能立刻知道我是不是最近去過熱帶國家、是否有胃部感染的痼疾、家族是否有腸癌病史，又或者是不是最近全城的人都在抱怨腹瀉。


    第三，華生永遠不會說它累了、餓了或病了，它能用上全世界所有的時間為我診斷。我可以舒舒服服坐在沙發上，回答幾百個問題，告訴華生我究竟感覺如何。對大多數病人來說（或許除了患有「疑病症」的病人），這會是個天大的好消息。但如果你是今天要進醫學院，希望自己在二十年後能當個家庭醫師，或許就該重新考慮了。有了這樣的華生，哪還有福爾摩斯出場的機會？


