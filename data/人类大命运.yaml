  md: '而在人類控制的農場裡，所有公豬、母豬和小豬也仍然遵循著一樣的演化邏輯。為了在野外生存和繁衍，遠古的野豬需要漫步巡查遼闊的範圍，好熟悉環境，並留意各種陷阱和天敵。牠們還需要和其他野豬溝通合作，形成複雜的豬群，並以年長、經驗豐富的母豬做為領導。演化壓力讓野豬成為具有高度智能的社會化動物（母野豬更是如此），有強烈的好奇心，加上難以遏抑的衝動，想要交往、玩樂、閒逛、探索周遭環境。如果某頭母豬出生時，有罕見的基因突變，讓牠對環境與公豬興趣缺缺，這頭母豬就不太可能生存或繁衍下去。


    野豬的後裔——家豬，也同樣繼承了牠們的智慧、好奇心和社交技巧。¹² 一如野豬，家豬也會用豐富多樣的聲音和嗅覺訊號，來互相溝通：母豬能夠辨識自己小豬獨特的尖叫聲，小豬也只要出生兩天，就能判斷自己媽媽和其他母豬叫聲的不同。¹³
    賓州大學的柯蒂斯（Stanley Curtis）教授養了兩隻豬，分別名為哈姆雷特和歐姆雷特，柯蒂斯訓練牠們用鼻子控制一支特殊的搖桿，他發現豬打簡單電玩的能力，很快就和靈長類動物不相上下。¹⁴


    今天，工業化畜牧場裡的母豬可沒有電玩可打。牠們被人類鎖在狹小的母豬狹欄（gestation crate）裡，通常是長200公分、寬60公分。狹欄裡為水泥地面，四面為金屬條，懷孕的母豬幾乎沒有轉身或躺下睡覺的空間，更別說要散步了。在這種條件生活三個半月後，母豬會給移到稍寬一點的豬欄，生下和養育小豬。一般來說，小豬自然的哺乳期是10週到12週，但在工業化畜牧場裡會被強制逼至2週到4週內斷奶，接著就與母親分離，運到他處等待養肥、屠宰。至於母豬則再次被受孕、送回母豬狹欄，開始另一個循環。母豬得要經過五次到十次這樣的循環，然後輪到自己遭屠宰。近年'
