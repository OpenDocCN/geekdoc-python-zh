    現代無產階級體驗：第一天，在受到汙染的紡織工廠工作十小時，在擁擠的公寓過夜。第二天，在當地百貨公司擔任收銀員十小時，回到同一棟公寓睡覺。第三天，向當地人學習如何開立銀行帳戶、填寫貸款表格。


    你想挑哪個體驗行程？


    因此，想評估人類合作網路究竟是好是壞，一切都得看用了什麼標準和觀點。評斷法老時代的埃及，我們要看的是產量、營養、還是社會和諧？重視的是貴族、底層農民、還是豬和鱷魚？歷史絕不是單一的敘事，而是同時有著成千上萬種不同的敘事。我們選擇講述其中一種敘事，就等於選擇讓其他的敘事噤聲。


    人類合作網路對自我加以評價時，常常用的就是自己發明的標準，屢獲好評也就毫不意外。特別是以虛構實體之名（例如神祇、國家和公司）而建立的人類網路，自然也就是從虛構實體的角度來判斷是否成功。這樣一來，宗教的成功就在於信眾徹底遵循神的誡命；國家的成功就在於提升國家的利益；企業的成功就在於錢財滾滾而來。


    因此，檢視任何人類網路的歷史時，我建議，可以三不五時暫停一下，改由真實實體的觀點來看事物。怎麼知道某個實體是否真實？答案很簡單，只要問問自己「它是否會感覺痛苦？」就行了。放火燒了宙斯的神廟，宙斯並不會感覺痛苦。歐元貶值，歐元不會感覺痛苦。銀行破產，銀行不會感覺痛苦。國家在戰爭中遭到擊敗，國家也不會真正感覺痛苦。這些實體，都只是隱喻。'
