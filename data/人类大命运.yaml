    # 心靈是什麼？


    另一種用來證明人類比其他動物優越的說法，是說地球上所有動物中，只有智人擁有心靈。


    心靈（mind）和靈魂大有不同。心靈並不是什麼神祕而永恆的概念，也不是眼睛或大腦之類的器官，而是腦中主觀經驗的流動，例如痛苦、快樂、憤怒和愛。這些心理上的經驗，就是各種緊密相連的感覺、情感和思想，忽然閃現、立刻消失……其他經驗再接著倏然浮現與消散，於電光石火間來去。（我們若回想起這些經驗，'
  - '[PAGE 123]


    常常會想把它們分成感覺、情感和思想之類，但事實上一切都是混合在一起的。）把這種種經驗集合起來，就構成了意識流（stream of consciousness）。心靈不像是永恆的靈魂，心靈可以分成許多部分，變動不休，而且沒有理由認為這會直到永恆。


    靈魂是個有人相信、有人不相信的故事。但意識流則相反，這是我們每分每秒都能直接觀察到的具體現實，再明確也不過，無法懷疑它的存在。甚至就算我們充滿懷疑，自問：「真的有主觀經驗這種事嗎？」我們也能百分百確定，自己就是正在經驗著懷疑。


    到底是哪些意識經驗構成了心流？主觀經驗有兩項基本特徵：感覺、欲望。之所以說機器人和電腦沒有意識，是因為雖然它們能力強大，卻沒有什麼感覺，也沒有什麼欲望。機器人可能有電量感測器，在電池快沒電時，向中央處理器發出訊號，讓機器人移向插座、自己插上插頭充電。但是在整個過程中，機器人不會有什麼感覺。相對的，快要耗盡能量的人，則會感覺飢餓，一心渴望能停止這種不愉快的感覺。正因為如此，我們才會說：人類是有意識的生物，而機器人則否；逼人工作到過度飢餓和疲憊而崩潰是一種罪，然而讓機器人工作到電池耗盡，卻沒有任何道德問題。


    那麼，動物呢？牠們有意識嗎？牠們有主觀經驗嗎？如果逼一匹馬工作，直到牠筋疲力竭而崩潰，有沒有道德問題？


    前面已經提過，生命科學認為：所有哺乳動物和鳥類、以及某些爬蟲類和魚類，都具有感覺和情感。但也有最新理論認為：感覺和情感都只是生化的資料處理演算法。既然機器人和電腦處理資料的時候，不會有任何主觀經驗，也許動物也是一樣？事實上，我們知道就算是人類，大腦也有許多感覺迴路和情感迴路，是在人類完全無意識的情況下處理資料的。所以，或許我們以為動物會有的感'
- md: '覺和情感（像是飢餓、恐懼、愛、忠誠），也都只是無意識的演算法，而不是主觀經驗？²


    現代哲學之父笛卡兒（René Descartes）也支持這種理論。十七世紀的笛卡兒認為，只有人類才有感覺和渴望，其他動物都是沒有心靈的自動物（automata），和機器人或自動飲料機並沒什麼不同。所以，如果有個人踢狗，狗並不會體驗到什麼。牠會自動退縮、並開始狂吠，但這不過就是像一臺會自動泡咖啡的飲料機，並不會有什麼感覺、或是有什麼渴望。


    在笛卡兒那個時候，一般人都接受這種理論。十七世紀的醫師和學者會做活狗解剖，觀察內臟器官如何運作，但完全不幫狗上麻醉，也不會感到任何不安。在他們眼中，這實在沒什麼不對的，就像我們把自動飲料機打開，觀察一下齒輪和皮帶如何運作，哪有什麼問題？就算到了二十一世紀早期，仍然有許多人認為：動物並沒有意識，而且就算有意識，也是一種與人非常不同、等而下之的意識。


    ## 為什麼股票交易所沒有意識？


    想知道動物究竟有沒有像人一樣的心靈意識，首先得先進一步理解心靈如何運作、又扮演怎樣的角色。這些問題非常難回答，但因為這也是後續幾個章節的重點，值得在此花上一點時間。


    如果不知道心靈是什麼，就不可能完全掌握像是人工智慧這種新科技的影響。所以，讓我們暫時放下關於動物心靈的問題，先談談目前科學對於心靈和意識的認識。我們會先將焦點擺在研究人類意識的例子（這樣比較容易理解），稍後再回到動物身上，看看人類的情况是不是也能套用在這些長了毛或羽毛的表親上。


    老實說，目前科學對心靈和意識的理解少得驚人。目前的正統科學觀點是：意識是由大腦中的電化學反應所產生，而這樣的心理體驗（即意識）能夠完成某些重要的資料處理功能。³然而，從大腦裡的各種生化反應和電流，是怎麼創造出像痛苦、憤怒或愛情這些主觀經驗，至今仍無解答。或許再過十年或五十年，我們會有很好的答案，但這裡必須強調：在此時此刻，我們就是尚未得到解釋。


    利用功能性磁振造影（fMRI）掃描、植入電極和其他複雜的小工具，科學家已經能夠肯定：在大腦中的電流與各種主觀經驗之間存在著相關性、甚至是因果關係。只要觀測大腦的活動，科學家就能知道你是醒著、正在做夢、或是處於熟睡狀態。他們只要在你眼前閃過一個圖像，時間稍微超過意識感知的門檻值，就能判斷你是否意識到這個圖像，而且完全不需要問你問題。他們甚至能找出某個腦神經元與特定心思的連結，像是找出一個「柯林頓」神經元、或是一個「辛普森」神經元——在「柯林頓」神經元活躍時，這人就是正在想著美國第四十二任總統；如果在這人眼前秀出辛普森的圖像，同名的神經元也必然會活躍起來。


    把範圍放寬，科學家也知道：如果大腦某區域的電化學活動特別活躍，那表示你可能正在生氣。如果這一區平息了、另一區又活躍起來，那表示你可能正在滋生愛意。而且事實上，科學家已經可以用電流刺激正確的神經元，誘發出憤怒或愛的感覺。然而，光是電子跑來跑去，又怎麼會變成一個主觀的柯林頓圖像，又或是憤怒或愛這種主觀感受？


    最常見的解释認為，大腦是相當複雜的系統，有超過八百億個神經元互相連結，組成無數細密的網路。而在幾十億的神經元來回送出幾十億個電訊號時，主觀經驗就此浮現。雖然電訊號的傳送和接收，只是很簡單的生化現象，但這些訊號的互動卻會創造出複雜得多的東西：意識流。我們在許多其他領域，也能觀察到同樣的動態。譬如，單一輛車的移動只是個簡單的動作，但幾百萬輛同時移動及互動，就出現了交通堵塞。單一股票的買賣再簡單不過，但幾百萬股民同時買賣著幾百萬張股票，就可能造成讓專家也跌破眼鏡的經濟危機。


    然而，這種解釋等於什麼都沒解釋，只不過是確認這個問題非常複雜，但並未解釋為何某個現象（幾十億個電訊號從這到那）會創造出另一個完全不同的現象（憤怒或愛的主觀經驗）。至於要用其他也很複雜的過程（例如交通堵塞和經濟危機）來打比方，這種做法也有漏洞。究竟為什麼會交通堵塞？如果你只看某一輛車，永遠都不會明白，因為堵塞是許多車之間互動的結果。A車影響了B車的移動，B車又擋到了C車的路，諸如此類。所以，只要你把所有相關車輛的移動狀況、彼此的互動都對應出來，就能找出交通堵塞的完整解釋。去問「這些移動是怎麼創造出交通堵塞的呢？」其實並沒有意義，因為「交通堵塞」只是人類創出來的一個抽象詞彙，講的正是這裡所有車輛移動事件的集合。


    相較之下，「憤怒」並不是我們用來簡稱幾十億個電訊號互動情況的抽象詞彙。早在人類還不知道任何關於電的知識之前，就已經對憤怒有了非常實際的經驗。我說「我很氣！」的時候，講的是一種非常具體的感受。不管再怎麼清楚描述某個神經元的生化反應如何轉變成電訊號、幾十億個類似的反應又轉變出幾十億個其他電訊號，還是值得我們進一步追問：「只不過，這幾十億個電訊號事件結合在一起之後，是怎麼創造出我具體感受到的憤怒？」


    有幾千輛車在倫敦市區緩慢前進的時候，我們會把它稱為交通堵塞。但這時候並不會因此創造出某個倫敦的意識，浮在著名的皮卡迪利圓環上方，對自己說：「老天啊，我有種堵塞的感覺！」


    有幾百萬人賣掉幾十億股的時候，我們會把它稱為經濟危機。但也不會跑出一個華爾街的幽靈，嘟嚷著說：「媽的，我有種身陷危機的感覺。」


    有幾兆個水分子在天空中結合的時候，我們會把它稱為雲。但也不會出現某個雲的意識，宣告著：「我有種下雨的感覺。」


    所以到底是為什麼，如果有幾十億個電訊號在我腦子裡運作，就會出現某個心靈的感覺，說「我很憤怒！」？


    直到此時此刻，我們還是完全沒能解釋。因此，如果這項討論已經讓你覺得一頭霧水，別擔心，一樣想不通的人不在少數。就連最優秀的科學家，距離要破譯心靈和意識的謎團，也還有一大段路要走。科學的一項美妙之處就在於：科學家面對未知，可以自由嘗試各種理論和猜想，但到頭來也可以承認自己就是沒找出答案。


    ## 為何我們要有意識？


    科學家並不知道，光是一群電訊號的集合，究竟是怎麼創造出主觀經驗。更關鍵的是，科學家不知道這種現象在演化上到底有什麼好處。這是我們在理解生命上，最大的空白了。人類有腳，是因為幾百萬個世代以來，可以讓我們的祖先去追兔子、並逃離獅子的爪下。人類有眼睛，是因為在數不清幾個千年以來，可以讓我們的祖先看到兔子去了哪、獅子又從哪來。然而，人類是為什麼要有像是飢餓和恐懼這樣的主觀經驗？


    # 第3章 人類的獨特之處


    不久之前,生物學家提供了一個非常簡單的答案。主觀經驗對人類的生存至關重要,因為如果我們不會感到飢餓或恐懼,根本就懶得再去追兔子或躲獅子了。看到獅子,為什麼人要逃?很簡單,他就是被嚇到,所以就逃了。因此,主觀經驗能解釋人類的行為。


    如今,科學家又提供了更詳細的描繪:人看到獅子,電訊號便從眼睛傳向大腦,刺激某些神經元,神經元又放出更多訊號,於是沿線上的神經元一個個受到刺激、放出訊號。如果能有夠多的神經元、用夠快的速率放出訊號,指令就能傳到腎上腺、讓大量腎上腺素傳遍全身,心臟也收到指令要它跳快一些,同時,在運動中樞的神經元也向腿部肌肉發出訊號,讓肌肉開始伸展或收縮,於是這個人從獅子旁邊逃之夭夭。


    諷刺的是,我們愈能清楚描繪這個過程,反而愈難解釋為何要有各種意識和主觀經驗。我們愈理解大腦,心靈反而愈顯多餘。如果整個系統就是電訊號從這裡傳到那裡,那我們何必去感覺這種事情?如果就只是一連串的電化學反應,從眼睛裡的神經細胞一路傳到腿部肌肉,何必還要在這個反應串裡加入主觀經驗?主觀經驗到底有什麼作用?骨牌不用有任何主觀經驗,還是能夠一塊一塊自己倒下。那為什麼神經元要有感覺,才能互相刺激、或是告訴腎上腺開始分泌?


    事實上,各種身體活動(包括肌肉運動和荷爾蒙分泌)有99%並不需要任何意識和主觀經驗。那麼,不過就是為了剩下那1%,為什麼神經元、肌肉和腺體就需要去感覺了呢?


    你可能會這麼說:我們之所以需要心靈,是因為心靈能夠儲存記憶、做出規劃、並且自動產生全新的影像和想法,而不只是回應外界的刺激。例如,一個人看到獅子,並不是直接對這個掠食者自動產生反應；而是先想起，一年前有頭獅子吃了他的阿姨，於是開始想像自己被獅子撕成碎片的模樣，又想到這樣自己的小孩就沒了爸爸。這才是他會逃的理由。確實，很多連鎖反應都是由心靈先開始的，而不是由任何直接的外部刺激開始。因此，可能會有某人的心靈中，突然出現關於過去獅子攻擊人的記憶，而讓他思考獅子造成的危險。於是他就聚集所有部落成員，大家一起思考有什麼新方法，能把獅群嚇跑。


    但等一下。究竟這些所謂的記憶、想像和想法又是什麼？它們存在哪裡？根據目前的生物學理論，我們的記憶、想像和想法並不是存在於什麼更高層次而無形的領域，反而也就是幾十億神經元所觸發、集結而成的電訊號。所以，就算我們已經把記憶、想像和想法也納入考量，整件事仍然就只是一連串透過數十億神經元的電化學反應，以腎上腺和腿部肌肉開始活動為結尾。


    到底在這個漫長曲折的過程中，有沒有哪個步驟（例如在這個神經元要傳到下個神經元的那一瞬間），能讓心靈介入干預，並決定下個神經元要不要放出訊號？有沒有任何實質動作、或者甚至是某個電子的移動，是出於「恐懼」這種主觀經驗，而不是因為其他分子的作用？如果每個電子的移動都是因為先前其他電子的移動，那我們究竟為何需要體驗到恐懼？我們對此依然一無所知。


    # 生命方程式


    哲學家將這個謎團包裹在一個吊詭的問題中：有什麼事是發生在心靈中、但沒發生在大腦中？如果心靈中的一切事情都是發生在我們龐大的神經元網路，那又何必把心靈獨立出來說呢？而如果確實有些在心靈裡的事，是高於實際神經網路所發生的事情，它們究竟是發生在哪裡？


    假設讓我問你，覺得動畫主角辛普森對於美國前總統柯林頓和陸文斯基的醜聞，會有何想法？在這之前，你可能從沒想過這件事情，所以現在你的心靈就得要融合兩個過去不相關的記憶，可能想到的畫面就是辛普森喝著啤酒，看著電視上的柯林頓說著「我與該名女子並無性關係」。這兩種記憶的融合，究竟發生在何處？


    ![](img/319dca06e22893e942053da0432e9f19_130_0.png)


    一些腦科學家認為，這發生在許多神經元互動所產生的「全局工作空間」（global workspace）。⁴但在這裡，「工作空間」只是一個比喻。而比喻後的現實是如何？到底不同資訊是在什麼地方交會而融合？從目前的理論看來，這肯定不是發生在什麼精神上的第五維度，而是像兩個原本不相連結的神經元，突然開始彼此發送訊號。於是，在柯林頓神經元和辛普森神經元之間，長出了新的突觸。但如果是這樣，這也不過就是兩個神經元互相連結起來的實際事件，我們為什麼又需要超脫其上的意識經驗？


    同樣這個謎團，我們也可以用數學術語來呈現。目前的看法認為生物也是演算法，而演算法就能用數學公式來呈現。像是可以用數字和數學符號寫出自動飲料機準備一杯茶的步驟順序，或是寫出大腦發現獅子接近時的一連串動作。若是這樣，只要意識經驗確實有某些重要功能，應該就能用數學來表示，因為意識經驗正是演算法的重要部分。如果我們要寫出「恐懼」的演算法，將恐懼分成一連串的计算，應該要能像這樣：「就在這裡，第93步，這正是主觀經驗到恐懼的時候。」


    但在數學這個博大精深的領域裡，有沒有任何演算法能指出主觀經驗？到目前為止，我們並不知道有任何這樣的演算法。雖然人類在數學和資訊工程領域知識廣博，但目前創造出來的所有資料處理系統都不需要主觀經驗，就能運作，而且也都不會感受到痛苦、快樂、憤怒或情愛。⁵


    又或許，我們需要有主觀經驗，才能夠反觀自我？在大草原上遊蕩、計算自己生存和繁衍機會的動物，必須想像出自己的行動和決定，而且有時也得將這種想像傳達給其他動物。如果大腦想要設想出一個自己如何設想決定的模型，就會被困在無限的循環中，開始胡言亂語！而跳出這個循環，出現的就是意識。


    這種說法在五十年前可能聽來合理，但到了今天，局面已經有所不同了。包括谷歌和特斯拉（Tesla）在內的幾間公司，正在設計自動駕駛車，而且部分已經上路。控制自動駕駛車的演算法，每秒會做幾百萬次計算，判斷其他車輛、行人、交通號誌和坑洞等種種因素。自動駕駛車能夠自動停紅燈、繞過障礙，並與其他車輛保持安全距離，這一切都不需要感到任何恐懼。自動駕駛車也必須把自己列入考量，將自己的計畫和願望傳達給周遭車輛，因為如果它決定要突然右轉，必然會影響其他車子的應對行為。


    這種自動駕駛車沒有半點意識，但開起車來也沒有半點問題。自動駕駛車並非特例，還有許多其他電腦程式也能自己運作，但都未發展出意識，也不會有什麼感覺或欲望。⁶


    ![](img/319dca06e22893e942053da0432e9f19_132_0.png)


    15. 行駛中的谷歌自動駕駛車


    # 意識是大腦製造出來的副產品？


    如果我們硬是無法解釋心靈、也不知道它有什麼功能，為什麼不乾脆放棄這個概念呢？在科學史上，早有太多概念和理論遭棄而不用。例如，現代早期的物理學家想解釋光的移動，就設想有一種稱為以太（ether）的物質充滿整個世界，而光則是以太的波動。但是物理學家一直沒能找到任何實證，可證明以太存在，反而是找到其他更能解釋光的理論。因此，以太的概念就被丟進科學的垃圾堆裡了。


    同樣的，幾千年來人類曾經用「神」來解釋許多自然現象。為什麼會閃電？因為神。為什麼會下雨？因為神。地球上的生命是怎麼來的？神創造的。但在過去幾個世紀裡，科學家並沒有找到任何實證可證明神存在，反而是對閃電、下雨和生命的起源，有了更詳細的解釋。因此，現在除了在幾個哲學的子領域之外，經過同儕審查的自然科學期刊和社會科學期刊上，已經不會出現真心相信神祇存在的學術論文了。歷史學家不會說同盟國是因為有神相助，才贏得第二次世界大戰；經濟學家不會認為是上帝造成1929年的經濟大蕭條；地質學家也不會說板塊運動是神的旨意。


    「靈魂」這個概念也是如此。千百年來，我們相信自己所有的行為決定都是出自於靈魂。但因為找不到任何支持的證據，而且又出現了其他更詳細的理論，所以生命科學已經拋棄了靈魂的概念。就個人而言，許多生物學家和醫師仍然可能相信靈魂的概念，但他們絕對不會在嚴肅的科學期刊以此為題。


    或許，「心靈」的概念也該像靈魂、神祇和以太一樣，丟進科學的垃圾堆？畢竟，沒有人曾經用顯微鏡看到所謂痛苦和愛情的經驗意識，而且我們對於痛苦和愛情已經有了非常詳細的生化解釋，不再有主觀經驗的空間。然而心靈與靈魂（以及心靈與神祇）之間，仍然有一個關鍵的差異：要說有永恆存在的靈魂，這完全是臆測；但對於痛苦的經驗，則是非常直接而具體的現實。如果我踩到一枚釘子，我百分之百肯定會感覺到痛苦（就算至今我對此無法提出科學的解釋）。相較之下，如果傷口感染、讓我因為壞疽而喪命，我的靈魂能不能繼續存在，這我就沒有把握了。


    雖然靈魂是個很有趣、也讓人可以鬆一口氣的說法，我也很樂意相信，但我就是無法直接證明它的真實性。像是疼痛和懷疑之類的主觀經驗，因為所有科學家自己也會不斷體驗到，所以他們也無法否認這些經驗的存在。


    另一種試圖拋下心靈和意識概念的做法，則是從否認其關聯性下手，而不是去否認它們的存在。包括丹尼特（Daniel Dennett）和狄漢（Stanislas Dehaene）在內的一些科學家，認為所有相關問題都可以從研究腦部活動來解答，完全用不到主觀經驗的概念。這樣一來，科學家就可再也不要用到「心靈」、「意識」、「主觀經驗」這幾個詞彙了。


    然而我們從以下的章節就會看到，現代政治和道德就是建築在主觀經驗的概念上，而且一旦講到各種道德上的困境，很難光用腦部活動的說法來圓滿解決。舉例來說，虐待或強姦有什麼錯？如果從純粹的神經學角度來看，一個人遭到虐待或強姦，不過是腦中出現某些生化反應，某些電訊號從一些神經元傳到另一些神經元，如此而已。這有什麼大不了的？


    大多數現代人之所以對虐待和強姦有道德上的質疑，正是因為裡面牽涉到主觀經驗。如果哪個科學家說主觀經驗無關緊要，他們面臨的挑戰，就是得要在不引用主觀經驗的情況下，解釋為什麼虐待和或強姦是錯的。


    也有某些科學家雖然承認意識是真實的、也可能有極高的道德和政治價值，但認為這沒有任何生物學上的功用。也就是說，意識是大腦某些程序製造出來的副產品，沒有生物學上的用途，就像是飛機的噴射引擎會發出隆隆巨響，但噪音並不會推動飛機前進。又好比人類並不需要二氧化碳，但每次呼吸都讓空氣裡多了許多二氧化碳。同樣的，意識可能就是「在複雜的神經網路訊號傳送之後，造成的心理汙染」，沒有任何功用，就是存在那裡罷了。


    如果確實如此，也就是說這幾百萬年來，幾十億生物所經歷的痛苦和快樂，都只是某種心理汙染。這絕對是個值得思考的想法，雖然可能並不正確。但這也讓我們很驚訝的發現，當代科學在今日要解釋「意識」，這竟然已經是最佳的理論！


    # 觀察腦波


    也許生命科學看這個問題的角度錯了？生命科學認為生命就是資料處理，而生物就是進行運算和做出決定的機器。然而，把生物類推成演算法可能是個誤導。在十九世紀，科學家是把大腦和思想比做蒸汽引擎。為什麼用蒸汽引擎做比喻？因為當時那就是最先進的科技，能夠推動火車、輪船和工廠，所以要解釋生命的時候，他們也相信應該是根據類似的原理。於是，他們相信心靈和身體就像是由各種管線、汽缸、活塞和閥門所構成，能夠蓄積和釋放壓力，從而產生各種運動和行為。這種想法甚至也對佛洛伊德的心理學影響甚深，至今仍有很多心理學術語來自機械工程。


    舉例來說，讓我們看看佛洛伊德的以下主張：「軍隊會控制性驅力，以推動軍事上的侵略性。軍隊召募的就是性驅力達到頂峰的年輕男子，而又限制士兵性交、限制士兵釋放這些壓力的機會，於是讓壓力在士兵體內不斷累積。軍隊接著就會把這種受抑制的壓力重新導向，並允許壓力以軍事侵略的形式釋放。」這根本就是蒸汽引擎的運作原理。先將沸騰的蒸汽限制在一個密閉容器內，讓蒸汽壓力累積得愈來愈高，直到突然打開閥門，讓壓力往預定的方向釋放，就能用來推動火車或紡織機。也不只是在軍隊，我們在各種活動領域都常常抱怨，覺得心裡有股壓力愈來愈大，說如果不能找個方法「釋放壓力」，就快要爆炸了。


    到了二十一世紀，要再說人類心理就像是蒸汽引擎，可能聽來有點幼稚。既然我們現在有了「電腦」這項遠遠更為複雜的科技，也就開始將人類心理比喻成處理資訊的電腦，而不再說是調節壓力的蒸汽引擎。但就算是這個新的比喻，也可能同樣太過天真。畢竟電腦沒有心靈，就算程式出了問題，它們也不會想要做什麼；就算專制政權把整個國家的網路切斷，網際網路也是不痛不癢。所以，我們又為什麼要用電腦來做為瞭解心靈的比喻呢？


    話又說回來，我們真能確信電腦沒有感覺或欲望嗎？而且就算它們現在真的沒有，或許某天變得夠複雜之後，電腦也可能發展出意識？如果真發生這種事，我們又要如何確定？等到電腦取代了公車司機、老師、心理醫師，我們要怎麼知道它們是真有感情、又或只是無意識的演算法集合？


    講到人類，我們現在已經能分辨「有意識的心理經驗」和「無意識的腦部活動」有何差別。雖然我們距離理解意識還很遠，但科學家已經成功找出意識的一些電化學特徵了。科學家的做法是先假'
  mdcn: '覺和情感（像是飢餓、恐懼、愛、忠誠），也都只是無意識的演算法，而不是主觀經驗？²


    現代哲學之父笛卡兒（René Descartes）也支持這種理論。十七世紀的笛卡兒認為，只有人類才有感覺和渴望，其他動物都是沒有心靈的自動物（automata），和機器人或自動飲料機並沒什麼不同。所以，如果有個人踢狗，狗並不會體驗到什麼。牠會自動退縮、並開始狂吠，但這不過就是像一臺會自動泡咖啡的飲料機，並不會有什麼感覺、或是有什麼渴望。


    在笛卡兒那個時候，一般人都接受這種理論。十七世紀的醫師和學者會做活狗解剖，觀察內臟器官如何運作，但完全不幫狗上麻醉，也不會感到任何不安。在他們眼中，這實在沒什麼不對的，就像我們把自動飲料機打開，觀察一下齒輪和皮帶如何運作，哪有什麼問題？就算到了二十一世紀早期，仍然有許多人認為：動物並沒有意識，而且就算有意識，也是一種與人非常不同、等而下之的意識。


    ## 為什麼股票交易所沒有意識？


    想知道動物究竟有沒有像人一樣的心靈意識，首先得先進一步理解心靈如何運作、又扮演怎樣的角色。這些問題非常難回答，但因為這也是後續幾個章節的重點，值得在此花上一點時間。


    如果不知道心靈是什麼，就不可能完全掌握像是人工智慧這種新科技的影響。所以，讓我們暫時放下關於動物心靈的問題，先談談目前科學對於心靈和意識的認識。我們會先將焦點擺在研究人類意識的例子（這樣比較容易理解），稍後再回到動物身上，看看人類的情况是不是也能套用在這些長了毛或羽毛的表親上。


    老實說，目前科學對心靈和意識的理解少得驚人。目前的正統科學觀點是：意識是由大腦中的電化學反應所產生，而這樣的心理體驗（即意識）能夠完成某些重要的資料處理功能。³然而，從大腦裡的各種生化反應和電流，是怎麼創造出像痛苦、憤怒或愛情這些主觀經驗，至今仍無解答。或許再過十年或五十年，我們會有很好的答案，但這裡必須強調：在此時此刻，我們就是尚未得到解釋。


    利用功能性磁振造影（fMRI）掃描、植入電極和其他複雜的小工具，科學家已經能夠肯定：在大腦中的電流與各種主觀經驗之間存在著相關性、甚至是因果關係。只要觀測大腦的活動，科學家就能知道你是醒著、正在做夢、或是處於熟睡狀態。他們只要在你眼前閃過一個圖像，時間稍微超過意識感知的門檻值，就能判斷你是否意識到這個圖像，而且完全不需要問你問題。他們甚至能找出某個腦神經元與特定心思的連結，像是找出一個「柯林頓」神經元、或是一個「辛普森」神經元——在「柯林頓」神經元活躍時，這人就是正在想著美國第四十二任總統；如果在這人眼前秀出辛普森的圖像，同名的神經元也必然會活躍起來。


    把範圍放寬，科學家也知道：如果大腦某區域的電化學活動特別活躍，那表示你可能正在生氣。如果這一區平息了、另一區又活躍起來，那表示你可能正在滋生愛意。而且事實上，科學家已經可以用電流刺激正確的神經元，誘發出憤怒或愛的感覺。然而，光是電子跑來跑去，又怎麼會變成一個主觀的柯林頓圖像，又或是憤怒或愛這種主觀感受？


    最常見的解释認為，大腦是相當複雜的系統，有超過八百億個神經元互相連結，組成無數細密的網路。而在幾十億的神經元來回送出幾十億個電訊號時，主觀經驗就此浮現。雖然電訊號的傳送和接收，只是很簡單的生化現象，但這些訊號的互動卻會創造出複雜得多的東西：意識流。我們在許多其他領域，也能觀察到同樣的動態。譬如，單一輛車的移動只是個簡單的動作，但幾百萬輛同時移動及互動，就出現了交通堵塞。單一股票的買賣再簡單不過，但幾百萬股民同時買賣著幾百萬張股票，就可能造成讓專家也跌破眼鏡的經濟危機。


    然而，這種解釋等於什麼都沒解釋，只不過是確認這個問題非常複雜，但並未解釋為何某個現象（幾十億個電訊號從這到那）會創造出另一個完全不同的現象（憤怒或愛的主觀經驗）。至於要用其他也很複雜的過程（例如交通堵塞和經濟危機）來打比方，這種做法也有漏洞。究竟為什麼會交通堵塞？如果你只看某一輛車，永遠都不會明白，因為堵塞是許多車之間互動的結果。A車影響了B車的移動，B車又擋到了C車的路，諸如此類。所以，只要你把所有相關車輛的移動狀況、彼此的互動都對應出來，就能找出交通堵塞的完整解釋。去問「這些移動是怎麼創造出交通堵塞的呢？」其實並沒有意義，因為「交通堵塞」只是人類創出來的一個抽象詞彙，講的正是這裡所有車輛移動事件的集合。


    相較之下，「憤怒」並不是我們用來簡稱幾十億個電訊號互動情況的抽象詞彙。早在人類還不知道任何關於電的知識之前，就已經對憤怒有了非常實際的經驗。我說「我很氣！」的時候，講的是一種非常具體的感受。不管再怎麼清楚描述某個神經元的生化反應如何轉變成電訊號、幾十億個類似的反應又轉變出幾十億個其他電訊號，還是值得我們進一步追問：「只不過，這幾十億個電訊號事件結合在一起之後，是怎麼創造出我具體感受到的憤怒？」


    有幾千輛車在倫敦市區緩慢前進的時候，我們會把它稱為交通堵塞。但這時候並不會因此創造出某個倫敦的意識，浮在著名的皮卡迪利圓環上方，對自己說：「老天啊，我有種堵塞的感覺！」


    有幾百萬人賣掉幾十億股的時候，我們會把它稱為經濟危機。但也不會跑出一個華爾街的幽靈，嘟嚷著說：「媽的，我有種身陷危機的感覺。」


    有幾兆個水分子在天空中結合的時候，我們會把它稱為雲。但也不會出現某個雲的意識，宣告著：「我有種下雨的感覺。」


    所以到底是為什麼，如果有幾十億個電訊號在我腦子裡運作，就會出現某個心靈的感覺，說「我很憤怒！」？


    直到此時此刻，我們還是完全沒能解釋。因此，如果這項討論已經讓你覺得一頭霧水，別擔心，一樣想不通的人不在少數。就連最優秀的科學家，距離要破譯心靈和意識的謎團，也還有一大段路要走。科學的一項美妙之處就在於：科學家面對未知，可以自由嘗試各種理論和猜想，但到頭來也可以承認自己就是沒找出答案。


    ## 為何我們要有意識？


    科學家並不知道，光是一群電訊號的集合，究竟是怎麼創造出主觀經驗。更關鍵的是，科學家不知道這種現象在演化上到底有什麼好處。這是我們在理解生命上，最大的空白了。人類有腳，是因為幾百萬個世代以來，可以讓我們的祖先去追兔子、並逃離獅子的爪下。人類有眼睛，是因為在數不清幾個千年以來，可以讓我們的祖先看到兔子去了哪、獅子又從哪來。然而，人類是為什麼要有像是飢餓和恐懼這樣的主觀經驗？


    # 第3章 人類的獨特之處


    不久之前,生物學家提供了一個非常簡單的答案。主觀經驗對人類的生存至關重要,因為如果我們不會感到飢餓或恐懼,根本就懶得再去追兔子或躲獅子了。看到獅子,為什麼人要逃?很簡單,他就是被嚇到,所以就逃了。因此,主觀經驗能解釋人類的行為。


    如今,科學家又提供了更詳細的描繪:人看到獅子,電訊號便從眼睛傳向大腦,刺激某些神經元,神經元又放出更多訊號,於是沿線上的神經元一個個受到刺激、放出訊號。如果能有夠多的神經元、用夠快的速率放出訊號,指令就能傳到腎上腺、讓大量腎上腺素傳遍全身,心臟也收到指令要它跳快一些,同時,在運動中樞的神經元也向腿部肌肉發出訊號,讓肌肉開始伸展或收縮,於是這個人從獅子旁邊逃之夭夭。


    諷刺的是,我們愈能清楚描繪這個過程,反而愈難解釋為何要有各種意識和主觀經驗。我們愈理解大腦,心靈反而愈顯多餘。如果整個系統就是電訊號從這裡傳到那裡,那我們何必去感覺這種事情?如果就只是一連串的電化學反應,從眼睛裡的神經細胞一路傳到腿部肌肉,何必還要在這個反應串裡加入主觀經驗?主觀經驗到底有什麼作用?骨牌不用有任何主觀經驗,還是能夠一塊一塊自己倒下。那為什麼神經元要有感覺,才能互相刺激、或是告訴腎上腺開始分泌?


    事實上,各種身體活動(包括肌肉運動和荷爾蒙分泌)有99%並不需要任何意識和主觀經驗。那麼,不過就是為了剩下那1%,為什麼神經元、肌肉和腺體就需要去感覺了呢?


    你可能會這麼說:我們之所以需要心靈,是因為心靈能夠儲存記憶、做出規劃、並且自動產生全新的影像和想法,而不只是回應外界的刺激。例如,一個人看到獅子,並不是直接對這個掠食者自動產生反應；而是先想起，一年前有頭獅子吃了他的阿姨，於是開始想像自己被獅子撕成碎片的模樣，又想到這樣自己的小孩就沒了爸爸。這才是他會逃的理由。確實，很多連鎖反應都是由心靈先開始的，而不是由任何直接的外部刺激開始。因此，可能會有某人的心靈中，突然出現關於過去獅子攻擊人的記憶，而讓他思考獅子造成的危險。於是他就聚集所有部落成員，大家一起思考有什麼新方法，能把獅群嚇跑。


    但等一下。究竟這些所謂的記憶、想像和想法又是什麼？它們存在哪裡？根據目前的生物學理論，我們的記憶、想像和想法並不是存在於什麼更高層次而無形的領域，反而也就是幾十億神經元所觸發、集結而成的電訊號。所以，就算我們已經把記憶、想像和想法也納入考量，整件事仍然就只是一連串透過數十億神經元的電化學反應，以腎上腺和腿部肌肉開始活動為結尾。


    到底在這個漫長曲折的過程中，有沒有哪個步驟（例如在這個神經元要傳到下個神經元的那一瞬間），能讓心靈介入干預，並決定下個神經元要不要放出訊號？有沒有任何實質動作、或者甚至是某個電子的移動，是出於「恐懼」這種主觀經驗，而不是因為其他分子的作用？如果每個電子的移動都是因為先前其他電子的移動，那我們究竟為何需要體驗到恐懼？我們對此依然一無所知。


    # 生命方程式


    哲學家將這個謎團包裹在一個吊詭的問題中：有什麼事是發生在心靈中、但沒發生在大腦中？如果心靈中的一切事情都是發生在我們龐大的神經元網路，那又何必把心靈獨立出來說呢？而如果確實有些在心靈裡的事，是高於實際神經網路所發生的事情，它們究竟是發生在哪裡？


    假設讓我問你，覺得動畫主角辛普森對於美國前總統柯林頓和陸文斯基的醜聞，會有何想法？在這之前，你可能從沒想過這件事情，所以現在你的心靈就得要融合兩個過去不相關的記憶，可能想到的畫面就是辛普森喝著啤酒，看著電視上的柯林頓說著「我與該名女子並無性關係」。這兩種記憶的融合，究竟發生在何處？


    ![](img/319dca06e22893e942053da0432e9f19_130_0.png)


    一些腦科學家認為，這發生在許多神經元互動所產生的「全局工作空間」（global workspace）。⁴但在這裡，「工作空間」只是一個比喻。而比喻後的現實是如何？到底不同資訊是在什麼地方交會而融合？從目前的理論看來，這肯定不是發生在什麼精神上的第五維度，而是像兩個原本不相連結的神經元，突然開始彼此發送訊號。於是，在柯林頓神經元和辛普森神經元之間，長出了新的突觸。但如果是這樣，這也不過就是兩個神經元互相連結起來的實際事件，我們為什麼又需要超脫其上的意識經驗？


    同樣這個謎團，我們也可以用數學術語來呈現。目前的看法認為生物也是演算法，而演算法就能用數學公式來呈現。像是可以用數字和數學符號寫出自動飲料機準備一杯茶的步驟順序，或是寫出大腦發現獅子接近時的一連串動作。若是這樣，只要意識經驗確實有某些重要功能，應該就能用數學來表示，因為意識經驗正是演算法的重要部分。如果我們要寫出「恐懼」的演算法，將恐懼分成一連串的计算，應該要能像這樣：「就在這裡，第93步，這正是主觀經驗到恐懼的時候。」


    但在數學這個博大精深的領域裡，有沒有任何演算法能指出主觀經驗？到目前為止，我們並不知道有任何這樣的演算法。雖然人類在數學和資訊工程領域知識廣博，但目前創造出來的所有資料處理系統都不需要主觀經驗，就能運作，而且也都不會感受到痛苦、快樂、憤怒或情愛。⁵


    又或許，我們需要有主觀經驗，才能夠反觀自我？在大草原上遊蕩、計算自己生存和繁衍機會的動物，必須想像出自己的行動和決定，而且有時也得將這種想像傳達給其他動物。如果大腦想要設想出一個自己如何設想決定的模型，就會被困在無限的循環中，開始胡言亂語！而跳出這個循環，出現的就是意識。


    這種說法在五十年前可能聽來合理，但到了今天，局面已經有所不同了。包括谷歌和特斯拉（Tesla）在內的幾間公司，正在設計自動駕駛車，而且部分已經上路。控制自動駕駛車的演算法，每秒會做幾百萬次計算，判斷其他車輛、行人、交通號誌和坑洞等種種因素。自動駕駛車能夠自動停紅燈、繞過障礙，並與其他車輛保持安全距離，這一切都不需要感到任何恐懼。自動駕駛車也必須把自己列入考量，將自己的計畫和願望傳達給周遭車輛，因為如果它決定要突然右轉，必然會影響其他車子的應對行為。


    這種自動駕駛車沒有半點意識，但開起車來也沒有半點問題。自動駕駛車並非特例，還有許多其他電腦程式也能自己運作，但都未發展出意識，也不會有什麼感覺或欲望。⁶


    ![](img/319dca06e22893e942053da0432e9f19_132_0.png)


    15. 行駛中的谷歌自動駕駛車


    # 意識是大腦製造出來的副產品？


    如果我們硬是無法解釋心靈、也不知道它有什麼功能，為什麼不乾脆放棄這個概念呢？在科學史上，早有太多概念和理論遭棄而不用。例如，現代早期的物理學家想解釋光的移動，就設想有一種稱為以太（ether）的物質充滿整個世界，而光則是以太的波動。但是物理學家一直沒能找到任何實證，可證明以太存在，反而是找到其他更能解釋光的理論。因此，以太的概念就被丟進科學的垃圾堆裡了。


    同樣的，幾千年來人類曾經用「神」來解釋許多自然現象。為什麼會閃電？因為神。為什麼會下雨？因為神。地球上的生命是怎麼來的？神創造的。但在過去幾個世紀裡，科學家並沒有找到任何實證可證明神存在，反而是對閃電、下雨和生命的起源，有了更詳細的解釋。因此，現在除了在幾個哲學的子領域之外，經過同儕審查的自然科學期刊和社會科學期刊上，已經不會出現真心相信神祇存在的學術論文了。歷史學家不會說同盟國是因為有神相助，才贏得第二次世界大戰；經濟學家不會認為是上帝造成1929年的經濟大蕭條；地質學家也不會說板塊運動是神的旨意。


    「靈魂」這個概念也是如此。千百年來，我們相信自己所有的行為決定都是出自於靈魂。但因為找不到任何支持的證據，而且又出現了其他更詳細的理論，所以生命科學已經拋棄了靈魂的概念。就個人而言，許多生物學家和醫師仍然可能相信靈魂的概念，但他們絕對不會在嚴肅的科學期刊以此為題。


    或許，「心靈」的概念也該像靈魂、神祇和以太一樣，丟進科學的垃圾堆？畢竟，沒有人曾經用顯微鏡看到所謂痛苦和愛情的經驗意識，而且我們對於痛苦和愛情已經有了非常詳細的生化解釋，不再有主觀經驗的空間。然而心靈與靈魂（以及心靈與神祇）之間，仍然有一個關鍵的差異：要說有永恆存在的靈魂，這完全是臆測；但對於痛苦的經驗，則是非常直接而具體的現實。如果我踩到一枚釘子，我百分之百肯定會感覺到痛苦（就算至今我對此無法提出科學的解釋）。相較之下，如果傷口感染、讓我因為壞疽而喪命，我的靈魂能不能繼續存在，這我就沒有把握了。


    雖然靈魂是個很有趣、也讓人可以鬆一口氣的說法，我也很樂意相信，但我就是無法直接證明它的真實性。像是疼痛和懷疑之類的主觀經驗，因為所有科學家自己也會不斷體驗到，所以他們也無法否認這些經驗的存在。


    另一種試圖拋下心靈和意識概念的做法，則是從否認其關聯性下手，而不是去否認它們的存在。包括丹尼特（Daniel Dennett）和狄漢（Stanislas Dehaene）在內的一些科學家，認為所有相關問題都可以從研究腦部活動來解答，完全用不到主觀經驗的概念。這樣一來，科學家就可再也不要用到「心靈」、「意識」、「主觀經驗」這幾個詞彙了。


    然而我們從以下的章節就會看到，現代政治和道德就是建築在主觀經驗的概念上，而且一旦講到各種道德上的困境，很難光用腦部活動的說法來圓滿解決。舉例來說，虐待或強姦有什麼錯？如果從純粹的神經學角度來看，一個人遭到虐待或強姦，不過是腦中出現某些生化反應，某些電訊號從一些神經元傳到另一些神經元，如此而已。這有什麼大不了的？


    大多數現代人之所以對虐待和強姦有道德上的質疑，正是因為裡面牽涉到主觀經驗。如果哪個科學家說主觀經驗無關緊要，他們面臨的挑戰，就是得要在不引用主觀經驗的情況下，解釋為什麼虐待和或強姦是錯的。


    也有某些科學家雖然承認意識是真實的、也可能有極高的道德和政治價值，但認為這沒有任何生物學上的功用。也就是說，意識是大腦某些程序製造出來的副產品，沒有生物學上的用途，就像是飛機的噴射引擎會發出隆隆巨響，但噪音並不會推動飛機前進。又好比人類並不需要二氧化碳，但每次呼吸都讓空氣裡多了許多二氧化碳。同樣的，意識可能就是「在複雜的神經網路訊號傳送之後，造成的心理汙染」，沒有任何功用，就是存在那裡罷了。


    如果確實如此，也就是說這幾百萬年來，幾十億生物所經歷的痛苦和快樂，都只是某種心理汙染。這絕對是個值得思考的想法，雖然可能並不正確。但這也讓我們很驚訝的發現，當代科學在今日要解釋「意識」，這竟然已經是最佳的理論！


    # 觀察腦波


    也許生命科學看這個問題的角度錯了？生命科學認為生命就是資料處理，而生物就是進行運算和做出決定的機器。然而，把生物類推成演算法可能是個誤導。在十九世紀，科學家是把大腦和思想比做蒸汽引擎。為什麼用蒸汽引擎做比喻？因為當時那就是最先進的科技，能夠推動火車、輪船和工廠，所以要解釋生命的時候，他們也相信應該是根據類似的原理。於是，他們相信心靈和身體就像是由各種管線、汽缸、活塞和閥門所構成，能夠蓄積和釋放壓力，從而產生各種運動和行為。這種想法甚至也對佛洛伊德的心理學影響甚深，至今仍有很多心理學術語來自機械工程。


    舉例來說，讓我們看看佛洛伊德的以下主張：「軍隊會控制性驅力，以推動軍事上的侵略性。軍隊召募的就是性驅力達到頂峰的年輕男子，而又限制士兵性交、限制士兵釋放這些壓力的機會，於是讓壓力在士兵體內不斷累積。軍隊接著就會把這種受抑制的壓力重新導向，並允許壓力以軍事侵略的形式釋放。」這根本就是蒸汽引擎的運作原理。先將沸騰的蒸汽限制在一個密閉容器內，讓蒸汽壓力累積得愈來愈高，直到突然打開閥門，讓壓力往預定的方向釋放，就能用來推動火車或紡織機。也不只是在軍隊，我們在各種活動領域都常常抱怨，覺得心裡有股壓力愈來愈大，說如果不能找個方法「釋放壓力」，就快要爆炸了。


    到了二十一世紀，要再說人類心理就像是蒸汽引擎，可能聽來有點幼稚。既然我們現在有了「電腦」這項遠遠更為複雜的科技，也就開始將人類心理比喻成處理資訊的電腦，而不再說是調節壓力的蒸汽引擎。但就算是這個新的比喻，也可能同樣太過天真。畢竟電腦沒有心靈，就算程式出了問題，它們也不會想要做什麼；就算專制政權把整個國家的網路切斷，網際網路也是不痛不癢。所以，我們又為什麼要用電腦來做為瞭解心靈的比喻呢？


    話又說回來，我們真能確信電腦沒有感覺或欲望嗎？而且就算它們現在真的沒有，或許某天變得夠複雜之後，電腦也可能發展出意識？如果真發生這種事，我們又要如何確定？等到電腦取代了公車司機、老師、心理醫師，我們要怎麼知道它們是真有感情、又或只是無意識的演算法集合？


    講到人類，我們現在已經能分辨「有意識的心理經驗」和「無意識的腦部活動」有何差別。雖然我們距離理解意識還很遠，但科學家已經成功找出意識的一些電化學特徵了。科學家的做法是先假'
