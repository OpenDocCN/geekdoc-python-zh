    自由主義將敘事自我奉為圭臬，不論在投票所、超市或婚姻市場，都讓敘事自我來做決定。在這幾個世紀以來，這種做法很有道理，因為雖然敘事自我相信的常常是各種虛構和幻想的故事，但我們確實沒有更好的替代方案。然而，一旦有了能夠替代的系統，能比敘事自我更瞭解我們自己，這時再把權力留在敘事自我的手中，就只能說是愚蠢的做法。


    例如民主選舉這種自由主義的做法，將會遭到淘汰，因為谷歌將會比我自己更瞭解我的政治觀點。我站在投票亭裡的時候，自由主義叫我要聽聽內心真實自我的聲音，選擇能夠反映我最深期望的政黨或候選人。但生命科學卻指出，我站在投票亭裡的時候，根本並不真正記得上次選舉以來這幾年的所有感受和想法。此外，我還被各種宣傳、公關手法和隨機記憶不斷轟炸，很可能已扭曲了我該做的選擇。正如康納曼的冷水實驗，敘事自我到了政治領域，一樣會遵循峰終法則，忘了絕大多數的事情，只記得幾項極端的事件，並對最近的事件賦予完全不成比例的高權重。


    在這四年之間，我可能不斷抱怨現任總統的政策，一直告訴自己和任何願意聽我說話的人，這個總統「會毀了我們所有人」。然而離下次選舉投票只剩幾個月的時候，政府忽然減稅、大方開出各種支票。執政黨找來最好的撰稿人，打出一波漂亮的競選文宣，既有威脅、又有利誘，直接打入我大腦的恐懼中心。到了選舉當天一大早，我醒來的時候有點感冒，腦子不太好使，也讓我覺得安全和穩定實在比其他一切都更重要。結果出爐！我又把那個「會毀了我們所有人」的傢伙送上臺，讓這個人還能再做四年。'
