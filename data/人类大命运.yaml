    最後可能走到一個境地，是我們一分一秒都無法與這個全知的網路斷開。斷開，就等於死亡。例如假設醫療理想得以實現，未來的人類將會在體內植入許多生理感測器、仿生器官和奈米機器人，以監控人體健康，並避免感染、疾病和傷害。但這些裝置就會需要二十四小時全天上線，才能時時追上最新的醫療發展，以及抵抗網路空間爆發的新瘟疫。一如家用電腦會不斷受到病毒、蠕蟲和特洛伊木馬的攻擊，以後的心律調節器、助聽器和奈米科技免疫系統，也無法倖免。如果不去定期更新身體中的防毒程式，可能某天早上醒來，就發現血管中的幾百萬個奈米機器人，都已操縱在某個北韓駭客的手中。


    因此，二十一世紀的新科技可能會整個扭轉人文主義革命的方向，讓人類失去權威，把掌控權交到非人類的演算法手中。如果你覺得這個方向實在太駭人，該怪的並不是那些電腦怪咖，這其實是生物學家的責任。我們必須意識到，推動這個趨勢的主要力量是來自生物學的見解，而非資訊科學。是生命科學認為，生物就是各種演算法。如果生物的運作真的和演算法大有不同，就算電腦在其他領域大展神威，仍然不可能瞭解人類、引導人類的生命，更不可能'
