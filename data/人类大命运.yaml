    # 放大版的螞蟻社會


    現代這個世界，一方面，我們已經有能力改造心靈，但另一方面，我們又幾乎完全不知道心理的完整頻譜是什麼模樣，再加上政府、軍隊和企業各懷鬼胎，簡直注定帶來災難。有可能到頭來，我們很成功的讓身體與大腦都升級了，卻在過程中失去了心靈。


    確實，科技人文主義到最後可能反而會造成人類的降級。對政經體系來說，降級後的人類反而更有利，原因不是這種人擁有什麼卓越的特點，而是這種人少了一些可能拖慢社會步調、造成困擾的人類特質。像是農夫都知道，羊群裡面最聰明的那隻，常常就會惹出最大的麻煩，所以農業革命的其中一項，就是要降低動物的心理能力。到了科技人文主義夢想所推動的第二次認知革命，則可能對人類造成一樣的效果，讓社會大機器裡的「人類小齒輪」變得比以往更能有效溝通和處理資料，但幾乎不會去注意其他事，既不會做'
  - '[PAGE 413]


    # 人類大命運


    夢、也不會有所懷疑。數百萬年來，人類曾經是加強版的黑猩猩；到了未來，人類則可能變成放大版的螞蟻。


    科技人文主義還面臨另一項恐怖威脅。一如所有人文主義教派，科技人文主義也認為人的意志是神聖的，認為這是整個宇宙的憑依。科技人文主義希望用人類的期望，來選擇要發展哪一種心靈能力，進而決定未來心靈的模樣。然而，如果未來科技進展之後，能夠重塑、改造這些期望，那會是什麼情形？


    人文主義總是強調，我們不太容易確知自己真正的意志。每次想聆聽真實的自己，總有許多吵雜的噪音撲天蓋地而來。而且事實上，有時候我們不見得真想聽到自己真實的聲音，因為那可能會是一些不受歡迎的祕密、令人難堪的要求。有許多人根本是處心積慮不想對自己瞭解太深。譬如，一位平步青雲的律師，可能就不想聽到內心叫她放輕鬆點、趕快生個寶寶的聲音。困在痛苦婚姻中的婦女，也可能害怕失去婚姻提供的安全感。背負罪惡感的士兵，曾犯下的暴行化成噩夢，如影隨形。對自己的性傾向還無法確定的年輕人，就對自己實行了「不問、不說」的政策。對人文主義來說，這任何一個情境都不會有一體適用的解決方案，但人文主義要求我們堅強起來，不論內心的聲音再醜惡，也要勇敢面對，要聽到自己最真實的聲音，再聽從它的指示，排除萬難。


    但從科技進步的觀點，一切就大不相同了。科技進展不想聽我們內在的聲音，而是要控制這些聲音。只要我們瞭解了生化系統如何產生這些聲音，我們就能玩弄這所有開關，把這裡音量調高、那裡音量調低，讓人生過得更輕鬆自在。想專心的律師可以來顆利他能（Ritalin），有罪惡感的士兵可以吞個百憂解（Prozac），至於對生活不滿的妻子，替你憂（Citao）就是答案。而且，這還只是開始。


