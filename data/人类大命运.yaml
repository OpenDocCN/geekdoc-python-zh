    現代無產階級體驗：第一天，在受到汙染的紡織工廠工作十小時，在擁擠的公寓過夜。第二天，在當地百貨公司擔任收銀員十小時，回到同一棟公寓睡覺。第三天，向當地人學習如何開立銀行帳戶、填寫貸款表格。


    你想挑哪個體驗行程？


    因此，想評估人類合作網路究竟是好是壞，一切都得看用了什麼標準和觀點。評斷法老時代的埃及，我們要看的是產量、營養、還是社會和諧？重視的是貴族、底層農民、還是豬和鱷魚？歷史絕不是單一的敘事，而是同時有著成千上萬種不同的敘事。我們選擇講述其中一種敘事，就等於選擇讓其他的敘事噤聲。


    人類合作網路對自我加以評價時，常常用的就是自己發明的標準，屢獲好評也就毫不意外。特別是以虛構實體之名（例如神祇、國家和公司）而建立的人類網路，自然也就是從虛構實體的角度來判斷是否成功。這樣一來，宗教的成功就在於信眾徹底遵循神的誡命；國家的成功就在於提升國家的利益；企業的成功就在於錢財滾滾而來。


    因此，檢視任何人類網路的歷史時，我建議，可以三不五時暫停一下，改由真實實體的觀點來看事物。怎麼知道某個實體是否真實？答案很簡單，只要問問自己「它是否會感覺痛苦？」就行了。放火燒了宙斯的神廟，宙斯並不會感覺痛苦。歐元貶值，歐元不會感覺痛苦。銀行破產，銀行不會感覺痛苦。國家在戰爭中遭到擊敗，國家也不會真正感覺痛苦。這些實體，都只是隱喻。'
  - '[PAGE 201]


    但相對的，如果是士兵在戰爭中受傷，他確實會感覺痛苦。飢餓的農民沒有食物可吃，會感覺痛苦。母牛被迫與新生小牛分離，會感覺痛苦。這些實體，則屬於真實。


    當然，我們有可能因為自己相信了虛構故事，而感到痛苦。例如，相信各種民族傳說和宗教神話，可能導致戰爭，而讓數百萬人失去家園、失去肢體，甚至失去生命。戰爭的起源是虛構，但痛苦則是百分之百真實。正因如此，我們才應該努力區分是虛構、或是真實。


    # 回歸故事的本質


    虛構故事本身並沒有錯，而且有其必要。如果沒有金錢、國家或公司這些人人共同接受的故事，就不可能有複雜的人類社會能夠正常運作。要先讓大家都相信了同樣的虛構規則，我們才可能一起踢一場足球；也要讓大家都相信了一些類似的虛構故事，才能讓市場或法庭真正發揮作用。


    然而，這些故事只是工具，不該成為目標、甚至標準。一旦我們忘了這些都只是虛構，就會開始與現實漸行漸遠。於是，可能只是為了「替公司賺很多錢」、或是「保護國家利益」，就讓我們掀起無邊戰火。公司、金錢和國家，都只存在於我們的想像之中。是人類發明了這些概念，好讓它們為人類服務；但為什麼最後反而是人類要為這些概念服務，甚至犧牲性命？


    在二十一世紀，我們還會創造出比以往更強大的虛構概念、更極權的宗教。在生物科技和電腦演算法的協助下，這些宗教不但會控制我們每分每秒的存在，甚至將能夠形塑我們的身體、大腦和心'
  - '[PAGE 202]


    靈，創造出完整的虛擬世界，連地獄和天堂也能創造。這樣一來，要再區分虛構與真實、宗教與科學，將會變得更加困難。但要辨別清楚，卻又比以往更加重要了。'
