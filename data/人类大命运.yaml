  md: '面臨的挑戰，就是得要在不引用主觀經驗的情況下，解釋為什麼虐待和或強姦是錯的。


    也有某些科學家雖然承認意識是真實的、也可能有極高的道德和政治價值，但認為這沒有任何生物學上的功用。也就是說，意識是大腦某些程序製造出來的副產品，沒有生物學上的用途，就像是飛機的噴射引擎會發出隆隆巨響，但噪音並不會推動飛機前進。又好比人類並不需要二氧化碳，但每次呼吸都讓空氣裡多了許多二氧化碳。同樣的，意識可能就是「在複雜的神經網路訊號傳送之後，造成的心理汙染」，沒有任何功用，就是存在那裡罷了。


    如果確實如此，也就是說這幾百萬年來，幾十億生物所經歷的痛苦和快樂，都只是某種心理汙染。這絕對是個值得思考的想法，雖然可能並不正確。但這也讓我們很驚訝的發現，當代科學在今日要解釋「意識」，這竟然已經是最佳的理論！


    # 觀察腦波


    也許生命科學看這個問題的角度錯了？生命科學認為生命就是資料處理，而生物就是進行運算和做出決定的機器。然而，把生物類推成演算法可能是個誤導。在十九世紀，科學家是把大腦和思想比做蒸汽引擎。為什麼用蒸汽引擎做比喻？因為當時那就是最先進的科技，能夠推動火車、輪船和工廠，所以要解釋生命的時候，他們也相信應該是根據類似的原理。於是，他們相信心靈和身體就像是由各種管線、汽缸、活塞和閥門所構成，能夠蓄積和釋放壓力，從而產生各種運動和行為。這種想法甚至也對佛洛伊德的心理學影響甚深，至今仍有很多心理學術語來自機械工程。'
