    # 人類大命運


    豈不早該是個流行病的地獄、致命瘟疫前仆後繼?


    然而在過去幾十年間,流行病無論在流行或影響方面,都是大幅降低。特別是全球兒童的死亡率更達歷史低點:只剩5%的兒童夭折,未能成年。在已開發國家,這個數字甚至不到1%。^{12}之所以有這項奇蹟,是因為二十世紀的醫學達到前所未有的成就,為人類提供疫苗、抗生素、更佳的衛生條件,以及遠遠更好的醫療設施。


    舉例來說,全球接種天花疫苗的運動就極為成功,讓世界衛生組織(WHO)在1979年宣布人類獲勝,天花已徹底絕跡!這是人類首次成功讓某種流行病完全消失在地球上。天花在1967年仍然感染了一千五百萬人,奪走兩百萬人的性命;但是到2014年,已經沒有任何一個人感染天花、或因而喪命。這是一場徹徹底底的勝利,讓世界衛生組織甚至已不再為人接種天花疫苗。^{13}


    每隔幾年,總有人警告可能又將爆發重大疫情,像是2002年至2003年的SARS、2005年的禽流感、2009年至2010年的豬流感,以及2014年的伊波拉病毒。幸好靠著有效的因應措施,疫情影響的受害人數都只是相對少數。以SARS為例,原本人心惶惶,擔心成為新一波的黑死病,但是最後在全球造成的死亡人數還不到一千人,疫情便已經平息。^{14}


    西非的伊波拉疫情爆發後,原本似乎逐漸失控,世界衛生組織也在2014年9月26日將這此疫情稱為「近代所見最嚴重的公共衛生緊急事件」。^{15}儘管如此,疫情還是在2015年初得到控制;到了2016年1月,世界衛生組織宣布疫情已然平息。伊波拉共感染三萬人(其中一萬一千人喪命),整個西非遭受重大經濟損失,人心的焦慮如同震波傳遍世界各地;然而伊波拉的疫情一直控制在西非,死亡人數遠遠不及西班牙流感或十六世紀的墨西哥天花疫情。


