    人類大命運


    根據杜阿卡帝的說法，自己沒有田地的農民，生活就是充滿艱辛和苦難，只得破布遮身，又得整天勞動，直到手指起滿水泡。接著，法老的官吏還要把他拉去服勞役。而他如此勞苦工作，卻只換來一身疾病。就算真的能活著回家，身心也已遭摧殘殆盡。而即使是擁有土地的農民，命也不見得比較好。每天從河邊用桶子把水挑回田裡，沉重的負擔壓彎肩膀，脖子上也滿是潰爛腫脹。早上是水韭田、下午是椰棗樹、晚上還有香菜田要灌溉。最後，他終於不支倒地，一命嗚呼。8


    雖然這段文本可能有意誇大，但與實情也相去不遠。法老時代的埃及是當時最強大的王國，但對於底層的農民來說，這些強大的國力只代表他們得繳稅、得被迫服勞役，並不代表能得到健康照護或社會安全服務。


    此等缺憾並非埃及獨然。無論是中國歷代、穆斯林各個帝國或歐洲各個王國，雖然都是成就斐然，但就算到了西元1850年，一般人的生活比起遠古狩獵採集者，仍然不見得更好，而且實際上可能更糟。1850年，不管是中國農民、或是在曼徹斯特工廠裡的勞工，工時都比狩獵採集者更長，工作對身體的負擔更重、對心理的壓力也更大；他們的飲食比遠古更不均衡，衛生條件更為低落，而傳染病則是遠遠更為常見。


