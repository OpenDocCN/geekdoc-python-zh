    檢視相關文獻，會發現雖然這項聲明曾一再出現在幾百萬筆的書籍、文章和網站裡，但一切都指向唯一一個源頭：《聖經》。這樣一來，科學家就會問，究竟《聖經》是由誰、在什麼時候寫的呢？請注意，這是一個事實問題，而非價值問題。虔誠的猶太人和基督徒聲稱，至少〈利未記〉是上帝在西奈山吩咐摩西的故事，而且從那一刻開始，從未有一字增減。科學家又會繼續追問：「但我們怎麼能確定？」畢竟，就連教皇都曾經說〈君士坦丁御賜教產諭〉是君士坦丁自己在第四世紀寫的，但事實上卻是在四百年後，由教皇自己的手下偽造的。'
