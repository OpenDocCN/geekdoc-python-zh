    \n  在這場代理人競賽中，微軟的 Cortana 並不孤單。Google 即時資訊（Google Now）和蘋果的 Siri，也朝著同樣的方向前進。亞馬遜（Amazon）同樣會用演算法不斷研究你，再用累積的知識來推薦產品。逛實體書店的時候，我是自己在書架之間閒逛，憑著自己的感覺挑出想看的書。但是逛亞馬遜虛擬書店的時候，則是有演算法立刻跳出來告訴我：「我知道你先前喜歡《人類大歷史》。與你的品味相似的人，也喜歡這本《人類大命運》。」\n\
    \n  這還只是開始。今天在美國，讀電子書的人口已超越讀紙本書的人口。像是亞馬遜的 Kindle 等電子書，就能在用戶閱讀時蒐集資料。舉例來說，你的 Kindle\
    \ 會知道你在哪些篇幅讀得快、哪些章節讀得慢，在哪一頁你休息了一會，又是在哪一行你放棄了這本書，再也沒讀過。（最好趕快告訴作者，讓他重寫那一部分。）\n\n\
    \  如果 Kindle 再升級，裝上臉部辨識和生理感測器，就能知道你讀的每個句子如何影響你的心跳和血壓。它能知道什麼會讓你笑、什麼讓你哭、什麼讓你生氣。不久之後，在你讀書的時候，書也在讀你。你很快就會忘了大部分讀過的內容，但亞馬遜卻是永遠什麼都不會忘。有了這樣的資料，亞馬遜幫你選書，就能精準到無以復加的地步，也會讓亞馬遜清楚瞭解你是怎樣的人、能如何讓你激動或平靜。\n\
    \n  最後可能走到一個境地，是我們一分一秒都無法與這個全知的網路斷開。斷開，就等於死亡。例如假設醫療理想得以實現，未來的人類將會在體內植入許多生理感測器、仿生器官和奈米機器人，以監控人體健康，並避免感染、疾病和傷害。但這些裝置就會需要二十四小時全天上線，才能時時追上最新的醫療發展，以及抵抗網路空間爆發的新瘟疫。一如家用電腦會不斷受到病毒、蠕蟲和特洛伊木馬的攻擊，以後的心律調節器、助聽器和奈米科技免疫系統，也無法倖免。如果不去定期更新身體中的防毒程式，可能某天早上醒來，就發現血管中的幾百萬個奈米機器人，都已操縱在某個北韓駭客的手中。\n\
    \n  因此，二十一世紀的新科技可能會整個扭轉人文主義革命的方向，讓人類失去權威，把掌控權交到非人類的演算法手中。如果你覺得這個方向實在太駭人，該怪的並不是那些電腦怪咖，這其實是生物學家的責任。我們必須意識到，推動這個趨勢的主要力量是來自生物學的見解，而非資訊科學。是生命科學認為，生物就是各種演算法。如果生物的運作真的和演算法大有不同，就算電腦在其他領域大展神威，仍然不可能瞭解人類、引導人類的生命，更不可能開始與人合而為一。但一等到生物學家判斷生物也是演算法，就等於拆除了有機和無機之間的那堵牆，讓電腦革命從單純機械事務轉變為生物的災難，也將權威從個人移轉到了演算法網路。\n\
    \n  確實有些人對這種發展感到恐懼，但事實上，也有數百萬人再樂意不過。今天許多人已經放棄了自己的隱私和個別性，把許多生命點滴全放上網路，每個行動都想記錄下來；只要與網路的連結一中斷，就算只是幾分鐘，也會讓他們坐立難安。就在我們身邊，處處都有權威由人類轉移到演算法的情形，而且不是因為什麼重大的政府決策，而是由於如狂潮般的日常個人選擇。\n\
    \n  如果再不小心，結果可能就會是歐威爾筆下的那種警察國家，而且持續監控的還不只是我們外在的各種舉止，甚至也包括我們身體裡的活動、以及大腦中的活動。可以想想，如果生理感測器無所不在，史達林可能會用來做什麼？而普丁又可能想做什麼？\n\
    \n  目前，雖然有許多捍衛人類個體性的人，擔心二十世紀的噩夢重現，竭力抵抗這個似曾相識的歐威爾式敵人，但人類的個體性其實還受到另一方向更大的威脅。在二十一世紀，與其說個人會被外在力量殘忍輾碎，更有可能的是從內部緩緩崩解。\n\
    \n  今天，大多數企業和政府都會尊重每個人的個體性，承諾依據每個人的需求和願望，提供醫藥、教育和娛樂。但為了達到這個目的，企業和政府就得將個人解構為許多生化上的子系統，用無所不在的感測器監控這些子系統，並用強大的演算法加以解讀。在這個過程中，我們會發現：所謂不可分割的個體，只是一種宗教幻想。現實上，整體現實就是許多生化演算法和電子演算法的混合體，沒有清楚的邊界、也沒有自己的中心。\n\
    \n## 貧富不均更惡化\n\n  在自由主義面臨的三項實際威脅中，我們已經討論了兩項：第一，人類將完全失去價值；第二，人類整體仍然有價值，但個人將不再具有權威，而是由外部演算法來管理。社會仍然需要由你來譜交響樂、教歷史或寫電腦程式，但社會對你的瞭解會超越你自己，也因此會為你做出大部分重要的決定；而且，你還會覺得真是太好了。這樣的世界並不一定壞，但會是個後自由主義的世界。\n\
    \n  自由主義面臨的第三個威脅在於：有些人仍然會是不可或缺、是社會系統難以瞭解和駕馭的，而且會形成金字塔尖端、人數極少的特權精英階級，由升級後的人類組成。這些超人類將會享有前所未有的能力及創造力，讓他們能夠做出許多世上最重要的決定。他們會為社會執行關鍵的服務，而社會既無法瞭解、也無法管控這些人。然而大多數人類並不會升級，於是也就成了一種新的劣等種姓階級，同時受到電腦演算法和新起的超人類所控制主導。\n\
    \n  人類如果從生物定義上，分裂成不同的種姓階級，就會摧毀自由主義意識型態的根基。有自由主義的地方，仍然可能有各種社會階級和貧富差距，而且因為自由主義把自由看得比平等更為重要，所以甚至也覺得有差距是理所當然。但即便如此，自由主義仍然假定所有人類都有同樣的價值和權威。\n\
    \n  從自由主義的觀點，有人是億萬富翁、住在豪華的城堡裡，也有人是貧窮的農民、住在稻草屋，這完全沒有問題。因為對自由主義來說，農民感受到的獨特經驗，價值並不下於億萬富翁的經驗，所以自由主義的作家才會寫出長篇小說，來描述貧困農民的生活體驗，而且連富翁也會熱切讀著這種小說。如果到百老匯去看音樂劇《悲慘世界》，會發現好位子的票價可能高達數百美元，全場觀眾的身價總和可能高達數十億美元，但他們看到尚萬強只為了偷麵包救活飢餓的姪子，就得入獄十九年，仍然會大感同情。\n\
    \n  同樣一套邏輯也適用於選舉——貧窮農民是一票，億萬富翁同樣只有一票。自由主義面對社會不平等的解方，不是讓每個人都有同樣的經驗，而是對於不同的人類經驗給予同等的價值。然而，如果貧富差距已經不只在於財產價值，而出現了真正在生物學上的差異，這套還行得通嗎？\n\
    \n  安潔莉娜·裘莉在《紐約時報》的文章中，就提過基因檢測成本高昂。她進行的檢測就要價三千美元（還不包括實際的乳房切除術、重建手術和相關治療）；在這個世界上，還有十億人每天收入不到一美元，十五億人每天收入在一美元到二美元之間。就算他們一輩子努力工作，也不可能負擔要價三千美元的基因檢測。目前貧富差距只有逐漸加劇。到2016年初，全球排名前六十二個最富有的人，擁有的財產總值等於最貧窮的三十六億人的資產總和！由於目前全球人口約為七十二億人，也就是說，這六十二個億萬富翁所擁有的，大約就是所有人類較窮那一半的財產總和。\n\
    \n  DNA檢測的成本可能會逐漸下降，但也不斷出現更昂貴的新療法。因此，雖然舊療法會逐漸變得讓一般民眾也能負擔，但精英份子永遠能領先幾步。縱觀歷史，富人享有許多社會地位和政治地位的優勢，但和窮人之間從未真正出現重大的生物差距。中世紀貴族曾號稱自己的血管流著高等的藍色血液，印度婆羅門也堅稱自己比其他階級更聰明，但這一切都只是胡扯瞎說。然而在未來，我們可能真的會看到有這一天，在經過升級的上層階級與其他社會階級之間，體質和認知能力真的出現重大差距。\n\
    \n## 出現「超人類」新種姓貴族\n\n  面對這種情境，科學家的標準答案是：二十世紀也有許多醫療突破是從富人開始，但最後全體人類都同樣受益，所以其實是有助於縮小社會差距、而非擴大差距。舉例來說，疫苗和抗生素最早只有西方國家的上層階級能夠享有，但現在已改善了全球所有人類的生活。\n\
    \n  不過，若認為這種過程將會在二十一世紀重演，那很可能只是一廂情願。原因有二：第一，醫學的概念正在經歷巨大變革。二十世紀的醫學旨在治癒病人，但二十一世紀的醫學則逐漸走向要讓健康的人再升級。「治癒病人」代表的是一種平等，因為這假設有一套正常身心健康的規範標準，而人人都應享有這樣的健康。如果有人低於標準，醫師就該解決問題，讓病人能夠「像大家一樣」。\n\
    \n  相較於此，要讓健康的人再升級，背後則是精英的概念，因為這裡並沒有所有人類一體適用的標準，而是要讓某些人就是比其他人強。有太多人就是希望自己記憶力比別人強、智商比別人高、性能力更不能輸。如果某種升級已經變得太便宜、太普遍，人人都能享有，那等於又要把基線提高，有待下一代療法繼續超越。\n\
    \n  因此，到了2070年，雖然窮人很有可能享有比今天更好的醫療保健，但他們與富人的差距將更為拉大。要做比較的時候，我們找的比較對象通常都會是同時代更幸運的人，而不是以前命運不佳的祖先。如果你現在對一個住在底特律貧民區的美國人說，他享有的醫療保健水準，可比一世紀前的美國人好得多了，大概不會有什麼鼓勵作用。事實上，這種話聽起來是十足的自以為是、自以為了不起。住底特律貧民區的美國人會說：「為什麼我要和十九世紀的工廠工人或農夫比？我也想過電視上那種有錢人的生活啊，或者至少是住郊區那種高級住宅啊。」\n\
    \n  同樣的，如果你到了2070年去告訴下層階級，他們享有的醫療保健已經比2017年好得多，對他們來說實在算不上半點安慰。因為他們心中的比較對象會是那些經過升級、主導世界的超人類。\n\
    \n  此外，就算會有許多醫療突破，我們仍然無法肯定貧窮人口到了2070年，一定能享有比今天更好的醫療保健，因為國家體制和精英階級可能根本不想再為窮人，提供充足的醫療保健服務。醫藥之所以能在二十世紀使群眾得益，是因為二十世紀是群眾的時代。二十世紀的軍隊需要幾百萬名健康的士兵，產業也需要幾百萬名健康的工人。因此，各國都建立起公共衛生服務體系，以確保國民的活力和健康。人類最大的醫療成就，正是為民眾提供衛生設施、疫苗接種和消滅流行病。1914年，日本精英階級之所以願意為貧民接種疫苗、在貧民區興建醫院、打造汙水處理系統，正是因為如果希望日本成為軍事和經濟強權，就需要數百萬名健康的士兵和工人。\n\
    \n  但這種群眾的時代可能已經結束，而針對大眾的醫學也將隨之走入歷史。隨著人類士兵和工人讓位給演算法，至少部分精英階級會認為，無須再浪費資源為大量無用的窮人提升、甚至是維持基本的健康水準，而該集中資源，讓極少數人升級到超人類的等級。\n\
    \n  今天，日韓等科技先進國家的出生率逐漸下滑，兒童人數逐漸減少，但這些國家卻是投注無比的心力，進行教養。反觀印度、巴西或奈及利亞這種人口眾多的發展中國家，是要怎麼跟日本競爭？這些國家就像一列長長的火車。頭等車廂的精英，享有與世界上最發達國家同等的醫療保健、教育和收入水準。但還有為數幾億的一般國民，坐在三等車廂，苦於疾病、無知和貧窮。\n\
    \n  在接下來這個世紀，印度、巴西或奈及利亞的精英，會想做些什麼？是要投資解決幾億個窮人的問題，還是讓少數幾個億萬富翁再升級？在二十世紀，因為窮人有軍事和經濟價值，精英階級必須解決窮人的問題；但是到了二十一世紀，精英階級最有效（雖然十分無情）的策略，很可能是乾脆切斷百無一用的三等車廂，只讓頭等車廂繼續前進。想與日本競爭，巴西更需要的可能不是幾百萬名健康的普通工人，而是少數幾個經過升級的超人類。\n\
    \n  一旦出現這種在身體、的情感和智力都遠超常人的超人類，自由主義信仰又怎麼可能存在？如果事實證明，這種超人類的經驗會和一般智人完全不同，情況又會如何？如果超人類一讀到關於低等智人盜賊經驗的小說，就覺得無聊，而一般人看到超人類的愛情肥皂劇，卻又完全無法理解，該怎麼辦？\n\
    \n  人類在二十世紀的偉大成就——克服饑荒、瘟疫和戰爭，都是為了讓所有人享有富足、健康與和平，完全一視同仁。至於二十一世紀的新議題——長生不死、幸福快樂、化身為神，也同樣希望為全人類服務。然而，由於這些計畫的目的在於超越、而非維持基本要求，最後就可能創造出新的超人類種姓階級，進而砍斷了原來的自由主義根源；超人類看待一般人，就會像是十九世紀歐洲人看待非洲人的情況。\n\
    \n  如果科學發現和科技發展將人類分為兩類：一類是絕大多數無用的普通人；另一類是一小部分經過升級的超人類，又或者是萬事的決定權已完全從人類手中轉移到具備高度智能的演算法手中——在這兩種情況下，自由主義都將崩潰！屆時會是什麼樣的新宗教或意識型態，可填補這樣的缺口，並且指導我們如神一般的後代呢？\n\
    \n# 新宗教：科技人文主義\n\n  新宗教浮現的地點，不太可能是阿富汗的洞穴、或是中東的宗教學校，反而會是從事科技研究的實驗室。就像社會主義承諾以蒸汽和電力為世界提供救贖，在接下來的幾十年間，新的科技宗教也可能承諾以演算法和基因為世界提供救贖，進而征服世界。\n\
    \n  雖然現在大家常常談的是激進伊斯蘭和基督教基本教義派，但從宗教觀點來說，目前全世界最有趣的地方並非伊斯蘭國或美國南部的聖經帶（Bible Belt，信奉基督教福音派的地區），而是矽谷。在美國加州的矽谷，各個高科技大師正在為我們醞釀和催生出全新的宗教，這些宗教信的不是神，而是科技。科技宗教同樣提供過往宗教的一切舊獎勵：快樂、和平、繁榮、甚至是永恆的生命，但方法卻是在當下取得地球科技的協助，而不是死後接受天堂的幫忙。\n\
    \n  這些新的科技宗教，可以分為兩大類型：科技人文主義和數據宗教。數據宗教認為人類已經完成了自己的偉大宇宙任務，現在應該交棒給完全不同的實體。關於數據宗教的夢想和噩夢，請讓我們留到下一章討論。本章主要談的是較保守的科技人文主義，這種宗教仍然認為人類是造物的巔峰之作，也堅持許多傳統的人文主義價值觀。科技人文主義同意：我們所知的智人（*Homo\
    \ sapiens*）已經走完了歷史上的道路，以後不再那麼重要了；但科技人文主義同時也認為：因此我們應該運用科技，創造出神人（*Homo deus*）這一種更優秀的人類形式。\n\
    \n  神人仍會保有一些基本的人類特徵，但同時更有升級後的生理和心理能力，並且能夠對抗最複雜的無意識演算法。由於智能正在與意識脫鉤，而且非意識的智能也正以驚人的速度發展，人類如果還想留在賽局當中，就得積極將心靈升級。。\n\
    \n## 第二次認知革命\n\n  七萬年前，認知革命改變了智人的心靈，讓原本毫不重要的非洲猿類成為世界的統治者。智人的心靈經過提升後，忽然能夠接觸到互為主體的領域，於是能夠創造神祇和企業、建立城市和帝國、發明文字和金錢，最後也能夠分裂原子、登上月球。據我們所知與推測，這種翻天覆地的革命，只是因為智人的DNA起了一點小變化，導致大腦稍微重新配線。如果真是如此，那麼科技人文主義或許也只需要對人類的基因組，再多做點改變，讓大腦再稍微重新配線，也就足以啟動第二次認知革命。\n\
    \n  第一次認知革命的心靈改造，是讓人類能夠接觸互為主體的領域，也就讓智人成了地球的統治者；第二次認知革命則可能會讓神人接觸到目前還難以想像的新領域，讓神人成為整個星系的主人。\n\
    \n  早在一個世紀前，進化人文主義就希望創造出超人類，而現在的科技人文主義則可說是舊夢想的新型態。希特勒等人的想法，是要透過選擇性育種和種族清洗來創造超人類，但二十一世紀科技人文主義則希望透過基因工程、奈米技術和腦機介面，以更和平的方式達成這項目標。\n\
    \n  科技人文主義希望讓人類的心靈升級，讓我們能夠接觸到目前未知的經驗、目前未聞的意識狀態。然而，要翻新人類心靈是一項非常複雜和危險的任務。第3章〈人類的獨特之處〉就討論過，我們還無法真正瞭解心靈，不知道心靈由何而生，也不知道心靈的作用為何。透過嘗試錯誤，我們正在學習如何設計與安排人類的心理狀態，但卻很少真正全面理解這種操縱可能有怎樣的影響。更糟的是，因為我們並不熟悉最完整的心理狀態範圍為何，也就不知道該把目標定在何處。\n\
    \n  我們就像是一座孤島上的居民，才剛剛發明了第一條船，正準備在沒有地圖、甚至也不知道目的地的情況下，揚帆出航。而且實際情況還可能更惡劣。在這個比方裡，這些島民至少還知道自己活在一片茫茫大海中，知道自己只占據了一塊小地方。但我們卻並未意識到，我們可能也只是住在一座小小的意識島上，而外面由我們不熟悉的心理狀態所構成的海洋，卻可能是無邊無盡。\n\
    \n## 意識的頻譜\n\n  真正的光譜和聲譜範圍，都比人類能看到和聽到的更為廣泛；同樣的，心理狀態的頻譜也可能遠大於普通人的感知。人類肉眼只能看到波長在400奈米到700奈米之間的可見光，而在人眼這個小小的視覺範圍之外，還延伸出許多不可見但廣大的領域，向上有紅外線、微波、無線電波，向下則有不可見的紫外線、X射線和γ射線。"
  mdcn: "## 神使与算法的崛起\n\n  的人們都找上同一位神使、而且每個人也都相信這位神使的時候，神使就搖身一變，成為君主。這時的Waze必須為大局著想。或許它只會告訴一半的駕駛人二號公路順暢，而不透露給其他駕駛人知道。這樣一來，一號公路的塞車壓力能夠減輕，而二號公路也不至於無法消化車流。\n\
    \n  微軟正在開發一套更複雜的系統，名為Cortana。名稱出自微軟熱門遊戲《最後一戰》(Halo) 當中的一個AI角色，現在則是一款AI個人助理。微軟希望這能夠成為未來視窗作業系統的內建功能，並鼓勵用戶允許Cortana存取個人電腦內的所有文件、電子郵件和應用程式，好讓Cortana更瞭解用戶，進而提供對許多事務的建議，並成為能夠代表用戶興趣的虛擬代理人。Cortana可以提醒你買生日禮物送給太太，幫你挑禮物，預訂餐廳位子，還會在晚餐前一小時告訴你該先吃藥。也可以警告你，再不放下手上的《人類大歷史》，一場重要的商務會議就要遲到了。就在你要開始開會之前，Cortana還會警告你，現在你的血壓太高、多巴胺分泌量又太低，根據過去的統計，這種時候你的商業判斷常常會出大錯，所以最好一切先別下定論，別許下什麼承諾、或是簽署任何合約。\n\
    \n  一旦Cortana從神使發展到代理人，就可能會開始直接代表主人，互相對談。一開始可能一切都十分單純，我的Cortana聯絡你的Cortana，找出適當的開會時間地點之類。但接下來可能就是在求職的時候，雇主說不用麻煩寄履歷了，只要允許他的Cortana問我的Cortana各種問題就行。又或者，有個可能交往對象的Cortana跑來找我的Cortana，互相比較一下過往的種種紀錄，看看這兩人合不合得來；但這一切卻可能完全沒讓人類主人知道。\n\
    \n  隨著Cortana得到愈來愈多授權，也可能開始鉤心鬥角，好為主人謀求更高利益；於是，你在就業或婚姻市場的表現，也可能愈來愈得看看你的 Cortana\
    \ 品質如何。有錢人買得起最新的 Cortana，就能遠遠超越窮人和他們的舊版 Cortana。\n\n  然而這裡最難解的問題在於：Cortana 的主人身分究竟為何？我們已經提過，人類並非不可分割的個體，也沒有單一整合的自我。這樣一來，Cortana\
    \ 該迎合的是誰的利益？假設我的敘事自我，在新年下定決心，要控制飲食、每天上健身房。但一週後到了該上健身房的時間，經驗自我卻告訴 Cortana 開電視、訂披薩。Cortana\
    \ 該怎麼辦？是要聽從經驗自我的命令，還是一週前敘事自我下的決定？\n\n  你可能會想，Cortana 不就像個鬧鐘嗎？敘事自我在晚上設定了鬧鐘，好在早上把經驗自我叫醒去上班。然而，Cortana\
    \ 擁有的權力會遠高於鬧鐘。經驗自我只要按個鈕，就能讓鬧鐘安靜下來；但相較之下，反而是 Cortana 太瞭解我，知道只要按下我的哪一個內部按鈕，就能讓我聽它的「建議」。\n\
    \n  在這場代理人競賽中，微軟的 Cortana 並不孤單。Google 即時資訊（Google Now）和蘋果的 Siri，也朝著同樣的方向前進。亞馬遜（Amazon）同樣會用演算法不斷研究你，再用累積的知識來推薦產品。逛實體書店的時候，我是自己在書架之間閒逛，憑著自己的感覺挑出想看的書。但是逛亞馬遜虛擬書店的時候，則是有演算法立刻跳出來告訴我：「我知道你先前喜歡《人類大歷史》。與你的品味相似的人，也喜歡這本《人類大命運》。」\n\
    \n  這還只是開始。今天在美國，讀電子書的人口已超越讀紙本書的人口。像是亞馬遜的 Kindle 等電子書，就能在用戶閱讀時蒐集資料。舉例來說，你的 Kindle\
    \ 會知道你在哪些篇幅讀得快、哪些章節讀得慢，在哪一頁你休息了一會，又是在哪一行你放棄了這本書，再也沒讀過。（最好趕快告訴作者，讓他重寫那一部分。）\n\n\
    \  如果 Kindle 再升級，裝上臉部辨識和生理感測器，就能知道你讀的每個句子如何影響你的心跳和血壓。它能知道什麼會讓你笑、什麼讓你哭、什麼讓你生氣。不久之後，在你讀書的時候，書也在讀你。你很快就會忘了大部分讀過的內容，但亞馬遜卻是永遠什麼都不會忘。有了這樣的資料，亞馬遜幫你選書，就能精準到無以復加的地步，也會讓亞馬遜清楚瞭解你是怎樣的人、能如何讓你激動或平靜。\n\
    \n  最後可能走到一個境地，是我們一分一秒都無法與這個全知的網路斷開。斷開，就等於死亡。例如假設醫療理想得以實現，未來的人類將會在體內植入許多生理感測器、仿生器官和奈米機器人，以監控人體健康，並避免感染、疾病和傷害。但這些裝置就會需要二十四小時全天上線，才能時時追上最新的醫療發展，以及抵抗網路空間爆發的新瘟疫。一如家用電腦會不斷受到病毒、蠕蟲和特洛伊木馬的攻擊，以後的心律調節器、助聽器和奈米科技免疫系統，也無法倖免。如果不去定期更新身體中的防毒程式，可能某天早上醒來，就發現血管中的幾百萬個奈米機器人，都已操縱在某個北韓駭客的手中。\n\
    \n  因此，二十一世紀的新科技可能會整個扭轉人文主義革命的方向，讓人類失去權威，把掌控權交到非人類的演算法手中。如果你覺得這個方向實在太駭人，該怪的並不是那些電腦怪咖，這其實是生物學家的責任。我們必須意識到，推動這個趨勢的主要力量是來自生物學的見解，而非資訊科學。是生命科學認為，生物就是各種演算法。如果生物的運作真的和演算法大有不同，就算電腦在其他領域大展神威，仍然不可能瞭解人類、引導人類的生命，更不可能開始與人合而為一。但一等到生物學家判斷生物也是演算法，就等於拆除了有機和無機之間的那堵牆，讓電腦革命從單純機械事務轉變為生物的災難，也將權威從個人移轉到了演算法網路。\n\
    \n  確實有些人對這種發展感到恐懼，但事實上，也有數百萬人再樂意不過。今天許多人已經放棄了自己的隱私和個別性，把許多生命點滴全放上網路，每個行動都想記錄下來；只要與網路的連結一中斷，就算只是幾分鐘，也會讓他們坐立難安。就在我們身邊，處處都有權威由人類轉移到演算法的情形，而且不是因為什麼重大的政府決策，而是由於如狂潮般的日常個人選擇。\n\
    \n  如果再不小心，結果可能就會是歐威爾筆下的那種警察國家，而且持續監控的還不只是我們外在的各種舉止，甚至也包括我們身體裡的活動、以及大腦中的活動。可以想想，如果生理感測器無所不在，史達林可能會用來做什麼？而普丁又可能想做什麼？\n\
    \n  目前，雖然有許多捍衛人類個體性的人，擔心二十世紀的噩夢重現，竭力抵抗這個似曾相識的歐威爾式敵人，但人類的個體性其實還受到另一方向更大的威脅。在二十一世紀，與其說個人會被外在力量殘忍輾碎，更有可能的是從內部緩緩崩解。\n\
    \n  今天，大多數企業和政府都會尊重每個人的個體性，承諾依據每個人的需求和願望，提供醫藥、教育和娛樂。但為了達到這個目的，企業和政府就得將個人解構為許多生化上的子系統，用無所不在的感測器監控這些子系統，並用強大的演算法加以解讀。在這個過程中，我們會發現：所謂不可分割的個體，只是一種宗教幻想。現實上，整體現實就是許多生化演算法和電子演算法的混合體，沒有清楚的邊界、也沒有自己的中心。\n\
    \n## 貧富不均更惡化\n\n  在自由主義面臨的三項實際威脅中，我們已經討論了兩項：第一，人類將完全失去價值；第二，人類整體仍然有價值，但個人將不再具有權威，而是由外部演算法來管理。社會仍然需要由你來譜交響樂、教歷史或寫電腦程式，但社會對你的瞭解會超越你自己，也因此會為你做出大部分重要的決定；而且，你還會覺得真是太好了。這樣的世界並不一定壞，但會是個後自由主義的世界。\n\
    \n  自由主義面臨的第三個威脅在於：有些人仍然會是不可或缺、是社會系統難以瞭解和駕馭的，而且會形成金字塔尖端、人數極少的特權精英階級，由升級後的人類組成。這些超人類將會享有前所未有的能力及創造力，讓他們能夠做出許多世上最重要的決定。他們會為社會執行關鍵的服務，而社會既無法瞭解、也無法管控這些人。然而大多數人類並不會升級，於是也就成了一種新的劣等種姓階級，同時受到電腦演算法和新起的超人類所控制主導。\n\
    \n  人類如果從生物定義上，分裂成不同的種姓階級，就會摧毀自由主義意識型態的根基。有自由主義的地方，仍然可能有各種社會階級和貧富差距，而且因為自由主義把自由看得比平等更為重要，所以甚至也覺得有差距是理所當然。但即便如此，自由主義仍然假定所有人類都有同樣的價值和權威。\n\
    \n  從自由主義的觀點，有人是億萬富翁、住在豪華的城堡裡，也有人是貧窮的農民、住在稻草屋，這完全沒有問題。因為對自由主義來說，農民感受到的獨特經驗，價值並不下於億萬富翁的經驗，所以自由主義的作家才會寫出長篇小說，來描述貧困農民的生活體驗，而且連富翁也會熱切讀著這種小說。如果到百老匯去看音樂劇《悲慘世界》，會發現好位子的票價可能高達數百美元，全場觀眾的身價總和可能高達數十億美元，但他們看到尚萬強只為了偷麵包救活飢餓的姪子，就得入獄十九年，仍然會大感同情。\n\
    \n  同樣一套邏輯也適用於選舉——貧窮農民是一票，億萬富翁同樣只有一票。自由主義面對社會不平等的解方，不是讓每個人都有同樣的經驗，而是對於不同的人類經驗給予同等的價值。然而，如果貧富差距已經不只在於財產價值，而出現了真正在生物學上的差異，這套還行得通嗎？\n\
    \n  安潔莉娜·裘莉在《紐約時報》的文章中，就提過基因檢測成本高昂。她進行的檢測就要價三千美元（還不包括實際的乳房切除術、重建手術和相關治療）；在這個世界上，還有十億人每天收入不到一美元，十五億人每天收入在一美元到二美元之間。就算他們一輩子努力工作，也不可能負擔要價三千美元的基因檢測。目前貧富差距只有逐漸加劇。到2016年初，全球排名前六十二個最富有的人，擁有的財產總值等於最貧窮的三十六億人的資產總和！由於目前全球人口約為七十二億人，也就是說，這六十二個億萬富翁所擁有的，大約就是所有人類較窮那一半的財產總和。\n\
    \n  DNA檢測的成本可能會逐漸下降，但也不斷出現更昂貴的新療法。因此，雖然舊療法會逐漸變得讓一般民眾也能負擔，但精英份子永遠能領先幾步。縱觀歷史，富人享有許多社會地位和政治地位的優勢，但和窮人之間從未真正出現重大的生物差距。中世紀貴族曾號稱自己的血管流著高等的藍色血液，印度婆羅門也堅稱自己比其他階級更聰明，但這一切都只是胡扯瞎說。然而在未來，我們可能真的會看到有這一天，在經過升級的上層階級與其他社會階級之間，體質和認知能力真的出現重大差距。\n\
    \n## 出現「超人類」新種姓貴族\n\n  面對這種情境，科學家的標準答案是：二十世紀也有許多醫療突破是從富人開始，但最後全體人類都同樣受益，所以其實是有助於縮小社會差距、而非擴大差距。舉例來說，疫苗和抗生素最早只有西方國家的上層階級能夠享有，但現在已改善了全球所有人類的生活。\n\
    \n  不過，若認為這種過程將會在二十一世紀重演，那很可能只是一廂情願。原因有二：第一，醫學的概念正在經歷巨大變革。二十世紀的醫學旨在治癒病人，但二十一世紀的醫學則逐漸走向要讓健康的人再升級。「治癒病人」代表的是一種平等，因為這假設有一套正常身心健康的規範標準，而人人都應享有這樣的健康。如果有人低於標準，醫師就該解決問題，讓病人能夠「像大家一樣」。\n\
    \n  相較於此，要讓健康的人再升級，背後則是精英的概念，因為這裡並沒有所有人類一體適用的標準，而是要讓某些人就是比其他人強。有太多人就是希望自己記憶力比別人強、智商比別人高、性能力更不能輸。如果某種升級已經變得太便宜、太普遍，人人都能享有，那等於又要把基線提高，有待下一代療法繼續超越。\n\
    \n  因此，到了2070年，雖然窮人很有可能享有比今天更好的醫療保健，但他們與富人的差距將更為拉大。要做比較的時候，我們找的比較對象通常都會是同時代更幸運的人，而不是以前命運不佳的祖先。如果你現在對一個住在底特律貧民區的美國人說，他享有的醫療保健水準，可比一世紀前的美國人好得多了，大概不會有什麼鼓勵作用。事實上，這種話聽起來是十足的自以為是、自以為了不起。住底特律貧民區的美國人會說：「為什麼我要和十九世紀的工廠工人或農夫比？我也想過電視上那種有錢人的生活啊，或者至少是住郊區那種高級住宅啊。」\n\
    \n  同樣的，如果你到了2070年去告訴下層階級，他們享有的醫療保健已經比2017年好得多，對他們來說實在算不上半點安慰。因為他們心中的比較對象會是那些經過升級、主導世界的超人類。\n\
    \n  此外，就算會有許多醫療突破，我們仍然無法肯定貧窮人口到了2070年，一定能享有比今天更好的醫療保健，因為國家體制和精英階級可能根本不想再為窮人，提供充足的醫療保健服務。醫藥之所以能在二十世紀使群眾得益，是因為二十世紀是群眾的時代。二十世紀的軍隊需要幾百萬名健康的士兵，產業也需要幾百萬名健康的工人。因此，各國都建立起公共衛生服務體系，以確保國民的活力和健康。人類最大的醫療成就，正是為民眾提供衛生設施、疫苗接種和消滅流行病。1914年，日本精英階級之所以願意為貧民接種疫苗、在貧民區興建醫院、打造汙水處理系統，正是因為如果希望日本成為軍事和經濟強權，就需要數百萬名健康的士兵和工人。\n\
    \n  但這種群眾的時代可能已經結束，而針對大眾的醫學也將隨之走入歷史。隨著人類士兵和工人讓位給演算法，至少部分精英階級會認為，無須再浪費資源為大量無用的窮人提升、甚至是維持基本的健康水準，而該集中資源，讓極少數人升級到超人類的等級。\n\
    \n  今天，日韓等科技先進國家的出生率逐漸下滑，兒童人數逐漸減少，但這些國家卻是投注無比的心力，進行教養。反觀印度、巴西或奈及利亞這種人口眾多的發展中國家，是要怎麼跟日本競爭？這些國家就像一列長長的火車。頭等車廂的精英，享有與世界上最發達國家同等的醫療保健、教育和收入水準。但還有為數幾億的一般國民，坐在三等車廂，苦於疾病、無知和貧窮。\n\
    \n  在接下來這個世紀，印度、巴西或奈及利亞的精英，會想做些什麼？是要投資解決幾億個窮人的問題，還是讓少數幾個億萬富翁再升級？在二十世紀，因為窮人有軍事和經濟價值，精英階級必須解決窮人的問題；但是到了二十一世紀，精英階級最有效（雖然十分無情）的策略，很可能是乾脆切斷百無一用的三等車廂，只讓頭等車廂繼續前進。想與日本競爭，巴西更需要的可能不是幾百萬名健康的普通工人，而是少數幾個經過升級的超人類。\n\
    \n  一旦出現這種在身體、的情感和智力都遠超常人的超人類，自由主義信仰又怎麼可能存在？如果事實證明，這種超人類的經驗會和一般智人完全不同，情況又會如何？如果超人類一讀到關於低等智人盜賊經驗的小說，就覺得無聊，而一般人看到超人類的愛情肥皂劇，卻又完全無法理解，該怎麼辦？\n\
    \n  人類在二十世紀的偉大成就——克服饑荒、瘟疫和戰爭，都是為了讓所有人享有富足、健康與和平，完全一視同仁。至於二十一世紀的新議題——長生不死、幸福快樂、化身為神，也同樣希望為全人類服務。然而，由於這些計畫的目的在於超越、而非維持基本要求，最後就可能創造出新的超人類種姓階級，進而砍斷了原來的自由主義根源；超人類看待一般人，就會像是十九世紀歐洲人看待非洲人的情況。\n\
    \n  如果科學發現和科技發展將人類分為兩類：一類是絕大多數無用的普通人；另一類是一小部分經過升級的超人類，又或者是萬事的決定權已完全從人類手中轉移到具備高度智能的演算法手中——在這兩種情況下，自由主義都將崩潰！屆時會是什麼樣的新宗教或意識型態，可填補這樣的缺口，並且指導我們如神一般的後代呢？\n\
    \n# 新宗教：科技人文主義\n\n  新宗教浮現的地點，不太可能是阿富汗的洞穴、或是中東的宗教學校，反而會是從事科技研究的實驗室。就像社會主義承諾以蒸汽和電力為世界提供救贖，在接下來的幾十年間，新的科技宗教也可能承諾以演算法和基因為世界提供救贖，進而征服世界。\n\
    \n  雖然現在大家常常談的是激進伊斯蘭和基督教基本教義派，但從宗教觀點來說，目前全世界最有趣的地方並非伊斯蘭國或美國南部的聖經帶（Bible Belt，信奉基督教福音派的地區），而是矽谷。在美國加州的矽谷，各個高科技大師正在為我們醞釀和催生出全新的宗教，這些宗教信的不是神，而是科技。科技宗教同樣提供過往宗教的一切舊獎勵：快樂、和平、繁榮、甚至是永恆的生命，但方法卻是在當下取得地球科技的協助，而不是死後接受天堂的幫忙。\n\
    \n  這些新的科技宗教，可以分為兩大類型：科技人文主義和數據宗教。數據宗教認為人類已經完成了自己的偉大宇宙任務，現在應該交棒給完全不同的實體。關於數據宗教的夢想和噩夢，請讓我們留到下一章討論。本章主要談的是較保守的科技人文主義，這種宗教仍然認為人類是造物的巔峰之作，也堅持許多傳統的人文主義價值觀。科技人文主義同意：我們所知的智人（*Homo\
    \ sapiens*）已經走完了歷史上的道路，以後不再那麼重要了；但科技人文主義同時也認為：因此我們應該運用科技，創造出神人（*Homo deus*）這一種更優秀的人類形式。\n\
    \n  神人仍會保有一些基本的人類特徵，但同時更有升級後的生理和心理能力，並且能夠對抗最複雜的無意識演算法。由於智能正在與意識脫鉤，而且非意識的智能也正以驚人的速度發展，人類如果還想留在賽局當中，就得積極將心靈升級。。\n\
    \n## 第二次認知革命\n\n  七萬年前，認知革命改變了智人的心靈，讓原本毫不重要的非洲猿類成為世界的統治者。智人的心靈經過提升後，忽然能夠接觸到互為主體的領域，於是能夠創造神祇和企業、建立城市和帝國、發明文字和金錢，最後也能夠分裂原子、登上月球。據我們所知與推測，這種翻天覆地的革命，只是因為智人的DNA起了一點小變化，導致大腦稍微重新配線。如果真是如此，那麼科技人文主義或許也只需要對人類的基因組，再多做點改變，讓大腦再稍微重新配線，也就足以啟動第二次認知革命。\n\
    \n  第一次認知革命的心靈改造，是讓人類能夠接觸互為主體的領域，也就讓智人成了地球的統治者；第二次認知革命則可能會讓神人接觸到目前還難以想像的新領域，讓神人成為整個星系的主人。\n\
    \n  早在一個世紀前，進化人文主義就希望創造出超人類，而現在的科技人文主義則可說是舊夢想的新型態。希特勒等人的想法，是要透過選擇性育種和種族清洗來創造超人類，但二十一世紀科技人文主義則希望透過基因工程、奈米技術和腦機介面，以更和平的方式達成這項目標。\n\
    \n  科技人文主義希望讓人類的心靈升級，讓我們能夠接觸到目前未知的經驗、目前未聞的意識狀態。然而，要翻新人類心靈是一項非常複雜和危險的任務。第3章〈人類的獨特之處〉就討論過，我們還無法真正瞭解心靈，不知道心靈由何而生，也不知道心靈的作用為何。透過嘗試錯誤，我們正在學習如何設計與安排人類的心理狀態，但卻很少真正全面理解這種操縱可能有怎樣的影響。更糟的是，因為我們並不熟悉最完整的心理狀態範圍為何，也就不知道該把目標定在何處。\n\
    \n  我們就像是一座孤島上的居民，才剛剛發明了第一條船，正準備在沒有地圖、甚至也不知道目的地的情況下，揚帆出航。而且實際情況還可能更惡劣。在這個比方裡，這些島民至少還知道自己活在一片茫茫大海中，知道自己只占據了一塊小地方。但我們卻並未意識到，我們可能也只是住在一座小小的意識島上，而外面由我們不熟悉的心理狀態所構成的海洋，卻可能是無邊無盡。\n\
    \n## 意識的頻譜\n\n  真正的光譜和聲譜範圍，都比人類能看到和聽到的更為廣泛；同樣的，心理狀態的頻譜也可能遠大於普通人的感知。人類肉眼只能看到波長在400奈米到700奈米之間的可見光，而在人眼這個小小的視覺範圍之外，還延伸出許多不可見但廣大的領域，向上有紅外線、微波、無線電波，向下則有不可見的紫外線、X射線和γ射線。"
