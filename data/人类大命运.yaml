  md: '希特勒向德國選民懇求信任時,只說得出一項對他有利的論點:他在戰壕裡的經驗所學到的,是在任何大學、企業總部或政府部門永遠學不到的東西。人們跟隨他、投票支持他,是因為認同了他的想法,也認為這個世界是一座叢林,殺不死我們的,只會讓我們更強壯。


    自由主義是與溫和版的民族主義結合,希望保護每個人類社群的獨特經驗。但像是希特勒這種進化人文主義者,則認為只有特定國家是人類進步的引擎,認定這些國家必須教訓、甚至是消滅任何阻礙他們的人。


    但我還是要提醒一下,希特勒和納粹只是進化人文主義的一個極端版本。就像是史達林的古拉格勞改營,並不會讓我們全盤否定所有社會主義理念和論點;納粹主義雖然造成許多恐怖,也不該妨礙我們找出其中可能有價值的見解。納粹主義的誕生,是把進化人文主義搭配了特定的種族理論,再加上極端民族主義情感。並非所有進化人文主義者都是種族主義者,也不是只要相信人類有進化的潛力,就得建立警察國家和集中營。


    到了現在,奧許威茲集中營的意義,應該像是一個血紅的警告標誌,而不是像黑幕直接掩蓋了人類地平線的一整個區塊。對於形塑現代文化,進化人文主義已經扮演過重要的角色;到了二十一世紀,進化人文主義要扮演的角色,有可能甚至更為重要。


