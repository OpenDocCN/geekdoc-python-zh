  md: '假設你是住在一座每年都會爆發痢疾的中世紀城鎮。你下定決心，一定要找到解方。於是，你需要資金成立一間工作坊，購買藥草和各種罕見的化學品，付助手薪水，還得前往遠地拜訪名醫。另外，在你全心投入研究時，還得養活自己和家人。但你自己沒什麼錢。你想去找當地的磨坊主、麵包師傅和鐵匠，拜託他們在這幾年間供應你的需求；你也向他們保證，等到你找出解方、財源滾滾，就會還債。


    很遺憾，磨坊主、麵包師傅和鐵匠不太可能同意。他們今天就得養活家人，而且對你能找到什麼靈丹妙藥，並沒有信心。他們可不是什麼三歲小孩，但從小到大，哪聽過有人能為可怕的疾病找出新藥物？想拿到食物和各種生活必需品，就得付現。但你都還沒找到這種良藥，所有時間又都投入研究，怎麼可能有錢？你只好心不甘情不願，再回田裡去耕作。於是痢疾依舊每年給城鎮帶來苦難，沒人嘗試找出新療法，也沒有任何一枚金幣換了手。就是這樣，經濟沒了活力，科學停滯不前。


    # 銀行家與吸血蝙蝠有何不同？


    一直要到了現代，因為人們開始相信未來，促成了信貸這項奇蹟，才終於打破這個惡性循環。信貸正是信任在經濟上的表現。如今，如果我想開發新藥、但手上資金不足，我可以去向銀行貸款，或是找上私人投資或創投基金。2014年夏天，伊波拉病毒在西非爆發疫情，你猜猜那些忙著開發抗伊波拉藥物和疫苗的製藥公司，股票表現如何？股價簡直是一飛衝天。德克米拉（Tekmira）製藥公司的股價上漲五成，百歐克斯（BioCryst）更大漲九成！'
