    # 第4章


    # 說書人


    狼或黑猩猩這些動物，都活在一種雙重現實之中。一方面很熟悉外在的各種客觀實體，像是樹木、岩石和河流；但另一方面，也知道自己的主觀經驗，像是恐懼、喜悅和欲望。相較之下，智人則是活在一種三重現實之中：除了樹木、河流、恐懼和欲望，智人的世界還有各種關於金錢、神祇、國家和公司的虛構故事。歷史逐漸開展，神祇、國家和公司的影響也就不斷成長，而河流、恐懼和欲望則成為被犧牲的代價。世界上還是有河，人類也依然受到恐懼和欲望的驅使，但是耶穌基督、法國、蘋果公司都學會了如何築壩攔水、將河流控為己用，以及形塑我們最深切的焦慮和渴望。


    到了二十一世紀，新科技可能會讓這些虛構故事更為強大。為了瞭解我們的未來，就必須回顧像是耶穌基督、法蘭西共和國和蘋果公司這些故事，看看它們究竟是如何得到這麼大的力量。人類認為自己創造了歷史，但歷史其實就是圍繞著各種虛構故事而轉。單一人類個體的基本能力，從石器時代以來並沒有多大改變，真要說有什麼改變，很可能是變弱了。但成長的是各種虛構故事的力量，


    174'
  - '[PAGE 178]


    推動了歷史，讓我們從石器時代走到了矽晶時代。


    這一切開始於大約七萬年前，認知革命讓智人開始談著只存在於人類想像之中的事情。而在接下來的六萬年間，智人編織出許多虛構故事，只是這時的故事仍然規模有限，流傳也不廣。某個部落裡崇拜的祖靈，可能到了隔壁部落就已經一無所知；某個地方能用作通貨的貝殼，翻過山脈就可能毫無價值。但光是像祖靈或是貝殼的價值這種虛構故事，就已經能促成幾百、甚至是幾千個智人通力合作，遠超過尼安德塔人或黑猩猩，也就讓智人大占優勢。然而，如果只倚靠狩獵或是採集，並不足以支持城市、甚至王國的運作，因此只要智人仍然是狩獵採集者，就不可能有真正的大規模合作。也因此，石器時代的各種神祇、精靈和惡魔，說來並不強大。


    到了大約一萬二千年前，農業革命揭開序幕，為人類提供了必要的物質基礎，能夠擴大並強化人際網路。有了農業，開始有可能養活擁擠城市裡的幾千個市民、或是紀律嚴明的軍隊裡成千上萬的士兵。然而，這種人際網路也遇到了新的障礙。在維護這種集體神話、組織大規模合作的過程中，早期農民只能依賴人腦的資料處理能力，但人腦實在能力有限。


    # 蘇美神祇相當於現代公司


    農民深信各種偉大神祇的故事。他們為最敬愛的神祇，興建神廟、舉辦慶典、甘心奉獻，雙手送上土地、什一奉獻，或是各種祭品禮物。在大約六千年前的蘇美文化，城市開始成形，而神廟不僅是信仰中心，也是最重要的政治和經濟樞紐。蘇美神祇的功能，很類似現代的品牌和公司。'
  - '[PAGE 179]


    人類大命運


    在今日，公司是個虛構的法律實體，能夠擁有財產、借貸、雇用員工，進行買賣交易。在烏魯克（Uruk）、拉格什（Lagash）和舒魯帕克（Shurupak）這些古城裡，神祇也是法律實體，能擁有田地和奴隸、發放和接受貸款、支付薪資、建造水壩和開築運河。


    由於神不會死，也沒有後代互相爭奪遺產，也就累積愈來愈多的財富和權力。愈來愈多蘇美人發現自己成了神的員工，拿著神的貸款，耕作神的土地，也得向神繳稅和什一奉獻。就像現在有人是谷歌的僱員、有人是微軟的員工，在古代的烏魯克，可能某個人是大神恩基（Enki）的僱員，而鄰居則在女神伊南娜（Inanna）手下。恩基和伊南娜的神廟刻畫了烏魯克的天際線，神紋也出現在建物、產品和衣服上。對蘇美人而言，恩基和伊南娜再真實不過，就像我們眼中的谷歌和微軟，一樣真實。與先前石器時代的鬼魂和神靈相比，蘇美的神祇已經是非常強大的實體。


    不用說，各種業務當然不會由神祇親自動手，祂們根本只是人類的想像，也只會出現在想像之中。所有日常業務都是交給神廟的祭司（正如谷歌和微軟也需要有血有肉的真人來管理業務）。然而，隨著神祇名下的財產和權力愈來愈多，祭司開始無力應付。雖然祭司可能代表了神威浩蕩的天空之神、無所不知的地之女神，但自己畢竟還是血肉之軀。他們很難統統記住，究竟哪些是女神伊南娜的莊園、果園和田地，有哪些伊南娜的員工已經領了薪資，又有哪些伊南娜的佃戶還沒付佃租，這位女神對債務人收取的又是多高的利率。這正是一大主因，導致無論是在蘇美、或全球其他地方，就算農業革命已經發生數千年，人類的合作網路卻遲遲無法大幅擴張。既沒有幅員遼闊的王國，也沒有遍及四海的貿易網路，更沒有全球信仰的宗教。


