  md: '豬肉,上帝會懲罰我們,我們最後不會有好下場。這不是我說的,甚至也不是拉比說的。如果是拉比創造這個世界,或許他就會創造一個讓豬肉也符合猶太戒律的世界。可是創造這個世界的不是拉比,而是上帝。雖然我不知道為什麼,但上帝說了,我們不該吃豬肉。所以我們就該聽話。懂了嗎?」


    1943年,一個德國男孩去找他爸爸,那是一位資深蓋世太保,男孩問:「爸,為什麼我們要殺猶太人呢?」這位爸爸穿著他筆挺的制服和發亮的皮靴,鄭重解釋道:「弗烈茲啊,世界本來就是這樣啊。你還小,還不懂,如果我們允許猶太人活下去,他們就會造成人類退化、滅絕。這不是我說的,甚至也不是元首說的。如果是希特勒創造這個世界,或許他就會創造一個沒有天擇法則的世界,讓猶太人和雅利安人能夠和諧共處。可是創造這個世界的不是希特勒,他只是設法找出了自然律,然後告訴我們該怎樣遵照自然律來生活。如果不服從這些自然律,最後不會有好下場。懂了嗎?」


    2016年,一個英國男孩也跑去找他爸爸,那是一位自由民主黨的國會議員,男孩問:「爸,為什麼我們要管中東那些穆斯林的人權啊?」這位爸爸放下手上那杯茶,想了一下,回答道:「鄧肯啊,世界本來就是這樣啊。你還小,還不懂,但所有人、包括中東的穆斯林,其實本質都相同,都該享有一樣的自然權利(天賦人權)。這不是我說的,甚至也不是國會說的。如果是國會創造這個世界,或許在所有那些什麼量子物理以外,也會有個人權委員會,規定讓普世都有人權。可是創造這個世界的不是國會,國會只是想讓一切都合乎道理,我們必須尊重這件事,就算中東的穆斯林也該擁有自然權利,否則我們自己的權利很快也會遭到侵犯,最後不會有好下場。懂了嗎?」'
