    診所以後，就像摩門教創始人約瑟·斯密（Joseph Smith）一樣，完完全全是個異性戀者。站在診所門前，他心裡又複習了一次想對醫師說的話：「醫師，這裡是十萬美元。請幫我動個手術，讓我以後永遠不會再想要男人了。」他接著按了鈴，但開門之後，看到的簡直是「急診室的春天」裡的喬治·克隆尼，活生生在他眼前。這個小夥子魂都飛了，喃喃說道：「醫師，這裡是十萬美元。請幫我動個手術，讓我以後永遠只愛男人、不會再想要女人了。」


    可以說，是這個年輕人真實的自我，打敗了過去經歷的宗教洗腦嗎？又或是一時的誘惑，讓他背叛了按鈴前的自己？又或者，根本沒有什麼真實的自我，所以也不會有所謂的聽從或背叛？只要我們能夠設計及重塑意志，就無法再把意志看作意義和權威的本源；因為不管我們的意志怎麼說，我們總能讓它改變意見。


    ## 科技人文主義的兩難


    人文主義認為，只有人的欲望才能使世界充滿意義。但如果我們連欲望都能選擇，又是根據什麼基礎來做這種選擇？


    假設在《羅密歐與朱麗葉》的開場，是羅密歐可以決定要愛上誰，而且就算決定了，還是隨時能夠反悔重來。這樣一來，這齣劇會成個什麼樣子？但這正是科技進步為我們刻畫的未來：如果我們的欲望讓我們不舒服，就讓科技消滅這個欲望。如果整個宇宙所憑依的釘子釘錯了地方，就用科技把整支釘子拔出來，釘到別的地方去。但究竟要釘在哪？如果寰宇四方均能落釘，我該挑哪裡？又為什麼該挑那裡呢？


    # 第10章 新宗教：科技人文主義


    人文主義的戲劇，多半是以某個令人痛苦的欲望為開展。例如蒙太玖家的羅密歐，愛上了凱普雷特家的朱麗葉，兩家卻是世仇，於是雙方都非常痛苦。科技對這種情節的解法，就是確保讓我們不會有令人痛苦的欲望。如果羅密歐和朱麗葉服個藥丸、或是戴個頭盔，直接把那些對彼此造成不幸的愛意給消滅掉，不就沒事了嗎？


    在此，科技人文主義面臨了一項無解的兩難。它認為人的意志是宇宙中最重要的東西，因此推動人類開發能夠控制、重新設計意志的科技。畢竟，能夠控制全世界最重要的東西，不是太好了嗎？然而一旦這樣的控制成真，過去神聖的人類就會成了另外一項設計品，反而讓科技人文主義不知何去何從。只要我們仍然相信人類的意志和經驗是權威和意義的本源，就永遠無法面對這些科技。


    因此，有個更大膽的科技宗教，打算直接徹底切斷與人文主義的臍帶。這個科技宗教所預見的世界，並不是圍繞任何人類生命形式的欲望和經驗而轉。


    但又是什麼東西能夠取代欲望和經驗，成為一切意義和權威的本源？在2016年，正有一位候選人坐在歷史的接待室，等候面試。這位候選人名叫「資訊」。


    目前，最耐人尋味的新興科技宗教正是數據主義（Dataism），崇拜的既不是神祇、也不是人類，而是敬拜資料數據。


    # 第11章 信數據得永生？


    數據主義認為，宇宙是由資料流組成，任何現象或實體的價值就在於對資料處理的貢獻。¹讀者可能覺得這實在是極端的胡言亂語，但事實上，大部分的科學機構都已經改信了數據主義。


    數據主義是由兩大科學潮流爆炸性匯流而成的。在達爾文發表《物種原始論》一百五十年後，生命科學已經認為生物都是生化演算法。此外，在圖靈想出「圖靈機」（Turing
    Machine）這個概念的八十年後，資訊科學家也已經學會寫出愈來愈複雜的電子演算法。數據主義指出，同樣的數學定律能夠同時適用於生化演算法及電子演算法，於是讓兩者合而為一，打破了動物和機器之間的隔閡，並期待電子演算法終有一天能夠解開生化演算法，甚至有所超越。


    對於政府、企業或一般消費者來說，數據主義提供了突破性的科技和強大的全新力量。對於學者和知識份子來說，這也能提供我們幾世紀以來渴求的科學聖杯：從音樂學、經濟學到生物學，所有科學學門都能統一在單一理論之下。根據數據主義，貝多芬的第五號交響曲、股市泡沫和流感病毒，不過是資料流的三種不同模式，能夠使用同樣的基本概念和工具來分析。這個想法十分吸引人，可以讓所有科學家講著一種共同的語言，在學術的鴻溝上搭起橋梁，並輕鬆讓某種見解跨越不同學門。終於，音樂學家、經濟學家和細胞生物學家也能互相理解溝通了。


    在過程中，數據主義也將傳統的學習金字塔徹底翻轉。在這之前，大家認為資料數據只是智力活動這個漫長過程的第一步，我們要把資料轉化為資訊、資訊轉化為知識，最後把知識轉化為智慧。但數據主義者認為，資料數據的流動量已經大到非人所能處理，人類無法再將資料轉化為資訊，後面的知識或智慧也就更不用提了。於是，處理資料數據的工作應該交給能力遠超過人類大腦的電子演算法來進行。在實務上，這也就代表數據主義對人類知識和智慧有所懷疑，而傾向於信任大數據和電腦演算法。


    最堅信數據主義的正是它的兩個母系學門——資訊科學與生物學。兩者之中，又以生物學較為重要；因為正是生物學擁抱了數據主義，才讓資訊科學的小小突破撼動整個世界，而可能徹底改變生命的本質。要說所有生物都是演算法，不管長頸鹿、番茄或人類都只是不同的資料處理方式，你可能並不以為然。但這裡必須強調，現在的科學教條已然是如此，而且這對整個世界現狀的改變，實在難以想像。


    今天，我們視為資料處理系統的，不只是單一生物，還包括像是蜂箱、細菌的菌落、森林、以及城市之類的社會。經濟學家也愈來愈常用資料處理系統的概念，來詮釋經濟。一般人看來，經濟就是有農民種小麥、有工人做衣服，再有顧客買麵包和衣服。但是在專家眼中，經濟的機制就是要蒐集關於欲望和能力的資料數據，再轉化為決策。


    根據這種觀點，自由市場資本主義和國家集權控制的共產主義就不是意識型態、倫理教條或政治制度上的競爭，而根本是不同資料處理系統之間的競爭。資本主義採用分散式處理，而共產主義則是集中式處理。資本主義的資料處理，是讓所有的生產者和消費者直接相連，並允許他們自由交換資訊、獨立做出決定。自由市場上的麵包價格如何決定？每家麵包店愛做多少就做多少，訂價愛訂多高就訂多高。顧客只要能夠負擔，一樣可以愛買多少就買多少，又或是改去找其他麵包店。一根長棍麵包收一千美元並不犯法，只是大概沒人會買。


    讓我們把規模放大，假設投資者預測麵包需求將增加，就會買入研發高產量基改小麥的生物科技公司股份。資金流入，該公司就能加速研究，更快提供更多小麥，以避免麵包短缺。就算哪家生物科技大廠用錯理論、走進死路，也可能有競爭對手達成這項突破。因此，自由市場資本主義是將分析資料和做決定的工作分散下去，交給許多各自獨立但又相互連結的處理器。正如奧地利經濟學家海耶克（Friedrich
    Hayek）所詮釋的：「在一個把相關事實的知識分散給許多人的系統中，可以靠價格來協調不同人各自的獨立行動。」²


    根據這個觀點，證券交易所正是人類至今所創最快、最有效的資料處理系統。它歡迎每個人都來共襄盛舉，可以是直接加入、或是透過銀行或退休基金。證券交易所推動著全球經濟，不論是全球各個角落、甚至外太空發生的事情，無不納入考量。不管是科學實驗成功、日本傳出政治醜聞、冰島火山爆發，甚至太陽表面有不規律的活動，都會影響股價。為了讓系統運作順暢，就需要讓盡量多的資訊盡可能自由流動。如果全球有數百萬人都能取得所有相關資訊，就會透過買賣來決定石油、現代汽車的股票、或瑞典政府債券最準確的價格。據估計，證券交易所只要經過十五分鐘的交易，就能確定《紐約時報》某個頭條對於大多數股價的影響。³


    這種資料處理的概念，也能夠解釋為何資本主義喜歡降稅。重稅代表可用資本有一大部分都集中在單一地點（國庫），也就有愈來愈多決策必須由單個處理器（政府）來決定。這樣一來，整個資料處理系統就會過度集中。


    假設有一種稅收高到爆表的極端情況，就會讓幾乎所有資本都流到政府手中，於是一切由政府決定，包括麵包的價格、麵包店的位置，以及生物科技機構的研發預算。在自由市場中，如果某個處理器做出錯誤的決定，立刻就會有人趁虛而入。但如果幾乎所有決定都操縱在單一處理器手中，一犯錯就可能是場大災難。


    這種所有資料都由單一處理器來處理並決定的極端情況，就是共產主義。在共產主義經濟裡，號稱要讓人人「各盡所能、各取所需」。換句話說，政府會把你利潤的100%全部取走，再判斷你有什麼需求，並據以提供。雖然並沒有哪個國家曾經真正實現這種極端方案，但蘇聯及其附庸國可說是盡力逼近。他們放棄了分散式資料處理的原則，轉換為集中式資料處理：蘇聯各地的所有資訊都流向莫斯科一處，也是由莫斯科做出所有重大決定。生產者和消費者無法直接溝通，而且必須服從政府的命令。


    49. 在莫斯科的蘇聯領導階層（1963 年）：集中式資料處理


    例如，蘇聯的經濟部門可能會決定：所有店裡的麵包價格都是 2 盧布又 4 戈比（kopek）；烏克蘭敖得薩州的某個集體農場，本來種小麥，但現在要改成養雞；莫斯科的紅色十月麵包店，每天要生產三百五十萬條麵包，而且一條也不准多。與此同時，蘇聯的科學部也會命令所有蘇聯生物科技實驗室接受李森科（Trofim
    Lysenko, 1898-1976）的理論。李森科素負惡名，執掌列寧農業科學院，但他不相信當時主流的基因遺傳理論。他堅信，如果某個生物這輩子得到了新的性狀，就能直接傳給後代。這種想法完全違背正統達爾文學說，卻與共產主義的教育原則十分吻合，意味著只要訓練小麥承受寒冷的天氣，後代的小麥也將能夠耐寒。於是，李森科把幾十億株反革命的小麥，送到西伯利亞接受再教育；只不過，蘇聯很快就被迫從美國進口愈來愈多的麵粉。⁴


    資本主義之所以打敗共產主義，並不是因為資本主義更符合倫理，不是因為個人自由神聖無比、又或是上帝對這些共產主義異教徒降下怒火。資本主義能夠贏得冷戰，是因為至少在這個科技加速改變的時期，分散式資料處理的效果就是比集中式資料處理更好。二十世紀晚期的世界變化實在太快，共產黨中央委員會無法處理。像這樣把所有資料都集中到一座祕密碉堡、所有重大決策都由一群年長的黨政大員決定，雖然能夠生產出一批又一批核彈，卻絕不可能打造出蘋果公司或維基百科。


    50. 紐約證券交易所的喧嚷：分散式資料處理


    有一個故事（可能是假的，但精采的故事多半都是假的），講的是戈巴契夫為了讓蘇聯經濟起死回生，派出一位主要副手到倫敦，想瞭解柴契爾主義（Thatcherism）是什麼、資本主義制度又如何實際運作。東道主帶著這位蘇聯來的貴賓參觀倫敦，前往倫敦證券交易所和倫敦政經學院，與銀行經理、企業家和教授長談。經過許多小時的參訪，這位蘇聯專家忽然忍不住說：「抱歉，請先停一下。先別管所有這些複雜的經濟理論了。我們在倫敦來來回回一整天，有件事我一直不懂。在莫斯科，我們派了最聰明的人來研究麵包供應制度，但每間麵包店和雜貨店還是得大排長龍。在倫敦，這裡人口有數百萬，我們今天又經過了許多店家和超市，卻沒有半個地方需要排隊。請帶我去見一下在倫敦負責管控麵包供應的人，我一定得學學他的祕招。」東道主抓了抓頭，想了一下，說道：「可是，沒人負責管控麵包給倫敦啊。」


    這正是資本主義的成功祕訣。並沒有中央處理單元（CPU）壟斷倫敦麵包供應的所有資料數據，而是讓資訊在幾百萬位消費者和生產者、麵包師傅和企業家、農民和科學家之間自由流動。市場力量就會決定麵包的價格、每天烘焙的數量，以及研發的優先順序。如果市場力量做出不當的決定，也能很快自我修正（至少資本主義信徒是這麼相信的）。就我們的目的來說，重點並不在於這種資本主義理論是否正確，而在於這是用資料處理的概念，來瞭解經濟學。


    ## 所有的權力都去了哪？


    政治科學家也愈來愈把人類政治結構，想成資料處理系統。一如資本主義和共產主義，民主和專制在本質上也就是兩套關於蒐集和分析資訊的對立機制。專制使用集中式處理，而民主則喜歡分散式處理。民主在過去幾十年裡獲得上風，是因為在二十世紀晚期的情境中，分散式處理的效果更佳。如果換了一個情境，譬如古羅馬帝國時代，反而可能是集中式處理擁有優勢，才會讓羅馬共和國敗亡，權力從元老院和公民大會，轉移到專制皇帝的手中。


    這意味著，如果資料處理的情境在二十一世紀再次改變，民主制度也可能衰敗、甚至消失。隨著資料量和流通速度雙雙提升，選舉、政黨、國會這些過去崇高的制度，就可能遭到淘汰；原因不在於不符倫理道德，而是因為無法有效處理資料數據。當時這些制度和機構發展的背景，是政治的腳步走得比科技更快。在十九世紀和二十世紀，工業革命發展的速度夠慢，於是政客和選民仍能領先一步，規範及操縱發展的路線。然而自從蒸汽時代以來，政治的節奏沒有多大改變，但科技卻已經從一檔切換到四檔。科技革命的腳步快到讓政治追不上，不管是國會議員或選民，都已失去對科技的控制了。


    網際網路的興起，能讓我們一窺未來景況。現在對我們的日常生活、經濟及安全來說，網路空間都不可或缺。但講到網路設計的各種不同選項，雖然仍牽扯到主權、邊界、隱私、安全等等傳統政治議題，卻並未透過民主政治過程來決定。有人曾經投票決定網路空間該是什麼形狀嗎？網路設計者的種種決定未受公眾監督，於是今日的網際網路成了一處自由、但也不受法律管束的區域，侵蝕國家主權、無視邊界、破壞隱私，可能正是最可怕的全球安全風險。十年前還幾乎沒人想過這種可能性，但今日的政府官員憂心忡忡，認為網路911事件已經風雨欲來。


    於是，政府和非政府組織熱議重組網際網路的可能。但已錯過了在一開始干預的時機，現在木已成舟，要改變現有制度真是難上加難。等到笨重的政府官僚制度終於下定決心，進行網路監管，網路早已又演進了十次。政府這隻烏龜，永遠追不上科技這隻野兔，就這樣被資料數據壓得無法動彈。美國國安局或許能夠監控每個人的每句話，但看到美國外交紕漏不斷，就知道華盛頓雖然拿著一切資料，卻沒人知道該怎麼運用。對於世界上正發生什麼事，史上從來沒有任何政府，能像現在的美國知道得如此清楚；但也鮮少有政府，能夠反應得像現在的美國一樣笨拙。這就像是打牌的時候明明知道對手有什麼牌，卻不知怎麼搞的，總是一輸再輸。


    在未來幾十年間，我們很可能還會看到更多類似網際網路的革命，而科技會搶走政治的所有風頭。人工智慧和生物科技可能即將徹底改變人類社會和經濟，甚至徹底改變人類的身體和心靈，但當前的政治體系對此卻幾乎毫無警覺。現今的民主制度，蒐集和處理相關資料數據的速度太過緩慢，而且大多數選民對生物學和模控學（cybernetics）的認識也不足，無法形成切中要點的意見。因此，傳統民主政治正逐漸失去對事態發展方向的控制力，也提不出有意義的未來願景。


    普通選民也開始意識到，民主機制已經不再能夠為他們帶來權力。世界正在變化，但他們摸不清變化的方式和原因。權力正在移轉，但選民不知道權力去了哪。在英國選民的想像中，以為權力是被歐盟奪走，所以他們投票給英國脫歐（Brexit）。在美國選民的想像中，以為是「當權派」壟斷了所有權力，所以他們支持反體制的候選人，像是桑德斯（Bernie
    Sanders）和川普（Donald Trump）。但可悲的事實是，沒人知道所有的權力去了哪。就算英國離開歐盟、川普接掌白宮，權力也絕對不會回到普通選民身上。


    這並不代表二十世紀的獨裁統治將會重演。就算是專制政權，似乎同樣無力應付科技發展的腳步，同樣無力應付資料流的數量和速度。在二十世紀，獨裁者對未來自有一套宏偉願景，例如不論是共產主義或法西斯主義，都希望徹底摧毀舊世界，再建起新世界取而代之。不論你對列寧、希特勒或毛澤東有何看法，都不可能說他們沒有願景。到了今天，理論上領導者的願景應該會更為宏偉，畢竟過去的共產黨和納粹，不過是有了蒸汽機和打字機，就想打造出新的社會，今天我們可還有生物科技和超級電腦任君使用呢！


    # 政治已不再有宏偉願景


    在科幻電影的劇情裡，總演著像希特勒一樣的壞政客，一心奪取各種新科技，要用來實踐各式極端政治理想。但回到二十一世紀早期，就算在俄羅斯、伊朗或北韓這些專制國家，實際的政客和好萊塢版本，卻根本是兩回事。


    那些人看起來，可沒什麼美麗新世界的願景。就算是金正恩或伊朗最高領導人哈米尼（Ayatollah Ali Khamenei）做過最狂的夢，仍然不過就是原子彈和彈道飛彈之類，完全還停留在二戰時代。普丁似乎也只是想重建舊的蘇聯集團，甚至是更早的沙皇帝國。與此同時，偏執的美國共和黨人，大罵歐巴馬是個無情的獨裁者，說他陰謀破壞美國社會的基礎；但過了八年總統任期，歐巴馬費盡心力也只是勉強推動了一場小小的健康照護改革，不論是創造新世界或是新人類，都完全不在他的待辦議題之列。


    正因為科技進步如此快速，不論國會或獨裁者，都被來不及處理的資料數據壓得喘不過氣，現今政治人物的眼界，要比一個世紀前狹窄太多了。於是，到了二十一世紀早期，政治已不再有宏偉願景，政府就只剩下行政的功能，維持著國家現況，卻不再能夠帶領人民向前。政府確保教師每月拿到薪水、下水道不會堵塞，卻不知道國家過了二十年後，該走向何方。


    在一定程度上，這或許是福非禍。有鑑於二十世紀某些宏大政治願景，就搞出了奧許威茲集中營、廣島核爆和大躍進，或許官僚系統胸無大志也是一種幸福。如果有了如神力一般的科技，再加上妄自尊大的政治人物，幾乎肯定是場災難。許多新自由主義經濟學家和政治學家認為，所有重大決策最好都交給自由市場來決定，結果這就成了政客無為和無知的藉口，還認為這種做法是大智慧。對政客來說，反正一切交給市場就好、自己何必懂這個世界呢？這可真是太方便了。


    然而，科技已有了如神般的能力，政治卻是短視而無遠景，這樣的搭配仍有問題。畢竟願景不一定是壞事，而缺乏願景也不永遠是好事。在二十世紀，反烏托邦的納粹願景並不是自己分崩離析，而是被社會主義和自由主義同樣宏偉的願景所擊敗。之所以不該將未來完全交給市場力量決定，是因為這些力量造成的結果，可能只是有利於市場，不見得有利於人類或全世界。市場那隻手不僅人類看不見，它本身也是盲目的；如果完全不加管束，面對類似全球暖化的威脅、或人工智慧的潛在危險時，就有可能毫無作為。


    有些人相信，在這一切的背後，還是有幾個罪魁禍首。可能不是民主政客或獨裁統治者，而是有一小群億萬富翁，現在正偷偷掌控著這個世界。然而這種陰謀論太過輕忽系統的複雜度，其實是說不通的。光是幾個億萬富翁在小房間裡吸著雪茄、飲著蘇格蘭威士忌，絕不可能瞭解世界上發生的一切，更不用說要控制一切了。在現在這個混沌的世界，那些冷酷的億萬富翁和少數利益集團之所以能夠發展蓬勃，並不是因為他們更能看清全貌，反而是因為他們的目標非常狹隘。在混沌的系統中，集中視野反而有其優勢，而億萬富翁的權力大小，又與目標大小息息相關（呈現負相關）。如果你身為世上最富有的人，想再賺十億美元，簡直易如反掌，只要輕鬆操弄一下政經體系，就能辦到。但相對的，如果是想消弭全球的不平等、阻擋全球暖化，牽涉到的政經體系或社會體系就顯得太過複雜了，就算最富有的一群人也無法操控。


    然而，權力真空的狀況並不會持續太久。如果傳統政治結構在二十一世紀無法夠快處理資料、無法產生有意義的願景，就會出現更新、更有效率的結構，取代它們的地位。這些新的結構可能大異於任何先前的政治制度，既非民主、也非專制。這裡唯一的問題，就是會由誰來建立並控制這些結構。如果人類自己完成不了這項任務，或許該讓其他候選者來試試。


    # 數據主義觀點下的人類簡史


    從數據主義觀點，可以把全人類看成一套資料處理系統，而每個人都是裡面的一個晶片（處理器）。這樣一來，整部歷史的進程就是要透過四種方式，提高系統效率：


    - 一、增加處理器數量。擁有十萬人口的城市，運算能力就會高於擁有一千人口的村莊。

    - 二、增加處理器種類。處理器不同，運算和分析數據的方式就不相同。因此，如果資料處理系統擁有許多種不同的處理'
  mdcn: '人類大命運


    診所以後，就像摩門教創始人約瑟·斯密（Joseph Smith）一樣，完完全全是個異性戀者。站在診所門前，他心裡又複習了一次想對醫師說的話：「醫師，這裡是十萬美元。請幫我動個手術，讓我以後永遠不會再想要男人了。」他接著按了鈴，但開門之後，看到的簡直是「急診室的春天」裡的喬治·克隆尼，活生生在他眼前。這個小夥子魂都飛了，喃喃說道：「醫師，這裡是十萬美元。請幫我動個手術，讓我以後永遠只愛男人、不會再想要女人了。」


    可以說，是這個年輕人真實的自我，打敗了過去經歷的宗教洗腦嗎？又或是一時的誘惑，讓他背叛了按鈴前的自己？又或者，根本沒有什麼真實的自我，所以也不會有所謂的聽從或背叛？只要我們能夠設計及重塑意志，就無法再把意志看作意義和權威的本源；因為不管我們的意志怎麼說，我們總能讓它改變意見。


    ## 科技人文主義的兩難


    人文主義認為，只有人的欲望才能使世界充滿意義。但如果我們連欲望都能選擇，又是根據什麼基礎來做這種選擇？


    假設在《羅密歐與朱麗葉》的開場，是羅密歐可以決定要愛上誰，而且就算決定了，還是隨時能夠反悔重來。這樣一來，這齣劇會成個什麼樣子？但這正是科技進步為我們刻畫的未來：如果我們的欲望讓我們不舒服，就讓科技消滅這個欲望。如果整個宇宙所憑依的釘子釘錯了地方，就用科技把整支釘子拔出來，釘到別的地方去。但究竟要釘在哪？如果寰宇四方均能落釘，我該挑哪裡？又為什麼該挑那裡呢？


    # 第10章 新宗教：科技人文主義


    人文主義的戲劇，多半是以某個令人痛苦的欲望為開展。例如蒙太玖家的羅密歐，愛上了凱普雷特家的朱麗葉，兩家卻是世仇，於是雙方都非常痛苦。科技對這種情節的解法，就是確保讓我們不會有令人痛苦的欲望。如果羅密歐和朱麗葉服個藥丸、或是戴個頭盔，直接把那些對彼此造成不幸的愛意給消滅掉，不就沒事了嗎？


    在此，科技人文主義面臨了一項無解的兩難。它認為人的意志是宇宙中最重要的東西，因此推動人類開發能夠控制、重新設計意志的科技。畢竟，能夠控制全世界最重要的東西，不是太好了嗎？然而一旦這樣的控制成真，過去神聖的人類就會成了另外一項設計品，反而讓科技人文主義不知何去何從。只要我們仍然相信人類的意志和經驗是權威和意義的本源，就永遠無法面對這些科技。


    因此，有個更大膽的科技宗教，打算直接徹底切斷與人文主義的臍帶。這個科技宗教所預見的世界，並不是圍繞任何人類生命形式的欲望和經驗而轉。


    但又是什麼東西能夠取代欲望和經驗，成為一切意義和權威的本源？在2016年，正有一位候選人坐在歷史的接待室，等候面試。這位候選人名叫「資訊」。


    目前，最耐人尋味的新興科技宗教正是數據主義（Dataism），崇拜的既不是神祇、也不是人類，而是敬拜資料數據。


    # 第11章 信數據得永生？


    數據主義認為，宇宙是由資料流組成，任何現象或實體的價值就在於對資料處理的貢獻。¹讀者可能覺得這實在是極端的胡言亂語，但事實上，大部分的科學機構都已經改信了數據主義。


    數據主義是由兩大科學潮流爆炸性匯流而成的。在達爾文發表《物種原始論》一百五十年後，生命科學已經認為生物都是生化演算法。此外，在圖靈想出「圖靈機」（Turing
    Machine）這個概念的八十年後，資訊科學家也已經學會寫出愈來愈複雜的電子演算法。數據主義指出，同樣的數學定律能夠同時適用於生化演算法及電子演算法，於是讓兩者合而為一，打破了動物和機器之間的隔閡，並期待電子演算法終有一天能夠解開生化演算法，甚至有所超越。


    對於政府、企業或一般消費者來說，數據主義提供了突破性的科技和強大的全新力量。對於學者和知識份子來說，這也能提供我們幾世紀以來渴求的科學聖杯：從音樂學、經濟學到生物學，所有科學學門都能統一在單一理論之下。根據數據主義，貝多芬的第五號交響曲、股市泡沫和流感病毒，不過是資料流的三種不同模式，能夠使用同樣的基本概念和工具來分析。這個想法十分吸引人，可以讓所有科學家講著一種共同的語言，在學術的鴻溝上搭起橋梁，並輕鬆讓某種見解跨越不同學門。終於，音樂學家、經濟學家和細胞生物學家也能互相理解溝通了。


    在過程中，數據主義也將傳統的學習金字塔徹底翻轉。在這之前，大家認為資料數據只是智力活動這個漫長過程的第一步，我們要把資料轉化為資訊、資訊轉化為知識，最後把知識轉化為智慧。但數據主義者認為，資料數據的流動量已經大到非人所能處理，人類無法再將資料轉化為資訊，後面的知識或智慧也就更不用提了。於是，處理資料數據的工作應該交給能力遠超過人類大腦的電子演算法來進行。在實務上，這也就代表數據主義對人類知識和智慧有所懷疑，而傾向於信任大數據和電腦演算法。


    最堅信數據主義的正是它的兩個母系學門——資訊科學與生物學。兩者之中，又以生物學較為重要；因為正是生物學擁抱了數據主義，才讓資訊科學的小小突破撼動整個世界，而可能徹底改變生命的本質。要說所有生物都是演算法，不管長頸鹿、番茄或人類都只是不同的資料處理方式，你可能並不以為然。但這裡必須強調，現在的科學教條已然是如此，而且這對整個世界現狀的改變，實在難以想像。


    今天，我們視為資料處理系統的，不只是單一生物，還包括像是蜂箱、細菌的菌落、森林、以及城市之類的社會。經濟學家也愈來愈常用資料處理系統的概念，來詮釋經濟。一般人看來，經濟就是有農民種小麥、有工人做衣服，再有顧客買麵包和衣服。但是在專家眼中，經濟的機制就是要蒐集關於欲望和能力的資料數據，再轉化為決策。


    根據這種觀點，自由市場資本主義和國家集權控制的共產主義就不是意識型態、倫理教條或政治制度上的競爭，而根本是不同資料處理系統之間的競爭。資本主義採用分散式處理，而共產主義則是集中式處理。資本主義的資料處理，是讓所有的生產者和消費者直接相連，並允許他們自由交換資訊、獨立做出決定。自由市場上的麵包價格如何決定？每家麵包店愛做多少就做多少，訂價愛訂多高就訂多高。顧客只要能夠負擔，一樣可以愛買多少就買多少，又或是改去找其他麵包店。一根長棍麵包收一千美元並不犯法，只是大概沒人會買。


    讓我們把規模放大，假設投資者預測麵包需求將增加，就會買入研發高產量基改小麥的生物科技公司股份。資金流入，該公司就能加速研究，更快提供更多小麥，以避免麵包短缺。就算哪家生物科技大廠用錯理論、走進死路，也可能有競爭對手達成這項突破。因此，自由市場資本主義是將分析資料和做決定的工作分散下去，交給許多各自獨立但又相互連結的處理器。正如奧地利經濟學家海耶克（Friedrich
    Hayek）所詮釋的：「在一個把相關事實的知識分散給許多人的系統中，可以靠價格來協調不同人各自的獨立行動。」²


    根據這個觀點，證券交易所正是人類至今所創最快、最有效的資料處理系統。它歡迎每個人都來共襄盛舉，可以是直接加入、或是透過銀行或退休基金。證券交易所推動著全球經濟，不論是全球各個角落、甚至外太空發生的事情，無不納入考量。不管是科學實驗成功、日本傳出政治醜聞、冰島火山爆發，甚至太陽表面有不規律的活動，都會影響股價。為了讓系統運作順暢，就需要讓盡量多的資訊盡可能自由流動。如果全球有數百萬人都能取得所有相關資訊，就會透過買賣來決定石油、現代汽車的股票、或瑞典政府債券最準確的價格。據估計，證券交易所只要經過十五分鐘的交易，就能確定《紐約時報》某個頭條對於大多數股價的影響。³


    這種資料處理的概念，也能夠解釋為何資本主義喜歡降稅。重稅代表可用資本有一大部分都集中在單一地點（國庫），也就有愈來愈多決策必須由單個處理器（政府）來決定。這樣一來，整個資料處理系統就會過度集中。


    假設有一種稅收高到爆表的極端情況，就會讓幾乎所有資本都流到政府手中，於是一切由政府決定，包括麵包的價格、麵包店的位置，以及生物科技機構的研發預算。在自由市場中，如果某個處理器做出錯誤的決定，立刻就會有人趁虛而入。但如果幾乎所有決定都操縱在單一處理器手中，一犯錯就可能是場大災難。


    這種所有資料都由單一處理器來處理並決定的極端情況，就是共產主義。在共產主義經濟裡，號稱要讓人人「各盡所能、各取所需」。換句話說，政府會把你利潤的100%全部取走，再判斷你有什麼需求，並據以提供。雖然並沒有哪個國家曾經真正實現這種極端方案，但蘇聯及其附庸國可說是盡力逼近。他們放棄了分散式資料處理的原則，轉換為集中式資料處理：蘇聯各地的所有資訊都流向莫斯科一處，也是由莫斯科做出所有重大決定。生產者和消費者無法直接溝通，而且必須服從政府的命令。


    49. 在莫斯科的蘇聯領導階層（1963 年）：集中式資料處理


    例如，蘇聯的經濟部門可能會決定：所有店裡的麵包價格都是 2 盧布又 4 戈比（kopek）；烏克蘭敖得薩州的某個集體農場，本來種小麥，但現在要改成養雞；莫斯科的紅色十月麵包店，每天要生產三百五十萬條麵包，而且一條也不准多。與此同時，蘇聯的科學部也會命令所有蘇聯生物科技實驗室接受李森科（Trofim
    Lysenko, 1898-1976）的理論。李森科素負惡名，執掌列寧農業科學院，但他不相信當時主流的基因遺傳理論。他堅信，如果某個生物這輩子得到了新的性狀，就能直接傳給後代。這種想法完全違背正統達爾文學說，卻與共產主義的教育原則十分吻合，意味著只要訓練小麥承受寒冷的天氣，後代的小麥也將能夠耐寒。於是，李森科把幾十億株反革命的小麥，送到西伯利亞接受再教育；只不過，蘇聯很快就被迫從美國進口愈來愈多的麵粉。⁴


    資本主義之所以打敗共產主義，並不是因為資本主義更符合倫理，不是因為個人自由神聖無比、又或是上帝對這些共產主義異教徒降下怒火。資本主義能夠贏得冷戰，是因為至少在這個科技加速改變的時期，分散式資料處理的效果就是比集中式資料處理更好。二十世紀晚期的世界變化實在太快，共產黨中央委員會無法處理。像這樣把所有資料都集中到一座祕密碉堡、所有重大決策都由一群年長的黨政大員決定，雖然能夠生產出一批又一批核彈，卻絕不可能打造出蘋果公司或維基百科。


    50. 紐約證券交易所的喧嚷：分散式資料處理


    有一個故事（可能是假的，但精采的故事多半都是假的），講的是戈巴契夫為了讓蘇聯經濟起死回生，派出一位主要副手到倫敦，想瞭解柴契爾主義（Thatcherism）是什麼、資本主義制度又如何實際運作。東道主帶著這位蘇聯來的貴賓參觀倫敦，前往倫敦證券交易所和倫敦政經學院，與銀行經理、企業家和教授長談。經過許多小時的參訪，這位蘇聯專家忽然忍不住說：「抱歉，請先停一下。先別管所有這些複雜的經濟理論了。我們在倫敦來來回回一整天，有件事我一直不懂。在莫斯科，我們派了最聰明的人來研究麵包供應制度，但每間麵包店和雜貨店還是得大排長龍。在倫敦，這裡人口有數百萬，我們今天又經過了許多店家和超市，卻沒有半個地方需要排隊。請帶我去見一下在倫敦負責管控麵包供應的人，我一定得學學他的祕招。」東道主抓了抓頭，想了一下，說道：「可是，沒人負責管控麵包給倫敦啊。」


    這正是資本主義的成功祕訣。並沒有中央處理單元（CPU）壟斷倫敦麵包供應的所有資料數據，而是讓資訊在幾百萬位消費者和生產者、麵包師傅和企業家、農民和科學家之間自由流動。市場力量就會決定麵包的價格、每天烘焙的數量，以及研發的優先順序。如果市場力量做出不當的決定，也能很快自我修正（至少資本主義信徒是這麼相信的）。就我們的目的來說，重點並不在於這種資本主義理論是否正確，而在於這是用資料處理的概念，來瞭解經濟學。


    ## 所有的權力都去了哪？


    政治科學家也愈來愈把人類政治結構，想成資料處理系統。一如資本主義和共產主義，民主和專制在本質上也就是兩套關於蒐集和分析資訊的對立機制。專制使用集中式處理，而民主則喜歡分散式處理。民主在過去幾十年裡獲得上風，是因為在二十世紀晚期的情境中，分散式處理的效果更佳。如果換了一個情境，譬如古羅馬帝國時代，反而可能是集中式處理擁有優勢，才會讓羅馬共和國敗亡，權力從元老院和公民大會，轉移到專制皇帝的手中。


    這意味著，如果資料處理的情境在二十一世紀再次改變，民主制度也可能衰敗、甚至消失。隨著資料量和流通速度雙雙提升，選舉、政黨、國會這些過去崇高的制度，就可能遭到淘汰；原因不在於不符倫理道德，而是因為無法有效處理資料數據。當時這些制度和機構發展的背景，是政治的腳步走得比科技更快。在十九世紀和二十世紀，工業革命發展的速度夠慢，於是政客和選民仍能領先一步，規範及操縱發展的路線。然而自從蒸汽時代以來，政治的節奏沒有多大改變，但科技卻已經從一檔切換到四檔。科技革命的腳步快到讓政治追不上，不管是國會議員或選民，都已失去對科技的控制了。


    網際網路的興起，能讓我們一窺未來景況。現在對我們的日常生活、經濟及安全來說，網路空間都不可或缺。但講到網路設計的各種不同選項，雖然仍牽扯到主權、邊界、隱私、安全等等傳統政治議題，卻並未透過民主政治過程來決定。有人曾經投票決定網路空間該是什麼形狀嗎？網路設計者的種種決定未受公眾監督，於是今日的網際網路成了一處自由、但也不受法律管束的區域，侵蝕國家主權、無視邊界、破壞隱私，可能正是最可怕的全球安全風險。十年前還幾乎沒人想過這種可能性，但今日的政府官員憂心忡忡，認為網路911事件已經風雨欲來。


    於是，政府和非政府組織熱議重組網際網路的可能。但已錯過了在一開始干預的時機，現在木已成舟，要改變現有制度真是難上加難。等到笨重的政府官僚制度終於下定決心，進行網路監管，網路早已又演進了十次。政府這隻烏龜，永遠追不上科技這隻野兔，就這樣被資料數據壓得無法動彈。美國國安局或許能夠監控每個人的每句話，但看到美國外交紕漏不斷，就知道華盛頓雖然拿著一切資料，卻沒人知道該怎麼運用。對於世界上正發生什麼事，史上從來沒有任何政府，能像現在的美國知道得如此清楚；但也鮮少有政府，能夠反應得像現在的美國一樣笨拙。這就像是打牌的時候明明知道對手有什麼牌，卻不知怎麼搞的，總是一輸再輸。


    在未來幾十年間，我們很可能還會看到更多類似網際網路的革命，而科技會搶走政治的所有風頭。人工智慧和生物科技可能即將徹底改變人類社會和經濟，甚至徹底改變人類的身體和心靈，但當前的政治體系對此卻幾乎毫無警覺。現今的民主制度，蒐集和處理相關資料數據的速度太過緩慢，而且大多數選民對生物學和模控學（cybernetics）的認識也不足，無法形成切中要點的意見。因此，傳統民主政治正逐漸失去對事態發展方向的控制力，也提不出有意義的未來願景。


    普通選民也開始意識到，民主機制已經不再能夠為他們帶來權力。世界正在變化，但他們摸不清變化的方式和原因。權力正在移轉，但選民不知道權力去了哪。在英國選民的想像中，以為權力是被歐盟奪走，所以他們投票給英國脫歐（Brexit）。在美國選民的想像中，以為是「當權派」壟斷了所有權力，所以他們支持反體制的候選人，像是桑德斯（Bernie
    Sanders）和川普（Donald Trump）。但可悲的事實是，沒人知道所有的權力去了哪。就算英國離開歐盟、川普接掌白宮，權力也絕對不會回到普通選民身上。


    這並不代表二十世紀的獨裁統治將會重演。就算是專制政權，似乎同樣無力應付科技發展的腳步，同樣無力應付資料流的數量和速度。在二十世紀，獨裁者對未來自有一套宏偉願景，例如不論是共產主義或法西斯主義，都希望徹底摧毀舊世界，再建起新世界取而代之。不論你對列寧、希特勒或毛澤東有何看法，都不可能說他們沒有願景。到了今天，理論上領導者的願景應該會更為宏偉，畢竟過去的共產黨和納粹，不過是有了蒸汽機和打字機，就想打造出新的社會，今天我們可還有生物科技和超級電腦任君使用呢！


    # 政治已不再有宏偉願景


    在科幻電影的劇情裡，總演著像希特勒一樣的壞政客，一心奪取各種新科技，要用來實踐各式極端政治理想。但回到二十一世紀早期，就算在俄羅斯、伊朗或北韓這些專制國家，實際的政客和好萊塢版本，卻根本是兩回事。


    那些人看起來，可沒什麼美麗新世界的願景。就算是金正恩或伊朗最高領導人哈米尼（Ayatollah Ali Khamenei）做過最狂的夢，仍然不過就是原子彈和彈道飛彈之類，完全還停留在二戰時代。普丁似乎也只是想重建舊的蘇聯集團，甚至是更早的沙皇帝國。與此同時，偏執的美國共和黨人，大罵歐巴馬是個無情的獨裁者，說他陰謀破壞美國社會的基礎；但過了八年總統任期，歐巴馬費盡心力也只是勉強推動了一場小小的健康照護改革，不論是創造新世界或是新人類，都完全不在他的待辦議題之列。


    正因為科技進步如此快速，不論國會或獨裁者，都被來不及處理的資料數據壓得喘不過氣，現今政治人物的眼界，要比一個世紀前狹窄太多了。於是，到了二十一世紀早期，政治已不再有宏偉願景，政府就只剩下行政的功能，維持著國家現況，卻不再能夠帶領人民向前。政府確保教師每月拿到薪水、下水道不會堵塞，卻不知道國家過了二十年後，該走向何方。


    在一定程度上，這或許是福非禍。有鑑於二十世紀某些宏大政治願景，就搞出了奧許威茲集中營、廣島核爆和大躍進，或許官僚系統胸無大志也是一種幸福。如果有了如神力一般的科技，再加上妄自尊大的政治人物，幾乎肯定是場災難。許多新自由主義經濟學家和政治學家認為，所有重大決策最好都交給自由市場來決定，結果這就成了政客無為和無知的藉口，還認為這種做法是大智慧。對政客來說，反正一切交給市場就好、自己何必懂這個世界呢？這可真是太方便了。


    然而，科技已有了如神般的能力，政治卻是短視而無遠景，這樣的搭配仍有問題。畢竟願景不一定是壞事，而缺乏願景也不永遠是好事。在二十世紀，反烏托邦的納粹願景並不是自己分崩離析，而是被社會主義和自由主義同樣宏偉的願景所擊敗。之所以不該將未來完全交給市場力量決定，是因為這些力量造成的結果，可能只是有利於市場，不見得有利於人類或全世界。市場那隻手不僅人類看不見，它本身也是盲目的；如果完全不加管束，面對類似全球暖化的威脅、或人工智慧的潛在危險時，就有可能毫無作為。


    有些人相信，在這一切的背後，還是有幾個罪魁禍首。可能不是民主政客或獨裁統治者，而是有一小群億萬富翁，現在正偷偷掌控著這個世界。然而這種陰謀論太過輕忽系統的複雜度，其實是說不通的。光是幾個億萬富翁在小房間裡吸著雪茄、飲著蘇格蘭威士忌，絕不可能瞭解世界上發生的一切，更不用說要控制一切了。在現在這個混沌的世界，那些冷酷的億萬富翁和少數利益集團之所以能夠發展蓬勃，並不是因為他們更能看清全貌，反而是因為他們的目標非常狹隘。在混沌的系統中，集中視野反而有其優勢，而億萬富翁的權力大小，又與目標大小息息相關（呈現負相關）。如果你身為世上最富有的人，想再賺十億美元，簡直易如反掌，只要輕鬆操弄一下政經體系，就能辦到。但相對的，如果是想消弭全球的不平等、阻擋全球暖化，牽涉到的政經體系或社會體系就顯得太過複雜了，就算最富有的一群人也無法操控。


    然而，權力真空的狀況並不會持續太久。如果傳統政治結構在二十一世紀無法夠快處理資料、無法產生有意義的願景，就會出現更新、更有效率的結構，取代它們的地位。這些新的結構可能大異於任何先前的政治制度，既非民主、也非專制。這裡唯一的問題，就是會由誰來建立並控制這些結構。如果人類自己完成不了這項任務，或許該讓其他候選者來試試。


    # 數據主義觀點下的人類簡史


    從數據主義觀點，可以把全人類看成一套資料處理系統，而每個人都是裡面的一個晶片（處理器）。這樣一來，整部歷史的進程就是要透過四種方式，提高系統效率：


    - 一、增加處理器數量。擁有十萬人口的城市，運算能力就會高於擁有一千人口的村莊。

    - 二、增加處理器種類。處理器不同，運算和分析數據的方式就不相同。因此，如果資料處理系統擁有許多種不同的處理'
