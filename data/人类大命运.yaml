- md: '## 怎麼讓他快樂起來？


    對美國而言，二十世紀後半葉是個黃金時代——先在第二次世界大戰獲勝，隨後的冷戰時期也奪下更關鍵的勝利，讓美國成為全球首屈一指的超級大國。從1950年到2000年，美國GDP從二兆美元成長到十二兆美元。實際人均收入增加了一倍。新發明的避孕藥讓性愛是前所未有的無拘無束。婦女、同性戀、非裔美國人和其他少數族裔，也終於從美國這塊大餅分到了比過去更大的一塊。便宜的汽車、冰箱、空調、吸塵器、洗碗機、洗衣機、電話、電視和電腦，如大水湧來，日常生活簡直徹底改觀。但研究顯示，美國人在1990年代的主觀幸福感，與1950年代的調查結果仍然大致相同。34


    在日本，從1958年到1987年間，平均實質收入成長為五倍，經濟成長可說是史上最快。但這種排山倒海而來的財富，伴隨著對生活方式及社會關係的各種正面及負面影響，對於日本的主觀幸福感卻是出人意料的，幾乎沒什麼影響。在1990年代，日本人對生活還是如同1950年代一樣滿意，或說不滿意。35


    ## 幸福感也有玻璃天花板


    看來幸福感就是罩了一片神祕的玻璃天花板，雖然我們達到了前所未有的成就，幸福感卻未能成長。就算我們能為所有人提供免費膳食、治癒所有疾病、確保世界和平，也不一定能打破這片玻璃天花板。要達到真正的幸福快樂，難度並不會比克服老死低得多。


    幸福快樂的玻璃天花板有兩大支柱，分別屬於心理層面與生物層面。在心理層面，快樂與否要看你的期望如何，而非客觀條件。光是和平繁榮的生活，並不能讓我們滿意；必須是現實符合期望，才能讓我們滿足。但壞消息是，隨著客觀條件改善，期望也會不斷膨脹。於是乎，人類近幾十年來的客觀條件雖然大幅改善了，但是帶來的不是更高的滿足，而是更大的期望。如果我們不做點什麼，未來不論達到什麼成就，可能我們還是會像當初一樣，永遠不會真正滿足。


    從生物層面來說，不管是期望或是幸福感，其實都是由生物化學機制控制的，而不是由經濟、社會和政治局勢來決定。根據伊比鳩魯的說法，我們之所以感到幸福，是因為我們感受到愉悅的感覺（sensation），而且並未接觸到不快的感覺。邊沁也有類似的說法，認為大自然讓人類由兩個主人控制：快樂和痛苦；我們的所為、所言、所思，都是由這兩個主人決定。承繼邊沁思想的彌爾（John
    Stuart Mill）則解釋，幸福快樂也就是只有愉悅、沒有痛苦，而在愉悅與痛苦之外，沒有善惡之別。如果有人想從愉悅和痛苦之外的理由（譬如上帝的話語或國家利益）推導出善惡，這人是想騙你，而且也可能騙了他自己。36


    在伊比鳩魯的時代，這種言論是褻瀆神靈。在邊沁和彌爾的時代，這種言論是反動顛覆。但是在二十一世紀早期，這就成了科學正統。根據生命科學的說法，快樂和痛苦只不過是身體各種感覺的總和狀態。愉悅或痛苦從來就不是對外在世界事件的反應，而是對自己體內感覺的反應。丟掉工作、離婚、或是政府開戰，事件本身並不會讓人受苦。唯一能讓人痛苦的，就是自己身體裡不愉快的感覺。丟掉工作會引發沮喪，而沮喪才是一種令人不悅的身體感覺。世界上可能有一千種事情會讓我們憤怒，但憤怒也不是什麼抽象的概念，而是體內燥熱、肌肉緊繃的身體感覺，這才是憤怒的真相。我們說「怒火中燒」，確實是有些根據的。


    相對的，科學也說並沒有人是因為得到升職、中彩券、甚至是找到真愛而快樂。真正能讓人幸福快樂的，只有一件事、別無其他可能，就是身體裡的愉悅感覺。想像自己是戈策（Mario
    Götze），擔綱2014年世界盃德國隊的攻擊型中場球員，在決賽對上阿根廷；這時已經開賽一百一十三分鐘了，兩隊都未能得分。再過短短七分鐘，就要來到恐怖的PK大戰。巴西里約的馬拉卡納體育場，塞滿了七萬五千名激動的球迷，全球還有不知幾百萬觀眾焦急的緊盯螢幕。你離阿根廷的球門只有幾公尺，這時舒勒（André
    Schürrle）忽然朝你踢來一記妙傳！你胸口停球，看著球向你的腳落下，再空中起腳一射，看著球越過阿根廷門將，強力射進球網。進了！


    體育場如火山爆發，幾萬人瘋了一般大吼，你的隊友衝上來擁抱親吻你，國內柏林和慕尼黑的數百萬觀眾，也在電視螢幕前激動落淚。這時你欣喜若狂，但並不是因為在阿根廷球門裡那顆球，也不是因為在巴伐利亞邦露天啤酒吧裡塞爆球迷的歡天喜地，而是因為在你的身體裡面，各種感受正有如風暴一般襲來，「欣喜若狂」就是對這些感覺的回應。你覺得有冷顫在你的脊椎上上下下，電波一波一波衝過身體，好像自己溶入了幾百萬顆爆炸的能源球一般。


    你不用在世界盃決賽踢進致勝一球，也能得到這樣的感覺。像是工作上意外升遷，讓你開心得跳了起來，就是對同一種感覺的反應。你的心靈深處，其實根本不懂足球、也不懂工作，只懂生物生理的感覺。如果你升遷了，但因為某種原因而沒有得到這種愉悅的感覺，你就不會覺得滿意。反之也是如此。如果你剛被開除（或是輸了一場重要賽事），但感受到了非常愉快的感覺（也許是因為嗑藥），那你還是可能以為自己就站在世界的頂峰，飄飄欲仙。


    但壞消息是，愉悅的感覺很快就會消退，遲早會轉變成不愉快的感覺。就算踢進了世界盃決賽的制勝球，也無法保證一生幸福，甚至是到了頂點之後就只能下坡。同樣的，如果去年我意外升遷，很有可能雖然現在我還是在這個位子上，但當初聽到消息的愉悅感早已經在幾個小時後就煙消雲散。如果想再感受那些美妙的感覺，就得再升遷一次。萬一滿懷期望、卻沒能再升遷，感受到的痛苦和憤怒，可能還遠比當初乾脆一直當個小卒來得高。


    ## 興奮感總是太短暫


    這些都是演化的錯。無數代以來，我們的生化系統不斷適應，為的是增加生存和繁衍的機會，而不是快樂幸福的机会。只要是有利於生存和繁衍的行為，就會得到生化系統用愉悅的感覺來回饋。但這不過是一時的行銷花招罷了。我們努力取得食物、追求伴侶，就是想避免飢渴帶來的不愉悅感覺，並且滿足進食的愉悅、性愛的高潮。但無論進食或性愛，這種愉悅都無法長時間維持，想要再次感受，就只能去尋找更多的食物和伴侶。


    如果哪天出現一種罕見突變，讓某隻松鼠只要吃了一顆堅果，就能一輩子感覺無上的快樂，情況會怎樣？技術而言，只要從松鼠的大腦下手，確實能夠做到。而且誰知道呢，或許幾百萬年前就出現過這樣幸運的松鼠，但牠過的就會是極其快樂、但也極其短暫的一生，讓這種罕見的基因突變迅速畫下句點。原因就在於，覺得快樂的松鼠再也不會努力去找更多堅果，更不用說是求偶交配了。至於和牠競爭的其他松鼠，吃了堅果才過五分鐘，就又覺得餓，反而有更好的機會能夠生存，並把自己的基因傳給下一代。正是基於完全相同的原因，人類蒐集堅果（高薪的工作、大房子、好看的另一半）也很少能帶來長期的滿足。


    可能有人會說，情況也沒那麼糟啦，因為讓我們快樂的不是那些結果，而是追求目標的過程。攀登聖母峰的過程，會比站在山頂更令人滿足；挑逗和前戲，要比最後的性高潮更為精采；進行開創性的實驗，也比最後獲得讚美和獎項更有趣味。然而，這並未改變事情的全貌，只是說明演化會用各種不同種類的愉悅，來控制我們罷了。有時候，演化是用愉悅或安寧的感覺，引誘我們行動；也有時候，是用得意或興奮的感覺，刺激我們向前。


    動物如果在尋找某種增加生存和繁衍機會的東西（例如食物、夥伴、或社會地位），大腦就會產生警覺和興奮的感覺，而因為這種感覺如此美妙，就能促使動物更加努力。在一項著名的實驗中，科學家把電極連接到幾隻大鼠（rat）的腦子，大鼠只要踩下踏板，就能創造出興奮的感覺。接著，他們讓大鼠有美味的食物和踩踏板這兩個選擇，結果大鼠寧願選擇踏板（很像是小孩寧願打電動，也不想下樓吃飯）。這幾隻大鼠一次又一次踩著踏板，直到因為飢餓和疲憊而倒地不起。37


    人類很可能也是這樣，喜歡比賽過程的興奮，大於最後成功的桂冠。然而，真正讓比賽如此吸引人的，就是那些令人開心的感覺了。像是爬山、打電動或去盲目約會，這些活動的過程絕不可能完全只有壓力、絕望或無聊這些令人不快的感覺，否則斷無可能有人參加。38


    可惜的是，比賽那種興奮感，就像勝利時的幸福感一樣，轉瞬即逝。風流男人享受一夜情的刺激，商人享受咬著指甲看道瓊指數上上下下，電玩玩家享受在電腦螢幕殺怪；對他們來說，再去回味昨日的冒險，並不足以讓他們感到滿足。就像大鼠必須一次又一次踩下踏板，不管是風流男子、商界巨擘或電玩玩家，一樣是每天都需要有新的刺激。雪上加霜的是，這裡的期望一樣會因現有條件而適應，昨天覺得刺激的挑戰，今天太快就化為沉悶。又或許，幸福快樂的關鍵既不是比賽、也不是金牌，而是要能調合出興奮與安寧這兩種元素的正確劑量組合；但我們大多數人，往往不斷在緊張與舒坦這兩端來回跳動，到了哪端就開始對那端感到不滿。


    ## 操縱生化反應可獲得快樂嗎？


    如果科學說得不錯，幸福快樂是由生化系統所掌握，那麼唯一能確保長久心滿意足的方法，就是去操縱這個系統。別再管經濟成長、社會改革或政治革命了；為了提高全球幸福快樂的程度，該操縱的是人類的生物化學。


    過去幾十年間，人們確實已經開始這麼努力了。五十年前，精神藥物背負著嚴重的汙名，如今這種汙名已然打破。不論這是好是壞，現在有愈來愈高比例的人口，定期服用精神藥物，確實有些是為了治癒使人衰弱的心理疾病，但也有些只是要面對日常生活的沮喪和偶爾襲來的憂鬱。


    舉例來說，已經有愈來愈多學童開始服用利他能（Ritalin）之類的興奮劑。2011年，美國因為注意力不足過動症（attention deficit hyperactivity
    disorder, ADHD）而服用藥物的兒童人數，就有三百五十萬人。英國的這個數字，則從1997年的九萬二千人，上升到2012年的七十八萬六千人。39 這些藥物的原本目的，是要治療注意力障礙，但今天就連某些完全健康的孩子，也開始服藥，希望能夠提高成績，迎合老師和家長愈來愈高的期望。40


    很多人相當反對這種發展，認為問題不是出在孩子，而是出在教育體系。如果學童出現注意力障礙、壓力過高、成績不佳，或許我們該怪的是學校教法過時、教室過度擁擠、生活節奏已經快到不自然。或許該改變的不是孩子，而是學校？各種相關論點的歷時演變，十分耐人尋味。幾千年來，教育方法的相关爭論未曾停息，無論是在中國古代或是英國的維多利亞時代，人人都各有一套理論，而且都對所有其他理論嗤之以鼻。但在先前，至少大家還有一點達成共識：想改善教育，該從學校下手。然而現在，大概是歷史上首次，至少有一些人已經認為，更有效率的做法是從學生的生化狀態下手。41


    軍隊也朝著同樣的方向前進：美國有12%的伊拉克駐軍、17%的阿富汗駐軍，曾經服用安眠藥或抗憂鬱症藥物，協助應對戰爭造成的壓力和痛苦。人會感覺到恐懼、憂鬱和精神創傷，原因不在於砲彈、詭雷或汽車炸彈本身，而在於荷爾蒙、神經傳遞物質和神經網路。共同遇上同一場埋伏的兩名士兵，可能一個嚇到呆滯、方寸大亂、之後幾年噩夢連連，另一個卻能勇敢向前殺敵，最後榮獲勳章。這裡的不同點，就在於兩名士兵身體裡的生物化學反應，如果能設法控制，就能一石二鳥，讓士兵更快樂，軍隊也更有效能。42


    用生物化學來追求快樂，也是這個世界的頭號犯罪原因。2009年，美國聯邦監獄有半數受刑人是因為毒品入獄；義大利受刑人有38%因為毒品相關罪行遭定罪；英國受刑人也有55%是因為使用或交易毒品而觸法。2001年的一份報告發現，澳洲受刑人犯下入獄罪行時，有62%都吸了毒。43


    人們喝酒是為了遺忘，抽大麻是為了感到平靜，用古柯鹼和安非他命是為了感到敏銳而自信；吞搖頭丸能讓人放大感官、感受狂喜，而LSD則會讓你踏進一場脫離現實的迷幻夢境。有些人靠著用功學習、工作或養家才得到的快樂，有些人只要操縱分子、調出正確劑量，就能遠遠更為輕鬆的搞定。這對於整個社會和經濟秩序都是實際存在的威脅，也正因如此，各國才會堅持對生化犯罪發動一場血腥而無望的戰爭。


    國家希望管制用生物化學追求快樂幸福的手段，定出「好」與「壞」的區別。這裡的原則很清楚：如果有利於政治穩定、社會秩序和經濟成長，這樣的生化操作不但可允許，甚至還應鼓勵（例如能讓過動的學童平靜下來，或是讓士兵迫不及待投身戰役）。至於如果威脅到穩定和成長，這樣的生化操作就要禁止。然而，每年都有許多新藥從各大學、藥廠及犯罪組織的實驗室中誕生，國家與市場的需求也不斷變化。隨著用生化來追求快樂的腳步逐漸加速，對政治、社會和經濟也將有所影響，並愈來愈難以控制。


    而且，使用藥物還只是個開端。實驗室裡的專家已經著手研究以更複雜的方式操縱人類的生化反應，例如將電流刺激，直接送至大腦特定部位，或是用基因工程控制人體的藍圖。不論確切方法為何，要透過生物化學操縱方式得到幸福快樂，並不容易，因為這其實改變了生命最基本的模式。不過話說回來，克服饑荒、瘟疫和戰爭，在過去又豈是易事？


    ## 長生不死之外，也想追求永恆的愉悅


    究竟人類該不該花這麼大的心力來追求生化的快樂，至今離定論還很遠。有人會說，快樂這件事根本沒那麼重要，要說個人滿意度是人類社會的最高目標，根本是走錯了路。有些人可能認為快樂確實是至善，但對於生化專家認為快樂只是身體愉悅的感覺，則很有意見。


    在大約兩千三百年前，伊比鳩魯就曾警告門徒，無節制追求享樂很可能帶來的反而是痛苦，而非快樂。幾個世紀前，佛陀還有個甚至更激進的主張，認為追求快感正是痛苦的根源，這種快感只是短暫、毫無意義的振動。得到快感時，我們的反應不是滿足，反而貪得無厭，只是想得到更多。因此，不論我們感受到多少幸福、興奮的感覺，也永遠無法滿足。


    如果我認定快樂就是這些稍縱即逝的快感，並且渴望得到愈來愈多的快感，我就別無選擇，只能不斷追求下去。好不容易得到之後，快感又很快消退，但因為光是過去快樂的回憶，並不足以令我滿足，所以我又得從頭再來。像這樣的追求，就算持續幾十年，也永遠無法帶來任何長久的成果；我愈渴望這些快感，愈是變得壓力重重，愈是無法饜足。想得到真正的幸福快樂，人類該做的不是加速，而是慢下追求快感的腳步。


    佛教對快樂的看法，與生物化學有許多共通之處。兩者都認為快感來得快、去得也快，如果人們只是渴求快感，卻不好好體驗快感，就仍然無法滿足。但接下來，佛教與生物化學兩者卻有了非常不同的解決方案。生化的辦法是開發出各種產品和療法，為人類提供無止無盡的快感，希望讓人能夠永遠享有快感。但佛教的建議則是減少對快感的渴望，不讓渴望控制我們的生活。佛教認為，我們可以訓練心靈，仔細觀察各種感覺是如何產生、又如何消逝。只要心靈學會看穿這些感覺的本質（也就是短暫、毫無意義的振動），我們就不再有興趣追求快感。畢竟，去追求一個倏然而來、忽焉而逝的東西，有什麼意義？


    目前，人類對於生化解決方案的興趣是遠遠大得多。不論那些喜馬拉雅山洞穴裡的僧侶、或是象牙塔裡的哲學家怎麼說，對資本主義信徒來講，愉悅的快感就是快樂，這種感覺可以周而復始。每過一年，我們忍耐不悅的能力愈來愈低，而對快感的渴望則愈來愈高。現在的科學研究和經濟活動都以此為目標，每年研發出更有效的止痛藥、新的冰淇淋口味、更舒適的床墊、更令人上癮的手機遊戲，好讓我們在等公車的時候，連一秒鐘的無聊都無須忍耐。


    當然，這一切還是遠遠不足。智人的演化並未讓人能夠感受長久的快感，因此光靠冰淇淋或手機遊戲並不夠，如果真想長久感受到快感，就必須改變人類的生物化學機轉，重新打造人體和心靈。而我們也正在朝這目標努力。我們可以爭論這究竟是好是壞，但似乎二十一世紀的第二大議題：確保全球的幸福快樂，就是會牽涉到重新打造智人，讓人可以享受永恆的愉悅。


    ## 打造「神格」的人類


    在追求幸福和不死的過程中，人類事實上是試圖把自己提升到神的地位。不只因為這些特質如神一般，也是因為：為了戰勝年老和痛苦，人類必須能夠像神一樣，控制自己的生物基質。如果我們能夠從人體系統移去死亡和痛苦，或許幾乎就等於能隨心所欲重新打造整個人體系統，以各種方式操縱人類的器官、情感及智能。這樣一來，你就能為自己訂購大力士海克力斯的力量、愛神阿芙蘿黛蒂的性感、智慧女神雅典娜的智能，或是如果你想要的話，也能訂來酒神戴歐尼斯的瘋狂。


    到目前為止，要增加人的力量，主要還是依靠改進外在工具。但在未來，則可能更會著重在改進人的身心，或直接將人與工具結合起來。人要升級為神，有三條路徑可走：生物工程、半機械人（cyborg）工程與無機生命（inorganic
    life）工程。


    生物工程的起源，是認為我們還遠遠尚未發揮人類身體的完整潛力。四十億年來，天擇（natural selection）不斷對生物撥撥弄弄、修修補補，讓我們從變形蟲變成爬蟲、再到哺乳動物，現在成了自封的「智人」。沒有理由認為智人就是最後一站。從人類發展歷程來看，不過就是在基因、荷爾蒙和神經元方面，出現一些相對來說並不大的變化，就已經足以讓直立人（Homo
    erectus，最厲害的成就只是能製作出石刀），變成了智人（生產出太空船和電腦）。誰曉得如果人類的DNA、內分泌系統和大腦結構再多變化一些，結果會是如何？


    生物工程並不會耐心等待天擇發揮魔力，而是要取來舊有的智人身體，刻意改寫基因碼、重接大腦迴路、改變生化平衡，甚至是要長出全新的肢體。這樣一來，將會創造出一些小神（godling），這些小神與我們智人的差異，可能就如同我們和直立人的差異，那般巨大。


    半機械人工程則更進一步，是讓人體結合各種非生物的機器設備，例如仿生機械手（bionic hand）、人造眼，又或是將數百萬個奈米機器人注入我們的血管，讓它們在血液中巡航、診斷病情並修補損傷。這種半機械人的某些能力，將會遠遠超出任何有機的人體。例如，一副有機身體的所有部分都必須緊緊相連，才能發揮作用。如果有一頭大象的大腦在印度、眼睛和耳朵在中國、腳在澳洲，最有可能的情況就是這頭大象根本就死了，而且就算因為某種神祕的因素而還活著，也是眼不能視、耳不能聽、足不能行。


    然而，半機械人卻能夠同時出現在許多地方。像是半機械人醫師，根本不用離開位於斯德哥爾摩的診間，就能在東京、芝加哥、甚至是火星上的太空站，進行緊急手術。唯一需要的，就是夠快的網路連線、以及一對仿生機械眼、一雙仿生機械手罷了。但是再想想，為什麼只能是一對呢？為什麼不能是四隻眼睛？事實上，甚至連這些想法都是多餘的，如果能有儀器直接連接半機械人醫師的大腦，又何必再用手去拿手術刀？


    這聽起來可能很像科幻小說，但其實已經成為現實。最近已有猴子學會如何透過植入猴腦的電極，控制遠端的仿生機械手腳。癱瘓的病人也能夠單獨靠著念頭，就移動仿生機械肢體或操作電腦。如果你想要的話，也能夠戴上電子「讀心」頭盔，在家裡遙控電子設備。這種頭盔並不需要把電極植入大腦，而是去讀取你頭皮所發出的電波訊號。如果想開廚房的燈，只要戴上頭盔、想像一些事先編程的心理符號（例如想像你的右手做某個動作），就能把開關打開。這種頭盔現在網路上就買得到，只要四百美元。44


    2015年初，斯德哥爾摩一家高科技公司Epicenter有數百名員工在手中植入晶片。這個晶片大約米粒大小，存有個人安全資訊，讓他們只要揮揮手，就能打開門、或是操作影印機。他們希望很快也能用這種方式來付款。希歐柏拉德（Hannes
    Sjoblad）是幕後研發人員之一，他解釋道：「我們已經隨時都在與科技互動，但現在搞得手忙腳亂，得輸入各種PIN碼（用戶個人識別號碼）和密碼。如果能用手一摸就好，豈不是輕鬆自在？」45


    然而就算是半機械人工程，現在也仍然相對保守，因為它還是假定要由有機的人類大腦，扮演生命的指揮和控制中心。還有另一個更大膽的想法，則是徹底拋棄有機的部分，希望打造出完全無機'
  mdcn: '## 怎麼讓他快樂起來？


    對美國而言，二十世紀後半葉是個黃金時代——先在第二次世界大戰獲勝，隨後的冷戰時期也奪下更關鍵的勝利，讓美國成為全球首屈一指的超級大國。從1950年到2000年，美國GDP從二兆美元成長到十二兆美元。實際人均收入增加了一倍。新發明的避孕藥讓性愛是前所未有的無拘無束。婦女、同性戀、非裔美國人和其他少數族裔，也終於從美國這塊大餅分到了比過去更大的一塊。便宜的汽車、冰箱、空調、吸塵器、洗碗機、洗衣機、電話、電視和電腦，如大水湧來，日常生活簡直徹底改觀。但研究顯示，美國人在1990年代的主觀幸福感，與1950年代的調查結果仍然大致相同。34


    在日本，從1958年到1987年間，平均實質收入成長為五倍，經濟成長可說是史上最快。但這種排山倒海而來的財富，伴隨著對生活方式及社會關係的各種正面及負面影響，對於日本的主觀幸福感卻是出人意料的，幾乎沒什麼影響。在1990年代，日本人對生活還是如同1950年代一樣滿意，或說不滿意。35


    ## 幸福感也有玻璃天花板


    看來幸福感就是罩了一片神祕的玻璃天花板，雖然我們達到了前所未有的成就，幸福感卻未能成長。就算我們能為所有人提供免費膳食、治癒所有疾病、確保世界和平，也不一定能打破這片玻璃天花板。要達到真正的幸福快樂，難度並不會比克服老死低得多。


    幸福快樂的玻璃天花板有兩大支柱，分別屬於心理層面與生物層面。在心理層面，快樂與否要看你的期望如何，而非客觀條件。光是和平繁榮的生活，並不能讓我們滿意；必須是現實符合期望，才能讓我們滿足。但壞消息是，隨著客觀條件改善，期望也會不斷膨脹。於是乎，人類近幾十年來的客觀條件雖然大幅改善了，但是帶來的不是更高的滿足，而是更大的期望。如果我們不做點什麼，未來不論達到什麼成就，可能我們還是會像當初一樣，永遠不會真正滿足。


    從生物層面來說，不管是期望或是幸福感，其實都是由生物化學機制控制的，而不是由經濟、社會和政治局勢來決定。根據伊比鳩魯的說法，我們之所以感到幸福，是因為我們感受到愉悅的感覺（sensation），而且並未接觸到不快的感覺。邊沁也有類似的說法，認為大自然讓人類由兩個主人控制：快樂和痛苦；我們的所為、所言、所思，都是由這兩個主人決定。承繼邊沁思想的彌爾（John
    Stuart Mill）則解釋，幸福快樂也就是只有愉悅、沒有痛苦，而在愉悅與痛苦之外，沒有善惡之別。如果有人想從愉悅和痛苦之外的理由（譬如上帝的話語或國家利益）推導出善惡，這人是想騙你，而且也可能騙了他自己。36


    在伊比鳩魯的時代，這種言論是褻瀆神靈。在邊沁和彌爾的時代，這種言論是反動顛覆。但是在二十一世紀早期，這就成了科學正統。根據生命科學的說法，快樂和痛苦只不過是身體各種感覺的總和狀態。愉悅或痛苦從來就不是對外在世界事件的反應，而是對自己體內感覺的反應。丟掉工作、離婚、或是政府開戰，事件本身並不會讓人受苦。唯一能讓人痛苦的，就是自己身體裡不愉快的感覺。丟掉工作會引發沮喪，而沮喪才是一種令人不悅的身體感覺。世界上可能有一千種事情會讓我們憤怒，但憤怒也不是什麼抽象的概念，而是體內燥熱、肌肉緊繃的身體感覺，這才是憤怒的真相。我們說「怒火中燒」，確實是有些根據的。


    相對的，科學也說並沒有人是因為得到升職、中彩券、甚至是找到真愛而快樂。真正能讓人幸福快樂的，只有一件事、別無其他可能，就是身體裡的愉悅感覺。想像自己是戈策（Mario
    Götze），擔綱2014年世界盃德國隊的攻擊型中場球員，在決賽對上阿根廷；這時已經開賽一百一十三分鐘了，兩隊都未能得分。再過短短七分鐘，就要來到恐怖的PK大戰。巴西里約的馬拉卡納體育場，塞滿了七萬五千名激動的球迷，全球還有不知幾百萬觀眾焦急的緊盯螢幕。你離阿根廷的球門只有幾公尺，這時舒勒（André
    Schürrle）忽然朝你踢來一記妙傳！你胸口停球，看著球向你的腳落下，再空中起腳一射，看著球越過阿根廷門將，強力射進球網。進了！


    體育場如火山爆發，幾萬人瘋了一般大吼，你的隊友衝上來擁抱親吻你，國內柏林和慕尼黑的數百萬觀眾，也在電視螢幕前激動落淚。這時你欣喜若狂，但並不是因為在阿根廷球門裡那顆球，也不是因為在巴伐利亞邦露天啤酒吧裡塞爆球迷的歡天喜地，而是因為在你的身體裡面，各種感受正有如風暴一般襲來，「欣喜若狂」就是對這些感覺的回應。你覺得有冷顫在你的脊椎上上下下，電波一波一波衝過身體，好像自己溶入了幾百萬顆爆炸的能源球一般。


    你不用在世界盃決賽踢進致勝一球，也能得到這樣的感覺。像是工作上意外升遷，讓你開心得跳了起來，就是對同一種感覺的反應。你的心靈深處，其實根本不懂足球、也不懂工作，只懂生物生理的感覺。如果你升遷了，但因為某種原因而沒有得到這種愉悅的感覺，你就不會覺得滿意。反之也是如此。如果你剛被開除（或是輸了一場重要賽事），但感受到了非常愉快的感覺（也許是因為嗑藥），那你還是可能以為自己就站在世界的頂峰，飄飄欲仙。


    但壞消息是，愉悅的感覺很快就會消退，遲早會轉變成不愉快的感覺。就算踢進了世界盃決賽的制勝球，也無法保證一生幸福，甚至是到了頂點之後就只能下坡。同樣的，如果去年我意外升遷，很有可能雖然現在我還是在這個位子上，但當初聽到消息的愉悅感早已經在幾個小時後就煙消雲散。如果想再感受那些美妙的感覺，就得再升遷一次。萬一滿懷期望、卻沒能再升遷，感受到的痛苦和憤怒，可能還遠比當初乾脆一直當個小卒來得高。


    ## 興奮感總是太短暫


    這些都是演化的錯。無數代以來，我們的生化系統不斷適應，為的是增加生存和繁衍的機會，而不是快樂幸福的机会。只要是有利於生存和繁衍的行為，就會得到生化系統用愉悅的感覺來回饋。但這不過是一時的行銷花招罷了。我們努力取得食物、追求伴侶，就是想避免飢渴帶來的不愉悅感覺，並且滿足進食的愉悅、性愛的高潮。但無論進食或性愛，這種愉悅都無法長時間維持，想要再次感受，就只能去尋找更多的食物和伴侶。


    如果哪天出現一種罕見突變，讓某隻松鼠只要吃了一顆堅果，就能一輩子感覺無上的快樂，情況會怎樣？技術而言，只要從松鼠的大腦下手，確實能夠做到。而且誰知道呢，或許幾百萬年前就出現過這樣幸運的松鼠，但牠過的就會是極其快樂、但也極其短暫的一生，讓這種罕見的基因突變迅速畫下句點。原因就在於，覺得快樂的松鼠再也不會努力去找更多堅果，更不用說是求偶交配了。至於和牠競爭的其他松鼠，吃了堅果才過五分鐘，就又覺得餓，反而有更好的機會能夠生存，並把自己的基因傳給下一代。正是基於完全相同的原因，人類蒐集堅果（高薪的工作、大房子、好看的另一半）也很少能帶來長期的滿足。


    可能有人會說，情況也沒那麼糟啦，因為讓我們快樂的不是那些結果，而是追求目標的過程。攀登聖母峰的過程，會比站在山頂更令人滿足；挑逗和前戲，要比最後的性高潮更為精采；進行開創性的實驗，也比最後獲得讚美和獎項更有趣味。然而，這並未改變事情的全貌，只是說明演化會用各種不同種類的愉悅，來控制我們罷了。有時候，演化是用愉悅或安寧的感覺，引誘我們行動；也有時候，是用得意或興奮的感覺，刺激我們向前。


    動物如果在尋找某種增加生存和繁衍機會的東西（例如食物、夥伴、或社會地位），大腦就會產生警覺和興奮的感覺，而因為這種感覺如此美妙，就能促使動物更加努力。在一項著名的實驗中，科學家把電極連接到幾隻大鼠（rat）的腦子，大鼠只要踩下踏板，就能創造出興奮的感覺。接著，他們讓大鼠有美味的食物和踩踏板這兩個選擇，結果大鼠寧願選擇踏板（很像是小孩寧願打電動，也不想下樓吃飯）。這幾隻大鼠一次又一次踩著踏板，直到因為飢餓和疲憊而倒地不起。37


    人類很可能也是這樣，喜歡比賽過程的興奮，大於最後成功的桂冠。然而，真正讓比賽如此吸引人的，就是那些令人開心的感覺了。像是爬山、打電動或去盲目約會，這些活動的過程絕不可能完全只有壓力、絕望或無聊這些令人不快的感覺，否則斷無可能有人參加。38


    可惜的是，比賽那種興奮感，就像勝利時的幸福感一樣，轉瞬即逝。風流男人享受一夜情的刺激，商人享受咬著指甲看道瓊指數上上下下，電玩玩家享受在電腦螢幕殺怪；對他們來說，再去回味昨日的冒險，並不足以讓他們感到滿足。就像大鼠必須一次又一次踩下踏板，不管是風流男子、商界巨擘或電玩玩家，一樣是每天都需要有新的刺激。雪上加霜的是，這裡的期望一樣會因現有條件而適應，昨天覺得刺激的挑戰，今天太快就化為沉悶。又或許，幸福快樂的關鍵既不是比賽、也不是金牌，而是要能調合出興奮與安寧這兩種元素的正確劑量組合；但我們大多數人，往往不斷在緊張與舒坦這兩端來回跳動，到了哪端就開始對那端感到不滿。


    ## 操縱生化反應可獲得快樂嗎？


    如果科學說得不錯，幸福快樂是由生化系統所掌握，那麼唯一能確保長久心滿意足的方法，就是去操縱這個系統。別再管經濟成長、社會改革或政治革命了；為了提高全球幸福快樂的程度，該操縱的是人類的生物化學。


    過去幾十年間，人們確實已經開始這麼努力了。五十年前，精神藥物背負著嚴重的汙名，如今這種汙名已然打破。不論這是好是壞，現在有愈來愈高比例的人口，定期服用精神藥物，確實有些是為了治癒使人衰弱的心理疾病，但也有些只是要面對日常生活的沮喪和偶爾襲來的憂鬱。


    舉例來說，已經有愈來愈多學童開始服用利他能（Ritalin）之類的興奮劑。2011年，美國因為注意力不足過動症（attention deficit hyperactivity
    disorder, ADHD）而服用藥物的兒童人數，就有三百五十萬人。英國的這個數字，則從1997年的九萬二千人，上升到2012年的七十八萬六千人。39 這些藥物的原本目的，是要治療注意力障礙，但今天就連某些完全健康的孩子，也開始服藥，希望能夠提高成績，迎合老師和家長愈來愈高的期望。40


    很多人相當反對這種發展，認為問題不是出在孩子，而是出在教育體系。如果學童出現注意力障礙、壓力過高、成績不佳，或許我們該怪的是學校教法過時、教室過度擁擠、生活節奏已經快到不自然。或許該改變的不是孩子，而是學校？各種相關論點的歷時演變，十分耐人尋味。幾千年來，教育方法的相关爭論未曾停息，無論是在中國古代或是英國的維多利亞時代，人人都各有一套理論，而且都對所有其他理論嗤之以鼻。但在先前，至少大家還有一點達成共識：想改善教育，該從學校下手。然而現在，大概是歷史上首次，至少有一些人已經認為，更有效率的做法是從學生的生化狀態下手。41


    軍隊也朝著同樣的方向前進：美國有12%的伊拉克駐軍、17%的阿富汗駐軍，曾經服用安眠藥或抗憂鬱症藥物，協助應對戰爭造成的壓力和痛苦。人會感覺到恐懼、憂鬱和精神創傷，原因不在於砲彈、詭雷或汽車炸彈本身，而在於荷爾蒙、神經傳遞物質和神經網路。共同遇上同一場埋伏的兩名士兵，可能一個嚇到呆滯、方寸大亂、之後幾年噩夢連連，另一個卻能勇敢向前殺敵，最後榮獲勳章。這裡的不同點，就在於兩名士兵身體裡的生物化學反應，如果能設法控制，就能一石二鳥，讓士兵更快樂，軍隊也更有效能。42


    用生物化學來追求快樂，也是這個世界的頭號犯罪原因。2009年，美國聯邦監獄有半數受刑人是因為毒品入獄；義大利受刑人有38%因為毒品相關罪行遭定罪；英國受刑人也有55%是因為使用或交易毒品而觸法。2001年的一份報告發現，澳洲受刑人犯下入獄罪行時，有62%都吸了毒。43


    人們喝酒是為了遺忘，抽大麻是為了感到平靜，用古柯鹼和安非他命是為了感到敏銳而自信；吞搖頭丸能讓人放大感官、感受狂喜，而LSD則會讓你踏進一場脫離現實的迷幻夢境。有些人靠著用功學習、工作或養家才得到的快樂，有些人只要操縱分子、調出正確劑量，就能遠遠更為輕鬆的搞定。這對於整個社會和經濟秩序都是實際存在的威脅，也正因如此，各國才會堅持對生化犯罪發動一場血腥而無望的戰爭。


    國家希望管制用生物化學追求快樂幸福的手段，定出「好」與「壞」的區別。這裡的原則很清楚：如果有利於政治穩定、社會秩序和經濟成長，這樣的生化操作不但可允許，甚至還應鼓勵（例如能讓過動的學童平靜下來，或是讓士兵迫不及待投身戰役）。至於如果威脅到穩定和成長，這樣的生化操作就要禁止。然而，每年都有許多新藥從各大學、藥廠及犯罪組織的實驗室中誕生，國家與市場的需求也不斷變化。隨著用生化來追求快樂的腳步逐漸加速，對政治、社會和經濟也將有所影響，並愈來愈難以控制。


    而且，使用藥物還只是個開端。實驗室裡的專家已經著手研究以更複雜的方式操縱人類的生化反應，例如將電流刺激，直接送至大腦特定部位，或是用基因工程控制人體的藍圖。不論確切方法為何，要透過生物化學操縱方式得到幸福快樂，並不容易，因為這其實改變了生命最基本的模式。不過話說回來，克服饑荒、瘟疫和戰爭，在過去又豈是易事？


    ## 長生不死之外，也想追求永恆的愉悅


    究竟人類該不該花這麼大的心力來追求生化的快樂，至今離定論還很遠。有人會說，快樂這件事根本沒那麼重要，要說個人滿意度是人類社會的最高目標，根本是走錯了路。有些人可能認為快樂確實是至善，但對於生化專家認為快樂只是身體愉悅的感覺，則很有意見。


    在大約兩千三百年前，伊比鳩魯就曾警告門徒，無節制追求享樂很可能帶來的反而是痛苦，而非快樂。幾個世紀前，佛陀還有個甚至更激進的主張，認為追求快感正是痛苦的根源，這種快感只是短暫、毫無意義的振動。得到快感時，我們的反應不是滿足，反而貪得無厭，只是想得到更多。因此，不論我們感受到多少幸福、興奮的感覺，也永遠無法滿足。


    如果我認定快樂就是這些稍縱即逝的快感，並且渴望得到愈來愈多的快感，我就別無選擇，只能不斷追求下去。好不容易得到之後，快感又很快消退，但因為光是過去快樂的回憶，並不足以令我滿足，所以我又得從頭再來。像這樣的追求，就算持續幾十年，也永遠無法帶來任何長久的成果；我愈渴望這些快感，愈是變得壓力重重，愈是無法饜足。想得到真正的幸福快樂，人類該做的不是加速，而是慢下追求快感的腳步。


    佛教對快樂的看法，與生物化學有許多共通之處。兩者都認為快感來得快、去得也快，如果人們只是渴求快感，卻不好好體驗快感，就仍然無法滿足。但接下來，佛教與生物化學兩者卻有了非常不同的解決方案。生化的辦法是開發出各種產品和療法，為人類提供無止無盡的快感，希望讓人能夠永遠享有快感。但佛教的建議則是減少對快感的渴望，不讓渴望控制我們的生活。佛教認為，我們可以訓練心靈，仔細觀察各種感覺是如何產生、又如何消逝。只要心靈學會看穿這些感覺的本質（也就是短暫、毫無意義的振動），我們就不再有興趣追求快感。畢竟，去追求一個倏然而來、忽焉而逝的東西，有什麼意義？


    目前，人類對於生化解決方案的興趣是遠遠大得多。不論那些喜馬拉雅山洞穴裡的僧侶、或是象牙塔裡的哲學家怎麼說，對資本主義信徒來講，愉悅的快感就是快樂，這種感覺可以周而復始。每過一年，我們忍耐不悅的能力愈來愈低，而對快感的渴望則愈來愈高。現在的科學研究和經濟活動都以此為目標，每年研發出更有效的止痛藥、新的冰淇淋口味、更舒適的床墊、更令人上癮的手機遊戲，好讓我們在等公車的時候，連一秒鐘的無聊都無須忍耐。


    當然，這一切還是遠遠不足。智人的演化並未讓人能夠感受長久的快感，因此光靠冰淇淋或手機遊戲並不夠，如果真想長久感受到快感，就必須改變人類的生物化學機轉，重新打造人體和心靈。而我們也正在朝這目標努力。我們可以爭論這究竟是好是壞，但似乎二十一世紀的第二大議題：確保全球的幸福快樂，就是會牽涉到重新打造智人，讓人可以享受永恆的愉悅。


    ## 打造「神格」的人類


    在追求幸福和不死的過程中，人類事實上是試圖把自己提升到神的地位。不只因為這些特質如神一般，也是因為：為了戰勝年老和痛苦，人類必須能夠像神一樣，控制自己的生物基質。如果我們能夠從人體系統移去死亡和痛苦，或許幾乎就等於能隨心所欲重新打造整個人體系統，以各種方式操縱人類的器官、情感及智能。這樣一來，你就能為自己訂購大力士海克力斯的力量、愛神阿芙蘿黛蒂的性感、智慧女神雅典娜的智能，或是如果你想要的話，也能訂來酒神戴歐尼斯的瘋狂。


    到目前為止，要增加人的力量，主要還是依靠改進外在工具。但在未來，則可能更會著重在改進人的身心，或直接將人與工具結合起來。人要升級為神，有三條路徑可走：生物工程、半機械人（cyborg）工程與無機生命（inorganic
    life）工程。


    生物工程的起源，是認為我們還遠遠尚未發揮人類身體的完整潛力。四十億年來，天擇（natural selection）不斷對生物撥撥弄弄、修修補補，讓我們從變形蟲變成爬蟲、再到哺乳動物，現在成了自封的「智人」。沒有理由認為智人就是最後一站。從人類發展歷程來看，不過就是在基因、荷爾蒙和神經元方面，出現一些相對來說並不大的變化，就已經足以讓直立人（Homo
    erectus，最厲害的成就只是能製作出石刀），變成了智人（生產出太空船和電腦）。誰曉得如果人類的DNA、內分泌系統和大腦結構再多變化一些，結果會是如何？


    生物工程並不會耐心等待天擇發揮魔力，而是要取來舊有的智人身體，刻意改寫基因碼、重接大腦迴路、改變生化平衡，甚至是要長出全新的肢體。這樣一來，將會創造出一些小神（godling），這些小神與我們智人的差異，可能就如同我們和直立人的差異，那般巨大。


    半機械人工程則更進一步，是讓人體結合各種非生物的機器設備，例如仿生機械手（bionic hand）、人造眼，又或是將數百萬個奈米機器人注入我們的血管，讓它們在血液中巡航、診斷病情並修補損傷。這種半機械人的某些能力，將會遠遠超出任何有機的人體。例如，一副有機身體的所有部分都必須緊緊相連，才能發揮作用。如果有一頭大象的大腦在印度、眼睛和耳朵在中國、腳在澳洲，最有可能的情況就是這頭大象根本就死了，而且就算因為某種神祕的因素而還活著，也是眼不能視、耳不能聽、足不能行。


    然而，半機械人卻能夠同時出現在許多地方。像是半機械人醫師，根本不用離開位於斯德哥爾摩的診間，就能在東京、芝加哥、甚至是火星上的太空站，進行緊急手術。唯一需要的，就是夠快的網路連線、以及一對仿生機械眼、一雙仿生機械手罷了。但是再想想，為什麼只能是一對呢？為什麼不能是四隻眼睛？事實上，甚至連這些想法都是多餘的，如果能有儀器直接連接半機械人醫師的大腦，又何必再用手去拿手術刀？


    這聽起來可能很像科幻小說，但其實已經成為現實。最近已有猴子學會如何透過植入猴腦的電極，控制遠端的仿生機械手腳。癱瘓的病人也能夠單獨靠著念頭，就移動仿生機械肢體或操作電腦。如果你想要的話，也能夠戴上電子「讀心」頭盔，在家裡遙控電子設備。這種頭盔並不需要把電極植入大腦，而是去讀取你頭皮所發出的電波訊號。如果想開廚房的燈，只要戴上頭盔、想像一些事先編程的心理符號（例如想像你的右手做某個動作），就能把開關打開。這種頭盔現在網路上就買得到，只要四百美元。44


    2015年初，斯德哥爾摩一家高科技公司Epicenter有數百名員工在手中植入晶片。這個晶片大約米粒大小，存有個人安全資訊，讓他們只要揮揮手，就能打開門、或是操作影印機。他們希望很快也能用這種方式來付款。希歐柏拉德（Hannes
    Sjoblad）是幕後研發人員之一，他解釋道：「我們已經隨時都在與科技互動，但現在搞得手忙腳亂，得輸入各種PIN碼（用戶個人識別號碼）和密碼。如果能用手一摸就好，豈不是輕鬆自在？」45


    然而就算是半機械人工程，現在也仍然相對保守，因為它還是假定要由有機的人類大腦，扮演生命的指揮和控制中心。還有另一個更大膽的想法，則是徹底拋棄有機的部分，希望打造出完全無機'
