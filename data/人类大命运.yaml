    人類大命運


    黑死病相當,甚至有過之而無不及。


    雖然愛滋病對人類造成慘重的影響,另外像瘧疾這種歷史已久的流行病也每年取走數百萬人命,但現在看來,流行病對人類健康的威脅,已經遠遠小於先前幾千年來的情況了。現在,絕大多數人是死於非傳染性疾病,像是癌症、心臟病,或根本就是自然老死。18(癌症和心臟病當然不是什麼新疾病,自古以來一直都存在,只是古人平均壽命較短,還來不及死於這兩種疾病罷了。)


    很多人擔心這只是暫時的勝利,害怕黑死病一定有哪個近親正躲在黑暗的角落,蠢蠢欲動。沒人能保證絕不會再有一場瘟疫席捲世界,但我們有很好的理由相信:在醫師與細菌的軍備競賽中,醫師是跑在前面的一方。會出現新的傳染病,主因是病原體基因組發生突變,使病原體能夠從動物跳到人類,能夠打敗人體免疫系統,或是對抗生素之類的藥物產生抗藥性。現今由於人類對環境的劇烈影響,這種突變的發生和傳播都可能比以往更快。19然而,在對抗醫學的時候,病原體唯一的靠山只有盲目的運氣。


    醫師則不然,他們靠的絕不只是運氣。雖然科學也有許多運氣成分,但醫師可不是隨隨便便把不同的化學物質扔進試管,希望哪天湊巧製造出新藥來。他們是每年累積更多更好的知識,並用來設計出更有效的藥物及療法。因此,雖然我們可以預見在2050年必然會有更多具抗藥性的細菌,但到時候的醫學,也很有可能比今天更能解決這些問題。20


    2015年,醫師宣布發現一種全新的抗生素 Teixobactin,目前細菌對它尚無抗藥性。已有一些學者認為,在與高抗藥性細菌的這場仗上,Teixobactin
    很有可能扮演扭轉乾坤的角色。21科學家也正在研發革命性、與過去完全不同的新療法,譬如有些實驗室已經開始


