    # 但這就是有用啊！ ✦


    靠著虛構故事，能讓人類更容易合作。但代價在於：這些虛構故事同時也會決定我們合作的目標。因此，我們可能擁有非常複雜的合作制度，卻只是為了服務虛構的目標和利益。這樣一來，雖然整個制度看來運作良好，但可能只是從這個制度的標準來看。


    例如，一位穆斯林的毛拉（mullah，對精通穆斯林神學的人士的尊稱）會說：「我們的制度很有用。現在全世界有十五億穆斯林，比起以往，也有更多人研讀《古蘭經》，服從阿拉的旨意。」這裡關鍵的問題是：這真的是判斷成功的正確標準嗎？學校的校長會說：「我們的制度很有用。在過去五年內，考試成績已上升7.3%。」這真的是判斷學校的最好方式嗎？至於古埃及的官員也會說：「我們的制度很有用。比起世界上任何人，我們收到的稅更多、挖出的運河更多、蓋起的金字塔更大！」確實，法老時代的埃及在稅收、灌溉系統和金字塔建設方面領先全球。但這真的是最重要的事嗎？


    人類有許多物質、社會和心理上的需求。我們實在很難判斷，比起從事狩獵採集的祖先，古埃及的農民是否真得到更多的愛、或是更好的社會關係？事實上，古埃及在營養、健康和兒童死亡率方面，情況反而很可能是更糟了。


    有一份大約出自西元前1850年的文件，時值阿蒙涅姆赫特三世在朝（就是那位闢出法雍湖的法老），提到有位叫做杜阿卡帝（Dua-Khety）的有錢人，要兒子佩皮去上學，好讓他以後當個書吏。在路上，杜阿卡帝很生動的向兒子描述農民、勞工、軍人和工匠的生活多麼悲慘，好鼓勵佩皮把所有心力投入學習，才能逃離大多數人不快樂的命運。'
