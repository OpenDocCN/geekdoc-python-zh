    ## 鱷魚也能成為神明


    貓王一生中，這個品牌賣唱片、門票、海報和權利金，賺進數以百萬計的美元。但在所有的必要工作裡，只有非常小的一塊，真正需要貓王這個生物軀體，絕大多數都是由一支小團隊完成的，這支戰鬥力十足的小團隊是由經紀人、律師、製作人和祕書所組成。因此，就算生物的貓王已然過世，這個品牌仍然可以運轉不休。就算到今天，歌迷還是可以購買貓王的海報和專輯；廣播電臺還是要支付播放授權金；每年也還是有超過五十萬的歌迷，如朝聖者般，湧向田納西州孟菲斯的貓王故居：雅園（Graceland）。


    在文字發明之前，故事受限於人類大腦的能力，不能講得太複雜，否則就沒人能記得。但出現文字之後，忽然人類可以開始創造長篇複雜的故事，記在黏土板、莎草紙上，不再單靠人腦來記憶。沒有任何古埃及人能記得法老所有的土地、稅收和什一奉獻資料；貓王從未完整讀過所有以他之名簽署的合約；沒有任何人真能對歐盟的所有法律和規章瞭若指掌；也沒有任何銀行家或中情局探員能清楚全球每一美元的流向。但是這些細節都寫在某個地方；把所有相關文件集結起來，就形成了法老、貓王、歐盟和美元的身分和力量。


    正是如此，文字讓人能夠以演算法的方式組織整個社會。前面為了談情緒是什麼、大腦又如何運作，曾提過「演算法」一詞，提過這是一系列有條理的步驟，能用來計算、解決問題和作成決定。在沒有文字的社會裡，人類得在腦中完成所有的計算和決定。而有了文字之後，人類就能組成龐大的人際網路，每個人完成巨大演算法裡的一個小步驟，而最後的重要決定是由整個演算法來判斷。這正是官僚體系的本質。


    以現代化醫院為例。你一到醫院，掛號處就會給你一份標準表格，詢問一套制式的問題。你的答案將會轉交給護理師，由護理師依據醫院規定，判斷該做哪些初步檢驗。例如她可能決定要量你的血壓和心跳，再抽血做個檢查。值班醫師檢視初步檢驗結果，遵照嚴格的規定，確認該請你前往哪一科。到了各專科，就會進行更完整的檢查，例如X光或fMRI，過程都有厚厚的醫療指示手冊詳細規定。接著，再由專科醫師根據權威的統計資料庫分析結果，決定該用哪種藥物、或進行哪一項進一步的檢驗。


    有了這種演算法架構，誰是掛號員、護理師或值班醫師，無傷大雅，他們的人格類型、政治意識或當時的心情，也無關緊要。只要他們遵守所有規定的流程，把你治好的機率就很高。根據這種演算法典範，你的命運是操縱在「系統」的手裡，而不是哪個碰巧擔任這個或那個職位、有血有肉的人。


    醫院的情形，同樣也能套用到軍隊、監獄、學校、公司和古代王國。當然，古埃及的科技絕對遠遠不及現代醫院複雜，但整個演算法的道理卻是一致的。在古埃及，大多數決定同樣不是由某個智者來決定，而是用記在莎草紙、黏土板的文字，連結起由所有官員組成的官僚網路。以法老這位活神之名，這個官僚網路便重組了人類社會、重塑了自然世界。


    舉例來說，從西元前1878年到1814年，埃及由法老辛努塞爾特三世（Senusret III）及其子阿蒙涅姆赫特三世（Amenemhat III）統治，挖了一條巨大的運河，將尼羅河連接到法雍谷地（Fayum
    Valley）的沼澤。他們運用複雜的水壩、水庫及運河支渠系統，將尼羅河的部分河水引至法雍，創造了一座巨大的人工湖，蓄水量足足有五百億立方公尺。¹相較之下，胡佛水壩攔水形成的米德湖是美國最大的人造湖，最大蓄水量只有三百五十億立方公尺。


    法雍工程計畫賦予法老能力，讓法老得以約束尼羅河，避免土地遭到大洪水的蹂躪，並在乾旱時提供寶貴的水源。此外，法雍谷地本來是一片鱷魚肆虐、沙漠圍繞的沼澤，現在搖身一變，也成了埃及的糧倉。在這個新的人工湖岸邊，建起了一座新城，古埃及稱之為
    Shedet，而希臘人稱為 Crocodilopolis，也就是「鱷魚之城」。全城最重要的建物就是鱷魚神索貝克（Sobek）的神廟，索貝克的地位等同於法老（當代雕像有時也會看到有鱷魚頭的法老）。神廟裡有一頭名為佩蘇卓斯（Petsuchos）的聖鱷，咸認為是索貝克的神靈轉世。就像活神法老，這位活神佩蘇卓斯也有滿是關愛眼神的祭司悉心照料，為這隻幸運的爬蟲類提供美食、甚至玩具，讓祂穿上金色披風、戴上鑲嵌著寶石的王冠。畢竟，佩蘇卓斯正是這些祭司依附的品牌、一切權威和生計的依靠。一旦佩蘇卓斯過世，立刻就會有一隻新的鱷魚被選出來填補空缺，而過世的鱷魚則被仔細防腐，製成木乃伊。


    ### 信仰產生力量


    在辛努塞爾特三世和阿蒙涅姆赫特三世的時代，埃及人既沒有推土機、也沒有炸藥，甚至連鐵器、役馬或輪子也尚未出現（輪子一直要到西元前1,500年才在埃及普及）。當時的尖端科技是青銅器，但價格昂貴，極為罕見，大多數建築工具仍然是石器或木器，純由人力操作。今日有許多人認為，古埃及的各種偉大建築——所有那些水壩、水庫、金字塔，一定是來自外太空的外星人所建。如果一個文化連輪子和鐵器都沒有，怎麼可能完成這樣的奇蹟？


    但真相與這種說法大不相同。埃及之所以能闢出法雍湖、建起金字塔，原因不是外星人的幫助，而是傑出的組織技能。靠著幾千位識字的官僚，法老招募了成千上萬的勞工，也取得了足以供應這些勞工多年勞動的食物。如果能有幾萬名勞工合作數十年，就算只是用石器，當然也足以闢出人工湖、建起金字塔。


    可以想見，法老自己幾乎是連手指都不用動。法老不用自己收稅，不用自己畫藍圖，自然也不用自己去拿鏟子。但那些埃及人相信，唯有向活神法老和祂的守護神索貝克祈禱，才能讓尼羅河谷倖免於毀滅性的洪水和乾旱。他們也沒錯。雖然法老和索貝克都只是想像的實體，並無法提高或降低尼羅河的水位，但如果有幾百萬人都相信法老和索貝克，於是合作建起水壩、挖出運河，發生洪水和乾旱的機率就能大幅降低。如果與蘇美的神祇相比（更不用說是石器時代的神靈），古埃及的神祇已經是真正力量強大的實體，能夠建起城市、招募軍隊，還控制了數百萬人、牛和鱷魚的生命。


    這裡說想像的實體能夠建造或是控制事物，乍聽可能很奇怪。但我們現在卻很習慣說：美國製造了第一顆核彈、中國建造了三峽大壩，或是谷歌正在打造自動駕駛車。所以，為什麼不能說是法老建了一座水庫、索貝克挖了一條運河？


    ### 紙上討生活


    就這樣，文字帶來了強大的虛構實體，組織了數百萬人，也重塑了河流、沼澤和鱷魚的現實。同時，文字也讓人類習慣了透過抽象符號的中介，來體驗現實，於是更容易相信這樣的虛構實體確實存在。


    狩獵採集者整天爬樹、找蘑菇、追野豬、抓兔子，於是他們每天的現實也就是樹木、蘑菇、野豬和兔子。農民整天在田裡工作，耕地、收割、磨玉米、照顧家畜，於是他們每天的現實就是赤腳踩著泥土的感覺，牛拖著犁發出的味道，以及剛出爐的熱騰騰麵包的口感。相較之下，古埃及的書吏將大把的時間花在閱讀、書寫和計算，於是他們每天的現實就是莎草紙上的墨痕，能夠決定誰擁有哪塊地、每頭牛該值多少、哪個農民每年該繳多少稅金。用他寫莎草紙的鐵筆，書吏就能左右整個村落的命運。


    在時間來到現代之前，絕大多數人仍然不識字，但最重要的管理者愈來愈是透過書面文字，來看到現實。對於識字的精英份子來說（不管是在古埃及、或是二十世紀歐洲），一張紙上寫的任何事情，都至少與樹木、牛隻和人類一樣真實。


    1940年春，納粹從北方攻進法國，大部分的法國猶太人都嘗試往南逃離法國。如果要跨越邊界，就需要取得西班牙和葡萄牙的入境簽證。於是成千上萬的猶太人夾雜在洪水般的難民潮中，一起包圍了波爾多（Bordeaux）的葡萄牙領事館，希望得到這張能救命的紙。雖然葡萄牙政府下令，駐法領事需要經過外交部批准，才能簽發入境簽證，但在波爾多的領事德索薩·曼德斯（Aristides
    de Sousa Mendes, 1885-1954）決定無視命令。這個舉動最終讓他三十年的外交職涯隨風而逝。納粹坦克正不斷進逼波爾多，德索薩·曼德斯等人長達十天，夜以繼日工作，幾乎不睡，就是不停簽發入境簽證、在文件上蓋章。德索薩·曼德斯簽發了數千張簽證，最後疲憊不支倒地。


    ![](img/319dca06e22893e942053da0432e9f19_187_0.png)


    22. 葡萄牙駐法國領事德索薩·曼德斯，乃是拿著橡皮圖章的天使。


    葡萄牙政府當時根本不想接受這些難民，派出專員將這位不聽命令的領事，押回國解職。然而，雖然這些官員對人類的苦難似乎毫無感受，卻對文件深表尊重，不管是法國、西班牙或葡萄牙的官僚，對於德索薩·曼德斯抗命簽發的簽證，仍然願意遵守，於是讓可能多達三萬人逃出了納粹的死亡陷阱。德索薩·曼德斯手中的武器可說只有一個橡皮圖章，卻完成了大屠殺期間，單人推動最大規模的救援行動。²


    只不過，文字紀錄的神聖性通常造成的影響卻是負面居多。從1958年到1961年，毛澤東統治的共產中國實行大躍進，希望讓中國轉眼成為超級強國。為了有餘糧轉為資金，投入野心勃勃的工業和軍事計畫，毛澤東下令將農業產量增為兩倍和三倍。這項不可能的命令，從北京的辦公室沿著官僚階層一路傳下，透過省級行政人員一直下達到村長。地方官員不敢發出批評，也希望拍拍上級馬屁，於是捏造各種農業產量激增的假報告。這些虛假的數字又在官僚階層中一路回傳，每到一級就又誇大一些，在這裡添上一筆、那裡加一個零。


    於是，到了1958年底，中國政府報告上的糧食年產量，已經比實際多了50%。政府對報告深信不疑，向外國出售了幾百萬噸的稻米，換購武器和重型機器，以為還有足夠的餘糧養活中國人口。結果迎來史上最嚴重的饑荒，數千萬中國人死於非命。³


    同時，中國農業奇蹟的熱情報導傳向全世界。坦尚尼亞總統尼耶瑞瑞（Julius Nyerere）是個理想主義者，對中國的成功深感佩服。為了讓坦尚尼亞的農業現代化，尼耶瑞瑞決心依循中國模式，建立集體農場。農民起身反對這項計畫，但尼耶瑞瑞派出軍警，摧毀傳統村莊，並將數十萬農民強行安置到新的集體農場。


    坦尚尼亞政府的宣傳，把農場描繪得如同小天堂，但這些天堂多半只存在於政府文件中。在首都沙蘭港（Dar-a-Salam）寫出的方案和報告裡，宣稱著在這天或那天，這個或那個村落的村民已安置到了這座或那座農場。但在現實中，村民到達了目的地，卻發現那裡什麼都沒有——沒有房舍、沒有田地、沒有工具。但官員卻對自己和尼耶瑞瑞總統報告說，整個計畫無比成功。事實上，短短不到十年，坦尚尼亞就從非洲最大的食物出口國，轉成糧食淨進口國，如果沒有外援，已無法自給自足。1979
    年，坦尚尼亞農民有 90% 生活在集體農場，但生產的糧食只占了該國農業產量的 5%。⁴


    雖然歷史處處可見這樣的悲劇，但更有效率的行政管理，通常還是利大於弊，至少從政府的角度看來是如此。沒有統治者能夠抵擋用一支筆就能改變現實的誘惑，而如果因此導致災難，補救的辦法似乎也就是寫出更多的備忘錄，發出更多的規定、法令和命令。


    我們可能覺得，書面文字這種工具只是用來溫和的描述現實，但它卻逐漸變得威力無窮，能夠重塑現實。如果官方報告與客觀現實有所衝突，最後必須讓步的往往是現實。只要你和稅務機關、教育體系或其他繁冗的官僚機構打過交道，就知道幾乎沒有人在意真相。表格上寫的，才更重要。


    ## 非洲的國界是這麼來的


    在文本與現實發生衝突時，真的是有時現實必須讓步嗎？這會不會只是對官僚體系的一種常見而誇大的誹謗？不管服務的主子是法老或是毛澤東，大多數官僚都仍然是講理的人，肯定會說：「我們是用文字來描述田地、運河和糧倉的實況。如果描述準確無誤，我們做出的就是講求實際的決定。但如果描述得不準確，就會造成饑荒、甚至叛亂。這種時候，我們或未來的政權領導者就能從錯誤中學習，努力讓描述更準確、符合真實。於是隨著時間過去，我們的文件紀錄就能愈來愈精確。」


    某種程度上確實如此，但這忽略了歷史上一股相反的動力。隨著官僚體系不斷握有更多權力，會逐漸變得就算犯錯也無動於衷。這時，他們不再是改變故事以符合現實，反而是去改變現實來符合他們筆下的故事。到最後，外部現實終於與這些官僚的幻想達成一致，現實不得不遷就官僚體系。舉例來說，許多非洲國家的邊界無視山川或貿易路線，造成歷史和經濟區域遭到不必要的分割，地方種族和宗教也遭到割離。同一個部落可能赫然發現自己被分進了好幾個國家，而同一個國家也可能納入了許多敵對的部落。這樣的問題雖然在世界各地都在所難免，但在非洲卻格外激烈。原因就在於現代非洲各國邊界所反映的，並不是當地國家自己的期許和爭奪，而是由從未踏足非洲的歐洲官僚一筆畫定。


    十九世紀後期，歐洲強權各自主張在非洲據有領地，但又擔心一旦互有扞格，可能導致全面的歐洲大戰，於是各方在1884年共聚柏林，在紙上瓜分非洲，彷彿非洲就只是一塊大餅。當時，歐洲人對非洲內陸的絕大部分景況仍然一無所知。英、法、德已經擁有非洲沿海地區的精確地圖，也清楚知道尼日河、剛果河和尚比西河是在哪裡入海。但他們幾乎不知道這些河流上游內陸的狀況，不知道河流沿岸的王國和部落，也不知道當地的宗教、歷史和地理。這些事情，歐洲外交官根本不放在心上。他們只是在柏林一張光亮的會議桌上，攤開一幅還有一半空白的非洲地圖，在這裡和那裡畫了幾條線，就私相授受了整個非洲大陸。


    等到歐洲人拿著先前早已商議定案的地圖，兵馬終於打進非洲內陸，才發現在柏林畫的許多邊界，根本難以適用於非洲的地理、經濟和種族現實。但為了避免產生新的衝突，這些侵略者仍然堅持原協議，於是這些想像出來的線條，就落實成了歐洲殖民地的實際邊界。在二十世紀下半葉，歐洲帝國瓦解、殖民地紛紛獨立，但新成立的國家擔心重訂邊界會帶來無止境的戰爭和衝突，因此邊界仍未改變。現今非洲國家面臨的許多困難，都是由於這些邊界毫無道理。歐洲官僚筆下的幻想遇到非洲的現實，卻是現實被迫投降。⁵


    ## 現實向文字低頭


    現代教育體系也有許多現實向文字低頭的例子。如果我要量自己桌子的寬度，要用哪個度量衡單位並無關緊要。不管說它是200公分、又或是78.74英寸，桌子並不會有所改變。但如果是官僚體系要測量人的時候，用哪個標準的差別就很大了。


    學校一旦開始用說一不二的分數來評量學生，數百萬學生和教師的生活也就大為改觀。各種分數和標記，是歷史上相對晚近的發明。狩獵採集者從來不需要去標記評量自己的成就，甚至在農業革命幾千年後，也很少有教育機構會使用精確的分數。像是到了年尾，某個中世紀的補鞋學徒並不會收到一張紙，說他的鞋帶技術拿了個A、但鞋扣技術只有C。在莎士比亞的年代，牛津大學的畢業生離開學校時，只有兩種可能：拿到學位、或是沒拿到學位。沒人想過要給某個學生74分、另一個學生88分這種事。6


    一直要到工業時代出現了大眾教育體系，才開始固定使用精確的分數。先是工廠和政府習慣用數字語言來思考，接著學校也有樣學樣，開始根據每個學生的平均分數，來判斷這個學生的價值；至於老師和校長的價值，則是根據學校的總體平均分數來判斷。官僚體系採用這個標準之後，現實就變了。


    一開始，學校的重點應該是啟發和教育學生，而分數只是衡量教導是否成功的工具。但是想當然耳，學校很快就開始一心追求高分。每個孩子、教師和督學都知道，考試考高分需要的技能，與真正瞭解文學、生物學或數學所需的技能，並不相同。每個孩子、教師和督學也都知道，如果被迫兩者只能擇一，大多數學校要的會是分數。


    書面文字的力量，隨著各種神聖經文的出現而達到巔峰。古代文明的祭司和書吏，習慣將各種文件看作是現實的指南。起初，這些文本會告訴他們關於稅收、田地和糧倉的實況。但等到官僚得到了權力，文本也就得到了權威。祭司不僅記錄了神祇的財產，也記錄了神祇的作為、誡命和祕密。而就此寫出的經文，號稱描述著完整的現實，也讓一代又一代的學者，習於從《聖經》、《古蘭經》或《吠陀經》裡，尋找一切問題的解答。


    ![](img/319dca06e22893e942053da0432e9f19_193_0.png)


    24. 這是十九世紀中葉，歐洲人畫的非洲地圖。


    歐洲人對於非洲內陸所知甚少，仍逕行瓜分非洲、訂定邊界。


    理論上，如果某本宗教經典扭曲現實，門徒遲早都會發現，而讓這本經典權威掃地。林肯就說過，你不可能在所有的時候騙過所有的人。只不過，那是林肯一廂情願了。實際上，人類合作網路的力量，有賴於真實與虛構之間的微妙平衡。太過扭曲現實，力量就會被削弱，讓你敵不過更看清楚現實的對手。但想要有效組織大量人力，卻仍然得倚靠虛構的神話，如果堅持一切都須是百分之百的現實、絕不加入任何虛構，信眾也就不會太多。'
