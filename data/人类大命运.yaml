    世界就是自找著永遠的不安定和變動。各種固定的關係和古老的偏見，都遭到掃除；而新的結構等不到固定，便已經陳舊了。一切固定的東西都煙消雲散。在這樣混沌的世界，光是生活已不容易，要妥善管理，更是難上加難。


    因此，「現代」就得更加努力，以確保人類不論個人或整體，都不會想到要退出這場競賽（雖然這場競賽正是所有緊張和混沌的源頭）。為此，現代繼續高舉成長，做為最高價值的大纛，要求我們為此冒一切危險、做出任何犧牲。整體而言，現代鼓勵政府、企業和組織，以成長做為成功標準，並將穩定視為洪水猛獸。個人而言，現代要我們不斷提高收入和生活水準，就算目前的生活已經令你相當滿意，還是應該努力爭取更多。


    昨天的奢侈品，成了今天的必需品。曾經，一間三房的公寓、一輛車、加上一部桌上型電腦，就已經讓你相當滿意；到了現在，你就會想要擁有五房的獨棟住宅，車庫裡有兩輛車，加上有許多的
    iPod、平板電腦和智慧型手機。


