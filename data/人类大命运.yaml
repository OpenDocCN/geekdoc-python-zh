  - '[PAGE 262]


    在倫理上，人文主義的座右銘是「感覺對了，就做吧」。在政治上，人文主義告訴我們「選民能做出最好的選擇」。在美學上，人文主義說「看的人覺得美，就是美」。

    因此，藝術的定義變得開放了。


    1917年，藝術家杜象（Marcel Duchamp）買了一座量產的普通小便斗，他宣布這是一件藝術品，並命名為「噴泉」（Fountain，見第264頁），簽了名，放到巴黎博物館裡。這件作品若是給中世紀的人看到，根本理都懶得理，會認為簡直是胡言亂語，連批評都是浪費氧氣。


    但是在現代人文主義的世界，杜象這件作品咸認是重要的藝術里程碑。在全球各地無數的美術教室裡，都會給學美術的大一學生看看杜象的這件「噴泉」。接著在老師一聲指示下，就像是群魔亂舞吵了起來。這是藝術！不是！就是！不可能！


    等到學生好好發洩了一陣，老師就會讓討論重新聚焦，詢問：「藝術究竟是什麼？我們怎麼判斷某件事物是藝術作品？」經過幾分鐘你來我往，最後老師就會把全班引向正確的方向：「只要有人認為是藝術，就是藝術！有人認為美，就是美！」


    如果有人認為一座小便斗也是一件美麗的藝術品，它就是藝術品。難道還有什麼更高的權威，能說大家都錯了？


    今天，杜象這件傑作的複製品，在全球許多最重要的博物館展出，包括舊金山現代藝術博物館、加拿大國家美術館、倫敦泰特美術館和巴黎龐畢度藝術中心。（這些複製品可是展在畫廊裡，而不是洗手間。）'
