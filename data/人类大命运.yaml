    # 第11章 信數據得永生?


    人類是從數萬年前的非洲大草原上開始演化,這套演算法並非天生用來應付二十一世紀的資料流。我們可以嘗試升級人類資料處理系統,但光這樣還不夠,因為萬物互聯網可能很快就會創造出極巨大而快速的資料流,就算是升級後的人類演算法也無法處理。在汽車取代馬車的時候,我們並不是讓馬升級,而是直接讓馬退休。或許,智人也到了該退休的時候。


    數據主義對人類採用嚴格的功能觀點,完全依據能在資料處理機制發揮多少功能,來評估人類經驗的價值。如果我們研發出能夠具備相同功能、而又更有效率的演算法,「人類經驗」這套演算法就會失去價值。因此,如果不只是計程車司機和醫師,就連律師、詩人和音樂家,都能用更厲害的電腦程式取代,那又何必在意這些程式有沒有意識、有沒有主觀經驗呢?如果人文主義又開始讚頌人類經驗的神聖,數據主義會覺得這是個訴諸情感的謊言。「你所稱讚的體驗,只是一種過時的生化演算法。在七萬年前的非洲大草原上,這種演算法可說是頂尖,而且就算到了二十世紀,仍然對軍隊和經濟至關重要。但我們很快就會有更好的演算法!」


    在許多好萊塢科幻電影的最後高潮裡,人類面臨外星人的入侵艦隊、造反的機器人大軍,又或是要消滅全人類的全知超級電腦,一切看來人類已經注定滅亡了;但人類總是在最後一刻反敗為勝,這要感謝的總歸是所有外星人、機器人和超級電腦未曾懷疑、也無法看穿的東西:愛。就像在「駭客任務」(Matrix)裡,主角原本完全被超級電腦玩弄在掌心、被邪惡的機器人射了滿滿一輪子彈,但得到愛人的啟發,就忽然大顯神威,徹底扭轉局勢。


    就數據主義看來,這整個場景實在太荒謬了。它會對好萊塢編劇嗤之以鼻:「拜託,你就只能編出這種玩意啊?愛?而且還不是


