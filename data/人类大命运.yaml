    有血有肉的戰士除了行事難以預測，容易受到恐懼、飢餓和疲勞的影響，思考及行動的速度也愈來愈無法趕上現代戰爭的步調。從古代巴比倫的尼布甲尼撒二世、到現代伊拉克的海珊，雖然科技


