- md: "## 第1章 人類的三大新議題\n\n  會說，只要還有一個孩子正死於營養不良、還有一個人死於毒梟的戰爭，人類就應該把所有心力投入解決這些困境。必須等到這些問題真正徹底解決，我們才能把目光轉向下一件大事。\n\
    \n  但歷史不是這樣運作的。住在宮殿裡的人，心中的重要待辦議題，永遠與住在陋室裡的人不同；而就算是在二十一世紀，這件事也不太可能改變。\n\n  第二，這是一項歷史預測，不是政治目標。就算能夠不管貧民窟居民的命運，仍然很難判斷追求不死、快樂和神性，究竟是對是錯。決定追尋這些議題，可能會是很大的錯誤。然而歷史就是充滿了重大錯誤。有鑑於我們過去的紀錄和現在的價值觀，我們很有可能就是會一直追尋快樂、神性和不死——即使可能因而身亡。\n\
    \n  第三，追尋並不代表就能夠得到。歷史常常是由過度放大的期望所塑造。塑造二十世紀俄羅斯歷史的因素，有很大程度在於共產主義試圖戰勝不平等，但此舉並未成功。我的預測重點是人類將會嘗試在二十一世紀完成這些議題，而不是能夠成功。未來的經濟、社會和政治，將會是由「試圖戰勝死亡」所塑造，但並不代表人類必然能在2100年達成不死的目標。\n\
    \n  第四、也是最重要的一點，在於這項預測的重點並不是要提出預言，而是為了讓我們討論現有的選擇。如果經過討論，能讓我們選擇其他道路，而讓預測不能成真，那反而更好。如果做了預測、但什麼都不能改變，那又有什麼意義呢？\n\
    \n  有些複雜系統（例如天氣）是完全無視於我們的預測，但人類發展的過程則會對預測產生反應。事實上，預測愈準確，引起的反應就愈多。因此很矛盾的是，隨著我們蒐集更多資料、提升運算能力，事件反而會變得更出乎意料而難以預測。知道得愈多，反而能預測的愈少。舉例來說，假設某天，專家解開了經濟的基本法則。這時銀行、政府、投資人和客戶，會立刻應用這項新知，展現新的行為，希望能夠占到競爭對手的便宜。畢竟如果新知識無法帶來新的行為，豈不是代表它毫無用處？但令人感嘆的是，只要人們一改變行為模式，新找出的經濟理論也就立刻過時。我們或許能夠找出經濟在過去如何運作，但已經無法再確知經濟在目前如何運行，未來就更別說了。\n\
    \n  以上並不是某個假設的案例。在十九世紀中葉，馬克思（Karl Marx）提出了卓越的經濟見解，並據以預言：無產階級和資產階級的衝突將日益激烈，最後必然由無產階級得到勝利，迎來資本主義崩潰的結局。馬克思當時十分肯定，革命將率先起於工業革命的領頭國，例如英、法、美，接著擴散到世界其他地區。\n\
    \n  但是馬克思忘記了資本家也會讀書。一開始確實只有少數幾位弟子認真看待他的理論、仔細閱讀。不過，隨著社會主義的火炬逐漸得到追隨者而壯大，資本家開始有所警覺，也跟著細讀了《資本論》，並採用了馬克思分析時的許多工具和見解。\n\
    \n  到了二十世紀，從街頭的年輕人到各國總統，都接受了馬克思對經濟和歷史的思考方式。就算是最積極抗拒馬克思主義預測的資本主義者，同樣利用了馬克思主義的預測。例如，美國中央情報局分析1960年代越南和智利的情況時，就將當地社會分為不同階級；尼克森或柴契爾夫人考量全球局勢時，也會自問是誰控制了生產的重要工具。從1989年到1991年，老布希總統一路監看共產主義的「邪惡帝國」走向敗亡，卻在1992年總統大選遭到柯林頓擊敗。柯林頓的勝選策略，可以濃縮成他的競選口號：「笨蛋，問題在經濟！」就算是馬克思本人，也沒法說得更好了。\n\
    \n  人們採用了馬克思主義的判斷，也就隨之改變自己的行為。位於英法等國的資本家，開始改善工人待遇，增強他們的民族意識，並讓工人參與政治。因此，當工人開始有權在選舉中投票、工黨在一國又一國陸續取得權力之後，資本家也就繼續高枕無憂了。於是馬克思的預言化為泡影。共產主義革命從未橫掃英、美、法等工業強國，無產階級專政也被掃入歷史的垃圾箱。\n\
    \n  這正是歷史知識的矛盾。知識如果不能改變行為，就沒有絲毫用處。但知識一旦改變了行為，本身就立刻失去意義。我們擁有愈多資料、對歷史瞭解愈深入，歷史的軌跡就改變得愈快，我們的知識也過時得愈快。\n\
    \n## 研究歷史是為了掙脫過去的魔掌\n\n  幾個世紀以前，人類的知識成長緩慢，政治和經濟的改變也彷彿踩著一種悠閒的腳步。到了今日，知識增加的速度飛快，理論上我們應該愈來愈瞭解這個世界。然而情況卻正好相反。各種新知識讓經濟、社會和政治的變化加速；為了瞭解究竟發生什麼事，我們加速蒐集和累積知識，卻只導致動盪更為加速加劇。於是，我們愈來愈無法真正理解現在、或預測未來。\n\
    \n  在1016年，想預測歐洲在1050年的樣貌，可說是相對容易。當然，王朝可能傾圮、不明的外族可能入侵、自然災害可能襲擊；但是很明顯的，歐洲就算走到了1050年，還是會由國王和教士所統治，仍然會是農業社會，大部分居民仍是農民，而且繼續深深受苦於饑荒、瘟疫和戰爭。相較之下，在2016年，我們卻全然不知歐洲在2050年會是什麼樣貌。我們不敢說，到時會有怎樣的政治制度、怎樣的就業市場結構，甚至連到時候人民的身體會是怎樣，都難以預知。\n\
    \n  如果說，歷史就是不會遵循什麼穩定的法則，我們也無法預測歷史未來的走向，那為什麼還要研究歷史？我們常常以為，科學的主要目的就是預測未來：氣象學者要預測明天是晴或雨、經濟學家要判斷貨幣貶值會避免經濟危機或造成市場崩盤、好醫師能預見化療或放射療法能否治癒肺癌。\n\
    \n  同樣的，我們也希望歷史學家去檢視前人的行為，好讓我們善則從之、惡則改之。但實際狀況卻幾乎永遠不是這樣，原因就在於現在和過去的情境實在太不相同了。如果現在去研究漢尼拔將軍在第二次布匿戰爭（西元前218年至西元前201年）的戰術，希望在爆發第三次世界大戰時派上用場，這只是浪費時間。過去在騎兵戰場上很優秀的戰術，用在網路戰並不見得占得了便宜。\n\
    \n  而且，科學並不只是預測未來。各個領域的學者，都希望拓展人類的視野，因此在我們眼前開展的是各種全新而未知的未來。歷史領域特別如此。雖然歷史學家偶爾也會提出預言（但成績相當普通），不過，歷史研究最重要的目的，其實是讓我們意識到一些通常不會考慮的可能。歷史學家研究過去，不是為了要重複過去，而是為了從中解放。\n\
    \n  我們每個人都出生於某個特定的歷史現實，受特定的規範和價值觀所控制，也由獨特的經濟和政治制度來管理。我們都會覺得自己所處的現實是理所當然的，認為這一切誠屬自然、無可避免，也無法改變。但我們忘了世界是由一連串的意外事件所創造，而歷史不僅塑造了我們的科技、政治和社會，也塑造了我們的思想、恐懼和夢想。「過去」從祖先的墳墓裡伸出冰冷的手，掐住我們的頸子，要我們只能看向某個未來的方向。我們從出生那一刻就能感受到這股力量，於是以為這就是自然，以為這是我們不可分割的一部分，也就很少嘗試掙脫，很少想像自己還有其他未來。\n\
    \n  研究歷史，就是為了掙脫過去的魔掌，讓我們能看向各種不同方向，並開始注意到前人無法想像、或過去不希望我們想像的可能性。觀察著讓我們走到現在的一連串意外事件，就能瞭解人類的每個念頭和夢想，是如何落實成形的，接著就能開始以不同的方式來思考，編織出不同的夢想。研究歷史並無法告訴我們該如何選擇，但至少能提供我們更多選項。\n\
    \n  那些希望改變世界的時刻，常常正是起於重新描述歷史、而使得人們能夠重新想像未來。不管你是希望工人發動罷工、女性取回自己身體的自主權、或是受壓迫的少數民族站起來要求政治權利，第一步都是要重述他們的歷史。新的歷史就會告訴他們，「現在的狀況既非自然而然、也不會是永恆不變。過去曾經是另一個樣貌，只是有了一連串的偶然事件，才創造出現在這個不公平的世界。只要我們採取明智的行動，就能改變並創造出更好的世界。」\n\
    \n  正因如此，馬克思主義者才要講述資本主義的歷史，女權主義者才要研究父權社會的形成，非裔美國人才要永遠記住奴隸販運的恐怖。他們的目的不是要延續過去，而是要從過去解放。\n\
    \n## 一段關於草坪的歷史\n\n  發生大規模社會革命的歷史，值得講述與研究；發生在日常生活裡的小事，同樣也值得記述與探究。一對年輕夫婦正在為自己蓋一個新家，要求設計師在前院要規劃一塊漂亮的草坪。為什麼想要一塊草坪？他們或許會說：「因為草坪很漂亮啊。」但他們為什麼會這麼認為呢？這件事背後也有歷史。\n\
    \n  在石器時代，狩獵採集者並不會在洞穴入口種草。如果你參觀雅典衛城、羅馬卡比托利歐神殿山、耶路撒冷猶太聖殿、或是北京紫禁城，都不會發現城殿門口有一片綠油油的草地，來歡迎訪客。\n\
    \n  這種在私人住宅和公共建築前面種植一片草坪的想法，是誕生於中世紀晚期英、法兩國貴族的城堡。到了近代早期，這個習慣已經根深柢固，成了貴族的商標。\n\n\
    \  想要擁有一片漂亮的草坪，除了有地，還得付出許多心力，特別是以前可沒有自動灑水裝置和割草機。而到頭來，草坪並不會產生任何價值，甚至還不能放牛羊吃草，否則草皮就可能被啃禿或踩壞。貧窮的農民負擔不起，絕不可能把寶貴的土地或時間浪費在草坪上。於是，城堡入口處那片完美的草地，就成了無人能造假的身分象徵，威風凜凜的向經過的人宣告：「本人財糧滿倉，威權顯赫，領土農奴無數，區區綠地豈在話下。」\n\
    \n  草坪愈廣闊、修整愈完美，就代表這個家族愈強盛。如果你拜訪一位公爵，卻看到草坪維護不佳，就知道他有麻煩了。51\n\n  往往要等到重要慶典和社交活動，才能用到這些珍貴的草坪，其他時間則是嚴禁染指。就算到了今天，無數的宮殿、政府建築和公共場所前，還是會出現一則嚴厲的告示，命令眾人：「禁止踐踏草皮」。我以前在牛津學院，整個四方院子中間就是一大片美麗誘人的草坪,每年只有一天,允許我們走上去或是坐一坐。至於其他日子裡,如果哪個學生斗膽用腳褻瀆那神聖的草坪,我們就只能為他一聲悲嘆了。\n\
    \n  王室宮殿和公爵的城堡,讓草坪變成一種權力象徵。就算到了近代晚期,王朝傾覆、公爵人頭落地,新掌權的總統和總理還是保留了草坪的傳統。從國會殿堂、最高法院、總統官邸、到其他公共建築,就這麼用一片又一片平整的綠地,宣告著自己的權力。\n\
    \n  同時,草坪也征服了體育界。幾千年來,從冰面到沙漠,人類的運動已經幾乎用過所有可能想像到的地表。但是在過去這兩個世紀,像是足球或網球這種萬眾矚目的比賽,用的都是草地。當然,這是在你有錢的前提下。在里約熱內盧的貧民區,巴西足球的下一代生力軍,還在沙土地上踢著臨時權充的球;但到了富裕的市郊,富人的兒子們則是在精心維護的草皮上,開心玩樂。\n\
    \n### 草坪成了社經地位的指標\n\n  於是,草坪在人們心中成了政治權力、社會地位和經濟實力的象徵。也難怪到了十九世紀,新興中產階級對草坪亦是熱情歡迎。一開始,只有銀行家、律師和企業家能夠負擔在自己的私人住所,布置這樣的奢侈品。但等到工業革命使中產階級擴大,並發明了割草機、自動灑水裝置,數百萬家庭忽然也負擔得起,能夠在自家門口養上一片草坪。於是在美國郊區,平整漂亮的草坪也從富人階級的奢侈品,轉為中產階級的必須。\n\
    \n  在這之後,郊區的禮拜儀式也就多增了一項。星期天早上做完教堂禮拜,很多人就會悉心修剪家門口的草坪。只要沿著街道走一遭，就能從草坪的大小和維護品質，快速判斷每個家庭的財富和地位。想知道隔壁那戶有錢的鄰居，是不是家裡出了問題，再也沒有比「草坪居然沒人管」更明顯的證據了。除了玉米和小麥之外，草就是美國時下最普遍的作物，草坪業（植物、肥料、割草機、灑水設備、園丁）每年產值有數十億美元。52\n\
    \n  對草坪的狂熱，不只是歐洲和美國的現象。就算是從未到過羅亞爾河河谷的人，也看過美國總統在白宮草坪上發表談話，看過重要的足球賽在一片綠茵的足球場上舉行。就連《辛普森家庭》的辛普森和霸子，也會吵著該輪到誰去推草。全球民眾看到草坪，都會聯想到權力、金錢和威望。\n\
    \n  這麼一來，草坪傳播得既遠且廣，現在甚至征服了穆斯林世界的核心。卡達最近新建的伊斯蘭藝術博物館，側邊也有大片草坪，更容易讓人聯想起路易十四的凡爾賽宮，而不是阿拔斯王朝第五代哈里發（伊斯蘭政教合一的領袖）——拉希德（Haroun\
    \ al-Rashid）統治下的巴格達。伊斯蘭藝術博物館由一家美國公司設計及建造，草地面積超過十萬平方公尺，而且可是坐落在阿拉伯沙漠之中，每天需要驚人的淡水量，才能維持翠綠。同時，在卡達首都多哈市和杜拜的郊區，中產階級家庭也以自己的草坪自豪。要不是居民穿戴的那些白色長袍和黑色頭巾，還真可能誤以為身處美國中西部，而不是中東地區。\n\
    \n  瞭解了草坪的簡短歷史，如果現在要設計夢想中的房子，你可能就會再想想，究竟要不要有草坪。當然，你還是可以想要有一片草坪。然而，你也可以選擇甩掉這些從歐洲公爵、大資本家、甚至是辛普森家庭給你的文化負擔，換成日式的枯山水，或是自己全新創造的庭園。\n\
    \n## 第一幕出現的一把槍\n\n  這正是讀歷史最好的理由：不是為了預測未來，而是要將自己從過去中釋放，想像是否可有另一種命運。當然，我們仍不免受到過去的形塑，所以永遠不可能得到完全的自由；然而，部分自由總比全無自由，來得強多了。\n\
    \n  《人類大命運》這本書各章節的預言，都不過是為了討論現下種種困難的抉擇，並邀請讀者共同改變未來。預言人類會試圖得到長生不死、幸福快樂和化身為神，其實和預言民眾蓋房子的時候，門前要有塊草坪，非常類似。這都是很可能發生的趨勢。但只要你大聲把這件事說出來，就會讓你開始考慮其他替代方案。\n\
    \n  要說「人類的夢想就是追求不死和神性」，這件事之所以會讓人覺得驚駭，並不是因為聽起來太過異想天開，反而是因為很少有人把話講得這麼白。但只要真正開始思考這件事，大多數人就會意識到這其實很說得通。雖然這些夢想有它科技上的傲慢，但在思想上早已不是新聞。過去三百年來是由人文主義主導世界，將智人的生命、快樂和能力，加以神聖化。而經過如此長久的人文主義薰陶，人類想要得到不死、幸福和神性，也是相當合乎邏輯的。這只是把早就藏在桌下的事情，公開端上檯面罷了。\n\
    \n  但我還想把另一件東西也端上檯面：一把槍，一把在第一幕出現、將在第三幕發射的槍。下面的章節將討論人文主義（也就是對人類的崇拜）如何征服世界。不過，人文主義的興起，同時也播下滅亡的種子。雖然對人文主義來說，讓人類演化為神，是合乎邏輯的結論，但這同時也暴露了人文主義固有的缺陷。如果最早提出來是一個有缺陷的理想，常常是到了理想即將實現的那一刻，才會赫然發現。\n\
    \n  我們已經可以在老年病房看到這種過程了。正因為人類對於人的生命的神聖，堅信不疑，我們總要盡全力讓人活下去。直到整個生命狀態無比悽慘，我們才不得不問：「這究竟有何神聖？」也因為類似的人文主義信念，我們在二十一世紀可能會讓人類整體，提升到超越其自身限度。同樣的尖端科技，可以讓人演化升級為神，但也可能讓人類這種生物失去意義。舉例來說，如果某天電腦強大到足以瞭解並克服衰老和死亡的機制，電腦也就很有可能強大到足以在任何任務上，取代人類。\n\
    \n  在這長篇大論的第1章〈人類的三大新議題〉，一開始我們曾探討過，二十一世紀的人類新議題可能為何，但實際真正的情況絕對會再複雜許多。目前，我們的前三大新議題似乎是不死、快樂和神性。但只要一接近達成這些目標，所造成的動盪將有可能使我們偏離方向，走向完全不同的目的地。\n\
    \n  本章描述的未來，只是「過去的」未來；換句話說，是基於過去三百年的思想和希望，而指向的未來。然而，真正的未來——基於二十一世紀將誕生的新想法、新希望，而真正打造的未來，可能與「過去的」未來，有完全不同的樣貌。\n\
    \n## 人文主義即將崩解\n\n  為了理解這一切，我們需要再回頭，瞭解智人究竟是怎樣的生物，瞭解人文主義如何成為主導世界的宗教，以及瞭解為什麼實現人文主義的夢想，反而可能導致人文主義的崩解。這就是《人類大命運》這本書內容架構的基本安排。\n\
    \n  《人類大命運》的第一部〈智人征服世界〉，將著眼於智人與其他動物的關係，希望理解我們這個物種究竟有何特別之處。有些讀者可能覺得奇怪，在一本要討論未來的書裡，為什麼要用這麼長的篇幅來談動物？\n\
    \n  在我看來，如果不從我們周遭的動物開始談起，就不可能真正討論到人類的本質及未來。智人竭盡全力想忘掉這件事，但人類仍然就是一種動物。而且，在我們想要把自己變成神的這時刻，回頭看看自己的起源，更加倍重要。要討論人類化身為神的未來之前，不能不談人類身為動物的過去、以及人類與其他動物的關係；原因在於，人類與動物之間的關係如何，很有可能就是未來超人類和人類之間關係的模樣。\n\
    \n  想知道超級聰明的半機械人，可能怎麼對待只是一般血肉之軀的人類嗎？先去看看人類如何對待比較不聰明的動物表兄弟吧。當然，這絕不是完美的類推，但這是我們唯一能夠觀察、而不只是想像的最佳原型。\n\
    \n  根據第一部的結論，《人類大命運》第二部〈智人為世界賦予意義〉將會檢視智人在過去數千年間，創造了怎樣光怪陸離的世界，又是怎樣把我們帶到了現在這個十字路口。智人是怎麼會深信人文主義的信條，以為宇宙是以人類為核心而運轉、人類是所有意義與權力的來源？而這樣的信條又會怎樣影響經濟、社會和政治？如何塑造我們的日常生活、藝術，以及我們最隱祕的欲望？\n\
    \n  《人類大命運》的第三部、也是最後一部〈智人失去控制權〉，則是來到二十一世紀初期。在更瞭解了人類、更瞭解人文主義信條之後，第三部描述的是我們目前的困境，以及可能的未來。為什麼想實現人文主義，反而會導致它的崩潰？追尋不死、快樂和神性，又會怎樣動搖我們對人文主義的信念基礎？有什麼跡象正預示這個災難，又是怎麼反映到我們每天所做的每一個決定？而如果人文主義確實已經難以為繼，有什麼思想可能取而代之？\n\
    \n  本書這第三部，並不只是單純的哲學思考、或是空談未來可能如何，而是仔細審視智慧型手機、約會的做法和就業市場，從蛛絲馬跡中，判斷未來將會如何。\n\n\
    \  對於一心信仰人文主義的人來說，這一切聽起來，似乎十分悲觀，叫人鬱悶。但請別太急著下結論。史上早已見證許多宗教、帝國和文化的起起落落，這樣的起伏動盪並不一定是壞事。\n\
    \n  人文主義主導世界三百年了，但其實這時間並不長。法老王統治埃及達三千年，教皇也統治歐洲有千年之久。如果回到古代法老拉美西斯二世（Ramses II）的時代，告訴某個埃及人，有一天這世上再也沒有法老王，他可能會嚇呆驚傻。「沒有法老王，日子要怎麼過下去？這樣能有誰來維持秩序、和平和正義？」\n\
    \n  如果回到中世紀，告訴當時的人，再過幾個世紀會有人說「上帝已死」，他們肯定會嚇壞了。「沒有上帝，日子要怎麼過下去？這樣能有誰來令我們生活有意義，不會陷入混亂？」\n\
    \n  但回首過去，很多人都會認為法老時代的結束、以及上帝已死的概念，都屬於正面的發展。或許，人文主義的崩解也同樣是件好事。人們之所以害怕改變，是因為害怕未知。但是，歷史最不變的事實，就是一切都會改變！"
  mdcn: "## 第1章 人類的三大新議題\n\n  會說，只要還有一個孩子正死於營養不良、還有一個人死於毒梟的戰爭，人類就應該把所有心力投入解決這些困境。必須等到這些問題真正徹底解決，我們才能把目光轉向下一件大事。\n\
    \n  但歷史不是這樣運作的。住在宮殿裡的人，心中的重要待辦議題，永遠與住在陋室裡的人不同；而就算是在二十一世紀，這件事也不太可能改變。\n\n  第二，這是一項歷史預測，不是政治目標。就算能夠不管貧民窟居民的命運，仍然很難判斷追求不死、快樂和神性，究竟是對是錯。決定追尋這些議題，可能會是很大的錯誤。然而歷史就是充滿了重大錯誤。有鑑於我們過去的紀錄和現在的價值觀，我們很有可能就是會一直追尋快樂、神性和不死——即使可能因而身亡。\n\
    \n  第三，追尋並不代表就能夠得到。歷史常常是由過度放大的期望所塑造。塑造二十世紀俄羅斯歷史的因素，有很大程度在於共產主義試圖戰勝不平等，但此舉並未成功。我的預測重點是人類將會嘗試在二十一世紀完成這些議題，而不是能夠成功。未來的經濟、社會和政治，將會是由「試圖戰勝死亡」所塑造，但並不代表人類必然能在2100年達成不死的目標。\n\
    \n  第四、也是最重要的一點，在於這項預測的重點並不是要提出預言，而是為了讓我們討論現有的選擇。如果經過討論，能讓我們選擇其他道路，而讓預測不能成真，那反而更好。如果做了預測、但什麼都不能改變，那又有什麼意義呢？\n\
    \n  有些複雜系統（例如天氣）是完全無視於我們的預測，但人類發展的過程則會對預測產生反應。事實上，預測愈準確，引起的反應就愈多。因此很矛盾的是，隨著我們蒐集更多資料、提升運算能力，事件反而會變得更出乎意料而難以預測。知道得愈多，反而能預測的愈少。舉例來說，假設某天，專家解開了經濟的基本法則。這時銀行、政府、投資人和客戶，會立刻應用這項新知，展現新的行為，希望能夠占到競爭對手的便宜。畢竟如果新知識無法帶來新的行為，豈不是代表它毫無用處？但令人感嘆的是，只要人們一改變行為模式，新找出的經濟理論也就立刻過時。我們或許能夠找出經濟在過去如何運作，但已經無法再確知經濟在目前如何運行，未來就更別說了。\n\
    \n  以上並不是某個假設的案例。在十九世紀中葉，馬克思（Karl Marx）提出了卓越的經濟見解，並據以預言：無產階級和資產階級的衝突將日益激烈，最後必然由無產階級得到勝利，迎來資本主義崩潰的結局。馬克思當時十分肯定，革命將率先起於工業革命的領頭國，例如英、法、美，接著擴散到世界其他地區。\n\
    \n  但是馬克思忘記了資本家也會讀書。一開始確實只有少數幾位弟子認真看待他的理論、仔細閱讀。不過，隨著社會主義的火炬逐漸得到追隨者而壯大，資本家開始有所警覺，也跟著細讀了《資本論》，並採用了馬克思分析時的許多工具和見解。\n\
    \n  到了二十世紀，從街頭的年輕人到各國總統，都接受了馬克思對經濟和歷史的思考方式。就算是最積極抗拒馬克思主義預測的資本主義者，同樣利用了馬克思主義的預測。例如，美國中央情報局分析1960年代越南和智利的情況時，就將當地社會分為不同階級；尼克森或柴契爾夫人考量全球局勢時，也會自問是誰控制了生產的重要工具。從1989年到1991年，老布希總統一路監看共產主義的「邪惡帝國」走向敗亡，卻在1992年總統大選遭到柯林頓擊敗。柯林頓的勝選策略，可以濃縮成他的競選口號：「笨蛋，問題在經濟！」就算是馬克思本人，也沒法說得更好了。\n\
    \n  人們採用了馬克思主義的判斷，也就隨之改變自己的行為。位於英法等國的資本家，開始改善工人待遇，增強他們的民族意識，並讓工人參與政治。因此，當工人開始有權在選舉中投票、工黨在一國又一國陸續取得權力之後，資本家也就繼續高枕無憂了。於是馬克思的預言化為泡影。共產主義革命從未橫掃英、美、法等工業強國，無產階級專政也被掃入歷史的垃圾箱。\n\
    \n  這正是歷史知識的矛盾。知識如果不能改變行為，就沒有絲毫用處。但知識一旦改變了行為，本身就立刻失去意義。我們擁有愈多資料、對歷史瞭解愈深入，歷史的軌跡就改變得愈快，我們的知識也過時得愈快。\n\
    \n## 研究歷史是為了掙脫過去的魔掌\n\n  幾個世紀以前，人類的知識成長緩慢，政治和經濟的改變也彷彿踩著一種悠閒的腳步。到了今日，知識增加的速度飛快，理論上我們應該愈來愈瞭解這個世界。然而情況卻正好相反。各種新知識讓經濟、社會和政治的變化加速；為了瞭解究竟發生什麼事，我們加速蒐集和累積知識，卻只導致動盪更為加速加劇。於是，我們愈來愈無法真正理解現在、或預測未來。\n\
    \n  在1016年，想預測歐洲在1050年的樣貌，可說是相對容易。當然，王朝可能傾圮、不明的外族可能入侵、自然災害可能襲擊；但是很明顯的，歐洲就算走到了1050年，還是會由國王和教士所統治，仍然會是農業社會，大部分居民仍是農民，而且繼續深深受苦於饑荒、瘟疫和戰爭。相較之下，在2016年，我們卻全然不知歐洲在2050年會是什麼樣貌。我們不敢說，到時會有怎樣的政治制度、怎樣的就業市場結構，甚至連到時候人民的身體會是怎樣，都難以預知。\n\
    \n  如果說，歷史就是不會遵循什麼穩定的法則，我們也無法預測歷史未來的走向，那為什麼還要研究歷史？我們常常以為，科學的主要目的就是預測未來：氣象學者要預測明天是晴或雨、經濟學家要判斷貨幣貶值會避免經濟危機或造成市場崩盤、好醫師能預見化療或放射療法能否治癒肺癌。\n\
    \n  同樣的，我們也希望歷史學家去檢視前人的行為，好讓我們善則從之、惡則改之。但實際狀況卻幾乎永遠不是這樣，原因就在於現在和過去的情境實在太不相同了。如果現在去研究漢尼拔將軍在第二次布匿戰爭（西元前218年至西元前201年）的戰術，希望在爆發第三次世界大戰時派上用場，這只是浪費時間。過去在騎兵戰場上很優秀的戰術，用在網路戰並不見得占得了便宜。\n\
    \n  而且，科學並不只是預測未來。各個領域的學者，都希望拓展人類的視野，因此在我們眼前開展的是各種全新而未知的未來。歷史領域特別如此。雖然歷史學家偶爾也會提出預言（但成績相當普通），不過，歷史研究最重要的目的，其實是讓我們意識到一些通常不會考慮的可能。歷史學家研究過去，不是為了要重複過去，而是為了從中解放。\n\
    \n  我們每個人都出生於某個特定的歷史現實，受特定的規範和價值觀所控制，也由獨特的經濟和政治制度來管理。我們都會覺得自己所處的現實是理所當然的，認為這一切誠屬自然、無可避免，也無法改變。但我們忘了世界是由一連串的意外事件所創造，而歷史不僅塑造了我們的科技、政治和社會，也塑造了我們的思想、恐懼和夢想。「過去」從祖先的墳墓裡伸出冰冷的手，掐住我們的頸子，要我們只能看向某個未來的方向。我們從出生那一刻就能感受到這股力量，於是以為這就是自然，以為這是我們不可分割的一部分，也就很少嘗試掙脫，很少想像自己還有其他未來。\n\
    \n  研究歷史，就是為了掙脫過去的魔掌，讓我們能看向各種不同方向，並開始注意到前人無法想像、或過去不希望我們想像的可能性。觀察著讓我們走到現在的一連串意外事件，就能瞭解人類的每個念頭和夢想，是如何落實成形的，接著就能開始以不同的方式來思考，編織出不同的夢想。研究歷史並無法告訴我們該如何選擇，但至少能提供我們更多選項。\n\
    \n  那些希望改變世界的時刻，常常正是起於重新描述歷史、而使得人們能夠重新想像未來。不管你是希望工人發動罷工、女性取回自己身體的自主權、或是受壓迫的少數民族站起來要求政治權利，第一步都是要重述他們的歷史。新的歷史就會告訴他們，「現在的狀況既非自然而然、也不會是永恆不變。過去曾經是另一個樣貌，只是有了一連串的偶然事件，才創造出現在這個不公平的世界。只要我們採取明智的行動，就能改變並創造出更好的世界。」\n\
    \n  正因如此，馬克思主義者才要講述資本主義的歷史，女權主義者才要研究父權社會的形成，非裔美國人才要永遠記住奴隸販運的恐怖。他們的目的不是要延續過去，而是要從過去解放。\n\
    \n## 一段關於草坪的歷史\n\n  發生大規模社會革命的歷史，值得講述與研究；發生在日常生活裡的小事，同樣也值得記述與探究。一對年輕夫婦正在為自己蓋一個新家，要求設計師在前院要規劃一塊漂亮的草坪。為什麼想要一塊草坪？他們或許會說：「因為草坪很漂亮啊。」但他們為什麼會這麼認為呢？這件事背後也有歷史。\n\
    \n  在石器時代，狩獵採集者並不會在洞穴入口種草。如果你參觀雅典衛城、羅馬卡比托利歐神殿山、耶路撒冷猶太聖殿、或是北京紫禁城，都不會發現城殿門口有一片綠油油的草地，來歡迎訪客。\n\
    \n  這種在私人住宅和公共建築前面種植一片草坪的想法，是誕生於中世紀晚期英、法兩國貴族的城堡。到了近代早期，這個習慣已經根深柢固，成了貴族的商標。\n\n\
    \  想要擁有一片漂亮的草坪，除了有地，還得付出許多心力，特別是以前可沒有自動灑水裝置和割草機。而到頭來，草坪並不會產生任何價值，甚至還不能放牛羊吃草，否則草皮就可能被啃禿或踩壞。貧窮的農民負擔不起，絕不可能把寶貴的土地或時間浪費在草坪上。於是，城堡入口處那片完美的草地，就成了無人能造假的身分象徵，威風凜凜的向經過的人宣告：「本人財糧滿倉，威權顯赫，領土農奴無數，區區綠地豈在話下。」\n\
    \n  草坪愈廣闊、修整愈完美，就代表這個家族愈強盛。如果你拜訪一位公爵，卻看到草坪維護不佳，就知道他有麻煩了。51\n\n  往往要等到重要慶典和社交活動，才能用到這些珍貴的草坪，其他時間則是嚴禁染指。就算到了今天，無數的宮殿、政府建築和公共場所前，還是會出現一則嚴厲的告示，命令眾人：「禁止踐踏草皮」。我以前在牛津學院，整個四方院子中間就是一大片美麗誘人的草坪,每年只有一天,允許我們走上去或是坐一坐。至於其他日子裡,如果哪個學生斗膽用腳褻瀆那神聖的草坪,我們就只能為他一聲悲嘆了。\n\
    \n  王室宮殿和公爵的城堡,讓草坪變成一種權力象徵。就算到了近代晚期,王朝傾覆、公爵人頭落地,新掌權的總統和總理還是保留了草坪的傳統。從國會殿堂、最高法院、總統官邸、到其他公共建築,就這麼用一片又一片平整的綠地,宣告著自己的權力。\n\
    \n  同時,草坪也征服了體育界。幾千年來,從冰面到沙漠,人類的運動已經幾乎用過所有可能想像到的地表。但是在過去這兩個世紀,像是足球或網球這種萬眾矚目的比賽,用的都是草地。當然,這是在你有錢的前提下。在里約熱內盧的貧民區,巴西足球的下一代生力軍,還在沙土地上踢著臨時權充的球;但到了富裕的市郊,富人的兒子們則是在精心維護的草皮上,開心玩樂。\n\
    \n### 草坪成了社經地位的指標\n\n  於是,草坪在人們心中成了政治權力、社會地位和經濟實力的象徵。也難怪到了十九世紀,新興中產階級對草坪亦是熱情歡迎。一開始,只有銀行家、律師和企業家能夠負擔在自己的私人住所,布置這樣的奢侈品。但等到工業革命使中產階級擴大,並發明了割草機、自動灑水裝置,數百萬家庭忽然也負擔得起,能夠在自家門口養上一片草坪。於是在美國郊區,平整漂亮的草坪也從富人階級的奢侈品,轉為中產階級的必須。\n\
    \n  在這之後,郊區的禮拜儀式也就多增了一項。星期天早上做完教堂禮拜,很多人就會悉心修剪家門口的草坪。只要沿著街道走一遭，就能從草坪的大小和維護品質，快速判斷每個家庭的財富和地位。想知道隔壁那戶有錢的鄰居，是不是家裡出了問題，再也沒有比「草坪居然沒人管」更明顯的證據了。除了玉米和小麥之外，草就是美國時下最普遍的作物，草坪業（植物、肥料、割草機、灑水設備、園丁）每年產值有數十億美元。52\n\
    \n  對草坪的狂熱，不只是歐洲和美國的現象。就算是從未到過羅亞爾河河谷的人，也看過美國總統在白宮草坪上發表談話，看過重要的足球賽在一片綠茵的足球場上舉行。就連《辛普森家庭》的辛普森和霸子，也會吵著該輪到誰去推草。全球民眾看到草坪，都會聯想到權力、金錢和威望。\n\
    \n  這麼一來，草坪傳播得既遠且廣，現在甚至征服了穆斯林世界的核心。卡達最近新建的伊斯蘭藝術博物館，側邊也有大片草坪，更容易讓人聯想起路易十四的凡爾賽宮，而不是阿拔斯王朝第五代哈里發（伊斯蘭政教合一的領袖）——拉希德（Haroun\
    \ al-Rashid）統治下的巴格達。伊斯蘭藝術博物館由一家美國公司設計及建造，草地面積超過十萬平方公尺，而且可是坐落在阿拉伯沙漠之中，每天需要驚人的淡水量，才能維持翠綠。同時，在卡達首都多哈市和杜拜的郊區，中產階級家庭也以自己的草坪自豪。要不是居民穿戴的那些白色長袍和黑色頭巾，還真可能誤以為身處美國中西部，而不是中東地區。\n\
    \n  瞭解了草坪的簡短歷史，如果現在要設計夢想中的房子，你可能就會再想想，究竟要不要有草坪。當然，你還是可以想要有一片草坪。然而，你也可以選擇甩掉這些從歐洲公爵、大資本家、甚至是辛普森家庭給你的文化負擔，換成日式的枯山水，或是自己全新創造的庭園。\n\
    \n## 第一幕出現的一把槍\n\n  這正是讀歷史最好的理由：不是為了預測未來，而是要將自己從過去中釋放，想像是否可有另一種命運。當然，我們仍不免受到過去的形塑，所以永遠不可能得到完全的自由；然而，部分自由總比全無自由，來得強多了。\n\
    \n  《人類大命運》這本書各章節的預言，都不過是為了討論現下種種困難的抉擇，並邀請讀者共同改變未來。預言人類會試圖得到長生不死、幸福快樂和化身為神，其實和預言民眾蓋房子的時候，門前要有塊草坪，非常類似。這都是很可能發生的趨勢。但只要你大聲把這件事說出來，就會讓你開始考慮其他替代方案。\n\
    \n  要說「人類的夢想就是追求不死和神性」，這件事之所以會讓人覺得驚駭，並不是因為聽起來太過異想天開，反而是因為很少有人把話講得這麼白。但只要真正開始思考這件事，大多數人就會意識到這其實很說得通。雖然這些夢想有它科技上的傲慢，但在思想上早已不是新聞。過去三百年來是由人文主義主導世界，將智人的生命、快樂和能力，加以神聖化。而經過如此長久的人文主義薰陶，人類想要得到不死、幸福和神性，也是相當合乎邏輯的。這只是把早就藏在桌下的事情，公開端上檯面罷了。\n\
    \n  但我還想把另一件東西也端上檯面：一把槍，一把在第一幕出現、將在第三幕發射的槍。下面的章節將討論人文主義（也就是對人類的崇拜）如何征服世界。不過，人文主義的興起，同時也播下滅亡的種子。雖然對人文主義來說，讓人類演化為神，是合乎邏輯的結論，但這同時也暴露了人文主義固有的缺陷。如果最早提出來是一個有缺陷的理想，常常是到了理想即將實現的那一刻，才會赫然發現。\n\
    \n  我們已經可以在老年病房看到這種過程了。正因為人類對於人的生命的神聖，堅信不疑，我們總要盡全力讓人活下去。直到整個生命狀態無比悽慘，我們才不得不問：「這究竟有何神聖？」也因為類似的人文主義信念，我們在二十一世紀可能會讓人類整體，提升到超越其自身限度。同樣的尖端科技，可以讓人演化升級為神，但也可能讓人類這種生物失去意義。舉例來說，如果某天電腦強大到足以瞭解並克服衰老和死亡的機制，電腦也就很有可能強大到足以在任何任務上，取代人類。\n\
    \n  在這長篇大論的第1章〈人類的三大新議題〉，一開始我們曾探討過，二十一世紀的人類新議題可能為何，但實際真正的情況絕對會再複雜許多。目前，我們的前三大新議題似乎是不死、快樂和神性。但只要一接近達成這些目標，所造成的動盪將有可能使我們偏離方向，走向完全不同的目的地。\n\
    \n  本章描述的未來，只是「過去的」未來；換句話說，是基於過去三百年的思想和希望，而指向的未來。然而，真正的未來——基於二十一世紀將誕生的新想法、新希望，而真正打造的未來，可能與「過去的」未來，有完全不同的樣貌。\n\
    \n## 人文主義即將崩解\n\n  為了理解這一切，我們需要再回頭，瞭解智人究竟是怎樣的生物，瞭解人文主義如何成為主導世界的宗教，以及瞭解為什麼實現人文主義的夢想，反而可能導致人文主義的崩解。這就是《人類大命運》這本書內容架構的基本安排。\n\
    \n  《人類大命運》的第一部〈智人征服世界〉，將著眼於智人與其他動物的關係，希望理解我們這個物種究竟有何特別之處。有些讀者可能覺得奇怪，在一本要討論未來的書裡，為什麼要用這麼長的篇幅來談動物？\n\
    \n  在我看來，如果不從我們周遭的動物開始談起，就不可能真正討論到人類的本質及未來。智人竭盡全力想忘掉這件事，但人類仍然就是一種動物。而且，在我們想要把自己變成神的這時刻，回頭看看自己的起源，更加倍重要。要討論人類化身為神的未來之前，不能不談人類身為動物的過去、以及人類與其他動物的關係；原因在於，人類與動物之間的關係如何，很有可能就是未來超人類和人類之間關係的模樣。\n\
    \n  想知道超級聰明的半機械人，可能怎麼對待只是一般血肉之軀的人類嗎？先去看看人類如何對待比較不聰明的動物表兄弟吧。當然，這絕不是完美的類推，但這是我們唯一能夠觀察、而不只是想像的最佳原型。\n\
    \n  根據第一部的結論，《人類大命運》第二部〈智人為世界賦予意義〉將會檢視智人在過去數千年間，創造了怎樣光怪陸離的世界，又是怎樣把我們帶到了現在這個十字路口。智人是怎麼會深信人文主義的信條，以為宇宙是以人類為核心而運轉、人類是所有意義與權力的來源？而這樣的信條又會怎樣影響經濟、社會和政治？如何塑造我們的日常生活、藝術，以及我們最隱祕的欲望？\n\
    \n  《人類大命運》的第三部、也是最後一部〈智人失去控制權〉，則是來到二十一世紀初期。在更瞭解了人類、更瞭解人文主義信條之後，第三部描述的是我們目前的困境，以及可能的未來。為什麼想實現人文主義，反而會導致它的崩潰？追尋不死、快樂和神性，又會怎樣動搖我們對人文主義的信念基礎？有什麼跡象正預示這個災難，又是怎麼反映到我們每天所做的每一個決定？而如果人文主義確實已經難以為繼，有什麼思想可能取而代之？\n\
    \n  本書這第三部，並不只是單純的哲學思考、或是空談未來可能如何，而是仔細審視智慧型手機、約會的做法和就業市場，從蛛絲馬跡中，判斷未來將會如何。\n\n\
    \  對於一心信仰人文主義的人來說，這一切聽起來，似乎十分悲觀，叫人鬱悶。但請別太急著下結論。史上早已見證許多宗教、帝國和文化的起起落落，這樣的起伏動盪並不一定是壞事。\n\
    \n  人文主義主導世界三百年了，但其實這時間並不長。法老王統治埃及達三千年，教皇也統治歐洲有千年之久。如果回到古代法老拉美西斯二世（Ramses II）的時代，告訴某個埃及人，有一天這世上再也沒有法老王，他可能會嚇呆驚傻。「沒有法老王，日子要怎麼過下去？這樣能有誰來維持秩序、和平和正義？」\n\
    \n  如果回到中世紀，告訴當時的人，再過幾個世紀會有人說「上帝已死」，他們肯定會嚇壞了。「沒有上帝，日子要怎麼過下去？這樣能有誰來令我們生活有意義，不會陷入混亂？」\n\
    \n  但回首過去，很多人都會認為法老時代的結束、以及上帝已死的概念，都屬於正面的發展。或許，人文主義的崩解也同樣是件好事。人們之所以害怕改變，是因為害怕未知。但是，歷史最不變的事實，就是一切都會改變！"
