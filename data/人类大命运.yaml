  md: '第3章 人類的獨特之處


    驗意識，而且我們對於痛苦和愛情已經有了非常詳細的生化解釋，不再有主觀經驗的空間。然而心靈與靈魂（以及心靈與神祇）之間，仍然有一個關鍵的差異：要說有永恆存在的靈魂，這完全是臆測；但對於痛苦的經驗，則是非常直接而具體的現實。如果我踩到一枚釘子，我百分之百肯定會感覺到痛苦（就算至今我對此無法提出科學的解釋）。相較之下，如果傷口感染、讓我因為壞疽而喪命，我的靈魂能不能繼續存在，這我就沒有把握了。


    雖然靈魂是個很有趣、也讓人可以鬆一口氣的說法，我也很樂意相信，但我就是無法直接證明它的真實性。像是疼痛和懷疑之類的主觀經驗，因為所有科學家自己也會不斷體驗到，所以他們也無法否認這些經驗的存在。


    另一種試圖拋下心靈和意識概念的做法，則是從否認其關聯性下手，而不是去否認它們的存在。包括丹尼特（Daniel Dennett）和狄漢（Stanislas Dehaene）在內的一些科學家，認為所有相關問題都可以從研究腦部活動來解答，完全用不到主觀經驗的概念。這樣一來，科學家就可再也不要用到「心靈」、「意識」、「主觀經驗」這幾個詞彙了。


    然而我們從以下的章節就會看到，現代政治和道德就是建築在主觀經驗的概念上，而且一旦講到各種道德上的困境，很難光用腦部活動的說法來圓滿解決。舉例來說，虐待或強姦有什麼錯？如果從純粹的神經學角度來看，一個人遭到虐待或強姦，不過是腦中出現某些生化反應，某些電訊號從一些神經元傳到另一些神經元，如此而已。這有什麼大不了的？


    大多數現代人之所以對虐待和強姦有道德上的質疑，正是因為裡面牽涉到主觀經驗。如果哪個科學家說主觀經驗無關緊要，他們


    131'
