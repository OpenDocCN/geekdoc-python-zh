    # 如果滿街都是無人駕駛車


    我們該回想一下，馬匹在工業革命後走向怎樣的命運。隨便一匹農場上的馬，不論是在嗅覺、愛的能力、認人的能力、跳過柵欄的能力、或是其他上千項的事情，絕對都遠高於史上首款平民汽車福特T型車、或是價值百萬美元的藍寶堅尼跑車。然而，馬匹仍然遭到汽車取代，原因就在於：汽車在社會真正需要的那少數幾項領域勝出。計程車司機很有可能也會走上馬匹這條路。


    事實上，如果不僅是計程車、而是規定所有車輛都不得由人駕駛，並將整個交通控制權交給電腦演算法，就能將所有車輛連接成單一網路，大大降低車禍發生率。


    2015年8月，谷歌實驗中的無人自動車發生車禍。當時這輛車正接近一個十字路口，發現有位行人想過馬路，於是煞了車。但接著這輛車就遭到後方來車追撞，後面那輛車的人類駕駛心不在焉，可能正思索著宇宙的奧祕，結果就忘了看路。如果兩輛車都是由互相連結的電腦來指揮，這種事就不可能發生。控制駕駛的演算法，能夠清楚掌握每輛車在路上的位置和意圖，絕不可能允許自己操縱的兩輛車就這樣相撞。如果能有這樣的系統，就能大幅節省時間金錢，並且拯救人命；只不過，這也會消滅人類開車的經驗，以及幾千萬人的工作機會。⁴


