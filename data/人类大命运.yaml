  md: '# 中國究竟相信什麼主義？


    方，特別是在拉丁美洲、南亞和非洲。雖然也有某些自由主義的實驗徹底失敗，但成功案例的數量已足以令人嘆服。像是印尼、奈及利亞和智利，雖然曾由軍事強人統治數十年，但現在都是以民主政體運作。


    如果有個自由主義者在1914年6月沉沉睡去，直到2014年6月才醒來，大概還是會覺得十分自在。我們又再一次相信，只要讓每個人擁有更多的自由，世界就能和平繁榮。整個二十世紀看起來就像是犯了一個大錯。


    回到1914年的春天，人類在自由主義這條公路上奔馳，卻轉錯了彎、進了死路。要再過了八十年、經歷三次駭人的全球戰爭，我們才終於又回到公路上。當然，這幾十年並不是全然的浪費；我們還是得到了抗生素、核能、電腦，還有女性主義、去殖民主義，以及性解放。此外，自由主義本身在經驗中受傷之後，也不再像一個世紀前那麼自負。它向社會主義和法西斯主義這些對手，學來各種想法和制度，特別是承諾向大眾提供教育、衛生和福利服務。


    但驚人的是，自由主義的核心思想幾乎沒有什麼改變，仍然尊重個人自由，也仍然堅信選民最清楚、顧客永遠是對的。在二十一世紀初期，自由主義也成了我們唯一的選項。


    到了2016年，除了由個人主義、人權、民主、自由市場所組成的自由人文主義套裝方案之外，我們似乎沒有什麼真正值得考慮的替代方案。


