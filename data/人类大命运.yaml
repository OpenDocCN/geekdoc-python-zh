    母豬一切生存和繁衍的需要,都由畜牧場的人提供,包括足夠的食物、抵抗疾病的疫苗、遮風蔽雨的保護,另外還有人工授精。客觀來看,母豬再也不需要去探索周遭、與其他豬社交、與小豬有任何情感連結,甚至連走路都沒有必要。但從主觀而言,母豬仍然會對這些事情感受到極強烈的欲望,未能滿足則痛苦萬分。關在狹欄裡的母豬,通常都會有嚴重的挫折和絕望症狀交替出現。15


