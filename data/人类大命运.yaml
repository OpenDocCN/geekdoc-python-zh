  md: '# 三種主義，三種觀點


    社會主義的看法，大概有一點也和自由主義相同，也就是認為狼的經驗並沒有價值。


    但講到另外三種經驗，社會主義的態度就大不相同了。社會主義的虔誠信徒會認為：音樂的真正價值並不在於個別傾聽者的經驗，而在於對他人及社會整體的影響。毛澤東就曾經說：「為藝術的藝術，超階級的藝術，和政治並行或互相獨立的藝術，實際上是不存在的。」12


    因此，要評價音樂經驗的時候，社會主義注意的地方會是：貝多芬是在歐洲即將進軍征服非洲時，為歐洲白人上層階級寫出第五號《命運交響曲》。這首交響曲反映了啟蒙時代的理想，推崇上層階級的白人，並將征服非洲正當化，認為是「白人應承擔的負擔」。


    而社會主義講到搖滾樂，會提的是：這種音樂乃是由受壓迫的非裔美籍音樂家所開創，靈感來自藍調、爵士和福音歌曲等音樂。但是在1950和1960年代，搖滾樂遭到主流白人美國劫持，被迫服務消費主義、美國帝國主義、以及可口可樂殖民主義。於是搖滾樂被商業化，被享有特權的白人青少年挪用到他們那種小資產階級幻想中的叛亂。查克·貝瑞自己就向資本主義屈服了，他原本的歌詞是「一個名為Johnny
    B. Goode的有色男孩」，但卻在白人電臺的壓力下，改為「一個名為Johnny B. Goode的鄉下男孩」。


    至於剛果矮人族女孩合唱的成年曲，社會主義也會批判：這正是父權結構的一部分，同時對男女兩性洗腦，讓他們遵循壓抑的性別秩序。如果這種歌進了全球市場，則又只是用來加強西方對整個非洲的殖民幻想，特別是對非洲女性。'
