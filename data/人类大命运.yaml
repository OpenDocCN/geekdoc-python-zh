    不僅能控制大鼠左轉或右轉，還能控制牠爬梯子、用嗅覺查探垃圾堆，以及做些大鼠通常不愛做的事情，例如從高處一躍而下。軍方和民間企業都對半機械鼠大感興趣，覺得在許多任務和情境都能派上用場，像是找出炸彈和詭雷，尋找倒塌建物下的受困倖存者，或是畫出地下隧道和洞穴的路線圖。


    動物福利團體提出關切，擔心這些實驗會對大鼠造成痛苦。但紐約州立大學半機械鼠研究先驅塔瓦（Sanjiv Talwar）教授，認為這些擔心是多餘的，大鼠其實很享受這些實驗。他解釋道，這些大鼠「工作是得到愉悅」，每次電極刺激牠們大腦的報償中心，「大鼠會覺得彷彿登上極樂」。³


    就我們所知，這些大鼠並不覺得受人控制，也不覺得做了什麼違背自己意志的事。塔瓦教授按下遙控器，是讓大鼠自己想要往左走，於是牠就往左走。塔瓦教授按另一個開關，是讓大鼠想要爬梯子，於是牠就爬了梯子。畢竟，欲望也只是神經元的某種觸發模式而已。至於神經元觸發的原因，究竟是因為其他神經元的刺激或是塔瓦教授遙控器控制電極的刺激，真有那麼重要嗎？如果你去問問那隻大鼠，牠可能會告訴你「我當然有自由意志啊！你看，是我想要左轉，所以我就左轉了。是我想爬梯子，所以我就爬了。這不就證明了我有自由意志嗎？」


