    # 作者簡介


    # 哈拉瑞


    # Yuval Noah Harari


    任教於耶路撒冷希伯來大學歷史系，全球矚目的新銳歷史學家。


    1976年出生於以色列海法，2002年在牛津大學獲得博士學位。


    哈拉瑞視野恢弘，博學多聞，


    雖身為人文歷史學者，亦深研考古人類學、生態學、基因學等硬科學。


    《人類大歷史》是他第一本震撼全球的巨著，2012年以希伯來文出版，


    在以色列成為暢銷書之後，陸續譯成23種語文，


    全球熱銷，成為臉書創辦人祖克柏2015年度選書，


    比爾·蓋茲2016年夏季五本推薦書之一，


    美國總統歐巴馬更於2016年9月在CNN特別推薦。


    在臺灣，《人類大歷史》獲得博客來網路書店2014年9月選書、


    2015年國家文官學院「每月一書」、


    2016年第八屆吳大猷科學普及著作獎翻譯類金籤獎。


    哈拉瑞的世界史講座系列影片，已被放上YouTube。


    《人類大命運》是他的第二本巨著。


    # 譯者簡介


    # 林俊宏


    師範大學翻譯研究所碩士。


    喜好電影、音樂、閱讀、閒晃，覺得把話講清楚比什麼都重要。


