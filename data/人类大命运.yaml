    來。而在「長」階段的實驗中，受試者的手會放在另一個容器中，水溫同樣是14°C；但在六十秒後，會偷偷將熱水導進容器，使水溫略升為15°C；三十秒後，再請他們把手抽回來。有些受試者會先做「短」版的實驗，也有些是從「長」版的實驗開始。但不論哪種，都會在兩個部分都結束的七分鐘後，進行第三階段、也是最重要階段的實驗。研究人員告知受試者，他們必須重複前兩階段的其中之一，但他們可以自由選擇。足足有80%的人選擇了「長」版實驗，在印象中以為這比較不那麼痛苦。


    這個冷水實驗如此簡單，透露的意義卻動搖了整個自由主義世界觀的核心。實驗告訴我們，人體內至少有兩種自我：經驗自我（experiencing self）及敘事自我（narrating
    self）。


    經驗自我是我們每時每刻的意識。所以對於經驗自我來說，顯然「長」版的實驗比較糟。因為你得先忍受14°C的水溫、達六十秒（「短」版實驗受的苦，在這裡一點也少不了），這已經很難忍受了，接下來你還得再忍受另外三十秒、15°C的水溫，雖然情況勉強好一點，但絕對也不愉快。對於經驗自我來說，在一個非常不愉快的經驗後，再加上另一個仍然不愉快的經驗，並不會讓整件事變得比較愉快一些。


