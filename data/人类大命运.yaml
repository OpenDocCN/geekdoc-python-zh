  md: '# 意識是大腦製造出來的副產品？


    如果我們硬是無法解釋心靈、也不知道它有什麼功能，為什麼不乾脆放棄這個概念呢？在科學史上，早有太多概念和理論遭棄而不用。例如，現代早期的物理學家想解釋光的移動，就設想有一種稱為以太（ether）的物質充滿整個世界，而光則是以太的波動。但是物理學家一直沒能找到任何實證，可證明以太存在，反而是找到其他更能解釋光的理論。因此，以太的概念就被丟進科學的垃圾堆裡了。


    同樣的，幾千年來人類曾經用「神」來解釋許多自然現象。為什麼會閃電？因為神。為什麼會下雨？因為神。地球上的生命是怎麼來的？神創造的。但在過去幾個世紀裡，科學家並沒有找到任何實證可證明神存在，反而是對閃電、下雨和生命的起源，有了更詳細的解釋。因此，現在除了在幾個哲學的子領域之外，經過同儕審查的自然科學期刊和社會科學期刊上，已經不會出現真心相信神祇存在的學術論文了。歷史學家不會說同盟國是因為有神相助，才贏得第二次世界大戰；經濟學家不會認為是上帝造成1929年的經濟大蕭條；地質學家也不會說板塊運動是神的旨意。


    「靈魂」這個概念也是如此。千百年來，我們相信自己所有的行為決定都是出自於靈魂。但因為找不到任何支持的證據，而且又出現了其他更詳細的理論，所以生命科學已經拋棄了靈魂的概念。就個人而言，許多生物學家和醫師仍然可能相信靈魂的概念，但他們絕對不會在嚴肅的科學期刊以此為題。


