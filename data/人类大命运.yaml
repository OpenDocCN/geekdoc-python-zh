    廠工人或農夫比？我也想過電視上那種有錢人的生活啊，或者至少是住郊區那種高級住宅啊。」


    同樣的，如果你到了2070年去告訴下層階級，他們享有的醫療保健已經比2017年好得多，對他們來說實在算不上半點安慰。因為他們心中的比較對象會是那些經過升級、主導世界的超人類。


    此外，就算會有許多醫療突破，我們仍然無法肯定貧窮人口到了2070年，一定能享有比今天更好的醫療保健，因為國家體制和精英階級可能根本不想再為窮人，提供充足的醫療保健服務。醫藥之所以能在二十世紀使群眾得益，是因為二十世紀是群眾的時代。二十世紀的軍隊需要幾百萬名健康的士兵，產業也需要幾百萬名健康的工人。因此，各國都建立起公共衛生服務體系，以確保國民的活力和健康。人類最大的醫療成就，正是為民眾提供衛生設施、疫苗接種和消滅流行病。1914年，日本精英階級之所以願意為貧民接種疫苗、在貧民區興建醫院、打造汙水處理系統，正是因為如果希望日本成為軍事和經濟強權，就需要數百萬名健康的士兵和工人。


    但這種群眾的時代可能已經結束，而針對大眾的醫學也將隨之走入歷史。隨著人類士兵和工人讓位給演算法，至少部分精英階級會認為，無須再浪費資源為大量無用的窮人提升、甚至是維持基本的健康水準，而該集中資源，讓極少數人升級到超人類的等級。


    今天，日韓等科技先進國家的出生率逐漸下滑，兒童人數逐漸減少，但這些國家卻是投注無比的心力，進行教養。反觀印度、巴西或奈及利亞這種人口眾多的發展中國家，是要怎麼跟日本競爭？這些國家就像一列長長的火車。頭等車廂的精英，享有與世界上最發達國家同等的醫療保健、教育和收入水準。但還有為數幾億的一般國民，坐在三等車廂，苦於疾病、無知和貧窮。


