    這種威脅,影響的不僅是家醫科,就連專科醫師也無法倖免。而且事實上,鑽研於相對專精領域的醫師(如癌症診斷),可能還更容易遭取代。最近一項實驗中,電腦演算法能夠正確診斷90%的肺癌病例,但人類醫師的正確率卻只有50%。8所謂的未來,其實已經降臨。目前,用專門演算法處理電腦斷層(CT)掃描和乳房攝影檢查已是常規,不僅能夠為醫師提供第二意見(second
