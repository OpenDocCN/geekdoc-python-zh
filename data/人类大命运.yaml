  md: '想像，認為民主和自由市場之所以獲勝，是因為它們比較「好」。但事實上，它們之所以勝出，是因為改善了全球資料處理系統。


    於是在過去的七萬年間，人類就是先擴散，再分成不同群體，最後再次合併。但合併並不代表一切回到原點。過去的多元族群融入今天的地球村時，各自都帶著思想、工具和行為上的獨特傳承，呈現一路走來的蒐集與發展。在我們現代的食品櫃裡，就有中東的小麥、南美洲安地斯地區的馬鈴薯、新幾內亞的糖，以及衣索比亞的咖啡。同樣的，我們的語言、宗教、音樂和政治，也充滿著來自地球各地的傳世寶藏。⁵


    如果人類整體就是單一的資料處理系統，它的產出是什麼？數據主義會說，它的產出會是一套全新、效率更高的資料處理系統，稱為萬物互聯網（Internet-of-All-Things）。只要這個任務完成，智人就會功成身退。


    # 數據主義帶來全新價值觀：資訊自由


    一如資本主義，數據主義一開始也是個中立的科學理論，但正慢慢成為要判別是非的宗教。對這個新宗教來說，最高的價值就是資訊流通。如果生命就是資訊的流動，而我們又認為生命是好的，下一步就是該讓全宇宙的資訊流得更廣、更深。數據主義認為，人類的經驗並不神聖，智人並非造物的巔峰之作，也不是未來神人的前身。人類只是創造萬物互聯網的工具而已，而萬物互聯網可能從地球這個行星向外擴張，擴展到整個星系、甚至整個宇宙。這個宇宙資料處理系統將會如同上帝，無所不在、操控一切，而人類注定將會併入系統之中。'
  merge: -1
  pgno: 431
- img_proc: true
  md: '這種概念讓人回想起某些傳統宗教願景，像是印度教相信人類能夠、也應該融入整個宇宙共有的靈魂，也就是「梵」（atman）的概念；基督徒則相信，聖人死後會充滿上帝的無限恩典，而罪人則是切斷了與上帝的連結。事實上在矽谷，數據主義的先知正是刻意運用傳統上的各種救世說詞。例如庫茲威爾（見第30頁）的預言書就叫做《奇點近了》（The
    Singularity is Near），呼應著施洗約翰的呼喊：「天國近了」（〈馬太福音〉第3章第2節）。


    數據主義告訴那些還崇拜著血肉之軀的人：你們已經太依賴一種過時的科技了，智人就是個該淘汰的演算法。這麼說吧，人類有什麼贏過雞的地方呢？唯一的一點，就是人類的資訊流通模式比雞複雜得多。人類能夠吸收更多資料數據，處理資訊的演算法也比雞更為優秀。（如果用人話來說，也就是說人類有更深的情感、更高的智力。但請別忘記，就現在的生物科學看來，情感和智力也不過都是演算法罷了。）這樣一來，如果我們創造出某個資料處理系統，能夠吸收比人類更多的資料數據，處理資訊的演算法也比人類更為優秀，是不是這個系統就能贏過人，正如人類贏過了雞？


    數據主義不只是空談理論，而是像每個宗教一樣擁有實際的誡命。最重要的第一條誡命，就是數據主義要連結愈來愈多的媒介，產生和使用愈來愈多的資訊，讓資料流最大化。數據主義也像其他成功的宗教，有其傳道使命。它的第二條誡命，就是要把一切連結到系統，就連那些不想加入的異端也不能例外。而且這裡指的一切並不只是人，而真的是一切事物。人類的身體自然不在話下，但另外還包括街上的車、廚房裡的冰箱、雞舍裡的雞、樹林裡的樹，一切都要連結到萬物互聯網上。以後，冰箱就會監看雞蛋還剩幾顆，並在需要補貨時，自動通知雞舍。汽車能夠互相交談，樹木則會報'
  merge: -1
  pgno: 432
- img_proc: true
  md: '告天氣和二氧化碳含量。我們不會容許宇宙的任何部分與這個偉大的生命網路分開，如果有人斗膽阻礙資料的流通，就是犯下了最大的罪。因為，資訊若不再流通，與死亡又有何異？因此對數據主義來說，「資訊自由」就是最高的善。


    人類很少真正能夠想出全新的價值觀。回首上次已經是十八世紀，人文主義革命開始宣揚人類自由、人類平等、人類博愛這種種令人激動的理想。而自1789年以來，雖然也有許多戰爭、革命和動盪，人類卻並未想出什麼新的價值觀。後來的各種衝突及鬥爭，都是以自由、平等、博愛這三種人文主義價值觀為名，或者基於更早的價值觀，例如要服從上帝、服侍國家。數據主義是自1789年以來第一個真正創造新價值觀的運動，這個新價值觀就是「資訊自由」。


    要注意的是，新的「資訊自由」與過去自由主義所談的「言論自由」不能混為一談。言論自由所賦予的對象是人，保護的是人類思考及說出自己心中所想的權利，當然也保護他們緘默、把想法放在心中的權利。相較之下，資訊自由所賦予的對象並非人類，而是資訊。而且在這種新價值觀看來，資訊自由流通的權利應該高於人類擁有並限制資料流通的權利，因此「資訊自由」甚至可能侵犯到人類傳統的言論自由。


    2013年1月11日，數據主義新科技宗教出現了第一位殉道者：史瓦茲（Aaron Swartz）。這位二十六歲的美國駭客，在自家公寓自殺身亡。史瓦茲是個不世出的天才，十四歲就協同開發出了關鍵的RSS（Really
    Simple Syndication，極簡同步散播、或稱簡易供稿系統）通訊協定。他也是資訊自由的堅定信徒，曾在2008年發表〈開放存取游擊宣言〉（Guerilla
    Open Access Manifesto），呼籲應讓資訊流完全自由、不加限制。史瓦茲在宣言中表示：「無論現在資訊儲存在'
  merge: -1
  pgno: 433
- img_proc: true
  md: '何處，我們都必須能取得這些資訊、複製、與全世界分享。我們必須蒐集沒有版權限制的內容，並將這些內容建檔加入。我們必須購入那些未公開的資料庫內容，將內容公開在網上。我們必須下載科學期刊內容，上傳到文件共享網路。我們必須為了開放存取，如游擊隊般奮戰。」


    史瓦茲說到做到。譬如使用者必須向期刊資料庫JSTOR付費，才能取得論文，就讓他十分惱火。JSTOR資料庫有數百萬份科學論文和研究成果，JSTOR完全支持科學家和期刊編輯應當享有言論自由，包括支持「這些人認為想讀文章就該付錢」的自由。JSTOR認為，在我研究創造出某種想法之後，如果想以此獲得部分報酬，應該是我的權利。但是史瓦茲可不這麼想。他相信資訊也想要自由，他認為這些想法並不屬於創造它們的人，把資訊鎖在牆後而必須收費才能觀看的做法是錯誤的。於是，史瓦茲用了麻省理工學院的電腦網路存取JSTOR，下載了數十萬份科學論文，打算全部公開到網際網路上，讓人人自由閱讀。


    史瓦茲遭到逮捕，被送上法庭。在他知道自己可能遭到定罪入獄之後，便上吊自殺。對於控告史瓦茲、侵犯資訊自由的學術機構和政府機關，駭客族群發動了各種請願和攻擊。在壓力下，JSTOR對自己在這起悲劇中的角色表示歉意，並開放許多（但仍非全部）資料內容，供免費使用。⁶


    # 資訊自由好處多


    為了說服那些還在懷疑的人，數據主義的傳教士一再解釋，資訊自由有多大的好處。就像是資本主義相信一切的善都來自經濟成'
  merge: -1
  pgno: 434
- img_proc: true
  md: '人類大命運


