    # 宗教不等於迷信


    之所以會誤解科學和宗教的關係，多半是由於對宗教有錯誤的認知。人們常誤以為宗教就是迷信、靈性、相信超自然力量、或是崇拜神祇。但宗教並不是這些概念。宗教並不等於迷信，因為大多數人都不可能把自己最相信的事稱為迷信。自己相信的，一定是「真理」；只有別人相信的，才會是「迷信」。


    同樣的，也很少有人認為自己相信的是超自然力量。對那些相信惡魔、神靈、精靈的人來說，絕不會認為這些是「超自然」，而會認為這些都是大自然的一部分，與豪豬、蠍子和細菌並沒有兩樣。像是疾病這件事，現代醫師歸咎於看不見的細菌，巫毒祭司則歸咎於看不見的神靈——這沒什麼超自然的：如果你讓某個神靈生氣了，祂就會進到你的身體裡，讓你痛苦萬分。這豈不是再自然不過？只有不相信神靈的人，才會覺得這些事情超出自然的秩序。


    如果你說宗教就是信仰超自然的力量，那等於是說：你認為自


