  md: '人類大命運


    是有農民種小麥、有工人做衣服，再有顧客買麵包和衣服。但是在專家眼中，經濟的機制就是要蒐集關於欲望和能力的資料數據，再轉化為決策。


    根據這種觀點，自由市場資本主義和國家集權控制的共產主義就不是意識型態、倫理教條或政治制度上的競爭，而根本是不同資料處理系統之間的競爭。資本主義採用分散式處理，而共產主義則是集中式處理。資本主義的資料處理，是讓所有的生產者和消費者直接相連，並允許他們自由交換資訊、獨立做出決定。自由市場上的麵包價格如何決定？每家麵包店愛做多少就做多少，訂價愛訂多高就訂多高。顧客只要能夠負擔，一樣可以愛買多少就買多少，又或是改去找其他麵包店。一根長棍麵包收一千美元並不犯法，只是大概沒人會買。


    讓我們把規模放大，假設投資者預測麵包需求將增加，就會買入研發高產量基改小麥的生物科技公司股份。資金流入，該公司就能加速研究，更快提供更多小麥，以避免麵包短缺。就算哪家生物科技大廠用錯理論、走進死路，也可能有競爭對手達成這項突破。因此，自由市場資本主義是將分析資料和做決定的工作分散下去，交給許多各自獨立但又相互連結的處理器。正如奧地利經濟學家海耶克（Friedrich
    Hayek）所詮釋的：「在一個把相關事實的知識分散給許多人的系統中，可以靠價格來協調不同人各自的獨立行動。」²


    根據這個觀點，證券交易所正是人類至今所創最快、最有效的資料處理系統。它歡迎每個人都來共襄盛舉，可以是直接加入、或是透過銀行或退休基金。證券交易所推動著全球經濟，不論是全球各個角落、甚至外太空發生的事情，無不納入考量。不管是科學實驗成功、日本傳出政治醜聞、冰島火山爆發，甚至太陽表面有不規


