    機化合物所組成。然而，現在人類正準備用「智慧設計」（intelligent design）取代天擇，將生命形式從有機延伸進入無機的領域。


    就算不管未來，只談過去七萬年，仍然清楚可見：人類世讓全球起了前所未有的改變。隕石、板塊運動和氣候變遷，雖然也可能影響全球生物，但對每個地區的影響有所不同。地球從來就不是單一的生態系，而是由許多彼此稍有連結的小生態系所組成。板塊運動讓北美洲與南美洲相連，造成南美大多數有袋動物從此滅絕，不過這件事並未影響到澳洲的袋鼠。兩萬年前最後一次冰河期達到高峰，當時在波斯灣和東京灣的水母都得適應新的氣候，但因為兩種族群沒有連結，各自因應新氣候之後，就往不同的方向演化了。


