- img_proc: true
  md: '不是因為大腦發展得更大了(事實上,現代人的大腦似乎還小了一些);¹⁸我們征服世界的關鍵因素,其實是在於能夠讓許多人類團結起來的能力。¹⁹如今人類完全主宰地球,並不是因為單一人類比單一的黑猩猩或狼更聰明、或是手指更靈巧,而是地球上只有智人這個物種,能夠大規模而靈活的合作。智力和工具製造當然非常重要,但如果人類還沒學會如何大規模靈活合作,即便大腦再聰明、手指再靈巧,現在仍然是在敲燧石,而不是撞擊鈾原子!


    只不過,譬如螞蟻和蜜蜂,早在人類之前幾百萬年,就已經學會了集體合作,為什麼沒能早早統治人類?原因在於牠們的合作缺乏靈活性。蜜蜂的合作方式雖然非常複雜巧妙,但牠們無法在一夜之間徹底改造其社會制度。舉個例子,如果蜂巢面臨突如其來的威脅或機會,蜜蜂並沒有辦法把蜂后送上斷頭臺,改制為蜜蜂民國。


    至於大象、黑猩猩這種有社交能力的哺乳動物,雖然合作起來比蜜蜂更靈活,但牠們的朋友與家人數量都太少。牠們的合作是以彼此認識為基礎——如果你我都是黑猩猩,而我想跟你合作,就必須真的認識你,知道你是怎樣的黑猩猩:你究竟是猩格高尚、還是猩品低落?如果我不認識你,怎麼可能跟你合作?據我們所知,只有智人能夠與無數陌生個體,進行非常靈活的合作。正是這種實際具體的能力,說明了為何目前是由人類主控地球,而不是什麼永恆的靈魂、或是獨有的意識。


