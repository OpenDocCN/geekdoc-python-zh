    # 科學不是萬靈丹


    突已無可避免。拉比的幸運之處，在於羅馬人為了敉平猶太戰爭（Great Jewish Revolt），於西元70年一把火燒毀了耶路撒冷及聖殿。聖殿成了斷垣頹瓦，祭司家族剎時失去了宗教權威與經濟權力基礎，甚至失去了根本的存在理由。


    以猶太教聖殿、祭司和英勇戰士為特點的傳統猶太教，從此消失於史上。取而代之的，是一個以書籍、拉比和細心學者為特點的新猶太教。學者的強項在於詮釋，而運用這種能力，他們不只能解釋為何全能的上帝允許自己的聖殿遭毀滅，還能說出一套大道理，解釋為何《聖經》故事裡的舊猶太教與當時的猶太教大不相同。5


    因此，從目前最科學的證據來看，《利未記》裡反對同性戀的看法，反映的不過是古代耶路撒冷幾個祭司和學者的偏見。雖然科學無法判斷人類究竟是否應該服從上帝的旨意，但對於《聖經》的源頭就有許多話可說。如果烏干達的政客認為，只要兩個男人在一起找了樂子，創造出宇宙、銀河和黑洞的那股力量就會因此震怒，這時科學就能派上用場，駁斥這個實在沒道理的念頭。


    事實上，要分辨倫理判斷與事實聲明，並不總是那麼容易。宗教就是有一種麻煩的傾向，喜歡將事實聲明轉化為倫理判斷，使得原本應該很簡單的爭議，變得混沌而模糊。例如，原本只該是事實聲明的「《聖經》是由上帝所著」，就常常成為倫理上的禁令：「你應該要相信《聖經》是由上帝所著」。於是，不分青紅皂白的相信某項事實聲明，就成了美德；而懷疑這項聲明，則成了罪過。


    相對的，倫理判斷之中，卻又往往隱藏著事實聲明，支持者不'
