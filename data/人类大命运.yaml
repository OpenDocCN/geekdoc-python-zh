  md: '在中世紀，每當爆發瘟疫，人們只能淚眼望天，祈求上帝原諒他們的罪過。而現在，如果民眾聽說又有了什麼致命的新流行病，則是立刻拿起手機，趕快打給股票經紀商。對於證券交易所來說，流行病也是商機。


    如果有夠多人創業成功，民眾對未來的信任也就會增加。信用擴張，利率下降，企業家更容易募資，於是經濟成長。因此，民眾對未來更加信任，經濟繼續成長，科學也隨之進步。


    這件事說來容易。如果真那麼簡單，又為什麼得等到現代，經濟成長才終於啟動？幾千年來，人類之所以不相信未來會成長，不是因為前人太過愚魯，而是因為這根本違反直覺、違反演化經驗、違反世界運作的方式。自然系統多半是呈現平衡狀態，而且生存之爭又多半是零和賽局，有一方蓬勃成長，就必有另一方付出代價。


    舉例來說，在某個山谷裡，每年長出的草量都差不多。這些青草能夠養活大約一萬隻兔子，而這些兔子裡動作慢、腦袋笨或運氣差的，又差不多能養活一百隻狐狸。如果某隻狐狸特別聰明努力，吃掉的兔子比較多，就有其他狐狸可能餓死。而如果所有狐狸都忽然比以前更會抓兔子，兔群數量將會大減，但隔年就會有更多狐狸餓死。就算這個「兔子市場」偶有波動，但長遠來看，狐狸絕不會期望每年都能成長3%的獵兔量。


    當然，真正的生態系更為複雜，並非所有生存之爭都是零和賽局。許多動物能合作愉快，甚至有些還有貸款機制。自然界最著名的例子就是吸血蝙蝠。這些蝙蝠成千上萬住在洞穴裡，每天晚上飛出來找尋獵物。只要發現有鳥類睡著、或是哺乳動物心不在焉，牠們就會在獵物的皮膚上切出一個小口，吸血為食。然而，不是每隻吸血蝙蝠每天晚上都能找到受害者。為了應付這種生命裡的不確'
