    不論是希羅多德（Herodotus）或修昔底德（Thucydides）這些希臘歷史學家，或是像司馬遷這些中國歷史學家，都已經發展出非常精緻的史觀，與今日的現代觀點極為類似。他們認為，之所以會爆發戰爭和革命，是由於無數的政治、社會和經濟因素所導致。人有可能完全沒犯下任何錯，卻仍然成為戰爭的受害者。因為具有這樣的史觀，所以希羅多德才會對波斯政治深感興趣，而司馬遷也極為重視蠻夷文化和宗教。7


    現代學者多半會同意希羅多德和司馬遷的史觀與見解，而不是同意《聖經》的世界觀。正因如此，所有現代國家都會投入大批心力，蒐集關於其他國家的情資，並分析全球生態、政治和經濟趨勢。於是，在美國經濟表現不佳的時候，就連福音派的共和黨人，偶爾也是把錯怪到中國頭上，而不是懺悔自己的罪。


    然而，即便希羅多德和修昔底德比《聖經》的作者群更瞭解現實，但這兩種世界觀一發生衝突，《聖經》卻將敵手一擊倒地。最後是希臘人採用了猶太人的史觀，而不是猶太人接受希臘人的史觀。從修昔底德的時代又過了一千年之後，希臘人反而變得相信，如果有蠻族入侵，肯定是神在懲罰自己的罪行。不管《聖經》的世界觀錯得多麼離譜，卻能為人類大規模合作，提供更好的基礎。


    就算到了今天，美國總統宣誓就職的時候，手也是要放在《聖經》上面。同樣的，包括英美在內的許多國家，證人上法庭作證，也會把手放在《聖經》上面，發誓說出事實、完整的事實、也唯有事實。然而，發這個誓的時候，所憑依的書裡竟是充滿虛構、神話和謬誤，豈不諷刺？


