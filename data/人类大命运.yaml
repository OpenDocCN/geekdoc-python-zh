    # 愛滋不再滋長


    在過去幾十年間，或許愛滋病的應對，可說是最大的一場醫療失靈。但就算是這場悲劇，現在看來，仍可說是進步的象徵。


    自從1980年代初，愛滋疫情首次大爆發，已有超過三千萬人因而喪生，另外還有幾千萬人深受身心煎熬。愛滋病這種新傳染病特別狡猾，很難摸清頭緒、對症下藥。如果感染天花，病人幾天之內就會喪命，但HIV（人類免疫不全症病毒）陽性的病人，卻可能有長達數週、甚至數月的空窗期，表面看來健健康康，卻可能在不知情的狀況下，繼續感染他人。


    此外，HIV本身並不會致人於死，而是會破壞免疫系統，進而使病人遭受其他疾病的威脅。真正殺死愛滋病人的，其實是這些繼發疾病。因此，在愛滋病開始蔓延的時候，大家很難弄清楚究竟是怎麼回事。像是在1981年，紐約一家醫院收到兩名愛滋病人，一名死於肺炎，另一名則死於癌症，當時完全看不出來這兩位其實都是HIV的受害者，感染的時間可能只有幾個月，也可能長達數年。16


    儘管面對這種種困難，但在醫學界意識到這種神祕的新傳染病之後，只花了短短兩年，就抓出這種病毒，瞭解其傳播方式，並提出有效抑制疫情的方法。再過十年，新推出的藥物就已經讓感染愛滋病從必死無疑，轉成一種慢性病（至少對那些夠有錢、能夠負擔治療費用的人來說）。17


    想想看，如果愛滋病的爆發不是在1981年，而是在1581年，情況將會如何？當時很有可能完全找不出疫情的源頭，不知道愛滋病是如何傳染，也不知道應該如何抑制，更不用說如何治癒了。在這種情況下，愛滋病致死的人口比例，很有可能遠高於現在，而與'
