    人腦，就能在受測者自己有所感覺之前，預測他們會有什麼欲望、做出什麼決定。在一項此類實驗中，請受試者躺進一部巨大的腦部掃描儀，兩手各拿一只開關，隨時想按就可以按下任何一個開關。科學家只要觀察大腦神經活動，就能預測受試者會按哪個開關，而且時間甚至比受試者自己感覺到想按開關還更早。在人類感覺到自己做某項決定前，大腦已經啟動了指示人類決定的神經事件，時間大約是在幾百毫秒到幾秒之前。2


    決定要按下右邊或左邊的開關，反映的當然是這位受試者的選擇，但不能說是個「自由選擇」。我們對自由的信念，背後其實來自一套錯誤的邏輯。當一連串的生化反應讓我想按右邊的開關時，我確實覺得自己想按右邊的開關。一點沒錯，我確實想按。但有人就一下跳到結論，認為這種想按的念頭，就叫做自己的選擇。這當然是錯誤的解讀，因為人的欲望不是一種選擇，我們只能感覺到自己的欲望，再據以行事。


    但就算是科學家，現在也常使用「自由意志」這種過時的神學概念，民眾也還是繼續吵著自由意志的話題。幾個世紀以來，基督教、伊斯蘭及猶太神學家，一直對靈魂和意志的關係爭論不休。他們假設每個人都有一個內心本質，稱為靈魂，也就是真實的自我。他們進一步認為，這個自我擁有各種欲望，就像擁有衣服、車子和房子一樣。他們還說，每個人都能夠像是選衣服一樣，選擇自己的欲望，而命運就是依據這些選擇而定。如果選了好的欲望，最後就會上天堂；如果選了壞的欲望，最後就得下地獄。


    問題就來了：欲望真的能「選」嗎？舉例來說，夏娃想要吃蛇給她的那顆禁果，但她為什麼會想做這件事？是有人強加於她？完全隨機出現在她的心中？還是她的「自由」選擇？如果想做這件事'
